[[dialogue]]
speaker = "unk"
original = "第１１話,緋宮宅にて,B"
translation = "제11화, 히노미야 댁에서, B"

[[dialogue]]
speaker = "unk"
original = "その後、俺は暗くなるまで特訓に付き合ってもらって。"
translation = "그 후, 나는 어두워질 때까지 특훈에 어울려 달라고 했다."

[[dialogue]]
speaker = "unk"
original = "星力にも多少の向上が見られたところで、ようやく切り上げることになった。"
translation = "성력에도 다소의 향상이 보인 시점에서, 겨우 끝내기로 했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それじゃ──マトイ、アナ。サーシャさんも。付き合ってくれてありがとうございました」"
translation = "「그럼──마토이, 아나. 사샤 씨도. 함께 해줘서 고마웠습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぐっじょぶ」"
translation = "「굿잡」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「気にしなくていいのに～」"
translation = "「신경 쓰지 않아도 되는데~」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはそれぞれ下校する──"
translation = "그렇게, 우리는 각자 하교한다──"

[[dialogue]]
speaker = "unk"
original = "──と思いきや。"
translation = "──라고 생각했더니."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「次期会長の家はこっち……メモメモ」"
translation = "「차기 회장 집은 이쪽…… 메모 메모」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ、いい匂い～。見てみて、あつあつのたい焼きだって～」"
translation = "「아, 좋은 냄새~. 봐봐, 갓 구운 붕어빵이래~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もう、勝手に買い食いしちゃダメですよサーシャさん」"
translation = "「정말, 멋대로 군것질하면 안 돼요 사샤 씨」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あの……なんで全員ついてきてるんですか」"
translation = "「저…… 왜 전부 따라오고 있는 건가요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあまあ～。特訓だけしてサヨナラなんて、寂しいじゃない～」"
translation = "「에이 에이~. 특훈만 하고 작별이라니, 섭섭하잖아~」"

[[dialogue]]
speaker = "unk"
original = "なぜか、俺の帰路に彼女たちもついてきてしまっていた。"
translation = "왠지 모르게, 내가 돌아가는 길에 그녀들도 따라와 버렸다."

[[dialogue]]
speaker = "unk"
original = "無下にする理由もないけれど、もう遅いのに大丈夫だろうか。"
translation = "매몰차게 거절할 이유도 없지만, 이미 늦었는데 괜찮을까."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あのマンションが、緋宮くんのお家～？」"
translation = "「저 맨션이, 히노미야 군의 집이야~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい。よかったら……みんなも上がっていきますか」"
translation = "「네. 괜찮다면…… 모두 올라오시겠어요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「タ、タワーマンションだ……通称タワマンだ……ブルジョアジー……！」"
translation = "「타, 타워 맨션이다…… 통칭 타와만이다…… 부르주아지……!」"

[[dialogue]]
speaker = "unk"
original = "なんだかんだ談笑しているうちに着いてしまった。"
translation = "이러쿵저러쿵 담소하는 사이에 도착해 버렸다."

[[dialogue]]
speaker = "unk"
original = "ここでお別れというのもなんだし、今日のお礼も兼ねて一休みしてもらおうか。"
translation = "여기서 헤어지는 것도 그렇고, 오늘 감사의 의미도 겸해서 잠시 쉬게 해줄까."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ただいま、母さん」"
translation = "「──다녀왔습니다, 엄마」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺はみんなを連れて７階の我が家へと戻った。"
translation = "그렇게, 나는 모두를 데리고 7층인 우리 집으로 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "すると、ちょうどリビングにいた母さんが出迎えてくれる──"
translation = "그러자, 마침 거실에 있던 엄마가 마중 나와 준다──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ、おかえりなさいク──ロ……？」"
translation = "「아, 어서 오렴 쿠──로……?」"

[[dialogue]]
speaker = "unk"
original = "が、そのまま目を白黒させて、俺の後ろに並ぶ３人を見つめていた。"
translation = "하지만, 그대로 눈을 깜빡이며 내 뒤에 서 있는 세 사람을 바라보고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん？」"
translation = "「엄마?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、詠野マトイです。緋宮くんの……」"
translation = "「앗, 에이노 마토이입니다. 히노미야 군의……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ソウルメイト」"
translation = "「소울메이트」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ただならぬ関係で～す」"
translation = "「심상치 않은 관계예~요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そんな……転入３日目にしてもう彼女を３人も……」"
translation = "「세상에…… 전학 3일째인데 벌써 여자친구가 셋이나……」"

[[dialogue]]
speaker = "unk"
original = "どうも勘違いをしているらしかった。"
translation = "아무래도 착각을 하고 있는 모양이었다."

[[dialogue]]
speaker = "unk"
original = "とはいえ友人──とひと言で紹介するのも難しそうなので、一旦落ち着いてもらうことにした……。"
translation = "그렇다고는 해도 친구──라고 한마디로 소개하는 것도 어려울 것 같아서, 일단 진정시키기로 했다…….」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──なんだ、学園のお友達だったのね。それにしても星徒会だなんて」"
translation = "「──뭐야, 학원 친구였구나. 그런데 성도회라니」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええ、すごい異例なんですけど……というか、お茶まで用意してもらってすみません」"
translation = "「네, 굉장한 이례적인 일이긴 한데요…… 그보다, 차까지 준비해 주셔서 죄송합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「次期会長は、お母さんと暮らしてるの」"
translation = "「차기 회장은, 엄마와 살고 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、昔からな」"
translation = "「아아, 옛날부터 그랬지」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、こんなに近くて立派なお家なんて羨ましいわ」"
translation = "「후후, 이렇게 가깝고 훌륭한 집이라니 부럽네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クロトもひと言くらい連絡をくれればいいのに。みんなのご飯を作っておくんだった」"
translation = "「쿠로토도 한마디 정도 연락을 주면 좋았을 텐데. 모두의 밥을 만들어 둘 걸 그랬어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただのなりゆきだから……」"
translation = "「그냥 어쩌다 보니 그렇게 된 거라서……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そうだ！\u3000ちょうどお茶請けも切らしてたし、下でお菓子でも買ってきてくれない？」"
translation = "「맞다! 마침 다과도 다 떨어졌고, 아래에서 과자라도 사다 주지 않을래?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「下で……？」"
translation = "「아래에서……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「一階にコンビニやクリーニング店があるのを見ました。そちらかと」"
translation = "「1층에 편의점이나 세탁소가 있는 것을 봤습니다. 그쪽일 겁니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「豪華なマンションね～。憧れちゃうわ～」"
translation = "「호화로운 맨션이네~. 부러워지네~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは別にいいけど……みんなを置いて？」"
translation = "「그건 상관없지만…… 모두를 두고?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「まあまあ、いいじゃない。まあまあまあ」"
translation = "「에이 에이, 괜찮잖아. 에이 에이 에이」"

[[dialogue]]
speaker = "unk"
original = "母さんはどうやら俺抜きで学園の話を聞きたいようだ。"
translation = "엄마는 아무래도 나 없이 학원 이야기를 듣고 싶은 모양이다."

[[dialogue]]
speaker = "unk"
original = "仕方ないなと思いつつ、俺はお茶菓子を探しに玄関を出た。"
translation = "어쩔 수 없다고 생각하면서, 나는 다과를 찾으러 현관을 나섰다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「マトイちゃんに、アナちゃん……サーシャちゃん。だったかしら？\u3000ごめんね、ろくにお構いもできなくて」"
translation = "「마토이짱에게, 아나짱…… 사샤짱. 이었지? 미안해, 제대로 대접도 못 해줘서」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お構いなく～。こちらこそ急に押しかけちゃってごめんなさい」"
translation = "「신경 쓰지 마세요~. 저희야말로 갑자기 들이닥쳐서 죄송해요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふ。でも安心したわ。転校なんて初めてだから……お友達ができるか心配だったんだけど」"
translation = "「후후. 하지만 안심했어. 전학은 처음이라서…… 친구를 사귈 수 있을지 걱정했는데」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「本人も、すごく張り切っていたしね」"
translation = "「본인도, 무척 의욕이 넘쳤고 말이야」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの……緋宮くんのお母さん。緋宮くんは、どうしてこの時期に転入を？」"
translation = "「저…… 히노미야 군의 어머니. 히노미야 군은, 왜 이 시기에 전학을?」"

[[dialogue]]
speaker = "unk"
original = "クロトは前からここに住んでいると言った。"
translation = "쿠로토는 전부터 여기에 살고 있다고 말했다."

[[dialogue]]
speaker = "unk"
original = "ならば地理的な問題ではないはずと、マトイはリノへ訊ねた。"
translation = "그렇다면 지리적인 문제는 아닐 것이라고, 마토이는 리노에게 물었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……あの子が言い出したのよ」"
translation = "「……그 애가 먼저 말 꺼낸 거야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あの子は昔から……よくトラブルに巻き込まれる子だった。モンスターに遭遇したり、ひどい時はアステラの中まで連れ去られたりね」"
translation = "「그 애는 옛날부터…… 자주 트러블에 휘말리는 아이였어. 몬스터와 마주치거나, 심할 때는 아스테라 안까지 끌려가기도 했지」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えぇぇ……！\u3000だから昨日も一昨日もモンスターに……」"
translation = "「에에에……! 그래서 어제도 그제도 몬스터에게……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「だからだと思う。世界に危機が迫っている今、どうしてもその力になりたい。誰かを救う星騎士になりたいって」"
translation = "「그래서라고 생각해. 세계에 위기가 닥쳐오고 있는 지금, 어떻게든 그 힘이 되고 싶다고. 누군가를 구하는 성기사가 되고 싶다고」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「危険だから──私は普通の学校に通うのを薦めてたんだけどね」"
translation = "「위험하니까── 나는 보통 학교에 다니는 것을 권했었는데 말이야」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……だから、自己流であんなに星力を」"
translation = "「……그래서, 독학으로 그렇게 성력을」"

[[dialogue]]
speaker = "unk"
original = "鍛錬から学費まで、クロトは全てを自力で調達してきたとリノは語った。"
translation = "단련부터 학비까지, 쿠로토는 모든 것을 자력으로 조달해 왔다고 리노는 말했다."

[[dialogue]]
speaker = "unk"
original = "だからこそ彼を引き止めることはできず、難関とされる編入試験も彼を拒まなかったのだと。"
translation = "그렇기에 그를 말릴 수는 없었고, 난관이라고 여겨지는 편입 시험도 그를 거부하지 않았다고."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、あの……でも、その。実は……」"
translation = "「아, 저…… 그런데, 그게. 실은……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "unk"
original = "マトイは言いよどみながらも告げた。"
translation = "마토이는 말을 더듬으면서도 고했다."

[[dialogue]]
speaker = "unk"
original = "今度の御前試合で現会長であるヴィーナスに勝てないと、彼が退学となってしまうことを。"
translation = "이번 어전 시합에서 현 회장인 비너스에게 이기지 못하면, 그가 퇴학당하게 된다는 것을."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「星徒会長戦……そんなことが」"
translation = "「성도 회장전…… 그런 일이」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長はけっこうその──突っ走るところがあるので。そこまでするとも思えないんですけど」"
translation = "「회장님은 꽤 그── 저돌적으로 나가는 면이 있어서요. 그렇게까지 할 거라고는 생각되지 않는데요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長の指名には逆らえない決まり。学園がそう決めてるから、退学になってもおかしくない」"
translation = "「회장의 지명에는 거역할 수 없는 규칙. 학원이 그렇게 정하고 있으니, 퇴학당해도 이상하지 않아」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、いくら会長にしたって入ってきたばかりの緋宮くんを頼るのはどうして……」"
translation = "「하지만, 아무리 회장이라고 해도 막 들어온 히노미야 군에게 의지하는 건 왜……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「一目惚れかしら～？」"
translation = "「첫눈에 반한 걸까~?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「理由は恐らく……いえ、推測の域を出ませんね。ともかく会長に勝って聞くに越したことはないかと」"
translation = "「이유는 아마도…… 아니요, 추측의 영역을 벗어나지 못하네요. 어쨌든 회장에게 이겨서 듣는 것이 가장 좋을 것 같습니다」"

[[dialogue]]
speaker = "unk"
original = "これまでヴィーナスのわがままにいくつも付き合ってきた彼女たちでさえ、今回は謎だと口を揃えて言った。"
translation = "지금까지 비너스의 제멋대로인 행동에 여러 번 어울려 왔던 그녀들조차, 이번에는 수수께끼라고 입을 모아 말했다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ホントならハンデつきとか、少なくとも延期していいと思うんですけど……緋宮くんは曲げる気もないみたいで」"
translation = "「정말이라면 핸디캡을 주거나, 적어도 연기해도 된다고 생각하는데요…… 히노미야 군은 굽힐 생각도 없는 것 같아서요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふ……あの子らしい」"
translation = "「후후…… 그 애답네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「（血は争えない……ということかしらね）」"
translation = "「(피는 속일 수 없다……는 뜻일까)」"

[[dialogue]]
speaker = "unk"
original = "クロトをよく知るリノは、ふっと自嘲気味に笑みをこぼす──"
translation = "쿠로토를 잘 아는 리노는, 픽 하고 자조적인 웃음을 흘린다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「（……）」"
translation = "「(……)」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「（次期会長の謎の体質が原因なら……お母様は……）」"
translation = "「(차기 회장의 수수께끼 같은 체질이 원인이라면…… 어머님은……)」"

[[dialogue]]
speaker = "unk"
original = "その時、外から当のクロトが戻ってきた。"
translation = "그때, 밖에서 바로 그 쿠로토가 돌아왔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お待たせ──何を話してたの？」"
translation = "「기다렸지── 무슨 이야기를 하고 있었어?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふ。なんでもない」"
translation = "「후후. 아무것도 아니야」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「クロトくんはがんばり屋さんって話よ～」"
translation = "「쿠로토 군은 노력파라는 이야기야~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気になる言い方ですね……」"
translation = "「신경 쓰이는 말투네요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そろそろ門限が近づいてきました。私たちもお暇しましょう」"
translation = "「슬슬 통금 시간이 다가왔습니다. 저희도 이만 가보겠습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、楽しい時間はすぐに過ぎちゃうわね」"
translation = "「후후, 즐거운 시간은 금방 지나가 버리네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……アナたちは学生寮なんだったか？」"
translation = "「……아나들은 학생 기숙사였던가?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。私たち留学生はみな基本的に『ラルーナ』という寮で暮らしています」"
translation = "「네. 저희 유학생들은 모두 기본적으로 『라루나』라는 기숙사에서 살고 있습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「一応、遠くに住んでる人間の人もいるみたいだけど……大半は魔族か天使よね」"
translation = "「일단, 멀리 사는 인간인 사람도 있는 것 같지만…… 대부분은 마족이나 천사겠지」"

[[dialogue]]
speaker = "unk"
original = "その事情についてはなんとなく知っていた。"
translation = "그 사정에 대해서는 어렴풋이 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "故郷が人間界ですらない彼らは、とても通学のできる条件下にないからだ。"
translation = "고향이 인간계조차 아닌 그들은, 도저히 통학을 할 수 있는 조건이 아니기 때문이다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「わかったわ。よかったら、残ったお菓子も遠慮せず食べちゃって？」"
translation = "「알았어. 괜찮다면, 남은 과자도 사양 말고 먹어 버려」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！\u3000バクバク食べ尽くします、どすこい！」"
translation = "「! 우걱우걱 다 먹어 치우겠습니다, 으랏차!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「マトイ先輩、無理して食いしん坊キャラしなくても……」"
translation = "「마토이 선배, 억지로 먹보 캐릭터를 하지 않아도……」"

[[dialogue]]
speaker = "unk"
original = "その後、軽くお茶菓子も召し上がってもらって──"
translation = "그 후, 가볍게 다과도 대접하고──"

[[dialogue]]
speaker = "unk"
original = "俺は自宅から３人を送り出すという、奇妙な形で別れることになった。"
translation = "나는 집에서 세 사람을 배웅한다는, 기묘한 형태로 헤어지게 되었다."

[[dialogue]]
speaker = "？？？"
original = "「…………クロト。…………クロトってば」"
translation = "「…………쿠로토. …………쿠로토라니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ん？\u3000ああ……寝てたのか、俺」"
translation = "「……응? 아아…… 자고 있었나, 나」"

[[dialogue]]
speaker = "？？？"
original = "「星徒会長さんが居眠りってのは感心しないんじゃない？\u3000ま、何もない証とも言えるけど」"
translation = "「성도 회장님이 꾸벅꾸벅 조는 건 감탄스럽지 않지 않아? 뭐, 아무 일도 없다는 증거라고도 할 수 있지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだな。世の中が平和なうちに、もう一眠り………………」"
translation = "「그렇지. 세상이 평화로운 동안, 한숨 더 자야지………………」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ぁ……」"
translation = "「……아……」"

[[dialogue]]
speaker = "unk"
original = "目を覚ます。"
translation = "잠에서 깬다."

[[dialogue]]
speaker = "unk"
original = "どうやら昨日は疲れてリビングで眠ってしまったようで、母さんのかけてくれたらしい毛布がはらりと落ちた。"
translation = "아무래도 어제는 피곤해서 거실에서 잠들어 버린 모양이고, 엄마가 덮어준 듯한 담요가 스르륵 떨어졌다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「夢か……変な夢だったな……」"
translation = "「꿈인가…… 이상한 꿈이었네……」"

[[dialogue]]
speaker = "unk"
original = "夢なんて元々そんなものなんだろうけど。"
translation = "꿈이란 원래 그런 것일 테지만."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（にしても……今の声、は……）」"
translation = "「(그렇다고 해도…… 방금 목소리는, 은……)」"

[[dialogue]]
speaker = "unk"
original = "彼女の──いや、別人だ──でも、どこか似ていたような……"
translation = "그녀의── 아니, 다른 사람이다── 하지만, 어딘가 닮았던 것 같은……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（なんて……考えても意味ないよな）」"
translation = "「(이런 걸…… 생각해도 의미 없겠지)」"

[[dialogue]]
speaker = "unk"
original = "所詮は夢だ。"
translation = "결국은 꿈이다."

[[dialogue]]
speaker = "unk"
original = "混濁した意識が変な幻でも見せたのだろうと、その映像はすぐに俺の記憶から消えていった。"
translation = "혼탁한 의식이 이상한 환상이라도 보여준 것이겠지 하고, 그 영상은 곧바로 내 기억에서 사라져 갔다."

