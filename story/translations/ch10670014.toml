[[dialogue]]
speaker = "unk"
original = "第４話,祈りと歌と激励と,P"
translation = "제4화, 기도와 노래와 격려와, P"

[[dialogue]]
speaker = "聖沙"
original = "「ラ～……ラ～……ラ～……♪」"
translation = "「라~…… 라~…… 라~……♪」"

[[dialogue]]
speaker = "聖沙"
original = "「あら……会長さんじゃない。こんばんは。こんな夜更けに珍しいわね。もしかしてお祈りに来たの？」"
translation = "「어라…… 회장님 아니야. 안녕. 이런 늦은 밤에 희한하네. 혹시 기도하러 온 거야?」"

[[dialogue]]
speaker = "unk"
original = "綺麗な歌声が聞こえてきたので"
translation = "고운 노랫소리가 들려와서"

[[dialogue]]
speaker = "聖沙"
original = "「ああ、外まで漏れちゃってたのね。ごめんなさい、うるさかったかしら」"
translation = "「아아, 밖까지 새어 나갔구나. 미안해, 시끄러웠을까」"

[[dialogue]]
speaker = "unk"
original = "こんな夜遅くに練習？"
translation = "이 밤늦게 연습?"

[[dialogue]]
speaker = "聖沙"
original = "「日課のようなものよ。これでも元の世界では聖歌隊の隊長を務めているから。平行世界に来ているからって練習を怠るわけにはいかないわ」"
translation = "「일과 같은 거야. 이래 봬도 원래 세계에서는 성가대 대장을 맡고 있으니까. 평행세계에 와 있다고 연습을 게을리할 수는 없지」"

[[dialogue]]
speaker = "聖沙"
original = "「それに……真夜中の聖堂ってとても静かで落ち着くのよね。こうして夜中に歌の練習をしたり、お祈りをしたりするだけで心が透き通っていく気がするの」"
translation = "「게다가…… 한밤중의 성당은 아주 조용해서 마음이 편안해지거든. 이렇게 밤중에 노래 연습을 하거나 기도를 하는 것만으로 마음이 투명해지는 기분이 들어」"

[[dialogue]]
speaker = "聖沙"
original = "「そうだ。せっかくだし、会長さんもお祈りしていったら？\u3000大方この時間まで会長の仕事やら戦闘訓練やらしてたんでしょ？」"
translation = "「맞다. 이왕 이렇게 된 거 회장님도 기도하고 가는 게 어때? 대체로 이 시간까지 회장 업무나 전투 훈련 같은 걸 했을 거 아냐?」"

[[dialogue]]
speaker = "聖沙"
original = "「ふふ、わかるわよ。短い付き合いとはいえ、あなたのことをずっと傍で見ていたんだもん」"
translation = "「후후, 알고 있어. 짧은 만남이지만 당신을 계속 곁에서 지켜봤는걸」"

[[dialogue]]
speaker = "聖沙"
original = "「会長さんはとても真面目で一生懸命な人よ。うちの会長にもあなたの爪の垢を煎じて飲ませてあげたいくらい」"
translation = "「회장님은 아주 성실하고 열심인 사람이야. 우리 회장한테 당신의 때라도 씻어서 먹여주고 싶을 정도라고」"

[[dialogue]]
speaker = "聖沙"
original = "「でも、だからこそちょっと心配ね。ちゃんと休息は取ってる？\u3000あんまり無茶をしすぎてはダメよ？」"
translation = "「하지만 그렇기에 조금 걱정되네. 제대로 휴식은 취하고 있어? 너무 무리하지는 마?」"

[[dialogue]]
speaker = "聖沙"
original = "「急いては事をし損じるんだから。時には何も考えずに心を空っぽにすることも大切よ」"
translation = "「서두르다 일을 그르치는 법이니까. 때로는 아무 생각 없이 마음을 비우는 것도 중요해」"

[[dialogue]]
speaker = "聖沙"
original = "「こうしてお祈りを捧げたりして、ね？\u3000ほら手を合わせて目を閉じなさい？\u3000何も考えなくていいから」"
translation = "「이렇게 기도를 올리거나 하면서 말이야. 자 손을 모으고 눈을 감아봐? 아무것도 생각하지 않아도 되니까」"

[[dialogue]]
speaker = "聖沙"
original = "「……ふふ、どう？\u3000心の中がスッキリするでしょ？」"
translation = "「……후후, 어때? 마음속이 개운해지지?」"

[[dialogue]]
speaker = "聖沙"
original = "「せっかくこんなに立派な大聖堂が学園の敷地にあるんだもの。毎日お祈りの時間を取るといいわ」"
translation = "「이렇게 훌륭한 대성당이 학원 부지 안에 있는데. 매일 기도 시간을 가지면 좋겠어」"

[[dialogue]]
speaker = "聖沙"
original = "「深呼吸の時間にもなるし、願うことで自分の目的や目標を再確認できるし、良いことずくめよ」"
translation = "「심호흡할 시간도 되고, 바라는 것을 통해 자신의 목적이나 목표를 재확인할 수 있으니 좋은 것투성이야」"

[[dialogue]]
speaker = "unk"
original = "聖沙って意外と面倒見がいいんだな"
translation = "미사는 의외로 남을 잘 챙겨주는구나"

[[dialogue]]
speaker = "聖沙"
original = "「意外とって何よ、意外とって！\u3000私は最初から面倒見がいい方よ！」"
translation = "「의외라니 무슨 소리야, 의외라니! 나는 처음부터 남을 잘 챙겨주는 편이었다고!」"

[[dialogue]]
speaker = "聖沙"
original = "「まったくもう。気を遣ってあげたのに失礼しちゃうわ。……まぁでも、そんな減らず口を叩けるのなら大丈夫そうね」"
translation = "「정말이지 원. 신경 써줬더니 실례라니까. ……뭐 그래도 그런 소릴 할 수 있는 걸 보니 괜찮아 보이네」"

[[dialogue]]
speaker = "聖沙"
original = "「って、だからもう。どうしてまた不思議そうな顔をしているのよ。私があなたの心配をするのが、そんなにおかしいかしら？」"
translation = "「아니, 그러니까 왜. 어째서 또 이상하다는 얼굴을 하고 있는 거야. 내가 당신 걱정을 하는 게 그렇게 이상해?」"

[[dialogue]]
speaker = "聖沙"
original = "「そりゃ心配にもなるわよ。こちらの世界の星騎士は危険なモンスターと毎日のように命がけで戦っているんだもん」"
translation = "「그야 걱정도 되지. 이쪽 세계의 성기사는 위험한 몬스터와 매일같이 목숨 걸고 싸우고 있잖아」"

[[dialogue]]
speaker = "聖沙"
original = "「私のいる世界よりよっぽど大変だわ。みんなは私を英雄と持ち上げてくれるけど、私から見れば、こちらの世界のみんなの方が断然英雄に見えるくらいよ」"
translation = "「내가 있는 세계보다 훨씬 힘들다고. 다들 나를 영웅이라고 떠받들어주지만, 내가 보기엔 이쪽 세계의 모두가 훨씬 영웅처럼 보이는걸」"

[[dialogue]]
speaker = "聖沙"
original = "「まぁだからといって実力で負けているつもりはないけれどね♪\u3000呼んでくれれば、いつでも英雄らしいところを見せてあげるわ♪」"
translation = "「뭐 그렇다고 해서 실력으로 지고 있을 생각은 없지만 말이야♪ 부르면 언제든지 영웅다운 모습을 보여줄게♪」"

[[dialogue]]
speaker = "聖沙"
original = "「って……どうして黙ってるのよ！\u3000呼んでくれればいつでも英雄らしいところを見せてあげるって言ってるじゃない！」"
translation = "「아니…… 왜 가만히 있는 거야! 부르면 언제든지 영웅다운 모습을 보여주겠다고 했잖아!」"

[[dialogue]]
speaker = "聖沙"
original = "「つまり、その……。助けが欲しくなったら、いつでも私を頼りなさいってことよ！」"
translation = "「즉, 그…… 도움이 필요해지면 언제든 나를 의지하라는 뜻이야!」"

[[dialogue]]
speaker = "聖沙"
original = "「別に戦闘以外のことでも構わないわ。身内には打ち明けづらい悩みだとかも私には話しやすいかもしれないし」"
translation = "「딱히 전투 이외의 일이라도 상관없어. 가까운 사람에겐 털어놓기 힘든 고민 같은 것도 나에겐 말하기 쉬울 수도 있고」"

[[dialogue]]
speaker = "聖沙"
original = "「たとえ元の世界に戻っても、あなたが私に助けを求めるのなら、すぐに飛んでいってあげるわ。何があっても必ず、ね？」"
translation = "「설령 원래 세계로 돌아가더라도 당신이 나에게 도움을 요청한다면 바로 날아와 줄게. 무슨 일이 있어도 반드시, 알았지?」"

[[dialogue]]
speaker = "unk"
original = "やっぱり良い人だ……！"
translation = "역시 좋은 사람이다……!"

[[dialogue]]
speaker = "聖沙"
original = "「だからもう……！\u3000あなたは今まで私をどんな風に思ってたのよ！\u3000私は最初からずーっと頼れる良い先輩だってば！」"
translation = "「그러니까 정말……! 당신은 지금까지 나를 어떻게 생각했던 거야! 나는 처음부터 계속~ 의지할 수 있는 좋은 선배였다니까!」"

[[dialogue]]
speaker = "聖沙"
original = "「なんだかバカにされている気分になってきたわ……。せっかく夜遅くまで頑張るあなたを労ってあげようと思っていたのに」"
translation = "「왠지 바보 취급당하는 기분이 들기 시작했어……. 어렵게 밤늦게까지 고생하는 당신을 위로해주려 했더니만」"

[[dialogue]]
speaker = "聖沙"
original = "「よし──構えなさい。勝負よ！\u3000あなたに生徒会長の器があるかどうか改めて確かめてあげる！」"
translation = "「좋아── 자세 잡아. 승부야! 당신에게 학생회장의 그릇이 있는지 다시 한번 확인해주지!」"

[[dialogue]]
speaker = "unk"
original = "さっき無茶しすぎるのはダメって……"
translation = "방금 무리하는 건 안 된다고……"

[[dialogue]]
speaker = "聖沙"
original = "「さ、さっきはさっき、今は今よ！\u3000いいから構えなさいってば！」"
translation = "「그, 그건 그거고 이건 이거야! 됐으니까 어서 자세나 잡으라고!」"

[[dialogue]]
speaker = "聖沙"
original = "「それとも自信がないの？\u3000それなら、ふふん。私の不戦勝でも構わないけれど」"
translation = "「아니면 자신 없어? 그렇다면 흐흥. 나의 부전승으로 끝내도 상관없지만」"

[[dialogue]]
speaker = "unk"
original = "ああ──負けない"
translation = "아아── 안 져"

[[dialogue]]
speaker = "聖沙"
original = "「……ふふ。良い気迫じゃない。それでこそ生徒会長よ」"
translation = "「……후후. 좋은 기백이네. 그래야 학생회장이지」"

[[dialogue]]
speaker = "聖沙"
original = "「これから先、きっとあなたには色々な勝負や試練が待ち受けているわ。時には敗北を味わうこともあるかもしれない」"
translation = "「앞으로 분명 당신에겐 여러 승부나 시련이 기다리고 있을 거야. 때로는 패배를 맛볼 수도 있겠지」"

[[dialogue]]
speaker = "聖沙"
original = "「だけど決して折れちゃダメよ。たとえ負けても心だけは折れちゃダメ。何度でも何度でも泥臭く立ち上がりなさい」"
translation = "「하지만 결코 꺾이면 안 돼. 비록 지더라도 마음만은 꺾이면 안 돼. 몇 번이고 몇 번이고 꼴사납더라도 다시 일어나」"

[[dialogue]]
speaker = "聖沙"
original = "「そうすれば周りのみんなも必ず応えてくれる。あなたの背中に付いてきてくれる」"
translation = "「그러면 주변 사람들도 반드시 응답해 줄 거야. 당신의 뒤를 따라와 줄 거야」"

[[dialogue]]
speaker = "聖沙"
original = "「時にはそれを重荷に感じる時もあるかもしれないけれど……そういう時は、私を頼ってくれたらいいから」"
translation = "「때로는 그것을 짐처럼 느낄 때도 있겠지만…… 그럴 때는 나를 의지하면 되니까」"

[[dialogue]]
speaker = "聖沙"
original = "「って──だからニヤニヤしないで～っ！\u3000やっぱりバカにしてるわね！\u3000ちょっと先輩ぶったらすぐそれなんだから……！」"
translation = "「아니── 그러니까 싱글벙글 웃지 마~! 역시 바보 취급하고 있네! 좀 선배 노릇 했더니 바로 저런다니까……!」"

[[dialogue]]
speaker = "聖沙"
original = "「いいわ、今夜は徹底的に敗北ってヤツをあなたに味わわせてあげる。バッキンバッキンに心をへし折ってやるんだから！」"
translation = "「좋아, 오늘 밤은 철저하게 패배라는 걸 맛보게 해주지. 마음을 아주 박살을 내버릴 테니까!」"

[[dialogue]]
speaker = "聖沙"
original = "「さぁ──勝負よ！\u3000元の世界に戻るまでに、生徒会長のなんたるかをみっちり叩き込んであげるわ！」"
translation = "「자── 승부야! 원래 세계로 돌아가기 전까지 학생회장의 본때를 톡톡히 가르쳐주지!」"

