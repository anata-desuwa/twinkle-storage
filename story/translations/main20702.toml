[[dialogue]]
speaker = "unk"
original = "第２話,物語の始まり,B"
translation = "제2화, 이야기의 시작, B"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの母は女神テルルだと、守護天使ラクシャの口から語られた。"
translation = "비너스의 어머니는 여신 테루루라고, 수호천사 락샤의 입을 통해 밝혀졌다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの母親については今までも推測できる情報はあったが、直接言葉にされると小さくない衝撃があった。"
translation = "비너스의 어머니에 대해서는 지금까지도 추측할 수 있는 정보가 있었지만, 직접 말로 들으니 적지 않은 충격이 있었다."

[[dialogue]]
speaker = "unk"
original = "しかも女神を転生させたのが、俺のよく知る環だというのだからなおさらだ。"
translation = "게다가 여신을 전생시킨 것이 내가 잘 아는 타마키라고 하니 더욱 그랬다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「環がママを人間に転生させて、ママが私を産んだ。つまり──」"
translation = "「타마키가 엄마를 인간으로 전생시켰고, 엄마가 나를 낳았어. 그러니까──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたはママのママってことね！」"
translation = "「당신은 엄마의 엄마라는 거네!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ちがわい」"
translation = "「아니거든」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「話を戻すよ。人間として九浄家に生まれたテルルは、成長して星騎士となり、新星学園に入学した」"
translation = "「이야기를 계속할게. 인간으로서 쿠죠 가문에 태어난 테루루는 성장해서 성기사가 되었고, 신성학원에 입학했어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「彼女は星徒会長となり、ある男子生徒と出会った。ここまで言えば誰のことかわかるよね？」"
translation = "「그녀는 성도회장이 되었고, 어떤 남학생과 만났지. 여기까지 말하면 누군지 알겠지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブの俺……だな」"
translation = "「데네브의 나……로군」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「もちろん。そこで他の男が出てきたらビックリしちゃうよ」"
translation = "「당연하지. 여기서 다른 남자가 나오면 깜짝 놀랄걸」"

[[dialogue]]
speaker = "？？？"
original = "「星徒会長さんが居眠りってのは感心しないんじゃない？\u3000ま、何もない証とも言えるけど」"
translation = "「성도회장님이 낮잠이라니 감탄할 만한 일은 아니지 않아? 뭐, 아무 일도 없다는 증거라고도 할 수 있겠지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだな。世の中が平和なうちに、もう一眠り………………」"
translation = "「그렇네. 세상이 평화로운 동안에 한숨 더………………」"

[[dialogue]]
speaker = "unk"
original = "いつか見た星徒会の光景。"
translation = "언젠가 보았던 성도회의 광경."

[[dialogue]]
speaker = "unk"
original = "あれは夢ではない。ヴィーナスとの記憶でもない。"
translation = "그것은 꿈이 아니다. 비너스와의 기억도 아니다."

[[dialogue]]
speaker = "unk"
original = "デネブの<ruby>俺<rt>クロト</rt></ruby>が経験した、人となったテルルとの日々。"
translation = "데네브의 나가 경험했던, 인간이 된 테루루와의 나날."

[[dialogue]]
speaker = "unk"
original = "その記憶が俺の力を通して流れ込んできたものなんだ。"
translation = "그 기억이 나의 힘을 통해 흘러 들어온 것이었다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そして２人は恋に落ち、子を授かりました。めでたしめでたし……とはいかないんだけど」"
translation = "「그리고 두 사람은 사랑에 빠져 아이를 가졌습니다. 오래오래 행복하게 살았습니다……라고는 되지 않았지만」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その子どもが私、ってわけね」"
translation = "「그 아이가 바로 나라는 거네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そ。キミは正真正銘、女神と魔王の娘ってわけ」"
translation = "「그렇지. 넌 명실상부한 여신과 마왕의 딸이라는 말씀」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「だけど話はもう少し続くよ」"
translation = "「하지만 이야기는 조금 더 이어져」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "この先はヴィーナスにとって聞きたい話ではないだろう。"
translation = "이후는 비너스에게 있어 듣고 싶은 이야기는 아닐 것이다."

[[dialogue]]
speaker = "unk"
original = "それでも、一言たりとも聞き逃すまいと、環の話に真剣に耳を傾けている。"
translation = "그럼에도 단 한 마디도 놓치지 않겠다는 듯, 타마키의 이야기에 진지하게 귀를 기울이고 있다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「緋宮クロトと九浄テルルは共にリクリエと戦った。だけど勝てなかった」"
translation = "「히노미야 쿠로토와 쿠죠 테루루는 함께 리크리에와 싸웠어. 하지만 이기지 못했지」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「敗北を悟った２人は最後の手段に出た。それは自らを犠牲に、愛娘を平行世界に送り出すこと」"
translation = "「패배를 깨달은 두 사람은 마지막 수단을 썼어. 그것은 자신들을 희생해 사랑하는 딸을 평행세계로 보내는 것」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「デネブのクロトは魔王の力を臨界させ、アルタイルへの道を開いた。テルルの人間としての肉体も同時に失われている」"
translation = "「데네브의 쿠로토는 마왕의 힘을 임계시켜 알타이르로 향하는 길을 열었어. 테루루의 인간으로서의 육체도 동시에 소실되었지」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そしてヴィーナスはボクと一緒にアルタイルへやってきた──ってわけ」"
translation = "「그리고 비너스는 나와 함께 알타이르로 오게 된 거야──라는 말씀」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ちなみにヴィーナスが持ってた『未来の日誌』は、テルルが付けていた日記を元にしたものだ」"
translation = "「참고로 비너스가 가지고 있던 『미래의 일지』는 테루루가 썼던 일기를 바탕으로 만든 거야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ヴィーナスも熱心に星徒会日誌つけてたよね？\u3000あれと同じことをキミのお母さんもしていたんだ」"
translation = "「비너스도 열심히 성도회 일지를 썼었지? 그것과 똑같은 일을 네 어머니도 하고 있었던 거야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「参考になればと思って持たせたみたいだけど、日誌にないことがたくさん起きたし、残念ながらあんまり役に立たなかったね」"
translation = "「참고가 됐으면 해서 들려 보낸 모양인데, 일지에 없는 일이 잔뜩 일어났고 안타깝게도 별로 도움이 안 됐네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「だからあの日誌は、キミたちを操ろうとかそういうものじゃないんだよ。ずいぶん疑われちゃったけど」"
translation = "「그러니까 그 일지는 너희를 조종하려거나 그런 게 아니야. 꽤 의심받긴 했지만 말이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう……だったのね」"
translation = "「그랬……구나」"

[[dialogue]]
speaker = "unk"
original = "アナは疑問を持っていたけど、あの日誌は純粋にヴィーナスを想って用意されたものだった。"
translation = "아나는 의문을 품고 있었지만, 그 일지는 순수하게 비너스를 생각해서 준비된 것이었다."

[[dialogue]]
speaker = "unk"
original = "そして何より、ヴィーナスにとって数少ない母との繋がりでもあった。"
translation = "그리고 무엇보다 비너스에게 있어 몇 안 되는 어머니와의 연결고리이기도 했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「環がデネブのラクシャなのはわかった。だけどアルタイルで別れたはずなのに、どうしてこっちにいるんだ？」"
translation = "「타마키가 데네브의 락샤라는 건 알겠어. 하지만 알타이르에서 헤어졌을 텐데, 어떻게 여기 있는 거지?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「チナとの戦いは見ていたからね。キミたちが穴に吸い込まれた時、ボクは肉体を捨てて霊体で飛び込んだのさ」"
translation = "「치나와의 싸움은 보고 있었거든. 너희가 구멍에 빨려 들어갔을 때, 난 육체를 버리고 영체로 뛰어들었어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボクは元々デネブのラクシャ。ボクの本体を道標にして、キミたちをデネブの流星市国へと導いた」"
translation = "「난 원래 데네브의 락샤. 내 본체를 이정표 삼아 너희를 데네브의 유성시국으로 인도했지」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「で、肉体はこっちで再構成して、今に至ると」"
translation = "「그래서 육체는 이쪽에서 재구성해서 지금에 이른 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「つまり俺たちが流星市国に出たのは……」"
translation = "「즉 우리가 유성시국으로 나온 건……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そう、ボクのおかげ。あのままじゃ、魔界や天界の辺境に飛ばされて野垂れ死に、ってこともありえたからね」"
translation = "「그래, 내 덕분이지. 그대로 뒀으면 마계나 천계의 변방으로 날아가서 굶어 죽었을 수도 있으니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……ありがとう」"
translation = "「그건…… 고마워」"

[[dialogue]]
speaker = "unk"
original = "穴に呑み込まれた時の記憶がおぼろげなせいで実感はないが、環にはいつの間にか助けられたようだった。"
translation = "구멍에 삼켜졌을 때의 기억이 희미한 탓에 실감은 나지 않지만, 타마키에게 어느샌가 도움을 받은 모양이었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……全部呑み込めたわけじゃないけど、環にもいろいろ事情があったのはわかったわ」"
translation = "「……전부 다 받아들인 건 아니지만, 타마키에게도 여러 사정이 있었다는 건 알겠어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だけどそれなら、最初から全部教えてくれたらよかったじゃない！\u3000それにどうして今になって出てきたのよ！？」"
translation = "「하지만 그렇다면 처음부터 전부 가르쳐 줬으면 좋았잖아! 게다가 왜 이제 와서 나타난 거야!?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「知ってたら、キミたちは勝てたかい？」"
translation = "「알고 있었다면 너희가 이길 수 있었을까?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「キミたちは段階的に成長する必要があった。だから情報も自分で掴み取ってもらう方が都合が良かったんだ」"
translation = "「너희는 단계적으로 성장할 필요가 있었어. 그래서 정보도 직접 쟁취하게 하는 편이 형편이 좋았거든」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ドライなんだな」"
translation = "「냉정하네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「何せ相手はリクリエだからね」"
translation = "「상대가 리크리에니까 어쩔 수 없지」"

[[dialogue]]
speaker = "unk"
original = "彼女は守護天使であり、その視点で世界を見ている。"
translation = "그녀는 수호천사이며, 그 시점에서 세계를 보고 있다."

[[dialogue]]
speaker = "unk"
original = "外見は俺のよく知る環だが、その奥底にある価値観は、高位存在たる守護天使のものなのだと実感する。"
translation = "외견은 내가 잘 아는 타마키지만, 그 심연에 있는 가치관은 고위 존재인 수호천사의 것이라는 걸 실감한다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そしてなぜ、今になってキミたちの前に姿を表したのか……それは今がチャンスだと思ったからだよ」"
translation = "「그리고 왜 이제야 너희 앞에 모습을 나타냈느냐 하면…… 그건 지금이 기회라고 생각했기 때문이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「チャンス……？」"
translation = "「기회……?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん、チャンス。緋宮クロト……キミはデネブに渡って極星学園を説得すると言ったね？」"
translation = "「응, 기회. 히노미야 쿠로토…… 넌 데네브로 건너가 극성학원을 설득하겠다고 했지?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そんなキミにとって、事故でデネブにやってきたことは、期せずして舞い込んだチャンスだ」"
translation = "「그런 너에게 있어 사고로 데네브에 오게 된 건, 뜻하지 않게 굴러 들어온 기회야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そしてそれはボクにとっても同じ」"
translation = "「그리고 그건 나에게 있어서도 마찬가지지」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「デネブに戻ってから少し情報収集したけど、どう考えてもルヴィネの存在は不自然だ」"
translation = "「데네브로 돌아오고 나서 조금 정보를 수집해 봤는데, 아무리 생각해도 루비네의 존재는 부자연스러워」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「デネブのクロトが敗れた後、ルヴィネが世界を救ったことになってるけど、リクリエもモンスターも１人の天使が全部片づけたなんて信じられないよ」"
translation = "「데네브의 쿠로토가 패배한 뒤 루비네가 세계를 구한 걸로 되어 있지만, 리크리에도 몬스터도 천사 한 명이 전부 해결했다니 믿을 수 없어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「それにルヴィネは女神の力をもらったとか、声を聞いたとか言ってたけど、それも怪しい」"
translation = "「게다가 루비네는 여신의 힘을 받았다느니 목소리를 들었다느니 말하던데, 그것도 수상해」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「だいたい、女神テルルにそんな力が残ってるなら、最初っから魔王を勝たせてるっての」"
translation = "「애초에 여신 테루루에게 그런 힘이 남아있다면 처음부터 마왕을 이기게 했겠지」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ルヴィネには必ず裏がある。それもきっととびっきりのネタだ」"
translation = "「루비네에게는 반드시 뒷사정이 있어. 그것도 분명 엄청난 건으로 말이야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「だからここは手札をオープンにして、協力してルヴィネのことを調べようってわけ」"
translation = "「그러니까 여기서는 패를 오픈하고 협력해서 루비네에 대해 조사해 보자는 말씀」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「というわけで……理解してくれたかな、ヴィーナス？」"
translation = "「그런 고로…… 이해해 줬을까나, 비너스?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「半分くらいしかわからなかったわ！」"
translation = "「절반 정도밖에 모르겠어!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん、そうだろうと思った」"
translation = "「응, 그럴 줄 알았어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だけど、環が嘘をついてるようにも見えなかった。気分的にはまだ納得いかないけど……信じることにするわ」"
translation = "「하지만 타마키가 거짓말을 하는 것처럼 보이지도 않았어. 기분상으로는 아직 납득이 안 가지만…… 믿기로 할게」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ありがとう。レジスタンスの御二方はどう？」"
translation = "「고마워. 레지스탕스 두 분은 어때?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「私はクロトが死んだ時、怪我で一緒に戦えなかった。それでも後方から状況を観測していたけど……データとあなたの言葉に矛盾はない」"
translation = "「나는 쿠로토가 죽었을 때 부상 때문에 함께 싸우지 못했어. 그래도 후방에서 상황을 관측하고 있었지만…… 데이터와 당신의 말에 모순은 없네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「少なくとも、今の説明の中に嘘はない……と思うわ」"
translation = "「적어도 지금 설명 중에 거짓은 없다……고 생각해」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「まぁ、筋は通ってなくもない。それにルヴィネに疑問を持っているのはレジスタンスと同じだ」"
translation = "「뭐, 앞뒤가 안 맞는 건 아니군. 게다가 루비네에게 의문을 품고 있는 건 레지스탕스도 마찬가지다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「要するに、あたしたちとは利害が一致している。レジスタンスはお前を味方と認めよう」"
translation = "「요컨대 우리와는 이해관계가 일치해. 레지스탕스는 너를 아군으로 인정하마」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「まぁ、当面は警戒させてもらうがな」"
translation = "「뭐, 당분간은 경계하겠지만 말이야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん、それでいいよ。出会ったばかりで全幅の信頼を置かれても、それはそれで心配になっちゃうし」"
translation = "「응, 그걸로 충분해. 방금 만났는데 전적으로 신뢰받아도 그건 그것대로 걱정될 것 같으니까」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「守護天使ラクシャは謎が多い存在でしたが……なるほど、入り組んだ事情があったのですね……」"
translation = "「수호천사 락샤는 수수께끼가 많은 존재였습니다만…… 과연, 복잡한 사정이 있었군요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も環を信じる。魔界で戦った時は霊屑をもらったし、ただの敵でないことはわかっていたから」"
translation = "「나도 타마키를 믿어. 마계에서 싸웠을 때는 영설을 받았고, 단순한 적이 아니라는 건 알고 있었으니까」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ありがとう。助かるよ。ここで追い出されたら路頭に迷うところだったからね」"
translation = "「고마워. 다행이네. 여기서 쫓겨났으면 길거리에 나앉을 뻔했거든」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど、もうひとつ聞いていいか？」"
translation = "「하지만 한 가지만 더 물어봐도 될까?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「何？\u3000もう説明しきったと思うんだけど」"
translation = "「뭔데? 설명은 다 한 것 같은데」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今さらだけど……環か、ラクシャか、君を何て呼べばいいんだ？」"
translation = "「새삼스럽지만…… 타마키라고 불러야 할까, 락샤라고 불러야 할까? 널 뭐라고 부르면 되지?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「なんだ、そんなことか。キミらしいね」"
translation = "「뭐야, 그런 거였어? 너답네」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「環って馴染みのある名前も悪くないけど、ここじゃキミとヴィーナスにしか通じないから、ラクシャでお願い」"
translation = "「타마키라는 친숙한 이름도 나쁘지 않지만, 여기선 너랑 비너스한테밖에 안 통하니까 락샤로 부탁해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……わかった」"
translation = "「……알았어」"

[[dialogue]]
speaker = "unk"
original = "ラクシャ──環とは、俺が新星学園に転入する前、それこそヴィーナスより先に出会った。"
translation = "락샤── 타마키와는 내가 신성학원에 전입하기 전, 그야말로 비너스보다 먼저 만났다."

[[dialogue]]
speaker = "unk"
original = "俺を監視するためだとしても、バイト仲間として苦楽を共にした相手だ。"
translation = "나를 감시하기 위해서였다고 해도, 알바 동료로서 고락을 함께한 상대다."

[[dialogue]]
speaker = "unk"
original = "元より仮の名とはいえ、そんな彼女の名前が使われなくなることに少し寂しさを感じる。"
translation = "원래 가명이었다고는 해도, 그런 그녀의 이름이 쓰이지 않게 되는 것에 조금 쓸쓸함을 느낀다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ま、２人きりの時は環って呼んでくれてもいいんだぜ♪」"
translation = "「뭐, 둘만 있을 때는 타마키라고 불러줘도 된다구♪」"

[[dialogue]]
speaker = "unk"
original = "だけどこの気さくさと距離感は、以前の彼女と何ら変わらないのだった。"
translation = "하지만 이 싹싹함과 거리감은 이전의 그녀와 조금도 다르지 않은 것이었다."

