[[dialogue]]
speaker = "unk"
original = "第３話,紅明と性教育の時間,P"
translation = "제3화, 코우메이와 성교육 시간, P"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。クーシェンから空き教室に呼び出されて向かうと――"
translation = "어느 날 방과 후. 쿠셴에게서 빈 교실로 호출을 받고 향하자──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「クーちん、前に言ってた『正しい性教育』のお時間だぜ☆\u3000アタシと一緒にエッチなお勉強するっしょ～！」"
translation = "「쿠셴, 저번에 말했던 『올바른 성교육』 시간이니라☆ 나랑 같이 야한 공부 하는 거라구~!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「わ～い！\u3000勉強はやだけど、エッチな内容ならやるやる～！」"
translation = "「와아~! 공부는 싫지만 야한 내용이라면 할래 할래~!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うっし☆\u3000じゃあ、まずはアタシが持ってきた秘蔵のエロ本の１ページ目から――」"
translation = "「조아☆ 그럼 우선은 내가 가져온 비장의 야설 잡지 1페이지부터──」"

[[dialogue]]
speaker = "unk"
original = "ちょっと待てぇーい！！！"
translation = "잠깐 기다려어어어!!! "

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ、にーにー♪」"
translation = "「앗, 오빠♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ありゃ！？\u3000ダーリンが何故ここに？」"
translation = "「어라!? 달링 군이 왜 여기에?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボクが呼んでたんだ～♪\u3000ほら、にーにーもまだ子供だから、エッチな勉強をやるなら『大人ゲージ』を貯める為に誘ってあげた方がいいと思って～」"
translation = "「내가 불렀어~♪ 봐, 오빠도 아직 어린애니까 야한 공부를 할 거라면 『어른 게이지』를 쌓기 위해 불러주는 게 좋다고 생각해서~」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「しまったぜ……そこはちゃんと、ダーリンには秘密と言っておくべきだったっしょ……」"
translation = "「실수했구만…… 거긴 제대로 달링한테는 비밀이라고 말해뒀어야 했다구……」"

[[dialogue]]
speaker = "unk"
original = "クーシェンに何を教える気だったんだ！？"
translation = "쿠셴한테 뭘 가르칠 생각이었던 거야!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「バレてしまったなら仕方ない。それは――」"
translation = "「들켜버렸다면 어쩔 수 없지. 그건──」"

[[dialogue]]
speaker = "unk"
original = "そう言って彼女は、立派な古文書のような本を取り出して見せる。"
translation = "그렇게 말하며 그녀는 훌륭한 고문서 같은 책을 꺼내 보여준다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「じゃじゃーーん☆\u3000我が牛家に伝わる秘伝の『エロスの書』だぜ！」"
translation = "「짜자잔☆ 우리 규우 가문에 전해지는 비전의 『에로스의 서』라구!」"

[[dialogue]]
speaker = "unk"
original = "没収っ！！！"
translation = "압수!!!"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「速攻！？\u3000落ち着くんだ、ダーリン！」"
translation = "「빛의 속도!? 진정하라구, 달링!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「これはただのエロ本じゃない！\u3000確かにすごくエロいことも書いてあるけど、牛家が２０００年間、正しい性知識を子孫に伝える為に受け継いできた『性書』なんだ！！」"
translation = "「이건 그냥 야한 책이 아니야! 확실히 굉장히 야한 내용도 적혀 있지만 규우 가문이 2000년 동안 올바른 성지식을 자손에게 전하기 위해 물려받아 온 『성서』라고!!」"

[[dialogue]]
speaker = "unk"
original = "怪しさしか感じないんだけど！？"
translation = "수상함밖에 안 느껴지는데!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「大丈夫だって！\u3000ダーリンも知っての通り、アタシはこう見えて、前世でママをやってたんだぜ？\u3000任せときなって☆」"
translation = "「괜찮다니까! 달링도 알다시피 나 이래 봬도 전생에선 마마였다구? 나한테 맡겨두라니까☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ねーねー、エッチなこと早く教えて～！\u3000ボク、ウッキウキで待ちきれないよ～♪」"
translation = "「언니, 야한 거 빨리 가르쳐줘~! 나 우끼우끼해서 못 기다리겠어~♪」"

[[dialogue]]
speaker = "unk"
original = "それから、授業が進み――クーシェンはショックを受けたように頭を抱えていた。"
translation = "그 뒤 수업이 진행되고── 쿠셴은 충격을 받은 듯 머리를 감싸 쥐고 있었다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そんな……まさか――」"
translation = "「설마…… 이럴 수가──」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「おっぱいを触るよりもエッチなことが、この世に存在するだなんて……！」"
translation = "「가슴을 만지는 것보다 야한 게 이 세상에 존재한다니……!」"

[[dialogue]]
speaker = "unk"
original = "（奇跡レベルの無知！）"
translation = "(기적 레벨의 무지!)"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「でも……<b>ソレ</b>をすることで、『大人ゲージ』が大きく貯まるんだね！？」"
translation = "「그치만…… <b>그거</b>를 하면, 『어른 게이지』가 잔뜩 쌓이는 거지!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「その通りっしょ！\u3000<b>ソレ</b>は妊娠する為に必要な儀式でもある。ただ――」"
translation = "「당연하지! <b>그거</b>는 임신하기 위해 필요한 의식이기도 해. 다만――」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「したいからすればいいってわけじゃないんだ、クーちん。そういうのは、やっぱり心から好きになったヒトとするべきっしょ」"
translation = "「하고 싶다고 막 해도 되는 건 아니야, 쿠 칭. 그런 건 역시 진심으로 좋아하게 된 사람이랑 해야 하는 법이지」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「実を言うと、アタシも転生してから１度もしたことがないんだぞ☆」"
translation = "「사실대로 말하면, 나도 전생하고 나서 한 번도 해본 적 없다구☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え？\u3000でもそれじゃあ、ねーねーはどうやって大人に……？」"
translation = "「에? 그치만 그러면 언니는 어떻게 어른이……?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふっ……クーちんよ。よくぞ矛盾に気づいた。今こそ、エッチの真実について語ろう――」"
translation = "「훗…… 쿠 칭이여. 모순을 잘도 알아챘구나. 지금이야말로 섹스의 진실에 대해 이야기해주마――」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「エッチの真実……！？」"
translation = "「섹스의 진실……!?」"

[[dialogue]]
speaker = "unk"
original = "（存在しないと明かす時が！！）"
translation = "(존재하지 않는다고 밝힐 때가!!)"

[[dialogue]]
speaker = "unk"
original = "（ついに例の謎ゲージが……）"
translation = "(드디어 그 정체불명의 게이지가……)"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「クーちん……この世界にはもう１つ――『おっぱいゲージ』というのが存在しているんだ！」"
translation = "「쿠 칭…… 이 세계에는 또 하나―― 『가슴 게이지』라는 게 존재하고 있어!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「おっぱいゲージ！？！？」"
translation = "「가슴 게이지!?!?」"

[[dialogue]]
speaker = "unk"
original = "待て待て待てぇーいっ！！！"
translation = "잠깐 잠깐 잠깐마아아안!!!"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「どういうこと！？\u3000進化する為の『大人ゲージ』と、妊娠する為の『好きゲージ』以外に、３つ目のゲージが存在していたの！？」"
translation = "「어떻게 된 거야!? 진화하기 위한 『어른 게이지』랑, 임신하기 위한 『사랑 게이지』 말고도 세 번째 게이지가 존재하고 있었던 거야!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今まで隠していたけど……クーちん、アタシは実はまだ大人じゃないんだ。アタシの胸が大きいのは――そのおっぱいゲージの影響なんだよ！」"
translation = "「지금까지 숨겨왔지만…… 쿠 칭, 나 사실 아직 어른이 아니야. 내 가슴이 큰 건―― 그 가슴 게이지의 영향이라구!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「なっ……なんだってーーーっ！？」"
translation = "「뭐…… 뭐라고오오오!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「つまり、おっぱいゲージが貯まると……おっぱいが大きくなる、ってコト！？」"
translation = "「즉, 가슴 게이지가 쌓이면…… 가슴이 커진다는 소리!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「その通り！\u3000そして、個人的にはまず、大人ゲージよりも先におっぱいゲージから貯めるのがオススメだ！\u3000何故ならおっぱいは大きい方が……カッコいいっしょ？」"
translation = "「정답! 그리고 개인적으로는 우선 어른 게이지보다 가슴 게이지부터 쌓는 걸 추천해! 왜냐하면 가슴은 큰 쪽이…… 멋있잖아?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「た、確かに……！\u3000大きなおっぱい、カッコいいからボクも欲しい……！」"
translation = "「확, 확실히……! 큰 가슴, 멋있으니까 나도 갖고 싶어……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ならクーちん、話は早いぜ！\u3000牛家は代々、おっぱいゲージを貯める技術を高めてきた一族だ」"
translation = "「그럼 쿠 칭, 이야기가 빠르겠네! 우가는 대대로 가슴 게이지를 쌓는 기술을 연마해 온 일족이야」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「だから、アタシと一緒にエッチな勉強をすれば、クーちんもおっぱいが大きくなること間違いなしだぜ！」"
translation = "「그러니까 나랑 같이 야한 공부를 하면, 쿠 칭도 가슴이 커질 게 틀림없다구!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うんっ、わかった！\u3000ボク、まずはおっぱいゲージから貯めることにするよ！\u3000だからもっと色々と教えて、ねーねー！」"
translation = "「응, 알았어! 나, 우선 가슴 게이지부터 쌓기로 할래! 그러니까 더 이것저것 가르쳐줘, 언니!」"

[[dialogue]]
speaker = "unk"
original = "そこでふと、紅明が俺にウインクをする。"
translation = "거기서 문득 코우메이가 나에게 윙크를 한다."

[[dialogue]]
speaker = "unk"
original = "それで彼女がクーシェンの勘違いをすぐ全否定するのではなく、徐々に正しい知識を教えて行くことにしたのだと、俺はなんとなく察した。"
translation = "그녀가 쿠셴의 착각을 즉각 부정하는 게 아니라, 서서히 올바른 지식을 가르쳐 주기로 했다는 것을 나는 어렴풋이 눈치챘다."

[[dialogue]]
speaker = "unk"
original = "さすがは人生２周目といったところか――と感心していると、クーシェンが口を開く。"
translation = "과연 인생 2회차답군―― 이라며 감탄하고 있자, 쿠셴이 입을 연다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あれ……？\u3000でも思ったんだけど、３本目のゲージがあるってことは……それって男のヒトの場合だと、どうなるんだろう？」"
translation = "「어라……? 근데 생각해보니까, 세 번째 게이지가 있다는 건…… 그게 남자 사람의 경우에는 어떻게 되는 걸까?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「はっ！？\u3000もしかして――」"
translation = "「핫!? 설마――」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「『■■■■■ゲージ』！？\u3000■■■■■ゲージってコト！？」"
translation = "「『■■■■■ 게이지』!? ■■■■■ 게이지라는 소리야!?」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000ストップストォーップ！！！"
translation = "잠깐!? 스톱 스토오오옵!!!"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「？\u3000にーにー、なに慌ててるの？\u3000――はしたないから、■■■■■連呼はダメ？」"
translation = "「? 오빠, 왜 그렇게 당황해? ――천박하니까 ■■■■■ 연호는 안 돼?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ！\u3000さてはにーにー、■■■■■の話題が恥ずかしいんだ～？」"
translation = "「앗! 설마 오빠, ■■■■■ 화제가 부끄러운 거야~?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「もう、にーにーってば、■■■■■くらいで慌てちゃって～！\u3000ほんと、エッチな話題では雑魚ザコなんだから～♪\u3000ウキキ♪」"
translation = "「정말, 오빠도 참, ■■■■■ 정도로 당황하기는~! 정말, 야한 화제에는 허접이라니까~♪ 우키키♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「仕方ないから、■■■■■ゲージを貯める時はボクが協力してあげるね♪」"
translation = "「어쩔 수 없으니까 ■■■■■ 게이지를 쌓을 때는 내가 협력해 줄게♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ぷっ、ふふっ……ふふふっ！\u3000あはははははっ！！\u3000お、■■■■■ゲージ……あはははははははっ！！！」"
translation = "「푸흡, 후후…… 후후후! 아하하하하하! 어, ■■■■■ 게이지…… 아하하하하하하하!!!」"

[[dialogue]]
speaker = "unk"
original = "無邪気に連呼するクーシェンの横で、もう堪えきれないとばかりに腹を抱えて爆笑する紅明なのであった――"
translation = "천진난만하게 연호하는 쿠셴 옆에서, 더는 못 참겠다는 듯 배를 움켜쥐고 폭소하는 코우메이였다――"

