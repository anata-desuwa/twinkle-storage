[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「せっかくお休み取って海に来たのに……わざわざ水着にまで着替えたのに……」"
translation = "「기껏 휴가 내서 바다에 왔는데…… 일부러 수영복으로까지 갈아입었는데……」"

[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イ～～～～～ッ」"
translation = "「이~~~~~잇」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「うぅ、どうしてよりにもよってモンスターなんか寄ってくるのよ～！\u3000不運だわ～！」"
translation = "「으으, 왜 하필이면 몬스터 같은 게 꼬이는 거냐구~! 불운해~!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わわっ、すごいですぅ。いつもと違う力ですのに、一撃でモンスターを蹴散らしてしまいましたっ」"
translation = "「와왓, 대단해욧. 평소와 다른 힘인데도, 일격에 몬스터를 쫓아버렸어욧」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ウィステリアさんは使いこなしていらっしゃるのですね。普段と異なる自身のお力を……」"
translation = "「위스테리아 씨는 마스터하고 계신 거군요어. 평소와 다른 자신의 힘을……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもでも、これはチャンスですよぉ！\u3000有識者の登場なのですっ！」"
translation = "「하지만 하지만, 이건 찬스예욧! 유식자의 등장인 것이에욧!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら……あなたたち。こんなところで奇遇ね？」"
translation = "「어라…… 너희들. 이런 곳에서 기연이네?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「珍しく幸運かも。海に来たのはいいものの、１人じゃ心細くって──」"
translation = "「드물게 행운일지도. 바다에 온 건 좋았는데, 혼자서는 마음이 불안해서──」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ウィステリアさんっ！」"
translation = "「위스테리아 씨!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひゃっ？\u3000な、なに？\u3000そんな前のめりになって」"
translation = "「히익? 뭐야, 뭐야? 그렇게 앞서 나와서는」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「どうか私たちに星力制御のコツを教えていただけませんかっ？」"
translation = "「부디 저희에게 성력 제어의 요령을 가르쳐 주실 수 없을까요어?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私、バカンスに来たんだけど……」"
translation = "「나, 바캉스 온 건데……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「なるほど、話は聞かせてもらったわ。人工戦闘服なんてヘレナさんも面白い試みをしたものね」"
translation = "「과연, 이야기는 들었어. 인공 전투복이라니 헬레나 씨도 재미있는 시도를 했네」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ウィステリアさんの水着も戦闘服を改良したものですよね～？\u3000それはどうやって手に入れたんですか？」"
translation = "「위스테리아 씨의 수영복도 전투복을 개량한 거죠어~? 그건 어떻게 손에 넣은 거예욧?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私はさっき自分で改造したの。こう戦闘服にググっと星力を込めて編み直して」"
translation = "「난 아까 직접 개조했어. 이렇게 전투복에 꾹 성력을 담아서 다시 짜서」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「独力で戦闘服を変化させるとは……。私たちは人工戦闘服の力を借りてやっとでしたのに……」"
translation = "「독자적인 힘으로 전투복을 변화시키다니……. 저희는 인공 전투복의 힘을 빌려서 겨우였는데욧……」"

[[dialogue]]
speaker = "unk"
original = "しかしこれまた際どい……"
translation = "그나저나 이것 참 아슬아슬하네……"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ち、違うのっ。ここまでするつもりはなかったのっ。いざ戦闘服を変化させる時に、たまたま近くで２回も雷が落ちてっ、動揺しちゃってっ」"
translation = "「아, 아니야. 여기까지 할 생각은 없었어. 막 전투복을 변화시키려 할 때, 마침 근처에서 두 번이나 벼락이 떨어져서, 당황하는 바람에」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「気がついたらこんな大胆な水着に。うう、せっかく休暇をとって海までやってきたのに……」"
translation = "「정신 차려보니 이런 대담한 수영복이. 으으, 기껏 휴가 내서 바다까지 왔는데……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「う。その落雷ってまさか」"
translation = "「우. 그 낙뢰란 건 설마」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ご、ご迷惑をおかけしました」"
translation = "「미, 민폐를 끼쳤습니다아」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「え？\u3000よくわからないけどいいのよ。そもそも海に来てから戦闘服を調整した私が悪いから」"
translation = "「에? 잘 모르겠지만 괜찮아. 애초에 바다에 와서 전투복을 조정했던 내 잘못이니까」"

[[dialogue]]
speaker = "unk"
original = "魔導書の呪いは健在みたいですね"
translation = "마도서의 저주는 건재한 모양이네요."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そうなのよ……。こればっかりはどれだけ戦闘服を変化させても変わらなくて……」"
translation = "「그러게 말이야……. 이것만큼은 아무리 전투복을 변화시켜도 변하지 않아서……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いえ、私のことはいいわ。それより、星力制御のコツを教えて欲しい。という話だったかしら？」"
translation = "「아니, 내 이야기는 됐어. 그보다, 성력 제어의 요령을 가르쳐 달라는 이야기였지?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい。どーにも新しい力が上手く使いこなせないんですぅ」"
translation = "「네에. 도무지 새로운 힘이 잘 다뤄지지 않아욧」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「色々と特訓はしてみたつもりなんですが……」"
translation = "「나름대로 여러 가지 특훈은 해봤습니다만아……」"

[[dialogue]]
speaker = "unk"
original = "俺も力足らずで……"
translation = "나도 힘이 부족해서……"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そこまで落ち込む必要はないわ。新しい力をすぐに使いこなせる人の方が稀だもの」"
translation = "「그렇게 낙담할 필요 없어. 새로운 힘을 금방 다루는 사람이 오히려 드문걸」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「かく言う私もこの戦闘服にまだ慣れてないしね。十全に力を引き出せてるとは言えないわ」"
translation = "「나만 해도 이 전투복에 아직 익숙하지 않으니까. 힘을 완전히 끌어내고 있다고는 할 수 없어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえー……。なのにモンスターを一撃で……」"
translation = "「호에─…… 그런데도 몬스터를 일격에……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「す、凄まじい実力ですね……」"
translation = "「어, 엄청난 실력이네요어……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ううん。さっきのモンスターもすんでのところで取り逃がしちゃったもの。しばらくは動けない程度にダメージを与えられたとは思うけど」"
translation = "「아니야. 아까 그 몬스터도 간발의 차로 놓쳐버렸는걸. 당분간은 움직이지 못할 정도로 데미지는 줬다고 생각하지만」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「どうすれば力を引き出せるようになるのでしょう。ヘレナさんからは、何かきっかけを掴めば、とアドバイスをいただいてるのですが」"
translation = "「어떻게 하면 힘을 끌어낼 수 있게 될까요어. 헬레나 씨에게서는 무언가 계기를 잡으면, 이라고 조언을 받았습니다만아」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「間違ってはないわね。なんて言うか……自分の中で回路が繋がる感覚かしら」"
translation = "「틀린 말은 아니네. 뭐라고 해야 하나…… 내 안에서 회로가 연결되는 감각이랄까」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「それって何をしたらいいんですかね～？\u3000やっぱり苦手なことを克服するのが一番なんでしょうか？」"
translation = "「그건 무엇을 하면 되는 걸까욧~? 역시 서툰 걸 극복하는 게 제일인 걸까욧?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「やり方は色々あるけど──そうね。せっかく海へ来ているのだから」"
translation = "「방법은 여러 가지가 있지만── 그래. 모처럼 바다에 왔으니까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひとまず細かいことは忘れて、遊んじゃいましょ♪」"
translation = "「일단 자질구레한 건 잊고, 놀아버리자♪」"

