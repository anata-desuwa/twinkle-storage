[[dialogue]]
speaker = "unk"
original = "新たなフォームに変身したイクシリオンは、驚くトワに事情を説明する。"
translation = "새로운 폼으로 변신한 익실리온은 놀란 토와에게 사정을 설명한다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「――昨晩、寮のキッチンでチョコ作りをしていたところ、突然このバレンタインフォームに変身してしまったんです……」"
translation = "「――어젯밤, 기숙사 주방에서 초콜릿을 만들고 있었는데 갑자기 이 발렌타인 폼으로 변신해버렸어요……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「喜ばしい覚醒ではあるのですが、問題は――変身すると必ずこのフォームになってしまう、という点でして……」"
translation = "「기쁜 각성이긴 하지만 문제는―― 변신하면 반드시 이 폼이 되어버린다는 점이라서요……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「！\u3000それって、他のフォームに変身できなくなっちゃった、ってこと……？」"
translation = "「! 그건 다른 폼으로 변신할 수 없게 됐다는 뜻이야……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。トワ先生も以前、同じような状況になったことがあるとお聞きしたことがあって……」"
translation = "「네. 토와 선생님도 예전에 비슷한 상황이 된 적이 있다고 들은 적이 있어서……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「なるほど。それで私に相談しに来たんだね」"
translation = "「그렇구나. 그래서 나한테 상담하러 온 거네.」"

[[dialogue]]
speaker = "unk"
original = "かつてトワは、ジューンブライドの時期に突然『ウェディングフォーム』へ変身してしまうという経験をしたことがあった。"
translation = "과거에 토와는 6월의 신부 시기에 갑자기 『웨딩 폼』으로 변신해버리는 경험을 한 적이 있었다."

[[dialogue]]
speaker = "unk"
original = "その時は、変身するとフォームが強制固定され、通常の戦闘服やノヴァフォームに戻れなくなってしまったのだ。"
translation = "그때는 변신하면 폼이 강제로 고정되어 통상 전투복이나 노바 폼으로 돌아갈 수 없게 되었던 것이다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ちなみに、イクシリオンちゃんがバレンタインチョコを渡そうと思っている相手って……？」"
translation = "「참고로 익실리온 양이 발렌타인 초콜릿을 주려고 생각하는 상대는……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え！？\u3000そ、それはそのぉ……<emoji=heart04>」"
translation = "「엣!? 그, 그건 그게에……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンは顔を赤くして、もじもじと答える。"
translation = "익실리온은 얼굴을 붉히며 머뭇머뭇 대답한다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「お、お世話になっている、緋宮会長に……お渡ししたいと……<emoji=heart04>」"
translation = "「시, 신세 지고 있는 히노미야 회장님께…… 드리고 싶어서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あ～、やっぱり会長くんかぁ……。だとすると――」"
translation = "「아～ 역시 회장군이구나……. 그렇다면――」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私の経験を踏まえると、会長くんにチョコを渡せば、バレンタインフォームの固定も解除できるかもしれないね」"
translation = "「내 경험에 비춰보면 회장군에게 초콜릿을 주면 발렌타인 폼 고정도 해제될지도 몰라.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（恥ずかしいけど……私も、会長くんと疑似的な結婚式をしたことで、ウェディングフォームを解除できたから……）"
translation = "(부끄럽지만…… 나도 회장군과 유사 결혼식을 올린 덕분에 웨딩 폼을 해제할 수 있었으니까……)"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「チョコを渡す……うぅ、ますます困りました……」"
translation = "「초콜릿을 준다…… 으으, 더욱 곤란해졌어요……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あれ？\u3000でも、会長くんに渡すんだよね？」"
translation = "「어라? 하지만 회장군에게 줄 거잖아?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい……ですが、肝心のチョコ作りに大問題がありまして……。昨晩、バレンタインフォームに覚醒した後、落ち着いてから作ろうとしたんですが――」"
translation = "「네…… 하지만 정작 초콜릿 만들기에 큰 문제가 있어서요……. 어젯밤 발렌타인 폼으로 각성한 뒤에 진정하고 만들려고 했는데――」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「途中でまた勝手にバレンタインフォームに変身して、『妄想トリップ』してしまうようになったんです」"
translation = "「도중에 또 마음대로 발렌타인 폼으로 변신해서 『망상 트립』을 해버리게 됐어요.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「も、妄想トリップ……？」"
translation = "「망, 망상 트립……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。お恥ずかしながら、私……昔から少し妄想癖がありまして……」"
translation = "「네. 부끄럽지만 저…… 옛날부터 조금 망상벽이 있어서요……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そのせいか、バレンタインフォームだとその妄想癖が強くなってしまって、チョコ作りが全然うまくいかなくて……」"
translation = "「그 탓인지 발렌타인 폼이면 그 망상벽이 강해져 버려서 초콜릿 만들기가 전혀 잘 안 돼서……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ちなみに、変身解除は試したの？」"
translation = "「참고로 변신 해제는 시도해 봤어?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「もちろんです。ですが、作り始めるとすぐにまたバレンタインフォームに強制変身してしまって……」"
translation = "「물론이죠. 하지만 만들기 시작하면 곧바로 다시 발렌타인 폼으로 강제 변신해버려서……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「なるほど、そのまま妄想トリップに突入しちゃうループってわけだね……」"
translation = "「그렇구나, 그대로 망상 트립에 돌입해버리는 루프라는 거네……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。ですので、どうやってチョコを作ったものかと……」"
translation = "「네. 그래서 어떻게 초콜릿을 만들어야 할지……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わかった――そういうことなら、先生が手伝うよ！」"
translation = "「알았어―― 그렇다면 선생님이 도와줄게!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「えっ、先生が私のチョコ作りを……！？\u3000よろしいんですか……？」"
translation = "「엣, 선생님이 제 초콜릿 만들기를……!? 괜찮으신가요……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん！\u3000困っている生徒を放っておけないからね。先生の仕事は導くこと！\u3000だから、任せて♪」"
translation = "「응! 곤란해하는 학생을 내버려 둘 수 없으니까. 선생님의 일은 인도하는 것! 그러니까 맡겨주렴♪」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「トワ先生……！\u3000ありがとうございます！」"
translation = "「토와 선생님……! 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "こうして、イクシリオンはトワの協力を得て、一緒にバレンタインチョコ作りをすることになるのだった。"
translation = "이렇게 해서 익실리온은 토와의 협력을 얻어 함께 발렌타인 초콜릿 만들기를 하게 되는 것이었다."

