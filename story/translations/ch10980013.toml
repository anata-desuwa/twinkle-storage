[[dialogue]]
speaker = "unk"
original = "第３話,熱量高めのアキバデート,P"
translation = "제3화, 열기 넘치는 아키바 데이트"

[[dialogue]]
speaker = "unk"
original = "週末。俺はヒマワリとともに秋葉原に来ていた。"
translation = "주말. 나는 히마와리와 함께 아키바하라에 와 있었다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さん、お買い物に付き合ってくれて、ありがとうございます」"
translation = "「회장님, 쇼핑에 동행해주셔서 감사합니다.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「アキバ店限定プラモデル、１人１個限定なんで助かりますよー」"
translation = "「아키바 점 한정 프라모델, 1인당 1개 한정이라 도움이 되네요─」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あ、ちなみにミウは他に用事がありまして。それにいくら親友でも、いつもいつもあたしのわがままに振り回すわけにもいかないですからねー」"
translation = "「아, 참고로 미우는 다른 볼일이 있어서요. 게다가 아무리 절친이라도 맨날 제 고집에 휘두를 수는 없으니까요─」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「むしろ会長さんを振り回しちゃって、ごめんなさいなんですけど……大丈夫でした？」"
translation = "「오히려 회장님을 휘둘러버려서 죄송한 마음이지만…… 괜찮으셨나요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん。ところで何買うの？"
translation = "물론이지. 그런데 뭘 사는 거야?"

[[dialogue]]
speaker = "ヒマワリ"
original = "「店舗限定のスペシャルカラーのプラモなんですけど……会長さんは知ってます？\u3000今期の超激アツロボアニメ！」"
translation = "「매장 한정 스페셜 컬러 프라모델인데요…… 회장님은 알고 계세요? 이번 분기 초격뿜 로보 애니메이션!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「観た方が良いですよ！\u3000絶・対！\u3000めちゃ面白いですから！\u3000まだ４話目なんで全然追いつけますし！」"
translation = "「보시는 게 좋아요! 절·대! 진짜 재밌으니까요! 아직 4화째니까 충분히 따라잡을 수 있고!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「やー、事前情報がまったくなかったんで伏兵でしたよー。まさか、あんなアチアチアニメだなんて……主題歌もあたし的にもテンション爆上がりで！」"
translation = "「야─ 사전 정보가 전혀 없어서 복병이었어요. 설마 그런 뜨거운 애니였을 줄이야…… 주제가도 저로서는 텐션 대폭발이라서!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ロボアニメのテンプレを逆手に取ったメタネタも『うわーやられたーそうきたかー！』って……しまった、これネタバレになっちゃう！？」"
translation = "「로보 애니의 클리셰를 역으로 이용한 메타 발언도 『우와 당했다─ 그렇게 나오기냐─!』 싶어서…… 아차, 이거 스포일러가 되려나!?」"

[[dialogue]]
speaker = "unk"
original = "そんなに面白いんだ"
translation = "그렇게 재밌구나."

[[dialogue]]
speaker = "ヒマワリ"
original = "「もう最っ高！\u3000最＆高！\u3000最ｏｆ高ですね！」"
translation = "「그냥 최고! 최&고! 최 of 최고예요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「サブスク視聴も当然なんですけど、円盤の初回版は設定資料集に限定プラモまでついてくるっていうし！\u3000マストバイですね！\u3000むふー！」"
translation = "「OTT 시청도 당연하지만, 블루레이 초회판은 설정 자료집에 한정 프라모델까지 들어있다니깐요! 머스트 바이네요! 므흐!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「って、喋りすぎた！\u3000ごめんなさい、喋り始めると止まんなくなっちゃって……あはは、女の子が激アツロボアニメにハマるとか、おかしいですよねー」"
translation = "「앗, 너무 떠들었다! 죄송해요, 말하기 시작하면 멈추질 않아서…… 아하하, 여자가 열혈 로보 애니에 빠지다니 이상하죠─」"

[[dialogue]]
speaker = "unk"
original = "女の子でも男の子でも、面白いものは面白い！"
translation = "여자든 남자든 재미있는 건 재미있는 거지!"

[[dialogue]]
speaker = "ヒマワリ"
original = "「……！\u3000ありがとうございます、会長さんっ！」"
translation = "「……! 감사합니다, 회장님!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あっ、あそこのお店です。結構並んでるけど、買えるかなー。買えるといいなー♪」"
translation = "「앗, 저 가게예요. 꽤 줄 서 있는데 살 수 있으려나. 살 수 있으면 좋겠다♪」"

[[dialogue]]
speaker = "unk"
original = "目的のプラモを買った後もヒマワリの物欲は止まらなかった。"
translation = "목표한 프라모델을 산 후에도 히마와리의 물욕은 멈추지 않았다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「うわ、こんなマイナー機も出てたんだー！\u3000量産型は数揃えてなんぼですよね！\u3000原作準拠で５個くらいでいいかなー」"
translation = "「우와, 이런 마이너 기체도 나왔었네! 양산형은 물량으로 승부하는 거잖아요! 원작 고증대로 5개 정도면 되려나─」"

[[dialogue]]
speaker = "unk"
original = "買うねぇ！？"
translation = "엄청나게 사는구나!?"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はい！\u3000お金は趣味活に使うためにあるんで！」"
translation = "「네! 돈은 취미 생활에 쓰기 위해 있는 거니까요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さんは欲しいのないですか？\u3000借りがいくつもありますから、良かったらプレゼントしますよー。遠慮なんてしないでくださいね？」"
translation = "「회장님은 갖고 싶은 거 없으세요? 신세 진 게 많으니까 괜찮으시면 선물할게요─ 사양하지 마세요, 아시겠죠?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「おお、エース仕様機ですね、さすがいいセンスしてます！\u3000量産機よりちょっとだけ強いカスタム機ってくすぐられますよねー！」"
translation = "「오오, 에이스 전용 기체군요, 역시 센스 좋으세요! 양산기보다 조금 더 강한 커스텀기라는 게 마음을 자극하죠!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いくつにします？\u3000一個小隊でいいですか？」"
translation = "「몇 개로 하실래요? 1개 소대 정도로 드릴까요?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんなに作れない？\u3000じゃ、１個だけにしておきましょうか。買ってきまーす」"
translation = "「그렇게 많이는 못 만든다고요? 그럼 1개만 사기로 하죠. 사 올게요─」"

[[dialogue]]
speaker = "unk"
original = "楽しそうにプラモの箱をいくつも抱えてレジに向かうヒマワリ。"
translation = "즐거운 듯 프라모델 박스를 여러 개 안고 계산대로 향하는 히마와리."

[[dialogue]]
speaker = "unk"
original = "待つことしばらく──"
translation = "잠시 기다리자──"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はい、会長さん。ささやかですけどあたしの気持ち、もらってください♪」"
translation = "「자, 회장님. 약소하지만 제 마음이에요, 받아주세요♪」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。大切に作るよ"
translation = "고마워. 소중히 만들게."

[[dialogue]]
speaker = "ヒマワリ"
original = "「どうしたしまして！\u3000プラモの楽しさを味わってください！」"
translation = "「천만에요! 프라모델의 즐거움을 맛보세요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「でも、これくらいであたしが借りを返したとか思わないでくださいね。命を助けられた恩は、こんなもんじゃないですから！」"
translation = "「하지만 이 정도로 제가 빚을 다 갚았다고 생각하지 마세요. 목숨을 구해주신 은혜는 이 정도가 아니니까요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「この前の会長さん、とってもカッコよかったです。窮地を救ってくれた会長さんは、あたしにとってのスーパ―ヒーローでした」"
translation = "「저번의 회장님, 정말 멋있었어요. 위기에서 구해준 회장님은 저에게 있어서 슈퍼 히어로였거든요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんなスーパーヒーローをアキバショッピングに連れ回すなって感じですけどね、あはは」"
translation = "「그런 슈퍼 히어로를 아키바 쇼핑에나 끌고 다니다니 참 그렇지만요, 아하하.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んー……スーパーヒーロー……スーパーヒーローかぁ……会長さん、まだ時間あります？」"
translation = "「음─…… 슈퍼 히어로…… 슈퍼 히어로라…… 회장님, 아직 시간 되세요?」"

[[dialogue]]
speaker = "unk"
original = "今日１日、空いてるよ"
translation = "오늘 하루 종일 비어 있어."

[[dialogue]]
speaker = "ヒマワリ"
original = "「なら、カラオケ行きましょ！\u3000あたしのヒーローソング熱唱、聞かせてあげますよ！\u3000会長さんの歌も聞きたいです！」"
translation = "「그럼 노래방 가요! 제 히어로 송 열창을 들려드릴게요! 회장님 노래도 듣고 싶어요!」"

[[dialogue]]
speaker = "unk"
original = "望むところだ！"
translation = "바라던 바야!"

[[dialogue]]
speaker = "unk"
original = "この後、カラオケに行った俺とヒマワリは激アツソング５０連発を、喉がガラガラになるまで歌い続けたのだった。"
translation = "이후 노래방에 간 히마와리와 나는 뜨거운 노래 50연발을 목이 쉴 때까지 계속 불렀다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「ねー、良かったでしょー！？\u3000ライバルキャラが仲間になるのは鉄板ですよねー！」"
translation = "「그쵸, 좋았죠!? 라이벌 캐릭터가 동료가 되는 건 국룰이라니까요!」"

[[dialogue]]
speaker = "unk"
original = "そして、ヒマワリオススメの激アツロボアニメは最終回までドハマリし、再び熱いロボ談義を交わすことになったのである。"
translation = "그리고 히마와리가 추천한 로보 애니에 마지막 회까지 푹 빠져버려, 다시금 뜨거운 로봇 담론을 나누게 된 것이었다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さん、またアキバデートしましょうね♪」"
translation = "「회장님, 다음에 또 아키바 데이트해요♪」"

