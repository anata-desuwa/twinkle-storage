[[dialogue]]
speaker = "unk"
original = "第４話,緋宮家でのお茶会,P"
translation = "제4화, 히노미야 가문에서의 다도회, P"

[[dialogue]]
speaker = "unk"
original = "ケイティさんが人間界にやってきてからしばらくが経つ。"
translation = "케이티 씨가 인간계에 온 지도 꽤 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "俺とケイティさんは休日に約束をして、頻繁に会って遊ぶような仲になっていた。"
translation = "나와 케이티 씨는 휴일에 약속을 잡고 빈번하게 만나 노는 사이가 되어 있었다."

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ここが魔王さんのお家なのですね～。お邪魔します～」"
translation = "「여기가 마왕님의 집이군요~. 실례하겠습니다~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ふふふ、楽しみです。魔王さんからお茶会に誘われるなんて思っていませんでしたから」"
translation = "「후후후, 기대돼요. 마왕님께 다도회 초대를 받을 줄은 몰랐으니까요.」"

[[dialogue]]
speaker = "unk"
original = "ケイティさんに楽しんで欲しいです"
translation = "케이티 씨가 즐거워했으면 좋겠어요"

[[dialogue]]
speaker = "unk"
original = "お茶会というほどのものではありませんけど"
translation = "다도회라고 할 정도의 것은 아니지만"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ありがとうございます♪」"
translation = "「감사합니다♪」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「まあまあ、お菓子もたくさん用意していただいたのですね～？」"
translation = "「어머어머, 과자도 많이 준비해 주셨네요?」"

[[dialogue]]
speaker = "unk"
original = "紅茶を淹れますよ"
translation = "홍차를 내올게요"

[[dialogue]]
speaker = "unk"
original = "どうぞ、座ってください"
translation = "어서 앉으세요"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ではお願いします～」"
translation = "「그럼 부탁드릴게요~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「いい香り……こちらはアールグレイですね？\u3000味も深みがあって……美味しいです～」"
translation = "「좋은 향기…… 이건 얼그레이군요? 맛도 깊이가 있고…… 맛있어요~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「お菓子の方もいただいていいのですか？\u3000では、いただきます……」"
translation = "「과자도 먹어도 될까요? 그럼, 잘 먹겠습니다……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「んんっ……！\u3000こちらのマドレーヌ、とっても美味しいです～。初めて食べる味かもしれません」"
translation = "「음……! 이 마들렌, 정말 맛있어요~. 처음 먹어보는 맛일지도 모르겠네요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「一体どこのお店のマドレーヌでしょう？\u3000ぜひ教えてくれませんか？」"
translation = "「도대체 어느 가게의 마들렌인가요? 부디 가르쳐 주시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "これは俺が作りました"
translation = "이건 제가 만들었어요"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「魔王さんが？\u3000なんて素晴らしい……こんな美味しくて紅茶にあうお菓子を作れるなんて……」"
translation = "「마왕님이요? 어머나 세상에…… 이렇게 맛있고 홍차에 어울리는 과자를 만들 수 있다니……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「んっ……こちらのきなこクッキーも美味しいです～♪」"
translation = "「음…… 이 인절미 쿠키도 맛있어요~♪」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「まあ、こちらは星徒会メンバーのマトイさんという方が作られたのですね～？」"
translation = "「어머, 이건 성도회 멤버인 마토이 씨라는 분이 만드신 거군요~?」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「スイーツと言えば有名な桜十路サランさんも学園にいらっしゃいますし……」"
translation = "「디저트 하면 유명한 사쿠라코지 사란 씨도 학원에 계시고……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「こんな美味しいお菓子に囲まれていたら、毎日でもお茶会を開きたくなってしまいませんか？」"
translation = "「이렇게 맛있는 과자에 둘러싸여 있으면 매일이라도 다도회를 열고 싶어지지 않겠어요?」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ふふ、困ってしまいますね～。こんなに人間界の素敵なところを見せられてしまうと、天界に帰りづらくなってしまいます……」"
translation = "「후후, 곤란하네요~. 이렇게 인간계의 멋진 점을 보여주시면 천계로 돌아가기 싫어지는데……」"

[[dialogue]]
speaker = "unk"
original = "聖庭園のお茶会に招待してください"
translation = "성정원 다도회에 초대해 주세요"

[[dialogue]]
speaker = "unk"
original = "今度は俺が天界に行きますよ"
translation = "이번에는 제가 천계로 갈게요"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「そうですね。ぜひお招きさせていただきます♪」"
translation = "「그렇네요. 부디 초대하도록 하겠습니다♪」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「その時はメルエルちゃんや、ナターシャちゃんとも一緒にできるといいですね～……」"
translation = "「그때는 메르엘 짱이나 나타샤 짱과도 함께할 수 있으면 좋겠네요~……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「私がどうして聖庭園の衛兵になったのか──ですか？」"
translation = "「제가 어째서 성정원의 위병이 되었느냐── 말인가요?」"

[[dialogue]]
speaker = "unk"
original = "ケイティさんはお嬢様なのでしょう？"
translation = "케이티 씨는 아가씨이신 거죠?"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「そうですね……お嬢様かどうかは分かりませんが、私はお父さまやお母さまからいっぱいの愛情をいただいて育ちました」"
translation = "「글쎄요…… 아가씨인지는 모르겠지만, 저는 아버님과 어머님으로부터 듬뿍 사랑을 받으며 자랐답니다.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「そんな敬愛するお父さまとお母さまから教わったのが『平和の尊さ』についてです」"
translation = "「그런 경애하는 아버님과 어머님으로부터 배운 것이 『평화의 존엄함』에 대해서예요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「平和がどれだけ素晴らしいものであるか、かけがえの無いものであるか……私は幼いころよりずっと学んできました」"
translation = "「평화가 얼마나 멋진 것인지, 무엇과도 바꿀 수 없는 것인지…… 저는 어릴 적부터 줄곧 배워왔답니다.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「だから『聖庭園の平和を守るためのお仕事がある』と聞いた時、私は私の進むべき道がはっきりと見えたように思ったのです」"
translation = "「그래서 『성정원의 평화를 지키기 위한 일이 있다』고 들었을 때, 저는 제가 나아가야 할 길이 또렷하게 보이는 것 같았어요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「私の決意を聞き、お父さまもお母さまも最初は驚き心配していましたが、最後は２人とも応援してくれました」"
translation = "「저의 결의를 듣고 아버님과 어머님도 처음에는 놀라고 걱정하셨지만, 결국 두 분 다 응원해 주셨답니다.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「幸い、私には星騎士としての資質があったようで、隊長という名誉な地位を与えてもらっています」"
translation = "「다행히 저에게는 성기사로서의 자질이 있었던 모양이라, 대장이라는 영예로운 지위를 부여받았죠.」"

[[dialogue]]
speaker = "unk"
original = "全ては平和のためなんですね"
translation = "모든 것은 평화를 위해서군요"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「はい♪」"
translation = "「네♪」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「みんなが幸せになるためには、世界が平和であらねばなりません」"
translation = "「모두가 행복해지기 위해서는 세계가 평화로워야만 해요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「私はそのために戦いたいです」"
translation = "「저는 그러기 위해 싸우고 싶습니다.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「でも、矛盾していることもわかっています……私も本当は戦いたくはありませんから」"
translation = "「하지만 모순되어 있다는 것도 알고 있어요…… 저도 사실은 싸우고 싶지 않으니까요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「争いは何も生みません。みんなが仲良くして、傷つけ合うことなく平和に過ごせればそれが一番だと思っています」"
translation = "「다툼은 아무것도 낳지 않아요. 모두가 사이좋게 지내며 서로 상처 입히는 일 없이 평화롭게 지낼 수 있다면 그것이 최고라고 생각해요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「けれど、現実はそうはいきません……戦いの場でそれを知るたびに、悲しい気持ちになってしまうんです」"
translation = "「하지만 현실은 그렇지 못하죠…… 전장에서 그것을 깨달을 때마다 슬픈 기분이 들어버린답니다.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「あっ、すみません！\u3000勝手に落ち込んでしまいました……」"
translation = "「앗, 죄송해요! 마음대로 우울해져 버렸네요……」"

[[dialogue]]
speaker = "unk"
original = "俺は尊敬します"
translation = "저는 존경합니다"

[[dialogue]]
speaker = "unk"
original = "それだけ真剣だということですから"
translation = "그만큼 진심이라는 뜻이니까요"

[[dialogue]]
speaker = "unk"
original = "思わずケイティさんの手を取って強く握ってしまう。"
translation = "나도 모르게 케이티 씨의 손을 잡고 강하게 쥔다."

[[dialogue]]
speaker = "unk"
original = "そして、自分のしてしまった事に気付いて慌てて手を離した。"
translation = "그리고 자신이 저지른 일을 깨닫고 당황해서 손을 뗐다."

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ふふっ、いいえ……ありがとうございます♪」"
translation = "「후후, 아니요…… 감사합니다♪」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「魔王さんからそう言ってもらえると、私もとても救われた気持ちになりますね～」"
translation = "「마왕님께 그런 말을 들으니 저도 무척 구원받는 기분이 드네요~」"

[[dialogue]]
speaker = "unk"
original = "ケイティさんの手は、あの無骨な大剣を振り回しているとは思えないほど滑らかで柔らかかった。"
translation = "케이티 씨의 손은 그 투박한 대검을 휘두른다고는 생각되지 않을 정도로 매끄럽고 부드러웠다."

[[dialogue]]
speaker = "unk"
original = "手のひらに残ったぬくもりを感じつつ、早鐘をうつ心臓を懸命に抑えようとするのだった。"
translation = "손바닥에 남은 온기를 느끼며 세차게 뛰는 심장을 필사적으로 억누르려 하는 것이었다."

