[[dialogue]]
speaker = "unk"
original = "第３話,ファースト手繋ぎ,P"
translation = "제3화, 퍼스트 손잡기, P"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「お待たせ～、会長くん。待たせちゃったかな？」"
translation = "「기다렸지～, 회장 군. 기다리게 해 버렸을까?」"

[[dialogue]]
speaker = "unk"
original = "今来たところだよ、トワちゃん"
translation = "방금 온 참이야, 토와 짱"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっへへぇ～。お決まりのやり取りだよね、こういうの！\u3000でもでも、ちょっと憧れてたんだ～」"
translation = "「에헤헤～. 정해진 대화지, 이런 거! 하지만 하지만, 조금 동경했었어～」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「って、浮かれすぎちゃってバカみたいだよね……集合時間まで、まだ３０分もあるのに」"
translation = "「랄까, 너무 들떠서 바보 같지…… 집합 시간까지, 아직 30분이나 남았는데」"

[[dialogue]]
speaker = "unk"
original = "予定より早く出てきちゃった"
translation = "예정보다 일찍 나와 버렸어"

[[dialogue]]
speaker = "unk"
original = "俺もトワちゃんに会いたくて"
translation = "나도 토와 짱을 보고 싶어서"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「本当だよぉ～。たまには年上らしいところを見せようと思って、会長くんを待つつもりで来たのに！」"
translation = "「정말이야아～. 가끔은 연상다운 모습을 보이려고, 회장 군을 기다릴 생각으로 왔는데!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でもそれだけ……今日のデートを楽しみにしててくれてた、ってことだよね？」"
translation = "「하지만 그만큼…… 오늘 데이트를 기대해 줬다, 는 거겠지?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あはっ♪\u3000もちろん先生もだよ！\u3000っとと、しまった。今日は１日、先生はお休みするんだった」"
translation = "「아핫♪ 물론 선생님도야! 앗차, 이런. 오늘은 하루 종일, 선생님은 쉬기로 했었지」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん……初デート、誘ってくれて嬉しかったよ。なんかわたしからだと、がっついてるみたいで正直誘いづらかったし……」"
translation = "「으, 응…… 첫 데이트, 권해 줘서 기뻤어. 왠지 내가 먼저 하면, 안달 난 것 같아서 솔직히 권하기 힘들었거든……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「学園の中で公私を弁えずにイチャイチャするのはダメだと思うけど、オフの日に先生からキミの恋人になるのは……ありだと思うから」"
translation = "「학원 안에서 공사를 구분 못 하고 꽁냥거리는 건 안 된다고 생각하지만, 쉬는 날에 선생님에서 네 연인이 되는 건…… 괜찮다고 생각하니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うんっ。今日は一日、キミの彼女として、思いっきりデートを楽しんじゃおうかなっ」"
translation = "「응. 오늘은 하루 종일, 네 여자친구로서, 마음껏 데이트를 즐겨 버릴까나!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（というわけで、デートの定番、映画鑑賞……！\u3000しかもがっつりベタベタに恋愛映画だよ！）"
translation = "（그런 고로, 데이트의 정석, 영화 감상……! 게다가 완전히 달달한 연애 영화야!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（これなら初デートでも会話の間が持たない、なんて心配もないし、観終わった後は２人で感想を言い合うっていう話題も提供してくれる、まさに鉄板のチョイスだねっ）"
translation = "（이거라면 첫 데이트라도 대화가 끊길 걱정도 없고, 다 본 뒤에는 둘이서 감상을 말한다는 화제도 제공해 주는, 그야말로 철판 초이스네!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（って、思ってたんだけどぉ……）"
translation = "（라고, 생각했었는데에……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（映画の内容が思っていた以上にベタ甘で……隣にいるのが彼氏だと思うと、なぜか勝手に恥ずかしくなってきちゃうかもぉ……！？）"
translation = "（영화 내용이 생각했던 것 이상으로 너무 달달해서…… 옆에 있는 게 남자친구라고 생각하니, 왠지 멋대로 부끄러워져 버릴지도오……!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（あっあっあっ、違うんですっ。年下の彼氏に強引に求められて、所かまわずキスでメロメロになっちゃうヒロインに憧れたりなんて……全くしてないと言ったら嘘になるけど！！）"
translation = "（앗앗앗, 아니에요. 연하 남자친구에게 억지로 요구당해서, 장소 가리지 않고 키스로 헤롱헤롱해지는 여주인공을 동경한다거나…… 전혀 안 한다고 하면 거짓말이겠지만!!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（というか、事前に予習してきた雑誌によると、世のカップルは映画館の暗闇の中で、良い雰囲気のシーンになるとこっそり手を繋いだりするらしいんだけどぉ……）"
translation = "（그보다, 미리 예습해 온 잡지에 따르면, 세상 커플들은 영화관의 어둠 속에서, 분위기 좋은 장면이 나오면 몰래 손을 잡거나 한다는데에……）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（……チラッ）"
translation = "（……힐끗）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（ムリムリムリ……！\u3000いくら暗くて見えないって言っても、周囲にこんなに人がいる状況で、自分から年下の彼氏に甘えて擦り寄るなんて破廉恥なこと、できないよ！？）"
translation = "（무리무리무리……! 아무리 어두워서 안 보인다고 해도, 주변에 이렇게 사람이 많은 상황에서, 나부터 연하 남자친구에게 어리광 부리며 달라붙는 파렴치한 짓, 못 한다고!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（それにそれに！\u3000会長くんは映画に集中してるかもしれないわけで、そこで空気を読まずにボディタッチなんてしてきたら『うわ……ウザ』ってなるカモしれないじゃん！？）"
translation = "（게다가 게다가! 회장 군은 영화에 집중하고 있을지도 모르는데, 거기서 눈치 없이 바디 터치 같은 걸 해 오면 『우와…… 짜증 나』라고 생각할지도 모르잖아!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（いや、会長くんは絶対そんな酷いこと言わないけどね……！？）"
translation = "（아니, 회장 군은 절대 그런 심한 말 안 하겠지만 말이야……!?）"

[[dialogue]]
speaker = "unk"
original = "そんなことをモンモンと考えているうちに、映画はあっという間に終わってしまった。"
translation = "그런 것을 몽글몽글 생각하고 있는 사이에, 영화는 순식간에 끝나 버렸다."

[[dialogue]]
speaker = "unk"
original = "結構面白いですね！"
translation = "꽤 재미있네요!"

[[dialogue]]
speaker = "unk"
original = "恋愛映画はあまり見てきませんでしたが"
translation = "연애 영화는 별로 안 봐 왔습니다만"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そっかそっか！\u3000面白かったならよかったよぉ。結構甘口だったから、苦手な人だと胸焼けしちゃうかなって心配だったから」"
translation = "「그렇구나 그렇구나! 재밌었다니 다행이야. 꽤 달콤한 내용이라, 그런 걸 잘 못 보는 사람이면 속이 더부룩해지지 않을까 걱정했거든.」"

[[dialogue]]
speaker = "unk"
original = "甘口と言えば、さっきの映画のシーンで……"
translation = "달콤한 거라고 하면, 아까 영화 장면에서……"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（……ほっ。見てる最中はドキドキしすぎてどうなることかと思ったけど、会長くんも楽しんでくれたみたいだし、定番の感想語り合いもできてるし、結構いい感じかも！）"
translation = "（……휴우. 보는 도중에는 너무 두근거려서 어떻게 되는 줄 알았지만, 회장 군도 즐거워해 준 것 같고, 정석적인 감상 나누기도 하고 있으니, 꽤 괜찮은 느낌일지도!）"

[[dialogue]]
speaker = "unk"
original = "それから、わたしと会長くんはデパートへショッピングに出かけた。"
translation = "그 후, 나와 회장 군은 백화점으로 쇼핑을 나갔다."

[[dialogue]]
speaker = "unk"
original = "男物と女物の服屋さんをそれぞれ覗いたり、文房具コーナーでおすすめのアイテムを贈り合いっこしたり……"
translation = "남성복과 여성복 매장을 각각 구경하거나, 문구 코너에서 추천 아이템을 서로 선물하기도 하고……"

[[dialogue]]
speaker = "unk"
original = "ただ買い物をしてるだけなのに、それがびっくりするくらい楽しくて、ふと気が付いたらもう夜になってしまっているほどだった。"
translation = "그저 쇼핑을 하고 있을 뿐인데, 그게 놀라울 정도로 즐거워서 문득 정신을 차려보니 벌써 밤이 되어 버렸을 정도였다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふぅ～、今日は楽しかったぁ。買い物してるだけでも、会長くんの知らなかった好みをたくさん聞けちゃった気がする！」"
translation = "「후우~, 오늘은 즐거웠어. 쇼핑하는 것만으로도, 회장 군의 몰랐던 취향을 잔뜩 들은 기분이야!」"

[[dialogue]]
speaker = "unk"
original = "俺もトワちゃんのこと沢山知れてよかった"
translation = "나도 토와짱에 대해 많이 알 수 있어서 좋았어"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへぇ～。なんか照れくさいね、こういうの……」"
translation = "「에헤헤~. 왠지 쑥스럽네, 이런 거……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも、さすがに今日はもうおしまいかなぁ～。夜の繁華街に、生徒を連れまわすわけにはいかないもん」"
translation = "「하지만, 역시 오늘은 이제 끝이려나~. 밤의 번화가에 학생을 계속 데리고 다닐 수는 없으니까.」"

[[dialogue]]
speaker = "unk"
original = "今日はオフだから先生じゃないのでは？"
translation = "오늘은 오프니까 선생님이 아니지 않아?"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ダーメ。会長くんとお付き合いするって決めたけど、わたしはキミの先生って立場を捨てたわけじゃありませんからねっ」"
translation = "「안~돼. 회장 군이랑 사귀기로 결정했지만, 내가 너의 선생님이라는 입장을 버린 건 아니니까요.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「というわけで、一緒に居足りない分はまた今度のデートにとっておこ！」"
translation = "「그러니까, 같이 있고 싶어서 아쉬운 만큼은 다음에 데이트할 때를 위해 남겨두자!」"

[[dialogue]]
speaker = "unk"
original = "でもトワちゃんを家まで送るのはあり？"
translation = "하지만 토와짱을 집까지 데려다주는 건 괜찮지?"

[[dialogue]]
speaker = "unk"
original = "わかりました、先生……"
translation = "알겠습니다, 선생님……"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぅぅ……。またそうやってかっこいいこと言って、先生を惑わせる……」"
translation = "「하으으…… 또 그렇게 멋있는 말을 해서 선생님을 현혹시키고……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そんなの……もちろん、いいに決まってるじゃん……」"
translation = "「그런 건…… 물론, 당연히 좋지……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「って、ひゃうぅぅっ！？\u3000も、ものすごく自然に手まで繋いできたぁ！？」"
translation = "「그보다, 히야우우우!? 너, 너무나 자연스럽게 손까지 잡았어!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ！？\u3000そ、そんなの……だって……嫌なわけ、ないよぉ……<emoji=heart04>」"
translation = "「엣!? 그, 그런 거…… 그치만…… 싫을 리가, 없잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん……嬉しいっ。もう暗くなってるし、こっそり手を繋いで歩くくらいは、あり、かな……」"
translation = "「으, 응…… 기뻐. 벌써 어두워졌고, 몰래 손을 잡고 걷는 정도는, 괜찮, 으려나……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへ。大好きだよ、会長くん」"
translation = "「에헤헤. 사랑해, 회장 군.」"

