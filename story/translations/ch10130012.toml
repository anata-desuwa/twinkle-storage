[[dialogue]]
speaker = "unk"
original = "第２話,お人好しなユウリ,P"
translation = "제2화, 사람 좋은 유우리"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「よーし、かかってきな！\u3000流星の星徒会の力を見せてやる」"
translation = "「좋아, 덤벼봐! 유성 성도회의 힘을 보여주마」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「よ、よろしくお願いします……。それじゃ……えいっ」"
translation = "「자, 잘 부탁드립니다……. 그럼…… 에잇」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ふんっ」"
translation = "「훗」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あっさり弾かれた！？」"
translation = "「허무하게 튕겨 나갔어!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「隙だらけだぜ！」"
translation = "「빈틈투성이라고!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「きゃああああっ！\u3000……バタン」"
translation = "「꺄아아아악! ……콰당」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「まずは一人。次！」"
translation = "「일단 한 명. 다음!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「次は私ですね。よろしくお願いしますっ」"
translation = "「다음은 저네요. 잘 부탁드립니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「よしっ、あたしのハルバードが受け止められるか試してやるぜ。ちゃんと構えろよ」"
translation = "「좋아, 내 할버드를 받아낼 수 있을지 시험해 주지. 제대로 자세 잡아라」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「流星の星徒会役員とはいえ、簡単に倒されるつもりはありませんよ」"
translation = "「유성 성도회 임원이라 해도, 쉽게 쓰러질 생각은 없어요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「いい返事だ。そらよ！」"
translation = "「좋은 대답이다. 간다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お疲れさま～。飲み物持ってきたわよ～」"
translation = "「수고했어~. 마실 것 좀 가져왔단다~」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あ、配るの手伝うぜ。ほい、慌てず飲むんだぞ」"
translation = "「아, 나누어 주는 거 도와줄게. 자, 서두르지 말고 마셔」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ぜぇ、ぜぇ……ありがとう……ございます……」"
translation = "「허억, 허억…… 감사……합니다……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いただきまーす」"
translation = "「잘 먹겠습니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「生き返ります……女神さまとサーシャさま、ユウリさまに感謝を」"
translation = "「살 것 같아요…… 여신님과 사샤 님, 유우리 님께 감사를」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「訓練に参加したうちの子はみんな倒しちゃったのね～。普段前線に出てない子も多いとはいえ、さすが流星星徒会だわ～」"
translation = "「훈련에 참가한 우리 애들은 전부 쓰러뜨려 버렸네~. 평소에 전선에 나가지 않는 애들이 많다고는 해도, 역시 유성 성도회야~」"

[[dialogue]]
speaker = "unk"
original = "訓練してみてどうだった？"
translation = "훈련해 보니 어땠어?"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「そうだな……正直歯ごたえはなかったが、あんまり戦ってないヤツらならこんなもんだろ。でも筋は悪くないし、これから伸びてくると思うぜ」"
translation = "「글쎄…… 솔직히 보람은 없었지만, 별로 싸워보지 않은 녀석들이라면 이 정도겠지. 하지만 소질은 나쁘지 않으니, 앞으로 성장할 거라 본다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふむふむ、なるほど～。次は私たちが流星の子たちを鍛える番ね」"
translation = "「흠흠, 그렇구나~. 다음은 우리가 유성 애들을 단련시킬 차례네」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「流星のヤツらもなかなかやるぜ。一筋縄じゃいかないかもしれねーぞ」"
translation = "「유성 녀석들도 제법 한다고. 만만치 않을지도 몰라」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふっ、それは楽しみね～」"
translation = "「후후훗, 그거 기대되네~」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、あのー……」"
translation = "「저, 저기……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「さっき手合わせした時の反省点を教えてもらえませんか？」"
translation = "「아까 대련했을 때의 반성할 점을 가르쳐 주실 수 있나요?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんだ、強くなりたいのか？\u3000この前は戦いたくないって感じだったのに」"
translation = "「뭐야, 강해지고 싶은 거냐? 요전에는 싸우고 싶지 않다는 느낌이었는데」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それはそうなんですけど、戦わなきゃいけないのはわかってますし。それに私が弱いままだと、この子たち……本たちにも悪いですから」"
translation = "「그건 그렇지만, 싸워야 한다는 건 알고 있으니까요. 게다가 제가 약한 채로 있으면, 이 아이들…… 책들에게도 미안하니까요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ふーん、なるほどな。いいぜ、まだ時間もあるみたいだしみっちり鍛えてやる」"
translation = "「흐응, 그렇군. 좋아, 아직 시간도 있는 것 같으니 철저하게 단련시켜 주지」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そ、そこまではいいんですけど……でもありがとうございますっ」"
translation = "「그, 그 정도까지는 괜찮은데…… 하지만 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "親身になってくれてる"
translation = "친절하게 대해주고 있어"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「そりゃ、星騎士として強くなりたいっていうヤツがいたらほっとけねえだろ」"
translation = "「그야, 성기사로서 강해지고 싶다는 녀석이 있으면 가만히 둘 수 없잖아」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「流星と新星はライバルだが、リクリエに立ち向かうのは同じだし、ライバルが強ければ強いほどあたしたちも強くなるってもんだ」"
translation = "「유성과 신성은 라이벌이지만, 리크리에에 맞서는 건 똑같고, 라이벌이 강하면 강할수록 우리도 강해지는 법이니까」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「では私もお願いします。女神様に仕えるシスターとして、世界を守らねばなりませんから」"
translation = "「그럼 저도 부탁드립니다. 여신님을 모시는 시스터로서, 세계를 지켜야 하니까요」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はいはーい、ボクも！\u3000会長に追い抜かれたままじゃ悔しいからね」"
translation = "「네네, 저도요! 회장님께 뒤처진 채로는 분하니까요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「お、体を動かしたりないヤツがまだいるみたいだな。よし、まとめて相手してやる」"
translation = "「오, 몸을 더 움직이고 싶은 녀석들이 또 있는 모양이네. 좋아, 한꺼번에 상대해 주지」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あー……でもごめんなさい。ちょっと機材の調子が悪いみたいね～」"
translation = "「아~…… 하지만 미안해. 기재 상태가 좀 안 좋은 것 같네~」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あたしに任しとけ。見せてみろ」"
translation = "「나한테 맡겨둬. 이리 내봐」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そんなこともできるの？\u3000じゃあお願いするわね」"
translation = "「그런 것도 할 줄 아니? 그럼 부탁할게」"

[[dialogue]]
speaker = "unk"
original = "さすが流星の星徒会役員"
translation = "역시 유성 성도회 임원이야"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お邪魔します……あれ、どうしてユウリ先輩が機械をいじってるんですか？」"
translation = "「실례합니다…… 어라, 왜 유우리 선배가 기계를 만지고 계신 건가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「実はかくかくしかじかで」"
translation = "「사실은 이러저러해서」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えーと……気をつけてください」"
translation = "「저기…… 조심하세요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「面倒見が良くて誰でも助けようとするところは、確かにユウリ先輩の美点ですが、自分にできることできないことを深く考えずに引き受けてしまうきらいがあります」"
translation = "「남을 잘 돌봐주고 누구든 도와주려 하는 점은 분명 유우리 선배의 장점이지만, 자신이 할 수 있는 일과 없는 일을 깊게 생각하지 않고 맡아버리는 경향이 있어요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「つまり……」"
translation = "「즉……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん？\u3000あれ？\u3000どうなってんだこれ？\u3000……ま、機械なんて叩けば直んだろ」"
translation = "「응? 어라? 이거 어떻게 된 거야? ……뭐, 기계 같은 건 두드리면 고쳐지겠지」"

[[dialogue]]
speaker = "unk"
original = "ストーップ！"
translation = "스톱!"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ハルバードで叩いたら絶対壊れますから！\u3000直せる人連れてきますから！」"
translation = "「할버드로 두드리면 절대 부서지니까요! 고칠 수 있는 사람 데려올 테니까!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「おう、任せたぜ。それじゃ、直るまで筋トレでもするか」"
translation = "「오우, 맡겨두라고. 그럼 고쳐질 때까지 근력 트레이닝이라도 할까」"

