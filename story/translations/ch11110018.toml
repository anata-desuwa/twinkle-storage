[[dialogue]]
speaker = "クロト"
original = "「ふぅ……終わった。手伝ってくれてありがとう、ベアトリス」"
translation = "「후우…… 끝났다. 도와줘서 고마워, 베아트리스」"

[[dialogue]]
speaker = "ベアトリス"
original = "「いえいえ。お疲れ様です」"
translation = "「아니에요. 수고하셨습니다」"

[[dialogue]]
speaker = "unk"
original = "ある日の夜のこと。急いで処理しなければいけない仕事が入り、１人で残って作業していた。"
translation = "어느 날 밤의 일. 급히 처리해야 할 업무가 생겨, 혼자 남아 작업하고 있었다."

[[dialogue]]
speaker = "unk"
original = "すると遅くまで戦闘訓練をしていたベアトリスが心配して来てくれて、大いに助けられたのだった。"
translation = "그러자 늦게까지 전투 훈련을 하던 베아트리스가 걱정되어 와 주었고, 큰 도움이 되었다."

[[dialogue]]
speaker = "クロト"
original = "「ベアトリス、星徒会の仕事、けっこう慣れてない？」"
translation = "「베아트리스, 성도회 업무, 꽤 익숙해지지 않았어?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そそ、そんなことはないですよ！？\u3000気のせいじゃないですか！？」"
translation = "「그, 그그, 그런 거 아니에요!? 기분 탓 아닌가요!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ほ、ほら、とりあえずお茶でも飲んで休憩しましょう？\u3000ね？」"
translation = "「자, 자아, 일단 차라도 마시며 휴식할까요? 네?」"

[[dialogue]]
speaker = "unk"
original = "勢いに押し切られながら、ベアトリスが淹れてくれたお茶を飲む。"
translation = "기세에 눌리면서도, 베아트리스가 우려 준 차를 마신다."

[[dialogue]]
speaker = "unk"
original = "すると、熱い緑茶が疲れを溶かしてくれるような気がした。"
translation = "그러자 뜨거운 녹차가 피로를 녹여주는 듯한 기분이 들었다."

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「どうしました？」"
translation = "「왜 그러세요?」"

[[dialogue]]
speaker = "クロト"
original = "「ベアトリスの戦闘服、エッチだなって」"
translation = "「베아트리스의 전투복, 야하네 싶어서」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ひゃあっ！？\u3000なんてこと言うんですか！？」"
translation = "「히얏!? 무슨 말씀을 하시는 거예요!?」"

[[dialogue]]
speaker = "unk"
original = "黒衣のドレスは大きな胸を強調していて、つい目を奪われる。"
translation = "검은 드레스는 큰 가슴을 강조하고 있어, 나도 모르게 눈길을 빼앗긴다."

[[dialogue]]
speaker = "unk"
original = "スカートのスリットも際どくて、白い太もももに視線がいってしまいそうだ。"
translation = "치마의 슬릿도 아슬아슬해서, 하얀 허벅지로 시선이 가 버릴 것만 같다."

[[dialogue]]
speaker = "ベアトリス"
original = "「実は自分でも気になってるのに……そんなこと言っちゃダメですよ、会長さん」"
translation = "「사실 저도 신경 쓰고 있는데…… 그런 말 하시면 안 돼요, 회장님」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも会長さんがそう思ってるなら……」"
translation = "「하지만 회장님이 그렇게 생각하신다면……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「このまま……えっちなことしてみます？」"
translation = "「이대로…… 야한 짓 해 볼까요?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「えへへへ……星徒会室でこんなことしちゃうなんて、不良会長さんですね……<emoji=heart04>」"
translation = "「에헤헤헤…… 성도회실에서 이런 짓을 하다니, 불량 회장님이시네요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "横になった俺に、ドレスをはだけたベアトリスが跨る。"
translation = "가로누운 내 위로, 드레스를 헤친 베아트리스가 올라탄다."

[[dialogue]]
speaker = "unk"
original = "ただでさえ大きなおっぱいが目の前で揺れて、否応なしに男の本能を刺激する。"
translation = "안 그래도 커다란 가슴이 눈앞에서 흔들려, 어쩔 수 없이 남자의 본능을 자극한다."

[[dialogue]]
speaker = "ベアトリス"
original = "「あ……おち○ちん大きい……もう、エッチな会長さんです。まぁ、吸血鬼は人を魅了するものですから仕方ないですね」"
translation = "「아…… 자지 커요…… 정말, 야한 회장님이네요. 뭐, 흡혈귀는 사람을 매료시키는 존재니까 어쩔 수 없겠네요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「スッキリさせてあげないとかわいそうですから、このベアトリスが責任を取ってあげましょう」"
translation = "「시원하게 해주지 않으면 불쌍하니까, 이 베아트리스가 책임을 져 드릴게요」"

[[dialogue]]
speaker = "unk"
original = "柄にもなく挑発的な言葉を使うベアトリス。だけど……"
translation = "어울리지 않게 도발적인 말을 사용하는 베아트리스. 하지만……"

[[dialogue]]
speaker = "クロト"
original = "「ベアトリス、少し無理してない？」"
translation = "「베아트리스, 조금 무리하는 거 아니야?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そそ、そんなことないですよっ？\u3000なんたって私、淫靡で蠱惑的な吸血鬼ですからっ」"
translation = "「그, 그런 거 아니거든요? 그야 저, 음란하고 고혹적인 흡혈귀니까요」"

[[dialogue]]
speaker = "クロト"
original = "「目が泳いでるよ」"
translation = "「눈동자가 흔들리고 있어」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ひゃうぅっ！？\u3000だ、だってぇ……少しくらい吸血鬼らしいことしたかったんですもん……」"
translation = "「히야우웃!? 그, 그치만…… 조금이라도 흡혈귀다운 일을 하고 싶었단 말이에요……」"

[[dialogue]]
speaker = "unk"
original = "すぐにメッキがはがれて恥ずかしがるベアトリスがかわいい。"
translation = "금방 본모습이 드러나 부끄러워하는 베아트리스가 귀엽다."

[[dialogue]]
speaker = "クロト"
original = "「吸血鬼なら血を吸うんじゃないの？」"
translation = "「흡혈귀라면 피를 빠는 거 아니야?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それはそうなんですけど……吸血鬼だって、おち○ちんとおま○こで子作りしますから……」"
translation = "「그건 그렇지만…… 흡혈귀라도, 자지와 보지로 아기를 만드니까요……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はぁ……会長さんのおち○ちん……えっちな形してて、目が離せないです……<emoji=heart04>」"
translation = "「하아…… 회장님의 자지…… 야한 모양을 하고 있어서, 눈을 뗄 수가 없어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私も待ち切れませんし……会長さんのおち○ちん、食べちゃいますね……<emoji=heart04>」"
translation = "「저도 더는 못 기다리겠으니까…… 회장님의 자지, 먹어버릴게요……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「～～～～～～～～っ……！」"
translation = "「～～～～～～～～……！」"

[[dialogue]]
speaker = "unk"
original = "いきり立ったペニスが柔らかいものを突き破り、熱い感触に呑み込まれた。"
translation = "발기한 페니스가 부드러운 것을 뚫고 들어가, 뜨거운 감촉에 집어삼켜졌다."

[[dialogue]]
speaker = "クロト"
original = "「ベアトリス、君は……」"
translation = "「베아트리스, 너는……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「『初めてか？』なんて、今さら無粋なことは聞かないでくださいよ……？」"
translation = "「『처음인가?』 같은, 이제 와서 무드 없는 소리는 묻지 말아 주세요……?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふ……はぁ……心配しなくても平気です。私吸血鬼だから、丈夫なので……」"
translation = "「후…… 하아…… 걱정하지 않아도 괜찮아요. 저 흡혈귀라, 튼튼하니까……」"

[[dialogue]]
speaker = "unk"
original = "その言葉通り、ベアトリスの表情には痛みよりも快感が表れているように見えた。"
translation = "그 말대로, 베아트리스의 표정에는 고통보다 쾌감이 나타나 있는 것처럼 보였다."

[[dialogue]]
speaker = "unk"
original = "中もとろとろの蜜で潤っていて、柔らかい粘膜がペニスを包み込んでいる。"
translation = "안도 걸쭉한 꿀로 젖어 있어, 부드러운 점막이 페니스를 감싸고 있다."

[[dialogue]]
speaker = "ベアトリス"
original = "「んん……うぅ……男の人のって、こんな感じ……なんですね……」"
translation = "「응…… 으으…… 남자의 것이란 건, 이런 느낌……인 거군요……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はぁはぁ……私の中で、会長さんのおち○ちん、ビクビクしてる……ふぅ……はあぁ……」"
translation = "「하아 하아…… 제 안에서, 회장님의 자지, 파르르 떨리고 있어…… 후우…… 하아아……」"

[[dialogue]]
speaker = "クロト"
original = "「ベアトリスの中も濡れてるよ」"
translation = "「베아트리스의 안도 젖어 있어」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だって、会長さんがえっちなんですもん……ん……はぁ……濡れちゃうのは、仕方ないです……」"
translation = "「그치만, 회장님이 야한걸요…… 응…… 하아…… 젖어버리는 건, 어쩔 수 없어요……」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの熱と、肉の弾力をペニスで感じ、繋がっているだけで達しそうになる。"
translation = "베아트리스의 열기와, 살의 탄력을 페니스로 느끼며, 연결되어 있는 것만으로 가버릴 것 같아진다."

[[dialogue]]
speaker = "ベアトリス"
original = "「んんっ……<emoji=heart04>\u3000会長さんの、私の中で大きくなってる……そんなに感じてくれてるんですね」"
translation = "「응윽……<emoji=heart04> 회장님의 것이, 제 안에서 커지고 있어…… 그렇게 느껴주고 계신 거군요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「じゃあ……もっと楽しみましょう<emoji=heart04>」"
translation = "「그럼…… 좀 더 즐겨봐요<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はあぁ、はっ……あっ……んっ……会長さんのおち○ちん、大きい……ふはぁっ……あん……<emoji=heart04>」"
translation = "「하아아, 핫…… 앗…… 응…… 회장님의 자지, 커…… 후하아…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「会長さんが、私の中にいるの、感じる……んっ……はっ……あぁっ……これが……セックス、なんだ……はぁ……んんっ……<emoji=heart04>」"
translation = "「회장님이, 제 안에 있는 거, 느껴져…… 응…… 핫…… 아아…… 이것이…… 섹스, 인 거구나…… 하아…… 응윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「んっ……んんっ……中で、擦れてる……<emoji=heart04>\u3000おま○こ、ジンジンしちゃう……んはぁ、はっ……はぁっ……<emoji=heart04>」"
translation = "「응…… 응윽…… 안에서, 쓸리고 있어……<emoji=heart04> 보지, 징징거려버려…… 응하아, 핫…… 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスがゆっくりと体を上下させ、肉と肉が摩擦する。"
translation = "베아트리스가 천천히 몸을 상하로 움직여, 살과 살이 마찰한다."

[[dialogue]]
speaker = "unk"
original = "すると今まで味わったことがない快感が走り、無意識に下半身がビクビクと跳ねてしまう。"
translation = "그러자 지금까지 맛본 적 없는 쾌감이 달려, 무의식적으로 하반신이 파르르 튀어 오르고 만다."

[[dialogue]]
speaker = "ベアトリス"
original = "「はぁ……あっ……んぁ、んっ……<emoji=heart04>\u3000私のおま○こ、気持ちいいですか、会長さん？」"
translation = "「하아…… 앗…… 응아, 응……<emoji=heart04> 제 보지, 기분 좋은가요, 회장님?」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……ああ、すごくいいよ」"
translation = "「큭…… 아아, 정말 좋아」"

[[dialogue]]
speaker = "ベアトリス"
original = "「えへへ……嬉しいです……んんっ、はぁ、あんっ……<emoji=heart04>\u3000いっぱい気持ち良くなって、くださいね……はあぁ……<emoji=heart04>」"
translation = "「에헤헤…… 기뻐요…… 응윽, 하아, 안……<emoji=heart04> 잔뜩 기분 좋아져, 주세요…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おま○こでペニスを締めつけながら、いじらしく腰を動かすベアトリス。"
translation = "보지로 페니스를 조이며, 애처롭게 허리를 움직이는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "まだ男性器に慣れていない膣はきつく、愛液で濡れた粘膜が絡みついてきて、強い刺激に襲われる。"
translation = "아직 남성기에 익숙해지지 않은 질은 좁고, 애액으로 젖은 점막이 휘감겨 와서, 강한 자극에 휩싸인다."

[[dialogue]]
speaker = "ベアトリス"
original = "「初めてだから上手くないかもですけど……んんっ、はっ……感じてください……ん……ふぁ、ああぁんっ<emoji=heart04>」"
translation = "「처음이라 서툴지도 모르겠지만…… 응윽, 핫…… 느껴주세요…… 응…… 후아, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ベアトリスも気持ちいい？」"
translation = "「베아트리스도 기분 좋아?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ええっ！？\u3000そ、そんなこと、聞かないでくださいよぉ……」"
translation = "「에엣!? 그, 그런 거, 묻지 말아 주세요오……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はぁ、はっ……聞かなくてもわかってるくせに……んっ……そんなに、聞きたいですか……？」"
translation = "「하아, 하앗…… 묻지 않아도 알고 있으면서…… 응…… 그렇게나, 듣고 싶으신가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「うん、聞きたい」"
translation = "「응, 듣고 싶어」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うぅ……そこまで言うなら仕方ないですね……んんっ<emoji=heart04>\u3000会長さんのために言ってあげますからね……？」"
translation = "「우우…… 그렇게까지 말씀하신다면 어쩔 수 없네요…… 응으윽<emoji=heart04> 회장님을 위해서 말해 드릴 테니까요……?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はい……会長さんのおち○ちん、気持ちいいですっ……！」"
translation = "「하아…… 회장님의 자지, 기분 좋아요……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「～～～っ！！？\u3000恥ずかしいですぅ～～～～っ！！？」"
translation = "「~~~윽!!? 부끄러워요어~~~~윽!!?」"

[[dialogue]]
speaker = "unk"
original = "羞恥に声を上げながらも、ペニスを包む膣壁が震えながらぎゅっと締まる。"
translation = "수치심에 소리를 지르면서도, 페니스를 감싸는 질벽이 떨리며 꽉 조여진다."

[[dialogue]]
speaker = "unk"
original = "ぎこちなかった動きは次第にスムーズになり、蜜も俺の下半身を濡らすほど溢れていて、ベアトリスもすっかりお気に召したようだった。"
translation = "어색했던 움직임은 점차 매끄러워졌고, 애액도 내 하반신을 적실 정도로 넘쳐흐르고 있어서, 베아트리스도 완전히 마음에 든 모양이었다."

[[dialogue]]
speaker = "ベアトリス"
original = "「あっ<emoji=heart04>\u3000またおち○ちんビクって、私の中で、脈打ってます……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 또 자지가 움찔거려서, 제 안에서 맥박치고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「これ、好き……<emoji=heart04>\u3000んあっ、あっ、あぁっ……<emoji=heart04>\u3000気持ち良くなってくれてるの、伝わって好きなんです……<emoji=heart04>」"
translation = "「이거, 좋아……<emoji=heart04> 응아앗, 앗, 아아앗……<emoji=heart04> 기분 좋아지고 있다는 게 전해져서 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふぁっ……あっ、あっ──ふぁああっ<emoji=heart04>\u3000お腹、キュンキュンしちゃうっ……んっ、んん～～っ<emoji=heart04>」"
translation = "「후아…… 앗, 앗── 후아아앗<emoji=heart04> 배 속이 큥큥거려요…… 윽, 응으으~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが体を上下させる度、大きな胸がそのボリュームを見せつけるように揺れる。"
translation = "베아트리스가 몸을 위아래로 움직일 때마다, 커다란 가슴이 그 볼륨을 과시하듯 흔들린다."

[[dialogue]]
speaker = "ベアトリス"
original = "「あっ<emoji=heart04>\u3000会長さんが、おっぱい見てる……<emoji=heart04>はあぁ……えっちな目で、見られてるだけで、体、熱くなっちゃう<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님이 가슴을 보고 있어……<emoji=heart04> 하아아…… 야한 눈으로 봐주시는 것만으로도 몸이 뜨거워져 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「触っていいんですよ？\u3000はぁ、あっ……会長さんの好きなおっぱい、触っても……<emoji=heart04>」"
translation = "「만져도 괜찮다구요? 하아, 앗…… 회장님이 좋아하는 가슴, 만져도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスに誘われるまま、その豊満なおっぱいに手を伸ばす。"
translation = "베아트리스가 유혹하는 대로, 그 풍만한 가슴에 손을 뻗는다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ひやぁっ<emoji=heart04>\u3000あっ……そうですよ……おっぱい、好きなだけ、もみもみしてください……んんっ<emoji=heart04>」"
translation = "「히야앗<emoji=heart04> 앗…… 그래요…… 가슴, 마음껏 조물조물해 주세요…… 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はあぁ……会長さんの手、力強くて、ドキドキします……<emoji=heart04>\u3000あっ、んっ……おっぱい触られるの、いい……<emoji=heart04>」"
translation = "「하아아…… 회장님의 손, 힘차서 두근거려요……<emoji=heart04> 앗, 응…… 가슴 만져지는 거, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さらに胸の先端に口を近づけ、舌を這わせる。"
translation = "더욱 가슴 끝에 입을 가까이 대고, 혀를 놀린다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ひんっ<emoji=heart04>\u3000あっ、んっ<emoji=heart04>\u3000乳首、舐められて……ひっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ペロペロされるの、すごいっ<emoji=heart04>\u3000自分で触るのと、全然違うっ<emoji=heart04>」"
translation = "「히응<emoji=heart04> 앗, 응<emoji=heart04> 유두, 핥아져서…… 히윽<emoji=heart04> 응<emoji=heart04> 할짝할짝 당하는 거 굉장해요<emoji=heart04> 스스로 만지는 거랑은 전혀 달라앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの嬌声とともに膣内がぶるぶると震える。"
translation = "베아트리스의 교성과 함께 질 내부가 파르르 떨린다."

[[dialogue]]
speaker = "unk"
original = "射精欲が高まるのを感じながら、ベアトリスの乳首を口に含み、母乳を飲むように吸った。"
translation = "사정 욕구가 높아지는 것을 느끼며, 베아트리스의 유두를 입에 머금고 모유를 마시듯 빨았다."

[[dialogue]]
speaker = "ベアトリス"
original = "「んん～～～～っ<emoji=heart04>\u3000おっぱい、吸われてるぅ……<emoji=heart04>\u3000あん<emoji=heart04>\u3000ちゅうちゅうされるの気持ちいい<emoji=heart04>」"
translation = "「응으～～～～읏<emoji=heart04> 가슴, 빨리고 있어……<emoji=heart04> 앙<emoji=heart04> 쪽쪽 빨리는 거 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はあぁん……<emoji=heart04>\u3000吸うの、強いぃ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000私のおっぱい、美味しいですか？」"
translation = "「하아앙……<emoji=heart04> 빠는 거, 강해……<emoji=heart04> 응읏<emoji=heart04> 내 가슴, 맛있나요?」"

[[dialogue]]
speaker = "unk"
original = "大きなおっぱいに顔を押し付け、乳首に吸い付きながら、こくこく頷いて答える。"
translation = "커다란 가슴에 얼굴을 파묻고, 유두를 빨면서 고개를 끄덕이며 대답한다."

[[dialogue]]
speaker = "ベアトリス"
original = "「えへへ、へへ……<emoji=heart04>\u3000嬉しいです<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000いっぱい吸って、んっ、くださいね……<emoji=heart04>\u3000んっ、はぁっ……<emoji=heart04>」"
translation = "「에헤헤, 헤헤……<emoji=heart04> 기뻐요<emoji=heart04> 하아앗<emoji=heart04> 잔뜩 빨아, 응, 주세요……<emoji=heart04> 응, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「は……<emoji=heart04>\u3000あん……<emoji=heart04>\u3000おっぱい吸われると……お腹の奥、切なくて、きゅぅってなりますっ……<emoji=heart04>」"
translation = "「하……<emoji=heart04> 앙……<emoji=heart04> 가슴 빨리면…… 배 안쪽이 애달파서, 큥 하고 조여들어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「もう、止まれ、ません……<emoji=heart04>\u3000んんっ……もっと、もっと、気持ち良くなりましょう……っ<emoji=heart04>」"
translation = "「이제, 멈출 수, 없어요……<emoji=heart04> 응읏…… 좀 더, 좀 더, 기분 좋아져요……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「んぁあああっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ、あっ、あぁっ──ひやああぁっ<emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 핫<emoji=heart04> 앗<emoji=heart04> 앗, 앗, 아앗──히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000中で、おち○ちん擦れて<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こ熱い<emoji=heart04>\u3000お腹の奥、キュンキュンしちゃいますっ<emoji=heart04>」"
translation = "「후앗<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 안에서, 자지가 스쳐서<emoji=heart04> 앗<emoji=heart04> 보지 뜨거워<emoji=heart04> 배 안쪽이 큥큥거려요<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んっ──んっ──んっ──んん～～っ<emoji=heart04>\u3000エッチするの、いいっ<emoji=heart04>\u3000おま○こ、気持ちいいですぅっ<emoji=heart04>」"
translation = "「핫<emoji=heart04> 응읏<emoji=heart04> 응──응──응──응으～～읏<emoji=heart04> 섹스하는 거, 좋아<emoji=heart04> 보지, 기분 좋아요옷<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふぁああっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000こんな気持ちいいの、好きになっちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000好きになるしか、ないじゃないですかっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 응읏<emoji=heart04> 앗<emoji=heart04> 이렇게 기분 좋은 거, 좋아하게 돼버려<emoji=heart04> 앗<emoji=heart04> 핫<emoji=heart04> 좋아하게 될 수밖에, 없잖아요옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽を貪るように腰を振り、おっぱいも暴れるように激しく揺れる。"
translation = "쾌락을 탐하듯 허리를 흔들고, 가슴도 날뛰듯이 격렬하게 흔들린다."

[[dialogue]]
speaker = "unk"
original = "俺もベアトリスも最初の緊張はとうに忘れ、快楽に夢中になっていた。"
translation = "나도 베아트리스도 처음의 긴장은 진작에 잊고, 쾌락에 몰두하고 있었다."

[[dialogue]]
speaker = "ベアトリス"
original = "「おち○ちん、大きくてっ<emoji=heart04>\u3000お腹の中、いっぱいに、なるぅっ<emoji=heart04>\u3000はぁ──あっ──あんっ──ふぁあああっ<emoji=heart04>」"
translation = "「자지, 커서<emoji=heart04> 배 안이, 가득, 차버려어<emoji=heart04> 하아──앗──안──후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おち○ちん、熱くて、硬くて……おま○こ、幸せになっちゃいますっ<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 자지, 뜨겁고, 딱딱해서…… 보지, 행복해져 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふあぁっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きぃっ<emoji=heart04>\u3000会長さんとエッチするの、好きですぅっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 하아앗<emoji=heart04> 좋아<emoji=heart04> 좋아<emoji=heart04> 좋아앗<emoji=heart04> 회장님이랑 섹스하는 거, 좋아해요옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮が限界に近づくにつれ体に力が入り、ベアトリスの奥めがけて思い切り突き上げる。"
translation = "흥분이 한계에 가까워짐에 따라 몸에 힘이 들어가고, 베아트리스의 안쪽을 향해 힘껏 쳐올린다."

[[dialogue]]
speaker = "ベアトリス"
original = "「んんん～～～～っ<emoji=heart04>\u3000おち○ちん、深いところに届いてっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000お腹に、響くっ<emoji=heart04>\u3000キュンッってしちゃうっ<emoji=heart04>」"
translation = "「응으으～～～～읏<emoji=heart04> 자지, 깊은 곳에 닿아서<emoji=heart04> 아앗<emoji=heart04> 응읏<emoji=heart04> 배에, 울려<emoji=heart04> 큥 하고 저려와<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ビクビク、ビクビクって、おち○ちん跳ねてるっ<emoji=heart04>\u3000私の中で、暴れてるっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 파르르, 파르르하고, 자지가 뛰고 있어<emoji=heart04> 내 안에서, 날뛰고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「は──は──は──んんんっ<emoji=heart04>\u3000出そうなんですよねっ？\u3000おち○ちんからビューッて、精液、出したいんですよねっ<emoji=heart04>」"
translation = "「하──하──하──응으으읏<emoji=heart04> 나올 것 같죠? 자지에서 뷰륫 하고, 정액, 내보내고 싶은 거죠<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふわぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000中に出してもらうの、きっと──ううん、ぜったい気持ちいいっ<emoji=heart04>」"
translation = "「후와앗<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 안에 싸주는 거, 분명──아니, 절대 기분 좋을 거야<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「本能で、わかっちゃうっ<emoji=heart04>\u3000おま○こに射精されるの、気持ちいいっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000熱いの、欲しいっ<emoji=heart04>\u3000射精してほしいですぅっ<emoji=heart04>」"
translation = "「본능으로, 알아버려<emoji=heart04> 보지에 사정당하는 거, 기분 좋아<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 뜨거운 거, 갖고 싶어<emoji=heart04> 사정해줬으면 좋겠어요옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "予兆を感じ、膣壁が震えながら収縮する。"
translation = "전조를 느끼며, 질벽이 떨리면서 수축한다."

[[dialogue]]
speaker = "unk"
original = "ねだるような締め付けに、欲望が射精寸前まで高まって──"
translation = "조르는 듯한 조임에, 욕망이 사정 직전까지 고조되어──"

[[dialogue]]
speaker = "ベアトリス"
original = "「んんんっ<emoji=heart04>\u3000またおち○ちんビクンってした<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000爆発しそうにドクドクしてるっ<emoji=heart04>」"
translation = "「응으으읏<emoji=heart04> 또 자지가 움찔거렸어<emoji=heart04> 핫<emoji=heart04> 앗<emoji=heart04> 폭발할 것처럼 펄떡거려<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「出してっ<emoji=heart04>\u3000出してくださいっ<emoji=heart04>\u3000私の中に、たくさんっ<emoji=heart04>\u3000んぁっ──あ──あ──んん～～っ<emoji=heart04>」"
translation = "「싸줘<emoji=heart04> 싸주세요<emoji=heart04> 내 안에, 잔뜩<emoji=heart04> 응앗──아──아──응으～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスがラストスパートをかけ、絞り取るように膣をうねらせながら、腰を激しく揺らす。"
translation = "베아트리스가 라스트 스퍼트를 내며, 쥐어짜듯 질을 꿈틀거리며 허리를 격렬하게 흔든다."

[[dialogue]]
speaker = "ベアトリス"
original = "「はぁ、はっ、はっ、あんっ<emoji=heart04>\u3000おち○ちん、奥に──子宮に、当たってますっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んぁあっ<emoji=heart04>」"
translation = "「하아, 핫, 핫, 안<emoji=heart04> 자지, 깊숙이──자궁에, 닿고 있어요<emoji=heart04> 히앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000奥まで届くの、気持ちいいっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイッちゃいますぅっ<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 앗<emoji=heart04> 안쪽까지 닿는 거, 기분 좋아<emoji=heart04> 좋아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 보지 가버려요옷<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「会長さんも、出してっ<emoji=heart04>\u3000出してぇっ<emoji=heart04>\u3000はぁはっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000私のおま○こに、精液いっぱい出してぇっ<emoji=heart04>」"
translation = "「회장님도, 싸줘<emoji=heart04> 싸줘어<emoji=heart04> 하아핫<emoji=heart04> 핫<emoji=heart04> 내 보지에, 정액 잔뜩 싸줘어<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イクイク、イッちゃうぅ～～～～っ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 앗<emoji=heart04> 가<emoji=heart04> 가<emoji=heart04> 보지 가버려<emoji=heart04> 가, 가버려어～～～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが深く腰を沈めると同時、俺もペニスを奥まで突き出して──"
translation = "베아트리스가 깊게 허리를 가라앉힘과 동시에, 나도 페니스를 안쪽까지 밀어 넣어──"

[[dialogue]]
speaker = "ベアトリス"
original = "「んんんっ<emoji=heart04><emoji=heart04>\u3000熱いの、出て──あっ──ひぁああ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으읏<emoji=heart04><emoji=heart04> 뜨거운 거, 나와──앗──히아아아～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふあぁっ<emoji=heart04>\u3000ドクドク出てるっ<emoji=heart04>\u3000注がれてるぅっ<emoji=heart04>\u3000んっ……はあぁっ……<emoji=heart04>\u3000熱いの、奥に染み込んできて……気持ち、いいっ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 울컥울컥 나오고 있어<emoji=heart04> 쏟아지고 있어어<emoji=heart04> 응…… 하아아……<emoji=heart04> 뜨거운 게, 안쪽으로 스며들어서…… 기분, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あっ──あ──ふぁああっ<emoji=heart04>\u3000おま○この中で、おち○ちん、跳ねてるっ……<emoji=heart04>\u3000んんっ……すごいぃ<emoji=heart04>」"
translation = "「앗──아──후아아앗<emoji=heart04> 보지 안에서, 자지, 뛰고 있어……<emoji=heart04> 응…… 대단해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口を亀頭に押し付けて精を受け止めるベアトリス。"
translation = "자궁구를 귀두에 밀착시켜 정을 받아내는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "俺もペニス全体を強く締め付けられながら、歯を食いしばって奥に注ぎ続ける。"
translation = "나도 페니스 전체를 강하게 조여지며, 이를 악물고 안쪽에 계속 쏟아붓는다."

[[dialogue]]
speaker = "ベアトリス"
original = "「んんん～～～っ<emoji=heart04>\u3000会長さんの精液で、子宮、いっぱいになるぅ……<emoji=heart04>\u3000ふああぁ……はあぁ……<emoji=heart04>」"
translation = "「응으으～～～읏<emoji=heart04> 회장님의 정액으로, 자궁, 가득 차버려……<emoji=heart04> 후아아아…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「んっ──んん──んん～～っ<emoji=heart04>\u3000はあぁ……おま○こに射精されるの、気持ち、いいですぅ……<emoji=heart04>」"
translation = "「응──응응──응으～～읏<emoji=heart04> 하아아…… 보지에 사정당하는 거, 기분, 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "意識が焼けるほどの快感が長く続き、ようやくベアトリスの中に出し切った。"
translation = "의식이 타버릴 정도의 쾌감이 길게 이어졌고, 마침내 베아트리스의 안에 전부 쏟아냈다."

[[dialogue]]
speaker = "ベアトリス"
original = "「はあぁ……はぁ……最後までしちゃいましたね……」"
translation = "「하아아…… 하아…… 끝까지 해버렸네요……」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けると、膣口からドロリと精液が垂れてくる。"
translation = "페니스가 빠지자, 질구에서 정액이 주르륵 흘러나온다."

[[dialogue]]
speaker = "unk"
original = "その光景が淫靡で、思わずゾクッと背筋が震えた。"
translation = "그 광경이 음비하여, 나도 모르게 등줄기가 오싹하며 떨렸다."

[[dialogue]]
speaker = "ベアトリス"
original = "「あ……こんなに出してくれたんだ。えへへ……嬉しいです<emoji=heart04>」"
translation = "「아…… 이렇게나 많이 내보내 줬구나. 에헤헤…… 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私、会長さんのこと、好きです。今日のは遊びじゃありません」"
translation = "「저, 회장님을, 좋아해요. 오늘 이건 장난이 아니에요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だけど私はいずれ元居た場所に帰らなくちゃいけません」"
translation = "「하지만 저는 언젠가 원래 있던 곳으로 돌아가야만 해요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「会長さんのこと忘れませんから、私のことも時々思い出してください。時々でいいですから……ね」"
translation = "「회장님을 잊지 않을 테니까, 저를 가끔 떠올려 주세요. 가끔이라도 좋으니까……요」"

[[dialogue]]
speaker = "クロト"
original = "「ベアトリス……」"
translation = "「베아트리스……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ああいやいやっ、別に今日明日帰るわけじゃないんで、というか帰れないんで、そんな悲しそうな顔をしないでください」"
translation = "「아아 아니아니, 딱히 오늘 내일 돌아가는 건 아니니까, 아니 돌아갈 수 없으니까, 그런 슬픈 표정 짓지 마세요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私が帰るのは、当分先のことですよ」"
translation = "「제가 돌아가는 건, 한참 뒤의 일이에요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だからそれまで……たくさんエッチしましょうね<emoji=heart04>」"
translation = "「그러니까 그때까지…… 잔뜩 섹스해요<emoji=heart04>」"

