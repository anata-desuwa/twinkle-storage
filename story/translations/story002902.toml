[[dialogue]]
speaker = "unk"
original = "カティアとヒヨの練習を見守るのはミルフィーに任せて、続いて応援団の練習を見に来た。"
translation = "카티아와 히요의 연습을 밀피에게 맡기고, 이어서 응원단의 연습을 보러 왔다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「フレーッ！\u3000フレーッ！\u3000し・ん・せ・いーーッ！\u3000はいっ！」"
translation = "「프레엣! 프레엣! 시・인・서・엉ーーㅅ! 하잇!」"

[[dialogue]]
speaker_original = "応援団員"
speaker_translation = "응원단원"
original = "「フレッ！\u3000フレッ！\u3000し・ん・せ・いっ！\u3000フレッ！\u3000フレッ！\u3000し・ん・せ・いっ！」"
translation = "「프렛! 프렛! 신・성! 프렛! 프렛! 신・성!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「押せ押せ、新星っ！\u3000イケイケ、新星っ！\u3000もっと声を出せっ！\u3000今から命を燃やせーっ！」"
translation = "「밀어붙여라, 신성! 달려나가라, 신성! 목소리를 더 내! 지금부터 목숨을 불태워라ー!」"

[[dialogue]]
speaker_original = "応援団員"
speaker_translation = "응원단원"
original = "「はいっ！\u3000押せ押せ、新星っ！\u3000イケイケ、新星ーーっ！」"
translation = "「하잇! 밀어붙여라, 신성! 달려나가라, 신성ーーㅅ!」"

[[dialogue]]
speaker = "unk"
original = "応援団員のフランが今年こそ新星学園を勝たせるべく、燃えるような熱量で応援団を指揮していた。"
translation = "응원단원 프란이 올해야말로 신성 학원을 이기게 하겠다며, 불타는 듯한 열량으로 응원단을 지휘하고 있었다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「応援合戦で勝つのは当然として！\u3000オレたちの魂の応援は、時に競技の勝敗を分ける！」"
translation = "「응원 대결에서 이기는 건 당연하고! 우리들의 영혼의 응원은, 때로는 경기의 승패를 가른다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレたちの声は、選手たちの魂を奮い起こす！\u3000たった１センチが勝負を決める過酷な世界で、背中を押すのはオレたちの声だ！」"
translation = "「우리들의 목소리는, 선수들의 영혼을 분발시킨다! 단 1센티미터가 승부를 결정하는 가혹한 세계에서, 등을 밀어주는 것은 우리들의 목소리다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「たった１センチに屈した悔し涙を何度も見てきた！\u3000勝ちを掴んだ１センチの嬉し涙もまた何度も見てきた！」"
translation = "「단 1센티미터에 굴복한 후회의 눈물을 몇 번이나 봐왔다! 승리를 거머쥔 1센티미터의 기쁨의 눈물 또한 몇 번이나 봐왔다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレたちが選手の目に輝かせるのは、どっちの涙だ！？」"
translation = "「우리들이 선수들의 눈에 빛나게 할 눈물은, 어느 쪽의 눈물인가!?」"

[[dialogue]]
speaker_original = "応援団員"
speaker_translation = "응원단원"
original = "「はいっ！\u3000嬉し涙です！」"
translation = "「하잇! 기쁨의 눈물입니다!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「わかっていれば問題なーし！\u3000もう１回、通しでいくぞー！」"
translation = "「알고 있으면 문제없ー지! 다시 한 번, 처음부터 간다ー!」"

[[dialogue]]
speaker_original = "応援団員"
speaker_translation = "응원단원"
original = "「はーーーいっ！」"
translation = "「하ーーー잇!」"

[[dialogue]]
speaker = "unk"
original = "応援団のフランの声は、団員たちをも鼓舞する。流石の手腕だと感心していると──"
translation = "응원단 프란의 목소리는, 단원들마저 고무시킨다. 역시 대단한 수완이라고 감탄하고 있을 때──"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うへ、熱苦しー。見てるこっちが汗かきそ」"
translation = "「우헤, 뜨거워ー. 보고 있는 내가 땀이 날 것 같아」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あれ、会長さんじゃん」"
translation = "「어라, 회장군이잖아」"

[[dialogue]]
speaker = "unk"
original = "美鶴がどうして……？"
translation = "미츠루가 왜……?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はは、うちがここにいるのはおかしい、って顔してんね。だよね、応援団とかうちのキャラじゃないよねー」"
translation = "「하하, 내가 여기에 있는 게 이상하다, 라는 표정이네. 그렇지, 응원단 같은 건 내 캐릭터가 아니지ー」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ま、簡単な話でさ。うち服飾やってるから、今年のチアガール衣装の制作、頼まれたの」"
translation = "「뭐, 간단한 이야기야. 내가 복식을 하고 있으니까, 올해 치어걸 의상 제작을 부탁받았어」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「チア衣装は星騎士用の人工戦闘服になってるから、仕立てるの大変だったんだよねー。使いこなせるかは人次第だけど」"
translation = "「치어 의상은 성기사용 인공 전투복으로 되어 있어서, 재단하기 힘들었지ー. 잘 다룰 수 있을지는 사람 나름이지만」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「今チアの子たちが着てるやつがそう。昨日、納品したばっかだから、着て練習してるところを直に見に来たってわけ」"
translation = "「지금 치어걸들이 입고 있는 게 그거야. 어제 막 납품했으니까, 입고 연습하는 모습을 직접 보러 온 거지」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さんの目から見てどう？」"
translation = "「회장군의 눈으로 봤을 땐 어때?」"

[[dialogue]]
speaker = "unk"
original = "（ちょっと露出多めだけど……）"
translation = "（좀 노출이 많긴 하지만……）"

[[dialogue]]
speaker = "unk"
original = "躍動感があって素晴らしいね！"
translation = "약동감이 있어서 훌륭하네!"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さんが満足そうならアレでいいのかな……」"
translation = "「회장군이 만족하는 것 같으면 그걸로 된 건가……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んー……完成した時はまあまあだと思ってたんだけどさ。こうして見ると、イマイチしっくりきてなくて」"
translation = "「음ー…… 완성했을 때는 그럭저럭이라고 생각했는데. 이렇게 보니, 뭔가 영 마음에 안 들어서」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なんでかな。会長さん、わかる？」"
translation = "「왜일까. 회장군, 알겠어?」"

[[dialogue]]
speaker = "unk"
original = "気になるなら、美鶴も着てみたら？"
translation = "신경 쓰인다면, 미츠루도 입어보는 건 어때?"

[[dialogue]]
speaker = "unk"
original = "俺にはよくわかんないけど……"
translation = "나는 잘 모르겠지만……"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え？\u3000うちがチア衣装着るの？」"
translation = "「에? 내가 치어 의상을 입으라고?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちはチアしないんだけど……ま、試しに着てみたら、今まで気づかなかったことにも気付くかもしんないか」"
translation = "「나는 치어는 안 하지만…… 뭐, 시험 삼아 입어보면, 지금까지 눈치채지 못했던 것도 알게 될지도 모르겠네」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それじゃ会長さん、教室行こっか」"
translation = "「그럼 회장군, 교실로 갈까」"

[[dialogue]]
speaker = "unk"
original = "なんで教室に？"
translation = "왜 교실로?"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いやだって、外でお着替えすんのは流石に恥ずいじゃん。会長さん、うちを辱める趣味とかあんの？」"
translation = "「아니, 밖에서 옷 갈아입는 건 아무리 그래도 부끄럽잖아. 회장군, 나를 욕보이는 취미라도 있는 거야?」"

[[dialogue]]
speaker = "unk"
original = "ノーコメントで"
translation = "노 코멘트"

[[dialogue]]
speaker = "unk"
original = "ないよ！"
translation = "없어!"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふーん……怪しい……」"
translation = "「흐음…… 수상한데……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ま、その辺の追及はまた後でするとして……ほら、うちの教室こっちだから」"
translation = "「뭐, 그 부분에 대한 추궁은 나중에 하기로 하고…… 자, 내 교실은 이쪽이니까」"

[[dialogue]]
speaker = "unk"
original = "美鶴に腕を引かれ、俺は校舎へと向かうのだった。"
translation = "미츠루에게 팔을 이끌려, 나는 교사로 향하는 것이었다."

