[[dialogue]]
speaker = "unk"
original = "第２話,普通の女の子,P"
translation = "제2화, 평범한 소녀, P"

[[dialogue]]
speaker = "unk"
original = "昼食時、花織はサチに連れられて、学園のカフェテリアにやってきた。"
translation = "점심시간, 카오리는 사치에게 이끌려 학원의 카페테리아에 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "話によると、ここあはプリムラと一緒に街ブラ、いろははトレジアンナの部屋に入り浸ってアニメを鑑賞しているらしい。"
translation = "이야기에 따르면, 코코아는 프리뮬라와 함께 시내 구경, 이로하는 트레지안나의 방에 틀어박혀 애니메이션을 감상하고 있는 모양이다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「それじゃサチちゃんが頼りにしてるっていう人は、新星学園ってとこの会長さんなんだ」"
translation = "「그럼 사치짱이 의지하고 있다는 사람은, 신성 학원이라는 곳의 회장님이구나」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そうなんです。でも今、遠征があって流星市国を離れてしまっていて……」"
translation = "「맞아요. 하지만 지금은 원정이 있어서 유성 시국을 떠나 계셔서……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ふーん、それじゃサチちゃんも不安だね」"
translation = "「흐음, 그럼 사치짱도 불안하겠네」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「まあ多少そういった部分もありますが、お兄さ……いえ、会長不在の今、私が頑張らなくちゃって思うので」"
translation = "「뭐, 어느 정도 그런 부분도 있습니다만, 오빠…… 아니, 회장님이 부재중인 지금, 제가 힘내야 한다고 생각하니까요」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「いいって、普段通りの呼び方で。『お兄さん』って呼んでるんでしょ？」"
translation = "「괜찮대두, 평소대로 불러. 『오빠』라고 부르지?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「兄妹という訳ではないので、混乱してはいけないと思ったのですが……いつも通りで良いというのであれば、お言葉に甘えて」"
translation = "「남매인 건 아니라서 혼란을 주면 안 된다고 생각했습니다만…… 평소대로도 괜찮다면, 호의에 감사히 따를게요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「せっかくなのでお兄さんのこと、花織さんたちにもご紹介したかったです……」"
translation = "「기왕이면 오빠를 카오리 씨 일행에게도 소개해 드리고 싶었어요……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「いろいろ事情があるみたいだし、仕方ないって」"
translation = "「여러 사정이 있는 것 같으니 어쩔 수 없지」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "（でも、そっか……サチちゃんにとってその人は、ウチらにとってのオムちゃんみたいな存在なのかな……）"
translation = "（하지만 그렇구나…… 사치짱에게 그 사람은, 우리에게 오무짱 같은 존재인 걸까……）"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「サチちゃんは、本当にすごいね……」"
translation = "「사치짱은 정말 대단하네……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ、急にどうしたんですか？」"
translation = "「엣, 갑자기 왜 그러세요?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「だって頼りにしてた人がいないって、ウチらとあんまり変わんない状況ってことでしょ？」"
translation = "「그치만 의지하던 사람이 없다는 건, 우리랑 별반 다를 게 없는 상황이라는 거잖아?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「それなのに、ウチらのことにちゃんと気を配ってくれて、芯が強くてしっかり者なんだなって」"
translation = "「그런데도 우리를 잘 챙겨주고, 심지가 굳고 야무진 사람이라는 게 느껴져서」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そ、そんなこと言われたら恥ずかしくなっちゃいますよ！\u3000うぅぅ……」"
translation = "「그, 그런 말을 들으면 부끄러워져요! 으으으……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あはは、ごめんね」"
translation = "「아하하, 미안해」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「花織さんこそしっかりしていて、すごい人だと思います！」"
translation = "「카오리 씨야말로 야무지시고, 대단한 분이라고 생각해요!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ウチが？」"
translation = "「내가?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「今の状況を楽観的にならずにちゃんと受け止めて、これからどうすべきか行動を考えているように感じます」"
translation = "「지금 상황을 낙관적으로 보지 않고 제대로 받아들여서, 앞으로 어떻게 해야 할지 행동을 고민하고 계신 것 같아요」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「まあ、いろはは基本あんな感じだし、ここあさんもたまに衝動的に行動するところがあるから……」"
translation = "「뭐, 이로하는 기본적으로 저런 느낌이고, 코코아 씨도 가끔 충동적으로 행동하는 면이 있으니까……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「オムちゃんがいない今、そういうのを考えるのはウチの役目かなって」"
translation = "「오무짱이 없는 지금, 그런 걸 생각하는 건 내 역할일까 싶어서」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そういうサチちゃんも、ウチと似たようなポジションになることが多いんじゃない？」"
translation = "「그런 사치짱도 나랑 비슷한 포지션이 될 때가 많지 않아?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「プリムラちゃんは猪突猛進って感じだし、トレジアンナさんもシズハちゃんも割と自由人って感じの性格みたいだから」"
translation = "「프리뮬라짱은 저돌맹진이라는 느낌이고, 트레지안나 씨나 시즈하 씨도 꽤 자유인 같은 성격인 것 같으니까」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そうかもしれませんね……私と花織さんって、似てるのかも」"
translation = "「그럴지도 모르겠네요…… 저와 카오리 씨, 닮았을지도요」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「うーん、それはどうかな？\u3000ウチと一緒って言っちゃうと、サチちゃんに申し訳ないかも」"
translation = "「으음, 그건 어떠려나? 나랑 똑같다고 말해버리면 사치짱한테 미안할지도」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「サチちゃんって主人公感があるっていうか、ちゃんと特別な人のオーラを持ってるからなぁ」"
translation = "「사치짱은 주인공 같은 느낌이랄까, 제대로 특별한 사람의 오라를 가지고 있으니까 말이야」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私がですか？\u3000そんなこと無いと思うんですけど……」"
translation = "「제가요? 전 그렇지 않다고 생각하는데요……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「だってほら、プリマステラ……だっけ？\u3000星騎士の人たちの中でも、特にすごい存在なんでしょ？」"
translation = "「그치만 봐봐, 프리마 스텔라……였나? 성기사들 중에서도 특히 대단한 존재잖아?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「それに附属校でも生徒会長やってて、輝いてるっていうか……ウチとは全然違うよ」"
translation = "「게다가 부속 학교에서도 학생회장을 맡고 있고, 빛나고 있다고 해야 하나…… 나랑은 완전히 달라」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「輝いてる……んー……花織さんは、輝いてないんですか？」"
translation = "「빛나고 있다…… 음…… 카오리 씨는 빛나지 않나요?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「全く輝いてないってことは無いけど、フツーだって思ってるかな。ウチは、いろはやここあさんと違って、どこにでもいるような普通の女の子だから」"
translation = "「전혀 안 빛나는 건 아니지만, 평범하다고 생각하거든. 나는 이로하나 코코아 씨랑 다르게 어디에나 있을 법한 평범한 여자애니까」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……あれ？\u3000普通の女の子……私の知っている方が、口癖のように言っている言葉のような……」"
translation = "「……어라? 평범한 여자애…… 제가 아는 분이 입버릇처럼 하는 말 같은데……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そんな人がいるの？」"
translation = "「그런 사람이 있어?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい。その人もお兄さんと一緒で、今は流星市国にいないんですけど」"
translation = "「네. 그분도 오빠와 마찬가지로 지금은 유성 시국에 안 계시지만요」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そっか～、話してみたかったかも。なんか話が合いそうだし」"
translation = "「그렇구나~ 이야기 나눠보고 싶었을지도. 왠지 말이 잘 통할 것 같고」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「その方も自分の『普通さ』を気にしていらっしゃっていて、常々、普通な自分から脱却しようとあれこれ模索しています」"
translation = "「그분도 자신의 『평범함』을 신경 쓰고 계셔서, 늘 평범한 자신에게서 탈피하려고 이것저것 모색하고 계세요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ですが、私から見るとその方も十分に特別で、それに気付いていないのは本人だけ……」"
translation = "「하지만 제가 보기엔 그분도 충분히 특별하고, 그걸 깨닫지 못하는 건 본인뿐……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あ～、だとしたらウチの場合はちょっと違うかな～」"
translation = "「아~ 그렇다면 내 경우는 좀 다르려나~」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「別にウチは普通であることが悪いことだとは思ってないよ？\u3000むしろ普通であることを求めてるっていうか……」"
translation = "「딱히 나는 평범한 게 나쁜 거라고 생각하진 않거든? 오히려 평범하기를 원한다고 해야 하나……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「魔法少女になったのも成り行きっていうか、いろはに流されてだったんだけど、戻れるなら普通の生活に戻りたいなって思ってるくらい」"
translation = "「마법 소녀가 된 것도 어쩌다 보니랄까, 이로하한테 휩쓸려서였는데, 돌아갈 수 있다면 평범한 생활로 돌아가고 싶다고 생각할 정도야」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「普通に大学に行って、普通に就職して、普通に結婚して……そういうフツーの人生が、結局一番いいんだから」"
translation = "「평범하게 대학 가고, 평범하게 취직하고, 평범하게 결혼하고…… 그런 평범한 인생이 결국 제일 좋으니까」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とにかくウチにとって『普通である』ってことは、一種のステータスなんだよね」"
translation = "「아무튼 나한테 있어서 『평범하다』는 건 일종의 스테이터스거든」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「って、何でこんな純真な年下の子に、夢の無いことを吹き込んでるんだか！\u3000本当にごめんね！」"
translation = "「근데 왜 이렇게 순진한 연하 애한테 꿈도 희망도 없는 소리를 늘어놓고 있는 건지! 정말 미안해!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いえいえ。でも、そうなんですね……わかりました」"
translation = "「아니에요. 하지만 그렇군요…… 알겠습니다」"

[[dialogue]]
speaker = "unk"
original = "そう答えたサチだったが、普通であることにこだわっているように見える花織のスタンスに、まだ少しだけ納得できないものを感じるのだった。"
translation = "그렇게 대답한 사치였지만, 평범함에 집착하는 듯한 카오리의 스탠스에 아직 조금 납득할 수 없는 기분을 느끼고 있었다."

