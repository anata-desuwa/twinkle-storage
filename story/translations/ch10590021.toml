[[dialogue]]
speaker = "unk"
original = "第１話,カイチョーとクリスマス,P"
translation = "제1화, 회장님과 크리스마스, P"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ラッシャッセー！」"
translation = "「랏샤세!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「い、いらっしゃいませー……」"
translation = "「어, 어서 오세요……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ヨウコソ！\u3000リゾート結界・クリスマスバージョンです！」"
translation = "「어서 오세요! 리조트 결계 크리스마스 버전임다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「今までは夏しかリゾート結界を調整デキませんでしたが、チョットなら変えられるようにナリました♪」"
translation = "「지금까지는 여름으로만 리조트 결계를 조정할 수 있었슴다만, 조금이라면 바꿀 수 있게 되었슴다♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「大きなチェンジはデキませんが、クリスマスらしくスルくらいならヨユーでーす！」"
translation = "「큰 체인지는 안 되지만, 크리스마스 분위기를 내는 정도라면 여유임다~!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「元々リップルさんが持っていた力は、季節とは関係のないものなのかもしれません。それをリップルさんの思い入れの強い“夏”と結びつけることで制御していたのかと」"
translation = "「원래 리플 씨가 가지고 있던 힘은 계절과는 상관없는 것일지도 몰라요. 그것을 리플 씨의 애착이 강한 \"여름\"과 결부시킴으로써 제어하고 있었던 게 아닐까 싶네요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それが、リップルさんの成長に伴ってより細かいコントロールが可能になった……とか？」"
translation = "「그게 리플 씨의 성장에 따라 더 세밀한 컨트롤이 가능해졌다…… 같은 걸까요?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「このままいくと、季節関係なくリゾート結界を自在に操れるようになるかもしれません」"
translation = "「이대로 가면 계절 상관없이 리조트 결계를 자재로 다룰 수 있게 될지도 모르겠네요」"

[[dialogue]]
speaker = "unk"
original = "（それはそれでちょっと不安かも……）"
translation = "(그건 그것대로 좀 불안할지도……)"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョー？\u3000モネ？\u3000ドウしましたか？」"
translation = "「회장님? 모네? 무슨 일 있슴까?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、いえ、なんでもないですっ」"
translation = "「아, 아니요, 아무것도 아니에요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（リップルさんに悪気はないので、私と会長とで見守っていきましょう）"
translation = "(리플 씨에게 악의는 없으니까, 저와 회장님이 지켜봐 주도록 해요)"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（だけどこの前は、海が苦手な私と本のために結界を調整してくれました。私たちが想像しているような最悪の事態にはならないと思いますよ）"
translation = "(그래도 지난번에는 바다를 싫어하는 저와 책을 위해 결계를 조정해 줬잖아요. 우리가 상상하는 최악의 사태는 벌어지지 않을 거예요)"

[[dialogue]]
speaker = "unk"
original = "……うん、そうだね"
translation = "……응, 그렇네"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソシテ！\u3000ワタシとモネもクリスマスバージョンです！\u3000ミテください、カイチョー！」"
translation = "「그리고! 저와 모네도 크리스마스 버전임다! 보세요, 회장님!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フフーン♪\u3000ドウですか？」"
translation = "「후훙♪ 어떻슴까?」"

[[dialogue]]
speaker = "unk"
original = "サンタ……というよりプレゼント？"
translation = "산타……라기보다 선물?"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000サンタといえばプレゼント……というコトで、ワタシがプレゼントにナリました！」"
translation = "「네! 산타 하면 선물……이라는 걸로, 제가 선물이 되었슴다!」"

[[dialogue]]
speaker = "unk"
original = "（露出がすごいけど）とってもカワイイ！"
translation = "(노출이 심하지만) 정말 귀여워!"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「デスよね～♪\u3000ワタシもオキニイリです！」"
translation = "「그렇죠~♪ 저도 마음에 듬다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョーにワタシをプレゼントでーす！\u3000ギュ～っとハグしちゃいまーす！」"
translation = "「회장님께 저를 선물로 드림다! 꽉~ 하고 허그하겠슴다!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「わわ、ほとんど裸なのにそんなに密着したら……」"
translation = "「와와, 거의 알몸인데 그렇게 밀착하면……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「キスもプレゼントしちゃいまーす♪\u3000ホッペタに……ちゅっ<emoji=heart04>」"
translation = "「키스도 선물하겠슴다♪ 볼에…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リップルさん、大胆……！？」"
translation = "「리플 씨, 대담해……!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あっ、会長が真っ赤になってますっ！？\u3000リップルさん、一旦ストップです！」"
translation = "「앗, 회장님이 새빨개졌어요!? 리플 씨, 일단 스톱이에요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アレ？\u3000結界の中、暑かったデスか？\u3000温度チョウセイしましょうか？」"
translation = "「어라? 결계 안이 더운 검까? 온도 조정할까요?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そういうことじゃないです……」"
translation = "「그런 문제가 아니에요……」"

[[dialogue]]
speaker = "unk"
original = "（理性がどうにかなりそうだった……）"
translation = "(이성이 어떻게 될 것 같았어……)"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョー、モネの水着もカワイイから見てアゲテください！」"
translation = "「회장님, 모네 수영복도 귀여우니까 봐주세요!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私は見なくていいですから～っ」"
translation = "「저는 안 봐도 되니까요~!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あの、リップルさん、戦闘服の話はいいですから本題を……」"
translation = "「저기, 리플 씨, 전투복 이야기는 됐으니까 본론을……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オー、ソウでした！\u3000カイチョーに聞きたいコトあるんでした！」"
translation = "「오, 그랬슴다! 회장님께 여쭤보고 싶은 게 있었슴다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシはエンドレスサマーを大きくするために、クリスマスについてモネとチョウサしているのです」"
translation = "「저는 엔들리스 서머를 크게 만들기 위해 크리스마스에 대해 모네와 조사하고 있슴다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソコで、カイチョーのクリスマスの過ごし方を聞きたいんです。今までカイチョーはどんなクリスマスを過ごしていたんデスか？」"
translation = "「그래서 회장님의 크리스마스 보내는 법을 듣고 싶슴다. 지금까지 회장님은 어떤 크리스마스를 보내오셨슴까?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フムフム……家族と過ごすコトが多いんデスね。チキンやケーキを食べて……オー、やっぱりチキンは人気デスね！」"
translation = "「흠흠…… 가족과 보내는 일이 많군뇨. 치킨이나 케이크를 먹으면서…… 오, 역시 치킨은 인기 있네용!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アルバイトしているコトもあった……？\u3000オ～、ナルホド、さすがカイチョーです。ちなみにどんなアルバイトしてたんデスか？」"
translation = "「아르바이트를 하고 있었던 적도 있었다……? 오~, 과연, 역시 회장님입니당. 참고로 어떤 아르바이트를 하셨나용?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「サンタになってプレゼントを配る……？\u3000ナント！\u3000カイチョーもサンタだったのですか！？」"
translation = "「산타가 되어 선물을 나눠준다……? 세상에! 회장님도 산타였나용!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「他にはケーキを作ったり、ハンバイしたり……ナルホド、いろんなアルバイトがあるんですね！」"
translation = "「그 외에는 케이크를 만들거나, 판ㅁ, 판매하거나…… 과연, 여러 가지 아르바이트가 있군뇨!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私も基本は家族と一緒でしたね。家族みんなで海外旅行に行ったこともありましたけど、疲れちゃって、結局毎年家になりました」"
translation = "「저도 기본은 가족과 함께였어요. 가족 다 같이 해외여행을 간 적도 있었지만, 지쳐버려서 결국 매년 집에서 보내게 되었죠」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「へー、リョコウもアリなんですね！\u3000オモシロイです！」"
translation = "「헤에, 여행도 가능한 거군뇨! 재밌네용!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「もちろん、特別な仲の人と過ごすのもいいと思いますよ」"
translation = "「물론, 특별한 사이인 사람과 보내는 것도 좋다고 생각해요」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「特別な仲……」"
translation = "「특별한 사이……」"

[[dialogue]]
speaker = "unk"
original = "リップルと目が合って、その瞬間、顔が熱くなるのを感じた。"
translation = "리플과 눈이 마주치고, 그 순간 얼굴이 뜨거워지는 것을 느꼈다."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「特別ならやっぱり……カイチョーですね」"
translation = "「특별하다면 역시…… 회장님이네용」"

[[dialogue]]
speaker = "unk"
original = "クリスマスにデートしようか"
translation = "「크리스마스에 데이트할까」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000ワタシもデートしたいです！」"
translation = "「하잇! 저도 데이트하고 싶어용!」"

[[dialogue]]
speaker = "unk"
original = "何を隠そう、俺たちは恋人同士。彼女とデートするのに何らはばかる必要はない。"
translation = "뭐라고 숨기랴, 우리들은 연인 사이. 그녀와 데이트하는 데 그 무엇도 거리낄 필요는 없다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ふふ、良かったですね、リップルさん」"
translation = "「후후, 잘됐네요, 리플 씨」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000フフフ～ン♪\u3000カイチョーとのデート、ＢＩＧタノシミです♪」"
translation = "「하잇♪ 후후후~운♪ 회장님과의 데이트, BIG 기대돼용♪」"

[[dialogue]]
speaker = "unk"
original = "リップルとのデートが待ち遠しくて、早くクリスマスになってほしいと思うのだった。"
translation = "리플과의 데이트가 몹시 기다려져서, 빨리 크리스마스가 되었으면 하고 생각하는 것이었다."

