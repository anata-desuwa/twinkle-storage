[[dialogue]]
speaker = "unk"
original = "『コハルコ先輩が失踪した』とリーリアから報せを受け、秋葉原へと急行する。"
translation = "『코하루코 선배가 실종되었다』는 리리아의 소식을 듣고 아키하바라로 급히 향한다."

[[dialogue]]
speaker = "unk"
original = "すると彼女の上官であるマリオンも同時に到着していた。"
translation = "그러자 그녀의 상관인 마리온도 동시에 도착해 있었다."

[[dialogue]]
speaker = "マリオン"
original = "「会長様もいらっしゃいましたね。……リーリア、状況の説明を」"
translation = "「회장님도 오셨군요. ……리리아, 상황 설명을.」"

[[dialogue]]
speaker = "リーリア"
original = "「はい。失踪時、コハルコ先輩は若い女と一緒でした。私たち学園の生徒と同じくらいです。先日の事件を考えると、コラプサーの一味かと思われます」"
translation = "「네. 실종 당시 코하루코 선배는 젊은 여자와 함께였습니다. 우리 학원 학생들과 비슷한 또래였어요. 요 전의 사건을 생각하면 콜랩서의 일당인 것 같습니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「追跡を試みましたが、コハルコ先輩から攻撃を受け、叶いませんでした。……すみません、センパイ。私がついていながら……」"
translation = "「추적을 시도했지만, 코하루코 선배에게 공격을 받아 실패했습니다. ……죄송해요, 선배. 제가 곁에 있었는데도……」"

[[dialogue]]
speaker = "unk"
original = "リーリアのせいじゃない"
translation = "리리아 탓이 아니야"

[[dialogue]]
speaker = "リーリア"
original = "「……すみません、本当に」"
translation = "「……죄송합니다, 정말로.」"

[[dialogue]]
speaker = "リーリア"
original = "「ですが、コハルコ先輩が洗脳や催眠を受けた様子はありませんでした。自分の意思でコラプサーについていったとしか思えません」"
translation = "「하지만 코하루코 선배가 세뇌나 최면을 당한 기색은 없었습니다. 본인의 의지로 콜랩서를 따라갔다고밖에는 생각되지 않아요.」"

[[dialogue]]
speaker = "リーリア"
original = "「……最後に言っていたんです。『家族を守りたい』って」"
translation = "「……마지막에 말했어요. 『가족을 지키고 싶어』라고.」"

[[dialogue]]
speaker = "マリオン"
original = "「今の話で確信しました。コハルコ様がターゲットと聞いたときからもしやと思っていましたが……コラプサーの黒幕は私の想定していた人物です」"
translation = "「방금 이야기로 확신했습니다. 코하루코 님이 타겟이라는 말을 들었을 때부터 설마 했지만…… 콜랩서의 흑막은 제가 상정했던 인물입니다.」"

[[dialogue]]
speaker = "マリオン"
original = "「通称『追憶の魔女』……我々ネビュラの破戒者です」"
translation = "「통칭 『추억의 마녀』…… 우리 네뷸라의 파계자입니다.」"

[[dialogue]]
speaker = "unk"
original = "コハルコがレイラに連れ去られ、辿り着いたのは秋葉原近くの廃教会だった。"
translation = "코하루코가 레이라에게 끌려가 도착한 곳은 아키하바라 근처의 폐교회였다."

[[dialogue]]
speaker = "コハルコ"
original = "（こんなところにコラプサーが居たんだ……灯台下暗しだなぁ……）"
translation = "（이런 곳에 콜랩서가 있었구나…… 등잔 밑이 어둡다니까……）"

[[dialogue]]
speaker = "レイラ"
original = "「戻りました、イザベラさん」"
translation = "「돌아왔습니다, 이자벨라 씨.」"

[[dialogue]]
speaker = "イザベラ"
original = "「ご苦労様、レイラ。待っていたわ」"
translation = "「수고했어, 레이라. 기다리고 있었단다.」"

[[dialogue]]
speaker = "コハルコ"
original = "（この人は……！？\u3000私に瓜二つ……どうなってるの？）"
translation = "（이 사람은……!? 나랑 판박이야…… 어떻게 된 거지?）"

[[dialogue]]
speaker = "イザベラ"
original = "「くっ……うぅ……」"
translation = "「큭…… 으으……」"

[[dialogue]]
speaker = "レイラ"
original = "「また頭痛ですか？」"
translation = "「또 두통인가요?」"

[[dialogue]]
speaker = "イザベラ"
original = "「いつものことよ、気にしなくていいわ。それより……」"
translation = "「늘 있는 일이야, 신경 쓸 거 없어. 그보다……」"

[[dialogue]]
speaker = "レイラ"
original = "「ええ、すぐに出ます。ではお気を付けて」"
translation = "「네, 곧 나갈게요. 그럼 조심하세요.」"

[[dialogue]]
speaker = "イザベラ"
original = "「……久しぶりね、<ruby>複製<rt>イミタティオ</rt></ruby>。あなたは赤ん坊だったから憶えていないだろうけど」"
translation = "「……오랜만이네, 복제. 너는 아기였으니까 기억하지 못하겠지만.」"

[[dialogue]]
speaker = "コハルコ"
original = "（イミタ……？\u3000私のこと、だよね？）"
translation = "（이미타……? 나를 말하는 거겠지?）"

[[dialogue]]
speaker = "イザベラ"
original = "「私は魔女のイザベラ」"
translation = "「나는 마녀 이자벨라.」"

[[dialogue]]
speaker = "イザベラ"
original = "「訊きたいことはあるでしょうけど、それに答える前にいくつか確認をしましょう」"
translation = "「묻고 싶은 게 많겠지만, 대답하기 전에 몇 가지 확인을 하자꾸나.」"

[[dialogue]]
speaker = "イザベラ"
original = "「ネビュラと付き合っているんだから、魔女については知っているわよね？\u3000……じゃあ、光の魔女については？」"
translation = "「네뷸라와 어울리고 있으니 마녀에 대해서는 알고 있겠지? ……그럼, 빛의 마녀에 대해서는?」"

[[dialogue]]
speaker = "コハルコ"
original = "「魔女を束ねる存在、強大な力を持った魔女ということは聞いています」"
translation = "「마녀를 다스리는 존재, 강대한 힘을 가진 마녀라고 들었어요.」"

[[dialogue]]
speaker = "イザベラ"
original = "「間違ってはいないわね。でも、それだけじゃないわ」"
translation = "「틀린 건 아니야. 하지만 그게 다가 아니지.」"

[[dialogue]]
speaker = "イザベラ"
original = "「光の魔女とは、魔女という種族そのものよ」"
translation = "「빛의 마녀란, 마녀라는 종족 그 자체야.」"

[[dialogue]]
speaker = "イザベラ"
original = "「初代の光の魔女ディアナは結界により魔女の森を隔離し、リクリエから守った。それ以来、光の魔女は代々、森の結界を更新し続けてきた」"
translation = "「초대 빛의 마녀 디아나는 결계로 마녀의 숲을 격리해 리크리에로부터 지켜냈어. 그 이후로 빛의 마녀는 대대로 숲의 결계를 갱신해 왔지.」"

[[dialogue]]
speaker = "イザベラ"
original = "「それは結界術に優れる魔女の中でも、光の魔女にしかできないことよ。光の魔女がいなければ魔女は存続できない」"
translation = "「그건 결계술에 뛰어난 마녀 중에서도 빛의 마녀만이 할 수 있는 일이야. 빛의 마녀가 없으면 마녀는 존속할 수 없어.」"

[[dialogue]]
speaker = "イザベラ"
original = "「では、もし光の魔女が生まれてこなければ？\u3000結界は解け、魔女の森はリクリエに飲み込まれてしまうでしょう」"
translation = "「그럼 만약 빛의 마녀가 태어나지 않는다면? 결계는 풀리고 마녀의 숲은 리크리에에 삼켜지고 말겠지.」"

[[dialogue]]
speaker = "イザベラ"
original = "「ゆえに魔女の歴史の中には、光の魔女を人工的に生み出す研究があった。結局は闇に葬られたけど」"
translation = "「그렇기에 마녀의 역사 속에는 빛의 마녀를 인공적으로 만들어내는 연구가 있었어. 결국은 어둠 속에 파묻혔지만.」"

[[dialogue]]
speaker = "イザベラ"
original = "「私は『追憶の魔女』。歴史を読み解き、古い技術や魔法を復元する仕事をしていたわ。人間風に言うと、考古学者というやつね」"
translation = "「나는 『추억의 마녀』. 역사를 해독하고 오래된 기술이나 마법을 복원하는 일을 했었지. 인간식으로 말하면 고고학자라는 거야.」"

[[dialogue]]
speaker = "イザベラ"
original = "「禁じられた研究を蘇らせ、私は生み出した。人造の光の魔女を」"
translation = "「금지된 연구를 부활시켜, 내가 만들어냈지. 인조 빛의 마녀를.」"

[[dialogue]]
speaker = "コハルコ"
original = "「…………まさか」"
translation = "「…………설마.」"

[[dialogue]]
speaker = "イザベラ"
original = "「察しがよくて助かるわ。そう、あなたは先代の光の魔女・トリュファイナの力を受け継ぐ器として造られた──」"
translation = "「눈치가 빨라서 다행이네. 그래, 너는 선대 빛의 마녀 트류파이나의 힘을 이어받을 그릇으로 만들어진──」"

[[dialogue]]
speaker = "イザベラ"
original = "「光の魔女の<ruby>複製体<rt>レプリカ</rt></ruby>よ」"
translation = "「빛의 마녀의 복제체야.」"

[[dialogue]]
speaker = "コハルコ"
original = "「…………っ！？\u3000私が……<ruby>複製体<rt>レプリカ</rt></ruby>……？」"
translation = "「…………윽!? 내가…… 복제체……?」"

[[dialogue]]
speaker = "イザベラ"
original = "「光の魔女を人為的に生み出すアプローチはふたつあった。ひとつは光の魔女のクローンを生み出すこと、もうひとつは普通の魔女に光の魔女の力を宿すこと」"
translation = "「빛의 마녀를 인위적으로 만들어내는 접근법은 두 가지가 있었어. 하나는 빛의 마녀의 클론을 만드는 것, 또 하나는 일반 마녀에게 빛의 마녀의 힘을 깃들게 하는 것.」"

[[dialogue]]
speaker = "イザベラ"
original = "「私はそのふたつを組み合わせた。私の遺伝子をベースに、トリュファイナの力を植え付けたのがあなたよ。オリジナルほどではないでしょうけど、機能はするはず」"
translation = "「나는 그 두 가지를 조합했어. 내 유전자를 베이스로 트류파이나의 힘을 심은 게 너야. 오리지널만큼은 아니겠지만 기능은 할 거야.」"

[[dialogue]]
speaker = "イザベラ"
original = "「あなたを核として儀式を行い、新たに結界を形成。その結界でこの世界を覆い、リクリエを回避する。これが私の計画よ」"
translation = "「너를 핵으로 삼아 의식을 치르고 새로이 결계를 형성. 그 결계로 이 세계를 덮어 리크리에를 회피한다. 이것이 내 계획이야.」"

[[dialogue]]
speaker = "コハルコ"
original = "「……それが可能なら、魔女たちがすでに達成しているのでは？」"
translation = "「……그게 가능하다면 마녀들이 이미 달성하지 않았을까요?」"

[[dialogue]]
speaker = "イザベラ"
original = "「まあ当然の疑問ね。けれど、私たち魔女が使う魔力には限りがある。魔女全員の力を合わせても、リクリエに対抗するには足りない」"
translation = "「뭐, 당연한 의문이네. 하지만 우리 마녀들이 사용하는 마력에는 한계가 있어. 마녀 전원의 힘을 합쳐도 리크리에에 대항하기엔 부족해.」"

[[dialogue]]
speaker = "イザベラ"
original = "「だから、結界には星力を使うわ」"
translation = "「그래서 결계에는 성력을 사용하겠어.」"

[[dialogue]]
speaker = "イザベラ"
original = "「結界にコラプサーの力を組み込み、地球に降り注ぐ星力を結界の維持に使う。星騎士たちは戦えなくなるけど、モンスターもいなくなるんだから問題ないでしょ？」"
translation = "「결계에 콜랩서의 힘을 편입해 지구로 쏟아지는 성력을 결계 유지에 사용하는 거야. 성기사들은 싸울 수 없게 되겠지만, 몬스터도 없어질 테니 문제없잖아?」"

[[dialogue]]
speaker = "イザベラ"
original = "「以前コラプサーが星騎士を襲っていたのも、結界の起動に必要な星力を集めるためよ」"
translation = "「이전에 콜랩서가 성기사를 습격했던 것도 결계 기동에 필요한 성력을 모으기 위해서였어.」"

[[dialogue]]
speaker = "コハルコ"
original = "（なるほど……それなら確かにコラプサーの目的は『救世』だ）"
translation = "（과연…… 그렇다면 확실히 콜랩서의 목적은 『구세』야.）"

[[dialogue]]
speaker = "コハルコ"
original = "（だけど私の正体が、人間どころか普通の魔女でもないなんて、さすがに思わなかったなぁ……）"
translation = "（하지만 내 정체가 인간은커녕 보통 마녀조차 아니었다니, 역시 생각도 못 했네……）"

[[dialogue]]
speaker = "イザベラ"
original = "「では始めましょう」"
translation = "「그럼 시작하자꾸나.」"

[[dialogue]]
speaker = "unk"
original = "どこからともなく魔法の鎖が伸び、コハルコを拘束する。"
translation = "어디선가 마법의 사슬이 뻗어 나와 코하루코를 구속한다."

[[dialogue]]
speaker = "コハルコ"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "そして廃教会の床に魔法陣が浮かび上がる。幾重にも描かれた、精緻な図形。フィクションなら美しいと思えるのだろうが、現実では違う。"
translation = "그리고 폐교회 바닥에 마법진이 떠오른다. 겹겹이 그려진 정교한 도형. 픽션이라면 아름답다고 생각했겠지만 현실은 다르다."

[[dialogue]]
speaker = "unk"
original = "コハルコの命を結界に変える断頭台だ。"
translation = "코하루코의 목숨을 결계로 바꾸는 단두대다."

[[dialogue]]
speaker = "コハルコ"
original = "（逃げられない……でも、これはこれでいいのかな）"
translation = "（도망칠 수 없어…… 하지만 이건 이것대로 괜찮은 걸까.）"

[[dialogue]]
speaker = "コハルコ"
original = "（家族のいない世界で千年も生きたいとは思わない。その長い命を家族のために使うのなら、私はそれでいい）"
translation = "（가족이 없는 세계에서 천 년이나 살고 싶지는 않아. 그 긴 수명을 가족을 위해 사용하는 거라면, 나는 그걸로 됐어.）"

[[dialogue]]
speaker = "コハルコ"
original = "（お父さん、お母さん、今までありがとう）"
translation = "（아빠, 엄마, 지금까지 고마웠어.）"

[[dialogue]]
speaker = "コハルコ"
original = "（ナツコ、トウコ、元気でね）"
translation = "（나츠코, 토우코, 잘 지내야 해.）"

