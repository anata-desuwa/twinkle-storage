[[dialogue]]
speaker = "unk"
original = "第１１話,終焉と絶望,B"
translation = "제11화, 종언과 절망, B"

[[dialogue]]
speaker = "unk"
original = "滅亡が具現していた。"
translation = "멸망이 구현되어 있었다."

[[dialogue]]
speaker = "unk"
original = "巨大な手の形をした破滅の化身は、“<ruby>世界の再創生<rt>リ・クリエイション</rt></ruby>”という使命のまま、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。"
translation = "거대한 손의 형상을 한 파멸의 화신은 “<ruby>세계의 재창생<rt>리 리크리에이션</rt></ruby>”이라는 사명 그대로, 퇴폐한 황야를 여전히 끝나지 않는 폭거에 휘말리게 한다."

[[dialogue]]
speaker = "unk"
original = "<b>手</b>が指をひとつ動かすだけで、破壊の嵐が吹き荒れる。"
translation = "<b>손</b>이 손가락을 하나 움직이는 것만으로 파괴의 폭풍이 휘몰아친다."

[[dialogue]]
speaker = "unk"
original = "その嵐は、建物を、大地を、これまで積み上げてきた全てを、ただの塵へと変えていく。"
translation = "그 폭풍은 건물을, 대지를, 지금까지 쌓아온 모든 것을 그저 먼지로 바꾸어 놓는다."

[[dialogue]]
speaker = "梨緒"
original = "「立て、フィオナ！\u3000動け！\u3000逃げろっ！！」"
translation = "「일어나, 피오나! 움직여! 도망쳐!!」"

[[dialogue]]
speaker = "unk"
original = "傷つき倒れた友を前にして、思わず叫んでいた。"
translation = "상처 입고 쓰러진 친구를 앞에 두고 나도 모르게 외치고 있었다."

[[dialogue]]
speaker = "unk"
original = "逃げるところなんてないとわかっているはずなのに、叫ばずにはいられなかった。"
translation = "도망칠 곳 따위 없다는 걸 알고 있을 텐데도 외치지 않을 수 없었다."

[[dialogue]]
speaker = "unk"
original = "もう満足に動けないフィオナにとどめを刺すように、<b>手</b>が爪を振り下ろす。"
translation = "이제 제대로 움직이지 못하는 피오나에게 숨통을 끊으려는 듯 <b>손</b>이 발톱을 내리찍는다."

[[dialogue]]
speaker = "フィオナ"
original = "（ごめん、エリシア──私のせいで）"
translation = "（미안해, 엘리시아── 내 탓에）"

[[dialogue]]
speaker = "？？？"
original = "「フィオナ！\u3000フィオナーーーーーッ！！！」"
translation = "「피오나! 피오나아아아아아아!!!」"

[[dialogue]]
speaker = "unk"
original = "フィオナはそれきりピクリとも動かなくなった。"
translation = "피오나는 그 뒤로 손가락 하나 까딱하지 않게 되었다."

[[dialogue]]
speaker = "unk"
original = "しっかり者だけど甘えん坊な、双子の妹の跡を追った。"
translation = "야무지지만 어리광쟁이인 쌍둥이 여동생의 뒤를 쫓았다."

[[dialogue]]
speaker = "梨緒"
original = "「フィオ……ナ……あぁ……うぅ……」"
translation = "「피오……나…… 아아…… 으으……」"

[[dialogue]]
speaker = "unk"
original = "残った戦力だけで、あの破滅の化身に勝とうなんて無理だったのだ。"
translation = "남은 전력만으로 저 파멸의 화신을 이기려 하는 건 무리였다."

[[dialogue]]
speaker = "unk"
original = "最強の星騎士の１人も今逝った。もう勝ち目なんて──"
translation = "최강의 성기사 중 한 명도 지금 떠났다. 이제 승산 따윈──"

[[dialogue]]
speaker = "梨緒"
original = "（いや、私はまだ……生きている……！）"
translation = "（아니, 나는 아직…… 살아있어……!）"

[[dialogue]]
speaker = "unk"
original = "少なくとも、ここにまだ１人星騎士がいる。"
translation = "적어도 여기 아직 한 명의 성기사가 있다."

[[dialogue]]
speaker = "unk"
original = "どうやって勝つのかなんてわからない。それでも勝つ。実力で勝てないのならば、奇跡でも起こせばいい。"
translation = "어떻게 이길지 같은 건 모른다. 그래도 이긴다. 실력으로 이길 수 없다면 기적이라도 일으키면 된다."

[[dialogue]]
speaker = "unk"
original = "そうでなければ、今まで生き残った意味がない……！"
translation = "그러지 않으면 지금까지 살아남은 의미가 없으니까……!"

[[dialogue]]
speaker = "ジグ"
original = "「やぁ生きてるかい、アガサ」"
translation = "「야아, 살아있나 보네, 아가사.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグ！？\u3000まだ生きて……！？」"
translation = "「지그!? 아직 살아……!?」"

[[dialogue]]
speaker = "ジグ"
original = "「すまない、少し気を失っていたようだ。だけど私はまだ戦えるよ」"
translation = "「미안, 잠시 정신을 잃었던 모양이야. 하지만 난 아직 싸울 수 있어.」"

[[dialogue]]
speaker = "unk"
original = "目の前に現れたのは、いつも飄々とした笑みを浮かべる、憎きライバル。"
translation = "눈앞에 나타난 것은 언제나 표표한 미소를 짓는 얄미운 라이벌."

[[dialogue]]
speaker = "unk"
original = "その軽さは窮地でも変わっていないが、全身に負った傷から鮮血が流れ続けている。本来なら即座に撤退しているはずの負傷だ。"
translation = "그 가벼움은 궁지에서도 변함없지만, 전신에 입은 상처에서 선혈이 계속 흐르고 있다. 본래라면 즉시 퇴각해야 할 부상이다."

[[dialogue]]
speaker = "unk"
original = "ろくに傷を負ったところを見たことがない、あのジグが──だ。"
translation = "제대로 상처 입은 모습조차 본 적 없는 그 지그가── 말이다."

[[dialogue]]
speaker = "梨緒"
original = "「私も……まだ、諦めていない……！\u3000この世界を、守るんだ……！」"
translation = "「나도…… 아직 포기하지 않았어……! 이 세계를 지킬 거야……!」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、それでこそアガサだ。倒れていったみんなの分まで頑張ろう」"
translation = "「그래, 그래야 아가사지. 쓰러져 간 모두의 몫까지 힘내보자고.」"

[[dialogue]]
speaker = "unk"
original = "ジグが空に浮かぶディザスターハンドを見据える。"
translation = "지그가 하늘에 떠 있는 디재스터 핸드를 응시한다."

[[dialogue]]
speaker = "unk"
original = "軽薄な笑顔が険しい表情に変わり、見極めるように目を細めて──"
translation = "경박한 웃음이 험악한 표정으로 바뀌고, 가늠하듯 눈을 가늘게 뜨더니──"

[[dialogue]]
speaker = "ジグ"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "<b>それ</b>が現れた。"
translation = "<b>그것</b>이 나타났다."

[[dialogue]]
speaker = "unk"
original = "<b>それ</b>が何かは理解できなかった。"
translation = "<b>그것</b>이 무엇인지는 이해할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "<b>それ</b>は、しいて表現するなら途方もなく巨大な立方体だった。"
translation = "<b>그것</b>은 굳이 표현하자면 터무니없이 거대한 입방체였다."

[[dialogue]]
speaker = "unk"
original = "今まで見てきた何よりも整然としていて、何よりもグロテスクだった。"
translation = "지금까지 보아온 그 무엇보다 정연했고, 그 무엇보다 그로테스크했다."

[[dialogue]]
speaker = "unk"
original = "目が、脳が、本能が、理解を拒む。"
translation = "눈이, 뇌가, 본능이 이해를 거부한다."

[[dialogue]]
speaker = "unk"
original = "<b>それ</b>は見てはならないもの。"
translation = "<b>그것</b>은 보아서는 안 되는 것."

[[dialogue]]
speaker = "unk"
original = "本来なら人の身で触れてはならないものだった。"
translation = "본래라면 인간의 몸으로 건드려서는 안 되는 것이었다."

[[dialogue]]
speaker = "ジグ"
original = "「ぁ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "ジグの目から光が消える。"
translation = "지그의 눈에서 빛이 사라진다."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドを前にしても軽い笑みを浮かべていたジグが、目を見開き、呆然としていた。"
translation = "디재스터 핸드 앞에서도 가벼운 미소를 짓던 지그가 눈을 부릅뜨고 멍하니 서 있었다."

[[dialogue]]
speaker = "unk"
original = "その表情は──絶望だった。"
translation = "그 표정은── 절망이었다."

[[dialogue]]
speaker = "unk"
original = "<b>それ</b>から光の触手が伸びる。"
translation = "<b>그것</b>에서 빛의 촉수가 뻗어 나온다."

[[dialogue]]
speaker = "unk"
original = "触手が目の前まで伸びてきて、ジグに触れた。"
translation = "촉수가 눈앞까지 뻗어와 지그에게 닿았다."

[[dialogue]]
speaker = "unk"
original = "このままではジグが殺される──いや、殺されるのならまだマシかもしれない。"
translation = "이대로는 지그가 살해당한다── 아니, 살해당하는 거라면 차라리 나을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "きっと、もっとおぞましい何かをされる。"
translation = "분명 더 끔찍한 무언가를 당하게 된다."

[[dialogue]]
speaker = "unk"
original = "助けなければ。動かなければ。"
translation = "구해야 해. 움직여야 해."

[[dialogue]]
speaker = "unk"
original = "死んでもいい。体を引き千切られてもいい。だから何かしなければ──"
translation = "죽어도 좋아. 몸이 갈기갈기 찢겨도 좋아. 그러니까 뭐라도 해야──"

[[dialogue]]
speaker = "梨緒"
original = "（そんなの……無理だ）"
translation = "（그런 건…… 무리야）"

[[dialogue]]
speaker = "unk"
original = "勝てない。敵わない。抗えない。"
translation = "이길 수 없어. 당해낼 수 없어. 저항할 수 없어."

[[dialogue]]
speaker = "unk"
original = "あんなのに抗っても無意味だ。無駄だ。勝てるわけがない。"
translation = "저런 것에 저항해 봤자 무의미하다. 헛수고다. 이길 수 있을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "だから……何もできなかった。"
translation = "그래서…… 아무것도 할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "そして<b>それ</b>は星騎士ジグを作り変え──"
translation = "그리고 <b>그것</b>은 성기사 지그를 개조하여──"

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒『ジグ』が生まれた。"
translation = "리크리에의 사도 『지그』가 태어났다."

[[dialogue]]
speaker = "梨緒"
original = "「私は何もできなかった……ジグを助けられなかった……」"
translation = "「나는 아무것도 할 수 없었어…… 지그를 구하지 못했어……」"

[[dialogue]]
speaker = "梨緒"
original = "「いや違う……」"
translation = "「아니, 아냐……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は何もしなかったんだ……」"
translation = "「나는 아무것도 하지 않았던 거야……」"

[[dialogue]]
speaker = "？？？"
original = "「梨緒！」"
translation = "「리오!」"

[[dialogue]]
speaker = "？？？"
original = "「梨緒！\u3000起きて！\u3000目を覚まして！」"
translation = "「리오! 일어나! 눈을 떠!」"

[[dialogue]]
speaker = "？？？"
original = "「梨緒！！！」"
translation = "「리오!!!」"

[[dialogue]]
speaker = "梨緒"
original = "「──ッ」"
translation = "「──윽」"

[[dialogue]]
speaker = "ナターシャ"
original = "「梨緒、目が覚めた？\u3000邪魔してくるガーディアンなら倒したよ」"
translation = "「리오, 정신이 들어? 방해하던 가디언이라면 쓰러뜨렸어.」"

[[dialogue]]
speaker = "梨緒"
original = "「あ、ああ……ありがとう……」"
translation = "「아, 어…… 고마워……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「さっき見えたのは……」"
translation = "「방금 보인 건……」"

[[dialogue]]
speaker = "梨緒"
original = "「ベガの最期の瞬間だ」"
translation = "「베가의 최후의 순간이야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「やっぱり、そうだよね……」"
translation = "「역시 그렇구나……」"

[[dialogue]]
speaker = "unk"
original = "ベガの破滅を目の当たりにして、さすがのナターシャも顔を曇らせていた。"
translation = "베가의 파멸을 목격하고 평소의 나타샤답지 않게 얼굴을 찌푸리고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「私の欠けていた記憶が、何なのか思い出した」"
translation = "「내 결여되어 있던 기억이 무엇인지 기억났어.」"

[[dialogue]]
speaker = "梨緒"
original = "「ベガが滅びた時、私が見たもの。今なら何なのかわかる。あれがきっと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だ」"
translation = "「베가가 멸망했을 때 내가 본 것. 지금이라면 뭔지 알 수 있어. 저게 분명 『<ruby>제로스<rt>XELOS</rt></ruby>』야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「じゃあ梨緒は『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を見て記憶を失ったってこと？」"
translation = "「그럼 리오는 『<ruby>제로스<rt>XELOS</rt></ruby>』를 보고 기억을 잃었다는 거야?」"

[[dialogue]]
speaker = "梨緒"
original = "「いや違う」"
translation = "「아니, 아냐.」"

[[dialogue]]
speaker = "梨緒"
original = "「私は自分が情けなくて、記憶を閉ざしていただけだったんだ」"
translation = "「나는 내 자신이 한심해서 기억을 닫고 있었을 뿐이었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「私はジグを──」"
translation = "「나는 지그를──」"

[[dialogue]]
speaker = "梨緒"
original = "「見捨てたんだ」"
translation = "「버린 거야.」"

