[[dialogue]]
speaker = "unk"
original = "母さんが数日、家を空けることになった。恋人になったマハムートはここぞとばかりに張り切って、俺の家まで料理を作りに来てくれていた。"
translation = "어머니가 며칠간 집을 비우게 되었다. 연인이 된 마하무트는 이때다 싶어 의욕을 내어 우리 집까지 요리를 하러 와주고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、その翌日──"
translation = "그리고 그 다음 날──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ。やれやれ、朝からこんなにして、仕方のない子ね。んっ……全く、放っておけないんだから……<emoji=heart04>」"
translation = "「후훗. 이런이런, 아침부터 이러고 있다니 어쩔 수 없는 아이네. 응…… 정말이지, 내버려 둘 수 없다니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ん……あれ……何だか……股間のあたりが気持ち、良い……？）"
translation = "（음…… 어라…… 왠지…… 가랑이 근처 기분이, 좋아……？）"

[[dialogue]]
speaker = "unk"
original = "微睡みから意識が浮上して来て、瞼を開くと──"
translation = "선잠에서 의식이 떠올라 눈꺼풀을 뜨자──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、寝坊助さん<emoji=heart04>\u3000起きたみたいね」"
translation = "「어머, 잠꾸러기 씨<emoji=heart04> 일어난 모양이네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「何をしているのかって、アナタの<b>これ</b>を面倒見てあげてたのよ。……全く、昨夜あんなに私の中に出しておいて、まだこんな元気があるだなんて」"
translation = "「뭘 하고 있냐니, 너의 <b>이것</b>을 돌봐주고 있었던 거야. ……정말이지, 어젯밤 그렇게 내 안에 잔뜩 싸질러놓고 아직도 이런 기운이 있다니.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……ん？\u3000知っているわよ、それくらい。『朝勃ち』でしょう？」"
translation = "「……응? 알고 있어, 그 정도는. 『아침 발기』지?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「だとしても昨日、一体何回したと思ってるの？\u3000本当、竜並みの絶倫なんだから……」"
translation = "「그렇다 해도 어제 도대체 몇 번이나 했다고 생각하는 거야? 정말, 용만큼이나 절륜하다니까……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……また更に大きくなった……。もしかして、昨日のお泊りエッチを思い出して、興奮しちゃったのかしら？」"
translation = "「응…… 또 다시 커졌어……. 설마, 어제 묵고 가면서 했던 섹스를 떠올리고 흥분해버린 걸까?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ああ、この上着？\u3000アナタの制服のワイシャツを１着、借りたのよ。男が喜ぶらしいって聞いてたから、やってみたけど……ふふっ、どうやら効果はあったみたいね」"
translation = "「아아, 이 상의? 네 교복 와이셔츠를 한 벌 빌렸어. 남자가 좋아한다고 들었길래 해봤는데…… 후훗, 아무래도 효과는 있었나 보네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ただ……んっ、はぁ……<emoji=heart04>\u3000ワイシャツからアナタの匂いがするせいで、竜の血が騒いでムラムラしてしまったのは、誤算だったけれど……んっ<emoji=heart04>」"
translation = "「다만…… 응, 하아……<emoji=heart04> 와이셔츠에서 네 냄새가 나는 바람에, 용의 피가 끓어서 몸이 달아올라 버린 건 오산이었지만…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁ……仕方ないでしょ……前にも説明したけど、竜は生まれつき、性欲が強いんだから……」"
translation = "「하아아…… 어쩔 수 없잖아…… 전에도 설명했지만, 용은 태생적으로 성욕이 강하니까……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それに、アナタだって人間離れした絶倫なんだから、おあいこでしょ……？」"
translation = "「게다가 너도 인간답지 않은 절륜이니까, 피차일반이잖아……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「とにかく……んっ……この私が朝立ち処理をしてあげるって言ってるんだから、畏怖をもって感謝なさい……ふうぅ……」"
translation = "「어쨌든…… 응…… 이 내가 아침 발기 처리를 해주겠다고 하는 거니까, 경외심을 가지고 감사하도록 해…… 후우우……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……<emoji=heart04>\u3000アナタのチ○ポ、大き過ぎるから……挿れる前に、しっかり濡らさないと……はあぁ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 네 자지, 너무 크니까…… 삽입하기 전에 제대로 적셔두지 않으면…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「熱くて固い……<emoji=heart04>\u3000本当、凶悪な大きさよね……ふうぅ、これが私の中に入るの想像すると……んはぁ<emoji=heart04>\u3000竜の血が熱くなって、おま○こが熱くなってきちゃう……<emoji=heart04>」"
translation = "「뜨겁고 단단해……<emoji=heart04> 정말, 흉악한 크기네…… 후우우, 이게 내 안에 들어올 걸 상상하면…… 응하아<emoji=heart04> 용의 피가 뜨거워지고, 보지가 뜨거워져 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ……クリ擦れるの、いいっ……はあぁ……<emoji=heart04>」"
translation = "「앗…… 클리 스치는 거, 좋아…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「アナタのチ○ポ、カリ高で、スマタしてるだけで、愛液どんどん溢れて来ちゃう……ふうぅ……<emoji=heart04>」"
translation = "「너의 자지, 귀두가 높아서 스마타하는 것만으로도 애액이 계속 넘쳐흘러 나와…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、俺が……」"
translation = "「마무, 내가……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……こら、ダメよ。じっとしてなさい……<emoji=heart04>」"
translation = "「응…… 이봐, 안 돼. 가만히 있으렴……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ……この私がせっかく性処理してあげてるんだから。んっ……アナタはそのまま、気持ち良くなってればいいの<emoji=heart04>」"
translation = "「하아앗…… 이 내가 일부러 성처리 해주고 있는 거니까. 응…… 너는 그대로 기분 좋아지기만 하면 돼<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それとも、もう私の中に挿れたくて、堪らなくなっちゃった、かしら？\u3000心配しなくてもそろそろ……んはぁ<emoji=heart04>\u3000ほら、我慢汁と愛液で、凄いことになってるんだから……ふうぅ<emoji=heart04>」"
translation = "「아니면, 벌써 내 안에 삽입하고 싶어서 참을 수 없게 된 걸까? 걱정하지 않아도 이제 곧…… 응하아<emoji=heart04> 봐, 쿠퍼액이랑 애액으로 굉장한 상태가 됐으니까…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「アナタが名器だって言った、ドラゴンおま○こで……んんっ<emoji=heart04>\u3000寝ている間に、睾丸に溜まった精液、全部絞りとってあげるわ……<emoji=heart04>」"
translation = "「네가 명기라고 말했던 드래곤 보지로…… 응응<emoji=heart04> 자는 동안 고환에 쌓인 정액, 전부 짜내 줄게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁ<emoji=heart04>\u3000アナタのチ○ポ、すっかりフル勃起してガッチガチ……んふぅ。竜の私じゃなかったら、こんな大きいチ○ポ、挿れるの大変なんだから<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 너의 자지, 완전히 풀 발기해서 딱딱해…… 응후우. 용인 내가 아니었다면 이렇게 큰 자지, 넣는 것도 일이었을 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……挿れるわよ……。ん、はあぁっ……大きい……っ。んうぅっ……先っぽに中が、押し広げられて──」"
translation = "「응…… 넣을게……. 응, 하아앗…… 커……윽. 응우윽…… 끝부분에 안쪽이 밀려 퍼져서──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ……んあぁぁぁ～～～っ！\u3000恋人デカチ○ポ、挿入って来たぁ……んっ……！」"
translation = "「하아앗…… 응아아아아~~~앗! 연인의 거대 자지, 삽입됐어…… 응……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ……んうぅっ<emoji=heart04>\u3000はあぁっ、ふうぅ……！\u3000んっ、あぁっ、ふあぁっ……んっ……！」"
translation = "「앗…… 응우윽<emoji=heart04> 하아앗, 후우우……! 응, 아앗, 후아앗…… 응……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どう、気持ちいい……？\u3000んんっ……はあぁっ<emoji=heart04>\u3000んっ、ふうぅ……<emoji=heart04>\u3000はあぁっ……んっ……んふぅっ<emoji=heart04>」"
translation = "「어때, 기분 좋아……? 응응…… 하아앗<emoji=heart04> 응, 후우우……<emoji=heart04> 하아앗…… 응…… 응후윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ。気持ち良い、って顔ね<emoji=heart04>\u3000あぁっ……んふぅっ。んあぁっ……んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>」"
translation = "「후훗. 기분 좋다는 표정이네<emoji=heart04> 아앗…… 응후윽. 응아앗…… 응<emoji=heart04> 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ……恥ずかしいからって、顔、手で隠しちゃ、ダメよ？\u3000見せてくれなきゃ、どの動きが気持ちいいか、わからないじゃない<emoji=heart04>\u3000ふうぅっ、んっ……ふあぁっ<emoji=heart04>」"
translation = "「하아앗…… 부끄럽다고 얼굴을 손으로 가리면 안 돼? 보여주지 않으면 어떤 움직임이 기분 좋은지 알 수 없잖아<emoji=heart04> 후우웃, 응…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「この動きが……いいのかしら？\u3000んふっ<emoji=heart04>\u3000堪らないって顔ね<emoji=heart04>\u3000んっ……おま○こも絞めてあげるわ。ふうぅっ……んっ、あっ、はあぁ……<emoji=heart04>\u3000んふふ、どう？」"
translation = "「이 움직임이…… 좋은 걸까? 응훗<emoji=heart04> 참을 수 없다는 표정이네<emoji=heart04> 응…… 보지도 조여 줄게. 후우웃…… 응, 앗, 하아아……<emoji=heart04> 응후후, 어때?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「気持ちいい？\u3000はあぁっ……息も荒くなって、あんっ<emoji=heart04>\u3000チ○ポ、びくびく震えてるっ<emoji=heart04>！\u3000あっ、はあぁっ……あっ、ふあぁっ……！」"
translation = "「기분 좋아? 하아앗…… 숨도 거칠어지고, 안앗<emoji=heart04> 자지가 움찔움찔 떨리고 있어<emoji=heart04>! 앗, 하아앗…… 앗, 후아앗……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん？\u3000どうしたの、キスがしたいの……？\u3000ふうぅっ……仕方がないわね<emoji=heart04>\u3000はぁ……んっ……ちゅっ……ちゅれろっ、ちゅぷっ……ちゅうっ、ちゅっ、ちゅぱっ<emoji=heart04>」"
translation = "「응? 왜 그래, 키스하고 싶어……? 후우웃…… 어쩔 수 없네<emoji=heart04> 하아…… 응…… 츄…… 츄릅, 츄릅…… 츄우, 츄, 츄파<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁっ、んちゅっ<emoji=heart04>\u3000ちゅぷっ、ちゅぷるっ……<emoji=heart04>\u3000んっ、舌絡めて、甘えん坊さんなんだから……んちゅっ、ちゅうぅっ、ちゅっ、ちゅむるっ……ちゅぷぷっ<emoji=heart04>」"
translation = "「하앗, 응츄<emoji=heart04> 츄릅, 츄르릅……<emoji=heart04> 응, 혀 섞으면서 어리광쟁이라니까…… 응츄, 츄우우, 츄, 츄무릅…… 츄릅릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅっ、ちゅむるっ……ちゅぷっ……ぷはぁ……！\u3000はぁ……ふぅ<emoji=heart04>\u3000凄くエッチな顔してる……んふっ……恋人キス、そんなに良かったのかしら<emoji=heart04>？」"
translation = "「츄, 츄무릅…… 츄릅…… 푸하아……! 하아…… 후우<emoji=heart04> 굉장히 야한 얼굴 하고 있어…… 응훗…… 연인 키스, 그렇게 좋았던 걸까<emoji=heart04>?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ<emoji=heart04>\u3000何だか子供の世話する母親みたいね……んあっ<emoji=heart04>\u3000チ○ポをおま○こでナデナデして、いいこいいこって♪\u3000あっ……んんっ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 왠지 아이 돌보는 엄마 같네…… 응앗<emoji=heart04> 자지를 보지로 쓰담쓰담 하면서 착하다 착하다 하고♪ 앗…… 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マムも、乳首が凄い勃起してる。いつもより、興奮してる……？」"
translation = "「마무도 유두가 엄청 발기했어. 평소보다 흥분한 거야……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んふぅ……もう、どこを見てるのよ<emoji=heart04>\u3000ん、はあぁっ……はあぁぁっ<emoji=heart04>\u3000いつもより興奮なんて……んっ<emoji=heart04>\u3000そんなわけないでしょ<emoji=heart04>」"
translation = "「응후우…… 정말, 어딜 보고 있는 거야<emoji=heart04> 응, 하아앗…… 하아아앗<emoji=heart04> 평소보다 흥분이라니…… 응<emoji=heart04> 그럴 리 없잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふうぅ……変なことを言う悪い子には、お仕置きよ……んっ！」"
translation = "「후우우…… 이상한 소리를 하는 나쁜 아이에겐 벌을 줘야겠네…… 응!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ、んっ……んあぁっ<emoji=heart04><emoji=heart04>！\u3000チ○ポ奥まで……ふうぅっ、んあぁっ。飲み込んじゃうんだから……！\u3000あっ、んっ……ふあぁっ<emoji=heart04>！」"
translation = "「하아앗, 응…… 응아앗<emoji=heart04><emoji=heart04>! 자지 끝까지…… 후우웃, 응아앗. 삼켜버릴 거니까……! 앗, 응…… 후아앗<emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ほら……あっ、んんっ<emoji=heart04>\u3000子宮口でちゅっちゅって、チ○ポにディープキス、しちゃってるわよ？\u3000はあぁっ、んっ<emoji=heart04>\u3000んふぁっ、はあっ、んあぁっ<emoji=heart04>」"
translation = "「자…… 앗, 응응<emoji=heart04> 자궁구로 츄츄 하면서 자지에 딥키스 해버리고 있다고? 하아앗, 응<emoji=heart04> 응화앗, 하앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「おま○こ気持ちいい<emoji=heart04>？\u3000んっ……天国に居るみたいって？\u3000あっ、んあぁっ<emoji=heart04>\u3000んっ、ふぅっ、ふあぁっ……<emoji=heart04>」"
translation = "「보지 기분 좋아<emoji=heart04>? 응…… 천국에 있는 것 같다고? 앗, 응아앗<emoji=heart04> 응, 후우, 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そんな極楽おま○こを味わえるのは……んくっ、恋人のアナタだけなんだから<emoji=heart04>\u3000あっ、はっ、はあぁんっ<emoji=heart04>！\u3000感謝するのよ……んっ……んあっ、ふあぁぁっ<emoji=heart04><emoji=heart04>！」"
translation = "「그런 극락 보지를 맛볼 수 있는 건…… 응큭, 연인인 너뿐이니까<emoji=heart04> 앗, 핫, 하아앙<emoji=heart04>! 감사하도록 해…… 응…… 응앗, 후아아앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ、またアナタのチ○ポ、大きくなって……<emoji=heart04>！\u3000あぁっ、んっ……んあ、はあぁっ<emoji=heart04>\u3000アナタこそ、いつもより興奮してるんじゃない……？」"
translation = "「하아앗, 또 너의 자지, 커졌어……<emoji=heart04>! 아앗, 응…… 응아, 하아앗<emoji=heart04> 너야말로 평소보다 흥분한 거 아니야……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「これ、絶対……ふうぅっ、あっ、はあっ<emoji=heart04>\u3000いつもより大きいもの<emoji=heart04>\u3000んあぁっ、私の中、またアナタの形に広げられちゃう<emoji=heart04>！\u3000はっ、ふうぅっ……ふあぁぁっ<emoji=heart04>！」"
translation = "「이거, 분명히…… 후우웃, 앗, 하앗<emoji=heart04> 평소보다 큰걸<emoji=heart04> 응아앗, 내 안이 또 너의 형태대로 넓혀져 버려<emoji=heart04>! 핫, 후우웃…… 후아아앗<emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……マムにリードされるの、気持ち良くてっ！」"
translation = "「윽…… 마무에게 리드당하는 거, 기분 좋아서!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000そうよ、んふあっ<emoji=heart04>\u3000私は新星寮のマムで……んあぁっ、アナタは後輩なんだから……はあぁっ、大人しくリードされてなさい<emoji=heart04>！\u3000はあぁんっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 그래, 응후앗<emoji=heart04> 나는 신성료의 마무고…… 응아앗, 너는 후배니까…… 하아앗, 얌전히 리드당하렴<emoji=heart04>! 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……んふ、んちゅっ<emoji=heart04>\u3000ほら、エッチなキス、好きでしょう？\u3000んちゅっ<emoji=heart04>\u3000舌、出しなさい……んちゅっ、ちゅぷっ……ちゅうっ、ちゅむむっ……ちゅれろっ、ちゅぷるっ<emoji=heart04>！」"
translation = "「……응후, 응츄<emoji=heart04> 봐, 야한 키스 좋아하지? 응츄<emoji=heart04> 혀 내밀어봐…… 응츄, 츄릅…… 츄우, 츄무무…… 츄릅, 츄르릅<emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅっ、ちゅぷぷ、ちゅぱっ……ぷはぁっ<emoji=heart04>\u3000ふあぁっ、んっ……はあっ、あああっ<emoji=heart04>\u3000んくっ、はぁ……そろそろ腰、激しくするわよ……？」"
translation = "「츄, 츄릅릅, 츄파…… 푸하앗<emoji=heart04> 후아앗, 응…… 하앗, 아아앗<emoji=heart04> 응큭, 하아…… 슬슬 허리 격하게 움직일게……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ<emoji=heart04>\u3000この私が気持ち良く、イカせてあげるっ……ふうぅっ……！」"
translation = "「하아앗<emoji=heart04> 이 내가 기분 좋게 가게 해줄게…… 후우웃……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「行くわよ……んっ……！」"
translation = "「간다…… 응……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ、んっ、はぁっ、ふあぁっ<emoji=heart04>\u3000んうぅっ、んっ、んあぁっ、はあぁんっ<emoji=heart04>\u3000ふうぅっ、んうっ、んっ、んあ、はぁ<emoji=heart04>！\u3000はっ、はっ、んっ、ふあぁぁんっ<emoji=heart04><emoji=heart04>！」"
translation = "「응, 응, 하앗, 후아앗<emoji=heart04> 응우윽, 응, 응아앗, 하아앙<emoji=heart04> 후우웃, 응윽, 응, 응아, 하아<emoji=heart04>! 핫, 핫, 응, 후아아앙<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「おま○こ絞めて全力ピストン、気持ちいい？\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ、ふあぁぁんっ<emoji=heart04>！\u3000んっ、んうぅっ、はぁんっ、んあぁぁんっ<emoji=heart04>！」"
translation = "「보지 조이면서 전력 피스톤, 기분 좋아? 앗<emoji=heart04> 앗<emoji=heart04> 응, 후아아앙<emoji=heart04>! 응, 응우윽, 하앙, 응아아앙<emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「チ○ポ奥に当たって、私も気持ちいいわよ<emoji=heart04>\u3000あっ、んっ、はあぁっ、んあぁぁっ<emoji=heart04>\u3000ふぅっ、ふぅっ、あぁっ、ふあぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지 깊숙이 닿아서 나도 기분 좋아<emoji=heart04> 앗, 응, 하아앗, 응아아앗<emoji=heart04> 후우, 후우, 아앗, 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁっ、んっ、あっ、んあぁぁっ<emoji=heart04><emoji=heart04>\u3000竜の体がアナタのチ○ポ求めて、子宮降りて来ちゃってるぅっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、んっ、はあぁぁんっ<emoji=heart04>！」"
translation = "「하앗, 응, 앗, 응아아앗<emoji=heart04><emoji=heart04> 용의 몸이 너의 자지를 원해서 자궁이 내려와 버려어<emoji=heart04><emoji=heart04> 앗, 앗, 응, 하아아앙<emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「チ○ポと子宮口がキスするたび……んはぁ、頭の中バチバチ、するぅっ<emoji=heart04><emoji=heart04>\u3000はあぁぁんっ！\u3000はぁっ、ふぅっ、んっ、んあぁぁっ<emoji=heart04>\u3000あっ、んっ、ふうぅっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「자지랑 자궁구가 키스할 때마다…… 응하아, 머릿속이 번쩍번쩍해애<emoji=heart04><emoji=heart04> 하아아앙! 하앗, 후우, 응, 응아아앗<emoji=heart04> 앗, 응, 후우웃, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>\u3000あっ、あぁっ、んあぁぁんっ<emoji=heart04>\u3000中ゴリゴリってぇっ<emoji=heart04>\u3000あっ、あっ、ぶっといカリで擦られてぇ<emoji=heart04>\u3000んっ、あぁっ、はあぁっ、ふあぁぁんっ<emoji=heart04>！」"
translation = "「응응<emoji=heart04> 앗, 아앗, 응아아앙<emoji=heart04> 안쪽이 고리고리해애<emoji=heart04> 앗, 앗, 굵은 귀두에 긁혀서어<emoji=heart04> 응, 아앗, 하아앗, 후아아앙<emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「本当、竜泣かせ、意地悪チ○ポなんだから……<emoji=heart04>！\u3000あっ、あっ、んっ、んあぁぁんっ<emoji=heart04>\u3000はぁっ、はぁっ、ふぅっ、あっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「정말, 용을 울리는 심술쟁이 자지라니까……<emoji=heart04>! 앗, 앗, 응, 응아아앙<emoji=heart04> 하앗, 하앗, 후우, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000だからってぇ……！\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000竜の私が、負けたりしないんだからぁ<emoji=heart04>\u3000はあぁっ、んっ、あぁっ、んあぁぁんっ<emoji=heart04>！」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 응아앗<emoji=heart04> 그렇다고 해서어……! 앗<emoji=heart04> 앗<emoji=heart04> 용인 내가 질 리 없으니까아<emoji=heart04> 하아앗, 응, 아앗, 응아아앙<emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ、チ○ポ膨らんで、来たぁ<emoji=heart04>\u3000ふぅっ、ふぅっ、あぁぁんっ<emoji=heart04>\u3000もう出そう？\u3000あっ、あっ、我慢しないで、イッちゃいなさい……ふっ、ふっ、はぁっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「하아앗, 자지 부풀어 올랐어어<emoji=heart04> 후우, 후우, 아아앙<emoji=heart04> 벌써 나올 것 같아? 앗, 앗, 참지 말고 가버리렴…… 훗, 훗, 하앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ、あっ、んあぁっ、はあぁぁぁぁぁっ<emoji=heart04><emoji=heart04>！\u3000私もイキそう……<emoji=heart04>\u3000はっ、はっ、んっ、んあぁんっ<emoji=heart04><emoji=heart04>！」"
translation = "「앗, 앗, 응아앗, 하아아아아아앗<emoji=heart04><emoji=heart04>! 나도 갈 것 같아……<emoji=heart04> 핫, 핫, 응, 응아앙<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ、んっ、ほらっ<emoji=heart04>\u3000マムの中にぴゅっぴゅって、溜まってるもの全部出しちゃいなさい<emoji=heart04>\u3000あっ、あんっ、んあぁっ、はあぁぁんっ！」"
translation = "「응, 응, 자아<emoji=heart04> 마무 안에 퓨퓩 하고 쌓여있는 거 전부 내보내 버리렴<emoji=heart04> 앗, 안앗, 응아앗, 하아아앙!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ、んっ、精液来るっ<emoji=heart04>\u3000あっ、私もイク<emoji=heart04>\u3000イクイクイク……<emoji=heart04><emoji=heart04>！」"
translation = "「응, 응, 정액 온다아<emoji=heart04> 앗, 나도 가<emoji=heart04> 가버려 가버려 가버려……<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……マム、出るっ！！！」"
translation = "「윽…… 마무, 나온다!!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「っ……あああああ、イクイクイクっ<emoji=heart04>\u3000イッ──くぅぅぅぅぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ──────ッ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 아아아아아, 가버려 가버려 가버려엇<emoji=heart04> 가──버려어어어어어어<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아──────앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁぁぁ～～～っ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000アナタの熱い精液、子宮にいっぱい、ドクドク入って来てるぅ……<emoji=heart04>」"
translation = "「하아아아～～～윽……<emoji=heart04><emoji=heart04><emoji=heart04> 당신의 뜨거운 정액, 자궁에 가득, 울컥울컥 들어오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あぁっ<emoji=heart04>\u3000まだ、出てる……<emoji=heart04>\u3000はあぁ……昨日あんなに搾り取ったのに、凄い量……<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 아직, 나오고 있어……<emoji=heart04> 하아…… 어제 그렇게나 짜냈는데, 엄청난 양……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ……<emoji=heart04>\u3000１回の射精だけで、子作り部屋、満室になっちゃう……ふうぅ<emoji=heart04>」"
translation = "「응윽……<emoji=heart04> 단 한 번의 사정만으로, 아기 만들기 방이 만실이 되어버려…… 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁぁぁ……<emoji=heart04>\u3000やっと止まったぁ。もうっ、射精長過ぎよ……<emoji=heart04>\u3000あぁんっ……精液入りきらなくて、漏れちゃうじゃない<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 겨우 멈췄네. 정말이지, 사정이 너무 길어……<emoji=heart04> 아앙…… 정액이 다 들어가지 못해서, 새어 나오잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……ふぅ……<emoji=heart04>\u3000全くもう……こんなに出して<emoji=heart04>」"
translation = "「응…… 후우……<emoji=heart04> 정말이지…… 이렇게나 내버리고<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私にされるの、そんなに気持ち良かったの……？」"
translation = "「나한테 당하는 거, 그렇게 기분 좋았어……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ。それとも……私のこと、本当に<ruby>ママ<rt>マム</rt></ruby>にしちゃう気かしら？」"
translation = "「후훗. 아니면…… 나를 정말로 엄마로 만들어버릴 생각일까?」"

[[dialogue]]
speaker = "unk"
original = "そう言った彼女の顔は、全然嫌そうじゃなくて。"
translation = "그렇게 말하는 그녀의 얼굴은, 전혀 싫어하는 기색이 아니었다."

[[dialogue]]
speaker = "unk"
original = "ああ、この子を孕ませてもいいんだと思ったら、男としての本能がいきり立ってしまう。"
translation = "아아, 이 아이를 임신시켜도 괜찮겠다고 생각하니, 남자로서의 본능이 불끈 솟아오르고 만다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「って、言ってるそばから復活するなんて、本当にエッチな子なんだから……<emoji=heart04>」"
translation = "「방금 말하자마자 부활하다니, 정말 야한 아이라니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あれだけ私が絞ったのに、まだ満足してないなんて、生意気よ<emoji=heart04>」"
translation = "「그만큼 내가 짜냈는데도, 아직 만족하지 못했다니 건방져<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「これはちゃんと、畏怖をもって跪くまで、わからせてあげないとね<emoji=heart04>」"
translation = "「이건 제대로, 경외심을 갖고 무릎 꿇을 때까지, 따끔하게 가르쳐줘야겠네<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……ちゅっ<emoji=heart04>\u3000ほら、覚悟なさい？」"
translation = "「응…… 츄릅<emoji=heart04> 자, 각오해?」"

[[dialogue]]
speaker = "unk"
original = "不意打ちでされたキスの味は、とても甘くて──"
translation = "기습적으로 당한 키스의 맛은, 무척 달콤해서──"

[[dialogue]]
speaker = "unk"
original = "その後、お世話されるままに、俺は何度も彼女の中に精を吐き出してしまうのだった。"
translation = "그 후, 보살핌을 받는 대로, 나는 몇 번이고 그녀의 안에 정을 쏟아내고 마는 것이었다."

