[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あ、会長くん、こんにちは♪\u3000今日はお買い物？」"
translation = "「아, 회장군, 안녕하세요♪ 오늘 쇼핑하러 오셨나요?」"

[[dialogue]]
speaker = "unk"
original = "そういうミルフィーも？"
translation = "밀피도 쇼핑 중이야?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん、マグダレナ様とヒヨちゃんも一緒なんだ」"
translation = "「네, 마그달레나 님과 히요짱도 함께예요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「会長さま、ごきげんよう」"
translation = "「회장님, 평안하신지요.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「てやんでい、せっかく<ruby>姐<rt>あね</rt></ruby>さんとのお出かけだってぇのに、会長サンと出会っちまうたぁ幸先わるいぜ」"
translation = "「에잇 씨, 모처럼 누님과의 외출인데 회장 샌님하고 마주치다니 재수 옴 붙었구만.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ハッ──！？\u3000まさか会長サン、いくら姐さんがかわいいからって、後をつけてきたわけじゃねえだろうな？」"
translation = "「핫──!? 설마 회장 샌님, 아무리 누님이 예쁘다고 해도 뒤를 밟아온 건 아니겠지?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんはそんなことしないよ！？\u3000ていうか、かわいいとか、そんなことないってば……」"
translation = "「회장군은 그런 짓 안 해!? 그보다 예쁘다니, 그런 거 아니라니까……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いいや、姐さんはめちゃくちゃかわいい！\u3000えれぇべっぴんさんだ！\u3000姐さんでもそこは譲れねえ！」"
translation = "「아니, 누님은 더럽게 예뻐! 엄청난 미인이라고! 누님이라도 그건 양보 못 해!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そこまで言わなくても……もう、ヒヨちゃん頑固なんだから……」"
translation = "「그, 그렇게까지 말 안 해도…… 정말, 히요짱은 고집불통이라니까……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふ。ヒヨさまはミルフィーのことがお好きなのですね」"
translation = "「후후. 히요 님은 밀피를 무척 좋아하시는군요.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「おうよ！\u3000あたしは姐さんの一の舎弟だからな！」"
translation = "「당연하지! 난 누님의 제1호 꼬봉이니까!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私たち、そういう関係だったんだ……」"
translation = "「우리, 그런 관계였구나……」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーは俺とマトイのクラスの学級委員長で、守護天使《境界》のマグダレナを<ruby>祀<rt>まつ</rt></ruby>る一族の出身でもある。"
translation = "밀피는 나와 마토이 반의 학급위원장으로, 수호천사 《경계》의 마그달레나를 모시는 일족의 출신이기도 하다."

[[dialogue]]
speaker = "unk"
original = "ヒヨはミルフィーの部活の後輩で、ミルフィーのことをとても尊敬して慕っている。"
translation = "히요는 밀피의 동아리 후배로, 밀피를 무척 존경하고 따르고 있다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「マグダレナ様、何かご不便はありませんか？\u3000私になんなりとお申し付けください」"
translation = "「마그달레나 님, 불편하신 건 없으신가요? 제게 무엇이든 말씀해 주세요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いいえ、不便などしておりませんよ。いつもありがとう、ミルフィー」"
translation = "「아니오, 딱히 불편한 건 없답니다. 언제나 고마워요, 밀피.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さんはほんとマグダレナさまが好きだなぁ……」"
translation = "「누님은 정말 마그달레나 님을 좋아하는구먼……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「マグダレナ様は三界の境界を守るお方だから。マグダレナ様が存在しなければ、天界も人間界も魔界も滅んじゃうんだよ」"
translation = "「마그달레나 님은 삼계의 경계를 수호하시는 분이니까. 마그달레나 님이 계시지 않으면 천계도 인간계도 마계도 멸망해 버리는걸.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「リクリエのせいとはいえ、マグダレナ様と直接お会いできるなんて、本当に光栄なことなんだ」"
translation = "「리크리에 때문이라곤 해도 마그달레나 님과 직접 만날 수 있다니, 정말 영광스러운 일이야.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふ～む、そういうもんなのか。ま、あたしも頑張って姐さんにもっと頼られるように──」"
translation = "「흐~음, 그런 건가. 뭐, 나도 열심히 해서 누님한테 더 의지가 되도록──」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「空が変わった！？\u3000例のリクリエの使徒の──いや、あんときはもっとふざけた感じだったよな。どうなってやがんだ？」"
translation = "「하늘이 변했어!? 그 리크리에 사도 놈── 아니, 그때는 좀 더 장난스러운 느낌이었지. 어떻게 된 거야?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「まさかこれは……」"
translation = "「설마 이건……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「マグダレナ様！」"
translation = "「마그달레나 님!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい、恐れていたことが起きてしまったようです」"
translation = "「네, 우려하던 일이 일어나버린 것 같습니다.」"

[[dialogue]]
speaker = "unk"
original = "！"
translation = "!"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "『魔王よ。至急九浄の屋敷に来てくれるか？\u3000一分一秒が惜しい』"
translation = "『마왕이여. 지체 말고 쿠죠의 저택으로 와주겠나? 일분일초가 아깝다.』"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "『……マグダレナたちも一緒にいる？\u3000それは非常に都合がいいな。一緒に来てもらおう』"
translation = "『……마그달레나 일행도 같이 있다고? 아주 잘 됐군. 함께 데려오도록.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんないらっしゃい！\u3000ようこそ九浄家へ！」"
translation = "「모두들 어서 와! 쿠죠 가문에 온 걸 환영해!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「お、お邪魔します。ここが九浄家……噂には聞いてたけどすごいね」"
translation = "「시, 실례하겠습니다. 여기가 쿠죠 가문…… 소문으로만 들었는데 대단하네.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ひょえ～……ギラギラで目ん玉潰れそうだぜぇ……」"
translation = "「횅~…… 번쩍번쩍해서 눈알 빠지겠구만……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、委員長も来たんだ。私みたいな庶民には豪華すぎるっていうか、ちょっと場違いな気がしたから、同じクラスの人が増えてちょっと安心したよ～」"
translation = "「아, 위원장도 왔네. 나 같은 서민한테는 너무 호화롭달까, 좀 안 어울리는 자리에 온 것 같아서 불안했는데, 같은 반 친구가 늘어서 안심했어~」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はは……別にそんなことで心細くならなくてもいいと思うけど。でもマトイさんもいるってことは……」"
translation = "「하하…… 딱히 그런 것 때문에 기죽을 필요는 없다고 생각하지만. 그래도 마토이 씨도 있다는 건……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私もいます。九浄家のお茶請けのお菓子、とっても美味しいです」"
translation = "「저도 있습니다. 쿠죠 가문의 곁들임 과자, 아주 맛있네요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ、先にお菓子頂いてるわ～」"
translation = "「후후후, 먼저 과자를 먹고 있었어~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「遅くなってすみません。流星星徒会５名、到着しました」"
translation = "「늦어서 죄송합니다. 유성성도회 5명, 도착했습니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「新星学園の星徒会は先に来ていたようですね、こんにちは。……姉さん、くつろぎ過ぎです」"
translation = "「신성학원 학생회는 먼저 와 있었나 보군요, 안녕하세요. ……언니, 너무 편하게 있는 거 아닙니까?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんだ、両星徒会揃い踏みってわけか。わざわざ呼び出すなんてどんな用件だ？」"
translation = "「뭐야, 양쪽 학생회가 다 모인 건가. 일부러 불러내다니 무슨 용건이지?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もしかして祝勝会でしょうか？\u3000ワクワク」"
translation = "「혹시 축승회인가요? 두근두근.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いや～、そんな雰囲気じゃないっしょ。ほら、あっち見てよ」"
translation = "「에이~ 그런 분위기 아니잖아. 봐봐, 저쪽 좀 보라고.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「守護天使と……イクシーさん？\u3000なんだか険しい表情だけど……」"
translation = "「수호천사랑…… 익시 씨? 왠지 험악한 표정인데……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「よく集まってくれた、両校の星徒会役員たち。そして守護天使の諸君」"
translation = "「잘 모여주었다, 양교의 학생회 임원들. 그리고 수호천사 제군.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「用件は他でもない。──世界の危機だ」"
translation = "「용건은 다름이 아니다. ──세계의 위기다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヘレナちゃん、どういうこと？\u3000アポロは正気に戻ったし、ギエルも倒したんだから、リクリエは一旦収まったんじゃないの？」"
translation = "「헬레나짱, 무슨 소리야? 아폴로는 제정신으로 돌아왔고 기엘도 쓰러뜨렸으니까 리크리에는 일단락된 거 아니었어?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ああそうだ。世界の危機は確かに退けられた。だが言うだろう、一難去ってまた一難と」"
translation = "「아아, 맞다. 세계의 위기는 확실히 물러갔지. 하지만 산 넘어 산이라고 하지 않나.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「新たな危機が迫っている。正確には、以前から進行していた危険が顕在化したわけだがな」"
translation = "「새로운 위기가 닥쳐오고 있다. 정확히는 이전부터 진행되던 위험이 현재화된 것이지만 말이다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「私たちからご説明しましょう。皆さま、私たち守護天使が堕天使となった経緯は記憶しておられるでしょうか？」"
translation = "「저희가 설명해 드리겠습니다. 여러분, 저희 수호천사들이 타락천사가 된 경위는 기억하고 계시는지요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい、覚えています。リクリエの瘴気に蝕まれていたのですよね」"
translation = "「네, 기억하고 있습니다. 리크리에의 장기에 침식되었던 것이죠.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうそう、守護天使たちの本体は魔界に封印されて──って、本体封印されたままじゃない！？」"
translation = "「맞아 맞아, 수호천사들의 본체는 마계에 봉인되어서── 어라, 본체는 봉인된 그대로 아니야!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そうなのです。私たち守護天使が封印されたままでは、世界を運営する役目を果たせません」"
translation = "「그렇습니다. 저희 수호천사들이 봉인된 채로는 세계를 운영하는 역할을 다할 수 없습니다.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「以前の危機はリクリエによる破壊であったが、今回は世界の機能不全というわけだ」"
translation = "「이전의 위기가 리크리에에 의한 파괴였다면, 이번에는 세계의 기능 부전이라 할 수 있지.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「機能不全……具体的にはどうなるのですか？」"
translation = "「기능 부전…… 구체적으로 어떻게 되는 건가요?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そうだな……マグダレナがわかりやすいか。マグダレナは三界の境界を司る──すなわち天界・人間界・魔界を隔てるのが役目だ」"
translation = "「글쎄…… 마그달레나를 예로 들면 이해하기 쉽겠군. 마그달레나는 삼계의 경계를 관장한다── 즉 천계·인간계·마계를 가르는 것이 역할이지.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「その権能が失われれば、三界が混じり合い、天界が人間界の空から落ちてきます。人間界も崩落して魔界に落下していくでしょう」"
translation = "「그 권능이 소실되면 삼계가 뒤섞여 천계가 인간계의 하늘에서 떨어져 내릴 것입니다. 인간계 또한 붕괴하여 마계로 낙하하겠지요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「何それ！？\u3000絶対世界滅んじゃうじゃないですか！？」"
translation = "「뭐라고요!? 그럼 무조건 세계가 멸망하는 거잖아요!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「天界・人間界・魔界は地続きで繋がってるわけじゃないから、普通はそうならないけど……なるほどー、マグダレナさんがいないとそうなっちゃうんだ」"
translation = "「천계·인간계·마계는 지면으로 연결된 게 아니니까 보통은 그렇게 안 될 텐데…… 그렇구나~ 마그달레나 씨가 없으면 그렇게 되는구나.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも今まで何とかなってたんでしょ？\u3000どうして急にヤバくなっちゃったのよ？」"
translation = "「하지만 지금까지는 어떻게든 됐던 거잖아? 왜 갑자기 위험해진 거야?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いえ、今までは何とか持ちこたえている状態だったのです」"
translation = "「아뇨, 지금까지는 어떻게든 버텨오던 상태였습니다.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「専門の職を持つ者もいますが、天界の多くの天使たちの仕事は祈ることです。天界の各地にある守護天使様の神殿で祈りを捧げることで、その権能を補佐してきました」"
translation = "「전문적인 직무를 가진 자도 있습니다만, 천계의 많은 천사들의 일은 기도하는 것입니다. 천계 각지에 있는 수호천사님의 신전에서 기도를 드림으로써 그 권능을 보좌해 왔습니다.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私やイクシーちゃんは、マグダレナ様やアルモタヘル様の信仰の総本山……一番大きな神殿を管理する一族なの」"
translation = "「저나 익시짱은 마그달레나 님이나 아르모타헬 님의 신앙의 총본산…… 가장 큰 신전을 관리하는 일족이야.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「へぇ、神社でいうと<ruby>御本社<rt>ごほんしゃ</rt></ruby>ってわけか」"
translation = "「헤에, 신사로 치면 본사라는 거구만.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「守護天使様がご不在の間も、一般の天使たちが世界を支えてきましたが……さすがに限界が訪れました。このままでは世界が終わります」"
translation = "「수호천사님이 부재중인 동안에도 일반 천사들이 세계를 지탱해 왔습니다만…… 역시 한계가 찾아왔습니다. 이대로라면 세계는 끝납니다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえ～……確かに大人の天使が神殿によく行くな～と思ってましたけど、なんとなく祈ってるだけだと思ってました！」"
translation = "「호에~…… 확실히 어른 천사들이 신전에 자주 가긴 한다 싶었습니다만, 그냥 왠지 모르게 기도하는 건 줄 알았어요!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「天使ってたいてい大らかだから、あんまりその辺気にしないんだよね……」"
translation = "「천사들은 대체로 느긋해서 그런 부분을 별로 신경 안 쓰거든……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「てやんでい！\u3000つーことは、さっさと守護天使の本体を解放しないといけねえじゃねえか！\u3000この前世界を守ったばっかだってのに、結局世界が終わっちまう！」"
translation = "「에이 씨! 그 말은 얼른 수호천사 본체를 해방하지 않으면 안 된다는 거 아냐! 요전에 세계를 지킨 지 얼마나 됐다고 결국 세계가 망한다니!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「でも守護天使様の本体は魔界に囚われている……しかも魔界のどこに封印されてるかもわからないし……」"
translation = "「하지만 수호천사님의 본체는 마계에 붙잡혀 있고…… 게다가 마계 어디에 봉인되어 있는지도 모르고……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「じゃあ詰みじゃねえか！？」"
translation = "「그럼 게임 끝 아냐!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「大交流の時期もまだ遠い。そもそも、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を通れたとして今からでは間に合わんだろう。そこで──」"
translation = "「대교류 시기도 아직 멀었다. 애초에 <ruby>경계의 호수<rt>라르고 시엘로</rt></ruby>를 통과할 수 있다 해도 지금으로선 늦겠지. 그래서──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "『余らの出番というわけだ！』"
translation = "『여들의 차례라는 것이니라!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！？\u3000その声は──」"
translation = "「!? 그 목소리는──」"

