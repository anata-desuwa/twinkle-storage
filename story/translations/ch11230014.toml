[[dialogue]]
speaker = "unk"
original = "第４話,絶対手に入れる,P"
translation = "제4화, 반드시 손에 넣는다, P"

[[dialogue]]
speaker = "unk"
original = "煌嶺の前で模擬戦をしてから数日が経った。"
translation = "코우레이 앞에서 모의전을 치른 지 며칠이 지났다."

[[dialogue]]
speaker = "unk"
original = "あれからも変わらず、リーエンは俺に模擬戦を挑んでくる。"
translation = "그 뒤로도 변함없이 리엔은 나에게 모의전을 걸어온다."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「往くぞ魔王！\u3000あたしの渾身の一撃、受けてみろ！！」"
translation = "「간다 마왕! 나의 혼신의 일격, 받아봐라!!」"

[[dialogue]]
speaker = "unk"
original = "させるかっ！\u3000アビスインパクト！"
translation = "하게 둘까 보냐! 어비스 임팩트!"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「さすがだな、技の切れ味がますます研ぎ澄まされているじゃないか？」"
translation = "「역시나군, 기술의 날카로움이 점점 더 연마되고 있지 않은가?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「だがっ！\u3000このあたしには届かない！」"
translation = "「하지만! 이 나에게는 닿지 않는다!」"

[[dialogue]]
speaker = "unk"
original = "リーエンも強くなってる"
translation = "리엔도 강해지고 있어"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「当然だ！\u3000こうして……おまえと日々刃を交えているのだからな！」"
translation = "「당연하다! 이렇게…… 네놈과 나날이 합을 겨루고 있으니까 말이다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「強くなってもらわねば困る。あたしはもっともっと、強くなるんだ」"
translation = "「강해져 주지 않으면 곤란하다. 나는 더욱더, 강해질 것이다」"

[[dialogue]]
speaker = "unk"
original = "強くなるのは……煌嶺のため？"
translation = "강해지는 건…… 코우레이를 위해서?"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「当然だ！\u3000戦いの最中に下らん質問をするな！」"
translation = "「당연하다! 싸우는 도중에 실없는 질문을 하지 마라!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「だが……あたしの武は陛下のためであり……同時にあたし自身のためでもある」"
translation = "「하지만…… 나의 무는 폐하를 위함이며…… 동시에 나 자신을 위함이기도 하다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしが、より強くありたいと求めた。それが陛下の道と重なっていても、上書きされたりはしない」"
translation = "「내가 더 강해지고 싶다고 갈구했다. 그것이 폐하의 길과 겹쳐 있다 해도, 덮어씌워지지는 않아」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「どこを見ている！\u3000気を抜くな！」"
translation = "「어딜 보고 있나! 방심하지 마라!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おしゃべりに興じて情けない姿を見せないでくれ！」"
translation = "「잡담에 정신 팔려 한심한 모습을 보이지 말아다오!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おまえは……おまえはあたしのっ……あたしの<ruby>好敵手<rt>ライバル</rt></ruby>なんだからっ！\u3000気を抜くんじゃないっ！！」"
translation = "「네놈은…… 네놈은 나의…… 나의 호적수이니까! 방심하지 말란 말이다!!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「陛下の言葉を聞いて、あたしは考えた！\u3000あたしは何を欲しているのか！」"
translation = "「폐하의 말씀을 듣고 나는 생각했다! 나는 무엇을 원하고 있는가!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「拳を交える相手……互いに武を極めていく強者を！」"
translation = "「주먹을 섞을 상대…… 서로 무를 연마해 나갈 강자를!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「それがおまえだ！\u3000魔王っ！！！」"
translation = "「그것이 네놈이다! 마왕!!!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「今日は散々な結果だったな」"
translation = "「오늘은 형편없는 결과였군」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「戦いの最中に気を抜きすぎだぞ。まったく情けない」"
translation = "「싸우는 도중에 너무 방심했다고. 정말 한심하군」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「ほら、こっちに来い。簡単な治療なら、あたしがしてやる」"
translation = "「자, 이쪽으로 와라. 간단한 치료라면 내가 해주마」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「情けない声を出すな。武人なら、グッと堪えろ」"
translation = "「한심한 소리 내지 마라. 무인이라면 꾹 참아라」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「…………武人じゃない、とでも言いたげな顔をしているな」"
translation = "「…………무인이 아니다, 라고 말하고 싶은 얼굴이로군」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「いいか、おまえは武人だ。あたしがそう決めた。だから拒否は許さん」"
translation = "「잘 들어라, 네놈은 무인이다. 내가 그렇게 정했다. 그러니 거부하는 건 허락지 않는다」"

[[dialogue]]
speaker = "unk"
original = "そんな無茶苦茶な"
translation = "그런 억지가 어딨어"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「うるさい。あたしは陛下のように、自分の欲望に忠実になると決めたんだ」"
translation = "「시끄럽다. 나는 폐하처럼 자신의 욕망에 충실해지기로 마음먹었다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「陛下の剣が情けなく迷う姿を見せるなんて、恥ずかしいからな」"
translation = "「폐하의 검이 한심하게 망설이는 모습을 보이는 건 창피하니까 말이다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「とにかく、あたしは決めた。自分が思うままに生きる」"
translation = "「어쨌든 나는 정했다. 내가 생각하는 대로 살아가겠어」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「そこにある、おまえが模擬戦の後に食べようとしていた肉たっぷりサンドも……あたしのものだ」"
translation = "「저기 있는, 네놈이 모의전 후에 먹으려고 했던 고기 듬뿍 샌드위치도…… 나의 것이다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしが欲しいから、絶対に手に入れる」"
translation = "「내가 원하니까 반드시 손에 넣겠다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「それと……おまえのことも……」"
translation = "「그리고…… 네놈도……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「陛下に指摘されるまで、あたしは気付かなかったんだ」"
translation = "「폐하께서 지적하시기 전까지 나는 깨닫지 못했다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「こうしておまえと剣を交え、武を磨き合う日々を……楽しい、と感じていたんだな」"
translation = "「이렇게 네놈과 검을 섞으며 무를 연마하는 나날을…… 즐겁다고 느끼고 있었던 거군」"

[[dialogue]]
speaker = "unk"
original = "俺も楽しかった"
translation = "나도 즐거웠어"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「だろう？\u3000楽しくなければ、あたしに付き合わなかったはずだ」"
translation = "「그렇겠지? 즐겁지 않았다면 나를 상대해 주지 않았을 테니까」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしは陛下の剣だ。陛下の命で動き、敵を打ち倒す。それがあたしだ」"
translation = "「나는 폐하의 검이다. 폐하의 명으로 움직이고 적을 쓰러뜨린다. 그것이 나다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「だが……おまえと戦う日々は、楽しかったんだ」"
translation = "「하지만…… 네놈과 싸우는 나날은 즐거웠다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「陛下のご命令があっても……失いたくないと思うくらいにな……」"
translation = "「폐하의 명령이 있다 해도…… 잃고 싶지 않다고 생각할 정도로 말이지……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「それに気付いたら、陛下のお言葉が意味することがわかった」"
translation = "「그것을 깨달으니 폐하의 말씀이 의미하는 바를 알 수 있었다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「かつてのあたしなら、陛下のご命令あらば、おまえとの日々をあっさり捨て去っていたはずだ」"
translation = "「예전의 나였다면 폐하의 명령만 있다면 네놈과의 나날을 미련 없이 버렸을 것이다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「しかし！\u3000それはあたしが欲したものを諦めること！\u3000そんなの陛下の剣に相応しくない振る舞いだ！」"
translation = "「하지만! 그것은 내가 원하는 것을 포기하는 것! 그런 건 폐하의 검에 어울리지 않는 행동이다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「だから、あたしは諦めない。陛下のことも、おまえのことも……あたしが求めるものは全部！」"
translation = "「그러니 나는 포기하지 않는다. 폐하도, 네놈도…… 내가 원하는 것은 전부!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしはおまえが欲しい」"
translation = "「나는 네놈을 원한다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「魔王、あたしはおまえを手に入れる。おまえはあたしのものだ」"
translation = "「마왕, 나는 네놈을 손에 넣겠다. 네놈은 나의 것이다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「絶対に……あたしのものにしてみせる！！」"
translation = "「반드시…… 나의 것으로 만들고 말겠다!!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしのものになれ、魔王。いいな、これは命令だ」"
translation = "「나의 것이 되어라, 마왕. 알겠나, 이건 명령이다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「――――ちゅ<emoji=heart04>」"
translation = "「────쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……キス？"
translation = "……키스?"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「うるさい！\u3000黙れ！\u3000これはつまり……おまえがあたしのものになった証だ！」"
translation = "「시끄러워! 닥쳐라! 이건 그러니까…… 네놈이 나의 것이 되었다는 증표다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「マーキングしてやったからな！\u3000いいな！」"
translation = "「마킹해 둔 거니까 말이다! 알겠나!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「……なんだ、その不満そうな顔は？\u3000マーキングが足りないか？」"
translation = "「……뭐냐, 그 불만스러운 얼굴은? 마킹이 부족한가?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「むちゅ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 츄웁<emoji=heart04> 츄웁<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「ちゅうう～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「츄우우우우우우우우웁──────<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「どうだ、わかったか！\u3000これでおまえはあたしのものだからな！」"
translation = "「어떠냐, 알겠나! 이걸로 네놈은 나의 것이니까 말이다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「わかったならよし。じゃあこっちに来い」"
translation = "「알았으면 됐다. 그럼 이쪽으로 와라」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしがおまえを抱き締めてやるっ……！！」"
translation = "「내가 네놈을 껴안아 주마……!!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺は、キスとハグの集中砲火により、完全にリーエンのものになった。"
translation = "이리하여 나는 키스와 포옹의 집중포화로 인해 완전히 리엔의 것이 되었다."

