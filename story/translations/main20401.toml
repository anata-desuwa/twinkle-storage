[[dialogue]]
speaker = "unk"
original = "第１話,破滅の手,B"
translation = "제1화, 파멸의 손, B"

[[dialogue]]
speaker = "クロト"
original = "「ディザスターハンド……？」"
translation = "「디재스터 핸드……?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ。私たちは、便宜上あれをそう呼んでいた」"
translation = "「그래. 우리는 편의상 그것을 그렇게 부르고 있었어」"

[[dialogue]]
speaker = "クロト"
original = "「私たち？」"
translation = "「우리?」"

[[dialogue]]
speaker = "梨緒"
original = "「新星学園と流星学園の残存勢力だ」"
translation = "「신성학원과 유성학원의 잔존 세력이야」"

[[dialogue]]
speaker = "梨緒"
original = "「星騎士のほとんどを失った両学園は、残った戦力をかき集めて、ディザスターハンドに最後の戦いを挑んだ」"
translation = "「성기사의 대부분을 잃은 양 학원은, 남은 전력을 긁어모아 디재스터 핸드에게 마지막 싸움을 걸었지」"

[[dialogue]]
speaker = "梨緒"
original = "「結果は全滅。最後に残った私とフィオナ、そしてジグもあれに──」"
translation = "「결과는 전멸. 마지막에 남은 나와 피오나, 그리고 지그도 그것에──」"

[[dialogue]]
speaker = "梨緒"
original = "「っ……頭痛が……」"
translation = "「윽…… 두통이……」"

[[dialogue]]
speaker = "梨緒"
original = "（くっ……ジグのことを思い出そうとすると、頭が痛む……）"
translation = "(큭…… 지그에 대해 떠올리려 하면 머리가 아파와……)"

[[dialogue]]
speaker = "梨緒"
original = "（あの時、ジグも私と一緒にいた。そのはずだ。なのに何だ、この違和感は……）"
translation = "(그때, 지그도 나와 함께 있었다. 분명 그랬을 터다. 그런데 뭐지, 이 위화감은……)"

[[dialogue]]
speaker = "クロト"
original = "「梨緒、大丈夫か？」"
translation = "「리오, 괜찮아?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、すまない。軽い頭痛だ、気にしないでくれ」"
translation = "「아아, 미안. 가벼운 두통이야, 신경 쓰지 마」"

[[dialogue]]
speaker = "梨緒"
original = "「重要なのは、あのディザスターハンドが強大な力を持っているということだ。流星・新星両学園の星騎士をまとめて叩き潰すほどにな」"
translation = "「중요한 건, 그 디재스터 핸드가 강대한 힘을 가지고 있다는 거야. 유성·신성 양 학원의 성기사를 한꺼번에 짓뭉개버릴 정도로 말이지」"

[[dialogue]]
speaker = "unk"
original = "両学園の壊滅。星騎士の絶滅。"
translation = "양 학원의 괴멸. 성기사의 절멸."

[[dialogue]]
speaker = "unk"
original = "耳を疑うような、聞くだけで重くのしかかるような内容を、梨緒は淡々と告げた。"
translation = "귀를 의심할 법한, 듣는 것만으로도 무겁게 짓누르는 듯한 내용을 리오는 담담하게 고했다."

[[dialogue]]
speaker = "マトイ"
original = "「また敵が増えたってこと……？\u3000いや、あの手は前からいたけど……」"
translation = "「또 적이 늘어났다는 거야……? 아니, 그 손은 전부터 있었지만……」"

[[dialogue]]
speaker = "unk"
original = "デネブから襲撃を仕掛けてきた極星学園。"
translation = "데네브에서 습격을 걸어온 극성학원."

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒・ジグ。"
translation = "리크리에의 사도 지그."

[[dialogue]]
speaker = "unk"
original = "そしてディザスターハンド。"
translation = "그리고 디재스터 핸드."

[[dialogue]]
speaker = "unk"
original = "世界は全然平和になんてなっていなかった。何せこれだけの脅威が迫っているのだから。"
translation = "세계는 전혀 평화로워지지 않았다. 제아무리 이만한 위협이 다가오고 있으니까."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ようするに、あの手はリクリエなのよね？\u3000どうしてあれは今私たちを襲ってこないの？」"
translation = "「요컨대, 그 손은 리크리에인 거지? 어째서 그건 지금 우리를 습격해오지 않는 거야?」"

[[dialogue]]
speaker = "梨緒"
original = "「リクリエそのものと表現するには語弊があるが……ディザスターハンドも無制限に出現することができないのかもしれない」"
translation = "「리크리에 그 자체라고 표현하기엔 어폐가 있지만…… 디재스터 핸드도 무제한으로 출현할 수는 없는 걸지도 몰라」"

[[dialogue]]
speaker = "梨緒"
original = "「おそらくあれは常にフィーニスの塔の頂上にいるわけではない。現れたのには何かきっかけがあったんじゃないのか？」"
translation = "「아마 그건 항상 피니스의 탑 꼭대기에 있는 게 아닐 거야. 나타난 데에는 뭔가 계기가 있었던 게 아닐까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！\u3000それって──」"
translation = "「! 그건──」"

[[dialogue]]
speaker = "unk"
original = "俺たちがフィーニスの塔を、三界を見渡す視座として利用しようとしたこと。"
translation = "우리들이 피니스의 탑을, 삼계를 내려다보는 시좌로서 이용하려 했던 것."

[[dialogue]]
speaker = "unk"
original = "それを妨害するためにディザスターハンドは俺たちの前に現れたのか？"
translation = "그것을 방해하기 위해 디재스터 핸드는 우리 앞에 나타난 것인가?"

[[dialogue]]
speaker = "サーシャ"
original = "「私たちの動きを察知された、と思った方が良さそうね～。どうやったのかはわからないけれど」"
translation = "「우리 움직임을 눈치챘다고 생각하는 게 좋을 것 같네요~. 어떻게 한 건지는 모르겠지만요」"

[[dialogue]]
speaker = "クロト"
original = "「そうですね。情報を得るためにフィーニスの塔を登るのは諦めた方がいいでしょう」"
translation = "「그렇네요. 정보를 얻기 위해 피니스의 탑을 오르는 건 포기하는 게 좋겠어요」"

[[dialogue]]
speaker = "マトイ"
original = "「そんな……何かわかるかもって思ったのに……」"
translation = "「그런…… 뭔가 알 수 있을지도 모른다고 생각했는데……」"

[[dialogue]]
speaker = "unk"
original = "状況はまた悪化した。"
translation = "상황은 다시 악화되었다."

[[dialogue]]
speaker = "unk"
original = "ただでさえ情報を得る手段が限られているのに、その１つが封じられたのだから。"
translation = "그렇지 않아도 정보를 얻을 수단이 한정되어 있는데, 그중 하나가 봉쇄되었으니까."

[[dialogue]]
speaker = "クロト"
original = "「ちなみに……みんなは頂上から何か見えたか？」"
translation = "「그건 그렇고…… 다들 꼭대기에서 뭔가 보였어?」"

[[dialogue]]
speaker = "アナ"
original = "「いえ、私は撤退するので精いっぱいだったので」"
translation = "「아뇨, 저는 철수하는 것만으로도 벅찼거든요」"

[[dialogue]]
speaker = "サーシャ"
original = "「私もそうね～。爆発があったのは感じたけど」"
translation = "「저도 그래요~. 폭발이 있었던 건 느꼈지만요」"

[[dialogue]]
speaker = "マトイ"
original = "「同じく……ごめんね」"
translation = "「나도 마찬가지…… 미안해」"

[[dialogue]]
speaker = "クロト"
original = "「ああいや、聞いてみただけだから。気にしないでくれ」"
translation = "「아아 아니, 물어본 것뿐이니까. 신경 쓰지 마」"

[[dialogue]]
speaker = "unk"
original = "俺が見えたのは、ある男の最期。"
translation = "내가 본 것은, 어느 남자의 최후."

[[dialogue]]
speaker = "？？？"
original = "『道は俺が──娘の成長をこの目で見られないのは残念だが──元気に育ってくれるなら──』"
translation = "『길은 내가── 딸의 성장을 이 눈으로 보지 못하는 건 유감이지만── 건강하게 자라준다면──』"

[[dialogue]]
speaker = "？？？"
original = "『<ruby>娘<rt>ヴィーナス</rt></ruby>を頼んだぞ……ラク──』"
translation = "『<ruby>딸<rt>비너스</rt></ruby>을 부탁한다…… 락──』"

[[dialogue]]
speaker = "unk"
original = "おそらくあれはデネブの俺。"
translation = "아마 저건 데네브의 나."

[[dialogue]]
speaker = "unk"
original = "敗北を悟った緋宮クロトが、最期の力を振り絞ってヴィーナスを送り出そうとしたんだ。"
translation = "패배를 깨달은 히노미야 쿠로토가, 마지막 힘을 쥐어짜 비너스를 보내려 한 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの沈痛な表情を見て察する。"
translation = "비너스의 침통한 표정을 보고 짐작한다."

[[dialogue]]
speaker = "unk"
original = "彼女も同じ光景を見たんだ。"
translation = "그녀도 같은 광경을 본 것이다."

[[dialogue]]
speaker = "unk"
original = "俺が敗れる姿を。父の最期を。"
translation = "내가 패배하는 모습을. 아버지의 최후를."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス」"
translation = "「비너스」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う、うん」"
translation = "「으, 응」"

[[dialogue]]
speaker = "unk"
original = "はっとして顔を上げるヴィーナス。"
translation = "퍼뜩 정신을 차리며 고개를 드는 비너스."

[[dialogue]]
speaker = "unk"
original = "その目は潤み、目の端に雫が浮かんでいた。"
translation = "그 눈은 젖어 있었고, 눈가에는 이슬이 맺혀 있었다."

[[dialogue]]
speaker = "クロト"
original = "「デネブの俺はもういない。だけどこの世界の緋宮クロトはここにいる。俺がヴィーナスを守るから」"
translation = "「데네브의 나는 이제 없어. 하지만 이 세계의 히노미야 쿠로토는 여기 있어. 내가 비너스를 지킬 테니까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね……頼りにしてるわ、パパ」"
translation = "「그렇네…… 의지하고 있을게, 아빠」"

[[dialogue]]
speaker = "unk"
original = "冗談めかしながらヴィーナスが笑う。"
translation = "농담조로 말하며 비너스가 웃는다."

[[dialogue]]
speaker = "unk"
original = "破滅に向かう世界から渡ってきた彼女を、決して１人にしないと改めて誓う。"
translation = "파멸로 향하는 세계에서 건너온 그녀를 결코 혼자 두지 않겠다고 다시금 맹세한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ひとまず、ディザスターハンドのことはヘレナちゃんにも報告しておくわ」"
translation = "「일단 디재스터 핸드에 대해서는 헬레나짱에게도 보고해 둘게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、そうだ、いいニュースもあるのよ。ヘレナちゃんが新しい新星学園の学園長候補を連れてきてくれてね」"
translation = "「아, 맞다, 좋은 뉴스도 있어. 헬레나짱이 새로운 신성학원의 학원장 후보를 데려와 줬거든」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「次の理事会で承認されれば、正式に学園長に就任するわ。ヘレナちゃんが太鼓判を押してた人だからきっと大丈夫よ！」"
translation = "「다음 이사회에서 승인되면 정식으로 학원장에 취임할 거야. 헬레나짱이 보증한 사람이니까 분명 괜찮을 거야!」"

[[dialogue]]
speaker = "クロト"
original = "「新しい学園長……どんな人なんだろう？」"
translation = "「새로운 학원장…… 어떤 사람일까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私も知らないけど、きっと驚くって言ってたわ」"
translation = "「나도 모르지만, 분명 놀랄 거라고 말했어」"

[[dialogue]]
speaker = "梨緒"
original = "「私の新星学園も、学園長はセイファート氏だったから心当たりはないな……」"
translation = "「나의 신성학원도 학원장은 세이퍼트 씨였으니까 짐작 가는 바가 없네……」"

[[dialogue]]
speaker = "梨緒"
original = "「気になるところだが、そろそろ家に帰ろう。今日はもう遅い」"
translation = "「신경 쓰이는 부분이지만, 슬슬 집에 가자. 오늘은 벌써 늦었어」"

[[dialogue]]
speaker = "梨緒"
original = "「居候の身で深夜に帰るのは、とても申し訳ない気持ちになるがな……」"
translation = "「얹혀사는 처지에 심야에 귀가하는 건 무척 미안한 기분이 들지만 말이야……」"

[[dialogue]]
speaker = "アナ"
original = "「私もマムが怖いです」"
translation = "「저도 맘이 무서워요」"

[[dialogue]]
speaker = "サーシャ"
original = "「何を言われるかしら～」"
translation = "「무슨 소리를 들으려나요~」"

[[dialogue]]
speaker = "マトイ"
original = "「あ……ＤＩＳＣにお母さんから留守電入ってる……」"
translation = "「아…… DISC에 엄마한테서 부재중 전화 와 있어……」"

[[dialogue]]
speaker = "unk"
original = "時刻を見ると、とっくに零時を回っていた。"
translation = "시각을 보니 벌써 자정을 넘겨 있었다."

[[dialogue]]
speaker = "unk"
original = "母さんになんて言おうかと考えながら、帰路に就いたのだった。"
translation = "어머니께 뭐라고 말할까 고민하며 귀갓길에 올랐다."

[[dialogue]]
speaker = "unk"
original = "しんと静まった街の中を、梨緒は月明かりを浴びながら歩く。"
translation = "고요히 가라앉은 거리 안을 리오는 달빛을 받으며 걷는다."

[[dialogue]]
speaker = "unk"
original = "向かっているのは教皇庁公邸──行く宛てのない梨緒の仮の住処だ。"
translation = "향하고 있는 곳은 교황청 공저── 갈 곳 없는 리오의 임시 거처다."

[[dialogue]]
speaker = "梨緒"
original = "「キリカさんになんと言われるか……想像しただけで頭が痛い」"
translation = "「키리카 씨에게 무슨 소리를 들을지…… 상상만 해도 머리가 아파」"

[[dialogue]]
speaker = "梨緒"
original = "「本当に……頭が痛いな……」"
translation = "「정말로…… 머리가 아프네……」"

[[dialogue]]
speaker = "unk"
original = "梨緒が脳裏に浮かぶのは、あの破滅の化身の姿。"
translation = "리오의 뇌리에 떠오르는 것은 그 파멸의 화신의 모습."

[[dialogue]]
speaker = "unk"
original = "対峙したのは一瞬だったが、その暴威は梨緒の知るそれといささかの違いもない。"
translation = "대치한 것은 한순간이었지만, 그 폭위는 리오가 아는 그것과 조금의 차이도 없다."

[[dialogue]]
speaker = "梨緒"
original = "「ディザスターハンドは必ず倒さなくてはならない。さもなくば全て破壊し尽くされてしまう。だが……」"
translation = "「디재스터 핸드는 반드시 쓰러뜨려야만 해. 그러지 않으면 모든 것이 파괴되어 버릴 거야. 하지만……」"

[[dialogue]]
speaker = "梨緒"
original = "（ディザスターハンドは私たちの前に現れた。こちらに緋宮クロトがいるにもかかわらず）"
translation = "(디재스터 핸드는 우리 앞에 나타났다. 이쪽에 히노미야 쿠로토가 있음에도 불구하고)"

[[dialogue]]
speaker = "梨緒"
original = "（そして平行世界デネブから現れた極星学園……）"
translation = "(그리고 평행세계 데네브에서 나타난 극성학원……)"

[[dialogue]]
speaker = "梨緒"
original = "（なら私の世界は──）"
translation = "(그렇다면 내 세계는──)"

[[dialogue]]
speaker = "unk"
original = "梨緒の頭の中で考えがぐるぐる巡る。"
translation = "리오의 머릿속에서 생각이 빙글빙글 맴돈다."

[[dialogue]]
speaker = "unk"
original = "やがてひとつの結論に辿り着こうとするが、その前に思考が止まる。"
translation = "이윽고 하나의 결론에 도달하려 하지만, 그전에 사고가 멈춘다."

[[dialogue]]
speaker = "unk"
original = "いや、最初からわかっていたことかもしれない。"
translation = "아니, 처음부터 알고 있었던 것일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "ただそれを受け入れることができなかっただけ──"
translation = "단지 그것을 받아들일 수 없었을 뿐──"

[[dialogue]]
speaker = "梨緒"
original = "（ジグ……）"
translation = "(지그……)"

[[dialogue]]
speaker = "ジグ"
original = "『可能性は残されている。私はそう思うよ』"
translation = "『가능성은 남아 있어. 나는 그렇게 생각해』"

[[dialogue]]
speaker = "梨緒"
original = "「可能性、か……」"
translation = "「가능성, 인가……」"

[[dialogue]]
speaker = "梨緒"
original = "「私たちの世界を救う可能性は……もう……」"
