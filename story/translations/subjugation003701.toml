[[dialogue]]
speaker = "unk"
original = "第１話,集結,B"
translation = "제1화, 집결, B"

[[dialogue]]
speaker = "unk"
original = "時を遡ること、数時間──"
translation = "시간을 거슬러 올라가 수 시간 전──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「遅くなってごめんなさい、魔王」"
translation = "「늦어서 미안해, 마왕」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「来たわね、ルヴィネ！\u3000それに極星学園のみんなも！」"
translation = "「왔구나, 루비네! 그리고 극성학원 모두도!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「お、お邪魔しますっ」"
translation = "「시, 실례하겠습니다」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ひぇ～っ……こんな豪邸に入るのは初めてですっ。凄いですね、エステル！」"
translation = "「히익~…… 이런 호화 저택에 들어오는 건 처음이에요. 대단하네요, 에스텔!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「は、はい。お話には聞いていましたが、ヴィーナスさんは本当にお嬢様なんですね……」"
translation = "「네, 네. 이야기는 들었지만 비너스 씨는 정말로 아가씨였군요……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お庭もすっごく広かったですし、お屋敷内を探検してみたいところですが──」"
translation = "「정원도 엄청 넓었고, 저택 안을 탐험해 보고 싶지만──」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「いい子にしていないとダメよ、グレイス。今から『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』討伐の作戦会議をするのだから」"
translation = "「착하게 있지 않으면 안 돼, 그레이스. 이제부터 『<ruby>XELOS<rt>제로스</rt></ruby>』 토벌 작전 회의를 할 거니까」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「魔王、デネブでの戦いの傷はもういいのか？」"
translation = "「마왕, 데네브에서의 전투 상처는 이제 괜찮은 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、問題ない。極星学園のみんなも元気そうで何よりだ」"
translation = "「아아, 문제없어. 극성학원 모두도 건강해 보여서 다행이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアト、デネブからよく来てくれた。また君と戦えることが嬉しいぞ」"
translation = "「베아트, 데네브에서 잘 와줬어. 다시 너와 싸울 수 있게 되어 기뻐」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん、私もだよ梨緒ちゃん！\u3000それに選管のみんなも！」"
translation = "「응, 나도야 리오 짱! 그리고 선관 모두도!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いらっしゃーい、なんて言ったら家主に悪いかな？」"
translation = "「어서 와~ 라고 말하면 집주인한테 실례일까?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いよいよ最終決戦だ、ド派手に行くぞっ！」"
translation = "「드디어 최종 결전이다, 화끈하게 가자고!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「魔王。これで頼れる援軍は最後だ──会議に必要なメンバーは全員招集できたね」"
translation = "「마왕. 이걸로 의지할 수 있는 원군은 마지막이다── 회의에 필요한 멤버는 전원 소집됐군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──」"
translation = "「아아──」"

[[dialogue]]
speaker = "unk"
original = "俺は九浄家の大広間に集まった面々を見渡す。"
translation = "나는 쿠죠 가문의 대광장에 모인 면면을 둘러본다."

[[dialogue]]
speaker = "unk"
original = "フィオナたち流星星徒会──"
translation = "피오나 일행 유성학생회──"

[[dialogue]]
speaker = "unk"
original = "──聖庭園。"
translation = "──성정원."

[[dialogue]]
speaker = "unk"
original = "頽廃都市キュリオスの面々──煌嶺の後ろには、先の『<ruby>星の再会<rt>スター・リユニオン</rt></ruby>』作戦で奮ってくれた星術使いの姿もあった。"
translation = "퇴폐도시 큐리오스의 면면── 코우레이의 뒤에는 지난 『<ruby>별의 재회<rt>스타 리유니온</rt></ruby>』 작전에서 활약해 준 성술사의 모습도 있었다."

[[dialogue]]
speaker = "unk"
original = "そしてネビュラの魔女たちに、コラプサー。"
translation = "그리고 네뷸라의 마녀들에 콜랩서."

[[dialogue]]
speaker = "unk"
original = "デネブ世界から駆けつけてくれたセイファート学園長。そして、アルタイルの現新星学園長であるシノさん、流星学園のラティエ学園長の姿もある。"
translation = "데네브 세계에서 달려와 준 세이파트 학원장. 그리고 알타이르의 현 신성 학원장인 시노 씨, 유성 학원의 라티에 학원장의 모습도 있다."

[[dialogue]]
speaker = "unk"
original = "他にも多くのメンバーが集まっている──アルタイル・デネブ連合軍の集会だった。"
translation = "그 밖에도 많은 멤버가 모여 있다── 알타이르·데네브 연합군의 집회였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──待たせたな、みんな。それじゃあ始めよう」"
translation = "「──기다리게 했군, 모두들. 그럼 시작하자」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の息の根を止める、最後の戦いの作戦会議だ！」"
translation = "「창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』의 숨통을 끊는 마지막 전투의 작전 회의다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まずは現在の状況を共有する──アニマ先輩、トレジアンナさん。お願いします」"
translation = "「먼저 현재 상황을 공유하지── 아니마 선배, 트레지안나 씨. 부탁드립니다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「単刀直入にいくゾ。我々が倒すべき創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』──奴の居場所は、崩壊せし平行世界『ベガ』ダ！」"
translation = "「단도직입적으로 가겠다조. 우리가 쓰러뜨려야 할 창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』── 놈의 거처는 붕괴된 평행세계 『베가』다!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「デネブで会長さんに追い詰められた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は、次元の裂け目に逃げ込みましたが、その逃亡先を割り出すことに成功しました☆」"
translation = "「데네브에서 회장님에게 몰린 『<ruby>XELOS<rt>제로스</rt></ruby>』는 차원의 틈새로 도망쳤습니다만, 그 도망처를 찾아내는 데 성공했습니다☆」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──ほう。よくぞ尻尾を捕らえることができたな」"
translation = "「──호오. 용케도 꼬리를 잡았군」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「次代の女神、ルヴィネの協力があったからナ！\u3000フィーニスの塔のコントロール権はすでに取り戻していル」"
translation = "「차세대 여신 루비네의 협력이 있었던 덕분이다나! 피니스의 탑 컨트롤 권한은 이미 되찾았다구」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「塔の頂上にある神の視座──かつて女神テルルが、３つの平行世界を観測した場所を使えば、造作もないことダ」"
translation = "「탑 꼭대기에 있는 신의 시좌── 과거 여신 테루루가 3개의 평행세계를 관측했던 장소를 사용하면 식은 죽 먹기다조」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今の私は霊力が扱えないから、塔のコントロールには守護天使たちの力を借りる必要があったけれど……」"
translation = "「지금의 나는 영력을 다룰 수 없어서 탑 컨트롤에는 수호천사들의 힘을 빌릴 필요가 있었지만……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「テルルと同じく、神の視座から次元を超えた『<ruby>遠見<rt>とおみ</rt></ruby>』を行うことはできるわ。<ruby>蒐集<rt>しゅうしゅう</rt></ruby>の魔女、準備はできているかしら？」"
translation = "「테루루와 마찬가지로 신의 시좌에서 차원을 넘은 『원시』를 행할 수는 있어. 수집의 마녀, 준비는 됐을까?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「もちろんですよ～！\u3000色々と大変でしたが、神の視座で確認した光景を映像にしてきました♪」"
translation = "「물론이죠~! 여러 가지로 힘들었지만, 신의 시좌에서 확인한 광경을 영상으로 만들어 왔답니다♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……出鱈目な力だな、本当に」"
translation = "「……터무니없는 힘이군, 정말로」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「むっふっふ。これが年の功ってやつですよ、セドナさん☆\u3000では、こちらのモニターをどうぞ～♪」"
translation = "「무훗후. 이게 짬바라는 거예요, 세도나 씨☆ 자, 이쪽 모니터를 봐 주세요~♪」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「これが、梨緒ちゃんたちの……」"
translation = "「이게 리오 짱 일행의……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ああ。私とジグの故郷。ベガだ」"
translation = "「……아아. 나와 지그의 고향. 베가다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「皮肉なものだね。こんな光景を見て、懐かしいだなんて思いたくはなかったが」"
translation = "「아이러니하군. 이런 광경을 보고 그립다는 생각을 하고 싶지는 않았지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これがベガの世界……正確に言えば、ベガの人間界。ちょうど流星教皇庁が建っていたあたりと聞いている」"
translation = "「이게 베가 세계…… 정확히 말하면 베가의 인간계. 딱 유성 교황청이 서 있던 근처라고 들었어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「…………こうして映像で見ると、衝撃的ですね」"
translation = "「…………이렇게 영상으로 보니 충격적이네요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は今、ベガにいる。そのことは間違いない、確実ダ」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』는 지금 베가에 있다. 그건 틀림없는 사실이다조」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「じゃあ乗り込んでぶっ倒せばいいってことだな！\u3000一番槍はアタシに任せてくれよ！」"
translation = "「그럼 쳐들어가서 박살 내면 된다는 거네! 첫 번째 창은 나한테 맡겨달라고!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう行きたいのは山々なんだが、問題が持ち上がってるんだ」"
translation = "「그러고 싶은 마음은 굴뚝같지만, 문제가 생겼어」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「懸念点はいくつかあるんですが～……まずは一番ヤバいところからいきましょうか☆」"
translation = "「우려되는 점은 몇 가지 있습니다만~…… 먼저 가장 위험한 부분부터 가볼까요☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「現在、ベガの地に降りると、我々の最高戦力である会長さんは、実力の全てを発揮することができません！」"
translation = "「현재 베가의 땅에 내려가면 우리의 최고 전력인 회장님은 실력을 온전히 발휘할 수 없습니다!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ええっ！？\u3000ど、どういうことですか？」"
translation = "「에엣!? 어, 어떻게 된 건가요?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長の守護星は地球。ベガ世界で戦うなら当然、ベガの地球から星力を受け取ることになるんだガ……」"
translation = "「회장의 수호성은 지구. 베가 세계에서 싸운다면 당연히 베가의 지구로부터 성력을 받게 된다만……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ベガの地球は今、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に<b>喰われている</b>んだヨ」"
translation = "「베가의 지구는 지금 『<ruby>XELOS<rt>제로스</rt></ruby>』에게 <b>먹히고</b> 있다구」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「喰われてる……！？」"
translation = "「먹히고 있다고……!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「映像で見てもらった方がわかりやすいですね～」"
translation = "「영상을 보시는 게 이해가 빠를 거예요~」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ホロウ……！？\u3000って、なんだ、あいつの足元にある、おかしな紋章は──！？」"
translation = "「홀로우……!? 어라, 저 녀석 발치에 있는 이상한 문장은──!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あれは霊力で編まれた術式と推測されル。地球を、文字通り喰いちぎって飲み込み、糧としているんダ」"
translation = "「저건 영력으로 엮인 술식으로 추정된다조. 지구를 말 그대로 뜯어 먹어 삼켜서 양분으로 삼고 있는 거다나」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「随分と生き汚い──なるほど。デネブで負った傷を、ああして癒しているということか」"
translation = "「상당히 끈질기군── 과연. 데네브에서 입은 상처를 저렇게 치유하고 있다는 건가」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ええ、その通りです！\u3000非効率ですが、星の質量を無理やり霊力に変換している様子でして～」"
translation = "「네, 맞아요! 비효율적이지만 별의 질량을 억지로 영력으로 변환하고 있는 모습이라서~」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──っ！\u3000『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』も、あそこに……！」"
translation = "「──윽! 『<ruby>XELOS<rt>제로스</rt></ruby>』도 저기에……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「厄災の力を備えた魔王に痛めつけられた、その傷を治すためになりふり構っていられないということかしら」"
translation = "「재앙의 힘을 갖춘 마왕에게 당한 상처를 고치기 위해 수단과 방법을 가리지 않는다는 걸까」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「その通りダ。我々は便宜上、コレを『星喰らい』と呼ぶことにしたヨ」"
translation = "「그 말대로다조. 우리는 편의상 이것을 『호시쿠라이』라고 부르기로 했다나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふむ。地球から星力を受け取る魔王にとって、これ以上ない妨害というわけか……」"
translation = "「흠. 지구로부터 성력을 받는 마왕에게 이보다 더한 방해는 없다는 거군……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はよほど会長さんを恐れているのでしょう」"
translation = "「네. 『<ruby>XELOS<rt>제로스</rt></ruby>』는 그만큼 회장님을 두려워하고 있는 거겠죠」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「本来なら『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は、こうして姿を見せることすら避けたかったはずです！」"
translation = "「본래라면 『<ruby>XELOS<rt>제로스</rt></ruby>』는 이렇게 모습을 드러내는 것조차 피하고 싶었을 겁니다!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「時空の裂け目の中で、ひたすら息を潜められればよかったのだろうガ……奴は早急に回復をする必要性に迫られたようダ」"
translation = "「시공의 틈새 속에서 오로지 숨을 죽이고 있으면 좋았겠다만…… 놈은 시급히 회복해야 할 필요성에 몰린 것 같다조」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……何かトラブルがあったってことか？」"
translation = "「……뭔가 트러블이라도 있었다는 거야?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「うム。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』にとっては計算外の痛手がネ」"
translation = "「으음. 『<ruby>XELOS<rt>제로스</rt></ruby>』에게는 계산 밖의 타격이었다나」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……痛手？」"
translation = "「……타격?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブの戦いで、奴が最後に……地球そのものを壊そうと大量のホロウを一気に吸収しただろう？」"
translation = "「데네브 전투에서 놈이 마지막에…… 지구 자체를 부수려고 대량의 홀로우를 단번에 흡수했었지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その時に、煌嶺が仕込んでいてくれたんだ。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を蝕む呪いをな」"
translation = "「그때 코우레이가 심어두었거든. 『<ruby>XELOS<rt>제로스</rt></ruby>』를 좀먹는 저주를 말이야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……煌嶺は、多数のホロウたちをあの時、九尾の炎で使役下に置いていた」"
translation = "「……코우레이는 수많은 홀로우들을 그때 구미의 불꽃으로 지배하에 두었었지」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そうだ。ホロウが自裁するよりも早く、炎で包み傀儡としていた。あの時、魔王が死んだことで悪神もホロウも慢心していたからな」"
translation = "「그렇다. 홀로우가 자결하기보다 빠르게 불꽃으로 감싸 꼭두각시로 삼았지. 그때 마왕이 죽은 것으로 악신도 홀로우도 방심하고 있었으니까」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾に何体か奪われても構わんと高を括りおって。クク、だから寝首を掻かれるのだ」"
translation = "「소첩에게 몇 마리 빼앗겨도 상관없다며 얕보더군. 쿠쿠, 그래서 뒤통수를 맞는 것이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は、煌嶺の支配下にあったホロウたちも、自らの内側に取り込んだ。爆弾を飲み込んだようなものだ」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』는 코우레이의 지배하에 있던 홀로우들도 자신의 내면으로 받아들였다. 폭탄을 삼킨 셈이지」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「時空の狭間でゆったり何十年か待つ予定だったのだろうが、そうはさせぬ。傀儡の複製体を、奴の裡側で永劫の炎に変えてやった」"
translation = "「시공의 틈새에서 여유롭게 몇십 년 기다릴 예정이었겠지만 그렇게 두지 않아. 꼭두각시 복제체를 놈의 안에서 영겁의 불꽃으로 바꿔버렸다」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「消そうにも消せぬ、星力の炎で身の裡から灼かれる経験は、さしもの創造神も初めてであっただろうな」"
translation = "「끄려야 끌 수 없는 성력의 불꽃으로 몸 안바닥부터 태워지는 경험은 그 창조신이라도 처음이었겠지」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………えっぐ」"
translation = "「……살벌하네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「煌嶺のお手柄だ。おかげで奴は、早急な回復の必要性に迫られ──ベガの世界に降り立った」"
translation = "「코우레이의 공이다. 덕분에 놈은 시급한 회복의 필요성에 몰려── 베가 세계에 내려앉았다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あまりに激しい消耗を補うためニ、身をさらしてでも糧を得る『食事』を行わなければならなかっタ……そういうことダ」"
translation = "「너무나 격렬한 소모를 보충하기 위해 몸을 노출해서라도 양분을 얻는 『식사』를 해야만 했다…… 그런 거다조」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「さっきのホロウがいた場所が、食事──ううん。『星喰らい』をしているポイントってことですね」"
translation = "「아까 홀로우가 있던 장소가 식사── 아니, 『호시쿠라이』를 하는 포인트라는 거네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その通りだ。だけどそれは──１ヵ所だけじゃない」"
translation = "「그 말대로야. 하지만 그건── 한 곳만이 아니야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ここは天界……？\u3000そうか。崩壊してはいても、ベガにも三界はある──」"
translation = "「여기는 천계……? 그렇구나. 붕괴했어도 베가에도 삼계는 있어──」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい。そしてここを守護しているのが──」"
translation = "「네. 그리고 여기를 수호하고 있는 것이──」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……やれやれ。また趣味の悪い番人を用意したものだね」"
translation = "「……야레야레. 또 취미 나쁜 파수꾼을 준비했군」"

[[dialogue]]
speaker = "unk"
original = "使徒だった頃のジグの劣化コピーである、シャドウ。そして……"
translation = "사도였던 시절 지그의 열화 카피인 섀도. 그리고……"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あれれっ？\u3000『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がこっちにもいるのです！？」"
translation = "「어레레? 『<ruby>XELOS<rt>제로스</rt></ruby>』가 여기에도 있는 거예요!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうダ。『星喰らい』の全ての拠点に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はイル。地球のエネルギーを効率よく吸い上げる子機みたいなものダロウ」"
translation = "「그렇다조. 『호시쿠라이』의 모든 거점에 『<ruby>XELOS<rt>제로스</rt></ruby>』는 있다나. 지구의 에너지를 효율적으로 빨아올리는 단말기 같은 거다조」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「分身してる、って感じか……？」"
translation = "「분신하고 있다는 느낌인가……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「本体は姿を隠していて、どこにいるのかわからない……そういうことですね」"
translation = "「본체는 모습을 숨기고 있어서 어디에 있는지 알 수 없다…… 그런 거군요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「その通りダ。だからまず、当面の脅威である『星喰らい』から──次は聖庭園ダ」"
translation = "「맞다조. 그러니까 먼저 당면한 위협인 『호시쿠라이』부터── 다음은 성정원이다나」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしの偽物も……」"
translation = "「내 가짜도……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「天界はこちらの２ヵ所です。次は魔界ですね！」"
translation = "「천계는 이쪽의 두 곳입니다. 다음은 마계네요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こっちはギエルね！\u3000クロトの守護星を好き勝手してくれちゃって……！」"
translation = "「이쪽은 기엘이네! 쿠로토의 수호성을 멋대로 주물러대고……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「フィヴォス流星群の折に戦った個体とは、正確には別物に見えますが──」"
translation = "「피보스 유성군 때 싸웠던 개체와는 정확히는 다른 종류로 보입니다만──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしのシャドウと同じで、似せて造ってるみたいだな。とはいえ、相当手強そうだ……」"
translation = "「내 섀도와 마찬가지로 비슷하게 만든 모양이네. 그렇다 해도 상당한 강적이겠어……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「次が最後、５ヵ所目ダ」"
translation = "「다음이 마지막, 5번째다조」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……アルタイルの私の、模造品か」"
translation = "「……알타이르의 나의 모조품인가」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……はい。俺が魔王として覚醒しなかったら、確実に負けていた相手です」"
translation = "「……네. 제가 마왕으로 각성하지 않았다면 확실히 패배했을 상대입니다」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「シャドウの出力は本物の６割から７割程度……けれどそれは、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がある程度量産を意識した時のスペックよ」"
translation = "「섀도의 출력은 본체의 6~7할 정도…… 하지만 그건 『<ruby>XELOS<rt>제로스</rt></ruby>』가 어느 정도 양산을 의식했을 때의 스펙이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「この『星喰らい』を行う個体に関しては、コピー元以上の力が与えられている可能性が高いわね」"
translation = "「이 『호시쿠라이』를 행하는 개체에 관해서는 카피 원본 이상의 힘이 부여되었을 가능성이 높겠네」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「さらにバッドニュースがある。ベガの人間界を映すゾ」"
translation = "「게다가 배드 뉴스가 있다조. 베가의 인간계를 비추겠다나」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ま、まだあんのかよ──！？」"
translation = "「머, 아직도 더 있는 거냐고──!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「な、何これっ！？\u3000ホロウじゃ──ない！？」"
translation = "「이, 이게 뭐야!? 홀로우가── 아니야!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ホロウ・ルヴィネには違いなイ。ただ、それをさらに劣化コピーした、『シャドウ・ホロウルヴィネ』の軍勢だナ」"
translation = "「홀로우 루비네인 건 다름없다조. 다만 그걸 한 번 더 열화 카피한 『섀도 홀로우 루비네』의 군세다나」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「今現在観測できているだけデモ、１００万体弱はいるゾ」"
translation = "「지금 현재 관측되는 것만 해도 100만 마리 조금 안 되게 있다조」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ええぇ～～っ！？\u3000数が多すぎるのです！？」"
translation = "「에에에~~!? 숫자가 너무 많은 거예요!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……最初は『星喰らい』たちだけだったんだがネ。ベガ世界を観測していたら、ある瞬間から爆発的に増殖を始めタ」"
translation = "「……처음에는 『호시쿠라이』들뿐이었다만. 베가 세계를 관측하다 보니 어느 순간부터 폭발적으로 증식을 시작했다조」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「おそらくアニマたちの『遠見』に、奴らも気づいたのダロウ。星喰らいの活動を妨げようとする輩を、徹底して排除するつもりダ」"
translation = "「아마 아니마 일행의 『원시』를 놈들도 눈치챘겠지. 호시쿠라이의 활동을 방해하려는 무리를 철저히 배제할 생각이다나」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ご覧の通リ。ベガの地球は今、星喰らいの影響で疲弊していル──これを解決しない限リ、会長は厄災の右腕を振るうことができなイ」"
translation = "「보시는 대로다조. 베가의 지구는 지금 호시쿠라이의 영향으로 피폐해져 있다나── 이걸 해결하지 않는 한 회장은 재앙의 오른팔을 휘두를 수 없다조」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そして星喰らいのポイントは全部で５ヵ所。各地を攻略するにあたって、戦力を分散しなくてはなりません！」"
translation = "「그리고 호시쿠라이 포인트는 전부 5곳. 각지를 공략하기 위해 전력을 분산해야만 합니다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おまけに『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は分身体が各地に点在し、本体の居場所が掴めず……」"
translation = "「게다가 『<ruby>XELOS<rt>제로스</rt></ruby>』는 분신체가 각지에 점재해 본체의 위치를 잡을 수 없고……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ホロウのシャドウも大軍勢になって、守りを固めてる……」"
translation = "「홀로우의 섀도도 대군세가 되어 수비를 굳히고 있어……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら～……」"
translation = "「어머 어머~……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王。これ……どうするんだ？」"
translation = "「마왕. 이거…… 어떻게 할 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろん突破する──まずは５ヵ所の星喰らいを攻略するところからだ」"
translation = "「물론 돌파한다── 먼저 5곳의 호시쿠라이를 공략하는 것부터다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それはわかりますが、肝心の方法が……」"
translation = "「그건 알겠습니다만 정작 방법이……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その点についても問題ない──トリシャさん」"
translation = "「그 점에 대해서도 문제없어── 트리샤 씨」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「──はい。迷える子羊たちに、可能性を提示いたします……」"
translation = "「──네. 길 잃은 어린양들에게 가능성을 제시하겠습니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「会長さんの持つ、魔王ラクシスの権能を使えば……何とかなるかもしれません……フ、フフフ……！」"
translation = "「회장님이 가진 마왕 락시스의 권능을 사용하면…… 어떻게든 될지도 모릅니다…… 후, 후후후……!」"

