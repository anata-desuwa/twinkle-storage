[[dialogue]]
speaker = "unk"
original = "第２話,水着フォーム対決,P"
translation = "제2화, 수영복 폼 대결, P"

[[dialogue]]
speaker = "アム"
original = "「待ってたよ、ついにエルゼも水着フォームを手に入れたみたいだね」"
translation = "「기다렸어, 드디어 엘제도 수영복 폼을 손에 넣은 것 같네.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ええ、『流星附属最強の槍と盾』、どちらが強いかいよいよ決着がつきますわ」"
translation = "「네, 『유성 부속 최강의 창과 방패』, 어느 쪽이 강한지 드디어 결판이 날 것입니다.」"

[[dialogue]]
speaker = "unk"
original = "プライベートビーチを借りて、エルゼとアムの名物対決が始まる。"
translation = "프라이빗 비치를 빌려, 엘제와 아무의 명물 대결이 시작된다."

[[dialogue]]
speaker = "unk"
original = "アムはエルゼよりも先に水着フォームを手に入れていた。"
translation = "아무는 엘제보다 먼저 수영복 폼을 손에 넣고 있었다."

[[dialogue]]
speaker = "unk"
original = "だが、今回エルゼが水着フォームを手に入れたことで対等の条件で勝負が出来る。"
translation = "하지만, 이번에 엘제가 수영복 폼을 손에 넣음으로써 대등한 조건으로 승부를 할 수 있다."

[[dialogue]]
speaker = "unk"
original = "これはエルゼもアムも、両者が待ち望んでいたことだろう。"
translation = "이것은 엘제도 아무도, 양쪽 모두가 고대하던 일일 것이다."

[[dialogue]]
speaker = "unk"
original = "……って、２人ともスク水なのね？"
translation = "……라고 해도, 둘 다 학교 수영복이네?"

[[dialogue]]
speaker = "アム"
original = "「そうだけど何か？」"
translation = "「그렇지만 왜?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「学生にとって制服が正装。すなわちスクール水着は正装なのですわ」"
translation = "「학생에게 교복이 정장. 즉 스쿨 미즈기는 정장인 것입니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「このフォームに変身すると、身も心も引き締まる思いです……アムもそうですわよね？」"
translation = "「이 폼으로 변신하면, 몸과 마음이 긴장되는 기분입니다…… 아무도 그렇죠?」"

[[dialogue]]
speaker = "アム"
original = "「うん、全く同感だよ！」"
translation = "「응, 완전히 동감이야!」"

[[dialogue]]
speaker = "unk"
original = "しっかり意見は合っている様子だ。"
translation = "확실히 의견은 일치하는 모양이다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ですが……アム、少々引っ掛かっていることがあるんですの」"
translation = "「하지만…… 아무, 조금 마음에 걸리는 것이 있습니다.」"

[[dialogue]]
speaker = "アム"
original = "「引っ掛かってること？\u3000何なの、それは？」"
translation = "「마음에 걸리는 것? 뭔데, 그게?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私、ヘレナ様よりこの戦闘服を頂いたことが嬉しくて、寮のお友達にお披露目して回ったんですわ」"
translation = "「제가, 헬레나 님에게 이 전투복을 받은 것이 기뻐서, 기숙사 친구들에게 보여주고 다녔습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そうしたら、大勢の方が会長様と同じような反応をしましたの」"
translation = "「그랬더니, 많은 분들이 회장님과 같은 반응을 했습니다.」"

[[dialogue]]
speaker = "アム"
original = "「そう言えば、あたしも似たような経験をした気が……」"
translation = "「그러고 보니, 나도 비슷한 경험을 한 것 같은데……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それに私たちの模擬戦を見に来てくださる方々は以前より大勢いらっしゃいましたが……」"
translation = "「게다가 저희의 모의전을 보러 와 주시는 분들은 이전보다 많이 계셨지만……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「その人数が最近、急に増えたように思えてなりませんの」"
translation = "「그 인원수가 최근, 갑자기 늘어난 것처럼 느껴져서 견딜 수가 없습니다.」"

[[dialogue]]
speaker = "アム"
original = "「えっと……あれじゃない？\u3000流星学園附属が誇る最強の盾と矛が、ついに水着フォームで激突ってことで注目を集めてるとか」"
translation = "「음…… 그거 아냐? 유성 학원 부속이 자랑하는 최강의 방패와 창이, 드디어 수영복 폼으로 격돌한다고 해서 주목을 받고 있다든가.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そういったものとは違う種類の、熱のこもった視線を感じることがありますわ」"
translation = "「그러한 것과는 다른 종류의, 열기가 담긴 시선을 느낄 때가 있습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「もしかして、なのですが……私たちの戦闘服、かなり特殊なのではありませんか？」"
translation = "「혹시, 말입니다만…… 저희의 전투복, 상당히 특수한 것이 아닙니까?」"

[[dialogue]]
speaker = "アム"
original = "「はは、まさかそんなことあるわけ……」"
translation = "「하하, 설마 그럴 리가……」"

[[dialogue]]
speaker = "アム"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アム"
original = "「どうなの、会長！！？」"
translation = "「어때, 회장!!?」"

[[dialogue]]
speaker = "unk"
original = "べ、別におかしなものではないよ！"
translation = "「벼, 별로 이상한 건 아니야!」"

[[dialogue]]
speaker = "アム"
original = "「そ、そうだよね。いや～、まったく驚かせないでよ、エルゼ～」"
translation = "「그, 그렇지. 이야~, 정말 깜짝 놀라게 하지 마, 엘제~」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「も、申し訳ありませんわ～」"
translation = "「죄, 죄송합니다아~」"

[[dialogue]]
speaker = "アム"
original = "「よし、それじゃ気を取り直して勝負だっ！」"
translation = "「좋아, 그럼 마음을 다잡고 승부다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ええ、参りますわ！」"
translation = "「네, 가겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "ビーチパラソルを構えるエルゼ。"
translation = "비치 파라솔을 겨누는 엘제."

[[dialogue]]
speaker = "unk"
original = "その攻撃を受け流そうと、アムはホバークラフトを構える。"
translation = "그 공격을 받아넘기려, 아무는 호버크래프트를 겨눈다."

[[dialogue]]
speaker = "unk"
original = "緊張の一瞬──のはずなんだけど、砂浜でじゃれ合う無邪気な女の子たち感が凄い。"
translation = "긴장의 순간――이어야 하는데, 모래사장에서 장난치는 순진한 여자아이들 느낌이 엄청나다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「バラッジ・オブ・パラソルっ！」"
translation = "「배러지 오브 파라솔!」"

[[dialogue]]
speaker = "アム"
original = "「グラビティタックルっ！」"
translation = "「그래비티 태클!」"

[[dialogue]]
speaker = "unk"
original = "──というのは見た目だけで、戦いが始まってしまえばさすがの迫力の２人ではあるのだった。"
translation = "――는 겉모습일 뿐, 싸움이 시작되고 나면 역시 박력이 넘치는 두 사람이었다."

[[dialogue]]
speaker = "アム"
original = "「今日のところは負けかな～、うー、悔しいっ」"
translation = "「오늘은 진 것 같네~, 으으, 분하다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そんなことはありませんわ。確かに攻勢の時間が続きましたけれど、手ごたえある一撃は一度も入れられていません」"
translation = "「그렇지 않습니다. 확실히 공세의 시간이 계속되긴 했지만, 제대로 된 일격은 한 번도 넣지 못했습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私の水着フォームの性能を知らないことを考えると、むしろアムの方が優勢だったと言えるのではありませんの？」"
translation = "「제 수영복 폼의 성능을 모른다는 점을 생각하면, 오히려 아무 쪽이 우세했다고 말할 수 있지 않습니까?」"

[[dialogue]]
speaker = "アム"
original = "「それは謙遜してるの？」"
translation = "「그거 겸손하는 거야?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「アムに対して謙遜する理由なんてありませんわ」"
translation = "「아무에게 겸손할 이유 같은 건 없습니다.」"

[[dialogue]]
speaker = "アム"
original = "「それもそっか……」"
translation = "「그것도 그렇네……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様は戦いを見ていてどう思いましたの？」"
translation = "「회장님은 싸움을 보고 어떻게 생각하셨습니까?」"

[[dialogue]]
speaker = "unk"
original = "それ以外の言葉が出てこない"
translation = "그 외의 말은 나오지 않는다"

[[dialogue]]
speaker = "unk"
original = "互角……"
translation = "호각……"

[[dialogue]]
speaker = "アム"
original = "「……そうだよね。もう聞き飽きた結果だけど、その評価が順当かもしれない」"
translation = "「……그렇겠지. 이제 지겹도록 들은 결과지만, 그 평가가 순당할지도 모르겠네.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ですが次こそは、しっかり決着をつけさせてもらいますわ」"
translation = "「하지만 다음에는, 확실히 결판을 내겠습니다.」"

[[dialogue]]
speaker = "アム"
original = "「望むところだよ！」"
translation = "「바라는 바야!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あら……なんだか会長様が笑顔ですわ」"
translation = "「어머…… 왠지 회장님이 웃고 계십니다.」"

[[dialogue]]
speaker = "アム"
original = "「な、なに、ニヤニヤして……」"
translation = "「뭐, 뭘, 히죽거리고 있어……」"

[[dialogue]]
speaker = "unk"
original = "仲良しだな～と思って"
translation = "친하구나~ 싶어서"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「っ……！\u3000あ、あの、一応アムとは友情というよりライバルという関係ですのよ」"
translation = "「윽……! 아, 저기, 일단 아무와는 우정이라기보다는 라이벌이라는 관계입니다.」"

[[dialogue]]
speaker = "アム"
original = "「そうそう！\u3000そこは誤解しないでね！」"
translation = "「맞아 맞아! 거긴 오해하지 말아 줘!」"

[[dialogue]]
speaker = "unk"
original = "仲良く訂正してくる２人の様子に、ますます笑みを止められなくなってしまうのだった。"
translation = "다정하게 정정해 주는 두 사람의 모습에, 더욱 웃음을 멈출 수 없게 되는 것이었다."

