[[dialogue]]
speaker = "unk"
original = "シズハと恋人として付き合い始めてから、しばらく経ったある休日。"
translation = "시즈하와 연인으로서 사귀기 시작하고 나서 한참 지난 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "俺たちはついに初エッチをする、という約束で、流星寮にあるシズハの部屋までやってきていた。"
translation = "우리는 마침내 첫 섹스를 한다는 약속으로 유성 기숙사에 있는 시즈하의 방까지 와 있었다."

[[dialogue]]
speaker = "シズハ"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を近づけて、そっと唇を突き出す彼女に、俺はキスをする。"
translation = "얼굴을 가까이 대고 살며시 입술을 내미는 그녀에게 나는 키스를 한다."

[[dialogue]]
speaker = "シズハ"
original = "「んっ……ちゅっ……<emoji=heart04>\u3000ちゅっ……んむっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04> 츄…… 음뭇……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ちゅぱぁ、はぁぁ……<emoji=heart04>\u3000ねぇ、会長？\u3000ここまで来たんだもの。やっぱりやめる、とかはなしよ？」"
translation = "「츄파, 하아……<emoji=heart04> 저기, 회장? 여기까지 왔는걸. 역시 그만둔다거나 하는 건 없기야?」"

[[dialogue]]
speaker = "シズハ"
original = "「私の体力不足の件についてはね……ちょっと考えてきたの」"
translation = "「내 체력 부족 건에 대해서는 말이야…… 좀 생각해 왔어」"

[[dialogue]]
speaker = "シズハ"
original = "「戦闘服に着替えると、普段よりも動けるようになるでしょ？\u3000……だからね？」"
translation = "「전투복으로 갈아입으면 평소보다 더 잘 움직일 수 있게 되잖아? ……그러니까?」"

[[dialogue]]
speaker = "シズハ"
original = "「はぁぁぁ<emoji=heart04>\u3000ふふっ、こんな感じで、どうかしら……？」"
translation = "「하아아아<emoji=heart04> 후훗, 이런 느낌으로 어때……?」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ……うん<emoji=heart04>\u3000会長、ありがとう。初めてで緊張するから、ずっと手を繋いでてくれたら、安心する……<emoji=heart04>」"
translation = "「앗…… 응<emoji=heart04> 회장, 고마워. 처음이라 긴장되니까 계속 손을 잡아주면 안심될 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「えっとぉ……エッチする時って、女の子はこういう格好をするので、いいのよね……？」"
translation = "「저기…… 섹스할 때 여자애는 이런 차림을 하면 되는 거지……?」"

[[dialogue]]
speaker = "unk"
original = "さっそく手を繋いでしまったせいで、正常位というよりもまんぐり返しというか、ちょっと恥ずかしい格好になってしまった感じも否めない。"
translation = "덥석 손을 잡아버린 탓에 정상위라기보다 가랑이를 벌린 자세라고 할까, 좀 부끄러운 차림이 되어버린 느낌도 부정할 수 없다."

[[dialogue]]
speaker = "unk"
original = "俺が慌てて体勢を入れ替えようとすると……"
translation = "내가 당황해서 자세를 바꾸려 하자……"

[[dialogue]]
speaker = "シズハ"
original = "「んっ。ダメよ、会長っ。……私、本当に緊張してるの。だからエッチが終わるまで、この手は離さないで……？」"
translation = "「응. 안 돼, 회장. ……나 정말 긴장돼. 그러니까 섹스가 끝날 때까지 이 손은 놓지 말아줘……?」"

[[dialogue]]
speaker = "unk"
original = "そんな可愛いおねだりをされてしまっては、流石にこの手を俺の方から離すことなんてできない。"
translation = "그런 귀여운 부탁을 받아버리면 역시 이 손을 내 쪽에서 놓을 수는 없다."

[[dialogue]]
speaker = "シズハ"
original = "「ねぇ、会長……<emoji=heart04>\u3000もう１回キス、して……？」"
translation = "「저기, 회장……<emoji=heart04> 한 번 더 키스, 해줘……?」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ<emoji=heart04>\u3000んちゅっ……ちゅぷっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응츄…… 츄풋<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はぁぁ……<emoji=heart04>\u3000舌、入ってくりゅ……<emoji=heart04>\u3000ちゅぷぷっ……ちゅるっ……れろちゅっ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 혀, 들어온다아……<emoji=heart04> 츄푸푸…… 츄르…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ちゅっ……ちゅぱっ……れるれるっ<emoji=heart04>\u3000ちゅうっ……ちゅぷっ、れろちゅっ<emoji=heart04>\u3000んむっ……ちゅっ……ちゅるるっ<emoji=heart04>\u3000ちゅぱぁ<emoji=heart04>」"
translation = "「츄…… 츄파…… 레를레를<emoji=heart04> 츄우…… 츄풋, 레로츄<emoji=heart04> 음뭇…… 츄…… 츄르르<emoji=heart04> 츄파아<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ぷはぁっ……<emoji=heart04>\u3000はぁ……はぁ……<emoji=heart04>」"
translation = "「푸하앗……<emoji=heart04> 하아…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「うふふっ。会長のおち○ちん、ちゃんと大きくできて、嬉しい……<emoji=heart04>」"
translation = "「우후후. 회장의 자지, 제대로 커져서 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はぁぁ……<emoji=heart04>\u3000私の体で興奮、してくれてるって、ことよね？<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 내 몸을 보고 흥분해 주고 있다는 거지?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん。シズハの裸、すごく綺麗だ」"
translation = "「물론이지. 시즈하의 알몸, 정말 예뻐」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、はぁぁぁ……<emoji=heart04>\u3000ああっ、どうしよう、すごく嬉しい<emoji=heart04>」"
translation = "「앗, 하아아아……<emoji=heart04> 아앗, 어떡해, 너무 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はふぅ<emoji=heart04>\u3000あぁぁっ、でも私、おっぱい小さいから、恥ずかしい……<emoji=heart04>\u3000んっ、はぁっ……ふうぅ<emoji=heart04>」"
translation = "「하후우<emoji=heart04> 아아앗, 하지만 나 가슴 작으니까 부끄러워……<emoji=heart04> 응, 하앗…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズハのおっぱい、可愛くて興奮する。それにほら、乳首がぷっくり膨らんで来て……すごくエッチだ」"
translation = "「시즈하 가슴, 귀여워서 흥분돼. 게다가 봐, 유두가 봉긋하게 부풀어 올라서…… 정말 야해」"

[[dialogue]]
speaker = "unk"
original = "俺は顔を近づけると、唇でその可愛い乳首をついばむ。"
translation = "나는 얼굴을 가까이 대고 입술로 그 귀여운 유두를 머금는다."

[[dialogue]]
speaker = "シズハ"
original = "「あっ……！？\u3000やんっ<emoji=heart04>\u3000んっ……会長ぉ<emoji=heart04>\u3000おっぱい吸っちゃ……あっ、あんっ<emoji=heart04>\u3000んぁっ……はあぁ、ふあぁっ……<emoji=heart04>」"
translation = "「앗……!? 앙<emoji=heart04> 응…… 회장<emoji=heart04> 가슴 빨면…… 앗, 안<emoji=heart04> 응아…… 하아아, 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あぁっ、ダメぇ<emoji=heart04>\u3000んっ……ふあぁっ<emoji=heart04>\u3000乳首、舌で転がしちゃあ……<emoji=heart04>\u3000はあぁ……んうぅっ<emoji=heart04>\u3000あっ、はあぁん<emoji=heart04>」"
translation = "「아앗, 안 돼<emoji=heart04> 응…… 후아아<emoji=heart04> 유두를 혀로 굴리면……<emoji=heart04> 하아아…… 응우웃<emoji=heart04> 앗, 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ふあぁっ……！\u3000お、おま○こに会長のおち○ちん、こすれてぇ……んんっ<emoji=heart04>\u3000ふうぅ……はあぁっ、んうぅっ……ふあぁ……<emoji=heart04>」"
translation = "「후아앗……! 보, 보지에 회장의 자지가 스쳐서…… 응응<emoji=heart04> 후우우…… 하아아, 응우웃…… 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズハ、もう濡れてきてる」"
translation = "「시즈하, 벌써 젖어 있어」"

[[dialogue]]
speaker = "シズハ"
original = "「んっ……<emoji=heart04>\u3000それは……会長がおっぱいにエッチなこと、するからぁ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 그건…… 회장이 가슴에 야한 짓을 하니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「って、あんっ<emoji=heart04>\u3000か、会長のおち○ちんの先が、おま○この入り口に当たって……<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>」"
translation = "「그보다, 안<emoji=heart04> 회, 회장 자지 끝이 보지 입구에 닿아서……<emoji=heart04> 하아아…… 응아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズハの愛液で、擦れる度にいやらしい音がしてるぞ？」"
translation = "「시즈하의 애액 때문에 스칠 때마다 야한 소리가 나고 있어」"

[[dialogue]]
speaker = "シズハ"
original = "「いやぁ<emoji=heart04>\u3000わざとくちゅくちゅ音、立てちゃダメぇ……<emoji=heart04>\u3000あっ……ふうぅっ……」"
translation = "「싫어<emoji=heart04> 일부러 쿠츄쿠츄 소리 내면 안 돼……<emoji=heart04> 앗…… 후우우……」"

[[dialogue]]
speaker = "シズハ"
original = "「んっ……<emoji=heart04>\u3000す、すごい、おち○ちんギンギンにそそり立って……<emoji=heart04>\u3000ふうぅ……はあぁ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 서, 선다, 자지가 꼿꼿하게 서서……<emoji=heart04> 후우우…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もうそろそろ……入れても大丈夫そう？」"
translation = "「이제 슬슬…… 넣어도 괜찮을까?」"

[[dialogue]]
speaker = "シズハ"
original = "「う、うん<emoji=heart04>\u3000会長にズリズリされるだけで感じちゃって、はぁぁ<emoji=heart04>\u3000私のおま○こ、ウズウズしちゃってる、からぁ……<emoji=heart04>」"
translation = "「으, 응<emoji=heart04> 회장이 문질문질하는 것만으로 느껴버려서, 하아아<emoji=heart04> 내 보지, 근질근질해버렸으니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ん……<emoji=heart04>\u3000その……優しく、お願いします……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 저기…… 살살 부탁해요……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000おち○ちんの先っぽ、当たってる……んっ<emoji=heart04>\u3000はあぁっ……な、中に入っちゃう……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아아앗<emoji=heart04> 자지 끝부분이 닿고 있어…… 응<emoji=heart04> 하아아…… 아, 안에 들어와……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「んうぅっ……<emoji=heart04>\u3000ふうぅ……はあぁ……あ、あっ――<emoji=heart04><emoji=heart04>」"
translation = "「응우웃……<emoji=heart04> 후우우…… 하아아…… 아, 앗──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「――ふあああぁっ<emoji=heart04><emoji=heart04>\u3000は、入ったぁぁぁっ……<emoji=heart04>」"
translation = "「──후아아아앗<emoji=heart04><emoji=heart04> 드, 들어왔다아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「って、あ、あれ？\u3000な、なにこれ……あっ――ふあああぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「어, 어라? 뭐, 뭐야 이거…… 앗── 후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズハ。だ、大丈夫か……？」"
translation = "「시즈하. 개, 괜찮아……?」"

[[dialogue]]
speaker = "シズハ"
original = "「はぁっ……はぁっ……んっ<emoji=heart04>\u3000き、気持ちよくて……はあぁ……<emoji=heart04>\u3000軽く、イッちゃった……<emoji=heart04>」"
translation = "「하앗…… 하앗…… 응<emoji=heart04> 기, 기분 좋아서…… 하아아……<emoji=heart04> 살짝 가버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「せ、聖杯ちゃんが、何か……気を利かしてくれちゃった、みたい……<emoji=heart04>」"
translation = "「성, 성배 짱이 뭔가…… 센스를 발휘해 준 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「『痛い』のを無くして……んん……<emoji=heart04>\u3000『気持ちいい』に修正しちゃってるっぽい……<emoji=heart04>\u3000ふうぅぅ<emoji=heart04>」"
translation = "「『아픈』 걸 없애고…… 응응……<emoji=heart04> 『기분 좋은』 걸로 수정해버린 것 같아……<emoji=heart04> 후우우우<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「痛くないなら安心したけど……しばらくこのままにしてた方がいいか？」"
translation = "「아프지 않다니 안심이지만…… 잠시 이대로 있는 게 좋을까?」"

[[dialogue]]
speaker = "シズハ"
original = "「んっ<emoji=heart04>\u3000……う、ううん。だ、大丈夫<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000おま○こ、むしろウズウズ、しちゃってるから、そのぉ……」"
translation = "「응<emoji=heart04> ……으, 으응. 개, 괜찮아<emoji=heart04> 하아아……<emoji=heart04> 보지, 오히려 근질근질해버렸으니까, 그게……」"

[[dialogue]]
speaker = "シズハ"
original = "（ゴシゴシ動いて、気持ちよくして欲しい<emoji=heart04><emoji=heart04><emoji=heart04>）"
translation = "（거칠게 움직여서 기분 좋게 해줬으면 좋겠어<emoji=heart04><emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "気のせいか、そんな声が聞こえた気がして。"
translation = "기분 탓인지 그런 목소리가 들린 것 같아서."

[[dialogue]]
speaker = "クロト"
original = "「……わかった。そうしたら、ゆっくり動かすぞ？」"
translation = "「……알았어. 그럼 천천히 움직일게?」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ――ふあああぁっ<emoji=heart04><emoji=heart04>\u3000おち○ちん来たぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗── 후아아아앗<emoji=heart04><emoji=heart04> 자지 왔다아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あ、ぁ、あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000はぁっ、ふぅっ……<emoji=heart04>\u3000ん、ん、んんっ<emoji=heart04>\u3000ふあぁっ……あっ、あっ、あっ――はあぁっ<emoji=heart04>」"
translation = "「아, 아, 앗<emoji=heart04> 아앙<emoji=heart04> 하앗, 후우……<emoji=heart04> 응, 응, 응응<emoji=heart04> 후아앗…… 앗, 앗, 앗── 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ふうぅっ……ん、んんぅっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はぁっ、ふうぅっ……<emoji=heart04>\u3000あっ、あっ、はぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ、んんっ……ふああぁっ<emoji=heart04>」"
translation = "「후우우…… 응, 응응우웃<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응아앗<emoji=heart04> 하앗, 후우우……<emoji=heart04> 앗, 앗, 하앗<emoji=heart04> 하아앗<emoji=heart04> 응, 응응…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "（すごいっ<emoji=heart04>\u3000おま○こ気持ちいいよぉっ<emoji=heart04>）"
translation = "（대단해<emoji=heart04> 보지 기분 좋아아앗<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
original = "「はあぁっ、ふうぅっ……んんっ<emoji=heart04>\u3000んっ、んうぅっ<emoji=heart04>\u3000あっ、はぁっ――ふあぁっ<emoji=heart04>\u3000んうぅっ……あっ、あっ、はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아앗, 후우우…… 응응<emoji=heart04> 응, 응우웃<emoji=heart04> 앗, 하앗── 후아앗<emoji=heart04> 응우웃…… 앗, 앗, 하아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "（会長のおち○ちん、おっきいぃ<emoji=heart04>\u3000一番奥まで届いて、ノックされるたび、強い快感で頭の中、バチバチ痺れちゃうっ<emoji=heart04>）"
translation = "（회장 자지, 커어어<emoji=heart04> 제일 안쪽까지 닿아서 노크될 때마다 강한 쾌감으로 머릿속이 찌릿찌릿 저려와앗<emoji=heart04>）"

[[dialogue]]
speaker = "クロト"
original = "（あれ？\u3000やっぱりさっきから、シズハの考えてることが伝わって……？）"
translation = "（어라? 역시 아까부터 시즈하가 생각하는 게 전해져서……?）"

[[dialogue]]
speaker = "シズハ"
original = "（えっ？\u3000何？\u3000なんか会長の声が……？）"
translation = "（엣? 뭐야? 왠지 회장 목소리가……?）"

[[dialogue]]
speaker = "シズハ"
original = "「――こ、これってもしかして、私たち……あっ、あんっ<emoji=heart04>\u3000お互いの心の声が……聞こえてるっ？」"
translation = "「──이, 이거 설마 우리…… 앗, 안<emoji=heart04> 서로의 마음의 소리가…… 들리고 있어?」"

[[dialogue]]
speaker = "シズハ"
original = "「んっ<emoji=heart04>\u3000ま、まさか……あっ、あ、はあぁっ<emoji=heart04>\u3000これも聖杯ちゃんの、仕業なの……？」"
translation = "「응<emoji=heart04> 서, 설마…… 앗, 아, 하아앗<emoji=heart04> 이것도 성배 짱의 짓이야……?」"

[[dialogue]]
speaker = "シズハ"
original = "「はあぁっ……ふうぅっ<emoji=heart04>\u3000んっ、んんっ……あっ、あっ、あっ、あんっ<emoji=heart04>\u3000はあぁあっ、んうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「하아앗…… 후우우<emoji=heart04> 응, 응응…… 앗, 앗, 앗, 안<emoji=heart04> 하아아앗, 응우웃<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "（あああぁっ<emoji=heart04>\u3000セックス、すごいっ<emoji=heart04>\u3000自分の指でオナニーするのと、全然違うっ<emoji=heart04>\u3000すごく気持ちいいっ<emoji=heart04>）"
translation = "（아아아앗<emoji=heart04> 섹스 대단해<emoji=heart04> 자기 손가락으로 자위하는 거랑 전혀 달라앗<emoji=heart04> 너무 기분 좋아앗<emoji=heart04>）"

[[dialogue]]
speaker = "クロト"
original = "「また心の声が……。というか、シズハもオナニーってするんだ」"
translation = "「또 마음의 소리가……. 그보다 시즈하도 자위를 하는구나」"

[[dialogue]]
speaker = "シズハ"
original = "「ふぇぇっ！？\u3000わ、私だって……オナニーくらいするわよ。んんんっ<emoji=heart04>\u3000年頃の、女の子だし……っ」"
translation = "「후에에!? 나, 나도…… 자위 정도는 한다고. 응응응<emoji=heart04> 한창때의 여자애니까……!」"

[[dialogue]]
speaker = "シズハ"
original = "「はぁぁ<emoji=heart04>\u3000それに、最近は特に……」"
translation = "「하아아<emoji=heart04> 게다가 요즘은 특히……」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ<emoji=heart04>\u3000な、なんでもない！\u3000……はぁっ、はふぅぅん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아, 아무것도 아니야! ……하앗, 하후우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "（会長とセックスするの想像して、毎日のようにオナニーしてたなんて、恥ずかしくて言えない<emoji=heart04>\u3000って、あっ！！！）"
translation = "（회장이랑 섹스하는 거 상상하면서 매일같이 자위했다니 부끄러워서 말 못 해<emoji=heart04> 앗, 아앗!!!）"

[[dialogue]]
speaker = "クロト"
original = "「そっか。俺とするの、想像してたんだ」"
translation = "「그렇구나. 나랑 하는 거 상상했었구나」"

[[dialogue]]
speaker = "シズハ"
original = "「～～～っ！\u3000もう、バカバカバカぁ<emoji=heart04>\u3000……あぁぁっ、はぅぅん<emoji=heart04>」"
translation = "「~~~윽! 정말, 바보바보바보오<emoji=heart04> ……아아앗, 하우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「だ、だって……あんっ<emoji=heart04>\u3000初彼氏だもん！\u3000はあぁっ……んっ、んっ、んうぅっ<emoji=heart04>」"
translation = "「그, 그치만…… 안<emoji=heart04> 첫 남자친구인걸! 하아앗…… 응, 응, 응우웃<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はふうぅっ<emoji=heart04>\u3000そういうこと期待して、想像しちゃうのは、仕方ないでしょ！\u3000あっ、あっ、あっ<emoji=heart04>\u3000はあぁんっ……あっ、はあぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「하후우우웃<emoji=heart04> 그런 거 기대하면서 상상해버리는 건 어쩔 수 없잖아! 앗, 앗, 앗<emoji=heart04> 하아앙…… 앗, 하아앗<emoji=heart04> 응응<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、期待に応えて、いっぱい気持ちよくなってもらわないと」"
translation = "「그럼 기대에 부응해서 잔뜩 기분 좋게 해줘야겠네」"

[[dialogue]]
speaker = "シズハ"
original = "「えっ？\u3000あっ……んあぁっ<emoji=heart04>\u3000あ、ん、んうぅっ……はああぁっ<emoji=heart04>」"
translation = "「엣? 앗…… 응아앗<emoji=heart04> 아, 응, 응우웃…… 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ふうぅっ……んっ<emoji=heart04>\u3000んうぅっ……あっ、あっ、あっ、はあぁんっ<emoji=heart04>\u3000はぁっ、ふぅっ……あっ、ふああぁっ……！」"
translation = "「후우우웃…… 응<emoji=heart04> 응우웃…… 앗, 앗, 앗, 하아앙<emoji=heart04> 하앗, 후우…… 앗, 후아아앗……!」"

[[dialogue]]
speaker = "シズハ"
original = "（な、中のいいところ、ズリズリされてる<emoji=heart04>\u3000そこ気持ちいいっ<emoji=heart04>）"
translation = "（아, 안의 좋은 곳을 문질문질당하고 있어<emoji=heart04> 거기 기분 좋아앗<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
original = "「あっ……やんっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000ふうぅっ……んっ、あっ、あっ、んあぁんっ<emoji=heart04>\u3000はぁっ、……あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「앗…… 앙<emoji=heart04> 하아앗…… 응우웃<emoji=heart04> 후우우웃…… 응, 앗, 앗, 응아앙<emoji=heart04> 하앗, …… 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "（会長にもう、気持ちいいところ全部、バレちゃってるっ<emoji=heart04><emoji=heart04><emoji=heart04>）"
translation = "（회장한테 이제 기분 좋은 곳 전부 들켜버렸어어엇<emoji=heart04><emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "俺はシズハの心の声を聞きながら、反応の良いスポットを探して行く。"
translation = "나는 시즈하의 마음의 소리를 들으면서 반응이 좋은 스폿을 찾아 나간다."

[[dialogue]]
speaker = "シズハ"
original = "「あっ、そこっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000あっ、あっ、いいっ<emoji=heart04>\u3000はあぁっ、んっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 거기<emoji=heart04> 앗, 안<emoji=heart04> 하아앗, 후우우<emoji=heart04> 앗, 앗, 좋아앗<emoji=heart04> 하아앗, 응, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シズハが快感を抑え切れずに乱れてゆく様に、俺も段々興奮して、思わず激しくしそうになる。"
translation = "시즈하가 쾌감을 억누르지 못하고 흐트러지는 모습에 나도 점점 흥분해서 나도 모르게 격렬해지려 한다."

[[dialogue]]
speaker = "クロト"
original = "（くっ……落ち着け、俺……！）"
translation = "（큭…… 진정해, 나……!）"

[[dialogue]]
speaker = "unk"
original = "だが、なんとか思いとどまる。聖杯の効力のせいで忘れそうになるが、これは初めてのエッチなのだ。"
translation = "하지만 어떻게든 참아낸다. 성배의 효능 때문에 잊을 뻔했지만 이건 첫 섹스인 것이다."

[[dialogue]]
speaker = "シズハ"
original = "「んっ<emoji=heart04>\u3000だ、大丈夫。会長……我慢しなくていいわよ？」"
translation = "「응<emoji=heart04> 개, 괜찮아. 회장…… 참지 않아도 된다고?」"

[[dialogue]]
speaker = "unk"
original = "俺は、はっとなって顔を上げる。今の考えが聞こえてしまったらしい。"
translation = "나는 깜짝 놀라 고개를 든다. 방금 생각이 들려버린 모양이다."

[[dialogue]]
speaker = "シズハ"
original = "「私の為に気遣ってくれて、嬉しい<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000でも――」"
translation = "「나를 위해 배려해 줘서 기뻐<emoji=heart04> 하아앗……<emoji=heart04> 하지만──」"

[[dialogue]]
speaker = "シズハ"
original = "「私だけじゃなくて、会長も気持ちよく、なって欲しいの……<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000それに……わかるでしょ？」"
translation = "「나뿐만 아니라 회장도 기분 좋아졌으면 좋겠어……<emoji=heart04> 하아앙<emoji=heart04> 게다가…… 알잖아?」"

[[dialogue]]
speaker = "unk"
original = "シズハの心の声が伝わってくる。"
translation = "시즈하의 마음의 소리가 전해져 온다."

[[dialogue]]
speaker = "シズハ"
original = "（オナニーしながらずっと、妄想してたの――<emoji=heart04>\u3000会長に激しく、抱かれるところ<emoji=heart04><emoji=heart04>）"
translation = "（자위하면서 계속 망상했었어──<emoji=heart04> 회장한테 격렬하게 안기는 거어엇<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
original = "（それに今は聖杯ちゃんの力で、痛みもなくて、むしろ気持ちよくなっちゃうなら――）"
translation = "（게다가 지금은 성배 짱의 힘으로 아픔도 없고 오히려 기분 좋아져 버린다면──）"

[[dialogue]]
speaker = "シズハ"
original = "（もっと激しく、おち○ちんで突っ込んで欲しいのっ<emoji=heart04><emoji=heart04><emoji=heart04>）"
translation = "（더 격렬하게 자지로 찔러줬으면 좋겠어어엇<emoji=heart04><emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "クロト"
original = "「っ……シズハ！」"
translation = "「윽…… 시즈하!」"

[[dialogue]]
speaker = "unk"
original = "俺は我慢できずに、腰の動きを激しくする。"
translation = "나는 참지 못하고 허리 움직임을 격렬하게 한다."

[[dialogue]]
speaker = "シズハ"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ふああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しいピストン、来たあぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 격렬한 피스톤 왔다아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、あっ、あっ、あぁんっ<emoji=heart04>\u3000ふあぁっ、あっ、はああぁんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000ん、んんぅっ、あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아앙<emoji=heart04> 후아앗, 앗, 하아아앙<emoji=heart04> 하아앗, 후우우<emoji=heart04> 응, 응응우웃, 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はあぁっ、あっ、あっ、あんっ<emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000おち○ちん、すごいのぉっ<emoji=heart04>\u3000んっ、あっ、あっ、んあぁっ<emoji=heart04>\u3000はあぁっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「하아앗, 앗, 앗, 안<emoji=heart04> 대단해애앗<emoji=heart04> 자지 대단해애앗<emoji=heart04> 응, 앗, 앗, 응아앗<emoji=heart04> 하아앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ふうぅっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000セックス気持ちいいよぉ<emoji=heart04>\u3000んっ、はぁっ、ふうぅっ<emoji=heart04>\u3000あっ、あっ、はあぁっ<emoji=heart04>」"
translation = "「후우우웃<emoji=heart04> 보지 기분 좋아앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 섹스 기분 좋아아아<emoji=heart04> 응, 하앗, 후우우<emoji=heart04> 앗, 앗, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「こんなの、好きになっちゃうっ<emoji=heart04>\u3000あんっ、あんっ、あぁぁんっ<emoji=heart04>\u3000セックス好きになっちゃうぅっ<emoji=heart04>\u3000はあぁっ、あっ、あっ<emoji=heart04>\u3000ふあああぁぁっ<emoji=heart04>」"
translation = "「이런 거 좋아하게 돼버려어엇<emoji=heart04> 안, 안, 아아앙<emoji=heart04> 섹스 좋아하게 돼버려어어엇<emoji=heart04> 하아앗, 앗, 앗<emoji=heart04> 후아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズハ、好きだ！」"
translation = "「시즈하, 좋아해!」"

[[dialogue]]
speaker = "シズハ"
original = "「んっ、私もぉ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000会長ぉ、私も大好きぃ<emoji=heart04>\u3000……あぁぁぁっ<emoji=heart04>\u3000んふぅぅぅ<emoji=heart04>」"
translation = "「응, 나도오<emoji=heart04> 하아아앙<emoji=heart04> 회장, 나도 너무 좋아해애<emoji=heart04> …… 아아아앗<emoji=heart04> 응후우우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、繋いだ両手をぎゅっと強く握る彼女に、俺は愛おしさが込み上げて来て――"
translation = "그렇게 말하며 맞잡은 양손을 꽉 쥐는 그녀에게 나는 사랑스러움이 복받쳐 올라──"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、会長<emoji=heart04>\u3000会長ぉっ<emoji=heart04>」"
translation = "「앗, 회장<emoji=heart04> 회장아앗<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あぁっ、すごいぃっ<emoji=heart04>\u3000はあぁっ、んうぅっ<emoji=heart04>\u3000おち○ちん、おち○ちん気持ちいいっ<emoji=heart04>\u3000はあぁっ、ふぅっ<emoji=heart04>\u3000――あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「아앗, 대단해애앗<emoji=heart04> 하아앗, 응우웃<emoji=heart04> 자지, 자지 기분 좋아앗<emoji=heart04> 하아앗, 후우<emoji=heart04> ── 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「もっとぉ<emoji=heart04>\u3000もっといっぱい突いてぇっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000んっ、あああっ、ふうぅっ、んうぅっ<emoji=heart04>\u3000――あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「더어어<emoji=heart04> 더 잔뜩 찔러줘어엇<emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04> 응, 아아앗, 후우우웃, 응우웃<emoji=heart04> ── 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……気持ちよすぎて、もうイキそうだ……！」"
translation = "「큭…… 너무 기분 좋아서 이제 갈 것 같아……!」"

[[dialogue]]
speaker = "シズハ"
original = "「んんんっ、私もぉ<emoji=heart04>\u3000んうぅっ、はあぁっ、あああっ<emoji=heart04>\u3000中にっ<emoji=heart04>\u3000会長の、中にいっぱい出して欲しい<emoji=heart04>」"
translation = "「응응응, 나도오<emoji=heart04> 응우웃, 하아앗, 아아앗<emoji=heart04> 안에에<emoji=heart04> 회장 거, 안에 잔뜩 싸줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ああぁぁああっ<emoji=heart04>\u3000私の全部、会長のものにしてぇっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「아아아아아앗<emoji=heart04> 내 전부를 회장 거로 만들어줘어엇<emoji=heart04> 후와아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「シズハ……中に出すぞ！」"
translation = "「시즈하…… 안에 싼다!」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000来てぇ<emoji=heart04>\u3000私も来ちゃう<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000はあああああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 와줘어<emoji=heart04> 나도 가버려어<emoji=heart04> 응, 앗, 앗, 앗<emoji=heart04> 하아아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「くるっ<emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>\u3000気持ちいいの登ってくるぅっ<emoji=heart04>\u3000あっあっあっ――<emoji=heart04><emoji=heart04>」"
translation = "「온다앗<emoji=heart04> 안, 안, 안<emoji=heart04> 후아아앙<emoji=heart04> 기분 좋은 게 올라와아앗<emoji=heart04> 앗앗앗──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「もうダメ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04>\u3000──イックぅぅうう～っ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 안 돼<emoji=heart04> 가앗<emoji=heart04> 가가가가각<emoji=heart04><emoji=heart04> ── 가버려어어어어어~엇……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「ふあぁぁああぁぁああ～～～～～～っ！！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아아아아아~~~~~~~~~~~~~~~~앗!!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああっ、中にいっぱい、精液出てるぅ～っ<emoji=heart04>」"
translation = "「하아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아앗, 안에 잔뜩 정액 나오고 있어어~엇<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、はあぁっ……<emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000んっ……ふうぅぅ～～<emoji=heart04>」"
translation = "「앗, 하아앗……<emoji=heart04> 대단해애앗<emoji=heart04> 응…… 후우우우우~~<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「は、あああぁ……っ<emoji=heart04>\u3000んんっ……ふぅっ<emoji=heart04>\u3000射精、やっと終わったぁ……<emoji=heart04>」"
translation = "「하, 아아아……앗<emoji=heart04> 응응…… 후우<emoji=heart04> 사정, 겨우 끝났다아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ、おち○ちん抜けて……んんっ……<emoji=heart04>」"
translation = "「앗, 자지 빠져서…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はぁ……はぁ……<emoji=heart04>\u3000セックス……すごく気持ち、よかったぁ<emoji=heart04>\u3000想像より……ずっと<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 섹스…… 정말 기분 좋았어어<emoji=heart04> 상상보다…… 훨씬<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もだ……シズハのおま○こ、ヤバかった……。というか、シズハの乱れ方がエッチすぎた」"
translation = "「나도야…… 시즈하 보지 장난 아니었어……. 그보다 시즈하가 흐트러지는 모습이 너무 야했어」"

[[dialogue]]
speaker = "シズハ"
original = "「も、もう、バカぁ<emoji=heart04>\u3000それは……聖杯ちゃんのせいだもんっ」"
translation = "「정, 정말, 바보오<emoji=heart04> 그건…… 성배 짱 때문인걸」"

[[dialogue]]
speaker = "シズハ"
original = "「……で、でも<emoji=heart04>\u3000初めてからこんな気持ちいいと……色々ヤバいかも<emoji=heart04>\u3000……思い出しただけでまた、あんっ<emoji=heart04>」"
translation = "「……하, 하지만<emoji=heart04> 처음부터 이렇게 기분 좋으면…… 여러모로 위험할지도오<emoji=heart04> …… 떠올린 것만으로 또, 안<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「はぁぁぁ<emoji=heart04>\u3000おま○こキュンキュンして、会長の、溢れて来ちゃった……<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 보지 큥큥거려서 회장 거 흘러나와버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ……会長の、すごい……<emoji=heart04>\u3000もう回復して……<emoji=heart04>」"
translation = "「앗…… 회장 거 대단해……<emoji=heart04> 벌써 회복해서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「い、いや、でも初めてなんだし……あんまり無理しない方がいい。体力の問題もあるだろ……？」"
translation = "「아, 아니, 그래도 처음인데…… 너무 무리하지 않는 게 좋아. 체력 문제도 있잖아……?」"

[[dialogue]]
speaker = "シズハ"
original = "「えっ？\u3000あっ……そういえば……」"
translation = "「엣? 앗…… 그러고 보니……」"

[[dialogue]]
speaker = "シズハ"
original = "「なんかそんなに疲れてないっていうか……むしろ、まだまだ元気、かも……？」"
translation = "「왠지 그렇게 힘들지 않다고나 할까…… 오히려 아직 쌩쌩할지도……?」"

[[dialogue]]
speaker = "シズハ"
original = "「聖杯ちゃんが絶好調っていうか……えっと、つまり……」"
translation = "「성배 짱이 절정이라고 할까…… 저기, 그러니까……」"

[[dialogue]]
speaker = "シズハ"
original = "「私もまだまだ頑張れるっていうか……その……」"
translation = "「나도 아직 더 힘낼 수 있다고나 할까…… 그게……」"

[[dialogue]]
speaker = "シズハ"
original = "「会長は……どう、かな？」"
translation = "「회장은…… 어때?」"

[[dialogue]]
speaker = "unk"
original = "自制しようと思っていたのに、可愛い上目遣いでそんな風に言われたら、我慢できるはずもなく――"
translation = "자제하려고 생각했는데, 귀엽게 치켜뜬 눈으로 그런 말을 들으니 참을 수 있을 리가 없었고──"

[[dialogue]]
speaker = "シズハ"
original = "「あっ……会長……<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>」"
translation = "「앗…… 회장……<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も聖杯の力を言い訳にしつつ、俺たちは何度も体を重ね続けてしまうのだった――"
translation = "그 후로도 성배의 힘을 핑계 삼아 우리는 몇 번이고 몸을 계속 겹치고 마는 것이었다──"

