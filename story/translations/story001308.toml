[[dialogue]]
speaker = "unk"
original = "俺たちはリゾート結界での特訓を活かし、新種モンスターと戦闘を繰り広げていた。"
translation = "우리는 리조트 결계에서의 특훈을 살려 신종 몬스터와 전투를 벌였다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギギギ……！」"
translation = "「기기기……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「とりゃあぁぁぁっ！」"
translation = "「하압!」"

[[dialogue]]
speaker = "unk"
original = "アムが重力操作で盾をホバークラフトのように浮かせて、モンスター群に突撃する。"
translation = "아무가 중력 조작으로 방패를 호버크래프트처럼 띄워 몬스터 무리에게 돌진한다."

[[dialogue]]
speaker = "unk"
original = "逃げ遅れた人達の前に割って入り、シールドバッシュで敵を蹴散らす。"
translation = "대피하지 못한 사람들 앞으로 끼어들어 실드 배쉬로 적을 걷어찬다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "（考えるのを止めるな。周りをちゃんと見て、次にどこの人を助けるべきか考えて動け、あたし……！）"
translation = "(생각하는 걸 멈추지 마. 주위를 제대로 보고 다음에 어느 사람을 도와야 할지 생각하며 움직여, 나……!)"

[[dialogue]]
speaker = "unk"
original = "ホバークラフト移動の機動力を活かして、アムはエリア内を縦横無尽に立ち回って行く。"
translation = "호버크래프트 이동의 기동력을 살려 아무는 구역 내를 종횡무진 누빈다."

[[dialogue]]
speaker = "unk"
original = "その一方、マトイは――"
translation = "그 한편, 마토이는──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（焦るな、私。アムちゃんみたいな動きは、私にはできない。目の前の敵に集中しろ。目立つ星術でヘイトを集めて、訓練通りの状況を作り出せ）"
translation = "(서두르지 마, 나. 아무짱 같은 움직임은 나에겐 무리야. 눈앞의 적에게 집중해. 눈에 띄는 성술로 어그로를 끌어서 훈련대로 상황을 만들어내)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「エレキハイドランジア！」"
translation = "「일렉 하이드랜지아!」"

[[dialogue]]
speaker_original = "エレマル"
speaker_translation = "엘레말"
original = "「……！\u3000ギギ！」"
translation = "「……! 기기!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（よし、モンスター群の注意がこちらに向いた。あとは普通に、対処すればいいだけ）"
translation = "(좋아, 몬스터 무리의 주의가 이쪽으로 쏠렸어. 나머지는 평범하게 대처하면 될 뿐이야)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……インパルスアイリス！」"
translation = "「……임펄스 아이리스!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よし……次！」"
translation = "「좋아…… 다음!」"

[[dialogue]]
speaker = "unk"
original = "迫り来るモンスターの群れの攻撃を盾で捌きながら、１体１体着実に倒して行く。"
translation = "몰려오는 몬스터 무리의 공격을 방패로 받아내며 한 마리씩 확실하게 쓰러뜨려 간다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「２人共、ちゃんと訓練の成果が出ているようね。ところで、さっきから思っていたのだけれど――」"
translation = "「둘 다 제대로 훈련 성과가 나오고 있는 모양이네. 그런데 아까부터 생각한 거지만──」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギギギ！」"
translation = "「기기기!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方たち、頭が高いわよ。全員畏怖を持って、跪きなさい」"
translation = "「너희들, 고개가 높구나. 전부 경외를 담아 무릎 꿇으렴.」"

[[dialogue]]
speaker_original = "エレマル"
speaker_translation = "엘레말"
original = "「ギッ……！？」"
translation = "「기잇……!?」"

[[dialogue]]
speaker = "unk"
original = "マムの言葉を受けた、次の瞬間。周囲を飛び回っていたモンスター群は１匹残らず地上に落下、地面にめり込んで動けなくなる。そして――"
translation = "마무의 말이 떨어진 다음 순간, 주위를 날아다니던 몬스터 무리는 단 한 마리도 남김없이 지상으로 추락, 지면에 처박혀 움직이지 못하게 된다. 그리고──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「さあ、私のサーブを受けてみなさい」"
translation = "「자, 내 서브를 받아보렴.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「グラビトンサーブ！」"
translation = "「그라비톤 서브!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギーーーッ！！？」"
translation = "「기이이익!!?」"

[[dialogue]]
speaker = "unk"
original = "モンスター群は竜の洗礼を浴びることになるのだった。"
translation = "몬스터 무리는 용의 세례를 받게 되었다."

[[dialogue]]
speaker = "unk"
original = "エリア内の新種モンスターが数を減らしつつある中、マトイはとある女の子を助けていた。"
translation = "구역 내의 신종 몬스터가 줄어들고 있는 가운데, 마토이는 어떤 여자아이를 구하고 있었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よし、ひとまず周りのモンスターは倒せた。……怪我はない？」"
translation = "「좋아, 일단 주변 몬스터는 쓰러뜨렸어. ……다친 데는 없니?」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「あ、ありがとうございます……お姉さん……！」"
translation = "「고, 고맙습니다…… 언니……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やたらモンスターに狙われてるから何かと思ったけど、あなた、星力を持っているのね」"
translation = "「유독 몬스터에게 노려진다 싶었는데 너, 성력을 가지고 있구나.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「は、はい」"
translation = "「네, 네에.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、もう大丈夫。これから私たちがモンスターの囲いを突破して、脱出できる道を作るから。安心して」"
translation = "「하지만 이제 괜찮아. 이제 우리가 몬스터의 포위를 돌파해서 탈출할 길을 만들 테니까. 안심해.」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「はい……！\u3000って、あれ……？」"
translation = "「네……! 어, 저건……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうしたの？\u3000空に何か……？」"
translation = "「왜 그래? 하늘에 무언가……?」"

[[dialogue]]
speaker = "unk"
original = "女の子が見上げた先に、マトイが視線を向けると――"
translation = "여자아이가 올려다본 곳으로 마토이가 시선을 옮기자──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれは……！？」"
translation = "「저건……!?」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "エリア上空に巨大なモンスターの姿があった。"
translation = "구역 상공에 거대한 몬스터의 모습이 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、モンスターが大きく口を開くと――"
translation = "그리고 몬스터가 크게 입을 벌리자──"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギギギ……！」"
translation = "「기기기……!」"

[[dialogue]]
speaker = "unk"
original = "なんと、口の中からモンスターが大量に吐き出されて行く。"
translation = "놀랍게도 입안에서 몬스터가 대량으로 쏟아져 나온다."

[[dialogue]]
speaker = "unk"
original = "減らしたはずの新種モンスターが、むしろ最初よりも数を増し始めていた――"
translation = "줄였을 터인 신종 몬스터가 오히려 처음보다 숫자가 늘어나기 시작했다──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……ヒルディオーネからの報告を聞いた時、アステラが出現したわけじゃないのに、一体どこから大量のモンスターが出現したのか疑問だった」"
translation = "「……힐디오네의 보고를 들었을 때, 아스텔라가 출현한 것도 아닌데 대체 어디서 대량의 몬스터가 나타난 건지 의문이었어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「だけど、これではっきりしたわ。１体の大型モンスターがアステラの代わりに、大量のモンスターを収納していたというわけね」"
translation = "「하지만 이걸로 확실해졌네. 커다란 몬스터 하나가 아스텔라 대신에 대량의 몬스터를 수납하고 있었던 거구나.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――会長！\u3000気を引き締め直しなさい」"
translation = "「──회장! 마음 단단히 먹어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ここからは、厳しい戦場になるわよ」"
translation = "「이제부터는 험난한 전장이 될 거야.」"

[[dialogue]]
speaker = "unk"
original = "俺たちは再び、大量の新種モンスターを相手に戦闘を開始するのだった。"
translation = "우리는 다시 대량의 신종 몬스터를 상대로 전투를 개시했다."

