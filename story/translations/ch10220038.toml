[[dialogue]]
speaker = "unk"
original = "モネが魔将の力を使いこなせるよう、今日は深淵書庫で戦闘訓練をしていた。"
translation = "모네가 마장의 힘을 다룰 수 있도록 오늘은 심연서고에서 전투 훈련을 하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「お疲れ、モネ。そろそろ終わりにしようか。ずいぶん良くなったと思うよ」"
translation = "「수고했어, 모네. 슬슬 끝낼까. 아주 좋아진 것 같아」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「ふふ……」"
translation = "「후후……」"

[[dialogue]]
speaker = "unk"
original = "しかしモネは返事をせず、珍しく不敵な笑みを浮かべている。"
translation = "하지만 모네는 대답을 하지 않고, 드물게 불길한 미소를 짓고 있다."

[[dialogue]]
speaker = "unk"
original = "その様子に嫌な予感がして、歩み寄ろうとしたが……"
translation = "그 모습에 불길한 예감이 들어 다가가려 했지만……"

[[dialogue]]
speaker = "クロト"
original = "「ぐっ……体が動かない……！？」"
translation = "「윽…… 몸이 움직이지 않아……!?」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「どうしました、会長？」"
translation = "「왜 그러세요, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "金縛りのように動けなくなった俺に、逆にモネが接近する。"
translation = "가위눌린 것처럼 움직일 수 없게 된 나에게 반대로 모네가 접근한다."

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「会長には体を動かせなくなる魔法をかけちゃいました。どうです？\u3000自分の意志で体が動かないでしょう？」"
translation = "「회장님에게는 몸을 움직일 수 없게 만드는 마법을 걸어버렸어요. 어때요? 자신의 의지로 몸이 움직이지 않죠?」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「ふふふ……ぼーっと突っ立って、まるで<ruby>案山子<rt>かかし</rt></ruby>ですね。ちょっとかっこ悪いかも」"
translation = "「후후후…… 멍하니 서서 마치 허수아비 같네요. 조금 꼴사나울지도」"

[[dialogue]]
speaker = "クロト"
original = "（いつものモネと違う？\u3000まさか呪いの影響……？）"
translation = "(평소의 모네와 달라? 설마 저주의 영향……?)"

[[dialogue]]
speaker = "unk"
original = "リクリエに滅ぼされた魔族の怨念が呪いとなり、モネが持つ魔本に宿っている。"
translation = "리크리에에 의해 멸망한 마족의 원념이 저주가 되어 모네가 가진 마도서에 깃들어 있다."

[[dialogue]]
speaker = "unk"
original = "呪いのせいで何かしら悪い影響を受けてもおかしくはない。"
translation = "저주 때문에 어떤 식으로든 나쁜 영향을 받아도 이상할 건 없다."

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「心配そうな顔をしてどうしました？\u3000何をされるか不安なんです？」"
translation = "「걱정스러운 얼굴을 하고 왜 그러세요? 무슨 짓을 당할까 봐 불안하신가요?」"

[[dialogue]]
speaker = "unk"
original = "モネが体を密着させ、ズボンの上から俺の股間に触れてくる。"
translation = "모네가 몸을 밀착시키고 바지 위로 내 가랑이를 만져온다."

[[dialogue]]
speaker = "クロト"
original = "「！？\u3000モネ、何を……？」"
translation = "「!? 모네, 무슨……?」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「あれ～？\u3000会長のここ、大きくなってますよ～？\u3000動けなくされてるのに、ここは元気なんですから……いやらしい魔王様<emoji=heart04>」"
translation = "「어라~? 회장님의 여기, 커져 있네요~? 움직이지 못하게 됐는데 여기는 기운차다니…… 야한 마왕님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネの細い指でスリスリと撫でられ、下半身が勝手に反応してしまう。"
translation = "모네의 가느다란 손가락으로 문질문질 애무당하자 하반신이 멋대로 반응해버린다."

[[dialogue]]
speaker = "unk"
original = "それに密着しているせいで、普段制服に隠れた大きな胸が当たって、余計に興奮が高まる。"
translation = "게다가 밀착한 탓에 평소 제복에 가려졌던 커다란 가슴이 닿아 더욱 흥분이 고조된다."

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「あ、また大きくなった。体は正直ですね♪\u3000もう、これだけで大きくするなんて、恥ずかしいと思わないんですか？」"
translation = "「아, 또 커졌다. 몸은 정직하네요♪ 정말, 이것만으로 크게 만들다니 부끄럽다고 생각하지 않으세요?」"

[[dialogue]]
speaker = "unk"
original = "モネらしくない嘲笑混じりの声に、なぜかゾクッと背筋が震える。"
translation = "모네답지 않은 조소 섞인 목소리에 왠지 모르게 등줄기가 오싹 떨린다."

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「それじゃ──えいっ<emoji=heart04>」"
translation = "「그럼── 에잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "胸をトン、と押され、俺はその場に倒れ込んでしまった。"
translation = "가슴을 툭 밀쳐져 나는 그 자리에 쓰러지고 말았다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "モネ"
original = "「ふふ……おち○ちんビクビクしてる♪」"
translation = "「후후…… 자지가 움찔거리고 있어♪」"

[[dialogue]]
speaker = "unk"
original = "モネは俺の衣服を脱がせると、胸を露わにして挑発的な笑みを浮かべる。"
translation = "모네는 내 옷을 벗기더니 가슴을 드러내며 도발적인 미소를 짓는다."

[[dialogue]]
speaker = "モネ"
original = "「ズボンの上から撫でられただけで、おち○ちんをこんなに大きくさせちゃって、はしたない魔王様<emoji=heart04>\u3000でも素直でかわいいですよ<emoji=heart04>」"
translation = "「바지 위로 만져진 것만으로 자지를 이렇게 크게 만들다니, 천박한 마왕님<emoji=heart04> 하지만 솔직해서 귀여워요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "勃起を指摘されて羞恥を覚えるが、身動きを封じられて隠すこともできない。"
translation = "발기를 지적당해 수치심을 느끼지만 몸을 움직일 수 없어 숨길 수도 없다."

[[dialogue]]
speaker = "モネ"
original = "「おち○ちんを……つ～んつん♪\u3000あ、跳ね返ってきた。それじゃ……ふぅ～……あはっ♪\u3000息かけられてビクッてしましたね」"
translation = "「자지를…… 콕~콕♪ 아, 튕겨 나왔다. 그럼…… 후우~…… 아핫♪ 입김을 불었더니 움찔했네요」"

[[dialogue]]
speaker = "unk"
original = "指先でつついたり、息を吹きかけたり、ペニスをおもちゃにして遊ぶモネ。"
translation = "손가락 끝으로 찌르거나 입김을 부는 등 페니스를 장난감 삼아 노는 모네."

[[dialogue]]
speaker = "unk"
original = "普段控えめなモネが俺を見下すような目をしていて、それが未知の感覚を呼び起こそうとしている。"
translation = "평소 얌전하던 모네가 나를 내려다보는 듯한 눈을 하고 있어, 그것이 미지의 감각을 일깨우려 하고 있다."

[[dialogue]]
speaker = "モネ"
original = "「くすくす……先走りも垂らしちゃって、かわいいですね～♪」"
translation = "「쿠스쿠스…… 쿠퍼액도 흘리고, 귀엽네요~♪」"

[[dialogue]]
speaker = "モネ"
original = "「私をたくさんいじめた悪いおち○ちん、お仕置きしちゃいますね♪\u3000それじゃ……」"
translation = "「나를 많이 괴롭힌 나쁜 자지, 벌을 줘야겠네요♪ 그럼……」"

[[dialogue]]
speaker = "unk"
original = "モネは口の中に唾液を溜め、ペニスに向かってとろりと垂らす。"
translation = "모네는 입안에 타액을 모아 페니스를 향해 걸쭉하게 떨어뜨린다."

[[dialogue]]
speaker = "モネ"
original = "「んれぇ～ろ……」"
translation = "「낼름……」"

[[dialogue]]
speaker = "クロト"
original = "「──ッ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "モネの唾液がペニスに触れた瞬間、下半身がビクッと跳ねた。"
translation = "모네의 타액이 페니스에 닿는 순간, 하반신이 비쿠하며 튀어 올랐다."

[[dialogue]]
speaker = "モネ"
original = "「またビクビクして、面白いおち○ちん<emoji=heart04>\u3000よだれを垂らされて悦ぶなんて、会長は変態ですね<emoji=heart04>\u3000じゃあ──」"
translation = "「또 움찔거리고, 재미있는 자지<emoji=heart04> 침이 묻었다고 기뻐하다니, 회장님은 변태네요<emoji=heart04> 그럼──」"

[[dialogue]]
speaker = "unk"
original = "モネはさらに笑みを深めて──"
translation = "모네는 더욱 미소를 깊게 머금고──"

[[dialogue]]
speaker = "モネ"
original = "「ん～っしょ♪」"
translation = "「영차♪」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスがモネの乳房に包まれ、その柔らかさで嬉しそうに脈打つ。"
translation = "팽팽하게 부푼 페니스가 모네의 유방에 감싸여, 그 부드러움에 기쁜 듯 맥동한다."

[[dialogue]]
speaker = "モネ"
original = "「会長のおち○ちん、おっぱいで挟んじゃいました♪\u3000あ……おち○ちん、私の胸の中でドクドクいってる……気持ちいいんですね」"
translation = "「회장님의 자지, 가슴으로 끼워버렸어요♪ 아…… 자지가 내 가슴 속에서 두근두근거려…… 기분 좋은 거구나」"

[[dialogue]]
speaker = "モネ"
original = "「じゃあ……もっと気持ち良くしてあげます<emoji=heart04>」"
translation = "「그럼…… 더 기분 좋게 해드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「んしょっ……はっ……はぁ……<emoji=heart04>\u3000おっぱいでしてあげますね……んっ……んん……<emoji=heart04>」"
translation = "「영차…… 하아…… 하아……<emoji=heart04> 가슴으로 해드릴게요…… 응…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唾液と先走りで濡れたペニスが、モネの乳房で摩擦され、射精欲が高まっていく。"
translation = "타액과 쿠퍼액으로 젖은 페니스가 모네의 유방에 마찰되어, 사정욕구가 고조되어 간다."

[[dialogue]]
speaker = "モネ"
original = "「はっ、ん……どうですか～？\u3000会長のだ～い好きなおっぱいですよ～、気持ちいいですか～？」"
translation = "「하아, 응…… 어때요~? 회장님이 너~무 좋아하는 가슴이에요~, 기분 좋나요~?」"

[[dialogue]]
speaker = "unk"
original = "まるで子どもに話しかけるような甘い声とは裏腹に、モネは艶っぽい笑みでペニスを弄ぶ。"
translation = "마치 아이에게 말을 거는 듯한 달콤한 목소리와는 딴판으로, 모네는 요염한 미소로 페니스를 농락한다."

[[dialogue]]
speaker = "モネ"
original = "「はぁっ……んんっ……ふぅっ……ふぅ……<emoji=heart04>\u3000おっぱいの中でビクビクして、おち○ちん悦んでる……<emoji=heart04>\u3000かわいい……<emoji=heart04>」"
translation = "「하아…… 으응…… 후우…… 후우……<emoji=heart04> 가슴 속에서 움찔거리고, 자지가 기뻐하고 있어……<emoji=heart04> 귀여워……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「それじゃおっぱいで……ぎゅ～っとしてあげますね……んんっ<emoji=heart04>」"
translation = "「그럼 가슴으로…… 꼬옥~ 해드릴게요…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ぅっ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "絞るようにおっぱいを寄せられ、その快感に思わず呻きを漏らす。"
translation = "쥐어짜듯 가슴을 모으자, 그 쾌감에 나도 모르게 신음을 흘린다."

[[dialogue]]
speaker = "モネ"
original = "「ふふふ……その顔、好きですよ……一方的に責められて、屈辱と気持ち良さが入り混じった顔……おま○こ濡れちゃいます<emoji=heart04>」"
translation = "「후후후…… 그 표정, 좋아해요…… 일방적으로 몰아붙여져서, 굴욕과 쾌감이 뒤섞인 얼굴…… 보지가 젖어버려요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「会長がよがってるところ、もっと見せてください……<emoji=heart04>\u3000んっ、んしょ……んんっ……ふぅっ……<emoji=heart04>」"
translation = "「회장님이 느끼는 모습, 더 보여주세요……<emoji=heart04> 응, 영차…… 으응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「強くてかっこいい会長も好きですけど……んっ、はぁ……情けなくてかっこ悪い会長も好き……<emoji=heart04>」"
translation = "「강하고 멋진 회장님도 좋지만…… 응, 하아…… 한심하고 볼품없는 회장님도 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「ふふ……んっ、んんっ……<emoji=heart04>\u3000ほら、おち○ちん気持ち良くなってください……んっ……はっ、んっ……ふっ……<emoji=heart04>」"
translation = "「후후…… 응, 으응……<emoji=heart04> 자, 자지 기분 좋아지세요…… 응…… 하아, 응…… 후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唾液でぬるぬるになったおっぱいが上下し、ペニスを刺激していく。"
translation = "타액으로 미끈거리는 가슴이 상하로 움직이며 페니스를 자극한다."

[[dialogue]]
speaker = "unk"
original = "下半身が蕩けるような快感で、勝手に腰が震えてしまう。"
translation = "하반신이 녹아내리는 듯한 쾌감에 제멋대로 허리가 떨리고 만다."

[[dialogue]]
speaker = "モネ"
original = "「あはっ♪\u3000腰がガクガクしちゃってる<emoji=heart04>\u3000んっ……んっ……んっ……<emoji=heart04>」"
translation = "「아핫♪ 허리가 가쿠가쿠하고 있어<emoji=heart04> 응…… 응…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「気持ち良くて腰を動かしたいのに、魔法で動けなくて……はっ……んっ……腰がカクカクしちゃうのかわいいです<emoji=heart04>」"
translation = "「기분 좋아서 허리를 움직이고 싶은데, 마법 때문에 움직이지 못해서…… 하아…… 응…… 허리가 덜덜 떨리는 거 귀여워요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「んっ……んんっ……んっしょ<emoji=heart04>\u3000おち○ちん、ビクビクって、すごく元気……あ、会長のために、もっとよだれ垂らしてあげますね……じゅる」"
translation = "「응…… 으응…… 영차<emoji=heart04> 자지, 움찔움찔하고 아주 기운차네…… 아, 회장님을 위해서 침을 더 흘려드릴게요…… 쥬릅」"

[[dialogue]]
speaker = "unk"
original = "モネの舌先から敏感な亀頭に唾液を垂らされ、また腰がひとりで跳ねる。"
translation = "모네의 혀끝에서 민감한 귀두로 타액이 떨어지자, 다시 허리가 혼자서 튀어 오른다."

[[dialogue]]
speaker = "クロト"
original = "「くぁっ……！？」"
translation = "「크악……!?」"

[[dialogue]]
speaker = "モネ"
original = "「あはっ、またビクンって悦んでる<emoji=heart04>\u3000会長は変態さんですね～<emoji=heart04>」"
translation = "「아핫, 또 비쿤하며 기뻐하고 있어<emoji=heart04> 회장님은 변태씨네요~<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「でもいいですよ<emoji=heart04>\u3000ふっ……はっ……ぁっ……学園最強の魔王様なのに、女の子みたいに喘いで……そんな会長も許してあげます<emoji=heart04>」"
translation = "「하지만 괜찮아요<emoji=heart04> 후…… 하아…… 아…… 학원 최강의 마왕님인데도 여자아이처럼 헐떡이고…… 그런 회장님도 용서해드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "鈴口から溢れた先走りでモネのおっぱいはドロドロになっていた。"
translation = "요도구에서 넘쳐흐른 쿠퍼액으로 모네의 가슴은 질척질척해져 있었다."

[[dialogue]]
speaker = "unk"
original = "乳房で摩擦されるとすぐに限界近くまで上り詰めてしまう。"
translation = "유방에 마찰되자 금세 한계 근처까지 치닫고 만다."

[[dialogue]]
speaker = "クロト"
original = "「ぐっ……モネ、もう……！」"
translation = "「윽…… 모네, 이제……!」"

[[dialogue]]
speaker = "モネ"
original = "「あれ～？\u3000もう出しちゃいそうなんですか？\u3000いつもあんなに私を責めてるのに、こんな簡単に出しちゃうんですか～？」"
translation = "「어라~? 벌써 싸버릴 것 같나요? 평소엔 그렇게 나를 몰아붙이더니, 이렇게 간단히 싸버리는 건가요~?」"

[[dialogue]]
speaker = "モネ"
original = "「はっ、んっ……<emoji=heart04>\u3000会長のこと尊敬してたのに、おっぱいで挟まれただけで射精しちゃう早漏なんて、残念ですね～」"
translation = "「하아, 응……<emoji=heart04> 회장님을 존경했는데, 가슴에 끼워진 것만으로 사정해버리는 조루라니, 유감이네요~」"

[[dialogue]]
speaker = "クロト"
original = "「うっ……そう言われても、本当に気持ち良くて……」"
translation = "「윽…… 그렇게 말해도, 정말 기분 좋아서……」"

[[dialogue]]
speaker = "モネ"
original = "「でもいいですよ？\u3000んっ、ふっ……情けなくて、かっこ悪い会長も愛してあげますから<emoji=heart04>」"
translation = "「하지만 괜찮아요? 응, 후…… 한심하고 볼품없는 회장님도 사랑해드릴 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「体は動かせなくても、射精だけは許してあげますから、出してもいいですよ～？\u3000おもらしするみたいに、びゅびゅーって出しちゃってください<emoji=heart04>」"
translation = "「몸은 움직이지 못해도 사정만은 허락해드릴 테니까, 싸도 괜찮아요~? 오줌 싸는 것처럼 뷰븃하고 싸버리세요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「んっ……はっ……お射精してるところ、きっとかわいいんでしょうねぇ……くすくす<emoji=heart04>」"
translation = "「응…… 하아…… 사정하는 모습, 분명 귀엽겠죠…… 쿠스쿠스<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……うぅっ……」"
translation = "「큭…… 으으……」"

[[dialogue]]
speaker = "unk"
original = "わずかに残った理性とプライドが、ここで果てることを拒絶する。"
translation = "미세하게 남은 이성과 프라이드가 여기서 끝나는 것을 거부한다."

[[dialogue]]
speaker = "unk"
original = "でもモネの甘くて傲慢な声が意識に沁み込んできて、このままではすぐに決壊しそうだ。"
translation = "하지만 모네의 달콤하고 오만한 목소리가 의식에 스며들어, 이대로는 금방이라도 결계가 무너질 것 같다."

[[dialogue]]
speaker = "モネ"
original = "「んんっ……あ、まだ耐えるつもりなんですか？\u3000んっ、ふっ……もっとおっぱいでしてほしいなんて、わがままな魔王様<emoji=heart04>」"
translation = "「으응…… 아, 아직 버틸 생각인가요? 응, 후…… 가슴으로 더 해달라니, 응석쟁이 마왕님<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「それじゃ──会長が屈しやすいように、もっと激しくしちゃいますね<emoji=heart04>」"
translation = "「그럼── 회장님이 굴복하기 쉽도록, 더 격렬하게 해드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000私のおっぱいで、射精しちゃってください<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하아<emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04> 제 가슴으로 사정해버리세요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「びゅるびゅるーって、射精するところ見せてください<emoji=heart04>\u3000ほら<emoji=heart04>\u3000ほらぁ<emoji=heart04>」"
translation = "「뷰루뷰루하고 사정하는 모습 보여주세요<emoji=heart04> 자<emoji=heart04> 자아<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000私に見られながら、みっともなく、出しちゃってくださいっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 제가 보는 앞에서 꼴사납게 싸버리세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネの責めが激しさを増し、ふわふわのおっぱいでペニス全体を揉みくちゃにする。"
translation = "모네의 공격이 격렬해지며, 폭신폭신한 가슴으로 페니스 전체를 마구 주무른다."

[[dialogue]]
speaker = "unk"
original = "極上の快感で責め立てられ、壊れたおもちゃのように腰の奥が勝手に震えてしまう。"
translation = "극상의 쾌감으로 몰아붙여져, 망가진 장난감처럼 허리 깊은 곳이 제멋대로 떨린다."

[[dialogue]]
speaker = "モネ"
original = "「壊れたおもちゃみたいに、腰がカクカクしてる<emoji=heart04>\u3000おもしろ～い<emoji=heart04>\u3000ぁんっ<emoji=heart04>\u3000んっ──んっ──んっ<emoji=heart04>」"
translation = "「망가진 장난감처럼 허리가 덜덜 떨리고 있어<emoji=heart04> 재미있어~<emoji=heart04> 아앙<emoji=heart04> 응── 응── 응<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「んんっ……<emoji=heart04>\u3000ふふっ、ビクビク跳ねておち○ちん悦んでるっ<emoji=heart04>\u3000射精したいんだ<emoji=heart04>\u3000んっ、んっ<emoji=heart04>\u3000射精したいんですよね<emoji=heart04>」"
translation = "「으응……<emoji=heart04> 후후, 움찔움찔 튀면서 자지가 기뻐하고 있어<emoji=heart04> 사정하고 싶구나? 응, 응<emoji=heart04> 사정하고 싶은 거죠?<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「おま○こじゃなくてもいいんだ<emoji=heart04>\u3000はぁっ、ふっ、ふぅっ<emoji=heart04>\u3000おっぱいでされたくらいで射精しちゃうんだ<emoji=heart04>」"
translation = "「보지가 아니어도 괜찮은 거네<emoji=heart04> 하앗, 후, 후우<emoji=heart04> 가슴으로 해준 정도로 사정해버리다니<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「情けない魔王様<emoji=heart04>\u3000かっこ悪い魔王様<emoji=heart04>\u3000でもいいですよ<emoji=heart04>\u3000出してください<emoji=heart04>\u3000イクところ見ててあげますよ<emoji=heart04>」"
translation = "「한심한 마왕님<emoji=heart04> 볼품없는 마왕님<emoji=heart04> 하지만 괜찮아요. 싸세요. 싸는 모습 지켜봐 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「出しちゃえ<emoji=heart04>\u3000出しちゃえ<emoji=heart04>\u3000魚みたいにビクビク震えながら射精しちゃえ<emoji=heart04>」"
translation = "「싸버려<emoji=heart04> 싸버려<emoji=heart04> 물고기처럼 파닥파닥 떨면서 사정해버려<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うっ……くぅぅっ……」"
translation = "「윽…… 쿠우우……」"

[[dialogue]]
speaker = "モネ"
original = "「ほら、もっとその顔を見せて<emoji=heart04>\u3000会長が喘いでる顔好き<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000もっと、もっと<emoji=heart04>」"
translation = "「자, 더 그 표정을 보여줘<emoji=heart04> 회장님이 헐떡이는 얼굴 좋아<emoji=heart04> 응<emoji=heart04> 후<emoji=heart04> 으응<emoji=heart04> 더, 더<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁっ、ふぅっ、んんっ<emoji=heart04>\u3000ほぅら<emoji=heart04>\u3000ほらほらほら<emoji=heart04>\u3000出しちゃえ<emoji=heart04>\u3000出しちゃえ<emoji=heart04>」"
translation = "「하앗, 후우, 으응<emoji=heart04> 자아<emoji=heart04> 자자자<emoji=heart04> 싸버려<emoji=heart04> 싸버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネの前で情けなくイキたくない……なのに、限界は確実に近づいていて──"
translation = "모네 앞에서 한심하게 가버리고 싶지 않아…… 그런데도 한계는 확실히 다가오고──"

[[dialogue]]
speaker = "モネ"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000嫌っていうくらい気持ち良くしてあげますから<emoji=heart04>\u3000おっぱいで、ぎゅっ、ぎゅってしてあげて……んっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 싫다고 할 정도로 기분 좋게 해드릴 테니까<emoji=heart04> 가슴으로 꼬옥, 꼬옥 해줄게…… 응<emoji=heart04> 으응<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「あっ<emoji=heart04>\u3000ドクドクって、今にも爆発しちゃいそう<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ほら、おっぱいで射精してください<emoji=heart04>」"
translation = "「앗<emoji=heart04> 두근두근하며 금방이라도 폭발할 것 같아<emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04> 자, 가슴으로 사정해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「おもらし射精<emoji=heart04>\u3000しちゃえ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000みっともなくイッちゃえ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んぅっ<emoji=heart04>」"
translation = "「오줌 사정<emoji=heart04> 해버려<emoji=heart04> 으응<emoji=heart04> 응<emoji=heart04> 응<emoji=heart04> 꼴사납게 가버려<emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04> 으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネにいいようにされているのに、それがたまらなく興奮する。"
translation = "모네가 시키는 대로 당하고 있는데, 그것이 참을 수 없을 정도로 흥분된다."

[[dialogue]]
speaker = "unk"
original = "俺を見下し蔑むその視線が、罵倒し<ruby>詰<rt>なじ</rt></ruby>るその声が、俺の中で熱に変わっていく。"
translation = "나를 내려다보며 멸시하는 그 시선이, 매도하며 몰아세우는 그 목소리가 내 안에서 열기로 변해간다."

[[dialogue]]
speaker = "モネ"
original = "「ほんとは、女の子を孕ませるためなのに<emoji=heart04>\u3000はっ、はぁ、んっ<emoji=heart04>\u3000おま○この中で射精しないといけないのに<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000私のおっぱいで、射精しちゃうんだ<emoji=heart04>」"
translation = "「원래는 여자아이를 임신시키기 위한 건데<emoji=heart04> 하아, 하아, 응<emoji=heart04> 보지 안에서 사정해야 하는데<emoji=heart04> 응아<emoji=heart04> 내 가슴으로 사정해버리는구나<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「んっ、はっ、あんっ<emoji=heart04>\u3000ガクガク震えながら、ムダ撃ち射精するところ、見せてください<emoji=heart04>\u3000ほら<emoji=heart04>\u3000ほら<emoji=heart04>\u3000ほらぁ<emoji=heart04>」"
translation = "「응, 하아, 아앙<emoji=heart04> 덜덜 떨면서 헛방 사정하는 모습 보여주세요<emoji=heart04> 자<emoji=heart04> 자<emoji=heart04> 자아<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「よわよわ魔王<emoji=heart04>\u3000ザコ魔王<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000魔王のくせに、女の子１人孕ませられない、意気地なし<emoji=heart04>」"
translation = "「허약 마왕<emoji=heart04> 좆밥 마왕<emoji=heart04> 응아<emoji=heart04> 으응<emoji=heart04> 마왕 주제에 여자 한 명 임신시키지 못하는 겁쟁이<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「出せ<emoji=heart04>\u3000出せ<emoji=heart04>\u3000出せ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000私のおっぱいでイケ<emoji=heart04>\u3000イケイケ<emoji=heart04>」"
translation = "「싸라<emoji=heart04> 싸라<emoji=heart04> 싸라<emoji=heart04> 하앗<emoji=heart04> 응<emoji=heart04> 으응<emoji=heart04> 내 가슴으로 가<emoji=heart04> 가버려 가버려<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000きったないザーメンぶちまけろっ<emoji=heart04>\u3000みっともなくイキ果てろっ<emoji=heart04>\u3000変態魔王っ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 응<emoji=heart04> 더러운 정액 흩뿌려버려! 꼴사납게 가버려! 변태 마왕! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてモネのおっぱいが、ペニスを潰すようにぎゅっと絞ってきて──"
translation = "그리고 모네의 가슴이 페니스를 으깨듯이 꽉 조여왔고──"

[[dialogue]]
speaker = "クロト"
original = "「くぅ────ッッ！！」"
translation = "「쿠으윽────!!」"

[[dialogue]]
speaker = "モネ"
original = "「ひあぁあっ<emoji=heart04>\u3000あっ……胸の中で、おち○ちんビクビクしてるっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 앗…… 가슴 속에서 자지가 움찔움찔하고 있어!」"

[[dialogue]]
speaker = "モネ"
original = "「ふふ……あはははっ<emoji=heart04>\u3000ホントに出た<emoji=heart04>\u3000びゅびゅびゅーって、おもらし射精しちゃったぁ<emoji=heart04>」"
translation = "「후후…… 아하하핫<emoji=heart04> 진짜 나왔다! 뷰뷰븃하고 오줌 사정해버렸네!」"

[[dialogue]]
speaker = "モネ"
original = "「あはっ、あはははっ<emoji=heart04>\u3000私のおっぱいの中で、ムダ撃ち射精してる<emoji=heart04>\u3000ふふっ、あはは<emoji=heart04>\u3000なっさけな～い<emoji=heart04>」"
translation = "「아핫, 아하하핫<emoji=heart04> 내 가슴 속에서 헛방 사정하고 있어. 후후, 아하하<emoji=heart04> 한~심해라~」"

[[dialogue]]
speaker = "unk"
original = "とうとう限界に達し、モネの胸の中で爆ぜた。"
translation = "드디어 한계에 달해 모네의 가슴 속에서 폭발했다."

[[dialogue]]
speaker = "unk"
original = "射精中もモネの嘲笑は止まらず、精を吐き出しながら屈辱と快楽に震える。"
translation = "사정 중에도 모네의 조소는 멈추지 않았고, 정액을 쏟아내며 굴욕과 쾌락에 떨었다."

[[dialogue]]
speaker = "モネ"
original = "「ふふふ<emoji=heart04>\u3000射精してるところに……むぎゅっと<emoji=heart04>」"
translation = "「후후후<emoji=heart04> 사정하고 있는 곳에…… 뭉클하고<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あぐっ……！？」"
translation = "「아극……!?」"

[[dialogue]]
speaker = "モネ"
original = "「あはっ<emoji=heart04>\u3000ビュッって勢いよく出た<emoji=heart04>\u3000おもしろ～い<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000あはははっ<emoji=heart04>」"
translation = "「아핫<emoji=heart04> 뷰륫하고 기세 좋게 나왔다! 재미있어~ 후후, 아하하핫<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はおっぱいでペニスを捕まえられ、下半身を跳ねさせながら精を撒き散らすことしかできなかった。"
translation = "나는 가슴에 페니스를 붙잡힌 채, 하반신을 튕기며 정액을 흩뿌릴 수밖에 없었다."

[[dialogue]]
speaker = "モネ"
original = "「ふふ……」"
translation = "「후후……」"

[[dialogue]]
speaker = "クロト"
original = "「モネ……？」"
translation = "「모네……?」"

[[dialogue]]
speaker = "unk"
original = "射精が止まると、モネの表情はいつもの優しげなものに戻っていた。"
translation = "사정이 멈추자 모네의 표정은 평소의 상냥한 모습으로 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "さっき射精したところなのに、白い精液で汚れた姿に興奮を覚えてしまう。"
translation = "방금 사정했는데도, 하얀 정액으로 더러워진 모습에 흥분을 느끼고 만다."

[[dialogue]]
speaker = "モネ"
original = "「もしかして呪いのせいだと思いました？\u3000大丈夫ですよ、私は私です」"
translation = "「혹시 저주의 탓이라고 생각하셨나요? 괜찮아요, 저는 저예요.」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、どうして……？」"
translation = "「그럼 어째서……?」"

[[dialogue]]
speaker = "モネ"
original = "「魔将の力を使いこなす訓練の一環として、傲慢な自分を演じてみることにしたんです」"
translation = "「마장의 힘을 능숙하게 다루는 훈련의 일환으로, 오만한 자신을 연기해보기로 했거든요.」"

[[dialogue]]
speaker = "モネ"
original = "「たまには趣向を変えて、こういうのもいいかと思ったんですが……どうでした？」"
translation = "「가끔은 취향을 바꿔서 이런 것도 괜찮을 것 같았는데…… 어떠셨나요?」"

[[dialogue]]
speaker = "クロト"
original = "「えっと……」"
translation = "「그게……」"

[[dialogue]]
speaker = "unk"
original = "今の気持ちをどう言葉にしていいかわからない。"
translation = "지금의 기분을 어떻게 말로 표현해야 할지 모르겠다."

[[dialogue]]
speaker = "unk"
original = "さっきまでの傲慢なモネは少し怖いけど、もう見れないと思うと残念なような……"
translation = "방금 전까지의 오만한 모네는 조금 무섭지만, 이제 볼 수 없다고 생각하니 아쉬운 듯한……"

[[dialogue]]
speaker = "モネ"
original = "「じゃあこう聞きますね」"
translation = "「그럼 이렇게 물어볼게요.」"

[[dialogue]]
speaker = "モネ"
original = "「またいじめてほしいですか、魔王様？」"
translation = "「또 괴롭힘당하고 싶으신가요, 마왕님?」"

[[dialogue]]
speaker = "クロト"
original = "「……うん」"
translation = "「……응.」"

[[dialogue]]
speaker = "unk"
original = "さっきの屈辱的な快感を思い出し、つい頷いてしまうのだった──"
translation = "방금 전의 굴욕적인 쾌감을 떠올리며 나도 모르게 고개를 끄덕이고 마는 것이었다──"

