[[dialogue]]
speaker = "モネ"
original = "「う～、緊張します……」"
translation = "「으으, 긴장돼요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「何かあれば私がお助けしますよ」"
translation = "「무슨 일이 생기면 제가 도와드릴게요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「心配されなくても大丈夫です。モネさんの想い、きっと届きます」"
translation = "「걱정하지 않으셔도 괜찮습니다. 모네 씨의 마음, 분명 전해질 거예요.」"

[[dialogue]]
speaker = "モネ"
original = "「……はい！」"
translation = "「……네!」"

[[dialogue]]
speaker = "モネ"
original = "「皆さーん！\u3000少しいいですかー？」"
translation = "「여러분―! 잠시만요―!」"

[[dialogue]]
speaker = "モネ"
original = "「私は図書委員の紙屋敷モネです」"
translation = "「저는 도서위원 카미야시키 모네입니다.」"

[[dialogue]]
speaker = "モネ"
original = "「私は本が大好きで、皆さんにもっと本を読んでほしい、もっと本に触れてほしいと思っています」"
translation = "「저는 책을 무척 좋아해서 여러분이 더 책을 읽었으면, 더 책을 접했으면 좋겠다고 생각해요.」"

[[dialogue]]
speaker = "モネ"
original = "「だから学園や図書館から許可を頂いて、ある活動をすることにしました」"
translation = "「그래서 학원과 도서관의 허가를 받아 어떤 활동을 하기로 했습니다.」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさーん」"
translation = "「위스테리아 씨―」"

[[dialogue]]
speaker = "モネ"
original = "「あれ、いない？\u3000いつもならこの時間はまだ働いているのに……」"
translation = "「어라, 없으신가? 평소라면 이 시간엔 아직 일하고 계실 텐데……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ごめんなさい、ちょっと野暮用で外してたの。大丈夫よ」"
translation = "「미안해, 잠깐 볼일이 있어서 자릴 비웠어. 괜찮아.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……って何やら真剣な顔ね。思いついたことがあるのかしら」"
translation = "「……라니 왠지 진지한 표정이네. 생각난 거라도 있니?」"

[[dialogue]]
speaker = "モネ"
original = "「どうすれば皆さんが図書館に来てくれるか、私はそればかり考えていました」"
translation = "「어떻게 하면 여러분이 도서관에 와주실지 저는 그것만 생각했어요.」"

[[dialogue]]
speaker = "モネ"
original = "「でもきっと、待つだけでは変わらない。だから時には図書館の外に出ることも必要なんだと思います」"
translation = "「하지만 분명 기다리는 것만으론 변하지 않아요. 그러니까 때로는 도서관 밖으로 나가는 것도 필요하다고 생각합니다.」"

[[dialogue]]
speaker = "モネ"
original = "「名付けて──」"
translation = "「이름하여──」"

[[dialogue]]
speaker = "モネ"
original = "「出張図書コンシェルジュです！」"
translation = "「출장 도서 컨시어지입니다!」"

[[dialogue]]
speaker = "モネ"
original = "「読みたい本や知りたいこと、気になることがあったら教えてください。新星学園図書館の本を読み尽くした私が、あなたにぴったりの本をお選びします」"
translation = "「읽고 싶은 책이나 알고 싶은 것, 궁금한 게 있다면 알려주세요. 신성학원 도서관의 책을 섭렵한 제가 당신에게 딱 맞는 책을 골라드릴게요.」"

[[dialogue]]
speaker = "モネ"
original = "「普段あまり図書館に来られない方も、たまには読書してみませんか？\u3000お気軽にどうぞ～」"
translation = "「평소 도서관에 잘 안 오시는 분들도 가끔은 독서해 보지 않겠나요? 편하게 와주세요~」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ちなみに私はお手伝いです～」"
translation = "「참고로 저는 도우미입니다~」"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "モネ"
original = "（うぅ、やっぱりあんまり人が来ない……でもここで心が折れたらダメ……誰かが少しくらいは興味を持ってくれるはず……）"
translation = "(으으, 역시 사람이 별로 안 와…… 하지만 여기서 기운 빠지면 안 돼…… 누군가 조금은 관심을 가져줄 거야……)"

[[dialogue]]
speaker = "蛍火"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "モネ"
original = "（蛍火さん……！\u3000元星徒会役員だけあってとってもお強い人です……！）"
translation = "(케이카 씨……! 전임 성도회 임원답게 무척 강하신 분이에요……!)"

[[dialogue]]
speaker = "蛍火"
original = "「こんにちは、モネさん。昨年は星徒会ではお世話になっておりました。よければ私にふさわしい本を見繕っていただけますか」"
translation = "「안녕하세요, 모네 씨. 작년엔 성도회에서 신세 졌었죠. 괜찮으시다면 제게 어울리는 책을 골라주실 수 있을까요?」"

[[dialogue]]
speaker = "モネ"
original = "「ひゃいっ、もちろんです」"
translation = "「힉, 물론입니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「よろしくお願いします。ただ、私も図書館を訪れたことはあるのです」"
translation = "「잘 부탁드립니다. 다만 저도 도서관을 방문해본 적은 있답니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「私が流星市国へとやってきたのは、リクリエに対処するだけでなく、人間界の料理を学ぶためです」"
translation = "「제가 유성시국으로 온 것은 리크리에에 대처하기 위해서뿐만 아니라 인간계의 요리를 배우기 위해서이기도 합니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「そのため入学直後に図書館で料理の本を調べましたが、技法に関してはすでに習得しているものばかり」"
translation = "「그 때문에 입학 직후 도서관에서 요리책을 찾아보았습니다만 기법에 관해서는 이미 습득한 것들뿐.」"

[[dialogue]]
speaker = "蛍火"
original = "「逆に料理を紹介した本は種類が多すぎて、どれを手に取っていいかわからないくらいでした」"
translation = "「반대로 요리를 소개한 책은 종류가 너무 많아서 무엇을 골라야 할지 모를 정도였어요.」"

[[dialogue]]
speaker = "モネ"
original = "「ふむふむ、なるほど……そんな蛍火さんに読んでほしい本があります！」"
translation = "「흠흠, 과연…… 그런 케이카 씨가 읽으셨으면 하는 책이 있어요!」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさん、図書館から持ってきてほしい本がいくつかありまして。書架の場所は──」"
translation = "「위스테리아 씨, 도서관에서 가져와 주셨으면 하는 책이 몇 권 있는데요. 서가 위치는──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はい、持ってきたわよ。この本でいいのよね？」"
translation = "「응, 가져왔어. 이 책들이면 되지?」"

[[dialogue]]
speaker = "モネ"
original = "「ありがとうございます。蛍火さんにご紹介したい本は、この『魔界の秘境食』です！」"
translation = "「감사합니다. 케이카 씨에게 소개해 드리고 싶은 책은 이 『마계의 비경식』입니다!」"

[[dialogue]]
speaker = "蛍火"
original = "「？\u3000ここに来たのは人間界の料理を学ぶためとお伝えしたはずですが」"
translation = "「? 이곳에 온 것은 인간계의 요리를 배우기 위해서라고 말씀드렸을 텐데요.」"

[[dialogue]]
speaker = "モネ"
original = "「ええ、存じています。だけど蛍火さんであれば古今東西、三界すべての料理を学びたいはず。そして、人間界だからこそ知ることのできる魔界料理もあると思います」"
translation = "「네, 알고 있어요. 하지만 케이카 씨라면 동서고금, 삼계 모든 요리를 배우고 싶으실 터. 그리고 인간계이기에 비로소 알 수 있는 마계 요리도 있다고 생각해요.」"

[[dialogue]]
speaker = "モネ"
original = "「魔界は広大で無秩序。そして混沌。未だ人智の及ばぬ秘境が無数にあり、一説には今も拡大を続けているとか」"
translation = "「마계는 광대하고 무질서하며 혼돈 그 자체. 아직 인지가 미치지 않은 비경이 무수히 존재하며 일설에는 지금도 확대되고 있다고도 하죠.」"

[[dialogue]]
speaker = "モネ"
original = "「探検家が本業で、『魔族は魔界を知らない』と豪語する著者が記したこの本には、魔族すら容易に踏み入れない魔界の奥地の料理が記されています」"
translation = "「탐험가가 본업이며 『마족은 마계를 모른다』고 호언장담하는 저자가 쓴 이 책에는 마족조차 쉽게 발을 들이지 않는 마계 오지의 요리가 기록되어 있습니다.」"

[[dialogue]]
speaker = "モネ"
original = "「例えばシャリオン地方の北西、狂暴な魔獣の巣がたくさんあるとされる場所ですが、そこには小さな村があって、そこでのみ食される料理があるそうです」"
translation = "「예를 들어 샤리온 지방의 북서쪽, 흉포한 마수의 둥지가 잔뜩 있다고 여겨지는 곳입니다만 그곳에는 작은 마을이 있고 거기서만 먹는 요리가 있다고 해요.」"

[[dialogue]]
speaker = "蛍火"
original = "「魔鳥の皮から取った脂で、アヒージョのように内蔵を煮込む……初めて聞く料理です。この地方の魔鳥独特の調理法なのでしょうか」"
translation = "「<ruby>마조<rt>魔鳥</rt></ruby>의 껍질에서 낸 기름으로 아히요처럼 내장을 끓인다…… 처음 듣는 요리군요. 이 지방 마조 독특한 조리법인 걸까요.」"

[[dialogue]]
speaker = "モネ"
original = "「ちなみにこの本は１冊目で、２冊目もあるんです。３冊目の執筆にも取り掛かる予定だったそうですが、その前に著者が行方不明になったそうで……」"
translation = "「참고로 이 책은 1권이고 2권도 있어요. 3권 집필도 착수할 예정이었다고 합니다만 그전에 저자가 행방불명되었다고 해서……」"

[[dialogue]]
speaker = "蛍火"
original = "「それは……魔界ですから、相応の危険があったということなのでしょう」"
translation = "「그것은…… 마계니까 그에 상응하는 위험이 있었던 것이겠지요.」"

[[dialogue]]
speaker = "モネ"
original = "「そうですね。だからこそ、彼の著作は貴重と言えます」"
translation = "「그렇네요. 그렇기에 그의 저작은 귀중하다고 할 수 있어요.」"

[[dialogue]]
speaker = "モネ"
original = "「彼は料理人でも料理研究家でもないので、レシピについて詳細に書かれていないのは残念ではありますが。ですが蛍火さんなら推測も可能かと思います」"
translation = "「그는 요리사도 요리 연구가도 아니기에 레시피에 대해 상세히 적혀있지 않은 점은 아쉽습니다만 케이카 씨라면 추측도 가능하리라 봅니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「なるほど……確かに興味深いですね」"
translation = "「과연…… 확실히 흥미롭군요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "（蛍火さん、もしかして気を遣って声をかけてくれたのかしら？\u3000でも彼女も楽しそうに本読んでるわね）"
translation = "(케이카 씨, 혹시 신경 써서 말을 걸어준 걸까? 그래도 그녀도 즐겁게 책을 읽고 있네)"

[[dialogue]]
speaker = "蛍火"
original = "「ありがとうございます。予想とは異なりましたが、確かにとても魅力的な本でした。ぜひ読んでみたいと思います」"
translation = "「감사합니다. 예상과는 달랐습니다만 확실히 무척 매력적인 책이었어요. 꼭 읽어보고 싶습니다.」"

[[dialogue]]
speaker = "モネ"
original = "「いえいえ、読みたいと思っていただけたなら何よりです。他にも料理や食材の本が──あれ？」"
translation = "「아니요, 읽고 싶다고 생각해주셨다면 무엇보다 다행이에요. 그 외에도 요리나 식재료 책이── 어라?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ほ～、魔界のお野菜の本もあるのですね。あら、このお茄子……大きくて張りがあって、形がとても……」"
translation = "「호오~ 마계 채소 책도 있군요. 어머, 이 가지…… 크고 탱탱해서 모양이 무척……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「キュウリも太くて瑞々しくて……ゴクリ」"
translation = "「오이도 굵고 싱싱해서…… 꿀꺽.」"

