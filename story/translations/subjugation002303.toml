[[dialogue]]
speaker = "unk"
original = "あまりにも埒が明かないので、エッチな話題はまた今度ということにしてもらって、改めてクーシェンの身の上話を聞かせてもらうことにした。"
translation = "도저히 끝이 나지 않아서 야한 화제는 다음에 하기로 하고, 다시 한번 쿠셴의 신상 이야기를 듣기로 했다."

[[dialogue]]
speaker = "クーシェン"
original = "「――親？\u3000そんなものはいないよ！\u3000さっきも言ったけど、ボクは大岩の中から生まれたんだから！」"
translation = "「──부모? 그런 건 없어! 아까도 말했지만 나는 커다란 바위 안에서 태어났으니까!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「生まれた場所も、岩から生まれたって逸話も、悟空のまんまなんだよね～」"
translation = "「태어난 장소도 바위에서 태어났다는 일화도 오공이랑 똑같다구~」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「２０００年前は、お師匠様が親代わりみたいなものだったんだけど、今回はそういう人にはまだ出会えてないって感じかな？」"
translation = "「2000년 전에는 스승님이 부모 대신 같은 존재였지만 이번에는 그런 사람을 아직 못 만났다는 느낌이려나?」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、クーシェンが起きたのはいつ頃なんだ？"
translation = "그나저나 쿠셴이 일어난 건 언제쯤이야?"

[[dialogue]]
speaker = "クーシェン"
original = "「えっと、ボクが目覚めたのは……」"
translation = "「음, 내가 깨어난 건……」"

[[dialogue]]
speaker = "unk"
original = "それからクーシェンが告げた時期は――"
translation = "그 후 쿠셴이 말한 시기는──"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「それって……ちょうど『オペレーション・ペンタグラム』が行われた頃なんじゃ？」"
translation = "「그거…… 딱 『오퍼레이션 펜타그램』이 행해졌을 무렵 아냐?」"

[[dialogue]]
speaker = "unk"
original = "オペレーション・ペンタグラム――それは黒騎士によって魔界各地に封印された守護天使５柱を解放する為、新星学園、流星学園、ネビュラが協力して行った作戦のことである。"
translation = "오퍼레이션 펜타그램── 그것은 흑기사에 의해 마계 곳곳에 봉인된 수호천사 5주를 해방하기 위해 신성학원, 유성학원, 네뷸라가 협력해 수행한 작전의 명칭이다."

[[dialogue]]
speaker = "unk"
original = "これにより守護天使の解放に成功し、俺たちは世界の秩序を守ることができたのだが――"
translation = "이로 인해 수호천사 해방에 성공했고, 우리는 세계의 질서를 지킬 수 있었는데──"

[[dialogue]]
speaker = "クーシェン"
original = "「しゅごてんし……？\u3000よくわからないけど、そんなことがあったんだ……」"
translation = "「수호천사……? 잘 모르겠지만 그런 일이 있었구나……」"

[[dialogue]]
speaker = "クーシェン"
original = "「言われてみると、目覚める前に何か禍々しい力のようなものを感じたんだよね～。それで気が付いたら、岩が割れて、そこにいたって感じで……」"
translation = "「듣고 보니 깨어나기 전에 무언가 불길한 힘 같은 걸 느꼈었어~. 그러고 보니 바위가 갈라져서 거기 있었다는 느낌이라……」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「悟空は強い相手と戦うのが、めちゃめちゃ好きだったからね～。アタシたちと守護天使の壮絶なバトルの気配を感じて、起きたのかも？」"
translation = "「오공은 강한 상대와 싸우는 걸 엄청나게 좋아했으니까 말야~. 우리와 수호천사의 처절한 배틀 기운을 느끼고 일어난 걸지도?」"

[[dialogue]]
speaker = "クーシェン"
original = "「うんっ！\u3000強いヒトと戦うのはボクも大好きだよっ♪」"
translation = "「응! 강한 사람과 싸우는 건 나도 정말 좋아해♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「マリオンにここへ連れて来てもらったのも、ここには強い星騎士が沢山いて、その中でも最強って言われてる魔王と手合わせしてみたかったからだし！」"
translation = "「마리온이 여기 데려다준 것도 여기에는 강한 성기사가 잔뜩 있고, 그중에서도 최강이라 불리는 마왕이랑 대련해 보고 싶었기 때문이고!」"

[[dialogue]]
speaker = "クーシェン"
original = "「それに今は――紅明とも戦ってみたい！」"
translation = "「그리고 지금은── 코우메이랑도 싸워보고 싶어!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「およ？\u3000アタシ？」"
translation = "「어라? 나?」"

[[dialogue]]
speaker = "クーシェン"
original = "「うん♪\u3000その衣装から、とてつもなく強い星力を感じて……ボク、すっごくウキウキしてるんだ！」"
translation = "「응♪ 그 의상에서 엄청나게 강한 성력이 느껴져서…… 나 지금 정말 우키키♪ 하게 돼!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「…………ふふっ、そっか」"
translation = "「…………후훗, 그렇구나.」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「記憶が無くとも、そこはアタシのよく知ってる孫悟空ってわけだ♪」"
translation = "「기억이 없어도 그 점은 내가 잘 아는 손오공이라는 거네♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「なら、いいぜ☆\u3000この姿はアタシが前世で親父殿――牛魔王と戦う為に手に入れた決戦用戦闘服」"
translation = "「그럼 좋다구☆ 이 모습은 내가 전생에서 아버지── 우마왕과 싸우기 위해 손에 넣은 결전용 전투복」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「今っぽく改めて名づけるなら、『<ruby>羅刹<rt>ラクシャシー</rt></ruby>フォーム』ってところか！\u3000こうして２０００年ぶりに巡り会ったんだし、一丁テンション上げてバトっちゃいますか☆」"
translation = "「요즘식으로 다시 이름을 붙인다면 『나찰<rt>락샤시</rt></ruby> 폼』이라고나 할까! 이렇게 2000년 만에 다시 만났으니 한바탕 텐션 올려서 배틀해 볼까나☆」"

[[dialogue]]
speaker = "クーシェン"
original = "「いいの！？\u3000やった～っ！」"
translation = "「정말!? 신난다~!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「うっしっし☆\u3000アタシにいい考えがあるから任せておきな♪」"
translation = "「우히히☆ 나한테 좋은 생각이 있으니 맡겨두라구♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「せっかくバトルするなら、元気全開で盛り上げて行くぜ～っ！」"
translation = "「기왕 배틀하는 거 활기 전개로 분위기 띄워보자구~!」"

[[dialogue]]
speaker = "unk"
original = "紅明はテンション高く、芭蕉扇を上に掲げるのだった。"
translation = "코우메이는 텐션 높게 파초선을 위로 치켜들었다."

[[dialogue]]
speaker = "unk"
original = "３日後――"
translation = "사흘 뒤──"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『――皆様、ついに再びこの日がやって参りました！』"
translation = "『──여러분, 드디어 다시 이 날이 돌아왔습니다!』"

[[dialogue]]
speaker = "unk"
original = "紅明は空いた片手にマイクを持ちながら、仰々しく告げる。"
translation = "코우메이는 비어 있는 한 손에 마이크를 든 채 과장되게 알린다."

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『新星学園星徒会長の座をかけて――「御前試合」の開催だ～っ！！！』"
translation = "『신성학원 성도회장의 자리를 걸고── 「어전 시합」의 개최다아아아!!!』"

[[dialogue]]
speaker = "unk"
original = "紅明はアタシにいい考えがある！\u3000と言った後、凄まじい行動力をもって、わずか数日で両学園の全校生徒へと周知し、アリーナ満員状態で御前試合を開催させてしまった――"
translation = "코우메이는 나한테 좋은 생각이 있어! 라고 말한 뒤 엄청난 행동력으로 불과 며칠 만에 양 학원의 전교생에게 주지시키고, 아레나 만석 상태로 어전 시합을 개최해 버렸다──"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『改めまして、まずは軽くアタシの自己紹介から！』"
translation = "『다시 한번, 우선 가볍게 내 자기소개부터!』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『今回、御前試合の司会役に名乗り出させてもらった、放送委員会所属、新星学園２年生の牛紅明だぜ！\u3000みんな、よろしくな～っ☆』"
translation = "『이번 어전 시합의 사회자를 자처한 방송위원회 소속, 신성학원 2학년 규우 코우메이라구! 모두 잘 부탁해~☆』"

[[dialogue]]
speaker = "女生徒Ａ"
original = "「知ってる～！」"
translation = "「알고 있어~!」"

[[dialogue]]
speaker = "附属生Ｂ"
original = "「紅明センパーイ！」"
translation = "「코우메이 선배!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『ウェ～イ♪\u3000歓声ありがと～！\u3000今日はみんな、盛り上がって行こうぜ～っ！』"
translation = "『웨이~♪ 환성 고마워~! 오늘 모두 즐겁게 가보자구~!』"

[[dialogue]]
speaker = "unk"
original = "紅明の元気な声に合わせるように、更に盛り上がりを増す会場。"
translation = "코우메이의 활기찬 목소리에 맞춰 더욱 열기를 더해가는 행사장."

[[dialogue]]
speaker = "セシア"
original = "「紅明ママ～！\u3000新しい衣装、すっごくママの波動を感じて、似合っているわ～♪」"
translation = "「코우메이 마마~! 새로운 의상, 정말로 마마의 파동이 느껴져서 잘 어울려요~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「むむむっ、みんなのママを目指す者として、紅明さんの衣装、すごく気になってしまいます……！」"
translation = "「무무무, 모두의 마마를 지향하는 사람으로서 코우메이 씨의 의상, 정말 신경 쓰여요……!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「紅明～！\u3000その衣装は何なのだ～？」"
translation = "「코우메이~! 그 의상은 무엇인 거냐~?」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『お～っ！\u3000セッシー、ママダレナ、アルモたん♪\u3000こいつはつい先日手に入れた、アタシの覚醒戦闘服なんだぜ☆』"
translation = "『오~! 세시, 마마달레나, 알모땅♪ 이건 요전날 손에 넣은 내 각성 전투복이라구☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『なんでこれを着てきたかってのは、後でのお楽しみ♪\u3000ってことで、次は今回の主役――ニューチャレンジャーの登場っしょ！』"
translation = "『왜 이걸 입고 왔는지는 나중에 기대하시라♪ 그럼 다음은 이번의 주인공── 뉴 챌린저의 등장이라구!』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『紹介するぜ！\u3000魔界からやって来た、新たな星騎士――クーシェン！』"
translation = "『소개하지! 마계에서 온 새로운 성기사── 쿠셴!』"

[[dialogue]]
speaker = "unk"
original = "紅明がアリーナの入り口を指差す。"
translation = "코우메이가 아레나 입구를 가리킨다."

[[dialogue]]
speaker = "unk"
original = "するとそこからバック転をしながら、小さな影が会場の中心へと勢いよく飛び出してきて、着地する。"
translation = "그러자 그곳에서 공중제비를 돌며 작은 그림자가 행사장 중심으로 기세 좋게 튀어나와 착지한다."

[[dialogue]]
speaker = "クーシェン"
original = "「いよっと！\u3000やあやあ、みんな、どうも♪」"
translation = "「이얏차! 야아 야아, 모두 안녕♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「ボクはさすらいの星術使い、クーシェン！\u3000これからよろしくね～っ！」"
translation = "「나는 떠돌이 성술사 쿠셴! 앞으로 잘 부탁해~!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『この子は３日前に人間界へやって来たばかりなんだ！\u3000学園にスカウトされてな♪\u3000つまり――』"
translation = "『이 아이는 사흘 전에 막 인간계에 왔어! 학원에서 스카우트했다구♪ 즉──』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『これからアタシたちと同じ、星騎士の仲間になる転入生ってこと！\u3000ってなわけでみんな、仲良くしてあげてくれよな～☆』"
translation = "『앞으로 우리와 같은 성기사 동료가 될 전입생이라는 말씀! 그런 고로 모두 사이좋게 지내달라구~☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『ちなみにあだ名は、クーちん♪\u3000学年は――』"
translation = "『참고로 별명은 쿠셴♪ 학년은──』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『あれ？\u3000そういえばちゃんと聞いてなかった。クーちん、２年生で合ってるよね？』"
translation = "『어라? 그러고 보니 제대로 안 물어봤네. 쿠셴, 2학년 맞지?』"

[[dialogue]]
speaker = "クーシェン"
original = "「うん！\u3000ボク、２年生だよ！」"
translation = "「응! 나 2학년이야!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『だよね！\u3000アタシと同い年――』"
translation = "『그치! 나랑 동갑──』"

[[dialogue]]
speaker = "クーシェン"
original = "「ん？\u3000ボク、紅明とは学年違うよ？」"
translation = "「응? 나 코우메이랑 학년 다른데?」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『え？』"
translation = "『에?』"

[[dialogue]]
speaker = "クーシェン"
original = "「ボクは紅明よりも年下だから――」"
translation = "「나는 코우메이보다 나이가 어리니까──」"

[[dialogue]]
speaker = "クーシェン"
original = "「<b>附属校</b>の２年生になるんだよ？」"
translation = "「<b>부속교</b> 2학년이 되는 거야?」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『えっ……えええぇぇぇ～～～っ！？！？\u3000クーちん、アタシより年下だったん！？』"
translation = "『엣…… 에에에에에에엑!?!? 쿠셴, 나보다 연하였던 거야!?』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『む、昔と背丈が全く変わらないから、てっきり同い年のままかと……。おっと、いかんいかん！\u3000司会の途中だった』"
translation = "『예, 옛날이랑 키가 전혀 안 변해서 당연히 동갑인 줄 알았더니……. 오옷, 안 되지 안 돼! 사회 보는 중이었지』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『メンゴメンゴ☆\u3000そういうことらしいんで、流星学園附属校の子たちは、クーちんのことをどうかよろしくな～っ！』"
translation = "『멘고 멘고☆ 그렇다고 하니까 유성학원 부속교 아이들은 쿠셴을 잘 부탁한다구~!』"

[[dialogue]]
speaker = "サチ"
original = "「プリムラ、聞いた？\u3000クーシェンちゃん、附属校２年生だって！」"
translation = "「프리뮬라, 들었어? 쿠셴 짱, 부속교 2학년이래!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ほう……我と同じか。フフフ、ならば後で名乗りに行かねばな」"
translation = "「호오…… 우리와 같은가. 후후후, 그렇다면 나중에 통성명하러 가야겠구나.」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『さて、それじゃあいよいよ次は、クーちんの挑戦を受けて立つ――我らが新星学園星徒会長の紹介だ～～～っ！！！』"
translation = "『자, 그럼 드디어 다음은, 쿠셴의 도전을 받아들일── 우리 신성학원 성도회장의 소개다아아아아!!!』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王としての力、しっかり見せてやりなさい、クロト！」"
translation = "「마왕으로서의 힘, 확실히 보여주도록 해, 쿠로토!」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃ～ん！\u3000頑張ってーーー！！」"
translation = "「오빠아~! 힘내──!!!」"

[[dialogue]]
speaker = "unk"
original = "俺はアリーナの中央で、クーシェンと向き合う。"
translation = "나는 아레나 중앙에서, 쿠셴과 마주 본다."

[[dialogue]]
speaker = "クーシェン"
original = "「結構人気あるんだね～、魔王様♪」"
translation = "「제법 인기 있네~, 마왕님♪」"

[[dialogue]]
speaker = "unk"
original = "ありがたいことにね"
translation = "고맙게도 말이야"

[[dialogue]]
speaker = "クーシェン"
original = "「みんなが認める魔王がどれほど強いのか……ボク、俄然ウキウキしてきたよ♪」"
translation = "「모두가 인정하는 마왕이 얼마나 강한지…… 나, 부쩍 신이 나기 시작했어♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「でも、ボクも結構強いよ？」"
translation = "「하지만, 나도 제법 강하다구?」"

[[dialogue]]
speaker = "クーシェン"
original = "「油断してると――星徒会長の座、あっさり奪っちゃうから気をつけてね☆」"
translation = "「방심하고 있으면── 성도회장 자리, 홱 뺏어버릴 테니까 조심해☆」"

[[dialogue]]
speaker = "unk"
original = "そう言って、静かに構えるクーシェン。"
translation = "그렇게 말하며, 조용히 자세를 잡는 쿠셴."

[[dialogue]]
speaker = "unk"
original = "と同時に、周囲の空間を急に張り詰めるような感覚が、ひしひしと伝わって来る。決して、星力がわかりやすく大きくなったわけじゃない。"
translation = "동시에, 주위의 공간이 갑자기 팽팽해지는 듯한 감각이 절실히 전해져 온다. 결코 성력이 알기 쉽게 커진 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "むしろ逆だ。星力が小さく収束して研ぎ澄まされたような気配。だからこそ、わかった。"
translation = "오히려 반대다. 성력이 작게 수렴되어 날카롭게 갈린 듯한 기척. 그렇기에 알 수 있었다."

[[dialogue]]
speaker = "unk"
original = "（この子は、強い……！）"
translation = "(이 아이는, 강해……!)"

[[dialogue]]
speaker = "unk"
original = "彼女の言葉は嘘じゃない。気を抜けば、一瞬で敗北させられるだろう。――俺は拳を構える。"
translation = "그녀의 말은 거짓이 아니다. 정신을 놓으면 한순간에 패배하겠지. ──나는 주먹을 쥔다."

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『――よし。それじゃあ、行くぜ～？』"
translation = "『──좋아. 그럼, 간다구~?』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『会長ＶＳクーシェン……御前試合、レディ～――ゴー！！！』"
translation = "『회장 VS 쿠셴…… 어전 시합, 레디~── 고!!!』"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とクーシェンと御前試合が開始されるのだった――"
translation = "이렇게, 나와 쿠셴의 어전 시합이 시작되는 것이었다──"

