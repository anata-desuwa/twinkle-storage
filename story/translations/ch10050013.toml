[[dialogue]]
speaker = "unk"
original = "第３話,ソフィアとサーシャ,P"
translation = "제3화, 소피아와 사샤, P"

[[dialogue]]
speaker = "ソフィア"
original = "「うー……」"
translation = "「으으……」"

[[dialogue]]
speaker = "unk"
original = "不機嫌っぽい？"
translation = "기분이 안 좋아 보여?"

[[dialogue]]
speaker = "ソフィア"
original = "「聞いてくださいよ、会長さん！\u3000私の憤りがトゥーホットです！」"
translation = "「들어보세요, 회장님! 제 분노가 투 핫이에요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんと一緒にパトロールしていることを流星星徒会のみなさんに話したら──」"
translation = "「회장님과 함께 파트롤하고 있다는 걸 유성 성도회 여러분께 말씀드렸더니──」"

[[dialogue]]
speaker = "ユウリ"
original = "「へぇ、ソフィアって新星の会長さんと仲いいんだな」"
translation = "「헤에, 소피아는 신성의 회장님이랑 사이가 좋구나.」"

[[dialogue]]
speaker = "ルリエル"
original = "「仲良きことはいいことだと思いますっ」"
translation = "「사이좋은 건 좋은 일이라고 생각합니다!」"

[[dialogue]]
speaker = "セーラ"
original = "「ほぉほぉ、これはこれは……ソフィアちゃん、頑張ってね～♪」"
translation = "「호오호오, 이것 참…… 소피아짱, 힘내~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「むー……」"
translation = "「으음……」"

[[dialogue]]
speaker = "ソフィア"
original = "「──って、まるで私が遊んでるみたいに！\u3000私は真面目にパトロールしてるんですよ」"
translation = "「──라니, 마치 제가 놀고 있는 것처럼! 저는 진지하게 파트롤하고 있다고요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「みなさん能力が高いことは確かなんですが、なんであんなに奔放なんですか。星徒会役員は全生徒の規範となるべき存在なのに……」"
translation = "「여러분 능력이 높으신 건 확실합니다만, 왜 그렇게 분방하신 건가요. 성도회 임원은 전 학생의 규범이 되어야 할 존재인데……」"

[[dialogue]]
speaker = "ソフィア"
original = "「私が遊んでいないことを証明するためにも、今日はこの辺りをパトロールしましょう」"
translation = "「제가 놀고 있지 않다는 걸 증명하기 위해서라도, 오늘은 이 근처를 파트롤하죠.」"

[[dialogue]]
speaker = "ソフィア"
original = "「まったくもうっ、フィオナ会長が選んだのに、どうしてああなるんでしょうか」"
translation = "「정말이지 참, 피오나 회장님이 뽑으셨는데 왜 저렇게 되는 걸까요.」"

[[dialogue]]
speaker = "unk"
original = "近くに新しいパンケーキのお店があるらしい"
translation = "근처에 새로운 팬케이크 가게가 생겼대"

[[dialogue]]
speaker = "ソフィア"
original = "「そうなんですか？\u3000じゃあパトロールが終わったら──」"
translation = "「정말인가요? 그럼 파트롤이 끝나면──」"

[[dialogue]]
speaker = "ソフィア"
original = "「って、そうじゃありません！\u3000言ったじゃないですか、遊びじゃないって」"
translation = "「아니, 그게 아니에요! 말했잖아요, 노는 게 아니라고.」"

[[dialogue]]
speaker = "ソフィア"
original = "「露骨にがっかりしないでください。パンケーキ食べに来たんじゃないんですから」"
translation = "「노골적으로 실망하지 마세요. 팬케이크 먹으러 온 게 아니니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「その……私のために調べてきてくれたことはありがとうございます。会長さんのそういうところ、嫌いではありません。ですがマイペース過ぎます」"
translation = "「그…… 저를 위해 알아봐 주신 건 감사합니다. 회장님의 그런 점, 싫어하지 않아요. 하지만 너무 마이페이스예요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「では行きましょう。今こうしている間にもモンスターが出現しているかもしれません」"
translation = "「그럼 가죠. 지금 이러는 동안에도 몬스터가 출현하고 있을지도 모릅니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「こっちもモンスター、いませんね。……無言で巡回するのもなんですし、少しお話しましょうか」"
translation = "「이쪽도 몬스터는 없네요. ……무언으로 순회하는 것도 좀 그러니, 조금 이야기라도 할까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「そちらの星徒会はどんなご様子ですか？\u3000やはり星徒会らしく落ち着いていて、理路整然としていて……なわけないですよね。姉さんや前会長がいるんですし」"
translation = "「그쪽 성도회는 어떤 모습인가요? 역시 성도회답게 차분하고, 이리정연하고…… 일 리가 없겠죠. 언니나 전 회장님이 계시니까.」"

[[dialogue]]
speaker = "ソフィア"
original = "「こちらはよくゲーム大会になってます。この前はＵＭＯをしていましたし」"
translation = "「이쪽은 자주 게임 대회가 열리곤 해요. 요전에는 UMO를 하고 있었고요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さん、部活は？\u3000……あ、新星学園に入ったばかりで星徒会長になったんですし、それどころじゃなかったですね」"
translation = "「회장님, 부활동은요? ……아, 신성 학원에 갓 입학해서 성도회장이 되셨으니 그럴 겨를이 없었겠네요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「私はフィギュアスケート部に所属しています」"
translation = "「저는 피겨 스케이팅부에 소속되어 있어요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「だから、パトロールができるのはフィギュアスケート部や星徒会の活動がない時だけです」"
translation = "「그래서 파트롤을 할 수 있는 건 피겨 스케이팅부나 성도회 활동이 없을 때뿐입니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「近々大会があって、それに向けて練習しているんです。もちろん星徒会も大事ですが、フィギュアを諦めるつもりはありません」"
translation = "「조만간 대회가 있어서, 그걸 향해 연습하고 있어요. 물론 성도회도 중요하지만, 피겨를 포기할 생각은 없습니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「寒くないのって言いたそうな顔ですね。……なぜか滑っている時だけは寒さが気にならないんです。自分でもなぜかはわからないですが」"
translation = "「안 춥냐고 묻고 싶은 얼굴이네요. ……어째서인지 미끄러지고 있을 때만큼은 추위가 신경 쓰이지 않아요. 저도 왜 그런지는 모르겠지만요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんのことは嫌い？"
translation = "사샤 씨가 싫어?"

[[dialogue]]
speaker = "ソフィア"
original = "「嫌いなわけではありません。でなければ、姉に会うかもしれないのに人間界に来て星騎士になったりなんかしません」"
translation = "「싫어하는 건 아니에요. 그렇지 않다면, 언니를 만날지도 모르는데 인간계에 와서 성기사가 되거나 하지는 않았을 테니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ただなんというか……合わないんです、性格的に。私はこんな感じで、姉はぽわぽわしてますから」"
translation = "「다만 뭐랄까…… 안 맞아요, 성격적으로. 저는 이런 느낌이고, 언니는 포와포와하니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「いつまでも猫かわいがりしてくるのはやめてほしいです。もう子どもじゃないんですから」"
translation = "「언제까지나 고양이 예뻐하듯 하는 건 그만뒀으면 좋겠어요. 이제 어린애가 아니니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「流星の星徒会のみなさんだってそうです。嫌いではありませんよ、もっと真面目に仕事してほしいと思っていますが」"
translation = "「유성의 성도회 여러분도 그래요. 싫어하는 건 아니에요, 좀 더 진지하게 일해줬으면 좋겠다고 생각할 뿐이지.」"

[[dialogue]]
speaker = "ソフィア"
original = "「一回りしましたし、今日はこのくらいにしておきましょうか。結局何もありませんでしたが、何もないのはそれはそれでいいことです」"
translation = "「한 바퀴 돌았으니 오늘은 이 정도로 해둘까요. 결국 아무 일도 없었지만, 아무 일도 없는 건 그것대로 좋은 일이죠.」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ……ホットのミルクティー、ありがとうございます」"
translation = "「아…… 핫 밀크티, 감사합니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふわ～……あったか～い……」"
translation = "「후아아~…… 따뜻해~……」"

[[dialogue]]
speaker = "unk"
original = "（すごく幸せそう）"
translation = "(굉장히 행복해 보여)"

[[dialogue]]
speaker = "ソフィア"
original = "「ハッ！\u3000今のは何でもありません。気の緩みとかではありませんからねっ」"
translation = "「핫! 방금 건 아무것도 아니에요. 마음이 해이해진 거 아니니까요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「うー……なんですか、その微笑ましいと言わんばかりの顔は……」"
translation = "「으음…… 뭔가요, 그 흐뭇하다는 듯한 얼굴은……」"

[[dialogue]]
speaker = "ソフィア"
original = "「……パンケーキ？\u3000そういえば、パトロールの前に言っていましたね。会長さんが行きたいなら、一緒に行くのはやぶさかではありませんが……」"
translation = "「……팬케이크? 그러고 보니 파트롤 전에 말씀하셨죠. 회장님이 가고 싶으시다면, 함께 가는 건 어렵지 않습니다만…….」"

[[dialogue]]
speaker = "unk"
original = "ソフィアと一緒に行きたい"
translation = "소피아랑 같이 가고 싶어"

[[dialogue]]
speaker = "ソフィア"
original = "「……わかりました。そこまで言うなら行きましょう」"
translation = "「……알겠습니다. 그렇게까지 말씀하신다면 가죠.」"

[[dialogue]]
speaker = "ソフィア"
original = "「でも一緒にお店に行ったことは他の人には秘密です。遊びに来たわけではありませんからね」"
translation = "「하지만 같이 가게에 간 건 다른 사람한테는 비밀이에요. 놀러 온 게 아니니까요.」"

