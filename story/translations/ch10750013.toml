[[dialogue]]
speaker = "unk"
original = "第３話,デート相談はおなか部まで！,P"
translation = "제3화, 데이트 상담은 오나카부까지!, P"

[[dialogue]]
speaker = "シフォン"
original = "「うーん、困りましたね……。どうしたものでしょうか……」"
translation = "「음, 곤란하네요……. 어떻게 하면 좋을까요……」"

[[dialogue]]
speaker = "シフォン"
original = "「あ、会長さん。会議で使い終わった資料、持ってきてくれたんですか？\u3000いつもありがとうございます、そこに置いておいてください」"
translation = "「아, 회장님. 회의에서 다 쓴 자료, 가져다주신 건가요? 항상 감사합니다, 거기 놔주세요.」"

[[dialogue]]
speaker = "シフォン"
original = "「紙代もタダじゃありませんからね。裏紙にして使わせていただきます。パルミエが部費を使い込むせいでカツカツなものですから」"
translation = "「종잇값도 공짜가 아니니까요. 이면지로 사용하겠습니다. 파르미에가 부비를 탕진하는 바람에 쪼들리거든요.」"

[[dialogue]]
speaker = "シフォン"
original = "「ふふ。でも紙はいいですよね。メモに使えるのはもちろん、冬場は暖を取るのにも使えますし、いざという時は服の下に入れて寒さをしのぐのに……」"
translation = "「후후. 하지만 종이는 참 좋죠. 메모로 쓸 수 있는 건 물론이고, 겨울철엔 땔감으로 쓸 수도 있고, 급할 때는 옷 속에 넣어서 추위를 피하는 데에……」"

[[dialogue]]
speaker = "シフォン"
original = "「コホン、いささか貧乏くさい話をしてしまいました。気にしないでください」"
translation = "「코흠, 다소 구질구질한 이야기를 해버렸네요. 신경 쓰지 마세요.」"

[[dialogue]]
speaker = "シフォン"
original = "「それよりちょっとお時間ありますか？\u3000難しいお悩み相談が届いたものでして、アドバイスをもらいたくて」"
translation = "「그보다 시간 좀 있으신가요? 어려운 고민 상담이 들어와서 조언을 얻고 싶거든요.」"

[[dialogue]]
speaker = "シフォン"
original = "「『意中の彼をころっと堕とせるデート計画を立てて欲しい』って相談なんですけど。私、デートなんかしたことなくてピンとこなくて」"
translation = "「『마음에 둔 그를 단숨에 사로잡을 데이트 계획을 짜달라』는 상담인데요. 저는 데이트 같은 건 해본 적이 없어서 감이 잘 안 와서요.」"

[[dialogue]]
speaker = "シフォン"
original = "「あ、そうだ。ちょっと付き合ってくださいよ。あれこれ悩んでも仕方ないですし、実際に私とデートしてくださいっ！」"
translation = "「아, 맞다. 저랑 좀 같이 가주세요. 이것저것 고민해 봤자 소용없으니, 실제로 저랑 데이트해 주세요!」"

[[dialogue]]
speaker = "シフォン"
original = "「こういうのは実践してみた方が早いですから！\u3000要するに会長さんをころっと堕としてしまえばいいんですよねっ？」"
translation = "「이런 건 실천해 보는 게 빠르니까요! 요컨대 회장님을 단숨에 사로잡아 버리면 되는 거잖아요?」"

[[dialogue]]
speaker = "シフォン"
original = "「そうと決まれば早速、街へ出かけましょう！\u3000ほら早く早く、急いでください！」"
translation = "「그렇게 정했으면 당장 거리로 나가요! 자, 빨리빨리, 서두르세요!」"

[[dialogue]]
speaker = "シフォン"
original = "「とは言ったものの──」"
translation = "「라고 말은 했지만──」"

[[dialogue]]
speaker = "シフォン"
original = "「～～っっ。じ、実は私、とんでもなく恥ずかしいお誘いをしちゃったのでは……！？\u3000会長さんをデートに誘った挙げ句、ころっと堕とすとかなんとか……！」"
translation = "「~~윽. 저, 사실 제가 엄청나게 부끄러운 제안을 해버린 거 아닐까요……!? 회장님을 데이트에 꼬드긴 끝에, 단숨에 사로잡는다느니 뭐라느니……!」"

[[dialogue]]
speaker = "unk"
original = "相変わらず考え無しだな……"
translation = "여전히 생각 없구나……"

[[dialogue]]
speaker = "シフォン"
original = "「う、うるさいですね……！\u3000こういう性分なんですから仕方ないでしょう……！\u3000ちまちま考えるのは嫌いなんですっ……！」"
translation = "「시, 시끄럽네요……! 이런 성미인걸 어떡해요……! 꼬치꼬치 생각하는 건 질색이라구요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「とにかく、ここまで来たからには付き合ってもらいますからねっ……！\u3000会長さんをころっと私に惚れさせてやりますとも……！」"
translation = "「어쨌든 여기까지 온 이상 끝까지 함께해주셔야 해요……! 회장님이 단숨에 저한테 반하게 만들고 말 테니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「実は秘策もありますしね……。以前パルミエから必ず異性を堕とせるという魔法の言葉を教えてもらいましたから♪」"
translation = "「사실 비책도 있거든요……. 예전에 파르미에에게 반드시 이성을 사로잡을 수 있다는 마법의 말을 전수받았거든요♪」"

[[dialogue]]
speaker = "シフォン"
original = "「もしも私に好きな人ができた時のために、と教えてもらった言葉なのですが。ふふ、特別に会長さんへ使ってあげますよ」"
translation = "「혹시나 저에게 좋아하는 사람이 생겼을 때를 위해 배운 말인데요. 후후, 특별히 회장님께 써드릴게요.」"

[[dialogue]]
speaker = "シフォン"
original = "「覚悟はいいですか？\u3000キュン死しないように注意してくださいね？\u3000さぁ行きますよ──！」"
translation = "「각오는 되셨나요? 심쿵사하지 않도록 주의해 주세요? 자, 갑니다──!」"

[[dialogue]]
speaker = "シフォン"
original = "「必・殺<emoji=heart04>\u3000好き好きビィ～ム<emoji=heart04>\u3000私のことが好きにな～る、好きになる～<emoji=heart04>」"
translation = "「필·살<emoji=heart04> 좋아좋아 빔~<emoji=heart04> 내가 좋아진다~ 좋아진다~<emoji=heart04>」"

[[dialogue]]
speaker = "シフォン"
original = "「って──どうしてそんな冷めた顔をしているんですか！？\u3000パルミエが言うには、これで堕ちない男性はいないって話でしたのに……！？」"
translation = "「잠깐── 왜 그렇게 싸늘한 눈으로 보시는 거예요!? 파르미에 말로는 이걸로 안 넘어오는 남자는 없다고 했단 말이에요……!?」"

[[dialogue]]
speaker = "シフォン"
original = "「ハッ！\u3000まさかまた嘘を吹き込まれて……！？\u3000くぅぅ、あのろくでなし女はぁ……！\u3000毎度毎度、私をおもちゃにしてぇ……！」"
translation = "「핫! 설마 또 거짓말을 주입당한 건가……!? 크으윽, 그 구제 불능 여자가……! 매번 매번 나를 장난감 취급하고……!」"

[[dialogue]]
speaker = "シフォン"
original = "「い、今のは忘れてください。パルミエを信じた私がバカでした。危うくさっきの言葉を相談の返事に書くところでしたよ……」"
translation = "「방, 방금 건 잊어주세요. 파르미에를 믿은 제가 바보였어요. 하마터면 방금 그 말을 상담 답변에 적을 뻔했네요……」"

[[dialogue]]
speaker = "シフォン"
original = "「気を取り直して行きましょう。そもそもデートの基本は言葉ではなく行動です！\u3000要するに、会長さんを楽しませてあげればいいわけでしょう？」"
translation = "「기운 차리고 가보죠. 애초에 데이트의 기본은 말이 아니라 행동이에요! 요컨대, 회장님을 즐겁게 해드리면 되는 거잖아요?」"

[[dialogue]]
speaker = "シフォン"
original = "「私についてきてください、会長さん！\u3000一緒に走りましょう！」"
translation = "「절 따라오세요, 회장님! 같이 달려요!」"

[[dialogue]]
speaker = "シフォン"
original = "「えっほ、えっほ、えっほ、えっほ……！」"
translation = "「영차, 영차, 영차, 영차……!」"

[[dialogue]]
speaker = "シフォン"
original = "「はぁっ、はぁっ、はぁっ、はぁっ……！」"
translation = "「하앗, 하앗, 하앗, 하앗……!」"

[[dialogue]]
speaker = "シフォン"
original = "「んはぁ、はふぁっ、会長さん、遅れてますよ……！\u3000まさかもうバテたんですか？\u3000まだ１時間も走ってませんよっ？」"
translation = "「응하아, 하파앗, 회장님, 늦잖아요……! 설마 벌써 지치신 거예요? 아직 한 시간도 안 달렸는데요?」"

[[dialogue]]
speaker = "シフォン"
original = "「へ？\u3000どこに向かってるのかって……どこにも向かってませんよ？\u3000これ自体がデートなんですから」"
translation = "「헤? 어디로 가는 거냐니…… 아무 데도 안 가는데요? 이거 자체가 데이트니까요.」"

[[dialogue]]
speaker = "シフォン"
original = "「一緒に汗を流すことで絆って深まるものじゃないですか？\u3000ランニングならお金も一切かかりませんし！」"
translation = "「같이 땀 흘리는 걸로 유대가 깊어지는 법 아니겠어요? 러닝이라면 돈도 일절 안 들고요!」"

[[dialogue]]
speaker = "unk"
original = "発想が体育会系過ぎる……！"
translation = "발상이 너무 체육계야……!"

[[dialogue]]
speaker = "シフォン"
original = "「むぅ、会長さんは文句ばかりですね。なら会長さんは一体どんなデートだったら嬉しいって言うんです？」"
translation = "「무으, 회장님은 불평뿐이네요. 그럼 회장님은 대체 어떤 데이트라면 기쁘다는 거예요?」"

[[dialogue]]
speaker = "シフォン"
original = "「女の子にどんなことされたら惚れちゃうんですか？\u3000人のデートプランにケチ付けるなら、もっといいデートプランがあるってことですよねっ？」"
translation = "「여자애가 어떻게 해주면 반해버리는 건데요? 남의 데이트 플랜에 트집을 잡는다면, 더 좋은 데이트 플랜이 있다는 뜻이겠죠?」"

[[dialogue]]
speaker = "シフォン"
original = "「ズバリこれをされたらころっと堕ちちゃうような理想のシチュエーションが会長さんにもあるんでしょうっ？\u3000それを教えてください！」"
translation = "「딱 이걸 당하면 단숨에 사로잡힐 것 같은 이상적인 상황이 회장님에게도 있을 거 아니에요! 그걸 알려주세요!」"

[[dialogue]]
speaker = "unk"
original = "そうだな。俺なら──……"
translation = "글쎄. 나라면──……"

[[dialogue]]
speaker = "シフォン"
original = "「あっ……！\u3000やっぱり言わなくていいですっ！\u3000言わないでください……！」"
translation = "「앗……! 역시 안 말해도 돼요! 말하지 마세요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「だ、だって、こんなのズルじゃないですか。言われたことをしたら会長さんがころっと堕ちちゃうわけですよね……？」"
translation = "「그, 그야 이건 반칙이잖아요. 들은 대로 하면 회장님이 단숨에 넘어가 버린다는 거잖아요……?」"

[[dialogue]]
speaker = "シフォン"
original = "「きっと会長さんを狙ってる皆さんも聞きたくて聞きたくて仕方のない情報のはずですし、なのにそれを卑怯な手で聞き出しているみたいで……」"
translation = "「분명 회장님을 노리는 다른 분들도 듣고 싶어 안달 난 정보일 텐데, 그걸 비겁한 수로 캐내는 것 같아서……」"

[[dialogue]]
speaker = "シフォン"
original = "「とにかくフェアじゃないです……！\u3000そもそもお悩み相談にかこつけてデートに連れ出してる時点でちょっとセコいんですから……！」"
translation = "「아무튼 페어하지 않아요……! 애초에 고민 상담을 핑계로 데이트에 끌어들인 시점에서 좀 치사하긴 하지만요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「って……なんですか？\u3000どうしてそんなに目を丸くしてるんです……？」"
translation = "「저기…… 왜요? 왜 그렇게 눈을 동그랗게 뜨고 계세요……?」"

[[dialogue]]
speaker = "unk"
original = "その口ぶりだと、まるでシフォンが俺を……"
translation = "그 말투는 마치 시퐁이 나를……"

[[dialogue]]
speaker = "シフォン"
original = "「へ……？\u3000～～っっ！？」"
translation = "「헤……? ~~윽!?」"

[[dialogue]]
speaker = "シフォン"
original = "「ち、違いますよっ、今のは言葉のアヤです……！\u3000別に私は会長さんなんてなんとも思ってません……！」"
translation = "「아, 아니에요! 방금 건 말실수예요……! 딱히 전 회장님 같은 건 아무렇지도 않으니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「ランニングに誘ったのも、自分の趣味を会長さんにも好きになってもらえたら……──とか、一切考えてませんから！」"
translation = "「러닝에 유혹한 것도, 제 취미를 회장님도 좋아해 줬으면── 하는 생각 같은 건 추호도 안 했으니까요!」"

[[dialogue]]
speaker = "シフォン"
original = "「な、何を顔赤くしてるんですか……！\u3000本当に誤解ですっ、違いますってば……！」"
translation = "「왜, 왜 얼굴을 붉히고 그러세요……! 정말 오해예요, 아니라니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「あったとしても、ちょっといいかなってくらいです……！\u3000会長さんは私の羽根を見ても気味悪がりませんし、ただで裏紙用の紙も恵んでくださいますし……」"
translation = "「있다고 해도, 조금 괜찮을까 싶은 정도라구요……! 회장님은 제 날개를 봐도 기분 나빠하지 않으시고, 이면지용 종이도 그냥 베풀어 주시고……」"

[[dialogue]]
speaker = "シフォン"
original = "「そもそも、成り行きとはいえこんな私とデートしてくれたりして……。まぁ私も会長さんじゃなかったらデートしてくださいなんて言えなかったでしょうけど……」"
translation = "「애초에, 어쩌다 보니 이렇지만 저 같은 애랑 데이트도 해주시고……. 뭐 저도 회장님이 아니었다면 데이트해 달라는 소리는 못 했겠지만요……」"

[[dialogue]]
speaker = "シフォン"
original = "「じゃなくて！\u3000ああもう私に口を開かせないでください！\u3000誤魔化したり、言い訳したりするの苦手なんですってば……！」"
translation = "「그게 아니라! 아아 정말 저한테 입을 열게 하지 마세요! 얼버무리거나 변명하는 거 서툴단 말이에요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「とにかく続きをしますよ！\u3000ですからデートの続きをですっ！\u3000私は会長さんをころっと堕として、お悩み相談の返事を書かなくちゃいけないんですから……！」"
translation = "「아무튼 계속할 거예요! 그러니까 데이트를 계속하겠다는 거예요! 전 회장님을 단숨에 사로잡아서, 고민 상담 답변을 써야만 하니까요……!」"

