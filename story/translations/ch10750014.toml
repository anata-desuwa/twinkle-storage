[[dialogue]]
speaker = "unk"
original = "第４話,手料理フォーユー,P"
translation = "제4화, 손수 만든 요리 포 유, P"

[[dialogue]]
speaker = "シフォン"
original = "「とんとんとん……と。このくらいのサイズに切ればいいんですよね……？」"
translation = "「톡 톡 톡……. 이 정도 크기로 썰면 되는 거죠……?」"

[[dialogue]]
speaker = "モナカ"
original = "「うんうん、そのくらいかな。あんまり大きく切りすぎると、具材に味が染みづらくなっちゃうから」"
translation = "「응응, 그 정도면 될 거야. 너무 크게 썰면 재료에 맛이 잘 안 배니까.」"

[[dialogue]]
speaker = "パルミエ"
original = "「ご飯まーだー？\u3000もうお腹ペッコペコよぉ～」"
translation = "「밥은 아직 멀었어~? 벌써 배가 꼬르륵거린다구우~」"

[[dialogue]]
speaker = "シフォン"
original = "「急かさないでください！\u3000というかパルミエのために作ってるわけじゃありませんよっ」"
translation = "「재촉하지 마세요! 그보다 파르미에를 위해 만드는 게 아니라구요.」"

[[dialogue]]
speaker = "パルミエ"
original = "「試食係よ、試食係♪\u3000可愛いシフォンが恋のために頑張ってるんだもの。少しでも応援してあげようと思って♪」"
translation = "「시식 담당이야, 시식 담당♪ 귀여운 시퐁이 사랑을 위해 노력하고 있잖아. 조금이라도 응원해 주려고 생각해서♪」"

[[dialogue]]
speaker = "シフォン"
original = "「べべべ、別に恋のために努力してるわけじゃないですっ！\u3000学生の間に料理スキルくらい身につけておこうと思っただけで……！」"
translation = "「드드드, 딱히 사랑을 위해 노력하는 거 아니거든요! 학생일 때 요리 스킬 정도는 익혀두려고 생각한 것뿐이지……!」"

[[dialogue]]
speaker = "パルミエ"
original = "「ん～……。出汁の塩味が強いわね。こんな不健康な料理、ダーリンに食べさせるつもり？\u3000不合格よ、一から作り直しなさい」"
translation = "「음~……. 육수 소금기가 강하네. 이런 불건강한 요리, 달링한테 먹일 셈이야? 불합격이야, 처음부터 다시 만드렴.」"

[[dialogue]]
speaker = "シフォン"
original = "「なんですかその姑ムーブ！？\u3000むしろ心が折れるんですが！？」"
translation = "「뭐예요 그 시어머니 무브는!? 오히려 의욕이 꺾이는데요!?」"

[[dialogue]]
speaker = "パルミエ"
original = "「あらあら。やっぱりダーリンのために作ってるんじゃな～い♪」"
translation = "「어라어라. 역시 달링을 위해 만드는 거 맞네~♪」"

[[dialogue]]
speaker = "シフォン"
original = "「ぐふっ……！？\u3000い、今のはそういう意味ではなくて……！」"
translation = "「우구……!? 지, 지금 건 그런 뜻이 아니라……!」"

[[dialogue]]
speaker = "モナカ"
original = "「えへへ、照れなくていいのに。モナカは素敵だと思うよ？\u3000好きな人のために苦手なことを克服しようとするなんて」"
translation = "「에헤헤, 부끄러워하지 않아도 되는데. 모나카는 멋지다고 생각해. 좋아하는 사람을 위해 서툰 걸 극복하려고 노력하다니.」"

[[dialogue]]
speaker = "パルミエ"
original = "「あの不器用で大雑把で口に入ればなんでもござれのシフォンがまさかの料理だものね～。どんな心境の変化があったのかしら？」"
translation = "「그 서투르고 덜렁대서 입에 들어가면 뭐든 장땡이라던 시퐁이 설마 요리를 하다니 말이야~. 어떤 심경의 변화가 있었을까?」"

[[dialogue]]
speaker = "シフォン"
original = "「で、ですからなんでもないですってば……！\u3000別にその、拾った雑誌のカップル特集を見て、彼氏に手料理をあ～んしてる彼女の姿に憧れたわけではありませんから……！」"
translation = "「그, 그러니까 아무것도 아니라니까요……! 딱히 그, 주운 잡지의 커플 특집을 보고, 남자친구에게 직접 만든 요리를 '아~앙' 해주는 여자의 모습에 동경한 건 아니니까요……!」"

[[dialogue]]
speaker = "モナカ"
original = "「あはは……憧れたんだね」"
translation = "「아하하…… 동경했구나.」"

[[dialogue]]
speaker = "パルミエ"
original = "「相変わらずわかりやすい子ね～」"
translation = "「여전이 알기 쉬운 아이네~」"

[[dialogue]]
speaker = "シフォン"
original = "「なんで納得してるんですか！？\u3000違うって言ってますのに！」"
translation = "「왜 납득하고 계신 거예요!? 아니라니까요!」"

[[dialogue]]
speaker = "パルミエ"
original = "「ほらほら私たちにツッコんでていいの～？\u3000お鍋の調子を見る方が大事じゃなーい？」"
translation = "「자자, 우리한테 태클이나 걸고 있어도 되겠어~? 냄비 상태를 보는 게 더 중요하지 않니~?」"

[[dialogue]]
speaker = "シフォン"
original = "「ハっ、そうでした……！\u3000い、一応お水を足しておきましょう……。塩辛いらしいですし……」"
translation = "「핫, 맞다……! 이, 일단 물을 좀 더 부어두죠……. 짜다고 하니까요……」"

[[dialogue]]
speaker = "モナカ"
original = "「ふふ、にぃ様にとびっきり美味しい手料理を食べさせてあげようね？\u3000モナカも精一杯協力するから」"
translation = "「후후, 오라버니에게 아주 맛있는 요리를 먹여드리자? 모나카도 온 힘을 다해 도와줄 테니까.」"

[[dialogue]]
speaker = "シフォン"
original = "「あ、ありがとうございます。まぁいつになるかはわかりませんけど……」"
translation = "「고, 고마워요. 뭐 언제쯤 될지는 모르겠지만……」"

[[dialogue]]
speaker = "パルミエ"
original = "「すぐよ、すぐ♪\u3000そろそろ来る頃じゃないかしら♪」"
translation = "「금방이야, 금방♪ 슬슬 올 때가 되지 않았을까♪」"

[[dialogue]]
speaker = "シフォン"
original = "「……へ？\u3000どういう意味です？」"
translation = "「……에? 무슨 뜻이에요?」"

[[dialogue]]
speaker = "unk"
original = "あ、いたいた"
translation = "아, 찾았다."

[[dialogue]]
speaker = "シフォン"
original = "「なっ……！？\u3000どどど、どうして会長さんがここに！？」"
translation = "「나앗……!? 어어어, 어째서 회장님이 여기에!?」"

[[dialogue]]
speaker = "パルミエ"
original = "「私が呼んだのよ～。シフォンがダーリンのために手料理を作ってるから食べに来てあげてーって」"
translation = "「내가 불렀어~. 시퐁이 달링을 위해 요리를 만들고 있으니까 먹으러 오라고 말이야~」"

[[dialogue]]
speaker = "シフォン"
original = "「聞いてないんですけど！？」"
translation = "「들은 적 없는데요!?」"

[[dialogue]]
speaker = "パルミエ"
original = "「私からのサプライズプレゼントだもの～♪\u3000ほーら、あーんでもなんでもしてきてあげたら？」"
translation = "「나의 서프라이즈 선물인걸~♪ 자아, 아~앙이든 뭐든 해주고 오지 그러니?」"

[[dialogue]]
speaker = "シフォン"
original = "「し、しませんよっ！\u3000まだとても人に振る舞えるようなレベルじゃありませんし……！」"
translation = "「아, 안 할 거예요! 아직 도저히 남에게 대접할 수 있는 수준이 아니니까요……!」"

[[dialogue]]
speaker = "パルミエ"
original = "「んもう。大事なところで日和っちゃうのはシフォンの悪いくせよ？\u3000ここ１ヶ月頑張ってきたじゃない。大丈夫、自信を持ちなさい？」"
translation = "「정말이지. 중요한 순간에 쫄아버리는 건 시퐁의 나쁜 버릇이야. 이번 한 달 동안 열심히 해왔잖아. 괜찮아, 자신감을 가지렴?」"

[[dialogue]]
speaker = "シフォン"
original = "「パ、パルミエ……。あなた……」"
translation = "「파, 파르미에……. 너……」"

[[dialogue]]
speaker = "パルミエ"
original = "「それにそろそろモナカの手料理が恋しいのよ～。さっさとやることやってもらって、幸せなおなか部の食卓を取り戻したいわ～」"
translation = "「게다가 슬슬 모나카의 요리가 그립거든~. 얼른 할 일 해버리고, 행복한 오나카부의 식탁을 되찾고 싶단 말이야~」"

[[dialogue]]
speaker = "シフォン"
original = "「そっちが本音ですか！？\u3000というか遠回しに私の料理をディスってますよね！？」"
translation = "「그쪽이 본심인가요!? 그보다 돌려서 제 요리를 까고 있죠!?」"

[[dialogue]]
speaker = "モナカ"
original = "「だ、大丈夫だよ、シフォンちゃん！\u3000最初の頃より上達してるから！\u3000お野菜の皮も剥けるようにもなったし、お塩とお砂糖の違いもわかるようになったし……！\u3000それに──」"
translation = "「괘, 괜찮아, 시퐁 짱! 처음보다 훨씬 실력이 늘었으니까! 채소 껍질도 깎을 수 있게 됐고, 소금이랑 설탕의 차이도 알게 됐고……! 게다가──」"

[[dialogue]]
speaker = "シフォン"
original = "「それ以上は許してください、モナカ！\u3000そのエピソードトークはむしろ私への親愛度を下げちゃいます……！」"
translation = "「그 이상은 용서해 주세요, 모나카! 그 에피소드 토크는 오히려 저에 대한 친밀도를 떨어뜨릴 뿐이에요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「というか会長さんも会長さんですよっ。何をパルミエに言われて、ほいほいやってきてるんですかっ」"
translation = "「그보다 회장님도 회장님이에요. 파르미에가 뭐라고 했다고 홀랑 여기까지 오신 건가요?」"

[[dialogue]]
speaker = "シフォン"
original = "「パルミエに弱みでも握られてるんですか？\u3000罰ゲーム感覚で食べに来たんですか？\u3000むしろそっちの方が気が楽ですが……！」"
translation = "「파르미에에게 약점이라도 잡히신 건가요? 벌칙 게임 같은 느낌으로 먹으러 오신 거예요? 오히려 그편이 마음은 편하겠지만……!」"

[[dialogue]]
speaker = "unk"
original = "俺のために努力してくれたって聞いて嬉しくて"
translation = "나를 위해 노력해 줬다고 들어서 기쁜 마음에 와버렸어."

[[dialogue]]
speaker = "シフォン"
original = "「えっ……。そ、そんなこと言われたらすごく嬉し──……じゃなくて！\u3000食べられるような出来じゃないですから……！」"
translation = "「엣……. 그, 그런 말을 들으면 너무 기뻐──……가 아니라! 먹을 만한 상태가 아니니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「ですが、その……。どうしても、その……。私の手料理を食べてみたいというのなら、食べさせてあげなくもないですが……」"
translation = "「하지만, 그……. 아무래도, 그……. 제 요리를 먹어보고 싶다고 하신다면, 못 먹여줄 것도 없지만요……」"

[[dialogue]]
speaker = "unk"
original = "どうしても食べてみたいな"
translation = "꼭 먹어보고 싶어."

[[dialogue]]
speaker = "シフォン"
original = "「え、えへへ……。そこまで言うなら仕方ないですね……。不味くても文句は言わないでくださいよ……？」"
translation = "「에, 에헤헤……. 그렇게까지 말씀하신다면 어쩔 수 없네요……. 맛없어도 불평하지 마세요……?」"

[[dialogue]]
speaker = "パルミエ"
original = "「……本当にシフォンはチョロいわね。変な男に騙されないか不安になっちゃうわ」"
translation = "「……정말 시퐁은 띨띨하다니까. 이상한 남자한테 속지 않을까 걱정될 정도야.」"

[[dialogue]]
speaker = "モナカ"
original = "「う、うん。相手がにぃ様で本当に良かったかも……」"
translation = "「으, 응. 상대가 오라버니라서 정말 다행일지도……」"

[[dialogue]]
speaker = "シフォン"
original = "「そこの２人うるさいですよ！\u3000いいから、あっち行っててくださいっ！」"
translation = "「거기 두 사람 시끄러워요! 됐으니까, 저쪽 가 계세요!」"

[[dialogue]]
speaker = "シフォン"
original = "「では、その……。口を開けていただけますか……？\u3000あ～んしてあげますから……」"
translation = "「그럼, 그……. 입을 벌려주시겠어요……? 아~앙 해드릴 테니까……」"

[[dialogue]]
speaker = "シフォン"
original = "「い、いいじゃないですか。恥ずかしがらないでください……！\u3000私だって、その、顔から火が出ちゃいそうなほど恥ずかしいんです……！」"
translation = "「조, 좋잖아요. 부끄러워하지 마세요……! 저도, 그, 얼굴에서 불이 날 정도로 부끄럽단 말이에요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「ほら、あ～ん……！\u3000あ～んっ……！」"
translation = "「자, 아~앙……! 아~앙……!」"

[[dialogue]]
speaker = "シフォン"
original = "「ど……どうですか？\u3000美味しいですかね……？」"
translation = "「어…… 어떤가요? 맛있나요……?」"

[[dialogue]]
speaker = "unk"
original = "お……美味しいよ？"
translation = "마…… 맛있어."

[[dialogue]]
speaker = "シフォン"
original = "「そこはどもらず言い切ってくださいよぉ～！？」"
translation = "「거기선 더듬지 말고 확실히 말해주세요!!」"

