[[dialogue]]
speaker = "ウズメイア"
original = "「セナリィさん、追い出されちゃったね」"
translation = "「세나리 씨, 쫓겨나 버렸네.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「悪いことをしていたんだからしょうがないゆ！\u3000名誉会長としても見過ごせないゆ！」"
translation = "「나쁜 짓을 했으니까 어쩔 수 없다유! 명예 회장으로서도 묵과할 수 없다유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「名誉会長？」"
translation = "「명예 회장?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ジャクリーヌちゃんはキャナンシーさんに見込まれて、ハロウィン実行委員会の名誉会長になったんです……」"
translation = "「자클린 짱은 캐넌시 씨의 눈에 들어서 할로윈 실행위원회의 명예 회장이 됐어요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ～、じゃセナリィさん、名誉会長の前で全部自白しちゃったんだ～。そりゃドンマイだし～」"
translation = "「아~ 그럼 세나리 씨는 명예 회장 앞에서 전부 자백해 버린 거네~. 그건 좀 안됐네~」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「さあさあ、気を取り直して遊ぶゆ！\u3000２人は気になる所はないのかゆ？」"
translation = "「자 자, 기분 전환하고 노는유! 두 사람은 가보고 싶은 곳 없느냐유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「私は大丈夫ですよ。それよりジャクリーヌさんに楽しんでもらわないと」"
translation = "「전 괜찮아요. 그보다 자클린 씨가 즐거워야죠.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そだね、ゆゆ姫ちゃんのやりたい事をやろう」"
translation = "「그렇지, 유유히메짱이 하고 싶은 걸 하자.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ～、わかったゆ！\u3000それじゃあっちにいってみるゆ！」"
translation = "「유~, 알겠다유! 그럼 저쪽으로 가보는 유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「オッケー、レッツゴー♪」"
translation = "「오케이, 렛츠 고♪」"

[[dialogue]]
speaker = "unk"
original = "──こうして、ジャクリーヌの気の向くままにハロウィンパーティーの会場を駆け回った。"
translation = "──그렇게 자클린이 내키는 대로 할로윈 파티 회장을 누비고 다녔다."

[[dialogue]]
speaker = "unk"
original = "カフェテリアに出展されたブースを一通り巡り終える頃には、ジャクリーヌは両手で抱えきれないほどのお菓子を手に入れていた。"
translation = "카페테리아에 출점된 부스를 한 바퀴 다 돌 때쯤, 자클린은 양손으로 다 안을 수 없을 만큼의 과자를 얻었다."

[[dialogue]]
speaker = "ソフィア"
original = "「それにしてもさすがジャクリーヌさんですね」"
translation = "「그나저나 역시 자클린 씨네요.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ？\u3000何がだゆ？」"
translation = "「유? 뭐가 말이냐유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「普通に歩いているだけでみんなから声をかけられていましたし、まさにハロウィンの主役って感じでした」"
translation = "「그냥 걷고만 있어도 다들 말을 걸어왔고, 그야말로 할로윈의 주인공이라는 느낌이었어요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そだね～。ゆゆ姫ちゃんに渡したくて、それ用のお菓子を用意してたって子もいたし、イタズラされて喜んでる子もいたし」"
translation = "「맞아~. 유유히메짱에게 주고 싶어서 전용 과자를 준비해 둔 애도 있었고, 장난당하고 기뻐하는 애도 있었고.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ちょっと不思議な感じだゆ……でも、そのおかげで余はとっても嬉しい気持ちになれたゆ」"
translation = "「조금 신기한 기분이다유…… 하지만 그 덕분에 여는 무척 기쁜 기분이 되었다유.」"

[[dialogue]]
speaker = "ソフィア"
original = "「良かったです。私たちも頑張った甲斐がありました」"
translation = "「다행이네요. 저희도 노력한 보람이 있었어요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「って一緒について回って遊んでただけだけどね」"
translation = "「뭐 같이 붙어 다니며 논 것뿐이지만 말이야.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ！\u3000お菓子もいっぱい食べたし、楽しいこともいっぱいしたゆ！\u3000そろそろ２人の戦闘服を元に戻すゆ！」"
translation = "「유! 과자도 잔뜩 먹었고 즐거운 일도 잔뜩 했다유! 슬슬 두 사람의 전투복을 원래대로 돌려주겠다유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あれ、もういいんだ？」"
translation = "「어라, 벌써 됐어?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余は十分に楽しんだゆ！\u3000さっさと元に戻してハロウィンの続きを楽しむゆ！」"
translation = "「여는 충분히 즐겼다유! 얼른 원래대로 돌리고 할로윈을 더 즐기는 유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね。一旦問題を解決して、後はのびのび楽しむことにしましょう。ヒトリさん、お願いしてもいいですか？」"
translation = "「그렇네요. 일단 문제를 해결하고 나서 마음 편히 즐기기로 하죠. 히토리 씨, 부탁해도 될까요?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はい、いつでも大丈夫です……っ」"
translation = "「네, 네, 언제든 괜찮아요……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「よーし、それじゃハロウィンパワーをぱーっと解放しちゃって♪」"
translation = "「좋아, 그럼 할로윈 파워를 팍팍 해방해 줘♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「任せるゆ！\u3000それじゃ行くゆ～！」"
translation = "「맡기라유! 그럼 간다유~!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ？」"
translation = "「유?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「戻ってないみたいだし？」"
translation = "「안 돌아온 것 같은데?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「おかしいゆ？\u3000余はちゃんと戻れって念じたゆ？」"
translation = "「이상하다유? 여는 분명 돌아가라고 빌었다유?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「もう一度やってみてください、お願いします……」"
translation = "「한 번 더 해보세요, 부탁드려요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ～～～～～っ！！」"
translation = "「유~~~~~~~~!!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆー！？\u3000も、戻らないゆ～！」"
translation = "「유!? 아, 안 돌아온다유!」"

[[dialogue]]
speaker = "unk"
original = "本当に困ってるみたいだね？"
translation = "정말 당황한 모양이네?"

[[dialogue]]
speaker = "unk"
original = "嘘じゃないみたいだ"
translation = "거짓말은 아닌 것 같아."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ヒトリと約束したゆ！\u3000悪いイタズラはもうしないゆ！」"
translation = "「히토리랑 약속했다유! 나쁜 장난은 이제 안 한다유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「でも、２人が元に戻らないのはやっぱり余のせいなのかゆ？」"
translation = "「하지만 두 사람이 원래대로 돌아가지 않는 건 역시 여의 탓인 거냐유?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ハロウィンパワーがほとんど減っていません……つまりジャクリーヌちゃんの『願い』が叶えられていないということになります」"
translation = "「할로윈 파워가 거의 줄어들지 않았어요…… 즉 자클린 짱의 『소원』이 이루어지지 않았다는 뜻이 돼요.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆゆっ！？\u3000そんなことないゆ！\u3000余はとても楽しんでるゆ！」"
translation = "「유유유!? 그럴 리 없다유! 여는 무척 즐겁다유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「どういうことなんでしょうか？」"
translation = "「어떻게 된 일일까요?」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー、ゆー！」"
translation = "「유, 유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんが言うには、ジャクリーヌちゃんはちゃんとハロウィンを楽しんでるみたいです」"
translation = "「유짱이 말하기를, 자클린 짱은 제대로 할로윈을 즐기고 있는 것 같아요.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でも、ジャクリーヌちゃんは……みんなに楽しませてもらうよりも、みんなと一緒に楽しみたいと思ってるみたいで……」"
translation = "「하지만, 자클린 짱은…… 남들이 즐겁게 해주는 것보다, 모두와 함께 즐기고 싶다고 생각하는 것 같아서……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「感動ですね、ゆーちゃん……ジャクリーヌちゃんがみんなと一緒にてぇてぇしたいなんて……」"
translation = "「감동적이네요, 유짱…… 자클린 짱이 모두와 함께 테에테에하고 싶어 하다니……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー♪」"
translation = "「떼-떼-♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「わかったゆ！\u3000それじゃみんなと一緒に楽しむにはどうしたらいいか教えるゆ！」"
translation = "「알았다유! 그렇다면 모두와 함께 즐기려면 어떻게 해야 하는지 가르쳐달라유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ん～、そんなの教えるような事じゃないんだけど」"
translation = "「으음~ 그런 건 가르쳐주고 자시고 할 것도 없는데 말야.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そうなのかゆ？」"
translation = "「그런 거냐유?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「難しく考えなくてもいいし！\u3000そゆことなら、当初の予定通りでいいでしょ！」"
translation = "「어렵게 생각하지 않아도 된다구! 그렇게 된 거라면, 당초 예정대로 하면 되잖아!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「つまり、あたしたちと一緒にハロウィンを楽しむってね♪」"
translation = "「즉, 우리랑 같이 할로윈을 즐기는 거지♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆー……」"
translation = "「유-……」"

[[dialogue]]
speaker = "ソフィア"
original = "「仕方ありませんね、ジャクリーヌさんは。それでは私たちで教えてあげましょう！」"
translation = "「어쩔 수 없네요, 자클린 씨는. 그러면 저희가 가르쳐 드리지요!」"

