[[dialogue]]
speaker = "unk"
original = "第１話,あたしの好みを知ってるだろ？,P"
translation = "제1화, 내 취향을 알고 있겠지?, P"

[[dialogue]]
speaker = "unk"
original = "流星寮クリスマスパーティー実行委員のメンバーに人工戦闘服が渡された。"
translation = "유성 기숙사 크리스마스 파티 실행위원 멤버들에게 인공 전투복이 지급되었다."

[[dialogue]]
speaker = "unk"
original = "アポロの戦闘服は星見家の面々に大好評で、代わる代わる抱っこされていた。"
translation = "아폴로의 전투복은 호시미 가문 사람들에게 큰 호평을 받아, 번갈아 가며 안아주기 바빴다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「はぁっ、はぁっ、ひどい目に遭ったぞ」"
translation = "「하아, 하아, 끔찍한 꼴을 당했다구.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「大丈夫か？\u3000アポロのことは私が守るから、安心してくれ」"
translation = "「괜찮나? 아폴로는 내가 지킬 테니 안심하게.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「星見家の人たちがあんな風になるとは思わなかったよ。すさまじいアポロちゃんの争奪戦だね」"
translation = "「호시미 가문 사람들이 저렇게 변할 줄은 몰랐어. 엄청난 아폴로짱 쟁탈전이네.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うう、あたしは可愛いよりかっこいい方がよかったのに……」"
translation = "「으으, 난 귀여운 것보다 멋있는 쪽이 좋았는데……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「気持ちはわかるぞ！\u3000私も同感だ！」"
translation = "「그 마음 이해한다! 나도 동감이야!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「いきなりバズーカ撃つなんて、アニュラスもなんだかんだ言って気に入ってるんじゃない？」"
translation = "「갑자기 바주카를 쏘다니, 아뉴라스도 이래저래 마음에 든 거 아니야?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「実戦用ではないのが残念だが、武器としてはかっこいいからな。剣と違って気軽に発射出来るのもいい」"
translation = "「실전용이 아닌 게 아쉽다만, 무기로서는 멋지니까 말이다. 검과 달라서 가볍게 발사할 수 있는 점도 좋군.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いいなぁ、アニュラスは。そのバズーカ、すごくかっこいいもんな」"
translation = "「좋겠다, 아뉴라스는. 그 바주카, 엄청 멋있잖아.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それに引き換え、このあたしは……」"
translation = "「그에 비해서 이 나는……」"

[[dialogue]]
speaker = "unk"
original = "その剣が強そう"
translation = "그 검이 강해 보여"

[[dialogue]]
speaker = "unk"
original = "アポロはかっこいいぞ"
translation = "아폴로는 멋있어"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そ、そうか？\u3000うーん、自分ではそう感じないけど、魔王が言うならそうかもな」"
translation = "「그, 그래? 음, 스스로는 그렇게 안 느껴지지만, 마왕이 말한다면 그럴지도 모르겠네.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そうそう、可愛いけどかっこよさもちゃんとあるよね。それに、ふわふわもこもこだけど動きやすそう」"
translation = "「그래그래, 귀엽지만 멋짐도 확실히 있어. 게다가 폭신폭신 보들보들하지만 움직이기 편해 보여.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お？\u3000言われてみれば確かに……」"
translation = "「어? 듣고 보니 확실히……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アポロちゃんが戦闘しやすいようにって、作った人が考えてくれたんじゃないかな」"
translation = "「아폴로짱이 전투하기 편하도록 만든 사람이 신경 써준 게 아닐까?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なるほど！\u3000ヘレナはそういうとこ、抜け目ないやつだからな！」"
translation = "「과연! 헬레나는 그런 면에서 빈틈없는 녀석이니까 말이야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん、ここにいたんですね！」"
translation = "「언니, 여기 있었군요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「げえっ、見つかった！？」"
translation = "「게엑, 들켰다!?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「任せろ、私が食い止めてみせる！」"
translation = "「맡겨라, 내가 막아내 보겠다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「邪魔しないでください。もっと姉さんを可愛がるんです」"
translation = "「방해하지 마세요. 언니를 더 예뻐해 줄 거니까요.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お嬢様、足止めはお任せ下さい。その代わりと言ってはなんですが、後で私にも……」"
translation = "「아가씨, 발을 묶는 건 제게 맡겨 주십시오. 그 대신이라고 하긴 뭐하지만, 나중에 저에게도……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「２対１では分が悪いか。しかし、どんな苦境でも決して諦めないのが騎士だ！」"
translation = "「2 대 1이라서 불리한가. 하지만 어떤 고경이라도 결코 포기하지 않는 것이 기사다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「というものの、時間をかければいずれ敵の増援も来てしまう……いったいどうすれば！？」"
translation = "「그렇다고는 해도, 시간을 끌면 조만간 적의 증원도 오고 말 텐데…… 대체 어쩌면 좋지!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「アニュラス、一緒に戦うぞ！」"
translation = "「아뉴라스, 같이 싸우자!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あぁ、姉さん……なんて凛々しい……」"
translation = "「아아, 언니…… 어쩜 저리 늠름하실까……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「かわゆいのにかっこいい……さすがはアポロ様、絶対無敵です」"
translation = "「귀여우면서도 멋지시다니…… 역시 아폴로 님, 절대무적이십니다.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「一緒に戦ってくれるか！\u3000では、力を合わせて敵を倒すぞ！」"
translation = "「함께 싸워주겠나! 그럼 힘을 합쳐 적을 쓰러뜨리자!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000あたしたちが揃えば無敵だ！」"
translation = "「오우! 우리 둘이 모이면 무적이다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え？\u3000姉さん？\u3000私は敵なんですか？」"
translation = "「에? 언니? 제가 적인가요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ここは戦略的撤退ですね」"
translation = "「이곳은 전략적 후퇴군요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ちょっ、キリカ！？\u3000逃げるなんてずるいわ！」"
translation = "「잠깐, 키리카!? 도망치다니 치사해!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「行くぞ、フィオナ！\u3000正義の剣をくらえ！」"
translation = "「간다, 피오나! 정의의 검을 받아라!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「援護するぞ！\u3000ファイヤー！」"
translation = "「원호하겠다! 파이어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うおおおおっ、流星ブレェェーーーードッッ！！」"
translation = "「우오오오옷, 유성 브레에에에이ーー드으으!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「きゃああああ～～～～っ！！」"
translation = "「꺄아아아아~~~~앗!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「やったぜ！\u3000あたし達の大勝利だ！」"
translation = "「해냈어! 우리들의 대승리다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「バズーカの援護もよかったな。案外、戦闘でも役に立ちそうだ」"
translation = "「바주카의 원호도 좋았군. 의외로 전투에서도 도움이 될 것 같다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「フィオナ会長、アポロちゃんに攻撃されてしょんぼりして……ない？\u3000意外と嬉しそうにしてるよ」"
translation = "「피오나 회장님, 아폴로짱에게 공격당해서 시무룩해…… 있지 않네? 의외로 기뻐 보여.」"

[[dialogue]]
speaker = "unk"
original = "一緒に遊べて楽しかったんだよ"
translation = "같이 놀 수 있어서 즐거웠던 거야"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだな、あたしも楽しかった！\u3000抱きつかれたり撫でられるのは、ちょっとやだけど」"
translation = "「그렇네, 나도 즐거웠어! 매달리거나 쓰다듬어지는 건 좀 싫지만.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「安心しろ、私たちはアポロの嫌がることなんてしない」"
translation = "「안심해라, 우리는 아폴로가 싫어하는 짓 따윈 하지 않는다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……待て。今の反応、もしかして舞亜、隙をみて撫でようなどと考えていたのか？」"
translation = "「……잠깐. 방금 그 반응, 설마 마이아, 틈을 봐서 쓰다듬으려던 생각을 한 건가?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「だってアポロちゃん、かっこいいけど可愛いのも事実だから、撫でさせてもらいたいと言いますか……」"
translation = "「그치만 아폴로짱, 멋있지만 귀여운 것도 사실이니까, 쓰다듬고 싶다고나 할까……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんもそうでしょ？\u3000恋人がこんなに可愛いんだもん、撫でたくならない方が変だよ」"
translation = "「회장님도 그렇죠? 연인이 이렇게 귀여운데, 쓰다듬고 싶어지지 않는 게 이상해요.」"

[[dialogue]]
speaker = "unk"
original = "抱き締めたい！"
translation = "껴안고 싶어!"

[[dialogue]]
speaker = "unk"
original = "撫でたい！"
translation = "쓰다듬고 싶어!"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お、おいっ、魔王もなのか？」"
translation = "「어, 어이, 마왕 너도냐?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「どうするの？\u3000恋人がこう言ってるけど」"
translation = "「어떡할 거야? 연인이 이렇게 말하는데.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うっ……うううう～～～っ」"
translation = "「윽…… 으으으으~~~윽」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「仕方ない、ちょっとだけだぞ」"
translation = "「어쩔 수 없지, 아주 잠깐뿐이다.」"

[[dialogue]]
speaker = "unk"
original = "なでなでなでなでなで♥♥♥"
translation = "쓰담쓰담쓰담쓰담쓰담♥♥♥"

[[dialogue]]
speaker = "unk"
original = "ぎゅう～～～～っ♥♥♥"
translation = "꼬옥~~~~~♥♥♥"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふぐっ！\u3000ふぬぬぬぬぬ～～～っ」"
translation = "「푸흑! 후누누누누누~~~으」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「悶絶しているな。これは忍耐が問われる」"
translation = "「번민하고 있군. 이건 인내심이 요구되는구나.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ていうか、照れてるだけじゃない？」"
translation = "「그보다, 그냥 부끄러워하는 거 아니야?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ううううう～～～っ！」"
translation = "「으으으으으~~~윽!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「やりすぎだっ！\u3000これ以上されたら、おかしくなっちゃうぞ！」"
translation = "「너무 심해! 더 이상 하면 이상해져 버린다구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もっと手加減してくれ。おまえはあたしの好みを知ってるだろ？」"
translation = "「좀 더 살살 해줘. 너는 내 취향을 알고 있잖아?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いつもみたいにしてくれればいいんだ……ちゃんとやれ……」"
translation = "「평소처럼 해주면 된단 말이야…… 제대로 해……」"

[[dialogue]]
speaker = "unk"
original = "なでなで♥"
translation = "쓰담쓰담♥"

[[dialogue]]
speaker = "unk"
original = "ぎゅ♥"
translation = "꼬옥♥"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「えへへ……これこれ……おまえは上手いんだから、ずっとこうしろ」"
translation = "「에헤헤…… 이거야 이거…… 넌 솜씨가 좋으니까, 계속 이렇게 해.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「なにこれ、めちゃくちゃ可愛い……」"
translation = "「뭐야 이거, 미치도록 귀여워……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うむ、これは抱き締めたくなるのも道理だな」"
translation = "「음, 이건 껴안고 싶어지는 것도 당연하군.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「えへへ～～、魔王<emoji=heart04>」"
translation = "「에헤헤~~, 마왕<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一堂に羨ましそうに見つめられながら、甘えてくるアポロを俺は恋人特権で愛でまくるのだった。"
translation = "모두의 부러움 섞인 시선을 받으며, 응석을 부려오는 아폴로를 나는 연인 특권으로 마음껏 귀여워해 주었다."

