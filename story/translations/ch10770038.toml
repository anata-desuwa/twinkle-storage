speaker_translation = "라미"
original = "「はぁ……はぁ……はぁっ<emoji=heart04>\u3000おち○ぽ、外れちゃったわ<emoji=heart04>\u3000さすがにあれだけたっぷり<ruby>射精<rt>だ</rt></ruby>したら、元気もなくなっちゃうかしら……<emoji=heart04>」"
translation = "「하아…… 하아…… 하읏<emoji=heart04> 자지<emoji=heart04>, 빠져버렸다<emoji=heart04> 역시 저렇게 잔뜩 사정했으면, 기운도 없어지려나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でも、貴方のお嫁さんは、まだまだ絶賛発情中だってこと……忘れないでねっ<emoji=heart04>」"
translation = "「하지만, 당신의 신부는, 아직도 극찬 발정 중이라는 거…… 잊지 마<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んんぅっ……そりゃあまあ、あれだけ激しく絶頂すれば、少しくらいは落ち着くけれど……」"
translation = "「음으으읏…… 뭐긴 뭐야, 저렇게 격렬하게 절정하면, 조금은 진정되겠지만……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それでも、私の発情が１回くらいじゃ収まらないこと……もう知ってるでしょう<emoji=heart04>」"
translation = "「그렇다고 해도, 나의 발정이 1번 정도로는 가라앉지 않는다는 거…… 이미 알고 있잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それに、最初に朝までセックスするって言ったわよね？\u3000んふっ<emoji=heart04>\u3000子種汁もまだこんなにこってりしてるし……私が知る限り、貴方はまだまだ出せるわ<emoji=heart04>」"
translation = "「게다가, 처음에 아침까지 섹스한다고 했잖아? 음훗<emoji=heart04> 씨앗 국물도 아직 이렇게 끈적끈적하고…… 내가 알기로는, 당신은 아직 더 낼 수 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁぁぁっ<emoji=heart04>\u3000種付けしてもらったおかげで、子宮も発情してきちゃったわ<emoji=heart04>\u3000これは旦那様が責任を取って……お嫁さんの肉欲を満たしてもらわないと<emoji=heart04>」"
translation = "「하아아아아읏<emoji=heart04> 씨앗을 받은 덕분에, 자궁도 발정해 버렸다<emoji=heart04> 이건 남편님<emoji=heart04>이 책임을 지고…… 신부의 육욕을 채워줘야겠지<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さっきまで従順なメスウサギだったのに、落ち着いた途端に生意気になっちゃうんだな」"
translation = "「아까까지는 고분고분한 암토끼였는데, 진정되자마자 건방져지는구나」"

[[dialogue]]
speaker = "unk"
original = "俺がそう指摘すると、すぐに蘭美は瞳を蕩けさせて、熱い吐息を漏らし始める。"
translation = "내가 그렇게 지적하자, 곧바로 라비는 눈동자를 녹이며, 뜨거운 한숨을 내쉬기 시작한다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だってだって……一晩中発情メスウサギでいたら、戻れなくなっちゃうぴょん<emoji=heart04>」"
translation = "「왜냐면 왜냐면…… 밤새도록 발정 암토끼로 있으면, 돌아갈 수 없게 되어버린다뿅<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でも……旦那様がそっちの方が興奮するって言うなら、一晩中おち○ぽ様に媚び続けちゃってもいいぴょん<emoji=heart04>」"
translation = "「하지만…… 남편님<emoji=heart04>이 그쪽이 더 흥분된다고 말한다면, 밤새도록 자지님<emoji=heart04>께 계속 아양 떨어도 괜찮다뿅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美は布団の上に正常位の格好で寝転がると、精液と愛液が混じってドロドロになっているおま○こを、自分の指でいやらしく広げて見せる。"
translation = "라비는 이불 위에 정상위 자세로 눕더니, 정액과 애액이 섞여 질척거리는 보지<emoji=heart04>를, 자신의 손가락으로 야하게 벌려 보인다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「旦那様<emoji=heart04>\u3000その立派なおち○ぽ様で、私のおま○こをもっともっと躾てほしいぴょん<emoji=heart04>」"
translation = "「남편님<emoji=heart04> 그 훌륭한 자지님<emoji=heart04>으로, 나의 보지<emoji=heart04>를 좀 더 좀 더 훈육해 줬으면 좋겠다뿅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺と蘭美は宣言した通りに、夜が明けるまで愛し合うのだった。"
translation = "이렇게, 나와 라비는 선언한 대로, 밤이 새도록 사랑을 나누었다."

