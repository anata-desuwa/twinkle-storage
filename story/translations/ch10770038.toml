[[dialogue]]
speaker = "unk"
original = "蘭美のウェディングフォームに関する報告をするため、俺は九浄家を訪れていた。"
translation = "라비의 웨딩 폼에 관한 보고를 하기 위해, 나는 쿠죠 가문을 방문하고 있었다."

[[dialogue]]
speaker = "unk"
original = "終わった頃にはもう夜になっていたから、今夜は蘭美の部屋に泊めてもらう予定だ。"
translation = "끝났을 무렵에는 이미 밤이 되어 있었으므로, 오늘 밤은 라비의 방에 묵을 예정이었다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ねぇっ<emoji=heart04>\u3000は、早く部屋に向かうわよっ<emoji=heart04>」"
translation = "「저기<emoji=heart04> 바, 빨리 방으로 가자<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなに急いで、どうしたんだ……？」"
translation = "「그렇게 서둘러서, 무슨 일이야……?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「い、いいから、早くっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000とにかく行くわよっ<emoji=heart04>」"
translation = "「괘, 괜찮으니까, 빨리<emoji=heart04> 하아아읏<emoji=heart04> 아무튼 가는 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ずいぶん急かしてしまったけれど……<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000でも見て……もう私、我慢の限界なのっ<emoji=heart04>」"
translation = "「꽤 재촉해 버렸지만……<emoji=heart04> 아아아읏<emoji=heart04> 하지만 봐봐…… 이제 나, 참을 수 있는 한계야<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はふぅぅ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000もう、こんなになってるのよ<emoji=heart04>\u3000貴方のおち○ぽが欲しくてっ、おま○こびちょびちょになってるんだからっ<emoji=heart04>」"
translation = "「하후우우<emoji=heart04> 아아아읏<emoji=heart04> 벌써, 이렇게 되어 있다구<emoji=heart04> 당신의 자지<emoji=heart04>가 갖고 싶어서, 보지<emoji=heart04>가 축축해지고 있으니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ！？\u3000その状態って……もしかしてまた発情抑制薬を飲んでないのか？」"
translation = "「엣!? 그 상태는…… 혹시 또 발정 억제약을 안 마신 거야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「えへへへへぇ<emoji=heart04>\u3000だって今日、貴方がお屋敷に来るって、聞いてたからぁ<emoji=heart04>\u3000はぁぁぁっ<emoji=heart04>」"
translation = "「에헤헤헤헤<emoji=heart04> 왜냐면 오늘, 당신이 저택에 온다고, 들었으니까<emoji=heart04> 하아아아읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「せっかく旦那様がお泊りに来るんだものぉ<emoji=heart04>\u3000はぁぁ～～<emoji=heart04>\u3000お嫁さんとしては、おま○こ<emoji=heart04>\u3000濡らしておくべきでしょうっ<emoji=heart04>」"
translation = "「모처럼 남편님<emoji=heart04>이 묵으러 오시는 건데<emoji=heart04> 하아아~~<emoji=heart04> 신부로서는, 보지<emoji=heart04>를 적셔 둬야 하잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あはぁぁっ<emoji=heart04>\u3000エッチな貴方をおもてなしするなら、これが一番でしょう？\u3000はふぅぅん<emoji=heart04>\u3000貴方のつがいの淫乱メスウサギが、発情した肉穴でお出迎えなんだからぁ<emoji=heart04>」"
translation = "「아하아아읏<emoji=heart04> 야한 당신을 대접하려면, 이게 최고잖아? 하후우운<emoji=heart04> 당신의 짝인 음란 암토끼<emoji=heart04>가, 발정한 육혈<emoji=heart04>로 마중 나가는 거니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「発情全開の、本能丸出しの交尾<emoji=heart04>\u3000久し振りに朝までセックスしましょう<emoji=heart04>\u3000んんぅぅ～ん<emoji=heart04>\u3000私の全部を使って、旦那さまにご奉仕させてほしいのぉっ<emoji=heart04>」"
translation = "「발정 전개의, 본능이 그대로 드러난 교미<emoji=heart04> 오랜만에 아침까지 섹스하자<emoji=heart04> 음으으~음<emoji=heart04> 나의 전부를 써서, 남편님께 봉사하게 해 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「朝までって……いいのか？\u3000九浄家のお屋敷なのに」"
translation = "「아침까지라니…… 괜찮은 거야? 쿠죠 가문의 저택인데」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ヘレナ様にはっ<emoji=heart04>\u3000許可も取ってあるからぁ～<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000むしろ魔王の子を早く仕込んでもらえって、言われてるくらいだもんっ<emoji=heart04>」"
translation = "「헬레나 님께는<emoji=heart04> 허가도 받아뒀으니까~<emoji=heart04> 하아앙<emoji=heart04> 오히려 마왕의 아이를 빨리 갖게 해 달라고, 들었을 정도인걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あぁああっ<emoji=heart04>\u3000旦那様ぁ<emoji=heart04>\u3000とってもイジワルよぉ<emoji=heart04>\u3000お嫁さんがおま○こ濡らしてるのに、おち○ぽ入れてくれないなんてぇ～<emoji=heart04>」"
translation = "「아아아읏<emoji=heart04> 남편님<emoji=heart04> 너무 심술궂어<emoji=heart04> 신부가 보지<emoji=heart04>를 적시고 있는데, 자지<emoji=heart04>를 넣어주지 않다니~<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「貴方のエッチなメスウサギに、そのかっこいいおち○ぽをちょうだい<emoji=heart04>\u3000はふぅぅんっ<emoji=heart04>\u3000恥ずかしいメス穴を早く埋めて欲しくて、じゅくじゅくしちゃってるのぉ<emoji=heart04>」"
translation = "「당신의 야한 암토끼에게, 그 멋진 자지<emoji=heart04>를 줘<emoji=heart04> 하후우운읏<emoji=heart04> 부끄러운 암컷 구멍을 빨리 채워주길 바라서, 질척질척해지고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「どれだけ激しくしてもいいからっ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000むしろ激しくしてくださぁいっ<emoji=heart04>\u3000乱暴に犯されたくて、愛液止まらないのぉ～<emoji=heart04>」"
translation = "「아무리 격렬하게 해도 괜찮으니까<emoji=heart04> 아앙<emoji=heart04> 오히려 격렬하게 해 줘<emoji=heart04> 난폭하게 범해지고 싶어서, 애액 멈추지 않아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お願いっ<emoji=heart04>\u3000お願いしますぅ～<emoji=heart04>\u3000発情苦しいのぉ<emoji=heart04>\u3000体が熱くて熱くてっ……だから、ねぇっ、私を助けてぇっっ<emoji=heart04>」"
translation = "「부탁이야<emoji=heart04> 부탁해~<emoji=heart04> 발정 괴로워<emoji=heart04> 몸이 뜨겁고 뜨거워서읏…… 그러니까, 있잖아, 나를 구해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んうぅぅ～～～～っ<emoji=heart04>\u3000ふあぁぁんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000は、入ったっ<emoji=heart04>\u3000おち○ぽっ<emoji=heart04>\u3000んうぅぅ<emoji=heart04>\u3000私専用の肉棒っ<emoji=heart04>\u3000入って来たぁ～～っっ<emoji=heart04>」"
translation = "「음으으으~~~~읏<emoji=heart04> 후아아앙읏<emoji=heart04> 하앙읏<emoji=heart04> 드, 들어왔다<emoji=heart04> 자지<emoji=heart04> 음으으<emoji=heart04> 나 전용의 육봉<emoji=heart04> 들어왔어~~읏읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はぁっ、はぁっ、一気に奥まで満たされちゃったぁぁ<emoji=heart04>\u3000あぁぁぁ、幸せぇ<emoji=heart04>\u3000えへへへへぇ、満たされてるよぉ<emoji=heart04>\u3000これ好きぃ<emoji=heart04>\u3000気持ちよすぎて夢中になっちゃうっっ<emoji=heart04>」"
translation = "「하읏, 하읏, 단숨에 안쪽까지 채워져 버렸다아아<emoji=heart04> 아아아, 행복해<emoji=heart04> 에헤헤헤헤, 채워지고 있어<emoji=heart04> 이거 좋아<emoji=heart04> 기분 너무 좋아서 정신을 못 차리겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んふぅぅ～～ん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000お嫁さんま○こ、入れただけで喜んじゃってるぅっ<emoji=heart04>\u3000ふわぁぁっ<emoji=heart04>\u3000貴方はどう？\u3000おち○ぽ気持ちいいっ？」"
translation = "「음후우우~~운<emoji=heart04> 아아앗<emoji=heart04> 신부 보지<emoji=heart04>, 넣은 것만으로 기뻐하고 있어<emoji=heart04> 후와아앗<emoji=heart04> 당신은 어때? 자지<emoji=heart04> 기분 좋아?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふわぁぁっ<emoji=heart04>\u3000良かったぁっ<emoji=heart04>\u3000旦那様おち○ぽ、気持ち良くなってほしいっ<emoji=heart04>\u3000気持ち良くするからぁ、たくさん犯してぇぇ<emoji=heart04>」"
translation = "「후와아앗<emoji=heart04> 다행이다<emoji=heart04> 남편님 자지<emoji=heart04>, 기분 좋아졌으면 좋겠어<emoji=heart04> 기분 좋게 해 줄 테니까, 잔뜩 범해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000おち○ぽ動き出したぁぁぁ～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아읏<emoji=heart04><emoji=heart04> 자지<emoji=heart04> 움직이기 시작했다아아아~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んあっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000腰の動き、ズンズンって<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000頭幸せになっちゃうぅぅぅ～～<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앙읏<emoji=heart04> 아아앙<emoji=heart04> 허리의 움직임, 쿵쿵하고<emoji=heart04> 아아아앗<emoji=heart04> 머리가 행복해져 버려어어~~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あぅぅうう～～っ<emoji=heart04>\u3000にゅるにゅるこすれて気持ちいいのぉぉ<emoji=heart04>\u3000抑制剤飲まないだけで、こんなになっちゃうなんてぇ<emoji=heart04>\u3000はふぅぅん<emoji=heart04>」"
translation = "「아으으으으~~읏<emoji=heart04> 미끌미끌 비벼져서 기분 좋아아아<emoji=heart04> 억제제 안 마신 것만으로, 이렇게 되어버리다니<emoji=heart04> 하후우운<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私ってやっぱり<emoji=heart04>\u3000すごくエッチなメスなんだぁ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000発情セックスすると、それを思い出せて好きぃ～<emoji=heart04>\u3000ふわぁぁぁんっ<emoji=heart04>」"
translation = "「나 역시<emoji=heart04> 엄청 야한 암컷이구나<emoji=heart04> 아아앙<emoji=heart04> 발정 섹스하면, 그걸 떠올릴 수 있어서 좋아~<emoji=heart04> 후와아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あぁんっ<emoji=heart04>\u3000もっとエッチになりたいっ<emoji=heart04>\u3000全力の種付け交尾っ<emoji=heart04>\u3000んふぅぅ～～<emoji=heart04>\u3000発情したお嫁さんの子宮に、子種をたっぷりかけてほしいのぉ<emoji=heart04>」"
translation = "「아앙읏<emoji=heart04> 좀 더 야해지고 싶어<emoji=heart04> 전력의 씨 뿌리기 교미<emoji=heart04> 음후우우~~<emoji=heart04> 발정한 신부의 자궁에, 씨앗을 잔뜩 뿌려줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はぁっ<emoji=heart04>\u3000はぁっっ<emoji=heart04>\u3000ふあぁぁ～～～っ<emoji=heart04>\u3000腰の動きすごいっ<emoji=heart04>\u3000おま○こ幸せになっちゃぅぅ<emoji=heart04>\u3000旦那様の愛で、バカになっちゃうのぉぉ～～<emoji=heart04>」"
translation = "「하읏<emoji=heart04> 하아읏읏<emoji=heart04> 후아아아~~~읏<emoji=heart04> 허리의 움직임 굉장해<emoji=heart04> 보지<emoji=heart04> 행복해져 버려어<emoji=heart04> 남편님의 사랑으로, 바보가 되어버려어어~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっあっあっ<emoji=heart04>\u3000すごいっ、おち○ぽ震えてるのわかるっ<emoji=heart04>\u3000たくさん気持ち良くなって、子種を恵んでくださぁい<emoji=heart04>\u3000孕ませてほしいのぉ<emoji=heart04>」"
translation = "「앗 앗 앗<emoji=heart04> 굉장해, 자지<emoji=heart04> 떨리는 거 알아<emoji=heart04> 잔뜩 기분 좋아져서, 씨앗을 내려줘<emoji=heart04> 임신시켜 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んぁああっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000もっと突いてっ、おち○ぽも幸せになって～っ<emoji=heart04>\u3000どれだけ激しくしても、いいからぁ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 앙읏<emoji=heart04> 앙읏<emoji=heart04> 아앙읏<emoji=heart04> 좀 더 찔러줘<emoji=heart04>, 자지<emoji=heart04>도 행복해져~<emoji=heart04> 아무리 격렬하게 해도, 괜찮으니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お尻叩かれてもいいのぉ<emoji=heart04>\u3000乳首つねられてもいいっ<emoji=heart04>\u3000乱暴にしてほしいよぉ<emoji=heart04>\u3000あぁああぁっ<emoji=heart04>\u3000激しくされたいのぉっ<emoji=heart04>」"
translation = "「엉덩이 맞아도 좋아<emoji=heart04> 젖꼭지 꼬집혀도 좋아<emoji=heart04> 난폭하게 해줬으면 좋겠어<emoji=heart04> 아아아아아읏<emoji=heart04> 격렬하게 당하고 싶어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000んあぁぁ～～～っ<emoji=heart04>\u3000旦那様になら何をされても気持ちいいのっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きだからぁ<emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 앙읏<emoji=heart04> 하아앙<emoji=heart04> 응아아아~~~읏<emoji=heart04> 남편님에게라면 뭘 당해도 기분 좋아<emoji=heart04> 좋아해<emoji=heart04> 좋아하니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「好きすぎてたまらないのっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000だからっ、もっと私を犯してっ<emoji=heart04>\u3000発情おま○こっ<emoji=heart04>\u3000貴方のおち○ぽで満たしてぇぇっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「너무 좋아서 견딜 수 없어<emoji=heart04> 아아앙<emoji=heart04> 그러니까, 좀 더 나를 범해줘<emoji=heart04> 발정 보지<emoji=heart04> 당신의 자지<emoji=heart04>로 채워줘<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あああっ<emoji=heart04>\u3000幸せすぎて怖いのぉ<emoji=heart04>\u3000おま○こほじられるたび、頭バカになってるぅぅ～<emoji=heart04>\u3000愛液ぐちゅぐちゅ、私の気持ちいいとこ全部こすれてるぅぅっ<emoji=heart04>」"
