[[dialogue]]
speaker = "unk"
original = "第３話,マトイの家族,P"
translation = "제3화, 마토이의 가족, P"

[[dialogue]]
speaker = "unk"
original = "マトイとの交際は順調に進んでいたが、ある日のこと──"
translation = "마토이와의 교제는 순조롭게 진행되고 있었지만, 어느 날──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長。あのさ、今週末、一緒に遊ぶ予定だったじゃない？\u3000それでなんだけど――」"
translation = "「회장님. 저기 말야, 이번 주말에 같이 놀기로 했었잖아? 그래서 말인데──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私……会長に家族を紹介したいの！」"
translation = "「나…… 회장님에게 가족을 소개해주고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "ファッ！？"
translation = "헉!?"

[[dialogue]]
speaker = "unk"
original = "そうして週末――"
translation = "그렇게 주말──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゃあ、会長。約束通り、私の家族を紹介するね！」"
translation = "「자, 회장님. 약속대로 내 가족을 소개할게!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これが私の飼っている……ジャンガリアンハムスターの、ツツミで～す♪」"
translation = "「이게 내가 키우는…… 정글리안 햄스터인 츠츠미야~♪」"

[[dialogue]]
speaker_original = "ツツミ"
speaker_translation = "츠츠미"
original = "「キュ～♪」"
translation = "「큐~♪」"

[[dialogue]]
speaker = "unk"
original = "ある意味、助かった……"
translation = "어떤 의미로는 살았다……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ん？\u3000どうしたの会長？」"
translation = "「응? 왜 그래 회장님?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――私の両親や弟を紹介されるかもって、思ってた？」"
translation = "「──내 부모님이나 남동생을 소개받을지도 모른다고 생각했어?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、それは……私も心の準備がまだ……あ、でも！」"
translation = "「그, 그건…… 나도 마음의 준비가 아직…… 아, 하지만!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そのうち……必ず、ね？\u3000会長とは長いお付き合いになるだろうし……」"
translation = "「조만간…… 반드시, 알았지? 회장님과는 오래 사귀게 될 테니까……」"

[[dialogue]]
speaker = "unk"
original = "そうだな。ちゃんと挨拶したい"
translation = "그렇네. 제대로 인사드리고 싶어"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えへへ……うん♪」"
translation = "「에헤헤…… 응♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、それで、会長もツツミを触ってみる？\u3000うん、大丈夫だよ～。ジャンガリアンハムスターはおとなしい子が多いんだけど、ツツミは特別人懐っこいから」"
translation = "「아, 그래서 회장님도 츠츠미 만져볼래? 응, 괜찮아~. 정글리안 햄스터는 얌전한 애들이 많지만, 츠츠미는 특별히 사람을 잘 따르거든」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はい、じゃあ手の平に乗せるね～。ツツミ～、会長に挨拶しましょ～」"
translation = "「자, 그럼 손바닥에 올려줄게~. 츠츠미~, 회장님께 인사하자~」"

[[dialogue]]
speaker_original = "ツツミ"
speaker_translation = "츠츠미"
original = "「キュッキュッキュ～♪」"
translation = "「큐큐큐~♪」"

[[dialogue]]
speaker = "unk"
original = "かわいい！"
translation = "귀여워!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「かわいいでしょ～♪\u3000ハムスターは昔から飼ってるんだけど、凄く癒されるんだよね～。ちなみに、ツツミは女の子なんだ～」"
translation = "「귀엽지~♪ 햄스터는 예전부터 키웠는데 정말 힐링 되거든~. 참고로 츠츠미는 여자애야~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……って、会長、何か凄く触り方慣れてない？\u3000下からすくうような持ち方とか、正面からゆっくり撫でてあげる感じとか……」"
translation = "「……랄까, 회장님, 왠지 만지는 법이 아주 익숙하지 않아? 밑에서 받쳐 드는 법이라든가, 정면에서 천천히 쓰다듬어 주는 느낌이라든가……」"

[[dialogue]]
speaker_original = "ツツミ"
speaker_translation = "츠츠미"
original = "「キュ～ン<emoji=heart02>」"
translation = "「큐~웅<emoji=heart02>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あぁっ！？\u3000ツツミが機嫌いい時の鳴き声を出してる！？」"
translation = "「아앗!? 츠츠미가 기분 좋을 때 내는 소리를 내고 있어!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――えっ、ペットショップのバイト経験があるの？\u3000会長、恐るべし……」"
translation = "「──엣, 펫숍 아르바이트 경험이 있다고? 회장님, 무서운 사람……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、それにしても……ツツミ、私が撫でている時より嬉しそうなんだけど……」"
translation = "「그, 그나저나…… 츠츠미, 내가 쓰다듬어 줄 때보다 더 기뻐 보이는데……」"

[[dialogue]]
speaker = "unk"
original = "よしよし……ツツミ、かわいいね～♪"
translation = "옳지 옳지…… 츠츠미, 귀엽네~♪"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「む、むむむ……」"
translation = "「으, 으으음……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ね、ねぇ、会長！\u3000ちょっと！」"
translation = "「저, 저기, 회장님! 잠깐만!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――い、いや別に、触り方は間違って無いし、ツツミは喜んでるから、いいんだけど……」"
translation = "「──아, 아니 딱히 만지는 법이 틀린 건 아니고 츠츠미가 기뻐하니까 괜찮긴 한데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こ、恋人の前で、他の女の子と、イチャイチャし過ぎじゃない……！？」"
translation = "「여, 연인 앞에서 다른 여자애랑 너무 꽁냥거리는 거 아냐……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――わ、笑わないでよ！\u3000会長がツツミばっかり構ってるから……」"
translation = "「──우, 웃지 마! 회장님이 츠츠미만 챙기니까……」"

[[dialogue]]
speaker = "unk"
original = "ごめん。それじゃあ――"
translation = "미안. 그러면──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……頭、撫でられて……ん……<emoji=heart04>」"
translation = "「앗…… 머리, 쓰다듬어져서…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――か、かわいいって……そこまでツツミと同じように、しなくても……う、うぅん、ダメじゃないよ。照れるけど……嬉しい<emoji=heart04>」"
translation = "「──귀, 귀엽다니…… 그렇게까지 츠츠미랑 똑같이 안 해도…… 으, 으응, 안 된다는 건 아냐. 부끄럽지만…… 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら～、想像以上にラブラブね～♪」"
translation = "「어머~, 상상 이상으로 러브러브하네~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「きゃっ！？\u3000りりり、リノさん！？」"
translation = "「꺄악!? 리리리, 리노 씨!?」"

[[dialogue]]
speaker = "unk"
original = "母さん、さっき出掛けたはずでは！？"
translation = "엄마, 아까 나가신 거 아니었어요!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「うふふっ、クロトが何やらそわそわしていたから、気になって出掛けたフリをしていたの♪」"
translation = "「우후후, 쿠로토가 왠지 안절부절못하길래 궁금해서 나가는 척해봤단다♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こ、こんにちは、リノさん。今のは……わ、私、実はその、会長とお付き合いすることになりまして……」"
translation = "「아, 안녕하세요, 리노 씨. 방금 건…… 저, 사실 그, 회장님과 사귀게 되어서……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「やっぱりね～。この頃、この子の機嫌が良くて、ＤＩＳＣを見ながらニヤニヤしていたから、そんな気がしてたのよね～」"
translation = "「역시나네~. 요즘 이 아이 기분이 좋아서 DISC를 보면서 히죽거리고 있길래 그런 기분이 들었거든~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふ、ふ～ん……会長、そんなに浮かれてたんだ……♪」"
translation = "「흐, 흠~…… 회장님, 그렇게 들떠 있었구나……♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、母さん！\u3000変なこと言わないで！"
translation = "잠깐, 엄마! 이상한 소리 하지 마세요!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ♪\u3000マトイちゃん、息子のこと、よろしくね～。私とも仲良くしてくれると嬉しいわ♪」"
translation = "「후후♪ 마토이 짱, 아들을 잘 부탁해~. 나랑도 사이좋게 지내주면 기쁘겠구나♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、はい！\u3000こちらこそ、改めてよろしくお願いします、リノさん！」"
translation = "「네, 네! 저야말로 다시 한번 잘 부탁드려요, 리노 씨!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、何か私の方が先に、家族紹介されちゃったね……えへへ♪」"
translation = "「회장님, 왠지 내가 먼저 가족 소개를 받아버렸네…… 에헤헤♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これは近い内に、私も紹介しないとかも……♪」"
translation = "「이건 조만간 나도 소개해야 할지도……♪」"

[[dialogue]]
speaker = "unk"
original = "こ、心の準備が……"
translation = "마, 마음의 준비가……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは♪\u3000２人でどうするか、考えないとだね」"
translation = "「아하하♪ 둘이서 어떻게 할지 생각해야겠네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そこは男の子として頑張らないと♪\u3000ファイトよ！」"
translation = "「그건 남자애로서 힘내야지♪ 파이팅이야!」"

[[dialogue]]
speaker = "unk"
original = "マトイの家族に会う日は、そう遠くないかもしれない、と思いを馳せるのだった――"
translation = "마토이의 가족을 만나는 날은 그리 멀지 않을지도 모른다고 생각에 잠기는 것이었다──"

