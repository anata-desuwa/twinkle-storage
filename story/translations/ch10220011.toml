[[dialogue]]
speaker = "unk"
original = "第１話,図書委員モネ,P"
translation = "제1화, 도서위원 모네, P"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁ～、いつも本がたくさん……新星学園に来て良かったぁ……本に囲まれて幸せ……」"
translation = "「하아~, 언제나 책이 가득해…… 신성 학원에 오길 잘했어…… 책에 둘러싸여서 행복해……」"

[[dialogue]]
speaker = "unk"
original = "ちょっと聞きたいことがあるんだけど"
translation = "잠깐 물어볼 게 있는데"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はっ、会長！？\u3000今の聞こえてましたか……？\u3000いえ、何でもないです、何でも……」"
translation = "「핫, 회장님!? 방금 그거 들으셨나요……? 아뇨, 아무것도 아니에요, 아무것도……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私、図書委員の紙屋敷モネです。あ、でも私なんて大したことないので、覚えておかなくていいですよ……あはは」"
translation = "「저, 도서위원인 카미야시키 모네입니다. 아, 하지만 저 같은 건 별거 아니니까, 기억해 두지 않으셔도 돼요…… 아하하」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「会長は図書館に何かご用事で？\u3000……ああ、なるほど、モンスターの出現に関する資料ですね。さすが星徒会長、勉強熱心なんですね」"
translation = "「회장님은 도서관에 무슨 용무라도? ……아아, 그렇군요, 몬스터 출현에 관한 자료군요. 역시 성도회장님, 공부에 열심이시네요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「なら私が案内しますよ。ちょうどそちらに本を持っていくところだったので」"
translation = "「그럼 제가 안내할게요. 마침 그쪽으로 책을 가져가려던 참이었거든요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「では行きましょう。……よっこいしょ」"
translation = "「그럼 가요. ……영차」"

[[dialogue]]
speaker = "unk"
original = "重そうだけど大丈夫？"
translation = "무거워 보이는데 괜찮아?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい……これくらい平気です……本は大好きなので……」"
translation = "「네…… 이 정도는 아무렇지도 않아요…… 책은 정말 좋아하니까……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んっしょ……はぁはぁ……んっ……はぁ……」"
translation = "「응차…… 하아 하아…… 응…… 하아……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……受け止めていただいてすみません。会長がお優しい方で良かったです。ありがとうございます」"
translation = "「아…… 받아주셔서 죄송해요. 회장님이 다정한 분이라 다행이에요. 감사합니다」"

[[dialogue]]
speaker = "unk"
original = "手伝おうか？"
translation = "도와줄까?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いえ、これは図書委員の仕事ですから」"
translation = "「아뇨, 이건 도서위원의 일이니까요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……だけど星徒会長に手伝わせろと言われたら、権限的に断れませんね……」"
translation = "「아…… 하지만 성도회장으로서 돕게 하라고 하신다면, 권한상 거절할 수 없겠네요……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「えへへ、ありがとうございます。ではこちらを持っていただけると……おお、さすが男の人ですね、力があります」"
translation = "「에헤헤, 감사합니다. 그럼 이걸 들어주시면…… 오오, 역시 남자분이시네요, 힘이 세요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「……ふむふむ、バイトで重いものも持っていたと。ふふっ、会長って経験豊富なんですね。頼りになります」"
translation = "「……흠흠, 알바에서 무거운 것도 들었었다고. 후훗, 회장님은 경험이 풍부하시네요. 의지가 돼요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「じゃあついてきてください。資料の場所はここをまっすぐ行って、右に曲がって、階段を下りて……」"
translation = "「그럼 따라와 주세요. 자료가 있는 곳은 여기서 쭉 가서, 오른쪽으로 꺾어서, 계단을 내려가면……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい、到着です。こちらがお探しの資料です」"
translation = "「네, 도착입니다. 이쪽이 찾으시는 자료예요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いえいえそんな、お礼なんて恐れ多いです。こちらこそ本を持っていただいてありがとうございました」"
translation = "「아뇨아뇨 천만에요, 감사 인사를 듣다니 송구스러워요. 저야말로 책을 들어주셔서 감사합니다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「じゃあ私はこれで……そうだ。これ、良かったらどうですか？\u3000図書館の蔵書に追加してほしいアンケートです」"
translation = "「그럼 전 이만…… 아 맞다. 이거, 괜찮으시면 어떠세요? 도서관 장서에 추가했으면 하는 설문조사예요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「必ずしもアンケート通りになるとは限りませんが、欲しい本がタダで買えるようなものなので、気になる本があれば書いて損はないと思いますよ」"
translation = "「반드시 설문대로 된다는 보장은 없지만, 갖고 싶은 책을 공짜로 살 수 있는 거나 마찬가지니까, 신경 쓰이는 책이 있다면 써서 손해 볼 건 없다고 생각해요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「もし本で困ったことがあったら、司書の方でも私たち図書委員でも気軽に声をかけてくださいね」"
translation = "「혹시 책 때문에 곤란한 일이 생기면, 사서 분이나 저희 도서위원에게 편하게 말씀해 주세요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「例えば何か本が読みたいけど、何を読んでいいかわからないとか。そういう時はおすすめの本を紹介します」"
translation = "「예를 들어 어떤 책이 읽고 싶은데, 뭘 읽어야 할지 모르겠다거나. 그럴 때는 추천 도서를 소개해 드릴게요」"

[[dialogue]]
speaker = "unk"
original = "モネのおすすめは？"
translation = "모네의 추천은?"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私のおすすめですかっ？\u3000そうですね～……会長は恋愛小説はお好きですか？\u3000それともミステリー？\u3000ＳＦ？\u3000もちろんどれでもイチ押しがありますよ！」"
translation = "「제 추천인가요!? 그렇네요~…… 회장님은 연애 소설 좋아하세요? 아니면 미스터리? SF? 물론 어느 쪽이든 강력 추천작이 있어요!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「恋愛小説ならまずこれ、『蝉時雨ラプソディ』！\u3000少年少女が出会い、心を通わせる短いひと夏を描いた作品で、爽やかで甘酸っぱい、そして切なさ溢れる１作です」"
translation = "「연애 소설이라면 우선 이거, 『매미 울음소리 랩소디』! 소년 소녀가 만나 마음을 나누는 짧은 한여름을 그린 작품으로, 상쾌하고 새콤달콤한, 그리고 애절함이 넘치는 한 편이에요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「情景描写が巧みで、文字を追っているのに夏の花火が脳裏に浮かび上がってくるんです。そして何より心理描写が素晴らしくっ、思い出すだけで涙が……」"
translation = "「정경 묘사가 교묘해서, 글자를 쫓고 있는데도 여름 불꽃놀이가 머릿속에 떠오른다니까요. 그리고 무엇보다 심리 묘사가 훌륭해서, 떠올리는 것만으로도 눈물이……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、そうそう。恋愛ならこちらもいかがですか？\u3000『ミュトスの情愛』という本なのですが、テーマはズバリ歪んだ愛情」"
translation = "「아, 맞다 맞다. 연애라면 이것도 어떠세요? 『뮈토스의 정애』라는 책인데, 테마는 바로 뒤틀린 애정」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ギリシャ演劇を紐解きながら様々な形の愛が交錯する、とても難解で読み応えのある作品で――」"
translation = "「그리스 연극을 풀어내며 다양한 형태의 사랑이 교차하는, 매우 난해하고 읽을 가치가 있는 작품이라――」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「！\u3000すみません……語りすぎてしまいました。私いつもこうで、本の素晴らしさを語ろうとすると引かれてしまうんです……」"
translation = "「! 죄송해요…… 너무 떠들어버렸네요. 저 항상 이래요, 책의 훌륭함을 이야기하려고 하면 다들 질려버려서……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でも、私のことは嫌いになっても本のことは嫌いにならないでください……」"
translation = "「하지만, 저를 싫어하게 되더라도 책은 싫어하지 말아 주세요……」"

[[dialogue]]
speaker = "unk"
original = "本が大好きなんだ"
translation = "책을 정말 좋아하는구나"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「は、はいっ。生まれてからずっと本に囲まれて生きてきたようなもので、本がないと生きていけませんっ」"
translation = "「네, 네에. 태어날 때부터 줄곧 책에 둘러싸여 살아온 거나 마찬가지라, 책이 없으면 살 수 없어요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「本は読むのも眺めるのもスリスリするものハスハスするのも好きで……ハッ、いえ、本は読むものですよ。ええ」"
translation = "「책은 읽는 것도 바라보는 것도 부비부비하는 것도 킁카킁카하는 것도 좋아해서…… 핫, 아뇨, 책은 읽는 것이죠. 네」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「実は、本の感想を誰かと語り合いたいと思っているんですけど……私がこんななのであんまり……」"
translation = "「사실은, 책의 감상을 누군가와 나누고 싶다고 생각하고 있지만…… 제가 이래서 별로……」"

[[dialogue]]
speaker = "unk"
original = "じゃあさっきのおすすめ借りるよ"
translation = "그럼 아까 추천한 거 빌릴게"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「！\u3000それって……その、私と……？」"
translation = "「! 그건…… 그, 저랑……?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「じゃ、じゃあカウンターで待っていますね。図書館のご利用、ありがとうございますっ」"
translation = "「그, 그럼 카운터에서 기다리고 있을게요. 도서관 이용, 감사합니다!」"

