[[dialogue]]
speaker = "unk"
original = "第２話,３０００年前の雪辱を,B"
translation = "제2화, 3000년 전의 설욕을"

[[dialogue]]
speaker = "unk"
original = "あれはしばらく前のこと──"
translation = "그것은 얼마 전의 일──"

[[dialogue]]
speaker = "アナ"
original = "「会長、いかがでしたか。トリュファイナさんへの応援要請は」"
translation = "「회장, 어떻게 되었습니까? 트류파이나 씨에 대한 지원 요청은」"

[[dialogue]]
speaker = "クロト"
original = "「……快諾してもらえた。ルヴィネが重傷を負った時に備えて、目視できない霊体の姿でついてきてくれる」"
translation = "「……흔쾌히 승낙받았어. 루비네가 중상을 입었을 때를 대비해서, 보이지 않는 영체의 모습으로 따라와 주기로 하셨어」"

[[dialogue]]
speaker = "クロト"
original = "「３０００年前に、ラクシスを癒すことができなかった雪辱を果たす、ってさ」"
translation = "「3000년 전에 락시스를 치유하지 못했던 설욕을 씻겠다고 하시더군」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よかったじゃない！\u3000これなら万が一の時にも安心ねっ」"
translation = "「잘됐잖아! 이러면 만에 하나의 상황에도 안심이네」"

[[dialogue]]
speaker = "unk"
original = "これはある意味、現実的すぎて非情とさえ言えるプラン。"
translation = "이것은 어떤 의미로 너무나 현실적이어서 비정하다고까지 할 수 있는 플랜."

[[dialogue]]
speaker = "unk"
original = "ルヴィネ死亡の未来が変えられなかった時に備えて──『<b>重傷を負ってから蘇生の魔法を施す</b>』という力技だ。"
translation = "루비네 사망이라는 미래를 바꾸지 못했을 때를 대비해── 『<b>중상을</b> <b>입고</b> <b>나서</b> <b>소생</b> <b>마법을</b> <b>베푼다</b>』라는 억지 기법이다."

[[dialogue]]
speaker = "unk"
original = "死に瀕した者を救う奇蹟を起こせるのは、クラウディアと同等の魔力を持つ光の魔女、トリュファイナさんを置いて他にいない。"
translation = "죽어가는 자를 구하는 기적을 일으킬 수 있는 것은 클라우디아와 동등한 마력을 지닌 빛의 마녀, 트류파이나 씨 말고는 존재하지 않는다."

[[dialogue]]
speaker = "unk"
original = "トリュファイナさんは、俺が魔王ラクシスの生まれ変わりであることを自覚したその時に、現代への奇蹟の再誕を果たした魔女。"
translation = "트류파이나 씨는 내가 마왕 락시스의 환생임을 자각했을 때, 현대에 기적적으로 재탄생한 마녀."

[[dialogue]]
speaker = "unk"
original = "普段は特殊な義体に収まって生活しているが、決して受肉したわけではなく、本質的には守護天使に近しい存在だ。ひとたび義体を脱ぎ去れば、彼女自身は霊体として存在している。"
translation = "평소에는 특수한 의체에 들어가 생활하고 있지만 결코 육체를 얻은 것은 아니며, 본질적으로는 수호천사에 가까운 존재다. 일단 의체를 벗어던지면 그녀 자신은 영체로 존재하게 된다."

[[dialogue]]
speaker = "unk"
original = "その霊体も、『縁を結んだ相手にしか見えない』という特性を持っている……それが今回の強みになる。"
translation = "그 영체 또한 『인연을 맺은 상대에게만 보인다』라는 특성을 가지고 있다…… 그것이 이번 작전의 강점이다."

[[dialogue]]
speaker = "サーシャ"
original = "「作戦どおり、すべてを承知してもらえたのかしら～？」"
translation = "「작전대로 모든 걸 다 수락해 준 거겠지~?」"

[[dialogue]]
speaker = "クロト"
original = "「ええ。癒し手のあの人には酷な頼みでしたけど……」"
translation = "「예. 치유사인 그분에게는 혹독한 부탁이었습니다만……」"

[[dialogue]]
speaker = "unk"
original = "霊体の強みを生かすために、彼女の存在は徹底して隠す必要がある。ただでさえ、ルヴィネの力は未知数だ。"
translation = "영체의 강점을 살리기 위해서는 그녀의 존재를 철저히 숨길 필요가 있다. 안 그래도 루비네의 힘은 미지수다."

[[dialogue]]
speaker = "unk"
original = "霊力を扱う彼女には、一目で看破されてしまうかも──そうなれば、戦闘力に特化していないヒーラーは格好の餌食。"
translation = "영력을 다루는 그녀에게는 한눈에 간파당할지도 모른다── 그렇게 된다면 전투력에 특화되지 않은 힐러는 좋은 먹잇감이다."

[[dialogue]]
speaker = "unk"
original = "だから徹底して息をひそめてもらう。俺たちがどんなに傷ついても、影から魔法で癒すことはあってはならない。"
translation = "그러니 철저하게 숨을 죽여달라고 했다. 우리가 아무리 상처 입어도 그림자 속에서 마법으로 치료해 주는 일은 결코 없어야 한다고."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンド戦の間は何があっても傍観し──ルヴィネが致命傷を負った時にのみ、魔法を行使してくれと伝えたのだ。"
translation = "디재스터 핸드와의 전투 동안에는 무슨 일이 있어도 방관하고── 루비네가 치명상을 입었을 때에만 마법을 행사해 달라고 전했던 것이다."

[[dialogue]]
speaker = "アナ"
original = "「しかし会長、顔色が優れませんね。何か懸念でも？」"
translation = "「하지만 회장, 안색이 좋지 않군요. 무슨 우려라도 있습니까?」"

[[dialogue]]
speaker = "クロト"
original = "「……瀕死の者を治癒する大魔法の準備に、時間がひどくかかるらしい」"
translation = "「……빈사 상태의 사람을 치유하는 대마법은 준비하는 데 시간이 무척 걸린다고 해」"

[[dialogue]]
speaker = "クロト"
original = "「だから、いざ準備を始めたとしても、間に合わないかもしれないと言われた」"
translation = "「그래서 막상 준비를 시작한다 하더라도 시간에 맞추지 못할지도 모른다고 하더군」"

[[dialogue]]
speaker = "マトイ"
original = "「……そう、なんだ」"
translation = "「……그렇구나」"

[[dialogue]]
speaker = "クロト"
original = "「みんな。これは極星学園生にもジグたちにも秘密の作戦になる。いざという時は、死力を尽くして時間を稼ぐことになる──覚悟しておいてくれ」"
translation = "「모두들. 이건 극성학원 학생들에게도, 지그 일행에게도 비밀인 작전이다. 만약의 사태에는 목숨을 바쳐 시간을 벌어야 해── 각오해 둬」"

[[dialogue]]
speaker = "チナ"
original = "「……っ！？\u3000なんだ、急に空気があったかく……？」"
translation = "「……!? 뭐지, 갑자기 공기가 따뜻해져서……?」"

[[dialogue]]
speaker = "グレイス"
original = "「回復の星術……いえ。星力じゃありませんっ──これは！？」"
translation = "「회복의 성술…… 아니, 성력이 아닙니다── 이건!?」"

[[dialogue]]
speaker = "クロト"
original = "「トリュファイナさん！\u3000ルヴィネをお願いします！！」"
translation = "「트류파이나 씨! 루비네를 부탁드립니다!!」"

[[dialogue]]
speaker = "レティシア"
original = "「……トリュ、ファイナ？」"
translation = "「……트류, 파이나?」"

[[dialogue]]
speaker = "クロト"
original = "「君たちの目の前にいる──光の魔女だ！\u3000彼女がルヴィネを治療する！！」"
translation = "「너희 눈앞에 있는── 빛의 마녀다! 그녀가 루비네를 치료할 거야!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私たちの目の前って…………ぁあっ！？」"
translation = "「우리 눈앞이라니………… 아앗!?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「お待たせして申し訳ございません……！\u3000光の魔女トリュファイナ！\u3000ここに！」"
translation = "「오래 기다리게 해서 정말 죄송합니다……! 빛의 마녀 트류파이나! 여기에!」"

[[dialogue]]
speaker = "チナ"
original = "「ひかりのまじょ……光の魔女って、あの！？\u3000おとぎ話に出てくる！？」"
translation = "「빛의 마녀…… 빛의 마녀라니, 그!? 동화 속에 나오는!?」"

[[dialogue]]
speaker = "グレイス"
original = "「え、えっ！？\u3000貴女は購買部の店員さん──そんなすごい御方だったんですか！？」"
translation = "「에, 엣!? 당신은 매점의 점원 누나── 그렇게 대단한 분이셨나요!?」"

[[dialogue]]
speaker = "レティシア"
original = "「世界の各地で言い伝えの残る──伝説の魔女！？」"
translation = "「세계 도처에 전설로 남아있는── 전설의 마녀!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「で、できるんですか！？\u3000ルヴィを、助けてもらえるんですかっ！？」"
translation = "「하, 할 수 있는 건가요!? 루비를 구해줄 수 있는 건가요!?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「お任せください！\u3000再生の奇蹟を今ここに──ウルティマ・リプロダクション！！」"
translation = "「맡겨주십시오! 재생의 기적을 지금 여기에── 울티마 리프로덕션!!」"

[[dialogue]]
speaker = "ジグ"
original = "「驚いたね。まさか光の魔女とも知り合いだったとは」"
translation = "「놀랍군. 설마 빛의 마녀와도 아는 사이였을 줄이야」"

[[dialogue]]
speaker = "ジグ"
original = "「……君から未来を訊ねられるたび、心苦しかった。ルヴィネが死を避けられない致命傷を負う未来は、何を準備しても変わらなかったからね」"
translation = "「……네가 미래를 물어볼 때마다 마음이 아팠어. 루비네가 죽음을 피할 수 없는 치명상을 입는 미래는 어떤 준비를 해도 바뀌지 않았으니까 말이야」"

[[dialogue]]
speaker = "クロト"
original = "「奥の手を隠していたのは申し訳ない……」"
translation = "「비장의 카드를 숨기고 있었던 건 미안하게 생각한다……」"

[[dialogue]]
speaker = "クロト"
original = "「ただ──それを逆手に取ったのがプランＢだ。未来が変えられない時に敢えて備えた保険──ここから先の結末は、俺も君も知らない」"
translation = "「다만── 그것을 역이용한 것이 플랜 B다. 미래를 바꿀 수 없을 때 굳이 대비해 둔 보험── 여기서부터의 결말은 나도 너도 몰라」"

[[dialogue]]
speaker = "ジグ"
original = "「詳しく説明してくれれば、重傷を負ったそのもう少し先を、意識して覗くこともできたと思うよ？」"
translation = "「자세히 설명해 줬다면, 중상을 입은 그 조금 더 먼 미래를 의식해서 엿볼 수도 있었을 텐데?」"

[[dialogue]]
speaker = "ジグ"
original = "「そうすれば魔女の奇蹟が実るかどうかも確認できたはず──どうしてしなかったんだい？」"
translation = "「그랬다면 마녀의 기적이 결실을 맺을 수 있을지도 확인할 수 있었을 텐데── 어째서 말하지 않았지?」"

[[dialogue]]
speaker = "クロト"
original = "「視えないからこそ希望が持てる……全ての可能性が閉ざされてしまうと、後に残るのは絶望だけだ」"
translation = "「보이지 않기에 희망을 품을 수 있는 거야…… 모든 가능성이 닫혀버리면 뒤에 남는 것은 절망뿐이니까」"

[[dialogue]]
speaker = "unk"
original = "もしもルヴィネが致命傷を負わない未来が視えたら、それで万々歳だったが──今日までそのビジョンは現れなかった。"
translation = "만약 루비네가 치명상을 입지 않는 미래가 보였다면 그것으로 대만족이었겠지만── 오늘까지 그 비전은 나타나지 않았다."

[[dialogue]]
speaker = "クロト"
original = "「トリュファイナさんは俺が切れる最後のジョーカー。もしも、あの人でも蘇生が不可能という未来を知ってしまったら──」"
translation = "「트류파이나 씨는 내가 꺼낼 수 있는 마지막 조커야. 만약 그분으로도 소생이 불가능하다는 미래를 알아버렸다면──」"

[[dialogue]]
speaker = "ジグ"
original = "「もう打つ手がないから、訊かなかった。そういうことか」"
translation = "「더는 손쓸 도리가 없으니 묻지 않았다, 그런 뜻인가」"

[[dialogue]]
speaker = "ジグ"
original = "「……君は意外としたたかというか、リアリストなんだね。見直したよ」"
translation = "「……너는 의외로 끈덕지다고 해야 할지, 현실주의자구나. 다시 봤어」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「……話を聞いていなかったの？\u3000あの木偶は助からない。光の魔女だなんて隠し玉は驚きだったけれど、それでどうにかできる負傷ではないわ」"
translation = "「……이야기를 듣지 않은 거야? 저 나무인형은 살아날 수 없어. 빛의 마녀라는 숨겨둔 카드는 놀라웠지만, 그걸로 어떻게 해볼 수 있는 상처가 아니야」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「よしんば復活できたとして、あれはもう霊力を扱えない。戦う術もない置物にすぎないのに。不合理ね」"
translation = "「설령 살아난다 하더라도 저건 이제 영력을 다룰 수 없어. 싸울 방도조차 없는 장식품에 불과한데, 비합리적이네」"

[[dialogue]]
speaker = "クロト"
original = "「──お前にはわからないだろうな。命を摘むということを、何とも思わない虚ろなお前には！」"
translation = "「──네놈은 이해하지 못하겠지. 생명을 앗아가는 것을 아무렇지도 않게 생각하는 텅 빈 너로서는!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「私、あんたのことすっごく嫌いだわ！\u3000ビームで黒焦げにしてやるから覚悟しなさい！！」"
translation = "「나, 네년이 정말이지 너무 싫어! 빔으로 까맣게 태워버릴 테니 각오하라고!!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「いきましょう姉さん。決着をつけます！」"
translation = "「가자, 언니. 결판을 내자!」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ！\u3000気合い十分だ、行くぞっ！」"
translation = "「아아! 기합은 충분하다, 가자!」"

[[dialogue]]
speaker = "煌嶺"
original = "「やれやれ。たかが１人の天使が生きるの死ぬので大騒ぎ……痒くてかなわん」"
translation = "「이런 이런. 고작 천사 한 마리가 살고 죽는 것으로 호들갑이라니…… 가려워서 견딜 수가 없구나」"

[[dialogue]]
speaker = "煌嶺"
original = "「──が。ルヴィネの複製とやらにはひどくそそられる。本物の代わりに味見といくか！」"
translation = "「──허나, 루비네의 복제품이라는 것에는 꽤 흥미가 돋는구나. 진짜 대신에 맛이라도 봐볼까!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「──お父様に仇なす魔王、緋宮クロト。その目障りな血統に、女神の搾りカス。そして……」"
translation = "「──아버님을 적대하는 마왕, 히노미야 쿠로토. 그 눈에 거슬리는 혈통에, 여신의 찌꺼기. 그리고……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>によって『近似世界』が複数生まれるきっかけを作った、光の魔女──」"
translation = "「<ruby>봉리재탄<rt>레나투스</rt></ruby>에 의해 『근사 세계』가 복수 태어나는 계기를 만든 빛의 마녀──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「全員、処断するわ。今──この場で！！！」"
translation = "「전원 처단하겠어. 지금── 이 자리에서!!!」"

