[[dialogue]]
speaker = "unk"
original = "第２話,バカっていうやつがバカなんだぞ！,P"
translation = "제2화, 바보라고 하는 녀석이 바보라구!, P"

[[dialogue]]
speaker = "unk"
original = "メテオラとエンジュが流星市国を訪れる前。出会ったばかりの頃の出来事。"
translation = "메테오라와 엔쥬가 유성시국을 방문하기 전. 막 만났을 무렵의 이야기."

[[dialogue]]
speaker = "メテオラ"
original = "「おりゃー、ぼんぼんグレネードっ！」"
translation = "「오랴아—, 봉봉 그레네이드!」"

[[dialogue]]
speaker = "エンジュ"
original = "「甘いっ！\u3000ヴェンジフル・エクリプス！」"
translation = "「물러! 벤지풀 에클립스!」"

[[dialogue]]
speaker = "メテオラ"
original = "「ふふーん、そのくらいじゃ、あたしはやられないぞっ！\u3000どっかんミサーイルッ！」"
translation = "「후후—ㄴ, 그 정도로는 나를 쓰러뜨릴 수 없다구! 독캉 미사—일!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ふう……やるじゃないか。メテオラっていったか」"
translation = "「후우…… 제법이잖아. 메테오라라고 했나.」"

[[dialogue]]
speaker = "メテオラ"
original = "「エンジュもなかなかやるなー！\u3000あたしが思いっきりやっても壊れないやつは、あんましいないぞ！」"
translation = "「엔쥬도 꽤 하는걸! 내가 마음껏 해도 부서지지 않는 녀석은 별로 없다구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「お前の強さは認めるよ、認めるけどな……ぼんぼんとかどっかんとか……」"
translation = "「네 실력은 인정해, 인정하지만…… 봉봉이라느니 독캉이라느니……」"

[[dialogue]]
speaker = "エンジュ"
original = "「メテオラの技の名前……いくらなんでもバカっぽくないか？」"
translation = "「메테오라의 기술 이름…… 아무리 그래도 너무 바보 같지 않아?」"

[[dialogue]]
speaker = "メテオラ"
original = "「えぇーっ！？\u3000あたし、バカなのかー！？」"
translation = "「에에—!? 나, 바보인 거야—!?」"

[[dialogue]]
speaker = "エンジュ"
original = "「えっ、まあ……どちらかといえば……」"
translation = "「엣, 뭐…… 어느 쪽이냐고 한다면……」"

[[dialogue]]
speaker = "メテオラ"
original = "「ショックだぞ！？\u3000バカなんて初めて言われたぞ！」"
translation = "「쇼크라구!? 바보라는 소리 처음 들었어!」"

[[dialogue]]
speaker = "エンジュ"
original = "「……初めてか。みんな優しいんだな」"
translation = "「……처음인가. 다들 친절했나 보네.」"

[[dialogue]]
speaker = "メテオラ"
original = "「人にバカって言っちゃいけないんだぞ！\u3000バカって言う方がバカなんだぞ！」"
translation = "「남한테 바보라고 말하면 안 된다구! 바보라고 말하는 쪽이 바보라구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「誰がバカだ！\u3000それなら今バカって言ったメテオラもバカだろ！」"
translation = "「누가 바보라는 거야! 그렇다면 방금 바보라고 말한 메테오라도 바보잖아!」"

[[dialogue]]
speaker = "メテオラ"
original = "「ホントだ！\u3000バカになっちゃったぞ！？\u3000あたしはおバカだったのかー……」"
translation = "「정말이다! 바보가 되어버렸어!? 나 바보였던 거야—……」"

[[dialogue]]
speaker = "エンジュ"
original = "「えっ、本気でショック受けてる……？\u3000ごめん、メテオラ……」"
translation = "「엣, 진심으로 쇼크 받았어……? 미안, 메테오라……」"

[[dialogue]]
speaker = "エンジュ"
original = "（もしかして、あたし、言っちゃいけないことを言っちゃったのか……？\u3000正直、みんな思っていても指摘しなかっただけだと思うが……）"
translation = "(혹시 나, 해서는 안 될 말을 해버린 건가……? 솔직히 다들 생각은 하고 있어도 지적하지 않았을 뿐이라고 생각하지만……)"

[[dialogue]]
speaker = "エンジュ"
original = "「あー……こほん。つまり、あたしが言いたいのはな。今のままじゃ、メテオラは星騎士たちにバカだと思われそうということだ」"
translation = "「아—…… 크흠. 그러니까 내가 하고 싶은 말은 말이야. 지금 이대로라면 메테오라는 성기사들에게 바보라고 생각될 것 같다는 거야.」"

[[dialogue]]
speaker = "メテオラ"
original = "「なんだとー！\u3000星騎士め！\u3000許さないぞ！」"
translation = "「뭐라구—! 성기사 놈들! 용서 못 한다구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「よし、その意気だ。賢そうな名前をつけて、星騎士たちを見返してやろう」"
translation = "「좋아, 그 기세다. 똑똑해 보이는 이름을 지어서 성기사 놈들에게 본때를 보여주자.」"

[[dialogue]]
speaker = "メテオラ"
original = "「おー！\u3000頭のいい名前つけるぞー！」"
translation = "「오—! 머리 좋은 이름 지을 거야—!」"

[[dialogue]]
speaker = "エンジュ"
original = "「──よし、いくつか考えてみた。なかなかの自信作だ。読んでみろ」"
translation = "「──좋아, 몇 가지 생각해 봤어. 나름 자신작이다. 읽어봐.」"

[[dialogue]]
speaker = "メテオラ"
original = "「おーっ！\u3000えーっと……とーむなえ・ばずめーじぇ……？\u3000くらーめしゅ……な・かたふとろーは……？\u3000なんだ、これー？」"
translation = "「오—! 에— 그러니까…… 도—무나에 바즈메—제……? 쿠라—메슈…… 나 카타프토로—하……? 뭐야 이게—?」"

[[dialogue]]
speaker = "エンジュ"
original = "「格好いいだろ！\u3000溢れる知性で星騎士たちも恐れおののくに違いない」"
translation = "「멋지지! 넘치는 지성으로 성기사들도 공포에 떨 게 분명해.」"

[[dialogue]]
speaker = "メテオラ"
original = "「……難しすぎだぞ。舌噛みそう……あたしのミサイルも困って、ヘロヘロだぞ……」"
translation = "「……너무 어렵다구. 혀 깨물 것 같아…… 내 미사일도 곤란해서 헤롱헤롱하다구……」"

[[dialogue]]
speaker = "エンジュ"
original = "「慣れだ、慣れ。格好いい技名と決めポーズとともに放つ、逃げ場のないほどの多数のミサイル……うんうん、映えるじゃないか」"
translation = "「익숙해지면 돼. 멋진 기술 이름과 결정 포즈와 함께 쏘는, 도망칠 곳 없는 수많은 미사일…… 음음, 잘 어울리잖아.」"

[[dialogue]]
speaker = "メテオラ"
original = "「あー、あたし、知ってる。こういうのチューニビョーって言うんだぞ！」"
translation = "「아— 나 알고 있어. 이런 거 중이병이라고 하는 거라구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「チュ……誰が厨二病だ！？\u3000どうしてそんな言葉は知っている！\u3000あたしは拗らせてなんか、ない！」"
translation = "「중…… 누가 중이병이라는 거야!? 어떻게 그런 말은 알고 있는 거지! 나는 그런 병 같은 거 안 걸렸어!」"

[[dialogue]]
speaker = "メテオラ"
original = "「わけわかんないのより、どっかんミサイルの方がカッコいいぞ！」"
translation = "「영문 모를 이름보다 독캉 미사일이 더 멋지다구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「あたしの方が格好いい！\u3000バカにされちゃえばいいんだ、バカメテオラ！\u3000バーカバーカ！」"
translation = "「내 쪽이 더 멋져! 바보 취급이나 당하라지, 바보 메테오라! 바보바보!」"

[[dialogue]]
speaker = "メテオラ"
original = "「またバカってゆったなー！？\u3000エンジュのバーカバーカ！\u3000バカエンジュ！\u3000イーーーッだ！\u3000もうお喋りしてあげない！」"
translation = "「또 바보라고 말했네—!? 엔쥬 바보바보! 바보 엔쥬! 에—베—다! 이제 대화 안 해줄 거야!」"

[[dialogue]]
speaker = "エンジュ"
original = "「さすがにちょっと言い過ぎたよな……っていうか、あたし、厨二病なんかじゃないよな……？」"
translation = "「역시 좀 심했나…… 그보다 나, 중이병 같은 거 아니지……?」"

[[dialogue]]
speaker = "メテオラ"
original = "「おー、エンジュ、どうしたんだー？\u3000元気ないぞ」"
translation = "「오— 엔쥬, 왜 그래—? 기운이 없다구.」"

[[dialogue]]
speaker = "エンジュ"
original = "「メ、メテオラ……！？\u3000お前、あたしに話しかけないんじゃなかったのか……？」"
translation = "「메, 메테오라……!? 너, 나한테 말 안 걸기로 한 거 아니었어……?」"

[[dialogue]]
speaker = "メテオラ"
original = "「なんでだー？\u3000エンジュとお喋りしないと寂しいぞ。エンジュはあたしのこと、嫌いになっちゃったのかー？」"
translation = "「왜—? 엔쥬랑 대화 안 하면 외롭다구. 엔쥬는 내가 싫어진 거야—?」"

[[dialogue]]
speaker = "エンジュ"
original = "「あたしたち、さっきケンカしてただろ……」"
translation = "「우리 아까 싸웠잖아……」"

[[dialogue]]
speaker = "メテオラ"
original = "「そーだったかー？\u3000もう忘れた！\u3000細かいことはどーでもいーからな！\u3000あははは！」"
translation = "「그랬던가—? 벌써 잊었어! 세세한 건 아무래도 좋으니까! 아하하하!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ぷっ……！\u3000なんだ、それ……あたしは気にしてたのに……細かいことで悩んでた自分がバカみたいじゃないか」"
translation = "「풋……! 뭐야 그게…… 나는 신경 쓰고 있었는데…… 사소한 일로 고민하던 내가 바보 같잖아.」"

[[dialogue]]
speaker = "メテオラ"
original = "「エンジュはバカじゃないぞ？」"
translation = "「엔쥬는 바보 아니라구?」"

[[dialogue]]
speaker = "エンジュ"
original = "「……わかってるよ。メテオラ、お前もバカなんかじゃない。あたしが悪かった」"
translation = "「……알고 있어. 메테오라, 너도 바보 같은 게 아냐. 내가 잘못했어.」"

[[dialogue]]
speaker = "メテオラ"
original = "「おー？\u3000なんで謝った？\u3000悪いことしたのか？」"
translation = "「오—? 왜 사과해? 나쁜 짓 했어?」"

[[dialogue]]
speaker = "unk"
original = "結局メテオラの技は、彼女のフィーリングによって現在のものに至ったのだった。"
translation = "결국 메테오라의 기술은 그녀의 감각에 따라 현재의 것에 이르게 된 것이었다."

