[[dialogue]]
speaker = "unk"
original = "――果たして、ナミエルとアム達は巨大スノーマンを倒すことに成功し、アステラは消滅を開始した。"
translation = "――결국 나미엘과 아무 일행은 거대 스노맨을 쓰러뜨리는 데 성공했고, 아스테라는 소멸하기 시작했다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「わぁっ♪\u3000本当に外にも光る雪が降ってるよ。ホワイトクリスマスだ～♪」"
translation = "「와아♪ 정말 밖에도 빛나는 눈이 내리고 있어. 화이트 크리스마스네~♪」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「２人共、ありがとう。おかげで冬の力、戻ったみたい」"
translation = "「둘 다 고마워. 덕분에 겨울의 힘이 돌아온 것 같아.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ。これが私たちの――星騎士の仕事ですから」"
translation = "「아뇨. 이것이 저희―― 성기사의 일이니까요.」"

[[dialogue]]
speaker = "unk"
original = "それから夜になり、流星寮ではクリスマスパーティーが開催されていた。"
translation = "그 후 밤이 되어 유성 기숙사에서는 크리스마스 파티가 열리고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ナミエル～、お疲れ～！」"
translation = "「나미엘~ 수고했어~!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「アム先輩、お疲れ様です」"
translation = "「아무 선배님, 수고하셨습니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いや～、１メートル以上離れられない縛りも無事に解けたみたいで、よかったね♪」"
translation = "「이야~ 1미터 이상 떨어질 수 없던 제약도 무사히 풀린 것 같아서 다행이야♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい。なので、今夜のパーティーが終わったら、久しぶりに寝間着に着替えて、１人でぐっすり寝られそうです」"
translation = "「네. 그래서 오늘 밤 파티가 끝나면 오랜만에 잠옷으로 갈아입고 혼자서 푹 잘 수 있을 것 같아요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え～？\u3000あたしとしては、１人だとむしろ落ち着かなくて、寝られなくなっちゃいそうだな～。今日もナミエルのところに泊まっちゃおうかな～？\u3000なんちゃって♪」"
translation = "「에~? 나는 혼자 있으면 오히려 마음이 안 놓여서 못 잘 것 같은데~. 오늘도 나미엘네 집에서 자버릴까~? 농담이야♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「アム先輩、そこまで私のことを心配して頂かなくても、大丈夫ですよ」"
translation = "「아무 선배님, 그렇게까지 저를 걱정해 주지 않으셔도 괜찮아요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えっ、もしかして……バレてる？」"
translation = "「엣, 혹시…… 들켰어?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい。このところずっと一緒にいましたから」"
translation = "「네. 요즘 계속 같이 있었으니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――とりあえず、クリスマスの装飾や料理が可愛いので、写真を撮って回ろうと思っています」"
translation = "「――일단 크리스마스 장식이나 요리가 귀여우니까 사진을 찍으러 돌아다닐 생각이에요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そっか……うん、いいね！\u3000それとまた、スノーマンと一緒に、３人で写真も撮ろうよ！\u3000スノーマンの記憶が戻った記念にさ♪」"
translation = "「그렇구나…… 응, 좋네! 그리고 또 스노맨이랑 같이 셋이서 사진도 찍자! 스노맨의 기억이 돌아온 기념으로 말이야♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「って、会長だ。ちょうどいいところに！\u3000お～い、会長～！」"
translation = "「어, 회장님이다. 마침 잘 왔네! 어~이, 회장님~!」"

[[dialogue]]
speaker = "unk"
original = "アムはクロトが会場内を歩いてくるのを見つけて、声をかける。"
translation = "아무는 쿠로토가 회장 안을 걸어오는 것을 발견하고 말을 건다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「会長、お願いがあるんだけど、いい？\u3000あたし達３人、写真撮って欲しくてさ～」"
translation = "「회장님, 부탁이 있는데 괜찮아? 우리 셋이 사진 찍고 싶어서 말이야~」"

[[dialogue]]
speaker = "unk"
original = "スノーマンはどこにいるんだ？"
translation = "스노맨은 어디 있지?"

[[dialogue]]
speaker = "unk"
original = "もちろんいいよ。それで"
translation = "물론 괜찮아. 그런데"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え……？」"
translation = "「어……?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あれ？\u3000そういえば、いなくなってる……？」"
translation = "「어라? 그러고 보니 없어졌네……?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「さっきまで、一緒にいたはずなんですけど……」"
translation = "「방금 전까지 같이 있었을 텐데……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルはふと、嫌な胸騒ぎがした。"
translation = "나미엘은 문득 불길한 예감이 들었다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（スノーマンが現れてから今まで、近くからいなくなったことなんて１度も……）"
translation = "（스노맨이 나타난 뒤로 지금까지 곁에서 사라진 적은 한 번도……）"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……私、ちょっと探してきます！」"
translation = "「……저, 잠깐 찾고 올게요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ！\u3000ナミエル、ちょっと待って！」"
translation = "「앗! 나미엘, 잠깐 기다려!」"

[[dialogue]]
speaker = "unk"
original = "ナミエルは胸騒ぎが止まらなくて、焦燥感と共に学園内を探し回った。"
translation = "나미엘은 불안감이 멈추지 않아 초조해하며 학원 안을 찾아다녔다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はぁっ……はぁっ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「スノーマン、一体どこに……？」"
translation = "「스노맨, 대체 어디에……?」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いた……！\u3000スノーマンッ！！」"
translation = "「찾았다……! 스노맨!!」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「ナミエル……」"
translation = "「나미엘……」"

[[dialogue]]
speaker = "unk"
original = "スノーマンは最初に出会った校門前で、１人ぼんやりと、空を見上げていた。"
translation = "스노맨은 처음 만났던 교문 앞에서 혼자 멍하니 하늘을 올려다보고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――ナミエル！\u3000スノーマンは見つかったの？」"
translation = "「――나미엘! 스노맨은 찾았어?」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「アムも……。見つかっちゃった……」"
translation = "「아무도……. 들켜버렸네……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「スノーマン、一体こんなところで何を……えっ？」"
translation = "「스노맨, 대체 이런 데서 뭘…… 엣?」"

[[dialogue]]
speaker = "unk"
original = "ナミエルは気づいて、目を見開く。"
translation = "나미엘은 알아차리고 눈을 크게 뜬다."

[[dialogue]]
speaker = "unk"
original = "スノーマンの体は……もはや見て分かる程に、<b>溶けかけていた</b>。"
translation = "스노맨의 몸은…… 이미 눈으로 보일 정도로 <ruby>녹아가고 있었다<rt>···· ···</rt></ruby>."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「どうして……体が溶けているんですか……？」"
translation = "「어째서…… 몸이 녹고 있는 건가요……?」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「ボク、本体が消えちゃったから……。それに、ボクの力も２人に渡したから……もう残ってないんだ」"
translation = "「나, 본체가 사라졌으니까……. 게다가 내 힘도 두 사람에게 줬으니까…… 이제 남은 게 없어.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「っ……！\u3000なんで……それを早く言ってくれなかったんですか！？」"
translation = "「윽……! 왜…… 그걸 진작 말해주지 않았나요!?」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「これは、どうしようもないことだから……それに……」"
translation = "「이건 어쩔 수 없는 일이니까…… 게다가……」"

[[dialogue]]
speaker_original = "スノーマンL"
speaker_translation = "스노우맨 L"
original = "「ボク……ナミエルの、クリスマスの<b>嫌な思い出</b>を……増やしたくなかった」"
translation = "「나…… 나미엘의 크리스마스에 대한 <ruby>나쁜 추억<rt>·· ··</rt></ruby>을…… 늘리고 싶지 않았어.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「スノーマン……私の、為に……？」"
translation = "「스노맨…… 나를 위해서……?」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「ボクのあとに生まれてくる、代わりのボクは多分……２人のことを覚えてないと思う……。季節の精霊は……そういう存在だから……」"
translation = "「내 뒤에 태어날 다음의 나는 아마…… 두 사람을 기억하지 못할 거야……. 계절의 정령은…… 그런 존재니까……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そんな……」"
translation = "「그럴 수가……」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「でも……できるなら――」"
translation = "「하지만…… 가능하다면――」"

[[dialogue]]
speaker_original = "スノーマンL"
speaker_translation = "스노우맨 L"
original = "「ナミエルとアムには、ボクとの記憶、覚えておいてくれると嬉しい……」"
translation = "「나미엘과 아무는 나와의 기억을 기억해 주면 기쁠 것 같아……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルは、ぎゅっと強く胸が締め付けられるような気持ちになる。それでも――"
translation = "나미엘은 가슴이 꽉 조여오는 듯한 기분이 든다. 그래도――"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい……決して、忘れません」"
translation = "「네…… 결코 잊지 않겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "ナミエルはスノーマンの目線に近づけるように、その場に膝を着いて、スノーマンの体に触れる。"
translation = "나미엘은 스노맨의 눈높이에 맞춰 그 자리에 무릎을 꿇고 스노맨의 몸을 만진다."

[[dialogue]]
speaker = "unk"
original = "そして、精一杯に微笑んで。"
translation = "그리고 있는 힘껏 미소 지으며."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「大切な、思い出ですから」"
translation = "「소중한 추억이니까요.」"

[[dialogue]]
speaker_original = "スノーマンL"
speaker_translation = "스노우맨 L"
original = "「ありがとう、ナミエル」"
translation = "「고마워, 나미엘.」"

[[dialogue]]
speaker_original = "スノーマンL"
speaker_translation = "스노우맨 L"
original = "「アムも、ありがとう。――バイバイ、２人共」"
translation = "「아무도 고마워. ――바이바이, 둘 다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしは……バイバイなんて言わないよ！」"
translation = "「나는…… 바이바이라고는 안 할 거야!」"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「死ぬんじゃなくて、生まれ変わるんでしょ？\u3000だから――」"
translation = "「죽는 게 아니라 다시 태어나는 거잖아? 그러니까――」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「またね、スノーマン」"
translation = "「또 봐, 스노맨.」"

[[dialogue]]
speaker_original = "スノーマンL"
speaker_translation = "스노우맨 L"
original = "「……！\u3000うんっ……♪」"
translation = "「……! 응……♪」"

[[dialogue]]
speaker = "unk"
original = "スノーマンは光に包まれて――"
translation = "스노맨은 빛에 휩싸여――"

[[dialogue]]
speaker_original = "スノーマン"
speaker_translation = "스노우맨"
original = "「またね、２人共――」"
translation = "「또 봐, 둘 다――」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、また……」"
translation = "「네, 다음에 또……」"

[[dialogue]]
speaker = "unk"
original = "そうして、スノーマンは光の中に溶けて……消えていった。"
translation = "그렇게 스노맨은 빛 속으로 녹아들어…… 사라져 갔다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……ナミエル、大丈夫？」"
translation = "「……나미엘, 괜찮아?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……はい、大丈夫です」"
translation = "「……네, 괜찮습니다.」"

[[dialogue]]
speaker = "unk"
original = "アムに見えないように目元を拭いながら、ナミエルは立ち上がる。"
translation = "아무에게 보이지 않게 눈가를 훔치며 나미엘은 일어선다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「スノーマンとの別れを悲しい思い出で終わらせたくないので。だから、クリスマスをちゃんと楽しまないと……！」"
translation = "「스노맨과의 이별을 슬픈 추억으로 끝내고 싶지 않으니까요. 그러니까 크리스마스를 제대로 즐겨야겠어요……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そっか……じゃあ――あたしとパーティーを思いっきり楽しもう♪」"
translation = "「그렇구나…… 그럼―― 나랑 파티를 마음껏 즐기자♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい」"
translation = "「네.」"

[[dialogue]]
speaker = "unk"
original = "ナミエルはアムに肩を組まれながら、一緒にパーティー会場へと戻っていくのだった。"
translation = "나미엘은 아무와 어깨동무를 한 채 함께 파티장으로 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "翌日。雪は積もっていなかった。まるで、降っていたことが夢であったかのように……。"
translation = "다음 날. 눈은 쌓여 있지 않았다. 마치 내렸던 것이 꿈이었던 것처럼……."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ナミエル～！」"
translation = "「나미엘~!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「アム先輩、おはようございます」"
translation = "「아무 선배님, 좋은 아침입니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ねぇ、それで、ナミエルはどうだった？」"
translation = "「있지, 그래서 나미엘은 어땠어?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ええ、私も――」"
translation = "「네, 저도――」"

[[dialogue]]
speaker = "unk"
original = "２人は頷き合って、同時に変身してみせる。"
translation = "두 사람은 서로 고개를 끄덕이며 동시에 변신해 보였다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――今朝起きてからも、クリスマスフォームの力は残ったままでした」"
translation = "「――오늘 아침에 일어난 후에도 크리스마스 폼의 힘은 그대로 남아 있었습니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「スノーマンからの、クリスマスプレゼントだね」"
translation = "「스노맨이 준 크리스마스 선물인가 봐.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい。最初は恥ずかしかったし、全然嬉しくなかったのに……今は前とは違う気持ちです」"
translation = "「네. 처음에는 부끄러웠고 전혀 기쁘지 않았는데…… 지금은 전과는 다른 기분이에요.」"

[[dialogue]]
speaker = "unk"
original = "ナミエルはそっと衣装に手を触れ、撫でる。"
translation = "나미엘은 가만히 의상을 어루만진다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あのさ、ナミエル。昨日はセンチメンタルな空気になっちゃったから、渡しそびれちゃったんだけど……」"
translation = "「저기 말이야, 나미엘. 어제는 분위기가 좀 그래서 전해주지 못했는데……」"

[[dialogue]]
speaker = "unk"
original = "アムはそう言って、鞄からある物を取り出して、手渡す。"
translation = "아무는 그렇게 말하며 가방에서 무언가를 꺼내 건네준다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「これ……もしかして、クリスマスプレゼントですか？」"
translation = "「이건…… 혹시 크리스마스 선물인가요?」"

[[dialogue]]
speaker = "unk"
original = "アムが渡したのは、ぬいぐるみだった。"
translation = "아무가 건네준 것은 인형이었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん。ナミエルに少しでも、クリスマスにいい思い出ができたらって、あたしから」"
translation = "「응. 나미엘에게 조금이라도 크리스마스에 좋은 추억이 생겼으면 해서 내가 준비했어.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「このぬいぐるみ……スノーマンにそっくりです！」"
translation = "「이 인형…… 스노맨이랑 똑 닮았어요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えへへっ、実はマリオンさんに頼んで、実際のスノーマンを見て作ってもらってたんだ～」"
translation = "「에헤헤, 사실 마리온 씨에게 부탁해서 실제 스노맨을 보고 만들어 달라고 했거든~」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私も、実は……」"
translation = "「저도 사실은……」"

[[dialogue]]
speaker = "unk"
original = "続いてナミエルが取り出したのは、なんと同じく、ぬいぐるみだった。"
translation = "이어서 나미엘이 꺼낸 것 또한 똑같이 인형이었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え？\u3000このトナカイのぬいぐるみ、あたしに用意してくれてたの！？」"
translation = "「에? 이 순록 인형, 나를 위해서 준비해 준 거야!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「は、はい。アム先輩とは、その……なんだかんだ親しくなったので……」"
translation = "「네, 네. 아무 선배와는, 그…… 이러니저러니 해도 친해졌으니까……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ありがとう、ナミエル！\u3000あたし、持っているぬいぐるみの中で、いちばん大切にするよ♪」"
translation = "「고마워, 나미엘! 나, 가지고 있는 인형 중에서 가장 소중히 간직할게♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あと……」"
translation = "「그리고……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「この前話した、両親の写真――久しぶりに、出してみたんです」"
translation = "「요전에 말씀드렸던 부모님 사진―― 오랜만에 꺼내 봤어요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「！\u3000お父さんとお母さんの写真を……？」"
translation = "「! 아빠랑 엄마 사진을……?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい。たとえ２度と会えなくても……そのヒトと一緒にいた記憶は、私にとって大切なものだって気づいたんです」"
translation = "「네. 설령 두 번 다시 만날 수 없어도…… 그 사람과 함께 있었던 기억은 저에게 소중한 것이라는 걸 깨달았거든요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「両親やスノーマンのことは、すごく寂しくて辛いですけど……でも、それを忘れてなかったことにしてしまう方が、もっと寂しいって」"
translation = "「부모님이나 스노맨의 일은 몹시 외롭고 괴롭지만…… 하지만, 그걸 잊어서 없었던 일로 해버리는 게 훨씬 더 외로운 일이라고요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「たとえ思い出して辛くなってしまう時があっても、一緒に過ごした楽しい思い出はしっかりと覚えておきたいって、今回のクリスマスでそう思ったんです」"
translation = "「설령 떠올려서 괴로워지는 때가 있더라도, 함께 보냈던 즐거운 추억은 확실하게 기억해 두고 싶다고 이번 크리스마스에 그렇게 생각했어요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そっか……ナミエルが少しでもクリスマスを楽しかったって思えたなら、よかったよ」"
translation = "「그렇구나…… 나미엘이 조금이라도 크리스마스가 즐거웠다고 생각했다면 다행이야.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「それってつまり……あたしとの共同生活が楽しかったってことでもあるしね♪」"
translation = "「그건 즉…… 나랑 같이 생활한 게 즐거웠다는 뜻이기도 하니까♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えっ？\u3000べ、別に、そうとは言ってませんけど……」"
translation = "「엣? 따, 딱히 그렇게 말하진 않았습니다만……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あれ、照れてる？\u3000ナミエル、もしかして照れてる～？」"
translation = "「어라, 부끄러워해? 나미엘, 혹시 부끄러워하는 거야~?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「っ……知りませんっ！\u3000もう行きますから……！\u3000ごきげんよう、アム先輩！」"
translation = "「윽…… 모릅니다! 이제 갈 거니까요……! 평안하시길, 아무 선배!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あっ、ごめんって！\u3000途中まで一緒に行こうよ、ナミエルってば～！」"
translation = "「앗, 미안하다니까! 도중까지 같이 가자, 나미엘~!」"

[[dialogue]]
speaker = "unk"
original = "ぬいぐるみが沢山置かれた、ナミエルの部屋。"
translation = "인형이 잔뜩 놓인 나미엘의 방."

[[dialogue]]
speaker = "unk"
original = "その中には、ナミエルが幼い頃に撮った両親との写真が置かれていて。"
translation = "그 안에는 나미엘이 어릴 적에 찍은 부모님과의 사진이 놓여 있고."

[[dialogue]]
speaker = "unk"
original = "そして、その横にはもう１つ――"
translation = "그리고 그 옆에는 또 하나――"

[[dialogue]]
speaker = "unk"
original = "アムとスノーマンと一緒に撮った記念写真が、新たに飾られているのだった。"
translation = "아무와 스노맨과 함께 찍은 기념사진이 새롭게 장식되어 있는 것이었다."

