[[dialogue]]
speaker = "unk"
original = "第４話,もしも年下の幼なじみだったら,P"
translation = "제4화, 만약 연하의 소꿉친구라면, P"

[[dialogue]]
speaker = "unk"
original = "その日は休日で、メルエルが俺の家へ遊びにやってきていた。"
translation = "그날은 휴일이라 메르엘이 우리 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ふんふん、ふふふ～ん♪\u3000今日は会長くんと２人っきりで、ゆっくり過ごせる日～♪\u3000えへへへへへぇ<emoji=heart04>」"
translation = "「흠흠, 흐흐흐~음♪ 오늘은 회장군이랑 단둘이서 느긋하게 보낼 수 있는 날~♪ 에헤헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今日はリトルフォームなんだな"
translation = "오늘은 리틀 폼이구나."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「うん♪\u3000今日は、『年下の幼なじみ』になったつもりで、会長くんとイチャイチャしたいな～と思って<emoji=heart04>」"
translation = "「응♪ 오늘은 『연하의 소꿉친구』가 된 셈 치고 회장군이랑 꽁냥꽁냥하고 싶어서<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「それにおっきい私のままだと、まだちょっと恥ずかしいけど……今日は１日中、ベタベタしちゃいたいから<emoji=heart04>」"
translation = "「게다가 커다란 나 그대로면 아직 좀 부끄럽지만…… 오늘은 하루 종일 딱 붙어 있고 싶으니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は全然、ウェルカムだけど"
translation = "난 언제든 환영이지만."

[[dialogue]]
speaker = "unk"
original = "１日中、キスしちゃう？"
translation = "하루 종일 키스해 버릴까?"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あぅぅ<emoji=heart04>\u3000それもすっごく魅力的だけど、キスばっかりしてると、できないこともあるから……」"
translation = "「아우우<emoji=heart04> 그것도 굉장히 매력적이지만, 키스만 하고 있으면 못 하는 일도 있으니까……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「１日中キスしちゃうデートは、また今度にしよ<emoji=heart04>」"
translation = "「하루 종일 키스하는 데이트는 다음에 하자<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「それでね、会長くんと同級生なのは、とっても運命を感じちゃって、嬉しいことなんだけど……」"
translation = "「그리고 말이야, 회장군이랑 동급생인 건 정말 운명이 느껴져서 기쁜 일이지만……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんってとっても男らしいから、もし私が会長くんに甘えられる立場の、年下の幼なじみだったら、どんな風になってたんだろうって思ったの<emoji=heart04>」"
translation = "「회장군은 무척 남자다우니까, 만약 내가 회장군한테 어리광 부릴 수 있는 처지인 연하의 소꿉친구였다면 어떤 느낌이었을까 생각했어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「だから今日１日、『年下幼なじみごっこ』してみたいんだけど、どうかなぁ？」"
translation = "「그러니까 오늘 하루, 『연하 소꿉친구 놀이』 해보고 싶은데 어때?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――ふふっ、ありがとう<emoji=heart04>\u3000じゃあ今日は、年下として甘えちゃうね、会長くん<emoji=heart04>」"
translation = "「――후훗, 고마워<emoji=heart04> 그럼 오늘은 연하로서 어리광 부릴게, 회장군<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはベッドのふちに腰掛けて、向き合って座る。"
translation = "그러고 나서 우리는 침대 가장자리에 마주 보고 앉는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くん、あのね、私の頭……優しく撫でて欲しいの<emoji=heart04>」"
translation = "「회장군, 저기 말이야, 내 머리…… 상냥하게 쓰다듬어 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ヴィーナスちゃんが褒めてもらってる時に、会長くんによく撫でてもらってるでしょ？\u3000実は私、あれがずっと羨ましいな～って思ってて……」"
translation = "「비너스짱이 칭찬받을 때 회장군이 자주 쓰다듬어 주잖아? 사실 나, 그게 계속 부러웠거든……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「おっきい私だと、恥ずかしくてなかなか言い出せなかったから……今日は恋人として思いっきり甘えたいな～って<emoji=heart04>」"
translation = "「커다란 나일 때는 부끄러워서 좀처럼 말을 못 꺼냈으니까…… 오늘은 연인으로서 마음껏 어리광 부리고 싶어~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はメルエルのおねだりに応えて、頭に手を置いて、優しく撫でる。"
translation = "나는 메르엘의 부탁에 응해 머리에 손을 얹고 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あっ<emoji=heart04>\u3000えへへ<emoji=heart04>\u3000会長くんの手、優しくて……大好き<emoji=heart04>」"
translation = "「앗<emoji=heart04> 에헤헤<emoji=heart04> 회장군의 손, 따뜻해서…… 정말 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんに撫でられてると、愛が伝わってくる感じがして、とっても安心するんだぁ<emoji=heart04>」"
translation = "「회장군이 쓰다듬어 주면 사랑이 전해지는 느낌이 들어서 무척 안심돼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も勇気を出して、言ってみていい？"
translation = "나도 용기 내서 말해 봐도 될까?"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「え？\u3000会長くんも恥ずかしくて、なかなか言えなかったことがあるの？」"
translation = "「어? 회장군도 부끄러워서 좀처럼 말 못 했던 게 있어?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――本当は、自分も甘えたい時があるけど、カッコ悪いと思われたくなかったから言えなかった……？」"
translation = "「――사실은 자신도 어리광 부리고 싶을 때가 있지만, 한심하게 보이고 싶지 않아서 말 못 했다……?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「そう、だよね<emoji=heart04>\u3000私だって、恥ずかしくて言えなかったことがいっぱいあるんだから、会長くんだって同じようにあるよね……<emoji=heart04>」"
translation = "「그렇구나<emoji=heart04> 나도 부끄러워서 말 못 했던 게 잔뜩 있으니까, 회장군도 마찬가지겠지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「なんだか、嬉しいな<emoji=heart04>\u3000会長くんとこうやって、お互いの恥ずかしいところを晒し合えるなんて……私たち、凄く深いところで繋がり合えてる気がする<emoji=heart04>」"
translation = "「왠지 기쁘네<emoji=heart04> 회장군이랑 이렇게 서로의 부끄러운 부분을 드러낼 수 있다니…… 우리, 굉장히 깊은 곳에서 이어져 있는 기분이 들어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もメルエルに甘えていいんだって気づけた"
translation = "나도 메르엘에게 어리광 부려도 된다는 걸 깨달았어."

[[dialogue]]
speaker = "unk"
original = "メルエルが甘えてくれるようになったから"
translation = "메르엘이 어리광 부려 주게 되었으니까."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「そっか<emoji=heart04>\u3000本当に、どれもこれも、ちっちゃい私に感謝だね<emoji=heart04>」"
translation = "「그렇구나<emoji=heart04> 정말로 이것저것 다 어린 나한테 감사해야겠네<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えへへ<emoji=heart04>\u3000なら今日は、もっともっと会長くんがしてみたいこと……教えてほしいな♪」"
translation = "「에헤헤<emoji=heart04> 그럼 오늘은 회장군이 좀 더 해보고 싶은 거…… 알려줬으면 좋겠어♪」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私も、好きな人が望んでいることなら、すごく嬉しくて、どんなことでもドキドキしちゃうと思うから<emoji=heart04>」"
translation = "「나도 좋아하는 사람이 바라는 일이라면 정말 기뻐서, 어떤 일이라도 두근거릴 것 같으니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なら、試してみたいことがあって……"
translation = "그럼 시험해 보고 싶은 게 있는데……"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――『天使の羽』を触ってみたい？」"
translation = "「――『천사의 날개』를 만져보고 싶어?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、言葉を続ける。"
translation = "나는 고개를 끄덕이며 말을 잇는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――天使の羽に強い気持ちを込めながら触ると、その気持ちが流れ込んできて、伝わるらしい……？」"
translation = "「――천사의 날개에 강한 마음을 담아 만지면 그 마음이 흘러 들어와서 전해진다고 하던데……?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あ……お父さんやお母さんが、大切な人以外に羽を触らせちゃダメだよって教育してくれてたのって、そういうことだったのかな？」"
translation = "「아…… 아빠랑 엄마가, 소중한 사람 말고는 날개를 만지게 하면 안 된다고 가르쳐 주셨던 게, 그런 의미였던 걸까?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「うん<emoji=heart04>\u3000会長くんなら、もちろんいいよ<emoji=heart04>\u3000というか、私の羽に触っていいのは、世界でただ一人、会長くんだけなんだから<emoji=heart04>」"
translation = "「응<emoji=heart04> 회장님이라면, 물론 괜찮아<emoji=heart04> 그치만, 내 날개를 만져도 되는 건, 세상에서 단 한 사람, 회장님뿐이니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺に身を委ねるように、背中の羽をこちらへ差し出してくるメルエル。"
translation = "그렇게, 나에게 몸을 맡기듯이 등에 달린 날개를 이쪽으로 내미는 메르엘."

[[dialogue]]
speaker = "unk"
original = "俺はドキドキしながら、彼女の羽に手で触れて、優しく撫でる。"
translation = "나는 두근거리면서, 그녀의 날개에 손을 대고, 부드럽게 쓰다듬는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「んっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000こ、これ……すごいかも……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 하아아……<emoji=heart04> 이, 이거…… 대단할지도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんの『愛』が、直接流れ込んでくる感じがして、体がなんだか熱くなってきちゃう……<emoji=heart04>」"
translation = "「회장님의 『사랑』이, 직접 흘러 들어오는 느낌이 들어서, 몸이 왠지 뜨거워져 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あっ……ふあぁっ<emoji=heart04>\u3000会長くんが私のこと、どれだけ好きって思ってくれてるか、わかるよぉ<emoji=heart04>」"
translation = "「앗…… 후아아<emoji=heart04> 회장님이 나를, 얼마나 좋아한다고 생각해주고 있는지, 다 느껴져어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「はあぁっ……<emoji=heart04>\u3000これ続けてたら私、嬉しくなり過ぎて、頭がメルトしちゃうよぉ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 이거 계속하면 나, 너무 기뻐서 머리가 멜트해버릴 거야아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんからの愛をいっぱい注がれて、私、もう……<emoji=heart04>」"
translation = "「회장님한테 사랑을 듬뿍 받아서, 나, 이제……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「キス……して欲しくなってきちゃった<emoji=heart04>」"
translation = "「키스…… 받고 싶어져 버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "わかったと頷いて、俺はメルエルの唇を奪う。"
translation = "알겠다고 고개를 끄덕이며, 나는 메르엘의 입술을 빼앗는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くん<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 응…… 츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はキスをしながら、またメルエルの翼に触れて、優しく撫でる。"
translation = "나는 키스를 하면서, 다시 메르엘의 날개에 손을 대고, 부드럽게 쓰다듬는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あぁっ<emoji=heart04>\u3000会長くんの気持ち、羽からまた、流れ込んできちゃう……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 회장님의 마음이, 날개를 통해 또, 흘러 들어와 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私の『好き』って気持ち、いっぱい教えて欲しいって、伝わってくる……<emoji=heart04>」"
translation = "「나의 『좋아해』라는 마음, 잔뜩 알려줬으면 좋겠다고, 전해져 와……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「んんぅ……<emoji=heart04>\u3000じゃあ、私は……キスと言葉で、いっぱい伝えるね<emoji=heart04>」"
translation = "「음으으……<emoji=heart04> 그럼, 나는…… 키스랑 말로, 잔뜩 전해줄게<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くん、好きぃ<emoji=heart04>\u3000好き……大好きぃ<emoji=heart04>」"
translation = "「회장 군, 좋아해<emoji=heart04> 좋아…… 너무 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「愛してるの……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「사랑해……<emoji=heart04> 쪽<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエル、俺も大好きだ"
translation = "메르엘, 나도 정말 좋아해"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あっ<emoji=heart04>\u3000ふあぁぁっ、会長くぅん<emoji=heart04>\u3000そんな耳元で囁いたりしたら、またメルトしちゃうよぉ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아아앗, 회장 구운<emoji=heart04> 그렇게 귓가에서 속삭이면, 또 멜트해버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「んんぅ……<emoji=heart04>\u3000私も大好きぃ<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「응으으……<emoji=heart04> 나도 너무 좋아아<emoji=heart04> 응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちはこの日、数え切れない程に『好き』という気持ちを、お互いに伝え合うのだった。"
translation = "우리들은 이날, 셀 수 없을 정도로 『좋아해』라는 마음을 서로에게 전하는 것이었다."

