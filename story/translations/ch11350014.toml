[[dialogue]]
speaker = "unk"
original = "第４話,女神と魔王の盟友,P"
translation = "제4화, 여신과 마왕의 맹우, P"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ごきげんよう、お邪魔するわ」"
translation = "「안녕하신가요, 실례할게요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら、いらっしゃい、ルネア！\u3000最近よく来るわね」"
translation = "「어머, 어서 와, 루네아! 요즘 자주 오네」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「そうかしら？\u3000もしかしてお邪魔だった？」"
translation = "「그런가요? 혹시 방해였나요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなことはないわよ！\u3000それで、今日はなんの用なの？」"
translation = "「그럴 리가 없잖아! 그래서, 오늘은 무슨 일이야?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「大した用ではないのだけれど……」"
translation = "「별다른 일은 아니지만……」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「今日はクロトとヴィーナスの２人だけなのね。あなたたちは、よく一緒にいるの？」"
translation = "「오늘은 쿠로토와 비너스 두 사람뿐이네. 너희들은, 자주 같이 있는 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろんよ！\u3000星徒会の魔王と、そのフィクサーだもの！\u3000私とクロトは、いつだって一心同体よ」"
translation = "「물론이지! 성도회의 마왕과, 그 픽서인걸! 나와 쿠로토는, 언제나 일심동체야」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「あら素直……ふふっ、なんだか妬けちゃうわね」"
translation = "「어머 솔직하네…… 후훗, 왠지 질투가 나네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それで？\u3000何の用だったの？」"
translation = "「그래서? 무슨 용건이었어?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「あぁ、そうだったわ」"
translation = "「아아, 그랬지」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「先日のパトロールの時に、ついでで街の案内もしてもらったでしょ？\u3000今日はその続きをお願いしようと思って来たの」"
translation = "「지난번 순찰 때, 겸사겸사 마을 안내도 받았잖아? 오늘은 그 다음을 부탁하려고 왔어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「またいきなりなんだから」"
translation = "「또 갑자기 그러네」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「いつまでこちらの世界にいるかもわからないし、今の内に見て回っておきたいと思ったのよ」"
translation = "「언제까지 이쪽 세계에 있을지도 모르고, 지금 안에 둘러보고 싶다고 생각했단 말이지」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ほら、この前見られなかった場所もあるし、行ってないご飯屋さんもあるし」"
translation = "「봐, 지난번에 못 봤던 장소도 있고, 안 가본 식당도 있고」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「誰に頼んでもよかったのだけれど、なんとなく、クロトが１番信頼できそうだったから」"
translation = "「누구에게 부탁해도 상관없었지만, 왠지 모르게, 쿠로토가 가장 신뢰할 수 있을 것 같았으니까」"

[[dialogue]]
speaker = "unk"
original = "俺たちでよければ案内するよ"
translation = "우리들이 괜찮다면 안내해 줄게"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「俺たち……なるほどね。あなた、なかなかクロトに信頼されているのね」"
translation = "「우리들…… 과연 그렇네. 너, 꽤 쿠로토에게 신뢰받고 있네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ……まあ、それほどでもあるかしらねっ。それに私だって、クロトをとっても信頼しているわ！」"
translation = "「엣…… 뭐, 그 정도는 될까나! 게다가 나도, 쿠로토를 엄청 신뢰하고 있어!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ふふ……いいと思うわよ」"
translation = "「후후…… 좋다고 생각해」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「それじゃあ今日は、あなたたち２人に、観光のガイドをお願いしようかしら」"
translation = "「그럼 오늘은, 너희 두 사람에게, 관광 가이드를 부탁해 볼까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まったく、相変わらず一方的なんだから。でもいいわ、私たちに任せておきなさい！」"
translation = "「정말, 여전히 일방적이네. 하지만 괜찮아, 우리에게 맡겨 둬!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「もくもく……んふふ、おいしい……！」"
translation = "「모락모락…… 음후후, 맛있어……!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「わたし、誰かと買い食いというのをしてみたかったのよね。シンは倹約家だから、無理はさせられないし……」"
translation = "「나, 누군가와 길거리 음식을 먹어보고 싶었단 말이지. 신은 검소한 사람이라, 무리는 시킬 수 없고……」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「でもやっぱり、見慣れない世界での景色や食べ物を堪能するのは最高ね」"
translation = "「하지만 역시, 낯선 세계에서의 풍경이나 음식을 만끽하는 건 최고네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今日も楽しんでくれてるみたいでよかったわ！」"
translation = "「오늘도 즐겨주는 것 같아서 다행이네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まぁ実際、私たちやリアさんたちもそうだったけど、別の世界の景色とかって、新鮮に感じるものよね」"
translation = "「뭐 실제로, 우리나 리아 씨들도 그랬지만, 다른 세계의 풍경 같은 건, 신선하게 느껴지는 법이잖아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その辺りは、やっぱり女神様でも同じなわけ？」"
translation = "「그 부분은, 역시 여신님이라도 마찬가지인 거야?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「もちろんよ。それにせっかくなら、それぞれの世界の良さを楽しまなくては、もったいないわ」"
translation = "「물론이지. 게다가 모처럼이라면, 각 세계의 장점을 즐겨야지, 아깝잖아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それもそうね！」"
translation = "「그것도 그렇네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「色々トラブルはあったけれど、思い返せば面白い体験ばっかりだったし……お互いに別の世界を知るきっかけを作ってもらえたのは、良かったのかもって思っちゃうわね」"
translation = "「이런저런 트러블은 있었지만, 돌이켜보면 재미있는 경험뿐이었고…… 서로 다른 세계를 알 계기를 만들어 준 건, 좋았던 걸지도 모르겠다고 생각하게 되네」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「あら、やっと気づいたのね。もっと感謝して構わないのよ」"
translation = "「어머, 이제야 깨달았네. 더 감사해도 괜찮단 말이지」"

[[dialogue]]
speaker = "unk"
original = "結構とんでもない目に遭わされてたけど！？"
translation = "꽤나 엄청난 꼴을 당했었는데!?"

[[dialogue]]
speaker = "unk"
original = "いや、丸く収まったからいいものの……"
translation = "아니, 좋게 마무리되었으니 망정이지……"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「……こういう誰かと喧嘩したり、仲直りしたり、そういう何気ない普通の営みに、少し憧れていたの」"
translation = "「……이렇게 누군가와 싸우거나, 화해하거나, 그런 사소하고 평범한 일상에, 조금 동경하고 있었어」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「こうして普通に過ごせることも、なんだか新鮮だし」"
translation = "「이렇게 평범하게 지낼 수 있는 것도, 왠지 신선하고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え、そうなの？」"
translation = "「에, 그래?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「……わたし、こう見えてもね、これまでずっと、誰かの姿を遠くから見守るだけのことが多かったの」"
translation = "「……나, 겉보기와는 다르게 말이지, 지금까지 줄곧, 누군가의 모습을 멀리서 지켜보기만 하는 일이 많았어」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「でも、最近は、シンや彼の仲間たちと一緒に過ごすことができて……」"
translation = "「하지만, 최근에는, 신이나 그의 동료들과 함께 지낼 수 있게 되었고……」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「それに、あなたたちと、こちらの世界で過ごす時間も増えて……」"
translation = "「게다가, 너희들과, 이쪽 세계에서 지내는 시간도 늘어나서……」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「それだけでなんだか、知っていたはずの世界が見違えたように感じているの。だから、そのことについては、お礼を言っておくわ」"
translation = "「그것만으로도 왠지, 알고 있었을 터인 세계가 몰라보게 달라진 것처럼 느끼고 있어. 그러니까, 그 점에 대해서는, 고맙다고 말해 둘게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふ～ん、なるほど。それで最近は、しょっちゅう私たちのところに来てたってわけね」"
translation = "「흐음, 과연 그렇네. 그래서 최근에는, 수시로 우리들에게 왔다는 거네」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「まあ、そんなところね。女神に気に入られたんだから、光栄に思いなさい」"
translation = "「뭐, 그런 셈이지. 여신에게 마음에 들었으니, 영광으로 생각하도록 해」"

[[dialogue]]
speaker = "unk"
original = "それなら……！"
translation = "그렇다면……!"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「え……？\u3000他に行ってみたい場所や、やってみたいこと？」"
translation = "「에……? 다른 가보고 싶은 장소나, 해보고 싶은 일?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「それを、あなたが叶えてくれるというの？」"
translation = "「그것을, 네가 이루어 주겠다는 거야?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「あら……それってなんだか、デートのお誘いみたいね。ふふっ」"
translation = "「어머…… 그거 왠지, 데이트 신청 같네. 후훗」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ、ででででっ、デートって、ちょっと……！」"
translation = "「엣, 데데데데데, 데이트라니, 잠깐……!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「シンとのデートの練習にもなりそうだし……次はどこへ連れて行ってもらおうかしら」"
translation = "「신과의 데이트 연습도 될 것 같고…… 다음은 어디로 데려가 달라고 할까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「むぅ～……っ」"
translation = "「무우~……!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ふふっ、冗談よ。わたしは何があっても、シン一筋だもの。心配しなくても、クロトを取ろうだなんて思っていないわ」"
translation = "「후훗, 농담이야. 나는 무슨 일이 있어도, 신 일편단심인걸. 걱정하지 않아도, 쿠로토를 빼앗으려고는 생각하지 않아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「べっ、別にっ、そんな心配はしてないけどっ……もうっ、クロトの前で変なこと言わないでよねっ」"
translation = "「벼, 별로, 그런 걱정은 안 했지만!…… 정말, 쿠로토 앞에서 이상한 말 하지 마!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「変だったかしら？」"
translation = "「이상했으려나?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大体あなた、恋人とデートなんて、しょっちゅうしてるんじゃないの？」"
translation = "「대체 너, 연인과 데이트 같은 거, 자주 하고 있는 거 아니야?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「え……それは、その……シンとは、ちゃんとしたデートっていうの、まだ、あんまりしたことがなくて……」"
translation = "「에…… 그건, 그…… 신과는, 제대로 된 데이트라는 거, 아직, 별로 해본 적이 없어서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ、そうなの？\u3000なんか意外……」"
translation = "「엣, 그래? 뭔가 의외네……」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「だって、シンってば少し鈍感なところがあるし、かといって、わたしから迫るのも恥ずかしいし……」"
translation = "「왜냐면, 신이 좀 둔감한 면이 있고, 그렇다고 해서, 내가 먼저 다가가는 것도 부끄럽고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いや、もっとグイグイいってそうだと思ってたわ。ていうか、普段の調子でいけばいいんじゃないの？」"
translation = "「아니, 더 적극적으로 나갈 거라고 생각했어. 그보다, 평소의 태도로 하면 되는 거 아니야?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「そんなのだめよ……シンには、はしたなくてわがままな女の子だって思われたくないし……」"
translation = "「그런 건 안 돼…… 신에게, 방정맞고 제멋대로인 여자애라고 생각되고 싶지 않고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっと、二重人格か何かなの……？」"
translation = "「저기, 이중인격이라도 되는 거야……?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「あっ、そうだ、シンにお土産を買うのを忘れていたわ。何かいいお店を知らないかしら」"
translation = "「앗, 맞다, 신에게 기념품 사는 걸 잊고 있었네. 뭔가 좋은 가게를 모르려나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……誤魔化したわね」"
translation = "「……얼버무렸네」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「すっかり日が暮れてしまったわね。今日は付き合ってくれてありがとう」"
translation = "「완전히 해가 져 버렸네. 오늘은 함께 해줘서 고마워」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううん。なんだかんだ、私たちも楽しかったわ」"
translation = "「응응. 이러니저러니 해도, 우리도 즐거웠어」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「あ、そうそう、クロト。実はこれを渡そうと思っていたのよ」"
translation = "「아, 맞다, 쿠로토. 실은 이걸 건네주려고 했었어」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「はい、魔王印のお守りストラップの新作よ。あなたのイメージも加えてみたの」"
translation = "「네, 마왕표 부적 스트랩 신작이야. 당신의 이미지도 넣어봤어」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ヴィーナス、あなたにもあげるわね」"
translation = "「비너스, 당신에게도 줄게.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ホント！？\u3000ありがとう！！」"
translation = "「정말?! 고마워!!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「今更だけど、お近づきの印とでも思ってもらえればいいわ」"
translation = "「새삼스럽지만, 가까워진 증표라고 생각해주면 좋겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う～ん、プレゼントは嬉しいけど、お近づきの印っていうのは他人行儀でじれったいわね！」"
translation = "「으ー음, 선물은 기쁘지만, 가까워진 증표라는 건 서먹서먹하고 답답하네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だって私たちって、もう友達でしょう？\u3000ルネア」"
translation = "「왜냐면 우리, 이제 친구잖아? 루네아」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「……！\u3000そう。それもそうね、ありがとう」"
translation = "「……! 그래. 그것도 그렇네, 고마워.」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「じゃあこれは、ただの気まぐれなお土産、サプライズプレゼントってことで」"
translation = "「그럼 이건, 그냥 단순한 변덕스러운 선물, 서프라이즈 선물이라는 걸로.」"

[[dialogue]]
speaker = "unk"
original = "大事にするよ"
translation = "소중히 할게"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ええ、そうしてちょうだい」"
translation = "「응, 그렇게 해줘.」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「それと、この前も似たようなことを言ったかもしれないけれど、あなたには、少し期待もしているのよ」"
translation = "「그리고, 얼마 전에도 비슷한 말을 했을지도 모르겠지만, 당신에게는, 조금 기대도 하고 있어.」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「その魔王の力、シンから託されたというのであれば、それに相応しい人物であってもらいたいもの」"
translation = "「그 마왕의 힘, 신에게서 맡겨졌다고 한다면, 그에 걸맞은 인물이 되어주었으면 해.」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「あなたがこれからも、魔王としてしっかり役目を果たすことを願っているわ」"
translation = "「당신이 앞으로도, 마왕으로서 제대로 역할을 다하기를 바라고 있어.」"

[[dialogue]]
speaker = "unk"
original = "期待に応えられるよう、頑張るよ"
translation = "기대에 부응할 수 있도록, 노력할게"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ええ。あと、ヴィーナスとも仲良くね」"
translation = "「응. 그리고, 비너스와도 사이좋게 지내.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「余計なこと言わなくていいわよっ」"
translation = "「쓸데없는 말 안 해도 돼」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ふふっ……それじゃあ、今日はありがとう。楽しかったわ」"
translation = "「후훗…… 그럼, 오늘은 고마웠어. 즐거웠어.」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「いい思い出もできたし、あなたたちのおかげで、こっちの世界のことも、とっても好きになったわ」"
translation = "「좋은 추억도 생겼고, 당신들 덕분에, 이쪽 세계도, 정말 좋아하게 되었어.」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「きっとまた遊びに来るから、その時もよろしくお願いするわね、スターナイツさんたち」"
translation = "「분명 또 놀러 올 테니까, 그때도 잘 부탁할게, 스타 나이츠 씨들.」"

