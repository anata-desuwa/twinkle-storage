[[dialogue]]
speaker = "unk"
original = "ある休日のこと──"
translation = "어느 휴일의 일──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あっがりーっと！\u3000へへ、これで３連続あたしの勝ちだな！」"
translation = "「다 됐다! 헤헤, 이걸로 3연속 나의 승리네!」"

[[dialogue]]
speaker = "unk"
original = "俺はアポロにお呼ばれされ、２人してボードゲームで遊んでいた。"
translation = "나는 아폴로에게 불려가, 둘이서 보드게임을 하며 놀고 있었다."

[[dialogue]]
speaker = "unk"
original = "そうして、気づけば不運にも負けが込んでしまったところ……"
translation = "그러다 보니, 어느새 불운하게도 패배가 쌓여버렸는데……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よおし、罰ゲームだ！\u3000アポロちゃんの超絶くすぐり攻撃をくらえ～～！」"
translation = "「좋아, 벌칙 게임이다! 아폴로 님의 초절 간지럼 공격을 받아라~~!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「く、くすぐったい……！\u3000あは、あはははっ！\u3000も、もう勘弁！」"
translation = "「가, 간지러워……! 아하, 아하하하! 이, 이제 봐줘!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「わはは、やーだよっと♪\u3000魔王は脇が弱いんだよな──重点的にいじめてやるぞ♪」"
translation = "「와하하, 싫다구♪ 마왕은 옆구리가 약하네── 중점적으로 괴롭혀줄 거라구♪」"

[[dialogue]]
speaker = "unk"
original = "気を良くしたアポロはベッドに俺を押し倒し、わしゃわしゃと体をくすぐってきた！"
translation = "기분이 좋아진 아폴로는 침대에 나를 밀어트리고, 마구 몸을 간지럽혀 왔다!"

[[dialogue]]
speaker = "unk"
original = "小さな手が脇腹に滑り込まされ、全部の指先でひたすら刺激される。"
translation = "작은 손이 옆구리로 미끄러져 들어와, 모든 손가락 끝으로 오로지 자극한다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うりゃうりゃー、もっとくすぐってやるぞ！\u3000笑いが止まらないみたいだな！」"
translation = "「으랴으랴, 더 간지럽혀줄 거라구! 웃음이 멈추지 않는 모양이네!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なんだ～？\u3000そんな必死に逃げようとしても無駄だぞ……へっへっ、このアポロ様のくすぐりテクからは絶対に逃げられないぜ！」"
translation = "「뭐야~? 그렇게 필사적으로 도망치려 해도 소용없다구…… 헷헷, 이 아폴로 님의 간지럼 테크닉에서는 절대로 도망칠 수 없다구!」"

[[dialogue]]
speaker = "unk"
original = "俺にまたがってマウントポジションを取ったアポロは、しっかりこちらが逃げられないようくすぐり攻撃を続けてくる！"
translation = "나에게 올라타 마운트 포지션을 잡은 아폴로는, 확실히 이쪽이 도망치지 못하게 간지럼 공격을 계속해온다!"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「わはははは！\u3000魔王破れたり──って……ん？」"
translation = "「와하하하하! 마왕 패배다── 어라…… 응?」"

[[dialogue]]
speaker = "unk"
original = "まずい。"
translation = "아차."

[[dialogue]]
speaker = "unk"
original = "先ほどから俺の体に起きている異変に気づかれそうだ。"
translation = "조금 전부터 내 몸에 일어나고 있는 이변을 들킬 것 같다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おい……何もぞもぞしてんだよ。隠すなってーの……ん？」"
translation = "「어이…… 뭘 꿈틀거리는 거야. 숨기지 말라니까…… 응?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お～？\u3000また、いつかみたく膨らませてんじゃねーか。こーこ<emoji=heart04>」"
translation = "「오~? 또, 언젠가처럼 부풀리고 있잖아. 여~기<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先ほどまで俺の体をくすぐっていたアポロの指先が、そっと股間を這う。"
translation = "조금 전까지 내 몸을 간지럽히던 아폴로의 손가락 끝이, 살며시 가랑이를 훑는다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしにくすぐられて興奮しちゃったのか？\u3000全く、しょうがないヤツだな魔王は」"
translation = "「나한테 간지럽혀져서 흥분해버린 거야? 참나, 어쩔 수 없는 녀석이라니까 마왕은.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへっ……いいぜ。なら……あたしがすっきりさせてやるよ」"
translation = "「헤헤…… 좋아. 그럼…… 내가 개운하게 해줄게.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000どういう意味かわかって言ってるのか──って？」"
translation = "「응? 무슨 의미인지 알고 말하는 거냐고── 응?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「心配ゴムヨーだっての……<emoji=heart04>\u3000あたしだって、色々勉強してきたんだからな──ほら、<b>べっどいん</b>するぞ」"
translation = "「걱정 붙들어 매라니까……<emoji=heart04> 나도, 여러 가지 공부해 왔으니까 말이야── 자, <b>베드</b> <b>인</b> 하자구.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「れろっ──んっ……どうだ……ぺろっ……こんな感じだろ♪\u3000へへ……今、少しびくついたな。体は素直ってやつだ」"
translation = "「레롯── 응…… 어때…… 페롯…… 이런 느낌이지♪ 헤헤…… 지금, 조금 움찔했네. 몸은 정직하다는 거네.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぺろ……れろ……んっ……れろれろ……んっ──なんか……アイス舐めてるみたいな……んっ、感じだな……<emoji=heart04>\u3000んっ、ちゅぱっ、んっ……<emoji=heart04>」"
translation = "「페로…… 레로…… 응…… 레로레로…… 응── 왠지…… 아이스크림 핥는 것 같은…… 응, 느낌이네……<emoji=heart04> 응, 츄팟, 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「れろ──れろ──ちゅぱっ……ぺろっ……<emoji=heart04>\u3000れろれろーっ……んっ……<emoji=heart04>\u3000はぁ、はぁ……っ……こうか……？\u3000これで、いいのか……？」"
translation = "「레로── 레로── 츄팟…… 페롯……<emoji=heart04> 레로레로── 응……<emoji=heart04> 하아, 하아…… 이렇게인가……? 이걸로, 좋은 거야……?」"

[[dialogue]]
speaker = "unk"
original = "気づけばアポロは体を反転させ、そのまま俺の上に覆いかぶさっていた。"
translation = "정신을 차려보니 아폴로는 몸을 반전시켜, 그대로 내 위에 엎드려 있었다."

[[dialogue]]
speaker = "unk"
original = "自分でも見えないところで露出されたペニスを、生暖かい感触が襲う。"
translation = "나 자신도 보이지 않는 곳에서 노출된 자지를, 미지근한 감촉이 덮친다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぺろ、ぺろ──れろ──んっ……れろ……れろぉっ……<emoji=heart04>\u3000ふふっ……むしろアイスよりカチカチじゃないか、これ……？\u3000んっ、れろれろ──んっ……<emoji=heart04>」"
translation = "「페로, 페로── 레로── 응…… 레로…… 레로옷……<emoji=heart04> 후훗…… 오히려 아이스크림보다 딱딱하잖아, 이거……? 응, 레로레로── 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「れろれろ──れろぉっ……ぺろ……れるっ……不気味だと思ってたけど──んっ、こうして見ると……ぺろ……可愛いもんだな……<emoji=heart04>\u3000ぺろ、ぺろっ……」"
translation = "「레로레로── 레로옷…… 페로…… 레룻…… 징그럽다고 생각했는데── 응, 이렇게 보니…… 페로…… 귀여운 구석이 있네……<emoji=heart04> 페로, 페롯……」"

[[dialogue]]
speaker = "unk"
original = "ぬめり気の強い舌先が、何度も亀頭に這わされていく。"
translation = "미끈거림이 강한 혀끝이, 몇 번이고 귀두를 훑고 지나간다."

[[dialogue]]
speaker = "unk"
original = "俺のペニスはその度に、抗いようのない快感に悶えて脈打った。"
translation = "내 자지는 그때마다, 거부할 수 없는 쾌감에 번민하며 맥동했다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「れろれろっ、れろ……ちゅっ……<emoji=heart04>\u3000どうだ魔王……？\u3000気持ちいいか……？\u3000って──んっ……<emoji=heart04>\u3000このガチガチになったの見てりゃ、聞くまでもねーか……<emoji=heart04>」"
translation = "「레로레로, 레로…… 츄……<emoji=heart04> 어때 마왕……? 기분 좋아……? 라고── 응……<emoji=heart04> 이렇게 빳빳해진 걸 보고 있으면, 물을 필요도 없겠네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへっ……んっ……もっと、してやるからな……？\u3000んっ、れろ──ぺろ……れろ……ふふっ、また震えたぞ……感じてるんだな……？」"
translation = "「헤헤…… 응…… 더, 해줄 테니까 말이야……? 응, 레로── 페로…… 레로…… 후훗, 또 떨었어…… 느끼고 있구나……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぺろ──れろ──んっ、ちゅぱっ……はぁっ……<emoji=heart04>\u3000ふふ……こっちも楽しくなってきたぞ……♪\u3000あたしの『ご奉仕』スキルも……ぺろ……中々のもんだ……<emoji=heart04>」"
translation = "「페로── 레로── 응, 츄팟…… 하앗……<emoji=heart04> 후후…… 이쪽도 즐거워지기 시작했다구……♪ 나의 『봉사』 스킬도…… 페로…… 제법이라구……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最初はぎこちなかったアポロの舌使いも、次第に慣れてきたとみえて、いいように反応をうかがわれている。"
translation = "처음에는 서툴렀던 아폴로의 혀 놀림도, 점차 익숙해진 모양인지, 마음껏 반응을 살피고 있다."

[[dialogue]]
speaker = "unk"
original = "続けているうちにこちらの感じるポイントまで絞り込めてきたようで、何も伝えていないのにカリ首や裏筋を重点的に舐めてきた。"
translation = "계속하는 동안 이쪽이 느끼는 포인트까지 파악한 듯, 아무것도 전하지 않았는데도 귀두 테두리나 소대를 중점적으로 핥아 왔다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「我慢してんなって……<emoji=heart04>\u3000ほら、素直に気持ちよくなれば……んっ……いいだろ……<emoji=heart04>\u3000れろ──ぺろ、ぺろ……っ……れろれろれろぉっ……<emoji=heart04>」"
translation = "「참지 말라니까……<emoji=heart04> 자, 솔직하게 기분 좋아지면…… 응…… 되잖아……<emoji=heart04> 레로── 페로, 페로…… 레로레로레로옷……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少しでも腰をよじろうとする俺だったが、すぐアポロの全身で抑えつけられてしまう。"
translation = "조금이라도 허리를 비틀려는 나였지만, 곧 아폴로의 전신에 억눌려버린다."

[[dialogue]]
speaker = "unk"
original = "くすぐり攻撃と同じく、逃げは許してくれないようだ。"
translation = "간지럼 공격 때와 마찬가지로, 도망은 허락하지 않는 모양이다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「れろ──んっ、れろ……<emoji=heart04>\u3000ぺろ──んっ、ぺろぺろ──れろっ……<emoji=heart04>\u3000へへ……なんか、わかるな……気持ちよさそうなのが……れろっ……<emoji=heart04>」"
translation = "「레로── 응, 레로……<emoji=heart04> 페로── 응, 페로페로── 레롯……<emoji=heart04> 헤헤…… 왠지, 알 것 같아…… 기분 좋아 보이는 게…… 레롯……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ほら……<emoji=heart04>\u3000前みたいに──んっ、れろ……ぴゅっぴゅって、出しちゃえよ……<emoji=heart04>\u3000アポロ様のベロで……<emoji=heart04>\u3000んっ、れろれろ……<emoji=heart04>」"
translation = "「자……<emoji=heart04> 전처럼── 응, 레로…… 퓨퓨하고, 내보내버려……<emoji=heart04> 아폴로 님의 혓바닥으로……<emoji=heart04> 응, 레로레로……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "確かにこのまま射精までも至ってしまいそうだ。"
translation = "확실히 이대로 사정까지 가버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "とはいえこのまま防戦一方なのも、男がすたるか──"
translation = "그렇다고는 해도 이대로 당하고만 있는 것도, 남자의 체면이 서지 않는데──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──んぁぁぁっ<emoji=heart04>」"
translation = "「──응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ば、ばか──やめろっ、あたしのそこ──んっ、いじるなぁっ……<emoji=heart04>\u3000ぁっ、んぁっ、んんぅっ……ぁっ、んぁぁっ！\u3000ぁっ、ぅっ<emoji=heart04>」"
translation = "「바, 바보── 그만둬, 나의 거기── 응, 만지지 마아앗……<emoji=heart04> 앗, 응앗, 응응으읏…… 앗, 응아앗! 앗, 윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んぁぁっ──ぁっ、んぅぅっ<emoji=heart04>\u3000ぁっ、んもうっ、ぁっ……んんんんっっっ……！\u3000っは、ぁっ、んぁぁっ……<emoji=heart04>」"
translation = "「응아앗── 앗, 응으으읏<emoji=heart04> 앗, 정말이지, 앗…… 응응응응으으으읏……! 하, 앗, 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はお互い様とばかり、目の前に広げられたアポロの股間に指先を伸ばした。"
translation = "나는 피차일반이라는 듯, 눈앞에 펼쳐진 아폴로의 가랑이로 손가락 끝을 뻗었다."

[[dialogue]]
speaker = "unk"
original = "この至近距離で拝むつるつるな女性器のアップは、否が応にも己のペニスをさらに張り詰めさせる。"
translation = "이 지근거리에서 우러러보는 매끈매끈한 보지의 클로즈업은, 아니나 다를까 자신의 자지를 더욱 팽팽하게 만든다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──はぁっ、んっ、んぁぁっ……<emoji=heart04>\u3000う、うぅっ、んっ、んんぅぅっ……！\u3000ぁっ、はぁっ、んぁぁっ……<emoji=heart04>」"
translation = "「──하앗, 응, 응아앗……<emoji=heart04> 으, 으윽, 응, 응응으으윽……! 앗, 하앗, 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うぅっ……今さらだけど……この姿勢、すっごく恥ずかしいな……パンツの中身を見せあいっこするなんて、普通に考えたらおかしいだろ……うぅ……！」"
translation = "「으윽…… 이제 와서지만…… 이 자세, 굉장히 부끄럽네…… 팬티 속 내용을 서로 보여주다니, 보통으로 생각하면 이상하잖아…… 으으……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「すけべだ……すけべすぎる……<emoji=heart04>\u3000んぁっ……はぁっ……<emoji=heart04>\u3000ぅっ、んぅっ……<emoji=heart04>\u3000うう、あたし、どうにかなりそうだ……っ……<emoji=heart04>」"
translation = "「음란해…… 너무 음란하다구……<emoji=heart04> 응앗…… 하앗……<emoji=heart04> 윽, 응윽……<emoji=heart04> 으으, 나, 어떻게 되어버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そちらが仕掛けてきた体勢なのに、アポロはふと羞恥心を取り戻してしまったようだ。"
translation = "그쪽에서 먼저 걸어온 자세인데도, 아폴로는 문득 수치심을 되찾아버린 모양이다."

[[dialogue]]
speaker = "unk"
original = "だけど彼女をさらに辱めるように、俺は女性器への愛撫を続ける。"
translation = "하지만 그녀를 더욱 능욕하듯이, 나는 보지에 대한 애무를 계속한다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぁっぁっ──んっ、ぁぁっ<emoji=heart04>\u3000はぁ、はぁ……っ……んっ、でも、こっちだって──ぺろ、れろ──っ……<emoji=heart04>\u3000へへ、どうだ……<emoji=heart04>」"
translation = "「앗앗── 응, 아앗<emoji=heart04> 하아, 하아…… 응, 하지만, 이쪽도── 페로, 레로──……<emoji=heart04> 헤헤, 어때……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしにも──んっ、もっと……大人の『ごほうし』、できるんだからかな……？\u3000れろ──んっ、見てろよ……<emoji=heart04>」"
translation = "「나도── 응, 더…… 어른스러운 『봉사』, 할 수 있으니까 말이야……? 레로── 응, 잘 보라구……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……ぱくっ、と」"
translation = "「……파큿, 하고」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！？」"
translation = "「큭……!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ、んむっ、んむむぅっ……でかくて……んっ、にゃかにゃか、入んねえな……んっ、んむっ……あむぅ……<emoji=heart04>\u3000んっ、んんっ……<emoji=heart04>」"
translation = "「응, 음뭇, 음무무웃…… 커서…… 응, 죠금, 안 들어가네…… 응, 음뭇…… 아뭇……<emoji=heart04> 응, 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロはその小さな口で、こちらの亀頭を丸々とくわえ込んできた。"
translation = "아폴로는 그 작은 입으로, 이쪽의 귀두를 통째로 머금어 왔다."

[[dialogue]]
speaker = "unk"
original = "唐突に訪れた生暖かい感触に、思わず射精しかけてしまうのをぐっとこらえる。"
translation = "돌연히 찾아온 미지근한 감촉에, 저도 모르게 사정해버릴 것 같은 것을 꾹 참는다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んむむぅっ……んむっ、あむっ……んっ、んんっ……んっ……<emoji=heart04>\u3000どうだ……？\u3000あたしがおまえのち○ちん、食べひゃうぞ……んっ、んんっ<emoji=heart04>」"
translation = "「응무무웃…… 음뭇, 아뭇…… 응, 응읏…… 응……<emoji=heart04> 어때……? 내가 너의 자지, 먹어버릴 거라구…… 응, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ──ちゅぱっ、ちゅるっ、じゅるるっ……ちゅぱ、ちゅぱぁっ……んっ、んっ……<emoji=heart04>\u3000ちゅぱっ、んっ、ん～～～っ……じゅる、じゅるるっ……<emoji=heart04>」"
translation = "「응── 츄팟, 츄릇, 쥬르릇…… 츄파, 츄파앗…… 응, 응……<emoji=heart04> 츄팟, 응, 응~~~읏…… 쥬르, 쥬르릇……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んむむむむぅぅっ…………<emoji=heart04>\u3000んっ、じゅるっ、ちゅぱぁっ……んっ、んんっ……じゅる、じゅるるっ……んっ、んんん～～～っっ……<emoji=heart04>」"
translation = "「응무무무무웃…………<emoji=heart04> 응, 쥬릇, 츄파앗…… 응, 응읏…… 쥬르, 쥬르릇…… 응, 응응응~~~읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "く──これ、想像を絶するほどに気持ちがいい。"
translation = "큭── 이거, 상상을 초월할 정도로 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "彼女の唇がちょうどよくきつめに締まり、膣とはまた違った唾液まみれの上下動が異常な快感を生む。"
translation = "그녀의 입술이 딱 알맞게 조여지고, 질과는 또 다른 침 범벅의 상하 운동이 이상한 쾌감을 낳는다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ、ちゅるっ、れろぉっ……じゅるっ、じゅるじゅる、れぇる……んっ……<emoji=heart04>\u3000んっ、ふっ、ちゅぷるっ──ぺろれろぉっ……んっ……んふぅっ……<emoji=heart04>」"
translation = "「응, 츄릇, 레로옷…… 쥬릇, 쥬르쥬르, 레에루…… 응……<emoji=heart04> 응, 훗, 츄프릇── 페로레로옷…… 응…… 응후웃……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おまえのち○ちん……ん、ふ……ほんとに、でかいな……じゅぷる、じゅぷじゅぷ……ふっ……口の中、おまえので、いっぱいだ……」"
translation = "「너의 자지…… 응, 후…… 정말로, 크네…… 쥬프릇, 쥬프쥬프…… 훗…… 입안, 너의 것으로 가득하다구……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ちゅくる──じゅぷっ、じゅぷぷっ……んっ……<emoji=heart04>\u3000ちゅる──じゅる──んれろ、じゅっ、じゅっ……んっ、じゅぷるっ……<emoji=heart04>\u3000じゅぷぷっ……んっ<emoji=heart04>」"
translation = "「츄쿠루── 쥬픗, 쥬프픗…… 응……<emoji=heart04> 츄루── 쥬르── 응레로, 쥬, 쥬…… 응, 쥬프릇……<emoji=heart04> 쥬프픗…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶え間ない刺激に、アポロの小さな口の中でペニスが跳ねる。"
translation = "끊임없는 자극에, 아폴로의 작은 입안에서 자지가 튀어 오른다."

[[dialogue]]
speaker = "unk"
original = "お返しにと、アポロの秘所へ舌を伸ばした。"
translation = "답례로, 아폴로의 비소로 혀를 뻗었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん～～～っ<emoji=heart04>\u3000魔王、生意気、だぞ……れろちゅぱっ、じゅるっ……何もできなく、させてやる……じゅじゅっ、じゅるるっ<emoji=heart04>」"
translation = "「응~~~읏<emoji=heart04> 마왕, 건방지다구…… 레로츄팟, 쥬릇…… 아무것도 못 하게, 해주겠어…… 쥬쥬, 쥬르릇<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ──ふっ……んっ……<emoji=heart04>\u3000るれろ──ちゅぷっ……じゅる、じゅるる……れるれるぅ……じゅるっんっ、はぁっ……<emoji=heart04>」"
translation = "「응── 훗…… 응……<emoji=heart04> 루레로── 츄픗…… 쥬르, 쥬르르…… 레루레루우…… 쥬릇응, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ、ふっ、んんっ……<emoji=heart04>\u3000魔王の舐め方、いやらしい……んっふぅ……ふっ、んんんっ<emoji=heart04>\u3000んじゅるっ、じゅるちゅぱっ<emoji=heart04>」"
translation = "「응, 훗, 응응……<emoji=heart04> 마왕의 핥는 법, 야해…… 응후우…… 훗, 응응응<emoji=heart04> 응쥬릇, 쥬르츄팟<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が縦に割れたスリットに舌を這わせると、アポロの口撃もさらに激しくなる。"
translation = "내가 세로로 갈라진 틈새에 혀를 훑자, 아폴로의 구강 공격도 더욱 격렬해진다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んじゅるっ、じゅるちゅぱっ……んんっ<emoji=heart04>\u3000これで、どうだ、魔王……ふっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000じゅるちゅく……じゅぷるっ<emoji=heart04>」"
translation = "「응쥬릇, 쥬르츄팟…… 응응<emoji=heart04> 이걸로, 어때, 마왕…… 훗<emoji=heart04> 응응<emoji=heart04> 쥬르츄쿠…… 쥬프릇<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ、ふっ、ふっ……じゅぷるっ<emoji=heart04>\u3000いっぱい声出せ、魔王……んっ、ふっ……じゅぷるっ、じゅぷるるるっ<emoji=heart04>」"
translation = "「응, 훗, 훗…… 쥬프릇<emoji=heart04> 잔뜩 목소리 내, 마왕…… 응, 훗…… 쥬프릇, 쥬프르르릇<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしが、してやってるんだから……んぶっ、んんっ……たくさん感じて、いいぞ……んじゅるっ、じゅるちゅぷ<emoji=heart04>\u3000じゅっ、じゅるっ<emoji=heart04>」"
translation = "「내가, 해주고 있는 거니까…… 응붓, 응응…… 잔뜩 느껴도, 좋다구…… 응쥬릇, 쥬르츄프<emoji=heart04> 쥬, 쥬릇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唾液の音に混じって互いの喘ぎが混じり、俺もアポロも相手を責めることに夢中になっていく。"
translation = "침 소리에 섞여 서로의 신음이 섞이고, 나도 아폴로도 상대를 몰아붙이는 것에 열중해간다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「じゅるっ、じゅぽっ、ちゅぱぁっ<emoji=heart04>\u3000んっ──じゅるっ、じゅぱぁっ……んっ、じゅるるるっ……<emoji=heart04>\u3000んっ、じゅるるるぅぅ……っ……<emoji=heart04>」"
translation = "「쥬릇, 쥬폿, 츄파앗<emoji=heart04> 응── 쥬릇, 쥬파앗…… 응, 쥬르르릇……<emoji=heart04> 응, 쥬르르르으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ──んっ、じゅるるうぅぅ……ちゅぱっ、れるっ、ちゅるるるぅぅぅぅ……っ……<emoji=heart04>\u3000んふふ、ち○ちん、もっとびくびくしてきたな……？\u3000んっ、じゅるるるっ<emoji=heart04>」"
translation = "「응── 응, 쥬르르으으…… 츄팟, 레룻, 츄르르르으으으으……<emoji=heart04> 응후후, 자지, 더 파르르 떨리기 시작했네……? 응, 쥬르르르릇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "急に勢いよく吸い上げられ、思わず声が漏れる。"
translation = "갑자기 기세 좋게 빨아 올려져, 저도 모르게 신음이 샌다."

[[dialogue]]
speaker = "unk"
original = "窮屈なバキュームにもかかわらず痛みはなく、ねっとりとした感触は気持ちよさを増幅させる。"
translation = "비좁은 진공 상태임에도 불구하고 통증은 없고, 끈적한 감촉은 기분 좋음을 증폭시킨다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んんん～～～っっ……じゅる、じゅるるっ……ちゅぱぁっ、んっ、れるれる……ちゅうぅぅ……<emoji=heart04>\u3000はぁ、はぁ、もっとだ……<emoji=heart04>\u3000んっ、んんっ……<emoji=heart04>」"
translation = "「응응응~~~읏…… 쥬르, 쥬르릇…… 츄파앗, 응, 레루레루…… 츄우우……<emoji=heart04> 하아, 하아, 더라구……<emoji=heart04> 응, 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んむっ、じゅるっ、じゅるるるぅぅぅ…………<emoji=heart04>\u3000ぷはっ、んっ……出しちゃえ、よっ……あたしが、全部──吸い出してやる……んっ、んんっ……<emoji=heart04>」"
translation = "「응뭇, 쥬릇, 쥬르르르으으으…………<emoji=heart04> 푸핫, 응…… 내보내버려…… 내가, 전부── 빨아내 줄게…… 응, 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ、んむっ、ちゅむるるぅっ、じゅるるるぅぅ……っ……<emoji=heart04>\u3000んっ、あむぅっ……<emoji=heart04>\u3000んっ、じゅるるぅっ……んむっ、ちゅるるぅぅっ……<emoji=heart04>」"
translation = "「응, 응뭇, 츄무르릇, 쥬르르르으으……<emoji=heart04> 응, 아무웃……<emoji=heart04> 응, 쥬르르읏…… 응뭇, 츄르르으으읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇と、喉奥と、狭まった輪に包囲されてしごかれる俺の竿。"
translation = "입술과, 목구멍 안쪽과, 좁아진 고리에 포위되어 훑어지는 나의 기둥."

[[dialogue]]
speaker = "unk"
original = "実際にくわえられている様子が見えないのも相まって、耐えきれないほど未知の快感が襲った。"
translation = "실제로 물려 있는 모습이 보이지 않는 것도 더해져, 견딜 수 없을 정도의 미지의 쾌감이 덮쳤다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ちゅぱっ、んっ、じゅるるるっ……<emoji=heart04>\u3000ちゅぱ、ぢゅるるるぅぅっ……んっ、はっ<emoji=heart04>\u3000もっと──んっ、一気に、してやるぞ……んっ、んっ<emoji=heart04>」"
translation = "「츄팟, 응, 쥬르르르릇……<emoji=heart04> 츄파, 쥬르르르으으읏…… 응, 핫<emoji=heart04> 더── 응, 단번에, 해줄 거라구…… 응, 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぢゅぅぅぅぅぅ……んっ、んんむむむむぅぅぅっっ…………<emoji=heart04>\u3000ちゅぱっ、んっ、じゅるるるるぅっ……<emoji=heart04>\u3000んっ、ん～～～～っっ……<emoji=heart04>」"
translation = "「쥬우우우우우…… 응, 응무무무무으으으으읏…………<emoji=heart04> 츄팟, 응, 쥬르르르르읏……<emoji=heart04> 응, 응~~~~읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あまりの気持ちよさ。このままでは発射まで秒読みだ。"
translation = "엄청난 기분 좋음. 이대로라면 발사까지 초읽기다."

[[dialogue]]
speaker = "unk"
original = "こちらも負けじとアポロの秘所へ舌をねじ込ませて──"
translation = "이쪽도 지지 않고 아폴로의 비소로 혀를 밀어 넣어서──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んむむぅぅぅっっ…………<emoji=heart04>\u3000ぷはぁっ、ぁっ、んっ、やめ──っ……んんっ、んんんぅぅっ、ぁっ、んぁぁぁっ……<emoji=heart04>」"
translation = "「응무무으으으읏…………<emoji=heart04> 푸하앗, 앗, 응, 그만──…… 응응, 응응응으으읏, 앗, 응아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──ぁっ、んっ、んぁぁっ……！\u3000んっ、あたしの中、舐め、るなぁっ──ぁっ<emoji=heart04>\u3000んぁっ、はぁっ、んんんんっ──んっ、んんんっ……っ……<emoji=heart04>」"
translation = "「──앗, 응, 응아앗……! 응, 내 안, 핥지, 마아앗── 앗<emoji=heart04> 응앗, 하앗, 응응응응── 응, 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さく尖った豆を舌で撫でると、アポロもまた感じて嬌声をあげた。"
translation = "작고 뾰족한 콩을 혀로 쓰다듬자, 아폴로도 다시 느끼며 교성을 질렀다."

[[dialogue]]
speaker = "unk"
original = "しかし同時に、溢れる愛液を味わうことでかえって自分の興奮までも倍増してしまう。"
translation = "하지만 동시에, 넘쳐흐르는 애액을 맛보는 것으로 오히려 자신의 흥분까지 배가 되어버린다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んむむぅっ……あたしからも──ちゅる、じゅるるるっ……ちゅぅぅ……<emoji=heart04>\u3000んっ、んんんっ……じゅる、じゅるるぅ……っ……<emoji=heart04>」"
translation = "「응무무웃…… 나도── 츄루, 쥬르르르릇…… 츄우우……<emoji=heart04> 응, 응응응읏…… 쥬르, 쥬르르으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「出せ──っ<emoji=heart04>\u3000出しちゃえ、っての──っ──<emoji=heart04>\u3000んっ、んむむっ──れろ、じゅるるるるるるぅぅぅぅっっっ……<emoji=heart04>\u3000んっ、んんんっっ……<emoji=heart04>」"
translation = "「싸──앗<emoji=heart04> 싸버리라니까──앗──<emoji=heart04> 응, 응무뭇── 레로, 쥬르르르르르르으으으으으읏……<emoji=heart04> 응, 응응응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "く──これは──もう、限界──"
translation = "큭── 이건── 이제, 한계──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──ちゅる、じゅるるっ、じゅるるるるるる──っ……<emoji=heart04>\u3000んむっ、じゅるる、じゅるるるるるるぅぅぅぅ────<emoji=heart04>」"
translation = "「──츄루, 쥬르르릇, 쥬르르르르르르──……<emoji=heart04> 응뭇, 쥬르르, 쥬르르르르르르으으으으────<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──んむううぅぅぅぅぅぅぅぅっっっっっっ……………………！！！」"
translation = "「──응무우우우우우우우우우우우우읏!!!!!!!!!!!!!!!!!!!」"

[[dialogue]]
speaker = "unk"
original = "目の前が真っ白になる──"
translation = "눈앞이 새하얘진다──"

[[dialogue]]
speaker = "unk"
original = "腰が跳ねるとともに引き抜かれたペニスから、飛び出した白濁液がアポロの顔や衣装を汚した。"
translation = "허리가 튀어 오름과 동시에 뽑혀 나온 자지에서, 뿜어져 나온 백탁액이 아폴로의 얼굴과 의상을 더럽혔다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぁっ──んぁっ、はぁっっっっっ………………<emoji=heart04>\u3000ん、ぁぁっ……はぁ、はぁっ……んんんんっっっ…………<emoji=heart04>」"
translation = "「앗── 응앗, 하아아아아앗………………<emoji=heart04> 응, 아아앗…… 하아, 하아…… 응응응응으으으읏…………<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っ……へへ……すっげぇ出たな……<emoji=heart04>\u3000っ、まだぴゅるぴゅる出てんぞ……<emoji=heart04>\u3000そんなにあたしの『ごほうし』が気持ちよかったのかぁ……？」"
translation = "「……헤헤…… 엄청나게 나왔네……<emoji=heart04> 아직 퓨릇퓨릇 나오고 있다구……<emoji=heart04> 그렇게 나의 『봉사』가 기분 좋았던 거야……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こうなっちゃえば……んっ、魔王も──型なしだな……<emoji=heart04>\u3000はぁ、はぁっ……<emoji=heart04>」"
translation = "「이렇게 되어버리면…… 응, 마왕도── 체면이 안 서네……<emoji=heart04> 하아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「はぁ、はぁ、はぁっ……<emoji=heart04>\u3000っ、あたしも……気持ちよく、させられちまったけど……んっ……<emoji=heart04>」"
translation = "「하아, 하아, 하앗……<emoji=heart04> 나도…… 기분 좋게, 되어버렸지만…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「にへへ……<emoji=heart04>\u3000あたしだって……魔王を気持ちよく、させられるんだぞ……？\u3000はぁ、はぁ……んっ……ぁっ……<emoji=heart04>」"
translation = "「니헤헤……<emoji=heart04> 나라도…… 마왕을 기분 좋게, 해줄 수 있다구……? 하아, 하아…… 응…… 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すっかりアポロを得意げにさせてしまった。"
translation = "완전히 아폴로를 우쭐하게 만들어버렸다."

[[dialogue]]
speaker = "unk"
original = "とはいえ実際、俺の肉棒はこれ以上なく悦んでしまったわけで……。"
translation = "하지만 실제, 나의 육봉은 더할 나위 없이 기뻐해 버린 셈이라……."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん～？\u3000おいおい、どこへ行こうとしてるんだ？\u3000まだまだあたしのくすぐり罰ゲームは終わってないぜ！」"
translation = "「응~? 어이어이, 어디로 가려는 거야? 아직 나의 간지럼 벌칙 게임은 끝나지 않았다구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへ……今日は１日中、あたしに付き合ってもらうからな♪\u3000魔王<emoji=heart04>」"
translation = "「헤헤…… 오늘은 하루 종일, 나랑 놀아줘야 하니까 말이야♪ 마왕<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうしてその日は、アポロの『遊び』にさんざん付き合うこととなるのだった……。"
translation = "그렇게 그날은, 아폴로의 『놀이』에 실컷 어울려주게 되는 것이었다……."

