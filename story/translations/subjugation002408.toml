[[dialogue]]
speaker = "unk"
original = "数日後――"
translation = "며칠 후──"

[[dialogue]]
speaker = "unk"
original = "ロストアイテムを巡るディーラックとの戦いは終わり、俺たちはいつもの日常に戻っていた。"
translation = "로스트 아이템을 둘러싼 디럭쿠와의 싸움은 끝나고, 우리들은 평소와 같은 일상으로 돌아와 있었다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「――それで、後からシズハさんの体を魔法で検査したところ……」"
translation = "「──그래서, 나중에 시즈하 씨의 몸을 마법으로 검사해 본 결과……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「シズハさんの中にある『聖杯』に、多くの<b>ヒビ割れ</b>が発生していた痕跡が見つかりました」"
translation = "「시즈하 씨의 안에 있는 『성배』에 많은 <b>금</b>이 가 있었던 흔적이 발견되었습니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「もし放置していれば、遠からず破損して聖杯は砕けてしまっていたでしょう。ですが――」"
translation = "「만약 방치했다면 머지않아 파손되어 성배는 깨져버렸겠죠. 하지만──」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そのヒビは全て、ディーラックさんが使った幸運のロストアイテムによって、修復が為されていました」"
translation = "「그 금은 전부 디럭쿠 씨가 사용한 행운의 로스트 아이템에 의해 수복되어 있었습니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ロストアイテムは本来、リクリエの力でも分解できないほどの存在強度を持つ、手を加えるのが極めて難しい代物です」"
translation = "「로스트 아이템은 본래 리크리에의 힘으로도 분해할 수 없을 정도의 존재 강도를 지녀서, 손을 대는 것이 극히 어려운 물건입니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「しかしそこへ、幸運のロストアイテムを使って<b>成功確率を引き上げる</b>ことで、修復可能にしたんでしょう」"
translation = "「하지만 거기에 행운의 로스트 아이템을 사용해 <b>성공</b> <b>확률을</b> <b>끌어올림</b>으로써, 수복 가능하게 만든 거겠죠」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「逆に言えば、だからこそ『幸運のロストアイテム』を作り出すことが必要だった――」"
translation = "「반대로 말하면, 그렇기에 『행운의 로스트 아이템』을 만들어낼 필요가 있었던 것──」"

[[dialogue]]
speaker = "サチ"
original = "「つまり、ディーラックさんの叶えたかった願いというのは、シズハちゃんの聖杯を直すことだったんですね」"
translation = "「즉, 디럭쿠 씨가 이루고 싶었던 소원은 시즈하 짱의 성배를 고치는 것이었군요」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん……」"
translation = "「디 짱……」"

[[dialogue]]
speaker = "トマル"
original = "「でも、どうして……」"
translation = "「하지만 어째서……」"

[[dialogue]]
speaker = "unk"
original = "それなら、本人に聞いてみよう"
translation = "그렇다면 본인에게 물어보자."

[[dialogue]]
speaker = "プリムラ"
original = "「確かに、それが一番手っ取り早いのじゃ。のう？\u3000ディーラックよ」"
translation = "「확실히 그것이 가장 빠르겠느니라. 그렇지? 디럭쿠여」"

[[dialogue]]
speaker = "ディーラック"
original = "「ふん……」"
translation = "「흥……」"

[[dialogue]]
speaker = "unk"
original = "そう。あれから力尽きたディーラックではあるが、シズハたっての願いで、無事（？）に生存を果たしていた。"
translation = "그렇다. 그때 기력을 다했던 디럭쿠였지만, 시즈하의 간절한 소망으로 무사히(?) 생존해 있었다."

[[dialogue]]
speaker = "unk"
original = "その代わり、悪さができないようにトレジアンナさん特製の鳥カゴ魔道具に入ってもらうという条件付きで。"
translation = "그 대신 나쁜 짓을 하지 못하도록 트레지안나 씨 특제 새장 마도구에 들어간다는 조건으로."

[[dialogue]]
speaker = "ディーラック"
original = "「ボクがシズハちゃんを助けたのは、そんなにおかしいことかい？」"
translation = "「내가 시즈하 짱을 도운 게 그렇게 이상한 일인가?」"

[[dialogue]]
speaker = "プリムラ"
original = "「いや、これまで、どう考えても我らの敵っぽいムーブをかましてたじゃろ、貴様……」"
translation = "「아니, 지금까지 아무리 생각해도 우리들의 적 같은 무브를 보여주지 않았느냐, 네놈……」"

[[dialogue]]
speaker = "ディーラック"
original = "「そうだとも。ヒトカス共はボクにとって家畜サ。だけど――」"
translation = "「그렇다네. 인간 쓰레기들은 나에게 가축이라네. 하지만──」"

[[dialogue]]
speaker = "ディーラック"
original = "「キミたちだって、牧場で育てている家畜が病気になれば、治そうとするだろう？\u3000それと同じサ」"
translation = "「너희들도 목장에서 기르는 가축이 병에 걸리면 고치려고 하잖아? 그것과 똑같다네」"

[[dialogue]]
speaker = "ディーラック"
original = "「本当は、幸運のロストアイテムでキミたちが邪魔できないように制圧してから、もっと慎重に聖杯のヒビを修復する予定だったのサ」"
translation = "「원래는 행운의 로스트 아이템으로 너희가 방해하지 못하게 제압한 다음, 더 신중하게 성배의 금을 수복할 예정이었다네」"

[[dialogue]]
speaker = "ディーラック"
original = "「ロストアイテムの修理なんて、ボクも初めてだからネ。そうして目的を果たした後は、魔界の奥地にでも逃げ込んで、自身を封印して眠るつもりだった」"
translation = "「로스트 아이템의 수리 같은 건 나도 처음이니까 말이야. 그렇게 목적을 달성한 뒤에는 마계 깊은 곳으로 도망쳐서 스스로를 봉인하고 잠들 생각이었어」"

[[dialogue]]
speaker = "ディーラック"
original = "「ボクのことを知るキミたちの寿命が尽きて、この世から居なくなるまで、ゆっくりとネ」"
translation = "「나를 아는 너희들의 수명이 다해서 이 세상에서 사라질 때까지, 느긋하게 말이지」"

[[dialogue]]
speaker = "ディーラック"
original = "「エネルギー生命体であるボクには、寿命が存在しないからサ。面倒なら、逃げて寝とけばいいと思ったんだよ」"
translation = "「에너지 생명체인 나에게는 수명이 존재하지 않으니까. 귀찮으면 도망쳐서 자면 된다고 생각했어」"

[[dialogue]]
speaker = "ディーラック"
original = "「まあ、その隠居計画も、サチちゃんの言う『みんなの幸運』とやらで、見事にご破算にされたわけだけど」"
translation = "「뭐, 그 은거 계획도 사치 짱이 말하는 『모두의 행운』인가 뭔가에 의해 훌륭하게 물거품이 되었지만 말이야」"

[[dialogue]]
speaker = "シズハ"
original = "「……そっか」"
translation = "「……그렇구나」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん、ありがとね」"
translation = "「디 짱, 고마워」"

[[dialogue]]
speaker = "ディーラック"
original = "「は？\u3000……別に、シズハちゃんの為にやったわけじゃないのサ。ボクの、自分でも反吐が出るくらい、愚かな自己満足のためだよ」"
translation = "「하? ……딱히 시즈하 짱을 위해 한 게 아니라네. 나의, 스스로도 구역질이 날 정도로 어리석은 자기만족을 위해서야」"

[[dialogue]]
speaker = "シズハ"
original = "「だとしても、私はディーちゃんに２度も命を助けられた。聖杯がもしこのまま砕けてしまうことになってたら……私、死んじゃってたんだよね？」"
translation = "「그렇다 해도 나는 디 짱에게 두 번이나 목숨을 구원받았어. 성배가 만약 이대로 깨져버리게 됐다면…… 나, 죽었을지도 모르지?」"

[[dialogue]]
speaker = "ディーラック"
original = "「…………さあね」"
translation = "「…………글쎄다」"

[[dialogue]]
speaker = "ディーラック"
original = "「でも、まあ……せいぜい幸運に感謝して、愚かに生き続ければいいんじゃない？」"
translation = "「하지만 뭐…… 기껏해야 행운에 감사하며 어리석게 계속 살아가면 되지 않겠어?」"

[[dialogue]]
speaker = "シズハ"
original = "「うん！\u3000私、ディーちゃんからもらった命、大切にする。あと――」"
translation = "「응! 나, 디 짱이 준 목숨 소중히 할게. 그리고──」"

[[dialogue]]
speaker = "シズハ"
original = "「私、ディーちゃんがマイナスエネルギーじゃなくてもお腹いっぱいになれる方法を、見つけてみせるから！」"
translation = "「나, 디 짱이 마이너스 에너지가 아니어도 배불러질 수 있는 방법, 찾아낼 테니까!」"

[[dialogue]]
speaker = "ディーラック"
original = "「ふん……何も方策が思いついてない癖に、威勢だけは一丁前。つくづく愚かなヒトカスなのサ」"
translation = "「흥…… 아무런 방책도 떠오르지 않은 주제에 기세만은 당당하네. 끝까지 어리석은 인간 쓰레기라네」"

[[dialogue]]
speaker = "ディーラック"
original = "「ボクを生かしておいたこと、いつか絶対後悔するよ？\u3000シズハちゃん」"
translation = "「나를 살려둔 것, 언젠가 반드시 후회할 거라구? 시즈하 짱」"

[[dialogue]]
speaker = "シズハ"
original = "「絶対に後悔しない。生きててよかったって、いつか必ず思わせてみせるよ！」"
translation = "「절대로 후회 안 해. 살아있어서 다행이라고 언젠가 반드시 생각하게 해줄 거야!」"

[[dialogue]]
speaker = "シズハ"
original = "「だから、見てて！\u3000ディーちゃん♪」"
translation = "「그러니까 지켜봐 줘! 디 짱♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、シズハは嬉しそうに笑う。"
translation = "그렇게 말하며 시즈하는 기쁜 듯이 웃는다."

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그런데 그때였다."

[[dialogue]]
speaker = "サチ"
original = "「……あっ、お兄さん、ちょっと失礼しますね」"
translation = "「……앗, 오빠, 잠시 실례할게요」"

[[dialogue]]
speaker = "unk"
original = "サチ、どうしたの？"
translation = "사치, 왜 그래?"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんの制服の肩に、小さな糸くずが乗ってるのが見えて……よいしょっと……」"
translation = "「오빠 교복 어깨에 작은 실밥이 얹혀 있는 게 보여서…… 영차……」"

[[dialogue]]
speaker = "unk"
original = "サチがちょっと背伸びをしながら手を伸ばしてきて、俺は取りやすいように腰を少しかがめる。"
translation = "사치가 조금 까치발을 하며 손을 뻗어오고, 나는 집기 편하도록 허리를 조금 굽힌다."

[[dialogue]]
speaker = "unk"
original = "すると――"
translation = "그러자──"

[[dialogue]]
speaker = "サチ"
original = "「えっ……きゃっ！？」"
translation = "「엣…… 꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "なんと、つま先立ちをしたサチがバランスを崩して、俺の方へ倒れ込んで来る。"
translation = "무려 까치발을 한 사치가 균형을 잃고 내 쪽으로 쓰러져 온다."

[[dialogue]]
speaker = "unk"
original = "咄嗟に彼女の体を受け止めようとするが、俺も半端な姿勢だった為、同じくバランスを崩して――"
translation = "급히 그녀의 몸을 받쳐주려 하지만, 나도 어정쩡한 자세였던 탓에 마찬가지로 균형을 잃고──"

[[dialogue]]
speaker = "サチ"
original = "「う、う～ん……はっ！？」"
translation = "「으, 으음…… 핫!?」"

[[dialogue]]
speaker = "unk"
original = "気づけば俺はサチに押し倒され、彼女の小さな胸に真正面から顔を埋めるような態勢になっており。"
translation = "정신을 차려보니 나는 사치에게 깔려 있었고, 그녀의 작은 가슴에 정면으로 얼굴을 묻은 듯한 태세가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、俺の両手は何故か彼女のお尻を掴むような形になってしまっていた。"
translation = "그리고 내 양손은 왠지 그녀의 엉덩이를 움켜쥔 듯한 형태가 되어 버렸다."

[[dialogue]]
speaker = "サチ"
original = "「な、ななな、なっ……！？」"
translation = "「나, 나나나, 나……!?」"

[[dialogue]]
speaker = "サチ"
original = "「きゃああああああぁ～～～っ！？\u3000どこ触ってるんですか、お兄さんっ！？」"
translation = "「꺄아아아아아아앗~~!? 어디 만지는 거예요, 오빠!!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「おっ！\u3000久しぶりに見たのじゃ、この光景！\u3000安定の破廉恥っぷりじゃな♪」"
translation = "「오! 오랜만에 보는구나, 이 광경! 여전한 파렴치함이로다♪」"

[[dialogue]]
speaker = "トマル"
original = "「相変わらず、お２人とも仲がよろしくて、羨ま……いえ、喜ばしく……<emoji=heart04>」"
translation = "「여전히 두 분 다 사이가 좋으셔서 부러…… 아니, 기쁘네……<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふふふっ♪\u3000こっちも一件落着で、めでたしめでたしですね☆」"
translation = "「후후후♪ 이쪽도 일단락돼서 다행이네요☆」"

[[dialogue]]
speaker = "サチ"
original = "「エッ――」"
translation = "「에──」"

[[dialogue]]
speaker = "サチ"
original = "「エッチなのは禁止ですーーーーーーーーーっ！！！」"
translation = "「변태 같은 건 금지예요─────────!!!」"

[[dialogue]]
speaker = "unk"
original = "いつも通りのサチの元気な叫び声と、魔法少女たちの楽しそうな笑い声が、学園の空に響くのだった――"
translation = "평소와 다름없는 사치의 활기찬 비명과 마법소녀들의 즐거운 웃음소리가 학원의 하늘에 울려 퍼지는 것이었다──"

