[[dialogue]]
speaker = "unk"
original = "第１話,運命の君,P"
translation = "제1화, 운명의 그대, P"

[[dialogue]]
speaker = "unk"
original = "昼休み、星徒会で使う資料が校舎隅の倉庫にあると聞き、昼食も食べ終えたので取りにやって来たのだが――"
translation = "점심시간, 성도회에서 쓸 자료가 교사 구석 창고에 있다는 말을 듣고, 점심도 다 먹었기에 가지러 왔는데──"

[[dialogue]]
speaker = "ジュエリー"
original = "「もぐもぐ……おや？」"
translation = "「우물우물…… 어라?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「やあ、来たか。そろそろだと思って、トマトサンドを食べながら待っていたよ。我が『運命の君』」"
translation = "「야아, 왔나. 슬슬 올 거라고 생각해서 토마토 샌드위치를 먹으며 기다리고 있었어. 나의 『운명의 그대』」"

[[dialogue]]
speaker = "ジュエリー"
original = "「運命の君、とは何かって？\u3000なるほど当然の疑問だね」"
translation = "「운명의 그대란 게 뭐냐고? 과연 당연한 의문이군」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なに、私の友人にちょっと『預言者』が居てね。彼女に言われたのさ」"
translation = "「별거 아냐, 내 친구 중에 좀 특이한 『예언자』가 있거든. 그녀가 말해주었지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「新星学園で運命の人との出会いがある。そして、それは会長――キミであるとね」"
translation = "「신성학원에서 운명의 상대와의 만남이 있다. 그리고 그것은 회장── 바로 너라고 말이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ならば１度会ってみようじゃないかと、キミの転入初日からタイミングを伺っていたのだが、これがいざ実行しようとすると、なかなか思うように行かない」"
translation = "「그렇다면 한 번 만나보지 않겠나 싶어 네가 전학 온 첫날부터 타이밍을 엿보고 있었는데, 이게 막상 실행하려고 하니 좀처럼 생각대로 되지 않더군」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それはもう、面白いくらいにね。無視出来ない事件が発生したり、キミに別の出会いがあったりして、気付けば今日まで待つことになってしまった」"
translation = "「그게 참 우스울 정도로 말이야. 무시할 수 없는 사건이 발생하거나, 네게 다른 만남이 있거나 해서, 정신을 차려보니 오늘까지 기다리게 되어버렸어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なるほど、まさに運命のようじゃないか、と私は思ったよ。実に面白いね」"
translation = "「과연, 그야말로 운명 같지 않은가, 하고 나는 생각했지. 실로 흥미로워」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、申し遅れたね。私の名前は、ジュエリーという。隣の流星学園に通う１年生だ」"
translation = "「아아, 자기소개가 늦었군. 내 이름은 쥬얼리라고 해. 옆 학교인 유성학원에 다니는 1학년이다」"

[[dialogue]]
speaker = "ジュエリー"
original = "「自分で言っておいて何だが、キミより後輩だったのを今思い出したよ。敬語については……すまない、あまり得意ではないんだ。この口調のままで許してくれるだろうか？」"
translation = "「직접 말해놓고 좀 그렇지만, 내가 너보다 후배였다는 게 이제야 생각났어. 경어에 대해서는…… 미안하지만, 별로 자신 없거든. 이 말투 그대로 써도 허락해주겠나?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ありがとう。キミの寛大さに感謝するよ、星徒会長」"
translation = "「고마워. 너의 너그러움에 감사하지, 성도회장」"

[[dialogue]]
speaker = "ジュエリー"
original = "「……ん？\u3000どうしてここに来るのが分かったのか？\u3000なに、ちょっとした想像だよ。私は何かを批評するのが得意なものでね」"
translation = "「……응? 어떻게 여기가 올 줄 알았냐고? 뭐, 약간의 상상이야. 나는 무언가를 비평하는 게 특기라서 말이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「付け加えるなら、私の体質的に都合が良かった、というのもある。私は生まれつき、肌が弱くてね」"
translation = "「덧붙이자면, 내 체질상 형편이 좋았다는 점도 있어. 나는 태생적으로 피부가 약하거든」"

[[dialogue]]
speaker = "ジュエリー"
original = "「太陽光が強く差す場所は苦手なのさ。その点、この校舎隅は絶妙に日陰が出来て、うってつけだったというわけだ」"
translation = "「태양 광선이 강하게 비치는 장소는 질색이야. 그런 점에서 이 교사 구석은 절묘하게 그늘이 생겨서 딱 좋았다는 거지」"

[[dialogue]]
speaker = "unk"
original = "屋内なら日傘を差さなくてもよくない？"
translation = "실내라면 양산을 쓰지 않아도 되지 않아?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、よく言われるよ。なぜ屋内でも日傘を使うのかとね。しかし、それにはちゃんとした理由がある」"
translation = "「후훗, 자주 듣는 말이야. 왜 실내에서도 양산을 쓰냐고 말이지. 하지만 거기에는 제대로 된 이유가 있어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私はこれまでの人生経験上、うっかりどこかに傘を置き忘れてしまうことが多くてね」"
translation = "「나는 지금까지의 인생 경험상, 깜빡하고 어딘가에 우산을 두고 오는 일이 많아서 말이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「昔１度、真夏の昼間にやらかして、日傘を紛失した結果、日が落ちるまで家に帰れなくなったことがあった。いや、あれは、今思い出しても苦い経験だよ」"
translation = "「옛날에 한 번, 한여름 대낮에 사고를 쳐서 양산을 분실한 결과, 해가 질 때까지 집에 돌아가지 못하게 된 적이 있었지. 아니, 그건 지금 생각해도 쓰라린 경험이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それ以来、そんな面倒を避ける為にはどうしたらいいかと考えてね。思い付いたのが『常に日傘を差していればなくさない』というアイデアだったわけさ」"
translation = "「그 이후로 그런 번거로움을 피하려면 어떻게 해야 할까 생각했지. 떠올린 것이 『항상 양산을 쓰고 있으면 잃어버리지 않는다』라는 아이디어였던 거야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「どうだい？\u3000実に明解かつ合理的な妙案だろう？」"
translation = "「어때? 실로 명쾌하고 합리적인 묘안이지?」"

[[dialogue]]
speaker = "unk"
original = "（変人だ……）"
translation = "(변인이다……)"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、もちろん人にぶつからないように注意を払っているし、周りにも体質のことは話すようにしているよ。これならば合法だろう？」"
translation = "「아아, 물론 사람에게 부딪히지 않도록 주의를 기울이고 있고, 주변에도 체질에 대해서는 이야기하고 있어. 이 정도면 합법이겠지?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「さて、話は戻すが、我が運命の君。ズバリ批評させてもらうのだが――」"
translation = "「자, 이야기는 돌아가서, 나의 운명의 그대. 단도직입적으로 비평해주겠는데──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミは以前、掃除業者のバイトをしたことがあるんじゃないかね？」"
translation = "「너는 이전에 청소 업체 알바를 한 적이 있지 않은가?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その驚いた顔を見るに、正解のようだね。何故分かったのか？\u3000細かく順を追うと話が長くなってしまうので、明解に換言するならば――」"
translation = "「그 놀란 얼굴을 보니 정답인 모양이군. 어떻게 알았냐고? 자세히 순서대로 설명하면 이야기가 길어지니, 명쾌하게 요약하자면──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミがこの学園に遅れて転入して来る理由を考えた時に、学費を貯めていたという結論に辿り着いた。そして、キミが校内で清掃している時の様子を見て……と言ったところかな」"
translation = "「네가 이 학원에 늦게 편입해 온 이유를 생각했을 때, 학비를 모으고 있었다는 결론에 도달했지. 그리고 네가 교내에서 청소하고 있을 때의 모습을 보고…… 라고나 할까」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、なに、推理なんて大したものじゃないよ。私はただ、キミの批評をしただけさ」"
translation = "「후훗, 뭐, 추리라고 할 것까진 아냐. 나는 그저 너를 비평했을 뿐이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それで、何故そんなことを指摘したのかというと、私からキミにちょっとしたバイトを依頼したいのだよ」"
translation = "「그래서 왜 그런 걸 지적했냐면, 내가 너에게 약간의 알바를 의뢰하고 싶어서야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私は批評だけは得意なのだが、生活能力はお世辞にも高いとは言い難くてね。明解に換言するならば、多少ズボラな性格、とでも言うべきか」"
translation = "「나는 비평만큼은 자신 있지만, 생활 능력은 빈말로도 높다고 하긴 어렵거든. 명쾌하게 요약하자면, 다소 게으른 성격이라고나 할까」"

[[dialogue]]
speaker = "ジュエリー"
original = "「部屋を片付けるのが苦手で、普段から散らかしがちでね。そろそろ掃除しなくてはと思っていたところだったのだよ」"
translation = "「방을 치우는 게 서툴러서 평소에 어질러놓기 일쑤거든. 슬슬 청소해야겠다고 생각하던 참이었지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「業者に頼めばいいんじゃないかって？\u3000それも考えたのだが、たまたまキミのタイミングが良さそうだったのでね」"
translation = "「업체에 맡기면 되지 않냐고? 그것도 생각했지만, 마침 너의 타이밍이 좋아 보여서 말이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私の想像が正しいのなら、キミはちょうど今日、星徒会の仕事が休みで、放課後に手が空くんじゃないかな？」"
translation = "「내 상상이 맞다면 너는 딱 오늘, 성도회 업무가 쉬는 날이라 방과 후에 시간이 비지 않나?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ、これも正解のようだね。であれば業者に頼むよりも、キミに依頼料を弾んだ方が、繋がりも出来て一石二鳥だろうと思ってね」"
translation = "「흠, 이것도 정답인 모양이군. 그렇다면 업체에 맡기는 것보다 너에게 의뢰비를 두둑이 챙겨주는 게 인맥도 생기고 일석이조라고 생각했지」"

[[dialogue]]
speaker = "unk"
original = "キミは一体、何者なんだ……？"
translation = "너는 도대체 누구야……?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、人呼んで『日傘探偵』さ」"
translation = "「후훗, 사람들이 부르길 『양산 탐정』이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「やあ、我が運命の君。ちょうど今の時間は、手が空いているんじゃないかと思ったのだが……合っているかい？」"
translation = "「야아, 나의 운명의 그대. 마침 지금 시간은 한가하지 않을까 생각했는데…… 맞나?」"

[[dialogue]]
speaker = "unk"
original = "探偵、凄いな……"
translation = "탐정, 대단하네……"

[[dialogue]]
speaker = "ジュエリー"
original = "「ははっ、ちょっとした批評から、想像を膨らませただけだよ。それで今日来たのは、まず清掃バイトの件でお礼を言いたくてね」"
translation = "「하핫, 약간의 비평에서 상상을 부풀렸을 뿐이야. 그래서 오늘 온 건, 우선 청소 알바 건으로 감사를 표하고 싶어서 말이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「昨日はありがとう。部屋の片付けを手伝ってくれて、非常に助かったよ。久しぶりに綺麗な環境で眠れて、今朝の目覚めは実に爽やかなものだった」"
translation = "「어제는 고마웠어. 방 정리를 도와준 덕분에 아주 큰 도움이 됐어. 오랜만에 깨끗한 환경에서 잠들어서 오늘 아침 기상은 실로 상쾌했지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それで、優雅に朝食を口にしていた時、ある１つのアイデアを思い付いてね。お礼を言うついでに、キミに提案したいと思ったんだ」"
translation = "「그래서 우아하게 아침 식사를 하던 중, 한 가지 아이디어가 떠올랐거든. 감사를 표하는 김에 너에게 제안하고 싶다고 생각했어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「星徒会長。是非私の――助手になってくれないだろうか？」"
translation = "「성도회장. 부디 나의── 조수가 되어주지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "助手……！？"
translation = "조수……!?"

[[dialogue]]
speaker = "ジュエリー"
original = "「掃除の手際は見事だったし、その後に私がお腹を鳴らしたら、残り物で美味しい夕飯を作ってくれただろう？\u3000それに私は、キミの顔も嫌いじゃない」"
translation = "「청소 솜씨는 훌륭했고, 그 후에 내가 배꼽시계를 울리니 남은 재료로 맛있는 저녁을 만들어줬지? 게다가 나는 너의 얼굴도 싫어하지 않아」"

[[dialogue]]
speaker = "ジュエリー"
original = "「一緒に居て、親しみが持てるとでも言うべきか。何より予言者曰く、運命の相手らしいしね。それらのことを踏まえると――」"
translation = "「함께 있어서 친근감이 든다고 해야 하나. 무엇보다 예언자가 말하길 운명의 상대라고도 하고. 그런 점들을 고려하면──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「つまりこれは、『好き』ってことじゃないか？\u3000という結論に至ったのだよ」"
translation = "「즉 이건 『좋아함』이 아닐까? 라는 결론에 도달한 거야」"

[[dialogue]]
speaker = "unk"
original = "その推理はよく分からないな！？"
translation = "그 추리는 잘 모르겠는데!?"

[[dialogue]]
speaker = "ジュエリー"
original = "「まあ、まだお互い出会ったばかり。私の考えが正解かどうかはこれからさ。というわけで――」"
translation = "「뭐, 아직 서로 만난 지 얼마 안 됐으니까. 내 생각이 정답인지는 이제부터 확인해야지. 그런 고로──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「これからよろしく頼むよ。我が助手」"
translation = "「앞으로 잘 부탁해. 나의 조수」"

[[dialogue]]
speaker = "unk"
original = "そう言って、日傘を差した探偵は、実に面白そうに微笑むのだった――"
translation = "그렇게 말하며 양산을 쓴 탐정은 실로 즐거운 듯 미소 짓는 것이었다──"

