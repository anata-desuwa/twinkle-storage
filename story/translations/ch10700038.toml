[[dialogue]]
speaker = "unk"
original = "ハロウィンに賑わう街で遊んで、そろそろ寮に戻る時間が近づいてくる。"
translation = "할로윈으로 북적이는 거리에서 놀다가, 슬슬 기숙사로 돌아갈 시간이 다가온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウズメ、今日はどうする？」"
translation = "「우즈메, 오늘은 어떻게 할 거야?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「まだ時間あるよ。も～、分かってて聞いてるし……」"
translation = "「아직 시간 있시. 모~, 알고서 묻는 시잖아……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ご休憩、していこっ<emoji=heart04>」"
translation = "「잠깐 쉬었다 가자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "袖を引っ張るウズメの視線の先には、暗がりに光るラブホテルの入り口があった。"
translation = "소매를 잡아당기는 우즈메의 시선 끝에는, 어둠 속에서 빛나는 러브호텔 입구가 있었다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えへへ、今日のあたしは狼さんだから、会長くんを襲って食べちゃうし♪」"
translation = "「에헤헤, 오늘의 나는 늑대니까, 회장군을 덮쳐서 잡아먹을 시♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ、そういうノリなんだ」"
translation = "「아, 그런 분위기인 거네.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「せっかくのハロウィンだし、仮装してるし、楽しまない手はないっしょ？」"
translation = "「모처럼 할로윈이고, 코스튬도 입었는데, 즐기지 않을 수 없잖아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは仮装じゃなくて戦闘服だろ？」"
translation = "「그건 코스튬이 아니라 전투복이잖아?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「まあまあ、細かいことは言わないし♪\u3000今夜は逃がさないぞ～<emoji=heart04>」"
translation = "「뭐, 뭐, 사소한 건 말하지 말시♪ 오늘 밤은 안 놓칠 거시야~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、攻める気満々のウズメだったのだが──"
translation = "라며, 공격할 기세가 가득했던 우즈메였지만──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──とか、調子に乗ったこと言ってたけど、何なんだ、この無様な様子は」"
translation = "「──라고, 잘난 척 말하더니, 뭐야, 이 볼품없는 모습은.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だ、だって……会長くんの愛撫が気持ちよすぎるのがいけないし……」"
translation = "「다, 당해도…… 회장군의 애무가 너무 기분 좋은 게 나쁜 시잖아……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウズメ、敬語」"
translation = "「우즈메, 경어.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ご、ごめんなさいっ！\u3000わかりましたぁっ！！」"
translation = "「죄, 죄송합니다앗! 알겠습니다아!!」"

[[dialogue]]
speaker = "unk"
original = "ウズメはホテルの壁にかかっている鏡に手を突いてお尻を突き出している。"
translation = "우즈메는 호텔 벽에 걸린 거울에 손을 짚고 엉덩이를 내밀고 있다."

[[dialogue]]
speaker = "unk"
original = "お尻を叩かれておずおずと向けた視線の先には、赤面するほど恥ずかしい格好の自身が写っていた。"
translation = "엉덩이를 맞고 머뭇거리며 돌린 시선 끝에는, 얼굴이 빨개질 정도로 부끄러운 차림의 자신이 비치고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「鏡に映った自分を見てみろ。どんな姿が写ってる？」"
translation = "「거울에 비친 네 자신을 봐라. 어떤 모습이 비치고 있지?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「お尻を突き出して、会長くんにおち○ぽ入れてもらえるのを待ってる、メスオオカミの姿が写ってます……」"
translation = "「엉덩이를 내밀고, 회장군에게 자○를 넣어주기를 기다리는, 암컷 늑대의 모습이 비치고 있습니다……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そのメスオオカミは……待ちきれない様子で……おま○こから恥ずかしいおつゆをダラダラとだらしなく垂らしてます……」"
translation = "「그 암컷 늑대는…… 기다릴 수 없다는 듯이…… 보○에서 부끄러운 국물을 줄줄 흘리고 있습니다……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「挿入もしていないのにそんな状態になるなんて、どういうことなんだろうな？」"
translation = "「삽입도 하지 않았는데 그런 상태가 되다니, 무슨 일인 걸까?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「これからこの会長くんのたくましいおち○ぽでめちゃくちゃにされるんだって思うと……それだけで興奮が抑えられないんです<emoji=heart04>」"
translation = "「이제부터 이 회장군의 늠름한 자○로 엉망진창이 될 거라고 생각하니…… 그것만으로 흥분을 억누를 수 없는 겁니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そんな自分の状態を口で言わされて……もっと興奮してしまっているはしたないメスオオカミです……<emoji=heart04>」"
translation = "「그런 자신의 상태를 입으로 말하게 되어…… 더욱 흥분해 버리고 있는 천박한 암컷 늑대입니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「我慢できないくらい、これが欲しいんだな？」"
translation = "「참을 수 없을 만큼, 이게 갖고 싶은 거구나?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「欲しいです……<emoji=heart04>\u3000焦らさないで、お願いですから会長くんのおち○ぽを、あたしのおま○こにぶち込んでください……<emoji=heart04>」"
translation = "「갖고 싶습니다……<emoji=heart04> 애태우지 말고, 부탁이니까 회장군의 자○를, 제 보○에 박아 넣어 주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「仕方ないな……それじゃ入れてやるから、しっかり受け止めろ」"
translation = "「어쩔 수 없지…… 그럼 넣어 줄 테니, 제대로 받아내.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「は、はいっ<emoji=heart04>」"
translation = "「하, 하이잇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あぁあああああん……っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아앙……읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はウズメの腰をしっかりつかむと、じりじりと焦らすようにペニスを挿入していく。"
translation = "나는 우즈메의 허리를 단단히 잡고, 지긋지긋하게 애태우듯이 페니스를 삽입해 나간다."

[[dialogue]]
speaker = "unk"
original = "鏡にはその様子が写り、ウズメの目にもそれはしっかり見えたことだろう。"
translation = "거울에는 그 모습이 비쳤고, 우즈메의 눈에도 그것이 확실히 보였을 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「欲しがってたものが入ってきた様子はどうだ？」"
translation = "「원하던 것이 들어온 모습은 어때?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「は、はい……おま○こにおち○ぽが突き刺さってます……その様子が、はっきり見えます……」"
translation = "「하, 하이…… 보○에 자○가 박혀 있습니다…… 그 모습이, 선명하게 보입니다……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それに……あはっ……嬉しそうな顔……あたし、おち○ぽ入れてもらって、こんなに悦んでるんだぁ<emoji=heart04>」"
translation = "「게다가…… 아핫…… 기쁜 듯한 얼굴…… 저, 자○ 넣어줘서, 이렇게 기뻐하고 있네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「おち○ぽ入れられただけで……おま○こから涎を垂らして……蕩け顔になっちゃってるぅ<emoji=heart04>」"
translation = "「자○ 넣어졌다는 것만으로…… 보○에서 침을 흘리고…… 녹아내리는 얼굴이 되어 버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごいな、ギュウギュウ締め付けてくる。自分の恥ずかしい様子を口にするのがそんなに興奮するんだな」"
translation = "「대단하네, 꽉꽉 조여오는군. 자신의 부끄러운 모습을 입으로 말하는 게 그렇게 흥분되나 보네.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（興奮、してる……んんっ……自分で自分の恥ずかしいところ言わされて……興奮、してる……？）"
translation = "（흥분, 하고 있어…… 응응읏…… 스스로 자신의 부끄러운 부분을 말하게 되어서…… 흥분, 하고 있는 시……?）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうなんだ？」"
translation = "「어떤데?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ひゃうっ<emoji=heart04>\u3000は、はいっ……興奮、してるしっ<emoji=heart04>」"
translation = "「햐웃<emoji=heart04> 하, 하이잇…… 흥분, 하고 있시욧<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、あ……あああっ……んっ、あっ、あああっ……<emoji=heart04>」"
translation = "「앗, 아…… 아아앗…… 응읏, 앗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゆっくりとしたピストンを開始する。"
translation = "느린 피스톤을 시작한다."

[[dialogue]]
speaker = "unk"
original = "掴んでいる腰を揺さぶり動かすと、にゅるりとした快感がペニスに走り、思わず声が漏れてしまいそうになる。"
translation = "잡고 있는 허리를 흔들어 움직이자, 미끈거리는 쾌감이 페니스로 달려와, 무심코 신음이 새어 나올 것만 같다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はぁっ、はぁっ……会長くんの、おち○ぽ……動き出した……んんっ……出たり入ったりするのが見えるし……」"
translation = "「하앗, 하앗…… 회장군의, 자○…… 움직이기 시작했시…… 응응읏…… 나왔다 들어갔다 하는 게 보이는 시……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「充血した……おま○こ肉を押し広げて……んんっ……会長くんのぶっといの、ずぶっずぶって……ああんっ……<emoji=heart04>」"
translation = "「충혈된…… 보○ 살을 밀어 넓히고…… 응응읏…… 회장군의 굵은 거, 즈붓 즈붓하고…… 아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんのおち○ぽ……んっ、あっ……気持ちいいとこ、こすってくるし……あ、ああ、ん、ああっ……<emoji=heart04>」"
translation = "「회장군의 자○…… 응읏, 앗…… 기분 좋은 곳, 문지르는 시…… 아, 아아, 응, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（あぁ……ん……会長くんのおち○ぽ……あたしの感じるところ、見逃さないんだぁ……嬉しいよぉ<emoji=heart04>）"
translation = "（아아…… 응…… 회장군의 자○…… 내가 느끼는 곳, 놓치지 않는구나아…… 기뻐요오<emoji=heart04>）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（あたしのこと、絶対に気持ちよくするって決めてるみたい……あぁあ、気持ちよすぎだしぃっ<emoji=heart04>）"
translation = "（나를, 절대로 기분 좋게 해 주겠다고 결정한 것 같아…… 아아아, 너무 기분 좋은 시잖아앗<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "俺はウズメの求めに応じるように、膣内の弱いところに先端を擦りあてる。"
translation = "나는 우즈메의 요구에 응하듯이, 질 내부의 약한 곳에 끝을 문지른다."

[[dialogue]]
speaker = "unk"
original = "的確な刺激に、ウズメはぶるぶるっと身を震わせながら快感を訴える。"
translation = "정확한 자극에, 우즈메는 부들부들 몸을 떨면서 쾌감을 호소한다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ああっ、あっ、んっ、あっ……あぁあ……あ、はぁ、あ、ああっ……<emoji=heart04>」"
translation = "「아앗, 앗, 응읏, 앗…… 아아아…… 아, 하아, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「んっ、あっ、んんぅっ……ヤバい、よぉ……それ、感じすぎちゃうっ……んっ、あ、あああっ……<emoji=heart04>」"
translation = "「응읏, 앗, 응으으읏…… 위험해, 요오…… 그거, 너무 느껴 버려읏…… 응읏, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「感じるより先に、やることがあるだろ？」"
translation = "「느끼기 전에, 할 일이 있잖아?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「んっ、う、んんんっ……会長くんを、気持ちよくするっ……んんっ、あっ、んぅううっ……」"
translation = "「응읏, 우, 응응응읏…… 회장군을, 기분 좋게 할 시읏…… 응응읏, 앗, 응으으으읏……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ああんっ<emoji=heart04>\u3000ダメだしぃっ、そんなにされたら、力が……入んなくなっちゃうっ……んんっ、ああっ……<emoji=heart04>」"
translation = "「아앙읏<emoji=heart04> 안 될 시이잇, 그렇게 당하면, 힘이…… 안 들어가 버려읏…… 응응읏, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「おち○ぽ、ちゃんと締められないよぉ……あっ、あっ、ああ、ん、あああっ……<emoji=heart04>」"
translation = "「자○, 제대로 조일 수 없어어…… 앗, 앗, 아아, 응, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だったらこうしてやったらどうだ？」"
translation = "「그렇다면 이렇게 해 주면 어때?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あああんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앙읏읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうそう、そうやってしっかり締めているんだぞ」"
translation = "「그래 그래, 그렇게 제대로 조이고 있는 거다.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はぁ、ん……んふぅ……会長くんのおち○ぽ、しっかり締めてますっ……<emoji=heart04>」"
translation = "「하아, 응…… 응후우…… 회장군의 자○, 제대로 조이고 있습니다읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「尻を叩かれて感じたのか？\u3000それで締め付けが増すなんてドＭが過ぎるんじゃないか？」"
translation = "「엉덩이를 맞고 느낀 건가? 그걸로 조임이 늘어나다니 도M이 지나친 거 아니야?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うぅぅ……はい……あたしは、お尻を叩かれてかんじちゃう、変態のドＭですっ……<emoji=heart04>」"
translation = "「으으으…… 하이…… 저는, 엉덩이를 맞고 느껴 버리는, 변태 도M입니다읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あううっ！\u3000んんっ……気持ちいい……<emoji=heart04>\u3000んんっ、ぁ……んんぅ……<emoji=heart04>」"
translation = "「아우읏! 응응읏…… 기분 좋아……<emoji=heart04> 응응읏, 아…… 응으으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「こうやって会長くんにいじめられるの、大好きです……だから、もっと……お願いしますっ……<emoji=heart04>」"
translation = "「이렇게 회장군에게 괴롭힘당하는 거, 정말 좋아합니다…… 그러니까, 더…… 부탁드립니다읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当にエロくて変態だな……最高だよ、ウズメ……」"
translation = "「정말 야하고 변태 같네…… 최고야, 우즈메……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あぁあ、ありがとう、ございますっ……<emoji=heart04>\u3000んっ、あ、んんぅ……んうう……はぁ、ん、ああぅ……んんっ……」"
translation = "「아아아, 감사, 합니다앗……<emoji=heart04> 응읏, 앗, 응으으…… 응우우…… 하아, 응, 아아우…… 응응읏……」"

[[dialogue]]
speaker = "unk"
original = "被虐心の高まったウズメに火をつけるように、俺は彼女を貫くピストンを一気に速めた。"
translation = "피학심이 고조된 우즈메에게 불을 붙이듯이, 나는 그녀를 꿰뚫는 피스톤을 단숨에 빠르게 했다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あああんっ<emoji=heart04>\u3000あっ、あっ、あっ、あ、ああっ……んんっ、あ、あああっ<emoji=heart04>」"
translation = "「아아앙읏<emoji=heart04> 앗, 앗, 앗, 아, 아아앗…… 응응읏, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんのが、奥の方を……ああっ、あっ……ガンガン、突いてるっ……ん、あ、あああっ<emoji=heart04>」"
translation = "「회장군의 것이, 안쪽을…… 아앗, 앗…… 쾅쾅, 찌르고 있어읏…… 응, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「容赦なく突いて、あたしのおま○こ……悦ばせてくれてるっ……んんっ、あっ、あ、あああっ、あ、やぁあっ……<emoji=heart04>」"
translation = "「용서 없이 찔러서, 제 보○를…… 기쁘게 해 주고 있어읏…… 응응읏, 앗, 아, 아아앗, 아, 야아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（すっごい音だし……パンパンって音が、隣の部屋にまで聞こえちゃいそう……）"
translation = "（엄청난 소리 시…… 팡팡 하는 소리가, 옆방까지 들릴 것 같아……）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（どんだけ激しく求めてくれてんだろ……あぁ……すごいよぉ……気持ちよすぎて変になっちゃうよぉ<emoji=heart04>）"
translation = "（얼마나 격렬하게 원하는 걸까…… 아아…… 대단해애…… 너무 기분 좋아서 이상해질 것 같아아<emoji=heart04>）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はぁっ、はぁっ、あっ、あっ、あ、ああっ<emoji=heart04>\u3000んんっ、はぁ、あ、あああっ、んんっ、あ、ああっ<emoji=heart04>」"
translation = "「하앗, 하앗, 앗, 앗, 아, 아아앗<emoji=heart04> 응응읏, 하아, 아, 아아앗, 응응읏, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんっ、あたし、激しいの好きっ<emoji=heart04>\u3000むちゃくちゃにされるのが、好きっ<emoji=heart04>」"
translation = "「회장군읏, 나, 격렬한 거 좋아앗<emoji=heart04> 엉망진창이 되는 게, 좋아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だからもっと、おねがいしますっ<emoji=heart04>\u3000たくましいおち○ぽでっ……ああっ……壊れるくらい突きまくってっ<emoji=heart04>」"
translation = "「그러니까 더, 부탁드립니다앗<emoji=heart04> 늠름한 자○로읏…… 아앗…… 부서질 정도로 마구 찔러 줘읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、お望み通り……むちゃくちゃにしてやるよ……！」"
translation = "「아아, 원하는 대로…… 엉망진창으로 만들어 줄게……!」"

[[dialogue]]
speaker = "unk"
original = "身体を叩きつける度に、ウズメの身体が跳ねる。"
translation = "몸을 부딪칠 때마다, 우즈메의 몸이 튀어 오른다."

[[dialogue]]
speaker = "unk"
original = "その度にウズメの形のいい胸が歪んで跳ね上がり、その様子でますます興奮をかき立てられる。"
translation = "그때마다 우즈메의 모양 좋은 가슴이 일그러지며 솟아오르고, 그 모습에 더욱 흥분이 고조된다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おっぱいが揺れてるところも見えるか？」"
translation = "「가슴이 흔들리는 것도 보이는가?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はいっ、ん、んぅぅっ……<emoji=heart04>\u3000見え、ますっ……おち○ぽが突き入れられるたびに、ブルンブルンって揺れてますっ……<emoji=heart04>」"
translation = "「하이잇, 응, 응으으읏……<emoji=heart04> 보이, 는 시읏…… 자○가 찔러 들어올 때마다, 부들부들 흔들리고 있습니다읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エロいよ、ウズメ。最高のエロ乳だ」"
translation = "「야하네, 우즈메. 최고의 야한 가슴이야.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くん、んんっ、あたしのおっぱい好き？\u3000乱暴にしたい？」"
translation = "「회장군, 응응읏, 제 가슴 좋아해요? 난폭하게 하고 싶어요?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だったら、してくださいっ<emoji=heart04>\u3000手のひらで握りつぶすくらい、強くつかんだり……乳首を抓ったりしてくださいっ……<emoji=heart04>」"
translation = "「그렇다면, 해 주세요읏<emoji=heart04> 손바닥으로 쥐어 터뜨릴 정도로, 세게 잡거나…… 젖꼭지를 꼬집거나 해 주세요읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、両方可愛がってやるよ」"
translation = "「아아, 둘 다 귀여워해 줄게.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あああっ、んっ、あ、ああっ<emoji=heart04>\u3000おっぱい揉まれながら、おま○こもずぽずぽされてるぅっ<emoji=heart04>\u3000上も下も感じさせられちゃってるぅっ<emoji=heart04>」"
translation = "「아아앗, 응읏, 아, 아아앗<emoji=heart04> 가슴 주무르면서, 보○도 즈보즈보 당하고 있어읏<emoji=heart04> 위도 아래도 느끼게 당하고 있어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「こんなのむりぃっ！\u3000どこまでも気持ちよくなっちゃうしっ<emoji=heart04>」"
translation = "「이런 거 무리이잇! 한없이 기분 좋아져 버릴 시읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "切迫した声が示すように、ウズメの絶頂も迫っているようだった。"
translation = "절박한 목소리가 보여주듯이, 우즈메의 절정도 다가오고 있는 듯했다."

[[dialogue]]
speaker = "unk"
original = "同時に俺も、痺れるような快感がペニスを通じて下半身を支配していく。"
translation = "동시에 나도, 저릿한 쾌감이 페니스를 통해 하반신을 지배해 간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気持ちよくなってきたぞ……このまま中に出すからな……」"
translation = "「기분 좋아졌어…… 이대로 안에 쌀 거니까……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、ああっ、ん、出してっ<emoji=heart04>\u3000あたしの中に、たっぷり注ぎ込んでくださいっ！」"
translation = "「앗, 아앗, 응, 싸 줘읏<emoji=heart04> 제 안에, 가득 부어 주세요읏!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「特濃の精子欲しいっ<emoji=heart04>\u3000一方的に孕ませられたいっ<emoji=heart04>\u3000ああっ、あっ、あっ、あっ、あ、ああああっ<emoji=heart04>」"
translation = "「특농의 정자 원해읏<emoji=heart04> 일방적으로 임신당하고 싶어읏<emoji=heart04> 아앗, 앗, 앗, 앗, 아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「孕ませて欲しかったら、おま○こを全力で締めて搾り取れ……！」"
translation = "「임신하고 싶다면, 보○를 전력으로 조여서 짜내!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ん、うんっ<emoji=heart04>\u3000ちゃんと、会長くんの赤ちゃん、妊娠できるようにっ、んっ、んんんっ、全力で、締めるしっ、ん、あああっ<emoji=heart04>」"
translation = "「응, 응읏<emoji=heart04> 제대로, 회장군의 아기, 임신할 수 있도록읏, 응읏, 응응응읏, 전력으로, 조일 시읏, 응, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「どう？\u3000会長くんっ、んんっ、はぁ、あ……これで、妊娠できる？\u3000会長くんに、孕ませ汁、びゅーびゅーしてもらえるっ？」"
translation = "「어때요? 회장군읏, 응응읏, 하아, 아…… 이걸로, 임신할 수 있어요? 회장군에게, 임신시키는 정액, 뷰뷰 맞을 수 있어요읏?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、気持ちいい。絶対に妊娠するくらいいっぱい出そうだ」"
translation = "「아아, 기분 좋아. 절대로 임신할 만큼 잔뜩 나올 것 같아.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「嬉しい、んんっ、あっ、あ、ああっ、あっ、あああ……あっ、ん、あ、ああっ、あ、あああっ……<emoji=heart04>」"
translation = "「기뻐, 응응읏, 앗, 아, 아앗, 앗, 아아아…… 앗, 응, 아아, 아앗, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「出してっ、くださいっ<emoji=heart04>\u3000思いっきり、おま○こにっ！\u3000あふれるくらいっ、あ、あ、あ、ああ、あ……ん、あぁ、あああっ<emoji=heart04>」"
translation = "「싸 줘읏, 주세요읏<emoji=heart04> 힘껏, 보○에읏! 넘칠 만큼읏, 아, 아, 아, 아아, 아…… 응, 아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ああ、あっ、あああっ、んんっ、はぁ、あ、あああっ<emoji=heart04>\u3000あ、ん、ん、ふぁ、あ、あ、あああっ、や、んんっ、あっ、ああ、あ、ああ……」"
translation = "「아아, 앗, 아아앗, 응응읏, 하아, 아, 아아앗<emoji=heart04> 아, 응, 응, 하아, 아, 아아앗, 야, 응응읏, 앗, 아아, 아, 아아……」"

[[dialogue]]
speaker = "unk"
original = "熱い何かがこみ上げてくる。"
translation = "뜨거운 무언가가 치밀어 오른다."

[[dialogue]]
speaker = "unk"
original = "それをせき止めながら熱い息を吐き出し、夢中になってピストンを速めていく。"
translation = "그것을 막아내며 뜨거운 숨을 내쉬고, 정신없이 피스톤을 빠르게 해 나간다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「おち○ぽ、ビクビクしてるっ、んんっ、あっ、あ、ああっ……あたしの中で、爆発寸前ってこと……？\u3000ああっ、あ、ん、あぁあんっ<emoji=heart04>」"
translation = "「자○, 부들부들 떨고 있어읏, 응응읏, 앗, 아, 아앗…… 내 안에서, 폭발 직전이라는 거……? 아앗, 아, 응, 아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ん、ああっ、あ……会長くん、あたしも、だしっ……イキそう、だしっ、あっ、ああ、んんっ、あ、ああっ……<emoji=heart04>」"
translation = "「응, 아앗, 아…… 회장군, 나도, 시읏…… 갈 것 같아, 시읏, 앗, 아아, 응응읏, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、一緒にイこうか」"
translation = "「아아, 같이 가자」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「んっ、うんっ、いくっ、ああっ、あっ、んんっ、ああっ<emoji=heart04>\u3000会長くんの、射精嬉しくて、一緒にイキ果てちゃうっ<emoji=heart04>」"
translation = "「응, 응! 갈, 아앗, 앗, 응응, 아앗<emoji=heart04> 회장군의, 사정 기뻐서, 같이 절정으로 가버리는 시<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、あ、あ、あ、ああっ<emoji=heart04>\u3000はぁ、ん、んぅ、はぁ、あ、あ、ああ、あっ<emoji=heart04>\u3000ああ、あ、ああっ、んっ、あっ、く……あ、あああっ<emoji=heart04>」"
translation = "「앗, 아, 아, 아, 아앗<emoji=heart04> 하아, 응, 응으, 하아, 아, 아, 아아, 앗<emoji=heart04> 아아, 아, 아앗, 응, 앗, 크…… 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「や、あ、んんっ、ああっ、会長、くんっ<emoji=heart04>\u3000んんっ、く……イク、んぅっ、ん、ぁ、ああっ……あ、イク、イクよぉっ<emoji=heart04>」"
translation = "「야, 아, 응응, 아앗, 회장, 군<emoji=heart04> 응응, 크…… 갈, 응으, 응, 아, 아앗…… 아, 갈, 갈 거야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、や、あ、あああっ、は、あああぅ、あ、ああっ<emoji=heart04>\u3000あっ、あっ、ああっ、あ、あ、ああ、あ、ん……ぁ、あああっ……あ、んんぅ、はぁ、あ──」"
translation = "「앗, 야, 아, 아아앗, 하, 아아아으, 아, 아앗<emoji=heart04> 앗, 앗, 아앗, 아, 아, 아아, 아, 응…… 아, 아아앗…… 아, 응으, 하아, 아──」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ひぁぅ、あ、あああああっ、ぐ、イグイグイグっ<emoji=heart04>\u3000あ、あああああああああああああああ～～～～っ！！！！」"
translation = "「히야으, 아, 아아아아앗, 크, 갈, 갈, 갈<emoji=heart04> 아, 아아아아아아아아아아아아아아아아～～～～앗!!!!」"

[[dialogue]]
speaker = "unk"
original = "ウズメの絶頂の叫びとともに、しなやかな身体が大きく反り上がった。"
translation = "우즈메의 절규와 함께, 유연한 몸이 크게 젖혀졌다."

[[dialogue]]
speaker = "unk"
original = "ビクンビクンと身体を震わせるウズメの膣内に、俺は欲望の限り白濁とした液体をぶちまける。"
translation = "움찔움찔 몸을 떨게 하는 우즈메의 질 내에, 나는 욕망껏 하얗고 탁한 액체를 쏟아붓는다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あああぁぁぁあ～～～～っ！！！\u3000あっ、ふぁ、ん……あぁああああ～～～～～～っ！！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아아～～～～앗!!! 앗, 하, 응…… 아아아아아아아아～～～～～～앗!!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ああ、んんぅっ……出てるっ……<emoji=heart04>\u3000会長くんの、せーえきっ……んんっ、注ぎ込まれてるっ……んんぅっ……<emoji=heart04>」"
translation = "「아아, 응으…… 나오고 있어……<emoji=heart04> 회장군의, 정액…… 응으, 흘러 들어오고 있어…… 응으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウズメは無理やり孕まされるのを歓喜するように、声を震わせながら流し込まれる俺の子種を受け止める。"
translation = "우즈메는 억지로 임신당하는 것을 환희하듯이, 목소리를 떨면서 흘러 들어오는 나의 씨앗을 받아낸다."

[[dialogue]]
speaker = "unk"
original = "何度も脈動が繰り返され、その波が落ち着いてくると、ウズメの身体が少しずつ弛緩していくのがわかった。"
translation = "몇 번이고 맥동이 반복되고, 그 파도가 가라앉자 우즈메의 몸이 조금씩 이완되는 것을 알 수 있었다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はぁ、はぁ、んん……んぅぅ……ふぅ……はぁ……んぅ……<emoji=heart04>」"
translation = "「하아, 하아, 응응…… 응으으…… 후우…… 하아…… 응으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なんか、いつも通り……メッチャ攻められちゃったし……んんぅ……」"
translation = "「왠지, 평소대로…… 엄청나게 공격당해 버렸시…… 응으으……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「もう……鏡に映った自分のこと、説明させられたの……ちょー恥ずかしかったよ……」"
translation = "「정말…… 거울에 비친 자기 자신을, 설명하게 된 거…… 엄청 부끄러웠시……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめんな、ウズメ」"
translation = "「미안해, 우즈메」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えへへ、いいし……<emoji=heart04>」"
translation = "「에헤헤, 괜찮은 시……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ってか、その方があたしも喜ぶって分かっててやってもらってることだしね……<emoji=heart04>」"
translation = "「랄까, 그 편이 나도 기뻐한다는 걸 알고서 해주는 거니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（それに、乱暴にしたエッチの後に、ちょっと反省してる会長くんも可愛いし……<emoji=heart04>）"
translation = "（게다가, 난폭하게 한 섹스 후에, 조금 반성하는 회장군도 귀여운 시……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（何よりやっぱ激しくされるほうが気持ちいい……やっぱドＭなんだな～、あたしって……<emoji=heart04>）"
translation = "（무엇보다 역시 격렬하게 당하는 편이 기분 좋아…… 역시 도M인 건가아, 나란 애는……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ねね、会長くん。もう一回いける？」"
translation = "「저기, 저기, 회장군. 한 번 더 갈 수 있어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウズメがいいならもちろんだよ」"
translation = "「우즈메가 괜찮다면 물론이지」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「時間もあと少しなら大丈夫だし……えへへ、じゃもう１回っ<emoji=heart04>」"
translation = "「시간도 앞으로 조금이라면 괜찮은 시…… 에헤헤, 그럼 한 번 더<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とウズメは門限ギリギリになるまで、時間いっぱい愛し合ったのだった。"
translation = "이렇게 나와 우즈메는 통금 시간 직전까지, 시간 가득 사랑을 나누었던 것이다."

