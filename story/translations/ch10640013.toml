[[dialogue]]
speaker = "unk"
original = "第３話,串の達人,P"
translation = "제3화, 꼬치의 달인, P"

[[dialogue]]
speaker = "unk"
original = "カフェテリアで試作メニューの試食会が行われることになり、そこに両学園の教員や星徒会も呼ばれた。"
translation = "카페테리아에서 시제품 메뉴 시식회가 열리게 되어, 그곳에 양 학원의 교직원과 성도회도 초대받았다."

[[dialogue]]
speaker = "セーラ"
original = "「カフェテリアに串カツ～？\u3000あははっ、ざんし～ん♪」"
translation = "「카페테리아에 쿠시카츠～? 아하핫, 참신해～♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「フライとかチキンカツは元々あるし、串カツがあっても不思議じゃない……のかな？」"
translation = "「프라이나 치킨가츠는 원래 있었고, 쿠시카츠가 있어도 이상하진 않으려나……?」"

[[dialogue]]
speaker = "マリーベル"
original = "「私を呼んだ？」"
translation = "「나를 불렀어?」"

[[dialogue]]
speaker = "unk"
original = "うわ！？"
translation = "우와!?"

[[dialogue]]
speaker = "マリーベル"
original = "「串と言えば私、私と言えば串よ。私抜きで串カツをやるなんて聞き捨てならないわ」"
translation = "「쿠시카츠라고 하면 나, 나라고 하면 쿠시카츠야. 나를 빼놓고 쿠시카츠를 하다니 그냥 넘어갈 수 없네.」"

[[dialogue]]
speaker = "マトイ"
original = "「一応、一般生徒は参加できないことになってるんだけど……」"
translation = "「일단, 일반 학생은 참가할 수 없게 되어 있는데……」"

[[dialogue]]
speaker = "マリーベル"
original = "「串カツは具材が小さいからパン粉はもっと細かいのがいいわ。チキンカツと同じ粗めのパン粉だから、具材が衣のボリュームに負けてしまっているわね」"
translation = "「쿠시카츠는 재료가 작으니까 빵가루는 좀 더 고운 게 좋아. 치킨카츠랑 똑같은 굵은 빵가루라 재료가 튀김옷의 볼륨에 밀리고 있잖아.」"

[[dialogue]]
speaker = "マトイ"
original = "「聞いてない！？\u3000しかももう食べてる！？」"
translation = "「듣고 있지 않아!? 게다가 벌써 먹고 있어!?」"

[[dialogue]]
speaker = "マリーベル"
original = "「試食だと揚げたてを食べられるけど、営業中はある程度作り置きになるはず。時間が経つと食感が失われるのが気になるわね」"
translation = "「시식이라면 갓 튀긴 걸 먹을 수 있지만, 영업 중에는 어느 정도 미리 만들어 두게 될 거야. 시간이 지나면 식감이 사라지는 게 걱정되네.」"

[[dialogue]]
speaker = "マリーベル"
original = "「それに串カツは具材が重要。鮮度のいい食材が欲しいけど……カフェテリアだから妥協は必要でしょうね。そこは努力していると思うわ」"
translation = "「게다가 쿠시카츠는 재료가 중요해. 신선한 식재료를 원하지만…… 카페테리아니까 타협은 필요하겠지. 그 점은 노력하고 있다고 봐.」"

[[dialogue]]
speaker = "マリーベル"
original = "「そして串カツは串カツだけでは成り立たない。そう、ソースも大事な要素だわ」"
translation = "「그리고 쿠시카츠는 쿠시카츠만으로는 성립되지 않아. 그래, 소스도 중요한 요소지.」"

[[dialogue]]
speaker = "マリーベル"
original = "「濃すぎても薄すぎてもいけない。果実の甘酸っぱさとコク、酢の酸味、香辛料のスパイシーさ、それらが合わさって串カツに最適のソースになるの」"
translation = "「너무 진해도 너무 연해도 안 돼. 과일의 새콤달콤함과 깊은 맛, 식초의 신맛, 향신료의 스파이시함, 그것들이 어우러져 쿠시카츠에 최적의 소스가 되는 거야.」"

[[dialogue]]
speaker = "マリーベル"
original = "「そうそう、串カツのルールはわかってるかしら。ソースは二度漬け禁止。足りない時はキャベツですくってかけるの。これは鉄の掟よ」"
translation = "「그래그래, 쿠시카츠의 규칙은 알고 있나 모르겠네. 소스는 두 번 찍기 금지. 부족할 때는 양배추로 떠서 뿌리는 거야. 이건 철의 규칙이야.」"

[[dialogue]]
speaker = "unk"
original = "マリーベルって大阪出身？"
translation = "마리벨은 오사카 출신이야?"

[[dialogue]]
speaker = "マリーベル"
original = "「何言ってるの。れっきとしたイギリス人よ」"
translation = "「무슨 소릴 하는 거야. 엄연한 영국인이야.」"

[[dialogue]]
speaker = "マトイ"
original = "「新世界の人かと思った……」"
translation = "「신세카이 사람인 줄 알았어……」"

[[dialogue]]
speaker = "マリーベル"
original = "「あなたたちに本物の串カツを食べさせてあげる。パン粉もソースも自家製よ」"
translation = "「너희에게 진짜 쿠시카츠를 먹게 해 줄게. 빵가루도 소스도 수제야.」"

[[dialogue]]
speaker = "unk"
original = "そして串カツが揚がるのを待つこと少し──"
translation = "그리고 쿠시카츠가 튀겨지기를 잠시 기다리자──"

[[dialogue]]
speaker = "マリーベル"
original = "「できたわ。冷めないうちに食べなさい」"
translation = "「완성됐어. 식기 전에 먹어.」"

[[dialogue]]
speaker = "セーラ"
original = "「うっま……！\u3000何これ、めっちゃサクサクじゃん！\u3000ソースも串カツに合ってるし、いくらでも食べられそう♪」"
translation = "「마시따……! 뭐야 이거, 완전 바삭바삭하잖아! 소스도 쿠시카츠에 딱 맞고, 얼마든지 먹을 수 있을 것 같아♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「おいしい～♪\u3000でもこの味、昔食べたことあるような……」"
translation = "「맛있어~♪ 하지만 이 맛, 예전에 먹어본 적이 있는 것 같은……」"

[[dialogue]]
speaker = "マトイ"
original = "「お店出せるレベル……ていうか、こんなお店あったら足繁く通っちゃうかも」"
translation = "「가게를 차려도 될 수준…… 아니, 이런 가게가 있다면 자주 들락거릴지도.」"

[[dialogue]]
speaker = "マリーベル"
original = "「当然よ、下拵えから串打ち、油の温度管理まで全て私がやったんだから。揚げ時間も完璧よ」"
translation = "「당연하지, 밑준비부터 꼬치 꿰기, 기름 온도 관리까지 전부 내가 했으니까. 튀기는 시간도 완벽해.」"

[[dialogue]]
speaker = "マリーベル"
original = "「追加で揚げるけど、希望があるなら聞くわ。ちなみに私のおすすめは紅ショウガね」"
translation = "「추가로 튀길 건데, 원하는 게 있다면 말해. 참고로 내 추천은 베니쇼가야.」"

[[dialogue]]
speaker = "マトイ"
original = "「通ね……やっぱり大阪の人なのでは……？」"
translation = "「전문가네…… 역시 오사카 사람 아닌가……?」"

[[dialogue]]
speaker = "マリーベル"
original = "「そういえば会長さんの口から感想を聞いてなかったわね。私の串カツはどうだった？」"
translation = "「그러고 보니 회장님의 입으로 소감을 듣지 못했네. 내 쿠시카츠는 어땠어?」"

[[dialogue]]
speaker = "unk"
original = "すごくおいしかった！"
translation = "정말 맛있었어!"

[[dialogue]]
speaker = "マリーベル"
original = "「そう。まぁ、答えはわかっていたけれど」"
translation = "「그래. 뭐, 답은 알고 있었지만.」"

[[dialogue]]
speaker = "unk"
original = "モンスター以外も串刺しにするんだな"
translation = "몬스터 말고도 꼬챙이에 꿰는구나."

[[dialogue]]
speaker = "マリーベル"
original = "「そうね。串カツだけじゃなくて、焼き鳥、シシケバブ、シュラスコとか、串焼きもできるわ」"
translation = "「그렇네. 쿠시카츠뿐만 아니라 야키토리, 시시케밥, 슈라스코 같은 꼬치구이도 할 수 있어.」"

[[dialogue]]
speaker = "トワ先生"
original = "「どうしてそんなに串にこだわるの……？」"
translation = "「왜 그렇게 꼬치에 집착하는 거야……?」"

[[dialogue]]
speaker = "マリーベル"
original = "「串を見るとなぜか魂が疼くのよ」"
translation = "「꼬치를 보면 왠지 영혼이 근질거려.」"

[[dialogue]]
speaker = "マリーベル"
original = "「まるで誰かが乗り移ったみたいに、いつのまにかそうなっていたの」"
translation = "「마치 누군가가 빙의한 것처럼, 어느샌가 그렇게 되어 있었어.」"

[[dialogue]]
speaker = "セーラ"
original = "「へ～、変なのー」"
translation = "「헤~, 희한하네─.」"

[[dialogue]]
speaker = "蛍火"
original = "「確かに見事な串カツです」"
translation = "「과연 훌륭한 쿠시카츠입니다.」"

[[dialogue]]
speaker = "マリーベル"
original = "「！\u3000あなたは……東雲蛍火、だったかしら」"
translation = "「! 당신은…… 시노노메 호타루비, 였던가.」"

[[dialogue]]
speaker = "蛍火"
original = "「ええ。しがない料理人です」"
translation = "「네. 보잘것없는 요리사입니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「先ほどカフェテリアが出した串カツは私が作ったものではありません。ですがこのカフェテリアの料理人として、マリーベルさんの串カツのみが称賛されるのは看過できません」"
translation = "「방금 카페테리아가 내놓은 쿠시카츠는 제가 만든 것이 아닙니다. 하지만 이 카페테리아의 요리사로서, 마리벨 씨의 쿠시카츠만이 칭송받는 것은 간과할 수 없습니다.」"

[[dialogue]]
speaker = "マリーベル"
original = "「つまり？」"
translation = "「그 말은?」"

[[dialogue]]
speaker = "蛍火"
original = "「私の作った串カツもご賞味いただきましょう。その上でどちらの串カツがより美味だったかご判断ください」"
translation = "「제가 만든 쿠시카츠도 맛보아 주십시오. 그 연후에 어느 쪽 쿠시카츠가 더 맛있는지 판단해 주시기 바랍니다.」"

[[dialogue]]
speaker = "マリーベル"
original = "「なるほど。やる気ってわけね」"
translation = "「과연. 해 보겠다는 거네.」"

[[dialogue]]
speaker = "セーラ"
original = "「うっひゃ～。なんかすごいバチバチしてる……」"
translation = "「우햐~. 왠지 엄청 불꽃 튀는데……」"

[[dialogue]]
speaker = "蛍火"
original = "「良い機会です。串カツ以外の串料理も品評してはいかがでしょうか」"
translation = "「좋은 기회입니다. 쿠시카츠 이외의 꼬치 요리도 품평해 보시는 건 어떨까요.」"

[[dialogue]]
speaker = "マリーベル"
original = "「いいわ、受けて立ちましょう。言っておくけど負ける気はないから」"
translation = "「좋아, 받아들여 주지. 말해두겠는데 질 생각은 없으니까.」"

[[dialogue]]
speaker = "蛍火"
original = "「勝負に臨む以上当然です。では──」"
translation = "「승부에 임하는 이상 당연합니다. 그럼──」"

[[dialogue]]
speaker = "マリーベル"
original = "「串料理五番勝負──」"
translation = "「꼬치 요리 5번 승부──」"

[[dialogue]]
speaker = "蛍火"
original = "「始め！」"
translation = "「시작!」"

[[dialogue]]
speaker = "マトイ"
original = "「え？\u3000え？\u3000どうしてそうなるの？\u3000新メニューの試食はどこ行ったの～！？」"
translation = "「에? 에? 왜 그렇게 되는 거야? 신메뉴 시식은 어디 간 거야~!?」"

[[dialogue]]
speaker = "unk"
original = "そして星徒会や教員を巻き込んで、カフェテリアで熾烈な串バトルが繰り広げられたのだった……"
translation = "그리고 성도회와 교직원들까지 휘말려, 카페테리아에서 치열한 꼬치 배틀이 펼쳐진 것이었다……"

