[[dialogue]]
speaker = "unk"
original = "第１話,天才藝術家の苦悩？,P"
translation = "제1화, 천재 예술가의 고뇌? / P"

[[dialogue]]
speaker = "unk"
original = "黒ベア子が始めた『お祭り』によって、こちらの世界に迷い込んできた（自称）天才藝術家のアルテ。"
translation = "흑베아코가 시작한 『축제』에 의해 이쪽 세계로 흘러 들어온 (자칭) 천재 예술가 아르테."

[[dialogue]]
speaker = "unk"
original = "そんな彼女はこちらでの生活にもあっという間に慣れたようで、暇さえあれば星徒会室のソファに陣取ってくつろいでいるという余裕ぶりだった。"
translation = "그런 그녀는 이곳에서의 생활에도 눈 깜짝할 새 적응한 듯하여, 틈만 나면 성도회실 소파를 차지하고 누워 여유를 부리고 있었다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「なるほど……これは難しい問題です。これほどまでに私を悩ませた問題は初めてかもしれませんね」"
translation = "「과연…… 이건 어려운 문제군요. 이 정도로 저를 고민하게 만든 문제는 처음일지도 모르겠네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「初めても何も、あなた記憶喪失なんでしょ？\u3000忘れてるだけかもしれないじゃない」"
translation = "「처음이고 뭐고 너 기억상실이라며? 잊어버린 것뿐일지도 모르잖아.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ええまぁ。しかしこれほどの難問は、記憶を失うまでもおそらくなかったでしょう」"
translation = "「에에 뭐. 하지만 이 정도의 난제는 기억을 잃기 전에도 아마 없었을 겁니다.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「私、記憶喪失なんですよね」"
translation = "「저, 기억상실이거든요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もしかして、異世界に来たから……？」"
translation = "「혹시 이세계에 와서……?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「いえ、元からです」"
translation = "「아니요, 원래부터입니다.」"

[[dialogue]]
speaker = "unk"
original = "アルテは夢幻美術館に所属するまでの記憶がなく、本当の名前もわからないのだという。"
translation = "아르테는 몽환 미술관에 소속되기 전까지의 기억이 없으며 진짜 이름도 모른다고 한다."

[[dialogue]]
speaker = "unk"
original = "普通、記憶喪失になったら少なからず不安を覚えそうなものだが、アルテはむしろ泰然としていた。"
translation = "보통 기억상실이 되면 적잖이 불안을 느낄 법도 한데, 아르테는 오히려 태연자약했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなた、本当に記憶喪失なんでしょうね……？\u3000ま、いいわ。どんな問題なの？\u3000この私がバシッと相談に乗ってあげる！」"
translation = "「너 정말 기억상실 맞긴 한 거니……? 뭐 좋아. 어떤 문제인데? 이 내가 확실하게 상담해 줄게!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「自信満々ですが、ヴィーナスにこの問題が解決できるでしょうか？」"
translation = "「자신만만하시네요. 비너스에게 이 문제가 해결될까요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「出来るわよ！\u3000今までだって色んな問題にぶち当たってきたけど、ぜーんぶスパッと解決してきたんだから」"
translation = "「할 수 있어! 지금까지도 여러 문제에 부딪혀 왔지만 저언부 시원하게 해결해 왔으니까.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「本当でしょうか？\u3000疑わしいですね……」"
translation = "「정말일까요? 의심스러운데요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「疑う気持ちも分かるけど、ヴィーナスがこれまでいろいろな問題を解決してきたのは本当だよ」"
translation = "「의심하는 마음도 이해하지만, 비너스가 그동안 여러 문제를 해결해 온 건 사실이야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だから悩み事があるなら、気軽に相談していいと思う。私も及ばずながら協力するし」"
translation = "「그러니 고민이 있다면 부담 없이 상담해도 좋다고 생각해. 나도 부족하나마 협력할게.」"

[[dialogue]]
speaker = "unk"
original = "俺たちも協力するから"
translation = "우리도 협력할 테니까"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの手に余るようだったら"
translation = "비너스가 감당하기 힘들다면"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ふむ、そこまで言うのなら相談してみましょう。『三大和牛』というものをご存知ですか？」"
translation = "「흠, 거기까지 말씀하신다면 상담해 보죠. 『삼대 와규』라는 것을 알고 계십니까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん？\u3000まあ、詳しくは知らないけど……そういう呼び方があるってことくらいは」"
translation = "「응? 뭐, 자세히는 모르지만…… 그런 명칭이 있다는 것 정도는.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「その響きに興味を持って、私も調べてみました」"
translation = "「그 울림에 흥미가 생겨서 저도 조사해 보았습니다.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「柔らかく、きめ細やかな肉質で、甘く蕩けるような味わい……厳しい審査基準の元に選ばれた最高級のお肉たち」"
translation = "「부드럽고 섬세한 육질에 달콤하게 녹아드는 듯한 맛…… 엄격한 심사 기준 하에 선정된 최고급 고기들.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「その最高峰に位置づけられるのが三大和牛だそうです──」"
translation = "「그 정점에 위치한 것이 삼대 와규라고 하더군요──」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「しかし、こちらの文献によると、三大和牛として名乗りを上げるブランドは４つあるというではありませんか。これは一体どういうことなんでしょう？」"
translation = "「하지만 이 문헌에 따르면 삼대 와규로 이름을 올린 브랜드는 4개가 있다고 하지 않습니까. 이건 대체 어떻게 된 일이죠?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「文献って……ただのグルメ情報雑誌だよね、それ……。読んでるの、美術誌とかじゃなかったんだ……」"
translation = "「문헌이라니…… 그냥 맛집 정보 잡지잖아 그거…… 읽고 있던 거 미술 잡지 같은 게 아니었어……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「それは問題の本質ではないでしょう。今大事なのは、<b>三大</b>なのに何故<b>４つ</b>もブランドがあるのか、ということです」"
translation = "「그건 문제의 본질이 아니지 않습니까. 지금 중요한 건, <b>삼대</b>인데 왜 <b>4개</b>나 브랜드가 있냐는 것입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「稀によくある事よ。三大なんとかなのに４つあったり、四天王なのに５人いたりとかね」"
translation = "「드물게 자주 있는 일이야. 삼대 어쩌고인데 4개 있거나, 사천왕인데 5명 있거나 하는 것들 말이지.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「意味が分かりません。やはりここは私がそれらのお肉を吟味して、真の三大和牛を決してあげなくては」"
translation = "「의미를 모르겠군요. 역시 이곳은 제가 그 고기들을 음미해서 진정한 삼대 와규를 정해 주어야겠어요.」"

[[dialogue]]
speaker = "unk"
original = "要するに食べてみたいってこと？"
translation = "결국 먹어보고 싶다는 소리야?"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「そういうことです」"
translation = "「그런 셈이죠.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「悩みっていうから何かと思ったら……思ってた以上にどうでもいいことだったわ」"
translation = "「고민이래서 뭔가 했더니…… 생각했던 것보다 훨씬 더 아무래도 좋은 일이었잖아.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「相談してみろと言われたから相談したのに、酷い言いぐさですね。どんな問題でもスパッと解決してくれるのではなかったのですか？」"
translation = "「상담해 보라고 해서 했더니 심한 말씀이시네요. 어떤 문제든 시원하게 해결해 주는 것 아니었나요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたのそれは悩みでもなんでもなくて、ただの欲望っていうのよ」"
translation = "「네 그건 고민 같은 게 아니라 그냥 욕망이라고 하는 거야.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ふむふむ、このご近所でも食べられるお店があるそうです。私の悩みを解決するためにも、このお店に連れて行ってもらうしかありませんね」"
translation = "「흠흠, 이 근처에서도 먹을 수 있는 가게가 있다고 하네요. 제 고민을 해결하기 위해서라도 이 가게에 데려다주실 수밖에 없겠군요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はぁ……仕方がないわね。また今度連れて行ってあげるわ」"
translation = "「하아…… 어쩔 수 없네. 다음에 데려가 줄게.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「また今度などという曖昧な言葉ではぐらかされる私じゃありません。今度とはいつのことか、はっきりさせてもらっていいでしょうか」"
translation = "「다음에, 라는 애매한 말로 얼버무려질 제가 아닙니다. 다음이 언제인지 확실히 해주시겠어요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今度は今度よ、大人しく待ってなさい。副会長と会計が別世界に転移しちゃったおかげで、いま星徒会の仕事が大変なことになってるんだから」"
translation = "「다음은 다음이야, 얌전히 기다려. 부회장이랑 회계가 다른 세계로 전이해 버린 탓에 지금 성도회 업무가 장난 아니게 밀려있으니까.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「会長さんとマトイが忙しそうに仕事をしているのは分かります。でもヴィーナスは先ほどから何をしているんですか？」"
translation = "「회장님이랑 마토이가 바쁘게 일하고 있는 건 알겠습니다. 하지만 비너스는 아까부터 뭘 하고 있는 건가요?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「お菓子を食べながら、お茶を飲んでくつろいでいるようにしか見えないのですが」"
translation = "「과자를 먹으며 차를 마시고 쉬고 있는 것으로밖에 안 보이는데요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私はいいのよ、なんたって元会長なんだから♪」"
translation = "「난 괜찮아, 뭐라 해도 전직 회장이니까♪」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「元会長ならなおさら、業務には精通しているのでは？\u3000ダラけていないで少しは手伝ったらどうです？」"
translation = "「전직 회장이라면 더더욱 업무에 정통한 것 아닌가요? 빈둥거리지 말고 조금은 돕는 게 어때요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私が手伝うと却って仕事が増えるから、こういう時は何もしないのが仕事なのよ」"
translation = "「내가 도우면 오히려 일이 늘어나니까, 이럴 때는 아무것도 안 하는 게 일인 거야.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「なるほど……ヴィーナスが肩書だけで、あまり役に立たない人なのだということがよく分かりました」"
translation = "「과연…… 비너스가 이름뿐이고 별로 도움이 안 되는 사람이라는 걸 잘 알았습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたこそ居候の身分なんだから、ぐうたらしてないで手伝おうとか思わないの？」"
translation = "「너야말로 얹혀사는 처지인데 빈둥거리지 말고 도와야겠다는 생각 안 들어?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「適材適所という言葉がありますからね。私はあくまで天才美少女藝術家、事務作業は他の方にお任せします」"
translation = "「적재적소라는 말이 있으니까요. 저는 어디까지나 천재 미소녀 예술가, 사무 작업은 다른 분들께 맡기겠습니다.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「今はこうして英気を養いながら、やがて萌芽する芸術的衝動に備えているのです」"
translation = "「지금은 이렇게 영양을 보충하며 머지않아 싹틀 예술적 충동에 대비하고 있는 것입니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こ、これは大物藝術家の風格……！？」"
translation = "「이, 이것이 거물 예술가의 풍모……!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイ、騙されてるわよ。そんなこと言って、だらけてばかりで筆をとる気配すらないじゃない」"
translation = "「마토이, 속고 있는 거야. 저러면서 빈둥거리기만 하고 붓을 잡을 기미조차 없잖아.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「天才美少女藝術家は、ここぞという時にこそ活躍するものなのです」"
translation = "「천재 미소녀 예술가는 결정적인 순간에 활약하는 법이랍니다.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ま、その気になったら半日で歴史に名を残すような作品を作れる──ような気がしますけどね」"
translation = "「뭐, 마음만 먹으면 반나절 만에 역사에 이름을 남길 작품을 만들 수 있는── 기분이 드네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どこからその自信が湧いてくるのよ」"
translation = "「어디서 그런 자신감이 솟아나는 거야.」"

[[dialogue]]
speaker = "unk"
original = "アルテとヴィーナス、仲良くなったなぁ……"
translation = "아르테랑 비너스, 사이좋아졌네……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんだかんだこっちの世界にも馴染んでくれて安心だね」"
translation = "「이래저래 이쪽 세계에도 적응해 줘서 다행이야.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「おかげさまで。私はとっても繊細な性格なので苦労はしましたが」"
translation = "「덕분에요. 전 무척 섬세한 성격이라 고생은 좀 했지만요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「繊細な性格の人間が、星徒会室のソファを占拠してぐうたらはしないのよね」"
translation = "「섬세한 성격인 인간이 성도회실 소파를 점거하고 빈둥거리지는 않는다고.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「居心地がいいもので。これは夢幻美術館の館長室のソファに匹敵するかもしれませんね……むにゃむにゃ……」"
translation = "「거처가 편안해서 말이죠. 이건 몽환 미술관의 관장실 소파에 필적할지도 모르겠네요…… 으냐으냐……」"

[[dialogue]]
speaker = "unk"
original = "ソファに寝転がってグルメ雑誌を広げるアルテは、繊細さとは正反対に位置する存在だった。"
translation = "소파에 드러누워 맛집 잡지를 펼치는 아르테는 섬세함과는 정반대에 위치한 존재였다."

[[dialogue]]
speaker = "unk"
original = "だけど１人異世界に飛ばされて、不安に泣くよりよほどいい。こちらの世界での生活に馴染んだ様子は安心感さえ与えてくれる。"
translation = "하지만 홀로 이세계에 떨어져 불안함에 우는 것보다 훨씬 낫다. 이쪽 세계의 생활에 적응한 모습은 안도감마저 준다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとのやり取りを見ながら同じことを考えたのか、俺とマトイは思わずクスリと笑いあったのだった。"
translation = "비너스와의 대화를 보며 같은 생각을 했는지, 나와 마토이는 저도 모르게 쿡 하고 함께 웃음을 터뜨렸다."

