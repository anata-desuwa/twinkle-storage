[[dialogue]]
speaker = "unk"
original = "新たなフォームへの覚醒を果たし、エントロフィーに再び挑むシズハ。"
translation = "새로운 폼으로의 각성을 완수하고 엔트로피에게 다시 도전하는 시즈하."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「願いの翼を――みんなに！」"
translation = "「소원의 날개를―― 모두에게!」"

[[dialogue]]
speaker = "unk"
original = "杖先の聖杯から、眩い雫が地面へと落ちる。"
translation = "지팡이 끝의 성배에서 눈부신 물방울이 지면으로 떨어진다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ヴィクトリアフェザー！」"
translation = "「빅토리아 페더!」"

[[dialogue]]
speaker = "unk"
original = "波紋のように光が広がり、空間がゆらめいていく。"
translation = "파문처럼 빛이 퍼지며 공간이 일렁이기 시작한다."

[[dialogue]]
speaker = "エントロフィー"
original = "「なんすか、これ……！？」"
translation = "「뭐임까, 이거……!?」"

[[dialogue]]
speaker = "サチ"
original = "「……ハッ！？」"
translation = "「……핫!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「暴走が……止まったのじゃ！」"
translation = "「폭주가…… 멈췄느니라!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「なっ……アネさんたちにかけた反転のロストアイテムの力が無効化された……！？」"
translation = "「나닛…… 누님들에게 걸었던 반전의 로스트 아이템 힘이 무효화됐다……!?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「聖杯ちゃんの魔力と、ディーちゃんのマイナスエネルギーを融合させた力で、みんなに『願いを叶える翼』を授ける――」"
translation = "「성배짱의 마력과 디짱의 마이너스 에너지를 융합시킨 힘으로 모두에게 『소원을 이루는 날개』를 내려준다――」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「それが私、『魔法少女グレイル☆シズハ』の――『ヴィクトリアフォーム』の能力だよ！」"
translation = "「그게 나, 『마법 소녀 그레일☆시즈하』의―― 『빅토리아 폼』의 능력이야!」"

[[dialogue]]
speaker = "unk"
original = "仲間たちの足元に、光の翼が顕現する。"
translation = "동료들의 발치에 빛의 날개가 현현한다."

[[dialogue]]
speaker = "サチ"
original = "「すごい……！\u3000反転した力の暴れる感じが、全くしない！」"
translation = "「대단해……! 반전된 힘이 날뛰는 느낌이 전혀 안 들어!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ああ、自由自在に操れるような感覚じゃ！」"
translation = "「아아, 자유자재로 다룰 수 있는 감각이니라!」"

[[dialogue]]
speaker = "ディーラック"
original = "「言っとくけど、ボクがマイナスエネルギーを制御してなくちゃ、その翼は維持できないんだから、感謝するんだね！」"
translation = "「말해두겠는데, 내가 마이너스 에너지를 제어하고 있지 않으면 그 날개는 유지할 수 없으니까 감사하라고!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「元々、シズハさんの戦闘服の足元には、何故か『小さな翼』が生えていました」"
translation = "「원래 시즈하 씨의 전투복 발치에는 왜인지 『작은 날개』가 돋아나 있었죠」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あれは、シズハさんの――『願いへ飛翔する』イメージの象徴だったんですね！」"
translation = "「그건 시즈하 씨의―― 『소원을 향해 비상하는』 이미지의 상징이었던 거군요!」"

[[dialogue]]
speaker = "unk"
original = "サチとプリムラだけでなく、俺とトレジアンナさんの足元にも、同じく光の翼が生えていた。"
translation = "사치와 프리뮬러뿐만 아니라 나와 트레지안나 씨의 발치에도 똑같이 빛의 날개가 돋아나 있었다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「みんな！\u3000今こそ全員で――勝利の願いを叶える時だよ！」"
translation = "「모두들! 지금이야말로 다 함께―― 승리의 소원을 이룰 때야!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ああ！\u3000ここまでよくも好き勝手やってくれたな、エントロフィー！」"
translation = "「그래! 지금까지 아주 잘도 마음대로 해줬구나, 엔트로피!」"

[[dialogue]]
speaker = "サチ"
original = "「はい。人事天命、ここからは――」"
translation = "「네. 인사천명, 지금부터는――」"

[[dialogue]]
speaker = "サチ"
original = "「ハズレなしです！」"
translation = "「꽝 없음입니다!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「きゃはははっ！\u3000いいっすよ！！\u3000魔法少女の全力ってやつを、ウチに見せて下さい！！！」"
translation = "「캬하핫! 좋슴다!! 마법 소녀의 전력이라는 걸 저에게 보여주십쇼!!!」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちとエントロフィーの決戦が始まった。"
translation = "그렇게 우리와 엔트로피의 결전이 시작되었다."

[[dialogue]]
speaker = "プリムラ"
original = "「――サチ！\u3000シズハ！\u3000我のエネルギーを遠隔でくれてやる！\u3000魔力切れを気にせず、ガンガン攻めまくれ！」"
translation = "「――사치! 시즈하! 짐의 에너지를 원격으로 주겠노라! 마력 고갈 걱정 말고 팍팍 몰아붙여라!」"

[[dialogue]]
speaker = "サチ"
original = "「うん！\u3000シズハちゃん、合わせるよ！」"
translation = "「응! 시즈하짱, 맞출게!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「オッケー！\u3000お願い、ディーちゃん！」"
translation = "「오케이! 부탁해, 디짱!」"

[[dialogue]]
speaker = "ディーラック"
original = "「全く、ビーストづかいが荒いのサ！」"
translation = "「정말이지, 비스트 부려먹기가 장난 아니야!」"

[[dialogue]]
speaker = "unk"
original = "それでもディーラックは、シズハの願いに応え、マイナスエネルギーを聖杯の魔力に合わせる。"
translation = "그래도 디럭쿠는 시즈하의 소원에 응해 마이너스 에너지를 성배의 마력에 맞춘다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「グレイルボルテックス！」"
translation = "「그레일 볼텍스!」"

[[dialogue]]
speaker = "サチ"
original = "「フォーチュンブレイカー！」"
translation = "「포춘 브레이커!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「ぐうぅっ！？\u3000サチのアネさんの能力で、マイナスエネルギーの制御が乱れるっす！」"
translation = "「구우윽!? 사치 누님의 능력 때문에 마이너스 에너지 제어가 흐트러짐다!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私たちもいますよ！\u3000プリティアブラスター！」"
translation = "「우리도 있어요! 프리티아 블래스터!」"

[[dialogue]]
speaker = "unk"
original = "アビスインパクトッ！！"
translation = "어비스 임팩트!!"

[[dialogue]]
speaker = "エントロフィー"
original = "「防げないんだったら――速さで避けるまでっすよ！」"
translation = "「방어할 수 없다면―― 속도로 피하면 그만임다!」"

[[dialogue]]
speaker = "unk"
original = "エントロフィーは防御から回避に専念して、俺たちの技を避ける。"
translation = "엔트로피는 방어에서 회피로 전념하며 우리의 기술을 피한다."

[[dialogue]]
speaker = "エントロフィー"
original = "「どんな能力、どんな技でも、当たらなければどうということはないっす！」"
translation = "「어떤 능력, 어떤 기술이라도 맞지 않으면 아무것도 아님다!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「だったら、『当たるように願う』までよ！」"
translation = "「그렇다면 『맞도록 소원하면』 그만이야!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「デザイアトランスミッション！」"
translation = "「디자이어 트랜스미션!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「なっ！？\u3000――かはっ！？」"
translation = "「나닛!? ――커헉!?」"

[[dialogue]]
speaker = "unk"
original = "シズハが攻撃を放つと同時に、エントロフィーに直撃して吹き飛ばす。"
translation = "시즈하가 공격을 내뿜는 것과 동시에 엔트로피에게 직격하여 날려버린다."

[[dialogue]]
speaker = "エントロフィー"
original = "「今度は、何が起きたっすか……！？」"
translation = "「이번엔 무슨 일이 일어난 검까……!?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「『攻撃が必ず当たる』ように強く願ったのよ。だから、技が発動すると同時に、あなたに当たったの！」"
translation = "「『공격이 반드시 맞도록』 강하게 소원했어. 그러니까 기술이 발동하는 것과 동시에 너에게 맞은 거야!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「因果を超越したとでもいうんすか……！？」"
translation = "「인과를 초월하기라도 했다는 검까……!?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「私だけじゃない。みんなの攻撃も、私と一緒の翼がある限り、強く願えばあなたに当たるわ！」"
translation = "「나뿐만이 아니야. 모두의 공격도 나와 똑같은 날개가 있는 한 강하게 소원하면 너에게 맞을 거야!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ノワールマジック！」"
translation = "「느와르 매직!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「ぐあっ！？」"
translation = "「구악!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「フハハハ！\u3000本当じゃ♪」"
translation = "「후하하하! 정말이구나♪」"

[[dialogue]]
speaker = "サチ"
original = "「アンラッキー・テンペスト！」"
translation = "「언럭키 템페스트!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「ぐうぅっ！？\u3000こんなの……反則じゃないっすか！？」"
translation = "「구우윽!? 이런 거…… 반칙 아닙니까!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「反転のロストアイテムを使っていた貴様が言うな！」"
translation = "「반전의 로스트 아이템을 쓰던 네놈이 할 소리냐!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「私１人が願ったところで、この力は叶わない――」"
translation = "「나 혼자 소원한다고 해서 이 힘은 이루어지지 않아――」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ディーちゃんや、みんながいるから……一緒に強く願える仲間がいるから、このヴィクトリアフォームの能力は使えるのよ！」"
translation = "「디짱이랑 모두가 있으니까…… 함께 강하게 소원할 수 있는 동료가 있으니까 이 빅토리아 폼의 능력을 쓸 수 있는 거야!」"

[[dialogue]]
speaker = "サチ"
original = "「私のこの力も一緒です！\u3000――フォルトゥーナ・ネメシス！」"
translation = "「저의 이 힘도 마찬가지입니다! ――포르투나 네메시스!」"

[[dialogue]]
speaker = "unk"
original = "サチの斧の一撃を防御して、エントロフィーの動きが更に鈍る。"
translation = "사치의 도끼 일격을 방어하며 엔트로피의 움직임이 더욱 둔해진다."

[[dialogue]]
speaker = "エントロフィー"
original = "「ぐうぅっ……！？\u3000足元のコンクリートが急に崩れて、踏ん張れない……！？」"
translation = "「구우윽……!? 발밑의 콘크리트가 갑자기 무너져서 버틸 수가……!?」"

[[dialogue]]
speaker = "サチ"
original = "「『不運を引き寄せる』力でも……仲間の力があれば、それを乗り越えて『幸運を掴むチャンス』に変えることができます！」"
translation = "「『불운을 끌어당기는』 힘이라도…… 동료의 힘이 있다면 그것을 극복하고 『행운을 잡을 기회』로 바꿀 수 있습니다!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「今です！\u3000――トマルさん！！」"
translation = "「지금이에요! ――토마루 씨!!」"

[[dialogue]]
speaker = "トマル（覚醒）"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「！\u3000まさかもう１人……！？」"
translation = "「! 설마 한 명 더……!?」"

[[dialogue]]
speaker = "unk"
original = "エントロフィーが視線をやった先には、ジェットコースターのレールの上に立つ、俺たちの心強い仲間――『<ruby>詠野<rt>よみの</rt></ruby>トマル』の姿が。"
translation = "엔트로피가 시선을 돌린 곳에는 롤러코스터 레일 위에 서 있는 우리의 든든한 동료―― 『에이노 토마루』의 모습이."

[[dialogue]]
speaker = "トマル（覚醒）"
original = "「一本集中！」"
translation = "「일본집중!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「しまっ……！？」"
translation = "「차앗……!?」"

[[dialogue]]
speaker = "unk"
original = "トマルの雷の矢がエントロフィーを狙撃し、その場に縫い留めたように固定する。"
translation = "토마루의 번개 화살이 엔트로피를 저격하여 그 자리에 꿰매어 놓은 듯 고정한다."

[[dialogue]]
speaker = "エントロフィー"
original = "「こ、この魔法は……動けない……！？」"
translation = "「이, 이 마법은…… 움직일 수 없어……!?」"

[[dialogue]]
speaker = "トマル（覚醒）"
original = "「それが私の『魔法少女フォーム』の能力――『<ruby>留転<rt>るてん</rt></ruby>』の力です！」"
translation = "「그것이 저의 『마법 소녀 폼』의 능력―― 『유전』의 힘입니다!」"

[[dialogue]]
speaker = "トマル（覚醒）"
original = "「みなさま、今です！」"
translation = "「여러분, 지금입니다!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ありがとう、トマルくん！\u3000――みんな、決めるよ！」"
translation = "「고마워, 토마루 군! ――모두들, 끝내자!」"

[[dialogue]]
speaker = "unk"
original = "サチ、プリムラ、トレジアンナさん、俺、シズハの５人で声を合わせて叫ぶ。"
translation = "사치, 프리뮬러, 트레지안나 씨, 나, 시즈하 다섯 명이 목소리를 합쳐 외친다."

[[dialogue]]
speaker = "全員"
original = "「フルユニゾンッ！！！」"
translation = "「풀 유니존!!!」"

[[dialogue]]
speaker = "unk"
original = "動きを封じたエントロフィーに、俺たちは連続攻撃を次々と放ってゆく。"
translation = "움직임이 봉쇄된 엔트로피에게 우리는 연속 공격을 차례차례 퍼붓는다."

[[dialogue]]
speaker = "エントロフィー"
original = "「――くっ！？\u3000ぬおおおぉぉぉっ！？」"
translation = "「――윽!? 누오오오오오옷!?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「サチちゃん！\u3000今度は私が、最後の一撃を託す番だよ！」"
translation = "「사치짱! 이번엔 내가 마지막 일격을 맡길 차례야!」"

[[dialogue]]
speaker = "プリムラ"
original = "「決めろ、サチッ！！」"
translation = "「끝내라, 사치!!」"

[[dialogue]]
speaker = "サチ"
original = "「うん！\u3000魔力反転、全開っ！！」"
translation = "「응! 마력 반전, 전개!!」"

[[dialogue]]
speaker = "unk"
original = "足から光の翼を羽ばたかせて――"
translation = "발에서 빛의 날개를 퍼덕이며――"

[[dialogue]]
speaker = "unk"
original = "サチが斧の渾身の一撃を、エントロフィーに叩き込む！"
translation = "사치가 도끼의 혼신의 일격을 엔트로피에게 때려 박는다!"

[[dialogue]]
speaker = "サチ"
original = "「ドゥームフォーチュン・レイジッ！！！」"
translation = "「둠 포춘 레이지!!!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「うおおおぉぉぉーーーっ！！？」"
translation = "「우오오오오오ーー옷!!?」"

[[dialogue]]
speaker = "エントロフィー"
original = "「ふっ……ふふっ……！\u3000どうやら、ここまでみたいっすね――」"
translation = "「훗…… 후훗……! 아무래도 여기까지인 것 같네여――」"

[[dialogue]]
speaker = "エントロフィー"
original = "「さすがっすね……ウチの負けっす！」"
translation = "「역시 대단함다…… 저의 패배임다!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「今回はこれにて退散しますんで、魔法少女のアネさんたち、魔王のアニさんも、またお会いしましょ～♪」"
translation = "「이번엔 이만 물러갈 테니 마법 소녀 누님들, 마왕 형님도 또 만나여~♪」"

[[dialogue]]
speaker = "unk"
original = "光が消えると、いつの間にか仮想結界は解除されており、エントロフィーの姿はもうどこにもなかった。"
translation = "빛이 사라지자 어느샌가 가상 결계는 해제되어 있었고 엔트로피의 모습은 이제 어디에도 없었다."

[[dialogue]]
speaker = "サチ"
original = "「なんとか勝てましたね。でも……」"
translation = "「어떻게든 이겼네요. 하지만……」"

[[dialogue]]
speaker = "プリムラ"
original = "「ああ、おそらく倒せてはおらんじゃろうな。逃げ足の速いやつじゃ」"
translation = "「아아, 아마 쓰러뜨리지는 못했겠지. 도망 하나는 빠른 녀석이니라」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「仮想結界内で仕掛けてきたのは、おそらく負けても逃げ切れるようにする為の保険の意味合いもあったんでしょう」"
translation = "「가상 결계 내에서 싸움을 건 건 아마 져도 도망칠 수 있도록 하기 위한 보험 같은 의미도 있었겠죠」"

[[dialogue]]
speaker = "ディーラック"
original = "「実際はボクたちも、仮想結界で負けたところで、現実ではダメージにならない可能性もあったけど……そこはエントロフィーにしかわからないね」"
translation = "「사실 우리도 가상 결계에서 져봤자 현실에서는 대미지를 입지 않았을 가능성도 있었지만…… 그건 엔트로피만 알겠지」"

[[dialogue]]
speaker = "unk"
original = "でも、俺たちの勝ちだ"
translation = "그래도 우리가 이겼어"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「うん♪\u3000私もこうしてヴィクトリアフォームに覚醒できたし♪」"
translation = "「응♪ 나도 이렇게 빅토리아 폼으로 각성할 수 있었고♪」"

[[dialogue]]
speaker = "サチ"
original = "「はい。不運なトラブルでしたけど、結果的にみんなで乗り越えて、最後には幸運を掴むことができました」"
translation = "「네. 불운한 트러블이었지만 결과적으로 다 함께 극복해서 마지막에는 행운을 잡을 수 있었습니다」"

[[dialogue]]
speaker = "プリムラ"
original = "「フハハハ！\u3000そうじゃな♪\u3000エントロフィーの奴め、ざまぁみろなのじゃ！」"
translation = "「후하하하! 그렇구나♪ 엔트로피 녀석, 꼴 좋느니라!」"

[[dialogue]]
speaker = "トマル（覚醒）"
original = "「よかった。皆さま、ご無事で……！」"
translation = "「다행이에요. 여러분, 무사하셔서……!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「トマルくんも、助けに来てくれてありがとね♪」"
translation = "「토마루 군도 구하러 와줘서 고마워♪」"

[[dialogue]]
speaker = "トマル（覚醒）"
original = "「いえいえ。間に合ってよかったです♪」"
translation = "「아니에요. 늦지 않아서 다행입니다♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺たちとエントロフィーの戦いは、ひとまず幕を下ろしたのだった。"
translation = "이렇게 우리와 엔트로피의 싸움은 일단 막을 내리는 것이었다."

