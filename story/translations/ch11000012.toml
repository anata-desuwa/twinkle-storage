[[dialogue]]
speaker = "unk"
original = "第２話,会長×ジャクリーヌ＝てぇてぇ,P"
translation = "제2화, 회장×자클린＝테에테에"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「まさかキャナンシーさんに気に入られて、いきなりハロウィン実行委員会の名誉会長に任命されるなんて……ジャクリーヌちゃんすごいです……！」"
translation = "「설마 캐넌시 씨의 마음에 들어서 갑자기 할로윈 실행위원회 명예 회장으로 임명되다니…… 자클린 짱 대단해요……!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆ～ん♪\u3000ハロウィンの大幽霊であるこの余にかかれば、おちゃのこさいさいなの！」"
translation = "「유유~ㄴ♪ 할로윈의 대유령인 이 짐에게 걸리면 식은 죽 먹기다유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「こ、これは是非お祝いしないとですね！\u3000今日はわたしと会長さんの奢りです！」"
translation = "「이, 이건 꼭 축하해야겠네요! 오늘은 저와 회장님이 쏘겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "ああ。遠慮なくお菓子を食べていいぞ！"
translation = "그래. 마음껏 과자를 먹어도 좋아!"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆ♪\u3000あとで後悔しても知らないの！」"
translation = "「유ー유유유♪ 나중에 후회해도 모른다유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ジャクリーヌちゃん、まずはどれを食べたいですか？」"
translation = "「자클린 짱, 우선 어느 걸 먹고 싶나요?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「それじゃあ……まずはこのバウムクーヘンを食べたいゆ！」"
translation = "「그럼…… 우선 이 바움쿠헨을 먹고 싶다유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「バウムクーヘンですね！\u3000店員さ～ん、このバウムクーヘンの一番大きいサイズをくださ～い！」"
translation = "「바움쿠헨이군요! 저기요~, 이 바움쿠헨에서 제일 큰 사이즈로 주세요~!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わ、わたしが切り分けますね……んしょ、んしょ……はい、どうぞ♪」"
translation = "「제, 제가 잘라드릴게요…… 영차, 영차…… 자, 여기요♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「それじゃあ、いただきますなの！\u3000あむっ！！」"
translation = "「그럼, 잘 먹겠다유! 냠!!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「どうですか？\u3000おいしいですか？」"
translation = "「어때요? 맛있나요?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「とってもおいしいのー！」"
translation = "「정말 맛있다유ー!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「それなら良かったです♪\u3000じゃあ、わたしも……はむっ♪」"
translation = "「그럼 다행이에요♪ 자, 저도…… 함냐♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「もぐもぐ、んぐんぐ……ん～～～、最高なの～～～♪」"
translation = "「우물우물, 꿀꺽…… 응~~~, 최고다유~~~♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「もぐもぐもぐもぐ！！\u3000はぐはぐはぐはぐ！」"
translation = "「우물우물우물우물!! 허겁지겁허겁지겁!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「やっぱり……わたしはこうして、誰かが食べているのを見る方がいいですね～……」"
translation = "「역시…… 저는 이렇게 누군가가 먹고 있는 걸 보는 게 더 좋네요~……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、あそこにいるのはもしかして……女の子カップルさんっ！？\u3000しかも、あれは……！」"
translation = "「아, 저기 있는 건 설마…… 여자 커플분들!? 게다가 저건……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「１つのハート形のストローで顔を近づけさせて飲むという……カップル専用ドリンクじゃないですか……！」"
translation = "「하나의 하트 모양 빨대로 얼굴을 가까이 대고 마신다는…… 커플 전용 드링크 아닌가요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はぁぁぁ～～～、会長さん、てぇてぇですよ……まさか、こんなところで拝めるなんて……最高じゃないですか！」"
translation = "「하아아아~~~, 회장님, 테에테에예요…… 설마 이런 곳에서 구경할 수 있다니…… 최고잖아요!」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker = "unk"
original = "そ、そうだな"
translation = "그, 그러네."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余もあれ、会長とやってみたいの！」"
translation = "「짐도 저거, 회장이랑 해보고 싶다유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はっ！？\u3000わ、わたし、また自分の世界に入っちゃって……どうしました？」"
translation = "「핫!? 저, 다시 제 세계에 빠져버려서…… 무슨 일인가요?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒトリが言ってたあのカップル専用ドリンク？\u3000余もやってみたくなったの！」"
translation = "「히토리가 말한 그 커플 전용 드링크? 짐도 해보고 싶어졌다유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ジャクリーヌちゃん、聞いてたんですね……は、恥ずかしいです……」"
translation = "「자클린 짱, 듣고 있었군요…… 부, 부끄러워요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「早くするのー！」"
translation = "「빨리 하라유ー!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「す、すすす、すみません……！\u3000わかりました、今注文しちゃいますね……！」"
translation = "「죄, 죄죄죄, 죄송합니다……! 알겠습니다, 지금 주문할게요……!」"

[[dialogue]]
speaker = "unk"
original = "俺でよかったの？"
translation = "나라도 괜찮아?"

[[dialogue]]
speaker = "unk"
original = "カップル専用ドリンクの相手、"
translation = "커플 전용 드링크 상대,"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「会長とやりかったの！\u3000……ダメなの？」"
translation = "「회장이랑 하고 싶었다유! ……안 되냐유?」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌが良いなら、別にいいけど……"
translation = "자클린이 괜찮다면 별 상관없지만……"

[[dialogue]]
speaker = "unk"
original = "おそらくあのドリンクの意味を理解していない気もするけど、期待の眼差しで楽しそうに言われると不思議と悪い気はしなかった。"
translation = "아마 저 드링크의 의미를 이해하지 못하고 있는 것 같기도 하지만, 기대 어린 눈빛으로 즐겁게 말하니 신기하게도 기분이 나쁘지는 않았다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「お、お待たせしました！\u3000はい、どうぞです！」"
translation = "「기, 기다리셨습니다! 자, 여기 있어요!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「それじゃあ、行くゆ！」"
translation = "「그럼, 간다유!」"

[[dialogue]]
speaker = "unk"
original = "お互い同時にストローを咥え、ジャクリーヌの顔が近くに来て、俺は思わずドキッとしてしまう。"
translation = "서로 동시에 빨대를 물고 자클린의 얼굴이 가까이 오자, 나는 나도 모르게 두근거리고 만다."

[[dialogue]]
speaker = "unk"
original = "それを悟られないように、グラスに入ったパンプキン味のジュースを飲んでいく。"
translation = "그걸 들키지 않도록 컵에 든 펌킨 맛 주스를 마셔 나간다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「んく、んく、んく……ごっくん……」"
translation = "「꿀꺽, 꿀꺽, 꿀꺽…… 캬……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「どうですか？\u3000おいしいですか？」"
translation = "「어때요? 맛있나요?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「おいしいの♪\u3000会長はどうゆ？」"
translation = "「맛있다유♪ 회장은 어떠냐유?」"

[[dialogue]]
speaker = "unk"
original = "あ、ああ。おいしいよ"
translation = "아, 어어. 맛있어."

[[dialogue]]
speaker = "unk"
original = "そう答えたものの、緊張で正直味なんてわからなかった。"
translation = "그렇게 대답은 했지만, 긴장해서 솔직히 맛 같은 건 알 수 없었다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「なら良かったゆ♪\u3000あれ？\u3000でも会長の顔、なんだか赤いの？」"
translation = "「그럼 다행이다유♪ 어라? 근데 회장 얼굴, 왠지 붉다유?」"

[[dialogue]]
speaker = "unk"
original = "な、なんでもない！"
translation = "아, 아무것도 아니야!"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そうなの？\u3000何だかそうしてる会長、可愛いゆ♪\u3000ゆーっゆっゆっゆ♪」"
translation = "「그래유? 왠지 그러고 있는 회장, 귀엽다유♪ 유ー유유유♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「えへへ……ジャクリーヌちゃん、とっても嬉しそう♪\u3000お祝いして良かったです♪」"
translation = "「에헤헤…… 자클린 짱, 정말 기뻐 보여♪ 축하해주길 잘했어요♪」"

[[dialogue]]
speaker = "unk"
original = "こっちの気も知らないで……と思ったが、楽しそうなジャクリーヌの顔を見て、俺はまたドキッとしてしまっていた。"
translation = "이쪽 속도 모르고……라고 생각했지만, 즐거워하는 자클린의 얼굴을 보고 나는 다시 두근거리고 말았다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆ～ん♪\u3000ゆゆ～ん♪」"
translation = "「유유~ㄴ♪ 유유~ㄴ♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「なんだか……今のジャクリーヌちゃんと会長さん、とってもてぇてぇ、でしたねぇ……ね、ゆーちゃん？」"
translation = "「왠지…… 지금의 자클린 짱과 회장님, 정말 테에테에, 했네요…… 그치, 유짱?」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「これは……もしかしたら、もしかするかもですよ……！」"
translation = "「이건…… 어쩌면, 어쩔지도 몰라요……!」"

