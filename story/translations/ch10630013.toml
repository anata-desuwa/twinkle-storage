[[dialogue]]
speaker = "unk"
original = "第３話,どうしてあなたは,P"
translation = "제3화, 어째서 당신은, P"

[[dialogue]]
speaker = "カヤ"
original = "「はぁああああっっ！！！」"
translation = "「하아아아아앗!!!」"

[[dialogue]]
speaker = "カヤ"
original = "「きゃっ！？\u3000しまっ──」"
translation = "「꺄앗!? 실수──」"

[[dialogue]]
speaker = "unk"
original = "危ないっ！"
translation = "위험해!"

[[dialogue]]
speaker = "カヤ"
original = "「なっ！？\u3000どうして──っっ、これで、トドメっっ！！」"
translation = "「나앗!? 어째서──읏, 이걸로, 마무으리!!」"

[[dialogue]]
speaker = "カヤ"
original = "「はぁ、はぁ、はぁ……！」"
translation = "「하아, 하아, 하아……!」"

[[dialogue]]
speaker = "カヤ"
original = "「排除、完了……」"
translation = "「배제, 완료……」"

[[dialogue]]
speaker = "カヤ"
original = "「危ないところ、だった……。まさか中にあのレベルのモンスターいる、なんて……」"
translation = "「위험한 순간, 이었어……. 설마 안에 저 정도 레벨의 몬스터가 있을 줄이야……」"

[[dialogue]]
speaker = "カヤ"
original = "「でも、どうして庇った？\u3000どうしてアステラ乗り込んできた？」"
translation = "「하지만 어째서 감싸준 거야? 어째서 아스텔라에 뛰어든 거야?」"

[[dialogue]]
speaker = "カヤ"
original = "「一人で問題ない、言ったはず。苦戦はしたけど、私だけで十分勝てる相手だった」"
translation = "「혼자서 문제없다고 말했을 텐데. 고전은 했지만, 나만으로 충분히 이길 수 있는 상대였어.」"

[[dialogue]]
speaker = "カヤ"
original = "「そもそも私はあなたの護衛を命令されてる。勝手に危険地帯に入ってこられても困る」"
translation = "「애당초 나는 당신의 호위를 명령받았어. 멋대로 위험 지대에 들어오면 곤란해.」"

[[dialogue]]
speaker = "カヤ"
original = "「挙げ句……私のこと庇ったり。一体どういうつもり？」"
translation = "「게다가…… 나를 감싸기까지. 도대체 무슨 생각이야?」"

[[dialogue]]
speaker = "unk"
original = "カヤのことが心配で"
translation = "카야가 걱정돼서."

[[dialogue]]
speaker = "カヤ"
original = "「……心配する必要はない。前にも言った。私はネビュラが持つ一振りの剣」"
translation = "「……걱정할 필요는 없어. 전에도 말했어. 나는 네뷸라가 가진 한 자루의 검.」"

[[dialogue]]
speaker = "カヤ"
original = "「仮に私が任務に失敗しても代わりはいる。あなたを敵に渡さないことが何よりも大事」"
translation = "「설령 내가 임무에 실패해도 대신할 사람은 있어. 당신을 적에게 넘기지 않는 것이 무엇보다 중요해.」"

[[dialogue]]
speaker = "カヤ"
original = "「だから身を挺して私を庇う必要はなかった。アステラに乗り込む必要もなかった」"
translation = "「그러니까 몸을 던져 나를 감쌀 필요는 없었어. 아스텔라에 뛰어들 필요도 없었어.」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたは外で待っているだけで良かったのに」"
translation = "「당신은 밖에서 기다리고 있기만 하면 됐는데.」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたはいつもそう……。無駄話やめろって言っても、いつも話しかけてくる。食料要らないって言っても、いつも美味しいもの食べさせてくる」"
translation = "「당신은 항상 그래……. 쓸데없는 소리 말라고 해도, 항상 말을 걸어와. 식량 필요 없다고 해도, 항상 맛있는 걸 먹여줘.」"

[[dialogue]]
speaker = "カヤ"
original = "「私と戦った時は反撃の一つもしてこなかったくせに……モンスターとの戦闘の時は率先して前に出ようとする」"
translation = "「나랑 싸웠을 때는 반격 한 번 안 했으면서…… 몬스터랑 전투할 때는 솔선해서 앞으로 나서려 해.」"

[[dialogue]]
speaker = "カヤ"
original = "「やっぱり……私のこと舐めてる？\u3000年下だから、見た目幼いから、下に見てる？」"
translation = "「역시…… 나를 얕보는 거야? 어리니까, 겉모습이 꼬맹이니까, 아래로 보는 거야?」"

[[dialogue]]
speaker = "unk"
original = "友達だからってだけだよ"
translation = "친구니까 그럴 뿐이야."

[[dialogue]]
speaker = "カヤ"
original = "「とも……だち？」"
translation = "「친……구?」"

[[dialogue]]
speaker = "カヤ"
original = "「わ、わからない。言ってること、全然……」"
translation = "「모, 모르겠어. 하는 말, 전혀……」"

[[dialogue]]
speaker = "カヤ"
original = "「私、ともだち……？\u3000いつそんなのなった……？\u3000えっ……？\u3000えっ……？」"
translation = "「내가, 친구……? 언제 그렇게 됐어……? 엣……? 엣……?」"

[[dialogue]]
speaker = "カヤ"
original = "「そういうの、私、あまりよくわからない……。ネビュラの仲間以外の知り合い、あなたが初めて……だから」"
translation = "「그런 거, 나, 잘 모르겠어……. 네뷸라 동료 이외의 지인은 당신이 처음……이니까.」"

[[dialogue]]
speaker = "カヤ"
original = "「でも、急にともだち言われても……困る。私はあくまであなたの護衛。任務が終われば、もう話すこともない……」"
translation = "「하지만, 갑자기 친구라고 해도…… 곤란해. 나는 어디까지나 당신의 호위. 임무가 끝나면 이제 말할 일도 없어……」"

[[dialogue]]
speaker = "unk"
original = "任務でしか話しちゃいけない命令なのか？"
translation = "임무로만 말해야 한다는 명령이야?"

[[dialogue]]
speaker = "カヤ"
original = "「そ、そんな命令、受けてない……けど……」"
translation = "「그, 그런 명령, 듣지 않았어…… 하지만……」"

[[dialogue]]
speaker = "カヤ"
original = "「でも、そもそも私とともだちなりたい理由、わからない……！」"
translation = "「하지만, 애초에 나랑 친구가 되고 싶은 이유를 모르겠어……!」"

[[dialogue]]
speaker = "カヤ"
original = "「私、ともだちと思われるようなこと何もしてない。いつも素っ気なくして、あなたのこと嫌い言って、すぐ怒って……」"
translation = "「나, 친구라고 생각될 만한 짓 아무것도 안 했어. 항상 무뚝뚝하게 굴고, 당신 싫다고 말하고, 금방 화내고……」"

[[dialogue]]
speaker = "カヤ"
original = "「……やっぱり、ともだち、違う。なる理由わからない。一緒にいてもつまらないはず……。なんなら面倒なはず……」"
translation = "「……역시, 친구, 아냐. 될 이유 모르겠어. 같이 있어도 지루할 게 뻔해……. 아니면 귀찮을 거야……」"

[[dialogue]]
speaker = "unk"
original = "カヤはここ数日楽しくなかった？"
translation = "카야는 요 며칠 즐겁지 않았어?"

[[dialogue]]
speaker = "カヤ"
original = "「……そんなの、考えたこともない。任務中に他の事考えるなんて以ての外。エージェントとして致命的」"
translation = "「……그런 거, 생각해 본 적도 없어. 임무 중에 다른 걸 생각하는 건 말도 안 돼. 에이전트로서 치명적이야.」"

[[dialogue]]
speaker = "カヤ"
original = "「でも……。いま思い返してみる……と……」"
translation = "「하지만…… 지금 되새겨 보……면……」"

[[dialogue]]
speaker = "カヤ"
original = "「っっ……！！\u3000や、やっぱり楽しいことなんてなかった。あなたの意味不明な行動に振り回され続けただけ……！」"
translation = "「읏……!! 여, 역시 즐거운 일 따윈 없었어. 당신의 의미불명한 행동에 계속 휘둘렸을 뿐이야……!」"

[[dialogue]]
speaker = "カヤ"
original = "「変なこと言って私を戸惑わせるのやめる……！\u3000私はただの剣……！\u3000任務の遂行だけ考えていればいい……！」"
translation = "「이상한 말로 나를 당황하게 하지 마……! 나는 그저 검……! 임무 수행만 생각하고 있으면 돼……!」"

[[dialogue]]
speaker = "カヤ"
original = "「そもそも、この護衛任務の本当の目的は……！\u3000私がアステラ乗り込んだのだって例の何者かがいると思ったからで──」"
translation = "「애초에, 이 호위 임무의 진짜 목적은……! 내가 아스텔라에 들어온 것도 예의 그 누군가가 있을 거라고 생각해서──」"

[[dialogue]]
speaker = "unk"
original = "事情はわからないけど俺は楽しかった"
translation = "사정은 모르겠지만 나는 즐거웠어."

[[dialogue]]
speaker = "カヤ"
original = "「なっ……！\u3000そ、そんな真面目な顔で言われても……！」"
translation = "「나앗……! 그, 그렇게 진지한 얼굴로 말해도……!」"

[[dialogue]]
speaker = "カヤ"
original = "「そんなこと言われたら、私……も……。私、だって……」"
translation = "「그런 말을 들어버리면, 나……도……. 나도……」"

[[dialogue]]
speaker = "カヤ"
original = "「あなたと一緒に街歩くのも……。手、繋ぐのも……。パンやアイスクリーム食べるのも……」"
translation = "「당신이랑 같이 거리 걷는 것도……. 손, 잡는 것도……. 빵이나 아이스크림 먹는 것도……」"

[[dialogue]]
speaker = "カヤ"
original = "「た、たのし──……」"
translation = "「즈, 즐거──……」"

[[dialogue]]
speaker = "カヤ"
original = "「～～っっ。や、やっぱり、なんでもない……！」"
translation = "「～～읏. 여, 역시, 아무것도 아냐……!」"

[[dialogue]]
speaker = "カヤ"
original = "「今日の任務はこれでおしまい……！\u3000くれぐれも気を付けて帰るっ……！！」"
translation = "「오늘 임무는 이걸로 끝이야……! 필히 조심해서 돌아가……!!」"

[[dialogue]]
speaker = "カヤ"
original = "「はぁ、はぁ……。どうして私、自分から護衛対象と離れて……」"
translation = "「하아, 하아……. 어째서 나, 스스로 호위 대상이랑 떨어져서……」"

[[dialogue]]
speaker = "カヤ"
original = "「一体なにしてる……。余計なことまで口走って……。こんなの全然、私らしくない……」"
translation = "「도대체 뭐 하는 거야……. 불필요한 말까지 지껄이고……. 이런 거 전혀 나답지 않아……」"

[[dialogue]]
speaker = "カヤ"
original = "「…………。とも、だち……」"
translation = "「………… 친구……」"

[[dialogue]]
speaker = "カヤ"
original = "「そういえば……お礼言ってない。庇ってもらった……のに」"
translation = "「그러고 보니…… 고맙다는 말 안 했어. 감싸줬는데……」"

[[dialogue]]
speaker = "カヤ"
original = "「今度、ちゃんと言わないと……」"
translation = "「다음에, 제대로 말해야지……」"

