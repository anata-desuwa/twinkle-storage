[[dialogue]]
speaker = "unk"
original = "第３話,離れていても、つながっているもの,P"
translation = "제3화, 떨어져 있어도 이어져 있는 것"

[[dialogue]]
speaker = "unk"
original = "中間テストが迫っていた、ある日のこと──"
translation = "중간고사가 다가오고 있던 어느 날──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、会長くん。図書館で勉強なんて珍しいわね？」"
translation = "「어머, 회장군. 도서관에서 공부라니 별일이네?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ああ、そっか～。もうテスト前だものね。どうりで今日は図書館に人が多いと思ったわ～」"
translation = "「아아, 그렇구나~. 벌써 시험 전이었지. 어쩐지 오늘은 도서관에 사람이 많다 싶었어~」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんも勉強ですか？"
translation = "사샤 씨도 공부인가요?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私、テスト勉強はしないタイプなのよ～。授業を真面目に聞いてたら、大体の問題は解けるでしょ？」"
translation = "「나, 시험 공부는 안 하는 타입이야~. 수업을 성실히 들으면 대부분의 문제는 풀 수 있잖아?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ただ、勉強は好きよ。得たひとつの知識が、また別の知識に広がっていくじゃない？\u3000それが凄く面白いと感じるの～」"
translation = "「다만, 공부는 좋아해. 얻은 하나의 지식이 또 다른 지식으로 넓어져 가잖아? 그게 굉장히 재미있다고 느껴져~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私が人間界に来たのも、そういう理由からだもの。ほら、この本は読んだことある？」"
translation = "「내가 인간계에 온 것도 그런 이유 때문인걸. 자, 이 책 읽어본 적 있어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「『異界探訪』っていう本で、三界のことについて広くまとめてくれてる本なの。魔界の学校で読んだ本なのだけど、こっちでも見つけられるとは思わなかったわ～」"
translation = "「『이계탐방』이라는 책인데, 삼계에 대해 폭넓게 정리해 준 책이야. 마계의 학교에서 읽었던 책인데, 여기서도 찾을 수 있을 줄은 몰랐어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「凄いのよ、この本。ほら、魔界のことも天界のことも、人間界のことも、全部載ってるの。しかもところどころ写真付き♪」"
translation = "「대단해, 이 책. 봐봐, 마계에 대해서도 천계에 대해서도, 인간계에 대해서도 전부 실려 있어. 게다가 곳곳에 사진도 포함♪」"

[[dialogue]]
speaker = "unk"
original = "この本を読んで、人間界に興味が？"
translation = "이 책을 읽고 인간계에 흥미가?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね。今のところ魔界から天界に直接行く手段はないし、行けなくても人間界には天使もいるって書いてあったから、人間界がいいなって思ったのよ」"
translation = "「그렇네. 지금으로선 마계에서 천계로 직접 갈 수 있는 수단은 없고, 갈 수 없어도 인간계에는 천사도 있다고 적혀 있어서 인간계가 좋겠다고 생각했어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ワクワクしない？\u3000人間もいて、魔族もいて、天使もいる。そんな土地、魔界じゃどこを探してもないわ」"
translation = "「두근거리지 않아? 인간도 있고, 마족도 있고, 천사도 있어. 그런 땅은 마계에선 어디를 찾아봐도 없어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから、どうしてもこの世界を見てみたくて……そんな時に、ちょうどよく新星学園への留学の話があったから、頑張っちゃった♪」"
translation = "「그래서 어떻게 해서든 이 세계를 보고 싶어서…… 그럴 때 마침 신성 학원으로의 유학 이야기가 있어서 열심히 해버렸지♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……勉強はしないタイプって言ったけれど、思い返すと新星学園への留学試験だけは大変だったわね。人間界の常識やマナーの問題とか、覚えるの大変だったわ～」"
translation = "「……공부는 안 하는 타입이라고 말했지만, 되돌아보면 신성 학원 유학 시험만큼은 힘들었네. 인간계의 상식이나 매너 문제 같은 거, 외우기 힘들었어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、本当に来れてよかったわ。星徒会のみんなや、会長くんとも出会えたし、人間界でのお勉強もとっても楽しいし」"
translation = "「하지만 정말 오길 잘했어. 성도회 모두나 회장군과도 만날 수 있었고, 인간계에서의 공부도 정말 즐거우니까」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……ソフィには、留学は反対されたんだけれど。結果的にこっちで会えるようになったし、本当によかったわ」"
translation = "「……소피에게는 유학을 반대당했지만. 결과적으로 여기서 만날 수 있게 되었고, 정말 다행이야」"

[[dialogue]]
speaker = "unk"
original = "反対を押し切って、留学を？"
translation = "반대를 무릅쓰고 유학을?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「押し切った……というよりも、特に誰にも相談しない間に決まっちゃってたって感じね～」"
translation = "「무릅썼다기보다는…… 딱히 누구에게도 상담하지 않는 사이에 결정되어 버렸다는 느낌이네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お父さんやお母さんは喜んで送り出してくれたけど……ソフィはね。怒らせちゃったし、泣かせちゃったわ」"
translation = "「아빠랑 엄마는 기쁘게 보내주셨지만…… 소피는 말이야. 화나게 해버렸고, 울려버렸어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうしてかしらね～。ソフィもきっと喜んでくれると思ってたから、私、あの時どうしていいかわからなくて……」"
translation = "「어째서일까~. 소피도 분명 기뻐해 줄 거라고 생각했으니까, 나 그때 어떻게 해야 할지 몰라서……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ちゃんとしたお別れも言えないまま、こっちに来ちゃったのよね～」"
translation = "「제대로 된 작별 인사도 하지 못한 채 이쪽으로 와버렸지 뭐야~」"

[[dialogue]]
speaker = "unk"
original = "ソフィアと別れることは、寂しくなかったんですか？"
translation = "소피아와 헤어지는 것이 외롭지는 않았나요?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私とソフィは家族なんだから。たとえ離れ離れになってしまったとしても、心の奥は繋がったままだと思うのよ」"
translation = "「나와 소피는 가족이니까. 비록 떨어져 있게 되었다고 해도, 마음 깊은 곳은 이어진 채라고 생각해」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「その繋がりを大事に思っている限り、寂しくはないわ。……あまりピンと来ないかしら？」"
translation = "「그 유대감을 소중히 여기는 한, 외롭지는 않아. ……별로 와닿지 않으려나?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「例えばそうね……私は星徒会のみんなのことも、家族だと思ってるわ。人間界でできた、大切な……本当に大切な人たち」"
translation = "「예를 들면 그래…… 나는 성도회 모두도 가족이라고 생각하고 있어. 인간계에서 생긴, 소중한…… 정말 소중한 사람들」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私が新星学園を卒業したら、きっと今のように集まってお仕事するようなことも、なくなるでしょう？」"
translation = "「내가 신성 학원을 졸업하면, 분명 지금처럼 모여서 일하는 일도 없어지겠지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もしかしたら、私は魔界に帰って二度と会えないってこともあるかもしれない」"
translation = "「어쩌면 내가 마계로 돌아가서 두 번 다시 만날 수 없게 될 수도 있어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、みんなとの心の繋がりを大切にしていれば……離れ離れになったとしても、寂しくない。そう思わない？」"
translation = "「하지만 모두와의 마음의 유대를 소중히 한다면…… 떨어져 있게 된다고 해도 외롭지 않아. 그렇게 생각하지 않아?」"

[[dialogue]]
speaker = "unk"
original = "俺は、少し寂しいです"
translation = "저는 조금 외로워요"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら……？\u3000そう、なの？」"
translation = "「어머……? 그래, 그렇구나?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……今の会長くん、あの時のソフィと同じ顔してる」"
translation = "「……지금의 회장군, 그때의 소피와 같은 표정을 짓고 있어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いえ、違うわね。あの時のソフィが、今の会長くんと同じ気持ちだったってことかしら」"
translation = "「아니, 아니네. 그때의 소피가 지금의 회장군과 같은 마음이었다는 뜻일까」"

[[dialogue]]
speaker = "unk"
original = "だから、勝手にいなくならないで下さいね"
translation = "그러니까 마음대로 사라지지 말아 주세요"

[[dialogue]]
speaker = "unk"
original = "他の皆も同じです。"
translation = "다른 사람들도 마찬가지예요."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……ふふっ。なんだか、ちょっと恥ずかしくなるくらい熱烈な引き留めね～」"
translation = "「……후훗. 왠지 조금 부끄러워질 정도로 열렬한 붙잡기네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「別に今、どこかに行く予定があるわけじゃないわ。でも、私にはまだまだ、知りたい世界が沢山あるのよ」"
translation = "「딱히 지금 어딘가로 갈 예정이 있는 건 아니야. 하지만 나에게는 아직 알고 싶은 세계가 많이 있어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「人間界だってそうだし、まだ天界には行ったこともないじゃない？\u3000どこかに落ち着くのは、全部の世界を見てからでもいいと思わない？」"
translation = "「인간계도 그렇고, 아직 천계에는 가본 적도 없잖아? 어딘가에 정착하는 건 모든 세계를 다 본 다음이라도 괜찮다고 생각하지 않아?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それとも……」"
translation = "「아니면……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんは、お姉ちゃんに一緒にいて欲しいのかしら？」"
translation = "「회장군은 누나가 같이 있어 줬으면 하는 걸까?」"

[[dialogue]]
speaker = "unk"
original = "できれば、一緒にいて欲しいです"
translation = "가능하면 같이 있어 주면 좋겠어요"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあらあら♪\u3000そんなにストレートに言われちゃうと、お姉ちゃんもちょっと嬉しくなっちゃうわね～♪」"
translation = "「어머 어머 어머♪ 그렇게 스트레이트로 말해버리면 누나도 조금 기뻐져 버리네~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「離れ離れになっても寂しくない……とは言っても、別に離れなくて済むのなら、私だって自分から離れたいわけじゃないもの」"
translation = "「떨어져 있어도 외롭지 않다……고는 해도, 딱히 떨어지지 않아도 된다면 나라고 해서 스스로 떨어지고 싶은 건 아닌걸」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、私だって自分の夢を諦めたりはしないわ。すべての世界をこの目で見るまで、ひとつの場所に留まっているなんて、私にはできないから」"
translation = "「하지만 나도 내 꿈을 포기하지는 않을 거야. 모든 세계를 이 눈으로 볼 때까지 한 장소에 머물러 있는 건 나에겐 불가능하니까」"

[[dialogue]]
speaker = "unk"
original = "だったら、俺もサーシャさんについて行きます"
translation = "그렇다면 저도 사샤 씨를 따라가겠어요"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え？\u3000それって──」"
translation = "「에? 그건──」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、そっかぁ♪\u3000私、卒業したら１人旅でもしようかと思ってたけれど……会長くんが一緒についてきてくれるなら、凄く楽しいかも♪」"
translation = "「후훗, 그렇구나♪ 나, 졸업하면 혼자 여행이라도 할까 생각했었지만…… 회장군이 함께 따라와 준다면 굉장히 즐거울지도♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうだわ、ソフィもついてきてくれないかしら？\u3000１年は無理でも、半年くらいなら学園をお休みしても、大丈夫よね？」"
translation = "「그렇지, 소피도 따라와 주지 않으려나? 1년은 무리여도 반년 정도라면 학원을 쉬어도 괜찮겠지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～、会長くんが付いて来てくれるって思ったら、なんだか急に待ち遠しくになってきたわ～。どこまで行こうかしら？」"
translation = "「아~, 회장군이 따라와 준다고 생각하니까 왠지 갑자기 기다려지기 시작했어~. 어디까지 갈까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「天界に行けるようになってたら天界に行きたいけれども……あっ、逆に会長くんを魔界に連れていくのも楽しそうね～」"
translation = "「천계에 갈 수 있게 된다면 천계에 가고 싶지만…… 앗, 반대로 회장군을 마계로 데려가는 것도 재미있겠네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんが行きたいところはある？\u3000私、まだ人間界を制覇したわけじゃないから、人間界はあなたに案内して欲しいかも♪」"
translation = "「회장군이 가고 싶은 곳은 있어? 나, 아직 인간계를 제패한 건 아니니까 인간계는 네가 안내해 줬으면 좋겠어♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ねぇ、きっと──ううん、必ずよ？\u3000会長くん」"
translation = "「있지, 꼭── 아니, 반드시야? 회장군」"

[[dialogue]]
speaker = "unk"
original = "はい。約束します"
translation = "네. 약속할게요"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うんっ、お姉ちゃんとの約束ねっ♪」"
translation = "「응, 누나와의 약속이야♪」"

[[dialogue]]
speaker = "unk"
original = "差し出された小指に指きりをすると、サーシャさんはとても嬉しそうに微笑むのだった。"
translation = "내밀어진 새끼손가락에 손가락을 걸고 약속하자, 사샤 씨는 매우 기쁜 듯이 미소 짓는 것이었다."

