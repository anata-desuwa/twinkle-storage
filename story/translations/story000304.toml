[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "イニシュが同行してからというもの──"
translation = "이니슈가 동행한 뒤로──"

[[dialogue]]
speaker = "unk"
original = "イニシュはモンスターを発見すると、俺たちが反応する間もなく瞬殺。"
translation = "이니슈는 몬스터를 발견하면 우리가 반응할 틈도 없이 순살했다."

[[dialogue]]
speaker = "unk"
original = "セドナさんに匹敵すると言われたのは誇張ではないようで、戦いとすら呼べない一方的な駆除だった。"
translation = "세드나 씨에게 필적한다는 말은 과장이 아니었는지, 싸움이라고 부를 수도 없는 일방적인 구제였다."

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（実験対象のモンスターの４分の１がすでにイニシュによって消滅。これ以上は実験に支障が……どうにかしてイニシュを止めないと……）"
translation = "(실험 대상인 몬스터의 4분의 1이 벌써 이니슈에 의해 소멸. 이 이상은 실험에 지장이…… 어떻게든 이니슈를 멈춰야 하는데……)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（しかしイニシュを抑えるにはどうすれば……）"
translation = "(하지만 이니슈를 억제하려면 어떻게 해야……)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──あ！？\u3000もうこんな時間！？」"
translation = "「──아!? 벌써 시간이 이렇게!?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「すみません！\u3000そろそろセドナ長官が基地に戻るはずなので、一旦帰投します！」"
translation = "「죄송합니다! 슬슬 세드나 장관님이 기지로 돌아오실 시간이니 일단 귀환하겠습니다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（捕獲魔法を使い魔に覚えさせているので、会長さんに預けておきます）"
translation = "(포획 마법을 사역마에게 익혀 두었으니 회장님께 맡겨 둘게요.)"

[[dialogue]]
speaker_original = "スミス"
speaker_translation = "스미스"
original = "「ゲコ」"
translation = "「게코.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（あと面倒なことになりそうなので、モンスターを利用する実験をしていたことはイニシュには秘密にしておいてください）"
translation = "(그리고 귀찮은 일이 될 것 같으니 몬스터를 이용해 실험하고 있었다는 건 이니슈에게 비밀로 해주세요.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（すみませんが、よろしくお願いします……！）"
translation = "(번거로우시겠지만 잘 부탁드립니다……!)"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ではモンスターの捜索を再開しましょう」"
translation = "「그럼 몬스터 수색을 재개합시다.」"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "何か話さないか？"
translation = "무슨 이야기라도 할까?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「構いません。私が話相手になるかはわかりませんが」"
translation = "「상관없습니다. 제가 말상대가 될지는 모르겠습니다만.」"

[[dialogue]]
speaker = "unk"
original = "好きな食べ物とかある？"
translation = "좋아하는 음식이라든가 있어?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ありません」"
translation = "「없습니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「もちろん食事による栄養補給は行いますが、特別な嗜好はありません」"
translation = "「물론 식사를 통한 에너지 보급은 수행하지만 특별한 기호는 없습니다.」"

[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "unk"
original = "普段は何してる？"
translation = "평소에는 뭐 해?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「待機しています」"
translation = "「대기합니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「待機が長時間になる場合、自身に睡眠の魔法をかけてスリープに入ります」"
translation = "「대기가 장시간이 될 경우 스스로에게 수면 마법을 걸어 슬립에 들어갑니다.」"

[[dialogue]]
speaker = "unk"
original = "…………………………"
translation = "…………………………"

[[dialogue]]
speaker = "unk"
original = "（会話が続かない……！）"
translation = "(대화가 이어지질 않아……!)"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "イニシュがどこかを見つめているような……"
translation = "이니슈가 어딘가를 빤히 쳐다보고 있는 듯한……"

[[dialogue]]
speaker = "unk"
original = "何か気になるものがあったのだろうか。"
translation = "뭐 신경 쓰이는 거라도 있었던 걸까."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「！\u3000モンスターの反応を発見。殲滅します」"
translation = "「! 몬스터 반응 발견. 섬멸합니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「──戦闘終了」"
translation = "「──전투 종료.」"

[[dialogue]]
speaker = "unk"
original = "止める間もなく、モンスターを倒して戻ってくるイニシュ。"
translation = "말릴 틈도 없이 몬스터를 쓰러뜨리고 돌아오는 이니슈."

[[dialogue]]
speaker = "unk"
original = "一緒に行動していなかったら、俺だって何が起こったかわからなかっただろう。"
translation = "함께 행동하지 않았더라면 나조차 무슨 일이 일어난 건지 몰랐을 것이다."

[[dialogue]]
speaker = "unk"
original = "どうしてそんなにモンスターが嫌いなんだ？"
translation = "어째서 그렇게 몬스터가 싫은 거야?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「？\u3000質問の意図を理解しかねます」"
translation = "「? 질문의 의도를 이해하기 어렵습니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「モンスターはリクリエの尖兵。発見次第駆逐すべき存在です」"
translation = "「몬스터는 리크리에의 첨병. 발견하는 즉시 구축해야 할 존재입니다.」"

[[dialogue]]
speaker = "unk"
original = "それはそうなのだが──"
translation = "그건 그렇지만──"

[[dialogue]]
speaker = "unk"
original = "“魔女の森”は三界の外にあり、そのおかげで魔女はリクリエを生き延びたと聞いている。"
translation = "“마녀의 숲”은 삼계 밖에 있고, 덕분에 마녀는 리크리에에서 살아남았다고 들었어."

[[dialogue]]
speaker = "unk"
original = "それが本当なら、魔女は三界なんて見捨ててもいいはずだが、どうしてリクリエを防ごうとする……？"
translation = "그게 사실이라면 마녀는 삼계 따위 버려도 될 텐데 어째서 리크리에를 막으려는 거지……?"

[[dialogue]]
speaker = "unk"
original = "他に目的があるのだろうか？"
translation = "다른 목적이라도 있는 걸까?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「どうしてと質問されても回答できません」"
translation = "「어째서냐고 물으셔도 답변할 수 없습니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「私には自分の記憶がありません。よって、私は私のことがわかりません」"
translation = "「저는 제 기억이 없습니다. 따라서 저는 저에 대해 알지 못합니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「私はネビュラに発見される前、魔女の森で長い眠りについていました」"
translation = "「저는 네뷸라에 발견되기 전 마녀의 숲에서 깊은 잠에 빠져 있었습니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「何千年──あるいは何万年。私自身にもわからないほど永い時間眠り続け……目覚めた時には、私はこうなっていました」"
translation = "「수천 년── 혹은 수만 년. 저 자신조차 알 수 없을 정도로 영겁의 시간 동안 계속 잠들어 있다가…… 깨어났을 때 저는 이렇게 되어 있었습니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「思い出せたのは、イニシュという自分の名前だけ」"
translation = "「떠올릴 수 있었던 것은 이니슈라는 자신의 이름뿐.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「以前の自分がどのような人物だったのか、なぜ眠りについたのかもわかりません」"
translation = "「이전의 제가 어떤 인물이었는지, 왜 잠들었는지도 모릅니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「それでも。理由がわからなくても」"
translation = "「그래도. 이유를 모르더라도.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「私はリクリエを許さない」"
translation = "「저는 리크리에를 용서하지 않습니다.」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「リクリエの化身たるモンスターは、１匹残らず殲滅します」"
translation = "「리크리에의 화신인 몬스터는 한 마리도 남김없이 섬멸하겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "俺には魔女のことはわからない。その力も。その目的も。"
translation = "나는 마녀에 대해 모른다. 그 힘도. 그 목적도."

[[dialogue]]
speaker = "unk"
original = "だけどイニシュの表情から垣間見えた感情は、紛れもなく本物に見えた。"
translation = "하지만 이니슈의 표정에서 엿보인 감정은 틀림없이 진심처럼 보였다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "またイニシュが何かを見つめている。"
translation = "또 이니슈가 무언가를 빤히 쳐다본다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「煮干し……とんこつ……味噌……」"
translation = "「멸치…… 돈코츠…… 미소……」"

[[dialogue]]
speaker = "unk"
original = "その視線の先は…………ラーメン屋？"
translation = "그 시선 끝에는………… 라멘 가게?"

[[dialogue]]
speaker = "unk"
original = "ラーメン好き？"
translation = "라면 좋아해?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「いえ、そういうわけではないのですが。人間界で製造されたカップ麺をしばしば食べていますので、知識としてはあるのです」"
translation = "「아니요, 그런 건 아닙니다만. 인간계에서 제조된 컵라면을 종종 먹고 있으니 지식으로서는 알고 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "と言いつつ、またラーメン屋の看板を眺めるイニシュ。"
translation = "그렇게 말하면서도 다시 라멘 가게의 간판을 바라보는 이니슈."

[[dialogue]]
speaker = "unk"
original = "やっぱりラーメンが気になるのでは……？"
translation = "역시 라멘이 신경 쓰이는 게 아닐까……?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「どうぞ。魔王に通信のようです」"
translation = "「받으십시오. 마왕에게 통신인 모양입니다.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『あ、会長さん？\u3000実は秋葉原付近にモンスターらしき反応があって……既存のパターンと違うから、本当にモンスターかどうか確かめてほしいんだ』"
translation = "『아, 회장님? 사실 아키하바라 부근에 몬스터 같은 반응이 있어서…… 기존 패턴이랑 달라서 진짜 몬스터인지 확인해 줬으면 좋겠어.』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『できれば強い星騎士に調べてもらいたくて、会長さんが近くにいたから連絡させてもらったの』"
translation = "『가급적 강한 성기사가 조사해 줬으면 했는데 회장님이 근처에 있길래 연락했어.』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『かわいいリーリアもいますよ～♪』"
translation = "『귀여운 리리아도 있어요~♪』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『あ、今「どうしてリーリアもいるんだ？」とか思いませんでした？\u3000センパイひどいです。プンプン』"
translation = "『아, 지금 「왜 리리아도 있는 거지?」라고 생각했죠? 선배 너무해요. 흥칫뿡.』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『リーリアさんにはシミュレーターの調整に付き合ってもらってるところなんだ。彼女は優秀な星騎士だからね』"
translation = "『리리아 씨한테는 시뮬레이터 조정을 도와달라고 하는 중이야. 그녀는 우수한 성기사니까.』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『コハルコ先輩に褒めてもらえるなんて光栄です♪』"
translation = "『코하루코 선배한테 칭찬받다니 영광이에요♪』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『コハルコ先輩には新星学園の生徒みんながお世話になってますからね。お手伝いできてウィンウィンです♪』"
translation = "『코하루코 선배에겐 신성학원 학생들 모두가 신세를 지고 있으니까요. 도와드릴 수 있어서 윈윈이에요♪』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『それでモンスターの方だけど、会長さんに調べてもらっていいかな？\u3000リーリアさんに頼もうかと思ったけど、まだ調整終わってなくて』"
translation = "『그래서 몬스터 말인데, 회장님이 조사해 줄 수 있을까? 리리아 씨한테 부탁할까 했지만 아직 조정이 안 끝나서.』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『……うん、ありがとう。お願いね』"
translation = "『……응, 고마워. 부탁해.』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『よろしくお願いしまーす』"
translation = "『잘 부탁드려요~』"

[[dialogue]]
speaker = "unk"
original = "だけどコハルコさんに頼みが──"
translation = "하지만 코하루코 씨에게 부탁이──"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "『私に？』"
translation = "『나한테?』"

