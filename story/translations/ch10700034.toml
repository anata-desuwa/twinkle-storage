[[dialogue]]
speaker = "unk"
original = "第４話,癒しのトリックオアトリート,P"
translation = "제4화, 치유의 트릭 오어 트릿, P"

[[dialogue]]
speaker = "unk"
original = "今日は特別、星徒会の仕事が忙しい１日だった。"
translation = "오늘은 특별히 성도회의 일이 바쁜 하루였다."

[[dialogue]]
speaker = "unk"
original = "夜まで星徒会室に居残って仕事をしていて、それもようやくひと段落ついた。"
translation = "밤까지 성도회실에 남아 일을 했고, 그것도 겨우 일단락되었다."

[[dialogue]]
speaker = "unk"
original = "と、そんな時、部屋のドアがノックされた。"
translation = "그때, 방 문이 노크되었다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ガオガオ、トリックオアトリート♪\u3000お菓子をくれなきゃイタズラしちゃうぞ～」"
translation = "「가오가오, 트릭 오어 트릿♪ 과자를 안 주면 장난칠 거다~」"

[[dialogue]]
speaker = "unk"
original = "そんな格好でどうしたの？"
translation = "그런 복장으로 무슨 일이야?"

[[dialogue]]
speaker = "unk"
original = "ハロウィンはもう終わってるよ"
translation = "할로윈은 이미 끝났어"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そんな格好っていうか、普通に戦闘服！\u3000ハロウィンフォームだし！\u3000ハロウィンの時以外、着ちゃいけないって法律はないし！」"
translation = "「그런 복장이라니, 평범한 전투복인 시! 할로윈 폼인 시! 할로윈 때 말고는 입으면 안 된다는 법은 없는 시!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「わかればよろしい。ではお菓子とイタズラ、どっちがいいか選ぶし」"
translation = "「알면 됐시. 그럼 과자와 장난, 어느 쪽이 좋을지 고르는 시」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あーっ、ちょちょちょっと！\u3000なんで戸棚からお菓子を出そうとしてるの！？」"
translation = "「아앗, 잠, 잠깐만! 왜 찬장에서 과자를 꺼내려고 하는 시야!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「どちらがいいか選べとは言ったけど……そこはそうじゃなくて……」"
translation = "「어느 쪽이 좋을지 고르라고는 했지만…… 거긴 그게 아닌 시고……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えーいっ！\u3000問答無用だしっ！！」"
translation = "「에잇! 묻지도 따지지도 않는 시!!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えへへ、捕まえた♪」"
translation = "「에헤헤, 잡았다♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「お菓子をくれなきゃイタズラするしかないし……まずはくすぐり攻撃♪\u3000こしょこしょこしょ！」"
translation = "「과자를 안 주면 장난칠 수밖에 없는 시…… 우선은 간지럼 공격♪ 간질간질간질!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「むーっ、何でこんなことするのかって……そのくらい察して欲しいし！」"
translation = "「무웃, 왜 이런 짓을 하냐니…… 그 정도는 눈치채 줬으면 하는 시!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「今日はずっと忙しそうで、構ってもらえなかったし。だから、ちょっとした遊び心だし……」"
translation = "「오늘 하루 종일 바빠 보여서, 신경 써주지 못했시. 그래서, 사소한 장난기인 시……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「というわけで、会長くんは全力くすぐりの刑なの！」"
translation = "「그런 고로, 회장군은 전력 간지럼형인 시!」"

[[dialogue]]
speaker = "unk"
original = "か、かんにんして！"
translation = "카, 감히 용서해 주십시오!"

[[dialogue]]
speaker = "unk"
original = "お代官様！"
translation = "사또 나리!"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ふふふ、良いではないか、良いではないか」"
translation = "「후후후, 좋지 아니한가, 좋지 아니한가」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なんとも愛い娘よのぉ～、今宵はたっぷり可愛がってやろうぞ……くっくっく！」"
translation = "「참으로 사랑스러운 아가씨로구나~, 오늘 밤은 실컷 귀여워해 주마…… 큭큭큭!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「この辺りはどうじゃ、こしょこしょ♪\u3000おうおう、ではこの辺りも攻めてみようか？\u3000ほれほれ……」"
translation = "「이 근처는 어떻느냐, 간질간질♪ 오우오우, 그럼 이 근처도 공격해 볼까? 이리 와 이리 와……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はぁはぁ、お主があまりにも良い声で鳴きよるから、だんだん変な気分になってきたではないか」"
translation = "「하아하아, 네놈이 너무나도 좋은 목소리로 울어대니, 점점 이상한 기분이 드는 것이 아니냐」"

[[dialogue]]
speaker = "unk"
original = "ごめん、そろそろ本当に勘弁して"
translation = "미안, 슬슬 정말로 봐줘"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「む～、振っておいて素に戻るのは反則だし……」"
translation = "「무~, 분위기를 띄워놓고 원래대로 돌아가는 건 반칙인 시……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「でも仕方が無いから別なイタズラにしてあげるし♪\u3000ふふ～ん、どんなイタズラにしようかな～」"
translation = "「하지만 어쩔 수 없으니 다른 장난으로 바꿔줄 시♪ 후후~웅, 어떤 장난으로 할까나~」"

[[dialogue]]
speaker = "unk"
original = "トリックオアトリート"
translation = "트릭 오어 트릿"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「へっ！？」"
translation = "「헷!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「イタズラすることしか考えてなかったから、お菓子とか用意してないし……」"
translation = "「장난칠 생각밖에 안 했으니까, 과자 같은 건 준비 안 했시……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ということは、会長くんにイタズラの逆襲されちゃうってこと？」"
translation = "「그렇다는 건, 회장군에게 장난의 역습을 당한다는 뜻인 시야?」"

[[dialogue]]
speaker = "unk"
original = "お覚悟めされよ……"
translation = "각오하시게……"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「か、会長くん……目が真剣だぁ。何をするつもりなの……？」"
translation = "「카, 회장군…… 눈이 진지한 시야. 뭘 할 생각인 시야……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「まさか会長くん、必殺の仕事人になって、あたしのことをくすぐりの刑に処すんじゃ……」"
translation = "「설마 회장군, 필살의 일꾼이 되어서, 나를 간지럼형에 처하는 건……」"

[[dialogue]]
speaker = "unk"
original = "もっとひどい事をするよ"
translation = "더 심한 짓을 할 거야"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「もっとひどい事！？\u3000え、えへへ……イタズラされるのはいいけど、ちょ～っとだけ手加減して欲しいかも……」"
translation = "「더 심한 짓!? 에, 에헤헤…… 장난당하는 건 좋지만, 조~금만 살살 해줬으면 할지도……」"

[[dialogue]]
speaker = "unk"
original = "問答無用！"
translation = "묻지도 따지지도 않는다!"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ひゃっ！？\u3000あ……ギューって抱きしめて……」"
translation = "「햣!? 아…… 꼬옥 안아주고……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、う……頭、なでなでして……ダメ、だよ……会長くん……<emoji=heart04>」"
translation = "「앗, 우…… 머리, 쓰담쓰담 해주고…… 안 돼, 시야…… 회장군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そんな風に優しくいろいろされちゃったら……あたし、おかしくなっちゃうよ……<emoji=heart04>」"
translation = "「그런 식으로 상냥하게 여러 가지를 당하면…… 나, 이상해져 버릴 시야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（これが会長くんのイタズラ……？\u3000ひどいどころか、むしろ嬉しいけど……でも、でも……）"
translation = "（이게 회장군의 장난……? 심하다기보다는, 오히려 기쁘지만…… 하지만, 하지만……）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（会長くんの手が、お耳や尻尾も優しく撫でて……身体がビクンって反応しちゃうし……）"
translation = "（회장군의 손이, 귀나 꼬리도 상냥하게 쓰다듬고…… 몸이 움찔하고 반응해 버리는 시……）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（恥ずかしいよぉ……でも、恥ずかしいけど……もっとされたい……イタズラ、して欲しい……<emoji=heart04>）"
translation = "（부끄러워어…… 하지만, 부끄럽지만…… 더 당하고 싶어…… 장난, 쳐줬으면 좋겠어……<emoji=heart04>）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ん、ちゅ……んん……<emoji=heart04>」"
translation = "「응, 쪽…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（キス、してくれた……）"
translation = "（키스, 해줬다……）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "（もーっ、会長くん……！\u3000何であたしの気持ち、分かってくれるかなあ……カッコ良すぎるんですけどっ<emoji=heart04>）"
translation = "（모옷, 회장군……! 왜 내 마음을, 알아주는 걸까…… 너무 멋있는 시잖아<emoji=heart04>）"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ちゅ、ん……ふ……ちゅっ……<emoji=heart04>」"
translation = "「쪽, 응…… 후…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ふぁ……えへへ、イタズラされちゃった……<emoji=heart04>\u3000でも、こういうイタズラなら大歓迎かも……<emoji=heart04>」"
translation = "「하아…… 에헤헤, 장난당해 버렸시……<emoji=heart04> 하지만, 이런 장난이라면 대환영일지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってウズメは俺に抱きつき返してくる。"
translation = "그렇게 말하며 우즈메는 나를 다시 껴안아 온다."

[[dialogue]]
speaker = "unk"
original = "可愛い彼女のイタズラのおかげで、たまっていた疲れは一気に吹き飛んだのだった。"
translation = "귀여운 여자친구의 장난 덕분에, 쌓여 있던 피로는 단숨에 날아갔던 것이다."

