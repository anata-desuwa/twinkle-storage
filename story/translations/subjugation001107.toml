[[dialogue]]
speaker = "unk"
original = "俺が２人の元に駆けつけた直後、見たことのないボスモンスターが姿を現していた。"
translation = "내가 두 사람 곁으로 달려간 직후, 본 적 없는 보스 몬스터가 모습을 드러내고 있었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くん……他の星徒会メンバーのみんなは……？」"
translation = "「회장군…… 다른 성도회 멤버들은……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス達は俺を早く２人の元へ行かせる為に、アステラ内に多数出現している雑魚モンスターの掃討を引き受けてくれていた。"
translation = "비너스 일행은 나를 빨리 두 사람 곁으로 보내기 위해 아스텔라 내에 다수 출현한 잡동사니 몬스터들의 소탕을 맡아주고 있었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――そう。まだ少し時間がかかるってことだね……じゃあ、全員揃うまで、３人で切り抜けるしかない、か……！」"
translation = "「──그래. 아직 시간이 좀 걸린다는 거네…… 그럼 다 모일 때까지 셋이서 헤쳐 나갈 수밖에 없는 건가……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「先生、その傷で無理しないで！」"
translation = "「선생님, 그 상처로 무리하지 마세요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「大丈夫だよ。少し休んで、自動回復したから……」"
translation = "「괜찮아. 조금 쉬면서 자동 회복했으니까……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「１つだけ、あたしに考えがある」"
translation = "「나한테 생각이 하나 있어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「考え……？」"
translation = "「생각……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん。あの新種モンスターを倒せるかもしれない切り札が、あたしにもある」"
translation = "「응. 저 신종 몬스터를 쓰러뜨릴 수 있을지도 모르는 비장의 카드가 나한테도 있어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「前に言ったことあったよね。魔王の秘伝――」"
translation = "「전에 말한 적 있었지. 마왕의 비전──」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「アルケインコード」"
translation = "「알케인 코드」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それは……でも、まだ使えないって……」"
translation = "「그건…… 하지만 아직 못 쓴다고……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん。今のあたしには使えない。だから――」"
translation = "「응. 지금의 나에겐 못 써. 그러니까──」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それを今からお兄ちゃんに託す」"
translation = "「그걸 지금부터 오빠에게 맡길게」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「モノクラウン家の伝承星術を使う。――行くよ、お兄ちゃん！」"
translation = "「모노크라운 가문의 전승 성술을 사용한다. ──갈게, 오빠!」"

[[dialogue]]
speaker = "unk"
original = "メイプルが俺の額に白いパペットで触れる。次の瞬間――"
translation = "메이플이 내 이마에 하얀 퍼펫을 갖다 댄다. 다음 순간──"

[[dialogue]]
speaker = "unk"
original = "ここは……？"
translation = "여기는……?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「モノクラウン家は代々、アルケインコードの１つを伝承し続けてきた。親から子に、そして魔王の血を引く者へと」"
translation = "「모노크라운 가문은 대대로 알케인 코드 중 하나를 전승해 왔어. 부모에게서 자식으로, 그리고 마왕의 피를 이은 자에게로」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ここはその伝承を行う精神世界。ここでの時間は、現実では１秒にも満たない。だから、落ち着いて聞いて」"
translation = "「여기는 그 전승을 행하는 정신 세계. 여기서의 시간은 현실에선 1초도 되지 않아. 그러니까 진정하고 들어줘」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今から渡すアルケインコードは、魔王と仲間の『絆』が試される力」"
translation = "「지금부터 건네줄 알케인 코드는 마왕과 동료의 『유대』를 시험하는 힘」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「仲間との間に絆がなければ、そもそも発動しない」"
translation = "「동료와의 사이에 유대가 없다면 애당초 발동하지 않아」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そして、この技は魔王ではなく、その仲間に力を与える。だから――」"
translation = "「그리고 이 기술은 마왕이 아니라 그 동료에게 힘을 부여해. 그러니까──」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今この場でお兄ちゃんが力を与えられる相手は、トワ先生ということになる」"
translation = "「지금 이 자리에서 오빠가 힘을 줄 수 있는 상대는 토와 선생님이 되는 거야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ、私！？」"
translation = "「엣, 나!?」"

[[dialogue]]
speaker = "unk"
original = "先生！\u3000いつの間に！？"
translation = "선생님! 어느 사이에!?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「先生にも理解しておいてもらわないといけないから呼んだの」"
translation = "「선생님도 이해하고 있어야 하니까 불렀어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「で、でも、会長くんとの絆って……私で大丈夫なの！？\u3000な、仲は悪くないと思うけど、先生と生徒との間柄だし……」"
translation = "「하, 하지만 회장군과의 유대라니…… 나로 괜찮은 거야!? 서, 사이가 나쁘지는 않다고 생각하지만 선생님과 학생 사이인데……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「言いつつも、なんか乙女なリアクションになってるよ。先生」"
translation = "「말은 그렇게 하면서 왠지 소녀 같은 리액션을 하고 있네, 선생님」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ！？\u3000そ、そんなことないよ！？\u3000確かに会長くんはカッコいいなぁって思ったりすることあるけど……！」"
translation = "「엣!? 그, 그렇지 않아!? 확실히 회장군은 멋지구나~ 하고 생각한 적은 있지만……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、それは今まで恋愛経験が全くなかったから、反射的にトキめいちゃってるだけだからッ！！！」"
translation = "「그, 그건 지금까지 연애 경험이 전혀 없어서 반사적으로 설레버린 것뿐이니까!!!」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？"
translation = "에엣!?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だ、大胆なカミングアウトだね……」"
translation = "「다, 대담한 커밍아웃이네……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あ…………うわあああぁぁぁっ！？\u3000思わずとんでもないこと言っちゃったあああぁぁぁっ！！！」"
translation = "「아………… 우와아아아앗!? 나도 모르게 엄청난 소릴 해버렸다아아앗!!!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「と、とりあえず先生の方は思ってたより大丈夫そうとして……後は、お兄ちゃん次第かな」"
translation = "「이, 일단 선생님 쪽은 생각보다 괜찮을 것 같고…… 남은 건 오빠 하기 나름이려나」"

[[dialogue]]
speaker = "unk"
original = "それは大丈夫"
translation = "그건 괜찮아"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "俺は先生のこと、信じてるから"
translation = "나 선생님을 믿고 있으니까"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そんなに改まってどうしたの、会長くん？」"
translation = "「그렇게 정색하고 왜 그래, 회장군?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――お願いがある？\u3000星力制御を教えて欲しい？」"
translation = "「──부탁이 있다고? 성력 제어를 가르쳐줬으면 좋겠어?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん、先生でよければ、喜んで教えるよ♪」"
translation = "「응, 선생님이라도 괜찮다면 기꺼이 가르쳐 줄게♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――いつも時間を取らせて、申し訳ないって？」"
translation = "「──항상 시간을 뺏어서 죄송하다구?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あはは、そんなこと全然気にしなくていいよ。生徒を教え導くのが、先生の仕事だからね～」"
translation = "「아하하, 그런 건 전혀 신경 쓰지 않아도 돼. 학생을 가르치고 이끄는 게 선생님의 일이니까~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……というのは、建前。本当は――」"
translation = "「……라는 건 겉치레고. 사실은──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんが御前試合でヴィーナスちゃんに勝ったあの日、私も負けたくないって思っちゃったんだよね」"
translation = "「회장군이 어전 시합에서 비너스짱에게 이겼던 그날, 나도 지고 싶지 않다고 생각했거든」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――そう。私も星騎士として、もっと強くなりたいって！」"
translation = "「──그래. 나도 성기사로서 좀 더 강해지고 싶다고!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だから……会長くんと一緒に訓練することができて、実は嬉しかったんだ！\u3000えへへ♪」"
translation = "「그래서…… 회장군과 함께 훈련할 수 있어서 사실은 기뻤어! 에헤헤♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……アルケインコード、確かに伝えたよ。お兄ちゃん！」"
translation = "「……아르케인 코드, 확실히 전달했어. 오빠!」"

[[dialogue]]
speaker = "unk"
original = "ああ。……トワ先生！"
translation = "어아. ……토와 선생님!"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……うん！\u3000いつでもいいよ、会長くん！」"
translation = "「……응! 언제든 좋아, 회장군!」"

[[dialogue]]
speaker = "unk"
original = "俺はトワ先生の背中に手をかざす。そして、告げる。"
translation = "나는 토와 선생님의 등에 손을 갖다 댄다. 그리고 고한다."

[[dialogue]]
speaker = "unk"
original = "メイプルから託された、その技の名は――"
translation = "메이플에게 기탁받은 그 기술의 이름은──"

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァエクストリーム！！！"
translation = "알케인 노바 익스트림!!!"

[[dialogue]]
speaker = "unk"
original = "トワ先生を中心に大きな光が広がっていく、そして――"
translation = "토와 선생님을 중심으로 커다란 빛이 퍼져 나간다. 그리고──"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「これは……！」"
translation = "「이것은……!」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「戦闘服が進化した……！」"
translation = "「전투복이 진화했어……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃん……本当に……！」"
translation = "「오빠…… 정말로……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「これが……魔王の力――アルケインノヴァエクストリーム……！」"
translation = "「이것이…… 마왕의 힘──알케인 노바 익스트림……!」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「わかる……会長くんを通して……すごい力が流れ込んでくる……！」"
translation = "「느껴져…… 회장군을 통해서…… 엄청난 힘이 흘러 들어와……!」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "（自動回復が変化……いや、進化して、体に常時ライズ・オーバーブーストがかかってる。自動だから制御も必要ない）"
translation = "(자동 회복이 변화…… 아니, 진화해서 몸에 상시 라이즈 오버부스트가 걸려 있어. 자동이라 제어도 필요 없겠어)"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "（これなら多分……！）"
translation = "(이거라면 아마……!)"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「ライズ・オーバーブースト！」"
translation = "「라이즈 오버부스트!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「体から星力が……満ち溢れてくる！」"
translation = "「몸에서 성력이…… 넘쳐흘러!」"

[[dialogue]]
speaker = "unk"
original = "俺もだ！"
translation = "나도 그래!"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「やっぱりそうだ……今の姿なら、反動のないライズ・オーバーブーストを２人にも付与することができる！」"
translation = "「역시 그렇구나…… 지금 모습이라면 반동 없는 라이즈 오버부스트를 두 사람에게도 부여할 수 있어!」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「先生が２人を勝利に導く！\u3000だから！」"
translation = "「선생님이 두 사람을 승리로 이끌게! 그러니까!」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「一緒に戦おう！\u3000メイプルちゃん！\u3000会長くん！」"
translation = "「함께 싸우자! 메이플짱! 회장군!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん！\u3000先生！」"
translation = "「응! 선생님!」"

[[dialogue]]
speaker = "unk"
original = "行きましょう！"
translation = "가죠!"

[[dialogue]]
speaker = "unk"
original = "俺たちは新種モンスターに向き直る。"
translation = "우리들은 신종 몬스터를 향해 다시 돌아선다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「……いざ、勝負ッ！！」"
translation = "「……자, 승부다!!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「グオオオォォォーーーッ！！！」"
translation = "「구오오오오오───!!!」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「はあああぁぁぁーーーッ！！！」"
translation = "「하아아아아아───!!!」"

[[dialogue]]
speaker = "unk"
original = "トワ先生と新種モンスターが真っ向から攻撃をぶつけ合い、決戦の火蓋が切って落とされるのだった――"
translation = "토와 선생님과 신종 몬스터가 정면으로 공격을 맞부딪치며 결전의 서막이 올랐다──"

