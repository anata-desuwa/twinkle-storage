[[dialogue]]
speaker = "unk"
original = "第８話,多忙な転入生活,B"
translation = "제8화, 다망한 전입 생활, B"

[[dialogue]]
speaker = "unk"
original = "転入３日目──"
translation = "전입 3일째──"

[[dialogue]]
speaker = "unk"
original = "その日以降、恐ろしく多忙な日々が始まった。"
translation = "그날 이후, 무서울 정도로 다망한 나날이 시작되었다."

[[dialogue]]
speaker = "トワ先生"
original = "「はーい。いいですかみなさーん、前回の続き４３ページを開いてくださーい。星体力学において星力とは……」"
translation = "「하ー이. 괜찮으신가요 여러분ー, 지난번 이어서 43페이지를 펴 주세요ー. 성체 역학에서 성력이란……」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「トワちゃん先生、間違えてまーす。前回は３２ページまでしか進んでませーん」"
translation = "「토와짱 선생님, 틀렸어ー요. 지난번엔 32페이지까지만 나갔어ー요」"

[[dialogue]]
speaker = "トワ先生"
original = "「え？\u3000あ、ほんとだ。あはは、みんなごめーん」"
translation = "「에? 아, 정말이네. 아하하, 모두 미안ー」"

[[dialogue]]
speaker = "クロト"
original = "「（この授業は……）」"
translation = "「(이 수업은……)」"

[[dialogue]]
speaker = "unk"
original = "慣れない授業に必死で追いつく。"
translation = "익숙지 않은 수업에 필사적으로 따라잡는다."

[[dialogue]]
speaker = "unk"
original = "編入試験を突破したのでやや油断していたが、新星学園は通常カリキュラムまで先進的なものだった。"
translation = "편입 시험을 돌파했기에 다소 방심하고 있었지만, 신성 학원은 통상 커리큘럼까지 선진적인 것이었다."

[[dialogue]]
speaker = "unk"
original = "加えてこの『星体力学』は本学園特有の科目で、一から学ばなければならないため勉強も容易ではなかった。"
translation = "게다가 이 『성체 역학』은 본 학원 특유의 과목으로, 처음부터 배워야 했기에 공부 또한 쉽지 않았다."

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「ねえねえ、緋宮くん！\u3000緋宮くんって星徒会に入ったの？」"
translation = "「저기 저기, 히노미야 군! 히노미야 군 성도회에 들어갔어?」"

[[dialogue]]
speaker = "クロト"
original = "「いや……入会はしていない」"
translation = "「아니…… 입회는 하지 않았다」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「なのに会長に勝負申し込んだの？\u3000スゴッ」"
translation = "「그런데도 회장에게 승부를 신청한 거야? 대단해」"

[[dialogue]]
speaker = "クロト"
original = "「俺が望んだわけではないが、成り行き上」"
translation = "「내가 원한 것은 아니지만, 상황이 그렇게 되었다」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「昨日、めっちゃ意味深に呼び出されてたもんね……！\u3000でもこんなことになるなんて思わなかったけど……！」"
translation = "「어제, 엄청 의미심장하게 불려 나갔었잖아……! 하지만 이렇게 될 줄은 생각도 못 했지만……!」"

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「こんなの前代未聞だよ！\u3000どうなるかわかんないけど、応援してるね！」"
translation = "「이런 거 전대미문이야! 어떻게 될지는 모르겠지만, 응원할게!」"

[[dialogue]]
speaker = "unk"
original = "休み時間には、クラスメイトとの交流もはかる。"
translation = "쉬는 시간에는, 클래스메이트와의 교류도 꾀한다."

[[dialogue]]
speaker = "unk"
original = "本来なら徐々に馴染んでいくはずの過程は、すっかり件の御前試合によって異例なものとなってしまった。"
translation = "본래라면 서서히 익숙해져 갈 과정은, 완전히 그 어전 시합으로 인해 이례적인 것이 되고 말았다."

[[dialogue]]
speaker = "マトイ"
original = "「あっちがアリーナ。こっちが教室棟で、授業の時はここを通っていくと早いわ」"
translation = "「저쪽이 아레나. 이쪽이 교실동이고, 수업 시간에는 여기를 통과해 가면 빨라」"

[[dialogue]]
speaker = "クロト"
original = "「ふむふむ……しかし、とんでもない広さだな」"
translation = "「흠흠…… 하지만, 엄청난 넓이로군」"

[[dialogue]]
speaker = "unk"
original = "わずかな隙間時間を使って、広大な学園の敷地を覚える……。"
translation = "아주 짧은 틈새 시간을 이용해, 광대한 학원 부지를 외운다……."

[[dialogue]]
speaker = "クロト"
original = "「あの建物は？」"
translation = "「저 건물은?」"

[[dialogue]]
speaker = "マトイ"
original = "「流星学園付属校の校舎。間違えて入らないよう気をつけてね」"
translation = "「유성 학원 부속 학교의 교사. 실수로 들어가지 않도록 조심해」"

[[dialogue]]
speaker = "マトイ"
original = "「向こうへ行くと大聖堂があるけど……ちょっと遠いから、今度紹介するわね」"
translation = "「저쪽으로 가면 대성당이 있지만…… 조금 머니까, 다음에 소개해 줄게」"

[[dialogue]]
speaker = "クロト"
original = "「わかった」"
translation = "「알겠다」"

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker = "アナ"
original = "「今日の特訓をはじめましょ～」"
translation = "「오늘의 특훈을 시작하죠～」"

[[dialogue]]
speaker = "unk"
original = "──放課後は修業。"
translation = "──방과 후는 수련."

[[dialogue]]
speaker = "unk"
original = "まさに、ぎちぎちのスケジュールというやつだった。"
translation = "그야말로, 빡빡한 스케줄이라는 것이었다."

[[dialogue]]
speaker = "マトイ"
original = "「その……大丈夫？\u3000緋宮くん。疲れてそうだけど」"
translation = "「저…… 괜찮아? 히노미야 군. 피곤해 보이는데」"

[[dialogue]]
speaker = "クロト"
original = "「いや……問題ない。体を動かしたわけじゃないからな」"
translation = "「아니…… 문제없다. 몸을 움직인 것은 아니니까」"

[[dialogue]]
speaker = "unk"
original = "疲労があるとすれば、むしろ転入に伴う精神的なあれこれによるもの。直に慣れるだろう。"
translation = "피로가 있다면, 오히려 전입에 따른 정신적인 이런저런 일 때문일 것이다. 곧 익숙해질 것이다."

[[dialogue]]
speaker = "unk"
original = "それよりもヴィーナスとの御前試合に備えなければ元も子もない。"
translation = "그보다도 비너스와의 어전 시합에 대비하지 않으면 아무 소용이 없다."

[[dialogue]]
speaker = "マトイ"
original = "「今日はＢランクのモンスターを出してみるね。これ相手に１分が切れたら、Ａランクへの挑戦許可が降りるから」"
translation = "「오늘은 B랭크 몬스터를 내볼게. 이걸 상대로 1분을 끊으면, A랭크로의 도전 허가가 내려지니까」"

[[dialogue]]
speaker = "クロト"
original = "「格上相手に１分か……厳しそうだが、やってみよう」"
translation = "「격상 상대로 1분이라…… 어려울 것 같지만, 해보자」"

[[dialogue]]
speaker = "アナ"
original = "「今日は私たちも参加する。と言っても、あくまでサポートに徹するけど」"
translation = "「오늘은 저희도 참가해요. 라고 해도, 어디까지나 서포트에 전념하지만요」"

[[dialogue]]
speaker = "マトイ"
original = "「そだね。最終的にはソロで１分を切るために……まずは私たちの援護込みでやってみよ」"
translation = "「그렇지. 최종적으로는 솔로로 1분을 끊기 위해서…… 우선은 우리의 원호 포함으로 해 보자」"

[[dialogue]]
speaker = "クロト"
original = "「アナも……マトイもか。それは助かる」"
translation = "「아나도…… 마토이도인가. 그거 도움이 되겠군」"

[[dialogue]]
speaker = "アナ"
original = "「変身──」"
translation = "「변신──」"

