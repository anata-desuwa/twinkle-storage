[[dialogue]]
speaker = "unk"
original = "魔女たちの組織「ネビュラ」と協力し、守護天使たちの本体の解放を行った作戦『オペレーション・ペンタグラム』。"
translation = "마녀들의 조직 「네뷸라」와 협력하여 수호천사들의 본체를 해방한 작전 『오퍼레이션 펜타그램』."

[[dialogue]]
speaker = "unk"
original = "その成功から数日が経過したある日のことだった。"
translation = "그 성공으로부터 며칠이 경과한 어느 날이었다."

[[dialogue]]
speaker = "リーリア"
original = "「せーんぱい♪」"
translation = "「선~배♪」"

[[dialogue]]
speaker = "リーリア"
original = "「突然ですけど、私の水着に興味はありませんか？」"
translation = "「갑작스럽지만 제 수영복에 흥미 없으신가요?」"

[[dialogue]]
speaker = "リーリア"
original = "「はい♪\u3000水着です。実はですね～、ネビュラで開発を行っていた水着形体の戦闘服が完成したんですよ」"
translation = "「네♪ 수영복이에요. 실은 말이죠~ 네뷸라에서 개발하던 수영복 형태의 전투복이 완성됐거든요」"

[[dialogue]]
speaker = "unk"
original = "星騎士の水着フォームを参考にしたって？"
translation = "성기사의 수영복 폼을 참고했다고?"

[[dialogue]]
speaker = "unk"
original = "アナから少し話は聞いたかも"
translation = "아나에게 조금 이야기는 들었을지도"

[[dialogue]]
speaker = "リーリア"
original = "「そうそう！\u3000学園の方から情報をいただいて、それを元に作っていたアレです！」"
translation = "「맞아요 맞아! 학원 쪽에서 정보를 받아서 그걸 토대로 만들던 그거예요!」"

[[dialogue]]
speaker = "リーリア"
original = "「主力メンバー全員の水着を開発中なんですけど、なんと私のが一番最初に出来たみたいで～」"
translation = "「주력 멤버 전원의 수영복을 개발 중인데, 무려 제 게 가장 먼저 완성된 것 같아서요~」"

[[dialogue]]
speaker = "リーリア"
original = "「それで昨日見せてもらったんです。そしたらその水着がもーーーマジカル可愛くて！！」"
translation = "「그래서 어제 보여달라고 했거든요. 그랬더니 그 수영복이 너어어어무 매지컬하게 귀여운 거 있죠!!」"

[[dialogue]]
speaker = "リーリア"
original = "「戦闘服って聞いてたから期待してなかったんですけど、いい意味で裏切られたーって感じですね！」"
translation = "「전투복이라고 들어서 기대 안 했는데, 좋은 의미로 배신당했다는 느낌이네요!」"

[[dialogue]]
speaker = "リーリア"
original = "「それで私、思ったわけです……」"
translation = "「그래서 저, 생각했어요……」"

[[dialogue]]
speaker = "リーリア"
original = "「これはセンパイのこと誘って、泳ぎに行くしかないっ！\u3000とね♪」"
translation = "「이건 선배를 꼬셔서 수영하러 갈 수밖에 없다! 고 말이죠♪」"

[[dialogue]]
speaker = "リーリア"
original = "「というわけで、どーですかセ・ン・パ・イ？」"
translation = "「그런 고로 어떠신가요, 선.배?」"

[[dialogue]]
speaker = "unk"
original = "リーリアの水着……"
translation = "리리아의 수영복……"

[[dialogue]]
speaker = "リーリア"
original = "「おやおや～、お顔が赤くなってますよ？\u3000何を想像しちゃってるんですか～？\u3000ふふっ、センパイのえっち<emoji=heart04>」"
translation = "「어라어라~ 얼굴이 빨개졌는데요? 뭘 상상하고 계신 건가요~? 후후, 선배는 변태<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「そんなに見たいんですか？\u3000見たいんですよね？\u3000じゃー、素直になった方がいいと思いますよ～♪」"
translation = "「그렇게 보고 싶으신가요? 보고 싶으신 거죠? 그럼 솔직해지는 게 좋다고 생각해요~♪」"

[[dialogue]]
speaker = "リーリア"
original = "「さぁさぁ、返答やいかに！」"
translation = "「자자, 대답은 어찌 될는지!」"

[[dialogue]]
speaker = "unk"
original = "海に行こう！"
translation = "바다에 가자!"

[[dialogue]]
speaker = "リーリア"
original = "「わぁお！\u3000やったぁ、ありがとうございます♪」"
translation = "「와오! 야호, 감사해요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「……にしても、思ったよりあっさり陥落しましたね～」"
translation = "「……그나저나 생각보다 싱겁게 함락되셨네요~」"

[[dialogue]]
speaker = "リーリア"
original = "「何のことって……またまた、センパイってばとぼけちゃって～♪\u3000それにしても、確かに海シーズンではありますが、人目につきません？\u3000プールじゃないんですか？」"
translation = "「무슨 소리냐니…… 또또 선배님도 참 시치미 떼시긴~♪ 그나저나 확실히 바다 시즌이긴 합니다만 남의 눈에 띄지 않을까요? 수영장 아니에요?」"

[[dialogue]]
speaker = "unk"
original = "『エンドレスサマー』にご招待するよ"
translation = "『엔들리스 서머』에 초대할게"

[[dialogue]]
speaker = "unk"
original = "ネビュラの皆さんにはお世話になったから"
translation = "네뷸라 여러분에게 신세를 졌으니까"

[[dialogue]]
speaker = "リーリア"
original = "「『エンドレスサマー』……？\u3000聞いたことがあるような……」"
translation = "「『엔들리스 서머』……? 들어본 적이 있는 것 같은……」"

[[dialogue]]
speaker = "リーリア"
original = "「あ、思い出しました！\u3000リップルさんが、夏を大いに楽しんでもらうために作り出したっていう巨大な結界ですよね？」"
translation = "「아, 생각났어요! 리플 씨가 여름을 마음껏 즐기기 위해 만들어냈다는 거대한 결계죠?」"

[[dialogue]]
speaker = "リーリア"
original = "「そもそも例の水着戦闘服の元になった星騎士の新種フォームも、そこで発見されたものなんでしたっけ？」"
translation = "「애초에 그 수영복 전투복의 모태가 된 성기사의 신종 폼도 거기서 발견된 거였던가요?」"

[[dialogue]]
speaker = "unk"
original = "すごく綺麗なところだよ"
translation = "정말 아름다운 곳이야"

[[dialogue]]
speaker = "リーリア"
original = "「ふふっ、それは楽しみです♪」"
translation = "「후후, 기대되네요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「あれ？\u3000でも……待ってください？」"
translation = "「어라? 하지만…… 잠깐만요?」"

[[dialogue]]
speaker = "リーリア"
original = "「先日のお礼ってことだと、『オペレーション・ペンタグラム』の打ち上げ、って感じに……なっちゃいませんか？」"
translation = "「전날의 보답이라는 거면 『오퍼레이션 펜타그램』의 뒤풀이 같은 느낌이…… 되어버리지 않나요?」"

[[dialogue]]
speaker = "リーリア"
original = "「そうなったら、私はネビュラのみんなを連れてこなきゃだし、センパイの方も星徒会のみなさんが一緒ってことに……？」"
translation = "「그렇게 되면 저는 네뷸라 모두를 데려와야 하고, 선배 쪽도 성도회 분들이 함께라는 게……?」"

[[dialogue]]
speaker = "リーリア"
original = "「その通りだけど問題ある？\u3000って……も～～！\u3000本当にセンパイはイジワルな人ですね！」"
translation = "「그 말대로인데 문제 있어? 라니…… 정마아알! 진짜 선배는 심술궂은 사람이라니까요!」"

[[dialogue]]
speaker = "リーリア"
original = "（だって私は……センパイと２人きりがよかったんですけど？）"
translation = "(그치만 나는…… 선배랑 단둘이 있고 싶었는데?)"

[[dialogue]]
speaker = "リーリア"
original = "「これは天然なのか、それとも防衛線を張られてるのか……まったく、どっちなんでしょうね～」"
translation = "「이건 천연인 건지, 아니면 방어선을 치고 계신 건지…… 정말이지 어느 쪽일까요~」"

[[dialogue]]
speaker = "リーリア"
original = "「ま、今回はそれでいいです。水着戦闘服を持ち出す理由も作れますし、センパイに水着を見てもらうっていう目的は果たせますから」"
translation = "「뭐, 이번엔 그걸로 됐어요. 수영복 전투복을 가져갈 구실도 생기고 선배한테 수영복을 보여준다는 목적은 달성할 수 있으니까요」"

[[dialogue]]
speaker = "リーリア"
original = "「ネビュラの方には私が話を通しておきますので、そちらはセンパイがお願いしますね」"
translation = "「네뷸라 쪽에는 제가 말을 맞춰둘 테니 그쪽은 선배가 부탁드려요」"

[[dialogue]]
speaker = "リーリア"
original = "「それじゃセンパイ、また連絡しま～す♪」"
translation = "「그럼 선배, 나중에 연락할게요~♪」"

[[dialogue]]
speaker = "unk"
original = "と、そんな経緯で突如、ネビュラの皆さんを招いての打ち上げ会が開かれることになったのだった。"
translation = "그리하여 그런 경위로 갑작스럽게 네뷸라 여러분을 초대한 뒤풀이 모임이 열리게 된 것이었다."

