[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「ふへ～……現役時代の戦いより大変だったかも……」"
translation = "「후헤~…… 현역 시절 전투보다 더 힘들었던 것 같아……」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁ、はぁ……だけどあたしたちの勝ちだ！」"
translation = "「하아, 하아…… 하지만 우리들의 승리다!」"

[[dialogue]]
speaker = "ラクシャ"
original = "「んん……？\u3000何が、起きて……」"
translation = "「음……? 무슨 일이, 일어난……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「環ちゃん！\u3000先生が助けに来たよ！」"
translation = "「타마키 짱! 선생님이 구하러 왔어!」"

[[dialogue]]
speaker = "ラクシャ"
original = "「タマキって……誰？」"
translation = "「타마키라니…… 누구?」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「へ──？」"
translation = "「헤──?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あ、ラクシャが塔に戻ったようです」"
translation = "「아, 라크샤가 탑으로 돌아간 모양이네요」"

[[dialogue]]
speaker = "ユウリ"
original = "「新星学園の環がラクシャ……じゃなかったのか？\u3000どうなってんだ？」"
translation = "「신성학원의 타마키가 라크샤……가 아니었던 거임? 어떻게 된 거임?」"

[[dialogue]]
speaker = "セーラ"
original = "「聞きたいことは聞けずじまいで、謎が深まった感じだね」"
translation = "「묻고 싶은 건 듣지도 못하고 수수께끼만 깊어진 느낌이네」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「それにラクシャは本来の姿ではありませんでした。何者かによって力を奪われているのかもしれません。世界を維持するだけの権能は残っているみたいですが……」"
translation = "「게다가 라크샤는 본래의 모습이 아니었습니다. 누군가에게 힘을 빼앗기고 있는 것일지도 몰라요. 세계를 유지할 정도의 권능은 남아있는 것 같습니다만……」"

[[dialogue]]
speaker = "セーラ"
original = "「じゃあほんとはもっと強かったってこと？\u3000そういう意味では助かったかもしんないけど」"
translation = "「그럼 원래는 훨씬 더 강했다는 거네? 그런 의미에선 다행일지도 모르겠지만」"

[[dialogue]]
speaker = "ユウリ"
original = "「あ～も～わかんね～。なんでラクシャだけ他の守護天使と違うところが多いんだ？」"
translation = "「아~ 증말 모르겠네~. 왜 라크샤만 다른 수호천사랑 다른 점이 많은 거임?」"

[[dialogue]]
speaker = "セーラ"
original = "「ま、しゃーない。その辺の解明はまたの機会だねー」"
translation = "「뭐, 어쩔 수 없지. 그 부분의 해명은 다음 기회에 하자고~」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「では……トワちゃん先生、どうぞ」"
translation = "「그럼…… 토와짱 선생님, 자요」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「？\u3000腕を広げてどうしたの？」"
translation = "「? 팔을 벌리고 왜 그래?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ママダレナが抱き締めてあげますよ～」"
translation = "「마마달레나가 꼭 안아줄게요~」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「ハッ──！\u3000いやでも大人として、こんなちっちゃい子に甘えるわけには……」"
translation = "「핫──! 아니 그래도 어른으로서 이런 꼬마 아이한테 어리광 부릴 수는……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「ママ～っ」"
translation = "「마마~~앗」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「よしよし」"
translation = "「착하다 착해」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
original = "「あ……社会人のストレスが癒される……人としてダメになりそう……」"
translation = "「아…… 사회인의 스트레스가 치유돼…… 인간으로서 망가질 것 같아……」"

[[dialogue]]
speaker = "キリカ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "マリオン"
original = "「キリカさん。あなたの溜飲が下がらないのであれば、いつでもお相手しますよ」"
translation = "「키리카 씨. 억울함이 풀리지 않는다면 언제든 상대해 드리죠」"

[[dialogue]]
speaker = "キリカ"
original = "「……いえ、その必要はありません。感情を律するのは己ですべきことですから」"
translation = "「……아뇨, 그럴 필요는 없습니다. 감정을 다스리는 것은 스스로 해야 할 일이니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「しかしまたお嬢様の前に立ちふさがるのなら、私がこの拳で砕きます」"
translation = "「하지만 또다시 아가씨의 앞길을 막는다면 제가 이 주먹으로 부숴버리겠습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ。肝に銘じておきます」"
translation = "「후후. 명심해 두죠」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ……人間界に帰ってもどうせ売り切れよね、ロールケーキ……これで何回目かしら」"
translation = "「하아…… 인간계로 돌아가 봤자 어차피 매진이겠지, 롤케이크…… 벌써 몇 번째일까」"

[[dialogue]]
speaker = "キリカ"
original = "「未練がましいのはみっともないですよ、ウィステリア。ロールケーキくらいでよければ私が作ってあげます」"
translation = "「미련하게 구는 건 보기 흉해요, 위스테리아. 롤케이크 정도라면 제가 만들어 드릴게요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いいの！？\u3000やった～！」"
translation = "「정말!? 만세~!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ふふ、やっぱり仲良いじゃない♪」"
translation = "「후후, 역시 사이좋잖아♪」"

