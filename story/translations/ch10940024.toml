[[dialogue]]
speaker = "unk"
original = "第４話,必勝の舞鶴、その極意,P"
translation = "제4화, 필승의 마이즈루, 그 극의, P"

[[dialogue]]
speaker = "美鶴"
original = "「お、また新星の勝ちじゃん。おめでとー。ウチの運動部ってめちゃ強いね」"
translation = "「오, 또 신성팀이 이겼네. 축하해ー. 우리 운동부는 엄청 강하네」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ううん、ここまで強くはなかったはずなんだけど……美鶴ちゃんが応援した試合って絶対に勝つんだよね」"
translation = "「아니, 이렇게까지 강하지는 않았을 텐데…… 미츠루짱이 응원한 시합은 절대로 이기더라」"

[[dialogue]]
speaker = "美鶴"
original = "「いやいや絶対はないでしょ。負け試合だって何回かは……あれ？\u3000見たことないね」"
translation = "「아니아니 절대는 없잖아. 진 시합도 몇 번은…… 어라? 본 적 없네」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でしょー？\u3000美鶴ちゃんは勝利の女神様なんだよ。陰で『必勝の舞鶴』なんて呼んでる人もいるんだから」"
translation = "「그렇지ー? 미츠루짱은 승리의 여신님이야. 뒤에서 『필승의 마이즈루』라고 부르는 사람도 있다니까」"

[[dialogue]]
speaker = "美鶴"
original = "「なんそれ。うちの知らんとこで二つ名がついてる。カッコよ」"
translation = "「뭐야 그거. 내가 모르는 사이에 별명이 붙었네. 멋지다」"

[[dialogue]]
speaker = "美鶴"
original = "「そーいったわけでね、ここんとこ、うちは応援団に引っ張りだこだったってワケ」"
translation = "「그래서 말인데, 요즘 나는 응원단에 엄청 불려 다녔다는 거지」"

[[dialogue]]
speaker = "美鶴"
original = "「勝利の女神なんて持ち上げられてもね。そんなん、たまたま──」"
translation = "「승리의 여신이라고 치켜세워져도 말이야. 그런 건 우연히──」"

[[dialogue]]
speaker = "美鶴"
original = "「でもないかもね。会長さん、必勝の極意、教えてあげよっか」"
translation = "「도 아닐지도 모르겠네. 회장군, 필승의 극의, 알려줄까」"

[[dialogue]]
speaker = "unk"
original = "なんでもするから教えて！"
translation = "뭐든지 할 테니 알려줘!"

[[dialogue]]
speaker = "unk"
original = "極意！？\u3000知りたい！"
translation = "극의!? 알고 싶어!"

[[dialogue]]
speaker = "美鶴"
original = "「そんなに食いつくんだ。ふうん、なんでも……なんでもねー」"
translation = "「그렇게 달려드는구나. 흐음, 뭐든지…… 뭐든지라」"

[[dialogue]]
speaker = "美鶴"
original = "「そこまでいうなら、会長さんにだけ特別に教えてあげよっかな」"
translation = "「그렇게까지 말한다면, 회장군에게만 특별히 알려줄까」"

[[dialogue]]
speaker = "美鶴"
original = "「とりあえずさ、チアガールの気持ちを理解するのが大事だから、会長さんもチアガールになってみるといいよ」"
translation = "「일단 말이야, 치어걸의 마음을 이해하는 게 중요하니까, 회장군도 치어걸이 되어보는 게 좋을 거야」"

[[dialogue]]
speaker = "美鶴"
original = "「というわけで。はい、会長さん用のチアガール衣装」"
translation = "「그래서 말인데. 자, 회장군용 치어걸 의상」"

[[dialogue]]
speaker = "unk"
original = "しかもチアガール！？"
translation = "게다가 치어걸!?"

[[dialogue]]
speaker = "unk"
original = "なんで俺用！？"
translation = "왜 나를 위한 거!?"

[[dialogue]]
speaker = "美鶴"
original = "「こんなこともあろうかと作っといた」"
translation = "「이런 일도 있을까 봐 만들어 뒀지」"

[[dialogue]]
speaker = "美鶴"
original = "「前に言わなかったっけ。うち、暇な時には会長さんに着せたい衣装作ってるからさ」"
translation = "「전에 말 안 했나? 나는 한가할 때 회장군에게 입히고 싶은 의상을 만들고 있으니까」"

[[dialogue]]
speaker = "美鶴"
original = "「うちのクローゼットに眠ってる会長さん用の服、まだまだこんなもんじゃないよ」"
translation = "「내 옷장에 잠들어 있는 회장군용 옷, 아직도 이 정도가 아니라고」"

[[dialogue]]
speaker = "美鶴"
original = "「これ着てくれたら、うちの極意、教えてあげる」"
translation = "「이거 입어주면, 나의 극의, 알려줄게」"

[[dialogue]]
speaker = "unk"
original = "なんでもすると言った以上引っ込みがつかない。美鶴が持ってきた衣装に着替える。"
translation = "뭐든지 한다고 말한 이상 물러설 수 없다. 미츠루가 가져온 의상으로 갈아입는다."

[[dialogue]]
speaker = "美鶴"
original = "「ホントに着てくれたんだ。うんうん、やっぱ会長さんは女物でも似合うね。めちゃかわー」"
translation = "「정말로 입어줬네. 응응, 역시 회장군은 여자 옷도 잘 어울려. 엄청 귀여워ー」"

[[dialogue]]
speaker = "美鶴"
original = "「チア衣装に袖通して、どんな気持ち？\u3000人を応援したい気持ち、湧いてこない？」"
translation = "「치어 의상을 입으니, 어떤 기분이야? 사람을 응원하고 싶은 마음, 솟아나지 않아?」"

[[dialogue]]
speaker = "美鶴"
original = "「ほら、言ってみよ。試しにうちを応援すんの。『がんばれ、がんばれ、み・つ・る<emoji=heart04>』って」"
translation = "「자, 말해봐. 시험 삼아 나를 응원하는 거야. 『힘내라, 힘내라, 미・츠・루<emoji=heart04>』라고」"

[[dialogue]]
speaker = "美鶴"
original = "「ほらほら、恥ずかしがってないでー。気持ちが籠ってないよー。そんなんじゃバフかかんないってば」"
translation = "「자자, 부끄러워하지 말고ー. 마음이 담겨 있지 않잖아ー. 그래선 버프 안 걸린다고」"

[[dialogue]]
speaker = "美鶴"
original = "「縮こまって動きが小さいのもよくないよね。うちらが星霊祭の時にやってたみたいにさ」"
translation = "「움츠러들어서 움직임이 작은 것도 안 좋지. 우리가 성령제 때 했던 것처럼 말이야」"

[[dialogue]]
speaker = "美鶴"
original = "「ほらほら、もっと足上げて。ワンツー、ワンツー」"
translation = "「자자, 다리 더 올려. 원투, 원투」"

[[dialogue]]
speaker = "美鶴"
original = "「アンスコはいてるんだから恥ずかしがらない。チアガールはみんな脚広げてるんだから」"
translation = "「속바지 입고 있으니까 부끄러워하지 마. 치어걸은 모두 다리를 벌리고 있으니까」"

[[dialogue]]
speaker = "美鶴"
original = "「ほら、うちに続いて。プリーズ・リピート・アフター・ミー。『大好き、大好き、み・つ・る』」"
translation = "「자, 나를 따라 해봐. 플리즈 리피트 애프터 미. 『좋아해, 좋아해, 미・츠・루』」"

[[dialogue]]
speaker = "unk"
original = "ドサクサ紛れに何言わそうとしてんの！？"
translation = "혼란을 틈타 무슨 말을 시키려는 거야!?"

[[dialogue]]
speaker = "unk"
original = "大好き、大好き……"
translation = "좋아해, 좋아해……"

[[dialogue]]
speaker = "美鶴"
original = "「ちぇ、バレた」"
translation = "「쳇, 들켰네」"

[[dialogue]]
speaker = "美鶴"
original = "「じゃ、うちは会長さんを応援するから、会長さんはうちを応援して」"
translation = "「그럼, 나는 회장군을 응원할 테니까, 회장군은 나를 응원해」"

[[dialogue]]
speaker = "美鶴"
original = "「目の前に同じカッコしてる人がいれば、恥ずかしいのも薄れるでしょ」"
translation = "「눈앞에 같은 옷을 입은 사람이 있으면, 부끄러움도 덜하잖아」"

[[dialogue]]
speaker = "美鶴"
original = "「フレー、フレー、会長さーん。がんばれ、がんばれ、会長さーん」"
translation = "「프레이, 프레이, 회장군ー. 힘내라, 힘내라, 회장군ー」"

[[dialogue]]
speaker = "unk"
original = "美鶴の言う通りにチアガールの真似をしている内に、自然と羞恥心は薄れていった。"
translation = "미츠루가 말하는 대로 치어걸 흉내를 내는 동안, 자연스럽게 수치심은 옅어졌다."

[[dialogue]]
speaker = "美鶴"
original = "「うんうん、いいカンジ。だんだんと気持ちが入ってきたね」"
translation = "「응응, 좋은 느낌. 점점 마음이 담기기 시작했네」"

[[dialogue]]
speaker = "unk"
original = "応援の極意は！？"
translation = "응원의 극의는!?"

[[dialogue]]
speaker = "unk"
original = "何か忘れてるような……"
translation = "뭔가 잊고 있는 듯한데……"

[[dialogue]]
speaker = "美鶴"
original = "「ちぇ、思い出しちゃった」"
translation = "「쳇, 기억해 버렸네」"

[[dialogue]]
speaker = "美鶴"
original = "「てかさ、極意なんてあるわけないじゃん。うちが応援に行った時にたまたま勝ってるだけだよ。単なる偶然」"
translation = "「랄까, 극의 같은 게 있을 리 없잖아. 내가 응원하러 갔을 때 우연히 이기고 있는 것뿐이야. 단순한 우연」"

[[dialogue]]
speaker = "unk"
original = "これを着せるための口実かーっ！"
translation = "이걸 입히기 위한 구실이었나!"

[[dialogue]]
speaker = "unk"
original = "騙されたーっ！？"
translation = "속았어!?"

[[dialogue]]
speaker = "美鶴"
original = "「やっと気づいたんだ。ふふ、おもしろ」"
translation = "「이제야 눈치챘네. 후후, 재밌어」"

[[dialogue]]
speaker = "美鶴"
original = "「うち１人の応援だけで、試合が左右されるとかありえないって。本物の神様じゃないんだからさ」"
translation = "「나 혼자만의 응원으로 시합이 좌우된다는 건 있을 수 없잖아. 진짜 신이 아니니까」"

[[dialogue]]
speaker = "美鶴"
original = "「試合で勝ててるのは、みんなが努力してる結果。うちはチアで踊ってるだけ」"
translation = "「시합에서 이기는 건, 모두가 노력한 결과. 나는 치어로 춤추고 있을 뿐」"

[[dialogue]]
speaker = "美鶴"
original = "「うちみたいなやる気なし子さんの気まぐれで勝ち負けが決まっちゃったらさ、そりゃ努力に対する冒涜ってもんでしょ」"
translation = "「나 같은 의욕 없는 애의 변덕으로 승패가 결정된다면, 그건 노력에 대한 모독이잖아」"

[[dialogue]]
speaker = "美鶴"
original = "「ま、うちが応援に行った方がジンクスだとかで盛り上がるみたいだし？\u3000しばらくは『必勝の舞鶴』様を演じるけどね」"
translation = "「뭐, 내가 응원하러 간 쪽이 징크스라면서 분위기가 달아오르는 것 같으니까? 당분간은 『필승의 마이즈루』님을 연기하겠지만」"

[[dialogue]]
speaker = "美鶴"
original = "「でも、うちより会長さんの応援の方が、みんなやる気出すんじゃない？\u3000さっきの会長さんの応援、ビビッて来たよ」"
translation = "「하지만, 나보다 회장군의 응원이 모두에게 더 의욕을 북돋아 주지 않을까? 아까 회장군의 응원, 짜릿했어」"

[[dialogue]]
speaker = "unk"
original = "たっぷり気持ちをこめてます"
translation = "마음을 듬뿍 담았으니까"

[[dialogue]]
speaker = "unk"
original = "美鶴だけのスペシャル応援だからね"
translation = "미츠루만을 위한 스페셜 응원이니까"

[[dialogue]]
speaker = "美鶴"
original = "「っ……！？\u3000そーゆーの目ぇ見てまっすぐ言うのズルだから！」"
translation = "「윽……!? 그런 거 눈 보면서 똑바로 말하는 건 반칙이니까!」"

[[dialogue]]
speaker = "美鶴"
original = "「結局、好きな人からもらう応援が、一番やる気出るってことだよね……」"
translation = "「결국, 좋아하는 사람에게 받는 응원이, 가장 의욕이 생긴다는 거겠지……」"

[[dialogue]]
speaker = "美鶴"
original = "「会長さんに応援されると、めちゃドキドキするしさ。今ならなんでもやれそうな気ぃするよ」"
translation = "「회장군에게 응원받으면, 엄청 두근거리고 말이야. 지금이라면 뭐든지 할 수 있을 것 같은 기분이 들어」"

[[dialogue]]
speaker = "unk"
original = "俺も美鶴からのスペシャル応援欲しいな"
translation = "나도 미츠루의 스페셜 응원 받고 싶네"

[[dialogue]]
speaker = "美鶴"
original = "「えー……んなこと口にしたら、うち、絶対に止まんなくなるんだけど……責任取ってくれんの……？」"
translation = "「에ー…… 그런 말을 입 밖에 내면, 나, 절대로 멈출 수 없게 되는데…… 책임져 줄 거야……?」"

[[dialogue]]
speaker = "美鶴"
original = "「──あ、そう。言ったね？\u3000どうなっても知らないよ」"
translation = "「──아, 그래. 말했지? 어떻게 돼도 모른다」"

[[dialogue]]
speaker = "美鶴"
original = "「んじゃ、目ぇ見ながらだと恥ずいから……」"
translation = "「그럼, 눈 보면서 하면 부끄러우니까……」"

[[dialogue]]
speaker = "unk"
original = "距離を詰めた美鶴は、俺の耳元に唇を添える。"
translation = "거리를 좁힌 미츠루는, 내 귓가에 입술을 갖다 댄다."

[[dialogue]]
speaker = "美鶴"
original = "「好き好き、か・い・ちょ<emoji=heart04>\u3000だぁい好き<emoji=heart04>」"
translation = "「좋아해 좋아해, 회・장<emoji=heart04> 너어무 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い媚薬のような言葉を注がれた直後、両肩を掴まれて。"
translation = "달콤한 최음제 같은 말을 들은 직후, 양 어깨를 붙잡히고."

[[dialogue]]
speaker = "美鶴"
original = "「えいっ<emoji=heart04>」"
translation = "「에잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その勢いのままに押し倒されたのだった──"
translation = "그 기세 그대로 밀쳐 넘어뜨려졌던 것이다──"

