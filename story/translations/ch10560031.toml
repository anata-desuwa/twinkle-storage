[[dialogue]]
speaker = "unk"
original = "第１話,アムの仲良しコミュニケーション,P"
translation = "제1화, 아무의 사이좋은 커뮤니케이션, P"

[[dialogue]]
speaker = "unk"
original = "それはクリスマス前に、アムとナミエルがクリスマスフォームの不思議な力によって、物理的に離れられない状態になってしまっていた初日のこと。"
translation = "그것은 크리스마스 전에 아무와 나미엘이 크리스마스 폼의 신기한 힘에 의해 물리적으로 떨어질 수 없는 상태가 되어버렸던 첫날의 일."

[[dialogue]]
speaker = "unk"
original = "アムは、附属校１年のナミエルの所属する１年Ｃ組で一緒に授業を受けた後、集まってきたクラスメイトたちに挨拶をしていた。"
translation = "아무는 부속교 1학년인 나미엘이 소속된 1학년 C반에서 함께 수업을 받은 뒤, 모여든 클래스메이트들에게 인사를 하고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――というわけで、しばらくあたし、ナミエルと二人三脚状態で、授業を受けることになりそうなんだ」"
translation = "「──그런 이유로, 당분간 나, 나미엘이랑 2인 3각 상태로 수업을 받게 될 것 같아.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「原因はまだわかっていませんが、解決しなければならない問題であることは間違いありません」"
translation = "「원인은 아직 밝혀지지 않았습니다만, 해결해야 할 문제임에는 틀림없습니다.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「変身状態が解除できない上に、１メートル以上離れられないなんて、なんだかすごく面白そうなことになっているのだ！」"
translation = "「변신 상태가 해제되지 않는 데다 1미터 이상 떨어질 수 없다니, 왠지 굉장히 재밌는 상황이 되어가고 있는 것이다!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「冬の精霊が記憶喪失とは、セシアの時を思い出しますね～。もし私たちに協力できることがあれば、遠慮なく仰って下さいね♪」"
translation = "「겨울의 정령이 기억상실이라니, 세시아 때가 생각나네요~. 혹시 저희가 협력할 수 있는 일이 있다면 사양 말고 말씀해 주세요♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うんっ、ありがとうね、ママダレナ！\u3000アルモたんも、今日からよろしくね♪」"
translation = "「응, 고마워 마마달레나! 알모 탄도 오늘부터 잘 부탁해♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「よろしくなのだ、アム！\u3000アルモたん的には、クラスの新しい仲間が増えて嬉しいのだ♪」"
translation = "「잘 부탁하는 것이다, 아무! 알모 탄 입장에서는 반에 새로운 동료가 늘어서 기쁜 것이다♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「――そうだ！\u3000せっかく仲良くなれる機会だし、みんなで『ドッジボール』しない？\u3000みんなで仲良くなるには、一緒に遊ぶのが手っ取り早いからね♪」"
translation = "그렇게 그날 밤은 기진맥진할 때까지 성의 6시간이 어떤 것인지 클라우디아에게 철저하게 가르쳐 주었던 것이었다."

[[dialogue]]
speaker = "unk"
original = "そんなわけで、戦闘訓練も兼ねたドッジボールが、放課後に開催されることになった。"
translation = "제2화, 아무의 사이좋은 커뮤니케이션, P"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「よ～し、行っくぞ～！\u3000とりゃあっ！」"
translation = "그것은 크리스마스 전에 아무와 나미엘이 크리스마스 폼의 신기한 힘에 의해 물리적으로 떨어질 수 없는 상태가 되어버렸던 첫날의 일."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ボールをキャ～ッチ、なのだ！」"
translation = "아무는 부속교 1학년인 나미엘이 소속된 1학년 C반에서 함께 수업을 받은 뒤, 모여든 클래스메이트들에게 인사를 하고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おっ、やるね～、アルモたん♪」"
translation = "「──그런 이유로, 당분간 나, 나미엘이랑 2인 3각 상태로 수업을 받게 될 것 같아.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへっ、そう簡単にはやられないのだ！」"
translation = "「원인은 아직 밝혀지지 않았습니다만, 해결해야 할 문제임에는 틀림없습니다.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「アムさんもドッジボールお上手ですね～。スポーツは得意なんですか？」"
translation = "「변신 상태가 해제되지 않는 데다 1미터 이상 떨어질 수 없다니, 왠지 굉장히 재밌는 상황이 되어가고 있는 것이다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えへへっ、まあね～。あたし、昔から運動神経には自信があるんだ！」"
translation = "「겨울의 정령이 기억상실이라니, 세시아 때가 생각나네요~. 혹시 저희가 협력할 수 있는 일이 있다면 사양 말고 말씀해 주세요♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あの……アム先輩、ちょっといいでしょうか？」"
translation = "「응, 고마워 마마달레나! 알모 탄도 오늘부터 잘 부탁해♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん？\u3000どうしたの、ナミエル？」"
translation = "「잘 부탁하는 것이다, 아무! 알모 탄 입장에서는 반에 새로운 동료가 늘어서 기쁜 것이다♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私たちが現状二人三脚状態といっても、わざわざ<b>手を繋ぐ</b>必要はないんじゃ……」"
translation = "「──맞다! 어렵게 친해질 기회가 생겼으니 다 같이 『피구』 하지 않을래? 다들 친해지는 데는 같이 노는 게 제일 빠르니까♪」"

[[dialogue]]
speaker = "unk"
original = "２人は現在、アムの提案で、手を繋いだ状態でドッジボールをしていた。"
translation = "그런 이유로 전투 훈련을 겸한 피구가 방과 후에 개최되게 되었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「それはほら、もしかすると、あたしたちが今の状態のまま、モンスターが出現して、戦うことになったりするかもしれないじゃない？」"
translation = "「조~아, 간드아~! 에잇!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「その時にちゃんと戦えなくて、大切なものを守れなくて、後悔したくないからさ」"
translation = "「공을 캐~치, 인 것이다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「だから、その訓練も兼ねて、まずは手を繋いだ状態で『１メートルしか離れられない』っていう制限の距離感を掴んでおきたいと思ってね」"
translation = "「오, 제법인데~, 알모 탄♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「アム先輩……星騎士としては、本当に真面目ですよね」"
translation = "「에헤헷, 그렇게 쉽게 당하지 않는 것이다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん♪\u3000あたしは本気で、世界を守れる最強の星騎士を目指しているからね！」"
translation = "「아무 씨도 피구 실력이 좋으시네요~. 스포츠를 잘하시나요?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「そういえば、気になっていたのですが、ドッジボールを選んだのは何か理由があったりするのでしょうか？」"
translation = "「에헤헷, 뭐 그렇지~. 나, 옛날부터 운동신경에는 자신 있거든!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ん？\u3000ああ、それはね～。あたしが附属校の前に通っていた学校で、転校生の子がやってきたことがあってさ」"
translation = "「저기…… 아무 선배, 잠깐 괜찮을까요?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「その子は口数が少ない子で、なかなかクラスに馴染めずにいたんだけど……」"
translation = "「응? 왜 그래, 나미엘?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「当時は休み時間にドッジボールをするのが流行ってて、どうにかその子と仲良くなれないかな～って思って、試しに『みんなでドッジしよう！』って誘ったんだ」"
translation = "「우리가 현재 2인 3각 상태라고는 해도, 굳이 <ruby>손을 잡을<rt>・・ ・・</rt></ruby> 필요는 없지 않을까 해서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そしたらさ、不思議なんだけど……普通に話そうとしても上手く行かなかったのに、ボールを投げ合って遊んでいたら、自然と仲良くなれたんだよね」"
translation = "두 사람은 현재 아무의 제안으로 손을 잡은 상태로 피구를 하고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「後からその子に聞いたら、上手く喋れなくても、一緒にドッジボールをしていたら、周りの子たちが優しくて悪い子じゃないって、なんとなく感じたんだってさ」"
translation = "「그건 말야, 혹시라도 우리가 지금 이 상태 그대로 몬스터가 나타나서 싸우게 될지도 모르잖아?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「その経験があったから、ライバルのエルゼとも、附属３年で初めて同じクラスになって知り合った時に、ドッジボールをしようってあたしが誘ってさ」"
translation = "「그때 제대로 싸우지 못해서 소중한 걸 지키지 못해 후회하고 싶지 않으니까 말이야.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「最後、１対１で内野に残るまで戦って、それでお互いに『コイツ、できる……！』って感じになって、ライバルとして仲良くなったんだよね～」"
translation = "「그러니까 그 훈련도 겸해서, 우선 손을 잡은 상태에서 『1미터밖에 떨어질 수 없다』는 제한적인 거리감을 익혀두고 싶어서.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「なるほど。アムさんにとって、ドッジボールは思い入れのあるスポーツなんですね」"
translation = "「아무 선배…… 성기사로서는 정말 진지하시네요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん♪\u3000ドッジボールはめっちゃ好きだよ！」"
translation = "「응♪ 난 진심으로 세계를 지킬 수 있는 최강의 성기사를 목표로 하고 있으니까!」"

[[dialogue]]
speaker = "unk"
original = "それから１時間程、ドッジボールで勝った負けたと遊び続けて――"
translation = "「그러고 보니 궁금했습니다만, 피구를 고르신 데는 무슨 이유라도 있나요?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「負けちゃったのだ～！」"
translation = "「응? 아아, 그건 말이지~. 내가 부속교 이전에 다니던 학교에서 전학생 친구가 온 적이 있었거든.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「アルモ、残念でしたね～、よしよし♪」"
translation = "「그 애는 말수가 적은 애라서 좀처럼 반에 적응하지 못하고 있었는데……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「いっぱい動き回ったから、お腹が空いたのだ～」"
translation = "「당시엔 쉬는 시간에 피구를 하는 게 유행이라서, 어떻게든 그 애랑 친해질 수 없을까 생각하다가 시험 삼아 『다 같이 피구 하자!』라고 권유했어.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふぅ……なんとか今度は、最後まで残ることができましたね」"
translation = "「그랬더니 말야, 신기하게도…… 그냥 대화하려고 할 때는 잘 안 됐는데, 공을 주고받으며 노니까 자연스럽게 친해질 수 있었어.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いぇ～い♪\u3000ナイスコンビネーション！\u3000上手く行ったね♪」"
translation = "「나중에 그 애한테 물어보니까, 말을 잘 못 해도 같이 피구를 하니까 주변 애들이 다정하고 나쁜 애들이 아니라는 게 왠지 모르게 느껴졌대.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ま、まあ……。しかし、アム先輩、やはりすごいですね。一緒に戦ってみて、星騎士としての実力を感じました」"
translation = "「그 경험이 있어서 라이벌인 엘제와도 부속교 3학년 때 처음 같은 반이 되어 알게 됐을 때 피구 하자고 내가 꼬셨거든.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふふふっ、そうでしょ～？」"
translation = "「마지막에 1대 1로 내야에 남을 때까지 싸우고, 그러면서 서로 『이 녀석, 제법인데……!』 같은 느낌이 들어서 라이벌로서 친해졌지~」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でも、ナミエルもすごい戦えるじゃん！\u3000あたし、これからもっと仲良くなりたいって思ったよ♪」"
translation = "「그렇군요. 아무 씨에게 피구는 추억이 깊은 스포츠네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「仲良く……そ、そうですか」"
translation = "「응♪ 피구 엄청 좋아해!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「とりあえずナミエル、勝利のハイタッチしよっ♪」"
translation = "그로부터 1시간 정도 피구로 이겼다 졌다 하며 계속 놀다가──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え？\u3000は、はい……！」"
translation = "「져버린 것이다~!」"

[[dialogue]]
speaker = "unk"
original = "少し気恥ずかしさを感じながらもナミエルが手の平を上に差し出すと、アムは笑顔を浮かべながら、元気にハイタッチを交わすのだった。"
translation = "「알모, 아쉽게 됐네요~, 착하지 착해♪」"

