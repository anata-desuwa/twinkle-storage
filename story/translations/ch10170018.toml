[[dialogue]]
speaker = "unk"
original = "蛍火と恋人になってからしばらく経ったある日のこと──"
translation = "호타루비와 연인이 되고 나서 얼마간의 시간이 흐른 어느 날──"

[[dialogue]]
speaker = "unk"
original = "母さんが用事で、数日家を空けることになった。"
translation = "어머니가 볼일이 있어, 며칠간 집을 비우게 되었다."

[[dialogue]]
speaker = "unk"
original = "その間、母さんに頼まれた蛍火が、朝食や夕食を作りに家へ来てくれていたのだが……"
translation = "그동안 어머니의 부탁을 받은 호타루비가 아침과 저녁을 만들러 집으로 와주고 있었는데……"

[[dialogue]]
speaker = "unk"
original = "その日の夜は、蛍火の様子が明らかにおかしかった。"
translation = "그날 밤은 호타루비의 상태가 명백히 이상했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何故に裸エプロン！？」"
translation = "「어째서 알몸 에이프런이야!?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あんっ、師匠！\u3000いけません<emoji=heart04>\u3000ここはキッチンで、エッチなことをする場所では……！」"
translation = "「앙, 스승님! 안 돼요<emoji=heart04> 여기는 주방이라서, 야한 짓을 하는 장소는……!」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言いながらも、大きなおっぱいをパイスラで見せてつけてくるその姿は、明らかに誘っているもので──"
translation = "그런 말을 하면서도, 커다란 가슴을 앞치마 사이로 과시하는 그 모습은 명백히 유혹하는 것이었고──"

[[dialogue]]
speaker = "unk"
original = "性欲盛んな男子としては我慢できるまでもなく、蛍火に誘われるまま、その魅力的な体に飛びついてしまう。"
translation = "성욕 왕성한 남자로서 참을 수 있을 리 만무하여, 호타루비가 유혹하는 대로 그 매력적인 몸에 달려들고 만다."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あんっ<emoji=heart04>\u3000……師匠っ。おっぱいを揉む手が、いやらしい、です……っ。んあっ……はああっ……んんぅ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> ……스승님. 가슴을 주무르는 손이, 야해요……윽. 응앗……하아아……음으으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はぁぁっ……んっ、エプロンはだけて……あんっ、おっぱい、見えちゃってます……はぁんっ<emoji=heart04>」"
translation = "「하아아……윽, 에이프런이 흐트러져서……앙, 가슴, 다 보여요……하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、師匠、乳首吸っちゃ……あぁんっ！\u3000そんなに吸っても、まだ母乳は出ませんよ？<emoji=heart04>\u3000はぁ、出ませんからぁ……ふあぁぁんっ」"
translation = "「앗, 스승님, 유두 빨면……아앙! 그렇게 빨아도, 아직 모유는 안 나온다고요?<emoji=heart04> 하아, 안 나오니까아……후아아앙」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「って……思わず飛びついちゃったけど、どうしていきなり裸エプロンなんて？」"
translation = "「그건 그렇고…… 얼떨결에 덮치긴 했지만, 왜 갑자기 알몸 에이프런이야?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「んはぁ<emoji=heart04>\u3000そ、それは……いつもエッチは、緊張モード、だったので……」"
translation = "「응하아<emoji=heart04> 그, 그건…… 항상 섹스는, 긴장 모드, 였으니까……」"

[[dialogue]]
speaker = "unk"
original = "蛍火は友達１００人計画を通して、ある程度『緊張モード』と『リラックスモード』の性格切り替えが、自分の意思で出来るようになっていた。"
translation = "호타루비는 친구 100명 계획을 통해, 어느 정도 『긴장 모드』와 『릴랙스 모드』의 성격 전환을 스스로의 의지로 할 수 있게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "……そして、俺たちがエッチをするは、確かに緊張モードの蛍火が積極的に求めてきてくれるのが、お決まりのパターンになっていた。"
translation = "……그리고, 우리가 섹스를 할 때는 확실히 긴장 모드인 호타루비가 적극적으로 요구해 오는 것이 정해진 패턴이었다."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「んっ<emoji=heart04>\u3000ですが師匠は、攻められるばかりではなく……本当は自分から、攻めたがっているのではないかと、感じまして……」"
translation = "「응<emoji=heart04> 하지만 스승님은, 당하기만 하는 게 아니라…… 사실은 스스로, 덮치고 싶어 하는 게 아닐까 하고, 느껴서……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あんっ<emoji=heart04>\u3000リラックスモードの状態で、裸エプロンを着てくれば……はぁぁ<emoji=heart04>\u3000師匠が襲ってきて、くれるのではないかと……んふぁ、ああんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 릴랙스 모드 상태에서, 알몸 에이프런을 입고 오면…… 하아아<emoji=heart04> 스승님이 덮쳐주지 않을까 하고…… 응화, 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、あっ、ふあぁっ<emoji=heart04>\u3000し、師匠っ。おっぱいをそんなに強く、揉んだらぁ……はぁっ<emoji=heart04>\u3000形が変わっちゃい、ますぅ！\u3000はああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 후아앗<emoji=heart04> 스, 스승님. 가슴을 그렇게 세게, 주무르면…… 하앗<emoji=heart04> 모양이 변해버려요오! 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「んんっ、あっ……<emoji=heart04>\u3000そ、それに、お、おち○ぽが、私のおま○こに、当たって……っ。師匠の、大きくて逞しいおち○ぽが、私の中に入りたがって、いますね……んんっ<emoji=heart04>」"
translation = "「음으, 앗……<emoji=heart04> 그, 게다가, 자, 자지가, 내 보지에, 닿아서……. 스승님의, 크고 늠름한 자지가, 내 안으로 들어오고 싶어 하고, 있네요…… 음으<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はぁっ、はぁっ……先っぽが膣口に、当たって<emoji=heart04>\u3000ぐりぐり、ぐりぐりと……入り口を掻き、まわして……んっ、ふぅぅっ<emoji=heart04>」"
translation = "「하앗, 하앗…… 끝부분이 질 입구에, 닿아서<emoji=heart04> 비비적, 비비적…… 입구를 헤집어, 놓아서…… 응, 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、んんっ<emoji=heart04>\u3000師匠のおち○ぽが……んっ、ふっ<emoji=heart04>\u3000は、入ってきます……ふあああぁぁぁっ<emoji=heart04>」"
translation = "「앗, 음으<emoji=heart04> 스승님의 자지가…… 응, 훗<emoji=heart04> 드, 들어와요…… 후아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「おち○ぽ入って、来たぁっ<emoji=heart04>\u3000ふあぁぁんっ<emoji=heart04>\u3000師匠の、太くて熱ぅい<emoji=heart04>\u3000おち○ぽ、入れるだけで気持ち良い、ですぅ……<emoji=heart04>\u3000んあっ、はあっ、はあっ、ふあああっ<emoji=heart04>」"
translation = "「자지 들어, 왔어어<emoji=heart04> 후아아앙<emoji=heart04> 스승님의, 굵고 뜨거어운<emoji=heart04> 자지, 넣는 것만으로 기분 좋아아여……<emoji=heart04> 응앗, 하앗, 하앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……蛍火、今は新婚さんみたいにっ……師匠じゃなくて、旦那様って呼んでっ」"
translation = "「윽…… 호타루비, 지금은 신혼부부처럼…… 스승님이 아니라, 서방님이라고 불러줘.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「は、はいっ、旦那様っ<emoji=heart04>\u3000旦那様のおち○ぽ<emoji=heart04>\u3000あぁぁぁぁっ<emoji=heart04>\u3000すごぉぉい<emoji=heart04>\u3000……ドキドキ、しますぅぅぅ<emoji=heart04>\u3000新婚のっ、旦那様おち○ぽぉ<emoji=heart04>\u3000んふぅぅぅっ<emoji=heart04>」"
translation = "「네, 네에, 서방님<emoji=heart04> 서방님의 자지<emoji=heart04> 아아아아앗<emoji=heart04> 대단해애애<emoji=heart04> ……두근두근, 거려요오오<emoji=heart04> 신혼의, 서방님 자지이<emoji=heart04> 응후우우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000大きくてカリ高で、おま○こを突き上げてきてっ、はっ、はあっ<emoji=heart04>\u3000気持ち、良いですっ<emoji=heart04>\u3000あっ、あっ、ふあぁっ！」"
translation = "「앗, 앗, 앗<emoji=heart04> 크고 귀두가 높아서, 보지를 찔러 올려와서, 하, 하앗<emoji=heart04> 기분, 좋아요오<emoji=heart04> 앗, 앗, 후아앗!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「んはぁっ、旦那様っ、そこダメっ<emoji=heart04>\u3000じ、Ｇスポット！\u3000あぁんっ、私の気持ち良いところ、旦那様に見抜かれちゃって、ますぅっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「응하앗, 서방님, 거기 안 돼<emoji=heart04> 지, G스팟! 아앙, 나의 기분 좋은 곳, 서방님한테 간파당해 버렸어어어<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……愛してる奥さんのことだから、わかるよっ！」"
translation = "「……사랑하는 아내의 일이니까, 당연히 알지!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「師匠のっ、奥さんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっあっ、あぁんっ<emoji=heart04>\u3000嬉しいっ！\u3000本当はこうやってぇ<emoji=heart04>\u3000あっ、ふあぁっ<emoji=heart04>\u3000旦那様に激しく、求められるのぉ<emoji=heart04>\u3000何度も妄想してたんですぅ<emoji=heart04>」"
translation = "「스승님의, 아내애<emoji=heart04><emoji=heart04><emoji=heart04> 앗앗, 아앙<emoji=heart04> 기뻐요! 사실은 이렇게에<emoji=heart04> 앗, 후아앗<emoji=heart04> 서방님한테 격렬하게, 원해지는 거어<emoji=heart04> 몇 번이나 망상했었어어여<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ぐ、具体的に……ですかぁ？\u3000はぁんっ<emoji=heart04>\u3000そ、それは恥ずかしくて……あ、あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000Ｇスポット、おち○ぽで撫で撫でするの、ダメですぅ……！」"
translation = "「구, 구체적으로…… 인가요오? 하앙<emoji=heart04> 그, 그건 부끄러워서…… 아, 아앙<emoji=heart04> 하아앙<emoji=heart04> G스팟, 자지로 쓰담쓰담 하는 거, 안 돼요오……!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「い、言いますっ<emoji=heart04>\u3000言いますから、許してくださいっ……<emoji=heart04>\u3000ん、はぁっ、旦那様と結婚してぇ……んんっ、本気のこ、子作りセックスを……ふぅぅっ<emoji=heart04>」"
translation = "「마, 말할게요<emoji=heart04> 말할 테니까, 용서해 주세요……<emoji=heart04> 응, 하앗, 서방님과 결혼해서어…… 음으, 본격적인 애, 애 만들기 섹스를…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はぁぁっ……何度も、何度も求められてぇ……<emoji=heart04>\u3000んっ、今みたいに<emoji=heart04>\u3000料理をしている時も、旦那様に襲われて……あぁんっ<emoji=heart04>」"
translation = "「하아아…… 몇 번이고, 몇 번이고 원해져서어……<emoji=heart04> 응, 지금처럼<emoji=heart04> 요리를 하고 있을 때도, 서방님한테 덮쳐져서…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「子宮が一杯になるまで……はぁっ<emoji=heart04>\u3000あっ、あっ、はぁっん<emoji=heart04>\u3000一杯になっても、許して貰えず<emoji=heart04>\u3000一日中種付けされてしまう妄想、してましたぁ<emoji=heart04>\u3000あ、はあっ、ふあぁぁっ<emoji=heart04>」"
translation = "「자궁이 가득 찰 때까지…… 하앗<emoji=heart04> 앗, 앗, 하앗앙<emoji=heart04> 가득 차도, 용서받지 못하고<emoji=heart04> 하루 종일 씨내리기를 당해버리는 망상, 했었어어여<emoji=heart04> 아, 하앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「だ、旦那様のおち○ぽっ、興奮してますっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000奥まで、来たぁ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000あっ、あっ、おま○この奥、ちゅっちゅって、キスしてますぅ<emoji=heart04>\u3000んあぁん<emoji=heart04>」"
translation = "「서, 서방님의 자지이, 흥분해 있어요<emoji=heart04> 하앙<emoji=heart04> 안쪽까지, 왔다아<emoji=heart04> 아앙<emoji=heart04> 앗, 앗, 보지 안쪽, 쪽쪽 하고, 키스하고 있어요오<emoji=heart04> 응아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はぅんっ<emoji=heart04>\u3000そこ、おま○この奥ぅ<emoji=heart04>\u3000ダメダメ、ダメぇ<emoji=heart04>\u3000何度も奥にキスされちゃうと、気持ち良くて<emoji=heart04>\u3000子宮下りて来ちゃいますぅ<emoji=heart04>」"
translation = "「하응<emoji=heart04> 거기, 보지 안쪽으으<emoji=heart04> 안돼안돼, 안돼애<emoji=heart04> 몇 번이나 안쪽에 키스당해 버리면, 기분 좋아서<emoji=heart04> 자궁 내려와 버려요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「旦那様おち○ぽの、熱烈キスぅっ<emoji=heart04>\u3000はぁんっ、凄いのぉっ<emoji=heart04>\u3000おち○ぽ、まだまだ大きくなってぇ<emoji=heart04>\u3000突かれるたび、おま○こメロメロになっちゃってますぅ！\u3000ふああぁん<emoji=heart04>」"
translation = "「서방님 자지의, 열렬한 키스으윽<emoji=heart04> 하앙, 대단해애요오<emoji=heart04> 자지, 점점 더 커져서어<emoji=heart04> 찔릴 때마다, 보지 헤롱헤롱해져 버리고 있어요! 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「蛍火っ！\u3000俺の赤ちゃんを孕んでくれっ！」"
translation = "「호타루비! 내 아기를 임신해 줘!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「師匠っ！？\u3000に、妊娠はまだ、ダメですっ！\u3000星騎士ですし……あっ、ふあっ、んんっ<emoji=heart04>\u3000私たちは、世界の為に戦わなくては、なりませんっ<emoji=heart04>\u3000んっ、はあっ、はあ……っ<emoji=heart04>」"
translation = "「스승님!? 이, 임신은 아직, 안 돼요! 성기사이기도 하고…… 앗, 후앗, 음으<emoji=heart04> 우리는, 세계를 위해 싸워야만, 합니다아<emoji=heart04> 응, 하앗, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「だからそんなっ、私の赤ちゃんのお部屋、ばっかり……攻めちゃ、んはっ<emoji=heart04>\u3000あっ、あっはああっ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000ダメですっ<emoji=heart04>\u3000あっあっ、はあっ、はぅんっ<emoji=heart04>」"
translation = "「그러니까 그런, 내 아기 방, 만…… 공략하면, 응핫<emoji=heart04> 앗, 앗하아아앗<emoji=heart04> 안 돼<emoji=heart04> 안 돼요오<emoji=heart04> 앗앗, 하앗, 하응<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「で、でもぉ……これ、新婚プレイ、なんですよね……<emoji=heart04>\u3000んっ、ふぅぅ<emoji=heart04>\u3000だったら私は、欲しいです<emoji=heart04>\u3000はぁっ、はぁっ、旦那様の赤ちゃん、欲しいですっ<emoji=heart04>」"
translation = "「하, 하지만…… 이거, 신혼 플레이, 인 거죠……<emoji=heart04> 응, 후우우<emoji=heart04> 그렇다면 저는, 갖고 싶어요<emoji=heart04> 하앗, 하앗, 서방님의 아기, 갖고 싶어요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「旦那様の子種で、蛍火を孕ませて<emoji=heart04>\u3000お嫁さんにして、くださいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000旦那様のおち○ぽで、んっ、はぁっ……蛍火のおま○こを、愛で一杯にして下さいませっ<emoji=heart04>」"
translation = "「서방님의 씨앗으로, 호타루비를 임신시켜서<emoji=heart04> 아내로, 삼아주세요오<emoji=heart04> 앙<emoji=heart04> 서방님의 자지로, 응, 하앗…… 호타루비의 보지를, 사랑으로 가득 채워주세요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああっ、蛍火っ。愛してるっ！\u3000一杯そそいでやるからなっ」"
translation = "「아아, 호타루비. 사랑해! 듬뿍 쏟아줄 테니까」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あぁんっ、嬉しいっ<emoji=heart04>\u3000はあっ、ああぁっ<emoji=heart04>\u3000蛍火も心から、師匠を……旦那様のことを、お慕い申し上げておりますっ<emoji=heart04>\u3000あぁぁぁぁぁんっ<emoji=heart04>」"
translation = "「아앙, 기뻐요오<emoji=heart04> 하앗, 아아앗<emoji=heart04> 호타루비도 진심으로, 스승님을…… 서방님을, 연모하고 있습니다아<emoji=heart04> 아아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ん、ふぁっ、はぁんっ<emoji=heart04>\u3000旦那様、どうか蛍火にキスを……ふぅっ、ふぅっ、私の唇に、愛の口づけを、して下さいませぇっ<emoji=heart04>」"
translation = "「응, 화, 하앙<emoji=heart04> 서방님, 제발 호타루비에게 키스를…… 후우, 후우, 제 입술에, 사랑의 입맞춤을, 해주세요오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ちゅっぷ<emoji=heart04>\u3000旦那様、しゅきっ<emoji=heart04>\u3000むちゅるっ、ちゅっ、くちゅるっ……しゅきれすっ<emoji=heart04>\u3000はぁっ、んちゅっ、ちゅぷっ、あふっ……あんんっ<emoji=heart04>\u3000ちゅうっ、ちゅぱっ、んちゅぅ<emoji=heart04>」"
translation = "「쮸웁<emoji=heart04> 서방님, 됴아여<emoji=heart04> 무쮸릅, 쮸, 꾸쮸릅…… 됴아해여어<emoji=heart04> 하앗, 응쮸, 쮸프, 아후…… 아으응<emoji=heart04> 쮸우, 쮸파, 응쮸우<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ぷちゅっ、ちゅっ、ら、らめ、お口もおま○こも愛されて、おかしくなるっ<emoji=heart04>\u3000ちゅぷっ、むちゅっ、ちゅるっ、んあっ……気持ちいい、んちゅっ、むちゅっ、ちゅるっ……ぷはぁ」"
translation = "「푸쮸, 쮸, 아, 안돼, 입도 보지도 사랑받아서, 이상해져어<emoji=heart04> 쮸프, 무쮸, 쮸르, 응앗…… 기분 좋아, 응쮸, 무쮸, 쮸르…… 푸하아」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はぁっ、はぁっ……旦那様、気持ち良過ぎて、私もう……ふあああぁぁぁっん！？」"
translation = "「하앗, 하앗…… 서방님, 너무 기분 좋아서, 나 이제…… 후아아아아아앙!?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、あっ、あぁんっ<emoji=heart04>\u3000激しいぃっ<emoji=heart04>\u3000旦那様のおち○ぽ、まだ大きくなってますぅっ<emoji=heart04>\u3000んあっ、はぁっ、はぁぁっ、んくっ、ふああぁぁんっ<emoji=heart04>！」"
translation = "「앗, 앗, 아앙<emoji=heart04> 격렬해애<emoji=heart04> 서방님의 자지, 아직 커지고 있어요오<emoji=heart04> 응앗, 하앗, 하아아, 응쿠, 후아아아앙<emoji=heart04>!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「おくまで届いてっ、んはっ、はぁんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おち○ぽキス気持ち良いですぅ！」"
translation = "「안쪽까지 닿아서, 응핫, 하앙<emoji=heart04> 기분 좋아아<emoji=heart04> 자지 키스 기분 좋아아여!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はあぁっ、好きっ、これ好きぃ<emoji=heart04>\u3000あっあっあっ、激しく求められるの、子作りって感じで、好きぃ<emoji=heart04>\u3000んあぁあああっ！\u3000興奮っ、しちゃいますぅっ<emoji=heart04>！」"
translation = "「하아아, 좋아, 이거 좋아아<emoji=heart04> 앗앗앗, 격렬하게 원해지는 거, 애 만들기라는 느낌이라서, 좋아아<emoji=heart04> 응아아아아앗! 흥분, 해버려요오<emoji=heart04>!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「旦那様っ<emoji=heart04>\u3000旦那様のおち○ぽ、あっ、はあっ、はあっ、んああっ<emoji=heart04>\u3000中で、びんびんに反り返ってぇ！\u3000突くたびに奥まで、ちゃんとキスしてくれるのぉ！\u3000はあぁぁぁんっ！」"
translation = "「서방님<emoji=heart04> 서방님의 자지, 앗, 하앗, 하앗, 응아앗<emoji=heart04> 안에서, 빳빳하게 휘어져서어! 찌를 때마다 안쪽까지, 제대로 키스해주는 거어! 하아아아앙!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっあっ、蛍火の、蛍火だけの、旦那様ち○ぽぉ<emoji=heart04>\u3000ふあああんっ<emoji=heart04>\u3000素敵な旦那様っ<emoji=heart04>\u3000しゅきぃ<emoji=heart04>\u3000しゅきですぅぅ<emoji=heart04>\u3000あっ、あっ、あっ、あぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗앗, 호타루비의, 호타루비만의, 서방님 자지이<emoji=heart04> 후아아앙<emoji=heart04> 멋진 서방님<emoji=heart04> 됴아여어<emoji=heart04> 됴아해여어어<emoji=heart04> 앗, 앗, 앗, 아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ふああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000旦那様の種付けピストン、私を孕ませようとっ、どんどん激しく、なってますっ<emoji=heart04><emoji=heart04>\u3000はああっ、もっと！\u3000もっと愛して下さい、旦那様ぁっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 서방님의 씨내리기 피스톤, 나를 임신시키려고오, 점점 격렬해, 지고 있어요오<emoji=heart04><emoji=heart04> 하아아, 더! 더 사랑해 주세요, 서방님아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、奥っ、奥しゅごいぃぃぃっ<emoji=heart04><emoji=heart04>\u3000旦那様のおち○ぽ、気持ち良いですぅっ<emoji=heart04>\u3000はぁっ、あっ、あっ、あぁんっ<emoji=heart04><emoji=heart04>！」"
translation = "「앗, 안쪽, 안쪽 대단해애애애<emoji=heart04><emoji=heart04> 서방님의 자지, 기분 좋아아여어<emoji=heart04> 하앗, 앗, 앗, 아앙<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「おち○ぽに征服、されてぇ<emoji=heart04>\u3000ん、はぁっ、はあぁぁっ<emoji=heart04>\u3000おま○こ陥落してぇ、んああっ<emoji=heart04>\u3000愛液ぐちょぐちょに、溢れちゃってますぅぅぅっ<emoji=heart04><emoji=heart04>！」"
translation = "「자지한테 정복, 당해서어<emoji=heart04> 응, 하앗, 하아아아<emoji=heart04> 보지 함락당해서어, 응아앗<emoji=heart04> 애액 질퍽질퍽하게, 넘쳐버리고 있어요오오오<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「し、子宮が完全に、下りちゃってますっ<emoji=heart04>\u3000あ、はっ、はあっ。ふあああんっ<emoji=heart04>\u3000おち○ぽとディープキス、しちゃってますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「자, 자궁이 완전히, 내려와 버렸어요오<emoji=heart04> 아, 하앗, 하앗. 후아아앙<emoji=heart04> 자지랑 딥키스, 해버리고 있어요오오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ああんっ、ああっ、あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000子作りセックス、気持ち良いですぅっ<emoji=heart04>\u3000あっ、あっ、ふあぁ、ふああぁぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아앙, 아앗, 앗<emoji=heart04> 기분 좋아아<emoji=heart04> 애 만들기 섹스, 기분 좋아아여어<emoji=heart04> 앗, 앗, 후아, 후아아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっあっあっ、ふああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあっ、だ、旦那様<emoji=heart04>\u3000中でびくびくってっ<emoji=heart04>\u3000あんっ、んああっ、おち○ぽ凄いぃっ<emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗, 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 응앗, 서, 서방님<emoji=heart04> 안에서 파르르 떨면서어<emoji=heart04> 앙, 응아앗, 자지 대단해애<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000……射精、んくっ、もうすぐ射精、なさるのですね旦那様<emoji=heart04><emoji=heart04>\u3000はあっ、ふあああっ<emoji=heart04>\u3000来てっ、来てください旦那様ぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 아앙<emoji=heart04> ……사정, 응쿠, 이제 곧 사정, 하시는 거군요 서방님<emoji=heart04><emoji=heart04> 하앗, 후아아앗<emoji=heart04> 와줘요, 와주세요 서방님아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「旦那様の子種、蛍火の子宮で、受け止めますぅ<emoji=heart04>\u3000はぁああんっ<emoji=heart04><emoji=heart04>\u3000気持ち良くなって、旦那様の子種っ<emoji=heart04>\u3000蛍火の子宮に、恵んでくださいませぇ<emoji=heart04><emoji=heart04>\u3000んっ、はぁぁあんっ<emoji=heart04>」"
translation = "「서방님의 씨앗, 호타루비의 자궁으로, 받아낼게요오<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04> 기분 좋아져서, 서방님의 씨앗으윽<emoji=heart04> 호타루비의 자궁에, 베풀어 주세요오오<emoji=heart04><emoji=heart04> 응, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、あっ、きちゃいます<emoji=heart04>\u3000んくっ、はあっ……イッちゃう<emoji=heart04>\u3000イッちゃう、イッちゃう、イッちゃうぅぅぅ……んうぅぅ、んあああっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「앗, 앗, 와버려요<emoji=heart04> 응쿠, 하앗…… 가버려어<emoji=heart04> 가버려, 가버려, 가버려어어어…… 응우우우, 응아아앗<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はぁぁぁっ、旦那様っ<emoji=heart04>\u3000私もうイキますっ！\u3000気持ちいいの、来ちゃうっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあっ、はあぁぁっ、ふあぁぁんっ<emoji=heart04>\u3000イク、いくいくいくっ<emoji=heart04>」"
translation = "「하아아아앗, 서방님<emoji=heart04> 나 이제 가요! 기분 좋은 거, 와버려어<emoji=heart04> 앙<emoji=heart04> 하앗, 하아아아, 후아아아앙<emoji=heart04> 가, 가가가가앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「旦那様も一緒にっ<emoji=heart04>\u3000あっあっ、いっぱい出してっ<emoji=heart04>\u3000蛍火の子宮に、子種ぶちまけて下さいぃっ<emoji=heart04>\u3000んあっ、はあぁんっ<emoji=heart04>\u3000旦那様の赤ちゃん、孕ませてぇぇぇっ<emoji=heart04>」"
translation = "「서방님도 같이이<emoji=heart04> 앗앗, 잔뜩 내보내서어<emoji=heart04> 호타루비의 자궁에, 씨앗 쏟아부어 주세요오오<emoji=heart04> 응앗, 하아앙<emoji=heart04> 서방님의 아기, 임신시켜줘어어어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あああああっ、もうイク<emoji=heart04>\u3000イクイクイクぅ<emoji=heart04><emoji=heart04>\u3000んはっ、あっあっあっあっあっ、んはぁぁぁぁぁぁっ──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗, 이제 가아<emoji=heart04> 가가가가아아<emoji=heart04><emoji=heart04> 응핫, 앗앗앗앗앗, 응하아아아아아아앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……射精すぞ！\u3000孕め、蛍火！！！」"
translation = "「윽…… 사정한다! 임신해라, 호타루비!!!」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「っ……ふあああああああぁぁぁぁぁあああああ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イ、ックぅぅぅぅぅぅぅぅぅ──っ<emoji=heart04><emoji=heart04>」"
translation = "「윽…… 후아아아아아아아아아아아아아아아아──────앗<emoji=heart04><emoji=heart04><emoji=heart04> 가, 가아아아아아아아아아──앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ、はあああっ、はあぁぁぁっ……旦那様の精子、子宮に一杯、注がれてますぅ<emoji=heart04>\u3000んくっ、ふぅぅっ……<emoji=heart04>」"
translation = "「앗, 하아아앗, 하아아아…… 서방님의 정액, 자궁에 가득, 쏟아지고 있어요오<emoji=heart04> 응쿠, 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ああっ、凄いぃ……<emoji=heart04>\u3000旦那様のおち○ぽ、いつも射精が長くてっ、素敵ぃ……<emoji=heart04>\u3000んっ、はぁ……はぁ……んんぅ<emoji=heart04>」"
translation = "「아앗, 대단해……<emoji=heart04> 서방님의 자지, 항상 사정이 길어서, 멋져요오……<emoji=heart04> 응, 하아…… 하아…… 음으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「んふぅ……旦那様の愛が、子宮いっぱいに広がって……幸せですぅ<emoji=heart04>\u3000はぁぁぁぁ……<emoji=heart04>」"
translation = "「응후…… 서방님의 사랑이, 자궁 가득 퍼져서…… 행복해요오<emoji=heart04> 하아아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ん……あぁんっ<emoji=heart04>\u3000せっかく頂いた子種、おま○こから溢れちゃっう……はふぅ<emoji=heart04>」"
translation = "「응…… 아앙<emoji=heart04> 어렵게 받은 씨앗, 보지에서 흘러넘쳐 버려어…… 하후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リラックスモードの攻められエッチ……気持ち良かった？」"
translation = "「릴랙스 모드에서 당하는 섹스…… 기분 좋았어?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「は、はい……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000凄く気持ち良かったです。旦那様に襲われるの、ハマっちゃいそうです……<emoji=heart04><emoji=heart04>」"
translation = "「하, 하이……<emoji=heart04><emoji=heart04><emoji=heart04> 정말 기분 좋았어요. 서방님한테 덮쳐지는 거, 중독될 것 같아요……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「師匠も、ですか？<emoji=heart04>\u3000ふふっ……でしたら、これからはいつでも、リラックスモードで、するようにしますね……」"
translation = "「스승님도, 인가요?<emoji=heart04> 후훗…… 그렇다면, 이제부터는 언제든지, 릴랙스 모드로, 하도록 할게요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……いや、俺は緊張モードの蛍火も好きだよ」"
translation = "「……아니, 나는 긴장 모드인 호타루비도 좋아해.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "緊張モードの蛍火は、素っ気ない口調であっても、愛情を持って奉仕してくれていた。嫌いなわけがない。"
translation = "긴장 모드인 호타루비는, 무뚝뚝한 말투일지라도 애정을 담아 봉사해 주었다. 싫어할 리가 없다."

[[dialogue]]
speaker = "unk"
original = "そのことを伝えると、蛍火は微笑んだ──"
translation = "그 사실을 전하자, 호타루비는 미소 지었다──"

[[dialogue]]
speaker = "unk"
original = "緊張モードの彼女になって。"
translation = "긴장 모드인 그녀가 되어."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ふふっ。仕方のない人ですね？\u3000……それなら、今度からは代わりばんこにしてあげます<emoji=heart04>」"
translation = "「후훗. 어쩔 수 없는 사람이네요? ……그렇다면, 다음부터는 번갈아 가며 해드릴게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「つきましては、お夕食の後にベッドの上で、ゆっくりと……旦那様<emoji=heart04>」"
translation = "「그런 고로, 저녁 식사 후에 침대 위에서, 천천히…… 서방님<emoji=heart04>」"

