[[dialogue]]
speaker = "unk"
original = "第３話,花騎士とモンスター,P"
translation = "제3화, 꽃의 기사와 몬스터, P"

[[dialogue]]
speaker = "ステラ"
original = "「スプリングガーデンには６つの国があるんです」"
translation = "「스프링 가든에는 6개의 나라가 있어요」"

[[dialogue]]
speaker = "ステラ"
original = "「『リリィウッド』『ベルガモットバレー』『ウィンターローズ』『ブロッサムヒル』『ロータスレイク』『バナナオーシャン』」"
translation = "「『릴리 우드』 『베르가못 밸리』 『윈터 로즈』 『블로섬 힐』 『로터스 레이크』 『바나나 오션』」"

[[dialogue]]
speaker = "ステラ"
original = "「ボクはその内の、ベルガモットバレー出身の<ruby>花騎士<rt>フラワーナイト</rt></ruby>です」"
translation = "「저는 그중 베르가못 밸리 출신의 꽃의 기사예요」"

[[dialogue]]
speaker = "unk"
original = "昼間は滅多に外出しようとしないステラが、珍しく買い物に行きたいと言ったので、俺とルリエルで付き合うことにした。"
translation = "낮에는 좀처럼 외출하려 하지 않는 스텔라가 드물게 쇼핑을 가고 싶다고 해서, 나와 루리엘이 동행하기로 했다."

[[dialogue]]
speaker = "unk"
original = "その道すがら、彼女のいた世界であるスプリングガーデンについて教えてもらう。"
translation = "그 길에 그녀가 있던 세계인 스프링 가든에 대해 듣는다."

[[dialogue]]
speaker = "ルリエル"
original = "「そもそも花騎士というのは、どういった存在なんでしょうか？」"
translation = "「애초에 꽃의 기사라는 건 어떤 존재인가요?」"

[[dialogue]]
speaker = "ステラ"
original = "「花騎士というのは、世界花から加護を受けた人たちのことですね」"
translation = "「꽃의 기사는 세계화로부터 가호를 받은 사람들을 말해요」"

[[dialogue]]
speaker = "ステラ"
original = "「ボクたちの世界には『害虫』という存在がいて、凶暴な本能のままに自然を貪ったり、他の生き物を襲ってきたりします」"
translation = "「저희들의 세계에는 『해충』이라는 존재가 있어서, 흉포한 본능 그대로 자연을 탐하거나 다른 생물을 습격해 오곤 해요」"

[[dialogue]]
speaker = "ステラ"
original = "「そんな害虫たちと戦えるように、世界花から加護を授かった存在――」"
translation = "「그런 해충들과 싸울 수 있도록 세계화로부터 가호를 부여받은 존재──」"

[[dialogue]]
speaker = "ステラ"
original = "「もう少し言うと、専門の騎士学校を卒業した人たちが正式な花騎士として認められているんですが……例外的な人たちも少なくはないですね」"
translation = "「조금 더 말하자면, 전문 기사 학교를 졸업한 사람들이 정식 꽃의 기사로 인정받고 있지만…… 예외적인 사람들도 적지 않아요」"

[[dialogue]]
speaker = "ステラ"
original = "「実はボクが花騎士になったのも、害虫に襲われたことがきっかけなんですよ」"
translation = "「사실 제가 꽃의 기사가 된 것도 해충에게 습격당한 게 계기였거든요」"

[[dialogue]]
speaker = "ステラ"
original = "「馬車に乗って、家族みんなで街に向かってる最中に、害虫の一群に襲われてしまって……」"
translation = "「마차를 타고 가족 모두 마을로 향하던 도중에 해충 무리에게 습격당해 버려서……」"

[[dialogue]]
speaker = "ステラ"
original = "「絶体絶命のピンチの中、ボクはみんなを助けたいって一心で世界花に祈ったんです。そうしたら能力が発現して──」"
translation = "「절체절명의 위기 속에서 저는 모두를 돕고 싶다는 일념으로 세계화에 기도했어요. 그랬더니 능력이 발현해서──」"

[[dialogue]]
speaker = "ステラ"
original = "「その後、騎士学校に入学して力もコントロールできるようになって、晴れて花騎士の資格を得た……という感じですね」"
translation = "「그 후 기사 학교에 입학해서 힘도 조절할 수 있게 되고, 당당히 꽃의 기사 자격을 얻었다……는 느낌이에요」"

[[dialogue]]
speaker = "unk"
original = "ステラもか……"
translation = "스텔라도인가……"

[[dialogue]]
speaker = "ステラ"
original = "「えっ？\u3000もしかして会長さんも似た経験があるんですか……？」"
translation = "「엣? 혹시 회장님도 비슷한 경험이 있으신가요……?」"

[[dialogue]]
speaker = "unk"
original = "モンスターに襲われたんだ"
translation = "몬스터에게 습격당했었어"

[[dialogue]]
speaker = "unk"
original = "小さい頃にね"
translation = "어릴 적에 말이야"

[[dialogue]]
speaker = "ステラ"
original = "「モンスター、ですか？」"
translation = "「몬스터, 인가요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ステラさんの世界に害虫がいるように、ルリエルたちの世界にも人々の平穏を脅かす存在がいるのです！」"
translation = "「스텔라 씨의 세계에 해충이 있듯이, 루리엘들의 세계에도 사람들의 평온을 위협하는 존재가 있답니다!」"

[[dialogue]]
speaker = "ステラ"
original = "「こんなに平和そうに見える世界なのに、そんな危険な存在がいるんですね……」"
translation = "「이렇게 평화로워 보이는 세계인데 그런 위험한 존재가 있군요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうなんです！\u3000それと戦うのがわたしたち、<ruby>星騎士<rt>スターナイト</rt></ruby>というわけですねっ！」"
translation = "「그렇답니다! 그것과 싸우는 것이 저희, 성기사라는 것이죠!」"

[[dialogue]]
speaker = "ルリエル"
original = "「はわわっ！？\u3000言ってるそばから現れたみたいです！」"
translation = "「하와왓!? 말하기가 무섭게 나타난 모양이에요!」"

[[dialogue]]
speaker = "unk"
original = "ここから近いな……"
translation = "여기서 가깝군……"

[[dialogue]]
speaker = "ルリエル"
original = "「近くにいる星騎士はわたしたちだけですし、現場に向かわなければいけないのですけど……」"
translation = "「근처에 있는 성기사는 저희뿐이고, 현장으로 향해야 하는데요……」"

[[dialogue]]
speaker = "unk"
original = "ステラを危険に巻き込むわけにはいかない。"
translation = "스텔라를 위험에 휘말리게 할 수는 없다."

[[dialogue]]
speaker = "unk"
original = "だが、こんな人の多い街中に１人残していくのも……"
translation = "하지만 이런 사람이 많은 거리 한복판에 혼자 남겨두는 것도……"

[[dialogue]]
speaker = "ステラ"
original = "「あ、あの、会長さん……ボクも行きたいです！」"
translation = "「저, 저기, 회장님…… 저도 가고 싶어요!」"

[[dialogue]]
speaker = "ステラ"
original = "「先日の事件で、ボクもこの世界で花騎士としての力が使えるようになりました！」"
translation = "「지난번 사건으로 저도 이 세계에서 꽃의 기사로서의 힘을 사용할 수 있게 되었어요!」"

[[dialogue]]
speaker = "ステラ"
original = "「戦いの訓練は受けています。なのできっと、邪魔にはならないと思います……！」"
translation = "「전투 훈련은 받았습니다. 그러니 분명 방해는 되지 않을 거라 생각해요……!」"

[[dialogue]]
speaker = "unk"
original = "その瞳には花騎士として、誰かを守りたいという強い意志が宿っているように思えた。"
translation = "그 눈동자에는 꽃의 기사로서 누군가를 지키고 싶다는 강한 의지가 깃들어 있는 것처럼 보였다."

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、一緒に来てもらいましょう！」"
translation = "「회장님, 같이 가도록 해요!」"

[[dialogue]]
speaker = "unk"
original = "でも、十分に注意して"
translation = "하지만 충분히 주의해"

[[dialogue]]
speaker = "unk"
original = "そうだな……"
translation = "그렇군……"

[[dialogue]]
speaker = "ステラ"
original = "「はい、ありがとうございます！」"
translation = "「네, 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "ステラの同行を許可すると、俺たちはすぐにモンスターの出現ポイントへと向かった。"
translation = "스텔라의 동행을 허가하자, 우리들은 곧장 몬스터의 출현 지점으로 향했다."

[[dialogue]]
speaker = "ステラ"
original = "「っ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ステラさんはここにいてください！\u3000あれは会長さんとわたしで倒しますから」"
translation = "「스텔라 씨는 여기 계세요! 저건 회장님과 제가 쓰러뜨릴 테니까요」"

[[dialogue]]
speaker = "unk"
original = "ルリエル、援護を頼んだ"
translation = "루리엘, 엄호를 부탁해"

[[dialogue]]
speaker = "ルリエル"
original = "「はいっ、お任せあれなのです！」"
translation = "「네잇, 맡겨만 주세요!」"

[[dialogue]]
speaker = "ステラ"
original = "（害虫とは全然違う……あれが、会長さんたちの、敵）"
translation = "(해충과는 전혀 달라…… 저게 회장님들의 적)"

[[dialogue]]
speaker = "ステラ"
original = "（でも……会長さんたちも強い……次々に倒していってる……）"
translation = "(하지만…… 회장님들도 강해…… 차례차례 쓰러뜨리고 있어……)"

[[dialogue]]
speaker = "ステラ"
original = "（花騎士としてボクも何か力になれればって思ってたけど、これなら……）"
translation = "(꽃의 기사로서 저도 뭔가 힘이 되었으면 했지만, 이 정도라면……)"

[[dialogue]]
speaker = "母親"
original = "「きゃあああああっ！！！！」"
translation = "「꺄아아아아악!!!!」"

[[dialogue]]
speaker = "ステラ"
original = "「っ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker = "unk"
original = "少し離れた場所で悲鳴が上がる。"
translation = "조금 떨어진 곳에서 비명이 들린다."

[[dialogue]]
speaker = "unk"
original = "そこにはモンスターに襲われる母娘の姿があった。"
translation = "그곳에는 몬스터에게 습격당하는 모녀의 모습이 있었다."

[[dialogue]]
speaker = "母親"
original = "「に、逃げて……！」"
translation = "「도, 도망쳐……!」"

[[dialogue]]
speaker = "女の子"
original = "「ママっ……！」"
translation = "「엄마……!」"

[[dialogue]]
speaker = "unk"
original = "ステラは弾かれたように飛び出し、モンスターと母娘の間に割って入る。"
translation = "스텔라는 튕겨 나가듯 달려가 몬스터와 모녀 사이를 가로막는다."

[[dialogue]]
speaker = "ステラ"
original = "（この世界ので力の使い方、ルリエルさんたちを真似して……！）"
translation = "(이 세계에서의 힘 사용법, 루리엘 씨 일행을 흉내 내서……!)"

[[dialogue]]
speaker = "unk"
original = "そして、ステラが能力を発動した瞬間、目が眩むばかりの強い光が全身から放たれた。"
translation = "그리고 스텔라가 능력을 발동한 순간, 눈이 부실 정도로 강한 빛이 전신에서 뿜어져 나왔다."

[[dialogue]]
speaker = "ステラ"
original = "「ブライト・スターっ！！！」"
translation = "「브라이트 스타!!!」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁ、はぁ、はぁ……」"
translation = "「하아, 하아, 하아……」"

[[dialogue]]
speaker = "ステラ"
original = "「あ、あの……大丈夫……でしたか……？」"
translation = "「저, 저기…… 괜찮……으신가요……?」"

[[dialogue]]
speaker = "女の子"
original = "「ぁ……ぅ……」"
translation = "「아……우……」"

[[dialogue]]
speaker = "ステラ"
original = "（恐怖で動けないみたい……どうすれば……）"
translation = "（공포 때문에 움직이지 못하는 것 같아…… 어떡하지……）"

[[dialogue]]
speaker = "ステラ"
original = "（……あ、そうだ……あれを使って……）"
translation = "（……아, 맞다…… 그걸 써서……）"

[[dialogue]]
speaker = "unk"
original = "丁度、目の前にあったのは花屋だった。"
translation = "마침 눈앞에 있었던 것은 꽃집이었다."

[[dialogue]]
speaker = "unk"
original = "モンスターに襲われたせいで、路上に花が散らばっている。"
translation = "몬스터에게 습격당한 탓에 노상에 꽃이 흩어져 있다."

[[dialogue]]
speaker = "unk"
original = "地に落ちたその１輪を拾うと、怯え切っている女の子の前に差し出し──それに力を注ぎ込んだ。"
translation = "바닥에 떨어진 그 한 송이를 줍고는, 겁에 질려 있는 여자아이 앞에 내밀며── 그곳에 힘을 불어넣었다."

[[dialogue]]
speaker = "女の子"
original = "「わぁ……！！」"
translation = "「와아……!!」"

[[dialogue]]
speaker = "unk"
original = "ステラの手にした花が光を放つ。"
translation = "스텔라의 손에 들린 꽃이 빛을 발한다."

[[dialogue]]
speaker = "unk"
original = "その優しい光に、女の子は恐怖を忘れて見入っていた。"
translation = "그 상냥한 빛에 여자아이는 공포를 잊고 넋을 잃고 바라보았다."

[[dialogue]]
speaker = "ステラ"
original = "「これ、あげます……どうぞ……」"
translation = "「이거, 드릴게요…… 자요……」"

[[dialogue]]
speaker = "女の子"
original = "「ありがとう、お姉ちゃん！」"
translation = "「고마워, 언니!」"

[[dialogue]]
speaker = "ステラ"
original = "「い、いえ……」"
translation = "「아, 아니에요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「すごいです、ステラさん！\u3000ルリエル、感動しちゃいました！」"
translation = "「대단해요, 스텔라 씨! 루리엘, 감동해 버렸어요!」"

[[dialogue]]
speaker = "ステラ"
original = "「え、えへへ……キラッと大成功です……」"
translation = "「에, 에헤헤…… 반짝하고 대성공이에요……」"

[[dialogue]]
speaker = "ステラ"
original = "「元気になってくれてよかった……ボクの力、この世界でも役に立って……」"
translation = "「기운을 차려 줘서 다행이야…… 내 힘, 이 세계에서도 도움이 돼서……」"

[[dialogue]]
speaker = "ルリエル"
original = "「みんなを笑顔にしてくれる、素敵な能力だと思います！」"
translation = "「모두를 미소 짓게 해 주는 멋진 능력이라고 생각해요!」"

[[dialogue]]
speaker = "ステラ"
original = "「も、もう、恥ずかしいですよ。そんなに褒めないでください……」"
translation = "「정, 정말, 부끄러워요. 그렇게 칭찬하지 마세요……」"

[[dialogue]]
speaker = "unk"
original = "真っ赤になりながら言っているが、俺もルリエルとまったく同意見で──"
translation = "얼굴이 새빨개진 채 말하고 있지만, 나도 루리엘과 완전히 같은 의견이라──"

[[dialogue]]
speaker = "unk"
original = "ステラの能力は皆を笑顔に出来る、素晴らしい能力だと思わずにいられないのだった。"
translation = "스텔라의 능력은 모두를 미소 짓게 할 수 있는 훌륭한 능력이라고 생각하지 않을 수 없었다."

