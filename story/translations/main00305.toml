[[dialogue]]
speaker = "unk"
original = "第７話,流星ライダー,B"
translation = "제7화, 유성 라이더, B"

[[dialogue]]
speaker = "サーシャ"
original = "「──ふぅ。これで任務完了っと♪」"
translation = "「──후우. 이걸로 임무 완료♪」"

[[dialogue]]
speaker = "クロト"
original = "「みんな。サーシャ先輩も。ありがとう、おかげで今日も無事に終われた」"
translation = "「모두. 사샤 선배도. 고마워, 덕분에 오늘도 무사히 끝낼 수 있었어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんうん。みんなを労うのも大事よね」"
translation = "「응응. 모두를 위로하는 것도 중요하지.」"

[[dialogue]]
speaker = "アナ"
original = "「前会長はたまにお菓子くれた」"
translation = "「전 회장님은 가끔 과자를 주셨습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「え……そうなのか？\u3000じゃあ用意しとかなきゃ……」"
translation = "「에…… 그런 건가? 그럼 준비해 둬야겠네……」"

[[dialogue]]
speaker = "マトイ"
original = "「べ、別に義務ってわけじゃないと思うけど……？」"
translation = "「벼, 별로 의무라는 건 아니라고 생각하지만……?」"

[[dialogue]]
speaker = "unk"
original = "何はともあれ無事に済んでよかった。"
translation = "아무튼 무사히 끝나서 다행이었다."

[[dialogue]]
speaker = "unk"
original = "さっそく変身を解き、学園へ戻ろうと……"
translation = "곧바로 변신을 풀고, 학원으로 돌아가려는데……"

[[dialogue]]
speaker = "紅明"
original = "「ダーリ～～ン！！\u3000と星徒会のみんなも！」"
translation = "「달리～～잉!! 그리고 성도회 모두도!」"

[[dialogue]]
speaker = "メルエル"
original = "「ご……ごめんなさいっ。私が至らなかったばかりに……」"
translation = "「저…… 죄송합니다. 제가 부족했던 탓에……」"

[[dialogue]]
speaker = "unk"
original = "こちらへと駆けてくる紅明とメルエル。"
translation = "이쪽으로 달려오는 홍명과 메르엘."

[[dialogue]]
speaker = "クロト"
original = "「どうしたんだ？\u3000もうアステラは撃破したけど……」"
translation = "「무슨 일이야? 이미 아스테라는 격파했는데……」"

[[dialogue]]
speaker = "紅明"
original = "「それが……！\u3000<ruby>街<rt>こっち</rt></ruby>はさっきから被害が広がりっぱなしで、応援も来てくれてるけど、モンスターの処理が追い付いてないんだ！」"
translation = "「그게……! 이쪽은 아까부터 피해가 계속 확산되고 있고, 응원도 와주고 있지만, 몬스터 처리가 따라가지 못하고 있어!」"

[[dialogue]]
speaker = "モンスター"
original = "「ウィイイイイイ！！」"
translation = "「위이이이이이!!」"

[[dialogue]]
speaker = "マトイ"
original = "「本当だ。ていうか、さっきより凶暴になってる！」"
translation = "「정말이다. 그보다, 아까보다 흉포해졌어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000アステラ本体が消えたのにモンスターが増えるなんて……おかしいわね」"
translation = "「? 아스테라 본체가 사라졌는데 몬스터가 늘어나다니…… 이상하네.」"

[[dialogue]]
speaker = "サーシャ"
original = "「どこか他にも巣があるのかしら……？」"
translation = "「어딘가 다른 곳에도 둥지가 있는 걸까……?」"

[[dialogue]]
speaker = "unk"
original = "きょろきょろと周囲を見渡す俺たち。"
translation = "두리번거리며 주위를 둘러보는 우리."

[[dialogue]]
speaker = "unk"
original = "しかし、異変はそれだけに留まらなかった。"
translation = "하지만, 이변은 그것에만 그치지 않았다."

[[dialogue]]
speaker = "マトイ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え……何！？」"
translation = "「에…… 뭐야!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら。今日の日の入りは早いのね」"
translation = "「어머어머. 오늘 해가 지는 건 빠르네.」"

[[dialogue]]
speaker = "クロト"
original = "「そんな次元の話じゃないですよ、サーシャ先輩」"
translation = "「그런 차원의 이야기가 아닙니다, 사샤 선배.」"

[[dialogue]]
speaker = "unk"
original = "ペンキをぶちまけるかのように塗り替えられた夜の<ruby>帳<rt>とばり</rt></ruby>。"
translation = "페인트를 들이붓듯이 덧칠해진 밤의 장막."

[[dialogue]]
speaker = "unk"
original = "言いしれない不穏さが、どよめきと共に広がるのを感じていた。"
translation = "형언할 수 없는 불온함이, 웅성거림과 함께 퍼지는 것을 느끼고 있었다."

[[dialogue]]
speaker = "アナ"
original = "「モンスター達が集まってる……あっち」"
translation = "「몬스터들이 모이고 있습니다…… 저쪽입니다.」"

[[dialogue]]
speaker = "unk"
original = "新たな<ruby>巣<rt>アステラ</rt></ruby>があるのかと、駆けつけたそこでは──"
translation = "새로운 아스테라가 있는 건가 하고, 달려간 그곳에서는──"

[[dialogue]]
speaker = "アポロ"
original = "「わーっはっはっはっは……ヒーローにふさわしい舞台の誕生だ」"
translation = "「와ー핫핫핫하…… 히어로에게 걸맞은 무대의 탄생이다.」"

[[dialogue]]
speaker = "アポロ"
original = "「闇夜に紛れ彗星のごとく悪を絶つ！\u3000流星ライダー・アポロ参上！」"
translation = "「어둠 속에 숨어 혜성처럼 악을 끊는다! 유성 라이더・아폴로 등장!」"

[[dialogue]]
speaker = "マトイ"
original = "「な、何あれ？」"
translation = "「나, 뭐야 저거?」"

[[dialogue]]
speaker = "クロト"
original = "「あの子は……」"
translation = "「저 아이는……」"

[[dialogue]]
speaker = "unk"
original = "まだ入学して間もないころ、通学路で出会った少女だ。"
translation = "아직 입학한 지 얼마 안 되었을 무렵, 통학로에서 만났던 소녀다."

[[dialogue]]
speaker = "unk"
original = "仮面をつけててヘンな子だったから印象に残ってるけど……。"
translation = "가면을 쓰고 있어서 이상한 아이였기에 인상에 남아 있지만……."

[[dialogue]]
speaker = "ヴィーナス"
original = "「面識、あるの？」"
translation = "「면식, 있어?」"

[[dialogue]]
speaker = "クロト"
original = "「一度だけな。それもひと言かふた言、交わしたくらいだけど……」"
translation = "「한 번뿐이야. 그것도 한두 마디 나눈 정도지만……」"

[[dialogue]]
speaker = "unk"
original = "あの時とは明らかに様子が異なる。"
translation = "그때와는 확연히 모습이 다르다."

[[dialogue]]
speaker = "unk"
original = "アポロと名乗る仮面の少女は、眼下にうごめくモンスター達を従えていた。"
translation = "아폴로라고 자칭하는 가면의 소녀는, 눈 아래에서 꿈틀거리는 몬스터들을 거느리고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「さあ皆の衆。思う存分この悪の巣窟を荒らし、世界を平和に染め上げるのだー！」"
translation = "「자, 모두들. 마음껏 이 악의 소굴을 휩쓸고, 세계를 평화로 물들이는 거다!」"

[[dialogue]]
speaker = "モンスター"
original = "「──ィィィィン！」"
translation = "「──이이이이잉!」"

[[dialogue]]
speaker = "モンスター"
original = "「イイイイィィィ！！」"
translation = "「이이이이이이!!」"

[[dialogue]]
speaker = "ギエル"
original = "「──さすがでございます、アポロ様。その度量にはこのギエルも感服するばかり」"
translation = "「──과연 대단하십니다, 아폴로 님. 그 도량에는 이 기엘도 감복할 따름입니다.」"

[[dialogue]]
speaker = "アポロ"
original = "「わっはっはっは！\u3000そう褒めるな！\u3000あたしもひと暴れしてやるぞ！」"
translation = "「왓핫핫하! 그렇게 칭찬하지 마! 나도 한바탕 날뛰어 줄 테다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょ──なんなのよアイツ！」"
translation = "「저── 뭐야 쟤!」"

[[dialogue]]
speaker = "サーシャ"
original = "「星騎士……には、見えないわよね」"
translation = "「성기사……로는, 안 보이지.」"

[[dialogue]]
speaker = "クロト"
original = "「モンスターを操るなんて……そんなことができるのか……？」"
translation = "「몬스터를 조종하다니…… 그런 게 가능한 건가……?」"

[[dialogue]]
speaker = "unk"
original = "アポロなる少女の鶴の一声でさらに暴れだすモンスターたち。"
translation = "아폴로라는 소녀의 한마디에 더욱 날뛰기 시작하는 몬스터들."

[[dialogue]]
speaker = "unk"
original = "にわかには信じがたいその光景に、アナが思いだしたとばかりに言葉を発した。"
translation = "쉽사리 믿기 어려운 그 광경에, 아나가 문득 생각났다는 듯이 입을 열었다."

[[dialogue]]
speaker = "アナ"
original = "「流星ライダーアポロは確か、数年前に銀河テレビで放映されてた特撮番組」"
translation = "「유성 라이더 아폴로는 분명, 몇 년 전에 은하 TV에서 방영되던 특촬 프로그램입니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「そういえば弟が見てたかも」"
translation = "「그러고 보니 남동생이 봤을지도.」"

[[dialogue]]
speaker = "サーシャ"
original = "「マトイちゃん弟がいたの？\u3000実は私にも妹が……」"
translation = "「마토이짱 남동생이 있었어? 실은 나에게도 여동생이……」"

[[dialogue]]
speaker = "クロト"
original = "「世間話してる場合じゃないですよサーシャ先輩！\u3000来ます！」"
translation = "「세상 이야기할 때가 아닙니다, 사샤 선배! 옵니다!」"

[[dialogue]]
speaker = "unk"
original = "襲ってくるモンスターをいなして倒す。"
translation = "덮쳐오는 몬스터를 피하고 쓰러뜨린다."

[[dialogue]]
speaker = "unk"
original = "また聞こえてくる軽いノリとは裏腹に、少女本人の所業は派手かつ剣呑なものだった。"
translation = "또다시 들려오는 가벼운 분위기와는 달리, 소녀 본인의 소행은 화려하면서도 위험한 것이었다."

[[dialogue]]
speaker = "アポロ"
original = "「ひゅうぅぅぅ……どかーーーーん！！！」"
translation = "「휴우우우우…… 콰아아앙!!!」"

[[dialogue]]
speaker = "unk"
original = "身の丈ほどもある大剣を軽々と振るい、街灯をなぎ倒していく少女アポロ。"
translation = "키만 한 대검을 가볍게 휘두르며, 가로등을 쓰러뜨리는 소녀 아폴로."

[[dialogue]]
speaker = "unk"
original = "それだけでも尋常でない膂力──"
translation = "그것만으로도 심상치 않은 완력──"

[[dialogue]]
speaker = "unk"
original = "だが、真なる脅威はその後に現れた。"
translation = "하지만, 진정한 위협은 그 후에 나타났다."

[[dialogue]]
speaker = "モンスター"
original = "「イイイーッ！」"
translation = "「이이이잇!」"

[[dialogue]]
speaker = "モンスター"
original = "「ウィイ──！」"
translation = "「위이──!」"

[[dialogue]]
speaker = "クロト"
original = "「な……っ！」"
translation = "「나……!」"

[[dialogue]]
speaker = "マトイ"
original = "「モンスターを……生み出してる……！？」"
translation = "「몬스터를…… 만들어내고 있어……!?」"

[[dialogue]]
speaker = "unk"
original = "錯覚ではない。"
translation = "착각이 아니다."

[[dialogue]]
speaker = "unk"
original = "大剣が打ちつけた破砕の<ruby>轍<rt>わだち</rt></ruby>から、濃紫の瘴気とともにモンスターが発生している。"
translation = "대검이 내리친 파쇄의 바퀴 자국에서, 짙은 보랏빛의 장기와 함께 몬스터가 발생하고 있다."

[[dialogue]]
speaker = "アポロ"
original = "「ゆくのだ子分ども！\u3000地上を勇気と希望で埋め尽くせー！」"
translation = "「가는 거다 꼬맹이들아! 지상을 용기와 희망으로 가득 채워라!」"

[[dialogue]]
speaker = "モンスター"
original = "「ニアアアア！」"
translation = "「니아아아아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「迷惑なコ……って済ませられるおいたじゃないわね」"
translation = "「민폐인 아이라고…… 끝낼 수 있는 장난이 아니네.」"

[[dialogue]]
speaker = "クロト"
original = "「ええ。放ってはおけませんね」"
translation = "「예. 내버려 둘 수는 없겠네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「それに、あの瘴気って……」"
translation = "「게다가, 저 장기라는 거……」"

[[dialogue]]
speaker = "unk"
original = "再構築の瘴気──"
translation = "재구축의 장기──"

[[dialogue]]
speaker = "unk"
original = "彼女の大剣があれを纏っているということは、一体何を示しているのか──"
translation = "그녀의 대검이 그것을 두르고 있다는 것은, 대체 무엇을 의미하는 것인가──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま……待ってよ。こんなこと、日誌のどこにも書かれていないわ！」"
translation = "「마…… 기다려 봐. 이런 건, 일지의 어디에도 쓰여 있지 않아!」"

[[dialogue]]
speaker = "マトイ"
original = "「それくらい別にあるんじゃないの、ヴィーナス……？」"
translation = "「그 정도는 따로 있는 거 아니야, 비너스……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ううん、ありえない！\u3000モンスターに関する記述が間違ってたことなんて、今まで一度も──」"
translation = "「아니, 있을 수 없어! 몬스터에 관한 기술이 틀렸던 적은, 지금까지 단 한 번도──」"

[[dialogue]]
speaker = "unk"
original = "血相を変えて日誌を捲り続けるヴィーナス──"
translation = "안색을 바꾸며 일지를 계속 넘기는 비너스──"

[[dialogue]]
speaker = "unk"
original = "しかし、やはりこの事態は完全な不測であるようだった。"
translation = "하지만, 역시 이 사태는 완전한 예측 불가능인 듯했다."

[[dialogue]]
speaker = "アナ"
original = "「人を噛んだことのない犬が、明日も噛まないとは限らない。イレギュラーは仕方ない」"
translation = "「사람을 문 적 없는 개가, 내일도 물지 않으리란 법은 없습니다. 이레귤러는 어쩔 수 없습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス──気持ちはわかるが今は星騎士としての活動が大事だ」"
translation = "「비너스── 마음은 알겠지만 지금은 성기사로서의 활동이 중요해.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……そうね。ごめんなさい、後にするわ」"
translation = "「……그렇네. 미안해, 나중에 할게.」"

[[dialogue]]
speaker = "クロト"
original = "「飛ぶぞ！」"
translation = "「날아간다!」"

[[dialogue]]
speaker = "unk"
original = "変身状態のまま、仮面の少女へ向かって駆け抜ける！"
translation = "변신 상태 그대로, 가면의 소녀를 향해 달려 나간다!"

[[dialogue]]
speaker = "アポロ"
original = "「んーいい夜だ！\u3000このアポロ様が駆け巡るのにふさわしい星空だぜ！」"
translation = "「음ー 좋은 밤이다! 이 아폴로 님이 누비기에 걸맞은 별이 가득한 밤하늘이다!」"

[[dialogue]]
speaker = "クロト"
original = "「──待て！\u3000そこの君！」"
translation = "「──기다려! 거기 너!」"

[[dialogue]]
speaker = "アポロ"
original = "「おっと──？」"
translation = "「오옷──?」"

[[dialogue]]
speaker = "クロト"
original = "「新星学園星徒会だ。君は一体何をしている！？」"
translation = "「신성 학원 성도회다. 너는 대체 뭘 하고 있는 거지!?」"

[[dialogue]]
speaker = "unk"
original = "名乗りを上げて踏みとどまらせようとする俺──"
translation = "이름을 밝히고 멈춰 세우려 하는 나──"

[[dialogue]]
speaker = "unk"
original = "すると少女は、こちらを見てニヤリと笑った。"
translation = "그러자 소녀는, 이쪽을 보고 히죽 웃었다."

[[dialogue]]
speaker = "アポロ"
original = "「フ──やっと来たか！\u3000待ちくたびれたぞ緋宮クロト──いや、<b>魔王</b>！」"
translation = "「후── 드디어 왔군! 기다리다 지쳤다, 히노미야 쿠로토── 아니, <b>마왕</b>!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へっ……！？」"
translation = "「헷……!?」"

[[dialogue]]
speaker = "マトイ"
original = "「また《魔王》……」"
translation = "「또 《마왕》……」"

[[dialogue]]
speaker = "クロト"
original = "「そもそも名乗った覚えもないんだがな。それに魔王とは──なぜ君がその名を知っている？」"
translation = "「애초에 이름을 밝힌 기억도 없는데. 게다가 마왕이라니── 왜 네가 그 이름을 알고 있지?」"

[[dialogue]]
speaker = "アポロ"
original = "「ハッハッハ！\u3000そんなのは当然だろう、あたしこそヒーローだからだ！」"
translation = "「핫핫하! 그런 건 당연하잖아, 나야말로 히어로니까!」"

[[dialogue]]
speaker = "unk"
original = "こちらが強い語気で話しかけても、彼女はあっけらかんと笑っていた。"
translation = "이쪽이 강한 어조로 말을 걸어도, 그녀는 태연하게 웃고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかも……"
translation = "게다가……"

[[dialogue]]
speaker = "アポロ"
original = "「フィーニスの塔一階層、よくぞ攻略したな！\u3000中々の手前だったと思うぞ！」"
translation = "「피니스의 탑 1계층, 잘도 공략했구나! 꽤나 수고했을 거라고 생각한다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！？\u3000どうしてあんたが、そのこと……」"
translation = "「!? 왜 네가, 그 사실을……」"

[[dialogue]]
speaker = "unk"
original = "あれは俺たちしか知るはずのないことだ。"
translation = "그건 우리밖에 알 리 없는 일이다."

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔は依然として立ち入り厳禁だし、外から内部の様子も見えないはずなのに。"
translation = "피니스의 탑은 여전히 출입 엄금이고, 밖에서 내부의 모습도 보이지 않을 텐데."

[[dialogue]]
speaker = "クロト"
original = "「アポロ──と言ったか。君は……何者だ？\u3000この空、そのモンスター……君の仕業か？」"
translation = "「아폴로──라고 했나. 너는…… 누구지? 이 하늘, 저 몬스터…… 네 소행인가?」"

[[dialogue]]
speaker = "アポロ"
original = "「ふふん、見ての通りだ」"
translation = "「후훗, 보다시피다.」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王──今夜はおまえのために用意したパーティなのだ！\u3000喜んでもらえなくては困る！」"
translation = "「마왕── 오늘 밤은 너를 위해 준비한 파티다! 기뻐해 주지 않으면 곤란하다!」"

[[dialogue]]
speaker = "クロト"
original = "「なんだって……！？」"
translation = "「뭐라고……!?」"

[[dialogue]]
speaker = "unk"
original = "アポロは両手をがばっと広げ、楽しそうな顔で俺のことを見る。"
translation = "아폴로는 양팔을 활짝 벌리고, 즐거운 얼굴로 나를 본다."

[[dialogue]]
speaker = "アポロ"
original = "「フィールドを整えてやったのさ！\u3000これなら本気でぶつかり合える！」"
translation = "「필드를 정돈해 준 거야! 이 정도면 진심으로 부딪칠 수 있어!」"

[[dialogue]]
speaker = "アポロ"
original = "「おまえの『真の姿』を見せてみろ。まさかその程度じゃあないだろ？」"
translation = "「네 『진정한 모습』을 보여 봐. 설마 그 정도는 아니겠지?」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！」"
translation = "「……!」"

[[dialogue]]
speaker = "アナ"
original = "「例の『フォルム』のことも──どうして……」"
translation = "「이전의 『형태』에 대해서도── 어째서……」"

[[dialogue]]
speaker = "unk"
original = "この少女には縁のない出来事だったはずの秘密が──なぜか全て握られている。普通じゃない。"
translation = "이 소녀와는 관계없는 일이었을 비밀이── 어째서인지 전부 쥐어져 있다. 보통이 아니다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「何ライダーだか知らないけど……あんたみたいのは、星騎士として放っておけるわけないんだから！\u3000おとなしくお縄につきなさい！」"
translation = "「무슨 라이더인지 모르겠지만…… 너 같은 건, 성기사로서 내버려 둘 수 없으니까! 얌전히 체포당해!」"

[[dialogue]]
speaker = "アポロ"
original = "「へ──やーだよっと！\u3000お星さまを捕まえたいなら、３回祈って手を伸ばすのだ！」"
translation = "「헤── 싫거든! 별님을 잡고 싶다면, 세 번 기도하고 손을 뻗는 거다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ──こら！」"
translation = "「앗── 이봐!」"

[[dialogue]]
speaker = "unk"
original = "しかしアポロは大剣を担ぎながら、バッタのように建物と建物を飛び回って逃げてしまう。"
translation = "하지만 아폴로는 대검을 짊어진 채, 메뚜기처럼 건물과 건물을 뛰어다니며 도망쳐 버린다."

[[dialogue]]
speaker = "アポロ"
original = "「そんなチンケな状態の『魔王』を倒したって面白くない！\u3000せっかく出会えたんだからな──もっとどんちゃん騒ぎにしてやるぜ！」"
translation = "「그런 시시한 상태의 『마왕』을 쓰러뜨려 봤자 재미없어! 모처럼 만났으니까── 좀 더 시끌벅적하게 만들어 줄 테다!」"

[[dialogue]]
speaker = "アポロ"
original = "「ひゃっほーう！\u3000パーティの始まりだ～！」"
translation = "「햐앗호우! 파티 시작이다～!」"

[[dialogue]]
speaker = "モンスター"
original = "「ウィイイイン！！」"
translation = "「위이이잉!!」"

[[dialogue]]
speaker = "モンスター"
original = "「ィィィィッ──！！」"
translation = "「이이이이잇──!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「も～。滅茶苦茶やってくれるわね～」"
translation = "「모ー. 엉망진창으로 만들어 버리네.」"

[[dialogue]]
speaker = "アナ"
original = "「追わないと。被害がどんどん広がる」"
translation = "「쫓아야 합니다. 피해가 계속 확산됩니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「でも、モンスターが……！」"
translation = "「하지만, 몬스터가……!」"

[[dialogue]]
speaker = "unk"
original = "逃げたアポロを追うのも簡単じゃない。"
translation = "도망친 아폴로를 쫓는 것도 쉽지 않다."

[[dialogue]]
speaker = "unk"
original = "彼女が移動するにも大剣を振るいまくるので、破壊とモンスターの創生が高回転で行われていくのだ。"
translation = "그녀가 이동할 때도 대검을 계속 휘두르기 때문에, 파괴와 몬스터의 창조가 고속으로 이루어지고 있는 것이다."

[[dialogue]]
speaker = "クロト"
original = "「悪い、みんな。どうやら俺が招いた存在らしいが──とにかく緊急の対処を頼む」"
translation = "「미안, 모두. 아무래도 내가 불러들인 존재인 것 같지만── 어쨌든 긴급 대처를 부탁해.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「当たり前よ！\u3000モンスターの掃討をしつつ、あのコを追うわ！」"
translation = "「당연하지! 몬스터 소탕을 하면서, 저 아이를 쫓을 거야!」"

