[[dialogue]]
speaker = "unk"
original = "覚醒したサチとディーラックの『幸運』のぶつかり合い。"
translation = "각성한 사치와 디럭쿠의 『행운』의 충돌."

[[dialogue]]
speaker = "unk"
original = "その行く末は果たして――"
translation = "그 행방은 과연──"

[[dialogue]]
speaker = "ディーラック"
original = "「何故サ……！？\u3000サチちゃんだけならまだしも、全員に幸運のロストアイテムが通用してない！」"
translation = "「어째서라네……!? 사치 짱뿐이라면 몰라도, 전원에게 행운의 로스트 아이템이 통하지 않아!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「これは、私だけの力じゃありませんから。私の幸運の星は――ここにいるみんなです！」"
translation = "「이것은 저만의 힘이 아니니까요. 저의 행운의 별은── 여기 있는 모두예요!」"

[[dialogue]]
speaker = "unk"
original = "そう、サチの進化した幸運によって、俺たちの攻撃はディーラックに全て<b>当たる</b>ようになっていた。"
translation = "그렇다, 사치의 진화한 행운에 의해 우리들의 공격은 디럭쿠에게 전부 <b>맞게</b> 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "それは、トレジアンナさんが作った機能ではなく、サチ自身で覚醒させた『自身だけでなく周囲にも幸運を与える』という新たな力。"
translation = "그것은 트레지안나 씨가 만든 기능이 아니라, 사치 스스로 각성시킨 『자신뿐만 아니라 주위에도 행운을 주는』 새로운 힘."

[[dialogue]]
speaker = "ディーラック"
original = "「くっ……！\u3000だったら、こっちも幸運の最大出力をぶつけるまでサ！\u3000――ハアアアァッ！！」"
translation = "「큭……! 그렇다면 이쪽도 행운의 최대 출력을 부딪칠 뿐이라네! ──하아아아앗!!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ルーレットフルスロットル！」"
translation = "「룰렛 풀 스로틀!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「輝け、明日を照らす光」"
translation = "「빛나라, 내일을 비추는 빛」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「――マジカルシャイニングスター！！」"
translation = "「──매지컬 샤이닝 스타!!」"

[[dialogue]]
speaker = "unk"
original = "サチとディーラックの放った凄まじい幸運のエネルギーが衝突し、拮抗する。"
translation = "사치와 디럭쿠가 뿜어낸 엄청난 행운의 에너지가 충돌하며 팽팽하게 맞선다."

[[dialogue]]
speaker = "ディーラック"
original = "「サチちゃん！\u3000この運試しに勝って、戦いを終わらせるのサ！」"
translation = "「사치 짱! 이 운 시험에서 이겨서 전쟁을 끝내는 거라네!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「――いいえ。ディーラックさん、終わらせるのは、私たちのどちらでもありません」"
translation = "「──아니요. 디럭쿠 씨, 끝내는 것은 우리들 중 어느 쪽도 아니에요」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん！」"
translation = "「디 짱!」"

[[dialogue]]
speaker = "ディーラック"
original = "「っ！\u3000シズハちゃん……！」"
translation = "「윽! 시즈하 짱……!」"

[[dialogue]]
speaker = "シズハ"
original = "「今度こそ、止めてみせる！\u3000あなたの友達として！」"
translation = "「이번에야말로 멈춰 보이겠어! 당신의 친구로서!」"

[[dialogue]]
speaker = "シズハ"
original = "「聖杯ちゃん、どうか願いを叶えて」"
translation = "「성배 짱, 부디 소원을 들어줘」"

[[dialogue]]
speaker = "シズハ"
original = "「――インフィニット・オーバーフロー！！！」"
translation = "「──인피니트 오버플로우!!!」"

[[dialogue]]
speaker = "unk"
original = "シズハの願いに応えて、彼女の中にある聖杯から膨大な魔力が溢れ出し、それを収束して撃ち放つ。"
translation = "시즈하의 소원에 응하여 그녀의 안에 있는 성배에서 방대한 마력이 넘쳐흐르고, 그것을 수렴하여 발사한다."

[[dialogue]]
speaker = "unk"
original = "それはサチの幸運の力によって融合反応を起こし、虹色の輝く星となってディーラックの最大出力を押し返す。"
translation = "그것은 사치의 행운의 힘에 의해 융합 반응을 일으켜, 무지갯빛으로 빛나는 별이 되어 디럭쿠의 최대 출력을 밀어낸다."

[[dialogue]]
speaker = "ディーラック"
original = "「くっ――うおおおおおおおおおぉっ！！？」"
translation = "「큭── 우오오오오오오오옷!!?」"

[[dialogue]]
speaker = "ディーラック"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ディーラック"
original = "「また……シズハちゃんに邪魔をされたのサ……」"
translation = "「또…… 시즈하 짱에게 방해받았다네……」"

[[dialogue]]
speaker = "ディーラック"
original = "「くっ……」"
translation = "「큭……」"

[[dialogue]]
speaker = "シズハ"
original = "「！\u3000ディーちゃんっ」"
translation = "「! 디 짱」"

[[dialogue]]
speaker = "unk"
original = "力を失い、幸運のロストアイテムと共に地面に倒れ伏したディーラック。"
translation = "힘을 잃고 행운의 로스트 아이템과 함께 지면에 쓰러진 디럭쿠."

[[dialogue]]
speaker = "unk"
original = "シズハがすぐに駆け寄って、抱き起こす。"
translation = "시즈하가 곧장 달려가 안아 일으킨다."

[[dialogue]]
speaker = "シズハ"
original = "「大丈夫！？\u3000命は奪わないようにって、聖杯ちゃんにお願いはしたけど……」"
translation = "「괜찮아!? 목숨은 뺏지 말아 달라고 성배 짱에게 부탁하긴 했지만……」"

[[dialogue]]
speaker = "ディーラック"
original = "「アハハ、つくづく甘いネ、シズハちゃん……そんな情けを敵のボクにかけるなんて……」"
translation = "「아하하, 끝까지 무르네, 시즈하 짱…… 그런 자비를 적인 나에게 베풀다니……」"

[[dialogue]]
speaker = "ディーラック"
original = "「でも――キミならそうやって、ボクのすぐ近くまで来てくれると思っていたサ……！」"
translation = "「하지만── 너라면 그렇게, 내 바로 근처까지 와줄 거라고 생각했다네……!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「いかん！\u3000そやつから離れろ、シズハ！」"
translation = "「안 되느니라! 그놈에게서 떨어져라, 시즈하!」"

[[dialogue]]
speaker = "ディーラック"
original = "「もう遅いのサ」"
translation = "「이미 늦었다네」"

[[dialogue]]
speaker = "unk"
original = "ディーラックが幸運のロストアイテムをシズハの前に浮かせて、何らかの術式を発動させる。"
translation = "디럭쿠가 행운의 로스트 아이템을 시즈하 앞에 띄우고 어떤 술식을 발동시킨다."

[[dialogue]]
speaker = "シズハ"
original = "「あ……！？」"
translation = "「아……!?」"

[[dialogue]]
speaker = "unk"
original = "シズハの体が光り輝いて、それは程なくして収まる。"
translation = "시즈하의 몸이 빛나고, 그것은 이윽고 잦아든다."

[[dialogue]]
speaker = "unk"
original = "そして、直後に幸運のロストアイテムは、粉々に砕け散った。"
translation = "그리고 직후에 행운의 로스트 아이템은 산산조각이 났다."

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「シズハちゃん、大丈夫！？」"
translation = "「시즈하 짱, 괜찮아!?」"

[[dialogue]]
speaker = "シズハ"
original = "「う、うん……。特に何も……」"
translation = "「응, 응…… 딱히 아무렇지도……」"

[[dialogue]]
speaker = "ディーラック"
original = "「……急造の物にしては、なかなか保った方なんじゃないかな、<b>疑似</b>ロストアイテム……」"
translation = "「……급조한 것치고는 제법 버틴 편 아닐까, <b>의사</b> 로스트 아이템……」"

[[dialogue]]
speaker = "ディーラック"
original = "「戦いには負けちゃったけど……これで、最低限の目的は叶えたサ……」"
translation = "「싸움에는 져버렸지만…… 이걸로 최소한의 목적은 이뤘다네……」"

[[dialogue]]
speaker = "ディーラック"
original = "「でも……ハハ……。我ながら…………なんて愚かな…………」"
translation = "「하지만…… 하하…… 내가 생각해도………… 얼마나 어리석은지…………」"

[[dialogue]]
speaker = "ディーラック"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん……！？\u3000しっかりして、ディーちゃんっ！！」"
translation = "「디 짱……!? 정신 차려, 디 짱!!」"

[[dialogue]]
speaker = "unk"
original = "そうして、ディーラックが力尽きて動かなくなった後も、シズハはいつまでも寄り添い続けるのだった――"
translation = "그렇게 디럭쿠가 기력을 다해 움직이지 않게 된 후에도, 시즈하는 언제까지나 곁을 지키고 있었다──"

