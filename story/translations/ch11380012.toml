[[dialogue]]
speaker = "unk"
original = "第２話,メルエルと百合スキンシップ,P"
translation = "제2화, 메르엘과 백합 스킨십, P"

[[dialogue]]
speaker = "unk"
original = "望みを叶えたことで無事、メルエルは元の１人へと戻ることができた。"
translation = "소원을 이룸으로써 무사히, 메르엘은 원래의 한 명으로 돌아올 수 있었다."

[[dialogue]]
speaker = "unk"
original = "それから１週間後のこと。"
translation = "그로부터 1주일 후의 일."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「か、会長くん、あのね……すぅ～、はぁ～……よし！」"
translation = "「회, 회장군, 저기…… 후우~, 하아~…… 좋아!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――私、実はまた、会長くんにお願いしたいことがあるの！」"
translation = "「――나, 사실은 또, 회장군에게 부탁하고 싶은 게 있어!」"

[[dialogue]]
speaker = "unk"
original = "メルエルは『リトルフォーム』として、自分の意思で小さな姿に変身できるようになっていた。"
translation = "메르엘은 『리틀 폼』으로서, 자신의 의지로 작은 모습으로 변신할 수 있게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "そうして勇気を出す為に変身することで、前より自分が望んでいることを積極的に口にするようになっていた。"
translation = "그렇게 용기를 내기 위해 변신함으로써, 전보다 자신이 바라는 것을 적극적으로 입에 담게 되었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私……女の子に変身した会長くんとも、イチャイチャしてみたくて！」"
translation = "「나…… 여자아이로 변신한 회장군이랑도, 꽁냥꽁냥해보고 싶어서!」"

[[dialogue]]
speaker = "unk"
original = "ん！？\u3000なんて！？"
translation = "응!? 뭐라고!?"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「その……会長くんにも一応『リトルフォーム』があるでしょ？\u3000前にそれで一時期、附属校に通ってたことがあるじゃない？」"
translation = "「그게…… 회장군에게도 일단 『리틀 폼』이 있잖아? 전에 그걸로 한동안, 부속교에 다녔던 적이 있었지?」"

[[dialogue]]
speaker = "unk"
original = "元々はアニマ先輩が趣味で作っていたという、俺専用の附属生女子の義体のことだ。"
translation = "원래는 아니마 선배가 취미로 만들었다는, 내 전용 부속생 여자의 의체를 말하는 것이다."

[[dialogue]]
speaker = "unk"
original = "現在はフォームチェンジ技術の発展によって、いつでも変身できるようになっていた。"
translation = "현재는 폼 체인지 기술의 발전으로 인해, 언제든 변신할 수 있게 되어 있었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「会長くんは、女の子に変身するの恥ずかしいから、あんまり変身しないようにしてるって言ってたけど……」"
translation = "「회장군은, 여자아이로 변신하는 게 부끄러우니까, 별로 변신하지 않으려고 한다고 말했지만……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私、女の子の会長くんとも仲良くしてみたいな～って、本当は思ってて……！」"
translation = "「나, 여자아이인 회장군이랑도 사이좋게 지내보고 싶다고, 사실은 생각하고 있어서……!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「だってだって！\u3000大好きな恋人の男の子が、可愛い女の子に変身できるんだよ！？」"
translation = "「그치만 그치만! 정말 좋아하는 연인인 남자애가, 귀여운 여자아이로 변신할 수 있는 거잖아!?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「恋人として触れ合うとどんな感じがするのかって、好奇心で色々妄想しちゃうというか……<emoji=heart04>」"
translation = "「연인으로서 서로 닿으면 어떤 느낌이 들지, 호기심에 이것저것 망상하게 된달까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――前にも見たことあるんじゃないかって？\u3000う、うん。でもあの時は、会長くんから変に思われるのが恥ずかしくて……」"
translation = "「――전에도 본 적 있지 않냐고? 으, 응. 하지만 그때는, 회장군이 이상하게 생각할까 봐 부끄러워서……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「でも、会長くんともっと親密になる為にも、試してみたいな～って……ダメかなぁ？」"
translation = "「하지만, 회장군이랑 좀 더 친밀해지기 위해서라도, 시도해보고 싶달까~…… 안 될까?」"

[[dialogue]]
speaker = "unk"
original = "わ、わかった。そこまで言うなら……"
translation = "아, 알았어. 그렇게까지 말한다면……"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「本当！？\u3000ありがとう<emoji=heart04>\u3000会長くん、大好きっ<emoji=heart04>」"
translation = "「정말!? 고마워<emoji=heart04> 회장군, 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「はあぁ～～<emoji=heart04>\u3000会長くんのリトルフォーム、改めて見てもやっぱり可愛いよぉ<emoji=heart04>」"
translation = "「하아아~~<emoji=heart04> 회장군의 리틀 폼, 다시 봐도 역시 귀여워어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の家へと移動して２人きりになったところで、附属生女子の姿に変身してみせると、メルエルは目を輝かせながら眺めてくる。"
translation = "내 집으로 이동해 단둘이 되었을 때, 부속생 여자의 모습으로 변신해 보이자, 메르엘은 눈을 반짝이며 바라본다."

[[dialogue]]
speaker = "unk"
original = "一応、大きい女体化フォームもあるけど……"
translation = "일단, 커다란 여체화 폼도 있지만……"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「そ、そっちも興味はあるけど……おっきい方は美人過ぎて刺激が強いから、まずは附属生の女の子になった会長くんから……<emoji=heart04>」"
translation = "「그, 그쪽도 흥미는 있지만…… 큰 쪽은 너무 미인이라 자극이 강하니까, 우선은 부속생 여자아이가 된 회장군부터……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「じゃあその……会長くん、触れてみても、いいかな？」"
translation = "「그럼 저기…… 회장군, 만져봐도, 될까?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――それじゃあ、えっと……まずは髪を触るね？」"
translation = "「――그럼, 에또…… 우선은 머리카락을 만질게?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、メルエルの手が優しく、俺の長くなった髪を撫でてくる。"
translation = "그렇게 말하며, 메르엘의 손이 부드럽게, 내 길어진 머리카락을 쓰다듬어 온다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「はあぁぁ……<emoji=heart04>\u3000すごくさらさらで、綺麗な黒髪……それに、会長くんの肌も……」"
translation = "「하아아아……<emoji=heart04> 정말 찰랑거리고, 예쁜 흑발…… 게다가, 회장군의 피부도……」"

[[dialogue]]
speaker = "unk"
original = "今度は俺の頬に、メルエルの指が触れる。"
translation = "이번에는 내 뺨에, 메르엘의 손가락이 닿는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「へ、変な感じ……<emoji=heart04>\u3000今は同性なのに、相手が会長くんだって思うと、胸がドキドキしてきちゃう<emoji=heart04>」"
translation = "「이, 이상한 기분……<emoji=heart04> 지금은 동성인데도, 상대가 회장군이라고 생각하면, 가슴이 두근거려버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ね、ねぇ、会長くん……抱きしめてみても、いいかなっ？」"
translation = "「저, 저기, 회장군…… 안아봐도, 될까?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷くと、お互いに背中へと手を回して、そっと抱き合う。"
translation = "내가 고개를 끄덕이자, 서로의 등에 손을 돌려 살며시 껴안는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ん……<emoji=heart04>\u3000いつも抱き合う時とは、違う感覚<emoji=heart04>\u3000女の子の体って、こんなに柔らかいんだ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 평소에 껴안을 때와는, 다른 감각<emoji=heart04> 여자아이의 몸은, 이렇게나 부드럽구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「それに、会長くんの匂いも、いつもと違う……<emoji=heart04>」"
translation = "「게다가, 회장군의 냄새도, 평소랑 달라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――ううん、全然イヤな匂いじゃないよ<emoji=heart04>\u3000男の子の時よりも甘い感じの匂いで……もっとイチャイチャしたい気分になってきちゃう<emoji=heart04>」"
translation = "「――아니, 전혀 싫은 냄새가 아니야<emoji=heart04> 남자애일 때보다 달콤한 느낌의 냄새라서…… 좀 더 꽁냥꽁냥하고 싶은 기분이 되어버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も……このままキス、してもいい？"
translation = "나도…… 이대로 키스, 해도 돼?"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「！\u3000そ、そうだよね。見た目は女の子でも、会長くんは男の子だもん。こんな風にくっ付いてたら……キス、してきたくなっちゃうよね<emoji=heart04>」"
translation = "「! 그, 그렇네. 겉모습은 여자아이라도, 회장군은 남자애인걸. 이런 식으로 달라붙어 있으면…… 키스, 하고 싶어지겠지<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私も……大丈夫<emoji=heart04>\u3000ドキドキしてて、凄くしたいって気分に、なってるから……<emoji=heart04>」"
translation = "「나도…… 괜찮아<emoji=heart04> 두근거려서, 엄청 하고 싶다는 기분이, 들고 있으니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「どうぞ<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「어서 해줘<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って目を閉じるメルエルの唇に、俺はそっと唇を落とす。"
translation = "그렇게 말하며 눈을 감는 메르엘의 입술에, 나는 살며시 입술을 내린다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ちゅっ<emoji=heart04>\u3000んむっ……<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 음무……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――はあぁあっ<emoji=heart04>\u3000会長くん……<emoji=heart04>」"
translation = "「――하아아앗<emoji=heart04> 회장군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「すごい……<emoji=heart04>\u3000女の子同士のキスでも、メルトしちゃいそう……<emoji=heart04>」"
translation = "「대단해……<emoji=heart04> 여자끼리의 키스라도, 멜트해버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私、もし会長くんが女の子だったとしても……やっぱり同じように恋に落ちてたんじゃないかって気がするよぉ<emoji=heart04>」"
translation = "「나, 만약 회장군이 여자아이였다고 해도…… 역시 똑같이 사랑에 빠졌을 것 같은 기분이 들어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「だって……触れ合ってるとこんなに甘くて、ドキドキしちゃうんだもん<emoji=heart04>」"
translation = "「그치만…… 서로 닿아 있으면 이렇게나 달콤하고, 두근거려버리는걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ねぇ……もっと試してもいいかなぁ？」"
translation = "「저기…… 좀 더 해봐도 될까?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷くと、メルエルの体をまた抱き寄せる。"
translation = "내가 고개를 끄덕이자, 메르엘의 몸을 다시 끌어안는다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あっ<emoji=heart04>\u3000んんっ……ちゅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응으…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その日は女の子の体に変身したままで、メルエルとたくさん触れ合って過ごすのだった。"
translation = "그날은 여자아이의 몸으로 변신한 채로, 메르엘과 잔뜩 스킨십을 하며 시간을 보내는 것이었다."

