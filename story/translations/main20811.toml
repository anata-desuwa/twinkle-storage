[[dialogue]]
speaker = "unk"
original = "第１２話,厄災の手,B"
translation = "제12화, 재앙의 손, B"

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドは俺たちを圧し潰さんと、上空からゆっくりと近づいてくる。"
translation = "디재스터 핸드는 우리를 짓눌러 죽이려는 듯 상공에서 천천히 다가온다."

[[dialogue]]
speaker = "unk"
original = "手からは破壊のエネルギーが迸っており、その余波だけで俺たちを絶命させるには十分だろう。"
translation = "손에서는 파괴의 에너지가 뿜어져 나오고 있으며, 그 여파만으로도 우리를 절명시키기에 충분할 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「くっ……！\u3000このままじゃ、あの手に潰される前に、木っ端ミジンコにされちゃうわ！」"
translation = "「큭……! 이대로라면 저 손에 깔리기 전에 가루가 되어버리겠어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「チェンジ・ノヴァフォーム！」"
translation = "「체인지 노바 폼!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「クロトたちは私が守るんだから！」"
translation = "「쿠로토 일행은 내가 지킬 거니까!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私も行きます。──アルケインソーラーブレイズ！」"
translation = "「저도 가겠어요. ──아르케인 솔라 블레이즈!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「やらせません！」"
translation = "「하게 두지 않겠어요!」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームのヴィーナスと、魔王の力を解き放ったフィオナが障壁を生み出し、ディザスターハンドの衝撃波を弾き返す。"
translation = "노바 폼의 비너스와 마왕의 힘을 해방한 피오나가 장벽을 만들어내어 디재스터 핸드의 충격파를 튕겨낸다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ふふん、どんなもんよ！」"
translation = "「후훙, 어떠냐!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「くっ……このプレッシャーは……！」"
translation = "「큭…… 이 압박감은……!」"

[[dialogue]]
speaker = "unk"
original = "今は何とか抑えられているが、ノヴァフォームも魔王フォームも消耗が激しい。"
translation = "지금은 어떻게든 억누르고 있지만, 노바 폼도 마왕 폼도 소모가 격심하다."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドを押さえるとなれば、あと何秒持つか──"
translation = "디재스터 핸드를 막아낸다면 앞으로 몇 초나 버틸 수 있을지──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん、あとどのくらいかかりそう？」"
translation = "「어머니, 앞으로 얼마나 걸릴 것 같아?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「１０分……いや、７分！」"
translation = "「10분…… 아니, 7분!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いっそこのまま飛び込んじゃう？」"
translation = "「차라리 이대로 뛰어들어 버릴까?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それはダメ！\u3000ベガに出たりしたら二度と帰って来れなくなるわ！」"
translation = "「그건 안 돼! 베가로 나가기라도 하면 두 번 다시 돌아올 수 없게 돼!」"

[[dialogue]]
speaker_original = "ホルン"
speaker_translation = "호른"
original = "「クルル！」"
translation = "「쿠루루!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルル！」"
translation = "「부르르!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「極星従騎が……！\u3000諸共に叩き潰すつもりか！」"
translation = "「극성종기가……! 한꺼번에 짓뭉개버릴 셈인가!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さんとヴィーナス、フィオナを守るんだ！」"
translation = "「어머니와 비너스, 피오나를 지키는 거야!」"

[[dialogue]]
speaker = "unk"
original = "アルタイルへの道を繋ごうとしている母さんと、ディザスターハンドを止めている２人がやられれば、俺たちは全滅する。"
translation = "알타이르로 가는 길을 이으려 하는 어머니와 디재스터 핸드를 막고 있는 두 사람이 당하면 우리는 전멸한다."

[[dialogue]]
speaker = "unk"
original = "ここは無理やりにでも凌ぐしかない……！"
translation = "여기는 억지로라도 버텨낼 수밖에 없다……!"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「おおおっ！！」"
translation = "「오오오옷!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「撃ち貫く！」"
translation = "「꿰뚫어 주마!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そこだよ」"
translation = "「거기야.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「私もお手伝いします……！」"
translation = "「저도 돕겠습니다……!」"

[[dialogue]]
speaker = "unk"
original = "無防備な母さんたちを狙う極星従騎をみんなで食い止める。"
translation = "무방비한 어머니 일행을 노리는 극성종기를 모두 함께 막아선다."

[[dialogue]]
speaker = "unk"
original = "だがいくらガーディアンを切り裂き、打ち砕いても、次から次へとなだれ込んでくる。"
translation = "하지만 아무리 가디언을 베어 넘기고 때려 부숴도, 차례차례 밀려 들어온다."

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ヒィン……！」"
translation = "「히잉……!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうはさせない！\u3000アビスインパクト！」"
translation = "「그렇게 두지 않아! 어비스 임팩트!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルル……！」"
translation = "「부르르르……!」"

[[dialogue]]
speaker = "unk"
original = "闇を帯びた拳で、極星従騎の突進を相殺する。"
translation = "어둠을 두른 주먹으로 극성종기의 돌진을 상쇄한다."

[[dialogue]]
speaker = "unk"
original = "だが倒すには至らず、極星従騎が返す刀で剣を振るう。"
translation = "하지만 쓰러뜨리는 데는 이르지 못하고, 극성종기가 되받아치며 검을 휘두른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "unk"
original = "魔王の力を封印した今の俺では、極星従騎を撃破するのは容易ではない。"
translation = "마왕의 힘을 봉인한 지금의 나로서는 극성종기를 격파하는 것이 쉽지 않다."

[[dialogue]]
speaker = "unk"
original = "このままでは押し切られ、ヴィーナスたちもやられてしまう。"
translation = "이대로라면 밀려나게 되고, 비너스 일행도 당하고 만다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（なら<ruby>厄災<rt>リクリエ</rt></ruby>の力を呼び起こす──！）"
translation = "（그렇다면 <ruby>재앙<rt>리크리에</rt></ruby>의 힘을 불러일으킨다──!）"

[[dialogue]]
speaker = "unk"
original = "俺の中の破滅の力を全て開放すれば、俺は呑まれてしまうだろう。"
translation = "내 안의 파멸의 힘을 전부 개방하면, 나는 집어삼켜지고 말 것이다."

[[dialogue]]
speaker = "unk"
original = "激流のように溢れ出ようとする暴威、その一滴を拳に宿す。"
translation = "격류처럼 넘쳐흐르려 하는 폭위, 그 한 방울을 주먹에 깃들인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デッドリークラスター！！」"
translation = "「데들리 클러스터!!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "<ruby>厄災<rt>リクリエ</rt></ruby>をまとった拳がガーディアンを貫き、剣ごと粉々に打ち砕いた。"
translation = "<ruby>재앙<rt>리크리에</rt></ruby>를 두른 주먹이 가디언을 관통하고, 검과 함께 산산조각 냈다."

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ありがとう、クロト！」"
translation = "「고마워, 쿠로토!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「おばあちゃん、あと何分？」"
translation = "「할머니, 앞으로 몇 분?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ごめん、あと５分……！」"
translation = "「미안, 앞으로 5분……!」"

[[dialogue]]
speaker = "unk"
original = "母さんが顔を歪めて空間の穴を調整している間もディザスターハンドは迫ってくる。"
translation = "어머니가 얼굴을 찌푸리며 공간의 구멍을 조정하는 동안에도 디재스터 핸드는 다가온다."

[[dialogue]]
speaker = "unk"
original = "同じくルヴィネの配下のはずの極星従騎も、その力の奔流に巻き込まれて砕け散っていた。"
translation = "마찬가지로 루비네의 부하일 터인 극성종기도 그 힘의 분류에 휘말려 부서져 나가고 있었다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「まるで星がそのまま落ちてくるような圧力……魔王フォームでも、潰されないだけで精一杯です……！」"
translation = "「마치 별이 그대로 떨어지는 듯한 압력…… 마왕 폼으로도 짓눌리지 않게 버티는 게 고작이에요……!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ぐっ……くぅぅっ……やらせないわよ……！」"
translation = "「윽…… 으으으윽…… 하게 두지 않을 거야……!」"

[[dialogue]]
speaker = "unk"
original = "フィオナとヴィーナスが耐えてくれているが、２人の表情にも苦悶が現れていて、限界が近い。"
translation = "피오나와 비너스가 버텨주고 있지만, 두 사람의 표정에도 고통이 나타나 한계가 가깝다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「２人とも、あともう少しだけ耐えてくれ……！」"
translation = "「둘 다, 조금만 더 버텨줘……!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「もちろんよ！\u3000こんなところで死んでたまるもんですか！」"
translation = "「당연하지! 이런 곳에서 죽을까 보냐!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「はい、私たちは元の世界に帰らないといけませんから！」"
translation = "「네, 저희는 원래 세계로 돌아가야 하니까요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「これをルヴィが……」"
translation = "「이것을 루비가……」"

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドの暴威を目の当たりにして、呆然とするベアトリス。"
translation = "디재스터 핸드의 폭위를 눈앞에서 목격하고 망연자실하는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "ルヴィネはデネブの救世主で、ベアトリスの親友だった。"
translation = "루비네는 데네브의 구세주이자 베아트리스의 친우였다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私も信じていたものが敵になったことがある」"
translation = "「나도 믿었던 것이 적이 된 적이 있어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だけどルヴィネと話をするなら、ここで倒れるわけにはいかない。文句があるならルヴィネに直接ぶつけるんだ」"
translation = "「하지만 루비네와 대화하려면 여기서 쓰러질 수는 없어. 불만이 있다면 루비네에게 직접 부딪쳐.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……」"
translation = "「리오짱……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん……！\u3000ルヴィが女神様なんて、まだ信じられないけど……このままじゃ終われない……！」"
translation = "「응……! 루비가 여신님이라니, 아직 믿기지 않지만…… 이대로 끝낼 수는 없어……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「クリムゾンカーニバル！」"
translation = "「크림슨 카니발!」"

[[dialogue]]
speaker_original = "ホルン"
speaker_translation = "호른"
original = "「クルルーーッ！？」"
translation = "「쿠루루우──!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの槍が赤い軌跡を描いて極星従騎を貫く。"
translation = "베아트리스의 창이 붉은 궤적을 그리며 극성종기를 꿰뚫는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「その調子だ、ベアト！」"
translation = "「그 기세다, 베아토!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん。私、戦うよ。まだ全然納得いってないから！」"
translation = "「응. 나, 싸울게. 아직 전혀 납득하지 못했으니까!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そうこなくっちゃね。頼りにしてるよ」"
translation = "「그렇게 나와야지. 믿고 있다고.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「アルタイルへの接続まで……あと１分！\u3000もうちょっとよ！」"
translation = "「알타이르로의 접속까지…… 앞으로 1분! 조금만 더 하면 돼!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ、はぁ……くっ……」"
translation = "「하아, 하아…… 큭……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あと少しなのに……！」"
translation = "「조금만 더 남았는데……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナ！\u3000ヴィーナス！」"
translation = "「피오나! 비너스!」"

[[dialogue]]
speaker = "unk"
original = "だが今までディザスターハンドのエネルギーを受け止めていたヴィーナスとフィオナも、限界を迎えて元のフォームに戻ってしまう。"
translation = "하지만 지금까지 디재스터 핸드의 에너지를 받아내던 비너스와 피오나도 한계를 맞이해 원래 모습으로 돌아가 버린다."

[[dialogue]]
speaker = "unk"
original = "その瞬間、障壁が砕け、ディザスターハンドが迫ってくる。"
translation = "그 순간 장벽이 부서지고 디재스터 핸드가 육박해온다."

[[dialogue]]
speaker = "unk"
original = "まるで空が落ちてくるように、巨大な手が俺たちを潰そうとして──"
translation = "마치 하늘이 떨어지듯 거대한 손이 우리를 짓뭉개려 할 때──"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「アルケインソーラーブレイズ！！」"
translation = "「아르케인 솔라 블레이즈!!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ぶっつけ本番で使いたくはなかったが、なんとかうまくいったな……」"
translation = "「실전에서 바로 쓰고 싶지는 않았지만, 어떻게든 잘 됐군……」"

[[dialogue]]
speaker = "unk"
original = "アポロが二振りの剣を交差させ、光の刃でディザスターハンドを受け止めた。"
translation = "아폴로가 두 자루의 검을 교차시켜 빛의 칼날로 디재스터 핸드를 받아냈다."

[[dialogue]]
speaker = "unk"
original = "赤と青の巨大な刃が、かろうじて破滅の化身を押しとどめている。"
translation = "붉고 푸른 거대한 칼날이 간신히 파멸의 화신을 저지하고 있다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いつの間にアルケインコードを！？」"
translation = "「어느 사이에 아르케인 코드를!?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ルヴィネの尾行をしている間に、フィオナから伝授してもらったんだ。あたしも魔王だからな」"
translation = "「루비네를 미행하는 동안 피오나에게 전수받았다. 나도 마왕이니까 말이야.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「アルタイルへの接続……完了！」"
translation = "「알타이르로의 접속…… 완료!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「今なら次元の穴は安定しているわ。あの穴に飛び込めば、アルタイルの流星市国に帰れるはずよ」"
translation = "「지금이라면 차원의 구멍이 안정되어 있어. 저 구멍으로 뛰어들면 알타이르의 유성시국으로 돌아갈 수 있을 거야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おばあちゃん……！」"
translation = "「할머니……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも母さんは──」"
translation = "「하지만 어머니는──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いいから行きなさい。息子と孫を送り出すのが、私の夢だったんだから」"
translation = "「됐으니까 가렴. 아들과 손녀를 배웅하는 게 내 꿈이었으니까.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「大丈夫。何とかする算段は立ててあるわ。空間の魔女を甘く見ないで」"
translation = "「괜찮아. 어떻게든 할 방도는 세워뒀어. 공간의 마녀를 얕보지 마렴.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ここはあたしたち大人に任せろ。お前たちはさっさとアルタイルに帰れ」"
translation = "「여기는 우리 어른들에게 맡겨라. 너희는 어서 알타이르로 돌아가.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待て、アポロ……！」"
translation = "「기다려, 아폴로……!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「行くよ、梨緒」"
translation = "「가자, 리오.」"

[[dialogue]]
speaker = "unk"
original = "アポロに手を伸ばそうとする梨緒の肩を、ナターシャが掴んだ。"
translation = "아폴로에게 손을 뻗으려는 리오의 어깨를 나타샤가 붙잡았다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「巻き込んで悪いんだけど、エステルもアルタイルに来てもらうよ。デネブじゃ危険だからね」"
translation = "「말려들게 해서 미안하지만, 에스텔도 알타이르로 가줘야겠어. 데네브는 위험하니까 말이야.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「は、はいっ」"
translation = "「네, 넷.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ごめんね、エステルちゃん」"
translation = "「미안해, 에스텔짱.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「いえ、自分で決めたことですから」"
translation = "「아니요, 스스로 결정한 일이니까요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ俺たち行くよ、母さん」"
translation = "「그럼 우리 갈게, 어머니.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええ、行ってらっしゃい！」"
translation = "「응, 다녀오렴!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「じゃあまたな、みんな」"
translation = "「그럼 또 보자, 모두들.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「フィオナも達者でな。久しぶりに会えて嬉しかったよ」"
translation = "「피오나도 잘 지내라. 오랜만에 만나서 기뻤어.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……はい、姉さん。私も会えて良かったです」"
translation = "「……네, 언니. 저도 만나서 좋았어요.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「梨緒も泣くのはいいがほどほどにな。あんまり泣き虫だと周りが困っちゃうぞ」"
translation = "「리오도 우는 건 좋지만 적당히 해라. 너무 울보라면 주변 사람들이 곤란해한다고.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今はそんなことはどうでもいい！\u3000君は──」"
translation = "「지금은 그런 건 아무래도 좋아! 너는──」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「大丈夫、あたしを信じろ」"
translation = "「괜찮아, 나를 믿어라.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そしてあたしも、お前を信じてるぞ……梨緒」"
translation = "「그리고 나도 너를 믿고 있다…… 리오.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……！\u3000ずるいだろう、そんな言い方……！」"
translation = "「……! 비겁하잖아, 그런 말투는……!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「さぁ、行け！\u3000そして世界を救ってこい！！」"
translation = "「자, 가라! 그리고 세계를 구하고 와라!!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「未来を切り拓け！\u3000──インフィニティユニバース！！」"
translation = "「미래를 개척해라! ──인피니티 유니버스!!」"

[[dialogue]]
speaker = "unk"
original = "アポロが斬撃を放つと同時に、俺たちは次元の裂け目に飛び込んだ。"
translation = "아폴로가 참격을 날림과 동시에 우리는 차원의 균열 속으로 뛰어들었다."

