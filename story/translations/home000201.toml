[[dialogue]]
speaker = "メイプル"
original = "「にっひっひ……！\u3000魔王マカロン様参上～っ！\u3000待ちくたびれちゃったかな、お兄ちゃんっ♪」"
translation = "「니히히……! 마왕 마카론 님 등장~! 많이 기다렸지, 오빠♪」"

[[dialogue]]
speaker = "ナナカ"
original = "「なんでいなんでい！\u3000いきなり出てきて妹ヒロインムーブたぁ、ちょっと目立ち過ぎなんじゃないの？」"
translation = "「뭐야 뭐야! 갑자기 튀어나와서 여동생 히로인 무브라니, 좀 너무 눈에 띄는 거 아냐?」"

[[dialogue]]
speaker = "ロロット"
original = "「そうです！\u3000わたしもかわいい後輩ポジションなので、ちやほやされたいです～！」"
translation = "「맞아요! 저도 귀여운 후배 포지션이니까 예쁨받고 싶어요~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ていうか、急にどうしちゃったのよメイプル！\u3000あなた、いつもはもうちょっとだけイタい感じだったじゃない！」"
translation = "「그보다 갑자기 왜 그러는 거야 메이플! 너 평소에는 조금 더 오글거리는 느낌이었잖아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あの……言葉のオブラートを突き破ってますし、さすがに少し失礼なのでは……？」"
translation = "「저기…… 말을 너무 가리지 않고 하시는데, 아무래도 조금 실례가 아닐지……?」"

[[dialogue]]
speaker = "メイプル"
original = "「だいぶ失礼だよっ！\u3000この魔王マカロン様に向かって～っ！」"
translation = "「상당히 실례야! 이 마왕 마카론 님을 향해서~!」"

[[dialogue]]
speaker = "ロロット"
original = "「まあ、おいしそうなお名前だということはわかりました」"
translation = "「뭐, 맛있어 보이는 이름이라는 건 알겠어요」"

[[dialogue]]
speaker = "ナナカ"
original = "「へんっ、どっちも甘いって？\u3000アタシもスウィーツには一家言あるんでね。覚悟しな！」"
translation = "「흥, 둘 다 달콤하다고? 나도 스위츠에는 일가견이 있거든. 각오해!」"

[[dialogue]]
speaker = "メイプル"
original = "「ちょっとはあたしの話を聞いてよ～っ！」"
translation = "「내 말 좀 들어줘~!」"

[[dialogue]]
speaker = "聖沙"
original = "「はぁ……他に突っ込むところは、いくらでもあるでしょうに。まったく、緊張感の欠片もないんだからっ」"
translation = "「하아…… 다른 태클 걸 곳은 얼마든지 있을 텐데. 정말이지, 긴장감이라곤 눈곱만큼도 없다니까」"

[[dialogue]]
speaker = "リア"
original = "「あはは……ナナカちゃんもロロットちゃんも、不思議な出来事には、意外と順応性があるのかも……？」"
translation = "「아하하…… 나나카짱도 로롯토짱도 신기한 일에는 의외로 순응력이 있는 걸지도……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、聖沙！\u3000それにリアさんも！」"
translation = "「앗, 미사! 게다가 리아 씨도!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ということはもしかして、あなたたちもクルセイダースの仲間なんですか……!?」"
translation = "「그렇다는 건 혹시 당신들도 크루세이더스 동료인가요……!?」"

[[dialogue]]
speaker = "ナナカ"
original = "「おっと、名乗り遅れちゃったね。流星生徒会会計、夕霧ナナカたぁ、アタシのことでい！」"
translation = "「오옷, 통성명이 늦었네. 유성 성도회 회계, 유우기리 나나카가 바로 나라고!」"

[[dialogue]]
speaker = "ロロット"
original = "「同じく、生徒会書記の、ロロット・ローゼンクロイツなのです！」"
translation = "「마찬가지로 성도회 서기인 로롯토 로젠크로이츠인 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「おやおや、ご冗談を。わたしこそが、ロロット・ローゼンクロイツです！」"
translation = "「이런 이런, 농담도 참. 저야말로 로롯토 로젠크로이츠입니다!」"

[[dialogue]]
speaker = "ナナカ"
original = "「えっ……じゃあ、このロロちゃんは誰？」"
translation = "「엣…… 그럼 이 로로짱은 누구야?」"

[[dialogue]]
speaker = "ロロット"
original = "「はて？\u3000少なくとも、天使ではありません」"
translation = "「글쎄요? 적어도 천사는 아닙니다」"

[[dialogue]]
speaker = "聖沙"
original = "「あぁ、この展開、なんだか既視感が……」"
translation = "「아아, 이 전개, 왠지 기시감이……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちょっとルリエル！\u3000あなたまさか、また厄介なことに巻き込まれてしまったのでは……!?」"
translation = "「잠깐 루리엘! 너 설마 또 귀찮은 일에 휘말려버린 거 아냐……!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「いえいえ、とても楽しいことですよ～」"
translation = "「아뇨아뇨, 아주 즐거운 일이에요~」"

[[dialogue]]
speaker = "ロロット"
original = "「おお、それはとっても楽しみなのです！」"
translation = "「오오, 그건 정말 기대되는 거예요!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ノリが適当すぎる！\u3000本物！」"
translation = "「반응이 너무 대충이야! 진짜네!」"

[[dialogue]]
speaker = "メイプル"
original = "「んも～っ！\u3000茶番はそこまでだよっ！\u3000み～んなおとなしく、あたしの目的のためにやっつけられちゃってよねっ！」"
translation = "「정말~! 장난은 여기까지야! 모두 얌전히 내 목적을 위해 당해달라고!」"

[[dialogue]]
speaker = "ナナカ"
original = "「えっ、なんか思ってたよりマジっぽかった！\u3000一体全体どうなっちまうんでい！」"
translation = "「엣, 뭔가 생각보다 진지한 느낌이야! 대체 어떻게 돌아가는 거야!」"

[[dialogue]]
speaker = "パッキー"
original = "「クックック……真相は、三日後に始まる、『ティンクル☆くるせいだーす』コラボ第二弾で、確かめるんだぜ！」"
translation = "「큭큭큭…… 진상은 사흘 뒤에 시작되는 『팅클☆크루세이더스』 콜라보 제2탄에서 확인하라고!」"

[[dialogue]]
speaker = "リア"
original = "「あ、また何か企んでるよね、これ……」"
translation = "「아, 또 뭔가 꾸미고 있네, 이거……」"

[[dialogue]]
speaker = "メイプル"
original = "「にひひっ♪\u3000ってことで、コラボ開始を楽しみにしててよねっ、お兄ちゃんっ♪」"
translation = "「니히히♪ 그런 고로, 콜라보 시작을 기대해 줘, 오빠♪」"

