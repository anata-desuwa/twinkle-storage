[[dialogue]]
speaker = "unk"
original = "第１話,シスターと聖女と友情と,P"
translation = "제1화, 시스터와 성녀와 우정과, P"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ええと、ここをこうして、こっちに通して……」"
translation = "「음, 여기를 이렇게 해서, 이쪽으로 통과시키고……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ああ、待った待った。その辺りから編み方が変わるのよ。今まで編んでたのはかかとの部分だから──」"
translation = "「아아, 잠깐 잠깐. 그쯤부터 뜨는 법이 바뀌어. 지금까지 떴던 건 뒤꿈치 부분이니까──」"

[[dialogue]]
speaker = "unk"
original = "２人で何してるんだ？"
translation = "둘이서 뭐 하고 있는 거야?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あ、会長さま。実は今度またクリスマス会がありまして。参加してくださった子どもたちに手編みの靴下をプレゼントしようとしているところなんです」"
translation = "「아, 회장님. 실은 이번에 또 크리스마스 파티가 있어서요. 참가해 주신 아이들에게 손뜨개 양말을 선물하려고 하던 참이에요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっ、バカ。教室に鍵かけといてって言ったじゃない。来たのがコイツじゃなかったらどうしてくれたのよ。完全に気ぃ抜いちゃってたのに」"
translation = "「잠깐, 바보. 교실 문 잠가두라고 했잖아. 온 게 이 녀석이 아니었으면 어쩔 뻔했어. 완전히 방심하고 있었는데」"

[[dialogue]]
speaker = "unk"
original = "クリスマス用の靴下って懐かしいな"
translation = "크리스마스용 양말이라니 그립네"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ええ。しかし最近は靴下を用意する家庭も減ったと聞きます。 プレゼントが靴下に入っているあの感動を、子どもたちにも感じていただければと思いまして」"
translation = "「네. 하지만 최근에는 양말을 준비하는 가정도 줄었다고 들었습니다. 선물이 양말에 들어있는 그 감동을, 아이들도 느꼈으면 해서요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ったく。付き合わされるこっちの身にもなってほしいわよ。こんなのその辺の店でいくらでも売ってるでしょうに」"
translation = "「나 원 참. 같이 고생하는 내 입장도 좀 생각해달라고. 이런 건 근처 가게에서 얼마든지 팔 텐데」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえいえ、出来合いの物を贈るだけでは愛が足りません！」"
translation = "「아뇨 아뇨, 기성품을 보내는 것만으로는 사랑이 부족합니다!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「子どもたちに女神様の愛とプレゼントを無事に受け取ってもらうためにも私たちが真心を込めて編むべきです！」"
translation = "「아이들에게 여신님의 사랑과 선물을 무사히 받게 하기 위해서라도 우리가 진심을 담아 짜야 해요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「靴下の編み方聞いてきたクセによく言うわ。もうちょっと考えてから行動に移しなさいってば」"
translation = "「양말 뜨는 법 물어보러 온 주제에 말은 잘하네. 좀 더 생각하고 나서 행동으로 옮기라고」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふ、イレーナさまが手芸に精通しておられて本当に助かりました。やはり持つべきものは友人ですね！」"
translation = "「후후, 이레나 님이 수예에 정통하셔서 정말 도움이 되었어요. 역시 친구는 사귀고 볼 일이네요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「暑苦しいっ。ウザいっ。抱きついてくんなっ」"
translation = "「덥석거리지 마. 짜증 나. 달라붙지 마앗」"

[[dialogue]]
speaker = "unk"
original = "以前にも増して仲良くなったね"
translation = "이전보다 더 친해졌네"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい！\u3000あのクリスマス会のおかげで今やもう私とイレーナさまは親友同士、深い深い愛で結ばれておりますから！」"
translation = "「네! 그 크리스마스 파티 덕분에 이제 저와 이레나 님은 절친 사이, 깊고 깊은 사랑으로 맺어져 있으니까요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたが編み方教えて教えてうっさいから仕方なく教えてあげてるだけよ！\u3000喋ってる暇があんなら手を動かしなさいってばっ！」"
translation = "「네가 뜨는 법 가르쳐달라고 가르쳐달라고 시끄러우니까 어쩔 수 없이 가르쳐주는 것뿐이야! 말할 틈이 있으면 손이나 움직이라니까앗!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうですね！\u3000少しでも早く、しかし愛をたっぷりと込めて編んでいかなくては！\u3000ええい、バババババっっ！！」"
translation = "「그렇네요! 조금이라도 빨리, 하지만 사랑을 듬뿍 담아서 짜야겠어요! 에잇, 바바바바바앗!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それはそれで張り切りすぎ……。また倒れても知らないわよ」"
translation = "「그건 그것대로 너무 의욕이 넘치는데……. 또 쓰러져도 모른다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ご心配無用です！\u3000私には女神様の愛がついておりますから！\u3000ズババババババっっ！！」"
translation = "「걱정 마세요! 저에게는 여신님의 사랑이 함께하니까요! 즈바바바바바바앗!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ……ったくもう。倒れても治してやんないからね。悪いけどあたしはマイペースに進めさせてもらうから」"
translation = "「하아…… 나 원 참. 쓰러져도 안 고쳐줄 거니까. 미안하지만 난 내 페이스대로 진행할 테니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「すぅ……すぅ……すぅ……」"
translation = "「스으…… 스으…… 스으……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あら……ふふ。イレーナさまったら可愛い寝息を立てられて」"
translation = "「어라…… 후후. 이레나 님도 참 귀여운 숨소리를 내시며」"

[[dialogue]]
speaker = "unk"
original = "編み疲れて寝ちゃったみたいだ"
translation = "뜨개질하다 지쳐서 잠든 모양이네"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですね。いつの間にか、こんなにもたくさん編んでくださって。私の２倍以上の量を完成させてくださいました」"
translation = "「그렇네요. 어느새 이렇게나 많이 짜주시고. 제 2배 이상의 양을 완성해 주셨어요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「マイペースに進めさせてもらう──なんて仰っていたのに、くすくす。相変わらず素直でないお方ですね」"
translation = "「내 페이스대로 진행하겠다고── 말씀하셨으면서, 후훗. 여전히 솔직하지 못한 분이시네요」"

[[dialogue]]
speaker = "unk"
original = "きっとシャロンが頑張りすぎないようにだよ"
translation = "분명 샤론이 너무 무리하지 않게 하려고 그런 걸 거야"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私もそう思います。イレーナさまは本当に心根の優しいお方ですから。この前お会いした時も、文句を言いながら荷物を持ってくださったりして」"
translation = "「저도 그렇게 생각해요. 이레나 님은 정말 마음씨가 고우신 분이니까요. 저번에 만났을 때도 투덜거리면서 짐을 들어주시기도 하고」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「友人というものはとてもいいものですね。イレーナさまと本音でぶつかって以来、本当にそう感じます」"
translation = "「친구라는 건 정말 좋은 것이네요. 이레나 님과 본심으로 부딪친 이래로 정말 그렇게 느껴요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「実は私……今まで特別親しい友人がおりませんで。いえ正確には皆誰しも愛すべき隣人だとは思っているのですが」"
translation = "「실은 저…… 지금까지 특별히 친한 친구가 없었거든요. 아니, 정확히는 모두가 사랑해야 할 이웃이라고는 생각합니다만」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「こうして２人で手編みの靴下を作ったりするような友人は初めてです。ですから私、とても幸せです。イレーナさまと真の友人になれて」"
translation = "「이렇게 둘이서 손뜨개 양말을 만들거나 하는 친구는 처음이에요. 그래서 저, 무척 행복해요. 이레나 님과 진정한 친구가 될 수 있어서」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「こういうことをイレーナさまにお伝えすると、ふふ、とても不機嫌になられてしまうのですけどね」"
translation = "「이런 이야기를 이레나 님께 전하면, 후후, 무척 불쾌해하시겠지만요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「誰が、むにゃ、あんたを愛してるかっての……。倒れられたら、すぅ、すぅ、面倒なだけよ……」"
translation = "「누가, 무냐, 너를 사랑한다 그래……. 쓰러지면, 스으, 스으, 귀찮을 뿐이야……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふふ、こういうおへそ曲がりな物言いにもすっかり慣れてしまいました」"
translation = "「후후후, 이런 심술궂은 말투에도 완전히 익숙해져 버렸어요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「さて今度は私がイレーナさまへ愛をお伝えする番ですね！\u3000イレーナさまの愛に──ズババババっ、全力で応えませんと！」"
translation = "「자, 이번에는 제가 이레나 님께 사랑을 전할 차례네요! 이레나 님의 사랑에── 즈바바바바앗, 전력으로 보답해야죠!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまが私の２倍の量を完成させてくださったのなら、私もまたその２倍の量を完成させてみせます！\u3000見ていてください、会長さま！\u3000私たちの愛の力を！」"
translation = "「이레나 님이 제 2배의 양을 완성해 주셨다면, 저 또한 그 2배의 양을 완성해 보이겠어요! 지켜봐 주세요, 회장님! 저희의 사랑의 힘을!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んで？\u3000勝手に一人で盛り上がって、大張り切りした挙げ句に──」"
translation = "「그래서? 멋대로 혼자 들떠서, 잔뜩 의욕 부린 끝에──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「世界が、世界がぐるぐる回ってますぅ……。申し訳ございません、イレーナさまぁ……」"
translation = "「세상이, 세상이 빙글빙글 돌아요……. 죄송합니다, 이레나 님……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「結局、貧血起こしてんじゃない！？\u3000あんたアホなの！？\u3000人の気遣いなんだと思ってんのよ！？」"
translation = "「결국 빈혈 일으킨 거 아냐!? 너 바보야!? 사람 배려를 뭐라고 생각하는 거야!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あうぅ～。耳元で叫ばれないでくださ～い。頭に響いてしまいますぅ～……」"
translation = "「아우우~. 귓가에서 소리 지르지 말아 주세요~. 머리에 울려요~……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「自業自得よ。しばらくそこで突っ伏してなさい」"
translation = "「자업자득이야. 당분간 거기 엎드려 있어」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そ、そんなぁ～……。どうか、ご慈悲をぉ……」"
translation = "「그, 그럴 수가~…… 부디 자비를……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いいから寝てなさいってば。どうせ治したら治したでまた編み始めるんでしょ」"
translation = "「됐으니까 자라고. 어차피 고쳐주면 고쳐주는 대로 또 뜨기 시작할 거잖아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あともうちょっとで人数分仕上がりそうな感じだし。あとはあたしが片付けておいてあげるから、あんたは寝てろって言ってんの」"
translation = "「이제 조금만 더 하면 인원수만큼 다 될 것 같으니까. 나머지는 내가 치워줄 테니까 너는 자라고 하는 거야」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あ──ふふ。そういうことでしたか。意地悪ではなく、また私を気遣ってくださって……。ああ、イレーナさまの温かな愛を強く感じます……」"
translation = "「아── 후후. 그런 거였나요. 심술이 아니라, 또 저를 배려해 주셔서……. 아아, 이레나 님의 따뜻한 사랑을 강하게 느껴요……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「～～っっ。やっぱやめた、あんたを治して手伝わせる！\u3000どうしてあたしがあんたのために頑張らなくちゃいけないのよっ！」"
translation = "「~~앗. 역시 관뒀어, 너 고쳐서 돕게 할 거야! 왜 내가 너를 위해서 노력해야 하는 거냐고!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい！\u3000２人で編みましょう！\u3000この素晴らしい友情を、愛を、イレーナさまとともに形に残したいですから！」"
translation = "「네! 둘이서 짜요! 이 멋진 우정을, 사랑을, 이레나 님과 함께 형상으로 남기고 싶으니까요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ～もうっ、暑苦しい、うざいっ、張り切りすぎ！\u3000もう二度とあんたの頼みなんか引き受けないからっ……！」"
translation = "「아~ 정말, 덥석거려, 짜증 나, 너무 의욕 넘쳐! 이제 두 번 다시 네 부탁 따위 안 들어줄 거니까……!」"

