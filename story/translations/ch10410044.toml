[[dialogue]]
speaker = "unk"
original = "第４話,キスしたいって言わせたい,P"
translation = "제4화, 키스하고 싶다고 말하게 하고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "夏も終わりに差し掛かったある日のこと。"
translation = "여름도 끝나갈 무렵의 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺はマインからリゾート結界のプライべートビーチに呼び出しを受けて、向かったのだが――"
translation = "나는 마인에게 리조트 결계의 프라이빗 비치로 호출을 받고 향했는데──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ、会長～、こっちこっち～♪」"
translation = "「앗, 회장님~, 이쪽이야 이쪽~♪」"

[[dialogue]]
speaker = "unk"
original = "ビーチチェアーに腰掛けて、手招きするマインの元へ向かう。"
translation = "비치 체어에 앉아, 손짓하는 마인의 곁으로 향한다."

[[dialogue]]
speaker = "unk"
original = "すると――カチッと足元で音がして、次の瞬間。"
translation = "그러자── 발밑에서 찰칵 소리가 나더니, 다음 순간."

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000なんか爆発したああぁっ！？"
translation = "잠깐!? 뭔가 폭발했다아아아앗!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はいっ♪\u3000久しぶりのラプチャーガムで捕まえた～っと☆」"
translation = "「네에♪ 오랜만에 랩처 검으로 잡아냈습니다☆」"

[[dialogue]]
speaker = "unk"
original = "ガムのような粘着性の星力によって、俺はその場から動けなくなってしまった。"
translation = "껌 같은 점착성 성력에 의해, 나는 그 자리에서 움직일 수 없게 되어 버렸다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長～、これでもう逃げられないよ？」"
translation = "「회장님~, 이걸로 이제 못 도망가?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ズバリ聞きたいことがあるんだけどさ――」"
translation = "「단도직입적으로 묻고 싶은 게 있는데 말이야──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「最近、私と<b>キス</b>するの、わざと避けてない？」"
translation = "「최근, 나랑 <b>키스</b>하는 거, 일부러 피하고 있지 않아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「もうかれこれ２週間くらい、してない気がするんだけど？」"
translation = "「벌써 한 2주 정도, 안 한 것 같은 기분이 드는데?」"

[[dialogue]]
speaker = "unk"
original = "……そうだっけ？"
translation = "……그랬나?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうでしょ。スキンシップはするけど、いざキスしそうになると、唇じゃなく頬っぺにして誤魔化して……」"
translation = "「그렇잖아. 스킨십은 하지만, 막상 키스할 것 같으면 입술이 아니라 볼에 하면서 얼버무리고……」"

[[dialogue]]
speaker = "unk"
original = "マインは俺とキスしたいの？"
translation = "마인은 나랑 키스하고 싶어?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「…………別にそうじゃないけど」"
translation = "「………… 딱히 그런 건 아니지만.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ただ、唇にキスをしないのは、あまりに不自然だよねって話。子供の恋愛じゃないんだから……」"
translation = "「그저, 입술에 키스를 안 하는 건, 너무 부자연스럽다는 이야기야. 어린애 연애도 아니고……」"

[[dialogue]]
speaker = "unk"
original = "そっか、残念……"
translation = "그렇구나, 아쉽네……"

[[dialogue]]
speaker = "unk"
original = "マインは別に俺とキスしたいわけじゃないのか～、とわざとらしく落ち込んだように肩を落として見せる。"
translation = "마인은 딱히 나랑 키스하고 싶은 게 아니구나~ 하며, 짐짓 낙담한 듯 어깨를 늘어뜨려 보였다."

[[dialogue]]
speaker = "unk"
original = "なら、仕方ない。頬っぺたにキスも止めよう"
translation = "그럼 어쩔 수 없지. 볼에 키스하는 것도 그만둘게."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「えっ？\u3000ちょっと待って、なんでそういう話に……！？」"
translation = "「엣? 잠깐 기다려, 왜 이야기가 그렇게 되는 거야……!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――いつも自分からキスしたいと言っているけど、私からは全然、キスしたいって言わないから？」"
translation = "「──언제나 자기가 먼저 키스하고 싶다고 말하면서, 나한테선 전혀, 키스하고 싶다는 소릴 안 하니까?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いや、それは……」"
translation = "「아니, 그건……」"

[[dialogue]]
speaker = "unk"
original = "俺はキスしたいけど、マインが嫌なら仕方ない"
translation = "난 키스하고 싶지만, 마인이 싫다면 어쩔 수 없지."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、もう！\u3000わかった！\u3000言えばいいんでしょ！」"
translation = "「아~ 정말! 알았어! 말하면 될 거 아냐!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私も本当は――会長とキスしたいです！」"
translation = "「나도 사실은── 회장님이랑 키스하고 싶어요!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「スキンシップでストレス解消はできてても、ムラムラしちゃってるから！！\u3000――これでいい！？」"
translation = "「스킨십으로 스트레스 해소는 됐어도, 흥분해버렸으니까!! ──이걸로 됐어!?」"

[[dialogue]]
speaker = "unk"
original = "やっと、マインの方からそう言ってくれたな"
translation = "드디어, 마인 쪽에서 그렇게 말해줬네."

[[dialogue]]
speaker = "unk"
original = "２週間我慢するのは俺も楽ではなかったが、男心に、マインの方から『キスしたい』と言って欲しかったのだ。"
translation = "2주 동안 참는 건 나도 쉽지 않았지만, 남자 마음으로, 마인 쪽에서 『키스하고 싶다』고 말해주길 바랐던 것이다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふ～んだ……どうせ私は面倒臭い女ですよ～」"
translation = "「흥이다…… 어차피 난 번거로운 여자예요~」"

[[dialogue]]
speaker = "unk"
original = "ぷいっとそっぽを向きながら、恥ずかしそうに顔を赤くするマイン。"
translation = "홱 하고 고개를 돌리며, 부끄러운 듯 얼굴을 붉히는 마인."

[[dialogue]]
speaker = "unk"
original = "大丈夫だ"
translation = "괜찮아."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え？\u3000――そんな私が可愛いから、つい悪戯したくなっちゃう……？」"
translation = "「에? ──그런 내가 귀여우니까, 나도 모르게 장난치고 싶어진다고……?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「っ……んもう、会長ってば、そんな言い方ずるい……」"
translation = "「윽…… 정말이지, 회장님도 참, 그런 식으로 말하는 건 치사해……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いつもは私が悪戯する側だから怒れないし――」"
translation = "「언제나 내가 장난치는 쪽이니까 화도 못 내겠고──」"

[[dialogue]]
speaker = "unk"
original = "マインはビーチチェアーから立ち上がると、俺の方に近づいて来て。"
translation = "마인은 비치 체어에서 일어나더니, 나에게 다가와서."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「気持ちがまた、ボムっちゃうじゃん……<emoji=heart04>」"
translation = "「기분이 다시, 폭발해버리잖아……❤️」"

[[dialogue]]
speaker = "unk"
original = "彼女が手を伸ばして、俺の頬に触れると同時に、足元の粘着トラップが消えて、動けるようになる。"
translation = "그녀가 손을 뻗어 내 뺨에 닿음과 동시에, 발밑의 점착 트랩이 사라지고 움직일 수 있게 된다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長……<emoji=heart04>」"
translation = "「회장님……❤️」"

[[dialogue]]
speaker = "unk"
original = "熱を帯びた瞳で見つめて来るマインに、俺はそっと顔を寄せて――"
translation = "열기를 띤 눈동자로 바라보는 마인에게, 나는 살며시 얼굴을 가까이하여──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……❤️ 쪽……❤️」"

[[dialogue]]
speaker = "unk"
original = "２週間ぶりの、唇を触れ合わせたキスを交わす。"
translation = "2주 만에 입술을 맞댄 키스를 나눈다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁ……<emoji=heart04>」"
translation = "「하아아……❤️」"

[[dialogue]]
speaker = "unk"
original = "ムラムラ、解消できた？"
translation = "흥분, 해소됐어?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……ばか<emoji=heart04>\u3000分かってる癖に……<emoji=heart04>」"
translation = "「응…… 바보❤️ 다 알면서……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「今日まで貯めた分、彼氏としてちゃんと付き合ってくれなきゃ、許さないんだから<emoji=heart04>」"
translation = "「오늘까지 참은 만큼, 남자친구로서 제대로 어울려주지 않으면, 용서 안 할 거니까❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちゅっ……ん……<emoji=heart04>」"
translation = "「쪽…… 응……❤️」"

[[dialogue]]
speaker = "unk"
original = "マインは俺のこと、好き？"
translation = "마인은 나 좋아해?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そんなの……付き合ってるんだから当たり前でしょ」"
translation = "「그런 거…… 사귀고 있으니까 당연하잖아.」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――ちゃんと言って欲しいって？」"
translation = "「──제대로 말해주길 바란다고?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……ばか。意地悪会長<emoji=heart04>」"
translation = "「……바보. 심술쟁이 회장님❤️」"

[[dialogue]]
speaker = "unk"
original = "マインは恥ずかしそうに、俺の耳元に口を寄せながら、そっと――"
translation = "마인은 부끄러운 듯, 내 귓가에 입을 가까이 대며 살며시──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……好き<emoji=heart04>」"
translation = "「……좋아해❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ……<emoji=heart04>」"
translation = "「앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "照れるマインの可愛さに我慢できず、俺は彼女を抱き締める。"
translation = "수줍어하는 마인의 귀여움에 참지 못하고, 나는 그녀를 껴안는다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……<emoji=heart04>\u3000会長……もっと<emoji=heart04>」"
translation = "「응……❤️ 회장님…… 더❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちゅっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「쪽……❤️ 쪽……❤️」"

[[dialogue]]
speaker = "unk"
original = "その日はマインが満足するまで、２人きりのリゾート結界で沢山キスをし続けるのだった――"
translation = "그날은 마인이 만족할 때까지, 둘만의 리조트 결계에서 수없이 키스를 계속하는 것이었다──"

