[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「みなさんこんにちは～！\u3000イベント『魔法少女トレジャー☆サチ３』をプレイしてくれた方はお久しぶり、そうじゃない方は初めまして♪」"
translation = "「여러분 안녕하세요~! 이벤트 『마법 소녀 트레저☆사치 3』을 플레이해 주신 분들은 오랜만, 그렇지 않은 분들은 처음 뵙겠습니다♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「蒐集の魔法少女トレジャー☆アンナですよ～！\u3000キラッ☆」"
translation = "「수집의 마법 소녀 트레저☆안나예요~! 키랏☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「……異世界の存在が確認されてから、私はずっと、いつかこんな日がやってくるのではないかと期待していました。そう――」"
translation = "「……이세계의 존재가 확인된 후로 저는 줄곧 언젠가 이런 날이 오지 않을까 기대하고 있었어요. 그래요──」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「異世界の魔法少女と運命が交差する、春映画みたいなオールスターズ展開を！！」"
translation = "「이세계의 마법 소녀와 운명이 교차하는 봄 영화 같은 올스타즈 전개를!!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「いや～、まさかあたしは、異世界の魔法少女と出会えるなんて思わなかったよ～！\u3000しかもアンナちゃんみたいな、魔法少女好きの同志と！」"
translation = "「이야~ 설마 내가 이세계의 마법 소녀와 만날 줄은 몰랐어~! 게다가 안나짱 같은 마법 소녀를 좋아하는 동지와!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いえいえ、これはもう運命ですよ♪\u3000このまま２人で、魔法少女について熱く語り明かしちゃいましょうか～！」"
translation = "「아뇨아뇨, 이건 이미 운명이에요♪ 이대로 둘이서 마법 소녀에 대해 뜨겁게 밤을 새우며 이야기해 버릴까요~!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「いいね、いいね～！\u3000じゃあカラオケ行っちゃう？\u3000異世界の魔法少女アニメの主題歌、映像付きでめっちゃ聴きた～い♪」"
translation = "「좋네, 좋네~! 그럼 노래방 갈까? 이세계 마법 소녀 애니메이션 주제가, 영상이랑 같이 엄청 듣고 싶어~♪」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「いやいや、ウチらをスルーしないでよ、トレジアンナさん！？」"
translation = "「이봐요 이봐요, 우리를 무시하지 말라고요, 트레지아나 씨!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あははっ☆\u3000冗談ですよ～♪\u3000はい、じゃあカメラに向かって、花織さんの３サイズを教えてもらってもいいですか～？」"
translation = "「아하핫☆ 농담이에요~♪ 자, 그럼 카메라를 향해 카오리 씨의 쓰리 사이즈를 알려주실 수 있을까요~?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「えっと、ウチは上から～……って言うかぁ！！\u3000いろはやここあさんと比べて、ウチがいちばん小さいんだから！」"
translation = "「그러니까 우리 상체부터~……가 아니라!! 이로하나 코코아 씨에 비하면 내가 제일 작단 말이야!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「てへぺろ☆\u3000すみませ～ん♪\u3000花織さんはしっかりツッコミを入れてくれるので、つい～☆」"
translation = "「데헤페로☆ 죄송해~요♪ 카오리 씨는 태클을 잘 걸어주셔서 그만~☆」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「にゃははっ☆\u3000アンナちんって面白いよね～。ちなみにここあは身長１４９センチで、上から８９・５７・８６だよ～♪」"
translation = "「냐하핫☆ 안나 칭은 정말 재밌네~. 참고로 코코아는 키 149센티에 위에서부터 89·57·86이야~♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「マジですか！？\u3000うおおおおっ！\u3000異世界の魔法少女の容姿と数字データを照らし合わせて、記憶魔法で保存保存保存！！！」"
translation = "「진짜인가요!? 우오오오옷! 이세계 마법 소녀의 용모와 숫자 데이터를 대조해서 기억 마법으로 보존 보존 보존!!!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「そういえば、アンナちんも身長小さいのにおっぱい大きいよね～。サイズどれくらいなの？」"
translation = "「그러고 보니 안나 칭도 키는 작은데 가슴은 크네~. 사이즈가 어느 정도야?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふふっ、私ですか～？\u3000私は身長１４４センチで、ここあさんよりも小柄ですが、なんと――おっぱいは８８センチのＧカップなんですよ～☆」"
translation = "「후후후, 저요~? 저는 키 144센티로 코코아 씨보다 작지만 무려── 가슴은 88센티의 G컵이랍니다~☆」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「でっか！？\u3000身長比率で考えたら、ここあさんよりもトランジスタグラマーなんじゃ！？」"
translation = "「대빵 커!? 키 비율로 생각하면 코코아 씨보다 더 트랜지스터 글래머잖아!?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「アンナちゃんは深夜アニメの方に出てきそうな魔法少女だよね～！」"
translation = "「안나짱은 심야 애니메이션에 나올 법한 마법 소녀네~!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いや～、それほどでも～♪\u3000照れちゃいますね～☆」"
translation = "「이야~ 그 정도까지는~♪ 쑥스럽네요~☆」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「喜ぶとこなの……？\u3000というか、雑談になっちゃってるけど大丈夫？\u3000これ、<b>予告</b>だよね？」"
translation = "「좋아할 부분이야……? 그보다 잡담이 되어버렸는데 괜찮아? 이거 <b>예고</b>지?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あっ、そうだった！\u3000『マジカミ』と『ティンクルスターナイツ』のコラボ予告をするために来たんだった！」"
translation = "「앗, 맞다! 『매지컬 미라이』와 『팅클 스타 나이츠』의 콜라보 예고를 하러 온 거였지!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「異世界の魔法少女とお話できるとあって、ついテンションが上がっちゃって、すみませ～ん！」"
translation = "「이세계 마법 소녀와 이야기할 수 있다고 해서 그만 텐션이 올라버렸네요, 죄송해요!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「にゃはは～、大丈夫だよ、アンナちん♪\u3000こういうのは全部、オモシロイのが正義だから☆」"
translation = "「냐하하~ 괜찮아, 안나 칭♪ 이런 건 전부 재미있는 게 정의니까☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ありがとうございます！\u3000では、コホン――改めまして、『マジカミ』と『ティンクルスターナイツ』の魔法少女コラボイベント☆」"
translation = "「감사합니다! 그럼 큼큼── 다시 한번, 『매지컬 미라이』와 『팅클 스타 나이츠』의 마법 소녀 콜라보 이벤트☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「『マジカミ×トレジャー☆サチ～魔法少女のキスパンデミック～』が３日後から開催！」"
translation = "「『매지컬 미라이×트레저☆사치 ~마법 소녀의 키스 판데믹~』이 사흘 뒤부터 개최!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ウチらマジカミの魔法少女たちが登場するのはもちろん、タイトル通り、クルスタの魔法少女たちも登場します♪」"
translation = "「우리 매지컬 미라이의 마법 소녀들이 등장하는 건 물론, 제목 그대로 크루스타의 마법 소녀들도 등장합니다♪」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「ってことで、呼んじゃおっかにゃ～♪\u3000サチサチ☆\u3000プリちん♪\u3000シズハっち～！」"
translation = "「그런 의미에서 불러볼까냥~♪ 사치사치☆ 프리 칭♪ 시즈하치~!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ど、どうも……！\u3000お呼びに預かりました、幸運の魔法少女トレジャー☆サチこと、流星学園附属校、生徒会長の白詰サチですっ！」"
translation = "「저, 저기……! 부름을 받고 왔습니다, 행운의 마법 소녀 트레저☆사치이자 유성 학원 부속교 학생회장인 시라츠메 사치입니다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「まったく、トレジアンナのせいで待ちわびたぞ！\u3000悪の終末兵器にして、漆黒の魔法少女、プリムラじゃ！」"
translation = "「정말이지, 트레지아나 때문에 한참 기다렸느니라! 악의 종말 병기이자 칠흑의 마법 소녀, 프리뮬러이니라!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「聖杯の魔法少女、染井シズハよ！\u3000お正月に引き続き、頑張るからよろしくね♪」"
translation = "「성배의 마법 소녀, 소메이 시즈하야! 정월에 이어 열심히 할 테니까 잘 부탁해♪」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「というわけで、作品の枠を超えた、マジやばいカミ魔法少女コラボ♪」"
translation = "「그런 고로 작품의 틀을 넘은 진짜 대박 마법 소녀 콜라보♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「『マジカミ×トレジャー☆サチ』をよろしくお願いします！」"
translation = "「『매지컬 미라이×트레저☆사치』를 잘 부탁드립니다!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あたしたち魔法少女の活躍を、おっ楽しみに～♪」"
translation = "「우리 마법 소녀들의 활약을 기대해 줘~♪」"

