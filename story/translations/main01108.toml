[[dialogue]]
speaker = "unk"
original = "第１０話,芽吹きし魔王,B"
translation = "제10화, 싹트기 시작한 마왕, B"

[[dialogue]]
speaker = "unk"
original = "そして俺たちはついに辿り着く──"
translation = "그리고 우리들은 마침내 도착한다──"

[[dialogue]]
speaker = "unk"
original = "かつて盆地であり、今は森羅万象を融合させられた終焉の地へ。"
translation = "예전에 분지였고, 지금은 삼라만상을 융합당한 종언의 땅으로."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト──ッ……！」"
translation = "「쿠로토──윽……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス──！」"
translation = "「비너스──!」"

[[dialogue]]
speaker = "unk"
original = "森の深奥では──全身を闇色の『檻』に囚われた彼女が、苦しそうに俺の名を叫んでいた。"
translation = "숲의 깊은 곳에서는── 전신을 암흑색의 『감옥』에 갇힌 그녀가, 괴로운 듯이 내 이름을 외치고 있었다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『……想定外の来客だ。よもや<ruby>魔界<rt>こちら</rt></ruby>まで追いかけてくるとは──<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>は通れない時期のはずだが』"
translation = "『……예상 밖의 손님이군. 설마 마계까지 쫓아올 줄이야── <ruby>경계의 호수<rt>라고 시에로</rt></ruby>는 통행할 수 없는 시기일 터인데.』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっとしたツテでね。まあ、帰り道の保証はないんだが」"
translation = "「약간의 연줄로 말이지. 뭐, 돌아가는 길은 보장할 수 없지만.」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『それに……ラクシャをも退けたか』"
translation = "『게다가…… 라크샤마저 물리쳤나.』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「友人に道を譲ってもらっただけだ。大したことじゃない」"
translation = "「친구가 길을 양보해 줬을 뿐이다. 별것 아니다.」"

[[dialogue]]
speaker = "unk"
original = "黒騎士の声音からは本気の驚きが感じられた。"
translation = "검은 기사의 목소리에서는 진심으로 놀란 기색이 느껴졌다."

[[dialogue]]
speaker = "unk"
original = "人間界にいるはずの俺たちが、数々の壁を越えてここへ来たのが信じられないようだ。"
translation = "인간계에 있을 터인 우리들이, 수많은 벽을 넘어 이곳에 온 것을 믿을 수 없는 모양이다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ここが」"
translation = "「……여기가.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ネメシス──」"
translation = "「네메시스──」"

[[dialogue]]
speaker = "unk"
original = "そこは奇妙な森だった。"
translation = "그곳은 기묘한 숲이었다."

[[dialogue]]
speaker = "unk"
original = "子どもが乱雑に描いたような自然と生態系とが、おぞましい実体となって蠢いている。"
translation = "아이가 난잡하게 그린 듯한 자연과 생태계가, 끔찍한 실체가 되어 꿈틀거리고 있다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「な、なんか両目から樹の生えた魔獣がいる……！」"
translation = "「나, 뭔가 양쪽 눈에서 나무가 자란 마수가 있어……!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ひ、ひええ……上下さかさまのサソリが這ってるニャン……！？\u3000足元もうねうね動いてるニャンよ……！」"
translation = "「히, 히이익…… 위아래가 뒤바뀐 전갈이 기어 다니고 있는 냥……!? 발밑도 꿈틀꿈틀 움직이고 있는 냥이야……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──踏むな！\u3000この森の由来からして……今も再構築の瘴気が<ruby>澱<rt>よど</rt></ruby>んでいる」"
translation = "「── 밟지 마! 이 숲의 유래로 볼 때…… 지금도 재구축의 장기가 고여 있다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アステラとは比べ物にならない濃度……巻き込まれたら一巻の終わりね」"
translation = "「아스테라와는 비교도 안 될 농도…… 휘말리면 끝장이야.」"

[[dialogue]]
speaker = "unk"
original = "ここはリクリエに呑まれたものの末路──"
translation = "이곳은 리크리에에 삼켜진 것들의 말로──"

[[dialogue]]
speaker = "unk"
original = "かつてあったという盆地と、森と、魔獣とが、今もぐちゃぐちゃにかき回されている最中に違いない。"
translation = "예전에 있었다는 분지와, 숲과, 마수가, 지금도 엉망진창으로 뒤섞이고 있는 중임에 틀림없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だが……こうして林道を歩む分には大丈夫だ。大部分が、再構築の途中でフリーズしている」"
translation = "「하지만…… 이렇게 숲길을 걷는 동안은 괜찮다. 대부분이, 재구축 도중에 얼어붙어 있다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスはきっとこの奥にいる。慎重に進むぞ、みんな」"
translation = "「비너스는 분명 이 안쪽에 있을 것이다. 신중하게 나아가자, 모두.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい──！」"
translation = "「네──!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『なるほど……冥森林への侵入の機を、冬の大凍結に見出したか』"
translation = "『과연…… 명삼림으로의 침입 기회를, 겨울의 대 동결에서 찾아냈나.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『現地の魔族──いや。こちらの娘による手引きか？』"
translation = "『현지의 마족── 아니. 이쪽의 아가씨에 의한 안내인가?』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふん……あんたが、よそ見してるうちに……ッ……教えた、だけよ……！\u3000けほっ、こほっ……！」"
translation = "「흥…… 네가, 한눈팔고 있는 사이에…… 윽…… 알려, 줬을 뿐이야……! 켁, 콜록……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃん、無理しないで──！」"
translation = "「비너스짱, 무리하지 마──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。おかげで俺たちもここまで来れた──必ずそこから助けてやる」"
translation = "「아아. 덕분에 우리들도 여기까지 올 수 있었다── 반드시 거기서 구해 주겠다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……っ、みんな……！」"
translation = "「쿠로토……윽, 모두……!」"

[[dialogue]]
speaker = "unk"
original = "俺たちとヴィーナスを分断するように立ちはだかる黒騎士。"
translation = "우리들과 비너스를 분단하듯이 가로막고 선 검은 기사."

[[dialogue]]
speaker = "unk"
original = "奴を突破しない限り──背後に囚われたヴィーナスには手を出せない。"
translation = "녀석을 돌파하지 않는 한── 등 뒤에 갇힌 비너스에게는 손을 댈 수 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「面白い話をしていたな──リクリエの到来を待ち望んでるとかなんとか」"
translation = "「재미있는 이야기를 하고 있었더군── 리크리에의 도래를 기다리고 있다던가 뭐라던가.」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『フッ……正確には新世界の創成だがな。“塔”の壁画を見たおまえ達なら、その意味がわかるだろう？』"
translation = "『훗…… 정확히는 신세계의 창성이지만 말이다. “탑”의 벽화를 본 너희들이라면, 그 의미를 알겠지?』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……！\u3000あなたも、ご存知なのですね──」"
translation = "「……! 당신도, 알고 계시는군요──」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「リクリエを望む者──アポロちゃんみたいな存在ってこと……？」"
translation = "「리크리에를 바라는 자── 아폴로짱 같은 존재라는 것……?」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『私とあれは異なる存在だ。私はただ、一介の人間としてリクリエという現象を望んでいるのみ』"
translation = "『나와 그것은 다른 존재다. 나는 단지, 일개 인간으로서 리크리에라는 현상을 바라고 있을 뿐.』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──人間、か。随分さらっと明かすんだな」"
translation = "「── 인간, 인가. 꽤나 아무렇지 않게 밝히는군.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「なら余計になぜニャ……！\u3000世界が破滅したら、おミャーだってまとめて消えてしまうニャンよ！」"
translation = "「그렇다면 더욱더 왜 냥……! 세계가 파멸하면, 너도 함께 사라져 버리는 냥이야!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『そうだな。だが……それこそ私の望んだこと。森羅万象の終焉でしか、私の心の穴は埋められない』"
translation = "『그렇지. 하지만…… 그것이야말로 내가 바란 것. 삼라만상의 종언으로밖에, 나의 마음의 구멍은 메울 수 없다.』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから、<ruby>星騎士<rt>おれたち</rt></ruby>を敵視していると？」"
translation = "「그러니까, 성기사을 적대하고 있다고?」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『一部的にはそう──が、いささか語弊があるな。<ruby>星騎士<rt>スターナイト</rt></ruby>──おまえ達程度の抵抗は本来、取るに足らない存在でしかなかった』"
translation = "『일부적으로는 그렇지── 허나, 다소 어폐가 있군. <ruby>성기사<rt>스타 나이트</rt></ruby>── 너희들 정도의 저항은 본래, 보잘것없는 존재일 뿐이었다.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『しかし──そこに揺らぎが生じた。デネブから飛来した一人の人間……そしてその者が所有していた日誌によってな』"
translation = "『하지만── 거기에 흔들림이 생겼다. 데네브에서 날아온 한 인간…… 그리고 그자가 소유하고 있던 일지에 의해서 말이다.』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……また人のことデブ、デブって──私、けっこうスリムなんですけど……！？」"
translation = "「……또 사람을 뚱보, 뚱보라고── 나, 꽤나 날씬한데 말이죠……!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（デネブ……トリシャさんも口にしていた単語──）"
translation = "（데네브…… 트리샤 씨도 입에 담았던 단어──）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（トリシャさんによればこの世界は『アルタイル』──そしてヴィーナスは『デネブ』から来た存在──）"
translation = "（트리샤 씨에 따르면 이 세계는 『알타일』── 그리고 비너스는 『데네브』에서 온 존재──）"

[[dialogue]]
speaker = "unk"
original = "どうやら黒騎士の目論見にとって──ヴィーナスとその日誌こそが計算外の<b>変数</b>だった。"
translation = "아무래도 검은 기사의 속셈에 있어서── 비너스와 그 일지야말로 계산 외의 <b>변수</b>였다."

[[dialogue]]
speaker = "unk"
original = "そして奴が欲することとやらもまた……その異世界とやらにあるらしい。"
translation = "그리고 녀석이 원하는 것 역시…… 그 이세계라는 곳에 있는 듯하다."

[[dialogue]]
speaker = "unk"
original = "いくつかのピースが頭の中で嵌まっていくが、それを整理している余裕はなかった。"
translation = "몇 가지 조각이 머릿속에서 맞춰지지만, 그것을 정리할 여유는 없었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──いいさ。不明瞭なことは多いが……おまえの個人的な事情にはさして興味もない」"
translation = "「── 됐다. 불분명한 것은 많지만…… 너의 개인적인 사정에는 그다지 흥미 없다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リクリエを望むなら望めばいい。嫌気がさして何もかも滅んでしまえばいいなんて、わかりやすい幼稚な理屈でしかないんだ」"
translation = "「리크리에를 바란다면 바라라지. 싫증 나서 모든 것이 멸망해 버리면 좋겠다니, 알기 쉬운 유치한 논리일 뿐이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だからこれ以上──おまえの御託に付き合う気はない。俺たちの大切な仲間を奪った落とし前はつけさせてもらうぞ」"
translation = "「그러니 더 이상── 너의 장황한 설명에 어울릴 생각은 없다. 우리들의 소중한 동료를 빼앗은 대가는 치르게 해 주겠다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（緋宮会長……）"
translation = "（히노미야 회장……）"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（本気で怒ってるわね……）"
translation = "（진심으로 화났네……）"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『フ……フフフ！\u3000なかなかの気概だ』"
translation = "『훗…… 후후후! 꽤나 기개가 있군.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『だが……力が伴っていなければ、いかに勇猛な決意であろうと無意味！』"
translation = "『하지만…… 힘이 수반되지 않는다면, 아무리 용맹한 결의일지라도 무의미!』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ッ……この波動は……！」"
translation = "「윽…… 이 파동은……!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『今度こそこの場で……<ruby>屠<rt>ほふ</rt></ruby>り去ってやろう。新世界の礎となれ』"
translation = "『이번에야말로 이 자리에서…… 도륙해 주마. 신세계의 초석이 되어라.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『<ruby>昏<rt>くら</rt></ruby>き断罪をここに下す──最終審判の時・闇の制裁』"
translation = "『어둠의 단죄를 여기에 내린다── 최종 심판의 시간・어둠의 제재.』"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──ッ……！」"
translation = "「──윽……!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「あ──あれが来るニャ！\u3000に、逃げなきゃヤバイニャ──！」"
translation = "「아── 저것이 오는 냥! 도, 도망치지 않으면 위험한 냥──!」"

[[dialogue]]
speaker = "unk"
original = "前回なすすべなく<ruby>蹂躙<rt>じゅうりん</rt></ruby>された──黒き霊力の奔流が俺たちへ迫る。"
translation = "지난번 속수무책으로 유린당했던── 검은 영력의 급류가 우리에게 다가온다."

[[dialogue]]
speaker = "unk"
original = "何もかも闇の中へ呑まれる──その寸前。"
translation = "모든 것이 어둠 속으로 삼켜지기── 그 직전."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──レイジングノヴァ」"
translation = "「──레이징 노바」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『……！？』"
translation = "『……!?』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ──？」"
translation = "「엣──?」"

[[dialogue]]
speaker = "unk"
original = "フィオナから拡散した光の波動が──深淵の闇を打ち払った。"
translation = "피오나로부터 확산된 빛의 파동이── 심연의 어둠을 물리쳤다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『……なんだと』"
translation = "『……뭐라고』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「確かに──以前のままの私たちでは、あなたに勝てませんでした。──ですが」"
translation = "「확실히── 이전 그대로의 저희로는, 당신을 이길 수 없었습니다. ──하지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おまえと並び立つために……俺たちもできる限りのことを尽くしてきた」"
translation = "「너와 나란히 서기 위해…… 우리도 할 수 있는 모든 것을 다해 왔다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こ……これって……」"
translation = "「이……이건……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「<ruby>霊屑<rt>クロスダスト</rt></ruby>と魔王の血が──共鳴しているニャン！」"
translation = "「영설과 마왕의 피가── 공명하고 있는 냥!」"

[[dialogue]]
speaker = "unk"
original = "最後に<ruby>環<rt>ラクシャ</rt></ruby>から譲り受けた霊屑によって──最後のピースが嵌まった。"
translation = "마지막에 타마키로부터 양도받은 영설에 의해── 마지막 조각이 맞춰졌다."

[[dialogue]]
speaker = "unk"
original = "闇の霊力──光の霊力──俺たちの血と共鳴するように、体の奥底から未知の力があふれ出す。"
translation = "어둠의 영력── 빛의 영력── 우리들의 피와 공명하듯이, 몸속 깊은 곳에서부터 미지의 힘이 넘쳐흐른다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長。あの時──黒騎士の振るっていた技を、覚えていますか？」"
translation = "「히노미야 회장. 그때── 검은 기사가 휘두르던 기술을, 기억하고 있나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「嫌というほど。今も脳裏に焼き付いている」"
translation = "「지겹도록. 지금도 뇌리에 박혀 있다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……なら」"
translation = "「……그렇다면」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺が──あれを再現してみせる」"
translation = "「아아. 내가── 그것을 재현해 보이겠다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「頼もしいです。なら私は──あれに打ち勝つ道筋を、なんとしても見出すとしましょう」"
translation = "「든든합니다. 그럼 저는── 그것을 이겨낼 방법을, 어떻게든 찾아내도록 하죠.」"

[[dialogue]]
speaker = "unk"
original = "俺たち魔王の系譜に託された霊力の残滓──<ruby>霊屑<rt>クロスダスト</rt></ruby>。"
translation = "우리 마왕의 계보에 맡겨진 영력의 잔재── 영설."

[[dialogue]]
speaker = "unk"
original = "失われし霊力を操る黒騎士に抗するためには、俺たちが同じ力を身につけるしかない。"
translation = "잃어버린 영력을 조종하는 검은 기사에 맞서기 위해서는, 우리들이 같은 힘을 익힐 수밖에 없다."

[[dialogue]]
speaker = "unk"
original = "普通の人間なら呑まれかねないというその塊を解放し──全身へとみなぎらせた。もう後戻りはできない。"
translation = "보통 인간이라면 삼켜질 수도 있다는 그 덩어리를 해방하고── 전신에 가득 채웠다. 이제 더 이상 되돌아갈 수 없다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「さあ──最後の仕上げと参りましょう、緋宮会長」"
translation = "「자── 마지막 마무리를 하도록 하죠, 히노미야 회장.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──いくぞっ！」"
translation = "「아아── 간다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「来てください──はあああッ！！」"
translation = "「와 주세요── 하아아아앗!!」"

[[dialogue]]
speaker_original = "クロト＆フィオナ"
speaker_translation = "쿠로토 & 피오나"
original = "「<ruby>最終審判の時<rt>エーテル</rt></ruby>・<ruby>光の制裁<rt>パニッシュメント</rt></ruby>」"
translation = "「최종 심판의 시간・빛의 제재」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「２人の秘密特訓の成果……実っていたのね──」"
translation = "「두 사람의 비밀 특훈 성과…… 결실을 맺었구나──」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『ッ……！\u3000霊力だと──なぜ──なぜ貴様たちが、その術を使える……！？』"
translation = "『윽……! 영력이라고── 왜── 왜 너희들이, 그 술법을 쓸 수 있는 것이냐……!?』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ゼロから習得したわけじゃない。ただ、信じてくれる仲間がいたんだ」"
translation = "「제로에서부터 습득한 건 아냐. 그저, 믿어주는 동료가 있었을 뿐이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「三千年前──クルセイダースが用いた救世の武器。おまえが世界の破滅を願うというのなら、容赦なくこの力を振るえる」"
translation = "「삼천 년 전── 크루세이더스가 사용했던 구세의 무기. 네가 세계의 파멸을 바란다면, 용서 없이 이 힘을 휘두를 수 있다.」"

[[dialogue]]
speaker = "unk"
original = "俺とフィオナ。２人の本来の力の源は星力だ。"
translation = "나와 피오나. 두 사람 본래 힘의 근원은 성력이다."

[[dialogue]]
speaker = "unk"
original = "しかし、<ruby>霊屑<rt>クロスダスト</rt></ruby>に宿った霊力を操り、星力と織り交ぜることで……俺たちの技の出力は未知なる混沌の領域にまで引き上げられた。"
translation = "하지만, 영설에 깃든 영력을 조종하고, 성력과 섞어 짜냄으로써…… 우리들의 기술 출력은 미지의 혼돈 영역까지 끌어올려졌다."

[[dialogue]]
speaker = "unk"
original = "「異なる力を混ぜ合わせ、より大きな力に転換できる」──これこそが、俺たちの血に宿る魔王の力！"
translation = "「서로 다른 힘을 뒤섞어, 더 큰 힘으로 전환할 수 있다」── 이것이야말로, 우리들의 피에 깃든 마왕의 힘!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちは魔王だ──どんな血統も種族も、そして力だって併せのむ」"
translation = "「우리는 마왕이다── 어떤 혈통도 종족도, 그리고 힘까지도 함께 삼킨다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それは時として、大きな危険をも孕むのでしょう。いつかは世界を破滅に追いやってしまった魔王もいたとも聞きます」"
translation = "「그것은 때때로, 큰 위험마저 내포하겠죠. 언젠가는 세계를 파멸로 몰아넣었던 마왕도 있었다고 들었습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「しかし私たちは──どんな苦渋を舐めようとも、歩んでいきます。終焉から人々を救うのが──私たち<ruby>星騎士<rt>スターナイト</rt></ruby>なのですから」"
translation = "「하지만 저희는── 어떤 고난을 겪더라도, 나아가겠습니다. 종언으로부터 사람들을 구하는 것이── 저희 <ruby>성기사<rt>스타 나이트</rt></ruby>이니까요.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「フィオナ嬢……」"
translation = "「피오나 양……」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『……フッ。フハハッハハハハハァッ！！』"
translation = "『……훗. 푸하핫하하하하하앗!!』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『いいだろう。星騎士たちよ──この手で貴様たちを滅し、果てなき終わりを迎えさせてやる！』"
translation = "『좋다. 성기사들이여── 이 손으로 너희들을 멸하고, 끝없는 종말을 맞이하게 해 주마!』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「させない──ヴィーナスを返してもらう！」"
translation = "「그렇게 두지 않겠다── 비너스를 돌려받겠다!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「強烈な殺気──来るニャン！」"
translation = "「강렬한 살기── 오는 냥!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「全身全霊っ……会長くん達を援護するわよ！」"
translation = "「전신전령으로…… 회장 군들을 원호할 거야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「了解です──新星星徒会、迎撃！」"
translation = "「알겠습니다── 신성 성도회, 요격!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『──むうううゥゥゥゥゥンッッ！！』"
translation = "『──무우우우우우우웃!!』"

