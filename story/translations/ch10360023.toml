[[dialogue]]
speaker = "unk"
original = "第３話,ご褒美バニー撮影会,P"
translation = "제3화, 포상 바니 촬영회"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「緋宮会長……今、なんと言いまして？」"
translation = "「히노미야 회장…… 지금 뭐라고 하셨나요?」"

[[dialogue]]
speaker = "unk"
original = "テストでいい点を取りました"
translation = "테스트에서 좋은 점수를 받았어요."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ、そのようですわね。忙しい会長業の傍ら、トップクラスの成績をたたき出した……本当にお見事です。恋人として誇らしいですわ」"
translation = "「네, 그런 모양이군요. 바쁜 회장 업무 틈틈이 톱클래스 성적을 내다니…… 정말 훌륭해요. 연인으로서 자랑스럽답니다.」"

[[dialogue]]
speaker = "unk"
original = "ご褒美をくれる約束でしたよね"
translation = "포상을 주기로 약속했었죠."

[[dialogue]]
speaker = "unk"
original = "いい点をとったら"
translation = "좋은 점수를 받으면요."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ、そうですわね。会長の励みになるならと、そのような提案をしておりました。遠慮や隠し事はしない、が私たちのルールですし」"
translation = "「네, 그렇죠. 회장에게 격려가 된다면 하고 그런 제안을 했었죠. 사양이나 비밀은 없기가 우리의 규칙이니까요.」"

[[dialogue]]
speaker = "unk"
original = "だから先輩のバニー姿を見せて！"
translation = "그러니까 선배의 바니 모습을 보여줘!"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「明らかにラインを超えているのではなくて！？\u3000というか、アステラカジノで散々に見たでしょう！？」"
translation = "「명백히 선을 넘은 것 아닌가요!? 그보다, 아스텔라 카지노에서 실컷 보았잖아요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あの時はロストアイテムとの戦いで、それどころじゃなかったって……」"
translation = "「그때는 로스트 아이템과의 싸움 때문에 그럴 때가 아니었다니……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「うぅ……そんな真剣な目を……し、仕方ありませんわね！」"
translation = "「으으…… 그런 진지한 눈을…… 어, 어쩔 수 없군요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「こ、これでよろしいですの……！？」"
translation = "「이, 이걸로 만족하시나요……!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「まったくもう……お付き合いを始めて仲良くなってから、エッチなおねだりが増えている気がいたしますわよ、会長？」"
translation = "「정말이지…… 사귀기 시작해서 사이가 좋아진 뒤로 야한 어리광이 늘어난 기분이 드네요, 회장?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「って、あっ……もう<emoji=heart04>\u3000言ってるそばからキスのおねだりですの……？」"
translation = "「어라, 앗…… 정말<emoji=heart04> 말하기가 무섭게 키스 어리광인가요……?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「んっ……ちゅっ<emoji=heart04>\u3000んちゅ……ちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04> 응츄…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふぁ……<emoji=heart04>\u3000会長とキスするの、ドキドキいたしますわ……こ、こんなハレンチな格好でするのも初めてですし……」"
translation = "「화……<emoji=heart04> 회장과 키스하는 거, 두근거려요…… 이, 이런 파렴치한 복장으로 하는 것도 처음이고……」"

[[dialogue]]
speaker = "unk"
original = "わがままを聞いてくれて"
translation = "억지를 들어줘서,"

[[dialogue]]
speaker = "unk"
original = "ありがとう、先輩"
translation = "고마워요, 선배."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そ、そりゃあ……あれだけのハードトレーニングをしながら、成績まで上げたのですから。少しくらいはおねだりも聞いて差し上げますわよ」"
translation = "「그, 그야…… 그만큼 하드 트레이닝을 하면서 성적까지 올렸으니까요. 조금 정도는 어리광도 들어드리겠어요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「で、でも。もうよろしいでしょう！？\u3000変身、解除しますからね？」"
translation = "「하, 하지만. 이제 됐죠!? 변신, 해제할 거니까요?」"

[[dialogue]]
speaker = "unk"
original = "写真も撮らせてほしいです"
translation = "사진도 찍게 해줬으면 좋겠어요."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですわぁ！？\u3000だ、ダメに決まっています！\u3000えっ──待ち受けにしたいんですの！？\u3000無理無理、無理ですわっ！」"
translation = "「인가요!? 안, 안 되는 게 당연합니다! 엣── 대기 화면으로 하고 싶다고요!? 무리무리, 무리예요!」"

[[dialogue]]
speaker = "unk"
original = "お願いですから！\u3000写真をください！"
translation = "부탁이니까요! 사진을 주세요!"

[[dialogue]]
speaker = "unk"
original = "先輩、可愛い！\u3000最高に可愛い！"
translation = "선배, 귀여워! 최고로 귀여워!"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「う、ぅうぅっ……そ、そこまで食い下がられては……す、少しだけですわよ……？」"
translation = "「우, 으으윽…… 거, 거기까지 물러서지 않는다면…… 조, 조금뿐이에요……?」"

[[dialogue]]
speaker = "unk"
original = "先輩は厳しい人だけど、真っすぐお願いすると実は大抵のことは聞いてくれる。成績を上げて本当によかった。"
translation = "선배는 엄격한 사람이지만, 똑바로 부탁하면 사실 웬만한 건 다 들어준다. 성적을 올려서 정말 다행이다."

[[dialogue]]
speaker = "unk"
original = "許しを得たのをいいことに、俺は恋人の可愛いバニー姿をＤＩＳＣにしっかり収めていったのだが──"
translation = "허락을 얻은 것을 기회 삼아, 나는 연인의 귀여운 바니 모습을 DISC에 듬뿍 담아갔는데──"

[[dialogue]]
speaker = "リノ"
original = "「ただいま～♪\u3000予定より早くお買い物が終わっちゃった──」"
translation = "「다녀왔어~♪ 예정보다 빨리 쇼핑이 끝났네──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですわぁ！？」"
translation = "「인가요!?」"

[[dialogue]]
speaker = "リノ"
original = "「お──お邪魔しました～……♪」"
translation = "「어── 실례했습니다~……♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ままま、待ってください！\u3000リノお母様～！？」"
translation = "「기기기, 기다려주세요! 리노 어머님~!」"

[[dialogue]]
speaker = "unk"
original = "バニー姿の先輩を激写していたところを、母さんに見つかってしまうのだった……"
translation = "바니 모습의 선배를 격하게 찍고 있던 현장을 어머니에게 들키고 마는 것이었다……"

[[dialogue]]
speaker = "unk"
original = "それからしばらく経ったある日。"
translation = "그러고 나서 얼마간의 시간이 흐른 어느 날."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「今月の学園対抗杯……めでたく流星が勝利いたしましたわ！」"
translation = "「이번 달 학원 대항배…… 경사스럽게도 유성이 승리했답니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フフ……マム率いる新星学園に勝利できたら、何でも１つお願いを聞いてもらう約束をしておりましたわよね？」"
translation = "「후후…… 마무가 이끄는 신성학원에 승리하면 뭐든 한 가지 소원을 들어주기로 약속했었죠?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「会長には今までお伝えするのを忘れていたのですが……私、実は細マッチョの男性が好みですの」"
translation = "「회장에게는 지금까지 말씀드리는 걸 잊고 있었습니다만…… 저, 사실 잔근육이 있는 남성이 취향이랍니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「特に会長みたいな、シュッと締まって線は細く、けれど筋肉質なボディーにメロメロですの！\u3000そこで……お願いがありますわ！」"
translation = "「특히 회장처럼 매끈하게 빠졌으면서도 근육질인 바디에 메롱메롱이랍니다! 그래서…… 부탁이 있어요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「──シャツを脱いで筋肉をお見せなさい！！」"
translation = "「──셔츠를 벗고 근육을 보여주세요!!」"

[[dialogue]]
speaker = "unk"
original = "ライン超えてませんか！？"
translation = "선 넘은 거 아닌가요!?"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いいえ！\u3000私だってバニー衣装で散々辱められましたわ！\u3000あの日の意趣返しも含んでおりましてよ！！」"
translation = "「아니요! 저도 바니 의상으로 실컷 수치심을 맛보았답니다! 그날의 복수도 포함되어 있다고요!!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「さぁ脱ぐのですわ！\u3000上腕二頭筋と腹筋と背筋──その他もろもろ、たっぷり堪能させていただきますわよ！」"
translation = "「자, 벗는 거예요! 상완이두근과 복근과 배근── 그 외 기타 등등, 듬뿍 만끽해드리겠어요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「もちろん写真撮影もいたしますから、覚悟なさい！」"
translation = "「물론 사진 촬영도 할 테니 각오하세요!」"

[[dialogue]]
speaker = "unk"
original = "わーっ！\u3000ちょっと待って先輩！？"
translation = "와─! 잠깐만요 선배!?"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「お～っほっほっほ！\u3000会長のステキな写真がどんどん増えていきますわー！」"
translation = "「오~홋홋홋! 회장의 멋진 사진이 점점 늘어나네요─!」"

[[dialogue]]
speaker = "リノ"
original = "「き、気づいてないわね～２人とも……お母さん、実はちょっと前から帰ってきてるんだけど～……」"
translation = "「모, 모르는구나~ 둘 다…… 엄마, 사실 좀 전부터 돌아와 있었는데~……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いいですわ！\u3000そこでぐっと力をこめて！\u3000キープですわ！\u3000──あッ<emoji=heart04>\u3000すごくイイ！\u3000最高ですわ～！」"
translation = "「좋아요! 거기서 꽉 힘을 주고! 키프예요! ──아앗<emoji=heart04> 너무 좋아! 최고예요~!」"

[[dialogue]]
speaker = "リノ"
original = "「だ、大丈夫なのかしら……うちの息子のカップル……」"
translation = "「괘, 괜찮은 걸까…… 우리 아들 커플……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「素敵でしてよ、緋宮会長！\u3000おーっほっほっほ！」"
translation = "「멋져요, 히노미야 회장! 오~홋홋홋!」"

[[dialogue]]
speaker = "リノ"
original = "「ま、まあ～……仲がいいのは、いいことよね……？」"
translation = "「뭐, 뭐어~…… 사이가 좋은 건 좋은 거겠지……?」"

