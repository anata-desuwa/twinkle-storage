[[dialogue]]
speaker = "unk"
original = "第２話,心を釣られて,P"
translation = "제2화, 마음을 낚여서, P"

[[dialogue]]
speaker = "unk"
original = "夏のサバイバル合宿でアナが釣り好きだということを知り、俺達は改めて２人で釣りデートをしに、リゾート結界へやって来ていた――"
translation = "여름 서바이벌 합숙에서 아나가 낚시를 좋아한다는 것을 알게 되어, 우리들은 다시금 둘이서 낚시 데이트를 하러 리조트 결계에 와 있었다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「～～～♪\u3000～～、～～～♪」"
translation = "「～～～♪ ～～, ～～～♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おや？\u3000会長、どうしました？\u3000何か言いたげな表情ですが……」"
translation = "「어라? 회장님, 왜 그러시죠? 뭔가 말하고 싶은 듯한 표정입니다만……」"

[[dialogue]]
speaker = "unk"
original = "この体勢で釣りをすることになるとは……"
translation = "이 자세로 낚시를 하게 될 줄이야……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長の膝の上は、今や私の定位置ですので」"
translation = "「회장님의 무릎 위는 이제 제 정위치니까요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いつもの場所に腰掛け、２人で釣り竿を持っている状態……これで１度、釣りをしてみたかった。想像通り、リラックス出来て快適な釣り環境」"
translation = "「평소의 장소에 앉아 둘이서 낚싯대를 쥐고 있는 상태…… 이걸로 한 번 낚시를 해보고 싶었습니다. 상상대로 리렉스할 수 있는 쾌적한 낚시 환경」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それに、サバイバル合宿ではサーシャ先輩に釣りのやり方を教えたりで、会長とまったり出来ていませんでしたから」"
translation = "「게다가 서바이벌 합숙에서는 사샤 선배에게 낚시법을 가르쳐주느라 회장님과 느긋하게 있지 못했으니까요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――大物がかかった時、危なくないのかって……？\u3000ノープロブレム」"
translation = "「――대어가 걸렸을 때 위험하지 않냐고요……? 노 프로블럼」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私がこのまま釣り竿を持って立ち上がれば問題ありませんし、会長に釣りのテクニックを教えるという意味でも、私の手元が見やすいこの体勢は合理的」"
translation = "「제가 이대로 낚싯대를 들고 일어서면 문제없고, 회장님께 낚시 테크닉을 가르쳐준다는 의미에서도 제 손끝이 보기 쉬운 이 자세는 합리적」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お、早速、魚のアタリがきてますよ。会長、まずはロッドをあおって釣り針がしっかりと刺さるようにアワセ――フッキングを行いましょう。それから――」"
translation = "「오, 당장 입질이 오고 있어요. 회장님, 우선은 로드를 젖혀서 낚싯바늘이 확실히 박히도록 아와세――후킹을 하죠. 그러고 나서──」"

[[dialogue]]
speaker = "unk"
original = "そうしてアナにテクニックを解説して貰いながら、見事に魚を釣り上げることができた――"
translation = "그렇게 아나에게 테크닉 해설을 들으며 멋지게 물고기를 낚아 올릴 수 있었다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「やりましたね。初回から、なかなかの大物です」"
translation = "「해냈네요. 첫판부터 제법 대어입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――釣りの細かなテクニックに感心した？\u3000ほうほう……ふふふっ。そこまで会長にベタ褒めされると、良い気分……むふ～♪」"
translation = "「――낚시의 세세한 테크닉에 감탄했다? 호오호오…… 후후훗. 그렇게까지 회장님께 칭찬받으니 기분이 좋네요…… 무후~♪」"

[[dialogue]]
speaker = "unk"
original = "アナはどうして釣りが好きなんだ？"
translation = "아나는 어째서 낚시를 좋아하는 거야?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この前は、そこまで話していませんでしたね」"
translation = "「저번에는 거기까지 이야기하지 않았었죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「最初は人間界の、生態系への興味。実際に色んな生き物を観察したくて、海や山に出向き、魚を近くで見る為の手段として釣りを学びました」"
translation = "「처음에는 인간계의 생태계에 대한 흥미. 실제로 여러 생물을 관찰하고 싶어서 바다나 산으로 나갔고, 물고기를 가까이서 보기 위한 수단으로 낚시를 배웠습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ところが実際やってみると……簡単ではなくて、最初の１匹を釣り上げるのに悪戦苦闘した。同時に魚の生命力に触れて、驚きました」"
translation = "「그런데 실제 해보니…… 쉽지 않아서, 첫 한 마리를 낚는 데 고군분투했죠. 동시에 물고기의 생명력을 접하고 놀랐습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そして、やっとの想いで初めて釣り上げた瞬間は……今も鮮明に覚えています」"
translation = "「그리고 간절한 마음으로 처음 낚아 올린 순간은…… 지금도 선명히 기억합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「その１匹目は、予想外のとんでもない大物で……思わず放心状態になって、足がガクガク震えたんです。とても……感動しました」"
translation = "「그 첫 마리는 예상 밖의 엄청난 대어라서…… 나도 모르게 멍해져서 다리가 후들후들 떨렸거든요. 무척…… 감동했습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そんなことがあって、今では釣り自体が凄く好きになったんです。ただ――」"
translation = "「그런 일이 있어서 지금은 낚시 자체를 아주 좋아하게 됐습니다. 다만──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「周りには釣りが好きという人は見かけませんでした。だから、合宿の時まで自分から言い出さずに黙っていたんです」"
translation = "「주변에는 낚시를 좋아한다는 사람을 보지 못했습니다. 그래서 합숙 때까지 스스로 말하지 않고 가만히 있었던 거예요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でもこうして、趣味を一緒にやれる人が出来ると嬉しいものですね」"
translation = "「하지만 이렇게 취미를 함께할 수 있는 사람이 생기니 기쁘네요」"

[[dialogue]]
speaker = "unk"
original = "アナの趣味を知らなかったのはちょっと悔しい"
translation = "아나의 취미를 몰랐던 건 좀 분하네"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それは……すみません」"
translation = "「그건…… 죄송합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……釣りって決して、女の子らしい趣味とは言えないじゃないですか」"
translation = "「……낚시란 게 결코 여자아이다운 취미라고는 할 수 없잖아요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長にはなるべく、彼女として良く思われたくって……」"
translation = "「회장님께는 가급적 여자친구로서 좋게 보이고 싶어서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んっ……<emoji=heart04>\u3000か、会長……いきなり抱き締められると、驚く……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 회, 회장님…… 갑자기 껴안으시면 놀라요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「い、今は釣りをしている最中……そういうのは、魚がかかった時の反応に遅れが生じます……」"
translation = "「지, 지금은 낚시를 하는 도중…… 그런 건 물고기가 걸렸을 때 반응이 늦어집니다……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――心臓のドキドキが聞こえてくる？\u3000こ、好意対象の男性から抱き締められたら、そうなるのは普通……」"
translation = "「――심장 두근거림이 들린다? 호, 호감 대상인 남성에게 안기면 그렇게 되는 건 당연한 것……」"

[[dialogue]]
speaker = "unk"
original = "アナが俺を釣り上げるようなことを言うのが悪い"
translation = "아나가 나를 낚아 올리는 듯한 소리를 하는 게 나빠"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「別にそんなことを狙ったわけでは……」"
translation = "「딱히 그런 걸 노린 건 아니었습니다만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「で、ですが――」"
translation = "「하, 하지만──」"

[[dialogue]]
speaker = "unk"
original = "アナは釣り竿のリールを巻いて、釣り針を海から引き上げさせると――"
translation = "아나는 낚싯대의 릴을 감아 낚싯바늘을 바다에서 끌어올리더니──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「人間界のことわざで、二兎追う者は一兎をも得ず、とも言います……」"
translation = "「인간계의 속담에, 두 마리 토끼를 쫓는 자는 한 마리도 얻지 못한다, 고도 합니다……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今は一旦……会長を釣る方に集中しましょう」"
translation = "「지금은 일단…… 회장님을 낚는 쪽에 집중하죠」"

[[dialogue]]
speaker = "unk"
original = "アナ、そんなこと言われたら――"
translation = "아나, 그런 소리를 들으면──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長……んっ……<emoji=heart04>」"
translation = "「회장님…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ちゅっ……ちゅ<emoji=heart04>\u3000すぐにキスするだなんて……会長は、スケベ<emoji=heart04>」"
translation = "「츄…… 츄<emoji=heart04> 바로 키스하다니…… 회장님은 변태<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でも、ここ数日、キスの勉強を出来てませんでしたし……んっ<emoji=heart04>\u3000……いい機会、かもしれません」"
translation = "「하지만 요 며칠 키스 공부를 못 했고…… 응<emoji=heart04> ……좋은 기회일지도 모르겠네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ちゅ<emoji=heart04>\u3000――はいっ。会長……私も好き、です……<emoji=heart04>」"
translation = "「츄<emoji=heart04> ――네. 회장님…… 저도 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「浅いキス……ぽかぽかして、幸せな気持ちに……なります<emoji=heart04>\u3000……ちゅっ」"
translation = "「가벼운 키스…… 포근해서 행복한 기분이…… 돼요<emoji=heart04> ……츄」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁ。会長、好き……っ<emoji=heart04>\u3000ちゅっ……ちゅ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「하아. 회장님, 좋아해……<emoji=heart04> 츄…… 츄<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして見事に釣られた俺は、アナと心行くまで甘いキスを楽しむのだった――"
translation = "그렇게 훌륭하게 낚인 나는 아나와 마음껏 달콤한 키스를 즐기는 것이었다──"

