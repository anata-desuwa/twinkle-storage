[[dialogue]]
speaker = "unk"
original = "第３話,流行りはどんどん取り入れます,P"
translation = "제3화, 유행은 팍팍 받아들입니다, P"

[[dialogue]]
speaker = "ルルカ"
original = "「ふっふっふ……お兄ちゃん、もう逃げられないよ」"
translation = "「훗훗훗…… 오빠, 이제 못 도망가」"

[[dialogue]]
speaker = "ルルカ"
original = "「今、Ｒｙｕｔｕｂｅでは耳かき動画が大流行中……」"
translation = "「지금 Ryutube에서는 귀 파기 영상이 대유행 중……」"

[[dialogue]]
speaker = "ルルカ"
original = "「汐ルカルカのチャンネルのモットーは、人気になるなら何でもやろう、だから……」"
translation = "「시오 루카루카 채널의 모토는, 인기만 얻는다면 뭐든 하자니까……」"

[[dialogue]]
speaker = "ルルカ"
original = "「えへへ。耳かきの練習台になって♪\u3000おにーちゃん♪」"
translation = "「에헤헤. 귀 파기 연습 상대가 되어줘♪ 오빠♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふふ～。どうかなー、お兄ちゃん。後輩の女の子の膝枕♪\u3000ドキドキする？」"
translation = "「후후~. 어때, 오빠. 후배 여동생의 무릎베개♪ 두근거려?」"

[[dialogue]]
speaker = "unk"
original = "ちょっと恥ずかしいかも"
translation = "조금 부끄러울지도"

[[dialogue]]
speaker = "ルルカ"
original = "「まだまだ。本番はこれからだよー」"
translation = "「아직 멀었어. 본방은 이제부터라구」"

[[dialogue]]
speaker = "ルルカ"
original = "「んーっと……竹のやつだとぶすってしちゃいそうだし……綿棒の方が初心者向きだよね」"
translation = "「으음…… 대나무로 된 건 푹 찔러버릴 것 같고…… 면봉이 초보자용으로 딱이지」"

[[dialogue]]
speaker = "ルルカ"
original = "「お耳の浅いところに入れて～……くるくる、くるくる……♪」"
translation = "「귓구멍 얕은 곳에 넣어서~…… 빙글빙글, 빙글빙글……♪」"

[[dialogue]]
speaker = "unk"
original = "（これは……気持ちがいい……！）"
translation = "（이건…… 기분 좋아……！）"

[[dialogue]]
speaker = "ルルカ"
original = "「きゃあ♪\u3000お兄ちゃんのお顔、すっごくふやけちゃってる。うんうん、気持ちいいよねー、お耳の中をくすぐられるのって」"
translation = "「꺄아♪ 오빠 얼굴, 엄청 풀어졌어. 응응, 기분 좋지, 귓속을 간질거리는 거」"

[[dialogue]]
speaker = "ルルカ"
original = "「お耳の中って迷走神経？\u3000ってのがあるんだよ。触れるか触れないか、くらいの力でこしこしするとー……♪」"
translation = "「귓속에는 미주신경? 이라는 게 있대. 닿을 듯 말 듯한 힘으로 살살 문지르면~……♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふふふ♪\u3000もじもじしちゃうの、止められないよね♪」"
translation = "「후후후♪ 몸을 배베 꼬는 거, 멈출 수 없지?♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「いーい、お兄ちゃん？\u3000これは耳かき動画を投稿するための、練習だからね？」"
translation = "「알겠지, 오빠? 이건 귀 파기 영상을 올리기 위한 연습이니까 말이야?」"

[[dialogue]]
speaker = "ルルカ"
original = "「耳かきされてる人がどんなリアクションを取るか。どういう息遣いをするか。どういうペース配分がベストなのか……」"
translation = "「귀 파기 당하는 사람이 어떤 리액션을 취하는지. 어떤 숨소리를 내는지. 어떤 페이스 배분이 베스트인지……」"

[[dialogue]]
speaker = "ルルカ"
original = "「リアリティがあればあるほど、動画のクオリティは上がるの。だから──」"
translation = "「리얼리티가 있으면 있을수록 영상의 퀄리티는 올라가. 그러니까──」"

[[dialogue]]
speaker = "ルルカ"
original = "「こしょこしょこしょ～♪\u3000恥ずかしくっても、気持ちよかったら遠慮せずに反応しちゃっていいんだからね<emoji=heart04>」"
translation = "「간질간질간질~♪ 부끄러워도 기분 좋으면 사양 말고 반응해도 되니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「感じたら、ちゃーんと声に出すこと！」"
translation = "「느껴지면 제대로 소리 낼 것!」"

[[dialogue]]
speaker = "ルルカ"
original = "「もじもじされると……んぅ、お兄ちゃんの髪の毛が膝に擦れて、ちょっとくすぐったいけど……それも貴重なサンプルだからね」"
translation = "「몸을 뒤척이면…… 응, 오빠 머리카락이 무릎에 쓸려서 조금 간지럽지만…… 그것도 귀중한 샘플이니까」"

[[dialogue]]
speaker = "ルルカ"
original = "「かきかき……かきかき、かき……♪」"
translation = "「사각사각…… 사각사각, 사각……♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「かきかきかき……かきかき、かき……。……うーん」"
translation = "「사각사각사각…… 사각사각, 사각……. ……으음」"

[[dialogue]]
speaker = "ルルカ"
original = "「……あ、あれだね。耳かき中って、けっこう緊張するね……シンとしちゃうし、どうしても」"
translation = "「……그거네. 귀 파는 중에는 꽤 긴장되네…… 조용해지니까 아무래도」"

[[dialogue]]
speaker = "ルルカ"
original = "「何かお話しよっか？\u3000あんまりゲラゲラ笑っちゃうようなお喋りは、できないけど……」"
translation = "「뭐라도 이야기할까? 너무 깔깔 웃게 되는 수다는 못 떨겠지만……」"

[[dialogue]]
speaker = "ルルカ"
original = "「うん、そうだよー。人気が出る前はねー……色んな人の企画を真似してたんだぁ」"
translation = "「응, 맞아~. 인기 생기기 전에는 말이야~…… 여러 사람 기획을 흉내 냈었어」"

[[dialogue]]
speaker = "ルルカ"
original = "「超絶難易度の死にゲーを初見で全クリするまで眠れません、みたいなやつとかー……」"
translation = "「초고난도 소울류 게임을 처음 보면서 깰 때까지 못 잡니다, 같은 거라든가~……」"

[[dialogue]]
speaker = "ルルカ"
original = "「視聴者参加型のパズルゲームでぼっこぼこにされたりー。うん、人気が出るためなら手段は選ばずやってきたんだよ」"
translation = "「시청자 참여형 퍼즐 게임에서 처참하게 깨지기도 하고. 응, 인기를 얻기 위해서라면 수단 방법 안 가리고 해왔어」"

[[dialogue]]
speaker = "ルルカ"
original = "「あんまり過激にしちゃうとＢＡＮされちゃうから、そこは避けてきたけど……」"
translation = "「너무 과격하게 하면 정지당하니까 그건 피해 왔지만……」"

[[dialogue]]
speaker = "ルルカ"
original = "「……あ、そうだ。ちょっと聞いてみたい事、あったんだ」"
translation = "「……아, 맞다. 좀 물어보고 싶은 게 있었어」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんって、あたしがアップロードしてる動画でどのジャンルが好き？\u3000チャレンジ系？\u3000それともゲーム実況？」"
translation = "「오빠는 내가 업로드하는 영상 중에 어떤 장르가 좋아? 챌린지 계열? 아니면 게임 실황?」"

[[dialogue]]
speaker = "unk"
original = "歌の動画"
translation = "노래 영상"

[[dialogue]]
speaker = "ルルカ"
original = "「──えっ」"
translation = "「──엣」"

[[dialogue]]
speaker = "ルルカ"
original = "「え、えへへ……そうなんだっ……歌の動画かあ……。そういえば聞いてくれてるって言ってたもんね」"
translation = "「에, 에헤헤…… 그렇구나…… 노래 영상이구나. 그러고 보니 듣고 있다고 했었지」"

[[dialogue]]
speaker = "ルルカ"
original = "「活動初期から、ずっと休まず投稿してるけど……ネタ動画よりは伸びないからねー……もちろん、好きって言ってくれる人もたくさんいるから続けられてるんだけど」"
translation = "「활동 초기부터 계속 쉬지 않고 올리고 있지만…… 예능 영상보다는 조회수가 안 나오니까 말이야~…… 물론 좋다고 해주는 사람도 잔뜩 있으니까 계속할 수 있는 거지만」"

[[dialogue]]
speaker = "ルルカ"
original = "「……えへへ。お兄ちゃんってけっこう変わってるかも」"
translation = "「……에헤헤. 오빠는 꽤 특이할지도」"

[[dialogue]]
speaker = "unk"
original = "ルルカの歌、元気が出るから好きだよ"
translation = "루루카의 노래, 기운이 나서 좋아해"

[[dialogue]]
speaker = "ルルカ"
original = "「……そっか。ふふ。そっかー」"
translation = "「……그렇구나. 후후. 그렇구나아」"

[[dialogue]]
speaker = "ルルカ"
original = "「けっこう嬉しかったから……お耳に、ふ～ってしてあげるね♪\u3000……ふーっ<emoji=heart04>」"
translation = "「꽤 기뻤으니까…… 귀에다 후~ 해줄게♪ ……후우~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "くすぐったっ！？"
translation = "간지러워!?"

[[dialogue]]
speaker = "ルルカ"
original = "「ふふー♪\u3000耳かきの締めはやっぱりこれだよね。お耳にふーってされるの、気持ちいいって聞いたんだ～」"
translation = "「후후~♪ 귀 파기의 마무리는 역시 이거지. 귀에 후~ 해주는 거, 기분 좋다고 들었어~」"

[[dialogue]]
speaker = "ルルカ"
original = "「よーし、こっちのお耳は終わり。反対側をするから、向きを変えて、お兄ちゃん！」"
translation = "「좋아, 이쪽 귀는 끝. 반대쪽 할 거니까 방향 바꿔줘, 오빠!」"

[[dialogue]]
speaker = "ルルカ"
original = "「かりかりかり……っと」"
translation = "「사각사각사각…… 하고」"

[[dialogue]]
speaker = "ルルカ"
original = "「うん、耳かきのコツは掴めたかも。やっぱり実際にしてみると、いろいろ発見があるなぁ」"
translation = "「응, 귀 파기 요령은 터득한 것 같아. 역시 실제로 해보니까 여러 가지 발견이 있네」"

[[dialogue]]
speaker = "ルルカ"
original = "「で……お兄ちゃんは、寝落ちしちゃってる……？\u3000ふふ。寝顔、とっても可愛いかも♪」"
translation = "「그리고…… 오빠는 잠들어버렸나……? 후후. 자는 얼굴, 정말 귀여울지도♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「…………ありがとーね。お兄ちゃん。あたしの歌、褒めてくれて」"
translation = "「…………고마워. 오빠. 내 노래 칭찬해 줘서」"

[[dialogue]]
speaker = "ルルカ"
original = "「ほっぺは恥ずかしいし、お耳にしちゃお……」"
translation = "「볼은 부끄러우니까 귀에다 해야지……」"

[[dialogue]]
speaker = "ルルカ"
original = "「──ちゅっ<emoji=heart04>」"
translation = "「──쪽<emoji=heart04>」"

