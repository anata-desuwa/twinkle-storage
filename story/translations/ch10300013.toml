[[dialogue]]
speaker = "unk"
original = "第３話,ナミエルのお料理修行,P"
translation = "제3화, 나미엘의 요리 수행"

[[dialogue]]
speaker = "unk"
original = "美化委員の清掃活動を手伝ってから、ナミエルの俺に対する態度はだいぶ柔らかくなったように思う。"
translation = "미화위원의 청소 활동을 도운 뒤로 나미엘의 나에 대한 태도는 꽤 부드러워진 것 같다."

[[dialogue]]
speaker = "unk"
original = "もちろん『男性はえっちな生き物です』という認識はそのままだが、それでも一応信頼できる異性＆先輩として評価されているようで……"
translation = "물론 『남성은 야한 생물입니다』라는 인식은 그대로지만, 그래도 일단 신뢰할 수 있는 이성 및 선배로서 평가받고 있는 듯해서……"

[[dialogue]]
speaker = "unk"
original = "今日は珍しく、ナミエルの方から頼み事をされた。どういうわけか、俺の家のキッチンを貸して欲しいと言わて──"
translation = "오늘은 드물게 나미엘 쪽에서 부탁을 해왔다. 어째서인지 우리 집 주방을 빌리고 싶다고 해서──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長。ケーキが焼き上がりました。ご試食いただけますか？」"
translation = "「히노미야 회장님. 케이크가 다 구워졌습니다. 시식해 보시겠습니까?」"

[[dialogue]]
speaker = "unk"
original = "真っ黒のケーキ……ガトーショコラかな？"
translation = "새까만 케이크…… 가토 쇼콜라인가?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ。チーズケーキですが」"
translation = "「아니요. 치즈 케이크입니다만.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──お待ちください。言いたいことはわかります」"
translation = "「──기다려 주십시오. 무슨 말을 하고 싶은지는 압니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「確かに見た目は悪いです。そこは認めましょう」"
translation = "「확실히 겉모양은 나쁩니다. 그 점은 인정하죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですが、味はなかなかのものでした。これでも試食をしましたからね」"
translation = "「하지만 맛은 꽤 괜찮았습니다. 저도 시식을 해봤으니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「さぁ、緋宮会長もぜひ一口。召し上がってみてください」"
translation = "「자, 히노미야 회장님도 부디 한입. 드셔보십시오.」"

[[dialogue]]
speaker = "unk"
original = "むぐっ！？"
translation = "우읍!?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──うっ。とても心苦しそうなお顔ですね」"
translation = "「──윽. 무척 괴로워 보이는 표정이시군요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「やはり私が味オンチなのですね……むぅ。このままではまずいです」"
translation = "「역시 제가 맛치인 거군요…… 음. 이대로는 곤란합니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「実は今度の日曜日に、お嬢様と２人きりでお茶をすることになったのです」"
translation = "「사실 이번 주 일요일에 아가씨와 단둘이서 차를 마시기로 했거든요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お嬢様はお忙しい身ですが、お屋敷で働く者たちの声を直接聞くため、語らいの場を設けてくださったのです」"
translation = "「아가씨는 바쁜 몸이시지만, 저택에서 일하는 사람들의 목소리를 직접 듣기 위해 대화의 장을 마련해 주셨습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もちろんメイド隊だけでなく、コックや庭師なども対象です。お嬢様は本当にお優しく、素敵なお方です……」"
translation = "「물론 메이드대뿐만 아니라 요리사나 정원사 등도 대상입니다. 아가씨는 정말 상냥하고 멋진 분이세요……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「敬愛しているお嬢様との大切なひと時ですから、このナミエル、万全の準備で臨みたいと思いました」"
translation = "「경애하는 아가씨와의 소중한 시간인 만큼, 이 나미엘, 만반의 준비를 하고 임하고 싶었습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そこで、紅茶に合うお菓子を手作りしてはどうかと思ったのです。私はその……料理が苦手なので、良いサプライズになるかなと」"
translation = "「그래서 홍차에 어울리는 과자를 직접 만들면 어떨까 생각했습니다. 저는 그…… 요리가 서툴러서 좋은 서프라이즈가 될 것 같아서요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長には感謝しています。お屋敷で練習していては私の目論見がお嬢様にバレてしまいかねませんからね」"
translation = "「히노미야 회장님께는 감사하고 있습니다. 저택에서 연습하다가는 제 속셈이 아가씨께 들통날지도 모르니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……しかしこのケーキ、何がいけなかったのでしょう？」"
translation = "「……그런데 이 케이크, 무엇이 잘못된 걸까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「多少、材料や手順にアレンジは加えましたが、基本はレシピ通りのはずなのに……」"
translation = "「다소 재료나 절차에 어레인지를 가하긴 했지만, 기본은 레시피대로일 텐데……」"

[[dialogue]]
speaker = "unk"
original = "そのアレンジのせいじゃないか……！？"
translation = "그 어레인지 때문 아니야……!?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですがお嬢様に渡すスペシャルなケーキなのです。レシピに沿っただけのものでは、私の忠誠心が込められません……！」"
translation = "「하지만 아가씨께 드릴 스페셜 케이크라고요. 레시피를 따르기만 한 것에는 제 충성심을 담을 수 없습니다……!」"

[[dialogue]]
speaker = "unk"
original = "良ければ俺にも手伝わせてくれないか"
translation = "괜찮다면 나도 돕게 해줄래?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……そういえば、学園に入る前はアルバイトをたくさんしていたそうですね」"
translation = "「……그러고 보니 학원에 들어오기 전에는 아르바이트를 많이 하셨다고 했죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「飲食店の経験もおありなのですか。頼もしいです。サポートをお願いできますか？」"
translation = "「음식점 경험도 있으신가요. 든든하군요. 서포트를 부탁드려도 될까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ケーキは甘ければ甘いほど良いはずです。お砂糖をレシピの３倍程度、入れてみました」"
translation = "「케이크는 달면 달수록 좋을 겁니다. 설탕을 레시피의 3배 정도 넣어봤습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もぐもぐ……うん。濃厚な甘みがあります──ぇ？\u3000甘すぎて胃もたれする？\u3000そうですか……」"
translation = "「우물우물…… 응. 농후한 단맛이 있네요── 에? 너무 달아서 속이 쓰리다고요? 그렇습니까……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「表面を軽く焦がすのがトレンドだそうです。倍の時間をかけて焼き上げてみました」"
translation = "「표면을 살짝 태우는 게 트렌드라고 하더군요. 시간을 두 배로 들여 구워봤습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もぐもぐ……うん。ほんのり苦くて良いアクセントです──え？\u3000焦げ焦げだからダメ？\u3000むむぅ……」"
translation = "「우물우물…… 응. 은은하게 써서 좋은 포인트가 되네요── 에? 타버렸으니까 안 된다고요? 음음……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ダマが一切残らぬよう、生地を徹底的に混ぜ混ぜしてみました。きっと良い出来になるはずです」"
translation = "「덩어리가 전혀 남지 않도록 반죽을 철저하게 섞어보았습니다. 분명 잘 만들어질 겁니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「う……スポンジがぼそぼそのぐしゃぐしゃに……これではとてもお出しできません……もう一度！」"
translation = "「으…… 스펀지가 푸석푸석하고 엉망진창으로…… 이래서는 도저히 내놓을 수 없습니다…… 다시 한번!」"

[[dialogue]]
speaker = "unk"
original = "こうして連日、ナミエルのケーキ作りに付き合い続け、アレンジしたがるのを必死で止めて──数日後。"
translation = "이렇게 연일 나미엘의 케이크 만들기에 계속 동참하며, 어레인지하고 싶어 하는 걸 필사적으로 말리고── 며칠 뒤."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「できました……！\u3000写真の通りのチーズケーキが！」"
translation = "「됐습니다……! 사진 그대로의 치즈 케이크가!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長、本当にありがとうございます。これでお嬢様にサプライズができます！」"
translation = "「히노미야 회장님, 정말 감사합니다. 이걸로 아가씨께 서프라이즈를 할 수 있어요!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「感無量です……これは撮影し、記録に残さねば！」"
translation = "「감개무량합니다…… 이건 촬영해서 기록으로 남겨야겠어요!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「むむ。この角度よりも……」"
translation = "「음. 이 각도보다는……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「こっちの方が映える気がいたしますね。連写しましょう」"
translation = "「이쪽이 더 잘 나오는 것 같네요. 연사합시다.」"

[[dialogue]]
speaker = "unk"
original = "ナミエルってＳＮＳをやってるのか？"
translation = "나미엘은 SNS를 해?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ええ。メイド長に、掃除以外の趣味を持てと言われて始めたのです」"
translation = "「네. 메이드장님이 청소 이외의 취미를 가지라고 하셔서 시작했습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「最初は性に合いませんでしたが、意外と反響をもらえるのが楽しくて」"
translation = "「처음에는 적성에 안 맞았지만, 의외로 반응을 얻는 게 즐거워서요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──どうでしょう、緋宮会長。さっそくアップロードしてみました。いい感じではないですか？」"
translation = "「──어떻습니까, 히노미야 회장님. 바로 업로드해 보았습니다. 느낌이 괜찮지 않나요?」"

[[dialogue]]
speaker = "unk"
original = "あ、さっそくいいねが付いた"
translation = "아, 바로 좋아요가 달렸네"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふふ。そうでしょうとも──って、あぁあっ！？\u3000お嬢様からの『いいね』が！」"
translation = "「후후. 그렇겠죠── 어, 아아앗!? 아가씨의 『좋아요』가!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「しまった。迂闊でした……！\u3000お嬢様は私のアカウントの一番のフォロワーなのです……！」"
translation = "「이런. 부주의했습니다……! 아가씨는 제 계정의 가장 열렬한 팔로워이신데……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「見つかってしまいました。これではサプライズになりません……！\u3000ど、どうすればっ……！？」"
translation = "「들켜버렸습니다. 이래서는 서프라이즈가 안 돼요……! 어, 어떻게 하면……!?」"

[[dialogue]]
speaker = "unk"
original = "その後ナミエルにお願いされて、バレてしまったケーキを超える、新しいケーキの習得に付き合ったのだった。"
translation = "그 후 나미엘의 부탁으로 들통나버린 케이크를 뛰어넘는 새로운 케이크 습득에 동참하게 되었다."

