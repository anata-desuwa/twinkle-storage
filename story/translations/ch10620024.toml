[[dialogue]]
speaker = "unk"
original = "第４話,愛の誓いを再び,P"
translation = "제4화, 사랑의 맹세를 다시 한번, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺は焦る気持ちを抑え切れずに、大聖堂の中へと駆け込んだ。"
translation = "그날, 나는 초조한 마음을 억누르지 못한 채 대성당 안으로 달려 들어갔다."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……やあ、助手。今日はそんなに慌てて、どうしたんだい？」"
translation = "「……여어, 조수. 오늘은 그렇게 서둘러서 무슨 일이지?」"

[[dialogue]]
speaker = "unk"
original = "手を火傷したって聞いて……！"
translation = "손에 화상을 입었다고 들어서……!"

[[dialogue]]
speaker = "unk"
original = "ミネコから、ジュエリーが"
translation = "미네코한테서, 쥬얼리가"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……そうか。やはりキミの耳に入ってしまったか」"
translation = "「……그런가. 역시 네 귀에 들어가 버렸군」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ん？\u3000――ああ、火傷は大丈夫だよ。回復星術ですぐに治してもらったから、この通り傷は全く残っていない」"
translation = "「응? ――아아, 화상은 괜찮아. 회복성술로 바로 고쳤으니까, 보다시피 흉터는 전혀 남지 않았어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「――どうして火傷をしたのかについては……」"
translation = "「――어째서 화상을 입었는지에 대해서는……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「助手……私の懺悔を聞いてくれるかい？」"
translation = "「조수…… 나의 참회를 들어주겠나?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「実は――料理をしていて、味噌汁の入った片手鍋を引っくり返してしまったんだ」"
translation = "「실은―― 요리를 하다가, 된장국이 든 편수냄비를 엎질러 버렸어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミに『お弁当』を作ってみようと思ってね」"
translation = "「너에게 『도시락』을 만들어 주려고 생각해서 말이야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……以前の私は、不得手なことは無理にする必要はない、と考えていたんだ」"
translation = "「……이전의 나는, 서툰 일은 억지로 할 필요 없다고 생각했었지」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「誰にだって、得手不得手はある。今は便利な世の中になったからね。料理などできなくとも、別にどうとでもなると」"
translation = "「누구에게나 잘하는 것과 못하는 것이 있어. 지금은 편리한 세상이 되었으니까. 요리 같은 건 못 하더라도 별 상관없다고」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「けれど、キミと男女の付き合いを始めて、私の中に欲が湧いてしまった」"
translation = "「하지만, 너와 남녀 사이로 사귀기 시작하면서 내 안에 욕심이 생겨 버렸어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「自分の作った手料理を、キミに食べてもらって、美味しいと言ってもらえたら……それはどんなに嬉しいことだろうと、考えてしまったんだ」"
translation = "「내가 만든 손요리를 네가 먹어주고, 맛있다고 해 준다면…… 그게 얼마나 기쁜 일일까, 생각하게 된 거야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それで今日、流星寮の部屋で料理に挑戦したというわけさ」"
translation = "「그래서 오늘, 유성 기숙사 방에서 요리에 도전했다는 거지」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「その結果、鍋を引っくり返して火傷し、寮内のみんなに心配をかけて……」"
translation = "「그 결과, 냄비를 엎질러 화상을 입고, 기숙사 식구들에게 걱정을 끼치고……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「自身の不器用さを想像以上に思い知らされて……情けなくなったよ」"
translation = "「자신의 서투름을 상상 이상으로 뼈저리게 느끼게 되어서…… 한심해졌어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それ以上に凹んだのは……キミとの愛の証――エクリプスフォームを汚してしまったことだ」"
translation = "「그 이상으로 낙담한 건…… 너와의 사랑의 증표―― 에클립스 폼을 더럽혀 버린 거야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「――いつものように一石二鳥だと変身していて、味噌汁を引っくり返した時に、衣装に思いっきりかかってしまったんだ」"
translation = "「――평소처럼 일석이조라며 변신하고 있었는데, 된장국을 엎질렀을 때 의상에 정면으로 쏟아버렸거든」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「仮にかからなかったとしても、少し考えれば、エプロンを付けて料理をしないと衣装が汚れてしまうと、わかったはずなのにね」"
translation = "「설령 쏟지 않았더라도 조금만 생각하면, 앞치마를 두르고 요리하지 않으면 의상이 더러워질 거라는 걸 알았을 텐데 말이야」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「戦闘服の損傷や汚れは、変身を解除すれば無かったことになる。その理屈が私のズボラさと合わさって、無意識にエプロンを付け忘れる結果へと繋がってしまった」"
translation = "「전투복의 손상이나 오염은 변신을 해제하면 없었던 일이 되지. 그 이치가 나의 게으름과 합쳐져서 무의식중에 앞치마 두르는 걸 잊어버리는 결과로 이어지고 말았어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「物理的な汚れは消えたとしても、汚してしまった事実は消せない。私の心にも、あの汚れた光景は焼き付いてしまっている」"
translation = "「물리적인 오염은 사라졌다 해도 더럽혔다는 사실은 지울 수 없어. 내 마음에도 그 더러워진 광경은 눌어붙어 있어」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「我ながら、欲をかいて愚かなことをしたと、心から後悔しているよ」"
translation = "「나 원 참, 욕심을 부리다 어리석은 짓을 했다고 진심으로 후회하고 있어」"

[[dialogue]]
speaker = "unk"
original = "目を伏せて懺悔し、落ち込んだ顔をするジュエリー。"
translation = "눈을 내리깔고 참회하며, 침울한 표정을 짓는 쥬얼리."

[[dialogue]]
speaker = "unk"
original = "俺は床に片膝を着き、彼女と目線を合わせてから、その白い手を取る。"
translation = "나는 바닥에 한쪽 무릎을 꿇고 그녀와 시선을 맞춘 뒤, 그 하얀 손을 잡는다."

[[dialogue]]
speaker = "unk"
original = "今度、俺と一緒に料理をしよう"
translation = "다음에 나랑 같이 요리하자"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "――ジュエリーがまだ、俺に料理を食べさせたいって思ってくれているのなら、俺がキミに料理を教える。"
translation = "――쥬얼리가 아직, 나에게 요리를 먹여주고 싶다고 생각하고 있다면, 내가 너에게 요리를 가르쳐 줄게."

[[dialogue]]
speaker = "unk"
original = "俺に秘密で、サプライズでお弁当を作ろうとしてくれたのは嬉しい。でも、それでジュエリーが暗い顔になってしまうのは嬉しくない。"
translation = "나에게 비밀로, 깜짝 선물로 도시락을 만들려고 해준 건 기뻐. 하지만, 그것 때문에 쥬얼리가 어두운 얼굴이 되는 건 기쁘지 않아."

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「――だったら、私と一緒に料理して、作ったものを一緒に食べたい？」"
translation = "「――그러면, 나랑 같이 요리해서, 만든 걸 같이 먹고 싶어?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そうすれば、嫌な思い出も良い思い出に上書きされるはずだから……？」"
translation = "「그렇게 하면, 싫은 기억도 좋은 기억으로 덮어씌워질 테니까……?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……ああ、助手。本当にキミは――」"
translation = "「……아아, 조수. 정말 너는――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私にとっての『お星さま』だね」"
translation = "「나에게 있어 『작은 별』이구나」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「日陰を歩かざるを得なかった私に寄り添って、キミはいつも温かな光をくれる──」"
translation = "「그늘을 걸을 수밖에 없었던 나에게 다가와서, 너는 언제나 따뜻한 빛을 줘──」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "하고, 그때였다."

[[dialogue]]
speaker = "unk"
original = "ジュエリーの体から星力が溢れるように白い光を放ち――"
translation = "쥬얼리의 몸에서 성력이 넘쳐흐르듯 하얀 빛을 내뿜으며――"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「これは……？」"
translation = "「이것은……?」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「ああ……」"
translation = "「아아……」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「やはり、このエクリプスフォームはキミとの愛の証だ」"
translation = "「역시, 이 이클립스 폼은 너와의 사랑의 증표야」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「キミへの愛おしい気持ちが高まるほど、力が溢れてくる。その証拠にこうして勝手に変身してしまった……」"
translation = "「너를 향한 사랑스러운 마음이 고조될수록, 힘이 넘쳐흘러. 그 증거로 이렇게 멋대로 변신해 버렸어……」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「ありがとう、助手。心配してくれて、私を探しに来てくれて。それから、私に温かい言葉をくれて」"
translation = "「고마워, 조수. 걱정해 줘서, 나를 찾으러 와줘서. 그리고, 나에게 따뜻한 말을 해줘서」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「助手、私は――今、とても幸せだ」"
translation = "「조수, 나는―― 지금, 너무나 행복해」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「私は――心から、キミが好きだ。キミのことを深く愛している」"
translation = "「나는―― 진심으로, 네가 좋아. 너를 깊이 사랑하고 있어」"

[[dialogue]]
speaker = "unk"
original = "ふと、愛の言葉に合わせて一瞬、エクリプスフォームの白いドレスが、<b>花嫁の衣装</b>のように見えてしまった。"
translation = "문득, 사랑의 말에 맞춰 일순, 이클립스 폼의 하얀 드레스가 **신부의 의상**처럼 보여 버렸다."

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「うん？\u3000急に照れた顔をして、どうしたんだい？\u3000助手？」"
translation = "「응? 갑자기 수줍어하는 얼굴을 하고, 왜 그러니? 조수?」"

[[dialogue]]
speaker = "unk"
original = "い、いや、なんでもない……"
translation = "아, 아니, 아무것도 아니야……"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「今は隠さず、教えてくれた方が私は嬉しい、と言ってもダメかい？」"
translation = "「지금은 숨기지 말고, 알려주는 편이 나는 기쁘다, 라고 해도 안 될까?」"

[[dialogue]]
speaker = "unk"
original = "そう言われてしまっては、誤魔化すわけにもいかない。"
translation = "그렇게 말해버리면, 얼버무릴 수도 없다."

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「ふふっ、なるほど……ウェディングドレスに見えた、か。なら――」"
translation = "「후훗, 과연…… 웨딩드레스로 보였다, 인가. 그렇다면――」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「誓いのキスでも……するかい？」"
translation = "「맹세의 키스라도…… 할까?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、彼女はそっと顔を近づけて――"
translation = "그렇게 말하며, 그녀는 살며시 얼굴을 가까이 대고――"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「ん……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「ちゅっ<emoji=heart04>\u3000あっ、助手っ<emoji=heart04>」"
translation = "「츄<emoji=heart04> 앗, 조수<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「はぁぁ……っ<emoji=heart04>\u3000ふふっ♪\u3000心の底から、愛しているよ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후훗♪ 마음속 깊은 곳에서부터, 사랑하고 있어<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "日傘の影に隠れながら、俺たちは何度もキスを交わすのだった――"
translation = "양산의 그림자에 숨으면서, 우리들은 몇 번이고 키스를 나누는 것이었다――"

