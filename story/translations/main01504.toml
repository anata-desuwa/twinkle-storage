[[dialogue]]
speaker = "unk"
original = "第５話,介入者,B"
translation = "제5화, 개입자, B"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──やめておけ」"
translation = "「──그만두거라.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "俺たちと塔を塞ぐようにして現れたのは──漆黒の<ruby>焔<rt>ほむら</rt></ruby>をたぎらせた、魔女だった。"
translation = "우리와 탑을 가로막듯이 나타난 것은── 칠흑의 불꽃을 끓어오르게 한, 마녀였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「セドナ、さん……」"
translation = "「세드나, 씨……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「やあ。魔界の旅はどうだったかな──諸君。よもや、うろも使わず帰ってくるとは思わなかったが」"
translation = "「여어. 마계 여행은 어땠나── 제군. 설마, 우로도 쓰지 않고 돌아올 줄은 몰랐지만.」"

[[dialogue]]
speaker = "unk"
original = "苦笑するセドナさん。なぜ彼女がここにいるのか。"
translation = "쓴웃음을 짓는 세드나 씨. 왜 그녀가 여기에 있는 것일까."

[[dialogue]]
speaker = "unk"
original = "それに……今の態度で確信した。やはり彼女たちは、端から俺たちを人間界へ帰す気はなかったのだ。"
translation = "게다가…… 지금의 태도로 확신했다. 역시 그들은, 처음부터 우리를 인간계로 돌려보낼 생각은 없었던 것이다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「息災で何よりだ、九浄の娘。だというのにむざむざ死地へ戻ってくるなど何を考えているのやら」"
translation = "「무탈해서 다행이다, 쿠죠의 딸. 그런데도 무모하게 사지로 돌아오다니 무슨 생각을 하는 건지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、おかげさまでね。クロト達を送ってくれたこと──それについては感謝してるわ。しきれないくらいね」"
translation = "「응, 덕분에 잘 지냈어. 쿠로토 일행을 보내준 것── 그것에 대해서는 감사하고 있어. 다 표현할 수 없을 만큼 말이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも……やめとけってどういうこと？\u3000私たちはアポロと、この世界を救うために戦ってるのよ」"
translation = "「근데…… 그만두라는 건 무슨 뜻이야? 우리는 아폴로와, 이 세계를 구하기 위해 싸우고 있어.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「わかっているさ。その上で、無謀はよせと言っている」"
translation = "「알고 있다. 그 위에서, 무모한 짓은 그만두라고 말하고 있는 거다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ヴィーナスさん……ご無事だったんですね」"
translation = "「비너스 씨…… 무사하셨군요.」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「でも、帰ってきちゃった」"
translation = "「하지만, 돌아와 버렸네.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アイリーンさん──カヤさん──」"
translation = "「아이린 씨── 카야 씨──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「堂々と学園まで乗り込んでくるものですね。ネビュラさん」"
translation = "「당당하게 학원까지 쳐들어오시는군요. 네뷸라 분들.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「非常事態ですから。お互いに」"
translation = "「비상사태니까요. 서로에게.」"

[[dialogue]]
speaker = "unk"
original = "ネビュラ──魔女の方々はエージェントまで引き連れて、学園の敷地内に入り込んでいた。"
translation = "네뷸라── 마녀들은 에이전트까지 대동하고, 학원 부지 내로 들어와 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで……セドナさん。どういうつもりですか？\u3000俺たちの行く手を阻んで」"
translation = "「그래서…… 세드나 씨. 무슨 생각입니까? 우리들의 앞길을 막고서.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「アレを見たのだろう？」"
translation = "「그것을 보았겠지?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何の──」"
translation = "「무슨──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──何のことか、とは言わせない。今この世界において、特筆すべき脅威はたった一点の存在だ」"
translation = "「──무슨 말이냐고는 말하게 하지 않겠다. 지금 이 세계에서, 특별히 언급해야 할 위협은 단 한 점의 존재다.」"

[[dialogue]]
speaker = "unk"
original = "天を見上げるセドナさん。"
translation = "하늘을 올려다보는 세드나 씨."

[[dialogue]]
speaker = "unk"
original = "その先にあるのは塔の頂上──そして、天蓋にまします仮面の少女。"
translation = "그 끝에 있는 것은 탑의 정상── 그리고, 천개에 계신 가면의 소녀."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「アレを見たなら、私たちの警告も理解できたはずだ。アレはもう、貴様らの敵う相手ではない」"
translation = "「그것을 보았다면, 우리의 경고도 이해했을 터다. 그것은 이미, 너희들이 대적할 상대가 아니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「アポロ──と名乗っているリクリエの使徒は、すでに魂のほとんどが<ruby>厄災<rt>やくさい</rt></ruby>と同化している。もはや手のつけられる存在ではない」"
translation = "「아폴로──라고 자칭하는 리크리에의 사도는, 이미 영혼의 대부분이 재앙과 동화하고 있다. 더 이상 손쓸 수 있는 존재가 아니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっと、そんな言い方──」"
translation = "「잠깐, 그런 식으로 말하면──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ほとんどが、と言ったろう。元の人格が僅かに残っているのを否定するわけではないさ。だが……現実に使徒の脅威度は何も変わらない」"
translation = "「대부분이라고 말했잖나. 원래의 인격이 아주 조금 남아 있는 것을 부정하는 것은 아니다. 하지만…… 현실적으로 사도의 위협도는 아무것도 변하지 않는다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「このように」"
translation = "「이처럼.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「！\u3000魔法の炎──」"
translation = "「! 마법의 불꽃──」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの放出した『魔焔』が──遥か上空の流れ星を燃やし、消滅させた。"
translation = "세드나 씨가 방출한 『마염』이── 아득히 상공의 유성을 태워, 소멸시켰다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「『リクリエの使徒』は狙った領域に流星を降らせる。どの街を、どの都市を壊滅させるのかも思いのままだ」"
translation = "「『리크리에의 사도』는 노린 영역에 유성을 내리게 한다. 어느 마을을, 어느 도시를 괴멸시킬지도 마음대로다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「今の奴にとって人間界など巨大な遊戯盤にすぎない。そんな相手に、貴様らはどう立ち回るという？」"
translation = "「지금의 녀석에게 인간계 따위 거대한 유희판에 불과하다. 그런 상대에게, 너희들은 어떻게 맞설 셈이냐?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「星術が使えなきゃ星騎士は意味なし。わざわざ死に急ぐことない」"
translation = "「성술을 쓸 수 없으면 성기사는 의미 없어. 일부러 죽음을 서두를 필요는 없다.」"

[[dialogue]]
speaker = "unk"
original = "──アポロは意図して流星を降らせる。"
translation = "── 아폴로는 의도적으로 유성을 내리게 한다."

[[dialogue]]
speaker = "unk"
original = "加えて、星力の発揮を封じる天蓋さえも操れる。"
translation = "게다가, 성력의 발휘를 봉쇄하는 천개마저도 조종할 수 있다."

[[dialogue]]
speaker = "unk"
original = "はっきり言って……<ruby>星騎士<rt>スターナイト</rt></ruby>に太刀打ちできる術はない。"
translation = "솔직히 말해서…… 성기사가 맞설 수 있는 방법은 없다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「緋宮クロト──いや、魔王。貴様の力量は承知している。その器に、今や魔力と霊力までを有していることもな」"
translation = "「히노미야 쿠로토── 아니, 마왕. 네 역량은 알고 있다. 그 그릇에, 이제 마력과 영력까지 가지고 있다는 것도.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが……たとえ貴様１人いたところで、あの脅威相手には立ちゆくまい」"
translation = "「하지만…… 설령 너 혼자 있다고 한들, 저 위협 상대로는 당해내지 못할 거다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あなた達──ネビュラなら、アポロに対処できると？」"
translation = "「당신들── 네뷸라라면, 아폴로에게 대처할 수 있다는 겁니까?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「今にご覧の通り、我々には魔力がある。魔法という理でもって、奴を抑えつけるくらいなら可能だ」"
translation = "「지금 보는 바와 같이, 우리에게는 마력이 있다. 마법이라는 이치로, 녀석을 억누르는 정도는 가능하다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んー……明確な勝算とは言えないと思うけど？」"
translation = "「음ー…… 명확한 승산이라고는 말할 수 없을 것 같은데?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふむ。確かに、私程度の魔力ではまだ不足だろうな」"
translation = "「흠. 확실히, 나 정도의 마력으로는 아직 부족하겠지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……他にもあてがあると？」"
translation = "「……다른 방도가 있다는 겁니까?」"

[[dialogue]]
speaker = "unk"
original = "そう訊ねた瞬間だった。"
translation = "그렇게 물은 순간이었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ま、余らに任せておけということだ──ネビュラの一大ぷろじぇくとなのでな」"
translation = "「뭐, 여에게 맡겨두라는 것이다── 네뷸라의 일대 프로젝트이니 말이다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ……基地にいたチビっこさんです！」"
translation = "「아…… 기지에 있던 꼬맹이 씨예요!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「外の空気はうまい──と言いたいところだが、今日の天気ではビミョ～だのう」"
translation = "「바깥 공기는 맛있──다고 말하고 싶지만, 오늘의 날씨로는 미묘하구먼.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君は確か……姫、とか呼ばれてた」"
translation = "「너는 분명…… 공주, 라고 불렸던.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「光の魔女にしてネビュラ総帥──クラウディア・イルゼ・フォン・ゴットフリート」"
translation = "「빛의 마녀이자 네뷸라 총수── 클라우디아 일제 폰 고트프리트.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。『腕試し』以来となるな、星騎士ども」"
translation = "「음. 『실력 시험』 이후로 오랜만이군, 성기사들아.」"

[[dialogue]]
speaker = "unk"
original = "唐突な光の<ruby>奔流<rt>ほんりゅう</rt></ruby>と共に現れたのは、魔女たちの<ruby>首魁<rt>しゅかい</rt></ruby>たる少女だった。"
translation = "갑작스러운 빛의 급류와 함께 나타난 것은, 마녀들의 수괴인 소녀였다."

[[dialogue]]
speaker = "unk"
original = "その登場にはなぜか、意外な人物まで反応して……"
translation = "그 등장에는 어째선지, 의외의 인물까지 반응하고……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ──あの時のガキンチョ！」"
translation = "「아── 그때 그 꼬맹이!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「わはは。久しぶりだのう、娘よ」"
translation = "「와하하. 오랜만이구먼, 딸이여.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれ？\u3000どうしてヴィーナスがあの子と知り合いなの……？」"
translation = "「어라? 어째서 비너스가 저 아이와 아는 사이인 거야……?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「確かに──あたしらが基地で会ったのって、ヴィーナスが<ruby>拐<rt>さら</rt></ruby>われてた時だよな？」"
translation = "「확실히── 우리들이 기지에서 만난 건, 비너스가 납치당했을 때였지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「前、お出かけ先のカフェで会ったのよ。いきなり、私の闇とか悩みとか払ってやるって言われて……」"
translation = "「전에, 외출한 카페에서 만났어. 갑자기, 내 어둠이나 고민 같은 걸 걷어내 주겠다고 하길래…….」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「人助けというやつだ。光の魔女──その力の真髄、とくと味わうがよい」"
translation = "「사람을 돕는다는 것이다. 빛의 마녀── 그 힘의 진수를, 마음껏 맛보도록 해라.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そこの娘が何やら思い詰めているようだったのでのう。余の魔法は効いたか？」"
translation = "「저기 있는 아가씨가 무언가 골똘히 생각하는 것 같았으니 말이다. 여의 마법은 효과가 있었느냐?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あの時は……そうね。色々スッキリしたし、私とクロトの関係もわかったし──お礼は言っとくわ」"
translation = "「그때는…… 그렇네. 여러모로 후련해졌고, 나와 쿠로토의 관계도 알았고── 고맙다고는 해둘게.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも！\u3000それとこれとは話が別よ。あんた達は一体何を企んでいるっていうの？」"
translation = "「하지만! 그거랑 이거랑은 별개의 문제야. 너희들은 대체 뭘 꾸미고 있다는 거야?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。もったいぶるつもりはないぞ、きっちり教えてやろう。余のせっかくの晴れ舞台なのだからな」"
translation = "「음. 뜸 들일 생각은 없다. 확실히 알려주마. 여의 모처럼의 무대이니 말이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（クラウディアの晴れ舞台──ってことは、さっきの、アポロを抑えつける算段っていうのが……）"
translation = "（클라우디아의 무대──라는 건, 아까 그, 아폴로를 억누를 방도라는 게……）"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（彼女の力……ということになりそうですね）"
translation = "（그녀의 힘……이라는 것이 되겠군요.）"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（そしてこのオーラ……彼女の真価は、セドナさんよりも上……！）"
translation = "（그리고 이 오라…… 그녀의 진가는, 세드나 씨보다 위……!）"

[[dialogue]]
speaker = "unk"
original = "以前、初めて会った際にも感じたすごみは今も健在。"
translation = "이전에 처음 만났을 때도 느꼈던 엄청난 기세는 지금도 건재하다."

[[dialogue]]
speaker = "unk"
original = "そして俺も、魔力の扱いに長けたことでよりその総量の膨大さを推し量れるようになっている。"
translation = "그리고 나도, 마력 다루기에 능숙해지면서 그 총량의 방대함을 더욱 짐작할 수 있게 되었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そうとも。余らは今日という日を待っていたのだ。余の生まれる前から、ずっとな」"
translation = "「그렇고말고. 우리들은 오늘이라는 날을 기다리고 있었다. 여가 태어나기 전부터, 줄곧.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「時期は少々早まったが──事は予見通りに進行している。ゆえに、手出しは無用というわけだ」"
translation = "「시기는 조금 빨라졌지만── 일은 예견대로 진행되고 있다. 그러니, 나설 필요는 없다는 것이다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「星騎士よ。貴様らの役目はすでに終えている。今日までのアステラ、モンスターの駆除といった露払い……実にご苦労だった」"
translation = "「성기사여. 귀관들의 역할은 이미 끝났다. 오늘까지의 아스테라, 몬스터 구제와 같은 길닦이…… 실로 수고가 많았다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いきなりご苦労って何よ！\u3000っていうか、私たちだって別にあんた達のために星騎士やってんじゃないんだから！」"
translation = "「갑자기 수고가 많았다고 하는 건 뭐야! 아니, 우리들도 딱히 너희들을 위해서 성기사를 하는 게 아니니까!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そ、そうですよう！\u3000わたし達にとっても今日が本番なのです！\u3000今は力が使えませんけど……」"
translation = "「그, 그렇습니다요! 저희들에게도 오늘이 본무대인 것입니다! 지금은 힘을 쓸 수 없지만…….」"

[[dialogue]]
speaker = "unk"
original = "あまりにも不遜な言いつけだが、ネビュラにはネビュラの策がある──それも遥か昔から──ということらしい。"
translation = "너무나도 불손한 명령이지만, 네뷸라에게는 네뷸라의 책략이 있다── 그것도 아주 오래전부터──라는 것 같다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の占拠──あなた達の仕業ですね」"
translation = "「<ruby>경계의 호수<rt>라고 시엘로</rt></ruby> 점거── 당신들의 소행이군요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ……そうだ。貴様たちを魔界へ隔離したのも、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を占拠したのも、全ては計画の一部にすぎない」"
translation = "「아아…… 그렇다. 귀관들을 마계로 격리한 것도, <ruby>경계의 호수<rt>라고 시엘로</rt></ruby>를 점거한 것도, 모두 계획의 일부에 지나지 않는다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「計画──」"
translation = "「계획──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「我々ネビュラが擁するグレート・ウォール計画──それは」"
translation = "「우리 네뷸라가 추진하는 그레이트 월 계획── 그것은.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「人間界全土を犠牲に、残る魔界と天界を救う算段だ」"
translation = "「인간계 전토를 희생하여, 남은 마계와 천계를 구하는 방도다.」"

