[[dialogue]]
speaker = "unk"
original = "──今日は、母さんが旅行に行っていて家にいない。"
translation = "──오늘은 어머니가 여행을 가셔서 집에 계시지 않는다."

[[dialogue]]
speaker = "マトイ"
original = "「へ、へぇ～。リノさん、今日はいないんだ……！\u3000あ、あはは……そっかそっか～」"
translation = "「헤, 헤에~. 리노 씨, 오늘은 안 계시는구나……! 아, 아하하…… 그렇구나 그렇구나~」"

[[dialogue]]
speaker = "マトイ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マトイ"
original = "「ふ、普通に考えて、つまり、そういうこと……なんだよね？\u3000私、変な勘違いしてないよね……？」"
translation = "「펴, 평범하게 생각해서, 즉, 그런 거……인 거지? 나, 이상한 착각 하는 거 아니지……?」"

[[dialogue]]
speaker = "クロト"
original = "「……その普通で合ってる。──俺はマトイのことが、欲しい」"
translation = "「……그 평범함이 맞아. ──나는 마토이를 원해.」"

[[dialogue]]
speaker = "マトイ"
original = "「……う、うん。わ、私も、その……そう思って、心の準備、してきたから」"
translation = "「……으, 응. 나, 나도 그…… 그렇게 생각해서 마음의 준비 해왔으니까.」"

[[dialogue]]
speaker = "マトイ"
original = "「私も会長にもらって欲しい……私の、はじめて」"
translation = "「나도 회장님이 가져줬으면 좋겠어…… 나의, 처음.」"

[[dialogue]]
speaker = "unk"
original = "俺は自分の部屋にマトイを招き入れると、ベッドの上で抱き合った──"
translation = "나는 자신의 방으로 마토이를 불러들여 침대 위에서 서로를 껴안았다──"

[[dialogue]]
speaker = "マトイ"
original = "「……んっ、はぁ……あ、あはは。この体勢、これからエッチするんだって感じがして、ん……えっちぃかも……」"
translation = "「……음, 하아…… 아, 아하하. 이 자세, 이제부터 섹스한다는 느낌이 들어서, 음…… 야할지도……」"

[[dialogue]]
speaker = "unk"
original = "お互い、相手に触れたいという気持ちのままに、服を脱がし合って……こうして膝の上で、マトイの小さな身体を感じていた。"
translation = "서로 상대에게 닿고 싶다는 마음이 가는 대로 옷을 벗겨주고…… 이렇게 무릎 위에서 마토이의 작은 몸을 느끼고 있었다."

[[dialogue]]
speaker = "マトイ"
original = "「不思議な感じ……。緊張はしてるけど、全然嫌な感じじゃないし……」"
translation = "「신기한 기분……. 긴장은 되지만 전혀 싫은 기분이 아니고……」"

[[dialogue]]
speaker = "マトイ"
original = "「ね……その、キス、したいかも……キスしてたら、緊張も段々ほぐれてくると、思うから……」"
translation = "「저기…… 그, 키스, 하고 싶을지도…… 키스하고 있으면 긴장도 점점 풀릴 거라고 생각하니까……」"

[[dialogue]]
speaker = "マトイ"
original = "「んっ……んちゅ、ちゅ、ちゅう……んふ、ふっ、んちゅる、ちゅう……」"
translation = "「음…… 응츄, 츄, 츄…… 음후, 후, 응츄루, 츄……」"

[[dialogue]]
speaker = "unk"
original = "俺はマトイの唇を舌でトントンとノックする。"
translation = "나는 마토이의 입술을 혀로 톡톡 노크한다."

[[dialogue]]
speaker = "マトイ"
original = "「んっ、んんっ……んちゅ……はぁ……その、え、エッチなキスも、しちゃうの……？」"
translation = "「음, 음음…… 응츄…… 하아…… 그, 야한 키스도 해버리는 거야……?」"

[[dialogue]]
speaker = "マトイ"
original = "「う、うん……大丈夫。私も、したい……舌を絡ませる、エッチなキス……」"
translation = "「으, 응…… 괜찮아. 나도 하고 싶어…… 혀를 섞는 야한 키스……」"

[[dialogue]]
speaker = "マトイ"
original = "「ん……はぁ……んっ、んくちゅ……んふっ、舌きもちぃ<emoji=heart04>\u3000はっ、はぁむ、んう……くちゅくちゅ、ん、ちゅる、ちゅむむ、んちゅるぅ……ぷはぁっ……<emoji=heart04>」"
translation = "「음…… 하아…… 음, 응쿠츄…… 음후, 혀 기분 좋아<emoji=heart04> 하, 하암, 응우…… 쿠츄쿠츄, 음, 츄루, 츄무무, 응츄루우…… 푸하아……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んふ、んちゅう<emoji=heart04>\u3000好き……大好き<emoji=heart04>\u3000れるれるれる、んくちゅる、ちゅうう……んふ<emoji=heart04>\u3000ちゅう……ちゅう……んんっ、はぁ、んちゅる、くちゅう……<emoji=heart04>」"
translation = "「음후, 응츄<emoji=heart04> 좋아해…… 너무 좋아해<emoji=heart04> 레루레루레루, 응쿠츄루, 츄우우…… 음후<emoji=heart04> 츄…… 츄…… 음음, 하아, 응츄루, 쿠츄우……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んっ、はぁ……はあ、はあ、んっ……す、凄いねこれ。キスしてるだけで、ちょっと気持ちよくなってきちゃったかも……」"
translation = "「음, 하아…… 하아, 하아, 음…… 대단하네 이거. 키스하는 것만으로 조금 기분 좋아져 버렸을지도……」"

[[dialogue]]
speaker = "マトイ"
original = "「うん<emoji=heart04>\u3000……もっと、もっとしたい……」"
translation = "「응<emoji=heart04> ……더, 더 하고 싶어……」"

[[dialogue]]
speaker = "マトイ"
original = "「んふ、んちゅう……好きっ、好きだよ<emoji=heart04>\u3000れるれるれる、んくちゅる、ちゅうう……んふ、ちゅう……ちゅう……んんっ、はぁ、んちゅる、くちゅう……<emoji=heart04>」"
translation = "「음후, 응츄…… 좋아해, 좋아해<emoji=heart04> 레루레루레루, 응쿠츄루, 츄우우…… 음후, 츄…… 츄…… 음음, 하아, 응츄루, 쿠츄우……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んっ、あっ……！\u3000な、なんか、お尻のところで擦れて……」"
translation = "「음, 앗……! 왠지 엉덩이 쪽에서 스쳐서……」"

[[dialogue]]
speaker = "マトイ"
original = "「これ……はぁぁ、おち○、ちん？\u3000あぁ、凄い……こんなに大きく、なるんだ。硬くて、血管も浮いてて、なんかカッコいいかも……」"
translation = "「이거…… 하아아, 자지? 아아, 굉장해…… 이렇게나 커지는구나. 딱딱하고 혈관도 불거져서 왠지 멋있을지도……」"

[[dialogue]]
speaker = "マトイ"
original = "「これが、私の中に入る、んだよね……？\u3000んくっ……ほ、本当に入るのかな。ちょっと、不安になってきたかも……」"
translation = "「이게 내 안으로 들어오는 거지……? 응긋…… 저, 정말로 들어가는 걸까. 조금 불안해졌을지도……」"

[[dialogue]]
speaker = "クロト"
original = "「……ゆっくり、マトイのペースでいいから。少しずつ慣らしていこう」"
translation = "「……천천히, 마토이의 페이스로 좋으니까. 조금씩 익숙해지자.」"

[[dialogue]]
speaker = "マトイ"
original = "「慣らす……こ、こう、かな……？」"
translation = "「익숙해지기…… 이, 이렇게 하는 건가……?」"

[[dialogue]]
speaker = "unk"
original = "腰を前後に動かして、マトイは自ら秘部を擦りつけてくる。"
translation = "허리를 앞뒤로 움직이며 마토이는 스스로 비부를 문질러온다."

[[dialogue]]
speaker = "マトイ"
original = "「んっ、んふぅ……<emoji=heart04>\u3000はあっ、んっ、ぁ、ああっ<emoji=heart04>\u3000ど、どうしよう、ちょっと、気持ちいいかも……んっ、んふうぅ……<emoji=heart04>！」"
translation = "「음, 응후우……<emoji=heart04> 하앗, 음, 아, 아앗<emoji=heart04> 어쩌지, 조금 기분 좋을지도…… 음, 응후우우……<emoji=heart04>!」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、それに私のここ……お、おま○こも<emoji=heart04>\u3000はぁぁっ、すっごい濡れちゃってて……ん、はぁ<emoji=heart04>\u3000うぅ、恥ずかしいぃ……<emoji=heart04>」"
translation = "「그, 게다가 나의 여기…… 보지도<emoji=heart04> 하아아, 엄청 젖어버려서…… 음, 하아<emoji=heart04> 으우, 부끄러워……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろとろとマトイの秘裂から熱い愛液が溢れ出し、ペニスをまんべんなく濡らしていく。"
translation = "질퍽질퍽하게 마토이의 비열에서 뜨거운 애액이 넘쳐나 페니스를 골고루 적셔간다."

[[dialogue]]
speaker = "マトイ"
original = "「はぁ……んっ、ふあっ、はあああっ<emoji=heart04>\u3000ん……気持ち、いいの？\u3000そ、そっか<emoji=heart04>\u3000なんか、嬉しいかも……えへへっ<emoji=heart04>」"
translation = "「하아…… 음, 후앗, 하아아앗<emoji=heart04> 음…… 기분 좋아? 그, 그렇구나<emoji=heart04> 왠지 기쁠지도…… 에헤헷<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「じゃ、じゃあ……そろそろ、しちゃう？\u3000んんっ、私のほうは多分、大丈夫だと思うから……」"
translation = "「그, 그럼…… 슬슬 해버릴까? 음음, 내 쪽은 아마 괜찮을 것 같으니까……」"

[[dialogue]]
speaker = "クロト"
original = "「なるべく優しくする。マトイの初めて、もらうな……？」"
translation = "「최대한 부드럽게 할게. 마토이의 처음, 가져갈게……?」"

[[dialogue]]
speaker = "マトイ"
original = "「うん……お願い、します……。んっ、んちゅうっ、ちゅ、ちゅう……」"
translation = "「응…… 부탁해요……. 음, 응츄우, 츄, 츄……」"

[[dialogue]]
speaker = "unk"
original = "軽いキスをしながらマトイの秘裂の入り口にペニスをあてがい、そのまま腰を押し進めていく。"
translation = "가벼운 키스를 하며 마토이의 비열 입구에 페니스를 대고 그대로 허리를 밀어 넣는다."

[[dialogue]]
speaker = "マトイ"
original = "「んっ、ふああぁぁぁぁあああ～～～～っっ<emoji=heart04><emoji=heart04>！」"
translation = "「음, 후아아아아아아아아아아~~~~~~앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "マトイ"
original = "「んはぁっ、はあ、はぁあっ<emoji=heart04>\u3000おち○ちん、全部、入ったぁ……<emoji=heart04>」"
translation = "「응하아, 하아, 하아앗<emoji=heart04> 자지, 전부 들어갔어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁の熱く柔らかな感触に包まれて、あまりの気持ちよさにすぐにでも出てしまいそうになる。"
translation = "질벽의 뜨겁고 부드러운 감촉에 감싸여 너무나도 기분 좋은 나머지 금방이라도 싸버릴 것 같아진다."

[[dialogue]]
speaker = "マトイ"
original = "「んあぁっ……<emoji=heart04>\u3000おま○この中、会長の体温、感じる<emoji=heart04>\u3000……んふぅ<emoji=heart04>\u3000あんまり痛くなかったのは、沢山キスしてくれたから、かなっ。……えへへ<emoji=heart04>」"
translation = "「음아아……<emoji=heart04> 보지 안, 회장님의 체온이 느껴져<emoji=heart04> ……음후<emoji=heart04> 별로 아프지 않았던 건 키스를 많이 해줘서일까. ……에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あぁ……お腹の中に、おち○ちん、入っちゃってる<emoji=heart04>\u3000ん、はぁぁぁ<emoji=heart04>\u3000私で興奮してくれた、おっきいおち○ちん……なんだか、嬉しいかも<emoji=heart04>」"
translation = "「아아…… 배 안에 자지가 들어와 있어<emoji=heart04> 음, 하아아아<emoji=heart04> 나 때문에 흥분해준 커다란 자지…… 왠지 기쁠지도<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んっ、ふう……<emoji=heart04>\u3000ねえ、そろそろ動かしても、大丈夫だよ。……ただ、ね？\u3000動かしてもいいから、いっぱいキス、して欲しいな……？」"
translation = "「음, 후우……<emoji=heart04> 저기, 슬슬 움직여도 괜찮아. ……다만 말이야? 움직여도 좋으니까 키스 많이 해줬으면 좋겠어……?」"

[[dialogue]]
speaker = "マトイ"
original = "「エッチしてる最中は男の人って、余裕なくなっちゃうって言うし、大変？\u3000ダメ、かな……」"
translation = "「섹스하는 도중에는 남자들은 여유가 없어진다고들 하고, 힘들어? 안…… 될까?」"

[[dialogue]]
speaker = "マトイ"
original = "「あ……キス<emoji=heart04>\u3000……ん、んふっ、ちゅうぅ<emoji=heart04>\u3000んふ、ちゅぷ、ちゅるる、んくっ、はぁ……、ん、んちゅる、ちゅう、ちゅるぅ<emoji=heart04>」"
translation = "「아…… 키스<emoji=heart04> ……음, 응후, 츄푸, 츄루루, 응긋, 하아……, 음, 응츄루, 츄, 츄루우<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んふ、好き、好きっ……大好き<emoji=heart04>\u3000んくちゅ、ちゅむちゅむ、んちゅう……<emoji=heart04>！\u3000んはあ、れちゅれちゅ、れるう、れるるるぅ<emoji=heart04>\u3000んちゅ、ちゅぱぁ<emoji=heart04>」"
translation = "「음후, 좋아해, 좋아해…… 너무 좋아해<emoji=heart04> 응쿠츄, 츄무츄무, 응츄우……<emoji=heart04>! 응하아, 레츄레츄, 레루우, 레루루루우<emoji=heart04> 응츄, 츄파아<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んむっ、好きっ<emoji=heart04>\u3000んちゅっ、会長好きっ<emoji=heart04>\u3000んくちゅ、ちゅむちゅむ、んちゅう<emoji=heart04>\u3000んは、好きなのぉっ<emoji=heart04>\u3000れちゅれちゅ、れるう、れるるるぅ……んちゅ、ちゅぱぁ<emoji=heart04>」"
translation = "「음뭇, 좋아해<emoji=heart04> 응츄, 회장님 좋아해<emoji=heart04> 응쿠츄, 츄무츄무, 응츄우<emoji=heart04> 응하, 좋아하는걸<emoji=heart04> 레츄레츄, 레루우, 레루루루우…… 응츄, 츄파아<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んっ、はっ、はあっ<emoji=heart04>\u3000凄い……おち○ちん、私の中で、動いてるのわかる……っ<emoji=heart04>\u3000んっ、あっ、ふあぁ……気持ちいいよぉ。んうっ、んあっ、あっ、ふああっ<emoji=heart04>」"
translation = "「음, 하, 하앗<emoji=heart04> 굉장해…… 자지, 내 안에서 움직이는 게 느껴져……<emoji=heart04> 음, 앗, 후아…… 기분 좋아. 응우, 응앗, 앗, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、はあっ、んぁ、はああっ<emoji=heart04>\u3000んくっ、はぁ、はああっ<emoji=heart04>\u3000おち○ちん、あったかくて、気持ちいい……<emoji=heart04>\u3000んぅ、ふっ、ふぁっ、はぁんっ<emoji=heart04>」"
translation = "「앗, 하앗, 응아, 하아앗<emoji=heart04> 응쿠, 하아, 하아앗<emoji=heart04> 자지, 따뜻해서 기분 좋아……<emoji=heart04> 음우, 후, 후아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、はあん<emoji=heart04>\u3000ふああっ<emoji=heart04>\u3000私、会長とこんな風にエッチしてるの……はふぅぅ……本当に、夢みたい<emoji=heart04>\u3000……んっ、ふぁんっ<emoji=heart04>\u3000はあっ、ああっ<emoji=heart04>」"
translation = "「앗, 하앙<emoji=heart04> 후아앗<emoji=heart04> 나, 회장님과 이렇게 섹스하고 있는 거…… 하후우우…… 정말 꿈만 같아<emoji=heart04> ……음, 후앙<emoji=heart04> 하앗, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「夢みたいって、大げさじゃない、か……っ？」"
translation = "「꿈만 같다니, 과장이 아니야……?」"

[[dialogue]]
speaker = "マトイ"
original = "「ん、んくちゅ<emoji=heart04>\u3000ちゅ、ちゅう……んちゅぱ<emoji=heart04>\u3000……はぁ。だ、だって、私ってそんな、人に気に入ってもらえるような、特徴ってなかったし……っ」"
translation = "「음, 응쿠츄<emoji=heart04> 츄, 츄…… 응츄파<emoji=heart04> ……하아. 그, 그치만 나는 그렇게 남에게 사랑받을 만한 특징 같은 건 없었는걸……」"

[[dialogue]]
speaker = "マトイ"
original = "「ずっと自分のこと、普通だと思ってて、ちょっとコンプレックスだったから……んっ、はあぁ<emoji=heart04>\u3000会長の特別になれて、本当に嬉しいのっ<emoji=heart04>\u3000んはっ、ふああんっ<emoji=heart04>」"
translation = "「계속 내 자신을 평범하다고 생각해서 조금 콤플렉스였으니까…… 음, 하아아<emoji=heart04> 회장님의 특별한 사람이 되어서 정말 기뻐<emoji=heart04> 응하, 후아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「こうやって抱きしめ合って……キスして……エッチして<emoji=heart04>\u3000んはっ、はあっ、んううう<emoji=heart04>\u3000それも、自分の、大好きな人と……んくちゅ、ちゅうぅ<emoji=heart04>\u3000んんっ、はぁんっ<emoji=heart04>」"
translation = "「이렇게 껴안고…… 키스하고…… 섹스하고<emoji=heart04> 응하, 하앗, 응우우우<emoji=heart04> 그것도 내가 너무 좋아하는 사람이랑…… 응쿠츄, 츄우우<emoji=heart04> 음음, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ん……それに、こんなに気持ちよくて……んっ、相性も、バッチリだし……んくっ、あっ、はっ、ふぁぁんっ<emoji=heart04><emoji=heart04>\u3000んふぁ、はあっ、はあぁぁあんっ<emoji=heart04>」"
translation = "「음…… 게다가 이렇게 기분 좋고…… 음, 궁합도 딱이고…… 응쿠, 앗, 하, 후아앙<emoji=heart04><emoji=heart04> 응후아, 하앗, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちゅぷちゅぷとピストンを繰り返すたびに愛液が跳ね、お互いのふとももをぐっしょりと濡らしていく。"
translation = "츄푸츄푸 소리를 내며 피스톤을 반복할 때마다 애액이 튀어 서로의 허벅지를 듬뿍 적셔간다."

[[dialogue]]
speaker = "マトイ"
original = "「ちゃんと、気持ちよくなれてる……？\u3000んっ。はぁ、はぁ……もし遠慮してるんだったら、イヤだからね？\u3000私は、もう本当に気持ちいい、から……<emoji=heart04>」"
translation = "「제대로 기분 좋아지고 있어……? 음. 하아, 하아…… 혹시 배려하고 있는 거라면 싫으니까 말이야? 나는 이제 정말 기분 좋으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「だから……んあっ、はぁぁ<emoji=heart04>\u3000会長も、もっと、気持ちよくなって欲しいの……<emoji=heart04>\u3000男の人は、激しい方が気持ちいいん、だよね？」"
translation = "「그러니까…… 응앗, 하아아<emoji=heart04> 회장님도 더 기분 좋아졌으면 좋겠어……<emoji=heart04> 남자는 격렬한 게 기분 좋은 거지?」"

[[dialogue]]
speaker = "クロト"
original = "「いいのか……？」"
translation = "「괜찮겠어……?」"

[[dialogue]]
speaker = "マトイ"
original = "「うんっ<emoji=heart04>\u3000……いっぱい、気持ちよくなって欲しいっ。はあっ、んふあっ、はああっ<emoji=heart04>」"
translation = "「응<emoji=heart04> ……잔뜩 기분 좋아졌으면 좋겠어. 하앗, 응후앗, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んっ、んちゅ、ちゅぷ、ちゅう<emoji=heart04>\u3000好き……好きぃ<emoji=heart04>\u3000れるれる、れりゅ……んぢゅる、ぢゅ、ん、んちゅる、ちゅぷぅ<emoji=heart04>」"
translation = "「음, 응츄, 츄푸, 츄우<emoji=heart04> 좋아해…… 좋아해에<emoji=heart04> 레루레루, 레류…… 응쥬루, 쥬, 음, 응츄루, 츄푸우<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……マトイッ！」"
translation = "「윽…… 마토이!」"

[[dialogue]]
speaker = "マトイ"
original = "「あんっ、会長っ……！\u3000あっ……ふああぁぁぁああああああ──────ッ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙, 회장님……! 앗…… 후아아아아아아아아아아──────앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ふぁ、はあああああんっ<emoji=heart04><emoji=heart04>！\u3000んっ<emoji=heart04>\u3000くあっ、はあっ、はあっ、んんっ、ふああっ<emoji=heart04>\u3000腰、掴んで……はげしいっ<emoji=heart04>\u3000んふぁっ、あっ、はあっ、あああっ<emoji=heart04>！」"
translation = "「후아, 하아아아아앙<emoji=heart04><emoji=heart04>! 음<emoji=heart04> 쿠앗, 하앗, 하앗, 음음, 후아앗<emoji=heart04> 허리, 잡고…… 격렬해<emoji=heart04> 응후아, 앗, 하앗, 아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、はっ、はあっ、んあっ、はああっ<emoji=heart04><emoji=heart04>\u3000おち○ちん、奥まで来てる<emoji=heart04>\u3000はあっ、んくっ、んふあぁ<emoji=heart04>\u3000んふぁ、ふぁぁぁんっ<emoji=heart04>」"
translation = "「앗, 하, 하앗, 응앗, 하아앗<emoji=heart04><emoji=heart04> 자지, 끝까지 오고 있어<emoji=heart04> 하앗, 응쿠, 응후아아<emoji=heart04> 응후아, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "遠慮はしない──とは言っても、なるべくマトイが痛くならないように、膣内の反応がいいところを探りながら、抽送を続ける。"
translation = "사양은 하지 않는다──고는 해도, 가급적 마토이가 아프지 않게 질 내의 반응이 좋은 곳을 찾으며 추송을 계속한다."

[[dialogue]]
speaker = "マトイ"
original = "「んくっ、はぁ、はぁ、はああんっ<emoji=heart04>！\u3000おち○ちん、気持ちいいっ？\u3000ちゃんと、私で射精、できそうかなっ<emoji=heart04>\u3000んくっ、ふあっ、ふあああんっ<emoji=heart04>！」"
translation = "「응쿠, 하아, 하아, 하아앙<emoji=heart04>! 자지, 기분 좋아? 제대로 나로 사정할 수 있을 것 같아?<emoji=heart04> 응쿠, 후앗, 후아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「当たり前だっ……気持ちよすぎて、ずっと我慢してるだけだっ」"
translation = "「당연하지…… 너무 기분 좋아서 계속 참고 있을 뿐이다」"

[[dialogue]]
speaker = "マトイ"
original = "「よ、よかったぁっ<emoji=heart04>\u3000んっ、はっ、はあっ、はあんっ<emoji=heart04><emoji=heart04>！\u3000私のおま○こ、ちゃんと気持ちいいんだっ<emoji=heart04>\u3000ん、んふあっ、はっ、ああっ、んああっ<emoji=heart04><emoji=heart04>！」"
translation = "「다, 다행이다아<emoji=heart04> 음, 하, 하앗, 하앙<emoji=heart04><emoji=heart04>! 내 보지, 제대로 기분 좋구나<emoji=heart04> 음, 응후앗, 하, 앗, 응아앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "unk"
original = "亀頭を擦り上げる刺激と、竿を包み込む温かさが、どんどんとペニスを射精へと近づけていく。"
translation = "귀두를 쓸어 올리는 자극과 기둥을 감싸 안는 따뜻함이 점점 페니스를 사정으로 몰아넣는다."

[[dialogue]]
speaker = "マトイ"
original = "「私も、んふあっ、はっ、動くね<emoji=heart04>\u3000はあっ、んんっ、ふああっ、はああっ<emoji=heart04>！\u3000もっと、もっと気持ちよく、なって欲しいから……っ<emoji=heart04>\u3000ん、んあっ、はあっ<emoji=heart04>」"
translation = "「나도, 응후앗, 하, 움직일게<emoji=heart04> 하앗, 음음, 후아앗, 하아앗<emoji=heart04>! 더, 더 기분 좋게 해주고 싶으니까……<emoji=heart04> 음, 응앗, 하앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「キスも、もっと、もっとぉ<emoji=heart04>\u3000んっ、くちゅ、ちゅるるう<emoji=heart04>\u3000んちゅ、れるれるれる、んぢゅる、んふ、ふううっ<emoji=heart04><emoji=heart04>\u3000れりゅれりゅ、れりゅうっ<emoji=heart04><emoji=heart04>！」"
translation = "「키스도 더, 더어<emoji=heart04> 음, 쿠츄, 츄루루우<emoji=heart04> 응츄, 레루레루레루, 응쥬루, 음후, 후우우<emoji=heart04><emoji=heart04> 레류레류, 레류우<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "マトイ"
original = "「好き、大好きっ<emoji=heart04>\u3000んちゅ、くちゅちゅ、はぁ、好きぃ<emoji=heart04>\u3000んうっ、れるれる、れりゅう<emoji=heart04><emoji=heart04>\u3000んぢゅる、ちゅむ、ちゅううっ<emoji=heart04><emoji=heart04>」"
translation = "「좋아해, 너무 좋아해<emoji=heart04> 응츄, 쿠츄츄, 하아, 좋아해에<emoji=heart04> 응우, 레루레루, 레류우<emoji=heart04><emoji=heart04> 응쥬루, 츄무, 츄우우<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、はっ、はあっ、はあんっ<emoji=heart04>！\u3000あ、はぁっ<emoji=heart04>\u3000会長、凄く、気持ちよさそうな顔……っ<emoji=heart04><emoji=heart04>\u3000射精、しそうなの<emoji=heart04>？\u3000んっ、ああっ、はああっ<emoji=heart04><emoji=heart04>！」"
translation = "「앗, 하, 하앗, 하앙<emoji=heart04>! 아, 하앗<emoji=heart04> 회장님, 정말 기분 좋아 보이는 얼굴……<emoji=heart04><emoji=heart04> 사정할 것 같아? 음, 아앗, 하아앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "マトイ"
original = "「うんっ、いいよっ<emoji=heart04>\u3000私の中で出してっ<emoji=heart04><emoji=heart04>\u3000このまま、感じてたいから……っ<emoji=heart04>\u3000そのままっ、中にぃ<emoji=heart04>\u3000んはっ、あっ、あっ、はああんっ<emoji=heart04>」"
translation = "「응, 좋아! 내 안에서 싸줘<emoji=heart04><emoji=heart04> 이대로 느끼고 싶으니까…… 그대로 안에다가<emoji=heart04> 응하, 앗, 앗, 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「はあっ、はあっ、んあっ、はああっ<emoji=heart04><emoji=heart04>！\u3000ぁっ、んあ、んっ、んうう～～<emoji=heart04><emoji=heart04>！\u3000なんか、私も、へ、変な感じ……っ<emoji=heart04><emoji=heart04>\u3000お腹の奥、ぞわぞわして、んっ、んふあぁ<emoji=heart04>！」"
translation = "「하앗, 하앗, 응앗, 하아앗<emoji=heart04><emoji=heart04>! 아, 응아, 음, 음우우~~<emoji=heart04><emoji=heart04>! 왠지 나도 이, 이상한 기분……<emoji=heart04><emoji=heart04> 뱃속 깊은 곳이 근질근질해서, 음, 응후아아<emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「マトイも、イキそうなんじゃないのか……っ」"
translation = "「마토이도, 가버릴 것 같지 않아……?」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、はあっ、んはああっ<emoji=heart04>\u3000い、イク……？\u3000これが、イクってことなのかな……っ、んっ、はあっ、はあああんっ<emoji=heart04><emoji=heart04>！」"
translation = "「앗, 하앗, 응하아앗<emoji=heart04> 가, 가버려……? 이게, 가버린다는 걸까……, 윽, 하앗, 하아아앙<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "マトイ"
original = "「はあっ、はああっ<emoji=heart04>\u3000私、好きな人のおち○ちんで、イッちゃうんだ……っ<emoji=heart04><emoji=heart04>\u3000んっ、くぁっ、ひゃっ、んはあっ<emoji=heart04><emoji=heart04>」"
translation = "「하앗, 하아앗<emoji=heart04> 나, 좋아하는 사람의 자지로, 가버리는구나……<emoji=heart04><emoji=heart04> 음, 쿠앗, 히햣, 응하앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ふわぁぁぁん<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000幸せっ、はあぁぁんっ、おま○こ幸せになっちゃうよぉぉ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000あぁぁぁあっ<emoji=heart04>」"
translation = "「후아아아앙<emoji=heart04> 아아앗<emoji=heart04> 행복해, 하아아앙, 보지 행복해져 버려어어<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「うん、いいよ<emoji=heart04>\u3000出してっ<emoji=heart04><emoji=heart04>\u3000私もイク、イクからっ……<emoji=heart04>\u3000んっ、ふあっ、あっあっあっあっ、ふあああっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「응, 좋아<emoji=heart04> 싸줘<emoji=heart04><emoji=heart04> 나도 가, 갈 거니까……<emoji=heart04> 음, 후앗, 앗앗앗앗, 후아아앗<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「好きだっ、マトイッ！」"
translation = "「좋아해, 마토이!」"

[[dialogue]]
speaker = "マトイ"
original = "「私も好きぃっ！\u3000ふあぁぁぁぁぁぁああっ<emoji=heart04>\u3000しゅき、しゅき、しゅきぃ<emoji=heart04><emoji=heart04>\u3000大しゅきぃぃ……っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「나도 좋아해애! 후아아아아아아아앗<emoji=heart04> 죠아, 죠아, 죠아해에<emoji=heart04><emoji=heart04> 너무 죠아해애……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ふああっ<emoji=heart04>！\u3000ふああぁぁぁあっ～～～～<emoji=heart04><emoji=heart04><emoji=heart04>！！\u3000イク、イク、イクぅぅぅぅ────っ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04>! 후아아아아앗~~~~<emoji=heart04><emoji=heart04><emoji=heart04>!! 가, 가, 가버려어어어어────앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「っ……ひああっ──んあぁあああああああ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>！！」"
translation = "「윽…… 히아앗──응아아아아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>!!」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、ああっ……はああっ<emoji=heart04><emoji=heart04>！\u3000出てるぅ……おち○ちんから、熱いの、沢山出てる……っ。んっ、うぁ、はあっ<emoji=heart04>\u3000んくっ、ふあああっ……<emoji=heart04><emoji=heart04>！」"
translation = "「앗, 아앗…… 하아앗<emoji=heart04><emoji=heart04>! 나오고 있어…… 자지에서, 뜨거운 거, 잔뜩 나오고 있어……. 음, 우아, 하앗<emoji=heart04> 응쿠, 후아아앗……<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "unk"
original = "マトイに抱きしめられ、くらくらするような甘い香りを胸いっぱいに吸い込む。"
translation = "마토이에게 안겨, 아찔할 정도로 달콤한 향기를 가슴 가득 들이마신다."

[[dialogue]]
speaker = "マトイ"
original = "「んんっ、まだ出てるぅ<emoji=heart04>\u3000これ、すごいぃ……<emoji=heart04>\u3000会長の好きって気持ち、流れ込んでくるみたいぃ……<emoji=heart04>」"
translation = "「음음, 아직 나오고 있어어<emoji=heart04> 이거, 굉장해에……<emoji=heart04> 회장님의 좋아한다는 마음이, 흘러 들어오는 것 같아아……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、はあっ、はああっ……。はふぅぅ……気持ちいいぃ、気持ちいいよぉ……<emoji=heart04>」"
translation = "「앗, 하앗, 하아앗……. 하후우…… 기분 좋아아, 기분 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁ、はぁ、はぁああ……好き、好きだよ<emoji=heart04>\u3000んくちゅ、ちゅ、ちゅうぅぅ<emoji=heart04>\u3000んふ、ん、んんうぅ～～<emoji=heart04>」"
translation = "「하아, 하아, 하아아아…… 좋아해, 좋아해<emoji=heart04> 응쿠츄, 츄, 츄우우우<emoji=heart04> 응후, 응, 응응우우~~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あはぁ……<emoji=heart04>\u3000うれしいぃ……中出し、してもらえちゃったぁ<emoji=heart04>」"
translation = "「아하아……<emoji=heart04> 기뻐어…… 질내사정, 받아버렸어어<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「エッチって、凄いんだね……こんなに幸せになれて、いいのかなぁ……。んっ、はぁ……はぁ……んくっ、どうしよう、もう離れたくないかも……<emoji=heart04>」"
translation = "「섹스라는 거, 굉장하네…… 이렇게 행복해져도, 되는 걸까……. 음, 하아…… 하아…… 응쿠, 어쩌지, 이제 떨어지고 싶지 않을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、まだマトイと離れたくない……」"
translation = "「나도, 아직 마토이랑 떨어지고 싶지 않아……」"

[[dialogue]]
speaker = "マトイ"
original = "「か、会長ぉ……えへへ<emoji=heart04>」"
translation = "「회, 회장님…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んんっ……あ、あれ？\u3000まだ、おち○ちん硬いまま、だね……。男の人って、１回出したら、もう出せないんじゃないの？」"
translation = "「음음…… 어, 어라? 아직, 자지가 딱딱한 채네……. 남자는, 한 번 싸면, 더 못 싸는 거 아니었어?」"

[[dialogue]]
speaker = "クロト"
original = "「……マトイが可愛すぎて、１回じゃ収まらないかも」"
translation = "「……마토이가 너무 귀여워서, 한 번으로는 안 끝날지도 몰라」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そっかぁ……<emoji=heart04>\u3000えへへぇ、嬉しいっ<emoji=heart04>」"
translation = "「그, 그렇구나아……<emoji=heart04> 에헤헤, 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイは耳元で、甘く囁く。"
translation = "마토이는 귓가에 달콤하게 속삭인다."

[[dialogue]]
speaker = "マトイ"
original = "「じゃあ……今日はずっと、会長に愛して欲しい、かも<emoji=heart04>」"
translation = "「그럼…… 오늘은 계속, 회장님이 사랑해줬으면 좋겠어, 일지도<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きな子にそんなことを言われて、気持ちを抑えられるはずもなく──"
translation = "좋아하는 아이에게 그런 말을 듣고, 마음을 억누를 수 있을 리가 없었고──"

[[dialogue]]
speaker = "マトイ"
original = "「あぁんっ、会長ぉっ<emoji=heart04>\u3000んちゅっ、ちゅぷっ、んちゅるっ、ちゅうっ……」"
translation = "「아앙, 회장님<emoji=heart04> 응츄, 츄푸, 응츄루, 츄우……」"

[[dialogue]]
speaker = "unk"
original = "お互い甘えるように、夜遅くなるまで何度も快楽を貪り合うのだった。"
translation = "서로 응석 부리듯, 밤늦게까지 몇 번이고 쾌락을 탐닉하는 것이었다."

