[[dialogue]]
speaker = "unk"
original = "第３話,激辛珍道中,P"
translation = "제3화, 매운맛 진도중, P"

[[dialogue]]
speaker = "セドナ"
original = "「ん──貴様か。よく会うな。奇遇だと？\u3000馬鹿を言え、こういうのは悪縁というのだ」"
translation = "「음── 네놈인가. 자주 만나는군. 기구한 인연이라고? 바보 같은 소리 마라, 이런 건 악연이라고 하는 거다.」"

[[dialogue]]
speaker = "unk"
original = "外で会うのは珍しい"
translation = "밖에서 만나는 건 드무네요"

[[dialogue]]
speaker = "unk"
original = "どうしてここに？"
translation = "어째서 여기에?"

[[dialogue]]
speaker = "セドナ"
original = "「何、ただの昼時だ。この近くに馴染みの店があってな──たまに余裕のある際は寄るようにしている」"
translation = "「별거 아니다, 그냥 점심시간일 뿐이다. 이 근처에 단골 가게가 있어서 말이지── 가끔 여유가 있을 때는 들르곤 한다.」"

[[dialogue]]
speaker = "セドナ"
original = "「最近は滅多に赴くこともなかったのだが……以前、誰かさんに少しは休めと説教されてしまったのでな」"
translation = "「최근에는 좀처럼 올 일도 없었다만…… 이전에 누군가에게 조금은 쉬라고 설교를 들어버려서 말이다.」"

[[dialogue]]
speaker = "セドナ"
original = "「そうだ。せっかくの機だ、貴様も来るか？\u3000いつか学園内を巡らせてもらった礼もある」"
translation = "「그렇지. 기왕 이렇게 된 거, 너도 오겠나? 언젠가 학원 안을 안내받았던 답례도 있으니까.」"

[[dialogue]]
speaker = "unk"
original = "お言葉に甘えて……"
translation = "호의를 받아들여서……"

[[dialogue]]
speaker = "unk"
original = "いいんですか？"
translation = "괜찮은 건가요?"

[[dialogue]]
speaker = "セドナ"
original = "「ああ。穴場ゆえ混むこともないだろう──遠慮せずにたんと喰らえ」"
translation = "「아아. 숨겨진 맛집이라 붐비지도 않을 거다── 사양 말고 듬뿍 먹어라.」"

[[dialogue]]
speaker = "セドナ"
original = "「ふむ──久方ぶりの訪問だったが、やはりここの火鍋は良い。全身に魔力が染み渡るかのようだ」"
translation = "「흠── 오랜만의 방문이었다만, 역시 여기 훠궈는 좋군. 전신에 마력이 스며드는 것 같아.」"

[[dialogue]]
speaker = "セドナ"
original = "「……ん？\u3000なんだ貴様、がぶがぶ水など飲んで」"
translation = "「……응? 뭐야 네놈, 벌컥벌컥 물만 마시고.」"

[[dialogue]]
speaker = "unk"
original = "口から火が！"
translation = "입에서 불이!"

[[dialogue]]
speaker = "unk"
original = "辛すぎる！"
translation = "너무 매워요!"

[[dialogue]]
speaker = "セドナ"
original = "「はっはっはっ。どうした、顔を真っ赤にして──そんなに刺激が強すぎたか？\u3000とんだお子ちゃまだな」"
translation = "「핫핫핫. 왜 그러느냐, 얼굴을 새빨갛게 해가지고── 그렇게 자극이 강했나? 정말 어린애 같군.」"

[[dialogue]]
speaker = "セドナ"
original = "「くっくっ。いや何。貴様が必死に汗をかいている姿がおかしくてな。ふふっ、あまり笑わせるな！」"
translation = "「큭큭. 아니, 아무것도 아니다. 네놈이 필사적으로 땀을 흘리는 모습이 웃겨서 말이지. 후훗, 너무 웃기지 마라!」"

[[dialogue]]
speaker = "セドナ"
original = "「これしきの辛さで音を上げるとはしようのない奴だ。ほら、私の水もやる」"
translation = "「이 정도 맵기로 엄살을 떨다니 어쩔 수 없는 녀석이군. 자, 내 물도 주마.」"

[[dialogue]]
speaker = "unk"
original = "辛いものが好きなの？"
translation = "매운 음식을 좋아해?"

[[dialogue]]
speaker = "セドナ"
original = "「まあ、それなりにな。森にはもっと刺激的な香草もあった──体が慣れているのかもしれんな」"
translation = "「뭐, 나름대로다. 숲에는 훨씬 자극적인 향초도 있었지── 몸이 익숙해진 것일지도 모르겠군.」"

[[dialogue]]
speaker = "セドナ"
original = "「……意外か？」"
translation = "「……의외인가?」"

[[dialogue]]
speaker = "unk"
original = "割とイメージ通り"
translation = "비교적 이미지 그대로야"

[[dialogue]]
speaker = "セドナ"
original = "「……ぐ。いや……別にイメージ通りだったからと言って何が悪いわけでもないのだが。若干、負けた気にはなるな」"
translation = "「……윽. 아니…… 딱히 이미지 그대로라고 해서 나쁠 건 없지만. 약간, 진 것 같은 기분이 드는군.」"

[[dialogue]]
speaker = "セドナ"
original = "「しかし、まだダメージが残っているとはな。軟弱なものだ」"
translation = "「그나저나, 아직 대미지가 남아 있다니. 연약하군.」"

[[dialogue]]
speaker = "セドナ"
original = "「仕方ない──向こうでジェラートでも食すか？\u3000一軒だけだが、顔なじみの場所がある」"
translation = "「어쩔 수 없지── 저기서 젤라토라도 먹겠나? 딱 한 군데지만, 낯익은 가게가 있다.」"

[[dialogue]]
speaker = "unk"
original = "そこは意外でした"
translation = "그건 의외네요"

[[dialogue]]
speaker = "unk"
original = "面倒見がいいんですね"
translation = "남을 잘 챙겨주시네요"

[[dialogue]]
speaker = "セドナ"
original = "「……貴様、私をからかっているんじゃあるまいな？\u3000あまりふざけるようならこの場に置いていくぞ」"
translation = "「……네놈, 나를 놀리고 있는 건 아니겠지? 너무 까불면 이 자리에 두고 가겠다.」"

[[dialogue]]
speaker = "セドナ"
original = "「上官として──部下の面倒を見ることには慣れている。もっとも、貴様は別に部下ではないが……」"
translation = "「상관으로서── 부하를 돌보는 일에는 익숙하다. 뭐, 네놈은 딱히 부하는 아니다만……」"

[[dialogue]]
speaker = "セドナ"
original = "「ともかく。そんなに恨みがましい目で私を見るくらいなら、氷菓子を奢ってやるというだけだ。どうだ？」"
translation = "「어쨌든. 그렇게 원망스러운 눈으로 나를 볼 바에는, 빙과를 사주겠다는 것뿐이다. 어떠냐?」"

[[dialogue]]
speaker = "セドナ"
original = "「うむ、それでいい。こちらだ──ついてこい」"
translation = "「음, 그거면 됐다. 이쪽이다── 따라와라.」"

[[dialogue]]
speaker = "セドナ"
original = "「落ち着いたか。やれやれ……予想外の出費と相成ってしまったではないか」"
translation = "「진정됐나. 이런이런…… 예상외의 지출이 되어버리지 않았나.」"

[[dialogue]]
speaker = "セドナ"
original = "「ふふ。どうやらこちらは口に合うようだな」"
translation = "「후후. 아무래도 이건 입에 맞는 모양이군.」"

[[dialogue]]
speaker = "セドナ"
original = "「ん？\u3000甘いものは苦手なんじゃ──って、よく覚えているな。基本はそうなのだが……ここのジェラートは例外なんだ」"
translation = "「응? 단것은 잘 못 먹지 않느냐니── 용케 기억하고 있군. 기본적으로는 그렇다만…… 여기 젤라토는 예외다.」"

[[dialogue]]
speaker = "セドナ"
original = "「昔──古い付き合いの友人がよくここに誘ってくれていてな。もっとも、それとて数年前の話だが……」"
translation = "「옛날── 오래 알고 지낸 친구가 자주 이곳으로 불러내곤 했었지. 뭐, 그것도 수년 전의 이야기다만……」"

[[dialogue]]
speaker = "セドナ"
original = "「…………そんなことはいい。私もあまり長く油を売っているわけにはいかない、食い終わったら基地へ戻るぞ」"
translation = "「…………그런 건 됐다. 나도 너무 오래 딴짓을 하고 있을 수는 없으니, 다 먹으면 기지로 돌아가겠다.」"

[[dialogue]]
speaker = "セドナ"
original = "「って……ん？\u3000なんだ、こちらを見て。言いたいことがあるなら言ってみろ」"
translation = "「그건…… 응? 뭐야, 이쪽을 보고. 하고 싶은 말이 있다면 해 봐라.」"

[[dialogue]]
speaker = "unk"
original = "デートみたいですね"
translation = "데이트 같네요"

[[dialogue]]
speaker = "unk"
original = "こうやって歩いてると……"
translation = "이렇게 걷고 있으면……"

[[dialogue]]
speaker = "セドナ"
original = "「……デ？」"
translation = "「……데?」"

[[dialogue]]
speaker = "セドナ"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "セドナ"
original = "「……………………貴様。よく上官に向かってそんな舐めた口が利けたものだな」"
translation = "「……………………네놈. 감히 상관에게 그런 되바라진 소리를 잘도 지껄이는군.」"

[[dialogue]]
speaker = "unk"
original = "上官ってわけじゃ"
translation = "상관인 건 아니죠"

[[dialogue]]
speaker = "unk"
original = "部下ではないです"
translation = "부하는 아니에요"

[[dialogue]]
speaker = "セドナ"
original = "「だ、黙れ！\u3000口ごたえするな！\u3000さっきから甘やかしていれば調子に乗りおって！」"
translation = "「시, 시끄럽다! 말대꾸하지 마라! 아까부터 오냐오냐해줬더니 기어오르기는!」"

[[dialogue]]
speaker = "セドナ"
original = "「やはり貴様にはネビュラ式のきつい訓練が必要なようだ。その甘ったれた肉体も根性も、一からまとめて鍛え直してやる！」"
translation = "「역시 네놈에게는 네뷸라식의 혹독한 훈련이 필요한 모양이군. 그 물러터진 육체도 근성도, 하나부터 열까지 전부 다시 단련시켜 주마!」"

[[dialogue]]
speaker = "セドナ"
original = "「待つがいい魔王──貴様の魂、このセドナが燃え上がらせてくれる──！」"
translation = "「기다려라 마왕── 네놈의 영혼, 이 세드나가 불타오르게 해주마──!」"

