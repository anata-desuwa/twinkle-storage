[[dialogue]]
speaker = "unk"
original = "第８話,ＶＳ星喰らいシャドウ・アポロ戦闘後,B"
translation = "제8화, VS 별을 먹는 자 섀도 아폴로 전투 후, B"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なんでだっ！\u3000どうしてこんなに、こいつらは……強いんだっ──！？」"
translation = "「왜냐고! 어째서 이렇게, 이 녀석들은…… 강한 거냐구──!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「世界は、やり直すべきなんだ……消えるべきなのにっ！！」"
translation = "「세계는 다시 시작해야만 해…… 사라져야 하는데!!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そこの『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は幻影みたいなものだ！\u3000使徒に攻撃を集中する──セーラ、援護を頼む！！」"
translation = ""

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おっけーアポロちゃん！\u3000ハートブレイクショット！！」"
translation = "「오케이 아폴로짱! 하트 브레이크 샷!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だめだっ……この拠点も、もう──ぐぅううぅううっ！！」"
translation = "「안 돼…… 이 거점도 이제── 으으으으으으윽!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「最後のトドメ──任せますわ！！」"
translation = "「마지막 마무리는── 제가 맡겠어요!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「風穴ブチ空けてやりましてよ！\u3000ベットショット・ハイローラー！！！」"
translation = "「바람구멍을 뻥 뚫어주겠어요! 베트 샷 하이 롤러!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──────うああぁあぁぁああっ！！！」"
translation = "「──────으아아아아아아악!!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「やりましたっ！\u3000セナリィさんの攻撃……手応えありなのです！」"
translation = "「해냈어요! 세나리 씨의 공격…… 명중한 거예요!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ああっ。ようやく、使徒の動きが止まった……！！」"
translation = "「아앗. 드디어 사도의 움직임이 멈췄어……!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ここまで、か…………くそ…………！！」"
translation = "「여기까지, 인가………… 젠장…………!!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ…………ィ…………ィィィ…………」"
translation = "「기…………이…………이이이…………」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が……何かを、伝えようとしている……？」"
translation = ""

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もう抵抗する力はなさそうだけれど……油断しちゃダメよ、ソフィ」"
translation = "「이제 저항할 힘은 없는 것 같지만…… 방심하면 안 돼, 소피.」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ…………ァ…………ァァアァ…………」"
translation = "「기…………아…………아아아아…………」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへ……負け、か……最期に、神の言葉を、教えてやるよ……」"
translation = "「헤헤…… 패배, 인가…… 마지막으로 신의 말씀을 가르쳐주마…….」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「『ヒトの分際で……どこまでも愚弄する……蒙昧な輩たち……許さん……決して……許さん…………』」"
translation = "「『인간 주제에…… 끝까지 우롱하는구나…… 어리석은 무리들…… 용서치 않겠다…… 결코…… 용서 못 해…………』」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「はっ。悪党の最期に似合いのセリフですわね！」"
translation = "「하. 악당의 최후에 어울리는 대사군요!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「『決して許さん……呪ってやる……その魂の、輪廻が尽きるまで…………』」"
translation = "「『결코 용서치 않겠다…… 저주해주마…… 그 영혼의 윤회가 다할 때까지…………』」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「『おのれ…………バンデット・セナリィ────！！』」"
translation = "「『이노옴………… 밴디트 세나리────!!』」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──ええぇえぇえええぇえぇっ！？」"
translation = "「──에에에에에에에에에엑!?」"

[[dialogue]]
speaker = "unk"
original = "アポロのシャドウと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の分身体は──塵のようにかき消えた。"
translation = ""

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……しぶとい連中でしたが、なんとか勝利を手にできましたわね」"
translation = "「……끈질긴 녀석들이었지만 어떻게든 승리를 거머쥐었네요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ちょっとお待ちなさいな！？\u3000なんで私だけ特別に恨まれてますの！？」"
translation = "「잠깐만 기다려 보시라고요!? 왜 저만 특별히 원망받는 건가요!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「最後のトドメを刺したのは、セナリィさんの銃弾でしたから──お見事でした」"
translation = "「마지막 마무리를 지은 건 세나리 씨의 총탄이었으니까요── 훌륭했습니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「嬉しくねーですわ！？\u3000なんか呪ってやるとか言ってましたわよ！？」"
translation = "「하나도 안 기쁘다니까요!? 뭔가 저주한다느니 어쨌다느니 했다고요!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……はぁ。戦いが終わった後も騒々しいんだから」"
translation = "「……하아. 싸움이 끝난 후에도 소란스럽다니까.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「負け惜しみを言わせるくらいに圧倒できたことを誇るべきだわ。よくやったわね、皆」"
translation = "「패배의 변을 늘어놓게 할 정도로 압도했다는 걸 자랑스러워해야 해. 잘했다, 다들.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「アルタイルの星騎士たちの連携も見事だったけれど……リーエン。流石はキュリオスの女帝に仕えるだけはあるわね」"
translation = "「알타이르 성기사들의 연계도 훌륭했지만…… 리엔. 역시 큐리오스의 여제를 모실 만하구나.」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「妃竜院マハムート。貴様も賞賛に値する戦いぶりだった──いずれ手合わせを願いたいものだ」"
translation = "「키류인 마하무트. 네놈도 칭찬받을 만한 싸움 실력이었다── 언젠가 한번 겨뤄보고 싶군.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「いいでしょう。<ruby>新星寮<rt>ラルーナ</rt></ruby>の寮長として迎え撃ってあげるわ」"
translation = ""

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし……これで『星喰らい』の拠点制圧も３つ目だ！\u3000王手とまではいかないが、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』をかなり追い詰められたはずだ」"
translation = ""

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「しかし驚いたぞ！\u3000幹内世界の可能性ってやつは凄まじいな、まさかバニーガールの戦闘服まであるだなんて！」"
translation = "「하지만 놀랐는걸! 간내 세계의 가능성이란 건 엄청나구나, 설마 바니걸 전투복까지 있을 줄이야!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいなのです！\u3000セーラ先輩はともかく、あの真面目なユウリ先輩まで……いったい何が起こったらこんなことに！？」"
translation = "「네, 그런 거예요! 세라 선배는 그렇다 치고, 그 성실한 유우리 선배까지…… 대체 무슨 일이 있었길래 이런 일이!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「掘り下げんな！\u3000さっさとアルタイルに戻るぞっ！\u3000一刻も早く、この戦闘服を脱がせろ！！」"
translation = "「캐묻지 마! 어서 알타이르로 돌아가자구! 한시라도 빨리 이 전투복을 벗게 해줘!!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ちょいちょい、ルリちー？\u3000ウチはともかくってどーゆーことー？」"
translation = "「잠깐잠깐, 루리치? 나는 그렇다 치고라는 건 무슨 의미야~?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ユウリさんのお気持ち、私には痛いほど分かりますわ……！」"
translation = "「유우리 씨의 마음, 저도 뼈저리게 이해합니다……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うお！？\u3000ヒルディオーネ先輩……！？」"
translation = "「우오!? 센온지 선배……!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おぉ。ユウリ先輩の両手をがっちり握って……なるほど、バニーの皆さん、戦闘服が発現した経緯は同じ、ということでしょうか？」"
translation = "「오오. 유우리 선배의 두 손을 꽉 잡고…… 그렇군요, 바니 여러분은 전투복이 발현된 경위가 같다, 는 뜻일까요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私やマイン、それに千園寺様だけではなかったんですわね！\u3000あのヘンタイの毒牙にかかった不幸な星騎士は……！」"
translation = "「저나 마인, 그리고 센온지 님뿐만이 아니었군요! 그 변태의 마수에 걸린 불행한 성기사가……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「え……へ、ヘンタイ？\u3000ユリアーナ……じゃないっ。ユーリスはそんな奴じゃないですよ、先輩！！」"
translation = "「에…… 버, 변태? 유리아나…… 가 아니지. 유리스는 그런 녀석이 아니에요, 선배!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……ユーリス？\u3000新星学園の、ジルラント王国の……？\u3000確か緋宮会長と同じく、珍しい男性の星騎士でしたわよね」"
translation = "「……유리스? 신성학원의, 질란트 왕국의……? 분명 히노미야 회장과 마찬가지로 희귀한 남성 성기사였죠.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ウチとユウリちゃんのバニーフォームは、あの王子様から貰ったものだからね～♪」"
translation = "「나랑 유우리짱의 바니 폼은 그 왕자님한테서 받은 거니까 말이야~♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ですわっ！？\u3000なんてハレンチな！！！」"
translation = "「그렇군요!? 정말 파렴치해!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あの超がつくほど真面目そうな王子様が……？\u3000ヒトは見かけによりませんのね」"
translation = "「그렇게나 지나치게 성실해 보이던 왕자님이……? 사람은 겉만 보고는 모르는 거네요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ま、待て待て！\u3000あたしら、カジノに潜入捜査をしなくちゃいけなくて、それで用意してもらっただけだって！」"
translation = "「자, 잠깐 잠깐! 우린 카지노에 잠입 수사를 해야만 해서, 그래서 준비해준 것뿐이라고!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そーそー。てゆーか、セナリィちゃんたちの衣装は、王子様経由じゃないってこと？」"
translation = "「마저 마저. 그보다 세나리짱 일행의 의상은 왕자님을 거친 게 아니라는 거야?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──ううぅっ！！」"
translation = "「──으으윽!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「頭がっ……！\u3000存在しないヘンタイの記憶が、また……！！」"
translation = "「머리가……! 존재하지 않는 변태의 기억이 또……!!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あたしやセーラさん以上に、ヤバイ状況だったみたいだな……」"
translation = "「나나 세라 씨보다 더 지독한 상황이었나 보네……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「語ると長そうだね～♪\u3000その辺りはまた、帰ってから聞くことにしよっか♪」"
translation = "「이야기하자면 길 것 같네~♪ 그 부분은 또 돌아가서 듣기로 할까♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ♪\u3000ソフィもお疲れ様。それにとーってもカワイイ衣装を着てるのね～<emoji=heart04>\u3000ぎゅーってしていい？」"
translation = "「우후후♪ 소피도 고생했어. 게다가 너~무나 귀여운 옷을 입고 있구나~<emoji=heart04> 꽉 안아봐도 돼?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いいわけないでしょう。人前でベタベタしないでください、しっしっ」"
translation = "「될 리가 없잖아요. 사람들 앞에서 달라붙지 마세요, 훠이 훠이.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あーん、そんなぁ。こんなにオシャレしてる妹をハグできないだなんて、生殺しだわ～……！」"
translation = "「아앙, 너무해. 이렇게 멋 부린 여동생을 허그할 수 없다니, 고문이야~……!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし──確保だ！」"
translation = "「좋아── 확보 완료!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ちょっ、アポロさん！？\u3000は、離してくださいっ！」"
translation = "「잠깐, 아폴로 씨!? 노, 놓아주세요!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「いーや、離さないぞ！\u3000姉も妹も、いて当たり前じゃない。いつ別れるかわかったもんじゃないんだからな！\u3000ほらサーシャ！」"
translation = "「아니, 안 놓을 건데! 언니도 동생도 있는 게 당연한 게 아니라고. 언제 헤어질지 모르는 거니까 말이야! 자, 사샤!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アポロちゃん、ナイスフォロー～♪\u3000ソフィを捕まえて──ぎゅ～ぅ～っ<emoji=heart04>」"
translation = "「아폴로짱, 나이스 팔로우~♪ 소피를 붙잡아서── 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ああぁ、もうっ……姉さんっ、むぎゅぅ！？」"
translation = "「아아아, 정말…… 언니, 으규우!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「甘いパンケーキの香りがするわ～……うふふ<emoji=heart04>\u3000今日はずーっと、ソフィをだっこしちゃおうかしら～<emoji=heart04>」"
translation = "「달콤한 팬케이크 향기가 나네~…… 우후후<emoji=heart04> 오늘은 하루 종일 소피를 안고 있어 버릴까~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ダメに決まってるでしょう！\u3000離れてください～っ！」"
translation = "「안 되는 게 당연하잖아요! 떨어지세요~!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「と言いつつ、ソフィアもまんざらでもなさそうなのです。でんでん♪」"
translation = "「라고 말하면서도 소피아도 아주 싫지는 않은 모양인 거예요. 뎬뎬♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ルリもからかわないでください、もぅっ！！」"
translation = "「루리도 놀리지 마세요, 정말!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やれやれ、収拾がつかないわね……本当に。帰還するわよ！」"
translation = "「이런 이런, 수습이 안 되네…… 정말이지. 귀환하겠어!」"

[[dialogue]]
speaker = "unk"
original = "『星喰らい』の拠点は、残すところあと２つ。"
translation = "『별을 먹는 자』의 거점은 이제 단 2곳 남았다."

[[dialogue]]
speaker = "unk"
original = "創造神との戦いは、終幕へと近づきつつあった──"
translation = "창조신과의 싸움은 종막을 향해 가까워지고 있었다──"

