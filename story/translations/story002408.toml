[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ようやく見つけたわ！\u3000わたしの旦那さまを返しなさぁーーーい！！」"
translation = "「드디어 찾았어! 내 서방님을 돌려줘어어어어──!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長っ、大丈夫ですか──ってこれは……大丈夫じゃない……みたい？」"
translation = "「회장, 괜찮으세요── 아, 이건…… 안 괜찮아…… 보이는걸요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「は、破廉恥だよっ！\u3000わたしというお嫁さんがいるのに、浮気なんて許さないんだからっ！」"
translation = "「파, 파렴치해! 나라는 신부가 있는데 바람이라니 용서 못 해!」"

[[dialogue]]
speaker = "unk"
original = "ちょっとお触りしようとしただけだから"
translation = "살짝 만져보려고 했을 뿐이니까"

[[dialogue]]
speaker = "unk"
original = "ご、誤解だよ！"
translation = "오, 오해야!"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「言い訳になってない！」"
translation = "「변명도 안 돼!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ううっ、やっぱり会長くんも若い子がいいんだ……２人みたいにかわいい耳と尻尾がついてる女の子の方がいいんでしょ？」"
translation = "「으우우, 역시 회장군도 어린애가 좋은 거구나…… 둘처럼 귀여운 귀랑 꼬리가 달린 여자애가 더 좋은 거지?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わ、わたしだって！\u3000こう、だっこしてぎゅっとしたら……絶対気持ちいいんだもん」"
translation = "「나, 나도! 이렇게, 안아주고 꽉 끌어안으면…… 분명 기분 좋을 거란 말이야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんがしたいって言ったら……ちょっとくらいなら、だっこさせてあげてもいいのに……」"
translation = "「회장군이 하고 싶다고 하면…… 조금 정도라면 안게 해 줄 수도 있는데……」"

[[dialogue]]
speaker = "unk"
original = "本当に！？"
translation = "정말로!?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、落ち着いて！\u3000おかしくなってるよ！\u3000トワちゃん先生も暴走しないでっ！」"
translation = "「회장, 진정해! 이상해졌어! 토와짱 선생님도 폭주하지 마요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「っ！\u3000そ、そうだね、今は会長くんを取り返すことが何より大事なんだから……」"
translation = "「윽! 그, 그렇지, 지금은 회장군을 되찾는 게 무엇보다 중요하니까……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「２人とも！\u3000会長くんをさらって結婚式をぶち壊すなんて許せません！\u3000さあ、会長くんをこっちに返しなさい！」"
translation = "「너희 둘! 회장군을 납치해서 결혼식을 망치다니 용서할 수 없어! 자, 회장군을 이쪽으로 돌려줘!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「返せと言われて素直に返すわけがないでしょう？\u3000返して欲しかったら力づくで取り返してみなさい！」"
translation = "「돌려달라고 해서 순순히 돌려줄 리가 없잖아? 돌려받고 싶으면 힘으로 되찾아 보라고!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「力づく？\u3000ここで戦って決着をつけようってこと？」"
translation = "「힘으로? 여기서 싸워서 결판을 내자는 거야?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「待って待って！\u3000戦うのは絶対ダメだってば！\u3000会長の家が壊れちゃう！\u3000雌雄を決するなら、きちんと専用の場所でお願いね！」"
translation = "「잠깐잠깐! 싸우는 건 절대 안 된다니까! 회장 집이 부서진다고! 자웅을 겨룰 거라면 제대로 전용 장소에서 부탁해!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私たちは問題ないけど……貴方はどうするのかしら？」"
translation = "「우리는 상관없는데…… 당신은 어떡할 거야?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もちろん、受けて立つよっ！」"
translation = "「당연히 받아들여야지!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あなた達みたいな悪い子はおしおきです！\u3000泣いて謝ったってぜぇぇぇ～～ったいに許してあげないんだからねっ！！」"
translation = "「너희 같은 나쁜 아이들은 벌을 줄 거야! 울면서 사과해도 저어어어어어어언혀 용서 안 해줄 거니까!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「皆さん準備はいいですか？」"
translation = "「여러분 준비됐나요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ばっちりＯＫだよ！\u3000いつでも全力を出せちゃうんだから！」"
translation = "「완벽해! 언제든 전력을 다할 수 있으니까!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふっ、すごい意気込みね。こちらは２人でそちらは１人だけど、本当に大丈夫かしら？」"
translation = "「후훗, 대단한 기세네. 이쪽은 둘이고 그쪽은 혼자인데, 정말 괜찮겠어?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「問題ないよっ、まとめてかかってきなさいっ！」"
translation = "「문제없어, 한꺼번에 덤비라구!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「力が漲ってますね……会長を取られた怒りのせいでしょうか？\u3000それともあれがウェディングフォームの力でしょうか？」"
translation = "「힘이 넘치고 있네요…… 회장을 뺏긴 분노 때문일까요? 아니면 저게 웨딩 폼의 힘일까요?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「どっちだっていいわ。どんな相手だろうと私の速度に追いつける相手なんていない。それが結婚に恋い焦がれる乙女だったとしてもね！」"
translation = "「어느 쪽이든 상관없어. 어떤 상대든 내 속도를 따라올 수 있는 상대는 없어. 설령 그게 결혼을 갈망하는 소녀라 해도 말이야!」"

[[dialogue]]
speaker = "unk"
original = "３人とも頑張って！"
translation = "셋 다 힘내!"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くん！\u3000お嫁さんはわたしだよ！\u3000わたしだけを応援してっ！」"
translation = "「회장군! 신부는 나야! 나만 응원해줘!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私を応援してくれたら、またうさみみを触らせてあげるぴょん<emoji=heart04>」"
translation = "「날 응원해주면 또 토끼 귀 만지게 해줄게 깡충<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わ、私を応援してくれたら好きなだけ尻尾触らせてあげます～～っ！！」"
translation = "「저, 저를 응원해주시면 원하는 만큼 꼬리 만지게 해드릴게요~~!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……これ、どうするつもり？\u3000個人的にはトワちゃん先生を応援して欲しいけど」"
translation = "「……이거 어쩔 생각이야? 개인적으로는 토와짱 선생님을 응원해줬으면 좋겠는데」"

[[dialogue]]
speaker = "unk"
original = "トワ先生ーっ！\u3000頑張れーっ！"
translation = "토와 선생님─! 힘내세요─!"

[[dialogue]]
speaker = "unk"
original = "（全員を応援したいっ！\u3000だけどここは……）"
translation = "(모두를 응원하고 싶어! 하지만 여기선……)"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんっ、ありがとうっ！\u3000ウェディングフォーム、愛のパワーで最大出力だよっ！！」"
translation = "「회장군, 고마워! 웨딩 폼, 사랑의 파워로 최대 출력이야!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁんっ！\u3000尻尾触らせるだけじゃ足りませんでしたかぁぁぁ」"
translation = "「코야아앙! 꼬리 만지게 해주는 것만으론 부족했나요오오」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「仕方がないわ、華麗に勝利して愛も声援も勝ち取ればいいのよ」"
translation = "「어쩔 수 없지, 화려하게 승리해서 사랑도 성원도 쟁취하면 그만이야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さあ！\u3000ヘレナ様が用意して下さったウェディングフォームの力、思い知りなさい！！」"
translation = "「자! 헬레나 님께서 준비해주신 웨딩 폼의 힘, 똑똑히 맛보도록 해!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「では始めますっ」"
translation = "「그럼 시작하겠습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「レディー……ゴー！！」"
translation = "「레디…… 고!!」"

