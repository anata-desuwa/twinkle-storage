[[dialogue]]
speaker = "unk"
original = "第２話,寒がりソフィア,P"
translation = "제2화, 추위 타는 소피아, P"

[[dialogue]]
speaker = "ソフィア"
original = "「またパトロールにお付き合いいただいて、ありがとうございま──」"
translation = "「또 파트롤에 어울려 주셔서, 감사합니──」"

[[dialogue]]
speaker = "ソフィア"
original = "「くちゅんっ」"
translation = "「에취.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ああいえ、風邪ではないのでご心配なく。少し鼻がムズムズしただけですから」"
translation = "「아아, 아뇨, 감기는 아니니까 걱정 마세요. 조금 코가 간질거렸을 뿐이니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ブルブル、ガクガク……寒くない、寒くない……」"
translation = "「부들부들, 덜덜…… 안 추워, 안 추워……」"

[[dialogue]]
speaker = "unk"
original = "本当に寒くない？"
translation = "정말 안 추워?"

[[dialogue]]
speaker = "ソフィア"
original = "「だって寒いって言ったら余計に寒くなるじゃないですか！」"
translation = "「그치만 춥다고 말하면 더 추워지잖아요!」"

[[dialogue]]
speaker = "unk"
original = "（やっぱり寒いんだ）"
translation = "(역시 춥구나)"

[[dialogue]]
speaker = "ソフィア"
original = "「私が生まれたのは、魔界のレゾフという町でした。レゾフはこの流星市国よりずっと寒さが厳しくて……極寒と言っても過言ではありません。ソーコールドです」"
translation = "「제가 태어난 곳은 마계의 레조프라는 마을이었습니다. 레조프는 이 유성시국보다 훨씬 추위가 엄격해서…… 극한이라고 해도 과언이 아닙니다. 소 콜드예요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「あのままレゾフに住んでいたら、今頃凍え死にしていてもおかしくありませんでした」"
translation = "「그대로 레조프에 살았다면, 지금쯤 얼어 죽었어도 이상하지 않았을 거예요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「たとえ故郷であっても、こんなに寒いところにずっと住むなんて耐えられない。そう思って人間界に来ました」"
translation = "「비록 고향이라 할지라도, 이렇게 추운 곳에 계속 사는 건 견딜 수 없어. 그렇게 생각해서 인간계로 왔습니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「しかしレゾフよりはず～っと、ず～っとマシですが、人間界も万全とは言えません」"
translation = "「하지만 레조프보다는 허어어얼씬, 허어어얼씬 낫지만, 인간계도 만전이라고는 할 수 없네요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「皆さんが平気そうにしているのが不思議で不思議で……私に安住の地はないのですか？」"
translation = "「여러분들이 아무렇지도 않게 있는 게 신기하고 또 신기해서…… 저에게 안주의 땅은 없는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "だからずっと厚着してるんだ"
translation = "그래서 계속 두껍게 입고 있는 거구나"

[[dialogue]]
speaker = "ソフィア"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ソフィア"
original = "「……まぁ、そうですね。この外套がなければ、人間界でももっとつらかったしれません」"
translation = "「……뭐, 그렇죠. 이 외투가 없었다면 인간계에서도 더 힘들었을지도 모릅니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ソフィア？\u3000緋宮会長も？」"
translation = "「소피아? 히노미야 회장님도?」"

[[dialogue]]
speaker = "ソフィア"
original = "「フィオナ会長！？\u3000どうしてここに……あ、そういえば教皇様の公務があるんでしたね」"
translation = "「피오나 회장님!? 어째서 여기에…… 아, 그러고 보니 교황님의 공무가 있으셨죠.」"

[[dialogue]]
speaker = "フィオナ"
original = "「うん、その付き添いで私も出席してたの。ソフィアはこの前言ってたパトロール？」"
translation = "「응, 그 동행으로 나도 출석했었어. 소피아는 요전에 말했던 파트롤?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい、新星学園の会長さんと一緒に街を巡回していました」"
translation = "「네, 신성 학원의 회장님과 함께 거리를 순회하고 있었습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「さすがソフィア。星徒会役員の鑑だね」"
translation = "「역시 소피아. 성도회 임원의 귀감이네.」"

[[dialogue]]
speaker = "ソフィア"
original = "「いえ、そんな……言い過ぎです」"
translation = "「아뇨, 그런…… 과찬이세요.」"

[[dialogue]]
speaker = "unk"
original = "（すごく嬉しそう）"
translation = "(굉장히 기뻐 보여)"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長もソフィアに同行してくださってありがとうございます」"
translation = "「히노미야 회장님도 소피아와 동행해 주셔서 감사합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「私も一緒にパトロールしたいのはやまやまだけど、予定があるからもう行かないと。頑張るのはいいけど、無理はしないでね」"
translation = "「나도 같이 파트롤하고 싶은 마음은 굴뚝같지만, 예정이 있어서 이제 가봐야 해. 열심히 하는 건 좋지만, 무리는 하지 마?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はいっ」"
translation = "「네!」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長もよろしくお願いします。それでは」"
translation = "「히노미야 회장님도 잘 부탁드립니다. 그럼 이만.」"

[[dialogue]]
speaker = "ソフィア"
original = "「えへへ……。やはりフィオナ会長は最高の星徒会長です。流星学園に来て良かった……」"
translation = "「에헤헤…… 역시 피오나 회장님은 최고의 성도회장이에요. 유성 학원에 오길 잘했어……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ああいえ、決してあなたを貶しているわけではありません。ただフィオナ会長が素晴らしいのは厳然たる事実ですから」"
translation = "「아아, 아뇨, 결코 당신을 비하하는 건 아닙니다. 단지 피오나 회장님이 훌륭하시다는 건 엄연한 사실이니까요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら？\u3000そこにいるのは……」"
translation = "「어라? 저기 있는 건……」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さん！？」"
translation = "「언니!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、奇遇ね～。もしかして２人でデート？」"
translation = "「후훗, 기묘한 우연이네~. 설마 둘이서 데이트?」"

[[dialogue]]
speaker = "ソフィア"
original = "「違いますっ！\u3000時間に余裕があったのでパトロールしてたんですっ」"
translation = "「아닙니다! 시간에 여유가 있어서 파트롤하던 중이었어요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうなんだ、偉いわね～。会長くん頭撫でてあげる～。ナデナデ」"
translation = "「그렇구나, 기특하네~. 회장군, 머리 쓰다듬어 줄게~. 쓰담쓰담.」"

[[dialogue]]
speaker = "ソフィア"
original = "「はぁ……姉さんの相手をするのも大変ですね。いつもそんな感じなんですか？」"
translation = "「하아…… 언니를 상대하는 것도 힘드네요. 항상 그런 느낌인가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうねぇ、かわいいから、けっこうナデナデしてるかも～」"
translation = "「글쎄~, 귀여우니까 꽤 쓰담쓰담하고 있을지도~」"

[[dialogue]]
speaker = "ソフィア"
original = "「うー……」"
translation = "「으으……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ソフィも撫でてあげるわね～」"
translation = "「소피도 쓰다듬어 줄게~」"

[[dialogue]]
speaker = "ソフィア"
original = "「結構です。もう子どもじゃありませんから」"
translation = "「됐거든요. 이제 어린애가 아니니까요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらそう……お姉ちゃん残念。じゃあソフィのことよろしくね」"
translation = "「어라 그래…… 언니 아쉽네. 그럼 소피를 잘 부탁해.」"

[[dialogue]]
speaker = "ソフィア"
original = "「だから子どもじゃありませんってば。むー」"
translation = "「그러니까 어린애가 아니라니까요 참. 으음.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ほら行きましょうっ。パトロールなんですから、姉さんにデレデレしていてはいけませんよ」"
translation = "「자, 가요! 파트롤 중이니까, 언니한테 데레데레하고 있으면 안 된다고요.」"

