[[dialogue]]
speaker = "unk"
original = "第７話,Echoes of the Stars,B"
translation = "제7화, Echoes of the Stars, B"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「魔王の血統は伊達ではないようね。流石は広大な魔界の一角を統べるだけはある」"
translation = "「마왕의 혈통은 허명이 아닌 모양이네. 과연 광대한 마계의 일각을 통솔할 만해」"

[[dialogue]]
speaker = "煌嶺"
original = "「気に食わん……！\u3000妾を見下し、評するなど……貴様、よほど死にたいらしいな！」"
translation = "「마음에 안 드는군……! 소첩을 내려다보고 평가하다니…… 네놈, 어지간히도 죽고 싶은 모양이구나!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「称賛は素直に受け取るものよ。まさかここまで複製体を仕留められるとは思わなかったわ」"
translation = "「칭찬은 순순히 받아들이는 법이야. 설마 여기까지 복제체를 물리칠 수 있을 줄은 몰랐는걸」"

[[dialogue]]
speaker = "クロト"
original = "「煌嶺、一旦下がってろ……あんたにだって、休息は必要なはずだ……！」"
translation = "「코레이, 일단 물러서 있어…… 당신에게도 휴식은 필요할 터다……!」"

[[dialogue]]
speaker = "煌嶺"
original = "「あの痴れ者より先に死にたいか貴様？\u3000手を出すな……！」"
translation = "「저 어리석은 자보다 먼저 죽고 싶으냐, 네놈? 끼어들지 마라……!」"

[[dialogue]]
speaker = "クロト"
original = "「そんなこと、言ってる場合か……！\u3000自分の負傷を考えろ！！」"
translation = "「그런 소릴 하고 있을 때냐……! 자신의 부상부터 생각해!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「どちらが前に出ようと同じことよ」"
translation = "「어느 쪽이 앞으로 나서든 똑같은 일이야」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「新時代の女神として、貴方達の健闘を称えましょう。見事だったわ、アルタイルの星騎士たち」"
translation = "「신시대의 여신으로서 당신들의 건투를 치하하도록 하죠. 훌륭했어요, 알타이르의 성기사들」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「さようなら──パラレルライト・エグゼキュート」"
translation = "「잘 가렴── 패러렐 라이트 익스큐트」"

[[dialogue]]
speaker = "unk"
original = "最前線にいる、俺と煌嶺に殺到する光線の束──腕がちぎれるかもしれないが、今一度あの盾を使うしか──"
translation = "최전선에 있는 나와 코레이에게 쇄도하는 광선 무리──팔이 떨어져 나갈지도 모르지만, 다시 한번 그 방패를 쓸 수밖에──"

[[dialogue]]
speaker = "クロト"
original = "「な──！？」"
translation = "「이──!?」"

[[dialogue]]
speaker = "unk"
original = "ホロウの攻撃が、別方向から飛んできたもう１つの光弾によって相殺された……！？"
translation = "호로우의 공격이 다른 방향에서 날아온 또 하나의 광탄에 의해 상쇄되었다……!?"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「…………そんな、馬鹿な」"
translation = "「…………말도 안 돼, 그럴 수가」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「今度こそ一緒に行きましょう──ポラリス！！」"
translation = "「이번에야말로 함께 가요── 포라리스!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「くっ！？\u3000相殺だけでは飽き足らず、反撃まで……！？」"
translation = "「큭!? 상쇄하는 것만으로는 모자라 반격까지……!?」"

[[dialogue]]
speaker = "クロト"
original = "「────ルヴィネ！！！」"
translation = "「────루비네!!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……遅れてごめんなさい、魔王」"
translation = "「……늦어서 미안해요, 마왕」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「まさか息を吹き返すだなんて……いや、それよりも、どうしてまた変身できるように……！？」"
translation = "「설마 숨을 되찾다니…… 아니, 그것보다 어떻게 다시 변신할 수 있게 된 거지……!?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「霊力を取り上げ損ねていた？\u3000そんなはずは……」"
translation = "「영력을 회수하지 못했던 건가? 그럴 리가……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「お父様──いいえ。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から受け取っていた霊力はもう、どこにもない」"
translation = "「아버님── 아니요. 『<ruby>XELOS<rt>제로스</rt></ruby>』로부터 받았던 영력은 이제 그 어디에도 없어요」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ポラリスが応えてくれた。私は１０年以上も嘘を吐き続けた、不誠実者なのに……」"
translation = "「포라리스가 응해 주었어요. 나는 10년 이상이나 거짓말을 계속해 온 불성실한 자인데도……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──大切なものを守るためなら、星の輝きを届けてあげる。そう言ってもらえた！」"
translation = "「──소중한 것을 지키기 위해서라면 별의 빛을 전해 주겠어. 그렇게 말해 주었어요!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「極星学園星徒会長、ルヴィネ──戦線に戻るわ！\u3000リクリエを退ける手助けをさせて頂戴！」"
translation = "「극성학원 성도회장, 루비네── 전선으로 복귀하겠어요! 리크리에를 물리치는 데 힘을 보태게 해 주세요!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「出来損ないのくせに、ずいぶんと大口を叩くわね？\u3000たかが星騎士が１人増えたところで──」"
translation = "「덜떨어진 주제에 제법 큰소리를 치는구나? 고작 성기사 한 명 늘어났다고 해서──」"

[[dialogue]]
speaker = "unk"
original = "嘲笑しようとしたホロウが、驚きで目を見開く。"
translation = "조소하려던 호로우가 놀라 눈을 크게 뜬다."

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「……どういうこと？\u3000お前のその力は……いったい！？」"
translation = "「……어떻게 된 거지? 너의 그 힘은…… 대체!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「温かで、澄んだ星力が──」"
translation = "「따뜻하고 맑은 성력이──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ルヴィネから、私たちに流れ込んでくるわ……！？」"
translation = "「루비네에게서 우리에게 흘러들어오고 있어……!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「魔王。貴方は倒れるたびに自身の戦闘力を底上げする──そんな特性を持っていたわね」"
translation = "「마왕. 당신은 쓰러질 때마다 자신의 전투력을 끌어올리는── 그런 특성을 가지고 있었죠」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私がポラリスから与えられたのは、愛しいものすべてを守る力……」"
translation = "「내가 포라리스에게 부여받은 것은 사랑하는 모든 것을 지키는 힘……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「みんなとずっと一緒にいるための──戦う力よ！！」"
translation = "「모두와 계속 함께 있기 위한── 싸우는 힘이에요!!」"

[[dialogue]]
speaker = "クロト"
original = "「これは……！！」"
translation = "「이것은……!!」"

[[dialogue]]
speaker = "unk"
original = "癒やしの力とは違う、傷が治っているわけではないが──"
translation = "치유의 힘과는 다르다, 상처가 낫고 있는 것은 아니지만──"

[[dialogue]]
speaker = "unk"
original = "彼女の発散した温かな星力が身体に馴染み、限界を超えて引き上げられていくのを感じる──！！"
translation = "그녀가 발산한 따뜻한 성력이 몸에 스며들어 한계를 뛰어넘어 끌어 올려지는 것이 느껴진다──!!"

[[dialogue]]
speaker = "マトイ"
original = "「凄い……もう限界だって、思ってたのに……！」"
translation = "「굉장해…… 이제 한계라고 생각했는데……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「戦える。ルヴィネちゃんの星力が、支えてくれているのを感じるわ……！！」"
translation = "「싸울 수 있어. 루비네 양의 성력이 지탱해 주고 있는 게 느껴져……!!」"

[[dialogue]]
speaker = "unk"
original = "周囲の味方に自らの星力を分け与え、限界を超えて戦う力を付与する──それがルヴィネが手にした、星の輝き。"
translation = "주위의 아군에게 자신의 성력을 나누어 주어 한계를 뛰어넘어 싸울 힘을 부여한다── 그것이 루비네가 손에 넣은 별의 반짝임."

[[dialogue]]
speaker = "unk"
original = "人間も天使も魔族も隔てなく。どこまでも優しく温かい力──！"
translation = "인간도 천사도 마족도 구별 없이. 한없이 다정하고 따뜻한 힘──!"

[[dialogue]]
speaker = "アナ"
original = "「──なるほど。この力で、トリュファイナさんの治癒の力すら引き上げられた。だからこそ、ルヴィネさんも復活できた……！？」"
translation = "「──과연 그렇군요. 이 힘으로 트류파이나 씨의 치유 능력조차 끌어 올려졌어요. 그렇기에 루비네 씨도 부활할 수 있었던 것인가요……!?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「はい！\u3000強化された今の私ならば……今一度、奇蹟を起こせるはずです！」"
translation = "「네! 강화된 지금의 저라면…… 다시 한번 기적을 일으킬 수 있을 터입니다!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「皆様、立ち上がってください！\u3000ルクス・アルカナ──ベネディクティオ！！」"
translation = "「여러분, 일어나 주세요! 룩스 아르카나── 베네딕티오!!」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナさんの足元に形成された魔法陣がフィールド全域に広がり、負傷によって閉じかけていた守護星とのリンクが急速に回復していく──！"
translation = "트류파이나 씨의 발끝에 형성된 마법진이 필드 전역으로 퍼지며, 부상으로 인해 끊겨가던 수호성과의 링크가 급속도로 회복되어 간다──!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「凄いわ──これなら！！」"
translation = "「굉장해── 이렇다면!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ……もう一度！！」"
translation = "「네…… 다시 한번!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「そんな、馬鹿なことが……！？」"
translation = "「그런 말도 안 되는 일이……!?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「フィーニスの塔に入る前より、今の方がずっと強い……！」"
translation = "「피니스의 탑에 들어오기 전보다 지금이 훨씬 더 강해……!」"

[[dialogue]]
speaker = "アナ（覚醒）"
original = "「元気いっぱい。フルチャージ完了です」"
translation = "「원기 왕성. 풀 차지 완료입니다」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「絶好調ね～、うふふ♪」"
translation = "「최상의 컨디션이네~, 우후후♪」"

[[dialogue]]
speaker = "アポロ"
original = "「すごい、どんどん力が送られてくる……！\u3000これならイケるぜ！！」"
translation = "「대단해, 계속해서 힘이 전해져 오고 있어……! 이렇다면 해볼 만하겠어!」"

[[dialogue]]
speaker = "ジグ"
original = "「ここまでお膳立てされたからには、勝利を掴まなくちゃね」"
translation = "「이 정도로 판이 짜였으니 승리를 거머쥐어야겠지」"

[[dialogue]]
speaker = "煌嶺"
original = "「フン……余計なことを。だが今の妾なら、あの木偶を残らず殺しきれよう！」"
translation = "「흥…… 쓸데없는 짓을. 하지만 지금의 소첩이라면 저 목각 인형들을 남김없이 몰살할 수 있겠구나!」"

[[dialogue]]
speaker = "チナ"
original = "「へへ。またルヴィと一緒に戦えるだなんてな！」"
translation = "「헤헤. 다시 루비와 함께 싸울 수 있다니 말이야!」"

[[dialogue]]
speaker = "レティシア"
original = "「みんなが一緒の未来を勝ち取るために……！」"
translation = "「모두가 함께하는 미래를 쟁취하기 위해……!」"

[[dialogue]]
speaker = "グレイス"
original = "「はい！\u3000目にものを見せてやりましょう！」"
translation = "「네! 본때를 보여주도록 하죠!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「行くよ、極星星徒会！\u3000アルタイルを救って世界を守る！！」"
translation = "「가자, 극성성도회! 알타이르를 구하고 세계를 지키는 거야!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「想定外の状況──覆さなくては。デネブから私を、呼べるだけ呼ばなくては……！」"
translation = "「상정 외의 상황── 뒤집어야 해. 데네브에서 나를 부를 수 있는 만큼 불러내야겠어……！」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「魔王。転送装置を持っているホロウは……」"
translation = "「마왕. 전송 장치를 가지고 있는 호로우는……」"

[[dialogue]]
speaker = "クロト"
original = "「一番奥にいる。何十人と溢れているホロウたちに囲まれた、完璧な陣形の向こうに」"
translation = "「가장 깊숙한 곳에 있어. 수십 명씩 득실거리는 호로우들에게 둘러싸인 완벽한 진형 너머에」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そう──デネブへの逃亡を許さず、奪い取るしかないわね」"
translation = "「그래── 데네브로의 도망을 허용하지 않고 빼앗을 수밖에 없겠네」"

[[dialogue]]
speaker = "unk"
original = "絶望的な状況なのに、闘志が湧くばかりだ。"
translation = "절망적인 상황인데도 투지가 솟구칠 뿐이다."

[[dialogue]]
speaker = "unk"
original = "今の俺たちには、トリュファイナさんによる回復と、ルヴィネからの星力供給がある。"
translation = "지금의 우리에게는 트류파이나 씨에 의한 회복과 루비네가 공급해 주는 성력이 있다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「背中を任せていいかしら、魔王」"
translation = "「등을 맡겨도 괜찮을까, 마왕」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。君の背中は俺に任せろ。誰一人欠けることなく、勝利を掴む！」"
translation = "「아아. 네 등은 내게 맡겨라. 단 한 명도 빠짐없이 승리를 거머쥔다!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ！\u3000いきましょう──決着をつけるわ！！」"
translation = "「네! 가요── 결판을 내는 거야!!」"

