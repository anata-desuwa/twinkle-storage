[[dialogue]]
speaker = "unk"
original = "第２話,シズハとゲームオフ会,P"
translation = "제2화, 시즈하와 게임 오프회, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺の仕事が終わるのを、シズハがソファーに座って待ってくれていた。"
translation = "그날, 내 업무가 끝나기를 시즈하가 소파에 앉아서 기다려 주고 있었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「よ～し、ディーちゃん、いくよ～。えいっ♪」"
translation = "「좋~아, 디짱 간다~. 에잇♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「甘いね、シズハちゃん。それじゃあ勝てないよ……よっと！」"
translation = "「무르네, 시즈하짱. 그걸로는 못 이긴다고…… 얍!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あ～、負けた～！\u3000ディーちゃん、本当にこのゲーム強いね～」"
translation = "「아~ 졌다~! 디짱 정말 이 게임 잘하네~」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「一時期、檻から出られなかった時に、暇つぶしによく遊んでたからね」"
translation = "「한때 우리에 갇혀서 못 나왔을 때 심심풀이로 자주 놀았으니까.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――あっ、会長！\u3000仕事終わったの？」"
translation = "「──앗, 회장님! 업무 끝났어?」"

[[dialogue]]
speaker = "unk"
original = "２人でなんのゲームをしてたんだ？"
translation = "둘이서 무슨 게임을 하고 있었던 거야?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっとね、『マッドスタンパー』っていうゲームなんだけど～、会長は知ってる？」"
translation = "「음 있잖아, 『매드 스탬퍼』라는 게임인데~, 회장님은 알아?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷く。『マッドスタンパー』――携帯機で遊べるＦＰＳゲームだ。以前、ネビュラの知り合いの魔女から教えてもらったことがある。"
translation = "나는 고개를 끄덕인다. 『매드 스탬퍼』── 휴대용 기기로 즐길 수 있는 FPS 게임이다. 이전에 네뷸라의 아는 마녀에게 배운 적이 있다."

[[dialogue]]
speaker = "unk"
original = "……もっとも、その内容はかなり特殊だ。"
translation = "……하지만 그 내용은 상당히 독특하다."

[[dialogue]]
speaker = "unk"
original = "『自己紹介乙』『効いてて草』などの煽りスタンプを武器に、ひたすら『煽りポイント』を稼ぎ合うという、なんとも尖ったゲームである。"
translation = "『자기소개 완료』 『부들부들하죠? ㅋㅋ』 같은 도발 스탬프를 무기로 오로지 『도발 포인트』를 벌어들이는, 참으로 날 선 게임이다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――あはは、確かにちょ～っと人を選ぶ感じはあるよね～。でも、全世界で３０００万人がプレイしてるぐらい人気なんだよね」"
translation = "「──아하하, 확실히 조~금 취향을 타는 느낌은 있지~. 하지만 전 세계에서 3000만 명이 플레이할 정도로 인기라구.」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ヒトカスの作ったゲームにしては、なかなか悪くないのサ。思いっきり煽りまくれるしね」"
translation = "「인간놈들이 만든 게임치고는 제법 나쁘지 않다고. 마음껏 도발해댈 수 있고 말야.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃんね、最近はゲーム内でよく一緒にチームを組む『友達』もできたらしくて～」"
translation = "「디짱 있잖아, 최근에는 게임 안에서 자주 같이 팀을 짜는 『친구』도 생긴 모양이라서~」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「友達じゃない。あくまでゲーム内で登録する『フレンド』。野良の下手クソと組むよりは勝率が上がるから、共闘してやってるだけサ」"
translation = "「친구가 아니야. 어디까지나 게임 내에서 등록하는 『프렌드』. 야생의 초짜랑 짜는 것보다는 승률이 올라가니까 같이 싸워주는 것뿐이라고.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それでね、私もフレンド登録してもらったんだけど、ディーちゃんに負けないくらい、すっごく強いんだよ！」"
translation = "「그래서 나도 프렌드 등록을 받았는데, 디짱에게 지지 않을 정도로 엄청 강해!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっとね、２人いるんだけど、プレイヤーネームが『フランボウ』さんと、『アブラマシマシ』さんって言って……」"
translation = "「음 그러니까 두 명 있는데, 플레이어 네임이 『플랑보』 씨랑 『아브라마시마시』 씨라고 해서……」"

[[dialogue]]
speaker = "unk"
original = "えっ、その名前……"
translation = "엣, 그 이름은……"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「？\u3000どうしたの会長？」"
translation = "「? 왜 그래 회장님?」"

[[dialogue]]
speaker = "unk"
original = "数日後。"
translation = "며칠 후."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「まさか……フレンドの２人が、会長と知り合いだったなんて……！」"
translation = "「설마…… 프렌드인 두 사람이 회장님 지인이었다니……!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「いや～、やっぱ会長と友達やってると面白いよね～♪\u3000まさかゲームのフレンドと、こうしてオフ会することになるなんて思わなかったよ～」"
translation = "「이야~ 역시 회장님이랑 친구 하고 있으면 재밌다니까~♪ 설마 게임 프렌드랑 이렇게 오프회를 하게 될 줄은 몰랐어~」"

[[dialogue]]
speaker = "unk"
original = "マッドスタンパーのプレイヤーネーム『フランボウ』こと、流星学園１年生『ミネコ・フランボワーズ』。"
translation = "매드 스탬퍼의 플레이어 네임 『플랑보』이자 유성학원 1학년 『미네코 프랑보와즈』."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「さすが魔王。マシマシ系ラーメンのようにリアルフレンドも豊富ですね」"
translation = "「역시 마왕. 마시마시 계열 라멘처럼 현실 친구도 풍부하시군요.」"

[[dialogue]]
speaker = "unk"
original = "プレイヤーネーム『アブラマシマシ』こと、俺にマッドスタンパーを教えてくれた張本人――ネビュラ所属の魔女『イニシュ』。"
translation = "플레이어 네임 『아브라마시마시』이자 나에게 매드 스탬퍼를 가르쳐 준 장본인── 네뷸라 소속의 마녀 『이니슈』."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「しかしあの『バッドラッカー』が、まさかヒトではなく使い魔だったとは思いませんでした」"
translation = "「하지만 그 『배드 럭커』가 설마 사람이 아니라 사역마였을 줄은 몰랐습니다.」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ふん……別にいいだろ。そんなこと言ったら、お前だって魔女じゃん」"
translation = "「흥…… 상관없잖아. 그렇게 따지면 너도 마녀잖아.」"

[[dialogue]]
speaker = "unk"
original = "『バッドラッカー』とは、ディーちゃんのプレイヤーネームである。"
translation = "『배드 럭커』란 디짱의 플레이어 네임이다."

[[dialogue]]
speaker = "unk"
original = "ちなみに、ディーちゃんが『エネルギー生命体』であることは下手に説明できない為、シズハの能力で召喚された使い魔的な存在ということにしていた。"
translation = "참고로 디짱이 『에너지 생명체』라는 것은 제대로 설명하기 어렵기 때문에 시즈하의 능력으로 소환된 사역마 같은 존재로 해두었다."

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「そういえば、シズハは附属校の３年生なんだよね？\u3000なら、私の後輩だ♪」"
translation = "「그러고 보니 시즈하는 부속 학교 3학년이었지? 그럼 내 후배네♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はい♪\u3000よろしくお願いしますね、ミネコ先輩！」"
translation = "「네♪ 잘 부탁드려요 미네코 선배!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「そういえば前から気になってたんだけどさ～。シズハのプレイヤーネーム――」"
translation = "「그러고 보니 전부터 궁금했던 건데 말야~. 시즈하의 플레이어 네임──」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「『グレイルヒップ』ってどういう意味なの？」"
translation = "「『그레일 힙』은 무슨 뜻이야?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「フランボウやバッドラッカーは、本人由来と推察することができます。ですが『グレイルヒップ』の由来はわかりません」"
translation = "「플랑보나 배드 럭커는 본인에게서 유래한 것이라 추측할 수 있습니다. 하지만 『그레일 힙』의 유래는 모르겠군요.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ……えっと～、ちょっと恥ずかしいんですけど～」"
translation = "「앗…… 그게~ 좀 부끄럽지만요~」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「『グレイル』は、なんとなく『聖杯』って、神聖でカッコいいなと思って……」"
translation = "「『그레일』은 왠지 『성배』라는 게 신성하고 멋있어서……」"

[[dialogue]]
speaker = "unk"
original = "そう言って少し頬を染めたあと――なぜかそこからは、やけに堂々と続ける。"
translation = "그렇게 말하며 조금 뺨을 붉힌 뒤── 왠지 거기서부터는 꽤 당당하게 이어나간다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――で、ヒップの方は率直に『お尻』って意味です！\u3000私、お尻が大好きなので♪」"
translation = "「──그리고 힙 쪽은 솔직하게 『엉덩이』라는 뜻이에요! 저, 엉덩이를 아주 좋아하거든요♪」"

[[dialogue]]
speaker = "unk"
original = "お尻よりも聖杯の方が恥ずかしいんだ……"
translation = "엉덩이보다 성배 쪽이 더 부끄러운 거구나……"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000うん。だって聖杯ってなんか仰々しいし……お尻は普通でしょ？」"
translation = "「어? 응. 왜냐면 성배는 뭔가 거창하고…… 엉덩이는 평범하잖아?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「えっと……その『お尻が好き』っていうのは、どういう……？」"
translation = "「저기…… 그 『엉덩이가 좋다』는 건 어떤……?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、そうだ！\u3000お近づきの印に、ミネコ先輩とイニシュさんのお尻、触ってもいいですか♪」"
translation = "「앗, 맞다! 친해진 기념으로 미네코 선배랑 이니슈 씨 엉덩이, 만져봐도 될까요♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ちょっと待って！？\u3000触るってどういうこと！？」"
translation = "「잠깐 기다려!? 만진다니 그게 무슨 소리야!?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「お尻が好きというのは、それがシズハの『性癖』ということでしょうか？」"
translation = "「엉덩이가 좋다는 것은 그것이 시즈하의 『성벽』이라는 것일까요?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「いえいえ！\u3000好きなのは確かですけど――私にとって、お尻は『コミュニケーション』なんです！」"
translation = "「아뇨아뇨! 좋아하는 건 확실하지만── 저에게 있어서 엉덩이는 『커뮤니케이션』이에요!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「日本で一緒にお風呂に入ることを『裸の付き合い』って言いますよね？」"
translation = "「일본에서 같이 목욕하는 걸 『벌거벗은 사귐』이라고 하잖아요?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それと同じで――互いのお尻を触り合えば『お尻合い』になれる、というイメージが近いです！」"
translation = "「그것처럼── 서로의 엉덩이를 만지면 『엉덩이(尻)로 아는 사이』가 될 수 있다는 이미지가 가까워요!」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「人間界にはそのような文化があるのですね。初耳です」"
translation = "「인간계에는 그런 문화가 있군요. 처음 듣습니다.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「いや、私も半分日本人だけど、知らないよ！？」"
translation = "「아니, 나도 절반은 일본인이지만 모른다고!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「さすがシズハちゃん。マッドスタンパーの煽り合いが得意なプレイヤーでも、さすがに引いてるのサ」"
translation = "「역시 시즈하짱. 매드 스탬퍼 도발에 능숙한 플레이어라도 역시 당황하는 모양이네.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「だって、せっかく顔を合わせたんですし、リアルでも仲良くなりたいな～って♪\u3000なので、お尻を――」"
translation = "「그치만 모처럼 얼굴을 마주했으니 현실에서도 친해지고 싶어서요~♪ 그러니 엉덩이를──」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「お尻は一旦置いとこうか！？」"
translation = "「엉덩이는 일단 치워두자!?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「と、友達になること自体は、もちろん大歓迎だよ♪\u3000ディスクの連絡先、交換しよっか！」"
translation = "「그, 친구가 되는 것 자체는 물론 대환영이야♪ 디스크 연락처 교환할까!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はい♪\u3000ありがとうございます！」"
translation = "「네♪ 감사합니다!」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「友達……」"
translation = "「친구……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「イニシュさんは、どうでしょうか……？」"
translation = "「이니슈 씨는 어떠신가요……?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「……はい。そうですね。友達は――いいものです。私も構いません」"
translation = "「……네. 그렇군요. 친구는── 좋은 것입니다. 저도 상관없습니다.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「やった♪\u3000えへへ、イニシュさんの連絡先も教えてください♪」"
translation = "「나이스♪ 에헤헤, 이니슈 씨 연락처도 알려주세요♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ディーちゃんも、この前ＤＩＳＣを買ったんだから、みんなと交換しよ？」"
translation = "「디짱도 요전에 DISC 샀으니까 다들 같이 교환하자?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「え～、ボクは別にいいよ。シズハちゃんが連絡先交換しとけば、十分でしょ」"
translation = "「에~ 난 딱히 상관없어. 시즈하짱이 연락처 교환해두면 충분하잖아.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「私は知っときたいな～。ディーラック、キミ、なかなか面白そうだし♪」"
translation = "「난 알고 싶은걸~. 디럭쿠 너 꽤 재미있어 보이고♪」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「フランボウ……な～んか面倒な感じがするんだよなぁ……」"
translation = "「플랑보…… 왠~지 귀찮은 느낌이 든단 말이지……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ディーラック。マッドスタンパー的に言うなら、それは『自己紹介乙』ということでしょうか？」"
translation = "「디럭쿠. 매드 스탬퍼 식으로 말하자면 그것은 『자기소개 완료』라는 것일까요?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「おい待て。クールな顔して、それ煽ってるよね？」"
translation = "「이봐 잠깐. 쿨한 얼굴로 그거 도발하는 거지?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふふっ、ディーちゃん、友達増えてよかったね♪」"
translation = "「후훗, 디짱 친구가 늘어서 다행이네♪」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「シズハ。今の流れでそれは、なかなか煽りポイントが高いです」"
translation = "「시즈하. 지금 흐름에서 그 말은 꽤 도발 포인트가 높습니다.」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000私、何か変なこと言っちゃいました？」"
translation = "「어? 저 뭔가 이상한 소리 했나요?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ぷっ……あはははっ♪」"
translation = "「풉…… 아하하하하♪」"

[[dialogue]]
speaker = "unk"
original = "こうしてオフ会をきっかけに、シズハたちは新たな友人関係を築くのだった。"
translation = "이렇게 오프회를 계기로 시즈하 일행은 새로운 친구 관계를 쌓는 것이었다."

