[[dialogue]]
speaker = "unk"
original = "第１話,大人になったアポロ,P"
translation = "제1화, 어른이 된 아폴로, P"

[[dialogue]]
speaker = "unk"
original = "事故によってデネブにやってきた俺たちは、デネブにいる間、極星学園の会長ルヴィネに反抗するレジスタンスの秘密基地でお世話になっていた。"
translation = "사고로 인해 데네브에 오게 된 우리들은, 데네브에 있는 동안 극성 학원의 회장 루비네에게 대항하는 레지스탕스의 비밀기지에서 신세를 지고 있었다."

[[dialogue]]
speaker = "unk"
original = "そしてそのレジスタンスの中心人物が──"
translation = "그리고 그 레지스탕스의 중심인물이──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにしても大きくなったわね～。見違えたわよ、アポロ」"
translation = "「그건 그렇고 정말 커졌네~. 몰라보겠어, 아폴로」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「まぁな。もうお前たちより年上だぞ」"
translation = "「그렇지. 이제 너희보다 연상이라고」"

[[dialogue]]
speaker = "unk"
original = "デネブに帰還し、十年の成長を経た大人のアポロだ。"
translation = "데네브로 귀환하여 10년의 성장을 거친 어른 아폴로다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「すっかり背が伸びて、かっこよくなったわね。それに──」"
translation = "「훌쩍 키가 커서 멋있어졌네. 게다가──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おっぱいが大きくなったわ！」"
translation = "「가슴이 커졌어!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスっ！？"
translation = "비너스!?"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、大きくなったぞ。大人だからな。ヴィーナスにも負けてないんじゃないか？」"
translation = "「그래, 커졌지. 어른이니까 말이야. 비너스에게도 지지 않을 정도 아냐?」"

[[dialogue]]
speaker = "unk"
original = "アポロは子どもから大人になり、背丈は大きくなって、顔立ちも美人になった。"
translation = "아폴로는 아이에서 어른이 되어 키는 커졌고, 이목구비도 미인이 되었다."

[[dialogue]]
speaker = "unk"
original = "体も胸やお尻など出るところが出ていて、とても女性らしくなっていた。"
translation = "몸도 가슴이나 엉덩이 등 나올 곳이 나와 있어서 무척 여성스러워져 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フィオナとアポロは双子なんだし、フィオナも将来こんな感じのお姉さんになるのかしら」"
translation = "「피오나랑 아폴로는 쌍둥이니까, 피오나도 나중에 이런 느낌의 언니가 되려나」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですね、私もいずれこんなふうに……」"
translation = "「그러게요, 저도 언젠가 이런 식으로……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「じー……」"
translation = "「지긋이……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「おーい、視線が胸に行ってるぞー」"
translation = "「어이~ 시선이 가슴으로 가고 있다고~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ごご、ごめんなさいっ。だって本当に大きくなってるから……」"
translation = "「죄죄, 죄송해요. 그치만 정말 커졌으니까……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「コホン。胸の話はやめましょう。私たちだけならともかく、緋宮会長が気まずくなってしまいます」"
translation = "「큼큼. 가슴 이야기는 그만하죠. 저희끼리라면 몰라도, 히노미야 회장님이 거북해하실 거예요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、すまんすまん。男の前でする話じゃなかったな」"
translation = "「아아, 미안 미안. 남자 앞에서 할 이야기가 아니었네」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だが……魔王からも視線を感じるな？」"
translation = "「하지만…… 마왕에게서도 시선이 느껴지는데?」"

[[dialogue]]
speaker = "unk"
original = "ギクッ……！？"
translation = "뜨끔……!?"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「はは、気にするな。男子が美人の年上お姉さんを気にしてしまうのは不可抗力だ」"
translation = "「하하, 신경 쓰지 마라. 남자가 미인인 연상 언니를 신경 쓰는 건 불가항력이지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「どうだ、女らしくなったろう？\u3000魔王とあたしの仲だ、胸をチラチラ見るくらいならいいぞ」"
translation = "「어때, 여자다워졌지? 마왕과 나의 사이인데, 가슴을 힐끔힐끔 보는 정도는 괜찮다고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私のおっぱいも見ていいわよ、クロト！」"
translation = "「내 가슴도 봐도 좋아, 쿠로토!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、緋宮会長の顔がますます赤く……ほんとにもうやめましょう、この話は……」"
translation = "「아, 히노미야 회장님의 얼굴이 점점 빨개져서…… 정말 이제 그만하죠, 이 이야기는……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ははは、魔王には刺激が強かったか？\u3000だったら悪かったな」"
translation = "「하하하, 마왕에게는 자극이 너무 강했나? 그렇다면 미안하군」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「さてみんな、今日の夕飯の希望はあるか？\u3000今ある材料で作れるものなら何でもいいぞ」"
translation = "「자 얘들아, 오늘 저녁 메뉴 희망 사항 있나? 지금 있는 재료로 만들 수 있는 거라면 뭐든 좋다고」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こっちの姉さんは本当に料理が上手ですよね」"
translation = "「이쪽 언니는 정말 요리를 잘하시네요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「何せレジスタンスだからな。気軽にコンビニに行くわけにはいかないし。保存食ばかりじゃ飽きるし栄養も偏る。自前で作れるに越したことはない」"
translation = "「아무래도 레지스탕스니까 말이야. 마음 편히 편의점에 갈 수도 없고. 보존식만 먹으면 질리고 영양도 치우치니까. 직접 만들 수 있는 게 최고지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「特に希望がないなら、あたしが得意なやつにするぞ。餃子とサバの味噌煮は特に自信がある」"
translation = "「딱히 희망이 없다면 내가 자신 있는 걸로 하마. 만두랑 고등어 된장 조림은 특히 자신 있어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうして餃子とサバの味噌煮なの？」"
translation = "「왜 만두랑 고등어 된장 조림이야?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000流星ライダードラゴンと流星ライダービートルですね！」"
translation = "「! 유성 라이더 드래곤이랑 유성 라이더 비틀이네요!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ。餃子はドラゴンの主人公の得意料理で、サバ味噌はビートルでよく食べてたんだ」"
translation = "「그래. 만두는 드래곤 주인공의 주특기 요리고, 고등어 된장 조림은 비틀에서 자주 먹었거든」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へぇ～、大人になっても流星ライダーが好きなのね。そこは変わらないんだ」"
translation = "「헤에~, 어른이 되어도 유성 라이더를 좋아하는구나. 그 점은 변하지 않았네」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「もちろんだ。あたしが料理をしようと思った理由の１つは、流星ライダーメニューを自分で作れるようになりたいと思ったからだしな」"
translation = "「물론이지. 내가 요리를 하려고 마음먹은 이유 중 하나도 유성 라이더 메뉴를 직접 만들 수 있게 되고 싶어서였으니까」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「というわけで、餃子とサバ味噌ならどっちが──と思ったがひき肉は残り少なかったな。サバ味噌でいいか？」"
translation = "「그런 의미에서 만두랑 고등어 된장 조림 중에 어느 쪽이──라고 생각했지만 다진 고기가 얼마 안 남았네. 고등어 된장 조림으로 괜찮나?」"

[[dialogue]]
speaker = "unk"
original = "楽しみにしてるよ"
translation = "기대하고 있을게"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「おう、任せておけ！」"
translation = "「오우, 맡겨둬라!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし、できたぞー」"
translation = "「좋아, 다 됐다~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとうございます、姉さん。流星ライダーに出てきそうな、美味しそうなサバ味噌です」"
translation = "「감사합니다, 언니. 유성 라이더에 나올 법한 맛있어 보이는 고등어 된장 조림이에요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんのサバ味噌を食べるなんて、ちょっと不思議な気分です」"
translation = "「언니가 만든 고등어 된장 조림을 먹다니 조금 이상한 기분이에요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ははっ、あたしもエリシアに作るなんて想像してなかったよ」"
translation = "「하핫, 나도 엘리시아에게 만들어 줄 거라곤 상상도 못 했어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃ……いただきまーす！」"
translation = "「그럼…… 잘 먹겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "めちゃくちゃ美味しい！"
translation = "정말 맛있어!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん～っ♪\u3000やるじゃない、アポロ！」"
translation = "「음~♪ 제법인걸, 아폴로!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「本当に美味しいです……これならビートルのサバ味噌にも勝てるのでは？」"
translation = "「정말 맛있어요…… 이 정도면 비틀의 고등어 된장 조림에도 이길 수 있지 않을까요?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だろ？\u3000サバのくさみを丁寧に取るのと、ショウガをほどよく利かせるのがコツだ」"
translation = "「그렇지? 고등어의 비린내를 정성껏 제거하고 생강을 적당히 넣는 게 비결이다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "（ところで魔王。お前、恋人とかいるのか？）"
translation = "「(그런데 마왕. 너, 애인 같은 거 있어?)」"

[[dialogue]]
speaker = "unk"
original = "ぶふっ──！？"
translation = "푸흡──!?"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "（やっぱり一番近くにいるヴィーナスか？\u3000それともエリシアか？）"
translation = "「(역시 가장 가까이에 있는 비너스인가? 아니면 엘리시아인가?)」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "（どうしてそんなこと聞くんだって……？\u3000久しぶりに会ったんだ、気になるだろそういうの）"
translation = "「(왜 그런 걸 묻냐고……? 오랜만에 만났잖아, 궁금하다고 그런 건)」"

[[dialogue]]
speaker = "unk"
original = "（距離が近い……！）"
translation = "(거리가 가까워……!)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん、少し酔ってます……？」"
translation = "「언니, 조금 취하셨어요……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、大人だからな。酒くらい飲むさ」"
translation = "「아아, 어른이니까 말이야. 술 정도는 마시지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「秘密基地暮らしじゃ貴重品だが、妹や魔王たちに久しぶりに会えたんだ。めでたい時くらい飲んでいいだろ」"
translation = "「비밀기지 생활에서는 귀중품이지만, 동생이나 마왕 일행을 오랜만에 만났잖아. 경사스러운 날 정도는 마셔도 되잖아」"

[[dialogue]]
speaker = "unk"
original = "ほんのり顔が赤いアポロを間近にしながら、いろんな意味で大人になったと実感させられるのだった。"
translation = "살짝 얼굴이 붉어진 아폴로를 가까이서 보며, 여러 의미로 어른이 되었다고 실감하게 되는 것이었다."

