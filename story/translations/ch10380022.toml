[[dialogue]]
speaker = "unk"
original = "第２話,皆さんの水着、いやらしすぎでは……？,P"
translation = "제2화, 여러분의 수영복, 너무 야한 거 아닌가요……?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ぜぇぜぇ、あ、暑い……。ここまで蒸し蒸しだと流石に参りますね……」"
translation = "「제제, 더워……. 이렇게 눅눅하면 역시 지치네요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あらイクシー。みんなもう水着に着替えてるわよ？\u3000あなたも早く着替えて着替えて♪」"
translation = "「어라 익시. 다들 벌써 수영복으로 갈아입었다고? 너도 빨리 갈아입어 갈아입어♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長、はしゃぎすぎです。これはイベントではありません。あくまで一時措置なのですから」"
translation = "「전 회장님, 너무 들뜨셨습니다. 이것은 이벤트가 아닙니다. 어디까지나 임시 조치니까요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まさか冷房が壊れちゃうなんてね～。真夏の一番暑い時期に困っちゃうわ～」"
translation = "「설마 냉방이 고장 나버릴 줄이야~. 한여름 제일 더울 시기에 곤란하네~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おかげで学園公認水着パーティーを開けたんだからいいじゃない。ふふ、授業中も水着で過ごしていいなんてワクワクしちゃうわ」"
translation = "「덕분에 학원 공인 수영복 파티를 열 수 있었으니까 좋잖아. 후후, 수업 중에도 수영복으로 지내도 된다니 두근두근해버려」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「パーティーではないですが……非日常的なのは事実ですからね」"
translation = "「파티는 아니지만…… 비일상적인 것은 사실이니까요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「～～っっ。み、皆さん、本当に水着に着替えて……。公衆の面前でなんと大胆、なんとインモラルな……」"
translation = "「~~읏읏. 여, 여러분, 정말로 수영복으로 갈아입고……. 공공장소에서 어쩜 이렇게 대담하고, 어쩜 이렇게 부도덕한……」"

[[dialogue]]
speaker = "unk"
original = "イクシーも水着に着替えた方がいいよ"
translation = "익시도 수영복으로 갈아입는 게 좋아"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「会長まで水着に……！\u3000ビーチでもないのに上半身裸で……！」"
translation = "「회장님까지 수영복으로……! 비치도 아닌데 상반신 노출로……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「むしろ、あなたくらいよ。まだ制服着ているのは。ご丁寧にタイツまで履いて……。熱中症になっちゃうわよ？」"
translation = "「오히려, 너 정도야. 아직 교복을 입고 있는 건. 정중하게 타이즈까지 신고……. 열사병 걸려버린다고?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「それはわかっているのですが、やはり抵抗が……」"
translation = "「그건 알고 있습니다만, 역시 저항감이……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「恥ずかしいのはわかるけど～。そのままだと倒れちゃうわよ～？」"
translation = "「부끄러운 건 알겠지만~. 그대로 있으면 쓰러져버린다고~?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「い、いえ、恥ずかしいわけでは……。水着で校内を闊歩するというのは水着戦闘服を得てから毎日のように妄想していたシチュですし……」"
translation = "「아, 아니요, 부끄러운 게 아니라……. 수영복으로 교내를 활보한다는 건 수영복 전투복을 얻고 나서 매일같이 망상하던 시추에이션이고……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「水着と言えば下着も同然……。つまり水着で出歩くというのは下着で出歩いているのと同義……」"
translation = "「수영복이라고 하면 속옷이나 마찬가지……. 즉 수영복으로 돌아다닌다는 건 속옷으로 돌아다니는 것과 동의어……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「要するに水着は、下着で出歩きたいという欲求を叶えてくれる夢のアイテム──！\u3000わかってます、それは重々わかっているのですがっ……」"
translation = "「요컨대 수영복은, 속옷으로 돌아다니고 싶다는 욕구를 이루어주는 꿈의 아이템──! 알고 있어요, 그건 뼈저리게 알고 있지만요옷……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「イクシー、大丈夫？\u3000何かブツブツ言ってるけど……。もう熱中症の症状が出ちゃってるんじゃないかしら……？」"
translation = "「익시, 괜찮아? 뭔가 중얼중얼거리고 있는데……. 벌써 열사병 증상이 나타난 거 아닐까……?」"

[[dialogue]]
speaker = "unk"
original = "とりあえず鼻血拭いて、こっち来て！"
translation = "일단 코피 닦고, 이쪽으로 와!"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ひゃんっ……！\u3000か、会長、こんな物陰に半裸で連れ込んで、はぁはぁ、何をするつもりなんですか……？」"
translation = "「햔……! 회, 회장님, 이런 그늘진 곳에 반라로 끌고 와서, 하아하아, 뭘 할 셈인가요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ふぁ……！？\u3000おおお、お顔が近いです……！\u3000まさかキキキ……！？\u3000すすす、すぐ近くにヴィーナスさんたちもいらっしゃいますから……！」"
translation = "「화……!? 어어어, 얼굴이 가까워요……! 설마 키키키……!? 바바바, 바로 근처에 비너스 씨 일행도 계시니까요……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「って──ちべたっ。これは、<ruby>氷嚢<rt>ひょうのう</rt></ruby>……？」"
translation = "「어라── 차가워. 이건, 얼음주머니……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私が茹だってるように見えたから……ですか？\u3000確かに暑くて暑くて仕方なくて……。今や学内全体がサウナのような状況ですし……」"
translation = "「제가 삶아지고 있는 것처럼 보여서…… 인가요? 확실히 덥고 더워서 어쩔 수 없어서……. 이제 학내 전체가 사우나 같은 상황이고……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「皆さんの言うとおり、早く水着に着替えるべきだとわかっているのですが、その……」"
translation = "「여러분 말씀대로, 빨리 수영복으로 갈아입어야 한다는 건 알고 있습니다만, 그……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……いえ、百聞は一見にしかずですよね。んっ……」"
translation = "「……아니요, 백문이 불여일견이죠. 응……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「どうですか？\u3000正直その、見劣りしますよね……？」"
translation = "「어때요? 솔직히 그, 뒤떨어져 보이죠……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ですから、ヴィーナスさんたちの水着姿に比べて、です。競泳水着って肌の露出が少ないですから……」"
translation = "「그러니까, 비너스 씨 일행의 수영복 모습에 비해서요. 경쟁용 수영복은 노출이 적으니까……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「おまけにジャージまで羽織ってしまってますし……。水着のヴィーナスさんたちと並んで立つと、その……」"
translation = "「게다가 저지까지 걸쳐버렸고……. 수영복 차림인 비너스 씨 일행과 나란히 서면, 그……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「色気がないな、と会長に思われちゃうんじゃないかって……」"
translation = "「섹시함이 없네, 라고 회장님이 생각하실까 봐……」"

[[dialogue]]
speaker = "unk"
original = "俺は好きだよ、イクシーの水着姿"
translation = "난 좋아해, 익시의 수영복 모습"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え……？\u3000まさか競泳水着フェチだったんですか？\u3000確かにその、競泳水着には競泳水着の良さもあると自覚していますが……」"
translation = "「에……? 설마 경쟁용 수영복 페티시였나요? 확실히 그, 경쟁용 수영복에는 경쟁용 수영복만의 장점도 있다고 자각하고 있습니다만……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「素材の破れやすさなんて最たる物ですよね。爪を立てようものなら、簡単にビリビリ破れてしまいそうですし……」"
translation = "「소재가 찢어지기 쉽다는 점이 으뜸이죠. 손톱이라도 세웠다간, 간단히 북북 찢어져 버릴 것 같고……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「破れた場所から覗く日焼けひとつない白い肌……──あれはビキニでは決して得られないエロスですっ……」"
translation = "「찢어진 틈으로 엿보이는 햇볕에 타지 않은 하얀 피부……── 그건 비키니로는 결코 얻을 수 없는 에로스입니다……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「防御力低そうな点も興奮しますし……！\u3000実際、この戦闘服で戦う時はいつもドキドキしてしまっていて。攻撃を受けるたびに破れてしまわないかと気が気では──」"
translation = "「방어력이 낮아 보이는 점도 흥분되고요……! 사실, 이 전투복으로 싸울 때는 언제나 두근거려버려서. 공격을 받을 때마다 찢어지지 않을까 노심초사──」"

[[dialogue]]
speaker = "unk"
original = "その競泳水着にはイクシーの優しさが表れてるからね"
translation = "그 경쟁용 수영복에는 익시의 상냥함이 나타나 있으니까"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私の優しさ、ですか？」"
translation = "「저의 상냥함, 말인가요?」"

[[dialogue]]
speaker = "unk"
original = "ビキニじゃ水難救助なんてできないから"
translation = "비키니로는 수난 구조 같은 거 못 하니까"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ふふ、そうですね。この競泳水着には、保健委員としての私の矜恃が表れているのかもしれません」"
translation = "「후후, 그렇네요. 이 경쟁용 수영복에는, 보건 위원으로서의 저의 긍지가 나타나 있는 걸지도 모르겠어요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「単純に水着を選ぶだけなら、もっと過激な──……それこそマイクロビキニのようなものを選んでいたと思います」"
translation = "「단순히 수영복을 고르는 거라면, 좀 더 과격한──…… 그야말로 마이크로 비키니 같은 걸 골랐을 거예요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「事実、人工戦闘服を調整する時にチラりと脳裏をよぎりましたし……。でも、気がついたらこの水着を選んでいました」"
translation = "「사실, 인공 전투복을 조정할 때 살짝 뇌리를 스쳤거든요……. 하지만, 정신을 차려보니 이 수영복을 고르고 있었어요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あはは、なんだか気恥ずかしいです……。会長に自分の心を覗き見られているみたいで……」"
translation = "「아하하, 왠지 쑥스러워요……. 회장님께 제 마음을 들여다보이고 있는 것 같아서……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ですが……すごく嬉しいです。会長は私の見てくれではなく、本質を好きだと言ってくれるのですね……？」"
translation = "「하지만…… 정말 기뻐요. 회장님은 제 겉모습이 아니라, 본질을 좋아한다고 말해주시는 거군요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「おかげで心の靄が晴れました。ふふふ、私、会長の彼女になれて本当に良かったです」"
translation = "「덕분에 마음의 안개가 걷혔어요. 후후후, 저, 회장님의 여자친구가 되어서 정말 다행이에요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私以上に私のことを理解してくれている。こんな素敵な恋人、他にいませんから<emoji=heart04>」"
translation = "「저보다 더 저를 이해해주고 계세요. 이런 멋진 연인, 어디에도 없으니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「でも……水着に色気がないという点は否定しませんでしたよね？\u3000やっぱり色気不足だとは思っているんですか？」"
translation = "「하지만…… 수영복에 섹시함이 없다는 점은 부정하지 않으셨죠? 역시 섹시함 부족이라고 생각하시나요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あはは、責めているわけではありませんよ。この水着姿を気に入ってくれていることはよーくわかっていますから」"
translation = "「아하하, 나무라는 게 아니에요. 이 수영복 모습을 마음에 들어 하신다는 건 자알 알고 있으니까요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「会長が喜んでくれるのなら、いつか派手な水着にも挑戦しようと思ってるだけです」"
translation = "「회장님이 기뻐하신다면, 언젠가 화려한 수영복에도 도전해볼까 생각하고 있을 뿐이에요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「校内じゃ絶対に着られないような、恋人に見せる専用のエッチな水着を……」"
translation = "「교내에선 절대 입을 수 없는, 연인에게 보여주는 전용 야한 수영복을……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「どうか、えへへ、期待していてくださいね……？」"
translation = "「부디, 에헤헤, 기대하고 있어 주세요……?」"

