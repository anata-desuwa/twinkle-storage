[[dialogue]]
speaker = "unk"
original = "第５話,スタンピード,B"
translation = "제5화, 스탬피드, B"

[[dialogue]]
speaker_original = "雪男の魔獣"
speaker_translation = "설인 마수"
original = "『グラアアアアアアアアアオ！！』"
translation = "『그르아아아아아아아아아오!!』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……」"
translation = "「크읏……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「駄目ニャ──キリがないニャ──！」"
translation = "「안 된다냥── 끝이 없다냥──!」"

[[dialogue]]
speaker = "unk"
original = "１０──２０──襲い来る魔獣たちを何度も撃退していく。"
translation = "10──20── 덮쳐오는 마수들을 몇 번이고 격퇴해 나간다."

[[dialogue]]
speaker = "unk"
original = "だが、一向に全滅する気配が見えない。巣から出てきたというスタンピードの魔獣たちは──あまりに膨大な頭数だった。"
translation = "하지만, 도무지 전멸할 기미가 보이지 않는다. 둥지에서 나왔다는 스탬피드의 마수들은── 너무나도 방대한 숫자였다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よりにもよって、こんな最悪なタイミングで……！」"
translation = "「하필이면, 이런 최악의 타이밍에……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「チッ……仕方ねえ。<ruby>レゾフ<rt>ここ</rt></ruby>はあたしが守る。炎の星術がありゃ──寒波にも魔獣にも対抗できるはずだ」"
translation = "「칫…… 어쩔 수 없지. 이곳은 내가 지킨다. 불꽃의 성술이 있다면── 한파에도 마수에도 대항할 수 있을 거다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「待ってください──いくらユウリ先輩でも、この規模の相手を一人は無茶です！」"
translation = "「기다려 주세요── 아무리 유우리 선배라도, 이 규모의 상대를 혼자서는 무리입니다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね──私たちも援護したいけど──『森』でヴィーナスちゃんが待ってるのに……」"
translation = "「그렇지── 우리도 원호하고 싶지만── 『숲』에서 비너스짱이 기다리고 있는데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ッ……どうする？）"
translation = "（크읏…… 어떻게 하지?）"

[[dialogue]]
speaker = "unk"
original = "このままレゾフを放置すれば壊滅は必至──"
translation = "이대로 레조프를 방치하면 괴멸은 필연──"

[[dialogue]]
speaker = "unk"
original = "しかしスタンピードの対処に手間取ってしまっていては、ヴィーナスの救助に支障が出る。あちらを立てればこちらが立たずだ。"
translation = "하지만 스탬피드 대처에 시간을 지체하고 있다면, 비너스 구출에 지장이 생긴다. 저쪽을 세우면 이쪽이 서지 않는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナ──」"
translation = "「피오나──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ええ。こうなったら……手はひとつしかありませんね」"
translation = "「……네. 이렇게 된다면…… 방법은 하나밖에 없겠네요.」"

[[dialogue]]
speaker = "unk"
original = "俺はフィオナとアイコンタクトを取って、みんなに告げた。"
translation = "나는 피오나와 눈빛을 교환하고, 모두에게 알렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『森』へは──俺とフィオナだけで行く。みんなはここで、魔獣たちからレゾフを守ってくれ」"
translation = "「『숲』으로는── 나와 피오나 둘이서만 간다. 모두는 여기서, 마수들로부터 레조프를 지켜줘.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「２人だけで……！？」"
translation = "「두 사람만으로……!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「待ちやがれ、それこそ無茶だ！\u3000あの黒騎士に２人ぽっちじゃ──」"
translation = "「기다려, 그거야말로 무리야! 그 검은 기사에게 둘이서만으론──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが、ソフィアの故郷をこのまま放っておくわけにはいきません。私と緋宮会長なら──」"
translation = "「하지만, 소피아의 고향을 이대로 내버려 둘 수는 없습니다. 저와 히노미야 회장이라면──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ヴィーナスさんだって放っておけません！\u3000それに、戦力が分散しすぎです！」"
translation = "「비너스 씨도 내버려 둘 수 없어요! 게다가, 전력이 너무 분산됩니다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうよ、会長くん──そんな無謀は看過できないわ！」"
translation = "「맞아, 회장 군── 그런 무모함은 묵과할 수 없어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「サーシャさん……」"
translation = "「사샤 씨……」"

[[dialogue]]
speaker_original = "狼型の魔獣"
speaker_translation = "늑대형 마수"
original = "『──ガルルルルルルルルルッ！！』"
translation = "『──크르르르르르르르르르읏!!』"

[[dialogue]]
speaker = "unk"
original = "ああ、くそ──参った。"
translation = "아아, 젠장── 곤란하다."

[[dialogue]]
speaker = "unk"
original = "レゾフの街もヴィーナスのこともどちらだって見過ごせない。"
translation = "레조프 마을도 비너스의 일도 어느 쪽이든 지나칠 수 없다."

[[dialogue]]
speaker = "unk"
original = "どうしてこんな大事な局面で、２つを天秤にかけなきゃいけないんだ──！"
translation = "왜 이렇게 중요한 국면에서, 두 가지를 저울질해야 하는 건가──!"

[[dialogue]]
speaker = "？？？"
original = "「構わん──先を急げよ、若人たち」"
translation = "「상관없다── 서둘러라, 젊은이들아.」"

[[dialogue]]
speaker_original = "雪男の魔獣"
speaker_translation = "설인 마수"
original = "『ギラアアアアアアアアア────ッ！？』"
translation = "『끼야아아아아아아아아아────앗!?』"

[[dialogue]]
speaker_original = "狼型の魔獣"
speaker_translation = "늑대형 마수"
original = "『──グルルルルルルァァッ！？』"
translation = "『──그르르르르르르아앗!?』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なっ──！？」"
translation = "「뭐──!?」"

[[dialogue]]
speaker = "unk"
original = "一筋の雷光が天を割った。"
translation = "한 줄기 번갯불이 하늘을 갈랐다."

[[dialogue]]
speaker = "unk"
original = "吹雪ごと灼き尽くすかのような雷撃が魔獣たちの大群を一掃する。"
translation = "눈보라째 태워버릴 듯한 뇌격이 마수들의 대군을 일소한다."

[[dialogue]]
speaker = "unk"
original = "そこに立っていたのは……"
translation = "그곳에 서 있던 것은……"

[[dialogue]]
speaker = "？？？"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え……」"
translation = "「어……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あ──あんたは……あん時に会った──」"
translation = "「아── 당신은…… 그때 만났던──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──旅人、さん……？」"
translation = "「──떠돌이 여행자, 씨……?」"

[[dialogue]]
speaker = "unk"
original = "旅人──自らをそう名乗った女性に違いなかった。"
translation = "떠돌이 여행자── 스스로를 그렇게 칭했던 여성임이 틀림없었다."

[[dialogue]]
speaker = "unk"
original = "だが、その様子は明らかに以前と違う。"
translation = "하지만, 그 모습은 분명히 이전과 다르다."

[[dialogue]]
speaker = "unk"
original = "服装や武装もさることながら──なんなんだあの、圧倒的な星力の発露は！"
translation = "복장이나 무장은 물론이거니와── 도대체 뭐지, 저 압도적인 성력의 발로는!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「旅人さん──あなたは一体……」"
translation = "「떠돌이 여행자 씨── 당신은 대체……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なんで──どうして、あなたが……」"
translation = "「왜── 어째서, 당신이……」"

[[dialogue]]
speaker = "？？？"
original = "「何故って……おかしなことを聞くな。<b>教え子</b>を魔の手から守るのは、教育者として当然の振る舞いだろう？」"
translation = "「왜냐니…… 이상한 걸 묻는군. 제자를 마의 손아귀에서 지키는 것은, 교육자로서 당연한 행동이겠지?」"

[[dialogue]]
speaker_original = "狼型の魔獣"
speaker_translation = "늑대형 마수"
original = "『グルルルルルルァァッッ────！！』"
translation = "『그르르르르르르아앗────!!』"

[[dialogue]]
speaker = "unk"
original = "敵対する魔獣の軍勢へ、再び<ruby>雷<rt>いかずち</rt></ruby>のまとう蛇腹剣を振るう──"
translation = "적대하는 마수의 군세에게, 다시 번개를 두른 사복검을 휘두른다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「流星学園学園長──白夜院ラティエ。<ruby>焦眉<rt>しょうび</rt></ruby>の急につき、生徒保護の任を全うさせてもらう」"
translation = "「유성 학원 학원장── 하쿠야인 라티에. 초미의 급에 따라, 학생 보호의 임무를 완수하도록 하겠다.」"

[[dialogue]]
speaker = "unk"
original = "そして。"
translation = "그리고."

[[dialogue]]
speaker = "unk"
original = "はためくドレスの裏地に描かれていたのは──俺たちもよく知るシンボル、流星学園の校章だった。"
translation = "나부끼는 드레스 안감에 그려져 있던 것은── 우리도 잘 아는 상징, 유성 학원의 교장이었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「えっ──」"
translation = "「엣──」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「がっ──学園長！？」"
translation = "「하읏── 학원장!?」"

[[dialogue]]
speaker = "unk"
original = "驚愕に湧く──"
translation = "경악에 휩싸인다──"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、けたたましい轟雷が眼前の魔獣たちを一掃した。"
translation = "다음 순간, 요란한 천둥이 눈앞의 마수들을 일소했다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「唸れ、バラクィエル──塵と消えろ」"
translation = "「울부짖어라, 바라키엘── 먼지가 되어 사라져라.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──！？！？」"
translation = "「──!?!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「半端、ねぇ……っ……！」"
translation = "「장난, 아니네……!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふむ──半分くらいは片付いたか。この様子であれば、まだ巣にいくらか残っていような」"
translation = "「흠── 절반 정도는 처리되었군. 이 모습이라면, 아직 둥지에 조금 남아있겠지.」"

[[dialogue]]
speaker = "unk"
original = "押し寄せていた魔獣たちが……またたく間に消し炭となって吹雪に散る。"
translation = "밀려오던 마수들이…… 눈 깜짝할 사이에 숯덩이가 되어 눈보라에 흩날린다."

[[dialogue]]
speaker = "unk"
original = "誰もが呆気に取られているなか、フィオナだけが嘆息して歩み寄った。"
translation = "모두가 어안이 벙벙한 가운데, 피오나만이 탄식하며 다가섰다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぅ……お人が悪いですよ、学園長。せめて事前に伝えておいていただけないと」"
translation = "「휴우…… 심술궂으시네요, 학원장. 적어도 사전에 알려주셨어야죠.」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっ。今の私は根無し草だからな──旅人とは気まぐれなものさ」"
translation = "「핫핫. 지금의 나는 뿌리 없는 풀이니까── 떠돌이란 변덕스러운 법이지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、初めて見た──流星の学園長……」"
translation = "「하, 처음 봤어── 유성의 학원장……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……確か、ずっとどこかを放浪してたっていう……」"
translation = "「아아…… 확실히, 계속 어딘가를 방랑하고 있었다는…….」"

[[dialogue]]
speaker = "unk"
original = "白夜院ラティエ──さん。"
translation = "하쿠야인 라티에── 씨."

[[dialogue]]
speaker = "unk"
original = "流星の関係者さえ手を焼いていたという、放浪癖のある人だったか。"
translation = "유성 관계자조차 골머리를 앓았다는, 방랑벽이 있는 사람이었나."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もしかして……ヴィーナスちゃんのために魔界まで来てくれたとか？」"
translation = "「혹시…… 비너스짱을 위해서 마계까지 와 준 거야?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「いや？\u3000ただの偶然だ。前々からこの地の『冬』とやらに興味があってね」"
translation = "「아니? 단순한 우연이다. 이전부터 이 땅의 『겨울』이라는 것에 흥미가 있어서 말이야.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「がくっ」"
translation = "「털썩.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私も初めて会いました──じゃなくて！\u3000そうです。いつかは文句を言ってやろうと思ってたんです！」"
translation = "「저도 처음 만났습니다── 가 아니라! 맞아요. 언젠가는 불만을 토로해 주려고 생각했어요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あなたがいらっしゃらないせいで、普段のフィオナ会長の業務はてんてこまいなんですよ！」"
translation = "「당신이 안 계신 탓에, 평소 피오나 회장의 업무는 정신없이 돌아간다고요!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっは。そう怒るな奏ソフィア。私としても星見嬢には感謝しているさ」"
translation = "「핫핫하. 그렇게 화내지 마라 카나데 소피아. 나로서도 호시미 아가씨에게는 감사하고 있다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私は気にしていませんが……ソフィアの言うことも、一理ありますね」"
translation = "「저는 신경 쓰지 않지만…… 소피아의 말도, 일리가 있네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なので、その借りを返してもらう意味でも──この場は学園長に任せましょう」"
translation = "「그러니, 그 빚을 갚게 한다는 의미에서도── 이 자리는 학원장에게 맡기도록 합시다.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「へ、平気なのかニャ！？」"
translation = "「헤, 괜찮은 거냐냥!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その実力は──私が保証します。この規模の魔獣であっても……決して遅れを取ることはないでしょう」"
translation = "「그 실력은── 제가 보증합니다. 이 규모의 마수라 할지라도…… 결코 뒤처지는 일은 없을 겁니다.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「マジかよ……」"
translation = "「진짜냐……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こうして傍にいるだけでも──並々ならぬ実力なのはわかる。これ以上ない提案だ」"
translation = "「이렇게 곁에 있는 것만으로도── 보통이 아닌 실력이라는 건 알겠다. 더할 나위 없는 제안이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただ──学園長以外にも、街を守る役目は必要かもしれない」"
translation = "「다만── 학원장 외에도, 마을을 지킬 역할은 필요할지도 몰라.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……そうね。寒波からも逃げなきゃならないわけだし」"
translation = "「……그렇네. 한파에서도 도망쳐야 하는 거니까.」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふむ。なれば魔獣の掃討は私が行うとして……」"
translation = "「흠. 그렇다면 마수 소탕은 내가 맡는다고 치고……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「──楠葉嬢、奏妹。きみ達は残れ。レゾフの前線から住民を避難させつつ──凍結による被害から彼らを守るんだ」"
translation = "「──쿠스하 양, 카나데 동생. 너희들은 남아라. 레조프의 최전선에서 주민들을 피난시키면서── 동결로 인한 피해로부터 그들을 지키는 거다.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ＯＫ──流星の魂、見せてやるよ」"
translation = "「OK── 유성의 혼, 보여주겠어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「学園長……承知ですっ！」"
translation = "「학원장…… 알겠습니다!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「──会長さん。フィオナ。マトイにサーシャさん、アホ猫も。ヴィーナスを頼んだぜ……！」"
translation = "「──회장 씨. 피오나. 마토이에게 사샤 씨, 바보 고양이도. 비너스를 부탁한다……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私からも。絶対に、あの黒い鎧を倒して、新星のメンバーを取り返してください！」"
translation = "「저도 부탁드립니다. 절대로, 저 검은 갑옷을 쓰러뜨리고, 신성의 멤버를 되찾아 주세요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「２人とも……ああ。必ず戻る！」"
translation = "「두 사람 다…… 아아. 반드시 돌아올게!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「フフ──若人らしい良き心意気だ」"
translation = "「후후── 젊은이다운 좋은 마음가짐이다.」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「急げよ、星騎士たち。その気概なら──いかなる壁も打ち崩せよう」"
translation = "「서둘러라, 성기사들아. 그 기개라면── 어떤 벽이라도 부술 수 있을 것이다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「承知です──流星学園星徒会長星見フィオナ、参ります！」"
translation = "「알겠습니다── 유성 학원 성도 회장 호시미 피오나, 가겠습니다!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「全速前進ニャアン──！」"
translation = "「전속 전진이다냥──!」"

