[[dialogue]]
speaker = "unk"
original = "第５話,明星はより鮮烈に,B"
translation = "제5화, 샛별은 더욱 선렬하게, B"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの光が俺を呑み込もうとするその刹那──"
translation = "루비네의 빛이 나를 집어삼키려 하는 그 찰나──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「！\u3000この鎖は──」"
translation = "「! 이 사슬은──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やらせないわよ！\u3000クロトは私が守るんだから！」"
translation = "「하게 두지 않아! 쿠로토는 내가 지킬 거니까!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが伸ばした鎖がルヴィネを拘束する。"
translation = "비너스가 뻗은 사슬이 루비네를 구속한다."

[[dialogue]]
speaker = "unk"
original = "けれどルヴィネから放たれた光が、すぐさま鎖を砕いた。"
translation = "하지만 루비네에게서 뿜어져 나온 빛이 곧바로 사슬을 부쉈다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁ、はぁ……極星の会長だか、デネブの英雄だか知らないけど、好き勝手言ってくれちゃって……！」"
translation = "「하아, 하아…… 극성의 회장인지 데네브의 영웅인지 모르겠지만, 마음대로 지껄여주시기는……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私、あなた嫌い！\u3000あなたの話を聞いていると、なんだか無性に腹が立つわ！」"
translation = "「나, 당신 싫어! 당신 말을 듣고 있으면 왠지 모르게 화가 치밀어 오른다고!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……奇遇ね。私もあなたを好きになれそうにないわ」"
translation = "「……기묘하네. 나도 당신을 좋아하게 될 것 같지는 않아.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがマシンガンのように光条を連射する──が、ルヴィネのマントには焼け跡ひとつ付かない。"
translation = "비너스가 머신건처럼 광조를 연사한다── 하지만 루비네의 망토에는 그을음 하나 남지 않는다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネはマントをはためかせるだけでヴィーナスを薙ぎ払う。"
translation = "루비네는 망토를 휘두르는 것만으로 비너스를 쳐낸다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「くぅぅっ……！」"
translation = "「쿠우윽……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁ、はぁ……はぁっ……私の実力は、まだまだこんなもんじゃないんだから……！」"
translation = "「하아, 하아…… 하앗…… 내 실력은 아직 이 정도가 아니라고……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この……！」"
translation = "「이……!」"

[[dialogue]]
speaker = "unk"
original = "肩で息をしながら星術を放つヴィーナス。"
translation = "어깨로 숨을 몰아쉬며 성술을 쏘는 비너스."

[[dialogue]]
speaker = "unk"
original = "しかし何度撃とうと、ルヴィネは眉ひとつ動かすこともない。むしろ撃てば撃つほどヴィーナスだけが疲弊していく。"
translation = "하지만 몇 번을 쏴도 루비네는 눈썹 하나 까딱하지 않는다. 오히려 쏘면 쏠수록 비너스만이 지쳐갈 뿐이다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「無駄だってわからないの？」"
translation = "「무의미하다는 걸 모르겠어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふぅ……はぁ、はぁ……そんなのやってみなきゃわからないでしょ。１００発目が駄目でも１０１発目ならいけるかもしれないじゃない」"
translation = "「후우…… 하아, 하아…… 그런 건 해보지 않으면 모르잖아. 100발째가 안 돼도 101발째라면 될지도 모르지.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「今のままじゃ、一万発撃っても届かないと思うけど」"
translation = "「지금 이대로라면 만 발을 쏴도 닿지 않을 것 같은데.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういう問題じゃないでしょうが！\u3000やるって決めたら何回でもやるの！」"
translation = "「그런 문제가 아니잖아! 하기로 했으면 몇 번이라도 하는 거야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトは御前試合の時、何度だって立ち上がった。梨緒だって暴走したクロトを止めてくれた」"
translation = "「쿠로토는 어전시합 때 몇 번이고 다시 일어났어. 리오도 폭주한 쿠로토를 막아줬고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから今は私がやらないといけないの！」"
translation = "「그러니까 지금은 내가 해야만 한다고!」"

[[dialogue]]
speaker = "unk"
original = "俺も立ち上がってヴィーナスと共に戦わないと。"
translation = "나도 일어서서 비너스와 함께 싸워야 해."

[[dialogue]]
speaker = "unk"
original = "そう思っているのに体が動かない。"
translation = "그렇게 생각하고 있는데 몸이 움직이지 않는다."

[[dialogue]]
speaker = "unk"
original = "手どころか指の一本すら言うことを聞かず、ヴィーナスに手を伸ばすことすらできない。"
translation = "손은커녕 손가락 하나조차 말을 듣지 않아, 비너스에게 손을 뻗는 것조차 할 수 없다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィー……ナス……」"
translation = "「비……너스……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ひどい顔してるじゃない、クロト。ここは娘に任せて」"
translation = "「처참한 얼굴을 하고 있잖아, 쿠로토. 여기는 딸에게 맡겨줘.」"

[[dialogue]]
speaker = "クロト"
original = "「なんとか……逃げて……」"
translation = "「어떻게든…… 도망쳐……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ダメよ。ルヴィネは私たちを逃がすつもりなんかないわ」"
translation = "「안 돼. 루비네는 우리를 보내줄 생각이 전혀 없는걸.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ、その通りよ。ここで処断すると、そう言ったでしょう」"
translation = "「네, 맞아요. 여기서 처단하겠다고, 그렇게 말했었죠.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ひぁああぁっ！？」"
translation = "「히아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの光の矢がヴィーナスを射貫く。"
translation = "루비네의 빛의 화살이 비너스를 꿰뚫는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「く……うぅ……」"
translation = "「크…… 으윽……」"

[[dialogue]]
speaker = "unk"
original = "俺と同じように苦悶を漏らしながら地に伏すヴィーナス。"
translation = "나와 마찬가지로 고통 섞인 신음을 흘리며 땅에 엎드리는 비너스."

[[dialogue]]
speaker = "unk"
original = "だが拳を握り、力を振り絞ってまた立ち上がる。"
translation = "하지만 주먹을 쥐고, 힘을 쥐어짜 내어 다시 일어선다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁ……はぁ……まだ負けてないわよ……！」"
translation = "「하아…… 하아…… 아직 지지 않았어……!」"

[[dialogue]]
speaker = "unk"
original = "何度も地面に叩きつけられ、その顔は汗と血でボロボロになっていた。"
translation = "몇 번이나 지면에 내동댕이쳐져, 그 얼굴은 땀과 피로 엉망이 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "髪も砂と塵で汚れ、天衣無縫なヴィーナスには似つかわしくない。"
translation = "머리카락도 모래와 먼지로 더러워져, 천의무봉한 비너스에게는 어울리지 않는다."

[[dialogue]]
speaker = "unk"
original = "それでも。"
translation = "그럼에도."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は……！\u3000あなたに勝ってクロトを守る……！\u3000そう決めたんだから！」"
translation = "「나는……! 당신에게 이겨서 쿠로토를 지킬 거야……! 그렇게 결정했으니까!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの瞳は輝きを失わず、俺たちを睥睨するルヴィネをにらんでいた。"
translation = "비너스의 눈동자는 광채를 잃지 않고, 우리를 비웃듯 내려다보는 루비네를 노려보고 있었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「戦いの勝敗はあなたが決めることではないと思うのだけど」"
translation = "「전투의 승패는 당신이 결정하는 게 아니라고 생각하는데요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「知っちゃこっちゃないわ！\u3000私が勝つって言ったら勝つの！」"
translation = "「알 바 아니야! 내가 이긴다고 하면 이기는 거야!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「傲慢ね。神にでもなったつもりかしら」"
translation = "「오만하네요. 신이라도 된 줄 아는 걸까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それはこっちのセリフよ。あなたより偉そうなやつ、他で見たことないわ！」"
translation = "「그건 내가 할 소리야. 당신보다 잘난 척하는 녀석, 다른 데서 본 적 없다고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ディバイン……スフィアッ！！」"
translation = "「디바인…… 스피어!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「懲りないわね……」"
translation = "「포기를 모르네요……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとルヴィネが放った光が正面からぶつかり合う。"
translation = "비너스와 루비네가 내뿜은 빛이 정면에서 충돌한다."

[[dialogue]]
speaker = "unk"
original = "だがヴィーナスの星術はあっさりと呑み込まれ──"
translation = "하지만 비너스의 성술은 허무하게 집어삼켜지고──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「きゃああああっ！？」"
translation = "「꺄아아아악!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが悲鳴とともに吹き飛ばされた。"
translation = "비너스가 비명과 함께 날려갔다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ……ぐっ……うぅ……っ」"
translation = "「앗…… 윽…… 으으……윽」"

[[dialogue]]
speaker = "unk"
original = "自身の血にまみれ、ひび割れた地面の上でのたうつヴィーナス。"
translation = "자신의 피에 젖어, 갈라진 지면 위에서 고통스러워하는 비너스."

[[dialogue]]
speaker = "ルヴィネ"
original = "「もう体が動かないでしょう？\u3000これ以上あがくのは見苦しいわ」"
translation = "「이제 몸이 움직이지 않죠? 더 이상 발버둥 치는 건 보기 흉해요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あなたたちは頑張った。それは認めてあげる。だからもう楽になりなさい」"
translation = "「당신들은 노력했어요. 그건 인정해 줄게요. 그러니까 이제 편해지세요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いや……よ」"
translation = "「싫……어.」"

[[dialogue]]
speaker = "unk"
original = "また立ち上がる。"
translation = "다시 일어선다."

[[dialogue]]
speaker = "unk"
original = "俺だって痛々しいヴィーナスの姿なんて見たくない。"
translation = "나조차도 애처로운 비너스의 모습 따위 보고 싶지 않다."

[[dialogue]]
speaker = "unk"
original = "だけどヴィーナスの背中は『止めるな』と言っているようで……"
translation = "하지만 비너스의 뒷모습은 『막지 마』라고 말하는 것 같아서……"

[[dialogue]]
speaker = "ルヴィネ"
original = "「はぁ……もうやめなさいと言っているのに」"
translation = "「하아…… 이제 그만두라고 말했는데.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「九浄ヴィーナス。デネブの魔王の娘。アルタイルの魔王を覚醒させるため、平行世界へと渡った」"
translation = "「쿠죠 비너스. 데네브의 마왕의 딸. 알타이르의 마왕을 각성시키기 위해 평행세계로 건너왔지.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「魔王が覚醒した時点で、あなたの役目は終わった。あなたはもう用済みなの」"
translation = "「마왕이 각성한 시점에서, 당신의 역할은 끝났어. 당신은 이제 볼일 다 본 몸이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……そうね。日誌に縋っていた頃の私ならそうだったかもしれない。それが私の運命だと思っていたから」"
translation = "「……그렇네. 일지에 매달려 있던 시절의 나라면 그랬을지도 몰라. 그것이 내 운명이라고 생각했으니까.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネを見据えるヴィーナスの表情が引き締まる。"
translation = "루비네를 직시하는 비너스의 표정이 다부져진다."

[[dialogue]]
speaker = "unk"
original = "思いつきで突進したり、無茶を言ったりする時とは違う、成長した凛々しい横顔。"
translation = "생각나는 대로 돌진하거나, 억지를 부릴 때와는 다른, 성장한 늠름한 옆얼굴."

[[dialogue]]
speaker = "unk"
original = "『成長した』なんて思うのは、平行世界の娘とはいえ、俺が父親だからだろうか。"
translation = "『성장했다』고 생각하는 건, 평행세계의 딸이라곤 해도, 내가 아버지이기 때문일까."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたのことは気に入らないけど……１つだけ感謝するわ。どうして無性に腹が立つか、ちょっとわかった気がするから」"
translation = "「당신은 마음에 안 들지만…… 한 가지만은 감사할게. 왜 이렇게 무작정 화가 나는지, 조금 알 것 같은 기분이 드니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「確かに私の目的は、クロトを魔王として目覚めさせることだった。それが私の使命だった」"
translation = "「확실히 내 목적은, 쿠로토를 마왕으로서 눈뜨게 하는 것이었어. 그것이 내 사명이었지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そしてクロトは魔王に覚醒して……使命は果たされた」"
translation = "「그리고 쿠로토는 마왕으로 각성했고…… 사명은 완수되었어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもそれは終わりじゃない。始まりなの」"
translation = "「하지만 그건 끝이 아니야. 시작이라고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「未来が記された日誌はもうない。私の人生はまだ白紙」"
translation = "「미래가 적힌 일지는 이제 없어. 내 인생은 아직 백지야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「白紙のページに書き込んでいくのは私自身。私の未来は私が決める。私の人生は私が生きる」"
translation = "「백지 페이지에 써넣는 것은 나 자신. 내 미래는 내가 결정해. 내 인생은 내가 살아.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから私の邪魔をするやつは宇宙の彼方までぶっ飛ばしてやるわ」"
translation = "「그러니까 내 방해를 하는 녀석은 우주 저편까지 날려버려 주겠어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そしてその邪魔があなたよ──ルヴィネ」"
translation = "「그리고 그 방해꾼이 바로 당신이야── 루비네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「リクリエだろうと、そうでなかろうと、邪魔はさせないんだから！」"
translation = "「리크리에든, 아니든, 방해하게 두지 않을 거니까!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「自分で決める……ね。その結果、命を落とすことになりそうなんだけど？」"
translation = "「스스로 결정한다……라. 그 결과, 목숨을 잃게 될 것 같은데요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それがどうしたっていうのよ！」"
translation = "「그게 어쨌다는 거야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「危ないことも、苦しいことも、自分で選んで、進んで、乗り越える……！\u3000私は自分の気持ちを貫き通すわ！」"
translation = "「위험한 일도, 괴로운 일도, 스스로 선택하고, 나아가고, 극복하겠어……! 나는 내 마음을 관철할 거야!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「はぁ……愚かね」"
translation = "「하아…… 어리석군요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ではあなたの言う『自分の意志』ごと消し飛ばしてあげましょう。苦しまないように一瞬で」"
translation = "「그럼 당신이 말하는 『자신의 의지』째로 날려버려 드리죠. 고통스럽지 않게 찰나의 순간에.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「今度こそ消えなさい」"
translation = "「이번에야말로 사라지세요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「シャイニングゴッデスビームッ！！！」"
translation = "「샤이닝 가디스 빔!!!」"

[[dialogue]]
speaker = "unk"
original = "光と光が再び激突する。"
translation = "빛과 빛이 다시 격돌한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あああーーーっ！！！！」"
translation = "「아아아아──!!!!」"

[[dialogue]]
speaker = "unk"
original = "一瞬の拮抗。"
translation = "찰나의 길항."

[[dialogue]]
speaker = "unk"
original = "閃光と閃光のぶつかり合いが衝撃を生み、ヴィーナスの星術がゆっくりと押し返す。"
translation = "섬광과 섬광의 충돌이 충격을 낳고, 비너스의 성술이 천천히 밀어낸다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの光がビームをかき消し、光の奔流がヴィーナスを呑み込んだ。"
translation = "루비네의 빛이 빔을 지워버리고, 빛의 분류가 비너스를 집어삼켰다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは悲鳴を上げることすらできずに倒れ、そのまま動かない。"
translation = "비너스는 비명조차 지르지 못한 채 쓰러져, 그대로 움직이지 않는다."

[[dialogue]]
speaker = "unk"
original = "指ひとつピクリとも動かず、まるで壊れた人形のようだ。"
translation = "손가락 하나 움찔하지 않아, 마치 부서진 인형 같다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィー……ナス……」"
translation = "「비……너스……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「体は残ったのね。本当に丈夫なんだから」"
translation = "「형체는 남았네. 정말 튼튼하다니까.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でももう終わり──」"
translation = "「하지만 이제 끝──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……ま」"
translation = "「……기.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まだ……負けて……ない……」"
translation = "「아직…… 지지…… 않았어……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は、私の道を往く……！」"
translation = "「나는, 나의 길을 가겠어……!」"

[[dialogue]]
speaker = "unk"
original = "もう声を絞り出すことすら苦しそうで、息も絶え絶えだ。"
translation = "이제 목소리를 쥐어짜는 것조차 고통스러워 보이고, 숨이 가쁘다."

[[dialogue]]
speaker = "unk"
original = "それでもロッドを支えにして、満身創痍の体でゆっくりと立ち上がる。"
translation = "그럼에도 로드를 지팡이 삼아, 만신창이인 몸으로 천천히 일어선다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「出力を上げるわ。街を傷つけてしまうから抑えていたけど、あなたたちを消し飛ばすには必要みたい」"
translation = "「출력을 높이겠어요. 거리를 손상시키지 않으려고 억제하고 있었지만, 당신들을 날려버리려면 필요할 것 같네요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「できるだけそこから動かないで。２人仲良くこの世界から消滅させてあげる」"
translation = "「가급적 거기서 움직이지 말아줘요. 두 사람 사이좋게 이 세계에서 소멸시켜 드릴게요.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが手をかざし、頭上に光が収束していく。"
translation = "루비네가 손을 치켜들자, 머리 위로 빛이 수렴되어 간다."

[[dialogue]]
speaker = "unk"
original = "このままでは俺もヴィーナスも死ぬ。"
translation = "이대로라면 나도 비너스도 죽는다."

[[dialogue]]
speaker = "unk"
original = "それでもヴィーナスは一歩も退くことなく──"
translation = "그럼에도 비너스는 한 걸음도 물러서지 않고──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト、アルケインコードを私に……！」"
translation = "「쿠로토, 아르케인 코드를 나에게……!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスにアルケインコードを使うことは今まで何度も試してきた。だけど一度たりとも成功したことはなかった。"
translation = "비너스에게 아르케인 코드를 사용하는 것은 지금까지 몇 번이나 시도해 왔다. 하지만 단 한 번도 성공한 적이 없었다."

[[dialogue]]
speaker = "unk"
original = "きっとヴィーナスにはアルケインコードを使えない理由がある。確証はないが、そう直感していた。"
translation = "분명 비너스에게는 아르케인 코드를 사용할 수 없는 이유가 있다. 확증은 없지만, 그렇게 직감하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「無茶だ……！」"
translation = "「무모해……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「無茶がなんだっていうのよ！\u3000無茶を通してこそ魔王の娘、新星星徒会のフィクサーなんだから！」"
translation = "「무모한 게 뭐 어쨌다는 거야! 무모함을 관철해야 마왕의 딸, 신성 성도회의 픽서인 법이니까!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「不可能かどうかは私が決める！\u3000お行儀よく諦めたりなんかしないわ！」"
translation = "「불가능할지 어떨지는 내가 정해! 얌전하게 포기하거나 하지 않을 거야!」"

[[dialogue]]
speaker = "？？？"
original = "（大きくなったわね、ヴィーナス……）"
translation = "（많이 컸구나, 비너스……）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──！\u3000この声は……」"
translation = "「──! 이 목소리는……」"

[[dialogue]]
speaker = "？？？"
original = "「この子は私の子どもだから、体の一部が霊力でできている」"
translation = "「이 아이는 내 아이니까, 몸의 일부가 영력으로 되어 있어.」"

[[dialogue]]
speaker = "？？？"
original = "「もし力を使い過ぎれば、霊力が枯渇し、この子自身が消滅してしまうわ」"
translation = "「만약 힘을 너무 많이 쓰면 영력이 고갈되어, 이 아이 자체가 소멸하고 말 거야.」"

[[dialogue]]
speaker = "？？？"
original = "「私とあなたの子だから、この子はきっと世界のために力を使おうとするでしょう。そのために力を使い果たして消えてしまうかもしれない」"
translation = "「나와 당신의 아이니까, 이 아이는 분명 세계를 위해 힘을 쓰려고 하겠지. 그러기 위해 힘을 다 써버리고 사라져 버릴지도 몰라.」"

[[dialogue]]
speaker = "？？？"
original = "「だけどこの子には自分のために生きてほしい。厳しい時代だとわかっているけど、それでも自分の幸せを忘れないでほしい」"
translation = "「하지만 이 아이에게는 자신을 위해 살았으면 좋겠어. 험난한 시대라는 건 알지만, 그래도 자신의 행복을 잊지 않았으면 좋겠어.」"

[[dialogue]]
speaker = "？？？"
original = "「だから力に制限をかけようと思うの。この子が自分の力に呑まれて消えてしまわないように」"
translation = "「그래서 힘에 제한을 걸려고 해. 이 아이가 자신의 힘에 집어삼켜져 사라지지 않도록.」"

[[dialogue]]
speaker = "？？？"
original = "「でももし、自分の存在を賭してでも、自分の道を切り開きたいと願うなら……」"
translation = "「하지만 만약, 자신의 존재를 걸어서라도, 자신의 길을 개척하고 싶어 한다면……」"

[[dialogue]]
speaker = "？？？"
original = "「私の願いを超えて、自分の足でその先へ行くのなら……」"
translation = "「내 염원을 넘어서, 자신의 발로 그 너머로 가려고 한다면……」"

[[dialogue]]
speaker = "？？？"
original = "「私は親として、娘の旅立ちを祝福するわ」"
translation = "「나는 부모로서, 딸의 여정을 축복하겠어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス……？」"
translation = "「비너스……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今、ママの記憶が流れ込んできたの。やっぱりママは私のことを考えてくれてたのね」"
translation = "「지금, 엄마의 기억이 흘러들어왔어. 역시 엄마는 나를 생각해주고 있었구나.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今ならいけるわ。だから来て、パパ──！」"
translation = "「지금이라면 할 수 있어. 그러니까 와줘, 아빠──!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ！\u3000俺にも見えた──！」"
translation = "「아아! 나에게도 보여──!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの中に見えた。煌々と輝く、新たな星の光が。"
translation = "비너스의 안에서 보였다. 휘황찬란하게 빛나는, 새로운 별의 빛이."

[[dialogue]]
speaker = "unk"
original = "その光に向かって手を伸ばす。"
translation = "그 빛을 향해 손을 뻗는다."

[[dialogue]]
speaker = "unk"
original = "屍のような体を無理やり動かし、地を這い、ただ届けと願って名前を呼ぶ。"
translation = "시체 같은 몸을 억지로 움직여, 땅을 기며, 그저 닿기를 바라며 이름을 부른다."

[[dialogue]]
speaker = "unk"
original = "俺の娘であり、頼もしい仲間である彼女の名を──！"
translation = "내 딸이자, 든든한 동료인 그녀의 이름을──!"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス──！」"
translation = "「비너스──!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うん、クロト！」"
translation = "「응, 쿠로토!」"

[[dialogue]]
speaker = "クロト"
original = "「アルケインノヴァエクストリーム！！」"
translation = "「아르케인 노바 익스트림!!」"

[[dialogue]]
speaker = "unk"
original = "そして目映い光に包まれて──"
translation = "그리고 눈부신 빛에 휩싸여──"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ついに顕現する、ヴィーナスの新たな姿。"
translation = "드디어 현현하는, 비너스의 새로운 모습."

[[dialogue]]
speaker = "unk"
original = "新星の名を冠するその光は、より眩しく、より鮮烈に輝く。"
translation = "신성(노바)의 이름을 관하는 그 빛은, 더욱 눈부시고, 더욱 선명하게 빛난다."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「行ってくるわね、ママ」"
translation = "「다녀올게, 엄마.」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「スーパーフィクサー・ヴィーナス、ノヴァフォームに変身よ！\u3000ルヴィネ、もうあなたの好きにはさせないわ！」"
translation = "「슈퍼 픽서 비너스, 노바 폼으로 변신이야! 루비네, 이제 당신 마음대로 하게 두지 않겠어!」"

