[[dialogue]]
speaker = "unk"
original = "星霊祭が近づきつつあったある日、俺はマムから言われていたことがあった――"
translation = "성령제가 다가오고 있던 어느 날, 나는 마무에게 들은 이야기가 있었다――"

[[dialogue]]
speaker = "マハムート"
original = "「会長、来たる星霊祭に向けて、『アルケインコード』の扱いについて伝えておきたいことがあるわ」"
translation = "「회장, 다가오는 성령제를 향해, 『아르카나 코드』의 취급에 대해 전하고 싶은 것이 있어」"

[[dialogue]]
speaker = "マハムート"
original = "「星霊祭では、総合優勝した学園側に『学園対抗杯』の大きなポイントが与えられる」"
translation = "「성령제에서는, 종합 우승한 학원 측에 『학원 대항배』의 큰 포인트가 주어진다」"

[[dialogue]]
speaker = "unk"
original = "学園対抗杯とは、両学園の星騎士たちを切磋琢磨させる為、モンスターの撃破数などをポイントとして視覚化し、競争を推奨する制度である。"
translation = "학원 대항배란, 양 학원의 성기사들을 서로 경쟁시켜 발전시키기 위해, 몬스터의 격파 수 등을 포인트로 시각화하여, 경쟁을 권장하는 제도이다."

[[dialogue]]
speaker = "マハムート"
original = "「そして、星霊祭で行われる競技の中で、特に大きな配点種目の１つとなっているのが、個人戦となる星霊舞闘会」"
translation = "「그리고, 성령제에서 행해지는 경기 중에서, 특히 큰 배점 종목의 하나가 되고 있는 것이, 개인전이 되는 성령무투회」"

[[dialogue]]
speaker = "マハムート"
original = "「舞闘会で優勝した生徒の所属する学園側には、星霊祭での大きなポイントが与えられる」"
translation = "「무투회에서 우승한 학생이 소속된 학원 측에는, 성령제에서의 큰 포인트가 주어진다」"

[[dialogue]]
speaker = "マハムート"
original = "「つまりは、会長……あなたが持つ、星騎士を覚醒させることができる魔王の技――アルケインコードは、新星学園側の大きなアドバンテージになる力よ」"
translation = "「즉, 회장…… 당신이 가진, 성기사를 각성시킬 수 있는 마왕의 기술―― 아르카나 코드는, 신성 학원 측의 큰 이점이 되는 힘이야」"

[[dialogue]]
speaker = "マハムート"
original = "「だけど……私は、それは公平ではないと思っている」"
translation = "「하지만…… 나는, 그것은 공평하지 않다고 생각하고 있어」"

[[dialogue]]
speaker = "マハムート"
original = "「学園対抗杯も、星霊祭も、舞闘会も、両学園で競い合うことで切磋琢磨して、共に強くなる為にある。だというのに――」"
translation = "「학원 대항배도, 성령제도, 무투회도, 양 학원에서 서로 경쟁함으로써 발전하고, 함께 강해지기 위해 존재한다. 그런데도――」"

[[dialogue]]
speaker = "マハムート"
original = "「会長が新星学園側だからという理由で、流星学園の子たちの可能性を押さえつけてしまうのでは、競い合っている意味がない」"
translation = "「회장이 신성 학원 측이라는 이유로, 유성 학원의 아이들의 가능성을 억누르게 된다면, 서로 경쟁하고 있는 의미가 없어」"

[[dialogue]]
speaker = "マハムート"
original = "「両学園の生徒たちには私が責任を持って、説明するわ。だから、会長――」"
translation = "「양 학원의 학생들에게는 내가 책임지고, 설명할게. 그러니까, 회장――」"

[[dialogue]]
speaker = "マハムート"
original = "「公平を期す為に、星霊祭までにもし覚醒できる子がいれば、どちらの学園でも関係なく使ってあげなさい」"
translation = "「공평을 기하기 위해, 성령제까지 만약 각성할 수 있는 아이가 있다면, 어느 학원이든 관계없이 사용해 주렴」"

[[dialogue]]
speaker = "マハムート"
original = "「それが、新星寮の寮長としてではなく……学園の先輩星騎士としての、私の望みよ」"
translation = "「그것이, 신성 기숙사의 사감으로서가 아니라…… 학원의 선배 성기사로서의, 나의 바람이야」"

[[dialogue]]
speaker = "unk"
original = "その翌日、マムから説明を受けたと言って、ヒルディオーネ先輩とフニが俺のところへやって来た。"
translation = "그 다음 날, 마무에게 설명을 들었다고 말하며, 힐디 오네 선배와 후니가 내게로 찾아왔다."

[[dialogue]]
speaker = "フェニエル"
original = "「会長さん、お願いします。私――星霊舞闘会までに、ノヴァフォームに覚醒したいんです！」"
translation = "「회장군, 부탁드립니다. 저―― 성령무투회까지, 노바 폼에 각성하고 싶어요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私からもお願い致しますわ。会長、どうか私たちに力をお貸し下さいませ」"
translation = "「저도 부탁드립니다요. 회장, 부디 저희에게 힘을 빌려주세요」"

[[dialogue]]
speaker = "unk"
original = "こうして、真剣な顔で頭を深く下げる２人に、俺は協力することを決めたのだった――"
translation = "이렇게, 진지한 얼굴로 고개를 깊이 숙이는 두 사람에게, 나는 협력하기로 결정한 것이었다――"

[[dialogue]]
speaker = "unk"
original = "北海道での週末合宿は、あっという間に３日目を迎えていた。"
translation = "홋카이도에서의 주말 합숙은, 눈 깜짝할 사이에 셋째 날을 맞이하고 있었다."

[[dialogue]]
speaker = "unk"
original = "明日からは平日となる為、今日の夜には流星市国へと帰らなくはならない。だが――"
translation = "내일부터는 평일이 되기 때문에, 오늘 밤에는 유성 시국으로 돌아가야만 한다. 하지만――"

[[dialogue]]
speaker = "フェニエル"
original = "「はぁっ……はぁっ……！」"
translation = "「하아앗…… 하아앗……!」"

[[dialogue]]
speaker = "unk"
original = "フ二は未だ、覚醒の兆しを得られていなかった。何度も攻撃を受けて、戦闘服はボロボロになり、息も絶え絶えで足がふらついている。"
translation = "후니는 아직, 각성의 조짐을 얻지 못하고 있었다. 몇 번이나 공격을 받고, 전투복은 너덜너덜해지고, 숨이 끊어질 듯 발이 휘청거리고 있다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……会長、フニに覚醒の輝きは見えまして？」"
translation = "「……회장, 후니에게 각성의 빛이 보였습니까요?」"

[[dialogue]]
speaker = "unk"
original = "……いや、ダメです"
translation = "……아니, 안 된다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そう……そろそろ日も暮れて来ましたし、潮時ですわね……」"
translation = "「그렇군요…… 슬슬 해도 저물어 왔고, 때가 된 것 같습니다요……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フニ。残念ですが、合宿はここまでに――」"
translation = "「후니. 유감이지만, 합숙은 여기까지――」"

[[dialogue]]
speaker = "フェニエル"
original = "「まだ……です。ここで諦めるわけにはいきません……！」"
translation = "「아직……이에요. 여기서 포기할 수는 없어요……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フニ……？」"
translation = "「후니……?」"

[[dialogue]]
speaker = "フェニエル"
original = "「私……以前のバトルフェスタ・ペンタグラムの時に、会長さんと舞闘会で戦いたいって言いました。でも、それが叶わないとわかって、正直ガッカリしちゃってました……」"
translation = "「저…… 이전 배틀 페스타 펜타그램 때, 회장군과 무투회에서 싸우고 싶다고 말했어요. 하지만, 그것이 이루어지지 않는다는 것을 알고, 솔직히 실망해 버렸었어요……」"

[[dialogue]]
speaker = "unk"
original = "そう、俺は今回の星霊舞闘会に参加することはできない。"
translation = "그래, 나는 이번 성령무투회에 참가할 수는 없다."

[[dialogue]]
speaker = "unk"
original = "それは、トーナメントを盛り上げる為に設けられたルールで『両学園の星徒会は舞闘会には参加できない』と取り決められている為だった。"
translation = "그것은, 토너먼트를 고조시키기 위해 마련된 규칙으로 『양 학원의 성도회는 무투회에 참가할 수 없다』고 정해져 있기 때문이었다."

[[dialogue]]
speaker = "フェニエル"
original = "「だから……星霊舞闘会に出るのは、正直そこまで乗り気ではなかったんです。でも、最近になって、それとは別の強くなりたいと思う理由ができて……」"
translation = "「그래서…… 성령무투회에 나가는 것은, 솔직히 그렇게까지 내키지 않았어요. 하지만, 최근 들어, 그것과는 별개의 강해지고 싶다고 생각하는 이유가 생겨서……」"

[[dialogue]]
speaker = "フェニエル"
original = "「私――ヒルディーお姉様には、ご自身の望むまま、舞闘会に臨んで欲しいんです……！」"
translation = "「저―― 힐디 언니에게는, 언니 자신이 원하는 대로, 무투회에 임해 주셨으면 해요……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "フェニエル"
original = "「お姉様……最近ずっと悩んでいらっしゃいますよね？」"
translation = "「언니…… 최근 계속 고민하고 계시죠?」"

[[dialogue]]
speaker = "フェニエル"
original = "「アルケインコードを使って覚醒するか、それとも……自力で覚醒できるようになるまで鍛錬し続けるか」"
translation = "「아르카나 코드를 사용해서 각성할지, 아니면…… 자력으로 각성할 수 있게 될 때까지 계속 단련할지」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……！\u3000フニ、あなた、気づいていましたの……？」"
translation = "「……! 후니, 당신, 눈치채고 있었습니까요……?」"

[[dialogue]]
speaker = "フェニエル"
original = "「はい。――お姉様は、本当はもう、アルケインコードを使いさえすれば覚醒することができる。会長さん……そうですよね？」"
translation = "「네. ――언니는, 사실은 이미, 아르카나 코드를 사용하기만 하면 각성할 수 있어요. 회장군…… 그렇죠?」"

[[dialogue]]
speaker = "unk"
original = "……ああ、その通りだ"
translation = "……아아, 그 말대로다."

[[dialogue]]
speaker = "unk"
original = "アルケインコードで覚醒できる条件――心に灯る眩い星のような輝きが、ヒルディオーネ先輩の中にはずっと見えていた。本当は、この合宿を始めるよりも以前から。"
translation = "아르카나 코드로 각성할 수 있는 조건―― 마음에 켜지는 눈부신 별과 같은 빛이, 힐디 오네 선배 안에는 계속 보이고 있었다. 사실은, 이 합숙을 시작하기보다 이전부터."

[[dialogue]]
speaker = "unk"
original = "もちろん、そのことは先輩に伝えてある。しかし……彼女からは、それを知った上で「考えさせて欲しい」と言われていた。"
translation = "물론, 그 사실은 선배에게 전해 두었다. 하지만…… 그녀에게서는, 그것을 알고서도 「생각하게 해 달라」는 말을 들었었다."

[[dialogue]]
speaker = "フェニエル"
original = "「お姉様は、本当は……１人の星騎士として、自力で覚醒を果たして、マムに挑みたいと思っているのではありませんか？」"
translation = "「언니는, 사실은…… 한 명의 성기사로서, 자력으로 각성을 이루어서, 마무에게 도전하고 싶다고 생각하고 있는 것이 아닙니까?」"

[[dialogue]]
speaker = "フェニエル"
original = "「でも、どうするべきか悩んでしまっているのは……お姉様には『流星寮の寮長』という立場があるから」"
translation = "「하지만, 어떻게 해야 할지 고민하고 계신 것은…… 언니에게는 『유성 기숙사의 사감』이라는 입장이 있기 때문」"

[[dialogue]]
speaker = "フェニエル"
original = "「最近、新星学園には会長さんのアルケインコードで覚醒した人たちが、多く現れるようになりました」"
translation = "「최근, 신성 학원에는 회장군의 아르카나 코드로 각성한 사람들이, 많이 나타나게 되었어요」"

[[dialogue]]
speaker = "フェニエル"
original = "「それによって機械型モンスターの撃破数が増えて……今の学園対抗杯は、新星学園側に逆転されている状況です」"
translation = "「그것에 의해 기계형 몬스터의 격파 수가 늘어나서…… 지금의 학원 대항배는, 신성 학원 측에 역전당하고 있는 상황이에요」"

[[dialogue]]
speaker = "フェニエル"
original = "「そして、そのポイント差は日に日に開いていっている……。だからこそ、お姉様は悩んでいらっしゃるんですよね？」"
translation = "「그리고, 그 포인트 차이는 나날이 벌어지고 있다……. 그러하기에, 언니는 고민하고 계신 거죠?」"

[[dialogue]]
speaker = "フェニエル"
original = "「舞闘会や星霊祭、ひいては学園対抗杯で勝つ為に、自力で覚醒することは諦めて、アルケインコードに頼るかどうかを」"
translation = "「무투회나 성령제, 나아가 학원 대항배에서 이기기 위해, 자력으로 각성하는 것은 포기하고, 아르카나 코드에 의지할지 말지를」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……確実に覚醒することができるなら、流星寮の寮長として、使わないという選択肢はありませんわ」"
translation = "「……확실히 각성할 수 있다면, 유성 기숙사의 사감으로서, 사용하지 않는다는 선택지는 없습니다요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「なんとなく、自力で何かが掴めそうな予感があったとしても……それは、私個人のみっともないワガママですもの」"
translation = "「왠지 모르게, 자력으로 무언가를 잡을 수 있을 것 같은 예감이 있었다고 해도…… 그것은, 저 개인의 볼품없는 제멋대로임입니다요」"

[[dialogue]]
speaker = "フェニエル"
original = "「だから、私は今、ノヴァフォームに覚醒したいんです……！」"
translation = "「그러니까, 저는 지금, 노바 폼에 각성하고 싶어요……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「お姉様がたとえギリギリまで覚醒できなかったとしても、私が代わりにノヴァフォームになれれば、お姉様の不安を肩代わりすることができるから！」"
translation = "「언니가 설령 아슬아슬할 때까지 각성하지 못한다고 해도, 제가 대신 노바 폼이 될 수 있다면, 언니의 불안을 대신할 수 있으니까!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……！\u3000フニ、私の為にそこまで……」"
translation = "「……! 후니, 나를 위해서 그렇게까지……」"

[[dialogue]]
speaker = "フェニエル"
original = "「だからどうか、お姉様はご自身の信じる道を、そのまま進み続けて下さい！」"
translation = "「그러니 부디, 언니는 자신이 믿는 길을, 그대로 계속 나아가 주세요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「ノヴァフォームになるという責務は――私が代わりに請け負ってみせますっ！！」"
translation = "「노바 폼이 된다는 책무는―― 제가 대신 맡아 보이겠습니다!!」"

[[dialogue]]
speaker = "unk"
original = "フ二が力強く宣言した瞬間、俺には見えた。"
translation = "후니가 힘차게 선언한 순간, 나에게는 보였다."

[[dialogue]]
speaker = "unk"
original = "彼女の心に灯る、眩い星の輝きが。だから――"
translation = "그녀의 마음에 켜지는, 눈부신 별의 빛이. 그래서――"

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァエクストリーム！"
translation = "아르카나 노바 익스트림!"

[[dialogue]]
speaker = "unk"
original = "俺はフニの決意に応えて、アルケインコードを発動する。"
translation = "나는 후니의 결의에 응하여, 아르카나 코드를 발동한다."

[[dialogue]]
speaker = "フェニエル"
original = "「――会長さんと心が繋がって、なまらすごい力が湧いて来ます。これが……」"
translation = "「――회장군과 마음이 연결되어서, 나마라 대단한 힘이 솟아납니다. 이것이……」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「ノヴァフォームへの覚醒……！」"
translation = "「노바 폼으로의 각성……!」"

[[dialogue]]
speaker = "ホウちゃん"
original = "「――あなたの強い想い、私にも届きましたよ。フニ」"
translation = "「――당신의 강한 마음, 나에게도 전해졌어요. 후니」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「え？\u3000もしかして……ホウちゃん！？」"
translation = "「에? 혹시…… 호우짱!?」"

[[dialogue]]
speaker = "unk"
original = "フ二の横には、小さな不死鳥の姿があった。"
translation = "후니의 옆에는, 작은 불사조의 모습이 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女の中に宿っている魔獣『フェニックス』こと『ホウちゃん』は、微笑みを浮かべながら頷く。"
translation = "그녀 안에 깃들어 있는 마수 『피닉스』, 즉 『호우짱』은, 미소를 띠며 고개를 끄덕인다."

[[dialogue]]
speaker = "ホウちゃん"
original = "「これからは私も共に戦います。だから、フニ――ヒルディオーネさんへ、あなたの想いの力を見せてあげましょう！」"
translation = "「이제부터는 저도 함께 싸우겠습니다. 그러니, 후니―― 힐디 오네 씨에게, 당신의 마음의 힘을 보여줍시다!」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「うんっ……！」"
translation = "「응……!」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
original = "「お姉様――私のノヴァフォーム、見ていて下さいっ！」"
translation = "「언니―― 저의 노바 폼, 지켜봐 주세요!」"

[[dialogue]]
speaker = "unk"
original = "そうして覚醒を果たしたフニは、もう１度、ヒルディオーネ先輩へと戦いを挑むのだった――"
translation = "그렇게 각성을 이룬 후니는, 다시 한 번, 힐디 오네 선배에게 싸움을 거는 것이었다――"

