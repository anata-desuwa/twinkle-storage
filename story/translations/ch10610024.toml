[[dialogue]]
speaker = "unk"
original = "第４話,未知、もしくは忘却の果ての感情,P"
translation = "제4화, 미지, 혹은 망각의 끝에 있는 감정"

[[dialogue]]
speaker = "マリオン"
original = "「会長様とデート♪\u3000デート♪\u3000ふふふ♪」"
translation = "「회장님과 데이트♪ 데이트♪ 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "押しの強いマリオンに誘われ、今日一日、浅草を観光案内することになった。"
translation = "밀어붙이는 마리온에게 이끌려, 오늘 하루 아사쿠사 관광 안내를 맡게 되었다."

[[dialogue]]
speaker = "マリオン"
original = "「肩を寄せ合い、腕を組み、手を繋ぎ……これならどこからどう見ても、恋人にしか見えませんよね」"
translation = "「어깨를 맞대고, 팔짱을 끼고, 손을 잡고…… 이러면 어디서 어떻게 봐도 연인으로밖에 안 보이겠죠」"

[[dialogue]]
speaker = "マリオン"
original = "「誰かに見られたら、私と会長様の関係が明らかになる……学園で話題が持ちきりになってしまいそうです」"
translation = "「누군가에게 들킨다면 저와 회장님의 관계가 드러나서…… 학원이 온통 그 화제로 떠들썩해질 것 같네요」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様との関係が噂されるのでしたら、それはただただ喜ばしいことです」"
translation = "「회장님과의 관계가 소문이 난다면, 그건 그저 기쁠 따름입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「それとも……私と噂になるのはお嫌ですか？」"
translation = "「아니면…… 저와 소문이 나는 게 싫으신가요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん嫌なんかじゃないですよ"
translation = "물론 싫은 건 아니에요"

[[dialogue]]
speaker = "マリオン"
original = "「ふふふ<emoji=heart04>\u3000でしたら、会長様との縁結びと子宝のお参りに向かいましょう<emoji=heart04>」"
translation = "「후후후❤️ 그렇다면 회장님과의 인연 맺기와 자녀 기원 참배를 하러 가죠❤️」"

[[dialogue]]
speaker = "トワ先生"
original = "「あれ？\u3000そこにいるのって……マリオンと会長くん！？\u3000二人きりでお出かけしてるー！\u3000腕まで組んでるー！」"
translation = "「어라? 저기 있는 건…… 마리온이랑 회장군!? 둘이서만 외출했어! 팔짱까지 끼고 있네!」"

[[dialogue]]
speaker = "マリオン"
original = "「トワ！？\u3000どうしてここに？」"
translation = "「토와!? 어떻게 여기에?」"

[[dialogue]]
speaker = "トワ先生"
original = "「どうしてってお参りをしてきたとこだけど……この距離感……甘い空気……もしかして、デ、デ、デート！？」"
translation = "「어떻게라니, 참배를 마치고 나오던 참인데…… 이 거리감…… 달콤한 공기…… 설마, 데, 데, 데이트!?」"

[[dialogue]]
speaker = "マリオン"
original = "（私ともあろう者が迂闊でした……よりにもよって、一番見られたくない相手に……！）"
translation = " (나답지 않게 부주의했군요…… 하필이면 가장 보이고 싶지 않은 상대에게……!)"

[[dialogue]]
speaker = "マリオン"
original = "（会長様とのデートに浮かれて、人形の警戒を解いていました……）"
translation = " (회장님과의 데이트에 들떠서 인형의 경계를 풀고 있었습니다……)"

[[dialogue]]
speaker = "トワ先生"
original = "「私の教え子に手を出すなんてー！\u3000い、いつから２人はそんなラブラブな仲になったの！？」"
translation = "「내 제자한테 손을 대다니~! 어, 언제부터 둘이 그렇게 깨가 쏟아지는 사이가 된 거야!?」"

[[dialogue]]
speaker = "マリオン"
original = "「ま、まあまあ、トワ。これは違うんですよ。会長様とはたまたまお会いしまして──」"
translation = "「저, 저기, 토와. 그게 아니에요. 회장님과는 우연히 만난 거라──」"

[[dialogue]]
speaker = "unk"
original = "俺から誘いました！"
translation = "제가 먼저 제안했습니다!"

[[dialogue]]
speaker = "unk"
original = "マリオンとデート中です！"
translation = "마리온과 데이트 중입니다!"

[[dialogue]]
speaker = "マリオン"
original = "「ひゃ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ひぇぇ、先生の目の前で肩を寄せるなんて、会長くん積極的……そんな一面もあったんだね」"
translation = "「히익, 선생님 눈앞에서 어깨를 감싸다니, 회장군 적극적이야…… 그런 일면도 있었구나」"

[[dialogue]]
speaker = "マリオン"
original = "「か、会長様、あの、今はさすがに……い、いたずらはおよしください……」"
translation = "「회, 회장님, 저기, 지금은 역시…… 장, 장난은 그만둬 주세요……」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふわ～……そんなに幸せそうな顔をしているマリオンを見るのは初めてだよ～……びっくり」"
translation = "「후아~…… 그렇게 행복해 보이는 표정을 짓는 마리온은 처음 봐~…… 깜짝이야」"

[[dialogue]]
speaker = "マリオン"
original = "「えっ……？\u3000今の私、どんな顔してるんですか……？」"
translation = "「엣……? 지금 제 표정이 어떤가요……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ、自分じゃわかんないんだ～」"
translation = "「아, 자기 자신은 모르는구나~」"

[[dialogue]]
speaker = "トワ先生"
original = "「ほら、マリオンっていつも物腰は柔らかいけど、どこか達観してて、なんでも知ってる～みたいに振る舞ってるじゃない？」"
translation = "「봐봐, 마리온은 항상 말투는 부드럽지만 어딘가 통달한 느낌이라, 모든 걸 다 안다는 듯이 굴잖아?」"

[[dialogue]]
speaker = "マリオン"
original = "「そ、そうでしたか……？\u3000そんなことないと思いますけど……」"
translation = "「그, 그랬나요……? 그런 적 없다고 생각합니다만……」"

[[dialogue]]
speaker = "トワ先生"
original = "「そんなことあるよ。伊達に付き合い長くないし。でもね、今のマリオンはすごく『女の子』って顔してる」"
translation = "「그런 적 있어. 너랑 알고 지낸 세월이 얼만데. 하지만 말이야, 지금 마리온은 완전히 『여자아이』 같은 표정을 짓고 있어」"

[[dialogue]]
speaker = "マリオン"
original = "「…………ッ！？」"
translation = "「…………!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「マリオンが女の子にちょっかいかけるノリで、遊びで会長くんとお付き合いしてるなら、先生として咎めなきゃ！\u3000って思ってたけど」"
translation = "「마리온이 여자애들한테 집적거리는 기세로, 장난삼아 회장군이랑 사귀는 거라면 선생님으로서 꾸짖어야지! 라고 생각했는데」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん、２人が本気なら、私からは何も言うことはないよ。末永くお幸せにね」"
translation = "「응, 둘이 진심이라면 난 아무 말도 안 할게. 오래오래 행복하렴」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くん、マリオンは面倒なところもある……ううん、面倒なところだらけだけど、可愛がってあげてね」"
translation = "「회장군, 마리온은 성가신 점도 있고…… 아니, 성가신 점투성이지만, 많이 귀여워해 줘」"

[[dialogue]]
speaker = "マリオン"
original = "「か、会長様を可愛がるのは私の方です！\u3000ですよね、会長様！？」"
translation = "「회, 회장님을 귀여워하는 건 접니다! 그렇죠, 회장님!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「はいはい、そういうことにしておくね～。ふふふふ♪」"
translation = "「네네, 그런 걸로 해둘게~. 후후후후♪」"

[[dialogue]]
speaker = "マリオン"
original = "「もう！\u3000トワ！」"
translation = "「정말! 토와!」"

[[dialogue]]
speaker = "トワ先生"
original = "「でも会長くん？\u3000学生として、星徒会長として、節度を護った恋愛を、だよ！」"
translation = "「하지만 회장군? 학생으로서, 학생회장으로서 절도를 지키는 연애를 해야 해!」"

[[dialogue]]
speaker = "トワ先生"
original = "「２人の邪魔しちゃ悪いから、お邪魔虫はここで退散するね！\u3000お幸せにー！」"
translation = "「둘을 방해하면 미안하니까 방해꾼은 여기서 퇴장할게! 행복해라~!」"

[[dialogue]]
speaker = "マリオン"
original = "「もう、トワったら……」"
translation = "「정말, 토와도 참……」"

[[dialogue]]
speaker = "unk"
original = "マリオンが恥ずかしがってるの珍しいね"
translation = "마리온이 부끄러워하는 건 드문 일이네"

[[dialogue]]
speaker = "マリオン"
original = "「むっ。私をからかうなんて、会長様も随分と成長なさいましたね？」"
translation = "「무웁. 저를 놀리다니, 회장님도 상당히 성장하셨군요?」"

[[dialogue]]
speaker = "マリオン"
original = "「ですが……そうですね。他の方ならともかく、旧知の間柄のトワにイチャついてるところを見られるのは、少しだけ気恥ずかしかったです」"
translation = "「하지만…… 그렇네요. 다른 분이라면 몰라도, 오랜 지인인 토와에게 꽁냥거리는 모습을 들키는 건 조금 쑥스러웠어요」"

[[dialogue]]
speaker = "マリオン"
original = "「以前の私ならば、そんなこともなかったはずなのですけど……自分のことながら、驚いてしまいました」"
translation = "「이전의 저라면 그럴 일도 없었을 텐데…… 제 일인데도 놀라버렸습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「でも……私からお誘いしたのに、会長様はかばってくださいましたね」"
translation = "「그래도…… 제가 먼저 권유했는데도 회장님이 감싸주셨네요」"

[[dialogue]]
speaker = "マリオン"
original = "「力強く、グイッと引き寄せられて……愛玩動物のようにお可愛らしい会長様の意外な一面……私、ドキドキしてしまいました<emoji=heart04>」"
translation = "「박력 있게 홱 끌어당겨 주셔서…… 애완동물처럼 귀여우신 회장님의 의외의 일면…… 저, 두근거려버렸어요❤️」"

[[dialogue]]
speaker = "unk"
original = "押されると案外弱かったり……？"
translation = "밀어붙이면 의외로 약할지도……?"

[[dialogue]]
speaker = "unk"
original = "いつも押せ押せだけど"
translation = "항상 적극적이었는데 말이야"

[[dialogue]]
speaker = "マリオン"
original = "「ふふふ、そうかもしれません」"
translation = "「후후후, 그럴지도 모르겠네요」"

[[dialogue]]
speaker = "マリオン"
original = "「魔女として永い年月を生きていますが……このような感情は初めてです。まだ新しく知る感情があったなんて……長生きはしてみるものですね」"
translation = "「마녀로서 오랜 세월을 살고 있습니다만…… 이런 감정은 처음이에요. 아직 새로이 알게 될 감정이 남아있었다니…… 오래 살고 볼 일이네요」"

[[dialogue]]
speaker = "マリオン"
original = "「さ、会長様。デートはまだまだこれからです。夜は長いですよ」"
translation = "「자, 회장님. 데이트는 이제부터 시작이에요. 밤은 길답니다」"

[[dialogue]]
speaker = "unk"
original = "節度を護った恋愛をしないと……"
translation = "절도를 지킨 연애를 하지 않으면……"

[[dialogue]]
speaker = "unk"
original = "で、でも、星徒会長として"
translation = "하, 하지만, 성도회장으로서"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、ご存じありませんか、会長様」"
translation = "「어머어머, 모르고 계셨나요, 회장님」"

[[dialogue]]
speaker = "マリオン"
original = "「古今東西の寓話において、魔女は人の欲望を叶え、そして、堕落させる者……私とて例外ではありません」"
translation = "「동서고금의 우화에서 마녀는 사람의 욕망을 이뤄주고, 그리고 타락시키는 존재…… 저라고 예외는 아니랍니다」"

[[dialogue]]
speaker = "マリオン"
original = "「というか、私ばかりドキドキさせられていては不公平です。た～っぷり私にドキドキしていただかなくては、魔女の沽券に関わりますので」"
translation = "「그보다, 저만 두근거리게 하시면 불공평해요. 푸~욱 저를 두근거리게 해주셔야지, 안 그러면 마녀의 체면이 서질 않으니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「これから始まる夜こそが、魔女の時間……もっともっと、私をドキドキさせてくださいね、会長様<emoji=heart04>」"
translation = "「이제부터 시작될 밤이야말로 마녀의 시간…… 좀 더 좀 더, 저를 두근거리게 해주세요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元で囁き、鼓膜に注がれたマリオンの言葉は、まるで魔女が窯で調合した媚薬のようで。"
translation = "귓가에서 속삭이며 고막으로 흘러 들어온 마리온의 말은, 마치 마녀가 가마솥에서 조제한 비약 같았다."

[[dialogue]]
speaker = "unk"
original = "この後、俺はマリオンと蜂蜜よりもねっとりと、胸焼けするほどの甘い一夜を過ごすのであった──"
translation = "이후, 나는 마리온과 꿀보다 끈적하고 가슴이 아릴 정도로 달콤한 하룻밤을 보내게 되었다──"

