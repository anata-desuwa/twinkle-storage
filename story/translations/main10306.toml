[[dialogue]]
speaker = "unk"
original = "第６話,新しい星徒会,B"
translation = "제6화, 새로운 성도회, B"

[[dialogue]]
speaker = "unk"
original = "サーシャが留学したばかりのこと。"
translation = "사샤가 유학 온 지 얼마 안 되었을 때의 일."

[[dialogue]]
speaker = "unk"
original = "図書館で蔵書を物色していると、一冊の本を見付けた。"
translation = "도서관에서 장서를 뒤적이다가 책 한 권을 발견했다."

[[dialogue]]
speaker = "unk"
original = "その本の名は『異界探訪』。三界について広くまとめた本で、サーシャをレゾフから連れ出した一冊だった。"
translation = "그 책의 이름은 『이계 탐방』. 삼계에 대해 널리 정리한 책으로, 사샤를 레조프에서 데리고 나온 한 권이었다."

[[dialogue]]
speaker = "unk"
original = "同じ本を、学園でも見付けられるとは思わなかった。"
translation = "같은 책을 학원에서도 발견할 수 있을 줄은 몰랐다."

[[dialogue]]
speaker = "シルヴィ"
original = "「何読んでるの？\u3000その本、楽しい？」"
translation = "「뭐 읽고 있어? 그 책 재밌어?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あれ？\u3000もしかして分かんない？\u3000同じクラスのサーシャさんだよね？」"
translation = "「어라? 혹시 모르나? 같은 반인 사샤 씨 맞지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あなたは、ええと……ごめんなさい、まだ名前と顔、ちゃんと覚えられていないかも」"
translation = "「당신은, 저기…… 미안해요, 아직 이름이랑 얼굴을 제대로 기억하지 못했을지도 몰라요」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あはは、いいよいいよ♪\u3000クラスメイトのシルヴィ・グリムランド！\u3000よろしくね！」"
translation = "「아하하, 괜찮아 괜찮아♪ 같은 반 친구인 실비 그림랜드! 잘 부탁해!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャ、ごはん行こうよ！」"
translation = "「사샤, 밥 먹으러 가자!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャ、次の移動教室どこだっけ？」"
translation = "「사샤, 다음 이동 수업 어디였지?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャ～、これすごい美味しい！\u3000フライドチキンってこんなに美味しかったんだ！」"
translation = "「사샤~, 이거 진짜 맛있다! 프라이드치킨이 이렇게 맛있는 거였다니!」"

[[dialogue]]
speaker = "unk"
original = "シルヴィは不思議な子だった。"
translation = "실비는 신기한 아이였다."

[[dialogue]]
speaker = "unk"
original = "用がなくても話しかけてくるし、あっても大した用ではなかったりする。"
translation = "용건이 없어도 말을 걸어오고, 있어도 별것 아닌 용건이기도 하다."

[[dialogue]]
speaker = "unk"
original = "なんということはない。それが普通の友達だというだけだ。"
translation = "별일 아니다. 그것이 평범한 친구라는 것뿐이다."

[[dialogue]]
speaker = "unk"
original = "彼女の周りにはいつも人がいて、いつも笑っていた。サーシャもそのひとりだった。"
translation = "그녀의 주변에는 언제나 사람이 있었고, 항상 웃고 있었다. 사샤도 그중 한 명이었다."

[[dialogue]]
speaker = "unk"
original = "彼女と深く関わるようになったのは、星徒会長になってからだ。"
translation = "그녀와 깊게 얽히게 된 것은, 성도회장이 되고 나서부터다."

[[dialogue]]
speaker = "unk"
original = "２年生に上がってすぐ、転機は訪れた。"
translation = "2학년으로 올라가자마자, 전기가 찾아왔다."

[[dialogue]]
speaker = "コハルコ"
original = "「聞いたよ、星徒会長に指名されたんだって？」"
translation = "「들었어, 성도회장으로 지명됐다며?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうなのよ～。さすがにびっくりしちゃったわ～」"
translation = "「그렇게 됐어~. 역시 깜짝 놀라 버렸지 뭐야~」"

[[dialogue]]
speaker = "コハルコ"
original = "「まぁ、サーシャならあり得るとは思ってたけど……どうするの？」"
translation = "「뭐, 사샤라면 그럴 수도 있겠다 싶었지만…… 어떻게 할 거야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「お引き受けしますって答えたわ～」"
translation = "「받아들이겠다고 대답했어~」"

[[dialogue]]
speaker = "コハルコ"
original = "「えぇっ、即答！？」"
translation = "「에엣, 즉답!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「私にできることなら、そうするだけよ～」"
translation = "「내가 할 수 있는 일이라면, 그렇게 할 뿐이야~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「はいはい！\u3000サーシャサーシャ！」"
translation = "「하이하이! 사샤 사샤!」"

[[dialogue]]
speaker = "サーシャ"
original = "「どうしたの～？」"
translation = "「무슨 일이야~?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャ、星徒会長やるんでしょ？」"
translation = "「사샤, 성도회장 할 거지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ、そうよ～」"
translation = "「응, 맞아~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「副会長は決まってるの？」"
translation = "「부회장은 정해졌어?」"

[[dialogue]]
speaker = "サーシャ"
original = "「いえ、まだよ～。いい人がいたら教えてちょうだいね」"
translation = "「아니, 아직이야~. 좋은 사람이 있으면 알려주렴」"

[[dialogue]]
speaker = "シルヴィ"
original = "「じゃあ、あたしがやる！」"
translation = "「그럼, 내가 할래!」"

[[dialogue]]
speaker = "サーシャ"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker = "サーシャ"
original = "（……この子、本気で言ってるのかしら？）"
translation = "(……이 아이, 진심으로 말하는 걸까?)"

[[dialogue]]
speaker = "サーシャ"
original = "「……あなたもプリマステラだから分かっていると思うけど、星徒会役員は常に危険と隣り合わせなのよ？」"
translation = "「……너도 프리마스텔라니까 알고 있겠지만, 성도회 임원은 항상 위험과 맞닿아 있다구?」"

[[dialogue]]
speaker = "サーシャ"
original = "（この子が強いのは知ってるけど、戦い方が強引すぎるわ）"
translation = "(이 아이가 강하다는 건 알고 있지만, 싸우는 방식이 너무 막무가내야)"

[[dialogue]]
speaker = "シルヴィ"
original = "「もちろん分かってる！\u3000だからサーシャとやりたいんだ！」"
translation = "「물론 알고 있어! 그러니까 사샤랑 하고 싶은 거야!」"

[[dialogue]]
speaker = "サーシャ"
original = "「……え？\u3000それはどういう……？」"
translation = "「……어? 그건 무슨……?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「だってサーシャって、アステラに入ったらそのままいなくなっちゃいそうだから！」"
translation = "「그치만 사샤는, 아스테라에 들어가면 그대로 사라져 버릴 것 같으니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "（もしかして私が心配されてる～～～～！？）"
translation = "(설마 내가 걱정받고 있는 거야~~~~!?)"

[[dialogue]]
speaker = "サーシャ"
original = "「こ、コハルコちゃんはどう思う……？」"
translation = "「코, 코하루코짱은 어떻게 생각해……?」"

[[dialogue]]
speaker = "コハルコ"
original = "「私はアリだと思うなぁ。シルヴィ、みんなに頼りにされてるし」"
translation = "「나는 괜찮다고 봐. 실비, 모두에게 의지가 되고 있기도 하고」"

[[dialogue]]
speaker = "サーシャ"
original = "「う～～～～ん」"
translation = "「으~~~~음」"

[[dialogue]]
speaker = "サーシャ"
original = "（シルヴィは軽音楽部に所属しつつも、色んな部活に顔を出してる）"
translation = "(실비는 경음악부에 소속되어 있으면서도, 여러 부활동에 얼굴을 내밀고 있어)"

[[dialogue]]
speaker = "サーシャ"
original = "（同級生からだけでなく、後輩からの人望も厚い）"
translation = "(동급생뿐만 아니라, 후배들의 신망도 두터워)"

[[dialogue]]
speaker = "サーシャ"
original = "（それに生徒の間だけじゃなくて、それ以外の人たちに対しても星騎士として顔が広い）"
translation = "(게다가 학생들 사이뿐만 아니라, 그 외의 사람들에 대해서도 성기사로서 발이 넓어)"

[[dialogue]]
speaker = "サーシャ"
original = "（副会長を任せるに、これ以上の適任はいないかもしれない）"
translation = "(부회장을 맡기기에, 이 이상의 적임자는 없을지도 몰라)"

[[dialogue]]
speaker = "サーシャ"
original = "（でも、不安なところもあるわ。何度か一緒に戦ったけど、向こう見ずというか、勢い任せというか……）"
translation = "(하지만 불안한 점도 있어. 몇 번 같이 싸워봤지만, 앞뒤를 안 가린달까, 기세에만 맡긴달까……)"

[[dialogue]]
speaker = "サーシャ"
original = "（この子は強い。けれど、星徒会役員が務まるかどうかは別の話だし……）"
translation = "(이 아이는 강해. 하지만, 성도회 임원을 잘 해낼 수 있을지는 별개의 문제고……)"

[[dialogue]]
speaker = "サーシャ"
original = "（どうするべき、なのかしら……）"
translation = "(어떻게 해야 하는 걸까……)"

[[dialogue]]
speaker = "シルヴィ"
original = "「あはは、いいよいいよ♪\u3000クラスメイトのシルヴィ・グリムランド！\u3000よろしくね！」"
translation = "「아하하, 괜찮아 괜찮아♪ 같은 반 친구인 실비 그림랜드! 잘 부탁해!」"

[[dialogue]]
speaker = "サーシャ"
original = "（……そうね、この子の誰とでも仲良くなれるところは星徒会運営の役に立つはず）"
translation = "(……그래, 이 아이의 누구와도 친해질 수 있는 점은 성도회 운영에 도움이 될 거야)"

[[dialogue]]
speaker = "サーシャ"
original = "「分かったわ。私が正式に星徒会長になったら、あなたを副会長に任命します」"
translation = "「알겠어. 내가 정식으로 성도회장이 되면, 너를 부회장으로 임명할게」"

[[dialogue]]
speaker = "サーシャ"
original = "「シルヴィ・グリムランド。あなたの力を貸して」"
translation = "「실비 그림랜드. 네 힘을 빌려줘」"

[[dialogue]]
speaker = "シルヴィ"
original = "「オッケー！\u3000改めてよろしくね、会長！」"
translation = "「오케이! 새삼스럽지만 잘 부탁해, 회장!」"

[[dialogue]]
speaker = "unk"
original = "こうして、新星星徒会が始動した。"
translation = "이렇게 해서, 신성 성도회가 시동했다."

