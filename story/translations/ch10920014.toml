[[dialogue]]
speaker = "unk"
original = "第４話,監視は続くよどこまでも,P"
translation = "제4화, 감시는 계속된다 어디까지든"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「会長サンってば、中々ハーレムの決定的証拠を押さえさせてくれねぇ」"
translation = "「회장님은 좀처럼 하렘의 결정적 증거를 잡게 해주지 않는군」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「まだ会長くんの監視を続けてたんだ……」"
translation = "「아직 회장군 감시를 계속하고 있었구나……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「当たり<ruby>前<rt>めぇ</rt></ruby>よ！\u3000姐さんの安全を守るためなら、いつまででもやってやるぜい！」"
translation = "「당연하지! 누님의 안전을 지키기 위해서라면 언제까지고 하겠어!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あはは……ごめんね、会長くん。迷惑してない？」"
translation = "「아하하…… 미안해, 회장군. 폐가 되진 않아?」"

[[dialogue]]
speaker = "unk"
original = "ヒヨと一緒にいるのは楽しいから"
translation = "히요와 함께 있는 건 즐거우니까."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そうやってすぐ、あたしまでハーレムに加えようとしやがるっ。あたしは姐さんにゾッコンなんでい。そう簡単には会長サンになびかないぜ」"
translation = "「그렇게 금방 나까지 하렘에 넣으려 하다니. 나는 누님에게 푹 빠져 있다고. 그렇게 쉽게 회장님에게 넘어가지 않아」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そう簡単に……ということは、なびく可能性はあるってことだよね？」"
translation = "「그렇게 쉽게……라는 건 넘어갈 가능성은 있다는 거네?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「真夏に雪が降るくらいありえねぇ確率だぜい」"
translation = "「한여름에 눈이 내릴 정도로 있을 수 없는 확률이지!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あはは、ヒヨちゃんは厳しいなぁ」"
translation = "「아하하, 히요짱은 엄격하네」"

[[dialogue]]
speaker_original = "地元の住人Ａ"
speaker_translation = "현지 주민 A"
original = "「あら、ヒヨちゃんじゃないかい」"
translation = "「어머, 히요짱 아니니」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「おう、おばさん！\u3000元気にしてたかい？」"
translation = "「오, 아줌마! 잘 지냈어?」"

[[dialogue]]
speaker_original = "地元の住人Ａ"
speaker_translation = "현지 주민 A"
original = "「ヒヨちゃんの姿を見たら元気になったよ。ヒヨちゃんはお友達とお散歩かい？」"
translation = "「히요짱 얼굴을 보니 기운이 나네. 히요짱은 친구랑 산책 중이니?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「まあそんな感じでい」"
translation = "「뭐, 그런 셈이지」"

[[dialogue]]
speaker_original = "地元の住人Ｂ"
speaker_translation = "현지 주민 B"
original = "「おうヒヨっ子、こっち来てたのかい！\u3000どうだ、うちのラーメンを食っていかないか？」"
translation = "「오, 히요 꼬맹이, 이쪽으로 온 거냐! 어때, 우리 라멘 좀 먹고 가지 않을래?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「今日は連れがいるからまた今度なっ」"
translation = "「오늘은 일행이 있어서 다음에!」"

[[dialogue]]
speaker_original = "地元の住人Ｃ"
speaker_translation = "현지 주민 C"
original = "「ヒヨちゃんヒヨちゃん……ほれ、飴でも食べなさい」"
translation = "「히요짱 히요짱…… 자, 사탕이라도 먹으렴」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いつもありがとうよ！\u3000いつまでも元気でいてくれよな！」"
translation = "「언제나 고마워! 언제까지나 건강하라고!」"

[[dialogue]]
speaker = "unk"
original = "すごい人だかりだ……！"
translation = "엄청난 인파다……!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ヒヨちゃんは地元のアイドルだからね～」"
translation = "「히요짱은 지역 아이돌이니까요～」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そ、そんな大したもんじゃねぇよ……。ただ街のみんなは、あたしにとって家族みたいなもんでい」"
translation = "「그, 그렇게 대단한 거 아니야……. 그저 마을 사람들은 나에게 가족 같은 존재일 뿐이다」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そんな家族を怯えさせるリクリエを、モンスターをあたしは許せねぇ。だからあたしは、星騎士を目指して新星に入学したんでい」"
translation = "「그런 가족을 겁주는 리크리에를, 몬스터를 나는 용서할 수 없어. 그래서 나는 성기사를 목표로 신성에 입학한 거다」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「故郷のために星騎士を目指すだなんて、ヒヨちゃんは偉いよね」"
translation = "「고향을 위해 성기사를 목표로 하다니, 히요짱은 기특하네」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「照れるぜい……でも、姐さんのおかげでプリマステラにもなれたし、気に入らないモンスターもぶっ飛ばせるし、大満足でさぁ」"
translation = "「쑥스럽구먼…… 그래도 누님 덕분에 프리마스텔라도 될 수 있었고, 마음에 안 드는 몬스터도 날려버릴 수 있어서 아주 만족해」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イーーーーッ！」"
translation = "「이――――잇!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「なんて言ってたら、モンスターのお出ましだね！」"
translation = "「방금 말하기가 무섭게 몬스터가 나타났네!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしの前に出てくるとは、いい度胸だぜ！」"
translation = "「내 앞에 나타나다니 좋은 배짱이군!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くん、ヒヨちゃん……いくよ！」"
translation = "「회장군, 히요짱…… 가자!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「おう姐さん！\u3000サポートは任せな！\u3000焔ノ剣紅蓮神楽！」"
translation = "「그래 누님! 서포트는 맡겨둬! 불꽃의 검 홍련신락!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「力が溢れてくる……！\u3000これならっ！\u3000光の収束──イノセント・ノヴァ！」"
translation = "「힘이 넘쳐나……! 이것으로! 빛의 수렴──이노센트 노바!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「これでトドメでい！\u3000爆輝星壊拳！」"
translation = "「이걸로 끝이다! 폭휘성괴권!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～～……」"
translation = "「이～～……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふぅ、どんなもんだい！」"
translation = "「후우, 어떠냐!」"

[[dialogue]]
speaker = "unk"
original = "いや！\u3000まだだ！！"
translation = "아니! 아직이야!!"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イーーーーッ！」"
translation = "「이――――잇!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ヒヨちゃん！\u3000危ない！」"
translation = "「히요짱! 위험해!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「会長サン！」"
translation = "「회장님!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「よくも会長くんを……！\u3000光よ貫け──シャイニング・ペネトレーター！」"
translation = "「감히 회장군을……! 빛이여 꿰뚫어라── 샤이닝 페네트레이터!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～～……」"
translation = "「이～～……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くん、ヒヨちゃん大丈夫！？」"
translation = "「회장군, 히요짱 괜찮아!?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしは会長サンがかばってくれたおかげで、無傷だぜ……」"
translation = "「나는 회장님이 감싸준 덕분에 무사하다……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……っと、会長サン、回復させるから、じっとしといてくれよな……凪ノ剣泡沫神楽」"
translation = "「……앗, 회장님, 회복시켜 줄 테니 가만히 있어…… 잔잔한 검 물거품신락」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「すまねぇ会長サン……あたしが油断したばかりに……」"
translation = "「미안하다 회장님…… 내가 방심한 탓에……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「どうして身を挺してまで、あたしのことを？\u3000あたしは会長サンにキツく当たってばかりなのに」"
translation = "「어째서 몸을 던져서까지 나를? 나는 회장님에게 모질게만 굴었는데」"

[[dialogue]]
speaker = "unk"
original = "ヒヨが傷つくと街のみんなも悲しむから"
translation = "히요가 다치면 마을 사람들도 슬퍼할 테니까."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「だ、だからって、会長サンが傷ついていいわけないだろ……！\u3000会長サンが怪我したら、あたしだって……」"
translation = "「그, 그렇다고 회장님이 다쳐도 된다는 건 아니잖아……! 회장님이 다치면 나도……」"

[[dialogue]]
speaker = "unk"
original = "ごめん、もうヒヨを悲しませることはしない"
translation = "미안, 이제 히요를 슬프게 하지 않을게."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いや、あたしの方こそ、助けてくれたのに怒鳴って悪かった……」"
translation = "「아니, 나야말로 도와줬는데 소리 질러서 미안했다……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたし、少し会長サンのことを誤解してたみてえだ……助けてくれてありがとうなっ」"
translation = "「나, 조금 회장님을 오해하고 있었던 모양이야…… 도와줘서 고맙다」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「じゃあハーレム疑惑は？」"
translation = "「그럼 하렘 의혹은?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「それはまだ疑惑のままでい」"
translation = "「그건 아직 의혹인 채다」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「でも、その……会長サンのこと、少しは認めてやってもいい……」"
translation = "「하지만, 그…… 회장님을 조금은 인정해 줘도 괜찮아……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もう、ヒヨちゃんってば素直じゃないんだから」"
translation = "「정말 히요짱도 참, 솔직하지 못하다니까」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……くぅっ、今はこれで勘弁してくれやいっ」"
translation = "「……윽, 지금은 이걸로 봐달라고!」"

[[dialogue]]
speaker = "unk"
original = "ヒヨは可愛いな"
translation = "히요는 귀엽네."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「うるせぇっ、ちょっと気を許したからって調子に乗るんじゃないやい！」"
translation = "「시끄러워! 조금 마음을 열었다고 우쭐대지 말라고!」"

