[[dialogue]]
speaker = "unk"
original = "恋人になって以降、サチは新星学園の星徒会室に来て、仕事を手伝ってくれることが多くなっていた。"
translation = "연인이 된 이후, 사치는 신성 학원의 성도회실에 와서 일을 도와주는 일이 많아지고 있었다."

[[dialogue]]
speaker = "サチ"
original = "「ふぅ……こんなところでしょうか。お兄さん、書類のチェックお願いします」"
translation = "「후우…… 이 정도일까요. 오빠, 서류 체크 부탁드려요.」"

[[dialogue]]
speaker = "サチ"
original = "「――大丈夫そうですか？\u3000なら、よかったです」"
translation = "「――괜찮은 것 같나요? 그렇다면 다행이에요.」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんの方ももう終わりそうですか？\u3000じゃあ、それが終わったら、一緒に帰りましょう」"
translation = "「오빠 쪽도 이제 끝날 것 같나요? 그럼, 그거 끝나면 같이 돌아가요.」"

[[dialogue]]
speaker = "クロト"
original = "「……よし、終わった！」"
translation = "「……좋아, 끝났다!」"

[[dialogue]]
speaker = "サチ"
original = "「今日もお疲れ様でした。あっ……机の下にボールペン、落ちちゃいました」"
translation = "「오늘도 수고하셨습니다. 앗…… 책상 밑으로 볼펜이 떨어져 버렸어요.」"

[[dialogue]]
speaker = "サチ"
original = "「あれ、どこに……？\u3000――お兄さんも探してくれるんですか？\u3000ありがとうございます」"
translation = "「어라, 어디에……? ――오빠도 찾아 주시는 건가요? 고맙습니다.」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、見つかりました！\u3000って……きゃっ！？」"
translation = "「앗, 찾았어요! 어…… 꺄악!?」"

[[dialogue]]
speaker = "クロト"
original = "「サチ、危ない！」"
translation = "「사치, 위험해!」"

[[dialogue]]
speaker = "サチ"
original = "「う、う～ん……足を滑らせて、転んじゃいました……」"
translation = "「으, 으음…… 발이 미끄러져서 넘어져 버렸어요……」"

[[dialogue]]
speaker = "サチ"
original = "「助けてくれてありがとうございます、お兄さん……って――」"
translation = "「구해줘서 고맙습니다, 오빠…… 어――」"

[[dialogue]]
speaker = "サチ"
original = "「なんですか、この体勢～～～～～～っ！？」"
translation = "「뭔가요, 이 자세는~~~~~~~~~~!?」"

[[dialogue]]
speaker = "サチ"
original = "「こ、これってまた、ラッキースケベが発動して……！？\u3000た、確かにここ最近、お兄さんの仕事が忙しくて、そういうことはできてませんでしたけど！」"
translation = "「이, 이건 또 럭키 스케베가 발동해서……!? 하, 하기야 요 근래 오빠 일이 바빠서 그런 짓은 못 했었지만요!」"

[[dialogue]]
speaker = "サチ"
original = "「わ、私は別にムラムラが溜まってたりとか、そんなことありませんよ！？\u3000これは……そう！\u3000お兄さんの方がしたいと思っていたから発動したんです！」"
translation = "「저, 저는 딱히 몸이 달아올라 있다거나 그런 거 아니거든요!? 이건…… 그래요! 오빠 쪽이 하고 싶다고 생각했으니까 발동한 거예요!」"

[[dialogue]]
speaker = "サチ"
original = "「ま、全く星徒会室でこんな……え、エッチなことは禁止です……！」"
translation = "「정, 정말 성도회실에서 이런…… 야, 야한 짓은 금지예요……!」"

[[dialogue]]
speaker = "サチ"
original = "「って、なんでもう勃起しちゃってるんですか！？\u3000こ、恋人同士とはいえ、こんなところ誰かに見られたりしたら……」"
translation = "「그보다, 왜 벌써 발기해 버린 건가요!? 고, 고백한 연인 사이라고는 해도 이런 곳에서 누군가에게 들키기라도 하면……」"

[[dialogue]]
speaker = "サチ"
original = "「――この時間はもう、誰もこない？\u3000で、でも……ごくり……」"
translation = "「――이 시간에는 이제 아무도 안 온다? 하, 하지만…… 꿀꺽……」"

[[dialogue]]
speaker = "サチ"
original = "「んっ<emoji=heart04>\u3000アソコに擦りつけちゃダメです……<emoji=heart04>\u3000わ、わかりましたから<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 거기에 비벼대면 안 돼요……<emoji=heart04> 아, 알았으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「し、仕方ないですね。１回……１回だけですよ……？」"
translation = "「어, 어쩔 수 없네요. 한 번…… 한 번뿐이에요……?」"

[[dialogue]]
speaker = "サチ"
original = "「あんっ<emoji=heart04>\u3000お兄さんの手で太ももなでられて……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000手つきがやらしいです……んんっ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 오빠 손에 허벅지가 쓰다듬어져서……<emoji=heart04> 하아아……<emoji=heart04> 손놀림이 야해요…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ふあぁっ……<emoji=heart04>\u3000お尻触っちゃダメぇ<emoji=heart04>\u3000あぁんっ……<emoji=heart04>\u3000揉むのエッチです……ふうぅ……<emoji=heart04>」"
translation = "「후아앗……<emoji=heart04> 엉덩이 만지면 안 돼<emoji=heart04> 아앙……<emoji=heart04> 주무르는 거 야해요…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ<emoji=heart04>\u3000パンツの内側に手を入れちゃ……<emoji=heart04>\u3000はぁんっ……<emoji=heart04>\u3000び、敏感とかそんなんじゃないです……<emoji=heart04>\u3000んっ、はぁ……<emoji=heart04>\u3000ふあぁ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 팬티 안쪽에 손을 넣으면……<emoji=heart04> 하앙……<emoji=heart04> 미, 민감하다거나 그런 거 아니에요……<emoji=heart04> 응, 하아……<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんの手つきがエッチだから、意識しすぎちゃうだけです……<emoji=heart04>\u3000んっ……あぁっ……<emoji=heart04>\u3000へ、変態なんですから、もう……<emoji=heart04>」"
translation = "「오빠 손놀림이 야하니까 의식하게 되는 것뿐이에요……<emoji=heart04> 응…… 아앗……<emoji=heart04> 벼, 변태니까 정말……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あぁんっ……<emoji=heart04>\u3000どこ触ってるんですかっ<emoji=heart04>\u3000ぱ、パンツ越しでもアソコ擦っちゃ……あっ<emoji=heart04>\u3000ふあぁんっ……<emoji=heart04>」"
translation = "「아앙……<emoji=heart04> 어딜 만지는 거예요<emoji=heart04> 패, 팬티 너머로도 거기 문지르면…… 앗<emoji=heart04> 후아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ぬ、濡れているのは、お兄さんがエッチなことするから……<emoji=heart04>\u3000私のせいじゃないですぅ……<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>」"
translation = "「저, 젖어 있는 건 오빠가 야한 짓을 하니까……<emoji=heart04> 제 탓이 아니에요……<emoji=heart04> 앗…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「指、内側に入れちゃダメぇ……<emoji=heart04>\u3000んあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「손가락, 안쪽에 넣으면 안 돼……<emoji=heart04> 응아앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「やぁっ……<emoji=heart04>\u3000指をアソコに入れちゃダメなのぉ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「야앗……<emoji=heart04> 손가락을 거기에 넣으면 안 돼요오……<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「くちゅくちゅ音立てちゃダメぇ<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04>\u3000くぅんっ……<emoji=heart04>」"
translation = "「쿠츄쿠츄 소리 내면 안 돼애<emoji=heart04> 응…… 후우웃……<emoji=heart04> 쿠우운……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んむっ……<emoji=heart04>\u3000お兄さん、今キスしちゃ……んちゅっ<emoji=heart04>\u3000ちゅるっ……ちゅうっ<emoji=heart04>\u3000ちゅぷぷっ……<emoji=heart04>\u3000ちゅぱっ……ちゅぷっ……れろちゅっ……<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 오빠, 지금 키스하면…… 응츄<emoji=heart04> 츄루웃…… 츄우우<emoji=heart04> 츄푸푸웃……<emoji=heart04> 츄팟…… 츄풋…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んむぅっ<emoji=heart04>\u3000指、激しっ……<emoji=heart04>\u3000ちゅぷっ……ちゅるるっ……<emoji=heart04>\u3000ちゅぱっ……れろちゅっ<emoji=heart04>」"
translation = "「음무웃<emoji=heart04> 손가락, 격해……<emoji=heart04> 츄풋…… 츄루루웃……<emoji=heart04> 츄팟…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んあぁっ……<emoji=heart04>\u3000ぐちゅぐちゅ掻き回しちゃダメなのぉ……<emoji=heart04>\u3000んむぅ……ちゅぱっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅれるっ<emoji=heart04>」"
translation = "「응아앗……<emoji=heart04> 구츄구츄 휘저으면 안 돼요오……<emoji=heart04> 응무우…… 츄팟<emoji=heart04> 츄푸푸웃…… 츄레루웃<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ちゅっ……ちゅるるっ……<emoji=heart04>\u3000ちゅぷぷっ、ちゅぱっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「츄…… 츄루루웃……<emoji=heart04> 츄푸푸, 츄팟……<emoji=heart04> 앗<emoji=heart04> 안앗……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「アソコにお兄さんのアレが……はあぁっ……<emoji=heart04>\u3000当たってますぅ……<emoji=heart04>」"
translation = "「거기에 오빠의 그게…… 하아앗……<emoji=heart04> 닿고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ああっ……<emoji=heart04>\u3000ズボン越しでもわかるくらい、もうパンパン……<emoji=heart04>」"
translation = "「아앗……<emoji=heart04> 바지 너머로도 알 수 있을 정도로, 벌써 팽팽해……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んはぁ……<emoji=heart04>\u3000え、エッチすぎます……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「은하아……<emoji=heart04> 에, 에치해요……<emoji=heart04> 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あんっ<emoji=heart04>\u3000もう、挿れちゃうんですか？\u3000あっ、ダメ<emoji=heart04>\u3000パンツずらしちゃ……んんっ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 정말, 벌써 삽입하는 거예요? 앗, 안 돼<emoji=heart04> 팬티 비키면…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ……ふあぁっ<emoji=heart04>\u3000先っぽ、当たってますぅ……擦りつけちゃダメぇ……<emoji=heart04>\u3000んうぅっ……はあぁんっ<emoji=heart04>」"
translation = "「앗…… 후아앗<emoji=heart04> 끝부분, 닿고 있어요…… 문지르면 안 돼애……<emoji=heart04> 응우웃…… 하아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んあぁっ<emoji=heart04>\u3000は、入っちゃう……んっ<emoji=heart04>\u3000お兄さんのアレが、私のアソコを押し広げて……あっ<emoji=heart04>\u3000入っ――」"
translation = "「응아앗<emoji=heart04> 하, 들어가버려…… 응<emoji=heart04> 오빠의 그게, 내 거기를 밀어 넓히며…… 앗<emoji=heart04> 들어――」"

[[dialogue]]
speaker = "サチ"
original = "「ふあああぁぁぁ～～～っ<emoji=heart04>\u3000お兄さんの、中にきたぁ……っ<emoji=heart04>」"
translation = "「후아아아아아아～～～앗<emoji=heart04> 오빠 거, 안에 들어왔어……어<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んっ……はあぁっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ、ダメ<emoji=heart04>\u3000動いちゃ――」"
translation = "「응…… 하아앗……<emoji=heart04> 앗<emoji=heart04> 응아앗, 안 돼<emoji=heart04> 움직이면――」"

[[dialogue]]
speaker = "サチ"
original = "「ふああぁっ……はああぁんっ<emoji=heart04>\u3000お兄さんのが出たり入ったり……あっ<emoji=heart04>\u3000んあぁっ……アソコ感じちゃ……ふあぁんっ<emoji=heart04>」"
translation = "「후아아앗…… 하아아앙앗<emoji=heart04> 오빠 게 들어왔다 나갔다…… 앗<emoji=heart04> 응아앗…… 거기 느껴버려…… 후아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ……はあぁっ……ふあぁんっ<emoji=heart04>\u3000はあぁっ……あっ……ふあぁっ<emoji=heart04>\u3000あんっ……はあぁっ……んああぁんっ<emoji=heart04>」"
translation = "「앗…… 하아앗…… 후아앙앗<emoji=heart04> 하아앗…… 앗…… 후아앗<emoji=heart04> 안앗…… 하아앗…… 응아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんのアレ、すごく大きいですぅ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ……ふあぁっ<emoji=heart04>」"
translation = "「오빠의 그거, 정말 커요오……<emoji=heart04> 안앗<emoji=heart04> 앗…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「アソコの中、いっぱいになっちゃってます……あっ<emoji=heart04>\u3000んうぅっ……はあぁっ<emoji=heart04>\u3000ふうぅ……あんっ<emoji=heart04>\u3000ふああぁんっ……<emoji=heart04>」"
translation = "「거기 안, 가득 차버렸어요…… 앗<emoji=heart04> 응우웃…… 하아앗……<emoji=heart04> 후우우…… 안앗<emoji=heart04> 후아아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「やぁっ……<emoji=heart04>\u3000内側がアレの返しで、コリコリ引っ掻かれてぇ……ふああぁっ<emoji=heart04>\u3000やっ、ダメなのに感じちゃうぅ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「야앗……<emoji=heart04> 안쪽이 그거의 턱에, 고리고리 긁혀서어…… 후아아앗<emoji=heart04> 야, 안 되는데 느껴버려어……<emoji=heart04> 앗<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「は、反則なのぉ……あっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000お兄さんのアレ、大きすぎて禁止ぃ……<emoji=heart04>」"
translation = "「바, 반칙이에요오…… 앗<emoji=heart04> 후아앗……<emoji=heart04> 오빠의 그거, 너무 커서 금지이……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はぁっ……あんっ<emoji=heart04>\u3000んあぁんっ……<emoji=heart04>\u3000あっ、やぁっ……<emoji=heart04>\u3000こんなのダメ<emoji=heart04>\u3000ダメぇ……はぁんっ<emoji=heart04>\u3000あっ……ふああぁんっ<emoji=heart04>」"
translation = "「하앗…… 안앗<emoji=heart04> 응아아앙앗……<emoji=heart04> 앗, 야앗……<emoji=heart04> 이런 거 안 돼<emoji=heart04> 안 돼애…… 하앙앗<emoji=heart04> 앗…… 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はあぁっ……んうぅっ<emoji=heart04>\u3000こんなの、中がお兄さんの形になっちゃいますぅ<emoji=heart04>\u3000あんっ……ふあぁっ……<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「하아앗…… 응우웃<emoji=heart04> 이런 거, 안이 오빠 모양이 되어버려요오<emoji=heart04> 안앗…… 후아앗……<emoji=heart04> 응아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アレじゃなくて、おち○ちんでしょ？」"
translation = "「그게 아니라, 자지잖아?」"

[[dialogue]]
speaker = "サチ"
original = "「ふああぁっ……<emoji=heart04>\u3000耳舐めながら、囁くのダメですぅ<emoji=heart04>\u3000はぁんっ……<emoji=heart04>\u3000背中ゾクゾクしちゃうのぉっ……<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>」"
translation = "「후아아앗……<emoji=heart04> 귀 핥으면서, 속삭이는 거 안 돼요오<emoji=heart04> 하앙앗……<emoji=heart04> 등줄기가 조쿠조쿠해버려어……<emoji=heart04> 하아앗…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「そんなエッチな言い方、できないですぅ……あっ<emoji=heart04>\u3000あんっ……やぁっ<emoji=heart04>」"
translation = "「그런 에치한 말, 못 해요오…… 앗<emoji=heart04> 안앗…… 야앗……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「言いません<emoji=heart04>\u3000言いませんからぁ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ……あんっ<emoji=heart04>\u3000んあぁっ……はあぁんっ<emoji=heart04>」"
translation = "「안 할게요<emoji=heart04> 안 할 거니까아……<emoji=heart04> 앗<emoji=heart04> 후아앗…… 안앗<emoji=heart04> 응아앗…… 하아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「――あ、アソコもエッチな言い方で、って……言ったりしません<emoji=heart04>\u3000やっ……あぁんっ<emoji=heart04>」"
translation = "「――아, 거기 이름도 에치한 말로, 라니…… 말 안 해요<emoji=heart04> 야앗…… 아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はあぁっ……<emoji=heart04>\u3000耳舐めながら、おねだりするのダメぇ……あっ<emoji=heart04>\u3000んあぁっ……あんっ<emoji=heart04>\u3000んうぅ……ふあぁんっ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 귀 핥으면서, 조르는 거 안 돼애…… 앗<emoji=heart04> 응아앗…… 안앗<emoji=heart04> 응우우…… 후아아앙앗<emoji=heart04> 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「そんなエッチなこと、絶対に言いませんからぁ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000あっ……ふうぅんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>」"
translation = "「그런 에치한 거, 절대로 말 안 할 거니까아<emoji=heart04> 아앗<emoji=heart04> 응…… 하아앗……<emoji=heart04> 앗…… 후우우웅앗<emoji=heart04> 안앗<emoji=heart04> 하아앗…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「やぁっ……<emoji=heart04>\u3000奥まで挿れちゃ……あっ<emoji=heart04>\u3000ふあぁんっ……<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000そんなに突いちゃダメぇ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ……んああぁんっ<emoji=heart04>」"
translation = "「야앗……<emoji=heart04> 끝까지 넣으면…… 앗<emoji=heart04> 후아아앙앗……<emoji=heart04> 응아앗<emoji=heart04> 그렇게 찌르면 안 돼애……<emoji=heart04> 앗<emoji=heart04> 앗…… 응아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんの大きくてぇ、奥まで届いちゃってるぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ……らめっ<emoji=heart04>」"
translation = "「오빠 거 커서어, 안쪽까지 닿고 있어어<emoji=heart04> 앗<emoji=heart04> 앗…… 안 돼애<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「そんなズポズポしちゃらめぇ<emoji=heart04>\u3000はぁっ、はぁっ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ……ふああぁんっ<emoji=heart04>」"
translation = "「그렇게 즈포즈포 하면 안 돼애<emoji=heart04> 하앗, 하앗……<emoji=heart04> 안앗<emoji=heart04> 앗…… 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「やぁんっ<emoji=heart04>\u3000わ、私は腰を動かしてなんか、ないですぅ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>」"
translation = "「야앙앗<emoji=heart04> 저, 저는 허리를 움직이거나 하지, 않았어요오<emoji=heart04> 앗…… 안앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんがスケベに興奮して、激しく動かしてるせいですからぁ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ……ふあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ……はあぁんっ<emoji=heart04>」"
translation = "「오빠가 변태같이 흥분해서, 격하게 움직이는 탓이니까아<emoji=heart04> 하아아앗<emoji=heart04> 앗…… 후아앗<emoji=heart04> 안앗<emoji=heart04> 앗…… 하아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「やぁっ……<emoji=heart04>\u3000淫乱とか、変態とか言っちゃダメぇ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「야앗……<emoji=heart04> 음란이라니, 변태라니 말하면 안 돼애<emoji=heart04> 아앙앗<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「私はそんなんじゃありませんからぁ<emoji=heart04>\u3000あっ……んあぁっ<emoji=heart04>\u3000はあぁっ……んっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「저는 그런 거 아니니까아<emoji=heart04> 앗…… 응아앗<emoji=heart04> 하아앗…… 응<emoji=heart04> 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んあぁっ……<emoji=heart04>\u3000エッチなこと、耳元で囁きながら奥グリグリするの禁止ですぅ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「응아앗……<emoji=heart04> 에치한 거, 귓가에 속삭이면서 안쪽 구리구리 하는 거 금지예요오<emoji=heart04> 하아앗…… 응우웃<emoji=heart04> 앗…… 안앗<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「エッチするの嫌ならやめちゃうよ？\u3000それでもいい？」"
translation = "「섹스하는 거 싫으면 그만둘게? 그래도 괜찮아?」"

[[dialogue]]
speaker = "サチ"
original = "「え？\u3000あっ……そんな……今更、動きをゆるめるなんてぇ……んんっ<emoji=heart04>」"
translation = "「에? 앗…… 그런…… 이제 와서, 움직임을 늦추다니이…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「うぅ……お兄さんの意地悪ぅ……あっ」"
translation = "「으으…… 오빠 심술쟁이이…… 앗」"

[[dialogue]]
speaker = "サチ"
original = "「やぁっ……！\u3000動くのやめちゃ、やぁなのぉ<emoji=heart04>\u3000言います、ちゃんと正直に言いますからぁ……<emoji=heart04>」"
translation = "「야앗……! 움직이는 거 그만두면, 시러어어<emoji=heart04> 말할게요, 제대로 솔직하게 말할 테니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「本当は……本当は、おち○ちん、すごく気持ちいいですぅっ<emoji=heart04>」"
translation = "「사실은…… 사실은, 자지, 너무 기분 좋아요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あんっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000はあぁっ……ふあぁんっ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 앗……<emoji=heart04> 하아앗…… 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んあぁっ<emoji=heart04>\u3000本当は、お兄さんのたくましいおち○ちんで、おま○こパンパンされるの、大好きですぅ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 사실은, 오빠의 늠름한 자지로, 보지 팽팽해지는 거, 너무 좋아해요오<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ……あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000だから――」"
translation = "「앗…… 안앗<emoji=heart04> 하아앗<emoji=heart04> 그러니까――」"

[[dialogue]]
speaker = "サチ"
original = "「だから、サチのおま○こ、もっと激しくいっぱい突いてぇ<emoji=heart04>」"
translation = "「그러니까, 사치의 보지, 좀 더 격하게 잔뜩 찔러줘어<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しいおち○ちんピストンきたぁ～～～っ<emoji=heart04>」"
translation = "「후아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 격한 자지 피스톤 왔다아～～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あっ、ふああぁんっ<emoji=heart04>\u3000これ、これ好きぃ<emoji=heart04>\u3000本気のおち○ちんピストン、気持ちいいのぉっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000はっ、はっ、はっ、んああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 후아아앙앗<emoji=heart04> 이거, 이거 좋아아<emoji=heart04> 진심인 자지 피스톤, 기분 좋아아앗<emoji=heart04> 앗, 앗, 안앗<emoji=heart04> 핫, 핫, 핫, 응아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「セックスすきぃ<emoji=heart04>\u3000本気セックス、気持ちいいですぅ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000もっとぉ<emoji=heart04>」"
translation = "「섹스 좋아아<emoji=heart04> 진심 섹스, 기분 좋아요오<emoji=heart04> 앗, 앗, 앗, 안앗<emoji=heart04> 더어어<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あっ、ふああぁっ<emoji=heart04>\u3000もっといっぱい突いてぇ<emoji=heart04>\u3000んっ、あっ、んあぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000そこいいっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 후아아앗<emoji=heart04> 더 잔뜩 찔러줘어<emoji=heart04> 응, 앗, 응아앗<emoji=heart04> 하아앗<emoji=heart04> 거기잇<emoji=heart04> 거기 좋아앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「もっとおま○こ、パンパンして欲しいのぉ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>」"
translation = "「보지 더 팡팡해줬으면 좋겠어어<emoji=heart04> 앗, 앗, 앗, 후아아앙<emoji=heart04> 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はぁっ、はぁっ、あんっ<emoji=heart04>\u3000あっ、んあぁっ<emoji=heart04>\u3000おち○ちんすごいぃっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000パンパンしゅきぃっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「하아, 하아, 앙<emoji=heart04> 앗, 응아아<emoji=heart04> 자지 대단해애<emoji=heart04> 앗, 앗, 앗, 후아아아<emoji=heart04> 좋아<emoji=heart04> 팡팡 조아아<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あぁんっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000エッチで恥ずかしいのにぃ、んあぁっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 야해서 부끄러운데에, 응아아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんのおち○ちんで突かれると、幸せな気持ちになっちゃいますぅ<emoji=heart04>はっ、はっ、はっ、んあぁっ<emoji=heart04>\u3000ふあぁぁんっ<emoji=heart04>」"
translation = "「오빠 자지로 찔리면, 행복한 기분이 되어버려요오<emoji=heart04> 하앗, 하앗, 하앗, 응아아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000お兄さん<emoji=heart04>\u3000お兄さんのおち○ちん気持ちいいのぉっ<emoji=heart04>\u3000ふあぁっ、あっ、あっ、あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 오빠<emoji=heart04> 오빠 자지 기분 좋아아<emoji=heart04> 후아아, 앗, 앗, 앙<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000奥、いいっ<emoji=heart04>\u3000そこ、そこそこっ<emoji=heart04>\u3000はぁっ、んっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 응아아아<emoji=heart04> 안쪽, 좋아<emoji=heart04> 거기, 거기거기<emoji=heart04> 하아, 응, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んあぁっ<emoji=heart04>\u3000耳元でお兄さんに名前呼ばれながら、求められるの幸せぇ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「응아아<emoji=heart04> 귓가에서 오빠가 이름 불러주면서, 원해지니까 행복해애<emoji=heart04> 앗, 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、好き<emoji=heart04>\u3000はっ、はっ、しゅきぃ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「오빠, 좋아<emoji=heart04> 하앗, 하앗, 조아아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000激しいピストンでもうきちゃう<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앙<emoji=heart04> 격렬한 피스톤 때문에 벌써 가버려<emoji=heart04> 앗, 앗, 앗, 응아아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「おま○こ、もうイキそうですぅ<emoji=heart04>\u3000はっ、はっ、はっ、ふああぁっ<emoji=heart04>\u3000あっ、あんっ、んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「보지, 벌써 갈 것 같아요오<emoji=heart04> 하앗, 하앗, 하앗, 후아아아<emoji=heart04> 앗, 앙, 응아아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんも、もうイキそうなんですか？\u3000あっ、あっ、あんっ<emoji=heart04>\u3000来て、きてきてきてぇ<emoji=heart04>\u3000はっ、はっ、はっ、んあぁっ<emoji=heart04>」"
translation = "「오빠도, 벌써 갈 것 같나요? 앗, 앗, 앙<emoji=heart04> 싸줘, 싸줘싸줘싸줘어<emoji=heart04> 하앗, 하앗, 하앗, 응아아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「サチのおま○こに、お兄さんの子種、いっぱい出してぇ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「사치의 보지에, 오빠 씨앗, 잔뜩 내보내줘어<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あっ、激しいです<emoji=heart04>\u3000あんっ、あっ、あっ、ふああぁぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 격렬해요<emoji=heart04> 앙, 앗, 앗, 후아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「もうイク<emoji=heart04>\u3000はっ、はっ、はっ、イっちゃいます<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000凄く気持ちいいのが登ってきてましゅ<emoji=heart04>」"
translation = "「이제 가<emoji=heart04> 하앗, 하앗, 하앗, 가버려요<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 엄청 기분 좋은 게 올라오고 있어여<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「んっ、あっ、あっ、んうぅっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>\u3000お兄さんっ<emoji=heart04>\u3000お兄さんお兄さんっ<emoji=heart04>」"
translation = "「응, 앗, 앗, 응우우<emoji=heart04> 응아아아<emoji=heart04> 후아아앙<emoji=heart04> 오빠<emoji=heart04> 오빠 오빠아<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、あっ、あっ、イクッ<emoji=heart04>\u3000イっちゃうっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、あっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 가앗<emoji=heart04> 가버려어<emoji=heart04> 앗, 앗, 앗, 앗, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「イクイクイクイクイクーーーーっ<emoji=heart04>\u3000っ、イックぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다간다간다간다간다아아아아앗<emoji=heart04> 읏, 가버려어어어어～～～～～～～～～엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000子宮にいっぱい、お兄さんの精子、入ってきてますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 자궁에 가득, 오빠의 정액, 들어오고 있어요오오～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はああぁぁ～っ………<emoji=heart04>\u3000お兄さんの射精、すごいぃ……<emoji=heart04>\u3000んふぅ……どくどくって中に注がれてる感覚、すきぃ……<emoji=heart04>\u3000んはあぁ……<emoji=heart04>」"
translation = "「하아아아아～앗………<emoji=heart04> 오빠의 사정, 굉장해……<emoji=heart04> 응후우…… 울컥울컥 안으로 쏟아지는 감각, 좋아아……<emoji=heart04> 응하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あぁ……ふうぅ……んっ……<emoji=heart04>\u3000射精、止まりました……<emoji=heart04>」"
translation = "「아아…… 후우우…… 응……<emoji=heart04> 사정, 멈췄어요……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はあぁ……<emoji=heart04>\u3000お腹の中、お兄さんの子種でいっぱいで、熱いです……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 배 안이 오빠의 씨물로 가득해서 뜨거워요……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「あんっ<emoji=heart04>\u3000おち○ちん抜けて、精子溢れちゃう……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 자지 빠지면, 정액 넘쳐버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「はあぁ……<emoji=heart04>\u3000お兄さんの精子、量すごすぎです……<emoji=heart04>\u3000床、掃除しないと……」"
translation = "「하아아……<emoji=heart04> 오빠의 정액, 양이 너무 엄청나요……<emoji=heart04> 바닥, 청소해야겠어……」"

[[dialogue]]
speaker = "サチ"
original = "「あ……<emoji=heart04>\u3000は、はい<emoji=heart04>\u3000久しぶりのエッチ……正直、すごく気持ちよかったです……<emoji=heart04>」"
translation = "「아……<emoji=heart04> 네, 네<emoji=heart04> 오랜만의 섹스…… 솔직히, 정말 기분 좋았어요……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「恥ずかしかったですけど……興奮しちゃい……ました……<emoji=heart04>」"
translation = "「부끄러웠지만…… 흥분해 버렸……어요……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「で、でも……その、他の人には絶対に秘密ですからね？\u3000こんなエッチな姿を見せるのは、お兄さんの前だけでなんですから……」"
translation = "「하, 하지만…… 그게, 다른 사람에게는 절대로 비밀이니까요? 이런 야한 모습을 보여주는 건, 오빠 앞에서뿐이니까요……」"

[[dialogue]]
speaker = "サチ"
original = "「んっ……ちゅっ<emoji=heart04>\u3000好きです、お兄さん……<emoji=heart04>」"
translation = "「응…… 츄릅<emoji=heart04> 좋아해요, 오빠……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「……それじゃあ、落ち着いたら掃除して、一緒に帰りましょう……って、お兄さん？」"
translation = "「……그러면, 진정되면 청소하고 같이 돌아가요…… 어라, 오빠?」"

[[dialogue]]
speaker = "サチ"
original = "「――えっ、もう１回したい……！？\u3000あ……さっき出したばかりなのに、お兄さんのおち○ちん、もう大きくなって……<emoji=heart04>」"
translation = "「――엣, 한 번 더 하고 싶다고요……!? 아…… 방금 막 냈는데도, 오빠 자지, 벌써 커져서……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「そ、そんな、ダメですっ。１回だけって言ったじゃないですか！\u3000もう、お兄さんは性欲強すぎですっ」"
translation = "「그, 그런, 안 돼요. 한 번뿐이라고 했잖아요! 정말이지, 오빠는 성욕이 너무 강해요」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん。でも、普段のエッチ禁止なサチの姿を見てると、ついまたエッチな顔が見たくなっちゃうんだ」"
translation = "「미안. 하지만 평소에 섹스 금지라며 내외하는 사치의 모습을 보고 있으면, 나도 모르게 다시 야한 얼굴이 보고 싶어진단 말이야」"

[[dialogue]]
speaker = "サチ"
original = "「そ、そういうことを言うのは禁止ですっ。やっ<emoji=heart04>\u3000お兄さん、ダメぇ……<emoji=heart04>」"
translation = "「그, 그런 말을 하는 건 금지예요. 얏<emoji=heart04> 오빠, 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
original = "「エッチ繰り返してたら、帰るの遅くなっちゃいますからぁ……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「섹스 계속하다가는 돌아가는 게 늦어져 버리니까요오……<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも強くは抵抗しないサチと、夜遅くまでパンパンと卑猥な音を響かせてしまうのだった――"
translation = "그렇게 말하면서도 강하게 저항하지 않는 사치와, 밤늦게까지 퍽퍽 소리 나는 음란한 소리를 울려 퍼뜨리고 마는 것이었다――"

