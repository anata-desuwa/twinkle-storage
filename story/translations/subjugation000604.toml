[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「キィーーッ、悔しい～っ！」"
translation = "「키이익, 분해~!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「なんで！？\u3000どうしてなの！？\u3000私だって一生懸命やってるのにぃ～っ！」"
translation = "「왜!? 어째서인 거야!? 나도 열심히 하고 있는데에~!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「うぅ……な、泣いてなんかいないわ！\u3000私はまだ負けてないんだからっ！」"
translation = "「으으…… 우, 울지 않았어! 나는 아직 지지 않았으니까!」"

