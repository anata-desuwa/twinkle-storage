[[dialogue]]
speaker = "unk"
original = "第４話,最高のクリスマスプレゼント,P"
translation = "제4화, 최고의 크리스마스 선물, P"

[[dialogue]]
speaker = "unk"
original = "楽しかった流星寮のクリスマスパーティーも終わり、家に帰ってきた。"
translation = "즐거웠던 유성 기숙사의 크리스마스 파티도 끝나고 집으로 돌아왔다."

[[dialogue]]
speaker = "アポロ"
original = "「ありがとな、家に連れてきてくれて」"
translation = "「고마워, 집에 데려다줘서.」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしも後片付けを手伝いたかったけど、後はこっちでやる～って他のみんなに取られちゃったんだ」"
translation = "「나도 뒷정리를 돕고 싶었지만, 나머지는 우리가 할게~ 라면서 다른 녀석들이 가로채 버렸어.」"

[[dialogue]]
speaker = "unk"
original = "流星寮の寮生じゃないからなぁ"
translation = "유성 기숙사생이 아니니까 말이야"

[[dialogue]]
speaker = "unk"
original = "俺も同じだ"
translation = "나도 마찬가지야"

[[dialogue]]
speaker = "アポロ"
original = "「魔王はここまで手伝ってくれただけで十分だ。アニュラスも舞亜もすごく感謝してたぞ」"
translation = "「마왕은 여기까지 도와준 것만으로도 충분해. 아뉴라스도 마이아도 무척 고마워했어.」"

[[dialogue]]
speaker = "アポロ"
original = "「とにかく、片付けは他の連中に任せた！\u3000フィオナとメイド達も、楽しませてもらったぶん仕事はすると言っていたからな」"
translation = "「어쨌든 정리는 다른 녀석들에게 맡겼다! 피오나와 메이드들도 즐긴 만큼 일은 하겠다고 했으니까.」"

[[dialogue]]
speaker = "アポロ"
original = "「…………だから、ちょっと寂しい」"
translation = "「…………그래서, 조금 외로워.」"

[[dialogue]]
speaker = "アポロ"
original = "「今、家に帰ってもみんないないからな。だから……その……もうちょっとだけ、一緒にいたい」"
translation = "「지금 집에 가도 아무도 없으니까 말이야. 그러니까…… 그…… 조금만 더, 같이 있고 싶어.」"

[[dialogue]]
speaker = "アポロ"
original = "「なんだ、その顔は！\u3000あたしらしくないと言いたいんだろう？」"
translation = "「뭐야, 그 얼굴은! 나답지 않다고 말하고 싶은 거지?」"

[[dialogue]]
speaker = "アポロ"
original = "「でもヒーローは強いだけじゃダメなんだ。弱さもあって、それを乗り越えるところがかっこいいんだ」"
translation = "「하지만 히어로는 강하기만 해서는 안 돼. 약함도 있고, 그걸 극복하는 점이 멋있는 거야.」"

[[dialogue]]
speaker = "アポロ"
original = "「つまり……あたしも弱いところを見せて、いいか……？\u3000いいだろ……恋人のおまえにくらい甘えても……」"
translation = "「그러니까…… 나도 약한 모습을 보여도, 될까……? 괜찮지…… 연인인 너에게 정도는 응석 부려도……」"

[[dialogue]]
speaker = "unk"
original = "大歓迎だ！"
translation = "대환영이야!"

[[dialogue]]
speaker = "アポロ"
original = "「そうか！\u3000ありがとな、魔王！」"
translation = "「그래! 고마워, 마왕!」"

[[dialogue]]
speaker = "アポロ"
original = "「ほら、残り物をくすねてきたぞ。アニュラスが焼いたチキンもあるんだ！」"
translation = "「봐라, 남은 음식을 슬쩍해 왔어. 아뉴라스가 구운 치킨도 있다구!」"

[[dialogue]]
speaker = "アポロ"
original = "「あそこじゃ魔王も忙しくて、あまり食べてないんだろ？\u3000あたしもそうだからお腹がペコペコなんだ」"
translation = "「거기선 마왕 너도 바빠서 별로 못 먹었잖아? 나도 그러니까 배가 고파 죽겠어.」"

[[dialogue]]
speaker = "アポロ"
original = "「よーし、ここからは２人だけのパーティーだ！\u3000いいな、魔王！」"
translation = "「좋아, 여기서부터는 둘만의 파티다! 알겠지, 마왕!」"

[[dialogue]]
speaker = "アポロ"
original = "「準備はいいかー？\u3000それじゃ、行くぞー」"
translation = "「준비됐어? 그럼 간다ー」"

[[dialogue]]
speaker = "アポロ＆クロト"
original = "「かんぱーい！」"
translation = "「건배!」"

[[dialogue]]
speaker = "unk"
original = "ジュースを注いだグラスを合わせると、チンと小気味よい音が響く。"
translation = "주스를 따른 잔을 부딪치자, 챙 하는 기분 좋은 소리가 울려 퍼진다."

[[dialogue]]
speaker = "アポロ"
original = "「むぐむぐむぐ……んまい！\u3000アニュラスはチキンを焼くのだけは上手だな！」"
translation = "「우물우물우물…… 마시쩡! 아뉴라스는 치킨 굽는 것 하나는 끝내주네!」"

[[dialogue]]
speaker = "アポロ"
original = "「他の連中が作ったのもあるぞ。こっちのは見たことないな、試してみよう！」"
translation = "「다른 녀석들이 만든 것도 있어. 이건 처음 보는 건데, 한번 먹어보자구!」"

[[dialogue]]
speaker = "unk"
original = "みんな料理上手だ"
translation = "다들 요리 솜씨가 좋네"

[[dialogue]]
speaker = "unk"
original = "どれもおいしい"
translation = "전부 맛있어"

[[dialogue]]
speaker = "アポロ"
original = "「魔王だって料理上手だろ？\u3000みんな褒めてたぞ」"
translation = "「마왕 너도 요리 잘하잖아? 다들 칭찬하더라구.」"

[[dialogue]]
speaker = "アポロ"
original = "「恋人が褒められるとうれしいな！\u3000ちょっぴりくすぐったいけど、幸せな感じがする」"
translation = "「연인이 칭찬받으니까 기분 좋은걸! 조금 간지럽긴 하지만, 행복한 기분이야.」"

[[dialogue]]
speaker = "アポロ"
original = "「クリスマスフォームも褒められすぎてうんざりしたけど、別に嫌じゃないんだ。可愛いって思われたいって気持ちがないわけじゃないからな」"
translation = "「크리스마스 폼도 너무 칭찬받아서 지긋지긋했는데, 딱히 싫은 건 아냐. 귀엽게 보이고 싶다는 마음이 없는 건 아니니까 말야.」"

[[dialogue]]
speaker = "アポロ"
original = "「なぁ、魔王……。あたしのこと、どう思う？\u3000可愛いって思ってくれるか？」"
translation = "「저기, 마왕……. 나에 대해 어떻게 생각해? 귀엽다고 생각해 주냐?」"

[[dialogue]]
speaker = "unk"
original = "可愛いしかない！"
translation = "귀여움 그 자체야!"

[[dialogue]]
speaker = "unk"
original = "可愛いよ！"
translation = "귀여워!"

[[dialogue]]
speaker = "アポロ"
original = "「そ、そっか。えへへ、やっぱり何度言われても嬉しいものだな<emoji=heart04>」"
translation = "「그, 그래? 에헤헤, 역시 몇 번을 들어도 기쁜 법이구나<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ここにはおまえしかいないから……特別に見せてやるか」"
translation = "「여기엔 너밖에 없으니까…… 특별히 보여줘 볼까.」"

[[dialogue]]
speaker = "アポロ"
original = "「どうだ？\u3000魔王は特別だから、じっくり見ていいぞ……」"
translation = "「어때? 마왕은 특별하니까, 빤히 쳐다봐도 된다구……」"

[[dialogue]]
speaker = "アポロ"
original = "「うおっ、めちゃくちゃ近づいたな？」"
translation = "「우왓, 엄청나게 가까워졌잖아?」"

[[dialogue]]
speaker = "unk"
original = "もっと近くでもいい"
translation = "더 가까워도 좋아"

[[dialogue]]
speaker = "unk"
original = "この距離がベストだ"
translation = "이 거리가 베스트야"

[[dialogue]]
speaker = "アポロ"
original = "「こんなの……息がかかっちゃいそうだぞ。って、スハスハするな！\u3000今、けっこう汗かいてるんだ！」"
translation = "「이런 건…… 숨결이 닿을 것 같잖아. 이봐, 킁킁대지 마! 지금 꽤 땀 흘리고 있단 말야!」"

[[dialogue]]
speaker = "アポロ"
original = "「ううう～っ、おまえが恋人じゃなきゃ、ぜったい許さないところだ……」"
translation = "「으으으~ 너가 연인이 아니었으면 절대로 용서 안 했을 거다……」"

[[dialogue]]
speaker = "アポロ"
original = "「くそっ、あたしも反撃だ！\u3000おまえのことめちゃくちゃ見てやるぞ！\u3000匂いもかいじゃうからな！」"
translation = "「젠장, 나도 반격이다! 너를 아주 뚫어지게 쳐다봐 줄 테니까! 냄새도 맡아버릴 거라구!」"

[[dialogue]]
speaker = "アポロ"
original = "「すんすん……すんっ……」"
translation = "「킁킁…… 킁……」"

[[dialogue]]
speaker = "アポロ"
original = "「ううっ、なんだこれ……恥ずかしすぎるぞ！\u3000どうして正気でこんなこと出来るんだ！？」"
translation = "「으으, 뭐야 이거…… 너무 부끄럽잖아! 어떻게 제정신으로 이런 짓을 할 수 있는 거냐!?」"

[[dialogue]]
speaker = "unk"
original = "アポロに恋してるから"
translation = "아폴로를 사랑하니까"

[[dialogue]]
speaker = "アポロ"
original = "「お、おまえなぁぁっ！！\u3000そういうのは反則だ！」"
translation = "「너, 너어어엇!! 그런 건 반칙이다!」"

[[dialogue]]
speaker = "アポロ"
original = "「ったく、あたしみたいなののどこがいいんだ？\u3000恋してるとか、普通じゃないぞ」"
translation = "「참 나, 나 같은 녀석의 어디가 좋다는 거야? 사랑한다니, 보통이 아니라고.」"

[[dialogue]]
speaker = "アポロ"
original = "「でも、そんなおまえだから、あたしも……うん……好きになっちゃったんだろうな……<emoji=heart04>」"
translation = "「하지만 그런 너니까 나도…… 응…… 좋아하게 된 거겠지……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「もうっ、なにを言ってもこっちが恥ずかしい感じになりそうだから、この話は終わりだ！」"
translation = "「정말, 무슨 말을 해도 이쪽이 부끄러워질 것 같으니까 이 이야기는 끝이야!」"

[[dialogue]]
speaker = "アポロ"
original = "「パーティーのときはお互い忙しかったから、後回しになっちゃったけど……」"
translation = "「파티 때는 서로 바빠서 뒤로 미뤄졌었지만……」"

[[dialogue]]
speaker = "アポロ"
original = "「クリスマスプレゼントだ、もらってくれるか？」"
translation = "「크리스마스 선물이다, 받아줄래?」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしはおまえの恋人だからな。ちゃんと彼女らしいことも出来るって見せないと」"
translation = "「나는 네 연인이니까 말야. 제대로 여자친구다운 것도 할 수 있다는 걸 보여줘야지.」"

[[dialogue]]
speaker = "unk"
original = "お返しに俺も"
translation = "답례로 나도"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워"

[[dialogue]]
speaker = "アポロ"
original = "「おまえも用意してたのか？\u3000いや、クリスマスプレゼントくらい普通か」"
translation = "「너도 준비했었어? 아니, 크리스마스 선물 정도는 보통인가.」"

[[dialogue]]
speaker = "アポロ"
original = "「でも期待してなかったからうれしいぞ。サプライズってやつだな！」"
translation = "「하지만 기대 안 하고 있었으니까 기쁜걸. 서프라이즈라는 거네!」"

[[dialogue]]
speaker = "アポロ"
original = "「おまえがくれたクリスマスプレゼントかぁ……えへへ……なんだよこれ、めちゃくちゃうれしいぞ」"
translation = "「네가 준 크리스마스 선물이라니…… 에헤헤…… 뭐야 이거, 엄청나게 기쁘다구.」"

[[dialogue]]
speaker = "アポロ"
original = "「なにをくれたのか気になるけど、開けるのは後にしよう」"
translation = "「뭐가 들었는지 궁금하지만, 열어보는 건 나중에 할래.」"

[[dialogue]]
speaker = "アポロ"
original = "「今見たら、あたし絶対でれでれしちゃいそうだもんな。いくらおまえ相手でも、恥ずかしすぎる」"
translation = "「지금 보면 나 분명 데레데레해질 것 같거든. 아무리 너라고 해도 너무 부끄러워.」"

[[dialogue]]
speaker = "unk"
original = "でれでれアポロが見たい！"
translation = "데레데레하는 아폴로가 보고 싶어!"

[[dialogue]]
speaker = "unk"
original = "開けて！"
translation = "열어봐!"

[[dialogue]]
speaker = "アポロ"
original = "「ほんとにおねだり上手だな、おまえは。今まで何回それにやられたことか……」"
translation = "「정말 조르기 대장이라니까, 너는. 지금까지 몇 번이나 거기에 당했는지……」"

[[dialogue]]
speaker = "アポロ"
original = "「でもっ、今回はダメだ！\u3000絶対開けないからな！」"
translation = "「하지만 이번엔 안 돼! 절대 안 열 거니까!」"

[[dialogue]]
speaker = "アポロ"
original = "「その代わり……これをやるぞ」"
translation = "「대신에…… 이걸 주지.」"

[[dialogue]]
speaker = "アポロ"
original = "「ちゅ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「……………………ちゅーしちゃった。自分から、魔王にちゅーしちゃった……」"
translation = "「……………………뽀뽀해버렸다. 내가 먼저, 마왕한테 뽀뽀해버렸어……」"

[[dialogue]]
speaker = "アポロ"
original = "「うわぁぁ、なにやってんだ、あたし。こら、こっち見んな！\u3000顔赤くなってないからな！」"
translation = "「으와아아, 나 무슨 짓을 하는 거야. 이봐, 이쪽 보지 마! 얼굴 안 빨개졌으니까!」"

[[dialogue]]
speaker = "アポロ"
original = "「くそぉ～～～っ、なんでこうなるんだよぉ～～～～っ！！」"
translation = "「젠장~~~ 왜 이렇게 되는 거냐구~~~~!!」"

