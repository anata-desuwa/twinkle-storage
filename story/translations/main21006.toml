[[dialogue]]
speaker = "unk"
original = "第６話,ナターシャの記憶,B"
translation = "제6화, 나타샤의 기억, B"

[[dialogue]]
speaker = "unk"
original = "クロト、ヴィーナス、メルエルが神殿内部で動き出した頃。"
translation = "쿠로토, 비너스, 메르엘이 신전 내부에서 움직이기 시작했을 무렵."

[[dialogue]]
speaker = "unk"
original = "梨緒とナターシャも同じく、神殿内に墜落していた。"
translation = "리오와 나타샤도 마찬가지로 신전 내부에 추락해 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くっ……飛べない……さっきの爆発のせいか？」"
translation = "「큭…… 날 수 없어…… 방금 전 폭발 때문인가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「みんな、大丈夫か？」"
translation = "「모두 괜찮나?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「くそっ！\u3000魔王ピンポイント狙いとかそんなのアリ！？\u3000聞いてないっての！？」"
translation = "「젠장! 마왕 핀포인트 저격이라니 그런 게 어딨어!? 들어본 적 없다고!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ナターシャ……？」"
translation = "「나타샤……?」"

[[dialogue]]
speaker = "unk"
original = "普段の飄々とした態度と打って変わって、焦りと憤りを露わにするナターシャ。"
translation = "평소의 유유자적한 태도와는 딴판으로 초조함과 분노를 드러내는 나타샤."

[[dialogue]]
speaker = "unk"
original = "初めて見る仲間の様子に、梨緒も困惑の表情を浮かべる。"
translation = "처음 보는 동료의 모습에 리오도 당혹스러운 표정을 짓는다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「くそっ、くそっ……失敗した……！\u3000これじゃ任務が……メルエルを見つけないと……」"
translation = "「젠장, 젠장…… 실패했어……! 이래선 임무가…… 메르엘을 찾아야 하는데……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「落ち着け、ナターシャ」"
translation = "「진정해, 나타샤.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒は何も知らないでしょ！」"
translation = "「리오는 아무것도 모르잖아!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだ。君の任務のことなんて知らない」"
translation = "「그래. 네 임무 같은 건 모른다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが私が取り乱した時、君が落ち着かせてくれた。頼んでもいないのに、ズケズケと言ってくれただろう」"
translation = "「하지만 내가 평정을 잃었을 때 네가 진정시켜 주었지. 부탁하지도 않았는데 거리낌 없이 말해주지 않았나.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから今は私が言うんだ。落ち着け、騒いだところで事態は好転しない」"
translation = "「그러니 이번엔 내가 말하겠다. 진정해라, 소란을 피운다고 사태가 호전되지는 않아.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒……」"
translation = "「리오……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ごめん、ちょっと動転してた」"
translation = "「미안, 좀 동요했어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はぁ……梨緒になだめられるとか、私も焼きが回っちゃったかな」"
translation = "「하아…… 리오한테 위로를 받다니, 나도 실력이 녹슬었나 보네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「どういう意味だ」"
translation = "「무슨 의미냐.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが頭が冷えたならよかった。では、ひとまず整理するぞ」"
translation = "「하지만 머리를 식혔다니 다행이군. 그럼 일단 정리하겠다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私たちはガーディアンの自爆に巻き込まれて、神殿内部に墜落した。飛行ができないのもおそらくそのガーディアンによるものだ」"
translation = "「우리는 가디언의 자폭에 휘말려 신전 내부에 추락했다. 비행을 할 수 없는 것도 아마 그 가디언 때문이겠지.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん。あのガーディアンは多分、魔王の力に反応して爆発するようになっていたんだと思う」"
translation = "「응. 저 가디언은 아마 마왕의 힘에 반응해서 폭발하도록 되어 있었던 것 같아.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「来る途中で説明した通り、この神殿は２０００年前、魔王に襲われたことがある」"
translation = "「오는 길에 설명했듯이 이 신전은 2000년 전 마왕에게 습격당한 적이 있어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「魔王に対して何かしら対策があるって、気付けたと思うんだけどな……。私が気を付けておかないといけなかったのに……」"
translation = "「마왕에 대해 무언가 대책이 있을 거라고 눈치챌 수 있었을 텐데……. 내가 주의했어야 했는데…….」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「聖庭園で神殿の調査は行わなかったのか？」"
translation = "「성정원에서 신전 조사는 하지 않았던 건가?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「神殿は強力なガーディアンに防衛されてたから、なかなか近づけなかったんだよ」"
translation = "「신전은 강력한 가디언에게 방어되고 있어서 좀처럼 접근할 수 없었어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「神殿を守ってくれるガーディアンを倒してまで、調査するのは合理的じゃないでしょ？」"
translation = "「신전을 지켜주는 가디언을 쓰러뜨려 가면서까지 조사하는 건 합리적이지 않잖아?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「確かにな。でもそれならナターシャが悪いわけではないし、悔いても仕方ないことだろう」"
translation = "「확실히 그렇군. 하지만 그렇다면 나타샤 네 잘못이 아니고, 후회해봤자 어쩔 수 없는 일이겠지.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「珍しく梨緒の方が切り替え早いなー。まぁそうだけど」"
translation = "「드물게 리오 쪽이 전환이 빠르네~. 뭐, 그렇지만.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「問題は味方と離れたこと、敵もまた神殿内部に侵入した可能性が高いことだ」"
translation = "「문제는 아군과 떨어졌다는 것, 적 또한 신전 내부에 침입했을 가능성이 높다는 점이다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「合流したいところだが……みんな実力者だ、私たちのようにそれぞれ生き残っているだろう」"
translation = "「합류하고 싶지만…… 다들 실력자다, 우리처럼 각자 살아남아 있겠지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それより神殿の中枢に極星星徒会が到着する方がまずい。私たちも奥を目指すべきだ」"
translation = "「그보다 신전 중추에 극성성도회가 도착하는 것이 더 위험해. 우리도 안쪽을 목표로 해야 한다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まぁ……そうだよね。メルエルたちも奥を目指してるなら、結果的にその方が合流もしやすいか」"
translation = "「뭐…… 그렇겠지. 메르엘 일행도 안쪽을 목표로 하고 있다면 결과적으로 그쪽이 합류하기도 쉽겠고.」"

[[dialogue]]
speaker_original = "フェアリー"
speaker_translation = "페어리"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「やはり神殿内部にもガーディアンがいたか──！」"
translation = "「역시 신전 내부에도 가디언이 있었나──!」"

[[dialogue]]
speaker_original = "フェアリー"
speaker_translation = "페어리"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「く……！？」"
translation = "「큭……!?」"

[[dialogue]]
speaker = "？？？"
original = "『私たちは歴史の影。闇に生き、消える者』"
translation = "『우리는 역사의 그림자. 어둠 속에 살며 사라지는 자』"

[[dialogue]]
speaker = "？？？"
original = "『あなたの命は天界のためにある』"
translation = "『당신의 목숨은 천계를 위해 존재한다』"

[[dialogue]]
speaker = "？？？"
original = "『あの子を守りなさい。もしあの子が死ぬなら、あなたが代わりに死になさい』"
translation = "『그 아이를 지키렴. 만약 그 아이가 죽는다면, 네가 대신 죽으렴』"

[[dialogue]]
speaker = "？？？"
original = "『それが天界に生きる天使たちのためであり、あなたの生まれた意味よ』"
translation = "『그것이 천계에 살아가는 천사들을 위한 길이며, 네가 태어난 의미란다』"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「邪魔だ……！」"
translation = "「방해다……!」"

[[dialogue]]
speaker = "unk"
original = "頭の中に響く声に困惑しながらも、梨緒はクロスボウの一撃でガーディアンを射貫く。"
translation = "머릿속에 울리는 목소리에 당혹해하면서도, 리오는 크로스보우 일격으로 가디언을 꿰뚫는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今の声は……何だ？」"
translation = "「방금 그 목소리는…… 뭐지?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ～、さっきの聞こえたんだ。ごめん。多分、私の記憶」"
translation = "「아~, 방금 거 들렸구나. 미안. 아마 내 기억일 거야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ナターシャの記憶……？」"
translation = "「나타샤의 기억……?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん。侵入者を惑わせるために、記憶を喚起してるんじゃないかな」"
translation = "「응. 침입자를 현혹하기 위해서 기억을 환기하고 있는 게 아닐까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒にまであれが聞こえたのは、きっとついでだね。侵入者が複数いる場合、余計に苦しむようにしてるんだ」"
translation = "「리오에게까지 저게 들린 건 분명 덤이겠네. 침입자가 여러 명일 경우, 더 괴로워하도록 설정되어 있는 거야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「じゃあ今のは、本当に誰かが君に言った言葉なのか？\u3000しかも君の声に似ている気がしたが……」"
translation = "「그럼 방금 건 정말로 누군가가 너에게 했던 말인가? 게다가 네 목소리와 닮았던 것 같다만……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そりゃ似てるよ。言ったのはうちの母親だからね」"
translation = "「그야 닮았겠지. 말한 건 우리 엄마니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「母親が……！？\u3000実の娘に命を捨てろと言ったのか！？」"
translation = "「어머니가……!? 친딸에게 목숨을 버리라고 했단 말인가!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そうだよ。うちの家系は代々そんな感じだし」"
translation = "「응. 우리 가계는 대대로 그런 느낌이라서.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「影に生きる暗殺者の家系……ということか」"
translation = "「그림자 속에 사는 암살자 가문……이라는 건가.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だから気にしないで。さっさと進も」"
translation = "「그러니까 신경 쓰지 마. 어서 가자.」"

[[dialogue]]
speaker = "unk"
original = "墜落して取り乱した時とは反対に、あっけらかんとするナターシャ。"
translation = "추락해서 당황했을 때와는 반대로, 아무렇지도 않게 구는 나타샤."

[[dialogue]]
speaker = "unk"
original = "だが梨緒は眉をひそめたままだ。"
translation = "하지만 리오는 여전히 미간을 찌푸린 채다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒？」"
translation = "「리오?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……私は君のことをよく知っているわけではない。あまり感情を見せない君のことだから、なんとも思っていないのかもしれない」"
translation = "「……나는 너에 대해 잘 아는 건 아니다. 좀처럼 감정을 드러내지 않는 너니까, 아무렇지도 않게 생각할지도 모르지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが……不愉快だ」"
translation = "「하지만…… 불쾌하다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「不愉快？」"
translation = "「불쾌해?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だって、自分の意志で命を懸けるのと、人に命を捨てさせられるのは違うだろう……！」"
translation = "「그야, 자신의 의지로 목숨을 거는 것과, 타인에 의해 목숨을 버리게 되는 건 다르지 않나……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから……不愉快だ。たとえ君がそれを良しとしていても」"
translation = "「그러니까…… 불쾌하다. 설령 네가 그것을 받아들였다 하더라도.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふっ」"
translation = "「훗.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「何がおかしい？」"
translation = "「뭐가 웃기지?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いや、確かに不愉快だなって思って。親の言うことでもムカつく時はムカつくよね」"
translation = "「아니, 확실히 불쾌하겠구나 싶어서. 부모가 하는 말이라도 짜증 날 땐 짜증 나니까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「んじゃ気を取り直して、神殿の中を探検といきますか」"
translation = "「그럼 기분 전환하고, 신전 안을 탐험해 볼까.」"

