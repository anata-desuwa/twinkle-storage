[[dialogue]]
speaker = "unk"
original = "空間転移装置の開発により、紫桜の里との交流が進んだ。"
translation = "공간 전이 장치의 개발로 인해, 자앵 마을과의 교류가 진전되었다."

[[dialogue]]
speaker = "unk"
original = "あちらから来ることもあれば、反対にこちらが里を来訪することもある。"
translation = "그쪽에서 오는 일도 있는가 하면, 반대로 이쪽에서 마을을 방문하는 일도 있다."

[[dialogue]]
speaker = "unk"
original = "今回はせつなと一緒に里を訪れているのだが――"
translation = "이번에는 세츠나와 함께 마을을 방문하고 있었는데――"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うにゃっ！？\u3000にゃああああ～～～～っ！！」"
translation = "「우냐앗!? 냐아아아아～～～～!!」"

[[dialogue]]
speaker = "unk"
original = "せつなの部屋から、謎の悲鳴が聞こえた。あの猫っぽい感じは、間違いなくせつなだ。"
translation = "세츠나의 방에서 정체불명의 비명이 들려왔다. 저 고양이 같은 느낌은 틀림없이 세츠나다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おおっ、主様！\u3000これはいいところに！\u3000助けて欲しいでござるよ～！」"
translation = "「오옷, 주인님! 이거 마침 잘 오셨소! 도와줬으면 하오나～!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「誰かがせつなの部屋に忍び込んで、罠をしかけたに違いないでござる～～っ！」"
translation = "「누군가 세츠나의 방에 몰래 들어와서 함정을 설치한 게 분명하오～～!」"

[[dialogue]]
speaker = "unk"
original = "せつなはがんじがらめになっていて、あちこち見えてしまっている。"
translation = "세츠나는 꽁꽁 묶여 있어서, 여기저기 다 보여버리고 있다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ううっ、主様の目がえっちでござる……もしや、縛られて動けないせつなに劣情を催したでござるか？」"
translation = "「우우, 주인님의 눈이 야하오…… 혹시, 묶여서 움직이지 못하는 세츠나에게 열정을 품은 것이오?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「わかったでござる。この醜態を招いたのは他でもない、このせつな。責任は痛感しておりますから、そのぉー……」"
translation = "「알겠소. 이 추태를 부른 것은 다름 아닌 이 세츠나. 책임은 통감하고 있으니, 그게……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ダメ忍者のせつなに、お仕置きして欲しいでござる<emoji=heart04>」"
translation = "「못난 닌자인 세츠나에게, 벌을 주었으면 하오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "以前にもこんな流れがあったような気がするが、せつなが頼むなら仕方ない。"
translation = "이전에도 이런 흐름이 있었던 것 같은 기분이 들지만, 세츠나가 부탁한다면 어쩔 수 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よし、お仕置き決定♪」"
translation = "「좋아, 벌주기 결정♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「やったー！」"
translation = "「얏호!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「喜んでるんじゃない！\u3000この淫乱ま○こめっ！」"
translation = "「기뻐하지 마! 이 음란 보지년아!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はうっ！\u3000んんっ、いきなり乳首をっっ……ぎゅうってしたらびっくりしちゃうでござるよ……いつもよりハードな行為を期待しちゃうでござる……」"
translation = "「하윽! 응윽, 갑자기 젖꼭지를…… 꼬옥 하면 깜짝 놀라버리오…… 평소보다 하드한 행위를 기대해버리오……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「房中術を使っている時は、いつもらぶらぶでござるからなぁ。あれはあれで最高でござるが、時には壊れるくらいに激しくして欲しいかもでござる<emoji=heart04>」"
translation = "「방중술을 쓰고 있을 때는 항상 러브러브하오니까. 그것도 그것대로 최고이오만, 때로는 망가질 정도로 격렬하게 해줬으면 할지도 모르겠소<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "調子に乗るせつなに向かって、勃起したペニスを見せつける。"
translation = "우쭐해하는 세츠나를 향해 발기한 페니스를 보여준다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「す、すごっ……もうそんなになってるでござるか？」"
translation = "「우, 우와…… 벌써 그렇게 되어버린 것이오?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ううっ、そんなすごいの見せられたら、せつなも期待でスケベになっちゃうでござるよ……」"
translation = "「우우, 그런 대단한 걸 보여주면 세츠나도 기대감에 음탕해져 버리오……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んうっ！\u3000ゆ、指ぃぃ～……ズプズプって……入ってきたぁ……<emoji=heart04>」"
translation = "「응윽! 소, 손가락이이～…… 즈부즈부하고…… 들어왔어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んあっ……はぁっ、ああっ……ふぁんっ！！\u3000ナカでグリグリしないでぇぇっ……せつなはっ……せつなはもうっっ……」"
translation = "「응앗…… 하아, 아앗…… 화앙!! 안에서 구리구리 하지 마아아…… 세츠나는…… 세츠나는 이제에……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んああぁぁ～～～～～っっ<emoji=heart04>」"
translation = "「응아아아아～～～～～<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「いきなりっ……挿入なんてっ……はぁぁっ、主様のおち○ちんっ、奥までずっぷり入れられちゃったでござるぅぅっっ<emoji=heart04>」"
translation = "「갑자기…… 삽입이라니…… 하아아, 주인님의 자지, 안쪽까지 즈뿍 넣어버렸소오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁっ……はぁっ……んんんっ！\u3000くふっ……やっぱり主様のおち○ちん、しゅごい……一撃でわからせられちゃったでござるよ……」"
translation = "「하아…… 하아…… 응응윽! 쿠후…… 역시 주인님의 자지, 대단해…… 일격에 참교육 당해버렸소……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「挿入して終わりだと思うなよ？」"
translation = "「삽입해서 끝이라고 생각하지 마라?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「も、もちろんでござる。いくらせつなのおま○こが名器と言えど、挿れただけで主様のおち○ちんを射精させられるほど、まだ房中術を極めてないでござる！」"
translation = "「다, 당연하오. 아무리 세츠나의 보지가 명기라 해도, 넣은 것만으로 주인님의 자지를 사정시킬 정도로 아직 방중술을 마스터하지 못했소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「いつもみたいに腰を動かして、ぐちょぐちょぬちょぬちょ出し入れするのでござろう！\u3000せつなにはお見通しでござるっ」"
translation = "「평소처럼 허리를 움직여서, 구쵸구쵸 누쵸누쵸 넣었다 뺐다 하는 것이오! 세츠나는 다 꿰뚫어 보고 있소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「さあ、主様！\u3000参られよ！\u3000せつなのぐちょ濡れおま○こはっ、主様のお仕置きを待ってるでござる！」"
translation = "「자, 주인님! 오시구려! 세츠나의 흠뻑 젖은 보지는, 주인님의 벌을 기다리고 있소!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……やる気満々だなぁ」"
translation = "「……의욕 충만이네.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「だ、だって……主様がせつなを気持ちよくするからぁ……」"
translation = "「그, 그치만…… 주인님이 세츠나를 기분 좋게 해주니까아……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかったわかった。今日はせつなのドスケベなむちむちボディを、これでもかってくらい使ってあげるから」"
translation = "「알았어 알았어. 오늘은 세츠나의 음탕하고 육덕진 몸을 아주 질릴 정도로 써줄 테니까.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うん……ご指導、よろしくお願いします……でござる<emoji=heart04>」"
translation = "「응…… 지도 편달, 부탁드리오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふあぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000今日の主様っ、しゅごいぃ～っ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 굉장해<emoji=heart04> 오늘의 주인님, 대단해애～<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ずんずんって、カチカチのおち○ちんでっ、せつなのおま○こほじってっ……こんなのずるいっ<emoji=heart04>\u3000すぐダメになっちゃうでござるよぉぉ<emoji=heart04>」"
translation = "「즈음즈음하고, 딱딱한 자지로, 세츠나의 보지를 파헤치고…… 이런 건 반칙이오<emoji=heart04> 금방 가버릴 것 같소오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んんぅ～っ……主様ぁ<emoji=heart04>\u3000もっと……もっとせつなをいじめて欲しいでござるっ<emoji=heart04>\u3000おっぱいも……切なくてうずうずしてるでござるっ<emoji=heart04>」"
translation = "「응응으～…… 주인님<emoji=heart04> 더…… 더 세츠나를 괴롭혀줬으면 하오<emoji=heart04> 가슴도…… 애타서 근질근질하오<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「縛られてるせいでむちむち度が更に際立ってるな。まったく、こんなに実らせて……スケベ忍者め」"
translation = "「묶여있는 탓에 육덕진 정도가 더 두드러지는군. 정말이지, 이렇게나 여물어서…… 음탕한 닌자 녀석.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「スケベでごめんなさいでござるっ、でもっ……主様好みの房中術には、適した体でござるからっ……もっと……いっぱいして欲しいでござるっ<emoji=heart04>」"
translation = "「음탕해서 죄송하오, 하지만…… 주인님 취향의 방중술에는 적합한 몸이오니까…… 더…… 많이 해줬으면 하오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「好きなだけせつなで気持ちよくなってぇぇっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000主様専用の……せつなの淫乱肉壺にっ、せーしっ<emoji=heart04>\u3000いっぱい出してぇぇっ<emoji=heart04>」"
translation = "「마음껏 세츠나로 기분 좋아져어어<emoji=heart04> 하앙<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 주인님 전용…… 세츠나의 음란 육단지에, 정자<emoji=heart04> 잔뜩 내보내줘어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様っ<emoji=heart04>\u3000主さまぁ<emoji=heart04>\u3000せつなは主様専属でござりますればっ……そのぉ……覚悟もできてるでござるよ<emoji=heart04>」"
translation = "「주인님<emoji=heart04> 주인님<emoji=heart04> 세츠나는 주인님 전속이오니…… 그게…… 각오도 되어 있소<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「頑張って……せーし搾るからっっ<emoji=heart04>\u3000せつなをにんにん、させて欲しいでござるっ<emoji=heart04>」"
translation = "「힘내서…… 정자 쥐어짤 테니까아<emoji=heart04> 세츠나를 임신임신, 시켜줬으면 하오<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「にんにんって、妊妊かよっ」"
translation = "「닌닌이라더니, 임신(닌닌)이냐.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えへへ～、うまいこと言えたでござるか？\u3000でも、冗談ではないでござるよ<emoji=heart04>\u3000せつなは……主様のこと……<emoji=heart04>」"
translation = "「에헤헤～, 말 잘했소? 하지만 농담이 아니오<emoji=heart04> 세츠나는…… 주인님을……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「こ、これ以上は言えないでござる～～～っ<emoji=heart04>」"
translation = "「더, 더 이상은 말 못 하겠소～～～<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でもでもっ、せつなが主様の子を孕むのをっ、里のみんなも待ち焦がれております故っ……」"
translation = "「하지만 하지만, 세츠나가 주인님의 아이를 배는 것을 마을 사람들도 간절히 기다리고 있기에……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そのぉ……せつなも、欲しいなって<emoji=heart04>\u3000だから、主さまぁ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그게…… 세츠나도 갖고 싶어서<emoji=heart04> 그러니까, 주인님<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなのおま○こに、種付け……してください……<emoji=heart04>」"
translation = "「세츠나의 보지에, 씨뿌리기…… 해주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「にゃあああああっ！！？\u3000すごいっ<emoji=heart04>\u3000腰、激しいっ<emoji=heart04>\u3000主様っ<emoji=heart04>\u3000せつなのおねだりで興奮しちゃったにゃぁぁっ<emoji=heart04>」"
translation = "「냐아아아아앗!!? 굉장해<emoji=heart04> 허리, 격렬해<emoji=heart04> 주인님<emoji=heart04> 세츠나의 조르기에 흥분해버렸다냐아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいっっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あん<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000主様ぁ<emoji=heart04>\u3000しゅき<emoji=heart04>\u3000しゅきぃぃ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 보지 기분 좋아아<emoji=heart04> 응앗<emoji=heart04> 아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 주인님<emoji=heart04> 좋아<emoji=heart04> 좋아아아～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなはただの忍者なのにっ<emoji=heart04>\u3000主様にこんなにしてもらってっ<emoji=heart04>\u3000光栄でござるよぉぉ<emoji=heart04>」"
translation = "「세츠나는 일개 닌자일 뿐인데<emoji=heart04> 주인님께 이런 대접을 받다니<emoji=heart04> 영광이오오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様っ<emoji=heart04>\u3000もっと……もっと激しくっ<emoji=heart04>\u3000せつなが壊れるくらいっ<emoji=heart04>\u3000あ、愛してっ<emoji=heart04>\u3000愛して欲しいでござる～～っ<emoji=heart04>」"
translation = "「주인님<emoji=heart04> 더…… 더 격렬하게<emoji=heart04> 세츠나가 망가질 정도로<emoji=heart04> 사, 사랑해줘…… 사랑해줬으면 하오～～<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うにゃああっ<emoji=heart04>\u3000言っちゃった……言っちゃったでござるっ<emoji=heart04>\u3000主様<emoji=heart04>\u3000好き<emoji=heart04>\u3000いつもは照れくさくて言えないけどっ<emoji=heart04>\u3000してもらってる時は言えるからっっ<emoji=heart04>」"
translation = "「우냐아앗<emoji=heart04> 말해버렸다…… 말해버렸소<emoji=heart04> 주인님<emoji=heart04> 좋아해<emoji=heart04> 평소에는 쑥스러워서 말 못 하지만<emoji=heart04> 하고 있을 때는 말할 수 있으니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んあっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000声出るっ<emoji=heart04>\u3000気持ちよすぎてっ、おっきな声出ちゃうにゃあああっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 목소리 나와<emoji=heart04> 너무 기분 좋아서, 큰 목소리 나와버린다냐아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こんなでかい声で喘ぎまくってっ、里のみんなに聞かれちゃうんじゃないか？」"
translation = "「이렇게 큰 소리로 계속 헐떡거려서, 마을 사람들에게 다 들리는 거 아냐?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「いいにゃっ、どうせせつなが主様とにゃんにゃんしてるって、みんな知ってるにゃ<emoji=heart04>」"
translation = "「괜찮다냐, 어차피 세츠나가 주인님과 냥냥하고 있다는 거 다들 알고 있다냐<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「こねこ作るにゃっ<emoji=heart04>\u3000主様ぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ちゃんとできるまでっ、何度も種付けして欲しいにゃああああっ<emoji=heart04>」"
translation = "「아기 고양이 만드는 거냐<emoji=heart04> 주인님<emoji=heart04> 아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 제대로 될 때까지, 몇 번이고 씨뿌리기 해줬으면 한다냐아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなにできることならなんでもするからっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとおま○こして欲しいにゃあああっ<emoji=heart04>」"
translation = "「세츠나가 할 수 있는 일이라면 뭐든 할 테니까<emoji=heart04> 더<emoji=heart04> 더 보지 해줬으면 한다냐아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んああああぁあっっ<emoji=heart04>\u3000主様ぁ<emoji=heart04>\u3000ちゅーしてぇ<emoji=heart04>\u3000ちゅーして欲しいにゃあ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 하앙<emoji=heart04> 응아아아아아앗<emoji=heart04> 주인님<emoji=heart04> 뽀뽀해줘어<emoji=heart04> 뽀뽀해줬으면 한다냐아<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んちゅ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000じゅるるるっ<emoji=heart04>\u3000むちゅ～～～～っ<emoji=heart04>」"
translation = "「응츄<emoji=heart04> 츄파<emoji=heart04> 쥬르르르<emoji=heart04> 무츄～～～～<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「やったにゃ<emoji=heart04>\u3000主様とちゅーしちゃったにゃ<emoji=heart04>\u3000ぺろぺろぺろぺろ……」"
translation = "「해냈다냐<emoji=heart04> 주인님과 뽀뽀해버렸다냐<emoji=heart04> 할짝할짝할짝할짝……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もっと……全然足りないにゃ<emoji=heart04>\u3000んちゅ<emoji=heart04>\u3000ちゅう～～～っ<emoji=heart04>\u3000れろれろれろっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅぷっ<emoji=heart04>\u3000んへへ～、主様の味<emoji=heart04>\u3000おいし<emoji=heart04>\u3000好きぃ<emoji=heart04>」"
translation = "「더…… 전혀 부족하다냐<emoji=heart04> 응츄<emoji=heart04> 츄우～～～<emoji=heart04> 레로레로레로<emoji=heart04> 츄파<emoji=heart04> 츄푸<emoji=heart04> 응헤헤~, 주인님의 맛<emoji=heart04> 맛있어<emoji=heart04> 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もっとぎゅってするにゃ<emoji=heart04>\u3000ぺろぺろもして欲しいにゃ<emoji=heart04>\u3000せつなの口に舌入れてぐちゅぐちゅして欲しいにゃあ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「더 꼬옥 해달라냐<emoji=heart04> 할짝할짝도 해줬으면 좋겠다냐<emoji=heart04> 세츠나의 입에 혀 넣어서 구츄구츄 해줬으면 좋겠다냐아～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おねだりの多いにゃんこだなっ」"
translation = "「조르는 게 많은 고양이로군」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなが孕んだら、せつなと主様はつがいにゃ<emoji=heart04>\u3000わがままだって言うにゃ～<emoji=heart04>」"
translation = "「세츠나가 임신하면, 세츠나와 주인님은 한 쌍이라냐<emoji=heart04> 제멋대로라고 말해달라냐～<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いつものござるはどうしたっ？\u3000このっ、ち○ぽで躾けてやるっ」"
translation = "「평소의 고자루는 어디 갔지? 이 자지로 길들여 주마」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うにゃああああ～～～っ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000イく<emoji=heart04>\u3000イくっ<emoji=heart04>\u3000こんなのされたらっ、せつなイッちゃうでござるっっ<emoji=heart04>」"
translation = "「우냐아아아아～～<emoji=heart04> 굉장해<emoji=heart04> 가버려<emoji=heart04> 가버렷<emoji=heart04> 이런 거 당하면, 세츠나 가버리는 것이오오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「にゃっ<emoji=heart04>\u3000にゃああっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁぁ～～～っ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちよすぎるにゃああ～～っ<emoji=heart04>」"
translation = "「냐<emoji=heart04> 냐아앗<emoji=heart04> 아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아아～～<emoji=heart04> 기분 좋아<emoji=heart04> 너무 기분 좋다냐아아～～<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もう無理っ！\u3000無理ぃぃ～～～っ<emoji=heart04>\u3000主様の子種が来る前にっ……イっちゃうっっ<emoji=heart04>」"
translation = "「이제 무리! 무리이이～～<emoji=heart04> 주인님의 씨물이 오기 전에…… 가버렷<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「イく<emoji=heart04>\u3000イくっ<emoji=heart04>\u3000イくぅ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려<emoji=heart04> 가버렷<emoji=heart04> 가버려어어어어어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁっ<emoji=heart04>\u3000はあっ<emoji=heart04>\u3000イってるのにっ<emoji=heart04>\u3000ち○ちんすごいっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あぁぁぁっ<emoji=heart04>\u3000はぁんっっ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하앗<emoji=heart04> 가고 있는데<emoji=heart04> 꼬추 굉장해<emoji=heart04> 응앗<emoji=heart04> 아아아앗<emoji=heart04> 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「やだぁ……おかしくなるにゃっ<emoji=heart04>\u3000ち○ちん止めてっ<emoji=heart04>\u3000もう止めてぇぇっっ<emoji=heart04>」"
translation = "「싫어어…… 이상해진다냐<emoji=heart04> 꼬추 멈춰줘<emoji=heart04> 이제 멈춰줘어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ああぁぁぁ～～～っ<emoji=heart04>\u3000またイく<emoji=heart04>\u3000おっきいの来る<emoji=heart04>\u3000あ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000やっ<emoji=heart04>\u3000イく<emoji=heart04>\u3000またイっちゃう<emoji=heart04>」"
translation = "「아아아아～～<emoji=heart04> 또 가버려<emoji=heart04> 커다란 게 와<emoji=heart04> 아<emoji=heart04> 아앗<emoji=heart04> 얏<emoji=heart04> 가버려<emoji=heart04> 또 가버려어」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あるじしゃまぁ<emoji=heart04>\u3000あるじしゃまぁぁぁっ<emoji=heart04>\u3000すき<emoji=heart04>\u3000すきすきぃっっ<emoji=heart04>\u3000だいしゅきぃっっ<emoji=heart04>\u3000はぁあぁんっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000またイく<emoji=heart04>\u3000イくにゃっ<emoji=heart04>」"
translation = "「아루지샤마아<emoji=heart04> 아루지샤마아아앗<emoji=heart04> 좋아<emoji=heart04> 좋아좋아아<emoji=heart04> 너무 좋아아<emoji=heart04> 하아아앙<emoji=heart04> 이제 안 돼<emoji=heart04> 또 가버려<emoji=heart04> 가버린다냐<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「うにゃあああぁああぁ～～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「우냐아아아아아아아～～～～～～<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁっ……はぁっはぁっ……今度は……せーし来たにゃ……うれしい<emoji=heart04>」"
translation = "「하앗…… 하앗하앗…… 이번엔…… 정액 왔다냐…… 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「すごい……主様の射精……かっこいいにゃ<emoji=heart04>\u3000せつなのおなかに……せーし……どくっ、どくって……元気に出てるのを感じる……」"
translation = "「굉장해…… 주인님의 사정…… 멋지다냐<emoji=heart04> 세츠나의 배 안에…… 정액…… 울컥, 울컥하고…… 힘차게 나오는 게 느껴져……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁぁ～～っ……種付け交尾……気持ちよかったぁ<emoji=heart04>\u3000主様も……せつなのおま○こ、気持ちよかったでござるか？」"
translation = "「하아아～～…… 씨내리기 교미…… 기분 좋았다아<emoji=heart04> 주인님도…… 세츠나의 보지, 기분 좋았소?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなのっ……気持ちよかったに決まってるだろ……」"
translation = "「그런 거…… 기분 좋았을 게 뻔하잖아……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えへへへ～～、褒められたでござる<emoji=heart04>\u3000あるじしゃまぁ<emoji=heart04>\u3000しゅきぃ<emoji=heart04>」"
translation = "「에헤헤헤～～, 칭찬받았소<emoji=heart04> 아루지샤마아<emoji=heart04> 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「普段もこのくらい甘えてくれたらいいんだけどな」"
translation = "「평소에도 이 정도로 어리광 부려주면 좋을 텐데 말이야」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そそ、それはっ……恥ずかしいから無理っ、でござるよ……」"
translation = "「그, 그것은…… 부끄러우니까 무리, 이오……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっちはこんなに大胆なのに？」"
translation = "「섹스는 이렇게 대담하면서?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それとこれとは別にござるっ」"
translation = "「그것과 이것은 별개이오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふあっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おち○ちん抜けちゃった……<emoji=heart04>」"
translation = "「후앗<emoji=heart04> 아앙<emoji=heart04> 자지 빠져버렸다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せっかく出してもらったせーしも……溢れちゃう……んんっ、もったいない……<emoji=heart04>」"
translation = "「어렵게 내보내 준 정액도…… 흘러넘쳐…… 응응, 아까워라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おま○こぎゅってすると余計に出ちゃうでござるよぉ<emoji=heart04>\u3000これじゃまだ孕んでないかもしれないのに……」"
translation = "「보지 꽉 조이면 오히려 더 나와버린다냐<emoji=heart04> 이래선 아직 임신하지 않았을지도 모르는데……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あ、あるじさまぁ<emoji=heart04>\u3000その……もっと……して欲しい……にゃ<emoji=heart04>」"
translation = "「주, 주인님<emoji=heart04> 그…… 더…… 해줬으면 좋겠어…… 냐<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ、おち○ちんビクンってなったでござる<emoji=heart04>\u3000ふへへ～、師匠のアドバイス通りでござるな。主様に、にゃんにゃん言葉は有効っと……」"
translation = "「앗, 자지 움찔거렸다냐<emoji=heart04> 후헤헤~, 스승님의 조언대로구려. 주인님에게, 냥냥 말투는 유효라고……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もっとにゃあにゃあ言うから……せつなを抱いてぇ<emoji=heart04>\u3000いっぱいぬぷぬぷして……主様のせーしでたくさん種付けして欲しいにゃ<emoji=heart04>」"
translation = "「더 냐아냐아 거릴 테니까…… 세츠나를 안아줘어<emoji=heart04> 잔뜩 누푸누푸 해서…… 주인님의 정액으로 잔뜩 씨내리기 해줬으면 좋겠다냐<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あるじしゃまぁ<emoji=heart04>\u3000すきにゃ<emoji=heart04>\u3000だいすきにゃあ<emoji=heart04>\u3000主様も……せつなのこと、かわいいって思ってくれるなら……」"
translation = "「아루지샤마아<emoji=heart04> 좋아한다냐<emoji=heart04> 정말 좋아한다냐아<emoji=heart04> 주인님도…… 세츠나를 귀엽다고 생각한다면……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もっともっと、せつなとえっちするにゃ<emoji=heart04>\u3000たくさん気持ちよくなって、いっぱいこねこ作るにゃ～～<emoji=heart04>」"
translation = "「더욱더, 세츠나와 섹스하자냐<emoji=heart04> 잔뜩 기분 좋아져서, 잔뜩 아기 고양이 만들자냐～～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のウィークポイントを知ったせつなは、ここぞとばかりににゃあにゃあと攻勢をかけてくる。"
translation = "나의 약점을 알아버린 세츠나는, 이때다 싶어 냐아냐아 거리며 공세를 펼쳐온다."

[[dialogue]]
speaker = "unk"
original = "おしおきするはずだったのに、甘々な種付け交尾に変わってしまった。"
translation = "벌을 줄 생각이었는데, 달콤한 씨내리기 교미로 바뀌어 버렸다."

[[dialogue]]
speaker = "unk"
original = "せつなの拘束を解くことも忘れて、限界までひたすら種付け交尾に勤しむのだった。"
translation = "세츠나의 구속을 푸는 것도 잊은 채, 한계까지 오로지 씨내리기 교미에 전념하는 것이었다."

