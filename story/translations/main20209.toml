[[dialogue]]
speaker = "unk"
original = "第９話,クイズ大会開始！,B"
translation = "제9화, 퀴즈 대회 개시!"

[[dialogue]]
speaker = "unk"
original = "今日はクイズ大会本番。"
translation = "오늘은 퀴즈 대회 본선."

[[dialogue]]
speaker = "unk"
original = "人が集まるだろうかと言っていた俺たちの心配とは裏腹に、留学生・在校生含め多数の生徒が参加してくれた。"
translation = "사람이 모일까 걱정했던 우리의 우려와는 반대로, 유학생과 재학생을 포함해 수많은 학생이 참가해 주었다."

[[dialogue]]
speaker = "アナ"
original = "「参加チームは２００を超えました。１チーム３～５人なので、参加者数で言うと１０００人近く。期待以上ですね」"
translation = "「참가 팀이 200팀을 넘었습니다. 한 팀당 3~5명이니 참가자 수로 치면 1000명 가까이 되네요. 기대 이상입니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「噂になってたものね～」"
translation = "「소문이 자자했으니까요~」"

[[dialogue]]
speaker = "unk"
original = "星徒会と選挙管理委員会の対決が生徒の間で話題となり、クイズ大会が周知された。"
translation = "성도회와 선거관리위원회의 대결이 학생들 사이에서 화제가 되어 퀴즈 대회가 널리 알려졌다."

[[dialogue]]
speaker = "unk"
original = "そのおかげか予想以上の参加者数となっており、結果オーライとはこのことだろう。"
translation = "그 덕분인지 예상 이상의 참가자 수를 기록했고, 결과가 좋으면 다 좋다는 건 이럴 때 쓰는 말이리라."

[[dialogue]]
speaker = "マトイ"
original = "「ほんとに私たちが参加しちゃっていいのかな……」"
translation = "「정말로 우리가 참가해도 되는 걸까……」"

[[dialogue]]
speaker = "アナ"
original = "「現状、星徒会の参加を疑問視する声はありませんし、選管以外も星徒会を倒そうと意気込んでいるとか」"
translation = "「현재 성도회의 참가를 의문시하는 목소리는 없으며, 선관 이외에도 성도회를 쓰러뜨리겠다고 벼르는 모양입니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フッフッフ……全校生徒が敵なんて燃えてくるわね。クイズでも最強を証明してやるわ！」"
translation = "「훗훗훗…… 전교생이 적이라니 불타오르는걸. 퀴즈에서도 최강임을 증명해 주겠어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「全校生徒ではないけどね～」"
translation = "「전교생까지는 아니지만요~」"

[[dialogue]]
speaker = "unk"
original = "それでも二千数百人の生徒のうち、３分の１が参加しているとなれば大したものだ。"
translation = "그래도 2천 수백 명의 학생 중 3분의 1이 참가했다면 대단한 일이다."

[[dialogue]]
speaker = "unk"
original = "俺が発案した企画にたくさんの人が参加してくれて、会長として嬉しいし、協力してくれた人たちや参加してくれた生徒には感謝している。"
translation = "내가 제안한 기획에 많은 사람이 참가해 주어서 회장으로서 기쁘고, 협력해 준 사람들과 참가해 준 학생들에게 감사하고 있다."

[[dialogue]]
speaker = "unk"
original = "特に問題を用意してくれたクイズ研究会と、進行を引き受けてくれた放送委員会には頭が上がらない。"
translation = "특히 문제를 준비해 준 퀴즈 연구회와 진행을 맡아준 방송위원회에는 고개를 들 수 없다."

[[dialogue]]
speaker = "クロト"
original = "「こうなった以上は優勝を目指そう。手を抜いたりしたら、それこそみんなに怒られるよ」"
translation = "「이렇게 된 이상 우승을 목표로 하자. 적당히 했다가는 정말로 모두에게 혼날 거야.」"

[[dialogue]]
speaker = "マトイ"
original = "「博識なアナに、思慮深いサーシャさん、バイトのおかげで経験豊富な緋宮くん……あとお菓子のことはわかる私。頑張ればきっと勝てるよ」"
translation = "「박식한 아나에, 사려 깊은 사샤 씨, 아르바이트 덕분에 경험 풍부한 히노미야 군…… 그리고 과자에 대해서는 잘 아는 나. 힘내면 분명 이길 수 있어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイ、私を忘れてるわよ！」"
translation = "「마토이, 나를 잊었잖아!」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。戦力外だからね……」"
translation = "「응. 전력 외니까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どういう意味よ～！\u3000私だって活躍するんだから！」"
translation = "「그게 무슨 소리야~! 나도 활약할 거니까!」"

[[dialogue]]
speaker = "unk"
original = "そろそろ開会の時間だ。"
translation = "슬슬 개회 시간이다."

[[dialogue]]
speaker = "unk"
original = "まずは開会式。段取りは放送委員会がしてくれることになっている。"
translation = "우선은 개회식. 절차는 방송위원회에서 맡아주기로 되어 있다."

[[dialogue]]
speaker = "紅明"
original = "『ニューヨークにっ、行きたいか～～～～～～～っ！！！』"
translation = "『뉴욕에, 가고 싶은가~~~~~~~~!』"

[[dialogue]]
speaker = "紅明"
original = "『オッス、アタシ放送委員会の牛紅明！\u3000魔界や天界からきたばっかりのみんなはよろしくな☆』"
translation = "『오쓰, 난 방송위원회의 우시 코우메이! 마계나 천계에서 막 온 친구들은 잘 부탁해☆』"

[[dialogue]]
speaker = "紅明"
original = "『盛り上げるならアタシにお任せ♪\u3000ってことでコハルコ委員長から指名を受けたからな！\u3000本日の司会はアタシがやらせてもらうぜ！』"
translation = "『분위기 띄우는 거라면 나한테 맡겨♪ 그런 의미에서 코하루코 위원장님한테 지명을 받았으니까! 오늘 사회는 내가 맡도록 하지!』"

[[dialogue]]
speaker = "紅明"
original = "『おやおや、参加者の中からザワザワが聞こえるな？\u3000アタシのこと知ってくれてる？\u3000テレビ見てくれてるのかな～？』"
translation = "『오야오야, 참가자들 사이에서 웅성거림이 들리는데? 나를 알고 있어? TV 보고 있는 건가~?』"

[[dialogue]]
speaker = "紅明"
original = "『アタシは絶賛タレント活動もしてて、テレビも出てるんだ♪\u3000うちのエナジー牛乳『ホルスタミン』もよろしくだぜ☆』"
translation = "『난 절찬리에 탤런트 활동도 하고 있어서 TV에도 나오고 있어♪ 우리 집 에너지 우유 『홀스타민』도 잘 부탁한다구☆』"

[[dialogue]]
speaker = "紅明"
original = "『そんじゃ宣伝も済んだところで、今大会の主催者兼ラスボスの緋宮クロト星徒会長から挨拶だ！』"
translation = "『그럼 선전도 끝났으니 이번 대회의 주최자 겸 라스트 보스인 히노미야 쿠로토 성도회장님의 인사말이다!』"

[[dialogue]]
speaker = "クロト"
original = "「俺、ラスボスなんだ……」"
translation = "「나, 라스트 보스구나……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ここはうんと煽ってくるのよ。かかってきなさいって」"
translation = "「이럴 때는 듬뿍 도발하는 거야. 덤벼보라고 말이야.」"

[[dialogue]]
speaker = "クロト"
original = "「はは……頑張ってみるよ」"
translation = "「하하…… 노력해 볼게.」"

[[dialogue]]
speaker = "unk"
original = "中途半端では盛り上がらないし、やり過ぎても反感を買う。なかなか難しそうだ。"
translation = "어설프게 해서는 분위기가 살지 않고, 너무 지나치면 반감을 산다. 꽤 어려울 것 같다."

[[dialogue]]
speaker = "unk"
original = "放送委員会からマイクを受け取って壇上に立つ。"
translation = "방송위원회로부터 마이크를 건네받아 단상에 선다."

[[dialogue]]
speaker = "クロト"
original = "『星徒会長の緋宮クロトだ。まずはみんな、このクイズ大会に参加してくれてありがとう』"
translation = "『성도회장 히노미야 쿠로토다. 우선 모두 이 퀴즈 대회에 참가해 줘서 고맙다.』"

[[dialogue]]
speaker = "クロト"
original = "『最近大交流で来てくれた留学生は知らないかもしれないけど、実は俺も転入生だったんだ』"
translation = "『최근 대교류로 온 유학생들은 모를지도 모르지만, 사실 나도 전학생이었어.』"

[[dialogue]]
speaker = "クロト"
original = "『幸い俺はいろいろあってみんなと仲良くなれたけど、やっぱりきっかけがあった方が打ち解けやすいと思って、このイベントを提案させてもらった』"
translation = "『다행히 난 이런저런 일로 모두와 친해질 수 있었지만, 역시 계기가 있는 편이 더 가까워지기 쉽다고 생각해서 이 이벤트를 제안하게 됐어.』"

[[dialogue]]
speaker = "クロト"
original = "『俺たち星騎士は、世界を、人々を守るために、この新星学園にやってきた。もちろん個人的な理由がある人もいるだろうけど、多くはそうだと思う』"
translation = "『우리 성기사는 세계를, 사람들을 지키기 위해 이 신성학원에 왔다. 물론 개인적인 이유가 있는 사람도 있겠지만, 대부분은 그럴 거라고 생각해.』"

[[dialogue]]
speaker = "クロト"
original = "『でもそれは、俺たちが学生であることを否定するわけじゃない。俺たちは世界を守る戦士であり、青春を謳歌する若者でもある』"
translation = "『하지만 그게 우리가 학생이라는 걸 부정하는 건 아니야. 우리는 세계를 지키는 전사이자, 청춘을 구가하는 젊은이이기도 해.』"

[[dialogue]]
speaker = "クロト"
original = "『俺たちには俺たちの命がある。自分の命を生きている』"
translation = "『우리에게는 우리의 목숨이 있어. 자신의 삶을 살고 있는 거야.』"

[[dialogue]]
speaker = "クロト"
original = "『だからみんながこの学園を卒業する時、戦いの記憶だけじゃなくて、楽しかった思い出も胸に抱いていてくれると、俺は嬉しい』"
translation = "『그래서 모두가 이 학원을 졸업할 때, 싸움의 기억뿐만 아니라 즐거웠던 추억도 가슴에 품고 있어 준다면 난 기쁠 거야.』"

[[dialogue]]
speaker = "クロト"
original = "『……なんて、お節介だったかな。言われるまでもないって思う人もいるだろうけど』"
translation = "『……랄까, 참견이었을까. 말 안 해도 안다는 사람도 있겠지만.』"

[[dialogue]]
speaker = "クロト"
original = "『それが星徒会長としての俺の望みだ。新星学園で良かったと、そう思って卒業できるようにしたいんだ』"
translation = "『그게 성도회장으로서 나의 바람이야. 신성학원에 오길 잘했다고, 그렇게 생각하며 졸업할 수 있게 하고 싶어.』"

[[dialogue]]
speaker = "クロト"
original = "『あと安心してほしいんだけど、俺たち星徒会も問題の内容は知らない。そこはイーブンだ』"
translation = "『그리고 안심했으면 좋겠는데, 우리 성도회도 문제 내용은 몰라. 그 점은 이븐이야.』"

[[dialogue]]
speaker = "クロト"
original = "『でも俺たち星徒会は簡単には負けない。全力のさらに上の全力で挑んできてくれ』"
translation = "『하지만 우리 성도회는 쉽게 지지 않아. 전력의 그 이상의 전력으로 덤벼줘.』"

[[dialogue]]
speaker = "クロト"
original = "『リクリエだって俺たちの青春は奪えない。──さぁ、楽しもう！』"
translation = "『리크리에라도 우리의 청춘은 뺏을 수 없어. ──자, 즐기자!』"

[[dialogue]]
speaker = "unk"
original = "挨拶を終えて壇上から降り、お礼を言いながら放送委員会の人にマイクを預ける。"
translation = "인사를 마치고 단상에서 내려와, 감사를 표하며 방송위원회 사람에게 마이크를 맡긴다."

[[dialogue]]
speaker = "unk"
original = "ふうっと息を吐くと肩から力が抜けて、思っていたより緊張していたんだなと自分で気付く。"
translation = "후우, 하고 숨을 내뱉으니 어깨에서 힘이 빠지며, 생각보다 긴장하고 있었다는 걸 스스로 깨닫는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいんじゃない。もっと煽ってもよかったと思うけど」"
translation = "「괜찮네. 좀 더 도발해도 좋았을 것 같지만.」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くん、かっこよかったよ！」"
translation = "「히노미야 군, 멋있었어!」"

[[dialogue]]
speaker = "アナ"
original = "「ザ・会長って感じでした」"
translation = "「딱 회장님이라는 느낌이었어요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「立派になったのね～」"
translation = "「의젓해졌구나~」"

[[dialogue]]
speaker = "クロト"
original = "「なんか恥ずかしいな……」"
translation = "「왠지 쑥스럽네……」"

[[dialogue]]
speaker = "unk"
original = "みんな褒めてくれてるんだけど照れる。"
translation = "모두 칭찬해 주지만 쑥스럽다."

[[dialogue]]
speaker = "unk"
original = "ちょっとかっこつけた気もするけど、星徒会長として言いたいことは言えた。"
translation = "조금 멋 부린 기분도 들지만, 성도회장으로서 하고 싶은 말은 다 했다."

[[dialogue]]
speaker = "紅明"
original = "『緋宮会長～、ありがと～！\u3000アタシ、ちょっと胸が熱くなっちゃったぜ！』"
translation = "『히노미야 회장님~, 고마워~! 나, 조금 가슴이 뜨거워져 버렸다구!』"

[[dialogue]]
speaker = "紅明"
original = "『じゃあ改めて大会の説明だ！\u3000まずはＡからＨのブロックに分かれて、ブロック予選を勝ち抜いてもらうぜ』"
translation = "『그럼 다시 한번 대회 설명이다! 우선 A부터 H 블록으로 나뉘어 블록 예선을 통과해야 한다구!』"

[[dialogue]]
speaker = "紅明"
original = "『大会に参加申請した時に各チーム、ＤＩＳＣで登録しただろ？\u3000それで自分のチームのブロックが表示されるようになってんだ』"
translation = "『대회 참가 신청을 했을 때 각 팀, DISC로 등록했지? 그걸로 자기 팀의 블록이 표시되게 되어 있어.』"

[[dialogue]]
speaker = "クロト"
original = "「俺たちは……Ｃブロックだな」"
translation = "「우리는…… C블록이네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「星徒会として、かっこ悪いところは見せられないわ！」"
translation = "「성도회로서 꼴사나운 모습은 보여줄 수 없지!」"

[[dialogue]]
speaker = "サーシャ"
original = "「どんな問題が来るかしら。楽しみだわ～」"
translation = "「어떤 문제가 나올까. 기대되네~」"

