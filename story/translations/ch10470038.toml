[[dialogue]]
speaker = "unk"
original = "（『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦いから、しばらく経って──）"
translation = "（『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』와의 싸움으로부터, 시간이 좀 흘러서──）"

[[dialogue]]
speaker = "unk"
original = "（アステラやモンスターは出現するものの、その頻度や脅威度は圧倒的に低下した。会長くんのお陰で、私たちはリクリエに勝利した）"
translation = "（아스테라나 몬스터는 출현하지만, 그 빈도나 위협도는 압도적으로 저하되었다. 회장군 덕분에, 우리들은 리크리에에 승리했다）"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "（だからもう――私が<b>会長くんの赤ちゃんを孕んじゃいけない理由</b>は、どこにもなくて……<emoji=heart04>）"
translation = "（그러니까 이제―― 내가 <b>회장군의 아기를 임신하면 안 되는 이유</b>는, 어디에도 없어서……<emoji=heart04>）"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長、くぅんっ<emoji=heart04>\u3000はぁあぁっ<emoji=heart04><emoji=heart04>\u3000アニマ先輩にもらった、『排卵誘発剤』<emoji=heart04><emoji=heart04>\u3000これ、すごいよぉ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장, 구우운<emoji=heart04> 하아아아<emoji=heart04><emoji=heart04> 아니마 선배에게 받은, 『배란유발제』<emoji=heart04><emoji=heart04> 이거, 굉장해에<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私はその薬を飲み込んだ数秒後から、その大きすぎる効果を実感する。"
translation = "나는 그 약을 삼킨 수초 후부터, 그 너무나도 큰 효과를 실감한다."

[[dialogue]]
speaker = "unk"
original = "お股の奥──おま○こが濡れてる。いくら会長くんに押し倒してもらえてるとは言っても、普段ならいきなりびしょびしょになんてなったりしないのにっ。"
translation = "가랑이 안쪽── 보지가 젖어 있어. 아무리 회장군이 밀어붙여 주고 있다고는 해도, 평소라면 갑자기 축축하게 젖거나 하지 않는데."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「媚薬効果があるって、言ってたから、それなのかなぁっ<emoji=heart04><emoji=heart04>\u3000それに……<emoji=heart04><emoji=heart04>」"
translation = "「미약 효과가 있다고, 말했으니까, 그것 때문일까아<emoji=heart04><emoji=heart04> 그리고……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おっぱいの、先っぽっ<emoji=heart04><emoji=heart04>\u3000母乳もっ<emoji=heart04>\u3000もうにじんで、きちゃってるよぉ<emoji=heart04><emoji=heart04>」"
translation = "「가슴의, 끝부분<emoji=heart04><emoji=heart04> 모유도<emoji=heart04> 벌써 배어, 나와버리고 있어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「これぇ<emoji=heart04><emoji=heart04>\u3000すごいのぉ<emoji=heart04>\u3000お薬の副作用って、言ってたけどぉ……<emoji=heart04>\u3000おっぱいがいつもより、張っちゃってる、みたいだよぉ<emoji=heart04><emoji=heart04>」"
translation = "「이거어<emoji=heart04><emoji=heart04> 굉장해에<emoji=heart04> 약의 부작용이라고, 말했지만 말이야아……<emoji=heart04> 가슴이 평소보다, 부풀어 오른 것, 같아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当だ……いつも以上に、メルエルのおっぱい、大きくなってる……気がする」"
translation = "「정말이다…… 평소 이상으로, 메르엘의 가슴, 커진…… 기분이 들어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……もしかして痛い？\u3000今日は触らない方がいいかな？」"
translation = "「……혹시 아파? 오늘은 안 만지는 게 좋을까?」"

[[dialogue]]
speaker = "unk"
original = "会長くんの優しい声かけで、私のおま○この奥がまた、キュンキュンしてしまう。"
translation = "회장군의 상냥한 말 한마디에, 내 보지 안쪽이 또, 큥큥거리고 만다."

[[dialogue]]
speaker = "unk"
original = "でも実は、そういうことじゃなくって──"
translation = "하지만 사실은, 그런 게 아니라서──"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うぅうんっ<emoji=heart04>\u3000違うのっ、むしろ逆でっ<emoji=heart04><emoji=heart04>\u3000おっぱい全体が、熱くてっ<emoji=heart04>\u3000乳首も疼きっぱなしなのっ<emoji=heart04><emoji=heart04>」"
translation = "「으으응<emoji=heart04> 아니야, 오히려 반대야<emoji=heart04><emoji=heart04> 가슴 전체가 뜨거워서<emoji=heart04> 유두도 계속 욱신거려<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だから、だからぁ<emoji=heart04><emoji=heart04>\u3000会長くんに、たくさんっ<emoji=heart04>\u3000おっぱいと母乳っ<emoji=heart04>\u3000吸って、欲しくてぇ<emoji=heart04><emoji=heart04>\u3000はぁああんっ<emoji=heart04>」"
translation = "「그러니까, 그러니까아<emoji=heart04><emoji=heart04> 회장군이 많이<emoji=heart04> 가슴이랑 모유를<emoji=heart04> 빨아 줬으면 좋겠어어<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「いつもより、おっきくなっちゃったっ<emoji=heart04>\u3000熱々でとろとろのおっぱいっ<emoji=heart04>\u3000激しく揉み次第て欲しいよぉぉ<emoji=heart04><emoji=heart04>」"
translation = "「평소보다 커져 버렸어<emoji=heart04> 뜨겁고 말랑말랑한 가슴<emoji=heart04> 격렬하게 주물러 줬으면 좋겠어어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分でも信じられないくらい、甘ったるい声が出てしまう。"
translation = "스스로도 믿기지 않을 정도로 달콤한 목소리가 흘러나온다."

[[dialogue]]
speaker = "unk"
original = "興奮と──発情が。はしたなくて、えっちな女の子になってしまっていることが、全部、伝わってしまう。それが凄く恥ずかしくて、ドキドキして、余計に興奮してしまう。"
translation = "흥분과── 발정이. 천박하고 야한 여자아이가 되어버렸다는 사실이 전부 전해지고 만다. 그것이 너무나 부끄럽고 두근거려서, 더욱더 흥분해 버린다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くぅん<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000こんな風に、女の子が自分で足を抱えてっ<emoji=heart04>\u3000おま○こ見せつけてみたら、えっちかなぁ？<emoji=heart04>\u3000興奮、してくれるかなぁ？<emoji=heart04>」"
translation = "「회장구운<emoji=heart04> 아아앙<emoji=heart04> 이런 식으로 여자애가 직접 다리를 벌리고<emoji=heart04> 보지를 보여주면 야할까나?<emoji=heart04> 흥분해 줄까나?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "くちゅくちゅ──っと。触られてもいないのに、すでにびっしょり濡れたおま○こを、フリフリと振って見せる。"
translation = "구축구축── 하고. 만져지지도 않았는데 벌써 흠뻑 젖어버린 보지를 흔들흔들 흔들어 보인다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（ああっ<emoji=heart04>\u3000──私って、こんなに淫乱で、はしたない女の子、だったんだぁ<emoji=heart04>）"
translation = "（아앗<emoji=heart04> ── 나, 이렇게나 음란하고 천박한 여자아이였구나아<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "会長くんのおち○ちんが、私のおま○こを見て、またぐぐぐっと大きくなるのが見えた。たったそれだけのことで、頭の中で幸せが弾けた。"
translation = "회장군의 자지가 내 보지를 보고 다시 쭈욱 커지는 것이 보였다. 단지 그뿐인 일로 머릿속에서 행복이 터져 나갔다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（はしたない私でっ<emoji=heart04>\u3000会長くんが興奮っ、してくれてるっ<emoji=heart04>\u3000それなら私、どこまでもえっちな女の子に、なれちゃうよぉ<emoji=heart04><emoji=heart04>）"
translation = "（천박한 나 때문에<emoji=heart04> 회장군이 흥분해 주고 있어<emoji=heart04> 그렇다면 나, 얼마든지 야한 여자아이가 되어버릴게에<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう、我慢できないっ。挿れるよ、メルエル……！」"
translation = "「이제 못 참겠어. 넣을게, 메르엘……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くぅんっ<emoji=heart04><emoji=heart04>\u3000あっ、ふあああぁぁああぁぁ～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「회장구운<emoji=heart04><emoji=heart04> 앗, 후아아아아아아아아아~~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長くんの熱々のおち○ちんが膣内を満たして、ずりずりずり～～っと、私の気持ちいところを全部擦り上げる。"
translation = "회장군의 뜨거운 자지가 질 내를 가득 채우고, 즈리즈리즈리~~ 하고 내 기분 좋은 곳을 전부 훑어 올린다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おち○ちんっ<emoji=heart04>\u3000挿れてもらっちゃった、だけでぇ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000またすぐ、イッちゃったぁ<emoji=heart04><emoji=heart04>」"
translation = "「자지<emoji=heart04> 삽입받은 것만으로오<emoji=heart04> 앙<emoji=heart04> 또 바로 가버렸어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……メルエルの中っ、いつもより、熱いっ」"
translation = "「큭…… 메르엘의 안, 평소보다 뜨거워.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うんっ、うんっ<emoji=heart04>\u3000私にも、わかるよぉ<emoji=heart04><emoji=heart04>\u3000おま○こがグツグツしててっ<emoji=heart04>\u3000会長くんの精子っ<emoji=heart04>\u3000いつも以上に、欲しがっちゃって、るのぉ<emoji=heart04>」"
translation = "「응, 응<emoji=heart04> 나도 알아아<emoji=heart04><emoji=heart04> 보지가 부글부글해서어<emoji=heart04> 회장군의 정액<emoji=heart04> 평소보다 더 원하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だって今日はっ<emoji=heart04>\u3000本番、だもんっ<emoji=heart04><emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000会長くんと『赤ちゃん作り』っ、本番ぅ<emoji=heart04>\u3000あぁあんっ<emoji=heart04><emoji=heart04>」"
translation = "「그치만 오늘은<emoji=heart04> 질내사정, 이란 말야<emoji=heart04><emoji=heart04> 아아앙<emoji=heart04> 회장 군이랑 『아기 만들기』, 질내사정우<emoji=heart04> 아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「赤ちゃん、できたらいいねじゃ、なくてぇ<emoji=heart04>\u3000赤ちゃん、作るためにっ<emoji=heart04>\u3000できること全部、してきたからぁっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「아기, 생기면 좋겠네가, 아니라아<emoji=heart04> 아기, 만들기 위해서<emoji=heart04> 할 수 있는 거 전부, 하고 왔으니까아<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「卵子っ<emoji=heart04>\u3000たくさん、作ってきたよぉ<emoji=heart04><emoji=heart04>\u3000会長くんの、精子っ<emoji=heart04>\u3000『ぷちゅん』って受精<emoji=heart04>\u3000させてもらうっ、ためにぃ<emoji=heart04><emoji=heart04>」"
translation = "「난자<emoji=heart04> 잔뜩, 만들어 왔어어<emoji=heart04><emoji=heart04> 회장 군의, 정자<emoji=heart04> 『푸튱』 하고 수정<emoji=heart04> 받기, 위해서어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「『排卵誘発剤』も、飲んでぇ<emoji=heart04>\u3000発情子作りセックスっ<emoji=heart04>\u3000これなら絶対っ<emoji=heart04>\u3000会長くんの精子に、受け入れてもらえるよぉ<emoji=heart04><emoji=heart04>」"
translation = "「『배란 유도제』도, 먹고오<emoji=heart04> 발정 아기 만들기 섹스<emoji=heart04> 이거라면 반드시<emoji=heart04> 회장 군의 정자를, 받아들일 수 있어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺の赤ちゃん、そこまで欲しがってくれるなんて……本当に、凄く嬉しいよっ」"
translation = "「내 아기를, 그렇게까지 원해주다니…… 정말로, 너무 기뻐」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そんなの、当たり前だよぉ<emoji=heart04>\u3000だって私、会長くんのお嫁さんっ、だもんっ<emoji=heart04>」"
translation = "「그런 건, 당연하지이<emoji=heart04> 그치만 나, 회장 군의 신부님, 인걸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "赤ちゃんのことを考えたら、またおっぱいが疼いてきた。ぴゅるぴゅるっ、と乳首の先から、気持ちいい液体が溢れる。"
translation = "아기 생각을 하자, 다시 가슴이 욱신거려 왔다. 퓨루퓨룻, 하고 젖꼭지 끝에서 기분 좋은 액체가 넘쳐흐른다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「お嫁さんは、旦那様の子種を授かって、あぁあんっ<emoji=heart04>\u3000たくさん赤ちゃんを産むのが、お仕事だもんっ<emoji=heart04>」"
translation = "「신부님은, 서방님의 씨물을 받아서, 아아앙<emoji=heart04> 잔뜩 아기를 낳는 게, 일인걸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "早く赤ちゃんに母乳をあげたい気持ちと、この熱いおっぱいを会長くんにめちゃくちゃにしてほしい気持ちで、頭の中がぐちゃぐちゃになってくる。"
translation = "얼른 아기에게 모유를 주고 싶은 마음과, 이 뜨거운 가슴을 회장 군이 엉망진창으로 만들어 줬으면 하는 마음에 머릿속이 구챠구챠가 되어간다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、会長くぅんっ<emoji=heart04>\u3000私のおま○ことおっぱいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もう我慢、できないよぉ<emoji=heart04><emoji=heart04>」"
translation = "「회장 군, 회장 구운<emoji=heart04> 내 보지랑 가슴<emoji=heart04> 앙<emoji=heart04> 이제 못 참겠어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんのおち○ちんと手でっ<emoji=heart04>\u3000たくさん、愛して欲しいのっ<emoji=heart04>\u3000旦那様のお情け、くださぁいっ<emoji=heart04><emoji=heart04>」"
translation = "「회장 군의 자지랑 손으로<emoji=heart04> 잔뜩, 사랑해 줬으면 좋겠어<emoji=heart04> 서방님의 자비, 주세요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふぁあああぁああぁぁああ～～～～っ<emoji=heart04><emoji=heart04>\u3000ああぁあっ<emoji=heart04>\u3000いいっ<emoji=heart04>\u3000気持ちいい、よぉぉ<emoji=heart04>\u3000ふあぁあんっ<emoji=heart04>」"
translation = "「후아아아아아아아아아~~~~<emoji=heart04><emoji=heart04> 아아앗<emoji=heart04> 좋아<emoji=heart04> 기분 좋아아아<emoji=heart04> 후아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長くんはおち○ちんの抽送を始めると同時に、婚約指輪のはまった左手で、私の大きなおっぱいを揉みしだいてくれる。"
translation = "회장 군은 자지의 추송을 시작함과 동시에, 약혼반지가 끼워진 왼손으로 나의 커다란 가슴을 주물러 뭉갠다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おっぱいっ<emoji=heart04>\u3000ぐにゅぐにゅってぇ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000熱くて、とろとろのおっぱいっ<emoji=heart04>\u3000気持ちよくしてもらえてっ、嬉しいっ<emoji=heart04>」"
translation = "「가슴<emoji=heart04> 구뉴구뉴우 하게에<emoji=heart04><emoji=heart04><emoji=heart04> 뜨겁고, 걸쭉한 가슴<emoji=heart04> 기분 좋게 해줘서, 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（いつも以上に、大きく張ったおっぱいっ、熱いよぉ<emoji=heart04><emoji=heart04>\u3000おっぱいが全部、おま○この内側みたいっ<emoji=heart04>\u3000性感帯に、なっちゃってるよぉ<emoji=heart04><emoji=heart04>）"
translation = "（평소 이상으로, 크게 부풀어 오른 가슴, 뜨거워어<emoji=heart04><emoji=heart04> 가슴 전체가, 보지 안쪽 같아아<emoji=heart04> 성감대가, 되어버렸어어<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "unk"
original = "疼いて疼いて仕方がない、むき出しの性感帯を、ぐにゅっと揉みしだいてもらえた。"
translation = "욱신거려서 어쩔 줄 모르는, 드러난 성감대를 구뉴하고 주물러 뭉개주었다."

[[dialogue]]
speaker = "unk"
original = "内側に貯まった母乳が、またぷしゅっと噴き出して、頭の中で幸せがスパークする。"
translation = "안쪽에 쌓인 모유가, 다시 푸슉 하고 뿜어져 나와서, 머릿속에서 행복이 스파크를 일으킨다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふぁ、ああぁあああぁっ～～～っ<emoji=heart04><emoji=heart04>\u3000おっぱい幸せすぎてっ、母乳もどんどん、ぴゅっぴゅっしちゃってるのぉ～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아, 아아아아아앗～～～<emoji=heart04><emoji=heart04> 가슴이 너무 행복해서, 모유도 계속, 퓨퓩 하고 나오고 있어어～<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「母乳出すの、気持ちいいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000赤ちゃん作れるって、ことだもんねっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000私の体が、会長くんの赤ちゃんっ<emoji=heart04>\u3000孕んじゃってもいい、証拠っ<emoji=heart04><emoji=heart04>」"
translation = "「모유 내보내는 거, 기분 좋아<emoji=heart04> 하앙<emoji=heart04> 아기를 만들 수 있다는, 뜻인걸<emoji=heart04><emoji=heart04><emoji=heart04> 내 몸이, 회장군 아기를<emoji=heart04> 임신해 버려도 좋다는, 증거<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐちゅっ、ぐちゅっ、ぐちゅっ、と。おち○ちんが、私のおま○こをかきわける音が聞こえる。おっぱいと、おま○こと、耳と、頭の中。全部を気持ちよくされちゃってる。"
translation = "구츄, 구츄, 구츄, 하고. 자지가, 내 보지를 헤집는 소리가 들린다. 가슴이랑, 보지랑, 귀랑, 머릿속. 전부 기분 좋게 되어버리고 있어."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000母乳、垂れちゃう<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長くんからもらった、気持ち良くなった証っ<emoji=heart04>\u3000こぼれちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 모유, 흘러버려<emoji=heart04> 하앙<emoji=heart04> 회장군에게 받은, 기분 좋아졌다는 증거<emoji=heart04> 쏟아져 버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それなら──今は俺がメルエルの母乳、飲ませてもらっちゃうなっ」"
translation = "「그렇다면── 지금은 내가 메르엘의 모유, 마셔버릴게.」"

[[dialogue]]
speaker = "unk"
original = "会長くんが腰をピストンさせながら、おっぱいを左のおっぱいを持ち上げて、その乳首に吸い付く。"
translation = "회장군이 허리를 피스톤질 하면서, 왼쪽 가슴을 들어 올려서, 그 유두를 빨아들인다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000あぁ<emoji=heart04>\u3000あぁああぁあぁ～～っ<emoji=heart04>\u3000吸われてりゅっ<emoji=heart04>\u3000会長くんにおっぱいっ<emoji=heart04>\u3000乳首吸われてっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000母乳、飲んでもらっちゃってるぅ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 아아<emoji=heart04> 아아아아아아아～～<emoji=heart04> 빨리고 이쪄어<emoji=heart04> 회장군한테 가슴을<emoji=heart04> 유두 빨려서어<emoji=heart04> 아아앙<emoji=heart04> 모유, 마셔지고 있어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "むき出しの性感帯になったおっぱいを揉まれながら、より敏感な乳首にキスしてもらい、出すだけで気持ちいい母乳を、ちぅちぅと吸われてる。"
translation = "노출되어 성감대가 된 가슴을 주물러지면서, 보다 민감한 유두에 키스 받고, 내보내는 것만으로 기분 좋은 모유를, 츄츄 하고 빨리고 있다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「イクっ<emoji=heart04>\u3000イクイク、イっちゃうぅ～～～～っ<emoji=heart04><emoji=heart04>\u3000ふわぁあああぁああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「가버렷<emoji=heart04> 가, 가버려, 가버려어어～～～～<emoji=heart04><emoji=heart04> 후와아아아아아아아～～～<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんに、おま○こしてもらいながらぁっ<emoji=heart04>\u3000母乳飲んでもらうのっ、すごいのぉ<emoji=heart04><emoji=heart04>\u3000頭の中、ぶわぁ～～ってしあわせになってぇ<emoji=heart04><emoji=heart04>\u3000バカになっちゃうよぉぉ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장군한테, 보지섹스 당하면서어<emoji=heart04> 모유 마셔지는 거, 대단해애<emoji=heart04><emoji=heart04> 머릿속이, 부와아～～ 하고 행복해져서어<emoji=heart04><emoji=heart04> 바보가 되어버릴 것 같아아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエルのヨがる姿、可愛いっ。右の胸も感じて欲しいっ」"
translation = "「메르엘이 느끼는 모습, 귀여워. 오른쪽 가슴도 느껴줬으면 해.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁあんっ<emoji=heart04>\u3000今度は両手でおっぱいっ、わし掴みにしながらぁ<emoji=heart04><emoji=heart04>\u3000右のおっぱいっ<emoji=heart04>\u3000乳首、吸ってもらっちゃってるよぉぉ<emoji=heart04><emoji=heart04>\u3000あっ、あぁああっ──<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 이번엔 양손으로 가슴을, 움켜쥐면서어<emoji=heart04><emoji=heart04> 오른쪽 가슴<emoji=heart04> 유두, 빨리고 있어어어<emoji=heart04><emoji=heart04> 앗, 아아앗──<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だめ、ダメダメぇ<emoji=heart04>\u3000またイクっ<emoji=heart04>\u3000イクイク、イっクうぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「안돼, 안돼안돼애<emoji=heart04> 또 가버렷<emoji=heart04> 가, 가버려, 가버려어어～～～<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁああぁっ<emoji=heart04>\u3000もうダメっ、ダメだよぉ<emoji=heart04>\u3000会長くんの精液、我慢できないのぉ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 이제 안돼, 안된다구우<emoji=heart04> 회장군의 정액, 참을 수 없어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんにも、イって欲しいっ<emoji=heart04><emoji=heart04>\u3000私のおま○こ、たくさん締めてっ<emoji=heart04>\u3000気持ちよく、するからぁぁ<emoji=heart04><emoji=heart04>」"
translation = "「회장군도, 가버렸으면 좋겠어<emoji=heart04><emoji=heart04> 내 보지, 잔뜩 조여서<emoji=heart04> 기분 좋게, 해줄 테니까아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんのおち○ちんっ<emoji=heart04>\u3000気持ちよく、させてくださぁぁいっ<emoji=heart04>\u3000私のおま○こに、種付けしてほしいのぉぉ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장군의 자지잇<emoji=heart04> 기분 좋게, 해주세에에에잇<emoji=heart04> 내 보지에, 씨내리해주길 원해에에<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──メルエルっ！！」"
translation = "「──메르엘!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁあっ──ふあぁぁあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앗──후아아아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ、あんっ、あぁあんっ<emoji=heart04>\u3000会長くんのおち○ちんっ<emoji=heart04>\u3000激しいの来たぁああぁああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙, 앙, 아앙앗<emoji=heart04> 회장군의 자지잇<emoji=heart04> 격렬한 거 왔어어어어어～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるで子宮に狙いを定めるように、ぐぐぐっと体重をかけながら、会長くんの腰が私のおま○こを、パンッパンッパンッと打ち付ける。"
translation = "마치 자궁을 조준하듯이, 꾹꾹 체중을 실으면서, 회장군의 허리가 내 보지를, 팡, 팡, 팡 하고 내리친다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、気持ちいいっ？<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000私はすっごく気持ちいいよっ<emoji=heart04>\u3000会長くんのおち○ちん、私で気持ちよくなって欲しいのぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「회장군, 기분 좋아?<emoji=heart04> 앙<emoji=heart04> 나는 엄청 기분 좋아<emoji=heart04> 회장군의 자지, 나로 기분 좋아졌으면 좋겠어어<emoji=heart04><emoji=heart04><emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私は自分の太ももをぐいっと引っ張って、一生懸命、会長くんにおま○こを差し出す。"
translation = "나는 자신의 허벅지를 홱 잡아당겨서, 열심히, 회장군에게 보지를 내민다."

[[dialogue]]
speaker = "unk"
original = "えっちだと思ってもらいたい。赤ちゃんたくさん種付けしたいと、思ってもらいたくて。"
translation = "야하다고 생각해주길 바라. 아기 잔뜩 씨내리하고 싶다고, 생각해주길 바라며."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おち○ちん、またちょっと早くなったっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000好きぃ<emoji=heart04>\u3000ふわぁあんっ<emoji=heart04>\u3000会長くんっ、大好きぃ<emoji=heart04><emoji=heart04>」"
translation = "「자지, 또 조금 빨라졌어어<emoji=heart04> 하아앙<emoji=heart04> 기뻐<emoji=heart04> 좋아해<emoji=heart04> 후와아앙<emoji=heart04> 회장군, 너무 좋아해<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "「好き」って言うたび、おま○こがキュンと締まる。伝えれば伝えるほど、もっとたくさんの「好き」があふれて来ちゃう。"
translation = "「좋아해」라고 말할 때마다, 보지가 큥 하고 조여진다. 전하면 전할수록, 더 많은 「좋아해」가 넘쳐흘러 버린다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんのおち○ちん大好きっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おち○ちん大好きなのぉ<emoji=heart04><emoji=heart04>\u3000気持ちよくしてくれて、大好きぃ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장군의 자지 너무 좋아<emoji=heart04> 앙<emoji=heart04> 자지 너무 좋아아<emoji=heart04><emoji=heart04> 기분 좋게 해줘서, 너무 좋아아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一生懸命おま○こを締めながら、我慢できずに私もヘコヘコと腰を振ってしまう。ほとんど意味なんてないのに、それでもあふれてくる「好き」が、出口を求めて暴れていた。"
translation = "열심히 보지를 조이면서, 참지 못하고 나도 헐떡이며 허리를 흔들어 버린다. 거의 의미 같은 건 없는데도, 그런데도 넘쳐흐르는 「좋아해」가, 출구를 찾아 날뛰고 있었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おま○こゴリゴリ削られちゃってりゅぅぅ<emoji=heart04><emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000赤ちゃんの出口、おち○ちんに広げてもらっちゃってりゅのぉ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지 고리고리 깎여버리고 있어어어<emoji=heart04><emoji=heart04> 하아앙<emoji=heart04> 아기의 출구, 자지로 넓혀지고 있어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もうすぐ会長くんの赤ちゃんを孕める。そう思うだけで、こめかみの奥がチカチカして、脳内にぶわぁ～～って多幸感があふれてくる。幸せすぎて、何も考えられない。"
translation = "이제 곧 회장군의 아기를 밸 수 있다. 그렇게 생각하는 것만으로, 관자놀이 안쪽이 치카치카하고, 뇌내에 부와아～～ 하고 다행감이 넘쳐흐른다. 너무 행복해서, 아무것도 생각할 수 없다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「気持ちいいっ<emoji=heart04>\u3000おま○こパンパンされるたび、頭のしあわせ弾けちゃってりゅっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 보지 팡팡 당할 때마다, 머릿속의 행복이 터져버리고 있어어<emoji=heart04><emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長くんのおち○ちんが、子宮をコンコンし始める。"
translation = "회장군의 자지가, 자궁을 똑똑 두드리기 시작한다."

[[dialogue]]
speaker = "unk"
original = "ぶちゅんっ、ぱちゅんっ、と私のはしたない愛液が大きな音を立てるけど、頭の中はしあわせ一杯で、もう恥ずかしさも感じられない。"
translation = "부츄웃, 파츄웃, 하고 나의 천박한 애액이 큰 소리를 내지만, 머릿속은 행복으로 가득해서, 이제 부끄러움도 느껴지지 않아."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おま○こ好きっ、おち○ちん大好きっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000会長くん大好きぃっ<emoji=heart04><emoji=heart04>\u3000しゅきがあふれちゃうよぉぉぉ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지 좋아, 자지 너무 좋아<emoji=heart04> 하아앙<emoji=heart04> 회장군 너무 좋아아<emoji=heart04><emoji=heart04> 좋아함이 넘쳐흘러버려어어어～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエルっ！\u3000俺も、大好きだっ！！」"
translation = "「멜엘! 나도, 정말 좋아해!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁあっ、嬉しいっ<emoji=heart04>\u3000あんっ、あんっ、あぁあんっ<emoji=heart04>\u3000しゅきぃ<emoji=heart04>\u3000しゅきしゅきぃ<emoji=heart04>\u3000会長くぅんだいしゅきぃ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 기뻐<emoji=heart04> 앙, 앙, 아아앙<emoji=heart04> 조아아<emoji=heart04> 조아조아아<emoji=heart04> 회장구운 너무 조아아아～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しあわせっ<emoji=heart04>\u3000しあわせっ<emoji=heart04><emoji=heart04>\u3000しあわせぇっ<emoji=heart04><emoji=heart04><emoji=heart04>"
translation = "행복해<emoji=heart04> 행복해<emoji=heart04><emoji=heart04> 행복해애<emoji=heart04><emoji=heart04><emoji=heart04>"

[[dialogue]]
speaker = "unk"
original = "フワフワして、じゅぷじゅぷして、ドパドパしてるっ。頭の中ぜんぶ気持ちよくって、私の中はぜんぶ、会長くんだけになった。"
translation = "둥실둥실하고, 쥬풔쥬풔하고, 도파도파하고 있어. 머릿속 전부 기분 좋아서, 내 안은 전부, 회장군뿐이게 됐어."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「赤ちゃんくださいっ<emoji=heart04>\u3000受精したいのっ<emoji=heart04>\u3000たくさん孕ませてくださぁ～～いっ<emoji=heart04><emoji=heart04>\u3000ふわぁあんっ<emoji=heart04>」"
translation = "「아기 주세요<emoji=heart04> 수정하고 싶어어<emoji=heart04> 잔뜩 임신시켜주세에에～～요옷<emoji=heart04><emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「卵子でてるぅ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000妊娠っ、赤ちゃんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000受精想像して、おま○こ悦んじゃってるよぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「난자 나오고 있어어<emoji=heart04> 앙<emoji=heart04> 임신, 아기<emoji=heart04> 하아앙<emoji=heart04> 수정을 상상해서, 보지가 기뻐하고 있어어～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「『ぷちゅんっ』ってしてぇ<emoji=heart04>\u3000精子で卵子にっ、キスしてほしいのぉ<emoji=heart04>\u3000あぁああぁっ<emoji=heart04><emoji=heart04>\u3000イクイクっ、イっくぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「『푸츄웃』 하고 해줘어<emoji=heart04> 정자로 난자에, 키스해주길 원해에<emoji=heart04> 아아아아앗<emoji=heart04><emoji=heart04> 가버려 가버려, 가버려어어～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長くんの赤ちゃんができた瞬間を想像したら、それだけでまた、しあわせが弾けた。腰がびくびく、がくがく震えてる。"
translation = "회장군의 아기가 생기는 순간을 상상하니, 그것만으로 다시, 행복이 터져 나갔다. 허리가 비쿠비쿠, 가쿠가쿠 떨리고 있어."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んふぁあああぁああぁああ～～っ<emoji=heart04>\u3000イってりゅっ<emoji=heart04>\u3000おま○こイキっぱなしにゃのぉ<emoji=heart04>\u3000ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04><emoji=heart04>」"
translation = "「응후아아아아아아아아아아아아～～앗<emoji=heart04> 가고 이써어<emoji=heart04> 보지 계속 가버리는 중이야아<emoji=heart04> 아아, 아아, 아아, 아아, 아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おち○ちんまた激しくっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000排卵してるぅ<emoji=heart04>\u3000おま○こ熱くて、絶対妊娠できちゃうよぉぉ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지 다시 격렬하게에<emoji=heart04> 기뻐어<emoji=heart04> 아아아앗<emoji=heart04> 배란하고 있어어<emoji=heart04> 보지 뜨거워서, 절대로 임신해버릴 거야아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おち○ちんがまた膨らんで、さらにピストンが激しくなる。射精が近いってわかった。それだけでまた、頭の奥のしあわせが弾けた。"
translation = "자지가 다시 부풀어 오르고, 더욱 피스톤이 격렬해진다. 사정이 가깝다는 것을 알 수 있었다. 그것만으로 다시, 머릿속 깊은 곳의 행복이 터져 나갔다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、あんっ、んあぁああっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000あ、あ、あ、あ、あっ<emoji=heart04>\u3000おっぱいも膨らんできちゃうぅぅぅ～～<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앙, 응아아아앗<emoji=heart04> 보지 기분 좋아아<emoji=heart04> 아, 아, 아, 아, 앗<emoji=heart04> 가슴도 부풀어 올라버려어어어～～<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000母乳でるっ、でちゃうぅ～<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000来てっ、きてきてっ<emoji=heart04><emoji=heart04>\u3000会長くん精子で、孕ませて～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 모유 나와, 나와버려어～<emoji=heart04> 하아앙<emoji=heart04> 와줘, 와줘와줘어<emoji=heart04><emoji=heart04> 회장군 정자로, 임신시켜줘어～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おっぱいが熱い。母乳が噴き出そうっ。"
translation = "가슴이 뜨거워. 모유가 뿜어져 나올 것 같아."

[[dialogue]]
speaker = "unk"
original = "私のぜんぶが気持ちいい液体になって、おま○ことおっぱいから飛び出ちゃうっ。"
translation = "나의 모든 것이 기분 좋은 액체가 되어서, 보지와 가슴에서 튀어나가 버려."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっあんっあんっあんっ<emoji=heart04>\u3000ああぁあっ<emoji=heart04><emoji=heart04>\u3000くるっ<emoji=heart04>\u3000くるくるくるぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふわぁあんっ<emoji=heart04>」"
translation = "「앙앙앙앙앙<emoji=heart04> 아아아앗<emoji=heart04><emoji=heart04> 온다<emoji=heart04> 온다온다온다앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁああぁぁあああっ<emoji=heart04><emoji=heart04>\u3000おっきいのくるっ<emoji=heart04>\u3000一緒に、会長くんも一緒にぃ<emoji=heart04>\u3000あっ、ああ、あ、あああっ<emoji=heart04>」"
translation = "「아아아아아아아아앗<emoji=heart04><emoji=heart04> 커다란 거 온다아<emoji=heart04> 같이, 회장군도 같이이<emoji=heart04> 앗, 아아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああっ──俺ももう出るっ。メルエルっ！！」"
translation = "「아앗── 나도 이제 나온다. 멜엘!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ああ、あぁ、ああっ、あぁ、あぁあっ<emoji=heart04>\u3000ふあぁああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクぅ～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아, 아아, 아앗, 아아, 아아앗<emoji=heart04> 후아아아아아～～～앗<emoji=heart04><emoji=heart04> 가버려가버려가버려가버려가버려어～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエルっ、孕めっ！！！」"
translation = "「멜엘, 임신해라!!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んああぁあっ、ふああああぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗, 후아아아아아아～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「イックうぅぅぅぅーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふわぁあああぁああぁあああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어ーーーー어앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁああっ<emoji=heart04><emoji=heart04>\u3000ふわあああぁあぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○この中、たくさん出してもらえてるよぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앗<emoji=heart04><emoji=heart04> 후아아아아아아아～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 보지 안, 잔뜩 내보내지고 있어어～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あああっ<emoji=heart04>\u3000またイっちゃぅぅっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000んああぁあぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 또 가버려어엇<emoji=heart04> 가버려가버려어<emoji=heart04> 응아아아아～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁあっ<emoji=heart04>\u3000子宮の奥っ、熱い精液、どくどく感じちゃってるぅぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 자궁 안쪽, 뜨거운 정액, 도쿠도쿠 느껴버리고 있어어어～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふああぁあっ<emoji=heart04><emoji=heart04>\u3000受精イキ、しちゃってるよぉ<emoji=heart04><emoji=heart04>\u3000精子に卵子キスされちゃうのっ、気持ちいいのぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04><emoji=heart04> 수정 절정, 해버리고 있어어<emoji=heart04><emoji=heart04> 정자에 난자 키스당해버리는 거, 기분 좋아아아～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ<emoji=heart04>\u3000はふぅぅう……<emoji=heart04>\u3000んんぅ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하후우우……<emoji=heart04> 응응으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なんだか、いつも以上に深いイキ方をしてしまった気がする……頭の奥が多幸感の余韻で、まだ甘くしびれていた。"
translation = "왠지 평소 이상으로 깊게 가버린 느낌이 든다…… 머릿속 깊은 곳이 다행감의 여운으로, 아직 달콤하게 저리고 있었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへっ<emoji=heart04>\u3000会長くん、私の排卵おま○こ、どうだった……？<emoji=heart04>\u3000ちゃんとキミのこと、気持ちよくできてたかなぁ<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 회장군, 나의 배란 보지, 어땠어……?<emoji=heart04> 제대로 너를, 기분 좋게 해줬을까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「めちゃくちゃ気持ちよかった……１回じゃ、満足できないくらい」"
translation = "「무지하게 기분 좋았어…… 한 번으로는, 만족할 수 없을 정도로 말이야」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「……！\u3000わあぁっ<emoji=heart04>\u3000会長くんのおち○ちん、あんなにたくさん出してくれたのに、もうカチカチだぁ<emoji=heart04>」"
translation = "「……! 와아앗<emoji=heart04> 회장군의 자지, 그렇게나 잔뜩 내보내줬는데, 벌써 카치카치야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まあ……１回で満足できないのなんて、今日に限ったことじゃないんだけど」"
translation = "「뭐…… 한 번으로 만족 못 하는 건, 오늘에 한정된 일은 아니지만」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへへへへっ<emoji=heart04>\u3000はあぁ……っ<emoji=heart04>\u3000私で興奮してくれるの、すっごく嬉しいっ<emoji=heart04>」"
translation = "「에헤헤헤헤헤헷<emoji=heart04> 하아아……앗<emoji=heart04> 나로 흥분해주는 거, 정말 기뻐어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あの、ねっ<emoji=heart04>\u3000会長くんの赤ちゃん、今日は絶対、孕める気がするんだぁ<emoji=heart04><emoji=heart04>」"
translation = "「저기, 있지<emoji=heart04> 회장군의 아기, 오늘은 절대, 임신할 수 있을 것 같은 기분이 들어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でもね……絶対ぜぇたいっ<emoji=heart04>\u3000１日でも早く、会長くんの赤ちゃんを孕ませて、ほしいからっ<emoji=heart04>」"
translation = "「그치만 말야…… 절대 저어얼대로옷<emoji=heart04> 하루라도 빨리, 회장군의 아기를 임신하고 싶으니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「今日もたくさん、私に中出しして、赤ちゃん作らせてくださいっ<emoji=heart04>」"
translation = "「오늘도 잔뜩, 나에게 질내사정해서, 아기 만들게 해주세요옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私がそう懇願すると、会長くんは嬉しそうに微笑んで、キスをしてくれるのだった──"
translation = "내가 그렇게 간청하자, 회장군은 기쁜 듯 미소 지으며 키스를 해주는 것이었다──"

