[[dialogue]]
speaker = "unk"
original = "第４話,お姉ちゃんと男心,P"
translation = "제4화, 누나와 남자의 마음, P"

[[dialogue]]
speaker = "unk"
original = "日焼け止めを塗り終わり、俺とサーシャさんは多くの人で賑わう海の家の方へとやって来ていた――"
translation = "자외선 차단제를 다 바르고, 나와 사샤 씨는 많은 사람들로 붐비는 바다의 집 쪽으로 오게 되었다――"

[[dialogue]]
speaker = "サーシャ"
original = "「リゾート結界、すっかり街の大人気スポットになっちゃったわね～」"
translation = "「리조트 결계, 완전히 거리의 대인기 스폿이 되어버렸네~」"

[[dialogue]]
speaker = "サーシャ"
original = "「クチコミで人気が広がって、学園生だけじゃなく、一般のお客さんも来るようになったみたいよ～」"
translation = "「입소문으로 인기가 퍼져서, 학원생뿐만 아니라, 일반 손님들도 오게 된 모양이야~」"

[[dialogue]]
speaker = "サーシャ"
original = "「おかげで周りに人が多いけど……えいっ♪」"
translation = "「덕분에 주변에 사람이 많지만…… 에잇♪」"

[[dialogue]]
speaker = "unk"
original = "う、腕が胸に挟まれて……！？"
translation = "파, 팔이 가슴에 끼어서……!?"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ、当ててるのよ♪\u3000お姉ちゃんの恋人アピール<emoji=heart04>」"
translation = "「우후훗, 닿게 하는 거야♪ 누나의 연인 어필<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんはモテるから、学園外の女の子たちにも、しっかり見せつけておかないとね♪」"
translation = "「회장군은 인기가 많으니까, 학원 밖 여자애들에게도, 확실히 보여줘야지♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「――うん？\u3000私の方がモテる？\u3000ふふっ、ありがとう♪\u3000でも、それなら他の男の子たちにもアピールできるから、一石二鳥じゃない？」"
translation = "「――응? 내가 더 인기가 많다고? 후훗, 고마워♪ 하지만, 그렇다면 다른 남자애들에게도 어필할 수 있으니까, 일석이조 아니니?」"

[[dialogue]]
speaker = "サーシャ"
original = "「――見られて恥ずかしい？\u3000大丈夫よ。海の家には焼きそばを買いに来ただけだし、すぐにまた２人きりの場所に戻るから、ね<emoji=heart04>」"
translation = "「――남들이 봐서 부끄러워? 괜찮아. 바다의 집에는 야키소바를 사러 온 것뿐이고, 금방 다시 둘만의 장소로 돌아갈 거니까, 알았지<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "海の家は混んでいたので、サーシャさんには外で待ってもらい、焼きそばを買ってきた。そして、サーシャさんの元に戻って来ると――"
translation = "바다의 집은 붐비고 있었기에, 사샤 씨에게는 밖에서 기다려 달라고 하고 야키소바를 사 왔다. 그리고 사샤 씨가 있는 곳으로 돌아오니――"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ、ごめんなさい。私、今は彼氏を待っているところなので～」"
translation = "「우후후, 미안해요. 저, 지금은 남자친구를 기다리는 중이라서요~」"

[[dialogue]]
speaker = "チャラい男"
original = "「そう言わずにさ～、オレと遊ぼうよ～。彼氏、学生なんだろ？\u3000社会人のオレの方が金持ってるし、楽しい思いをさせてあげられるよ～？」"
translation = "「그러지 말고~, 나랑 놀자~. 남자친구, 학생이지? 사회인인 내가 돈도 더 많고, 즐겁게 해줄 수 있다고~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「う～ん、あいにく私、年下の可愛い男の子がタイプなので……」"
translation = "「으음, 안타깝게도 전, 연하의 귀여운 남자애가 타입이라서요……」"

[[dialogue]]
speaker = "unk"
original = "サーシャさん！"
translation = "사샤 씨!"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ、会長くん♪\u3000焼きそば買い終わったの？\u3000おかえりなさ～い♪」"
translation = "「앗, 회장군♪ 야키소바 다 샀어? 어서 와~♪」"

[[dialogue]]
speaker = "チャラい男"
original = "「ふ～ん、こいつがキミの彼氏かぁ。顔はまぁ、整ってるけど……何ていうか、地味？\u3000彼氏くんさぁ、こんな美人の彼女、キミにはもったいないと思うんだよねぇ」"
translation = "「흐음, 이 녀석이 네 남자친구냐. 얼굴은 뭐, 반듯하긴 한데…… 뭐랄까, 수수하달까? 남자친구군, 이런 미인인 여자친구는 너한테 아깝다고 생각하는데 말이야」"

[[dialogue]]
speaker = "サーシャ"
original = "「むっ……あの～、流石にちょっとしつこい――」"
translation = "「음…… 저기~, 역시 좀 끈질기네――」"

[[dialogue]]
speaker = "unk"
original = "譲る気は全くないので、失礼します！"
translation = "양보할 생각은 전혀 없으니, 실례하겠습니다!"

[[dialogue]]
speaker = "サーシャ"
original = "「きゃっ、会長くん！？\u3000急にそんな、お姫様抱っこだなんて――<emoji=heart04>」"
translation = "「꺄악, 회장군!? 갑자기 그렇게, 공주님 안기라니――<emoji=heart04>」"

[[dialogue]]
speaker = "チャラい男"
original = "「おい、まだ話は……って、女の子お姫様抱っこしながら、足超速ぇぇぇっーーー！？」"
translation = "「어이, 아직 얘기가…… 아니, 여자애를 공주님 안기한 채로, 발이 겁나 빠르잖아아아앗ーーー!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ♪\u3000いきなり連れ去られて、お姉ちゃんビックリしちゃった……<emoji=heart04>」"
translation = "「우후훗♪ 갑자기 끌려가서, 누나 깜짝 놀랐어……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「――ええ、私は全然平気よ～。街を歩いている時にも同じような経験があるし、いざとなればお姉ちゃんも強いからね♪」"
translation = "「――응, 난 전혀 괜찮아~. 거리를 걷고 있을 때도 비슷한 경험이 있고, 유사시엔 누나도 강하니까♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「それよりも……会長くんがあの人に『譲る気はない』ってビシッと言ってくれた時、お姉ちゃんちょっとドキッとしちゃったわ<emoji=heart04>」"
translation = "「그것보다…… 회장군이 그 사람에게 『양보할 생각은 없다』고 딱 잘라 말해줬을 때, 누나 조금 두근거려 버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姫様抱っこも――」"
translation = "「공주님 안기도――」"

[[dialogue]]
speaker = "サーシャ"
original = "「何だか、私を力強く引っ張ってくれるような、男らしさっていうのかな？\u3000そういうのを、凄く感じちゃったわ……<emoji=heart04>」"
translation = "「뭐랄까, 나를 힘차게 이끌어주는 듯한, 남자다움이라고 해야 할까? 그런 걸, 굉장히 느껴버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それなら――"
translation = "그렇다면――"

[[dialogue]]
speaker = "サーシャ"
original = "「どうしたの、会長くん？\u3000――今日１日、男らしく振る舞う？\u3000確かに、そういうのは今まで、したことなかったけど……」"
translation = "「왜 그래, 회장군? ――오늘 하루, 남자답게 행동하겠다고? 확실히, 그런 건 지금까지 해본 적 없었지만……」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、具体的にはどんな感じで……きゃっ！？」"
translation = "「하지만, 구체적으로 어떤 느낌으로…… 꺄악!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「い、いきなり抱き寄せられて……あんっ<emoji=heart04>\u3000耳元に会長くんの息、当たって――」"
translation = "「가, 갑자기 끌어안겨서…… 앙<emoji=heart04> 귓가에 회장군 숨결이 닿아서――」"

[[dialogue]]
speaker = "unk"
original = "サーシャ、愛してる"
translation = "사샤, 사랑해"

[[dialogue]]
speaker = "サーシャ"
original = "「～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんな耳元で名前を呼び捨てなんて……ふあぁっ<emoji=heart04>\u3000何度も囁いちゃダメよぉ……胸が本当に、ドキドキしちゃう<emoji=heart04>」"
translation = "「그렇게 귓가에서 이름을 반말로 부르다니…… 후아아<emoji=heart04> 자꾸 속삭이면 안 돼애…… 가슴이 정말로, 두근거려 버려<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「――え？\u3000き、キスをするの？\u3000ま、待って心の準備が追いついてな――んっ<emoji=heart04>」"
translation = "「――에? 키, 키스를 한다고? 자, 잠깐 마음의 준비가 안 됐――응<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ちゅ……<emoji=heart04>\u3000んむっ……ちゅっ<emoji=heart04>」"
translation = "「츄……<emoji=heart04> 응뭇…… 츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「……はぁ<emoji=heart04>\u3000ご、強引に２回も、キスするなんて……<emoji=heart04>」"
translation = "「……하아<emoji=heart04> 가, 강제로 두 번이나, 키스하다니……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本当はいつもしたいの、我慢してる"
translation = "사실은 항상 하고 싶은 거, 참고 있어"

[[dialogue]]
speaker = "サーシャ"
original = "「そ、そうなの……？\u3000それなら、言ってくれれば私……」"
translation = "「그, 그래……? 그렇다면, 말해주면 나……」"

[[dialogue]]
speaker = "サーシャ"
original = "「――私が年上だから、遠慮しちゃう？\u3000学園だと先輩だから、呼び捨てするわけにもいかない……？」"
translation = "「――내가 연상이라서, 사양하게 된다고? 학원에서는 선배니까, 이름을 막 부를 수도 없어서……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あと、お姉ちゃんって呼ばれるのが好きだって、私が言ったから……？」"
translation = "「그리고, 누나라고 불리는 걸 좋아한다고 내가 말했으니까……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「た、確かに……ごめんなさい。あんまり意識はしてなかったけど――」"
translation = "「하, 확실히…… 미안해. 별로 의식은 못 했었지만――」"

[[dialogue]]
speaker = "サーシャ"
original = "「私、会長くんに甘えさせてるつもりで、自分も……甘えちゃってたのね」"
translation = "「나, 회장군을 어리광 부리게 해줄 생각이었는데, 나 자신도…… 어리광 부리고 있었나 보네」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ……<emoji=heart04>\u3000会長くんの手が、私の頭を撫でて……やぁっ<emoji=heart04>\u3000また耳元で、呼び捨てで囁くのダメ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 회장군 손이, 내 머리를 쓰다듬고…… 야앗<emoji=heart04> 또 귓가에서, 반말로 속삭이는 건 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お姉ちゃんらしくないサーシャも凄く可愛い"
translation = "누나답지 않은 사샤도 굉장히 귀여워"

[[dialogue]]
speaker = "サーシャ"
original = "「はうぅっ……<emoji=heart04>\u3000いま可愛いって言われると、何だか凄く恥ずかしくて、顔が熱くなっちゃうぅ……<emoji=heart04>」"
translation = "「하우웃……<emoji=heart04> 지금 귀엽다는 말을 들으니까, 왠지 너무 부끄러워서, 얼굴이 뜨거워져 버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ……ダメッ<emoji=heart04>\u3000顔見ないで、会長くん！\u3000絶対変な顔しちゃってるからぁ<emoji=heart04>\u3000あっ、あっ、手をどけちゃ――」"
translation = "「앗…… 안 돼엣<emoji=heart04> 얼굴 보지 마, 회장군! 분명 이상한 표정 짓고 있을 테니까아<emoji=heart04> 앗, 앗, 손 떼지――」"

[[dialogue]]
speaker = "unk"
original = "今日はいっぱい俺に、恥ずかしいとこ見せて"
translation = "오늘은 나한테 잔뜩, 부끄러운 모습 보여줘"

[[dialogue]]
speaker = "サーシャ"
original = "「～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000な、なんでこんなにドキドキするのぉ～～～っ！？」"
translation = "「～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04> 왜, 왜 이렇게 두근거리는 거야아아~~~앗!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「んんっ<emoji=heart04>\u3000ちゅっ……いまキスしちゃダメぇ……<emoji=heart04>\u3000頭熱くなり過ぎて、おかしくなっちゃう……ちゅっ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 츄웃…… 지금 키스하면 안 돼애……<emoji=heart04> 머리가 너무 뜨거워져서, 이상해질 것 같아…… 츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んむっ……会長くぅん……<emoji=heart04>\u3000ちゅっ……はぁぁ……<emoji=heart04>\u3000大好き<emoji=heart04>」"
translation = "「응뭇…… 회장구운……<emoji=heart04> 츄웃…… 하아아……<emoji=heart04> 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くしたサーシャが可愛くて、俺はついつい男らしい振る舞いを続けてしまうのだった――"
translation = "얼굴을 붉힌 사샤가 귀여워서, 나는 그만 남자다운 행동을 계속하고 마는 것이었다――"

