[[dialogue]]
speaker = "unk"
original = "第４話,永い旅路の果てに,P"
translation = "제4화, 긴 여정의 끝에, P"

[[dialogue]]
speaker = "unk"
original = "俺と学園長は、魔界の色々な場所を旅した。"
translation = "나와 학원장은 마계의 여러 장소를 여행했다."

[[dialogue]]
speaker = "unk"
original = "辛く苦しい時もあったが、それらは全て２人の力で乗り越えてきた。"
translation = "괴롭고 힘들 때도 있었지만, 그것들은 전부 둘의 힘으로 극복해 왔다."

[[dialogue]]
speaker = "unk"
original = "そんな長い長い旅の果てに、たどり着いたのはこの町──レゾフだった。"
translation = "그런 아주 긴 여행 끝에 다다른 곳은 이 마을── 레조프였다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "そんな風に物思いにふけっちゃって"
translation = "그런 식으로 상념에 잠겨서는."

[[dialogue]]
speaker = "unk"
original = "どうしたの、ラティエ？"
translation = "왜 그래, 라티에?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「今までにきみと歩んできた旅路を振り返っていたんだ」"
translation = "「지금까지 자네와 걸어온 여정을 되돌아보고 있었네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「魔界も広い、広いと思っていたけれど、気が付けば端から端まで旅をして……」"
translation = "「마계도 넓고 넓다고 생각했지만, 어느새 끝에서 끝까지 여행을 했군……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「始めは頼りなかったきみも、どんどん頼もしくなっていって、今はこんなにも逞しくなってくれた」"
translation = "「처음에는 미더웠던 자네도 점점 듬직해져서, 지금은 이렇게나 늠름해졌어」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「頼りがいのある相方に出会えて、私は本当に幸運だったと思うよ」"
translation = "「믿음직한 파트너를 만나서 나는 정말 행운이었다고 생각하네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「出会いと言えば……フフ、そうだよ。私ときみはこのレゾフで初めて出会ったんだ」"
translation = "「만남이라고 하면…… 후후, 그래. 나와 자네는 이 레조프에서 처음 만났었지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「何となく、その時のことを思い出していたんだよ」"
translation = "「왠지 그때 일이 생각나더라고」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみは私が流星学園の学園長だとは気付かなくて……」"
translation = "「자네는 내가 유성학원의 학원장이라는 걸 눈치채지 못했지……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「無理もない話か、私も『さすらいの旅人』などと名乗っていたのだからな」"
translation = "「무리도 아니지, 나도 『떠돌이 여행자』라고 자처했으니까 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そんな私ときみが共に旅をして、その旅の果てに生涯の伴侶となり、今こうして出会いの場所であるレゾフに骨を<ruby>埋<rt>うず</rt></ruby>めようというのだから」"
translation = "「그런 나와 자네가 함께 여행을 하고, 그 여행 끝에 평생의 반려가 되어 지금 이렇게 만남의 장소인 레조프에 뼈를 묻으려 하고 있으니까」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「まったく、人生というのは分からないものだよ」"
translation = "「정말이지 인생이란 알 수 없는 거야」"

[[dialogue]]
speaker = "unk"
original = "本当にね……"
translation = "정말 그러네……"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっは、きみまでしんみりさせてしまったな」"
translation = "「하하하, 자네까지 숙연하게 만들었군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「それより長話に興じていると、せっかくきみが作ってくれたシチューが冷めてしまう」"
translation = "「그보다 긴 이야기에 빠져 있으면 모처럼 자네가 만들어 준 스튜가 식어버리겠어」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「人間界では夏の盛りでも、レゾフはもう温かいシチューが嬉しい寒さだな」"
translation = "「인간계는 한여름이겠지만 레조프는 벌써 따뜻한 스튜가 반가운 추위로군」"

[[dialogue]]
speaker = "unk"
original = "何か羽織るものを持ってこようか？"
translation = "뭐 걸칠 거라도 가져다줄까?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ありがとう、大丈夫だよ」"
translation = "「고맙네, 괜찮아」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「それよりも隣に、私の近くに居てくれ。そして私がお願いしたら、そっと抱きしめてくれればいい」"
translation = "「그보다 옆에, 내 가까이에 있어 주게. 그리고 내가 부탁하면 살며시 안아주면 되네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみに抱きしめてもらえれば、どんな寒さでも凌ぐことが出来るからな」"
translation = "「자네가 안아준다면 어떤 추위라도 이겨낼 수 있으니까 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「旅をしていた頃も、レゾフに流れ着いてからも、私にとってそれが最高の暖の取り方さ」"
translation = "「여행을 하던 시절도, 레조프에 흘러 들어온 뒤로도 나에게는 그것이 최고의 보온법이라네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「何といっても身体だけでなく、心まで芯から暖かくなれるのだからな」"
translation = "「무엇보다 몸뿐만 아니라 마음까지 심지부터 따뜻해질 수 있으니까」"

[[dialogue]]
speaker = "unk"
original = "こうして俺と学園長──いや、ラティエは温かいシチューでお腹を満たして……"
translation = "이렇게 나와 학원장── 아니, 라티에는 따뜻한 스튜로 배를 채우고……"

[[dialogue]]
speaker = "unk"
original = "それから訪れるレゾフの夜を、いつものように抱きしめ合って過ごすのだった。"
translation = "그다음에 찾아올 레조프의 밤을 평소처럼 서로 껴안고 보내는 것이었다."

[[dialogue]]
speaker = "unk"
original = "……………………。"
translation = "……………………."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「────……会長くん……会長くん」"
translation = "「────…… 회장군…… 회장군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「フフ、気持ちよく眠っているな……だが、そろそろ目を覚ましてくれ」"
translation = "「후후, 기분 좋게 잠들어 있군…… 하지만 슬슬 눈을 뜨게」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「おはよう。仕事中に居眠りとは、きみらしくないように思うが」"
translation = "「좋은 아침. 업무 중에 낮잠이라니 자네답지 않다고 생각하네만」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「まあ書類の山を前にしたら、眠たくなってしまう気持ちはわかってやれるがな」"
translation = "「뭐, 서류 더미를 앞에 두면 졸음이 쏟아지는 기분은 이해해 줄 수 있지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「もしかして疲れているのか？」"
translation = "「혹시 지쳐 있는 건가?」"

[[dialogue]]
speaker = "unk"
original = "だ、大丈夫です"
translation = "괘, 괜찮습니다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そうか……でも無理はするなよ」"
translation = "「그래…… 그래도 무리는 하지 말게」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「それにしても……寝言で何度も私の名前を呼んでいたようだが、どんな夢を見ていたんだ？」"
translation = "「그건 그렇고…… 잠꼬대로 몇 번이나 내 이름을 부르던데 대체 어떤 꿈을 꾼 건가?」"

[[dialogue]]
speaker = "unk"
original = "っ！！？"
translation = "윽!!?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「フフ……これは詳しく追及したいところだ。さあ、白状したまえ……」"
translation = "「후후…… 이건 자세히 추궁하고 싶은걸. 자, 자백하게나……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「最近はきみに１本取られてしまうことが多いからな、私がこの機会を逃すと思うなよ？」"
translation = "「요즘은 자네에게 한 방 먹는 일이 많으니까 말이야, 내가 이 기회를 놓칠 것 같나?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっは、私と一緒に旅をして、レゾフで一緒に暮らしている夢を見たか！」"
translation = "「하하하, 나와 함께 여행을 하고 레조프에서 함께 사는 꿈을 꿨다고!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「夢にまで見てしまうとは、きみの想いは切実だな……」"
translation = "「꿈에서까지 봐버리다니 자네의 마음은 절실하군……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「わかったわかった。抱きしめ合って眠ってやることは出来ないが、少しはサービスしてやろうじゃないか」"
translation = "「알았네 알았어. 서로 껴안고 자 줄 수는 없지만 조금은 서비스해 주지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ほら、こっちにこい……私の膝を貸してやろう」"
translation = "「자, 이리로 오게…… 내 무릎을 빌려주지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「机に突っ伏して寝ていると、身体を痛めてしまうかもしれないからな。寝るならばちゃんと横になった方がいい」"
translation = "「책상에 엎드려 자면 몸이 상할지도 모르니까 말이야. 잘 거라면 제대로 눕는 게 좋아」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「寝心地は保証しないが、私の脚を枕にしてゆっくり休め」"
translation = "「잠자리가 편할지는 보장 못 하지만 내 다리를 베개 삼아 푹 쉬게」"

[[dialogue]]
speaker = "unk"
original = "お、お願いします"
translation = "부, 부탁드립니다."

[[dialogue]]
speaker = "unk"
original = "変な夢をみたせいで、余計に学園長のことを意識してしまって、ドキドキしながら学園長の脚に頭を預ける。"
translation = "이상한 꿈을 꾼 탓에 더욱 학원장을 의식해 버려서 두근거리는 마음으로 학원장의 다리에 머리를 맡긴다."

[[dialogue]]
speaker = "unk"
original = "毎日鍛錬によって鍛え上げられている学園長の身体だったが、その膝枕はとてもやわらかいもので──"
translation = "매일 단련을 통해 다져진 학원장의 몸이었지만, 그 무릎베개는 무척이나 부드러워서──"

[[dialogue]]
speaker = "unk"
original = "俺はその心地よさに、すぐにまどろみに落ちてしまったのだった"
translation = "나는 그 안락함에 곧바로 깊은 잠에 빠져들고 말았다."

