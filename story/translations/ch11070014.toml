[[dialogue]]
speaker = "unk"
original = "第４話,追加要求いたします,P"
translation = "제4화, 추가 요구하겠습니다"

[[dialogue]]
speaker = "unk"
original = "元の世界に帰れる目処もようやく立ち、残り僅かな時を過ごしている。"
translation = "원래 세계로 돌아갈 가닥도 드디어 잡혔고, 얼마 남지 않은 시간을 보내고 있다."

[[dialogue]]
speaker = "unk"
original = "この日はナナカに招待されて、流星学園の食堂に来ていた。"
translation = "이날은 나나카의 초대를 받아 유성학원 식당에 와 있었다."

[[dialogue]]
speaker = "ナナカ"
original = "「へいお待ち！\u3000ナナカちゃん特製手打ちソバでいっ！」"
translation = "「자, 나왔어! 나나카표 특제 수타 소바라구!」"

[[dialogue]]
speaker = "ナナカ"
original = "「おお～、いい食べっぷりだね！\u3000どうよ、お味の方は？」"
translation = "「오오~ 잘 먹네! 어때, 맛은?」"

[[dialogue]]
speaker = "ナナカ"
original = "「あーっ、皆まで言わなくていいって。夢中で食べてくれてるってのが、一番の褒め言葉だからね！」"
translation = "「아- 다 말 안 해도 돼. 정신없이 먹어 주는 게 최고의 찬사니까!」"

[[dialogue]]
speaker = "ナナカ"
original = "「とはいえ、ちょっと作りすぎちゃったかな。アタシも食べるにしても、まだまだおかわりできそうだし……」"
translation = "「그나저나 좀 너무 많이 만들었나. 나도 먹는다 쳐도 아직 리필 가능할 것 같고……」"

[[dialogue]]
speaker = "ナナカ"
original = "「っと、いいところにロロちゃん発見！」"
translation = "「앗, 마침 좋은 곳에 로로짱 발견!」"

[[dialogue]]
speaker = "ロロット"
original = "「きゅぴーん……！」"
translation = "「큐피잉……!」"

[[dialogue]]
speaker = "ロロット"
original = "「ああ～……食べなくてもサクサクの食感が伝わる、キュートなエビフライ！」"
translation = "「아아~…… 먹지 않아도 바삭한 식감이 전해지는 귀여운 새우튀김!」"

[[dialogue]]
speaker = "ロロット"
original = "「ちょこんとデミをまとったミニハンバーグ！」"
translation = "「살짝 데미 소스를 두른 미니 함바그!」"

[[dialogue]]
speaker = "ロロット"
original = "「カリカリに揚がったポテトに、うさぎさんりんご！\u3000その上、プチゼリーまで……」"
translation = "「바삭하게 튀겨진 감자에 토끼 모양 사과! 게다가 푸딩 젤리까지……」"

[[dialogue]]
speaker = "ロロット"
original = "「そしてメインは、ケチャップで花丸を描いたオムライス……！」"
translation = "「그리고 메인은 케첩으로 꽃무늬를 그린 오므라이스……!」"

[[dialogue]]
speaker = "ロロット"
original = "「パーフェクト……なんて完璧なんでしょう……これぞ宇宙の黄金律！」"
translation = "「퍼펙트…… 어쩜 이렇게 완벽할까요…… 이것이 바로 우주의 황금비!」"

[[dialogue]]
speaker = "ロロット"
original = "「さあ、いざ実食なのです！」"
translation = "「자, 드디어 시식인 것이예요!」"

[[dialogue]]
speaker = "ナナカ"
original = "「おーい、ロロちゃん」"
translation = "「어이, 로로짱.」"

[[dialogue]]
speaker = "ロロット"
original = "「ななっ！？\u3000なんですかっ、人の幸せな食事の時間を邪魔しないで下さい～っ」"
translation = "「나낫!? 뭔가요, 사람의 행복한 식사 시간을 방해하지 말아 주세요~」"

[[dialogue]]
speaker = "ナナカ"
original = "「あ、ごめん、邪魔するつもりはなかったんだけどさ」"
translation = "「아, 미안. 방해할 생각은 없었는데 말이야.」"

[[dialogue]]
speaker = "ロロット"
original = "「会計さんにはあげませんよっ」"
translation = "「회계님한테는 안 줄 거예요!」"

[[dialogue]]
speaker = "ナナカ"
original = "「違う違う。張り切りすぎて、ソバを多めに茹でちゃったもんでさ、よかったら食べるの手伝って欲しいな～って」"
translation = "「아니 아니. 너무 의욕이 앞서서 소바를 좀 많이 삶아버렸거든. 괜찮으면 먹는 것 좀 도와줬으면 해서~」"

[[dialogue]]
speaker = "ロロット"
original = "「ギロリ！」"
translation = "「희번득!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ひぃ！」"
translation = "「히익!」"

[[dialogue]]
speaker = "unk"
original = "ギロリって言う人はじめて見た"
translation = "희번득이라고 말하는 사람 처음 봤어"

[[dialogue]]
speaker = "ナナカ"
original = "「メチャクチャ塩対応なんだけど、ロロちゃん……」"
translation = "「메가톤급으로 차가운 반응인데, 로로짱……」"

[[dialogue]]
speaker = "ロロット"
original = "「いいですか？\u3000わたしは今、特製お子様ランチと真摯に向き合うという、とっても大切な儀式の真っ最中なのです」"
translation = "「잘 들으세요? 저는 지금 특제 어린이 세트와 진지하게 마주하는, 아주 중요한 의식을 치르는 중이란 말이에요.」"

[[dialogue]]
speaker = "ロロット"
original = "「ということで、申し訳ありませんが、会計さんのお相手はできかねますのであしからず」"
translation = "「그러니까 죄송하지만 회계님 상대는 해드릴 수 없으니 양해 바랍니다.」"

[[dialogue]]
speaker = "unk"
original = "そのお子様ランチ、凄くおいしそう"
translation = "그 어린이 세트 진짜 맛있어 보이네"

[[dialogue]]
speaker = "ロロット"
original = "「おお、お目が高いのです！\u3000見た目は勿論のこと、味も最高なんですよ～」"
translation = "「오오, 안목이 높으시네요! 겉모습은 물론이고 맛도 최고라구요~」"

[[dialogue]]
speaker = "ナナカ"
original = "「アタシのソバよりも？」"
translation = "「내 소바보다?」"

[[dialogue]]
speaker = "ロロット"
original = "「会計さんのおソバはもう食べ飽きてしまったので、残念ながら、新鮮味に欠けてしまいますね」"
translation = "「회계님 소바는 이미 질리도록 먹어서 아쉽게도 신선함이 부족하네요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「い、言ったなー、よし勝負だ！」"
translation = "「마, 말 다 했어? 좋아, 승부다!」"

[[dialogue]]
speaker = "ロロット"
original = "「ご自由にどうぞ」"
translation = "「마음대로 하세요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「うう、ロロちゃんが全然相手にしてくれない……」"
translation = "「우우, 로로짱이 전혀 상대 안 해줘……」"

[[dialogue]]
speaker = "unk"
original = "それだけおいしいんだよ"
translation = "그만큼 맛있다는 거지"

[[dialogue]]
speaker = "ロロット"
original = "「……あ、あなたにも、あげませんからねっ？」"
translation = "「……다, 당신한테도 안 줄 거니까요!」"

[[dialogue]]
speaker = "ロロット"
original = "「どうしても食べたいというのでしたら、ご自分で注文されてはどうでしょう」"
translation = "「꼭 먹고 싶다면 직접 주문하시는 게 어때요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「待った待った、そうはいかないよっ。新星の会長さんは、もうあたしのソバをがっつり食べちゃってるんだから」"
translation = "「기다려 기다려, 그렇게는 안 되지. 신성의 회장님은 이미 내 소바를 듬뿍 먹어버렸으니까.」"

[[dialogue]]
speaker = "unk"
original = "全部は無理だから味見させて"
translation = "전부는 무리니까 맛만 보게 해줘"

[[dialogue]]
speaker = "ロロット"
original = "「それでしたら、日を改めれば……と、いう訳には、いかないんでしたっけ」"
translation = "「그렇다면 날을 바꾸면…… 이라고 할 상황이 아니었죠 참.」"

[[dialogue]]
speaker = "ナナカ"
original = "「そうだよ、明日急に帰っちゃうかもしれないんだから。これを味わっとくには、今しかチャンスがないかもよ？」"
translation = "「맞아, 내일 갑자기 돌아가 버릴지도 모르잖아. 이걸 맛보려면 지금밖에 기회가 없을걸?」"

[[dialogue]]
speaker = "ロロット"
original = "「やれやれ、仕方がありませんねぇ。幸せのお裾分けも吝かではありませんし、トレードなら応じることができますよ。なにせ、わたしはとっても心が広いのですから！」"
translation = "「이런이런, 어쩔 수 없네요. 행복을 나누어 드리는 건 아깝지 않으니, 트레이드라면 응할 수 있어요. 뭐니 뭐니 해도 전 마음이 무척 넓으니까요!」"

[[dialogue]]
speaker = "ロロット"
original = "「ちなみに、ハンバーグは選択禁止です。断固拒否です。これは一番のお楽しみなのですから」"
translation = "「참고로 함바그는 선택 금지예요. 단호히 거부입니다. 이건 가장 아껴둔 즐거움이니까요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「アタシのソバなら３口あげるよ～」"
translation = "「내 소바라면 세 젓가락 줄게~」"

[[dialogue]]
speaker = "ロロット"
original = "「そんなに食べられません」"
translation = "「그렇게는 못 먹어요.」"

[[dialogue]]
speaker = "unk"
original = "ならオムライスを１口！"
translation = "그럼 오므라이스를 한 입!"

[[dialogue]]
speaker = "ナナカ"
original = "「こっちはなんと！\u3000ソバを１枚提供しちゃうよ！」"
translation = "「이쪽은 무려! 소바를 한 판 제공해 버릴게!」"

[[dialogue]]
speaker = "ロロット"
original = "「増やさないで下さ～い！」"
translation = "「늘리지 마세~요!」"

[[dialogue]]
speaker = "ナナカ"
original = "「だってだって、ロロちゃんも、アタシのソバはおいしいって言ってくれてたじゃん！」"
translation = "「그치만 그치만, 로로짱도 내 소바는 맛있다고 해줬잖아!」"

[[dialogue]]
speaker = "ロロット"
original = "「非常に残念ですが、この目の前に広がるテーマパークのような、お子様ランチの魅力には抗えません」"
translation = "「대단히 유감입니다만, 이 눈앞에 펼쳐진 테마파크 같은 어린이 세트의 매력에는 저항할 수 없어요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「そんなにおいしいわけ？\u3000アタシもちょっと気になって来たかも……」"
translation = "「그렇게 맛있어? 나도 좀 궁금해지기 시작했을지도……」"

[[dialogue]]
speaker = "ロロット"
original = "「だから、あげませんってば～！\u3000いくらおソバを積み上げられたって、応じませんからね！」"
translation = "「그러니까, 안 준다니까요~! 아무리 소바를 쌓아다 줘도 응하지 않을 거예요!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ロロちゃんのけちー。せめてさ、ちょっとだけでも味見させたげてよ」"
translation = "「로로짱 구두쇠~. 적어도 말이야, 조금만이라도 맛보게 해달라고.」"

[[dialogue]]
speaker = "ロロット"
original = "「うう～……それもそうですね。では、ほんのちょこっとだけ……」"
translation = "「으으~…… 그것도 그렇네요. 그럼 아주 조금만……」"

[[dialogue]]
speaker = "ロロット"
original = "「……あーん、です」"
translation = "「……아~앙, 하세요.」"

[[dialogue]]
speaker = "ロロット"
original = "「さあ、お早くどうぞ。食べてくれないと、落っこちちゃいます」"
translation = "「자, 얼른 드세요. 안 먹으면 떨어져 버려요.」"

[[dialogue]]
speaker = "ロロット"
original = "「そうですそうです、お味はどうですか？\u3000おいしいですか？\u3000おいしいに決まってますよね♪」"
translation = "「그래요 그래요, 맛은 어때요? 맛있나요? 맛있을 게 뻔하겠죠♪」"

[[dialogue]]
speaker = "ナナカ"
original = "「ロロちゃん、それはちょっと……」"
translation = "「로로짱, 그건 좀……」"

[[dialogue]]
speaker = "ロロット"
original = "「ほえ？\u3000お口がいっぱいで、感想どころではありませんでした？」"
translation = "「호에? 입안이 가득 차서 감상 남길 틈이 없었나요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「いや、そういうことじゃなくてさぁ……」"
translation = "「아니, 그런 게 아니라……」"

[[dialogue]]
speaker = "unk"
original = "あーんって、ちょっと恥ずかしいかも"
translation = "아~앙이라니, 조금 부끄러울지도"

[[dialogue]]
speaker = "ロロット"
original = "「はっ！\u3000そそ、それはっ！\u3000不可抗力です！\u3000別にそういうつもりじゃありませ～ん！」"
translation = "「핫! 그그, 그건! 불가항력이에요! 딱히 그런 의도는 아니었답니~다!」"

[[dialogue]]
speaker = "ナナカ"
original = "「たはは、ロロちゃん、照れちゃってんじゃん」"
translation = "「타하하, 로로짱 부끄러워하고 있잖아.」"

[[dialogue]]
speaker = "ロロット"
original = "「どうやら、わたしの深い包容力が、垣間見えてしまったようですね」"
translation = "「아무래도 저의 깊은 포용력이 살짝 엿보여 버린 모양이네요.」"

[[dialogue]]
speaker = "unk"
original = "あーん♪"
translation = "아~앙♪"

[[dialogue]]
speaker = "ロロット"
original = "「むむっ、追加要求ですか！？\u3000なんと強欲な……」"
translation = "「무뭇, 추가 요구인가요!? 이 얼마나 탐욕스러운……」"

[[dialogue]]
speaker = "ナナカ"
original = "「どうするの？」"
translation = "「어떡할 거야?」"

[[dialogue]]
speaker = "ロロット"
original = "「ううう～……自分で食べて下さい、と言いたいところですが……」"
translation = "「으으으~…… 직접 드세요, 라고 말하고 싶은 참입니다만……」"

[[dialogue]]
speaker = "unk"
original = "あーん♪"
translation = "아~앙♪"

[[dialogue]]
speaker = "ロロット"
original = "「まったく……思っていた以上に、甘えんぼさんな方だったようですね。心優しいわたしが突き動かされてしまうのも、仕方のないことだと思います」"
translation = "「정말이지…… 생각했던 것보다 어리광쟁이인 분이었나 보네요. 마음씨 착한 제가 움직여 버리는 것도 어쩔 수 없는 일이라 생각해요.」"

[[dialogue]]
speaker = "ロロット"
original = "「ただし、あーんって食べさせてあげるのは、これで最後ですからね。これ以上は、もうあげませんから！」"
translation = "「단, 아~앙 하고 먹여주는 건 이걸로 마지막이니까요. 더 이상은 이제 안 줄 거니까요!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺はロロットのお子様ランチを食べさせてもらった。"
translation = "이렇게 나는 로롯토의 어린이 세트를 얻어먹었다."

[[dialogue]]
speaker = "unk"
original = "これで最後と言ってたけど、そんなことはなく、もう少しサービスしてくれるロロットだった。"
translation = "이걸로 마지막이라고 말했지만, 그렇지는 않았고 조금 더 서비스해 주는 로롯토였다."

