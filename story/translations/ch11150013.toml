[[dialogue]]
speaker = "unk"
original = "第３話,最強のモフモフ,P"
translation = "제3화, 최강의 푹신푹신, P"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、いらっしゃいませ♪」"
translation = "「회장, 어서 오세요♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おや、主様もこちらに？\u3000奇遇でござるな。今日の日替わりケーキはレモンタルトでござるよ」"
translation = "「오호, 주님도 이곳에? 기구한 인연이구려. 오늘의 일일 케이크는 레몬 타르트이오」"

[[dialogue]]
speaker = "unk"
original = "息抜きにカフェテリアに寄ると、ヨミが出迎えてくれた。"
translation = "기분 전환 겸 카페테리아에 들르자 요미가 마중 나와 주었다."

[[dialogue]]
speaker = "unk"
original = "せつなもここでお茶をしていたようだ。"
translation = "세츠나도 여기서 차를 마시고 있었던 모양이다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふむ。ここが学園のカフェテリアか。面白みのある場所ではなさそうだな」"
translation = "「흐음. 여기가 학원의 카페테리아인가. 재미있는 장소 같지는 않군」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こ、こ、煌嶺さん！？」"
translation = "「코, 코, 코우레이 씨!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「なぜ驚く？\u3000妾は学園の理事だ。学園の施設を見に来て何が悪い？」"
translation = "「왜 놀라느냐? 첩은 학원의 이사다. 학원의 시설을 보러 오는 게 무엇이 나쁘단 말이냐?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それはそうでござるが……」"
translation = "「그건 그렇소만……」"

[[dialogue]]
speaker = "unk"
original = "そういえば……"
translation = "그러고 보니……"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「む？」"
translation = "「음?」"

[[dialogue]]
speaker = "unk"
original = "せつなの師匠であるシズルさんも、九尾の狐の魔族だった。"
translation = "세츠나의 스승인 시즈루 씨도 구미호 마족이었다."

[[dialogue]]
speaker = "unk"
original = "九尾の狐は大変稀少な存在と聞くが、シズルさんと何か関係があるのだろうか？"
translation = "구미호는 매우 희귀한 존재라고 들었는데, 시즈루 씨와 무슨 관계가 있는 걸까?"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「忍びの里にも九尾の狐の魔族がいる……？\u3000知らぬな。妾とは関係ない。キュリオスの皇帝に嫁いだ初代煌嶺が、九尾の魔族だっただけのこと」"
translation = "「닌자 마을에도 구미호 마족이 있다……? 모르겠군. 첩과는 상관없다. 큐리오스 황제에게 시집온 초대 코우레이가 구미호 마족이었을 뿐인 일」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「九尾がいくら稀少な存在だからといって、それだけで結び付けられては迷惑というものだ」"
translation = "「구미가 아무리 희귀한 존재라고 해도, 그것만으로 엮이는 건 성가시다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「本当にただの偶然でござったか」"
translation = "「정말 그냥 우연이었소이까」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「しかし九尾の魔族は長寿でござる。師匠は見かけによらずものすごく長生きでござるが、煌嶺殿もそうなのでござるか？」"
translation = "「하오나 구미 마족은 장수하오. 스승님은 보기와 달리 엄청나게 오래 사셨는데, 코우레이 공도 그러하오?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「無礼な猫娘だな。妾の齢は貴様らとそう変わらん。妾がその師匠とやらのように歳を重ねていると、そう想像しているのなら……処すぞ？」"
translation = "「무례한 고양이 소녀로군. 첩의 나이는 네놈들과 그리 다르지 않다. 첩이 그 스승이라는 자처럼 나이를 먹었다고 그렇게 상상하고 있다면…… 처단하겠다?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ひぃぃっ！？\u3000ごめんなさいでござるーっ！！」"
translation = "「히익!? 죄송하오─!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「だが長く生きた九尾だろうと、妾には遠く及ばぬ。なぜなら──」"
translation = "「하지만 오래 산 구미라 해도 첩에게는 한참 미치지 못한다. 왜냐하면──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾の尻尾こそ至高だからだ！！」"
translation = ""

[[dialogue]]
speaker = "unk"
original = "そこ！？"
translation = "거기야!?"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「確かに師匠は小柄な分、毛量では負けるでござるな……。尻尾が本体かと思うほどの大ボリュームでござる」"
translation = "「과연, 스승님은 체구가 작은 만큼 털의 양으로는 지겠구려……. 꼬리가 본체인가 싶을 정도의 대볼륨이오」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾は気前が良い。今ならこの尻尾、モフらせてやってもよいぞ、魔王？」"
translation = "「첩은 인심이 좋다. 지금이라면 이 꼬리, 푹신거리게 해줄 수도 있다만, 마왕?」"

[[dialogue]]
speaker = "unk"
original = "なんだって……！？"
translation = "뭐라고……!?"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「たとえ尾の１本で比較しても、そこな狐娘よりも上。それが九尾だぞ」"
translation = "「설령 꼬리 1개로 비교해도 저기 있는 여우 소녀보다 위다. 그것이 구미라고」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「むむ……別に張り合うつもりはないですけど、なんか悔しいです……」"
translation = "「으으…… 딱히 경쟁할 생각은 없지만 왠지 억울하네요……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ほれ、どうする？\u3000妾がモフらせてやると言っているのだ、躊躇する理由がどこにある？」"
translation = "「자, 어찌하겠느냐? 첩이 푹신거리게 해주겠다고 말하고 있다, 주저할 이유가 어디에 있느냐?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「柔らかくて温い、ふさふさの尻尾が９本」"
translation = "「부드럽고 따뜻한, 복슬복슬한 꼬리가 9개」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「当然手入れも欠かさぬ。妾のために用意させた特別な油を使っている。そんじょそこらの獣人系魔族とは毛並みが違うぞ」"
translation = "「당연히 손질도 빠뜨리지 않는다. 첩을 위해 준비시킨 특별한 기름을 쓰고 있지. 어중간한 수인계 마족과는 결부터가 다르다」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「この九尾の極上のモフモフに包まれたいと思わんのか？\u3000んん？\u3000ん～？」"
translation = "「이 구미의 극상 푹신푹신함에 감싸이고 싶지 않느냐? 응? 응~?」"

[[dialogue]]
speaker = "unk"
original = "くっ……誘惑に抗えない……！"
translation = "큭…… 유혹을 떨칠 수 없어……!"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふふ……どうだ、妾の尾は？\u3000極上の九尾に包まれた心地は？」"
translation = "「후후…… 어떠냐, 첩의 꼬리는? 극상의 구미에 감싸인 기분은?」"

[[dialogue]]
speaker = "unk"
original = "モフモフに包まれて……昇天しそう……"
translation = "푹신함에 감싸여서…… 승천할 것 같아……"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ああ！？\u3000主様の顔がすっかり蕩けているでござる！？」"
translation = "「아앗!? 주님의 얼굴이 완전히 풀려버렸소!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「正気を保ってください！\u3000相手はあの大欲の女帝ですよ！」"
translation = "「정신 차리세요! 상대는 그 대욕의 여제라구요!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の尻尾に埋もれながら、もっとモフモフを味わいたくて、もがくように手を動かすと──"
translation = "코우레이의 꼬리에 파묻혀 좀 더 푹신함을 맛보고 싶어서 발버둥 치듯 손을 움직이자──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひあぁんっ！？\u3000もう、くすぐったいってば～」"
translation = "「히앙!? 정말, 간지럽다니까~」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「なんかかわいい声が出たでござる！？」"
translation = "「왠지 귀여운 소리가 나왔소!?」"

[[dialogue]]
speaker = "unk"
original = "そっちの姿でその声出せるんだ……"
translation = "그 모습으로 그런 소리를 낼 수 있구나……"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そりゃ出せるよ。気分でやってるだけだし」"
translation = "「그야 낼 수 있지. 기분 내키는 대로 하는 것뿐이니까」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あんっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁん<emoji=heart04>\u3000魔王さんってば、触り方がエッチだよ～」"
translation = "「앙<emoji=heart04> 응윽<emoji=heart04> 하앙<emoji=heart04> 마왕 씨도 참, 만지는 법이 야해~」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふふ、魔王さん、私の尻尾に夢中になってかわいいな～。リーエンちゃんも私の尻尾好きだけど、魔王さんも気に入ったみたいだね♪」"
translation = "「후후, 마왕 씨, 내 꼬리에 정신 못 차리고 귀엽네~. 리엔 짱도 내 꼬리 좋아하지만 마왕 씨도 맘에 든 모양이네♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様が女帝の虜になったでござる……」"
translation = "「주님이 여제에게 사로잡혔소……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ですね……すっかりメロメロです……」"
translation = "「그러게요…… 완전히 헤롱헤롱해요……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あなたたち羨ましいの？\u3000私の尻尾は９本あるからまだ余裕あるし、２人もモフモフさせてあげるね♪」"
translation = "「너희도 부러워? 내 꼬리는 9개나 있어서 아직 여유 있으니까, 둘도 푹신하게 해줄게♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ええっ！？\u3000そんなこと言ってませ──ひゃあっ！？」"
translation = "「에엣!? 그런 말 안 했── 히앗!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ちょ、ちょっと待つでござ──あぁ～っ！？」"
translation = "「자, 잠깐 기다려주오── 아아~앗!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ヨミー、せつな、いるー？」"
translation = "「요미─, 세츠나, 있어─?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「──って、何？\u3000あの毛の塊」"
translation = "「──라니, 뭐야? 저 털 뭉치는」"

[[dialogue]]
speaker = "unk"
original = "モフモフに癒される～……"
translation = "푹신함에 치유된다~……"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふわふわでござる～……」"
translation = "「보들보들하오~……"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ダメになっちゃいます～……」"
translation = "「망가져 버려요~……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あなたもこっち来る？\u3000モフモフさせてあげるよ？」"
translation = "「너도 이쪽으로 올래? 푹신하게 해줄게」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いや、ダメになりたくないんで遠慮しときます」"
translation = "「아뇨, 망가지고 싶지 않으니 사양하겠습니다」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「やれやれ……３人して何やってんだか」"
translation = "「이런 이런…… 셋이서 뭐 하는 건지」"

