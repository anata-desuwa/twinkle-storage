[[dialogue]]
speaker = "unk"
original = "第３話,意外な一面,P"
translation = "제3화, 의외의 일면"

[[dialogue]]
speaker = "ユウリ"
original = "「むー……」"
translation = "「음……」"

[[dialogue]]
speaker = "unk"
original = "（ブティックのショーケースを見てる……）"
translation = "（부티크 쇼케이스를 보고 있어……）"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしがこういう服着たら……ああいやいや、こんなヒラヒラした服、かわいすぎて似合わないだろ」"
translation = "「내가 이런 옷을 입으면…… 아냐 아냐, 이런 하늘하늘한 옷, 너무 귀여워서 안 어울리겠지」"

[[dialogue]]
speaker = "ユウリ"
original = "「でも着てみたら案外似合ってるかもしれないし……つーかよく見たらたけーな。小遣いじゃ足らねーぞ」"
translation = "「하지만 입어보면 의외로 어울릴지도 모르고…… 그보다 자세히 보니 비싸네. 용돈으로는 부족하겠어」"

[[dialogue]]
speaker = "ユウリ"
original = "「あぁ～、やめやめ。こんなとこ誰かに見られでもしたら――」"
translation = "「아아~, 관두자 관둬. 이런 거 누가 보기라도 하면──」"

[[dialogue]]
speaker = "ユウリ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……………………"
translation = "……………………"

[[dialogue]]
speaker = "ユウリ"
original = "「おわあっ！？」"
translation = "「우왓!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「見てたのか？\u3000どこから見てた？\u3000いや、言わなくていい！\u3000いいから忘れろ～！」"
translation = "「보고 있었냐? 어디부터 봤어? 아니, 말 안 해도 돼! 됐으니까 잊어버려~!」"

[[dialogue]]
speaker = "unk"
original = "お、落ち着いて！"
translation = "지, 진정해!"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁ～……さっき見たの、他の誰にも言うんじゃねーぞ。特にソフィアとかルリとかには」"
translation = "「하아~…… 방금 본 거, 다른 누구한테도 말하지 마라. 특히 소피아나 루리 같은 애들한테는」"

[[dialogue]]
speaker = "ユウリ"
original = "「意外とか言うなよ？\u3000あたしはこんな性格だが、別に男になった覚えはねー。れっきとした年頃の女子だっての」"
translation = "「의외라는 말 하지 마라? 내가 이런 성격이긴 해도, 딱히 남자가 된 기억은 없어. 어엿한 사춘기 여자애라고」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしだって化粧品のひとつやふたつ持ってるし……ほとんどフィオナからもらったやつだけど」"
translation = "「나도 화장품 한두 개쯤은 가지고 있고…… 대부분 피오나한테 받은 거지만」"

[[dialogue]]
speaker = "ユウリ"
original = "「アホ猫みたいに、『ユウリのくせに色気づいてるニャン！』とか言ったらぶっ飛ばすからな」"
translation = "「바보 고양이처럼, 『유우리 주제에 멋 부린다냥!』 같은 소리 하면 날려버릴 거니까」"

[[dialogue]]
speaker = "unk"
original = "さっきの服、似合うと思う"
translation = "방금 그 옷, 어울릴 것 같아"

[[dialogue]]
speaker = "ユウリ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ユウリ"
original = "「そ、そうか……まぁ、話半分に受け取っとく」"
translation = "「그, 그래…… 뭐, 대충 흘려들을게」"

[[dialogue]]
speaker = "ユウリ"
original = "「なんだその残念そうな顔は。まさか本気で着てほしいとか思ってないだろうな？」"
translation = "「뭐야 그 아쉬운 듯한 얼굴은. 설마 진심으로 입어주길 바라는 건 아니겠지?」"

[[dialogue]]
speaker = "ユウリ"
original = "「いやそこで期待した顔すんなよ。どっかのアホ猫みたいな反応されるよりはいいけどさ」"
translation = "「아니 거기서 기대하는 표정 짓지 마. 어디 사는 바보 고양이 같은 반응보다는 낫지만 말이야」"

[[dialogue]]
speaker = "ユウリ"
original = "「あと街に出たついでに画材見るのは……やめとくか。買っても荷物になりそうだし」"
translation = "「그리고 거리로 나온 김에 화구 좀 보는 건…… 관둘까. 사봤자 짐만 될 것 같고」"

[[dialogue]]
speaker = "ユウリ"
original = "「ああ、言ったことあったっけ？\u3000下手の横好きで人に見せられたもんじゃねーが、油絵をちょっとな」"
translation = "「아아, 말한 적 있었나? 서투른 솜씨라 남에게 보여줄 만한 건 못 되지만, 유화를 좀 그리거든」"

[[dialogue]]
speaker = "ユウリ"
original = "「キャンバスに向かって集中するのってかっこいいなー、って思ってなんとなくでやってみたらけっこうはまってさ」"
translation = "「캔버스를 마주하고 집중하는 게 멋있어 보여서 그냥 해봤는데 꽤 빠져버려서 말이야」"

[[dialogue]]
speaker = "ユウリ"
original = "「絵を描くのは難しいけど、体を動かすのとは違う気持ち良さがあるんだよな。……なんて、本気で絵を描いてるやつに言ったら怒られるかもしれないけど」"
translation = "「그림 그리는 건 어렵지만, 몸을 움직이는 거랑은 다른 기분 좋음이 있단 말이지. ……랄까, 진심으로 그림 그리는 녀석이 들으면 화낼지도 모르지만」"

[[dialogue]]
speaker = "ユウリ"
original = "「……あ」"
translation = "「……아」"

[[dialogue]]
speaker = "ユウリ"
original = "「まだ待ち合わせに時間あるし、なんか食うか。行こうぜ」"
translation = "「아직 약속 시간까지 남았으니, 뭐 좀 먹을까. 가자고」"

[[dialogue]]
speaker = "ユウリ"
original = "「ぺろぺろ……やっぱりこの店のキャラメルバニラアイスは最高だな。……そんなにじっと見てもやらねーぞ。自分の食え」"
translation = "「할짝할짝…… 역시 이 가게의 캐러멜 바닐라 아이스크림은 최고야. ……그렇게 빤히 봐도 안 줄 거다. 네 거 먹어」"

[[dialogue]]
speaker = "ユウリ"
original = "「それじゃもひとつ……ぺろっ。食べ過ぎだって？\u3000普段運動してんだからこれくらい平気だっての」"
translation = "「그럼 한 번 더…… 할짝. 너무 많이 먹는다고? 평소에 운동하니까 이 정도는 괜찮다고」"

[[dialogue]]
speaker = "ユウリ"
original = "「ていうか、いくら食べても太ったことねえ。ソフィアやセーラさんには羨ましいって言われるけどな」"
translation = "「그보다, 아무리 먹어도 살찐 적 없어. 소피아나 세라 씨는 부럽다고 하지만 말이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「ユウリ、お待たせ。……あれ、緋宮会長？」"
translation = "「유우리, 기다렸지. ……어라, 히노미야 회장님?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「なんで新星の会長がいるニャン？\u3000ユウリのくせにデートしてたのニャ？」"
translation = "「왜 신성의 회장이 있는 거냥? 유우리 주제에 데이트하고 있었던 거냥?」"

[[dialogue]]
speaker = "ユウリ"
original = "「んだとコラ。ていうかちげーよ。あたしが服見てたら偶然出くわしただけだ」"
translation = "「뭐라고 이 자식이. 그보다 아니라고. 내가 옷 보고 있다가 우연히 마주친 것뿐이야」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ユウリが服を～？\u3000やっぱり色気づいてるニャ」"
translation = "「유우리가 옷을~? 역시 멋 부리고 있다냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「うっせー。アホ猫はマタタビでもやってろ」"
translation = "「시끄러워. 바보 고양이는 개박하나 먹고 있어라」"

[[dialogue]]
speaker = "フィオナ"
original = "「最近いろいろ任せてごめんね。はい、マカロン好きだったでしょ」"
translation = "「최근 이것저것 맡겨서 미안해. 자, 마카롱 좋아했지?」"

[[dialogue]]
speaker = "ユウリ"
original = "「お、サンキュー」"
translation = "「오, 땡큐」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ユウリにマカロンとか全然似合わニャいニャン。プロテインでも飲んでるがいいニャ」"
translation = "「유우리한테 마카롱이라니 전혀 안 어울린다냥. 단백질 보충제나 마시는 게 좋다냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「ははっ、キャットフードばっか食べてる猫にはマカロンの味はわかんねーだろうなー」"
translation = "「하핫, 고양이 사료만 먹는 고양이는 마카롱 맛을 모르겠지~」"

[[dialogue]]
speaker = "unk"
original = "２人は仲良し？"
translation = "둘은 사이가 좋아?"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、ケンカするほど仲がいいということで」"
translation = "「후후, 싸우면서 정드는 법이라고 하죠」"

[[dialogue]]
speaker = "ユウリ"
original = "「コラ待て、いくらフィオナでもそれは聞き捨てなんねーぞ」"
translation = "「이봐 잠깐, 아무리 피오나라 해도 그건 그냥 넘어갈 수 없다고」"

[[dialogue]]
speaker = "フィオナ"
original = "「ところで緋宮会長、ユウリはどんな服を見てたんですか？\u3000……ふむふむ、なるほど。試着ぐらいしてみても良かったんじゃない？」"
translation = "「그런데 히노미야 회장님, 유우리는 어떤 옷을 보고 있었나요? ……흠흠, 그렇군요. 한번 입어보기라도 하지 그랬어?」"

[[dialogue]]
speaker = "ユウリ"
original = "「いや、ソフィアやルリならともかくあたしには絶対似合わないだろ」"
translation = "「아니, 소피아나 루리라면 몰라도 나한테는 절대 안 어울린다고」"

[[dialogue]]
speaker = "フィオナ"
original = "「ユウリが着たところ見てみたかったんだけどな～。ねぇ、緋宮会長」"
translation = "「유우리가 입은 모습 보고 싶었는데~. 그쵸, 히노미야 회장님?」"

[[dialogue]]
speaker = "unk"
original = "すごく見てみたい！"
translation = "정말 보고 싶어!"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ。ですよねー」"
translation = "「후후, 그렇죠~」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁっ！？\u3000似合わないっつってんだろーが！」"
translation = "「하아!? 안 어울린다고 했잖아!」"

[[dialogue]]
speaker = "ユウリ"
original = "「変なところで仲良くなるな、星徒会長コンビ！\u3000ったく、からかうんじゃねーぞ」"
translation = "「이상한 데서 죽이 맞지 마, 성도회장 콤비! 나 원 참, 놀리지 말라고」"

[[dialogue]]
speaker = "フィオナ"
original = "「からかってなんかいないのに。じゃあごめんなさい、緋宮会長。ユウリをお借りしますね」"
translation = "「놀리는 거 아닌데. 그럼 미안해요, 히노미야 회장님. 유우리를 빌려 갈게요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「いやあたしはこいつのもんじゃねーし」"
translation = "「야, 난 이 녀석 물건이 아니라고.」"

[[dialogue]]
speaker = "ユウリ"
original = "「またな、新星の会長さん。今日は付き合ってくれてありがとな」"
translation = "「나중에 봐, 신성의 회장님. 오늘은 같이 있어 줘서 고마웠어.」"

