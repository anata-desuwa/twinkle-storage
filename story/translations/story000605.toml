[[dialogue]]
speaker = "unk"
original = "ヴィーナスがヨミに、サンタ大作戦の概要を話すと――"
translation = "비너스가 요미에게 산타 대작전의 개요를 설명하자――"

[[dialogue]]
speaker = "ヨミ"
original = "「えぇっ！？\u3000私もサンタをやるんですか！？」"
translation = "「에엣!? 저도 산타를 하는 건가요!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういうこと！\u3000私がセシアを手伝えないから、ヨミヨミの手を借りたいのよ！」"
translation = "「그 말이야! 내가 세시아를 도와줄 수 없으니까 요미요미의 손을 빌리고 싶어!」"

[[dialogue]]
speaker = "ヨミ"
original = "「お嬢様の頼みですし、セシアちゃんの記憶を取り戻す為でしたら、もちろん協力しますけど……」"
translation = "「아가씨의 부탁이고 세시아 짱의 기억을 되찾기 위해서라면 당연히 협력하겠지만……」"

[[dialogue]]
speaker = "ヨミ"
original = "「私、サンタはやったことがないんですけど……大丈夫ですかね？」"
translation = "「저, 산타는 해본 적이 없는데…… 괜찮을까요?」"

[[dialogue]]
speaker = "紅明"
original = "「あははっ♪\u3000んモー、ヨミヨミってば、難しく考えすぎだって～。サンタなんて、ノリでいけるいける☆」"
translation = "「아하하♪ 음메~ 요미요미도 참, 너무 어렵게 생각한다니까~. 산타 같은 거 기분으로 하면 다 된다구☆」"

[[dialogue]]
speaker = "ヨミ"
original = "「って、紅明先輩、どさくさに紛れて尻尾モフモフしないで下さい！」"
translation = "「아니, 코우메이 선배, 혼란을 틈타서 꼬리 복슬복슬 만지지 마세요!」"

[[dialogue]]
speaker = "セシア"
original = "「ヨミヨミ、紅明ママと知り合いだったのね」"
translation = "「요미요미, 코우메이 마마랑 아는 사이였구나」"

[[dialogue]]
speaker = "紅明"
original = "「うん♪\u3000アタシ、１度でも話した子とは連絡先を交換するようにしてるから☆\u3000ヨミヨミはメッセ送ると、マメに返してくれるんよね～」"
translation = "「응♪ 나, 한 번이라도 대화해 본 애랑은 연락처를 교환해 두거든☆ 요미요미는 메시지 보내면 꼬박꼬박 답장해 준다구~」"

[[dialogue]]
speaker = "ヨミ"
original = "「だって、ちゃんと返さないと、紅明先輩、拗ねたりするから……」"
translation = "「그게, 제대로 답장 안 하면 코우메이 선배, 삐지거나 하니까……」"

[[dialogue]]
speaker = "unk"
original = "セシアもヨミヨミと面識あるんだね"
translation = "세시아도 요미요미랑 안면이 있네"

[[dialogue]]
speaker = "セシア"
original = "「ええ。九浄家のお屋敷で、ヴィーナスが紹介してくれたの。ヨミヨミはわたくしのママではないけれど、モフモフしていて好きよ」"
translation = "「네. 쿠죠 가문 저택에서 비너스가 소개해 줬어요. 요미요미는 저의 마마는 아니지만, 복슬복슬해서 좋아요」"

[[dialogue]]
speaker = "ヨミ"
original = "「そ、その評価は喜ぶべきなんでしょうか……」"
translation = "「그, 그 평가는 기뻐해야 하는 걸까요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――さて、サンタ大作戦の参加メンバーはこれでいいとして、肝心のプレゼントはどうしようかしら？」"
translation = "「――자, 산타 대작전의 참가 멤버는 이걸로 됐다 치고, 제일 중요한 선물은 어떻게 할까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「理想は当然、学園の生徒たち全員に豪華なプレゼントを配って、喜んでもらうことだけど……」"
translation = "「이상은 당연히 학원의 학생들 전원에게 호화로운 선물을 나눠줘서 기쁘게 하는 거지만……」"

[[dialogue]]
speaker = "unk"
original = "限度はあるよね"
translation = "한도는 있겠지"

[[dialogue]]
speaker = "ヴィーナス"
original = "「残念ながら、そうね。準備費用は九浄家の方で出すけど、１人辺りにかけられる予算っていうのはどうしても決まってきちゃうわ」"
translation = "「안타깝지만 그래. 준비 비용은 쿠죠 가문 쪽에서 내겠지만, 1인당 들일 수 있는 예산이라는 건 아무래도 정해져 버리니까」"

[[dialogue]]
speaker = "紅明"
original = "「フフフ……みんなの笑顔は見たいけれど、プレゼントを準備するにもやはりお金が必要……そんな、今も昔も変わらぬ問題を克服する秘策が、アタシにあるぜ！」"
translation = "「후후후…… 모두의 미소는 보고 싶지만, 선물을 준비하는 데도 역시 돈이 필요…… 그런, 예나 지금이나 변함없는 문제를 극복할 비책이 나한테 있다구!」"

[[dialogue]]
speaker = "ヨミ"
original = "「紅明先輩、秘策って一体……？」"
translation = "「코우메이 선배, 비책이라니 대체……?」"

[[dialogue]]
speaker = "紅明"
original = "「なに、簡単な話さ。アタシたちは星騎士。ならば、『プレゼントを作り出す』という星術を使えるようになればいい」"
translation = "「뭐, 간단한 이야기야. 우린 성기사. 그렇다면 『선물을 만들어낸다』라는 성술을 쓸 수 있게 되면 돼」"

[[dialogue]]
speaker = "ヨミ"
original = "「いや、そんな無茶苦茶な――」"
translation = "「아니, 그런 말도 안 되는――」"

[[dialogue]]
speaker = "紅明"
original = "「今こそ、アタシの隠された第２形態を解禁する時！\u3000変身っ！！」"
translation = "「지금이야말로 나의 숨겨진 제2형태를 해금할 때! 변신!!」"

[[dialogue]]
speaker = "ヨミ"
original = "「えぇっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "紅明"
original = "「<ruby>気炎万丈<rt>きえんばんじょう</rt></ruby>、紅き童子が聖夜を駆ける――」"
translation = "「기염만장, 붉은 동자가 성탄의 밤을 달린다――」"

[[dialogue]]
speaker = "紅明"
original = "「<ruby>三太九郎<rt>さんたくろう</rt></ruby>改め、サンタクロース牛紅明！\u3000世のため人のため、クリスマスも元気で救うぜ！」"
translation = "「산타쿠로 개명, 산타클로스 규우 코우메이! 세상을 위해 사람을 위해, 크리스마스도 활기차게 구해주겠다구!」"

[[dialogue]]
speaker = "セシア"
original = "「紅明ママがサンタに変身したわ！」"
translation = "「코우메이 마마가 산타로 변신했어!」"

[[dialogue]]
speaker = "unk"
original = "紅明、かわいい！\u3000でも、その姿は……！？"
translation = "코우메이, 귀여워! 하지만 그 모습은……!?"

[[dialogue]]
speaker = "紅明"
original = "「えへへ♪\u3000ダーリン、ありがと<emoji=heart04>」"
translation = "「에헤헤♪ 달링, 고마워<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「これは昔むかし、アタシのご先祖様が、人間界の子供たちを満面の笑顔にしたいって思った時に、修行して手に入れた新たな力ってやつかな☆」"
translation = "「이건 옛날 옛적에 내 선조님이 인간계의 아이들을 만면에 미소 짓게 하고 싶다고 생각했을 때, 수행해서 얻은 새로운 힘이라는 걸까나☆」"

[[dialogue]]
speaker = "紅明"
original = "「というわけで、百聞は一見に如かず。サンタの袋から～……ほい♪\u3000よい子なセッシーにひと足早いクリスマスプレゼントをあげちゃおう☆」"
translation = "「그런 고로 백문이 불여일견. 산타 보따리에서~…… 호잇♪ 착한 아이 세시에게 한발 빠른 크리스마스 선물을 줄게☆」"

[[dialogue]]
speaker = "セシア"
original = "「わあぁっ♪\u3000セシアにくれるの！？\u3000紅明ママ……ううん、サンタママ、ありがと～♪」"
translation = "「와아앗♪ 세시아한테 주는 거야!? 코우메이 마마…… 아니, 산타 마마, 고마워~♪」"

[[dialogue]]
speaker = "セシア"
original = "「中身を開けてもいいかしら？」"
translation = "「내용물을 열어봐도 될까?」"

[[dialogue]]
speaker = "紅明"
original = "「うん、もちろん♪」"
translation = "「응, 당연하지♪」"

[[dialogue]]
speaker = "セシア"
original = "「箱の中に入っているのは……これは、機械かしら？」"
translation = "「상자 안에 들어있는 건…… 이건 기계일까?」"

[[dialogue]]
speaker = "紅明"
original = "「それはＤＩＳＣって言って、簡単に説明するとアタシ達が連絡を取り合う為に使ってるものなんだ」"
translation = "「그건 DISC라고 해서, 간단히 설명하면 우리가 연락을 주고받기 위해 사용하는 거야」"

[[dialogue]]
speaker = "紅明"
original = "「セッシーとは、これから仲良くしていきたいからさ。アタシと連絡先を交換して欲しいなって思って♪」"
translation = "「세시랑은 앞으로 사이좋게 지내고 싶으니까. 나랑 연락처를 교환해 줬으면 해서♪」"

[[dialogue]]
speaker = "セシア"
original = "「紅明ママ……！\u3000セシア、感激だわ♪\u3000ママはやっぱり素敵なママね♪」"
translation = "「코우메이 마마……! 세시아, 감격이야♪ 마마는 역시 멋진 마마네♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「本当に星術でプレゼントを作り出したんですか！？\u3000ば、爆裂すごいです……！」"
translation = "「정말로 성술로 선물을 만들어낸 건가요!? 버, 폭렬 대단해요……!」"

[[dialogue]]
speaker = "紅明"
original = "「善哉善哉♪\u3000これが本物のサンタクロースの力っしょ☆\u3000なんつってね♪」"
translation = "「선재선재♪ 이것이 진짜 산타클로스의 힘이라구☆ 농담이야♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これは……閃いたかもしれないわ！\u3000ねぇ、クロト！」"
translation = "「이거…… 좋은 생각이 떠올랐을지도 몰라! 저기, 쿠로토!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほら、アナとアニマ先輩が研究してた、例のアレがあるじゃない？\u3000それに使えるかも！」"
translation = "「있잖아, 아나랑 아니마 선배가 연구하던 그게 있잖아? 거기에 쓸 수 있을지도!」"

[[dialogue]]
speaker = "unk"
original = "もしかして、新フォームの……？"
translation = "설마, 새로운 폼의……?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう！\u3000夏に手に入れた水着フォームから応用して――」"
translation = "「그래! 여름에 얻은 수영복 폼에서 응용해서――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クリスマスフォームを作り出すのよ！」"
translation = "「크리스마스 폼을 만들어내는 거야!」"

