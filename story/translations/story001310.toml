[[dialogue]]
speaker = "unk"
original = "初夏に出現した新種モンスターの出現騒動は……果たして、ノヴァフォームに覚醒したマトイの手によって幕が下ろされた。"
translation = "초여름에 출현한 신종 몬스터 소동은…… 과연, 노바 폼으로 각성한 마토이의 손에 의해 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "大型モンスターの討伐に成功すると同時に、小型モンスターの大群も消滅。学園エリア一帯の安全が確認された。"
translation = "대형 몬스터 토벌에 성공함과 동시에 소형 몬스터 대군도 소멸. 학원 에어리어 일대의 안전이 확인되었다."

[[dialogue]]
speaker = "unk"
original = "民間人への被害は……残念ながら怪我をした人たちも多かったが、一方で奇跡的に死者は出なかった。"
translation = "민간인 피해는…… 안타깝게도 부상자도 많았지만, 한편으로 기적적으로 사망자는 나오지 않았다."

[[dialogue]]
speaker = "unk"
original = "俺たちの訓練は、ちゃんと人々の命を守る結果に繋がったのである。"
translation = "우리들의 훈련은 제대로 사람들의 목숨을 지키는 결과로 이어진 것이다."

[[dialogue]]
speaker = "unk"
original = "戦闘終了後、各本面への連絡を済ませたあと──"
translation = "전투 종료 후, 각 방면으로 연락을 마친 뒤──"

[[dialogue]]
speaker = "マトイ"
original = "「ふぅ……」"
translation = "「후우……」"

[[dialogue]]
speaker = "unk"
original = "近くのベンチに腰かけて休んでいたマトイに、俺は声をかける。"
translation = "근처 벤치에 앉아 쉬고 있던 마토이에게 나는 말을 건다."

[[dialogue]]
speaker = "マトイ"
original = "「あ……会長」"
translation = "「아…… 회장님」"

[[dialogue]]
speaker = "マトイ"
original = "「――大丈夫。体は全然平気。ただちょっと、気が抜けちゃっただけだから……」"
translation = "「──괜찮아. 몸은 전혀 멀쩡해. 그냥 좀 긴장이 풀렸을 뿐이니까……」"

[[dialogue]]
speaker = "マトイ"
original = "「そうだ、ありがとね、会長。ほら、私のこと信じるって言ってくれたでしょ」"
translation = "「맞다, 고마워, 회장님. 봐, 나를 믿는다고 말해줬잖아」"

[[dialogue]]
speaker = "マトイ"
original = "「あそこでアルケインコードを使ってくれたから、私は勝つことができた」"
translation = "「거기서 아르케인 코드를 사용해 줬기에 나는 이길 수 있었어」"

[[dialogue]]
speaker = "unk"
original = "よく頑張ったな"
translation = "정말 수고했다"

[[dialogue]]
speaker = "マトイ"
original = "「あ……！\u3000うん♪\u3000えへへ……♪」"
translation = "「아……! 응♪ 에헤헤……♪」"

[[dialogue]]
speaker = "マハムート"
original = "「マトイ」"
translation = "「마토이」"

[[dialogue]]
speaker = "マトイ"
original = "「マム！」"
translation = "「마무!」"

[[dialogue]]
speaker = "unk"
original = "マトイがベンチから立ち上がろうとすると――"
translation = "마토이가 벤치에서 일어나려 하자──"

[[dialogue]]
speaker = "マハムート"
original = "「こら、無理に立ち上がらなくていいから。ぱっと見、体は回復しているように見えるけど、学園に帰ったら１度保健室に行って、診てもらいなさい」"
translation = "「이봐, 무리해서 일어나지 않아도 되니까. 언뜻 보기에 몸은 회복된 것처럼 보이지만, 학원에 돌아가면 한 번 보건실에 가서 진찰을 받으렴.」"

[[dialogue]]
speaker = "マトイ"
original = "「は、はい。じゃなかった……イエス・マム！」"
translation = "「네, 네. 가 아니라…… 이스 마무!」"

[[dialogue]]
speaker = "マハムート"
original = "「今はそういうのはいいわ。マトイ――」"
translation = "「지금은 그런 건 됐단다. 마토이──」"

[[dialogue]]
speaker = "マハムート"
original = "「今日の貴方は私よりも強かった。竜の私が認めてあげるのだから、自信を持って誇りなさい」"
translation = "「오늘의 너는 나보다 강했다. 용족인 내가 인정하는 것이니 자신감을 갖고 자랑스러워하렴.」"

[[dialogue]]
speaker = "unk"
original = "それから、座っているマトイの頭に手を置いて――"
translation = "그러고는 앉아 있는 마토이의 머리에 손을 얹고──"

[[dialogue]]
speaker = "マハムート"
original = "「……よくやったわね。今日だけは特別に褒めてあげるわ」"
translation = "「……잘 했구나. 오늘만큼은 특별히 칭찬해 주마.」"

[[dialogue]]
speaker = "unk"
original = "マムはそっと頭を撫でながら、微笑んだ。"
translation = "마무는 부드럽게 머리를 쓰다듬으며 미소 지었다."

[[dialogue]]
speaker = "マトイ"
original = "「……！\u3000マム……！」"
translation = "「……! 마무……!」"

[[dialogue]]
speaker = "アム"
original = "「マトイ先輩～！」"
translation = "「마토이 선배~!」"

[[dialogue]]
speaker = "マトイ"
original = "「アムちゃん！」"
translation = "「아무짱!」"

[[dialogue]]
speaker = "アム"
original = "「みんな、ここにいたんですね！\u3000探してたんですよ～！」"
translation = "「모두 여기 있었군요! 찾고 있었다고요~!」"

[[dialogue]]
speaker = "アム"
original = "「マトイ先輩！\u3000新フォームでの活躍、めっちゃ凄かったです！\u3000カッコよくて、トキめいちゃいました！」"
translation = "「마토이 선배! 새 폼에서의 활약, 진짜 대박이었어요! 멋있어서 두근거려 버렸다니까요!」"

[[dialogue]]
speaker = "マトイ"
original = "「アムちゃんからそう言ってもらえるなんて、なんか照れちゃうね……」"
translation = "「아무짱한테 그런 소리를 듣다니, 왠지 부끄러운걸……」"

[[dialogue]]
speaker = "アム"
original = "「あんなの見せられちゃったら、それはもう！\u3000あたしも頑張るぞって、闘志でメラメラ燃えて来ちゃいますよ！」"
translation = "「그런 걸 봐버렸으니 당연하죠! 나도 힘내야지 하고 투지가 활활 타오른다니까요!」"

[[dialogue]]
speaker = "アム"
original = "「だから、今日からマトイ先輩も、あたしのライバルです！」"
translation = "「그러니까 오늘부터 마토이 선배도 제 라이벌이에요!」"

[[dialogue]]
speaker = "マトイ"
original = "「え？\u3000私が、アムちゃんの……？」"
translation = "「어? 내가 아무짱의……?」"

[[dialogue]]
speaker = "アム"
original = "「はい！\u3000同じ盾使いとして、これからもお互い切磋琢磨して行きましょう！\u3000あと……また一緒におでかけデートもしましょう！」"
translation = "「네! 같은 방패 사용자로서 앞으로도 서로 절차탁마해 나가요! 그리고…… 또 같이 외출 데이트도 해요!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、アムは開いた手を差し出す。"
translation = "그렇게 말하며 아무는 펼친 손을 내민다."

[[dialogue]]
speaker = "マトイ"
original = "「……！\u3000うん♪\u3000これからもよろしくね、アムちゃん」"
translation = "「……! 응♪ 앞으로도 잘 부탁해, 아무짱」"

[[dialogue]]
speaker = "アム"
original = "「はい♪\u3000マトイ先輩！」"
translation = "「네♪ 마토이 선배!」"

[[dialogue]]
speaker = "unk"
original = "マトイがアムの手を取り、２人は握手を交わす。"
translation = "마토이가 아무의 손을 잡고 두 사람은 악수를 나눈다."

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "女の子"
original = "「あの……お姉さん！」"
translation = "「저기…… 언니!」"

[[dialogue]]
speaker = "マトイ"
original = "「あなたはさっきの……」"
translation = "「너는 아까 그……」"

[[dialogue]]
speaker = "unk"
original = "声をかけて来たのは、マトイが身を呈して守った、星力持ちの女の子であった。"
translation = "말을 걸어온 것은 마토이가 몸을 던져 지켜낸 성력을 지닌 여자아이였다."

[[dialogue]]
speaker = "マトイ"
original = "「あれから大丈夫だった？\u3000怪我はない？」"
translation = "「그 뒤로 괜찮았니? 다친 데는 없고?」"

[[dialogue]]
speaker = "女の子"
original = "「は、はい。さっき救急隊の人が確認してくれて、体のどこにも異常はないって」"
translation = "「네, 네. 아까 구급대 분이 확인해 주셨는데 몸 어디에도 이상은 없대요」"

[[dialogue]]
speaker = "マトイ"
original = "「そう、無事でよかった」"
translation = "「그래, 무사해서 다행이야」"

[[dialogue]]
speaker = "女の子"
original = "「あの……私のこと、助けてくれてありがとうございました！」"
translation = "「저기…… 저를 도와주셔서 감사합니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「どういたしまして。私も、あなたを守ることができてよかった」"
translation = "「천만에. 나도 너를 지킬 수 있어서 다행이야」"

[[dialogue]]
speaker = "女の子"
original = "「それで、私……お姉さんに伝えたいことがあって！」"
translation = "「그래서 저…… 언니한테 전하고 싶은 게 있어서요!」"

[[dialogue]]
speaker = "マトイ"
original = "「私に？」"
translation = "「나한테?」"

[[dialogue]]
speaker = "女の子"
original = "「私……星力を持っているせいで、これまでもモンスターに狙われることが何度もあって……その度に怖くて、もう嫌だって思ってました」"
translation = "「저…… 성력을 가진 탓에 지금까지도 몬스터한테 노려진 적이 몇 번이나 있어서…… 그때마다 무섭고 이제 싫다고 생각했어요」"

[[dialogue]]
speaker = "女の子"
original = "「でも……今日のお姉さん、すごくカッコよかった！\u3000私もお姉さんみたいに強くなりたいって、そう思ったんです！」"
translation = "「하지만…… 오늘 언니, 정말 멋졌어요! 저도 언니처럼 강해지고 싶다고, 그렇게 생각했어요!」"

[[dialogue]]
speaker = "女の子"
original = "「私……今日から星騎士を目指します！」"
translation = "「저…… 오늘부터 성기사를 목표로 할래요!」"

[[dialogue]]
speaker = "マトイ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "女の子"
original = "「だから……お名前を教えてくれませんか？\u3000私、お姉さんを目指して頑張ります！」"
translation = "「그러니까…… 이름을 알려주시지 않겠어요? 저, 언니를 목표로 노력할게요!」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、えっと……」"
translation = "「아, 그게……」"

[[dialogue]]
speaker = "unk"
original = "マトイは驚いて動揺している様子だったが、深呼吸をして――"
translation = "마토이는 놀라 당황한 기색이었지만 심호흡을 하고──"

[[dialogue]]
speaker = "マトイ"
original = "「私は、マトイ。詠野マトイ。新星学園星徒会所属の星騎士だよ」"
translation = "「나는 마토이. 에이노 마토이. 신성학원 성도회 소속 성기사야」"

[[dialogue]]
speaker = "女の子"
original = "「マトイお姉さん……私、新星学園の星騎士になれるように頑張ります！」"
translation = "「마토이 언니…… 저, 신성학원 성기사가 될 수 있도록 노력할게요!」"

[[dialogue]]
speaker = "女の子"
original = "「お姉さんみたいに、勇気を持って誰かを守ってあげられる、強い星騎士に！」"
translation = "「언니처럼 용기를 갖고 누군가를 지켜줄 수 있는 강한 성기사로!」"

[[dialogue]]
speaker = "女の子"
original = "「それで……あと……その……」"
translation = "「그래서…… 그리고…… 그……」"

[[dialogue]]
speaker = "マトイ"
original = "「？\u3000どうかした？」"
translation = "「? 왜 그래?」"

[[dialogue]]
speaker = "女の子"
original = "「も、もしよかったら、連絡先を教えて欲しいです！\u3000その……困った時に、アドバイスとかしてもらえたら……！」"
translation = "「호, 혹시 괜찮으시면 연락처를 가르쳐 주셨으면 해요! 그…… 곤란할 때 조언 같은 걸 해주신다면……!」"

[[dialogue]]
speaker = "アム"
original = "「わお！\u3000思っていた以上に積極的……！」"
translation = "「와오! 생각했던 것보다 적극적……!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふ、これは将来、大物の星騎士になるかもしれないわね」"
translation = "「후후, 이건 장래에 거물 성기사가 될지도 모르겠는걸.」"

[[dialogue]]
speaker = "unk"
original = "それから、マトイはお互いのＤＩＳＣの連絡先を交換して。"
translation = "그러고는 마토이는 서로의 DISC 연락처를 교환하고."

[[dialogue]]
speaker = "女の子"
original = "「それじゃあ、また連絡しますね！\u3000マトイお姉さん！」"
translation = "「그럼 나중에 또 연락할게요! 마토이 언니!」"

[[dialogue]]
speaker = "マトイ"
original = "「う、うん。またね」"
translation = "「으, 응. 또 봐」"

[[dialogue]]
speaker = "unk"
original = "ぺこりとお辞儀をして、嬉しそうに手を振って去って行く女の子。"
translation = "꾸벅 인사를 하고 기쁜 듯이 손을 흔들며 떠나가는 여자아이."

[[dialogue]]
speaker = "マトイ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "それをマトイは、放心したように見つめていた。"
translation = "그것을 마토이는 멍하니 바라보고 있었다."

[[dialogue]]
speaker = "マトイ"
original = "「私みたいな星騎士になりたいって、そんな風に言ってくれる子が現れるだなんて……」"
translation = "「나 같은 성기사가 되고 싶다고 그렇게 말해주는 아이가 나타나다니……」"

[[dialogue]]
speaker = "unk"
original = "あの子にとって、マトイは『特別』になったんだな"
translation = "그 아이에게 있어 마토이는 『특별』해진 거구나"

[[dialogue]]
speaker = "マトイ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "マトイ"
original = "「私が、特別……」"
translation = "「내가 특별……」"

[[dialogue]]
speaker = "マトイ"
original = "「そっか。本当にそうなら――」"
translation = "「그렇구나. 정말 그렇다면──」"

[[dialogue]]
speaker = "マトイ"
original = "「新しいフォームに覚醒できたことよりも、ずっと嬉しい」"
translation = "「새로운 폼으로 각성할 수 있었던 것보다 훨씬 기뻐」"

[[dialogue]]
speaker = "unk"
original = "マトイはそう言って、誇らしげな笑顔を浮かべるのだった――"
translation = "마토이는 그렇게 말하며 자랑스러운 미소를 짓는 것이었다──"

