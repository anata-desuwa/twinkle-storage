[[dialogue]]
speaker = "unk"
original = "第４話,決闘の約束,B"
translation = "제4화, 결투의 약속, B"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"
translation = "「당신을 오늘부로 이곳, 신성 학원 성도회── 성도 회장으로 임명합니다. 그리고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"
translation = "「히노미야 쿠로토── 당신은 마왕이 되어, 이 세계를 구원하는 것입니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………………………え？」"
translation = "「…………………………에?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「きゃあ」"
translation = "「꺄아」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぱおーん」"
translation = "「빠오옹」"

[[dialogue]]
speaker = "unk"
original = "その場でたっぷり３０秒は固まってしまった。"
translation = "그 자리에서 꼬박 30초는 굳어 버렸다."

[[dialogue]]
speaker = "unk"
original = "しばらくして、俺が口火を切ることで再び時は動き出す。"
translation = "잠시 후, 내가 말문을 엶으로써 다시 시간이 움직이기 시작한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、待ってください。さすがに話が読めません。ええと──」"
translation = "「자, 잠깐 기다려 주세요. 아무리 그래도 이야기가 이해가 안 됩니다. 그러니까──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「九浄ヴィーナス。新星学園へ入ったのなら、私の名前くらい覚えておくべきね」"
translation = "「쿠죠 비너스. 신성 학원에 들어왔다면, 내 이름 정도는 외워둬야지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「九浄ヴィーナス会長。状況がよく飲み込めないのですが」"
translation = "「쿠죠 비너스 회장. 상황이 잘 파악되지 않는데요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヴィーナスでいいわ。もう星徒会長じゃないもの」"
translation = "「비너스로 됐어. 이제 성도 회장이 아니니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった、ヴィーナス。でも君の言っていることは理解できない」"
translation = "「알았어, 비너스. 하지만 네가 하는 말은 이해할 수 없어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「順応早っ」"
translation = "「적응 빠르네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「知っての通り俺は昨日入ってきたばかりの転入生だ。そんな俺をどうして待っていたんだ？」"
translation = "「알다시피 나는 어제 막 들어온 전학생이다. 그런 나를 왜 기다리고 있었던 거지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうしてって──」"
translation = "「왜냐니──」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは、きょとんとした顔を浮かべると、机から一冊の本を取り出した。"
translation = "비너스는, 멀뚱한 얼굴을 짓더니, 책상에서 책 한 권을 꺼냈다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「これに書かれてるからに決まってるじゃない！」"
translation = "「이것에 쓰여 있으니까 당연한 거잖아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「緋宮クロト──あなたが今年新星学園に来ることも含め、私には全ての運命が見えていたわ！」"
translation = "「히노미야 쿠로토── 당신이 올해 신성 학원에 올 것도 포함해서, 나에게는 모든 운명이 보였어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "急に占い師みたいなことを言い始めた。"
translation = "갑자기 점쟁이 같은 소리를 하기 시작했다."

[[dialogue]]
speaker = "unk"
original = "隣では、マトイも俺以上に困惑の顔を浮かべている。"
translation = "옆에서는, 마토이도 나 이상으로 당황한 얼굴을 짓고 있다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もしかして、昨日の出動も……」"
translation = "「혹시, 어제의 출동도……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふん、モチロンよ。だからちゃんとアナにセレスティアを持たせていたでしょう？」"
translation = "「후훗, 물론이지. 그러니까 제대로 아나에게 셀레스티아를 들려주고 있었잖아?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私は何も聞いてなかったんですけど！」"
translation = "「저는 아무것도 듣지 못했는데요!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「話すと長くなりそうだったので」"
translation = "「말하면 길어질 것 같아서요」"

[[dialogue]]
speaker = "unk"
original = "どうやら昨日の朝、マトイたちが駆けつけてくれたのも彼女の差し金らしかった。"
translation = "아무래도 어제 아침, 마토이 일행이 달려와 준 것도 그녀의 지시였던 모양이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君が俺を任命しようとしてくれているのは光栄だ。けど、入ってすぐ星徒会長なんて聞いたこともない」"
translation = "「네가 나를 임명해 주려고 하는 건 영광이다. 하지만, 들어오자마자 성도 회장이라니 들어본 적도 없어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふーん。会長の任命を拒否するというのなら──仕方ないわ。退学ね」"
translation = "「흐음. 회장 임명을 거부하겠다면── 어쩔 수 없지. 퇴학이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「な……」"
translation = "「뭐……」"

[[dialogue]]
speaker = "unk"
original = "退学──ここへきて突きつけられたその二文字は、俺にとって何より重いものだった。"
translation = "퇴학── 이곳에 와서 맞닥뜨린 그 두 글자는, 나에게 무엇보다 무거운 것이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「退学なんて、そんな……」"
translation = "「퇴학이라니, 그런……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「これも決まりなの。星徒会長による人事は絶対──従えないのなら学園を去ってもらうことになるわ」"
translation = "「이것도 규칙이야. 성도 회장에 의한 인사는 절대적── 따를 수 없다면 학원을 떠나야 할 거야」"

[[dialogue]]
speaker = "unk"
original = "星徒会長の権力は絶大。"
translation = "성도 회장의 권력은 절대적이다."

[[dialogue]]
speaker = "unk"
original = "昨日聞かされていた現実を、こうもむざむざと味わうことになるなんて。"
translation = "어제 들었던 현실을, 이렇게 허무하게 맛보게 될 줄이야."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──あの、会長。決まりなのはわかりますけど……いくらなんでも常識はずれなんじゃ」"
translation = "「──저, 회장. 규칙인 건 알겠습니다만…… 아무리 그래도 상식 밖이 아닌가요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうねえ。通例なら会長の交代は３ヶ月近く前だもの」"
translation = "「그렇지. 통례라면 회장 교체는 3개월 가까이 전이니까」"

[[dialogue]]
speaker = "unk"
original = "惑う俺を見かねてか、マトイと、もう１人の星徒会役員が助け舟を出してくれる。"
translation = "당황하는 나를 보다 못했는지, 마토이와, 또 한 명의 성도회 임원이 도움을 준다."

[[dialogue]]
speaker = "unk"
original = "俺の転入時期と同じく、今は組織編成にしたって半端な時期に違いない。"
translation = "내가 전학 온 시기와 마찬가지로, 지금은 조직 편성에 있어서도 어중간한 시기임이 틀림없다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……マトイとサーシャさんの言うことも一理あるわ。このままじゃ新星学園の生徒たちが納得しないでしょう」"
translation = "「……마토이와 사샤 씨의 말도 일리가 있네. 이대로라면 신성 학원의 학생들이 납득하지 못하겠지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──だから！\u3000あなたは全校生徒の前で、力を示しなさい！」"
translation = "「──그러니까! 당신은 전교생 앞에서, 힘을 보여줘!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「力を……？」"
translation = "「힘을……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう！」"
translation = "「그래!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！」"
translation = "「히노미야 쿠로토── 당신은 나와 싸워 이겨서, 그 진정한 힘을 모두에게 알리는 거야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「戦うって……会長と！？\u3000無茶です、それこそ──」"
translation = "「싸우라니…… 회장과!? 무리예요, 그거야말로──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「星徒会長に任命されるより、無理ゲ～」"
translation = "「성도 회장에 임명되는 것보다, 무리수~」"

[[dialogue]]
speaker = "unk"
original = "気づけば当人である俺以上に、ヴィーナス以外の女子生徒のほうが慌てふためいていた。"
translation = "정신을 차려 보니 당사자인 나 이상으로, 비너스 이외의 여학생들이 더 허둥대고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫よ２人とも。だってこれは──私から彼へのお願いだもの」"
translation = "「괜찮아 둘 다. 왜냐하면 이건── 내가 그에게 하는 부탁이니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「彼はそれを裏切るような人じゃないわ。そうよね、緋宮クロト？」"
translation = "「그는 그것을 배신할 만한 사람이 아니야. 그렇지, 히노미야 쿠로토?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "初対面で何を──と普通なら思うだろう。"
translation = "초면인데 뭘── 하고 보통이라면 생각할 것이다."

[[dialogue]]
speaker = "unk"
original = "でも、そう真っ直ぐに俺を見つめる彼女の瞳は、どこか悲しげなようにも見えて……。"
translation = "하지만, 그렇게 똑바로 나를 바라보는 그녀의 눈동자는, 어딘가 슬퍼 보이기도 해서……."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──学園長にも話を通してあるわ。もし合意が得られたら、全生徒の前で『御前試合』を行うってね」"
translation = "「──학원장에게도 이야기를 해뒀어. 만약 합의가 이루어진다면, 전교생 앞에서 『어전 시합』을 치르겠다고」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「御前試合……！？」"
translation = "「어전 시합……!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──ってなんだっけ」"
translation = "「──이 뭐였더라」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「昔、<b>流星</b>学園にあった一騎打ち制度。でも……ここ数十年、実施された記録は一切ない」"
translation = "「옛날, <b>유성</b> 학원에 있던 일대일 대결 제도. 하지만…… 최근 수십 년간, 실시된 기록은 일절 없다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……わかった」"
translation = "「……알았어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん……？」"
translation = "「히노미야 군……?」"

[[dialogue]]
speaker = "unk"
original = "退学を天秤にかけられているなら仕方がない。"
translation = "퇴학을 저울질당하고 있다면 어쩔 수 없다."

[[dialogue]]
speaker = "unk"
original = "もし彼女が俺に目をかけてくれているというなら、少なくともその厚意には応えるべきだろう。"
translation = "만약 그녀가 나에게 관심을 보여주고 있는 것이라면, 적어도 그 호의에는 응해야 할 것이다."

[[dialogue]]
speaker = "unk"
original = "だから──"
translation = "그러니까──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「九浄ヴィーナス──俺は君に勝って、星徒会長の座を貰い受けよう」"
translation = "「쿠죠 비너스── 나는 너에게 이겨서, 성도 회장의 자리를 물려받겠다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうこなくっちゃ」"
translation = "「그렇게 나와야지」"

[[dialogue]]
speaker = "unk"
original = "俺の学園生活は、いきなりの急展開を迎えることになった。"
translation = "나의 학원 생활은, 갑작스러운 급전개를 맞이하게 되었다."

