[[dialogue]]
speaker = "unk"
original = "第１１話,２０００年前の魔王,B"
translation = "제11화, 2000년 전의 마왕, B"

[[dialogue]]
speaker = "ケイティ"
original = "「フッ──！」"
translation = "「훗──!」"

[[dialogue]]
speaker = "unk"
original = "ケイティさんの大剣が極星従騎の首を絶ち、残骸が光となって消えていく。"
translation = "케이티 씨의 대검이 극성종기의 목을 끊자, 잔해가 빛이 되어 사라져 간다."

[[dialogue]]
speaker = "ケイティ"
original = "「ふぅ……これが極星従騎……噂に違わぬ強敵でした」"
translation = "「후우…… 이것이 극성종기…… 소문대로의 강적이었습니다」"

[[dialogue]]
speaker = "ナターシャ"
original = "「とか言ってバッサリじゃん。さすが制圧天使だね」"
translation = "「말은 그렇게 해도 단칼에 베어버렸잖아. 역시 제압천사네」"

[[dialogue]]
speaker = "ケイティ"
original = "「だからその名前はやめてください……」"
translation = "「그러니까 그 이름으로 부르지 말아 주세요……」"

[[dialogue]]
speaker = "クロト"
original = "（確かに制圧天使の名に恥じない戦いぶりだったな……）"
translation = "(확실히 제압천사라는 이름이 부끄럽지 않은 싸움 방식이었어……)"

[[dialogue]]
speaker = "unk"
original = "お淑やかな人だから、どんな戦い方をするのかと思いきや、二振りの大剣を用いての正面切っての斬り合いだった。"
translation = "조신한 분이라 어떤 식으로 싸울까 싶었는데, 두 자루의 대검을 사용해 정면에서 맞붙는 칼부림이었다."

[[dialogue]]
speaker = "unk"
original = "見かけに似合わぬ剛腕で、さすが衛兵隊長だ。"
translation = "겉보기와 어울리지 않는 강한 힘으로, 과연 위병대장답다."

[[dialogue]]
speaker = "ケイティ"
original = "「では今のうちに女神様の神殿へ向かいましょう。私は聖庭園を離れることはできませんが、途中までは同行いたします」"
translation = "「그럼 지금 기회에 여신님의 신전으로 향하죠. 저는 성정원을 떠날 수 없지만, 도중까지는 동행하겠습니다」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それじゃ、私と姉さんについてきて」"
translation = "「그럼, 나랑 언니를 따라와」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、よろしく頼む！」"
translation = "「아아, 잘 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "聖庭園議会を離れ、ナターシャとケイティさんの案内で女神の神殿を目指す。"
translation = "성정원 의회를 떠나, 나타샤와 케이티 씨의 안내로 여신의 신전을 향한다."

[[dialogue]]
speaker = "unk"
original = "ここは聖庭園のはずれで、視界の先には空と雲、そして空中島の群れが見える。"
translation = "이곳은 성정원 외곽으로, 시선 끝에는 하늘과 구름, 그리고 공중섬 무리가 보인다."

[[dialogue]]
speaker = "アポロ"
original = "「おお～、すごい眺めだ！\u3000神殿に行く途中じゃなかったら、もっと見ていたかったんだけどな」"
translation = "「오오~, 굉장한 경치다! 신전에 가는 도중이 아니었다면 좀 더 보고 싶었을 텐데 말이야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも女神の神殿は大丈夫かな？\u3000極星従騎の襲撃からけっこう経つんだよね？\u3000今頃危ないんじゃ……」"
translation = "「그치만 여신의 신전은 괜찮을까? 극성종기의 습격으로부터 꽤 지났잖아? 지금쯤 위험한 거 아닐까……」"

[[dialogue]]
speaker = "ケイティ"
original = "「女神様の神殿には強力なガーディアンが配置されており、侵入者を迎撃します。そう簡単に近づくことはできません」"
translation = "「여신님의 신전에는 강력한 가디언이 배치되어 침입자를 요격합니다. 그리 쉽게 접근할 수는 없습니다」"

[[dialogue]]
speaker = "梨緒"
original = "「だが相手は極星星徒会だ。突破してくるのも時間の問題だろう」"
translation = "「하지만 상대는 극성성도회다. 돌파당하는 것도 시간문제겠지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも女神の神殿って、とっても大事な場所なんでしょ？\u3000どうして聖庭園だけが場所を知ってるの？」"
translation = "「그치만 여신의 신전이란 거, 엄청 중요한 장소지? 어째서 성정원만 장소를 알고 있는 거야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「存在ごと忘却して隠そうとしたんだよ。神殿を守るためにね」"
translation = "「존재 자체를 망각시켜서 숨기려 한 거야. 신전을 지키기 위해서 말이지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「忘却？」"
translation = "「망각?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「太陽の壁画ってあるよね？\u3000絵に描かれてるものはともかく、アレ、内容的には嘘じゃないんだよ」"
translation = "「태양의 벽화라는 거 있잖아? 그림에 그려진 건 어쨌든, 그거 내용적으로는 거짓말이 아니야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んん？\u3000どうして壁画の話になるのよ？\u3000今そんな話してる場合じゃないでしょ？」"
translation = "「응? 왜 갑자기 벽화 이야기가 나오는 거야? 지금 그런 이야기 할 때가 아니잖아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに正しいのは『月の壁画』で、魔王は世界を救った英雄。悪の魔王が倒されるのを描いた『太陽の壁画』は真っ赤な嘘よ！」"
translation = "「게다가 옳은 건 『달의 벽화』고, 마왕은 세계를 구한 영웅이야. 악의 마왕이 쓰러지는 걸 그린 『태양의 벽화』는 새빨간 거짓말이라고!」"

[[dialogue]]
speaker = "unk"
original = "『太陽の壁画』は、流星市国のファリア大聖堂に収められている画だ。"
translation = "『태양의 벽화』는 유성시국의 파리아 대성당에 보관되어 있는 그림이다."

[[dialogue]]
speaker = "unk"
original = "人間・魔族・天使の三種族が力を合わせ、世界を破滅に導こうとした魔王を打ち倒した様子が描かれている。"
translation = "인간·마족·천사의 세 종족이 힘을 합쳐, 세계를 파멸로 이끌려 했던 마왕을 토벌하는 모습이 그려져 있다."

[[dialogue]]
speaker = "unk"
original = "一般の人々にはこちらの内容が信じられており、魔王は悪の存在と認識されている。"
translation = "일반 사람들에게는 이 내용이 믿어지고 있으며, 마왕은 악의 존재로 인식되고 있다."

[[dialogue]]
speaker = "unk"
original = "一方、星見家で保管されている『月の壁画』は、魔王がリクリエに勝利した場面を画にしたものだ。"
translation = "한편, 호시미 가문에서 보관 중인 『달의 벽화』는 마왕이 리크리에에 승리한 장면을 그림으로 그린 것이다."

[[dialogue]]
speaker = "unk"
original = "俺やヴィーナスはこの『月の壁画』が真実だと思っていたのだが……"
translation = "나나 비너스는 이 『달의 벽화』가 진실이라고 생각하고 있었는데……"

[[dialogue]]
speaker = "ナターシャ"
original = "「それがね、『太陽の壁画』と『月の壁画』はどっちも本当なんだよ」"
translation = "「그게 말이야, 『태양의 벽화』랑 『달의 벽화』는 둘 다 진짜야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁっ！？」"
translation = "「하아!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「魔王と呼ばれる存在は、ラクシスだけじゃなかったってこと」"
translation = "「마왕이라 불리는 존재는 락시스뿐만이 아니었다는 소리지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「『月の壁画』は３０００年前のもので、リクリエに打ち克った魔王ラクシスを描いたもの」"
translation = "「『달의 벽화』는 3000년 전의 것으로, 리크리에를 이겨낸 마왕 락시스를 그린 것」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だけど２０００年前にも魔王は現れた。ラクシスの子孫である彼は──彼女かもしれないけど、彼にしとくね」"
translation = "「하지만 2000년 전에도 마왕은 나타났어. 락시스의 후손인 그는── 그녀일지도 모르지만, 일단 그라고 해둘게」"

[[dialogue]]
speaker = "ナターシャ"
original = "「魔王の血筋に生まれた彼は、英雄の子孫と崇められ、祖先のようにリクリエとの戦いで活躍することを期待されていた」"
translation = "「마왕의 혈통으로 태어난 그는 영웅의 후손이라 숭상받으며, 조상처럼 리크리에와의 싸움에서 활약하기를 기대받았어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だけどそれが驕りを生んだのか、彼はいつしかよからぬ野望を抱くようになり、彼は三界の支配を企てて世界に破壊を巻き起こした」"
translation = "「하지만 그것이 오만을 낳은 건지, 그는 어느새 좋지 못한 야망을 품게 되었고, 삼계의 지배를 꾀하며 세계에 파괴를 불러일으켰지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「その後、三種族が力を合わせて悪い魔王を倒したってわけ」"
translation = "「그 후, 세 종족이 힘을 합쳐 나쁜 마왕을 쓰러뜨렸다는 거야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「太陽の壁画は、悪の魔王が生まれてしまったことを踏まえ、『魔王に頼りきりにならずに自分たちもリクリエと戦おう』って反省を表したものだった」"
translation = "「태양의 벽화는 악의 마왕이 태어나버린 것을 계기로, 『마왕에게만 의지하지 말고 우리도 리크리에와 싸우자』는 반성을 나타낸 것이었어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ、それが後世では『魔王は悪者だった』ってことにされちゃったんだけどね」"
translation = "「뭐, 그게 후세에는 『마왕은 악당이었다』는 식으로 전해지게 됐지만 말이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「太陽の壁画にはそんな意味があったのね……」"
translation = "「태양의 벽화에 그런 의미가 있었구나……」"

[[dialogue]]
speaker = "unk"
original = "ラクシスと俺の間に魔王と呼ばれる者がいたとは知らなかった。"
translation = "락시스와 나 사이에 마왕이라 불린 자가 있었다니 몰랐다."

[[dialogue]]
speaker = "unk"
original = "そして『太陽の壁画』が、真実を上塗りするための虚構ではなく、これもまた事実の断片であったことにも驚く。"
translation = "그리고 『태양의 벽화』가 진실을 덮어쓰기 위한 허구가 아니라, 이것 또한 사실의 단편이었다는 점에도 놀랐다."

[[dialogue]]
speaker = "アポロ"
original = "「おぉ～、知られざる歴史ってやつだな！\u3000なんかカッコイイぞ！」"
translation = "「오오~, 알려지지 않은 역사라는 거군! 왠지 멋진걸!」"

[[dialogue]]
speaker = "アポロ"
original = "「だけどあたし以外にも、悪に堕ちた魔王がいたんだな……」"
translation = "「하지만 나 말고도 악에 타락한 마왕이 있었구나……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「いやいや、アポロちゃんはリクリエの使徒だったんだし、また別じゃないかな？」"
translation = "「아니 아니, 아폴로짱은 리크리에의 사도였던 거니까 또 별개 아닐까?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「うーん、あながち別でもないかもね？\u3000リクリエ側の誰かが２０００年前の魔王を唆したのかもしれないし」"
translation = "「으음, 아주 별개도 아닐지 몰라. 리크리에 측의 누군가가 2000년 전의 마왕을 부추겼을지도 모르고」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、２０００年前の出来事をあれこれ言っても仕方ないかな。私が『太陽の壁画』について知ってることは以上だよ」"
translation = "「뭐, 2000년 전의 일을 이래저래 말해봤자 어쩔 수 없나. 내가 『태양의 벽화』에 대해 아는 건 여기까지야」"

[[dialogue]]
speaker = "クロト"
original = "「だけど、どうして君がそんなことを知っているんだ？\u3000まさかナターシャも魔王の子孫……？」"
translation = "「하지만 어떻게 네가 그런 걸 알고 있는 거야? 설마 나타샤도 마왕의 후손……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そんなわけないじゃん。だったらとっくに覚醒して大暴れしてるって」"
translation = "「그럴 리 없잖아. 그랬으면 진작에 각성해서 난동 부리고 있었겠지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でも聖庭園直属の私がこういう話をするってことは、どういう繋がりか分かるんじゃない？」"
translation = "「하지만 성정원 직속인 내가 이런 이야기를 한다는 건, 어떤 연결고리인지 알 수 있지 않아?」"

[[dialogue]]
speaker = "unk"
original = "そう、ナターシャは天界の聖庭園のエージェント。"
translation = "그렇다, 나타샤는 천계 성정원의 에이전트."

[[dialogue]]
speaker = "unk"
original = "そして聖庭園には、魔王の系譜たるリガルタ翁がいると聞いている。"
translation = "그리고 성정원에는 마왕의 계보인 리갈타 옹이 있다고 들었다."

[[dialogue]]
speaker = "クロト"
original = "「まさか──」"
translation = "「설마──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そう、リガルタは２０００年前に世界を破壊しようとした魔王の血族だよ」"
translation = "「그래, 리갈타는 2000년 전에 세계를 파괴하려 했던 마왕의 혈족이야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どうして『太陽の壁画』と『月の壁画』の真実が明かされないか。それは現存する魔王の血族の迫害に繋がる可能性があるから」"
translation = "「어째서 『태양의 벽화』와 『달의 벽화』의 진실이 밝혀지지 않는가. 그건 현존하는 마왕 혈족의 박해로 이어질 가능성이 있기 때문이지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「結局のところ、魔王の系譜にある者が一度悪に堕ちた事実は変わらないからね」"
translation = "「결국 마왕의 계보에 있는 자가 한 번 악에 타락했다는 사실은 변하지 않으니까」"

[[dialogue]]
speaker = "メルエル"
original = "「ナターシャちゃんはそこまで知ってたんだ……」"
translation = "「나타샤짱은 그런 것까지 알고 있었구나……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ仕事柄ね。だけど個人の名誉に関わる話だから、今聞いたことはオフレコでお願い」"
translation = "「뭐, 직업상 말이야. 하지만 개인의 명예에 관련된 이야기니까, 지금 들은 건 오프 더 레코드로 부탁해」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。２０００年前の魔王や、リガルタ様のことは絶対言わないよ」"
translation = "「응. 2000년 전의 마왕이나 리갈타 님에 대해서는 절대 말하지 않을게」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……うん、よろしく」"
translation = "「……응, 부탁해」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「で、その２０００年前の魔王がどうして女神の神殿と関係あるのよ」"
translation = "「그래서, 그 2000년 전의 마왕이 왜 여신의 신전이랑 관계있는 건데」"

[[dialogue]]
speaker = "ナターシャ"
original = "「世界を支配しようとした彼は、女神の神殿を占拠することで、天界全体を人質にとった」"
translation = "「세계를 지배하려 했던 그는 여신의 신전을 점거함으로써 천계 전체를 인질로 잡았어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「その反省として、ガーディアンが配置され、その所在も隠されてたってわけ」"
translation = "「그에 대한 반성으로 가디언이 배치되고, 그 소재도 숨겨지게 된 거야」"

[[dialogue]]
speaker = "梨緒"
original = "「なるほど……そういう経緯があったのか」"
translation = "「과연…… 그런 경위가 있었군」"

[[dialogue]]
speaker = "unk"
original = "ベガの俺がディザスターハンドになったように、魔王は悪に堕ちる可能性を持った存在だ。"
translation = "베가의 내가 디재스터 핸드가 되었듯이, 마왕은 악에 타락할 가능성을 가진 존재다."

[[dialogue]]
speaker = "unk"
original = "ナターシャが語った通り、２０００年前の魔王もその『可能性』に染まってしまったのだろう。"
translation = "나타샤가 말한 대로, 2000년 전의 마왕도 그 『가능성』에 물들어버린 것이겠지."

[[dialogue]]
speaker = "アポロ"
original = "「女神の神殿の場所が秘密になっている理由はわかった。だが今のところ空しか見えないぞ？」"
translation = "「여신의 신전 위치가 비밀인 이유는 알았어. 하지만 지금으로선 하늘밖에 안 보이는데?」"

[[dialogue]]
speaker = "ケイティ"
original = "「女神様の神殿は雲に紛れ、星の公転のごとく天界の空を周回しています。今の季節ならここから東に飛んだところに……」"
translation = "「여신님의 신전은 구름에 섞여 별의 공전처럼 천계의 하늘을 주회하고 있습니다. 지금 계절이라면 여기서 동쪽으로 날아간 곳에……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、あった。視力強化の星術使ったら見えたよ」"
translation = "「아, 찾았다. 시력 강화 성술을 썼더니 보였어」"

[[dialogue]]
speaker = "unk"
original = "まだ距離が遠くて俺たちには見えないが、ナターシャの目は神殿の姿をしっかり捉えたようだ。"
translation = "아직 거리가 멀어 우리에게는 보이지 않지만, 나타샤의 눈은 신전의 모습을 확실히 포착한 모양이다."

[[dialogue]]
speaker = "ナターシャ"
original = "「じゃあ姉さん。私たちここから飛ばしていくから」"
translation = "「그럼 언니. 우리 여기서부터 날아갈게」"

[[dialogue]]
speaker = "ケイティ"
original = "「はい、私は聖庭園に戻ります。皆さん、ご武運を！」"
translation = "「네, 저는 성정원으로 돌아가겠습니다. 여러분, 무운을 빕니다!」"

[[dialogue]]
speaker = "メルエル"
original = "「うん、ケイティお姉ちゃんも聖庭園の防衛頑張って！」"
translation = "「응, 케이티 언니도 성정원 방어 힘내!」"

[[dialogue]]
speaker = "梨緒"
original = "「行けるか、ベアト？\u3000おそらく極星星徒会とぶつかることになるぞ」"
translation = "「갈 수 있겠어, 베아토? 아마 극성성도회와 부딪히게 될 거다」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、大丈夫。天界を守らないといけないから」"
translation = "「응, 괜찮아. 천계를 지켜야 하니까」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それに天界を消滅させるなんて残酷なこと、レティシアちゃんやグレイスちゃんにさせたくない！」"
translation = "「게다가 천계를 소멸시키다니 그런 잔인한 일, 레티시아짱이나 그레이스짱에게 시키고 싶지 않아!」"

[[dialogue]]
speaker = "アポロ"
original = "「それでこそベアトだ。頼りにしてるぞ！」"
translation = "「그래야 베아토지. 믿고 있다고!」"

[[dialogue]]
speaker = "クロト"
original = "「よし行こう、みんな！\u3000天界を守るぞ！」"
translation = "「좋아 가자, 모두들! 천계를 지키는 거야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、何としてでも極星星徒会を止めるわよ！」"
translation = "「그래, 무슨 일이 있어도 극성성도회를 막겠어!」"

[[dialogue]]
speaker = "unk"
original = "ケイティさんに見送られながら、女神の神殿に向かって全速力で飛び出した。"
translation = "케이티 씨의 배웅을 받으며, 여신의 신전을 향해 전속력으로 날아올랐다."

