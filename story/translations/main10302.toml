[[dialogue]]
speaker = "unk"
original = "第２話,先代星徒会,B"
translation = "제2화, 선대 성도회, B"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……ただいま、サーシャ」"
translation = "「……다녀왔어, 사샤.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。本当に久しぶり」"
translation = "「응. 정말 오랜만이야.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「サーシャが目の前にいるの、不思議な感じする」"
translation = "「사샤가 눈앞에 있는 거, 이상한 기분 들어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……ふふっ」"
translation = "「……후후.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あははっ」"
translation = "「아하하.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（何もしてないのに、笑っちゃう。懐かしいわ、この感じ）"
translation = "(아무것도 안 했는데 웃음이 나. 그리워, 이 느낌.)"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あの、その、さ……」"
translation = "「저기, 그, 말이야……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうしたの、歯切れ悪そうな感じで？\u3000柄にもないわよ？」"
translation = "「왜 그래, 말끝을 흐리고? 너답지 않아.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「だって、だってぇ……言いたいこと、たくさんあって……」"
translation = "「그치만, 그치만…… 하고 싶은 말, 엄청 많아서……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね。私も同じよ」"
translation = "「그렇네. 나도 마찬가지야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……少し歩きましょうか。時間ならたっぷりあるわ」"
translation = "「……조금 걸을까. 시간이라면 듬뿍 있으니까.」"

[[dialogue]]
speaker = "unk"
original = "学園を離れて、街へ繰り出すふたり。"
translation = "학원을 떠나 거리로 나서는 두 사람."

[[dialogue]]
speaker = "unk"
original = "リクリエの爪痕は残るけれど、それでも市民は以前の生活を取り戻していた。"
translation = "리크리에의 흔적은 남아있지만, 그래도 시민들은 이전의 생활을 되찾고 있었다."

[[dialogue]]
speaker = "unk"
original = "若者向けの通りには、カラフルな看板の飲食店が軒を連ねている。"
translation = "젊은 층을 겨냥한 거리에는 화려한 간판의 음식점들이 줄지어 서 있다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしがいないうちにまた変わったね。知らないお店けっこうある！」"
translation = "「내가 없는 사이에 또 변했네. 모르는 가게 꽤 많아!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「この辺りは気付くと変わってるのよね～。あ、１６色ケーキですって。どんな味がするのかしら？」"
translation = "「이 근처는 정신 차려 보면 변해 있단다~. 아, 16색 케이크라니. 어떤 맛이 날까?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「美味しいのかすら分かんない！\u3000あ、あっちはから揚げドーナツだって！」"
translation = "「맛있는지도 모르겠어! 아, 저쪽은 가라아게 도넛이래!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すごく太っちゃいそう～。でも美味しそうだわ～。そっちの天界カレーも美味しそう～」"
translation = "「엄청 살찔 것 같아~. 하지만 맛있어 보여~. 저쪽 천계 카레도 맛있어 보여~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「サーシャは本当、なんでも気になるねー」"
translation = "「사샤는 정말 뭐든지 궁금해하네ー.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「シルヴィだってそうでしょ？\u3000気になったら一直線、好奇心の塊だもんね～」"
translation = "「실비 너도 그렇잖아? 꽂히면 일직선, 호기심 덩어리니까 말이야~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「えへへ～、まあね」"
translation = "「에헤헤~, 뭐 그렇지.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあ、私もソフィにもよく言われるんだけどね～。『フラフラしないでください。危なっかしいです』って」"
translation = "「뭐, 나도 소피한테 자주 듣는 소리지만 말이야~. 『비틀거리지 마세요. 위태로워 보여요』라고.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あはははっ！\u3000そういえば今は妹ちゃんも流星市国にいるんだっけ！\u3000会ってみたいなー」"
translation = "「아하하하! 그러고 보니 지금은 여동생도 유성시국에 있다고 했지! 만나보고 싶다ー.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「機会があったら紹介するわね。すっごく可愛いんだから～」"
translation = "「기회가 되면 소개할게. 정말 귀엽거든~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「楽しみにしてる！\u3000あ」"
translation = "「기대할게! 아.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「チキン！\u3000フライドチキンがあるよ！\u3000入ろう！」"
translation = "「치킨! 프라이드치킨이 있어! 들어가자!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どこにでもあるお店よ～？」"
translation = "「어디에나 있는 가게잖아~?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「天界にはなかったの！\u3000あたしめちゃくちゃ恋しかったんだから！」"
translation = "「천계에는 없었어! 나 진짜 엄청 그리웠단 말이야!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それもそうね～。うん、入りましょうか～」"
translation = "「그것도 그렇네~. 응, 들어갈까~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「座るのにこんな時間かかると思わなかったよ。久々で忘れてた。人間界ホントひと多い！」"
translation = "「앉는 데 이렇게 시간 걸릴 줄 몰랐어. 오랜만이라 잊고 있었네. 인간계 진짜 사람 많아!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私もこんなに並ぶの久しぶりだわ～」"
translation = "「나도 이렇게 줄 서는 거 오랜만이야~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「よし！\u3000じゃあいただきます！」"
translation = "「좋아! 그럼 잘 먹겠습니다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いただきます」"
translation = "「잘 먹겠습니다.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「おいし～～っ！！\u3000皮がパリパリで、スパイシーで、ジューシーで、何本でも食べられる！」"
translation = "「맛있어어어!! 껍질이 바삭바삭하고, 매콤하고, 쥬시해서 몇 개라도 먹을 수 있어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「本当に美味しそうに食べるわね～」"
translation = "「정말 맛있게 먹는구나~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「だっておいしいからね！」"
translation = "「그치만 맛있으니까!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ。元気そうで安心したわ」"
translation = "「후후. 건강해 보여서 안심했어.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「サーシャもねっ！」"
translation = "「사샤도!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……サーシャは今も星徒会なんだっけ」"
translation = "「……사샤는 지금도 성도회였지.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。シルヴィが天界に帰ってから、ヴィーナスちゃんを会長に指名して、そのヴィーナスちゃんが今の会長くんを指名？\u3000して……まぁいろいろあったわ～」"
translation = "「응. 실비 네가 천계로 돌아가고 나서 비너스짱을 회장으로 지명했고, 그 비너스짱이 지금의 회장 군을 지명? 해서…… 뭐 여러 가지 일이 있었어~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしもいろいろあったな～。副会長だったのもずいぶん前のことみたいに感じるし」"
translation = "「나도 여러 가지 일이 있었지~. 부회장이었던 것도 엄청 옛날 일처럼 느껴지고.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私が会長になったとき、副会長を引き受けてくれたのよね～」"
translation = "「내가 회장이 됐을 때 부회장을 맡아주었지~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「そうそう、サーシャが会長なんだから、あたしも何かやらなきゃって思ったんだよ！」"
translation = "「맞아 맞아, 사샤가 회장이니까 나도 뭔가 해야겠다고 생각했어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あのときは本当に助かってたわ～」"
translation = "「그때는 정말 도움 많이 받았어~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「うん！\u3000なんてったって、あたし、強いからね！」"
translation = "「응! 뭐니 뭐니 해도 난 강하니까!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……まぁ強いからこそ天界に帰ることになったんだけど」"
translation = "「……뭐 강했기에 천계로 돌아가게 된 거지만.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「仕方ないわ～。生まれ故郷を守るためだもの」"
translation = "「어쩔 수 없지~. 태어난 고향을 지키기 위해서였으니까.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「天界の田舎町だからね。リクリエが近付いてモンスターは強くなるのに、ちゃんと戦える星騎士がいなかったから」"
translation = "「천계의 시골 마을이니까 말이야. 리크리에가 다가오면서 몬스터는 강해지는데, 제대로 싸울 수 있는 성기사가 없었거든.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でももう大丈夫。あたしがばっちり鍛えてきたから！」"
translation = "「하지만 이제 괜찮아. 내가 확실하게 단련시켜 놨으니까!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしの後輩たちが故郷を守ってくれる！\u3000こんなに嬉しいことはないよ！」"
translation = "「내 후배들이 고향을 지켜줄 거야! 이보다 기쁜 일은 없어!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ぼべばばば、ぶっぼびんべいびびばべぶばばべ！」"
translation = "「우걱우걱우걱, 쩝쩝쩝쩝쩝쩝!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ぷっ、ふふふふ」"
translation = "「풋, 후후후후.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ごっくん。ん？\u3000何かおかしなことあった？」"
translation = "「꿀꺽. 응? 뭐 이상한 거라도 있었어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今のシルヴィ、チキンを口いっぱいに頬張って、ハムスターみたいだったから、つい。ぷっ」"
translation = "「방금 실비, 치킨을 입안 가득 머금어서 햄스터 같았으니까 그만. 풋」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あー、また笑った！」"
translation = "「아ー, 또 웃었다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふふ……だって、あははははっ！」"
translation = "「후후후후…… 그치만, 아하하하핫!」"

[[dialogue]]
speaker = "unk"
original = "それから、笑いが収まるまでしばらく時間を要したのだった。"
translation = "그러고 나서, 웃음이 멎을 때까지 한동안 시간이 걸렸다."

