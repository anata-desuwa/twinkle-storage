[[dialogue]]
speaker = "unk"
original = "第４話,パパのお嫁さん,P"
translation = "제4화, 아빠의 아내, P"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パーパ、頭撫でて～♪」"
translation = "「아~빠, 머리 쓰다듬어줘~♪」"

[[dialogue]]
speaker = "unk"
original = "おいで、ヴィーナス"
translation = "이리 오렴, 비너스"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっへへ～。ついでに膝枕もしてもらっちゃお～、ごろごろごろ～」"
translation = "「에헤헤~. 하는 김에 무릎 베개도 받아야지~, 데굴데굴데굴~」"

[[dialogue]]
speaker = "unk"
original = "恋人であり娘、という関係性が判明してから、ヴィーナスは時折こうやって露骨に甘えてくるようになった。"
translation = "연인이자 딸이라는 관계성이 밝혀진 뒤로, 비너스는 때때로 이렇게 노골적으로 어리광을 부리게 되었다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスにとって「魔王の娘」と「魔王の恋人」という立場は矛盾するものではないらしく、むしろ運命の運命の結びつきが際立った程度の認識らしい。"
translation = "비너스에게 있어 「마왕의 딸」과 「마왕의 연인」이라는 입장은 모순되는 것이 아니었으며, 오히려 운명적인 결합이 두드러진 정도의 인식인 모양이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、なんか撫で方が優しくなった。ま～た何か難しいこと考えてるでしょ～」"
translation = "「앗, 왠지 쓰다듬는 손길이 다정해졌어. 또 뭔가 어려운 생각 하고 있지~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトは私を甘やかして可愛がることだけ、考えてればいいのよ！\u3000それだけで私は、世界を守れてよかったって思えるくらい、幸せになれちゃうんだから」"
translation = "「쿠로토는 나를 응석받이로 만들고 귀여워해 주는 것만 생각하면 돼! 그것만으로 나는, 세계를 지키길 잘했다고 생각할 수 있을 만큼, 행복해질 수 있으니까」"

[[dialogue]]
speaker = "unk"
original = "了解、お姫様"
translation = "알겠어, 공주님"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えへへ～♪\u3000クロトのそういうストレートなところ、私、本当に好きよ」"
translation = "「에헤헤~♪ 쿠로토의 그런 스트레이트한 점, 나, 정말 좋아해」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あのね……？\u3000色んな人たちから話を聞いて、娘と父親が恋人になったり、子供を作ったりすることは、普通のことじゃないっていうのは、私も改めて理解したわ」"
translation = "「있잖아……? 여러 사람에게 이야기를 듣고, 딸과 아버지가 연인이 되거나, 아이를 만드는 게, 평범한 일이 아니라는 건 나도 새삼 이해했어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うん、私だってちゃんと勉強してるのよ？\u3000周りの人たちの反応が見えてないわけじゃないわ」"
translation = "「응, 나도 제대로 공부하고 있다구? 주변 사람들의 반응이 안 보이는 게 아니야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから……晴れ着フォームの時のおみくじ結果、『恋の運命は最悪』『今世で結ばれることなし、誰にも祝福されず、過酷な運命が待つ』の意味も、今ならわかるわ」"
translation = "「그러니까…… 나들이옷 폼일 때의 점괘 결과, 『사랑의 운명은 최악』 『현세에서 맺어질 일 없으며, 누구에게도 축복받지 못하고, 가혹한 운명이 기다린다』는 의미도, 지금이라면 알 수 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「普通なら、父親と娘の結婚なんて認められるものじゃない。それはよくわかったの」"
translation = "「보통이라면 아버지와 딸의 결혼 같은 건 인정받을 수 있는 게 아니지. 그건 잘 알았어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもね……？\u3000私たちは最初から普通じゃないわ。そうでしょう？」"
translation = "「하지만 말이야……? 우리는 처음부터 평범하지 않잖아. 그렇지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトは最強の魔王だし、私は平行世界からやってきた。星騎士としても、私たち２人合わされば三界どころか、平行世界最強なんだから！」"
translation = "「쿠로토는 최강의 마왕이고, 나는 평행 세계에서 왔어. 성기사로서도, 우리 둘이 합치면 삼계는커녕 평행 세계 최강인걸!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「要するに、私たちは世界や常識を変えちゃうような力を持ってるってこと！」"
translation = "「요컨대, 우리는 세계나 상식을 바꿔버릴 정도의 힘을 가지고 있다는 뜻이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに、おみくじ結果の『誰にも祝福されず』なんて冗談じゃないわ。私の仲間や家族は、そんな器の小さいヒトたちじゃないもの」"
translation = "「게다가, 점괘 결과의 『누구에게도 축복받지 못하고』 같은 건 농담이 아니야. 내 동료나 가족은 그렇게 속 좁은 사람들이 아니니까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……あとはたった一つのことだけ確かめられれば、私はこれからも揺らがないって確信できるわ」"
translation = "「……남은 건 딱 한 가지만 확인할 수 있다면, 나는 앞으로도 흔들리지 않을 거라고 확신할 수 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だからね……クロト」"
translation = "「그러니까 말이야…… 쿠로토」"

[[dialogue]]
speaker = "unk"
original = "結婚しよう"
translation = "결혼하자"

[[dialogue]]
speaker = "unk"
original = "ああ、ヴィーナス"
translation = "아아, 비너스"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいの……？」"
translation = "「괜찮아……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスだって答えはわかってただろ？"
translation = "비너스도 답은 알고 있었잖아?"

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론이지"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そりゃあ、毎日これだけ愛してもらってるんだから、好きって気持ちは疑いようもないわ」"
translation = "「그야, 매일 이만큼 사랑받고 있으니까, 좋아한다는 마음은 의심할 여지도 없지만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ただ、前に『嫁を名乗るのはちょっと待って』って、言ってたじゃない……？」"
translation = "「다만, 아까 『아내라고 자칭하는 건 조금만 기다려줘』라고 말했었잖아……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「色々準備は進めてくれてたけど、それでも改めてとなれば、もうちょっと悩んだり、考えたりすることもあるのかなって……」"
translation = "「이것저것 준비는 진행해주고 있었지만, 그래도 새삼스럽게 마주하면, 좀 더 고민하거나 생각할 게 있는 걸까 싶어서……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私とどうなりたいかなんて、毎日毎晩考えてたから今更……？\u3000そ、そうなのね……」"
translation = "「나와 어떻게 되고 싶은지 같은 건 매일 밤낮으로 생각했으니까 이제 와서……? 그, 그렇구나……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ改めて……」"
translation = "「그럼 다시 한번……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私を、クロトのお嫁さんにしてください<emoji=heart04>」"
translation = "「나를, 쿠로토의 아내로 삼아주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ああ、必ず幸せにする"
translation = "아아, 반드시 행복하게 해줄게"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えへへ♪\u3000なんかこういうの、思ってたより照れちゃうけど、嬉しいわねっ」"
translation = "「에헤헤♪ 왠지 이런 거, 생각보다 쑥스럽지만 기쁘네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ……クロト、目を閉じろって…………んっ」"
translation = "「아…… 쿠로토, 눈을 감으라니………… 응」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁっ<emoji=heart04>\u3000んんっ……ちゅっ……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 응…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ。誓いのキス、ってやつかしら？」"
translation = "「후훗. 맹세의 키스, 라는 걸까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「すっごく嬉しいわ。……そうだ、クロトは私にしてほしいこととか、ないのかしら？」"
translation = "「정말 기뻐. ……맞다, 쿠로토는 나한테 바라는 거라든가, 없어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これからは自称じゃなくて正式にお嫁さんになったわけだし、もうちょっとちゃんとした方がいい？」"
translation = "「이제부터는 자칭이 아니라 정식으로 아내가 된 셈이니까, 좀 더 제대로 하는 게 좋을까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「例えば……今日みたいに『パパ』って呼んだりして甘えるのは、はしたないかしら？」"
translation = "「예를 들면…… 오늘처럼 『아빠』라고 부르면서 어리광부리는 건, 천박할까?」"

[[dialogue]]
speaker = "unk"
original = "娘であることにも、一生変わりはないよ"
translation = "딸이라는 사실도, 평생 변하지 않아"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺のお嫁さんだとしても"
translation = "비너스가 내 아내라고 해도"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに、『パパ』って呼んで甘えてくる時の私も可愛いから、そのままでいい……？」"
translation = "「게다가, 『아빠』라고 부르며 어리광부리는 때의 나도 귀여우니까, 그대로가 좋다고……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えへへぇ～<emoji=heart04>\u3000そんなに嬉しいこと言われちゃったら、たくさん甘えちゃうわよ、パーパ<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 그런 기쁜 말을 들어버리면, 잔뜩 어리광 부릴 거야, 아~빠<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ<emoji=heart04>\u3000私、もっとキスしてほしい。パパとたくさん、イチャイチャしたい<emoji=heart04>」"
translation = "「아빠<emoji=heart04> 나, 키스 더 해줬으면 좋겠어. 아빠랑 잔뜩, 꽁냥거리고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ……<emoji=heart04>\u3000見つめ合ったまま、右手を恋人繋ぎになんて……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 서로 마주 본 채로, 오른손을 연인끼리 맞잡다니……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この状態で……頭撫でられながら、キスなんてされたら……私、とろけちゃう……<emoji=heart04>」"
translation = "「이 상태에서…… 머리 쓰다듬어지면서, 키스 같은 걸 받으면…… 나, 녹아버릴 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ……<emoji=heart04>\u3000ちゅっ……ちゅぷっ<emoji=heart04>」"
translation = "「아……<emoji=heart04> 쪽…… 쭈웁<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁぁ……<emoji=heart04>\u3000んふふっ。パパしか目に入らないくらい、くっついちゃってる<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 응후훗. 아빠밖에 눈에 안 들어올 정도로, 딱 붙어버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちゅっ……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000はぁぁ……」"
translation = "「쪽……<emoji=heart04> 응…… 쪽<emoji=heart04> 쪽<emoji=heart04> 하아아……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もっと、頭撫でて……私の体に触れて……？\u3000はぁぁ、安心するのに、ドキドキしてて……不思議<emoji=heart04>」"
translation = "「더, 머리 쓰다듬어 줘…… 내 몸을 만져줘……? 하아아, 안심되는데도 두근거려서…… 신기해<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んっ<emoji=heart04>\u3000ちゅっ、ちゅっ……<emoji=heart04>\u3000はあぁ、ちゅちゅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 쪽, 쪽……<emoji=heart04> 하아아, 쪽쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ、クロト……んふっ<emoji=heart04>\u3000だぁい好き<emoji=heart04>」"
translation = "「아빠, 쿠로토…… 응훗<emoji=heart04> 너어무 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは、日が暮れて夜になるまで、ず～～っとイチャイチャして休日を過ごすのだった。"
translation = "그렇게 우리들은, 해가 지고 밤이 될 때까지, 저~~엉말 오랫동안 꽁냥거리며 휴일을 보내는 것이었다."

