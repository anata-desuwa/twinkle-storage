[[dialogue]]
speaker = "unk"
original = "──ここは、どこだ？"
translation = "──여기는 어디지?"

[[dialogue]]
speaker = "unk"
original = "脳に薄い膜がかかっているみたいで、上手く考えがまとまらない。"
translation = "뇌에 얇은 막이 씌워진 것 같아서 생각이 잘 정리되지 않는다."

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「オムオム！！」"
translation = "「옴옴!!」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「……いろは？」"
translation = "「……이로하?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「よかったぁ……目、覚ましたみたいだね」"
translation = "「다행이다…… 정신이 든 모양이네」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「急に頭の中が真っ白になって、気が付いたらここに居たんけど……えっと、その前は……」"
translation = "「갑자기 머릿속이 새하얘져서, 정신을 차려보니 여기 있었는데…… 에또, 그 전에는……」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「あれぇ？\u3000なんか思い出せないね……？」"
translation = "「어라아? 왠지 기억이 안 나네……?」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「３人でここに居たような気もするし、そうじゃなかったような気もする……オムにゃんは何か覚えてる？」"
translation = "「세 명이서 여기 있었던 것 같기도 하고, 그렇지 않았던 것 같기도 하고…… 옴냥은 뭐 기억나는 거 있어?」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「すまない……俺もみんなと同じ状態だ」"
translation = "「미안하다…… 나도 모두와 같은 상태야」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あ、そうだ、いいこと思いついた！\u3000あっちのお店に入って、カラオケで歌っていこーよ♪」"
translation = "「아, 맞다, 좋은 생각이 났다! 저기 가게에 들어가서, 노래방에서 노래 부르고 가자♪」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「記憶が飛んでるんだよ！？\u3000まずは何が起こったか確認するのが最初でしょーに！」"
translation = "「기억이 날아갔단 말이야!? 우선 무슨 일이 일어났는지 확인하는 게 먼저잖아!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「そだね～。もしかしたらここが、ここあたちのいた世界とそっくりな全く別の世界って可能性もあるし」"
translation = "「그렇네~. 어쩌면 여기가, 코코아 일행이 있던 세계와 쏙 빼닮은 완전히 다른 세계일 가능성도 있고」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「うそっ！\u3000また飛ばされちゃったってことですか！？」"
translation = "「거짓말! 또 날려져 버렸다는 거예요!?」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「落～ち～着～い～て、カオリン。そーゆー可能性もある、ってだけのことだから」"
translation = "「진~정~해~, 카오링. 그런 가능성도 있다, 는 것뿐이니까」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そ、そうですよね……うぅぅ、これ以上は考えてもしかたない、かぁ～」"
translation = "「그, 그렇겠네요…… 으으으, 이 이상은 생각해도 어쩔 수 없나~」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「よーし、話もまとまったことだし、カラオケボックスにゴー♪」"
translation = "「좋아, 이야기도 정리됐으니, 노래방으로 고♪」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「おーっ！\u3000……って、そうじゃないでしょ！\u3000空気読んでよ、いろは！」"
translation = "「오~! ……가 아니라, 그게 아니잖아! 분위기 파악 좀 해, 이로하!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あははっ♪」"
translation = "「아하하♪」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「念のため、他のみんなにも連絡を取ってみるか？」"
translation = "「만약을 위해, 다른 애들에게도 연락을 취해볼까?」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「オッケ～、そんじゃセイラに<ruby>ＬＩＭＥ<rt>■■■■</rt></ruby>を送って……と……？」"
translation = "「오케~, 그럼 세이라에게 <ruby>LIME<rt>■■■■</rt></ruby>을 보내서…… 어……?」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「デュナミスフィアに通知だ。悪魔が出たみたいだよ～」"
translation = "「듀나미스피어에 통지야. 악마가 나타난 모양이냐~」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ええっ？\u3000ほんとだ……ここから近い」"
translation = "「에엣? 정말이다…… 여기서 가까워」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「行こう、みんな！」"
translation = "「가자, 모두들!」"

[[dialogue]]
speaker = "unk"
original = "ユラギの出現を知らせるアプリ、デュナミスフィアのナビに従ってポイントに駆け付ける。"
translation = "유라기의 출현을 알리는 앱, 듀나미스피어의 내비게이션에 따라 포인트로 달려간다."

[[dialogue]]
speaker = "unk"
original = "世界から光が失われ、ユラギの中に入ったことが感じられる、のだが──"
translation = "세계에서 빛이 사라지고, 유라기 속에 들어온 것이 느껴지는데──"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あれ？\u3000なんかこれ、いつものユラギと感じが違う？」"
translation = "「어레? 왠지 이거, 평소의 유라기랑 느낌이 다른데?」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「確かに！\u3000普通じゃないことはわかるんだけど、見た目とか空気が、いつもの奴と違うっぽい？」"
translation = "「확실히! 보통이 아니라는 건 알겠는데, 겉모습이나 공기가 평소 녀석이랑 다른 것 같냐?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ええっ！？\u3000そんなこと分かります？\u3000ユラギの中なんて、いつだって不穏で不気味じゃないですか」"
translation = "「에엣!? 그런 걸 알 수 있어요? 유라기 속 같은 건, 언제나 불온하고 기분 나쁘잖아요」"

[[dialogue]]
speaker = "unk"
original = "３人ともそれぞれに思ったことを口にする。が、今はユラギの微細な違いに気を払ってる場合ではなさそうだった。"
translation = "세 사람 모두 각자 생각한 것을 입 밖으로 낸다. 하지만, 지금은 유라기의 미세한 차이에 신경을 쓸 때가 아닌 듯했다."

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「気を付けろ、来るぞ！」"
translation = "「조심해, 온다!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「え、<ruby>陽彩<rt>あきさ</rt></ruby>ちゃん？\u3000どうしちゃったの、その格好！？」"
translation = "「에, 아키사짱? 어떻게 된 거야, 그 모습!?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ちょっと様子も変だよ？\u3000それに……」"
translation = "「조금 상태도 이상해. 게다가……」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「デュナミスフィアの反応……あきあきを指してるんだけど……」"
translation = "「듀나미스피어의 반응…… 아키아키를 가리키고 있는데……」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「うそっ！？\u3000それじゃ、まさか……」"
translation = "「거짓말!? 그럼, 설마……」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「陽彩……ちゃん……？」"
translation = "「아키사…… 짱……?」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「攻撃してくるぞ、いろは！」"
translation = "「공격해온다, 이로하!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「やめてよ、陽彩ちゃん！」"
translation = "「그만해, 아키사 짱!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「声が届いてないっぽいね、どうするオムにゃん！？」"
translation = "「목소리가 닿지 않는 모양이네, 어떻게 할 거야 옴냥!?」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「くっ……！\u3000状況がわからない以上、迂闊に手は出せない……一旦引くべきか……」"
translation = "「큭……! 상황을 모르는 이상, 함부로 손을 댈 순 없어…… 일단 물러나야 하나……」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「でも陽彩ちゃんがっ！」"
translation = "「하지만 아키사 짱이!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「いろは、また攻撃が来るよ！」"
translation = "「이로하, 또 공격이 와!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「っ……！！？」"
translation = "「윽……!!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そこのみなさん、大丈夫ですかっ！？」"
translation = "「거기 여러분, 괜찮으신가요!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あとは我らに任せて、下がっているのじゃ！」"
translation = "「나머지는 우리에게 맡기고, 물러나 있느니라!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それじゃあ、サチさん、プリムラさん、素敵にステッキ決めちゃいますよ～☆」"
translation = "「그럼, 사치 씨, 프리뮬러 씨, 멋지게 스틱 결정해버리겠어요~☆」"

