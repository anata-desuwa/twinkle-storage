[[dialogue]]
speaker = "unk"
original = "第５話,ブレイク・ボーダー,B"
translation = "제5화, 브레이크 보더, B"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「本当に、忌々しいっ……！」"
translation = "「정말로, 괘씸하군……!」"

[[dialogue]]
speaker = "unk"
original = "セイファート学園長が『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に楔を打ち込むたびに、ホロウの複製体たちはその数を増やしていく。"
translation = "세이파트 학원장님이 『<ruby>XELOS<rt>제로스</rt></ruby>』에 쐐기를 박을 때마다, 홀로우의 복제체들은 그 수를 늘려간다."

[[dialogue]]
speaker = "unk"
original = "無限に湧き出るホロウたちを薙ぎ払うのが、俺たちの役目！"
translation = "무한히 솟아나는 홀로우들을 베어 넘기는 것이 우리의 역할!"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアト──！！」"
translation = "「베아토──!!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん、梨緒ちゃん！！」"
translation = "「응, 리오 짱!!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「やっぱり親子だから似てるね、戦い方も！」"
translation = "「역시 부녀라서 닮았네, 싸우는 방식도!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「ふっふーん！\u3000当然でしょ！！」"
translation = "「에헴! 당연하지!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ほう。<b>あがり</b>の近い星騎士にしては良い動きだ！\u3000クク、後で貴様も味見してやろう──アポロとやら！」"
translation = "「호오. <b>은퇴</b>가 머지않은 성기사치고는 좋은 움직임이군! 크크, 나중에 네놈도 맛봐주마── 아폴로라고 했던가!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そういう話は、戦いが終わった後でしろ！！\u3000行くぞ！」"
translation = "「그런 이야기는 싸움이 끝난 뒤에 해라!! 간다!」"

[[dialogue]]
speaker = "unk"
original = "数多のコンビネーションにより、遂に『ＸＥＬＯＳ』への道が切り開かれる！"
translation = "수많은 콤비네이션에 의해, 마침내 『XELOS』로 통하는 길이 열린다!"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「残すはあと一太刀──少年！\u3000合わせろッ！」"
translation = "「남은 건 마지막 일격── 소년! 맞춰라!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい！\u3000学園長──！！」"
translation = "「네! 학원장님──!!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ムゥゥウゥゥウンッ──！！！」"
translation = "「무으으으으으음──!!!」"

[[dialogue]]
speaker = "unk"
original = "大上段から放たれた英雄の一撃が『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に食い込む──！"
translation = "대상단에서 내리친 영웅의 일격이 『<ruby>XELOS<rt>제로스</rt></ruby>』에 박힌다──!"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「────ギ、ギギギィッ！？！？！？！？」"
translation = "「────기, 기기기익!?!?!?!?!?」"

[[dialogue]]
speaker = "unk"
original = "あの無機質だった創造神が、声にも音にもならない、確かな悲鳴を上げた。"
translation = "그 무기질했던 창조신이, 목소리도 소리도 되지 않는, 분명한 비명을 질렀다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "unk"
original = "学園長の持っていた、女神テルルが授けた剣が、砕け散り──"
translation = "학원장님이 가졌던, 여신 테를르가 수여한 검이 부서져 흩어지고──"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「────ママ」"
translation = "「────엄마」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「────テルル」"
translation = "「────테를르」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとルヴィネの小さな呟きが、聴こえた気がした──"
translation = "비너스와 루비네의 작은 중얼거림이 들린 것 같았다──"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「…………ここは？」"
translation = "「…………여기는?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「テルルが見せている、精神世界のようね。招かれたのは、私と貴女だけみたい……」"
translation = "「테를르가 보여주는 정신세계인 모양이네. 초대받은 건 나와 너뿐인 것 같아……」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『……ええ。剣が折れれば、それは私が消える時……最期の語らいをしておきたいと思い、呼ばせていただきました……』"
translation = "『……네. 검이 부러지면 그것은 내가 사라질 때…… 마지막 대화를 나누고 싶어 불렀습니다……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『私の授けた策を、手筈通りに進めてくれましたね……これで“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”を守る高次元の壁はもうありません』"
translation = "『내가 전수했던 책략을 절차대로 진행해 주었군요…… 이것으로 “<ruby>XELOS<rt>제로스</rt></ruby>”를 지키는 고차원의 벽은 이제 없습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『３次元存在のあなたたちでも、その刃を創造神に届けることができるはず……私の役目も、ここまでです……』"
translation = "『3차원 존재인 당신들이라도 그 칼날을 창조신에게 닿게 할 수 있을 터…… 나의 역할도 여기까지입니다……』"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「……もっと他の方法はなかったの、ママ？」"
translation = "「……좀 더 다른 방법은 없었어, 엄마?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『……ごめんなさい、ヴィーナス。見つけられるものなら、私もそうしたかった……』"
translation = "『……미안해요, 비너스. 찾을 수만 있다면 나도 그러고 싶었어요……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『けれど“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”を倒せる可能性は、これしかなかったのです……』"
translation = "『하지만 “<ruby>XELOS<rt>제로스</rt></ruby>”를 쓰러뜨릴 가능성은 이것밖에 없었습니다……』"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「テルル。死を待つだけだった私に、あなたは声を届けてくれた……その恩に報いさせて」"
translation = "「테를르. 죽음만을 기다리던 내게 당신은 목소리를 전해주었어…… 그 은혜에 보답하게 해줘」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「大役ではあるし、担えるかどうかもわからない──けれど貴女の申し出通り、女神の役目は、私が受け継ぐ……」"
translation = "「큰 임무이기도 하고, 감당할 수 있을지는 모르겠지만── 그래도 당신의 제안대로, 여신의 역할은 내가 이어받겠어……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……だから安心して、逝って頂戴」"
translation = "「……그러니까 안심하고 가렴」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『……よかった。“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”の支配から解き放たれた今、世界の管理者を任せるにあたり、あなた以上の存在はいませんから……』"
translation = "『……다행이에요. “<ruby>XELOS<rt>제로스</rt></ruby>”의 지배에서 해방된 지금, 세계의 관리자를 맡기기에 당신 이상의 존재는 없으니까요……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『けれど……すぐに女神の位を継がせるわけにはいきませんよ？』"
translation = "『하지만…… 곧바로 여신의 자리를 잇게 할 수는 없어요?』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『あなたはまだ、この世界に生まれたばかり。もう少し、１人の天使として見聞を広めてもらいましょう』"
translation = "『당신은 이제 막 이 세계에 태어난 참. 좀 더 한 명의 천사로서 견문을 넓혀보도록 하죠』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『いわば修行の期間です。そうですね──あなたが天使として、天寿を全うするまで──としましょう』"
translation = "『이른바 수행 기간입니다. 그렇죠── 당신이 천사로서 천수를 누릴 때까지──로 하죠』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『今から数十年の世界の管理は、六柱の守護天使に一時的に委任します。よいですか。その間に、多くのことを学ぶのです』"
translation = "『지금부터 수십 년 동안의 세계 관리는 여섯 기둥의 수호천사에게 일시적으로 위임합니다. 알겠지요. 그동안 많은 것을 배우는 거예요』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………はい」"
translation = "「…………네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「<b>温情</b>に感謝いたします、女神テルル……いいえ」"
translation = "「<b>온정</b>에 감사드립니다, 여신 테를르…… 아니요」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「────姉さん」"
translation = "「────언니」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『ええ……ヴィーナスも、もう泣いてはだめですよ？\u3000パパを支えてあげてください』"
translation = "『네…… 비너스도 이제 울면 안 돼요? 아빠를 지탱해 주세요』"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「…………うんっ！\u3000ママ、約束するわ！」"
translation = "「…………응! 엄마, 약속할게!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『強い子たち。あなたたちのおかげで、心穏やかに逝くことができます……』"
translation = "『강한 아이들. 당신들 덕분에 마음 편히 갈 수 있습니다……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『さあ──お戻りなさい。未来を掴むための戦いに──』"
translation = "『자── 돌아가세요. 미래를 거머쥐기 위한 싸움으로──』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……今、はっきりと感じた）"
translation = "（……지금, 또렷하게 느꼈어）"

[[dialogue]]
speaker = "unk"
original = "テルルがこの世界から──跡形もなく消えたことを。"
translation = "테를르가 이 세계에서── 흔적도 없이 사라졌다는 것을."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……………………テルル）"
translation = "（……………………테를르）"

[[dialogue]]
speaker = "unk"
original = "つい先刻──アルタイルの塔の頂上、ホロウたちとの戦いに勝利した直後のことを思い出す。"
translation = "방금 전── 알타이르 탑의 정상, 홀로우들과의 싸움에서 승리한 직후의 일을 떠올린다."

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『そしてもう１つ、あなたたちに伝えたいことがあります。よく、聞いてください──』"
translation = "『그리고 또 한 가지, 당신들에게 전하고 싶은 것이 있습니다. 잘 들어주세요──』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『創造神“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”は、高次元──正確には、１１次元に存在する神です』"
translation = "『창조신 “<ruby>XELOS<rt>제로스</rt></ruby>”는 고차원── 정확하게는 11차원에 존재하는 신입니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『ゆえに３次元存在のあなたたちでは、触れることすら叶いません』"
translation = "『그러므로 3차원 존재인 당신들은 만지는 것조차 이룰 수 없습니다』"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「そんな……テルル様。そのような相手、どうすれば……！？」"
translation = "「그런…… 테를르 님. 그런 상대를 어떻게……!?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『策があります。私はこの日のために、１０年前──デネブで、人間の九浄テルルとして敗北したその日から、準備をしてきました……』"
translation = "『책략이 있습니다. 나는 이날을 위해 10년 전── 데네브에서 인간 구죠 테를르로서 패배했던 그날부터 준비를 해왔습니다……』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”の次元の壁を突破する武器を、私の全存在と引き換えに創造しています……それはじきに完成を見るでしょう』"
translation = "『“<ruby>XELOS<rt>제로스</rt></ruby>”의 차원 벽을 돌파할 무기를 나의 전 존재와 맞바꾸어 창조하고 있습니다…… 그것은 곧 완성을 보겠지요』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『この武器があれば、高次元存在の“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に<ruby>楔<rt>くさび</rt></ruby>を打ち込むことができます』"
translation = "『이 무기가 있다면 고차원 존재인 “<ruby>XELOS<rt>제로스</rt></ruby>”에게 쐐기를 박아 넣을 수 있습니다』"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『１度の攻撃を通すたび、１次元ぶんの境界を破壊することが可能です……この武器の錬成と引き換えに、私は消滅してしまいますが……』"
translation = "『한 번의 공격을 통과시킬 때마다 1차원분의 경계를 파괴하는 것이 가능합니다…… 이 무기의 연성과 맞바꾸어 나는 소멸해 버리겠지만……』"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「……っ！？\u3000そ、そんな……嫌よ、そんなの！！」"
translation = "「……윽!? 그, 그런…… 싫어, 그런 건!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「そうです、テルル様……。あなたがいなくなるだなんて、私たちはどうすればいいのですか！？」"
translation = "「그렇습니다, 테를르 님…… 당신이 없어진다니, 저희는 어떡해야 합니까!?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『私がいなくなった後のことは、守護天使たちと……ルヴィネに託してあります。心配はいりません』"
translation = "『내가 없어진 뒤의 일은 수호천사들과…… 루비네에게 맡겨 두었습니다. 걱정할 필요는 없습니다』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………ええ」"
translation = "「…………네」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「そんな、ママ……！」"
translation = "「그런, 엄마……!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『他に方法はないのです……さぁ、デネブに向かってください。頼もしい増援にこの武器を持たせます。よいですね──』"
translation = "『다른 방법은 없는 것입니다…… 자, 데네브로 향해 주세요. 든든한 증원군에게 이 무기를 들려줄 것입니다. 알겠지요──』"

[[dialogue]]
speaker = "unk"
original = "テルルから授かった『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』打倒の計画を聞いた時、他に方法はないのかと考えた。"
translation = "테를르에게 전수받은 『<ruby>XELOS<rt>제로스</rt></ruby>』 타도 계획을 들었을 때, 다른 방법은 없는지 생각했다."

[[dialogue]]
speaker = "unk"
original = "実際に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と相対した時も、あらゆる攻撃を試し、有効打となる方法を探した……けれど、その全ては高次元存在の『神』には無力だった。"
translation = "실제로 『<ruby>XELOS<rt>제로스</rt></ruby>』와 상대했을 때도 온갖 공격을 시도하며 유효타가 될 방법을 찾았지만…… 그 모든 것은 고차원 존재인 『신』에게는 무력했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ヴィーナスに、二度目になる母親との別れを経験させたくなかった……）"
translation = "（비너스에게 두 번째가 되는 어머니와의 이별을 경험하게 하고 싶지 않았어……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（そして──テルル。できればあなたに、ずっとこの世界を見守っていて欲しかった……）"
translation = "（그리고── 테를르. 가능하다면 당신이 계속 이 세계를 지켜봐 주길 바랐어……）"

[[dialogue]]
speaker = "unk"
original = "幾重にも重なった悔しさに歯噛みする……けれど、立ち止まってはいられない！"
translation = "겹겹이 쌓인 분함에 이를 악물지만…… 그렇다고 멈춰 서 있을 수는 없다!"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「行け──少年！！\u3000次元の境界を超えろ──！！」"
translation = "「가라── 소년!! 차원의 경계를 넘어라──!!」"

[[dialogue]]
speaker = "unk"
original = "俺は３次元存在にまで堕ちた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に接近し──全力の一撃を見舞う！"
translation = "나는 3차원 존재로까지 떨어진 『<ruby>XELOS<rt>제로스</rt></ruby>』에게 접근해── 전력의 일격을 가한다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ディマイズ・ブレイカーッ！！！」"
translation = "「──디마이즈 브레이커!!!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「────────ギ、ガ──ッ！！？？」"
translation = "「────────기, 가──윽!!??」"

[[dialogue]]
speaker = "unk"
original = "拳に伝わる確かな手応え。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の<ruby>核<rt>コア</rt></ruby>とも言える部分を打ち貫いた感触に全身が震える。"
translation = "주먹에 전해지는 확실한 손맛. 『<ruby>XELOS<rt>제로스</rt></ruby>』의 <ruby>핵<rt>코어</rt></ruby>라고도 할 수 있는 부분을 꿰뚫은 감촉에 전신이 떨린다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──やりましたか！？」"
translation = "「──해낸 건가요!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「頼む、これで通ってくれ……！！」"
translation = "「부탁이야, 이걸로 통과해 줘……!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「ぁ──ぁぁぁあ──お父様……！？」"
translation = "「아── 아아아아── 아버님……!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「真の姿を、御見せになる──そんな！？」"
translation = "「진정한 모습을 보여주시다니── 그럴 수가!?」"

[[dialogue]]
speaker = "unk"
original = "無機質な立方体だった『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に亀裂が走り、割れて──"
translation = "무기질한 정육면체였던 『<ruby>XELOS<rt>제로스</rt></ruby>』에 균열이 가며 깨지더니──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ようやく背中に火が点いたか……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』」"
translation = "「겨우 엉덩이에 불이 붙었나…… 『<ruby>XELOS<rt>제로스</rt></ruby>』」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「……私も、この御姿を見るのは、初めてよ」"
translation = "「……나도 이 모습을 보는 건 처음이야」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──お父様の御言葉を伝えましょう」"
translation = "「──아버님의 말씀을 전하지」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「『緋宮クロト──創造神の全霊を持って、お前を消滅させる』」"
translation = "「『히노미야 쿠로토── 창조신의 전령을 다해, 너를 소멸시키겠다』」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「『……厄災の両腕を揃えるなどと、それを望むこと自体が誤りであった。そんなものは、付け入られる隙でしかない……』」"
translation = "「『……재앙의 양팔을 모으는 따위, 그것을 바라는 것 자체가 잘못이었다. 그런 것은 빈틈을 보일 뿐인 기회일 뿐……』」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「『お前を壊す。滅ぼすこと──それは、世界の破滅と同義である──』」"
translation = "「『너를 부수겠다. 멸망시키는 것── 그것은 세계의 파멸과 동의어이다──』」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちはもうお前に触れられる……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』！\u3000今のお前は、殺すことができる程度の『神』でしかない！！」"
translation = "「우리는 이제 너에게 닿을 수 있어…… 『<ruby>XELOS<rt>제로스</rt></ruby>』! 지금의 너는 죽일 수 있는 정도의 『신』일 뿐이야!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「『神』に触れられるようになった。…………そう。だから、何だというの？」"
translation = "「『신』에게 닿을 수 있게 되었다. …………그래. 그래서, 어쨌다는 거지?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「ヒトの子を見守り続けた女神は死んだ……！\u3000邪魔な障害はもはや存在しないわ！！」"
translation = "「인간의 아이를 계속 지켜봐 주던 여신은 죽었다……! 방해되는 장애물은 이제 존재하지 않아!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「私よ……もっと増えなさい！\u3000もっと励みなさい！\u3000デネブを刷新するのよ！！」"
translation = "「나여…… 좀 더 늘어나라! 좀 더 힘써라! 데네브를 쇄신하는 거야!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「滅ぼす、滅ぼす、滅ぼす──」"
translation = "「멸망시킨다, 멸망시킨다, 멸망시킨다──」"

[[dialogue]]
speaker_original = "極星学園の星騎士"
speaker_translation = "극성학원의 성기사"
original = "「また、数が増えて──！？」"
translation = "「또 숫자가 늘어나서──!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「壊す、壊す、壊す──」"
translation = "「부순다, 부순다, 부순다──」"

[[dialogue]]
speaker_original = "極星学園の星騎士"
speaker_translation = "극성학원의 성기사"
original = "「ああ、ルヴィネ様！！\u3000とても持ちこたえられません──！！」"
translation = "「아아, 루비네 님!! 도저히 버틸 수 없습니다──!!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「わ、わわわっ……！\u3000ＤＩＳＣへの救援要請が……止まりません！！」"
translation = "「와, 와와왓……! DISC로 들어오는 구원 요청이…… 멈추지 않아요!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「くっそ……！\u3000もう出し惜しみはしないってか！\u3000助けに行きたいけど……！」"
translation = "「제장……! 이제 아끼지 않겠다는 거냐! 도와주러 가고 싶지만……!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「本気になられたお父様から、無限の霊力が私にも下賜されている──お前たちに負けることなど、もはや万に一つもあり得ない！」"
translation = "「진심이 되신 아버님으로부터 무한한 영력이 내게도 하사되고 있다── 너희에게 지는 일 따위, 이제 만에 하나라도 있을 수 없어!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「さぁ……ふざけた茶番劇はもう終わり！\u3000幕を閉じるとしましょう！！」"
translation = "「자…… 우스꽝스러운 연극은 이제 끝! 막을 내리도록 하지!!」"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "『あー、アー。マイクテスト、マイクテスト～』"
translation = "『아─, 아─. 마이크 테스트, 마이크 테스트~』"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "『平行世界アルタイルより、お声を届けまーす☆\u3000こちらの準備は完了ですよぉ、会長さん！！』"
translation = "『평행세계 알타이르로부터 목소리를 전해드려용☆ 이쪽은 준비 완료입니다아, 회장님!!』"

[[dialogue]]
speaker = "unk"
original = "──とうとう連絡が入った。"
translation = "──드디어 연락이 왔다."

[[dialogue]]
speaker = "unk"
original = "俺が組み上げた、決戦の絵図をここに顕現させよう。"
translation = "내가 짜 올린 결전의 구도를 이곳에 현현시키자."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「幕を閉じるだって？\u3000──とんだ勘違いだ！」"
translation = "「막을 내린다고? ──엄청난 착각이다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「山場も無しに幕を下ろすだなんてとんでもない。クライマックスは──今ここから始まるんだ！」"
translation = "「절정도 없이 막을 내리다니 가당치도 않지. 클라이맥스는── 지금 여기서부터 시작이다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アニマ！\u3000トレジアンナ！\u3000デネブの世界より──緋宮クロトが命じる！」"
translation = "「아니마! 트레지안나! 데네브의 세계로부터── 히노미야 쿠로토가 명한다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「<ruby>平行世界門、解放<rt>パラレルゲート・オープン</rt></ruby>──<ruby>境界突破<rt>ブレイク・ボーダー</rt></ruby>！！」"
translation = "「<ruby>평행세계문, 해방<rt>패러럴 게이트 오픈</rt></ruby>──<ruby>경계 돌파<rt>브레이크 보더</rt></ruby>!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「オペレーション──『<ruby>星の再会<rt>スター・リユニオン</rt></ruby>』！！\u3000始めるぞ、世界を救う戦いを！！！」"
translation = "「오퍼레이션── 『<ruby>별의 재회<rt>스타 리유니온</rt></ruby>』!! 시작하자, 세계를 구하는 싸움을!!!」"

