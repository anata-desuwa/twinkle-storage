[[dialogue]]
speaker = "ウルスラ"
original = "『繰り返し告げましょう。イレーナさんが会長さんにチョコを手渡さない限り、あなたたちが学園から出ることはできません』"
translation = "『반복해서 말씀드리죠. 이레이나 씨가 회장님께 초코를 건네지 않는 한, 당신들은 학원에서 나갈 수 없습니다』"

[[dialogue]]
speaker = "イレーナ"
original = "「ふざけないで！\u3000とっととここから出しなさい！」"
translation = "「웃기지 마! 당장 여기서 내보내!」"

[[dialogue]]
speaker = "ウルスラ"
original = "『イレーナさんがいけないんですよ？』"
translation = "『이레이나 씨가 나쁜 거예요?』"

[[dialogue]]
speaker = "イレーナ"
original = "「……は？\u3000なんで、あたしが──」"
translation = "「……하? 왜 내가──」"

[[dialogue]]
speaker = "ウルスラ"
original = "『私は素直になれないイレーナさんの背中を押したいだけなんです』"
translation = "『저는 솔직해지지 못하는 이레이나 씨의 등을 밀어주고 싶을 뿐이에요』"

[[dialogue]]
speaker = "ウルスラ"
original = "『モンスターが<ruby>跋扈<rt>ばっこ</rt></ruby>するこの世界では、いつ命を落とすかもわかりません。直接モンスターと対峙する、危険な環境に身を置く星騎士ならば尚更です』"
translation = "『몬스터가 발호하는 이 세계에서는 언제 목숨을 잃을지 모릅니다. 직접 몬스터와 대치하는 위험한 환경에 몸을 두는 성기사라면 더더욱이죠』"

[[dialogue]]
speaker = "ウルスラ"
original = "『想いを伝えられぬまま、命を落とした乙女もいました……そんな悲しいことがあるでしょうか？』"
translation = "『마음을 전하지 못한 채 목숨을 잃은 소녀도 있었습니다…… 그런 슬픈 일이 또 있을까요?』"

[[dialogue]]
speaker = "ウルスラ"
original = "『想いを伝えられていたならば、死の間際に後悔することもなく、ともすれば行動も変わり、命が失われることもなかったかもしれないというのに』"
translation = "『마음을 전했더라면 죽음의 순간에 후회하지 않았을 것이고, 어쩌면 행동도 바뀌어 목숨을 잃지 않았을지도 모르는데 말이죠』"

[[dialogue]]
speaker = "ウルスラ"
original = "『命短し、恋せよ乙女──』"
translation = "『인생은 짧으니 사랑을 하세요, 소녀여──』"

[[dialogue]]
speaker = "ウルスラ"
original = "『恋心を秘めた乙女の恋愛の全てを成就させること、それが私の永遠の使命です』"
translation = "『연심을 간직한 소녀의 연애를 모두 성취시키는 것, 그것이 저의 영원한 사명입니다』"

[[dialogue]]
speaker = "イレーナ"
original = "「黙って聞いてりゃ、好き勝手にベラベラと……あー、もう猫かぶりやめやめ！\u3000他に誰もいないんなら、あんた相手も素で行くわ」"
translation = "「가만히 듣고 있자니 자기 마음대로 떠들어대기는…… 아~ 이제 내숭은 끝이야 끝! 다른 사람도 없으니 당신 상대로도 본모습으로 가겠어」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんたのことだから、あたしの素もお見通しだったんだろうけどね！」"
translation = "「당신 성격에 내 본모습도 다 꿰뚫어 보고 있었겠지만 말이야!」"

[[dialogue]]
speaker = "ウルスラ"
original = "『ふふ、今のイレーナさんの方が、私には魅力的に感じます』"
translation = "『후후, 지금의 이레이나 씨가 제게는 더 매력적으로 느껴지네요』"

[[dialogue]]
speaker = "イレーナ"
original = "「そりゃどーも。あんたに褒められたところで、嬉しくもなんともないけど！」"
translation = "「그거 참 고맙네. 당신한테 칭찬받아봤자 기쁘지도 않거든!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんたがやってること、なんていうか知ってる？\u3000小さな親切、大きなお世話っていうのよ！\u3000単なるお節介！」"
translation = "「당신이 하는 짓, 뭐라고 하는지 알아? 작은 친절, 큰 참견이라는 거야! 그냥 오지랖이라고!」"

[[dialogue]]
speaker = "イレーナ"
original = "「想いを伝えられずに後悔した子？\u3000そりゃいるでしょうよ。でも、その子はあたしじゃないし」"
translation = "「마음을 못 전해서 후회한 애? 뭐, 있겠지. 하지만 그건 내가 아니라고」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしにあんたは必要ない！\u3000はた迷惑なお節介は、人を選べって言ってんのよ！」"
translation = "「나한테 당신은 필요 없어! 민폐 끼치는 오지랖은 사람 봐가면서 하란 말이야!」"

[[dialogue]]
speaker = "ウルスラ"
original = "『そうですか。ですが困りましたね。会長さんにチョコを渡すか、私を倒さない限り、学園からは一歩も出られなくなっていますので……』"
translation = "『그런가요. 하지만 곤란하네요. 회장님께 초코를 주거나 저를 쓰러뜨리지 않는 한, 학원에서는 한 발짝도 나갈 수 없게 되어 있어서……』"

[[dialogue]]
speaker = "イレーナ"
original = "「ったく……なんで、あたしがチョコ持ってる前提で話が進んでんのよ……」"
translation = "「참 나…… 왜 내가 초코를 가지고 있다는 전제로 이야기가 진행되는 건데……」"

[[dialogue]]
speaker = "ウルスラ"
original = "『もっとも、バレンタインの私は無敵です。倒すのは骨が折れると思いますよ』"
translation = "『무엇보다 발렌타인의 저는 무적입니다. 쓰러뜨리는 건 꽤 고생할 거예요』"

[[dialogue]]
speaker = "イレーナ"
original = "「ちなみにこれ、放っておいたらどうなるわけ？」"
translation = "「참고로 이거, 내버려 두면 어떻게 되는 거야?」"

[[dialogue]]
speaker = "ウルスラ"
original = "『永劫に続くエンドレス・バレンタインを味わってください。心ゆくまで、たっぷりと。１ヶ月でも、１年でも』"
translation = "『영겁토록 이어지는 엔들리스 발렌타인을 맛봐주세요. 마음껏, 듬뿍. 한 달이든, 일 년이든』"

[[dialogue]]
speaker = "イレーナ"
original = "「そんなに<ruby>寛<rt>くつろ</rt></ruby>いでたら、ホワイトデーだって終わるし、賞味期限だって切れるわよ！」"
translation = "「그렇게 느긋하게 있다간 화이트데이도 끝나고 유통기한도 다 지나버리겠네!」"

[[dialogue]]
speaker = "unk"
original = "チョコがあるなら渡してくれれば……"
translation = "초코가 있다면 주면 될 텐데……"

[[dialogue]]
speaker = "イレーナ"
original = "「ったく……あんたってばモテるくせに乙女心がわかってないわよね」"
translation = "「참 나…… 너는 인기 많으면서 여자의 마음을 전혀 모른다니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「女がバレンタインのチョコを渡す時はね、自分のタイミングってものがあんの」"
translation = "「여자가 발렌타인 초코를 줄 때는 말이야, 자기만의 타이밍이라는 게 있는 법이야」"

[[dialogue]]
speaker = "イレーナ"
original = "「『学園を出るために』とか『誰かに強制されて』とか……自分の気持ち以外で、チョコを渡すって行為がたまらなくイヤなのよ」"
translation = "「『학원을 나가기 위해서』라거나 『누군가에게 강요받아서』라거나…… 자기 마음 이외의 이유로 초코를 준다는 행위가 견딜 수 없이 싫은 거라고」"

[[dialogue]]
speaker = "イレーナ"
original = "「も、もちろん！？\u3000あんたにチョコを渡すかどうかはともかくとしてよ！？\u3000一般論！\u3000一般論だからね！」"
translation = "「무, 물론!? 너한테 초코를 줄지 어떨지는 둘째치고 말이야!? 일반론! 일반론이니까!」"

[[dialogue]]
speaker = "unk"
original = "──わかった。さっさと脱出しよう！"
translation = "──알았어. 얼른 탈출하자!"

[[dialogue]]
speaker = "イレーナ"
original = "「うん、あんたのそういうこと──」"
translation = "「응, 너의 그런 점──」"

[[dialogue]]
speaker = "イレーナ"
original = "（──って、あっぶな。変なこと言いそうになったわ……）"
translation = "(──랄까, 위험해라. 이상한 소리 할 뻔했네……)"

[[dialogue]]
speaker = "unk"
original = "ウルスラの言動は、フェイクの可能性もある。"
translation = "우르술라의 언행은 페이크일 가능성도 있다."

[[dialogue]]
speaker = "unk"
original = "学園から出られないのが本当か確認するため、イレーナとともに校門へと向かった。"
translation = "학원에서 나갈 수 없는 게 사실인지 확인하기 위해 이레이나와 함께 교문으로 향했다."

[[dialogue]]
speaker = "イレーナ"
original = "「やっぱり、駄目ね。ウルスラが言った通り、校門は閉じてて、ビクともしない」"
translation = "「역시 안 되네. 우르술라가 말한 대로 교문은 닫혀서 꿈쩍도 안 해」"

[[dialogue]]
speaker = "unk"
original = "見えない壁ができてる"
translation = "보이지 않는 벽이 생겨 있어"

[[dialogue]]
speaker = "イレーナ"
original = "「当然、そのくらいの対策は取られてるわよね。壁を乗り越えるのも駄目……他に脱出できそうな抜け道は……」"
translation = "「당연히 그 정도 대책은 세워뒀겠지. 벽을 넘는 것도 안 되고…… 다른 탈출할 만한 뒷길은……」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さま……イレーナさま……」"
translation = "「회장님…… 이레이나 님……」"

[[dialogue]]
speaker = "イレーナ"
original = "「シャロン！？\u3000帰ったんじゃなかったの！？」"
translation = "「샤론!? 돌아간 거 아니었어!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「そっか、シャロンもウルスラに閉じ込められたのね。それなら３人で協力して、一緒にあのクレイジーバレンタインモンスターを倒しましょう！」"
translation = "「그렇구나, 샤론도 우르술라에게 갇힌 거네. 그렇다면 셋이서 협력해서 저 크레이지 발렌타인 몬스터를 쓰러뜨리자!」"

[[dialogue]]
speaker = "シャロン"
original = "「ごめんなさい、イレーナさま」"
translation = "「죄송해요, 이레이나 님」"

[[dialogue]]
speaker = "unk"
original = "様子がおかしい！"
translation = "상태가 이상해!"

[[dialogue]]
speaker = "イレーナ"
original = "「シャロン！？\u3000もしかして、あなた……！」"
translation = "「샤론!? 설마 당신……!」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまにチョコを渡すか、さもなくば──ウルスラさまを倒す前に私を倒してください！」"
translation = "「회장님께 초코를 주시거나, 아니면── 우르술라 님을 쓰러뜨리기 전에 저를 쓰러뜨려 주세요!」"

[[dialogue]]
speaker = "unk"
original = "ウルスラと意気投合してるー！？"
translation = "우르술라와 의기투합했어!? "

[[dialogue]]
speaker = "イレーナ"
original = "「どうしてそうなるのよ！」"
translation = "「어째서 그렇게 되는 거야!」"

[[dialogue]]
speaker = "シャロン"
original = "「だって、イレーナさまは──」"
translation = "「그치만 이레이나 님은──」"

[[dialogue]]
speaker = "イレーナ"
original = "「あーあー、聞こえなーい！\u3000それ以上言わなくていいわ！\u3000あたしたちの邪魔をするからには容赦しないからね！」"
translation = "「아~ 아~ 안 들려~! 더 이상 말 안 해도 돼! 우리를 방해하는 이상 봐주지 않을 거니까!」"

[[dialogue]]
speaker = "unk"
original = "聖女とシスター、真っ向からぶつかり合う聖戦が始まる！"
translation = "성녀와 시스터, 정면으로 맞붙는 성전이 시작된다!"

