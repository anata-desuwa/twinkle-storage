[[dialogue]]
speaker = "unk"
original = "第３話,終末兵器の弱点,P"
translation = "제3화, 종말병기의 약점, P"

[[dialogue]]
speaker = "unk"
original = "校内美化の日。俺はトワ先生と一緒に、新星学園の廊下を清掃していた――"
translation = "교내 미화의 날. 나는 토와 선생님과 함께 신성학원의 복도를 청소하고 있었다――"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハハ！\u3000<ruby>眷族<rt>けんぞく</rt></ruby>よ、今日こそ貴様に、我を主として認めさせてみせるのじゃ！\u3000……って、何をしておるのじゃ？」"
translation = "「후하하하하! 권속이여, 오늘이야말로 네놈에게 나를 주인으로 인정하게 해 보이겠느니라! ……라니, 무엇을 하고 있는 것이냐?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、プリムラちゃんだ～！\u3000こんにちは～♪」"
translation = "「앗, 프리뮬러짱이다~! 안녕~♪」"

[[dialogue]]
speaker = "unk"
original = "校内美化の日だから、皆で清掃をしてるんだ"
translation = "교내 미화의 날이라서 다 같이 청소를 하고 있어."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ああ、うちの附属校でも何度かあった、あの面倒な日か。ご苦労なことじゃ」"
translation = "「아아, 우리 부속교에서도 몇 번인가 있었던 그 귀찮은 날인가. 고생이 많구나.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「サチから更正の一環じゃと言われ、散々こき使われた記憶が甦る……」"
translation = "「사치에게 갱생의 일환이라며 잔뜩 부려 먹혔던 기억이 되살아나는군……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――う～ん、そうだ！」"
translation = "「――으음, 그렇다!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「よかったら、プリムラちゃんも私達と一緒に掃除しない？」"
translation = "「괜찮다면 프리뮬러짱도 우리랑 같이 청소하지 않을래?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はぁ！？\u3000なぜ我がそんな面倒なことをしなければならぬ。我は悪の終末兵器じゃぞ！」"
translation = "「하아!? 왜 내가 그런 귀찮은 짓을 해야 하느냐. 나는 악의 종말병기이니라!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「手伝ってくれたら、先生からご褒美をあげちゃうよ～♪」"
translation = "「도와주면 선생님이 보상을 줄게~♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「愚か者め、そんな甘言で我を釣ろうなどと――」"
translation = "「어리석은 놈, 그런 감언이설로 나를 낚으려 들다니――」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「最近、海外の美味しい高級チョコレートを手に入れたんだよね～」"
translation = "「최근에 해외의 맛있는 고급 초콜릿을 구했거든~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハハ！\u3000仕方あるまい！\u3000我の力を見せてやろう！」"
translation = "「후하하하하! 어쩔 수 없구나! 나의 힘을 보여주마!」"

[[dialogue]]
speaker = "unk"
original = "急に手の平返した！"
translation = "갑자기 태도를 바꿨어!"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……ふふっ、プリムラちゃん、チョコレートに目がないから♪」"
translation = "「……후훗, 프리뮬러짱은 초콜릿에 사족을 못 쓰니까♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それに先生、プリムラちゃんが少しでも、皆と掃除するのも悪くないな、って感じてくれたらいいなと思うんだよね」"
translation = "「게다가 선생님은 프리뮬러짱이 조금이라도 다 같이 청소하는 것도 나쁘지 않네, 라고 느껴준다면 좋겠다고 생각하거든.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「面倒で嫌な思い出だけだと、なんか寂しいじゃない？」"
translation = "「귀찮고 싫은 추억뿐이면 왠지 쓸쓸하잖아?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族よ、何を話しておる。さっさと我に変身の許可をよこすがよい！\u3000変形の能力を使用するのじゃ！」"
translation = "「권속이여, 무슨 이야기를 하느냐. 어서 나에게 변신 허가를 내리거라! 변형 능력을 사용하겠느니라!」"

[[dialogue]]
speaker = "unk"
original = "わかった。変身承認！"
translation = "알았어. 변신 승인!"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――我には、学園側からの監視と行動制限を目的として、星の鎖とは別に、首と両腕に拘束具が取りつけられておる」"
translation = "「――나에게는 학원 측의 감시와 행동 제한을 목적으로 별의 쇠사슬과는 별개로 목과 양팔에 구속구가 채워져 있느니라.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「これによって、管理者であるサチの承認なくしては、変身ができぬはずじゃったが……フフフ」"
translation = "「이것 때문에 관리자인 사치의 승인 없이는 변신을 할 수 없었을 터였다만…… 후후후.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「しかし、眷属の契約を結んだ影響で、貴様からも変身承認が受けられるようになったのは、大きな進歩なのじゃ！」"
translation = "「하지만 권속의 계약을 맺은 영향으로 네놈에게서도 변신 승인을 받을 수 있게 된 것은 큰 진보이니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様を我の支配下におけば、いつでも変身ができるようになるわけじゃからな！」"
translation = "「네놈을 나의 지배하에 두면 언제든 변신을 할 수 있게 되는 셈이니까 말이다!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「さあ、眷族よ。我のすごさをとくと目に焼きつけるがよい！\u3000汚れなど指一本触れずに、一掃してくれるわ！」"
translation = "「자, 권속이여. 나의 대단함을 똑똑히 눈에 새기거라! 더러움 따위 손가락 하나 대지 않고 일소해주마!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「わぁ～、すごいね、プリムラちゃん！\u3000手が届かない教室の天井までピカピカになっていくよ～！」"
translation = "「와아~ 대단하네, 프리뮬러짱! 손이 닿지 않는 교실 천장까지 반짝반짝해지고 있어~!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふふん、この程度、造作もないわ！\u3000終末兵器である我は、体の一部を複数に切り離し、端末として操ることができるのじゃ」"
translation = "「후훗, 이 정도는 식은 죽 먹기이니라! 종말병기인 나는 몸의 일부를 여러 개로 떼어내 단말로서 조종할 수 있느니라.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「その端末はもちろん、賢者の石でできておるから、触れた汚れを分解し、自らの活動エネルギーとして吸収することで、自動で掃除を続けられるという仕組みじゃ」"
translation = "「그 단말은 물론 현자의 돌로 되어 있으니, 닿은 오염을 분해하고 스스로의 활동 에너지로서 흡수함으로써 자동으로 청소를 계속할 수 있는 구조이니라.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ありがとね、私達の掃除しにくい場所を手伝ってくれて。はいこれ、私からもチョコあげるね♪」"
translation = "「고마워, 우리가 청소하기 힘든 곳을 도와줘서. 자 여기, 나도 초코 줄게♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「全く、どいつもこいつもチョコを渡してきおって。それで我に言うことを聞かせられると思ったら大間違いじゃぞ！\u3000……もぐもぐ」"
translation = "「정말이지, 이놈이나 저놈이나 초코를 건네주다니. 그걸로 나를 고분고분하게 만들 수 있다고 생각하면 큰 오산이니라! ……우물우물.」"

[[dialogue]]
speaker = "unk"
original = "（言いつつも、チョコ食べてる……）"
translation = "(말은 그렇게 하면서 초코 먹고 있어……)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふふっ、それにしても、この分離したスライムちゃん達、銀色の金属みたいな見た目なのに、ぷるぷるしてて可愛い～♪\u3000つんつん♪」"
translation = "「후훗, 그나저나 이 분리된 슬라임짱들, 은색 금속 같은 모습인데 말랑말랑해서 귀여워~♪ 쿡쿡♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「こら、つんつんして遊ぶでない！\u3000というか、可愛いとか貴様、馬鹿にしとるじゃろ！\u3000我は悪の終末兵器なのじゃぞ、フヘへへ♪」"
translation = "「이봐, 쿡쿡 찌르며 놀지 마라! 그보다 귀엽다니 네놈, 바보 취급하는 거지! 나는 악의 종말병기란 말이다, 흐헤헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "（めっちゃ喜んでる……）"
translation = "(엄청 기뻐하고 있어……)"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ヤバッ、プリムラっちの作った掃除機、自動で動くしペットみたいじゃん！\u3000ウケる～☆」"
translation = "「대박, 프리뮬러치가 만든 청소기, 자동으로 움직이고 반려동물 같잖아! 웃겨~☆」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「誰がペットじゃ！\u3000馬鹿にしとるのか貴様！」"
translation = "「누가 반려동물이냐! 바보 취급하는 거냐 네놈!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いやいや、褒めてるんだって～。おー、よしよし♪」"
translation = "「아니 아니, 칭찬하는 거라니까~ 오오, 착하다 착해♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちょっ……気安く頭をなでるでない！」"
translation = "「잠깐…… 함부로 머리를 쓰다듬지 마라!」"

[[dialogue]]
speaker = "unk"
original = "プリムラ、捻くれてるけど実はいい子だよね"
translation = "프리뮬러, 비뚤어져 있지만 사실 착한 아이네."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「わかる～☆\u3000プリムラっち、めっちゃいい子だよね♪」"
translation = "「인정~☆ 프리뮬러치, 진짜 착한 애라니까♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「掃除できて、偉い偉い♪\u3000ほらほら、お姉さん、いっぱい褒めちゃうぞ～♪」"
translation = "「청소도 잘하고 기특해라 기특해♪ 자자, 언니가 듬뿍 칭찬해줄게~♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「たわけ！\u3000我にお姉さんぶるなど、１０万年早いのじゃ！\u3000子供扱いするでない！」"
translation = "「이끼! 나에게 언니 행세를 하다니 10만 년은 이르느니라! 어린애 취급하지 마라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そんな犬猫みたいになでられても、全然嬉しくないわ！\u3000フヘへへへへ♪」"
translation = "「그런 개나 고양이처럼 쓰다듬어져도 전혀 기쁘지 않단 말이다! 흐헤헤헤헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "う～ん、チョロい……"
translation = "으음, 단순해……"

[[dialogue]]
speaker = "unk"
original = "こんな感じで、チョコレートと、褒められることには、滅法弱い終末兵器なのであった。"
translation = "이런 식으로 초콜릿과 칭찬받는 것에는 사족을 못 쓰는 종말병기인 것이었다."

