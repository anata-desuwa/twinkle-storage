[[dialogue]]
speaker = "unk"
original = "第３話,アポロの様子が……？,P"
translation = "제3화, 아폴로의 상태가……?"

[[dialogue]]
speaker = "unk"
original = "とある日の放課後──フィオナが新星星徒会室を訪ねてきた。"
translation = "어느 날 방과 후── 피오나가 신성 성도회실을 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "アポロの様子がおかしい？"
translation = "아폴로의 상태가 이상해?"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、そうなんです。数日前から私に何かを隠しているみたいで……」"
translation = "「네, 맞아요. 며칠 전부터 저에게 뭔가를 숨기고 있는 것 같아서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「つい昨日もこんなことが──」"
translation = "「바로 어제도 이런 일이──」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん。今日のおやつの時間はとっておきのものが用意できていますよ」"
translation = "「언니. 오늘 간식 시간에는 아주 특별한 게 준비되어 있어요」"

[[dialogue]]
speaker = "アポロ"
original = "「……うん」"
translation = "「……응」"

[[dialogue]]
speaker = "フィオナ"
original = "「見てください。あの桜十路家の運営するパティスリーから購入したケーキです！\u3000大人気でなかなか手に入らないものなんですよ！」"
translation = "「보세요. 그 사쿠라코지 가문에서 운영하는 파티스리에서 구입한 케이크예요! 인기가 많아서 좀처럼 구하기 힘든 거라구요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「もうすぐキリカがお茶を持ってきますから、３人で一緒に食べましょう！」"
translation = "「곧 키리카가 차를 가져올 테니 셋이서 같이 먹어요!」"

[[dialogue]]
speaker = "アポロ"
original = "「あ……あたしはいい。キリカと２人で食べてくれ……」"
translation = "「아…… 나는 됐어. 키리카랑 둘이서 먹어……」"

[[dialogue]]
speaker = "フィオナ"
original = "「え──ええっ？\u3000ね、姉さん……！？」"
translation = "「에── 에엣? 어, 언니……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「どう考えても妙なんです。姉さん、甘い物が大好きなのに……ここのところおやつの時間に渋い顔をすることが多くて」"
translation = "「아무리 생각해도 묘해요. 언니는 단 걸 정말 좋아하는데…… 요새 간식 시간에 떫은 표정을 지을 때가 많아서」"

[[dialogue]]
speaker = "unk"
original = "お腹がいっぱい、とかじゃ？"
translation = "배가 부르다거나, 그런 건?"

[[dialogue]]
speaker = "unk"
original = "お菓子の盗み食いでもして"
translation = "과자를 몰래 먹어서 그런 거 아냐?"

[[dialogue]]
speaker = "フィオナ"
original = "「いいえ！\u3000私もそれを疑って、備蓄してある流星ライダーグミを確認したのですが、数は減っていませんでした……！」"
translation = "「아니요! 저도 그걸 의심해서 비축해둔 유성 라이더 젤리를 확인해 봤는데, 개수는 줄어들지 않았어요……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん、どこか具合でも悪いんでしょうか？\u3000目が覚めてから、グミは最低１日に３袋は消えていたのに……！」"
translation = "「언니, 어디 몸이라도 안 좋은 걸까요? 깨어난 뒤로 젤리는 최소 하루에 세 봉지는 사라졌었는데……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうかしたんですかと聞いても『なんでもない』の一点張りで……私、心配で心配で……！」"
translation = "「무슨 일이냐고 물어도 『아무것도 아냐』라고만 하고…… 저, 걱정돼서 죽겠어요……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長、一緒に姉さんに会っていただけませんか？\u3000妹の私ではダメでも、緋宮会長なら話してくれるかもしれません……！」"
translation = "「히노미야 회장님, 같이 언니를 만나주지 않으시겠어요? 동생인 저로서는 안 돼도, 히노미야 회장님이라면 말해줄지도 몰라요……!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ今から一緒に行こうか"
translation = "그럼 지금 바로 같이 갈까"

[[dialogue]]
speaker = "unk"
original = "わかった"
translation = "알았어"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます！\u3000では早速──」"
translation = "「감사합니다! 그럼 당장──」"

[[dialogue]]
speaker = "アポロ"
original = "「──で、魔王を連れてきたと……」"
translation = "「──그래서, 마왕을 데려왔다고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん。何か困っていることがあるのでしたら、相談してください」"
translation = "「언니. 뭔가 곤란한 일이 있다면 상담해 주세요」"

[[dialogue]]
speaker = "アポロ"
original = "「…………魔王になら、言ってもいいかもしれない。フィオナ、お前はダメだ。お前にはあまり心配をかけたくない……」"
translation = "「…………마왕에게라면 말해도 좋을지도 몰라. 피오나, 너는 안 돼. 너에게는 너무 걱정 끼치고 싶지 않아……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……っ！\u3000わ、わかりました。では、私は席を外します……緋宮会長、よろしくお願いします……！」"
translation = "「……윽! 아, 알겠습니다. 그럼 저는 자리를 비울게요…… 히노미야 회장님, 부탁드립니다……!」"

[[dialogue]]
speaker = "アポロ"
original = "「なあ魔王。あたしはどうすればいいんだろう……？」"
translation = "「저기 마왕. 나는 어떻게 하면 좋을까……?」"

[[dialogue]]
speaker = "unk"
original = "俺はいつでもきみの味方だよ"
translation = "난 언제나 네 편이야"

[[dialogue]]
speaker = "unk"
original = "アポロが困ってるなら"
translation = "아폴로가 곤란해하고 있다면"

[[dialogue]]
speaker = "アポロ"
original = "「うん……わかった。お前はあたしの味方だよな。味方でいてくれるよな……？」"
translation = "「응…… 알았어. 너는 내 편이지? 내 편이 되어줄 거지……?」"

[[dialogue]]
speaker = "アポロ"
original = "「なら──言おう。実はな……」"
translation = "「그럼── 말할게. 사실은 말이야……」"

[[dialogue]]
speaker = "アポロ"
original = "「奥歯が痛いんだ……！\u3000触ると、こう……ぐらぐら揺れるし……き、きっと虫歯だ……！」"
translation = "「어금니가 아파……! 만지면 이렇게…… 흔들흔들거리고…… 부, 분명 충치야……!」"

[[dialogue]]
speaker = "アポロ"
original = "「やっぱり原因はお菓子の食べすぎか？\u3000こっそりグミを盗み食いした罰が当たったのか！？」"
translation = "「역시 원인은 과자를 너무 많이 먹어서인가? 몰래 젤리를 훔쳐 먹은 벌을 받은 건가!?」"

[[dialogue]]
speaker = "アポロ"
original = "「頼む。キリカやフィオナにバレたら……絶対に歯医者に引きずって行かれてしまう……」"
translation = "「부탁이야. 키리카나 피오나한테 들키면…… 분명 치과로 끌려가고 말 거야……」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王……助けてくれ……！！」"
translation = "「마왕…… 도와줘……!!」"

[[dialogue]]
speaker = "unk"
original = "アポロの必死の懇願に、俺は──"
translation = "아폴로의 필사적인 간청에 나는──"

[[dialogue]]
speaker = "アポロ"
original = "「裏切者ーーー！！\u3000なぜこの２人を呼んだーーー！！\u3000離せ、離せーっ！！」"
translation = "「배신자ーーー!! 왜 이 두 사람을 부른 거야ーーー!! 놓아줘, 놓으라고ーー!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん！\u3000まったくもう……私がどれだけ心配したと……！」"
translation = "「언니! 정말이지…… 제가 얼마나 걱정했는데……!」"

[[dialogue]]
speaker = "キリカ"
original = "「申し訳ございません、フィオナお嬢様。私が付いていながら、虫歯を作らせてしまうだなんて……！」"
translation = "「죄송합니다, 피오나 아가씨. 제가 곁에 있으면서 충치가 생기게 하다니……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカは悪くないよ。悪いのはぜんぶ姉さん……あなたの自己管理が甘いからです！\u3000ほら、ジタバタしないでください！」"
translation = "「키리카는 잘못 없어. 잘못한 건 전부 언니…… 언니의 자기관리가 허술하기 때문이에요! 자, 버둥거리지 마세요!」"

[[dialogue]]
speaker = "アポロ"
original = "「いやだいやだいやだっ！\u3000歯医者だけは嫌だ～！！\u3000ドリルがきゅいーんって！\u3000あの音、大嫌いなんだーー！！」"
translation = "「싫어 싫어 싫어! 치과만은 싫어~! 드릴이 끼이잉 하고! 그 소리 정말 싫단 말이야ーー!!」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王、何を突っ立ってるんだ！\u3000あたしの味方と言ったじゃないか！\u3000嘘をつくだなんて卑怯だぞ！！」"
translation = "「마왕, 왜 멍하니 서 있는 거야! 내 편이라고 했잖아! 거짓말을 하다니 비겁해!!」"

[[dialogue]]
speaker = "unk"
original = "女の子１名、予約したいんですが"
translation = "여자아이 한 명 예약하고 싶은데요"

[[dialogue]]
speaker = "unk"
original = "もしもし、歯医者さんですか？"
translation = "여보세요, 치과인가요?"

[[dialogue]]
speaker = "アポロ"
original = "「やめろーーーーーー！！！」"
translation = "「그만둬ーーーーーー!!!」"

[[dialogue]]
speaker = "unk"
original = "そうしてその日のうちに、アポロは星見家御用達の歯科医へ連行されて──翌日。"
translation = "그렇게 그날 안으로 아폴로는 호시미 가문 전용 치과로 연행되었고── 다음 날."

[[dialogue]]
speaker = "フィオナ"
original = "「お医者様に行ったのですが、虫歯じゃありませんでした」"
translation = "「의사 선생님께 갔는데, 충치가 아니었어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「その、乳歯が永久歯に生え変わろうとしていただけだったみたいで……はい。この度はお騒がせしてすみませんでした、緋宮会長……！」"
translation = "「그게, 유치가 영구치로 바뀌려던 것뿐이었나 봐요…… 네. 이번엔 소란을 피워서 죄송했습니다, 히노미야 회장님……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「その、お詫びに桜十路のケーキ、新星星徒会のみなさんでどうぞ……！」"
translation = "「그, 사과의 의미로 사쿠라코지의 케이크, 신성 성도회 여러분이서 드세요……!」"

[[dialogue]]
speaker = "unk"
original = "眠っていた５年の間、アポロの体は成長が止まっていたんだものな……"
translation = "잠들어 있던 5년 동안 아폴로의 몸은 성장이 멈춰 있었던 거니까……"

[[dialogue]]
speaker = "unk"
original = "予想外の結末に驚く俺なのだった。"
translation = "예상치 못한 결말에 놀라는 나였다."

