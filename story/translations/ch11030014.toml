[[dialogue]]
speaker = "unk"
original = "第４話,キャラ崩壊デート,P"
translation = "제4화, 캐붕 데이트, P"

[[dialogue]]
speaker = "unk"
original = "週末──俺は遊園地の前でロクサーナの到着を待っていた"
translation = "주말── 나는 놀이공원 앞에서 록사나의 도착을 기다리고 있었다."

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「待たせちゃった？\u3000会長さん、ごめんね♪」"
translation = "「기다리게 했니? 회장님, 미안해♪」"

[[dialogue]]
speaker = "unk"
original = "今来たばかりだよ"
translation = "방금 왔어"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ええ～、ホントに～？\u3000会長さんってば優しいんだから～」"
translation = "「에에~, 정말로~? 회장님은 참 상냥하다니까~」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「遊園地なんて、久しぶり～。すっごく楽しみで昨日は眠れなかったんだから～♪」"
translation = "「놀이공원이라니, 오랜만이야~. 너무 기대돼서 어제는 잠도 못 잤다구~♪」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「……ふぅぅ、ちょっと素に返るぞ、会長」"
translation = "「……후우우, 잠깐 본연의 모습으로 돌아오지, 회장」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ヴォエェ……甘ったるすぎて、唾液がガムシロップにでもなってしまいそうだ……！」"
translation = "「우웩…… 너무 달짝지근해서, 침이 껌 시럽이라도 되어버릴 것 같군……!」"

[[dialogue]]
speaker = "unk"
original = "……あまり無理しなくても"
translation = "……그렇게 무리하지 않아도"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「だが、これが世界のごく一般的なカップルの姿だというならば実体験を得ねばならない」"
translation = "「하지만, 이것이 세상의 지극히 일반적인 커플의 모습이라면 실체험을 얻어야만 해」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「どんなに辛かろうとも、吐き気をもよそうとも……脚本家のプライドには代えられん！」"
translation = "「아무리 힘들어도, 구역질이 나더라도…… 각본가의 자존심과는 바꿀 수 없어!」"

[[dialogue]]
speaker = "unk"
original = "何故、ロクサーナのキャラが変わってしまう事態になったかというと──"
translation = "어째서, 록사나의 캐릭터가 변해버리는 사태가 되었느냐 하면──"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「うぅ～む……！」"
translation = "「으음……!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「先日のオリジナル劇の後の、観客の反応だ。概ね高評価なのだがな、しかし」"
translation = "「지난번 오리지널 극이 끝난 뒤의, 관객들 반응이다. 대체로 고평가다만, 하지만」"

[[dialogue]]
speaker = "unk"
original = "紙の束を渡された。そこには先日の演劇部の劇を見た感想が書かれていたのだが──"
translation = "종이 뭉치를 건네받았다. 거기에는 지난번 연극부의 극을 본 감상이 적혀 있었는데──"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「『カップルというよりライバル同士』『デートというより決闘』『スキンシップというより組手』」"
translation = "「『커플이라기보다 라이벌 사이』 『데이트라기보다 결투』 『스킨십이라기보다 대련』」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「恋人同士の甘いシーンを書いたはずなのに、絶望的なまでに違う解釈で受け取られている！」"
translation = "「연인끼리의 달콤한 장면을 썼을 텐데, 절망적일 정도로 다른 해석으로 받아들여지고 있어!」"

[[dialogue]]
speaker = "unk"
original = "面白かったけどね"
translation = "재밌긴 했지만 말이야"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「面白ければ良いというものではない！」"
translation = "「재밌기만 해서는 안 된단 말이다!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「やはり私には経験が足りていないのだな。恋人のみが生み出す空気感……」"
translation = "「역시 나에게는 경험이 부족한 거로군. 연인만이 만들어 내는 공기감……」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「後学のためにも演出家たるもの、色事のひとつも学んでおかねばな……」"
translation = "「후학을 위해서라도 연출가라면, 연애사 하나쯤은 배워둬야겠지……」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「しかし、私にはデートに行ってくれる男などおらん。はぁ……同年代の異性が都合よく目の前にいたりはしないものか──ん？」"
translation = "「하지만, 나에게는 데이트하러 가줄 남자 같은 건 없어. 하아…… 또래 이성이 운 좋게 눈앞에 나타나 주지는 않을까── 응?」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「いるではないか！！！」"
translation = "「여기 있잖아!!!」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「会長！\u3000私を助けると思って、デートをしろ！\u3000今週末、遊園地に向かうぞ！」"
translation = "「회장! 나를 돕는 셈 치고, 데이트를 하자! 이번 주말, 놀이공원으로 가자!」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、ロクサーナとデートする流れとなり、現在に至る。『甘い空気の出し方』を少し勘違いしているような気もするが……。"
translation = "이래저래 해서, 록사나와 데이트하는 흐름이 되어, 현재에 이른다. 『달콤한 분위기를 내는 법』을 조금 착각하고 있는 듯한 기분도 들지만……."

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「わぁ、美味しそうなクレープ♪\u3000はい、クロトきゅん、あーんして♪」"
translation = "「와아, 맛있어 보이는 크레이프♪ 자, 쿠로토 큥, 아~ 해봐♪」"

[[dialogue]]
speaker = "unk"
original = "あ、あーん……"
translation = "아, 아앙……"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「どう？\u3000美味し？\u3000美味しいよね♪」"
translation = "「어때? 맛있어? 맛있지♪」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「同じスプーン、ペットボトル、ストローを用いての飲食……わざわざ交換する手間は省けるな」"
translation = "「같은 숟가락, 페트병, 빨대를 이용한 취식…… 번거롭게 교환하는 수고는 덜 수 있겠군」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「だが、効率の問題ではないように思える。カップルは誰もがこのように分け合って楽しそうに食べるものだ……会長、私の口にもくれ。あーん」"
translation = "「하지만, 효율의 문제는 아닌 듯하다. 커플은 누구나 이렇게 나눠 먹으며 즐거워하는 법이지…… 회장, 내 입에도 줘라. 아~」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「あむ。もぐもぐ……うむ、甘くて美味い。お高めのアイスクリームの味がする。もう一口だ。あーん」"
translation = "「아암. 우물우물…… 음, 달고 맛있군. 비싼 아이스크림 맛이 나. 한 입 더다. 아~」"

[[dialogue]]
speaker = "unk"
original = "思うところはいろいろあるみたいだけれど、嫌がっているわけではないらしかった。"
translation = "생각하는 점은 여러 가지 있는 것 같지만, 싫어하는 기색은 아닌 듯했다."

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「先ほどのお化け屋敷、うっすらとギミックが透けて見えていたな。ホラー映画の文脈を辿れば、ここで脅かしに来るだろうというのが見え見えだ」"
translation = "「방금 전 귀신의 집, 희미하게 기믹이 비쳐 보이더군. 공포 영화의 맥락을 따라가면, 여기서 겁을 주러 오겠구나 하는 게 뻔히 보여」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「いわゆる吊り橋効果を狙ったものか。『いやーん♪\u3000怖ーい♪』とか黄色い声をあげて、すり寄るのが正解か？\u3000馬鹿馬鹿しいこと、この上ないな」"
translation = "「이른바 흔들다리 효과를 노린 건가. 『어머나~♪ 무서워~♪』 같은 콧소리를 내며, 바짝 달라붙는 게 정답인가? 이보다 더 바보 같은 짓은 없겠군」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「まったく、世の恋人どもは凡骨の集まりなのか？\u3000『恋とはまったく一種の狂気』とはよく言ったものだ」"
translation = "「참 나, 세상의 연인들은 범골들의 집합소인가? 『사랑이란 실로 일종의 광기』라고들 하던데 잘 말했군」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ジェットコースター、ゴーカート、コーヒーカップ、メリーゴーラウンド、観覧車……一通り乗ったら、もう閉園時間だな。そろそろ帰るとしようか」"
translation = "「롤러코스터, 고카트, 커피잔, 회전목마, 관람차…… 한 바퀴 다 탔더니, 벌써 폐장 시간이군. 슬슬 돌아가기로 할까」"

[[dialogue]]
speaker = "unk"
original = "楽しかった……？"
translation = "재밌었어……?"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ふうむ……そうだな。終わってみれば、悪い気はしなかった」"
translation = "「후우음…… 글쎄다. 끝나고 보니, 나쁘지 않았어」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「なるほど、定番のデートスポットだから遊園地を選択したが……遊園地である必要はなかったのかもしれん」"
translation = "「과연, 전형적인 데이트 명소라 놀이공원을 선택했다만…… 놀이공원일 필요는 없었을지도 모르겠군」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「デートとは何処に行ったかより、誰と行って、どれだけ同じ時間を過ごしたのかが重要に思えた」"
translation = "「데이트란 어디에 갔느냐보다, 누구와 가서, 얼마나 같은 시간을 보냈느냐가 중요하게 느껴졌어」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「会長はどうだ……？\u3000私とのデートは、その、なんだ……楽しめたか？」"
translation = "「회장은 어떠냐……? 나와의 데이트는, 그, 뭐냐…… 즐거웠나?」"

[[dialogue]]
speaker = "unk"
original = "もちろん！"
translation = "물론이지!"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「そうか！\u3000それは何よりだ！\u3000またいずれ、デートに付き合ってくれ。次回作の資料を集めるのに、水族館なども良いな」"
translation = "「그래! 그거면 됐다! 나중에 또, 데이트에 동참해 줘. 다음 작품 자료를 모으는 데 수족관 같은 곳도 좋겠군」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「多忙な中、丸１日付き合わせてしまって、すまなかったな。協力に感謝する。おかげで貴重な経験ができた」"
translation = "「바쁜 와중에, 하루 종일 함께하게 해서 미안했군. 협력해 줘서 고맙다. 덕분에 귀중한 경험을 했어」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「私の探求心をここまで引き付けた男は、お前が初めてだ。これからも密着取材は続けさせてもらう」"
translation = "「나의 탐구심을 이 정도로 끌어당긴 남자는, 네가 처음이다. 앞으로도 밀착 취재는 계속하도록 하지」"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「いつかは『会長』ではなく『緋宮クロト』という男の辿る人生そのものを脚本にし、後世まで残したいものだ」"
translation = "「언젠가는 『회장』이 아니라 『히노미야 쿠로토』라는 남자가 걸어가는 인생 그 자체를 각본으로 써서, 후세까지 남기고 싶군」"

[[dialogue]]
speaker = "unk"
original = "ちょっと恥ずかしいな"
translation = "조금 부끄러운걸"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「何を恥ずかしがることがある！\u3000私の生涯を賭す超大作にして傑作になるだろうよ、はっはっは！」"
translation = "「부끄러워할 게 뭐 있나! 나의 생애를 건 초대작이자 걸작이 될 거다, 핫핫하!」"

[[dialogue]]
speaker = "unk"
original = "これからもずっと、いつまでも末永く。"
translation = "앞으로도 계속, 언제까지나 영원히."

[[dialogue]]
speaker = "unk"
original = "ロクサーナの密着取材は続くのであった。"
translation = "록사나의 밀착 취재는 계속되는 것이었다."

