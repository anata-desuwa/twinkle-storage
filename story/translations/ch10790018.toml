[[dialogue]]
speaker = "unk"
original = "星徒会の活動で遅くまで残った日のこと。"
translation = "성도회 활동으로 늦게까지 남았던 날의 일."

[[dialogue]]
speaker = "unk"
original = "帰ろうとしたところを突然パテルに呼び止められ、大聖堂で話を聞くことに。"
translation = "돌아가려던 참에 갑자기 파텔이 불러 세워, 대성당에서 이야기를 듣기로 했다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「う～っ……」"
translation = "「으~……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうしたんだ？\u3000怒っているのか？」"
translation = "「왜 그래? 화난 거야?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いや、怒ってるわけじゃないんだけど……体がおかしいの……」"
translation = "「아니, 화난 건 아닌데…… 몸이 이상해……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁ……理由もないのにイライラするっていうか、ムズムズするっていうか……なんか落ち着かないの……」"
translation = "「하아…… 이유도 없는데 짜증 난달까, 근질근질하달까…… 뭔가 진정이 안 돼……」"

[[dialogue]]
speaker = "unk"
original = "少し荒い息に、上気した顔。"
translation = "조금 거친 숨결에, 상기된 얼굴."

[[dialogue]]
speaker = "unk"
original = "普通なら熱でもあるのかと思うところだが、パテルの言葉からするともしかして……"
translation = "보통이라면 열이라도 있는 건가 싶겠지만, 파텔의 말로 보아 혹시……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「驚かないでほしいんだが、それはパテルの体がエッチしたがってるのかも」"
translation = "「놀라지 않았으면 좋겠는데, 그건 파텔의 몸이 섹스하고 싶어 하는 걸지도 몰라」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「エッチ……？\u3000性行為のことだよね？\u3000そっか……肉体があるとそういうことも起こるんだ……」"
translation = "「섹스……? 성행위 말이지? 그렇구나…… 육체가 있으면 그런 일도 일어나는구나……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしの体が……あたしがエッチしたがってる……」"
translation = "「내 몸이…… 내가 섹스하고 싶어 해……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「じゃあ、あなたがエッチして……？」"
translation = "「그럼, 당신이 섹스해 줄래……?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「もう我慢できないし、あなただったら……ううん、あなたとがいいから……」"
translation = "「이제 못 참겠고, 당신이라면…… 아니, 당신이랑 하고 싶으니까……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ほら、はやくぅ……」"
translation = "「자, 어서어……」"

[[dialogue]]
speaker = "unk"
original = "自分から足を開き、お尻を持ち上げて俺を求めるパテル。"
translation = "스스로 다리를 벌리고, 엉덩이를 들어 올리며 나를 원하는 파텔."

[[dialogue]]
speaker = "unk"
original = "幼い容姿の女の子がペニスをねだる姿に、あっという間に下半身がいきり立つ。"
translation = "어린 외모의 여자아이가 페니스를 조르는 모습에, 순식간에 하반신이 팽창한다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「エッチって、女の人のお股に、男の人のおち○ちん入れればいいんでしょ？」"
translation = "「섹스라는 거, 여자의 가랑이에 남자의 자지를 넣으면 되는 거지?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ、こういう時はおま○ことおち○ぽって言えばいいんだっけ？\u3000ほら、あなたのおち○ぽちょうだい……」"
translation = "「아, 이럴 때는 보지랑 자지라고 말하면 되나? 자, 당신의 자지 줘……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あなたのおち○ぽ、ここに……あたしのおま○こに入れてぇ……」"
translation = "「당신의 자지, 여기에…… 내 보지에 넣어줘……」"

[[dialogue]]
speaker = "unk"
original = "わざとか無意識か、足を開いたままふりふりとお尻を揺らし、卑猥に男を誘う。"
translation = "고의인지 무의식인지, 다리를 벌린 채 살랑살랑 엉덩이를 흔들며 비외하게 남자를 유혹한다."

[[dialogue]]
speaker = "unk"
original = "露わになった女性器は、愛撫もしていないのに蜜で濡れていた。"
translation = "드러난 성기는 애무도 하지 않았는데 애액으로 젖어 있었다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はあぁ……おち○ぽ、ちょうだぁい……初めてとか気にしなくていいからぁ……」"
translation = "「하아아…… 자지, 줘어…… 처음인 거 신경 쓰지 않아도 되니까아……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしのおま○こ、きっと気持ちいいから……あなたのおち○ぽ、ぷにぷにおま○こで気持ち良くしてあげるからぁ……早くぅ……」"
translation = "「내 보지, 분명 기분 좋을 테니까…… 당신의 자지, 말랑말랑 보지로 기분 좋게 해 줄 테니까아…… 어서어……」"

[[dialogue]]
speaker = "unk"
original = "パテルの声と表情がどんどん切羽詰まったものになり、俺も欲望を抑えられなくて──"
translation = "파텔의 목소리와 표정이 점점 절박해지고, 나도 욕망을 억누를 수 없어서──"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふぁああ～～～～～っ！？\u3000大き、い……っ！」"
translation = "「후아아아~~~~~앗!? 커, 커어……!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁ、はっ……んん……っ！\u3000お腹の中、メリメリって広げて、入ってくるぅ……はぁは、あっ……んーーっ！」"
translation = "「하아, 하윽…… 응으……윽! 배 속을, 메리메리하고 넓히면서, 들어와아…… 하아하, 앗…… 응ーー읏!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁ、あっ…………あたしの中、あなたの形になっちゃうぅ……ふっ、はぁ、はぁ……」"
translation = "「하아, 앗………… 내 안이, 당신 모양이 되어버려어…… 훗, 하아, 하아……」"

[[dialogue]]
speaker = "unk"
original = "力ずくでペニスを押し込むと、パテルの膣がぎゅうっと締め付けてくる。"
translation = "억지로 페니스를 밀어 넣자, 파텔의 질이 꽉 조여온다."

[[dialogue]]
speaker = "unk"
original = "体が小さいせいか、パテルの中は窮屈なくらい狭く、痛いぐらいの圧迫感だ。"
translation = "몸이 작은 탓인지, 파텔의 안은 거북할 정도로 좁고, 아플 정도의 압박감이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……大丈夫か？」"
translation = "「큭…… 괜찮아?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「うん……ちょっと痛いけど、それよりもっとお腹熱くて……ムズムズするよぉ……」"
translation = "「응…… 조금 아프지만, 그것보다 더 배 속이 뜨거워서…… 근질근질해에……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おま○この中でおち○ぽ動かしたら、気持ち良くなるんだよね……？」"
translation = "「보지 안에서 자지를 움직이면, 기분 좋아지는 거지……?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「じゃあ動いてぇ……あなたのおち○ぽで、おま○こズポズポして、あたしを気持ち良くしてぇっ……！」"
translation = "「그럼 움직여줘…… 당신의 자지로, 보지 즈포즈포해서, 나를 기분 좋게 해줘어……!」"

[[dialogue]]
speaker = "unk"
original = "パテルの表情にはしっかりと快感が表れていて、気遣いは無用のようだ。"
translation = "파텔의 표정에는 확실히 쾌감이 나타나 있어, 걱정은 필요 없는 듯하다."

[[dialogue]]
speaker = "unk"
original = "快楽を求めるパテルの声に応え、下半身に力を込めて動き出す。"
translation = "쾌락을 원하는 파텔의 목소리에 응해, 하반신에 힘을 주어 움직이기 시작한다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひああぁ～～っ<emoji=heart04>\u3000はぁっ、あっ……ホントに、あたしの中で動いて……はあぁ、はんっ<emoji=heart04>」"
translation = "「히아아아~~앗<emoji=heart04> 하앗, 앗…… 정말로, 내 안에서 움직여서…… 하아아, 한으<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふああぁっ……はっ……あぁっ<emoji=heart04>\u3000中で、擦れてるぅっ……んんっ……<emoji=heart04>\u3000はあぁ、はっ……」"
translation = "「후아아앗…… 핫…… 아앗<emoji=heart04> 안에서, 쓸리고 있어어…… 응읏……<emoji=heart04> 하아아, 핫……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふはぁ、はぁ、はぁ……<emoji=heart04>\u3000おち○ぽ、おっきい……はぁ、あっ……おま○こ、熱いぃ……<emoji=heart04>」"
translation = "「후하아, 하아, 하아……<emoji=heart04> 자지, 커어…… 하아, 앗…… 보지, 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゆっくり真っ直ぐと、狭くきつい締め付けの中を強引に動かし、ペニスと粘膜が摩擦する。"
translation = "천천히 곧게, 좁고 빡빡한 조임 속을 강제로 움직이며 페니스와 점막이 마찰한다."

[[dialogue]]
speaker = "unk"
original = "パテルの中は火傷しそうに熱く、弾力ある膣壁の感触と相まって強い快感を覚えた。"
translation = "파텔의 안은 데일 듯이 뜨겁고, 탄력 있는 질 벽의 감촉과 어우러져 강한 쾌감을 느꼈다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んはぁ、はぁ……あなたのおち○ぽが、あたしの中、出たり入ったりして……はあぁ<emoji=heart04>」"
translation = "「응하아, 하아…… 당신의 자지가, 내 안을, 들락날락거려서…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おま○こ擦れる度に、じんじんして……はぁ、はっ……これがエッチなんだね……<emoji=heart04>」"
translation = "「보지가 쓸릴 때마다, 징징거려서…… 하아, 핫…… 이게 섹스구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突き出す時に体重をかけて、まだ慣れていない膣内を開拓するように広げていく。"
translation = "찔러 넣을 때 체중을 실어, 아직 익숙해지지 않은 질 내를 개척하듯 넓혀간다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んん～～～っ……<emoji=heart04>\u3000今の、さっきより、深いっ<emoji=heart04>\u3000はぁはっ……おま○ことおち○ぽで、繋がってるぅっ<emoji=heart04>」"
translation = "「응으으으~~읏……<emoji=heart04> 지금 거, 아까보다, 깊어<emoji=heart04> 하아핫…… 보지랑 자지로, 이어져 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけどパテルの表情はさらに快楽に染まり、もっと欲しいと言わんばかりに荒い息を吐く。"
translation = "하지만 파텔의 표정은 더욱 쾌락에 물들고, 더 원한다는 듯이 거친 숨을 내뱉는다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁはぁ、あっ、あんっ<emoji=heart04>\u3000あぁ……ズルズルって抜けてぇ……んんっ<emoji=heart04>\u3000また、入ってきて……お腹の奥、キュンってなるぅ<emoji=heart04>」"
translation = "「하아하아, 앗, 안앗<emoji=heart04> 아아…… 주르륵하고 빠져서어…… 응읏<emoji=heart04> 다시, 들어와줘…… 배 속 깊은 곳이, 큥하고 울려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エッチするの気持ちいい？」"
translation = "「섹스하는 거 기분 좋아?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「うん、気持ちいい<emoji=heart04>\u3000こんなの初めて<emoji=heart04>\u3000エッチするのって、こんなに気持ちいいんだぁ……<emoji=heart04>」"
translation = "「응, 기분 좋아<emoji=heart04> 이런 거 처음이야<emoji=heart04> 섹스하는 게, 이렇게 기분 좋은 거구나아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んぁあ……はあぁっ……<emoji=heart04>\u3000太いおち○ぽで、中から押し広げられて、擦れてるっ……<emoji=heart04>\u3000それだけなのに、気持ちいい<emoji=heart04>」"
translation = "「응아아…… 하아앗……<emoji=heart04> 굵은 자지로, 안에서부터 밀어 넓혀지고, 쓸리고 있어……<emoji=heart04> 그것뿐인데, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉がウソでないと示すように、パテルの中はすっかり蜜で蕩けていた。"
translation = "그 말이 거짓이 아님을 증명하듯, 파텔의 안은 완전히 애액으로 녹아내려 있었다."

[[dialogue]]
speaker = "unk"
original = "柔らかな粘膜がとろとろの愛液とともに絡みつき、きゅうっと締め付けてくる。"
translation = "부드러운 점막이 걸쭉한 애액과 함께 얽혀들며, 꽉 조여온다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あなたも、あたしとエッチするの気持ちいい？\u3000はあぁ、はぁ<emoji=heart04>\u3000気持ち良く、なってくれてる……？」"
translation = "「당신도, 나랑 섹스하는 거 기분 좋아? 하아아, 하아<emoji=heart04> 기분 좋게, 되어주고 있어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でないとこうはならないよ」"
translation = "「안 그러면 이렇게 안 되지」"

[[dialogue]]
speaker = "unk"
original = "答えながら、怒張したペニスを思い切り突き下ろす。"
translation = "대답하며, 노창된 페니스를 힘껏 찔러 내린다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000ああ、嬉しい……さっきより、おち○ぽ大きくなってるぅ……<emoji=heart04>」"
translation = "「히아아아아~~앗<emoji=heart04><emoji=heart04> 아아, 기뻐…… 아까보다, 자지 더 커졌어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁ、あっ、ああっ<emoji=heart04>\u3000おち○ぽ、熱くて、大きい<emoji=heart04>\u3000はっ、あっ……おま○こから、熱いの広がってるみたい……<emoji=heart04>」"
translation = "「하아, 앗, 아앗<emoji=heart04> 자지, 뜨겁고, 커<emoji=heart04> 핫, 앗…… 보지에서부터, 뜨거운 게 퍼지는 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "引いては突いてを繰り返す度、パテルの小さな体が震え、蜜が量を増す。"
translation = "당겼다 찔렀다를 반복할 때마다, 파텔의 작은 몸이 떨리고, 애액이 양을 더한다."

[[dialogue]]
speaker = "unk"
original = "自ら股を広げてはしたなく喘ぐ姿に、否応なしに情欲をかき立てられた。"
translation = "스스로 가랑이를 벌리고 천박하게 헐떡이는 모습에, 어쩔 수 없이 정욕이 치솟았다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おま○こぐちゅぐちゅって、いやらしい音、してるっ<emoji=heart04>\u3000おち○ぽで、あたしの中、かき混ぜられてっ──ひぁああっ<emoji=heart04>」"
translation = "「보지 구츄구츄하고, 야한 소리, 나고 있어<emoji=heart04> 자지로, 내 안, 휘저어지고 있어──히아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んん～～っ<emoji=heart04><emoji=heart04>\u3000また深くまで来て、おち○ぽ太いぃっ<emoji=heart04>\u3000お腹の中、あなたのおち○ぽでいっぱいになるぅっ<emoji=heart04>」"
translation = "「응으~~읏<emoji=heart04><emoji=heart04> 또 깊숙이까지 와서, 자지 굵어어<emoji=heart04> 배 속, 당신의 자지로 가득 차버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふあぁっ、あっ、あっ……ひぁああ～～っ<emoji=heart04>\u3000ジュポジュポって……あっ、あっ……んん～～っ<emoji=heart04>」"
translation = "「후아앗, 앗, 앗…… 히아아아~~앗<emoji=heart04> 쥬포쥬포하고…… 앗, 앗…… 응으~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスをより深く沈めると、小さな膣がぎゅっと絞ってくる。"
translation = "페니스를 더욱 깊게 가라앉히자, 작은 질이 꽉 조여온다."

[[dialogue]]
speaker = "unk"
original = "その感触にまるで小さな子がしがみついてくるような錯覚すら覚えて、射精欲が高まった。"
translation = "그 감촉에 마치 어린아이가 매달려오는 듯한 착각마저 기억하며, 사정욕이 높아졌다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁはぁっ<emoji=heart04>\u3000お腹の奥、キュンキュンして苦しいっ<emoji=heart04>\u3000締め付けられるみたいに、苦しいよぉっ<emoji=heart04>」"
translation = "「하아하앗<emoji=heart04> 배 깊은 곳, 큥큥거려서 괴로워<emoji=heart04> 조여지는 것처럼, 괴로워어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「気持ちいいのに、おま○こムズムズするのっ<emoji=heart04>\u3000もっとほしい、もっとして<emoji=heart04>\u3000もっとおち○ぽズンズンしてぇっ<emoji=heart04>」"
translation = "「기분 좋은데, 보지 근질근질해<emoji=heart04> 더 원해, 더 해줘<emoji=heart04> 더 자지 즌즌해줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひやあぁああああっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おち○ぽ激しいっ<emoji=heart04>\u3000おま○この中で、暴れてるぅっ<emoji=heart04>\u3000んぁ、あ、ああぁっ<emoji=heart04>」"
translation = "「히야아아아아앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아앙앗<emoji=heart04> 자지 격렬해<emoji=heart04> 보지 안에서, 날뛰고 있어어<emoji=heart04> 응아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ズンっ、ズンって、おっきな、おち○ぽ、打ち込まれてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000お腹の奥まで来てっ<emoji=heart04>\u3000深いぃっ<emoji=heart04>」"
translation = "「즌, 즌하고, 커다란, 자지, 박혀서어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 배 깊은 곳까지 와서<emoji=heart04> 깊어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああ～っ<emoji=heart04>\u3000これ、すごいぃっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000エッチのことしか、考えられなくなっちゃうぅっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 응아아~앗<emoji=heart04> 이거, 굉장해에<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 엣지한 생각밖에, 할 수 없게 돼버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひやあぁああっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ──あ──んんぁああ～～っ<emoji=heart04>\u3000らめ、らめ、おま○こ溶けちゃうぅっ<emoji=heart04>」"
translation = "「히야아아앗<emoji=heart04> 안앗<emoji=heart04> 앗<emoji=heart04> 아──아──응으아아~~앗<emoji=heart04> 안대, 안대, 보지 녹아버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しゃにむに腰を振り、パテルの体に欲望を叩きつける。"
translation = "무턱대고 허리를 흔들어, 파텔의 몸에 욕망을 두드려 넣는다."

[[dialogue]]
speaker = "unk"
original = "ひと突きごとに体重を乗せ、この小さな体を奥まで貫く。"
translation = "한 번 찌를 때마다 체중을 실어, 이 작은 몸을 안쪽까지 꿰뚫는다."

[[dialogue]]
speaker = "unk"
original = "形のいいおっぱいがふるふると揺れる。"
translation = "모양 좋은 가슴이 파르르 떨린다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んんん～～～っ<emoji=heart04><emoji=heart04>\u3000おち○ぽ、奥に、来てぇっ<emoji=heart04>\u3000はっ、あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んん──は──あぁ～～っ<emoji=heart04>」"
translation = "「응응응~~~앗<emoji=heart04><emoji=heart04> 자지, 깊숙이, 와줘어<emoji=heart04> 핫, 앗<emoji=heart04> 안앗<emoji=heart04> 응으──하──아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おち○ぽの、先っぽ、子宮に当たってるぅっ<emoji=heart04><emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「자지의, 끝부분, 자궁에 닿고 있어어<emoji=heart04><emoji=heart04> 응읏<emoji=heart04> 하앗<emoji=heart04> 아앗<emoji=heart04> 응으으~~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「奥、当たる度に、頭チカチカするっ<emoji=heart04>\u3000ぐちゃぐちゃにされてるのに、気持ちいいっ<emoji=heart04>\u3000子宮で、感じてるぅっ<emoji=heart04>」"
translation = "「안쪽, 닿을 때마다, 머리 치카치카해<emoji=heart04> 엉망진창으로 만들어지고 있는데, 기분 좋아<emoji=heart04> 자궁으로, 느끼고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先端が子宮にぶつかった瞬間、パテルの体がビクリと跳ね、膣内が震えながら収縮する。"
translation = "선단이 자궁에 부딪힌 순간, 파텔의 몸이 움찔하고 튀어 오르며, 질 내벽이 떨리면서 수축한다."

[[dialogue]]
speaker = "unk"
original = "ペニスを突き入れる度に、小さいけど形のいいおっぱいがふるふると揺れていた。"
translation = "페니스를 찔러 넣을 때마다, 작지만 모양이 예쁜 가슴이 파르르 흔들리고 있었다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000みんな、こんな気持ちいいことしてたんだっ<emoji=heart04>\u3000ずるいよっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 앗<emoji=heart04> 아앗<emoji=heart04> 아앙<emoji=heart04> 다들, 이렇게 기분 좋은 걸 하고 있었구나<emoji=heart04> 치사해<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしが死神してる間、オスとメスで繋がって、腰振って、気持ちよくエッチしてたんだっ<emoji=heart04>\u3000そんなのずるいっ<emoji=heart04>\u3000ずるいよぉっ<emoji=heart04>」"
translation = "「내가 사신 일을 하는 동안, 수컷이랑 암컷으로 이어져서, 허리 흔들고, 기분 좋게 섹스하고 있었던 거지<emoji=heart04> 그런 거 치사해<emoji=heart04> 치사하다구우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "男を初めて受け入れた膣は、洪水のように蜜を溢れさせ、肉棒の形に広がってペニス全体を包み込んでいる。"
translation = "남자를 처음 받아들인 질은, 홍수처럼 애액을 넘쳐나게 하며, 육봉의 모양대로 벌어져 페니스 전체를 감싸 안고 있다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひあぁっ<emoji=heart04>\u3000あん<emoji=heart04>\u3000あん<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000エッチするの気持ちいいっ<emoji=heart04>\u3000おま○こズポズポしてもらうのいいっ<emoji=heart04>」"
translation = "「히아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 섹스하는 거 기분 좋아<emoji=heart04> 보지 즈포즈포 당하는 거 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「深いところまで、突かれて、擦れて<emoji=heart04>\u3000ふぁはぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000お腹熱いっ<emoji=heart04>\u3000おかしくなっちゃうぅっ<emoji=heart04>」"
translation = "「깊은 곳까지, 찔리고, 비벼져서<emoji=heart04> 화하아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 배 안이 뜨거워<emoji=heart04> 이상해져 버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつも気まぐれで、イタズラ好きで、愛らしいパテル。"
translation = "언제나 변덕스럽고, 장난치기 좋아하며, 사랑스러운 파텔."

[[dialogue]]
speaker = "unk"
original = "そんな彼女があられもない姿で嬌声を上げていて、普段のあどけなさとのギャップに興奮が膨れ上がる。"
translation = "그런 그녀가 부끄러운 모습으로 교성을 지르고 있어, 평소의 천진난만함과의 차이에서 흥분이 부풀어 오른다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んん～～～っ！？\u3000突くの、強くなってぇっ<emoji=heart04>\u3000お腹の奥に、響くぅっ<emoji=heart04>\u3000んあっ、あっ<emoji=heart04>\u3000壊れるっ<emoji=heart04>\u3000壊れちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「음음~~~앗!? 찌르는 거, 더 강하게 해줘어<emoji=heart04> 배 깊숙한 곳까지, 울려어<emoji=heart04> 응앗, 앗<emoji=heart04> 망가져<emoji=heart04> 망가져 버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもいいっ<emoji=heart04>\u3000壊れてもいいから、もっとズンズンしてっ<emoji=heart04>\u3000ぐちゃぐちゃにしてっ<emoji=heart04>\u3000あたしのことなんていいから、あなたが気持ち良くなるために腰振ってぇっ<emoji=heart04><emoji=heart04>」"
translation = "「그래도 좋아<emoji=heart04> 망가져도 좋으니까, 더 꾹꾹 해줘<emoji=heart04> 엉망진창으로 만들어줘<emoji=heart04> 나 같은 건 상관없으니까, 당신이 기분 좋아지기 위해서 허리를 흔들어줘어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひやぁああああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000お腹突き破られるくらい、おち○ぽ奥来てるっ<emoji=heart04>\u3000子宮に、んんっ、ぐりぐりってぇっ<emoji=heart04>\u3000あ──あ──あ──んん～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히야아아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 배를 뚫고 나갈 정도로, 자지가 깊숙이 들어오고 있어<emoji=heart04> 자궁에, 응윽, 구리구리하고오<emoji=heart04> 아──아──아──앙음~~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000なんか来るっ<emoji=heart04>\u3000ムズムズの代わりに、なんかっ<emoji=heart04>\u3000来る、来る、来ちゃうぅっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 뭔가 와<emoji=heart04> 근질근질거리는 거 대신에, 뭔가<emoji=heart04> 와, 온다, 와버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐっ……それはイクっていうんだよ」"
translation = "「윽…… 그건 간다고 하는 거야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「イク……？\u3000イッたらもっと気持ち良くなれる？」"
translation = "「가……? 가면 더 기분 좋아질 수 있어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。一番気持ちいいぞ」"
translation = "「아아. 가장 기분 좋지」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "パテルが期待に息を呑む。"
translation = "파텔이 기대감에 숨을 삼킨다."

[[dialogue]]
speaker = "unk"
original = "幼い死神はもう快楽の虜になっていた。"
translation = "어린 사신은 이미 쾌락의 포로가 되어 있었다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ならイかせてっ<emoji=heart04>\u3000イかせてっ<emoji=heart04>\u3000あなたのおち○ぽでイかせてっ<emoji=heart04>\u3000おち○ぽいっぱい突いて、あたしのおま○こイかせてぇっ<emoji=heart04><emoji=heart04>」"
translation = "「그럼 가게 해줘<emoji=heart04> 가게 해줘<emoji=heart04> 당신의 자지로 가게 해줘<emoji=heart04> 자지 잔뜩 찔러서, 내 보지 가게 해줘어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パテルの声に応え、全力でラストスパートをかける。"
translation = "파텔의 목소리에 응하며, 전력으로 라스트 스퍼트를 올린다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふぁああ～～～っ<emoji=heart04><emoji=heart04>\u3000んぁ<emoji=heart04>\u3000あ<emoji=heart04>\u3000おち○ぽで、おま○こぐちゃぐちゃにされてるぅっ<emoji=heart04>\u3000力任せに、ズンズンされて<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000ああんっ<emoji=heart04>」"
translation = "「후아아아～～～앗<emoji=heart04><emoji=heart04> 응아<emoji=heart04> 아<emoji=heart04> 자지로, 보지 엉망진창으로 만들어지고 있어어<emoji=heart04> 힘으로 막, 즈응즈응 들어와서<emoji=heart04> 하아<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ズポズポ、ズポズポって、いっぱい出し入れされてっ<emoji=heart04>\u3000うぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイきそうっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イッちゃうぅっ<emoji=heart04>」"
translation = "「즈포즈포, 즈포즈포하고, 잔뜩 넣었다 뺐다 당해서<emoji=heart04> 우아<emoji=heart04> 아<emoji=heart04> 보지 가버릴 것 같아<emoji=heart04> 가<emoji=heart04> 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んんっ！？\u3000あたしの中で、おち○ぽドクドクしてっ<emoji=heart04>\u3000爆発しそうっ<emoji=heart04>\u3000あなたも、イキそうなのっ？」"
translation = "「응읏!? 내 안에서, 자지가 두근두근거려서<emoji=heart04> 폭발할 것 같아<emoji=heart04> 당신도, 갈 것 같아?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「うん、一緒にイこっ<emoji=heart04>\u3000はぁはっ──はぁ──ああぁんっ<emoji=heart04>\u3000一緒に、イキたいっ<emoji=heart04>\u3000はぁ、はっ──あっ、んんんっ<emoji=heart04>」"
translation = "「응, 같이 가자<emoji=heart04> 하아하──하아──아아앙<emoji=heart04> 같이, 가고 싶어<emoji=heart04> 하아, 하──앗, 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パテルの奥めがけて上から打ち付ける。"
translation = "파텔의 안쪽을 향해 위에서 내리친다."

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮を叩く度に強烈な快楽が走り、射精欲が限界まで高まって──"
translation = "귀두가 자궁을 때릴 때마다 강렬한 쾌락이 달려, 사정욕이 한계까지 높아져서──"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ──んん～～っ<emoji=heart04><emoji=heart04>\u3000あたしの中で、おち○ぽビクビクしているの、気持ちいいっ<emoji=heart04>\u3000おち○ぽいいよぉっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아──응으～～읏<emoji=heart04><emoji=heart04> 내 안에서, 자지가 파르르 떨고 있는 거, 기분 좋아<emoji=heart04> 자지 너무 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あっ──あっ──来る、来るっ<emoji=heart04>\u3000おま○こイクイク、イッちゃうっ<emoji=heart04><emoji=heart04>\u3000おま○こイッくぅっ<emoji=heart04>」"
translation = "「앗──앗──온다, 온다아<emoji=heart04> 보지 가버려 가버려, 가버렷<emoji=heart04><emoji=heart04> 보지 가버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「出して<emoji=heart04>\u3000出して<emoji=heart04>\u3000出してぇっ<emoji=heart04>\u3000あたしの奥に<emoji=heart04>\u3000あなたのせーえき注いで<emoji=heart04>\u3000あたしの子宮、イかせてぇええっ<emoji=heart04><emoji=heart04>」"
translation = "「내보내 줘<emoji=heart04> 내보내 줘<emoji=heart04> 내보내 줘어<emoji=heart04> 내 안쪽 깊숙이<emoji=heart04> 당신의 정액 부어줘<emoji=heart04> 내 자궁, 가게 해줘어어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふぁあああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あつ、いっ──んっ──んん～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 뜨거, 워──응──응으～～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「奥で、ビュクビュクって……あぁんっ<emoji=heart04>\u3000せーえき、来てる……はぁはっ──はっ──ひぁああ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「안쪽에서, 뷰큭뷰큭하고…… 아앙<emoji=heart04> 정액, 오고 있어…… 하아하──하──히아아아～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パテルの膣に深くペニスを沈ませ、奥の奥に精を注ぎ込む。"
translation = "파텔의 질에 깊숙이 페니스를 가라앉히고, 안쪽의 안쪽에 정을 쏟아붓는다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「子宮に、おち○ぽぐりぐりって押し付けながら、射精されてっ<emoji=heart04>\u3000たくさん……熱いの、広がってるぅ……<emoji=heart04>」"
translation = "「자궁에, 자지 그리그리하고 밀어붙이면서, 사정당해서<emoji=heart04> 잔뜩…… 뜨거운 거, 퍼지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はあぁっ、はぁっ……んん<emoji=heart04>\u3000ビュー、ビューって注がれて……あなたの赤ちゃんの素、あたしの中に……んっ……染み込んでくる……<emoji=heart04>」"
translation = "「하아아, 하아…… 응으<emoji=heart04> 뷰우, 뷰우하고 쏟아져서…… 당신의 아기 씨, 내 안으로…… 응…… 스며들어 와……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "女の体の本能か、精液を欲しがるように膣壁がぎゅっと締め付けてくる。"
translation = "여자의 몸의 본능인지, 정액을 원하는 것처럼 질벽이 꽉 조여 온다."

[[dialogue]]
speaker = "unk"
original = "小さな膣にきつく絞られ、神経が焼けるような快感に包まれながら射精を続ける。"
translation = "작은 질에 강하게 조여지며, 신경이 타는 듯한 쾌감에 휩싸인 채 사정을 계속한다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふああぁ、はあ……<emoji=heart04>\u3000まだ、出てる……んっ……はあぁ<emoji=heart04>\u3000たくさん、注がれて、お腹いっぱいに、なるぅ……<emoji=heart04>」"
translation = "「후아아, 하아……<emoji=heart04> 아직, 나오고 있어…… 응…… 하아아<emoji=heart04> 잔뜩, 부어져서, 배가 가득 차버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パテルの小さな体に体重をかけながら亀頭を子宮に密着させ、とうとう精を注ぎ切った。"
translation = "파텔의 작은 몸에 체중을 실으면서 귀두를 자궁에 밀착시키고, 마침내 정을 다 쏟아냈다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ……おち○ぽ、抜けちゃったぁ……<emoji=heart04>\u3000はーっ、はーっ……すごい、おま○こからせーえき溢れてる……こんなに出してくれたんだ……<emoji=heart04>」"
translation = "「아…… 자지, 빠져버렸다……<emoji=heart04> 하아, 하아…… 굉장해, 보지에서 정액이 넘쳐흐르고 있어…… 이렇게나 많이 내보내 준 거구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「お腹の中、まだ熱いや。あなたのがあたしの子宮に溜まってる……<emoji=heart04>」"
translation = "「뱃속, 아직 뜨거워. 당신 게 내 자궁에 고여 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ちなみにこの体、義体じゃないからね？\u3000こんなに出したら孕んじゃうかもしれないよ？\u3000こんな小さな体にたくさん出しちゃって……もう、エッチ<emoji=heart04>」"
translation = "「참고로 이 몸, 의체가 아니거든? 이렇게 많이 싸버리면 임신해버릴지도 몰라? 이런 작은 몸에 잔뜩 싸버리고…… 정말, 에치<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "疲れでぐったりしながらも、パテルが満足げな表情で俺を見上げる。"
translation = "피로로 축 늘어지면서도, 파텔이 만족스러운 표정으로 나를 올려다본다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「これがエッチ……生殖行為なんだね。これも生きるってこと。体を手に入れるまで知らなかったよ」"
translation = "「이게 에치…… 생식 행위구나. 이것도 살아있다는 것. 몸을 얻기 전까지는 몰랐어」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「さっきは恥ずかしいことたくさん言っちゃったけど、悪い気はしないかな」"
translation = "「아까는 부끄러운 말 잔뜩 해버렸지만, 기분이 나쁘지는 않으려나」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「前も言ったけど、あなたのこと嫌いじゃない……ていうかけっこう好きだから、その……」"
translation = "「전에도 말했지만, 당신을 싫어하지 않아…… 아니, 꽤 좋아하니까, 그……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「またエッチしたくなったら、相手してほしいな。……ダメ？」"
translation = "「다시 에치하고 싶어지면, 상대해 줬으면 좋겠어. ……안 돼?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろんいいよ。いいに決まってる」"
translation = "「물론 되지. 당연히 되고말고」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「エヘヘ……約束だよ？」"
translation = "「에헤헤…… 약속이야?」"

[[dialogue]]
speaker = "unk"
original = "愛おしい気持ちが胸から溢れるのを感じながら、照れくさそうにはにかむパテルを抱き締めたのだった。"
translation = "사랑스러운 감정이 가슴에서 넘쳐흐르는 것을 느끼며, 수줍게 미소 짓는 파텔을 꼬빡 껴안았다."

