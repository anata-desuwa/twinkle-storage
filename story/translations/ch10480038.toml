[[dialogue]]
speaker = "unk"
original = "休日を翌日に控えた、とある放課後。ここのところ星徒会の仕事が忙しく、俺は残業で居残っていた。"
translation = "휴일을 하루 앞둔 어느 방과 후. 요 근래 성도회의 업무가 바빠 나는 잔업으로 남아 있었다."

[[dialogue]]
speaker = "unk"
original = "マムが遠回しな言い方ながらも、俺の家に泊まるかも？\u3000という示唆をしていたので、久しぶりにエッチなことを期待していたのだが、すっかり夜遅くなってしまった。"
translation = "마무가 돌려 말하는 식이었지만 나의 집에서 자고 갈지도? 라는 암시를 했기에 오랜만에 야한 일을 기대하고 있었지만, 어느덧 밤늦은 시간이 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "ようやく残業が終わりＤＩＳＣで連絡を入れるも、既読表示のまま返事は無く、もしかして怒らせてしまっただろうかと不安になっていた時――"
translation = "겨우 잔업이 끝나 DISC로 연락을 넣었지만 읽음 표시만 뜬 채 답장이 없어, 혹시 화나게 한 건 아닐까 불안해하고 있을 때――"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「会長、待ちくたびれたわよ……！」"
translation = "「회장, 기다리다 지쳤어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム！？\u3000そんな速攻で来るほど怒ってるんですか！？」"
translation = "「마무!? 그렇게 빛의 속도로 올 정도로 화나신 건가요!?」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「は？\u3000別に怒ってないわよ。それより、早く行くわよ！」"
translation = "「하? 딱히 화 안 났어. 그것보다 빨리 가자!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？\u3000行くってどこに……？」"
translation = "「에? 가다니 어디를……?」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「黙りなさい。舌を噛むわよ」"
translation = "「조용히 하렴. 혀 깨물라.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「って、ちょっ！？\u3000お姫様抱っこ！？\u3000――おわあぁぁぁ～～～っ！？」"
translation = "「아니, 잠깐!? 공주님 안기!? ――으와아아아아아~~!?」"

[[dialogue]]
speaker = "unk"
original = "まさに竜に攫われる姫がごとく、俺は星徒会室から宵闇の空へと連れ去られてしまい――"
translation = "그야말로 용에게 납치되는 공주처럼 나는 성도회실에서 초저녁 하늘로 끌려가 버렸고――"

[[dialogue]]
speaker = "unk"
original = "連れて行かれた場所は、なんと街中にあるラブホテルであった。"
translation = "끌려간 장소는 놀랍게도 시내에 있는 러브호텔이었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅうっ<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 후우우윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぷにっと柔らかく綺麗な肌を晒したマムは、顔をほんのり紅潮させ、息も既に荒いように見える。"
translation = "말랑하고 부드러운 고운 피부를 드러낸 마무는 얼굴을 살짝 붉히고 숨도 이미 거친 것처럼 보인다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女がベッドで仰向けになりながら、誘うような色香を帯びた視線を向けてくるという扇情的な光景に、俺はごくりと生唾を飲み込みつつ尋ねる。"
translation = "그런 그녀가 침대에 대자로 누워 유혹하는 듯한 색기를 띤 시선을 보내는 선정적인 광경에, 나는 꿀꺽 침을 삼키며 묻는다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――いつもより『発情』しているように見えるって？\u3000ええ、そうよっ……！」"
translation = "「――평소보다 『발정』해 있는 것처럼 보인다고? 그래, 맞아……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ここのところお互い忙しくて、全然セックスできてなかったでしょう？\u3000だから……すごく溜まってるのよっ<emoji=heart04>\u3000ふうぅっ！」"
translation = "「요 근래 서로 바빠서 전혀 섹스하지 못했잖아? 그러니까…… 엄청 쌓여있단 말이야!<emoji=heart04> 후우우!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁぁっ<emoji=heart04>\u3000それに今日はあなたの残業が長引いて、焦らされたから余計に――って、そんな細かいことはいいから！\u3000ほら、さっさと始めるわよっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 게다가 오늘은 당신 잔업이 길어져서 애가 탔더니 더더욱―― 아니, 그런 세세한 건 됐으니까! 자, 어서 시작하자고!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムは両手の指を秘部に添えて、くぱぁっ<emoji=heart04>\u3000と淫猥に開いて見せながら言う。"
translation = "마무는 양손 손가락을 비부에 대고 쿠파아<emoji=heart04> 하고 음란하게 벌려 보이면서 말한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「命令よ<emoji=heart04>\u3000貴方の魔王おち○ぽ――畏怖を持って、ドラゴンおま○こに挿入なさいっ……！」"
translation = "「명령이야<emoji=heart04> 당신의 마왕 자지―― 경외심을 갖고 드래곤 보지에 삽입하렴……!」"

[[dialogue]]
speaker = "unk"
original = "そんな据え膳を目の前に差し出されてしまっては、忙しさで性欲を溜め込んだペニスが問答無用でガチガチに勃起してしまう。"
translation = "그런 진수성찬을 눈앞에 들이대니 바쁜 탓에 성욕을 꾹꾹 눌러 담았던 페니스가 문답무용으로 빳빳하게 발기하고 만다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……！\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000熱々のおち○ぽ、当たってる<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……はあぁっ……！」"
translation = "「응……! 앗<emoji=heart04> 안<emoji=heart04> 뜨거운 자지가 닿고 있어<emoji=heart04> 응<emoji=heart04> 후우…… 하아……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「って、何してるの？\u3000膣穴はそこじゃないわよ？\u3000んんっ……ふうぅっ<emoji=heart04>\u3000――えっ？\u3000しっかり濡らして、準備してから？」"
translation = "「아니, 뭐 하는 거야? 질 구멍은 거기가 아니라고? 응…… 후우<emoji=heart04> ――엣? 듬뿍 적셔서 준비하고 나서?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000もうっ<emoji=heart04>\u3000焦れったいわね<emoji=heart04>\u3000いつもより愛液が溢れてるの、見ればわかるでしょ？\u3000はあぁあっ、んんぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 정말<emoji=heart04> 감질나게 하네<emoji=heart04> 평소보다 애액이 넘쳐흐르는 거 보면 알잖아? 하아아, 응윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方のおち○ぽだって、もうそんなに大きくなっているんだから、さっさと欲望のまま突っ込みなさいっ<emoji=heart04>」"
translation = "「당신 자지도 벌써 그렇게 커졌으니까 어서 욕망대로 쑤셔 박으렴!<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ……はあぁあっ<emoji=heart04>\u3000この私がいいと言っているんだから、ほら早くっ……<emoji=heart04>」"
translation = "「응…… 하아아<emoji=heart04> 이 내가 괜찮다고 하니까 자, 빨리……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？\u3000腰が勝手に……！」"
translation = "「!? 허리가 멋대로……!」"

[[dialogue]]
speaker = "unk"
original = "見えない何かに腰を掴まれて、引き寄せれるような感覚に襲われる。これはおそらく、マムの能力――"
translation = "보이지 않는 무언가에 허리를 붙잡혀 끌려가는 듯한 감각에 휩싸인다. 이것은 아마도 마무의 능력――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「散々待たされたんだから、『引力操作』で挿れちゃうわよ……！」"
translation = "「한참 기다리게 했으니까 『인력 조작』으로 넣어버릴 거야……!」"

[[dialogue]]
speaker = "unk"
original = "そのまま俺のペニスは、竜に丸飲みされるように――"
translation = "그대로 나의 페니스는 용에게 통째로 삼켜지듯이――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ――<emoji=heart04><emoji=heart04>」"
translation = "「응윽――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ<emoji=heart04><emoji=heart04>\u3000――んああああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ、入ってきたあぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아<emoji=heart04><emoji=heart04> ――응아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04> 자지 들어온다아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ……！\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんっ……！\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하아<emoji=heart04> 후우……! 앗<emoji=heart04> 응윽<emoji=heart04> 응아<emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 응윽……! 응윽<emoji=heart04> 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はああぁっ<emoji=heart04>\u3000久しぶりの魔王おち○ぽ<emoji=heart04>\u3000すっごく効くぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ……！\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んふうぅ～っ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 오랜만의 마왕 자지<emoji=heart04> 엄청 잘 들어와<emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 후우……! 응윽<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 응후우~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「これっ<emoji=heart04>\u3000この快感がずっと欲しかったのぉっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000感じるわっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんぅっ……！」"
translation = "「이거야<emoji=heart04> 이 쾌감을 계속 원했어어<emoji=heart04> 응<emoji=heart04> 후우<emoji=heart04> 하아아<emoji=heart04> 느껴져<emoji=heart04> 안<emoji=heart04> 응<emoji=heart04> 응윽……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「おち○ぽの角度、もっと上向きに動かしなさいっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「자지 각도, 더 위쪽으로 움직이렴!<emoji=heart04> 응윽<emoji=heart04> 앗<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はマムの引力操作に引っ張られて、腰が勝手に動いてしまう。"
translation = "나는 마무의 인력 조작에 이끌려 허리가 멋대로 움직이고 만다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んああぁぁっ<emoji=heart04><emoji=heart04>\u3000そこっ<emoji=heart04>\u3000そこよっ<emoji=heart04>\u3000おま○このＧスポットぉっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「응아아아<emoji=heart04><emoji=heart04> 거기<emoji=heart04> 거기야<emoji=heart04> 보지의 G스팟으으으<emoji=heart04><emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 후우<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もっと<emoji=heart04>\u3000もっと強く刺激しなさいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「더<emoji=heart04> 더 강하게 자극하렴!<emoji=heart04> 안<emoji=heart04> 응윽<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んあああぁっ<emoji=heart04>\u3000いいっ<emoji=heart04>\u3000そこ効くわっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「응아아아<emoji=heart04> 좋아<emoji=heart04> 거기 잘 느껴져<emoji=heart04> 응<emoji=heart04> 안<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「極太カリでゴリゴリ引っかかれて、おま○こキュンキュンするぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000んふうぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「굵직한 귀두로 고리고리 긁혀서 보지가 큥큥거려어<emoji=heart04> 앗<emoji=heart04> 하아<emoji=heart04> 후아아<emoji=heart04> 응후우~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くあぁっ……！\u3000マムのおま○こ、すごいっ！」"
translation = "「크악……! 마무의 보지, 굉장해!」"

[[dialogue]]
speaker = "unk"
original = "膣内のひだがそれぞれまるで別の生き物のように蠢き、俺のペニスにじゅぷじゅぷと卑猥な水音を立てながらしゃぶりついて来る。"
translation = "질 내의 주름들이 각각 마치 별개의 생물처럼 꿈틀거리며, 나의 페니스를 쥬퓩쥬퓩 비속한 물소리를 내며 빨아들인다."

[[dialogue]]
speaker = "unk"
original = "『ミミズ千匹』ならぬ『千頭千尾の竜』の舌で舐め回されているかのような快楽に、俺のペニスは勃起状態から更にガチガチに膨張してしまう。"
translation = "『지렁이 천 마리』가 아닌 『천두천미의 용』의 혀에 핥아지는 듯한 쾌락에 나의 페니스는 발기 상태에서 더욱 빳빳하게 팽창한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>\u3000魔王おち○ぽ、美味しそうに膨らんで<emoji=heart04>\u3000でき上がって来たわねっ<emoji=heart04>\u3000ドラゴンおま○こで、全部食べてあげるわ<emoji=heart04>\u3000はぁああんっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 마왕 자지, 맛있게 부풀어서<emoji=heart04> 다 됐네<emoji=heart04> 드래곤 보지로 전부 먹어줄게<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「行くわよっ<emoji=heart04>\u3000んんっ――<emoji=heart04><emoji=heart04>」"
translation = "「간다아<emoji=heart04> 응윽――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐっと更に強く引っ張られ、俺のペニスはマムの一番奥まで飲み込まれる。"
translation = "훅 하고 더욱 강하게 끌어당겨져 나의 페니스는 마무의 가장 깊은 곳까지 삼켜진다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んふううぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ子宮口に、どちゅって来たあぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응후우우우우우~~<emoji=heart04><emoji=heart04><emoji=heart04> 자지 자궁구에 도츗하고 왔다아앙<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응아<emoji=heart04> 응후<emoji=heart04> 후아<emoji=heart04> 응윽<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ほらっ<emoji=heart04>\u3000貴方のおち○ぽ、食べちゃうわよっ<emoji=heart04>\u3000出し入れするのに合わせて、膣をきゅっと締めてあげるっ！\u3000んんんっ<emoji=heart04><emoji=heart04>」"
translation = "「자<emoji=heart04> 당신 자지 먹어버릴 거야<emoji=heart04> 넣었다 뺐다 하는 거에 맞춰서 질을 꽉 조여줄게! 응응윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「バキュームフェラするみたいに、きゅっ、きゅっ、きゅうぅ～って<emoji=heart04>\u3000はぁああんっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んうぅっ……！\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふうぅ～っ<emoji=heart04>」"
translation = "「바큠 펠라 하듯이 꽉, 꽉, 꽈아악~ 하고<emoji=heart04> 하아아앙<emoji=heart04> 후우<emoji=heart04> 응윽……! 앗<emoji=heart04> 응윽<emoji=heart04> 응후우~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンする毎に、強烈な快楽の波に襲われて、俺は思わず喘ぎ声を上げてしまう。"
translation = "피스톤을 할 때마다 강렬한 쾌락의 파도가 덮쳐와 나는 나도 모르게 신음 소리를 내고 만다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あんっ<emoji=heart04>\u3000おち○ぽ突っ込むたびに、挿れた以上に吸い込まれていくみたいでっ<emoji=heart04>\u3000おま○こに食べられちゃってる、みたいでしょぅ？\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 자지 박을 때마다 넣은 것 이상으로 빨려 들어가는 것 같아서<emoji=heart04> 보지에게 먹히고 있는 것 같지이? 응<emoji=heart04> 하아<emoji=heart04> 응윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ただ膣締めするんじゃなくてっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000リズミカルにやるのがコツなのよっ<emoji=heart04>\u3000ほら、もっと激しく突きなさいっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「그냥 질을 조이는 게 아니라<emoji=heart04> 안<emoji=heart04> 리드미컬하게 하는 게 요령이야<emoji=heart04> 자, 더 격렬하게 찌르렴!<emoji=heart04> 하앙<emoji=heart04> 응윽<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "強い快楽に飲み込まれ、揉まれた俺のペニスは、あっという間に我慢できなくなってしまう。"
translation = "강한 쾌락에 집어삼켜지고 비벼진 나의 페니스는 순식간에 참을 수 없게 되어버린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、このままだとすぐに出ちゃう……！」"
translation = "「마무, 이대로라면 금방 나와버려……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000いいわよっ<emoji=heart04>\u3000そのまま理性溶かして、一滴残らず精液ぶちまけなさいっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응윽<emoji=heart04> 좋아<emoji=heart04> 그대로 이성 녹여서 한 방울도 남김없이 정액 쏟아내렴!<emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ドラゴンおま○こで全部、飲み込んであげるっ<emoji=heart04>\u3000ほらっ<emoji=heart04>\u3000出しちゃいなさいっ<emoji=heart04>\u3000ふううぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「드래곤 보지로 전부 삼켜줄게<emoji=heart04> 자! 싸버리렴!<emoji=heart04> 후우우웅<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マムは引力操作でピストンを促すだけじゃなく、更には自分の腰を器用に揺すり始める。"
translation = "그렇게 말하며 마무는 인력 조작으로 피스톤을 재촉할 뿐만 아니라, 더 나아가 자신의 허리를 기묘하게 흔들기 시작한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んうぅっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふうぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응윽<emoji=heart04> 훙<emoji=heart04> 훙<emoji=heart04> 응윽<emoji=heart04> 응후<emoji=heart04> 하아<emoji=heart04> 응<emoji=heart04> 훙<emoji=heart04> 훙<emoji=heart04> 응후우~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うああぁっ！\u3000マム、もうダメだ！\u3000出るっ！！！」"
translation = "「으아아악! 마무, 이제 안 돼! 나온다!!!」"

[[dialogue]]
speaker = "unk"
original = "俺は我慢できず、勢いよく射精してしまった。"
translation = "나는 참지 못하고 기세 좋게 사정하고 말았다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000熱い精液、子宮に来たああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 뜨거운 정액, 자궁에 왔다아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んああぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふうぅっ！\u3000どぴゅどぴゅって、中にいっぱい感じるぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아<emoji=heart04> 응윽<emoji=heart04> 후우! 도퓩도퓩하고 안에 가득 느껴져어<emoji=heart04> 하아<emoji=heart04> 응<emoji=heart04> 응우우~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "前回のセックスから自慰もせずに溜め込んでいた精液が、とめどなく吐き出され、マムのおま○こに飲み込まれていく。"
translation = "지난 섹스 이후 자위도 하지 않고 쌓아두었던 정액이 끊임없이 뿜어져 나와 마무의 보지 속으로 빨려 들어간다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はああぁ～っ<emoji=heart04>\u3000中出しの熱さ、子宮に効くうぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아~<emoji=heart04> 질내사정의 뜨거움, 자궁에 잘 들어와아~~~<emoji=heart04><emoji=heart04><emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 후우~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、長く続いた射精も終わりを迎えるが――"
translation = "이윽고 길게 이어진 사정도 끝을 맞이하지만――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하아<emoji=heart04> 응윽<emoji=heart04> 후우<emoji=heart04> 앗<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムは引力操作を止めることなく、俺のピストンを継続させる。"
translation = "마무는 인력 조작을 멈추지 않고 나의 피스톤을 지속시킨다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、マム！？\u3000ちょっと待って！\u3000イったばかりなのにっ……！」"
translation = "「마, 마무!? 잠깐만! 방금 쌌는데……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふうぅっ<emoji=heart04>\u3000何をもう、終わったかのように言っているのかしらっ？\u3000んんぅっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「후우<emoji=heart04> 뭘 벌써 끝난 것처럼 말하는 걸까? 응윽<emoji=heart04> 안<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「この私を差し置いてっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000１人で果てるなんてっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000畏怖が足りてないわよっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んうぅんっ<emoji=heart04>」"
translation = "「이 나를 제쳐두고<emoji=heart04> 아아앙<emoji=heart04> 혼자 가버리다니<emoji=heart04> 후우<emoji=heart04> 경외심이 부족하네<emoji=heart04> 응<emoji=heart04> 응후<emoji=heart04> 응윽응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、マムは自身の腰を８の字グラインドさせ始める。"
translation = "그렇게 말하면서 마무는 자신의 허리를 8자 모양으로 그라인드하기 시작한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんぅっ<emoji=heart04>\u3000ほらほら、これ好きでしょっ<emoji=heart04>\u3000んん～っ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응윽<emoji=heart04> 자자, 이거 좋아하지?<emoji=heart04> 응응~<emoji=heart04> 하아<emoji=heart04> 응후우~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "引力操作で自身の腰の動きをアシストすることで高速で行える、絶えずランダムな角度からペニスに快楽を与え続ける８の字グラインド。"
translation = "인력 조작으로 자신의 허리 움직임을 어시스트함으로써 고속으로 행해지는, 끊임없이 랜덤한 각도에서 페니스에 쾌락을 주는 8자 그라인드."

[[dialogue]]
speaker = "unk"
original = "強制ピストンと合わせた予測不能、回避不可能な快楽に、俺は堪らず大きく喘ぎ声を上げてしまう。"
translation = "강제 피스톤과 합쳐진 예측 불능, 회피 불가능한 쾌락에 나는 견디지 못하고 크게 신음 소리를 내버린다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁっ<emoji=heart04>\u3000休んでないで、さっさと自分でも腰を振りなさいっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000魔王おち○ぽっ<emoji=heart04>\u3000ほらぁっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 쉬지 말고 어서 스스로도 허리를 흔드렴!<emoji=heart04> 후우<emoji=heart04> 마왕 자지!<emoji=heart04> 자아!<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000絶倫の癖に大きくするのが遅いわよっ<emoji=heart04>\u3000まだ畏怖が足りてないようねっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우<emoji=heart04> 절륜한 주제에 크게 만드는 게 늦네<emoji=heart04> 아직 경외심이 부족한 모양이구나<emoji=heart04> 아아<emoji=heart04> 하아<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ほらっ、頭が高いわよっ<emoji=heart04>\u3000畏怖をもって跪きなさいっ<emoji=heart04>」"
translation = "「자, 머리가 높구나<emoji=heart04> 경외심을 갖고 무릎 꿇으렴!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "更なる引力操作で、俺は頭を下げさせられると――"
translation = "더욱 강력한 인력 조작으로 나는 머리를 숙이게 되었고――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんぅ～～っ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응윽~~<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の顔に引き寄せられ、そのまま唇を奪われる。"
translation = "그녀의 얼굴로 끌려가 그대로 입술을 빼앗긴다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んむぅっ<emoji=heart04>\u3000ちゅっ……んちゅっ<emoji=heart04>\u3000ちゅぱっ……ちゅむっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅれるっ<emoji=heart04>\u3000れろれろっ……れろちゅっ<emoji=heart04>\u3000ちゅるっ……ちゅるるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>」"
translation = "「응무<emoji=heart04> 쪽…… 응쪽<emoji=heart04> 쪽파…… 쪽무<emoji=heart04> 쪽푸푸…… 츌렐<emoji=heart04> 레로레로…… 레로쪽<emoji=heart04> 츌릅…… 츌르르<emoji=heart04> 쪽파<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅむぅっ<emoji=heart04>\u3000ちゅむむっ……ちゅるっ<emoji=heart04>\u3000れろちゅっ……ちゅぱっ……ぷはぁっ<emoji=heart04>\u3000はあぁっ……んふっ<emoji=heart04>\u3000やっと元通りに大きくなったっ<emoji=heart04>」"
translation = "「쪽무우<emoji=heart04> 쪽무무…… 츌릅<emoji=heart04> 레로쪽…… 쪽파…… 푸하<emoji=heart04> 하아…… 응후<emoji=heart04> 겨우 원래대로 커졌네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスを終えて離れた舌同士の間に、淫靡に光る糸の橋が架かる。"
translation = "키스를 마치고 떨어진 혀 사이로 음란하게 빛나는 실 다리가 놓인다."

[[dialogue]]
speaker = "unk"
original = "以前マムに教えて貰ったことがあるが、発情した竜の唾液には、相手を同じく発情させる効果があるという。"
translation = "이전에 마무에게 들은 적이 있는데, 발정한 용의 타액에는 상대를 똑같이 발정시키는 효과가 있다고 한다."

[[dialogue]]
speaker = "unk"
original = "それによって、俺は射精する前よりもむしろ体が熱くなって、ペニスも更に大きく隆起してしまっていた。"
translation = "그 덕분에 나는 사정하기 전보다 오히려 몸이 뜨거워지고 페니스도 더욱 크게 융기해 있었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふうぅっ<emoji=heart04>\u3000私もそろそろ、限界っ……！\u3000本気でイキたくなって来たわっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「후우<emoji=heart04> 나도 슬슬 한계……! 진심으로 가고 싶어졌어!<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「だから、今度は私の番よっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000畏怖をもって、全力でぶち犯してあげるから、覚悟なさいっ……！」"
translation = "「그러니까 이번에는 내 차례야!<emoji=heart04> 하아<emoji=heart04> 경외심을 갖고 전력으로 범해줄 테니 각오하렴……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「行くわよっ――それっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다아―― 에잇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000――ふああああああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んふううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04><emoji=heart04><emoji=heart04> ――후아아아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 응윽<emoji=heart04> 안<emoji=heart04> 응아<emoji=heart04> 응후우우~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムは引力操作で、俺の腰を激しくピストンさせ始める。"
translation = "마무는 인력 조작으로 나의 허리를 격렬하게 피스톤시키기 시작한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんぅっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あふぅんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んんぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응윽<emoji=heart04><emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 아훙<emoji=heart04> 앗<emoji=heart04> 하아<emoji=heart04> 후아아<emoji=heart04> 훙<emoji=heart04> 훙<emoji=heart04> 응윽~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "更に彼女自身の腰も揺すり、快楽を貪っていく。"
translation = "더욱이 그녀 자신의 허리도 흔들며 쾌락을 탐한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はああぁ～っ<emoji=heart04><emoji=heart04>\u3000いいわっ<emoji=heart04>\u3000これ気持ちいいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000おま○こ気持ちいいぃっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아~<emoji=heart04><emoji=heart04> 좋아<emoji=heart04> 이거 기분 좋아<emoji=heart04> 안<emoji=heart04> 응아<emoji=heart04> 보지 기분 좋아아<emoji=heart04><emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ<emoji=heart04>\u3000いいっ<emoji=heart04>\u3000魔王おち○ぽもっとっ<emoji=heart04>\u3000もっと奥を突きなさいっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んはぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 좋아<emoji=heart04> 마왕 자지 더<emoji=heart04> 더 깊은 곳을 찌르렴!<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응윽<emoji=heart04> 은하<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んあああぁっ<emoji=heart04><emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとよっ<emoji=heart04><emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000んんうぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아<emoji=heart04><emoji=heart04> 기분 좋아<emoji=heart04> 더<emoji=heart04> 더어!<emoji=heart04><emoji=heart04> 하아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 응응우우우~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、俺のペニスはこれまでで最も強烈な快楽に飲み込まれて、堪らず叫んでしまった。"
translation = "다음 순간 나의 페니스는 지금까지 중 가장 강렬한 쾌락에 휩싸여 나도 모르게 비명을 질렀다."

[[dialogue]]
speaker = "unk"
original = "それは、マムがここまでに見せた、おま○こによるバキュームフェラのような締め付けと、高速８の字グラインドの合わせ技だった。"
translation = "그것은 마무가 지금까지 보여준 보지에 의한 바큠 펠라 같은 조임과 고속 8자 그라인드의 합작이었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んふううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000これが竜の本気交尾よっ<emoji=heart04>\u3000快楽の前に、畏怖を持って跪きなさいっ<emoji=heart04>」"
translation = "「응후우우~~~<emoji=heart04><emoji=heart04><emoji=heart04> 이것이 용의 본기 교미야!<emoji=heart04> 쾌락 앞에 경외심을 갖고 무릎 꿇으렴!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000んうぅっ<emoji=heart04><emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふううぅっ<emoji=heart04>\u3000んんううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하아아<emoji=heart04> 응윽<emoji=heart04><emoji=heart04> 아아앙<emoji=heart04> 응후<emoji=heart04> 응아아아<emoji=heart04> 하아아<emoji=heart04> 안<emoji=heart04> 후우우<emoji=heart04> 응응우우우~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もはや絶技と言うべきマムの腰使いに、俺はみるみる射精感が限界に達してしまう。"
translation = "그야말로 절기라고 불러야 할 마무의 허리 놀림에 나의 사정감은 순식간에 한계에 도달한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、ダメだ！\u3000こんなのまたすぐにイっちゃう！」"
translation = "「마무, 안 돼! 이런 거 또 금방 가버려!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>\u3000ダメよっ<emoji=heart04>\u3000私がイクまで我慢なさいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000んふぅうっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 안 돼<emoji=heart04> 내가 갈 때까지 참으렴!<emoji=heart04> 안<emoji=heart04> 하아앙<emoji=heart04> 응후우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムが水着フォームで習得した『言葉の引力』で、俺は今にもイキそうだったところを『射精止め』させられてしまう。"
translation = "마무가 수영복 폼으로 습득한 『말의 인력』 때문에 나는 금방이라도 쌀 것 같았던 것을 『사정 저지』당하고 만다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「このまま限界まで激しくするわよっ<emoji=heart04>\u3000んんん――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이대로 한계까지 격렬하게 할 거야!<emoji=heart04> 응응응――!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04><emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000んふうぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안<emoji=heart04> 안<emoji=heart04> 하아앙<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아아<emoji=heart04> 응윽<emoji=heart04><emoji=heart04> 훙<emoji=heart04> 훙<emoji=heart04> 응아아<emoji=heart04> 응후우~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、これ以上は無理だっ！\u3000お願いだからイかせてっ！！」"
translation = "「마무, 더 이상은 무리야! 제발 싸게 해줘!!」"

[[dialogue]]
speaker = "unk"
original = "俺は射精したくて堪らずに、もはや引力操作関係なく腰を全力で振りながら、マムに懇願する。"
translation = "나는 사정하고 싶어 견딜 수 없어 이제 인력 조작과 상관없이 허리를 전력으로 흔들며 마무에게 간청한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「仕方ないわねっ<emoji=heart04>\u3000いいわよ、一滴残らず全部ぶちまけなさいっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04><emoji=heart04>\u3000んふぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「어쩔 수 없네<emoji=heart04> 좋아, 한 방울도 남김없이 전부 쏟아내렴!<emoji=heart04><emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 응윽<emoji=heart04><emoji=heart04> 응후<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04><emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んはあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 아아앙<emoji=heart04> 응아<emoji=heart04><emoji=heart04> 안<emoji=heart04> 응후<emoji=heart04><emoji=heart04> 훙<emoji=heart04> 훙<emoji=heart04> 은하아<emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 응윽~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ほら、言葉の引力を解放するわよっ<emoji=heart04>\u3000出せっ<emoji=heart04><emoji=heart04>\u3000出せ出せ出せっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자, 말의 인력을 해방할게!<emoji=heart04> 싸라!<emoji=heart04><emoji=heart04> 싸라 싸라 싸라!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くうぅっ！\u3000マム、もう出るっ！！！」"
translation = "「쿠우윽! 마무, 이제 나온다!!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あああああああっ<emoji=heart04>\u3000私もイクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아악<emoji=heart04> 나도 가<emoji=heart04><emoji=heart04> 가 가 가 가 가!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다아――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「イックうううぅぅぅ―――――――――っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어―――――――――!<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아~~~~~~~~~~~~~~~~~~!<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムが絶頂した瞬間、射精止めが解除され、俺は堰き止められた射精欲を彼女の中に全てぶちまけた。"
translation = "마무가 절정에 달한 순간 사정 저지가 해제되었고, 나는 막혀있던 사정욕을 그녀의 안에 전부 쏟아부었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000熱々の精液、また入って来たあああぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はああぁぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아<emoji=heart04><emoji=heart04><emoji=heart04> 뜨거운 정액, 또 들어왔다아아아아~~~~<emoji=heart04><emoji=heart04><emoji=heart04> 하아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふあああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000１回目よりも、もっとすごい勢いで子宮に注がれてるぅ～<emoji=heart04>\u3000はああぁ～っ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아~~~<emoji=heart04><emoji=heart04> 1회차보다 훨씬 굉장한 기세로 자궁에 부어지고 있어어~<emoji=heart04> 하아아~<emoji=heart04> 응아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んふうぅ～～～っ<emoji=heart04><emoji=heart04>\u3000魔王精子で、ドラゴン子宮、征服されちゃうぅ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응후우~~~<emoji=heart04><emoji=heart04> 마왕 정자로 드래곤 자궁 정복당해버려어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先程よりも更に長く続いた射精がようやく止まり、俺はペニスをゆっくりと引き抜く。"
translation = "아까보다 더욱 길게 이어진 사정이 겨우 멈추고, 나는 페니스를 천천히 뽑아낸다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁんっ……<emoji=heart04><emoji=heart04>」"
translation = "「하앙……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "未だ余韻に浸って恍惚とした表情を浮かべるマムのドラゴンおま○こから、２度の大量射精で入りきらなかった精液が溢れて、滴り落ちる。"
translation = "아직 여운에 젖어 황홀한 표정을 짓는 마무의 드래곤 보지에서 두 번의 대량 사정으로 다 들어가지 못한 정액이 넘쳐흘러 뚝뚝 떨어진다."

[[dialogue]]
speaker = "unk"
original = "そのことに征服欲を満たされながら、俺は彼女に声をかける。"
translation = "그 모습에 정복욕을 채우며 나는 그녀에게 말을 건다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、少し落ち着いた？」"
translation = "「마무, 조금 진정됐어?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……ええ……。問題ないわ……。でも……」"
translation = "「응…… 에에……. 문제없어……. 하지만……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長、今日のことは忘れなさい」"
translation = "「회장, 오늘 일은 잊으렴.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？\u3000どうして？」"
translation = "「에? 어째서?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そんなこと、レディにわざわざ言わせるんじゃないわよ……。わかるでしょ、察しなさい」"
translation = "「그런 걸 숙녀에게 굳이 말하게 하지 마……. 알잖아, 눈치껏 행동하렴.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は、マムの新しい一面が見られて嬉しかったけど。マムは気持ち良くなかった？」"
translation = "「나는 마무의 새로운 일면을 볼 수 있어서 기뻤는데. 마무는 기분 좋지 않았어?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方ね……」"
translation = "「당신 정말……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そんなこと言ってると……今日のセックス、むしろ忘れられないくらい激しくしちゃうわよ？」"
translation = "「그런 소릴 하면…… 오늘 섹스, 오히려 잊을 수 없을 만큼 격렬하게 해버릴 거야?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そのまま……ドラゴンおま○こで貴方のおち○ぽ、丸呑みにしちゃうくらい<emoji=heart04>」"
translation = "「그대로…… 드래곤 보지로 당신 자지, 통째로 삼켜버릴 만큼<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいや、最後にはマムを征服してみせるよ。今日こそ、マムを孕ませてみせるから」"
translation = "「아니, 마지막에는 마무를 정복해 보이겠어. 오늘이야말로 마무를 임신시켜 보일 테니까.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……ふふっ、毎回、度胸だけは一丁前ね。なら――畏怖を持って挑んできなさい<emoji=heart04>」"
translation = "「……후후, 매번 배짱 하나는 두둑하네. 그럼―― 경외심을 갖고 덤벼보렴<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イエス・マム。……愛してます」"
translation = "「예스 마무. ……사랑합니다.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000……わざわざ言わなくても知ってるわよ。仕方ないから、私も特別に言ってあげるわ――」"
translation = "「응<emoji=heart04> ……굳이 말하지 않아도 알고 있어. 어쩔 수 없으니까 나도 특별히 말해줄게――」"

[[dialogue]]
speaker = "unk"
original = "すると、彼女は引力操作で俺の顔を引き寄せると、耳元で小さく囁く。"
translation = "그러자 그녀는 인력 조작으로 나의 얼굴을 끌어당기더니 귓가에 작게 속삭인다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「愛してるわよ、会長<emoji=heart04>」"
translation = "「사랑해, 회장<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、お預けしていた日数以上に、何度も激しい情欲を燃え上がらせてしまう俺たちなのであった――"
translation = "그 후로 미뤄두었던 날수 이상으로 몇 번이고 격렬한 정욕을 불태우게 되는 우리였다――"

