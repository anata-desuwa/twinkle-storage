[[dialogue]]
speaker = "unk"
original = "星霊祭前日。学園内のボルテージは最高潮に達しようとしていた。"
translation = "성령제 전날. 학원 내의 열기는 최고조에 달하려 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "その中でも、ひときわ熱くなっているのが──"
translation = "그중에서도 유독 뜨거워지고 있는 것은――"

[[dialogue]]
speaker = "unk"
original = "フラン率いる応援団だ。"
translation = "프란이 이끄는 응원단이다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ついに明日から星霊祭だ！\u3000みんな、気合入ってるなー！！？」"
translation = "「드디어 내일부터 성령제다! 모두, 기합 들어가 있나―!!?」"

[[dialogue]]
speaker_original = "応援団員"
speaker_translation = "응원단원"
original = "「おーーーーっ！！！」"
translation = "「오―옷!!!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「星霊祭前日にもかかわらず、我が応援団に頼もしい仲間が加わってくれたぜ！」"
translation = "「성령제 전날임에도 불구하고, 우리 응원단에 든든한 동료가 합류해 주었다!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ミルフィー・インセントです……よ、よろしくお願いしまーす……」"
translation = "「밀피 인센트입니다…… 잘, 부탁드립니다……」"

[[dialogue]]
speaker = "unk"
original = "よろしくお願いします！"
translation = "잘 부탁드립니다!"

[[dialogue]]
speaker = "unk"
original = "ミルフィーは新調したチア衣装、俺は黒の学ランで応援団に加わる。"
translation = "밀피는 새로 맞춘 치어 의상, 나는 검은색 교복을 입고 응원단에 합류한다."

[[dialogue]]
speaker_original = "応援団員"
speaker_translation = "응원단원"
original = "「おーーーーっ！！！」"
translation = "「오―옷!!!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「大歓迎ムードなのは嬉しいんだけど……」"
translation = "「대환영 분위기인 건 기쁘지만……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「昨日、決めたばかりなのに、なんでもう私用のチアガール衣装が用意されてるのー！？」"
translation = "「어제 막 결정했을 뿐인데, 왜 벌써 나만을 위한 치어걸 의상이 준비되어 있는 거야―!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「２人の衣装はうちが一晩で用意しました。いえーい」"
translation = "「두 사람의 의상은 내가 하룻밤 만에 준비했지. 예이」"

[[dialogue]]
speaker = "unk"
original = "シゴデキがすぎる"
translation = "일 처리가 너무 뛰어나다"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「美鶴ちゃんっ！？\u3000私の衣装、他のチアのみんなよりも、その、なんていうか……セ、セクシーじゃない！？」"
translation = "「미츠루짱!? 내 의상, 다른 치어 멤버들보다, 그, 뭐라고 해야 할까…… 세, 섹시하지 않아!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いやいや、ミルフィーパイセンの肉感は押し出していかないと」"
translation = "「아니아니, 밀피 선배의 육감은 밀어붙여야죠」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「肉感って言わないで～っ！」"
translation = "「육감이라고 하지 마―!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「これでも初期デザインから露出は減らしたんだけどね」"
translation = "「이것도 초기 디자인에서 노출을 줄인 건데」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「初期デザインを見るのが怖いよ！？」"
translation = "「초기 디자인을 보는 게 무서워!?」"

[[dialogue]]
speaker = "unk"
original = "どんなデザインだったか気になる……"
translation = "어떤 디자인이었는지 궁금하다……"

[[dialogue]]
speaker = "unk"
original = "俺とミルフィーは応援団に加わり、先に加入していた美鶴とともに応援指導を受ける。"
translation = "나와 밀피는 응원단에 합류하여, 먼저 가입해 있던 미츠루와 함께 응원 지도를 받는다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「腕はもっと大きく振るんだーっ！\u3000競技中の選手に遠くからでも見えるようにアピールするんだぞー！」"
translation = "「팔은 더 크게 휘두르는 거다―! 경기 중인 선수에게 멀리서도 보이도록 어필하는 거다!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「がんばれがんばれ、し・ん・せ・い」"
translation = "「힘내라 힘내라, 시·인·성」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「負けるな負けるな、し・ん・せ・い<emoji=heart04>」"
translation = "「지지 마라 지지 마라, 시·인·성<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レッツゴーレッツゴー、し・ん・せ・い！"
translation = "렛츠고 렛츠고, 시·인·성!"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「さすが、３人とも筋がいいぜ！\u3000星霊祭の期間だけじゃなく、正式に入団してほしいくらいだ！」"
translation = "「역시, 세 사람 모두 감각이 좋군! 성령제 기간뿐만 아니라, 정식으로 입단해 줬으면 할 정도다!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、それはちょっと……学級委員だから、やることいろいろあるし、会長くんも、ねえ？」"
translation = "「그, 그건 좀…… 학급 위원이라, 할 일도 많고, 회장군도, 그렇지?」"

[[dialogue]]
speaker = "unk"
original = "会長職があるからね"
translation = "회장직이 있으니까"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちも既にお断りした通りね」"
translation = "「나도 이미 거절한 대로야」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「そっか。いやぁ、ほんとに残念だ」"
translation = "「그런가. 이야, 정말 아쉽다」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「さてと、そろそろ練習ばかりじゃなくて、実際に応援の声を届けてみようぜ！\u3000ミルフィー！\u3000会長！\u3000チア・オーラを高めておけよ！」"
translation = "「자, 이제 슬슬 연습만 하지 말고, 실제로 응원의 목소리를 전해 보자! 밀피! 회장군! 치어 오라를 높여 둬!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「チア・オーラって何！？\u3000初耳だよ！？」"
translation = "「치어 오라가 뭔데!? 처음 듣는데!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「気にしないでいいよ。なんとなくで」"
translation = "「신경 쓰지 않아도 돼. 그냥 대충」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あいたたたた……転ぶのも今日で６回目だワン……どうして上手くコントロールできないんだろう……」"
translation = "「아얏얏얏…… 넘어지는 것도 오늘로 여섯 번째다 멍…… 왜 능숙하게 컨트롤할 수 없을까……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「たまにゃ曲がれるようになって、なんぼかマシになってきたけどよぉ……本番は一発勝負。一度でも派手に転んじまったら、おしめえだ」"
translation = "「가끔은 꺾을 수 있게 돼서, 그나마 나아지긴 했지만…… 실전은 단판 승부. 한 번이라도 크게 넘어져 버리면, 끝장이다」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うぅぅ……今からプレッシャーかけないで──あれ？\u3000誰かこっちに来る……？」"
translation = "「으으으…… 지금부터 압박 주지 마―어라? 누가 이쪽으로 오는데……?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「なんでえ、あの団体さんは……応援団か？」"
translation = "「뭐냐, 저 단체는…… 응원단인가?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ヒヨちゃーん、カティアちゃーん！」"
translation = "「히요짱―, 카티아짱―!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あの破廉恥な服を着てるのは──姐さんじゃねえかっ！\u3000いけねえ、いけねえよ……！\u3000あんなに可愛かったら野郎どもが勘違いしちまう……！」"
translation = "「저 파렴치한 옷을 입고 있는 건― 누님 아니냐! 안 돼, 안 된다고……! 저렇게 귀여우면 남자들이 착각해 버린다고……!」"

[[dialogue]]
speaker = "unk"
original = "カティア、練習は捗ってる？"
translation = "카티아, 연습은 잘 되고 있어?"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様ーっ！\u3000わざわざ来てくださって、どうしたんですか？」"
translation = "「마왕님―! 일부러 와주셔서, 무슨 일이세요?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「頑張ってる選手を、応援してあげよーと思ってさ。ま、うちはオマケね」"
translation = "「열심히 하는 선수를, 응원해 주려고. 뭐, 나는 덤이지만」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「本番前の必勝祈願だ！\u3000いくぞ、おまえらーっ！」"
translation = "「실전 전의 필승 기원이다! 간다, 너희들―!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おおおーーーっ」"
translation = "「오오오―옷」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「おおおーーーっ！！」"
translation = "「오오오―옷!!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「新星学園のぉおぉぉぉーーーっ！\u3000勝利を願ってぇえぇぇぇぇぇーーーっ！！」"
translation = "「신성 학원의오오오오오―옷! 승리를 기원하며에에에에에에―옷!!」"

[[dialogue]]
speaker = "unk"
original = "フレーッ、フレーッ！\u3000カ・ティ・ア！"
translation = "프레―잇, 프레―잇! 카·티·아!"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「……魔王様ぁ！」"
translation = "「……마왕님아!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「フレーッ、フレーッ、ヒ・ヨ・ちゃ・ん！」"
translation = "「프레―잇, 프레―잇, 히·요·짱!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さんっ……！」"
translation = "「누님……!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「フレッフレッ、新星っ。フレッフレッ、新星っ！」"
translation = "「프레잇 프레잇, 신성. 프레잇 프레잇, 신성!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「絶対勝利だぁああぁぁぁぁーーーーっ！！！」"
translation = "「절대 승리다아아아아아아―옷!!!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふうっ、ふうっ……！\u3000どう、私たちの応援、伝わった？」"
translation = "「후우, 후우……! 어때, 우리의 응원, 전해졌어?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あ、あ、あじがどうごじゃいまずぅううっ！」"
translation = "「가, 가, 감사합니다아아아앗!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うわ、汗と涙でべちゃべちゃ」"
translation = "「우와, 땀과 눈물로 엉망진창이네」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「私っ、私っ……すごく感動しぢゃっでぇーっ！\u3000嬉しいですっ！\u3000本当に！\u3000もう絶対頑張らなきゃってぇ！」"
translation = "「저, 저…… 너무 감동해 버려저어―옷! 기쁩니다! 정말로! 이제 절대 열심히 해야겠다고오!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「へへっ、胸の奥がカーッと熱くなって、力が湧いてきたぜぇ。今のあたしは百人力よぉ！」"
translation = "「헤헷, 가슴속이 화끈하게 뜨거워지고, 힘이 솟아난다. 지금의 나는 백인분이야!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレらの想い、伝わったみたいだな！」"
translation = "「우리들의 마음, 전해진 것 같군!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はいっ！\u3000ちょっと転んだくらいで、めげてらんないです！\u3000ヒヨ、もうひとっ走りするガオ！」"
translation = "「네! 조금 넘어졌다고, 기죽어 있을 수 없어요! 히요, 한 번 더 달려요 갸오!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ひとっ走りと言わず、いくらでも付き合ってやんぜ、ワン公！」"
translation = "「한 번 더 달리는 것뿐만 아니라, 얼마든지 상대해 주마, 멍멍이!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「皆さん、本当にありがとうございます！\u3000行っくぞガオガオガオガオー！！」"
translation = "「여러분, 정말 감사합니다! 간다 갸오갸오갸오갸오―!!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「だからってあんま張り切りすぎんじゃねぇや！\u3000すぐ調子に乗るんだからよぉ！」"
translation = "「그렇다고 너무 기합 넣지 마! 금방 우쭐해지니까!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「２人ともちょっと思いつめた顔してたけど、元気になったね。よきよき」"
translation = "「두 사람 다 조금 침울한 표정이었는데, 기운을 차렸네. 좋네 좋아」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「良かった……ありがとう、フランさん」"
translation = "「다행이다…… 고마워, 프란 씨」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「なんでオレに礼を言うんだよ。２人を元気づけたのは、オレじゃなくって会長とミルフィーだ」"
translation = "「왜 나한테 고맙다고 하는 거야. 두 사람을 기운 나게 한 건, 내가 아니라 회장군과 밀피다」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「２人の声が、やる気を奮い起こしたんだ。加入初日にして、もう立派な応援団だな！」"
translation = "「두 사람의 목소리가, 의욕을 북돋운 거야. 가입 첫날인데, 벌써 훌륭한 응원단이군!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「んもぉ……フランさん、上手いなぁ……」"
translation = "「정말…… 프란 씨, 말을 잘하네……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「でも私の声援で、みんなが元気になってくれるのって……ちょっと気持ちいい、かも……<emoji=heart04>」"
translation = "「하지만 내 성원으로, 모두가 기운을 얻는다는 게…… 조금 기분 좋은, 걸……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「練習はキツくて大変だけど、クセになっちゃうのも、わかる気がするな……」"
translation = "「연습은 힘들고 어렵지만, 중독되는 것도, 알 것 같은 기분이 드네……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ちょい悔しいけど、同感」"
translation = "「조금 분하지만, 동감」"

[[dialogue]]
speaker = "unk"
original = "──この後。"
translation = "―이후."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「マ、マジか……やったじゃねぇか、ワン公！」"
translation = "「마, 말도 안 돼…… 해냈잖아, 멍멍이!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「やった……やったーっ！\u3000スピードの向こう側が見えたワン！」"
translation = "「해냈다…… 해냈어―옷! 스피드의 저편이 보였다 멍!」"

[[dialogue]]
speaker = "unk"
original = "カティアは一度も転ぶことなく、見事、過去最速タイムを叩き出したのだった。"
translation = "카티아는 한 번도 넘어지지 않고, 멋지게 과거 최속 기록을 세웠다."

[[dialogue]]
speaker = "unk"
original = "ついに明日は星霊祭が開幕する。"
translation = "드디어 내일은 성령제가 개막한다."

[[dialogue]]
speaker = "unk"
original = "土壇場で仕上がった学園対抗リレー選抜チーム。"
translation = "벼락치기로 완성된 학원 대항 계주 선발팀."

[[dialogue]]
speaker = "unk"
original = "俺たちは一丸となり、新星学園の勝利を願う……！"
translation = "우리는 하나가 되어, 신성 학원의 승리를 기원한다……!"

