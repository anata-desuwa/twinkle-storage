[[dialogue]]
speaker = "unk"
original = "それは、２人してリゾート結界を訪れていた時のこと──"
translation = "그것은 두 사람이 리조트 결계를 방문했을 때의 일──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ねー会長さん、またオイル塗ってくれない？」"
translation = "「있지─ 회장님, 다시 오일 발라주지 않을래?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「えー。だってこんなの会長さんにしか頼めないしぃ。会長さんだってうちのカラダ……触りたいんじゃないの～？」"
translation = "「에이. 그치만 이런 건 회장님한테밖에 부탁 못 하는걸. 회장님도 내 몸…… 만지고 싶은 거 아니야~?」"

[[dialogue]]
speaker = "unk"
original = "砂浜に敷かれたビニールシートへ、水着のトップを外して寝そべるセーラさん。"
translation = "모래사장에 깔린 비닐 시트에 수영복 상의를 벗고 엎드려 눕는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "仕方なく、以前と同じ要領でオイルを塗り込んでいった……。"
translation = "어쩔 수 없이 이전과 같은 요령으로 오일을 발라 나갔다……."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん──ありがと。でもさ、ひとついい？」"
translation = "「음── 고마워. 근데 말이야, 하나 물어봐도 돼?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「オイル塗ってる最中ー、なんかー……視線をずっと背中に感じてたような気ぃしたんだよねー……？」"
translation = "「오일 바르는 도중에─ 왠지─…… 시선을 계속 등 쪽에 느끼고 있었던 것 같은 기분이 들거든─……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もしかして会長さんが見たかったのは──……こっち？」"
translation = "「설마 회장님이 보고 싶었던 건──…… 이쪽?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker = "unk"
original = "サンオイルを塗っていたうつ伏せの姿勢から、半回転して仰向けになるセーラさん。"
translation = "선오일을 바르고 있던 엎드린 자세에서 반 바퀴 회전해 하늘을 보고 눕는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "こちらに見えるのは、つまり……"
translation = "이쪽에 보이는 것은, 즉……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふっ、一気に目つき変わっちゃって。怖いなあ、会長さん……そんな風に女の子見ちゃダメだよ？\u3000うち以外」"
translation = "「후훗, 단숨에 눈빛이 바뀌어 버렸네. 무서워라, 회장님…… 그런 식으로 여자애를 보면 안 돼? 나 말고는.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「今日は誰もいないから……こーんな風におっぱいオープンにしたって……平気だもんね？\u3000でも、見るだけでだいじょぶそう？」"
translation = "「오늘은 아무도 없으니까…… 이─렇게 가슴을 오픈해도…… 괜찮으니까 말이야? 근데, 보는 것만으로 괜찮겠어?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「スッキリ──させたげよっか？」"
translation = "「시원하게── 해줄까?」"

[[dialogue]]
speaker = "unk"
original = "──こちらは、当然。"
translation = "──이쪽은, 당연히."

[[dialogue]]
speaker = "unk"
original = "その小悪魔の誘惑に、抗う術など持たないのだった──"
translation = "그 소악마의 유혹에 저항할 방법 따위 갖고 있지 않았다──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「たとえば～……こういうのとか？」"
translation = "「예를 들면~…… 이런 거라든가?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふっ、もう期待でむくむくしちゃってるじゃん──まだ挟んでないよ？\u3000大丈夫？\u3000嫌ならやめよっか？」"
translation = "「후훗, 벌써 기대돼서 불끈불끈하고 있잖아── 아직 끼우지도 않았다고? 괜찮아? 싫으면 그만둘까?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あははっ、うそうそ。反応が素直すぎ～<emoji=heart04>\u3000挟んでほしいですって、会長さんの顔に書いてあるもん」"
translation = "「아하핫, 농담이야 농담. 반응이 너무 솔직해~<emoji=heart04> 끼워줬으면 좋겠다고 회장님 얼굴에 써 있는걸.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んー？\u3000へー？\u3000男の夢なの？\u3000そーかそーか。んー、どうしよっかなぁ。別に手でもスッキリはさせてあげられるしぃ……」"
translation = "「응─? 헤에─? 남자의 로망이야? 그렇구나 그렇구나. 음─ 어떡할까나. 딱히 손으로도 시원하게 해줄 수는 있는데에……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふーっ……まだ息吹きかけただけだよ<emoji=heart04>\u3000これだけでびくついちゃうんだ。ふふ、もどかしい？」"
translation = "「후─…… 아직 숨결만 불었을 뿐이야<emoji=heart04> 이것만으로 움찔거려 버리다니. 후후, 감질나?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さんが、水着の上からじーっと見てた、ふよふよのお胸ですよー……？\u3000これで会長さんのおち○ぽ挟んであげたらぁ……どうなっちゃうのかな～？」"
translation = "「회장님이 수영복 위로 빤히 쳐다보던 말랑말랑한 가슴이에요─……? 이걸로 회장님 자지 끼워주면은─…… 어떻게 되려나~?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うふふっ、ごめんごめん。焦らしすぎた？\u3000興奮しすぎて、うちの胸の上でビタビタさせちゃってるじゃん<emoji=heart04>」"
translation = "「우후훗, 미안 미안. 너무 애태웠나? 너무 흥분해서 내 가슴 위에서 펄떡펄떡거리고 있잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「わかったってば、もう。そんなに物欲しそうな顔で見ないでよ、会長さん」"
translation = "「알았다니까, 정말. 그렇게 먹잇감을 찾는 듯한 눈으로 보지 마, 회장님.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「じゃ……しょーがないなぁ。会長さんのご期待にお応えして──よい、しょっと……」"
translation = "「자…… 어쩔 수 없네. 회장님의 기대에 부응해서── 영, 차……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んっ──よっ……と……こう──かな？\u3000んっ……ぁっ……ふふ……っ……<emoji=heart04>\u3000やったことないけど──んっ、ふっ……んっ……<emoji=heart04>」"
translation = "「응─ 영…… 차…… 이렇게── 인가? 응…… 아…… 후후…… 윽……<emoji=heart04> 해본 적은 없지만── 응, 훗…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "左右からハリのある弾力が、肉棒をしっとりと包み込む。"
translation = "좌우에서 탄력 있는 감촉이 육봉을 촉촉하게 감싸 안는다."

[[dialogue]]
speaker = "unk"
original = "そのまま、すべすべした竿から亀頭までに優しい摩擦をもたらした。"
translation = "그대로 매끄러운 기둥부터 귀두까지 부드러운 마찰을 가져다주었다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふっ……どーお？\u3000こ・う・い・う・の……されてみたかったんでしょ？」"
translation = "「후훗…… 어때? 이·런·거…… 받아보고 싶었지?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さん、水着の上からいっつもうちの胸見てくるからさぁ……<emoji=heart04>\u3000ずーっと、期待してんじゃないかなーって思ってたの……<emoji=heart04>」"
translation = "「회장님, 수영복 위로 맨날 내 가슴 쳐다보니까 말이야……<emoji=heart04> 계속, 기대하고 있는 거 아닐까~ 하고 생각했었어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「女の子は──んっ……そういう視線には、敏感なのだよ……ぁっ<emoji=heart04>\u3000んっ……ふぅっ、んっ……それそれ……どーかなー……？」"
translation = "「여자애는──응…… 그런 시선에는 민감하다구……아윽<emoji=heart04> 응…… 후우, 응…… 그거 그거…… 어떠려나~……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んっ……ぅっ……ふぅっ……<emoji=heart04>\u3000んっ……しょ──っと……ふふっ……ぴくぴくしてる──気持ちよくなっちゃってるのかな～？」"
translation = "「응……윽……후우……<emoji=heart04> 응…… 영──차…… 후후…… 파르르 떨고 있어── 기분 좋아져 버린 걸까~?」"

[[dialogue]]
speaker = "unk"
original = "セーラさんとは幾度も体を重ねてきたが、男根でバストを味わうというのは初めての体験だった。"
translation = "세라 씨와는 몇 번이고 몸을 섞어왔지만, 자지로 바스트를 맛본다는 것은 처음 하는 경험이었다."

[[dialogue]]
speaker = "unk"
original = "手とも膣とも異なる、優しくも中毒性のある心地よい刺激。"
translation = "손과도 질과도 다른, 부드러우면서도 중독성 있는 기분 좋은 자극."

[[dialogue]]
speaker = "unk"
original = "胸の谷間──ビーチの日差しでしっとりと汗ばんだ部分──の感触は例えようもなく甘美で、何より視覚的な淫猥さがいつまでも興奮を煽る。"
translation = "가슴 계곡──해변의 햇살로 촉촉하게 땀에 젖은 부분──의 감촉은 비길 데 없이 감미롭고, 무엇보다 시각적인 음란함이 끊임없이 흥분을 부추긴다."

[[dialogue]]
speaker = "unk"
original = "この快感、いつまでも浸っていたい──"
translation = "이 쾌감, 언제까지고 젖어 있고 싶어──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さんの必死な顔──ふふ、可愛いかも♪\u3000うちも──んっ、愛情込めて──ぁっ……ずりずり、してあげるね……っ……<emoji=heart04>」"
translation = "「회장님의 필사적인 얼굴── 후후, 귀여울지도♪ 나도── 응, 애정을 담아서── 아윽…… 비비적비비적, 해줄게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んっ……ふぅっ……んっ、んっ……こんな感じかなー……？\u3000んっ──しょっ……ぁっ……ふふ、すぐぴくついちゃうんだ……かわいい……<emoji=heart04>」"
translation = "「응…… 후우…… 응, 응…… 이런 느낌이려나~……? 응──차…… 아윽…… 후후, 금방 파르르 떨어버리네…… 귀여워……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ふかふかの胸を両側から挟んであげるセーラさん。"
translation = "푹신푹신한 가슴을 양옆에서 끼워 주는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "その中心では、ただ快楽を享受する肉棒が浅ましく脈打っており──"
translation = "그 중심에서는, 그저 쾌락을 향유하는 육봉이 천박하게 맥동하고 있었으며──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もうびっくびく……<emoji=heart04>\u3000フーッ……あは<emoji=heart04>\u3000息、吹きかけてあげたらもっと反応した<emoji=heart04>\u3000体はホント正直だよねぇ……？」"
translation = "「벌써 파르르……<emoji=heart04> 후우── 아하<emoji=heart04> 입김 불어줬더니 더 반응했어<emoji=heart04> 몸은 정말 정직하네……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「──って、あっ！\u3000こら……暴れん坊なんだから。ちゃんとお胸の中に入らなきゃダメでしょ──んっ……ほら……ぁっ、ふぅっ……んっ<emoji=heart04>」"
translation = "「──라니, 앗! 이봐…… 말썽꾸러기라니까. 제대로 가슴 사이에 들어가야 하잖아── 응…… 자아…… 아윽, 후우…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "バストの中にすっかり沈み込んでしまったペニスが、あまりの興奮に反り返って跳ねてしまう。"
translation = "바스트 사이에 완전히 파묻혀 버린 페니스가, 너무나도 큰 흥분에 뒤로 젖혀지며 튀어 오른다."

[[dialogue]]
speaker = "unk"
original = "セーラさんは<b>おいた</b>をしつけるように肉棒を胸の谷間へと引き戻した。"
translation = "세라 씨는 <b>나쁜</b> <b>짓</b>을 훈육하듯 육봉을 가슴 계곡으로 끌어당겼다."

[[dialogue]]
speaker = "unk"
original = "その所作の妖艶さに、肉棒はますます硬度を増していった。"
translation = "그 소리의 요염함에, 육봉은 점점 더 경도를 더해갔다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「こーやって──んっ……しっかり……挟んで……揉んであげて……んっ……<emoji=heart04>\u3000ふぅ……っ……<emoji=heart04>」"
translation = "「이렇──게…… 응…… 꽉…… 끼워서…… 주물러 줄게…… 응……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んっ──ふぅっ……はぁっ……んっ、こうして──こう……で……んっ、ぁっ……どう──？\u3000初チャレンジで自信なさげだったんだけど──うまくできてるかな……？」"
translation = "「응── 후우…… 하아…… 응, 이렇게── 이렇……게…… 응, 아윽…… 어때──? 첫 도전이라 자신 없어 보였는데── 잘하고 있으려나……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「なんて……ぁっ<emoji=heart04>\u3000会長さんの反応見れば、聞くまでもないか……<emoji=heart04>\u3000今にも出そうなくらい、どくどくしてる……っ……<emoji=heart04>」"
translation = "「라니…… 아윽<emoji=heart04> 회장님의 반응을 보면, 물을 필요도 없나……<emoji=heart04> 금방이라도 나올 것처럼, 울컥울컥하고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "圧迫感さえ覚える柔肌のサンドイッチ。"
translation = "압박감마저 느껴지는 부드러운 살결의 샌드위치."

[[dialogue]]
speaker = "unk"
original = "このまま肉棒が埋もれて溶けてしまうのではと思うほど、とろけるような快感がいつまでも押し寄せてくる。"
translation = "이대로 육봉이 파묻혀 녹아버리는 게 아닐까 싶을 정도로, 녹아내리는 듯한 쾌감이 끊임없이 밀려온다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んっ──ふぅっ……ぅっ……はぁ、はぁ……<emoji=heart04>\u3000よしよし──んっ……コツ、掴んできたかも……んっ、ふぅっ──<emoji=heart04>\u3000は、ぁっ……<emoji=heart04>」"
translation = "「응── 후우…… 윽…… 하아, 하아……<emoji=heart04> 착하지 착해── 응…… 요령, 잡았을지도…… 응, 후우──<emoji=heart04> 하, 아윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「こう──ぎゅって、おっぱいでおち○ちん捕まえてぇ……そのまま、引っ張るくらいにして──んっ……<emoji=heart04>\u3000へへ、どう……？\u3000気持ちいいっしょ……？」"
translation = "「이렇게── 꽉, 가슴으로 자지를 붙잡고서…… 그대로, 잡아당길 정도로 해서── 응……<emoji=heart04> 헤헤, 어때……? 기분 좋지……?」"

[[dialogue]]
speaker = "unk"
original = "なんでも飲み込みのいいセーラさんらしく、すぐにパイズリの要領を掴まれてしまった。"
translation = "뭐든 습득이 빠른 세라 씨답게, 금방 파이즈리의 요령을 터득해 버렸다."

[[dialogue]]
speaker = "unk"
original = "弾力を活かした、ギュッと仕留めるような圧の強さに思わず達しかける。"
translation = "탄력을 살린, 꽉 옥죄는 듯한 압력의 강함에 나도 모르게 가버릴 뻔한다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ぁ……おち○ちんの先っぽから、透明なの出てきてる……<emoji=heart04>\u3000いいよー……そのまま──んっ……<emoji=heart04>\u3000うちが──気持ちよく、したげるから……ぁっ……<emoji=heart04>」"
translation = "「아…… 자지 끝부분에서, 투명한 거 나오고 있어……<emoji=heart04> 좋아~…… 그대로── 응……<emoji=heart04> 내가── 기분 좋게, 해줄 테니까…… 아윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ほらほら──ぁっ……<emoji=heart04>\u3000我慢しなくていいんだよ──っ……おっぱい大好きな会長さん……<emoji=heart04>\u3000んっ、しょっ……ふぅっ……んっ……<emoji=heart04>」"
translation = "「자아 자아── 아윽……<emoji=heart04> 참지 않아도 돼──…… 가슴을 정말 좋아하는 회장님……<emoji=heart04> 응, 영차…… 후우…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だが、そうしてもたらされる快感が強ければ強いほど、もどかしさもまた募っていく。"
translation = "하지만, 그렇게 주어지는 쾌감이 강하면 강할수록, 애달픔 또한 더해져 간다."

[[dialogue]]
speaker = "unk"
original = "気持ちいい。このままでも十分に気持ちいいが──"
translation = "기분 좋다. 이대로도 충분히 기분 좋지만──"

[[dialogue]]
speaker = "unk"
original = "浅ましい自分は片時の我慢もならず、セーラさんに嘆願した。"
translation = "천박한 자신은 잠시의 참음도 견디지 못하고, 세라 씨에게 간청했다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん……？\u3000自分でも動きたい──？\u3000いいよ……<emoji=heart04>」"
translation = "「응……? 직접 움직이고 싶어──? 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちに負担がないか気になる……？\u3000ふふっ、いいからそんなの──会長さんが、ケモノみたいになってくれる方が、うち的には嬉しいし……<emoji=heart04>」"
translation = "「나한테 부담이 되지 않을까 걱정돼……? 후후, 괜찮으니까 그런 건── 회장님이, 짐승처럼 되어주는 게, 내 입장에서는 더 기쁘고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちの方は大丈夫だから……<emoji=heart04>\u3000好きに動いて……<emoji=heart04>\u3000先輩として、さ……受け止めてあげるから──思いっきり……んっ……甘えちゃえ……っ……<emoji=heart04>」"
translation = "「나는 괜찮으니까……<emoji=heart04> 마음대로 움직여……<emoji=heart04> 선배로서, 말이야…… 받아줄 테니까── 마음껏…… 응…… 어리광 부려버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "既に女体へ乗っかるという支配的な体勢になっている自分だったが、それでも欲求をこらえきれなかった。"
translation = "이미 여체 위에 올라탄 지배적인 태세가 되어 있었지만, 그럼에도 욕구를 억누를 수 없었다."

[[dialogue]]
speaker = "unk"
original = "この味わい深い快感をもっともっと摂取したくて、荒々しく腰を振り始める──"
translation = "이 깊은 맛의 쾌감을 더 많이 섭취하고 싶어서, 거칠게 허리를 흔들기 시작한다──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「──ぁぁっ！\u3000んっ、ぁっ、はぁっ……！\u3000すご──ふふ、もう我慢できなくなっちゃってる……<emoji=heart04>\u3000んっ、んんっ──ぁっ、ふぅっ……！」"
translation = "「──아아윽! 응, 아윽, 하아……! 굉장── 후후, 벌써 못 참게 되어버렸네……<emoji=heart04> 응, 으응── 아윽, 후우……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ぁっ、んっ──すご──おっぱいとセックス、してるみたい……<emoji=heart04>\u3000うちも、勘違いしちゃいそう──ぁっ、んぅっ、ふぅっ……っ……<emoji=heart04>」"
translation = "「아윽, 응── 굉장해── 가슴이랑 섹스, 하고 있는 것 같아……<emoji=heart04> 나도, 착각해 버릴 것 같아── 아윽, 응으윽, 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちのおっぱい──んっ……そんなに気持ちいいわけ……？\u3000っ、ぁっ、ふっ……目の前までおち○ちん迫ってきて──ぁっ、ヤバ……<emoji=heart04>」"
translation = "「내 가슴── 응…… 그렇게 기분 좋은 거야……? 윽, 아윽, 후…… 눈앞까지 자지가 다가와서── 아윽, 위험해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こちらもピストンを開始すると、もたらされる快感は倍増した。"
translation = "이쪽에서도 피스톤을 시작하자, 주어지는 쾌감은 배가 되었다."

[[dialogue]]
speaker = "unk"
original = "滑らかな肌の心地よさはそのままに、汗ばんだ谷間に締めつけられる刺激が竿全体に伝わる。"
translation = "매끄러운 피부의 기분 좋음은 그대로, 땀에 젖은 계곡에 조여지는 자극이 성기 전체에 전달된다."

[[dialogue]]
speaker = "unk"
original = "少し揺するだけ、のつもりだったが、増幅した快感に魅入られてしまい、つい本番さながらの勢いで腰を振ってしまう。"
translation = "조금 흔들기만 할 생각이었지만, 증폭된 쾌감에 매료되어, 그만 실전 못지않은 기세로 허리를 흔들고 만다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いいよ──ぁっ、んぅっ……<emoji=heart04>\u3000うちのカラダ好きにして──ぁっ、気持ちよく、なっちゃえ……<emoji=heart04>\u3000んっ、ふぅっ、ぅっ──……！」"
translation = "「좋아── 아윽, 응으윽……<emoji=heart04> 내 몸 마음대로 해── 아윽, 기분 좋게, 되어버려……<emoji=heart04> 응, 후우, 윽──……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もうとろとろだし──ぁっ、んぅっ……ぁっ<emoji=heart04>\u3000はぁ、はぁ──っ……んっ、はぁっ……んぁっ！\u3000んっ、んんっ──！\u3000ぁっ、はぁっ、んぁぁっ……っ……<emoji=heart04>」"
translation = "「벌써 걸쭉걸쭉하고── 아윽, 응으윽…… 아윽<emoji=heart04> 하아, 하아── 응, 하아…… 응아윽! 응, 으응──! 아윽, 하아, 응아아윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "辛抱ならず先走ったカウパー液が、ぽたぽたとセーラさんの白い鎖骨のくぼみに垂れていった。"
translation = "참지 못하고 흘러나온 정자가, 뚝뚝 세라 씨의 하얀 쇄골 오목한 곳에 떨어졌다."

[[dialogue]]
speaker = "unk"
original = "また、その一方で、彼女にも変化が生じていたのに気づいており──"
translation = "또한, 그 한편으로 그녀에게도 변화가 생기고 있다는 것을 깨달았는데──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ぇ……？\u3000うちも──乳首触りながら、気持ちよくなってる……？\u3000んもうっ──いいでしょ、それくらい……っ……<emoji=heart04>\u3000んっ、はぁっ……<emoji=heart04>」"
translation = "「에……? 나도── 유두 만지면서, 기분 좋아지고 있어……? 정말── 괜찮잖아, 그 정도는……<emoji=heart04> 응, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「間近で……目の前で……んっ、こんな立派な──あっ、男の子の部分、見せられてたら……<emoji=heart04>\u3000匂いだって……すごいし……っ……んっ……<emoji=heart04>」"
translation = "「가까이서…… 눈앞에서…… 응, 이런 훌륭한── 앗, 남자애 부분, 보여지고 있으면……<emoji=heart04> 냄새도…… 대단하고…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちだって、女なんだから……ぁっ……<emoji=heart04>\u3000こんな、えっちぃことしてたら──ぁっ……興奮するに、決まってんじゃん……っ……！\u3000ぁっ、んんっ──<emoji=heart04>」"
translation = "「나도, 여자니까…… 아윽……<emoji=heart04> 이런, 에로한 짓 하고 있으면── 아윽…… 흥분하는 게, 당연하잖아……! 아윽, 으응──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさんは胸を挟むように揉みながら、自らの乳首をも<b>こりこり</b>とつまんで性的な快感を得ていた。"
translation = "세라 씨는 가슴을 끼워 주무르면서, 자신의 유두 또한 <b>꼬집꼬집</b> 비틀며 성적인 쾌감을 얻고 있었다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はぁ、はぁ──んっ、んぅっ……ぁっ<emoji=heart04>\u3000う、うちのことは──ぁっ、いいから──ぁっ……<emoji=heart04>\u3000会長さんは──気持ちよくなってれば、いいの──っ……<emoji=heart04>」"
translation = "「하아, 하아── 응, 응으윽…… 아윽<emoji=heart04> 내, 나는── 아윽, 괜찮으니까── 아윽……<emoji=heart04> 회장님은── 기분 좋아지고 있으면, 돼──……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んぁっ──はぁっ、んぅっ……！\u3000ふーっ、ふーっ……ぁっ……このアングル──っ、やっぱ、すご……ぁっ、んぁっ、んんぅぅっ……<emoji=heart04>\u3000ぁっ<emoji=heart04>」"
translation = "「응아윽── 하아, 응으윽……! 후우, 후우…… 아윽…… 이 앵글── 역시, 굉장…… 아윽, 응아윽, 응으으윽……<emoji=heart04> 아윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ネイルを立てないよう、器用に指の腹で乳頭を刺激するセーラさん。"
translation = "손톱을 세우지 않도록, 능숙하게 손가락 끝으로 유두를 자극하는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "貪欲に女としての快楽を得ようとするその様は、ギャルの皮に隠された雌の本性を見るかのようで──"
translation = "탐욕스럽게 여자로서의 쾌락을 얻으려 하는 그 모습은, 갸루의 껍질에 숨겨진 암컷의 본성을 보는 것 같아서──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ぁっ──んぁっ！\u3000はぁっ──んっ、ふぅっ……<emoji=heart04>\u3000ぁっ、また激しくなって──ぁっ、んぁっ、んぅっ！\u3000ぁっ、はぁっ、んんぁっ<emoji=heart04>」"
translation = "「아윽── 응아윽! 하아── 응, 후우……<emoji=heart04> 아윽, 또 격렬해져서── 아윽, 응아윽, 응으윽! 아윽, 하아, 응아아윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んっ──……<emoji=heart04>\u3000あっ、もっと……腰の振り、早くなった……<emoji=heart04>\u3000ふふっ、イキたいの──会長さんっ……？\u3000んっ──<emoji=heart04>\u3000ぁっ──<emoji=heart04>\u3000はぁっ……<emoji=heart04>」"
translation = "「응──……<emoji=heart04> 앗, 더…… 허리 흔드는 거, 빨라졌어……<emoji=heart04> 후후, 가고 싶은 거야── 회장님……? 응──<emoji=heart04> 아윽──<emoji=heart04> 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "<ruby>陰嚢<rt>いんのう</rt></ruby>の奥がどくりと疼いた。"
translation = "음낭 깊은 곳이 욱신거리며 쑤셨다."

[[dialogue]]
speaker = "unk"
original = "圧倒的な快楽の波が、すぐそこにまで迫っている。"
translation = "압도적인 쾌락의 파도가, 바로 저기까지 다가와 있다."

[[dialogue]]
speaker = "unk"
original = "それを必死に絞り出したいと、本能がままに腰を振る──"
translation = "그것을 필사적으로 짜내고 싶다고, 본능이 시키는 대로 허리를 흔든다──"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いいよ──ぁっ、んっ──うちの胸とセックスして──ぁっ、おち○ちんから白いの、ぶちまけちゃえ……っ……<emoji=heart04>\u3000ぁっ、んぁっ！」"
translation = "「좋아── 아윽, 응── 내 가슴이랑 섹스해── 아윽, 자지에서 하얀 거, 쏟아내 버려……<emoji=heart04> 아윽, 응아윽!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はぁ、はぁ、んんん──っ……！\u3000硬くなって──ぁっ、持ち上がった……<emoji=heart04>\u3000んっ、イクんだね──ぁっ、見ててあげる──ぁっ、ふぁぁっ<emoji=heart04>」"
translation = "「하아, 하아, 응응응──……! 딱딱해져서── 아윽, 솟아올랐어……<emoji=heart04> 응, 가는 거구나── 아윽, 봐줄게── 아윽, 후아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさんの体を気遣う余裕もないほどに、快感という快感に急き立てられる。"
translation = "세라 씨의 몸을 배려할 여유도 없을 정도로, 쾌감이라는 쾌감에 내몰린다."

[[dialogue]]
speaker = "unk"
original = "射精したい、射精したい、射精したい──"
translation = "사정하고 싶다, 사정하고 싶다, 사정하고 싶다──"

[[dialogue]]
speaker = "unk"
original = "ただその一心で、彼女のボリューミーなバストをむさぼる。"
translation = "그저 그 일념으로, 그녀의 볼륨감 넘치는 바스트를 탐한다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ぁぁぁっ……んっ、ぁっ、んんんっ──いい、よっ……ぁっ、はぁっ……きて──ぇっ──っ……<emoji=heart04>\u3000ぁっ、んんんんっっっ…………<emoji=heart04><emoji=heart04>」"
translation = "「아아아윽…… 응, 아윽, 응응응── 좋아, 요…… 아윽, 하아…… 와줘── 에윽──……<emoji=heart04> 아윽, 응응응응윽…………<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ぁっ──んああああぁぁぁぁぁぁぁぁぁぁぁぁっっっっっっ……………………<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아윽── 응아아아아아아아아아아아아아아악………………<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "解き放たれる、悦楽──"
translation = "해방되는, 열락──"

[[dialogue]]
speaker = "unk"
original = "意識が遠のくほどの快感が陰茎から脳天までを走り抜け、腰が崩れそうになるのを必死に堪える。"
translation = "의식이 멀어질 정도의 쾌감이 음경에서 정수리까지 달려 나가고, 허리가 무너질 것 같은 것을 필사적으로 견딘다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん──ぅっ……ぁぅ……<emoji=heart04>\u3000はぁ、はぁ──ぁっ……<emoji=heart04>\u3000っ、く──ぅっ……ぅっ、ふぅっ──ぁっ、んぁっ、はぁっ……<emoji=heart04>\u3000ぁ……んっ……<emoji=heart04>」"
translation = "「응──으윽…… 아으……<emoji=heart04> 하아, 하아── 아윽……<emoji=heart04> 윽, 쿠──으윽…… 으윽, 후우── 아윽, 응아윽, 하아……<emoji=heart04> 아…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさんもまた、自らの乳首いじりで軽く達してしまったのか、快楽にのたうつような仕草も見せ。"
translation = "세라 씨 또한, 자신의 유두 만지기로 가볍게 가버린 것인지, 쾌락에 몸부림치는 듯한 몸짓도 보이고."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はぁ……はぁ……んっ……ちょ──すご……んぁっ……出しすぎでしょ、これ……<emoji=heart04>\u3000会長さん……？」"
translation = "「하아…… 하아…… 응…… 잠깐── 굉장해…… 응아윽…… 너무 많이 낸 거 아냐, 이거……<emoji=heart04> 회장님……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちの顔に……全部、かかってるし──もうべとべと……もぉっ……<emoji=heart04>\u3000これどんだけ……いつものエッチより出してない……？\u3000んっ……<emoji=heart04>」"
translation = "「내 얼굴에…… 전부, 묻어 있고── 벌써 끈적끈적…… 정말……<emoji=heart04> 이거 얼마나…… 평소 섹스보다 더 낸 거 아냐……? 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "盛大にぶちまけた精液の波は、そのままセーラさんの端正な顔を汚していた。"
translation = "성대하게 쏟아낸 정액의 물결은, 그대로 세라 씨의 단정한 얼굴을 더럽히고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女にまたがり、自由に胸で肉棒をしごき、最終的には果てた体液を思いきり引っかける──"
translation = "그녀의 위에 올라타, 자유롭게 가슴으로 육봉을 훑고, 최종적으로는 사정한 체액을 마음껏 끼얹는다──"

[[dialogue]]
speaker = "unk"
original = "女体を道具かのように扱った我がままな射精に、背徳的な悦楽を覚える。"
translation = "여체를 도구처럼 다룬 제멋대로인 사정에, 배덕적인 열락을 느낀다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そんなに気持ちよかったなら……んっ……<emoji=heart04>\u3000いいけど……<emoji=heart04>\u3000うわ、まだどくどくいってるし……もぉ……<emoji=heart04>」"
translation = "「그렇게 기분 좋았다면…… 응……<emoji=heart04> 괜찮지만……<emoji=heart04> 우와, 아직도 울컥울컥하고 있고…… 정말……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さん、こんなにおっぱい好きだったんだ……<emoji=heart04>\u3000道理であんなに見つめてくるはずだよね……<emoji=heart04>」"
translation = "「회장님, 이렇게 가슴 좋아했었구나……<emoji=heart04> 어쩐지 그렇게 쳐다본다 했어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そんなことない……？\u3000えー……今さらそんなこと言われても、説得力カイムなんですけど……ねぇ……？」"
translation = "「그렇지 않아……? 에이…… 이제 와서 그런 말 들어도, 설득력 전무(카이무)인데요…… 그치……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま……いいじゃんいいじゃん……会長さんがいくら変態さんでも……<emoji=heart04>」"
translation = "「뭐…… 됐어 됐어…… 회장님이 아무리 변태 씨라도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちがいくらだって……甘えさせてあげちゃうからね……？」"
translation = "「내가 얼마든지…… 어리광 부리게 해줄 테니까 말이야……?」"

[[dialogue]]
speaker = "unk"
original = "この沼からは、とても抜け出せそうにない──"
translation = "이 늪에서는, 도저히 빠져나갈 수 없을 것 같다──"

[[dialogue]]
speaker = "unk"
original = "快楽に浸りながら、おぼろげにそんなことを考えるのだった……。"
translation = "쾌락에 젖어 들며, 어렴풋이 그런 것을 생각하는 것이었다……."

