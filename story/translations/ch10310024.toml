[[dialogue]]
speaker = "unk"
original = "第４話,アニマ・スイートドリーム,P"
translation = "제4화, 아니마 스위트 드림, P"

[[dialogue]]
speaker = "unk"
original = "とある週末、アニマ先輩が俺の家に遊びに来ていた――"
translation = "어느 주말, 아니마 선배가 우리 집에 놀러 와 있었다――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「～～♪\u3000～～～♪」"
translation = "「~~♪ ~~~♪」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――フヒ、よし♪\u3000会長、完成したゾ」"
translation = "「――후히, 좋아♪ 회장, 완성했다구」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言って、キッチンからお皿を持って来る。"
translation = "그녀는 그렇게 말하며 주방에서 접시를 들고 온다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマ特製の煮込みハンバーグだ♪」"
translation = "「아니마 특제 조림 함바그다♪」"

[[dialogue]]
speaker = "unk"
original = "今日は母さんが不在で、代わりにアニマ先輩がお昼ご飯を作ってくれていた。"
translation = "오늘은 엄마가 부재중이라 대신 아니마 선배가 점심밥을 만들어 주고 있었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「リノさんから教わった栄養たっぷりのレシピを元に、更にアニマなりに味も追及してみタ」"
translation = "「리노 씨에게 배운 영양 가득한 레시피를 바탕으로, 아니마 나름대로 맛도 더 추구해 봤다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「って……おや？\u3000会長、アニマをじっと眺めたりして、どうかしたカ？」"
translation = "「그나저나…… 어라? 회장, 아니마를 빤히 쳐다보고 왜 그러나?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――アニマが家で料理をしていると、いつものエプロンがなんだか奥さんっぽいって？」"
translation = "「――아니마가 집에서 요리를 하고 있으니 평소의 앞치마가 왠지 아내 같다고?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000会長、またそんなことを言って……。なら、今日は――」"
translation = "「후히♪ 회장, 또 그런 소리를…… 그럼 오늘은――」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「２人きりだし、アニマと新婚さんごっこでもしてみるカ？\u3000フヒ<emoji=heart04>」"
translation = "「둘뿐이기도 하니 아니마랑 신혼부부 놀이라도 해볼까? 후히<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「おぉう……想像以上の食いつきだゾ<emoji=heart04>\u3000そんなに嬉しかったのカ？」"
translation = "「오오…… 상상 이상의 반응이다구<emoji=heart04> 그렇게 기뻤던 건가?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒっ♪\u3000それじゃあ、早速」"
translation = "「후히♪ 그럼 당장」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長、あ～ん♪」"
translation = "「회장, 아~앙♪」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――さて、お味のほどはいかがカナ？」"
translation = "「――자, 맛은 어떠려나?」"

[[dialogue]]
speaker = "unk"
original = "うまい！"
translation = "맛있어!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうか、それはよかっタ♪\u3000キミの為に作ったから、美味しいと言ってもらえて、すごく嬉しイ<emoji=heart04>」"
translation = "「그런가, 그거 다행이다♪ 너를 위해 만들었으니까 맛있다고 해줘서 정말 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――ナニ？\u3000アニマは料理上手だって？」"
translation = "「――뭐? 아니마는 요리를 잘한다고?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「料理は錬金術と、工程が似ているからナ。とはいえ、本格的に料理を実験するようになったのは、つい最近なのだが」"
translation = "「요리는 연금술과 공정이 비슷하니까 말이지. 그렇긴 해도 본격적으로 요리를 실험하게 된 건 아주 최근의 일이다만」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――フヒ♪\u3000キミと恋人になったからだナ。だって……好きな人には喜んでもらいたいダロウ？」"
translation = "「――후히♪ 너와 연인이 되었기 때문이지. 그야…… 좋아하는 사람에게는 기쁨을 주고 싶을 테니까 말이다?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「というわけで、冷めない内にどんどん召し上がれダ♪\u3000はい、あ～ん♪」"
translation = "「그런 고로 식기 전에 얼른 드시라구♪ 자, 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "それから、アニマ先輩は何度も優しく食べさせてくれるのだった。"
translation = "그 후로 아니마 선배는 몇 번이고 다정하게 먹여주는 것이었다."

[[dialogue]]
speaker = "unk"
original = "食事が終わった後、俺たちはソファーでまったりと過ごしていた。"
translation = "식사가 끝난 후, 우리들은 소파에서 느긋하게 시간을 보내고 있었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ……<emoji=heart04>」"
translation = "「후히……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩はというと、俺の膝の上に座っていた。手を恋人繋ぎにして、それから――"
translation = "아니마 선배로 말할 것 같으면 내 무릎 위에 앉아 있었다. 손을 깍지 껴 잡고 그러고는――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「スリスリ……<emoji=heart04>」"
translation = "「부비부비……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "猫のように俺に頬ずりをして来る。"
translation = "고양이처럼 나에게 볼을 비벼 온다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ん？\u3000どうしたんダ、会長？\u3000くすぐったかったカ？」"
translation = "「응? 왜 그래, 회장? 간지러웠나?」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩、すごく可愛くなりましたよね"
translation = "아니마 선배, 정말 귀여워지셨네요"

[[dialogue]]
speaker = "unk"
original = "もちろん、付き合う前から先輩は可愛かった。しかし最近は更に、可愛さが増して行っている。"
translation = "물론 사귀기 전부터 선배는 귀여웠다. 하지만 최근에는 더욱 귀여움이 더해가고 있다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――アニマから甘くて良い匂いがして、くっ付いてるだけでドキドキしてしまう？」"
translation = "「――아니마에게서 달콤하고 좋은 냄새가 나서 붙어 있는 것만으로도 두근거린다고?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ<emoji=heart04>\u3000キミに相応しい女の子になれるよう、最近は以前よりオシャレに気を遣っているからナ」"
translation = "「후히<emoji=heart04> 너에게 어울리는 여자아이가 될 수 있도록 최근에는 전보다 멋 부리는 데 신경 쓰고 있으니까 말이다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「実はちょっと、アニマ特製のさり気ない香水を使っていたりするんだが、効果あったみたいだナ<emoji=heart04>」"
translation = "「사실 조금 아니마 특제의 은은한 향수를 쓰고 있기도 한데, 효과가 있었던 모양이네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それに、甘えてくれるようになったなって"
translation = "게다가 어리광도 늘었고요"

[[dialogue]]
speaker = "unk"
original = "恋人関係になってからしばらく経つが、アニマ先輩はだんだん慣れてきたというか、どんどん甘えるようになって来て――"
translation = "연인 관계가 된 지 꽤 지났지만, 아니마 선배는 점점 익숙해졌다고 해야 할까, 부쩍 어리광을 부리게 되어서――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「それはキミのせいだゾ？\u3000キミがいつも甘い言葉を囁くから、アニマはすっかりメロメロになってしまったんダ。もはやキミなしではいられない程に」"
translation = "「그건 네 탓이라구? 네가 언제나 달콤한 말을 속삭이니까 아니마는 완전히 홀딱 반해버린 거다. 이제는 네가 없으면 안 될 정도로 말이지」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「おかげで、アニマは夢が１つ増えてしまった」"
translation = "「덕분에 아니마는 꿈이 하나 더 늘어버렸다」"

[[dialogue]]
speaker = "unk"
original = "その夢って……？"
translation = "그 꿈이란 게……?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「前にも言った、魂の根源を明らかにしたいという気持ちは、今も強くある。だが、それと同じくらい……肉体を捨てるのが惜しくなってしまっタ」"
translation = "「전에도 말했듯이 영혼의 근원을 밝히고 싶다는 마음은 지금도 강하게 있다. 하지만 그만큼이나…… 육체를 버리는 게 아까워져 버렸다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「魂だけになってしまうと……キミとの子供が望めないからナ<emoji=heart04>」"
translation = "「영혼만 남게 되면…… 너와의 아이를 바랄 수 없으니까 말이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そ、それって……"
translation = "그, 그건……"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマにとって……キミとの未来が、譲れないくらい大きな夢になったということダ」"
translation = "「아니마에게 있어서…… 너와의 미래가 양보할 수 없을 만큼 커다란 꿈이 되었다는 뜻이다」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩は正面から向き合うように、俺の膝の上で座り直すと――"
translation = "아니마 선배는 정면으로 마주 보듯이 내 무릎 위에서 자세를 고쳐 앉더니――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長……ん……<emoji=heart04>」"
translation = "「회장…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目を閉じ、唇をちょっと突き出して、キスのおねだり。"
translation = "눈을 감고 입술을 살짝 내밀며 키스를 조른다."

[[dialogue]]
speaker = "unk"
original = "ドキドキしながらも理性で抑えていたのに、そんな風に可愛く誘われては、我慢できず。"
translation = "두근거리면서도 이성으로 억누르고 있었는데, 그런 식으로 귀엽게 유혹하면 참을 수 없지."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はアニマ先輩を抱き締めながら、キスをする。"
translation = "나는 아니마 선배를 껴안으며 키스를 한다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちゅっ……んむっ……ちゅっ<emoji=heart04>」"
translation = "「츄…… 음뭇…… 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちゅっ……はあぁ……<emoji=heart04>\u3000ハグしながらのキス、すごくドキドキするゾ<emoji=heart04>」"
translation = "「츄…… 하아아……<emoji=heart04> 허그하면서 하는 키스, 정말 두근거린다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きです、アニマ先輩"
translation = "좋아해요, 아니마 선배"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ん……<emoji=heart04>\u3000アニマも好きダ、会長……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 아니마도 좋아한다, 회장……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマはキミのことを、世界で１番愛してイル<emoji=heart04>」"
translation = "「아니마는 너를 세상에서 제일 사랑한다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩、俺と結婚して下さい"
translation = "아니마 선배, 저와 결혼해 주세요"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "胸の奥から溢れてくる愛おしさが抑え切れなくて、思わずそんなことを口走ってしまうが――"
translation = "가슴 깊은 곳에서 넘쳐흐르는 사랑스러움을 억누를 수 없어서 나도 모르게 그런 말을 내뱉고 말았지만――"

[[dialogue]]
speaker = "unk"
original = "しかし、アニマ先輩は嬉しそうに微笑んで……"
translation = "하지만 아니마 선배는 기쁜 듯이 미소 지으며……"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ<emoji=heart04>\u3000ああ、もちろんいいとも」"
translation = "「후히<emoji=heart04> 아아, 물론 좋고말고」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「じゃあ、学園を卒業したら、その時に……ナ？」"
translation = "「그럼 학원을 졸업하면 그때…… 알았지?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも俺たちは、時間が過ぎるのも忘れて、甘々な実験に没頭してしまうのだった――"
translation = "그 후로도 우리들은 시간이 흐르는 것도 잊은 채 달콤한 실험에 몰두하는 것이었다――"

