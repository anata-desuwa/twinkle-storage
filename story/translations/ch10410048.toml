[[dialogue]]
speaker = "unk"
original = "とある休日。俺は恋人のマインと、リゾート結界のプライベートビーチへと遊びにやって来ていた――"
translation = "어느 휴일. 나는 연인인 마인과 리조트 결계의 프라이빗 비치로 놀러 와 있었다──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000はい、ざんね～ん☆\u3000危なかったけど、これで私の逆転勝ち～♪」"
translation = "「니히히♪ 자, 아쉽겠네☆ 위험했지만, 이걸로 나의 역전승~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くあぁっ！\u3000負けたっ！！」"
translation = "「크아악! 졌다!!」"

[[dialogue]]
speaker = "unk"
original = "ビーチチェアーに座り、２人でポーカー勝負に興じていたのだが、最後に読み負けてチップを全部持って行かれてしまった。"
translation = "비치 체어에 앉아, 둘이서 포커 승부에 열중하고 있었는데, 마지막에 패를 잘못 읽어 칩을 전부 빼앗기고 말았다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それじゃ会長、今回の<b>主導権</b>は私ってことで決まりだね♪」"
translation = "「그럼 회장님, 이번 <b>주도권</b>은 나라는 걸로 결정이네♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「早速……罰ゲームを始めちゃおっか<emoji=heart04>」"
translation = "「당장…… 벌칙 게임을 시작해볼까❤️」"

[[dialogue]]
speaker = "unk"
original = "最近、俺とマインの間ではよく『賭け勝負』が行われていた。"
translation = "최근, 나와 마인 사이에서는 자주 『내기 승부』가 벌어지곤 했다."

[[dialogue]]
speaker = "unk"
original = "そこで賭けているものはズバリ――エッチをする際の主導権。"
translation = "거기서 걸고 있는 것은 단도직입적으로── 섹스를 할 때의 주도권."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ<emoji=heart04>\u3000というわけで、会長のちんぐり返しポーズ、頂きました～<emoji=heart04>」"
translation = "「니히히❤️ 그런 고로, 회장님의 엎드린 자세, 접수했습니다~❤️」"

[[dialogue]]
speaker = "unk"
original = "果たして、プライベートビーチに建てられている水上コテージのベッドへ移動した後、マインの望む体位でエッチをすることになった――"
translation = "결국, 프라이빗 비치에 세워진 수상 코테지의 침대로 이동한 뒤, 마인이 원하는 체위로 섹스를 하게 되었다──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははははっ☆\u3000会長、めっちゃ恥ずかしそうな顔～<emoji=heart04>\u3000でも、勝負して負けた罰ゲームだから、仕方ないよね～<emoji=heart04>」"
translation = "「캬하하하하☆ 회장님, 엄청 부끄러워하는 얼굴~❤️ 그치만, 승부에서 진 벌칙 게임이니까, 어쩔 수 없지~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それじゃあ、このままエッチしちゃうからね<emoji=heart04>」"
translation = "「그럼, 이대로 섹스해버릴 거니까❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まずは、アニマ先輩特製のローションを、会長の魔王おち○ぽにた～っぷりと垂らして～<emoji=heart04>」"
translation = "「우선은, 아니마 선배 특제 로션을, 회장님의 마왕 자지에 가~아득히 뿌려서~❤️」"

[[dialogue]]
speaker = "unk"
original = "マインが気に入ってよく使っているローションを取り出し、ペニスにたっぷりとかける。"
translation = "마인이 마음에 들어 자주 사용하는 로션을 꺼내, 페니스에 듬뿍 뿌린다."

[[dialogue]]
speaker = "unk"
original = "それはアニマ先輩が作った媚薬入りで即効性があるというとんでもない代物で、すぐにペニスが熱くなり、気分がムラムラしてきてしまう。"
translation = "그것은 아니마 선배가 만든 미약이 든 즉효성 로션이라는 엄청난 물건이라, 금방 페니스가 뜨거워지고 기분이 흥분되어 버린다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふぅ～<emoji=heart04>\u3000それから～、私のおま○こにも擦り付けて下準備<emoji=heart04>」"
translation = "「응후~❤️ 그리고~, 내 보지에도 문질러서 밑준비❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほ～ら、ぬ～りぬ～り<emoji=heart04>」"
translation = "「자~, 처벌처벌❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んんっ<emoji=heart04>\u3000相変わらず、このローション、すぐに効いてすごいね<emoji=heart04>」"
translation = "「으음응❤️ 여전히 이 로션, 금방 효과가 나타나서 대단하네❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長の魔王おち○ぽ、もうガチガチに大きくなって、熱くなってる……<emoji=heart04>」"
translation = "「회장의 마왕 자지, 벌써 딱딱하게 커져서, 뜨거워져 있어……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――それじゃあ、おま○こもヌルヌルになったから、もう食べちゃうね<emoji=heart04>」"
translation = "「──그럼 보지도 미끈미끈해졌으니까, 이제 먹어버릴게❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「熱々のおち○ぽ、いただきま～す<emoji=heart04>」"
translation = "「뜨끈뜨끈한 자지, 잘 먹겠습니다~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――<emoji=heart04>」"
translation = "「응──❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ――んああああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아── 으음아아아아아~~앗❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふぅっ<emoji=heart04>\u3000にひひっ<emoji=heart04>\u3000おち○ぽ、ずっぽり食べちゃったぁっ<emoji=heart04>」"
translation = "「응후❤️ 니히히❤️ 자지, 푹 하고 먹어버렸어❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ……！」"
translation = "「응❤️ 후우❤️ 으음응❤️ 응후❤️ 으음으❤️ 후우❤️ 하아아❤️ 응❤️ 응후……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！\u3000媚薬ローションで感度がすごい……！\u3000これもう、すぐにイっちゃいそうだ……！」"
translation = "「큭……! 미약 로션 때문에 감도가 대단해……! 이거 벌써, 금방 가버릴 것 같아……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはっ<emoji=heart04>\u3000え～、挿れたばっかりなのに、もうイっちゃうの～？」"
translation = "「캬핫❤️ 에~, 넣은 지 얼마 안 됐는데 벌써 가버리는 거야~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「魔王の癖に、ローションのせいにしちゃって情けな～い<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「마왕 주제에, 로션 탓이나 하고 한심해~❤️ 응❤️ 하아아❤️ 으음응❤️ 응후❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「雑魚ザコ、ざぁ～こ<emoji=heart04>\u3000メスガキ後輩に負けちゃう雑魚ち○ぽ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「허접허접, 허~접❤️ 암컷 꼬맹이 후배한테 져버리는 허접 자지❤️ 응❤️ 후우❤️ 으음으❤️ 응후웅❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「大きさ凶悪なのに、すぐにイっちゃう早漏ち○ぽ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふぅんっ<emoji=heart04>」"
translation = "「크기는 흉악한데, 금방 가버리는 조루 자지❤️ 응❤️ 응후❤️ 으음응❤️ 후웅❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うあぁっ！\u3000もう出るっ……！」"
translation = "「으아악! 이제 나와……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひっ<emoji=heart04>\u3000イけイけ<emoji=heart04>\u3000イっちゃえ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「니힛❤️ 가 가❤️ 가버려어❤️❤️ 응❤️ 응❤️ 응후❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら<emoji=heart04>\u3000ほらっ<emoji=heart04><emoji=heart04>\u3000イけっ！！！」"
translation = "「자❤️ 자❤️ 가라구!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あああああぁっ！！！」"
translation = "「아아아아아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "そうして、射精しそうになった、その瞬間――"
translation = "그렇게 사정할 것 같은, 그 순간──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○この中で、おち○ぽビクビクッって跳ねて暴れてるぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아앙❤️ 보지 안에서, 자지가 움찔움찔하고 튀어 오르며 날뛰고 있어어~~어엇❤️❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000あ、あれ？\u3000イったはずなのに……精液が出ない……？」"
translation = "「윽……! 어, 어라? 간 것 같은데…… 정액이 안 나와……?」"

[[dialogue]]
speaker = "unk"
original = "いや、それだけじゃなく――"
translation = "아니, 그것뿐만이 아니라──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひっ<emoji=heart04>\u3000気づいた～？\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「니히히❤️ 눈치챘어~? 응❤️ 응❤️ 후우❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うあっ！？\u3000マイン、一旦腰を止めっ……！」"
translation = "「으악!? 마인, 일단 허리 좀 멈춰……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「実はさっき挿入した時、おち○ぽにちょっとした仕掛けをしたんだよね～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「사실 아까 삽입했을 때, 자지에 약간의 장치를 했거든~❤️ 응❤️ 으음으❤️ 으음응❤️ 응후웅❤️」"

[[dialogue]]
speaker = "unk"
original = "マインは悪戯スマイルを浮かべて、ピストンを続けながら言う。"
translation = "마인은 악잇구 미소를 띠며, 피스톤을 계속하며 말한다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「絶頂しても、射精ができないように<emoji=heart04>\u3000にひっ<emoji=heart04>」"
translation = "「절정해도, 사정을 못 하게❤️ 니힛❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「射精、できない……！？」"
translation = "「사정, 못 한다고……!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そう、射精止め<emoji=heart04>\u3000んっ<emoji=heart04>\u3000正確には『射精チャージ』って言った方がいいかな？」"
translation = "「그래, 사정 금지❤️ 니힛❤️ 정확히는 『사정 차지』라고 말하는 게 좋으려나?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「実はマリオンさんからこの前、こっそり教えてもらった術でね～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「사실 마리온 씨한테 저번에 몰래 배운 술법이거든~❤️ 응❤️ 으음으❤️ 응후❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら、絶頂に辿り着いたところからそのまま快楽が続いてるでしょ？\u3000あっ<emoji=heart04>\u3000むしろ、そこから更に快楽が上乗せされる形で<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「봐봐, 절정에 도달한 지점부터 그대로 쾌락이 계속되고 있지? 앗❤️ 오히려 거기서 더 쾌락이 얹어지는 형태로❤️ 으음응❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私が『射精してもいい』って許可を出すまで、射精できないでこの快楽積み上げ状態が続いて行くんだってさ～<emoji=heart04>\u3000すごいよね～<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「내가 『사정해도 돼』라고 허가를 내릴 때까지, 사정 못 하고 이 쾌락 적립 상태가 계속되어 간다나 봐~❤️ 대단하지~❤️ 하아아❤️ 응후❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でもさ<emoji=heart04>\u3000私っ<emoji=heart04>\u3000この術で１個だけ気に入らないところがあって～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「근데 말이야❤️ 나❤️ 이 술법에서 딱 하나 마음에 안 드는 구석이 있어서~❤️ 응❤️ 응❤️ 응후웅❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「射精止めをするなら、絶頂も我慢して溜めた方がいいと思うんだよね～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「사정 금지를 할 거면, 절정도 참으면서 쌓는 게 좋다고 생각하거든~❤️ 응❤️ 후우❤️ 응후❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「だから、会長も既に気づいていると思うけど～<emoji=heart04>\u3000んっ<emoji=heart04>」"
translation = "「그러니까, 회장님도 이미 눈치챘겠지만~❤️ 응❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「イク時の『絶頂感』も寸止めして、チャージするようにアレンジしちゃった<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「갈 때의 『절정감』도 직전에 멈춰서, 차지하도록 어레인지해 버렸어❤️ 응❤️ 으음으❤️ 응후웅❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000そうか、だから……！」"
translation = "「윽……! 그렇군, 그래서……!」"

[[dialogue]]
speaker = "unk"
original = "先程、俺のペニスが絶頂を迎えたようにビクビク脈打っていた時。"
translation = "조금 전, 내 페니스가 절정을 맞이한 듯 움찔움찔 맥동하고 있었을 때."

[[dialogue]]
speaker = "unk"
original = "あの時、精液が出なかったのはもちろん、絶頂感も奪われたように、<b>気持ち良さ</b>を感じなかったのだ。"
translation = "그때, 정액이 나오지 않은 것은 물론, 절정감도 빼앗긴 듯이 <ruby>기분 좋음<rt>・・ ・・</rt></ruby>을 느끼지 못했던 것이다."

[[dialogue]]
speaker = "unk"
original = "まるで、絶頂の瞬間だけ感覚が『虚無』になってしまったように。気持ち良くなくて、後に焦れったさが残るような――"
translation = "마치, 절정의 순간에만 감각이 『허무』가 되어버린 것처럼. 기분 좋지 않아서, 뒤에 안달복달함만 남는 듯한──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「寸止めって辛いよね～？\u3000でも、我慢して苦しく思っただけ――」"
translation = "「직전에 멈추는 거 괴롭지~? 하지만, 참고 고통스럽게 생각한 만큼──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「最後に全部解放して射精したら、すっごい絶頂感で気持ち良くなれると思わない？」"
translation = "「마지막에 전부 해방해서 사정하면, 엄청난 절정감으로 기분 좋아질 수 있다고 생각하지 않아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000その時、会長はどんなにエッチな顔を見せてくれるのかと思うと、私……はああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응❤️ 응❤️ 응후❤️ 그때, 회장님은 얼마나 야한 얼굴을 보여줄지 생각하면, 나…… 하아아아앗❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「想像しただけで、興奮してゾクゾクしちゃう<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「상상한 것만으로도, 흥분해서 오싹오싹해져❤️❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "マインは頬をすっかり上気させ、愉悦に満ちた笑みを浮かべて。"
translation = "마인은 뺨을 상기시킨 채, 유열에 가득 찬 미소를 띠며."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「さあ、会長は果たして、どこまで射精止めに耐えられるかな～？\u3000にひひ<emoji=heart04>」"
translation = "「자, 회장님은 과연 어디까지 사정 금지를 버틸 수 있을까나~? 니히히❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら～、ピストンだけじゃなくて、腰のグラインドも入れちゃうよ～<emoji=heart04>\u3000んっ<emoji=heart04>」"
translation = "「봐봐~, 피스톤뿐만 아니라, 허리 그라인드도 넣어버릴 거야~❤️ 응❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んはぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「으음으❤️ 하아아❤️ 으음응❤️ 응❤️ 응하❤️ 으음으❤️ 응후웅❤️」"

[[dialogue]]
speaker = "unk"
original = "腰のピストンに、ぐりぐりと前後運動が加わり、俺は我慢できずに喘いでしまう。"
translation = "허리의 피스톤에, 구리구리한 전후 운동이 더해져, 나는 참지 못하고 신음을 내뱉는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くうぅっ！\u3000マイン、それヤバい……！」"
translation = "「크으윽! 마인, 그거 위험해……!」"

[[dialogue]]
speaker = "unk"
original = "快楽がリセットされることなく高まり続けていることもあって、俺のペニスにはあっという間に射精感が登り詰めて行く。"
translation = "쾌락이 리셋되지 않고 계속해서 높아지고 있는 탓도 있어, 내 페니스에는 눈 깜짝할 사이에 사정감이 치밀어 오른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あああっ！\u3000俺また……！」"
translation = "「아아앗! 나 또……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え～？\u3000またイキそうなの～？\u3000情けな～い<emoji=heart04>」"
translation = "「에~? 또 갈 것 같아~? 한심해~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「男として、もうちょっと我慢しないと～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んふぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「남자로서 좀 더 참아야지~❤️ 응❤️ 으음으❤️ 으음으❤️ 응후우~~웃❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ダメだっ……イクっ！！\u3000うあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼…… 간다!! 으아아아아앗❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ<emoji=heart04>\u3000はい、ざんね～ん☆\u3000寸止め～<emoji=heart04>」"
translation = "「캬하하하❤️ 네에, 아쉽겠네☆ 직전 멈춤~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000おち○ぽ、無駄にビクンビクンしちゃってる～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「하아아❤️ 자지, 헛수고로 움찔움찔하고 있어~❤️ 응❤️ 후우❤️ 응후❤️ 응후웅❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これで射精チャージ２回目だね<emoji=heart04>」"
translation = "「이걸로 사정 차지 2회째네❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああぁっ！\u3000マイン、腰止めっ……！」"
translation = "「아아앗! 마인, 허리 멈춰……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ダ～メ<emoji=heart04>\u3000これは罰ゲームなんだから<emoji=heart04>」"
translation = "「안~ 돼❤️ 이건 벌칙 게임이니까❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふうぅんっ<emoji=heart04>」"
translation = "「응❤️ 응❤️ 으응❤️ 후우❤️ 응❤️ 으음❤️ 하아❤️ 응❤️ 응❤️ 응후우응❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それに射精直後みたいに亀頭の感覚が敏感になっちゃってるだけで、別に本当にイってないんだし、我慢我慢～<emoji=heart04>\u3000にひひひっ<emoji=heart04>」"
translation = "「게다가 사정 직후처럼 귀두 감각이 예민해져 있을 뿐이지, 딱히 진짜로 간 건 아니니까, 참아야지 참아야지~❤️ 니히히히❤️」"

[[dialogue]]
speaker = "unk"
original = "マインは腰のスピードを落とさずに振り続ける。"
translation = "마인은 허리 스피드를 늦추지 않고 계속 흔든다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、マインっ……！」"
translation = "「마, 마인……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～？\u3000どうしたの、会長？\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「음~? 왜 그래, 회장? 응❤️ 후우❤️ 으응❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「快楽はどんどん増しているのに、イけないのがもどかしくて、頭がおかしくなりそうだ……！\u3000頼む、もう射精させてくれ……！」"
translation = "「쾌락은 점점 더해지는데, 갈 수 없는 게 답답해서 머리가 어떻게 될 것 같아……! 부탁이야, 이제 사정하게 해줘……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「～～～윽❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひっ<emoji=heart04>\u3000にひひっ<emoji=heart04>\u3000きゃははははははっ<emoji=heart04><emoji=heart04>」"
translation = "「니히❤️ 니히히❤️ 캬하하하하하하하❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000会長、今のおねだり、すっごくエッチ<emoji=heart04><emoji=heart04>」"
translation = "「하아❤️ 회장, 지금 부탁하는 거, 엄청 야해❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふぅっ<emoji=heart04>\u3000すっごくゾクゾクして、子宮がキュンキュンしちゃう……！\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「응후❤️ 엄청 짜릿짜릿해서 자궁이 큥큥거려……! 응❤️ 응❤️ 후우❤️ 응후응❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ、こうしよっか<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>」"
translation = "「그럼, 이렇게 할까❤️ 응❤️ 하아❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――チャージ５回目。あと２回耐えたら、その次に射精止めを解除してあげる<emoji=heart04>」"
translation = "「――차지 5회째. 앞으로 2번 더 견디면, 그다음에 사정 방지를 해제해 줄게❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そ、そんな……あと２回も……！？」"
translation = "「그, 그럴 수가…… 앞으로 2번이나 더……!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「大丈夫<emoji=heart04>\u3000んっ<emoji=heart04>\u3000会長は早漏ザコおち○ぽでも、絶倫だからイけるイける<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「괜찮아❤️ 회장은 조루 잡어 자지라도, 절륜하니까 할 수 있어 할 수 있어❤️ 응❤️ 응❤️ 후우❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それに、我慢したらきっとすっごい気持ちいい射精ができるよ<emoji=heart04>」"
translation = "「게다가, 참으면 분명 엄청 기분 좋은 사정을 할 수 있을 거야❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「５回分の絶頂が濃縮された極上の射精、想像してみなよ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「5회분의 절정이 농축된 극상의 사정, 상상해 보라고❤️ 앗❤️ 으응❤️ 응후❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私の子宮が１発で孕んじゃうくらいの濃い精液をビュ～<emoji=heart04>\u3000ビュ～<emoji=heart04>\u3000っていっぱいになるまで中に吐き出しちゃうの<emoji=heart04>」"
translation = "「내 자궁이 한 번에 임신해 버릴 정도로 진한 정액을 뷰우~❤️ 뷰우~❤️ 하고 가득 찰 때까지 안에 쏟아내는 거야❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほらっ、ビュ～<emoji=heart04>\u3000ビュ～<emoji=heart04>\u3000って<emoji=heart04>」"
translation = "「자, 뷰우~❤️ 뷰우~❤️ 하고❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000うあああああぁっ<emoji=heart04>」"
translation = "「윽……! 으아아아아아앗❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはっ<emoji=heart04>\u3000はい、ダメ～<emoji=heart04>\u3000寸止め３回目～<emoji=heart04><emoji=heart04>」"
translation = "「캬핫❤️ 네에, 안 돼~❤️ 직전 멈춤 3회째~❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ、この勢いで一気にあと２回行っちゃうよ～<emoji=heart04>」"
translation = "「자, 이 기세로 단숨에 남은 2번 가보자고~❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン、敏感になってるのが辛いから、待っ――」"
translation = "「마인, 예민해진 게 괴로우니까, 기달――」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふぅっ――<emoji=heart04><emoji=heart04>」"
translation = "「응후윽――❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ダメ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000待ちませ～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안 돼～～～엣❤️❤️❤️ 안 기다려～～～욧❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「흥❤️ 흥❤️ 응후❤️ 응❤️ 하아❤️ 흥❤️ 흥❤️ 응후응❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으아아아아아아앗❤️❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "マインの激しい腰ピストンが始まり、俺は大きな喘ぎ声を上げてしまう。"
translation = "마인의 격렬한 허리 피스톤이 시작되고, 나는 커다란 신음을 내지르고 만다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ<emoji=heart04>\u3000すっごい喘ぎ声<emoji=heart04>\u3000会長、女の子みた～い<emoji=heart04>」"
translation = "「캬하하하❤️ 엄청난 신음 소리❤️ 회장, 여자아이 같아~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「흥❤️ 흥❤️ 응후응❤️ 응❤️ 후우❤️ 흥❤️ 흥❤️ 응후우～～웃❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000ねぇ、どんな気持ち？\u3000今どんな気持ちっ？\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「하아❤️ 저기, 어떤 기분이야? 지금 어떤 기분이야? 흥❤️ 흥❤️ 응후응❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら、正直に答えてっ<emoji=heart04>\u3000どうしたいのか言って<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「자, 솔직하게 대답해줘❤️ 어떻게 하고 싶은지 말해❤️ 응❤️ 후우❤️ 응후❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「言わないと、射精止め解除してあげないよ～？\u3000ほらっ<emoji=heart04>\u3000ほらぁっ<emoji=heart04><emoji=heart04>」"
translation = "「말 안 하면, 사정 방지 해제 안 해줄 거야~? 자❤️ 자아❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "俺はもう我慢できずに、喘ぐように叫ぶ。"
translation = "나는 이제 참지 못하고, 애원하듯 외친다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気持ちいいっ！\u3000すごく気持ちいいっ！！ ――でも苦しいっ！\u3000出せないのがもどかしいっ！！」"
translation = "「기분 좋아! 너무 기분 좋아!! ――하지만 괴로워! 낼 수 없는 게 너무 답답해!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イキたいのにイけないっ！！\u3000イキたいっ！！！\u3000マイン、お願いだっ！\u3000イかせてっ！！」"
translation = "「가고 싶은데 갈 수 없어!! 가고 싶어!!! 마인, 부탁이야! 가게 해줘!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長がエッチな女の子みたいな顔して、情けなく懇願してくるの堪らないっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「～～～윽❤️❤️❤️ 하아아～～～앗❤️❤️❤️ 회장이 야한 여자아이 같은 표정으로, 한심하게 간청해 오는 거 못 참겠어❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000ふううぅっ<emoji=heart04><emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふうぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「응❤️ 후우우윽❤️❤️ 흥❤️ 흥❤️ 응후우~❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「子宮にキュンキュン来て、興奮しちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자궁에 큥큥 울려서, 흥분돼버려❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふうぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응❤️ 흥❤️ 흥❤️ 응후응❤️❤️ 응❤️ 하아아앗❤️ 흥❤️ 흥❤️ 응후우～～～웃❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私もおま○こ気持ち良くなっちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「나도 보지 기분 좋아져버려❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うあああぁっ<emoji=heart04><emoji=heart04>\u3000またイっちゃう！\u3000イかせてっ！！」"
translation = "「으아아앗❤️❤️ 또 갈 것 같아! 가게 해줘!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いいよ<emoji=heart04>\u3000イっちゃえっ<emoji=heart04>\u3000イけイけっ<emoji=heart04><emoji=heart04>\u3000もっと気持ちよくなっちゃえっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「좋아❤️ 가버려❤️ 가라 가라❤️❤️ 더 기분 좋아져버려❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふうぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「흥❤️ 흥❤️ 으응❤️ 흥❤️ 흥❤️ 하아❤️ 응❤️ 응후응❤️❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うあああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イク、イクイクイクイクっ！！！」"
translation = "「으아아아아아앗❤️❤️❤️ 간다, 가가각!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああああああああぁっ！！！\u3000すっごく気持ち良いのが来てたのにっ！！\u3000イけないっ！！！」"
translation = "「아아아아아아아아앗!!! 엄청 기분 좋은 게 오고 있었는데!! 못 가!!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははははははははっ！！！\u3000今のすっごく気持ち良さそうだったのに、寸止めでかわいそ～<emoji=heart04>」"
translation = "「캬하하하하하하하하핫!!! 방금 거 엄청 기분 좋아 보였는데, 직전 멈춤이라니 불쌍해라~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも、これで４回目っ<emoji=heart04>\u3000約束回数のチャージは完了だよ、会長<emoji=heart04>」"
translation = "「하지만, 이걸로 4회째❤️ 약속한 횟수의 차지는 완료야, 회장❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あとは思いっきり最後、５回目に気持ち良くどっぴゅんするだけ<emoji=heart04>」"
translation = "「남은 건 마음껏 마지막, 5회째에 기분 좋게 듬뿍 사정하는 것뿐❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私もアクメ登って来てるから、ラストスパート行くよっ<emoji=heart04>」"
translation = "「나도 절정에 오르고 있으니까, 라스트 스퍼트 간다❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――ふうぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응――후우～～웃❤️❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "きゅうぅっとマインのおま○こが一際強く締まる。"
translation = "뀨우욱 하고 마인의 보지가 한층 강하게 조여진다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04><emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「흥❤️ 흥❤️ 응후❤️❤️ 흥❤️ 흥❤️ 응후응❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン！\u3000もうイクっ！！\u3000今度こそ出す！！！」"
translation = "「마인! 이제 가!! 이번에야말로 싼다!!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000私もっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04><emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응❤️ 나도❤️ 흥❤️ 흥❤️ 으응❤️❤️ 흥❤️ 흥❤️ 응후❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「チャージ解除するよっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04><emoji=heart04>」"
translation = "「차지 해제할게❤️ 응❤️ 후우❤️ 응후❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「魔王の濃厚精液、中にいっぱいどっぴゅんしちゃえっ<emoji=heart04>」"
translation = "「마왕의 농후한 정액, 안에 잔뜩 듬뿍 싸버려❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「흥❤️ 흥❤️ 응후❤️❤️ 하아❤️ 흥❤️ 흥❤️ 응후응❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ、おち○ぽ膨らんでるっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 자지 부풀어 오르고 있어❤️❤️❤️ 흥❤️ 흥❤️ 응후우우～～～웃❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「出せ<emoji=heart04><emoji=heart04>\u3000出せ出せ出せ出せ出せっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「싸라❤️❤️ 싸라 싸라 싸라 싸라 쏴라앗❤️❤️❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン！\u3000出るっ！！！」"
translation = "「마인! 나온다!!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ、私も来たっ<emoji=heart04><emoji=heart04>\u3000一緒にっ<emoji=heart04><emoji=heart04>\u3000イけっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イけイけイけイけイけっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 나도 왔어❤️❤️ 같이❤️❤️ 가라❤️❤️ 가가가가각❤️❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んんううぅぅっ――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으으으으으응――❤️❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はああああああぁぁぁんっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000精液来たあああぁーーーーーーーーーんっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아앙❤️ 정액 왔다아아아아아아아아아앙❤️❤️❤️❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "瞬間、溜まりに溜まった精液が、凄まじい解放感と共にペニスの先から爆ぜた。"
translation = "순간, 쌓이고 쌓였던 정액이, 엄청난 해방감과 함께 페니스의 끝에서 터져 나왔다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「中出しどぴゅどぴゅ、熱いの入って来るうぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んああああああ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000奥にどっぷり叩きつけられて、子宮イっちゃうぅ～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「질내사정 듬뿍, 뜨거운 게 들어와아아아～～～앗❤️❤️❤️ 응아아아아아아❤️❤️❤️ 안쪽에 듬뿍 쳐박혀서, 자궁 가버려어어어～～앙❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はああぁ～～っ<emoji=heart04><emoji=heart04>\u3000んあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000射精の勢いヤバいぃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아～～앗❤️❤️ 응아아아～～～앗❤️❤️❤️ 사정 기세가 장난 아니야아❤️❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふああぁ～っ<emoji=heart04><emoji=heart04>\u3000止まらなくて、私の子宮押し広げられちゃうぅ<emoji=heart04><emoji=heart04>」"
translation = "「응후아아～앗❤️❤️ 멈추지 않아서, 내 자궁이 벌려져 버려어❤️❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はああぁ～～っ<emoji=heart04>\u3000こんなの、安全日じゃなきゃ妊娠しちゃうってぇ～<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んはああぁ～っ……<emoji=heart04>」"
translation = "「하아아아～～앗❤️ 이런 거, 안전일이 아니면 임신해 버린다고오~❤️ 앗❤️ 응하아아～앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "そうして、今までで間違いなく一番長かったであろう大量射精が終わって――"
translation = "그렇게, 지금까지 중 틀림없이 가장 길었을 대량 사정이 끝나고――"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ……んんっ……<emoji=heart04>」"
translation = "「하아아…… 응……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「응……❤️ 하아…… 후우……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「射精量すごすぎて、抜いたらすぐに精液溢れて来ちゃった……<emoji=heart04>」"
translation = "「사정량이 너무 많아서, 빼니까 바로 정액이 넘쳐흘러 나와버렸어……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「って、会長、大丈夫？\u3000射精の時、すっごいエッチなイキ顔しちゃってたけど……<emoji=heart04>」"
translation = "「그건 그렇고 회장, 괜찮아? 사정할 때, 엄청 야한 표정 짓고 있었는데……❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……解放感が気持ち良すぎて、魂もちょっと飛び出してた」"
translation = "「……해방감이 너무 기분 좋아서, 영혼도 좀 튀어나갔었어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはっ<emoji=heart04>\u3000それって、意識飛びかけてたってこと？」"
translation = "「캬핫❤️ 그거, 의식이 끊길 뻔했다는 거야?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふぅ～ん、そんなすごかったんだ～？」"
translation = "「흐음~, 그렇게 대단했구나~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちなみにさっきの術は、男の射精だけじゃなくて、女の絶頂もチャージできるんだって<emoji=heart04>」"
translation = "「참고로 아까 그 술법은, 남자의 사정뿐만 아니라, 여자의 절정도 차지할 수 있대❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「だから、もし会長が次のポーカー勝負で勝てたら、術のやり方教えてあげるから、私に試してみてもいいよ？」"
translation = "「그러니까, 만약 회장이 다음 포커 승부에서 이기면, 술법 하는 법 가르쳐 줄 테니까, 나한테 시험해 봐도 좋아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……それだけ寸止めされたら、私も会長にわからせられちゃうかも<emoji=heart04>」"
translation = "「……그만큼 직전 멈춤 당하면, 나도 회장한테 교육받아 버릴지도❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ<emoji=heart04>\u3000おち○ぽちょっと反応した～<emoji=heart04>」"
translation = "「앗❤️ 자지 조금 반응했다~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そんなに私のこと、わからせたいんだ～？」"
translation = "「그렇게 나를, 굴복시키고 싶은 거야~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも～、もし私が勝ったら、次の罰ゲームは、会長に女の子に変身して貰って、絶頂寸止め試して貰っちゃおっかな～？」"
translation = "「하지만~, 만약 내가 이기면, 다음 벌칙 게임은, 회장이 여자아이로 변신해서, 절정 직전 멈춤 당해보는 걸로 할까나~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――それでも勝負する？\u3000にひひ<emoji=heart04>」"
translation = "「――그래도 승부할래? 니히히❤️」"

[[dialogue]]
speaker = "unk"
original = "そう言って、悪戯スマイルを浮かべながら二択を迫って来るマインに、俺はごくりと生唾を飲みながら、悩む羽目になるのだった――"
translation = "그렇게 말하며, 장난기 가득한 미소를 띄우고 이지선다를 압박해 오는 마인에게, 나는 꿀꺽 마른침을 삼키며 고민하는 처지가 되는 것이었다――"

