[[dialogue]]
speaker = "メルエル"
original = "「むむむっ、無理だよぉ！？\u3000私、どこにでもいる普通の天使だよ！？\u3000レミカちゃんみたいなトップアイドルとユニットだなんて……！」"
translation = "「무무무, 무리야아!? 나는 어디에나 있는 평범한 천사라고!? 레미카짱 같은 톱 아이돌이랑 유닛이라니……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「予想通りの返事ね……どうしてこんなに嫌がるのかしら。メルエルはとっても可愛いのに」"
translation = "「예상했던 반응이네…… 왜 이렇게 싫어하는 걸까. 메르엘은 이렇게나 귀여운데」"

[[dialogue]]
speaker = "レミカ"
original = "「うん、笑顔も素敵だし心もまっすぐ。アイドルの素養を兼ね備えてると私も思うよ」"
translation = "「응, 미소도 멋지고 마음도 곧아. 아이돌의 소양을 겸비하고 있다고 나도 생각해」"

[[dialogue]]
speaker = "メルエル"
original = "「褒めてくれるのは嬉しいけど、あんまりおだてないでよ～……女の子の友達はすぐ可愛いって言うんだから……」"
translation = "「칭찬해 주는 건 기쁘지만 너무 띄워주지 마~…… 여자애 친구들은 금방 귀엽다고 그런다니까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なら男の子の意見も聞いてみましょ？\u3000クロトはメルエルのこと、どう思う？」"
translation = "「그럼 남자애 의견도 들어볼까? 쿠로토는 메르엘에 대해 어떻게 생각해?」"

[[dialogue]]
speaker = "unk"
original = "メルエルはすごく可愛いよ"
translation = "메르엘은 정말 귀여워"

[[dialogue]]
speaker = "unk"
original = "お世辞なんかじゃなく"
translation = "빈말이 아니라"

[[dialogue]]
speaker = "メルエル"
original = "「はうぅっ！？\u3000そんなストレートに……め、メルトしちゃうよぉ～～……！？<emoji=heart04>」"
translation = "「하우우!? 그렇게 직구로…… 메, 멜트해버릴 거야아아~~~~……!?<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
original = "「さすが会長。その援護射撃が欲しかったんだ」"
translation = "「역시 회장. 그 원호 사격이 필요했어」"

[[dialogue]]
speaker = "unk"
original = "無理強いはよくないよ"
translation = "강요는 좋지 않아"

[[dialogue]]
speaker = "unk"
original = "でも本人が嫌だって言うなら"
translation = "하지만 본인이 싫다면 어쩔 수 없지"

[[dialogue]]
speaker = "ヴィーナス"
original = "「も～っ！\u3000クロト、あなたはどっちの味方なのよ～っ」"
translation = "「정말~! 쿠로토, 당신은 누구 편인 거야~」"

[[dialogue]]
speaker = "レミカ"
original = "「ま、そうなるよね。予想してたとおりかも……ちょっとメルエル、こっち来て」"
translation = "「뭐, 그렇게 되겠지. 예상했던 대로일지도…… 잠깐 메르엘, 이쪽으로 와봐」"

[[dialogue]]
speaker = "レミカ"
original = "「私は学生だけど、一応ビジネスの世界に生きてるし。交渉事ってウィンウィンでなきゃダメだと思ってるんだ」"
translation = "「나는 학생이지만 일단 비즈니스 세계에서 살고 있으니까. 협상이라는 건 윈윈이어야 한다고 생각하거든」"

[[dialogue]]
speaker = "メルエル"
original = "「う、うん……？」"
translation = "「으, 응……?」"

[[dialogue]]
speaker = "レミカ"
original = "「まず大前提として、今回のアイドルユニット活動は、あくまでも１回のライブ限定なんだ」"
translation = "「우선 대전제로서 이번 아이돌 유닛 활동은 어디까지나 딱 한 번인 라이브 한정이야」"

[[dialogue]]
speaker = "レミカ"
original = "「アイドルは素敵な職業だけど、しがらみも多いからね。そこにメルエルを付き合わせる気はないよ」"
translation = "「아이돌은 멋진 직업이지만 제약도 많으니까. 거기에 메르엘을 끌어들일 생각은 없어」"

[[dialogue]]
speaker = "レミカ"
original = "「アイドルデビューって聞くと大げさに聞こえるなら、ライブ限定で私とコラボしてほしいってことなんだ」"
translation = "「아이돌 데뷔라고 하면 거창하게 들리겠지만, 라이브 한정으로 나랑 콜라보해 줬으면 하는 거야」"

[[dialogue]]
speaker = "メルエル"
original = "「な、なるほど……？」"
translation = "「그, 그렇구나……?」"

[[dialogue]]
speaker = "レミカ"
original = "「後はメルエルが喜ぶかなって思って、会長にアイドルユニットのプロデューサーをお願いしてるよ。ＯＫだって」"
translation = "「그리고 메르엘이 좋아할까 싶어서 회장에게 아이돌 유닛 프로듀서를 부탁했어. OK라더라」"

[[dialogue]]
speaker = "メルエル"
original = "「ええっ、会長くんがプロデューサー……！？」"
translation = "「에엣, 회장군이 프로듀서……!?」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。歌やダンスの練習、できるかぎりサポートしてくれるって約束してもらえてる。つまり……」"
translation = "「응. 노래나 댄스 연습, 가능한 한 서포트해 주겠다고 약속받았어. 즉……」"

[[dialogue]]
speaker = "メルエル"
original = "「放課後は……いつも会長くんと一緒っ！？」"
translation = "「방과 후에는…… 항상 회장군이랑 같이!?」"

[[dialogue]]
speaker = "レミカ"
original = "「放課後だけじゃないよ。朝練も昼練もするし……そうだ。休日に待ち合わせするのもいいかもね」"
translation = "「방과 후뿐만이 아니야. 아침 연습도 점심 연습도 할 거고…… 맞아. 쉬는 날에 약속을 잡는 것도 좋을지 몰라」"

[[dialogue]]
speaker = "メルエル"
original = "「お休みの日まで！？」"
translation = "「쉬는 날까지!?」"

[[dialogue]]
speaker = "レミカ"
original = "「メルエル、会長とは幼なじみだけど、昔のことを思い出してもらえてないって言ってたでしょ？\u3000そのきっかけになったらどうかなって」"
translation = "「메르엘, 회장이랑 소꿉친구지만 옛날 일을 기억하지 못하고 있다고 했지? 그 계기가 되면 어떨까 싶어서」"

[[dialogue]]
speaker = "メルエル"
original = "「れ、レミカちゃん……この前と違ってすごいね。プロの交渉って感じがする……！」"
translation = "「레, 레미카짱…… 요전번이랑 다르게 대단하네. 프로 협상가 같은 느낌이 들어……!」"

[[dialogue]]
speaker = "レミカ"
original = "「それだけ本気ってこと。メルエルとライブがしたいんだ、私……どうかな？」"
translation = "「그만큼 진심이라는 뜻이야. 메르엘이랑 라이브를 하고 싶어, 나…… 어때?」"

[[dialogue]]
speaker = "メルエル"
original = "（レミカちゃん、本気なんだ。応援してあげたいけど、アイドルって恥ずかしい……）"
translation = "(레미카짱, 진심이구나. 응원해 주고 싶지만 아이돌이라니 부끄러워……)"

[[dialogue]]
speaker = "メルエル"
original = "（でも私が断ったら、他の女の子が選ばれるのかな。そうしたら、その子が会長くんと朝も昼も放課後も休日もすごすのかなっ……！？）"
translation = "(하지만 내가 거절하면 다른 여자애가 선택되겠지. 그렇게 되면 그 애가 회장군이랑 아침도 점심도 방과 후도 휴일도 보내게 되는 걸까앗……!?)"

[[dialogue]]
speaker = "メルエル"
original = "「わ、わかった……！！」"
translation = "「아, 알았어……!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、戻ってきたわね」"
translation = "「아, 돌아왔네」"

[[dialogue]]
speaker = "メルエル"
original = "「──やる！\u3000私っ……姫咲メルエル、未熟者ではありますがっ！\u3000アイドルやりますっ！」"
translation = "「──할게! 나…… 히메사키 메르엘, 미숙하지만! 아이돌 하겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫なのか？\u3000無理してない？"
translation = "괜찮은 거야? 무리하는 거 아냐?"

[[dialogue]]
speaker = "メルエル"
original = "「う、ううん！\u3000レミカちゃんの本気も伝わってきたし……会長くんもお手伝いしてくれるなら私、頑張れると思う！」"
translation = "「으, 으응! 레미카짱의 진심도 전해졌고…… 회장군도 도와준다면 나, 힘낼 수 있을 것 같아!」"

[[dialogue]]
speaker = "レミカ"
original = "「決まりだね──本当にありがとう、メルエル」"
translation = "「결정이네── 정말 고마워, 메르엘」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今、ここに誕生したわ！\u3000新星学園の星騎士だけで組まれたアイドルユニットが……！！」"
translation = "「지금 여기서 탄생했어! 신성학원 성기사들로만 구성된 아이돌 유닛이……!!」"

[[dialogue]]
speaker = "unk"
original = "こうしてレミカの夢を叶えるために、１日限りのアイドルユニットが結成されるのであった。"
translation = "이렇게 레미카의 꿈을 이루기 위해 1일 한정 아이돌 유닛이 결성되었다."

