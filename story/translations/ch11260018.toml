[[dialogue]]
speaker = "unk"
original = "とある放課後、俺が職員室へ書類を提出した後、星徒会室へ戻ろうと廊下を歩いていると――"
translation = "어느 방과 후, 내가 교무실에 서류를 제출한 뒤 성도회실로 돌아가려고 복도를 걷고 있자니──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さん♪\u3000お疲れ様です～☆」"
translation = "「회장님♪ 수고하셨어요~☆」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あれ？\u3000トレジアンナさん、どうしたんですか？\u3000魔法少女の衣装を着て……」"
translation = "「어라? 트레지안나 씨, 웬일이세요? 마법소녀 의상을 입고……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ちょっと事情がありまして～。会長さん、こちらによろしいでしょうか？」"
translation = "「사정이 좀 있어서요~. 회장님, 이쪽으로 좀 오시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんに手を引かれて、すぐ隣にある教室に入る。"
translation = "트레지안나 씨에게 손을 이끌려 바로 옆에 있는 교실로 들어간다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さん<emoji=heart04>」"
translation = "「회장님<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「と、トレジアンナさん？」"
translation = "「트, 트레지안나 씨?」"

[[dialogue]]
speaker = "unk"
original = "彼女は魔法でふわりと浮くと、俺に顔を近づけてきて――"
translation = "그녀는 마법으로 두둥실 떠오르더니 내게 얼굴을 가까이 대고──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「음……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頬に両手を添えられ、キスされる。"
translation = "뺨에 양손을 얹은 채 키스당한다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んむっ……ちゅっ<emoji=heart04>\u3000ちゅぱっ……ちゅむっ<emoji=heart04>\u3000ちゅるっ……ちゅぷぷっ<emoji=heart04>\u3000ちゅむるっ……ちゅれるっ<emoji=heart04>\u3000ちゅるるっ……れろちゅっ<emoji=heart04>」"
translation = "「음무…… 츄<emoji=heart04> 츄릅…… 츄무……<emoji=heart04> 츄르…… 츄푸푸……<emoji=heart04> 츄무르…… 츄레르……<emoji=heart04> 츄르르…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んっ……ぷはぁ<emoji=heart04>\u3000ふふふっ<emoji=heart04>」"
translation = "「음…… 푸하<emoji=heart04> 후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「最近会えなかったから実は欲求不満でして<emoji=heart04>\u3000押し倒しに来ちゃいました♪」"
translation = "「요즘 못 만났더니 사실 욕구불만이라서요<emoji=heart04> 덮치러 와버렸답니다♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「というわけで、会長さん――」"
translation = "「그런 고로 회장님──」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「エッチ、しちゃいましょ<emoji=heart04>」"
translation = "「섹스해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁ～……<emoji=heart04>\u3000会長さんのおち○ちん、いつ見てもご立派ですね～<emoji=heart04>」"
translation = "「하아아~……<emoji=heart04> 회장님의 자지, 언제 봐도 훌륭하네요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の方にお尻を向けるような体勢で、トレジアンナさんが股下から笑顔を覗かせる。"
translation = "나에게 엉덩이를 향하는 듯한 자세로 트레지안나 씨가 가랑이 사이로 미소를 지어 보인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トレジアンナさん、誰か来ちゃうかもしれないからマズいですって……！」"
translation = "「트레지안나 씨, 누가 올지도 모르니까 곤란하다고요……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふっ、会長さん、そこは大丈夫ですよ～♪\u3000いつもの『人払いの魔法』を使ってますから☆」"
translation = "「후후, 회장님, 그건 걱정 마세요~♪ 평소 쓰던 『시선 차단 마법』을 쓰고 있으니까요☆」"

[[dialogue]]
speaker = "unk"
original = "――俺とトレジアンナさんはあれから男女として更に仲良くなって、体の関係を持つようになっていた。"
translation = "──나와 트레지안나 씨는 그때부터 남녀로서 더욱 친해져 육체관계를 맺는 사이가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "ただし彼女曰く、恋愛はやはりピンと来ないとのことで、未だ『恋人』という関係にはなっていない。"
translation = "다만 그녀 말로는 연애는 역시 감이 안 잡힌다고 해서 아직 『연인』 관계는 되지 않았다."

[[dialogue]]
speaker = "unk"
original = "なので、友達以上恋人未満である俺たちの今の関係は……彼女曰く『セックスフレンド』とのことらしい。"
translation = "그래서 친구 이상 연인 미만인 우리들의 지금 관계는…… 그녀의 말에 따르면 『섹스 프렌드』라는 모양이다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「――え？\u3000まだ星徒会の仕事が溜まってるから、それを片付けないと、ですか？」"
translation = "「──네? 아직 성도회 일이 쌓여있어서 그걸 처리해야 한다고요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふっ。だけど、性欲も溜め過ぎはよくないですよ～♪」"
translation = "「후후. 하지만 성욕도 너무 쌓아두는 건 좋지 않아요~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「って、あれ！？\u3000なんか体が動かせない……！？」"
translation = "「어, 어라!? 왠지 몸을 움직일 수 없어……!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「拘束魔法を使っちゃいました♪\u3000てへぺろ☆」"
translation = "「구속 마법을 써버렸답니다♪ 데헤페로☆」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっとぉ～！？」"
translation = "「잠깐만요~~!?」"

[[dialogue]]
speaker = "unk"
original = "最近だんだんと魔法を使う感覚を取り戻してきたらしいトレジアンナさんは、こういう悪戯をよくやる。"
translation = "요즘 점점 마법을 사용하는 감각을 되찾고 있는 모양인 트레지안나 씨는 이런 장난을 자주 친다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「大丈夫ですよ♪\u3000仕事は後でお手伝いしますから、会長さんは安心してお姉さんに身を任せて、気持ちよくなっちゃって下さいね～<emoji=heart04>」"
translation = "「괜찮아요♪ 일은 나중에 도와드릴 테니까, 회장님은 안심하고 누나에게 몸을 맡기고 기분 좋아져 버리세요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、彼女は俺のペニスを手で触れる。"
translation = "그렇게 말하며 그녀는 내 페니스를 손으로 만진다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふふっ<emoji=heart04>\u3000ほら、会長さんのおち○ちんも気持ちよくなりたいって言って、みるみる大きくなってますよ～？」"
translation = "「후후후<emoji=heart04> 보세요, 회장님의 자지도 기분 좋아지고 싶다고 말하면서 눈 깜짝할 사이에 커지고 있어요~?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「これからお姉さんが、い～っぱい気持ちよくしてあげますからね～<emoji=heart04>\u3000いい子いい子～<emoji=heart04>」"
translation = "「이제부터 누나가 아~주 기분 좋게 해줄 테니까요~<emoji=heart04> 착하지 착해~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すっかり慣れた手つきで、ペニスを撫でるトレジアンナさん。"
translation = "완전히 익숙해진 손놀림으로 페니스를 쓰다듬는 트레지안나 씨."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ほ～ら……なでなで<emoji=heart04>\u3000シコシコ～<emoji=heart04>\u3000す～りすり<emoji=heart04>」"
translation = "「자아…… 쓰담쓰담<emoji=heart04> 하악하악~<emoji=heart04> 비비적비비적<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女とセックスするようになってから自分では全然しなくなっていた為、俺はあっという間に勃起してしまう。"
translation = "그녀와 섹스하게 된 뒤로 자위는 전혀 하지 않았기에, 나는 순식간에 발기하고 만다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「よいしょっと……<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「영차……<emoji=heart04> 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんはゆっくり腰を下ろすと、ペニスをおま○こに擦り付ける。"
translation = "트레지안나 씨는 천천히 허리를 내리며 페니스를 보지에 문지른다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁっ……<emoji=heart04>\u3000すごい、こんなにガチガチに固くなって<emoji=heart04>\u3000それにとっても熱いです<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 대단해, 이렇게나 딴딴하게 굳어서<emoji=heart04> 게다가 엄청 뜨거워요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んんっ……ふうぅ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000擦り付けてると、私のおま○こもキュンキュン反応して、愛液いっぱい溢れてきちゃいます～<emoji=heart04>」"
translation = "「응…… 후우<emoji=heart04> 하아아<emoji=heart04> 문지르고 있으니까 제 보지도 큥큥 반응해서 애액이 잔뜩 넘쳐버려요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んふっ<emoji=heart04>\u3000それで、会長さんはこんなに大きくなっちゃったおち○ちん、どうして欲しいんですか～？」"
translation = "「응후<emoji=heart04> 그래서 회장님은 이렇게 커져 버린 자지를 어떻게 해줬으면 좋겠나요~?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おま○こに挿れたいですか？\u3000それとも、ここで止めちゃいますか～？」"
translation = "「보지에 넣고 싶나요? 아니면 여기서 그만둘까요~?」"

[[dialogue]]
speaker = "unk"
original = "ここまで勃起してしまって今更止められるわけもなく、俺はおま○こに挿れさせて欲しいとお願いすると……"
translation = "이만큼 발기해버린 마당에 이제 와서 멈출 수 있을 리도 없기에, 나는 보지에 넣게 해달라고 부탁하니……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふっ<emoji=heart04>\u3000ですよね～<emoji=heart04>\u3000では……このまま頂いちゃいますね～<emoji=heart04>」"
translation = "「후후<emoji=heart04> 그렇죠~<emoji=heart04> 그럼…… 이대로 먹어버릴게요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は愛液を擦り付けて、ヌルヌルになったペニスをおま○この穴にあてがう。"
translation = "그녀는 애액을 묻혀 미끌미끌해진 페니스를 보지 구멍에 갖다 댄다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁっ……<emoji=heart04>\u3000それじゃあ、おち○ちんいただきま～す<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 그럼 자지 잘 먹겠습니다~<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んっ――<emoji=heart04><emoji=heart04>」"
translation = "「응──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んあああぁ～～～っ<emoji=heart04>\u3000おち○ちん、来たあああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아~~<emoji=heart04> 자지 들어온다아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁ～～～っ<emoji=heart04>\u3000おち○ちん気持ちいいですっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>」"
translation = "「하아아~~<emoji=heart04> 자지 기분 좋아요<emoji=heart04> 응으윽<emoji=heart04> 하아아…… 후우윽<emoji=heart04> 앗<emoji=heart04> 하아아…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「この気持ち良さを知っちゃったら、もうこれ無しじゃ生きられないですよぉ～<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ……んうぅっ<emoji=heart04>」"
translation = "「이 기분 좋음을 알아버리면 더는 이거 없인 못 살아요오~<emoji=heart04> 응으윽<emoji=heart04> 하아아…… 후우윽<emoji=heart04> 응<emoji=heart04> 앗…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んふっ<emoji=heart04>\u3000見えますか？\u3000会長さんのでっかいおち○ちんが、私のちっちゃなおま○こ穴に食べられちゃってるところ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>」"
translation = "「응후<emoji=heart04> 보이나요? 회장님의 커다란 자지가 제 조그만 보지 구멍에 먹혀버리고 있는 거<emoji=heart04> 응…… 후우윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さんはどうです？\u3000おま○こ気持ちいいですか～？\u3000はあぁっ……んんぅっ<emoji=heart04>」"
translation = "「회장님은 어때요? 보지 기분 좋나요~? 하아아…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「――気持ちいいからこそ、自由に動けないのが辛い、ですか？」"
translation = "「──기분 좋으니까 더더욱 자유롭게 움직이지 못하는 게 괴롭다, 고요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んふふっ<emoji=heart04>\u3000会長さんのその泣きそうな顔とよがる声、ゾクゾクしちゃいます～……<emoji=heart04>\u3000んうぅっ……はあぁぁっ<emoji=heart04>」"
translation = "「응후후<emoji=heart04> 회장님의 그 울 것 같은 얼굴이랑 느끼는 소리, 소름 돋아버려요~……<emoji=heart04> 응으윽…… 하아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ほらっ<emoji=heart04>\u3000会長さんが好きだと言っていつも触りたがる大きなおっぱいとお尻、目の前でぶるんぶるん揺れてますよ～<emoji=heart04>」"
translation = "「자아!<emoji=heart04> 회장님이 좋다고 하며 맨날 만지고 싶어 하던 커다란 가슴이랑 엉덩이, 눈앞에서 출렁출렁 흔들리고 있어요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「触りたいですか～？\u3000んふふふふっ<emoji=heart04>」"
translation = "「만지고 싶나요~? 응후후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「でも、ダメで～す<emoji=heart04>\u3000せっかくですから、今日は私が会長さんの射精管理をしちゃいますっ<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04>」"
translation = "「하지만 안~ 돼요<emoji=heart04> 모처럼이니까 오늘은 제가 회장님의 사정 관리를 해줄게요<emoji=heart04> 응…… 후우윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「大丈夫ですよ<emoji=heart04>\u3000気持ち良くなりたいのは私も一緒ですから、会長さんが好きなのをしてあげます<emoji=heart04>」"
translation = "「괜찮아요<emoji=heart04> 기분 좋아지고 싶은 건 저도 마찬가지니까 회장님이 좋아하는 걸 해줄게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「行きますよ～？\u3000んっ――ふううぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「갑니다~? 응── 후우우우우~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんがおま○こをきゅうぅっと強く締め付ける。"
translation = "트레지안나 씨가 보지를 꾸욱 하고 강하게 조인다."

[[dialogue]]
speaker = "unk"
original = "彼女が得意な『膣締め』だ。"
translation = "그녀의 장기인 『질 조이기』다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んっ<emoji=heart04><emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>」"
translation = "「응<emoji=heart04><emoji=heart04> 후우윽<emoji=heart04> 흥<emoji=heart04> 흥<emoji=heart04> 흥<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁぁっ<emoji=heart04>\u3000んっ……んうぅっ<emoji=heart04>\u3000ふうぅっ……んんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 응…… 응으윽<emoji=heart04> 후우윽…… 응<emoji=heart04> 흥<emoji=heart04> 응<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うあぁっ……！\u3000トレジアンナさん、これ気持ち良すぎるから、すぐにイっちゃう……！」"
translation = "「으아아……! 트레지안나 씨, 이거 너무 기분 좋아서 금방 가버릴 것 같아……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んんぅ<emoji=heart04>\u3000もう出ちゃうんですか～？\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>」"
translation = "「응으으<emoji=heart04> 벌써 나오려고요~? 흥<emoji=heart04> 흥<emoji=heart04> 흥<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ、ダメだ！\u3000イっ――！」"
translation = "「큭, 안 돼! 가──!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「残念ですけど、ダメで～す<emoji=heart04>」"
translation = "「아쉽지만 안~ 돼요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ！？」"
translation = "「에!?」"

[[dialogue]]
speaker = "unk"
original = "本当にイキそうだったのに、俺は射精することができなかった。"
translation = "정말로 갈 것 같았는데 나는 사정할 수 없었다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ごめんなさい♪\u3000また『射精止めの魔法』を使っちゃいました<emoji=heart04>\u3000てへぺろ☆」"
translation = "「미안해요♪ 또 『사정 방지 마법』을 써버렸답니다<emoji=heart04> 데헤페로☆」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんな……！\u3000もう少しでイケそうなのに！」"
translation = "「말도 안 돼……! 조금만 더 하면 갈 수 있는데!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁぁっ<emoji=heart04>\u3000会長さん、その顔すごくエッチです<emoji=heart04>\u3000撮影魔法で保存しておかないとっ<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 회장님, 그 얼굴 정말 야해요<emoji=heart04> 촬영 마법으로 보존해둬야지<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっ……トレジアンナさん、顔を撮られるのは恥ずかしいですって！」"
translation = "「잠깐…… 트레지안나 씨, 얼굴 찍히는 건 부끄럽다니까요!」"

[[dialogue]]
speaker = "unk"
original = "羞恥心で顔が熱くなる。"
translation = "수치심에 얼굴이 달아오른다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふうぅぅっ<emoji=heart04>\u3000その顔も可愛いですっ<emoji=heart04>\u3000おま○こキュンキュンしちゃいます<emoji=heart04>\u3000はあぁっ……んんぅっ<emoji=heart04>」"
translation = "「후우우윽<emoji=heart04> 그 얼굴도 귀여워요<emoji=heart04> 보지가 큥큥거려요<emoji=heart04> 하아아…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「大丈夫ですよ～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あくまで私が楽しむ用の、ハメ撮りコレクションですから<emoji=heart04>\u3000はぁん<emoji=heart04>\u3000誰にも見せたりしません<emoji=heart04>」"
translation = "「괜찮아요~<emoji=heart04> 응<emoji=heart04> 어디까지나 제가 즐길 용도인 섹스 영상 컬렉션이니까요<emoji=heart04> 하앙<emoji=heart04> 아무한테도 안 보여줄게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うぅっ……」"
translation = "「으윽……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふうぅっ<emoji=heart04>\u3000会長さんの可愛い反応を見てたら、私も興奮してきちゃいました<emoji=heart04>\u3000あっ……んんっ<emoji=heart04>」"
translation = "「후우윽<emoji=heart04> 회장님의 귀여운 반응을 보니까 저도 흥분되기 시작했어요<emoji=heart04> 앗…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「だからもっと、激しく動いちゃいますね<emoji=heart04>」"
translation = "「그러니까 더 격렬하게 움직일게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁっ<emoji=heart04>\u3000じゃあ、行きますよ～？」"
translation = "「하아아<emoji=heart04> 그럼 갑니다~?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んっ――――<emoji=heart04><emoji=heart04>」"
translation = "「응────<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んんうぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあぁっ、んんぅっ<emoji=heart04>\u3000あっ、んっ、ふうぅっ<emoji=heart04>\u3000んうぅっ、はあぁっ、んんっ<emoji=heart04>\u3000んっ、はあぁっ、ふうぅっ<emoji=heart04>」"
translation = "「응응으윽<emoji=heart04><emoji=heart04><emoji=heart04> 하아아, 응으윽<emoji=heart04> 앗, 응, 후우윽<emoji=heart04> 응으윽, 하아아, 응<emoji=heart04> 응, 하아아, 후우윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はああぁ～っ<emoji=heart04>\u3000おち○ちん、気持ちいいですぅっ<emoji=heart04>\u3000んっ、あっ、んうぅっ<emoji=heart04>\u3000はあぁっ、んっ、んんぅっ……<emoji=heart04>」"
translation = "「하아아아~<emoji=heart04> 자지 기분 좋아요오<emoji=heart04> 응, 앗, 응으윽<emoji=heart04> 하아아, 응, 응으윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おま○こ痺れちゃいますっ<emoji=heart04>\u3000んっ、ふうぅっ、はあぁっ<emoji=heart04>\u3000あっ、んっ、ふうぅっ<emoji=heart04>\u3000気持ちいいっ……<emoji=heart04>」"
translation = "「보지가 저릿저릿해요<emoji=heart04> 응, 후우윽, 하아아<emoji=heart04> 앗, 응, 후우윽<emoji=heart04> 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んふふっ<emoji=heart04>\u3000会長さんもすごい蕩けた顔しちゃってますよ～<emoji=heart04>\u3000そんなに気持ちいいんですか？\u3000んっ、はあぁっ、んうぅっ<emoji=heart04>」"
translation = "「응후후<emoji=heart04> 회장님도 엄청 황홀한 얼굴 하고 있다고요~<emoji=heart04> 그렇게 기분 좋나요? 응, 하아아, 응으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トレジアンナさん、気持ち良すぎてもう限界です……！\u3000もうイカせて下さい！」"
translation = "「트레지안나 씨, 너무 기분 좋아서 이제 한계예요……! 이제 가게 해주세요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んふぅっ<emoji=heart04>\u3000でも、そんなこと言ってぇ<emoji=heart04>\u3000会長さん、私に我慢させられるの、結構好きですよね～？」"
translation = "「응후<emoji=heart04> 하지만 그렇게 말하면서도<emoji=heart04> 회장님, 제가 참게 하는 거 꽤 좋아하죠?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私に意地悪される度に、おち○ちんビクビクさせて<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000快感で体が震えちゃってるの、気づいてるんですよ～？\u3000んふぅぅんっ<emoji=heart04>」"
translation = "「제가 심술부릴 때마다 자지 움찔움찔하면서<emoji=heart04> 아앙<emoji=heart04> 쾌감으로 몸 떨고 있는 거 다 알고 있거든요~? 응후우웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私も会長さんが情けない顔で気持ちいいって叫んでるところ見ると、はあぁん<emoji=heart04>\u3000興奮しちゃいます<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000これがウィンウィンってやつなんですね<emoji=heart04>」"
translation = "「저도 회장님이 한심한 얼굴로 기분 좋다고 외치는 거 보면 하아앙<emoji=heart04> 흥분돼버려요<emoji=heart04> 응으으<emoji=heart04> 이게 윈윈이라는 거네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はこくこくと頷きながら──"
translation = "나는 끄덕끄덕 고개를 끄덕이며──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……そうです！\u3000トレジアンナさんに意地悪されると、気持ち良くなっちゃうんです！」"
translation = "「윽…… 맞아요! 트레지안나 씨가 심술부리면 기분 좋아져 버려요!」"

[[dialogue]]
speaker = "unk"
original = "それを聞いたトレジアンナさんは、より一層興奮したように熱い吐息を漏らして……"
translation = "그 말을 들은 트레지안나 씨는 더욱 흥분한 듯 뜨거운 숨을 내뱉으며……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ゾクゾクしちゃいます<emoji=heart04><emoji=heart04>\u3000……ふわぁぁんっ<emoji=heart04>」"
translation = "「하아아아~~~~<emoji=heart04><emoji=heart04><emoji=heart04> 전율이 와요<emoji=heart04><emoji=heart04> ……후와아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さん、可愛いですっ<emoji=heart04>\u3000んっ、はあぁっ、あぁぁんっ<emoji=heart04>\u3000喘ぎ声もすごくエッチで、録音したくなっちゃいますっ<emoji=heart04>」"
translation = "「회장님, 귀여워요<emoji=heart04> 응, 하아아, 아아앙<emoji=heart04> 신음 소리도 너무 야해서 녹음하고 싶어질 정도예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ<emoji=heart04>\u3000はあぁっ、んんんっ<emoji=heart04>\u3000こんな情けない姿、サチさんたちには見せられませんね～<emoji=heart04>\u3000……あぁぁん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아아, 응응응<emoji=heart04> 이런 한심한 모습, 사치 씨네한테는 못 보여주겠네요~<emoji=heart04> ……아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「大丈夫ですよ～<emoji=heart04>\u3000会長さんの性欲は、これからも私がちゃ～んと<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000処理してあげますからっ<emoji=heart04>\u3000んっ、ふうぅっ<emoji=heart04>」"
translation = "「괜찮아요~<emoji=heart04> 회장님의 성욕은 앞으로도 제가 제대~로<emoji=heart04> 아앙<emoji=heart04> 처리해줄 테니까요<emoji=heart04> 응, 후우윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はああぁっ<emoji=heart04><emoji=heart04>\u3000私もそろそろ、イキそうになって来ちゃいました<emoji=heart04>\u3000はふぅぅん<emoji=heart04>」"
translation = "「하아아아<emoji=heart04><emoji=heart04> 저도 이제 갈 것 같아지기 시작했어요<emoji=heart04> 하후우웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「また『膣締め』しちゃいますからっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ギリギリまで我慢して、一緒に気持ち良くイっちゃいましょうねっ<emoji=heart04>\u3000んっ、ふうぅっ、はあぁっ<emoji=heart04>」"
translation = "「다시 『질 조이기』 할 테니까요<emoji=heart04> 앙<emoji=heart04> 마지막까지 참았다가 같이 기분 좋게 가버려요<emoji=heart04> 응, 후우윽, 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それじゃあ、ラストスパート行きますよ～？\u3000せ～のっ――<emoji=heart04><emoji=heart04>」"
translation = "「그럼 라스트 스퍼트 갑니다~? 하나~ 둘──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んふううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응후우우우~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 하아아<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んはぁっ……！\u3000ふうぅっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「응하아……! 후우윽<emoji=heart04> 응으윽<emoji=heart04> 아앙<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しいピストンと膣締めの合わせ技が生み出す強烈な快楽に、俺は大きな喘ぎ声を上げてしまう。"
translation = "격렬한 피스톤과 질 조이기의 합작이 만들어내는 강렬한 쾌락에 나는 커다란 신음을 내지르고 만다."

[[dialogue]]
speaker = "unk"
original = "それは彼女も同じようで、無我夢中の様子でお尻を上下に振る。"
translation = "그건 그녀도 마찬가지인 듯 정신없는 모습으로 엉덩이를 위아래로 흔든다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んああぁっ<emoji=heart04>\u3000来たっ<emoji=heart04>\u3000きましたっ<emoji=heart04>\u3000久しぶりの滅茶苦茶大きなアクメが来ちゃいますぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아<emoji=heart04> 왔다<emoji=heart04> 왔어요<emoji=heart04> 오랜만에 엄청나게 큰 오르가슴이 와버려요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、あっ、ふああぁっ<emoji=heart04><emoji=heart04>\u3000んっ、んうぅっ、んああぁっ<emoji=heart04><emoji=heart04>\u3000あっ、もうイクっ<emoji=heart04>\u3000イキますっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 후아아<emoji=heart04><emoji=heart04> 응, 응으윽, 응아아<emoji=heart04><emoji=heart04> 앗, 이제 가<emoji=heart04> 가요오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「魔法解きますから、会長さん<emoji=heart04>\u3000一緒にっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000来るくるくるっ<emoji=heart04><emoji=heart04>」"
translation = "「마법 풀 테니까 회장님<emoji=heart04> 같이<emoji=heart04><emoji=heart04> 앙<emoji=heart04> 온다온다온다아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んああああああっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아<emoji=heart04><emoji=heart04> 가<emoji=heart04><emoji=heart04> 가가각가가각가<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あああぁっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아────<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「イックうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다아아아아아아아아아아아아─────────!!<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아~~~~~~~~~~~~~~~~~!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精止めの魔法が解けた瞬間、俺のペニスから爆発するように大量の精液を吐き出した。"
translation = "사정 방지 마법이 풀린 순간, 내 페니스에서 폭발하듯 대량의 정액이 뿜어져 나왔다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「んあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長さんの精液、子宮にすごい勢いで入って来てますうぅ～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04> 회장님의 정액, 자궁에 엄청난 기세로 들어오고 있어요오오~~~~~~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "我慢に我慢を重ねた上での射精に、頭の中がチカチカするような解放感に包まれる。"
translation = "참고 참았던 끝에 이뤄진 사정에 머릿속이 번쩍이는 듯한 해방감에 휩싸인다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000お腹の中、１度でいっぱいになっちゃいますぅ……<emoji=heart04>\u3000熱くて、おま○こ震えちゃう<emoji=heart04>」"
translation = "「하아아아아아~~~~<emoji=heart04><emoji=heart04> 배 속이 한 번에 가득 차버려요……<emoji=heart04> 뜨거워서 보지가 떨려버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これ以上の気持ち良さは存在しない。そう思えるような凄まじい多幸感に包まれながら、射精の時を過ごす。"
translation = "이 이상의 기분 좋음은 존재하지 않는다. 그렇게 생각될 정도의 굉장한 다행감에 싸여 사정의 시간을 보낸다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふうぅぅ……<emoji=heart04>\u3000ようやく射精終わったみたいですねぇ<emoji=heart04>\u3000今日はいつも以上に長くて、すごかったです……んんぅっ<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 드디어 사정이 끝난 모양이네요<emoji=heart04> 오늘은 평소보다 길어서 대단했어요…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんがゆっくりと腰を上げて、ペニスを引き抜く。"
translation = "트레지안나 씨가 천천히 허리를 들어 페니스를 뽑아낸다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふふっ、いっぱい出ましたね<emoji=heart04>\u3000会長さんの、溢れて垂れて来ちゃってます……<emoji=heart04>」"
translation = "「후후후, 잔뜩 나왔네요<emoji=heart04> 회장님 거, 넘쳐서 줄줄 흐르고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はあぁ……ふうぅぅ……<emoji=heart04>」"
translation = "「하아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それにしても、やっぱり２人でするエッチは気持ちいいですね～……<emoji=heart04>」"
translation = "「그나저나 역시 둘이서 하는 섹스는 기분 좋네요~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さんと『セックスパートナー』になって、正解でした……<emoji=heart04>」"
translation = "「회장님과 『섹스 파트너』가 되어 정답이었어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ん？\u3000セックスパートナー？」"
translation = "「응? 섹스 파트너?」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさん、前はセックスフレンドって言ってたような……？"
translation = "트레지안나 씨, 전에는 섹스 프렌드라고 했던 것 같은데……?"

[[dialogue]]
speaker = "unk"
original = "俺がそんな些細な疑問を口にすると──"
translation = "내가 그런 사소한 의문을 입에 담자──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「え？\u3000ああ、そうですね……。やってることは実質変わらないんですけど、でも……」"
translation = "「에? 아, 그렇네요……. 하는 일은 실질적으로 다르지 않지만 그래도……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私、会長さんとの関係は大切にしたいので、それならパートナーって言った方が語弊がないかな～、と」"
translation = "「저는 회장님과의 관계를 소중히 하고 싶으니까, 그렇다면 파트너라고 하는 게 오해의 소지가 없을까 해서요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「まあ、自己満足なんですけどね……てへぺろ<emoji=heart04>」"
translation = "「뭐, 자기만족이지만요…… 데헤페로<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……トレジアンナさん！」"
translation = "「윽…… 트레지안나 씨!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ひゃっ！？\u3000会長さん……どうしたんですか、いきなり？」"
translation = "「히약!? 회장님…… 갑자기 왜 그러세요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「よくわからないですけど、なんかやる気ムンムンに出ちゃってる感じですか？」"
translation = "「잘 모르겠지만 왠지 의욕이 불끈불끈 솟아오른 느낌인가요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「まあ、私的にはもう１回エッチできて、役得ですけど……あんっ<emoji=heart04>」"
translation = "「뭐, 제 입장에서는 한 번 더 섹스할 수 있어서 이득이지만요…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、今度は俺がトレジアンナさんを押し倒して、愛を込めて腰を動かすのだった――"
translation = "그 후 이번에는 내가 트레지안나 씨를 덮쳐 사랑을 담아 허리를 움직였다──"

