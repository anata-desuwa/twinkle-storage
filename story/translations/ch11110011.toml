[[dialogue]]
speaker = "unk"
original = "第１話,新たな監視者？,P"
translation = "제1화, 새로운 감시자?, P"

[[dialogue]]
speaker = "unk"
original = "今日は星徒会長として、各部活の様子を見て回っていたのだが……"
translation = "오늘은 성도회장으로서, 각 동아리의 모습을 둘러보고 있었는데……"

[[dialogue]]
speaker = "unk"
original = "（視線を感じる……）"
translation = "(시선이 느껴져……)"

[[dialogue]]
speaker = "梨緒"
original = "「じー……」"
translation = "「지이……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「じー……」"
translation = "「지이……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「じー……」"
translation = "「지이……」"

[[dialogue]]
speaker = "アポロ"
original = "「じー……」"
translation = "「지이……」"

[[dialogue]]
speaker = "unk"
original = "（すごく視線を感じる……！）"
translation = "(엄청난 시선이 느껴져……!)"

[[dialogue]]
speaker = "ベアトリス"
original = "（今のところ真面目に活動にしてる……よね？\u3000いい会長さんに見えるけど……）"
translation = "(지금까지는 성실하게 활동하고 있네…… 그치? 좋은 회장님으로 보이지만……)"

[[dialogue]]
speaker = "ナターシャ"
original = "（そだねー）"
translation = "(그러게ー)"

[[dialogue]]
speaker = "アポロ"
original = "（ああ、いつもの魔王だな）"
translation = "(아아, 평소의 마왕이군)"

[[dialogue]]
speaker = "梨緒"
original = "（だがいつ彼が悪に堕ちるかわからない。気を緩めないようにな）"
translation = "(하지만 언제 그가 악으로 타락할지 몰라. 방심하지 않도록 해라)"

[[dialogue]]
speaker = "ベアトリス"
original = "（う、うん。会長さんから目を離さないように……）"
translation = "(으, 응. 회장님에게서 눈을 떼지 않도록……)"

[[dialogue]]
speaker = "ベアトリス"
original = "（きゃっ）"
translation = "(꺄앗)"

[[dialogue]]
speaker = "ベアトリス"
original = "「あいたた……こけちゃった～……」"
translation = "「아야야…… 넘어져 버렸다～……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、こんにちは、会長さん。──って」"
translation = "「아, 안녕하세요, 회장님. ──어라」"

[[dialogue]]
speaker = "ベアトリス"
original = "「見つかっちゃった～～～～～っ！！？」"
translation = "「들켜버렸다～～～～～!!?」"

[[dialogue]]
speaker = "梨緒"
original = "「気にするな。気付かれていようといまいと、私たちのやるべきことは変わらない」"
translation = "「신경 쓰지 마라. 들켰든 아니든, 우리가 해야 할 일은 변하지 않아」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、会長さんはその前から気付いてたと思うけどね」"
translation = "「뭐, 회장님은 그전부터 눈치채고 있었을 것 같지만 말이야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はーい、こんにちは、会長さん。おなじみ選管だよ」"
translation = "「안녕, 안녕하세요, 회장님. 익숙한 선관이야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そんなにおなじみだったかな……？」"
translation = "「그렇게 익숙했었나……?」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしもいるぞ！\u3000よ、元気か魔王！」"
translation = "「나도 있다구! 여어, 잘 지내냐 마왕!」"

[[dialogue]]
speaker = "unk"
original = "元気だけど……俺に何か用事？"
translation = "잘 지내긴 하는데…… 나한테 무슨 용건이야?"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、いえ、用というか……選管は会長さんを監視するものだって、梨緒ちゃんに言われまして」"
translation = "「아, 아뇨, 용건이라기보다…… 선관은 회장님을 감시하는 것이라고 리오 짱이 말해서요」"

[[dialogue]]
speaker = "梨緒"
original = "「選挙管理委員会は君を監視し、星徒会長に相応しくないと判断すればリコールを発議する」"
translation = "「선거관리위원회는 너를 감시하고, 성도회장에 어울리지 않는다고 판단하면 리콜을 발의한다」"

[[dialogue]]
speaker = "梨緒"
original = "「用の有る無しの問題ではない。むしろ何もない時こそ、目を光らせておかなければいけないんだ」"
translation = "「용건이 있고 없고의 문제가 아니다. 오히려 아무 일도 없을 때일수록, 눈을 번뜩이고 있어야만 해」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……というわけで会長さんの監視に来ました。会長さんの一挙手一投足を見逃しませんからっ」"
translation = "「……그런 이유로 회장님의 감시를 하러 왔습니다. 회장님의 일거수일투족을 놓치지 않을 테니까요!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「会長さんから絶対に目を離しませんから。じぃ～～～～～～～っ」"
translation = "「회장님에게서 절대 눈을 떼지 않을 거예요. 지이～～～～～～이」"

[[dialogue]]
speaker = "ベアトリス"
original = "「へくちっ」"
translation = "「에취!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、今のは違いますよっ！？\u3000目を離してませんからっ、ホントですからねっ」"
translation = "「아, 방금 건 아니에요!? 눈 안 뗐으니까요, 진짜라니까요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「会長さんのこと、じっと見てますからね。じーーーーーーーーっ」"
translation = "「회장님을 빤히 보고 있을 테니까요. 지ーーーーーーーー이」"

[[dialogue]]
speaker = "ベアトリス"
original = "「いたっ！？\u3000目にゴミが入った～っ！？」"
translation = "「아얏!? 눈에 먼지가 들어갔어～!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ベアトはかわいいね」"
translation = "「베아토는 귀엽네」"

[[dialogue]]
speaker = "梨緒"
original = "「……そうだな」"
translation = "「……그렇군」"

[[dialogue]]
speaker = "アポロ"
original = "「監視するならちゃんと監視しろ。監査として心配になるぞ」"
translation = "「감시하려면 제대로 감시해라. 감사로서 걱정되는군」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ごめんなさ～～いっ！」"
translation = "「죄송해용～～!」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスはどうして選管に入ったんだ？"
translation = "베아트리스는 어째서 선관에 들어온 거야?"

[[dialogue]]
speaker = "ベアトリス"
original = "「えっと……梨緒ちゃんが言ってたんです。『最も強い人が、正しい道を往くとは限らない』って」"
translation = "「엣…… 리오 짱이 말했어요. 『가장 강한 사람이, 반드시 올바른 길을 간다고는 할 수 없다』라고요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「会長さんを疑ってるとか、信じてないとかじゃないんですけど、確かにそうだなって思って」"
translation = "「회장님을 의심한다거나, 믿지 않는다는 건 아니지만, 확실히 그렇구나 싶어서」"

[[dialogue]]
speaker = "ベアトリス"
original = "「誰だって間違ったり、つい悪いことをしたり、自分を止められないことはありますから。その時は他の誰かが止めないといけません」"
translation = "「누구나 실수하거나, 무심코 나쁜 짓을 하거나, 자신을 멈출 수 없을 때가 있으니까요. 그때는 다른 누군가가 멈춰줘야만 해요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私なんかに止められるかはわからないですけど……」"
translation = "「저 같은 게 멈출 수 있을지는 모르겠지만요……」"

[[dialogue]]
speaker = "unk"
original = "俺にもし何かあったらよろしく"
translation = "나한테 만약 무슨 일이 생기면 부탁해"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、はい、もし会長さんが悪い魔王になったら、頑張って止めますっ」"
translation = "「아, 네, 만약 회장님이 나쁜 마왕이 되면, 열심히 멈춰볼게요!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「って、何かってなんですか！？\u3000本当に悪の魔王になっちゃうかもなんですか！？」"
translation = "「랄까, 무슨 일이라니 그게 뭐예요!? 정말로 악의 마왕이 되어버릴지도 모르는 건가요!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……万が一の場合？\u3000そ、そうですよね……闇堕ちしちゃう予定なんてないですよね」"
translation = "「……만일의 경우? 그, 그렇죠…… 흑화할 예정 같은 건 없으시죠」"

[[dialogue]]
speaker = "unk"
original = "でもその前に……"
translation = "하지만 그전에……"

[[dialogue]]
speaker = "ベアトリス"
original = "「……自己紹介？\u3000はっ、そうでした！\u3000最初びっくりして逃げちゃったから、ちゃんと挨拶できてませんでした！」"
translation = "「……자기소개? 핫, 그랬었죠! 처음에 깜짝 놀라서 도망쳐버리는 바람에, 제대로 인사를 못 드렸어요!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私、２年生のベアトリス・シェイドですっ。星騎士になるために魔界から流星市国にやってきました」"
translation = "「저, 2학년 베아트리스 셰이드입니다. 성기사가 되기 위해 마계에서 유성시국으로 왔어요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私の目標はみんなを……世界すべてを救うこと。誰一人切り捨てることなく守りたいです」"
translation = "「제 목표는 모두를…… 세계 전부를 구하는 것. 단 한 사람도 저버리지 않고 지키고 싶어요」"

[[dialogue]]
speaker = "unk"
original = "今度こそよろしく、ベアトリス"
translation = "이번에야말로 잘 부탁해, 베아트리스"

[[dialogue]]
speaker = "ベアトリス"
original = "「はい！\u3000よろしくお願いします！」"
translation = "「네! 잘 부탁드립니다!」"

[[dialogue]]
speaker = "unk"
original = "俺は星徒会長で、ベアトリスは監視する側だけど、きっと志は同じ。"
translation = "나는 성도회장이고, 베아트리스는 감시하는 쪽이지만, 분명 뜻은 같을 것이다."

[[dialogue]]
speaker = "unk"
original = "遠くから来た新たな仲間を得て、心強く思うのだった。"
translation = "멀리서 온 새로운 동료를 얻어, 든든하게 생각하는 것이었다."

