[[dialogue]]
speaker = "unk"
original = "第１話,ノヴァフォームのお姉ちゃん♪,P"
translation = "제1화, 노바 폼 누나♪, P"

[[dialogue]]
speaker = "unk"
original = "ロストアイテムをめぐる一件を経て、サーシャさんは新たな可能性──ノヴァフォームを獲得した。"
translation = "로스트 아이템을 둘러싼 일련의 사건을 거쳐, 사샤 씨는 새로운 가능성──노바 폼을 획득했다."

[[dialogue]]
speaker = "unk"
original = "学園の先輩として、星騎士として、そして俺の恋人として。サーシャさんはとても心強いパートナーとなってくれた……のはいいのだけど。"
translation = "학원 선배로서, 성기사로서, 그리고 내 연인으로서. 사샤 씨는 매우 든든한 파트너가 되어주었다……는 건 좋지만."

[[dialogue]]
speaker = "unk"
original = "実はサーシャさんがノヴァフォームを得てからというもの、ちょっとだけ困った事になっていて……"
translation = "사실 사샤 씨가 노바 폼을 얻고 나서부터, 조금 곤란한 일이 생겨서……"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「は～い、会長くん。お姉ちゃんの膝枕から逃げちゃダ～メ♪\u3000ぎゅ～うっ<emoji=heart04>」"
translation = "「자~ 회장군. 누나의 무릎베개에서 도망치면 안~ 돼♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "誰か来るかも……！"
translation = "누가 올지도 몰라요……!"

[[dialogue]]
speaker = "unk"
original = "星徒会室で膝枕はまずいです……！"
translation = "성도회실에서 무릎베개는 곤란합니다……!"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「え～？\u3000でもでも、こうやってイチャイチャするのも大切なお仕事のうちでしょう？」"
translation = "「에~? 하지만 하지만, 이렇게 꽁냥거리는 것도 중요한 업무 중 하나잖아?」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「トワちゃん先生からのお願いなんだから、しっかり励まないとね～♪\u3000というわけでー、なでなでも継続～♪\u3000よしよ～し、よしよ～し<emoji=heart04>」"
translation = "「토와짱 선생님의 부탁이니까, 제대로 힘내야지~♪ 그런 의미에서~, 쓰담쓰담도 계속~♪ 착하다~ 착해~<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あ～ん。やっぱり会長くん、とっても可愛い～。このまま寮までお持ち帰りしたくなっちゃうわ～<emoji=heart04>」"
translation = "「아앙. 역시 회장군, 너무 귀여워~. 이대로 기숙사까지 보쌈해 가고 싶어지네~<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あら、お客さんかしら？\u3000は～い、どうぞ～♪」"
translation = "「어라, 손님인가? 네~ 들어오세요~♪」"

[[dialogue]]
speaker = "unk"
original = "まだ膝枕をしたままなのに──！"
translation = "아직 무릎베개를 한 상태인데──!"

[[dialogue]]
speaker = "unk"
original = "──ちょっと待ってください！？"
translation = "──잠깐만 기다려 주세요!?"

[[dialogue]]
speaker = "ソフィア"
original = "「失礼します。流星学園星徒会より、次回の合同訓練の資料を──」"
translation = "「실례합니다. 유성 학원 성도회로부터, 다음 합동 훈련 자료를──」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あら～、ソフィ。いらっしゃ～い♪」"
translation = "「어머~ 소피. 어서 와~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「──って！？\u3000なな、何をしているんですか姉さんっ！？」"
translation = "「──앗!? 뭐, 뭐 하고 있는 건가요 언니!?」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「何って、もちろん星騎士のお仕事よ～♪」"
translation = "「뭐냐니, 당연히 성기사 업무지~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「どこの世界に、膝枕で頭を撫でるお仕事があるんですか！\u3000訪ねてきたのが私で良かったです……はやく離れてくださいっ！」"
translation = "「세상 어디에 무릎베개를 하고 머리를 쓰다듬는 업무가 있나요! 찾아온 게 저라서 다행이지…… 어서 떨어지세요!」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あ～ん。せっかくごねる会長くんをお膝に捕まえてたのに～……」"
translation = "「아앙. 겨우 투덜대는 회장군을 무릎에 붙잡아 뒀는데~……」"

[[dialogue]]
speaker = "ソフィア"
original = "「お２人はお付き合いしてるんですから、仲良くするなとは言いません。けれど分別は付けてください！\u3000妹として恥ずかしいです」"
translation = "「두 분이 사귀고 계시니까 사이좋게 지내지 말라는 건 아니에요. 하지만 분별은 지켜주세요! 동생으로서 부끄럽습니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「ただでさえカフェやら図書館やらで、イチャイチャしてる姉さんたちの話、友達から聞かされてるんですから……！」"
translation = "「안 그래도 카페니 도서관이니 해서, 꽁냥거리는 언니네 이야기, 친구들한테 듣고 있다고요……!」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あらあら、うふふ♪\u3000とっても有名になっちゃってるのね～<emoji=heart04>」"
translation = "「어라어라, 우후후♪ 아주 유명해져 버렸나 보네~<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「笑ってる場合じゃありません！\u3000まったくもう……」"
translation = "「웃을 때가 아니에요! 정말이지……」"

[[dialogue]]
speaker = "ソフィア"
original = "「というかどうして、戦闘訓練でもないのにノヴァフォームになっているんです？」"
translation = "「그보다 왜 전투 훈련도 아닌데 노바 폼 상태인 거죠?」"

[[dialogue]]
speaker = "ソフィア"
original = "「あれですか。会長さんからコスプレでも頼まれたんですか？\u3000だったらちょっと引いちゃうかもしれません……」"
translation = "「그건가요. 회장님한테 코스프레라도 부탁받은 건가요? 그렇다면 좀 정떨어질지도 모르겠네요……」"

[[dialogue]]
speaker = "unk"
original = "ひどい！？"
translation = "너무해!?"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あ～ん。さっきも言ったでしょう？\u3000星騎士のお仕事をしてたの～」"
translation = "「아앙. 아까도 말했잖아? 성기사 업무를 하고 있었다니까~」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「変身をしてるのも、膝枕をしてたのも、頭をナデナデしてたのも、ぜ～んぶお仕事に必要だったからなのよ～？」"
translation = "「변신을 하고 있는 것도, 무릎베개를 하고 있던 것도, 머리를 쓰담쓰담하던 것도, 저언부 업무에 필요했기 때문이라구?」"

[[dialogue]]
speaker = "ソフィア"
original = "「そんなおバカな話があるわけないでしょう。信じませんよ、私は」"
translation = "「그런 바보 같은 소리가 있을 리 없잖아요. 안 믿어요, 전」"

[[dialogue]]
speaker = "unk"
original = "いや、それが実は──"
translation = "아니, 그게 사실은──"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「覚醒条件も曖昧だし、戦闘能力は上がるけれど燃費は悪いしー……」"
translation = "「각성 조건도 애매하고, 전투 능력은 올라가지만 연비는 나쁘고~……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「目覚めたノヴァフォームの能力をさらに引き上げる方法も、手探り状態と来ているわ」"
translation = "「눈뜬 노바 폼의 능력을 더욱 끌어올리는 방법도, 아직 더듬어가는 상태거든」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「だから少しでもデータを集める必要があって、お姉ちゃんがお願いされたってわけね～♪」"
translation = "「그래서 조금이라도 데이터를 모을 필요가 있어서, 누나가 부탁받았다는 거네~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「でも、スキンシップをする必要はないじゃないですか！」"
translation = "「하지만, 스킨십을 할 필요는 없잖아요!」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「いいえソフィ、それは違うわ。精神的な成長や満足が、星力に影響を及ぼすっていう説を聞いたことはあるでしょう？」"
translation = "「아니 소피, 그건 틀려. 정신적인 성장이나 만족이 성력에 영향을 미친다는 설을 들어본 적 있지?」"

[[dialogue]]
speaker = "ソフィア"
original = "「それは……はい。私たち星騎士はメンタルの影響を強く受けます」"
translation = "「그건…… 네. 우리 성기사는 멘탈의 영향을 강하게 받죠」"

[[dialogue]]
speaker = "ソフィア"
original = "「太陽フレアの際、フィオナ会長がウェンディングドレスに変身してしまったことも、そのせいだと聞いていますし……」"
translation = "「태양 플레어 때, 피오나 회장님이 웨딩드레스로 변신해 버린 것도 그 때문이라고 들었고……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ね～？\u3000その常識がノヴァフォームに当てはまるのかも、検証しなくちゃいけないの」"
translation = "「그치~? 그 상식이 노바 폼에도 적용되는지 검증해야 해」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ノヴァフォームを得ていることに加えて、会長くんという異性のパートナーがいる私は、データ収集にぴったりみたいでね♪」"
translation = "「노바 폼을 얻은 데다 회장군이라는 이성 파트너가 있는 나는 데이터 수집에 딱인 것 같아서 말이야♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「恋愛感情がどの程度新しい戦闘服に影響を与えるかも測定したいから、できるかぎり変身して過ごして、って言われちゃってるというわけなの～<emoji=heart04>」"
translation = "「연애 감정이 어느 정도 새로운 전투복에 영향을 주는지도 측정하고 싶으니까, 가능한 한 변신해서 지내달라고 부탁받았다는 거란다~<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「むむむ……そういう事情があったんですか……」"
translation = "「으으으…… 그런 사정이 있었나요……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「そうなのよ～……本当はお姉ちゃんもすっっっごく恥ずかしいんだけど～。先生に言われちゃったなら、仕方ないでしょう？」"
translation = "「그렇단다~…… 사실 누나도 저어어어엉말 부끄럽지만~. 선생님이 말씀하셨다면 어쩔 수 없잖아?」"

[[dialogue]]
speaker = "ソフィア"
original = "「絶対に嘘です。姉さんはそんなことで恥ずかしがるようなタイプじゃありません」"
translation = "「절대 거짓말이에요. 언니는 그런 걸로 부끄러워할 타입이 아니잖아요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あ～ん、ひどーい♪」"
translation = "「아앙, 너무해~♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「でもこれでわかってくれたでしょう？\u3000これも立派なお仕事なのよ」"
translation = "「하지만 이제 이해했지? 이것도 훌륭한 업무란다」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんも大変ですね……先生からそんなお願いをされるだなんて。お察しします」"
translation = "「회장님도 고생이 많으시네요…… 선생님께 그런 부탁을 받으시다니. 위로 드립니다」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「うふふ<emoji=heart04>\u3000というわけで～、イチャイチャ再開～<emoji=heart04>\u3000ぎゅ～う～っ<emoji=heart04>」"
translation = "「우후후<emoji=heart04> 그런 의미에서~, 꽁냥거림 재개~<emoji=heart04> 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "むぎゅうぅ……！"
translation = "으으윽……!"

[[dialogue]]
speaker = "ソフィア"
original = "「まあ星騎士のお仕事ならしょうがありません……」"
translation = "「뭐 성기사 업무라면 어쩔 수 없죠……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「うふふ♪\u3000ソフィの誤解も解けたことだし、いっぱいイチャイチャしましょうね～？」"
translation = "「우후후♪ 소피의 오해도 풀렸으니, 잔뜩 꽁냥거리자~?」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ほっぺにちゅ～<emoji=heart04>\u3000うふふ、照れちゃってる～、可愛いわ～っ<emoji=heart04>」"
translation = "「볼에 츄~<emoji=heart04> 우후후, 수줍어하고 있네~, 귀여워라~<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「これは姉さんが楽しんでいるわけではなく……学術研究のために必要なことで……」"
translation = "「이건 언니가 즐기고 있는 게 아니라…… 학술 연구를 위해 필요한 일이고……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あ～ん<emoji=heart04>\u3000頭もなでなで～、おでこにもちゅっちゅっ、ちゅ～っ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 머리도 쓰담쓰담~, 이마에도 츄츄, 츄~<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「や──やっぱりダメです！\u3000死ぬほど恥ずかしいです！！\u3000姉さんっ、人前でベタベタするのはやめてくださいっ……！\u3000お願いですからっ！」"
translation = "「여──역시 안 되겠어요! 죽을 만큼 부끄럽다고요!! 언니, 남들 앞에서 달라붙는 건 그만두세요……! 부탁이니까요!」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「止めないでソフィ！\u3000お姉ちゃん、星体力学の発展のために一生懸命なの！\u3000これは三界の平和のためなのよ～！」"
translation = "「말리지 마 소피! 누나, 성체역학의 발전을 위해 열심히 하는 거야! 이건 삼계의 평화를 위해서라구~!」"

[[dialogue]]
speaker = "ソフィア"
original = "「認められません！\u3000離れてください～っ！」"
translation = "「인정 못 해요! 떨어지세요~!」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームはまだ不明瞭な点が多いから、様々な観点からアプローチしていかなくてはならない──それはわかる。"
translation = "노바 폼은 아직 불명확한 점이 많기에, 다양한 관점에서 접근해야 한다── 그건 이해한다."

[[dialogue]]
speaker = "unk"
original = "だけどスキンシップ大好きのサーシャさんが大義名分を得てしまったことで、俺の日常はこんな風に、隙あらば抱きしめられてしまう羽目になったのだった──"
translation = "하지만 스킨십을 좋아하는 사샤 씨가 대의명분을 얻어버린 탓에, 내 일상은 이런 식으로 틈만 나면 껴안기는 신세가 되어버린 것이었다──"

