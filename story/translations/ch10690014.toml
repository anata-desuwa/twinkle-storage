[[dialogue]]
speaker = "unk"
original = "第４話,セシアの恋人体験,P"
translation = "제4화, 세시아의 연인 체험, P"

[[dialogue]]
speaker = "unk"
original = "セシアとの付き合いも長くなってきた、ある休日。俺は彼女に誘われて、街へと<b>デート</b>にやってきていた。"
translation = "세시아와 알고 지낸 지도 꽤 된 어느 휴일. 나는 그녀의 권유로 거리로 **데이트**를 하러 나와 있었다."

[[dialogue]]
speaker = "セシア"
original = "「会長、今日はわたくしのお願いを聞いてくれてありがとう。男の人とのデートは初めてだから、わくわくするわ♪」"
translation = "「회장, 오늘 내 부탁을 들어줘서 고마워. 남자랑 데이트하는 건 처음이라 설레♪」"

[[dialogue]]
speaker = "unk"
original = "そもそもなんでセシアとデートすることになったのかというと、それは昨日、セシアと一緒に、大聖堂カフェテリアで旗付きチキンライスを食べていた時のこと――"
translation = "애초에 왜 세시아와 데이트를 하게 되었느냐 하면, 그것은 어제 세시아와 함께 대성당 카페테리아에서 깃발 치킨라이스를 먹고 있을 때의 일──"

[[dialogue]]
speaker = "セシア"
original = "「会長、明日は休日でしょう？\u3000なにか用事とかあるかしら？\u3000もしよければなんだけど……わたくしとデートをしない？」"
translation = "「회장, 내일은 휴일이지? 무슨 볼일이라도 있니? 혹시 괜찮다면…… 나랑 데이트하지 않을래?」"

[[dialogue]]
speaker = "セシア"
original = "「――ええ、そうよ。２人で街に出かけて、デートをするの。わたくし、最近、恋愛に興味を持っていてね」"
translation = "「──응, 맞아. 둘이서 거리에 나가서 데이트를 하는 거야. 나 요즘 연애에 관심을 가지고 있거든.」"

[[dialogue]]
speaker = "セシア"
original = "「知識としては頭の中に蓄積されているけれど、せっかく人間界を自由に動けるようになったのだし、恋愛を体験してみたいと思ったのよ。だから――」"
translation = "「지식으로선 머릿속에 축적되어 있지만 모처럼 인간계를 자유롭게 움직일 수 있게 되었으니 연애를 체험해보고 싶다고 생각했어. 그러니까──」"

[[dialogue]]
speaker = "セシア"
original = "「会長、わたくしと『恋人体験』してくれないかしら？」"
translation = "「회장, 나랑 『연인 체험』 해주지 않겠니?」"

[[dialogue]]
speaker = "セシア"
original = "「それじゃあ、まずは恋人らしく手を繋ぎましょう」"
translation = "「그럼 우선 연인답게 손을 잡자.」"

[[dialogue]]
speaker = "セシア"
original = "「ん……♪\u3000ふふっ、今思ったけど、会長の手を握るのはこれが初めてね」"
translation = "「응……♪ 후훗, 지금 생각해보니 회장 손을 잡는 건 이게 처음이네.」"

[[dialogue]]
speaker = "セシア"
original = "「会長の手、大きくて温かいわ。ママの手はよく握るけれど、男の人の手も悪くないわね♪」"
translation = "「회장 손, 크고 따뜻해. 마마들 손은 자주 잡지만 남자의 손도 나쁘지 않네♪」"

[[dialogue]]
speaker = "unk"
original = "デートの相手は、俺でよかったのか？"
translation = "데이트 상대, 나로 괜찮았던 거야?"

[[dialogue]]
speaker = "セシア"
original = "「あら、どうして？\u3000――ママ認定できる男の人を見つけた方がよかったんじゃないかって？」"
translation = "「어머, 왜? ──마마로 인정할 수 있는 남자를 찾는 게 낫지 않았겠냐고?」"

[[dialogue]]
speaker = "セシア"
original = "「それはもちろん、考えてみたりしたけれど……でも、わたくしはやっぱり、デートをするならあなたがいいなって思ったのよ」"
translation = "「그건 물론 생각해보기도 했지만…… 하지만 나는 역시 데이트를 한다면 당신이 좋겠다고 생각했어.」"

[[dialogue]]
speaker = "セシア"
original = "「あなたはわたくしのママじゃないから」"
translation = "「당신은 내 마마가 아니니까.」"

[[dialogue]]
speaker = "セシア"
original = "「あなたと一緒に日々を過ごしたり、リクリエと戦ったりする中で、いざという時、頼れる男の人であることを、わたくしは知っているわ」"
translation = "「당신과 일상을 보내거나 리크리에와 싸우는 중에 유사시 의지할 수 있는 남자라는 걸 나는 알고 있어.」"

[[dialogue]]
speaker = "セシア"
original = "「プラスポイントが沢山ある。でも、不思議とあなたのことはママと呼ぶ気にならないの」"
translation = "「플러스 포인트가 많이 있어. 하지만 신기하게도 당신은 마마라고 부를 마음이 안 생겨.」"

[[dialogue]]
speaker = "セシア"
original = "「だから、恋人体験の相手になって欲しいって思ったのよ」"
translation = "「그래서 연인 체험 상대가 되어줬으면 좋겠다고 생각한 거야.」"

[[dialogue]]
speaker = "unk"
original = "（なんか少し照れるな……）"
translation = "(왠지 조금 쑥스러운데……)"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、街で評判のスイーツ店でパフェを食べることに。"
translation = "그러고 나서 우리는 거리에서 평판 좋은 디저트 가게에서 파페를 먹기로 했다."

[[dialogue]]
speaker = "セシア"
original = "「いつもはわたくしがママたちに甘えているけど、今日は会長の恋人だもの。わたくしが甘やかす番よね♪」"
translation = "「평소엔 내가 마마들한테 어리광부리지만 오늘은 회장의 연인인걸. 내가 어리광 받아줄 차례지♪」"

[[dialogue]]
speaker = "セシア"
original = "「というわけで、はい。パフェを食べさせてあげるわ。あ～ん♪」"
translation = "「그런 의미에서, 자. 파페 먹여줄게. 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "少しどころじゃなく恥ずかしいんだけど！？"
translation = "조금 정도가 아니라 엄청 부끄러운데!?"

[[dialogue]]
speaker = "セシア"
original = "「え？\u3000恋人はこういうことをするものだと、わたくしの中に蓄積されていたけれど、間違っていたかしら？」"
translation = "「에? 연인은 이런 걸 하는 거라고 내 안에 축적되어 있었는데 틀렸니?」"

[[dialogue]]
speaker = "セシア"
original = "「――小さい子に食べさせてもらってるのが恥ずかしい？\u3000むむっ……なんだか今、ちょっと胸がモヤっとしたわ」"
translation = "「──작은 아이가 먹여주는 게 부끄러워? 으음…… 왠지 지금 좀 가슴이 답답해졌어.」"

[[dialogue]]
speaker = "セシア"
original = "「会長はわたくしから食べさせてもらうのは、嫌なの？」"
translation = "「회장은 내가 먹여주는 게 싫은 거야?」"

[[dialogue]]
speaker = "セシア"
original = "「――嫌じゃないなら、やましいことをしているわけじゃないんだから、堂々としてればいいわ」"
translation = "「──싫지 않다면 켕기는 짓을 하는 게 아니니까 당당하게 있으면 돼.」"

[[dialogue]]
speaker = "セシア"
original = "「ほら、あ～んっ！\u3000じ～っ……」"
translation = "「자, 아~앙! 지긋……」"

[[dialogue]]
speaker = "unk"
original = "おそらくセシアは、俺が食べるまで、見つめてくるのを止めないだろう。そう思った俺は、観念して――"
translation = "아마 세시아는 내가 먹을 때까지 쳐다보는 걸 멈추지 않겠지. 그렇게 생각한 나는 체념하고──"

[[dialogue]]
speaker = "セシア"
original = "「あっ……ふふっ♪\u3000どう？\u3000美味しい？」"
translation = "「앗…… 후훗♪ 어때? 맛있어?」"

[[dialogue]]
speaker = "セシア"
original = "「――ならよかった。それじゃあ、今度はわたくしが食べさせてもらう番ね♪」"
translation = "「──그렇다면 다행이야. 그럼 이번엔 내가 얻어먹을 차례네♪」"

[[dialogue]]
speaker = "セシア"
original = "「だって、恋人だもの。甘やかして、甘やかされる。食べさせ合いっこは、ママとじゃできないわ」"
translation = "「왜냐면 연인인걸. 어리광 받아주고 어리광부리고. 서로 먹여주기는 마마랑은 못 하는 거야.」"

[[dialogue]]
speaker = "セシア"
original = "「ほら、会長。わたくしに食べさせて？\u3000あ～ん♪」"
translation = "「자, 회장. 나한테 먹여줘. 아~앙♪」"

[[dialogue]]
speaker = "セシア"
original = "「ん……♪\u3000ぱくっ、もぐもぐ……ふふっ、美味しくて、とっても甘いわ……♪」"
translation = "「응……♪ 냠, 우물우물…… 후후, 맛있고 아주 달콤해……♪」"

[[dialogue]]
speaker = "セシア"
original = "「ふぅ……今日は楽しくて、あっという間だったわ。もう辺りが暗くなってしまったわね。――家まで送ってくれるの？\u3000会長、ありがとう」"
translation = "「후우…… 오늘은 즐거워서 눈 깜짝할 새였어. 벌써 주변이 어두워져 버렸네. ──집까지 데려다준다고? 회장, 고마워.」"

[[dialogue]]
speaker = "セシア"
original = "「でも、帰る前に、恋人体験でやっておかなくてはならないことがあるわ。というわけで――」"
translation = "「하지만 돌아가기 전에 연인 체험으로서 해두어야 할 일이 있어. 그런 의미에서──」"

[[dialogue]]
speaker = "セシア"
original = "「会長、わたくしとキスをしましょう」"
translation = "「회장, 나랑 키스하자.」"

[[dialogue]]
speaker = "unk"
original = "キス！？！？"
translation = "키스!?!?"

[[dialogue]]
speaker = "セシア"
original = "「――さすがにそれはマズいって……どうして？\u3000そういうことは、本当の恋人とするべき……？」"
translation = "「──역시 그건 안 된다니…… 왜? 그런 건 진짜 연인과 해야 한다고……?」"

[[dialogue]]
speaker = "セシア"
original = "「なにを言っているの？\u3000私たちは恋人になったのでしょう？」"
translation = "「무슨 소리를 하는 거니? 우리 연인이 되었잖아?」"

[[dialogue]]
speaker = "unk"
original = "よくよく聞いてみると、セシアが恋人体験をしてみたいと言ったのは、今日１日だけのことではなくて。"
translation = "자세히 들어보니 세시아가 연인 체험을 해보고 싶다고 한 것은 오늘 하루만의 일이 아니었다."

[[dialogue]]
speaker = "unk"
original = "これから恋人として恋愛を体験していきたいという、継続的な意味だったらしい――"
translation = "앞으로 연인으로서 연애를 체험해나가고 싶다는 지속적인 의미였던 모양이다──"

[[dialogue]]
speaker = "セシア"
original = "「もしかして……会長は、私とじゃ嫌だったかしら？」"
translation = "「혹시…… 회장은 나라서 싫었던 거니?」"

[[dialogue]]
speaker = "セシア"
original = "「――嫌じゃないけど、驚いてる？\u3000なら、問題ないわね♪」"
translation = "「──싫은 건 아니지만 놀랐다고? 그럼 문제없네♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、セシアは羽でふわりと浮くと――"
translation = "그렇게 말하고 세시아는 날개로 둥실 떠오르더니──"

[[dialogue]]
speaker = "セシア"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "っ！？"
translation = "윽!?"

[[dialogue]]
speaker = "セシア"
original = "「会長はまだ心の準備ができていないみたいだから、今日のところは頬っぺたにしておくわ♪」"
translation = "「회장은 아직 마음의 준비가 안 된 것 같으니까 오늘은 볼에 해두는 걸로 할게♪」"

[[dialogue]]
speaker = "セシア"
original = "「そういうわけで、また明日からもよろしくね、会長」"
translation = "「그런 고로 내일부터도 잘 부탁해, 회장.」"

[[dialogue]]
speaker = "unk"
original = "そう言って浮かべた大人びた笑顔に、俺はドキッとして。"
translation = "그렇게 말하며 지은 어른스러운 미소에 나는 가슴이 두근거렸다."

[[dialogue]]
speaker = "unk"
original = "急にセシアを恋愛対象として意識し、顔が熱くなってしまうのだった――"
translation = "갑자기 세시아를 연애 대상으로 의식하게 되어 얼굴이 뜨거워지고 마는 것이었다──"

