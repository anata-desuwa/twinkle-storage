[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「情報を照らし合わせると、大体今の時間から夕方にかけて盗難が行われているようです。ここで忍耐強く待っていればあるいは」"
translation = "「정보를 대조해 보니 대략 지금 시간부터 저녁 사이에 도난이 일어나는 것 같습니다. 여기서 끈기 있게 기다리면 어쩌면.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「きっと泥棒さんにも何か事情があるんじゃないかな……。捕まえて、事情を聞いて、何か困ってることがあるなら聞いてあげたいな……」"
translation = "「분명 도둑분에게도 무슨 사정이 있지 않을까……. 붙잡아서 사정을 들어보고, 뭔가 곤란한 일이 있다면 도와주고 싶어……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もー今度こそ体力のげんかーい……。見張りは２人でやって～……」"
translation = "「이젠 진짜 체력이 한계에에……. 감시는 둘이서 해애~……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「仕方ないですね……。休んできていいですよ？」"
translation = "「어쩔 수 없네요……. 쉬고 오셔도 돼요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ホント！？\u3000それじゃあ遠慮なく～♪\u3000ちょうどスタミナも回復してきた頃だったのよね～」"
translation = "「정말!? 그럼 사양 말고~♪ 마침 스태미나도 회복됐을 즈음이었거든~」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ふぇ？\u3000スタミナが回復したなら見張りも続けられるんじゃ……？」"
translation = "「후에? 스태미나가 회복됐다면 감시도 계속할 수 있는 게……?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ゲームの話よ、ゲームの話♪\u3000それじゃ後は任せたわよ～♪\u3000ダーリン、２人のことお願いね～♪」"
translation = "「게임 이야기야, 게임 이야기♪ 그럼 나머지는 맡길게~♪ 달링, 두 사람 잘 부탁해~♪」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「はぁ、元気に走っていっちゃって」"
translation = "「하아, 기운차게 달려가 버리네요.」"

[[dialogue]]
speaker = "unk"
original = "パルミエはブレないね"
translation = "팔미에는 흔들림이 없네."

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ふふ、でもああ見えて良いところもあるんですよ？\u3000友達想いというかなんというか」"
translation = "「후후, 그래도 저래 봬도 좋은 구석도 있다구요? 친구를 생각한다고나 할까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「パルちゃんはね、あまのじゃくさんだから。ぐうたらしてるように見えて、いつもモナカたちのこと影から支えてくれるんだ」"
translation = "「팔짱은 말이야, 심술궂은 면이 있으니까. 게으름 피우는 것처럼 보여도 항상 모나카 일행을 뒤에서 지탱해 줘.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「おなか部を作ろうと言い出したのもパルミエですしね。たとえプリマステラじゃなくても人助けはできるからって」"
translation = "「오나카부를 만들자고 한 것도 팔미에였고요. 설령 프리마스텔라가 아니더라도 사람을 도울 수는 있다면서.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「最初はモナカもシフォンちゃんも、自信なかったんだけどね……？\u3000でもパルちゃんがきっと大丈夫だからって励ましてくれて……」"
translation = "「처음엔 모나카도 시폰짱도 자신 없었지만 말야……? 하지만 팔짱이 꼭 괜찮을 거라고 격려해 줘서……」"

[[dialogue]]
speaker = "unk"
original = "意外とお姉さんしてるんだね"
translation = "의외로 언니 노릇을 하고 있네."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへへ、パルちゃんは今も昔もモナカたちの自慢のお姉ちゃんだよ」"
translation = "「에헤헤, 팔짱은 지금이나 예전이나 모나카 일행의 자랑스러운 언니야.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ま、普段はダメ人間そのものですが。あのグータラっぷりは素ですし」"
translation = "「뭐, 평소엔 글러 먹은 인간 그 자체지만요. 그 게으른 모습은 본성이니까.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「でも、すごく感謝はしてます。私がこうして人助けをしたいって思えるようになったのもパルミエのおかげですから」"
translation = "「그래도 정말 감사하고 있어요. 제가 이렇게 남을 돕고 싶다고 생각하게 된 것도 팔미에 덕분이니까요.」"

[[dialogue]]
speaker = "unk"
original = "というと？"
translation = "그게 무슨 소리야?"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ほら私、天使のくせに羽根が黒いじゃないですか？\u3000私の一族は天使と魔族の混血で、こうして羽根に魔族の血が色濃く表れちゃうんです」"
translation = "「저기, 저 천사인데도 날개가 검잖아요? 저희 일족은 천사와 마족의 혼혈이라서 이렇게 날개에 마족의 피가 짙게 나타나요.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「子どもの頃はこの黒い羽根を周りから不気味に思われていて……。私、いつも１人きりで過ごしていたんです」"
translation = "「어릴 때는 이 검은 날개를 주변에서 불길하게 여겨서……. 전 항상 혼자서 시간을 보냈어요.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そんな私の手を引いてくれたのがパルミエだったんですよ。この黒い羽根を格好いいと褒めてくれて、怖がらずに遊んでくれて」"
translation = "「그런 제 손을 잡아준 게 팔미에였어요. 이 검은 날개를 멋지다고 칭찬해 주고, 무서워하지 않고 놀아줬죠.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「それが……すごく嬉しくて。私もあんな風に誰かの手を引いてあげられたらなぁって思うようになったんです」"
translation = "「그게…… 정말 기뻐서. 저도 저런 식으로 누군가의 손을 잡아줄 수 있으면 좋겠다고 생각하게 됐어요.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカもね。パルちゃんとシフォンちゃんにすごく救われたから」"
translation = "「모나카도 그래. 팔짱이랑 시폰짱에게 정말 구원받았으니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカのお家ね、星騎士の名家なんだ。お父様もお母様も名のある星騎士だった人で、姉様たちも子どもの頃からモンスター退治を任されてるようなすごい人たちなの」"
translation = "「모나카네 집은 성기사 명가거든. 아버지도 어머니도 이름난 성기사였던 분들이고, 언니들도 어릴 때부터 몬스터 퇴치를 맡을 정도로 대단한 분들이야.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「だけどモナカだけはろくに星力も扱えない落ちこぼれで……。みんなにも、その……役立たずって言われちゃっててね？」"
translation = "「하지만 모나카만 제대로 성력도 못 다루는 낙오자라서……. 다들 나를, 그…… 쓸모없다고들 말하곤 했거든.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも１人でずっと泣いてたモナカの前にパルちゃんとシフォンちゃんが現れてくれたの。モナカに手を差し伸べてくれて、笑顔にしてくれて……」"
translation = "「하지만 혼자 계속 울던 모나카 앞에 팔짱이랑 시폰짱이 나타나 줬어. 모나카에게 손을 내밀어 주고 웃게 해줬지……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「だからモナカも、みんなを笑顔にしてあげられる星騎士になりたいんだ。たとえ落ちこぼれでも、泣いてる誰かのために手を差し伸べられる星騎士に」"
translation = "「그래서 모나카도 모두를 웃게 해줄 수 있는 성기사가 되고 싶어. 설령 낙오자라도, 울고 있는 누군가를 위해 손을 내밀 수 있는 성기사로.」"

[[dialogue]]
speaker = "unk"
original = "なら尚更２人とも試験に合格しないとね"
translation = "그렇다면 더더욱 둘 다 시험에 합격해야겠네."

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「うっ……。プレッシャーかけないでくださいよ……。未だに私、注目を浴びたり、注視されたりするのは苦手でして……」"
translation = "「윽…… 부담 주지 마세요……. 아직 전 주목을 받거나 주시당하는 건 서툴러서……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「い、一生懸命頑張ってみるね……。プリマステラになるために……」"
translation = "「여, 열심히 노력해 볼게……. 프리마스텔라가 되기 위해서……」"

[[dialogue]]
speaker = "unk"
original = "あんまり気負いすぎないでいいから"
translation = "너무 기죽지 않아도 되니까."

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そ、そうですね。普段通りにすれば星力も扱えるはずですから。実際さっきまでは特になんの問題もありませんでしたし……」"
translation = "「그, 그렇네요. 평소처럼 하면 성력도 다룰 수 있을 테니까요. 실제로 아까까진 딱히 아무 문제도 없었고요……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「とりあえずいつでも動けるように星力を高めておこう……？\u3000いつ泥棒さんが現れるかわからないから」"
translation = "「일단 언제든 움직일 수 있게 성력을 높여두자……? 언제 도둑분이 나타날지 모르니까.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「わかりました……！\u3000見つけた瞬間、星術をぶちかましてやればいいんですね……！」"
translation = "「알겠습니다……! 발견하는 순간 성술을 날려버리면 되는 거죠……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えと。そんなことしちゃったら一発不合格になっちゃうと思うから……。あくまでも備えておくくらいで……」"
translation = "「저기. 그런 짓을 했다간 단번에 불합격될 거라고 생각하니까……. 어디까지나 대비만 해두는 정도로……」"

[[dialogue]]
speaker = "unk"
original = "ん？\u3000あの影は……？"
translation = "응? 저 그림자는……?"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「現れたんですか！？\u3000よ、よしっ、いっちょぶちかましてやりますよ……！」"
translation = "「나타났나요!? 조, 좋아, 한 판 날려주겠어요……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あわわ、だから人に向かって使おうとしちゃダメだよぉ……」"
translation = "「아와와, 그러니까 사람을 향해 쓰려고 하면 안 된다니까아……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そ、そうでしたね……！\u3000ちょっと気が急いてしまって……」"
translation = "「그, 그랬죠……! 조금 마음이 급해져서……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「まだ泥棒さんとは決まったわけじゃないから……。でも寮の入り口で誰かこそこそ動いてるみたい……」"
translation = "「아직 도둑분이라고 정해진 건 아니니까……. 하지만 기숙사 입구에서 누군가 기웃기웃 움직이는 것 같아……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ちょっと見えづらいですね……。顔さえわかれば、後はどうとでもなるのですが……」"
translation = "「조금 보기 힘들군요……. 얼굴만 알면 나중엔 어떻게든 될 텐데……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ、出てくるみたいだよ。……ふぇ？\u3000待って、あれって──」"
translation = "「아, 나오는 모양이야. ……후에? 잠깐만, 저건──」"

