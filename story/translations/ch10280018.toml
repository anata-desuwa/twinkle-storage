[[dialogue]]
speaker = "unk"
original = "トマルと恋人として付き合いはじめてから、数ヶ月が経ったある日の放課後。"
translation = "토마루와 연인으로 사귀기 시작한 지 수개월이 지난 어느 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "このところ忙しくて会えてなかった俺達は、ようやく時間が作れたので、保健室で逢引をしていた――"
translation = "요즘 바빠서 만나지 못했던 우리들은 드디어 시간이 생겨 보건실에서 밀회를 즐기고 있었다──"

[[dialogue]]
speaker = "トマル"
original = "「んっ……<emoji=heart04>\u3000会長さま……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>\u3000ちゅぷっ……<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>」"
translation = "「응……♥ 회장님……♥ 츄……♥ 츄파……♥ 레로츄……♥ 츄푸……♥ 츄파……♥」"

[[dialogue]]
speaker = "トマル"
original = "「はあぁ……<emoji=heart04>\u3000隠れて久しぶりのキス……ドキドキしてしまいます……<emoji=heart04>」"
translation = "「하아아……♥ 몰래 오랜만의 키스…… 두근두근해버려요……♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ……<emoji=heart04>\u3000そんな……<emoji=heart04>\u3000この衣装のまま、保健室のベッドでしたいだなんて……<emoji=heart04>」"
translation = "「앗……♥ 그런……♥ 이 의상 그대로 보건실 침대에서 하고 싶다니……♥」"

[[dialogue]]
speaker = "トマル"
original = "「い、いえ……正直、興奮して……<emoji=heart04>\u3000……あんっ<emoji=heart04>\u3000会長さま、そんないやらしく、お尻を撫でたりしたら……<emoji=heart04>」"
translation = "「아, 아니…… 솔직히 흥분해서……♥ ……앙♥ 회장님, 그렇게 야하게 엉덩이를 쓰다듬거나 하면……♥」"

[[dialogue]]
speaker = "トマル"
original = "「んっ……<emoji=heart04>\u3000少しだけ待ってください<emoji=heart04>\u3000いつもみたいに、アニマさまからもらった女体化薬を、飲みますから……」"
translation = "「응……♥ 잠시만 기다려 주세요♥ 평소처럼 아니마 님에게 받은 여체화 약을 마실 테니까……」"

[[dialogue]]
speaker = "unk"
original = "そう、いつもエッチする時は、アニマ先輩が発明した女体化薬を使って、女の子の体になったトマルを抱いていた。"
translation = "그래, 평소 섹스할 때는 아니마 선배가 발명한 여체화 약을 사용해 여자아이의 몸이 된 토마루를 안고 있었다."

[[dialogue]]
speaker = "unk"
original = "だけど、今日は――"
translation = "하지만 오늘은──"

[[dialogue]]
speaker = "トマル"
original = "「……えっ！？\u3000お、男の体のまま、エッチをしてみたい、ですか……！？」"
translation = "「……엣!? 나, 남자의 몸 그대로 섹스를 해보고 싶다구요……!?」"

[[dialogue]]
speaker = "トマル"
original = "「で、でも……男の子のままでは、胸もないですし……おま○こもなくて……会長さまに興奮してもらえるかどうか……」"
translation = "「하, 하지만…… 남자아이 그대로는 가슴도 없고…… 보지도 없어서…… 회장님이 흥분해 주실지 어떨지……」"

[[dialogue]]
speaker = "トマル"
original = "「私、自分の体には、自信がなくて……」"
translation = "「저, 제 몸에는 자신감이 없어서……」"

[[dialogue]]
speaker = "クロト"
original = "「トマル、俺はありのままのトマルが好きなんだ。……ほら」"
translation = "「토마루, 난 있는 그대로의 토마루가 좋아. ……자」"

[[dialogue]]
speaker = "トマル"
original = "「あ……<emoji=heart04>\u3000会長さまに、抱き締められて……<emoji=heart04>」"
translation = "「아……♥ 회장님에게 안겨서……♥」"

[[dialogue]]
speaker = "クロト"
original = "「わかる……？」"
translation = "「알겠어……?」"

[[dialogue]]
speaker = "トマル"
original = "「は、はい……<emoji=heart04>\u3000会長さまのおち○ぽさま、私のお腹に当たって……服越しでもわかるくらい、大きく固くなってます……<emoji=heart04>」"
translation = "「네, 네……♥ 회장님의 자지 님, 제 배에 닿아서…… 옷 너머로도 알 수 있을 정도로 크고 딱딱해져 있어요……♥」"

[[dialogue]]
speaker = "クロト"
original = "「トマルは普段の姿でもすごく可愛いから、大丈夫。だから、このまま愛し合いたい……ダメか？」"
translation = "「토마루는 평소 모습으로도 충분히 귀여우니까 괜찮아. 그러니까 이대로 사랑을 나누고 싶어…… 안 될까?」"

[[dialogue]]
speaker = "トマル"
original = "「ん……<emoji=heart04>\u3000わ、わかりました……<emoji=heart04>\u3000会長さまが望んでくださるなら……<emoji=heart04>」"
translation = "「응……♥ 아, 알겠습니다……♥ 회장님이 원하신다면……♥」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とトマルは『男の体で初エッチ』をすることになった――"
translation = "이렇게 해서 나와 토마루는 『남자의 몸으로 첫 섹스』를 하게 되었다──"

[[dialogue]]
speaker = "トマル"
original = "「ああ……<emoji=heart04>\u3000会長さまに、私のおち○ちん、見られちゃってます……<emoji=heart04>\u3000や、やっぱり恥ずかしい……<emoji=heart04>」"
translation = "「아아……♥ 회장님에게 제 자지, 보여지고 있어요……♥ 여, 역시 부끄러워……♥」"

[[dialogue]]
speaker = "トマル"
original = "「――お、おま○こは沢山、見られてますけど、それは女の子の体ですから……」"
translation = "「──보, 보지는 많이 보여졌지만, 그건 여자아이의 몸이니까……」"

[[dialogue]]
speaker = "トマル"
original = "「――え？\u3000おち○ちん可愛い？\u3000やぁ……<emoji=heart04>\u3000会長さま、そんなまじまじと見られては……<emoji=heart04>\u3000は、恥ずかしいのに私……<emoji=heart04>」"
translation = "「──에? 자지 귀여워? 야아……♥ 회장님, 그렇게 빤히 쳐다보시면……♥ 부, 부끄러운데 저……♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ……だ、ダメ<emoji=heart04>\u3000おち○ちん勃起して……大きくなっちゃいますぅ……<emoji=heart04>\u3000はふうぅ<emoji=heart04>」"
translation = "「앗…… 안, 안 돼♥ 자지 발기해서…… 커져 버려요오……♥ 하후우♥」"

[[dialogue]]
speaker = "トマル"
original = "「――み、見てて興奮してきた、ですか？\u3000あっ……<emoji=heart04>」"
translation = "「──보, 보고 흥분해버렸다구요? 앗……♥」"

[[dialogue]]
speaker = "トマル"
original = "「す、すごい……会長さまのただでさえ逞しいのに、更にむくむくって大きくなって……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「수, 수정해…… 회장님의 가뜩이나 늠름한데 더욱 뭉클뭉클 커져서……♥ 하아아……♥」"

[[dialogue]]
speaker = "クロト"
original = "「準備するから、ローションを使うね」"
translation = "「준비할 테니까 로션을 쓸게」"

[[dialogue]]
speaker = "トマル"
original = "「は、はい……<emoji=heart04>\u3000あっ……<emoji=heart04>」"
translation = "「네, 네……♥ 앗……♥」"

[[dialogue]]
speaker = "トマル"
original = "「会長さまのおち○ぽさまが、お尻の穴に当たって……ローション、塗り広げられてます<emoji=heart04>」"
translation = "「회장님의 자지 님이 똥구멍에 닿아서…… 로션, 발라지고 있어요♥」"

[[dialogue]]
speaker = "トマル"
original = "「んっ……<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000逞しくて、熱いの、感じます……<emoji=heart04>」"
translation = "「응……♥ 하앗……♥ 늠름하고, 뜨거운 거, 느껴져요……♥」"

[[dialogue]]
speaker = "トマル"
original = "「――男の体でも、お尻柔らかくて、気持ちいい、ですか？\u3000会長さまにそう言われると、嬉しい、です……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「――남자의 몸인데도, 엉덩이 말랑말랑해서, 기분, 좋은가요? 회장님께 그런 말을 들으니, 기뻐, 요……♥ 응……♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ……<emoji=heart04>\u3000おち○ぽさまの先っぽが、お尻の穴にグリグリって……<emoji=heart04>\u3000も、もうしちゃうんですか……？」"
translation = "「앗……♥ 자지님의 끝부분이, 엉덩이 구멍을 그리그리하고……♥ 이, 이제 해버리는 건가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「うん……トマルの中に挿れたい。いいか……？」"
translation = "「응…… 토마루의 안에 삽입하고 싶어. 괜찮겠어……?」"

[[dialogue]]
speaker = "トマル"
original = "「は、はい……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「네, 네……♥ 응……♥」"

[[dialogue]]
speaker = "トマル"
original = "「おち○ぽさまが、お尻の穴、押し広げて――あっ<emoji=heart04>」"
translation = "「자지님이, 엉덩이 구멍을, 밀어 넓히면서――앗♥」"

[[dialogue]]
speaker = "トマル"
original = "「ふああぁぁ～～～っ<emoji=heart04>\u3000おち○ぽさま、中にきましたぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아~~앗♥ 자지님, 안에 왔어요어어어~~엇♥♥♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000お尻の中、女の子の体でもしたこと、あるはずなのに、なんか変ですぅ……<emoji=heart04>」"
translation = "「앗♥ 하아앗……♥ 엉덩이 안, 여자의 몸으로도 해본 적, 있을 텐데, 왠지 이상해요어……♥」"

[[dialogue]]
speaker = "トマル"
original = "「まるで初めてしたみたいに、知らない感覚で……はぁんっ……<emoji=heart04>」"
translation = "「마치 처음 해본 것처럼, 모르는 감각이라…… 하앙……♥」"

[[dialogue]]
speaker = "トマル"
original = "「――い、痛くないので、大丈夫です<emoji=heart04>\u3000でも……動くのなら、初めての時みたいに、優しくしてもらえると……」"
translation = "「――아, 아프지 않으니까, 괜찮아요♥ 하지만…… 움직인다면, 처음 했을 때처럼, 상냥하게 해주시면……」"

[[dialogue]]
speaker = "クロト"
original = "「わかった。ゆっくり動くからな……」"
translation = "「알았어. 천천히 움직일 테니까……」"

[[dialogue]]
speaker = "トマル"
original = "「はい、会長さま……あっ――<emoji=heart04>」"
translation = "「네, 회장님…… 앗――♥」"

[[dialogue]]
speaker = "トマル"
original = "「はああぁぁ～～～～～～っ<emoji=heart04>\u3000おち○ぽさま、奥まで入ってぇっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>」"
translation = "「하아아아아~~~~~~앗♥ 자지님, 깊숙한 곳까지 들어와줘요♥ 앗……♥ 응……♥ 하아앗♥」"

[[dialogue]]
speaker = "トマル"
original = "「んんっ<emoji=heart04>\u3000あっ……んあぁっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……んうぅっ<emoji=heart04>\u3000んっ……あっ……あんっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……あっ<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>」"
translation = "「응읏♥ 앗…… 응아앗……♥ 하아앗…… 후우웃…… 응우웃♥ 응…… 앗…… 하앙♥ 하아앗…… 후아앗…… 앗♥ 하아앙……♥」"

[[dialogue]]
speaker = "トマル"
original = "「ふうぅっ……<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000やっぱりおち○ぽさま、おっきいですぅ……<emoji=heart04>\u3000逞しいカリが敏感なところにこすれてぇ……あぁんっ<emoji=heart04>」"
translation = "「후우웃……♥ 응아앗♥ 역시 자지님, 커요오……♥ 늠름한 귀두가 민감한 곳에 스쳐서어…… 아앙♥」"

[[dialogue]]
speaker = "トマル"
original = "「優しくされてるのに、すごく感じちゃいますぅ……あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「상냥하게 해주는데도, 엄청 느껴버려요오…… 앗♥ 하앙……♥ 하아앗……♥ 응♥ 후아앗……♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ<emoji=heart04>\u3000会長さま、いまお尻掴んじゃっ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「앗♥ 회장님, 지금 엉덩이 잡아버렸……♥ 응아앗……♥ 후우웃……♥ 하아앗……♥」"

[[dialogue]]
speaker = "トマル"
original = "「そ、そんな強く鷲掴みにされたら……あぁんっ<emoji=heart04>\u3000お尻の中、キュンってなっちゃいますぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「그, 그렇게 강하게 움켜쥐어지면…… 아앙♥ 엉덩이 안이, 큥 하고 되어버려요♥ 앗♥ 응우웃……♥ 하아앗……♥ 후아앗……♥」"

[[dialogue]]
speaker = "トマル"
original = "「は、はいぃ……あんっ<emoji=heart04>\u3000Мでごめんなさいぃ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000私は、会長さまにお尻を強く揉まれると感じちゃう、マゾな男の娘ですぅ……はあぁんっ<emoji=heart04>」"
translation = "「네, 네에…… 하앙♥ M이라서 죄송해요오……♥ 응읏……♥ 저는, 회장님께 엉덩이를 강하게 주물러지면 느껴버리는, 마조인 오토코노코예요오…… 하아앙♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ダメぇ……<emoji=heart04>\u3000お尻揉まれてぇ、中が勝手に締めつけちゃいますぅ……んうぅっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「앗♥ 하앙♥ 안 돼……♥ 엉덩이 주물러져서어, 안이 멋대로 조여버려요오…… 응우웃♥ 앗……♥ 후아아앗♥」"

[[dialogue]]
speaker = "トマル"
original = "「お、お尻の中、敏感なのにぃ……はあぁんっ<emoji=heart04>\u3000もっと感じちゃいますぅ……んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「어, 엉덩이 안, 민감한데에…… 하아앙♥ 더 느껴버려요오…… 응아앗♥ 후아아앙♥」"

[[dialogue]]
speaker = "トマル"
original = "「えっ？\u3000あっ、ダメぇ<emoji=heart04>\u3000会長さま、そこは触っちゃダメですぅ<emoji=heart04>\u3000ああっ<emoji=heart04>」"
translation = "「엣? 앗, 안 돼♥ 회장님, 거기는 만지면 안 돼요♥ 아앗♥」"

[[dialogue]]
speaker = "トマル"
original = "「私のおち○ちん、触っちゃダメぇっ<emoji=heart04>\u3000そこは恥ずかしいですからぁっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「제 꼬추, 만지면 안 돼엣♥ 거기는 부끄러우니까요옷♥ 후아아앗……♥」"

[[dialogue]]
speaker = "トマル"
original = "「同性でそこを触るのは、やっぱりアブノーマル過ぎますぅ<emoji=heart04>\u3000やぁっ……<emoji=heart04>\u3000恥ずかしいですぅ<emoji=heart04>」"
translation = "「동성끼리 거기를 만지는 건, 역시 너무 아브노멀해요♥ 야앗……♥ 부끄러워요♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000会長さま、シコシコしちゃダメぇっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>」"
translation = "「앗♥ 앗♥ 안 돼♥ 회장님, 딸딸이 치면 안 돼엣♥ 응♥ 응우웃……♥ 후아앙♥」"

[[dialogue]]
speaker = "クロト"
original = "「男の子でも……トマルはすごく可愛いよ」"
translation = "「남자아이라도…… 토마루는 정말 귀여워」"

[[dialogue]]
speaker = "トマル"
original = "「ああっ<emoji=heart04>\u3000会長さま、そんな耳元で囁かれたらぁ……<emoji=heart04>\u3000わ、私ぃ……はああぁんっ<emoji=heart04>」"
translation = "「아앗♥ 회장님, 그렇게 귓가에서 속삭여지면……♥ 저, 저는어…… 하아아앙♥」"

[[dialogue]]
speaker = "トマル"
original = "「あっ<emoji=heart04>\u3000そんな、おち○ちんが固くなったとか、言っちゃダメぇっ<emoji=heart04>\u3000は、恥ずかしいですからぁ……はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「앗♥ 그렇게, 꼬추가 딱딱해졌다니, 말하면 안 돼엣♥ 부, 부끄러우니까아…… 하아앗…… 응♥ 후아앗……♥」"

[[dialogue]]
speaker = "トマル"
original = "「やあぁっ<emoji=heart04>\u3000恥ずかしいのに、そんなシコシコされたらぁ……あっ<emoji=heart04>」"
translation = "「야아앗♥ 부끄러운데, 그렇게 딸딸이 쳐지면…… 앗♥」"

[[dialogue]]
