[[dialogue]]
speaker = "エグザエル"
original = "「――ついにこの日がやって参りましたな」"
translation = "「――드디어 이날이 왔구려」"

[[dialogue]]
speaker = "エグザエル"
original = "「ティンクルスターナイツに我が輩が実装される、『ティンクル☆くるせいだーすコラボ２．５』開催の当日が！」"
translation = "「팅클 스타 나이츠에 소생이 실장되는 『팅클☆크루세이더스 콜라보 2.5』 개최 당일이!」"

[[dialogue]]
speaker = "ルネア"
original = "「いや、実装されるのは女神のわたし！\u3000あなたはその<ruby>武器<rt>オプション</rt></ruby>としてだから」"
translation = "「아니, 실장되는 건 여신인 나야! 너는 그 무기으로서니까」"

[[dialogue]]
speaker = "エグザエル"
original = "「ふはははは！\u3000ルネア様、どうかお許しを！\u3000めでたき日にて、我が輩もテンションが上がってしまっているが故！」"
translation = "「푸하하하하! 루네아 님, 부디 용서를! 경사스러운 날이라 소생도 텐션이 올라버린 탓이오나이다!」"

[[dialogue]]
speaker = "ルネア"
original = "「まあ、いいわ。エグザエル！\u3000祝いなさい、女神の<ruby>威光<rt>ハイライト</rt></ruby>よ！」"
translation = "「뭐, 좋아. 에그자엘! 축하하렴, 여신의 위광을!」"

[[dialogue]]
speaker = "エグザエル"
original = "「御意！\u3000――世界よ、祝福の鐘の音を鳴らせ！」"
translation = "「명령대로! ――세계여, 축복의 종소리를 울려라!」"

[[dialogue]]
speaker = "エグザエル"
original = "「創世の<ruby>女神<rt>アストレア</rt></ruby>、ルネア様のご降臨である！」"
translation = "「창세의 여신, 루네아 님의 강림이오!」"

[[dialogue]]
speaker = "ルネア"
original = "「――変身！」"
translation = "「――변신!」"

[[dialogue]]
speaker = "エグザエル"
original = "「<ruby>ＲＥＶＩＶＥ\u3000ＯＮ<rt>リバイブ・オン</rt></ruby>！」"
translation = "「REVIVE ON!」"

[[dialogue]]
speaker = "ルネア"
original = "「これが、復活したわたしの女神装束――」"
translation = "「이것이 부활한 나의 여신 복장――」"

[[dialogue]]
speaker = "ルネア"
original = "「名付けて、『アストレアフォーム』よ！」"
translation = "「이름하여 『아스트라이아 폼』이야!」"

[[dialogue]]
speaker = "エグザエル"
original = "「ふ、ふつくしい……！」"
translation = "「아, 아름다워……!」"

[[dialogue]]
speaker = "エグザエル"
original = "「魔王殿に見せるため、あーでもない、こーでもないと、鏡の前でクネクネしながら作った甲斐がありますぞ！」"
translation = "「마왕전에게 보여주기 위해 이리저리 거울 앞에서 몸을 꼬며 만든 보람이 있구려!」"

[[dialogue]]
speaker = "ルネア"
original = "「して、ないっ！」"
translation = "「안 그랬어!」"

[[dialogue]]
speaker = "エグザエル"
original = "「アザマァァーースッ！？」"
translation = "「가, 감사합니다아아쓰!?」"

[[dialogue]]
speaker = "ルネア"
original = "「全く！\u3000ふざけてないで、さっさと行くわよ、エグザエル！」"
translation = "「정말! 장난치지 말고 얼른 가자고, 에그자엘!」"

[[dialogue]]
speaker = "ルネア"
original = "「シンの魔王因子を取り返す為に――ティンクルスターナイツの世界へ！」"
translation = "「신의 마왕 인자를 되찾기 위해―― 팅클 스타 나이츠의 세계로!」"

[[dialogue]]
speaker = "エグザエル"
original = "「れ、<ruby>ＲＥＡＤＹ\u3000ＧＯ<rt>レディー・ゴー</rt></ruby>、ですぞ……！」"
translation = "「레, READY GO이오나이다……!」"

