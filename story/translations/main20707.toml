[[dialogue]]
speaker = "unk"
original = "第７話,弱さと強さ,B"
translation = "제7화, 약함과 강함, B"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "梨緒は秘密基地の中をあてもなく彷徨っていた。"
translation = "리오는 비밀기지 안을 정처 없이 배회하고 있었다."

[[dialogue]]
speaker = "unk"
original = "一度はベッドに入って眠ろうとしたが、どうにも寝付けなくて、与えられた個室を出てきたのだった。"
translation = "일단은 침대에 들어가 잠을 청하려 했지만, 도무지 잠이 오지 않아 배정받은 개인실을 나온 것이었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私はどうすればよかった……？\u3000ベアトに何と言えばよかったんだ……？）"
translation = "(나는 어떻게 해야 했을까……? 베아트에게 뭐라고 말해야 했던 거지……?)"

[[dialogue]]
speaker = "unk"
original = "脳裏に浮かぶのはベアトリスのこと。"
translation = "뇌리에 떠오르는 것은 베아트리스의 일."

[[dialogue]]
speaker = "unk"
original = "ベアトリスは極星学園の星徒会副会長で、素性を隠して新星学園の選挙管理員会に入っていた。"
translation = "베아트리스는 극성학원의 성도회 부회장으로, 정체를 숨기고 신성학원의 선거관리위원회에 들어와 있었다."

[[dialogue]]
speaker = "unk"
original = "敵だったのか、それとも本当に仲間になってくれたのか、今の梨緒にはわからない。"
translation = "적이었던 건지, 아니면 정말로 동료가 되어주었던 건지 지금의 리오로서는 알 수 없다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（本当に……何もわからない）"
translation = "(정말…… 아무것도 모르겠어)"

[[dialogue]]
speaker = "？？？"
original = "「よっ」"
translation = "「여어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「フィオ──アポロか」"
translation = "「피오── 아폴로인가」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「はは、お前はベガのあたしも知っているんだっけか。平行世界ってやつは頭がこんがらがるな」"
translation = "「하하, 너는 베가의 나도 알고 있었지 참. 평행세계라는 건 머리가 지끈거리는군」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「しかし、休めと言ったのにほっつき歩いて、困ったやつだな」"
translation = "「그나저나 쉬라고 했는데도 돌아다니다니, 못 말리는 녀석이네」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……私だって眠ろうと思った。だけど、どうしても目が覚めてしまうんだ」"
translation = "「……나도 잠들려 했다. 하지만 아무래도 눈이 떠져서 말이지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「それなら仕方ない。あたしも付き合おう」"
translation = "「그렇다면 어쩔 수 없지. 나도 같이 있어 주마」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……いい。頭を冷やしたらすぐに部屋に戻る」"
translation = "「……됐어. 머리를 좀 식히고 곧바로 방으로 돌아갈 거다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そういや夕飯食ってなかったか。……ビスケットがあったな。持ってこよう」"
translation = "「그러고 보니 저녁을 안 먹었었나. ……비스킷이 있었지. 가져오마」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「必要ない。何か食べる気分じゃないんだ」"
translation = "「필요 없어. 뭘 먹을 기분이 아니다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしだって慣れない客が来て興奮してるんだ。眠れない者同士、少しお喋りしようじゃないか」"
translation = "「나도 낯선 손님이 와서 흥분했거든. 잠 못 이루는 처지끼리 조금 이야기나 나누자고」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ついでに紅茶も淹れてくる。少し待っててくれ」"
translation = "「가는 길에 홍차도 우려 오마. 잠시만 기다려 줘.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あ、待て──」"
translation = "「아, 기다려──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "梨緒の制止を聞かずにキッチンに向かうアポロ。"
translation = "리오의 제지를 듣지 않고 주방으로 향하는 아폴로."

[[dialogue]]
speaker = "unk"
original = "しばらくすると、アポロがカップを２つ持って戻ってきた。"
translation = "잠시 후, 아폴로가 컵 두 개를 들고 돌아왔다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「せっかく淹れたんだ。飲んでくれ」"
translation = "「일부러 우린 거다. 마셔 줘.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ああ」"
translation = "「……아아.」"

[[dialogue]]
speaker = "unk"
original = "梨緒はカップを受け取って、紅茶を一口啜る。"
translation = "리오는 컵을 받아 들고, 홍차를 한 모금 들이킨다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「どうだ？」"
translation = "「어떠냐?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……美味しい」"
translation = "「……맛있어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だろう？\u3000上手く淹れられるように練習したんだ。あたしの眼が<ruby>緋<rt>あか</rt></ruby>いうちは、まずいお茶なんか飲ませないぞ」"
translation = "「그렇지? 맛있게 우릴 수 있도록 연습했거든. 내 눈이 붉은 동안에는, 맛없는 차 따위 대접하지 않을 거다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「どうした？」"
translation = "「왜 그러지?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君がアルタイルのアポロと同じことを言うものだから、つい……」"
translation = "「네가 알타이르의 아폴로와 똑같은 말을 하길래, 그만……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「？\u3000紅茶のことか？」"
translation = "「? 홍차 이야기인가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……いや、何でもない」"
translation = "「……아니, 아무것도 아니다.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ほら、ビスケットも食え。腹が膨れないと頭も働かないぞ」"
translation = "「자, 비스킷도 먹어라. 배가 차지 않으면 머리도 돌아가지 않는 법이지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……もらおう」"
translation = "「……받으마.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「アルタイルでは、あたしとお前は選挙管理員会に所属してるんだってな。あっちのことを教えてくれないか」"
translation = "「알타이르에서는 나랑 네가 선거관리위원회에 소속되어 있다면서. 그쪽 이야기를 좀 들려주지 않겠나?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「選挙管理員会ってどんなことしてるんだ？\u3000ていうか新星学園に選挙なんてあったっけ？」"
translation = "「선거관리위원회는 어떤 일을 하지? 그보다 신성학원에 선거 같은 게 있었던가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「星徒会および星徒会長を監視し、生徒を率いるに不適格と判断した場合は、リコールを発議する。それが職務だ。まぁ、信任選挙を取り仕切ることもあったが」"
translation = "「성도회 및 성도회장을 감시하고, 학생을 이끌기에 부적격하다고 판단될 경우 리콜을 발의한다. 그것이 직무다. 뭐, 신임 투표를 주관하기도 했지만.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ふむ、なるほど。けっこうちゃんとした委員会なんだな」"
translation = "「흠, 과연. 꽤 제대로 된 위원회였구나.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「アポロは附属生だから、名目上は外部からの監査ということになっている。……まぁ、かなり無理くりな理屈だが」"
translation = "「아폴로는 부속생이라서 명목상으로는 외부로부터의 감사라는 형식을 취하고 있지. ……뭐, 꽤 억지스러운 논리지만.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ははは、そこは大目に見てやってくれ。選挙管理委員会では何をしたんだ？」"
translation = "「하하하, 그건 좀 봐달라고. 선거관리위원회에서는 뭘 했지?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだな……選管でクイズ大会に出たりしたな」"
translation = "「글쎄…… 선관위에서 퀴즈 대회에 나가기도 했었지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「クイズ？\u3000選挙関係ないじゃないか」"
translation = "「퀴즈? 선거랑 상관없지 않나?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「星徒会主催のクイズ大会だ。決勝で星徒会チームと戦って負けたが、準優勝だった。次は必ず勝つ」"
translation = "「성도회 주최 퀴즈 대회였다. 결승에서 성도회 팀과 싸워 졌지만, 준우승이었지. 다음엔 반드시 이길 거다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それから賞品の商品券をもらって、みんなでカフェテリアで食事をしたりもした」"
translation = "「그리고 경품으로 상품권을 받아서, 다 같이 카페테리아에서 식사를 하기도 했어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「へぇ、楽しそうじゃないか。あたしもそういうのやってみたかったな～」"
translation = "「헤에, 즐거워 보이는데. 나도 그런 거 해보고 싶었네~」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それから──」"
translation = "「그리고──」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「それから？」"
translation = "「그리고?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ジグと戦った」"
translation = "「……지그와 싸웠다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「さっき言った通り、ジグはかつての仲間だったが、再会した時にはリクリエの使徒になっていた」"
translation = "「방금 말한 대로 지그는 과거의 동료였지만, 재회했을 때는 리크리에의 사도가 되어 있었지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だけど私は……ジグに勝てなくて……何もできなくて……」"
translation = "「하지만 나는…… 지그에게 이기지 못해서…… 아무것도 할 수 없어서……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「でも──」"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は……なんて……無力なんだろう……」"
translation = "「나는…… 어쩜 이렇게…… 무력한 걸까……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……あの、これ……」"
translation = "「리오 짱…… 저기, 이거……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、あのだな……！\u3000私は別に、泣いてなんか……っ！」"
translation = "「아, 아니, 그게 말이다……! 나는 딱히, 울고 있었던 게……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「泣いてもいいんじゃないかな？\u3000星騎士が泣いちゃいけない理由なんて、ないと思う」"
translation = "「울어도 괜찮지 않을까? 성기사가 울면 안 되는 이유 같은 건 없다고 생각해.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だから……１人で泣かないで欲しいな」"
translation = "「그러니까…… 혼자서 울지 않았으면 좋겠어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「泣くならちゃんと、私の見えるところで泣いて。そうじゃないと、必要な時に助けられなくなっちゃう」"
translation = "「울 거라면 제대로 내가 보이는 곳에서 울어 줘. 그렇지 않으면 필요할 때 도와줄 수 없게 되니까.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「まだ結成して日は浅いかもしれないけど、私たちは同じ、選挙管理委員会の仲間でしょ？」"
translation = "「아직 결성한 지 얼마 안 됐을지도 모르지만, 우리는 똑같은 선거관리위원회의 동료잖아?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、よろしく──」"
translation = "「아아, 잘 부탁해──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「い、いや、だから！\u3000私は別に泣いてないっ」"
translation = "「아, 아니, 그러니까! 나는 딱히 울고 있지 않다니까!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え……梨緒ちゃん、そこから？\u3000流石にそれはちょっと無理があるんじゃ……」"
translation = "「에…… 리오 짱, 거기서부터? 그건 아무래도 좀 무리가 있지 않을까……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だいたい、友達が泣いてたら、見て見ぬふりをするのも優しさじゃないのか！？」"
translation = "「애초에 친구가 울고 있으면 못 본 척해주는 것도 배려 아니냐!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うわ、開き直っちゃった……！」"
translation = "「우와, 적반하장으로 나오네……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いいよ、わかったよ。今度梨緒ちゃんが泣いてるところ見かけたら、『梨緒ちゃんが泣くわけない！』って言って勝手に顔をハンカチでゴシゴシしちゃうから」"
translation = "「좋아, 알았어. 다음에 리오 짱이 우는 걸 발견하면, 『리오 짱이 울 리가 없어!』라고 말하면서 멋대로 손수건으로 얼굴을 슥슥 닦아버릴 테니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトはそう言って、私の涙を拭ってくれた。１人で泣くなと言ってくれた。仲間だと言ってくれた」"
translation = "「베아토는 그렇게 말하며 내 눈물을 닦아주었다. 혼자 울지 말라고 해주었다. 동료라고 해주었다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なのに……なのに……」"
translation = "「그런데…… 그런데……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトは極星学園の副会長で……それを私たちに隠していた……」"
translation = "「베아토는 극성학원의 부회장이었고…… 그걸 우리에게 숨기고 있었어……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「仲間だと言ってくれたのは嘘だったのか……？\u3000ベアトは最初から私たちを騙すつもりだったのか……？\u3000私には、もう何もわからない……」"
translation = "「동료라고 말해준 건 거짓말이었을까……? 베아토는 처음부터 우리를 속일 셈이었을까……? 나는 이제 아무것도 모르겠어……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……そうか、お前も大変だったんだな」"
translation = "「……그렇군, 너도 고생 많았구나.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「でもさっき、ベアトとデネブで会ったって言ってたよな。その時に話はできなかったのか？」"
translation = "「하지만 아까 베아토랑 데네브에서 만났다고 했잖아. 그때 이야기는 못 해본 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「もちろん聞いた、君は敵なのかと。……そう言ってしまった」"
translation = "「물론 물어봤다, 너는 적인 거냐고. ……그렇게 말해버렸어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトは今まで見たことのない、傷ついたような顔をしていた」"
translation = "「베아토는 지금까지 본 적 없는, 상처받은 듯한 표정을 짓고 있었지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だけどベアトは何も言ってくれなかった」"
translation = "「하지만 베아토는 아무 말도 해주지 않았어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「『敵じゃない』と言ってくれれば、私は信じたのに……」"
translation = "「『적이 아니야』라고 말해줬다면 믿었을 텐데……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトも、ジグも、どうして私に何も言ってくれない……」"
translation = "「베아토도, 지그도, 어째서 나에게 아무 말도 해주지 않는 거지……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私に力がないから……だから信じてくれないのか？\u3000私は本当のことを話すに値しない存在なのか？」"
translation = "「나에게 힘이 없어서…… 그래서 믿어주지 않는 건가? 나는 진실을 들을 가치도 없는 존재인 건가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は……そんなに弱いのか……？」"
translation = "「나는…… 그렇게나 약한 건가……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……ベアトが何を考えていたかは、あたしにはわからない。どうして新星学園に入ったのか。なぜ何も話さなかったのかも」"
translation = "「……베아토가 무슨 생각을 했는지는 나도 몰라. 어째서 신성학원에 들어왔는지, 왜 아무 말도 하지 않았는지도.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だけど梨緒は、ベアトが敵じゃないと思ってるんだな」"
translation = "「하지만 리오, 너는 베아토가 적이 아니라고 생각하고 있구나.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！\u3000それは……」"
translation = "「! 그건……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「選挙管理委員会の委員長として、委員の１人が敵であってほしくないと思っているだけだ。彼女が敵でないという確証はない」"
translation = "「선거관리위원회의 위원장으로서 위원 중 한 명이 적이 아니길 바랄 뿐이다. 그녀가 적이 아니라는 확증은 없어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「いや、そこは正直になれよ。別に咎めてるわけじゃないんだからさ」"
translation = "「아니, 거기선 솔직해지라고. 딱히 나무라는 게 아니니까 말이야.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「敵じゃないなら簡単だ。会って話してみればいい」"
translation = "「적이 아니라면 간단해. 만나서 이야기해 보면 되잖아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そんな簡単にいくわけないだろう……！」"
translation = "「그렇게 간단히 될 리가 없지 않나……!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そうかもしれない。だけど簡単かもしれない」"
translation = "「그럴지도 모르지. 하지만 의외로 간단할 수도 있어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「相手に心を開いて話をする。それで解決することもある」"
translation = "「상대에게 마음을 열고 대화를 한다. 그것만으로 해결되는 일도 있지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……！\u3000だけど！\u3000ベアトは『敵じゃない』って言ってくれなかった！」"
translation = "「……! 하지만! 베아토는 『적이 아니야』라고 말해주지 않았어!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「一回聞いてダメなら、もう一回聞いてみたらいいじゃないか」"
translation = "「한 번 물어서 안 되면 한 번 더 물어보면 되잖아.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「人はいつでも、思ってることをそのまま言えるわけじゃない」"
translation = "「사람은 언제나 생각하는 걸 그대로 말할 수 있는 게 아니거든.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「何かが邪魔して、思ったことを言えない時もある。言葉が出てこなくて、うまく伝えられないこともある」"
translation = "「무언가가 방해해서 생각한 걸 말할 수 없을 때도 있고, 말이 나오지 않아서 제대로 전달하지 못할 때도 있어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「今日お前と話した時が、ベアトにとってそうだったのかもしれない」"
translation = "「오늘 너와 대화했을 때가 베아토에게는 그랬을지도 모르지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そりゃ、本当のことを言わなかったのはベアトが悪いさ」"
translation = "「뭐, 진실을 말하지 않은 건 베아토가 잘못한 거야.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「やましいことがないのなら、極星学園の副会長だって自分から言うべきだった。言わなかった結果、梨緒たちを騙すことになってしまった」"
translation = "「떳떳하다면 극성학원의 부회장이라는 것도 스스로 밝혔어야 했지. 말하지 않은 결과 리오 너희를 속이게 된 거니까.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「でも誰だって間違える。失敗する」"
translation = "「하지만 누구나 실수하고 실패하는 법이야.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だから許してやれ」"
translation = "「그러니까 용서해 줘라.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「許す……？\u3000私が、ベアトを……？」"
translation = "「용서하라고……? 내가 베아토를……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、そうだ」"
translation = "「아아, 그래.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「過ちも、失敗も、誰だって持ってる弱さだ。だからその弱さを許してやれ」"
translation = "「과오도, 실패도, 누구나 가지고 있는 약함이다. 그러니까 그 약함을 용서해 줘.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「弱さを……許す……」"
translation = "「약함을…… 용서한다……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「弱いことは罪じゃない。恥ずかしいことでもない。誰だってそうなんだから」"
translation = "「약한 건 죄가 아니야. 부끄러운 일도 아니고. 누구나 다 그러니까.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「お前は選挙管理委員会の委員長なんだろう？\u3000リーダーなら、仲間の弱さも受け止めてやれ」"
translation = "「너는 선거관리위원회의 위원장이잖아? 리더라면 동료의 약함도 받아들여 줘라.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「受け止める……」"
translation = "「받아들인다……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「わかった……とは言えない。君の言っていることを全て理解したわけじゃない」"
translation = "「알았다……라고는 말 못 하겠군. 네가 하는 말을 전부 이해한 건 아니다.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、それでいい。もう少し考えてみろ」"
translation = "「아아, 그걸로 됐어. 조금 더 생각해 봐.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「さて、思ったより長話になっちゃったな。さすがにそろそろ寝ないと明日に響く」"
translation = "「자, 생각보다 이야기가 길어졌네. 슬슬 자지 않으면 내일 지장이 생기겠어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「じゃ、また明日。今度こそおやすみ」"
translation = "「그럼 내일 봐. 이번에야말로 잘 자라.」"

[[dialogue]]
speaker = "unk"
original = "アポロはそう言うと、空になったカップを片付けて去っていった。"
translation = "아폴로는 그렇게 말하고는 비어있는 컵을 치우고 떠나갔다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は……どうすればいい……？」"
translation = "「나는…… 어떻게 해야 하지……?」"

