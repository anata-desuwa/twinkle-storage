[[dialogue]]
speaker = "unk"
original = "第３話,いつか新魔法を叶える為に,P"
translation = "제3화, 언젠가 새로운 마법을 이루기 위해, P"

[[dialogue]]
speaker = "unk"
original = "その日はアステラが発生し、俺はシズハの力を借りて、共に出撃していた。"
translation = "그날은 아스텔라가 발생하여 나는 시즈하의 힘을 빌려 함께 출격하고 있었다."

[[dialogue]]
speaker = "unk"
original = "モンスターはＳＳ級と強敵だったが、ヴィクトリアフォームの力によって、無事撃破に成功した。"
translation = "몬스터는 SS급으로 강적이었으나 빅토리아 폼의 힘에 의해 무사히 격파에 성공했다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「――よし♪\u3000ディーちゃん、やったね♪」"
translation = "「──좋아♪ 디짱 해냈다♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「はぁ～、終わった終わった。今日はもう働かないからね～、ボク」"
translation = "「하아~ 끝났다 끝났다. 오늘은 이제 일 안 할 거니까~ 나.」"

[[dialogue]]
speaker = "イニシュ"
original = "「シズハ。原理はわかりませんが、あなたは星力ではなく、『魔力』を使って戦っているのですね」"
translation = "「시즈하. 원리는 모르겠지만 당신은 성력이 아니라 『마력』을 사용하여 싸우는군요.」"

[[dialogue]]
speaker = "ミネコ"
original = "「いや～、面白い子だとは思ってたけどさ。シズハは星騎士としても面白い能力を持ってるんだね～」"
translation = "「이야~ 재미있는 아이라고는 생각했지만 말야. 시즈하는 성기사로서도 재미있는 능력을 가지고 있네~」"

[[dialogue]]
speaker = "unk"
original = "たまたまマッドスタンパーで一緒に遊んでいた為、共に出撃したミネコとイニシュの２人が言う。"
translation = "우연히 매드 스탬퍼를 같이 하고 있었기에 함께 출격한 미네코와 이니슈 두 사람이 말한다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「はい。あの……詳しくは話せないんですけど……『魔法』を使えるのには事情があって……」"
translation = "「네. 저기…… 자세히는 말씀드릴 수 없지만…… 『마법』을 쓸 수 있는 데에는 사정이 있어서……」"

[[dialogue]]
speaker = "ミネコ"
original = "「ああ、いいよいいよ。特殊って言うなら、私だって似たようなもんだし♪」"
translation = "「아아, 괜찮아 괜찮아. 특수하다고 한다면 나도 비슷한 처지고♪」"

[[dialogue]]
speaker = "イニシュ"
original = "「……私も深くは聞きません。シズハが話したいと思った時に、話してくれれば構いません」"
translation = "「……저도 깊게 묻지는 않겠습니다. 시즈하가 이야기하고 싶어질 때 이야기해주면 상관없습니다.」"

[[dialogue]]
speaker = "イニシュ"
original = "「私は長い時を生きる魔女ですから。友達として、何年でも待てます」"
translation = "「저는 오랜 시간을 살아가는 마녀니까요. 친구로서 몇 년이라도 기다릴 수 있습니다.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ミネコ先輩、イニシュさん……ありがとうございます♪」"
translation = "「미네코 선배, 이니슈 씨…… 감사합니다♪」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「――って、会長！\u3000よく見たら、手を怪我してない？」"
translation = "「──그보다 회장님! 잘 보니까 손 다치지 않았어?」"

[[dialogue]]
speaker = "unk"
original = "あっ、本当だ"
translation = "앗, 정말이네."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ちょっと待ってて！\u3000救急箱を持ってくるから――」"
translation = "「잠깐 기다려줘! 구급상자를 가져올 테니까──」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「これでよし、っと……」"
translation = "「이걸로 됐다……」"

[[dialogue]]
speaker = "unk"
original = "シズハ、いつからこんな処置できるように？"
translation = "시즈하, 언제부터 이런 처치를 할 수 있게 됐어?"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「えへへっ、実はね、トマルくんや、学園の先生に教えてもらったんだ♪」"
translation = "「에헤헤, 사실은 토마루 군이랑 학원 선생님께 배웠어♪」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「前に会長にも話したでしょ？\u3000私がいつか『新魔法』を作りたいって話」"
translation = "「전에 회장님한테도 말했었지? 내가 언젠가 『신마법』을 만들고 싶다는 이야기.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「それで、人の病気を治す新魔法を目指すなら、ちゃんと医学の知識も学んでおかなきゃって思って」"
translation = "「그래서 사람의 병을 고치는 신마법을 목표로 한다면 제대로 의학 지식도 배워둬야겠다고 생각해서.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「だから最近は、図書館で医学の本を借りて勉強してるんだ」"
translation = "「그래서 요즘은 도서관에서 의학 서적을 빌려 공부하고 있어.」"

[[dialogue]]
speaker = "イニシュ"
original = "「シズハが『新魔法』を……？」"
translation = "「시즈하가 『신마법』을……?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「あっ、はい。実は私……今の医学ではまだ治せないような、そんな病気でも治療できる魔法を使えるようになりたいんです」"
translation = "「앗, 네. 사실 저…… 지금 의학으로는 아직 고칠 수 없는 그런 병이라도 치료할 수 있는 마법을 쓸 수 있게 되고 싶어요.」"

[[dialogue]]
speaker = "イニシュ"
original = "「どうしてそのような考えに至ったのですか？」"
translation = "「어째서 그런 생각에 이르게 된 것인가요?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「私、少し前までは病気で、小さい頃からずっと入院生活を送っていて……」"
translation = "「저, 얼마 전까지는 병 때문에 어릴 때부터 계속 입원 생활을 보냈거든요……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「今は運よく治って、こうして学園に通えてますけど……その頃は、自分の明るい未来なんて、全然見えなくて」"
translation = "「지금은 운 좋게 나아서 이렇게 학원에 다니고 있지만…… 그때는 제 밝은 미래 같은 건 전혀 보이지 않아서.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「それでも、両親や病院の先生、看護師さん、ディーちゃん、それにお姉ちゃん――」"
translation = "「그래도 부모님이나 병원 선생님, 간호사 언니들, 디짱, 그리고 언니──」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「周りのみんなが、私に『生きる力』をくれたんです」"
translation = "「주변 모두가 저에게 『살아가는 힘』을 주었어요.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「だから今度は私が……同じように未来が見えなくなっている人たちに、生きる力をあげたいんです」"
translation = "「그래서 이번에는 제가…… 똑같이 미래가 보이지 않게 된 사람들에게 살아가는 힘을 주고 싶어요.」"

[[dialogue]]
speaker = "ミネコ"
original = "「なるほど。それがキミの心に輝く『宝石』ってわけだね」"
translation = "「그렇구나. 그것이 네 마음속에 빛나는 『보석』이라는 거네.」"

[[dialogue]]
speaker = "イニシュ"
original = "「でしたら、魔法のことで何か知りたいことがあれば、いつでも相談して下さい」"
translation = "「그렇다면 마법에 대해 뭔가 알고 싶은 게 있다면 언제든 상담해 주세요.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「え？\u3000イニシュさん、いいんですか？」"
translation = "「에? 이니슈 씨, 괜찮나요?」"

[[dialogue]]
speaker = "イニシュ"
original = "「私もまだ、失った記憶をすべて取り戻したわけではありません。なので、どこまで教えられるかはわかりませんが……」"
translation = "「저도 아직 잃어버린 기억을 전부 되찾은 것은 아닙니다. 그래서 어디까지 가르쳐줄 수 있을지는 모르겠지만……」"

[[dialogue]]
speaker = "イニシュ"
original = "「友達として、力になります」"
translation = "「친구로서 힘이 되어 드리겠습니다.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ありがとう、イニシュさん♪」"
translation = "「고마워요 이니슈 씨♪」"

[[dialogue]]
speaker = "unk"
original = "医学の勉強なら、俺も協力するぞ"
translation = "의학 공부라면 나도 협력할게."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「会長も、ありがとう♪」"
translation = "「회장님도 고마워요♪」"

[[dialogue]]
speaker = "ディーラック"
original = "（ネビュラの魔女に、シズハちゃんの『聖杯』やボクのことを知られるのは、あまりよくないとは思うけど……）"
translation = "(네뷸라의 마녀에게 시즈하짱의 『성배』나 나에 대해 알려지는 건 별로 좋지 않다고 생각하지만……)"

[[dialogue]]
speaker = "ディーラック"
original = "（まぁ、このイニシュとかいうのは……一旦見て見ぬフリで保留にしといてやろうかな……）"
translation = "(뭐, 이 이니슈라는 녀석은…… 일단 못 본 척하고 보류해 둘까나……)"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ、魔法を使えることについては詳しく聞かないって言ったけど、代わりに教えて欲しいことがあってさ～」"
translation = "「앗, 마법을 쓸 수 있다는 것에 대해서는 자세히 묻지 않겠다고 했지만 대신 가르쳐줬으면 하는 게 있어서 말야~」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「はい、なんでしょう？」"
translation = "「네, 뭔가요?」"

[[dialogue]]
speaker = "ミネコ"
original = "「シズハと会長って、付き合ってるんでしょ？\u3000だったら、２人の関係がどこまで進んでるのかって情報が、私としては知りたいな～♪」"
translation = "「시즈하랑 회장님 사귀고 있는 거지? 그렇다면 두 사람 관계가 어디까지 진전됐는지에 대한 정보를 나로서는 알고 싶은데~♪」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「へ！？\u3000な、なに言ってるんですか！？\u3000先輩のバカバカ！」"
translation = "「헤!? 무, 무슨 소리 하시는 거예요!? 선배 바보바보!」"

[[dialogue]]
speaker = "ミネコ"
original = "「ありゃ？\u3000シズハってば、めっちゃ恥ずかしがってる～♪」"
translation = "「어라라? 시즈하 엄청 부끄러워하네~♪」"

[[dialogue]]
speaker = "unk"
original = "可愛いだろ？"
translation = "귀엽지?"

[[dialogue]]
speaker = "イニシュ"
original = "「友達関係のことについては私もわかりますが、恋人関係については、私もよくわかりません」"
translation = "「친구 관계에 대해서는 저도 이해하지만 연인 관계에 대해서는 저도 잘 모르겠습니다.」"

[[dialogue]]
speaker = "イニシュ"
original = "「シズハ。『男性とキスをする』というのは、どのような感覚なのでしょうか？」"
translation = "「시즈하. 『남성과 키스를 한다』는 것은 어떤 감각인가요?」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「イニシュさんまで！？\u3000ば、バカバカ！\u3000そんな恥ずかしいこと、言えるわけないじゃないっ！」"
translation = "「이니슈 씨까지!? 바, 바보바보! 그런 부끄러운 거 말할 수 있을 리 없잖아요!」"

[[dialogue]]
speaker = "ミネコ"
original = "「ぷっ……あはははっ♪\u3000じゃあさ、このあとみんなでラーメンでも食べに行かない？\u3000そこでゆっくりと聞かせてよ～♪」"
translation = "「풉…… 아하하하하♪ 그럼 말야, 이따가 다 같이 라멘이라도 먹으러 안 갈래? 거기서 천천히 들려달라고~♪」"

[[dialogue]]
speaker = "イニシュ"
original = "「いいですね。この近くには、美味しい<ruby>鶏白湯<rt>とりぱいたん</rt></ruby>ラーメンの店、『<ruby>ＲＡＭＥＮ<rt>ラーメン</rt></ruby>\u3000<ruby>ＴＯＲＩＳＵＫＥ<rt>トリスケ</rt></ruby>』があります」"
translation = "「좋네요. 이 근처에는 맛있는 토리파이탄 라멘 가게, 『RAMEN TORISUKE』가 있습니다.」"

[[dialogue]]
speaker = "ミネコ"
original = "「おっ、さすがラーメン好きのイニシュ、詳しい～♪\u3000ほらシズハ、元気にいけいけゴーゴーだよ♪」"
translation = "「오, 역시 라멘 마니아 이니슈 잘 아는데~♪ 자 시즈하, 활기차게 이케이케 고고라고♪」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ちょっ、私の言葉を盗らないでください！\u3000恋愛関係の話は、いけいけゴーゴーしませんから～～っ！」"
translation = "「잠깐, 제 대사를 가로채지 마세요! 연애 관계 이야기는 이케이케 고고 하지 않을 거니까요~~!」"

[[dialogue]]
speaker = "unk"
original = "そうしてミネコに肩を組まれ、イニシュと共に半ば連行されるシズハ。"
translation = "그렇게 미네코가 어깨팔을 두르고, 이니슈와 함께 반쯤 연행되는 시즈하."

[[dialogue]]
speaker = "unk"
original = "その後――俺たちはラーメンを食べながら、たっぷりと恋愛話を聞かれることになるのだった。"
translation = "그 후―― 우리들은 라멘을 먹으면서, 연애 이야기를 잔뜩 들려주게 되었다."

