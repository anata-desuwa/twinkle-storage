[[dialogue]]
speaker = "unk"
original = "第１話,リーダーの資質,P"
translation = "제1화, 리더의 자질, P"

[[dialogue]]
speaker = "unk"
original = "放課後、星徒会室で来客を待っていると、ノックの音が聞こえた。"
translation = "방과 후, 성도회실에서 손님을 기다리고 있자 노크 소리가 들렸다."

[[dialogue]]
speaker = "レイラ"
original = "「失礼いたします」"
translation = "「실례하겠습니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「改めまして、<ruby>私<rt>わたくし</rt></ruby>はコラプサー首領、百目騎レイラと申します」"
translation = "「다시 한번 인사드리겠습니다, 저는 콜랩서 수령, 도메키 레이라라고 합니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「緋宮星徒会長におかれましては、本日はこのような機会を設けていただき、心から感謝を申し上げます」"
translation = "「히노미야 성도회장님께서는 오늘 이런 기회를 마련해 주셔서 진심으로 감사를 표합니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「私たちコラプサーは星騎士の方々を傷付けたばかりか、あまつさえ命を奪おうともしました。謝って許されることではありません」"
translation = "「우리 콜랩서는 성기사분들을 상처 입혔을 뿐만 아니라, 하물며 목숨까지 빼앗으려 했습니다. 사과해서 용서받을 수 있는 일이 아닙니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「それでもどうか、謝罪させてください。…………申し訳ありませんでした」"
translation = "「그럼에도 부디 사과하게 해주세요. …………죄송했습니다.」"

[[dialogue]]
speaker = "unk"
original = "これからの話をしよう"
translation = "앞으로의 이야기를 하자."

[[dialogue]]
speaker = "unk"
original = "顔を上げて"
translation = "고개 들어."

[[dialogue]]
speaker = "レイラ"
original = "「はい。私たちはネビュラ<ruby>麾下<rt>きか</rt></ruby>に戦闘員として加えていただきました。モンスター、そしてリクリエとの戦いに邁進する所存です」"
translation = "「네. 저희는 네뷸라 산하의 전투원으로서 합류하게 되었습니다. 몬스터, 그리고 리크리에와의 싸움에 매진할 생각입니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「ただ、コラプサーの能力は先の秋葉原の事件を経て弱体化してしまいました。星力の出力、吸収能力ともに以前ほどではありません。戦力としては未知数な部分もございます」"
translation = "「다만 콜랩서의 능력은 지난 아키하바라 사건을 거치며 약화되었습니다. 성력의 출력, 흡수 능력 모두 이전만 못 합니다. 전력으로서는 미지수인 부분도 있습니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「つきましては、星騎士の皆様には、先達としてご指導ご鞭撻いただければ幸いです」"
translation = "「따라서 성기사 여러분께서는 선배로서 지도와 편달을 부탁드리고자 합니다.」"

[[dialogue]]
speaker = "unk"
original = "コラプサーって結局何者だったんだろう？"
translation = "콜랩서란 결국 정체가 뭐였을까?"

[[dialogue]]
speaker = "レイラ"
original = "「そうですね……私もトワ先生にお聞きして理解した部分もあるのですが」"
translation = "「그렇네요…… 저도 토와 선생님께 여쭤보고 이해한 부분도 있습니다만.」"

[[dialogue]]
speaker = "レイラ"
original = "「通常、星騎士は１つの星と契約し、星力を得ます。その星が守護星です」"
translation = "「보통 성기사는 하나의 별과 계약하여 성력을 얻습니다. 그 별이 수호성입니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「コラプサーもブラックホールと契約し、そこから力を得ています。ブラックホールが私たちの守護星ですので、普通の守護星を持つことはできません」"
translation = "「콜랩서도 블랙홀과 계약하여 거기서 힘을 얻습니다. 블랙홀이 저희의 수호성이기에 일반적인 수호성을 가질 수는 없습니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「私やイングリットが星騎士になれなかったのもそのせいでしょう」"
translation = "「저나 잉그리드가 성기사가 되지 못한 것도 그 때문이겠죠.」"

[[dialogue]]
speaker = "レイラ"
original = "「しかしコラプサーの力は通常は目覚めず、死によって覚醒します。条件が特殊なのは、ブラックホールが死した星の成れの果てだからでしょう」"
translation = "「하지만 콜랩서의 힘은 평상시에는 깨어나지 않고 죽음을 통해 각성합니다. 조건이 특수한 것은 블랙홀이 죽은 별의 잔해이기 때문일 것입니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「一度死に、ブラックホールに生かされていた私たちは、生きた死人ともいえる存在でした。それを生者に戻したのが、コハルコさんの魔法です」"
translation = "「한번 죽고 블랙홀에 의해 생명을 유지하던 저희는 살아있는 시체와 같은 존재였습니다. 그것을 산 사람으로 되돌린 것이 코하루코 씨의 마법입니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「ただ疑問が残ります。前例のない、私たちのような存在が、どうして小規模ながらも１つの組織となるほどに集まったのか」"
translation = "「다만 의문이 남습니다. 전례 없는 저희 같은 존재가 어떻게 소규모라지만 하나의 조직을 이룰 정도로 모였는가 하는 점입니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「ここからはトワ先生の推測も含むのですが……」"
translation = "「여기서부터는 토와 선생님의 추측도 포함됩니다만……」"

[[dialogue]]
speaker = "レイラ"
original = "「おそらくブラックホールを守護星とする者は今までもいた。けれど力に目覚めなかったのは、死したまま蘇生しなかったから」"
translation = "「아마 블랙홀을 수호성으로 둔 자는 전에도 있었을 것입니다. 하지만 힘에 눈뜨지 못한 것은 죽은 채로 소생하지 못했기 때문이겠죠.」"

[[dialogue]]
speaker = "レイラ"
original = "「だけど私たちが死した瞬間、何者かが私たちに働きかけ、何らかの意図で生かした。だからコラプサーが生まれた」"
translation = "「하지만 저희가 죽은 순간, 누군가가 저희에게 개입하여 어떠한 의도로 살려냈습니다. 그래서 콜랩서가 태어난 것입니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「……私は、その何者かに心当たりはありませんけど」"
translation = "「……저는 그 누군가에 대해 짐작 가는 바가 없습니다만.」"

[[dialogue]]
speaker = "unk"
original = "魔女イザベラが変じた姿は、リクリエを教義とするバジュラ教団の亡霊に似ていた。"
translation = "마녀 이자벨라가 변한 모습은 리크리에를 교리로 삼는 바쥬라 교단의 망령과 닮아 있었다."

[[dialogue]]
speaker = "unk"
original = "以前エンジュとメテオラと戦った時も、イザベラのように一時正気を失っていた。"
translation = "이전에 엔쥬, 메테오라와 싸웠을 때도 이자벨라처럼 잠시 이성을 잃고 있었다."

[[dialogue]]
speaker = "unk"
original = "コラプサーに影響を与えていた『何者か』は、リクリエなのかもしれない。"
translation = "콜랩서에게 영향을 주었던 『누군가』는 리크리에일지도 모른다."

[[dialogue]]
speaker = "レイラ"
original = "「ところで、魔王さ……緋宮星徒会長」"
translation = "「그런데 마왕 사…… 히노미야 성도회장님.」"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さんでいい……？\u3000ではお言葉に甘えて……」"
translation = "「마왕님이라고 불러도 될까요……? 그럼 말씀하신 대로 편하게……」"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さんは個性豊かな星騎士を率いる組織の長です。その秘訣をご教授いただければ、と」"
translation = "「마왕님은 개성 넘치는 성기사들을 이끄는 조직의 수장입니다. 그 비결을 전수해 주셨으면 해서요.」"

[[dialogue]]
speaker = "レイラ"
original = "「うちのコラプサーたちは……その、あまりにもクセが強いというか、人の話を聞いてくれないというか……」"
translation = "「우리 콜랩서 애들은…… 그게, 너무 개성이 강하다고 해야 할지, 남의 말을 안 듣는다고 해야 할지……」"

[[dialogue]]
speaker = "レイラ"
original = "「大変そう……？\u3000そう、そうなんですよ！\u3000実際大変なんです！」"
translation = "「힘들 것 같다고요? 맞아요, 맞아요! 정말 힘들답니다!」"

[[dialogue]]
speaker = "レイラ"
original = "「イングリットがイニシュさんに挑みかかったり、禁止されているのにキサナがお金を賭けてポーカーやったり……」"
translation = "「잉그리드가 이니슈 씨에게 덤벼들거나, 금지되어 있는데도 키사나가 돈을 걸고 포커를 하거나……」"

[[dialogue]]
speaker = "レイラ"
original = "「メテオラが基地を壊したり、ヴァレリーの視線が気持ち悪いって苦情が来たり……」"
translation = "「메테오라가 기지를 부수거나, 발레리의 시선이 기분 나쁘다는 불만이 들어오거나……」"

[[dialogue]]
speaker = "レイラ"
original = "「自分から言い出したことなんですが、コラプサーのやらかしは私がまず怒られることになっているので……うぅ……っ」"
translation = "「제가 먼저 꺼낸 말이긴 하지만, 콜랩서의 사고는 우선 제가 혼나기로 되어 있어서…… 으으……」"

[[dialogue]]
speaker = "レイラ"
original = "「彼女たちを御するコツがあれば、是非とも教えてください！」"
translation = "「그녀들을 다루는 요령이 있다면 부디 가르쳐 주세요!」"

[[dialogue]]
speaker = "unk"
original = "そうは言っても、新星学園にあそこまでの問題児はいない。コツと言われても……"
translation = "그렇게 말해도 신성학원에 저 정도 문제아는 없다. 요령이라고 해도……"

[[dialogue]]
speaker = "アニマ"
original = "「会長、実験の時間ダ！\u3000今日の薬は今までより女の子タイムを増やした性転換薬だ！\u3000しかも飲みやすい甘いシロップにしてやったゾ！」"
translation = "「회장, 실험 시간이다! 오늘의 약은 지금까지보다 여자아이 타임을 늘린 성전환약이다! 게다가 마시기 쉽게 달콤한 시럽으로 만들었다!」"

[[dialogue]]
speaker = "unk"
original = "今日はお客さんが来てるのでまた後日"
translation = "오늘은 손님이 와 계시니 나중에 다시."

[[dialogue]]
speaker = "レイラ"
original = "「魔王さん、後日女の子になっちゃうんですか！？」"
translation = "「마왕님, 나중에 여자아이가 되시는 건가요!?」"

[[dialogue]]
speaker = "アニマ"
original = "「フフフ、気になるなら見に来るがイイ。ではまた後でナ！」"
translation = "「후후후, 궁금하면 보러 오너라. 그럼 이따가 보자!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ふはははは！！\u3000新しい脚本ができたぞ！\u3000会長は双子の姉と弟の一人二役！\u3000すぐ読み合わせだ！」"
translation = "「푸하하하하!! 새로운 각본이 완성됐다! 회장은 쌍둥이 누나와 남동생의 1인 2역! 당장 대본 연습이다!」"

[[dialogue]]
speaker = "unk"
original = "後で演劇部に行くので待っててください"
translation = "나중에 연극부에 갈 테니 기다려주세요."

[[dialogue]]
speaker = "レイラ"
original = "「魔王さんを女の子にしたい勢力があるんですかこの学園！？」"
translation = "「마왕님을 여자아이로 만들려는 세력이 있는 건가요, 이 학원!?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「言質はとった。必ず後で来い！\u3000でなければ衣装の布を３０％にするからな！」"
translation = "「확답은 받았다. 반드시 나중에 와라! 그러지 않으면 의상 천을 30%로 줄여버릴 테니까!」"

[[dialogue]]
speaker = "パルミエ"
original = "「ダ～リ～ン、ヒマだから構って～。ゲーム飽きちゃった～」"
translation = "「다~링, 심심하니까 놀아줘~. 게임 질려버렸어~」"

[[dialogue]]
speaker = "unk"
original = "間違い探しをあげます"
translation = "틀린 그림 찾기 줄게요."

[[dialogue]]
speaker = "パルミエ"
original = "「何これ、同じ絵じゃないの？\u3000間違いを全部見つけたらご褒美くれる？\u3000ならやるわ～。ご褒美、約束よ～」"
translation = "「뭐야 이거, 똑같은 그림 아니야? 틀린 거 전부 찾으면 보상 줄 거야? 그럼 할게~. 보상, 약속이야~」"

[[dialogue]]
speaker = "レイラ"
original = "「今の方、もはや用事ですらなかったですね……というか、魔王さんのことダーリンて呼んでましたよね？」"
translation = "「방금 그분은 이제 용건조차 없었네요…… 그나저나 마왕님을 달링이라고 부르던데요?」"

[[dialogue]]
speaker = "レイラ"
original = "「あんなに傍若無人な方々に対しても一切動じないなんて……さすが星徒会長です。百目騎レイラ、感服いたしました」"
translation = "「저렇게 안하무인인 분들을 상대로도 전혀 동요하지 않다니…… 역시 성도회장님이십니다. 도메키 레이라, 감복했습니다.」"

[[dialogue]]
speaker = "レイラ"
original = "「然して、その秘訣とは……っ！」"
translation = "「그렇다면 그 비결이란 건……!」"

[[dialogue]]
speaker = "unk"
original = "慣れ、かな……"
translation = "익숙함, 이려나……"

[[dialogue]]
speaker = "レイラ"
original = "「慣れ！？\u3000そんなんでいいんですか！？」"
translation = "「익숙함!? 그런 걸로 되는 건가요!?」"

[[dialogue]]
speaker = "レイラ"
original = "「ああ、魔王さんの眼から光が失われています。どれだけの修羅場をくぐりぬけてきたのでしょうか……」"
translation = "「아아, 마왕님의 눈에서 빛이 사라졌어요. 얼마나 많은 수라장을 헤쳐오신 건가요……」"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さんのこと尊敬します。でもその境地には至れそうにないというか、至りたくないというか……」"
translation = "「마왕님을 존경합니다. 하지만 그 경지에는 도달할 수 없을 것 같기도 하고, 도달하고 싶지 않기도 하고……」"

[[dialogue]]
speaker = "unk"
original = "管理職同士（？）、苦労を分かち合えればいいなと思うのであった……。"
translation = "관리직끼리(?), 고충을 나눌 수 있으면 좋겠다고 생각하는 것이었다……."

