[[dialogue]]
speaker = "unk"
original = "第５話,《境界》のマグダレナ,B"
translation = "제5화, 《경계》의 막달레나, B"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「……どうだ！？」"
translation = "「……어떠냐!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「輝きが……！」"
translation = "「빛이……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「……ふぅ。ようやく自由になりました」"
translation = "「……휴우. 겨우 자유로워졌습니다.」"

[[dialogue]]
speaker = "unk"
original = "輝きが収束すると、堕天使であった存在は一柱の天使となって再臨した。"
translation = "빛이 수속되자, 타천사였던 존재는 한 기둥의 천사가 되어 재림했다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ありがとうございました──<ruby>星騎士<rt>スターナイト</rt></ruby>の皆さん。私はどうやら瘴気に汚染され、正気を失っていたようです」"
translation = "「감사했습니다── 성기사 여러분. 저는 아무래도 장기에 오염되어, 제정신을 잃었던 것 같습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お礼には及びません。ご無事で済んだのなら何よりです」"
translation = "「감사 인사는 필요 없습니다. 무사하신 것으로 끝났다면 더할 나위 없습니다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま、これがうちらの務めだしね～」"
translation = "「뭐, 이게 우리들의 임무니까～」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「（……！\u3000……！\u3000瘴気が！\u3000正気って！）」"
translation = "「(……! ……! 장기가! 제정신이라니!)」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「（みんな気づいてるけど言わないだけだから）」"
translation = "「(모두 눈치채고 있지만 말하지 않는 것뿐이니까요)」"

[[dialogue]]
speaker = "unk"
original = "堕天使──であった天使は、改めて彼女たちに名を名乗った。"
translation = "타천사──였던 천사는, 다시 그녀들에게 이름을 밝혔다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「私は守護天使──《境界》のマグダレナ」"
translation = "「저는 수호 천사── 《경계》의 막달레나입니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「女神に創造されし六柱が一──領域を司る存在」"
translation = "「여신에게 창조된 여섯 기둥 중 하나── 영역을 관장하는 존재입니다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほ、ほえー……守護天使さんというと、とてつもなくお偉い存在であったような……！」"
translation = "「호, 호에ー…… 수호 천사님이라고 하면, 엄청나게 높은 분이었던 것 같은……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ただ者じゃねーな。明らかに」"
translation = "「보통 녀석이 아니네. 명백히.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「<ruby>平生<rt>へいぜい</rt></ruby>であれば天界にも姿を現さず、陰ながら摂理の守護に務めております」"
translation = "「평소라면 천계에도 모습을 드러내지 않고, 음지에서 섭리의 수호에 힘쓰고 있습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「しかし、こうして守護天使の私まで堕ちることになるとは……やはり此度のリクリエ、普通ではありませんね」"
translation = "「하지만, 이렇게 수호 천사인 저까지 타락하게 될 줄이야…… 역시 이번 리크리에는, 보통이 아니군요.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャニャ！\u3000堕天使のような見た目だったニャン」"
translation = "「냐냐! 타천사 같은 모습이었다냥.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「此度の──という表現も、気にかかりますね」"
translation = "「이번의──라는 표현도, 마음에 걸리네요.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「多分、<b>前回</b>に比べてってことじゃないカナ？\u3000確か三千年前はリクリエが来そうになったのを撃退したんっしょ？」"
translation = "「아마, <b>전회</b>에 비해서라는 뜻이 아닐까나? 분명 3천 년 전에는 리크리에가 오려던 걸 격퇴했잖아?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふ……良い勘ですね。その通りです」"
translation = "「후후…… 좋은 직감이네요. 그 말대로입니다.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「その時代から生きてる存在──ってことかよ……！」"
translation = "「그 시대부터 살아온 존재──라는 거냐고……!」"

[[dialogue]]
speaker = "unk"
original = "守護天使の意味はわからずとも、マグダレナが高位な存在にあるというのはその場の誰にも感じ取れた。"
translation = "수호 천사의 의미는 알 수 없었지만, 막달레나가 고위의 존재라는 것은 그 자리에 있던 누구라도 느낄 수 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "하지만……"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っと……いいとこなのによ。アステラが消えかかってるぜ」"
translation = "「칫…… 좋은 부분인데 말이야. 아스테라가 사라지려 하고 있잖아.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま、汚染を解放したんだから当然なんだけど～」"
translation = "「뭐, 오염을 해방했으니까 당연한 거지만～」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「この場でもう少し語らいたいところですが……今の私も仮初めの身。あまり時間はなさそうですね」"
translation = "「이 자리에서 조금 더 이야기하고 싶습니다만…… 지금의 저도 임시의 몸. 그다지 시간은 없을 것 같네요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「星見さま」"
translation = "「호시미 님.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい」"
translation = "「네.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「貴女がここに参られたこと──それが私の幸運です。ゆえに……」"
translation = "「당신이 여기에 오신 것── 그것이 저의 행운입니다. 그러므로……」"

[[dialogue]]
speaker = "unk"
original = "マグダレナはフィオナただ一人を呼び止めた。"
translation = "막달레나는 피오나 단 한 사람만을 불러 세웠다."

[[dialogue]]
speaker = "unk"
original = "それから、白光に包まれた一枚の小さな紙を彼女へと託す。"
translation = "그리고, 백광에 둘러싸인 한 장의 작은 종이를 그녀에게 맡겼다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これは……？」"
translation = "「이것은……?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「これこそ主の鍵──<ruby>栞<rt>しおり</rt></ruby>です。これを──ミコに──渡して──それか……ら………」"
translation = "「이것이야말로 주인의 열쇠── 책갈피입니다. 이것을── 미코에게── 건네주고── 그리……고………」"

[[dialogue]]
speaker = "unk"
original = "そのアイテムと共に言い残すと、マグダレナの姿は光の粒子となって消えた。"
translation = "그 아이템과 함께 말을 남기자, 막달레나의 모습은 빛의 입자가 되어 사라졌다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「消えてしまいました……」"
translation = "「사라져 버렸습니다……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「これで良かったのか？」"
translation = "「이걸로 괜찮았던 건가?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「満足そうだったし、いんじゃない？」"
translation = "「만족스러워 보였고, 괜찮지 않아?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうですねえ……消えたというより、どこかへ帰ったように感じました！」"
translation = "「그렇네요오…… 사라졌다기보다는, 어딘가로 돌아간 것처럼 느껴졌습니다!」"

[[dialogue]]
speaker = "unk"
original = "そして、深奥に座していた堕天使──だった存在──が消滅したことによりアステライトも崩壊を迎える。"
translation = "그리고, 심오에 자리하고 있던 타천사──였던 존재──가 소멸함으로써 아스테라이트도 붕괴를 맞이한다."

[[dialogue]]
speaker = "unk"
original = "残された謎は多いものの、成果としては上々だった。"
translation = "남겨진 수수께끼는 많지만, 성과로서는 최고였다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひとまず……これで任務は完了ですね。みんなお疲れ様、街へ戻りましょう」"
translation = "「우선…… 이걸로 임무는 완료네요. 모두 수고했어요, 마을로 돌아갑시다.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ミッションクリアーなのニャン！」"
translation = "「미션 클리어인 거다냥!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「みんな、ご苦労さま。おかげで被害も出なかったみたい」"
translation = "「모두, 수고했어요. 덕분에 피해도 없었던 것 같네요.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふえぇ、大変でしたぁ。でもでもっ、これで街の平和が守られるなら、お安いことなのですっ」"
translation = "「후에에, 힘들었어요오. 하지만 하지만, 이걸로 마을의 평화가 지켜진다면, 싼 것인 것입니다!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「星見家がフィオナ嬢にかかればこの程度は朝飯前ニャン！\u3000たとえ家来が犬サルキジでも余裕なのニャン！」"
translation = "「호시미 가문의 피오나 양에게 걸리면 이 정도는 식은 죽 먹기다냥! 설령 하인이 개 원숭이 꿩이라도 여유로운 거다냥!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「誰がサルだ。オメーこそなんもしてねーだろ、アホ猫」"
translation = "「누가 원숭이야. 너야말로 아무것도 안 했잖아, 바보 고양이.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャンにゃと！？」"
translation = "「뭐, 뭐라냥!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「喧嘩ならよそでやってください、お２人」"
translation = "「싸움이라면 딴 데 가서 하세요, 두 분.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま、無事に済んだんだからなんでもいいっしょ～♪」"
translation = "「뭐, 무사히 끝났으니까 아무래도 상관없잖아～♪」"

[[dialogue]]
speaker = "unk"
original = "変身を解いて制服に戻れば、彼女らもただの学生と変わらない。"
translation = "변신을 풀고 교복으로 돌아가자, 그녀들도 그저 학생과 다를 바 없다."

[[dialogue]]
speaker = "unk"
original = "このまま今回の謎を語りつつ、帰路へつこうとしていたところ……"
translation = "이대로 이번 수수께끼를 이야기하며, 귀로에 오르려던 참에……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……あら」"
translation = "「……어머.」"

[[dialogue]]
speaker = "unk"
original = "彼らは、初めての対面を果たすことになった。"
translation = "그들은, 첫 대면을 하게 되었다."

