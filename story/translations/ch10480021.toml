[[dialogue]]
speaker = "unk"
original = "第１話,マムと休暇,P"
translation = "제1화, 맘과 휴가, P"

[[dialogue]]
speaker = "unk"
original = "新星寮の寮長『マム』こと、妃竜院マハムートと知り合ってから月日が経ったある日のこと。"
translation = "신성 기숙사의 사감 『맘』이라 불리는, 히류인 마하무트와 알고 지낸 지 수개월이 지난 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺は彼女を誘って、リゾート結界へとやって来ていた。"
translation = "나는 그녀를 권해서, 리조트 결계로 찾아왔다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――やっと来たわね。レディを待たせるとはいい度胸ね、会長？」"
translation = "「──드디어 왔네. 숙녀를 기다리게 하다니 배짱 좋네, 회장?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……なんてね。まだ約束の１０分前だから、安心なさい」"
translation = "「……농담이야. 아직 약속 10분 전이니까, 안심해」"

[[dialogue]]
speaker = "unk"
original = "水着、今日も似合ってますね"
translation = "수영복, 오늘도 잘 어울리네요"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なに？\u3000どうしたの、今更改まって。この前のビーチバレー特訓で、毎日のように着てたじゃない。別に褒められて悪い気はしないけれど……」"
translation = "「뭐야? 왜 그래, 이제 와서 새삼스럽게. 저번 비치발리볼 특훈 때 매일같이 입었잖아. 별로 칭찬받아서 기분 나쁘진 않지만……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長、ちょっと顔を貸しなさい」"
translation = "「회장, 잠깐 얼굴 좀 빌려줘」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マムは両手で俺の頬に触れて、顔を近づけてくる。"
translation = "그렇게 말하며, 맘은 양손으로 내 뺨을 만지며 얼굴을 가까이한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……調子が悪い、ということはなさそうね。ほら、昨日は星徒会の仕事で夜遅くまで残業していたでしょう？」"
translation = "「……컨디션이 나쁜 것 같지는 않네. 봐, 어제는 성도회 업무로 밤늦게까지 잔업했잖아?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「何だか、いつもと様子が違う気がしたから。一応聞いておくけど、寝不足で無理をしてるなんてことはないわよね？」"
translation = "「왠지 평소랑 분위기가 다른 것 같아서. 일단 물어보겠는데, 수면 부족으로 무리하고 있는 건 아니지?」"

[[dialogue]]
speaker = "unk"
original = "俺はドキッとしたが、首を横に振る。"
translation = "나는 가슴이 철렁했지만, 고개를 가로저었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふむ……まあ、いいわ。それで？\u3000今日は純粋に夏の休暇を楽しむということでいいのかしら？」"
translation = "「흠…… 뭐, 됐어. 그래서? 오늘은 순수하게 여름 휴가를 즐기는 걸로 하면 될까?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方が望むなら……この前の続きをしてあげてもいいけれど？」"
translation = "「네가 원한다면…… 저번의 다음을 해줘도 괜찮은데?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――何をって、決まってるじゃない。ふふ……」"
translation = "「──무엇을 이라니, 뻔하잖아. 후후……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ビーチバレーの特訓よ♪」"
translation = "「비치발리볼 특훈이야♪」"

[[dialogue]]
speaker = "unk"
original = "普通の休暇でお願いします！"
translation = "평범한 휴가로 부탁드립니다!"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「冗談よ。それじゃあ今日は、プライベートビーチでゆったり過ごすとしましょうか」"
translation = "「농담이야. 그럼 오늘은 프라이빗 비치에서 느긋하게 보내기로 할까」"

[[dialogue]]
speaker = "unk"
original = "リゾート結界のプライベートビーチ――それは、結界の主であるリップルが、星徒会室から出入りできるように繋げてくれている専用の空間である。"
translation = "리조트 결계의 프라이빗 비치── 그것은 결계의 주인인 리플이 성도회실에서 출입할 수 있도록 연결해준 전용 공간이다."

[[dialogue]]
speaker = "unk"
original = "その為、星徒会役員以外が利用することはほとんどなく、静かに過ごすにはうってつけの場所となっている。"
translation = "그 때문에 성도회 임원 이외에는 이용하는 일이 거의 없어, 조용히 보내기에는 안성맞춤인 장소다."

[[dialogue]]
speaker = "unk"
original = "俺とマムは大きなパラソルの下、２つ並んだビーチチェアーに座り、くつろぎながら過ごす。"
translation = "나와 맘은 커다란 파라솔 아래, 두 개 나란히 놓인 비치 체어에 앉아 휴식을 취하며 시간을 보낸다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふぅ……やっぱりここはいいわね」"
translation = "「후우…… 역시 여기는 좋네」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「全く、こんな場所を年中自由に使えるなんて、とんだ役得よね。今更ながら、星徒会に入らせてもらおうかしら？」"
translation = "「정말이지, 이런 장소를 일 년 내내 자유롭게 쓸 수 있다니, 엄청난 직권 남용이네. 이제 와서지만, 나도 성도회에 넣어달라고 할까?」"

[[dialogue]]
speaker = "unk"
original = "マムなら大歓迎ですよ"
translation = "맘이라면 대환영이에요"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「冗談に決まってるでしょう、まったく。まぁ、そうは言っても、最近は貴方の仕事を手伝うことも増えてきてしまっているけれど」"
translation = "「당연히 농담이지, 정말. 뭐, 그렇다고는 해도 최근에는 네 업무를 도와주는 일도 늘어나 버렸지만」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――感謝してるって？\u3000そうよ。畏怖を持って、先輩に感謝しなさい。……ふふっ」"
translation = "「──감사하고 있다고? 그래. 경외심을 가지고 선배에게 감사하도록 해. ……후훗」"

[[dialogue]]
speaker = "unk"
original = "いい感じの空気になったところで、俺は意を決して、切り出す。"
translation = "좋은 분위기가 된 시점에서, 나는 결심을 굳히고 말을 꺼낸다."

[[dialogue]]
speaker = "unk"
original = "実は今日、マムに話したいことがあって"
translation = "사실 오늘, 맘에게 하고 싶은 말이 있어서"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん？\u3000何かしら。相談事？」"
translation = "「응? 뭘까. 상담할 거라도 있어?」"

[[dialogue]]
speaker = "unk"
original = "マムがビーチチェアーから起き上がって、こちらに向き直る。俺は深呼吸をしてから、告げた。"
translation = "맘이 비치 체어에서 일어나 이쪽을 향해 돌아앉는다. 나는 심호흡을 한 뒤, 고했다."

[[dialogue]]
speaker = "unk"
original = "マム、好きです。俺と付き合って下さい"
translation = "맘, 좋아합니다. 저와 사귀어 주세요"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「…………ち、ちょっと待ちなさい。何を言い出すのかと思えば……」"
translation = "「…………잠, 잠깐 기다려봐. 무슨 말을 하나 했더니……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方が今日、いつもと様子が違う気がしたのって、そういうこと……？」"
translation = "「네가 오늘 평소랑 분위기가 다른 것 같았던 게, 그런 거였어……?」"

[[dialogue]]
speaker = "unk"
original = "マムは俺のこと、どう思ってますか？"
translation = "맘은 저에 대해 어떻게 생각하시나요?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ど、どうって……いきなりそんなこと言われても、返事に困るじゃない……」"
translation = "「어떻게라니…… 갑자기 그런 말을 들어도 대답하기 곤란하잖아……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「大体、どうして私なわけ？\u3000貴方なら、他にも仲のいい子が沢山いるでしょう。最近で言うと、マトイとか、アムとか……」"
translation = "「애초에 왜 나인 건데? 너라면 다른 친한 여자애들도 많이 있잖아. 최근으로 치면 마토이라든가, 아무라든가……」"

[[dialogue]]
speaker = "unk"
original = "１番親しい女の子は、マムだと思ってます"
translation = "가장 친한 여자애는 맘이라고 생각해요"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――私はどうなのかって？\u3000それは……確かに、こうやって休みの日に、２人きりで過ごしたりする間柄ではあるし……」"
translation = "「──나는 어떠냐고? 그건…… 확실히 이렇게 쉬는 날에 둘이서만 시간을 보내는 사이이기도 하고……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「１番親しい異性が誰かと聞かれたら……貴方では、あるけれど……」"
translation = "「가장 친한 이성이 누구냐고 묻는다면…… 너이긴 하지만……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……だ、だけど！\u3000こういうことは、もっと慎重に考えるべきよ、ええっ」"
translation = "「……하, 하지만! 이런 건 좀 더 신중하게 생각해야 해, 에엣」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私は『竜』だもの。付き合う男性として貴方を認めるには、試練を与えて、ちゃんと見極める必要があるわ、うん！」"
translation = "「나는 『용』인걸. 사귀는 남성으로서 너를 인정하려면 시련을 주고 제대로 지켜볼 필요가 있어, 응!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……ということで、まずは会長を試すところからになるけど、それでもいいのかしら……？」"
translation = "「……그러니까 우선은 회장을 시험하는 것부터 시작하겠는데, 그래도 괜찮을까……?」"

[[dialogue]]
speaker = "unk"
original = "もちろん！\u3000頑張ります！"
translation = "물론이죠! 열심히 하겠습니다!"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そ、そう……」"
translation = "「그, 그래……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「じゃあ、そういうことで……」"
translation = "「그럼, 그렇게 하는 걸로……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……って、異性として意識したら、まずは何から試すべきなのか、わからないわね……」"
translation = "「……랄까, 이성으로서 의식하니까 우선 뭐부터 시험해야 할지 모르겠네……」"

[[dialogue]]
speaker = "unk"
original = "まずはゆったり２人で過ごして、慣れるとか"
translation = "우선 느긋하게 둘이서 지내며 익숙해진다든가"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……な、なるほど。一緒にいて、嫌じゃないかは大事よね、うん」"
translation = "「……과, 과연. 같이 있어서 싫지 않은지는 중요하지, 응」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たち２人はちょっとこそばゆいながらも、穏やかな休暇を過ごすのだった――"
translation = "그 후, 우리 두 사람은 조금 쑥스러워하면서도 평온한 휴가를 보내는 것이었다──"

