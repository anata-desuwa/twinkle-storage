[[dialogue]]
speaker = "unk"
original = "第１話,破壊者メテオラ,P"
translation = "제1화, 파괴자 메테오라, P"

[[dialogue]]
speaker = "unk"
original = "新星学園襲撃事件の後、捕縛されたコラプサーたちの身柄はネビュラに預けられることになった。"
translation = "신성학원 습격 사건 이후, 포박된 콜랩서들의 신병은 네뷸라에 맡겨지게 되었다."

[[dialogue]]
speaker = "unk"
original = "様々な信念で動いているコラプサーの中でも、純粋に組織を正義と信じるメテオラは異色な存在だ。"
translation = "다양한 신념으로 움직이는 콜랩서 중에서도, 순수하게 조직을 정의라 믿는 메테오라는 이색적인 존재다."

[[dialogue]]
speaker = "unk"
original = "コラプサーの仲間たちと切り離され、不安な毎日を過ごす彼女は、果たしてどんな生活を送っているのだろうか。"
translation = "콜랩서의 동료들과 격리되어, 불안한 매일을 보내는 그녀는 과연 어떤 생활을 보내고 있는 것일까."

[[dialogue]]
speaker = "unk"
original = "爛漫な彼女から笑顔が消えていないことを祈るばかりだが──"
translation = "천진난만한 그녀에게서 웃음이 사라지지 않았기를 빌 뿐이지만──"

[[dialogue]]
speaker = "メテオラ"
original = "「うま！\u3000うまいなー！\u3000こんなうまいご飯食べたことないぞ！\u3000リーリア、おかわりー！」"
translation = "「맛있어! 정말 맛있다구! 이런 맛있는 밥은 먹어본 적 없어! 리리아, 한 그릇 더!」"

[[dialogue]]
speaker = "unk"
original = "メテオラは拍子抜けするほど満面の笑顔で、出された昼食を食べていた。"
translation = "메테오라는 허탈할 정도로 만면에 미소를 띠며, 나온 점심을 먹고 있었다."

[[dialogue]]
speaker = "リーリア"
original = "「一応……というか普通に捕まってる立場なんですが、気にせずもりもり食べてますね……順応し過ぎじゃないですか？」"
translation = "「일단…… 이라기보다 평범하게 잡힌 처지입니다만, 신경 쓰지 않고 우걱우걱 잘 먹네요…… 너무 순응한 거 아닌가요?」"

[[dialogue]]
speaker = "メテオラ"
original = "「もぐもぐ……おー！\u3000魔王だー！\u3000あたしに会いに来たのかー！\u3000あたしも会いたかったぞ！」"
translation = "「우걱우걱…… 오! 마왕이다! 나 보러 온 거야! 나도 보고 싶었다구!」"

[[dialogue]]
speaker = "メテオラ"
original = "「なーなー、リーリアに聞いたんだけどな？\u3000星騎士が悪いやつじゃないってゆーのはホントか？\u3000魔王も悪いやつじゃないのかー？」"
translation = "「있지 있지, 리리아한테 들었는데 말야? 성기사가 나쁜 녀석들이 아니라는 건 진짜야? 마왕도 나쁜 녀석이 아닌 거야?」"

[[dialogue]]
speaker = "unk"
original = "本当だよ"
translation = "정말이야"

[[dialogue]]
speaker = "メテオラ"
original = "「ホントなのかー……コラプサーのみんなは悪いやつって言ってたのになー」"
translation = "「진짜인 건가…… 콜랩서 애들은 다들 나쁜 녀석들이라고 그랬는데 말야」"

[[dialogue]]
speaker = "キサナ"
original = "「星騎士の連中は、毎日旨いものばかり食ってやがんだ。ズリぃと思わねぇか？」"
translation = "「성기사 놈들은 매일 맛있는 것만 처먹고 있다고. 치사하다고 생각 안 하냐?」"

[[dialogue]]
speaker = "メテオラ"
original = "「ズリーなー！\u3000あたしも美味いもん食いたいぞ！」"
translation = "「치사하네! 나도 맛있는 거 먹고 싶다구!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「星騎士の皆さんは、世界中の美しい物の全てを独り占めしようとしてるんです。とてもいけないことですね」"
translation = "「성기사 여러분은, 세상의 아름다운 모든 것을 독차지하려 하고 있어요. 아주 못된 짓이죠」"

[[dialogue]]
speaker = "メテオラ"
original = "「いけないなー！\u3000キレイなのはみんなのだぞ！」"
translation = "「안 되겠네! 예쁜 건 모두의 것이라구!」"

[[dialogue]]
speaker = "リーナ"
original = "「星騎士の人たちはね、リーナから大切なお兄ちゃんを奪おうとしているの。そんなの絶対許せないよね許しちゃいけない許さない許さない許さない許さない許さない」"
translation = "「성기사 사람들은 말이야, 리나한테서 소중한 오빠를 빼앗으려 하고 있어. 그런 거 절대 용서 못 해 용서해서는 안 돼 용서 안 해 용서 안 해 용서 안 해 용서 안 해 용서 안 해」"

[[dialogue]]
speaker = "メテオラ"
original = "「お、おー？\u3000許せないなー？」"
translation = "「오, 오오? 용서 못 하겠네?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「星騎士は世界を支配するつもりなのでございますわ」"
translation = "「성기사는 세계를 지배할 작정인 것이옵니다」"

[[dialogue]]
speaker = "メテオラ"
original = "「なんだとー！\u3000そんなの絶対悪いやつだぞ！」"
translation = "「뭐라고! 그런 건 완전 나쁜 녀석이라구!」"

[[dialogue]]
speaker = "イングリット"
original = "「やつらは弱いくせに生意気だ。プリマステラが優秀など、笑わせてくれる」"
translation = "「녀석들은 약해빠진 주제에 건방지다. 프리마스텔라가 우수하다니, 웃기는군」"

[[dialogue]]
speaker = "メテオラ"
original = "「弱っちいのに偉そうなのはダメだなー！\u3000エンジュも言ってた！」"
translation = "「약해빠졌으면서 잘난 척하는 건 안 되지! 엔쥬도 그랬어!」"

[[dialogue]]
speaker = "エンジュ"
original = "「あたしは星騎士に辱められたんだ。あの屈辱は一生忘れやしない……！」"
translation = "「나는 성기사에게 치욕을 당했다. 그 굴욕은 평생 잊지 않겠어……!」"

[[dialogue]]
speaker = "メテオラ"
original = "「エンジュをイジめるやつは、あたしの敵だー！」"
translation = "「엔쥬를 괴롭히는 녀석은 내 적이야!」"

[[dialogue]]
speaker = "リーリア"
original = "「それは……どうなんですかね」"
translation = "「그건…… 어떨까요」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリー以外は素で言ってそう……"
translation = "발레리 말고는 진심으로 말하는 것 같아……"

[[dialogue]]
speaker = "リーリア"
original = "「コラプサーって、個性的な人の集まりなんですね……」"
translation = "「콜랩서는 개성적인 사람들의 모임이군요……」"

[[dialogue]]
speaker = "メテオラ"
original = "「でもコラプサーはいいやつらなんだぞ！\u3000あたしを受け入れてくれたんだ！」"
translation = "「그래도 콜랩서는 좋은 녀석들이라구! 나를 받아줬어!」"

[[dialogue]]
speaker = "リーリア"
original = "「受け入れてくれた……ということは──」"
translation = "「받아줬다…… 는 것은──」"

[[dialogue]]
speaker = "unk"
original = "他の所では受け入れられなかった……？"
translation = "다른 곳에서는 받아들여지지 못했다……?"

[[dialogue]]
speaker = "メテオラ"
original = "「んー……そーかもなー……」"
translation = "「음…… 그럴지도 모르겠네……」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたし、コラプサーの前は施設にいたんだ。家族がいない子とかが来る施設らしいぞ」"
translation = "「나, 콜랩서 전에는 시설에 있었어. 가족이 없는 아이들이 오는 시설이라는 것 같아」"

[[dialogue]]
speaker = "リーリア"
original = "「じゃあメテオラさんの家族は……」"
translation = "「그럼 메테오라 씨의 가족은……」"

[[dialogue]]
speaker = "メテオラ"
original = "「いや、パパもママもいるぞ！」"
translation = "「아니, 아빠도 엄마도 있어!」"

[[dialogue]]
speaker = "リーリア"
original = "「え？\u3000じゃあどうして施設に？」"
translation = "「에? 그럼 어째서 시설에?」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたし、生まれた時から力が強くて、普通にしてたつもりなのに、いろんなものを壊しちゃうんだ」"
translation = "「나, 태어날 때부터 힘이 세서, 평범하게 하려고 했는데도 여러 가지를 부숴버리거든」"

[[dialogue]]
speaker = "メテオラ"
original = "「コップとか、お皿とか、ドアとか、触ったものはだいたい壊してた気がするぞ」"
translation = "「컵이라든가, 접시라든가, 문이라든가, 만진 건 대부분 부쉈던 것 같아」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたしのせいで、家がボロボロになっちゃったからなー。パパとママはあたしがちゃんとできるように施設に預けたんだぞ」"
translation = "「나 때문에 집이 엉망진창이 돼버렸거든. 아빠랑 엄마는 내가 제대로 할 수 있게 시설에 맡긴 거야」"

[[dialogue]]
speaker = "メテオラ"
original = "「施設にいた子たちもな、最初は優しかったんだぞ。力持ちなあたしを褒めてくれてたんだ」"
translation = "「시설에 있던 아이들도 말야, 처음엔 상냥했다구. 힘이 센 나를 칭찬해줬어」"

[[dialogue]]
speaker = "メテオラ"
original = "「でも、みんな、だんだんとあたしを怖がるんだ。軽く触ったり、お相撲するだけで怪我しちゃうし……」"
translation = "「하지만 다들 점점 나를 무서워해. 가볍게 건드리거나 씨름만 해도 다쳐버리고……」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたしはみんなと一緒に遊びたかっただけなのに……みんな、あたしから離れてくし……パパとママにも会えなくなっちゃったし……」"
translation = "「나는 친구들이랑 같이 놀고 싶었을 뿐인데…… 다들 나한테서 멀어지고…… 아빠랑 엄마도 못 만나게 됐구……」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたしを止めようとしてくれたのに、大好きな施設の先生も叩いちゃって……怪我させちゃって……」"
translation = "「나를 말리려고 해줬는데, 정말 좋아하는 시설 선생님도 때려버려서…… 다치게 해서……」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたし、危ない子なんだ。パパもママも友達も先生も好きなのに……一緒に暮らしてたら、絶対にいつかヤバいことになっちゃうと思って……内緒で施設を出たんだ」"
translation = "「나, 위험한 아이야. 아빠도 엄마도 친구도 선생님도 좋지만…… 같이 살면 분명 언젠가 큰일이 날 거라고 생각해서…… 몰래 시설을 나왔어」"

[[dialogue]]
speaker = "メテオラ"
original = "「そんでうろうろしてたら、『コラプサーに入らないかー』って声をかけられたんだ」"
translation = "「그러다 돌아다니고 있었더니, 『콜랩서에 들어오지 않을래?』라고 권유받았어」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたし、すぐになんでも壊しちゃうからダメって言ったんだけどなー」"
translation = "「나, 금방 뭐든지 부숴버리니까 안 된다고 말했는데 말야」"

[[dialogue]]
speaker = "メテオラ"
original = "「でもコラプサーならいくらでも壊していいって言われたんだ！\u3000壊したら喜んでくれたんだ！」"
translation = "「하지만 콜랩서라면 얼마든지 부숴도 좋다고 들었어! 부쉈더니 기뻐해줬다구!」"

[[dialogue]]
speaker = "リーリア"
original = "「それは……確かについていっちゃう気持ちもわかりますね……」"
translation = "「그건…… 확실히 따라가고 싶어지는 기분도 이해가 가네요……」"

[[dialogue]]
speaker = "リーリア"
original = "（コラプサーの他のメンバーも、社会とは相容れない性格や境遇ばかりでした。世の中から弾き出された者を拾っている……という側面もあるんでしょうね）"
translation = "（콜랩서의 다른 멤버들도, 사회와는 어울리지 못하는 성격이나 처지뿐이었습니다. 세상에서 튕겨 나간 자들을 거두어주고 있다……는 측면도 있겠네요）"

[[dialogue]]
speaker = "リーリア"
original = "（もちろんそれで、今までの行いが許されるわけではないですけど）"
translation = "（물론 그렇다고 해서, 지금까지의 행실이 용서받는 건 아니지만요）"

[[dialogue]]
speaker = "メテオラ"
original = "「ん？\u3000どうしたー、何かあったのか？」"
translation = "「음? 왜 그래, 무슨 일 있어?」"

[[dialogue]]
speaker = "リーリア"
original = "「いえいえ、大した話じゃないですよ。それよりデザートのプリン食べます？」"
translation = "「아뇨 아뇨, 별거 아니에요. 그보다 디저트 푸딩 드실래요?」"

[[dialogue]]
speaker = "メテオラ"
original = "「やったー！\u3000プリン食べるぞー！」"
translation = "「얏호! 푸딩 먹을래!」"

[[dialogue]]
speaker = "メテオラ"
original = "「あ、なんか手に当たったぞ」"
translation = "「앗, 뭔가 손에 부딪혔다」"

[[dialogue]]
speaker = "リーリア"
original = "「あ～～っ、壁に穴がーーーっ！？」"
translation = "「아~~앗, 벽에 구멍이──!?」"

[[dialogue]]
speaker = "unk"
original = "無自覚に物を破壊してしまうコラプサー、メテオラ。"
translation = "무자각하게 물건을 파괴해 버리는 콜랩서, 메테오라."

[[dialogue]]
speaker = "unk"
original = "彼女と向き合っていくには、根気と忍耐が必要とされる……かもしれない。"
translation = "그녀와 마주하기 위해서는 끈기와 인내가 필요할지도…… 모른다."

