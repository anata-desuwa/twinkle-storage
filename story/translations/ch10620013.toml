[[dialogue]]
speaker = "unk"
original = "第３話,探偵と書記,P"
translation = "제3화, 탐정과 서기, P"

[[dialogue]]
speaker = "unk"
original = "ジュエリーとの関わりが増える内に、彼女は新星の星徒会メンバーとも仲良くなっていた。"
translation = "쥬얼리와의 관계가 깊어지는 동안, 그녀는 신성의 성도회 멤버들과도 친해져 있었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――そうなんだ。面白かったならよかった♪\u3000探偵のジュエリーが観たらどう思うのか、気になってたんだよね」"
translation = "「――그렇구나. 재밌었다니 다행이야♪ 탐정인 쥬얼리가 보면 어떻게 생각할까 궁금했었거든.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、実によく考えられたトリックだったよ。人間ドラマも面白かった。ほかにもオススメの映画があれば、ぜひ教えてもらえるとありがたい」"
translation = "「아아, 정말 잘 짜인 트릭이었어. 인간 드라마도 흥미로웠고. 그 밖에 추천하는 영화가 있다면 꼭 알려주면 고맙겠어.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「――さて、話もひと段落したところで……マトイさん。ズバリ批評しよう」"
translation = "「――자, 이야기도 일단락되었으니…… 마토이 씨. 정곡을 찔러 비평해 보지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ、何？\u3000どうしたの？\u3000映画の話？」"
translation = "「엣, 뭐야? 왜 그래? 영화 이야기?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミ、少し太ったかい？」"
translation = "「너, 조금 살쪘니?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ファッ！？」"
translation = "「화앗!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「いやなに、キミの外見に、些細な違和感を覚えてね。それが何なのかとマトイさんの思考をトレースしていったところ、１つの話題を思い出したのさ」"
translation = "「아니 그게, 네 외견에서 사소한 위화감을 느껴서 말이야. 그게 무엇인지 마토이 씨의 사고를 트레이스해 본 결과, 한 가지 화제가 떠올랐거든.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「キミが先日、学園の近くに新しいケーキ屋ができて、そこのケーキがすごく美味しいと話していただろう？\u3000おそらくキミはそこに頻繁に通った結果――」"
translation = "「네가 요전에 학원 근처에 새로운 케이크 가게가 생겨서 그곳 케이크가 정말 맛있다고 이야기했었지? 아마 너는 그곳에 빈번히 다닌 결과――」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ、ちょっと待って！\u3000合ってるけど、ストォーーーップ！」"
translation = "「잠, 잠깐만 기다려! 맞긴 한데, 스토오오오옵!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふ、太ったか、太ってないかで言えば、確かに太ったけども！\u3000男子である会長がいる前で、それを言うかな普通！？」"
translation = "「사, 살쪘냐 안 쪘냐로 따지면 확실히 찌긴 했지만! 남자인 회장님이 있는 앞에서 그걸 말하니, 보통!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふむ……良かれと思っての指摘だったのだが……」"
translation = "「흠…… 잘되라고 한 지적이었는데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よくないよ！？\u3000普通に恥ずかしいから！」"
translation = "「안 좋아!? 보통 창피한 게 아니라고!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それは失礼した。今のキミの外見なら、むしろ男性にモテる範疇だと思っていたのでね」"
translation = "「그건 실례했군. 지금의 네 외견이라면 오히려 남성에게 인기 있을 범위라고 생각했거든.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「しかしこのままだと、体重が増え続ける可能性もある。ならば今の内にアドバイスをして、解決すべきだろうと考えたんだ」"
translation = "「하지만 이대로라면 체중이 계속 늘어날 가능성도 있어. 그렇다면 지금 단계에서 조언을 해서 해결해야 한다고 생각했지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へ？\u3000も、モテる？\u3000そうなの？\u3000会長も……今くらいの体型が好みだったり？」"
translation = "「헤? 이, 인기 있어? 그래? 회장님도…… 지금 정도의 체형이 취향이라거나?」"

[[dialogue]]
speaker = "unk"
original = "俺は全然違いに気づかなかった。それに――"
translation = "나는 전혀 차이를 눈치채지 못했다. 게다가――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……少しふっくらしているくらいの方が、男にはモテる？\u3000そ、そうなんだ……！」"
translation = "「……조금 통통한 편이 남자에게 인기가 있다? 그, 그렇구나……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「５キロくらい体重増えても、普通だったんだ……！\u3000よかった！」"
translation = "「5킬로 정도 체중이 늘어도 보통이었구나……! 다행이다!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「すまない、訂正しよう。思ったより増えていたね」"
translation = "「미안, 정정하지. 생각보다 많이 늘었네.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんで急に２人とも目をそらしたのかな！？」"
translation = "「왜 갑자기 둘 다 눈을 피하는 건데!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うわあぁぁぁん！\u3000調子に乗って、会長に太り具合を暴露しちゃったよぉぉ！\u3000恥ずかしい……っ！」"
translation = "「우와아앙! 기세등등해서 회장님한테 살찐 정도를 폭로해 버렸어어! 창피해……!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「安心したまえ、マトイさん。まだちょっと頬の輪郭が丸くなったくらいだ。気にする程じゃない」"
translation = "「안심해, 마토이 씨. 아직 좀 뺨의 윤곽이 동그스름해진 정도야. 신경 쓸 정도는 아냐.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや気になるんだけど！？\u3000もう鏡怖くて見れないよ！？」"
translation = "「아니, 신경 쓰이거든!? 이제 거울 무서워서 못 보겠어!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「まあ、落ち着きたまえ。私は友人であるキミに、アドバイスをするつもりだったんだ。今から言うことを実践すれば、必ず元の体重に戻れるはずさ」"
translation = "「자자, 진정해. 나는 친구인 네게 조언을 할 생각이었어. 지금부터 말하는 걸 실천하면 반드시 원래 체중으로 돌아갈 수 있을 거야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほ、本当……！？」"
translation = "「저, 정말……!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、本当だとも。キミももしかしたら、私の外見に変化を感じたことがあるかもしれないが……」"
translation = "「아아, 정말이고말고. 너도 어쩌면 내 외견의 변화를 느낀 적이 있을지도 모르겠지만……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「普段ズボラな私も、最近は女として身だしなみを意識するようになったんだ。友人からも、可愛くなったと褒められる程だ」"
translation = "「평소에 칠칠치 못한 나도 최근에는 여자로서 몸단장을 의식하게 되었지. 친구들로부터도 예뻐졌다고 칭찬받을 정도야.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「その理由を明解に換言するならば――ズバリ、我が助手の存在だ」"
translation = "「그 이유를 명쾌하게 환언하자면―― 정곡을 찔러, 나의 조수의 존재 덕분이지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長のおかげってこと……？」"
translation = "「회장님 덕분이라는 거야……?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、その通り。助手がズボラな私を見かねて、たびたび部屋の掃除にきてくれたり、食事を作ってくれたりしてね――」"
translation = "「아아, 맞아. 조수가 칠칠치 못한 나를 보다 못해 자주 방 청소를 하러 와 주거나, 요리를 해주기도 해서 말이야――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「それだけじゃなく、私の寝起きが弱いと知ると、毎朝起こしにきてくれるようになったんだ」"
translation = "「그뿐만 아니라, 내가 아침에 약하다는 걸 알자 매일 아침 깨우러 와 주게 되었지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「寝ぼけている私の髪を綺麗に梳いたり、服装の乱れを直してくれたりと、身だしなみの細かなチェックを行ってくれてね」"
translation = "「잠결에 취해 있는 내 머리카락을 예쁘게 빗겨주거나, 옷차림이 흐트러진 걸 고쳐주는 등 몸단장을 세세하게 체크해 주거든.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふっ、おかげで私は、今も自信を持って可愛いと自負することができるわけだ」"
translation = "「후훗, 덕분에 나는 지금도 자신 있게 예쁘다고 자부할 수 있는 셈이지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ノロケかな！？\u3000というか、会長！\u3000そこまでやってあげてるの！？」"
translation = "「닭살 돋는 자랑이야!? 그보다 회장님! 그렇게까지 해주고 있는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "なんか放っておけなくて、つい……"
translation = "왠지 내버려 둘 수가 없어서 그만……"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ちなみに私はマトイさんとは逆に、思考の世界へ旅立っていると食事をおろそかにしがちでね。体型が細すぎるくらいだったんだが……」"
translation = "「참고로 나는 마토이 씨와는 반대로 사고의 세계로 여행을 떠나 있으면 식사를 소홀히 하기 일쑤라 말이야. 체형이 너무 가늘 정도였는데……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「最近は、助手の作ってくれる料理が美味しくて、少し太ってしまった。ふふっ……幸せ太りとはこのことを言うのかな？」"
translation = "「최근에는 조수가 만들어 주는 요리가 맛있어서 조금 살이 쪄버렸어. 후훗…… 행복해서 찌는 살이란 건 이걸 두고 하는 말일까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや太ってんじゃん！\u3000……痩せられるって話じゃなかったの？\u3000ここまで完全に、ただのノロケ話なんだけど」"
translation = "「아니, 너도 살쪘잖아! ……살 뺄 수 있다는 이야기 아니었어? 여기까지 완전히 그냥 자랑질뿐인데.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おっとすまない。助手の自慢したさに、余計なことまで口走ってしまったが――」"
translation = "「오 이런, 미안. 조수 자랑을 하고 싶은 마음에 쓸데없는 말까지 해버렸군――」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「伝えたかった大事なポイントとしては、『異性の目があると意識が変わる』ということだ」"
translation = "「전하고 싶었던 중요한 포인트는 『이성의 눈이 있으면 의식이 바뀐다』는 점이야.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「つまりマトイさんも、私が助手に私生活を管理してもらっているように、体重管理を手伝ってもらえばいい」"
translation = "「즉, 마토이 씨도 내가 조수에게 사생활을 관리받고 있는 것처럼 체중 관리를 도움받으면 돼.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えぇっ！？\u3000ど、どういうこと……！？」"
translation = "「에엣!? 그, 그게 무슨 소리야……!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「簡単なことだ。星徒会室に体重計を置いて、毎日助手に体重を記録してもらえばいい」"
translation = "「간단한 일이야. 성도회실에 체중계를 두고 매일 조수에게 체중을 기록하게 하면 돼.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「なに、特別なダイエットをする必要はない。毎日ただ、体重を見せるだけだ。ヒトと言う生き物はそれだけで、普段のちょっとした行いに変化があるものさ」"
translation = "「뭐, 특별한 다이어트를 할 필요는 없어. 매일 그냥 체중을 보여주기만 하면 돼. 인간이라는 생물은 그것만으로도 평소의 사소한 행동에 변화가 생기기 마련이거든.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それ、私がめちゃくちゃ恥ずかしいだけなんだけど！？」"
translation = "「그거, 내가 엄청나게 창피할 뿐이잖아!?」"

[[dialogue]]
speaker = "unk"
original = "と言いつつも、後日、ジュエリーのアドバイスを普通に実行したマトイは、何だかんだでダイエットに成功していた。"
translation = "라고 말하면서도 며칠 뒤, 쥬얼리의 조언을 평범하게 실행한 마토이는 이런저런 이유로 다이어트에 성공했다."

