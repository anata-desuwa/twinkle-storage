[[dialogue]]
speaker = "unk"
original = "第４話,たまにはまったりだ！,P"
translation = "제4화, 가끔은 느긋하게!, P"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よーし！\u3000目当てのバルーンにクラッカーに、飾り付け用の型紙……ぜんぶ買えたな！\u3000へへ、これで入学パーティ？\u3000の準備はばっちりだぜ」"
translation = "「좋아! 목표로 했던 풍선에 폭죽에, 장식용 종이본까지…… 전부 샀네! 헤헤, 이걸로 입학 파티? 준비는 완벽해」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王と２人でお出かけして買い物なんて、なんか新鮮な感じだったな。たまにはこういうのも悪くないぜ」"
translation = "「마왕이랑 둘이서 외출해서 쇼핑이라니, 왠지 신선한 느낌이었어. 가끔은 이런 것도 나쁘지 않네」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「星徒会の買い出しに付き合わせて悪い？\u3000気にしないってのそんなの。つか、あたしから頼んだことだしな！」"
translation = "「성도회 장보기에 동참시켜서 미안하다고? 그런 거 신경 안 쓴다니까. 애초에 내가 부탁한 거기도 하고!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「にしても……あのデパートってやつは、大層混んでたなあ。今の時期だからか？」"
translation = "「그나저나…… 그 백화점이라는 곳, 엄청나게 붐비더라. 지금 시기라서 그런가?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「つか、こうしてみるとやっぱ……地上って人が多いな。なんか狭っ苦しく思えてきたぜ」"
translation = "「그보다 이렇게 보니 역시…… 지상에는 사람이 많네. 왠지 답답하게 느껴지기 시작했어」"

[[dialogue]]
speaker = "unk"
original = "大人に囲まれてるから"
translation = "어른들에게 둘러싸여 있으니까"

[[dialogue]]
speaker = "unk"
original = "子どもの体だから"
translation = "어린아이 몸이니까"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なるほどな。確かにあたしも、空をぐわーって飛び回ってた頃はこんなこと思わなかったしな」"
translation = "「과연. 확실히 나도 하늘을 씽씽 날아다니던 시절엔 이런 생각 안 했었으니까 말이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「にしても──この人混みに揉まれ続けるのは大変だぜ。うー、震えるほど寒いしよ」"
translation = "「그건 그렇고── 이 인파에 계속 시달리는 건 힘든 일이야. 으으, 떨릴 정도로 춥기도 하고」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どこかによ、あったかくて、ついでに２人きりになれる場所とか──ねえかな？\u3000魔王……？」"
translation = "「어디 말이야, 따뜻하고 덤으로 둘만 있을 수 있는 장소 같은 거── 없을까? 마왕……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──あった！\u3000うはは、なんてな！\u3000実は最初からそのつもりだったのさ！」"
translation = "「──있었다! 으하하, 농담이야! 사실 처음부터 그럴 생각이었거든!」"

[[dialogue]]
speaker = "unk"
original = "今日も泳ぎ？"
translation = "오늘도 수영?"

[[dialogue]]
speaker = "unk"
original = "今日もバレー？"
translation = "오늘도 배구?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん～……いや！\u3000今日はのんびりしよう」"
translation = "「음~…… 아니! 오늘은 빈둥거리자」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「海のレジャーはあらかた遊び尽くしたし、今日は買い出しもこなしたからな。たまにはいいだろ」"
translation = "「바다 레저는 거의 다 즐겼고, 오늘은 장보기도 해냈으니까. 가끔은 괜찮잖아」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それに……今日はちょうど誰もいないみたいだ！\u3000へへ、この機会に２人でまったりするとしようぜ」"
translation = "「게다가…… 오늘은 마침 아무도 없는 모양이야! 헤헤, 이 기회에 둘이서 느긋하게 있자구」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「はー……浮き輪でぷかぷか浮かぶだけってのも、いいもんだ……」"
translation = "「하아…… 튜브 타고 둥둥 떠 있는 것만으로도 기분 좋네……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「トカイのケンソウを離れて、イコク風のビーチでゆったり……ふふ。こういうの、オトナのジョウチョって感じだろ？」"
translation = "「도시의 소음을 벗어나 이국적인 비치에서 여유롭게…… 후후. 이런 거, 어른의 정취라는 느낌이지?」"

[[dialogue]]
speaker = "unk"
original = "無理しなくていいぞ"
translation = "무리하지 않아도 돼"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「バレたか！\u3000ま、あたしものんびりしたかっただけだ」"
translation = "「들켰나! 뭐, 나도 그냥 빈둥거리고 싶었을 뿐이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「今日は休みなんだしよ……気の済むまで、リラックスしてよーぜ……」"
translation = "「오늘은 쉬는 날이니까 말이야…… 마음이 풀릴 때까지 리ラックス하자구……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふーっ……砂浜に戻っても、まだ体が揺れてる気ぃするな」"
translation = "「후우…… 백사장으로 돌아와도 아직 몸이 흔들리는 기분이네」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ずっこけないように魔王を支えにするぞ！\u3000ぎゅーって、抱きついて……へへ……<emoji=heart04>」"
translation = "「넘어지지 않게 마왕을 지지대로 삼을게! 꽉 하고 안겨서…… 헤헤…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なんだよ。今は２人きりなんだぜ、誰に遠慮することもないだろ。ほらほら～」"
translation = "「뭐야. 지금은 둘뿐이라구, 누구 눈치 볼 것도 없잖아. 자 자~」"

[[dialogue]]
speaker = "unk"
original = "アポロは無邪気に笑いながら、両手でこちらに抱きついて、頭をぐりぐりとしてくる。"
translation = "아폴로는 천진난만하게 웃으며 양손으로 이쪽을 껴안고 머리를 부비부비해 온다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぎゅーっ……へへ。こうやって密着してると、安心するな。あたし、ずっとこのままでもいいかも」"
translation = "「꽉…… 헤헤. 이렇게 밀착하고 있으면 안심이 되네. 나, 평생 이대로 있어도 좋을지도」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん～？\u3000くすぐったいって？\u3000そんなこと言うなよ～。へへっ……んじゃ、もっとほっぺですりすりしてやる」"
translation = "「음~? 간지럽다고? 그런 말 하지 마~. 헤헤…… 그럼 볼에 더 부비부비해 줄게」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王の体──温かいな。あたしよりずっと大きくて……」"
translation = "「마왕의 몸── 따뜻하네. 나보다 훨씬 크고……」"

[[dialogue]]
speaker = "unk"
original = "すべすべした肌と水着の感触が、こちらの生身に直接伝わる。"
translation = "매끄러운 피부와 수영복의 감촉이 이쪽의 맨살에 직접 전달된다."

[[dialogue]]
speaker = "unk"
original = "この状態でぴとっとくっついていられると、なんだか……。"
translation = "이 상태로 착 달라붙어 있으니, 왠지……."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んー？\u3000どうしたんだよ、もぞもぞして」"
translation = "「음~? 왜 그래, 꿈틀꿈틀대고」"

[[dialogue]]
speaker = "unk"
original = "体格差が……"
translation = "체격 차이가……"

[[dialogue]]
speaker = "unk"
original = "罪悪感が……"
translation = "죄책감이……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「罪悪感？\u3000何を言ってんだ、あたしと魔王は好き好き同士だろ？\u3000好きなやつ同士ひっついて何が悪いんだ」"
translation = "「죄책감? 무슨 소리야, 나랑 마왕은 서로 좋아하는 사이잖아? 좋아하는 사람끼리 붙어 있는 게 뭐가 나빠」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こうして２人でひっついてると……あたしは幸せだぞ。魔王もそうじゃないのか？」"
translation = "「이렇게 둘이서 붙어 있으면…… 난 행복하다구. 마왕도 그렇지 않아?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん……？\u3000前かがみになってどうしたんだよ。手で水着押さえちゃってさ」"
translation = "「음……? 앞을 숙이고 왜 그래. 손으로 수영복을 누르고 말이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あ！\u3000おいこら、どうして逃げるんだ魔王！\u3000あたしともっといちゃいちゃしようぜ！\u3000おーい……」"
translation = "「아! 이봐, 왜 도망가는 거야 마왕! 나랑 더 꽁냥거리자구! 어이……」"

[[dialogue]]
speaker = "unk"
original = "素肌の多いアポロとの接触には、まだ邪念を抱いてしまう自分だった……。"
translation = "노출이 많은 아폴로와의 접촉에는 아직 사악한 마음을 품게 되는 자신이었다……."

