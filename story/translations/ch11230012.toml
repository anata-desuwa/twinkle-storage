[[dialogue]]
speaker = "unk"
original = "第２話,肉を愛する者,P"
translation = "제2화, 고기를 사랑하는 자, P"

[[dialogue]]
speaker = "unk"
original = "リーエンとの模擬戦が日課のようになってしまった。"
translation = "리엔과의 모의전이 일과처럼 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "この日もまた、俺たちは激しく拳を交え、心地よい汗を流した。"
translation = "이날도 우리는 격렬하게 주먹을 주고받으며 기분 좋은 땀을 흘렸다."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「はぁっ、はぁっ、はぁっ、僅差であたしの勝利だ、惜しかったな、魔王！」"
translation = "「하아, 하아, 하아, 근소한 차이로 나의 승리군. 아쉬웠다, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "いや、今回は俺の勝ちだよ"
translation = "아니, 이번에는 나의 승리야."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「は？\u3000何を言う。あれほどあたしの攻撃を喰らっておいて！」"
translation = "「하? 무슨 소리냐. 그렇게나 내 공격을 허용해놓고!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「いや、おまえの防御を打ち崩せなかったのも事実か……」"
translation = "「아니, 네 방어를 무너뜨리지 못한 것도 사실인가……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「つまり、またしても引き分けということかっ？」"
translation = "「즉, 또다시 무승부라는 것인가!」"

[[dialogue]]
speaker = "unk"
original = "次は俺が勝つ！"
translation = "다음은 내가 이긴다!"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「フンッ、言ってくれる。勝利をもぎ取るのはこのあたしだ！」"
translation = "「흥, 말은 잘하는군. 승리를 쟁취하는 것은 바로 나다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「まあいい、次回を楽しみにしておけ！\u3000それよりあたしは腹が減ったぞ。ついて来い、魔王！」"
translation = "「뭐 좋아, 다음번을 기대하고 있어라! 그보다 나는 배가 고프구나. 따라와라, 마왕!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おい、肉だ！\u3000肉を頼む！」"
translation = "「이봐, 고기다! 고기를 부탁한다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え、ええーと、ご注文は肉料理、でよろしかったでしょうか？」"
translation = "「에, 에에 그러니까, 주문은 고기 요리로 괜찮으실까요?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「ああ！\u3000肉ならなんでもいいぞ。好きなだけ持ってこい！」"
translation = "「아아! 고기라면 뭐든 좋다. 원하는 만큼 가져와라!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「か、かしこまりました～」"
translation = "「아, 알겠습니다~」"

[[dialogue]]
speaker = "unk"
original = "すっかり常連だね？"
translation = "완전히 단골이네?"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「うむ、いい店を教えてもらった。新星学園にはこんな店があって羨ましいぞ」"
translation = "「음, 좋은 가게를 소개받았다. 신성학원에는 이런 가게가 있어서 부럽구나」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「戦場とは異なる活気がここにはある。本能をくすぐる肉と脂の焼ける匂いがたまらん」"
translation = "「전장과는 다른 활기가 이곳에는 있어. 본능을 자극하는 고기와 기름이 타는 냄새가 참을 수 없군」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「しかし肉はまだなのか？\u3000いつも同じ時間に来ているのだから、気を利かせて焼いておくべきだろう」"
translation = "「그런데 고기는 아직인가? 항상 같은 시간에 오고 있으니, 눈치껏 구워두었어야지」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お待たせしましたっ、スペシャル山盛り肉プレートになります！」"
translation = "「오래 기다리셨습니다, 스페셜 산더미 고기 플레이트입니다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おお、来たか！\u3000待ちくたびれたぞ！\u3000さあ、魔王も熱いうちに食え」"
translation = "「오오, 왔는가! 기다리다 지칠 뻔했다! 자, 마왕도 따뜻할 때 먹어라」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「はむっ！\u3000ガツガツガツ……」"
translation = "「함냠! 허겁지겁……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「うまぁーーい！\u3000焼き加減も抜群だぞ！」"
translation = "「맛있어어어어! 굽기 정도도 발군이다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「味もいいが量も素晴らしいな。最初に来た時は盛りが少ないと感じたが、あたしに合わせて増量するとは」"
translation = "「맛도 좋지만 양도 훌륭하구나. 처음에 왔을 때는 담음새가 적다고 느꼈지만, 나에게 맞춰 증량하다니」"

[[dialogue]]
speaker = "unk"
original = "本当に肉が好きなんだね？"
translation = "정말로 고기를 좋아하는구나?"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「当然だ、肉があたしの体を作っているんだからな」"
translation = "「당연하다, 고기가 나의 몸을 만들고 있으니까 말이다」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「強くなるには肉を食うべきだ！\u3000魔王ももっと食わないと強くなれないぞ！」"
translation = "「강해지려면 고기를 먹어야 한다! 마왕도 더 먹지 않으면 강해질 수 없다고!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あーっはっはっはっは！\u3000よし、おかわりだ！\u3000もっと肉を頼む！」"
translation = "「아하하하하하! 좋아, 리필이다! 고기를 더 시키겠다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「…………おい待て、魔王。あれはいったいなんだ？」"
translation = "「…………어이 잠깐, 마왕. 저건 도대체 뭐지?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「とんでもない肉の塊だぞ！」"
translation = "「엄청난 고기 덩어리다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お待たせしました～……っと。ケバブ食べ放題コースでーす！」"
translation = "「오래 기다리셨습니다~ ……앗. 케밥 무한 리필 코스입니다!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「感謝する、人の子よ」"
translation = "「감사하노라, 인간의 아이여」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ごゆっくりどうぞ～」"
translation = "「천천히 드세요~」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ふむ……良き肉の香りだ。では、頂くとしよう」"
translation = "「흠…… 좋은 고기 향기로다. 그럼, 들도록 하지」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おい、魔王！\u3000あたしはここの常連だが、あんなの見たことないぞ！」"
translation = "「이봐, 마왕! 나는 이곳의 단골이지만, 저런 건 본 적이 없다!」"

[[dialogue]]
speaker = "unk"
original = "守護天使のアルモタヘルだね"
translation = "수호천사인 아르모타헬이야."

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「なんだと……！？\u3000守護天使があのとんでもない肉料理を喰らうのか……」"
translation = "「뭐라고……!? 수호천사가 저 엄청난 고기 요리를 먹는단 말이냐……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「面白い！\u3000守護天使を名乗るだけのことはあるな！」"
translation = "「재미있군! 수호천사라고 자칭할 만한 가치는 있군!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「失礼する！\u3000守護天使殿！」"
translation = "「실례하마! 수호천사공!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「？？？\u3000もぐもぐもぐ……」"
translation = "「??? 우물우물우물……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「あたしはリーエン！\u3000肉をこよなく愛する者だ！」"
translation = "「나는 리엔! 고기를 지극히 사랑하는 자다!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もぐもぐもぐ……ごくん。ふぅ……我はアルモタヘルだ、肉を愛する者よ」"
translation = "「우물우물우물…… 꿀꺽. 후우…… 짐은 아르모타헬이다, 고기를 사랑하는 자여」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「アルモタヘル殿！\u3000お見かけしたところ、あなたも大層肉料理がお好きと見える！」"
translation = "「아르모타헬공! 뵙자 하니, 당신도 대단히 고기 요리를 좋아하시는 것으로 보입니다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「ついてはひとつ質問なのだが……そ、その料理は何なのだ？」"
translation = "「그리하여 한 가지 질문이 있다만…… 그, 그 요리는 무엇인가?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ケバブだ。まさか、ケバブを知らぬというのか？」"
translation = "「케밥이다. 설마 케밥을 모른다는 것인가?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「初耳だ。どのような肉なのか、あたしに味見をさせて欲しい」"
translation = "「처음 듣는다. 어떤 고기인지, 나에게 맛보게 해줬으면 한다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「このケバブは我のものだ。譲りはしない」"
translation = "「이 케밥은 짐의 것이다. 양보하지 않겠다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……よし、おかわりだ。ケバブ食べ放題……素晴らしき聖餐よ……」"
translation = "「……좋아, 리필이다. 케밥 무한 리필…… 훌륭한 성찬이로다……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「ぐぬぬ……うまそうに食いやがって……。いいだろう！\u3000おい、ウェイトレス！\u3000あたしも注文するぞ！」"
translation = "「구누누…… 맛있게도 처먹기는……. 좋다! 어이, 웨이트리스! 나도 주문하겠다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ええと……実はわたし、ウェイトレスではなくて、臨時でお手伝いしてるだけのクエスト受付嬢──」"
translation = "「저기…… 사실 저, 웨이트리스가 아니라 임시로 도와주고 있는 퀘스트 접수원──」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「そんなのどっちでもいい！\u3000同じものを持ってこい！」"
translation = "「그런 건 아무래도 좋다! 같은 것을 가져와라!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁっ、大事なことなのに～っ！？\u3000って、同じものっ！？\u3000も、もしかしてあなたもケバブ食べ放題コースを！？」"
translation = "「코얏, 중요한 일인데~~!? 어, 그보다 같은 것!? 호, 혹시 당신도 케밥 무한 리필 코스를!?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「当然だ！\u3000肉をこよなく愛する者として、相手が守護天使だろうと決して負けはしない！！」"
translation = "「당연하다! 고기를 지극히 사랑하는 자로서, 상대가 수호천사라 할지라도 결코 지지 않겠다!!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「面白い。ケバブ愛を見せてみるがよい」"
translation = "「흥미롭군. 케밥 사랑을 보여보아라」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「おお、これがケバブ！\u3000守護天使殿のように食せばいいんだな？」"
translation = "「오오, 이것이 케밥! 수호천사공처럼 먹으면 된다는 거지?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「もぐもぐもぐ……うまい！\u3000これがケバブか！」"
translation = "「우물우물우물…… 맛있다! 이것이 케밥인가!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そうだろう。ケバブは美味なのだ」"
translation = "「그렇겠지. 케밥은 별미니라」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「確かに！\u3000しかも味だけでなく、量も素晴らしいぞ！」"
translation = "「확실히! 게다가 맛뿐만 아니라 양도 훌륭하구나!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「肉の味が濃い……食感も強いなっ。強者に相応しい料理だ！」"
translation = "「고기 맛이 진하군…… 식감도 강하군! 강자에게 어울리는 요리다!」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「守護天使殿よ、勝負だ！\u3000どちらがより多くケバブを食えるか、とことん競い合おう！」"
translation = "「수호천사공, 승부다! 어느 쪽이 더 많이 케밥을 먹을 수 있는지, 끝까지 겨뤄보자고!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ふっ……ケバブで我に敵うと思ったか？」"
translation = "「훗…… 케밥으로 나에게 대적할 수 있다고 생각하였느냐?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「肉では絶対負けない！」"
translation = "「고기라면 절대 지지 않아!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「意気や良し。挑んでくるが良い、人の子よ」"
translation = "「기개는 좋구나. 도전해 보거라, 인간의 아이여」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「うぷっ……もう食えない……」"
translation = "「우윽…… 이제 못 먹겠어……」"

[[dialogue]]
speaker = "unk"
original = "でも、全部食べ切れたね"
translation = "그래도, 전부 다 먹었네"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「薄氷の勝利だ……限界を超えた戦いだったぞ……」"
translation = "「박빙의 승리다…… 한계를 초월한 싸움이었어……」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「それより守護天使殿を見ろ。あたしと同じく完食したのに、涼しい顔をしている……今にもおかわりを注文しそうな顔だ」"
translation = "「그보다 수호천사공을 봐라. 나와 똑같이 완식했는데도, 태연한 얼굴을 하고 있어…… 당장이라도 리필을 주문할 것 같은 얼굴이다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そなたのケバブ愛、見せてもらったぞ。その深きケバブ愛を讃え褒美を進呈しよう」"
translation = "「그대의 케밥 사랑, 잘 보았노라. 그 깊은 케밥 사랑을 찬양하며 포상을 내리겠노라」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「人の子よ、我を『アルモたん』と呼ぶ権利を授ける」"
translation = "「인간의 아이여, 나를 『알모탄』이라 부를 권리를 하사하마」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「アルモたん！」"
translation = "「알모탄!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「これからもケバブ道に精進するように」"
translation = "「앞으로도 케밥도에 정진하도록」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「お、おう！\u3000わかったぞ、アルモたん！」"
translation = "「어, 어우! 알았다, 알모탄!」"

[[dialogue]]
speaker = "unk"
original = "こうして、リーエンはケバブ道についても極めることを決意するのだった。"
translation = "이리하여, 리엔은 케밥도에 대해서도 통달하기로 결의하는 것이었다."

