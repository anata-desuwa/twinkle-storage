[[dialogue]]
speaker = "unk"
original = "第１話,新・戦闘服だぴょん！,B"
translation = "제1화, 신·전투복이다뿅!, B"

[[dialogue]]
speaker = "unk"
original = "季節は１２月も半ばに差しかかろうというある日のこと。"
translation = "계절은 12월도 중반에 접어들려 하던 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "九浄家のメイド長である羽宮蘭美は、当主、九浄ヘレナの元に呼び出されていた。"
translation = "쿠죠 가의 메이드장인 하네미야 라비는, 당주, 쿠죠 헬레나의 곁으로 호출되었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ついに今年もやってきたな、この時期が……」"
translation = "「드디어 올해도 찾아왔군, 이 시기가……」"

[[dialogue]]
speaker = "蘭美"
original = "「クリスマスを間近に控えていますが……そういう時期という意味で合っているでしょうか？」"
translation = "「크리스마스를 코앞에 두고 있습니다만…… 그런 시기라는 의미로 맞을까요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「正解だ。そう、もうすぐクリスマスがやってくる……蘭美、前回のクリスマスのことは覚えているか？」"
translation = "「정답이다. 그래, 곧 크리스마스가 찾아온다…… 라비, 지난 크리스마스 일은 기억하느냐?」"

[[dialogue]]
speaker = "蘭美"
original = "「ヴィーナスお嬢様が、セシア様の記憶をよみがえらせるために計画した『サンタ大作戦』という事件がありましたね」"
translation = "「비너스 아가씨가, 세시아 님의 기억을 되살리기 위해 계획한 『산타 대작전』이라는 사건이 있었지요」"

[[dialogue]]
speaker = "蘭美"
original = "「プレゼントを配るため、深夜に新星寮『ラルーナ』に無断で忍び込み、そして寮長のマハムート様に見つかって大騒ぎになってしまった」"
translation = "「선물을 나눠주기 위해, 심야에 신성료 『라루나』에 무단으로 잠입했다가, 사감인 마하무트 님께 들켜서 큰 소동이 벌어졌었습니다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。それで、我が娘の非礼を詫びるべく、我ら２人で新星寮へ謝罪に赴いたな」"
translation = "「음. 그래서 내 딸의 무례를 사과하고자, 우리 둘이서 신성료로 사죄하러 갔었지」"

[[dialogue]]
speaker = "蘭美"
original = "「あの時のマハムート様の迫力に満ちた視線は今でも忘れることができません」"
translation = "「그때 마하무트 님의 박력 넘치는 시선은 지금도 잊을 수가 없습니다」"

[[dialogue]]
speaker = "蘭美"
original = "「セシア様の記憶を取り戻したいという想いからの行動で、あの時は大目には見てくれたものの……」"
translation = "「세시아 님의 기억을 되찾고 싶다는 마음에서 비롯된 행동이라, 그때는 너그럽게 봐주셨습니다만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「はっはっは、あれは確かに恐かったな。正直ちびりそうであったわ！」"
translation = "「핫핫하, 그건 확실히 무서웠지. 솔직히 지릴 뻔했느니라!」"

[[dialogue]]
speaker = "蘭美"
original = "「今なら笑い話にできますが……巻き込まれて作戦に参加することになったヨミは、よく無事でいられたものです」"
translation = "「지금은 웃으며 이야기할 수 있습니다만…… 휘말려서 작전에 참가하게 된 요미는, 잘도 무사할 수 있었던 것이군요」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そういえば翌日に、珍しく休みを取っていたな」"
translation = "「그러고 보니 다음 날에, 드물게 휴가를 냈었지」"

[[dialogue]]
speaker = "蘭美"
original = "「それだけ恐い思いをしたということでしょう」"
translation = "「그만큼 무서운 경험을 했다는 것이겠지요」"

[[dialogue]]
speaker = "蘭美"
original = "「ところで当主様、私を呼んだのはクリスマスの思い出に浸るため、というわけではありませんよね？」"
translation = "「그런데 당주님, 저를 부르신 것은 크리스마스의 추억에 젖기 위해서, 라는 건 아니겠지요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「無論。そうだな……もったいつけても仕方あるまい、お披露目といこうか」"
translation = "「물론이다. 그렇군…… 뜸 들여봐야 소용없겠지, 선보이도록 할까」"

[[dialogue]]
speaker = "蘭美"
original = "「っ！？\u3000これは……！！」"
translation = "「읏!? 이것은……!!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「私からのクリスマスプレゼントだ」"
translation = "「나로부터의 크리스마스 선물이다」"

[[dialogue]]
speaker = "蘭美"
original = "「人工戦闘服、ですか……？\u3000これを私に……？」"
translation = "「인공 전투복, 입니까……? 이것을 저에게……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「その通り！\u3000この人工戦闘服は、前回ヨミヨミに渡した『クリスマスフォーム』の第２弾となる」"
translation = "「그렇다! 이 인공 전투복은, 지난번 요미요미에게 주었던 『크리스마스 폼』의 제2탄이 되느니라」"

[[dialogue]]
speaker = "ヘレナ"
original = "「今回もデザインは私が行ったのだが……気に入ってもらえそうか？」"
translation = "「이번에도 디자인은 내가 직접 했다만…… 마음에 들어 해 주겠느냐?」"

[[dialogue]]
speaker = "蘭美"
original = "「もちろんです！\u3000ありがとうございます、当主様！」"
translation = "「물론입니다! 감사합니다, 당주님!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「喜んでもらえて何よりだ……では早速、着てみせてくれ」"
translation = "「기뻐해 주니 무엇보다 좋구나…… 그럼 당장, 입어 보거라」"

[[dialogue]]
speaker = "蘭美"
original = "「はいっ！」"
translation = "「예!」"

[[dialogue]]
speaker = "蘭美"
original = "「いかがでしょう、当主様？」"
translation = "「어떠신가요, 당주님?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ、良く似合っているな。我ながらほれぼれするような仕上がりだ」"
translation = "「음, 잘 어울리는구나. 내가 봐도 황홀할 정도의 완성도다」"

[[dialogue]]
speaker = "蘭美"
original = "「こんな素晴らしいものを……本当にありがとうございます」"
translation = "「이런 훌륭한 것을…… 정말 감사합니다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。……しかし、まだ戦闘服としての機能は発揮されていないようだ」"
translation = "「음. ……하지만, 아직 전투복으로서의 기능은 발휘되지 않는 모양이구나」"

[[dialogue]]
speaker = "蘭美"
original = "「はい。先ほどから起動しようとしているのですが反応はありません」"
translation = "「예. 아까부터 기동하려 하고 있습니다만 반응이 없습니다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「他のフォームもそうだったのだが、人工戦闘服は単にそれを身にまとっているだけでは力を発揮しない」"
translation = "「다른 폼도 그랬다만, 인공 전투복은 단순히 몸에 걸치는 것만으로는 힘을 발휘하지 않는다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「その戦闘服が真に持ち主のものとなるには、それを覚醒させる何らかの精神的アクセスが必要となるようだ」"
translation = "「그 전투복이 진정으로 주인의 것이 되려면, 그것을 각성시킬 무언가 정신적인 액세스가 필요한 모양이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「人によってはそれに時間がかかってしまう者もいるからな……」"
translation = "「사람에 따라서는 시간이 걸리는 자도 있으니까 말이다……」"

[[dialogue]]
speaker = "蘭美"
original = "「ふっ、問題ありません、当主様……」"
translation = "「훗, 문제없습니다, 당주님……」"

[[dialogue]]
speaker = "蘭美"
original = "「私は『光速のメイドマスター』羽宮蘭美！\u3000九浄家メイド隊の誇りにかけ、最速でこのクリスマスフォームを覚醒させてみせましょう！」"
translation = "「저는 『광속의 메이드 마스터』 하네미야 라비! 쿠죠 가 메이드대의 긍지를 걸고, 최속으로 이 크리스마스 폼을 각성시켜 보이겠습니다!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ、頼もしいな。では期待しているぞ、蘭美」"
translation = "「후후후, 든든하구나. 그럼 기대하마, 라비」"

[[dialogue]]
speaker = "蘭美"
original = "「はい、お任せください！」"
translation = "「예, 맡겨 주십시오!」"

