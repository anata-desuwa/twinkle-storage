[[dialogue]]
speaker = "unk"
original = "第１２話,眠りの姫,B"
translation = "제12화, 잠자는 공주, B"

[[dialogue]]
speaker = "unk"
original = "流星教皇庁・星見家公邸──"
translation = "유성 교황청・호시미 가문 공저──"

[[dialogue]]
speaker = "unk"
original = "宮殿に住まう一人の少女が、その廊下を歩いていた。"
translation = "궁전에 사는 한 소녀가, 그 복도를 걷고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "流星学園の星徒会長として務めを終えた彼女は、束の間の休息を得ようと実家まで戻ってきた。"
translation = "유성 학원의 성도 회장으로서 임무를 마친 그녀는, 잠깐의 휴식을 얻고자 본가까지 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "ここ最近の間に吹き込んだ新たな風に、固めた決意が揺り動かされたのかもしれない。"
translation = "최근 사이에 불어온 새로운 바람에, 굳힌 결의가 흔들렸을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "彼女が見上げた先には、壁画があった。"
translation = "그녀가 올려다본 곳에는, 벽화가 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "フィオナ"
original = "「月の壁画……」"
translation = "「달의 벽화……」"

[[dialogue]]
speaker = "unk"
original = "太古の歴史を思わせる巨大な石版。そこに描かれていたのはやはり、魔王。"
translation = "태고의 역사를 떠올리게 하는 거대한 석판. 그곳에 그려져 있던 것은 역시, 마왕."

[[dialogue]]
speaker = "unk"
original = "しかしその様子は、大聖堂に飾られていた《太陽の壁画》とはまるで異なるものだった。"
translation = "하지만 그 모습은, 대성당에 장식되어 있던 《태양의 벽화》와는 전혀 다른 것이었다."

[[dialogue]]
speaker = "フィオナ"
original = "「……うん」"
translation = "「……응」"

[[dialogue]]
speaker = "unk"
original = "得心するように頷くと、彼女はすぐに踵を返した。"
translation = "납득하듯이 고개를 끄덕이더니, 그녀는 곧바로 발길을 돌렸다."

[[dialogue]]
speaker = "フィオナ"
original = "（大丈夫──私はやれる──フィオナとしても、魔王としても）"
translation = "（괜찮아──나는 해낼 수 있어──피오나로서도, 마왕으로서도）"

[[dialogue]]
speaker = "unk"
original = "自分に言い聞かせるように胸中で唱え、彼女は再び歩き出す。"
translation = "자신에게 타이르듯이 마음속으로 되뇌며, 그녀는 다시 걷기 시작한다."

[[dialogue]]
speaker = "unk"
original = "自らのルーツが今も眠る、その部屋へ向かって……"
translation = "자신의 근원이 지금도 잠들어 있는, 그 방을 향해서……"

[[dialogue]]
speaker = "フィオナ"
original = "「ねえ──お姉ちゃん」"
translation = "「있잖아──언니」"

[[dialogue]]
speaker = "unk"
original = "遠い昔日にしまった微笑みを、ほんの一瞬だけ覗かせていた。"
translation = "아득히 먼 옛날에 간직했던 미소를, 아주 한순간만 내비치고 있었다."

