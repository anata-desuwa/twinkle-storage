[[dialogue]]
speaker = "unk"
original = "第２話,光の魔女と学園巡り,P"
translation = "제2화, 빛의 마녀와 학원 순회, P"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──邪魔するぞ」"
translation = "「──실례하마」"

[[dialogue]]
speaker = "unk"
original = "どうしてここに！？"
translation = "어떻게 여기에!?"

[[dialogue]]
speaker = "unk"
original = "クラウディア！？"
translation = "클라우디아!?"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「わっはっは。慌てるでない。正門？\u3000そんなもの通っていないぞ。ちょちょいと経路を繋げて……ひとっ飛びしてきただけだ」"
translation = "「와하하. 당황하지 마라. 정문? 그런 건 통하지 않았느니라. 살짝 경로를 연결해서…… 한걸음에 달려왔을 뿐이니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「何？\u3000部外者は立ち入り禁止？\u3000固いことを言うな」"
translation = "「무엇이냐? 외부인 출입 금지? 빡빡하게 굴지 마라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ここが以前に話していた──星徒会室というやつだな？\u3000余の部屋に比べるとせせこましいが、まあ悪くはない」"
translation = "「여기가 이전에 말했던── 성도회실이라는 곳이구나? 짐의 방에 비하면 비좁지만 뭐 나쁘지는 않구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「このあたりに玉座を置いてはどうだ？\u3000ん？\u3000そこまで偉くない？\u3000なんだ、気が弱いのう」"
translation = "「이쯤에 옥좌를 두는 건 어떠냐? 응? 그 정도로 높지는 않다고? 뭐야, 기가 죽었구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「まあよい。それより、ようやく学園とやらに来れたのだ。余は隅々まで巡ってみたいぞ。案内せい！」"
translation = "「뭐 되었도다. 그보다 드디어 학원이라는 곳에 왔느니라. 짐은 구석구석 둘러보고 싶구나. 안내하거라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほほー……こんな風になっておるのだな。思っていたよりもずっと広い城ではないか」"
translation = "「호오…… 이렇게 되어 있었구나. 생각했던 것보다 훨씬 넓은 성이 아니냐」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「しかも、ここまで人がひしめいておるとは！\u3000それになんだか明るく賑やかだ。基地とはえらい違いだのう……」"
translation = "「게다가 이렇게까지 사람이 북적거리다니! 게다가 왠지 밝고 시끌벅적하구나. 기지와는 천지 차이로다……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、あれ……？\u3000会長が小さな子を連れて歩いてる──もしかして隠し子……？」"
translation = "「어, 어라……? 회장이 어린애를 데리고 걷고 있어── 설마 숨겨둔 자식……?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「！？\u3000か、会長くんに隠し子！？」"
translation = "「!? 회장군에게 숨겨둔 자식!?」"

[[dialogue]]
speaker = "unk"
original = "（説明が難しいので黙っておく）"
translation = "(설명하기 어려우니 가만히 있자)"

[[dialogue]]
speaker = "unk"
original = "違う違う"
translation = "아냐 아냐"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はっはっは！\u3000余はネビュ──ではなかった。ええと、とにかく偉くてすごい存在なのだ！」"
translation = "「하하하! 짐은 네뷸──이 아니라. 에잇, 아무튼 위대하고 대단한 존재이니라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "（魔女を名乗るとまーたセドナに叱られてしまうからの。余はいい子だからたまには『じちょう』するのだ）"
translation = "(마녀라고 자칭했다간 또 세드나에게 꾸중을 들을 테니 말이다. 짐은 착한 아이니까 가끔은 『자중』하는 것이니라)"

[[dialogue]]
speaker = "unk"
original = "セドナさんの許可はとった？"
translation = "세드나 씨 허락은 받았어?"

[[dialogue]]
speaker = "unk"
original = "基地から出てもよかったの？"
translation = "기지에서 나와도 괜찮았던 거야?"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ！\u3000月に一度ほどはお出かけの機会が与えられておる。問題ない」"
translation = "「음! 한 달에 한 번 정도는 외출 기회가 주어지느니라. 문제없느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「お付きにアイリーンをよこされたが、邪魔だったのでな。撒いてきた。今ごろ余を探し回っておるかもしれん」"
translation = "「수행원으로 아이린을 붙여주었지만 방해되어서 말이다. 따돌리고 왔느니라. 지금쯤 짐을 찾아 헤매고 있을지도 모르겠구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「それより、学園というのは庭もあるのかの？\u3000ほう！\u3000出てみようぞ、さっそく連れてゆけ！」"
translation = "「그보다 학원이라는 곳은 정원도 있는 것이냐? 오! 나가보자꾸나, 당장 데려가거라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほほー……！\u3000流星市国の中にこんな光景があったとはの。いやはや、人間界というのは森と比べてなんとも広いな」"
translation = "「호오……! 유성시국 안에 이런 광경이 있었을 줄이야. 아니 정말 인간계라는 곳은 숲에 비하면 참으로 넓구나」"

[[dialogue]]
speaker = "unk"
original = "森って……"
translation = "숲이라니……"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔女の森だ。余ら魔女が生まれ育つ、三界とは隔たった異界──人の子には立ち入れん領域だの」"
translation = "「마녀의 숲이니라. 짐들 마녀가 태어나고 자라는 삼계와는 격절된 이계── 인간의 아이는 발을 들일 수 없는 영역이니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「何もない、退屈な場所だ。余の生まれる数百年前からほとんど光景も変わっておらんらしい」"
translation = "「아무것도 없는 지루한 곳이니라. 짐이 태어나기 수백 년 전부터 거의 풍경도 변하지 않았다는 모양이니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「それに比べると人間界は実に面白い！\u3000宿題は面倒だが、セドナも余に色んなことを教えてくれるしのう」"
translation = "「그에 비하면 인간계는 참으로 흥미롭구나! 숙제는 귀찮지만 세드나도 짐에게 여러 가지를 가르쳐주니 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「う……そういえば朝から何も食べておらなんだ。腹の虫が鳴ってしまったぞ」"
translation = "「으…… 그러고 보니 아침부터 아무것도 먹지 않았구나. 뱃속에서 꼬르륵 소리가 나 버렸도다」"

[[dialogue]]
speaker = "unk"
original = "カフェに連れてくよ"
translation = "카페로 데려갈게"

[[dialogue]]
speaker = "unk"
original = "なにか食べにいこうか"
translation = "뭐 좀 먹으러 갈까"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほほー……！\u3000学園にはこのような場所まであるとは。中々しゃれおつではないか！」"
translation = "「호오……! 학원에는 이런 장소까지 있는 것이냐. 제법 멋지구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「パンケーキにカレーにリゾット……うーむ。余の知らぬメニューがたくさん並んでおるぞ」"
translation = "「팬케이크에 카레에 리조또…… 으음. 짐이 모르는 메뉴가 잔뜩 늘어서 있구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む……この『ろこもこ』というのはなんだ？\u3000可愛い名前だのう！」"
translation = "「음…… 이 『로코모코』라는 것은 무엇이냐? 귀여운 이름이로구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ハンバーグ……ということは……肉！？\u3000決まりだ！\u3000余はこれを注文するぞ！」"
translation = "「함바그…… 그렇다는 것은…… 고기!? 결정했도다! 짐은 이것을 주문하겠노라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「もぐもぐ……むほほ～～！\u3000ウマイ！\u3000これはウマイぞ！\u3000でかした魔王、褒めてつかわす！」"
translation = "「우물우물…… 무호호~~! 맛있다! 이건 맛있구나! 잘했다 마왕, 칭찬해 주마!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「大げさ？\u3000そんなことはない！\u3000なにせ森では薬草やら香草やら緑黄色の草っ葉ばかりを食べさせられておった。余は肉に目がないのだ！」"
translation = "「과장이라고? 그렇지 않느니라! 그도 그럴 것이 숲에서는 약초니 향초니 녹황색 풀때기만 먹어야 했느니라. 짐은 고기에 사족을 못 쓰느니라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「これだから人間界はやめられん。むふふ、これからは定期的にここを訪れるのも悪くないのう！」"
translation = "「이래서 인간계는 끊을 수가 없구나. 무후후, 앞으로는 정기적으로 이곳을 방문하는 것도 나쁘지 않겠구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふぅ！\u3000満腹にもなったことだし、散歩を再開するとするか。……およ？\u3000……どうかしたのかの？」"
translation = "「후우! 배도 불렀으니 산책을 재개하도록 할까. ……어라? ……무슨 일이냐?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "『あ、もしもし──会長？\u3000今ちょっと緊急事態で──繁華街に大きめのアステラが発生したみたいなの！\u3000来れる！？』"
translation = "『아, 여보세요── 회장? 지금 좀 긴급사태라서── 번화가에 커다란 아스테라가 발생한 것 같아! 올 수 있어!?』"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふむ……連絡機か？\u3000何用であったのだ？」"
translation = "「흠…… 연락기냐? 무슨 용건이었느냐?」"

[[dialogue]]
speaker = "unk"
original = "今日は付き添えなくなった"
translation = "오늘은 같이 있어 줄 수 없게 됐어"

[[dialogue]]
speaker = "unk"
original = "ごめん、出動だ"
translation = "미안, 출동이야"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なぬ？\u3000ふむ──流星市国の危機とな。それが『すたーないと』の責務だというわけだな」"
translation = "「뭐라? 흠── 유성시국의 위기로군. 그것이 『스타 나이트』의 책무라는 것이구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「原因は──アステライトか。なるほど……ここから数キロ北と言ったところかのう」"
translation = "「원인은── 아스테라이트인가. 과연…… 여기서 북쪽으로 수 킬로미터 떨어진 곳이로구나」"

[[dialogue]]
speaker = "unk"
original = "まだ何も言ってないのに……"
translation = "아직 아무 말도 안 했는데……"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「浄めるとするか。そう大した規模でもあるまい」"
translation = "「정화하도록 하마. 그리 대단한 규모도 아닐 테니」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "『──ごめん会長！\u3000さっきのアステラなんだけど……今、破裂して自然消滅しちゃったみたい！』"
translation = "『──미안 회장! 방금 그 아스테라 말인데…… 지금 파열해서 자연 소멸해버린 것 같아!』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "『なんで急に消えたのかはわかんないけど……平和に終わったんならいいよね！\u3000じゃ！』"
translation = "『왜 갑자기 사라졌는지는 모르겠지만…… 평화롭게 끝났으면 된 거지! 그럼!』"

[[dialogue]]
speaker = "unk"
original = "クラウディアがやったの？"
translation = "클라우디아가 한 거야?"

[[dialogue]]
speaker = "unk"
original = "これも魔法？"
translation = "이것도 마법?"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ま……一飯の礼というやつだ」"
translation = "「뭐…… 밥값은 해야 하지 않겠느냐」"

[[dialogue]]
speaker = "unk"
original = "君は……"
translation = "너는……"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「数百年に一度──魔女の森には、真祖の形質を継いだ存在が生まれる。その魔力は、森の総勢を合わせたものに匹敵する」"
translation = "「수백 년에 한 번── 마녀의 숲에는 진조의 형질을 이어받은 존재가 태어나느니라. 그 마력은 숲의 총전력을 합친 것에 필적하지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「光の魔女──そう呼ばれておる」"
translation = "「빛의 마녀── 그렇게 불리고 있느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ま、要は偉くてすごいということだ。今のは見なかったことにしておけ。お主さえ黙っていれば、余がお小言を言われることもないからの！」"
translation = "「뭐, 요컨대 위대하고 대단하다는 뜻이니라. 방금 본 것은 못 본 걸로 하거라. 그대만 입을 다물고 있으면 짐이 잔소리를 들을 일도 없을 테니 말이다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「さ──学園巡りはまだまだだぞ。余が満足するまで付き合ってもらうからの！」"
translation = "「자── 학원 순회는 아직 멀었느니라. 짐이 만족할 때까지 어울려줘야 할 것이니라!」"

