[[dialogue]]
speaker = "unk"
original = "ルリエルの煩悩が具現化した影に引っ張られ、４人は渋谷へとやって来ていた――"
translation = "루리엘의 번뇌가 구현화된 그림자에 이끌려 네 사람은 시부야에 도착해 있었다――"

[[dialogue]]
speaker = "ミヤハル"
original = "「この展開は全然予想してなかったわぁ」"
translation = "「이 전개는 전혀 예상 못 했구마안」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「ルリエルはみんなと遊びたいのです♪」"
translation = "「루리엘은 모두와 놀고 싶은 것입니다♪」"

[[dialogue]]
speaker = "トマル"
original = "「ふふっ。ルリエルさまらしい、可愛らしい煩悩ですね」"
translation = "「후훗. 루리엘 님다운 귀여운 번뇌네요」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは、確かに」"
translation = "「아하하, 확실히」"

[[dialogue]]
speaker = "ルリエル"
original = "「いや～、それ程でも、なのです♪」"
translation = "「이야~ 그 정도까지는 아닌 것입니다♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「ところで、ミヤハルさんはどこか行きたいところとかないのですか？」"
translation = "「그건 그렇고, 미야하르 씨는 어디 가고 싶은 곳 없나요?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うち？\u3000ん～、そんないきなり言われてもなぁ」"
translation = "「내? 음~ 그렇게 갑자기 말해도 말이다……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちは今まで、一緒に出かけるような友達もおらんかったし……」"
translation = "「내는 지금까지 같이 놀러 나갈 친구도 없었응게……」"

[[dialogue]]
speaker = "ルリエル"
original = "「え？\u3000そうなのですか？」"
translation = "「에? 그런 것인가요?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちはスケベぇなことが好きやし、それを特に隠す気もあらへんし……だから、昔から周りに距離を置かれてしまうんよ」"
translation = "「내는 야한 걸 좋아하고, 그걸 딱히 숨길 생각도 없어서…… 그래서 예전부터 주변에서 거리를 둬버리곤 했데이」"

[[dialogue]]
speaker = "マトイ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "マトイ"
original = "（ミヤハルさん、友達いないのか……）"
translation = "（미야하르 씨, 친구가 없는 건가……）"

[[dialogue]]
speaker = "ルリエル"
original = "「そういうことなら、ルリエルにお任せなのです！\u3000ここは――」"
translation = "「그렇게 된 거라면 루리엘에게 맡겨주는 것입니다! 여기서는――」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「みんなで食べ歩きをしましょう！」"
translation = "「다 같이 맛집 탐방을 해요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「さすがもう１人のわたし！\u3000考えることが一緒なのです♪」"
translation = "「역시 또 다른 나! 생각하는 게 똑같은 것입니다♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「渋谷には何度も遊びに来ているので、ルリエルがオススメの美味しいお店をガイドしちゃうのですよ～♪」"
translation = "「시부야에는 몇 번이나 놀러 왔으니까, 루리엘이 추천하는 맛있는 가게를 가이드 해버리는 거예요~♪」"

[[dialogue]]
speaker = "unk"
original = "それから、ルリエルがオススメする飲食店を周ることになったのだが――"
translation = "그리하여 루리엘이 추천하는 음식점들을 돌게 되었는데――"

[[dialogue]]
speaker = "マトイ"
original = "「ここのケーキ、美味しい！」"
translation = "「여기 케이크 맛있다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ですよねですよね♪\u3000ルリエルが最近見つけた、イチオシのケーキ店なのです！」"
translation = "「그쵸그쵸♪ 루리엘이 최근에 발견한 최고의 케이크 가게인 것입니다!」"

[[dialogue]]
speaker = "トマル"
original = "「本当にとても美味しいです。今度、会長さまともご一緒したいくらい……」"
translation = "「정말로 아주 맛있습니다. 나중에 회장님과도 함께 오고 싶을 정도로……」"

[[dialogue]]
speaker = "ルリエル"
original = "「マトイさん、トマルさんに比べて、すごくいっぱい食べますね！\u3000そんなに食べて、太ったりしないんでしょうか？」"
translation = "「마토이 씨, 토마루 씨에 비해서 엄청나게 많이 드시네요! 그렇게 먹고 살찌거나 하지는 않나요?」"

[[dialogue]]
speaker = "マトイ"
original = "「――むぐっ！？\u3000ごほっ、ごほごほごほっ！\u3000ルリエルちゃん、ストレートに聞くね！？」"
translation = "「――우걱!? 컥, 커헉 커헉! 루리엘 짱, 너무 직설적으로 묻는 거 아냐!?」"

[[dialogue]]
speaker = "マトイ"
original = "「そんなこと言ったら、ミヤハルさんだって同じくらい食べてるし……！」"
translation = "「그렇게 따지면 미야하르 씨도 비슷하게 먹고 있는데……!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ん？\u3000ああ、うちは性欲旺盛やけど欲求不満が溜まってるから、食欲で補っとるんよ<emoji=heart04>」"
translation = "「응? 아아, 내는 성욕은 왕성한데 욕구불만이 쌓여 있어서 식욕으로 보충하고 있데이<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「どういう理屈！？」"
translation = "「무슨 논리야!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「つまり、マトイさんも性欲が不満なのですか？」"
translation = "「즉, 마토이 씨도 성욕이 불만인 것인가요?」"

[[dialogue]]
speaker = "マトイ"
original = "「ルリエルちゃん！？\u3000違うから！」"
translation = "「루리엘 짱!? 아니거든!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「それに、うちはいつも胸に栄養が行くから、あんまり気にしたことはないんよ」"
translation = "「게다가 내는 항상 가슴으로 영양이 가니까 딱히 신경 써본 적은 없데이」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ、それはずるくない！？\u3000私はいつも体重計と睨めっこしてるのに……！」"
translation = "「엣, 그건 반칙 아냐!? 난 맨날 체중계랑 눈싸움하고 있는데……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「やっぱり食べ過ぎると、太るのですね！」"
translation = "「역시 너무 먹으면 살찌는 것이군요!」"

[[dialogue]]
speaker = "マトイ"
original = "「ケーキがこれ以上食べられなくなるから、言葉にしないで！」"
translation = "「케이크를 더 이상 못 먹게 되니까 말로 하지 마!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あっ、そういえばうち、行きたいところ１つ思いついたんやけど」"
translation = "「앗, 그러고 보니 내, 가고 싶은 곳이 하나 생각났는데」"

[[dialogue]]
speaker = "ルリエル"
original = "「本当ですか？\u3000行きましょう！\u3000どこなのです？」"
translation = "「정말인가요? 가요! 어디인 것입니다?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「大人のおもちゃのお店<emoji=heart04>」"
translation = "「어른들의 장난감 가게<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「いや普通に考えてダメでしょ！？」"
translation = "「아니 상식적으로 안 되잖아!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「『大人のおもちゃ』とは、一体どういうおもちゃなのです？」"
translation = "「『어른들의 장난감』이란 대체 어떤 장난감인 것입니다?」"

[[dialogue]]
speaker = "トマル"
original = "「わ、私もそういうところは、まだ入ったことがなくて……」"
translation = "「저, 저도 그런 곳은 아직 가본 적이 없어서……」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「ルリエル、気になるのです！」"
translation = "「루리엘, 궁금한 것입니다!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ、それはやね～<emoji=heart04>」"
translation = "「후훗, 그건 말이제~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「待て待て待てぇいっ！\u3000後輩たちに変なこと教えるんじゃな～～～いっ！！」"
translation = "「기다려 기다려 기다려! 후배들한테 이상한 거 가르치지 마아아아악!!」"

[[dialogue]]
speaker = "unk"
original = "そうして、街で食べ歩きを堪能した後、ルリエルの影はお腹を擦りながら、満足した様子で消えていった。"
translation = "그렇게 거리에서 맛집 탐방을 만끽한 후, 루리엘의 그림자는 배를 문지르며 만족한 듯이 사라져 갔다."

[[dialogue]]
speaker = "unk"
original = "神社に帰って来ると、ミヤハルはほっと息をつく。"
translation = "신사로 돌아오자 미야하르는 안도의 한숨을 내쉰다."

[[dialogue]]
speaker = "ミヤハル"
original = "「やれやれ、ようやっとルリエルはんの『遊びたい』って煩悩が満たされたみたいやねぇ」"
translation = "「에구구, 이제야 루리엘 한의 『놀고 싶다』는 번뇌가 채워진 모양이네예」"

[[dialogue]]
speaker = "ルリエル"
original = "「はい♪\u3000みんなでお出かけして、すごく楽しかったのです！」"
translation = "「네♪ 다 같이 외출해서 정말 즐거웠던 것입니다!」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「次はお泊り会がしたいのです！」"
translation = "「다음은 파자마 파티를 하고 싶은 것입니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「って、あれ！？\u3000いつの間にか、また復活してる！？」"
translation = "「어, 어라!? 어느새 또 부활했어!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「お泊り会！？\u3000それはまた、すごく楽しそうなのです♪」"
translation = "「파자마 파티!? 그건 또 정말 즐거워 보이는 것입니다♪」"

[[dialogue]]
speaker = "トマル"
original = "「わ、私は参加していいものなのでしょうか……？」"
translation = "「저, 저는 참가해도 괜찮은 것일까요……?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「……ルリエルはんの煩悩の強さ、うち舐めとったわぁ」"
translation = "「……루리엘 한의 번뇌가 이 정도일 줄은 내도 얕봤구마안」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで急遽、神社でのお泊り会が開催されることになるのだった――"
translation = "그런 연유로 급거 신사에서의 파자마 파티가 개최되게 된 것이었다――"

