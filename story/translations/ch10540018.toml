[[dialogue]]
speaker = "unk"
original = "女性であることを隠し、男子生徒として学園に通うユーリス。"
translation = "여성임을 숨기고 남학생으로서 학원에 다니는 유리스."

[[dialogue]]
speaker = "unk"
original = "そんな彼女と恋人関係になれたことは嬉しい──だが俺たちはどちらも目立つ身だ。"
translation = "그런 그녀와 연인 관계가 된 것은 기쁘다── 하지만 우리 둘 다 눈에 띄는 신분이다."

[[dialogue]]
speaker = "unk"
original = "片や星徒会長。片や王子にして聖剣の使い手。"
translation = "한쪽은 성도회장. 한쪽은 왕자이자 성검의 사용자."

[[dialogue]]
speaker = "unk"
original = "そうなると『男子』だということを生かして落ち合える場所を探すことになってしまって……"
translation = "그렇게 되니 『남자』라는 점을 살려 만날 수 있는 장소를 찾게 되어버려서……"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ま、まったく……会長は本当にエッチな男の子なんだから……んあ、ふぅっ……おっぱい触っちゃ……ひぁあっ<emoji=heart04>」"
translation = "「정, 정말이지…… 회장은 정말 야한 남자애라니까…… 응아, 후우…… 가슴 만지면…… 히아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「いくら誰も来ないからって、ちょっとがっつきすぎだと思うよ……あ、ん、んんっ<emoji=heart04>」"
translation = "「아무리 아무도 안 온다고 해도, 좀 너무 달려드는 것 같아…… 아, 응, 으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "校舎のはずれにある男子トイレ。ここが新星学園で一番の穴場なのだった。"
translation = "교사 외곽에 있는 남자 화장실. 여기가 신성학원에서 최고의 명당이었다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「個室に入った途端、服を脱がせてっ……はぁ、あ……おっぱい揉みすぎだってば……」"
translation = "「개인실에 들어오자마자 옷을 벗기고는…… 하아, 아…… 가슴 너무 주무른다니까……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「うぅ……これ以上大きくなったらどうしよう。隠すのがもっと大変になっちゃう……」"
translation = "「우으…… 여기서 더 커지면 어떡하지. 숨기는 게 더 힘들어질 텐데……」"

[[dialogue]]
speaker = "unk"
original = "男子の制服の下に、ユーリスがこんなにも大きなおっぱいを隠しているだなんて、俺以外は学園内の誰も知らないだろう。"
translation = "남자 교복 아래에 유리스가 이렇게나 커다란 가슴을 숨기고 있다는 건, 나 이외에 학원 내 누구도 모르겠지."

[[dialogue]]
speaker = "unk"
original = "驚くことにいまだ成長中らしい。何でも俺が揉み始めてからバストサイズが少し大きくなってきたとかで、この前ちょっと怒られた。"
translation = "놀랍게도 아직 성장 중인 모양이다. 아무래도 내가 주무르기 시작한 뒤로 바스트 사이즈가 조금 커졌다나 해서, 저번에 좀 혼났다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「おっぱい、剣を振るのにも邪魔だし、揺れないように固定するのもきついし……」"
translation = "「가슴, 검을 휘두르는 데도 방해되고, 흔들리지 않게 고정하는 것도 힘든데……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「でも、君はおっぱい大きい方が嬉しいんだよね？」"
translation = "「하지만 너는 가슴 큰 쪽이 기쁜 거지?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「はぁ……複雑な気分だよ。女の子だってバレたらいけないけど、彼氏の君には喜んでほしいし……」"
translation = "「하아…… 복잡한 기분이야. 여자애인 걸 들키면 안 되지만, 남자친구인 네가 기뻐해 줬으면 좋겠고……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んぅ、ふうぅ、あぁっ……触り方、いやらしいよぉっ……んあ、あぁっ……<emoji=heart04>\u3000男の人は、本当におっぱいが好きなんだから……あぁんっ<emoji=heart04>」"
translation = "「응으, 후우우, 아아앗…… 만지는 법, 야해애…… 응아, 아아앗……<emoji=heart04> 남자들은 정말 가슴을 좋아한다니까…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もじもじと、俺の膝の上で動くユーリスがエロ可愛くって仕方がない。"
translation = "머뭇거리며 내 무릎 위에서 움직이는 유리스가 에로 귀여워서 견딜 수가 없다."

[[dialogue]]
speaker = "unk"
original = "男物のジャケットやスラックスをはだけて、大きなおっぱいとくびれたウェストが覗くのはいつ見ても倒錯的だ。"
translation = "남성용 재킷이나 슬랙스를 풀어헤치고 커다란 가슴과 잘록한 허리가 엿보이는 것은 언제 봐도 도착적이다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「目がいやらしいよ、もう……君、じっくり楽しもうとしてない？」"
translation = "「눈빛이 야해, 정말…… 너, 차분히 즐기려고 하고 있지?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「……君のおち○ちん、もう準備できてるでしょ。は……早くちょうだい？」"
translation = "「……너의 자지, 벌써 준비됐지. 어…… 어서 빨리 줄래?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ち──違うよ、おねだりじゃないからっ」"
translation = "「아── 아니야, 조르는 게 아니니까」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ここトイレだから。早く済ませないとまずいからだよっ」"
translation = "「여기 화장실이니까. 빨리 끝내지 않으면 곤란하단 말이야」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「私の方も準備できてるから……うん。おっぱい、たくさん触ってもらったし、その……条件反射？\u3000って言うのかな」"
translation = "「나도 준비됐으니까…… 응. 가슴, 잔뜩 만져졌고, 그…… 조건반사? 라고 해야 하나」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「トイレで何回もしてるからかな。思い出して濡れちゃったっていうか……」"
translation = "「화장실에서 몇 번이나 했으니까 그런가 봐. 떠올려버려서 젖어버렸다고나 할까……」"

[[dialogue]]
speaker = "unk"
original = "そんなこと言われたらもう我慢なんてできない。"
translation = "그런 말을 들으니 더 이상 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "膝上に乗せたユーリスのお尻をそっと持ち上げ、俺はペニスの先端をあてがって──"
translation = "무릎 위에 앉힌 유리스의 엉덩이를 살며시 들어 올리고, 나는 페니스의 끝을 갖다 대고──"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あっ……はいって、ぅ、うぅあ、あぁあっ<emoji=heart04>\u3000きたあぁあっ……<emoji=heart04>」"
translation = "「앗…… 들어와, 으, 으으아, 아아앗<emoji=heart04> 들어왔어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「……ぁ、ご、ごめんっ、おっきい声、出ちゃった……」"
translation = "「……아, 미, 미안, 큰 소리, 내버렸어……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「君のおち○ちん、すっごく大きいから……んんぅ、ふぅっ……私の中、こじ開けられてる感じが、すごくって……ふぅ、うぅっ……<emoji=heart04>」"
translation = "「너의 자지, 정말 크니까…… 응응으, 후우…… 내 안이, 억지로 열리는 느낌이, 너무 강해서…… 후우, 으윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「動くのは、ゆっくりでお願い……ね？」"
translation = "「움직이는 건, 천천히 부탁해…… 응?」"

[[dialogue]]
speaker = "unk"
original = "男心を無意識にくすぐるお願いにぐっと来てしまう。"
translation = "남성미를 무의식적으로 자극하는 부탁에 울컥하고 만다."

[[dialogue]]
speaker = "unk"
original = "ユーリスの体を抱きながら、ゆっくりとピストンを始める。"
translation = "유리스의 몸을 안으면서, 천천히 피스톤을 시작한다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ん～～～っ<emoji=heart04>\u3000ふうぅぁあ、ああぁっ……あ、あふ、すご、ぃ、ぁ、ぁぁっ……<emoji=heart04>」"
translation = "「음～～～윽<emoji=heart04> 후우으아아, 아아앗…… 아, 아후, 굉장, 해, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ずぷずぷって出たり……入ったり……ぅ、ふぅ、んんぁっ……い、いいよお……君が体の中に入ってくるの、す、好きっ……<emoji=heart04>」"
translation = "「즈퓩즈퓩하고 나갔다…… 들어왔다…… 으, 후우, 응아앗…… 조, 좋아아…… 네가 몸 안으로 들어오는 거, 조, 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥に突き入れるたび、ぞくっ、びくっ、と体を震わせるユーリス。"
translation = "안쪽을 찔러 넣을 때마다, 소름 돋는 듯, 움찔, 하며 몸을 떠는 유리스."

[[dialogue]]
speaker = "unk"
original = "それに合わせて、俺の手のひらに乗ったおっぱいがたぷたぷ揺れることに、たまらなく興奮してしまう。"
translation = "그것에 맞춰, 내 손바닥 위에 놓인 가슴이 출렁출렁 흔들리는 것에, 견딜 수 없이 흥분하고 만다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「はぁ、うぅっ、んんぅ、ふぅ、んんぅ……ん、ふぅう、ぅう、ぁっ、はぁ、あぁっ……<emoji=heart04>」"
translation = "「하아, 으윽, 응으, 후우, 응으…… 응, 후우우, 으으, 앗, 하아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ど、どうかな……？\u3000ん、ふぅ、うぅ……私。最初の頃より、声っ……お、抑えられるようになったと、思わない？」"
translation = "「어, 어때……? 응, 후우, 으으…… 나. 처음보다, 목소리…… 저, 저기, 잘 참게 됐다고, 생각하지 않아?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「はぁ、んん、ふぅ、んっ……でしょ？\u3000うん、初めの頃は、君とキスしてないと我慢、できなかったけどっ……」"
translation = "「하아, 응응, 후우, 응…… 그렇지? 응, 처음에는, 너랑 키스하지 않으면 참을 수, 없었지만……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふ、ふふふ。もう昔の私とは違うんだから……んぅ、ふぅっ……な、何事も訓練次第で、はぁ、んぅ、上達するものだよっ……ん、ぁあ<emoji=heart04>」"
translation = "「후, 후후후. 이제 예전의 내가 아니니까…… 응으, 후우…… 뭐, 뭐든 훈련하기 나름으로, 하아, 응으, 실력이 느는 법이야…… 응, 아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "個室トイレでのエッチがバレないよう、喘ぎ声を我慢するコツを身に付けたらしい。"
translation = "개인 화장실에서의 섹스가 들키지 않도록, 신음소리를 참는 요령을 터득한 모양이다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ん、ふぅ。何度もおち○ちんにずぷずぷされてるうちに、わかってきたんだっ……<emoji=heart04>」"
translation = "「응, 후우. 몇 번이나 자지에 즈퓩즈퓩 당하는 동안에, 알게 됐어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あ、君のおち○ちんが、ずぶぶぅ～って奥に入ってくる時が、い、一番気持ちいいから……」"
translation = "「아, 네 자지가, 즈부부우~ 하고 안쪽으로 들어올 때가, 가, 가장 기분 좋으니까……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そのタイミングに合わせて、ふ、ふぅー……<emoji=heart04>\u3000って、ゆっくり息を吐いてっ……体に力を込めないのが、こ、コツなんだよっ<emoji=heart04>」"
translation = "「그 타이밍에 맞춰서, 후, 후우─……<emoji=heart04> 하고, 천천히 숨을 내뱉고…… 몸에 힘을 주지 않는 게, 비, 비결이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ほ、ほら……ふぅうぅーっ……ふぅううーっ……<emoji=heart04>\u3000ね、ね？\u3000えっちな声、あんまり、んふぅ、出てないと、思わない？」"
translation = "「자, 봐봐…… 후우우우─…… 후우우우─……<emoji=heart04> 그, 그렇지? 야한 목소리, 별로, 응후우, 안 나오고 있다고, 생각하지 않아?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「君とこっそりエッチできるように……み、身に付けたんだよ。えっちの時の、息継ぎのし方を……<emoji=heart04>」"
translation = "「너랑 몰래 섹스할 수 있도록…… 미, 몸에 익힌 거야. 섹스할 때의, 숨 쉬는 법을……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何ともまあ、いじらしい努力もあったものだ。"
translation = "참으로, 기특한 노력도 다 있었군."

[[dialogue]]
speaker = "unk"
original = "ユーリスが可愛いから乳首をキュッと摘まんであげた。"
translation = "유리스가 귀여워서 유두를 꼬집어 주었다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぇあぁあぁあっ！？<emoji=heart04>」"
translation = "「훼아아아앗!?<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あ──あぁ、ば、バカっ。何で不意打ちするんだっ、そういうイジワル、良くないんじゃないかな、んんぅ、ふぅ、うぁああっ……<emoji=heart04>」"
translation = "「아── 아아, 바, 바보. 왜 기습하는 거야, 그런 심술, 좋지 않다고 생각하는데, 응응으, 후우, 우아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「このおっぱい、君のものだけどっ……い、今みたいなイジワルする時は、ちゃんと事前に言ってっ……はぁあ、あ、ん、んぅ<emoji=heart04>」"
translation = "「이 가슴, 네 것이지만…… 지, 지금 같은 심술을 부릴 때는, 제대로 사전에 말해줘…… 하아아, 아, 응, 응으<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「心の準備ができてたらっ、んぁ、はぁ、ふぅっ……私、君のしたいこと、断ったりしないんだからっ……」"
translation = "「마음의 준비가 되어 있으면, 응아, 하아, 후우…… 나, 네가 하고 싶은 거, 거절하지 않으니까……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめんごめん」"
translation = "「미안 미안」"

[[dialogue]]
speaker = "unk"
original = "いきなり不意打ちしたことを謝り、優しくおっぱいをこねながら、ユーリスの頬に口づけする。"
translation = "갑자기 기습한 것을 사과하며, 부드럽게 가슴을 주무르면서, 유리스의 뺨에 입을 맞춘다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「もう……これからは気を付けてね、んぁ、はぁ、ふぅ、んんんっ……<emoji=heart04>」"
translation = "「정말…… 이제부터는 조심해줘, 응아, 하아, 후우, 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "素直で、すぐ俺の謝罪を信じてしまうユーリスが可愛い。これだからイジワルしたくなってしまうんだ。"
translation = "솔직해서, 금방 내 사과를 믿어버리는 유리스가 귀엽다. 이래서 심술을 부리고 싶어지는 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ──誰か来たかも」"
translation = "「아── 누가 왔을지도」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「えっ、ウソ！？」"
translation = "「엣, 거짓말!?」"

[[dialogue]]
speaker = "unk"
original = "そう、ウソだ。"
translation = "그래, 거짓말이다."

[[dialogue]]
speaker = "unk"
original = "だけど俺はわざと耳をそばだてるふりをする。"
translation = "하지만 나는 일부러 귀를 기울이는 척을 한다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「足音とか聞こえないよ？\u3000誰もいないよね……？」"
translation = "「발소리 같은 거 안 들리는데? 아무도 없는 거지……?」"

[[dialogue]]
speaker = "unk"
original = "外の気配を探りながらも不安がるユーリス。"
translation = "밖의 기척을 살피면서도 불안해하는 유리스."

[[dialogue]]
speaker = "unk"
original = "神経を研ぎ澄まそうとするユーリスをかき乱すように、ピストンを速めた。"
translation = "신경을 곤두세우려는 유리스를 휘젓듯이, 피스톤 속도를 높였다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぅうう、んんっ、うぅうぅう～～っ！？」"
translation = "「후우우우, 응응, 으으으으으～～윽!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あ～っ、はぁっ、ふぅ～っ、か、はっ<emoji=heart04>\u3000な、なんでっ？\u3000ふぅあ、不意打ちはダメって、さっき言った、のにぃっ……ぁ、ぁあっ<emoji=heart04>」"
translation = "「아~앗, 하앗, 후우~앗, 카, 하앗<emoji=heart04> 왜, 왜애? 후우아, 기습은 안 된다고, 아까 말했, 는데에…… 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あっ、はっ、はぁんっ<emoji=heart04>\u3000人がいるかもしれないのに……そんなにズンズンしちゃ、ダメぇっ……ぁ、あっ、んぁああっ<emoji=heart04>」"
translation = "「앗, 핫, 하앙<emoji=heart04> 사람이 있을지도 모르는데…… 그렇게 즈응즈응 하면, 안 돼애…… 아, 앗, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段のユーリスなら、外に人がいれば気配でわかるだろう。"
translation = "평소의 유리스라면, 밖에 사람이 있으면 기척으로 알 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "だけどペニスで激しく突き上げられてはそれどころではない。"
translation = "하지만 페니스로 격렬하게 치받혀서는 그럴 경황이 아니다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んふぅっ、あっ、はぁっ、あんっ<emoji=heart04>\u3000おち○ちん、深いところまで、届いてるっ……んん～っ<emoji=heart04>」"
translation = "「응후으, 앗, 하앗, 아앙<emoji=heart04> 자지, 깊은 곳까지, 닿고 있어…… 응응~윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぁああっ<emoji=heart04>\u3000奥、そんなぐりぐりってされたら……ぅああっ<emoji=heart04>\u3000くあぁ、あぁ、ぁぁあっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 안쪽, 그렇게 구리구리 휘저어지면……으아앗<emoji=heart04> 쿠아아, 아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅうっと抱きしられているから、ユーリスは逃れることもできない。"
translation = "꽉 껴안겨 있기 때문에, 유리스는 도망칠 수도 없다."

[[dialogue]]
speaker = "unk"
original = "されるがままに責められ、普段の凛々しい王子の姿からは想像できない、とろけた顔で嬌声を上げる。"
translation = "당하는 대로 유린당하며, 평소의 늠름한 왕자의 모습에서는 상상할 수 없는, 황홀해진 얼굴로 교성을 지른다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「は、速いっ、速いからっ、ぅあぁあ、ダメダメ、声出る、声出ちゃうからっ──ひぁああっ<emoji=heart04>\u3000んふぅっ、あっあっ<emoji=heart04>\u3000ふうぁあっ<emoji=heart04>」"
translation = "「하, 빠르앗, 빠르니까앗, 으아아아, 안 돼 안 돼, 목소리 나와, 목소리 나와버리니까──히아아앗<emoji=heart04> 응후읏, 앗앗<emoji=heart04> 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぅうっ、ふぅーっ、んんぅっ、ふっ、ふうっ、ふうううぅっ……<emoji=heart04>」"
translation = "「후우읏, 후우ー앗, 응응읏, 훗, 후웃, 후우우우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "喘ぎ声を我慢するユーリスを見ると、もっと激しく攻めて、エッチな声が聞きたいと思ってしまう。"
translation = "신음 소리를 참는 유리스를 보자, 더욱 격렬하게 몰아붙여서, 야한 목소리를 듣고 싶다는 생각이 들어버린다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あぁあっ<emoji=heart04>\u3000あはぁ、うぅ、ふぅっ、気持ちいい、おち○ちん気持ちいいっ……んー、んぅ、ふぅ、あぁっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 아하아, 으으, 후웃, 기분 좋아, 자지 기분 좋아앗……음ー, 음으, 후우, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「おっぱいも、そんなっ、ぁ、揉んだらぁ<emoji=heart04>\u3000また大きくなる、隠せなくなっちゃう、ダメ<emoji=heart04>\u3000ぁ、ダメ、うう、んんぁっ<emoji=heart04>」"
translation = "「가슴도, 그렇게엣, 아, 주무르면아<emoji=heart04> 또 커져, 숨길 수 없게 돼버려, 안 돼<emoji=heart04> 아, 안 돼, 으으, 응응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「はっ、あっ、あんっ<emoji=heart04>\u3000ダメ、声出ちゃうっ<emoji=heart04>\u3000人いるかもしれないのに、声が──あっ──んん～～っ<emoji=heart04>」"
translation = "「핫, 앗, 안앗<emoji=heart04> 안 돼, 목소리 나와버렷<emoji=heart04> 사람 있을지도 모르는데, 목소리가──앗──응응～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結局声を抑えきれなくなったユーリスの口をふさぐように唇を重ねる。"
translation = "결국 목소리를 억누를 수 없게 된 유리스의 입을 막듯이 입술을 겹친다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んちゅっ……ちゅるっ……ちゅるるっ<emoji=heart04>\u3000もう、バカぁ……んっ、ちゅるちゅる、れぇろ……はぁ、んんっ、ちゅくっ、じゅるる<emoji=heart04>」"
translation = "「음츄윽……츄릅……츄르르윽<emoji=heart04> 정말, 바보오……응, 츄르츄르, 레에로……하아, 응응, 츄윽, 쥬르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んむっ、んちゅるちゅるっ……れるれろ、はぷっ、じゅるるるっ<emoji=heart04>\u3000んっ、んふっ……ちゅるっ、じゅるっ、れるれる……ぷぁっ<emoji=heart04>」"
translation = "「음뭇, 응츄르츄르윽……렐레레로, 하픗, 쥬르르르윽<emoji=heart04> 응, 응훗……츄릅, 쥬릅, 렐렐레……푸핫<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぷっくり膨れた乳首をくりくりいじりながら、ユーリスの耳元でささやく。"
translation = "통통하게 부풀어 오른 유두를 조물조물 만지작거리며, 유리스의 귓가에 속삭인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっと強くしてもいいか？\u3000じゃないとイケないかも」"
translation = "「더 세게 해도 될까? 안 그러면 못 갈지도 몰라」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そ、そんなぁっ……ふぅ、んんぁ、あっあ、あっ<emoji=heart04>」"
translation = "「그, 그런아앗……후우, 응응아, 앗아, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ゆ、ゆるしてぇ……君のおち○ちん凄いから。気持ちいいから。ダメ、ダメ、ダメ……は、速いぱんぱんされたら、私っ……<emoji=heart04>」"
translation = "「요, 용서해줘어…… 너의 자지 굉장하니까. 기분 좋으니까. 안 돼, 안 돼, 안 돼…… 하, 빠르게 팡팡 당하면, 나아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "むしろ激しくしてくれと誘われているみたいだ。"
translation = "오히려 격렬하게 해달라고 유혹하는 것처럼 보인다."

[[dialogue]]
speaker = "unk"
original = "奥までぐりぐりとねじ込みながら、さらに強くおっぱいを揉んでやる。"
translation = "안쪽까지 구리구리 비틀어 넣으면서, 더욱 강하게 가슴을 주물러 준다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぅうぅううっ<emoji=heart04>\u3000うぅう～っ<emoji=heart04>\u3000あぁ、ぅう、うぅうっ<emoji=heart04>」"
translation = "「후우우으우우웃<emoji=heart04> 으으으～앗<emoji=heart04> 아아, 으우, 으으으앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んんっ、んっ、んんんんっ──うぁあぁっ<emoji=heart04>\u3000無理ぃ、ダメだよぉ、我慢無理ぃいっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000ひぅうっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「응응, 윽, 응응응응앗──으아아앗<emoji=heart04> 무리이, 안 된다고오, 참는 거 무리이잇<emoji=heart04> 아아앗<emoji=heart04> 히으읏<emoji=heart04> 응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000んぇあぁああっ<emoji=heart04>\u3000すごいの来る、イクぅっ<emoji=heart04>\u3000ふぇあぁぁあっ<emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 응에아아아앗<emoji=heart04> 굉장한 거 와, 가버렷<emoji=heart04> 페아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ああっ、あんっ、激しいっ<emoji=heart04>\u3000おま○こずぽずぽされてっ……あっ、あっ、あんっ<emoji=heart04>」"
translation = "「아앗, 안앗, 격렬해엣<emoji=heart04> 보지 즈포즈포 당해서어……앗, 앗, 안앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「気持ちいぃっ<emoji=heart04>\u3000あぁぁ、このおち○ちん気持ちぃいっ<emoji=heart04>\u3000んぅう、うぅ～っ<emoji=heart04>\u3000ふやぁ、ぁあ、ぁあぁ、ぁぁああっ<emoji=heart04>」"
translation = "「기분 좋아앗<emoji=heart04> 아아아, 이 자지 기분 좋아아앗<emoji=heart04> 응으우, 으으～앗<emoji=heart04> 후야아, 아아, 아아아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスで思い切り突き上げながら、両方の乳首を揉みつぶす。"
translation = "페니스로 힘껏 치올리면서, 양쪽 유두를 짓이긴다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ん～～～～っ<emoji=heart04>\u3000乳首ダメっ<emoji=heart04>\u3000頭バカになるっ<emoji=heart04>\u3000んぅっ、んんっ<emoji=heart04>\u3000王子なのに、王女なのに<emoji=heart04>\u3000乳首くりくりされておかしくなるっ<emoji=heart04>」"
translation = "「응～～～～앗<emoji=heart04> 유두 안 돼앗<emoji=heart04> 머리 바보가 돼버렷<emoji=heart04> 응으, 응응앗<emoji=heart04> 왕자인데, 왕녀인데<emoji=heart04> 유두 조물조물 당해서 이상해져버렷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぁっ、はぁっ、ああっ<emoji=heart04>\u3000乳首と一緒に、おま○こ、されてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちん、ずんずんされてっ<emoji=heart04>\u3000あっあっあっあっ──<emoji=heart04>」"
translation = "「후아앗, 하앗, 아아앗<emoji=heart04> 유두랑 같이, 보지, 당해서엣<emoji=heart04> 앗<emoji=heart04> 자지, 즈응즈응 당해서엣<emoji=heart04> 앗앗앗앗──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺だけが知っている、ユーリスの女の子の姿。"
translation = "나만이 알고 있는, 유리스의 여자아이의 모습."

[[dialogue]]
speaker = "unk"
original = "顔をとろけさせて喘ぐ彼女にそそられて、ぞくぞくと精液が昇ってくる。"
translation = "얼굴을 황홀하게 풀며 신음하는 그녀에게 자극받아, 울컥울컥 정액이 치밀어 오른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──今日はどこ出そうか？」"
translation = "「──오늘은 어디에 내줄까?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふうぁ、あ、ぁぁあっ<emoji=heart04>\u3000同じがいい、いつもと同じが、いいっ」"
translation = "「후아, 아, 아아앗<emoji=heart04> 같은 게 좋아, 언제나랑 같은 게, 좋아앗」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「おま○こ！\u3000おま○こに出して！\u3000外じゃヤダ、中ぁっ！」"
translation = "「보지! 보지에 내줘! 밖은 싫어, 안엣!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んんぅっ、あっ、あっあっ、ふぅ、ぁあ、ぁ、あああぁ、ううあっ、ぁあっ<emoji=heart04>\u3000私もイク、中に出されたら絶対にイクぅっ<emoji=heart04>\u3000あっあっ、あっ<emoji=heart04>」"
translation = "「응응으, 앗, 앗앗, 후우, 아아, 아, 아아아아, 으으앗, 아앗<emoji=heart04> 나도 가, 안에 내보내지면 절대로 가버려어엇<emoji=heart04> 앗앗, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も限界だ。恋人に中出ししたくって、もう我慢がきかない。"
translation = "나도 한계다. 연인에게 질내사정하고 싶어서, 이제 참을 수가 없다."

[[dialogue]]
speaker = "unk"
original = "彼女の全身を抱きしめて──"
translation = "그녀의 전신을 껴안고──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「中に出すからなっ……ユリアーナ！」"
translation = "「안에 내보낼 테니까…… 율리아나!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「それ反則──ぁぁああイク<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000イクうぅう、うぁあぁ～っ<emoji=heart04>」"
translation = "「그건 반칙──아아아아 가버려<emoji=heart04> 가버려가버렷<emoji=heart04> 가버려어우, 으아아아～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んんんんあぁああぁああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응응응아아아아아아～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びくびくっとそり返る彼女の体を、乳首をきゅっと摘まみながら抱きしめて、精液を流し込む。"
translation = "비쿠비쿠 경련하며 몸을 젖히는 그녀의 몸을, 유두를 꼬집듯이 쥐며 껴안고, 정액을 쏟아붓는다."

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んん～っ<emoji=heart04>\u3000ふっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000乳首ダメっ<emoji=heart04>\u3000出しながら、乳首きゅってするの、ダメだからぁっ<emoji=heart04>」"
translation = "「응응～앗<emoji=heart04> 훗<emoji=heart04> 응<emoji=heart04> 유두 안 돼앗<emoji=heart04> 싸면서, 유두 꼬집는 거, 안 되니까아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぅっ<emoji=heart04>\u3000うぅっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000出てる、んぁ、あ～ぁ、ああーっ……<emoji=heart04>」"
translation = "「후으앗<emoji=heart04> 으으앗<emoji=heart04> 아아앗<emoji=heart04> 나오고 있어, 응아, 아～아, 아아ー앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の射精に合わせて、つま先までぷるぷる痙攣させるユーリス。"
translation = "나의 사정에 맞춰서, 발끝까지 파르르 경련하는 유리스."

[[dialogue]]
speaker = "unk"
original = "おっぱいが汗をかいてぬるぬるしていて、それをぎゅうっと揉みつぶすのがすごく心地いい。"
translation = "가슴이 땀에 젖어 미끌거리고, 그것을 꽉 짓이기는 것이 무척 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "そして最後の一滴まで出しきって──"
translation = "그리고 마지막 한 방울까지 다 내보내고──"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ううぅ、うぅ、ぁ、ぁ、ぁあぁあ～っ、ぐりぐり、押し付け、られてぇっ……あ──はぁっ<emoji=heart04>\u3000まだ、出てるぅ……んん～～っ<emoji=heart04>」"
translation = "「으으으, 으으, 아, 아, 아아아아～앗, 구리구리, 눌려, 져서어어…… 아──하앗<emoji=heart04> 아직, 나오고 있어어…… 응응～～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あ、ぁ──よ、ようやく、止まった、ぁ……おち○ちんの、射精っ……<emoji=heart04>」"
translation = "「아, 아──겨, 겨우, 멈췄, 다아…… 자지의, 사정앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ほんとに、精液たくさん出たね……もうどろどろだよ。はぁあ、ふぅうっ……」"
translation = "「정말로, 정액 많이 나왔네…… 벌써 걸쭉해. 하아아, 후우우읏……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……気持ち良かった……」"
translation = "「아아…… 기분 좋았어……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「うん……私も……はぁ、ふぅ……」"
translation = "「응…… 나도…… 하아, 후우……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「外……誰もいない、よね……？\u3000もしかしてさっきのって……ウソ？」"
translation = "「밖…… 아무도 없지, 그치……? 설마 아까 그건…… 거짓말?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さぁ？」"
translation = "「글쎄?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「やっぱりウソだ～！\u3000もうっ、イジワルなんだから！」"
translation = "「역시 거짓말이지~! 정말, 심술궂다니까!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ユーリス、すごい声出てたもんな。人には聞かせられないよ」"
translation = "「유리스, 엄청난 소리 냈었잖아. 남들한테는 못 들려주겠어」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「だ、誰のせいだと思ってるの……気持ち良すぎるからやめてって、私、何回も言ったのに……」"
translation = "「누, 누구 때문이라고 생각하는 거야…… 너무 기분 좋으니까 그만하라고, 나, 몇 번이나 말했는데……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「これからはちゃんと、私の言うこと聞いてくれないと……いつかバレちゃうよ……？」"
translation = "「앞으로는 제대로 내 말 들어주지 않으면…… 언젠가 들켜버릴걸……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっと調子に乗りすぎた。ごめん」"
translation = "「조금 너무 들떴어. 미안」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「うん。反省してね」"
translation = "「응. 반성해」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ぁ、でも……最後の、あれ……」"
translation = "「아, 하지만…… 마지막에, 그거……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「女の子の名前で呼んでくれたの、嬉しかったな」"
translation = "「여자애 이름으로 불러준 거, 기뻤어」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「また今度する時も……呼んでほしい、かも……<emoji=heart04>」"
translation = "「다음에 또 할 때도…… 불러줬으면 좋겠을, 지도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはいいけど、声……我慢できる？」"
translation = "「그건 괜찮은데, 목소리…… 참을 수 있겠어?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「が、頑張るよ、任せて！」"
translation = "「가, 가슴 펴고 노력할게, 맡겨줘!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「──って、たまにはトイレ以外でもしようよ、ねぇっ！？」"
translation = "「──랄까, 가끔은 화장실 말고 다른 데서도 하자고, 응!?」"

