[[dialogue]]
speaker = "unk"
original = "桜十路家の所有する巨大豪華客船『チェリークルーズ号』。"
translation = "사쿠라코지 가문이 소유한 거대 호화 여객선 『체리 크루즈호』."

[[dialogue]]
speaker = "unk"
original = "遊園地のプールエリア『チェリークルーズ』のモチーフとなった船である。"
translation = "놀이공원의 풀장 구역 『체리 크루즈』의 모티브가 된 배이다."

[[dialogue]]
speaker = "unk"
original = "俺とエルゼはその船の甲板にあるプールを、貸し切りにして遊んでいた。"
translation = "나와 엘제는 그 배의 갑판에 있는 풀을, 전세 내서 놀고 있었다."

[[dialogue]]
speaker = "unk"
original = "たっぷり泳いだ後、一度休憩するために水から上がると、エルゼはプールサイドに設置されているデッキチェアに横になった。"
translation = "실컷 수영한 후, 잠시 쉬기 위해 물에서 나오자, 엘제는 풀사이드에 설치된 데크 체어에 누웠다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あの、会長様……どうして下半身を固くされているのです？」"
translation = "「저, 회장님…… 어째서 하반신을 굳히고 계십니까?」"

[[dialogue]]
speaker = "クロト"
original = "「さっき泳いでいる時、エルゼといっぱい抱きあっただろう？」"
translation = "「아까 수영할 때, 엘제랑 잔뜩 껴안았잖아?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……それで興奮を抑えられなくなった、と……そういうことですの？」"
translation = "「……그래서 흥분을 억누를 수 없게 되었다, 라고…… 그런 말씀이십니까?」"

[[dialogue]]
speaker = "unk"
original = "エルゼは素っ気なく俺に背を向ける。"
translation = "엘제는 쌀쌀맞게 나에게 등을 돌린다."

[[dialogue]]
speaker = "unk"
original = "そういう事をするつもりはない、というアピールなのか、無防備な背中を晒して誘っているのか。"
translation = "그런 짓을 할 생각은 없다, 라는 어필인지, 무방비한 등을 드러내며 유혹하는 것인지."

[[dialogue]]
speaker = "unk"
original = "判断はつかなかったがエルゼを求める気持ちは抑えられず、俺は彼女の片足を掴むとそれを高く持ち上げた。"
translation = "판단은 서지 않았지만 엘제를 원하는 마음은 억누를 수 없어, 나는 그녀의 한쪽 다리를 잡고 그것을 높이 들어 올렸다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ひゃうっ！？\u3000い、いきなりなんですの！？」"
translation = "「햐앗!? 가, 갑자기 왜 이러십니까!?」"

[[dialogue]]
speaker = "unk"
original = "驚き困惑した声を上げるエルゼ。"
translation = "놀라 당황한 목소리를 내는 엘제."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「やっ、あ、ああんっ……ここは、外ですのよ……！」"
translation = "「얏, 아, 아앙…… 여기는, 밖입니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「貸し切りで誰もいないとはいえ……あっ、んぅ……お外でこんなふしだらな行為に及ぶのは……」"
translation = "「전세라서 아무도 없다고는 해도…… 앗, 응으…… 밖에서 이런 음란한 행위를 하는 것은……」"

[[dialogue]]
speaker = "unk"
original = "分かっている。けれど一度火がついてしまった欲望は、到底抑えることが出来そうに無かった。"
translation = "알고 있다. 하지만 일단 불이 붙어버린 욕망은, 도저히 억누를 수 없을 것 같았다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、や、んんぅ……触り方が……やらしい……です……んんぅう……！」"
translation = "「앗, 야, 응으으…… 만지는 방식이…… 야합니다…… 응으으……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああんっ！\u3000あ……や……くすぐったい……肩、舐め……首筋も……ううん……ん、はぁっ……」"
translation = "「아앙! 아…… 야…… 간지러워…… 어깨, 핥…… 목덜미도…… 우웅…… 응, 하앗……」"

[[dialogue]]
speaker = "unk"
original = "エルゼに覆いかぶさるようにしながら、舌を尖らせて敏感な場所をチロチロとくすぐる。"
translation = "엘제를 덮치듯이 하면서, 혀를 뾰족하게 세워 민감한 곳을 낼름낼름 간지럽힌다."

[[dialogue]]
speaker = "unk"
original = "その攻撃から逃れようと身をよじらせるが、俺は逃がさないようにがっちりホールドする。"
translation = "그 공격에서 벗어나려 몸을 비틀지만, 나는 놓치지 않도록 단단히 붙잡는다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ、ん……やめ……放して、ください……会長、さま……ああぁ、んんっ……」"
translation = "「하아, 응…… 그만…… 놓아, 주십시오…… 회장, 님…… 아아앙, 응으윽……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そんなこと、されたら……私も……変な気分に、んんぅ……あ……あっ……ああんっ……！」"
translation = "「그런 짓, 당하면…… 저도…… 이상한 기분이, 응으으…… 아…… 앗…… 아앙……!」"

[[dialogue]]
speaker = "unk"
original = "色気を帯びた喘ぎを聞いていると、ペニスが辛抱出来ないほど熱く張り詰めてしまう。"
translation = "색기를 띤 신음을 듣고 있자니, 페니스가 참을 수 없을 만큼 뜨겁게 팽팽해진다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ、ん……な、何ですの……私のお股に……硬い感触が……」"
translation = "「앗, 응…… 뭐, 무엇입니까…… 저의 가랑이에…… 딱딱한 감촉이……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「っ……やっぱり……！\u3000これは……おち○ぽ様ですわ……いつの間に、押し当てていたんですの……？」"
translation = "「윽…… 역시……! 이것은…… 자지님이십니다…… 언제 사이에, 밀어붙이고 계셨습니까……?」"

[[dialogue]]
speaker = "unk"
original = "下半身に触れる感触に気が付いてエルゼが目をやると、そこでは露出した性器と性器が触れあっていた。"
translation = "하반신에 닿는 감촉을 깨닫고 엘제가 눈을 돌리자, 그곳에서는 노출된 성기와 성기가 서로 닿아 있었다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「やぁ、ん……おち○ぽ様ですわぁ……だめぇ……おち○ぽ様、押し付けないでくださいぃ……」"
translation = "「야아, 응…… 자지님이십니다아…… 안 돼요오…… 자지님, 밀어붙이지 말아주세요오……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あっ……！\u3000ああんっ……おち○ぽ様……おま○こスリスリしてるぅ……んんっ……」"
translation = "「앗……! 아앙…… 자지님…… 보지 비비고 있어으…… 응으윽……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「押し付けないでって言ってるのに……スリスリされたら……私、もっと変になってしまいます……んんっ、ああっ……！」"
translation = "「밀어붙이지 말라고 했는데…… 비벼지면…… 저, 더 이상해져 버립니다…… 응으윽, 아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「エルゼのここは……もっと変になりたいって言ってるみたいだけど」"
translation = "「엘제의 여기는…… 더 이상해지고 싶다고 말하는 것 같은데.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「んあっ、あ、んぅううっ……！」"
translation = "「응앗, 아, 응으으으윽……!」"

[[dialogue]]
speaker = "unk"
original = "包皮にくるまれていた、エルゼのクリトリスをむき出しにする。"
translation = "포피에 싸여 있던, 엘제의 클리토리스를 노출시킨다."

[[dialogue]]
speaker = "unk"
original = "その可愛らしい突起は赤く充血し、コリコリと固くなっていていた。"
translation = "그 귀여운 돌기는 붉게 충혈되어, 오독오독 단단해져 있었다."

[[dialogue]]
speaker = "クロト"
original = "「すごく固くなってる」"
translation = "「엄청 단단해졌네.」"

[[dialogue]]
speaker = "unk"
original = "クリトリスと重点的に擦れるようにペニスを動かすと、エルゼはビクビクと身体を震わせて反応する。"
translation = "클리토리스와 중점적으로 비벼지도록 페니스를 움직이자, 엘제는 움찔움찔 몸을 떨며 반응한다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああっ、あっ、そこ、敏感なのぉ……や、あああっ、んん……あ、あああっ……！」"
translation = "「아앗, 앗, 거기, 민감해요오…… 야, 아아앗, 응으으…… 아, 아아앗……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「おち○ぽ様が……んんっ、私の敏感なとこ……いじめてますっ……あっ、んっ、や、あ、あああっ……！」"
translation = "「자지님이…… 응으윽, 저의 민감한 곳…… 괴롭히고 있어요윽…… 앗, 응윽, 야, 아, 아아앗……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ダメですのぉ……そこ、いじめられたら……ああっ……私、すぐに反応しちゃって……あ、あ、んんっ、あ、あああっ……！」"
translation = "「안 됩니다아…… 거기, 괴롭힘당하면…… 아앗…… 저, 바로 반응해 버려서…… 아, 아, 응으윽, 아, 아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "気が付けばエルゼの内側からしみ出した瑞々しい愛液が、ペニスに塗りたくられている。"
translation = "정신을 차려 보니 엘제의 안쪽에서 스며 나온 싱그러운 애액이, 페니스에 잔뜩 묻어 있다."

[[dialogue]]
speaker = "unk"
original = "その濡れようが、エルゼの昂りを示していた。"
translation = "그 젖은 정도가, 엘제의 흥분을 나타내고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「もう、すぐにでも挿れて欲しい感じだね？」"
translation = "「이제, 당장이라도 넣어줬으면 하는 느낌이네?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「うぅう……いけませんわ、そんなの……こんな場所で、してしまうなんて……お変態ですわ……良くないことですわ……」"
translation = "「으으으…… 안 됩니다, 그런 건…… 이런 장소에서, 해 버리다니…… 변태이십니다…… 좋지 않은 일입니다……」"

[[dialogue]]
speaker = "クロト"
original = "「でも、したくないとは言わないんだ……」"
translation = "「하지만, 하고 싶지 않다고는 말하지 않네……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ、う……それは……だって……あぁう……」"
translation = "「하아, 우…… 그것은…… 왜냐하면…… 아아우……」"

[[dialogue]]
speaker = "unk"
original = "エルゼは真っ赤になって何も言えなくなってしまう。"
translation = "엘제는 새빨개져서 아무 말도 할 수 없게 된다."

[[dialogue]]
speaker = "unk"
original = "その反応を見て、俺はクリトリスに擦りあてていたペニスの先端を、エルゼの膣口へとスライドさせた。"
translation = "그 반응을 보고, 나는 클리토리스에 비비고 있던 페니스의 끝을, 엘제의 질 입구로 미끄러뜨렸다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ひぁうううっ！！！！」"
translation = "「햐아아아앗!!!!」"

[[dialogue]]
speaker = "unk"
original = "エルゼの膣奥深くまで、いっきにペニスが潜り込む。"
translation = "엘제의 질 깊숙한 곳까지, 단숨에 페니스가 파고든다."

[[dialogue]]
speaker = "unk"
original = "愛液まみれの膣は、簡単に俺のものを全部呑み込んでしまった。"
translation = "애액 범벅이 된 질은, 쉽게 나의 것을 전부 삼켜 버렸다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ、ぅ……ああぁ……入っちゃいましたわ……奥まで……会長様の太いの……ずっぷりって……」"
translation = "「하아, 으…… 아아아…… 들어가 버렸습니다…… 안쪽까지…… 회장님의 두꺼운 것이…… 푹 하고……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「いけないって言ったのに……会長様が……んんぅ……」"
translation = "「안 된다고 했는데…… 회장님이…… 응으으……」"

[[dialogue]]
speaker = "unk"
original = "繋がり合った部分を見つめながら、震える声で訴えかけるエルゼ。"
translation = "연결된 부분을 바라보며, 떨리는 목소리로 호소하는 엘제."

[[dialogue]]
speaker = "unk"
original = "だが、以前のような抵抗は見せず、ただ身を固くして次の俺の挙動に備えている。"
translation = "하지만, 이전과 같은 저항은 보이지 않고, 그저 몸을 굳히고 다음 나의 움직임에 대비하고 있다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「っつ……！\u3000あ、ああっ、あっ……あっ、あ……あっ、あ、ああんっ……！」"
translation = "「윽쓰……! 아, 아앗, 앗…… 앗, 아…… 앗, 아, 아앙……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「おち○ぽ様……私の身体の真ん中を……刺したり抜けたり……あっ、んんっ、あ、あああっ……<emoji=heart04>」"
translation = "「자지님…… 저의 몸의 한가운데를…… 찔렀다 빠졌다…… 앗, 응으윽, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゆっくり動き始めたピストンに身を任せたまま、結合部に呆けたような視線を注いでいる。"
translation = "천천히 움직이기 시작한 피스톤에 몸을 맡긴 채, 결합부에 넋이 나간 듯한 시선을 쏟고 있다."

[[dialogue]]
speaker = "unk"
original = "大きく足を開いたこの体位なら、自分がどんなふうに生殖されているのか、はっきりと見て取ることが出来る。"
translation = "크게 다리를 벌린 이 체위라면, 자신이 어떤 식으로 생식되고 있는지, 확실하게 눈으로 확인할 수 있다."

[[dialogue]]
speaker = "unk"
original = "これが俺たちのセックスだと見せつけるように、ゆっくりと、ねちっこく、膣への抜き差しを繰り返した。"
translation = "이것이 우리들의 섹스라고 과시하듯이, 천천히, 끈적하게, 질에 넣었다 빼기를 반복했다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ、はぁっ……いやらしい動き……してますっ……ん、んぅ……<emoji=heart04>」"
translation = "「하아, 하앗…… 야한 움직임…… 하고 있습니다앗…… 응, 응으으……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「抵抗していた割には、いつも以上に感じてるな」"
translation = "「저항했던 것치고는, 평소보다 더 느끼고 있네」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そう、なんですのっ<emoji=heart04>\u3000会長様の、ズボズボが……いつも以上に気持ちいいんですのっ<emoji=heart04>」"
translation = "「그렇, 습니다아앗<emoji=heart04> 회장님의, 푹푹이…… 평소보다 더 기분 좋습니다아앗<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様とするたびに……あっ、ああっ……身体が覚えていってしまっているのですわ……<emoji=heart04>\u3000ん、ああっ……<emoji=heart04>」"
translation = "「회장님과 할 때마다…… 앗, 아앗…… 몸이 기억해 버리고 있는 것입니다아……<emoji=heart04> 응, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ、う……んんっ……<emoji=heart04>\u3000わ、私……とうとうお外でも乱れてしまう……お変態にされてしまったのですわっ……<emoji=heart04>」"
translation = "「하아, 으…… 응으윽……<emoji=heart04> 저, 저…… 결국 바깥에서도 흐트러져 버리는…… 변태로 만들어져 버린 것입니다아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自身が変態であることを言い聞かせるように、エルゼは喘ぎ続けている。"
translation = "자신이 변태임을 되뇌이듯이, 엘제는 계속해서 신음한다."

[[dialogue]]
speaker = "unk"
original = "その堕落を促すようにピストンを繰り返した。"
translation = "그 타락을 부추기듯이 피스톤을 반복했다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はあっ、あっ、ああ、んんっ……あっ、あ、あああっ……！\u3000あ、あああっ、あ、ああっ……！」"
translation = "「하앗, 앗, 아아, 응으윽…… 앗, 아, 아아앗……! 아, 아아앗, 아, 아앗……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「おち○ぽ様、気持ちいい……んんっ、あ、ああっ……おち○ぽ様が私を気持ちよくしてくれますのっ……！」"
translation = "「자지님, 기분 좋아…… 응으윽, 아, 아앗…… 자지님이 저를 기분 좋게 해 주십니다아앗……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私のおま○こをいじめて、すごくすごく気持ちよくしてくれてますのっ！！！」"
translation = "「저의 보지를 괴롭혀서, 무척 무척 기분 좋게 해 주고 있습니다아앗!!!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああっ、あ……はあっ……私……気付いてしまいましたわ……んんっ……<emoji=heart04>」"
translation = "「아앗, 아…… 하앗…… 저…… 깨달아 버렸습니다아…… 응으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「恥ずかしい言葉を叫ぶほど、感じてしまいますの……気持ちよくなりたくて、おち○ぽ様って言っちゃいますのっ……！」"
translation = "「부끄러운 말을 외칠수록, 느껴 버립니다아…… 기분 좋아지고 싶어서, 자지님이라고 말해 버립니다아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「いいよ、思うままに叫べば」"
translation = "「좋아, 생각하는 대로 외쳐」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああっ、あっ、んんっ、もっと、もっとぉ……おち○ぽ様をくださいっ……！」"
translation = "「아앗, 앗, 응으윽, 더, 더어…… 자지님을 주세요오앗……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私のおま○こ、壊れるくらいに……おち○ぽ様で貫いてくださいっ！！」"
translation = "「저의 보지, 부서질 정도로…… 자지님으로 꿰뚫어 주세요오앗!!」"

[[dialogue]]
speaker = "unk"
original = "エルゼのいやらしい叫びと共に、ペニスを包んでいる膣が強く締め付けてくる。"
translation = "엘제의 야한 외침과 함께, 페니스를 감싸고 있는 질이 강하게 조여 온다."

[[dialogue]]
speaker = "クロト"
original = "「エルゼ……もっと激しくするよ……」"
translation = "「엘제…… 더 격렬하게 할게……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「は、はいっ……んんっ、おねがい、しますっ<emoji=heart04>\u3000……もっと、激しくしてくださいっ……会長様ぁっ<emoji=heart04>」"
translation = "「하, 하이잇…… 응으윽, 부탁, 드립니다앗<emoji=heart04> ……더, 격렬하게 해 주세요오앗…… 회장니임앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エルゼの求めに応じて、俺はピストンを速める。"
translation = "엘제의 요구에 응하여, 나는 피스톤을 빠르게 한다."

[[dialogue]]
speaker = "unk"
original = "激しく、水音が響き渡るように。可愛らしいお腹を内側から抉るように。"
translation = "격렬하게, 물소리가 울려 퍼지도록. 귀여운 배를 안쪽에서 도려내듯이."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああっ、あっ、あ、あ、あっ<emoji=heart04>\u3000や、あ、あああっ、ん、あ、あああっ……<emoji=heart04>」"
translation = "「아앗, 앗, 아, 아, 앗<emoji=heart04> 야, 아, 아아앗, 응, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ、ぅ、あ、んんっ……あっ、あ、ああっ、や、あ、あああっ……<emoji=heart04>」"
translation = "「하아, 으, 아, 응으윽…… 앗, 아, 아앗, 야, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「恥ずかしいこと、してるのに<emoji=heart04>\u3000お変態、なのにっ<emoji=heart04>\u3000気持ちいいの、止められませんのっ<emoji=heart04>」"
translation = "「부끄러운 짓, 하고 있는데<emoji=heart04> 변태, 인데도오앗<emoji=heart04> 기분 좋은 거, 멈출 수 없습니다아앗<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああっ、あっ、あ……おち○ぽ様……私の中の弱いとこ……ズンズン突いてっ……んっ、あっ、ああぁあっ……！！」"
translation = "「아앗, 앗, 아…… 자지님…… 제 안의 약한 곳…… 쿵쿵 찔러서앗…… 응윽, 앗, 아아아앗……!!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「こんなのっ、ダメになりますわっ<emoji=heart04>\u3000おち○ぽ様に、ダメにされてしまいますわっ<emoji=heart04>\u3000あっ、あ、ああっ、あ、あ、ああああっ！！」"
translation = "「이런 거엇, 망가지게 됩니다아앗<emoji=heart04> 자지님에게, 망가져 버립니다아앗<emoji=heart04> 앗, 아, 아앗, 아, 아, 아아아앗!!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「気持ちいいのっ！\u3000いけないこと、気持ちいいのっ！\u3000もっと、してっ、もっともっと、してください、会長様ぁ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋은 거엇! 나쁜 짓, 기분 좋은 거엇! 더, 해 줘엇, 더 더, 해 주세요, 회장니임아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁が射精を促すように、淫靡な動きを繰り返す。"
translation = "질벽이 사정을 재촉하듯이, 음란한 움직임을 반복한다."

[[dialogue]]
speaker = "unk"
original = "摩擦と吸引によって生まれる快感に、俺も無心で身体を揺さぶり動かす。"
translation = "마찰과 흡입에 의해 생기는 쾌감에, 나도 무념무상으로 몸을 흔들어 움직인다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああっ、あっ、あ、あああっ……や、あ、あああっ……<emoji=heart04><emoji=heart04>\u3000あ、んんっ、ん、あ、あああっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앗, 앗, 아, 아아앗…… 야, 아, 아아앗……<emoji=heart04><emoji=heart04> 아, 응으윽, 응, 아, 아아앗……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「んぅうううっ、そこ、だめぇっ……！\u3000ぐりぐりされると、変な感じになっちゃうのぉっ<emoji=heart04><emoji=heart04>」"
translation = "「응으으으윽, 거기, 안 돼애앳……! 비벼지면, 이상한 느낌이 되어 버려어앳<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先端が押している場所は、俺も今まで知らなかった場所だ。"
translation = "끝이 누르고 있는 장소는, 나도 지금까지 몰랐던 장소다."

[[dialogue]]
speaker = "unk"
original = "新たに見つけた、エルゼの感じる場所を集中的に攻めながら、俺も徐々に絶頂に向かって上りつめていく。"
translation = "새롭게 발견한, 엘제가 느끼는 장소를 집중적으로 공략하면서, 나도 서서히 절정을 향해 치솟아 오른다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「やあっ、あっ、あ、んんっ、あ、ああぁあっ……！\u3000だめぇ、だめ、だめ、だめぇ……そこだめぇ……！！」"
translation = "「야앗, 앗, 아, 응으윽, 아, 아아아앗……! 안 돼애, 안 돼, 안 돼, 안 돼애…… 거기 안 돼애앳……!!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そんなとこ、ずっとゴリゴリされたらっ！\u3000私、おかしくなっちゃうっ！\u3000絶対我慢できないですわぁっ……！！！」"
translation = "「그런 곳, 계속 문질러지면앗! 저, 이상해져 버려엇! 절대 참을 수 없습니다아앗……!!!」"

[[dialogue]]
speaker = "unk"
original = "そんな事を言われたら、徹底的にその部分を刺激して、エルゼを壊してしまいたくなる。"
translation = "그런 말을 들으면, 철저하게 그 부분을 자극하여, 엘제를 망가뜨려 버리고 싶어진다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ああぁあっ、わ、わかるっ……んんっ……すごいの、くるっ……ああぁあっ、だめっ、あ、あああぅううっ！」"
translation = "「아아아앗, 아, 알겠어엇…… 응으윽…… 대단한 거, 온다앗…… 아아아앗, 안 돼엣, 아, 아아아으으윽!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長、様っ……んんんっ、私、もう、もうっ……ダメ……すごいの……込み上げて来てて……あっ、あ、んんぁああっ……！！」"
translation = "「회장, 니임앗…… 응으으윽, 저, 이제, 이제엣…… 안 돼…… 대단한 게…… 치밀어 오르고 있어서…… 앗, 아, 응으아아앗……!!」"

[[dialogue]]
speaker = "クロト"
original = "「そのまま、最後まで……気持ちよくなって……」"
translation = "「이대로, 끝까지…… 기분 좋아져……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「んんんっ、ぁ……あぁあ……わかり、ましたわ……」"
translation = "「응으으윽, 아…… 아아아…… 알겠, 습니다아……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様っ<emoji=heart04>\u3000連れて行ってくださいませっ<emoji=heart04>\u3000私を、最後までっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ、ああっ<emoji=heart04>\u3000あ、あああっ、や、あ、あああっ<emoji=heart04>」"
translation = "「회장니임앗<emoji=heart04> 데려가 주세요오앗<emoji=heart04> 저를, 끝까지잇<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아, 아앗<emoji=heart04> 아, 아아앗, 야, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ、あああっ……んんっ、あっ……！\u3000あ、ああっ！\u3000あっ、ぁ、ぁあぁ、っ、んんぅ……あぁぁ、あっ、や、あ、ああああ……！」"
translation = "「아, 아아앗…… 응으윽, 앗……! 아, 아앗! 앗, 아, 아아아, 윽, 응으으…… 아아아, 앗, 야, 아, 아아아아……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ふぁ、あぁあああああああああああ～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화, 아아아아아아아아아아앙~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「イグッ！\u3000んんっ、あぁああっ！！！\u3000あ、んんぅううっ！！！！\u3000イグッ、イッでるゥっっっ！！！！！」"
translation = "「이크윽! 응으윽, 아아아앗!!! 아, 응으으으윽!!!! 이크윽, 나, 나온다아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "絶頂叫びと共に、エルゼの膣内で弾けるように精液をぶちまける。"
translation = "절정의 외침과 함께, 엘제의 질 안에서 터지듯이 정액을 쏟아낸다."

[[dialogue]]
speaker = "unk"
original = "同時にエルゼの身体が激しく痙攣し、大量の液体が花びらの内から吐き出された。"
translation = "동시에 엘제의 몸이 격렬하게 경련하고, 대량의 액체가 꽃잎 안에서 토해져 나왔다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ゛ぅうううっ！！\u3000出ちゃうっ！\u3000あっ、あ、ああぁああっ！！！」"
translation = "「아으으으윽!! 나와 버려엇! 앗, 아, 아아아아앗!!!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「おしっこ、ですのぉっ！！\u3000んんぅううっ！！\u3000私っ、おち○ぽ様にイカされてっ、お漏らししちゃってますのぉっ！！」"
translation = "「오줌, 입니다아앗!! 응으으으윽!! 저엇, 자지님에게 절정해서엇, 오줌 싸 버리고 있습니다아앗!!」"

[[dialogue]]
speaker = "unk"
original = "絶え間なく吐き出される聖水を浴びながら、欲望の限りをエルゼの中に吐き出していく。"
translation = "끊임없이 토해져 나오는 성수를 맞으면서, 욕망의 한계를 엘제 안에 토해낸다."

[[dialogue]]
speaker = "unk"
original = "全てを出し尽くして、エルゼの膣内からペニスを引き抜いた。"
translation = "모든 것을 다 쏟아내고, 엘제의 질 안에서 페니스를 뽑아냈다."

[[dialogue]]
speaker = "unk"
original = "収まりきらなかった精液が膣口からあふれ出し、ビーチチェアに出来上がった温かい水たまりの上にトロリと流れた。"
translation = "다 담기지 못한 정액이 질 입구에서 흘러넘쳐, 비치 체어에 만들어진 따뜻한 물웅덩이 위로 주르륵 흘렀다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ、ぅうう……会長様……私……んぅう……」"
translation = "「하아, 으으으…… 회장님…… 저…… 응으으……」"

[[dialogue]]
speaker = "unk"
original = "未だ快感の余韻に身体を震わせながら、苦しそうな吐息交じりに呟く。"
translation = "아직 쾌감의 여운에 몸을 떨면서, 괴로운 한숨 섞인 채 중얼거린다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「で、出ちゃ……ました……おしっこ……」"
translation = "「나, 나와 버렸……습니다…… 오줌……」"

[[dialogue]]
speaker = "クロト"
original = "「でも、お漏らししちゃうくらい気持ちよかったんだよね……」"
translation = "「하지만, 오줌을 싸 버릴 정도로 기분 좋았던 거지……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そうですわ……」"
translation = "「그렇습니다아……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「じわじわ何かがこみ上げてきていて……最後の瞬間に何かがはじけたようになって……」"
translation = "「서서히 무언가가 치밀어 오르고 있어서…… 마지막 순간에 무언가가 터진 것처럼 되어서……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「気が付いたら、もう……お漏らししていましたわ……」"
translation = "「정신을 차려 보니, 이미…… 오줌을 싸고 있었습니다아……」"

[[dialogue]]
speaker = "クロト"
original = "「そんなに気持ちよくなれたんだ……」"
translation = "「그렇게 기분 좋아질 수 있었다니……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぅ……またあなたに……お変態な快感を、植え付けられてしまいましたの……」"
translation = "「하으…… 또 당신에게…… 변태적인 쾌감을, 심어져 버렸습니다아……」"

[[dialogue]]
speaker = "クロト"
original = "「俺はまた、エルゼが感じすぎてお漏らしするところ、見たいな」"
translation = "「나는 또, 엘제가 너무 느껴서 오줌 싸는 모습, 보고 싶네」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「やめてくださいませ、もうっ……」"
translation = "「그만해 주세요오, 정말이지잇……」"

[[dialogue]]
speaker = "unk"
original = "頬を膨らませるエルゼだったが、その表情はむしろ清々しいものの様に思えたのだった。"
translation = "볼을 부풀리는 엘제였지만, 그 표정은 오히려 후련한 것 같이 느껴졌던 것이다."

