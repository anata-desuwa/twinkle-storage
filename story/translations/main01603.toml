[[dialogue]]
speaker = "unk"
original = "第４話,パーフェクト・ワールド,B"
translation = "제4화, 퍼펙트 월드, B"

[[dialogue]]
speaker = "アポロ"
original = "「ぐっ──」"
translation = "「크윽──」"

[[dialogue]]
speaker = "ソフィア"
original = "「いけます──！」"
translation = "「할 수 있어요──!」"

[[dialogue]]
speaker = "unk"
original = "度重なる俺たちの猛撃によって、アポロはすでに飛行能力を失いつつあった。"
translation = "거듭되는 우리들의 맹공격에 의해, 아폴로는 이미 비행 능력을 잃어가고 있었다."

[[dialogue]]
speaker = "unk"
original = "腕への痛打によって大剣を握るのも難しくなり、傷を負った両脚では攻撃の回避もままならない。"
translation = "팔에 입은 통타 때문에 대검을 쥐는 것도 어려워졌고, 상처 입은 양다리로는 공격 회피도 제대로 되지 않는다."

[[dialogue]]
speaker = "アナ"
original = "「今です、会長。アポロの動きが鈍っているうちに──！」"
translation = "「지금입니다, 회장. 아폴로의 움직임이 둔해진 틈을 타서──!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ──逃げ場は塞がせてもらう！」"
translation = "「아아── 도망칠 곳은 막아주마!」"

[[dialogue]]
speaker = "unk"
original = "フロンティアドライブ──三種の可能性を束ねた三重の連撃を見舞う。"
translation = "프론티어 드라이브── 세 가지 가능성을 묶은 삼중의 연격을 날린다."

[[dialogue]]
speaker = "unk"
original = "逃げ場なき追撃の連鎖を浴びて──アポロは、力尽きてその場に倒れた。"
translation = "도망칠 곳 없는 추격의 연쇄를 맞고── 아폴로는, 힘이 다해 그 자리에 쓰러졌다."

[[dialogue]]
speaker = "フィオナ"
original = "「──ふぅ、ふぅ……今度こそ邪魔は入れさせません」"
translation = "「──후우, 후우…… 이번에야말로 방해는 못 하게 할 거예요」"

[[dialogue]]
speaker = "アポロ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "アポロへ歩み寄っていくフィオナ──だが。"
translation = "아폴로에게 다가가는 피오나── 하지만."

[[dialogue]]
speaker = "アポロ"
original = "「………………ない」"
translation = "「………………안 돼」"

[[dialogue]]
speaker = "フィオナ"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "膝をついたアポロは、呪詛のようにくぐもった声を漏らして、立ち上がる。"
translation = "무릎을 꿇었던 아폴로는, 저주처럼 웅얼거리는 목소리를 흘리며, 일어선다."

[[dialogue]]
speaker = "アポロ"
original = "「そうだ……あたしが……ヒーローが負けていいはず、ない」"
translation = "「그래…… 내가…… 히어로가 져도 될 리가, 없어」"

[[dialogue]]
speaker = "アポロ"
original = "「強くなるんだ……もっと……もっと……」"
translation = "「강해지는 거야…… 더…… 더……」"

[[dialogue]]
speaker = "ユウリ"
original = "「っ、な……！？」"
translation = "「읏, 뭐……!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「傷が治って──あれは、再生──？」"
translation = "「상처가 낫고── 저건, 재생──?」"

[[dialogue]]
speaker = "アナ"
original = "「いえ──少し違う、ような──」"
translation = "「아뇨── 조금 다른, 듯한──」"

[[dialogue]]
speaker = "unk"
original = "前回の仮面のように修復が発動したのかと思った。だが、違う。"
translation = "지난번 가면처럼 수복이 발동한 것인가 생각했다. 하지만, 다르다."

[[dialogue]]
speaker = "アポロ"
original = "「くくっ……ふふっ……はははははっ…………！」"
translation = "「크큭…… 후훗…… 하하하하핫…………!」"

[[dialogue]]
speaker = "クロト"
original = "「あれは──ただ治しているんじゃない……より強い部位に変化している……！」"
translation = "「저건── 그저 치료하는 게 아니야…… 더 강한 부위로 변화하고 있어……!」"

[[dialogue]]
speaker = "unk"
original = "青く腫れていた腕部はより強靭なアーマーをまとった。"
translation = "푸르게 부어올랐던 팔 부분은 더욱 강인한 갑옷을 둘렀다."

[[dialogue]]
speaker = "unk"
original = "傷を負っていた両脚はそのすべてを治癒した上でオーラが集約された。"
translation = "상처를 입었던 양다리는 그 모든 것을 치유한 후에 오라가 집약되었다."

[[dialogue]]
speaker = "unk"
original = "折れた骨がより強まるように。朽ちた都がより隆盛を極めるように。"
translation = "부러진 뼈가 더욱 강해지듯이. 썩어 문드러진 도시가 더욱 융성해지듯이."

[[dialogue]]
speaker = "unk"
original = "滅んではより強く創り変える──それは<ruby>再創生<rt>リクリエイション</rt></ruby>の絶対真理。"
translation = "멸망하고는 더욱 강하게 다시 만들어낸다── 그것은 <ruby>재창생<rt>리크리에이션</rt></ruby>의 절대 진리."

[[dialogue]]
speaker = "アポロ"
original = "「──ふぅ。いい気分だ」"
translation = "「──후우. 기분 좋군」"

[[dialogue]]
speaker = "ユウリ"
original = "「嘘だろ……」"
translation = "「거짓말이지……」"

[[dialogue]]
speaker = "セーラ"
original = "「倒してもより強くなる……ふうん……反則じゃんね」"
translation = "「쓰러뜨려도 더 강해진다니…… 흐음…… 반칙이잖아」"

[[dialogue]]
speaker = "unk"
original = "治るのは仮面だけではなかった。"
translation = "낫는 것은 가면만이 아니었다."

[[dialogue]]
speaker = "unk"
original = "新たに再誕したアポロは──つい今まで対峙していた彼女よりも明らかに強大になっていた。"
translation = "새롭게 재탄생한 아폴로는── 방금 전까지 대치하고 있던 그녀보다도 확연히 강대해져 있었다."

[[dialogue]]
speaker = "サーシャ"
original = "「不死身どころか……やればやるだけ不利になる、って……？」"
translation = "「불사신 정도가 아니라…… 하면 할수록 불리해진다, 는 거야……?」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエ達が相手にしているのは、こういうものなんだ。首が欠けた程度で潰える、矮小な存在ごときが歯向かっていい存在じゃない」"
translation = "「너희들이 상대하고 있는 것은, 이런 것이다. 목이 잘리는 정도로 끝날, 왜소한 존재 따위가 감히 덤벼도 될 존재가 아니야」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長──」"
translation = "「히노미야 회장──」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……打つ手を変える必要がある」"
translation = "「아아…… 방법을 바꿀 필요가 있어」"

[[dialogue]]
speaker = "unk"
original = "仮面を剥がすだけに全力を注ぐ。"
translation = "가면을 벗기는 것에만 전력을 쏟는다."

[[dialogue]]
speaker = "unk"
original = "そのつもりでやって来たが、こうなると弱らせることさえ悪手になってしまう。"
translation = "그럴 생각으로 왔지만, 이렇게 되면 약하게 만드는 것조차 악수가 되어버린다."

[[dialogue]]
speaker = "アポロ"
original = "「そうだ……いい機会だ。これから世界がどうなるのか、ひと足先に見せてやろう」"
translation = "「그래…… 좋은 기회다. 이제부터 세계가 어떻게 될지, 한 발 먼저 보여주지」"

[[dialogue]]
speaker = "マトイ"
original = "「どういうこと──？」"
translation = "「무슨 말이야──?」"

[[dialogue]]
speaker = "unk"
original = "アポロは、ゆっくりと背をひるがえして、眼下の街並みを見下ろした。"
translation = "아폴로는, 천천히 등을 돌려, 눈 아래의 시가지를 내려다보았다."

[[dialogue]]
speaker = "unk"
original = "そして。"
translation = "그리고."

[[dialogue]]
speaker = "アポロ"
original = "「──リ・クリエ」"
translation = "「──리크리에」"

[[dialogue]]
speaker = "unk"
original = "アポロは<ruby>咒<rt>しゅ</rt></ruby>を唱えた。"
translation = "아폴로는 주를 외웠다."

[[dialogue]]
speaker = "unk"
original = "どよん──奇っ怪な音と共に、おぞましい色の『波』が下界に広がっていく……。"
translation = "두웅── 기괴한 소리와 함께, 끔찍한 색의 『파도』가 하계로 퍼져나간다……."

[[dialogue]]
speaker = "逃げ惑う市民Ａ"
original = "「う──うわあ！？\u3000急にアステラが降ってきたぞ──！」"
translation = "「으──으아아!? 갑자기 아스테라가 쏟아져 내린다──!」"

[[dialogue]]
speaker = "逃げ惑う市民Ｂ"
original = "「じ、神社とモンスターが合体して……！？\u3000誰か助けて──！」"
translation = "「저, 신사와 몬스터가 합체해서……!? 누가 좀 도와줘──!」"

[[dialogue]]
speaker = "モンスター"
original = "「ウググ……ウガルルル……グオオオオオン──！」"
translation = "「우그그…… 우가르르르…… 구오오오오온──!」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「倒したはずのモンスターとモンスターがくっついて復活だと？」"
translation = "「쓰러뜨렸을 터인 몬스터와 몬스터가 합쳐져서 부활이라고?」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「どういうことだ──何が起きている……！？」"
translation = "「무슨 일이야── 무슨 일이 벌어지고 있는 거지……!?」"

[[dialogue]]
speaker = "キリカ"
original = "「参りましたね。あちらでは──西広場と南広場とが、異次元を通じて連結していました」"
translation = "「큰일 났군요. 저쪽에서는── 서쪽 광장과 남쪽 광장이, 이차원을 통해 연결되어 있었습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「どうやら……現在進行形で、空間の再構成が行われているもようです」"
translation = "「아무래도…… 현재 진행형으로, 공간의 재구성이 이루어지고 있는 모양입니다」"

[[dialogue]]
speaker = "モンスター"
original = "「シュルルルル……シュルルル……グバァァッ！！」"
translation = "「슈르르르르…… 슈르르르…… 그바아앗!!」"

[[dialogue]]
speaker = "逃げ惑う市民Ｃ"
original = "「やっ、やめろ──こっちに来るな！\u3000おい星騎士、どうすりゃいいんだあっ！？」"
translation = "「야, 멈춰── 이쪽으로 오지 마! 이 성기사 녀석들아, 어떻게 해야 하는 거냐고!」"

[[dialogue]]
speaker = "エリス"
original = "「──市民の皆さん！\u3000落ち着いて！\u3000星騎士の誘導に従って、駅の地下へ避難してください──！」"
translation = "「──시민 여러분! 진정하세요! 성기사의 유도에 따라, 역 지하로 대피해 주세요──!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ダメよ、エリスさん！\u3000駅自体が──巨大な砂場へ変形してしまっているわ……！」"
translation = "「안 돼요, 에리스 씨! 역 자체가── 거대한 모래밭으로 변형되어 버렸어요……!」"

[[dialogue]]
speaker = "エリス"
original = "「！？\u3000そんなことって──」"
translation = "「!? 그럴 수가──」"

[[dialogue]]
speaker = "逃げ惑う市民Ｃ"
original = "「逃げ道すら確保できないのか？\u3000ええい、この無能どもめ」"
translation = "「도망갈 길조차 확보하지 못하는 건가? 에잇, 이 무능한 녀석들」"

[[dialogue]]
speaker = "逃げ惑う市民Ｃ"
original = "「もう星騎士なんぞ信用してられるか！\u3000俺は勝手に逃げさせてもらうぞ！」"
translation = "「이제 성기사 따위는 믿을 수 없어! 나는 멋대로 도망치겠다!」"

[[dialogue]]
speaker = "エリス"
original = "「あっ、待ってください──！」"
translation = "「앗, 기다려 주세요──!」"

[[dialogue]]
speaker = "モンスター"
original = "「ジュルル……グバァァッ！\u3000がつ、がつがつ！」"
translation = "「주르르…… 그바아앗! 캇, 캇캇캇!」"

[[dialogue]]
speaker = "逃げ惑う市民Ｃ"
original = "「うああああああっっ────！\u3000や──やめ──が……ぐっ……ぉぉぉぉっ…………！」"
translation = "「우아아아아앗────! 그── 그만── 크…… 큭…… 으으으으윽…………!」"

[[dialogue]]
speaker = "エリス"
original = "「ッ──いけない。今、助けますから……！」"
translation = "「윽── 안 돼. 지금, 도와드릴게요……!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「待って、様子がおかしい──」"
translation = "「기다려요, 상태가 이상해요──」"

[[dialogue]]
speaker = "モンスター"
original = "「クオオ……クカカ！\u3000シュルッ、シュルルルル！\u3000ゲバ、ゲババババァッ──！」"
translation = "「크오오…… 크카카! 슈르, 슈르르르르! 게바, 게바바바바앗──!」"

[[dialogue]]
speaker = "エリス"
original = "「ひっ……！？\u3000が──合体した……！？」"
translation = "「힉……!? 하── 합체했다……!?」"

[[dialogue]]
speaker = "ギエル"
original = "「くくく──あはは！\u3000無駄ですよ星騎士の皆様！\u3000助けようだなんておこがましい」"
translation = "「크크크── 아하하! 소용없습니다, 성기사 여러분! 구하려고 하다니 주제넘군요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「っ！\u3000だ、誰──！？」"
translation = "「윽! 누, 누구야──!?」"

[[dialogue]]
speaker = "ギエル"
original = "「名乗るほどの者ではございません。ただ、アポロ様より地上の『査察』を仰せつかりましてねぇ」"
translation = "「이름을 댈 만한 자는 아닙니다. 다만, 아폴로 님께서 지상의 『사찰』을 명하셔서 말이죠」"

[[dialogue]]
speaker = "ギエル"
original = "「今、人間界に起きているのは余波などではない真の<ruby>再創生<rt>リクリエイション</rt></ruby>。ゆえにその対象は完全なる無差別」"
translation = "「지금, 인간계에 일어나고 있는 것은 여파 따위가 아닌 진정한 <ruby>재창생<rt>리크리에이션</rt></ruby>. 그러니 그 대상은 완전한 무차별」"

[[dialogue]]
speaker = "ギエル"
original = "「愉快な生物たちがみるみる生まれていますねぇ。まるで神話の世界だ」"
translation = "「유쾌한 생물들이 눈 깜짝할 사이에 태어나고 있군요. 마치 신화의 세계 같습니다」"

[[dialogue]]
speaker = "ギエル"
original = "「ああ……世界が壊れ、再び芽吹いていく瞬間！\u3000これが見たかったのです──実に心地よい！\u3000アポロ様に栄光あれ！」"
translation = "「아아…… 세계가 부서지고, 다시 싹트는 순간! 이것을 보고 싶었습니다── 정말 기분 좋군요! 아폴로 님께 영광 있으라!」"

[[dialogue]]
speaker = "エリス"
original = "「く……なんてこと……！」"
translation = "「크…… 이게 무슨……!」"

[[dialogue]]
speaker = "unk"
original = "街の一部が──人々が──子どもの工作みたいに壊され、創り変えられていく。"
translation = "거리의 일부가── 사람들이── 아이의 공작물처럼 부서지고, 새로 만들어져 간다."

[[dialogue]]
speaker = "unk"
original = "建造物もモンスターも一切の区別なく、巻き込まれたものは大幅な改造を遂げられていた。"
translation = "건조물도 몬스터도 일절 구별 없이, 휘말린 것들은 대폭적인 개조를 이루고 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……何よあれ！」"
translation = "「윽…… 뭐야 저거!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「街がめちゃくちゃニャン……！\u3000き、気味が悪すぎるニャンよ……！」"
translation = "「도시가 엉망진창이냥……! 기, 기분 나쁘기 짝이 없냥!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、悪趣味極まりない──これがリクリエだっていうのか」"
translation = "「아아, 악취미 극에 달했군── 이게 리크리에라는 거냐」"

[[dialogue]]
speaker = "アポロ"
original = "「そうだ。これが、今から三界すべてを巻き込んで起こる」"
translation = "「그렇다. 이것이, 이제부터 삼계 모두를 휘말려 일어날 것이다」"

[[dialogue]]
speaker = "アポロ"
original = "「モンスター、アステライト。これらは世界のエラーなんだ。それをごちゃ混ぜにして本来あるべき世界へ創り変える」"
translation = "「몬스터, 아스테라이트. 이것들은 세계의 에러다. 그것들을 뒤죽박죽 섞어 본래 있어야 할 세계로 재창조하는 것」"

[[dialogue]]
speaker = "アポロ"
original = "「これは正しいことだ」"
translation = "「이것은 올바른 일이다」"

[[dialogue]]
speaker = "アポロ"
original = "「この、未完成な世界を修復して、新たな秩序を生み出す正義の行為なんだ」"
translation = "「이, 미완성인 세계를 수복하고, 새로운 질서를 낳는 정의로운 행위인 것이다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちの世界は──未完成なんかじゃないわ！」"
translation = "「우리들의 세계는── 미완성 따위가 아니야!」"

[[dialogue]]
speaker = "クロト"
original = "「そうだ。エラーがあるなら潰せばいい。何も土台ごと作り直す必要はない」"
translation = "「그래. 에러가 있다면 부수면 돼. 굳이 토대째 다시 만들 필요는 없어」"

[[dialogue]]
speaker = "クロト"
original = "「そうして再創生を繰り返して……その先に何があるっていうんだ。俺には、キリのない発展の螺旋を辿るだけにしか思えない」"
translation = "「그렇게 재창생을 반복해서…… 그 끝에 뭐가 있다는 거냐. 나는, 끝없는 발전의 나선만 밟을 뿐이라고밖에 생각되지 않아」"

[[dialogue]]
speaker = "アポロ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "アナ"
original = "「そうです──リクリエの使徒。あなたが目指す先には、何が見えているというのです！？」"
translation = "「그렇습니다── 리크리에의 사도. 당신이 목표로 하는 곳에는, 무엇이 보이고 있다는 것입니까!?」"

[[dialogue]]
speaker = "unk"
original = "俺たちの純粋な疑問。それに対して、アポロは……"
translation = "우리들의 순수한 의문. 그것에 대해, 아폴로는……"

[[dialogue]]
speaker = "アポロ"
original = "「──パーフェクト・ワールド」"
translation = "「──퍼펙트 월드」"

[[dialogue]]
speaker = "マトイ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "クロト"
original = "「パーフェクト・ワールド……？」"
translation = "「퍼펙트 월드……?」"

[[dialogue]]
speaker = "アポロ"
original = "「そうだ。幾度となく再創生を繰り返した先に至る、完全で無欠な宇宙空間」"
translation = "「그렇다. 몇 번이고 재창생을 반복한 끝에 도달하는, 완전하고 무결한 우주 공간」"

[[dialogue]]
speaker = "セーラ"
original = "「そんなの……いつ実現するっていうのよ？」"
translation = "「그런 건…… 언제 실현된다는 거야?」"

[[dialogue]]
speaker = "アポロ"
original = "「わからない。それを知るのは、神だけだ」"
translation = "「모른다. 그것을 아는 것은, 신뿐이다」"

[[dialogue]]
speaker = "unk"
original = "その言葉に<ruby>韜晦<rt>とうかい</rt></ruby>は感じられなかった。"
translation = "그 말에 도회는 느껴지지 않았다."

[[dialogue]]
speaker = "unk"
original = "ただ、アポロを突き動かしている使命感が、純粋にその未来を求めている。"
translation = "단지, 아폴로를 움직이게 하는 사명감이, 순수하게 그 미래를 바라고 있다."

[[dialogue]]
speaker = "クロト"
original = "「その──君が目指す理想世界とやらなら、エラー……モンスターが生まれないっていうのか」"
translation = "「그── 네가 목표로 하는 이상 세계라는 곳에서는, 에러…… 몬스터가 태어나지 않는다는 거냐」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ。そこにはモンスターも、アステラもない」"
translation = "「아아. 그곳에는 몬스터도, 아스테라도 없다」"

[[dialogue]]
speaker = "アポロ"
original = "「そして、完全な世界にはもう、リクリエもない。だから──<ruby>使徒<rt>あたし</rt></ruby>も、<ruby>魔王<rt>オマエ</rt></ruby>も、必要ない」"
translation = "「그리고, 완전한 세계에는 더 이상, 리크리에도 없다. 그러니── 사도도, 마왕도, 필요 없다」"

[[dialogue]]
speaker = "フィオナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「自分が要らない世界を目指して、戦ってるってわけ……！？」"
translation = "「자신이 필요 없는 세계를 목표로, 싸우고 있다는 거네……!?」"

[[dialogue]]
speaker = "unk"
original = "使徒──という言葉の意味を深く理解した。"
translation = "사도──라는 말의 의미를 깊이 이해했다."

[[dialogue]]
speaker = "アポロ"
original = "「リクリエはすべて……パーフェクト・ワールドへ至るための研磨なんだ。本来、これまでみたいに、もっとたくさん積み重ねなきゃいけない」"
translation = "「리크리에는 모두…… 퍼펙트 월드에 도달하기 위한 연마인 것이다. 본래, 지금까지처럼, 훨씬 더 많이 쌓아 올려야 한다」"

[[dialogue]]
speaker = "アポロ"
original = "「なのに、その研磨は長いこと停滞している。ある致命的な弊害のせいで」"
translation = "「그런데, 그 연마는 오랫동안 정체되어 있다. 어떤 치명적인 폐해 때문에」"

[[dialogue]]
speaker = "アポロ"
original = "「わかるか？」"
translation = "「알겠나?」"

[[dialogue]]
speaker = "クロト"
original = "「致命的な、弊害……？」"
translation = "「치명적인, 폐해……?」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエだ。魔王──いや、緋宮クロト」"
translation = "「너다. 마왕── 아니, 히노미야 쿠로토」"

[[dialogue]]
speaker = "unk"
original = "アポロは、俺を指さした。"
translation = "아폴로는, 나를 손가락으로 가리켰다."

[[dialogue]]
speaker = "アポロ"
original = "「デネブ──アルタイル──ベガ──三つに分裂した宇宙そのもの。土台が分裂するなんて、あっていいはずがない大エラーだ」"
translation = "「데네브── 알타이르── 베가── 세 개로 분열된 우주 그 자체. 토대가 분열되다니, 있어서는 안 될 대형 에러다」"

[[dialogue]]
speaker = "アポロ"
original = "「これらを再び単一の宇宙へと束ねない限り、パーフェクト・ワールドには至れない。そのためにあたしはやってきた」"
translation = "「이것들을 다시 단일한 우주로 묶지 않는 한, 퍼펙트 월드에는 도달할 수 없다. 그것을 위해 나는 온 것이다」"

[[dialogue]]
speaker = "クロト"
original = "「だから……君の宿命のライバルは、俺ってわけか」"
translation = "「그러니까…… 네 숙명의 라이벌은, 나라는 건가」"

[[dialogue]]
speaker = "unk"
original = "分かたれた三世界を束ねて創り直す。何度も何度も創り直す。"
translation = "나뉜 세 세계를 묶어 다시 만든다. 몇 번이고 몇 번이고 다시 만든다."

[[dialogue]]
speaker = "unk"
original = "その先に築かれるのがパーフェクト・ワールド──"
translation = "그 끝에 세워지는 것이 퍼펙트 월드──"

[[dialogue]]
speaker = "アポロ"
original = "「リクリエは……本当なら、抗えないはずなんだ。もうとっくに成功してたはずなんだ。デネブも、ベガも、抗えなかった」"
translation = "「리크리에는…… 사실이라면, 저항할 수 없어야 한다. 이미 오래전에 성공했어야 한다. 데네브도, 베가도, 저항하지 못했다」"

[[dialogue]]
speaker = "アポロ"
original = "「なのにこの世界──アルタイルだけが、しぶとく今まで生き残ってる」"
translation = "「그런데 이 세계── 알타이르만이, 끈질기게 지금까지 살아남아 있다」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしは使徒として……世界を元に戻さなきゃならない……！」"
translation = "「나는 사도로서…… 세계를 원래대로 되돌려야 한다……!」"

[[dialogue]]
speaker = "unk"
original = "それが恐らく──アポロに課せられた使徒としての真の使命。"
translation = "그것이 아마도── 아폴로에게 부과된 사도로서의 진정한 사명."

[[dialogue]]
speaker = "unk"
original = "彼女は、アルタイルの使徒なんだ。"
translation = "그녀는, 알타이르의 사도인 것이다."

[[dialogue]]
speaker = "アナ"
original = "「アポロにとっては失敗。ですが……」"
translation = "「아폴로에게는 실패. 하지만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「逆に言えば──アルタイルがあるおかげで、今の宇宙は無事、ってことよね」"
translation = "「반대로 말하면── 알타이르가 있는 덕분에, 지금의 우주는 무사하다는 거네」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。俺たちが……生き残った最後の世界線なんだ」"
translation = "「아아. 우리들이…… 살아남은 최후의 세계선인 거다」"

[[dialogue]]
speaker = "unk"
original = "デネブとベガ──２つの可能性はすでに潰され、恐らくはもう滅んでしまっている。"
translation = "데네브와 베가── 두 가지 가능성은 이미 짓밟혔고, 아마도 이미 멸망해 버렸을 것이다."

[[dialogue]]
speaker = "アポロ"
original = "「だから、魔王──オマエだけはあたしが倒す！」"
translation = "「그러니, 마왕── 너만은 내가 쓰러뜨린다!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……俺を敵視するのは理解したよ」"
translation = "「아아…… 나를 적대시하는 건 이해했어」"

[[dialogue]]
speaker = "クロト"
original = "「でも、その論理で──フィオナにも牙を剥けるのか？」"
translation = "「하지만, 그 논리로── 피오나에게도 이빨을 드러낼 수 있나?」"

[[dialogue]]
speaker = "アポロ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "俺の言葉に、一瞬だけだが、アポロが躊躇うような逡巡の息を漏らすのが見えた。"
translation = "내 말에, 아주 잠깐이지만, 아폴로가 주저하는 듯한 망설임의 숨을 내쉬는 것이 보였다."

