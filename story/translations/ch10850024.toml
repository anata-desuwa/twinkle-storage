[[dialogue]]
speaker = "unk"
original = "第４話,ママダレナのこれから,P"
translation = "제4화, 마마다레나의 앞날, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。リゾート結界のプライベートビーチにある海の家で、俺はマグダレナと勉強会をしていた。"
translation = "어느 휴일. 리조트 결계의 프라이빗 비치에 있는 바다의 집에서, 나는 막달레나와 공부 모임을 하고 있었다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふむふむ、なるほど～。会長って、先生みたいに教えるのがお上手ですね♪」"
translation = "「흠흠, 과연~. 회장님은 선생님처럼 가르치는 게 능숙하시네요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――以前、家庭教師のようなバイトをしていたことがある？\u3000ふふっ、やっぱり会長は経験豊富ですね～」"
translation = "「――이전에 과외 같은 알바를 한 적이 있다고요? 후훗, 역시 회장님은 경험이 풍부하시네요~」"

[[dialogue]]
speaker = "unk"
original = "でも、どうして今日は勉強を？"
translation = "그런데, 어째서 오늘은 공부를?"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「実は私、アニマさまに言われたあの日から、将来のことをちゃんと考えてみることにしたんです。自分がこれから、どう生きていきたいのかって」"
translation = "「사실 저, 아니마 님에게 들었던 그날부터 장래에 대해 제대로 생각해 보기로 했어요. 자신이 앞으로 어떻게 살아가고 싶은지 말이에요」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「それで……もしできるなら――『保育士』を目指すのもいいかなって、ちょっと思い始めてまして…」"
translation = "「그래서…… 만약 가능하다면―― 『보육사』를 목표로 하는 것도 좋을까 하고 조금 생각하기 시작해서…」"

[[dialogue]]
speaker = "unk"
original = "俺は驚きつつも、子供たちを見守るマグダレナの姿は自然と想像できて、納得していた。"
translation = "나는 놀라면서도, 아이들을 지켜보는 막달레나의 모습은 자연스럽게 상상할 수 있어서 납득하고 있었다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「私、『みんなのママになりたい』っていう気持ちがあって……だから、将来の仕事を考えた時に、保育士に興味を持ったんです」"
translation = "「저, 『모두의 엄마가 되고 싶다』는 마음이 있어서…… 그래서 장래의 직업을 생각했을 때 보육사에 흥미를 가졌어요」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「まだ本当に考え始めたばかりなんですが……子供たちを見守るには、やっぱり正しい知識を学ぶことが必要だと思ったので」"
translation = "「아직 정말 생각하기 시작한 단계일 뿐이지만…… 아이들을 지켜보려면 역시 올바른 지식을 배우는 것이 필요하다고 생각했거든요」"

[[dialogue]]
speaker = "unk"
original = "保育士、すごくいいと思う"
translation = "보육사, 정말 좋다고 생각해"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「本当ですか？\u3000えへへへ……♪」"
translation = "「정말인가요? 에헤헤헤……♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「それと……保育士以外にも、やりたいことがありまして――」"
translation = "「그리고…… 보육사 말고도 하고 싶은 일이 있는데요――」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「私、<b>本当の</b>ママになることも……ちゃんと目指したいな、って♪」"
translation = "「저, <b>진짜</b> 엄마가 되는 것도…… 제대로 목표로 하고 싶어서요, 후훗♪」"

[[dialogue]]
speaker = "unk"
original = "言いながら、マグダレナは少し照れたように俺を見上げる。"
translation = "말하면서 막달레나는 조금 수줍은 듯 나를 올려다본다."

[[dialogue]]
speaker = "unk"
original = "そ、それってつまり……"
translation = "그, 그건 설마……"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はい♪\u3000もし……会長に甘えさせて頂けるなら……<emoji=heart04>」"
translation = "「네♪ 만약…… 회장님에게 어리광 부려도 된다면……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉に胸の奥が熱くなり、俺はそっとマグダレナの肩へと手をまわして抱き寄せた。"
translation = "그 말에 가슴 깊은 곳이 뜨거워져, 나는 살며시 막달레나의 어깨로 손을 돌려 끌어안았다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あっ……会長……<emoji=heart04>」"
translation = "「앗…… 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「んんぅ……<emoji=heart04>\u3000そんな優しく頭を撫でられたら……ドキドキしちゃいます……<emoji=heart04>」"
translation = "「음응……<emoji=heart04> 그렇게 상냥하게 머리를 쓰다듬어 주시면…… 두근거려 버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……えへへ♪\u3000会長の手……いつもより、あったかいです……<emoji=heart04>」"
translation = "「……에헤헤♪ 회장님의 손…… 평소보다 따뜻해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう囁くマグダレナの小さな唇に、俺はそっとキスをした。"
translation = "그렇게 속삭이는 막달레나의 작은 입술에, 나는 살며시 키스를 했다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「んっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はマグダレナの頬を手で包み、もう１度唇を重ねる。"
translation = "나는 막달레나의 뺨을 손으로 감싸고, 다시 한번 입술을 겹친다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「んちゅっ……<emoji=heart04>\u3000会長……もっと……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응츄…… <emoji=heart04> 회장님…… 더…… <emoji=heart04> 츄…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「私……会長にぎゅってされてると……ママになりたいって気持ちが、ますます溢れてきちゃいます……<emoji=heart04>」"
translation = "「저…… 회장님이 꼬옥 안아주시면…… 엄마가 되고 싶다는 기분이 점점 더 넘쳐흘러 버려요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉に応え、俺は彼女の小さな体を優しく抱き締めながら、また口づけを交わすのだった。"
translation = "그 말에 응하며, 나는 그녀의 작은 몸을 상냥하게 껴안은 채, 다시 입맞춤을 나누는 것이었다."

[[dialogue]]
speaker = "unk"
original = "翌日。"
translation = "다음 날."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あら、会長にマグダレナ。こんにちは」"
translation = "「어머, 회장님에 막달레나. 안녕하세요.」"

[[dialogue]]
speaker = "unk"
original = "昼食をとっている俺たちのところへ、同じく附属校に通う守護天使・セシアがやってきた。"
translation = "점심을 먹고 있는 우리에게, 마찬가지로 부속 학교에 다니는 수호천사 세시아가 다가왔다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あっ、セシア～♪\u3000今日こそは、ママダレナに甘えてくれてもいいんですよ～？」"
translation = "「앗, 세시아~♪ 오늘이야말로, 마마다레나에게 어리광 부려도 괜찮다구요~?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「いいえ。残念だけど、附属生のあなたはママではないわ」"
translation = "「아니. 유감이지만, 부속생인 당신은 엄마가 아니야.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あぅ～、今日もダメでした～！」"
translation = "「아우~, 오늘도 안 됐네요~!」"

[[dialogue]]
speaker = "unk"
original = "お～、よしよし"
translation = "오~, 착하지 착해."

[[dialogue]]
speaker = "unk"
original = "項垂れたマグダレナの頭を、俺は撫でてやる。"
translation = "고개를 떨군 막달레나의 머리를, 나는 쓰다듬어 준다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「でも……じ～っ」"
translation = "「그치만…… 지~익」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「？\u3000セシア、どうかしました？」"
translation = "「? 세시아, 왜 그러세요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「マグダレナ……あなた、前より少し『ママ<ruby>力<rt>りょく</rt></ruby>』が上がったわね」"
translation = "「막달레나…… 너, 전보다 조금 『엄마력』이 올라갔네.」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「えっ……？」"
translation = "「엣……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「少し前までのあなたは、『今この瞬間だけママになりたい』っていう……ごっこ遊びをしている子供のようだった」"
translation = "「얼마 전까지의 너는, 『지금 이 순간만 엄마가 되고 싶어』라는…… 소꿉장난을 하는 아이 같았어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だけど今のあなたは、ちゃんと『本当のママ』を目指している……そんな感じがするわ」"
translation = "「하지만 지금의 너는, 제대로 『진짜 엄마』를 목표로 하고 있어…… 그런 느낌이 들어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だから、マグダレナ。私からあなたに、プラス１ポイントをあげるわ。これから先どうなるか、楽しみにしているわよ♪」"
translation = "「그러니까, 막달레나. 내가 너에게, 플러스 1포인트를 줄게. 앞으로 어떻게 될지, 기대하고 있을게♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……！\u3000はいっ♪\u3000ママダレナ、これからも頑張ります♪」"
translation = "「……! 네♪ 마마달레나, 앞으로도 열심히 할게요♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マグダレナは心から嬉しそうな笑顔を浮かべるのだった。"
translation = "그렇게 말하며, 막달레나는 진심으로 기쁜 듯한 미소를 짓는 것이었다."

