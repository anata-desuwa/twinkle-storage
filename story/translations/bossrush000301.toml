[[dialogue]]
speaker = "unk"
original = "俺たちは創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の核を砕き、地球ごと破壊しようとする暴挙を阻止した。"
translation = "우리들은 창조신 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』의 핵을 부수고, 지구째로 파괴하려던 폭거를 저지했다."

[[dialogue]]
speaker = "unk"
original = "そして、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が次元の裂け目を通じてデネブを撤退した後──"
translation = "그리고, 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』가 차원의 균열을 통해 데네브로 철수한 뒤──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふぅ……ようやく一息つくことができるわね」"
translation = "「후우…… 겨우 한숨 돌릴 수 있겠네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、何とかなって良かった」"
translation = "「아아, 어떻게든 돼서 다행이야」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネと極星従騎によるアルタイル襲撃。"
translation = "루비네와 극성종기에 의한 알타이르 습격."

[[dialogue]]
speaker = "unk"
original = "ホロウ・ルヴィネとディザスターハンドの出現。"
translation = "홀로 루비네와 디자스터 핸드의 출현."

[[dialogue]]
speaker = "unk"
original = "そして創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦い。"
translation = "그리고 창조신 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』와의 싸움."

[[dialogue]]
speaker = "unk"
original = "世界を揺るがすような出来事が、今日１日で数えきれないほど起きた。"
translation = "세계를 뒤흔들 만한 일들이, 오늘 하루 동안 셀 수 없을 정도로 일어났다."

[[dialogue]]
speaker = "unk"
original = "まさに激動の連続だった。"
translation = "그야말로 격동의 연속이었다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今のうちにこちらも態勢を立て直しましょう。被害の把握も必要だわ。でも今更だけど──」"
translation = "「이 틈에 이쪽도 태세를 재정비하도록 하죠. 피해 파악도 필요하고. 하지만 새삼스럽지만──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「どうしてあなたがここいるのかしら、煌嶺？」"
translation = "「어째서 당신이 여기 있는 걸까, 코우레이?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが冷たい視線を向けると、九尾の女帝は不敵な笑みを浮かべる。"
translation = "루비네가 차가운 시선을 보내자, 구미의 여제는 불적한 미소를 띄운다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「どうしてか、だと？\u3000フッ、質問の意図がわかりかねるな」"
translation = "「어째서냐고? 훗, 질문의 의도를 모르겠군」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「欲するままに全てを奪う暴君・煌嶺──その悪名はデネブの魔界でも有名だったわ」"
translation = "「원하는 대로 모든 것을 빼앗는 폭군 코우레이── 그 악명은 데네브의 마계에서도 유명했어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「アルタイルのあなたも本質は同じ。そんなあなたが世界を守るために戦うなんて思えないのだけど」"
translation = "「알타이르의 당신도 본질은 같아. 그런 당신이 세계를 지키기 위해 싸우다니 생각할 수 없는데」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それは貴様も同じことだろう。貴様は創造神が生み出した、新たな女神のなり損ない」"
translation = "「그건 네놈도 마찬가지겠지. 네놈은 창조신이 만들어낸, 새로운 여신의 낙오자」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それが反旗を翻し、共に創造神を討とうというのなら……貴様こそ釈明が必要なのではないか？」"
translation = "「그것이 반기를 들고, 함께 창조신을 토벌하겠다고 한다면…… 네놈이야말로 해명이 필요한 것 아닌가?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネと煌嶺が視線で火花を散らす。"
translation = "루비네와 코우레이가 시선으로 불꽃을 튀긴다."

[[dialogue]]
speaker = "unk"
original = "衝突されると困るのだが、確かに今同じ陣営にいるのが不思議な２人でもある。"
translation = "충돌하면 곤란하겠지만, 확실히 지금 같은 진영에 있는 것이 신기한 두 사람이기도 하다."

[[dialogue]]
speaker = "unk"
original = "どうして２人が今ここにいるかというと──"
translation = "어째서 두 사람이 지금 여기에 있느냐 하면──"

