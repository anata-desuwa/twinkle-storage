[[dialogue]]
speaker = "unk"
original = "第３話,天敵・ツェツィーリエ,B"
translation = "제3화, 천적 체칠리에"

[[dialogue]]
speaker = "unk"
original = "セドナが休憩に入った後も、ウェンディは指令室で事後処理を行っていた。"
translation = "세드나가 휴식에 들어간 뒤에도 웨디는 지령실에서 사후 처리를 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "それもあらかた終わり、改めてネビュラの財政事情に思考を巡らせる。"
translation = "그것도 대강 마무리되고, 다시금 네뷸라의 재정 상황에 대해 생각을 가다듬는다."

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「うーん……だめだぁ。このままじゃ到底、組織を維持していくことなんて出来ない」"
translation = "「으음…… 안 되겠어. 이대로는 도저히 조직을 유지해 나갈 수 없어.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（リクリエを乗り越えたら、元老会はネビュラを解体しにかかるだろうとは思ってました）"
translation = "(리크리에를 극복하면 원로회가 네뷸라를 해체하려 들 거라는 건 예상하고 있었어요.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（資金の援助が打ち切られるだろうってことも読めてたんですけど……）"
translation = "(자금 지원이 끊길 거라는 것도 짐작하고 있었지만……)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（まあ、それは仕方ないです。あくまでネビュラは対リクリエのための一組織に過ぎないんだから）"
translation = "(뭐, 그건 어쩔 수 없죠. 어디까지나 네뷸라는 대 리크리에를 위한 일시적인 조직에 불과하니까.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（だから私はリクリエ後も、ネビュラという組織が単独で存続していく道筋を考えました）"
translation = "(그래서 저는 리크리에 이후에도 네뷸라라는 조직이 단독으로 존속해 나갈 길을 생각했습니다.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（人間界で作った資金を滅亡前に回収。その資金を使ってネビュラを維持しつつ、再生された人間界の経済活動をコントロールする）"
translation = "(인간계에서 만든 자금을 멸망 전에 회수. 그 자금을 사용해 네뷸라를 유지하면서, 재생된 인간계의 경제 활동을 컨트롤한다.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（組織としては人員を縮小することになるでしょうけど、リクリエという最大の脅威が去っているのだから大きな問題にはならない）"
translation = "(조직으로서는 인원을 축소하게 되겠지만, 리크리에라는 최대의 위협이 사라진 뒤이니 큰 문제는 되지 않아요.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（そこで経済基盤を築いて、それを元に魔女の森へ人間界の『経済学』を輸入する）"
translation = "(거기서 경제 기반을 닦고, 그것을 바탕으로 마녀의 숲에 인간계의 『경제학』을 수입한다.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（この啓蒙が成功すれば、後進的な魔女の森もようやく天界、魔界、人間界と肩を並べることが出来る──はずだったのに）"
translation = "(이 계몽이 성공하면 낙후된 마녀의 숲도 드디어 천계, 마계, 인간계와 어깨를 나란히 할 수 있을── 터였는데.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「人間界は残ってしまいました……中途半端に」"
translation = "「인간계는 남아버리고 말았어요…… 어중간하게.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（乗り越えたはずのリクリエの影は未だ消えていません。各地でモンスターの出現は収まらず、それどころか新種まで現れ始めたとか）"
translation = "(극복했을 터인 리크리에의 그림자는 아직 사라지지 않았습니다. 각지에서 몬스터의 출현은 멈추지 않고, 오히려 신종까지 나타나기 시작했다던가.)"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「厳しい延長戦だよぉ……嘆いてばかりもいられないですけど……」"
translation = "「가혹한 연장전이야아…… 한탄만 하고 있을 수는 없지만요……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ネビュラの人間界進出のときやったみたいに、人間界に新しい財政基盤を築いていく？」"
translation = "「네뷸라의 인간계 진출 때 했던 것처럼, 인간계에 새로운 재정 기반을 구축해 나갈까?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「でも、それだって一朝一夕にはいきません。その前に資本が尽きてしまいます……」"
translation = "「하지만 그것도 하루아침에 되지는 않아요. 그전에 자본이 바닥나버릴 거예요……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あ～～～っ、もうっ！\u3000ダメです、いい方法なーんにも思い浮かびませんっ！！」"
translation = "「아~~~ 진짜! 안 되겠어요, 좋은 방법이 하~나도 안 떠올라요!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「なーに一人で悶えちゃってんのよん」"
translation = "「뭘 혼자서 그렇게 끙끙대고 있는 거야?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「っ！？\u3000ツェツィーリエ！？」"
translation = "「!? 체칠리에!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ハロー、ウェンディ♪」"
translation = "「헬로, 웨디♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「万年、研究室に引きこもっているあなたが指令室に顔を出すなんて、どういう風の吹き回しです？」"
translation = "「만년 연구실에 틀어박혀 있는 당신이 지령실에 얼굴을 비추다니, 웬일인가요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「やだな～、そいつは偏見ってもんよ？」"
translation = "「이런~, 그거 편견이라구?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「むしろこうやってお散歩することが、斬新なアイデアを生み出す秘訣ってわけ♪」"
translation = "「오히려 이렇게 산책하는 게 참신한 아이디어를 낳는 비결이란 말씀♪」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ウェンディもさ、机にかじりついてばっかだから煮詰まるんよ。どう、一緒にイッとく？」"
translation = "「웨디도 말이야, 책상에만 매달려 있으니까 막히는 거야. 어때, 같이 한판 가볼래?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「お断りです！\u3000行くとしても誰があなたと一緒になんか……」"
translation = "「거절입니다! 간다고 해도 누가 당신 같은 사람이랑……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「あ～、冷たいの。アタシたち同期みたいなモンなんだから仲良くしようよ～♪」"
translation = "「아~, 차갑긴. 우리 동기나 마찬가지니까 사이좋게 지내자구~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「確かに同期ではありますよ。ですが仲良くはしません。敵です。不倶戴天の宿敵です」"
translation = "「확실히 동기이긴 하죠. 하지만 사이좋게 지내지는 않을 겁니다. 적입니다. 불구대천의 원수라고요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あ～もう、くっつかないで離れてください！\u3000そのグイグイ来るの、苦手なんですから」"
translation = "「아 정말, 달라붙지 말고 떨어지세요! 그렇게 들이대는 거 질색이니까.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「お近づきのシルシにアメちゃんをどーぞ♪」"
translation = "「친해진 기념으로 사탕 하나 드셔보셔♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「グイグイ来ないでって言ってるじゃないですか！\u3000勝手におかしをポケットに突っ込まないでください！」"
translation = "「들이대지 말라고 했잖아요! 마음대로 과자를 주머니에 쑤셔 넣지 마세요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ウェンディ、イライラするのはよくないよ～」"
translation = "「웨디, 짜증 내는 건 좋지 않아~」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そんな時は甘いものを食べるのが一番♪\u3000糖分が頭に回ってアイデアもポンポンポーンってなカンジよ～」"
translation = "「그럴 때는 단것을 먹는 게 제일♪ 당분이 머리에 돌아서 아이디어가 팡팡팡~ 하고 터질걸?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「む、う……まあ、一理ありますね。身体が甘いものを欲してる感はあります」"
translation = "「무, 우…… 뭐, 일리는 있네요. 몸이 단것을 원하고 있는 느낌은 들어요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「だよね、だよねぇ～」"
translation = "「그치, 그치~?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「っ……！\u3000でも、ダメっ！\u3000そうやって油断しておやつを食べ過ぎたせいで、体重がヤバいことになったことあるでしょう！」"
translation = "「……! 하지만 안 돼! 그렇게 방심해서 간식을 너무 많이 먹은 탓에 체중이 위험해진 적 있었잖아요!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ここでグッと我慢できるかどうかが運命の分かれ道なんです」"
translation = "「여기서 꾹 참을 수 있느냐 없느냐가 운명의 갈림길이라고요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「あ、そうだウェンディ。予算ちょーだい」"
translation = "「아, 맞다 웨디. 예산 좀 줘.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「おちょくってるんですか、あなたは！」"
translation = "「지금 저를 놀리시는 건가요, 당신은!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「アタシはいつだって真面目だよ？\u3000ちょー大真面目」"
translation = "「난 언제나 진지하다구? 어~엄청 진지해.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「だとしても突然『予算ちょーだい』で通るわけないでしょう！\u3000舐めてるんですか？」"
translation = "「그렇다고 해도 갑자기 『예산 줘』라고 해서 통할 리가 없잖아요! 사람을 우습게 보는 건가요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「いーじゃない。今度のはホントーにすごい発明なんだよね～」"
translation = "「에이, 괜찮잖아. 이번 거는 정~말로 대단한 발명이거든.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あなた毎回それ！」"
translation = "「당신 매번 그 소리잖아요!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いつもそんな調子で、蓋を開けてみたら使い道のないガラクタばっかりじゃないですか……」"
translation = "「항상 그런 식이고, 뚜껑을 열어보면 쓸모없는 쓰레기뿐이었으면서……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そのおかげで、貴重なネビュラの資金がどれだけ失われてしまったことか！」"
translation = "「그 덕분에 귀중한 네뷸라의 자금이 얼마나 낭비됐는지 알기나 해요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ウェンディのケチ、ドケチ、ドドドケチ～！\u3000脳みそがお金で出来てるウェンディにはアタシの発明の偉大さが分からないんだよ！」"
translation = "「웨디 구두쇠, 왕구두쇠, 왕왕왕구두쇠~! 뇌세포가 돈으로 되어 있는 웨디는 내 발명의 위대함을 모른다니까!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「悔しかったら私を唸らせるような発明品のひとつでも作ってきてください」"
translation = "「분하면 저를 감탄시킬 만한 발명품이라도 하나 만들어 와 보시죠.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ほほう……言ったねぇ。待っていたよ、その言葉を！」"
translation = "「호오…… 말 다 했네. 기다리고 있었다구, 그 말을!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「はぁ？」"
translation = "「하아?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「今回の発明はホントーにすごいんだから」"
translation = "「이번 발명은 정~말로 대단하니까.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「それはさっき聞きました。で、どんな発明なんですか？」"
translation = "「그건 아까 들었습니다. 그래서, 어떤 발명인데요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ひょっとしたらこの発明のおかげで、ネビュラの金欠問題も解決しちゃうかも」"
translation = "「어쩌면 이 발명 덕분에 네뷸라의 돈 문제도 해결될지도 몰라.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「はいはい、さようですか。期待していないんで、さっさと発表してください」"
translation = "「네네, 그러시겠죠. 기대 안 하니까 어서 발표나 하세요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「おーけーおーけー、オーディエンスの盛り上がりも最高潮ってところだね」"
translation = "「오케이 오케이, 관객들의 호응도 최고조에 달했네.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「では発表しよう。今回アタシが発明したのは～……じゃーん、バトルスーツ強化装置～♪」"
translation = "「그럼 발표하겠어. 이번에 내가 발명한 것은~…… 짠, 배틀 슈트 강화 장치~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「強化ぁー？\u3000一体何を強化するって言うんです？」"
translation = "「강화아ー? 대체 무엇을 강화한다는 거죠?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「全部だよ全部。耐久力、反応力、魔力出力、あらゆる性能がなんと２００パーセント以上アップ！」"
translation = "「전부야, 전부. 내구력, 반응력, 마력 출력, 모든 성능이 무려 200퍼센트 이상 업!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「本当ですか？\u3000本当だったらすごいんですが……」"
translation = "「정말인가요? 사실이라면 대단하긴 합니다만……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「まだまだ基礎研究レベルだよ。ゆくゆくは星騎士たちやクラウディア様のように、ネビュラの構成員も複数の戦闘服が持てるんじゃないかと思ってね」"
translation = "「아직은 기초 연구 단계야. 머지않아 성기사들이나 클라우디아 님처럼, 네뷸라의 구성원도 여러 벌의 전투복을 가질 수 있지 않을까 싶어서 말이지.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「えっ、そんなことが可能なんですか……？」"
translation = "「엣, 그런 게 가능한가요……?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「まあ星騎士の技術は見様見真似だし、光の魔法はクラウディア様にしか使えないから、改善点は多いがね」"
translation = "「뭐, 성기사의 기술은 겉너머로 배운 거고, 빛의 마법은 클라우디아 님밖에 못 쓰니까 개선할 점은 많지만 말이야.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「それでも既存の戦闘服の強化なら実現できたんだ～。疑うなら試してみる？」"
translation = "「그래도 기존 전투복 강화라면 실현했어~. 의심스러우면 시험해 볼래?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「私が？\u3000え、ええ……まあ、いいですけど……」"
translation = "「제가요? 에, 에에…… 뭐, 상관없긴 합니다만……」"

