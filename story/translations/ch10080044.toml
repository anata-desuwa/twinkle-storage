[[dialogue]]
speaker = "unk"
original = "第４話,膝の上の恋人,P"
translation = "제4화, 무릎 위의 연인, P"

[[dialogue]]
speaker = "マトイ"
original = "「ねぇ、アナ。そういえば、気になってたことがあるんだけど……」"
translation = "「있지, 아나. 그러고 보니 궁금한 게 있었는데……」"

[[dialogue]]
speaker = "アナ"
original = "「はい？\u3000なんでしょうか、マトイ先輩」"
translation = "「네? 무엇인가요, 마토이 선배.」"

[[dialogue]]
speaker = "unk"
original = "俺たちが星徒会の書類仕事をしていると、マトイがふと口を開いた。その声に、アナは顔を上げる。"
translation = "우리들이 성도회의 서류 작업을 하고 있자, 마토이가 문득 입을 열었다. 그 목소리에 아나는 고개를 든다."

[[dialogue]]
speaker = "マトイ"
original = "「最近、アナって会長の膝の上に、あんまり乗らなくなったよね」"
translation = "「최근에 아나는 회장님 무릎 위에 별로 안 앉게 됐네.」"

[[dialogue]]
speaker = "アナ"
original = "「少し前に友人から指摘されまして……人前でそういうことをするのは、はしたないと学びました」"
translation = "「얼마 전에 친구로부터 지적을 받아서요…… 남들 앞에서 그런 짓을 하는 건 조신하지 못하다고 배웠습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「それに、私と会長は深い絆で結ばれているので、人前で見せつけるような行為は必要ありません」"
translation = "「게다가 저와 회장님은 깊은 유대로 맺어져 있으니, 남들 앞에서 과시하는 듯한 행위는 필요 없습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「お、大人だっ！？\u3000でも、会長の方はちょっと寂しかったりして～？」"
translation = "「어, 어른이다!? 하지만 회장님 쪽은 조금 외로울지도~?」"

[[dialogue]]
speaker = "unk"
original = "俺はアナの意思を尊重したいと思ってるよ"
translation = "나는 아나의 의사를 존중하고 싶어."

[[dialogue]]
speaker = "マトイ"
original = "「へぇ～！\u3000カップルって付き合う期間が長くなってくると落ち着いてくるって、本当だったんだ～」"
translation = "「헤에~! 커플은 사귀는 기간이 길어지면 차분해진다는 게 진짜였구나~」"

[[dialogue]]
speaker = "unk"
original = "寂しくないというのは嘘じゃない。なぜなら――"
translation = "외롭지 않다는 건 거짓말이 아니다. 왜냐하면――"

[[dialogue]]
speaker = "アナ"
original = "「やっぱり、会長の膝の上はベストプレイス。むふ～<emoji=heart04>」"
translation = "「역시 회장님 무릎 위는 베스트 플레이스. 므후~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の部屋のベッドで、アナは俺の膝の上に腰を下ろし、安堵するように息をつく。"
translation = "내 방 침대에서, 아나는 내 무릎 위에 허리를 내리고 안도하듯 숨을 내쉰다."

[[dialogue]]
speaker = "unk"
original = "放課後になると、アナはほとんど毎日のように俺の部屋へやって来て、時間が許す限り膝の上で過ごすのが当たり前になっていた。"
translation = "방과 후가 되면 아나는 거의 매일같이 내 방으로 찾아와, 시간이 허락하는 한 무릎 위에서 지내는 것이 당연해져 있었다."

[[dialogue]]
speaker = "アナ"
original = "「会長？\u3000どうかしましたか？」"
translation = "「회장님? 왜 그러시나요?」"

[[dialogue]]
speaker = "アナ"
original = "「もしかして……私が膝の上に乗っているから、足がしびれてしまいましたか？\u3000重かったでしょうか？」"
translation = "「혹시…… 제가 무릎 위에 앉아 있어서 다리가 저려버렸나요? 무거웠을까요?」"

[[dialogue]]
speaker = "unk"
original = "晴れ着のアナが可愛くて、見惚れちゃってた"
translation = "기모노 차림의 아나가 귀여워서 넋을 잃고 보고 있었어."

[[dialogue]]
speaker = "アナ"
original = "「んぅ<emoji=heart04>\u3000ふふふっ<emoji=heart04>\u3000会長はいつもそうやって褒めてくれるので……胸がキュンってして、私のイチャイチャスイッチがオンになっちゃいます……<emoji=heart04>」"
translation = "「응으<emoji=heart04> 후후훗<emoji=heart04> 회장님은 항상 그렇게 칭찬해 주시니까…… 가슴이 큥 해서, 제 꽁냥꽁냥 스위치가 켜져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そこで俺は今日の星徒会室でのやり取りを思い出して、改めてアナに聞いてみる。"
translation = "여기서 나는 오늘 성도회실에서의 대화를 떠올리고, 다시금 아나에게 물어본다."

[[dialogue]]
speaker = "アナ"
original = "「――どうして星徒会で膝に乗らなくなったのか、ですか？」"
translation = "「――어째서 성도회에서 무릎에 앉지 않게 되었냐고요?」"

[[dialogue]]
speaker = "アナ"
original = "「その……私は会長とスキンシップをしていると、無意識にデレデレな顔と声になってしまっているらしいので……」"
translation = "「그게…… 저는 회장님과 스킨십을 하고 있으면, 무의식적으로 헤벌레한 얼굴과 목소리가 되어버리는 모양이라서……」"

[[dialogue]]
speaker = "アナ"
original = "「そういう恥ずかしいところは……会長以外には見せたくないな、と……」"
translation = "「그런 부끄러운 모습은…… 회장님 이외에는 보여주고 싶지 않달까……」"

[[dialogue]]
speaker = "アナ"
original = "「あ、でも……会長の希望を優先したい、したいです。会長はどうでしょうか？\u3000外でも、もっとイチャイチャ、したいですか……？」"
translation = "「아, 하지만…… 회장님의 희망을 우선하고 싶어, 싶어요. 회장님은 어떠신가요? 밖에서도 좀 더 꽁냥꽁냥, 하고 싶으신가요……?」"

[[dialogue]]
speaker = "unk"
original = "頬を赤らめ、上目遣いでもじもじしながら、俺を見上げてくるアナ。"
translation = "뺨을 붉히며 치켜뜬 눈으로 머뭇거리면서 나를 올려다보는 아나."

[[dialogue]]
speaker = "unk"
original = "そのいじらしい姿があまりにも可愛くて、思わず膝上のアナを抱き締めてしまう。"
translation = "그 애처로운 모습이 너무나도 귀여워서, 나도 모르게 무릎 위의 아나를 껴안고 만다."

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000会長……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も、アナの可愛いところは独り占めしたい"
translation = "나도 아나의 귀여운 점은 독점하고 싶어."

[[dialogue]]
speaker = "アナ"
original = "「んぅ……えへへへへへぇ<emoji=heart04>\u3000それなら、万事ノープロブレムです<emoji=heart04>」"
translation = "「응으…… 에헤헤헤헤헤<emoji=heart04> 그렇다면 만사 노 프로블럼이에요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちカップルのよくある過ごし方として、部屋でぴったりと寄り添いながら、それぞれ別の本を読むことが多かった。"
translation = "우리 커플의 흔한 일상으로, 방에서 딱 붙어 앉아 각자 다른 책을 읽는 경우가 많았다."

[[dialogue]]
speaker = "アナ"
original = "「……こうしていつも会長の膝の上で本を読んでいると、会長の息遣いまで聞こえてきて、すごく安心します」"
translation = "「……이렇게 항상 회장님 무릎 위에서 책을 읽고 있으면, 회장님의 숨결까지 들려와서 정말 안심돼요.」"

[[dialogue]]
speaker = "アナ"
original = "「ここまでリラックスできる場所は他にありませんから、おかげでとても読書に集中できます」"
translation = "「이렇게까지 릴랙스할 수 있는 장소는 달리 없으니까, 덕분에 독서에 아주 집중할 수 있어요.」"

[[dialogue]]
speaker = "アナ"
original = "「――えっ、会長はあまり集中できないんですか？\u3000私の体温や息遣いを感じると、ドキドキしちゃうから……？」"
translation = "「――엣, 회장님은 별로 집중할 수 없나요? 제 체온이나 숨결을 느끼면 두근거려 버리니까……?」"

[[dialogue]]
speaker = "アナ"
original = "「もうっ、そんなことを言われたら、私までドキドキして集中できなくなっちゃうじゃないですかっ」"
translation = "「정말이지, 그런 말을 들으면 저까지 두근거려서 집중할 수 없게 되잖아요.」"

[[dialogue]]
speaker = "アナ"
original = "「会長のいじわる<emoji=heart04>」"
translation = "「회장님 심술쟁이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぷくっと頬を膨れさせてみせるアナの仕草が可愛くて、俺は堪えきれずキスをしてしまう。"
translation = "뿌우 하고 볼을 부풀려 보이는 아나의 몸짓이 귀여워서, 나는 참지 못하고 키스를 한다."

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「はふぅ……<emoji=heart04>\u3000もう、会長は私がキスをすれば、機嫌が直ると思ってますね？」"
translation = "「하후우……<emoji=heart04> 정말, 회장님은 제가 키스를 하면 기분이 풀릴 거라고 생각하시죠?」"

[[dialogue]]
speaker = "アナ"
original = "「まあ、おおむね間違いではないんですが……」"
translation = "「뭐, 대체로 틀린 건 아니지만요……」"

[[dialogue]]
speaker = "アナ"
original = "「イチャイチャするのもいいですが、将来のためには勉強も必要ですよ」"
translation = "「꽁냥거리는 것도 좋지만, 장래를 위해서는 공부도 필요해요.」"

[[dialogue]]
speaker = "アナ"
original = "「ほら、見てください会長。これが以前言っていた、『モデルロケット』の作り方です」"
translation = "「자, 보세요 회장님. 이게 이전에 말했던 『모델 로켓』을 만드는 방법이에요.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、アナは読んでいた本のページを俺に見せてくれる。"
translation = "그렇게 말하며 아나는 읽고 있던 책의 페이지를 내게 보여준다."

[[dialogue]]
speaker = "アナ"
original = "「お、ロケットと聞いて会長も目の色が変わりましたね。さすがは男の子」"
translation = "「오, 로켓이라는 말에 회장님도 눈빛이 바뀌셨네요. 역시 남자아이.」"

[[dialogue]]
speaker = "アナ"
original = "「『モデルロケット』は固体燃料を使って打ち上げる、小型のロケットです」"
translation = "「『모델 로켓』은 고체 연료를 사용해 발사하는 소형 로켓이에요.」"

[[dialogue]]
speaker = "アナ"
original = "「個人でも作って打ち上げることができて、高さは数１００メートル飛んだりもします。回収用にパラシュートが付いていたりすることが多いみたいですね」"
translation = "「개인도 만들어서 발사할 수 있고, 높이는 수백 미터 날아가기도 해요. 회수용으로 낙하산이 달려 있는 경우가 많은 것 같네요.」"

[[dialogue]]
speaker = "アナ"
original = "「次の目標としては、これを作ってみようと思ってるんです」"
translation = "「다음 목표로는 이걸 만들어 보려고 생각 중이에요.」"

[[dialogue]]
speaker = "アナ"
original = "「ただ本やデータを読み漁るばかりではなく、アニマ先輩のようにもっと実物を作ったり動かすことで、宇宙に関することを学んでみたいんです」"
translation = "「그저 책이나 데이터를 훑어보기만 하는 게 아니라, 아니마 선배처럼 좀 더 실물을 만들거나 움직여 보면서 우주에 관한 것을 배워보고 싶어요.」"

[[dialogue]]
speaker = "アナ"
original = "「――会長も手伝ってくれるんですか？\u3000ふふっ、それを聞いて、ますます楽しみになってきました」"
translation = "「――회장님도 도와주실 건가요? 후훗, 그 말을 들으니 점점 더 기대되네요.」"

[[dialogue]]
speaker = "アナ"
original = "「それじゃあ、今度の休日はロケット制作デート、ですね♪」"
translation = "「그럼 이번 휴일은 로켓 제작 데이트네요♪」"

[[dialogue]]
speaker = "アナ"
original = "「リクリエとの戦いも、イチャイチャも、将来の勉強も、計画的に全部やりましょう」"
translation = "「리크리에와의 싸움도, 꽁냥거림도, 장래를 위한 공부도 계획적으로 전부 다 해요.」"

[[dialogue]]
speaker = "アナ"
original = "「どこまでも欲張りに行きたいです。だって私は、最強の魔王の恋人なんですから<emoji=heart04>」"
translation = "「어디까지나 욕심부리고 싶어요. 왜냐하면 저는 최강 마왕의 연인이니까요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、この後のイチャイチャの計画は？"
translation = "그럼 이 다음의 꽁냥꽁냥 계획은?"

[[dialogue]]
speaker = "アナ"
original = "「ふふっ<emoji=heart04>\u3000仕方ないですね。魔王様のイチャイチャスイッチがすっかり入ってしまったようなので、恋人として満足させなければいけません」"
translation = "「후훗<emoji=heart04> 어쩔 수 없네요. 마왕님의 꽁냥 스위치가 완전히 켜져 버린 모양이니, 연인으로서 만족시켜 드려야겠어요.」"

[[dialogue]]
speaker = "unk"
original = "アナはそう言うと、１度膝の上から降りて、俺と向き合うように座り直す。"
translation = "아나는 그렇게 말하더니 한 번 무릎 위에서 내려와 나와 마주 보듯 다시 앉는다."

[[dialogue]]
speaker = "アナ"
original = "「よいしょっと……会長、これでキスの準備はノープロブレムです<emoji=heart04>」"
translation = "「영차…… 회장님, 이걸로 키스 준비는 노 프로블럼이에요<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「アナのこと、たくさん可愛がってくださいね……会長<emoji=heart04>」"
translation = "「아나를 많이 예뻐해 주세요…… 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んむっ<emoji=heart04>\u3000ちゅっ……会長<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「음뭇<emoji=heart04> 츄…… 회장님<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして俺たちは、本のことも忘れ、何度も唇を重ねながら、甘く蕩ける時間に溺れていくのだった。"
translation = "그리고 우리들은 책 일도 잊은 채, 몇 번이고 입술을 겹치며 달콤하게 녹아내리는 시간에 빠져드는 것이었다."

