[[dialogue]]
speaker = "unk"
original = "第３話,コハルコの趣味,P"
translation = "제3화, 쿠하루코의 취미, P"

[[dialogue]]
speaker = "unk"
original = "今日はコハルコさんと一緒にＰＣパーツショップの店番をしていたのだが……"
translation = "오늘은 쿠하루코 씨와 함께 PC 부품 샵의 가게를 보고 있었는데……"

[[dialogue]]
speaker = "コハルコ"
original = "「むっすー」"
translation = "「뾰로통─」"

[[dialogue]]
speaker = "レイラ"
original = "「おや、コハルコさん、ずいぶんご機嫌ナナメですね。何かあったんですか？」"
translation = "「오야, 쿠하루코 씨, 상당히 기분이 안 좋으시네요. 무슨 일 있었나요?」"

[[dialogue]]
speaker = "コハルコ"
original = "「聞いてよレイラ。会長さんが浮気したんだよ、う～わ～き～！」"
translation = "「들어봐 레이라. 회장님이 바람피웠어, 바·람!」"

[[dialogue]]
speaker = "レイラ"
original = "「え、こんな<ruby>欲求不満女<rt>むっつりドスケベ</rt></ruby>つかまえて、他にも手を出してたんですか！？\u3000そんな甲斐性が魔王さんにあったとは驚きですね」"
translation = "「에, 이런 <ruby>욕구불만녀<rt>음흉한 왕변태</rt></ruby>를 붙잡아 두고, 다른 데에도 손을 댄 건가요!? 그런 수완이 마왕님에게 있었다니 놀랍네요」"

[[dialogue]]
speaker = "コハルコ"
original = "「はぁ！？\u3000むっつりドスケベ！？」"
translation = "「하아!? 음흉한 왕변태!?」"

[[dialogue]]
speaker = "レイラ"
original = "「だってデスクトップはエッチなゲームのショートカットでいっぱいなんでしょう？」"
translation = "「그야 바탕화면은 야한 게임 단축아이콘으로 가득하잖아요?」"

[[dialogue]]
speaker = "コハルコ"
original = "「っ！\u3000まさか、私のプライベートＰＣにハッキングした！？\u3000それとも店の入荷記録を？\u3000いや、両方とも侵入の形跡はなかったはず！」"
translation = "「윽! 설마, 내 개인 PC를 해킹했어!? 아니면 가게의 입고 기록을? 아니, 둘 다 침입 흔적은 없었을 텐데!」"

[[dialogue]]
speaker = "レイラ"
original = "「おや、ジャスティスウィザードともあろうお方が、恋人ができてあま～くなったんじゃないですか？\u3000コハルコさんのお店の取引業者を洗えば、ゲームの納品記録は確認できます」"
translation = "「오야, 저스티스 위저드나 되는 분이, 애인이 생겨서 물러~진 거 아닌가요? 쿠하루코 씨 가게의 거래처를 뒤지면, 게임 납품 기록은 확인할 수 있습니다」"

[[dialogue]]
speaker = "レイラ"
original = "「実際に販売しているのか、自家消費しているのかは分からないのでカマをかけたんですが……間抜けは見つかったようですね」"
translation = "「실제로 판매하고 있는지, 자가 소비하고 있는지는 모르니까 떠본 건데…… 멍청이는 찾아낸 모양이네요」"

[[dialogue]]
speaker = "コハルコ"
original = "「ぐぬぬぬ……」"
translation = "「구누누누……」"

[[dialogue]]
speaker = "レイラ"
original = "「ふっ、<ruby>完全勝利<rt>パーフェクトビクトリー</rt></ruby>」"
translation = "「훗, <ruby>완전 승리<rt>퍼펙트 빅토리</rt></ruby>」"

[[dialogue]]
speaker = "レイラ"
original = "「ところで、魔王さんはコハルコさんの趣味はご存知なんですか？」"
translation = "「그런데, 마왕님은 쿠하루코 씨의 취미는 알고 계신가요?」"

[[dialogue]]
speaker = "unk"
original = "まぁ、なんとなくは……"
translation = "뭐, 어느 정도는……"

[[dialogue]]
speaker = "レイラ"
original = "「ほら。こんなに理解ある魔王さんが浮気なんてするわけないじゃないですか。何があったんですか？」"
translation = "「거봐요. 이렇게 이해심 넓은 마왕님이 바람 같은 걸 피울 리 없잖아요. 무슨 일이 있었던 건가요?」"

[[dialogue]]
speaker = "レイラ"
original = "「……へ？\u3000魔王さんの次のパソコンはコハルコさんが組むって約束してたのに、お母さんからお下がりをもらっちゃった？」"
translation = "「……헤? 마왕님의 다음 컴퓨터는 쿠하루코 씨가 조립해 주기로 약속했는데, 어머니한테 쓰던 걸 물려받았다고요?」"

[[dialogue]]
speaker = "レイラ"
original = "「えぇ、しょうもな……」"
translation = "「에에, 하찮아……」"

[[dialogue]]
speaker = "コハルコ"
original = "「しょうもないって言うなー！」"
translation = "「하찮다고 하지 마ㅡ!」"

[[dialogue]]
speaker = "コハルコ"
original = "「自分でもめんどくさい彼女だと思うよ。でも、私にとっては大事なことなの！」"
translation = "「나도 내가 성가신 여자라는 거 알아. 하지만, 나한테는 중요한 일이라고!」"

[[dialogue]]
speaker = "コハルコ"
original = "「会長さんと、あれいいね、これいいねって言いながらひとつのパソコンを作り上げたかった……」"
translation = "「회장님이랑, 저거 좋네, 이거 좋네 하면서 하나의 컴퓨터를 만들어 내고 싶었어……」"

[[dialogue]]
speaker = "コハルコ"
original = "「もう、こんな時にモンスター！？\u3000いくよ、会長さん！」"
translation = "「정말, 이럴 때 몬스터!? 가자, 회장님!」"

[[dialogue]]
speaker = "レイラ"
original = "「あ、私も行きます！」"
translation = "「아, 저도 갈게요!」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「照準補正、ターゲット確認」"
translation = "「조준 보정, 타겟 확인」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「イルミナスシュート！」"
translation = "「일루미너스 슛!」"

[[dialogue]]
speaker = "unk"
original = "ドローンから放たれた光弾がモンスターを貫く。魔力と星力の併用にも慣れてきたようだ。"
translation = "드론에서 발사된 광탄이 몬스터를 꿰뚫는다. 마력과 성력의 병용에도 익숙해진 모양이다."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「……ふぅ、これで終わりだね」"
translation = "「……후우, 이걸로 끝이네」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（あ、エッチなゲームの広告がまた変わってる……最近いろいろあったからチェックしてなかったな）"
translation = " (아, 야한 게임 광고가 또 바뀌었어…… 최근 여러 가지 일이 있어서 체크 못 했었네) "

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（たくさん積みもあるし、帰ったらアレもプレイしなきゃ……）"
translation = " (잔뜩 쌓여있는 것도 있고, 돌아가면 저것도 플레이해야지……) "

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（くまさんそふとの新作……主人公の魔族の女の子は、口減らしで森に捨てられてしまう）"
translation = " (쿠마상 소프트의 신작…… 주인공인 마족 여자아이는, 입을 줄이기 위해 숲에 버려지고 말아) "

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（同じ境遇の仲間を見付けて、協力して森の出口を目指す胸熱ストーリー）"
translation = " (같은 처지의 동료를 찾아내서, 협력해서 숲의 출구를 목표로 하는 가슴 뜨거운 스토리) "

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（でも選択肢を誤ると、悪い人さらいや魔獣に捕まってあんなことやこんなことを……）"
translation = " (하지만 선택지를 틀리면, 나쁜 인신매매범이나 마수에게 잡혀서 이런 일이나 저런 일을……) "

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「むふ、むふふふふ……」"
translation = "「무후, 무후후후후……」"

[[dialogue]]
speaker = "unk"
original = "コハルコさーん"
translation = "쿠하루코 씨─"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「ハッ！？\u3000ごめん、考えごとしてた」"
translation = "「핫!? 미안, 생각 좀 하느라」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「……ケガはないかって？\u3000うん、大丈夫。どこもケガしてないよ」"
translation = "「……다친 데는 없냐고? 응, 괜찮아. 어디도 다치지 않았어」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「……ごめんね」"
translation = "「……미안해」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「会長さんは何も悪くないのに、勝手に拗ねたりして」"
translation = "「회장님은 아무 잘못 없는데, 멋대로 삐지거나 해서」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「会長さんはいつも私のこと心配してくれるし、妹たちも気にかけてくれるし……優しくて、強くて、頼もしくて」"
translation = "「회장님은 항상 내 걱정해주고, 여동생들도 신경 써주고…… 다정하고, 강하고, 든든하고」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「エッチなゲームとか、パソコンとか、私の可愛くない趣味も嫌がらないでいてくれる」"
translation = "「야한 게임이라든가, 컴퓨터라든가, 내 귀엽지 않은 취미도 싫어하지 않아 주고」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「なのに、私は小さなことで怒って……ほんと、自分が情けないや」"
translation = "「그런데, 나는 사소한 걸로 화내고…… 정말, 내가 한심해」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「……え、パソコンはお母さんに返す？\u3000いいよ、そんなことしなくて。私が悪いんだし」"
translation = "「……에, 컴퓨터는 어머니한테 돌려드린다고? 됐어, 그러지 않아도 돼. 내가 잘못한 거니까」"

[[dialogue]]
speaker = "unk"
original = "俺がコハルコさんとパソコンを組みたいんです"
translation = "제가 쿠하루코 씨와 컴퓨터를 조립하고 싶은 겁니다"

[[dialogue]]
speaker = "unk"
original = "まだパソコンのことはよく分からない。"
translation = "아직 컴퓨터에 대해서는 잘 모른다."

[[dialogue]]
speaker = "unk"
original = "でも２人で一緒にパーツを選んで、組み立てる。それはとても魅力的だと思う。"
translation = "하지만 둘이서 함께 부품을 고르고, 조립한다. 그것은 매우 매력적이라고 생각한다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんの見ている世界を、俺も見てみたい。"
translation = "쿠하루코 씨가 보고 있는 세계를, 나도 보고 싶다."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「えへへ、ありがとう。会長さんが彼氏で私は幸せ者だね」"
translation = "「에헤헤, 고마워. 회장님이 남자친구라서 난 행복한 사람이네」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「じゃあ、パーツのこと、パソコンのこと、いっぱい教えてあげる。……さ、帰ろっか」"
translation = "「그럼 부품에 대해서, 컴퓨터에 대해서, 잔뜩 가르쳐 줄게. ……자, 돌아가자」"

[[dialogue]]
speaker = "レイラ"
original = "「あのー、助けてくださーい！\u3000壁にはまっちゃって抜けないんですー！\u3000魔王さーん！\u3000コハルコさーん！\u3000あれ、帰っちゃった？\u3000……誰かいませんかー！？」"
translation = "「저기요─, 도와주세요─! 벽에 끼어서 안 빠져요─! 마왕님─! 쿠하루코 씨─! 어라, 가버렸어? ……누구 없나요─!?」"

