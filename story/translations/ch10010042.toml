[[dialogue]]
speaker = "unk"
original = "第２話,突然の同居生活,P"
translation = "제2화, 갑작스러운 동거 생활"

[[dialogue]]
speaker = "unk"
original = "ある年の瀬の日。トイレの電球が切れたため、近くのコンビニに行ってきた。"
translation = "어느 연말의 날. 화장실 전구가 나갔기 때문에, 근처 편의점에 다녀왔다."

[[dialogue]]
speaker = "unk"
original = "電球のついでにいくつか買い物をして、見慣れた道を戻り、同じく見慣れた家へと帰ってくる。"
translation = "전구 사는 김에 몇 가지 쇼핑을 하고, 익숙한 길을 되돌아, 마찬가지로 익숙한 집으로 돌아온다."

[[dialogue]]
speaker = "フィオナ"
original = "「お帰りなさい、あなた」"
translation = "「어서 오세요, 당신」"

[[dialogue]]
speaker = "フィオナ"
original = "「電球、ありました？\u3000……ならよかったです。今、温かいお茶を淹れますね」"
translation = "「전구, 있었나요? ……그렇다면 다행입니다. 지금, 따뜻한 차를 끓여 드릴게요」"

[[dialogue]]
speaker = "unk"
original = "ドアを開けるとフィオナが出迎えてくれる。どうして彼女がここにいるのかというと……"
translation = "문을 열자 피오나가 마중 나와 준다. 어째서 그녀가 여기에 있는가 하면……"

[[dialogue]]
speaker = "フィオナ"
original = "「こんにちは、緋宮会長。今日からしばらくの間、お世話になります」"
translation = "「안녕하세요, 히노미야 회장. 오늘부터 당분간 신세를 지겠습니다」"

[[dialogue]]
speaker = "unk"
original = "こ、こんにちは……？"
translation = "아, 안녕하세요……?"

[[dialogue]]
speaker = "リノ"
original = "「いらっしゃ～い！\u3000せまい家だけど自分の家だと思ってくつろいでってね」"
translation = "「어서 와~! 좁은 집이지만 자기 집이라고 생각하고 편히 쉬렴」"

[[dialogue]]
speaker = "リノ"
original = "「フィオナちゃん家、配管トラブルで改装中なんだって。だから冬休み中はうちで預かることにしたわ。教皇庁も大変ね」"
translation = "「피오나짱네 집, 배관 문제로 개조 중이래. 그래서 겨울 방학 동안은 우리 집에서 맡기로 했어. 교황청도 힘들겠네」"

[[dialogue]]
speaker = "フィオナ"
original = "「無理を言ってしまってすみません。本当に助かりました。ありがとうございます」"
translation = "「무리한 부탁을 드려서 죄송합니다. 정말로 도움이 되었습니다. 감사합니다」"

[[dialogue]]
speaker = "リノ"
original = "「いいのよ～。むしろ来てくれて嬉しいわ～」"
translation = "「괜찮아~. 오히려 와줘서 기쁜걸~」"

[[dialogue]]
speaker = "リノ"
original = "「あ、ごめん。ちょっと電話出るわね……はい、緋宮です。あ、セドナ？\u3000どうしたの、あなたから連絡なんて珍し……観測データに異常？\u3000分かった、私も行くわ」"
translation = "「아, 미안. 잠깐 전화 좀 받을게…… 네, 히노미야입니다. 아, 세드나? 무슨 일이야, 네가 연락하다니 드물…… 관측 데이터에 이상? 알았어, 나도 갈게」"

[[dialogue]]
speaker = "リノ"
original = "「というわけでごめんなさいね。急な出張が入っちゃった。しばらく家を空けるけど、２人なら大丈夫よね？」"
translation = "「그래서 미안하게 됐네. 갑작스러운 출장이 잡혀버렸어. 당분간 집을 비울 건데, 둘이라면 괜찮겠지?」"

[[dialogue]]
speaker = "フィオナ"
original = "「え、あ、はい」"
translation = "「에, 아, 네」"

[[dialogue]]
speaker = "リノ"
original = "「なるべくゆっくり帰ってくるから安心して。あ、でも、２人きりだからってハメを外しすぎちゃダメだからね？\u3000じゃ、行ってきま～す」"
translation = "「되도록 천천히 돌아올 테니 안심해. 아, 그래도, 둘이서만 있다고 너무 들뜨면 안 돼? 그럼, 다녀올게~」"

[[dialogue]]
speaker = "unk"
original = "行ってらっしゃい……"
translation = "다녀오세요……"

[[dialogue]]
speaker = "フィオナ"
original = "「ど、どうしましょう……２人きりになってしまいました」"
translation = "「어, 어떻게 하죠…… 둘이서만 있게 되었어요」"

[[dialogue]]
speaker = "unk"
original = "本当に新婚さんみたいになっちゃった"
translation = "정말 신혼부부처럼 되어버렸다"

[[dialogue]]
speaker = "フィオナ"
original = "「し、新婚！？\u3000そんな梨緒さんみたいなこと言って……でも確かにそうですね」"
translation = "「시, 신혼!? 그런 리오 씨 같은 말을 하고…… 하지만 확실히 그렇네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ならいっそ、やってみましょうか、新婚生活。……ね、あなた？」"
translation = "「그렇다면 차라리, 해볼까요, 신혼 생활. ……있죠, 당신?」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、電球と一緒に流星ライダーグミも買ってきてくれたんですね。ありがとうございます！」"
translation = "「아, 전구와 함께 유성 라이더 젤리도 사다 주셨군요. 감사합니다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「今期バージョンのグミはなかなか手に入らなくて……すごく嬉しいです。ん～、ジューシー！」"
translation = "「이번 시즌 버전 젤리는 구하기 힘들어서…… 정말 기뻐요. 음~, 쥬시!」"

[[dialogue]]
speaker = "フィオナ"
original = "「さっそく姉さんに自慢します。……見て見て、旦那さんが買ってきてくれたよ、と」"
translation = "「당장 언니에게 자랑할 거예요. ……이것 봐, 남편이 사다 줬어, 라고」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、悔しがってる悔しがってる」"
translation = "「후후, 분해하고 있네 분해하고 있어」"

[[dialogue]]
speaker = "unk"
original = "待って、俺のこと旦那さんって！？"
translation = "잠깐, 나를 남편이라고!?"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、梨緒さんのことがあってから、たまにですけど、姉さんとの間ではそう呼んでます」"
translation = "「네, 리오 씨 일이 있은 후부터, 가끔이지만, 언니와의 사이에서는 그렇게 부르고 있어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっと、イヤでしたら控えますけど……イヤじゃない？\u3000ふふ、ありがとうございます」"
translation = "「음, 싫으시다면 삼가겠지만…… 싫지 않으신가요? 후후, 감사합니다」"

[[dialogue]]
speaker = "unk"
original = "俺とフィオナは夕食後、一緒に年末番組を観ていた。"
translation = "나와 피오나는 저녁 식사 후, 함께 연말 프로그램을 보고 있었다."

[[dialogue]]
speaker = "unk"
original = "○×クイズで選んだ選択肢に飛び込み、間違えれば粉だらけになってしまう、定番のやつだ。"
translation = "○× 퀴즈에서 고른 선택지에 뛰어들어, 틀리면 밀가루투성이가 되어버리는, 단골 프로그램이다."

[[dialogue]]
speaker = "フィオナ"
original = "「バラエティってあんまり見てきませんでしたけど、こんな感じなんですね」"
translation = "「버라이어티는 별로 본 적이 없었지만, 이런 느낌이군요」"

[[dialogue]]
speaker = "フィオナ"
original = "「え、セット組みのアルバイトに参加したことあるんですか！？\u3000なるほど、この巨大なセットも人の手で作られてるんですね。当たり前といえば当たり前ですけど、すごいです」"
translation = "「엣, 세트 제작 아르바이트에 참가한 적이 있으신가요!? 과연, 이 거대한 세트도 사람의 손으로 만들어지는 거군요. 당연하다면 당연하지만, 대단해요」"

[[dialogue]]
speaker = "フィオナ"
original = "「次のクイズジャンルは……サブカルですね。『流星ライダー初の女性変身者は５作目で登場した。○か×か』ですか」"
translation = "「다음 퀴즈 장르는…… 서브컬처군요. 『유성 라이더 최초의 여성 변신자는 5편에서 등장했다. ○인가 ×인가』인가요」"

[[dialogue]]
speaker = "unk"
original = "（フィオナの距離が近い……）"
translation = "（피오나의 거리가 가깝다……）"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど、難しい問題ですね。世間でもそう言われているようですが、実は女性変身者は４作目のスピンオフ劇場版で登場しているんです」"
translation = "「과연, 어려운 문제네요. 세상에서도 그렇게 알려져 있는 듯하지만, 사실 여성 변신자는 4편의 스핀오프 극장판에서 등장했어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「そしてその放映日は５作目の女性の変身の１週間前……つまり、答えは×です！」"
translation = "「그리고 그 방영일은 5편 여성의 변신 1주일 전…… 즉, 답은 ×입니다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ほら、やっぱり！\u3000ふふ、回答者さん、粉まみれになっちゃいましたね。芸人としてはその方が美味しいのかもしれませんけど」"
translation = "「거봐, 역시! 후후, 답변자분, 밀가루투성이가 되어버렸네요. 개그맨으로서는 그쪽이 더 좋을지도 모르겠지만요」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、すみません、盛り上がりすぎましたね……いつの間にか密着してしまって」"
translation = "「아, 죄송합니다, 너무 들떴네요…… 어느새 밀착해 버려서」"

[[dialogue]]
speaker = "フィオナ"
original = "「２人きりなんだから、もっと盛り上がろう……？\u3000ふふ、ならとっておきを用意してるんです」"
translation = "「둘이서만 있으니까, 좀 더 즐기자고요……? 후후, 그렇다면 비장의 카드를 준비했어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「……覚悟、してくださいね」"
translation = "「……각오, 하세요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふぅ……流星ライダーセレクション一気見はちょっとやり過ぎでしたかね。いつもならとっくに寝ている時間です」"
translation = "「휴우…… 유성 라이더 셀렉션 몰아보기는 좀 지나쳤을까요. 평소라면 벌써 자고 있을 시간인데요」"

[[dialogue]]
speaker = "フィオナ"
original = "「……さすがに、そろそろ寝ましょうか」"
translation = "「……아무래도, 슬슬 잘까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「今日はすごく楽しかったです。なんだか眠るのがもったいないくらい」"
translation = "「오늘은 정말 즐거웠어요. 왠지 잠드는 게 아까울 정도예요」"

[[dialogue]]
speaker = "フィオナ"
original = "「……明日も、明後日も一緒？\u3000ふふ、そうでした。一緒に暮らしてるんですもんね」"
translation = "「……내일도, 모레도 함께? 후후, 그랬죠. 같이 살고 있는 거였네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「おやすみのキスをください。明日、起きたらおはようのキスをしましょう」"
translation = "「잘 자요 키스를 해주세요. 내일, 일어나면 잘 잤니 키스를 해요」"

[[dialogue]]
speaker = "フィオナ"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

