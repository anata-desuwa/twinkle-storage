[[dialogue]]
speaker = "unk"
original = "第１話,星見家、再雇用,P"
translation = "제1화, 호시미 가문, 재고용"

[[dialogue]]
speaker = "フィオナ"
original = "「この前新しくメイドを２人採用したの。新人メイドの指導、お願いね、キリカ」"
translation = "「요전에 새로 메이드를 두 명 채용했어. 신입 메이드의 지도, 부탁해, 키리카」"

[[dialogue]]
speaker = "キリカ"
original = "「はい、お任せください、お嬢様」"
translation = "「네, 맡겨주십시오, 아가씨」"

[[dialogue]]
speaker = "キリカ"
original = "「どのような出自の者であっても、星見家のメイドとして正しい振る舞いができるよう指導してみせます」"
translation = "「어떤 출신의 사람이라 할지라도, 호시미 가문의 메이드로서 올바른 몸가짐을 할 수 있도록 지도해 보이겠습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「流石はメイド長。そう言ってくれるなら心強いね。早速、その内の１人を連れてきたから」"
translation = "「역시 메이드장. 그렇게 말해주니 든든하네. 마침 그중 한 명을 데려왔으니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「入って、マリオン」"
translation = "「들어와, 마리온」"

[[dialogue]]
speaker = "マリオン"
original = "「はい、フィオナお嬢様」"
translation = "「네, 피오나 아가씨」"

[[dialogue]]
speaker = "キリカ"
original = "「マ、マリオン……！？」"
translation = "「마, 마리온……!?」"

[[dialogue]]
speaker = "マリオン"
original = "「改めまして、星見家メイド隊として復帰いたしました、マリオン・ネイマールと申します。至らぬ身ですが、何卒よろしくお願いいたしますね」"
translation = "「다시 한번, 호시미 가문 메이드대로 복귀한 마리온 네이마르라고 합니다. 부족한 몸이지만, 아무쪼록 잘 부탁드려요」"

[[dialogue]]
speaker = "キリカ"
original = "「おっ、お嬢様！？\u3000何故、星見家に砂をかけたマリオンを再雇用など……！」"
translation = "「아, 아가씨!? 어째서 호시미 가문에 흙탕물을 뿌린 마리온을 재고용하다니……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「星見家とネビュラの連絡役としてね。過去はどうあれ、今はネビュラと星騎士は協力関係だし、パイプはあった方がいいから」"
translation = "「호시미 가문과 네뷸라의 연락 담당으로서 말이야. 과거야 어찌 됐든 지금은 네뷸라와 성기사는 협력 관계고, 파이프는 있는 편이 좋으니까」"

[[dialogue]]
speaker = "マリオン"
original = "「その点において、私はうってつけではないですか？\u3000ネビュラとの仲介もお任せください♪\u3000もちろんメイドのお仕事も誠心誠意させていただきます♪」"
translation = "「그런 점에서 제가 제격이지 않나요? 네뷸라와의 중재도 맡겨주세요♪ 물론 메이드 업무도 성심성의껏 하겠습니다♪」"

[[dialogue]]
speaker = "キリカ"
original = "「し、しかし、私は賛成いたしかねます。いつまた反旗を翻すか……」"
translation = "「하, 하지만 저는 찬성하기 어렵습니다. 언제 다시 반기를 들지……」"

[[dialogue]]
speaker = "マリオン"
original = "「そう思われるのも無理はないでしょう。失ってしまった信頼は、献身的な働きによって取り戻すしかありません」"
translation = "「그렇게 생각하시는 것도 무리는 아니겠죠. 잃어버린 신뢰는 헌신적인 노력을 통해 되찾을 수밖에 없으니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「私が怪しい動きをしていないか、キリカさんが一番近くで見張っていればよろしいのでは？\u3000なんなら寝食やお風呂も共に──」"
translation = "「제가 수상한 움직임을 보이지 않는지, 키리카 씨가 가장 가까이서 감시하면 되지 않을까요? 아니면 의식주나 목욕도 함께──」"

[[dialogue]]
speaker = "キリカ"
original = "「入りません。お嬢様が決定したならば、星見家メイド隊のメイド長として、粛々と従うのみです」"
translation = "「하지 않습니다. 아가씨께서 결정하셨다면, 호시미 가문 메이드대의 메이드장으로서 묵묵히 따를 뿐입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「じゃあ、マリオンさんはキリカの下で指導を受けてね。復帰する前とさほど変わってもいないけれど」"
translation = "「그럼 마리온 씨는 키리카 밑에서 지도를 받아. 복귀하기 전과 크게 달라진 건 없겠지만」"

[[dialogue]]
speaker = "マリオン"
original = "「かしこまりました、お嬢様」"
translation = "「알겠습니다, 아가씨」"

[[dialogue]]
speaker = "マリオン"
original = "「キリカさん、『元メイド長』などという大層な肩書は忘れていただいて、平のメイドの１人としてたっぷりコキ使ってくださいませ♪」"
translation = "「키리카 씨, 『전 메이드장』이라는 거창한 직함은 잊어주시고, 평메이드 중 한 명으로서 마음껏 부려 먹어 주시옵소서♪」"

[[dialogue]]
speaker = "キリカ"
original = "「……よろしくお願いします。至らぬ点があったら、厳しく指導していきますので」"
translation = "「……잘 부탁드립니다. 부족한 점이 있다면 엄격하게 지도해 나갈 테니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、キリカさんの厳しい指導……楽しみです」"
translation = "「후후, 키리카 씨의 엄격한 지도…… 기대되네요」"

[[dialogue]]
speaker = "マリオン"
original = "「ですがそんな苦虫を噛み潰したような顔をしないでくださいな。せっかくのお可愛らしい顔立ちが台無しになってしまいます」"
translation = "「하지만 그렇게 쓴벌레를 씹은 듯한 표정은 짓지 말아주세요. 귀한 미모가 다 망가져 버리잖아요」"

[[dialogue]]
speaker = "キリカ"
original = "「はぁ……まったく、この人は……！」"
translation = "「하아…… 정말이지, 이 사람은……!」"

[[dialogue]]
speaker = "unk"
original = "メイド隊に出戻りメイド（他、新人１名）が加わったことで、メイド長・キリカの心労が増すかと思われたが──"
translation = "메이드대에 돌아온 메이드(그 외 신입 1명)가 합류하면서, 메이드장 키리카의 심려가 깊어질 것으로 보였으나──"

[[dialogue]]
speaker = "新人メイド"
original = "「あっ、ごめんなさい、マリオンさん。わたし、花瓶の水替えを忘れてしまって──」"
translation = "「앗, 죄송해요, 마리온 씨. 제가 꽃병 물 갈아주는 걸 잊어버려서──」"

[[dialogue]]
speaker = "マリオン"
original = "「ホールのですか？\u3000それでしたら、先ほど替えておきましたよ」"
translation = "「홀 말인가요? 그건 아까 갈아두었답니다」"

[[dialogue]]
speaker = "新人メイド"
original = "「あ、ありがとうございます！」"
translation = "「고, 고맙습니다!」"

[[dialogue]]
speaker = "マリオン"
original = "「ついでに床拭きと窓拭きも終えてますので、厨房のお手伝いをお願いしますね」"
translation = "「그 김에 바닥 청소와 창문 닦기도 끝냈으니, 주방 일 좀 도와주시겠어요?」"

[[dialogue]]
speaker = "新人メイド"
original = "「そこまで終わってるんですか！？\u3000同じ新人なのに、マリオンさん、スゴいです……わたしも頑張らなきゃ……！」"
translation = "「벌써 거기까지 끝난 건가요!? 같은 신입인데 마리온 씨 정말 대단해요…… 저도 힘내야지……!」"

[[dialogue]]
speaker = "キリカ"
original = "「私が新人に教えることがなくなってしまうではないですか」"
translation = "「제가 신입에게 가르칠 게 없어져 버리지 않습니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「マリオンさん１人でメイド１０人分の仕事をこなしてくれてるね。キリカも仕事が楽になったんじゃない？」"
translation = "「마리온 씨 혼자서 메이드 10인분의 일을 해내고 있네. 키리카도 일이 편해지지 않았어?」"

[[dialogue]]
speaker = "キリカ"
original = "「ええ……人形による圧倒的な物量に加えて、個々の能力も非常に優秀で……」"
translation = "「예…… 인형을 이용한 압도적인 물량에 더해, 개개인의 능력도 매우 우수해서……」"

[[dialogue]]
speaker = "キリカ"
original = "「やはり彼女は最高峰のメイドです。少々悔しいですが、そればかりは認めざるを得ません」"
translation = "「역시 그녀는 최고의 메이드입니다. 조금 분하지만, 그것만큼은 인정하지 않을 수 없군요」"

[[dialogue]]
speaker = "新人メイド"
original = "「どうやったら、マリオンさんみたいなすごいメイドさんになれますか？」"
translation = "「어떻게 하면 마리온 씨 같은 대단한 메이드가 될 수 있나요?」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、なんてお可愛いらしい……♪\u3000初々しさがまた庇護欲を刺激します」"
translation = "「어머어머, 어쩜 이리 귀여울까……♪ 풋풋함이 또 보호 본능을 자극하네요」"

[[dialogue]]
speaker = "マリオン"
original = "「そうですね、では、私が手取り足取り、ちょっと過剰なくらいにスキンシップを交えながら……」"
translation = "「글쎄요, 그럼 제가 하나하나, 조금 과할 정도로 스킨십을 섞어가며……」"

[[dialogue]]
speaker = "新人メイド"
original = "「えっ、あの、あのっ……」"
translation = "「엣, 저기, 저기요……」"

[[dialogue]]
speaker = "マリオン"
original = "「マンツーマンでメイドの極意、お教えいたしますね。今晩、私の部屋にいらして──」"
translation = "「일대일로 메이드의 비법을 전수해 드릴게요. 오늘 밤 제 방으로 오세요──」"

[[dialogue]]
speaker = "キリカ"
original = "「マリオン！\u3000他のメイドを口説くのは厳禁です！」"
translation = "「마리온! 다른 메이드를 꼬시는 건 엄격히 금지입니다!」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、残念。メイド長に怒られちゃうのでこれくらいにしておきましょうね」"
translation = "「어머나, 아쉬워라. 메이드장님께 혼나버리니 이 정도로 해두죠」"

[[dialogue]]
speaker = "キリカ"
original = "「まったく……アレさえなければ、完璧なメイドなのですが……」"
translation = "「정말이지…… 그것만 없다면 완벽한 메이드입니다만……」"

[[dialogue]]
speaker = "新人メイド"
original = "「マリオンさん、素敵……キュン<emoji=heart04>」"
translation = "「마리온 씨, 멋져요…… 두근<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「あの人のせいで、メイド隊の風紀が乱れてしまいます……！」"
translation = "「저 사람 때문에 메이드대의 풍기가 문란해지고 있습니다……!」"

[[dialogue]]
speaker = "unk"
original = "やはりキリカの気苦労は絶えなさそうで、平穏だった星見家メイド隊に一匙のスパイスが加わったのだった。"
translation = "역시 키리카의 고생은 끝이 없을 듯했고, 평온했던 호시미 가문 메이드대에 한 스푼의 향신료가 더해진 것이었다."

