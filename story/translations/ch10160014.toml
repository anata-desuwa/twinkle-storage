[[dialogue]]
speaker = "unk"
original = "第４話,不知火ヒトリは夜空を見上げる,P"
translation = "제4화, 시라누이 히토리는 밤하늘을 올려다본다, P"

[[dialogue]]
speaker = "unk"
original = "星徒会の仕事が長引き、閉門ギリギリの時間になってしまった。"
translation = "성도회 업무가 길어져 교문 폐쇄 직전 시간이 되어버렸다."

[[dialogue]]
speaker = "ヒトリ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ……会長さん、お疲れ様です」"
translation = "「앗…… 회장님, 수고 많으십니다」"

[[dialogue]]
speaker = "unk"
original = "……ヒトリはなにしてるの？"
translation = "……히토리는 뭐 하고 있어?"

[[dialogue]]
speaker = "ヒトリ"
original = "「──わたし、ですか？\u3000わたしはただ、『みんな』と夜空を眺めていたんです。月に１度くらい、こうしてるんです」"
translation = "「──저 말인가요? 저는 그저 『모두』와 밤하늘을 바라보고 있었어요. 한 달에 한 번 정도는 이렇게 하거든요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「モンスターが出たから変身してるわけじゃありませんよ。こっちのほうが『みんな』も落ち着いてくれるので」"
translation = "「몬스터가 나타나서 변신하고 있는 게 아니에요. 이쪽이 『모두』도 더 진정해주니까요」"

[[dialogue]]
speaker = "unk"
original = "……みんなって？"
translation = "……모두라니?"

[[dialogue]]
speaker = "ヒトリ"
original = "「『みんな』は『みんな』です。わたしに『憑いて』きてくれている、みんなのことです」"
translation = "「『모두』는 『모두』예요. 저에게 『붙어』 있어 주는 모두를 말하는 거예요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「……会長さんはあんまり『みんな』を怖がっているイメージはなかったんですけど、やっぱり怖いですか？」"
translation = "「……회장님은 딱히 『모두』를 무서워하는 이미지는 아니었지만, 역시 무서우신가요?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「皆さん、わたしが『みんな』のことを話すと……少し怖がってしまうんです。仕方のないことなのかなって思いますけど、やっぱり寂しいです」"
translation = "「여러분, 제가 『모두』에 대해 이야기하면…… 조금 무서워하시거든요. 어쩔 수 없는 일이라고 생각하지만, 역시 외로워요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「幽霊の中には、確かに悪い幽霊もいます。人を呪ったり、憑りついていたずらしたりする、そういう幽霊ですね」"
translation = "「유령 중에는 분명 나쁜 유령도 있어요. 사람을 저주하거나, 빙의해서 장난을 치는 그런 유령들이죠」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でも、ほとんどの幽霊はそうじゃありません。ただこの世にいたいだけ……そんな幽霊ばかりなんです」"
translation = "「하지만 대부분의 유령은 그렇지 않아요. 그저 이 세상에 있고 싶을 뿐…… 그런 유령들뿐이에요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「意外、でしたか？」"
translation = "「의외, 였나요?」"

[[dialogue]]
speaker = "unk"
original = "ヒトリはそういう幽霊の友達になってあげてるんだな"
translation = "히토리는 그런 유령들의 친구가 되어주고 있구나"

[[dialogue]]
speaker = "ヒトリ"
original = "「いえ、逆ですよ。わたしが友達になってもらってるんです」"
translation = "「아니요, 반대예요. 제가 친구가 되어달라고 하는 거예요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「みんな、優しいんですよ？\u3000おかげで、ヒトのお友達は全然できませんでしたけど、寂しいって思ったことはありません」"
translation = "「모두들 상냥하다고요? 덕분에 인간 친구는 전혀 생기지 않았지만, 외롭다고 생각한 적은 없어요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「……わたし、『みんな』に、何かできることはないかって、ずっと考えてるんです」"
translation = "「……저, 『모두』를 위해 제가 할 수 있는 일은 없을까 하고 계속 생각하고 있어요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「幽霊がいるっていうと、皆さん、早く成仏させてあげたほうがいいとか、除霊したほうがいいとか、そういうことを言うじゃないですか」"
translation = "「유령이 있다고 하면 여러분, 빨리 성불시켜 주는 게 좋다거나 제령하는 게 좋다거나 그런 말씀을 하시잖아요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「成仏できずに困っている幽霊がいるのは、事実です。だから、そういう霊の未練を取り除いて、成仏させてあげるのはいいことだと思います」"
translation = "「성불하지 못해 곤란해하는 유령이 있는 건 사실이에요. 그래서 그런 영의 미련을 없애주고 성불시켜 주는 건 좋은 일이라고 생각해요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「でも、みんながみんな、そういうわけじゃない。ただこの世にいたい、そう考えている霊も、多いんです」"
translation = "「하지만 모두가 다 그런 건 아니에요. 그저 이 세상에 있고 싶다, 그렇게 생각하는 영들도 많거든요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そういう霊の、居場所を作ってあげたい……それが、幽霊の姿が見えて、言葉を聞けるわたしの、役目なのかなって……」"
translation = "「그런 영들의 안식처를 만들어주고 싶어…… 그것이 유령의 모습이 보이고 말을 들을 수 있는 저의 역할이 아닐까 하고……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「……って、ごめんなさい。聞かれてもいないのにわたし、何話してるんでしょう……」"
translation = "「……앗, 죄송해요. 묻지도 않으셨는데 저, 무슨 이야기를 하는 걸까요……」"

[[dialogue]]
speaker = "unk"
original = "いや、ヒトリのことが聞けて嬉しいよ"
translation = "아니, 히토리의 이야기를 들을 수 있어서 기뻐"

[[dialogue]]
speaker = "ヒトリ"
original = "「……そ、そうですか？\u3000それならよかったです」"
translation = "「……그, 그런가요? 그렇다면 다행이에요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「な、なんでこんなこと、話しちゃったんだろ……まだ誰にも話したことがなかったのに」"
translation = "「왜, 왜 이런 걸 말해버렸을까…… 아직 아무에게도 말한 적 없었는데」"

[[dialogue]]
speaker = "unk"
original = "それにしても『居場所』を作る、か……"
translation = "그나저나 『안식처』를 만든다, 라……"

[[dialogue]]
speaker = "ヒトリ"
original = "「……は、はい。まだ、どういう風にその役目をこなせばいいのか、わからないんですけど」"
translation = "「……네, 네. 아직 어떻게 그 역할을 수행해야 할지 모르겠지만요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「その答えが見つかるまでは、わたしが『みんな』の居場所になってあげたいなって思うんです……」"
translation = "「그 답을 찾을 때까지는 제가 『모두』의 안식처가 되어주고 싶다고 생각해요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「お、おかしいですか？\u3000その、こんなこと人に話したことなくて……」"
translation = "「이, 이상한가요? 그게, 이런 거 남한테 말해본 적이 없어서……」"

[[dialogue]]
speaker = "unk"
original = "『夢』をしっかり持ってて、素直に尊敬した"
translation = "『꿈』을 확고하게 가지고 있어서 솔직히 존경스러워"

[[dialogue]]
speaker = "ヒトリ"
original = "「あ、ありがとうございます……っ、会長さんにそんな風に言ってもらえると、う、嬉しいです……」"
translation = "「고, 고맙습니다…… 회장님께 그런 말을 들으니 기, 기뻐요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わっ……み、『みんな』もありがとうって言ってます。会長さん、流石ですね。『みんな』からも認めてもらえて、凄いですっ」"
translation = "「와…… 모, 『모두』도 고맙다고 말하고 있어요. 회장님, 역시 대단하시네요. 『모두』에게도 인정받다니, 정말 대단해요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わ、わたしも、会長さんに話せてよかったです……っ」"
translation = "「저, 저도, 회장님께 이야기할 수 있어서 다행이에요……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！\u3000てーてー！」"
translation = "「테ー테ー! 테ー테ー!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆ、ゆーちゃん！\u3000だから、違うってば！\u3000か、会長さんは優しいから、話しやすいのっ。変な意味はないんだよっ」"
translation = "「유, 유우짱! 그러니까, 아니라니까! 회, 회장님은 상냥하시니까, 말하기 편한 거야. 이상한 의미는 없다구」"

[[dialogue]]
speaker = "ヒトリ"
original = "「か、会長さんもその……わ、わたし、変なこと言っちゃったかもしれないですけど、あんまり気にしないでくださいっ……」"
translation = "「회, 회장님도 그…… 저, 제가 이상한 소리를 했을지도 모르겠지만, 너무 신경 쓰지 말아 주세요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そ、それよりっ、今日はもうお仕事終わりでしたら、会長さんも一緒に星を見ませんか……？」"
translation = "「그, 그것보다, 오늘 이제 업무 끝이시라면, 회장님도 같이 별을 보지 않으실래요……?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「その……『みんな』もそう言ってますし……」"
translation = "「그게…… 『모두』도 그렇게 말하고 있고……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー？」"
translation = "「유우?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「い、いいでしょ！\u3000『みんな』だってそう思ってるよね！？\u3000ゆーちゃんも別に会長さんが居たって平気でしょ！？」"
translation = "「괘, 괜찮잖아! 『모두』도 그렇게 생각하고 있지!? 유우짱도 딱히 회장님이 있어도 괜찮지!?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「って、す、すみませんすみません、お仕事終わりで疲れてますよねっ。なんか変なお誘いしちゃって、ごめんなさいっ……！」"
translation = "「앗, 죄, 죄송합니다 죄송합니다, 업무 끝나서 피곤하시죠. 왠지 이상한 권유를 해버려서, 죄송해요……!」"

[[dialogue]]
speaker = "unk"
original = "お言葉に甘えて、俺も星を見てから帰ろうかな"
translation = "호의를 받아들여서, 나도 별을 보고 나서 돌아갈까"

[[dialogue]]
speaker = "ヒトリ"
original = "「あっ……い、いいんですか？」"
translation = "「앗…… 저, 정말 괜찮나요?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はいっ、ありがとうございますっ……嬉しいですっ」"
translation = "「네, 네엣, 감사합니다…… 기뻐요」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！」"
translation = "「테ー테ー!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ち、違うの！\u3000そういうのじゃないんだってば！」"
translation = "「아, 아니라니까! 그런 게 아니라고 했잖아!」"

[[dialogue]]
speaker = "unk"
original = "俺はヒトリが誘ってくれたことに嬉しさを感じつつ。"
translation = "나는 히토리가 권유해 준 것에 기쁨을 느끼면서."

[[dialogue]]
speaker = "unk"
original = "その夜は、みんなで星空を見上げながら、穏やかな時間を過ごしたのだった。"
translation = "그날 밤은, 다 함께 밤하늘을 올려다보며, 평온한 시간을 보냈던 것이었다."

