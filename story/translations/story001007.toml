[[dialogue]]
speaker = "グロリア"
original = "「ど、どういうことですか！？\u3000プルちゃんがパテル様で……堕天使もパテル様で……パテル様がたくさん！？」"
translation = "「어, 어떻게 된 건가요!? 플짱이 파텔 님이고…… 타락천사도 파텔 님이고…… 파텔 님이 잔뜩!?」"

[[dialogue]]
speaker = "パテル"
original = "「話が長くなるんだけどー、どこから説明しよっかなー」"
translation = "「이야기가 길어질 것 같은데─, 어디부터 설명할까나─」"

[[dialogue]]
speaker = "パテル"
original = "「フィーニスの塔を出た堕天使パテルは逃げるために分裂してー、そのうち１体が正気を取り戻しちゃってー、それがあたしってわけ。霊体だからできることだね」"
translation = "「피니스의 탑을 나간 타락천사 파텔은 도망치기 위해 분열했고─, 그중 한 개체가 제정신을 차려버렸는데─, 그게 바로 나라는 말씀. 영체라서 가능한 일이지.」"

[[dialogue]]
speaker = "パテル"
original = "「ハイ、説明終わり！\u3000思ったより短かったね、アハ♪」"
translation = "「하이, 설명 끝! 생각보다 짧았네, 아하♪」"

[[dialogue]]
speaker = "グロリア"
original = "「な、なるほど……？」"
translation = "「그, 그렇군요……?」"

[[dialogue]]
speaker = "パテル"
original = "「ところでその立派な剣使わないの？\u3000かっこいいのに」"
translation = "「그나저나 그 훌륭한 검은 안 써? 멋진데.」"

[[dialogue]]
speaker = "グロリア"
original = "「えっ？\u3000はい、私の剣は自分で使うためのものではありませんから……」"
translation = "「엣? 네, 제 검은 스스로 사용하기 위한 것이 아니니까요……」"

[[dialogue]]
speaker = "グロリア"
original = "「では堕天使のパテル様の目的は……？\u3000どうしてたくさんの堕天使が私たちのところに……？」"
translation = "「그럼 타락천사 파텔 님의 목적은……? 어째서 수많은 타락천사가 저희 쪽에……?」"

[[dialogue]]
speaker = "パテル"
original = "「それはね……あなたの命だよ、グロリア」"
translation = "「그건 말이야…… 네 목숨이야, 글로리아.」"

[[dialogue]]
speaker = "unk"
original = "早くグロリアさんのところに行かないと……！"
translation = "빨리 글로리아 씨가 있는 곳으로 가야 해……!"

[[dialogue]]
speaker = "フラン"
original = "「クソ！\u3000ちょこまかと鬱陶しい！」"
translation = "「젠장! 이리저리 움직여서 성가시네!」"

[[dialogue]]
speaker = "フラン"
original = "「ぐっ……邪魔すんなぁああっ！！」"
translation = "「큭…… 방해하지 마아아앗!!」"

[[dialogue]]
speaker = "パテル"
original = "「堕天使とは守護天使がリクリエの瘴気に染まったもの。世界を破滅に導くべく、破壊の限りを尽くす存在だ」"
translation = "「타락천사란 수호천사가 리크리에의 장기에 물든 것. 세계를 파멸로 이끌기 위해 파괴만을 일삼는 존재지.」"

[[dialogue]]
speaker = "パテル"
original = "「だけどフィーニスの塔の戦闘で傷ついた堕天使パテルは、リクリエに従うことすらなくなり、本能のままに動くだけのものになった」"
translation = "「하지만 피니스의 탑 전투에서 상처 입은 타락천사 파텔은 리크리에를 따르는 것조차 잊고, 본능대로 움직일 뿐인 존재가 되었어.」"

[[dialogue]]
speaker = "グロリア"
original = "「本能……？\u3000守護天使の本能ですか？」"
translation = "「본능……? 수호천사의 본능 말인가요?」"

[[dialogue]]
speaker = "パテル"
original = "「そう。あたしは──パテルは死神。死を強く願うあなたに引き寄せられた。火に<ruby>誘<rt>いざな</rt></ruby>われる虫のようにね」"
translation = "「그래. 나는── 파텔은 사신. 죽음을 강렬히 원하는 너에게 이끌린 거야. 불나방처럼 말이지.」"

[[dialogue]]
speaker = "パテル"
original = "「喜びなよグロリア。あれはあなたが待ち望んだ死神だよ」"
translation = "「기뻐해, 글로리아. 저건 네가 기다리고 기다리던 사신이야.」"

[[dialogue]]
speaker = "グロリア"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "グロリア"
original = "「ああ、とうとうこの日が来たのですね……私が女神様の元に……パパとママのところに行く時が……」"
translation = "「아아, 드디어 이 날이 왔군요…… 제가 여신님 곁으로…… 아빠와 엄마가 있는 곳으로 갈 때가……」"

[[dialogue]]
speaker = "グロリア"
original = "「しかも守護天使様の鎌で逝けるなんて光栄です……」"
translation = "「게다가 수호천사님의 낫으로 갈 수 있다니 영광이에요……」"

[[dialogue]]
speaker = "パテル"
original = "「おっと！」"
translation = "「오옷!」"

[[dialogue]]
speaker = "パテル"
original = "「あいつらの標的にはあたしも入ってるけどね。守護天使パテルの意識を持ってるあたしが邪魔みたいだから」"
translation = "「저 녀석들의 표적에는 나도 포함되어 있거든. 수호천사 파텔의 의식을 가진 내가 방해되는 모양이야.」"

[[dialogue]]
speaker = "グロリア"
original = "「！\u3000そうでした、私はともかくプルちゃんは守らないと……！」"
translation = "「! 그랬죠, 저는 그렇다 쳐도 플짱은 지켜야만……!」"

[[dialogue]]
speaker = "パテル"
original = "「あたしが守護天使でも？\u3000ウソついてたのに？」"
translation = "「내가 수호천사인데도? 거짓말까지 했는데?」"

[[dialogue]]
speaker = "グロリア"
original = "「はい。プルちゃんがパテル様でも、一緒にスタンプラリーを回ったプルちゃんには変わりませんから」"
translation = "「네. 플짱이 파텔 님이라 해도, 함께 스탬프 랠리를 돌았던 플짱인 것에는 변함이 없으니까요.」"

[[dialogue]]
speaker = "パテル"
original = "「あたしがグロリアをエサにしていたとしても？」"
translation = "「내가 글로리아를 미끼로 썼다고 해도?」"

[[dialogue]]
speaker = "グロリア"
original = "「はい。それでも。友達……と言っていいのかわかりませんが、私は楽しかったです。だからプルちゃんは死神にはやらせません……！」"
translation = "「네. 그래도요. 친구……라고 해도 좋을지는 모르겠지만, 저는 즐거웠어요. 그러니까 플짱을 사신에게 넘기지 않겠어요……!」"

[[dialogue]]
speaker = "パテル"
original = "「へー、そうなんだー。やっぱりお姉ちゃんにするならグロリアだね♪\u3000おっぱいもふかふかだし♪」"
translation = "「헤─, 그렇구나─. 역시 언니로 삼는다면 글로리아네♪ 가슴도 푹신푹신하고♪」"

[[dialogue]]
speaker = "パテル"
original = "「でもね、グロリア。グロリアがそう言ってくれるなら、あたしも誠意を見せるよ」"
translation = "「하지만 말이야, 글로리아. 글로리아가 그렇게 말해준다면 나도 성의를 보일게.」"

[[dialogue]]
speaker = "グロリア"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "パテル"
original = "「『善い人だから早く天に召された』──なんてウソっぱちさ。あなたの両親は不運で死んだだけ」"
translation = "「『착한 사람이니까 빨리 하늘의 부름을 받았다』── 같은 건 새빨간 거짓말이야. 네 부모님은 운이 없어서 죽었을 뿐이지.」"

[[dialogue]]
speaker = "グロリア"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "パテル"
original = "「グロリアだって本当はわかってるでしょ。それならおじいちゃんおばあちゃんはみんな悪い人になっちゃう」"
translation = "「글로리아도 사실은 알고 있잖아. 그렇다면 할아버지 할머니들은 다 나쁜 사람이 되어버리는걸.」"

[[dialogue]]
speaker = "パテル"
original = "「早く死ぬ善人もいれば、長く生きる善人もいる。早く死ぬ悪人もいて、長く生きる悪人もいる」"
translation = "「빨리 죽는 선인도 있으면, 오래 사는 선인도 있어. 빨리 죽는 악인도 있고, 오래 사는 악인도 있지.」"

[[dialogue]]
speaker = "パテル"
original = "「あなたの両親はただモンスターに殺されただけ。死神のあたしが言うんだもの、間違いない」"
translation = "「네 부모님은 그냥 몬스터에게 살해당한 것뿐이야. 사신인 내가 말하는 거니까 틀림없어.」"

[[dialogue]]
speaker = "グロリア"
original = "「それ……は……」"
translation = "「그건…… 그……」"

[[dialogue]]
speaker = "パテル"
original = "「善い人になれば両親の元に行けると、あなたは『死』に縋っている。でもね、それは勝手な思い込みだ」"
translation = "「착한 사람이 되면 부모님 곁으로 갈 수 있다고 너는 『죽음』에 매달리고 있어. 하지만 그건 제멋대로인 착각이야.」"

[[dialogue]]
speaker = "パテル"
original = "「ついでに言うと、死んだ人の魂が行くのは女神様のところじゃなくて、《円環》のラクシャのところかなー……とマジレスしてみるのでした」"
translation = "「덧붙여 말하자면, 죽은 사람의 영혼이 가는 곳은 여신님이 아니라 《원환》의 라크샤 쪽일까나─…… 하고 진지하게 답변해 봅니다.」"

[[dialogue]]
speaker = "パテル"
original = "「ねぇ、両親の後を追うのはやめなよ。そういうのはね、無駄死にっていうんだよ」"
translation = "「있지, 부모님 뒤를 쫓는 건 관둬. 그런 건 말이야, 개죽음이라고 하는 거야.」"

[[dialogue]]
speaker = "グロリア"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "グロリア"
original = "「そんな……私は……私は……」"
translation = "「그런…… 저는…… 저는……」"

[[dialogue]]
speaker = "パテル"
original = "「守護天使の立場で個人にこういうこと言いたくないんだけど──いやまぁ今までそんな機会なかったんだけど、あたしなりに親切心で──」"
translation = "「수호천사 입장에서 개인에게 이런 말 하기 싫지만── 뭐 지금까지 그런 기회도 없었지만, 나름대로 친절심에──」"

[[dialogue]]
speaker = "？？？"
original = "「──うるせえ」"
translation = "「──시끄러워.」"

[[dialogue]]
speaker = "パテル"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker = "フラン"
original = "「うるせえっつってんだよ！！」"
translation = "「시끄럽다고 했잖아!!」"

