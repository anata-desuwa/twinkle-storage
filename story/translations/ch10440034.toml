[[dialogue]]
speaker = "unk"
original = "第４話,プリムラとイチャイチャ訓練,P"
translation = "제4화, 프리뮬라와 꽁냥꽁냥 훈련, P"

[[dialogue]]
speaker = "unk"
original = "その日は休日で、プリムラが俺の家へと遊びにやって来ていた。"
translation = "그날은 휴일로, 프리뮬라가 우리 집에 놀러 왔다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「さあ、眷族よ！\u3000訓練を始めるのじゃ！」"
translation = "「자, 권속이여! 훈련을 시작하마!」"

[[dialogue]]
speaker = "unk"
original = "それはいいけど、どうして俺の部屋なんだ？"
translation = "그건 좋은데, 어째서 내 방이야?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そ、それはじゃな……今日は戦闘訓練ではなく、『精神の訓練』をするからじゃ！」"
translation = "「그, 그것은 말이다…… 오늘은 전투 훈련이 아니라, 『정신의 훈련』을 할 것이기 때문이니라!」"

[[dialogue]]
speaker = "unk"
original = "『精神の訓練』という言葉に首を傾げる俺に、プリムラは続ける。"
translation = "『정신의 훈련』이라는 말에 고개를 갸웃거리는 나에게, 프리뮬라는 이어나간다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「これまでも人前で、リバースフォームで暴走し……『赤ちゃん化』という恥を晒してきたのじゃ」"
translation = "「지금까지 사람들 앞에서, 리버스 폼으로 폭주하여…… 『아기화』라는 망신을 당해왔느니라」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「だからこそ、暴走しないように精神も鍛える必要がある」"
translation = "「그렇기에, 폭주하지 않도록 정신을 단련할 필요가 있다」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――というわけで、今日はリバースフォームでイチャイチャするのじゃ！」"
translation = "「――그런 고로, 오늘은 리버스 폼으로 꽁냥꽁냥하는 것이니라!」"

[[dialogue]]
speaker = "unk"
original = "なるほど……？"
translation = "과연……?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ！\u3000その顔は、我がイチャイチャしたい口実に訓練を持ち出したと思っておるじゃろ！？」"
translation = "「앗! 그 표정은, 내가 꽁냥꽁냥하고 싶은 핑계로 훈련을 끌어들였다고 생각하고 있지!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そんなわけなかろう！\u3000我はあくまで真面目に――むにゅにゅぅ～……フヘへへぇ<emoji=heart04>」"
translation = "「그럴 리가 없지 않느냐! 나는 어디까지나 진지하게―― 무뉴뉴우~…… 후헤헤헤에<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「って、言い終わる前にほっぺをもちもち触り始めるでない！」"
translation = "「이봐, 말을 다 끝내기도 전에 볼을 쫀득쫀득 만지지 마라!」"

[[dialogue]]
speaker = "unk"
original = "ごめん、プリムラが可愛くてつい"
translation = "미안, 프리뮬라가 귀여워서 그만"

[[dialogue]]
speaker = "unk"
original = "俺はそのまま、プリムラに顔を近づけて――"
translation = "나는 그대로, 프리뮬라에게 얼굴을 가까이 대고――"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ！？\u3000んむっ……ちゅっ<emoji=heart04>」"
translation = "「응!? 응믓…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そっと唇を重ねる。"
translation = "살며시 입술을 겹친다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「こ、こら！\u3000いきなりキスしてよいとは言っておらんぞっ<emoji=heart04>」"
translation = "「이, 이봐! 갑자기 키스해도 좋다고는 안 했다구웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ、ま、待て！\u3000今は暴走しないように、ドキドキをクールダウンしているところで……んむっ<emoji=heart04>」"
translation = "「앗, 기, 기다려! 지금은 폭주하지 않도록, 두근거림을 쿨다운하고 있는 중이라…… 응믓<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちゅっ……ちゅっ<emoji=heart04>\u3000んん～っ！？<emoji=heart04><emoji=heart04>」"
translation = "「쪽…… 쪽<emoji=heart04> 응응~!?<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスを続けていると、プリムラの身体から魔力が溢れ、淡く光り出した。"
translation = "키스를 계속하고 있자, 프리뮬라의 몸에서 마력이 흘러넘쳐, 희미하게 빛나기 시작했다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「……ばぶぅ～っ♪」"
translation = "「……바부~앗♪」"

[[dialogue]]
speaker = "unk"
original = "すると、プリムラの精神が暴走して『赤ちゃん化』してしまった。"
translation = "그러자, 프리뮬라의 정신이 폭주하여 『아기화』 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "しまった……やり過ぎた……！"
translation = "아차…… 너무 심했나……!"

[[dialogue]]
speaker = "unk"
original = "先週は星徒会が忙しく、ほとんど触れ合えていなかった。その反動で、つい気持ちが高ぶってしまったのだ。"
translation = "지난주에는 성도회가 바빠서, 거의 스킨십을 하지 못했다. 그 반동으로, 나도 모르게 기분이 고조되어 버린 것이다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あぁ～いっ<emoji=heart04>\u3000パパぁ～～っ<emoji=heart04>」"
translation = "「아앙~잇<emoji=heart04> 아빠아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "赤ちゃん化したプリムラが抱き着いてくる。"
translation = "아기화된 프리뮬라가 매달려온다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んんぅ～っ<emoji=heart04>\u3000パパ、しゅき～っ<emoji=heart04>」"
translation = "「응응으~잇<emoji=heart04> 아빠, 죠아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……そういえば、２人きりの状態でプリムラが『赤ちゃん化』するのは初めてだな、と油断していると。"
translation = "……그러고 보니, 둘만 있는 상태에서 프리뮬라가 『아기화』 되는 것은 처음이구나, 하고 방심하고 있자."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ん～っ、ちゅ～っ<emoji=heart04>」"
translation = "「응~잇, 쪽~잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょっ……んん～っ！？"
translation = "잠깐…… 응응~!?기"

[[dialogue]]
speaker = "unk"
original = "俺はプリムラから逆に唇を奪われ、キスされてしまった。"
translation = "나는 프리뮬라에게 반대로 입술을 빼앗겨, 키스를 당해버렸다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フへへぇ<emoji=heart04>\u3000パパ、もっとキスぅ～<emoji=heart04>」"
translation = "「후헤헤에<emoji=heart04> 아빠, 더 키스으~<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちゅっ<emoji=heart04>\u3000ちゅ～っ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 쪽~잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――だ、ダメだ……これはマズい……！"
translation = "――안, 안 된다…… 이건 위험해……!"

[[dialogue]]
speaker = "unk"
original = "赤ちゃん化しているプリムラとキスするのは……なんだか非常にいけないことをしている気がする……！"
translation = "아기화되어 있는 프리뮬라와 키스하는 건…… 왠지 굉장히 못된 짓을 하고 있는 기분이 들어……!"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「パパ、ぷいむらとキス、イヤ～？」"
translation = "「아빠, 푸이무라랑 키스, 시러~?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「うぅ～……ぷいむら、パパしゅきなのに～」"
translation = "「으으~…… 푸이무라, 아빠 죠아하는데~」"

[[dialogue]]
speaker = "unk"
original = "――そ、そんな瞳をうるうるされてしまうと……！"
translation = "――그, 그런 눈동자로 글썽거리면……!"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――あっ、ふへへへぇ<emoji=heart04>\u3000パパ、キスいいの～？」"
translation = "「――앗, 후헤헤헤에<emoji=heart04> 아빠, 키스 조아~?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「じゃあもっと……ちゅっちゅ～っ<emoji=heart04>」"
translation = "「그럼 더…… 쪽쪽~잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからしばらくして、ようやく暴走が収まって。"
translation = "그로부터 한동안 지나서야, 겨우 폭주가 가라앉았다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「うぅ……また暴走してしまったのじゃ……」"
translation = "「으으…… 또 폭주해 버렸느니라……」"

[[dialogue]]
speaker = "unk"
original = "う、うん……"
translation = "어, 응……"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「って、何を照れた顔をしとるんじゃ！？\u3000赤ちゃんの我とキスするのはハレンチじゃぞ！？」"
translation = "「그보다, 왜 그렇게 수줍어하는 얼굴을 하고 있는 것이냐!? 아기인 나와 키스하는 건 파렴치하느니라!」"

[[dialogue]]
speaker = "unk"
original = "――いや、こっちだって、理性を振り絞って頑張ったんだよ！？"
translation = "――아니, 이쪽도 이성을 쥐어짜며 노력했다고!?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「と、とにかく一旦休憩じゃ！」"
translation = "「어, 어쨌든 일단 휴식이라!」"

[[dialogue]]
speaker = "unk"
original = "ひと息ついたあと、プリムラは咳払いをする。"
translation = "한숨 돌린 후, 프리뮬라는 헛기침을 한다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「……眷族よ。今日は訓練の他に、将来のことについても話しておこうと思っておったのじゃ」"
translation = "「……권속이여. 오늘은 훈련 외에, 장래의 일에 대해서도 이야기해 두려고 생각했느니라」"

[[dialogue]]
speaker = "unk"
original = "将来のこと？"
translation = "장래의 일?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「うむ。この前、将来について考える機会があってな」"
translation = "「우무. 이전에, 장래에 대해 생각할 기회가 있어서 말이다」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族とは恋人として付き合っておるのじゃから……」"
translation = "「권속과는 연인으로서 사귀고 있으니까……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我は学園の本校を卒業するまでに、『嫁』になる修業をすると決めたのじゃ！」"
translation = "「나는 학원 본교를 졸업할 때까지, 『아내』가 될 수행을 하기로 결심했느니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「嫁としても最強になり、眷族が周囲に自慢できるようにしてやらねばな……！」"
translation = "「아내로서도 최강이 되어, 권속이 주변에 자랑할 수 있도록 해주어야 하니까 말이다……!」"

[[dialogue]]
speaker = "unk"
original = "照れながらも真剣にそう言うプリムラに、俺は胸が熱くなって。"
translation = "수줍어하면서도 진지하게 그렇게 말하는 프리뮬라에게, 나는 가슴이 뜨거워져서."

[[dialogue]]
speaker = "unk"
original = "プリムラ……好きだ！"
translation = "프리뮬라…… 좋아해!"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ！？\u3000ま、待て！\u3000またキスをする気か……！？」"
translation = "「앗!? 기, 기다려! 또 키스를 할 셈이냐……!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――暴走しても、恋人として受け止める、じゃと？」"
translation = "「――폭주해도, 연인으로서 받아들이겠다, 고?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「い、いくら恋人でも、赤ちゃん化するのは恥ずかしいのじゃぞ！？」"
translation = "「아, 아무리 연인이라도, 아기화되는 건 부끄럽단 말이다!?」"

[[dialogue]]
speaker = "unk"
original = "でも、もっとプリムラとイチャイチャしたい"
translation = "하지만, 좀 더 프리뮬라와 꽁냥꽁냥하고 싶어"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「……っ！\u3000し、仕方のない眷族なのじゃ<emoji=heart04>」"
translation = "「……앗! 어쩔 수 없는 권속이니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ならば今度は、我が眷族を暴走させるくらいイチャイチャしてやるのじゃ<emoji=heart04>」"
translation = "「그렇다면 이번에는, 내가 권속을 폭주시키 정도로 꽁냥꽁냥해 줄 것이니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ、こら<emoji=heart04>\u3000耳元でそんな、好き好き言うでない<emoji=heart04>」"
translation = "「앗, 이봐<emoji=heart04> 귓가에서 그렇게, 좋아한다 좋아한다 말하지 마라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――我にも愛を囁いて欲しいじゃと？\u3000し、仕方あるまい。これも訓練じゃからな<emoji=heart04>」"
translation = "「――나에게도 사랑을 속삭여 달라고? 어, 어쩔 수 없군. 이것도 훈련이니까 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「……す、好きじゃぞ、眷族<emoji=heart04>」"
translation = "「……조, 좋아하느니라, 권속<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ……ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちは、また暴走してしまいそうなくらいじっくりと、イチャイチャの訓練に励むのだった。"
translation = "이렇게 우리들은, 다시 폭주해 버릴 정도로 정성스럽게, 꽁냥꽁냥 훈련에 힘쓰는 것이었다."

