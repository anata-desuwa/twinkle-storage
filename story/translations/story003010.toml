[[dialogue]]
speaker = "unk"
original = "時間を置き去りにするように、流星寮のクリスマスパーティーは進んで行く。"
translation = "시간을 떼어놓고 가듯, 유성 기숙사의 크리스마스 파티는 계속 진행된다."

[[dialogue]]
speaker = "unk"
original = "普段は夜更かしを禁じられている附属生も、今日だけは許されていた。"
translation = "평소에는 늦게까지 깨어 있는 것이 금지된 부속생들도, 오늘만큼은 허락되었다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「はーっはっは！\u3000これを見ろ！\u3000流星ライダー！」"
translation = "「하ー하하! 이것을 보아라! 유성 라이더!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「卑怯だぞ、仮面怪人！\u3000人質を取るなんて、それでも騎士か！」"
translation = "「비겁하다, 가면 괴인! 인질을 잡다니, 그러고도 기사냐!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うぐっ、それを言われるとつらいがっ……いいんだ、今日の私は仮面怪人だからなっ！」"
translation = "「으윽, 그 말을 들으니 괴롭군 하지만…… 괜찮다, 오늘의 나는 가면 괴인이니까!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふははははは、見よっ！\u3000この動きについてこられるかっ？」"
translation = "「후하하하하하, 보아라! 이 움직임을 따라올 수 있겠느냐?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なんて不気味な動きっ、さすがは怪人だ！\u3000しかし、あたしも流星ライダーだ！\u3000そんな動きには惑わされないぞ！」"
translation = "「어쩜 저리 기분 나쁜 움직임을, 과연 괴인이로군! 하지만 나도 유성 라이더다! 그런 움직임에 현혹되지 않는다고!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「唸れ流星！\u3000轟け雷鳴！\u3000いざ必殺の……トルネードスピンキィィーーーーック！！！！」"
translation = "「울부짖어라 유성! 울려 퍼져라 뇌명! 자, 필살의…… 토네이도 스핀 키이이이이익!!!!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ぎゃああああああ～～～～っ！\u3000仮面がっ！\u3000命よりも大事な私の仮面がぁぁ～～～っ！」"
translation = "「갸아아아아아아~~! 가면이! 목숨보다 소중한 나의 가면이이이이~~!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「正義は勝ぁつ！\u3000流星ライダーの大勝利だ！」"
translation = "「정의는 승리한다! 유성 라이더의 대승리다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……この寸劇は何かしら？」"
translation = "「……이 촌극은 대체 뭐죠?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はいっ、これは『流星ライダーＶＳ仮面怪人』ですね。附属生には大人気みたいです」"
translation = "「네, 네엣, 이건 『유성 라이더 VS 가면 괴인』이에요. 부속생들에게는 아주 인기가 많은 것 같아요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「確かに盛り上がっていますわね。私には理解できないけど……」"
translation = "「확실히 분위기가 고조되어 있군요. 저는 이해할 수 없지만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さーん！\u3000とっても可愛いですよー！\u3000キューティープリティー、ア・ポ・ロ！」"
translation = "「언니ー! 너무너무 귀여워요ー! 큐티 프리티, 아·포·로!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「かわいいじゃなくてかっこいいだ！\u3000流星ライダーなんだぞ！」"
translation = "「귀여운 게 아니라 멋있는 거다! 유성 라이더라고!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「それは無理ですね。クリスマスフォームのアポロ様のかわゆさは上限突破していますから」"
translation = "「그건 무리네요. 크리스마스 폼인 아폴로 님의 귀여움은 상한치를 돌파했으니까요.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「むぎゅ～～～～っ」"
translation = "「무규우우우우우」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こ、こらぁ！\u3000勝手に抱きつくんじゃなぁーい！！」"
translation = "「이, 이봐! 마음대로 껴안지 마아아ー!!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「順番ですよ。さあ、アポロ様を愛でたい方は列に並んで下さい」"
translation = "「차례대로예요. 자, 아폴로 님을 귀여워해 주고 싶은 분은 줄을 서 주세요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お嬢様は既に散々抱き締めているはずですが？」"
translation = "「아가씨께서는 이미 실컷 껴안으셨을 텐데요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何度でもいいの！\u3000姉さんの可愛さには勝てないんだから」"
translation = "「몇 번이라도 좋아! 언니의 귀여움에는 당해낼 수 없으니까.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「星見家の方々……一体どうされましたの？\u3000アポロさんへの熱狂ぶりが普通ではないのですが……」"
translation = "「호시미 가문 분들…… 대체 어떻게 된 거죠? 아폴로 씨에 대한 열광적인 모습이 예사롭지 않은데요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい……アポロ様のクリスマスフォームが愛らしすぎて……お嬢様もメイド長も、お屋敷中のみんなが暴走している状態で……」"
translation = "「네…… 아폴로 님의 크리스마스 폼이 너무 사랑스러워서…… 아가씨도 메이드장님도, 저택 안의 모두가 폭주하고 있는 상태라……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「確かにあの戦闘服は可愛すぎますの。夢中になってしまう気持ちも分かりますわ。ですけど、それにしてもあの様子は常軌を逸しているのでは……？」"
translation = "「확실히 저 전투복은 너무 귀엽군요. 푹 빠져버리는 마음도 이해는 가요. 하지만 그렇다 해도 저 모습은 상궤를 벗어난 게 아닌지……?」"

[[dialogue]]
speaker = "unk"
original = "ずっと可愛がれなかったから仕方ない"
translation = "그동안 귀여워해 주지 못했으니까 어쩔 수 없지."

[[dialogue]]
speaker = "unk"
original = "みんなアポロ大好きだから"
translation = "모두 아폴로를 정말 좋아하니까."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そうですわね、ひとまず見なかったことに致しますわ」"
translation = "「그렇군요, 일단 못 본 것으로 하겠어요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あっ、寮長さん！\u3000おなか空いてませんか？\u3000焼きたてピザのデリバリーですよ？」"
translation = "「앗, 기숙사장님! 배고프지 않으세요? 갓 구운 피자 배달 왔어요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「インラインスケートで配っているんですの？\u3000随分と器用なことをしますのね」"
translation = "「인라인스케이트를 타고 배달하는 건가요? 상당히 재주가 좋으시군요.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「フィギュアスケーターですから、このくらいは余裕ですよ♪」"
translation = "「피겨 스케이팅 선수니까, 이 정도는 여유예요♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あのっ、ピザを１切れもらっていいですか？」"
translation = "「저기…… 피자 한 조각만 받아도 될까요?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「いいよー。フニちゃんにはこれ！\u3000チーズとハチミツたっぷりのピザ！」"
translation = "「물론이지ー. 후니짱에게는 이거! 치즈랑 꿀이 듬뿍 들어간 피자!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それじゃファンサービス行くよっ！\u3000トウクリスティー――からのっ、連続高速スピンっ」"
translation = "「그럼 팬 서비스 간다! 토 크리스티――에서 이어지는, 연속 고속 스핀!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「こんな間近で舞亜さんの演技が見られるなんてっ……幸せすぎておかしくなっちゃいます……」"
translation = "「이렇게 가까이서 마이아 씨의 연기를 볼 수 있다니…… 너무 행복해서 이상해질 것 같아요……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あはははっ、今日はいっぱいサービスしちゃうよ！\u3000なんたってクリスマスパーティーだからねっ♪」"
translation = "「아하하, 오늘은 서비스 잔뜩 해줄게! 그야 크리스마스 파티니까♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……間近で見ると圧巻ですわね……」"
translation = "「……가까이서 보니 압권이군요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「録画しとけばよかったぁぁぁ！\u3000北海道のみんなにも見せてあげたかったぁ！」"
translation = "「녹화해 뒀어야 했는데에에에! 홋카이도 사람들에게도 보여주고 싶었어요!」"

[[dialogue]]
speaker = "unk"
original = "喜んで撮らせてくれるよ"
translation = "기쁘게 찍게 해줄 거야."

[[dialogue]]
speaker = "unk"
original = "お願いしてみたら？"
translation = "한번 부탁해 보는 건 어때?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ、そうですかねぇ……？\u3000じゃあ頼んでみようかなぁ……」"
translation = "「에헤헤, 그럴까요……? 그럼 한번 부탁해 볼까나……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「フニがここまでデレデレになるとは思いませんでしたわ」"
translation = "「후니가 저렇게까지 헤벌레해질 줄은 몰랐네요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「はぁ、はぁ、はぁ……やっと逃げられたぞ……なんてしつこいんだ、あいつら」"
translation = "「하아, 하아, 하아…… 겨우 도망쳤다…… 어찌나 끈질긴지, 저 녀석들.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「しばし休んで体力を回復させるといい。ほら、チキンを持って来てやったぞ」"
translation = "「잠시 쉬면서 체력을 회복하도록 해라. 자, 치킨을 가져다주마.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「んっ、クリスマスと言えばやっぱりチキンだよな！\u3000もぐもぐもぐもぐ……うん、うまい！」"
translation = "「음, 크리스마스라고 하면 역시 치킨이지! 우물우물우물우물…… 응, 맛있다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王たちも楽しんでるか？\u3000ほら、チキンうまいぞ。ヒルディオーネ、おまえも食え！」"
translation = "「마왕 일행도 즐기고 있냐? 자, 치킨 맛있다구. 힐디오네, 너도 먹어!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ありがとうございます、頂きますわ」"
translation = "「감사합니다, 잘 먹겠어요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ちなみにそのチキンはアニュラスが焼いたやつなっ」"
translation = "「참고로 그 치킨은 아뉴라스가 구운 거라구.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んぐっ！\u3000だ、大丈夫ですの？」"
translation = "「윽! 거, 괜찮은 건가요?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「失礼な。これでも会長からはＯＫをもらっているんだぞ」"
translation = "「무례하군. 이래 봬도 회장에게서는 OK를 받았다고.」"

[[dialogue]]
speaker = "unk"
original = "チキンはＯＫだよ"
translation = "치킨은 OK야."

[[dialogue]]
speaker = "unk"
original = "ケーキは無理だったけどね"
translation = "케이크는 무리였지만 말이야."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そう……でしたら安心して頂きますわ」"
translation = "「그렇……다면 안심하고 먹겠어요.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「可能ならケーキも及第点をもらいたかったんだが……」"
translation = "「가능하다면 케이크도 합격점을 받고 싶었다만……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ケーキは舞亜がいるからなっ。あっちはクリスマスフォームのモチーフがパティシエなんだし、無理するなって」"
translation = "「케이크는 마이아가 있으니까. 저쪽은 크리스마스 폼의 모티프가 파티시에이기도 하고, 무리하지 마.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「わかった。しかし、諦めるつもりはないぞ。いつか必ずおいしいケーキを焼いて見せる！」"
translation = "「알았다. 하지만 포기할 생각은 없다. 언젠가 반드시 맛있는 케이크를 구워 보이고 말겠다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……根性ありますわね」"
translation = "「……근성 하나는 대단하군요.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふふっ、それだけが取り柄だからな」"
translation = "「후훗, 그것만이 장점이니까.」"

[[dialogue]]
speaker = "unk"
original = "他にもいっぱいいいところがある"
translation = "그 외에도 좋은 점이 잔뜩 있어."

[[dialogue]]
speaker = "unk"
original = "根性だけじゃない"
translation = "근성뿐만이 아니야."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そうか？\u3000では私が知らない私を、みんなが知っていると言うことだな」"
translation = "「그런가? 그렇다면 내가 모르는 나를, 모두가 알고 있다는 뜻이겠군.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「今回はいい教訓を得た。私はまた１つ流星の騎士に近づけただろう。ここにいる全員に感謝だ」"
translation = "「이번에 좋은 교훈을 얻었다. 나는 다시 한번 유성의 기사에 가까워졌겠지. 여기 있는 모두에게 감사한다.」"

