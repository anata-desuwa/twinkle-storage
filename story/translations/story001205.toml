[[dialogue]]
speaker = "ナミエル"
original = "「フィオナお嬢様にお掃除を指導するなど、畏れ多いのですが……本当に良いのでしょうか？」"
translation = "「피오나 아가씨께 청소를 지도하다니 송구스럽습니다만…… 정말 괜찮은 걸까요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「いいの、私がやりたいことなんだから。それに、教皇の娘だからって、ちゃんと掃除もできなかったら恥ずかしいでしょう？」"
translation = "「괜찮아, 내가 하고 싶은 일이니까. 게다가 교황의 딸이라고 해서 청소도 제대로 못 하면 창피하잖아?」"

[[dialogue]]
speaker = "フィオナ"
original = "「というわけで、今はナミエルが師匠だよ。掃除ならキリカにも負けないんだから」"
translation = "「그러니까 지금은 나미엘이 스승님이야. 청소라면 키리카에게도 지지 않으니까.」"

[[dialogue]]
speaker = "ナミエル"
original = "「かしこまりました。では今日ばかりは遠慮なく指導させていただきます」"
translation = "「알겠습니다. 그럼 오늘만큼은 사양 않고 지도해 드리겠습니다.」"

[[dialogue]]
speaker = "ナミエル"
original = "「フィオナお嬢様、質問です。この部屋を全体的に掃除する場合、どこから始めるべきでしょうか」"
translation = "「피오나 아가씨, 질문입니다. 이 방을 전체적으로 청소할 경우 어디서부터 시작해야 할까요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは……窓とか？」"
translation = "「그건…… 창문 같은 거?」"

[[dialogue]]
speaker = "ナミエル"
original = "「正解は天井です。一見すると綺麗に見える天井ですが、実は汚れが溜まっています」"
translation = "「정답은 천장입니다. 언뜻 깨끗해 보이는 천장이지만 사실 먼지가 쌓여 있거든요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「また天井を先にしないと、落ちてきた埃などで、掃除した場所が汚れてしまいますから。<ruby>埃<rt>ほこり</rt></ruby>を取る時は、上から下へ、奥から手前へ、が基本です」"
translation = "「또한 천장을 먼저 하지 않으면 떨어진 먼지 등으로 청소한 곳이 더러워지니까요. 먼지를 털 때는 위에서 아래로, 안에서 밖으로가 기본입니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど……。じゃあ天井はどうやって掃除すればいいの？」"
translation = "「과연…… 그럼 천장은 어떻게 청소하면 돼?」"

[[dialogue]]
speaker = "ナミエル"
original = "「リビングであれば、主な汚れは埃ですので、はたきで落としたり、フローリング用のワイパーで拭いていきます」"
translation = "「거실이라면 주요 오염원은 먼지이므로 먼지떨이로 털어내거나 바닥용 와이퍼로 닦아냅니다.」"

[[dialogue]]
speaker = "ナミエル"
original = "「ただしキッチンですと油汚れもあります。こちらはアルカリ性の洗剤が有効です」"
translation = "「다만 주방이라면 기름때도 있습니다. 여기에는 알칼리성 세제가 유효합니다.」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふむふむ、なるほど……」"
translation = "「흠흠, 그렇구나……」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは何してるの？"
translation = "토와짱은 뭐 해?"

[[dialogue]]
speaker = "トワ先生"
original = "「いや～、私も今後のために花嫁力を上げておこうと思って」"
translation = "「아니~ 나도 앞날을 위해 신부력을 높여두려고.」"

[[dialogue]]
speaker = "トワ先生"
original = "「星見家メイド隊のお掃除術は勉強になるなぁ～。今度マリオンにも教えてもらおうかな？」"
translation = "「호시미 가문 메이드대의 청소술은 공부가 된다니까~. 나중에 마리온한테도 가르쳐달라고 할까?」"

[[dialogue]]
speaker = "ナミエル"
original = "「では実際に天井の掃除を始めていきましょう。まずは天井から落ちた埃で床や家具が汚れないよう、新聞紙を敷いていきます。埃が舞うのでマスクも忘れないでくださいね」"
translation = "「그럼 실제로 천장 청소를 시작해 보죠. 우선 천장에서 떨어진 먼지로 바닥이나 가구가 더러워지지 않게 신문지를 깔아둡니다. 먼지가 날리니 마스크도 잊지 마세요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「うん、新聞紙を敷いて……と。じゃあ、ワイパーで天井の埃を拭いて……あ、でもけっこう天井が高いから届かないな……。緋宮会長、脚立ってありますか？」"
translation = "「응, 신문지를 깔고…… 자, 와이퍼로 천장 먼지를 닦고…… 아, 근데 천장이 꽤 높아서 안 닿네……. <u>히노미야</u> 회장님, 사다리 있을까요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます。これで届きますね」"
translation = "「감사합니다. 이제 닿겠네요.」"

[[dialogue]]
speaker = "unk"
original = "（スリットから太ももがチラチラと……）"
translation = "(슬릿 사이로 허벅지가 움찔움찔 보이는데……)"

[[dialogue]]
speaker = "ナミエル"
original = "「緋宮会長、視線がいやらしいですよ」"
translation = "「<u>히노미야</u> 회장님, 시선이 음란해요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「え！？\u3000私、どこかはしたないですか！？」"
translation = "「에!? 나, 어디가 천박해 보여요!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「いえ、懸命に花嫁修業をされているフィオナお嬢様を、<ruby>不埒<rt>ふらち</rt></ruby>な目で見る緋宮会長がいけないのです」"
translation = "「아니요, 열심히 신부 수업을 하시는 피오나 아가씨를 불순한 눈으로 보는 <u>히노미야</u> 회장이 나쁜 겁니다.」"

[[dialogue]]
speaker = "unk"
original = "（ナミエルの視線が痛い……）"
translation = "(나미엘의 시선이 따갑다……)"

[[dialogue]]
speaker = "フィオナ"
original = "「も、もう、ナミエルってば……。その、緋宮会長？\u3000あんまり足やお尻ばっかり見ないでくださいね……？」"
translation = "「머, 정말 나미엘도 참……. 그, <u>히노미야</u> 회장님? 너무 다리나 엉덩이만 보지 말아 주세요……?」"

[[dialogue]]
speaker = "unk"
original = "俺も手伝った方が……"
translation = "나도 돕는 게……"

[[dialogue]]
speaker = "キリカ"
original = "「いえ、時には見守ることも必要です。ナミエルだって、本当は自分で掃除したいのを我慢しているのですから」"
translation = "「아니요, 때로는 지켜보는 것도 필요합니다. 나미엘도 사실은 직접 청소하고 싶은 걸 참고 있는 거니까요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「うぅ……」"
translation = "「으윽……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとう、ナミエル。でも大丈夫だよ」"
translation = "「고마워, 나미엘. 하지만 괜찮아.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ここは私と緋宮会長の家で、自分たちが暮らす家を、自分で掃除するのは当たり前のことなんだから」"
translation = "「여긴 나랑 <u>히노미야</u> 회장의 집이고, 자신들이 살 집을 스스로 청소하는 건 당연한 일이니까.」"

[[dialogue]]
speaker = "フィオナ"
original = "「だから掃除のこといっぱい教えて、ナミエル。好きな人と過ごす場所を、自分の手で綺麗にしたいの」"
translation = "「그러니까 청소하는 법 많이 가르쳐줘, 나미엘. 좋아하는 사람과 지낼 장소를 내 손으로 깨끗하게 만들고 싶어.」"

[[dialogue]]
speaker = "ナミエル"
original = "「はい！\u3000お任せください！」"
translation = "「네! 맡겨주십시오!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふぅ、終わりました」"
translation = "「휴우, 끝났어요.」"

[[dialogue]]
speaker = "ナミエル"
original = "「お疲れ様でした。天井から床までピカピカです」"
translation = "「수고하셨습니다. 천장부터 바닥까지 반짝반짝해요.」"

[[dialogue]]
speaker = "unk"
original = "本当に綺麗になった！"
translation = "정말 깨끗해졌어!"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、ありがとうございます」"
translation = "「후후, 감사합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「まだまだ至らないところはありますけど、花嫁修業で少し自信がつきました。今なら式を挙げられる気がします！」"
translation = "「아직 부족한 점은 많지만 신부 수업으로 조금 자신감이 생겼어요. 지금이라면 식을 올릴 수 있을 것 같아요!」"

[[dialogue]]
speaker = "unk"
original = "翌日──"
translation = "다음 날──"

[[dialogue]]
speaker = "イレーナ"
original = "「星見フィオナ。あなたは永遠の愛を誓いますか？」"
translation = "「호시미 피오나. 당신은 영원한 사랑을 맹세합니까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……はい、誓います」"
translation = "「……네, 맹세합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「不思議と、前に誓った時よりも晴れやかな気持ちです。今度こそ元の戦闘服に──」"
translation = "「희한하게도 전에 맹세했을 때보다 상쾌한 기분이에요. 이번에야말로 원래 전투복으로──」"

[[dialogue]]
speaker = "フィオナ"
original = "「あれ、戻らない？」"
translation = "「어라, 안 돌아가네?」"

[[dialogue]]
speaker = "ナミエル"
original = "「私もウェディングドレスのままです。トワ先生の見立てが間違っている可能性もあるのではないでしょうか？」"
translation = "「저도 웨딩드레스 그대로예요. 토와 선생님의 견해가 틀렸을 가능성도 있지 않을까요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うーん、過去の事例から考えても、そんなことないと思うんだけどな。まだフィオナちゃんが満足できてないのかも」"
translation = "「으음…… 과거 사례로 봐도 그럴 리는 없을 텐데. 아직 피오나짱이 만족하지 못한 걸지도.」"

[[dialogue]]
speaker = "フィオナ"
original = "「私が満足していない……？\u3000十分、花嫁になったつもりだったんですけど……」"
translation = "「제가 만족하지 못했다니…… 충분히 신부가 된 셈이었는데요……」"

[[dialogue]]
speaker = "キリカ"
original = "「以前はお嬢様の花嫁力が足りませんでした。ですが今はそれに見合う、緋宮会長の花婿力が伴っていないのかと」"
translation = "「이전에는 아가씨의 신부력이 부족했습니다. 하지만 지금은 그에 걸맞은 <u>히노미야</u> 회장의 신랑력이 따르지 못하는 게 아닌지.」"

[[dialogue]]
speaker = "unk"
original = "花婿力！？"
translation = "신랑력!?군"

[[dialogue]]
speaker = "キリカ"
original = "「ですので──」"
translation = "「그러므로──」"

[[dialogue]]
speaker = "キリカ"
original = "「緋宮会長の花婿修行を開始します！」"
translation = "「<u>히노미야</u> 회장의 신랑 수업을 개시하겠습니다!」"

