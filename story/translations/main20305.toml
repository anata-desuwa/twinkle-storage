[[dialogue]]
speaker = "unk"
original = "第５話,極星学園,B"
translation = "제5화, 극성학원, B"

[[dialogue]]
speaker = "unk"
original = "流星市国全域を襲った攻撃から一夜が明けた。"
translation = "유성시국 전역을 덮친 공격으로부터 하룻밤이 밝았다."

[[dialogue]]
speaker = "unk"
original = "新星・流星両校の星騎士が奮闘してガーディアンを討伐したものの、街には爪痕がそこかしこに残されている。"
translation = "신성·유성 양교의 성기사가 분투하여 가디언을 토벌했으나, 거리에는 상흔이 곳곳에 남아 있다."

[[dialogue]]
speaker = "unk"
original = "今は昨日の騒乱が嘘のように、街はひっそりと静まり返っていた。"
translation = "지금은 어제의 소란이 거짓말인 것처럼 거리는 호젓하게 가라앉아 있었다."

[[dialogue]]
speaker = "unk"
original = "チナとの戦いで得た情報を整理すべく、役員が星徒会室に集まる。"
translation = "치나와의 전투에서 얻은 정보를 정리하기 위해 역원들이 성도회실에 모인다."

[[dialogue]]
speaker = "unk"
original = "流星星徒会からも代表として、副会長のセーラさんに来てもらっていた。"
translation = "유성 성도회에서도 대표로서 부회장인 세라 씨가 와 주었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「昨日の襲撃は被害が大きく、怪我を負って入院になった星騎士も多数でている……」"
translation = "「어제의 습격은 피해가 커서 부상을 입고 입원하게 된 성기사도 다수 나왔어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それでも流星星徒会が陣頭指揮を執り、多くのプリマステラが協力してくれたお陰で、なんとかこの程度の被害に抑えることができた」"
translation = "「그래도 유성 성도회가 진두지휘를 맡고 많은 프리마스텔라가 협력해 준 덕분에 어떻게든 이 정도 피해로 억제할 수 있었지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「敵の強さを考えれば、死者が出なかっただけでも僥倖と言える。……改めて、ご協力感謝します、セーラさん」"
translation = "「적의 강함을 생각하면 사망자가 나오지 않은 것만으로도 요행이라 할 수 있어. ……새삼 협력에 감사드립니다, 세라 씨.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「困った時はお互い様っしょ～。ていうか新星には例の彼女を押さえてもらって、こっちこそ助かったよ」"
translation = "「어려울 때는 서로 돕는 거잖어~. 그보다 신성 쪽에서 그 애를 붙잡아줘서 이쪽이야말로 살았어.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「まぁ、フィオナちゃんが<ruby>人間界<rt>こっち</rt></ruby>にいてくれたら、もっと被害を押さえられたとは思うんだけどね」"
translation = "「뭐, 피오나짱이 인간계에 있어 줬다면 피해를 더 줄일 수 있었을 거라 생각하지만 말이야.」"

[[dialogue]]
speaker = "unk"
original = "いつも明るいセーラさんには珍しく、苦笑いを浮かべる。"
translation = "언제나 밝은 세라 씨로서는 드물게 쓴웃음을 짓는다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「フィオナさんは確か……今、魔界にいるんでしたっけ」"
translation = "「피오나 씨는 분명…… 지금 마계에 있다고 했었죠.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そうそう、出張中～」"
translation = "「맞아 맞아, 출장 중~」"

[[dialogue]]
speaker = "unk"
original = "先日、トリシャさんの占いによって、ある情報がもたらされた。"
translation = "며칠 전, 트리샤 씨의 점괘에 의해 어떤 정보가 전해졌다."

[[dialogue]]
speaker = "unk"
original = "『魔界に邪竜が現れ、大禍が生ずる』──と。"
translation = "『마계에 사룡이 나타나 큰 재앙이 생긴다』──라고."

[[dialogue]]
speaker = "unk"
original = "ネビュラの分析の結果、その邪竜とは、かつて朱雀暦の世界を破壊した煌竜ヴィライアだと判明した。"
translation = "네뷸라의 분석 결과, 그 사룡이란 과거 주작력의 세계를 파괴했던 황룡 비라이아라고 판명되었다."

[[dialogue]]
speaker = "unk"
original = "正確にはヴィライアそのものではなく、森羅暦で発生した同種の存在。"
translation = "정확히는 비라이아 그 자체가 아니라 삼라력에서 발생한 동종의 존재."

[[dialogue]]
speaker = "unk"
original = "以前戦ったヴィライアは朱雀暦のヴィライアだったが、リクリエによって歴史のやり直しが発生している現在の森羅歴にも、それに相当する存在がすでにいるのだという。"
translation = "이전에 싸웠던 비라이아는 주작력의 비라이아였지만, 리크리에에 의해 역사가 다시 쓰여진 현재의 삼라력에도 그에 상당하는 존재가 이미 있다는 것이었다."

[[dialogue]]
speaker = "unk"
original = "フィオナはその脅威に対抗すべく、ネビュラとともに世界樹で魔界に渡っていたのだった。"
translation = "피오나는 그 위협에 대항하기 위해 네뷸라와 함께 세계수를 통해 마계로 건너가 있었다."

[[dialogue]]
speaker = "unk"
original = "ヴィライアの出現が近いことは間違いないが、正確な日時までは特定できていない。"
translation = "비라이아의 출현이 머지않은 것은 확실하지만 정확한 일시까지는 특정하지 못했다."

[[dialogue]]
speaker = "unk"
original = "流星市国の防衛だけを考えるなら、フィオナには一刻も早く戻ってきて欲しいところだが、魔界の脅威を放置するのも得策ではないという事情があった。"
translation = "유성시국의 방위만을 생각한다면 피오나가 하루빨리 돌아와 주길 바라는 참이지만, 마계의 위협을 방치하는 것도 득책이 아니라는 사정이 있었다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だから、詳しい話は副会長のうちが聞くよ。いろいろあったんでしょ？」"
translation = "「그러니까 자세한 이야기는 부회장인 내가 들을게. 여러 가지 일이 있었다며?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、昨日は本当にいろいろあったわね……」"
translation = "「네, 어제는 정말 여러 일이 있었죠……」"

[[dialogue]]
speaker = "unk"
original = "デネブ、極星学園、リクリエの使徒……無視できないワードがいくつも出てきた。"
translation = "데네브, 극성학원, 리크리에의 사도…… 무시할 수 없는 키워드가 몇 가지나 나왔다."

[[dialogue]]
speaker = "unk"
original = "わからないことも多い。だが確かなのは、新たな戦いが本格的に始まったということだった。"
translation = "모르는 것도 많다. 하지만 확실한 것은 새로운 싸움이 본격적으로 시작되었다는 것이었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えーっと……デネブから来たのがガーティアンで？\u3000メカのモンスターが……ゴチャゴチャしてよくわからないわ！」"
translation = "「에 그러니까…… 데네브에서 온 게 가디언이고? 메카 몬스터가…… 뒤죽박죽이라 잘 모르겠어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「議題を大きく２つに分けましょう。デネブおよび極星学園、そしてリクリエの使徒です」"
translation = "「의제를 크게 두 가지로 나누죠. 데네브 및 극성학원, 그리고 리크리에의 사도입니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まずは極星学園についてだな」"
translation = "「우선은 극성학원에 대해서군.」"

[[dialogue]]
speaker = "unk"
original = "昨日、流星市国を攻撃したガーディアン。"
translation = "어제 유성시국을 공격한 가디언."

[[dialogue]]
speaker = "unk"
original = "それを率いていたのは、極星学園の星徒会役員を名乗る星騎士だった。"
translation = "그것을 이끌고 있던 것은 극성학원의 성도회 역원을 자처하는 성기사였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当かどうかはわからないが、彼女は平行世界デネブの極星学園から来たと言っていた」"
translation = "「사실인지는 알 수 없지만, 그녀는 평행세계 데네브의 극성학원에서 왔다고 했어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それがもし真実であれば、何らかの手段で、デネブとこの世界──アルタイルを行き来していることになる」"
translation = "「그게 만약 진실이라면 어떤 수단으로 데네브와 이 세계── 알타이르를 오가고 있다는 게 돼.」"

[[dialogue]]
speaker = "unk"
original = "ありえないことのようではあるが、デネブから何者かがやってくるのは前例がある。"
translation = "있을 수 없는 일 같지만 데네브에서 누군가가 찾아온 전례는 있다."

[[dialogue]]
speaker = "unk"
original = "ここにいるヴィーナスもそうだし、<b>俺たちが戦っていた</b>アポロもデネブから呼ばれていた。"
translation = "여기 있는 비너스도 그렇고, **우리가 싸웠던** 아폴로도 데네브에서 불려 왔었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「香堂チナという星騎士がアルタイルにいないことを考えれば、彼女がデネブから来たという発言は信憑性があると思います」"
translation = "「코도 치나라는 성기사가 알타이르에 없다는 점을 고려하면 그녀가 데네브에서 왔다는 발언은 빙의성이 있다고 생각합니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが──」"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「リクリエは……本当なら、抗えないはずなんだ。もうとっくに成功してたはずなんだ。デネブも、ベガも、抗えなかった」"
translation = "「리크리에느으은…… 원래라면 거역할 수 없어야 해. 이미 진작에 성공했어야 한다고. 데네브도 베가도 거역하지 못했어.」"

[[dialogue]]
speaker = "unk"
original = "もう１つの世界ベガと同じく、デネブはリクリエで滅びたと言われていた。"
translation = "또 다른 세계 베가와 마찬가지로 데네브는 리크리에로 멸망했다고 알려져 있었다."

[[dialogue]]
speaker = "unk"
original = "その言葉が間違いで、デネブが生き残っていたのなら、それ自体は喜ぶべきことではあるのだが……"
translation = "그 말이 틀리고 데네브가 살아남아 있었다면 그 자체는 기뻐해야 할 일이지만……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それに極星学園って何？\u3000デネブの流星学園や新星学園はどうしたのかしら？」"
translation = "「게다가 극성학원이 뭐야? 데네브의 유성학원이나 신성학원은 어떻게 된 걸까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「チナって子は『デネブの流星と新星はリクリエに敗北した』って言ってたかしら～？」"
translation = "「치나라는 애는 『데네브의 유성과 신성은 리크리에에 패배했다』라고 했었나요~?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「彼女の言葉をストレートに受け取るなら、流星と新星が負けた後、残存戦力で立ち上げた新しい組織……ということになるでしょうか」"
translation = "「그녀의 말을 곧이곧대로 받아들인다면 유성과 신성이 패배한 후 잔존 전력으로 세운 새로운 조직……이라는 게 될까요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「決めつけで先入観を持つのは怖い。その件については一旦判断を保留しよう」"
translation = "「단정 지어 선입견을 갖는 건 무서워. 그 건에 대해서는 일단 판단을 보류하자.」"

[[dialogue]]
speaker = "unk"
original = "俺の言葉に、その場のみんなが頷いた。"
translation = "내 말에 그 자리에 있던 모두가 고개를 끄덕였다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「極星学園が何者であれ、一番の問題はこっちにやって来た目的よね～」"
translation = "「극성학원이 누구든 간에 가장 큰 문제는 이쪽으로 온 목적이겠네~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうですね。彼女はアルタイルに来た目的を、宣戦布告だと言っていました」"
translation = "「그렇네요. 그녀는 알타이르에 온 목적을 선전포고라고 했습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「星騎士同士の戦争……ってことになっちゃうのかな。だってあの子も自分の世界を……」"
translation = "「성기사끼리의 전쟁……이라는 게 되어버리는 걸까. 왜냐하면 그 애도 자기 세계를……」"

[[dialogue]]
speaker = "unk"
original = "そう、彼女は私欲や野心でアルタイルを侵略しようとしたわけではない。"
translation = "그렇다, 그녀는 사욕이나 야심으로 알타이르를 침략하려 한 것이 아니다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アルタイルのリクリエを止めれば、デネブのリクリエが加速する。デネブのリクリエを止めれば、アルタイルのリクリエが激化する」"
translation = "「알타이르의 리크리에를 멈추면 데네브의 리크리에가 가속된다. 데네브의 리크리에를 멈추면 알타이르의 리크리에가 격화된다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いいか、これは生存競争だ。生き残るのはデネブかアルタイル、２つに１つ」"
translation = "「잘 들어라, 이건 생존 경쟁이다. 살아남는 건 데네브냐 알타이르냐, 둘 중 하나.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「生き残るのはアタシらだ……！」"
translation = "「살아남는 건 아타시들이다……!」"

[[dialogue]]
speaker = "unk"
original = "彼女は自分の世界を、デネブを守るためにアルタイルを攻撃した。"
translation = "그녀는 자신의 세계를, 데네브를 지키기 위해 알타이르를 공격했다."

[[dialogue]]
speaker = "unk"
original = "それはある意味、この世界を守ろうとギエルらと戦った俺たちと変わらない。"
translation = "그것은 어떤 의미에서 이 세계를 지키려고 기엘 일행과 싸웠던 우리와 다르지 않다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もしあの子が言っていたことが本当なら、私たちはデネブを滅ぼさなくちゃいけないのかしら……？」"
translation = "「만약 그 애가 했던 말이 사실이라면 우리는 데네브를 멸망시켜야만 하는 걸까……?」"

[[dialogue]]
speaker = "unk"
original = "記憶がないとはいえ、デネブはヴィーナスの生まれた世界だ。それを自らの手で滅ぼすなんて、ヴィーナスにはさせられない。"
translation = "기억은 없다고 해도 데네브는 비너스가 태어난 세계다. 그것을 스스로의 손으로 멸망시키는 일 따위 비너스에게 시킬 수 없다."

[[dialogue]]
speaker = "unk"
original = "それにその選択は、デネブにいる無辜の人たちを見捨てることになる。"
translation = "게다가 그 선택은 데네브에 있는 무고한 사람들을 저버리는 것이 된다."

[[dialogue]]
speaker = "unk"
original = "人々を守るために星騎士になった俺たちが、その道を選んでいいものだろうか……？"
translation = "사람들을 지키기 위해 성기사가 된 우리가 그 길을 택해도 되는 것일까……?"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「現時点では、チナの言葉が真実かどうかはわからない。……だろ？」"
translation = "「현시점에서는 치나의 말이 진실인지 아닌지 알 수 없어. ……그렇지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今結論付けるのは早計だ。方針を決める前に、もっと情報を集めなくちゃならない」"
translation = "「지금 결론을 내리는 건 시기상조야. 방침을 정하기 전에 더 많은 정보를 모아야 해.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それもそうね！\u3000リクリエの押し付け合いなんて聞かされて、大人しく従えるもんですか」"
translation = "「그것도 그렇네! 리크리에 떠넘기기 같은 소릴 듣고 고분고분 따를 수 있겠어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、この件は情報収集を進めるということで。後でエスメラルダ先生の分析も聞いてみよう」"
translation = "「그럼 이 건은 정보 수집을 진행하는 걸로 하고. 나중에 에스메랄다 선생님의 분석도 들어보자.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね。今はそれしかないと思います」"
translation = "「그렇네요. 지금은 그것밖에 없다고 생각합니다.」"

[[dialogue]]
speaker = "unk"
original = "デネブと極星学園に対して、今後するべき対応が決まったところで……"
translation = "데네브와 극성학원에 대해 앞으로 취해야 할 대응이 정해진 참에……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「後はリクリエの使徒──だな」"
translation = "「나머지는 리크리에의 사도──군.」"

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会のみんなによると、梨緒はあのジグというリクリエの使徒について、何か知っているようだった。"
translation = "선거관리위원회 모두에 따르면 리오는 그 지그라는 리크리에의 사도에 대해 무언가 알고 있는 듯했다."

[[dialogue]]
speaker = "unk"
original = "だけど梨緒は今──"
translation = "하지만 리오는 지금──"

