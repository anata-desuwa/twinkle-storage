[[dialogue]]
speaker = "unk"
original = "第１話,オルタナティブ宇宙,B"
translation = "제1화, 올터너티브 우주, B"

[[dialogue]]
speaker = "unk"
original = "後に魔王──そして英雄と称されることになる青年ラクシス。"
translation = "후에 마왕── 그리고 영웅이라 칭해지게 될 청년 라크시스."

[[dialogue]]
speaker = "unk"
original = "<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の渡し守であった彼はある日、湖のうねりに呑まれて沈んでしまう。"
translation = "<ruby>경계의 호수<rt>라고 시에로</rt></ruby>의 나루터지기였던 그는 어느 날, 호수의 물결에 휩쓸려 가라앉고 만다."

[[dialogue]]
speaker = "unk"
original = "すると、彼の存在は数奇にも宇宙そのものを飛び越えてしまい──"
translation = "그러자, 그의 존재는 기이하게도 우주 그 자체를 뛰어넘어버려──"

[[dialogue]]
speaker = "unk"
original = "流星町という、見知らぬ異界の地へ降り立つのだった。"
translation = "유성 마을이라는, 낯선 이계의 땅에 내려선다."

[[dialogue]]
speaker = "ラクシス"
original = "「ここは……」"
translation = "「여기는……」"

[[dialogue]]
speaker = "unk"
original = "ラクシスはその場の異質さにすぐ勘づいた。"
translation = "라크시스는 그 장소의 이질적인 느낌을 바로 알아차렸다."

[[dialogue]]
speaker = "unk"
original = "一見すると自分の知る人間界のどこかに見える。だが、<b>何かが違う</b>。"
translation = "언뜻 보면 자신이 아는 인간계의 어딘가로 보인다. 하지만, <ruby>무언가가 다르다<rt>・・・・ ・・・</rt></ruby>."

[[dialogue]]
speaker = "unk"
original = "彼の勘は正しかった。"
translation = "그의 직감은 옳았다."

[[dialogue]]
speaker = "unk"
original = "そこは全く別の宇宙の──<ruby>新次元<rt>オルタナティブ</rt></ruby>な人間界だった。"
translation = "그곳은 완전히 다른 우주의── <ruby>신차원<rt>올터너티브</rt></ruby>인 인간계였다."

[[dialogue]]
speaker = "ラクシス"
original = "「どうして俺はここに……？\u3000湖に溺れて、三界のどこでもない場所に出るなんて……」"
translation = "「어째서 나는 여기에……? 호수에 빠져서, 삼계의 어디도 아닌 장소에 나오다니……」"

[[dialogue]]
speaker = "unk"
original = "予想外の事態にラクシスは困惑した。"
translation = "예상 밖의 사태에 라크시스는 곤혹스러워했다."

[[dialogue]]
speaker = "unk"
original = "別の宇宙に迷い込んでしまった彼を待ち受けていたのは、ある青年との運命的な出会いだった。"
translation = "다른 우주에 길을 잃은 그를 기다리고 있던 것은, 한 청년과의 운명적인 만남이었다."

[[dialogue]]
speaker = "unk"
original = "その青年──名を仮にＳとしよう──はラクシスが異次元の来訪者であることをひと目で見抜き、彼を歓待した。"
translation = "그 청년── 이름을 가령 S라고 하자──은 라크시스가 이차원의 방문자임을 한눈에 알아보고, 그를 환대했다."

[[dialogue]]
speaker = "unk"
original = "そしてＳとの交流を経て、ラクシスは多くの知見を得た。"
translation = "그리고 S와의 교류를 거쳐, 라크시스는 많은 지식을 얻었다."

[[dialogue]]
speaker = "unk"
original = "自分たちの世界に迫っている厄災が『リクリエ』と呼ばれる現象であること。"
translation = "자신들의 세계에 다가오고 있는 재앙이 『리크리에』라고 불리는 현상이라는 것."

[[dialogue]]
speaker = "unk"
original = "また、ここ流星町でもかつて同じ現象が発生していたこと。"
translation = "또한, 여기 유성 마을에서도 이전에 같은 현상이 발생했었다는 것."

[[dialogue]]
speaker = "unk"
original = "そして、その危機は『魔王』という存在によって食い止められたこと。"
translation = "그리고, 그 위기는 『마왕』이라는 존재에 의해 저지되었다는 것."

[[dialogue]]
speaker = "unk"
original = "魔王とは、三種族を統べる唯一の存在であり、霊力と魔力の両用を可能にした器であること。"
translation = "마왕이란, 삼종족을 통솔하는 유일한 존재이며, 영력과 마력의 양쪽 사용을 가능하게 한 그릇이라는 것."

[[dialogue]]
speaker = "unk"
original = "そして最後に──青年Ｓこそリクリエを防いだ『魔王』そのものであることだった。"
translation = "그리고 마지막으로── 청년 S야말로 리크리에를 막은 『마왕』 그 자체라는 것이었다."

[[dialogue]]
speaker = "ラクシス"
original = "「魔王……！\u3000間違いない。まさに俺の──いや、俺たちの求めていた存在だ」"
translation = "「마왕……! 틀림없다. 바로 내가── 아니, 우리들이 바라던 존재다.」"

[[dialogue]]
speaker = "unk"
original = "ラクシスは英雄を切望していた。"
translation = "라크시스는 영웅을 간절히 바라고 있었다."

[[dialogue]]
speaker = "unk"
original = "Ｓという人間は、まさしく彼にとって希望の光だった。"
translation = "S라는 인간은, 바로 그에게 희망의 빛이었다."

[[dialogue]]
speaker = "ラクシス"
original = "「頼む──俺たちの世界を救ってくれ。そのリクリエという厄災が、こちらでも起きているんだ」"
translation = "「부탁한다── 우리들의 세계를 구해줘. 그 리크리에라는 재앙이, 이쪽에서도 일어나고 있어.」"

[[dialogue]]
speaker = "unk"
original = "切なる願い。しかし、Ｓは首を振った。"
translation = "간절한 소원. 하지만, S는 고개를 저었다."

[[dialogue]]
speaker = "unk"
original = "『残念ながら……僕では君の世界へ踏み入ることができない』"
translation = "『유감스럽게도…… 나로서는 너의 세계로 발을 들일 수 없어.』"

[[dialogue]]
speaker = "unk"
original = "『オルタナティブ宇宙間の移動。それは──こちらの常識でさえ、到底ありえないと思われていた離れ業なんだ』"
translation = "『올터너티브 우주 간의 이동. 그것은── 이쪽의 상식으로조차, 도저히 있을 수 없다고 여겨졌던 묘기야.』"

[[dialogue]]
speaker = "ラクシス"
original = "「なら、これは──俺だけの現象だっていうのか……？」"
translation = "「그렇다면, 이것은── 나만의 현상이라는 건가……?」"

[[dialogue]]
speaker = "unk"
original = "後に彼が知ることになる事実によれば──"
translation = "후에 그가 알게 될 사실에 따르면──"

[[dialogue]]
speaker = "unk"
original = "鏡界の湖に溺れた人間は通常、三界の揺らぎに巻き込まれて宇宙の真空へ投げ出される。"
translation = "경계의 호수에 빠진 인간은 통상, 삼계의 흔들림에 휘말려 우주의 진공으로 내던져진다."

[[dialogue]]
speaker = "unk"
original = "そんな絶体絶命の運命を跳ね除け、ラクシスが流星町へ迷い込んだのは、彼だからこその特質だったという。"
translation = "그런 절체절명의 운명을 물리치고, 라크시스가 유성 마을로 길을 잃은 것은, 그이기에 가능한 특질이었다고 한다."

[[dialogue]]
speaker = "unk"
original = "『僕には今の君が、ひとつの<b>花</b>に見える』"
translation = "『나에게는 지금의 네가, 하나의 <b>꽃</b>으로 보여.』"

[[dialogue]]
speaker = "ラクシス"
original = "「花だって？\u3000そんな柄じゃないさ」"
translation = "「꽃이라고? 그럴 성격은 아니야.」"

[[dialogue]]
speaker = "unk"
original = "『印象の話じゃない。ただ、ラクシス。君の存在は……どこか重ね合わさって見えるんだ』"
translation = "『인상에 대한 이야기가 아니야. 다만, 라크시스. 너의 존재는…… 어딘가 겹쳐져 보여.』"

[[dialogue]]
speaker = "unk"
original = "Ｓは言った。"
translation = "S는 말했다."

[[dialogue]]
speaker = "unk"
original = "ラクシスという人物の存在感は、なぜか幾重にも重なった花びらのように映ると。"
translation = "라크시스라는 인물의 존재감은, 왠지 모르게 몇 겹으로 겹쳐진 꽃잎처럼 비친다고."

[[dialogue]]
speaker = "ラクシス"
original = "「重ね合わさって……？\u3000どういうことだ……？」"
translation = "「겹쳐져서……? 무슨 말이야……?」"

[[dialogue]]
speaker = "unk"
original = "『うん。これは僕の見立てだけど……君はいくつもの可能性の中から、か細い道筋を選び取ってここへ来たのかもしれない』"
translation = "『응. 이것은 나의 견해지만…… 너는 수많은 가능성 중에서, 가느다란 길을 선택해서 이곳에 왔을지도 몰라.』"

[[dialogue]]
speaker = "unk"
original = "『さっきも言ったよね。多次元宇宙間の移動なんて、本来はありえない。元の世界から投げ出されれば、どんな生命も無事じゃ済まないからだ』"
translation = "『아까도 말했지. 다차원 우주 간의 이동은, 본래 있을 수 없는 일이야. 원래 세계에서 내던져지면, 어떤 생명도 무사하지 못하니까.』"

[[dialogue]]
speaker = "unk"
original = "『だけど君は、何千億分の一という奇蹟を起こして、このオルタナティブ宇宙へたどり着いた……』"
translation = "『하지만 너는, 수천억 분의 일이라는 기적을 일으켜서, 이 올터너티브 우주에 도착했어……』"

[[dialogue]]
speaker = "unk"
original = "単なる偶然では済ませられないとＳは言う。"
translation = "단순한 우연으로 넘길 수 없다고 S는 말한다."

[[dialogue]]
speaker = "unk"
original = "ラクシスには、そんな奇蹟を手ずから引き寄せることのできる素質があると。"
translation = "라크시스에게는, 그런 기적을 스스로 끌어당길 수 있는 자질이 있다고."

[[dialogue]]
speaker = "unk"
original = "『花びらのように重ね合わさった君の存在がその証拠だ。今も君は、この場にいながらいくつもの可能性を<b>同時に</b>探っている』"
translation = "『꽃잎처럼 겹쳐진 너의 존재가 그 증거야. 지금도 너는, 이 자리에 있으면서 수많은 가능성을 <b>동시에</b> 찾고 있어.』"

[[dialogue]]
speaker = "unk"
original = "『そんな生命は見たことがない。宇宙に１人いるかいないかの特別な存在だと思う』"
translation = "『그런 생명은 본 적이 없어. 우주에 1명 있을까 말까 한 특별한 존재라고 생각해.』"

[[dialogue]]
speaker = "unk"
original = "『平行する全ての可能性を切り<ruby>拓<rt>ひら</rt></ruby>く力──それは他の誰にもない、君だけのものだ』"
translation = "『평행하는 모든 가능성을 개척하는 힘── 그것은 다른 누구에게도 없는, 너만의 것이다.』"

[[dialogue]]
speaker = "ラクシス"
original = "「俺だけの……切り拓く、力……」"
translation = "「나만의…… 개척하는, 힘……」"

[[dialogue]]
speaker = "unk"
original = "特別なのは他ならぬ自分だった。"
translation = "특별한 것은 다름 아닌 자신이었다."

[[dialogue]]
speaker = "unk"
original = "この不思議な巡り合わせも、己に起因したものだと知るラクシス。"
translation = "이 신기한 우연의 만남도, 자신에게 기인한 것임을 아는 라크시스."

[[dialogue]]
speaker = "ラクシス"
original = "「だが、なら結局……自分たちのことは自分たちで何とかするしかない、ってことか」"
translation = "「하지만, 그렇다면 결국…… 우리들의 일은 우리들 스스로 어떻게든 할 수밖에 없다는 건가.」"

[[dialogue]]
speaker = "unk"
original = "悲嘆するラクシスに、『まだ手はある』とＳは言った。"
translation = "비탄하는 라크시스에게, 『아직 방법은 있다』고 S는 말했다."

[[dialogue]]
speaker = "unk"
original = "それは──Ｓに宿る魔王の因子をラクシスが預かり、元の世界へ持ち帰るという方法だった。"
translation = "그것은── S에게 깃든 마왕의 인자를 라크시스가 맡아, 원래 세계로 가져가는 방법이었다."

[[dialogue]]
speaker = "ラクシス"
original = "「この石は……？」"
translation = "「이 돌은……?」"

[[dialogue]]
speaker = "unk"
original = "Ｓが手渡したのはひとつの水晶石だった。"
translation = "S가 건넨 것은 하나의 수정석이었다."

[[dialogue]]
speaker = "unk"
original = "Ｓは言った。リクリエの訪れる世界なら、自分のように魔王の資質を秘めた存在がいる。"
translation = "S는 말했다. 리크리에가 찾아오는 세계라면, 자신처럼 마왕의 자질을 숨긴 존재가 있다."

[[dialogue]]
speaker = "unk"
original = "そして、魔王の因子が封入されたこの水晶石は、その人物に適合するはずだ──と。"
translation = "그리고, 마왕의 인자가 봉입된 이 수정석은, 그 인물에게 적합할 것이다── 라고."

[[dialogue]]
speaker = "ラクシス"
original = "「なるほど──魔王の因子だけを俺の宇宙へ持ち帰れるというわけか」"
translation = "「과연── 마왕의 인자만을 나의 우주로 가져갈 수 있다는 건가.」"

[[dialogue]]
speaker = "ラクシス"
original = "「助かった……！\u3000これがあれば、元の世界でも英雄を探すことができる！」"
translation = "「살았다……! 이것이 있다면, 원래 세계에서도 영웅을 찾을 수 있다!」"

[[dialogue]]
speaker = "unk"
original = "Ｓより水晶石を受け取って、ラクシスは元の世界へ帰る。"
translation = "S에게서 수정석을 건네받고, 라크시스는 원래 세계로 돌아간다."

[[dialogue]]
speaker = "unk"
original = "きっとこの因子に適合する──魔王の器にふさわしい人物がいると信じて。"
translation = "분명 이 인자에 적합한── 마왕의 그릇에 걸맞은 인물이 있을 것이라고 믿으며."

[[dialogue]]
speaker = "unk"
original = "だが──運命は彼をこのままで終わらせなかった。"
translation = "하지만── 운명은 그를 이대로 끝내지 않았다."

[[dialogue]]
speaker = "unk"
original = "Ｓより授かった魔王の因子は、元の宇宙へ戻るやいなや、あろうことかラクシス本人へと適合してしまったのだ。"
translation = "S에게서 받은 마왕의 인자는, 원래 우주로 돌아가자마자, 아니나 다를까 라크시스 본인에게 적합해져 버린 것이다."

[[dialogue]]
speaker = "ラクシス"
original = "「そんなバカな……これじゃ、俺が英雄ってことになってしまう」"
translation = "「말도 안 돼…… 이래선, 내가 영웅이 되어버리잖아.」"

[[dialogue]]
speaker = "unk"
original = "ラクシスは英雄を求めていた。"
translation = "라크시스는 영웅을 바라고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし悪戯な運命は彼を別宇宙へと連れ去り、Ｓとの出会いを通じて、彼自身を英雄なる存在へと昇華させた。"
translation = "하지만 짓궂은 운명은 그를 다른 우주로 데려가, S와의 만남을 통해, 그 자신을 영웅적인 존재로 승화시켰다."

[[dialogue]]
speaker = "ラクシス"
original = "「俺が、魔王……ハハ……そんな大それた願いを抱いたわけじゃなかったんだけどな」"
translation = "「내가, 마왕…… 하하…… 그런 엄청난 소원을 품었던 건 아니었는데.」"

[[dialogue]]
speaker = "ラクシス"
original = "「……でも……案外、歴史に残る英雄なんてのも──こういうものなのかもしれない」"
translation = "「……하지만…… 의외로, 역사에 남는 영웅이라는 것도── 이런 것일지도 모른다.」"

[[dialogue]]
speaker = "unk"
original = "彼はふと思った。"
translation = "그는 문득 생각했다."

[[dialogue]]
speaker = "unk"
original = "もしかするとＳは──こうなることまで予見していたのかもしれないと。"
translation = "어쩌면 S는── 이렇게 될 것까지 예견하고 있었을지도 모른다고."

[[dialogue]]
speaker = "unk"
original = "果たしてラクシスはこの現実を受け入れ、自らの使命を背負い込むことに決めた。"
translation = "결국 라크시스는 이 현실을 받아들이고, 스스로의 사명을 짊어지기로 결심했다."

[[dialogue]]
speaker = "unk"
original = "彼は魔王として──リクリエという厄災を撃ち倒すべく立ち上がった。"
translation = "그는 마왕으로서── 리크리에라는 재앙을 물리치기 위해 일어섰다."

[[dialogue]]
speaker = "unk"
original = "オルタナティブ宇宙で得た知識をもとに、クルセイダースという戦士たちを組織した。"
translation = "올터너티브 우주에서 얻은 지식을 바탕으로, 크루세이더스라는 전사들을 조직했다."

[[dialogue]]
speaker = "unk"
original = "その軌跡は順風満帆ではなかった。"
translation = "그 궤적은 순탄하지 않았다."

[[dialogue]]
speaker = "unk"
original = "立ちはだかる天災に、魔獣たち……前人未到の試みゆえにラクシスへの反発勢力も少なくなかった。"
translation = "가로막는 천재지변에, 마수들…… 전인미답의 시도였기에 라크시스에 대한 반발 세력도 적지 않았다."

[[dialogue]]
speaker = "unk"
original = "『バジュラ教団』と呼ばれる組織もその一つだった。"
translation = "『바쥬라 교단』이라고 불리는 조직도 그중 하나였다."

[[dialogue]]
speaker = "unk"
original = "彼らは<ruby>厄災<rt>リクリエ</rt></ruby>を『天啓』と信じ、世界の真理を解き明かそうとする集団だった。"
translation = "그들은 <ruby>재앙<rt>리크리에</rt></ruby>를 『천계』라고 믿고, 세계의 진리를 밝혀내려는 집단이었다."

[[dialogue]]
speaker = "unk"
original = "『リクリエは崇高なるチャカパラ様の啓示！』"
translation = "『리크리에는 숭고한 차카파라 님의 계시!』"

[[dialogue]]
speaker = "unk"
original = "『チャカパラ神は、女神をも超越する“大宇宙”のご意思である！』"
translation = "『차카파라 신은, 여신을 초월하는 “대우주”의 뜻이다!』"

[[dialogue]]
speaker = "unk"
original = "バジュラ教団の教祖は怪しげな秘術を使い、黙示録なる伝道を通じて信者たちを率いた。"
translation = "바쥬라 교단의 교주는 수상쩍은 비술을 사용하며, 묵시록이라는 전도를 통해 신자들을 이끌었다."

[[dialogue]]
speaker = "unk"
original = "地上の厄災は彼らの信奉する『チャカパラ様』によるもので、またリクリエの到来に応じてその神が降臨すると信じていた。"
translation = "지상의 재앙은 그들이 신봉하는 『차카파라 님』에 의한 것이며, 또한 리크리에의 도래에 따라 그 신이 강림한다고 믿었다."

[[dialogue]]
speaker = "ラクシス"
original = "「すべての人間が人間の味方とは限らない──他の種族についても、同じことか」"
translation = "「모든 인간이 인간의 편은 아니다── 다른 종족에 대해서도, 마찬가지인가.」"

[[dialogue]]
speaker = "unk"
original = "クルセイダースに種族の壁はなかった。"
translation = "크루세이더스에게 종족의 벽은 없었다."

[[dialogue]]
speaker = "unk"
original = "天使が、魔族が、人間が──時に紛れ込んだ一人の魔女が──共に力を合わせて戦った。"
translation = "천사가, 마족이, 인간이── 때로는 섞여 들어온 한 명의 마녀가── 함께 힘을 합쳐 싸웠다."

[[dialogue]]
speaker = "unk"
original = "時にはヒトでない生き物さえも、魔王の軍勢として加わった。"
translation = "때로는 인간이 아닌 생물조차도, 마왕의 군세로서 가담했다."

[[dialogue]]
speaker = "ラクシス"
original = "「おかげで死線を切り抜けられた。ありがとう、ディノレオン」"
translation = "「덕분에 사선을 헤쳐 나올 수 있었다. 고맙다, 디노레온.」"

[[dialogue]]
speaker = "ディノレオン"
original = "「フ──共に参ろうぞ、魔王よ。吾輩も大賢者として……この結末を見届ける責務がある」"
translation = "「흥── 함께 나아가자꾸나, 마왕이여. 나 또한 대현자로서…… 이 결말을 지켜볼 책무가 있다.」"

[[dialogue]]
speaker = "unk"
original = "ラクシスの従えていた剣虎の使い魔もその一体だった。"
translation = "라크시스가 거느렸던 검호의 사역마도 그중 하나였다."

[[dialogue]]
speaker = "unk"
original = "剣虎は自らを大賢者と名乗り、魔王と共に幾多もの戦線を切り抜けていった。"
translation = "검호는 스스로를 대현자라고 칭하며, 마왕과 함께 수많은 전선을 헤쳐 나갔다."

[[dialogue]]
speaker = "unk"
original = "セレーネ流星群──"
translation = "셀레네 유성군──"

[[dialogue]]
speaker = "unk"
original = "リクリエ危機終盤の流れ星の雨に対しても、彼はその拳でもって撃退した。"
translation = "리크리에 위기 종반의 별똥별의 비에 대해서도, 그는 그 주먹으로 격퇴했다."

[[dialogue]]
speaker = "unk"
original = "ラクシスがいなければ、三界は無数の隕石衝突に見舞われ、世界は崩壊していただろう。"
translation = "라크시스가 없었다면, 삼계는 무수한 운석 충돌을 겪고, 세계는 붕괴했을 것이다."

[[dialogue]]
speaker = "unk"
original = "そうして──旧森羅暦を一掃するはずだったリクリエは初の失敗を迎える。"
translation = "그렇게 해서── 구 신라력을 일소했을 리크리에는 최초의 실패를 맞이한다."

[[dialogue]]
speaker = "ラクシス"
original = "「俺のやるべきことは……すべて終わった……」"
translation = "「내가 해야 할 일은…… 전부 끝났다……」"

[[dialogue]]
speaker = "unk"
original = "彼は魔王と、そして英雄として讃えられた。"
translation = "그는 마왕으로, 그리고 영웅으로 칭송받았다."

[[dialogue]]
speaker = "unk"
original = "そんな彼の隣には、いつも──月のように淑やかな女性が立っていた。"
translation = "그런 그의 옆에는, 언제나── 달처럼 정숙한 여성이 서 있었다."

