[[dialogue]]
speaker = "unk"
original = "第４話,素直すぎる子と素直になれない子,P"
translation = "제4화, 너무 솔직한 아이와 솔직해지지 못하는 아이, P"

[[dialogue]]
speaker = "unk"
original = "新星学園のカフェテリアには、お腹を空かせたエンジュとメテオラの姿があった。"
translation = "신성학원의 카페테리아에는 배가 고픈 엔주와 메테오라의 모습이 있었다."

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ジューシーハンバーグと揚げたてドーナツ、持ってきたぞー！\u3000めちゃめちゃうまそーだなー！」"
translation = "「쥬시 함바그랑 갓 튀긴 도넛 가져왔어! 엄청 맛있어 보인다!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「おお……ドーナツがまだじゅわじゅわ鳴ってる……！」"
translation = "「오오…… 도넛이 아직 지글지글 소리를 내고 있어……!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「いっただきまーす！\u3000ばくっ！\u3000ん～～～っ！？\u3000なんだこれ、うまぁああぁぁ！\u3000こんなにふわふわなのに、汁がじょばじょばなハンバーグ初めてだぞーー！」"
translation = "「잘 먹겠습니다! 덥석! 으으으음!? 뭐야 이거, 맛있어어어어! 이렇게 폭신폭신한데 육즙이 쥬르륵 나오는 함바그는 처음이야!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「はぁぁん……揚げたてのドーナツは格別ぅ……！」"
translation = "「하아앙…… 갓 튀긴 도넛은 각별하네……!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ドーナツもおいしそうだなー！\u3000あたしにも一口くれだぞ！」"
translation = "「도넛도 맛있어 보여! 나도 한입만 줘!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「いいけど、ハンバーグとトレードだからな」"
translation = "「좋지만 함바그랑 트레이드다」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「やったー！\u3000ぱくっ、もぐもぐ……ん～～っ！\u3000ドーナツもうめー！」"
translation = "「얏호! 냠냠, 우물우물…… 음~! 도넛도 맛있어!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「おい！\u3000半分以上食べたな！\u3000メテオラの一口は大きすぎるんだよ。まったく……ハンバーグもらうぞ、もぐもぐ」"
translation = "「어이! 절반 넘게 먹었잖아! 메테오라의 한입은 너무 크다구. 정말…… 함바그 먹을게, 우물우물」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「……ッ！\u3000なんてジューシーな……肉汁ほとばしるハンバーグだ……！\u3000クズ肉の寄せ集めとは比べ物にならない……！」"
translation = "「……윽! 이 얼마나 쥬시한…… 육즙이 쏟아지는 함바그인가……! 싸구려 고기 모음과는 비교도 안 돼……!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「だろー！？\u3000すごいよなー！\u3000魔王オススメのお店に来て良かったなー！」"
translation = "「그치!? 대단하지! 마왕이 추천해 준 가게에 오길 잘했다!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「……ああ。監視されてはいるが、まさかメテオラと２人で、こんな自由に行動できるとはな」"
translation = "「……아아. 감시받고 있긴 하지만 설마 메테오라와 둘이서 이렇게 자유롭게 행동할 수 있을 줄이야」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「魔王が許してくれたらしいけど、やっぱりいいやつなんだな！\u3000あたし、魔王のこと、好きだぞ！」"
translation = "「마왕이 허락해 줬다는데 역시 좋은 녀석이구나! 나, 마왕 좋아해!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「そう簡単に心を許すな。隙を見せたら付けこまれるぞ。……まあ、その素直さがメテオラのいいところか」"
translation = "「그렇게 쉽게 마음을 허락하지 마. 빈틈을 보이면 이용당할 거다. ……뭐, 그 솔직함이 메테오라의 좋은 점이지만」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「褒められたぞー！\u3000へへへ、ありがとな！\u3000エンジュは魔王のこと、嫌いか？」"
translation = "「칭찬받았다! 헤헤헤, 고마워! 엔주는 마왕 싫어해?」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「は？\u3000まあ……嫌いではない……かな」"
translation = "「하? 뭐…… 싫어하지는…… 않을지도」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「嫌いの反対は好きだな？\u3000そっかー、エンジュも魔王が好きなんだなー！\u3000あたしとおんなじだぞ！」"
translation = "「싫어하는 것의 반대는 좋아하는 거지? 그렇구나, 엔주도 마왕을 좋아하는구나! 나랑 똑같다!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「あまり大きな声で叫ぶな。魔王に聞かれていたらどうする」"
translation = "「너무 큰 소리로 외치지 마. 마왕이 듣고 있으면 어쩔 거야」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「どうもしないぞー？\u3000聞かれてたら困るのか？\u3000好きなら好きって、はっきり言った方がいいんだぞ？\u3000ちゃんと言わなきゃ気持ちは伝わんないからな！」"
translation = "「어쩌지도 않아? 들키면 곤란한 거야? 좋아하면 좋아한다고 확실히 말하는 게 좋아. 제대로 말 안 하면 마음은 안 전해지니까!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「ぐっ……もっともらしく言うじゃないか……どうせメテオラの言っている『好き』はお子様の『好き』だ。あたしみたいな大人の『好き』とは違うんだよ」"
translation = "「윽…… 제법 그럴듯하게 말하잖아…… 어차피 메테오라가 말하는 『좋아해』는 꼬맹이의 『좋아해』겠지. 나 같은 어른의 『좋아해』와는 다르다구」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「お子様の『好き』と、大人の『好き』～？\u3000なんだそれー！\u3000『好き』ってたくさんあるのかー！？\u3000あたしはハンバーグも好きだし、エンジュも好きだぞ！」"
translation = "「꼬맹이의 『좋아해』랑 어른의 『좋아해』~? 뭐야 그게! 『좋아해』가 여러 개 있는 거야!? 난 함바그도 좋고 엔주도 좋아!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「いや食べ物と一緒にするな。メテオラの言っている『好き』は、なんというか……その……『抱かれてもいい』の好きじゃないだろう？」"
translation = "「아니, 음식과 같이 취급하지 마. 메테오라가 말하는 『좋아해』는 뭐랄까…… 그…… 『안겨도 좋아』의 좋아해가 아니잖아?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「そんなことないぞ！\u3000魔王になら抱かれたいな！」"
translation = "「그렇지 않아! 마왕이라면 안기고 싶어!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「んなぁっ！？\u3000だから、お前は声がデカいんだ！\u3000ボリュームをもっと落とせ！」"
translation = "「응아아앗!? 그러니까 너는 목소리가 너무 크다니까! 볼륨 좀 낮춰!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「もががーっ！？」"
translation = "「모가가!?」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「驚かせるなよ……でもまさかメテオラがそんな言葉を知っているなんて……」"
translation = "「놀라게 하지 마…… 하지만 설마 메테오라가 그런 말을 알고 있을 줄이야……」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「魔王にぎゅーってされちゃダメなのかー？\u3000でも、あたしがやったら壊しちゃうしなー」"
translation = "「마왕이 꽉 안아주면 안 되는 거야? 하지만 내가 하면 부서질지도 모르고」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「『ぎゅーっ』？\u3000抱かれるって、ハグのことか！？」"
translation = "「『꽉 안는 거』? 안긴다는 게 허그를 말하는 거였냐!?」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ん？\u3000『抱かれる』って違う意味があるのか？\u3000エンジュはあたしが知らないこといっぱい知ってるな！\u3000賢いぞ！」"
translation = "「응? 『안긴다』는 다른 의미가 있어? 엔주는 내가 모르는 거 많이 알고 있네! 똑똑해!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「な、ない！\u3000『抱かれる』に他の意味なんて何もないからな！\u3000メテオラはそのままでいてくれ！」"
translation = "「어, 없어! 『안긴다』에 다른 의미 같은 건 아무것도 없으니까! 메테오라는 그대로 있어 줘!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「ん～？\u3000エンジュ、顔、真っ赤だぞ」"
translation = "「응~? 엔주, 얼굴이 새빨개」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「赤くなんてなってない！」"
translation = "「빨개지지 않았어!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「なってるぞ！\u3000怪しいなー！\u3000そうだ、魔王に聞いてみよう！」"
translation = "「빨개졌어! 수상해! 맞다, 마왕한테 물어보자!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「ばかー！\u3000それだけは、絶っっっっ対に駄目だ！」"
translation = "「바보! 그것만은 저어어어어어얼대로 안 돼!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「お、おう、わかった。ぜったいにダメなんだな？」"
translation = "「오, 오오, 알았어. 절대로 안 되는 거구나?」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "（精神面はともかく、メテオラは胸も大きいし、体は立派な大人だ。メテオラの言動を勘違いした魔王が、男の欲望を露わにしたら……ん？）"
translation = "(정신면은 어쨌든 메테오라는 가슴도 크고 몸은 훌륭한 성인이다. 메테오라의 언동을 오해한 마왕이 남자의 욕망을 드러내면…… 응?)"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "（別にメテオラと魔王が好き合って、恋仲になったところで、あたしには何の関係も──なんでだ？\u3000メテオラが魔王への好意を口にすると、胸がザワついて……？）"
translation = "(딱히 메테오라와 마왕이 서로 좋아해서 연인 사이가 되든 나랑은 아무 상관── 왜지? 메테오라가 마왕에 대한 호감을 입에 올리면 가슴이 술렁거려서……?)"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「エンジュー？\u3000むつかしー顔してどうしたんだー？\u3000おしっこかー？\u3000漏らしちゃう前におトイレ行かなきゃダメだぞ？」"
translation = "(엔주~? 어려운 표정 짓고 왜 그래? 오줌 마려워? 지리기 전에 화장실 가야 해?)"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "（まさか……嫉妬！？\u3000あたしが、魔王に好意を──バカな！\u3000そんなはずあるものか！）"
translation = "(설마…… 질투!? 내가 마왕에게 호감을── 바보 같은! 그럴 리가 없잖아!)"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "（あたしのタイプはもっとがっしりしてて、頼りがいのある熊みたいなヤツだ。あんなひ弱そうな男、ちっともあたしのタイプなんかじゃないのに……！）"
translation = "(내 타입은 좀 더 듬직하고 믿음직한 곰 같은 녀석이다. 저렇게 가냘파 보이는 남자, 조금도 내 타입이 아닌데……!)"

[[dialogue]]
speaker = "unk"
original = "おーい、ふたりともー！"
translation = "어이, 둘 다~!"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「魔王だー！\u3000ちょうど魔王の話をしてたんだぞ！」"
translation = "「마왕이다! 마침 마왕 이야기를 하고 있었다!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「し、してない！\u3000するわけないだろう！」"
translation = "「아, 안 했어! 할 리가 없잖아!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「してたぞ！？\u3000エンジュ、ウソつくなー！」"
translation = "「했어! 엔주, 거짓말하지 마!」"

[[dialogue]]
speaker = "unk"
original = "……悪口でも言ってたのかな？"
translation = "……내 욕이라도 한 걸까?"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「言ってないぞ。あたしもエンジュも魔王が好き──」"
translation = "「안 했어. 나도 엔주도 마왕을 좋아──」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「ああ、その通りだとも！\u3000お前に対する罵詈雑言の数々をな！\u3000お前なんか大っ嫌いなんだからな！\u3000フン！」"
translation = "「아아, 그렇고말고! 너에 대한 온갖 욕설을 퍼부었지! 너 같은 거 정말 싫단 말이야! 흥!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あ、待つんだぞ、エンジュ～！」"
translation = "「아, 기다려, 엔주~!」"

[[dialogue]]
speaker = "unk"
original = "エンジュとはそれなりに打ち解けたと思っていたけど、歩み寄るにはまだまだ道のりは遠い……のだろうか？"
translation = "엔주와는 나름대로 친해졌다고 생각했는데, 거리를 좁히기엔 아직 갈 길이 먼…… 걸까?"

