[[dialogue]]
speaker = "unk"
original = "第１０話,監視者,B"
translation = "제10화, 감시자"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なあなあ、あたしたちは何ブロックなんだ？」"
translation = "「저기 저기, 우리는 몇 블록이야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ＤＩＳＣで確認しよう。……これか。私たちはＧブロックのようだな」"
translation = "「DISC로 확인하자. ……이건가. 우리는 G블록인 모양이군.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふーん、なるほど。人間界の機械は便利だね」"
translation = "「흐음, 그렇구나. 인간계 기계는 편리하네.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「もうすぐ始まるんですね……ドキドキ……」"
translation = "「곧 시작되겠네요…… 두근두근……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「で……ナターシャ。君の目的は何だ？」"
translation = "「그래서…… 나타샤. 네 목적은 뭐지?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000どうしたんだ、急に？」"
translation = "「응? 왜 그래, 갑자기?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そうそう、これからお楽しみだってのに、野暮な話はやめようよ」"
translation = "「그래그래, 이제부터 즐길 참인데 야박한 소리는 그만두자구.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「こんな時だからこそ、だ」"
translation = "「이런 때니까 더더욱 묻는 거다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふーん、ま、いいけどね。前にも言った通り、魔王の監視だよ」"
translation = "「흐음, 뭐 상관없지만. 전에도 말했듯이 마왕 감시야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それは事実だろう。だが、ただの監視ではない」"
translation = "「그건 사실이겠지. 하지만 단순한 감시는 아닐 터.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「やむを得ない時は魔王を消せと命令されている……違うか？」"
translation = "「부득이할 때는 마왕을 제거하라는 명령을 받았지…… 아닌가?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「へぇ……」"
translation = "「헤에……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え……？\u3000それって……暗殺者ってこと！？」"
translation = "「에……? 그건…… 암살자라는 거예요!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「暗殺者！？」"
translation = "「암살자!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ど、どうして嬉しそうなんですか……？」"
translation = "「어, 어째서 기뻐하시는 건가요……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「しまった。暗殺者と聞いて、ついワクワクしてしまったぞ」"
translation = "「이런. 암살자라는 소리에 그만 설레버렸군.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だが、もし隠れて悪いことをしようとしているなら、この流星ライダーアポロが見逃さないぞ！」"
translation = "「하지만 만약 숨어서 나쁜 짓을 하려 한다면, 이 유성 라이더 아폴로가 가만두지 않겠다!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「プルプル、私、悪い暗殺者じゃないよ～」"
translation = "「푸르르, 나 나쁜 암살자 아니야~」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「わわっ、さっそく内部監査官のお仕事を果たしてます」"
translation = "「와앗, 벌써 내부 감사관 업무를 수행하고 계세요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そういうことだ！\u3000あたしの目が<ruby>緋<rt>あか</rt></ruby>いうちは、選挙管理委員会の中でのズルや悪事は許さないからな」"
translation = "「그런 거다! 내 눈이 붉은 동안은 선거관리위원회 안에서의 부정이나 악행은 용납하지 않을 거니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ありがとう、アポロ。ただここは、委員長である私に任せて欲しい」"
translation = "「고맙다, 아폴로. 다만 여기는 위원장인 나에게 맡겨줬으면 한다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「むむ……まあ、そうか。ボスに花を持たせるのも、エースの役割ってことだよな！」"
translation = "「으음…… 뭐, 그런가. 보스에게 공을 돌리는 것도 에이스의 역할이라는 거지!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「なるほど……梨緒はいろいろ知ってるみたいだね。もしかして聖庭園に知り合いでもいるの？」"
translation = "「과연…… 리오는 여러 가지를 알고 있는 모양이네. 혹시 성정원에 아는 사람이라도 있어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まぁな。以前、少々世話になった」"
translation = "「뭐 그렇지. 예전에 신세를 좀 졌다.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「せ、聖庭園ってそんなに怖いところなんですね……」"
translation = "「성, 성정원이란 곳은 그렇게 무서운 곳이군요……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「是非はともかくとして、国家なら敵対する要人の暗殺を行うこともある。天界は１つの国家であり、聖庭園はその中枢。それくらいしてもおかしくない」"
translation = "「시비는 차치하고서라도, 국가라면 적대하는 요인의 암살을 수행하기도 한다. 천계는 하나의 국가이며 성정원은 그 중추. 그 정도는 해도 이상할 게 없지.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ま、命令を受けてるのは否定はしないけどね。選管を選んだのは利害の一致ってやつだよ」"
translation = "「뭐, 명령을 받은 건 부정하지 않겠지만. 선관을 택한 건 이해관계가 일치해서야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「理由はもう１つあるだろう。私の監視だ」"
translation = "「이유는 하나 더 있겠지. 나를 감시하는 것.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん。だってあなた怪しいし。見張っとかないとね」"
translation = "「응. 당신 수상하니까. 지켜봐야지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ならお互い様だな。魔王は──緋宮クロトは勝手にやらせない」"
translation = "「그럼 피차일반이군. 마왕은── 히노미야 쿠로토는 마음대로 하게 두지 않겠다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おや？\u3000彼にはいなくなってほしいんじゃなかったの？\u3000御前試合で退学にしようとしたんじゃなかったっけ？」"
translation = "「어라? 그가 없어졌으면 하는 거 아니었어? 어전시합에서 퇴학시키려 하지 않았던가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あくまで彼が闇に堕ちるなら、の話だ。彼が正しい道を歩む限りは、排除の必要はない」"
translation = "「어디까지나 그가 어둠에 타락한다면, 의 이야기다. 그가 올바른 길을 걷는 한 배제할 필요는 없어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それに魔王を止めるのは……私だ」"
translation = "「게다가 마왕을 막는 건…… 나다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「言うねぇ。独占欲ってやつ？」"
translation = "「말 잘하네. 독점욕이라는 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「な、仲良くしましょうよーっ」"
translation = "「사, 사이좋게 지내요~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いやいや、こういう序盤のぶつかり合いこそが、チームの結束を高め、終盤の熱い展開に繋がるんだぞ！」"
translation = "「아니 아니, 이런 초반의 충돌이야말로 팀의 결속을 높이고 종반의 뜨거운 전개로 이어지는 법이라고!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いったい何の話をしてるんですかぁ！？」"
translation = "「도대체 무슨 소리를 하시는 거예요!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「流星ライダーのお約束の展開って奴だ！\u3000序盤に仲が悪い組み合わせほど、最後には深い友情で結ばれるんだ」"
translation = "「유성 라이더의 약속된 전개라는 거다! 초반에 사이가 나쁜 조합일수록 마지막엔 깊은 우정으로 맺어지지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふぅ……まあいい。聖庭園の目的も、意味はわかる」"
translation = "「후우…… 뭐 됐다. 성정원의 목적도 의미는 알겠어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「性急な判断だけはしないでもらいたいところだが……今はナターシャも同じ選管だ。お互いに協力し合おう」"
translation = "「성급한 판단만은 하지 말아줬으면 한다만…… 지금은 나타샤도 같은 선관이다. 서로 협력하자.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「了解。私としても余計な仕事は増やしたくないから、穏便にことが進むことを祈ってるよ」"
translation = "「라져. 나로서도 불필요한 일은 늘리고 싶지 않으니까, 원만하게 일이 진행되길 빌게.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あのあの！\u3000ところでなんですけど、ニューヨークって何です！？」"
translation = "「저기 저기! 그런데 말인데요, 뉴욕이 뭐예요!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ああいえ、アメリカの都市ってことは知ってるんですけど……『行きたいか？』って聞かれても……」"
translation = "「아, 아니, 미국의 도시라는 건 알고 있는데요…… 『가고 싶은가?』라고 물어보셔도……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「さぁ？\u3000ニューヨークってそんなに人気なの？」"
translation = "「글쎄? 뉴욕이 그렇게 인기 있어?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「昔そういうのがあったみたいだぞ。流星ライダーの『守れ、クイズ名人！』の回でも、同じようなことやってたからな！」"
translation = "「옛날에 그런 게 있었던 모양이야. 유성 라이더의 『지켜라, 퀴즈 명인!』 편에서도 비슷한 걸 했었거든!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「外国でいうなら、私はむしろロンドンの方が馴染みがあるな。昔住んでいたし」"
translation = "「외국이라면 난 오히려 런던 쪽이 친숙해. 예전에 살았었으니까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ロンドンって、霧の都とか言われてるんだよね。いかにも仕事がしやすそうだ」"
translation = "「런던이라니, 안개의 도시라고 불리는 곳이지. 정말이지 일하기 편할 것 같네.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ひっ」"
translation = "「히익.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトリスを脅かすな、暗殺者」"
translation = "「베아트리스를 겁주지 마라, 암살자.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はーい」"
translation = "「네~에.」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "『おーし、みんな自分のブロックがわかったか～？\u3000不具合があるなら今のうちに言ってくれよな』"
translation = "『오오~ 다들 자기 블록 확인했어~? 문제 있으면 지금 말해달라고!』"

[[dialogue]]
speaker = "unk"
original = "そうこうしているうちに、司会の紅明が再びマイクを握り、クイズ大会が本格的に始まるのだった。"
translation = "이러쿵저러쿵하는 사이에 사회자인 코우메이가 다시 마이크를 잡았고, 퀴즈 대회가 본격적으로 시작되었다."

