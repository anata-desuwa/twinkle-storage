[[dialogue]]
speaker = "unk"
original = "第１２話,星徒会長の選択,B"
translation = "제12화, 성도회장의 선택, B"

[[dialogue]]
speaker = "unk"
original = "今日は星徒会長権限を使って、新星学園の全校生徒に集まってもらった。"
translation = "오늘은 성도회장 권한을 사용해 신성학원의 전교생을 모았다."

[[dialogue]]
speaker = "unk"
original = "壇上に登り、マイク越しに生徒たちを見渡しながら話を始める。"
translation = "단상에 올라 마이크 너머로 학생들을 둘러보며 이야기를 시작한다."

[[dialogue]]
speaker = "クロト"
original = "『まずはガーディアンとの戦い、お疲れ様。みんなの頑張りのおかげで、何とか流星市国を守ることができた』"
translation = "『우선 가디언과의 전투, 수고 많았어. 모두의 노력 덕분에 어떻게든 유성시국을 지킬 수 있었어.』"

[[dialogue]]
speaker = "クロト"
original = "『そして、みんなもきっと一度は見ただろう、あの動画について説明したい』"
translation = "『그리고 모두도 분명 한 번쯤은 봤을 그 동영상에 대해 설명하고 싶어.』"

[[dialogue]]
speaker = "クロト"
original = "「みんなに相談したいことがあるんだ」"
translation = "「모두에게 상의하고 싶은 일이 있어.」"

[[dialogue]]
speaker = "unk"
original = "星徒会長として、新星学園の方針を決定したい。"
translation = "성도회장으로서 신성학원의 방침을 결정하고 싶다."

[[dialogue]]
speaker = "unk"
original = "そう話したのが昨日のことだ。"
translation = "그렇게 이야기한 것이 어제의 일이다."

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～。真偽を調べてます、だけじゃみんな不安になるだけだもの」"
translation = "「그렇네~. 진위 여부를 조사하고 있습니다, 라는 것만으로는 다들 불안해질 뿐인걸.」"

[[dialogue]]
speaker = "サーシャ"
original = "「戦うにしても、戦わないにしても、星徒会長が決める必要があるわ」"
translation = "「싸우든 싸우지 않든, 성도회장이 결정할 필요가 있어.」"

[[dialogue]]
speaker = "クロト"
original = "「はい。ただ戦いを躊躇うだけでは、アルタイルは滅ぼされてしまいます」"
translation = "「네. 단지 싸움을 주저하기만 해서는 알타이르는 멸망해버리고 맙니다.」"

[[dialogue]]
speaker = "クロト"
original = "「でも俺は、デネブを滅ぼしたくない。いや……リクリエに脅かされているのなら、デネブも救いたい」"
translation = "「하지만 나는 데네브를 멸망시키고 싶지 않아. 아니…… 리크리에에 위협받고 있다면 데네브도 구하고 싶어.」"

[[dialogue]]
speaker = "マトイ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。気持ちは私も同じだよ。星騎士なんだから、みんな守りたいよね」"
translation = "「응. 마음은 나도 같아. 성기사니까 모두 지키고 싶지.」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんが決めたのなら、異論はないわ～」"
translation = "「회장군이 결정했다면 이견은 없어요~」"

[[dialogue]]
speaker = "アナ"
original = "「問題はどうやってそれを実現するのかです。リクリエと極星学園、２つの敵を同時に相手しながらどう戦うのか」"
translation = "「문제는 어떻게 그것을 실현하느냐입니다. 리크리에와 극성학원, 두 적을 동시에 상대하면서 어떻게 싸울 것인가.」"

[[dialogue]]
speaker = "クロト"
original = "「それなんだけど──」"
translation = "「그거 말인데──」"

[[dialogue]]
speaker = "unk"
original = "俺の考えを包み隠さず、星徒会のみんなに伝える。"
translation = "내 생각을 숨김없이 성도회 모두에게 전한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「！\u3000いいじゃない、さすがクロトだわ！」"
translation = "「! 좋잖아, 역시 쿠로토야!」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ、なるほど。発想の転換といってもいいかもしれませんね」"
translation = "「흠, 과연. 발상의 전환이라고 할 수 있겠네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「でもできるのかな……？\u3000向こうはこっちを本気で滅ぼそうとしてるわけだし、話を聞いてくれないかも……」"
translation = "「하지만 가능할까……? 저쪽은 이쪽을 진심으로 멸망시키려 하고 있고, 말을 들어주지 않을지도 몰라……」"

[[dialogue]]
speaker = "クロト"
original = "「わからない。でもやってみる価値はあると思ってる」"
translation = "「모르겠어. 하지만 해볼 가치는 있다고 생각해.」"

[[dialogue]]
speaker = "サーシャ"
original = "「一番大変な道になるかもしれないけど、それでもやるのね？」"
translation = "「가장 힘든 길이 될지도 모르지만, 그래도 하겠다는 거네?」"

[[dialogue]]
speaker = "クロト"
original = "「はい。そのためには星徒会だけじゃなくて、星騎士みんなの協力が必要です」"
translation = "「네. 그러기 위해서는 성도회뿐만 아니라 성기사 모두의 협력이 필요해요.」"

[[dialogue]]
speaker = "クロト"
original = "「だから生徒たちには俺から話をしたいと思います。みんな混乱しているだろうから、説明も兼ねて」"
translation = "「그래서 학생들에게는 제가 직접 이야기하고 싶습니다. 다들 혼란스러울 테니 설명도 겸해서요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「うん、そこまで考えてるなら何も言う必要ないわね～」"
translation = "「응, 거기까지 생각하고 있다면 아무 말도 할 필요 없겠네~」"

[[dialogue]]
speaker = "unk"
original = "理想と現実にはギャップがある。"
translation = "이상과 현실에는 격차가 있다."

[[dialogue]]
speaker = "unk"
original = "しかし現実に屈することなく、現実を理想に近づけていく。"
translation = "하지만 현실에 굴하지 않고 현실을 이상에 가깝게 만들어간다."

[[dialogue]]
speaker = "unk"
original = "言葉にすれば当たり前のことかもしれないけど、その意識があるだけで、視界がより開けて見える気がした。"
translation = "말로 하면 당연한 일일지도 모르지만, 그 의식이 있는 것만으로도 시야가 더 트여 보이는 기분이 들었다."

[[dialogue]]
speaker = "クロト"
original = "「明日、新星学園のみんなの前で話すよ」"
translation = "「내일 신성학원 모두의 앞에서 이야기할게.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、熱弁を期待してるわよ！」"
translation = "「에에, 열변을 기대하고 있을게!」"

[[dialogue]]
speaker = "クロト"
original = "『まず平行世界について』"
translation = "『먼저 평행세계에 대해서』"

[[dialogue]]
speaker = "クロト"
original = "『信じられないかもしれないけど、人間界・天界・魔界の三界とは別に、本当に平行世界が存在しているんだ』"
translation = "『믿기지 않을지도 모르지만 인간계·천계·마계의 삼계와는 별개로 정말로 평행세계가 존재하고 있어.』"

[[dialogue]]
speaker = "クロト"
original = "『俺たちがいる世界はアルタイル。他にデネブとベガがある。ただ、ベガはすでにリクリエで滅びたとされている』"
translation = "『우리가 있는 세계는 알타이르. 그 외에 데네브와 베가가 있어. 다만 베가는 이미 리크리에로 멸망했다고 알려져 있지.』"

[[dialogue]]
speaker = "クロト"
original = "『その前提で俺の話を聞いてほしい』"
translation = "『그 전제하에 내 이야기를 들어줬으면 좋겠어.』"

[[dialogue]]
speaker = "unk"
original = "驚きか、困惑か、アリーナの席のあちこちから声が上がる。"
translation = "놀라움인지, 당혹감인지 아레나의 좌석 여기저기에서 목소리가 터져 나온다."

[[dialogue]]
speaker = "unk"
original = "噂にはなっていたものの、平行世界が存在することさえ、一部でしか知られていなかったのだから、無理もないだろう。"
translation = "소문은 무성했지만 평행세계가 존재한다는 사실조차 일부에서만 알려져 있었으니 무리도 아닐 것이다."

[[dialogue]]
speaker = "クロト"
original = "『平行世界については意図して隠していたわけじゃない』"
translation = "『평행세계에 대해서는 의도적으로 숨겼던 게 아니야.』"

[[dialogue]]
speaker = "クロト"
original = "『だけど平行世界には不明な点が多く、星徒会や学園が把握していることさえ、いつ覆るかわからない。だから今までは話せずにいた』"
translation = "『하지만 평행세계에는 불분명한 점이 많고, 성도회나 학원이 파악하고 있는 것조차 언제 뒤집힐지 몰라. 그래서 지금까지는 말하지 못했어.』"

[[dialogue]]
speaker = "クロト"
original = "『だけどあの動画が出た以上、今わかっている範囲で話すよ』"
translation = "『하지만 그 동영상이 나온 이상, 지금 알고 있는 범위 내에서 이야기할게.』"

[[dialogue]]
speaker = "クロト"
original = "『そして動画の内容について』"
translation = "『그리고 동영상 내용에 대해서.』"

[[dialogue]]
speaker = "クロト"
original = "『極星学園を名乗る星騎士と戦ったことも、彼女が動画にある発言をしたことも事実だ』"
translation = "『극성학원을 자처하는 성기사와 싸운 것도, 그녀가 동영상에 있는 발언을 한 것도 사실이야.』"

[[dialogue]]
speaker = "クロト"
original = "『ただし、彼女が語った内容については裏付けはとれていない。現在も調査中で、真偽は不明のままだ』"
translation = "『다만 그녀가 말한 내용에 대해서는 뒷받침할 근거가 없어. 현재도 조사 중이며 진위는 불분명한 상태야.』"

[[dialogue]]
speaker = "unk"
original = "ここまではただの説明に過ぎない。"
translation = "여기까지는 단순한 설명에 불과하다."

[[dialogue]]
speaker = "unk"
original = "新星学園の生徒たちに本当に話したいのはこれからだ。"
translation = "신성학원 학생들에게 정말로 하고 싶은 말은 지금부터다."

[[dialogue]]
speaker = "クロト"
original = "『みんなも新たな脅威が現れて不安だと思う。極星学園と戦っていいのか、それともよくないのか、わからなくて迷っている人もいるはずだ』"
translation = "『모두도 새로운 위협이 나타나서 불안할 거라고 생각해. 극성학원과 싸워야 할지, 아니면 안 되는 건지 몰라서 망설이는 사람도 있을 거야.』"

[[dialogue]]
speaker = "クロト"
original = "『平行世界デネブと戦ってでもアルタイルを守るか、それとも戦わない道を取るのか』"
translation = "『평행세계 데네브와 싸워서라도 알타이르를 지킬 것인가, 아니면 싸우지 않는 길을 택할 것인가.』"

[[dialogue]]
speaker = "クロト"
original = "『俺は──』"
translation = "『나는──』"

[[dialogue]]
speaker = "クロト"
original = "『デネブとともにリクリエと戦いたいと思う』"
translation = "『데네브와 함께 리크리에와 싸우고 싶어.』"

[[dialogue]]
speaker = "unk"
original = "俺がそう言い切ると、アリーナ全体が呆けたように<ruby>凪<rt>な</rt></ruby>ぐ。"
translation = "내가 그렇게 단언하자 아레나 전체가 멍해진 듯 잠잠해진다."

[[dialogue]]
speaker = "unk"
original = "そして次の瞬間、沸騰するように客席がざわめきだした。"
translation = "그리고 다음 순간, 끓어오르듯 객석이 웅성거리기 시작했다."

[[dialogue]]
speaker = "クロト"
original = "『俺個人の考えとして……たとえアルタイルを守るためであっても、デネブを滅ぼしたくない』"
translation = "『내 개인적인 생각으로는…… 설령 알타이르를 지키기 위해서라 하더라도 데네브를 멸망시키고 싶지 않아.』"

[[dialogue]]
speaker = "クロト"
original = "『平行世界だったとしても、そこに無辜の人々がいるならば、星騎士として救いたい』"
translation = "『평행세계라 하더라도 그곳에 무고한 사람들이 있다면 성기사로서 구하고 싶어.』"

[[dialogue]]
speaker = "クロト"
original = "『綺麗事だと思われるかもしれない。実際そう言われたこともある。だけど──』"
translation = "『허울 좋은 소리라고 생각될지도 몰라. 실제로 그런 말을 들은 적도 있어. 하지만──』"

[[dialogue]]
speaker = "クロト"
original = "『これが俺の考える最善だ』"
translation = "『이것이 내가 생각하는 최선이야.』"

[[dialogue]]
speaker = "unk"
original = "俺が考える最悪は、アルタイルとデネブが争った後、生き残った世界すらリクリエに滅ぼされることだ。"
translation = "내가 생각하는 최악은 알타이르와 데네브가 다툰 뒤, 살아남은 세계조차 리크리에에게 멸망당하는 것이다."

[[dialogue]]
speaker = "unk"
original = "アルタイルにもデネブにも属さないリクリエの使徒が存在し、こちらの動きを観察している以上、潰し合うことは避けるべきだろう。"
translation = "알타이르에도 데네브에도 속하지 않는 리크리에의 사도가 존재하며, 이쪽의 움직임을 관찰하고 있는 이상 서로를 짓부수는 일은 피해야겠지."

[[dialogue]]
speaker = "クロト"
original = "『かつてアポロと戦った時、流星市国の空に出現した、巨大な手のことを覚えているだろうか？\u3000見た人も多いと思う』"
translation = "『과거 아폴로와 싸웠을 때, 유성시국의 하늘에 출현했던 거대한 손을 기억하고 있을까? 본 사람도 많을 거라 생각해.』"

[[dialogue]]
speaker = "クロト"
original = "『あれはディザスターハンド。さっき言った平行世界ベガを滅ぼしたものだ』"
translation = "『그건 디재스터 핸드. 아까 말했던 평행세계 베가를 멸망시킨 존재다.』"

[[dialogue]]
speaker = "クロト"
original = "『ディザスターハンドは強い。かつて戦った何よりも』"
translation = "『디재스터 핸드는 강해. 지금까지 싸워온 그 무엇보다도.』"

[[dialogue]]
speaker = "クロト"
original = "『もしデネブと戦い、勝利しても、あれと戦うことになったら勝てないかもしれない。デネブとの戦いで疲弊していたらなおさらだ』"
translation = "『만약 데네브와 싸워 승리하더라도, 저것과 싸우게 된다면 이길 수 없을지도 몰라. 데네브와의 싸움으로 피폐해진 상태라면 더더욱 그렇겠지.』"

[[dialogue]]
speaker = "クロト"
original = "『リクリエはデネブにとっても敵だ。だからデネブと力を合わせてリクリエと戦う。それが俺の、新星星徒会長としての選択だ』"
translation = "『리크리에는 데네브에게도 적이야. 그래서 데네브와 힘을 합쳐 리크리에와 싸운다. 그것이 나의, 신성성도회장으로서의 선택이다.』"

[[dialogue]]
speaker = "クロト"
original = "『そしてそのために──新星星徒会はデネブに向かう』"
translation = "『그리고 그러기 위해── 신성성도회는 데네브로 향한다.』"

[[dialogue]]
speaker = "unk"
original = "不安か、期待か、アリーナのざわめきが強くなっていく。"
translation = "불안인지, 기대인지, 아레나의 웅성거림이 강해져 간다."

[[dialogue]]
speaker = "unk"
original = "それでも俺は努めて冷静に、自分を落ち着かせながらマイクに声を乗せる。"
translation = "그럼에도 나는 애써 냉정하게, 스스로를 진정시키며 마이크에 목소리를 싣는다."

[[dialogue]]
speaker = "クロト"
original = "『極星学園と共調をとるためには、デネブに行って話をつける必要があるだろう』"
translation = "『극성학원과 보조를 맞추기 위해서는 데네브에 가서 담판을 지을 필요가 있겠지.』"

[[dialogue]]
speaker = "クロト"
original = "『今の俺たちは平行世界を渡る手段を持たない。だが香堂チナはそれができる術を持っている。その手段を解析、あるいは奪取し、デネブに行く』"
translation = "『지금의 우리에겐 평행세계를 건널 수단이 없어. 하지만 코도 치나는 그것을 가능케 하는 술법을 가지고 있다. 그 수단을 해석, 혹은 탈취해서 데네브로 간다.』"

[[dialogue]]
speaker = "クロト"
original = "『そして極星星徒会に真偽を<ruby>質<rt>ただ</rt></ruby>し、共にリクリエと戦おうと説得する』"
translation = "『그리고 극성성도회에 진위를 따져 묻고, 함께 리크리에와 싸우자고 설득하겠어.』"

[[dialogue]]
speaker = "クロト"
original = "『決別すれば極星星徒会と戦う。ただしそれは命の奪い合いではなく、デネブを滅ぼすためでもない。方針を決するための、御前試合のようなものだ』"
translation = "『결별하게 된다면 극성성도회와 싸운다. 다만 그것은 목숨을 앗아가는 싸움이 아니며, 데네브를 멸망시키기 위함도 아니야. 방침을 결정하기 위한, 어전시합 같은 것이다.』"

[[dialogue]]
speaker = "クロト"
original = "『極星星徒会には、俺たち新星星徒会が対峙する。だからその間。みんなはアルタイルを守ってほしいんだ』"
translation = "『극성성도회에는 우리 신성성도회가 대치하겠어. 그러니까 그동안, 모두는 알타이르를 지켜줬으면 해.』"

[[dialogue]]
speaker = "クロト"
original = "『アルタイルは滅ぼさせない。デネブも滅ぼさない。その上で生き残る』"
translation = "『알타이르는 멸망시키지 않아. 데네브도 멸망시키지 않아. 그 위에서 살아남는다.』"

[[dialogue]]
speaker = "クロト"
original = "『そのために、俺たち星徒会と一緒に戦ってほしい……！』"
translation = "『그러기 위해, 우리 성도회와 함께 싸워줘……!』"

[[dialogue]]
speaker = "unk"
original = "あれだけ喧騒が渦巻いていたアリーナが、次第に静かになっていく。"
translation = "그토록 소란이 소용돌이치던 아레나가 점차 조용해져 간다."

[[dialogue]]
speaker = "unk"
original = "俺の言葉に迷っているのか、共に戦う決意をしてくれたのか、あるいはアルタイルを守るためにデネブを滅ぼすべきと考えているのか。"
translation = "내 말에 망설이고 있는 것인지, 함께 싸울 결의를 해준 것인지, 아니면 알타이르를 지키기 위해 데네브를 멸망시켜야 한다고 생각하는 것인지."

[[dialogue]]
speaker = "unk"
original = "それぞれが己の中で、想いと考えを固めようとしているのだろう。"
translation = "저마다의 마음속에서 생각과 신념을 굳히고 있는 것이리라."

[[dialogue]]
speaker = "クロト"
original = "『急に言われて驚いているのはわかる。困惑するのもわかる。いきなり納得しろっていう方が無茶だと思う』"
translation = "『갑작스러운 말에 놀란 건 알아. 당혹스러운 것도 알아. 갑자기 납득하라는 게 무리라는 것도 알고 있어.』"

[[dialogue]]
speaker = "クロト"
original = "『校則上は、星徒会長はみんなに命令することができる。だけど無理やり従わされたところで、星騎士は本当の力を発揮することなんてできない』"
translation = "『교칙상 성도회장은 모두에게 명령할 수 있어. 하지만 억지로 따르게 해봤자, 성기사는 진정한 힘을 발휘할 수 없어.』"

[[dialogue]]
speaker = "クロト"
original = "『だから俺は星徒会長権限を以て──信任選挙を行う』"
translation = "『그래서 나는 성도회장 권한으로── 신임 투표를 실시하겠다.』"

[[dialogue]]
speaker = "unk"
original = "一度静まったアリーナに、再びわっと声が沸いた。"
translation = "한 번 가라앉았던 아레나에 다시금 와아 하고 함성이 터져 나왔다."

[[dialogue]]
speaker = "unk"
original = "ここでアリーナの舞台の隅にいる梨緒に目配せする。"
translation = "여기서 아레나 무대 구석에 있는 리오에게 눈짓을 보낸다."

[[dialogue]]
speaker = "unk"
original = "すると梨緒は壇上に登り、凛とした顔で生徒たちの前に立った。"
translation = "그러자 리오는 단상으로 올라와 늠름한 표정으로 학생들 앞에 섰다."

[[dialogue]]
speaker = "梨緒"
original = "『選挙管理委員会委員長、梨緒・Ａ・クリステレスだ』"
translation = "『선거관리위원회 위원장, 리오·A·크리스테레스다.』"

[[dialogue]]
speaker = "梨緒"
original = "『先ほど緋宮会長から宣言があったが、これより星徒会長の信任選挙を行う。選挙の進行は、我々選挙管理委員会が取り仕切らせてもらう』"
translation = "『방금 히노미야 회장의 선언이 있었다만, 지금부터 성도회장 신임 투표를 실시하겠다. 선거 진행은 우리 선거관리위원회가 맡도록 하지.』"

[[dialogue]]
speaker = "梨緒"
original = "『これから全生徒のＤＩＳＣに、平行世界に関する資料を送付する。平行世界の全容は未だ掴めていないが、今までに判明した情報を網羅したものだ』"
translation = "『이제부터 전 학생의 DISC로 평행세계에 관한 자료를 송부하겠다. 평행세계의 전모는 아직 파악되지 않았으나, 지금까지 판명된 정보를 망라한 것이다.』"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの出自など、個人的な事情については伏せたりぼかしたりしているが、現時点でできうる限りの情報を集めたものだ。"
translation = "비너스의 출생 등 개인적인 사정에 대해서는 숨기거나 흐려 놓았지만, 현시점에서 할 수 있는 한 정보를 모은 것이었다."

[[dialogue]]
speaker = "unk"
original = "これからの戦いのための情報共有も含めて、すべての星騎士に知っておいてもらいたいものだった。"
translation = "앞으로의 전투를 위한 정보 공유를 포함해, 모든 성기사가 알아두었으면 하는 내용이었다."

[[dialogue]]
speaker = "梨緒"
original = "『みんなは資料を確認し、そして緋宮会長の日々の行いを判断材料にし、信任の票を入れるか否かを決めてほしい』"
translation = "『모두 자료를 확인하고, 히노미야 회장의 평소 행실을 판단 재료 삼아 신임 표를 던질지 말지를 결정해주길 바란다.』"

[[dialogue]]
speaker = "梨緒"
original = "『投票は今日から一週間後。全生徒の過半数の信任が得られなかった場合、緋宮クロトは星徒会長解任となり、現星徒会役員も職を失う』"
translation = "『투표는 오늘로부터 일주일 뒤. 전 학생 과반수의 신임을 얻지 못할 경우, 히노미야 쿠로토는 성도회장에서 해임되며 현 성도회 임원들도 직을 잃게 된다.』"

[[dialogue]]
speaker = "梨緒"
original = "『そして星徒会長の座が空席になった場合、次の会長を決める星徒会選挙が行われる。その場合は改めて説明をさせてもらおう』"
translation = "『그리고 성도회장 자리가 공석이 될 경우, 다음 회장을 결정할 성도회 선거를 실시하겠다. 그 경우에는 다시 설명하도록 하지.』"

[[dialogue]]
speaker = "梨緒"
original = "『では緋宮会長。最後に言葉を』"
translation = "『그럼 히노미야 회장. 마지막으로 한마디를.』"

[[dialogue]]
speaker = "unk"
original = "梨緒からマイクを受け取り、もう一度壇上に登る。"
translation = "리오에게 마이크를 건네받아 다시 한번 단상에 오른다."

[[dialogue]]
speaker = "クロト"
original = "『何が本当なのかわからなくて、今は迷うのも当然だと思う』"
translation = "『무엇이 진실인지 몰라서 지금 망설이는 건 당연하다고 생각해.』"

[[dialogue]]
speaker = "クロト"
original = "『だけど俺たち星徒会を信じて共に戦ってほしい』"
translation = "『하지만 우리 성도회를 믿고 함께 싸워줘.』"

[[dialogue]]
speaker = "クロト"
original = "『世界を──かけがえのないものを守るために、みんなの力を貸してほしい！』"
translation = "『세상을── 무엇과도 바꿀 수 없는 소중한 것을 지키기 위해, 모두의 힘을 빌려줘!』"

[[dialogue]]
speaker = "クロト"
original = "『今日は話を聞いてくれてありがとう。一週間後──みんなの答えを聞かせてくれ』"
translation = "『오늘 이야기를 들어줘서 고마워. 일주일 뒤── 모두의 답을 들려줘.』"

