[[dialogue]]
speaker = "unk"
original = "第３話,ご飯をオカズにご飯を食べる,P"
translation = "제3화, 밥을 반찬 삼아 밥을 먹다, P"

[[dialogue]]
speaker = "美鶴"
original = "「ん、よし。これで生地もボタンも揃った、と。会長さん、道案内ありがとね」"
translation = "「응, 좋아. 이걸로 원단도 단추도 다 모였네. 회장군, 길 안내 고마워」"

[[dialogue]]
speaker = "美鶴"
original = "「初めて行くお店だったから、よくわかんなくてさ。うち、基本的に引きこもってばっかだし」"
translation = "「처음 가는 가게라서 잘 몰랐거든. 나, 기본적으로 틀어박혀 있기만 하니까」"

[[dialogue]]
speaker = "美鶴"
original = "「あ……小腹空いたと思ったら、もうお昼過ぎてんじゃん。会長さんと過ごしてると、時間があっという間だね」"
translation = "「아…… 배가 좀 고프다 싶었더니 벌써 점심시간이 지났잖아. 회장군이랑 같이 있으니 시간이 눈 깜짝할 새네」"

[[dialogue]]
speaker = "美鶴"
original = "「会長さん、お昼ご飯食べてかない？\u3000この辺にどんなお店があるかも知らんけど」"
translation = "「회장군, 점심 먹고 가지 않을래? 이 근처에 어떤 가게가 있는지는 모르겠지만」"

[[dialogue]]
speaker = "美鶴"
original = "「買い物に付き合ってくれたお礼。うちが奢るよ」"
translation = "「쇼핑 따라와 준 보답. 내가 쏠게」"

[[dialogue]]
speaker = "unk"
original = "何か食べたいものはある？"
translation = "「뭐 먹고 싶은 거 있어?」"

[[dialogue]]
speaker = "美鶴"
original = "「んー……これと言って嫌いなものってないんだよね。出されれば、なんでも食べるし」"
translation = "「음~…… 딱히 싫어하는 건 없네. 내주면 뭐든지 먹고」"

[[dialogue]]
speaker = "美鶴"
original = "「てか、人間界って何食べてもだいたい美味しいからさー……あそこはイタリアンのお店？\u3000パスタとかピザ、嫌いじゃないよ」"
translation = "「랄까, 인간계는 뭘 먹어도 대체로 맛있으니까 말이야~…… 저기는 이탈리안 가게? 파스타나 피자, 싫어하지 않아」"

[[dialogue]]
speaker = "美鶴"
original = "「あっちはファーストフードだよね。ハンバーガーも嫌いじゃない」"
translation = "「저쪽은 패스트푸드지. 햄버거도 싫어하지 않아」"

[[dialogue]]
speaker = "unk"
original = "お寿司は？"
translation = "「초밥은?」"

[[dialogue]]
speaker = "美鶴"
original = "「あー、わりと好きかも。ハンバーガーよりはお寿司だね」"
translation = "「아~, 꽤 좋아할지도. 햄버거보다는 초밥이네」"

[[dialogue]]
speaker = "unk"
original = "パンよりご飯派ってこと？"
translation = "「빵보다 밥 파라는 거야?」"

[[dialogue]]
speaker = "美鶴"
original = "「うん！\u3000絶対、ご飯！\u3000白米！」"
translation = "「응! 절대, 밥! 흰쌀밥!」"

[[dialogue]]
speaker = "unk"
original = "食い気味に被せてきた。"
translation = "말을 끊고 덮어씌우듯 대답했다."

[[dialogue]]
speaker = "unk"
original = "いつもはダウナーな美鶴が、こんなにはっきり断言するのは珍しい。"
translation = "평소에는 다운되어 있는 미츠루가 이렇게 확실하게 단언하는 것은 드문 일이다."

[[dialogue]]
speaker = "unk"
original = "……そんなに好きなんだ？"
translation = "……그렇게 좋아하는 거야?"

[[dialogue]]
speaker = "美鶴"
original = "「あー……まあ、そっすね」"
translation = "「아~…… 뭐, 그렇습니다」"

[[dialogue]]
speaker = "美鶴"
original = "「ご飯の真の美味しさを知ったのは、こっちに来てからかな。人間界のお米、美味しすぎでしょ」"
translation = "「밥의 진정한 맛을 알게 된 건 여기에 오고 나서일까. 인간계 쌀, 너무 맛있잖아요」"

[[dialogue]]
speaker = "美鶴"
original = "「おぎゃあと生まれた時から、あんなん食べてるとかマジ贅沢。そりゃ舌肥えるって」"
translation = "「응애하고 태어났을 때부터 저런 걸 먹고 있다니 정말 사치. 그러니 입맛이 까다로워지지」"

[[dialogue]]
speaker = "美鶴"
original = "「粘り気と甘味のバランスが神ってるし。いつまでも噛んでられる。毎日食べても飽きない食べ物なんて、他にないよ」"
translation = "「찰기와 단맛의 균형이 신급이고. 언제까지고 씹을 수 있어. 매일 먹어도 질리지 않는 음식은, 달리 없어」"

[[dialogue]]
speaker = "unk"
original = "そんなに白米好きなんだ"
translation = "「그렇게 흰쌀밥을 좋아하는구나」"

[[dialogue]]
speaker = "美鶴"
original = "「好きすね。大好き。白米推し」"
translation = "「좋아합니다. 정말 좋아해요. 흰쌀밥 최애」"

[[dialogue]]
speaker = "美鶴"
original = "「メイド仲間に『好きな食べ物なに？』って聞かれたりするんすけど……返答に困るんすよね。白米が好きすぎて」"
translation = "「메이드 동료들이 '좋아하는 음식 뭐야?'라고 묻기도 하는데…… 대답하기 곤란하거든요. 흰쌀밥을 너무 좋아해서」"

[[dialogue]]
speaker = "美鶴"
original = "「ほら、普通、好きな食べ物って聞かれたら、みんなはカレーとかハンバーグとか、ご飯に合うオカズを言うじゃないすか」"
translation = "「봐요, 보통 좋아하는 음식을 물어보면, 다들 카레라든가 햄버그라든가, 밥에 어울리는 반찬을 말하잖아요」"

[[dialogue]]
speaker = "美鶴"
original = "「わりと『白米』って言いづらいんすよ。おひついっぱいの白米があるだけで、うち、十分幸せなんすけど」"
translation = "「꽤 '흰쌀밥'이라고 말하기 어렵거든요. 밥통 가득한 흰쌀밥만 있어도, 저는 충분히 행복한데요」"

[[dialogue]]
speaker = "美鶴"
original = "「こんな話してたら、もう絶対白米しか食べる気しないすわ……あっ。あそこのお店、ご飯食べ放題だって」"
translation = "「이런 이야기 했더니, 이제 절대 흰쌀밥밖에 먹을 생각이 안 드네요…… 앗. 저 가게, 밥 무한 리필이래」"

[[dialogue]]
speaker = "美鶴"
original = "「……え、あのお店でいいの？\u3000ぶっちゃけ、どこにでもある定食屋さんだよ。うちはめちゃ嬉しいけど」"
translation = "「……에, 저 가게로 괜찮아요? 솔직히 말해서, 어디에나 있는 정식집인데요. 저는 엄청 기쁘지만」"

[[dialogue]]
speaker = "unk"
original = "俺は美鶴の手を引き、お洒落とは縁遠い定食屋さんに入った。"
translation = "나는 미츠루의 손을 잡고, 세련됨과는 거리가 먼 정식집으로 들어갔다."

[[dialogue]]
speaker = "美鶴"
original = "「いただきまーす」"
translation = "「잘 먹겠습니다」"

[[dialogue]]
speaker = "unk"
original = "俺は生姜焼き定食、美鶴はサバ味噌定食を注文。"
translation = "나는 생강구이 정식, 미츠루는 고등어 된장조림 정식을 주문했다."

[[dialogue]]
speaker = "美鶴"
original = "「ぱく、ぱく、ぱく、ぱく、ん～～～っ<emoji=heart04>」"
translation = "「냠, 냠, 냠, 냠, 음~~~<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「はー……うま、うっまぁ……<emoji=heart04>\u3000こんな美味しいご飯が、無限におかわりできるとかマジ最高～……<emoji=heart04>」"
translation = "「하ー…… 맛있어, 너어무 맛있어……<emoji=heart04> 이런 맛있는 밥을, 무한으로 리필할 수 있다니 정말 최고야~……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
original = "「このサバ味噌、味濃いめで白米にめちゃ合う～。ヤバ、サバ１口で白米１杯食べられる」"
translation = "「이 고등어 된장조림, 간이 진해서 흰쌀밥이랑 엄청 잘 맞아~. 대박, 고등어 한 입에 흰쌀밥 한 공기를 먹을 수 있겠어」"

[[dialogue]]
speaker = "美鶴"
original = "「もぐもぐもぐ……すみません、おかわりください」"
translation = "「오물오물오물…… 죄송합니다, 리필해 주세요」"

[[dialogue]]
speaker = "美鶴"
original = "「あれ、会長さんはおかわりしないの？\u3000うちばっか食べてんの、ちょい恥ずいんすけど……」"
translation = "「어라, 회장군은 리필 안 해? 나만 먹고 있으니, 좀 부끄러운데……」"

[[dialogue]]
speaker = "美鶴"
original = "「なにニヤニヤしてんの。うちが食べてるとこ見てても別に面白くないでしょ。あんま見んなし」"
translation = "「왜 실실 웃고 있어. 내가 먹는 거 봐도 별로 재미없잖아. 너무 보지 마」"

[[dialogue]]
speaker = "美鶴"
original = "「あ、おかわり来た。炊き立てアッツアツすね。いただきまーす」"
translation = "「아, 리필 나왔다. 갓 지은 뜨끈뜨끈한 밥이네요. 잘 먹겠습니다」"

[[dialogue]]
speaker = "美鶴"
original = "「はふ、ほふ……は～～、マジうま～……<emoji=heart04>」"
translation = "「하후, 호후…… 하아~, 진짜 맛있어~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結局、美鶴はご飯を５回おかわりした。"
translation = "결국, 미츠루는 밥을 다섯 번 리필했다."

[[dialogue]]
speaker = "unk"
original = "俺の頼んだ生姜焼きもご飯に合う味付けでとても美味しかったけれど、それ以上に。"
translation = "내가 시킨 생강구이도 밥에 잘 맞는 양념으로 매우 맛있었지만, 그 이상으로."

[[dialogue]]
speaker = "unk"
original = "いつになく満面の笑顔でご飯を幸せそうに頬張る美鶴を見てるだけで、お腹と胸がいっぱいになったのだった。"
translation = "평소와 달리 활짝 웃는 얼굴로 밥을 행복하게 볼이 미어지게 먹는 미츠루를 보는 것만으로도, 배와 가슴이 가득 채워졌던 것이다."

