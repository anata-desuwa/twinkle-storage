[[dialogue]]
speaker = "unk"
original = "第３話,満足しないと出られない,P"
translation = "제3화, 만족하지 않으면 나갈 수 없어, P"

[[dialogue]]
speaker = "unk"
original = "気づけば何故か、自分の家でトマルと２人きりなこの状況――"
translation = "정신을 차려보니 왠지 자신의 집에서 토마루와 둘이 있는 상황──"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あなた様、なにか私にご命令はございませんか？」"
translation = "「당신, 제게 뭔가 명령하실 건 없나요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あっ、そうだ♪\u3000もしよかったら、３回まわってワンと鳴きましょうか？」"
translation = "「앗, 맞다♪ 혹시 괜찮으시다면 세 번 돌고 멍 하고 짖을까요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「――えっ、ダメですか？\u3000そんな～……くぅ～ん……」"
translation = "「──엣, 안 되나요? 에잉~…… 낑낑……」"

[[dialogue]]
speaker = "unk"
original = "まさか……命令して欲しいのか？"
translation = "설마…… 명령받고 싶은 거야?"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「３回くるくるくる～♪\u3000……ワン<emoji=heart04>」"
translation = "「세 번 빙글빙글빙글~♪ ……멍<emoji=heart04>」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「――ひとまず１回落ち着け、ですか？\u3000はい♪\u3000あなた様のご命令通りに<emoji=heart04>」"
translation = "「──일단 한 번 진정해라, 인가요? 네♪ 당신의 명령대로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なんでそこで嬉しそうなんだ……"
translation = "왜 거기서 기뻐하는 거야……"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「……え？\u3000そもそもどうしてこんなことになったのか、よく思い出せない？」"
translation = "「……에? 애초에 어떻게 이렇게 된 건지 잘 기억이 안 난다고요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「う～んと、私も記憶が曖昧なのですが……確か、トレジアンナさまが新しいロストアイテムの気配を察知して――」"
translation = "「으음, 저도 기억이 애매합니다만…… 분명 트레지안나 님이 새로운 로스트 아이템의 기운을 감지해서──」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「会長さまやサチさまと一緒に探し回っていたんです。それで、ロストアイテムを見つけて……気づけば、この部屋に閉じ込められていたんです」"
translation = "「회장님이나 사치 님과 함께 찾아다니고 있었어요. 그러다 로스트 아이템을 발견하고…… 정신을 차려보니 이 방에 갇혀 있었어요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「そう！\u3000この、ご主人さまが満足しないと出られない空間に……！」"
translation = "「그래요! 이 주인님이 만족하지 않으면 나갈 수 없는 공간에……!」"

[[dialogue]]
speaker = "unk"
original = "そんなロストアイテムだったっけ！？"
translation = "그런 로스트 아이템이었나!?"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「はい。他の記憶は曖昧ですが、それだけははっきりとわかります」"
translation = "「네. 다른 기억은 애매하지만 그것만은 확실히 알 수 있어요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「そして、脱出できるかもしれない方法が目の前にあるのなら、それを試してみるべきだと私は思います」"
translation = "「그리고 탈출할 수 있을지도 모르는 방법이 눈앞에 있다면 그것을 시도해 봐야 한다고 저는 생각해요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「というわけで、あなた様。どうか私にご命令くださいませ♪」"
translation = "「그런 고로 당신. 부디 제게 명령해 주세요♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「もしよろしければ、余興に野生のサルのモノマネでも致しましょうか？\u3000ウキウキ♪」"
translation = "「혹시 괜찮으시다면 여흥으로 야생 원숭이 흉내라도 낼까요? 우끼우끼♪」"

[[dialogue]]
speaker = "unk"
original = "なんで動物の真似をしたがるんだ！？"
translation = "왜 자꾸 동물 흉내를 내고 싶어 하는 거야!?"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「さあさあ、遠慮などなさらずに♪\u3000なんでも仰って下さい」"
translation = "「자자, 사양하지 마시고♪ 뭐든지 말씀해 주세요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「――あっ、なにかご命令を思いついたのですか？\u3000はい、なんでしょう♪」"
translation = "「──앗, 뭔가 명령이 생각나셨나요? 네, 뭔가요♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ふむふむ、なにか食事を作って欲しいと。……はい、私にお任せください♪」"
translation = "「흠흠, 뭔가 음식을 만들어 달라고요. ……네, 제게 맡겨주세요♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「母さまに習って、料理は普段から練習をしておりますので」"
translation = "「어머니께 배워서 요리는 평소부터 연습하고 있으니까요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「まずは冷蔵庫の中の食材、確認して参りますね」"
translation = "「우선 냉장고 안의 식재료 확인하고 올게요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「冷蔵庫の中には食材が沢山ありまして、毒見もしましたが問題ないようです」"
translation = "「냉장고 안에는 식재료가 많이 있어서 기미도 해봤지만 문제없는 것 같아요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「というわけで、白米、唐揚げ、お味噌汁、サラダにドレッシングと作ってみました。どうぞお召し上がりください」"
translation = "「그런 고로 쌀밥, 가라아게, 된장국, 샐러드에 드레싱까지 만들어 봤습니다. 부디 드셔보세요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ちなみに唐揚げは、詠野家の家系に伝わる秘伝の味なんです。あなた様が気に入って下さると嬉しいのですが……」"
translation = "「참고로 가라아게는 에이노 가문의 가계에 전해 내려오는 비전의 맛이에요. 당신이 마음에 들어 하시면 좋겠는데……」"

[[dialogue]]
speaker = "unk"
original = "この唐揚げ、すごく美味しい！"
translation = "이 가라아게, 정말 맛있어!"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「本当ですか？\u3000ふふっ、それならよかったです……♪」"
translation = "「정말인가요? 후훗, 그렇다면 다행이에요……♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「お食事が終わったら、次はなにを致しましょう？\u3000あなた様が満足してくださるように、誠心誠意ご奉仕致します」"
translation = "「식사가 끝나면 다음은 무엇을 할까요? 당신이 만족하시도록 성심성의껏 봉사하겠습니다」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ふむふむ、お掃除ですね。家事は好きですので、喜んで頑張りマッスル♪」"
translation = "「흠흠, 청소군요. 집안일은 좋아하니까 기꺼이 힘내겠습니당근♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ふふっ、なんちゃって♪」"
translation = "「후훗, 농담이에요♪」"

[[dialogue]]
speaker = "unk"
original = "（ぎ、ギャグセンスは独特だな……）"
translation = "（개, 개그 센스는 독특하네……）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「マッサージですね♪\u3000是非お任せください。あなた様の体であれば、どこでも喜んでマッサージ致しますので」"
translation = "「마사지군요♪ 부디 제게 맡겨주세요. 당신의 몸이라면 어디든 기쁘게 마사지해 드릴 테니까요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あっ、でも私、体は男ですが……男性のデリケートな部分となると、心の準備が……」"
translation = "「앗, 하지만 저, 몸은 남자인데…… 남성의 데리케이트한 부분이라면 마음의 준비가……」"

[[dialogue]]
speaker = "unk"
original = "さすがにそこは頼まないよ！？"
translation = "설마 거기까지 부탁하진 않아!? "

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あなた様、今度はなにを致しましょう？\u3000もっと私に、ご命令くださいませ♪」"
translation = "「당신, 이번엔 무엇을 할까요? 좀 더 제게 명령해 주세요♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「――もう沢山お願いして、これ以上思いつかない？\u3000私のしたいことをしていいのですか？」"
translation = "「――벌써 잔뜩 부탁해서 더 이상 떠오르지 않는다고요? 제가 하고 싶은 걸 해도 되나요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「いいえ、会長さま。私はもう、自分のしたいことをしているんです」"
translation = "「아니요, 회장님. 저는 이미 제가 하고 싶은 것을 하고 있답니다」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ふふっ♪\u3000だからどうか、私にこのままご奉仕させてくださいませ」"
translation = "「후훗♪ 그러니까 부디, 제가 이대로 계속 봉사하게 해주세요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ、よかった！\u3000お兄さん、目が覚めたんですね！」"
translation = "「앗, 다행이다! 오빠, 정신이 들었구나!」"

[[dialogue]]
speaker = "unk"
original = "サチ？\u3000俺は一体……"
translation = "사치? 난 대체……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ロストアイテムの能力を受けて、トマルさんと一緒に眠ってしまっていたんですよ～」"
translation = "「로스트 아이템의 능력을 받아서 토마루 씨랑 같이 잠들어 있었답니다~」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「すぅ……すぅ……」"
translation = "「새근…… 새근……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん達が私の代わりに能力を受けてくれたおかげで、ロストアイテムは無事回収できました」"
translation = "「오빠들이 나 대신 능력을 받아준 덕분에 로스트 아이템은 무사히 회수할 수 있었어」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「どうやら今回のアイテムは、所有者の願望を夢の中で叶えるものだったみたいです」"
translation = "「아무래도 이번 아이템은 소유자의 염원을 꿈속에서 이뤄주는 것이었나 봐요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「んん……会長さま……ふふっ♪」"
translation = "「으음…… 회장님…… 후훗♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おやおや、トマルさんはまだ、幸せな夢を見ているみたいですね～」"
translation = "「이런 이런, 토마루 씨는 아직 행복한 꿈을 꾸고 있는 모양이네요~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん、いくらトマルくんが可愛いからって、夢の中でエッチなこととかさせてませんよね？\u3000じー……」"
translation = "「오빠, 아무리 토마루 군이 귀엽다고 해도 꿈속에서 야한 짓 같은 거 시킨 건 아니지? 지이……」"

[[dialogue]]
speaker = "unk"
original = "疑いの眼差しを向けないでくれる！？"
translation = "의심스러운 눈초리 보내지 말아 줄래!? "

[[dialogue]]
speaker = "unk"
original = "トマルが起きるまでの間、俺は夢の中の出来事について言及される羽目になるのだった――"
translation = "토마루가 일어날 때까지 나는 꿈속의 일에 대해 추궁당하는 처지가 되고 말았다――"

