[[dialogue]]
speaker = "unk"
original = "第２話,太陽の壁画,B"
translation = "제2화, 태양의 벽화, B"

[[dialogue]]
speaker = "unk"
original = "新・新星星徒会が発足してはやひと月。"
translation = "신・신성 성도회가 발족하고 벌써 한 달."

[[dialogue]]
speaker = "unk"
original = "アナやマトイ達の支えもあって、俺はなんとか会長業務をこなすことが出来ていた。"
translation = "아나나 마토이들의 도움도 있어, 나는 어떻게든 회장 업무를 해낼 수 있었다."

[[dialogue]]
speaker = "クロト"
original = "「これで最後……と。ふう。これでひとまず、資料には一通り判を押せたはずだ」"
translation = "「이걸로 마지막……인가. 후우. 이걸로 일단, 자료에는 전부 도장을 찍었을 거야」"

[[dialogue]]
speaker = "マトイ"
original = "「ふふ、お疲れ」"
translation = "「후후, 수고했어」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。よし、これで今日の仕事は終わ──」"
translation = "「아아. 좋아, 이걸로 오늘의 일은 끝──」"

[[dialogue]]
speaker = "教頭"
original = "「失礼！\u3000緋宮くんはいるかね。至急、次の町内ボランティアの計画について意見書をもらいたい！」"
translation = "「실례! 히노미야 군은 있는가. 급히, 다음 마을 봉사활동 계획에 대한 의견서를 받고 싶다!」"

[[dialogue]]
speaker = "クロト"
original = "「教頭先生──それも星徒会長の職務なんですね」"
translation = "「교감 선생님──그것도 성도 회장의 직무인가요」"

[[dialogue]]
speaker = "教頭"
original = "「無論だ！\u3000星徒会長は全星騎士を束ねる長──流星市国の治安を守るのに君以上の適任はいない！」"
translation = "「물론이다! 성도 회장은 모든 성기사를 통솔하는 장──유성 시국의 치안을 지키는 데 자네 이상의 적임자는 없다!」"

[[dialogue]]
speaker = "クロト"
original = "「わ、わかりました……自分でよければ」"
translation = "「아, 알겠습니다…… 저라도 괜찮다면」"

[[dialogue]]
speaker = "教頭"
original = "「うむ。夕方までにこの書類へ記入しておいてくれ、よろしく頼む」"
translation = "「음. 저녁까지 이 서류에 기입해 두게, 잘 부탁하네」"

[[dialogue]]
speaker = "サーシャ"
original = "「残念。ひと息ついたと思ったのにね」"
translation = "「유감. 한숨 돌렸다고 생각했는데」"

[[dialogue]]
speaker = "クロト"
original = "「ええ……ですが、仕方ありません。これも会長の職務ですから」"
translation = "「네…… 하지만, 어쩔 수 없습니다. 이것도 회장의 직무이니까요」"

[[dialogue]]
speaker = "unk"
original = "俺はただ、目の前の仕事に励むだけ──と……"
translation = "나는 그저, 눈앞의 일에 힘쓸 뿐──이라고……"

[[dialogue]]
speaker = "マトイ"
original = "「なんか、また来たみたい」"
translation = "「뭔가, 또 온 것 같아」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「会長～～！\u3000グラウンドでラクロス部とどんこ釣り部が喧嘩してるの～～助けて～～！！」"
translation = "「회장～～! 운동장에서 라크로스부랑 동자개 낚시부가 싸우고 있어요～～ 도와줘～～!!」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000わかった──ていうかどんこ釣り部ってなんだ知らないぞ……！」"
translation = "「! 알았다──랄까 동자개 낚시부라니 뭐야 모르는 부서인데……!」"

[[dialogue]]
speaker = "マトイ"
original = "「わ、私が行っておくから──緋宮くんは意見書のほうを……！」"
translation = "「아, 내가 다녀올 테니까── 히노미야 군은 의견서 쪽을……!」"

[[dialogue]]
speaker = "クロト"
original = "「悪いマトイ、お願いしてもいいか」"
translation = "「미안 마토이, 부탁해도 될까」"

[[dialogue]]
speaker = "unk"
original = "マトイの厚意に甘え、そのままグラウンドまで同行をお願いする。"
translation = "마토이의 호의에 기대어, 그대로 운동장까지 동행을 부탁한다."

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "하지만……"

[[dialogue]]
speaker = "新聞部の女子"
original = "「緋宮会長！\u3000緋宮会長はおられますか、今日こそ我が新聞部のインタビューをぜひ！」"
translation = "「히노미야 회장! 히노미야 회장님 계십니까, 오늘이야말로 저희 신문부의 인터뷰를 꼭!」"

[[dialogue]]
speaker = "張り切った女子"
original = "「──はじめまして失礼します！\u3000自分は今年入ったばかりの新米星騎士なのですが、ぜひ御前試合を制した星徒会長殿に稽古をつけていただきたいと……！」"
translation = "「──처음 뵙겠습니다 실례합니다! 저는 올해 막 들어온 신참 성기사입니다만, 꼭 어전 시합을 제패하신 성도 회장님께 가르침을 받고 싶어서……!」"

[[dialogue]]
speaker = "クロト"
original = "「インタビューと道場破りは現在受け付けておりません！\u3000次の方どうぞ！」"
translation = "「인터뷰와 도장 깨기는 현재 접수하고 있지 않습니다! 다음 분 들어오세요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら。千客万来ね～」"
translation = "「어머나. 천객만래네～」"

[[dialogue]]
speaker = "unk"
original = "次から次へと生徒たちが舞い込んでくる。"
translation = "쉴 새 없이 학생들이 몰려온다."

[[dialogue]]
speaker = "unk"
original = "星徒会への頼み事というのは俺が思っているよりずっと広範囲らしかった。"
translation = "성도회에 부탁할 일이라는 것은 내가 생각하는 것보다 훨씬 광범위한 모양이었다."

[[dialogue]]
speaker = "サーシャ"
original = "「あら、トワちゃん先生」"
translation = "「어머, 토와짱 선생님」"

[[dialogue]]
speaker = "トワ先生"
original = "「ひーのーみーやーくーん！\u3000ここの資料にサインちょーだーい！」"
translation = "「히ー노ー미ー야ー군ー! 여기 자료에 사인 줘ー요ー!」"

[[dialogue]]
speaker = "クロト"
original = "「なんで先生までてんてこまいなんですか……！？」"
translation = "「왜 선생님까지 정신없이 바쁘신 건가요……!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「先生たちが作る資料にも、なぜか星徒会長の署名欄があるのよね～。悪しき習慣だわ～」"
translation = "「선생님들이 만드는 자료에도, 왠지 성도 회장의 서명란이 있더라고요～。 나쁜 습관이야～」"

[[dialogue]]
speaker = "クロト"
original = "「ええと、こういう資料はいつもアナに…………っていない！」"
translation = "「음, 이런 자료는 늘 아나에게………… 없잖아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「アナちゃんはヴィーナスちゃんが連れてっちゃったもの～。クロトくん自力で頑張らなくちゃね～」"
translation = "「아나짱은 비너스짱이 데려가 버렸으니까～。 쿠로토 군 스스로 힘내야지～」"

[[dialogue]]
speaker = "クロト"
original = "「う……わかりました。膨大な分量ですが……」"
translation = "「으…… 알겠습니다. 방대한 분량이지만……」"

[[dialogue]]
speaker = "unk"
original = "これも星徒会長の務めなんだ、やるっきゃない。"
translation = "이것도 성도 회장의 임무다, 할 수밖에 없다."

[[dialogue]]
speaker = "トワ先生"
original = "「こことここと、あとここにもサインを！\u3000……あんまり字、上手じゃないね」"
translation = "「여기랑 여기랑, 그리고 여기에도 사인을! ……글씨, 별로 잘 못 쓰네」"

[[dialogue]]
speaker = "クロト"
original = "「ほっといてください！」"
translation = "「신경 쓰지 마세요!」"

[[dialogue]]
speaker = "unk"
original = "トワちゃん先生の差し出す資料に急いでサインをしていく。"
translation = "토와짱 선생님이 내미는 자료에 서둘러 사인을 해 나간다."

[[dialogue]]
speaker = "unk"
original = "中身はほとんど読めていなかったが、先生だし、隣でサーシャ先輩がチェックしてくれていたので平気と信じよう。"
translation = "내용은 거의 읽지 못했지만, 선생님이고, 옆에서 사샤 선배가 체크해 주고 있었으므로 괜찮다고 믿자."

[[dialogue]]
speaker = "トワ先生"
original = "「ありがと！\u3000これで次の部費の申請が出せるよ～♪」"
translation = "「고마워! 이걸로 다음 부비 신청을 낼 수 있어～♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「数字も妥当なもの……だった気がするわ～」"
translation = "「숫자도 타당한 것…… 같았어～」"

[[dialogue]]
speaker = "unk"
original = "そうして、今度こそ台風は去ったかと思いきや……"
translation = "그렇게, 이번에야말로 태풍이 지나갔나 싶었는데……"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、またお客さんみたい。足音がたくさんね」"
translation = "「어머, 또 손님인 것 같아. 발소리가 많이 나네」"

[[dialogue]]
speaker = "クロト"
original = "「なんて激務なんだ……！」"
translation = "「이런 격무라니……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「がんばれ、新生会長♪」"
translation = "「힘내, 신생 회장♪」"

[[dialogue]]
speaker = "unk"
original = "それから──"
translation = "그리고──"

[[dialogue]]
speaker = "unk"
original = "俺はマトイ、サーシャ先輩の手も借りつつ、舞い込む生徒たちの要望に応対していった。"
translation = "나는 마토이, 사샤 선배의 도움도 받으며, 몰려드는 학생들의 요구에 응대해 나갔다."

[[dialogue]]
speaker = "クロト"
original = "「ふ──ふぅ……今度こそ終わった……」"
translation = "「후──후우…… 이번에야말로 끝났다……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふ、ご苦労さま。今日も賑やかで楽しいわ」"
translation = "「후후후, 수고했어. 오늘도 시끌벅적하고 즐겁네」"

[[dialogue]]
speaker = "unk"
original = "へとへとになる俺を尻目に、サーシャ先輩は優雅にティータイムと洒落込んでいた。"
translation = "녹초가 된 나를 뒤로하고, 사샤 선배는 우아하게 티타임을 즐기고 있었다."

[[dialogue]]
speaker = "unk"
original = "慣れてきたと思ったが……まだまだ星徒会の真髄には程遠いらしい。"
translation = "익숙해졌다고 생각했지만…… 아직 성도회의 진수에는 한참 멀었나 보다."

[[dialogue]]
speaker = "マトイ"
original = "「ふぅ……疲れた。部活の縄張り争いってホント大変……」"
translation = "「후우…… 피곤해. 동아리 구역 다툼은 정말 힘들어……」"

[[dialogue]]
speaker = "クロト"
original = "「おかえり。ありがとう、マトイ。大丈夫だったか？」"
translation = "「어서 와. 고마워, 마토이. 괜찮았어?」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。グラウンドでどんこ釣りはできないって説得したら、おとなしく引き下がってくれたから」"
translation = "「응. 운동장에서 동자개 낚시는 할 수 없다고 설득했더니, 얌전히 물러나 줬으니까」"

[[dialogue]]
speaker = "クロト"
original = "「そうか……そうだよな」"
translation = "「그런가…… 그렇겠지」"

[[dialogue]]
speaker = "クロト"
original = "「任せて悪かった。次はちゃんと俺が解決してみせるよ」"
translation = "「맡겨서 미안했어. 다음엔 제대로 내가 해결해 보일게」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは、平気平気。テスト後の放課後ってみんな浮ついて、こういう揉め事もしょっちゅうだし」"
translation = "「아하하, 괜찮아 괜찮아. 시험 후 방과 후는 다들 들떠서, 이런 다툼도 자주 있으니까」"

[[dialogue]]
speaker = "マトイ"
original = "「むしろ、ちゃんと私たちを頼ってくれたほうが嬉しいよ」"
translation = "「오히려, 제대로 우리를 의지해 주는 편이 기뻐」"

[[dialogue]]
speaker = "クロト"
original = "「はは……ありがとう」"
translation = "「하하…… 고마워」"

[[dialogue]]
speaker = "サーシャ"
original = "「マトイちゃんは健気ね～。ホントは一苦労だったでしょうに」"
translation = "「마토이짱은 착하네～。 사실은 꽤 힘들었을 텐데」"

[[dialogue]]
speaker = "マトイ"
original = "「べ、別に大したことはありません」"
translation = "「벼, 별로 대단한 일은 아닙니다」"

[[dialogue]]
speaker = "unk"
original = "多忙なのは確かだったが、仲間には恵まれている俺だった。"
translation = "바쁜 것은 확실했지만, 동료는 잘 만난 나였다."

[[dialogue]]
speaker = "マトイ"
original = "「サーシャさんは……優雅な午後をお楽しみだったみたいですね」"
translation = "「사샤 씨는…… 우아한 오후를 즐기신 것 같네요」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんなことないわよ～。いつもならもう３杯目に突入しているもの～」"
translation = "「그렇지 않아～。 평소 같으면 벌써 세 잔째에 돌입했을걸～」"

[[dialogue]]
speaker = "クロト"
original = "「サーシャ先輩はずっと俺につきっきりで紅茶を嗜んでくれていたんだ」"
translation = "「사샤 선배는 계속 나에게 붙어 있으면서 홍차를 마셔주고 있었어」"

[[dialogue]]
speaker = "マトイ"
original = "「それで手伝いになってるの……？」"
translation = "「그게 도움이 되고 있는 거야……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「大活躍よ～♪」"
translation = "「대활약이었지～♪」"

[[dialogue]]
speaker = "unk"
original = "実際、一人ならパニックになっていただろうから隣にいてくれて助かった。"
translation = "실제로, 혼자였다면 패닉에 빠졌을 테니 옆에 있어 줘서 도움이 되었다."

[[dialogue]]
speaker = "マトイ"
original = "「ま、いっか。ヴィーナスはもっとアナに投げっぱなしだったし」"
translation = "「뭐, 됐어. 비너스는 더 아나에게 떠넘기기만 했고」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃんも最初は頑張ってたんだけどね～」"
translation = "「비너스짱도 처음엔 열심히 했었는데～」"

[[dialogue]]
speaker = "unk"
original = "アナに任せる方が１００倍効率的だとわかってからは方針を変更したらしい。"
translation = "아나에게 맡기는 편이 100배 효율적이라는 것을 알고 나서는 방침을 변경한 모양이다."

[[dialogue]]
speaker = "unk"
original = "適材適所と言えば聞こえはいいが……。"
translation = "적재적소라고 하면 듣기 좋지만……."

[[dialogue]]
speaker = "unk"
original = "俺ももっと頑張らないとな"
translation = "나도 좀 더 노력해야지"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺もアナに任せて……"
translation = "그럼 나도 아나에게 맡기고……"

[[dialogue]]
speaker = "クロト"
original = "「俺ももっと頑張らないとな。いつまでもアナに支えられてちゃ情けないし」"
translation = "「나도 좀 더 노력해야지. 언제까지고 아나에게 의지할 순 없잖아」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ俺もアナに任せて……」"
translation = "「그럼 나도 아나에게 맡기고……」"

[[dialogue]]
speaker = "マトイ"
original = "「……じろ」"
translation = "「……힐끔」"

[[dialogue]]
speaker = "クロト"
original = "「……冗談だ。一人で仕事をこなせるように頑張るよ」"
translation = "「……농담이야. 혼자서 일을 처리할 수 있도록 노력할게」"

[[dialogue]]
speaker = "サーシャ"
original = "「クロトくんは偉いのね～いい子いい子」"
translation = "「쿠로토 군은 훌륭하네～ 착하다 착해」"

[[dialogue]]
speaker = "クロト"
original = "「…………へへ」"
translation = "「…………헤헤」"

[[dialogue]]
speaker = "マトイ"
original = "「何、その顔」"
translation = "「뭐야, 그 표정」"

[[dialogue]]
speaker = "unk"
original = "にやけてしまった。"
translation = "헤벌쭉 웃어버렸다."

[[dialogue]]
speaker = "サーシャ"
original = "「仕事がひと段落したなら、活動日誌をつけるといいわね」"
translation = "「일이 일단락되었다면, 활동 일지를 쓰는 게 좋겠네」"

[[dialogue]]
speaker = "クロト"
original = "「おっと、それもありましたね。ペン、ペンと……」"
translation = "「이런, 그것도 있었네요. 펜, 펜……」"

[[dialogue]]
speaker = "unk"
original = "星徒会活動日誌──"
translation = "성도회 활동 일지──"

[[dialogue]]
speaker = "unk"
original = "その日に何の業務を行ったか記録する、日直日誌のようなものだ。"
translation = "그날 어떤 업무를 했는지 기록하는, 일직 일지 같은 것이다."

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナス、記帳だけはマメにしてたのよね」"
translation = "「비너스, 기장만큼은 꼼꼼하게 했었지」"

[[dialogue]]
speaker = "クロト"
original = "「はは……確かに」"
translation = "「하하…… 확실히」"

[[dialogue]]
speaker = "unk"
original = "俺が来る前の日付を見てみると、当時会長だった彼女が毎日細かく記録を取っていた様子がうかがえる。"
translation = "내가 오기 전의 날짜를 보면, 당시 회장이었던 그녀가 매일 세세하게 기록을 남겼던 모습을 엿볼 수 있다."

[[dialogue]]
speaker = "unk"
original = "いやに達筆な字と、可愛らしいイラストのコンビネーションが印象的だった。"
translation = "유난히 달필인 글씨와, 귀여운 일러스트의 조합이 인상적이었다."

[[dialogue]]
speaker = "マトイ"
original = "「っていうか、今ヴィーナスは何してるんだっけ……？」"
translation = "「그나저나, 지금 비너스는 뭐 하고 있는 거지……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「さあ？\u3000アナちゃんと２人で仲良く図書館の方に向かってたみたいだけど──私もご一緒したかったわ～」"
translation = "「글쎄? 아나짱이랑 둘이서 사이좋게 도서관 쪽으로 향하고 있었던 것 같던데── 나도 함께하고 싶었는데～」"

[[dialogue]]
speaker = "クロト"
original = "「なんか、大事な調べ物があるとか言ってたな」"
translation = "「뭔가, 중요한 조사할 게 있다고 했었어」"

[[dialogue]]
speaker = "unk"
original = "──と、噂をしていれば。"
translation = "──라고, 소문을 내고 있자."

[[dialogue]]
speaker = "ヴィーナス"
original = "『──もしもし、クロト？\u3000今すぐ来なさい、マッハよマッハ！』"
translation = "『──여보세요, 쿠로토? 지금 당장 와, 마하야 마하!』"

[[dialogue]]
speaker = "アナ"
original = "『場所、場所』"
translation = "『장소, 장소』"

[[dialogue]]
speaker = "ヴィーナス"
original = "『あ、そうだ。大聖堂！\u3000大聖堂ね！\u3000大っきな絵があるから！』"
translation = "『아, 맞다. 대성당! 대성당이야! 커다란 그림이 있으니까!』"

[[dialogue]]
speaker = "マトイ"
original = "「……なんて？」"
translation = "「……뭐라고?」"

[[dialogue]]
speaker = "クロト"
original = "「……マッハらしい」"
translation = "「……마하래」"

[[dialogue]]
speaker = "unk"
original = "俺が会長になっても、相変わらずヴィーナスはヴィーナスなのだった。"
translation = "내가 회장이 되어도, 여전히 비너스는 비너스인 것이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「来たわね」"
translation = "「왔네」"

[[dialogue]]
speaker = "unk"
original = "大聖堂まで着くと、ヴィーナスが偉そうに腕を組んで待っていた。"
translation = "대성당까지 도착하자, 비너스가 거만하게 팔짱을 끼고 기다리고 있었다."

[[dialogue]]
speaker = "unk"
original = "隣にはアナが例の『日誌』を持って佇んでいる。"
translation = "옆에는 아나가 그 『일지』를 들고 서 있다."

[[dialogue]]
speaker = "マトイ"
original = "「いきなり呼び出してどうしたの？\u3000２人とも」"
translation = "「갑자기 불러내서 무슨 일이야? 둘 다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイも来てくれたのね──丁度いいわ！\u3000これから大事な話があるの」"
translation = "「마토이도 와 줬네── 마침 잘 됐어! 지금부터 중요한 이야기가 있어」"

[[dialogue]]
speaker = "マトイ"
original = "「大事な話……」"
translation = "「중요한 이야기……」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら。なら紅茶を淹れないといけないわね」"
translation = "「어머나. 그럼 홍차를 우려야겠네」"

[[dialogue]]
speaker = "マトイ"
original = "「祭壇の前で……？\u3000ていうか、さっきあれだけ飲んでたのに……」"
translation = "「제단 앞에서……?랄까, 아까 그렇게 마셨는데……」"

[[dialogue]]
speaker = "クロト"
original = "「お腹もたぷたぷになりますよ」"
translation = "「배도 출렁출렁해지겠어요」"

[[dialogue]]
speaker = "アナ"
original = "「セクシャルハラスメント」"
translation = "「성희롱」"

[[dialogue]]
speaker = "サーシャ"
original = "「ひっど～いクロトくん。これでもボディラインは気をつけてるんだから」"
translation = "「너무해～ 쿠로토 군. 이래 봬도 보디라인은 신경 쓰고 있단 말이야」"

[[dialogue]]
speaker = "クロト"
original = "「いや、そういう意味じゃなくて──あれ以上飲んだらっていう……！」"
translation = "「아니, 그런 의미가 아니라── 그 이상 마시면이라는……!」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くんはそういうとこあるよね」"
translation = "「히노미야 군은 그런 점이 있지」"

[[dialogue]]
speaker = "アナ"
original = "「胸をたぷたぷにする秘訣なら、聞かなくもない」"
translation = "「가슴을 출렁출렁하게 만드는 비결이라면, 안 듣는 것도 아닙니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うるさーい！\u3000なんでもいいから聞きなさい！」"
translation = "「시끄러워ー! 뭐든지 좋으니 들어!」"

[[dialogue]]
speaker = "unk"
original = "一喝されてしまった。"
translation = "일갈당하고 말았다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは、アナから『日誌』を渡されると改めて俺たちへ向き直る。"
translation = "비너스는, 아나에게서 『일지』를 건네받자 다시 우리를 향해 돌아섰다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「大事な話というのは他でもないわ──」"
translation = "「중요한 이야기라는 건 다름 아닌──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「『魔王』についてよ」"
translation = "「『마왕』에 대해서야」"

[[dialogue]]
speaker = "マトイ"
original = "「魔王っていうと……」"
translation = "「마왕이라고 하면……」"

[[dialogue]]
speaker = "アナ"
original = "「前会長が新会長に執着する理由、ですね」"
translation = "「전 회장님이 신임 회장님에게 집착하는 이유, 이군요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。でもって、その根拠になるのが──これよ！」"
translation = "「응. 그리고 그 근거가 되는 것이── 이거야!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに先導された先には、見上げるほどの大きな壁画があった。"
translation = "비너스가 안내한 곳에는, 올려다볼 만큼 커다란 벽화가 있었다."

[[dialogue]]
speaker = "クロト"
original = "「この絵って──確か、教科書にも載ってた……」"
translation = "「이 그림── 분명, 교과서에도 실려 있었던……」"

[[dialogue]]
speaker = "unk"
original = "そこに描かれていたのは星騎士学の教科書に載っていた挿絵──そのオリジナルだった。"
translation = "거기에 그려져 있던 것은 성기사학 교과서에 실려 있던 삽화── 그 원본이었다."

[[dialogue]]
speaker = "unk"
original = "実物は、こちらが圧倒されてしまうほどのサイズだ。"
translation = "실물은, 이쪽이 압도당할 정도의 크기다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトにはまだあまり馴染みがないかもしれないわね」"
translation = "「쿠로토에게는 아직 익숙하지 않을지도 모르겠네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アナ、説明よろしく」"
translation = "「아나, 설명 부탁해」"

[[dialogue]]
speaker = "アナ"
original = "「太陽の壁画。今から２０００年前、何者かによって描かれた歴史上の一場面」"
translation = "「태양의 벽화. 지금으로부터 2000년 전, 누군가에 의해 그려진 역사상의 한 장면」"

[[dialogue]]
speaker = "unk"
original = "悠久の歴史を思わせる古い石版。"
translation = "유구한 역사를 짐작게 하는 오래된 석판."

[[dialogue]]
speaker = "unk"
original = "そこに描かれていたのは、黒く歪んだ悪者らしき人物が倒れ伏している様子だ。"
translation = "거기에 그려져 있던 것은, 검게 일그러진 악당 같은 인물이 쓰러져 엎드려 있는 모습이다."

[[dialogue]]
speaker = "サーシャ"
original = "「確か～。“前回”のリクリエで暴れてた魔王様が、懲らしめられてる様子よね～」"
translation = "「분명～. “이전”의 리크리에에서 날뛰던 마왕님이, 벌을 받고 있는 모습이겠지～」"

[[dialogue]]
speaker = "アナ"
original = "「はい。“前”のリクリエの年代については３０００年前と云われていますが……」"
translation = "「네. “전” 리크리에의 연대에 대해서는 3000년 전이라고 일컬어지고 있습니다만……」"

[[dialogue]]
speaker = "アナ"
original = "「ここに描かれている『魔王』は当時、世界を破壊しようとする巨悪だったと伝えられていますね」"
translation = "「여기에 그려져 있는 『마왕』은 당시, 세계를 파괴하려는 거악이었다고 전해지고 있습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「大聖堂に来たら、すぐ目に入っちゃうよね」"
translation = "「대성당에 오면, 바로 눈에 띄지」"

[[dialogue]]
speaker = "unk"
original = "この『太陽の壁画』は学園生徒なら誰しも目にしたことのある有名なもののようだった。"
translation = "이 『태양의 벽화』는 학원 학생이라면 누구나 본 적이 있는 유명한 것 같았다."

[[dialogue]]
speaker = "unk"
original = "打倒リクリエを掲げる星騎士にとって、誇り高きシンボルでもあるのだろう。"
translation = "타도 리크리에를 내거는 성기사에게 있어, 긍지 높은 상징이기도 할 것이다."

[[dialogue]]
speaker = "クロト"
original = "「にしても……２０００年前か。想像もつかないくらい昔ではあるけど」"
translation = "「그렇다고 해도…… 2000년 전인가. 상상도 할 수 없을 만큼 옛날이긴 하지만」"

[[dialogue]]
speaker = "クロト"
original = "「リクリエが起こったっていう３０００年前のものじゃないんだな」"
translation = "「리크리에가 일어났다는 3000년 전의 것은 아니네」"

[[dialogue]]
speaker = "サーシャ"
original = "「ま～、さすがにそんな大昔のものは残ってないんじゃないかしら」"
translation = "「뭐～, 설마 그렇게 아주 옛날의 것은 남아있지 않지 않을까」"

[[dialogue]]
speaker = "アナ"
original = "「ただ、それでもこちらの絵の内容は長らく受け継がれてきたものとされています」"
translation = "「다만, 그럼에도 이 그림의 내용은 오랫동안 계승되어 온 것으로 여겨지고 있습니다」"

[[dialogue]]
speaker = "アナ"
original = "「もちろん、抽象的な描写ではありますが……」"
translation = "「물론, 추상적인 묘사입니다만……」"

[[dialogue]]
speaker = "サーシャ"
original = "「この『魔王』さんは、あくまでも<ruby>厄災<rt>やくさい</rt></ruby>の擬人化とか言われたかしら？」"
translation = "「이 『마왕』 씨는, 어디까지나 재앙의 의인화라고 했던가?」"

[[dialogue]]
speaker = "アナ"
original = "「諸説ありますね。絵画として収めるために、人物として描写した──とも」"
translation = "「여러 설이 있습니다. 회화로 담기 위해, 인물로 묘사했다──고도」"

[[dialogue]]
speaker = "マトイ"
original = "「絵だもんね。そーゆーこともありそう」"
translation = "「그림이니까. 그럴 수도 있을 것 같아」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "倒れ伏した人間の姿を見る。"
translation = "쓰러져 엎드린 인간의 모습을 본다."

[[dialogue]]
speaker = "unk"
original = "これが、魔王。"
translation = "이것이, 마왕."

[[dialogue]]
speaker = "unk"
original = "幾千年も昔のリクリエで暗躍し、ついには打ち倒されたという悪の権化。"
translation = "수천 년 전의 리크리에에서 암약하며, 마침내 쓰러졌다는 악의 화신."

[[dialogue]]
speaker = "クロト"
original = "（……）"
translation = "（……）"

[[dialogue]]
speaker = "unk"
original = "──でも、なぜだ。"
translation = "──하지만, 왜일까."

[[dialogue]]
speaker = "unk"
original = "この濁った瞳の深淵に、引き込まれてしまうような──"
translation = "이 흐릿한 눈동자의 심연에, 빨려 들어갈 것 같은──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふふ……クロトは気づいたようね」"
translation = "「후후후…… 쿠로토는 눈치챈 것 같네」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ……？」"
translation = "「엣……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう。『魔王』が<ruby>厄災<rt>やくさい</rt></ruby>の権化なんていうのは全くの嘘っぱち──」"
translation = "「그래. 『마왕』이 재앙의 화신이라는 건 완전히 새빨간 거짓말──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「本来の『魔王』はむしろ、かつてのリクリエから世界を救った真の英雄なの！」"
translation = "「본래의 『마왕』은 오히려, 과거의 리크리에로부터 세계를 구한 진정한 영웅이야!」"

[[dialogue]]
speaker = "unk"
original = "大聖堂のど真ん中で高らかに新説を謳うヴィーナス。"
translation = "대성당 한복판에서 우렁차게 새로운 설을 노래하는 비너스."

[[dialogue]]
speaker = "unk"
original = "いつもの彼女……と思いきや、アナがちょんちょんとその側面をつついた。"
translation = "평소의 그녀……라고 생각했는데, 아나가 톡톡 그 옆구리를 찔렀다."

[[dialogue]]
speaker = "アナ"
original = "「前会長。ちゃんと順を追って話しましょう、また呆れられています」"
translation = "「전 회장님. 제대로 순서를 밟아 이야기합시다, 또 어이없어 하고 있습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っとと。早とちりはよくない癖ね！」"
translation = "「앗차차. 성급한 건 좋지 않은 버릇이네!」"

[[dialogue]]
speaker = "アナ"
original = "「いちお、前会長にも根拠があるので、聞いたげてください」"
translation = "「일단, 전 회장님에게도 근거가 있으니, 들어주세요」"

[[dialogue]]
speaker = "unk"
original = "アナにそう言われると、ヴィーナスは例の日誌を取り出して広げた。"
translation = "아나에게 그렇게 말하자, 비너스는 그 일지를 꺼내 펼쳤다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ここのページを見なさい！\u3000魔王についての真実が記されているわ！」"
translation = "「여기 페이지를 봐! 마왕에 대한 진실이 기록되어 있어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃんのいつもの日記ね～」"
translation = "「비너스짱의 평소 일기네～」"

[[dialogue]]
speaker = "クロト"
original = "「えーと……何々……」"
translation = "「에ー또…… 뭐라고……」"

[[dialogue]]
speaker = "unk"
original = "『終焉を打ち砕きし魔王の真実は未だ偽りの悪に虚飾されている。この世界に根を張る日輪の図が、過去の因果を捻じ曲げているのだ』"
translation = "『종언을 부수고 온 마왕의 진실은 아직 거짓된 악에 허식되어 있다. 이 세계에 뿌리를 내린 일륜의 그림이, 과거의 인과를 비틀고 있는 것이다』"

[[dialogue]]
speaker = "unk"
original = "『真実を描いた月輪の図はどこかに隠されているという。私は、その在り処を求めるべく友の力を借りた』"
translation = "『진실을 그린 월륜의 그림은 어딘가에 숨겨져 있다고 한다. 나는, 그 소재를 찾기 위해 친구의 힘을 빌렸다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……と、いうワケよ！」"
translation = "「……라는 거야!」"

[[dialogue]]
speaker = "マトイ"
original = "「……どゆこと？」"
translation = "「……무슨 뜻이야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ちょっと示唆的な感じね～」"
translation = "「좀 시사적인 느낌이네～」"

[[dialogue]]
speaker = "クロト"
original = "「思うにこの『日輪の図』っていうのがこの太陽の壁画を指していて──」"
translation = "「내 생각엔 이 『일륜의 그림』이라는 게 이 태양의 벽화를 가리키는 것 같고──」"

[[dialogue]]
speaker = "クロト"
original = "「魔王が英雄だったはずの栄光は、今この時代には隠されている──ってことか？」"
translation = "「마왕이 영웅이었을 영광은, 지금 이 시대에는 숨겨져 있다──는 건가?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ベストアンサー！」"
translation = "「베스트 앤서!」"

[[dialogue]]
speaker = "アナ"
original = "「補足します」"
translation = "「보충하겠습니다」"

[[dialogue]]
speaker = "アナ"
original = "「終焉を打ち砕いた魔王。しかしその真実は、偽りの過去によって虚飾されている」"
translation = "「종언을 부순 마왕. 그러나 그 진실은, 거짓된 과거에 의해 허식되어 있다」"

[[dialogue]]
speaker = "アナ"
original = "「ゆえにこの『太陽の壁画』は、英雄であるはずの魔王を悪の権化として描いている──という解釈ですね」"
translation = "「그러므로 이 『태양의 벽화』는, 영웅이어야 할 마왕을 악의 화신으로 그리고 있다──는 해석이군요」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そんな見方ができるの……！？」"
translation = "「서, 설마 그런 시각으로 볼 수 있는 거야……!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ。でも、そう考えると面白いわね。誰が描いたのかしら？」"
translation = "「우후후. 하지만, 그렇게 생각하니 재미있네. 누가 그린 걸까?」"

[[dialogue]]
speaker = "unk"
original = "三千年前にリクリエを撃退したはずの『魔王』。しかしその存在は、世界そのものによって欺かれていると日誌は告げる。"
translation = "삼천 년 전에 리크리에를 격퇴했을 『마왕』. 그러나 그 존재는, 세계 그 자체에 의해 기만당하고 있다고 일지는 말한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「とにかく私が言いたいのはひとつ、魔王っていうのは英雄の証ってこと」"
translation = "「어쨌든 내가 말하고 싶은 건 하나, 마왕이라는 건 영웅의 증거라는 거야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だからこの壁画は偽りのデタラメの嘘っぱち！\u3000後世に捏造されたプロパンガスなのだわ！！」"
translation = "「그러니까 이 벽화는 거짓말투성이의 엉터리 거짓말! 후세에 날조된 프로판가스인 것이다!!」"

[[dialogue]]
speaker = "アナ"
original = "「プロパガンダです」"
translation = "「프로파간다입니다」"

[[dialogue]]
speaker = "unk"
original = "人目をはばからず堂々と宣言するヴィーナスを見て、すぐさまどよめきが周囲に広がっていった。"
translation = "남의 눈을 개의치 않고 당당하게 선언하는 비너스를 보고, 곧바로 술렁거림이 주위에 퍼져 나갔다."

[[dialogue]]
speaker = "女子生徒Ａ"
original = "「ねえ……あれって新星の前会長の……」"
translation = "「저기…… 저거 신성 전 회장님 아냐……」"

[[dialogue]]
speaker = "女子生徒Ｂ"
original = "「魔王が英雄なんて……何言ってるの……？」"
translation = "「마왕이 영웅이라니…… 무슨 말을 하는 거야……?」"

[[dialogue]]
speaker = "女子生徒Ｃ"
original = "「御前試合で負けておかしくなったんじゃないですか……？」"
translation = "「어전 시합에서 지고 이상해진 거 아닐까요……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「失礼ね！\u3000元からこうよ！」"
translation = "「실례네! 원래 이랬어!」"

[[dialogue]]
speaker = "マトイ"
original = "「反論になってないような……」"
translation = "「반론이 안 되는 것 같은데……」"

[[dialogue]]
speaker = "アナ"
original = "「大注目を集めてしまいましたね」"
translation = "「큰 주목을 모아 버렸네요」"

[[dialogue]]
speaker = "サーシャ"
original = "「無理もないわ。こうやって飾られてる壁画を悪く言うなんて……」"
translation = "「어쩔 수 없지. 이렇게 장식되어 있는 벽화를 나쁘게 말하다니……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「しょうがないじゃない！\u3000日誌に書かれてる以上、これは事実なんだから！」"
translation = "「어쩔 수 없잖아! 일지에 쓰여 있는 이상, 이건 사실이니까!」"

[[dialogue]]
speaker = "unk"
original = "魔王を英雄などとうそぶくのは、邪神を信仰していると公言するようなものなのかも。"
translation = "마왕을 영웅이라고 지껄이는 것은, 사신을 신앙하고 있다고 공언하는 것과 같을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "星徒会メンバーが集まってこんな話をしているのは不穏当だ。"
translation = "성도회 멤버가 모여 이런 이야기를 하는 것은 부당하다."

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "하지만……"

[[dialogue]]
speaker = "unk"
original = "思えば出会った時から俺のことを《魔王》と認定していたヴィーナス。"
translation = "생각해 보면 만났을 때부터 나를 《마왕》으로 인정했던 비너스."

[[dialogue]]
speaker = "unk"
original = "あれも別に俺を敵視していたわけではなく、むしろ英雄視していたと考えればしっくり来る。"
translation = "그것도 별로 나를 적대시했던 것이 아니라, 오히려 영웅시하고 있었다고 생각하면 납득이 간다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスは……俺のことを<b>そう</b>だと言いたいのか」"
translation = "「비너스는…… 나를 <b>그렇</b>다고 말하고 싶은 건가」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。言ったでしょう、クロト。私は──あなたのことを信じているのよ」"
translation = "「응. 말했잖아, 쿠로토. 나는── 네가 믿고 있는 거야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よく見てみなさい、この『魔王』の姿を。クロトに似てると思わない？」"
translation = "「잘 봐, 이 『마왕』의 모습을. 쿠로토랑 닮았다고 생각하지 않아?」"

[[dialogue]]
speaker = "クロト"
original = "「そうか……？」"
translation = "「그런가……?」"

[[dialogue]]
speaker = "マトイ"
original = "「倒れてて顔が見えないもん」"
translation = "「쓰러져 있어서 얼굴이 안 보이는걸」"

[[dialogue]]
speaker = "アナ"
original = "「というか、この絵柄では誰に似てるとかの問題ではない気もしますが」"
translation = "「랄까, 이 그림체로는 누구를 닮았는지의 문제는 아닌 것 같기도 합니다만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どう見てもそっくりよ！\u3000耳の形なんか、ホラ！」"
translation = "「어떻게 봐도 똑같아! 귀 모양 같은 건, 봐!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「御前試合の際に目覚めたあの力もそう！\u3000クロトが魔王の資質を眠らせてるってだけなのよ！」"
translation = "「어전 시합 때 눈을 뜬 그 힘도 그래! 쿠로토가 마왕의 자질을 잠재우고 있을 뿐인 거야!」"

[[dialogue]]
speaker = "マトイ"
original = "「なんかますます主人公……！\u3000わ、私にも秘めたる力ってないのかな……？」"
translation = "「뭔가 점점 더 주인공……! 와, 나에게도 숨겨진 힘 같은 건 없을까……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「マトイちゃんはそのままが一番可愛いのよ～」"
translation = "「마토이짱은 있는 그대로가 가장 귀여운 거야~」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが俺のことを買ってくれているのはわかっていた。"
translation = "비너스가 나를 높이 평가하고 있다는 것은 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女の言う通り、自分でも知らない未知の力が眠っていたのも本当だった。だから、もしかしたら自分がリクリエを止める鍵になるかもしれないということも、ひとまず受け入れられる。"
translation = "그녀가 말한 대로, 자신도 모르는 미지의 힘이 잠들어 있었다는 것도 사실이었다. 그러니, 어쩌면 자신이 리크리에를 막는 열쇠가 될지도 모른다는 것도 일단 받아들일 수 있다."

[[dialogue]]
speaker = "unk"
original = "だが、俺は彼女にそもそもの疑問を訊ねたかった。"
translation = "하지만, 나는 그녀에게 근본적인 의문을 묻고 싶었다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス。ひとつ訊かせてくれ」"
translation = "「비너스. 하나 물어보자」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何かしら？」"
translation = "「뭔가요?」"

[[dialogue]]
speaker = "クロト"
original = "「君が、そこまで『日誌』を信用している理由はなんだ？」"
translation = "「네가, 그렇게까지 『일지』를 신용하는 이유는 뭐지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それは……」"
translation = "「그것은……」"

[[dialogue]]
speaker = "アナ"
original = "「……これまで数々の記述を的中させてきたからかと。<ruby>誤謬<rt>ごびゅう</rt></ruby>はほとんどなかったそうです」"
translation = "「……지금까지 수많은 기술을 적중시켜 왔기 때문이 아닐까 합니다. 오류는 거의 없었다고 합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうそう。だから信じないほうが損ってワケ──」"
translation = "「맞아 맞아. 그러니까 안 믿는 쪽이 손해라는 거지──」"

[[dialogue]]
speaker = "クロト"
original = "「──いや」"
translation = "「──아니」"

[[dialogue]]
speaker = "クロト"
original = "「それだけじゃないはずだ。君にはもっと、その日誌に信を置くべき何かがある」"
translation = "「그것만이 아닐 것이다. 너에게는 좀 더, 그 일지에 신뢰를 둘 만한 무언가가 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "俺が強くそう問うと、ヴィーナスは驚いて息を呑んだ。"
translation = "내가 강하게 그렇게 묻자, 비너스는 놀라서 숨을 삼켰다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふ……やるわね、クロト。本当はもっと後で話そうと思ってたんだけど」"
translation = "「후후…… 제법이네, 쿠로토. 사실은 좀 더 나중에 이야기하려고 했는데」"

[[dialogue]]
speaker = "unk"
original = "そう言うとヴィーナスは──その日誌の、<b>最初のページ</b>を開いて見せた。"
translation = "그렇게 말하며 비너스는──그 일지의, <ruby>첫 페이지<rt>・ ・・・</rt></ruby>를 펼쳐 보였다."

[[dialogue]]
speaker = "クロト"
original = "「これは──１ページ目……？」"
translation = "「이것은──1페이지……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。森羅暦２９９７年<ruby>天狼<rt>てんろう</rt></ruby>ノ月十三日──今から５年前の記述」"
translation = "「응. 신라력 2997년 천랑의 달 13일──지금으로부터 5년 전의 기록」"

[[dialogue]]
speaker = "unk"
original = "──５年前？"
translation = "──5년 전?"

[[dialogue]]
speaker = "unk"
original = "俺は、その日付に釘付けになりながらヴィーナスの言葉を聞く。"
translation = "나는, 그 날짜에 못 박힌 채 비너스의 말을 들었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私ね。小さい頃の記憶がないの。だけど、気づいたらこの日誌を持ってて──そこには『九浄家に行け』って記されてた」"
translation = "「나 말이야. 어릴 적 기억이 없어. 하지만, 정신 차려 보니 이 일지를 가지고 있었고──거기에는 『쿠죠 가문으로 가라』고 적혀 있었어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それで無事に私は九浄の家の養子になって。今の私──九浄ヴィーナスがあるってわけ」"
translation = "「그래서 무사히 나는 쿠죠 가문의 양녀가 되었지. 지금의 나──쿠죠 비너스가 있는 셈이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こう言ったら、元々私がこの日誌を信頼していたのもわかるかしら？」"
translation = "「이렇게 말하면, 원래 내가 이 일지를 신뢰하고 있었다는 것도 알겠어?」"

[[dialogue]]
speaker = "クロト"
original = "「記憶喪失──ヴィーナスが、そうだったのか？」"
translation = "「기억상실──비너스가, 그랬던 건가?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そういえば、クロトくんは初耳だったかも～」"
translation = "「그러고 보니, 쿠로토 군은 처음 들었을지도~」"

[[dialogue]]
speaker = "マトイ"
original = "「私たちは何度も聞いてるんだけどね。ヴィーナスのとんでもエピソード！」"
translation = "「우리는 몇 번이나 들었는데 말이야. 비너스의 터무니없는 에피소드!」"

[[dialogue]]
speaker = "unk"
original = "いわく、ヴィーナスが物心ついたのはわずか５年前のことだという。"
translation = "말인즉슨, 비너스가 사리 분별을 하게 된 것은 불과 5년 전의 일이라고 한다."

[[dialogue]]
speaker = "unk"
original = "それまでの記憶は一切ないままにただ日誌だけを持っており、その記述に従って生きてきた結果が今だということだ。"
translation = "그전까지의 기억은 일절 없는 채 오직 일지만을 가지고 있었으며, 그 기록에 따라 살아온 결과가 지금이라는 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから九浄ヴィーナスとしての私がここにいるのもこの日誌のおかげなの。どう、理解できた？」"
translation = "「그러니까 쿠죠 비너스로서의 내가 여기에 있는 것도 이 일지 덕분인 거야. 어때, 이해했어?」"

[[dialogue]]
speaker = "クロト"
original = "「なるほどな……」"
translation = "「과연 그렇군……」"

[[dialogue]]
speaker = "unk"
original = "それは確かにとんでもエピソードだ"
translation = "그것은 확실히 터무니없는 에피소드다"

[[dialogue]]
speaker = "unk"
original = "俺は信じられるよ"
translation = "나는 믿을 수 있어"

[[dialogue]]
speaker = "クロト"
original = "「それは確かにとんでもエピソードだ」"
translation = "「그것은 확실히 터무니없는 에피소드다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あはは、そうよね。今まで誰にも信じてもらえたことないし」"
translation = "「아하하, 그렇지. 지금까지 누구에게도 믿음을 받은 적 없고」"

[[dialogue]]
speaker = "クロト"
original = "「俺は信じられるよ」"
translation = "「나는 믿을 수 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがと。でも、普通はありえないわよね」"
translation = "「고마워. 하지만, 보통은 있을 수 없는 일이지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「正直ね。アナやクロトの気持ちもわかる。未来のことが全部書かれてるなんて……正直ちょっと、気味悪いっていうのも」"
translation = "「솔직히 말이야. 아나나 쿠로토의 마음도 이해해. 미래의 일이 전부 쓰여 있다니…… 솔직히 좀, 소름 끼친다는 것도」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、私は。理屈じゃうまく説明できないけど……この日誌を信じたいの！\u3000この記述の先には、きっといい未来が待ってるんだって」"
translation = "「하지만, 나는. 이치로는 잘 설명할 수 없지만…… 이 일지를 믿고 싶어! 이 기록의 끝에는, 분명 좋은 미래가 기다리고 있을 거라고」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナス……」"
translation = "「비너스……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは両手で宝物のように日誌を抱きしめた。"
translation = "비너스는 양손으로 보물처럼 일지를 끌어안았다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「書いてあることはすごく難しいし、時々ちゃんと読めなかったりするけど……私にはこの文字に、すごく温かみを覚えるっていうか」"
translation = "「쓰여 있는 것은 엄청 어렵고, 가끔 제대로 읽지 못할 때도 있지만…… 나는 이 글자에서, 굉장히 따뜻함을 느낀다고 할까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「毎日、これに沿って生きてきたおかげで──こうして新星学園に入れて、みんなっていう友達ができて……」"
translation = "「매일, 이것을 따라 살아온 덕분에──이렇게 신성 학원에 들어오고, 모두라는 친구들이 생기고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王──クロトにだって出会えたんだもの！\u3000だから……私はこの日誌に沿って生きたいの」"
translation = "「마왕──쿠로토까지 만날 수 있었는걸! 그러니까…… 나는 이 일지를 따라 살고 싶어」"

[[dialogue]]
speaker = "クロト"
original = "「……理屈じゃなく、ってことだな」"
translation = "「……이치가 아니라, 라는 거군」"

[[dialogue]]
speaker = "unk"
original = "日誌の終着点でもあった『魔王』──つまり俺との出会いは。"
translation = "일지의 종착점이기도 했던 『마왕』──즉 나와의 만남은."

[[dialogue]]
speaker = "unk"
original = "彼女にとってそれまで生きてきた目標でもあり、これから生きる指針でもあるということだ。"
translation = "그녀에게 있어 그때까지 살아온 목표이기도 하며, 앞으로 살아갈 지침이기도 하다는 것이다."

[[dialogue]]
speaker = "クロト"
original = "「……わかった。ありがとう。ちょっと悩んだけど……やっぱり俺はヴィーナスを信じるよ」"
translation = "「……알았다. 고맙다. 조금 고민했지만…… 역시 나는 비너스를 믿을게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほんと……！？」"
translation = "「정말……!?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。その日誌はまだまだ謎に包まれてるけど、それを信じたいっていうヴィーナスのことなら信じられる」"
translation = "「아아. 그 일지는 아직도 수수께끼에 싸여 있지만, 그것을 믿고 싶다는 비너스라면 믿을 수 있어」"

[[dialogue]]
speaker = "マトイ"
original = "「真顔で言うんだね、そういうこと……」"
translation = "「진지한 표정으로 말하는구나, 그런 것을……」"

[[dialogue]]
speaker = "サーシャ"
original = "「それがクロトくんの美点というものだわ～」"
translation = "「그것이 쿠로토 군의 미덕이라는 것이지~」"

[[dialogue]]
speaker = "アナ"
original = "「私たちも面と向かっては言えませんが似たようなものです。前会長は不用心すぎますが、悪い人ではありません」"
translation = "「저희도 면전에서는 말할 수 없지만 비슷한 것입니다. 전 회장님은 너무 부주의하지만, 나쁜 사람은 아닙니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どういう意味よ！」"
translation = "「무슨 의미야!」"

[[dialogue]]
speaker = "クロト"
original = "「はは……」"
translation = "「하하……」"

[[dialogue]]
speaker = "unk"
original = "確かにヴィーナスの出自は驚きのものだった。"
translation = "확실히 비너스의 출신은 놀라운 것이었다."

[[dialogue]]
speaker = "unk"
original = "しかし、俺には同じくらい見過ごせない事実もあって……"
translation = "하지만, 나에게는 그만큼 간과할 수 없는 사실도 있어서……"

[[dialogue]]
speaker = "クロト"
original = "（森羅暦２９９７年天狼ノ月拾参日──これは、偶然か？）"
translation = "（신라력 2997년 천랑의 달 13일──이것은, 우연인가?）"

[[dialogue]]
speaker = "unk"
original = "その日付を聞いて俺は驚かずにいられなかった。なぜなら、その日は──"
translation = "그 날짜를 듣고 나는 놀라지 않을 수 없었다. 왜냐하면, 그날은──"

[[dialogue]]
speaker = "セイファート"
original = "「強くあれ。世界を取り込まんとする力に、決して飲まれることなきように」"
translation = "「강하게 있어라. 세계를 집어삼키려는 힘에, 결코 잠식되지 않도록」"

[[dialogue]]
speaker = "unk"
original = "あの日と、同じ。"
translation = "그날과, 같다."

[[dialogue]]
speaker = "unk"
original = "俺がアステラに連れ去られ、助けられ、そして初めて星騎士を志したあの日と。"
translation = "내가 아스테라에 납치당하고, 도움을 받고, 그리고 처음으로 성기사를 지망했던 그날과."

[[dialogue]]
speaker = "unk"
original = "だが、偶然と呼ぶにはできすぎている気もする。"
translation = "하지만, 우연이라고 부르기에는 너무 잘 맞아떨어지는 것 같기도 하다."

[[dialogue]]
speaker = "クロト"
original = "（もっと言うなら──幼い頃の記憶がないというのは、俺も……）"
translation = "（더 말하자면──어릴 적 기억이 없다는 것은, 나도……）"

[[dialogue]]
speaker = "マトイ"
original = "「ぁ……アラート？」"
translation = "「아…… 알람?」"

[[dialogue]]
speaker = "クロト"
original = "「──アステラか」"
translation = "「──아스테라인가」"

[[dialogue]]
speaker = "unk"
original = "通信端末──<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>の特別アラートが鳴る。"
translation = "통신 단말──디스크의 특별 알람이 울린다."

[[dialogue]]
speaker = "unk"
original = "この音は、星徒会へのコールですなわち出動の合図だ。"
translation = "이 소리는, 성도회에 대한 호출이며 곧 출동의 신호다."

[[dialogue]]
speaker = "クロト"
original = "「──よし。色々とスッキリしたところで……星徒会任務といくぞ！」"
translation = "「──좋아. 여러 가지로 개운해진 참에…… 성도회 임무로 간다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「了解よ！\u3000ただひとつ確かなのは、やっぱりクロトには秘められたる真の力があるってこと！」"
translation = "「알겠어! 단 하나 확실한 것은, 역시 쿠로토에게는 숨겨진 진정한 힘이 있다는 것!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ、それはこの目で見たから確かよね～」"
translation = "「후후, 그것은 이 눈으로 봤으니까 확실하지~」"

[[dialogue]]
speaker = "マトイ"
original = "（羨ましい主人公属性……！\u3000私も見習いたい……！）"
translation = "（부러운 주인공 속성……! 나도 본받고 싶어……!）"

[[dialogue]]
speaker = "アナ"
original = "「全員出動準備ＯＫ。いつでも行けます、会長」"
translation = "「전원 출동 준비 OK. 언제든지 갈 수 있습니다, 회장님」"

[[dialogue]]
speaker = "クロト"
original = "「了解──至急現場へ急行するぞ。新星星徒会、出動だ！」"
translation = "「알겠다──지체 없이 현장으로 급행한다. 신성 성도회, 출동이다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なかなか板についてきたわね！」"
translation = "「제법 익숙해졌네!」"

