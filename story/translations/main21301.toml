[[dialogue]]
speaker = "unk"
original = "第１話,神への願い事,B"
translation = "제1화, 신을 향한 소원, B"

[[dialogue]]
speaker = "unk"
original = "平行世界デネブのフィーニスの塔、その頂上。"
translation = "평행세계 데네브의 피니스의 탑, 그 꼭대기."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは、自身の頭上に現れた存在に向かって<ruby>頭<rt>こうべ</rt></ruby>を垂れた。"
translation = "루비네는, 자신의 머리 위에 나타난 존재를 향해 고개를 숙였다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「お会いできて光栄です──<b>お父様</b>」"
translation = "「뵙게 되어 영광입니다──<b>아버님</b>」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『────。──、────』"
translation = "『────. ──, ────』"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は文字どおり、住む次元の違う存在──ゆえに発される『声』は、三次元世界において明確に翻訳することは不可能だ。"
translation = "『<ruby>XELOS<rt>제로스</rt></ruby>』는 문자 그대로, 사는 차원이 다른 존재── 그렇기에 발해지는 『목소리』는, 3차원 세계에서 명확하게 번역하는 것이 불가능하다."

[[dialogue]]
speaker = "unk"
original = "しかし次世代の女神、その幼体であるルヴィネならば、その意味を<ruby>繙<rt>ひもと</rt></ruby>くことができる。"
translation = "하지만 차세대 여신, 그 유체인 루비네라면, 그 의미를 풀어낼 수 있다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「……報告いたします。先日、２名の部下にアルタイルの天界襲撃を命じました」"
translation = "「……보고하겠습니다. 요전날, 2명의 부하에게 알타이르의 천계 습격을 명했습니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「天界にある神殿を破壊すれば、かの地の天使をすべて消し去ることができ……アルタイルの破滅は秒読みになる予定でした」"
translation = "「천계에 있는 신전을 파괴하면, 그 땅의 천사를 모두 없앨 수 있고…… 알타이르의 파멸은 초읽기에 들어갈 예정이었습니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──しかし３日経った今も、部下たちは戻ってきておりません。おそらく、緋宮クロト率いる星騎士たちに敗北したと思われます」"
translation = "「──하지만 3일이 지난 지금도, 부하들은 돌아오지 않고 있습니다. 아마도, 히노미야 쿠로토가 이끄는 성기사들에게 패배한 것으로 보입니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「転送装置は破壊されたか、<ruby>鹵獲<rt>ろかく</rt></ruby>されたか……申し訳ございません。リクリエの成就の日が遠のきました……私の失態です」"
translation = "「전송 장치는 파괴되었거나, 포획되었거나…… 죄송합니다. 리크리에의 성취일이 멀어졌습니다…… 저의 실책입니다」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『──────、──？』"
translation = "『──────, ──？』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──っ！\u3000そ、それは……」"
translation = "「──윽! 그, 그것은……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「転送装置を暴走させ、自爆しないよう命じたのは……あの２名が……とても、優秀だからです」"
translation = "「전송 장치를 폭주시켜, 자폭하지 않도록 명한 것은…… 그 2명이…… 매우, 우수하기 때문입니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「天界襲撃が成功したとしても、すぐにアルタイルが消滅するわけではありません」"
translation = "「천계 습격이 성공했다 하더라도, 즉시 알타이르가 소멸하는 것은 아닙니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「天使がいなくなった後となれば、残る人間族と魔族の抵抗は激しいものが予想されました。その時のために、戦力を残しておく必要が……」"
translation = "「천사가 사라진 뒤라면, 남은 인간족과 마족의 저항이 격렬할 것으로 예상되었습니다. 그때를 위해, 전력을 남겨둘 필요가……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「それに緋宮クロトたちは一度、転送装置の暴走を防いでいます。失敗した手段を、二度続けるのは得策ではないと、判断しました……」"
translation = "「게다가 히노미야 쿠로토 일행은 한 번, 전송 장치의 폭주를 막아냈습니다. 실패한 수단을 두 번 반복하는 것은 득책이 아니라고, 판단했습니다……」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『──。────』"
translation = "『──. ────』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「次は……私が出ます。これまではできる限り手の内を明かさず、緋宮クロトたちの力を削ぐ予定でしたが……計画を変更せざるを得ません」"
translation = "「다음은…… 제가 나가겠습니다. 지금까지는 가능한 한 패를 밝히지 않고, 히노미야 쿠로토 일행의 힘을 깎을 예정이었습니다만…… 계획을 변경할 수밖에 없습니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「新しい転送装置が完成すれば、すぐにアルタイルを滅ぼし、そして──」"
translation = "「새로운 전송 장치가 완성되면, 즉시 알타이르를 멸망시키고, 그리고──」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……デネブも。ベガのように滅ぼしてご覧に入れます」"
translation = "「……데네브도. 베가처럼 멸망시켜 보이겠습니다」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『……………………』"
translation = "『……………………』"

[[dialogue]]
speaker = "unk"
original = "長い沈黙の果てに、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は。"
translation = "긴 침묵 끝에, 『<ruby>XELOS<rt>제로스</rt></ruby>』는."

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『──────』"
translation = "『──────』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「え……」"
translation = "「에……」"

[[dialogue]]
speaker = "unk"
original = "お前には期待している──ルヴィネにそう告げた。"
translation = "너에게는 기대하고 있다── 루비네에게 그렇게 고했다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「も……もったいないお言葉です、お父様」"
translation = "「과…… 과분한 말씀입니다, 아버님」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『────、──────、────？』"
translation = "『────, ──────, ────？』"

[[dialogue]]
speaker = "ルヴィネ"
original = "（今日のお父様は珍しい……こんなにも喋ってくれること、今までになかった）"
translation = "(오늘의 아버님은 드무네…… 이렇게나 많이 말씀해 주시는 것, 지금까지 없었어)"

[[dialogue]]
speaker = "ルヴィネ"
original = "（『必要なものがあれば、何でも願い出ろ』だなんて……）"
translation = "(『필요한 것이 있다면, 무엇이든 청해라』라니……)"

[[dialogue]]
speaker = "unk"
original = "今までにも似たような問いかけはあった。そのたびにルヴィネは様々なものを創ってもらった。"
translation = "지금까지도 비슷한 질문은 있었다. 그때마다 루비네는 다양한 것들을 만들어 받았다."

[[dialogue]]
speaker = "unk"
original = "極星従騎。霊力による強化を行える特製のセレスティア。そして平行世界を跳躍する転送装置。"
translation = "극성종기. 영력에 의한 강화를 행할 수 있는 특제 셀레스티아. 그리고 평행세계를 도약하는 전송 장치."

[[dialogue]]
speaker = "unk"
original = "たくさんのものを<ruby>下賜<rt>かし</rt></ruby>してくれたにも関わらず、さらに願ってよいと父は言う。"
translation = "많은 것을 하사해 주었음에도 불구하고, 더욱 바라도 좋다고 아버지는 말한다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「あの……それは、どんなことでもよいのでしょうか？\u3000例えば、モノでなくとも……？」"
translation = "「저기…… 그것은, 어떤 것이라도 괜찮은 건가요? 예를 들어, 물건이 아니더라도……?」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "ルヴィネ"
original = "（望むものを、与えてくださる……）"
translation = "(원하는 것을, 주신다……)"

[[dialogue]]
speaker = "unk"
original = "ルヴィネは考える。"
translation = "루비네는 생각한다."

[[dialogue]]
speaker = "unk"
original = "考えて、考えて、考えて──"
translation = "생각하고, 생각하고, 생각해서──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「それではお父様……お願いがあります」"
translation = "「그렇다면 아버님…… 부탁이 있습니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「すべての平行世界を刷新し、私が新たな女神となった暁には……」"
translation = "「모든 평행세계를 쇄신하고, 제가 새로운 여신이 된 새벽에는……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「極星学園星徒会の……あの４人の魂を、次の世界へ連れて行っても、よいでしょうか……？」"
translation = "「극성학원 성도회의…… 그 4명의 영혼을, 다음 세계로 데려가도, 괜찮을까요……?」"

[[dialogue]]
speaker = "unk"
original = "ずっと昔から温めていた、ついぞ口に出せなかった願いを、ルヴィネは口に出した。"
translation = "아주 예전부터 품어왔던, 차마 입 밖으로 내지 못했던 소원을, 루비네는 입 밖으로 냈다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「テルルには、己の手足とも言うべき守護天使がいます。私にも、守護天使を持つ許可を、いただきたく……」"
translation = "「테루루에게는, 자신의 수족이라 할 수 있는 수호천사가 있습니다. 저에게도, 수호천사를 가질 허가를, 받고 싶어서……」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『……………………』"
translation = "『……………………』"

[[dialogue]]
speaker = "unk"
original = "父は何も喋らない。まだ世界の刷新もできていないのに、皮算用が過ぎただろうか。"
translation = "아버지는 아무 말도 하지 않는다. 아직 세계의 쇄신도 하지 못했는데, 김칫국을 너무 마신 것일까."

[[dialogue]]
speaker = "unk"
original = "沈黙を破ろうとルヴィネが口を開きかけた、その時だった。"
translation = "침묵을 깨려고 루비네가 입을 열려던, 그때였다."

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あ……ありがとうございます！\u3000お父様……！！」"
translation = "「아…… 감사합니다! 아버님……!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（聞き届けて、いただけた……！\u3000でも、私の願いは、それだけではなくて……）"
translation = "(들어주셨어……! 하지만, 제 소원은, 그것뿐만이 아니라서……)"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『──。────、────』"
translation = "『──. ────, ────』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「え……あ……」"
translation = "「에…… 아……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（他に連れていきたい者があれば、好きなだけ連れていくがよい──？）"
translation = "(그 외에 데려가고 싶은 자가 있다면, 원하는 만큼 데려가도 좋다──?)"

[[dialogue]]
speaker = "ルヴィネ"
original = "（流石はお父様……私の考えることなど、お見通しということ？）"
translation = "(역시 아버님…… 제가 생각하는 것 따위, 꿰뚫어 보고 계신다는 건가요?)"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──で、では。転生を望むデネブの住人は、霊体の下級天使として連れて行かせてください」"
translation = "「──그, 그럼. 전생을 바라는 데네브의 주민은, 영체의 하급 천사로서 데려가게 해 주세요」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "ルヴィネ"
original = "「はい。必ず……！\u3000次代の女神として。世界の刷新を、お約束いたします……！」"
translation = "「네. 반드시……! 차세대 여신으로서. 세계의 쇄신을, 약속드립니다……!」"

[[dialogue]]
speaker = "unk"
original = "世界の終幕は、着実に近づきつつあった──"
translation = "세계의 종막은, 착실히 다가오고 있었다──"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
original = "『……………………』"
translation = "『……………………』"

