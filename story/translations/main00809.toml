[[dialogue]]
speaker = "unk"
original = "第１１話,影、推参,B"
translation = "제11화, 그림자, 출현, B"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──あ。そうだ」"
translation = "「──아. 맞다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃ──私からもひとつ、言っておかなきゃいけないわね」"
translation = "「그럼── 나도 하나, 말해 둬야겠네」"

[[dialogue]]
speaker = "クロト"
original = "「？\u3000俺たちに関わることか？」"
translation = "「? 우리들과 관련된 건가?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。ちょっと照れくさいけど……散々みんなを振り回しちゃったお詫びに、言っておかなきゃなって」"
translation = "「응. 조금 쑥스럽지만…… 실컷 모두를 휘둘러 버린 것에 대한 사과로, 말해 둬야겠다고」"

[[dialogue]]
speaker = "セーラ"
original = "「なになに、告白？」"
translation = "「뭐야 뭐야, 고백?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あはは。似たようなものかも」"
translation = "「아하하. 비슷한 걸지도」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっとね。私って今まで、クロトにばかりこだわってきたじゃない？」"
translation = "「음. 나 말이야, 지금까지, 쿠로토에게만 집착해 왔잖아?」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。自覚あったんだ」"
translation = "「응. 자각하고 있었구나」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私もねえ、それが自分の中でも謎だったんだけど。この間──ちょっとしたきっかけでわかったの！」"
translation = "「나도 말이지, 그게 내 안에서도 수수께끼였는데. 요전에── 사소한 계기로 알게 됐어!」"

[[dialogue]]
speaker = "セーラ"
original = "（……え。あ、あれ？\u3000マジの告白？）"
translation = "（……에. 아, 어라? 진짜 고백?）"

[[dialogue]]
speaker = "フィオナ"
original = "（拝聴しましょう）"
translation = "（경청하겠습니다）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私にとって、クロトが特別なのは──」"
translation = "「나에게 있어서, 쿠로토가 특별한 것은──」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが胸を張って、宣言する。"
translation = "비너스가 가슴을 펴고, 선언한다."

[[dialogue]]
speaker = "unk"
original = "その瞬間だった。"
translation = "그 순간이었다."

[[dialogue]]
speaker = "セーラ"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "刺すような気配がよぎる。"
translation = "찌르는 듯한 기척이 스쳐 지나간다."

[[dialogue]]
speaker = "unk"
original = "気づき、目をやり、構えた時にはもう遅かった。"
translation = "눈치채고, 눈을 돌려, 자세를 취했을 때는 이미 늦었다."

[[dialogue]]
speaker = "unk"
original = "斬撃が、<b>塔を割った</b>。"
translation = "참격이, <ruby>탑을 갈랐다<rt>・・ ・・・</rt></ruby>."

[[dialogue]]
speaker = "ヴィーナス"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "アナ"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "マトイ"
original = "「────ッ！\u3000何────っ！？」"
translation = "「────읏! 뭐────읏!?」"

[[dialogue]]
speaker = "unk"
original = "それは信じられない光景だった。"
translation = "그것은 믿을 수 없는 광경이었다."

[[dialogue]]
speaker = "unk"
original = "何者かによる介入。それだけではない。"
translation = "누군가에 의한 개입. 그것만이 아니다."

[[dialogue]]
speaker = "unk"
original = "『外』から撃ち込まれた攻撃が──この、フィーニスの塔内部にまで貫通している！！"
translation = "『밖』에서 쏘아진 공격이── 이, 피니스의 탑 내부에까지 관통하고 있다!!"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャアアアア──ッ！？」"
translation = "「냐아아아아──읏!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「下がれ、全員──ッ！！」"
translation = "「물러서, 전원──읏!!」"

[[dialogue]]
speaker = "unk"
original = "その斬撃は大地を割った。"
translation = "그 참격은 대지를 갈랐다."

[[dialogue]]
speaker = "unk"
original = "滅んだ世界をさらに破滅させかねないほど、甚大で強力無比な一閃だった。"
translation = "멸망한 세계를 더욱 파멸시킬 수 있을 정도로, 엄청나고 강력무비한 일섬이었다."

[[dialogue]]
speaker = "unk"
original = "俺とユウリが全員を弾き飛ばしたことで、かろうじて致命傷をまぬがれる。"
translation = "나와 유우리가 전원을 튕겨낸 덕분에, 간신히 치명상을 면한다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "？？？"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "クロト"
original = "「な──ん…………」"
translation = "「뭐──ㄴ…………」"

[[dialogue]]
speaker = "ソフィア"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "マトイ"
original = "「……何──あれは…………？」"
translation = "「……뭐── 저건…………?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ボス戦は──終わったはずじゃ、なかったのかニャ……！？」"
translation = "「보스전은── 끝났어야 했던 거 아니었냐옹……!?」"

[[dialogue]]
speaker = "unk"
original = "異形の影がそこに立っていた。"
translation = "이형의 그림자가 그곳에 서 있었다."

[[dialogue]]
speaker = "unk"
original = "黒き甲冑をまとったそのシルエットは、深淵を思わせるほどに暗くよどんでいる。"
translation = "검은 갑옷을 두른 그 실루엣은, 심연을 떠올리게 할 정도로 어둡게 침체되어 있다."

[[dialogue]]
speaker = "unk"
original = "この世界の住人──では、ありえない。"
translation = "이 세계의 주민──은, 아닐 것이다."

[[dialogue]]
speaker = "unk"
original = "なぜなら奴の背後には……次元の大穴が虚空に<ruby>穿<rt>うが</rt></ruby>たれていた。"
translation = "왜냐하면 녀석의 배후에는…… 차원의 큰 구멍이 허공에 뚫려 있었다."

[[dialogue]]
speaker = "unk"
original = "あれは塔の外から、直接、この地へ踏み入ってきたのだ。"
translation = "저것은 탑 밖에서, 직접, 이 땅으로 발을 들여놓은 것이다."

[[dialogue]]
speaker = "unk"
original = "そして、問答無用でこちらへ仕掛けてきた攻撃からしても──話の通じる相手ではない。"
translation = "그리고, 묻지도 따지지도 않고 이쪽으로 걸어온 공격으로 보아도── 말이 통하는 상대가 아니다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「──ッ、づ……くっ……！」"
translation = "「──읏, 즈…… 크읏……!」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナスッ──大丈夫！？」"
translation = "「비너스읏── 괜찮아!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「チッ──不意打ちなんて、卑怯な野郎がよ──！」"
translation = "「칫── 기습이라니, 비겁한 녀석이군──!」"

[[dialogue]]
speaker = "unk"
original = "輪の中心にいたヴィーナスは──深刻なダメージをもらっていた。"
translation = "원의 중심에 있던 비너스는── 심각한 피해를 입고 있었다."

[[dialogue]]
speaker = "？？？"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "クロト"
original = "「──なんだ。何者だ……おまえは」"
translation = "「──뭐냐. 누구냐…… 너는」"

[[dialogue]]
speaker = "unk"
original = "俺は、そんな彼女をかばうように立ち──異形の影と対峙する。"
translation = "나는, 그런 그녀를 감싸듯이 서서── 이형의 그림자와 대치한다."

[[dialogue]]
speaker = "unk"
original = "黒い戦兜が頭部までを覆っており、正体どころか性別すらも判然としない。"
translation = "검은 투구가 머리까지 덮고 있어, 정체는 물론 성별조차도 분명하지 않다."

[[dialogue]]
speaker = "アナ"
original = "「会長。これは……」"
translation = "「회장님. 이것은……」"

[[dialogue]]
speaker = "クロト"
original = "「イレギュラーだ。気を緩めるな。反撃する」"
translation = "「이레귤러다. 방심하지 마. 반격한다」"

[[dialogue]]
speaker = "unk"
original = "塔のギミックではない・知った相手でもない・攻撃こそが最善の一手──要点のみの指令を簡潔に下した。"
translation = "탑의 장치가 아니다・아는 상대도 아니다・공격이야말로 최선의 한 수── 요점만의 지령을 간결하게 내렸다."

[[dialogue]]
speaker = "unk"
original = "状況の判断は追いついていないが……先んじて仕掛けなければ、こちらがやられると直感した。"
translation = "상황 판단은 따라가지 못하고 있지만…… 먼저 걸지 않으면, 이쪽이 당한다고 직감했다."

[[dialogue]]
speaker = "ユウリ"
original = "「誰だか知らねえけど──無礼者には違いねえな！」"
translation = "「누군지는 모르겠지만── 무례한 놈인 건 틀림없군!」"

[[dialogue]]
speaker = "ルリエル"
original = "「味方でないことは確かですっ──！」"
translation = "「아군이 아닌 것은 확실합니다읏──!」"

[[dialogue]]
speaker = "ソフィア"
original = "「いきますよ、姉さん──！」"
translation = "「가겠어요, 언니──!」"

[[dialogue]]
speaker = "unk"
original = "煌竜を倒した時にも優る星術の波状攻撃が乱れ飛ぶ。"
translation = "황룡을 쓰러뜨렸을 때보다 뛰어난 성술의 파상 공격이 난무한다."

[[dialogue]]
speaker = "unk"
original = "その連撃をカーテンとして、俺も拳を握って突っ込む──"
translation = "그 연격을 커튼 삼아, 나도 주먹을 쥐고 돌진한다──"

[[dialogue]]
speaker = "クロト"
original = "「オオオオオオオオッッッ────！！」"
translation = "「오오오오오오오오옷────!!」"

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "？？？"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "サーシャ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "アナ"
original = "「なっ──」"
translation = "「뭣──」"

[[dialogue]]
speaker = "unk"
original = "通らなかった。"
translation = "통하지 않았다."

[[dialogue]]
speaker = "unk"
original = "俺たちの仕掛けたコンビネーション──そのどれも。"
translation = "우리들이 건 콤비네이션── 그 어느 것도."

[[dialogue]]
speaker = "ニャリオン"
original = "「なっ──なんでこっちの動きがわかるニャン！？」"
translation = "「뭐엇── 어째서 이쪽의 움직임을 아는 거냐옹!?」"

[[dialogue]]
speaker = "unk"
original = "緩急織り交ぜた俺たちの攻め手に対し──影の対処はあまりにも的確すぎた。"
translation = "완급을 섞은 우리들의 공격에 대해── 그림자의 대처는 너무나도 정확했다."

[[dialogue]]
speaker = "unk"
original = "アナの炎矢を逸らすことでサーシャさん達の氷撃を溶かし、裏から回り込んでいたマトイと俺がかち合うように立ち位置をコントロールされる。"
translation = "아나의 불화살을 빗나가게 함으로써 사샤 씨들의 빙격을 녹이고, 뒤에서 돌아가던 마토이와 내가 부딪히도록 위치를 컨트롤당한다."

[[dialogue]]
speaker = "unk"
original = "まるで、こちらの呼吸を熟知しているかのように……"
translation = "마치, 이쪽의 호흡을 숙지하고 있는 것처럼……"

[[dialogue]]
speaker = "ユウリ"
original = "「──ぐあっ！？」"
translation = "「──크악!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「っ、ッッ────！」"
translation = "「읏, 읏읏────!」"

[[dialogue]]
speaker = "クロト"
original = "「ぐっ──がっ、はっ……！？」"
translation = "「크읏── 칵, 학……!?」"

[[dialogue]]
speaker = "unk"
original = "そうして生じた全体の隙に──再び黒き斬撃が叩き込まれる。"
translation = "그렇게 생긴 전체의 틈에── 다시 검은 참격이 내리꽂힌다."

[[dialogue]]
speaker = "クロト"
original = "（もう一度、アレを──呼び覚ますしか、ない……！）"
translation = "（다시 한번, 저것을── 불러 깨울 수밖에, 없다……!）"

[[dialogue]]
speaker = "unk"
original = "地を這う。大地に祈る。"
translation = "땅을 기어간다. 대지에 기도한다."

[[dialogue]]
speaker = "unk"
original = "しかし、一度眠ってしまったあの力が、再び答えることはなかった。"
translation = "하지만, 한번 잠들어 버린 그 힘은, 다시 대답하는 일은 없었다."

