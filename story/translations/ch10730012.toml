[[dialogue]]
speaker = "unk"
original = "第２話,彼女ができた！？,P"
translation = "제2화, 여자친구가 생겼다!?, P"

[[dialogue]]
speaker = "unk"
original = "学園生活を送っていると様々なうわさを耳にするものだ。誰が誰と付き合ってるだとか、そういう噂は特に多いのだけど──"
translation = "학원 생활을 하다 보면 다양한 소문을 듣게 된다. 누가 누구와 사귄다거나 하는 소문은 특히 많은데──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええっ！？\u3000クロトに彼女ができたのっ？\u3000どどどっ、どんな子っ？\u3000お母さん、ご挨拶に行った方がいいんじゃないかしら！？」"
translation = "「에엣!? 쿠로토한테 여자친구가 생겼어? 어, 어, 어떤 애야? 엄마가 인사하러 가야 하는 거 아닐까!?」"

[[dialogue]]
speaker = "unk"
original = "だから、ただの噂だってば！"
translation = "그러니까, 그냥 소문이라니까!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あっ……そ、そうだったわね。息子にとうとう春が来たのかと思って舞い上がっちゃったわ……」"
translation = "「앗…… 그, 그랬지. 아들에게 드디어 봄이 왔나 싶어서 들떠버렸네……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふぅん、学園のお友達に、お付き合いしてる人がいるのかって聞かれたのね。でも……？」"
translation = "「흐응, 학원 친구들한테 사귀는 사람이 있냐는 질문을 받았구나. 하지만……?」"

[[dialogue]]
speaker = "unk"
original = "心当たりがないんだ"
translation = "짐작 가는 게 없어"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「妙な話ねぇ。でもあなたの周り、女の子が多いし……」"
translation = "「묘한 일이네. 하지만 네 주변엔 여자애가 많고……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「女の子と２人きりで、一緒に街を歩いてたところでも見られたんじゃないの？\u3000親しくない人から見たらカップルに見えた、みたいな」"
translation = "「여자애랑 둘이서 같이 거리를 걷는 모습이라도 목격된 거 아니야? 친하지 않은 사람이 보기엔 커플처럼 보였다든가」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ～、ちょっと待って。クロト、そこの服屋さん、寄って行きましょ？」"
translation = "「아~, 잠깐만. 쿠로토, 저기 옷 가게 들렀다 가자」"

[[dialogue]]
speaker = "unk"
original = "まだ買うの？"
translation = "또 사게?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いいじゃない。たまの休みの、親子水入らずのお出かけなんだから～」"
translation = "「좋잖아. 모처럼 쉬는 날에 부모 자식끼리 오붓하게 외출한 건데~」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ、いつ可愛い彼女ができてもいいように、かっこいいやつを見立ててあげるから。行くわよ？」"
translation = "「후후, 언제 귀여운 여자친구가 생겨도 괜찮도록 멋진 녀석으로 골라줄게. 가자?」"

[[dialogue]]
speaker = "unk"
original = "母さんは休日にまとめて買い物をする癖がある。そんな時、俺はよく荷物持ちに駆り出されるのだ。"
translation = "엄마는 휴일에 몰아서 장을 보는 버릇이 있다. 그럴 때 나는 자주 짐꾼으로 동원되곤 한다."

[[dialogue]]
speaker = "unk"
original = "もちろん買い物ついでに、俺の欲しいものなんかも買ってもらえるので、同行するのはやぶさかじゃない。"
translation = "물론 쇼핑하는 김에 내가 갖고 싶은 것도 살 수 있으니까, 동행하는 게 꺼려지는 건 아니다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ、この抹茶アイスおいしい。クロトも一口食べる？\u3000あーん♪」"
translation = "「아, 이 말차 아이스크림 맛있다. 쿠로토도 한 입 먹을래? 아─앙♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ねー、おいしいでしょ？\u3000あ、そっちのバニラも一口ちょうだい。ん～♪\u3000シンプルだけどいい味ね」"
translation = "「네─, 맛있지? 아, 그쪽 바닐라도 한 입 줘. 음~♪ 심플하지만 좋은 맛이네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「うんうん。やっぱり力持ちの息子がいる時こそ、分厚い学術本は買うべきよね。頼りになるわ～♪」"
translation = "「응응. 역시 힘센 아들이 있을 때야말로 두꺼운 학술 서적을 사야지. 든든하다니까~♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「もー。そんな不機嫌そうにしないの。荷物持ってくれる代わりに、今日は外食していきましょ？\u3000ねっ♪」"
translation = "「정말. 그렇게 기분 나쁜 표정 짓지 마. 짐 들어주는 대신 오늘은 외식하고 가자? 응♪」"

[[dialogue]]
speaker = "unk"
original = "そうして母さんとの休日はあっという間にすぎて──"
translation = "그렇게 엄마와의 휴일은 순식간에 지나가고──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「うん。お買い物も一通りすんだし、そろそろご飯食べに行こっか」"
translation = "「응. 쇼핑도 대충 끝났고 슬슬 밥 먹으러 갈까」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「私の古い友人が贔屓にしてるラーメン屋があってね、たまにはジャンクなのもいいでしょ？」"
translation = "「내 오래된 친구가 단골로 다니는 라면집이 있는데, 가끔은 정크 푸드도 괜찮지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら？\u3000そこにいるのは……会長くんとリノさん？」"
translation = "「어라? 거기 있는 건…… 회장군이랑 리노 씨?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「サーシャちゃん！\u3000久しぶりね。いつも息子がお世話になってます～」"
translation = "「사샤 짱! 오랜만이네. 항상 우리 아들이 신세 지고 있습니다~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いえいえ、こちらこそ。会長くんには助けてもらってばっかりですから～」"
translation = "「아니에요, 저야말로요. 회장군한테는 도움만 받고 있으니까요~」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ、そう言えばサーシャちゃん。ちょっと聞きたいことがあるの。何だかうちのクロトが誰かとお付き合いしてるって噂があるらしくって……」"
translation = "「아, 그러고 보니 사샤 짱. 조금 물어보고 싶은 게 있어. 아무래도 우리 쿠로토가 누군가와 사귀고 있다는 소문이 있는 모양인데……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～……最近、新星学園で流れてるやつかしら？\u3000会長くんが年上のお姉さんとお付き合いしてるっていう噂だったような～」"
translation = "「아~…… 최근 신성학원에서 돌고 있는 그거 말인가요? 회장군이 연상의 누나랑 사귀고 있다는 소문이었던 것 같은데~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「確か噂では、包容力のありそうな年上のお姉さんで、年齢感や髪の長さはちょうどリノさんくらい……って、んん～？」"
translation = "「확실히 소문으로는 포용력 있어 보이는 연상의 누나고, 나이대나 머리카락 길이는 딱 리노 씨 정도…… 어라, 음~?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ん……どうしたのかしら？」"
translation = "「응…… 왜 그러니?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「リノさんは、会長くんとはよくお出かけするんですか？」"
translation = "「리노 씨는 회장군이랑 자주 외출하시나요?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そうね。毎週ってわけじゃないけど、時間が合えば、よくお買い物をするわよ～」"
translation = "「그렇지. 매주는 아니지만 시간이 맞으면 자주 쇼핑하러 간단다~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それで荷物を持ってもらったり……？」"
translation = "「그래서 짐을 들어주게 하거나……?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「男の子だもの！\u3000やっぱり力持ちの息子は頼りになるのよね～」"
translation = "「남자애인걸! 역시 힘센 아들은 든든하다니까~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アイスの食べさせ合いっこをしたり……？」"
translation = "「아이스크림을 서로 먹여주거나……?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「２人でおやつを食べる時は、違うフレーバーを選んでシェア。それが緋宮家のルールなの。ふふ、お得でしょ？」"
translation = "「둘이서 간식 먹을 때는 다른 플레이버를 골라서 쉐어. 그게 히미야 가의 규칙이야. 후후, 이득이지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あー……ねぇ会長くん。たぶんだけど噂されてる彼女って……リノさんじゃない？」"
translation = "「아─…… 저기 회장군. 아마도 소문 속의 여자친구는…… 리노 씨 아니야?」"

[[dialogue]]
speaker = "unk"
original = "えええっ！？"
translation = "에에엣!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いやいや、だって私はこの子のお母さんで……年だって、ねぇ？」"
translation = "「아니 아니, 그치만 난 이 아이의 엄마고…… 나이도, 그치?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも傍から見たらデートそのものですし、それにリノさん、とってもお若く見えるからー……ふふ、仲良しなのはいいことね♪」"
translation = "「하지만 옆에서 보면 데이트 그 자체이기도 하고, 게다가 리노 씨, 엄청 젊어 보이시니까─…… 후후, 사이좋은 건 좋은 일이네요♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そ、そういうことだったのね……まさか息子との仲を噂されてるだなんて」"
translation = "「그, 그런 거였구나…… 설마 아들과의 사이를 소문내고 있었을 줄이야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「でもクロト。良かったわね～。お母さん、クロトみたいな学生とお付き合いしてるくらい若く見えるんだって！」"
translation = "「그치만 쿠로토. 잘됐네~. 엄마가 쿠로토 같은 학생이랑 사귀고 있을 정도로 젊어 보인대!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あなたも息子として鼻が高いでしょ？」"
translation = "「너도 아들로서 어깨가 으쓱하지?」"

[[dialogue]]
speaker = "unk"
original = "よくなーーーい！！！"
translation = "안 좋아───!!!"

[[dialogue]]
speaker = "unk"
original = "まさか母親と出かけてるところを見られて、年上のお姉さんと交際している噂を流されるだなんて。"
translation = "설마 어머니랑 외출한 모습을 들켜서 연상의 누나와 교제하고 있다는 소문이 퍼지다니."

[[dialogue]]
speaker = "unk"
original = "まあ確かに母さんは、めちゃくちゃ若く見えるけど……"
translation = "뭐, 확실히 엄마는 엄청나게 젊어 보이지만……"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クロトに恋人ができなかったら、お母さんが貰ってあげようかしら。なんてね、ふふふ♪」"
translation = "「쿠로토한테 애인이 안 생기면 엄마가 데려가 줄까? 농담이야, 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "軽口をたたく母さんを尻目に、早いところ本当の恋人を見つけなくちゃ──そう思う俺なのであった。"
translation = "가벼운 농담을 던지는 엄마를 뒤로하고, 빨리 진짜 애인을 찾아야겠다고── 그렇게 생각하는 나였다."

