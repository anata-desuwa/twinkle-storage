[[dialogue]]
speaker = "unk"
original = "第8話,もう１つの理由,B"
translation = "제8화, 또 하나의 이유, B"

[[dialogue]]
speaker = "unk"
original = "後日。マリオンが拭き掃除をしていると――"
translation = "며칠 뒤. 마리온이 걸레질을 하고 있자――"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「～～♪\u3000～～～♪」"
translation = "「~~♪ ~~~♪」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「マリオンさん」"
translation = "「마리온 씨」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あら、キリカさん♪\u3000今日もメイド服が似合っていて、お可愛らしいですこと<emoji=heart04>\u3000どうされました？」"
translation = "「어머, 키리카 씨♪ 오늘도 메이드복이 잘 어울리고, 참 귀여우시네요<emoji=heart04> 무슨 일이신가요?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「フィオナお嬢様でしたら、今は星徒会室にいらっしゃいませんけれど……」"
translation = "「피오나 아가씨라면, 지금은 성도회실에 안 계십니다만……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえ、あなたに用があってきました」"
translation = "「아니요, 당신에게 용건이 있어서 왔습니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「私に？\u3000なんでしょう？」"
translation = "「저에게요? 무슨 일이죠?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「実は気になっていたことが１つありまして……」"
translation = "「사실 궁금한 게 하나 있어서요……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「模擬戦の時に口にしていた、マリオンさんが私にメイド長の座を譲った、もう１つの理由についてです」"
translation = "「모의전 때 말씀하셨던, 마리온 씨가 제게 메이드장 자리를 넘겨준, 또 하나의 이유에 대해서입니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ああ、そのことですか。こちらはあの時に言っても、伝わらないだろうと思い伏せたのですが……」"
translation = "「아아, 그 일인가요. 이건 그때 말해도, 전해지지 않을 것 같아 숨겼던 것인데……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「なんとなく……キリカさんが、昔の私に重なって見えたんですよ」"
translation = "「왠지 모르게…… 키리카 씨가, 예전의 제 모습과 겹쳐 보였거든요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私がマリオンさんに……？」"
translation = "「제가 마리온 씨에게……?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「こう見えて私、流星学園に通っていた時は、キリカさんよりも真面目だったんですよ。悪い意味でね」"
translation = "「이래 봬도 저, 유성학원에 다닐 때는 키리카 씨보다 성실했답니다. 나쁜 의미로 말이죠」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「表現するなら、真面目に動くように作られた人形、というような感じでした」"
translation = "「표현하자면, 성실하게 움직이도록 만들어진 인형, 같은 느낌이었죠」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「それで、当時の星徒会長は何を思ったのか、次の星徒会長に私を指名したんです。会長権限を使って、半ば脅して押し付けるような形で」"
translation = "「그래서, 당시의 성도회장이 무슨 생각이었는지, 다음 성도회장으로 저를 지명했어요. 회장 권한을 사용해서, 반쯤 협박하듯 밀어붙이는 형태로요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「星徒会長になってからは大変でした。望んでなったわけでもなく……かといって真面目な私は、自分から役目を投げ出すこともできなかった。ですが――」"
translation = "「성도회장이 되고 나서는 힘들었어요. 원해서 된 것도 아니고…… 그렇다고 성실한 저는, 스스로 역할을 내팽개칠 수도 없었죠. 하지만――」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「私はその時、星徒会長になったからこそ、自分の好きという気持ちを知ることができたのだと思っています」"
translation = "「저는 그때, 성도회장이 되었기에, 자신이 좋아한다는 감정을 알 수 있게 되었다고 생각해요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「だから、私はキリカさんにも、自分の好きを知って欲しかったんです」"
translation = "「그래서, 저는 키리카 씨에게도, 자신이 좋아하는 것을 알게 해주고 싶었어요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「――伝わりましたかね？」"
translation = "「――전해졌을까요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ええ。身をもって体験しましたから」"
translation = "「네. 몸소 체험했으니까요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そうですか。それならよかったです」"
translation = "「그렇습니까. 그렇다면 다행이네요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「――前メイド長。改めて、この間はありがとうございました」"
translation = "「――전 메이드장. 다시 한번, 요 전에는 감사했습니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あら♪\u3000いえいえ、どういたしまして。私もキリカさんが素敵に成長する姿が見られて、嬉しかったですよ」"
translation = "「어머♪ 아니요, 별 말씀을요. 저도 키리카 씨가 멋지게 성장하는 모습을 볼 수 있어서, 기뻤답니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「これからもメイドの師匠として、ご指導をよろしくお願い致します」"
translation = "「앞으로도 메이드 스승으로서, 지도를 부탁드립니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「もちろんです♪」"
translation = "「물론이죠♪」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「私にとって、これが自分の好きなことですから……うふふ<emoji=heart04>」"
translation = "「제게 있어서, 이것이 제가 좋아하는 일이니까요…… 우후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「それと……今度は私の番です」"
translation = "「그리고…… 이번엔 제 차례입니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「キリカさん……？」"
translation = "「키리카 씨……?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「マリオンさんが道に迷った時は、私に相談してください」"
translation = "「마리온 씨가 길을 헤매게 될 때는, 제게 상담해 주세요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「たとえあなたがどんな秘密を抱えていたとしても、ちゃんと話を聞きますから」"
translation = "「설령 당신이 어떤 비밀을 품고 있다고 해도, 제대로 이야기를 들을 테니까요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「……参りましたね。そのことについて、今は上手い返しが見つかりませんが……」"
translation = "「……졌군요. 그 일에 대해서, 지금은 적절한 대답이 떠오르지 않습니다만……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「その言葉、しっかりと胸に結んでおきます。気にかけてくれて、ありがとう。キリカさん」"
translation = "「그 말, 소중히 가슴에 새겨둘게요. 신경 써줘서 고마워요. 키리카 씨」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえ。これでも、メイド長ですから」"
translation = "「아니요. 이래 봬도, 메이드장이니까요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「まあまあ、うふふ<emoji=heart04>」"
translation = "「어머어머, 우후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「――さて、星徒会室の掃除も終わりますし、そろそろ別の場所に行くとしましょう♪」"
translation = "「――자, 성도회실 청소도 끝났으니, 슬슬 다른 장소로 가볼까요♪」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「～～♪\u3000～～～♪」"
translation = "「~~♪ ~~~♪」"

[[dialogue]]
speaker = "？？？"
original = "「ほう？\u3000今日はいつもより機嫌がよさそうではないか、マリオンよ」"
translation = "「호오? 오늘은 평소보다 기분이 좋아 보이는구나, 마리온아」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「まあ♪\u3000これはこれは――」"
translation = "「어머♪ 이건 이거――」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「クラウディア様。ごきげん麗しゅう♪\u3000本日も実にお可愛らしいご尊顔ですこと<emoji=heart04>\u3000それにセドナさんも♪」"
translation = "「클라우디아 님. 평안하신지요♪ 오늘도 실로 사랑스러운 얼굴이시네요<emoji=heart04> 그리고 세드나 씨도♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「マリオン。クラウディア様に対して、可愛いなどという気安い褒め言葉を使うなといつも……！」"
translation = "「마리온. 클라우디아 님에 대해서, 귀엽다는 둥 격식 없는 칭찬을 쓰지 말라고 몇 번이나……!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あら、私にとっては、セドナさんも甲乙つけ難いくらいお可愛いですよ<emoji=heart04>\u3000うふふ♪」"
translation = "「어머, 제게 있어서는, 세드나 씨도 우열을 가리기 힘들 정도로 귀여우시답니다<emoji=heart04> 우후후♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そういうことを言っているのではない！\u3000ええい、<b>貴方</b>は一体、いつからこんな風におかしくなったのか……！」"
translation = "「그런 말을 하는 게 아니다! 에잇, <b>귀하</b>는 도대체, 언제부터 이렇게 이상해진 건지……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふはは、余は今のマリオンの方が、昔の人形のようであった頃よりも、面白くて好きだがな♪」"
translation = "「푸하하, 여는 지금의 마리온이, 예전의 인형 같던 시절보다 재미있어서 좋다만♪」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「それで？\u3000人間界の方で、なんぞいいことでもあったのか？」"
translation = "「그래서? 인간계 쪽에서, 무슨 좋은 일이라도 있었느냐?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ええ、実は先程、人形からのバックアップデータが定期連絡で届きまして♪」"
translation = "「네, 사실 방금 전, 인형으로부터 백업 데이터가 정기 연락으로 도착해서요♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「マリオン……人形を通しての連絡係が貴方の仕事とはいえ、あまり人間界に入れ込みすぎないように」"
translation = "「마리온…… 인형을 통한 연락 담당이 귀하의 업무라고는 하지만, 너무 인간계에 깊게 몰입하지 않도록」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「わかっていますとも♪\u3000でも、セドナさん。あなたも１度、人間界で過ごしてみるのもいいのでは？」"
translation = "「알고 있다니까요♪ 하지만, 세드나 씨. 당신도 한 번쯤, 인간계에서 지내보는 건 어떠신가요?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「百聞は一見に如かず。人間界のことわざですが、魔女にも言えることだと、私は思いますよ？」"
translation = "「백문이 불여일견. 인간계의 속담입니다만, 마녀에게도 해당되는 말이라고 생각한답니다?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「うふふ♪」"
translation = "「우후후♪」"

[[dialogue]]
speaker = "unk"
original = "ネビュラの魔女――マリオンは、人間界にいる人形と変わらぬ笑顔を浮かべるのだった。"
translation = "네뷸라의 마녀――마리온은, 인간계에 있는 인형과 다름없는 미소를 짓는 것이었다."

