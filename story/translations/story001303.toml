[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「マトイ、次行くわよ！」"
translation = "「마토이, 다음 간다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「イエス・マム！\u3000お願いします！」"
translation = "「예스 마무! 부탁드립니다!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「せーのっ！」"
translation = "「하나, 둘!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（サーブを素早く受け流したら、すかさず周囲に浮いてるビーチボールに意識を移す！）"
translation = "(서브를 빠르게 흘려보냈으면, 곧장 주변에 떠 있는 비치볼에 의식을 집중해!)"

[[dialogue]]
speaker = "unk"
original = "ビーチバレー形式の訓練が始まって、あれから数時間。途中でアムと交代したりもしつつ、マトイはマムのサーブ千本ノックを捌き続けていた。"
translation = "비치발리볼 형식의 훈련이 시작되고 나서 수 시간이 경과. 도중에 아무와 교대하기도 하며 마토이는 마무의 서브 수천 번을 계속해서 받아내고 있었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「引力操作！」"
translation = "「인력 조작!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（一斉攻撃でも、ビーチボールの配置はランダム。つまり、着弾までの距離にそれぞれ微妙な差がある。それを一瞬で見極めて、近いものから防御して弾き飛ばす！）"
translation = "(일제 공격이라도 비치볼의 배치는 랜덤. 즉, 착탄까지의 거리에 각각 미묘한 차이가 있어. 그걸 순간적으로 간파해서 가까운 것부터 방어해서 튕겨낸다!)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁぁぁっ！」"
translation = "「하아아앗!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「よし、マトイは一旦休憩よ。会長と交代なさい」"
translation = "「좋아, 마토이는 일단 휴식이야. 회장과 교대하렴.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁ……はぁ……イエス・マム！\u3000ありがとうございます！」"
translation = "「하아…… 하아…… 예스 마무! 감사합니다!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「数時間の訓練で、ギリギリながらも捌き切れるようになってきた。星徒会の盾として、リクリエの使徒との戦いを潜り抜けただけはあるわね。だけど――」"
translation = "「수 시간의 훈련으로 아슬아슬하게나마 다 받아낼 수 있게 되었구나. 성도회의 방패로서 리크리에의 사도와의 싸움을 겪어온 보람은 있네. 하지만──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「悪く言うなら、行動が優等生過ぎるわ。アムがどう捌いているかは見たでしょう？」"
translation = "「나쁘게 말하자면, 행동이 너무 우등생 같아. 아무가 어떻게 받아내는지 봤지?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はい。盾を使わず、星力で防御力を高めて、体で受け止めたり……」"
translation = "「네. 방패를 쓰지 않고 성력으로 방어력을 높여서 몸으로 받아내거나……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうね。まあ、あれはあの子が防御に特化してるからこそできる荒業で、普通はダメージを受けるから、よくないけど……」"
translation = "「그래. 뭐, 그건 저 아이가 방어에 특화되어 있기에 가능한 무모한 기술이고, 보통은 대미지를 입으니까 좋지 않다만……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「盾で防ぐ、という固定観念に縛られてると、攻撃を捌き切れないような状況になった時、別の選択肢をすぐに取ることができない、ってことね」"
translation = "「방패로 막는다는 고정관념에 얽매여 있으면 공격을 다 받아낼 수 없는 상황이 되었을 때 다른 선택지를 즉시 취할 수 없게 된다는 소리야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「つまりは、普通じゃない状況への対処……」"
translation = "「즉, 평범하지 않은 상황에 대한 대처……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そう。だからマトイ、今よりも強くなりたいのなら、あなたの中にある『普通』……固定観念を捨てなさい」"
translation = "「그래. 그러니 마토이, 지금보다 더 강해지고 싶다면 네 안의 『평범함』…… 고정관념을 버리렴.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「自分は普通だから仕方ない、と思い込んで、行動の選択肢を狭めてるうちは、殻を破ることなんてできないわよ」"
translation = "「자신은 평범하니까 어쩔 수 없다고 단정 짓고 행동의 선택지를 좁히고 있는 한, 껍질을 깨는 건 불가능해.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あなたに足りないのは、自信よ」"
translation = "「너에게 부족한 건 자신감이야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「謙虚なのは別にいいわ。だけどあなたのそれは今、自身の成長を阻害する枷になってる」"
translation = "「겸손한 건 나쁘지 않아. 하지만 지금의 네 그것은 자신의 성장을 가로막는 족쇄가 되어 있어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「マトイ。いい加減気づきなさい」"
translation = "「마토이. 이제 슬슬 깨닫도록 해.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「この私の攻撃を防ぎ切っているのに、あなたが本当に『普通』なわけないでしょ？」"
translation = "「이 나의 공격을 다 막아내고 있는데, 네가 정말로 『평범』할 리가 없잖아?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「マム……！」"
translation = "「마무……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「って何よ、そのキラキラとした瞳は……？」"
translation = "「뭐니, 그 반짝이는 눈동자는……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの、私、これまで星徒会役員としてしか、マムと関わったことがなくて……だから、人づてに聞いていただけだったんですけど……」"
translation = "「저기, 저는 지금까지 성도회 임원으로서만 마무와 관련되어 왔고…… 그래서 남들에게 전해 듣기만 했었는데요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「新星寮の子たちが言うように、マムって本当に優しいですね……！」"
translation = "「신성료 아이들이 말하는 것처럼, 마무는 정말로 상냥하시네요……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁ？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まさか私のこと、そんな風に見ていてくれてるだなんて……！\u3000ちょっと感動しちゃいました！」"
translation = "「설마 저를 그런 식으로 지켜봐 주고 계셨다니……! 조금 감동해 버렸어요!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「勘違いしないで頂戴。私はあなたを褒めたつもりはないわ。事実認識が正しくないと、厳しく指導しているだけよ」"
translation = "「착각하지 말아 주겠니. 나는 너를 칭찬할 생각은 없었어. 사실 인식이 올바르지 않으면 엄하게 지도하고 있을 뿐이야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「本気で言ってて、裏表ないところがすごい……！」"
translation = "「진심으로 말씀하시고 겉과 속이 없는 점이 대단해요……!」"

[[dialogue]]
speaker = "unk"
original = "さすがマム"
translation = "역시 마무."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長、なんか後方腕組みで、うんうんと頷いているけれど……なんか畏怖とは違う感情を持たれてる気がして、不愉快なのだけれど？」"
translation = "「회장, 왠지 뒤에서 팔짱을 끼고 으음으음 하며 고개를 끄덕이고 있는데…… 왠지 경외와는 다른 감정을 품고 있는 것 같아 불쾌하다만?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「というかマトイ。感動する前に、私の言ったことはちゃんと理解しているのかしら？」"
translation = "「그보다 마토이. 감동하기 전에 내가 한 말은 제대로 이해한 거니?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「イエス・マム！\u3000一言一句、脳裏に焼き付けてます！\u3000この後もご指導よろしくお願いします！」"
translation = "「예스 마무! 일자일구, 뇌리에 새겼습니다! 이 이후에도 지도 부탁드립니다!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やれやれ、本当に大丈夫かしら……」"
translation = "「이런이런, 정말 괜찮을지 원……」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、俺もマムに頼んで、訓練を受けさせてもらっていた。"
translation = "참고로 나도 마무에게 부탁해서 훈련을 받고 있었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「さて、会長の番だけど――あなたの場合は実戦形式で戦う方がよさそうね」"
translation = "「자, 회장 차례다만── 당신의 경우는 실전 형식으로 싸우는 편이 좋겠네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あなたはリクリエの使徒を退けてみせた。今や本気で戦えば、世界最強クラスの星騎士と言っていいでしょうね」"
translation = "「당신은 리크리에의 사도를 물리쳐 보였어. 이제 진심으로 싸우면 세계 최강 클래스의 성기사라고 해도 과언이 아니겠지.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「だったら、私も一切手加減する必要がない。そうでしょう？」"
translation = "「그렇다면 나도 일절 봐줄 필요가 없겠지. 그렇지?」"

[[dialogue]]
speaker = "unk"
original = "お手柔らかにお願いします"
translation = "살살 부탁드립니다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――色々あって、今は全力を出せない？\u3000ふふ、それくらいはお見通しよ」"
translation = "「──이런저런 사정으로 지금은 전력을 낼 수 없다고? 후후, 그 정도는 이미 다 꿰뚫어 보고 있어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうは言っても、神に匹敵する力と戦い、退けた経験と胆力。強さを求める私の血が疼いて仕方がないわ」"
translation = "「그렇다 해도 신에 필적하는 힘과 싸워 물리친 경험과 담력. 강함을 갈구하는 나의 피가 요동쳐서 참을 수가 없구나.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「『フィヴォス流星群』の時は寮長の役割を全うして、見せ場を譲ったんだもの。その見返りくらいは、あってしかるべきよね？」"
translation = "「『피보스 유성군』 때는 사감으로서의 역할을 다하며 활약할 자리를 양보했으니까. 그 보답 정도는 당연히 있어야겠지?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「さあ会長？\u3000その魔王の力の一端、竜たる私に見せてみなさい」"
translation = "「자, 회장? 그 마왕의 힘의 일단을 용인 나에게 보여보렴.」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺が本気のマムと１対１で戦っていると――"
translation = "그렇게 내가 진심인 마무와 1대 1로 싸우고 있자──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なるほど、確かに強くなったわね。パワーだけなら魔王モードでない今でさえ、この私を上回っている。ただ、私の水着フォームも伊達じゃないわよ？」"
translation = "「과연, 확실히 강해졌구나. 파워만큼은 마왕 모드가 아닌 지금조차 이 나를 상회하고 있어. 다만 나의 수영복 폼도 겉모습만이 아니란다?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――会長、畏怖を持って、その場で跪きなさい」"
translation = "「──회장, 경외를 담아 그 자리에 무릎 꿇도록 해.」"

[[dialogue]]
speaker = "unk"
original = "……！\u3000体が勝手に……！？"
translation = "……! 몸이 멋대로……!?"

[[dialogue]]
speaker = "unk"
original = "俺は気づけば、マムの言葉通りに、ビーチの砂に片膝を着いてしまっていた。"
translation = "나는 정신을 차려보니 마무의 말대로 해변의 모래사장에 한쪽 무릎을 꿇고 말았다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふ、驚いたかしら？\u3000これが私の水着フォームの能力。『言葉の引力操作』よ」"
translation = "「후후, 놀랐니? 이것이 나의 수영복 폼의 능력. 『말의 인력 조작』이야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「物理だけではなく、概念や意識の引力も操作できるようになった。つまり、私が発した言葉には引力が発生し、対象に命令を聞かせることができる」"
translation = "「물리적인 것뿐만 아니라 개념이나 의식의 인력도 조작할 수 있게 되었어. 즉, 내가 내뱉은 말에는 인력이 발생하여 대상이 명령을 듣게 만들 수 있지.」"

[[dialogue]]
speaker = "unk"
original = "チートでは！？"
translation = "치트 아니야!?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あなたがそれを言う？\u3000まあでも、ちゃんと私に畏怖を持ったようで、何よりだわ」"
translation = "「당신이 그걸 말하니? 뭐 그래도 제대로 나에게 경외심을 가진 것 같아 다행이구나.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうね……せっかくだし、私のことも褒め称えてもらおうかしら？」"
translation = "「그렇지…… 기왕 이렇게 된 거 나를 칭송하게 해볼까?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――何をって？\u3000そんなの決まっているでしょう？\u3000私のこの、威厳ある水着姿をよ」"
translation = "「──무엇을 말이냐고? 그건 당연히 정해져 있잖아? 나의 이 위엄 있는 수영복 차림을 말이야.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ、さあ、命令よ、会長。私を褒め称えなさい」"
translation = "「후훗, 자 명령이야, 회장. 나를 칭송하렴.」"

[[dialogue]]
speaker = "unk"
original = "すごく可愛いと思います"
translation = "굉장히 귀엽다고 생각합니다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "――本当なら先輩だし、紳士的に綺麗だと表現するべきかもしれない。しかし、マムは小さい背丈ながらも堂々としているからこそ、俺はあえて言いたい。"
translation = "──사실 선배이기도 하니 신사적으로 아름답다고 표현해야 했을지도 모른다. 하지만 마무는 작은 체구이면서도 당당하기에 나는 굳이 말하고 싶었다."

[[dialogue]]
speaker = "unk"
original = "マムの水着姿は可愛い。たった１歳年上の女の子に対して、変に気を遣って言葉を選びたくない。俺は嘘偽りなく、一目見て『すごく可愛い』と思った。"
translation = "마무의 수영복 차림은 귀엽다. 고작 한 살 연상의 여자아이에게 이상하게 신경 써서 말을 고르고 싶지 않다. 나는 거짓 없이 첫눈에 『굉장히 귀엽다』고 생각했다."

[[dialogue]]
speaker = "unk"
original = "具体的に細かく可愛いポイント挙げていくと――"
translation = "구체적으로 자세히 귀여운 포인트를 꼽아보자면──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「っ……も、もういいわ！\u3000それ以上は言わなくていいから！」"
translation = "「윽…… 이, 이제 됐어! 그 이상은 말하지 않아도 되니까!」"

[[dialogue]]
speaker = "unk"
original = "あっ、その照れ顔も凄く可愛いと思います！"
translation = "앗, 그 부끄러워하는 얼굴도 엄청 귀엽다고 생각합니다!"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「言葉の引力を突破した！？\u3000なんでそこで謎の力を発揮するのよ、貴方は！？」"
translation = "「말의 인력을 돌파했어!? 왜 거기서 수수께끼의 힘을 발휘하는 거니, 당신은!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「っ……いい加減にしなさい！\u3000この私を辱めた罰として、畏怖を叩き込んであげるわ！」"
translation = "「윽…… 적당히 좀 하렴! 이 나를 능멸한 벌로서 경외심을 주입해 주마!」"

[[dialogue]]
speaker = "unk"
original = "褒めてるだけなのに何故！？"
translation = "칭찬하는 것뿐인데 왜!?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「先輩に対して、畏怖が足りないのよ、畏怖が！\u3000貴方には、千本ノックでもぬるいわ！」"
translation = "「선배에 대해서 경외심이 부족해, 경외심이! 당신에게는 수천 번 노크도 무르구나!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「１万本スパイクよ！！\u3000――スパイクメガフレアッ！！！」"
translation = "「1만 번 스파이크다!! ──스파이크 메가 플레어!!!」"

[[dialogue]]
speaker = "unk"
original = "ぎゃーーーーーーっ！！？"
translation = "갸아아아아아아악────!!?"

[[dialogue]]
speaker = "unk"
original = "その後、流星群のように襲い来るビーチボールから逃げ回る羽目になる俺なのだった。"
translation = "그 후 유성군처럼 몰려오는 비치볼로부터 도망치느라 고생하는 나였다."

