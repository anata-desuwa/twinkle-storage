[[dialogue]]
speaker = "unk"
original = "アポロが目を覚ましてから、いくらかの月日が流れた。"
translation = "아폴로가 눈을 뜬 뒤로, 어느 정도의 세월이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "明るくおてんばな彼女に俺はずいぶんと気に入られているらしく、また俺もそんな彼女に惹かれていった。"
translation = "밝고 말괄량이인 그녀에게 나는 꽤 마음에 든 모양이었고, 나 또한 그런 그녀에게 끌려갔다."

[[dialogue]]
speaker = "unk"
original = "これは、とある休日の午後。アポロが切なげな表情を浮かべて、俺に話しかけてきて──"
translation = "이것은, 어느 휴일의 오후. 아폴로가 애절한 표정을 지으며 나에게 말을 걸어와서──"

[[dialogue]]
speaker = "アポロ"
original = "「なあ、魔王。最近のあたし……変なんだ……」"
translation = "「저기, 마왕. 요즘의 나…… 이상해……」"

[[dialogue]]
speaker = "アポロ"
original = "「──いや、お腹が痛いとか、虫歯とか。そんなんじゃなくてさ……」"
translation = "「──아니, 배가 아프다거나 충치라거나. 그런 게 아니라……」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしの目が覚めてから、お前とずっと一緒にいるだろ？\u3000いろんなところに遊びに行ったり、星騎士の訓練をしたり……」"
translation = "「내가 깨어난 뒤로 너랑 계속 같이 있었잖아? 여러 곳에 놀러 가기도 하고, 성기사 훈련을 하기도 하고……」"

[[dialogue]]
speaker = "アポロ"
original = "「前までは楽しいだけだったんだ。だけど最近は、その……お前と一緒にいるとすごくドキドキして、落ち着かない……」"
translation = "「전에는 즐겁기만 했어. 그런데 요즘은, 그…… 너랑 같이 있으면 무척 두근거리고, 진정이 안 돼……」"

[[dialogue]]
speaker = "アポロ"
original = "「うん。お前のことが嫌いなわけじゃないのに、今みたいに２人きりだとソワソワしてきて……」"
translation = "「응. 네가 싫은 건 아닌데, 지금처럼 둘이서만 있으면 안절부절못하게 돼서……」"

[[dialogue]]
speaker = "アポロ"
original = "「それなのにさ。お前が別の女の子と一緒にいるところを見ると……こう──な？\u3000心臓がキュッと……痛くなるんだ……」"
translation = "「그런데 말이야. 네가 다른 여자애랑 같이 있는 걸 보면…… 이렇게── 응? 심장이 큭 하고…… 아파져……」"

[[dialogue]]
speaker = "unk"
original = "不安そうなアポロに、俺も同じ気持ちを抱いていることを伝える。"
translation = "불안해 보이는 아폴로에게, 나도 같은 마음을 품고 있다는 것을 전한다."

[[dialogue]]
speaker = "アポロ"
original = "「……お前も、同じ？\u3000あたしと一緒にいるとドキドキして……ソワソワするのか？」"
translation = "「……너도, 같아? 나와 같이 있으면 두근거리고…… 안절부절못하는 거야?」"

[[dialogue]]
speaker = "unk"
original = "俺だって初めて抱く気持ちだから、絶対にそうだとは言えないけれど……この感情に名前を付けるならきっと──"
translation = "나 역시 처음 품어보는 감정이라, 확실히 그렇다고는 말할 수 없지만…… 이 감정에 이름을 붙인다면 분명──"

[[dialogue]]
speaker = "アポロ"
original = "「これが……恋？」"
translation = "「이게…… 사랑?」"

[[dialogue]]
speaker = "アポロ"
original = "「そう、なのか。あたしはお前のこと、好きだって思ってるのか……そうか……」"
translation = "「그렇구나. 나는 너를 좋아한다고 생각하고 있는 거구나…… 그렇구나……」"

[[dialogue]]
speaker = "クロト"
original = "「──好きだよ、アポロ」"
translation = "「──좋아해, 아폴로」"

[[dialogue]]
speaker = "アポロ"
original = "「……っ！\u3000な、なんだか恥ずかしいぞ……面と向かってそういうこと、言うの……」"
translation = "「……윽! 왠지 부끄럽다고…… 맞대고 그런 소리 하는 거……」"

[[dialogue]]
speaker = "アポロ"
original = "「うん、だけど……あたしも魔王のことが、好きだ。これであたしたち、恋人どーしだなっ」"
translation = "「응, 하지만…… 나도 마왕이 좋아. 이걸로 우리, 연인 사이네」"

[[dialogue]]
speaker = "アポロ"
original = "「……ん？\u3000近くに寄れって……こうか？」"
translation = "「……응? 가까이 오라고…… 이렇게?」"

[[dialogue]]
speaker = "アポロ"
original = "「あ、わわっ……！？\u3000……ん、ちゅっ<emoji=heart04>」"
translation = "「아, 와왓……!? ……음, 츄<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「……へへ♪\u3000チューしちゃったのか、あたしたち。何だかオトナになった気分だな」"
translation = "「……헤헤♪ 키스해버렸네, 우리. 왠지 어른이 된 기분이야」"

[[dialogue]]
speaker = "アポロ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アポロ"
original = "「な、なあ。物知りなお前なら知ってるか？\u3000好きだって伝えて、こーやってキスもして……」"
translation = "「저, 저기. 박식한 너라면 알고 있어? 좋아한다고 전하고, 이렇게 키스도 하고……」"

[[dialogue]]
speaker = "アポロ"
original = "「その後、恋人どーしは何をするものなんだ……？」"
translation = "「그다음에 연인 사이는 무엇을 하는 거지……?」"

[[dialogue]]
speaker = "アポロ"
original = "「なんとなくはわかる。でも、詳しいことは全然知らないんだ、あたし」"
translation = "「어렴풋이는 알아. 하지만 자세한 건 전혀 모른다고, 나는」"

[[dialogue]]
speaker = "アポロ"
original = "「お前も初めて……？\u3000うん、構わない。あたしは、お前に教えて欲しいんだから」"
translation = "「너도 처음……? 응, 상관없어. 나는 네가 가르쳐줬으면 하니까」"

[[dialogue]]
speaker = "アポロ"
original = "「恋人になったらどんなことをするのか……あたしに教えてくれるか、魔王……？」"
translation = "「연인이 되면 어떤 일을 하는지…… 나에게 가르쳐줄래, 마왕……?」"

[[dialogue]]
speaker = "アポロ"
original = "「う、うぅうっ……こ、このポーズ……す、すっごく恥ずかしいぞ……！？」"
translation = "「으, 으으윽…… 이, 이 자세…… 저, 정말 부끄럽다고……!?」"

[[dialogue]]
speaker = "unk"
original = "服を脱がせるたびに緊張で体を硬くするアポロにキスをして、安心させて。"
translation = "옷을 벗길 때마다 긴장으로 몸을 굳히는 아폴로에게 키스를 하며 안심시키고."

[[dialogue]]
speaker = "unk"
original = "指１本でもキツくて狭い女性器を、アポロが怖がらないようにゆっくりと触り、なじませて──ようやくこの体勢にまでたどり着いた。"
translation = "손가락 하나로도 꽉 끼고 좁은 여성기를 아폴로가 무서워하지 않도록 천천히 만지며 길들여서── 겨우 이 체위까지 도달했다."

[[dialogue]]
speaker = "アポロ"
original = "「恋人同士のエッチ……男のそれ……ち○ちんを、あたしの……ここ……お、おま○こ？\u3000に、入れるん……だよな……」"
translation = "「연인끼리의 섹스…… 남자의 그거…… 자지를, 내…… 여기…… 보, 보지? 에, 넣는…… 거지……」"

[[dialogue]]
speaker = "アポロ"
original = "「お前のち○ちんも、めちゃくちゃ大きくなってるし……どーやってズボンにしまってたんだ、それ……？」"
translation = "「네 자지도 엄청 커졌고…… 어떻게 바지 안에 넣고 있었던 거야, 그거……?」"

[[dialogue]]
speaker = "アポロ"
original = "「──エッチなこと考えた時だけ、大きくなるのか。へぇえ……」"
translation = "「──야한 생각 했을 때만 커지는구나. 헤에……」"

[[dialogue]]
speaker = "unk"
original = "アポロの興味津々な視線がペニスに注がれてくすぐったい。"
translation = "아폴로의 흥미진진한 시선이 페니스에 쏟아져 간지럽다."

[[dialogue]]
speaker = "unk"
original = "性の営みなんてものをほとんど知らない、初心な彼女にこんなモノを挿入してもいいのかと、今さらながらに迷いが生まれてきてしまう。"
translation = "성관계라는 것을 거의 모르는 순진한 그녀에게 이런 물건을 삽입해도 되는 것인지, 이제 와서 망설임이 생기고 만다."

[[dialogue]]
speaker = "unk"
original = "けれどここで引くのはあまりに情けない。アポロも肝心なところでおじけづく男が恋人では嫌だろう。"
translation = "하지만 여기서 물러나는 건 너무 한심하다. 아폴로도 결정적인 순간에 겁을 먹는 남자가 연인인 건 싫을 것이다."

[[dialogue]]
speaker = "クロト"
original = "「──挿入れるよ？」"
translation = "「──넣을게?」"

[[dialogue]]
speaker = "アポロ"
original = "「う、うん……来てくれ……まおー……」"
translation = "「으, 응…… 와줘…… 마왕……」"

[[dialogue]]
speaker = "unk"
original = "勃起したペニスを、アポロの女性器へあてがって──"
translation = "발기한 페니스를 아폴로의 여성기에 갖다 대고──"

[[dialogue]]
speaker = "アポロ"
original = "「あっ……ふぅ、う、ぅう、ぅうっ──！」"
translation = "「앗…… 후우, 으, 으으, 으윽──!」"

[[dialogue]]
speaker = "アポロ"
original = "「ふぅうぁ、ああ、あぁあぁあーっ……！」"
translation = "「후우아, 아아, 아아아아─앗……!」"

[[dialogue]]
speaker = "アポロ"
original = "「は、入ったぁっ……魔王の、ち○ちんっ……あたしの中に、ずぶぅぅって、ぇっ……！」"
translation = "「드, 들어왔어…… 마왕의 자지…… 내 안에, 즈부우우 하고, 윽……!」"

[[dialogue]]
speaker = "unk"
original = "しっかりと濡らしていたというのに、文字どおりこじ開けるような挿入だった。"
translation = "충분히 적셔두었는데도, 말 그대로 비집고 여는 듯한 삽입이었다."

[[dialogue]]
speaker = "unk"
original = "つがった境い目から破瓜の血が伝う──アポロの処女を貰った証だった。"
translation = "맞물린 경계선에서 파과의 피가 흘러나온다── 아폴로의 처녀를 가졌다는 증거였다."

[[dialogue]]
speaker = "アポロ"
original = "「はっ……ふぅっ……はぁあっ……こ、こんなもんか……あんまし痛くないぞ、まおー……」"
translation = "「하앗…… 후우…… 하아앗…… 이, 이런 건가…… 별로 안 아프다고, 마왕……」"

[[dialogue]]
speaker = "アポロ"
original = "「お前、さっきキスしてる時、さんざん『初めては痛いかも』って言ってたから……どんなもんかって思ってたけど……」"
translation = "「너, 아까 키스할 때 한참 동안 『처음은 아플지도 몰라』라고 말해서…… 어떤가 싶었는데……」"

[[dialogue]]
speaker = "アポロ"
original = "「うん、あんまり痛くない……虫歯になって、歯医者に行った時の方がずーっと痛かったぜ……」"
translation = "「응, 별로 안 아파…… 충치 생겨서 치과 갔을 때가 훨씬 더 아팠다고……」"

[[dialogue]]
speaker = "unk"
original = "相変わらず歯医者によわよわのアポロなのだった。"
translation = "여전히 치과에는 약하디약한 아폴로였다."

[[dialogue]]
speaker = "アポロ"
original = "「へへ♪\u3000あたしとお前、あいしょーがいいのかもな？\u3000ふぅっ……はぁあっ、んんっ。ち○ちん、ビクビクって、してる……」"
translation = "「헤헤♪ 나랑 너, 궁합이 좋을지도 모르겠네? 후우…… 하아앗, 응. 자지가 움찔움찔하고 있어……」"

[[dialogue]]
speaker = "アポロ"
original = "「これ、あれだろ……？\u3000出したり、入れたり、したがってるんじゃないのか？\u3000それがせっくす、なんだろ？」"
translation = "「이거, 그거지……? 넣었다 뺐다 하고 싶어 하는 거 아니야? 그게 섹스인 거지?」"

[[dialogue]]
speaker = "アポロ"
original = "「動かなくていーのか、まおー……？\u3000あたしはいつでも、大丈夫だぞ<emoji=heart04>」"
translation = "「안 움직여도 돼, 마왕……? 나는 언제든 괜찮다고<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "血が伝ってこそいるが、アポロは本当に平気そうだ。やせ我慢している雰囲気は感じられない。"
translation = "피가 흐르고는 있지만, 아폴로는 정말 괜찮아 보인다. 억지로 참는 분위기는 느껴지지 않는다."

[[dialogue]]
speaker = "unk"
original = "ならば遠慮せずに──少しずつでも、動かせてもらおう。"
translation = "그렇다면 사양하지 않고── 조금씩이라도 움직여보자."

[[dialogue]]
speaker = "アポロ"
original = "「ふぅ、ん、んんっ……んんぅっ……！\u3000あ、ぁあ、はあ、ぁあ、ああっ……！」"
translation = "「후우, 응, 응윽…… 응으윽……! 아, 아아, 하아, 아아, 아앗……!」"

[[dialogue]]
speaker = "アポロ"
original = "「んん、ふぅ、んん、ぁあっ……お前のち○ちん、動いてっ……あ、ああ！\u3000すっごく、熱いっ……んん<emoji=heart04>\u3000あ、ぁう、んん、んあっ……！」"
translation = "「응, 후우, 응, 아앗…… 네 자지가 움직여서…… 아, 아아! 정말 뜨거워…… 응<emoji=heart04> 아, 아우, 응, 응앗……!」"

[[dialogue]]
speaker = "unk"
original = "挿入を拒むかのごとく狭い女性器。膣肉をかき分けるようにしてペニスを埋め、ゆっくりと引き抜く。"
translation = "삽입을 거부하듯 좁은 여성기. 질벽을 헤치듯 페니스를 묻고, 천천히 뽑아낸다."

[[dialogue]]
speaker = "アポロ"
original = "「はあ、はぁあ、ふう、んんぅっ……き、気持ちいいかって、聞かれると、ぉっ……んん、んんー……？」"
translation = "「하아, 하아, 후우, 응으윽…… 기, 기분 좋냐고 물으면, 윽…… 응, 응─……?」"

[[dialogue]]
speaker = "アポロ"
original = "「よ、よくわかんないな……でも、痛くない……ち○ちん、ぶっといから──んんんっ！\u3000奥まで入ると、ちょっと、苦しくてっ……」"
translation = "「자, 잘 모르겠네…… 하지만 아프지 않아…… 자지가 굵으니까── 응응윽! 안쪽까지 들어오면 조금 괴로워서……」"

[[dialogue]]
speaker = "アポロ"
original = "「でも、苦しいのも、いやじゃないっ……あ、はぁ、あ、ああっ……お前があたしの中に、入ってきてるって、思ったら……」"
translation = "「하지만 괴로운 것도 싫지 않아…… 아, 하아, 아, 아앗…… 네가 내 안에 들어오고 있다고 생각하면……」"

[[dialogue]]
speaker = "アポロ"
original = "「んん、んん、ふぅ、んんんっ……うん、やっぱりいやじゃない、ぞっ……なんか、ずーっと、ドキドキ、してっ……あ、ぁあ、あ、ああっ……！」"
translation = "「응, 응, 후우, 응응윽…… 응, 역시 싫지 않아…… 뭔가 계속 두근거리고…… 아, 아아, 아, 아앗……!」"

[[dialogue]]
speaker = "アポロ"
original = "「あったかいち○ちん、ずぷ～ってされると、ドキドキするっ……心臓、きゅって、なるっ<emoji=heart04>\u3000あ、ふぅ、んん、ふぅう、はぁ、はぁあっ！」"
translation = "「따뜻한 자지가 즈푸~ 하고 들어오면 두근거려…… 심장이 큭 하고 돼<emoji=heart04> 아, 후우, 응, 후우우, 하아, 하아앗!」"

[[dialogue]]
speaker = "unk"
original = "挿入を繰り返すたび、アポロの控えめなおっぱいが揺れる。こんなにも小さな体で受け止めてくれていることが嬉しくて。"
translation = "삽입을 반복할 때마다 아폴로의 아담한 가슴이 흔들린다. 이렇게나 작은 몸으로 받아내 주고 있다는 것이 기뻐서."

[[dialogue]]
speaker = "unk"
original = "手を伸ばし、乳首を優しく触ってみると──"
translation = "손을 뻗어 유두를 부드럽게 만져보자──"

[[dialogue]]
speaker = "アポロ"
original = "「──あっ<emoji=heart04>\u3000ん、んんっ<emoji=heart04>\u3000ぁ、今のっ……気持ちいい、かも……？<emoji=heart04>」"
translation = "「──앗<emoji=heart04> 응, 응윽<emoji=heart04> 아, 방금 거…… 기분 좋을지도……?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「おっぱい、気持ちよかった？」"
translation = "「가슴, 기분 좋았어?」"

[[dialogue]]
speaker = "アポロ"
original = "「う、んんっ……<emoji=heart04>\u3000あ、ぁあっ……先っぽ、それ、優しく、触れるのっ……あ、ぁっ……は、あ、ぁあっ……<emoji=heart04>」"
translation = "「으, 응윽……<emoji=heart04> 아, 아앗…… 끝부분, 그거, 살며시 건드리는 거…… 아, 앗…… 하, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピンク色に尖った先っぽをころころといじくると、アポロの反応が見るからに変わった。"
translation = "분홍색으로 뾰족해진 끝부분을 굴리며 만지자, 아폴로의 반응이 눈에 띄게 변했다."

[[dialogue]]
speaker = "アポロ"
original = "「あ、あ、ぁ<emoji=heart04>\u3000ふ、ぅ、んんっ……あ、あっ<emoji=heart04>\u3000ち○ちんの方は、よくわかんないけどっ……あ、あぅ、ふぅ、んぅう、んんっ<emoji=heart04>」"
translation = "「아, 아, 아<emoji=heart04> 후, 우, 응윽…… 아, 앗<emoji=heart04> 자지 쪽은 잘 모르겠지만…… 아, 아우, 후우, 응우우, 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「うん、おっぱい、気持ちいいっ……あ、あぁ<emoji=heart04>\u3000まおー、それしてっ……指でころころしてっ<emoji=heart04>\u3000あ、あぅ、ふうぅ、んん、んぁあっ<emoji=heart04>」"
translation = "「응, 가슴 기분 좋아…… 아, 아아<emoji=heart04> 마왕, 그거 해줘…… 손가락으로 굴려줘<emoji=heart04> 아, 아우, 후우우, 응, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──よかった。俺ばっかり気持ちよくなってる気がしてたから、アポロが体を震わせてくれるのが嬉しい。"
translation = "──다행이다. 나만 기분 좋아지는 것 같아 미안했는데, 아폴로가 몸을 떨어주는 것이 기쁘다."

[[dialogue]]
speaker = "アポロ"
original = "「はぁあ、はっ、ふぅ、んんっ……？\u3000おっぱい、口で、ちゅーってしたい、のかっ……？\u3000ん、んんっ<emoji=heart04>」"
translation = "「하아아, 핫, 후우, 응윽……? 가슴, 입으로 츄 하고 싶은 거야……? 응, 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「い、いーぞっ……まおーっ……ち○ちん、ずぷずぷしながら、あたしのおっぱい──んんんぅっ！<emoji=heart04>」"
translation = "「조, 좋아…… 마왕…… 자지 즈푸즈푸 하면서 내 가슴── 응응으윽!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小指の爪ほどもない、ぷっくりとしたアポロの乳首を優しく含んで、舌で転がす。"
translation = "새끼손톱보다도 작은, 통통한 아폴로의 유두를 부드럽게 머금고 혀로 굴린다."

[[dialogue]]
speaker = "アポロ"
original = "「～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はぁああっ<emoji=heart04>\u3000ふ、ぅうっ、んん、んぅ<emoji=heart04>\u3000あっ、ぁっぁっ<emoji=heart04>\u3000気持ちぃっ<emoji=heart04>\u3000ちゅーちゅー、気持ちいいっ……<emoji=heart04>」"
translation = "「~~~~~~~~윽<emoji=heart04><emoji=heart04><emoji=heart04> 하아아앗<emoji=heart04> 후, 우우윽, 응, 응으<emoji=heart04> 앗, 앗앗<emoji=heart04> 기분 좋아<emoji=heart04> 츄츄 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「まおっ、まおーっ……<emoji=heart04>\u3000もっと、もっとそれしてっ……あ、あ、あぁあ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000あっ、ああ、ぁ、あああっ<emoji=heart04>」"
translation = "「마오, 마왕……<emoji=heart04> 더, 더 그거 해줘…… 아, 아, 아아아<emoji=heart04> 후우<emoji=heart04> 응응윽<emoji=heart04> 앗, 아아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ふぅっ、ぅう<emoji=heart04>\u3000チューって吸われるの、いいっ<emoji=heart04>\u3000ふぁあ、あ、ぁ、あああっ……<emoji=heart04>\u3000ああぁあ、あ、ああああっ……！<emoji=heart04>」"
translation = "「후우, 우우<emoji=heart04> 츄 하고 빨리는 거 좋아<emoji=heart04> 하아아, 아, 아, 아아앗……<emoji=heart04> 아아아아, 아, 아아아앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "コリコリと硬くなって、グミみたいな舌触りの乳首が心地いい。"
translation = "꼬들꼬들하게 딱딱해져서 젤리 같은 식감의 유두가 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "アポロの気持ちよさそうな声が響くたび、女性器も締まって反応がよくなっていく。"
translation = "아폴로의 기분 좋은 목소리가 울릴 때마다 여성기도 조여지며 반응이 좋아진다."

[[dialogue]]
speaker = "アポロ"
original = "「ふううっ、あ、ぅ、ぁ、あぁ、ぅう、ぅう<emoji=heart04>\u3000まおー……あたし、も、もっと気持ちよく、なりたいっ……<emoji=heart04>」"
translation = "「후우우윽, 아, 우, 아, 아아, 우우, 우우<emoji=heart04> 마왕…… 나, 더, 더 기분 좋아지고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「だから、それっ……ち、ち○ちんっ……もっと強く、動かして、くれるかっ……？<emoji=heart04>」"
translation = "「그러니까 그거…… 자, 자지…… 더 강하게 움직여줄래……?<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ゆっくりじゃなくて、もっと強く……そーしてくれたら、たぶんもっと気持ちよく、なれる気が、するんだっ……<emoji=heart04>」"
translation = "「천천히 말고 더 강하게…… 그렇게 해주면 아마 더 기분 좋아질 수 있을 것 같은 기분이 들어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──アポロっ！」"
translation = "「──아폴로!」"

[[dialogue]]
speaker = "アポロ"
original = "「んんぅっ<emoji=heart04>\u3000はああ、ぁう、んん、んんぅ、ぁあ、ああっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「응응윽<emoji=heart04> 하아아, 아우, 응, 응응우, 아아, 아앗<emoji=heart04> 응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「い、いいっ……あ、あっ<emoji=heart04>\u3000最初より、ずっといいぞっ<emoji=heart04>\u3000ふう、んんぅ、ぁ、ああっ<emoji=heart04>\u3000ち○ちん気持ちいい、まおーのち○ちん、いいっ……<emoji=heart04>」"
translation = "「조, 좋아…… 아, 앗<emoji=heart04> 처음보다 훨씬 좋아<emoji=heart04> 후우, 응응우, 아, 아앗<emoji=heart04> 자지 기분 좋아, 마왕의 자지 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "濡れそぼった女性器は、それだけ彼女が感じている証だ。"
translation = "흠뻑 젖은 여성기는 그만큼 그녀가 느끼고 있다는 증거다."

[[dialogue]]
speaker = "unk"
original = "かなり強めに穿っているのに、アポロの口からは気持ちよさそうな喘ぎ声が漏れるだけ──"
translation = "꽤 강하게 꿰뚫고 있는데도 아폴로의 입에서는 기분 좋은 신음만이 새어 나온다──"

[[dialogue]]
speaker = "アポロ"
original = "「はぁ、ぁああっ<emoji=heart04>\u3000まおー、好きだっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000んん、ふぅ、あ、ぁあっ<emoji=heart04>\u3000もっとして、ち○ちん、強く、してぇっ！<emoji=heart04>」"
translation = "「하아, 아아앗<emoji=heart04> 마왕, 좋아해<emoji=heart04> 좋아<emoji=heart04> 응, 후우, 아, 아앗<emoji=heart04> 더 해줘, 자지 강하게 해줘!<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んんぅ──ふぅうっ<emoji=heart04>\u3000あ、はぁあ、あぁぁん<emoji=heart04>\u3000ふう、んんっ<emoji=heart04>\u3000あっあっ、はぁあ、んん、んぁ、ああ、あっ<emoji=heart04>」"
translation = "「응응으── 후우우윽<emoji=heart04> 아, 하아아, 아아앙<emoji=heart04> 후우, 응윽<emoji=heart04> 앗앗, 하아아, 응, 응아, 아아, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「お腹の中、お前でいっぱいなのっ……これ、すごい、いいっ<emoji=heart04>\u3000はぁあ、ふぅっ、ん、んんっ──あっあっ、あぁ、あああっ！<emoji=heart04>」"
translation = "「배 속이 너로 가득 찼어…… 이거 정말 좋아<emoji=heart04> 하아아, 후우, 응, 응윽── 앗앗, 아아, 아아앗!」"

[[dialogue]]
speaker = "unk"
original = "ぎゅ、ぎゅ、ぎゅ──とピストンするのも苦しいほどのすごい締まりなのに、ペニスを包む膣肉はぷにぷにと柔らかくて。"
translation = "규, 규, 규── 하고 피스톤하는 것도 힘들 정도의 대단한 조임인데도, 페니스를 감싸는 질벽은 말랑말랑하고 부드러웠다."

[[dialogue]]
speaker = "unk"
original = "腰を振るたび、アポロのことをもっと感じさせたくなってしまう。彼女が望むことをなんでもしてあげたかった。"
translation = "허리를 흔들 때마다 아폴로를 더 느끼게 해주고 싶어진다. 그녀가 원하는 것은 무엇이든 해주고 싶었다."

[[dialogue]]
speaker = "アポロ"
original = "「もっと……して、欲しいことっ？<emoji=heart04>\u3000はぁ、ふぅ、んん、あぁぁん<emoji=heart04>\u3000ああ、あ、ああっ……な、ならっ<emoji=heart04>」"
translation = "「더…… 해줬으면 하는 거?<emoji=heart04> 하아, 후우, 응, 아아앙<emoji=heart04> 아아, 아, 아앗…… 그, 그럼<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「まおーっ……あれ、してっ<emoji=heart04>\u3000チューして、くれっ<emoji=heart04>\u3000強いぱんぱん、しながら、チューっ<emoji=heart04>」"
translation = "「마왕…… 그거 해줘<emoji=heart04> 키스해줘<emoji=heart04> 강하게 팡팡하면서 키스<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "深くつながったままにキスがしたいというおねだり。俺はたまらず、覆いかぶさるようにしてアポロの唇を奪う──"
translation = "깊게 연결된 채로 키스하고 싶다는 조름. 나는 견디지 못하고 덮치듯이 아폴로의 입술을 빼앗는다──"

[[dialogue]]
speaker = "アポロ"
original = "「んぅちゅるっ<emoji=heart04>\u3000んちゅ、んちゅる<emoji=heart04>\u3000れぇっ<emoji=heart04>\u3000んちゅれぇ、れりゅ、んちゅるっ、ちゅぱっ……<emoji=heart04>」"
translation = "「응으츄릅<emoji=heart04> 응츄, 응츄릅<emoji=heart04> 레에<emoji=heart04> 응츄레에, 레류, 응츄릅, 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んぅちゅるう、ちゅるれぇ、れる、んちゅ、れぇえっ……！<emoji=heart04>\u3000あ、あたし、これ好きだっ<emoji=heart04>\u3000まおー、んぅりゅ、ちゅる<emoji=heart04>」"
translation = "「응으츄르우, 츄르레에, 레루, 응츄, 레에엣……!<emoji=heart04> 나 이거 좋아<emoji=heart04> 마왕, 응으류, 츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さっきまでソフトなキスしかしたことがなかったのに、アポロは積極的に舌を絡ませてくる。"
translation = "방금 전까지 가벼운 키스밖에 해본 적 없었는데, 아폴로는 적극적으로 혀를 얽어온다."

[[dialogue]]
speaker = "アポロ"
original = "「んちゅる、れぇ、ちゅ、んちゅ<emoji=heart04>\u3000べろ、気持ちいい……<emoji=heart04>\u3000まおー、しゅきっ<emoji=heart04>\u3000んちゅる、れるれる、んちゅ、りゅるるっ……<emoji=heart04>」"
translation = "「응츄르, 레에, 츄, 응츄<emoji=heart04> 혓바닥 기분 좋아……<emoji=heart04> 마왕, 죠아<emoji=heart04> 응츄르, 레루레루, 응츄, 류루루……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "がっつくみたいに深いキスをしながら、アポロの弱い乳首もこね回す。"
translation = "허겁지겁 깊은 키스를 나누며 아폴로의 민감한 유두도 주무른다."

[[dialogue]]
speaker = "アポロ"
original = "「ふぅうっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000んちゅ、ちゅ、ちゅ、ちゅぅ<emoji=heart04>\u3000きもちぃ<emoji=heart04>\u3000あむぅっ<emoji=heart04>\u3000まおー……んちゅ、んちゅるる、んちゅちゅるぅ<emoji=heart04>」"
translation = "「후우우윽<emoji=heart04> 후우윽<emoji=heart04> 응츄, 츄, 츄, 츄우<emoji=heart04> 기분 죠아<emoji=heart04> 아무우윽<emoji=heart04> 마왕…… 응츄, 응츄르르, 응츄츄르우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロのふやけた声に、俺も限界が近づいてくる。ゾクゾクと射精欲がせり上がってきて──"
translation = "아폴로의 풀어진 목소리에 나도 한계가 다가온다. 오싹오싹 사정감이 치밀어 올라──"

[[dialogue]]
speaker = "アポロ"
original = "「んちゅうるる、れるれるっ……もう、イキそう？<emoji=heart04>\u3000んちゅっ……うん、わかったっ……まおー<emoji=heart04>\u3000ちゅぅうっ──ぷはぁ<emoji=heart04>」"
translation = "「응츄우루루, 레루레루…… 벌써 갈 것 같아?<emoji=heart04> 응츄…… 응, 알았어…… 마왕<emoji=heart04> 츄우우우── 푸하<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乱暴に腰を振りたがっている俺の事情を察してくれたのか、アポロが唇を離してくれて──"
translation = "난폭하게 허리를 흔들고 싶어 하는 나의 사정을 알아챈 것인지, 아폴로가 입술을 떼어주었고──"

[[dialogue]]
speaker = "アポロ"
original = "「あぁっ、あっあっあっあっあっ！<emoji=heart04>\u3000んんぅ、ふぁあ、あ、あぁああっ<emoji=heart04>\u3000強い、強いぱんぱん──うぁ、ああ、あぁあっ！<emoji=heart04>」"
translation = "「아앗, 앗앗앗앗앗!<emoji=heart04> 응응우, 하아, 아, 아아아앗<emoji=heart04> 강해, 강한 팡팡── 우아, 아아, 아아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「まおー、もっと気持ちよく、なってっ！<emoji=heart04>\u3000あたしの中で、気持ちよく──ふぅ、んんん、ぅあ、あ、ああぁ！<emoji=heart04>」"
translation = "「마왕, 더 기분 좋아져!<emoji=heart04> 내 안에서 기분 좋게── 후우, 응응응, 우아, 아, 아아아!<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「出して、いいからなっ……<emoji=heart04>\u3000いっぱい出して、いいからっ<emoji=heart04>\u3000あ、ぅう、ふぅ、ぁ、ああぁん<emoji=heart04>\u3000あぁ、あああっ！<emoji=heart04>」"
translation = "「내보내도 괜찮으니까……<emoji=heart04> 잔뜩 내보내도 괜찮으니까<emoji=heart04> 아, 우우, 후우, 아, 아아앙<emoji=heart04> 아아, 아아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "行為の前に簡単な説明はした。膣内に射精すると妊娠することもあるから、最後は外に出すよと告げていたのだけど──"
translation = "행위 전에 간단한 설명은 했다. 질 내에 사정하면 임신할 수도 있으니 마지막엔 밖에 하겠다고 고했었지만──"

[[dialogue]]
speaker = "アポロ"
original = "「なかっ<emoji=heart04>\u3000なかで、いいっ<emoji=heart04>\u3000まおー、抜かないでっ<emoji=heart04>\u3000ふぅ、あ、あぅ、んん、んぅっ！<emoji=heart04>」"
translation = "「안에<emoji=heart04> 안이 좋아<emoji=heart04> 마왕, 빼지 마<emoji=heart04> 후우, 아, 아우, 응, 응윽!<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「このまま、してっ……あたしの中に、出してっ<emoji=heart04>\u3000出して、出してっ<emoji=heart04>\u3000……あ、あ、あ、ああ、あああっ！<emoji=heart04>」"
translation = "「이대로 해줘…… 내 안에 내보내 줘<emoji=heart04> 내보내 줘, 내보내 줘<emoji=heart04> ……아, 아, 아, 아아, 아아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんなことを言われたら無理だ、射精の時だけ抜くだなんて。俺は腰を振るペースを速めて、アポロのお腹の奥へめがけて──"
translation = "이런 말을 들으면 무리다, 사정할 때만 뺀다니. 나는 허리를 흔드는 속도를 높여 아폴로의 배 속 깊은 곳을 향해──"

[[dialogue]]
speaker = "アポロ"
original = "「あ、これっ……お前が言ってた、やつ<emoji=heart04>\u3000──くるっ、一番きもちぃの来ちゃうっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000きもちぃ<emoji=heart04>\u3000きもちぃぃの！<emoji=heart04>\u3000あっ、あああああっ<emoji=heart04>」"
translation = "「아, 이거…… 네가 말했던 그거<emoji=heart04> ──온다, 제일 기분 좋은 거 와버려<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋은 거!<emoji=heart04> 앗, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ふわぁぁぁぁっ<emoji=heart04>\u3000は、あぁぁん、イクっ<emoji=heart04>\u3000イクイクイクっ──イっっちゃぅぅうぅぅぅっ～～～～～！！<emoji=heart04>」"
translation = "「후와아아아아앗<emoji=heart04> 하, 아아앙, 가버려<emoji=heart04> 가버려가버려가버려── 가버려어어어어억~~~~~~~~~!!<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「あぁああぁあっ……ふぁぁぁぁあああ～～～～～～っ……！！<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아앗…… 하아아아아아아아~~~~~~~~~~~~앗……!!<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂するアポロの膣内で、俺も射精をする。"
translation = "절정하는 아폴로의 질 내에 나도 사정한다."

[[dialogue]]
speaker = "アポロ"
original = "「熱ぅぅぃっ……あ、あぅっ、ふぅうう、あっ<emoji=heart04>\u3000あぁあ、ああぁっ……！<emoji=heart04>」"
translation = "「뜨거워어어엇…… 아, 아웃, 후우우우, 앗<emoji=heart04> 아아아, 아아앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んんんっ……まだ出てるっ<emoji=heart04>\u3000あぁあ、あう、ぅうぅ、ぅううぅう～っ……！！<emoji=heart04>」"
translation = "「응응응…… 아직 나오고 있어<emoji=heart04> 아아아, 아우, 우우우, 우우우우우~앗……!!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが射精で脈打つたび、アポロもびくびくと体を震わせて。いつまで続くんだと思うような、長い長い絶頂がとうとう静まって──"
translation = "페니스가 사정으로 맥동할 때마다 아폴로도 움찔움찔 몸을 떨며. 언제까지 계속되는 걸까 싶을 정도로 길고 긴 절정이 드디어 잦아들고──"

[[dialogue]]
speaker = "アポロ"
original = "「はぁああぁああっ～～～……<emoji=heart04>\u3000ふぅうぅううっ、はぁああー<emoji=heart04>\u3000これがせっくす……これが、男のせーえき……かぁ<emoji=heart04>」"
translation = "「하아아아아앗~~~……<emoji=heart04> 후우우우우우욱, 하아아아─<emoji=heart04> 이게 섹스…… 이게 남자의 정액……이구나<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「へ、へへー……ほんとに真っ白、なんだな<emoji=heart04>\u3000うぁ……あたしの中から、どんどんこぼれてくる……<emoji=heart04>」"
translation = "「헤, 헤헤─…… 정말 새하얗네<emoji=heart04> 우아…… 내 안에서 계속 흘러나와……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「うん……気持ちよかった……せっくす、あたし……好きかも<emoji=heart04>」"
translation = "「응…… 기분 좋았어…… 섹스, 나…… 좋아할지도<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「恋人なんだから、これからも……何回も、できるんだよな？<emoji=heart04>」"
translation = "「연인이니까 앞으로도…… 몇 번이고 할 수 있는 거지?<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「へへー……約束だぜ、まおー♪\u3000せっくす、いっぱい、いっぱいしようなー<emoji=heart04>」"
translation = "「헤헤─…… 약속이다, 마왕♪ 섹스 잔뜩, 잔뜩 하자고─<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロが俺の予想以上にセックスを気に入ってくれたことは、とても嬉しい。でもそうなると、次はちゃんとコンドームを準備しておかないと……"
translation = "아폴로가 내 예상 이상으로 섹스를 마음에 들어 해준 것은 무척 기쁘다. 하지만 그렇게 되면 다음엔 제대로 콘돔을 준비해둬야……"

[[dialogue]]
speaker = "アポロ"
original = "「……ゴム？\u3000なんだそれ……？\u3000それ使うと、もっとせっくす、気持ちよくなるのか？」"
translation = "「……고무? 그게 뭐야……? 그거 쓰면 섹스 더 기분 좋아지는 거야?」"

[[dialogue]]
speaker = "unk"
original = "……性教育も並行していく必要がありそうだな、と俺は思うのだった。"
translation = "……성교육도 병행할 필요가 있겠군, 하고 나는 생각했다."

