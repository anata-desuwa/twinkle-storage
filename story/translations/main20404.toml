[[dialogue]]
speaker = "unk"
original = "第４話,新星学園理事会,B"
translation = "제4화, 신성학원 이사회, B"

[[dialogue]]
speaker = "unk"
original = "同刻。新星学園の会議室では、新たな学園長を決めるために理事会が開かれていた。"
translation = "같은 시각. 신성학원의 회의실에서는 새로운 학원장을 결정하기 위해 이사회가 열리고 있었다."

[[dialogue]]
speaker = "unk"
original = "規則上、新星学園の学園長は理事会の承認によって決定される。"
translation = "규정상 신성학원의 학원장은 이사회의 승인에 의해 결정된다."

[[dialogue]]
speaker = "unk"
original = "開校当初は、教皇庁に推薦されたセイファートが学園長に就任し、今まで信任され続けていた。"
translation = "개교 당초에는 교황청에 추천받은 세이퍼트가 학원장에 취임하여 지금까지 계속 신임받아 왔다."

[[dialogue]]
speaker = "unk"
original = "それが彼の失踪──そして裏切りによって学園長が不在になり、流星学園学園長のラティエが新星の学園長を兼任している状態だ。"
translation = "그것이 그의 실종── 그리고 배신에 의해 학원장이 부재하게 되어, 유성학원 학원장인 라티에가 신성의 학원장을 겸임하고 있는 상태다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ご多忙のところ、理事会への出席感謝する。知らぬ者はいないだろうが、理事長のヘレナだ」"
translation = "「바쁜 와중에 이사회에 출석해 주어 감사하도다. 모르는 자는 없겠지만, 이사장인 헬레나이니라.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「今日集まってもらったのは他でもない、空席になっていた学園長を決めるためだ」"
translation = "「오늘 모이게 한 것은 다름이 아니라, 공석이었던 학원장을 결정하기 위해서도다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ここにいる諸君には周知だが、前学園長ジェラルド・セイファートは我が娘ヴィーナスを連れ去り、魔界へ失踪した」"
translation = "「여기 있는 제군들에게는 주지된 사실이나, 전 학원장 제럴드 세이퍼트는 짐의 딸 비너스를 데리고 사라져 마계로 실종되었느니라.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そればかりかリクリエに加担し、世界を滅ぼそうとした。新星学園学園長としてあってはならない裏切りだ」"
translation = "「그뿐만 아니라 리크리에에 가담하여 세계를 멸망시키려 하였도다. 신성학원 학원장으로서 있을 수 없는 배신이니라.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「だがこれは、彼を学園長として信任していながら、その本心を見抜けなかった我々理事会の失態でもある」"
translation = "「허나 이는 그를 학원장으로서 신임하고 있으면서도 그 본심을 꿰뚫어 보지 못한 우리 이사회의 실책이기도 하도다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「教皇庁から請われて理事長に就いたとはいえ、この九浄ヘレナとしても不徳の致すところだ」"
translation = "「교황청의 요청으로 이사장에 취임했다고는 하나, 이 쿠죠 헬레나로서도 부덕의 소치이니라.」"

[[dialogue]]
speaker_original = "理事Ａ"
speaker_translation = "이사 A"
original = "「本当に理事として情けない気持ちです。生徒を導く者のトップが、敵だったなんて……」"
translation = "「정말 이사로서 면목이 없는 심정입니다. 학생을 이끄는 자들의 정점이 적이었다니……」"

[[dialogue]]
speaker_original = "理事Ａ"
speaker_translation = "이사 A"
original = "「ですが正直、今でも信じられない気持ちです。あの流星の騎士がリクリエの到来を望むなんて思いませんでした」"
translation = "「하지만 솔직히 지금도 믿기지 않는 기분입니다. 그 유성의 기사가 리크리에의 도래를 바랄 줄은 몰랐습니다.」"

[[dialogue]]
speaker_original = "理事Ａ"
speaker_translation = "이사 A"
original = "「実は私も彼に救われたことがありまして……いえ、ご令嬢を攫われた九浄理事長の前でする話ではありませんでしたね」"
translation = "「사실 저도 그에게 구원받은 적이 있어서…… 아니, 영애를 납치당하신 쿠죠 이사장님 앞에서 할 이야기는 아니었군요.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「かまわぬ。彼の実績は私も知っているからな」"
translation = "「상관없느니라. 그의 업적은 짐도 알고 있으니까 말이도다.」"

[[dialogue]]
speaker = "unk"
original = "なお、一般にはジェラルド・セイファートの死の詳細は知らされていない。"
translation = "참고로 일반인에게는 제럴드 세이퍼트의 죽음에 관한 상세한 내용은 알려지지 않았다."

[[dialogue]]
speaker = "unk"
original = "『流星の騎士』の活躍を知る人は、みな彼の死を悼んでいるという。"
translation = "『유성의 기사』의 활약을 아는 사람들은 모두 그의 죽음을 애도하고 있다고 한다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「しかし後悔ばかりしてもいられない。新星学園には新たな学園長が必要だ」"
translation = "「허나 후회만 하고 있을 수는 없도다. 신성학원에는 새로운 학원장이 필요하니라.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私が推薦する候補がもうすぐ到着する。先日のガーディアンの襲撃で公共交通機関に乱れが出ていて、少し遅れるとのことだ。すまないがしばし待ってくれ」"
translation = "「짐이 추천하는 후보가 곧 도착할 것이니라. 요전번 가디언의 습격으로 대중교통에 차질이 생겨 조금 늦어진다고 하더구나. 미안하지만 잠시 기다려 주게나.」"

[[dialogue]]
speaker_original = "理事Ａ"
speaker_translation = "이사 A"
original = "「それは問題ないのですが……例の……」"
translation = "「그건 문제없습니다만…… 예의……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。動画の件だな。私も存じている」"
translation = "「음. 동영상 건 말이구나. 짐도 알고 있느니라.」"

[[dialogue]]
speaker = "unk"
original = "新星学園の理事たちは、平行世界の存在についても報告を受けており、今いるこの世界──アルタイル以外の世界の存在も承知していた。"
translation = "신성학원의 이사들은 평행세계의 존재에 대해서도 보고를 받았으며, 지금 있는 이 세계── 알타이르 이외의 세계의 존재도 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "だからこそ、チナの言葉はより真実味を持って聞こえた。"
translation = "그렇기에 치나의 말은 더욱 진실미 있게 들렸다."

[[dialogue]]
speaker_original = "理事Ｂ"
speaker_translation = "이사 B"
original = "「つまるところ、新星学園はどうするのだ？\u3000極星学園と戦うのか？」"
translation = "「결국 신성학원은 어떻게 할 생각입니까? 극성학원과 싸울 겁니까?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それは私も測りかねているところだ。彼女の主張が真実かどうか、知る手立てがないのでな」"
translation = "「그것은 짐도 가늠하지 못하고 있는 부분이도다. 그녀의 주장이 진실인지 아닌지 알 방도가 없으니 말이니라.」"

[[dialogue]]
speaker_original = "理事Ｂ"
speaker_translation = "이사 B"
original = "「ならなおのこと、戦うべきではないのか？\u3000真偽はどうあれ、この世界が滅ぼされるのを指を咥えて見ているわけにはいかん」"
translation = "「그렇다면 더더욱 싸워야 하는 것 아닙니까? 진위야 어찌 됐든 이 세계가 멸망하는 것을 손 놓고 지켜보고 있을 수는 없습니다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……正論ではあるな」"
translation = "「……정론이로다.」"

[[dialogue]]
speaker = "unk"
original = "だがその選択肢を取れば、デネブを滅ぼすことになるかもしれない。"
translation = "하지만 그 선택지를 택하면 데네브를 멸망시키게 될지도 모른다."

[[dialogue]]
speaker = "unk"
original = "星騎士の若者たちにそんな重責を背負わせて良いものかと、ヘレナでも悩んでしまう。"
translation = "성기사 청년들에게 그런 중책을 짊어지게 해도 되는 것인지, 헬레나조차 고민에 빠진다."

[[dialogue]]
speaker = "unk"
original = "そこに──"
translation = "그곳에──"

[[dialogue]]
speaker = "？？？"
original = "「む。すでに始まっているのか。悪いな、少し遅れた」"
translation = "「무. 이미 시작된 건가. 미안하군, 조금 늦었다.」"

[[dialogue]]
speaker_original = "理事Ａ"
speaker_translation = "이사 A"
original = "「は……？\u3000あなたは……？」"
translation = "「하……? 당신은……?」"

[[dialogue]]
speaker = "unk"
original = "理事会に姿を現したのは、豪奢な衣装に身を包んだ魔族の女性。"
translation = "이사회에 모습을 드러낸 것은 화려한 의상을 걸친 마족 여성."

[[dialogue]]
speaker = "unk"
original = "毛並みの良い九尾を優雅に揺らし、眩いばかりの美貌は見る者を魅了せずにはいない。"
translation = "결이 고운 구미를 우아하게 흔들며, 눈부신 미모는 보는 이를 매료시키지 않고는 못 배긴다."

[[dialogue]]
speaker = "unk"
original = "その存在感はヘレナにも匹敵、いや凌駕するほどだ。"
translation = "그 존재감은 헬레나에게도 필적, 아니 능가할 정도다."

[[dialogue]]
speaker_original = "理事Ｂ"
speaker_translation = "이사 B"
original = "「理事長、推薦したい方とはこの方ですかな……？」"
translation = "「이사장님, 추천하고 싶다는 분이 이분입니까……?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「いいや。だが彼女のことは知っている」"
translation = "「아니로다. 허나 그녀에 대해서는 알고 있느니라.」"

[[dialogue]]
speaker = "unk"
original = "困惑する理事たちとは対照的に、ヘレナは警戒の視線を彼女に向ける。"
translation = "당황하는 이사들과는 대조적으로, 헬레나는 경계의 시선을 그녀에게 보낸다."

[[dialogue]]
speaker = "unk"
original = "ヘレナにとっても初対面だが、何者か察するのに時間はかからなかった。"
translation = "헬레나에게도 초면이었지만, 정체를 짐작하는 데는 시간이 걸리지 않았다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「名乗るのが遅れたな。<ruby>妾<rt>わらわ</rt></ruby>の名は<ruby>煌嶺<rt>コウレイ</rt></ruby>。人間界では知らぬ者もいるか？」"
translation = "「통성명이 늦었군. 소첩의 이름은 코레이. 인간계에서는 모르는 자도 있겠지?」"

[[dialogue]]
speaker_original = "理事Ｂ"
speaker_translation = "이사 B"
original = "「あの悪名高い頽廃都市キュリオスの……！？\u3000どうして彼女がここに！？」"
translation = "「그 악명 높은 퇴폐 도시 큐리오스의……!? 어째서 그녀가 여기에!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「どうしても何も、新星学園の理事が理事会に来て何が悪い」"
translation = "「어째서고 뭐고, 신성학원의 이사가 이사회에 오는 게 뭐가 나쁘지?」"

[[dialogue]]
speaker_original = "理事Ｂ"
speaker_translation = "이사 B"
original = "「理事……！？\u3000あなたが……？」"
translation = "「이사……!? 당신이……?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そうだ。貴殿は知っておろう……九浄ヘレナ」"
translation = "「그렇다. 귀공은 알고 있겠지…… 쿠죠 헬레나.」"

[[dialogue]]
speaker = "unk"
original = "煌嶺が横目に視線を送ると、ヘレナが重く頷く。"
translation = "코레이가 곁눈질로 시선을 보내자, 헬레나가 무겁게 고개를 끄덕인다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ああ、煌嶺殿の言っていることは本当だ。これも事情があってな。今回の理事会で話そうと思っていたのだが」"
translation = "「아아, 코레이 공이 말하는 것은 사실이니라. 이것도 사정이 있어서 말이도다. 이번 이사회에서 이야기하려 했느니라만.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「先日、緋宮リノが“星骸布”を譲り受ける際、引き換えに新星学園の理事の座を求められた」"
translation = "「요전번 히노미야 리노가 “성해포”를 양도받을 때, 그 대가로 신성학원의 이사 자리를 요구받았느니라.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私はリノから報告を受け、教皇庁と合意の上で理事に追加した。正直なところ、魔界の秘宝の対価としては、実に安いものだったと言えるだろう」"
translation = "「짐은 리노에게 보고를 받고 교황청과 합의한 끝에 이사로 추가하였도다. 솔직히 말해 마계의 비보에 대한 대가치고는 실로 싼 편이었다고 할 수 있겠지.」"

[[dialogue]]
speaker_original = "理事Ａ"
speaker_translation = "이사 A"
original = "「な、なるほど……それはやむなしですな……」"
translation = "「나, 과연…… 그건 어쩔 수 없었겠군요……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「同じく、“シエルの<ruby>筐<rt>はこ</rt></ruby>”を授けてくれた聖庭園のリガルタ氏も、現在は新星学園の理事だ。こちらは委任状を預かっているので、この場には来ないがな」"
translation = "「마찬가지로 “시엘의 상자”를 선사해 준 성정원의 리갈타 씨도 현재는 신성학원의 이사니라. 이쪽은 위임장을 맡아 두었기에 이 자리에는 오지 않지만 말이도다.」"

[[dialogue]]
speaker = "unk"
original = "リノは研究機関ヘキサグラムの研究員としてだけでなく、九浄ヘレナの代理人としても接触していた。"
translation = "리노는 연구 기관 헥사그램의 연구원으로서뿐만 아니라, 쿠죠 헬레나의 대리인으로서도 접촉하고 있었다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「まさか流星市国までご足労頂くとは思わなかったな、煌嶺殿」"
translation = "「설마 유성시국까지 발걸음을 해 줄 줄은 몰랐도다, 코레이 공.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「この前の大交流で<ruby>人間界<rt>こちら</rt></ruby>に来てな。理事になったのだから、学園くらい見ていくかと思ったら、理事会があるというではないか」"
translation = "「얼마 전 대교류 때 인간계에 와서 말이지. 이사가 되었으니 학원 정도는 보고 갈까 했더니, 마침 이사회가 있다고 하지 않나.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「いかんな？\u3000正式な理事に知らせもなしに理事会を開くなぞ」"
translation = "「안 되겠군? 정식 이사에게 알리지도 않고 이사회를 열다니.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「まぁ、魔界に伝える手段がないのだから仕方ないか。妾は機嫌が良い。許そう」"
translation = "「뭐, 마계에 전할 수단이 없으니 어쩔 수 없나. 소첩은 기분이 좋다. 용서해 주지.」"

[[dialogue]]
speaker_original = "理事Ｂ"
speaker_translation = "이사 B"
original = "「しかしどうなのだ。あのキュリオスの支配者が、教育機関の理事に就くというのは……」"
translation = "「하지만 어찌 된 일입니까. 그 큐리오스의 지배자가 교육 기관의 이사에 취임하다니……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「フ──ハハッ！\u3000無礼ではあるが正論だ。そこは妾も正直どうかと思っておる」"
translation = "「후── 하하! 무례하긴 하지만 정론이군. 그 점은 소첩도 솔직히 어떨까 생각하고 있다.」"

[[dialogue]]
speaker = "unk"
original = "頽廃都市キュリオス──魔界の欲が集まる場所と言われており、合法違法問わずいかがわしい業者が<ruby>数多<rt>あまた</rt></ruby>ひしめいているとされる。"
translation = "퇴폐 도시 큐리오스── 마계의 욕망이 모이는 곳이라 불리며, 합법 불법을 가리지 않고 수상쩍은 업자들이 수없이 북적거린다고 한다."

[[dialogue]]
speaker = "unk"
original = "善良で節度ある者でも一度キュリオスを訪れると、一夜で欲望に染まり、一文無しになるという。"
translation = "선량하고 절도 있는 자라도 한 번 큐리오스를 방문하면 하룻밤 사이에 욕망에 물들어 알거지가 된다고 한다."

[[dialogue]]
speaker = "unk"
original = "メイプルのような宮廷仕えなど一部の者は、まだまともと言えるだろうが。"
translation = "메이플 같은 궁정 관리 등 일부는 아직 온전하다고 할 수 있겠지만."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「だが世界の危機には些事であろう。妾が敵にならぬだけ心強く思うがいい」"
translation = "「하지만 세계의 위기 앞에서는 사소한 일이겠지. 소첩이 적이 되지 않는 것만으로도 든든하게 생각하도록 해라.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ところで、今日の理事会では新星学園の学園長を決めるのであったな。では──」"
translation = "「그런데 오늘 이사회에서는 신성학원의 학원장을 정하는 것이었지. 그럼──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾が学園長を務めようではないか！」"
translation = "「소첩이 학원장을 맡도록 하지 않겠나!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なに……？」"
translation = "「무엇이라고……?」"

