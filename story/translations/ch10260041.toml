[[dialogue]]
speaker = "unk"
original = "第１話,可愛い後輩と羽根突きゲーム,P"
translation = "제1화, 귀여운 후배와 하네츠키 게임, P"

[[dialogue]]
speaker = "unk"
original = "恋人であるリーリアと迎えたお正月。その日は安倍野神社の境内を借り、羽根突きの練習をする約束をしていた。"
translation = "연인인 리리아와 맞이한 설날. 그날은 아베노 신사의 경내를 빌려, 하네츠키(제기차기) 연습을 하기로 약속했었다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「セ～ンパイ♪\u3000マジカルおはようございま～す☆」"
translation = "「선~배♪ 매지컬 좋은 아침이에~요☆」"

[[dialogue]]
speaker = "unk"
original = "晴れ着、似合ってて可愛い"
translation = "나들이옷, 잘 어울려서 귀여워."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えへへへへへぇ<emoji=heart04>\u3000さっすがセンパイ、わかってますね～☆」"
translation = "「에헤헤헤헤헤헤<emoji=heart04> 역시 선배, 뭘 좀 아시네요~☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「女の子は好きな人が相手なら、おめかしを褒められるのは、何度だって嬉しいんですから♪」"
translation = "「여자는 좋아하는 상대라면, 꾸민 걸 칭찬받는 건 몇 번이라도 기쁘니까요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「お礼に、可愛い後輩カノジョが腕に抱き着いちゃいますよ～♪\u3000えいっ<emoji=heart04>」"
translation = "「답례로, 귀여운 후배 여자친구가 팔에 매달려 버릴게요~♪ 에잇<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふっふっふっ☆\u3000どうです～？\u3000さらにアップデートされた、最新の<b>幻影魔法</b>は？」"
translation = "「훗훗훗☆ 어때요~? 더욱 업데이트된, 최신 <b>환영</b> <b>마법</b>은?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「おかげで、ここまで胸元が開いちゃってる晴れ着フォームも、可愛く着こなせるようになったんですよ～♪」"
translation = "「덕분에, 이렇게 가슴팍이 파인 나들이옷 폼도 귀엽게 소화할 수 있게 됐다구요~♪」"

[[dialogue]]
speaker = "unk"
original = "リーリアの胸は<b>パッド</b>でだいぶサイズが盛られている（本人曰く、これはお洒落の一環なので、バレてるかどうかは問題ではないらしい）。"
translation = "리리아의 가슴은 <b>패드</b>로 꽤 사이즈가 부풀려져 있다 (본인 말로는, 이것도 멋내기의 일환이라 들켰는지 어떤지는 문제가 아니라는 듯하다)."

[[dialogue]]
speaker = "unk"
original = "そのパッドをテクスチャーのように幻影魔法で覆うことで、胸元を大胆に開いても本物にしか見えない巨乳美少女が完成する、という仕組みである。"
translation = "그 패드를 텍스처처럼 환영 마법으로 덮음으로써, 가슴팍을 대담하게 열어도 진짜로밖에 보이지 않는 거유 미소녀가 완성된다는 구조다."

[[dialogue]]
speaker = "unk"
original = "よし、それじゃあ訓練を始めようか！"
translation = "좋아, 그럼 훈련을 시작해 볼까!"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「って、ノーコメント！？\u3000もう、センパイってば、そこは気になるポイントなんですから、ちゃんと褒めて下さいよ～！」"
translation = "「앗, 노 코멘트!? 정말, 선배도 참, 거긴 신경 쓰이는 포인트니까 제대로 칭찬해 달라구요~!」"

[[dialogue]]
speaker = "unk"
original = "被害者風を装っているが、リーリアはパッド付きとはいえ、恋人に頻繁に胸を押し付けられて、俺が照れているのをわかっててやっている。これは巧妙な罠なのだ。"
translation = "피해자인 척하고 있지만, 리리아는 패드가 들어있긴 해도 연인에게 빈번하게 가슴을 밀착시켜서 내가 부끄러워하는 걸 알고서 하는 짓이다. 이것은 교묘한 함정이다."

[[dialogue]]
speaker = "unk"
original = "そんなこんなで恋人同士のじゃれ合いをしつつ、俺たちは晴れ着の力の訓練でもある『星術羽根突き』を始めることになった。"
translation = "이런저런 연인끼리의 장난을 치면서, 우리들은 나들이옷의 힘을 기르는 훈련이기도 한 『성술 하네츠키』를 시작하게 되었다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ、今日の羽根突きなんですけど～、訓練とはいえ、せっかくですから<b>罰ゲーム</b>付きでやりませんか？」"
translation = "「선배, 오늘 하네츠키 말인데요~, 훈련이긴 하지만 기왕 하는 거 <b>벌칙</b> <b>게임</b>을 걸고 하지 않을래요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「内容は、羽根を落とすたびに『負けた方が相手の耳元で愛の言葉を囁く』っていうのはどうでしょう♪」"
translation = "「내용은, 셔틀콕을 떨어뜨릴 때마다 『진 쪽이 상대의 귓가에 사랑의 말을 속삭이기』라는 건 어떨까요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――ふふっ♪\u3000では、センパイからの了承ももらったところで、始めちゃいますよ～☆\u3000私から行きますね～、えいっ☆」"
translation = "「――후훗♪ 그럼, 선배의 승낙도 받았으니 시작할게요~☆ 저부터 갑니다~, 에잇☆」"

[[dialogue]]
speaker = "unk"
original = "そうして始まった星術羽根突き。リーリアは魔法を技に込めて打ってくるのだが――これがまた、とても上手かった。"
translation = "그렇게 시작된 성술 하네츠키. 리리아는 마법을 기술에 담아 쳐왔는데―― 이것이 또, 무척 능숙했다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「よっし☆\u3000センパイ、私の勝ちですよ～♪」"
translation = "「좋았어☆ 선배, 제가 이겼어요~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えへへっ、褒めてくれてありがとうございま～す☆\u3000元旦の後、サーシャさんと一緒に私も訓練を続けてるんですよ～」"
translation = "「에헤헷, 칭찬해 주셔서 감사해~요☆ 신년 첫날 이후로, 사샤 씨랑 같이 저도 훈련을 계속하고 있거든요~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ、可愛いだけじゃない後輩に、惚れ直しちゃってもいいんですよ～？」"
translation = "「후훗, 귀엽기만 한 게 아닌 후배에게, 다시 반해버려도 괜찮다구요~?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「で、センパイ？\u3000罰ゲームは忘れてませんよね～？」"
translation = "「그래서, 선배? 벌칙 게임은 잊지 않으셨죠~?」"

[[dialogue]]
speaker = "unk"
original = "やるからには男として、ちょっと恥ずかしくてもちゃんとやらねばと思い、俺はリーリアに近づいて、耳元で囁く。"
translation = "하는 이상 남자로서, 조금 부끄러워도 제대로 해야겠다고 생각하며 나는 리리아에게 다가가 귓가에 속삭인다."

[[dialogue]]
speaker = "unk"
original = "リーリア、好きだぞ。今年もよろしくな"
translation = "리리아, 좋아해. 올해도 잘 부탁해."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「っ<emoji=heart04>\u3000えへへへへへぇ<emoji=heart04>\u3000はいっ、センパイ、今年も後輩カノジョとして、よろしくお願いしますね<emoji=heart04>」"
translation = "「윽<emoji=heart04> 에헤헤헤헤헤헤<emoji=heart04> 네, 선배, 올해도 후배 여자친구로서 잘 부탁드릴게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「さあ、この調子でどんどん続けて行きますよ～♪\u3000勝って勝って勝ちまくって、センパイにもっと愛を囁かせちゃいます☆」"
translation = "「자, 이 기세로 계속 가볼게요~♪ 이기고 이기고 계속 이겨서, 선배에게 사랑의 속삭임을 더 듣게 만들겠어요☆」"

[[dialogue]]
speaker = "unk"
original = "実際、リーリアの実力は俺より一枚上手で、その後も連敗続き。"
translation = "실제로 리리아의 실력은 나보다 한 수 위였고, 그 뒤로도 연패가 이어졌다."

[[dialogue]]
speaker = "unk"
original = "恥ずかしい愛の言葉を繰り返すことになり、なんとか勝ち筋を探っていた――のだが。"
translation = "부끄러운 사랑의 말을 반복하게 되어, 어떻게든 이길 방도를 찾고 있었는데――."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ～ん♪\u3000ミスしてセンパイに負けてしまいました～☆」"
translation = "「아~앙♪ 실수해서 선배한테 져버렸네요~☆」"

[[dialogue]]
speaker = "unk"
original = "なんか今……わざと羽根を落とさなかった？"
translation = "방금 좀…… 일부러 떨어뜨리지 않았어?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いやいや、何言ってるんですか～。いくら上手な後輩でも、ずっと続けていたらミスくらいしますよ～☆」"
translation = "「아니 아니, 무슨 말씀을 하시는 거예요~. 아무리 잘하는 후배라도 계속하다 보면 실수 정도는 하죠~☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それじゃあ今度は、私からセンパイに、愛の言葉を囁いちゃいますね～<emoji=heart04>」"
translation = "「그럼 이번에는, 제가 선배에게 사랑의 말을 속삭여 줄게요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――大好きです<emoji=heart04>\u3000世界一格好いいって、本気で思ってますよ、センパイ<emoji=heart04>」"
translation = "「――정말 좋아해요<emoji=heart04> 세상에서 제일 멋지다고 진심으로 생각하고 있어요, 선배<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は思わずドキッとして、顔が熱くなってしまう。"
translation = "나는 나도 모르게 가슴이 두근거려 얼굴이 뜨거워지고 만다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、ふふふっ♪\u3000センパイ、顔が赤くなってますよ～？\u3000どうやらマジカルヒットしちゃったみたいですね☆」"
translation = "「앗, 후후훗♪ 선배, 얼굴이 빨개졌어요~? 아무래도 매지컬 히트해 버린 모양이네요☆」"

[[dialogue]]
speaker = "unk"
original = "くっ……悪戯な後輩に、手玉に取られてしまっている。どうにか逆転の一手を探らなくては……！"
translation = "큭…… 장난꾸러기 후배에게 손바닥 위에서 놀아나고 있다. 어떻게든 역전의 한 수를 찾아야 해……!"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――いぇいっ♪\u3000マジカルウィン☆\u3000また私の勝ちですね～」"
translation = "「――예이♪ 매지컬 윈☆ 또 제가 이겼네요~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それじゃあセンパイ、自己肯定感爆上がりの愛の言葉、お願いしま～す☆」"
translation = "「그럼 선배, 자기 긍정감이 폭발하는 사랑의 말, 부탁드려요~☆」"

[[dialogue]]
speaker = "unk"
original = "俺はリーリアに一矢報いる為、あれから考えておいた台詞を口にする。"
translation = "나는 리리아에게 일격을 가하기 위해, 아까부터 생각해 두었던 대사를 입에 담는다."

[[dialogue]]
speaker = "unk"
original = "スルーした晴れ着の幻影魔法の話だけど――"
translation = "아까 넘겼던 나들이옷의 환영 마법 이야기인데――"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "unk"
original = "――リーリアが俺のために一生懸命お洒落してくれてると思うと、実はめちゃくちゃ嬉しい。"
translation = "――리리아가 나를 위해서 열심히 꾸며줬다고 생각하니까, 사실은 엄청 기뻐."

[[dialogue]]
speaker = "unk"
original = "――付き合い始めて結構経つのに、未だにおっぱい押し付けてまで好きアピールしてくれるところ、めちゃくちゃ可愛いと思ってる。"
translation = "――사귀기 시작한 지 꽤 됐는데, 아직도 가슴까지 밀착시키면서 좋아한다고 어필해 주는 거, 엄청 귀엽다고 생각하고 있어."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「~~~~윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤に染め上げ、後ずさるリーリア。一方の俺も、ちょっと自意識過剰な内容だったため自傷ダメージを受けていた！"
translation = "얼굴을 새빨갛게 물들이며 뒷걸음질 치는 리리아. 한편 나도, 조금 자의식 과잉인 내용이었기에 자해 데미지를 입고 있었다!"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（別に隠してるつもりもなかったけど！\u3000なかったけどぉ！！）"
translation = "（딱히 숨길 생각도 없었지만! 없었지만 말이야!!）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（おっぱい押し付けてるのが、『好きアピール』だってバレてるの、超恥ずかしいんですけど！？\u3000いやもちろん、特に誤解はないんですけどね！！？）"
translation = "（가슴을 밀착시키는 게 『좋아한다는 어필』이라는 걸 들키다니, 초 부끄러운데요!? 아니 물론, 딱히 오해는 아니지만요!!?）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「や、やりますね、センパイっ。今のは結構効きましたよ……！」"
translation = "「제, 제법이네요, 선배. 방금 건 꽤 잘 들어왔어요……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「やられっぱなしというのもしゃくなんで……そうですね、次の罰ゲームは……」"
translation = "「당하고만 있는 것도 분하니까…… 그래요, 다음 벌칙 게임은……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「もし私が勝ったら、<b>キス</b>をお願いするっていうのは……アリですか？」"
translation = "「만약 제가 이기면, <b>키스</b>를 해달라고 하는 건…… 되나요?」"

[[dialogue]]
speaker = "unk"
original = "う～ん、ナシだな"
translation = "음~, 안 돼."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えぇえぇえぇっ！？\u3000ここでまさかのナシ！？」"
translation = "「에에에에에엑!? 여기서 설마 했던 거절!?」"

[[dialogue]]
speaker = "unk"
original = "俺はリーリアの反応が可愛くて、思わず笑ってしまう。彼女の頭に手を置いて、優しく撫でながら言う。"
translation = "나는 리리아의 반응이 귀여워서 나도 모르게 웃음이 터진다. 그녀의 머리에 손을 얹고 상냥하게 쓰다듬으며 말한다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――罰ゲームとかじゃなくて、恋人なんだから普通にしたい……？」"
translation = "「――벌칙 게임 같은 게 아니라, 연인이니까 그냥 하고 싶은데……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「は、はい……<emoji=heart04>\u3000じゃあ、センパイ……んっ<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04> 그럼, 선배…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後は羽根突きよりも、キスにばかり夢中になってしまう俺たちなのであった。"
translation = "그 뒤로는 하네츠키보다 키스에만 열중하게 되어버린 우리들이었다."

