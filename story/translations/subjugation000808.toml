[[dialogue]]
speaker = "unk"
original = "せつなの口寄せによって呼び出されたチョコゴーレムと、変身して戦うことになった俺。"
translation = "세츠나의 소환으로 불려 나온 초코 골렘과 변신해서 싸우게 된 나."

[[dialogue]]
speaker = "unk"
original = "しかしそのゴーレムは、以前のカフェテリアの時とは比べ物にならない、圧倒的な強さで――"
translation = "하지만 그 골렘은 이전 카페테리아 때와는 비교도 안 될 만큼 압도적인 강함으로──"

[[dialogue]]
speaker = "ゴーレム"
original = "「ゴォォォッレム！」"
translation = "「고오오오오올렘!」"

[[dialogue]]
speaker = "unk"
original = "いや、マジで強いんだけど！？"
translation = "아니, 진짜 강한데!?"

[[dialogue]]
speaker = "蘭美"
original = "「――御前試合の時に戦った、ヴィーナスお嬢様よりも強いかもって？\u3000ふふふっ♪\u3000そうでしょ！」"
translation = "「──어전 시합 때 싸웠던 비너스 아가씨보다 강한 것 같다고? 후후훗♪ 그렇겠지!」"

[[dialogue]]
speaker = "蘭美"
original = "「これが１００回のチョコ作りと破壊を経て生まれた、『チョコゴーレム・レベル１００』の力よ！」"
translation = "「이것이 100번의 초코 제작과 파괴를 거쳐 태어난 『초코 골렘 레벨 100』의 힘이야!」"

[[dialogue]]
speaker = "unk"
original = "ドヤ顔してないで助けてくれません！？"
translation = "거드름 피우지 말고 좀 도와주지 않을래!?"

[[dialogue]]
speaker = "蘭美"
original = "「おっと、チョコの強さを味わって欲しいあまり、つい見物してしまっていたわ。――せつな！」"
translation = "「오 이런, 초코의 강함을 맛보게 해주고 싶은 마음에 그만 구경만 해버렸네. ──세츠나!」"

[[dialogue]]
speaker = "せつな"
original = "「御意！\u3000主様の忍として、加勢致しまする！」"
translation = "「명령대로! 주군의 닌자로서 가세하겠소!」"

[[dialogue]]
speaker = "せつな"
original = "「――変身！」"
translation = "「──변신!」"

[[dialogue]]
speaker = "せつな"
original = "「甲賀流忍者せつな・バレンタインフォーム、参上でござる！」"
translation = "「코우가류 닌자 세츠나 밸런타인 폼, 등장했소!」"

[[dialogue]]
speaker = "せつな"
original = "「いざ！\u3000バレンタイン忍法、リボン縛りの術！」"
translation = "「가자! 밸런타인 인법, 리본 묶기 술법!」"

[[dialogue]]
speaker = "ゴーレム"
original = "「ゴォ～レムッ！？」"
translation = "「고~렘!?」"

[[dialogue]]
speaker = "unk"
original = "せつながリボンを伸ばして操り、チョコゴーレムの体に巻き付けて動きを封じる。"
translation = "세츠나가 리본을 뻗어 조종하며 초코 골렘의 몸에 감아 움직임을 봉쇄한다."

[[dialogue]]
speaker = "unk"
original = "せつな、その力は！？"
translation = "세츠나, 그 힘은!?"

[[dialogue]]
speaker = "せつな"
original = "「実は、今日の為の修業を重ねるうちに、せつなのバレンタイン衣装が突然光って、戦闘服へと覚醒を果たしたのでござる！」"
translation = "「사실 오늘을 위해 수행을 거듭하던 중, 세츠나의 밸런타인 의상이 갑자기 빛나더니 전투복으로 각성을 완수했소!」"

[[dialogue]]
speaker = "せつな"
original = "「この衣装はご当主様から頂いたものなのでござるが、どうやら人工戦闘服の試作品としての機能も仕込んであったようで――」"
translation = "「이 의상은 당주님께 받은 것이오만, 아무래도 인공 전투복 시제품으로서의 기능도 내장되어 있었던 모양이라──」"

[[dialogue]]
speaker = "蘭美"
original = "「あの方は魂の囁きとやらで天啓を受けたように先を見通すから、今回もこうなるって、なんとなくわかってたんじゃないかしら？」"
translation = "「그분은 영혼의 속삭임인가 뭔가를 통해 천계를 받은 것처럼 앞을 내다보니까, 이번에도 이렇게 될 줄 어느 정도 알고 계셨던 거 아닐까?」"

[[dialogue]]
speaker = "せつな"
original = "「そういうわけで、せつなの新たな力、是非お使い下さいませ！」"
translation = "「그런 고로 세츠나의 새로운 힘, 부디 사용해 주시구려!」"

[[dialogue]]
speaker = "蘭美"
original = "「私も特別に加勢してあげるわ。だから、会長！」"
translation = "「나도 특별히 가세해 줄게. 그러니까 회장!」"

[[dialogue]]
speaker = "蘭美"
original = "「最強のチョコレート、倒してみせなさい！」"
translation = "「최강의 초콜릿, 쓰러뜨려 봐!」"

[[dialogue]]
speaker = "unk"
original = "俺は２人の力を借りて、チョコゴーレム打倒に挑むのだった――"
translation = "나는 두 사람의 힘을 빌려 초코 골렘 타도에 도전하는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고──"

[[dialogue]]
speaker = "ゴーレム"
original = "「ゴォォォッレム……！」"
translation = "「고오오오오올렘……!」"

[[dialogue]]
speaker = "unk"
original = "俺が全力を込めた拳を叩き込み、チョコゴーレムはついに倒れて、砕け散った。"
translation = "내가 전력을 담은 주먹을 내리꽂자, 초코 골렘은 마침내 쓰러져 산산조각이 났다."

[[dialogue]]
speaker = "unk"
original = "勝てた……！"
translation = "이겼다……!"

[[dialogue]]
speaker = "せつな"
original = "「主様、お見事にございまする！\u3000これで主様とせつな達、３人で倒すことのできる、ギリギリまで鍛え上げたチョコレートが完成致しまする」"
translation = "「주군, 훌륭하시오! 이것으로 주군과 세츠나 일행, 셋이서 쓰러뜨릴 수 있는 한계까지 단련한 초콜릿이 완성되오」"

[[dialogue]]
speaker = "せつな"
original = "「――バレンタイン忍法、ラッピングの術！」"
translation = "「──밸런타인 인법, 래핑 술법!」"

[[dialogue]]
speaker = "unk"
original = "せつながそう言って印を結ぶと、光のリボンが出現し、チョコゴーレムの体が包まれて小さくなっていく。"
translation = "세츠나가 그렇게 말하며 인을 맺자 빛의 리본이 나타나 초코 골렘의 몸을 감싸며 작아져 간다."

[[dialogue]]
speaker = "unk"
original = "やがてそれは、ふわりと浮いて、せつなの手の平の上に移動する。光が消えると――"
translation = "이윽고 그것은 두둥실 떠올라 세츠나의 손바닥 위로 이동한다. 빛이 사라지자──"

[[dialogue]]
speaker = "unk"
original = "そこには可愛くハート型にラッピングされた、チョコが乗せられていた。"
translation = "그곳에는 귀여운 하트 모양으로 포장된 초코가 놓여 있었다."

[[dialogue]]
speaker = "せつな"
original = "「これが今、せつなにできる渾身のバレンタインチョコにござりまする。主様……ど、どうか――」"
translation = "「이것이 지금 세츠나가 할 수 있는 혼신의 밸런타인 초코요. 주군…… 부, 부디──」"

[[dialogue]]
speaker = "せつな"
original = "「受け取って欲しいでござる……！」"
translation = "「받아주셨으면 좋겠소……!」"

[[dialogue]]
speaker = "unk"
original = "ありがたく受け取らせてもらうよ"
translation = "기쁘게 받을게"

[[dialogue]]
speaker = "せつな"
original = "「はいっ！\u3000えへへぇ♪\u3000主様にちゃんと、お渡しできたでござる……♪」"
translation = "「네! 에헤헤♪ 주군께 제대로 전해드렸소……♪」"

[[dialogue]]
speaker = "蘭美"
original = "「やれやれ。色々と苦労したけど、これでバレンタイン成功ね」"
translation = "「이런이런. 여러모로 고생했지만 이걸로 밸런타인 성공이네」"

[[dialogue]]
speaker = "せつな"
original = "「――チョコゴーレムが、一体なんだったのか、でござるか？\u3000それは……」"
translation = "「──초코 골렘이 도대체 뭐였는지 말이오? 그것은……」"

[[dialogue]]
speaker = "unk"
original = "俺はせつなから、チョコゴーレムの正体が、せつなの作ったバレンタインチョコが変身したものだと聞かされる。"
translation = "나는 세츠나로부터 초코 골렘의 정체가 세츠나가 만든 밸런타인 초코가 변신한 것이라는 설명을 듣는다."

[[dialogue]]
speaker = "せつな"
original = "「――おそらく、主様に手作りチョコを贈りたいという強い気持ちが星術となり、勝手に発動していたんだと思いまする」"
translation = "「──아마도 주군께 수제 초코를 드리고 싶다는 강한 마음이 성술이 되어 제멋대로 발동했던 것 같소」"

[[dialogue]]
speaker = "せつな"
original = "「このバレンタインフォームが覚醒してからは、チョコのゴーレム化はせつなの意思で選べるようになりました」"
translation = "「이 밸런타인 폼이 각성한 뒤로는 초코의 골렘화는 세츠나의 의지로 선택할 수 있게 되었소」"

[[dialogue]]
speaker = "せつな"
original = "「それと、倒したゴーレムを再びバレンタインチョコにしたことについては――」"
translation = "「그리고 쓰러뜨린 골렘을 다시 밸런타인 초코로 만든 것에 대해서는──」"

[[dialogue]]
speaker = "蘭美"
original = "「私が提案したのよ。チョコゴーレムを次のチョコ作りの素材にしてみようって」"
translation = "「내가 제안한 거야. 초코 골렘을 다음 초코 제작의 소재로 써보자고」"

[[dialogue]]
speaker = "蘭美"
original = "「失敗は無駄じゃない――それは、チョコゴーレムに関しても言えるんじゃないかと思って、試してみることにしたの」"
translation = "「실패는 헛되지 않아── 그건 초코 골렘에 대해서도 할 수 있는 말이 아닐까 싶어서 시험해 보기로 했지」"

[[dialogue]]
speaker = "せつな"
original = "「結果、チョコがゴーレムに変化し、そのゴーレムを倒して再びチョコの素材にする、というサイクルを繰り返すうちに……」"
translation = "「결과적으로 초코가 골렘으로 변하고, 그 골렘을 쓰러뜨려 다시 초코 소재로 만드는 사이클을 반복하는 동안……」"

[[dialogue]]
speaker = "せつな"
original = "「チョコゴーレムの味が、少しずつ前よりも甘く、深い味わいへと変化していることに気づいたのでござる」"
translation = "「초코 골렘의 맛이 조금씩 이전보다 달콤하고 깊은 풍미로 변화하고 있다는 것을 깨달았소」"

[[dialogue]]
speaker = "蘭美"
original = "「だから、チョコを鍛えることにしたのよ」"
translation = "「그래서 초코를 단련하기로 한 거야」"

[[dialogue]]
speaker = "蘭美"
original = "「何度も叩いて鍛え上げる、日本刀のようにね」"
translation = "「몇 번이고 두드려 단련하는 일본도처럼 말이지」"

[[dialogue]]
speaker = "せつな"
original = "「ただし、チョコゴーレムの味と比例して、強さもどんどん増していったので、倒すのも大変だったでごさるが……」"
translation = "「다만 초코 골렘의 맛에 비례해서 강함도 점점 늘어났기에 쓰러뜨리는 것도 고생이었소만……」"

[[dialogue]]
speaker = "蘭美"
original = "「その倒せるギリギリの強さまで鍛え上げたのが、今回のチョコゴーレム・レベル１００だったというわけよ」"
translation = "「그 쓰러뜨릴 수 있는 한계치까지 단련한 것이 이번 초코 골렘 레벨 100이었다는 소리지」"

[[dialogue]]
speaker = "せつな"
original = "「そして、せつなはバレンタインフォームの覚醒によって、チョコゴーレムをチョコの形に戻す星術を手に入れていたので――」"
translation = "「그리고 세츠나는 밸런타인 폼의 각성으로 초코 골렘을 초코 형태로 되돌리는 성술을 손에 넣었기에──」"

[[dialogue]]
speaker = "せつな"
original = "「主様にご協力頂いて、最強のチョコゴーレムを倒し、それをバレンタインチョコにしてお渡ししようと決めたのでござる」"
translation = "「주군의 협력을 얻어 최강의 초코 골렘을 쓰러뜨리고, 그것을 밸런타인 초코로 만들어 드리기로 결정한 것이오」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふっ、会長にとってはサプライズにもなって、一石二鳥のバレンタインチョコでしょ？」"
translation = "「후후, 회장에게는 서프라이즈도 되고 일석이조인 밸런타인 초코지?」"

[[dialogue]]
speaker = "unk"
original = "死ぬかと思うくらい強かったけどね！？"
translation = "죽을 정도로 강하긴 했지만 말이야!?"

[[dialogue]]
speaker = "蘭美"
original = "「だけど、味はその分だけ凄いって、この私が保証するわよ。期待しておきなさい♪」"
translation = "「하지만 맛은 그만큼 굉장하다고 이 내가 보증할게. 기대하고 있어♪」"

[[dialogue]]
speaker = "せつな"
original = "「あの、蘭美殿」"
translation = "「저기, 라비 공」"

[[dialogue]]
speaker = "蘭美"
original = "「ん？\u3000せつな、どうかした？」"
translation = "「응? 세츠나, 왜 그래?」"

[[dialogue]]
speaker = "せつな"
original = "「蘭美殿にも、こちら……どうか受け取って欲しいでござる！」"
translation = "「라비 공께도 이것을…… 부디 받아주셨으면 하오!」"

[[dialogue]]
speaker = "蘭美"
original = "「え？\u3000これ、バレンタインチョコ？\u3000私に？」"
translation = "「에? 이거 밸런타인 초코? 나한테?」"

[[dialogue]]
speaker = "せつな"
original = "「蘭美殿には今回、大変お世話になりました。せつなにとって、どれだけお礼を言っても足らないと思う程に。なので……」"
translation = "「라비 공께는 이번에 큰 신세를 졌소. 세츠나에게 있어 아무리 감사를 표해도 부족할 정도로. 그래서……」"

[[dialogue]]
speaker = "せつな"
original = "「せつな、昨日最後に倒したゴーレムの素材をこっそり分けて取っておいたのでござる！」"
translation = "「세츠나, 어제 마지막으로 쓰러뜨린 골렘 소재를 몰래 조금 떼어 보관해 두었소!」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふっ、最強の義理チョコというわけね♪\u3000ありがとう、せつな」"
translation = "「후후, 최강의 의리 초코라는 거네♪ 고마워, 세츠나」"

[[dialogue]]
speaker = "蘭美"
original = "「全く、この私より速くサプライズを仕掛けてくるなんて、大したものだわ」"
translation = "「참 나, 이 나보다 빠르게 서프라이즈를 걸어오다니 제법인걸」"

[[dialogue]]
speaker = "蘭美"
original = "「はい、せつな。お返しに、私からも義理チョコよ」"
translation = "「자, 세츠나. 답례로 나도 의리 초코야」"

[[dialogue]]
speaker = "せつな"
original = "「え？\u3000蘭美殿も、せつなに用意しておいてくれたのでござるか！？」"
translation = "「엣? 라비 공도 세츠나를 위해 준비해 주셨소!?」"

[[dialogue]]
speaker = "蘭美"
original = "「今回頑張ったご褒美に、特別にね。メイド長としての、飴と鞭というやつよ」"
translation = "「이번에 노력한 보상으로 특별히 주는 거야. 메이드장으로서의 병 주고 약 주고라는 거지」"

[[dialogue]]
speaker = "蘭美"
original = "「光栄に思って、受け取りなさい♪」"
translation = "「영광으로 생각하고 받도록 해♪」"

[[dialogue]]
speaker = "せつな"
original = "「ありがとうございまする！\u3000えへへ♪」"
translation = "「고맙소! 에헤헤♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふんっ♪」"
translation = "「후훙♪」"

[[dialogue]]
speaker = "unk"
original = "２人は顔を見合わせて、ちょっと照れ臭そうに笑い合うのだった――"
translation = "두 사람은 서로 얼굴을 마주 보며 조금 쑥스러운 듯이 웃었다──"

