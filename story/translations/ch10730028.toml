[[dialogue]]
speaker = "リノ"
original = "「んああぁっ<emoji=heart04>\u3000乳首感じちゃうっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아<emoji=heart04> 유두 느껴버려<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> 후아아<emoji=heart04> 응응우우<emoji=heart04><emoji=heart04>」"

[[dialogue]]
