original = "（すごく気持ち良くて<emoji=heart04>\u3000頭の中、幸せでいっぱいになっちゃうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>）"
translation = "(너무 기분 좋아서<emoji=heart04> 머릿속이 행복으로 가득 차버려어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응아아앙<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "そのまま今度はクロトの両手に、おっぱいを鷲掴みにされる。"
