[[dialogue]]
speaker = "リノ"
original = "「んっ<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000そんな……あっ<emoji=heart04>\u3000乳首、コリコリされたら感じちゃうわ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ……はああぁんっ<emoji=heart04>」"
