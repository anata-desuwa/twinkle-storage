translation = "「아아<emoji=heart04><emoji=heart04> 하아아<emoji=heart04> 후아아～～윽<emoji=heart04><emoji=heart04> 대단해! 가득 사정당해서 안이 뜨거워……!」"

[[dialogue]]
speaker = "リノ"
original = "「あっ……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000んふう……<emoji=heart04>\u3000すごい……まだ出てるぅ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 하아아<emoji=heart04> 응후우……<emoji=heart04> 굉장해…… 아직 나오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――やがて射精が止まり、私は腰を上げて、ゆっくりとおち○ちんを引き抜く。"
translation = "――이윽고 사정이 멈추고, 나는 허리를 들어 천천히 자지를 뽑아낸다."

[[dialogue]]
speaker = "リノ"
original = "「ん……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「ついに……クロトとしちゃった……<emoji=heart04>」"
translation = "「드디어…… 쿠로토랑 해버렸네……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「こんなにいっぱい、中に出されちゃって……」"
translation = "「이렇게나 가득 안에 내보내 버려서……」"

[[dialogue]]
speaker = "unk"
original = "一線超えて、心を決めていてもやはり、すごい背徳感に襲われてしまう。"
translation = "선을 넘고 마음을 굳혔음에도 역시 엄청난 배덕감이 엄습한다."

[[dialogue]]
speaker = "unk"
original = "しかし、それと同時に最愛の男の子と結ばれたという、この上ない多幸感もあって。"
translation = "하지만 그와 동시에 가장 사랑하는 아이와 맺어졌다는 더할 나위 없는 다행감도 있어서."

[[dialogue]]
speaker = "クロト"
original = "「母さん」"
translation = "「엄마」"

[[dialogue]]
speaker = "リノ"
original = "「ん……」"
translation = "「응……」"

[[dialogue]]
speaker = "unk"
original = "事後の余韻にふけりながら、呼ばれて顔を上げる。"
translation = "사후의 여운에 잠겨 있다가, 부르는 소리에 고개를 든다."

[[dialogue]]
speaker = "クロト"
original = "「俺、母さんのことを大切にするし、何より幸せにするから」"
translation = "「나, 엄마를 소중히 할 거고 무엇보다 행복하게 해줄게」"

[[dialogue]]
speaker = "リノ"
original = "「クロト……」"
translation = "「쿠로토……」"

[[dialogue]]
speaker = "unk"
original = "そんな風に言われてしまえば、幸せな気持ちの方が勝ってしまう。"
translation = "그런 말을 들으면 행복한 기분이 이겨버린다."

[[dialogue]]
speaker = "リノ"
original = "「それなら……お母さんも一緒に、クロトのことを幸せにしないとね……<emoji=heart04>」"
translation = "「그렇다면…… 엄마도 함께 쿠로토를 행복하게 해줘야겠네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私はそう言って、クロトのおち○ちんに触れる。"
translation = "나는 그렇게 말하며 쿠로토의 자지에 손을 댄다."

[[dialogue]]
speaker = "unk"
original = "それは先程あんなにもすごい量を射精したばかりだというのに、まだ固く大きいままで。"
translation = "그것은 방금 그렇게나 엄청난 양을 사정했음에도 불구하고 아직 단단하고 큰 채로 있어서."

[[dialogue]]
speaker = "リノ"
original = "「もう１回……する？」"
translation = "「한 번 더…… 할까?」"

[[dialogue]]
speaker = "クロト"
original = "「うん……母さんともっと、愛し合いたい」"
translation = "「응…… 엄마랑 더 사랑을 나누고 싶어」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、じゃあ――」"
translation = "「후후, 그럼――」"

[[dialogue]]
speaker = "リノ"
original = "「孕んじゃうくらい、お母さんの中にいっぱい出していいからね？」"
translation = "「임신할 정도로 엄마 안에 가득 내보내도 되니까, 알았지?」"

[[dialogue]]
speaker = "リノ"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "世界一愛おしい顔にキスをして、再び幸せを求め交わってしまうのだった――"
translation = "세상에서 가장 사랑스러운 얼굴에 키스를 하고, 다시 행복을 구하며 섞이는 것이었다――"

