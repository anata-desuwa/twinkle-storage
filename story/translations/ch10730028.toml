[[dialogue]]
speaker = "リノ"
original = "（あれから月日が経って）"
translation = "(그로부터 세월이 흘러)"

[[dialogue]]
speaker = "リノ"
original = "（私はクロトと『恋人』として、少しずつ関係性を積み重ねていた）"
translation = "(나는 쿠로토와 『연인』으로서, 조금씩 관계를 쌓아 올리고 있었다)"

[[dialogue]]
speaker = "リノ"
original = "（そして、ついにその日はやって来て――）"
translation = "(그리고, 마침내 그날이 찾아왔고――)"

[[dialogue]]
speaker = "リノ"
original = "「あっ……<emoji=heart04>\u3000クロト……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 쿠로토……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "場所は、リゾート結界のプライベートビーチ。"
translation = "장소는 리조트 결계의 프라이빗 비치."

[[dialogue]]
speaker = "unk"
original = "彼に肩を抱き寄せられ、唇同士が触れる。"
translation = "그에게 어깨를 끌어안겨, 입술끼리 맞닿는다."

[[dialogue]]
speaker = "リノ"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、舌も絡め合って、大人のキスをする。"
translation = "그리고, 혀도 서로 얽으며 어른의 키스를 한다."

[[dialogue]]
speaker = "リノ"
original = "「ちゅむっ……んちゅっ<emoji=heart04>\u3000れろちゅっ……ちゅうぅっ<emoji=heart04>\u3000ちゅれるっ……ちゅぱっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「츄무…… 응츄<emoji=heart04> 레로츄…… 츄우우<emoji=heart04> 츄레루…… 츄파<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛する男性であると同時に、大切な息子でもある存在。そんな彼とのキスは、背徳感――禁断の蜜の味がして、背筋がゾクゾクとして、昂ってしまう。"
translation = "사랑하는 남성인 동시에, 소중한 아들이기도 한 존재. 그런 그와의 키스는 배덕감――금단의 꿀맛이 나서, 등줄기가 오싹오싹하고 달아올라 버린다."

[[dialogue]]
speaker = "クロト"
original = "「約束してた通り、今日――」"
translation = "「약속했던 대로, 오늘――」"

[[dialogue]]
speaker = "クロト"
original = "「母さんを抱くよ」"
translation = "「엄마를 안을게」"

[[dialogue]]
speaker = "unk"
original = "１週間前に約束を交わして、迎えた今日。"
translation = "일주일 전에 약속을 나누고 맞이한 오늘."

[[dialogue]]
speaker = "リノ"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ドキドキと胸を高鳴らせながらも心の準備をして来ていた私は、頷く。"
translation = "두근두근 가슴을 설레면서도 마음의 준비를 해왔던 나는 고개를 끄덕인다."

[[dialogue]]
speaker = "リノ"
original = "「……ねぇ、ワガママを言ってもいい？」"
translation = "「……있지, 이기적인 부탁을 해도 될까?」"

[[dialogue]]
speaker = "リノ"
original = "「してる最中、なんだけど……今まで通り『母さん』って呼んで欲しいんだけど……ダメ？」"
translation = "「하고 있는 도중에는, 그래도…… 지금까지처럼 『엄마』라고 불러줬으면 좋겠는데…… 안 돼?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん」"
translation = "「물론이지」"

[[dialogue]]
speaker = "クロト"
original = "「前に言った通り、俺にとって母さんは……世界で一番大切な恋人で、同時に母親なんだから」"
translation = "「전에 말했듯이, 나한테 엄마는…… 세상에서 가장 소중한 연인이자, 동시에 어머니니까」"

[[dialogue]]
speaker = "リノ"
original = "「……っ<emoji=heart04><emoji=heart04>」"
translation = "「……윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛する息子兼大好きな恋人からそんな風にはっきり言ってもらえて、私の背筋は悦びでゾクゾクと震えてしまうのだった。"
translation = "사랑하는 아들 겸 좋아하는 연인으로부터 그런 말을 분명하게 듣자, 나의 등줄기는 환희로 오싹오싹 떨려 버리는 것이었다."

[[dialogue]]
speaker = "unk"
original = "そうして、日が落ちる中、私たちは水上コテージに移動して――"
translation = "그렇게 해가 지는 가운데, 우리는 수상 코테지로 이동해서――"

[[dialogue]]
speaker = "unk"
original = "ベッドの上で、男女として向かい合う。"
translation = "침대 위에서 남녀로서 마주 본다."

[[dialogue]]
speaker = "クロト"
original = "「母さんの裸……綺麗だ」"
translation = "「엄마의 알몸…… 예쁘다」"

[[dialogue]]
speaker = "リノ"
original = "「ん……ありがと。クロトも立派よ。こんなに大きく、逞しくなって……」"
translation = "「응…… 고마워. 쿠로토도 훌륭해. 이렇게 크고 늠름해져서……」"

[[dialogue]]
speaker = "リノ"
original = "「体も……その、おち○ちんも……<emoji=heart04>」"
translation = "「몸도…… 그, 자지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼の立派にそそり立つそれは、夢の中よりも大きい気がする。"
translation = "그의 훌륭하게 솟아오른 그것은 꿈속에서보다 더 큰 기분이 든다."

[[dialogue]]
speaker = "クロト"
original = "「今日の為に、我慢してたから……」"
translation = "「오늘을 위해서 참았으니까……」"

[[dialogue]]
speaker = "リノ"
original = "「えっ、そうなの……？」"
translation = "「엣, 그랬니……?」"

[[dialogue]]
speaker = "リノ"
original = "（わ、私は今日のことを想像して、毎日みたいにオナニーしちゃってたなんて、恥ずかしくて言えないわ……）"
translation = "(나, 나는 오늘 일을 상상하며 매일같이 자위를 해버렸다는 건 부끄러워서 말 못 해……)"

[[dialogue]]
speaker = "リノ"
original = "「じ、じゃあ、私も頑張らないとね……！\u3000待ってて。年上として、私がリードするから……」"
translation = "「자, 자아, 나도 힘내야겠네……! 기다려. 연상으로서 내가 리드할 테니까……」"

[[dialogue]]
speaker = "unk"
original = "私は恥ずかしさを誤魔化すように手を伸ばして、クロトの大きなおち○ちんに触れる。"
translation = "나는 부끄러움을 속이듯 손을 뻗어 쿠로토의 커다란 자지에 손을 댄다."

[[dialogue]]
speaker = "リノ"
original = "（はあぁっ<emoji=heart04>\u3000すごく固くて、熱い……<emoji=heart04>\u3000夢で見たから知ってたけど、すごい存在感……<emoji=heart04>）"
translation = "(하아아<emoji=heart04> 정말 단단하고 뜨거워……<emoji=heart04> 꿈에서 봐서 알고 있었지만 대단한 존재감……<emoji=heart04>)"

[[dialogue]]
speaker = "リノ"
original = "（これが<b>あの時</b>みたいに、また私の中に入っちゃうのね……<emoji=heart04>）"
translation = "(이게 **그때**처럼 다시 내 안으로 들어오는 거네……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "以前、夢の中で味わった快楽を思い出して、おま○こがキュンと疼いてしまう。"
translation = "이전 꿈속에서 맛보았던 쾌락을 떠올리며 보지가 큥 하고 욱신거려 버린다."

[[dialogue]]
speaker = "unk"
original = "それから、愛液が溢れて既に濡れ濡れになってしまっているアソコを、おち○ちんに擦り付けて行く。"
translation = "그리고 애액이 넘쳐 이미 젖을 대로 젖어버린 거기를 자지에 문질러 간다."

[[dialogue]]
speaker = "リノ"
original = "「んっ……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000ふうぅ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아<emoji=heart04> 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「母さんのあそこ、すごい濡れてる……」"
translation = "「엄마의 거기, 엄청 젖어있어……」"

[[dialogue]]
speaker = "リノ"
original = "「それは……あんっ<emoji=heart04>\u3000夢でした時のことを思い出しちゃって……<emoji=heart04>」"
translation = "「그건…… 앙<emoji=heart04> 꿈에서 했을 때의 일이 생각나 버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「これくらいヌルヌルなら、もう大丈夫かしら……？」"
translation = "「이 정도로 미끈거린다면 이제 괜찮을까……?」"

[[dialogue]]
speaker = "リノ"
original = "「それじゃあ、挿れちゃうわね……」"
translation = "「그럼, 삽입할게……」"

[[dialogue]]
speaker = "unk"
original = "私はおち○ちんの先っぽを、膣穴にあてがう。"
translation = "나는 자지 끝부분을 질 구멍에 갖다 댄다."

[[dialogue]]
speaker = "リノ"
original = "（ああ……本物の息子のように思って育ててきた男の子と、ついに一線を越えちゃうっ……<emoji=heart04>）"
translation = "(아아…… 친아들처럼 생각하며 키워온 아이와 마침내 선을 넘어버려……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "どうしようもない背徳感と、ドキドキが湧き上がって来るのを覚えながら、覚悟を決めて腰を下ろすと――"
translation = "어쩔 수 없는 배덕감과 두근거림이 솟구치는 것을 느끼며, 각오를 다지고 허리를 내리자――"

[[dialogue]]
speaker = "リノ"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「んっ<emoji=heart04><emoji=heart04>\u3000ふああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응윽<emoji=heart04><emoji=heart04> 후아아아아아～～～～～～윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "処女膜が破れるのと同時に、頭の中を電流のような刺激が駆け抜けた。"
translation = "처녀막이 파열됨과 동시에 머릿속에 전류 같은 자극이 스쳐 지나갔다."

[[dialogue]]
speaker = "リノ"
original = "「こ、これ、嘘っ……！？\u3000はあぁっ……<emoji=heart04><emoji=heart04>」"
translation = "「이, 이거, 거짓말……!? 하아아……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「母さん、大丈夫……！？」"
translation = "「엄마, 괜찮아……!?」"

[[dialogue]]
speaker = "リノ"
original = "「え、ええ。大丈夫よ……<emoji=heart04>\u3000ちょっと、驚いちゃっただけだから……<emoji=heart04>」"
translation = "「으, 응. 괜찮아……<emoji=heart04> 조금 놀랐을 뿐이니까……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "（エッチってそういうものなの……？\u3000それとも、クロトが魔王だから……？）"
translation = "(섹스란 건 원래 이런 걸까……? 아니면 쿠로토가 마왕이라서……?)"

[[dialogue]]
speaker = "unk"
original = "初めてだから、何が正しいのか分からない。でも――"
translation = "처음이라 무엇이 정답인지 알 수 없다. 하지만――"

[[dialogue]]
speaker = "リノ"
original = "（初めてなのに、おま○こが痛いよりも気持ちいいっ……<emoji=heart04>）"
translation = "(처음인데도 보지가 아프기보다 기분 좋아……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "破瓜の痛み以上に、ゾクゾクと膣から快感が湧き上がって来ていた。"
translation = "파과의 통증 이상으로 오싹오싹하게 질에서 쾌감이 솟아오르고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「っ……母さんの中、気持ちいいっ……」"
translation = "「윽…… 엄마의 안, 기분 좋아……」"

[[dialogue]]
speaker = "リノ"
original = "（そんな可愛く感じてる顔をされたら……私も興奮してきちゃう<emoji=heart04>）"
translation = "(그렇게 귀엽게 느끼고 있는 얼굴을 보니까…… 나도 흥분돼버려<emoji=heart04>)"

[[dialogue]]
speaker = "リノ"
original = "「腰、動かすわね……<emoji=heart04>\u3000んっ――<emoji=heart04><emoji=heart04>」"
translation = "「허리, 움직일게……<emoji=heart04> 응――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「あっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아아～윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ……んふぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우우<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아<emoji=heart04> 응우우…… 응후<emoji=heart04> 앗<emoji=heart04> 후아아<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「ふあぁっ<emoji=heart04>\u3000おち○ちん、すごいっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「후아아<emoji=heart04> 자지, 굉장해<emoji=heart04> 하아아<emoji=heart04> 응아아<emoji=heart04> 응우우<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「こ、こんなっ<emoji=heart04>\u3000こんな気持ちいいなんてぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「이, 이정도로<emoji=heart04> 이렇게 기분 좋다니이<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「初めてなのに、腰止まらなくなっちゃうっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「처음인데 허리가 멈추지 않아버려<emoji=heart04> 응<emoji=heart04> 하아아<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も気持ちいいっ！\u3000母さんっ……！」"
translation = "「나도 기분 좋아! 엄마……!」"

[[dialogue]]
speaker = "リノ"
original = "「あっ<emoji=heart04>\u3000――んむぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> ――응무윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クロトに唇を奪われる。"
translation = "쿠로토에게 입술을 빼앗긴다."

[[dialogue]]
speaker = "リノ"
original = "「ちゅっ<emoji=heart04>\u3000ちゅむっ<emoji=heart04>\u3000ちゅぱっ……んちゅっ<emoji=heart04>\u3000ちゅむるっ……ちゅぷぷっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 츄무<emoji=heart04> 츄파…… 응츄<emoji=heart04> 츄무루…… 츄푸푸<emoji=heart04> 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「んちゅっ……ちゅぱっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000舌、気持ちいい<emoji=heart04>\u3000ちゅうっ……ちゅぷっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000んむぅっ……れるれるっ<emoji=heart04>\u3000ちゅむぅっ<emoji=heart04>」"
translation = "「응츄…… 츄파<emoji=heart04> 하아아<emoji=heart04> 혀, 기분 좋아<emoji=heart04> 츄우…… 츄푸<emoji=heart04> 츄레루<emoji=heart04> 응무우…… 레루레루<emoji=heart04> 츄무우<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「母さん、好きだ……！」"
translation = "「엄마, 좋아해……!」"

[[dialogue]]
speaker = "リノ"
original = "「～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「～～～윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「愛してるっ。好きだよ、母さんっ……！」"
translation = "「사랑해. 좋아해요, 엄마……!」"

[[dialogue]]
speaker = "リノ"
original = "「――はあぁっ<emoji=heart04>\u3000ふうぅ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000わ、私も……！」"
translation = "「――하아아<emoji=heart04> 후우우<emoji=heart04> 응후<emoji=heart04> 나, 나도……!」"

[[dialogue]]
speaker = "リノ"
original = "「私も、愛してるわ<emoji=heart04>\u3000あなたのことが好きよ<emoji=heart04>」"
translation = "「나도 사랑한단다<emoji=heart04> 너를 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
