translation = "(유두가 빨리고 있으니까 더 행복한 기분이 되어버려<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "私は妊娠経験どころか、今日まで処女だったので、母乳は出ない。"
translation = "나는 임신 경험은커녕 오늘까지 처녀였기에 모유는 나오지 않는다."

[[dialogue]]
speaker = "unk"
original = "それにクロトも、世界樹から連れ出した時点で既に赤ん坊ではなかったから、哺乳瓶を使ったこともなかった。"
translation = "게다가 쿠로토도 세계수에서 데려왔을 시점에 이미 아기가 아니었기에 젖병을 사용한 적도 없었다."

[[dialogue]]
speaker = "unk"
original = "だからこそ、おっぱいを吸われている今、どうしようもない背徳感と多幸感を覚えて、興奮が高まってきてしまう。"
translation = "그렇기에 가슴을 빨리고 있는 지금, 어쩔 수 없는 배덕감과 다행감을 느끼며 흥분이 고조되어 버린다."

[[dialogue]]
speaker = "クロト"
original = "「っ……母さんっ！」"
translation = "「윽…… 엄마!」"

[[dialogue]]
speaker = "リノ"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それはクロトも同じようで、腰を動かし、力強く突き上げて来る。"
translation = "그것은 쿠로토도 마찬가지인 듯 허리를 움직여 힘차게 치올려 온다."

[[dialogue]]
speaker = "クロト"
original = "「母さん！\u3000母さんっ！」"
translation = "「엄마! 엄마!」"

[[dialogue]]
speaker = "リノ"
original = "「はあああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はぁうっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아～～～윽<emoji=heart04><emoji=heart04> 응우우<emoji=heart04> 후아아<emoji=heart04> 하우윽<emoji=heart04> 하아아아<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クロトから呼ばれる度に、背徳感と共にとてつもない快感が体を駆け上がって来る。"
