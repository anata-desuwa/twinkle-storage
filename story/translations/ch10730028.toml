[[dialogue]]
speaker = "unk"
original = "今日は危険日ではないことを分かった上で初夜に臨んでいるわけだし、これは１つのプレイだ。"
translation = "오늘은 위험일이 아니라는 것을 알고 첫날밤에 임한 것이고, 이것은 하나의 플레이였다."

[[dialogue]]
speaker = "unk"
