[[dialogue]]
speaker = "マトイ"
original = "「はぅぅ……こんな恥ずかしいの初めて……なんだから。会長の……ばかっ<emoji=heart04>」"
translation = "「하으으…… 이렇게 부끄러운 거 처음……이라니까. 회장…… 바보っ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でも、可愛かったよ」"
translation = "「하지만, 귀여웠어.」"

[[dialogue]]
speaker = "マトイ"
original = "「……そ、そんなこと言われても、こんなの今日だけなんだからねっ」"
translation = "「……그, 그런 소릴 들어도, 이런 건 오늘뿐인 거니까 말야っ」"

[[dialogue]]
speaker = "マトイ"
original = "「こんな……外で、しかもおもらしまでしちゃって……変態すぎるよ」"
translation = "「이런…… 밖에서, 게다가 오줌까지 싸버리고…… 너무 변태 같아.」"

[[dialogue]]
speaker = "クロト"
original = "「……じゃあ、今日はいいんだ」"
translation = "「……그럼, 오늘은 괜찮은 거네.」"

[[dialogue]]
speaker = "マトイ"
original = "「それは……まぁ、せっかくだし……。こんな機会、滅多にないし……気持ちよかったし……」"
translation = "「그건…… 뭐, 모처럼이고……. 이런 기회, 좀처럼 없기도 하고…… 기분 좋았고……」"

[[dialogue]]
speaker = "マトイ"
original = "「……うぅ……わかった……わかったから！」"
translation = "「……으으…… 알았어…… 알았다니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「でも……本当に、今日だけなんだからね。こんなの毎回やったら……バカになっちゃうもん」"
translation = "「하지만…… 정말로, 오늘뿐인 거니까 말야. 이런 거 매번 하면…… 바보가 돼버린단 말야.」"

[[dialogue]]
speaker = "マトイ"
original = "「まったく……会長ってば、本当にエッチなんだから」"
translation = "「정말이지…… 회장도 참, 정말 야하다니까.」"

[[dialogue]]
speaker = "マトイ"
original = "「うっ……まぁ……。認めたくないけど、たしかに私もエッチだ……」"
translation = "「윽…… 뭐…… 인정하고 싶지 않지만, 확실히 나도 야해……」"

[[dialogue]]
speaker = "マトイ"
original = "「だ、だって私、今……会長にまだまだいっぱい犯されるの、期待しちゃってるもん……あんっ<emoji=heart04>」"
translation = "「그, 그치만 나, 지금…… 회장에게 아직 더 잔뜩 범해지는 거, 기대해버리고 있는걸…… 앙っ<emoji=heart04>」"

