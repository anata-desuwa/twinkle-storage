[[dialogue]]
speaker = "マトイ"
original = "「うわぁ……海、すっごいねぇ。リップルが二人で使ってください、なんて言ってたけど本当にいいのかな？」"
translation = "「우와아…… 바다, 정말 굉장하네. 리플이 둘이서 쓰라고 말하긴 했지만 정말 괜찮은 걸까?」"

[[dialogue]]
speaker = "unk"
original = "リップルは自分のリゾート結界を空間ごとコピーできるらしく、ここは彼女が「海の家」を切り盛りしている浜辺とは別の、完全なプライベートビーチだった。"
translation = "리플은 자신의 리조트 결계를 공간째 복사할 수 있는 모양인지, 이곳은 그녀가 「바다의 집」을 꾸려나가고 있는 해변과는 별개인, 완전한 프라이빗 비치였다."

[[dialogue]]
speaker = "クロト"
original = "「いいんじゃないか？\u3000リップルも例の件で、お世話になったお礼がしたいって言ってたし」"
translation = "「괜찮지 않아? 리플도 그 사건 건으로 신세 진 보답을 하고 싶다고 했으니까.」"

[[dialogue]]
speaker = "unk"
original = "リップルの結界に閉じ込められてしまうというあの夏の事件の後──"
translation = "리플의 결계에 갇혀버렸던 그 여름 사건 이후──"

[[dialogue]]
speaker = "unk"
original = "カップルになりたてのマトイと俺に、まだ夏休みの思い出がないと知ったリップルが、このビーチを１日貸し切りにしてくれたのだ。"
translation = "막 커플이 된 마토이와 나에게 아직 여름휴가의 추억이 없다는 걸 안 리플이, 이 비치를 하루 대여해 준 것이다."

[[dialogue]]
speaker = "マトイ"
original = "「それなら、まぁ……今日は楽しんじゃいますか♪\u3000……って、わぁ！？」"
translation = "「그렇다면, 뭐…… 오늘은 즐겨볼까요♪ ……어라, 와앗!?」"

[[dialogue]]
speaker = "マトイ"
original = "「も、もう……っ<emoji=heart04>\u3000急に後ろから抱き着くなんて、危ないでしょ……？」"
translation = "「정, 정말……っ<emoji=heart04> 갑자기 뒤에서 껴안다니, 위험하잖아……?」"

[[dialogue]]
speaker = "マトイ"
original = "「う～……それはまぁ、嬉しい……けどぉ……。なんでそれを言っちゃうかなぁ」"
translation = "「으~…… 그건 뭐, 기쁘긴…… 하지만~……. 왜 그걸 입 밖으로 내는 걸까나.」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、それになんか、お尻に当たってるんですけどぉ……<emoji=heart04>」"
translation = "「그, 그리고 왠지, 엉덩이에 닿고 있는데요오……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「……はぁ。ここって、本当に人、来ないんだよね。……だったら、まぁいいかな」"
translation = "「……하아. 여기는 정말 사람, 안 오는 거지. ……그렇다면, 뭐 괜찮으려나.」"

[[dialogue]]
speaker = "マトイ"
original = "「今回だけ……なんだからね？<emoji=heart04>」"
translation = "「이번뿐……이니까 말야?<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んぅぅ……えっと、本気でこの場所のまま……するの？」"
translation = "「응으으…… 저기, 진심으로 이 장소 그대로…… 하는 거야?」"

[[dialogue]]
speaker = "マトイ"
original = "「誰も入ってこれないとは言え……見晴らしのいいリゾートビーチの浜辺……なんだよ？」"
translation = "「아무도 들어올 수 없다고는 해도…… 전망 좋은 리조트 비치의 해변……이라구?」"

[[dialogue]]
speaker = "マトイ"
original = "「ひゃぅぅ……まさかこんなところで、エッチな恰好……しちゃうなんて……うわぁ、なんかどんどん恥ずかしくなってきたっ」"
translation = "「히야으으…… 설마 이런 곳에서, 야한 차림으로…… 해버리다니…… 우와아, 왠지 점점 부끄러워지기 시작했어.」"

[[dialogue]]
speaker = "マトイ"
original = "「ひゃんっ<emoji=heart04>\u3000こ、こらぁ……っ、なに触って……んっ<emoji=heart04>」"
translation = "「히얀っ<emoji=heart04> 이, 이봐요……っ, 어딜 만지는…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「え……ウソ、もう濡れて……？\u3000はぁ……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あ、えぇ……エッチとか、言わないでよぉ……んっ<emoji=heart04>」"
translation = "「에…… 거짓말, 벌써 젖어……? 하아……っ<emoji=heart04> 앙っ<emoji=heart04> 아, 에에…… 변태라고, 말하지 마아…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長のせいじゃん……っ<emoji=heart04>\u3000会長のせいで……エッチになっちゃっただけっ<emoji=heart04>\u3000私、悪くないもん……っ<emoji=heart04>」"
translation = "「회장 때문이잖아……っ<emoji=heart04> 회장 때문에…… 야하게 되어버린 것뿐이라구っ<emoji=heart04> 나, 잘못 없단 말야……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「そりゃ、私だって、期待してなかったわけじゃ、ないけど……っ<emoji=heart04>」"
translation = "「그야, 나라고 해서 기대하지 않았던 건, 아니지만……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「……だから、その、バカンスエッチ<emoji=heart04>\u3000……あぁ、言っちゃったぁ<emoji=heart04>」"
translation = "「……그러니까, 그, 바캉스 섹스<emoji=heart04> ……아아, 말해버렸다아<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「だけど、まさかお昼からなんて、思ってもなかったと、いうかぁ……っ<emoji=heart04>\u3000あん<emoji=heart04>\u3000はぁ……っ<emoji=heart04>」"
translation = "「하지만, 설마 낮부터일 줄은 생각지도 못했다고나 할까아……っ<emoji=heart04> 앙<emoji=heart04> 하아……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長、待って……ぅっ<emoji=heart04>\u3000お、おま○こ……<emoji=heart04>\u3000そんなに優しく、触ったら、私……っ<emoji=heart04>」"
translation = "「회장, 잠깐만…… 윽<emoji=heart04> 보, 보지……<emoji=heart04> 그렇게 상냥하게 만지면, 나……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「だから……ね<emoji=heart04>\u3000……うぅ～、わかってよぉ、バカぁ<emoji=heart04>\u3000こっちはもう、準備できてるの……」"
translation = "「그러니까…… 응?<emoji=heart04> ……으으~, 알아달라구, 바보야<emoji=heart04> 이쪽은 벌써, 준비 다 됐단 말야……」"

[[dialogue]]
speaker = "マトイ"
original = "「会長だって……我慢、できないでしょ？」"
translation = "「회장도…… 참을 수, 없지?」"

[[dialogue]]
speaker = "マトイ"
original = "「こんなに、すりすりして……おち○ちん<emoji=heart04>\u3000早く挿れたい挿れたいって、言ってるじゃん……」"
translation = "「이렇게, 비벼대면서…… 자지<emoji=heart04> 빨리 삽입하고 싶어 삽입하고 싶어라고, 말하고 있잖아……」"

[[dialogue]]
speaker = "マトイ"
original = "「だから……ね？\u3000私のお……おま○この中に、お願い……っ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>」"
translation = "「그러니까…… 응? 내 보…… 보지 속에, 부탁해……っ<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長のおち○ちん<emoji=heart04>\u3000早く……っ<emoji=heart04>\u3000私の中にちょうだい……っ<emoji=heart04>」"
translation = "「회장의 자지<emoji=heart04> 빨리……っ<emoji=heart04> 내 안에 줘……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あ……っ<emoji=heart04>\u3000会長のおち○ちん……<emoji=heart04>\u3000入って……っ<emoji=heart04>\u3000きた……っ<emoji=heart04>」"
translation = "「아……っ<emoji=heart04> 회장의 자지……<emoji=heart04> 들어……っ 왔어……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あぁ……っ<emoji=heart04>\u3000っ、はぁ……っ<emoji=heart04>\u3000入口、広がって……っ<emoji=heart04>\u3000大きいの、ぐいって……っ<emoji=heart04>」"
translation = "「아아……っ<emoji=heart04> っ, 하아……っ<emoji=heart04> 입구, 벌어져서……っ<emoji=heart04> 커다란 게, 쑥 하고……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ<emoji=heart04>\u3000はぁっ、あんっ<emoji=heart04>\u3000やば……っ、声、出ちゃ……っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앗, 앙っ<emoji=heart04> 위험해……っ, 목소리, 나와버렷……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「『誰もいないから、我慢しなくてもいい』って……んぁっ<emoji=heart04>\u3000会長が、いるでしょぉっ<emoji=heart04>」"
translation = "「『아무도 없으니까, 참지 않아도 돼』라니…… 응앗<emoji=heart04> 회장이, 있잖아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ほかの人に、聞かれるよりも……っ<emoji=heart04>\u3000会長に聞かれる方が……っ、恥ずかしいん、だからぁ<emoji=heart04>\u3000……っ、あ……っ<emoji=heart04>」"
translation = "「다른 사람에게 들리는 것보다……っ 회장에게 들리는 게……っ, 더 부끄러운 거니까아<emoji=heart04> ……っ, 아……っ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……でも、マトイのエッチな声、聞きたい」"
translation = "「……하지만, 마토이의 야한 목소리, 듣고 싶어.」"

[[dialogue]]
speaker = "マトイ"
original = "「うぅ……っ<emoji=heart04>\u3000そんなお願い……ずるいってば……っ<emoji=heart04>\u3000あ……あんっ<emoji=heart04>\u3000はぁ……っ<emoji=heart04>」"
translation = "「으으……っ<emoji=heart04> 그런 부탁…… 치사하다니까……っ<emoji=heart04> 아…… 앙っ<emoji=heart04> 하아……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んはぁっ<emoji=heart04>\u3000あ……っ<emoji=heart04>\u3000わ、分かった。分かったわよぅ……っ<emoji=heart04>\u3000だから、そんな抱きしめないで……っ<emoji=heart04>」"
translation = "「응하앗<emoji=heart04> 아……っ<emoji=heart04> 아, 알았어. 알았다니까아……っ<emoji=heart04> 그러니까, 그렇게 껴안지 마……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「なんか、ぎゅってされるたび、はぁぁん……<emoji=heart04>\u3000お腹の奥……キュンキュンって、しちゃうからぁ……っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「왠지, 꽉 안길 때마다, 하아앙……<emoji=heart04> 배 속 깊은 곳이…… 큥큥거려 버리니까아……っ<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「エッチな声……出す、からぁっ<emoji=heart04>\u3000会長の言うとおりに、あんっ……するからっ<emoji=heart04>\u3000ね……っ<emoji=heart04>」"
translation = "「야한 목소리…… 낼 테니까앗<emoji=heart04> 회장이 말하는 대로, 앙っ…… 할 테니까っ<emoji=heart04> 응……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁ……っ、あ<emoji=heart04>\u3000今……会長のおち○ちん、私のおま○この中で、すっごく大きくなって……っ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「하아……っ, 아<emoji=heart04> 지금…… 회장의 자지, 내 보지 속에서, 엄청 커져서……っ<emoji=heart04> 하아앙っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「おま○この中、ズポズポって、されるだけでぇ……っ<emoji=heart04>\u3000ふぅぅん<emoji=heart04>\u3000はぁぁっ……私、会長のことしか、あんっ……考えられなくなっちゃうっ<emoji=heart04>」"
translation = "「보지 속을, 즈포즈포하고, 당하는 것만으로오……っ<emoji=heart04> 후으으응<emoji=heart04> 하아앗…… 나, 회장 생각밖에, 앙っ…… 할 수 없게 돼버려っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長とのエッチで、あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000……頭の中いっぱいに、なっちゃうのっ<emoji=heart04>\u3000おち○ちん……あんっ<emoji=heart04>\u3000いっぱい欲しく、なっちゃうのっ<emoji=heart04>\u3000あふぅ……<emoji=heart04>」"
translation = "「회장과의 섹스로, 앗<emoji=heart04> 앗<emoji=heart04> ……머릿속이 가득 차버려っ<emoji=heart04> 자지…… 앙っ<emoji=heart04> 잔뜩 갖고 싶어지게 돼버려っ<emoji=heart04> 아후으……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あんっ<emoji=heart04>\u3000あはぁっ<emoji=heart04>\u3000会長のおち○ちん、大きくなってるの、わかる……っ<emoji=heart04>」"
translation = "「앙っ<emoji=heart04> 아하앗<emoji=heart04> 회장의 자지, 커지고 있는 거, 느껴져……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「私のエッチな声、興奮してくれてるの……？<emoji=heart04>\u3000それなら、嬉しいなっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>」"
translation = "「내 야한 목소리에, 흥분해 주는 거야……?<emoji=heart04> 그렇다면, 기쁘네っ<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「んひゅっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000私は、その……会長のために、エッチな声出してるだけ、だもんっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あ……っ<emoji=heart04>\u3000ふぅ……ん、あっ<emoji=heart04>」"
translation = "「응흣<emoji=heart04> 앙っ<emoji=heart04> 나는, 그…… 회장을 위해서, 야한 목소리 내고 있을 뿐인걸っ<emoji=heart04> 아앗<emoji=heart04> 아……っ<emoji=heart04> 후으……응, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁぁぁん……会長が、エッチな声、もっと聞きたいなんて、言うからぁっ<emoji=heart04>\u3000あんっ……仕方なく、出してるだけ、なんだから……っ<emoji=heart04>」"
translation = "「하아아앙…… 회장이, 야한 목소리, 더 듣고 싶다느니, 말하니까앗<emoji=heart04> 앙っ…… 어쩔 수 없이, 내고 있을 뿐인 거니까……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「あひっ<emoji=heart04>\u3000べ、別に……自分の声で<emoji=heart04>\u3000興奮してるわけじゃ、ないもん……っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁ……っ<emoji=heart04>」"
translation = "「아힛<emoji=heart04> 딱, 딱히…… 내 목소리에<emoji=heart04> 흥분하고 있는 건, 아니란 말야……っ<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長が喜ぶから、言ってるだけでぇ……っ、あっ<emoji=heart04>\u3000エッチな声出して、興奮するなんて……はぅぅん<emoji=heart04>\u3000私、そんなエッチじゃないっ<emoji=heart04>」"
translation = "「회장이 기뻐하니까, 말하고 있는 것뿐이라구우……っ, 앗<emoji=heart04> 야한 목소리 내고, 흥분하다니…… 하으으응<emoji=heart04> 나, 그렇게 음란하지 않아っ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でも、いつもより気持ちよさそうだけど？」"
translation = "「하지만, 평소보다 기분 좋아 보이는데?」"

[[dialogue]]
speaker = "マトイ"
original = "「ん……っ<emoji=heart04>\u3000それはその……っ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000会長のが大きくて、気持ちいいだけだもん……っ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「응……っ<emoji=heart04> 그건 그……っ<emoji=heart04> 아앗<emoji=heart04> 회장 게 커서, 기분 좋을 뿐인걸……っ<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「おま○こ<emoji=heart04>\u3000きゅ～ってなっちゃうのはぁ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長のせい、なんだからぁっ<emoji=heart04>」"
translation = "「보지<emoji=heart04> 뀨~ 하고 되어버리는 건……<emoji=heart04> 앙っ<emoji=heart04> 회장 때문인 거니까앗<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長がしっかり、面倒見て……よねっ<emoji=heart04>\u3000はぅぅん……っ、こんなになっちゃった、私のおま○こ……っ、責任取ってくれなきゃ、ひどいんだからっ<emoji=heart04>\u3000あ──」"
translation = "「회장이 제대로, 책임져 줘야…… 해っ<emoji=heart04> 하으으응……っ, 이렇게 되어버린, 내 보지……っ, 책임져 주지 않으면, 너무한 거니까っ<emoji=heart04> 아──」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、はぁっ<emoji=heart04>\u3000はぁ……っ、あんっ<emoji=heart04>\u3000だからって、そんな早くしたら……っ<emoji=heart04>\u3000ああああ<emoji=heart04>\u3000おま○こ、壊れちゃ……っ<emoji=heart04>」"
translation = "「앗, 하앗<emoji=heart04> 하아……っ, 앙っ<emoji=heart04> 그렇다고 해서, 그렇게 빨리하면……っ<emoji=heart04> 아아아아<emoji=heart04> 보지, 망가져버렷……っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
