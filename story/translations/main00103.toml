[[dialogue]]
speaker = "unk"
original = "第３話,新星学園星徒会長,B"
translation = "제3화, 신성 학원 성도 회장, B"

[[dialogue]]
speaker = "unk"
original = "ブー……ブー……"
translation = "부우…… 부우……"

[[dialogue]]
speaker = "クロト"
original = "「ん……？」"
translation = "「응……?」"

[[dialogue]]
speaker = "unk"
original = "チャイムとも違う音色が鳴った。これは……"
translation = "차임벨과는 다른 음색이 울렸다. 이것은……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──ぇー……ん──ぁー……マイクマイク、只今マイクのテスト中。わたしは俳句に無我夢中」"
translation = "「──에ー……응──아ー…… 마이크 마이크, 지금 마이크 테스트 중. 저는 하이쿠에 무아지경」"

[[dialogue]]
speaker = "マトイ"
original = "「会長……？」"
translation = "「회장……?」"

[[dialogue]]
speaker = "unk"
original = "校内放送から響く女性の声。"
translation = "교내 방송에서 울려 퍼지는 여성의 목소리."

[[dialogue]]
speaker = "unk"
original = "何の放送かと思ったが、その疑問は問いかけるまでもなく氷解した。"
translation = "무슨 방송인가 싶었지만, 그 의문은 물어볼 필요도 없이 해소되었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「えー、２年Ｂ組！\u3000緋宮クロト！\u3000今すぐ星徒会室までダッシュで来なさーいっ」"
translation = "「에ー, 2학년 B반! 히노미야 쿠로토! 지금 당장 성도회실까지 대시로 오십시오!」"

[[dialogue]]
speaker = "クロト"
original = "「へー緋宮くん…………って俺？」"
translation = "「헤ー 히노미야 군………… 나 말이야?」"

[[dialogue]]
speaker = "unk"
original = "突然の呼び出しに教室内のざわめきが広がる。"
translation = "갑작스러운 호출에 교실 안의 웅성거림이 퍼진다."

[[dialogue]]
speaker = "unk"
original = "それが異例の放送であることは新参の俺にも察しがついた。"
translation = "그것이 이례적인 방송이라는 것은 신참인 나도 짐작할 수 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれ？\u3000ねえねえマイクってどこで切るんだっけ、アナー」"
translation = "「어라? 있잖아 있잖아 마이크는 어디서 끄는 거였지, 아나?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、ヴィーナスちゃんったらおっちょこちょいね。ここよ」"
translation = "「후훗, 비너스짱은 정말 덜렁이네. 여기야.」"

[[dialogue]]
speaker = "アナ"
original = "「違いますそこはアンプ入力──あぁ」"
translation = "「아닙니다 거기는 앰프 입력──아아」"

[[dialogue]]
speaker = "unk"
original = "ブツッ。"
translation = "뚝."

[[dialogue]]
speaker = "unk"
original = "最後にはよくわからないやり取りを残して、そのゲリラ放送は終了した。"
translation = "마지막에는 알 수 없는 대화를 남기고, 그 게릴라 방송은 종료되었다."

[[dialogue]]
speaker = "unk"
original = "というか、聞き覚えのある声だったような気も……。"
translation = "그보다, 들어본 적 있는 목소리였던 것 같기도……."

[[dialogue]]
speaker = "クラスの女子Ａ"
original = "「い──今のが九浄さんだよ、緋宮くん！\u3000知り合いだったの！？」"
translation = "「이── 지금 게 쿠죠 씨야, 히노미야 군! 아는 사이였어!?」"

[[dialogue]]
speaker = "クロト"
original = "「いや──会ったことはない。はずだ。でも、声はなんとなく聞いたことがあるような……」"
translation = "「아니── 만난 적은 없다. 그럴 리가. 하지만, 목소리는 어쩐지 들어본 적 있는 것 같은데……」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
original = "「転入生だから挨拶とか？\u3000んでも、一々そんなことするのかな……？」"
translation = "「전학생이니까 인사 같은 거? 근데, 일일이 그런 걸 할까……?」"

[[dialogue]]
speaker = "クロト"
original = "「マトイ。どういうことかわかるか」"
translation = "「마토이. 무슨 일인지 알겠어?」"

[[dialogue]]
speaker = "マトイ"
original = "「わからない。でも……星徒会室なら、連れてってあげる」"
translation = "「모르겠어. 하지만…… 성도회실이라면, 데려다줄게.」"

[[dialogue]]
speaker = "unk"
original = "廊下を渡って、中庭を通って、階段を昇って……"
translation = "복도를 건너고, 안뜰을 지나고, 계단을 올라서……"

[[dialogue]]
speaker = "unk"
original = "マトイの案内もありつつようやく、俺はその一室にたどり着いた。"
translation = "마토이의 안내도 받으면서 마침내, 나는 그 한 방에 도착했다."

[[dialogue]]
speaker = "クロト"
original = "「──し、失礼します」"
translation = "「시, 실례하겠습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「会長？\u3000緋宮くんを連れてきたけど……」"
translation = "「회장? 히노미야 군을 데려왔는데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──来たわね」"
translation = "「──오셨군요.」"

[[dialogue]]
speaker = "unk"
original = "奥にある机からくるりと椅子を回転させて……一人の女性が向かい立つ。"
translation = "안쪽에 있는 책상에서 빙글 의자를 회전시키고…… 한 여성이 마주 선다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「案内ありがとう、マトイ。下がっていいわ」"
translation = "「안내 고마워요, 마토이. 물러나도 좋습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「はい……それは構わないけど……どういう用……？」"
translation = "「네…… 그건 상관없는데…… 무슨 용건……?」"

[[dialogue]]
speaker = "unk"
original = "ここまで一緒に来てくれたマトイも、これがどういう事態か飲み込めていない様子だった。"
translation = "여기까지 함께 와 준 마토이도, 이것이 어떤 사태인지 이해하지 못하는 모양이었다."

[[dialogue]]
speaker = "unk"
original = "無論、当事者の俺はさらに飲み込めていない。"
translation = "물론, 당사자인 나는 더욱 이해하지 못하고 있다."

[[dialogue]]
speaker = "クロト"
original = "「（あそこにいるのは……昨日の……）」"
translation = "「(저기에 있는 건…… 어제의……)」"

[[dialogue]]
speaker = "unk"
original = "ふと傍らを見やれば、天使と魔族の女の子がひとりずつこちらを見守っていた。"
translation = "문득 곁을 보니, 천사와 마족의 여자아이가 한 명씩 이쪽을 지켜보고 있었다."

[[dialogue]]
speaker = "unk"
original = "恐らくは彼女たちが残る星徒会のメンバーか。"
translation = "아마도 그녀들이 남은 성도회의 멤버일 것이다."

[[dialogue]]
speaker = "unk"
original = "となると……"
translation = "그렇다면……"

[[dialogue]]
speaker = "クロト"
original = "「その声──あなたが、俺を呼び出した会長さん……でしょうか」"
translation = "「그 목소리── 당신이, 저를 불러내신 회장님……이신가요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふ、その通り。観察眼はそれなりのようね」"
translation = "「후후, 맞습니다. 관찰력은 그럭저럭인 것 같군요.」"

[[dialogue]]
speaker = "unk"
original = "俺の言葉を満足げに聞き届ける女性。"
translation = "내 말을 만족스러운 듯이 들어주는 여성."

[[dialogue]]
speaker = "unk"
original = "会長──つまりは新星学園星徒会、全学生の頂点に立つ存在ということ。"
translation = "회장── 즉 신성 학원 성도회, 전 학생의 정점에 서 있는 존재라는 것."

[[dialogue]]
speaker = "クロト"
original = "「お初にお目にかかります。昨日からこの学園に転入してきた──」"
translation = "「처음 뵙겠습니다. 어제부터 이 학원에 전학 온──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「自己紹介は結構。あなたを呼んだのはそんなチンケな用じゃないわ」"
translation = "「자기소개는 됐습니다. 당신을 부른 건 그런 시시한 용건이 아니에요.」"

[[dialogue]]
speaker = "unk"
original = "挨拶の言葉を遮られる。"
translation = "인사의 말을 가로막힌다."

[[dialogue]]
speaker = "unk"
original = "どうも彼女から言いたいことがあるようだった。"
translation = "아무래도 그녀가 하고 싶은 말이 있는 것 같았다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「聞きなさい。これは決定事項……この私が命じる限りね」"
translation = "「들으십시오. 이것은 결정 사항…… 이 제가 명하는 한 말입니다.」"

[[dialogue]]
speaker = "unk"
original = "はつらつな声が凛と響く。"
translation = "활기찬 목소리가 또렷하게 울린다."

[[dialogue]]
speaker = "unk"
original = "星徒会の権力は絶大。となると、俺の待遇なんかも胸三寸だったりするのか。"
translation = "성도회의 권력은 절대적. 그렇다면, 나의 대우 같은 것도 그녀 마음대로인 걸까."

[[dialogue]]
speaker = "クロト"
original = "「（もしかして、許可も得ずモンスターを退治していたのがバレた……？）」"
translation = "「(혹시, 허가도 받지 않고 몬스터를 퇴치하고 있던 게 들킨 건가……?)」"

[[dialogue]]
speaker = "unk"
original = "今になって入学を取り消されたりすると困る──"
translation = "이제 와서 입학이 취소되거나 하면 곤란하다──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──ん……しょっと」"
translation = "「──음…… 읏차」"

[[dialogue]]
speaker = "unk"
original = "しかし、彼女の行動はそんな予想の何もかもを裏切ってきた。"
translation = "하지만, 그녀의 행동은 그런 예상의 모든 것을 배신했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「はい」"
translation = "「자」"

[[dialogue]]
speaker = "クロト"
original = "「っ……？\u3000これは……？」"
translation = "「……? 이건……?」"

[[dialogue]]
speaker = "unk"
original = "彼女は自らの制服につけていたマントを外して──"
translation = "그녀는 자신의 교복에 달고 있던 망토를 벗어서──"

[[dialogue]]
speaker = "unk"
original = "それをそのまま、俺の背中へ装着させた。"
translation = "그것을 그대로, 나의 등 뒤에 장착시켰다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"
translation = "「당신을 오늘부로 이곳, 신성 학원 성도회── 성도 회장으로 임명합니다. 그리고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"
translation = "「히노미야 쿠로토── 당신은 마왕이 되어, 이 세계를 구원하는 것입니다!」"

