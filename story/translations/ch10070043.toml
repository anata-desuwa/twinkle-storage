[[dialogue]]
speaker = "unk"
original = "第３話,ルリエルと恋人カードゲーム,P"
translation = "제3화, 루리엘과 연인 카드 게임, P"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、今日の巫女修業はこれをやりましょう！」"
translation = "「회장님, 오늘 무녀 수행은 이걸 해요!」"

[[dialogue]]
speaker = "unk"
original = "休日、俺の家に遊びに来ていたルリエル。彼女が取り出して見せたのは――"
translation = "휴일, 우리 집에 놀러 와 있던 루리엘. 그녀가 꺼내 보인 것은──"

[[dialogue]]
speaker = "ルリエル"
original = "「ででん♪\u3000『ブッチャケカード』というゲームなのです！」"
translation = "「두둥♪ 『속마음 토크 카드』라는 게임이에요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「この間、流星星徒会の皆さんと街に出かけた時に、見つけたんですよ～♪」"
translation = "「요전에 유성 성도회 분들과 시내에 나갔을 때 발견했거든요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「恋人同士でやるゲームらしくて、会長さんと楽しくイチャイチャできると思って、買ってきたのです♪」"
translation = "「연인끼리 하는 게임인 것 같아서, 회장님과 즐겁게 꽁냥거릴 수 있을 것 같아 사 왔어요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「えっとですね～、内容はすごく簡単で、シャッフルした山札を交互に引いて、そのカードに書いてある内容をぶっちゃけて話すというものなのです」"
translation = "「음 그러니까요~ 내용은 아주 간단해서, 섞어 놓은 카드 더미를 교대로 뽑아서 그 카드에 적힌 내용을 솔직하게 말하는 거예요」"

[[dialogue]]
speaker = "ルリエル"
original = "「例えば１枚引いてみせると～、『相手について最近新しく知ったことは？』といった感じです」"
translation = "「예를 들어 한 장 뽑아 보면~ 『상대에 대해 최근 새로 알게 된 점은?』 같은 느낌이에요」"

[[dialogue]]
speaker = "unk"
original = "勝ち負けとかはあるの？"
translation = "승패 같은 것도 있어?"

[[dialogue]]
speaker = "ルリエル"
original = "「本来は特にないのです。普段は言えないことを言ったりして、恋人としての仲を深めるのが目的らしいので」"
translation = "「본래는 딱히 없어요. 평소에는 못 하던 말을 하면서 연인으로서 사이를 돈독히 하는 게 목적이라고 하니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「でも、ルリエル的にはもっと面白くしたいので、今回は先に３回照れた方が負けっていうルールを追加しようと思うのです！」"
translation = "「하지만 루리엘 입장에서는 좀 더 재미있게 하고 싶으니까, 이번에는 먼저 세 번 부끄러워하는 쪽이 지는 거로 규칙을 추가할까 해요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ちなみに、言いづらい内容もあると思うので、その時はパスしてもＯＫですよ。楽しく遊べないと意味がないですから」"
translation = "「참고로 말하기 곤란한 내용도 있을 테니, 그럴 때는 패스해도 OK예요. 즐겁게 놀지 못하면 의미가 없으니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「それじゃあ、始めちゃいましょう！\u3000ジャンケンで勝った方が先行ということで――じゃ～んけ～ん、ぽんっ☆\u3000なのです♪」"
translation = "「그럼 시작해 봐요! 가위바위보로 이긴 사람이 선공인 거로── 가~위~바위~보, 퐁☆ 이에요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「では、ルリエルから先行で行っちゃいますよ～！\u3000――山札からドローなのです」"
translation = "「그럼 루리엘부터 선공으로 갈게요~! ──카드 더미에서 드로우예요」"

[[dialogue]]
speaker = "ルリエル"
original = "「書いてある内容は――『相手のどんな仕草が好きか？』だそうです」"
translation = "「적혀 있는 내용은── 『상대의 어떤 몸짓을 좋아하는가?』라고 하네요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルが会長さんの仕草で好きなのは、そうですね～」"
translation = "「루리엘이 회장님의 몸짓 중에서 좋아하는 건, 글쎄요~」"

[[dialogue]]
speaker = "ルリエル"
original = "「すごく照れる時に、恥ずかしくなって顔を両手で覆って隠しちゃうところとか、可愛くてルリエルは好きなのです♪\u3000見ていると思わず笑顔になっちゃいます<emoji=heart04>」"
translation = "「엄청 부끄러울 때 수줍어서 얼굴을 두 손으로 가려버리는 점이라든가, 귀여워서 루리엘은 좋아해요♪ 보고 있으면 저도 모르게 미소가 지어져요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "指摘されると恥ずかしい……！"
translation = "지적당하니까 부끄러워……!"

[[dialogue]]
speaker = "unk"
original = "意識してなかったけど"
translation = "의식하지 못했는데"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ♪\u3000会長さん、顔が赤くなってますよ？\u3000照れてます？\u3000照れてますよね♪」"
translation = "「앗♪ 회장님, 얼굴이 빨개졌어요? 부끄러워요? 부끄러운 거죠♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルの１点先取なのです♪\u3000ふふふっ、次は会長さんの番ですよ～。どうぞ♪」"
translation = "「루리엘의 1점 선취예요♪ 후후훗, 다음은 회장님 차례예요. 자요♪」"

[[dialogue]]
speaker = "unk"
original = "俺が引いたカードに書かれていたお題は――『相手がどんな人と話していたら嫉妬するか？』というものだった。"
translation = "내가 뽑은 카드에 적힌 주제는── 『상대가 어떤 사람과 대화하고 있으면 질투가 나는가?』라는 것이었다."

[[dialogue]]
speaker = "ルリエル"
original = "「嫉妬……？\u3000会長さん、わたしのことで嫉妬してくれたりするのですか？\u3000気になるのです！」"
translation = "「질투……? 회장님, 저 때문에 질투해 주기도 하나요? 궁금해요!」"

[[dialogue]]
speaker = "unk"
original = "あ～、実を言うと……"
translation = "아~ 실은 말이야……"

[[dialogue]]
speaker = "ルリエル"
original = "「――最近は、ルリエルが他の男子生徒と話しているのを見たら、内心嫉妬してしまう？\u3000えっ、そうなのですか！？」"
translation = "「──최근에는 루리엘이 다른 남학생과 이야기하는 걸 보면 내심 질투가 나? 엣, 정말인가요!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、そこまでルリエルのこと、独占したいと思ってくれてるなんて……」"
translation = "「회장님, 그렇게까지 루리엘을 독점하고 싶어 했다니……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエル、なんだか嬉しくなっちゃうのですよ～♪\u3000えへへへへへぇ～<emoji=heart04>」"
translation = "「루리엘, 왠지 기뻐져 버려요~♪ 에헤헤헤헤헤~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "う、嬉しいんだ……"
translation = "으, 기쁘구나……"

[[dialogue]]
speaker = "ルリエル"
original = "「はい♪\u3000だって、わたしが会長さんの気持ちを、独占できてるってことですもんね♪」"
translation = "「네♪ 그야 제가 회장님의 마음을 독점하고 있다는 뜻이니까요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「内心むくれてる会長さんを想像したら、すごく愛おしい気持ちが湧いて来て、思わずニヤニヤしちゃうのです<emoji=heart04>」"
translation = "「내심 삐쳐 있는 회장님을 상상하니까 너무 사랑스러운 기분이 들어서 저도 모르게 싱글벙글하게 돼요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "くぅっ……！"
translation = "큭……!"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ！\u3000会長さん、顔がさっきよりも赤くなってます♪\u3000ということは、照れポイント２点目もゲットですね！\u3000えへへ♪」"
translation = "「앗! 회장님, 얼굴이 아까보다 더 빨개졌어요♪ 그렇다는 건 부끄러움 포인트 2점째도 겟이네요! 에헤♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「じゃあ、またルリエルのターンですよ～。カードをドローなのです！」"
translation = "「그럼 다시 루리엘의 턴이에요. 카드를 드로우할게요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「内容は『今年中に２人でしてみたいことは？』ですか。そうですね～、ルリエルは会長さんと――」"
translation = "「내용은 『올해 안에 둘이서 해보고 싶은 것은?』인가요. 그렇네요~ 루리엘은 회장님과──」"

[[dialogue]]
speaker = "ルリエル"
original = "「<b>婚約</b>がしたいのです！」"
translation = "「<b>약혼</b>이 하고 싶어요!」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?"

[[dialogue]]
speaker = "ルリエル"
original = "「流星星徒会の皆さんに恋愛相談をしたら、さすがに結婚は学園を卒業してからの方がいいって言われたのです！」"
translation = "「유성 성도회 분들에게 연애 상담을 했더니, 역시 결혼은 학원을 졸업하고 나서 하는 게 좋겠다고 하더라고요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「でもでも！\u3000結婚はまだ早かったとしても、その準備は今からしておけますよね？\u3000なので～」"
translation = "「하지만 하지만! 결혼은 아직 이르더라도 그 준비는 지금부터 해둘 수 있잖아요? 그러니까~」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエル的には、今年中に婚約して、卒業したらすぐ結婚できるように、早めに準備しておきたいのです！」"
translation = "「루리엘 입장에서는 올해 안에 약혼해서 졸업하면 바로 결혼할 수 있도록 미리 준비해 두고 싶어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんとの大事な将来のことなので、準備は時間をかけて、ちゃんとしたいので……えへへ<emoji=heart04>」"
translation = "「회장님과의 소중한 미래니까 준비는 시간을 들여서 제대로 하고 싶어서…… 에헤<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「――って、ああっ！\u3000会長さん、顔を両手で覆っちゃってます！\u3000耳まで真っ赤になってますよ～？」"
translation = "「──앗, 아앗! 회장님, 얼굴을 두 손으로 가려버렸어요! 귀까지 새빨개졌다고요~?」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへへ<emoji=heart04>\u3000ルリエルの大好きな仕草なのです<emoji=heart04>\u3000ということは、３ポイントゲットで勝ちってことですよね！？\u3000イェ～イ♪」"
translation = "「에헤헤헤<emoji=heart04> 루리엘이 정말 좋아하는 몸짓이에요<emoji=heart04> 그렇다는 건 3포인트 겟으로 승리라는 거죠!? 예~이♪」"

[[dialogue]]
speaker = "unk"
original = "どう考えても強すぎるよ！"
translation = "아무리 생각해도 너무 강해!"

[[dialogue]]
speaker = "unk"
original = "だって、今のは……"
translation = "그야 방금 건……"

[[dialogue]]
speaker = "ルリエル"
original = "「――え？\u3000まるでプロポーズみたい、ですか？」"
translation = "「──에? 마치 프로포즈 같다고요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「あれ？\u3000でもプロポーズって、指輪を渡しながら『結婚してください』って言うものじゃないんですか？」"
translation = "「어라? 하지만 프로포즈는 반지를 건네면서 『결혼해 주세요』라고 말하는 거 아닌가요?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルは相手が俺でいいの？"
translation = "루리엘은 상대가 나여도 괜찮아?"

[[dialogue]]
speaker = "ルリエル"
original = "「？？？\u3000もちろんなのです！」"
translation = "「??? 물론이죠!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルは会長さんのこと、大好きですから♪」"
translation = "「루리엘은 회장님을 정말 좋아하니까요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「――って、いきなり抱き締めたりして、どうしたのですか？」"
translation = "「──그건 그렇고, 갑자기 껴안다니 무슨 일인가요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ<emoji=heart04>\u3000そんな優しく頭を撫でられたら、くすぐったいのですよ……えへへへへへぇ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 그렇게 상냥하게 머리를 쓰다듬어 주시면 간지러워요…… 에헤헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルを抱き締めながら、今年中に改めてプロポーズしようと心に誓う俺なのであった――"
translation = "루리엘을 껴안으며 올해 안에 다시 한번 프로포즈하겠다고 마음속으로 맹세하는 나였다──"

