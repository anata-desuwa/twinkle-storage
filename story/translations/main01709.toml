[[dialogue]]
speaker = "unk"
original = "第１０話,敗北の結晶,B"
translation = "제10화, 패배의 결정, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フロンティア、ドライブ──」"
translation = "「프론티어, 드라이브──」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ヌ──！？」"
translation = "「누──!?」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「平行世界ヘノ干渉……！\u3000バカナ──人ノ身デ、自在ニソレヲ操レルダト──！？」"
translation = "「평행 세계로의 간섭……! 바보 같은── 인간의 몸으로, 자유자재로 그것을 조종하다니──!?」"

[[dialogue]]
speaker = "unk"
original = "指数関数的に跳ね上がっていく魔王の波動！"
translation = "지수 함수적으로 치솟아 오르는 마왕의 파동!"

[[dialogue]]
speaker = "unk"
original = "平行世界で敗れた俺よ、この俺に最後の力を与えてくれ！"
translation = "평행 세계에서 패배한 나여, 이 나에게 마지막 힘을 빌려다오!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「無限の可能性の連鎖──はは……参ったわね」"
translation = "「무한한 가능성의 연쇄── 하하…… 난감하네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（私が思っていたよりもずっとずっと……強い子だったみたいね。昔から）"
translation = "（내가 생각했던 것보다 훨씬 훨씬…… 강한 아이였던 것 같네. 옛날부터）"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「これニャら──リクリエそのものが相手だろうといけるニャン！！」"
translation = "「이거라면── 리크리에 그 자체가 상대라도 이길 수 있을 거냥!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っ……くたばってる場合じゃないな！」"
translation = "「윽…… 쓰러져 있을 때가 아니군!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「待って。なんか地面が揺れてない……？」"
translation = "「잠깐. 뭔가 땅이 흔들리고 있지 않아……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これは……天蓋対策に張っていた、地脈が連動しています──！」"
translation = "「이것은…… 천개 대책으로 펼쳐놓았던, 지맥이 연동하고 있습니다──!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「──みんな！\u3000星徒会のみんなに向けて、力を送るよ！\u3000せーのっ！」"
translation = "「──모두! 성도회 모두를 향해서, 힘을 보낼게! 하나, 둘!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私たちに最後まで、できることがあるなら──」"
translation = "「우리에게 마지막까지, 할 수 있는 일이 있다면──」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「負けるんじゃないぞ、緋宮クロト。私との果たし合いが済むまでな──！」"
translation = "「지는 거 아니다, 히노미야 쿠로토. 나와의 결판이 끝날 때까지는──!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……頑張って、ソフィ。お姉さん達も」"
translation = "「……힘내, 소피. 언니들도」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お嬢様方──どうかご無事で。健闘を祈ります」"
translation = "「아가씨들── 부디 무사하시기를. 건투를 빕니다」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「アステラも消えちゃった今……彼女たちに託すしかないものね」"
translation = "「아스테라도 사라져버린 지금…… 그녀들에게 맡길 수밖에 없겠지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はてさて──最後の正念場と言ったところか。不肖の娘の晴れ舞台、彩ってやるのもやぶさかではない」"
translation = "「이것 참── 마지막 고비라고 할 수 있겠군. 못난 딸의 멋진 무대, 꾸며주는 것도 마다하지 않겠다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「星徒会のみんなに……せつな達の力を送るでござる！」"
translation = "「성도회 모두에게…… 세츠나들의 힘을 보내는 것이옵니다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい──！\u3000星々よ、私たちの祈りを届けて──！」"
translation = "「네──! 별들이여, 우리의 기도를 전해 주소서──!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様のいない世界なんて──死んでも願い下げですから」"
translation = "「아가씨가 없는 세상 따위── 죽어도 사양이니까요」"

[[dialogue]]
speaker = "unk"
original = "全世界に広がる地脈と、そして天空を通じて、色とりどりの星々の祝福がまたたく。"
translation = "전 세계로 퍼지는 지맥과, 그리고 하늘을 통해, 형형색색의 별들의 축복이 반짝인다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「エウロパの鼓動を感じるわ……同じ守護星の子たちが、助けてくれているのね」"
translation = "「에우로파의 고동을 느껴…… 같은 수호성의 아이들이, 도와주고 있는 거네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「<ruby>火星<rt>マーズ</rt></ruby>も……他にも、無数の星々による星力が注がれてきます……！」"
translation = "「화성도…… 그 외에도, 무수한 별들로부터 성력이 쏟아져 들어옵니다……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ああ……どんどん力が湧いてくる。これならやれるぜ、まだまだ──ッ！」"
translation = "「아아…… 점점 힘이 솟아난다. 이 정도라면 할 수 있어, 아직도──읏!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんな……」"
translation = "「모두……」"

[[dialogue]]
speaker = "unk"
original = "星々とのリンクを通じて力を取り戻したみんなが立ち上がる。"
translation = "별들과의 링크를 통해 힘을 되찾은 모두가 일어선다."

[[dialogue]]
speaker = "unk"
original = "しかも──"
translation = "게다가──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どうやら……それだけじゃないみたいだな」"
translation = "「아무래도…… 그것만이 아닌 것 같군」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「ええ──どこからか霊力まで送られてきます。今、これを扱えるのは……」"
translation = "「네── 어디선가 영력까지 보내져 옵니다. 지금, 이것을 다룰 수 있는 것은……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「魔王──それに御子──いよいよ運命を決する時ですね」"
translation = "「마왕── 그리고 미코── 드디어 운명을 결정할 때로군요」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「今……一瞬だけだが女神の波動を感じた。まだ、我々も見捨てられてはいないようだ」"
translation = "「지금…… 아주 잠깐이지만 여신의 파동을 느꼈다. 아직, 우리들도 버려지지는 않은 듯하다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「この世界を救うため、私たちにできることを尽くしましょう」"
translation = "「이 세계를 구하기 위해, 우리가 할 수 있는 것을 다합시다」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「<ruby>私<rt>わたくし</rt></ruby>たちとの縁まで繋げるなんて、会長の力は凄いのね」"
translation = "「저희와의 인연까지 연결하다니, 회장군의 힘은 대단하네요」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたし、本当はリクリエ静観派なんだけどね～。でも今回のリクリエはいつもと違う気がするし、ちょ～っと力を貸したげよっかな♪」"
translation = "「난 사실 리크리에 관망파인데~. 근데 이번 리크리에는 평소랑 다른 것 같고, 조~금 힘을 빌려줘 볼까나♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「総員──ロッドを天へ掲げろ！\u3000持ちえる総ての魔力を、塔の頂へと結集するのだ！」"
translation = "「총원── 로드를 하늘로 들어 올려라! 가진 모든 마력을, 탑의 정상으로 결집시키는 것이다!」"

[[dialogue]]
speaker_original = "ネビュラ隊員"
speaker_translation = "네뷸라 대원"
original = "「──イエス、マム！」"
translation = "「──예스, 마마!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──何？\u3000我々の作戦はどうしたのか……だと？」"
translation = "「──뭐? 우리의 작전은 어떻게 되었냐고……?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「知らん。姫様の『壁』がもう張られ、『使徒』の権限まで移り変わった以上、当初の算段は崩れた。もはや奴らに委ねるしかあるまい」"
translation = "「모른다. 공주님의 『벽』이 이미 쳐졌고, 『사도』의 권한까지 옮겨간 이상, 당초의 계산은 무너졌다. 이제 그들에게 맡길 수밖에 없을 것이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「元老会のお歴々からはどやされるやもしれんが……ま、私が大目玉を食うだけで済むなら安いものだ」"
translation = "「원로회의 높으신 분들에게는 야단맞을지도 모르겠지만…… 뭐, 내가 크게 혼나는 것으로 끝난다면 싼 것이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「最後の大博打だ。リノ──貴様が組織に背いてまで得たかった結末を、私たちに拝ませてみろ」"
translation = "「마지막 큰 도박이다. 리노── 네가 조직을 등지고서라도 얻고 싶었던 결말을, 우리에게 보여줘 봐라」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「これは……」"
translation = "「이것은……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あたしらもしかして……全世界の期待背負っちゃってる感じ？」"
translation = "「우리 혹시…… 전 세계의 기대를 짊어지고 있는 느낌?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「セドナ達まで──もう……素直じゃないんだから」"
translation = "「세드나들까지── 정말…… 솔직하지 못하긴」"

[[dialogue]]
speaker = "unk"
original = "星力──霊力──魔力──この地球上に存在するあらゆるエネルギーが満ち満ちる。"
translation = "성력── 영력── 마력── 이 지구상에 존재하는 모든 에너지가 가득 찬다."

[[dialogue]]
speaker = "unk"
original = "なら俺たちは……その全部、余すところなく受け継がせてもらおう。"
translation = "그렇다면 우리들은…… 그 전부를, 남김없이 물려받도록 하자."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──受け取った」"
translation = "「──받았다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──ああ。全開だ」"
translation = "「──아아. 전개다」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「これだけの後押しをしてもらって……勝てなきゃ嘘ですね」"
translation = "「이 정도의 지원을 받고서…… 이기지 못하면 거짓말이죠」"

[[dialogue]]
speaker = "unk"
original = "俺たち魔王は──どんな清濁をも併せのむ大器。"
translation = "우리 마왕은── 어떤 맑고 탁한 것도 함께 삼키는 큰 그릇."

[[dialogue]]
speaker = "unk"
original = "先代ラクシスは、異なる種族によって構成されたクルセイダースを率いて英雄となった。"
translation = "선대 락시스는, 서로 다른 종족으로 구성된 크루세이더스를 이끌고 영웅이 되었다."

[[dialogue]]
speaker = "unk"
original = "なら俺は──この地球に生きる、全ての命を率いてみせよう。"
translation = "그렇다면 나는── 이 지구에 사는, 모든 생명을 이끌어 보이겠다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「来いよ──ギエル。リクリエの使徒。バジュラ教団の残党。よこしまな悪党はまとめて全部」"
translation = "「와라── 기엘. 리크리에의 사도. 바쥬라 교단의 잔당. 간사한 악당들은 모조리 전부」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も負け犬。おまえも負け犬だ。共に地べたを這いつくばった者同士、泥臭くやり合うのがお似合いだろ」"
translation = "「나도 패배자. 너도 패배자다. 함께 땅바닥을 기어 다녔던 동지끼리, 흙투성이로 맞붙는 게 어울리잖아」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「かかってこい。俺が、おまえ達全員の因縁に、ここでけりをつけてやる！」"
translation = "「덤벼라. 내가, 너희들 전원의 인연에, 여기서 종지부를 찍어주마!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「シブトイ──何度ヨミガエレバ気ガ済ムトイウノダ、魔王ラクシス──！」"
translation = "「끈질기군── 몇 번을 되살아나야 성이 차는 것이냐, 마왕 락시스──!」"

[[dialogue]]
speaker = "unk"
original = "人間界を、森羅暦を、アルタイルを終わらせない。"
translation = "인간계를, 신라력을, 알타이르를 끝내지 않겠다."

[[dialogue]]
speaker = "unk"
original = "そのために──これまでの歴史が積み上げてきた奴という禍根を、ここで断つ！"
translation = "그러기 위해── 지금까지의 역사가 쌓아 올린 너라는 화근을, 여기서 끊겠다!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さあ、いくわよクロト──ママもきっと祈ってくれてるわ！\u3000星徒会のみんな、準備はいい！？」"
translation = "「자, 가자 쿠로토── 엄마도 분명 기도해 주고 있을 거야! 성도회 모두, 준비됐어!?」"

[[dialogue]]
speaker_original = "みんな"
speaker_translation = "모두"
original = "「──おう！！」"
translation = "「──오우!!」"

[[dialogue]]
speaker = "unk"
original = "再び立ち上がった流星、新星の星騎士たち。"
translation = "다시 일어선 유성, 신성의 성기사들."

[[dialogue]]
speaker = "unk"
original = "挑むはギエル──主を失った従者にして、３０００年の因果が生んだ影の怪物！"
translation = "도전하는 것은 기엘── 주인을 잃은 종자이자, 3000년의 인과가 낳은 그림자 괴물!"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「愚カシイ……地球ゴトキガ……大自然ノ理カラスレバ、ソノ程度ノ矮星ハ塵屑モ同ジ！」"
translation = "「어리석군…… 지구 따위가…… 대자연의 이치로 볼 때, 그 정도의 왜성은 먼지와 같을 뿐!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「流星ライダーアポロ──最終回だ。悪は必ず滅ぼしてやる！」"
translation = "「유성 라이더 아폴로── 최종회다. 악은 반드시 멸망시켜주마!」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「流星学園星徒会会長、星見フィオナ──参ります！」"
translation = "「유성 학원 성도회 회장, 호시미 피오나── 갑니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「新星学園星徒会会長、緋宮クロト──星騎士としての使命、果たさせてもらう！」"
translation = "「신성 학원 성도회 회장, 히노미야 쿠로토── 성기사로서의 사명, 완수하겠다!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「我ハ『リクリエ』──大イナル再創生ノ化身！\u3000人類風情ガ、宇宙ノ塵ト消エルガイイ──！！」"
translation = "「나는 『리크리에』── 위대한 재창생의 화신! 인류 따위가, 우주의 먼지로 사라지는 것이 좋을 것이다──!!」"

