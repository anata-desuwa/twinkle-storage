[[dialogue]]
speaker = "unk"
original = "第２話,幻影の名残,B"
translation = "제2화, 환영의 흔적, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、トイレが混んでて遅れちゃって……お待たせ」"
translation = "「미안, 화장실이 붐벼서 늦었어…… 기다렸지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ってあれ？\u3000ヴィーナス？」"
translation = "「어라? 비너스?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！\u3000あ、あ──クロト！\u3000た、たたたっ、ただいま」"
translation = "「! 아, 아── 쿠로토! 다, 다다닷, 다녀왔어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただいまはこっちだけど……何かあったの？」"
translation = "「다녀왔어는 내가 할 말인데…… 무슨 일 있었어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う、ううん──なんでも……」"
translation = "「으, 응── 아무것도……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（今、見せられたのって──何……？）"
translation = "（지금, 보여진 건── 뭐지……?）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（<b>この世界のことじゃなかった</b>──しかも……あっちの世界じゃ、私は……）"
translation = "（<ruby>이 세계의 일이 아니었어<rt>・ ・・・ ・・ ・・・・</rt></ruby>── 게다가…… 저쪽 세계에선, 나는……）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（幻──とも、思えないわ。だって確かに……私の心の内から、湧き上がってきた──みたいな……）"
translation = "（환영──이라고도, 생각할 수 없어. 왜냐면 분명히…… 내 마음속에서, 솟아올랐어── 같은……）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（ああもうっ……！\u3000説明しなさいよチンチクリン──って思ったら、いつの間にかあの魔女もいなくなってるし……！）"
translation = "（아아 정말……! 설명하라고 땅꼬마야── 라고 생각했더니, 어느새 그 마녀도 사라지고 없고……!）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……？\u3000ヴィーナス……？」"
translation = "「……? 비너스……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは露骨に目線を逸らしていた。"
translation = "비너스는 노골적으로 시선을 피하고 있었다."

[[dialogue]]
speaker = "unk"
original = "なぜか外を行き交う人たちからも、『忘れた』『何があったんだっけ』などの声が口々に聞こえてくる。"
translation = "왠지 모르게 밖을 오가는 사람들로부터도, 『잊었다』 『무슨 일 있었더라』 등의 목소리가 입에서 입으로 들려온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「店を出ようか。そろそろ、ヴィーナスのため息も減ってくれたかな」"
translation = "「가게를 나가자. 슬슬, 비너스의 한숨도 줄어들었으려나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！\u3000あ、あたぼうよ！\u3000めちゃんこリフレッシュできたってんでい！」"
translation = "「! 아, 당연하지! 엄청나게 리프레시 되었다고!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「妙なテンションになってないか……？」"
translation = "「이상한 텐션이 된 거 아니야……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まあま──それよりほら、お会計しなくちゃよね！」"
translation = "「자자── 그보다 봐, 계산해야지!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フ──それなら大丈夫」"
translation = "「흐── 그건 괜찮아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう済ませておいたからな」"
translation = "「이미 끝내 뒀으니까」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは『お出かけ』を終え──"
translation = "그렇게 우리들은 『외출』을 마치고──"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスにとっても、ちょうどいいリフレッシュの機会になってくれたようだった。"
translation = "비너스에게도, 딱 좋은 리프레시 기회가 되어준 듯했다."

[[dialogue]]
speaker = "unk"
original = "ただ……"
translation = "다만……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……？\u3000どうしたヴィーナス、俺のほうばっかり見つめて」"
translation = "「……? 왜 그래 비너스, 내 쪽만 계속 쳐다보고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！？\u3000なな、なんでもない！」"
translation = "「!? 아, 아무것도 아니야!」"

[[dialogue]]
speaker = "unk"
original = "ため息の回数が減った代わり──不審な挙動を取るようになってしまったのが気がかりだった。"
translation = "한숨 횟수가 줄어든 대신── 수상한 행동을 취하게 된 것이 마음에 걸렸다."

[[dialogue]]
speaker = "unk"
original = "俺の秘技『トイレ行ってる間にサラッと会計』がスマートすぎたのだろうか……？"
translation = "내 비기 『화장실 간 사이에 슬쩍 계산』이 너무 스마트했던 걸까……?"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ふう」"
translation = "「……후우」"

[[dialogue]]
speaker = "unk"
original = "今日はいろいろ歩き回って疲れた──が、まだやり残したことがある。"
translation = "오늘은 이것저것 돌아다녀서 피곤했다── 하지만, 아직 해내지 못한 일이 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（さて……）"
translation = "（자……）"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスから借り受けた未来の日誌。"
translation = "비너스에게 빌린 미래의 일지."

[[dialogue]]
speaker = "unk"
original = "これを一時的にでも託してもらえること自体、信頼の証とも言えるが──"
translation = "이것을 일시적으로라도 맡을 수 있다는 것 자체가, 신뢰의 증표라고도 할 수 있지만──"

[[dialogue]]
speaker = "unk"
original = "俺にはどうしても調べたいことがあった。"
translation = "나에게는 어떻게든 조사하고 싶은 것이 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（あの出来事があってからもう二週間は経つ……いつまでも平和でありがたいとばかり、言ってられないのも確かだ……）"
translation = "（그 사건이 있고 나서 벌써 2주는 지났다…… 언제까지나 평화로워서 고맙다고만, 말할 수 없는 것도 확실하다……）"

[[dialogue]]
speaker = "unk"
original = "アポロの問題は何も解決していない。"
translation = "아폴로 문제는 아무것도 해결되지 않았다."

[[dialogue]]
speaker = "unk"
original = "むしろ、倒せばいいという話でもなくなっただけに、より混迷化していた。"
translation = "오히려, 쓰러뜨리면 된다는 이야기도 아니게 된 만큼, 더욱 혼미해지고 있었다."

[[dialogue]]
speaker = "unk"
original = "これまでヴィーナスの人生を導いてきたという謎のアイテム──"
translation = "지금까지 비너스의 인생을 이끌어왔다는 수수께끼의 아이템──"

[[dialogue]]
speaker = "unk"
original = "借りてきた『未来の日誌』を開く。"
translation = "빌려온 『미래의 일지』를 펼친다."

[[dialogue]]
speaker = "unk"
original = "そして最新のページ──今日の日付を見てみた。"
translation = "그리고 최신 페이지── 오늘의 날짜를 보았다."

[[dialogue]]
speaker = "unk"
original = "『荒鷹ノ月十五日。流星市国の安寧は今日も保たれ、私たちは平穏でかけがえのない日常を過ごしていた』"
translation = "『황응의 달 15일. 유성 시국의 안녕은 오늘도 유지되었고, 우리는 평온하고 둘도 없는 일상을 보내고 있었다』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……これだけか」"
translation = "「……이것뿐인가」"

[[dialogue]]
speaker = "unk"
original = "前後のページをめくってみても、今日の出来事に関する具体的な記述はどこにもなかった。"
translation = "앞뒤 페이지를 넘겨봐도, 오늘 일어난 일에 관한 구체적인 기술은 어디에도 없었다."

[[dialogue]]
speaker = "unk"
original = "茶屋に立ち寄ったことや、風船を探しに行ったことなんかも。"
translation = "찻집에 들렀던 일이나, 풍선을 찾으러 갔던 일 같은 것도."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（平穏な日常……か）"
translation = "（평온한 일상……인가）"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがやきもきしていたのもなんとなくわかった気がした。"
translation = "비너스가 애태우고 있었던 것도 어쩐지 알 것 같았다."

[[dialogue]]
speaker = "unk"
original = "こうして、毎日穏やかに過ごせるという保証があったからこそ──彼女はアクションを起こしたくても起こせなかったのだろう。"
translation = "이렇게, 매일 온화하게 보낼 수 있다는 보장이 있었기 때문에── 그녀는 행동을 취하고 싶어도 취할 수 없었을 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……けど）"
translation = "（……하지만）"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは──そして俺たちは──このままでいいのかという疑念がよぎる。"
translation = "비너스는── 그리고 우리들은── 이대로 괜찮은가 하는 의념이 스친다."

[[dialogue]]
speaker = "unk"
original = "それを判断するために俺は、わざわざこの宝物を借り受けてきたのだ。"
translation = "그것을 판단하기 위해 나는, 일부러 이 보물을 빌려온 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（確かめよう。この道具の真実を）"
translation = "（확인하자. 이 도구의 진실을）"

[[dialogue]]
speaker = "unk"
original = "──そう、決心した矢先のことだった。"
translation = "──그렇게, 결심한 순간이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ──え……？」"
translation = "「읏── 어……?」"

[[dialogue]]
speaker = "unk"
original = "一瞬──わずかに日誌が揺れ動いた。"
translation = "한순간── 미세하게 일지가 흔들렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000これは──もしかして……」"
translation = "「! 이건── 혹시……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「新たな日付が……増えている……」"
translation = "「새로운 날짜가…… 늘어나고 있어……」"

[[dialogue]]
speaker = "unk"
original = "期せずして俺は、未来が記される瞬間を──目の当たりにしてしまっていた。"
translation = "뜻하지 않게 나는, 미래가 기록되는 순간을── 눈앞에서 목격하고 말았다."

[[dialogue]]
speaker = "unk"
original = "次の日。"
translation = "다음 날."

[[dialogue]]
speaker = "unk"
original = "俺はさっそく、追記された日誌を持ち主のヴィーナスへ返却しにきた。"
translation = "나는 곧바로, 추가 기록된 일지를 주인인 비너스에게 반납하러 왔다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「新しい記述が増えた──ですって！？」"
translation = "「새로운 기술이 늘어났다──고요!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ」"
translation = "「아아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やったわ！\u3000これで前に進めるわね──これもクロトのおかげかしら？」"
translation = "「해냈어! 이걸로 앞으로 나아갈 수 있겠네── 이것도 쿠로토 덕분일까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「たまたまだよ。にしても──なんで朝っぱらからこんなところにいたんだ？」"
translation = "「우연이야. 그나저나── 왜 아침부터 이런 곳에 있었던 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「鍛錬に決まってるでしょ！\u3000いつ、またアポロが現れるかもわからないんだし」"
translation = "「단련하는 게 당연하잖아! 언제, 또 아폴로가 나타날지도 모르는 거고」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはトレーニング施設で仮想モンスター相手に星術を連発していた。"
translation = "비너스는 트레이닝 시설에서 가상 몬스터를 상대로 성술을 연발하고 있었다."

[[dialogue]]
speaker = "unk"
original = "表示されているスコアはＳランク複数体を９秒台──さすがだ。"
translation = "표시되고 있는 스코어는 S랭크 복수 개체를 9초대── 역시 대단하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（調子は──元に戻ってるみたいだな）"
translation = "（컨디션은── 원래대로 돌아온 것 같네）"

[[dialogue]]
speaker = "unk"
original = "昨日──"
translation = "어제──"

[[dialogue]]
speaker = "unk"
original = "茶屋を出てからというもの、ヴィーナスはどこか上の空な様子が続いていた。"
translation = "찻집을 나온 후부터, 비너스는 어딘가 멍한 모습이 계속되고 있었다."

[[dialogue]]
speaker = "unk"
original = "それも、時おり俺のことをまじまじと見つめたり、かと思えば目を逸らしたりと……"
translation = "그것도, 때때로 나를 빤히 쳐다보거나, 그러다가도 눈을 피하거나 하며……"

[[dialogue]]
speaker = "unk"
original = "調子を崩したかとも思ったが、今日の元気さを見るに特に問題はなさそうだ。"
translation = "컨디션을 망쳤나 싶었지만, 오늘의 활기참을 보니 특별히 문제는 없을 것 같다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それで──今度こそ、次に進む手がかりがわかったのかしら？」"
translation = "「그래서── 이번에야말로, 다음으로 나아갈 실마리를 알았을까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。次に打つべき一手は記されていた」"
translation = "「아아. 다음에 취해야 할 한 수는 기록되어 있었다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なら決まりね──みんなを呼びましょ！\u3000やるべきことが決まったなら、うかうかしている暇はないわ！」"
translation = "「그럼 정해졌네── 모두를 부르자! 해야 할 일이 정해졌다면, 꾸물거릴 틈은 없어!」"

