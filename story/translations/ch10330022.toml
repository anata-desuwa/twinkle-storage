[[dialogue]]
speaker = "unk"
original = "第２話,２代目、流星の騎士,P"
translation = "제2화, 2대, 유성의 기사, P"

[[dialogue]]
speaker = "unk"
original = "フィヴォス流星群の騒動が終結し、しばらくの月日が経った。色々と後始末も大変だったが、俺たち星騎士はかつての日常を取り戻しつつある。"
translation = "피보스 유성군의 소동이 종결되고, 얼마간의 세월이 흘렀다. 여러모로 사후 처리도 힘들었지만, 우리 성기사들은 이전의 일상을 되찾아가고 있다."

[[dialogue]]
speaker = "unk"
original = "その日も俺は星徒会の業務を終えて、いつもの待ち合わせ場所へと向かった──"
translation = "그날도 나는 성도회의 업무를 마치고, 평소의 약속 장소로 향했다──"

[[dialogue]]
speaker = "アニュラス"
original = "「会長！\u3000待っていたぞ。うん、私もいま来たところだ」"
translation = "「회장! 기다리고 있었다. 응, 나도 방금 온 참이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「今日は繁華街の……新しくできた喫茶店に連れて行ってくれるんだろう？\u3000楽しみだな……！」"
translation = "「오늘은 번화가의…… 새로 생긴 찻집에 데려가 주기로 했었지? 기대되는군……!」"

[[dialogue]]
speaker = "アニュラス"
original = "「最近、ひとから話しかけられることが増えてな。今日も隣のクラスの女子たちと昼食をとったんだ」"
translation = "「최근, 다른 사람이 말을 걸어오는 일이 늘어서 말이야. 오늘도 옆 반 여학생들과 점심을 먹었다」"

[[dialogue]]
speaker = "アニュラス"
original = "「仮面を着けなくなったからかな……親しみやすいとよく言われるようになった」"
translation = "「가면을 쓰지 않게 되어서일까…… 친근하게 대하기 쉽다는 말을 자주 듣게 되었어」"

[[dialogue]]
speaker = "unk"
original = "仮面は、もうずっと外すことにするの？"
translation = "가면은, 이제 계속 벗어두기로 한 거야?"

[[dialogue]]
speaker = "アニュラス"
original = "「ああ。以前まで、憧れのお父様のようになりたいと思って着け続けていたが……」"
translation = "「아아. 이전까지는, 동경하는 아버님처럼 되고 싶다고 생각해서 계속 쓰고 있었지만……」"

[[dialogue]]
speaker = "アニュラス"
original = "「霊力を受け継いで思ったんだ。大切なのは真似をすることではなく、その中身だとな」"
translation = "「영력을 이어받고 생각했다. 중요한 것은 흉내를 내는 것이 아니라, 그 알맹이라고 말이지」"

[[dialogue]]
speaker = "アニュラス"
original = "「お父様がかつて抱いていた、人々を守りたい、世界を救いたいという精神。それを受け継ぐことこそが大切だろう？」"
translation = "「아버님이 이전에 품으셨던, 사람들을 지키고 싶다, 세계를 구하고 싶다는 정신. 그것을 이어받는 것이야말로 중요하겠지?」"

[[dialogue]]
speaker = "アニュラス"
original = "「形ばかり取り繕っても、未熟な自分の慰めになるだけだと思ってな……だから外した」"
translation = "「겉모습만 꾸며봤자, 미숙한 자신의 위안이 될 뿐이라고 생각해서 말이야…… 그래서 벗었다」"

[[dialogue]]
speaker = "アニュラス"
original = "「もちろん大切な宝物には変わりないから、肌身離さず持ち歩いてはいるが……もう目元を隠すことはしないつもりだ」"
translation = "「물론 소중한 보물임에는 변함없으니, 몸에 지니고 다니기는 하지만…… 이제 눈가를 가리는 일은 하지 않을 생각이다」"

[[dialogue]]
speaker = "unk"
original = "俺もそれがいいと思う"
translation = "나도 그게 좋다고 생각해"

[[dialogue]]
speaker = "アニュラス"
original = "「ああ。お前にそう言ってもらえると嬉しいな。で……ええと、店はどっちだ。いや、東だ西だと言われてもわからん。右か左かで頼む」"
translation = "「아아. 네게 그런 말을 들으니 기쁘군. 그래서…… 에또, 가게는 어느 쪽이지. 아니, 동쪽이다 서쪽이다라고 해도 모르겠어. 오른쪽인지 왼쪽인지로 부탁하마」"

[[dialogue]]
speaker = "アニュラス"
original = "「む。モンスターか……！\u3000まったく空気の読めないやつらだな……！」"
translation = "「무. 몬스터인가……! 정말 분위기 파악 못 하는 녀석들이군……!」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「よし。討伐に行くぞ、会長！」"
translation = "「좋아. 토벌하러 가자, 회장!」"

[[dialogue]]
speaker = "unk"
original = "幸いなことに、現場に一番近かったのは俺たちだった。空を飛んで急行し、アニュラスと共にモンスターの群れへ突撃する──！"
translation = "다행히도, 현장에 가장 가까웠던 것은 우리였다. 하늘을 날아 급행하여, 아뉴라스와 함께 몬스터 무리로 돌격한다──!"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「はぁあああっ──！！」"
translation = "「하아아앗──!!」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様、アニュラス！"
translation = "수고했어, 아뉴라스!"

[[dialogue]]
speaker = "unk"
original = "よし、これで最後だ……！"
translation = "좋아, 이걸로 마지막이다……!"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「会長もサポート感謝する。おかげで被害も出なかったようだが……民間人にいくらか混乱が見られるな。声をかけていこうか」"
translation = "「회장도 서포트 감사한다. 덕분에 피해도 나오지 않은 모양이다만…… 민간인들에게 다소 혼란이 보이는군. 말을 걸고 갈까」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「──そこのお２人。怪我はないか？」"
translation = "「──거기 두 분. 다친 곳은 없나?」"

[[dialogue]]
speaker = "女の子"
original = "「うん、平気だよ！\u3000ありがとう、星騎士のお姉ちゃん！」"
translation = "「응, 괜찮아! 고마워요, 성기사 언니!」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「まさか孫娘を連れている時に襲われるとは……助かったよ。あんたは命の恩人だ……！」"
translation = "「설마 손녀딸을 데리고 있을 때 습격당할 줄이야…… 살았네. 자네는 생명의 은인이야……!」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「なに、礼には及ばない。大事なかったのなら何よりだ」"
translation = "「아니, 예의를 차릴 것 없다. 별일 없었다면 다행이군」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「──ん？\u3000あんた、その兜のように着けている仮面……もしかしてセイファートさんか……！？」"
translation = "「──음? 자네, 그 투구처럼 쓰고 있는 가면…… 혹시 세이파트 씨인가……!?」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「え……？\u3000ぁ、ああ。私の姓は確かにセイファートだが……ご老人とはどこかで会ったことがあるだろうか？」"
translation = "「에……? 아, 아아. 내 성은 분명 세이파트다만…… 어르신과는 어디선가 만난 적이 있었나?」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「いいや、あんたとは初対面だが……その仮面には見覚えがあるよ。懐かしいな、ジェラルドさんとはよく現場で会ったもんだ」"
translation = "「아니, 자네와는 초면이지만…… 그 가면에는 낯이 익어. 그립구먼, 제랄드 씨와는 자주 현장에서 만났었지」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「お父様と……！？」"
translation = "「아버님과……!?」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「ああ、私は元警官でね。星騎士の数が足りなかった頃、モンスターが現れた時は教皇庁に連絡するのが習わしだったんだ」"
translation = "「아아, 나는 전직 경찰이라네. 성기사 수가 부족했던 시절, 몬스터가 나타나면 교황청에 연락하는 게 관례였지」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「現場に一番に駆け付けるのは、いつだってあんたの親父さんだったよ。教皇庁のトラブルシューター……そう呼ばれると彼は居心地が悪そうだったがな」"
translation = "「현장에 제일 먼저 달려오는 건, 언제나 자네 부친이었어. 교황청의 트러블 슈터…… 그렇게 불리면 그는 쑥스러운 듯했지만 말이야」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「……そう、でしたか。お父様が……」"
translation = "「……그랬, 군요. 아버님이……」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「あんたは親父さんによく似ているな。可憐なお嬢さんだが、凛々しい目元がそっくりだ」"
translation = "「자네는 부친을 쏙 빼닮았군. 가련한 아가씨지만, 늠름한 눈매가 판박이야」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「その……ニュースで見たよ。親父さんのことは……残念だったね」"
translation = "「그…… 뉴스에서 봤네. 부친 일은…… 유감이었어」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「──いえ。お気になさらず」"
translation = "「──아뇨. 신경 쓰지 마십시오」"

[[dialogue]]
speaker = "女の子の祖父"
original = "「ジェラルドさんに伝えておいてくれるかい？\u3000あんたは今でも俺たち警官の憧れだ、心から感謝している──と」"
translation = "「제랄드 씨에게 전해주겠나? 자네는 지금도 우리 경찰들의 동경이라고, 진심으로 감사하고 있다고── 말일세」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「…………はいっ。必ず……」"
translation = "「…………네. 반드시……」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「……お父様、感謝されていたな」"
translation = "「……아버님, 감사받고 있었군」"

[[dialogue]]
speaker = "unk"
original = "俺だって救われた１人だよ"
translation = "나도 구원받은 사람 중 한 명이야"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「うん……ありがとう。そう言ってもらえると、私も嬉しい」"
translation = "「응…… 고맙다. 그렇게 말해주니, 나도 기뻐」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「なあ会長……お父様は最期には誤ってしまった。その事実は変えられない」"
translation = "「저기 회장…… 아버님은 마지막에는 잘못을 저질렀다. 그 사실은 변하지 않아」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「でも、だからといって、それまでの正しい行いまで偽物になるとは、思えない。いや……思いたくないと言った方が、正しいのかな」"
translation = "「하지만, 그렇다고 해서, 그때까지의 올바른 행보까지 가짜가 된다고는, 생각되지 않아. 아니…… 생각하고 싶지 않다고 하는 편이, 맞으려나」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「私は理想に燃えていた頃のお父様の想いを継ぎたい。リクリエを退けたいと願っていた、誇り高きお父様の想いを……」"
translation = "「나는 이상에 불타던 시절의 아버님의 마음을 잇고 싶다. 리크리에를 물리치고 싶다고 바랐던, 긍지 높은 아버님의 마음을……」"

[[dialogue]]
speaker = "unk"
original = "２代目の、流星の騎士に"
translation = "2대, 유성의 기사가"

[[dialogue]]
speaker = "unk"
original = "アニュラスがなるんだよ"
translation = "아뉴라스가 되는 거야"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「ああ！\u3000これから先、迷うことがあるたび……私は今日のことを思い出すことにする」"
translation = "「아아! 앞으로, 망설이는 일이 생길 때마다…… 나는 오늘의 일을 떠올리기로 하마」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
original = "「それが武骨な人間である私にできる、たった１つのことだと思うから……」"
translation = "「그것이 무뚝뚝한 인간인 내가 할 수 있는, 단 하나의 일이라고 생각하니까……」"

[[dialogue]]
speaker = "unk"
original = "輝きの違う、二振りの剣を手に誓いを新たにするアニュラス。"
translation = "광채가 다른, 두 자루의 검을 손에 쥐고 맹세를 새로이 하는 아뉴라스."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女を、誰よりもそばで支えていきたいと思うのだった──"
translation = "나는 그런 그녀를, 누구보다 곁에서 지탱해 주고 싶다고 생각하는 것이었다──"

