[[dialogue]]
speaker = "unk"
original = "御前試合でクーシェンと戦い始めた俺だったが――"
translation = "어전 시합에서 쿠셴과 싸우기 시작한 나였지만──"

[[dialogue]]
speaker = "クーシェン"
original = "「伸びろ！\u3000<ruby>如意棒<rt>にょいぼう</rt></ruby>っ！」"
translation = "「늘어나라! 여의봉!」"

[[dialogue]]
speaker = "unk"
original = "西遊記でも有名な、変幻自在に長さや大きさを変える孫悟空の武器『如意棒』。それを自身の手足のように、これまた自在に使いこなすクーシェンに、圧倒されていた。"
translation = "서유기에서도 유명한, 변환자재로 길이나 크기를 바꾸는 손오공의 무기 『여의봉』. 그것을 자신의 손발처럼, 이 또한 자유자재로 다루는 쿠셴에게 압도당하고 있었다."

[[dialogue]]
speaker = "unk"
original = "本当に強い……！"
translation = "정말 강해……!"

[[dialogue]]
speaker = "クーシェン"
original = "「ふっふ～ん♪\u3000でしょしょ～？」"
translation = "「훗후~운♪ 그렇지~?」"

[[dialogue]]
speaker = "クーシェン"
original = "「魔王もなかなかやるじゃん！\u3000ただ、今のところの手応えだと、マリオンの方が強かったかな～？」"
translation = "「마왕도 제법 하잖아! 다만, 지금까지의 느낌으로는 마리온 쪽이 더 강했으려나~?」"

[[dialogue]]
speaker = "クーシェン"
original = "「そろそろ次の手を出してくれてもいいんだよ？\u3000そっちが出さないなら――」"
translation = "「슬슬 다음 수를 내줘도 괜찮다구? 그쪽에서 안 내면──」"

[[dialogue]]
speaker = "クーシェン"
original = "「来い！\u3000<ruby>金斗雲<rt>きんとうん</rt></ruby>！！」"
translation = "「와라! 근두운!!」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、俺の視界からクーシェンの姿が消えていた。"
translation = "다음 순간, 내 시야에서 쿠셴의 모습이 사라져 있었다."

[[dialogue]]
speaker = "unk"
original = "そして一瞬で――"
translation = "그리고 찰나에──"

[[dialogue]]
speaker = "クーシェン"
original = "「残念、目が追いつかなかったみたいだね」"
translation = "「아쉽네, 눈이 못 쫓아온 모양이네」"

[[dialogue]]
speaker = "クーシェン"
original = "「大きくなれ！\u3000如意棒っ！！」"
translation = "「커져라! 여의봉!!」"

[[dialogue]]
speaker = "unk"
original = "ぐあっ！？"
translation = "구악!?"

[[dialogue]]
speaker = "unk"
original = "背後から太い石柱のような大きさになった如意棒を叩き込まれて、俺の体は吹き飛ばされていた。"
translation = "등 뒤에서 굵은 석주 같은 크기가 된 여의봉에 얻어맞아, 내 몸은 날아가고 있었다."

[[dialogue]]
speaker = "クーシェン"
original = "「ウキキ♪\u3000今のは結構、効いたんじゃない？」"
translation = "「우키키♪ 방금 건 꽤 잘 들어갔지?」"

[[dialogue]]
speaker = "unk"
original = "彼女の足元には、ふわふわと大きな『白い雲』が浮いていた。"
translation = "그녀의 발치에는 푹신하고 커다란 『하얀 구름』이 떠 있었다."

[[dialogue]]
speaker = "unk"
original = "それが金斗雲……！"
translation = "저것이 근두운……!"

[[dialogue]]
speaker = "クーシェン"
original = "「へぇ～、これも如意棒と同じで有名なんだね～。でも、速さは想像以上だったでしょ？」"
translation = "「헤에~, 이것도 여의봉처럼 유명하구나~. 하지만, 속도는 상상 이상이었지?」"

[[dialogue]]
speaker = "クーシェン"
original = "「ボクの星術『金斗雲』は、乗っている者の<b>存在</b>を無視する。だから、重さや、移動する時の風の影響も無視される」"
translation = "「내 성술 『근두운』은, 타고 있는 자의 <b>존재</b>를 무시해. 그래서 무게나, 이동할 때의 바람의 영향도 무시되지」"

[[dialogue]]
speaker = "クーシェン"
original = "「星術使いはみんな飛べるけど、この金斗雲に乗った時の速さとは比べ物にならないよ～？\u3000まあ、その分、操縦がすごく難しいんだけどね♪」"
translation = "「성술사는 모두 날 수 있지만, 이 근두운을 탔을 때의 속도와는 비교도 안 된다구~? 뭐, 그만큼 조종이 엄청 어렵긴 하지만♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「さて、どうする魔王？\u3000最初の加速を見切れてなかったみたいだけど……そろそろ本気を出さないとボク――勝っちゃうよ？」"
translation = "「자, 어떻게 할래 마왕? 첫 가속을 못 읽은 모양인데…… 슬슬 본 실력을 내지 않으면 나── 이겨버린다?」"

[[dialogue]]
speaker = "クーシェン"
original = "「――うん？\u3000力を出したくても、今は事情があって使えない？\u3000そうなの？」"
translation = "「──응? 힘을 내고 싶어도, 지금은 사정이 있어서 못 쓴다구? 그래?」"

[[dialogue]]
speaker = "クーシェン"
original = "「ふ～ん、そっか～。世界を救ったっていう凄い力が見られないのは残念……。期待してたんだけどな～」"
translation = "「흐음, 그렇구나~. 세계를 구했다는 대단한 힘을 못 보는 건 아쉽네……. 기대하고 있었는데 말야~」"

[[dialogue]]
speaker = "unk"
original = "だけど……"
translation = "하지만……"

[[dialogue]]
speaker = "クーシェン"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker = "unk"
original = "絶対に負けないという気持ちだけは、本物だ"
translation = "절대로 지지 않겠다는 마음만큼은 진짜다"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトーッ！！！」"
translation = "「쿠로토!!!」"

[[dialogue]]
speaker = "unk"
original = "とその時、聞き慣れた彼女の声が、俺の耳に届く。"
translation = "그때, 익숙한 그녀의 목소리가 내 귀에 닿는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「相手がどんなに強かろうと――」"
translation = "「상대가 아무리 강하더라도──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王なら、気合いで勝ってみせなさいっ！！！」"
translation = "「마왕이라면, 기합으로 이겨보라고!!!」"

[[dialogue]]
speaker = "クーシェン"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "クーシェン"
original = "「ウキキ♪\u3000いいね、目を見たら伝わってきたよ。魔王――キミの本当の<b>強さ</b>ってやつが」"
translation = "「우키키♪ 좋네, 눈을 보니까 전해졌어. 마왕── 너의 진짜 <b>강함</b>이라는 게」"

[[dialogue]]
speaker = "クーシェン"
original = "「ならボクも、本気の本気を見せちゃおうかな。よっと――」"
translation = "「그럼 나도, 진짜 중의 진짜를 보여줘 버릴까. 영차──」"

[[dialogue]]
speaker = "unk"
original = "そう言って、クーシェンは綺麗な髪を１本引き抜く。"
translation = "그렇게 말하며, 쿠셴은 고운 머리카락을 한 올 뽑아낸다."

[[dialogue]]
speaker = "unk"
original = "それに、ふっと息を吹きかけて、彼女は告げる。"
translation = "거기에 후, 하고 입김을 불어넣으며 그녀는 고한다."

[[dialogue]]
speaker = "クーシェン"
original = "「星術――『<ruby>身外身<rt>しんがいしん</rt></ruby>』」"
translation = "「성술── 『신외신』」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、吹きかけた髪の毛が光となって消えたかと思うと――"
translation = "다음 순간, 입김을 불어넣은 머리카락이 빛이 되어 사라졌나 싶더니──"

[[dialogue]]
speaker = "クーシェン"
original = "「さあさあ、ここからは正真正銘、隠し球なし、全力勝負だよ！」"
translation = "「자 자, 여기서부터는 정통파, 숨은 패 없이 전력 승부야!」"

[[dialogue]]
speaker = "unk"
original = "ゆらりと幻が現れるように、クーシェンの分身が次々と現れていく。その数は１０を超え――１６体にまで増える。"
translation = "흔들리며 환영이 나타나듯, 쿠셴의 분신이 차례차례 나타나기 시작한다. 그 수는 10을 넘어── 16체까지 늘어난다."

[[dialogue]]
speaker = "unk"
original = "孫悟空の、分身の術……！"
translation = "손오공의, 분신의 술법……!"

[[dialogue]]
speaker = "クーシェン"
original = "「数ではマリオンに負けるけど、全員如意棒も金斗雲も使えるから、１体１体の強さなら負けないよ？」"
translation = "「수로는 마리온에게 밀리지만, 전원 여의봉도 근두운도 쓸 수 있으니까, 한 명 한 명의 강함이라면 지지 않는다구?」"

[[dialogue]]
speaker = "クーシェン"
original = "「さあ、魔王――本気で勝負だ！！！」"
translation = "「자, 마왕── 진심으로 승부다!!!」"

[[dialogue]]
speaker = "unk"
original = "俺は再び立ち上がり、彼女の動きを見逃さぬように集中して、拳を構えるのだった――"
translation = "나는 다시 일어서서, 그녀의 움직임을 놓치지 않도록 집중하며 주먹을 쥐는 것이었다──"

