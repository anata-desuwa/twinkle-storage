[[dialogue]]
speaker = "unk"
original = "第２話,最後の稽古,B"
translation = "제2화, 마지막 수련, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "俺は当て所もなくフィーニスの塔へやってきていた。"
translation = "나는 목적 없이 피니스의 탑에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "何度もこの周辺は調査しているが、やはり残された手がかりはない。"
translation = "몇 번이고 이 주변을 조사했지만, 역시 남겨진 단서는 없다."

[[dialogue]]
speaker = "unk"
original = "そこへ……"
translation = "그곳에……"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──憔悴か」"
translation = "「──초췌하군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000セイファート──学園長……」"
translation = "「! 세이퍼트── 학원장……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「激戦の後だ。今は教師陣に任せ、少しは休養しておくといい」"
translation = "「격전 후다. 지금은 교사진에게 맡기고, 잠시 휴양하는 것이 좋을 것이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ご忠告痛み入ります。ただ……今はとても、落ち着いていられる精神状態じゃないんですよ」"
translation = "「……충고 감사드립니다. 다만…… 지금은 도저히, 진정하고 있을 정신 상태가 아닙니다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「君にとって……本当に大切な存在のようだな」"
translation = "「자네에게…… 정말로 소중한 존재인 듯하군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ええ。──俺を星徒会長にしてくれたのも、彼女ですから」"
translation = "「……예. ──저를 성도 회장으로 만들어 준 것도, 그녀니까요」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「御前試合か。懐かしいな」"
translation = "「어전 시합인가. 그립군」"

[[dialogue]]
speaker = "unk"
original = "御前試合。"
translation = "어전 시합."

[[dialogue]]
speaker = "unk"
original = "あれが日誌に組み込まれた既定の運命だったとしても、俺にとって最大の岐路だったのには違いない。"
translation = "그것이 일지에 짜여진 규정된 운명이었다고 해도, 나에게 있어 최대의 기로였던 것은 틀림없다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「大切な仲間と巡り会えたなら喜ばしいことだ」"
translation = "「소중한 동료와 만날 수 있었다면 기쁜 일이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい。大切な仲間……かけがえのない……ただ」"
translation = "「네. 소중한 동료…… 둘도 없는…… 다만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……それだけじゃない。そんな気も、するんです」"
translation = "「……그것만이 아니라는. 그런 기분도, 듭니다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「む……？」"
translation = "「흠……?」"

[[dialogue]]
speaker = "unk"
original = "マトイだってアナだってサーシャ先輩だって、もちろん俺にとってみんな大切な仲間だ。"
translation = "마토이도 아나도 사샤 선배도, 물론 나에게는 모두 소중한 동료다."

[[dialogue]]
speaker = "unk"
original = "だけど、彼女だけは……"
translation = "하지만, 그녀만은……"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスだけは、俺にとって<b>特別</b>であるような気がしてならなかった。"
translation = "비너스만은, 나에게 <b>특별한</b> 존재인 것만 같았다."

[[dialogue]]
speaker = "unk"
original = "出会った時から……ずっと。"
translation = "만났을 때부터…… 줄곧."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──そうだ。お願いがあります、学園長」"
translation = "「──그렇다. 부탁이 있습니다, 학원장님」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「何かな」"
translation = "「무엇인가」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は弱い」"
translation = "「저는 약합니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あなたに……強くあれと言われたあの日から。俺なりに成長はしたつもりでいたけど、まだ足りない」"
translation = "「당신에게…… 강해지라고 들었던 그날부터. 나름대로 성장은 했다고 생각했지만, 아직 부족합니다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……見違えたと思ったがな」"
translation = "「……몰라보게 달라졌다고 생각했는데」"

[[dialogue]]
speaker = "unk"
original = "そう思ってもらえるのは何より。"
translation = "그렇게 생각해주시는 것은 무엇보다 기쁜 일이다."

[[dialogue]]
speaker = "unk"
original = "だが、今の体たらくじゃ俺自身がとても納得できない。だから。"
translation = "하지만, 지금의 이 꼴로는 나 자신이 도저히 납득할 수 없다. 그래서."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──稽古をつけてくれませんか。セイファート学園長」"
translation = "「──수련을 시켜주시겠습니까. 세이퍼트 학원장님」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "それは俺が彼と再会して以来、初めての申し出だった。"
translation = "그것은 내가 그와 재회한 이래, 처음으로 한 부탁이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「男として……星騎士として……俺はもっと、力をつけなくちゃならないから」"
translation = "「남자로서…… 성기사로서…… 나는 더욱, 힘을 길러야 하니까요」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "学園長はじっ……と黙して俺のことを見据えていた。しばらくして──"
translation = "학원장은 じっ…… 하고 침묵하며 나를 바라보고 있었다. 잠시 후──"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──いいだろう。かつて示した道筋──再び照らしてやるのも<ruby>吝<rt>やぶさ</rt></ruby>かではない」"
translation = "「──좋다. 예전에 보여주었던 길을── 다시 비춰주는 것도 마다하지 않겠다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「胸をお借りします。あの時、授かった薫陶は──未だ忘れていませんから」"
translation = "「가르침을 받겠습니다. 그때, 받은 가르침은── 아직 잊지 않았으니까요」"

[[dialogue]]
speaker = "unk"
original = "学園長の全身から底知れぬ星力がほとばしる。"
translation = "학원장의 전신에서 헤아릴 수 없는 성력이 솟구친다."

[[dialogue]]
speaker = "unk"
original = "通常は、大人になるにつれて衰えていくという力も──この人の規格外さには及ばないようだ。"
translation = "통상적으로는, 어른이 될수록 쇠퇴한다는 힘도── 이 사람의 규격 외에는 미치지 못하는 듯하다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「加減は無用。御前試合の時に見せた片鱗も合わせて──全霊をもって挑んでくるがいい」"
translation = "「가감은 불필요하다. 어전 시합 때 보여준 일면도 합쳐서── 전력을 다해 덤벼오도록」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええ──遠慮なくいかせてもらいます。──おおおおっ！」"
translation = "「예── 사양하지 않겠습니다. ──오오오오옷!」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は、やりきれない思いと共に星力を解放した……。"
translation = "그렇게 나는, 풀리지 않는 마음과 함께 성력을 해방했다……."

