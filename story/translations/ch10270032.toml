[[dialogue]]
speaker = "unk"
original = "第２話,お肌のケアは大事です,P"
translation = "제2화, 피부 케어는 중요합니다, P"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「さ～、お願いします、会長ちゃん」"
translation = "「자~ 부탁해, 회장님」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「日焼けしちゃわないように、サランの全身に塗ってね～♪」"
translation = "「햇볕에 타지 않게 사란의 전신에 발라줘~♪」"

[[dialogue]]
speaker = "unk"
original = "時は少し遡る。"
translation = "시간은 조금 거슬러 올라간다."

[[dialogue]]
speaker = "unk"
original = "サランに泳ぎ方を教えて欲しいとせがまれたのだが……"
translation = "사란에게 수영하는 법을 가르쳐 달라고 졸라댔는데……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「大事なこと忘れてた～」"
translation = "「중요한 걸 잊고 있었어~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サラン、お肌がとっても弱いの。だからちゃんと日焼け対策をしないと～」"
translation = "「사란, 피부가 정말 약해. 그러니까 제대로 자외선 차단을 해야 해~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いつもだったらちゃんと準備してくるんだけど、今日は急な思い付きだったから何も準備してないの……」"
translation = "「평소라면 제대로 준비해 오겠지만, 오늘은 갑자기 생각난 거라 아무것도 준비 안 했어……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だから会長ちゃん、ちょっと日焼け止めを買ってくるね～♪」"
translation = "「그러니까 회장님, 잠깐 선크림 좀 사 올게~♪」"

[[dialogue]]
speaker = "unk"
original = "そう言ってサランは売店で、日焼け止めクリームを買ってきた。"
translation = "그렇게 말하고 사란은 매점에서 선크림을 사 왔다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃん、ちょっとまっててね～」"
translation = "「회장님, 잠깐 기다려줘~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「こうやって……うんしょ、うんしょっと……それから、ぬ～り、ぬ～り……」"
translation = "「이렇게…… 영차, 영차…… 그리고 슥~슥, 슥~슥……」"

[[dialogue]]
speaker = "unk"
original = "それを早速、自身の白い肌に塗り始める。"
translation = "그것을 곧바로 자신의 하얀 피부에 바르기 시작한다."

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "하지만……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「前はこれで終わり～、後は背中の方なんだけど～……」"
translation = "「앞은 이걸로 끝~ 다음은 등 쪽인데~……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～……ん～……」"
translation = "「음~…… 음~……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「手が届かなくて、上手くぬれないの～」"
translation = "「손이 닿지 않아서 잘 안 발라져~」"

[[dialogue]]
speaker = "unk"
original = "いつもはどうしてたの？"
translation = "평소에는 어떻게 했어?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「使用人の方にお願いしてたの～。学校の水泳の授業の前は、お友達が手伝ってくれてたんだ～」"
translation = "「고용인분께 부탁했었어~. 학교 수영 수업 전에는 친구들이 도와줬고~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「１人で塗るのは初めてだから、上手く塗れなくて～。ぬ～り、ぬ～り……」"
translation = "「혼자 바르는 건 처음이라 잘 안 발라져서~. 슥~슥, 슥~슥……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～、ぬ～り、ぬ～……あっ……」"
translation = "「음~, 슥~슥, 슥~…… 앗……」"

[[dialogue]]
speaker = "unk"
original = "ぷちっ。"
translation = "툭."

[[dialogue]]
speaker = "unk"
original = "わああああああっ！！！"
translation = "으아아아아아악!!!"

[[dialogue]]
speaker = "unk"
original = "水着の内側まで塗り込もうと背中をまさぐっていた指が、うっかり留め具を外してしまう。"
translation = "수영복 안쪽까지 바르려고 등을 더듬던 손가락이 실수로 끈을 풀어버리고 만다."

[[dialogue]]
speaker = "unk"
original = "危うくサランのたわわなものが露わになってしまうところだったが、その前になんとか水着を押さえてそれを防ぐことができた。"
translation = "하마터면 사란의 풍만한 것이 드러날 뻔했지만, 그전에 어떻게든 수영복을 붙잡아 그것을 막을 수 있었다."

[[dialogue]]
speaker = "unk"
original = "そう、水着を押さえて……"
translation = "그래, 수영복을 붙잡고……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよよん？」"
translation = "「뽀요용?」"

[[dialogue]]
speaker = "unk"
original = "ご、ごめんっっっ！！！！！！"
translation = "미, 미안해!!!!!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ、大丈夫だよ～。会長ちゃんはサランの水着が脱げちゃうのを防ごうとしてくれたんだし～」"
translation = "「에헤헤, 괜찮아~. 회장님은 사란의 수영복이 벗겨지는 걸 막아주려고 한 거니까~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それに恋人同士なんだから、会長ちゃんに触られても平気だよ～♪」"
translation = "「게다가 연인 사이니까, 회장님이 만져도 괜찮아~♪」"

[[dialogue]]
speaker = "unk"
original = "サランには全く動じた様子はなく、外れた水着の留め具を付け直す。"
translation = "사란은 전혀 동요한 기색 없이 풀린 수영복 끈을 다시 고쳐 맨다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そういえば思い出したかも……サランに１人で日焼け止めを塗らせると危なっかしいから絶対に声をかけてね～、って言われてたこと」"
translation = "「그러고 보니 생각났을지도…… 사란한테 혼자 선크림 바르게 하면 위험하니까 꼭 말을 걸어줘~ 라고 들었던 거」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「こういう事故が起こっちゃうことを心配して、みんなはサランの面倒をみてくれてたんだね～」"
translation = "「이런 사고가 일어날까 봐 걱정해서 다들 사란을 돌봐줬던 거구나~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だけど今は日焼け止めを塗ってくれる人は会長ちゃん以外にいないし……」"
translation = "「하지만 지금은 선크림을 발라줄 사람이 회장님 말고는 없고……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ここは会長ちゃんにお願いするしかないよね～♪」"
translation = "「여기는 회장님한테 부탁할 수밖에 없겠네~♪」"

[[dialogue]]
speaker = "unk"
original = "塗るの、俺が？"
translation = "바르는 거, 내가?"

[[dialogue]]
speaker = "unk"
original = "…………え？"
translation = "…………에?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「うん。塗り残しが無いように全身まんべんなく塗ってね～<emoji=heart04>」"
translation = "「응. 덜 발린 곳이 없게 전신에 골고루 발라줘~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "呆然とする俺に日焼け止めを俺の手に握らせると、くるりと背中を向ける。"
translation = "망연자실한 내 손에 선크림을 쥐여주더니, 빙글 돌아 등을 돌린다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「さ、どうぞ～……」"
translation = "「자, 부탁해~……」"

[[dialogue]]
speaker = "unk"
original = "俺は唾を呑み込むと、指先にクリームを取り、それを両の手のひらに伸ばす。"
translation = "나는 침을 꿀꺽 삼키고는 손가락 끝에 크림을 덜어 그것을 양 손바닥에 폈다."

[[dialogue]]
speaker = "unk"
original = "そして、心臓をバクバクさせながら、サランの背中にそっと触れた。"
translation = "그리고 심장을 두근거리며 사란의 등에 살며시 손을 댔다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ……えへへ……ちょっとこそばゆいけど～……なんだか気持ちいい～……<emoji=heart04>」"
translation = "「응…… 에헤헤…… 조금 간지럽지만~…… 왠지 기분 좋아~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そのまま、水着の内側の方にも塗ってね～……」"
translation = "「그대로 수영복 안쪽에도 발라줘~……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃん……優しい手つきで……とっても上手……んふ……」"
translation = "「회장님…… 부드러운 손길로…… 정말 잘해…… 응후……」"

[[dialogue]]
speaker = "unk"
original = "甘い吐息やめて！！！"
translation = "달콤한 숨소리 내지 마!!!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんが気持ちよくするのが……いけないんだよ～……<emoji=heart04>」"
translation = "「회장님이 기분 좋게 하는 게…… 나쁜 거야~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "またもや煩悩と戦いながら、サランの全身にクリームを塗り終わった。"
translation = "또다시 번뇌와 싸우며 사란의 전신에 크림을 다 발랐다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「はい、それじゃ今度は会長ちゃんの番だね」"
translation = "「네, 그럼 이번에는 회장님 차례네」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「お返しにサランが塗ってあげるから、そこに座って～♪」"
translation = "「답례로 사란이 발라줄 테니까 거기 앉아~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000遠慮しなくてもいいよ、さあさあ♪」"
translation = "「뽀요? 사양하지 않아도 돼, 어서 어서♪」"

[[dialogue]]
speaker = "unk"
original = "自分で塗るから大丈夫だ、と懸命に辞退しようとしたが断り切れなかった。"
translation = "직접 바를 테니 괜찮다고 필사적으로 사양하려 했지만 거절할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "とうとう諦めた俺は、サランの柔らかい手で全身に日焼け止めを塗ってもらったのだった。"
translation = "결국 포기한 나는 사란의 부드러운 손으로 전신에 선크림을 발림 받았다."

