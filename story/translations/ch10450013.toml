[[dialogue]]
speaker = "unk"
original = "第３話,先生はワーカーホリック,P"
translation = "제3화, 선생님은 워커홀릭"

[[dialogue]]
speaker = "unk"
original = "星徒会の雑務をこなしているうち、消灯時間を過ぎてしまったある日の夜。"
translation = "성도회의 잡무를 처리하느라 소등 시간을 넘겨버린 어느 날 밤."

[[dialogue]]
speaker = "unk"
original = "俺は校内で、怪しげな人影を見つけた。ふらふらとした足取りは見るからに怪しい……"
translation = "나는 교내에서 수상한 인영을 발견했다. 비틀거리는 발걸음은 누가 봐도 수상한데……"

[[dialogue]]
speaker = "unk"
original = "モンスターではないだろうが星徒会長として見過ごすことはできない。"
translation = "몬스터는 아니겠지만 성도회장으로서 묵과할 수는 없다."

[[dialogue]]
speaker = "unk"
original = "慎重にその人影へと近づいていって──"
translation = "신중하게 그 인영에게 다가가서──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あれぇ……どうしてー……なーんで……コーヒー、飲みたいのになぁー……」"
translation = "「어라아…… 어째서어…… 왜애…… 커피, 마시고 싶은데에……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「困ったなぁ。カフェインが欲しいのになぁ……」"
translation = "「곤란하네. 카페인이 필요한데에……」"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生！？\u3000何やってるんです？"
translation = "에스메랄다 선생님!? 뭐 하고 계세요?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んー……？\u3000あ、会長さんだ、おはよぉ～！」"
translation = "「음～……? 아, 회장님이다, 안녀엉～!」"

[[dialogue]]
speaker = "unk"
original = "お……おはよう？"
translation = "안…… 안녕?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ねー。今日って何かあったかなぁ？\u3000仕事がひと段落ついたから、コーヒー飲みに来たんだけどー……」"
translation = "「있지이. 오늘 무슨 일 있었나아? 일이 일단락돼서 커피 마시러 왔는데에……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「カフェがね、開いてないの。これじゃコーヒー飲めないよー……」"
translation = "「카페가 말이야, 안 열었어. 이래선 커피 못 마셔어……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「そりゃそうです……って、えー。おかしいよぉ。だってさっき時計見たもの」"
translation = "「그야 그렇죠…… 어, 에에. 이상해애. 아까 시계 봤는걸.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「１１時だったからー……ぎりぎりモーニング食べられるかな～って……」"
translation = "「11시였으니까아…… 아슬아슬하게 모닝 세트 먹을 수 있으려나～ 하고……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「──え？\u3000夜の……１１時？」"
translation = "「──에? 밤…… 11시?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「…………あー。そう言えば真っ暗だねー……そっか、そっか……夜の方の１１時だったかー……」"
translation = "「…………아ー. 그러고 보니 캄캄하네에…… 그렇구나, 그렇구나…… 밤 11시였던 건가아……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あはは。流星学園の星徒会がね、リクリエのおんもしろいデータをいっぱいくれてね？」"
translation = "「아하하. 유성 학원의 성도회가 말이야, 리크리에의 재밌는 데이터를 잔뜩 줘서 말이지?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「よぉ～し、解析しちゃうぞ～って思ってー……それから家に帰ってなくてー……」"
translation = "「좋아아, 해석해 버릴 테다아～라고 생각해서어…… 그러고 나서 집에 안 가서어……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「最後に寝たのいつだっけ。２日くらい前に仮眠は取った……気がする。椅子に座って１５分くらい？」"
translation = "「마지막으로 잔 게 언제였더라. 이틀 전쯤에 쪽잠은 잤던…… 기분이 들어. 의자에 앉아서 15분 정도?」"

[[dialogue]]
speaker = "unk"
original = "無茶しすぎですよ、死んじゃいますよ！？"
translation = "너무 무리하시는 거 아니에요, 그러다 죽어요!?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あー、だいじょぶ、だいじょぶ。ちゃんと栄養は取ってるから」"
translation = "「아ー, 괜찮아, 괜찮아. 영양은 제대로 섭취하고 있으니까.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ラムネでしょ。チョコレートでしょ。後はエナドリとコーヒーがあればね、頭の栄養はばっちりなのよ」"
translation = "「라무네랑, 초콜릿이랑. 그다음엔 에너지 드링크랑 커피만 있으면 말이야, 머리 영양은 완벽해.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「それに私は、魔族だから。ふふふ。人間とは体の作りが違うからぁ……」"
translation = "「게다가 나는 마족이니까. 후후후. 인간과는 몸 구조가 다르니까아……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ふわぁあぁあっ……んんぅう～……」"
translation = "「후아아아아…… 으으으으음～……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「んー、でも困ったなぁ。もうちょっと続けたいのに、コーヒー飲めないのは困るなぁ……」"
translation = "「음ー, 그래도 곤란하네. 조금 더 계속하고 싶은데, 커피 못 마시는 건 곤란해애……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「……え？\u3000会長さんに付いて行ったら、コーヒー飲めるの？」"
translation = "「……에? 회장님을 따라가면 커피 마실 수 있어?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「やった～。助かっちゃう……ついてく、ついてく……」"
translation = "「야호～. 살았다…… 따라갈게, 따라갈게……」"

[[dialogue]]
speaker = "unk"
original = "流石に放っておけないし、消灯しているから学園内の部屋はほとんど施錠されている。"
translation = "차마 내버려 둘 수도 없고, 소등 시간이라 학원 내의 방은 대부분 잠겨 있다."

[[dialogue]]
speaker = "unk"
original = "寝ぼけたまま、ぽてぽてと俺の後を追いかけてくる先生。住所を聞いても「研究室が私のお家よ～♪」とか言うから埒が明かない。"
translation = "잠이 덜 깬 채로 비틀비틀 내 뒤를 쫓아오는 선생님. 주소를 물어도 「연구실이 우리 집이야～♪」 같은 소리만 하니 답이 안 나온다."

[[dialogue]]
speaker = "unk"
original = "仕方がないので──"
translation = "어쩔 수 없이──"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あれ～、ここはどこ？\u3000私はー……エスメラルダだったわね」"
translation = "「어라～, 여기는 어디? 나는ー…… 에스메랄다였지.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「流星学園寮ですわ。エスメラルダ先生」"
translation = "「유성 학원 기숙사예요. 에스메랄다 선생님.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ほんとだ。どうりで見覚えがあると思った」"
translation = "「정말이네. 어쩐지 낯이 익다 했어.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「まったく……昨夜、ゾンビみたいになった先生が緋宮会長に運ばれてきたと時は、驚いていいやら呆れていいやら」"
translation = "「정말이지…… 어젯밤, 좀비처럼 된 선생님이 히노미야 회장님에게 실려 왔을 때는 놀라야 할지 어이없어해야 할지.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「エスメラルダ先生を心配して、今朝も緋宮会長が来てますわよ」"
translation = "「에스메랄다 선생님이 걱정돼서 오늘 아침에도 히노미야 회장님이 와 계신답니다.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あ、おはよー」"
translation = "「아, 안녕ー」"

[[dialogue]]
speaker = "unk"
original = "おはよーじゃないです……"
translation = "안녕이 아니에요……"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あはは……ごめんなさい……」"
translation = "「아하하…… 미안해요……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「分析官の仕事がブラックってわけじゃなくて。むしろ私、その……お仕事が大好きでね？」"
translation = "「분석관 일이 블랙 기업 같아서 그런 게 아니라. 오히려 나, 그…… 일이 너무 좋아서 말이야?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「面白そうなデータが集まると、ついついのめり込んじゃうっていうか……」"
translation = "「재밌어 보이는 데이터가 모이면 나도 모르게 몰두해 버린달까……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「流星の学園長にも怒られたの。その破滅した生活態度を何とかしろって」"
translation = "「유성 학원장님한테도 혼났어. 그 파멸적인 생활 태도를 어떻게 좀 하라고.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「でもデータがいけないのよ。あんな気になる数値を記録するから……」"
translation = "「하지만 데이터가 나쁜 거야. 그런 신경 쓰이는 수치를 기록하니까……」"

[[dialogue]]
speaker = "unk"
original = "……反省してます？"
translation = "……반성하고 계세요?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「し、してる！\u3000してるから！」"
translation = "「하, 하고 있어! 하고 있으니까!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「や、約束。約束するわ、会長さん。もう無茶な徹夜はしないって……！」"
translation = "「야, 약속. 약속할게, 회장님. 이제 무리한 밤샘은 안 하겠다고……!」"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生はきっとまた同じことをするはずだと思い、俺はＤＩＳＣの連絡先を交換した。"
translation = "에스메랄다 선생님은 분명 또 똑같은 짓을 할 거라 생각하며, 나는 DISC 연락처를 교환했다."

[[dialogue]]
speaker = "unk"
original = "研究する前に必ず俺に一報を入れること──そうしてもらえれば、先生が徹夜するのを防ぐことができると考えたからだ。"
translation = "연구하기 전에 반드시 나에게 연락할 것── 그렇게 하면 선생님이 밤샘하는 것을 방지할 수 있을 거라 생각했기 때문이다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「大丈夫よっ！\u3000もうこんなことしない！\u3000約束するから～っ！」"
translation = "「괜찮아! 이제 이런 짓 안 해! 약속할게～!」"

[[dialogue]]
speaker = "unk"
original = "それから数週間後の深夜に、俺が彼女の研究室に突撃することになるのだけど──それはまた、別のお話。"
translation = "그로부터 몇 주 후 심야에 내가 그녀의 연구실을 습격하게 되지만── 그것은 또 다른 이야기."

