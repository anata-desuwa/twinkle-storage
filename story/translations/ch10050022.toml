[[dialogue]]
speaker = "unk"
original = "第２話,新春ストロベリー,P"
translation = "제2화, 신춘 스트로베리, P"

[[dialogue]]
speaker = "unk"
original = "神社でおみくじを引いた後、ソフィと手を繋いで繁華街の方まで足を伸ばすことにした。"
translation = "신사에서 점괘를 뽑은 뒤, 소피와 손을 잡고 번화가 쪽까지 발걸음을 옮기기로 했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「わぁ……こっちもすごい混みようですね。道路は歩行者天国になっているのに、歩きづらいくらいです」"
translation = "「와아…… 이쪽도 엄청나게 붐비네요. 도로는 보행자 천국이 되어 있는데도 걷기 힘들 정도예요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも……気づいたことがあります。会長さん、大発見かもしれません」"
translation = "「하지만…… 깨달은 게 있어요. 회장님, 대발견일지도 몰라요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「人混みに揉まれていると、寒さをあまり感じません！」"
translation = "「인파에 치이다 보니 추위를 별로 느끼지 않아요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お外にいるのに、普段より２割減くらいのコールドです。そこそこにホットという感じですね」"
translation = "「밖에 있는데도 평소보다 2할 정도는 덜 콜드(Cold)해요. 적당히 핫(Hot)하다는 느낌이네요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「今日、お出かけする前は防寒着で悩んだんです。イヤーマフとか手袋とかコートとか、どれぐらい着こんでいこうかなと……」"
translation = "「오늘 외출하기 전에는 방한복 때문에 고민했거든요. 귀도리나 장갑이나 코트나, 얼마나 껴입고 갈까 하고……」"

[[dialogue]]
speaker = "unk"
original = "そういえば軽装だね、今日は"
translation = "그러고 보니 오늘은 가벼운 차림이네"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「と、当然ですっ。いろいろ悩みましたが、ほとんど置いてきました。せっかくの晴れ着が隠れちゃいますから……」"
translation = "「다, 당연하죠. 여러모로 고민했지만 대부분 두고 왔어요. 기껏 입은 설빔이 가려져 버리니까요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんとの年明け初のお出かけですから、おめかししてるところを見て欲しかった、と言いますか……」"
translation = "「회장님과 새해 첫 외출이니까, 단장한 모습을 보여드리고 싶었다고 할까……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えへ、喜んでもらえたのなら嬉しいです……けど。ぶるぶるっ……代わりに防御力を犠牲にしてしまいました」"
translation = "「에헤, 기뻐해 주셨다면 다행이지만…… 그래도. 부르르…… 대신 방어력을 희생해 버렸어요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あまり寒さを感じないとは言いましたが、たまに吹く風はやっぱり冷たくて……コールドですっ……！\u3000何か温かいものでも食べませんか？」"
translation = "「추위를 별로 안 느낀다고는 했지만, 가끔 부는 바람은 역시 차가워서…… 콜드예요……! 뭔가 따뜻한 거라도 먹지 않을래요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おぉー……これがお汁粉、というやつですね。小豆餡の溶けたお汁に、大きめの白玉団子が３つも……！」"
translation = "「오오─…… 이게 단팥죽이라는 거군요. 팥앙금이 녹은 국물에 큼직한 새알심이 세 개나……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それにしても、繁華街に和菓子屋さんなんてあったんですね。私、パンケーキのお店ばかり調べていたので新鮮です」"
translation = "「그나저나 번화가에 화과자점이 있었군요. 저는 팬케이크 가게만 알아봐서 신선해요」"

[[dialogue]]
speaker = "unk"
original = "アナとよく来るんだ、ここ"
translation = "아나랑 자주 와, 여기"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ああ、新星の副会長さんですね。そういえば和菓子がお好きだと聞いたことがあります」"
translation = "「아아, 신성의 부회장님이시군요. 그러고 보니 화과자를 좋아하신다고 들은 적이 있어요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「デート中にしれっと他の女性の名前が出ましたが、今はこのおいしそうなお汁粉に免じて許しましょう♪」"
translation = "「데이트 중에 슬쩍 다른 여성의 이름이 나왔지만, 지금은 이 맛있어 보이는 단팥죽을 봐서 용서해 드릴게요♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それにしても、おみくじ汁粉とは不思議な名前ですね……はぅう、お椀がぬくぬくで、甘い香り……とってもホットです♪」"
translation = "「그건 그렇고, 점괘 단팥죽이라니 신기한 이름이네요…… 하우우, 그릇이 따끈따끈하고 달콤한 향기…… 정말 핫해요♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いただきます……もぐもぐっ……ん～っ♪」"
translation = "「잘 먹겠습니다…… 우물우물…… 음~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さん。白玉の中にチョコが入っていますよ。これは嬉しいサプライズですっ」"
translation = "「회장님. 새알심 안에 초코가 들어있어요. 이건 기쁜 서프라이즈네요」"

[[dialogue]]
speaker = "unk"
original = "こっちは栗の甘露煮だ"
translation = "이쪽은 밤 감로조림이야"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なるほど、だからおみくじ汁粉ですか……２つ目の白玉には……もぐ……もぐ……」"
translation = "「과연, 그래서 점괘 단팥죽인가요…… 두 번째 새알심에는…… 우물…… 우물……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あっ、いちごです……！\u3000これは当たりですね」"
translation = "「앗, 딸기예요……! 이건 당첨이네요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんの２つ目は……ぁ、何も入ってない……？\u3000そういうパターンもあるんですね」"
translation = "「회장님의 두 번째는…… 아, 아무것도 안 들어있어……? 그런 패턴도 있군요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私の３つ目、お箸で割ってみましょうか……あ、またいちごです。よろしければ会長さん、お１つどうですか？」"
translation = "「제 세 번째 거, 젓가락으로 갈라볼까요…… 아, 또 딸기예요. 괜찮으시다면 회장님, 하나 드실래요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いちご白玉、とっても美味しかったですから、おすそ分けしますよ。はい、あ～ん♪」"
translation = "「딸기 새알심, 정말 맛있었으니까 나눠 드릴게요. 자, 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "これは……美味しい！"
translation = "이거…… 맛있다!"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふ。喜んでもらえて私も嬉しいです。美味しいものはシェアしないとですからね」"
translation = "「후후. 기뻐해 주시니 저도 기뻐요. 맛있는 건 공유해야 하니까요」"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺もお返し。あーん"
translation = "그럼 나도 답례. 아앙"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えっ？\u3000あ、あのっ……はい<emoji=heart04>」"
translation = "「엣? 아, 저기…… 네 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ～んっ……<emoji=heart04>\u3000んーっ……これは柿でしょうか。控えめな甘さがお汁粉によく合っていますね」"
translation = "「아~앙…… <emoji=heart04> 음─…… 이건 감일까요. 은은한 단맛이 단팥죽이랑 잘 어울리네요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──って、何だか恥ずかしいことしちゃってる気がします……！\u3000誰かに見られてたら大変ですがっ……」"
translation = "「──랄까, 왠지 부끄러운 짓을 하고 있는 기분이 들어요……! 누가 보고 있으면 큰일인데……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「大丈夫……ですよね。これだけ人でごった返していますし、学園のお友達に見られるだなんて、そんな偶然はそうそうないでしょう」"
translation = "「괜찮……겠죠. 이렇게 사람이 북적거리는데, 학원 친구를 만나는 그런 우연은 좀처럼 없을 테니까요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──はい。お汁粉、最後まで味わってから、お外に出ましょうか」"
translation = "「──네. 단팥죽, 마지막까지 맛보고 나서 밖으로 나갈까요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ずずず……うーん。とってもホットで、甘いです。幸せです～……<emoji=heart04>」"
translation = "「후루룩…… 으음. 정말 핫하고 달콤해요. 행복해요~…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うっひゃ～♪\u3000何あれ何あれ！\u3000２人ともラブラブじゃ～ん。窓際の席であんなにイチャイチャしちゃって～♪」"
translation = "「우히햐~♪ 저거 봐 저거 봐! 둘이 아주 깨가 쏟아지네~ 창가 자리에서 저렇게 꽁냥거리고 말이야~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やるわねクロト……！\u3000お互いにあーんしあうだなんて、流石は私が見込んだ魔王だわ！」"
translation = "「제법이구나 쿠로토……! 서로 아앙 하고 먹여주다니, 역시 내가 눈여겨본 마왕다워!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それって魔王は関係ないよーな？」"
translation = "「그거랑 마왕은 상관없는 거 같은데~?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ともかく２人で仲良くやってるのなら、それでよーし！\u3000デートの邪魔はできないわ。ウズメ、私たちも何か食べに行くわよ！」"
translation = "「어쨌든 둘이 사이좋게 지낸다면 그걸로 좋아! 데이트를 방해할 수는 없지. 우즈메, 우리도 뭐 좀 먹으러 가자!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「オッケーです！\u3000おすすめのパフェあるんで、一緒に行きましょ♪」"
translation = "「오케이입니다! 추천하는 파르페가 있으니까 같이 가요♪」"

[[dialogue]]
speaker = "unk"
original = "その後、なぜか俺とソフィがお汁粉の食べさせあいっこをしていたことが、友人たちには余すことなく広まっており……"
translation = "그 후, 왠지 나와 소피가 단팥죽을 서로 먹여주고 있었다는 사실이 친구들에게 낱낱이 퍼졌고……"

[[dialogue]]
speaker = "unk"
original = "真面目な優等生のソフィは、顔を真っ赤にして照れるのだった──"
translation = "성실한 우등생인 소피는 얼굴을 새빨갛게 붉히며 수줍어하는 것이었다──"

