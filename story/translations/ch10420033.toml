[[dialogue]]
speaker = "unk"
original = "第３話,天使の羽に想いを込めて,P"
translation = "제3화, 천사의 날개에 마음을 담아, P"

[[dialogue]]
speaker = "unk"
original = "その日は休日で、フニが俺の家に遊びにやってきていた。"
translation = "그날은 휴일이었고, 후니가 내 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「焼き色が付いてきたら１８０℃に温度を下げて……これでよし、と」"
translation = "「구운 색이 나면 180℃로 온도를 낮추고…… 이걸로 됐어, 라고」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「後はオーブンで３０分、焼き上がりを待つだけです♪」"
translation = "「나머지는 오븐에서 30분, 다 구워지기를 기다리기만 하면 됩니다♪」"

[[dialogue]]
speaker = "unk"
original = "フニの手作り、楽しみだな"
translation = "후니가 손수 만든 거, 기대되네"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ホウちゃんから教えて貰ったアップルパイ、美味しく作れてるといいんですけど……」"
translation = "「호우짱에게 배운 애플파이, 맛있게 만들어졌으면 좋겠는데요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「とりあえず、待っている間に手が空きますので、<b>ご主人様</b>、何かして欲しいことはございますか？」"
translation = "「일단, 기다리는 동안 시간이 비니까, <b>주인님</b>, 뭔가 해줬으면 하는 일은 없으신가요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――ノヴァフォームでイチャイチャしたい？\u3000えへへ……はい<emoji=heart04>\u3000かしこまりました……♪」"
translation = "「――노바 폼으로 꽁냥거리고 싶다고요? 에헤헤…… 네<emoji=heart04> 알겠습니다……♪」"

[[dialogue]]
speaker = "unk"
original = "告白して付き合い始めた日がそうだったように、フニと恋人になってからも、２人きりの時は彼女がメイドのように振舞ってくれて、イチャイチャするようになっていた――"
translation = "고백하고 사귀기 시작한 날이 그랬듯이, 후니와 연인이 되고 나서도, 둘만의 시간에는 그녀가 메이드처럼 행동해 주며 꽁냥거리게 되어 있었다――"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「それでは、お膝の上に失礼致しますね……ご主人様<emoji=heart04>\u3000――よいしょっ」"
translation = "「그러면, 무릎 위에 실례하겠습니다…… 주인님<emoji=heart04> ――영차」"

[[dialogue]]
speaker = "unk"
original = "ご主人様呼びをしてくれながら膝の上に座ったフニ。彼女の頭を、俺は優しく撫でる。"
translation = "주인님이라고 불러주면서 무릎 위에 앉은 후니. 그녀의 머리를, 나는 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「あっ<emoji=heart04>\u3000ん……はふぅ……<emoji=heart04>\u3000えへへぇ<emoji=heart04>\u3000こうして膝の上に座りながら撫でて貰うの、すごく安心して落ち着きます……♪」"
translation = "「앗<emoji=heart04> 으음…… 하아……<emoji=heart04> 에헤헤<emoji=heart04> 이렇게 무릎 위에 앉아서 쓰다듬 받는 거, 굉장히 안심되고 편안해져요……♪」"

[[dialogue]]
speaker = "unk"
original = "試したいことがあるんだけど、いいかな？"
translation = "시험해 보고 싶은 게 있는데, 괜찮을까?"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「え？\u3000――私の羽に触りたい、ですか？\u3000はい、大丈夫ですけど……」"
translation = "「에? ――제 날개에 만지고 싶다고요? 네, 괜찮습니다만……」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「――天使の羽に気持ちを込めて触れると、その気持ちが流れ込んで伝わる？\u3000えっ、そうなんですか？」"
translation = "「――천사의 날개에 마음을 담아 만지면, 그 마음이 흘러들어와 전달된다고요? 엣, 그런 건가요?」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「私、ホウちゃんの力が目覚めた時に初めて天使の羽が生えてきたので、全然知りませんでした」"
translation = "「저, 호우짱의 힘이 눈떴을 때 처음으로 천사의 날개가 돋아났기 때문에, 전혀 몰랐어요」"

[[dialogue]]
speaker = "unk"
original = "俺もネットで調べて初めて知ったのだが、沢山の情報が出てくるので、どうやら本当のことではあるらしい。だからこそ、どんな感じか興味が湧いてしまったのだ。"
translation = "나도 인터넷으로 찾아보고 처음 알았는데, 많은 정보가 나오는 걸 보니, 아무래도 사실인 것 같았다. 그렇기에, 어떤 느낌일지 흥미가 생겨버린 것이다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「私もそれを聞いたら、興味が湧いてきちゃいました。なので、ご主人様……どうぞ試してみてくれませんか<emoji=heart04>」"
translation = "「저도 그걸 들으니, 흥미가 생겨버렸어요. 그러니, 주인님…… 부디 시험해 봐주시지 않겠어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に許してくれるので、俺はお言葉に甘えて、そっと背中の羽を撫でる。"
translation = "그렇게 허락해 주기에, 나는 그 말에 응하여, 살짝 등 쪽의 날개를 쓰다듬는다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「あっ<emoji=heart04>\u3000こ、これ……ふあぁっ<emoji=heart04>\u3000す、すごいです……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 이, 이거…… 후아앗<emoji=heart04> 스, 굉장해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "伝わっているかな……？"
translation = "전달되고 있을까……?"

[[dialogue]]
speaker = "unk"
original = "俺がどのくらいフニを想っているか"
translation = "내가 후니를 얼마나 생각하는지"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「は、はい<emoji=heart04>\u3000わかります……<emoji=heart04>\u3000本当に羽からご主人様の気持ちが流れ込んでくる感じがして……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「네, 네<emoji=heart04> 알겠어요……<emoji=heart04> 정말로 날개에서 주인님의 마음이 흘러들어오는 느낌이 들어서……<emoji=heart04> 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ご主人様からいっぱい愛されてるのが、伝わってきます……<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「주인님에게 잔뜩 사랑받고 있는 게, 전해져 와요……<emoji=heart04> 읏…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「羽に触れた手を通して、心が繋がっている感じがして、温かくて幸せな気持ちになっちゃいます……<emoji=heart04>\u3000はふぅ……<emoji=heart04>」"
translation = "「날개에 닿은 손을 통해서, 마음이 이어져 있는 느낌이 들어서, 따뜻하고 행복한 기분이 되어 버려요……<emoji=heart04> 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「で、でも……心に直接いっぱい褒められているみたいな気恥ずかしさがあって、なまら照れちゃいます……<emoji=heart04>」"
translation = "「그, 그렇지만…… 마음에 직접 잔뜩 칭찬받는 듯한 쑥스러움이 있어서, 나마라 부끄러워져요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こちらの好きという気持ちが伝わる一方で、フニの気持ちがこちらに伝わるわけではないのは、ちょっと残念だなと思っていると――"
translation = "이쪽의 좋아한다는 마음이 전달되는 한편, 후니의 마음이 이쪽으로 전달되는 것은 아닌 점이, 조금 아쉽다고 생각하고 있을 때――"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「――それなら次は、私がご主人様をいっぱい褒めながら、その……キスするというのはどうでしょう？」"
translation = "「――그렇다면 다음은, 제가 주인님을 잔뜩 칭찬하면서, 그…… 키스하는 것은 어떨까요?」"

[[dialogue]]
speaker = "unk"
original = "え？\u3000もしかして……伝わっちゃった？"
translation = "에? 혹시…… 전달되어 버렸나?"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「えへへ……なんとなくですけど、そんな感じがしました♪」"
translation = "「에헤헤…… 어렴풋이입니다만, 그런 느낌이 들었어요♪」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「あと……私も、ご主人様にいっぱい好きって気持ちを流し込まれちゃったので……」"
translation = "「그리고…… 저도, 주인님에게 잔뜩 좋아한다는 마음을 흘려 넣어져 버렸기 때문에……」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「わ、私自身も……キスしたいって気持ちになっちゃってて……<emoji=heart04>」"
translation = "「저, 저 자신도…… 키스하고 싶다는 기분이 되어 버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛い恋人にそんなことを言われれば、断る選択などあるはずもなく。"
translation = "귀여운 연인에게 그런 말을 들으면, 거절할 선택지 따위 있을 리도 없고."

[[dialogue]]
speaker = "unk"
original = "じゃあ……お願いしてもいいかな？"
translation = "그럼…… 부탁해도 될까?"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「はい、ご主人様<emoji=heart04>\u3000それでは……ご奉仕、させて頂きますね……<emoji=heart04>」"
translation = "「네, 주인님<emoji=heart04> 그러면…… 봉사, 해드리겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ん……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「음……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の方に向き直ったフニがそっと唇を近づけてきて……キスをする。"
translation = "내 쪽으로 몸을 돌린 후니가 살짝 입술을 가까이 가져와서…… 키스를 한다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ご主人様……いつも私に優しくして下さって、なまら好きです……<emoji=heart04>\u3000一緒に居ると、とても安心した気持ちになれます……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「주인님…… 언제나 저에게 상냥하게 대해주셔서, 나마라 좋아요……<emoji=heart04> 같이 있으면, 매우 안심되는 기분이 될 수 있어요……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「でも、同時に力強くて、男の人として頼れる部分があるのが素敵です<emoji=heart04>\u3000んちゅっ……<emoji=heart04>」"
translation = "「하지만, 동시에 힘이 넘치고, 남자로서 의지할 수 있는 부분이 있는 것이 멋져요<emoji=heart04> 음쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「星騎士としてとても強いだけじゃなくて、いざという時に決して諦めない、心の強さがなまらカッコよくて、ドキドキしちゃいます……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「성기사로서 매우 강할 뿐만 아니라, 유사시에 결코 포기하지 않는, 마음의 강인함이 나마라 멋있어서, 두근거려요……<emoji=heart04> 읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ご主人様は私にとって、世界一素敵な男の人です<emoji=heart04>\u3000心からお慕いしております<emoji=heart04>\u3000ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「주인님은 저에게 있어, 세계에서 가장 멋진 남자예요<emoji=heart04> 진심으로 사모하고 있습니다<emoji=heart04> 쪽…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「んむっ……あっ<emoji=heart04>\u3000ご主人様……とてもお顔が赤くなってますよ？」"
translation = "「음뭇…… 앗<emoji=heart04> 주인님…… 얼굴이 아주 빨개지셨어요?」"

[[dialogue]]
speaker = "unk"
original = "確かに、気持ちいいかもしれない……"
translation = "확실히, 기분 좋을지도 모르겠다……"

[[dialogue]]
speaker = "unk"
original = "こ、これは、すごく照れるけど……"
translation = "이, 이건, 엄청 부끄럽지만……"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「えへへ……<emoji=heart04>\u3000ご主人様に照れてもらえるなんて、嬉しくなっちゃいます♪\u3000恋人メイドとして、また新しいご奉仕方法が見つかっちゃいましたね……<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04> 주인님께서 부끄러워해 주시다니, 기뻐져요♪ 연인 메이드로서, 또 새로운 봉사 방법을 찾아냈네요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、その時、ピピピッとキッチンの方から電子音が聞こえて来る。"
translation = "그때, 삐비빅 하고 주방 쪽에서 전자음이 들려온다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「あっ、夢中で忘れちゃってましたけど、アップルパイが焼き上がったみたいですね」"
translation = "「앗, 정신없이 잊고 있었지만, 애플파이가 다 구워진 것 같네요」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「じゃあ、次は――あ～んのご奉仕をさせて頂きますね<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「그럼, 다음은―― 아~앙 봉사를 해드리겠습니다<emoji=heart04> 읏…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、フニの作ってくれたアップルパイを食べさせてもらって、心だけじゃなくお腹も満たされながら、幸せな休日を過ごすのだった――"
translation = "그 후, 후니가 만들어 준 애플파이를 먹여 받으며, 마음뿐만 아니라 배도 채우면서, 행복한 휴일을 보내는 것이었다――"

