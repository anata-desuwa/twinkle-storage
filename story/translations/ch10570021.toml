[[dialogue]]
speaker = "unk"
original = "第１話,謎の正月遊戯,P"
translation = "제1화, 수수께끼의 정월 놀이, P"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふー、凧あげに、コマ回し、羽根つき……正月遊びも順調にノルマクリアね！」"
translation = "「후우, 연날리기에, 팽이치기, 하네츠키…… 정월 놀이도 순조롭게 할당량 클리어네!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ふぅ……すでに１年分……遊んだ気分です……」"
translation = "「후우…… 이미 1년 치는…… 논 기분입니다……」"

[[dialogue]]
speaker = "unk"
original = "正月早々、俺とトリシャさんとフィオナは、ヴィーナスの正月ミッションコンプリートを手伝わされていた。"
translation = "정월 벽두부터, 나와 트리샤 씨와 피오나는, 비너스의 정월 미션 컴플리트를 돕고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「さすがヴィーナスさん、新年から元気全開ですね。トリシャさんは楽しめてますか？」"
translation = "「역시 비너스 씨, 새해부터 기운이 넘치시네요. 트리샤 씨는 즐거우신가요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……とても……。人間界の正月遊戯……噂には聞いていましたが、体験するとまた格別です……フフフ」"
translation = "「네…… 아주…… 인간계의 정월 유희…… 소문으로는 들었습니다만, 체험해 보니 또 각별하네요…… 후후후」"

[[dialogue]]
speaker = "トリシャ"
original = "「ああ、そういえば……まだやっていない正月遊戯がありますね……一度やってみたいと思っていたのですが……皆さんはご存じでしょうか……？」"
translation = "「아아, 그러고 보니…… 아직 하지 않은 정월 유희가 있네요…… 한 번 해보고 싶다고 생각했습니다만…… 여러분은 알고 계실까요……?」"

[[dialogue]]
speaker = "unk"
original = "なんて遊び？"
translation = "「무슨 놀이?」"

[[dialogue]]
speaker = "トリシャ"
original = "「なんという名前だったでしょうか……人間界のコミックで読んだのですが……記憶が定かではなく……屋内で行う遊戯で……」"
translation = "「어떤 이름이었을까요…… 인간계의 코믹스에서 읽었습니다만…… 기억이 확실치 않아서…… 실내에서 하는 유희로……」"

[[dialogue]]
speaker = "unk"
original = "福笑い？"
translation = "「후쿠와라이?」"

[[dialogue]]
speaker = "unk"
original = "双六？"
translation = "「스고로쿠?」"

[[dialogue]]
speaker = "トリシャ"
original = "「いえ……違いますね……無数の首を捧げる……」"
translation = "「아니요…… 다릅니다…… 무수한 목(首)을 바치는……」"

[[dialogue]]
speaker = "フィオナ"
original = "「怖い怖い怖いです！\u3000なんですかそれ！？」"
translation = "「무서워 무서워 무서워요! 그게 뭔가요!?」"

[[dialogue]]
speaker = "トリシャ"
original = "「いえ……怖くはありません。極めて安全かつ健全な遊戯です……詠唱者がいまして……」"
translation = "「아니요…… 무섭지는 않습니다. 극히 안전하고도 건전한 유희입니다…… 영창자가 있어서……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「星術の詠唱かしら？」"
translation = "「성술 영창일까?」"

[[dialogue]]
speaker = "トリシャ"
original = "「不可思議かつ独特なテンポで、呪言が読み上げられます……」"
translation = "「불가사의하고도 독특한 템포로, 주언이 낭독됩니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「今のところ、不穏な要素しか出てきてませんね……」"
translation = "「지금으로선 불온한 요소밖에 안 나오고 있네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「対峙する敵よりも、いち早く呪符を奪い取り……」"
translation = "「대치하는 적보다도, 한발 앞서 주부(呪符)를 빼앗아……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「呪符……？」"
translation = "「주부……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「敵陣へと切り込むこともあり……」"
translation = "「적진으로 파고드는 일도 있고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「戦争でしょうか？\u3000雪合戦……いえ、屋内の遊戯でしたね」"
translation = "「전쟁인가요? 눈싸움…… 아니, 실내 유희라고 하셨죠.」"

[[dialogue]]
speaker = "トリシャ"
original = "「刹那の激しい戦いが繰り広げられる……そのようなゲームです……」"
translation = "「찰나의 격렬한 전투가 펼쳐지는…… 그런 게임입니다……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どんなゲームよ！？」"
translation = "「대체 어떤 게임이야!?」"

[[dialogue]]
speaker = "トリシャ"
original = "「そのような遊戯なのです……情報に誤りはないかと……」"
translation = "「그러한 유희인 것입니다…… 정보에 오류는 없을 거라고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「重要そうなキーワードを並べてみましょう。詠唱……呪符……対戦……刹那……」"
translation = "「중요해 보이는 키워드를 나열해 보죠. 영창…… 주부…… 대전…… 찰나……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「星術の模擬戦かしら。それはそれで面白そうだけど、無数の首っていうのが穏やかじゃないわね」"
translation = "「성술 모의전일까. 그건 그거대로 재밌을 것 같지만, 무수한 목이라는 게 심상치 않네.」"

[[dialogue]]
speaker = "unk"
original = "あっ、もしかして！？"
translation = "「앗, 혹시!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長、わかったのですか？」"
translation = "「히노미야 회장님, 알아내셨나요?」"

[[dialogue]]
speaker = "unk"
original = "百人一首！？"
translation = "「햐쿠닌잇슈!?」"

[[dialogue]]
speaker = "トリシャ"
original = "「ああ……それです。そのような名前でしたね……胸のつかえが取れました……ふう」"
translation = "「아아…… 그겁니다. 그런 이름이었죠…… 가슴이 뻥 뚫렸습니다…… 후우.」"

[[dialogue]]
speaker = "フィオナ"
original = "「確かに百人の首でしたね。それに短歌を詠むリズムって独特ですし、取り札に書かれている下の句も意味が分からなければ呪文のようなものですし」"
translation = "「확실히 백 명의 목(首)이었네요. 게다가 단가를 읊는 리듬은 독특하고, 토리후다에 적힌 시구도 의미를 모르면 주문 같은 법이니까요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「確かにカルタなら正月の遊びね。百人一首なら、屋敷のどこかにあったはず……えーと、どこに置いてたかしら？」"
translation = "「확실히 카르타라면 정월 놀이지. 햐쿠닌잇슈라면 저택 어딘가에 있었을 텐데…… 에또, 어디 뒀더라?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「探し物は、この小倉百人一首かな？」"
translation = "「찾는 물건은 이 오구라 햐쿠닌잇슈인가?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヘレナさん、ありがとうございます」"
translation = "「헬레나 씨, 감사합니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「せっかくだし、２チームに分かれてやってみてはどうだ？\u3000魔王とトリシャ、ヴィーナスとフィオナのチームで源平合戦だ。勝った方には私から特別お年玉を進呈しよう」"
translation = "「기왕 이렇게 된 거, 두 팀으로 나눠서 해보는 건 어떠냐? 마왕과 트리샤, 비너스와 피오나 팀으로 겐페이 합전이다. 이긴 쪽에는 내가 특별 세뱃돈을 하사하마.」"

[[dialogue]]
speaker = "フィオナ"
original = "「望むところではありますが、トリシャさんは初心者なのでは？\u3000百人一首でしたら、坊主めくりで遊ぶというのも」"
translation = "「바라던 바입니다만, 트리샤 씨는 초보자 아닌가요? 햐쿠닌잇슈라면 보즈메쿠리로 노는 방법도 있습니다만.」"

[[dialogue]]
speaker = "トリシャ"
original = "「コミックを読んでいましたので……札に書かれているいくつかのワードは記憶しています……」"
translation = "「코믹스를 읽었기에…… 패에 적힌 몇 가지 단어는 기억하고 있습니다……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それなら全力でいかせてもらうわ！\u3000やるからには負けないわよ！\u3000ヘレナちゃん、詠み手をお願いね」"
translation = "「그렇다면 전력으로 상대해 주겠어! 하는 이상 지지 않을 거야! 헬레나짱, 읊는 역할을 부탁해.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ、任された。では、往くぞ。千早ぶる～神代もきかず竜田──」"
translation = "「음, 맡겨다오. 그럼, 간다. 치하야부루~ 카미요모 키카즈 타츠타──」"

[[dialogue]]
speaker = "トリシャ"
original = "「はいっ……！」"
translation = "「하잇……!」"

[[dialogue]]
speaker = "unk"
original = "トリシャさん、ナイス！"
translation = "「트리샤 씨, 나이스!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ありがとうございます……初めて取れました……にへへ……」"
translation = "「감사합니다…… 처음으로 집었습니다…… 니헤헤……」"

[[dialogue]]
speaker = "トリシャ"
original = "「千早ぶる……神代も聞かず……竜田川……からくれなゐに……水くくるとは……でした。しかしどういった意味なのでしょう？」"
translation = "「치하야부루…… 카미요모 키카즈…… 타츠타가와…… 카라쿠레나이니…… 미즈쿠쿠루토와…… 였지요. 그런데 어떤 의미인가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「神代の時代でも、竜田川が紅に染まったことはない……紅葉の葉で赤く染まった川に感動した歌とされていますね」"
translation = "「신들의 시대에도 타츠타강이 붉게 물든 적은 없다…… 단풍잎으로 붉게 물든 강에 감동한 노래라고들 하죠.」"

[[dialogue]]
speaker = "トリシャ"
original = "「なるほど……風景に感嘆した心境を詠ったものなのですね……風情があります」"
translation = "「과연…… 풍경에 감탄한 심경을 읊은 것이군요…… 풍치가 있습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まだ下の句を詠んでいないのに、トリシャやるわね！\u3000相手にとって不足なしよ。さっきはちょっと油断しちゃったけど、次から全力で行くわ！」"
translation = "「아직 시구 뒷부분을 읊지도 않았는데, 트리샤 제법이네! 상대하기에 부족함이 없어. 방금은 좀 방심했지만, 다음부터는 전력으로 가겠어!」"

[[dialogue]]
speaker = "トリシャ"
original = "「望むところ……です……」"
translation = "「바라던 바……입니다……」"

[[dialogue]]
speaker = "unk"
original = "２人で勝ちましょう、トリシャさん！"
translation = "「둘이서 이겨보죠, 트리샤 씨!」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……あなたと勝ちたいです……。それに……みんなと遊ぶゲーム……楽しい……にへ、にへへ……♪」"
translation = "「네…… 당신과 이기고 싶어요……. 게다가…… 모두와 노는 게임…… 즐거워요…… 니헤, 니헤헤……♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「続いていくぞ。これやこの～」"
translation = "「계속하겠다. 코레야 코노~」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たちは、ヘレナちゃんの呪文詠唱による百人一首に興じたのであった。"
translation = "이렇게 우리들은 헬레나짱의 주문 영창에 의한 햐쿠닌잇슈에 흥겨워했다."

