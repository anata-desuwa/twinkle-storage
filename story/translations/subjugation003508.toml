[[dialogue]]
speaker = "unk"
original = "ミルフィーの一撃がとどめとなって、巨大ゾンビ型幽霊は断末魔と共にかき消えた。"
translation = "밀피의 일격이 결정타가 되어, 거대 좀비형 유령은 단말마와 함께 사라졌다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「やった……やったよトリシャさん！\u3000私たちの勝ちだよっ」"
translation = "「해냈어…… 해냈어 트리샤 씨! 우리의 승리야!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……さすがに疲れました……でも心地よい疲労です……」"
translation = "「후후…… 역시 지치네요…… 하지만 기분 좋은 피로입니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ゾンビ型幽霊を集めて、さらに巨大化したゾンビ型幽霊ともぴょんぴょんしながら戦ってたもんね。本当にお疲れさまだよ」"
translation = "「좀비형 유령을 모으고, 거기다 거대화한 좀비형 유령과도 뿅뿅거리며 싸웠으니까. 정말 수고 많았어.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ミルフィーさんも……八面六臂の大活躍でした……見惚れてしまうくらいに……」"
translation = "「밀피 씨도…… 팔면육비의 대활약이었습니다…… 넋을 잃고 볼 정도로……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなことないよぉ。私なんて全然ダメで……って言うのは、さすがに失礼だよね。トリシャさんにも、自分にも、一緒に戦ったみんなにも」"
translation = "「그렇지 않아아. 나 같은 건 전혀 부족해서…… 라고 하는 건 역시 실례겠지. 트리샤 씨에게도, 나 자신에게도, 같이 싸운 모두에게도.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「自信を持ってください……ミルフィーさんは立派でした……かっこいい、と思います……」"
translation = "「자신을 가지세요…… 밀피 씨는 훌륭했습니다…… 멋지다고 생각해요……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん……でもトリシャさんも同じくらいかっこよかったよ……ほんと、ずっと私の背中を守ってくれてありがとね」"
translation = "「응…… 하지만 트리샤 씨도 그만큼 멋졌어…… 정말, 계속 내 등을 지켜줘서 고마워.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「にへへ……私は自分の役目を果たしただけ、ですよ……」"
translation = "「헤헤…… 저는 제 역할을 다했을 뿐이에요……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うんっ、知ってる。でもお礼を言いたいの」"
translation = "「응, 알아. 하지만 고맙다고 말하고 싶어.」"

[[dialogue]]
speaker = "unk"
original = "心があったかいよ"
translation = "마음이 따뜻해지네"

[[dialogue]]
speaker = "unk"
original = "てぇてぇ……"
translation = "테에테에……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい……とてもてぇてぇです……」"
translation = "「네…… 무척 테에테에해요……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ソフィまでそんなこと言って……」"
translation = "「소피까지 그런 소리를……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ミルフィーさんとトリシャさんを見て、私もそう感じたから……なるほど、これがてぇてぇというものですか」"
translation = "「밀피 씨와 트리샤 씨를 보고 저도 그렇게 느꼈으니까요…… 과연, 이것이 테에테에라는 것입니까.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「まあ、言いたいことはわかるけどさぁ」"
translation = "「뭐, 무슨 말인지는 알겠지만 말이야.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆゆ……余の手下になるはずだったのに、全滅しちゃったゆ……」"
translation = "「유유유…… 유의 부하가 됐어야 했는데, 전멸해버렸구유……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ええっ？\u3000ここに来てゾンビ型幽霊の方に共感しちゃってるの？」"
translation = "「에엣? 이제 와서 좀비형 유령 쪽에 공감하고 있는 거야?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ちょびっともったいないことしたの」"
translation = "「조금 아깝게 됐구유.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そもそも最初にジャクリーヌちゃんが逃げなければ、こんなことにはならなかったと思うんだけど」"
translation = "「애초에 처음에 자클린짱이 도망치지 않았으면 이런 일은 없었을 거라 생각하는데.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「次はうまくやるの。２度と同じ失敗はしないの」"
translation = "「다음엔 잘 할 거구유. 두 번 다시 같은 실수는 안 하구유.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「懲りないなぁ」"
translation = "「정말 못 말린다니까.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆ♪」"
translation = "「유ー웃유유♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もう、ちょっとは反省しなさい！」"
translation = "「정말, 조금은 반성하세요!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆゆ～……」"
translation = "「유유유~……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あはははっ、ソフィに叱られてちっちゃくなってるし」"
translation = "「아하하하, 소피한테 혼나서 쪼그라들었네.」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌのおかげで倒せたわけだし"
translation = "자클린 덕분에 쓰러뜨릴 수 있었던 거니까"

[[dialogue]]
speaker = "unk"
original = "そのくらいで許してあげよう"
translation = "그 정도로 용서해 주자"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「知ってる？\u3000こういうのをマッチポンプって言うんだよ」"
translation = "「너 그거 알아? 이런 걸 병 주고 약 준다고 하는 거야.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうですね」"
translation = "「그렇네요.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「みんなもお疲れさま！\u3000今日はいっぱい頑張ってくれてありがとう」"
translation = "「모두 수고했어! 오늘은 정말 열심히 해줘서 고마워.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「無事解決しましたし、このあとみんなで打ち上げなんてどうかな？」"
translation = "「무사히 해결됐으니, 이따가 다 같이 뒤풀이라도 하는 건 어때?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「さんせーい！」"
translation = "「찬성ー!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もちろんトリシャさんも一緒だよ。自分には関係ないって顔してたでしょ？」"
translation = "「물론 트리샤 씨도 함께야. 자기랑은 상관없다는 표정 짓고 있었지?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そんなこと、ない……ですけど……そう見えましたか？」"
translation = "「그런 거, 아니…… 지만…… 그렇게 보였나요?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん、ちょっとだけ寂しそうだった。どうしてそう思っちゃったの？」"
translation = "「응, 조금 쓸쓸해 보였어. 왜 그렇게 생각한 거야?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「それは……事件が解決しましたから、私もミルフィーさんのオトモダチである必要はなくなって……だから、その……」"
translation = "「그건…… 사건이 해결됐으니까, 저도 밀피 씨의 친구일 필요는 없어지고…… 그래서, 그게……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「オトモじゃなくなるから、オトモダチもおしまいってこと？」"
translation = "「오토모가 아니게 되니까, 친구도 끝이라는 거야?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「…………はい、そうかな、って。そう思ったら、寂しくなってしまって……」"
translation = "「…………네, 그렇지 않을까 해서. 그렇게 생각하니 쓸쓸해져 버려서……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「おしまいじゃないよ。オトモダチは、これからも継続だから」"
translation = "「끝이 아니야. 친구는 앞으로도 계속이니까.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「トリシャさんが嫌じゃなければ、だけどね」"
translation = "「트리샤 씨가 싫지 않다면 말이지만.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「い、嫌じゃないです！\u3000私も……もっとミルフィーさんとオトモダチで……いたい、です……」"
translation = "「시, 싫지 않아요! 저도…… 좀 더 밀피 씨와 친구로…… 있고 싶어요……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私もだよ。これからもよろしくね、トリシャさん」"
translation = "「나도 그래. 앞으로도 잘 부탁해, 트리샤 씨.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「は、はいっ」"
translation = "「네, 넷.」"

[[dialogue]]
speaker = "unk"
original = "新たな友達を得たトリシャさんは満面の笑顔を浮かべている。"
translation = "새로운 친구를 얻은 트리샤 씨는 만면에 미소를 띄우고 있다."

[[dialogue]]
speaker = "unk"
original = "そして、ミルフィーもまた、トリシャさんを始めソフィア、舞亜、ウズメといった新たな友達を得た。"
translation = "그리고 밀피 또한 트리샤 씨를 비롯해 소피아, 마아, 우즈메 같은 새로운 친구들을 얻었다."

[[dialogue]]
speaker = "unk"
original = "こうして──ジャクリーヌが起こしたちょっとした騒動は結果的に大団円で幕を下ろしたのだった。"
translation = "이렇게── 자클린이 일으킨 작은 소동은 결과적으로 대단원으로 막을 내리는 것이었다."

