[[dialogue]]
speaker = "unk"
original = "第１０話,死の森にて,B"
translation = "제10화, 죽음의 숲에서, B"

[[dialogue]]
speaker = "unk"
original = "……。"
translation = "…….」"

[[dialogue]]
speaker = "unk"
original = "…………。"
translation = "…………."

[[dialogue]]
speaker = "ヴィーナス"
original = "「くぅぅぅぅッ……！」"
translation = "「크으으으으윽……!」"

[[dialogue]]
speaker = "unk"
original = "<ruby>金星<rt>ヴィーナス</rt></ruby>の波動が爆ぜる──だが、彼女の<ruby>縛<rt>いまし</rt></ruby>めが解かれることはなかった。"
translation = "금성의 파동이 터져 나온다── 하지만, 그녀의 속박이 풀리는 일은 없었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ッ……なんなのよ、この縄みたいの──全っ然ほどけないんだけど……！」"
translation = "「윽…… 뭐야, 이 밧줄 같은 거── 전!혀 풀리지 않는데……!」"

[[dialogue]]
speaker = "黒騎士"
original = "『──無駄なことだ。それは旧世界の<ruby>理<rt>ことわり</rt></ruby>によって編まれた縛鎖……星の力では抗いきれぬ』"
translation = "『──헛된 짓이다. 그것은 구세계의 이치에 의해 짜인 속박의 사슬…… 별의 힘으로는 거스를 수 없다』"

[[dialogue]]
speaker = "黒騎士"
original = "『いい加減学習するべきだな。もはや抵抗の手立てなどないということを』"
translation = "『이제 그만 학습해야 할 것이다. 더 이상 저항할 방도 따위는 없다는 것을』"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはこの地に幽閉されていた。"
translation = "비너스는 이 땅에 유폐되어 있었다."

[[dialogue]]
speaker = "unk"
original = "霊力で編まれた帯が、彼女の両手を縛りつけている。"
translation = "영력으로 짜인 띠가, 그녀의 양손을 묶고 있다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっそ……第一、どこなのよここは。<b>人間界ですらない</b>わね」"
translation = "「아, 그래…… 첫째, 여긴 어디야. <ruby>인간계조차 아니네<rt>・・・・・ ・・・</rt></ruby>」"

[[dialogue]]
speaker = "黒騎士"
original = "『フ──肌でそれを察するか。ああ』"
translation = "『흐── 피부로 그것을 감지하는가. 아아』"

[[dialogue]]
speaker = "黒騎士"
original = "『ここは魔界──リクリエに冒されし死の森・ネメシス』"
translation = "『여기는 마계── 리크리에에 침범당한 죽음의 숲, 네메시스』"

[[dialogue]]
speaker = "黒騎士"
original = "『魔界の住人さえ寄り付かない、リクリエに侵食されきった物象の末路だ』"
translation = "『마계의 주민조차 가까이하지 않는, 리크리에에 완전히 침식당한 물상의 말로다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "冥森林ネメシス──"
translation = "명삼림 네메시스──"

[[dialogue]]
speaker = "unk"
original = "魔界にてそう称されたこの森は、あらゆる自然とあらゆる生態系が戯画的までに狂っていた。"
translation = "마계에서 그렇게 칭해진 이 숲은, 모든 자연과 모든 생태계가 희화적일 정도로 미쳐 있었다."

[[dialogue]]
speaker = "unk"
original = "そして周囲に満ちる濃紫の<ruby>禍々<rt>まがまが</rt></ruby>しさを……ヴィーナスの体は覚えている。"
translation = "그리고 주위에 가득 찬 짙은 보랏빛의 불길함을…… 비너스의 몸은 기억하고 있다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（フィーニスの塔を汚染してたのと同じ……再構築の瘴気、だったかしら）"
translation = "（피니스의 탑을 오염시켰던 것과 같은…… 재구축의 장기, 였던가）"

[[dialogue]]
speaker = "ヴィーナス"
original = "（この匂いはあれと同じ──ううん、あれより濃い……！）"
translation = "（이 냄새는 그것과 같아── 아니, 그것보다 짙어……!）"

[[dialogue]]
speaker = "unk"
original = "樹皮が波のようにうごめく。枯れ木と合成された羽虫が地を這う。"
translation = "나무껍질이 파도처럼 꿈틀거린다. 마른 나무와 합성된 날벌레가 땅을 기어 다닌다."

[[dialogue]]
speaker = "unk"
original = "存在の根幹を組み替える──それこそが<ruby>再構築<rt>リクリエイション</rt></ruby>の本質。"
translation = "존재의 근간을 재조합한다── 그것이야말로 재구축의 본질."

[[dialogue]]
speaker = "unk"
original = "生命のあり方を冒涜しているような光景に、ヴィーナスは苦々しい顔をした。"
translation = "생명의 존재 방식을 모독하는 듯한 광경에, 비너스는 씁쓸한 표정을 지었다."

[[dialogue]]
speaker = "黒騎士"
original = "『──この意味がわかるな？\u3000たとえお仲間が察知してこちらへ来ようと、森へ踏み入れた瞬間<b>こうなる</b>ということだ』"
translation = "『──이 의미를 알겠나? 설령 네 동료가 감지하고 이쪽으로 오려 해도, 숲에 발을 들인 순간 <ruby>이렇게 된다<rt>・・・ ・・</rt></ruby>는 것이다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なら──あんたは私を連れ出して、何がしたいのよ……！\u3000目的はなんなの……！？」"
translation = "「그럼── 넌 나를 데리고 나와서, 뭘 하고 싶은 건데……! 목적은 뭔데……!?」"

[[dialogue]]
speaker = "黒騎士"
original = "『ふむ……私の目的──か』"
translation = "『흠…… 나의 목적──인가』"

[[dialogue]]
speaker = "unk"
original = "すると男は、一瞬考えたように視線を伏して……"
translation = "그러자 남자는, 잠시 생각하는 듯 시선을 내리깔고……"

[[dialogue]]
speaker = "黒騎士"
original = "『──おまえの目的こそなんだ？\u3000九浄の娘』"
translation = "『──네 목적이야말로 무엇이냐? 쿠죠의 딸』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私の──って、はあっ！？」"
translation = "「나의──라니, 하앗!?」"

[[dialogue]]
speaker = "unk"
original = "どうして捕まっているはずの私がそんなこと聞かれなきゃならないのか──ヴィーナスは眼力だけでそう反論した。"
translation = "어째서 붙잡혀 있어야 할 내가 그런 것을 들어야 하는지── 비너스는 눈빛만으로 그렇게 반론했다."

[[dialogue]]
speaker = "黒騎士"
original = "『おまえがただの娘でないことはわかっている。デネブより飛来せし異分子──わけもなく紛れ込んだはずがない』"
translation = "『네가 단순한 딸이 아니라는 것은 알고 있다. 데네브로부터 날아온 이분자── 별다른 이유 없이 섞여 들어왔을 리가 없다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まーた人のことデブデブって……さっきから何言ってんのかさっぱりわかんないのよ！」"
translation = "「또 사람한테 뚱보뚱보라고…… 아까부터 무슨 말을 하는 건지 통 모르겠다고!」"

[[dialogue]]
speaker = "unk"
original = "甲冑の男──黒騎士──とヴィーナスは、ここに至るまで何度も押し問答を続けていた。"
translation = "갑옷을 입은 남자── 검은 기사──와 비너스는, 여기에 이르기까지 몇 번이고 말다툼을 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "互いに理解し合うための決定的なピースが足りていないような、不自由な噛み合わなさだ。"
translation = "서로 이해하기 위한 결정적인 조각이 부족한 듯한, 불편한 불일치다."

[[dialogue]]
speaker = "黒騎士"
original = "『記憶が安定していないのか？\u3000まあいい』"
translation = "『기억이 안정되지 않은 것인가? 뭐 좋다』"

[[dialogue]]
speaker = "黒騎士"
original = "『ならば物的な証左をいただくまでだ──“未来の日誌”を持っているな？』"
translation = "『그렇다면 물적인 증거를 받아야겠다── “미래의 일지”를 가지고 있지 않나?』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "黒騎士"
original = "『渡せ。どこへ隠した。あれは、デネブの出来事が刻まれた記録のはず』"
translation = "『넘겨라. 어디에 숨겼나. 그것은, 데네브의 사건이 새겨진 기록일 터』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんであんたが日誌のこと知ってんのよ──って言いたいところだけど。あげるわけないでしょ、私の宝物なんだから」"
translation = "「왜 네가 일지에 대해 알고 있는 건데──라고 말하고 싶지만. 줄 리가 없잖아, 나의 보물인데」"

[[dialogue]]
speaker = "黒騎士"
original = "『そうか。なれば……直接漁らせてもらおう』"
translation = "『그런가. 그렇다면…… 직접 뒤져보도록 하겠다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っっ……！？」"
translation = "「크읏……!?」"

[[dialogue]]
speaker = "unk"
original = "黒騎士が手のひらを差し出し──宙を鷲掴みにする。"
translation = "검은 기사가 손바닥을 내밀고── 허공을 움켜쥔다."

[[dialogue]]
speaker = "unk"
original = "すると、霊力の縛鎖が万力のようにヴィーナスの体を締めつけていった。"
translation = "그러자, 영력의 속박 사슬이 만력처럼 비너스의 몸을 조여왔다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「──ッ──くッ、あぁぁぁッ……！」"
translation = "「──윽──크윽, 아아아앗……!」"

[[dialogue]]
speaker = "黒騎士"
original = "『無駄な抵抗と言っただろう。どこにしまおうと、こじ開けるまで』"
translation = "『헛된 저항이라고 말했을 것이다. 어디에 숨기든, 억지로 열어젖힐 때까지』"

[[dialogue]]
speaker = "unk"
original = "残る星力を自衛に費やしてしまったヴィーナスの懐から、圧縮して隠していたはずの日誌がこぼれ落ちる。"
translation = "남은 성력을 자위에 써버린 비너스의 품에서, 압축해서 숨겨두었을 일지가 흘러나온다."

[[dialogue]]
speaker = "黒騎士"
original = "『ふむ……これがデネブの日誌か。実に奇妙な……あるいはこの中に、あちら側への鍵もあるのか……』"
translation = "『흠…… 이것이 데네브의 일지인가. 실로 기묘한…… 혹은 이 안에, 저쪽으로 가는 열쇠도 있는 것인가……』"

[[dialogue]]
speaker = "unk"
original = "日誌を手に取った黒騎士は、ここではないどこかを見つめるようにして独りごちた……。"
translation = "일지를 손에 든 검은 기사는, 이곳이 아닌 어딘가를 바라보는 것처럼 혼잣말을 했다…….」"

[[dialogue]]
speaker = "黒騎士"
original = "『さて──再度、問おうか。おまえは何者だ。九浄の娘。何の目的があってこれを持ち、ここへ来た？』"
translation = "『자── 다시 한번, 묻겠다. 너는 누구냐. 쿠죠의 딸. 무슨 목적이 있어 이것을 가지고, 여기에 왔나?』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「答えることなんて……っ、ないわ……！\u3000あったとしても、アンタに屈するなんて真っ平ごめん……！」"
translation = "「대답할 것 따위…… 윽, 없어……! 있다 해도, 너에게 굴복하는 건 절대 사양이야……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アンタがいくら粘ろうと──私は絶対に音をあげないんだから！\u3000こうなったら我慢勝負よ！」"
translation = "「네가 아무리 끈질기게 굴어도── 나는 절대로 소리 내지 않을 거니까! 이렇게 된 이상 참기 싸움이야!」"

[[dialogue]]
speaker = "黒騎士"
original = "『いいや──無駄なことだ。じきにこの森も大いなる冬によって凍てつく……座してばかりでは死を待つのみだぞ』"
translation = "『아니── 헛된 짓이다. 곧 이 숲도 대자연의 겨울에 의해 얼어붙을 것이다…… 앉아만 있어서는 죽음을 기다릴 뿐이다』"

[[dialogue]]
speaker = "黒騎士"
original = "『せめて命が惜しければ──おとなしく全てを吐くことだな』"
translation = "『적어도 목숨이 아깝다면── 얌전히 모든 것을 털어놓는 것이 좋을 것이다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "（……？\u3000大いなる……冬……？）"
translation = "（……? 대자연의…… 겨울……?）"

[[dialogue]]
speaker = "unk"
original = "『ねーねー会長──魔界の気候ってどんなカンジだったの？』"
translation = "『저기저기 회장── 마계의 기후는 어떤 느낌이었어?』"

[[dialogue]]
speaker = "サーシャ"
original = "『魔界の気候？\u3000そうねえ……私の地元じゃ年に一回、大いなる冬っていうのがあったわ』"
translation = "『마계의 기후? 글쎄…… 내 고향에선 일 년에 한 번, 대자연의 겨울이라는 게 있었지』"

[[dialogue]]
speaker = "サーシャ"
original = "『もう寒いどころじゃなくて──何もかも凍りついちゃうのよ。あれは大変だったわ～』"
translation = "『이젠 추운 정도가 아니라── 모든 것이 얼어붙어 버려. 그거 정말 힘들었어~』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの脳裏に一瞬、在りし日の記憶がよぎった。"
translation = "비너스의 뇌리에 한순간, 지난날의 기억이 스쳐 지나갔다."

[[dialogue]]
speaker = "unk"
original = "それは、まだアナやクロトが入学するより前の……サーシャが会長だった頃の思い出だった。"
translation = "그것은, 아직 아나나 쿠로토가 입학하기 전의…… 사샤가 회장이었던 시절의 추억이었다."

[[dialogue]]
speaker = "黒騎士"
original = "『……まあいい。もし記憶にないのなら──整理しておくことだ。おまえがどこから来たのか』"
translation = "『……뭐 좋다. 만약 기억에 없다면── 정리해 두도록 해라. 네가 어디에서 왔는지』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "黒騎士"
original = "『そろそろ時間だ──また来る。せいぜい<ruby>思惟<rt>しい</rt></ruby>を澄ませておけ』"
translation = "『슬슬 시간이다── 다시 오겠다. 실컷 사유를 맑혀 두도록 해라』"

[[dialogue]]
speaker = "unk"
original = "そう言い残し、黒騎士は影となって消えた。"
translation = "그렇게 말하고, 검은 기사는 그림자가 되어 사라졌다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（消えた……けど、ああもう。全っ然動けやしないじゃない）"
translation = "（사라졌네…… 하지만, 아 정말. 전!혀 움직일 수가 없잖아）"

[[dialogue]]
speaker = "ヴィーナス"
original = "（ホント参ったわね──私の体力だって、無限じゃないし……はぁ、はぁ）"
translation = "（정말 곤란하네── 내 체력도, 무한은 아니고…… 하아, 하아）"

[[dialogue]]
speaker = "unk"
original = "ガーディアン──煌竜──黒騎士──"
translation = "가디언── 황룡── 검은 기사──"

[[dialogue]]
speaker = "unk"
original = "度重なる戦闘の末にここへ拉致されてきたヴィーナスは、体力も星力も万全とは程遠い状態に成り果てていた。"
translation = "거듭된 전투 끝에 이곳으로 납치되어 온 비너스는, 체력도 성력도 만전과는 거리가 먼 상태로 전락해 있었다."

[[dialogue]]
speaker = "unk"
original = "虚勢を張るべき相手もいなくなった今、その体からは絶え絶えの吐息がこぼれる。"
translation = "허세를 부려야 할 상대도 없어진 지금, 그 몸에서는 끊어질 듯한 한숨이 새어 나온다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（日誌を見れたら答えが──ううん。そんなんじゃダメ……クロトと約束したじゃない、自分の力で切り拓くんだって）"
translation = "（일지를 볼 수 있다면 답이── 아니. 그런 식으로는 안 돼…… 쿠로토와 약속했잖아, 자신의 힘으로 헤쳐나가는 거라고）"

[[dialogue]]
speaker = "unk"
original = "彼女が生来すがってきた『未来の日誌』は黒騎士の手により持ち去られてしまっていた。"
translation = "그녀가 태어날 때부터 의지해 온 『미래의 일지』는 검은 기사의 손에 의해 가져가져 버렸다."

[[dialogue]]
speaker = "unk"
original = "この先の道筋を示すものは何もない──"
translation = "이 앞의 길을 보여줄 것은 아무것도 없다──"

[[dialogue]]
speaker = "unk"
original = "今までのヴィーナスなら、とうに<ruby>悲嘆<rt>ひたん</rt></ruby>に暮れていただろう。だが。"
translation = "지금까지의 비너스라면, 진작에 비탄에 잠겼을 것이다. 하지만."

[[dialogue]]
speaker = "ヴィーナス"
original = "（……大丈夫。望みは、繋げた！）"
translation = "（……괜찮아. 희망은, 이어졌어!）"

[[dialogue]]
speaker = "unk"
original = "彼女が最後に手元まで隠し持っていたもの。"
translation = "그녀가 마지막으로 손에 숨겨 가지고 있던 것."

[[dialogue]]
speaker = "unk"
original = "それは戦闘と縛鎖、そして混沌の瘴気によりボロボロに朽ちてしまったＤＩＳＣだった。"
translation = "그것은 전투와 속박, 그리고 혼돈의 장기에 의해 너덜너덜하게 썩어버린 디스크였다."

[[dialogue]]
speaker = "unk"
original = "『未来の日誌』を強引に奪い去られた、あの時──"
translation = "『미래의 일지』를 강제로 빼앗겼던, 그때──"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはあたかも屈したような素振りを見せたが、その実、奥深くには残骸とも言えるＤＩＳＣをしまい込んでいたのだ。"
translation = "비너스는 마치 굴복한 듯한 시늉을 보였지만, 실은 깊숙한 곳에는 잔해라고도 할 수 있는 디스크를 숨겨두고 있었던 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（私が信じるべきは日誌なんかじゃなくて、あなただから──そうでしょ。クロト）"
translation = "（내가 믿어야 할 건 일지 따위가 아니라, 너니까── 그렇지. 쿠로토）"

[[dialogue]]
speaker = "クロト"
original = "『ヴィーナスは──自分が気づいてなかっただけで、ちゃんと重大な決断を下してきてるよ。一人じゃ何も決められないなんてことはない』"
translation = "『비너스는── 자신이 눈치채지 못했을 뿐, 제대로 중대한 결단을 내려왔어. 혼자서는 아무것도 결정할 수 없다는 일은 없어』"

[[dialogue]]
speaker = "クロト"
original = "『もし、それでも、寄る辺がなくて不安だっていうなら』"
translation = "『만약, 그래도, 의지할 곳이 없어서 불안하다는 거라면』"

[[dialogue]]
speaker = "クロト"
original = "『俺を頼れ』"
translation = "『나를 의지해』"

[[dialogue]]
speaker = "ヴィーナス"
original = "（ここは魔界──人間界には繋がらない。当然、魔界に他の知り合いなんていない……）"
translation = "（여기는 마계── 인간계에는 연결되지 않아. 당연히, 마계에 다른 아는 사람 따위는 없어……）"

[[dialogue]]
speaker = "ヴィーナス"
original = "（それでも、みんなを信じるなら──薄い可能性でも賭けるっきゃないでしょ……！）"
translation = "（그래도, 모두를 믿는다면── 희박한 가능성이라도 걸 수밖에 없잖아……!）"

[[dialogue]]
speaker = "unk"
original = "壊れかけのＤＩＳＣは辛うじて最低限の通信機能を保っていた。"
translation = "부서져 가는 디스크는 간신히 최소한의 통신 기능을 유지하고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし、この地の侵食によって破壊されきるのも時間の問題と思われた。"
translation = "하지만, 이 땅의 침식에 의해 파괴되어 버리는 것도 시간 문제라고 생각되었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（っ……縛りがきつくて、手が使えないわ……！\u3000でも、こうすればなんとか──！）"
translation = "（윽…… 속박이 너무 강해서, 손을 쓸 수 없어……! 하지만, 이렇게 하면 어떻게든──!）"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはわずかな星力を振り絞って──置き去りにされた自らのロッドを動かそうとする。"
translation = "비너스는 미약한 성력을 쥐어짜내── 내버려진 자신의 로드를 움직이려 한다."

[[dialogue]]
speaker = "unk"
original = "その<ruby>念動力<rt>テレキネシス</rt></ruby>にも等しい遠隔操作には、針の糸を通すようなコントロールが要求されていた。"
translation = "그 염동력에 필적하는 원격 조작에는, 바늘귀에 실을 꿰는 것과 같은 컨트롤이 요구되고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女は巧みにロッドを念のみで操り、一文字……また一文字と……器用にメッセージを打ち込んでいく。"
translation = "그녀는 교묘하게 로드를 염력만으로 조종하여, 한 글자…… 또 한 글자씩…… 능숙하게 메시지를 입력해 나간다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（チャンスはこれっきり──お願いみんな、気づいて……！）"
translation = "（기회는 이것뿐── 부탁이야 모두, 눈치채 줘……!）"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが残したメッセージ──"
translation = "비너스가 남긴 메시지──"

[[dialogue]]
speaker = "unk"
original = "その電子は、広大な魔界の海をただよい始めた……。"
translation = "그 전자는, 광대한 마계의 바다를 떠돌기 시작했다…….」"

