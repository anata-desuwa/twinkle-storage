[[dialogue]]
speaker = "unk"
original = "第２話,レミカとルルカ,P"
translation = "제2화, 레미카와 루루카"

[[dialogue]]
speaker = "unk"
original = "その日、レミカは空き教室に、とある人物を呼び出していた。"
translation = "그날 레미카는 빈 교실에 어떤 인물을 불러내고 있었다."

[[dialogue]]
speaker = "ルルカ"
original = "「失礼します。お兄ちゃん、レミカ先輩、こんにちは～♪」"
translation = "「실례합니다. 오빠, 레미카 선배, 안녕하세요~♪」"

[[dialogue]]
speaker = "unk"
original = "やって来たのは、レミカと同じ『聖歌隊』に所属する後輩でもある、新星学園１年生の<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカだった。"
translation = "찾아온 사람은 레미카와 같은 『성가대』에 소속된 후배이기도 한 신성학원 1학년 우미노베 루루카였다."

[[dialogue]]
speaker = "レミカ"
original = "「こんにちは、ルルカさん。来てくれてありがとう」"
translation = "「안녕, 루루카 씨. 와줘서 고마워」"

[[dialogue]]
speaker = "ルルカ"
original = "「いえいえ～。それで、あたしに話というのは……？」"
translation = "「아니에요~. 그래서 저에게 하실 말씀이란 건……?」"

[[dialogue]]
speaker = "unk"
original = "ちらりとこちらに視線を向けてくるルルカ。俺は彼女とも面識がある為、レミカに頼まれて、この場に同席していた。"
translation = "슬쩍 이쪽으로 시선을 보내오는 루루카. 나도 그녀와 면식이 있기 때문에 레미카의 부탁으로 이 자리에 동석하고 있었다."

[[dialogue]]
speaker = "レミカ"
original = "「うん。実は相談があってね……」"
translation = "「응. 사실 상담할 게 있어서……」"

[[dialogue]]
speaker = "レミカ"
original = "「よかったら、私と一緒に――新しいアイドルユニットを組んでくれないかなって」"
translation = "「괜찮다면 나랑 같이── 새로운 아이돌 유닛을 결성해 주지 않을래?」"

[[dialogue]]
speaker = "ルルカ"
original = "「えぇっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、あたしが……レミカ先輩と一緒にアイドル！？」"
translation = "「저, 제가…… 레미카 선배랑 같이 아이돌을요!?」"

[[dialogue]]
speaker = "レミカ"
original = "「そう。前にメルエルと『アーネスト』ってユニットを組んだ時みたいに、私と一緒に歌ってくれる相手を探してたんだ」"
translation = "「응. 예전에 멜레르랑 『어니스트』라는 유닛을 결성했을 때처럼, 나랑 같이 노래해 줄 상대를 찾고 있었어」"

[[dialogue]]
speaker = "レミカ"
original = "「私、ルルカさんの歌声は、前からいいなって思ってたの。特に最近は、歌声により磨きがかかってきてて……聴いていて、すごくアイドルの輝きを感じるんだ」"
translation = "「나, 루루카 씨의 노랫소리는 예전부터 좋다고 생각했거든. 특히 최근에는 노랫소리에 더 윤기가 나기 시작해서…… 듣고 있으면 정말 아이돌의 광채가 느껴져」"

[[dialogue]]
speaker = "ルルカ"
original = "「と、トップアイドルのレミカ先輩に、そんなふうに言ってもらえるなんて……！」"
translation = "「토, 톱 아이돌인 레미카 선배에게 그런 말을 듣다니……!」"

[[dialogue]]
speaker = "レミカ"
original = "「だからね、ルルカさんと一緒に歌ってみたいって思ったの。……どうかな？」"
translation = "「그래서 루루카 씨랑 같이 노래해 보고 싶다고 생각했어. ……어때?」"

[[dialogue]]
speaker = "ルルカ"
original = "「……すごく光栄で、嬉しいです。でも……」"
translation = "「……정말 영광이고 기뻐요. 하지만……」"

[[dialogue]]
speaker = "unk"
original = "ルルカは少し考え込むように間を置き、やがて口を開く。"
translation = "루루카는 잠시 생각에 잠긴 듯 틈을 두더니 이윽고 입을 열었다."

[[dialogue]]
speaker = "ルルカ"
original = "「……ごめんなさい」"
translation = "「……죄송해요」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたし、今は自分で頑張りたいって、強く思っていることがあって……」"
translation = "「저, 지금은 스스로 노력하고 싶다고 강하게 생각하는 게 있어서……」"

[[dialogue]]
speaker = "ルルカ"
original = "「それは、あたし１人だけの活動じゃなくて、応援してくれている人たちがいるからできることで……」"
translation = "「그건 저 혼자만의 활동이 아니라 응원해 주시는 분들이 있기에 가능한 일이라서……」"

[[dialogue]]
speaker = "ルルカ"
original = "「私は、その期待にちゃんと応えたいんです。だから……」"
translation = "「저는 그 기대에 제대로 보답하고 싶어요. 그러니까……」"

[[dialogue]]
speaker = "レミカ"
original = "「それって……Ｖチューバー活動のこと？」"
translation = "「그거…… VTuber 활동 이야기야?」"

[[dialogue]]
speaker = "ルルカ"
original = "「え゛っ……！？」"
translation = "「히익……!?」"

[[dialogue]]
speaker = "unk"
original = "俺も思わず驚いて、レミカの顔を見てしまう。"
translation = "나도 모르게 놀라서 레미카의 얼굴을 보고 만다."

[[dialogue]]
speaker = "レミカ"
original = "「私ね、『<ruby>汐<rt>うしお</rt></ruby>ルカルカ』っていうＶチューバーの歌が気に入ってて、最近よく聴いてるんだ」"
translation = "「나 말이야, 『시오 루카루카』라는 VTuber의 노래가 마음에 들어서 최근 자주 듣고 있거든」"

[[dialogue]]
speaker = "レミカ"
original = "「それで、私も歌を仕事にしてるプロだからさ……歌声を聴いてると、わかっちゃうんだよね」"
translation = "「그래서 나도 노래를 업으로 삼는 프로니까 말이야…… 노랫소리를 듣고 있으면 알게 된단 말이지」"

[[dialogue]]
speaker = "レミカ"
original = "「『汐ルカルカ』の中の人って――ルルカさんなんじゃないかって」"
translation = "「『시오 루카루카』의 안의 사람은── 루루카 씨가 아닐까 하고」"

[[dialogue]]
speaker = "ルルカ"
original = "「ぎくぅっ……！」"
translation = "「찔끔……!」"

[[dialogue]]
speaker = "unk"
original = "わかりやすく、思いっきり表情に出てしまうルルカ――良くも悪くも、彼女は正直者なのだ。"
translation = "알기 쉽게 대놓고 표정에 드러나 버리는 루루카── 좋든 싫든 그녀는 정직한 사람인 것이다."

[[dialogue]]
speaker = "レミカ"
original = "「その反応……どうやら当たりみたいだね」"
translation = "「그 반응…… 아무래도 정답인 모양이네」"

[[dialogue]]
speaker = "ルルカ"
original = "「う……！\u3000そ、その……はい……そうです……」"
translation = "「으……! 그, 그게…… 네…… 맞아요……」"

[[dialogue]]
speaker = "unk"
original = "観念したように、ルルカは小さく頷く。"
translation = "체념한 듯 루루카는 작게 고개를 끄덕인다."

[[dialogue]]
speaker = "レミカ"
original = "「あとさ……じ～っ……会長もこのこと、知ってたでしょ？」"
translation = "「그리고 말이야…… 지긋── 회장도 이 사실 알고 있었지?」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!? "

[[dialogue]]
speaker = "レミカ"
original = "「やっぱり。まぁ……会長のことはひとまず置いておいて――」"
translation = "「역시나. 뭐…… 회장 이야기는 일단 제쳐두고──」"

[[dialogue]]
speaker = "レミカ"
original = "「……ルルカさんは、ルカルカとしての活動があるから、アイドルユニットは難しいってことでいいのかな？」"
translation = "「……루루카 씨는 루카루카로서의 활동이 있으니까 아이돌 유닛은 어렵다는 걸로 이해하면 될까?」"

[[dialogue]]
speaker = "ルルカ"
original = "「そ、それもありますけど……」"
translation = "「그, 그것도 있습니다만……」"

[[dialogue]]
speaker = "ルルカ"
original = "「あとは……あたしが、レミカ先輩と並んで歌うなんて、恐れ多いというか……」"
translation = "「그 외에는…… 제가 레미카 선배와 나란히 노래한다니 가당치도 않다고나 할까……」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたし、自分にはレミカ先輩ほどの歌の才能はないって思っていて……」"
translation = "「저는 저에게 레미카 선배만큼의 노래 재능은 없다고 생각하고 있어서……」"

[[dialogue]]
speaker = "レミカ"
original = "「それ、誰かに言われたの？」"
translation = "「그거 누가 말해준 거야?」"

[[dialogue]]
speaker = "ルルカ"
original = "「え……？\u3000いえ……自分で、先輩の歌を聴いていて、そう感じたというか……」"
translation = "「에……? 아니요…… 스스로 선배의 노래를 듣고 그렇게 느꼈다고나 할까……」"

[[dialogue]]
speaker = "レミカ"
original = "「だったら、そんなのは思い込みだから、気にしなくていいよ」"
translation = "「그렇다면 그런 건 지레짐작이니까 신경 쓰지 않아도 돼」"

[[dialogue]]
speaker = "レミカ"
original = "「私は――ルルカさんには歌の才能があると思ってる」"
translation = "「나는── 루루카 씨에게는 노래 재능이 있다고 생각해」"

[[dialogue]]
speaker = "レミカ"
original = "「だって私、ルカルカ……ルルカさんの歌を聴いて、一緒に歌ってみたいって、心が動かされたんだから」"
translation = "「그도 그럴게 나, 루카루카…… 루루카 씨의 노래를 듣고 같이 노래해 보고 싶다고 마음이 움직였으니까」"

[[dialogue]]
speaker = "ルルカ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「レミカ先輩が……あたしの歌で……」"
translation = "「레미카 선배가…… 제 노래로……」"

[[dialogue]]
speaker = "レミカ"
original = "「ルルカさんは、私とは違う歌を唄うことができる。そして、その歌はちゃんと評価されてる」"
translation = "「루루카 씨는 나와는 다른 노래를 부를 수 있어. 그리고 그 노래는 제대로 평가받고 있어」"

[[dialogue]]
speaker = "レミカ"
original = "「動画の再生数やコメントを見れば、どれだけ人の心に響いているかわかるよ。ルルカさんは、私も含めて、ちゃんと誰かの心に届く歌を唄えてる」"
translation = "「동영상 재생 수나 댓글을 보면 얼마나 사람들의 마음에 울리고 있는지 알 수 있어. 루루카 씨는 나를 포함해서 제대로 누군가의 마음에 닿는 노래를 부르고 있어」"

[[dialogue]]
speaker = "ルルカ"
original = "「レミカ先輩……！\u3000ありがとうございます……そう言ってもらえて、すごく嬉しいです……♪」"
translation = "「레미카 선배……! 감사합니다…… 그렇게 말씀해 주셔서 정말 기뻐요……♪」"

[[dialogue]]
speaker = "レミカ"
original = "「それでね……ルルカさんがルカルカだって分かった上で――」"
translation = "「그래서 말이야…… 루루카 씨가 루카루카라는 걸 안 상태에서──」"

[[dialogue]]
speaker = "レミカ"
original = "「私は、Ｖチューバーとして、アイドルユニットを組んでみたいって思ってるんだ」"
translation = "「나는 VTuber로서 아이돌 유닛을 결성해 보고 싶다고 생각하고 있어」"

[[dialogue]]
speaker = "ルルカ"
original = "「え？\u3000それって……」"
translation = "「에? 그건……」"

[[dialogue]]
speaker = "レミカ"
original = "「実は私も、別の姿でＶチューバー活動をしてみたいと思ってて――」"
translation = "「사실 나도 다른 모습으로 VTuber 활동을 해보고 싶다고 생각해서──」"

[[dialogue]]
speaker = "unk"
original = "それからレミカは、こどもの日を巡る一件について、ルルカに詳しく説明した。"
translation = "그러고 나서 레미카는 어린이날을 둘러싼 일에 대해 루루카에게 자세히 설명했다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――で、これが私が新しく変身できるようになった、リトルフォームなんだ」"
translation = "「──그래서 이게 내가 새로 변신할 수 있게 된 리틀 폼이야」"

[[dialogue]]
speaker = "ルルカ"
original = "「わぁ～っ！！\u3000小さくなったレミカ先輩、すっごく可愛い～！」"
translation = "「와아~!! 작아진 레미카 선배, 정말 귀여워요~!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ありがとう。それでね、アイドルユニットを組むなら、一応コンセプトも考えてて……」"
translation = "「고마워. 그래서 말이야, 아이돌 유닛을 결성한다면 일단 컨셉도 생각해 뒀는데……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ルカルカに合わせて、『妹キャラ』で行こうかなって考えてるんだ」"
translation = "「루카루카에 맞춰서 『여동생 캐릭터』로 갈까 생각 중이야」"

[[dialogue]]
speaker = "ルルカ"
original = "「えっ！？\u3000レミカ先輩が妹キャラを！？」"
translation = "「엣!? 레미카 선배가 여동생 캐릭터를요!?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「この前、会長と出かけた時に、妹キャラで１日過ごしてみたんだけど……反応がすごく良かったんだ」"
translation = "「얼마 전에 회장과 외출했을 때 여동생 캐릭터로 하루를 보내봤는데…… 반응이 정말 좋았거든」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ね？\u3000<b>兄さん</b>♪」"
translation = "「그치? <b>오빠</b>♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「なっ……！\u3000お兄ちゃん、まさか本当は妹が性癖だったの！？」"
translation = "「헉……! 오빠, 설마 사실은 여동생이 성적 취향이었어!?」"

[[dialogue]]
speaker = "unk"
original = "確かに可愛いとは言ったけども！"
translation = "확실히 귀엽다고는 했지만!"

[[dialogue]]
speaker = "unk"
original = "待て待て！"
translation = "기다려 기다려!"

[[dialogue]]
speaker = "unk"
original = "俺が元々好きになったのは大きいレミカの方なのであって、性癖と言われるのは、誤解が過ぎる！"
translation = "내가 원래 좋아하게 된 건 큰 쪽의 레미카인 것이고, 성적 취향이라고 하는 건 오해가 너무 심해!"

[[dialogue]]
speaker = "ルルカ"
original = "「でも、レミカ先輩が『妹同盟』に参加してくれるなら、すごく面白そうかも♪」"
translation = "「하지만 레미카 선배가 『여동생 동맹』에 참가해 준다면 정말 재미있을 것 같네요♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「妹同盟……？\u3000そんなのがあるの？」"
translation = "「여동생 동맹……? 그런 게 있어?」"

[[dialogue]]
speaker = "ルルカ"
original = "「はい！\u3000妹っぽい子たちを集めて、チャットグループでよくやり取りしてるんですよ♪」"
translation = "「네! 여동생 같은 아이들을 모아서 채팅 그룹으로 자주 연락하고 있거든요♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「レミカ先輩も、せっかくですし参加しませんか？\u3000そのリトルフォームなら、新しい妹仲間として大歓迎です♪」"
translation = "「레미카 선배도 이왕이면 참가하지 않을래요? 그 리틀 폼이라면 새로운 여동생 동료로서 대환영이에요♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「妹同盟……うん、面白そう。可愛さの研究にもなりそうだし」"
translation = "「여동생 동맹…… 응, 재미있을 것 같네. 귀여움 연구에도 도움이 될 것 같고」"

[[dialogue]]
speaker = "ルルカ"
original = "「じゃあ、このあと招待送りますね♪」"
translation = "「그럼 이따가 초대 보낼게요♪」"

[[dialogue]]
speaker = "unk"
original = "こうしてレミカは、妹同盟に参加したり、Ｖチューバーとしてコラボして歌ったりと――"
translation = "이렇게 해서 레미카는 여동생 동맹에 참가하거나 VTuber로서 콜라보 노래를 부르는 등──"

[[dialogue]]
speaker = "unk"
original = "この日をきっかけに、以前よりもルルカと親交を深めていくことになるのだった。"
translation = "이날을 계기로 이전보다 루루카와 친교를 깊게 쌓아가게 되는 것이었다."

