[[dialogue]]
speaker = "unk"
original = "第１話,ノヴァしちゃってるアナ,P"
translation = "제1화, 노바해버리고 있는 아나, P"

[[dialogue]]
speaker = "unk"
original = "先日のギガンドムの一件で、アナは遂にノヴァフォームに覚醒することができた。"
translation = "지난번 기간돔 건으로 아나는 드디어 노바 폼으로 각성할 수 있었다."

[[dialogue]]
speaker = "unk"
original = "俺の恋人で、新星星徒会の副会長でもあるアナ。"
translation = "나의 연인이자 신성 성도회의 부회장이기도 한 아나."

[[dialogue]]
speaker = "unk"
original = "ノヴァフォーム覚醒を経て、さらにお互いの絆の強さを実感した俺たちは、常に一緒にいることが日常となっていた――"
translation = "노바 폼 각성을 거쳐 더욱 서로의 유대감을 실감한 우리들은 항상 함께 있는 것이 일상이 되어 있었다──"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「模擬戦闘、ノープロブレム。会長、今日も訓練に付き合っていただけて嬉しいです」"
translation = "「모의 전투, 노 프로블럼. 회장님, 오늘도 훈련에 함께해주셔서 기쁩니다」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「……恋人として当然のことをしているだけ、ですか？\u3000ふふ、ありがとうございます」"
translation = "「……연인으로서 당연한 일을 하고 있을 뿐이라고요? 후후, 감사합니다」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ノヴァフォーム。この力を手に入れられたのは、他ならぬ会長のおかげです。これからもお役に立てるよう、精進します」"
translation = "「노바 폼. 이 힘을 손에 넣을 수 있었던 건 다름 아닌 회장님 덕분입니다. 앞으로도 도움이 될 수 있도록 정진하겠습니다」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ですが、残念。活動限界が……」"
translation = "「하지만 유감이네요. 활동 한계가……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……やはりノヴァフォームは、活動時間が極端に制限されますね。瞬間火力は凄まじいですが、長期戦には不向き」"
translation = "「……역시 노바 폼은 활동 시간이 극단적으로 제한되네요. 순간 화력은 엄청나지만 장기전에는 부적합」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「変身した直後からタイマーがスタートするような感覚です。３分しか動けない某ヒーローを彷彿とさせます……じゅわっ」"
translation = "「변신한 직후부터 타이머가 스타트하는 듯한 감각입니다. 3분밖에 움직이지 못하는 모 히어로를 방불케 하네요…… 쥬왓」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームも万能じゃないんだな"
translation = "노바 폼도 만능은 아니구나"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。モンスターは幸い知能がほとんどないようですが、新しいリクリエの使徒が現れた場合、この弱点は無視できません」"
translation = "「네. 몬스터는 다행히 지능이 거의 없는 듯하지만, 새로운 리크리에의 사도가 나타날 경우 이 약점은 무시할 수 없습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「強力なモンスターを少しずつ小出しにされるなどすれば、ノヴァフォームでもさばき切れない可能性が出てくるでしょう」"
translation = "「강력한 몬스터를 조금씩 내보내는 식이라면 노바 폼으로도 다 감당하지 못할 가능성이 나오겠죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今のところ、私がノヴァフォームに感じている懸念点は以上です。会長の目から見て、気になるところや残念なところはありますか？」"
translation = "「현재 제가 노바 폼에 대해 느끼는 우려 사항은 이상입니다. 회장님 보시기에 신경 쓰이는 점이나 아쉬운 점이 있나요?」"

[[dialogue]]
speaker = "unk"
original = "そうだな、強いて言えば……"
translation = "글쎄, 굳이 말하자면……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「何でもどうぞ。データにまとめておきますので」"
translation = "「뭐든 말씀해 주세요. 데이터로 정리해둘 테니까요」"

[[dialogue]]
speaker = "unk"
original = "すぐに変身が終わっちゃうのが残念"
translation = "금방 변신이 끝나버리는 게 아쉬워"

[[dialogue]]
speaker = "unk"
original = "アナの新衣装、すごく可愛いのに"
translation = "아나의 새 의상, 정말 귀여운데"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なっ……！？」"
translation = "「나……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こ、こほん……会長、その、可愛いと言っていただけるのは嬉しいですが、今は真面目な話をしていたはず」"
translation = "「크, 흠…… 회장님, 그, 귀엽다고 해주시는 건 기쁘지만 지금은 진지한 이야기를 하던 중이었을 텐데요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あまり深刻に考えるのもよくないから、場を和ませようとしたんですか？\u3000まったくもう……」"
translation = "「너무 심각하게 생각하는 것도 좋지 않으니까 분위기를 띄우려 하신 건가요? 정말이지 참……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……せ、せっかくです。話を蒸し返しましょう。あの……そんなに、可愛いですか？\u3000ノヴァフォームの私は」"
translation = "「……기, 기왕 이렇게 된 거 이야기를 다시 꺼내 보죠. 저기…… 그렇게 귀여운가요? 노바 폼의 제가」"

[[dialogue]]
speaker = "unk"
original = "すごく可愛いと思う！"
translation = "정말 귀엽다고 생각해!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長はまたそうやってストレートな褒めを……人たらしのご自覚、ちゃんと持ってくれないと困ります」"
translation = "「회장님은 또 그렇게 스트레이트하게 칭찬을…… 사람 홀리는 자각, 제대로 가져주지 않으면 곤란합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、ありがとうございます。お付き合いしている方から『可愛い』と評価されるのは、何度味わっても気分がいいものです」"
translation = "「하지만 감사합니다. 사귀는 분으로부터 『귀엽다』는 평가를 받는 건 몇 번을 겪어도 기분이 좋네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……あ、そうです。いいことを思いつきました」"
translation = "「……아, 맞다. 좋은 생각이 났습니다」"

[[dialogue]]
speaker = "unk"
original = "翌日の放課後、新星学園の星徒会室――"
translation = "다음 날 방과 후, 신성 학원의 성도회실──"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「会長、こちらの資料。チェックをお願いします」"
translation = "「회장님, 이 자료. 체크 부탁드립니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え、え～っと……？」"
translation = "「에, 에~ 그러니까……?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「会長、ここの数字に抜けがあります……いえ、ミスはお気になさらず。会長の補佐が副会長の仕事ですので」"
translation = "「회장님, 여기 숫자가 빠졌습니다…… 아니요, 실수는 신경 쓰지 마세요. 회장님 보좌가 부회장의 업무니까요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ね～、アナちゃん？\u3000ちょっと聞きたいことがあるんだけど、いいかしら～♪」"
translation = "「있지~ 아나짱? 좀 물어보고 싶은 게 있는데 괜찮을까~♪」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「はい。なんでしょう、サーシャ先輩」"
translation = "「네. 무엇인가요, 사샤 선배」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうしてアナちゃん、ノヴァフォームにお着替えしてお仕事をしてるの？」"
translation = "「어째서 아나짱, 노바 폼으로 갈아입고 업무를 보고 있는 거야?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「なるほど。戦闘時でもないのに、私がノヴァしちゃってる理由。疑問に思うのも無理からぬお話です」"
translation = "「과연. 전투 시도 아닌데 제가 노바해버리고 있는 이유. 의문스럽게 생각하시는 것도 무리는 아닙니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ノヴァしちゃってるって何！？」"
translation = "「노바해버리고 있다니 뭐야!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「お答えしましょう。会長の膝の上から離れるのは名残惜しいですが――」"
translation = "「대답해 드리죠. 회장님 무릎 위에서 떨어지는 건 아쉽지만──」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「――しゅわっち。簡単に言えば、変身時間延長の訓練です」"
translation = "「――슈왓치. 간단히 말하면 변신 시간 연장 훈련입니다」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ご存じのとおり、ノヴァフォームは短時間しかその状態を保てないことがネック。場合によっては通常戦闘服の方が有利なケースもあるでしょう」"
translation = "「아시다시피 노바 폼은 단시간밖에 그 상태를 유지할 수 없는 게 난점. 경우에 따라서는 통상 전투복이 유리한 케이스도 있겠죠」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うん。そうだよね。だからトワ先生も、細かい仕組みを解明しようって頑張ってるし……」"
translation = "「으, 응. 그렇네. 그래서 토와 선생님도 세세한 구조를 해명하려고 노력하고 계시고……」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ですが私たちは星騎士。学業だけでなく訓練も大切なお仕事です。鍛えることで、活動限界を伸ばすことも可能なのではと考えました」"
translation = "「하지만 저희는 성기사. 학업뿐만 아니라 훈련도 중요한 업무입니다. 단련함으로써 활동 한계를 늘리는 것도 가능하지 않을까 생각했습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「なるほど～。それで普段からノヴァフォームで過ごして、体を慣らそうとしているのね」"
translation = "「과연~ 그래서 평소에도 노바 폼으로 지내며 몸을 익숙하게 하려는 거구나」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「その通りです」"
translation = "「그렇습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なぁんだ。てっきり会長が『ノヴァフォームのアナも可愛いね』って言うから、もっと見てほしいって思って変身してるのかと思っちゃった」"
translation = "「뭐야. 난 또 회장님이 『노바 폼 아나도 귀엽네』라고 하니까 더 보여주고 싶어서 변신하고 있는 줄 알았지」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「奇遇ねマトイちゃん。私もよ～」"
translation = "「기구하네 마토이짱. 나도야~」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「いえ。会長に可愛い私をもっと見せたかった……その気持ちも否定はしません」"
translation = "「아니요. 회장님께 귀여운 저를 더 보여주고 싶었다…… 그 마음도 부정은 하지 않겠습니다」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「昨日たっぷり褒められたので、あわよくば今日も褒めてもらおうと思った次第です」"
translation = "「어제 듬뿍 칭찬받았기에 내심 오늘도 칭찬받으려 생각한 바입니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「絶対そっちが目的の大部分だったよね！？」"
translation = "「절대 그쪽이 목적의 대부분이었지!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ～♪」"
translation = "「어머 어머, 우후후~♪」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「というわけで、再度膝上にしゅわっち──ん。やっぱり会長の膝の上はベストプレイス。フィット感が違う」"
translation = "「그런 고로 다시 무릎 위로 슈왓치──응. 역시 회장님 무릎 위는 베스트 플레이스. 피트감이 달라요」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「さぁ会長。可愛い私を見てやる気を出し、バリバリお仕事を片付けていきましょう」"
translation = "「자 회장님. 귀여운 저를 보고 의욕을 내서 팍팍 업무를 처리해 가죠」"

[[dialogue]]
speaker = "unk"
original = "よ～し、やるぞ！"
translation = "좋아, 하는 거야!"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ちなみにちょっと残念な情報です。体感ですが、今日の変身はあと数分で解けるかと。悔いを残さぬよう、ぎゅーっとハグするのを推奨です」"
translation = "「참고로 좀 아쉬운 정보입니다. 체감상 오늘의 변신은 앞으로 몇 분이면 풀릴 것 같습니다. 후회를 남기지 않도록 꼬옥 허그하는 것을 권장합니다」"

[[dialogue]]
speaker = "unk"
original = "ぎゅーっ……！"
translation = "꼬옥……!"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「あっ……<emoji=heart04>\u3000もう、会長……ぎゅーっとハグを推奨はしましたが、ちょっと強すぎです。書類がうまくめくれません……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 정말, 회장님…… 꼬옥 허그하는 걸 권장하긴 했지만 너무 강해요. 서류가 잘 안 넘겨집니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お付き合いを始めてから、会長もアナもどんどん人目を気にせずイチャイチャするようになってる気が……」"
translation = "「사귀기 시작하고 나서 회장님도 아나도 점점 남의 눈 신경 안 쓰고 꽁냥거리게 된 기분이……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ、微笑ましくって素敵ね～♪\u3000もうすぐヴィーナスちゃんもやってくるだろうし、お茶でも淹れておきましょう♪」"
translation = "「우후후, 보기 좋고 멋지네~♪ 곧 비너스짱도 올 테니 차라도 우려둘게♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスが『アナばっかりずるい、私もパパの膝に座るわ！』って言う未来が見えます、私……」"
translation = "「비너스가 『아나만 치사해, 나도 아빠 무릎에 앉을래!』라고 말하는 미래가 보여요, 저……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「またまた奇遇ねマトイちゃん。私もよ～<emoji=heart04>」"
translation = "「또 기구하네 마토이짱. 나도야~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "強力なモンスターが現れたり、新たな力を得たりと慌ただしい日常を過ごす俺たちだけど。"
translation = "강력한 몬스터가 나타나거나 새로운 힘을 얻는 등 분주한 일상을 보내는 우리들이지만."

[[dialogue]]
speaker = "unk"
original = "アナとは何があっても、変わらず仲良しの関係が続いているのだった──"
