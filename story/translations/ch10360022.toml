[[dialogue]]
speaker = "unk"
original = "第２話,マム、大変ですわ！,P"
translation = "제2화, 마무, 큰일이에요!"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お～っほっほっほ！\u3000そんなわけでマム！\u3000緋宮会長とお付き合いすることになりましたわー！\u3000ごめんあそばせー！」"
translation = "「오~홋홋홋! 그런 연유로 마무! 히노미야 회장과 사귀게 되었답니다─! 그럼 실례할게요─!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会って早々、喧しいドリルね……ま、一応は祝福してあげる。おめでとう、ヒルディー」"
translation = "「만나자마자 시끄러운 드릴이네…… 뭐, 일단은 축하해줄게. 축하해, 힐디.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「いつまで続く関係かはわからないけど、せいぜい上手くやることね？」"
translation = "「언제까지 계속될 관계인지는 모르겠지만, 부디 잘해봐?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「聞き捨てなりませんわ！？\u3000私が会長と早々に別れることになるとでも言いたいんですの！？」"
translation = "「그냥 넘길 수 없는 말이군요!? 제가 회장과 금방 헤어지게 될 거라고라도 말하고 싶은 건가요!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「だってあなた、超がつくくらいの世間知らずじゃない。おまけに人生初の彼氏……わけのわからないことをしまくるのが目に浮かぶわ」"
translation = "「그야 당신, 세상 물정 모르는 것도 정도가 있잖아. 게다가 인생 첫 남자친구…… 영문 모를 짓을 해댈 게 눈에 훤해.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ムキー！？」"
translation = "「무키이!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（でも……マムの言う通りかもしれませんわ。私、お世辞にも恋愛強者ではありませんし……ここは恥を忍んで……！）"
translation = "(하지만…… 마무의 말이 맞을지도 몰라요. 저, 빈말로도 연애 강자는 아니니까…… 여기서는 수치를 무릅쓰고……!)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そ、その……マム？\u3000もしもの時、相談に乗ってもらうことって可能でして……？」"
translation = "「그, 저기…… 마무? 혹시 무슨 일이 생기면 상담을 받아주는 게 가능할까요……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、いつになく弱気なのね？」"
translation = "「어머, 웬일로 약한 소리야?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「本来ならライバルのあなたにこんなことは言いたくありませんが……今回だけは別ですわ！」"
translation = "「본래라면 라이벌인 당신에게 이런 말은 하고 싶지 않지만…… 이번만큼은 별개예요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「どうしても会長に嫌われたくないのです。この交際を上手く続けるためならば、下げたくない頭だって下げましてよ！」"
translation = "「어떻게든 회장에게 미움받고 싶지 않답니다. 이 교제를 잘 유지하기 위해서라면, 숙이기 싫은 머리라도 숙이겠어요!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあ……仕方ないわね。暇だったら話くらいは聞いてあげるわよ」"
translation = "「하아…… 어쩔 수 없네. 한가하면 이야기 정도는 들어줄게.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「感謝いたしますわ！\u3000でも……自分で何もせずに助けを求めたりするつもりはありません！」"
translation = "「감사드려요! 하지만…… 스스로 아무것도 하지 않고 도움을 청할 생각은 없답니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「まずは私の知識を増やさねば……！\u3000こんな時こそ普段は使わないインターネット！\u3000ＤＩＳＣで情報収集ですわ！」"
translation = "「우선 제 지식을 늘려야겠어요……! 이럴 때야말로 평소에는 쓰지 않는 인터넷! DISC로 정보 수집이에요!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……おかしな記事に影響を受けなければいいのだけど」"
translation = "「……이상한 기사에 영향받지 않으면 좋겠는데.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「こ、ここが緋宮会長のお宅なのですか……緊張いたしますわ……！」"
translation = "「여, 여기가 히노미야 회장의 집인가요…… 긴장되네요……!」"

[[dialogue]]
speaker = "unk"
original = "お茶を淹れてきますね"
translation = "차를 내올게요."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お、お構いなく……おほほ♪」"
translation = "「시, 신경 쓰지 마세요…… 오호호♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ここでしばらくくつろいでから、そのあとは会長と街へ出かける……初めてのデート！\u3000しかも私が今いるのは、彼氏のお家！」"
translation = "「여기서 잠시 느긋하게 쉬다가, 그 뒤에는 회장과 거리로 나가는…… 첫 데이트! 게다가 제가 지금 있는 곳은 남자친구의 집!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「彼氏のお家に来たカノジョは何をするべきなのか……早速インターネットで検索ですわ！」"
translation = "「남자친구의 집에 온 여자친구는 무엇을 해야 하는가…… 당장 인터넷으로 검색이에요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「なになに……『こっそりエッチな本の捜索をしてみよう♪』……はぇ？\u3000ほ、本当ですのっ？」"
translation = "「어디 보자…… 『몰래 야한 책 수색을 해보자♪』…… 하에? 저, 정말인가요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふむふむ……『デキる彼女はエッチなコレクションにも動じない。寛容な彼女だとアピールをする絶好の機会』──なるほど、勉強になりますわ！」"
translation = "「흠흠…… 『능력 있는 여자친구는 야한 컬렉션에도 동요하지 않는다. 관대한 여자친구라고 어필할 절호의 기회』──과연, 공부가 되네요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「隠し場所はベッドの下が定番……はしたないですが、ちょっと捜索してみましょう！」"
translation = "「숨기는 장소는 침대 밑이 정석…… 상스럽지만, 조금 수색해보죠!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「どんなに過激な性癖の本が出てきても笑顔で許しますわよ！\u3000ゴソゴソ……ゴソゴソ……こ、これは──！？」"
translation = "「아무리 과격한 성벽의 책이 나와도 웃으며 용서하겠어요! 부스럭부스럭…… 부스럭부스럭…… 이, 이것은──!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「まずいですわ──マムに電話です！\u3000相談しましょう！！」"
translation = "「큰일이에요── 마무에게 전화예요! 상담하죠!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「マム、大変ですわ！\u3000会長のベッドの下に、エッチな本がありませんの！！」"
translation = "「마무, 큰일이에요! 회장의 침대 밑에 야한 책이 없어요!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『……いきなり何を言ってるの？\u3000頭は大丈夫？\u3000忙しいから切るわよ』"
translation = "『……갑자기 뭔 소리야? 머리는 괜찮아? 바쁘니까 끊을게.』"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そんな！？\u3000このままでは寛容な彼女だとアッピールができませんの！\u3000どうすれば……！？」"
translation = "「그럴 수가!? 이대로는 관대한 여자친구라고 어필을 할 수 없단 말이에요! 어쩌면 좋죠……!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『状況が読めないんだけど……何か問題があるわけ？\u3000エッチな本なんて無い方がいいじゃない』"
translation = "『상황 파악이 안 되는데…… 뭐가 문제라는 거야? 야한 책 같은 건 없는 게 좋잖아.』"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……言われてみればそうですわね！？」"
translation = "「……듣고 보니 그렇군요!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『初めての彼氏に舞い上がって、知能が極端に低下してるわね……』"
translation = "『첫 남자친구 때문에 들떠서 지능이 극단적으로 저하됐네……』"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「こうして飲み物を片手に街をぶらつくのは新鮮ですわね♪」"
translation = "「이렇게 음료를 들고 거리를 거니는 건 신선하네요♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（初めてのお出かけ、絶対によい思い出にしなくては。私、お散歩デートの予習はばっちりでしてよ！）"
translation = "(첫 외출, 반드시 좋은 추억으로 만들어야지. 저, 산책 데이트 예습은 완벽하답니다!)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（男の子は街ですれ違う、可愛い女の子をつい目で追ってしまうものだとネットにありましたわ）"
translation = "(남자는 거리에서 마주치는 귀여운 여자아이를 무심코 눈으로 쫓게 마련이라고 인터넷에 있었어요)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（そのことにいちいち目くじらを立てては嫌われる……さあ、準備は万全です。会長、いつでもよそ見してＯＫでしてよ！）"
translation = "(그 일에 일일이 눈을 부라려서는 미움받는다…… 자, 준비는 만전이에요. 회장, 언제든 한눈팔아도 OK랍니다!)"

[[dialogue]]
speaker = "unk"
original = "（先輩って本当に綺麗だよな……）"
translation = "(선배는 정말 예쁘단 말이야……)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「で、ですわ？\u3000会長、そんな、私ばかりをジッと見つめて……よ、よそ見しないんですの？」"
translation = "「인, 인가요? 회장, 그렇게 저만 빤히 쳐다보고…… 한, 한눈팔지 않는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "（こんな素敵な人と付き合えて幸せだな）"
translation = "(이런 멋진 사람과 사귈 수 있어서 행복해)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（全然よそ見しませんわ！？\u3000またまた予習との食い違いですわ……！！）"
translation = "(전혀 한눈팔지 않아요!? 또 예습과 엇갈리고 있어요……!! )"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お、おほほ。すみません会長、私ちょっとお花を摘みに行ってまいります……！」"
translation = "「오, 오호호. 죄송해요 회장, 저 잠시 꽃을 꺾으러 다녀오겠습니다……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「マム、大変ですわ！\u3000会長が他の女の子によそ見をしませんの！？\u3000私ばかりをじーっと見てくるんですわ！！」"
translation = "「마무, 큰일이에요! 회장이 다른 여자아이에게 한눈을 팔지 않아요!? 저만 빤히 쳐다본답니다!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『面倒くさいから切るわよ』"
translation = "『귀찮으니까 끊을게.』"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お待ちになって！？\u3000シミュレーションしていた内容とズレがありますの！\u3000私はどうすれば──」"
translation = "「기다려보세요!? 시뮬레이션했던 내용과 차이가 있어요! 저는 어쩌면──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『だから、何も問題ないでしょ。他の女の子じゃなく、自分に夢中になってくれてるんだから』"
translation = "『그러니까, 아무 문제 없잖아. 다른 여자애가 아니라 자기한테 푹 빠져 있는 거니까.』"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──言われてみればそうですわね！？」"
translation = "「──듣고 보니 그렇군요!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "『……次はもっとまともなことで連絡しなさい。いいわね？』"
translation = "『……다음엔 좀 더 제대로 된 일로 연락해. 알았지?』"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「今日はありがとうございました……初めてのデート、とっても楽しかったですわ<emoji=heart04>」"
translation = "「오늘은 감사했습니다…… 첫 데이트, 정말 즐거웠어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「会長も楽しめまして？\u3000ふふ、それなら良かったですわ」"
translation = "「회장도 즐거우셨나요? 후후, 그렇다면 다행이에요.」"

[[dialogue]]
speaker = "unk"
original = "──キスしてもいいですか？"
translation = "──키스해도 될까요?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ですわっ！？\u3000あ、えっと……！？\u3000えっえっ、あの、そのっ──！」"
translation = "「인가요!? 아, 에또……!? 엣엣, 저기, 그게──!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「…………は、はいっ<emoji=heart04>」"
translation = "「…………네, 넷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「んっ…………ちゅっ<emoji=heart04>」"
translation = "「응………… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "またデートしましょう、先輩"
translation = "또 데이트해요, 선배."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「は、はいぃ……<emoji=heart04>」"
translation = "「네, 헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それじゃあ帰ります。おやすみなさい"
translation = "그럼 이만 갈게요. 잘 자요."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おやすみなさい、ですわー……」"
translation = "「안녕히 주무세요, 예요─……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「…………え、えぇえっ！？\u3000い、今、私っ……キッス！\u3000ファーストキッス、してしまいましたの……！？\u3000マ、マム～！」"
translation = "「…………에, 에에엣!? 저, 지금 저…… 키스! 첫 키스, 해버린 건가요……!? 마, 마무~!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「マム、大変ですわ！\u3000１回目のデートなのに、キキキ──キッスしてしまいましたわぁ！？」"
translation = "「마무, 큰일이에요! 첫 번째 데이트인데 키키키── 키스해버렸어요!!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ファーストキッスって３回目くらいのデートでするのがいいってネットに──」"
translation = "「첫 키스는 세 번째 정도 데이트에서 하는 게 좋다고 인터넷에──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「いい加減にしなさい！！\u3000このお惚気ドリル！！！」"
translation = "「적당히 좀 해!! 이 염장질 드릴!!!」"

