[[dialogue]]
speaker = "unk"
original = "第４話,幸せのドレス,P"
translation = "제4화, 행복의 드레스"

[[dialogue]]
speaker = "unk"
original = "キサナとデートした帰りのことだった。"
translation = "키사나와 데이트하고 돌아가는 길이었다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ブティックのショーウィンドウに釘付けになるキサナ。"
translation = "부티크 쇼윈도에 시선을 빼앗긴 키사나."

[[dialogue]]
speaker = "unk"
original = "ウィンドウの中には、お姫様が着るような豪奢なドレスが飾られている。"
translation = "쇼윈도 안에는 공주님이 입을 법한 화려한 드레스가 장식되어 있다."

[[dialogue]]
speaker = "unk"
original = "ドレスが気になる？"
translation = "드레스가 신경 쓰여?"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ち、ちげえよ！\u3000ただ物珍しくて見てただけだ！」"
translation = "「아, 아냐! 그냥 신기해서 본 것뿐이야!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「昔、マフィアのボスの娘がこんなん着てたなって思い出して、それだけだ。そりゃガキの頃は憧れたこともあるけどよ……アタシが着るのはなんか違うだろ」"
translation = "「옛날에 마피아 보스 딸이 이런 걸 입었었지 싶어서 떠올린 것뿐이라고. 뭐 어릴 땐 동경한 적도 있지만…… 내가 입는 건 좀 아니잖아.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それに、見ろよこの値段。アタシなら、こんだけ金があったらたけえ肉を食いに行くぜ」"
translation = "「게다가 이 가격 좀 봐. 나라면 이만큼 돈이 있으면 비싼 고기를 먹으러 가겠어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……ああもう、忘れろ。帰んぞ」"
translation = "「……아아 진짜, 잊어버려. 돌아가자.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……んだよ。何でもねぇっつってんだろ。ジロジロ見るなっての」"
translation = "「……뭐야. 아무것도 아니라고 했잖아. 빤히 쳐다보지 말라니까.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ、言っとくけど、明日はアタシ、バイトだからな。デートできなくて悪かったな」"
translation = "「아, 말해두겠는데 내일 나 알바거든. 데이트 못 해서 미안하게 됐네.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシのバ先には来んなよ。絶対だからな」"
translation = "「내 일터에는 오지 마라. 절대로다.」"

[[dialogue]]
speaker = "unk"
original = "働くキサナが見たくて来てしまった。女体化薬（正しくは星力増強剤）で変身しているからバレないはず……"
translation = "일하는 키사나가 보고 싶어서 오고 말았다. 여체화 약(정확히는 성력 증강제)으로 변신하고 있으니 들키지 않을 텐데……"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「…………？\u3000気のせいか」"
translation = "「…………? 기분 탓인가.」"

[[dialogue]]
speaker = "unk"
original = "キサナは監視員用の背の高いイスに座っていた。耳がぴこぴこ動いていて、周囲に気を配っているのが分かる。"
translation = "키사나는 감시원용 높은 의자에 앉아 있었다. 귀가 쫑긋쫑긋 움직이며 주변을 살피고 있는 게 보였다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「コラ、飛び込みしてんじゃねえ！\u3000他の客に迷惑だろーが！」"
translation = "「이봐, 다이빙하지 마! 다른 손님들한테 민폐잖아!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おいそこ！\u3000しつこいナンパすんな！\u3000ケーサツ呼ぶぞケーサツ」"
translation = "「어이 거기! 끈질기게 헌팅 하지 마! 경찰 부른다 경찰.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……っ！」"
translation = "「……윽!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おい、オマエ。来んなっつっといただろ、なんでいんだよ」"
translation = "「야, 너. 오지 말라고 했잖아, 왜 여기 있는 거야.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「バレねぇと思ったか？\u3000獣人系魔族の嗅覚を舐めんじゃねえ。女に化けても匂いで分かるっつーの」"
translation = "「안 들킬 줄 알았냐? 수인계 마족의 후각을 얕보지 마. 여자로 변해도 냄새로 다 안다고.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オマエの匂い、どれだけ嗅いできたと思ってんだ。……って、はずいこと言わせんじゃねえ！」"
translation = "「네 냄새를 얼마나 맡아왔다고 생각하는 거야. ……랄까, 부끄러운 소리 하게 만들지 마!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ……もうすぐ休憩だから待ってろ」"
translation = "「하아…… 곧 휴식 시간이니까 기다려.」"

[[dialogue]]
speaker = "unk"
original = "待つこと数分、キサナが戻ってきた。"
translation = "몇 분 기다리자 키사나가 돌아왔다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ったく、アタシの働いてるとこがそんなに見たかったのかよ。しかも女に化けてまでとか、変態にも程があんだろ。風紀委員だか公安だかに通報してやろうか？」"
translation = "「참 나, 내가 일하는 게 그렇게 보고 싶었냐. 게다가 여자로 변하기까지 하다니, 변태도 정도가 있지. 풍기 위원이나 공안에 신고해 버릴까?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハッ、そんなビビんなって。まぁアタシもオマエの匂い嗅いで嬉しくなっちまったからな。許してやるよ」"
translation = "「핫, 그렇게 쫄지 마. 뭐 나도 네 냄새 맡고 기분 좋아졌으니까 말이야. 용서해 주지.」"

[[dialogue]]
speaker = "unk"
original = "仕事はどう？"
translation = "일은 어때?"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「マジ疲れた。いくらムカつく奴でも殴っちゃいけねえのが疲れた。これならモンスター相手の方が気楽だぜ」"
translation = "「진짜 피곤해. 아무리 짜증 나는 놈이라도 때리면 안 된다는 게 피곤하다고. 이럴 바엔 몬스터 상대하는 게 편하겠어.」"

[[dialogue]]
speaker = "unk"
original = "バイトで疲れたのか、キサナが俺の肩に寄りかかってくる。"
translation = "알바 때문에 지쳤는지, 키사나가 내 어깨에 기대어 온다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オマエ、いろいろバイトしてきたんだってな。よくやるぜ」"
translation = "「너, 여러 가지 알바를 해왔다며. 대단하네.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……なぁ、少し聞いてくれ」"
translation = "「……있지, 내 얘기 좀 들어줘.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシがガキの頃、いろんなことを教えてくれた女がいてよ、アタシはアネゴって呼んでた」"
translation = "「내가 어릴 때, 여러 가지를 가르쳐 준 여자가 있었어. 난 아네고라고 불렀지.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシみたいな親のいないガキに、アネゴは生き方を教えてくれた。誰も信用するなとか、甘い話には裏があるとか、そういうやつ」"
translation = "「나 같은 부모 없는 꼬맹이에게 아네고는 사는 법을 가르쳐 줬어. 아무도 믿지 말라든가, 달콤한 이야기 뒤엔 함정이 있다든가, 그런 거.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あとは、腐った食いもんの見分け方とか、飲める水の見付け方とか……なんでも教わった」"
translation = "「그 외엔 상한 음식 구별하는 법이나 마실 수 있는 물 찾는 법이라든가…… 뭐든지 배웠어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「まぁそのアネゴがマフィアに入ったから、アタシもいつの間にかマフィアになっちまった。セントリアではそれが普通だった」"
translation = "「뭐 그 아네고가 마피아에 들어갔으니까 나도 어느새 마피아가 되어버렸지. 센트리아에선 그게 보통이었어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んで、そのアネゴも死んじまって、アタシはとにかく生きていくのに必死だった」"
translation = "「그러다 그 아네고도 죽어버리고, 난 어쨌든 살아가는 데 필사적이었어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「マフィアはメシこそ食わせてくれるが、下っ端は使い捨てだからな。同じくらいに入ったやつは少しずつ死んで、残ったのはアタシだけだ」"
translation = "「마피아는 밥이야 먹여주지만 말단은 소모품이니까. 비슷하게 들어온 녀석들은 조금씩 죽고 남은 건 나뿐이야.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……ああ？\u3000今じゃ顔も覚えてねえし、別にダチでもねえよ。オマエが気にすることじゃねえ。そんな顔すんな」"
translation = "「……아앙? 지금은 얼굴도 기억 안 나고 딱히 친구도 아니었어. 네가 신경 쓸 일 아냐. 그런 표정 짓지 마.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシは生きるために、メシ食うために汚ねえこともしてきた。それが正しいことだって自分に言い聞かせて……コラプサー以前に、アタシは悪人なんだ」"
translation = "「난 살기 위해, 밥 먹기 위해 더러운 짓도 해왔어. 그게 옳은 일이라고 스스로를 타일러 가며…… 콜랩서 이전부터 난 악인이야.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あの頃に比べりゃ、今はぬくぬく暮らしてる。居心地もいい……だから、なんか不安なんだよ」"
translation = "「그때에 비하면 지금은 따뜻하게 지내고 있지. 기분도 좋고…… 그래서 왠지 불안해.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「『このままじゃ本当に幸せになっちまう』ってな。こんなアタシが幸せになっていいのかって」"
translation = "「『이대로라면 정말로 행복해져 버리겠어』 하고 말이야. 나 같은 게 행복해져도 되는 건가 싶어서.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……悪いな。オマエはアタシを選んでくれたのに、そのアタシがこんなんでよ」"
translation = "「……미안하다. 너는 나를 선택해 줬는데, 그 내가 이 모양이라서.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おっと、休憩終わっちまう。じゃあな、魔王」"
translation = "「앗, 휴식 끝난다. 그럼 이만, 마왕.」"

[[dialogue]]
speaker = "unk"
original = "少し行くところができたようだ。"
translation = "잠시 다녀올 곳이 생겼다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お、帰り待っててくれたのか。ちゃんと男に戻ってんな」"
translation = "「오, 올 때까지 기다려 준 거냐. 제대로 남자로 돌아와 있네.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「じゃあ、なんか食って帰るか。いや、姐さんがもうメシ作ってるかもしれねえし、一度連絡した方が……おい、なんだよ、その紙袋」"
translation = "「그럼 뭐 좀 먹고 들어갈까. 아니, 아네고가 벌써 밥 차리고 있을지도 모르니까 연락부터 하는 게…… 야, 뭐야 그 종이백은.」"

[[dialogue]]
speaker = "unk"
original = "キサナが働いている間に、バイト時代の貯蓄をはたいて買ってきたものだ。"
translation = "키사나가 일하는 동안 알바 시절에 모은 저금을 털어 사 온 것이다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「紙袋のロゴ、この前の服屋の……もしかして中身は……っ」"
translation = "「종이백 로고, 요 전번 옷가게 거잖아…… 설마 내용물은……윽.」"

[[dialogue]]
speaker = "unk"
original = "開けてみて"
translation = "열어 봐."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「っ！\u3000やっぱりあのドレスじゃねえか！\u3000どうしてこんなもん買ってきやがった！\u3000アタシは着ねえっつったろ！」"
translation = "「! 역시 그 드레스잖아! 왜 이런 걸 사 온 거야! 난 안 입는다고 했잖아!」"

[[dialogue]]
speaker = "unk"
original = "キサナが幸せになっていいかなんて分からない。だって、誰が決めることでもないんだから。"
translation = "키사나가 행복해져도 되는지 같은 건 나도 몰라. 그건 누가 정하는 게 아니니까."

[[dialogue]]
speaker = "unk"
original = "それでも俺はキサナを幸せにしたい。キサナに幸せでいてほしい。その気持ちを込めて、このドレスを贈る。"
translation = "그래도 난 키사나를 행복하게 해주고 싶어. 키사나가 행복했으면 좋겠어. 그 마음을 담아 이 드레스를 선물할게."

[[dialogue]]
speaker = "unk"
original = "ふたりで幸せになろう、キサナ"
translation = "둘이서 행복해지자, 키사나."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……っ！」"
translation = "「……윽!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あーもう、バカには何言っても無駄か。はいはい、負けだよ、アタシの負けだ」"
translation = "「아아 진짜, 바보에겐 무슨 말을 해도 소용없네. 그래그래, 졌다, 내가 졌어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ツラ貸せや……」"
translation = "「얼굴 좀 이리 내봐……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ちゅっ」"
translation = "「쪽」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「今のがアタシの答えだ。そこまで言うなら幸せにしてくれよ、魔王さま」"
translation = "「방금 게 내 대답이다. 그렇게까지 말한다면 행복하게 해 달라고, 마왕님.」"

