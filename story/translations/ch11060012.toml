[[dialogue]]
speaker = "unk"
original = "第２話,ナナカのおもてなし,P"
translation = "제2화, 나나카의 대접"

[[dialogue]]
speaker = "unk"
original = "スイーツ同好会の臨時メンバーになった翌日、俺はナナカに連れられてソバ屋に来ていた。"
translation = "스위츠 동호회의 임시 멤버가 된 다음 날, 나는 나나카에게 이끌려 소바 가게에 와 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「このお蕎麦屋さん、ナナカさんのご実家だったのですか。趣のある良いお店ですね」"
translation = "「이 소바 가게, 나나카 씨의 본가였던 것이군요. 정취 있는 좋은 가게네요.」"

[[dialogue]]
speaker = "unk"
original = "どうしてフィオナも来たの？"
translation = "어째서 피오나도 온 거야?"

[[dialogue]]
speaker = "フィオナ"
original = "「えっ？\u3000ええと、会長のことをかなり熱烈に勧誘されたと伺ったので……私もちょっと興味が湧いたんです」"
translation = "「엣? 그러니까, 회장을 꽤 열렬하게 권유받았다고 들어서…… 저도 조금 흥미가 생겼어요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「へいお待ち！\u3000夕霧庵名物、天ざるソバでいっ！」"
translation = "「헤이, 기다렸지! 유우기리안 명물, 텐자루 소바 등장이오!」"

[[dialogue]]
speaker = "ナナカ"
original = "「前に来た時もうちで食べていってくれたって話だけどさ、今日のソバはひと味違うからね！」"
translation = "「전에 왔을 때도 우리 집에서 먹고 갔단 얘긴 들었지만, 오늘 소바는 차원이 다르니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「何が違うんですか？」"
translation = "「뭐가 다른가요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「ふっふっふ……前回は親父が打ったソバだったけど、こいつはアタシの手打ちだよ！」"
translation = "「훗훗훗…… 지난번엔 아버지가 뽑은 소바였지만, 이건 내가 직접 뽑은 수타 소바라고!」"

[[dialogue]]
speaker = "ナナカ"
original = "「こいつは店じゃ出さない十割ソバなんでい！」"
translation = "「이건 가게에선 안 내놓는 쥬와리 소바(메밀 100%)라고!」"

[[dialogue]]
speaker = "unk"
original = "それは凄い！"
translation = "그거 대단한데!"

[[dialogue]]
speaker = "ナナカ"
original = "「さあさあ、のんびりしてたらソバが伸びちまう！\u3000ささっと食べてくんなっ！」"
translation = "「자자, 멍하니 있다간 소바가 불어버려! 후딱 먹어줘!」"

[[dialogue]]
speaker = "フィオナ"
original = "「では頂きましょう。……ちゅるっ」"
translation = "「그럼 먹어볼까요. ……츄릅.」"

[[dialogue]]
speaker = "ナナカ"
original = "「あー、ダメダメ！\u3000ソバはもっと勢いよくすすらなきゃ！\u3000ほら、こうやって……」"
translation = "「아-, 안 돼 안 돼! 소바는 좀 더 기세 좋게 들이켜야지! 자, 이렇게……」"

[[dialogue]]
speaker = "ナナカ"
original = "「ずるずるずるーーーーっ！！！」"
translation = "「후루룩 후루루룩----!!!」"

[[dialogue]]
speaker = "ナナカ"
original = "「かぁーーっ、うんまい！」"
translation = "「카---, 맛있다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「な、なるほど、少々はしたない気もしますが、音を立てて食べるのが作法とも聞きますし……」"
translation = "「과, 과연, 조금은 조신하지 못한 기분도 듭니다만, 소리를 내며 먹는 것이 예법이라고도 들었으니……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ずるずるずるっ」"
translation = "「후루룩 후루룩」"

[[dialogue]]
speaker = "フィオナ"
original = "「あら、おいしい。香りがより立つように感じますね」"
translation = "「어라, 맛있네요. 향이 더 살아나는 느낌이에요.」"

[[dialogue]]
speaker = "unk"
original = "ほんとにおいしいソバだ"
translation = "정말로 맛있는 소바야"

[[dialogue]]
speaker = "ナナカ"
original = "「でしょっ？\u3000ささ、この調子でどんどん食べてっ」"
translation = "「그치? 자자, 이 기세로 계속 먹어줘.」"

[[dialogue]]
speaker = "フィオナ"
original = "「確かにおいしいお蕎麦なのは間違いないですけど……これはスイーツ研究会の活動ですよね？\u3000スイーツなのに、ソバ？」"
translation = "「분명 맛있는 소바인 건 틀림없습니다만…… 이건 스위츠 연구회의 활동이죠? 스위츠인데, 소바?」"

[[dialogue]]
speaker = "ナナカ"
original = "「あー、うん……確かに、いきなりソバを振る舞われたら、面食らっちゃうよね……」"
translation = "「아-, 응…… 확실히 갑자기 소바를 대접받으면 당황스럽겠지……」"

[[dialogue]]
speaker = "ナナカ"
original = "「でもさ、アタシもちょっと無茶言いすぎたって反省してるんだ。時間が限られてるのに、こっちの都合に巻き込んじゃってさ」"
translation = "「하지만 나도 좀 무리한 말을 했다고 반성하고 있어. 시간이 한정되어 있는데 내 사정에 휘말리게 해서 말이야.」"

[[dialogue]]
speaker = "ナナカ"
original = "「だからせめて、アタシに出来る最大限のもてなしをしてあげたいってわけ」"
translation = "「그래서 적어도 내가 할 수 있는 최대한의 대접을 해주고 싶었다는 거지.」"

[[dialogue]]
speaker = "ナナカ"
original = "「ソバ屋の娘だし、自分でも手打ちしてるし、みんなおいしいって言ってくれるから、これなら喜んでもらえるんじゃないかな、ってね」"
translation = "「소바 가게 딸이기도 하고, 나도 직접 면을 뽑고 있고, 다들 맛있다고 해주니까 이걸로 기뻐해 주지 않을까 싶어서.」"

[[dialogue]]
speaker = "フィオナ"
original = "「つまり、スイーツ研究会の手伝いをするお礼が、このお蕎麦ということですね？」"
translation = "「즉, 스위츠 연구회를 도와주는 보답이 이 소바라는 것이군요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「そーいうことっ。どうかな会長？\u3000こいつで満足してもらえるか、わかんないけど……」"
translation = "「그렇게 된 거지. 어때 회장? 이걸로 만족해 줄지는 모르겠지만……」"

[[dialogue]]
speaker = "unk"
original = "天ぷらもメチャクチャうまい！"
translation = "튀김도 엄청나게 맛있어!"

[[dialogue]]
speaker = "ナナカ"
original = "「たはは……ごめん、天ぷらは親父に揚げてもらったんだよね」"
translation = "「타하하…… 미안, 튀김은 아버지가 튀겨주신 거야.」"

[[dialogue]]
speaker = "ナナカ"
original = "「一応、アタシでも揚げられるんだけどさ、そこまではさすがに、親父には敵わないからね。よりおいしいものを提供したかったってわけ」"
translation = "「일단 나도 튀길 줄은 알지만, 거기까진 역시 아버지를 이길 수 없으니까 말이야. 더 맛있는 걸 제공하고 싶었다는 거지.」"

[[dialogue]]
speaker = "ナナカ"
original = "「ってことで、今のアタシに出せる札はこんだけだ！\u3000さあ、ジャッジしてくんな！」"
translation = "「그러니까 지금의 내가 내놓을 수 있는 패는 이게 전부다! 자, 심사해줘!」"

[[dialogue]]
speaker = "unk"
original = "最高のおもてなしだったよ！"
translation = "최고의 대접이었어!"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、合格みたいですね」"
translation = "「후훗, 합격인 모양이네요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「よっしゃー！\u3000なら、２人ともアタシに協力してくれるってことだよね！」"
translation = "「요쌰-! 그럼 둘 다 나를 도와준다는 거지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええっ、私もですか？」"
translation = "「에엣, 저도요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「フィオナはなんか食通っぽいから、頼りになりそう」"
translation = "「피오나는 왠지 미식가 같아서 의지가 될 것 같아.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そ、そんなことは無いのですが……私で協力できることがあるなら」"
translation = "「그, 그렇지는 않습니다만…… 제가 도울 수 있는 일이 있다면.」"

[[dialogue]]
speaker = "unk"
original = "俺も協力するよ"
translation = "나도 협력할게"

[[dialogue]]
speaker = "ナナカ"
original = "「あんがとっ！\u3000じゃあ頼りにさせてもらうねっ」"
translation = "「고마워! 그럼 의지 좀 할게!」"

[[dialogue]]
speaker = "unk"
original = "それで１つ思いついたんだけど"
translation = "그래서 하나 생각난 게 있는데"

[[dialogue]]
speaker = "ナナカ"
original = "「おっ、なになに？」"
translation = "「오, 뭔데 뭔데?」"

[[dialogue]]
speaker = "ナナカ"
original = "「……夕霧庵でスウィーツ？\u3000いやいや、うちはソバ屋なんだけど」"
translation = "「……유우기리안에서 스위츠? 아니아니, 우리 집은 소바 가게라니까.」"

[[dialogue]]
speaker = "フィオナ"
original = "「お蕎麦屋さんでもスイーツを提供しているお店は多いと思いますよ」"
translation = "「소바 가게에서도 스위츠를 제공하는 가게는 많다고 생각해요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「そうだけどっ、うちの職人はソバや丼ものを作るので手一杯だから、そんな余裕ないってば」"
translation = "「그렇긴 하지만! 우리 집 장인들은 소바나 덮밥류를 만드느라 손이 모자라서 그럴 여유 없다니까.」"

[[dialogue]]
speaker = "unk"
original = "ナナカが作ればいいよ"
translation = "나나카가 만들면 돼"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね、ご自分でお蕎麦を打っているんですから、実家のお店で提供するスイーツを作ってもよさそうですが」"
translation = "「그렇네요, 직접 소바를 뽑고 계시니까 본가 가게에서 제공할 스위츠를 직접 만드셔도 좋을 것 같은데요.」"

[[dialogue]]
speaker = "ナナカ"
original = "「うーん……でもアタシ、スウィーツは好きだけど、作るのは苦手なんだよね……」"
translation = "「으음…… 하지만 나, 스위츠는 좋아하지만 만드는 건 서투른데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「それこそ緋宮会長の腕の見せ所でしょう。ナナカさんにも簡単に作れて、お店の評判になるスイーツを考案すればいい話です」"
translation = "「그거야말로 히노미야 회장님의 실력을 보여줄 때겠죠. 나나카 씨도 간단히 만들 수 있고 가게의 평판이 될 만한 스위츠를 고안하면 될 일입니다.」"

[[dialogue]]
speaker = "ナナカ"
original = "「なるほど！\u3000そいつは名案だっ！」"
translation = "「과연! 그거 명안이다!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺はナナカと協力して、夕霧庵の締めスイーツを考案することになった。"
translation = "이렇게 나는 나나카와 협력해서 유우기리안의 마무리 스위츠를 고안하게 되었다."

