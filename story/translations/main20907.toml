[[dialogue]]
speaker = "unk"
original = "第７話,ベアトリスとチナ,B"
translation = "제7화, 베아트리스와 치나, B"

[[dialogue]]
speaker = "チナ"
original = "「ベアト……！？」"
translation = "「베아토……!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが部屋に入った瞬間、驚きで目を丸くするチナ。"
translation = "베아트리스가 방에 들어온 순간, 놀라 눈을 크게 뜨는 치나."

[[dialogue]]
speaker = "unk"
original = "しかしベアトリスへの呼び方が、以前教皇庁前で出会った時と異なる。"
translation = "하지만 베아트리스를 부르는 호칭이 이전에 교황청 앞에서 만났을 때와 다르다."

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、その呼び方。久しぶりかも」"
translation = "「아, 그 호칭. 오랜만일지도」"

[[dialogue]]
speaker = "チナ"
original = "「あ──いや。ベアトリス副会長……無事だったんですね」"
translation = "「아── 아니. 베아트리스 부회장…… 무사하셨군요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「別に言い直さなくてもいいのに……チナちゃんは真面目なんだから」"
translation = "「굳이 고쳐 말하지 않아도 되는데…… 치나짱은 성실하다니까」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ちゃんとした言葉遣いをしないと、極星星徒会の役員として示しがつかない。その考えは理解してるけど……」"
translation = "「제대로 된 말투를 쓰지 않으면 극성 성도회의 임원으로서 본보기가 되지 않는다. 그 생각은 이해하지만……」"

[[dialogue]]
speaker = "unk"
original = "チナの生真面目さはベアトリスもよく知っている。"
translation = "치나의 고지식함은 베아트리스도 잘 알고 있다."

[[dialogue]]
speaker = "unk"
original = "荒っぽいところはあるが、彼女が振るう槍のように真っ直ぐで一本気な気質だ。"
translation = "거친 면은 있지만 그녀가 휘두르는 창처럼 곧고 외골수인 기질이다."

[[dialogue]]
speaker = "ベアトリス"
original = "「今はこのとおり、２人きりだよ。だから楽にして欲しいな？\u3000それに──」"
translation = "「지금은 이 보시다시피 둘뿐이야. 그러니까 편하게 해줬으면 좋겠는데? 게다가──」"

[[dialogue]]
speaker = "チナ"
original = "「それに？」"
translation = "「게다가?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「久しぶりに会えた幼なじみに、役職に縛られて敬語を使われるのは寂しいかなって」"
translation = "「오랜만에 만난 소꿉친구에게 직책에 얽매여 경어를 듣는 건 쓸쓸하달까」"

[[dialogue]]
speaker = "チナ"
original = "「……うん」"
translation = "「……응」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスとチナが出会ったのは、今からずっと昔──デネブの、崩壊した流星市国で苦楽を共にしてきた１０年来の親友だった。"
translation = "베아트리스와 치나가 만난 것은 지금으로부터 아주 오래전── 데네브의 붕괴한 유성시국에서 고락을 함께해 온 10년 지기 절친이었다."

[[dialogue]]
speaker = "ベアトリス"
original = "「チナちゃんが元気で安心した。あの時別れたきりだったから」"
translation = "「치나짱이 건강해서 안심했어. 그때 헤어진 뒤로 처음이니까」"

[[dialogue]]
speaker = "チナ"
original = "「それはこっちのセリフだよ。あの時、ベアトが助けてくれなかったら、アタシはどうなっていたか……。本当にありがとな」"
translation = "「그건 내가 할 소리야. 그때 베아토가 도와주지 않았으면 난 어떻게 됐을지……. 정말 고마워」"

[[dialogue]]
speaker = "チナ"
original = "「ベアトも怪我してなくてよかった……転送装置に呑まれた後、どうなったのか、気が気じゃなくて……」"
translation = "「베아토도 다치지 않아서 다행이야…… 전송 장치에 삼켜진 뒤에 어떻게 됐는지 걱정돼서 견딜 수가 없었어……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「デネブに戻ってたんだよ。それで、ちょっと前にまたアルタイルに来たところ」"
translation = "「데네브로 돌아가 있었어. 그래서 조금 전에 다시 알타이르에 온 참이야」"

[[dialogue]]
speaker = "チナ"
original = "「ってことはルヴィにも会えたんだな！\u3000よかった、ベアトが留守にしてる間、ずっと心配してたからさ！」"
translation = "「그렇다는 건 루비도 만났겠네! 다행이다, 베아토가 자리를 비운 동안 계속 걱정했거든!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ……うん……」"
translation = "「아…… 응……」"

[[dialogue]]
speaker = "チナ"
original = "「でもどうしてベアトがアルタイルのやつらと同じ制服を？」"
translation = "「그런데 어째서 베아토가 알타이르 녀석들과 같은 교복을?」"

[[dialogue]]
speaker = "チナ"
original = "「あ、新星学園に潜入してるのか！\u3000ルヴィが言ってた極秘任務ってそれだったんだな！」"
translation = "「아, 신성학원에 잠입하고 있는 건가! 루비가 말했던 극비 임무라는 게 그거였구나!」"

[[dialogue]]
speaker = "チナ"
original = "「……あれ？\u3000ってことは、アタシはベアトがいるアルタイルを滅ぼそうとして……いや、ベアトがいるってわかってるなら、ルヴィはそんなことさせないはず……」"
translation = "「……어라? 그렇다는 건 나는 베아토가 있는 알타이르를 멸망시키려…… 아니, 베아토가 있다는 걸 안다면 루비는 그런 짓을 시키지 않았을 텐데……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ごくひにんむ？」"
translation = "「극비 임무?」"

[[dialogue]]
speaker = "チナ"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker = "unk"
original = "お互いに見つめ合ったままキョトンとするベアトリスとチナ。"
translation = "서로를 마주 본 채 멍하니 있는 베아트리스와 치나."

[[dialogue]]
speaker = "unk"
original = "どうやら２人の間には認識の齟齬があるようだ。"
translation = "아무래도 두 사람 사이에는 인식의 차이가 있는 듯하다."

[[dialogue]]
speaker = "チナ"
original = "「ええっと、ベアトは極秘任務で不在だって、ルヴィから聞いてたんだけど……」"
translation = "「에또, 베아토는 극비 임무로 자리를 비웠다고 루비한테 들었는데……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あー……実はそうじゃなくてね……」"
translation = "「아─…… 사실은 그게 아니라 말이지……」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスは自身がアルタイルに飛んだ時の出来事とその顛末、そして今はアルタイルの新星学園で選挙管理委員会に所属していることを説明した。"
translation = "베아트리스는 자신이 알타이르로 날아갔을 때의 사건과 그 전말, 그리고 지금은 알타이르의 신성학원에서 선거관리위원회에 소속되어 있다는 것을 설명했다."

[[dialogue]]
speaker = "unk"
original = "それを聞いたチナは、肩を落として大きなため息をつく。"
translation = "그 말을 들은 치나는 어깨를 늘어뜨리며 크게 한숨을 내쉰다."

[[dialogue]]
speaker = "チナ"
original = "「ベアトらしいっちゃベアトらしいけど、教皇庁のあの穴からアルタイルに行くなんて無茶にも程があるだろ……」"
translation = "「베아토답다면 베아토답지만, 교황청의 그 구멍으로 알타이르에 가다니 무모해도 정도가 있지……」"

[[dialogue]]
speaker = "チナ"
original = "「魔界から流星市国に密航したこともあったし、常習犯じゃないか……」"
translation = "「마계에서 유성시국으로 밀항한 적도 있었고, 상습범이잖아……」"

[[dialogue]]
speaker = "チナ"
original = "「考えなしっていうか、無鉄砲っていうか、ベアトが優しいのはわかるけど、そういうとこホントよくないと思うぞ……」"
translation = "「생각이 없다고 해야 할지, 무모하다고 해야 할지. 베아토가 상냥한 건 알지만, 그런 부분은 정말 좋지 않다고 생각해……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ごめんなさ～いっ」"
translation = "「미안해요~」"

[[dialogue]]
speaker = "チナ"
original = "「ってことは、ルヴィがああ言ったのは、ベアトを庇ったんだな……。ルヴィって、けっこう甘いところあるからな……」"
translation = "「그렇다는 건, 루비가 그렇게 말한 건 베아토를 감싸준 거구나……. 루비는 꽤 무른 구석이 있으니까……」"

[[dialogue]]
speaker = "チナ"
original = "「でも──本当に無事でよかった。装置なしで平行世界を渡るなんて、死んでもおかしくないからな」"
translation = "「하지만── 정말 무사해서 다행이야. 장치도 없이 평행세계를 건너다니, 죽어도 이상하지 않으니까」"

[[dialogue]]
speaker = "チナ"
original = "「でもどうしてまたアルタイルに？\u3000向こうでルヴィに会ったんじゃ……」"
translation = "「그런데 왜 다시 알타이르에? 저쪽에서 루비를 만난 게……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん。それがチナちゃんに話したいことなの」"
translation = "「응. 그게 치나짱에게 하고 싶은 이야기야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「すごくびっくりするだろうし、信じられないかもしれないけど、聞いて」"
translation = "「무척 놀랄 테고 믿기지 않을지도 모르지만, 들어줘」"

[[dialogue]]
speaker = "unk"
original = "そしてベアトリスは、チナの瞳を真っ直ぐ見つめながら話し始めた──"
translation = "그리고 베아트리스는 치나의 눈동자를 똑바로 바라보며 이야기하기 시작했다──"

[[dialogue]]
speaker = "チナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ベアトリス"
original = "「やっぱり、信じられないよね。でもルヴィは新しい女神で──」"
translation = "「역시 믿기지 않지. 하지만 루비는 새로운 여신이고──」"

[[dialogue]]
speaker = "チナ"
original = "「ウソだ！\u3000ベアトはアルタイルの連中に騙されてるんだ！」"
translation = "「거짓말이야! 베아토는 알타이르 녀석들에게 속고 있는 거야!」"

[[dialogue]]
speaker = "チナ"
original = "「じゃなきゃ、ルヴィが……あのルヴィが！\u3000リクリエを起こそうとしてるなんて、そんなはずない！！」"
translation = "「그게 아니라면 루비가…… 그 루비가! 리크리에를 일으키려 하다니, 그럴 리 없어!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「違うよ。私は騙されてなんかない。全部私がこの目で見て、聞いてきたことなんだ」"
translation = "「아니야. 나는 속고 있는 게 아니야. 전부 내가 이 눈으로 보고 들어온 일이야」"

[[dialogue]]
speaker = "チナ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "取り乱して怒りを露わにするチナに、ベアトリスは険しい顔をしながらも、努めて冷静に応える。"
translation = "당황하며 분노를 드러내는 치나에게 베아트리스는 험한 표정을 지으면서도 애써 냉정하게 대답한다."

[[dialogue]]
speaker = "unk"
original = "その目は潤み、不安で震えそうになるのを堪えながら、チナに向かい合う。"
translation = "그 눈은 젖어 있었고, 불안함에 떨릴 것 같은 것을 견뎌내며 치나와 마주한다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ディザスターハンドはベガを滅ぼした。ルヴィはそのディザスターハンドと一緒にいた」"
translation = "「디재스터 핸드는 베가를 멸망시켰어. 루비는 그 디재스터 핸드와 함께 있었어」"

[[dialogue]]
speaker = "ベアトリス"
original = "「他ならぬ女神テルル様が、ルヴィは新たな女神だって言った」"
translation = "「다름 아닌 여신 테루루 님이 루비는 새로운 여신이라고 말씀하셨어」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そしてルヴィを生み出したのは、女神様の上にいる創造神……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だった」"
translation = "「그리고 루비를 만들어낸 건 여신님 위에 있는 창조신…… 『<ruby>제로스<rt>XELOS</rt></ruby>』였어」"

[[dialogue]]
speaker = "ベアトリス"
original = "「少なくとも、それは確か。否定したくてもできないんだ」"
translation = "「적어도 그건 확실해. 부정하고 싶어도 할 수 없어」"

[[dialogue]]
speaker = "チナ"
original = "「……っ」"
translation = "「……윽」"

[[dialogue]]
speaker = "unk"
original = "チナはベアトリスの発言を否定しようとするが、うまく言葉が出てこない。"
translation = "치나는 베아트리스의 발언을 부정하려 하지만, 말이 잘 나오지 않는다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ごめん……いきなりこんなこと言われても受け止め切れないよね。正直、私だってまだ全部信じられない」"
translation = "「미안…… 갑자기 이런 말을 들어도 다 받아들이기 힘들겠지. 솔직히 나도 아직 전부 믿기지는 않아」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも私、まだ納得してないから」"
translation = "「하지만 나, 아직 납득하지 못했으니까」"

[[dialogue]]
speaker = "ベアトリス"
original = "「リクリエを起こそうとしてるのが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に従ってるからなのか、それともルヴィ自身の意志なのか……もう一度ルヴィに会って、直接聞くの」"
translation = "「리크리에를 일으키려는 게 『<ruby>제로스<rt>XELOS</rt></ruby>』를 따르고 있기 때문인지, 아니면 루비 자신의 의지인지…… 다시 한번 루비를 만나서 직접 물어볼 거야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「女神だってことを隠していたように、きっと他にも話してないことたくさんあると思うんだ」"
translation = "「여신이라는 걸 숨기고 있었던 것처럼, 분명 다른 말하지 않은 것들이 잔뜩 있을 거라고 생각해」"

[[dialogue]]
speaker = "ベアトリス"
original = "「それを全部話してもらって、それからどうするか決める」"
translation = "「그걸 전부 듣고 나서 어떻게 할지 결정할 거야」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でもその前に、アルタイルを守らないと。天界が襲われて──」"
translation = "「하지만 그전에 알타이르를 지켜야 해. 천계가 습격당해서──」"

[[dialogue]]
speaker = "チナ"
original = "「天界が……！？」"
translation = "「천계가……!?」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが天界と口にした途端、チナの表情に動揺が走った。"
translation = "베아트리스가 천계라고 입에 담자마자 치나의 표정에 동요가 일었다."

[[dialogue]]
speaker = "ベアトリス"
original = "「チナちゃん？」"
translation = "「치나짱?」"

[[dialogue]]
speaker = "チナ"
original = "「いや……何でもない……」"
translation = "「아니…… 아무것도 아니야……」"

[[dialogue]]
speaker = "unk"
original = "不思議そうに問うベアトリスに、チナはごまかすように目を逸らす。"
translation = "의아한 듯 묻는 베아트리스에게 치나는 얼버무리듯 눈을 피한다."

[[dialogue]]
speaker = "ベアトリス"
original = "「チナちゃん、何か知ってるの？\u3000だったら私に教えて」"
translation = "「치나짱, 뭔가 알고 있어? 그렇다면 나에게 알려줘」"

[[dialogue]]
speaker = "チナ"
original = "「そんなの言えるわけ……」"
translation = "「그런 걸 말할 수 있을 리가……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「お願い！\u3000今ならまだ、デネブもアルタイルも救えるかもしれない！」"
translation = "「부탁이야! 지금이라면 아직 데네브도 알타이르도 구할 수 있을지도 몰라!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でもこのままじゃアルタイルが滅びちゃう！\u3000それが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の目論見通りだったとしたら、デネブも危ない！」"
translation = "「하지만 이대로라면 알타이르가 멸망해버려! 그것이 『<ruby>제로스<rt>XELOS</rt></ruby>』의 계획대로라면 데네브도 위험해!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私は……アルタイルもデネブも救いたい！\u3000誰も見捨てない！\u3000それが私が星騎士になった理由だから！」"
translation = "「나는…… 알타이르도 데네브도 구하고 싶어! 아무도 저버리지 않아! 그게 내가 성기사가 된 이유니까!」"

[[dialogue]]
speaker = "チナ"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「デネブとアルタイルが戦えば、リクリエを望む者の思い通りになる。デネブのためにもアルタイルを守らないと！」"
translation = "「데네브와 알타이르가 싸우면 리크리에를 바라는 자의 뜻대로 될 거야. 데네브를 위해서라도 알타이르를 지켜야 해!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だからお願い！\u3000チナちゃんが知ってることを教えて！」"
translation = "「그러니까 부탁이야! 치나짱이 알고 있는 걸 알려줘!」"

[[dialogue]]
speaker = "チナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "チナ"
original = "「……女神の神殿」"
translation = "「……여신의 신전」"

[[dialogue]]
speaker = "ベアトリス"
original = "「女神の……神殿？\u3000守護天使様の神殿じゃなくて？」"
translation = "「여신의…… 신전? 수호천사 님의 신전이 아니라?」"

[[dialogue]]
speaker = "チナ"
original = "「うん……女神のほう。約３０００年前、リクリエが退けられた後、三界からは霊力が失われただろ……？」"
translation = "「응…… 여신 쪽. 약 3000년 전, 리크리에가 저지된 후 삼계에서는 영력이 사라졌잖아……?」"

[[dialogue]]
speaker = "チナ"
original = "「天使たちは元は実体のない霊体で、霊力がなくなれば消滅するはずだった」"
translation = "「천사들은 원래 실체가 없는 영체라서 영력이 없어지면 소멸해야 했어」"

[[dialogue]]
speaker = "チナ"
original = "「だけど女神テルルは女神の神殿を作り出し、天使と天界を実体化させた」"
translation = "「하지만 여신 테루루는 여신의 신전을 만들어내어 천사와 천계를 실체화시켰어」"

[[dialogue]]
speaker = "チナ"
original = "「だから女神の神殿が破壊されれば、全ての天使と天界が消滅する……ってルヴィが言ってたんだ」"
translation = "「그래서 여신의 신전이 파괴되면 모든 천사와 천계가 소멸한다……고 루비가 말했어」"

[[dialogue]]
speaker = "ベアトリス"
original = "「──！？\u3000じゃあそれが襲撃の真の狙い！？」"
translation = "「──!? 그럼 그게 습격의 진짜 노림수!?」"

[[dialogue]]
speaker = "チナ"
original = "「多分……。ベアトが極星学園からいなくなった後、アルタイルの神殿を破壊する計画を立ててたから」"
translation = "「아마도……. 베아토가 극성학원에서 사라진 후 알타이르의 신전을 파괴할 계획을 세우고 있었으니까」"

[[dialogue]]
speaker = "チナ"
original = "「襲撃があったってことは、天界の調査に行ってたレティシアとグレイスが女神の神殿を見つけた……んだと思う」"
translation = "「습격이 있었다는 건, 천계 조사를 하러 갔던 레티시아와 그레이스가 여신의 신전을 발견했다……는 거겠지」"

[[dialogue]]
speaker = "ベアトリス"
original = "「デネブに戻った時、２人と会わなかったのはそのせいだったんだ……」"
translation = "「데네브로 돌아왔을 때 두 사람과 만나지 못한 건 그 때문이었구나……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「チナちゃんは神殿の場所は知らないんだよね？」"
translation = "「치나짱은 신전의 위치는 모르지?」"

[[dialogue]]
speaker = "チナ"
original = "「うん。アタシがアルタイルに来ている間に、２人は天界に行ってたから……」"
translation = "「응. 내가 알타이르에 와 있는 동안 두 사람은 천계에 갔었으니까……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そうだよね。ありがとう、チナちゃん。話しづらいことまで話してくれて」"
translation = "「그렇구나. 고마워, 치나짱. 말하기 힘든 것까지 이야기해 줘서」"

[[dialogue]]
speaker = "ベアトリス"
original = "「本当はもっと話したいけど……ごめん！\u3000行ってくる！」"
translation = "「사실 더 이야기하고 싶지만…… 미안! 다녀올게!」"

[[dialogue]]
speaker = "チナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "会議室を急いで出ていくベアトリスを、チナは唇を噛みながら見送った。"
translation = "회의실을 서둘러 나가는 베아트리스를 치나는 입술을 깨물며 배웅했다."

