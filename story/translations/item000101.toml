[[dialogue]]
speaker = "？？？"
original = "「ク～ロ～ト～！」"
translation = "「쿠~로~토~!」"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。星徒会室で書類仕事をしていると、元気に呼ぶ声が聞こえてきて――"
translation = "어느 날 방과 후. 성도회실에서 서류 작업을 하고 있자니 활기차게 부르는 목소리가 들려오고――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ、いたいた♪\u3000ねぇ、聞いて！\u3000星徒会でレミカの仲間探しに協力しようと思うの！」"
translation = "「앗, 찾았다♪ 저기, 들어봐! 성도회에서 레미카의 동료 찾기를 도와주기로 했어!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ちょっと、ヴィーナス。自分で探すつもりだから、そんな事を大袈裟にしなくていいんだって……」"
translation = "「잠깐, 비너스. 스스로 찾을 생각이니까 그렇게 호들갑 떨지 않아도 된다니까……」"

[[dialogue]]
speaker = "unk"
original = "あっ！\u3000キミは人気アイドルの……！"
translation = "앗! 너는 인기 아이돌인……!"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ん……初めまして、会長。新星学園２年の<ruby>愛戸<rt>あいど</rt></ruby>レミカです」"
translation = "「음…… 처음 뵙겠습니다, 회장님. 신성 학원 2학년 아이도 레미카예요」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「芸能事務所『ポラリスプロダクション』所属で、アイドルの仕事をやっています」"
translation = "「연예 기획사 『폴라리스 프로덕션』 소속으로 아이돌 일을 하고 있어요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「学園どころか、流星市国でも知らない人はいないくらいの有名人だから、クロトも当然知っているわよね！\u3000レミカは現役のトッププロアイドルだもの！」"
translation = "「학원은커녕 유성시국에서도 모르는 사람이 없을 정도의 유명인이니까, 쿠로토도 당연히 알고 있겠지! 레미카는 현역 톱 프로 아이돌인걸!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「天性の心痺れる歌声で、新曲が出ればヒットチャートで１位連発！\u3000レミカが着たファッションは、若い女の子達の間ですぐブームになる程の影響力！」"
translation = "「천성적인 마음을 울리는 노랫소리로 신곡이 나오면 히트 차트 1위 연발! 레미카가 입은 패션은 젊은 여자애들 사이에서 금방 붐이 될 정도의 영향력!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そのクールな立ち振る舞いで『自立したカッコいい女子の理想』として君臨し、今や活躍の範囲は国内にとどまらず、海外まで知れ渡る世界的アーティストなのよ！」"
translation = "「그 쿨한 태도로 『자립한 멋진 여자의 이상향』으로서 군림하며, 이제 활약 범위는 국내에 머물지 않고 해외까지 알려진 세계적인 아티스트라고!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「いや、熱弁過ぎるでしょ。確かに私は完全無欠のトップアイドルを目指しているけど……恥ずかしいから、それくらいにして」"
translation = "「아니, 너무 열변을 토하잖아. 확실히 나는 완전무결한 톱 아이돌을 목표로 하고 있지만…… 부끄러우니까 그 정도로 해둬」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だって私、レミカのファンだもの！\u3000ＣＤだって持っているんだから♪」"
translation = "「그치만 나, 레미카의 팬인걸! CD도 가지고 있다구♪」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは愛戸さんと親しいのか？"
translation = "비너스는 아이도 씨와 친한 거야?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ヴィーナスとはクラスメイトなんです。この子、誰にでも人見知りせずグイグイ行くんで、それで自然と話すようになったというか……」"
translation = "「비너스와는 클래스메이트예요. 이 애, 누구에게나 낯가림 없이 쑥쑥 다가오니까, 그래서 자연스럽게 이야기하게 됐달까……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ、それと会長。そこまで私相手にかしこまらなくていいですよ。同級生ですし、愛戸でもレミカでも、普通に呼んでくれれば」"
translation = "「아, 그리고 회장님. 그렇게 저한테 격식 차리지 않아도 돼요. 동급생이기도 하고, 아이도든 레미카든 편하게 불러주면」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、俺もレミカって呼ぶよ"
translation = "그럼 나도 레미카라고 부를게"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はい。それでパーフェクトです」"
translation = "「네. 그걸로 퍼펙트예요」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――会長に対しても、同級生だから敬語はいらない……ヴィーナスに話してるのと同じみたいに、ですか？」"
translation = "「――회장님한테도 동급생이니까 경어는 필요 없어…… 비너스한테 말하는 거랑 똑같이, 인가요?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……ん、分かった。ありがと」"
translation = "「……응, 알았어. 고마워」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「じゃあ、アイドルの時みたいにじゃなくて、普段の自分らしく喋らせてもらうね。会長」"
translation = "「그럼 아이돌 때처럼이 아니라 평소의 나답게 말할게. 회장」"

[[dialogue]]
speaker = "unk"
original = "それで、さっきの仲間探しっていうのは？"
translation = "그래서 아까 말한 동료 찾기라는 건?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「実は、レミカがユニットを組みたくて、自分と一緒にアイドルをやってくれる子を探しているらしいのよ」"
translation = "「사실은 레미카가 유닛을 짜고 싶어서, 자기랑 같이 아이돌을 해줄 애를 찾고 있는 모양이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だったら星徒会で協力して、そのことを広く告知すれば、立候補してくれる子がいるかもしれないでしょう？」"
translation = "「그렇다면 성도회에서 협력해서 그 사실을 널리 알리면 입후보해 줄 애가 있을지도 모르잖아?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ありがたいけど、そこまでしなくてもいいんだって。歌とか、人を惹きつけるような才能があるかどうか、自分の目で見極めたいし」"
translation = "「고맙지만 그렇게까지 안 해도 된다니까. 노래라든가 사람을 끌어당기는 재능이 있는지 어떤지 내 눈으로 판별하고 싶고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「立候補してくれた子達を、オーディションでも何でもすればよくない？」"
translation = "「입후보해 준 애들을 오디션이든 뭐든 하면 되잖아?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ヴィーナスと違って、私はそういうタイプじゃないの。協力したいって言ってくれるのはありがたいけど……今はまだ、じっくり探させて欲しい」"
translation = "「비너스와 다르게 나는 그런 타입이 아니야. 도와주고 싶다고 말해주는 건 고맙지만…… 지금은 아직 느긋하게 찾고 싶어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなの？\u3000残念だわ……いちファンとして、力になりたかったのに」"
translation = "「그래? 아쉽네…… 한 명의 팬으로서 힘이 되고 싶었는데」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ありがと。その代わり、私が本当に困った時は相談するから。友達として話を聞いてくれると嬉しい、かな」"
translation = "「고마워. 대신 내가 정말 곤란할 때는 상담할게. 친구로서 이야기를 들어주면 기쁠 거야, 아마」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、もちろんよ！\u3000つまりは――」"
translation = "「응, 물론이지! 즉――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「困った時のファンこそ、真のファンってことよね！」"
translation = "「곤란할 때의 팬이야말로 진정한 팬이라는 거지!」"

[[dialogue]]
speaker = "unk"
original = "そこは友って言うところじゃないのか……"
translation = "거기는 친구라고 말할 타이밍 아니야……?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ヴィーナス、あんた……」"
translation = "「비너스, 너……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ぷっ……ふ……ふふ……、くっ……ふっ……ふふ……！」"
translation = "「풋…… 후…… 후후……, 큭…… 훗…… 후후……!」"

[[dialogue]]
speaker = "unk"
original = "ど、どうした？\u3000お腹を押さえたりして……"
translation = "왜, 왜 그래? 배를 움켜쥐고……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫よ。何かツボに入って、笑いのスイッチが入っちゃっただけだから」"
translation = "「괜찮아. 뭔가 웃음보가 터져서 웃음 스위치가 켜졌을 뿐이니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「レミカはいつも変なところでツボるのよ。笑いのツボが浅いのね！」"
translation = "「레미카는 항상 이상한 데서 웃음보가 터진다니까. 웃음 장벽이 낮네!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「っ……すぅ～……ふぅ。……いや、笑ってないし。アイドルはそんなことで笑ったりしないから」"
translation = "「윽…… 스으~…… 후우. ……아니, 안 웃었어. 아이돌은 그런 일로 웃거나 하지 않으니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アイドルだってバカ笑いくらいするわよ。ゲラゲラ系アイドルとか、意外とウケるんじゃないかしら！」"
translation = "「아이돌이라도 박장대소 정도는 한다구. 깔깔계 아이돌이라든가 의외로 먹히지 않을까!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふ～ん。まあ、そういうのがいてもいいかもね。私は違うけど」"
translation = "「흐음. 뭐, 그런 게 있어도 좋을지도 모르겠네. 나는 아니지만」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ね？\u3000本物はテレビで見るより面白いでしょ」"
translation = "「그치? 실물은 TV에서 보는 것보다 재밌지?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長、違うから。私はヴィーナスの天然発言でウケたりしないから」"
translation = "「회장, 아니야. 나는 비너스의 천연 발언 때문에 웃거나 하지 않아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「天然発言！？\u3000えっ、私のどこが天然なの……！？」"
translation = "「천연 발언!? 엣, 내 어디가 천연이라는 거야……!?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そういうところが……ぷっ……ふ、ふふふ……」"
translation = "「그런 점이…… 풋…… 후, 후후후……」"

[[dialogue]]
speaker = "unk"
original = "（いや、本当に浅いな。どうなってんだ）"
translation = "(아니, 정말 낮네. 어떻게 된 거야)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……と、とにかく。会長、これからよろしく」"
translation = "「……어, 어쨌든. 회장, 앞으로 잘 부탁해」"

[[dialogue]]
speaker = "unk"
original = "その沸点の低さでクール系アイドルは無理があるでしょ……と思わなくもなかったが、ともかくそうして愛戸レミカと知り合いになったのだった。"
translation = "그 웃음보로 쿨계 아이돌은 무리가 아닐까…… 싶기도 했지만, 어쨌든 그렇게 아이도 레미카와 알게 된 것이었다."

