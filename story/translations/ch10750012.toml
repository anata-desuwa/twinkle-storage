[[dialogue]]
speaker = "unk"
original = "第２話,スタンドバイユー,P"
translation = "제2화, 스탠드 바이 유, P"

[[dialogue]]
speaker = "シフォン"
original = "「おおう……。相変わらず流星市国は人通りがすごいですね……。うちの田舎町とは比べものになりません……」"
translation = "「오오……. 여전히 유성시국은 유동 인구가 엄청나네요…… 우리 시골 마을과는 비교도 안 돼요……」"

[[dialogue]]
speaker = "シフォン"
original = "「流石に緊張しますね……。さっきから視線も突き刺さりまくりですし……」"
translation = "「과연 긴장되네요……. 아까부터 시선도 따갑게 꽂히고 있구요……」"

[[dialogue]]
speaker = "シフォン"
original = "「ですが日和っていては始まりません……！\u3000と、とにかく勇気を出してブラついてみましょうっ……！」"
translation = "「하지만 겁먹어서는 시작조차 할 수 없죠……! 아, 아무튼 용기를 내서 돌아다녀 보자구요……!」"

[[dialogue]]
speaker = "unk"
original = "そんな格好で何してるんだ？"
translation = "그런 차림으로 뭐 하는 거야?"

[[dialogue]]
speaker = "シフォン"
original = "「ひゃっ！？\u3000か、会長さんですか。急に声をかけないでくださいよ。心臓に悪いですね……！」"
translation = "「히얏!? 회, 회장님이신가요. 갑자기 말을 걸지 마세요. 심장에 안 좋다구요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「ちょっと訓練がてら散歩しているだけですよ。お陰様でプリマステラにはなれましたが、未だに注目を浴びることが苦手なものでして……」"
translation = "「잠시 훈련 겸 산책하고 있을 뿐이에요. 덕분에 프리마스텔라는 되었지만, 여전히 주목받는 건 서툴러서요……」"

[[dialogue]]
speaker = "シフォン"
original = "「特にこの天使らしくない戦闘服を見られるとつい畏縮してしまうんです。でも戦闘中にいちいち竦んでいては洒落になりませんからね」"
translation = "「특히 이 천사답지 않은 전투복을 보이면 자꾸 위축되거든요. 하지만 전투 중에 일일이 떨고 있으면 큰일이니까요.」"

[[dialogue]]
speaker = "シフォン"
original = "「だからこうして戦闘服で人通りの多い場所を練り歩いて、少しでも人目に慣れようと思ったわけです。ちょっと荒療治ですが」"
translation = "「그래서 이렇게 전투복 차림으로 유동 인구가 많은 곳을 활보하며, 조금이라도 남들의 시선에 익숙해지려고 하는 거예요. 좀 충격 요법이지만요.」"

[[dialogue]]
speaker = "シフォン"
original = "「もっと天使らしい衣装を着られたら解決するんですけどね。ですが適正属性が闇ということもあって何度調整しても黒っぽいデザインになっちゃうんですよ」"
translation = "「좀 더 천사다운 의상을 입으면 해결되겠지만 말이에요. 하지만 적정 속성이 어둠인 탓에 몇 번을 조정해도 검은색 위주의 디자인이 되어버려요.」"

[[dialogue]]
speaker = "シフォン"
original = "「羽根も黒で戦闘服も黒……仕方ないとはいえ、どうしても気になってしまって……」"
translation = "「날개도 검고 전투복도 검고…… 어쩔 수 없다지만, 아무래도 신경 쓰여서……」"

[[dialogue]]
speaker = "unk"
original = "ダークエンジェルって感じで格好いい"
translation = "다크 엔젤 같은 느낌이라 멋져"

[[dialogue]]
speaker = "シフォン"
original = "「か、格好いいって。また会長さんは適当なことを。天使のくせして黒っぽいっていうアベコベっぷりがコンプレックスだって話ですのに」"
translation = "「멋, 멋지다니. 또 회장님은 적당한 소리를. 천사 주제에 검은색 위주라는 거꾸로 된 모습이 콤플렉스라고 말씀드리고 있는데.」"

[[dialogue]]
speaker = "シフォン"
original = "「もしかして、とりあえず褒めておけば私が喜ぶとでも思ってます？\u3000言っておきますけど、私はそこまでチョロくありませんよ！」"
translation = "「혹시, 일단 칭찬해 두면 제가 기뻐할 거라 생각하시나요? 미리 말해두겠는데, 전 그렇게 호락호락한 여자가 아니라구요!」"

[[dialogue]]
speaker = "シフォン"
original = "「……ち、ちなみにですが、本当に格好いいと思ってくれてるんですか？」"
translation = "「……그, 그나저나 말이죠, 정말로 멋지다고 생각하시나요?」"

[[dialogue]]
speaker = "シフォン"
original = "「……そ、そうなんですか。えへへ……」"
translation = "「……그, 그렇군요. 에헤헤……」"

[[dialogue]]
speaker = "シフォン"
original = "「って！\u3000今のは違いますよ！\u3000別に喜んでいたわけでは……！\u3000ただ──……って」"
translation = "「아니! 방금 그건 아니에요! 딱히 기뻐서 그런 게 아니라……! 그냥──…… 어라」"

[[dialogue]]
speaker = "シフォン"
original = "「あの女の子……どうしたんでしょうか。ほら、あの子ですよ。交差点の向こうにいる……」"
translation = "「저 여자아이…… 무슨 일일까요. 봐요, 저 아이요. 교차로 건너편에 있는……」"

[[dialogue]]
speaker = "シフォン"
original = "「信号が変わったのに歩き出そうとすらしません。ずっと俯いたまま立ち尽くしていて……」"
translation = "「신호가 바뀌었는데도 걸음을 떼려 하지도 않아요. 계속 고개를 숙인 채 우두커니 서 있어서……」"

[[dialogue]]
speaker = "シフォン"
original = "「ちょっと行ってきます……！\u3000放っておけませんから……！」"
translation = "「잠시 다녀올게요……! 그냥 둘 수 없으니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「どうしたんですか？\u3000そんなにしょんぼりした顔をして」"
translation = "「무슨 일 있니? 그렇게 시무룩한 얼굴을 하고.」"

[[dialogue]]
speaker = "シフォン"
original = "「ふふ、そんなに警戒しないでください。元気のなさそうな顔をしていたので気になっただけです」"
translation = "「후후, 그렇게 경계하지 마. 기운이 없어 보이는 얼굴을 하길래 신경이 쓰여서 그런 거야.」"

[[dialogue]]
speaker = "シフォン"
original = "「良かったらこれからお姉さんと遊びに行きませんか？\u3000何か悩み事があるなら、パーッと遊んだ方が気晴らしになりますよ？」"
translation = "「괜찮으면 이제부터 언니랑 놀러 안 갈래? 뭔가 고민거리가 있다면, 확 놀아버리는 게 기분 전환이 되거든.」"

[[dialogue]]
speaker = "シフォン"
original = "「木登りとかどうです？\u3000虫取りや水遊びとかも楽しいですよ？\u3000あ、なんなら山菜採りとかも──」"
translation = "「나무 타기 같은 건 어때? 곤충 채집이나 물놀이 같은 것도 재밌단다? 아, 아니면 산나물 캐기 같은 것도──」"

[[dialogue]]
speaker = "unk"
original = "遊びのチョイスが田舎基準すぎるのでは……"
translation = "놀이 선택이 너무 시골 기준인 거 아냐……"

[[dialogue]]
speaker = "シフォン"
original = "「～～っっ。う、うるさいですね！\u3000今のはジョークですよ、ジョーク！\u3000まずは場を和ませるのが肝要なんです……！」"
translation = "「~~윽. 시, 시끄럽네요! 방금 건 농담이에요, 농담! 우선 분위기를 누그러뜨리는 게 긴요하다구요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「というか会長さんもしゃがんでくださいっ。女の子が怖がっちゃったらどうするんですかっ」"
translation = "「그보다 회장님도 몸을 낮춰주세요. 여자아이가 겁먹으면 어쩔 거예요.」"

[[dialogue]]
speaker = "シフォン"
original = "「あっ、うるさくしちゃってすみませんね。この人はデリカシーってものがどうも不足しちゃってるみたいで」"
translation = "「앗, 소란스럽게 해서 미안해. 이 아저씨는 데리카시라는 게 아무래도 좀 부족해서 말이야.」"

[[dialogue]]
speaker = "シフォン"
original = "「ともかく、そんなに俯いていたらせっかくの美人も台無しです。涙も零れやすくなっちゃいますしね？」"
translation = "「어쨌든, 그렇게 고개를 숙이고 있으면 모처럼의 미인인데 아깝잖아. 눈물도 쏟아지기 쉬워지고 말이야, 그치?」"

[[dialogue]]
speaker = "シフォン"
original = "「何か悲しい出来事があったのなら、遊んだ後でもいいので私に話してみてください。１人で抱えていると辛いだけですから」"
translation = "「무슨 슬픈 일이 있었다면, 논 다음이라도 좋으니 언니한테 말해줘. 혼자서 끙끙 앓고 있으면 힘들기만 하니까.」"

[[dialogue]]
speaker = "シフォン"
original = "「こんな黒いナリですが、私も一応星騎士ですからね。安心して頼ってくれていいんですよ──」"
translation = "「이런 검은 모습이지만, 나도 일단은 성기사거든. 안심하고 의지해도 된단다──」"

[[dialogue]]
speaker = "シフォン"
original = "「元気出ましたか？\u3000ふふ、それなら良かったです」"
translation = "「기운 좀 났니? 후후, 그렇다면 다행이야.」"

[[dialogue]]
speaker = "シフォン"
original = "「もしまた辛いことがあったらいつでも連絡してくださいね？\u3000おなか部にも是非遊びに来てください」"
translation = "「혹시 또 힘든 일이 생기면 언제든 연락하렴. 오나카부에도 꼭 놀러 오고.」"

[[dialogue]]
speaker = "unk"
original = "笑顔で帰って行ったね"
translation = "웃으면서 돌아갔네"

[[dialogue]]
speaker = "シフォン"
original = "「ええ、本当に良かったです」"
translation = "「네, 정말 다행이에요.」"

[[dialogue]]
speaker = "シフォン"
original = "「どうやらあの子、地方から引っ越してきたばかりらしいですね。地元の方言がクラスで浮いちゃって馴染めずにいるみたいです」"
translation = "「아무래도 저 아이, 지방에서 막 이사 온 모양이더라고요. 고향 사투리가 반에서 튀는 바람에 적응하지 못하고 있었나 봐요.」"

[[dialogue]]
speaker = "unk"
original = "でもシフォンに方言を褒められてあの子すごく喜んでたよ"
translation = "하지만 시퐁이 사투리를 칭찬해 줘서 저 아이 무척 기뻐했어"

[[dialogue]]
speaker = "シフォン"
original = "「ふふ、実際すごく可愛い喋り方でしたからね。本人はまだまだ気にしている様子でしたが」"
translation = "「후후, 실제로 무척 귀여운 말투였으니까요. 본인은 아직도 신경 쓰는 눈치였지만요.」"

[[dialogue]]
speaker = "シフォン"
original = "「私の励ましが少しでも彼女の支えになってくれたら嬉しいです。私はああいう子の味方に、居場所になりたくて星騎士を志しましたから」"
translation = "「제 격려가 조금이라도 그 아이의 버팀목이 되어준다면 좋겠어요. 저는 저런 아이들의 편이, 머무를 곳이 되어주고 싶어서 성기사를 지망했으니까요.」"

[[dialogue]]
speaker = "シフォン"
original = "「独りぼっちで俯いているのは寂しくて辛いことですからね。だけど傍にいてくれる人や自分を認めてくれる人がいたらとても救われるんですよ」"
translation = "「홀로 고개를 숙이고 있는 건 외롭고 힘든 일이니까요. 하지만 곁에 있어 주는 사람이나 자신을 인정해 주는 사람이 있다면 큰 구원이 되거든요.」"

[[dialogue]]
speaker = "シフォン"
original = "「私はそれを身を以て知っていますから。パルミエやモナカと出会う前は引きこもりもいいところでしたし……。独りぼっちで俯いてばっかりでしたからね……」"
translation = "「저는 그걸 몸소 겪어봐서 잘 알아요. 파르미에나 모나카를 만나기 전엔 히키코모리나 다름없었으니까요……. 홀로 고개를 숙이고만 있었으니까요……」"

[[dialogue]]
speaker = "シフォン"
original = "「って、何を感心した顔してるんですか？\u3000私がしようとしてること、会長さんは自然にやってますよ？」"
translation = "「아니, 왜 감탄하는 표정을 짓고 계세요? 제가 하려는 걸, 회장님은 자연스럽게 하고 계시잖아요.」"

[[dialogue]]
speaker = "シフォン"
original = "「さっき私の戦闘服を格好いいって褒めてくれたじゃないですか。あの一言だけでも……私、結構救われちゃいましたもん」"
translation = "「방금 제 전투복을 멋지다고 칭찬해 주셨죠. 그 한마디만으로도…… 저, 꽤 구원받았는걸요.」"

[[dialogue]]
speaker = "シフォン"
original = "「言葉って不思議ですよね。何気ない一言が心を抉るナイフにもなれば、心を救ってくれる抱擁にもなる」"
translation = "「말이란 건 신기하네요. 무심한 한마디가 마음을 도려내는 칼이 되기도 하지만, 마음을 구해주는 포옹이 되기도 하죠.」"

[[dialogue]]
speaker = "シフォン"
original = "「私はどんな人の心でも抱き締めてあげられる人になりたいんです。どんなコンプレックスや悩みを抱えていても肯定してあげられる人に」"
translation = "「저는 어떤 사람의 마음이라도 껴안아 줄 수 있는 사람이 되고 싶어요. 어떤 콤플렉스나 고민을 안고 있더라도 긍정해 줄 수 있는 사람으로요.」"

[[dialogue]]
speaker = "シフォン"
original = "「会長さんも誰かに心を傷つけられた時は私に話してみてください。どんな事情があっても私は全力で抱き締めてあげますよ」"
translation = "「회장님도 누군가에게 마음의 상처를 입었을 때는 저에게 이야기해 주세요. 어떤 사정이 있더라도 제가 온 힘을 다해 껴안아 드릴게요.」"

[[dialogue]]
speaker = "シフォン"
original = "「ただ傍にいてほしいってだけでも大歓迎です。あなたは独りじゃありません。私はどんな時でもあなたの味方です」"
translation = "「그저 곁에 있어 주었으면 좋겠다는 것만으로도 대환영이에요. 당신은 혼자가 아니에요. 저는 언제라도 당신의 편이에요.」"

[[dialogue]]
speaker = "シフォン"
original = "「って……あはは。柄にもなく天使っぽいこと言っちゃってますね。魔族の血も半分入ってるなんちゃって天使ですのに」"
translation = "「랄까…… 아하하. 저답지 않게 천사 같은 소리를 하고 있네요. 마족의 피도 절반 섞인 무늬만 천사인데.」"

[[dialogue]]
speaker = "シフォン"
original = "「でも、独りじゃないってことは覚えておいてください。辛い時や誰かに傍にいてもらいたい時は気軽に私を呼んでくれていいです」"
translation = "「하지만, 혼자가 아니라는 것만큼은 기억해 주세요. 힘들 때나 누군가 곁에 있어 주었으면 할 때는 부담 없이 저를 불러주셔도 돼요.」"

[[dialogue]]
speaker = "シフォン"
original = "「一緒にゴロゴロしたり、ゲームしたり、なんなら山菜採りに行ったりしましょう。俯いてる暇なんか、与えてあげませんから」"
translation = "「같이 빈둥거리거나, 게임 하거나, 아니면 산나물을 캐러 가요. 고개 숙이고 있을 틈 따위, 주지 않을 테니까요.」"

