[[dialogue]]
speaker = "アナ"
original = "「……波の音、落ち着きますね。さすがリップルさんの結界」"
translation = "「……파도 소리, 진정되네요. 역시 리플 씨의 결계」"

[[dialogue]]
speaker = "unk"
original = "ここはリップルが「海の家」を切り盛りしている浜辺……ではなく、それをコピーした別のリゾート結界。俺とアナしか入ることのできない特別な空間だ。"
translation = "여기는 리플이 「바다의 집」을 꾸리고 있는 해변……이 아니라, 그것을 카피한 다른 리조트 결계. 나와 아나밖에 들어올 수 없는 특별한 공간이다."

[[dialogue]]
speaker = "unk"
original = "恋人と夏最後の思い出を作ってきて欲しいと、リップルが今日一日結界を貸し切りにしてくれたのである。"
translation = "연인과 여름 마지막 추억을 만들고 오라며 리플이 오늘 하루 결계를 대절해 준 것이다."

[[dialogue]]
speaker = "アナ"
original = "「釣果が今一つ、というのが少し残念ですが……今日の目的はデート。結果は二の次です」"
translation = "「조과가 시원치 않다는 게 조금 아쉽습니다만…… 오늘의 목적은 데이트. 결과는 그다음입니다」"

[[dialogue]]
speaker = "アナ"
original = "「会長は釣れましたか？\u3000……その様子だと、あまり釣れてない様子」"
translation = "「회장님은 낚으셨나요? ……그 기색을 보니 별로 못 낚으신 모양」"

[[dialogue]]
speaker = "アナ"
original = "「……デートだから結果は気にしない、とは言ったものの、既にかれこれ２時間が経過。そろそろ別のことでもしましょう」"
translation = "「……데이트니까 결과는 신경 쓰지 않는다고는 했지만, 이미 벌써 2시간이 경과. 슬슬 다른 일이라도 하죠」"

[[dialogue]]
speaker = "クロト"
original = "「別のこと……っていうと？」"
translation = "「다른 일……이라니?」"

[[dialogue]]
speaker = "アナ"
original = "「決まってます。……もちろん、エッチです<emoji=heart04>」"
translation = "「정해져 있습니다. ……물론, 섹스입니다<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「さ、こっちは準備完了……です<emoji=heart04>」"
translation = "「자, 이쪽은 준비 완료……입니다<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「……？\u3000なにか問題でも？」"
translation = "「……? 무슨 문제라도?」"

[[dialogue]]
speaker = "アナ"
original = "「私たちは恋人同士。そしてここは二人きりの空間。……それなら、やることはひとつ」"
translation = "「우리들은 연인 사이. 그리고 여기는 둘만의 공간. ……그렇다면 할 일은 하나」"

[[dialogue]]
speaker = "アナ"
original = "「アナルも……おま○こも、どっちも準備できてます。会長の好きな方を、選んでください<emoji=heart04>」"
translation = "「애널도…… 보지도, 둘 다 준비됐습니다. 회장님이 원하시는 쪽을 골라주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナと初めて結ばれてからしばらく。天界の噂話を考慮して、処女を守るために俺たちはお尻の穴でのセックスが主だった。"
translation = "아나와 처음 맺어진 후로 한동안. 천계의 소문을 고려해 처녀를 지키기 위해 우리들은 똥구멍으로 섹스를 하는 게 주였다."

[[dialogue]]
speaker = "unk"
original = "しかし、結局それは迷信でしかなく、特に処女膜は重要ではないことが判明した。それ以来、アナは今まで以上にエッチなことへ積極的になった。"
translation = "하지만 결국 그것은 미신일 뿐이었고, 특히 처녀막은 중요하지 않다는 것이 판명되었다. 그 이후로 아나는 전보다 더 야한 일에 적극적이 되었다."

[[dialogue]]
speaker = "アナ"
original = "「ほら、どっちにしますか？\u3000早くしないと日が暮れてしまいます」"
translation = "「자, 어느 쪽으로 하실 건가요? 서두르지 않으면 해가 저물어버려요」"

[[dialogue]]
speaker = "アナ"
original = "「それとも、外でのエッチは嫌、ですか……？」"
translation = "「아니면 밖에서 하는 섹스는 싫으신가요……?」"

[[dialogue]]
speaker = "アナ"
original = "「……いえ、違いますね。だったら会長のチ○ポ……そんなに大きくなってるわけない」"
translation = "「……아니요, 아니네요. 그렇다면 회장님의 자지…… 그렇게 커져 있을 리가 없죠」"

[[dialogue]]
speaker = "アナ"
original = "「もしかして……想像してしまいましたか？」"
translation = "「혹시…… 상상해버리셨나요?」"

[[dialogue]]
speaker = "アナ"
original = "「こんな天気のいい日に、外でセックスしたら……どんなに気持ちいいんだろう、って<emoji=heart04>」"
translation = "「이렇게 날씨 좋은 날에 밖에서 섹스하면…… 얼마나 기분 좋을까, 하고요<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あ……っ<emoji=heart04>\u3000会長……今日はおま○こ……っ？」"
translation = "「아……<emoji=heart04> 회장님…… 오늘은 보지……?」"

[[dialogue]]
speaker = "アナ"
original = "「ん……っ<emoji=heart04>\u3000私はどっちでも……あん<emoji=heart04>\u3000んっ<emoji=heart04>\u3000そんな擦らなくても、もう濡れてますから大丈夫、です……っ<emoji=heart04>」"
translation = "「음……<emoji=heart04> 저는 어느 쪽이든…… 앙<emoji=heart04> 응<emoji=heart04> 그렇게 문지르지 않아도 이미 젖어있으니까 괜찮아요……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んふふ<emoji=heart04>\u3000結局、前にアナルでエッチしたあと、我慢できずおま○こも、使っちゃいましたが……<emoji=heart04>\u3000やっぱり迷信は迷信、でしたね……<emoji=heart04>」"
translation = "「응후후<emoji=heart04> 결국 저번에 애널로 섹스한 뒤에 참지 못하고 보지도 써버렸지만요……<emoji=heart04> 역시 미신은 미신이었네요……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「お尻の穴も好き、ですけど……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000やっぱり、会長のチ○ポ挿れてもらうなら、おま○この方が恋人って感じが、します……っ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「똥구멍도 좋아하지만요……<emoji=heart04> 앙<emoji=heart04> 역시 회장님 자지 넣어주시는 거라면 보지 쪽이 연인이라는 느낌이 들어요……<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んぁ……っ<emoji=heart04>\u3000会長のチ○ポ、はいってきましたぁ……っ<emoji=heart04>\u3000ゆっくり……っ<emoji=heart04>\u3000まるで味わってる、みたいです……っ<emoji=heart04>」"
translation = "「응아……<emoji=heart04> 회장님 자지, 들어왔어요……<emoji=heart04> 천천히……<emoji=heart04> 마치 맛보고 있는 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「私の小さいおま○こ、気持ちいいですか……？\u3000あんっ<emoji=heart04>\u3000……ふふ、その様子だと、言わなくても大丈夫……っ<emoji=heart04>」"
translation = "「제 좁은 보지, 기분 좋은가요……? 앙<emoji=heart04> ……후후, 그 기색을 보니 말하지 않아도 괜찮겠네요……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「だって、会長のチ○ポ<emoji=heart04>\u3000おま○この中で……すっごく喜んでる……っ<emoji=heart04>」"
translation = "「그야 회장님 자지<emoji=heart04> 보지 안에서…… 엄청 기뻐하고 있는걸……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「すっごくカチカチで……っ<emoji=heart04>\u3000大きくなってるの、わかる……<emoji=heart04>\u3000気持ちいいんですよね……私のおま○こ……あぁっ<emoji=heart04>」"
translation = "「엄청 딱딱해서……<emoji=heart04> 커진 거 알겠어요…… 기분 좋은 거죠…… 제 보지…… 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あ……っ<emoji=heart04>\u3000チ○ポ、ゆっくり動いて……なんだか、いやらしいですね……っ<emoji=heart04>\u3000ふぅぅ<emoji=heart04>」"
translation = "「아……<emoji=heart04> 자지, 천천히 움직여서…… 왠지 야하네요……<emoji=heart04> 후으으<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「おま○この中、チ○ポでギューギュー………<emoji=heart04>\u3000私の中が……はぁぁ<emoji=heart04>\u3000会長で、満たされてます<emoji=heart04>」"
translation = "「보지 안이 자지로 꽉꽉………<emoji=heart04> 제 안이…… 하아아<emoji=heart04> 회장님으로 채워지고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「んっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000いくら天使おま○こが気持ちいいからって、あまり激しくしちゃダメです、会長<emoji=heart04>」"
translation = "「응<emoji=heart04> 앗, 앙<emoji=heart04> 아무리 천사 보지가 기분 좋다고 해도 너무 격하게 하시면 안 돼요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「はぁぁ……激しくされたら、気持ちよくって……んんっ、おま○こ、ダメになっちゃいます<emoji=heart04>\u3000はぁぁ……<emoji=heart04>」"
translation = "「하아아…… 격하게 하면 기분 좋아서…… 응응, 보지, 망가져 버려요<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「確かに……っ<emoji=heart04>\u3000私の体は小さいし、おま○こだってキツキツ……<emoji=heart04>\u3000会長のチ○ポにかかれば、すぐメロメロになって……あんっ<emoji=heart04>\u3000逆らうこともできない<emoji=heart04>」"
translation = "「확실히……<emoji=heart04> 제 몸은 작고 보지도 꽉 끼니까……<emoji=heart04> 회장님 자지 앞에서는 금방 메롱메롱하게 돼서…… 앙<emoji=heart04> 거역할 수도 없어요<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「だから、お願い……っ<emoji=heart04>\u3000乱暴で、激しいセックス……<emoji=heart04>\u3000私のおま○こがバカになっちゃう、激しいセックス、しちゃダメですよ……っ<emoji=heart04>」"
translation = "「그러니까 부탁이에요……<emoji=heart04> 난폭하고 격한 섹스……<emoji=heart04> 제 보지가 바보가 되어버리는 격한 섹스, 하시면 안 돼요……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「オナホみたいに、小さい体持ち上げられて、激しくなんて……そんなセックス<emoji=heart04>\u3000考えただけで……っ<emoji=heart04>\u3000あんっ、はぁんっ<emoji=heart04>」"
translation = "「오나홀처럼 작은 몸이 들려 올려져서 격하게라니…… 그런 섹스<emoji=heart04> 생각만 해도……<emoji=heart04> 앙, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000はぁ……っ、あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ダメダメぇ……っ<emoji=heart04>\u3000激しいの気持ちよすぎる、からぁ<emoji=heart04>\u3000……はふぅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아…… 앗<emoji=heart04> 응응응<emoji=heart04> 안 돼 안 돼애……<emoji=heart04> 격한 거 너무 기분 좋으니까아<emoji=heart04> ……하후으으<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000私の腰、掴んで……っ<emoji=heart04>\u3000ゴシゴシって、使うみたいに乱暴なセックス……っ<emoji=heart04>\u3000ダメなのに<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000気持ちよく、なっちゃう……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 제 허리 잡고……<emoji=heart04> 고시고시하고 쓰는 것처럼 난폭한 섹스……<emoji=heart04> 안 되는데<emoji=heart04> 앙<emoji=heart04> 기분 좋아져 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「外なのに、誰の目もないからってっ<emoji=heart04>\u3000チ○ポ気持ちよくなりたい一心で、力いっぱい腰なんか振っちゃダメ<emoji=heart04>\u3000ダメダメぇ<emoji=heart04>\u3000……あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ん……っ<emoji=heart04>\u3000あはぁっ<emoji=heart04>」"
translation = "「밖인데 아무도 없다고 해서어<emoji=heart04> 자지 기분 좋아지고 싶은 일념으로 힘껏 허리 같은 거 흔들면 안 돼<emoji=heart04> 안 돼 안 돼애<emoji=heart04> ……앗<emoji=heart04> 앙<emoji=heart04> 응……<emoji=heart04> 아하앗<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「ふぅ……っ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふふふっ<emoji=heart04>\u3000ダメって言ったのに、どんどん激しくなって……っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000会長っ……それ、それぇ<emoji=heart04>」"
translation = "「후으……<emoji=heart04> 응응<emoji=heart04> 후후후<emoji=heart04> 안 된다고 했는데 점점 격해져서……<emoji=heart04> 앗<emoji=heart04> 회장님…… 그거, 그거어<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁ……んふぅぅ<emoji=heart04>\u3000また激しくなって<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おま○こどんどん、ダメになっちゃってます……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 하아…… 응후으으<emoji=heart04> 또 격해져서<emoji=heart04> 앙<emoji=heart04> 보지 점점 망가져 가고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000チ○ポすっごく激しいっ<emoji=heart04>\u3000パンパンってっ<emoji=heart04>\u3000音響いてますっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 응<emoji=heart04> 아아앗<emoji=heart04> 자지 엄청 격해<emoji=heart04> 팡팡 하고<emoji=heart04> 소리 울리고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あれ……？\u3000んんっ<emoji=heart04>\u3000会長……ふぁぁぁん<emoji=heart04>\u3000なんだか、動きが変わって……ふぅ<emoji=heart04>\u3000チ○ポの当たる場所が……んんんっ<emoji=heart04>！？」"
translation = "「어라……? 응응<emoji=heart04> 회장님…… 화아아앙<emoji=heart04> 왠지 움직임이 바뀌어서…… 후으<emoji=heart04> 자지가 닿는 곳이…… 응응응<emoji=heart04>!?」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おかしいっ<emoji=heart04>\u3000なんで……っ<emoji=heart04>\u3000急に敏感に……っ<emoji=heart04>\u3000なったみたいにっ<emoji=heart04>\u3000んふぅぅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 이상해<emoji=heart04> 왜……<emoji=heart04> 갑자기 민감하게……<emoji=heart04> 된 것처럼<emoji=heart04> 응후으으으<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「会長、さっきまで私を、抱えるようにしてたけど……力抜けて、チ○ポ、違う場所にあたったみたい……っ<emoji=heart04>\u3000はぁぁぁんっ<emoji=heart04>」"
translation = "「회장님, 아까까지 저를 안듯이 하고 계셨는데…… 힘이 빠져서 자지가 다른 곳에 닿은 것 같아……<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「なに、これ……っ<emoji=heart04>\u3000知らないっ<emoji=heart04>\u3000こんな気持ちいい場所、知らないですっ<emoji=heart04>」"
translation = "「뭐야 이거……<emoji=heart04> 몰라요<emoji=heart04> 이런 기분 좋은 곳 모른단 말이에요<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「いつも奥までチ○ポ、突っ込んでもらってたからぁっ<emoji=heart04>\u3000知らなかったっ<emoji=heart04>\u3000私の……私の弱いところ、そこだった、なんてぇっ<emoji=heart04>」"
translation = "「항상 안쪽까지 자지 찔러 넣어주셨으니까아<emoji=heart04> 몰랐어요<emoji=heart04> 제…… 제 약한 곳 거기였다니이<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「あっ<emoji=heart04>\u3000ダメ、待って……っ<emoji=heart04>\u3000会長っ<emoji=heart04>\u3000待ってください……っ<emoji=heart04>\u3000浅いところ<emoji=heart04>\u3000おま○この弱点<emoji=heart04>\u3000チ○ポ擦られたら私……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 안 돼 기다려요……<emoji=heart04> 회장님<emoji=heart04> 기다려주세요……<emoji=heart04> 얕은 곳<emoji=heart04> 보지의 약점<emoji=heart04> 자지로 문질러지면 저……<emoji=heart04> 앙<emoji=heart04> 앗<emoji=heart04> 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「はぁっ、ふぅ……んっ<emoji=heart04>\u3000ダメだから、あっ<emoji=heart04>\u3000今度のは本当です……<emoji=heart04>\u3000おま○こ熱すぎて、ダメなの……っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
