speaker = "クロト"
original = "「……まぁそうだけど。でも、無理しなくてもいいからな。素直におねだりしてくるアナも可愛いし」"
translation = "「……뭐 그렇긴 하지만. 그래도 무리하지 않아도 돼. 솔직하게 조르는 아나도 귀여우니까」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。どっちも捨てがたいと……。それなら、これからは時々小悪魔して、時々素直になります」"
translation = "「과연. 둘 다 놓치기 아깝다는 거군요……. 그렇다면 앞으로는 가끔 소악마가 되고 가끔은 솔직해지겠습니다」"

[[dialogue]]
speaker = "アナ"
original = "「それではさっそく……なんですが<emoji=heart04>」"
translation = "「그럼 당장……입니다만<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「会長……<emoji=heart04>\u3000お尻の穴もうずいてきちゃったんですが……こっちの方も可愛がってもらえませんか？<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 똥구멍도 근질거리기 시작했는데…… 이쪽도 귀여워해 주시지 않겠나요?<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「はい<emoji=heart04>\u3000素直におねだりして、２回戦もしてもらおうという、私の小悪魔的な作戦です<emoji=heart04>」"
translation = "「네<emoji=heart04> 솔직하게 졸라서 2회전도 하게 만들려는 저의 소악마적인 작전입니다<emoji=heart04>」"

