[[dialogue]]
speaker = "unk"
original = "第７話,リ・クリエ,B"
translation = "제7화, 리 크리에, B"

[[dialogue]]
speaker = "クロト"
original = "「おおおおおおお────っ！！」"
translation = "「오오오오오오오────옷!!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「ムゥゥゥゥゥゥゥゥン──────！！！」"
translation = "「무우우우우우우우웅──────!!!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ぐ──っ────！！」"
translation = "「크──읏────!!」"

[[dialogue]]
speaker = "アポロ"
original = "「まだだ──あの玉を砕くまで油断するな！」"
translation = "「아직이야── 저 구슬을 부술 때까지 방심하지 마!」"

[[dialogue]]
speaker = "unk"
original = "互いのとどめの一撃は、最後まで拮抗する──！"
translation = "서로의 결정타는, 마지막까지 팽팽하게 맞선다──!"

[[dialogue]]
speaker = "魔神ギエル"
original = "「よく粘ル──ダガ──『リクリエ』が宿ッテイル限り、私ハ不滅ダ──！」"
translation = "「잘 버티는군── 하지만── 『리크리에』가 깃들어 있는 한, 나는 불멸이다──!」"

[[dialogue]]
speaker = "アナ"
original = "「ッ、修復しました──！」"
translation = "「읏, 수복했습니다──!」"

[[dialogue]]
speaker = "クロト"
original = "「問題ない──波状攻撃を仕掛けるぞ！」"
translation = "「문제없어── 파상 공격을 퍼붓는다!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ああ──『使徒』相手のやり方は、もう十分学んだってんだ！」"
translation = "「아아── 『사도』 상대하는 방식은, 이미 충분히 배웠다고!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの『影』が俺たち全員を呑み込まんと迫る。"
translation = "기엘의 『그림자』가 우리들 전원을 집어삼키려 다가온다."

[[dialogue]]
speaker = "unk"
original = "確かに絶望的な強さだ。"
translation = "확실히 절망적인 강함이다."

[[dialogue]]
speaker = "unk"
original = "だけど、俺たちはそんな絶望的な敵を何度だって乗り越えてきた。"
translation = "하지만, 우리들은 그런 절망적인 적을 몇 번이고 극복해 왔다."

[[dialogue]]
speaker = "unk"
original = "魔王の三重奏を主軸に──ギエルの再生を上回る速度で攻撃を叩き込んでいく。"
translation = "마왕의 삼중주를 주축으로── 기엘의 재생을 능가하는 속도로 공격을 퍼붓는다."

[[dialogue]]
speaker = "リノ"
original = "「いいわよみんな、このままいけばこっちが優勢──」"
translation = "「좋아 다들, 이대로 가면 우리가 우세야──」"

[[dialogue]]
speaker = "unk"
original = "──かと思われた、が。"
translation = "──라고 생각되었지만."

[[dialogue]]
speaker = "魔神ギエル"
original = "「……フゥ」"
translation = "「……후우」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「イイダロウ……もはや、遊ンデヤルのも飽きたトコロダ」"
translation = "「좋다…… 더 이상, 놀아주는 것도 지겨워질 참이었다」"

[[dialogue]]
speaker = "unk"
original = "──ふっ、と。"
translation = "──훅, 하고."

[[dialogue]]
speaker = "unk"
original = "マグマのように噴き上げていたギエルの瘴気が……途端に勢いを失った。"
translation = "마그마처럼 분출하던 기엘의 장기가…… 갑자기 기세를 잃었다."

[[dialogue]]
speaker = "ルリエル"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "マトイ"
original = "「や、やったの──？」"
translation = "「해, 해낸 거야──?」"

[[dialogue]]
speaker = "unk"
original = "闇の領域も──『影』による侵蝕も何もかも静まった。"
translation = "어둠의 영역도── 『그림자』에 의한 침식도 모든 것이 잠잠해졌다."

[[dialogue]]
speaker = "unk"
original = "辺りはただ、不気味な静寂に支配される。"
translation = "주변은 그저, 불길한 정적에 지배된다."

[[dialogue]]
speaker = "クロト"
original = "（力尽きた──いや、違う。なんだ……この、おぞましい気配は）"
translation = "（힘이 다했나── 아니, 달라. 뭐지…… 이, 끔찍한 기척은）"

[[dialogue]]
speaker = "魔神ギエル"
original = "「喜べ。人間界へ広ゲテイタあらゆるリクリエ現象ヲ、鎮メテやったぞ」"
translation = "「기뻐해라. 인간계로 퍼져 있던 모든 리크리에 현상을, 잠재워 주었다」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "遠くを眺める。まだ彼方に浮かんでいたアステラの影が、ことごとく消えていた。"
translation = "멀리 바라본다. 아직 저편에 떠 있던 아스테라의 그림자가, 모조리 사라져 있었다."

[[dialogue]]
speaker = "ルリエル"
original = "「う、嘘ですよね？\u3000え……なんで……？」"
translation = "「거, 거짓말이죠? 에…… 왜……?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ほ……本当みたいニャン。地上はなんだか落ち着いてるニャンよ……？」"
translation = "「호…… 정말인 것 같냥. 지상은 왠지 모르게 잠잠해진 것 같냥요……?」"

[[dialogue]]
speaker = "アポロ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "総てのアステライトが消滅した。"
translation = "모든 아스테라이트가 소멸했다."

[[dialogue]]
speaker = "unk"
original = "総てのモンスターが去っていった。"
translation = "모든 몬스터가 사라져 갔다."

[[dialogue]]
speaker = "unk"
original = "だが──喜べる気配は微塵もなかった。その<b>代わり</b>とでも言うべきかのように、ギエルに集う再創生の瘴気が格段に高まっていく！"
translation = "하지만── 기뻐할 기색은 조금도 없었다. 그 <b>대신</b>이라고 해야 할 것처럼, 기엘에게 모이는 재창생의 장기가 현격히 높아져 간다!"

[[dialogue]]
speaker = "魔神ギエル"
original = "「クフフ……サア──森羅万象を司リシ崇高なるリクリエノ覇気ヨ、我ガ心臓ニ集ウがイイ──！」"
translation = "「크흐흐…… 자아── 삼라만상을 관장하는 숭고한 리크리에의 패기여, 나의 심장에 모일지어다──!」"

[[dialogue]]
speaker = "ソフィア"
original = "「なっ──！」"
translation = "「뭣──!」"

[[dialogue]]
speaker = "セーラ"
original = "「気ぃつけて──まだ終わってないよ！」"
translation = "「조심해── 아직 안 끝났어!」"

[[dialogue]]
speaker = "unk"
original = "全世界規模で消滅した何千、何万というアステラ・モンスターの芯すべてが──ギエルの覇霊玉へ集約されていく──！"
translation = "전 세계 규모로 소멸한 수천, 수만이라는 아스테라・몬스터의 핵 전부가── 기엘의 패령옥으로 집약되어 간다──!"

[[dialogue]]
speaker = "魔神ギエル"
original = "「コレガ……絶望ノ、真ナル姿ダ────！！」"
translation = "「이것이…… 절망의, 진정한 모습이다────!!」"

[[dialogue]]
speaker = "クロト"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "マトイ"
original = "「そんな……」"
translation = "「설마……」"

[[dialogue]]
speaker = "ソフィア"
original = "「まだ、力を残して……」"
translation = "「아직, 힘을 남기고……」"

[[dialogue]]
speaker = "unk"
original = "邪悪なる異形の化身が──天高くに君臨していた。"
translation = "사악한 이형의 화신이── 하늘 높이 군림하고 있었다."

[[dialogue]]
speaker = "unk"
original = "それは、アポロでさえも到達しえなかった、<ruby>終焉<rt>リクリエ</rt></ruby>との完全なる融合体。"
translation = "그것은, 아폴로조차 도달하지 못했던, 종언과의 완전한 융합체."

[[dialogue]]
speaker = "unk"
original = "希崎レイトの──ギエルが人間であった頃の面影はもはや、ない。"
translation = "키자키 레이토의── 기엘이 인간이었을 적의 모습은 이제, 없다."

[[dialogue]]
speaker = "魔神ギエル"
original = "「リクリエハ、止メラレナイモノダ」"
translation = "「리크리에는, 멈출 수 없는 것이다」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「星ノ運行ガ揺ルギナイヨウニ。総テハ、宇宙ノ摂理ダカラダ」"
translation = "「별의 운행이 흔들리지 않는 것처럼. 모든 것은, 우주의 섭리이기 때문이다」"

[[dialogue]]
speaker = "unk"
original = "そんな変わり果てた姿のギエルが、告げる。"
translation = "그렇게 완전히 변해버린 모습의 기엘이, 고한다."

[[dialogue]]
speaker = "魔神ギエル"
original = "「──マクロ・ノヴァ・ブラスト──」"
translation = "「──매크로 노바 블래스트──」"

[[dialogue]]
speaker = "クロト"
original = "「ぐ──おおおおおおおおッッッ！！」"
translation = "「크── 오오오오오오오옷!!」"

[[dialogue]]
speaker = "アポロ"
original = "「下がれ魔王──ここはあたしが──っ！」"
translation = "「물러서라 마왕── 여기는 내가──읏!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「いいえ、私も──く────ッッ──────！！！」"
translation = "「아닙니다, 저도── 크────읏──────!!!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの手元に生成された闇の球体──"
translation = "기엘의 손에 생성된 어둠의 구체──"

[[dialogue]]
speaker = "unk"
original = "超質量を誇るその天体は、目のくらむ輝きを放って大爆発を引き起こした。"
translation = "초질량을 자랑하는 그 천체는, 눈이 멀 듯한 빛을 내뿜으며 대폭발을 일으켰다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト──ッ！」"
translation = "「쿠로토──읏!」"

[[dialogue]]
speaker = "ソフィア"
original = "「フィオナ会長──！」"
translation = "「피오나 회장──!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「ククク……ハハハハ！\u3000<ruby>終<rt>ツイ</rt></ruby>ニ！\u3000終ニ魔王ヲ<ruby>斃<rt>タオ</rt></ruby>シタゾ！\u3000復讐ハ為ッタ！\u3000崇高ナルチャカパラ神ニ大イナル祝福ヲ！！」"
translation = "「크크크…… 하하하하! 마침내! 마침내 마왕을 쓰러뜨렸다! 복수는 이루어졌다! 숭고한 차카파라 신에게 위대한 축복을!!」"

[[dialogue]]
speaker = "クロト"
original = "「ぐ──づっ、うっ……ッ……！」"
translation = "「크──윽, 웁……읏……!」"

[[dialogue]]
speaker = "unk"
original = "倒れ伏した俺たちの頭上から、高らかな笑い声が聞こえる。"
translation = "쓰러져 엎드린 우리들의 머리 위에서, 드높은 웃음소리가 들린다."

[[dialogue]]
speaker = "unk"
original = "全員が、未経験の衝撃に打ちのめされていた。"
translation = "전원이, 미경험의 충격에 얻어맞고 있었다."

[[dialogue]]
speaker = "アナ"
original = "「マクロ・ノヴァ──別称キロノヴァ……新星爆発の１０００倍近い輝度を放つ、天体爆発現象……」"
translation = "「매크로 노바── 별칭 킬로노바…… 신성 폭발의 1000배 가까운 휘도를 내뿜는, 천체 폭발 현상……」"

[[dialogue]]
speaker = "セーラ"
original = "「──なんでもあり、すぎるっしょ……！\u3000今のって、グレートウォールがなかったら……」"
translation = "「──뭐든지 다, 되는 거잖아……! 방금 건, 그레이트 월이 없었으면……」"

[[dialogue]]
speaker = "リノ"
original = "「人間界どころか──月まで消し飛んでいたでしょうね……！」"
translation = "「인간계는 물론── 달까지 날아가 버렸을 겁니다……!」"

[[dialogue]]
speaker = "アナ"
original = "「ありえません──こんなの……！\u3000従者どころか──彼が、リクリエを従えてる……！？」"
translation = "「말도 안 돼요── 이런 건……! 종자는커녕── 그가, 리크리에를 복종시키고 있어……!?」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「リクリエノ使徒──今ノ私コソガ、ソノ完全ナル姿ダ」"
translation = "「리크리에의 사도── 지금의 나야말로, 그 완전한 모습이다」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「使徒、トイウ呼称サエ、モハヤ適切デハナイ。今ノ私ハ──スデニ『リクリエ』ソノモノデアル」"
translation = "「사도, 라는 호칭조차, 이제는 적절하지 않다. 지금의 나는── 이미 『리크리에』 그 자체이다」"

[[dialogue]]
speaker = "クロト"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "その言葉は……俺たちの心を折るのに十分だった。"
translation = "그 말은…… 우리들의 마음을 꺾기에 충분했다."

[[dialogue]]
speaker = "unk"
original = "仮面の瘴気──敗残者の血筋──覇霊玉──その総てと結合した今のギエルは、リクリエの本波と完全な一体化を果たした。"
translation = "가면의 장기── 패잔자의 혈통── 패령옥── 그 모든 것과 결합한 지금의 기엘은, 리크리에의 본파와 완전한 일체화를 이루었다."

[[dialogue]]
speaker = "unk"
original = "文字通り、人の型に押し留めた、宇宙災厄。"
translation = "말 그대로, 사람의 형상에 가두어 둔, 우주 재앙."

[[dialogue]]
speaker = "マトイ"
original = "（私たち星騎士は──リクリエに対抗するもの──だけど──）"
translation = "（우리들 성기사는── 리크리에에 대항하는 존재── 하지만──）"

[[dialogue]]
speaker = "ソフィア"
original = "（こんなの……勝てるはず……ありません……）"
translation = "（이런 건…… 이길 수 있을 리…… 없습니다……）"

[[dialogue]]
speaker = "unk"
original = "マトイやソフィアを責めることはできない。"
translation = "마토이나 소피아를 탓할 수는 없다."

[[dialogue]]
speaker = "unk"
original = "なぜなら俺も、怯えていた。"
translation = "왜냐하면 나도, 겁먹고 있었으니까."

[[dialogue]]
speaker = "unk"
original = "目の前の魔神に。リクリエに。自分たちが相対しているものの強大さに。"
translation = "눈앞의 마신에게. 리크리에에게. 우리들이 맞서고 있는 것의 강대함에."

[[dialogue]]
speaker = "unk"
original = "心の底から──生命体としての本能が屈服してしまうほどの、純然たる恐怖。"
translation = "마음속 깊은 곳에서── 생명체로서의 본능이 굴복해 버릴 정도의, 순전한 공포."

[[dialogue]]
speaker = "魔神ギエル"
original = "「コノ体ハ力ヲ留メテオクノガ難シイナ。ツイ足踏ミヲシタダケデ、ブラックホールガ生マレテシマウ」"
translation = "「이 몸은 힘을 붙잡아 두기가 어렵군. 그저 발을 밟았을 뿐인데, 블랙홀이 생겨 버린다」"

[[dialogue]]
speaker = "クロト"
original = "（なんだ……なんなんだ……この化け物は……！）"
translation = "（뭐지…… 뭐야…… 이 괴물은……!）"

[[dialogue]]
speaker = "unk"
original = "アステラやモンスターと戦って、俺たちはリクリエの脅威を正しく理解しているつもりでいた。"
translation = "아스테라나 몬스터와 싸우면서, 우리들은 리크리에의 위협을 올바르게 이해하고 있다고 생각하고 있었다."

[[dialogue]]
speaker = "unk"
original = "でも、甘かった。俺たちは所詮、爪先ほどしか認識できていなかった。"
translation = "하지만, 안일했다. 우리들은 결국, 발톱만큼밖에 인식하지 못하고 있었다."

[[dialogue]]
speaker = "unk"
original = "宇宙そのものを創り変えるほどの理を前に──人類の力なんて、どれほどちっぽけなことか。"
translation = "우주 그 자체를 새로 만들어낼 정도의 이치 앞에서── 인류의 힘 따위, 얼마나 보잘것없는 것인가."

