[[dialogue]]
speaker = "unk"
original = "第４話,サーシャと遊園地デート,P"
translation = "제4화, 사샤와 유원지 데이트"

[[dialogue]]
speaker = "unk"
original = "サーシャさんと恋人になってからというもの、俺たちは色々なところを訪れてきた。"
translation = "사샤 씨와 연인이 되고 나서부터, 우리들은 여러 장소를 방문해 왔다."

[[dialogue]]
speaker = "unk"
original = "好奇心旺盛で、まだ見ぬ景色に触れることを何よりの喜びとするサーシャさん。そんな彼女の今日のリクエストは遊園地だった。"
translation = "호기심이 왕성해서, 아직 보지 못한 풍경을 접하는 것을 무엇보다 기쁨으로 여기는 사샤 씨. 그런 그녀의 오늘 리퀘스트는 유원지였다."

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あ～ん♪\u3000ジェットコースター、すごい迫力だったわね～」"
translation = "「아~앙♪ 롤러코스터, 정말 박력 넘쳤네~」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「──ぁ、ＤＩＳＣのアプリに写真が届いたみたい。ふぅん、一番長い坂を走ってた時の写真を撮ってもらえるのね～」"
translation = "「──아, DISC 앱에 사진이 도착한 모양이야. 후웅, 가장 긴 경사로를 달리고 있을 때의 사진을 찍어주는구나~」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「うふふ、会長くんのはしゃいでいるお顔、よく写ってるわ～<emoji=heart04>」"
translation = "「우후후, 회장 군의 신나 하는 얼굴, 잘 찍혔네~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ニコニコしながら俺を見てる！？"
translation = "싱글벙글 웃으며 나를 보고 있어!?"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは──"
translation = "사샤 씨는──"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「会長くんがどんなお顔してるのか興味があって～。うふふ♪\u3000わ～、って叫んでるお顔も可愛かったわ～♪」"
translation = "「회장 군이 어떤 얼굴을 하고 있는지 흥미가 있어서~. 우후후♪ 와~, 하고 소리 지르는 얼굴도 귀여웠어~♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ねぇ会長くん。次はどのアトラクションに行きましょうか？」"
translation = "「있지 회장 군. 다음은 어느 어트랙션에 갈까?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「……お化け屋敷？\u3000いいわね、怖いのもびっくりするのも大好きよ～、私」"
translation = "「……귀신의 집? 좋네, 무서운 것도 깜짝 놀라는 것도 정말 좋아해, 나」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「すごいわね～、本物の廃病院を改造して作った、この国で最長の長さのホラーアトラクションですって～♪」"
translation = "「대단하네~, 진짜 폐병원을 개조해서 만든, 이 나라에서 가장 긴 호러 어트랙션이래~♪」"

[[dialogue]]
speaker = "unk"
original = "途中で脱落もＯＫみたいです"
translation = "도중에 포기하는 것도 가능한 모양이다"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「本当ね。ギブアップできる非常口がいくつも……これは何としてもゴールまで行きたいわね♪」"
translation = "「정말이네. 기브업할 수 있는 비상구가 여러 개…… 이건 어떻게 해서든 골인 지점까지 가고 싶네♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「中は暗いでしょうし、はぐれないように手を繋いでいきましょうか♪」"
translation = "「안은 어두울 테고, 길을 잃지 않게 손을 잡고 가자♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ひんやり寒くて、すごく雰囲気が出てるわね～♪」"
translation = "「으스스하게 추워서, 분위기가 정말 잘 사네~♪」"

[[dialogue]]
speaker = "unk"
original = "けっこう平気そうですね！？"
translation = "꽤 태연해 보이는데요!?"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「まあ、本物の魔界に比べたら、魔獣もいないし～」"
translation = "「뭐, 진짜 마계에 비하면 마수도 없고~」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「……あれ。今あそこで何か動いたような？」"
translation = "「……어라. 방금 저기서 뭔가 움직인 것 같은데?」"

[[dialogue]]
speaker_original = "幽霊"
speaker_translation = "유령"
original = "「ァァァァァアアア────！！」"
translation = "「아아아아아아아아────!!」"

[[dialogue]]
speaker = "unk"
original = "──うわあああああ！？"
translation = "──으와아아아아!? "

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あ～ん、こわ～い♪」"
translation = "「아~앙, 무서워~♪」"

[[dialogue]]
speaker = "unk"
original = "やっぱり平気そうですね！？"
translation = "역시 태연해 보이는데요!?"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「だって、気配が丸わかりだから～……うふふ。会長くん、急に驚かされるのは苦手な感じかしら～？」"
translation = "「그치만, 기척이 훤히 다 느껴지는걸~…… 우후후. 회장 군, 갑자기 놀라게 하는 건 서툰 느낌일까~?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「大丈夫よ～、お姉ちゃんが傍についてるからね～<emoji=heart04>」"
translation = "「괜찮아~, 누나가 곁에 붙어 있을 테니까 말이야~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "想像以上に恐ろしいお化け屋敷だったのだが、サーシャさんは相変わらずニコニコペースを崩さないのだった──"
translation = "상상 이상으로 무시무시한 귀신의 집이었지만, 사샤 씨는 여전히 싱글벙글한 페이스를 무너뜨리지 않았다──"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「とっても楽しかったわね～、遊園地♪\u3000魔界にはこういうアトラクションがないから新鮮だったわ～」"
translation = "「정말 즐거웠어~, 유원지♪ 마계에는 이런 어트랙션이 없으니까 신선했어~」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「もうすぐ陽も落ちちゃうけれど……最後に観覧車に乗っていきましょうか？」"
translation = "「이제 곧 해도 저물겠지만…… 마지막으로 관람차를 타고 갈까?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ええ。行きましょう～♪」"
translation = "「응. 가자~♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ずいぶん高いところまで上がるのね～。見て見て、あそこ。私たちがやって来た駅が見えるわ～♪」"
translation = "「꽤 높은 곳까지 올라가는구나~. 봐봐, 저기. 우리가 왔던 역이 보여~♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「会長くん、今日はお姉ちゃんのリクエスト……遊園地デートに付き合ってくれて、ありがとうね♪」"
translation = "「회장 군, 오늘은 누나의 리퀘스트…… 유원지 데이트에 어울려 줘서 고마워♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「人間界に留学してきた時から、行きたい場所ややりたいことはたくさんしてきた私だけど～……」"
translation = "「인간계로 유학 왔을 때부터, 가고 싶은 곳이나 하고 싶은 일은 잔뜩 해온 나지만~……」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「遊園地って実は来たことが無かったの。１人で来ても楽しい場所じゃないものね、こういうところ」"
translation = "「유원지는 사실 와본 적이 없었어. 혼자 와도 즐거운 장소는 아니니까, 이런 곳은」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ふふ♪\u3000会長くんとお付き合いを始める前だったら、絶対に経験できなかった１日だったわ～♪」"
translation = "「후후♪ 회장 군과 사귀기 전이었다면, 절대 경험할 수 없었을 하루였어~♪」"

[[dialogue]]
speaker = "unk"
original = "俺も楽しかったです"
translation = "저도 즐거웠어요"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「うん、そう言ってもらえると、お姉ちゃんも嬉しい<emoji=heart04>」"
translation = "「응, 그렇게 말해주니 누나도 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「……ねえ、会長くん。ちょっと前に私が言ったこと、覚えてるかしら？」"
translation = "「……있지, 회장 군. 조금 전에 내가 했던 말, 기억하고 있을까?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「私が新星学園を卒業したら、今度は天界を冒険してみたい、ってやつ」"
translation = "「내가 신성학원을 졸업하면, 이번에는 천계를 모험해 보고 싶다던 그거」"

[[dialogue]]
speaker = "unk"
original = "ついて行きたい、とも言いました"
translation = "따라가고 싶다고도 말했어요"

[[dialogue]]
speaker = "unk"
original = "もちろん覚えてますよ"
translation = "물론 기억하고 있죠"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「うん♪\u3000それなんだけど……ちょっとだけ心境の変化があったから、報告させて？」"
translation = "「응♪ 그거 말인데…… 아주 조금 심경의 변화가 생겨서, 보고해도 될까?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「天界にお出かけするのは、私が卒業して、すぐでなくてもいいかもって思うようになったの」"
translation = "「천계로 나들이 가는 건, 내가 졸업하고 바로가 아니어도 괜찮을 것 같다는 생각이 들었어」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「だって会長くんは、星徒会長で、魔王だから。まだまだやらなくちゃいけないことが、たくさんあるでしょう？」"
translation = "「그치만 회장 군은 성도회장이고, 마왕이니까. 아직 해야 할 일이 잔뜩 있잖아?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「世界が平和になって、会長くんが魔王としての責務から解放されたその時に、一緒にお出かけすればいいじゃないってね♪」"
translation = "「세계가 평화로워지고, 회장 군이 마왕으로서의 책무에서 해방된 그때, 같이 나들이 가면 되지 않을까 해서♪」"

[[dialogue]]
speaker = "unk"
original = "いいんですか？"
translation = "괜찮은 건가요?"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ええ。別に何十年も先になることでもないと思うし……それにね？」"
translation = "「응. 딱히 몇십 년 뒤의 일이 될 것도 아니라고 생각하고…… 그리고 말이야?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「きっと今日の遊園地みたいに、１人よりも、２人で一緒に触れた方が楽しめるものって、いっぱいあると思うのよ」"
translation = "「분명 오늘의 유원지처럼, 혼자보다는 둘이서 함께 접하는 편이 더 즐거운 것들이 잔뜩 있을 거라고 생각해」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「だから……あなたが魔王としてのお役目を終えるまでは、傍で支えてあげたいなって」"
translation = "「그러니까…… 당신이 마왕으로서의 소임을 다 마칠 때까지는, 곁에서 지탱해 주고 싶어」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ふふ♪\u3000人間界に留学を決めた時……ソフィに相談もしなかった頃の私と比べたら、随分な変わりようよね？」"
translation = "「후후♪ 인간계로 유학을 결정했을 때…… 소피에게 상담도 하지 않았던 시절의 나와 비교하면, 꽤 많이 변했지?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「でも、これが今の私の正直な気持ちなの。会長くんと出会って、仲良くなって……誰かと一緒にいる幸せを教えてもらったから」"
translation = "「하지만 이게 지금 내 솔직한 기분이야. 회장 군과 만나고, 사이가 좋아지고…… 누군가와 함께 있는 행복을 배웠으니까」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんにずっとそばにいて欲しい"
translation = "사샤 씨가 계속 곁에 있어 줬으면 좋겠어요"

[[dialogue]]
speaker = "unk"
original = "俺も同じ気持ちです"
translation = "저도 같은 마음입니다"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ええ──ありがとう<emoji=heart04>\u3000あなたにそう言ってもらえて、とっても嬉しいわ♪」"
translation = "「응── 고마워<emoji=heart04> 당신이 그렇게 말해주니 정말 기뻐♪」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ぁ──もうすぐ観覧車、下に着いちゃうわね。今のうちに……<emoji=heart04>」"
translation = "「아── 이제 곧 관람차, 아래에 도착하겠네. 지금 이 사이에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「음…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ずっと、ず～っと、一緒にいましょうね？\u3000大好きよ、会長くん<emoji=heart04>」"
translation = "「계속, 계~속, 함께 있자? 사랑해, 회장 군<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "幸せそうに微笑むサーシャさんに、俺も同じ気持ちであることを伝えるため、お返しのキスをするのだった──"
translation = "행복하게 미소 짓는 사샤 씨에게, 나도 같은 마음임을 전하기 위해 답례의 키스를 하는 것이었다──"

