[[dialogue]]
speaker = "unk"
original = "バトルフェスタが開幕し、生徒たちが各々挑みたいボスを頭の中にイメージし、セレスティアに触れる。"
translation = "배틀 페스타가 개막하고 학생들은 각자 도전하고 싶은 보스를 머릿속에 그리며 셀레스티아에 접촉한다."

[[dialogue]]
speaker = "unk"
original = "すると、視界が白い光に包まれ――"
translation = "그러자 시야가 하얀 빛에 휩싸이고──"

[[dialogue]]
speaker = "unk"
original = "ボスの１体、サチの<ruby>仮想体<rt>シャドウ</rt></ruby>と戦う舞台となるのは、仮想空間の遊園地であった。"
translation = "보스 중 하나인 사치의 가상체와 싸우는 무대가 된 곳은 가상 공간의 유원지였다."

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ほう、この仮想結界システムとやら、なかなか大したものじゃな」"
translation = "「호오, 이 가상 결계 시스템이라는 것, 제법 훌륭하구나」"

[[dialogue]]
speaker = "シズハ"
original = "「わ～、すごい！\u3000遊園地だ～♪\u3000私、実は来るの初めてなんだよね～」"
translation = "「와~ 대단해! 유원지다~♪ 나 실은 오는 거 처음이거든~」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ジェットコースターとか、乗ろうと思えば乗れるんですかね～？\u3000みなさんでちょっと試してみちゃいます？」"
translation = "「롤러코스터 같은 것도 타려고 마음먹으면 탈 수 있을까요~? 여러분도 한 번 시험해 보실래요?」"

[[dialogue]]
speaker = "サチ"
original = "「いや、私のシャドウに挑戦しに来たんですよね！？\u3000というかプリムラ、なんで私までここに……」"
translation = "「아니, 저의 섀도우에 도전하러 오신 거죠!? 그보다 프리뮬라, 왜 나까지 여기에……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「別にボス役本人が、自分のシャドウのところに来ちゃいけないなんてルールはないんじゃろ？」"
translation = "「딱히 보스 본인이 자기 섀도우가 있는 곳에 오면 안 된다는 규칙은 없지 않느냐?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ならば、我がサチのシャドウを倒すところを見せつけてやろうと思ってな。貴様はそこで手を出さずに、見学しとるがいいのじゃ！」"
translation = "「그렇다면 내가 사치의 섀도우를 쓰러뜨리는 모습을 보여주마. 네놈은 거기서 참견하지 말고 견학이나 하거라!」"

[[dialogue]]
speaker = "アム"
original = "「おっ、附属生仲間発見～！\u3000って、あれ？\u3000サチ会長、本物！？」"
translation = "「오, 부속생 동료 발견~! 어라? 사치 회장님, 진짜!?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「皆様、ごきげんようですわ♪」"
translation = "「여러분, 평안하신가요♪」"

[[dialogue]]
speaker = "サチ"
original = "「アムちゃん、エルゼちゃん！\u3000２人も挑戦しに来てくれたの？」"
translation = "「아무 짱, 엘제 짱! 둘도 도전하러 와준 거야?」"

[[dialogue]]
speaker = "アム"
original = "「うん！\u3000最強の星騎士を目指すライバルとして、附属校最強のサチ会長には挑戦しておかないとね♪」"
translation = "「응! 최강의 성기사를 목표로 하는 라이벌로서 부속교 최강인 사치 회장님에게는 도전해둬야지♪」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ええ。アムよりも先にサチ様のシャドウに勝って、私ももっと強くなってみせますわ♪」"
translation = "「네. 아무보다 먼저 사치 님의 섀도우를 이기고 저도 더 강해져 보이겠어요♪」"

[[dialogue]]
speaker = "シズハ"
original = "「そ～っと――えいっ♪」"
translation = "「살며시── 에잇♪」"

[[dialogue]]
speaker = "アム"
original = "「ひゃあっ！？\u3000いきなり何してんのさ、シズハ！」"
translation = "「히약!? 갑자기 뭐 하는 거야, 시즈하!」"

[[dialogue]]
speaker = "シズハ"
original = "「ふふふ♪\u3000それはもちろん、友達同士のコミュニケーションよ♪\u3000アムちゃん、今日も相変わらず張りがあって、いいお尻だこと～<emoji=heart04>」"
translation = "「후후후♪ 그건 당연히 친구끼리의 커뮤니케이션이지♪ 아무 짱, 오늘도 변함없이 탱글탱글하니 좋은 엉덩이네~<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「アムったら、盾使いなのにお尻は隙だらけですわね♪\u3000その点、私はシズハ様のパターンを読んで、ちゃんと防御態勢を取っておりましたわ！」"
translation = "「아무도 참, 방패술사면서 엉덩이는 빈틈투성이네요♪ 그 점에 있어 저는 시즈하 님의 패턴을 읽고 제대로 방어 태세를 취하고 있었답니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……って、あら！？\u3000シズハ様、いなくなってますわ！？」"
translation = "「……어라!? 시즈하 님, 사라지셨어요!?」"

[[dialogue]]
speaker = "シズハ"
original = "「――エルゼちゃん、隙アリ～♪」"
translation = "「──엘제 짱, 빈틈 발견~♪」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ひゃんっ<emoji=heart04>\u3000そ、そんな、いつの間にか背後に！？\u3000気を付けておりましたのに、見逃すだなんて！？」"
translation = "「히양<emoji=heart04> 그, 그럴 수가, 어느 틈에 등 뒤에!? 주의하고 있었는데 놓치다니!?」"

[[dialogue]]
speaker = "シズハ"
original = "「ふふふっ……これが、私がエルゼちゃんの固いガードをすり抜けてお尻を触る為に作り出した新魔法――」"
translation = "「후후후…… 이것이 내가 엘제 짱의 단단한 가드를 뚫고 엉덩이를 만지기 위해 만들어낸 신마법──」"

[[dialogue]]
speaker = "シズハ"
original = "「名づけて、『ヒップステップ』よ！」"
translation = "「이름하여 『힙 스텝』이야!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「新技を生み出す目的が不純ですわ！？」"
translation = "「신기술을 만들어낸 목적이 불순해요!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「欲望の為に新魔法を生み出してしまうとは、さすがシズハさんですね～☆」"
translation = "「욕망을 위해 신마법을 만들어내다니 역시 시즈하 씨네요~☆」"

[[dialogue]]
speaker = "サチ"
original = "「そういうエッチな技は禁止だよ、シズハちゃん！」"
translation = "「그런 야한 기술은 금지야, 시즈하 짱!」"

[[dialogue]]
speaker = "シズハ"
original = "「てへっ☆」"
translation = "「데헤☆」"

[[dialogue]]
speaker = "アム"
original = "「あっ、そうだ、プリムラ！\u3000せっかく居合わせたんだし、サチ会長のシャドウ、どっちが先に倒すことができるか勝負しようよ！」"
translation = "「앗, 맞다, 프리뮬라! 기왕 마주친 김에 사치 회장님의 섀도우, 누가 먼저 쓰러뜨릴 수 있는지 승부하자!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ふふん、いいじゃろう、アム。貴様にも以前より更に強力になった我の力を見せてやるのじゃ！\u3000この新たな第二形態、デストロイフォームでな！」"
translation = "「후훈, 좋느니라, 아무. 네놈에게도 이전보다 더욱 강력해진 나의 힘을 보여주마! 이 새로운 제2형태, 디스트로이 폼으로 말이다!」"

[[dialogue]]
speaker = "アム"
original = "「言っとくけど、あたしの水着フォームだって伊達じゃないんだからね～？\u3000マムに指導してもらって、重力操作もかなり上手くなったんだから！」"
translation = "「말해두겠는데 내 수영복 폼도 장난 아니니까 말이야? 마무에게 지도받아서 인력 조작도 꽤 능숙해졌거든!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「――なるほど。それは見せてもらうのが楽しみね」"
translation = "「──과연. 그것 참 기대되는걸」"

[[dialogue]]
speaker = "アム"
original = "「えっ！？\u3000マム！？」"
translation = "「엣!? 마무!?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「……！\u3000妃竜院マハムート！」"
translation = "「……! 키류인 마하무트!」"

[[dialogue]]
speaker = "サチ"
original = "「マム、その格好は……！？」"
translation = "「마무, 그 차림은……!?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ああ、これ？\u3000先日会長たちと訓練することがあったから、アルケインノヴァエクストリームを使ってもらったのよ」"
translation = "「아아, 이거? 요전에 회장들과 훈련할 일이 있어서 알케인 노바 익스트림을 써달라고 했거든」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「かけてもらう側の資質に左右されるらしいけれど、上手く行けばパッと成長できて便利よね、アレ」"
translation = "「받는 쪽의 자질에 좌우된다고 하지만, 잘만 되면 단번에 성장할 수 있어서 편리하더라, 그거」"

[[dialogue]]
speaker = "サチ"
original = "「そんな事もなげに成功するものでしたっけ！？」"
translation = "「그렇게 아무렇지 않게 성공하는 거였나요!?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「竜の私が『なる』と決めたんだもの。ノヴァフォームの方から頭を垂れるのは、当然のことよ」"
translation = "「용인 내가 『하겠다』고 정했는걸. 노바 폼 쪽에서 머리를 조아리는 건 당연한 일이지」"

[[dialogue]]
speaker = "サチ"
original = "（どうしよう、言ってることのレベルが高すぎて、よくわからないかも！？）"
translation = "(어쩌지, 말하는 수준이 너무 높아서 잘 모르겠어!?)"

[[dialogue]]
speaker = "サチ"
original = "「と、ところでマム……ここに来たということは、私のシャドウに挑みに？」"
translation = "「그, 그런데 마무…… 여기 왔다는 건 내 섀도우에게 도전하러?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ええ、サチ。あなたの『幸運』に、私の新しい力がどこまで通用するのか、興味があってね」"
translation = "「그래, 사치. 너의 『행운』에 나의 새로운 힘이 어디까지 통할지 흥미가 있어서 말이야」"

[[dialogue]]
speaker = "unk"
original = "と、そこへゆっくりと歩いて来る人影があった。"
translation = "그런데 그곳으로 천천히 걸어오는 인영이 있었다."

[[dialogue]]
speaker = "シャドウサチ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「現れおったか、サチのシャドウ」"
translation = "「나타났구나, 사치의 섀도우」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「なら早速、運試しと行きましょうか」"
translation = "「그럼 당장 운 시험을 시작해 볼까」"

[[dialogue]]
speaker = "unk"
original = "そうして、サチの仮想体であるシャドウサチとの戦闘が始まったのだが――"
translation = "그렇게 사치의 가상체인 섀도우 사치와의 전투가 시작되었으나──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「くっ……これがサチ様の覚醒した力……！\u3000攻撃がまるで命中しませんわ！」"
translation = "「큭…… 이것이 사치 님의 각성한 힘……! 공격이 전혀 명중하지 않아요!」"

[[dialogue]]
speaker = "アム"
original = "「防ぐ方もダメだ！\u3000攻撃が何故かバリアをすり抜けてくる！」"
translation = "「막는 쪽도 안 돼! 공격이 왜인지 배리어를 뚫고 들어와!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや～、さすがサチさんの能力を完コピしてるだけありますね～。ハンパない強運っぷりです～」"
translation = "「이야~ 역시 사치 씨의 능력을 완벽히 카피한 것답네요~. 장난 아닌 강운입니다~」"

[[dialogue]]
speaker = "サチ"
original = "「み、みんな頑張れー！\u3000ボス役だから、応援しかできないけど……」"
translation = "「모, 모두 힘내라! 보스 역이라서 응원밖에 할 수 없지만……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「なるほどね。本来あり得ない出来事が起こる確率を、幸運で限りなく引き上げる――実際に戦ってみると、とんでもない能力だわ」"
translation = "「과연 그렇군. 원래 일어날 리 없는 일이 일어날 확률을 행운으로 한없이 끌어올린다── 실제로 싸워보니 엄청난 능력이네」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「これは、私も本気を出さないと勝てないわね」"
translation = "「이건 나도 본실력을 내지 않으면 이길 수 없겠어」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、マムはシャドウに向かって、手の平をかざすように構える。そして――"
translation = "그렇게 말하며 마무는 섀도우를 향해 손바닥을 내밀듯 자세를 취한다. 그리고──"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「森羅万象、引力操作」"
translation = "「삼라만상, 인력 조작」"

[[dialogue]]
speaker = "シャドウサチ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間。シャドウの動きが鈍り、附属生たちの攻撃が直撃した。"
translation = "다음 순간, 섀도우의 움직임이 둔해지더니 부속생들의 공격이 직격했다."

[[dialogue]]
speaker = "シズハ"
original = "「私たちの攻撃が……当たった！」"
translation = "「우리 공격이…… 맞았어!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「我のキャノンも当たったのじゃ！\u3000妃竜院マハムート、一体何をしたのじゃ！？」"
translation = "「나의 캐논도 맞았느니라! 키류인 마하무트, 대체 무엇을 한 것이냐!?」"

[[dialogue]]
speaker = "サチ"
original = "「もしかしてマム……引力操作で、シャドウの<b>幸運を引き寄せた</b>んですか！？」"
translation = "「혹시 마무…… 인력 조작으로 섀도우의 <b>행운을</b> <b>끌어당긴</b> 건가요!?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「私もまだノヴァフォームに変身できるようになって間もないから、どこまで干渉できるか試したかったのよ」"
translation = "「나도 아직 노바 폼으로 변신할 수 있게 된 지 얼마 안 돼서 어디까지 간섭할 수 있는지 시험해보고 싶었어」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「だけど、大した幸運ね、サチ。この私が全力で引き寄せても、<b>半分</b>が限界だなんて」"
translation = "「하지만 대단한 행운이네, 사치. 이 내가 전력으로 끌어당겨도 <b>절반</b>이 한계라니」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「これが附属校最強の生徒会長の力……ふふっ、生意気だけど面白いわ」"
translation = "「이것이 부속교 최강 학생회장의 힘…… 후훗, 건방지지만 재미있어」"

[[dialogue]]
speaker = "サチ"
original = "「あ、ありがとうございます……」"
translation = "「고, 고맙습니다……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「プリムラ。それに他の附属生たちもよ。この私に畏怖して手を休めてないで、しっかり戦いなさい！」"
translation = "「프리뮬라, 그리고 다른 부속생들도 마찬가지다. 이 나에게 경외심을 품고 손을 놓고 있지 말고 제대로 싸우거라!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「竜の私が１人で勝ったって、当然でしかないでしょう？\u3000附属生のあなた達が残り半分の幸運を打ち破って、勝ってみせなさい！」"
translation = "「용인 내가 혼자서 이기는 건 당연한 일 아니겠어? 부속생인 너희들이 남은 절반의 행운을 깨부수고 이겨 보이거라!」"

[[dialogue]]
speaker = "アム"
original = "「……！\u3000イエス・マム！」"
translation = "「……! 예스 마무!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「言われずとも……！\u3000妃竜院マハムート、残りはそこで見ているがいい！」"
translation = "「말하지 않아도……! 키류인 마하무트, 나머지는 거기서 구경이나 하거라!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「サチのライバルである我の力、その目にとくと焼き付けてやるのじゃ！」"
translation = "「사치의 라이벌인 나의 힘을 그 눈에 똑똑히 새겨주마!」"

[[dialogue]]
speaker = "unk"
original = "プリムラを筆頭に気合いを入れ直した附属生たちは、再びシャドウサチに戦いを挑むのだった――"
translation = "프리뮬라를 필두로 기합을 다시 넣은 부속생들은 다시 섀도우 사치에게 싸움을 도전하는 것이었다──"

