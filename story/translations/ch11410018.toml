[[dialogue]]
speaker = "unk"
original = "ゲシュペンス島に戻ってきたルルゥさんは、１番最初に僕のところへ姿を見せに来てくれた。"
translation = "게슈펜스 섬으로 돌아온 루루 씨는 가장 먼저 나를 보러 와주었다."

[[dialogue]]
speaker = "主人公"
original = "「ルルゥさん、大丈夫でした？」"
translation = "「루루 씨, 괜찮았어요?」"

[[dialogue]]
speaker = "unk"
original = "ルルゥさんを驚かせないように、できるだけ穏やかに聞こう、と。"
translation = "루루 씨를 놀라게 하지 않도록 가능한 한 온화하게 물어보자, 라고."

[[dialogue]]
speaker = "unk"
original = "そう思っていたのに、募っていた心配が先に立ってつい声が大きくなってしまった。"
translation = "그렇게 생각했는데 쌓여있던 걱정이 앞서 그만 목소리가 커지고 말았다."

[[dialogue]]
speaker = "ルルゥ"
original = "「だ、大丈夫なの……心配かけてしまってごめんなさい、なの……」"
translation = "「괘, 괜찮은 거야…… 걱정 끼쳐서 미안한 거야……」"

[[dialogue]]
speaker = "主人公"
original = "「あ……こっちこそ驚かせてしまってごめんなさい！\u3000無事に戻ってきてくれたことが嬉しくて、つい……」"
translation = "「아…… 나야말로 놀라게 해서 미안해요! 무사히 돌아와 준 게 기뻐서 그만……」"

[[dialogue]]
speaker = "主人公"
original = "「でも、ルルゥさんが無事に戻って来てくれてよかったです！」"
translation = "「하지만 루루 씨가 무사히 돌아와 줘서 다행이에요!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はぅぅ、ご主人様ぁ……<emoji=heart04>」"
translation = "「하으으, 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「あ、あれ……？」"
translation = "「어, 어라……?」"

[[dialogue]]
speaker = "unk"
original = "潤んだ瞳で僕を見つめてくるルルゥさん。"
translation = "촉촉한 눈망울로 나를 바라보는 루루 씨."

[[dialogue]]
speaker = "unk"
original = "その顔を見ているだけで、僕の胸は激しい鼓動を打つ。"
translation = "그 얼굴을 보고 있는 것만으로도 내 가슴은 격렬하게 고동친다."

[[dialogue]]
speaker = "ルルゥ"
original = "「あっ！？\u3000ごめんなさいなの！\u3000ご主人様の言葉が嬉しくて、ルルゥ、またご主人様のこと誘惑しちゃったみたい、なの……」"
translation = "「앗!? 미안한 거야! 주인님의 말이 기뻐서 루루, 또 주인님을 유혹해 버린 것 같은 거야……」"

[[dialogue]]
speaker = "unk"
original = "申し訳なさそうに俯くルルゥさん。"
translation = "미안한 듯 고개를 숙이는 루루 씨."

[[dialogue]]
speaker = "unk"
original = "魅了の力もあるかもしれないけど……それ以上にこんな可愛いルルゥさんにじっと見つめられたら、抱きしめたい気持ちを抑えられるわけがない！"
translation = "매료의 힘도 있겠지만…… 그 이상으로 이렇게 귀여운 루루 씨가 빤히 쳐다본다면 껴안고 싶은 마음을 억누를 수 있을 리가 없다!"

[[dialogue]]
speaker = "ルルゥ"
original = "「任せて、欲しいの……<emoji=heart04>\u3000はぁぁっ。ルルゥ、ちゃんと責任取るの……<emoji=heart04>」"
translation = "「맡겨줬으면 하는 거야……<emoji=heart04> 하아아. 루루, 제대로 책임질 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕の気持ちを察したように、ルルゥさんは背中を向けて四つん這いになると、お尻を高く突き出した。"
translation = "내 마음을 알아챈 듯 루루 씨는 등을 돌리고 엎드려 기는 자세를 취하더니 엉덩이를 높게 치켜들었다."

[[dialogue]]
speaker = "unk"
original = "そして興奮に声を震わせながら、自身の局部を両手で広げて見せる。"
translation = "그리고 흥분에 목소리를 떨며 자신의 국부를 양손으로 벌려 보여준다."

[[dialogue]]
speaker = "ルルゥ"
original = "「ご主人様をこーふんさせちゃったのは、ルルゥだから<emoji=heart04>\u3000あぁっ、それを静めるのに、ルルゥのこと好きにしてほしいの<emoji=heart04>」"
translation = "「주인님을 흥분시켜 버린 건 루루니까<emoji=heart04> 아앗, 그걸 가라앉히기 위해 루루를 마음대로 해줬으면 하는 거야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "つぼみの内側が解き開かれ、性欲をかき立てる鮮やかなピンク色の襞が露わになった。"
translation = "꽃봉오리의 안쪽이 열리고 성욕을 자극하는 선명한 분홍색 주름이 드러났다."

[[dialogue]]
speaker = "主人公"
original = "「ルルゥさん、そんな大胆な格好、見せられたら……僕、我慢できなくなってしまいます……」"
translation = "「루루 씨, 그런 대담한 모습 보여주시면…… 저, 참을 수 없게 되어버려요……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「我慢しなくていいの<emoji=heart04>\u3000はぁ、ご主人様の……お、おち○ちん<emoji=heart04>\u3000ルルゥの中に、入れて欲しいの……<emoji=heart04>」"
translation = "「참지 않아도 괜찮은 거야<emoji=heart04> 하아, 주인님의…… 자, 자지<emoji=heart04> 루루의 안에 넣어줬으면 하는 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「お、おち○ちん……」"
translation = "「자, 자지……」"

[[dialogue]]
speaker = "unk"
original = "恥じらいがちにルルゥさんが口にした言葉が、僕をますます興奮させる。"
translation = "부끄러워하며 루루 씨가 입에 담은 말이 나를 점점 더 흥분시킨다."

[[dialogue]]
speaker = "主人公"
original = "「ルルゥ、さん……ルルゥさんのおま○こ、も……興奮してヒクヒクしてる……。欲しいの？\u3000僕の、おち○ちん……」"
translation = "「루루 씨…… 루루 씨의 보지도…… 흥분해서 벌름거리고 있어……. 갖고 싶어요? 내 자지……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ご主人様ぁ<emoji=heart04>\u3000そ、そんなこと聞かれたら、恥ずかしいの……<emoji=heart04>\u3000でも、ちゃんとお願いするの……<emoji=heart04>\u3000ルルゥ、ご主人様のおち○ちん、欲しいなの<emoji=heart04>」"
translation = "「주인님<emoji=heart04> 그, 그런 걸 물어보시면 부끄러운 거야……<emoji=heart04> 하지만 제대로 부탁하는 거야……<emoji=heart04> 루루, 주인님의 자지 갖고 싶은 거야<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「ルルゥさん……！」"
translation = "「루루 씨……!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はっ、あぅ、んんんっ……！\u3000ご主人様の、おち○ちん……ルルゥに入ってくるぅ……！」"
translation = "「핫, 아으, 으으응……! 주인님의 자지…… 루루에게 들어오고 있어……!」"

[[dialogue]]
speaker = "unk"
original = "ルルゥさんのそこは、小柄な体格に比例して小さく狭かった。"
translation = "루루 씨의 그곳은 아담한 체격에 비례해 작고 좁았다."

[[dialogue]]
speaker = "unk"
original = "それでも僕が力を籠めると愛液で滑った肉棒は弾力を押し分けて、ニュルリと根元まで呑み込まれてしまう。"
translation = "그런데도 내가 힘을 주자 애액으로 미끄러진 자지는 탄력을 밀어젖히고 미끄러지듯 뿌리까지 삼켜지고 만다."

[[dialogue]]
speaker = "ルルゥ"
original = "「ん、ぁあぅ<emoji=heart04>\u3000奥の方まで、届いてるの……<emoji=heart04>\u3000んふ、ぅ、んんんっ……<emoji=heart04>」"
translation = "「응, 아아으<emoji=heart04> 안쪽 깊은 곳까지 닿고 있는 거야……<emoji=heart04> 응후, 으, 으으응……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ルルゥのちっちゃなおま○こがぁ<emoji=heart04>\u3000んんぅっ、ご主人様のでいっぱいに広がって……<emoji=heart04>\u3000全部が、ジンジンしてる、なの……<emoji=heart04>\u3000はぁ、ぁ……んんっ<emoji=heart04>」"
translation = "「루루의 조그만 보지가아<emoji=heart04> 응으윽, 주인님의 것으로 가득 벌어져서……<emoji=heart04> 전부 징징거리고 있는 거야……<emoji=heart04> 하아, 아…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ご主人様のおち○ちん……<emoji=heart04>\u3000ぁあぁっ、いつも以上におっきく、なってる気がするの<emoji=heart04>\u3000どうしてなの……？」"
translation = "「주인님의 자지……<emoji=heart04> 아아앗, 평소보다 더 커진 것 같은 기분이 드는 거야<emoji=heart04> 어째서인 거야……?」"

[[dialogue]]
speaker = "主人公"
original = "「だ、だって……ルルゥさん、こんな可愛いのに……おち○ちんとか、おま○ことか、えっちなこと言ってて……そんなこと言われたら余計に……」"
translation = "「그, 그게…… 루루 씨, 이렇게 귀여우면서…… 자지라든가 보지라든가 야한 말을 하고…… 그런 말을 들으니까 더……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ご主人様、興奮しちゃう、なの……？\u3000あぁあっ<emoji=heart04>\u3000やめた方がいい、なの……？」"
translation = "「주인님 흥분해 버리는 거야……? 아아앗<emoji=heart04> 그만두는 게 좋은 거야……?」"

[[dialogue]]
speaker = "主人公"
original = "「そんなこと、あるわけないじゃないですか……。っ、もっと、僕のこと興奮させて欲しいですっ……！」"
translation = "「그럴 리가 없잖아요……. 윽, 좀 더 저를 흥분시켜 줬으면 좋겠어요……!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あはっ<emoji=heart04>\u3000わかった、なの<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000ルルゥ、ご主人様をこーふんさせて……<emoji=heart04>\u3000いっぱい気持ちよくなってもらう、なの<emoji=heart04>」"
translation = "「아핫<emoji=heart04> 알겠어, 인 거야<emoji=heart04> 하아앙<emoji=heart04> 루루, 주인님을 흥분시켜서……<emoji=heart04> 가득 기분 좋게 해줄게, 인 거야<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はぁ、ぅ……んんっ<emoji=heart04>\u3000ご主人様の、硬くて熱いおち○ちん<emoji=heart04>\u3000ぁあぁっ、ずりゅずりゅって、動いてるの……<emoji=heart04>」"
translation = "「하아, 으…… 응<emoji=heart04> 주인님의, 딱딱하고 뜨거운 자지<emoji=heart04> 아아앗, 즈류즈류하고, 움직이고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "高まる欲望のままに、僕はルルゥさんの小さなおま○こにピストンを始めてしまう。"
translation = "고조되는 욕망대로, 나는 루루 씨의 작은 보지에 피스톤을 시작해 버린다."

[[dialogue]]
speaker = "ルルゥ"
original = "「ご主人、様ぁ……<emoji=heart04>\u3000んううっ<emoji=heart04>\u3000あ、んんぅっ……ルルゥのおま○こ、気持ちいい、なの？\u3000あっ、んっ、あっ、ああっ……<emoji=heart04>」"
translation = "「주인, 님……<emoji=heart04> 응으윽<emoji=heart04> 아, 응으윽…… 루루의 보지, 기분 좋아, 인 거야? 앗, 응, 앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「うんっ……っ、すごく、締め付けてきて……気持ちいいっ！」"
translation = "「응……윽, 엄청나게, 조여와서…… 기분 좋아!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「おま○こ締めたら、ご主人様、もっと気持ちよくなれるの……<emoji=heart04>\u3000はふぅんっ<emoji=heart04>\u3000ぎゅーって……ふふふっ<emoji=heart04>\u3000きつきつになった、ルルゥのおま○こなの<emoji=heart04>」"
translation = "「보지를 조이면, 주인님, 좀 더 기분 좋아질 수 있는 거야……<emoji=heart04> 하후웅<emoji=heart04> 꼬오옥 하고…… 후후후<emoji=heart04> 꽉꽉 조이게 된, 루루의 보지인 거야<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「ぁっ……！\u3000ぅう！」"
translation = "「앗……! 으우!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あっ……力、入れすぎちゃった、なの……？\u3000痛かったなの？」"
translation = "「앗…… 힘을, 너무 줘버린 거야……? 아팠던 거야?」"

[[dialogue]]
speaker = "主人公"
original = "「ち、違うよ。気持ちよすぎて、声が出ちゃっただけ……もっと、してほしい……」"
translation = "「아, 아니야. 너무 기분 좋아서, 목소리가 나와버린 것뿐…… 좀 더, 해줬으면 좋겠어……」"

[[dialogue]]
speaker = "ルルゥ"
original = "「もっとしていいの……？\u3000わかった、なの<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000もっとぎゅーってするの<emoji=heart04>」"
translation = "「좀 더 해도 되는 거야……? 알겠어, 인 거야<emoji=heart04> 하아앙<emoji=heart04> 좀 더 꼬오옥 할게<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ぎゅーってした方がぁ、あぁあんっ<emoji=heart04>\u3000ルルゥも、ご主人様のおち○ちん<emoji=heart04>\u3000強くこすれて、気持ちよくなれる、なの<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「꼬오옥 하는 편이이, 아아앙<emoji=heart04> 루루도, 주인님의 자지<emoji=heart04> 강하게 비벼져서, 기분 좋아질 수 있는 거야<emoji=heart04> 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルゥさんは下腹部に力を込めて、より僕が気持ちよくなれるように頑張ってくれる。"
translation = "루루 씨는 하복부에 힘을 주어, 내가 더 기분 좋아질 수 있도록 노력해 준다."

[[dialogue]]
speaker = "unk"
original = "その気持ちが嬉しくて、僕もルルゥさんを気持ちよくしたくて、ルルゥさんの膣内をかき回しながら彼女の反応がいい場所を探した。"
translation = "그 마음이 기뻐서, 나도 루루 씨를 기분 좋게 해주고 싶어, 루루 씨의 질 내부를 휘저으며 그녀의 반응이 좋은 곳을 찾았다."

[[dialogue]]
speaker = "ルルゥ"
original = "「あぁああっ<emoji=heart04><emoji=heart04>\u3000んんぅ、んっ……はぁあぁん<emoji=heart04>\u3000そ、そこぉ……<emoji=heart04>\u3000んんぅぅうっ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04><emoji=heart04> 응으, 응…… 하아아앙<emoji=heart04> 거, 거기이……<emoji=heart04> 응으으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はぁ、ぅ<emoji=heart04>\u3000おち○ちん、ルルゥの気持ちいいとこ、当たってるの<emoji=heart04>\u3000んんぅっ、あっ、あっ、あああっ……<emoji=heart04>」"
translation = "「하아, 으<emoji=heart04> 자지, 루루의 기분 좋은 곳에, 닿고 있는 거야<emoji=heart04> 응으윽, 앗, 앗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「ここ、気持ちいい……？」"
translation = "「여기, 기분 좋아……?」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あぁあっ<emoji=heart04>\u3000ふわぁあっ、気持ちいいのっ<emoji=heart04>\u3000あっという間に、ルルゥの気持ちいいところ、見つけられちゃったなの……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 후와아앗, 기분 좋은 거야<emoji=heart04> 어느새, 루루의 기분 좋은 곳, 들켜버린 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あんっ<emoji=heart04>\u3000んぅっ、ああぁっ<emoji=heart04>\u3000はぁ、ぅ、ああぁ……んっ、あっ、ああっ<emoji=heart04>\u3000あ、あ、あぁあ<emoji=heart04>\u3000はぁ、あ……んぅ、んんんっ、あっ、ああ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 응윽, 아아앗<emoji=heart04> 하아, 으, 아아아…… 응, 앗, 아앗<emoji=heart04> 아, 아, 아아아<emoji=heart04> 하아, 아…… 응으, 응응응, 앗, 아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ご主人様の、しこしこ……気持ちよすぎて<emoji=heart04>\u3000はぅうん<emoji=heart04>\u3000ルルゥのこと、全部分かってるみたいなの……<emoji=heart04>」"
translation = "「주인님의, 시코시코…… 너무 기분 좋아서<emoji=heart04> 하우웅<emoji=heart04> 루루에 대해, 전부 알고 있는 것 같은 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あっ、あんっ<emoji=heart04>\u3000んぅう……ああ、あっ<emoji=heart04>\u3000ルルゥ、ご主人様にしこしこされたら……すぐに変になっちゃう、なのっ<emoji=heart04>\u3000んんんぅっ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 응으으…… 아아, 앗<emoji=heart04> 루루, 주인님한테 시코시코 당하면…… 금방 이상해져 버리는 거야앗<emoji=heart04> 응응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「でも、嬉しいのっ<emoji=heart04>\u3000んんぅ、あぁあぁっ<emoji=heart04>\u3000ご主人様に、可愛がってもらって<emoji=heart04>\u3000気持ちよくしてもらうの、ルルゥ、大好きなのっ<emoji=heart04>」"
translation = "「하지만, 기쁜 거야앗<emoji=heart04> 응으, 아아아앗<emoji=heart04> 주인님한테, 사랑받아서<emoji=heart04> 기분 좋게 되는 거, 루루, 정말 좋아하는 거야앗<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「僕も、ルルゥさんが気持ちよくなってくれると、嬉しい……！」"
translation = "「나도, 루루 씨가 기분 좋아해 주면, 기뻐……!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ああっ、あんっ<emoji=heart04>\u3000んんんぅ……！」"
translation = "「아앗, 앙<emoji=heart04> 응응응으……!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あんっ、はぁあっ、あっ、あぁあっ<emoji=heart04>\u3000んっ、あっ、あ、んぅ、んっ、あっ、あ、あんっ<emoji=heart04>」"
translation = "「앙, 하아앗, 앗, 아아앗<emoji=heart04> 응, 앗, 아, 응, 응, 앗, 아, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルゥさんの腰が、僕の腰の動きに合わせるように揺れ始め、ピストンの速度が段々と速まっていく。"
translation = "루루 씨의 허리가 내 허리의 움직임에 맞추듯 흔들리기 시작하고, 피스톤의 속도가 점점 빨라진다."

[[dialogue]]
speaker = "ルルゥ"
original = "「激しい、なのっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000んぅ、あっ、あはぁっ<emoji=heart04>\u3000ご主人、さまぁっ……あ、あぁあっ<emoji=heart04>」"
translation = "「격렬해, 인 거야앗<emoji=heart04> 응응윽<emoji=heart04> 앗, 앗, 앙<emoji=heart04> 응으, 앗, 아하앗<emoji=heart04> 주인, 님…… 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "動きを速めれば速めるほど、ルルゥさんの快感に喘ぐ声は高くなり、膣内のぬめりは増していく。"
translation = "움직임을 서두르면 서두를수록, 루루 씨의 쾌감에 젖은 목소리는 높아지고, 질 내의 미끈거림은 더해간다."

[[dialogue]]
speaker = "unk"
original = "その潤滑油の力を借りて、僕はさらにルルゥさんの感じる部分を攻め立てた。"
translation = "그 윤활유의 힘을 빌려, 나는 더욱 루루 씨가 느끼는 부분을 몰아붙였다."

[[dialogue]]
speaker = "ルルゥ"
original = "「はあぁあんっ<emoji=heart04>\u3000あっ、あ、はぁあんっ<emoji=heart04>\u3000あぁあぁっ<emoji=heart04>\u3000んふぅ、んんぅ、あっ、ああ、あ、あぁあっ<emoji=heart04>\u3000ご主人様のおち○ちんっ……気持ちいいとこ、ごしごしってぇ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 앗, 아, 하아아앙<emoji=heart04> 아아아앗<emoji=heart04> 응후, 응응으, 앗, 아아, 아, 아아앗<emoji=heart04> 주인님의 자지…… 기분 좋은 곳을, 고시고시이<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕の肉棒に何度も貫かれながら、ルルゥさんはお尻をプルプルと震わせている。"
translation = "내 육봉에 몇 번이고 꿰뚫리면서, 루루 씨는 엉덩이를 파르르 떨고 있다."

[[dialogue]]
speaker = "unk"
original = "花びらからは摩擦によって白く泡立った愛液があふれ、そのすぐ上では可愛いお尻の穴がルルゥさんの興奮を示すように、きゅっきゅっとすぼまっていた。"
translation = "꽃잎에서는 마찰에 의해 하얗게 거품 일은 애액이 넘쳐흐르고, 그 바로 위에서는 귀여운 항문이 루루 씨의 흥분을 나타내듯, 꾹꾹 오므라들고 있었다."

[[dialogue]]
speaker = "ルルゥ"
original = "「気持ちいいのっ<emoji=heart04>\u3000おち○ちん気持ちいいっ<emoji=heart04>\u3000あぁんっ、はぁ、あっ、んあぁあっ<emoji=heart04>\u3000ご主人さまぁっ、あ、あああっ<emoji=heart04>」"
translation = "「기분 좋은 거야앗<emoji=heart04> 자지 기분 좋아앗<emoji=heart04> 아앙, 하아, 앗, 응아아앗<emoji=heart04> 주인님, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目に映るルルゥさんの全てが僕を興奮させてくれる。"
translation = "눈에 비치는 루루 씨의 모든 것이 나를 흥분시킨다."

[[dialogue]]
speaker = "unk"
original = "僕は込み上げてくる激しい感情に耐えながら、熱い息を吐き出して動き続けた。"
translation = "나는 치밀어 오르는 격렬한 감정을 견디며, 뜨거운 숨을 내뱉고 계속 움직였다."

[[dialogue]]
speaker = "ルルゥ"
original = "「あっ、あんっ、あんっ、はぁあぁんっ<emoji=heart04>\u3000嬉しいの<emoji=heart04>\u3000ご主人さまのこーふんっ、伝わってくるのっ<emoji=heart04>\u3000んんっ、んぅ、あぁああっ<emoji=heart04>」"
translation = "「앗, 앙, 앙, 하아아앙<emoji=heart04> 기쁜 거야<emoji=heart04> 주인님의 흥분, 전해져 오는 거야앗<emoji=heart04> 응응, 응으, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ぶつけて、欲しいのっ<emoji=heart04>\u3000ぁ、あぁあっ<emoji=heart04>\u3000ご主人様のこーふん、ルルゥにぜんぶ、ぶつけて欲しいっ<emoji=heart04>\u3000あ、あんっ、あっ、あ、ああ、あ、んぅううっ<emoji=heart04>」"
translation = "「부딪쳐, 줬으면 하는 거야앗<emoji=heart04> 아, 아아앗<emoji=heart04> 주인님의 흥분, 루루에게 전부, 부딪쳐 줬으면 좋겠어<emoji=heart04> 아, 앙, 앗, 아, 아아, 아, 응으으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ご主人さまぁ<emoji=heart04>\u3000どんなに激しくしても、へーきなのっ<emoji=heart04>\u3000ご主人様のぜんぶ、気持ちよすぎるからぁ<emoji=heart04>\u3000あぁあっ、だからぜんぶ、ぜんぶくださいなのっ<emoji=heart04>」"
translation = "「주인님<emoji=heart04> 아무리 격렬하게 해도, 괜찮은 거야앗<emoji=heart04> 주인님의 전부, 너무 기분 좋으니까아<emoji=heart04> 아아앗, 그러니까 전부, 전부 주세요인 거야앗<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「わかり、ましたっ……ルルゥさんにぜんぶ、ぶつけますっ。んんぅっ！」"
translation = "「알겠, 습니다…… 루루 씨에게 전부, 부딪칠게요. 응응윽!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あぁああぁぁっ<emoji=heart04>\u3000ご主人様のえっちな気持ちで、ルルゥのおま○こ一杯なのっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000ご主人様ぁ、とっても嬉しいのぉ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아아앗<emoji=heart04> 주인님의 야한 기분으로, 루루의 보지 가득인 거야앗<emoji=heart04> 하아앙<emoji=heart04> 주인님, 너무 기쁜 거야아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「っ……そんな、こと言われたらっ！」"
translation = "「윽…… 그런, 말을 들으면!」"

[[dialogue]]
speaker = "unk"
original = "ルルゥさんの可愛くもいやらしいおねだりに突き動かされ、僕はますます激しくルルゥさんの膣内をかき回す。"
translation = "루루 씨의 귀엽고도 야릇한 조름에 떠밀려, 나는 더욱 격렬하게 루루 씨의 질 내부를 휘젓는다."

[[dialogue]]
speaker = "ルルゥ"
original = "「はぁあんっ<emoji=heart04>\u3000んんぅ、あっ、あ、ああぁっ<emoji=heart04>\u3000ご主人様に求められてるっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おま○こと頭のなかっ、ご主人様で一杯になってるのぉ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 응응으, 앗, 아, 아아아앗<emoji=heart04> 주인님에게 원해지고 있어<emoji=heart04> 앙<emoji=heart04> 보지랑 머릿속, 주인님으로 가득 차버리는 거야아<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「おま○こ気持ちよくてっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000おち○ちん気持ちよくできて、幸せぇ<emoji=heart04>\u3000あぁあぁあぁあぁあぁあっ<emoji=heart04>\u3000ご主人様の気持ちで、頭ピカピカしちゃうなの<emoji=heart04>」"
translation = "「보지 기분 좋아서어<emoji=heart04> 하아앙<emoji=heart04> 자지 기분 좋게 해줄 수 있어서, 행복해애<emoji=heart04> 아아아아아아아아아아앗<emoji=heart04> 주인님의 기분으로, 머리 반짝반짝해져 버리는 거야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルゥさんの締め付けに耐えていた陰茎だけど、もう抑え込んでいる衝動を我慢できなくなってきていた。"
translation = "루루 씨의 조임에 견디고 있던 음경이었지만, 이제 억누르고 있는 충동을 참을 수 없게 되어가고 있었다."

[[dialogue]]
speaker = "主人公"
original = "「ルルゥさん、僕、もうっ……！」"
translation = "「루루 씨, 저, 이제……!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「出してっ、出して欲しいなのっ<emoji=heart04>\u3000んんぅ、あぁあっ<emoji=heart04>\u3000ご主人様の白いので、ルルゥのお腹いっぱいにして欲しいなの<emoji=heart04>\u3000あぁあっ、ああぁんっ<emoji=heart04>」"
translation = "「내줘, 내줬으면 하는 거야앗<emoji=heart04> 응응으, 아아앗<emoji=heart04> 주인님의 하얀 걸로, 루루의 배 가득 채워줬으면 하는 거야<emoji=heart04> 아아앗, 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「ありがとうございますっ……でも、きっと受け止めきれないくらい、いっぱい出しちゃいそうですっ！」"
translation = "「감사합니다…… 하지만, 분명 다 받아내지 못할 정도로, 잔뜩 내버릴 것 같아요!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「いっぱい出してもらえるの、嬉しいのっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000あつあつのせーし、ビュッビューッってして欲しいのっ<emoji=heart04>\u3000あ、あっ、あっ、あぁあっ<emoji=heart04>」"
translation = "「잔뜩 내주는 거, 기쁜 거야앗<emoji=heart04> 하아앙<emoji=heart04> 뜨끈뜨끈한 정액, 뷰륫뷰륫하고 해줬으면 하는 거야앗<emoji=heart04> 아, 앗, 앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルゥさんの喘ぎ声が次第に切羽詰まってくる。"
translation = "루루 씨의 신음소리가 점차 절박해진다."

[[dialogue]]
speaker = "unk"
original = "僕も下半身に溜まっていた熱がせり上がっていくのを感じながら、少しでも気持ちよく絶頂を迎えようとピストンを速める。"
translation = "나도 하반신에 고여있던 열기가 치밀어 오르는 것을 느끼며, 조금이라도 기분 좋게 절정을 맞이하고자 피스톤을 서두른다."

[[dialogue]]
speaker = "ルルゥ"
original = "「あ、あ、あぁあっ<emoji=heart04>\u3000んあぁ、あ、あ、くんぅ、んくぅっ<emoji=heart04>\u3000んっ、あっ、ああっ！\u3000はぁあ、ああっ、んんぅ、あぁあっ、あはぁあんっ<emoji=heart04>」"
translation = "「아, 아, 아아앗<emoji=heart04> 응아아, 아, 아, 쿵으, 응쿠우윽<emoji=heart04> 응, 앗, 아아앗! 하아아, 아앗, 응응으, 아아앗, 아하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ごしゅじんさまっ、はぁあぁっ<emoji=heart04>\u3000すごぃのぉっ<emoji=heart04>\u3000んんっ、あっ、あ、んぅぅ！\u3000あぁあ、あ、あ、ああっ、んくぅ、ふわぁ<emoji=heart04>\u3000ああ、あ、あああっ<emoji=heart04>」"
translation = "「주인님, 하아아앗<emoji=heart04> 대단해애앗<emoji=heart04> 응응, 앗, 아, 응으으! 아아아, 아, 아, 아앗, 응쿠우, 후와아<emoji=heart04> 아아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "主人公"
original = "「っ、一緒にイキましょう、ルルゥさんっ……！」"
translation = "「윽, 같이 가요, 루루 씨……!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はいっ、はいなのっ<emoji=heart04>\u3000あぁあぁあぁっ<emoji=heart04>\u3000あっ、ああ、あっ、あぁあっ<emoji=heart04>\u3000イク、イク、イクっ<emoji=heart04>\u3000んんぅ、んあぁあ、ふぅあぁっ<emoji=heart04>\u3000ぁああ、ああっ、イッちゃうなのっ！」"
translation = "「네, 네인 거야<emoji=heart04> 아아아아앗<emoji=heart04> 앗, 아아, 앗, 아아앗<emoji=heart04> 가, 가, 간다앗<emoji=heart04> 응응으, 응아아아, 후아아앗<emoji=heart04> 아아아, 아앗, 가버리는 거야앗!」"

[[dialogue]]
speaker = "ルルゥ"
original = "「あ、あ、あ、あ、あぁあっ<emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04>\u3000イっちゃいますぅ～～～～<emoji=heart04><emoji=heart04>」"
translation = "「아, 아, 아, 아, 아아앗<emoji=heart04> 가가가가가가앗<emoji=heart04><emoji=heart04> 가버려요~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ふわあぁあああああああああああああああああ～～～～～～っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후와아아아아아아아아아아아아아아아아아~~~~~~앗앗앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の声と共に、結合部がひときわ強く肉棒を締め付ける。"
translation = "절정의 목소리와 함께, 결합부가 한층 더 강하게 육봉을 조여온다."

[[dialogue]]
speaker = "ルルゥ"
original = "「ああああっ～～～<emoji=heart04>\u3000あっ、あぁあああっ<emoji=heart04>\u3000あぁあ、あ、ああああっっっ……<emoji=heart04><emoji=heart04>」"
translation = "「아아아앗~~~<emoji=heart04> 앗, 아아아아앗<emoji=heart04> 아아아, 아, 아아아아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕は快感に腰を震わせながら、激しい脈動と共に白濁とした精液をルルゥさんの膣内に注ぎ込み続けた。"
translation = "나는 쾌감에 허리를 떨며, 격렬한 고동과 함께 백탁된 정액을 루루 씨의 질 내에 계속 쏟아부었다."

[[dialogue]]
speaker = "ルルゥ"
original = "「あぁう、んんぅっ……<emoji=heart04>\u3000ルルゥのお腹の中で……ご主人様のおち○ちん、ビクンビクンって<emoji=heart04>\u3000んんっ、あ、ああっ、あ、はぁああっ<emoji=heart04>」"
translation = "「아아우, 응응윽……<emoji=heart04> 루루의 배 속에서…… 주인님의 자지, 비큰비큰하고 있어<emoji=heart04> 응응, 아, 아아앗, 아, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「熱いの、いっぱい、ああっ<emoji=heart04>\u3000出てるの<emoji=heart04>\u3000はぁ、あ、んんっ、あ、あああっ<emoji=heart04>」"
translation = "「뜨거운 거, 가득, 아앗<emoji=heart04> 나오고 있어<emoji=heart04> 하아, 아, 응응, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大量に吐き出された白濁液はルルゥの中に収まりきらず、結合部からあふれ出てしまっていた。"
translation = "대량으로 토해진 백탁액은 루루 안에 다 담기지 못하고, 결합부에서 흘러넘쳐 버리고 말았다."

[[dialogue]]
speaker = "ルルゥ"
original = "「はぁ、んんっ……はぁ、ん……んぅ……<emoji=heart04>\u3000んぅ……ふぅ、はぁ……はぁ……んんんっ<emoji=heart04>」"
translation = "「하아, 응응…… 하아, 응…… 응으……<emoji=heart04> 응으…… 후우, 하아…… 하아…… 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はふぅ……んぅっ<emoji=heart04>\u3000ごめんなさい、やっぱり受け止めきれなかった、なの……<emoji=heart04>」"
translation = "「하후우…… 응윽<emoji=heart04> 죄송해요, 역시 다 받아내지 못한 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結合部から垂れ落ちる体液を見つめながら、ルルゥさんが残念そうにつぶやく。"
translation = "결합부에서 흘러내리는 체액을 바라보며, 루루 씨가 아쉬운 듯 중얼거린다."

[[dialogue]]
speaker = "ルルゥ"
original = "「でも、ご主人様のこと……たくさん気持ちよく出来たみたいで、嬉しいの……<emoji=heart04>」"
translation = "「하지만, 주인님을…… 잔뜩 기분 좋게 해준 것 같아서, 기쁜 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ルルゥのおま○こに、いっぱい出して……魅了は解けた、なの……？」"
translation = "「루루의 보지에, 잔뜩 내보내서…… 매료는 풀린 거야……?」"

[[dialogue]]
speaker = "主人公"
original = "「どうでしょう……？\u3000なんだかルルゥさんにしてもらう前よりも、もっとルルゥさんのこと、抱きしめたくなってる気はしますけど……」"
translation = "「글쎄요……? 왠지 루루 씨가 해주기 전보다도, 더 루루 씨를 껴안고 싶어진 기분은 듭니다만……」"

[[dialogue]]
speaker = "主人公"
original = "「でもそれは魅了のせいじゃなくて、僕がルルゥさんのこと、もっと好きになっちゃっただけって感じです」"
translation = "「하지만 그건 매료 때문이 아니라, 제가 루루 씨를 더 좋아하게 되어버린 것뿐이라는 느낌이에요」"

[[dialogue]]
speaker = "ルルゥ"
original = "「ご、ご主人様っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000そんなこと言ったら、ルルゥもご主人様のこと、もっともっと好きになってるなのっ<emoji=heart04><emoji=heart04>」"
translation = "「주, 주인님<emoji=heart04><emoji=heart04><emoji=heart04> 그런 말을 하면, 루루도 주인님을 더더욱 좋아하게 되어버리는 거야앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルゥ"
original = "「やっぱりご主人様は優しいの……<emoji=heart04>\u3000ルルゥのこと、いっつも幸せな気持ちにしてくれるの<emoji=heart04>\u3000ルルゥ、ご主人様が大好き、なの……<emoji=heart04>」"
translation = "「역시 주인님은 상냥한 거야……<emoji=heart04> 루루를, 언제나 행복한 기분으로 만들어 주는 거야<emoji=heart04> 루루, 주인님이 정말 좋아, 인 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぱっと輝くような笑顔を浮かべるルルゥさん。"
translation = "활짝 빛나는 듯한 미소를 짓는 루루 씨."

[[dialogue]]
speaker = "unk"
original = "そんなルルゥさんへの想いを抑えられなくなり、僕は彼女を背中から思いっきり抱きしめてしまうのだった。"
translation = "그런 루루 씨에 대한 마음을 억누를 수 없게 되어, 나는 그녀를 뒤에서 힘껏 껴안아 버리는 것이었다."

