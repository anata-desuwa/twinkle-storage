[[dialogue]]
speaker = "unk"
original = "サランとネーゼマインが悪戯をした後に、顔を見合わせて笑っている、ちょうどその頃――"
translation = "사란과 네제마인이 장난을 친 뒤 서로 마주 보며 웃고 있을 바로 그 무렵──"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふ……うふふふ♪\u3000計画は順調ですわ……♪」"
translation = "「후후…… 우후후후♪ 계획은 순조롭습니다와……♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（１個５００テルスのお菓子を、現在７００個売り上げて、３５万テルス。経費を差し引いても２０万テルスで、４人で山分けして１人頭５万テルスの稼ぎ）"
translation = "(개당 500텔루스인 과자를 현재 700개 팔아서 35만 텔루스. 경비를 제외해도 20만 텔루스니 네 명이서 나눠 가지면 일인당 5만 텔루스 벌이)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（学生のお金稼ぎとしては、これでも十分過ぎる成果でしょう。会社としてはお祭り価格で、カップケーキを１個７５０テルスくらいで売ってもよかったのでしょうが……）"
translation = "(학생 신분으로 돈 버는 것치고는 이것만으로도 충분히 과분한 성과겠죠. 회사로서는 축제 가격으로 컵케이크를 개당 750텔루스 정도에 팔아도 됐겠지만……)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（今回、実際の売り上げよりも優先したのは、人脈作り。サラン様やマリオン様、キャナンシー様といった方々の協力を得て、販売企画を成功させることが１番の目的）"
translation = "(이번에 실제 매출보다 우선시한 건 인맥 형성. 사란 님이나 마리온 님, 캐넌시 님 같은 분들의 협조를 얻어 판매 기획을 성공시키는 것이 첫 번째 목적)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（今回成功して、ハロウィンパーティーを盛り上げたという実績ができれば、次回以降、別の企画でも快く協力してもらえるようになりますわ）"
translation = "(이번에 성공해서 할로윈 파티를 띄웠다는 실적이 생기면 다음부터 다른 기획에서도 흔쾌히 협력받을 수 있게 됩니다)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（すなわち今後に繋がる、お金稼ぎのチャンスと手札が増える。そういう意味では今回の計画、既に成功していると言えますわ。ですが――）"
translation = "(즉 앞으로 이어질 돈 벌 기회와 카드가 늘어나는 법. 그런 의미에서 이번 계획은 이미 성공했다고 할 수 있습니다. 하지만──)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（<ruby>私<rt>わたくし</rt></ruby>のモット―は『悪・即・善』。悪とは儲かるもの。お金が儲かることは幸福。そして、幸せなのは善きこと……）"
translation = "(저의 모토는 '악·즉·선'. 악이란 돈이 되는 것. 돈을 버는 것은 행복. 그리고 행복한 것은 선한 일……)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（お金という幸せの為ならば、悪のリスクを厭わないのが、私、バンデッド・セナリィの流儀ですわ。故に――）"
translation = "(돈이라는 행복을 위해서라면 악의 리스크도 마다하지 않는 것이 저 밴디드 세나리의 스타일입니다. 고로──)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（ここから更に、倍プッシュですわ！！）"
translation = "(여기서 더더욱 배로 푸시입니다!!)"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――せ、セナリィさん。こんばんは……」"
translation = "「──세, 세나리 씨. 안녕하세요……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「こんばんはですわ、ヒトリ様♪」"
translation = "「안녕하세요입니다, 히토리 님♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お待ちしておりましたわ。例の準備はできておりますかしら？」"
translation = "「기다리고 있었습니다. 그 준비는 되셨을까요?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい。正直、どうなるかわかりませんでしたが……お願いしたら、思っていたよりノリノリで応じてくれました」"
translation = "「네, 네. 솔직히 어떻게 될지 몰랐지만…… 부탁했더니 생각보다 흔쾌히 응해주셨어요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あしなに♪\u3000やはり、ヒトリ様にお願いして正解でしたわね。それで、そちらに連れていらっしゃるのが……」"
translation = "「아시나니♪ 역시 히토리 님께 부탁하길 잘했군요와. 그래서 그쪽에 데려오신 분이……」"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はい、そうです。こちらがハロウィンの――」"
translation = "「네, 맞아요. 이쪽이 할로윈의──」"

[[dialogue]]
speaker = "unk"
original = "セナリィ、ただいま～……って、ヒトリ？"
translation = "세나리 다녀왔어~ ……어라 히토리?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひあっ！？\u3000か、会長さんっ！？」"
translation = "「히익!? 회, 회장님!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あら。驚いて後ろの棺桶の中に隠れてしまいましたわ。男の方が苦手というのは、本当でしたのね」"
translation = "「어머. 놀라서 뒤에 있는 관 속에 숨어버렸네요. 남자를 무서워한다는 게 정말이었군요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「す、すみません……会長さん。いきなりで、ビックリしてしまって……」"
translation = "「죄, 죄송해요…… 회장님. 갑작스러워서 깜짝 놀라는 바람에……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「今、出ますね……」"
translation = "「지금 나갈게요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さん、こ、こんばんは……」"
translation = "「회장님, 아, 안녕하세요……」"

[[dialogue]]
speaker = "unk"
original = "彼女は新星学園１年生、<ruby>不知火<rt>しらぬい</rt></ruby>ヒトリ。外見は物々しいが、恥ずかしがり屋な女の子だ。"
translation = "그녀는 신성학원 1학년 시라누이 히토리. 외모는 삼엄하지만 부끄럼 많은 소녀다."

[[dialogue]]
speaker = "unk"
original = "『御多摩霊園』を運営する両親を持ち、物心ついた頃から霊を見ることや会話することができたらしい。いつも隣には、幽霊の友達『ゆーちゃん』を連れている。"
translation = "'어타마 영원'을 운영하는 부모님을 두어 철들 무렵부터 유령을 보거나 대화할 수 있었다고 한다. 항상 곁에는 유령 친구 '유짱'을 데리고 다닌다."

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー♪」"
translation = "「유~♪」"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000今日は普通に見える……？"
translation = "어라? 오늘은 평범하게 보이네……?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、ゆーちゃんですか……？\u3000今日はハロウィンなので、霊感がない人でも見られるようになるんですよ」"
translation = "「아, 유짱 말씀인가요……? 오늘은 할로윈이라 영감이 없는 사람이라도 볼 수 있게 되거든요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「おかげで、ゆーちゃん、みんなから可愛いって言ってもらえて、私もなんだか嬉しくて……♪」"
translation = "「덕분에 유짱이 모두에게 귀엽다는 말을 들어서 저도 왠지 기뻐요……♪」"

[[dialogue]]
speaker = "unk"
original = "ところで、そちらの仮装してる方は……？"
translation = "그나저나 저기 가장하고 계신 분은……?"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふふ、今回のハロウィン計画の秘策中の秘策……最強の助っ人ですわ！」"
translation = "「후후후 이번 할로윈 계획의 비책 중의 비책…… 최강의 조력자입니다!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「紹介します……こちら、ハロウィンの本物の幽霊さんで――」"
translation = "「소개하죠…… 이분은 할로윈의 진짜 유령분으로──」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「かの有名な、カボチャ頭の『ジャック・オー・ランタン』さんです」"
translation = "「그 유명한 호박 머리의 '잭 오 랜턴' 씨입니다.」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000本物！？"
translation = "에!? 진짜!?"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そう、ハロウィンを盛り上げるならば、その道のプロフェッショナルに頼むのが１番！\u3000そこでヒトリ様に依頼して、ジャック様を召喚してもらったのですわ」"
translation = "「네 할로윈을 띄우려면 그 방면의 전문가에게 부탁하는 게 최고! 그래서 히토리 님께 의뢰해 잭 님을 소환해 주신 겁니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「さあ、ジャック様、学園の皆様に本物のトリックオアトリートを見せてあげてくださいまし♪」"
translation = "「자 잭 님 학원 여러분께 진짜 트릭 오어 트릿을 보여주세요♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あれ～？\u3000戻ってきたら、なんかすごく賑やかだね～？\u3000なにかあったのかな～？」"
translation = "「어라~? 돌아왔더니 왠지 엄청 북적거리네~? 무슨 일이라도 있었나~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「確かに……はは～ん、さてはセナリィの仕業だな？」"
translation = "「확실히…… 하항 보아하니 세나리 짓이군?」"

[[dialogue]]
speaker_original = "流星学園１年生"
speaker_translation = "유성 학원 1학년"
original = "「ねぇ、聞いた！？\u3000５００テルスで売ってる、あの美味しいカップケーキを食べさせてあげると、ダンスしてくれるっていうジャック・オー・ランタンの話！」"
translation = "「야 들었어!? 500텔루스에 파는 그 맛있는 컵케이크를 먹여주면 춤춰준다는 잭 오 랜턴 이야기!」"

[[dialogue]]
speaker_original = "流星学園附属校３年生"
speaker_translation = "유성 학원 부속교 3학년"
original = "「私、さっき２個目を買ってあげちゃいました♪\u3000すっごくクオリティの高い仮装で、迫力あるんですよ～♪\u3000でも、ダンスする姿がなんか可愛くって<emoji=heart04>」"
translation = "「나 아까 두 개째 사줬다구♪ 진짜 퀄리티 높은 가장이라 박력 만점이라니까~♪ 근데 춤추는 모습이 왠지 귀여워서❤️」"

[[dialogue]]
speaker_original = "新星学園２年生"
speaker_translation = "신성 학원 2학년"
original = "「わかる～♪\u3000コワ可愛いんだよね～<emoji=heart04>\u3000委員長なんて、本物みたいだって興奮して、目がハートマークになっちゃってたよ～」"
translation = "「그치~♪ 무서운데 귀엽다니까~❤️ 위원장님은 진짜 같다면서 흥분해서 눈이 하트 마크가 됐더라구~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「本物のジャック・オー・ランタンだって～！\u3000サランも見た～い♪」"
translation = "「진짜 잭 오 랜턴이래~! 사란도 보고 싶어~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、やっぱり♪\u3000セナリィと会長がお菓子をバンバン売りまくってるよ～。それと……」"
translation = "「아~ 역시♪ 세나리랑 회장이 과자를 펑펑 팔아치우고 있네. 그리고……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ほほほ♪\u3000お買い上げ、ありがとうございますわ～♪\u3000……あっ！\u3000マイン、サラン様、帰って参りましたのね」"
translation = "「호호호♪ 구입해 주셔서 감사합니다~♪ ……앗! 마인 사란 님 돌아오셨군요.」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わあぁ～♪\u3000本当にジャックちゃんだ～♪\u3000サラン、ジャックちゃん大好きなの～♪\u3000可愛い～♪」"
translation = "「와아아~♪ 진짜 잭짱이다~♪ 사란 잭짱 정말 좋아해~♪ 귀여워~♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「きゃっふ～ん<emoji=heart04>\u3000ジャック様、もう１つお菓子をあげちゃうわぁ～ん<emoji=heart04>\u3000ダンスをもう１度見せてぇ～<emoji=heart04>」"
translation = "「꺄후웅❤️ 잭 님 과자 하나 더 줄게에~앙❤️ 춤을 다시 한번 보여줘어~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぷっ……きゃはははっ♪\u3000本当にハロウィン狂もいるし！\u3000ていうか、このジャックさんって、セナリィの隠し玉？」"
translation = "「큭…… 캬하하하♪ 진짜 할로윈 광도 있네! 그건 그렇고 이 잭 씨라는 분 세나리의 비장의 카드?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ほほほ♪\u3000その通りですわ！\u3000実はかくかくしかじかで――あっ、は～い♪\u3000いらっしゃいませ～♪\u3000お１つですわね～？」"
translation = "「호호호♪ 맞아요! 실은 이러쿵저러쿵해서── 앗 네~♪ 어서 오세요~♪ 하나군요?」"

[[dialogue]]
speaker = "unk"
original = "（説明しつつも接客は止めないのすごいな）"
translation = "(설명하면서 접객은 쉬지 않는 거 대단하네)"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひひっ♪\u3000セナリィってば、本物のジャック・オー・ランタン呼んじゃうとか、マジかぁ～！\u3000頭イカれてるでしょ～！」"
translation = "「니히히히♪ 세나리 이 녀석 진짜 잭 오 랜턴을 불러오다니 실화냐~! 머리 나간 거 아냐~!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふふ、せっかく学園に、幽霊と話せる方がいるんですもの♪\u3000来てもらえれば盛り上がること間違いなしでしょう？」"
translation = "「후후후 모처럼 학원에 유령과 대화할 수 있는 분이 계시니까요♪ 오시기만 하면 분위기 달구는 건 따 놓은 당상 아니겠어요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わ～♪\u3000ジャックちゃん、すご～い！\u3000ダンス上手～♪」"
translation = "「와~♪ 잭짱 대단해! 춤 잘 춘다~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お菓子も売り上げが倍に伸びて、計１４００個を越えたところ！\u3000ほほっ♪\u3000ほほほっ♪\u3000もはや笑いが止まりませんわ～♪」"
translation = "「과자도 매출이 두 배로 늘어서 총 1400개를 넘어선 참입니다! 호홋♪ 호호홋♪ 이제 웃음이 멈추지 않아요~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぱちぱちぱちぱち～♪\u3000ダンスの次は一体何するの～？\u3000わ～♪\u3000面白そ～♪」"
translation = "「짝짝짝짝~♪ 춤 다음엔 대체 뭘 하는 거야~? 와~ 재밌겠다~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「さすがに少し用意し過ぎたかとも思いましたけれど、この勢いなら在庫２０００個完売して、１００万テルスの売り上げも不可能では――」"
translation = "「역시 조금 과하게 준비했나 생각도 했지만 이 기세라면 재고 2000개 완판하고 100만 텔루스 매출도 불가능은──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000セナリィ。大金を想像して、ニヤついているところ悪いんだけどさ～」"
translation = "「니히히♪ 세나리. 거액을 상상하며 실실 웃고 있는 와중에 미안한데 말이야~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「おぉ～♪\u3000ジャックちゃん、強～い！」"
translation = "「오오~♪ 잭짱 강하다!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「後ろ、止めなくて大丈夫？」"
translation = "「뒤쪽 안 말려도 괜찮겠어?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「は？」"
translation = "「네?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「きゃっふ～ん！\u3000負けちゃったわぁ～ん<emoji=heart04>」"
translation = "「꺄후웅! 져버렸다아~앙❤️」"

[[dialogue]]
speaker = "unk"
original = "セナリィが後ろを見やると、そこにはカボチャ頭になって倒れるハロウィン狂の姿。"
translation = "세나리가 뒤를 돌아보자 그곳에는 호박 머리가 되어 쓰러져 있는 할로윈 광의 모습."

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「推しに負けて、最高にハッピーハロウィンよぉ～ん……<emoji=heart04>\u3000……ガクリ」"
translation = "「최애에게 져서 최고로 해피 할로윈이야아~앙……❤️ ……털썩」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ホワイ！？\u3000委員長様！？\u3000というか、カボチャ頭の死屍累々がそこら中に転がってますわ！？\u3000ちょっと目を離した隙に、一体どういう状況ですのっ！？」"
translation = "「Why!? 위원장님!? 그보다 호박 머리 시체가 여기저기 널브러져 있잖아요!? 잠깐 눈 뗀 사이에 대체 어떻게 된 상황인가요!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「う～んとね～、なんかジャックちゃんがダンスの次にバトルを始めて、お菓子をあげた星騎士の子達を戦闘服に変身させて、戦い始めたんだ～♪」"
translation = "「으음 있지 왠지 잭짱이 춤 다음에 배틀을 시작해서 과자를 준 성기사 아이들을 전투복으로 변신시키더니 싸우기 시작했어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「今のところジャックちゃんが全部勝ってて～、負けた子はカボチャ頭になって、脱げなくなっちゃうの～♪」"
translation = "「지금까지는 잭짱이 다 이겨서 진 애들은 호박 머리가 돼서 못 벗게 되더라구~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「脱げないんですの、あれ！？」"
translation = "「저거 못 벗는 거예요와!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひひっ♪\u3000これはセナリィ、やっちゃったかもだね～♪」"
translation = "「니히히히♪ 이건 세나리 사고 쳤을지도 모르겠네~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ま、マイン？\u3000やっちゃったって……」"
translation = "「마, 마인? 사고 쳤다니……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これ、ジャックさん暴走してるパターンじゃない？」"
translation = "「이거 잭 씨 폭주하고 있는 패턴 아니야?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「な……なんですってぇぇぇ～～～っ！！？」"
translation = "「뭐…… 뭐라고요오오오오오오옷!!?」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "unk"
original = "慌てるセナリィを見て楽しむかのように、ハロウィンの幽霊は嘲笑うのだった。"
translation = "당황하는 세나리를 보며 즐기기라도 하는 듯 할로윈의 유령은 비웃었다."

