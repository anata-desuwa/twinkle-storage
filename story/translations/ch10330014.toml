[[dialogue]]
speaker = "unk"
original = "第４話,ご褒美はチョコレート,P"
translation = "제4화, 포상은 초콜릿, P"

[[dialogue]]
speaker = "unk"
original = "──アニュラスの補修テストがあるというので、俺は自宅で勉強を教えていた。"
translation = "──아뉴라스의 보충 테스트가 있다고 해서, 나는 집에서 공부를 가르쳐주고 있었다."

[[dialogue]]
speaker = "アニュラス"
original = "「――こんなところか。会長、感謝する。これで何とか明日のテストに臨めそうだ」"
translation = "「──이 정도인가. 회장, 감사한다. 이걸로 어떻게든 내일 테스트에 임할 수 있겠군」"

[[dialogue]]
speaker = "アニュラス"
original = "「それにしても、お前の家はいつも居心地がいいな。勉強も何故か自宅の数倍は捗るんだ」"
translation = "「그나저나, 네 집은 언제나 아늑하구나. 공부도 왠지 집보다 몇 배는 더 잘 되는군」"

[[dialogue]]
speaker = "アニュラス"
original = "「惜しむべきは少し学園から道がわかりにくいことくらいか。まあ、迷ったりはしないんだが」"
translation = "「아쉬운 점은 학원에서 길이 조금 알기 어렵다는 것 정도일까. 뭐, 길을 잃거나 하지는 않지만」"

[[dialogue]]
speaker = "unk"
original = "いや、毎回迷って遅れて来るよね！？"
translation = "아니, 매번 길을 잃어서 늦게 오잖아!?"

[[dialogue]]
speaker = "アニュラス"
original = "「安心して欲しい、次こそは約束の時間通りに到着してみせる」"
translation = "「안심해다오, 다음번에야말로 약속 시간대로 도착해 보이겠다」"

[[dialogue]]
speaker = "リノ"
original = "「アニュラスちゃん、お茶とお紅茶、どっちがいいとかある？」"
translation = "「아뉴라스 짱, 차랑 홍차 중에 어느 쪽이 좋니?」"

[[dialogue]]
speaker = "アニュラス"
original = "「あっ、お母様。何卒お構いなく。今日はそろそろお暇致しますので」"
translation = "「앗, 어머님. 부디 신경 쓰지 마십시오. 오늘은 이만 가봐야 해서」"

[[dialogue]]
speaker = "リノ"
original = "「あら、そうなの？\u3000でも、せっかくお茶菓子もいただいたんだし、一緒に食べて行けばいいんじゃない？」"
translation = "「어머, 그러니? 그래도 모처럼 다과도 받았는데, 같이 먹고 가면 좋잖니?」"

[[dialogue]]
speaker = "アニュラス"
original = "「いえ、甘いものは特別な時にしか食べないと心に誓っておりますので。どうぞ皆様で召し上がってください」"
translation = "「아뇨, 단것은 특별한 때에만 먹기로 마음먹었기에. 부디 여러분이 드셔주십시오」"

[[dialogue]]
speaker = "リノ"
original = "「そ、そう……？」"
translation = "「그, 그래……?」"

[[dialogue]]
speaker = "リノ"
original = "（礼儀正しいし、息子のお嫁さんにしたいくらい可愛い子なんだけど、どうしていつも仮面をつけたままなのかしら……？）"
translation = "（예의 바르고, 아들 며느리로 삼고 싶을 정도로 귀여운 아이인데, 어째서 언제나 가면을 쓴 채인 걸까……？）"

[[dialogue]]
speaker = "アニュラス"
original = "「では、会長。明日のテストの結果、楽しみにしておいて欲しい。成果を必ず出せるように頑張ってくる！」"
translation = "「그럼, 회장. 내일 테스트 결과, 기대해 줬으면 한다. 반드시 성과를 낼 수 있도록 힘내고 오마!」"

[[dialogue]]
speaker = "アニュラス"
original = "「さて、出口はこっちだったか」"
translation = "「자, 출구는 이쪽이었나」"

[[dialogue]]
speaker = "リノ"
original = "「そっちはお手洗いね」"
translation = "「그쪽은 화장실이란다」"

[[dialogue]]
speaker = "アニュラス"
original = "「失礼。こっちでしたね」"
translation = "「실례. 이쪽이었군」"

[[dialogue]]
speaker = "リノ"
original = "「そっちは息子の部屋ね」"
translation = "「그쪽은 아들 방이야」"

[[dialogue]]
speaker = "アニュラス"
original = "「……か、会長、すまないが出来れば見送りを頼みたい」"
translation = "「……회, 회장, 미안하지만 가능하다면 배웅을 부탁하고 싶군」"

[[dialogue]]
speaker = "unk"
original = "（次回からは迎えに行くようにしよう……）"
translation = "（다음부터는 마중 나가기로 하자……）"

[[dialogue]]
speaker = "unk"
original = "――それから三日後。"
translation = "──그로부터 사흘 뒤."

[[dialogue]]
speaker = "アニュラス"
original = "「今日、テストの結果が帰ってきた。会長と一緒に確認したいと思って、まだ中身を見ていない」"
translation = "「오늘, 테스트 결과가 돌아왔다. 회장과 함께 확인하고 싶어서, 아직 내용은 보지 않았어」"

[[dialogue]]
speaker = "アニュラス"
original = "「正直、わからない解答も多々あった。しかし、私は分数ができるようになっていたし、歴史のテストを睡眠の時間に使うこともなくなった」"
translation = "「솔직히, 모르는 해답도 허다했다. 하지만, 나는 분수를 할 수 있게 되었고, 역사 테스트 시간에 잠을 자는 일도 없어졌다」"

[[dialogue]]
speaker = "unk"
original = "（テーブルに置かれたテストの結果を見る）"
translation = "（테이블에 놓인 테스트 결과를 본다）"

[[dialogue]]
speaker = "アニュラス"
original = "「だからその……間違えは多くても、明らかな成長を感じていることだけは確かだ」"
translation = "「그러니까 그…… 틀린 게 많더라도, 분명한 성장을 느끼고 있는 것만은 확실하다」"

[[dialogue]]
speaker = "アニュラス"
original = "「か、会長……どうだ？」"
translation = "「회, 회장…… 어떠냐?」"

[[dialogue]]
speaker = "unk"
original = "国語、３１点。英語、３８点！"
translation = "국어, 31점. 영어, 38점!"

[[dialogue]]
speaker = "unk"
original = "数学、６５点。歴史、４２点"
translation = "수학, 65점. 역사, 42점"

[[dialogue]]
speaker = "アニュラス"
original = "「あ、赤点が……１つも……ない……！？」"
translation = "「낙, 낙제점이…… 하나도…… 없어……!?」"

[[dialogue]]
speaker = "アニュラス"
original = "「す、凄いぞ、会長！\u3000しかも数学においては、集中して勉強したおかげか５０点を超えている……！\u3000こんなことは１０年ぶりだ！」"
translation = "「대, 대단하다, 회장! 게다가 수학은 집중해서 공부한 덕분인지 50점을 넘었어……! 이런 일은 10년 만이다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「やった……私はついにやったんだ……！」"
translation = "「해냈다…… 나는 드디어 해냈어……!」"

[[dialogue]]
speaker = "アニュラス"
original = "「ありがとう、会長！\u3000この恩は忘れない。苦手なことでも、１つ１つ努力を積み重ねれば実を結ぶのだな……！」"
translation = "「고맙다, 회장! 이 은혜는 잊지 않으마. 서툰 일이라도, 하나하나 노력을 쌓으면 결실을 맺는 것이군……!」"

[[dialogue]]
speaker = "unk"
original = "頑張ったアニュラスに、ご褒美がある"
translation = "노력한 아뉴라스에게, 포상이 있다"

[[dialogue]]
speaker = "アニュラス"
original = "「ご褒美……？\u3000あ、これは……チョコレート……！」"
translation = "「포상……? 아, 이것은…… 초콜릿……!」"

[[dialogue]]
speaker = "アニュラス"
original = "「ありがとう……これ、食べてもいいのか？\u3000……うむ。そうしたら、いただきます。あぁーむ……んくっ」"
translation = "「고맙다…… 이거, 먹어도 되는 건가? ……음. 그렇다면, 잘 먹겠다. 아암…… 꿀꺽」"

[[dialogue]]
speaker = "アニュラス"
original = "「――甘くて美味しいな。明日からも、頑張れそうだ！」"
translation = "「──달콤하고 맛있구나. 내일부터도 힘낼 수 있을 것 같다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「……会長は、お父様に少し似ているところがある。優しさと厳しさを兼ね備えていたりするところとか、私が欲しいものを察してくれるところとか」"
translation = "「……회장은, 아버님과 조금 닮은 구석이 있다. 다정함과 엄격함을 겸비하고 있다거나, 내가 원하는 것을 알아채 주는 점이라든가」"

[[dialogue]]
speaker = "アニュラス"
original = "「いや、他人と比べるのは失礼だな。会長、私は……」"
translation = "「아니, 타인과 비교하는 건 실례군. 회장, 나는……」"

[[dialogue]]
speaker = "アニュラス"
original = "「――お前のことを好ましく思っているのかもしれない」"
translation = "「──너를 좋게 생각하고 있는지도 모르겠다」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000そ、それって……"
translation = "에!? 그, 그건……"

[[dialogue]]
speaker = "アニュラス"
original = "「ふふ……だから、これからも見極めさせてもらおうと思う」"
translation = "「후후…… 그러니까, 앞으로도 지켜보도록 하마」"

[[dialogue]]
speaker = "アニュラス"
original = "「お前が、私にとってお父様とは別の、大切な人になるのかどうかを、な」"
translation = "「네가, 나에게 있어 아버님과는 다른, 소중한 사람이 될지 어떨지를, 말이다」"

[[dialogue]]
speaker = "unk"
original = "……いや、ダメだな。それはできない"
translation = "……아니, 안 되겠어. 그건 할 수 없어"

[[dialogue]]
speaker = "アニュラス"
original = "「まさかの即失恋！？」"
translation = "「설마 했던 즉시 실연!?」"

[[dialogue]]
speaker = "アニュラス"
original = "「いや、待て会長！\u3000私の何がダメなんだ！？\u3000仮面か！？\u3000この仮面なのか！？\u3000これちゃんと取り外しできるから！\u3000ほら！」"
translation = "「아니, 기다려라 회장! 내 어디가 안 되는 거지!? 가면인가!? 이 가면 때문인가!? 이거 제대로 탈착할 수 있으니까! 자!」"

[[dialogue]]
speaker = "unk"
original = "まだ、アニュラスに実力で認めさせてない"
translation = "아직, 아뉴라스에게 실력으로 인정받지 못했어"

[[dialogue]]
speaker = "アニュラス"
original = "「……！\u3000そうか……そうだったな」"
translation = "「……! 그런가…… 그랬었지」"

[[dialogue]]
speaker = "アニュラス"
original = "「それで？\u3000お前の表情を見るに、どうやら準備は出来ているといった雰囲気だが？」"
translation = "「그래서? 네 표정을 보니, 아무래도 준비는 되었다는 분위기다만?」"

[[dialogue]]
speaker = "unk"
original = "ああ、今日これから勝負だ、アニュラス！"
translation = "아아, 오늘 지금부터 승부다, 아뉴라스!"

[[dialogue]]
speaker = "アニュラス"
original = "「いいだろう、会長。受けて立つ！」"
translation = "「좋다, 회장. 받아주마!」"

[[dialogue]]
speaker = "アニュラス"
original = "「私に、お前を認めさせてみろ！」"
translation = "「나에게, 너를 인정하게 해 봐라!」"

[[dialogue]]
speaker = "unk"
original = "――その時、アニュラスの浮かべた笑顔に、ドキッと胸の高鳴る自分がいて。"
translation = "──그때, 아뉴라스가 지은 미소에, 두근 하고 가슴이 고동치는 자신이 있었다."

[[dialogue]]
speaker = "unk"
original = "初めて会った日とは違う火が、いつの間にか胸に灯っていたことに、俺は気付くのだった。"
translation = "처음 만난 날과는 다른 불꽃이, 어느새 가슴에 켜져 있었다는 것을, 나는 깨닫는 것이었다."

