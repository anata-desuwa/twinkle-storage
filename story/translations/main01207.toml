[[dialogue]]
speaker = "unk"
original = "第８話,騎士の漂白,B"
translation = "제8화, 기사의 표백, B"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"
translation = "『강해져라. 세계를 집어삼키려는 힘에, 결코 먹히지 않도록.』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──オオオオオオオオオッ！！」"
translation = "「──오오오오오오오오옷!!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ふ──」"
translation = "「후──」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「これまで、か──…………」"
translation = "「여기까지, 인가──…………」"

[[dialogue]]
speaker = "unk"
original = "最後まで執念で剣を握り続けていた彼の右手から……ふっと、力が消えた。"
translation = "마지막까지 집념으로 검을 계속 쥐고 있던 그의 오른손에서…… 푹, 하고 힘이 사라졌다."

[[dialogue]]
speaker = "unk"
original = "鬼神のごとき彼の形相は、最後……清々しく笑っていた。"
translation = "귀신과 같던 그의 얼굴은, 마지막…… 시원하게 웃고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さっすがクロト──私の希望通り、最強の魔王になったわね！」"
translation = "「역시 쿠로토── 나의 희망대로, 최강의 마왕이 되었네!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「誰かさんにしごかれたおかげだろうな──でも、まだ先代ほどは引き出せちゃいないさ」"
translation = "「누구 씨에게 시달린 덕분이겠지── 하지만, 아직 선대만큼은 끌어내지 못했어.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これが本当の──魔王の、力……」"
translation = "「이것이 진정한── 마왕의, 힘……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ、ニャァ……まさしく本物に違いないニャン……」"
translation = "「냥, 냐아…… 확실히 진짜임에 틀림없는 거냥……」"

[[dialogue]]
speaker = "unk"
original = "今の俺には湧き上がる三種の力をすべてコントロールできていた。"
translation = "지금의 나는 솟아오르는 세 종류의 힘을 모두 컨트롤할 수 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、同じく魔王の血が流れるフィオナにも、同様の隠れたトリガーがあるのだろうという奇妙な確信があった。"
translation = "그리고, 마찬가지로 마왕의 피가 흐르는 피오나에게도, 동일한 숨겨진 방아쇠가 있을 것이라는 기묘한 확신이 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（けど──それより今は……）"
translation = "（하지만── 그것보다 지금은……）"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私は……弱かった」"
translation = "「나는…… 약했다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「妻が……異界に拐われ、操られているのを見て……己の在り方を、見失ってしまった」"
translation = "「아내가…… 이계에 납치당해, 조종당하는 것을 보고…… 자신의 존재 방식을, 잃어버렸다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「それがなんだと吠えられるほど、強くあることができなかった……」"
translation = "「그것이 뭐냐고 외칠 수 있을 만큼, 강하게 있을 수 없었다……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「リクリエの使徒として拐われたのなら……なおさら、リクリエに抗うべきだったのにな……」"
translation = "「리크리에의 사도로서 납치당했다면…… 더욱더, 리크리에에 저항해야 했을 텐데…….」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……あなたの総てが悪なわけじゃない。不条理の被害者であることは、間違いないだろ」"
translation = "「……당신의 모든 것이 악인 건 아냐. 부조리의 피해자임은, 틀림없잖아.」"

[[dialogue]]
speaker = "unk"
original = "俺だって彼の人生のすべてを知ったわけじゃない。"
translation = "나도 그의 인생의 모든 것을 알았던 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "ただ、それでも……過酷で理不尽な運命に翻弄されたことは間違いないと思うから。"
translation = "단지, 그럼에도…… 가혹하고 부조리한 운명에 농락당했다는 것은 틀림없다고 생각하니까."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "そして、フィオナも──彼に同情を禁じえないはずだ。"
translation = "그리고, 피오나도── 그에게 동정을 금할 수 없을 것이다."

[[dialogue]]
speaker = "unk"
original = "他ならぬ肉親をリクリエに<b>拐われた</b>立場として……。"
translation = "다름 아닌 육친을 리크리에에 <b>납치당한</b> 입장에서야……."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（リクリエとは意志なき厄災──だけど……果たして本当にそうなんだろうか？）"
translation = "（리크리에는 의지 없는 재앙── 하지만…… 과연 정말로 그럴까?）"

[[dialogue]]
speaker = "unk"
original = "ふつふつと湧き始めた疑問。しかし考える余地は与えられなかった。"
translation = "부글부글 솟아나기 시작한 의문. 하지만 생각할 여지는 주어지지 않았다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000これは──！？」"
translation = "「! 이것은──!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「寒波が急激に強まってる──このままじゃ森中が凍っちゃうかも！」"
translation = "「한파가 급격하게 강해지고 있어── 이대로라면 숲 전체가 얼어버릴지도!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ！\u3000ユウリも置いてきてるし、逃げなきゃヤバイのニャン！」"
translation = "「냥! 유우리도 두고 왔고, 도망쳐야 위험한 거냥!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いつつ……さすがに、私もそろそろ……」"
translation = "「아야야…… 역시, 나도 슬슬……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスの体力も危ない──緋宮くん、早く出なきゃ！」"
translation = "「비너스의 체력도 위험해── 히노미야 군, 빨리 나가야 해!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っああ──」"
translation = "「윽 아아──」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「と言っても──まずいニャン！\u3000もうワガハイ達が来た道はとっくに凍ってるニャン──！？」"
translation = "「라고 해도── 큰일이냥! 벌써 우리들이 온 길은 진작에 얼어붙은 거냥──!?」"

[[dialogue]]
speaker = "unk"
original = "俺たちが慎重に踏みしめてきたルートは全面が厚い氷に覆われていた。"
translation = "우리들이 신중하게 밟아왔던 루트는 전면이 두꺼운 얼음으로 뒤덮여 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……まずいな。これ以外の道を引き返そうにも、他の弊害が──）"
translation = "（……위험하군. 이것 외의 길로 되돌아가려 해도, 다른 폐해가──）"

[[dialogue]]
speaker = "unk"
original = "一瞬、目の前が暗くなる──が。しかし、"
translation = "순간, 눈앞이 어두워진다── 하지만."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「──待たせたな、生徒諸君。怪我はないかね」"
translation = "「──기다리게 했군, 학생 제군. 다친 곳은 없나.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ふぅっ──と！\u3000全員いるな！？」"
translation = "「후우웃──! 전원 있군!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「無事ですか、姉さん──フィオナ会長！」"
translation = "「무사하세요, 언니── 피오나 회장!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ……！」"
translation = "「소피……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ユウリに、学園長も──レゾフの方は大丈夫でしたか！？」"
translation = "「유우리에게, 학원장도── 레조프 쪽은 괜찮았습니까!?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「一匹残らず掃討してきた。後は地下に閉じこもっていれば、寒波はやり過ごせるだろう」"
translation = "「한 마리도 남김없이 소탕하고 왔다. 나머지는 지하에 틀어박혀 있으면, 한파는 넘길 수 있을 것이다.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「あ、あっさり言うニャンねえ……！」"
translation = "「아, 너무 쉽게 말하는 거냥……!」"

[[dialogue]]
speaker = "unk"
original = "<ruby>後顧<rt>こうこ</rt></ruby>の憂いは断てたが一刻を争う事態に変わりはない。"
translation = "후환은 끊었지만 일각을 다투는 사태임에는 변함이 없다."

[[dialogue]]
speaker = "unk"
original = "急速に外周が凍結していく冥森林ネメシスから、全員で生きて帰らなくては──"
translation = "급속도로 외곽이 동결되어 가는 명삼림 네메시스에서, 전원 살아서 돌아가야만 한다──"

[[dialogue]]
speaker = "unk"
original = "倒れたままの彼と、目が合うと……"
translation = "쓰러진 채인 그와, 눈이 마주치자……"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……<ruby>征<rt>ゆ</rt></ruby>け」"
translation = "「……가라.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "俺の葛藤を見透かしたように──彼は言った。"
translation = "나의 갈등을 꿰뚫어 본 것처럼── 그는 말했다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私にはもう……学園に関わる資格はない。後のことは……ラティエ、殿に……」"
translation = "「나에게는 이제…… 학원에 관여할 자격이 없다. 뒷일은…… 라티에, 전하께……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……駄目だ。あんたは消えない<ruby>咎<rt>とが</rt></ruby>を犯した。だったら、その償いを──」"
translation = "「……안 돼. 당신은 사라지지 않을 허물을 저질렀어. 그렇다면, 그 속죄를──」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「征けと言っているだろう──緋宮クロト！」"
translation = "「가라고 말하고 있지 않느냐── 히노미야 쿠로토!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ！」"
translation = "「윽!」"

[[dialogue]]
speaker = "unk"
original = "その喝破は……あらゆる理屈を貫通して、俺の骨身に響き渡った。"
translation = "그 일갈은…… 모든 이치를 관통하여, 나의 골수에 울려 퍼졌다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「人間界は……いいや、アルタイルの人間界はすでに瀬戸際にある」"
translation = "「인간계는…… 아니, 알타이르의 인간계는 이미 벼랑 끝에 있다.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ベガの世界がどんな末路を辿ったか見ただろう……この世界も早晩、あの波に呑まれる。すべてが動き出す時は近い」"
translation = "「베가 세계가 어떤 말로를 겪었는지 보았겠지…… 이 세계도 조만간, 그 파도에 삼켜진다. 모든 것이 움직이기 시작할 때는 가깝다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あなたを……置いていけと……？」"
translation = "「당신을…… 두고 가라고……?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「リクリエは……真なる魔王の力でなければ止められない。かつてのようにな。こんな老いぼれにかかずらって、手遅れになってもよいのか」"
translation = "「리크리에는…… 진정한 마왕의 힘이 아니면 막을 수 없다. 예전처럼 말이다. 이런 늙은이에게 얽매여, 때를 놓쳐도 좋은가.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「すべては筋書き通りなのだ……世界の再創生へ向けて、私のような存在が現れることも」"
translation = "「모든 것은 각본대로인 것이다…… 세계의 재창생을 향해, 나와 같은 존재가 나타나는 것도.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「そんな、抗いようもない運命に抗うというのなら……甘えた未練など捨て去る覚悟を持て！」"
translation = "「그런, 저항할 수 없는 운명에 저항하겠다고 한다면…… 나약한 미련 따위 버릴 각오를 가져라!」"

[[dialogue]]
speaker = "unk"
original = "学園長は──朽ちゆく霊力の波動でもって、俺を冷たく突き放した。"
translation = "학원장은── 썩어가는 영력의 파동으로, 나를 차갑게 밀어냈다."

[[dialogue]]
speaker = "unk"
original = "彼自身がこのまま、凍結に呑まれることを望んでいる。"
translation = "그 자신은 이대로, 동결에 삼켜지기를 바라고 있다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト、早く──！\u3000ユウリの星術でも持ちこたえられないわよ！」"
translation = "「쿠로토, 빨리──! 유우리의 성술로도 버틸 수 없을 거야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……ああ！\u3000すぐに行く──！」"
translation = "「윽…… 아아! 바로 갈게──!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「さらばだ……教え子よ。私のように……道を踏み外さぬようにな」"
translation = "「잘 가라…… 제자여. 나처럼…… 길을 잘못 들지 않도록 해라.」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「マルキア……私もいつか……おまえの元に……」"
translation = "「마르키아…… 나도 언젠가…… 너의 곁으로……」"

[[dialogue]]
speaker = "unk"
original = "駆け出した冥森林の奥地から──吹雪の轟音にまぎれて、最期の教えが聞こえた。"
translation = "달려 나간 명삼림의 안쪽에서── 눈보라의 굉음에 섞여, 최후의 가르침이 들려왔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（さようなら──セイファート学園長。俺の憧れた男）"
translation = "（잘 가요── 세이퍼트 학원장. 내가 동경했던 남자.）"

[[dialogue]]
speaker = "unk"
original = "──あなたのことは忘れない。"
translation = "──당신을 잊지 않겠다."

[[dialogue]]
speaker = "unk"
original = "星騎士として、魔王として。"
translation = "성기사로서, 마왕으로서."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトは……これからの人生を通じて、かつてのあなたが抱いた意志を最後まで受け継がせてもらう。"
translation = "히노미야 쿠로토는…… 앞으로의 인생을 통해, 예전의 당신이 품었던 의지를 끝까지 계승하겠다."

