[[dialogue]]
speaker = "unk"
original = "監視という名目の下、ヒヨと一緒に過ごすことが多くなった。"
translation = "감시라는 명목하에 히요와 함께 보내는 시간이 많아졌다."

[[dialogue]]
speaker = "unk"
original = "始めは警戒されていたが、次第に心を開いてくれ、遂に恋人同士になった。"
translation = "처음에는 경계받았지만, 점차 마음을 열어주어 마침내 연인 사이가 되었다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「これでしめぇだ！\u3000爆輝星壊拳！」"
translation = "「이걸로 끝이다! 폭휘성괴권!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～～……」"
translation = "「이～～……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふん、今日のモンスターも大したことなかったな！」"
translation = "「흥, 오늘의 몬스터도 별거 아니었군!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「って、そうじゃないな……これも会長サンが隣にいてくれるおかげだな」"
translation = "「아니, 그게 아니지…… 이것도 회장님이 곁에 있어 주는 덕분이다」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「その……好きな人がいてくれるだけで、自然と力が溢れるってもんでい……」"
translation = "「그게…… 좋아하는 사람이 곁에 있는 것만으로 자연스레 힘이 솟는 법이니까……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「って、何をニヤニヤしてやがんでいっ！\u3000好きって言ったら悪いのかよ！」"
translation = "「아니, 뭘 싱글벙글 웃고 있는 거야! 좋아한다고 말하면 안 되냐!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「全く、いじわるな彼氏だぜ……でもまあ、会長サンが喜んでくれるならあたしも悪い気はしねぇな」"
translation = "「정말이지 심술궂은 남자친구로구먼…… 하지만 뭐, 회장님이 기뻐한다면 나도 나쁜 기분은 아니야」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……ところで会長サン。今日であたしたちが恋人になって１ヶ月が経つんだけどよ……」"
translation = "「……그런데 회장님. 오늘로 우리가 연인이 된 지 한 달이 지났는데 말이야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだな、もちろん覚えてるよ」"
translation = "「그래, 물론 기억하고 있어」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「まあ、それは心配してなかったんだが……せっかくの記念日だ、ちょいと特別なコトをしたくはないかい？」"
translation = "「뭐, 그건 걱정하지 않았지만…… 모처럼의 기념일이다, 조금 특별한 걸 하고 싶진 않나?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「実はあたしの神社は神様の前で契りを結ぶのが、しきたりなんだが……」"
translation = "「사실 우리 신사는 신령님 앞에서 계약을 맺는 것이 관례인데……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ち、契りっていうのは……恋人同士でしかできない……アレのことでさぁ……」"
translation = "「계, 계약이라는 건…… 연인끼리만 할 수 있는…… 그거 말이야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もしかして、神様の前でセックスを！？」"
translation = "「혹시 신령님 앞에서 섹스를!?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そ、そそそそんな直球で言うんじゃねぇ！」"
translation = "「그, 그그그그렇게 직구로 말하지 마!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……それで、会長サンはどうなんでい……あたしと、その……エッチを……」"
translation = "「……그래서 회장님은 어떠냐…… 나와, 그…… 엣찌를……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「！？\u3000急に抱きつかれたら、うぅっ……照れるぜい……<emoji=heart04>」"
translation = "「!? 갑자기 안기니까, 으으…… 쑥스럽구먼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁ……会長サン、すっかりやる気になってくれたみたいだな……」"
translation = "「하아…… 회장님, 완전히 의욕이 생겨버린 모양이네……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「すぅはぁ……会長サンあたしを、一人前の女にしてくれぇ……」"
translation = "「흡, 하…… 회장님, 나를 한 명의 여자로 만들어 줘……」"

[[dialogue]]
speaker = "unk"
original = "そうして変身も解かず、手をつなぎながらヒヨの神社へ向かい──"
translation = "그렇게 변신도 풀지 않은 채 손을 잡고 히요의 신사로 향해──"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁ、はぁ……本当に、エッチするんだな……<emoji=heart04>」"
translation = "「하아, 하아…… 정말로 엣찌 하는 거구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "神社の拝殿の中に着くなり、ヒヨを押し倒した。"
translation = "신사의 배전 안에 도착하자마자 히요를 밀어트렸다."

[[dialogue]]
speaker = "unk"
original = "巫女服は完全にはだけていて、大きなおっぱいが目を引く。"
translation = "무녀복은 완전히 흐트러져 있었고, 커다란 가슴이 눈길을 끈다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あんたの目、獣みたいにギラギラしてらぁ……そんなにあたしの乳がいいのかい……？」"
translation = "「너의 눈, 짐승처럼 번들거리고 있네…… 그렇게 내 가슴이 좋으냐……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「当たり前だよ。興奮しすぎて、もう射精しそうなくらいだ」"
translation = "「당연하지. 너무 흥분해서 벌써 사정할 것 같을 정도야」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「それはまだ早いぜ……ちゃんとあたしと繋がって、中にたっぷり注いでほしいんでい……<emoji=heart04>」"
translation = "「그건 아직 이르다고…… 제대로 나와 이어져서 안에 듬뿍 쏟아주길 바란다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大好きな恋人に中出しを懇願されて、ペニスがますます大きくなる。"
translation = "사랑하는 연인에게 질내사정을 간청받아 페니스가 점점 더 커진다."

[[dialogue]]
speaker = "unk"
original = "こんなのもう気持ちを抑えきれない。"
translation = "이런 건 이제 감정을 억누를 수 없다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「もう我慢出来ないって顔してる……いいんだぜ、もうおち○ちん入れちまっても……<emoji=heart04>」"
translation = "「벌써 못 참겠다는 얼굴이네…… 괜찮아, 이제 자지 넣어버려도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしはもう、とっくの前に準備できてらぁ……<emoji=heart04>\u3000あんたと繋がるって想像した時から、ずっと……<emoji=heart04>」"
translation = "「나는 이미 진작에 준비 끝났다고……<emoji=heart04> 너와 이어진다고 상상했을 때부터 줄곧……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒヨの言葉通り、ヒヨのおま○こは一目で分かるほど濡れそぼっていて、いやらしい香りを漂わせていた。"
translation = "히요의 말대로 히요의 보지는 한눈에 알 수 있을 정도로 흠뻑 젖어 있었고, 야릇한 향기를 풍기고 있었다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「お、おま○こ……そんなに見られたら、照れるでい……<emoji=heart04>」"
translation = "「보, 보지…… 그렇게 쳐다보면 부끄럽잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、でも見せてくれ。大好きな恋人の大切なところから」"
translation = "「미안, 그래도 보여줘. 사랑하는 연인의 소중한 곳이니까」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「そ、そんな風に言われたら、断れねぇでい……<emoji=heart04>\u3000うぅ……恥ずかしいが、気が済むまで……おま○こ、見てくれ……<emoji=heart04>」"
translation = "「그, 그렇게 말하면 거절할 수 없잖아……<emoji=heart04> 으으…… 부끄럽지만 마음이 풀릴 때까지…… 보지, 봐줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒヨの健気な想いに胸が熱くなると同時に、早く繋がりたい気持ちが一層強まる。"
translation = "히요의 기특한 마음에 가슴이 뜨거워지는 동시에 빨리 이어지고 싶은 마음이 한층 강해진다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたし、もう我慢できねぇ……<emoji=heart04>\u3000早く、あんたとひとつになりたい……<emoji=heart04>」"
translation = "「나, 이제 못 참겠어……<emoji=heart04> 빨리 너와 하나가 되고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ、ああああっ……あああああああああああああああうぅ……<emoji=heart04>」"
translation = "「아, 아아아앗…… 아아아아아아아아아아아아아아아우으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒヨの言葉に背中を押されて、ペニスを小さいおま○この入口へと押し込む。"
translation = "히요의 말에 힘을 얻어, 자지를 좁은 보지의 입구로 밀어 넣는다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んんんんんんんっ……<emoji=heart04>\u3000おち○ちんが、あたしの中にっ……<emoji=heart04>」"
translation = "「응응응응응응……<emoji=heart04> 자지가, 내 안에……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まだ先っぽしか入ってないのに、きゅうきゅうと亀頭が締め付けられ、快楽の波に翻弄される。"
translation = "아직 끝부분밖에 들어가지 않았는데도, 꽉꽉 귀두가 죄여오며 쾌락의 파도에 농락당한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒヨ……痛くはないか？」"
translation = "「히요…… 아프지는 않아?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「このくれいは大丈夫でい……<emoji=heart04>\u3000それよりも、もっと進めてくれぇ……<emoji=heart04>」"
translation = "「이 정도는 괜찮구먼……<emoji=heart04> 그것보다, 더 진행해 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒヨの言葉に促され、少しずつ、ゆっくりと挿入を深める。"
translation = "히요의 말에 재촉받아, 조금씩, 천천히 삽입을 깊게 한다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はっ、はうっ……<emoji=heart04>\u3000んん、んんんっ……んあああぁっ<emoji=heart04>\u3000あああああああぁあぁっ<emoji=heart04>」"
translation = "「하앗, 하윽……<emoji=heart04> 응, 응응읏…… 응아아아앗<emoji=heart04> 아아아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すると、柔らかく弾力のある処女膜にペニスが阻まれた。"
translation = "그러자, 부드럽고 탄력 있는 처녀막에 자지가 가로막혔다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁはぁ……<emoji=heart04>\u3000一思いに、やってくれい……<emoji=heart04>\u3000あたしを、あんたの女にしてくれ……<emoji=heart04>」"
translation = "「하아 하아……<emoji=heart04> 단숨에, 해버려……<emoji=heart04> 나를, 너의 여자로 만들어 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒヨの手を握り直し、グッと腰に力を入れて──"
translation = "히요의 손을 다시 고쳐 쥐고, 허리에 꾹 힘을 주어──"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んんんっ！\u3000あああああああああああぁあぁあぁあぁぁぁっ！！」"
translation = "「응응읏! 아아아아아아아아아아아아아아아아아아아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "ぷちっという感触を覚えながら、ペニスをヒヨの奥へと挿入した。"
translation = "톡 하는 감촉을 느끼며, 자지를 히요의 안쪽 깊숙이 삽입했다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁっ、はぁっ、はぁっ……<emoji=heart04>\u3000あうっ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000んんんんぅぅっ……<emoji=heart04>」"
translation = "「하앗, 하앗, 하앗……<emoji=heart04> 아우……<emoji=heart04> 응읏……<emoji=heart04> 응응응으으읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "痛みを我慢しているような顔を見て、思わず腰の動きを止めてしまった。"
translation = "통증을 참고 있는 듯한 얼굴을 보고, 나도 모르게 허리 움직임을 멈추고 말았다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁっ、はぁ……んっ……<emoji=heart04>\u3000ちょっと、痛いが……大丈夫でい……<emoji=heart04>」"
translation = "「하앗, 하아…… 응……<emoji=heart04> 조금, 아프지만…… 괜찮구먼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「痛みよりも……あんたと、ひとつになれた嬉しさの方が強いでさぁ……<emoji=heart04>」"
translation = "「아픔보다…… 너와, 하나가 되었다는 기쁨이 더 크다구……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目に涙を浮かべながらも、そう微笑んでくれる彼女に愛しさがこみ上げてくる。"
translation = "눈에 눈물을 글썽이면서도, 그렇게 미소 지어 주는 그녀에게 사랑스러움이 치밀어 오른다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ん、んんっ……<emoji=heart04>\u3000おち○ちん、ビクビク動いてるっ……<emoji=heart04>」"
translation = "「응, 응응……<emoji=heart04> 자지, 파르르 떨리고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「これ、気持ちよくなってるってことだよな……<emoji=heart04>\u3000なら、あたしの中で動いて、もっと気持ちよくなってくれぇ……<emoji=heart04>」"
translation = "「이거, 기분 좋아지고 있다는 뜻이지……<emoji=heart04> 그렇다면, 내 안에서 움직여서, 더 기분 좋아져 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でもまだ痛みがあるんじゃ……？」"
translation = "「하지만 아직 아픔이 있을 텐데……?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「痛いのも、嬉しいんでい……<emoji=heart04>\u3000はぁ、ふぅ……あんたと、ちゃんと繋がってるって証だから……<emoji=heart04>」"
translation = "「아픈 것도, 기쁘다구……<emoji=heart04> 하아, 후우…… 너와, 제대로 이어져 있다는 증거니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「だから動いてくれ……<emoji=heart04>\u3000あたしの中で、いっぱい気持ちよくなってくれぇ……<emoji=heart04>」"
translation = "「그러니까 움직여 줘……<emoji=heart04> 내 안에서, 잔뜩 기분 좋아져 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふああああっ……<emoji=heart04>\u3000ああっ、ああああっ……ああああっ<emoji=heart04>\u3000ああああああぁっ<emoji=heart04>」"
translation = "「후아아아앗……<emoji=heart04> 아앗, 아아아앗…… 아아아앗<emoji=heart04> 아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう抑えることなんて出来なかった。出来るわけがない。"
translation = "이제 억누를 수 없었다. 그럴 수 있을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "気持ちも体も、ヒヨを求めて止まない。"
translation = "마음도 몸도 히요를 원해 마지않는다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はあっ、ああああんっ<emoji=heart04>\u3000おち○ちんっ、感じるっ<emoji=heart04>\u3000いっぱい、動いてるっ<emoji=heart04>」"
translation = "「하앗, 아아아앙<emoji=heart04> 자지, 느껴져<emoji=heart04> 잔뜩, 움직이고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ、ああっ、あああんっ<emoji=heart04>\u3000あたしっ、神様の前で、エッチしちまってっ……<emoji=heart04>」"
translation = "「아, 아앗, 아아앙<emoji=heart04> 나, 신령님 앞에서, 섹스해버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んんんっ……んんんんんぅっ<emoji=heart04>\u3000おま○こっ、ジンジンするっ<emoji=heart04>\u3000身体が、熱いっ<emoji=heart04>\u3000熱くなっちまってるっ<emoji=heart04>」"
translation = "「응응읏…… 응응응응으읏<emoji=heart04> 보지, 징징거려<emoji=heart04> 몸이, 뜨거워<emoji=heart04> 뜨거워져 버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "段々と気持ちよさそうな顔になっていくヒヨを見て、嬉しさがこみ上げてくる。"
translation = "점점 기분 좋은 표정으로 변해가는 히요를 보며, 기쁨이 솟구친다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ、ああっ……<emoji=heart04>\u3000気持ちよく、なってる……<emoji=heart04>\u3000あんたのおち○ちんで、あたしっ……<emoji=heart04>」"
translation = "「아, 아앗……<emoji=heart04> 기분 좋아, 지고 있어……<emoji=heart04> 너의 자지로, 나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あのヒヨが蕩けた顔で喘いでるだけで、血管がはち切れそうなくらい興奮してしまう。"
translation = "그 히요가 넋이 나간 얼굴로 신음하는 것만으로도, 혈관이 터질 정도로 흥분된다."

[[dialogue]]
speaker = "unk"
original = "それでいて小さいおま○こが、きゅうきゅうペニスを締め付けてきて、気持ちよさで狂いそうになる。"
translation = "그러면서도 작은 보지가 꽉꽉 자지를 죄어와서, 쾌락에 미칠 것만 같다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あんたも、気持ちよく、んっ……なってくれてるんだなっ……<emoji=heart04>\u3000嬉しいぜい……<emoji=heart04>」"
translation = "「너도, 기분 좋게, 응…… 되어주고 있구나……<emoji=heart04> 기쁘구먼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「当たり前だ。大好きな女の子とひとつになれて、気持ちよくないわけがない」"
translation = "「당연하지. 사랑하는 여자아이와 하나가 되었는데, 기분 좋지 않을 리가 없잖아」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしもっ、同じだ……<emoji=heart04>\u3000初めてのエッチなのに……んっ……大好きなあんたに抱かれて、もうっ……<emoji=heart04>」"
translation = "「나도, 마찬가지다……<emoji=heart04> 첫 섹스인데…… 응…… 사랑하는 너에게 안겨서, 벌써……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あああああぅっ<emoji=heart04>\u3000神様の前だっていうのにっ……<emoji=heart04>\u3000はぁ、あっ……おま○こ気持ちいいっ……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앙<emoji=heart04> 아아아아아우<emoji=heart04> 신령님 앞인데도……<emoji=heart04> 하아, 앗…… 보지 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ、あああっ、あああんっ<emoji=heart04>\u3000もっと……もっと、おち○ちんっ……<emoji=heart04>\u3000おち○ちん動いてっ……<emoji=heart04>\u3000動かしてくれえっ<emoji=heart04>」"
translation = "「아, 아아앗, 아아앙<emoji=heart04> 더…… 더, 자지……<emoji=heart04> 자지 움직여서……<emoji=heart04> 움직여 줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ、ああっ、あああああぁぁぁっ<emoji=heart04>\u3000はぁあっ、あっ<emoji=heart04>\u3000おち○ちんっ、おち○ちんずんずんされてるぅっ<emoji=heart04>」"
translation = "「아, 아앗, 아아아아아아아앗<emoji=heart04> 하아앗, 앗<emoji=heart04> 자지, 자지가 푹푹 찔러오고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒヨの想いに応えるため、ペニスを思いきり抜き差ししていく。"
translation = "히요의 마음에 보답하기 위해, 자지를 힘껏 넣었다 뺐다 반복한다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ああああんっ<emoji=heart04>\u3000んっ──んんんぅ──んあああぁ～～っ<emoji=heart04>\u3000気持ちいいのっ、止まんねえっ<emoji=heart04>」"
translation = "「아아아앙<emoji=heart04> 응── 응응응으── 응아아아아~~앗<emoji=heart04> 기분 좋은 게, 멈추지 않아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふあっ──あああんっ<emoji=heart04>\u3000いいんでいっ<emoji=heart04>\u3000もっと……あたしで、気持ちよくなってくれぇっ<emoji=heart04>」"
translation = "「후앗── 아아앙<emoji=heart04> 괜찮구먼<emoji=heart04> 더…… 나로, 기분 좋아져 줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あああああああっ<emoji=heart04>\u3000んんんんっ──んん～～～～っ<emoji=heart04>\u3000おち○ちんっ、すごいぃっ<emoji=heart04>」"
translation = "「아아아아아아앗<emoji=heart04> 응응응응── 응으~~~~읏<emoji=heart04> 자지, 굉장해에<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「気持ちっ、よすぎるぅっ……<emoji=heart04>\u3000あああああんっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000おち○ちんに夢中に、なっちまうぅっ<emoji=heart04>」"
translation = "「기분, 너무 좋아아……<emoji=heart04> 아아아아앙<emoji=heart04> 하아앗<emoji=heart04> 자지에 정신이 팔려버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分が気持ちよくなりたい以上に、ヒヨのことを気持ちよくさせたい……！"
translation = "내가 기분 좋아지고 싶은 이상으로, 히요를 기분 좋게 해주고 싶다……!"

[[dialogue]]
speaker = "unk"
original = "そんな想いに駆られて、子宮を重点的に叩く。"
translation = "그런 생각에 사로잡혀 자궁을 중점적으로 때린다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んあああっ──ああああああああああっ<emoji=heart04>\u3000奥っ、突かれてるっ……<emoji=heart04>\u3000子宮っ、突かれちゃってるぅっ<emoji=heart04>」"
translation = "「응아아앗── 아아아아아아아아앗<emoji=heart04> 안쪽, 찔리고 있어……<emoji=heart04> 자궁, 찔려버리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふああああああああっ<emoji=heart04>\u3000こんなのっ<emoji=heart04>\u3000ダメになるっ<emoji=heart04>\u3000エッチで、ダメになるぅっ<emoji=heart04>\u3000んっ、んんんんんぅぅ<emoji=heart04>」"
translation = "「후아아아아아아앗<emoji=heart04> 이런 거<emoji=heart04> 이상해져버려<emoji=heart04> 섹스로, 이상해져버려어<emoji=heart04> 응, 응응응응으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ──ああっ──ああああああああ～っ<emoji=heart04>\u3000んんんっ……<emoji=heart04>\u3000子宮っ、おかしくなるぅっ<emoji=heart04>\u3000おかしくなっちまうぅ<emoji=heart04>」"
translation = "「아── 아앗── 아아아아아아아아~앗<emoji=heart04> 응응읏……<emoji=heart04> 자궁, 이상해져어<emoji=heart04> 이상해져 버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒヨの最奥を突く度に、ぐちゅぐちゅと卑猥な音が響き、大きく柔らかいおっぱいが揺れる。"
translation = "히요의 가장 깊은 곳을 찌를 때마다 찌걱찌걱 비릿한 소리가 울리고, 크고 부드러운 가슴이 흔들린다."

[[dialogue]]
speaker = "unk"
original = "同時におま○このうねりが強烈になり、射精感をますます高めてくる。"
translation = "동시에 보지의 꿈틀거림이 강렬해지며, 사정감을 점점 더 높여온다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁっ<emoji=heart04>\u3000ああああああんっ<emoji=heart04>\u3000おち○ちんっ、ビクビクしてるぅっ<emoji=heart04>\u3000ひゃああああああうっ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 아아아아아앙<emoji=heart04> 자지, 파르르 떨고 있어어<emoji=heart04> 히야아아아아아아우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ああああああぁぁぁっ<emoji=heart04>\u3000だ、出して、いいんだぜっ……<emoji=heart04>\u3000あたしの腹ん中にっ、せーしっ<emoji=heart04>」"
translation = "「아아아아아아아아앗<emoji=heart04> 내, 내도 괜찮아……<emoji=heart04> 내 배 속에, 정액……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んんんんんっ～<emoji=heart04>\u3000いっぱいっ、出してくれぇ<emoji=heart04>\u3000んんっ、はぁっ……溢れちまうくらいっ、いっぱいっ<emoji=heart04>」"
translation = "「응응응응응~<emoji=heart04> 잔뜩, 내보내 줘어<emoji=heart04> 응읏, 하앗…… 넘쳐흐를 정도로, 잔뜩……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ひゃああああぁぁぁ<emoji=heart04>\u3000あ、あああっ<emoji=heart04>\u3000ああああうっ<emoji=heart04>\u3000あっ、はっ──ああああああああっ<emoji=heart04>」"
translation = "「히야아아아아아아<emoji=heart04> 아, 아아앗<emoji=heart04> 아아아아우<emoji=heart04> 앗, 핫── 아아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ひゃあああああああんっ<emoji=heart04>\u3000もっと、もっとくれぇ<emoji=heart04>\u3000おち○ちんっ、もっとぉ<emoji=heart04>\u3000もっとぉっ<emoji=heart04>」"
translation = "「히야아아아아아아앙<emoji=heart04> 더, 더 줘어<emoji=heart04> 자지, 더어<emoji=heart04> 더어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ふあぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んあああああぁぁぁっ<emoji=heart04>\u3000あたしもっ、イクっ<emoji=heart04>\u3000イッちまうぅ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 아아앗<emoji=heart04> 응아아아아아아아아앗<emoji=heart04> 나도, 가아<emoji=heart04> 가버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "更に熱っぽくうねる膣内と、ヒヨの今まで聞いたことのないような嬌声で、目の前がくらくらしてくる。"
translation = "더욱 뜨겁게 요동치는 질 안과, 히요의 지금까지 들어본 적 없는 교성에 눈앞이 아찔해진다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あっ、ああああああああっ<emoji=heart04>\u3000おち○ちんでイクっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000おま○こズポズポされてイッちゃうっ……<emoji=heart04>」"
translation = "「앗, 아아아아아아아아앗<emoji=heart04> 자지로 가버려어<emoji=heart04> 앗, 앙<emoji=heart04> 보지 쑤셔져서 가버려엇……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んんっ<emoji=heart04>\u3000んあああああああっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000大好きっ<emoji=heart04>\u3000あんたもっ、おち○ちんもっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 응아아아아아아아앗<emoji=heart04> 좋아<emoji=heart04> 정말 좋아<emoji=heart04> 너도, 자지도<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あああああああっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000大好きだからっ<emoji=heart04>\u3000いっぱいっ<emoji=heart04>\u3000いっぱい、せーしくれぇっ<emoji=heart04>」"
translation = "「아아아아아아아앗<emoji=heart04> 좋아<emoji=heart04> 정말 좋아하니까<emoji=heart04> 잔뜩<emoji=heart04> 잔뜩, 정액 줘어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んんんんんんぅっ<emoji=heart04>\u3000ふあああぁぁあんっ<emoji=heart04>\u3000出してぇっ<emoji=heart04>\u3000せーしっ、いっぱい出してぇ<emoji=heart04>」"
translation = "「응응응응응응으읏<emoji=heart04> 후아아아아아앙<emoji=heart04> 내보내 줘어<emoji=heart04> 정액, 잔뜩 내보내 줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はっ、はっ──ああああんっ<emoji=heart04>\u3000子宮っ、また子宮グリグリされてるぅっ<emoji=heart04>」"
translation = "「핫, 핫── 아아아앙<emoji=heart04> 자궁, 또 자궁 문질러지고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あ、あああっ──ああああああっ<emoji=heart04>\u3000ダメっ、ダメダメっ<emoji=heart04>\u3000子宮でイクっ<emoji=heart04>\u3000子宮グリグリされてイッちまうぅ<emoji=heart04>」"
translation = "「아, 아아앗── 아아아아아앗<emoji=heart04> 안 돼, 안 돼안 돼<emoji=heart04> 자궁으로 가버려어<emoji=heart04> 자궁 문질러져서 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「ああああっ──ふぁあああああああああ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000で、出てるぅ……<emoji=heart04>\u3000熱いの、いっぱい……<emoji=heart04>」"
translation = "「아아아앗── 후아아아아아아아아아아~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 나, 나오고 있어……<emoji=heart04> 뜨거운 거, 잔뜩……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁぁっ、ふあっ……ああんっ<emoji=heart04>\u3000はぁはぁ……<emoji=heart04>\u3000おち○ちんっ、ビクビクって……<emoji=heart04>」"
translation = "「하아앗, 후앗…… 아앙<emoji=heart04> 하아 하아……<emoji=heart04> 자지, 파르르 하고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱くキツい膣内が収束し、精液を最後まで搾り取ろうとしてくる。"
translation = "뜨겁고 조이는 질 내부가 수축하며 정액을 끝까지 짜내려 한다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁ～っ<emoji=heart04>\u3000あ、ああああっ……ああああ……<emoji=heart04>\u3000まだ、出てる……<emoji=heart04>\u3000子宮の中、いっぱいになるぅ……<emoji=heart04>」"
translation = "「하아~앗<emoji=heart04> 아, 아아아앗…… 아아아아……<emoji=heart04> 아직, 나오고 있어……<emoji=heart04> 자궁 속, 가득 차버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁ……はぁ……<emoji=heart04>\u3000あんっ、んんんっ……<emoji=heart04>\u3000んくっ……<emoji=heart04>\u3000お腹の中、あったかい……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 앙, 응응읏……<emoji=heart04> 응윽……<emoji=heart04> 배 속, 따뜻해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「んんっ……<emoji=heart04>\u3000んんんんっ……<emoji=heart04>\u3000おち○ちん、抜けたぁ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 응응응응읏……<emoji=heart04> 자지, 빠졌다아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを引き抜いた反動で、白く濁った精液が中から大量に溢れてくる。"
translation = "자지를 뽑아낸 반동으로 하얗게 탁한 정액이 안에서 대량으로 넘쳐흐른다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「はぁ、はぁ……<emoji=heart04>\u3000最後まで、出してくれて、ありがとよ……<emoji=heart04>」"
translation = "「하아, 하아……<emoji=heart04> 마지막까지 내보내 줘서 고맙구먼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「もう、大満足だぜぃ……<emoji=heart04>\u3000神様も、きっと見届けてくれたはずでい……<emoji=heart04>」"
translation = "「이제 정말 대만족이라구……<emoji=heart04> 신령님도 분명 지켜봐 주셨을 것이여……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう、ヒヨ」"
translation = "「고마워, 히요.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「お互い様ってことよ……あたしも、初めてのエッチで、あんなに乱れちまったし……<emoji=heart04>」"
translation = "「서로 마찬가지라는 것이여…… 나도 첫 섹스에서 그렇게 흐트러져버렸고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エッチなヒヨも可愛いかったよ」"
translation = "「야한 히요도 귀여웠어.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「またそうやって、あたしのことを照れさせようとしてくる……<emoji=heart04>\u3000だけどそうやって、ハッキリ言ってくれるところ……好きだぜい<emoji=heart04>」"
translation = "「또 그렇게 나를 부끄럽게 만들려고……<emoji=heart04> 하지만 그렇게 확실하게 말해주는 점…… 좋다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「えへへ、たまには悪くないな……こうやってイチャつくのも……<emoji=heart04>」"
translation = "「에헤헤, 가끔은 나쁘지 않네…… 이렇게 꽁냥거리는 것도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あんたとひとつになることができて、本当によかった……<emoji=heart04>\u3000最高に幸せだぜい……<emoji=heart04>」"
translation = "「너와 하나가 될 수 있어서 정말 다행이야…… 최고로 행복하다구……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……あたしは神様に誓って、あんたのこと、ずっとずっと好きでいるぜい……<emoji=heart04>」"
translation = "「……나는 신령님께 맹세코, 너를 계속 계속 좋아할 것이여……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「だからあんたも、あたしのことをずっと好きでいてくれよなっ<emoji=heart04>」"
translation = "「그러니까 너도 나를 계속 좋아해 줘야 한다구<emoji=heart04>」"

