[[dialogue]]
speaker = "unk"
original = "第４話,それぞれの世界へ,P"
translation = "제4화, 각자의 세계로, P"

[[dialogue]]
speaker = "unk"
original = "トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。"
translation = "트레지안나로부터 연락을 받고, 이로하, 카오리, 코코아 세 사람은 시부야로 향한다."

[[dialogue]]
speaker = "unk"
original = "そこは彼女たちが、異世界より最初にたどり着いた場所だった。"
translation = "그곳은 그녀들이, 이세계로부터 처음 당도했던 장소였다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「──戻って来たようです！」"
translation = "「──돌아온 모양이에요!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナがそう発した直後、目の前の空間が歪んだ。"
translation = "트레지안나가 그렇게 말한 직후, 눈앞의 공간이 왜곡되었다."

[[dialogue]]
speaker = "unk"
original = "そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。"
translation = "그리고 다음 순간, 옴니스를 껴안은, 이로하 일행이 잘 아는 아키사의 모습이 나타났다."

[[dialogue]]
speaker = "陽彩"
original = "「ごめん、みんな……心配をかけた」"
translation = "「미안, 얘들아…… 걱정 끼쳤어」"

[[dialogue]]
speaker = "unk"
original = "陽彩は寄生していた悪魔から、無事に解放された。"
translation = "아키사는 기생하고 있던 악마로부터, 무사히 해방되었다."

[[dialogue]]
speaker = "unk"
original = "事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。"
translation = "사건의 전말을 아키사의 입을 통해 들은 뒤, 드디어 이로하 일행은 원래 세계로 돌아가게 되었다."

[[dialogue]]
speaker = "花織"
original = "「いろは、帰りの準備はちゃんと出来てる？\u3000忘れ物してても取りには戻れないんだからね？」"
translation = "「이로하, 돌아갈 준비는 제대로 됐어? 물건을 두고 가도 가지러 돌아올 순 없으니까 말이야?」"

[[dialogue]]
speaker = "いろは"
original = "「大丈夫だって。カオリンこそ忘れ物はない？」"
translation = "「괜찮다니까. 카오린이야말로 잊은 물건은 없어?」"

[[dialogue]]
speaker = "花織"
original = "「もちろん！\u3000ルカルカちゃんのトレカもちゃんと持ってるよ！」"
translation = "「물론이지! 루카루카짱의 트레카도 제대로 챙겼다구!」"

[[dialogue]]
speaker = "ここあ"
original = "「でも世界を転移した時に無くなっちゃうかもしれないんだから、覚悟はちゃーんとしとかないと」"
translation = "「하지만 세계를 전이할 때 없어져 버릴지도 모르니까, 각오는 저어언혀 해두지 않으면 안 돼」"

[[dialogue]]
speaker = "花織"
original = "「悲しいけど、その時は潔く諦めます……」"
translation = "「슬프지만, 그때는 깨끗이 포기할게요……」"

[[dialogue]]
speaker = "サチ"
original = "「花織さん、短い間でしたけど、一緒に過ごせて楽しかったです」"
translation = "「카오리 씨, 짧은 시간이었지만 함께 지낼 수 있어서 즐거웠어요」"

[[dialogue]]
speaker = "花織"
original = "「ありがとう、サチちゃん。ウチもだよ！」"
translation = "「고마워, 사치짱. 나도야!」"

[[dialogue]]
speaker = "オムニス"
original = "「みんながお世話になったみたいで、ありがとう」"
translation = "「모두가 신세를 진 것 같네, 고마워」"

[[dialogue]]
speaker = "サチ"
original = "「どういたしまして。花織さんもこれでようやく安心できますね」"
translation = "「천만에요. 카오리 씨도 이걸로 드디어 안심할 수 있겠네요」"

[[dialogue]]
speaker = "花織"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "サチ"
original = "「オムニスさんと離れ離れになって、ずいぶんと不安そうにされていましたから」"
translation = "「옴니스 씨와 떨어지게 되어서, 꽤 불안해하셨으니까요」"

[[dialogue]]
speaker = "オムニス"
original = "「そうなのか？\u3000心配かけて悪かったな」"
translation = "「그랬던 건가? 걱정 끼쳐서 미안하군」"

[[dialogue]]
speaker = "花織"
original = "「いやいや！\u3000心配なんてしてなかったし！」"
translation = "「아니 아니! 걱정 같은 건 안 했다니까!」"

[[dialogue]]
speaker = "花織"
original = "「こっちの世界でもサチちゃんや、他にもいっぱい友達が出来て、全然寂しくなんかなかったんだからっ」"
translation = "「이쪽 세계에서도 사치짱이나, 그 외에도 친구가 잔뜩 생겨서, 전혀 외롭거나 하지 않았거든」"

[[dialogue]]
speaker = "プリムラ"
original = "「なんじゃ、素直じゃないのう」"
translation = "「허허, 솔직하지 못하구먼」"

[[dialogue]]
speaker = "ここあ"
original = "「繊細な乙女心ってやつかな～♪\u3000オムにゃん、ちゃんと察してあげてね～」"
translation = "「섬세한 소녀의 마음이라는 걸까나~♪ 옴냥, 제대로 헤아려 주라구~」"

[[dialogue]]
speaker = "オムニス"
original = "「え？\u3000察するって、何を……」"
translation = "「에? 헤아리다니, 무엇을……」"

[[dialogue]]
speaker = "花織"
original = "「そんなんじゃありませんってば！」"
translation = "「그런 거 아니라니까요!」"

[[dialogue]]
speaker = "いろは"
original = "「大丈夫だよ！\u3000今日からまたオムオムと一緒だし、寂しくないって！」"
translation = "「괜찮아! 오늘부터 다시 옴옴이랑 함께니까, 외롭지 않다구!」"

[[dialogue]]
speaker = "いろは"
original = "「欲を言えば、オムオムにもこっちの世界を楽しんで欲しかったな～」"
translation = "「욕심을 부리자면, 옴옴도 이쪽 세계를 즐겨줬으면 좋았을 텐데~」"

[[dialogue]]
speaker = "花織"
original = "「それは本当にそうだね」"
translation = "「그건 정말 그렇네」"

[[dialogue]]
speaker = "花織"
original = "「ウチらの居た世界とよく似てるけど、ちょっとずつ色んなところが違ってる世界」"
translation = "「우리가 있던 세계와 많이 닮았지만, 조금씩 여러 곳이 다른 세계」"

[[dialogue]]
speaker = "花織"
original = "「みんなウチらに本当に良くしてくれて……あはは、これでお別れだって思うと、ちょっと寂しいかも」"
translation = "「모두 우리에게 정말 잘해줘서…… 아하하, 이걸로 작별이라고 생각하니 조금 쓸쓸할지도」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「まあまあ、一度来ることが出来たのですから、二度目もあるかもしれませんし」"
translation = "「자자, 한 번 올 수 있었으니 두 번째도 있을지 모르니까요」"

[[dialogue]]
speaker = "シズハ"
original = "「その時にはオムニスさんも一緒に遊びましょう♪」"
translation = "「그때는 옴니스 씨도 같이 놀아요♪」"

[[dialogue]]
speaker = "オムニス"
original = "「ああ、よろしく頼む」"
translation = "「아아, 잘 부탁하지」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ではそろそろ始めましょう。みなさん心の準備はよろしいですか？」"
translation = "「그럼 슬슬 시작하죠. 여러분 마음의 준비는 되셨나요?」"

[[dialogue]]
speaker = "花織"
original = "「うん、大丈夫」"
translation = "「응, 괜찮아」"

[[dialogue]]
speaker = "いろは"
original = "「いつでもお願いしまーす♪」"
translation = "「언제든 부탁해ー요♪」"

[[dialogue]]
speaker = "サチ"
original = "「悪魔との戦い、大変なことが待ち受けていると思いますが、頑張ってくださいね」"
translation = "「악마와의 싸움, 힘든 일이 기다리고 있겠지만 힘내세요」"

[[dialogue]]
speaker = "サチ"
original = "「必ず生き残って、また会いましょう！」"
translation = "「반드시 살아남아서 다시 만나요!」"

[[dialogue]]
speaker = "花織"
original = "「ありがとう！\u3000ウチ、頑張るから！」"
translation = "「고마워! 나, 열심히 할게!」"

[[dialogue]]
speaker = "花織"
original = "「みんなで力を合わせて世界を守ってみせる。だから、サチちゃんたちも頑張って世界を守ってね！」"
translation = "「다 같이 힘을 합쳐서 세계를 지켜낼 거야. 그러니까 사치 짱 일행도 힘내서 세계를 지켜줘!」"

[[dialogue]]
speaker = "サチ"
original = "「はいっ！」"
translation = "「네!」"

[[dialogue]]
speaker = "オムニス"
original = "「ではトレジアンナさん、お願いします」"
translation = "「그럼 트레지안나 씨, 부탁합니다」"

[[dialogue]]
speaker = "unk"
original = "──こうして、突然始まった花織たちの異世界生活は幕を閉じた。"
translation = "──이렇게 해서, 갑작스럽게 시작된 카오리 일행의 이세계 생활은 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "再び、魔法少女たちがまみえる可能性は限りなく低い。"
translation = "다시 마법 소녀들이 마주할 가능성은 한없이 낮다."

[[dialogue]]
speaker = "unk"
original = "だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。"
translation = "하지만 제로가 아닌 그 가능성을 믿으며, 두 세계의 마법 소녀들은 각자 앞에 가로놓인 시련을 향해 도전해 나가는 것이었다."

