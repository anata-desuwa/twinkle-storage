[[dialogue]]
speaker = "unk"
original = "第３話,メルエルとサチ,P"
translation = "제3화, 메르엘과 사치, P"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ！\u3000お兄さん、こんにちは」"
translation = "「앗! 오빠, 안녕하세요」"

[[dialogue]]
speaker = "unk"
original = "放課後、飲み物を買いに来たカフェテリアで声をかけられて振り返ると、そこにいたのは流星学園附属校生徒会長の『<ruby>白詰<rt>しろつめ</rt></ruby>サチ』だった。"
translation = "방과 후, 음료를 사러 온 카페테리아에서 목소리가 들려 돌아보니, 그곳에 있었던 것은 유성학원 부속교 학생회장인 『시로츠메 사치』였다."

[[dialogue]]
speaker = "unk"
original = "こんにちは。サチ、最近調子はどう？"
translation = "안녕. 사치, 요즘 컨디션은 어때?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい。お兄さんに負けないように、生徒会長としての業務も、星騎士としての訓練も頑張ってますよ♪」"
translation = "「네. 오빠에게 지지 않도록, 학생회장으로서의 업무도, 성기사로서의 훈련도 열심히 하고 있어요♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あと、回収の方も。前に話した、お兄さんが不在の時に出現したロストアイテムの一件以降は、大きな騒動もなくて……」"
translation = "「그리고, 회수 쪽도요. 전에 말씀드린, 오빠가 부재중일 때 출현했던 로스트 아이템 건 이후로는, 큰 소동도 없어서……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「じ～っ……」"
translation = "「지이익……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「って、な、なんか強い視線を感じます……！」"
translation = "「그나저나, 뭐, 뭔가 강한 시선이 느껴져요……!」"

[[dialogue]]
speaker = "unk"
original = "メルエル、なんで隠れて見てるんだ？"
translation = "메르엘, 왜 숨어서 보고 있는 거야?"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「――こんにちは、白詰サチさん♪」"
translation = "「――안녕하세요, 시로츠메 사치 씨♪」"

[[dialogue]]
speaker = "unk"
original = "一緒に飲み物を買いにきていたメルエルが、隠れていた柱の影から出て、近くにやって来る。"
translation = "함께 음료를 사러 왔던 메르엘이, 숨어 있던 기둥 그림자에서 나와 가까이 다가온다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「は、はい、こんにちは。……ええっと、もしかして姫咲先輩、ですか？」"
translation = "「네, 네, 안녕하세요. ……에또, 혹시 히메사키 선배, 인가요?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「そう、今は『リトルフォーム』に変身して、体が小さくなってるんだ♪\u3000最近は新フォームの感覚を体に覚えさせるために、よく変身してるの」"
translation = "「응, 지금은 『리틀 폼』으로 변신해서, 몸이 작아져 있어♪ 요즘은 새로운 폼의 감각을 몸에 익히기 위해서, 자주 변신하고 있어」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それが噂に聞いたリトルフォーム……！\u3000で、でも……じ～っ……大きいんですね……」"
translation = "「이게 소문으로 듣던 리틀 폼……! 하, 하지만…… 지이익…… 크시네요……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ、いえ！\u3000失礼しました、なんでもないです……！」"
translation = "「아, 아니요! 실례했습니다, 아무것도 아니에요……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（背丈は私と同じくらい小さくなっているはずなのに、胸はトレジアンナさんみたいに大きい……！）"
translation = "（키는 나랑 비슷하게 작아졌을 텐데, 가슴은 트레지안나 씨처럼 커……！）"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えっと……私ね、会長くんが白詰さんとは面識があって、仲良くしてることは前から知ってたんだ」"
translation = "「저기…… 나 말이야, 회장군이 시로츠메 씨와는 면식이 있고, 사이좋게 지내고 있다는 건 전부터 알고 있었어」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そ、そうでしたか。私も、姫咲先輩のことはお兄さんからよく聞いていて……」"
translation = "「그, 그러셨군요. 저도 히메사키 선배에 대해서는 오빠에게 자주 들어서……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ねぇ、白詰さん！\u3000このあと、時間あったりするかな？」"
translation = "「저기, 시로츠메 씨! 이따가 시간 좀 있을까?」"

[[dialogue]]
speaker = "unk"
original = "メルエルはクロトと別れて、サチに附属校の校内を案内してもらっていた。"
translation = "메르엘은 쿠로토와 헤어져, 사치에게 부속교의 교내를 안내받고 있었다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ここが私が所属している、附属校３年の教室になります」"
translation = "「여기가 제가 소속되어 있는, 부속교 3학년 교실이 됩니다」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「わぁ～っ♪\u3000新星学園の教室とは雰囲気が違うんだね～」"
translation = "「와아~♪ 신성학원 교실과는 분위기가 다르네~」"

[[dialogue]]
speaker = "unk"
original = "メルエルはサチに案内してもらって、附属校の校舎へとやって来ていた。"
translation = "메르엘은 사치에게 안내받아, 부속교 교사로 와 있었다."

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「白詰さん、附属校を詳しく案内してくれてありがとう♪」"
translation = "「시로츠메 씨, 부속교를 자세히 안내해줘서 고마워♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いえ。私は附属校の生徒会長ですから」"
translation = "「아니에요. 저는 부속교의 학생회장이니까요」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「私、附属校には通ったことなかったから、ちょっと憧れみたいなものがあったんだ」"
translation = "「나, 부속교에는 다녀본 적이 없어서, 조금 동경 같은 게 있었거든」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ、あの……それで、２人きりで話したいことって？」"
translation = "「저, 저기…… 그래서, 단둘이서 이야기하고 싶다는 건?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あのっ……前からちょっと気になっていたというか、気づいてたことがあるんだけど……」"
translation = "「저기…… 전부터 조금 신경 쓰였다고 할까, 눈치챈 게 있는데……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「白詰さんたちと会長くんって、何か危ないことというか、秘密のこと、してるんじゃないかな？」"
translation = "「시로츠메 씨 일행이랑 회장군은, 뭔가 위험한 일이라고 할까, 비밀스러운 일, 하고 있는 거 아니야?」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「──ああいや！\u3000そもそもリクリエと戦う私たちが、今更危ないことも何もないんだけど、ただ……」"
translation = "「──아아 아니! 애초에 리크리에와 싸우는 우리들이, 이제 와서 위험한 일이고 뭐고 없지만, 다만……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「なんだか、リクリエ以外のモノと戦っていたりもしてて、それが内緒のことなのかなって思ったんだ」"
translation = "「왠지, 리크리에 이외의 것과 싸우고 있기도 해서, 그게 비밀인 걸까 생각했어」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（姫咲先輩、鋭すぎる……！）"
translation = "（히메사키 선배, 너무 예리해……！）"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっとぉ……その、ですね……」"
translation = "「에또…… 그게, 말이죠……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ああっ、ごめんね！\u3000その件で責めたいとか、そういうことじゃないの！」"
translation = "「아앗, 미안해! 그 건으로 책망하고 싶다거나, 그런 게 아니야!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「ただあのっ、会長くんがわざわざ秘密にしてるくらいのことだから、何だが凄く重要なことなんじゃないかなって思っちゃって……」"
translation = "「다만 저기, 회장군이 일부러 비밀로 할 정도의 일이니까, 왠지 굉장히 중요한 일이 아닐까 생각해서……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「だから、その……」"
translation = "「그래서, 그……」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「もし可能なら、私も手伝わせてほしいなって、そう思ってお願いしに来たの！」"
translation = "「만약 가능하다면, 나도 돕게 해줬으면 좋겠다고, 그렇게 생각해서 부탁하러 온 거야!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えぇっ！？\u3000姫咲先輩が私たちのお手伝い……！？」"
translation = "「에엣!? 히메사키 선배가 저희를 도와주신다니……!?」"

[[dialogue]]
speaker = "unk"
original = "その時、サチの四つ葉のクローバーの髪飾りが点滅し、突然この場にいない第三者の声が響き渡る。"
translation = "그때, 사치의 네잎클로버 머리장식이 점멸하며, 갑자기 이 자리에 없는 제삼자의 목소리가 울려 퍼진다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『メルエルさん！\u3000その件については、私から説明しましょう！！』"
translation = "『메르엘 씨! 그 건에 대해서는, 제가 설명하죠!!』"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トレジアンナさん！？\u3000一体どこから声をかけてるんですか！！」"
translation = "「트레지안나 씨!? 대체 어디서 말을 거시는 거예요!!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『いや～、すみません☆\u3000秘密がピンチな緊急事態かと思い、突然失礼しちゃいました！』"
translation = "『이야~, 죄송해요☆ 비밀이 위기인 긴급사태인가 싶어, 갑자기 실례해버렸습니다!』"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えっと、附属校のトレジアンナさんですよね。会長くんやアニマ先輩と話しているところを見かけたことがあります」"
translation = "「저기, 부속교의 트레지안나 씨죠. 회장군이나 아니마 선배와 이야기하는 걸 본 적이 있어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『はい～、そのトレジアンナさんですよぉ♪\u3000それで早速なんですが、確かに私たちには秘密があります！』"
translation = "『네에~, 그 트레지안나 씨예요♪ 그래서 본론입니다만, 확실히 저희에게는 비밀이 있습니다!』"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『ただですねぇ、その秘密をメルエルさんにお教えすることはできません！』"
translation = "『다만 말이죠, 그 비밀을 메르엘 씨에게 알려드릴 수는 없습니다!』"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「それは……私が部外者だからでしょうか？」"
translation = "「그건…… 제가 외부인이라서 그럴까요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『とんでもありません！\u3000メルエルさんほど魔法少女姿が似合いそうな……じゃなかった、強力な星騎士の方に協力を申し出てもらえるのは、私としては凄く嬉しいです！』"
translation = "『천만의 말씀입니다! 메르엘 씨만큼 마법소녀 모습이 어울릴 것 같은…… 이 아니라, 강력한 성기사인 분이 협력을 제안해주시는 건, 저로서는 굉장히 기쁩니다!』"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『信用、信頼の面においても……会長さんの恋人さんですから、そういう意味でも秘密を打ち明ける相手としては申し分ありません！』"
translation = "『신용, 신뢰 면에서도…… 회장님의 연인이시니까, 그런 의미에서도 비밀을 털어놓을 상대로서 손색이 없습니다!』"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「なら、どうして……？」"
translation = "「그럼, 어째서……?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『実は他でもない、会長さん自身に口止めされているんです！\u3000メルエルさんをこの件に巻き込みたくない、と』"
translation = "『사실 다름이 아니라, 회장님 본인에게 입막음을 당했거든요! 메르엘 씨를 이 일에 휘말리게 하고 싶지 않다고』"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「えっ、会長くんに！？」"
translation = "「엣, 회장군에게!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『いや～、お熱いですねぇ☆\u3000私としては、メルエルさんにご協力いただくことはウェルカムなんですが、そのためにはまず、会長さんを口説き落とさないといけません』"
translation = "『이야~, 뜨겁네요☆ 저로서는 메르엘 씨의 협력을 환영합니다만, 그러기 위해서는 우선, 회장님을 설득해서 떨어뜨려야 합니다』"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『と、いうわけで、この件につきましては、もう少々お時間をいただけると幸いです！』"
translation = "『그런 고로, 이 건에 대해서는 시간을 조금 더 주시면 감사하겠습니다!』"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『そんなわけで、トレジアンナさんからの緊急通信は以上になります！』"
translation = "『그런 이유로, 트레지안나 씨의 긴급 통신은 이상입니다!』"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『……あっ、それはそれとして、メルエルさんはサチさんと仲良くしてあげてください』"
translation = "『……앗, 그건 그렇고, 메르엘 씨는 사치 씨와 사이좋게 지내주세요』"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "『協力をお願いしている私が言えた立場じゃないですが、サチさん、秘密の活動が忙しくてあんまりお友達がいないんですよ～』"
translation = "『협력을 부탁하는 제가 말할 처지는 아니지만, 사치 씨, 비밀 활동이 바빠서 친구가 별로 없거든요~』"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「余計なお世話ですぅ！\u3000ていうか別に、私、友達少なくないもん！」"
translation = "「쓸데없는 참견이에요! 그보다 딱히, 저, 친구 적지 않거든요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「って！\u3000言いたいことだけ言って通信切れてる！？\u3000もう、なんなんですか～～～！」"
translation = "「아니! 할 말만 하고 통신 끊겼어!? 정말, 뭐예요 진짜~~~~!」"

[[dialogue]]
speaker_original = "メルエル（幼少）"
speaker_translation = "메르엘(어린 시절)"
original = "「あはは……。初めてお話したけど、凄く勢いのある人だったね、トレジアンナさん」"
translation = "「아하하……. 처음 이야기해봤지만, 굉장히 기세 좋은 사람이었네, 트레지안나 씨」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「も～～～～～、本当にそうなんです！\u3000聞いてください、姫咲先輩！\u3000この間も、こんなことがあってですね！？」"
translation = "「정말~~~~~, 진짜 그렇다니까요! 들어보세요, 히메사키 선배! 요전번에도 이런 일이 있었다니까요!?」"

[[dialogue]]
speaker = "unk"
original = "翌日の昼休み。"
translation = "다음 날 점심시간."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ！\u3000お２人共、こんにちは♪」"
translation = "「앗! 두 분 다 안녕하세요♪」"

[[dialogue]]
speaker = "unk"
original = "俺がメルエルと一緒にカフェテリアへ行くと、サチとまた顔を合わせた。"
translation = "내가 메르엘과 함께 카페테리아로 가자, 사치와 다시 마주쳤다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「サチちゃ～ん！\u3000昨日はありがとう♪」"
translation = "「사치짱~! 어제는 고마웠어♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いえいえ♪\u3000私も昨日は色々お話できて楽しかったです、メルエル<b>お姉さん</b>♪」"
translation = "「아니에요♪ 저도 어제는 여러 가지 이야기할 수 있어서 즐거웠어요, 메르엘 언니♪」"

[[dialogue]]
speaker = "unk"
original = "お姉さん！？"
translation = "언니!?"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへ～♪\u3000実はそうなんだ～♪」"
translation = "「에헤헤~♪ 사실은 그렇단다~♪」"

[[dialogue]]
speaker = "unk"
original = "メルエルはサチへ親しげにくっ付きながら言う。"
translation = "메르엘은 사치에게 친근하게 달라붙으며 말한다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そ、その……昨日あれから話している内に、お姉さんの方から仲良くなろうって言って下さって。それでお話させてもらっている内に、なんだかそう呼びたくなって……♪」"
translation = "「그, 그게…… 어제 그러고 나서 이야기하는 중에, 언니 쪽에서 사이좋게 지내자고 말씀해 주셔서요. 그래서 이야기 나누다 보니 왠지 그렇게 부르고 싶어져서……♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私もなんだか妹ができたみたいで、すごく嬉しくて～♪\u3000ふふっ、会長くんがサチちゃんからお兄さん呼びされている時の気持ちが、ちょっとわかっちゃった♪」"
translation = "「나도 왠지 여동생이 생긴 것 같아서 정말 기뻐~♪ 후훗, 회장군이 사치짱한테 오빠 소리를 들을 때의 기분을 조금 알 것 같아♪」"

[[dialogue]]
speaker = "unk"
original = "昨日、一体あの後何があったんだ……"
translation = "어제 도대체 그 뒤에 무슨 일이 있었던 거야……"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふふっ、それは女の子同士の秘密だよ♪\u3000ね、サチちゃん♪」"
translation = "「후훗, 그건 여자들끼리의 비밀이야♪ 그치, 사치짱♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい、お姉さん♪」"
translation = "「네, 언니♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、２人で仲良さそうに両手のひらをくっつけ合う、メルエルとサチなのであった。"
translation = "그렇게 말하며 둘이서 사이좋게 양 손바닥을 맞대는 메르엘과 사치였다."

