[[dialogue]]
speaker = "unk"
original = "第１話,ドスケベ陰陽師でごめんやす♥,P"
translation = "제1화, 음란한 음양사라 미안해요♥, P"

[[dialogue]]
speaker = "unk"
original = "ある日、俺がマトイと星徒会室で書類作業をしていると、１人の女生徒が訪ねて来た――"
translation = "어느 날, 내가 마토이와 성도회실에서 서류 작업을 하고 있자니, 한 명의 여학생이 찾아왔다――"

[[dialogue]]
speaker = "ミヤハル"
original = "「ごめんやす<emoji=heart04>」"
translation = "「안녕하신교<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「会長は～ん<emoji=heart04>\u3000今日もうちとええことしまひょ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 오늘도 내랑 좋은 거 함 시더<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「また来たの～？\u3000ミヤハル」"
translation = "「또 왔어~? 미야하루」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あらぁ、マトイもおったんやねぇ<emoji=heart04>」"
translation = "「어머나, 마토이도 있었네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は、流星学園２年生の<ruby>安倍野<rt>あべの</rt></ruby>ミヤハル。"
translation = "그녀는 유성학원 2학년인 아베노 미야하루."

[[dialogue]]
speaker = "unk"
original = "日本で高い知名度を誇る陰陽師・<ruby>安倍晴明<rt>あべのせいめい</rt></ruby>の子孫で、巫女の力と陰陽術を操るプリマステラである。"
translation = "일본에서 높은 지명도를 자랑하는 음양사 아베노 세이메이의 후손으로, 무녀의 힘과 음양술을 부리는 프리마스텔라다."

[[dialogue]]
speaker = "unk"
original = "最近、マトイとルリエルが巫女フォームの修業でお世話になった時に知り合い、それ以来ちょくちょく訪ねて来るようになっていた。"
translation = "최근, 마토이와 루리엘이 무녀 폼 수행으로 신세를 졌을 때 알게 되었고, 그 이후로 자주 찾아오게 되었다."

[[dialogue]]
speaker = "マトイ"
original = "「それで？\u3000今日は何の用で来たわけ？」"
translation = "「그래서? 오늘은 무슨 용무로 온 거야?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ、決まっとりますやろ？」"
translation = "「후훗, 정해져 있지 않겠능교?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「それはもちろん、会長はんとセッ――」"
translation = "「그거야 물론, 회장님이랑 섹――」"

[[dialogue]]
speaker = "マトイ"
original = "「ぎゃーーーっ！？！？\u3000ちょっとはオブラートに包んでっ！！」"
translation = "「갸아아악!? 조금은 돌려서 말해!!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あっ<emoji=heart04>\u3000せっかくやし、マトイも一緒に３Ｐしなはる？」"
translation = "「앗<emoji=heart04> 마침 잘됐네, 마토이도 같이 3P 안 할래?」"

[[dialogue]]
speaker = "マトイ"
original = "「するかっ！」"
translation = "「하겠냐!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そうなん？\u3000残念やわぁ<emoji=heart04>」"
translation = "「카나? 아쉽구마잉<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――とまぁ、実は彼女はこんな感じで、えっちな発言を涼しい顔で言いまくる残念京美人だったりする。"
translation = "――라니 뭐, 사실 그녀는 이런 식으로, 야한 발언을 태연한 얼굴로 마구 내뱉는 유감스러운 교토 미인이기도 하다."

[[dialogue]]
speaker = "unk"
original = "おかげで、流星学園では『歩く１８禁』という二つ名である意味恐れられてしまっているとか……本人は全く気にしていないようだが。"
translation = "덕분에 유성학원에서는 『걸어 다니는 18금』이라는 이명으로 어떤 의미로는 두려움의 대상이 되고 있다던가…… 본인은 전혀 신경 쓰지 않는 모양이지만."

[[dialogue]]
speaker = "ミヤハル"
original = "「会長はん、マトイは遠慮するみたいやし――」"
translation = "「회장님, 마토이는 사양하는 모양잉게――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「このまま２人だけでリゾート結界に行って、コテージのベッドで休憩しまひょ<emoji=heart04>」"
translation = "「이대로 우리 둘이서만 리조트 결계에 가서, 코티지 침대에서 휴식이나 하입시더<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「こらこら！\u3000当たり前のように会長の腕に抱き着くのをやめいっ！」"
translation = "「이봐이봐! 당연하다는 듯이 회장의 팔에 매달리지 마!」"

[[dialogue]]
speaker = "マトイ"
original = "「というか、そんな言い方ばっかりしてると、本当にそういうことしているみたいに聞こえるからね！？」"
translation = "「그보다, 그런 식으로만 말하니까 진짜로 그런 짓 하고 있는 것처럼 들리잖아!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ、なんで急に黙ったの！？\u3000待って！\u3000まさか本当にしちゃったの、会長！？」"
translation = "「엣, 왜 갑자기 입을 다물어!? 잠깐! 설마 진짜로 해버린 거야, 회장!?」"

[[dialogue]]
speaker = "unk"
original = "いやいやいや！\u3000してないよ！？"
translation = "아냐아냐아냐! 안 했다고!? 인터뷰"

[[dialogue]]
speaker = "ミヤハル"
original = "「ぷっ……ふふふふっ<emoji=heart04>\u3000嘘やよ～<emoji=heart04>」"
translation = "「푸흡…… 후후후훗<emoji=heart04> 거짓말이라예~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「なっ！？\u3000も～！\u3000このドスケベ陰陽師ぃ～！」"
translation = "「뭐!? 정말~! 이 변태 음양사~!」"

[[dialogue]]
speaker = "unk"
original = "２人は仲が良いなぁ"
translation = "둘은 사이가 좋구나."

[[dialogue]]
speaker = "マトイ"
original = "「どこがかな！？」"
translation = "「어디가!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「え～、マトイのいけず～<emoji=heart04>\u3000夜遅くまで、性癖を語り合った仲やろ？」"
translation = "「에~ 마토이도 참 야박하기는~<emoji=heart04> 밤늦게까지 성벽에 대해 이야기 꽃을 피운 사이 아이가?」"

[[dialogue]]
speaker = "マトイ"
original = "「し～っ！\u3000し～っ！\u3000それは会長に言わないって約束したでしょ！？」"
translation = "「쉿! 쉿! 그건 회장한테 말 안 하기로 약속했잖아!?」"

[[dialogue]]
speaker = "マトイ"
original = "「あ～もうっ！\u3000星徒会の仕事中なんだから、邪魔するなら帰って！」"
translation = "「아~ 정말! 성도회 업무 중이니까, 방해할 거면 돌아가!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あんっ<emoji=heart04>\u3000酷いわぁ。うち、せっかく今日はええもん持って来たのに～」"
translation = "「안<emoji=heart04> 너무하네예. 내, 모처럼 오늘은 좋은 거 가져왔는데~」"

[[dialogue]]
speaker = "マトイ"
original = "「何よ、いいものって？」"
translation = "「뭔데, 좋은 거라는 게?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「浅草にスイーツカフェやってる知り合いがおってな？\u3000今度開店１０周年記念とかで、そこの無料クーポンを貰ったんよ」"
translation = "「아사쿠사에서 디저트 카페 하는 지인이 있거든예? 이번에 개점 10주년 기념인가 해서, 거기 무료 쿠폰을 받았어예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「せやから、ルリはんやトマルはんも誘って、今度の休日に一緒にでもどうかな～って」"
translation = "「카니까, 루리 양이나 토마루 군도 불러서, 이번 휴일에 다 같이 어떨까~ 싶어서예」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ！？\u3000行く行く！\u3000そういう話なら普通に誘ってよ！\u3000スイーツ大好きだし！」"
translation = "「엣!? 갈래 갈래! 그런 이야기라면 평범하게 권해줘! 디저트 엄청 좋아하니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「ていうか、ちゃんとした用事があるなら、最初のセクハラいらなかったでしょ……」"
translation = "「그보다, 제대로 된 용건이 있으면 처음에 성희롱은 필요 없었잖아……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「話には流れってもんがありますやろ？」"
translation = "「이야기에는 흐름이라는 게 있지 않겠능교?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「だから最初に、スケベぇな話で場を和ましてから～」"
translation = "「카니까 처음에, 야한 이야기로 분위기를 좀 띄워놓고 나서~」"

[[dialogue]]
speaker = "マトイ"
original = "「セクハラで場が和むかっ！」"
translation = "「성희롱으로 분위기가 띄워지겠냐!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちがドスケベ女なのは、今更やん？」"
translation = "「내가 변태인 거야 새삼스럽지 않능교?」"

[[dialogue]]
speaker = "マトイ"
original = "「とにかく！\u3000スイーツカフェの件は分かったから。後でまた、みんなの週末の予定を確認して――」"
translation = "「암튼! 디저트 카페 건은 알았으니까. 나중에 다시 애들 주말 예정 확인해 보고――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「会長はん<emoji=heart04>\u3000仕事忙しくて手が離せへんなら、うちが隣でお手伝いしますえ～？」"
translation = "「회장님<emoji=heart04> 일 바빠서 손을 못 뗀다 카면, 내가 옆에서 좀 도와줄까예?」"

[[dialogue]]
speaker = "マトイ"
original = "「って、また会長にくっ付いてるし……」"
translation = "「라니, 또 회장한테 달라붙어 있네……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「大丈夫や<emoji=heart04>\u3000邪魔はせぇへんから。うちはちょっとえっちな、おっぱいクッションみたいな存在やと思って貰えば<emoji=heart04>」"
translation = "「괘안타<emoji=heart04> 방해는 안 할 테니까. 내를 그냥 좀 야한, 가슴 쿠션 같은 존재라고 생각해주면 된다예<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「集中できるかっ！」"
translation = "「집중이 되겠냐!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ムラムラして？」"
translation = "「무라무라해서?」"

[[dialogue]]
speaker = "マトイ"
original = "「ちゃうわっ！！」"
translation = "「아니거든!!」"

[[dialogue]]
speaker = "unk"
original = "前からずっと友達であったかのように気安く話す２人に、思わずクスッと笑ってしまう俺なのだった――"
translation = "예전부터 계속 친구였던 것처럼 허물없이 대화하는 두 사람을 보며, 나도 모르게 쿡 하고 웃음이 터져 나왔다――"

