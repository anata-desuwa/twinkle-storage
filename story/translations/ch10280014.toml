[[dialogue]]
speaker = "unk"
original = "第４話,未来の白地図,P"
translation = "제4화, 미래의 백지도, P"

[[dialogue]]
speaker = "unk"
original = "トマルとの付き合いも長くなってきた、ある日のこと。彼がなにやら嬉しそうな様子で星徒会室へとやってきた――"
translation = "토마루와 알고 지낸 지도 꽤 된 어느 날. 그가 왠지 기뻐 보이는 모습으로 성도회실에 찾아왔다――"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「会長さま、ただいまお時間はよろしいでしょうか？」"
translation = "「회장님, 지금 시간 좀 괜찮으신가요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「――ありがとうございます。実はちょっと、あなた様の意見をお聞きしたいことがございまして！」"
translation = "「――감사합니다. 실은 조금, 당신의 의견을 듣고 싶은 것이 있어서요!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私、イメチェンをしてみたのですが……わかりますか？」"
translation = "「저, 이미지 변신을 해봤는데…… 아시겠나요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ドキドキ……そわそわ……♪」"
translation = "「두근두근…… 안절부절……♪」"

[[dialogue]]
speaker = "unk"
original = "ごめん、難しいかも……"
translation = "미안, 어려울지도……"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「そんな！？」"
translation = "「그럴 수가!?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「うぅ……我ながら、雰囲気が女の子らしくなったのではと、自信があったのですが……」"
translation = "「으으…… 나름대로 분위기가 여자아이처럼 변했다고 자신 있었는데……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「――イメチェンをした部分、ですか……？\u3000それは……」"
translation = "「――이미지 변신을 한 부분, 말인가요……? 그건……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「性別そのものです」"
translation = "「성별 그 자체예요」"

[[dialogue]]
speaker = "unk"
original = "は？"
translation = "하? "

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私、今は本当に、女の子の体になっているんですよ」"
translation = "「저, 지금은 정말로 여자아이의 몸이 되어 있거든요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「購買部のアニマさまから、実験で女体化薬を頂きまして……」"
translation = "「매점의 아니마 님께 실험용 여체화 약을 받아서……」"

[[dialogue]]
speaker = "unk"
original = "えっ……えぇぇぇ～～～っ！？"
translation = "엣…… 에에에에에~~!? "

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「アニマさま、すごいお方です。まだ効果は一時的だそうですが、まさかこうして、本当に女の子になれるだなんて……」"
translation = "「아니마 님, 대단한 분이세요. 아직 효과는 일시적이라고 하지만 설마 이렇게 정말로 여자아이가 될 수 있다니……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私にとっては、まるで夢のようです……♪」"
translation = "「제게는 마치 꿈만 같아요……♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ほら、あなた様も、どうぞ私の体に触ってみてください♪\u3000男の子の時とは、全然体つきが違うんですよ？」"
translation = "「자, 당신도 부디 제 몸을 만져보세요♪ 남자아이일 때와는 완전히 체격이 다르다고요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「そんな、女性の体だからと遠慮なさらずに。私としても、間違いなく女の子になっているのだと、あなた様にわかって頂きたいのでっ」"
translation = "「그렇게 여성의 몸이라고 사양하지 마시고. 저로서도 틀림없이 여자아이가 되었다는 걸 당신이 알아주셨으면 하니까요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「二の腕とか、どうぞ直接触れてみてください。会長さま、さあ！」"
translation = "「팔뚝이라든가, 부디 직접 만져보세요. 회장님, 자!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「――いかがでしょう？\u3000男の体の時に比べて、柔らかさが増しているとは思いませんか？」"
translation = "「――어떠신가요? 남자의 몸일 때에 비해 부드러움이 더해졌다고 생각하지 않으세요?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「え？\u3000そもそも普段の私をこんな風に触ったことがないから、わからない……？」"
translation = "「에? 애초에 평소의 나를 이런 식으로 만진 적이 없어서 모르겠다고요……?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「い、言われてみれば確かに……。会長さまは紳士的な方ですし……あっ！」"
translation = "「드, 듣고 보니 확실히……. 회장님은 신사적인 분이시고…… 앗!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「実は私、女の子になって胸が少し膨らんだのです！\u3000そちらを触って頂ければ、体の変化がよりわかりやすいかと！」"
translation = "「실은 저, 여자아이가 되어서 가슴이 조금 부풀었어요! 그쪽을 만져주시면 몸의 변화를 더 알기 쉬울 거예요!」"

[[dialogue]]
speaker = "unk"
original = "それはもっとダメでしょ！？"
translation = "그건 더 안 되잖아!? "

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「はぅぅ……私、女の子になれたら、胸はもっと大きくなるんじゃないかと期待していたのですが――」"
translation = "「하우우…… 저, 여자아이가 되면 가슴은 좀 더 커지지 않을까 기대했었는데――」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私にはどうやら、胸に関して姉さまほどのポテンシャルはなかったみたいで……」"
translation = "「제게는 아무래도 가슴에 관해서 언니만큼의 잠재력은 없었나 봐요……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「かくなる上は、下を脱いで、例のものが付いていないことを証明するしか……！」"
translation = "「이렇게 된 이상 밑을 벗어서 '그것'이 달려있지 않다는 걸 증명할 수밖에……!」"

[[dialogue]]
speaker = "unk"
original = "それは完全にアウトォォォッ！"
translation = "그건 완전히 아웃이야아아아! "

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「そんな……！\u3000これもダメなら、私にはもう、女の子になっていると証明する術が……」"
translation = "「그런……! 이것도 안 된다면 제게는 이제 여자아이가 되었다고 증명할 방법이……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「うぅ……ごめんなさい。調子に乗っていました……女の子になったというのに私、普段とあまり変わらないなんて……」"
translation = "「으으…… 죄송해요. 우쭐해 있었어요…… 여자아이가 되었는데도 저, 평소와 별반 다르지 않다니……」"

[[dialogue]]
speaker = "unk"
original = "トマル、そうじゃないよ"
translation = "토마루, 그게 아니야"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "パッと見て気づかなかったのは、それだけ普段からトマルが女の子らしいからだと、目を見て伝える。"
translation = "언뜻 보고 눈치채지 못한 건 그만큼 평소부터 토마루가 여자아이 같기 때문이라고 눈을 보며 전한다."

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「そ、それって……あなた様は私のことを、普段から女の子らしいと……思ってくれている、ということでしょうか？」"
translation = "「그, 그건…… 당신은 저를 평소부터 여자아이 같다고…… 생각해주고 계신다는, 뜻일까요?」"

[[dialogue]]
speaker = "unk"
original = "トマルは普段から可愛い"
translation = "토마루는 평소에도 귀여워"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ああ、会長さま……」"
translation = "「아아, 회장님……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（そんな風に、恥ずかしそうに顔を赤くしながら言われてしまったら……私、胸がときめいてしまいます……）"
translation = "（그런 식으로 부끄러운 듯 얼굴을 붉히며 말씀하신다면…… 저, 가슴이 설레버려요……）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（で、でも……そう言って下さるということは、私のことを、少しは女の子として意識してくださっているということ、でしょうか？）"
translation = "（하, 하지만…… 그렇게 말씀해주신다는 건 저를 조금은 여자아이로서 의식해주고 계신다는 걸까요?）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（意識して貰えているなら、私、あなた様への想いを、諦めなくてもいいのでしょうか……？）"
translation = "（의식해주고 계신다면 저, 당신을 향한 마음을 포기하지 않아도 되는 걸까요……?）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（それに、いざとなれば女の子になれる薬があるのなら、性別の問題だって――）"
translation = "（게다가 여차할 때 여자아이가 될 수 있는 약이 있다면 성별 문제도――）"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「あの、会長さま。私……もっともっと素敵な女性になれるよう、頑張ります」"
translation = "「저기, 회장님. 저…… 더욱더 멋진 여성이 될 수 있도록 노력할게요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「だからどうか……私のことをこれからも、あなた様のお側に置かせてください」"
translation = "「그러니까 부디…… 저를 앞으로도 당신의 곁에 두게 해주세요」"

[[dialogue]]
speaker = "unk"
original = "そう言って笑顔を見せたトマルは、今までで一番女の子らしく見えて。"
translation = "그렇게 말하며 미소를 지은 토마루는 지금까지 중 가장 여자아이처럼 보였다."

[[dialogue]]
speaker = "unk"
original = "俺は思わずドキッとしてしまうのだった――"
translation = "나는 나도 모르게 두근거리고 마는 것이었다――"

