[[dialogue]]
speaker = "unk"
original = "第１話,ホウちゃんリターンズ,P"
translation = "제1화, 호우짱 리턴즈, P"

[[dialogue]]
speaker = "unk"
original = "星霊祭に向けて訓練し、ノヴァフォームへの覚醒を果たしたフニ。"
translation = "성령제를 향해 훈련하고, 노바 폼으로 각성을 이룬 후니."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ホウちゃん、コンビネーションパターンの『Ｃ』で行くよっ」"
translation = "「호우짱, 콤비네이션 패턴 『C』로 갈게!」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「はい。いつでも構いませんよ、フニ！」"
translation = "「네. 언제든지 괜찮습니다요, 후니!」"

[[dialogue]]
speaker = "unk"
original = "フニの横で、小さな姿になった魔獣『フェニックス』こと『ホウちゃん』が、パタパタと飛びながら一緒に攻撃の型を繰り出す。"
translation = "후니 옆에서, 작은 모습이 된 마수 『피닉스』, 즉 『호우짱』이, 퍼덕퍼덕 날면서 함께 공격 패턴을 펼친다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「――よし、やったっ。上手くできたね♪」"
translation = "「――좋아, 해냈다. 잘 됐네♪」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「ふふっ、フニとは以心伝心ですから」"
translation = "「후훗, 후니와는 이심전심이니까요」"

[[dialogue]]
speaker = "unk"
original = "フニがノヴァフォームで目覚めた能力によって、変身中はホウちゃんが常時顕現できるようになり、以前よりも俺たちと顔を合わせる機会が増えていた。"
translation = "후니가 노바 폼으로 깨달은 능력 덕분에, 변신 중에는 호우짱이 상시 현현할 수 있게 되었고, 이전보다 우리와 얼굴을 마주할 기회가 늘어났다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「――会長さん、水筒を持ってきてくれて、ありがとうございます♪」"
translation = "「――회장군, 물통을 가져와 주셔서, 감사합니다♪」"

[[dialogue]]
speaker = "unk"
original = "フニ、お疲れ様。すごく頑張ってたな"
translation = "후니, 수고했어. 정말 열심히 했네"

[[dialogue]]
speaker = "unk"
original = "俺は恋人であるフニの頭を、優しく撫でる。"
translation = "나는 연인인 후니의 머리를, 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「あっ<emoji=heart04>\u3000褒めて下さるんですか？\u3000えへへへ<emoji=heart04>\u3000なまら嬉しくなっちゃいます……♪」"
translation = "「앗<emoji>heart04</emoji> 칭찬해 주시는 건가요? 에헤헤헤<emoji>heart04</emoji> 정말 기뻐집니다……♪」"

[[dialogue]]
speaker = "unk"
original = "ホウちゃんもお疲れ様"
translation = "호우짱도 수고했어"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「おや、私のことも撫でて下さるんですか？\u3000ありがとうございます」"
translation = "「어머, 제 것도 쓰다듬어 주시는 건가요? 감사합니다」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「んっ……ふふっ♪\u3000相変わらず、会長は撫で方がお上手ですね。心地よいです」"
translation = "「응읏…… 후훗♪ 변함없이, 회장님은 쓰다듬는 솜씨가 좋으시네요. 기분 좋습니다」"

[[dialogue]]
speaker = "unk"
original = "モフモフと撫でながら、俺はホウちゃんに最近の様子を聞いてみる。"
translation = "복슬복슬 쓰다듬으며, 나는 호우짱에게 최근의 상황을 물어본다."

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「――最近ですか？\u3000そうですね……」"
translation = "「――최근 말인가요? 그렇네요……」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「フニがノヴァフォームの維持時間を延ばす為に、普段からよく変身してくれているので、その合間に人間界の料理を色々と試しています」"
translation = "「후니가 노바 폼의 유지 시간을 늘리기 위해, 평소부터 자주 변신해 주고 있어서, 그 틈에 인간계의 요리를 여러 가지 시도해 보고 있습니다」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「――どんな物が好きか？\u3000私はリンゴやトウモロコシが好物なので、最近はよくアップルパイを<b>作って</b>いますね」"
translation = "「――어떤 것을 좋아하냐고요? 저는 사과나 옥수수를 좋아해서, 최근에는 자주 애플파이를 <b>만들고</b> 있습니다요」"

[[dialogue]]
speaker = "unk"
original = "えっ、自分で作ってるの！？"
translation = "엣, 직접 만들고 있다고?"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ホウちゃん、すっごく料理が上手なんですよ♪\u3000炎の星術で焼いて作るアップルパイ、それはもう頬っぺたが落ちそうになるくらい美味しくて……」"
translation = "「호우짱, 엄청 요리를 잘해요♪ 불의 성술로 구워서 만드는 애플파이, 그건 정말 볼이 떨어져 나갈 정도로 맛있어서……」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「ふふっ、炎を操るのは私の得意分野ですから。よろしければ、会長も食べてみますか？」"
translation = "「후훗, 불을 다루는 건 저의 특기 분야이니까요. 괜찮으시다면, 회장님도 드셔 보시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "というわけで、流星寮に移動し、ホウちゃんがアップルパイを作ってくれることになったのだが――"
translation = "그리하여, 유성 기숙사로 이동하여, 호우짱이 애플파이를 만들어 주기로 했는데――"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「う～ん♪\u3000なまらいい匂いがします♪」"
translation = "「으음~♪ 정말 좋은 냄새가 나요♪」"

[[dialogue]]
speaker = "unk"
original = "フェニエルと席に着いて待っていると、エプロンを付けた<b>お姉さん</b>が、焼きたてのアップルパイを持ってきてくれる。"
translation = "페니엘과 자리에 앉아 기다리고 있자, 앞치마를 두른 <b>누나</b>가, 갓 구운 애플파이를 가져다준다."

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「できましたよ、２人共。切り分けますから、少し待っていてくださいね――」"
translation = "「다 되었습니다요, 두 분 다. 잘라 드릴 테니, 잠시 기다려 주세요――」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ありがとう♪\u3000ホウちゃん」"
translation = "「고마워♪ 호우짱」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「いいえ、フニ。どうしたしまして」"
translation = "「아닙니다요, 후니. 천만에요」"

[[dialogue]]
speaker = "unk"
original = "そう、なんとホウちゃんは星術を使い、フニがそのまま成長して大人になったような、母性的なお姉さんの姿へと変身していたのだ。"
translation = "그렇다, 놀랍게도 호우짱은 성술을 사용하여, 후니가 그대로 성장하여 어른이 된 듯한, 모성적인 누나의 모습으로 변신해 있었던 것이다."

[[dialogue]]
speaker = "unk"
original = "ホウちゃんは柔らかく包み込むような微笑みを浮かべながら、切り分けたアップルパイをフォークに刺して、俺に差し出してくる。"
translation = "호우짱은 부드럽게 감싸 안는 듯한 미소를 지으며, 잘라낸 애플파이를 포크에 꽂아, 나에게 내민다."

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「会長の分も切れましたよ。それでは、口を開けてください」"
translation = "「회장님 몫도 다 잘랐습니다요. 그럼, 입을 벌려 주세요」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「ふふっ、そんな遠慮なさらず。先程撫でて頂いたお礼です」"
translation = "「후훗, 그렇게 사양하지 마세요. 아까 쓰다듬어 주신 것에 대한 답례입니다」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「それに、フニと恋人ということは、会長は私にとっても家族のようなものですから。はい――あ～ん」"
translation = "「게다가, 후니와 연인이라는 것은, 회장님은 저에게도 가족과 같은 분이니까요. 자―― 아~앙」"

[[dialogue]]
speaker = "unk"
original = "俺は大人ホウちゃんの押しに負けてしまい、ちょっと気恥ずかしさを感じながら、アップルパイを食べる。"
translation = "나는 어른 호우짱의 강요에 지고 말아, 조금 쑥스러움을 느끼면서, 애플파이를 먹는다."

[[dialogue]]
speaker = "unk"
original = "これは……うまいっ！！"
translation = "이건…… 맛있다!!"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「それは良かったです。もっと食べますか？」"
translation = "「그것 참 다행입니다요. 더 드시겠어요?」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ま、待って下さいっ。それなら次は、私があ～んをしますっ……！」"
translation = "「자, 잠깐 기다려 주세요! 그렇다면 다음은, 제가 아~앙을 하겠습니다!」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「おや、フニ……？」"
translation = "「어머, 후니……?」"

[[dialogue]]
speaker = "unk"
original = "フェニエルが慌てたように立ち上がり、アップルパイを持ってこちらに駆け寄って来る。"
translation = "페니엘이 당황한 듯이 일어서서, 애플파이를 들고 이쪽으로 달려온다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「会長さん、どうぞですっ。あ～ん……！」"
translation = "「회장군, 드세요! 아~앙……!」"

[[dialogue]]
speaker = "unk"
original = "俺はちょっと戸惑いながらも、フニから差し出されたアップルパイも食べる。"
translation = "나는 조금 당황하면서도, 후니가 내민 애플파이도 먹는다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ど、どうですか？\u3000美味しいですか？」"
translation = "「어, 어떻습니까? 맛있습니까?」"

[[dialogue]]
speaker = "unk"
original = "う、うん。すごく美味しいよ"
translation = "으, 응. 정말 맛있어"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「でしたら、ここからは私が会長さんにあ～んをさせて頂きますねっ……！」"
translation = "「그렇다면, 여기부터는 제가 회장군에게 아~앙을 해 드리겠습니다!」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "（ふふっ、なるほど……。あ～んはフニにもよくしているので、会長にだけ特別というわけではなかったのですが……）"
translation = "（후훗, 과연…… 아~앙은 후니에게도 자주 해 주므로, 회장님에게만 특별한 것은 아니었습니다만……）"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「――会長、口の周りが汚れていますよ？\u3000拭きますね♪」"
translation = "「――회장님, 입 주변이 더러워졌습니다요? 닦아 드릴게요♪」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「えっ……ホウちゃん！？\u3000わ、私も次、それやりますっ……！」"
translation = "「엣…… 호우짱!? 저, 저도 다음엔, 그거 할 거예요!」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「そうですか？\u3000では……私はその代わりにまた、会長にあ～んをさせて頂きましょうかね♪」"
translation = "「그러신가요? 그럼…… 저는 그 대신 다시, 회장님에게 아~앙을 해 드려야겠네요♪」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「えぇっ！？\u3000そ、そんな……私はどっちをしたら……！？」"
translation = "「에엣!? 그, 그런…… 저는 어느 쪽을 해야……!?」"

[[dialogue]]
speaker_original = "ホウちゃん"
speaker_translation = "호우짱"
original = "「ふふふっ……嫉妬しているフニは可愛いですね」"
translation = "「후후훗…… 질투하는 후니는 귀엽네요」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「へ！？\u3000し、嫉妬……？」"
translation = "「헤!? 질, 질투……?」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「は、はうぅ……！\u3000今気づきましたけど、私、もしかしてホウちゃんに焼き餅を焼いて……！？\u3000な、なまら恥ずかしいべや……！」"
translation = "「하, 하우으……! 지금 깨달았습니다만, 저, 혹시 호우짱에게 질투를……!? 너, 정말 부끄럽잖아……!」"

[[dialogue]]
speaker = "unk"
original = "そんな風に恥ずかしそうに顔を覆うフニを、にこにこ微笑みながら、母親のように見守るホウちゃんなのであった――"
translation = "그렇게 부끄러운 듯 얼굴을 감싸는 후니를, 싱글벙글 미소 지으며, 어머니처럼 지켜보는 호우짱이었던 것이다――"

