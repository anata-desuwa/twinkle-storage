[[dialogue]]
speaker = "イクシリオン"
original = "「はぁ、はぁ、はぁ……<emoji=heart04>\u3000ビーチで、こんな開けっぴろげな格好に……<emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04> 해변에서, 이렇게 훤히 드러낸 차림으로……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本当にいいのか？\u3000流石にいきなりは苦しいんじゃ？」"
translation = "「정말 괜찮겠어? 아무래도 갑자기는 힘들지 않겠어?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「だ、大丈夫です、ひと思いに挿れてください……<emoji=heart04>」"
translation = "「괘, 괜찮아요, 단숨에 삽입해 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "「この夏は新しいことに挑戦したいんです！」とイクシーに言われたのは、ビーチの片隅で真っ白い美尻を揉みしだいてる時だった。"
translation = "「이번 여름에는 새로운 것에 도전하고 싶어요!」라고 익시가 말한 것은, 해변 한구석에서 새하얀 예쁜 엉덩이를 주물러대고 있을 때였다."

[[dialogue]]
speaker = "イクシリオン"
original = "「会長って、あっ……んっ……<emoji=heart04>\u3000最近、私のお尻に夢中ですよね……？\u3000揉んだり、ほじったり、頬ずりしたりしてくれて……<emoji=heart04>」"
translation = "「회장님은, 앗…… 응……<emoji=heart04> 최근 제 엉덩이에 푹 빠지셨죠……? 주무르거나, 쑤시거나, 얼굴을 비비거나 해주시고……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も男だからな。これだけエロいデカ尻を見せつけられたら堪能したくもなる」"
translation = "「나도 남자니까. 이 정도로 에로한 큰 엉덩이를 보여주면 만끽하고 싶어지기도 하지」"

[[dialogue]]
speaker = "イクシリオン"
original = "「っっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000でしたら、んはぁ、もっと堪能してみませんか……<emoji=heart04>\u3000私も大好きな彼氏さんと一夏の思い出を作りたいですし……<emoji=heart04>」"
translation = "「윽……<emoji=heart04><emoji=heart04><emoji=heart04> 그렇다면, 응하아, 좀 더 만끽해 보시겠어요……<emoji=heart04> 저도 사랑하는 남자친구분과 한여름의 추억을 만들고 싶고요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「で──アナルセックスを提案してくるのがなんともイクシーらしいな」"
translation = "「그래서── 애널 섹스를 제안해 오는 게 참 익시답네」"

[[dialogue]]
speaker = "イクシリオン"
original = "「わ、私ばかりいやらしい子扱いしないでください<emoji=heart04>\u3000会長だってしたがっていたじゃないですか……<emoji=heart04>」"
translation = "「저, 저만 야한 애 취급하지 마세요<emoji=heart04> 회장님도 하고 싶어 하셨잖아요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「毎日毎日お尻の穴ほじくってきて……<emoji=heart04>\u3000アナルセックス用に開発してきたくせにぃ……<emoji=heart04>」"
translation = "「매일매일 똥구멍을 쑤셔대고……<emoji=heart04> 애널 섹스용으로 개발해 왔으면서어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……その通りだよ。イクシーの水着姿を見た時から、この尻穴に突っ込みたくて仕方なかったんだ」"
translation = "「아아…… 그 말대로야. 익시의 수영복 차림을 봤을 때부터, 이 똥구멍에 처박고 싶어서 견딜 수 없었어」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ひゃっ……<emoji=heart04>\u3000お尻の穴に当たって……<emoji=heart04>\u3000す、素直に言われると恥ずかしっ……<emoji=heart04>\u3000でも、はぁはぁ、嬉しいです……<emoji=heart04>」"
translation = "「히얏……<emoji=heart04> 똥구멍에 닿아서……<emoji=heart04> 소, 솔직하게 들으니까 부끄러워……<emoji=heart04> 하지만, 하아 하아, 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私も会長のおち○ちんでお尻広げられたい……<emoji=heart04>\u3000私のお尻を、セックス用の穴に変えてください……<emoji=heart04>」"
translation = "「저도 회장님의 자지로 엉덩이가 넓혀지고 싶어요……<emoji=heart04> 제 엉덩이를, 섹스용 구멍으로 바꿔주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長のおち○ちんで、海開きならぬ、アナル開きして欲しいです……<emoji=heart04>」"
translation = "「회장님의 자지로, 개장(海開き)이 아니라, 애널 개장해 주셨으면 해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "早く早くとイクシーがヒクつく尻穴を擦り付けてくる。"
translation = "빨리빨리라며 이쿠시가 벌름거리는 똥구멍을 문질러 온다."

[[dialogue]]
speaker = "unk"
original = "そんなエロ可愛い彼女をしっかり抱えながら、俺はイクシーの肛門にペニスを沈ませていって──"
translation = "그런 에로하고 귀여운 그녀를 꽉 껴안으면서, 나는 이쿠시의 항문에 페니스를 가라앉혀 갔고──"

[[dialogue]]
speaker = "イクシリオン"
original = "「お゛っ──お゛おぉぉおんんんっっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ん゛ひゃっ……あ゛っ……<emoji=heart04>\u3000お゛っ、お゛っ、おほ゛ほほおぉぉぉっっ～～……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오゛윽──오゛오오오옹ㅇ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000응゛햐……아゛윽……<emoji=heart04>\u3000오゛윽, 오゛윽, 오호゛호호오오오오옷～～……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーの下品すぎる声が聞こえた瞬間、反射的に腰を振り始めてしまっていた。"
translation = "이쿠시의 너무나 저질스러운 목소리가 들린 순간, 반사적으로 허리를 흔들기 시작하고 말았다."

[[dialogue]]
speaker = "イクシリオン"
original = "「かっ、かふっ、あふぅっ……<emoji=heart04>\u3000お゛ほっ、お゛おおっっ……<emoji=heart04>\u3000おひり、しゅごっ、やばっ<emoji=heart04>\u3000おま○こに挿れりゅのと全然ちがふっ<emoji=heart04>」"
translation = "「커, 카훗, 아후우……<emoji=heart04>\u3000오゛혹, 오゛오오옷……<emoji=heart04>\u3000엉덩이, 대단해, 장난 아냐<emoji=heart04>\u3000보지에 넣는 거랑 전혀 달라<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「おなきゃ、くるひっ<emoji=heart04>\u3000くぁ、あぁっ……<emoji=heart04>\u3000おひ○ひん太すぎへっ<emoji=heart04>\u3000熱すぎへっ<emoji=heart04>\u3000おしり焼けちゃっ……あ゛ぁっ、おひりっ、ひろがっへっ<emoji=heart04>」"
translation = "「배 속이, 괴로워<emoji=heart04>\u3000쿠아, 아아앗……<emoji=heart04>\u3000자지 너무 굵어어<emoji=heart04>\u3000너무 뜨거워어<emoji=heart04>\u3000엉덩이 타버려……아゛앗, 엉덩이, 벌어져어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "想像を超える快感だったのか、イクシーの呂律が一気に回らなくなる。"
translation = "상상을 초월하는 쾌감이었는지, 이쿠시의 혀가 단숨에 꼬이기 시작한다."

[[dialogue]]
speaker = "unk"
original = "今まさにイクシーの尻穴をこじ開けていってるのがわかる。決して入りはしないモノを無理やりねじ込んでいってる肉感が快感になっていた。"
translation = "지금 바로 이쿠시의 똥구멍을 억지로 열어젖히고 있는 것이 느껴진다. 결코 들어갈 리 없는 물건을 억지로 밀어 넣는 육감이 쾌감이 되어 있었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「らめっ──イ゛っっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ゆっくり動かれへりゅらけれも、イっひゃっ、イきゅっ、ん゛んんんっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안 돼──가゛앗……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000천천히 움직여지는 것만으로도, 가버렷, 가버려어, 응゛응응응으읏……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「おひ○ひっ、ずぶずぶ入っへきへっ……<emoji=heart04>\u3000おま○こに挿れへもらふ時より、ん゛ぁぁぁっ、体の奥まれ入っへきへぇっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지, 즈부즈부 들어오고 있어어……<emoji=heart04>\u3000보지에 넣어줄 때보다, 응゛아아앗, 몸속 깊은 곳까지 들어오고 있어어어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「きもひっ、ああああっ……きもひいいっっ……<emoji=heart04>\u3000子宮突かれりゅのと別物の快感がぁっっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000奥にっ……奥にぃっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아, 아아아앗……기분 좋아아아……<emoji=heart04>\u3000자궁 찔리는 거랑은 딴판인 쾌감이이잇……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000안쪽에……안쪽에에에……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本当にいやらしいなイクシーは。初めてのアナルセックスで感じすぎだろ」"
translation = "「정말 천박하네 이쿠시는. 첫 애널 섹스인데 너무 느끼는 거 아냐?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ら、らっへぇ……あふぁっ<emoji=heart04>\u3000会長が毎日毎日開発してきたかりゃぁっ……<emoji=heart04>」"
translation = "「그, 그치마안……아하아<emoji=heart04>\u3000회장님이 매일매일 개발해 왔으니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「この敏感っぷりはそれだけじゃないだろ！」"
translation = "「이 민감함은 그것뿐만이 아니잖아!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お゛ほぉぉぉん゛んんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お゛っ、お゛っ、お゛っ、ん゛お゛ぉおおおおおっっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000グネグネ動きながら突き込まれへぇぇっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오゛호오오오옹゛응응으읏<emoji=heart04><emoji=heart04><emoji=heart04>\u3000오゛윽, 오゛윽, 오゛윽, 응゛오゛오오오오오오옷……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000구불구불 움직이면서 찔려오고 있어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あえて体を揺らしながら突き込んで、イクシーの淫乱な尻穴をより拡張していく。"
translation = "일부러 몸을 흔들며 찔러 넣어, 이쿠시의 음란한 똥구멍을 더욱 확장해 나간다."

[[dialogue]]
speaker = "unk"
original = "ブルブルと痙攣して悶える腸内がいやらしい。明らかに苦痛よりも快楽によがっていて──"
translation = "부르르 경련하며 번민하는 장 내부가 음란하다. 명백히 고통보다는 쾌락에 젖어 있었고──"

[[dialogue]]
speaker = "イクシリオン"
original = "「ご、ごめんにゃしゃいっ、自分れも毎日開発しへましひゃぁっ……<emoji=heart04>」"
translation = "「죄, 죄송해여어, 저도 매일 개발하고 있었어여어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「寝る前にお尻ほじほじ弄っへっ<emoji=heart04>\u3000あっ……あはぁぁっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000小指一本かりゃ始めへっ、今れはもー、指二本くりゃいまれっ……<emoji=heart04>」"
translation = "「자기 전에 엉덩이 구멍 쑤욱쑤욱 만지면서어<emoji=heart04>\u3000앗……아하아아……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000새끼손가락 하나부터 시작해서, 지금은 이이이미, 손가락 두 개 정도까지이……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「だと思ったよ。いい具合だもんな」"
translation = "「그럴 줄 알았어. 기분 좋은 상태니까 말이야」"

[[dialogue]]
speaker = "イクシリオン"
original = "「やぁぁっ、しょんなこと言わないれくだしゃいっ……<emoji=heart04>\u3000会長のおひ○ひんが太すぎへ、あひぃあっ、締まっちゃふらけれふぅっ……<emoji=heart04>」"
translation = "「야아앗, 그으런 말 하지 마셰요오……<emoji=heart04> 회장님의 자지이가 너무 굵어셔, 아히이앗, 조여져 버려효오……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ほんひょっ、あふぁっ、ほんとしゅごひっ……<emoji=heart04>\u3000お尻の穴っ、閉じなくなっひゃいそーっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「정마알, 아하앗, 정말 대단해애……<emoji=heart04> 똥구멍이, 안 닫히게 되어버려어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「出し入れされりゅたびに、お゛っ、お゛おおおっっ<emoji=heart04>\u3000大きいのしへりゅみひゃいな気分になっへっ……<emoji=heart04>」"
translation = "「들락날락할 때마다, 오윽, 오오오오옷<emoji=heart04> 커다란 게 들어와 있는 기분이 되어서어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「イケナイ快感がっ<emoji=heart04>\u3000はまっひゃらイケナイ快感がぁ……<emoji=heart04>」"
translation = "「안 되는 쾌감이이<emoji=heart04> 빠져버리면 안 되는 쾌감이이……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥へ奥へと突き入れると、ペニスをひり出そうとイクシーの腸内が激しくうねってくる。"
translation = "안으로 안으로 찔러 넣자, 페니스를 밀어내려는 듯 이쿠시의 장 내부가 격렬하게 요동친다."

[[dialogue]]
speaker = "unk"
original = "そうして押し返してくる時の圧迫感が気持ちいい。何より──"
translation = "그렇게 밀어내 올 때의 압박감이 기분 좋다. 무엇보다──"

[[dialogue]]
speaker = "イクシリオン"
original = "「ん゛ほぉっ、お゛ぉっ<emoji=heart04>\u3000ん゛ひぃいぃぃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응호옷, 오오옷<emoji=heart04> 응히이이이잇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「イクシーの声、エロすぎるっ……！」"
translation = "「이쿠시의 목소리, 너무 야하잖아……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000き、聞かないれっ<emoji=heart04>\u3000お願いれふかりゃ聞かないれくだひゃいっっ<emoji=heart04>」"
translation = "「～～윽<emoji=heart04><emoji=heart04><emoji=heart04> 드, 듣지 마셰요오<emoji=heart04> 부탁이니까 듣지 마셰요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「出したくへ出してりゅわけじゃないんれふっ<emoji=heart04>\u3000会長のがおっきしゅぎりゅかりゃっ、お゛ぉ、ん゛はぁっ、おなきゃ苦ししゅぎへかっへにぃ……<emoji=heart04>」"
translation = "「내고 싶어셔 내는 게 아니란 마리에요옷<emoji=heart04> 회장님 게 너무 커셔어, 오오, 응하앗, 배가 너무 괴로워셔 멋대로오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アヘアヘと濁った声を漏らす度に、イクシーが一気に顔を赤くする。"
translation = "아헤아헤하며 탁한 목소리를 흘릴 때마다, 이쿠시가 단번에 얼굴을 붉힌다."

[[dialogue]]
speaker = "unk"
original = "だけど、エロい。イクシーみたいに品の良い子が、こんなに下品な声で喘いで──"
translation = "하지만, 야하다. 이쿠시처럼 품행 단정한 아이가, 이렇게 저질스러운 목소리로 신음하며──"

[[dialogue]]
speaker = "イクシリオン"
original = "「ん゛ほおおおっっ～～！！？\u3000お゛ほっ！\u3000お゛ぉっ！\u3000お゛っ、お゛っ、お゛っ、お゛おおおおおおっっ～～！！！？」"
translation = "「응호오오오옷～～!!? 오홋! 오옷! 오옷, 오옷, 오옷, 오오오오오오오옷～～!!!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はげひっ、らめぇっ、はげひしゅぎれふっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「격해애, 안 돼애, 너무 격해효오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「壊れひゃっ、お゛お゛お゛っ<emoji=heart04>\u3000おひりっ、お゛ほぉっ、おひりぃぃっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「망가져어, 오오오옷<emoji=heart04> 엉덩이이, 오호옷, 엉덩이이이잇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その声をビーチ中に響かせてやろうと、淫らな尻穴を全力で突き穿つ。"
translation = "그 목소리를 해변 전체에 울려 퍼지게 해주겠다며, 음란한 항문을 전력으로 꿰뚫는다."

[[dialogue]]
speaker = "イクシリオン"
original = "「イケにゃいっ<emoji=heart04>\u3000イケましぇんっ<emoji=heart04>\u3000はまっちゃっ、イケにゃいの、はまっちゃっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안 돼애<emoji=heart04> 안 돼요오옷<emoji=heart04> 빠져버려어, 안 되는 거에, 빠져버려어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「イケない？\u3000イキまくってるようにしか見えないけど――なっ！」"
translation = "「안 된다고? 가버리는 걸로밖에 안 보이는데── 자!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お゛っ──お゛ほほほほぉぉおおおおおん゛ん゛ん゛っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오옷──오호호호호오오오오오오오옹옹옹옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そーゆう意味じゃにゃっ<emoji=heart04>\u3000イ゛ぐっ<emoji=heart04>\u3000はずかししゅぎへ、イ゛ぐぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그으런 의미가 아냐앗<emoji=heart04>\u3000히이익<emoji=heart04>\u3000너무 부끄러워혀, 가버렷, 가버어어어엇～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あなりゅの快感しゅごしゅぎへっ<emoji=heart04>\u3000ずぼずぼされりゅ背徳感えげつなくへっ<emoji=heart04>\u3000これはまっひゃりゃ、天使としへっ──っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「애너류의 쾌감 너무 죠아혀어<emoji=heart04>\u3000즈보즈보 당하눈 배덕감 장난 아니혀어<emoji=heart04>\u3000이러다간 마아아안약, 천사로셔어──윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナルで絶頂するたびに、背徳感でイクシーが絶頂する。その絶頂がさらなる絶頂を呼び、括約筋がどんどん伸びていって──"
translation = "애널로 절정할 때마다, 배덕감으로 익시가 절정한다. 그 절정이 더 큰 절정을 부르고, 괄약근이 점점 늘어나서──"

[[dialogue]]
speaker = "イクシリオン"
original = "「ら、らめぇっ<emoji=heart04>\u3000イきしゅぎへっ、あなりゅ突かれすぎへっ、ホントに締まらなきゅっ、閉じなくなっへきへぇっ<emoji=heart04>」"
translation = "「아, 안돼애<emoji=heart04>\u3000너무 가버려혀, 애너류 찔려버려혀, 정말로 안 조여져혀, 안 닫히게 되어버려혀어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ち、力抜けひゃっ、あふぁぁっ<emoji=heart04>\u3000イきしゅぎへっ、ん゛あっ、お゛っ、ほぉぉおおっ<emoji=heart04>\u3000頭のなきゃ、ふっとーしへぇっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히, 힘이 빠져혀어, 아후아아<emoji=heart04>\u3000너무 가버려혀, 응아아, 오옷, 호오오오오옷<emoji=heart04>\u3000머릿속이, 부글부글 끓어혀어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーのアナルは絶好の締まり具合で、もはやセックス用の穴に変わっていた。"
translation = "익시의 애널은 절묘하게 조여졌고, 이제는 섹스용 구멍으로 변해 있었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「お゛ぉんっ<emoji=heart04>\u3000お゛っ、お゛っ、お゛っ、お゛ぉおおおおっっ～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おひ○ひん入ってくりゅの拒めにゃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오오온<emoji=heart04>\u3000오옷, 오옷, 오옷, 오오오오오오옷～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000자지 들어오눈 거 거부 못 해혀어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「こんにゃ乱暴に突かれへりゅのにすんなり入っちゃっへぇっ<emoji=heart04>\u3000私のあなりゅっ、ガバガバになっちゃっへぇっ<emoji=heart04>」"
translation = "「이로케 난폭하게 찔리구 있눈데 쑥쑥 들어와버려혀어<emoji=heart04>\u3000내 애너류, 허벌창이 되어버려혀어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ホントにもー閉じられにゃいっ<emoji=heart04>\u3000絶対こりぇっ、ん゛ぁっ、あ゛ああっ<emoji=heart04>\u3000おひ○ひん抜かれひゃ後もっ、っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「정말로 이젠 못 닫아혀어<emoji=heart04>\u3000절대로 이고오, 응아아, 아아아아<emoji=heart04>\u3000자지 빠진 뒤에두, 으으으윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニス挿入用に開きっぱなしになった自分のアナルでも想像しているのか、腸内が震えながらヒクつく。"
translation = "페니스 삽입용으로 벌어진 채 굳어버린 자신의 애널이라도 상상하는 것인지, 장내가 떨리며 움찔거린다."

[[dialogue]]
speaker = "unk"
original = "アナルの締め付けがあまりにも気持ち良くて、精子が込み上がってくる……！"
translation = "애널의 조임이 너무나도 기분 좋아서, 정액이 울컥 치밀어 오른다……!"

[[dialogue]]
speaker = "イクシリオン"
original = "「まっへっ<emoji=heart04>\u3000いま出されたりゃ、くせになっひゃっ<emoji=heart04>\u3000一段と私っ、はふぁぁっ、いやらしい子になっちゃいましゅっ<emoji=heart04>」"
translation = "「기다려혀어<emoji=heart04>\u3000지금 싸버리며언, 버릇이 되어버려혀어<emoji=heart04>\u3000한층 더 나아, 하후아아, 야한 아이가 되어버려혀어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「天使失格のぉっ<emoji=heart04>\u3000おひ○ひん挿入用あなりゅ搭載の変態天使になっひゃいましゅうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「천사 실격이이이잇<emoji=heart04>\u3000자지 삽입용 애너류 탑재한 변태 천사가 되어버려혀어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なったらいいさ。使うのは俺だけだ。俺が責任取ってやる」"
translation = "「되어도 좋아. 사용하는 건 나뿐이다. 내가 책임져 줄게」"

[[dialogue]]
speaker = "イクシリオン"
original = "「っっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000いーんれふかっ<emoji=heart04>\u3000私っ、変態天使になっへもっ<emoji=heart04>\u3000お゛っ、お゛ほぉっ<emoji=heart04>\u3000あなりゅ開きっぱなひのドスケベ天使になっへもぉっ<emoji=heart04>」"
translation = "「으으윽<emoji=heart04><emoji=heart04><emoji=heart04>\u3000괘, 괜찮나효어<emoji=heart04>\u3000나아, 변태 천사가 되어도오<emoji=heart04>\u3000오옷, 오호옷<emoji=heart04>\u3000애너류 벌어진 채인 초절정 야한 천사가 되어도오오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「今更だろっ！！」"
translation = "「새삼스럽긴!!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お゛ぉん゛っ<emoji=heart04>\u3000あ゛ひぃあぁああああんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오오온<emoji=heart04>\u3000아히이아아아아아아아앙～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「えへっ、えへへぇっ<emoji=heart04>\u3000しょのとーりれひたぁっ<emoji=heart04>\u3000今更っ、いまさりゃれふよねっ<emoji=heart04>」"
translation = "「에헤, 에헤헤에<emoji=heart04>\u3000마, 마쟜어효어<emoji=heart04>\u3000새삼스럽게, 새삼스럽게네효어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「なりゃもっひょっ、もっひょ突いへっ<emoji=heart04>\u3000あなりゅ乱暴に突きあげへくだひゃいっ<emoji=heart04>」"
translation = "「그러며언 죠금 더, 죠금 더 찔러줘혀어<emoji=heart04>\u3000애너류 난폭하게 찔러 올려줘혀어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私のおひりっ、セックス用の穴にっ<emoji=heart04>\u3000会長専用のチ○ポ穴にっ<emoji=heart04>\u3000会長のためのアナル開きしへくだひゃいっ<emoji=heart04>」"
translation = "「내 엉덩이이, 섹스용 구멍으루우<emoji=heart04>\u3000회장님 전용 자지 구멍으루우<emoji=heart04>\u3000회장님을 위한 애널 벌리기 해줘혀어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言われるまでもない。イクシーを奥の奥まで俺のものにするために、全力で突き上げる。"
translation = "말할 것도 없다. 익시를 안쪽 깊숙한 곳까지 내 것으로 만들기 위해, 전력으로 찔러 올린다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ん゛ごぉおおぉっ<emoji=heart04>\u3000あ゛ひっ<emoji=heart04>\u3000はひぃ<emoji=heart04>\u3000お゛ぉっ<emoji=heart04>\u3000ひぃあ゛っ、あ゛っ、ン゛ぉおおオオっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응고오오오옷<emoji=heart04>\u3000아힉<emoji=heart04>\u3000하히이<emoji=heart04>\u3000오옷<emoji=heart04>\u3000히이아아, 아아, 응오오오오오오옷～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「えへっ、えへへへへぇっ、恥ずかひっ、イクイクイクぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000こんにゃ声、ん゛はぁっ、会長にしかっ、彼氏にしか聞かせられましぇんっ<emoji=heart04>」"
translation = "「에헤, 에헤헤헤헤에, 부끄러워혀어, 가버려 가버려 가버려어어어<emoji=heart04><emoji=heart04><emoji=heart04>\u3000이런 목소리, 응하아, 회장님한테만, 남자친구한테만 들려줄 수 있어혀어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「受け取っへっ、ん゛ほぉっ、お゛ほほほおっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000受け取っへくだひゃいっ<emoji=heart04>」"
translation = "「받아줘혀어, 응호오, 오호호호오오옷～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000받아줘혀어어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私なりの大好きアピールぅっ<emoji=heart04>\u3000ちょっぴり変態な好き好きアピール、受け取っへくだひゃいっっ<emoji=heart04>」"
translation = "「나 나름대로의 정말 좋아해 어필이이잇<emoji=heart04>\u3000조금 변태 같은 좋아해 좋아해 어필, 받아줘혀어어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ン゛オ゛ぉぉっ、ホホぉぅぅっ<emoji=heart04>\u3000オ゛ほぉっ、ン゛ぉおおっ<emoji=heart04>\u3000ぐはぁぁっ、あ゛ひぃあああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오옷, 호호오오옷<emoji=heart04>\u3000오호옷, 응오오오옷<emoji=heart04>\u3000구하아아, 아히이아아아앗～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "決して他人には聞かせられないオホ声を聞かせてくるイクシー。"
translation = "결코 타인에게는 들려줄 수 없는 교성을 내지르는 익시."

[[dialogue]]
speaker = "unk"
original = "エロくて、変態で、それがたまらなく可愛い。"
translation = "야하고, 변태 같고, 그것이 견딜 수 없을 정도로 귀엽다."

[[dialogue]]
speaker = "イクシリオン"
original = "「くはぁぁっ<emoji=heart04>\u3000きへっ、きへましゅっ<emoji=heart04>\u3000精子のぼっへきへっ<emoji=heart04>」"
translation = "「쿠하아아앗<emoji=heart04>\u3000와혀, 와버려혀어<emoji=heart04>\u3000정자가 올라와혀어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「らひへっ<emoji=heart04>\u3000お尻のなきゃにらひへくだひゃいっ<emoji=heart04>」"
translation = "「싸줘혀어<emoji=heart04>\u3000엉덩이 안쪽에 싸줘혀어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長のおひ○ひんれ、私をもっひょ変態にしへっ<emoji=heart04>\u3000ひぐっ、あ゛ふぅぅっ<emoji=heart04>\u3000もっひょいやらしい女にっ、いやらしい女にぃっ<emoji=heart04>」"
translation = "「회장님의 자지로오, 나를 죠금 더 변태루 만들어줘혀어<emoji=heart04>\u3000히극, 아후우우<emoji=heart04>\u3000죠금 더 야한 여자루, 야한 여자루우<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ドスケベな彼女にっ──変えへくだひゃあああああいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「초절정 야한 여자친구루── 바꿔줘혀어어어어어어어억<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お゛っ──ン゛おおおおおおっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ひっぐ゛ぅぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오옷── 응오오오오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04>\u3000히그으으으으으윽～～<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "溜まりに溜まった精をイクシーのアナルにぶちまける。"
translation = "쌓이고 쌓인 정액을 익시의 애널에 쏟아붓는다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ん゛お゛っ、お゛ほおおおおおっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000きもひいいっっ<emoji=heart04>\u3000あひぃあっ、お尻の中っ、あつっ、あつひぃぃっ<emoji=heart04>」"
translation = "「응오옷, 오호오오오오오오옷～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000기분 죠아혀어어어<emoji=heart04>\u3000아히이아아, 엉덩이 안이, 뜨거어, 뜨거워혀어어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「おま○こに中出しされりゅのと、まひゃ違っ……<emoji=heart04>\u3000精子が体の芯まれっ、芯まれのぼっへきへぇっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지에 질내사정 당하눈 거랑, 또 달라혀어……<emoji=heart04>\u3000정자가 몸 중심까지이, 중심까지 올라와혀어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「逆流してくりゅっ<emoji=heart04>\u3000お゛ぉぉっ、お腹ゴロゴロ鳴ってっ<emoji=heart04>\u3000力がっ、あ゛あああっっ、お尻に力がぁっ<emoji=heart04>」"
translation = "「역류해버려혀어<emoji=heart04>\u3000오오오옷, 배가 고르륵고르륵 소리 나혀어<emoji=heart04>\u3000힘이이, 아아아아아앗, 엉덩이에 힘이이이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腸内がもの凄い圧力でペニスをひり出そうとして、それが快感に変わる。"
translation = "장내가 엄청난 압력으로 페니스를 밀어내려 하고, 그것이 쾌감으로 변한다."

[[dialogue]]
speaker = "unk"
original = "そしてペニスが抜けていくと──"
translation = "그리고 페니스가 빠져나가자──"

[[dialogue]]
speaker = "イクシリオン"
original = "「待っ──抜けっ、抜けないれっ<emoji=heart04>\u3000いま抜かれひゃらっ、あぁっ、抜かれひゃらぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기다려혀── 빠지, 빠지지 마혀어<emoji=heart04>\u3000지금 빠져버리며언, 아아, 빠져버리며어어어언<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あふぁっ、あっ、あはぁぁあああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아후아, 앗, 아하아아아아아아아아아아앗～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はふぅぅっっ<emoji=heart04>\u3000おしっこっ、おしっこまで漏らしへしまっへっ……<emoji=heart04>」"
translation = "「하, 하후우우우<emoji=heart04>\u3000오줌, 오줌까지 지려버려혀어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「だかりゃ言いましたのにぃっ……<emoji=heart04>\u3000力入りしゅぎへっ、あふぁぁっ、おしっこ出ちゃうと思ったかりゃぁ……<emoji=heart04>」"
translation = "「그러니까 말했눈데효어어……<emoji=heart04>\u3000힘이 너무 들어가혀어, 아후아아, 오줌 나올 거라구 생각했으니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の背中にぐったり身を預けながら、惚けた顔で砂浜に染みを広げ続けていくイクシー。"
translation = "내 등에 축 늘어져 몸을 맡긴 채, 넋이 나간 얼굴로 모래사장에 얼룩을 계속 넓혀가는 익시."

[[dialogue]]
speaker = "unk"
original = "ぽっかりと開いた肛門からも、白濁が淫らに垂れ続けていた。"
translation = "뻥 하니 벌어진 항문에서도, 백탁액이 음란하게 계속 흘러내리고 있었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「あふぁぁ……<emoji=heart04>\u3000ぜ、全然とまりましぇん……<emoji=heart04>\u3000見ないれ、はぁはぁ、見ないでくだひゃい……<emoji=heart04>」"
translation = "「아후아아……<emoji=heart04>\u3000저, 전혀 안 멈춰혀어……<emoji=heart04>\u3000보지 마혀어, 하아하아, 보지 마줘혀어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「見るなってことは、見てほしいってことでいいんだな？」"
translation = "「보지 말라는 건, 봐달라는 걸로 알아들어도 되겠지?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「～～っっ<emoji=heart04>\u3000か、確認しないでくだひゃい……<emoji=heart04>\u3000会長のいじわるぅ……<emoji=heart04>」"
translation = "「～～윽<emoji=heart04>\u3000화, 확인하지 마줘혀어……<emoji=heart04>\u3000회장님 심술쟁이이……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺に放尿を見られて、イクシーがビクンビクンとやらしく痙攣する。"
translation = "내가 방뇨하는 것을 지켜보자, 익시가 비쿤비쿤 하며 야하게 경련한다."

[[dialogue]]
speaker = "unk"
original = "本当にエッチな彼女だ。だけど、そんな彼女が最高に愛おしい。"
translation = "정말 야한 여자친구다. 하지만 그런 그녀가 최고로 사랑스럽다."

[[dialogue]]
speaker = "クロト"
original = "「この夏は新しいことに挑戦したいんだったよな……。お尻の次は……尿道でも開発してみるか？」"
translation = "「이번 여름엔 새로운 것에 도전하고 싶다고 했었지……. 엉덩이 다음은…… 요도라도 개발해 볼까?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「っっ<emoji=heart04>\u3000そ、そんなこひょされたりゃ私、おトイレいけなくなっちゃいましゅ……<emoji=heart04>\u3000小さいのしゅりゅ時も、大きいのしゅりゅ時も、感じる体になっひゃっへ……<emoji=heart04>」"
translation = "「으으윽<emoji=heart04>\u3000그, 그런 짓 당하며언 나, 화장실 못 가게 되어버려혀어……<emoji=heart04>\u3000작은 거 할 때두, 큰 거 할 때두, 느껴버리는 몸이 되어버려혀어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「れも……はぁはぁ……」"
translation = "「그래두…… 하아하아……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「その分、会長がエッチしてくれるなりゃ、いいれふよ……？\u3000今よりずっひょ、抱いてもらうこひょになりましゅけど……<emoji=heart04>」"
translation = "「그만큼, 회장님이 야한 짓 해준다며언, 괜찮아효어……?\u3000지금보다 훨씬 더어, 안기게 되어버리겠지만요어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "照れたようにおしっこの勢いを強めながら、イクシーがスリスリと甘えてくる。"
translation = "수줍은 듯 오줌발을 더 세게 하며, 익시가 부비부비하며 응석을 부려온다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女への返事代わりに、硬いペニスを擦り付けていく。"
translation = "그런 그녀에게 대답하는 대신, 딱딱한 페니스를 문질러준다."

[[dialogue]]
speaker = "イクシリオン"
original = "「えへへ……<emoji=heart04>\u3000やっぱり会長も、私に負けず劣らずいやらしいれふ……<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04>\u3000역시 회장님두, 나 못지않게 야해효어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「だけりょ……幸せ<emoji=heart04>\u3000会長がエッチな方れ、本当によかっひゃ……<emoji=heart04>」"
translation = "「하지만…… 행복해<emoji=heart04>\u3000회장님이 야한 분이라서, 정말로 다행이혀어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「もっひょ色々なエッチ、しましょうね……<emoji=heart04>\u3000もっひょ会長とイチャイチャしひゃいれふ……<emoji=heart04>」"
translation = "「죠금 더 여러 가지 야한 짓, 해효어……<emoji=heart04>\u3000죠금 더 회장님이랑 꽁냥꽁냥 하고 싶어혀어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「これからも新しいエッチの扉……えへへ<emoji=heart04>\u3000たくさん開けてイキましょう……<emoji=heart04>」"
translation = "「앞으로도 새로운 야한 짓의 문…… 에헤헤<emoji=heart04>\u3000잔뜩 열고 가버려효어……<emoji=heart04>」"

