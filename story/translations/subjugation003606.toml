[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「格闘ゲームで勝負、ですか……？」"
translation = "「격투 게임으로 승부, 인가요……?」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーが提案した勝負は、まさかの格闘ゲームだった。"
translation = "주얼리가 제안한 승부는 뜻밖에도 격투 게임이었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そんなゲーム、私はプレイしたことはありません。私が一方的に負けるだけで勝負にならないのでは……？」"
translation = "「그런 게임, 저는 플레이해 본 적이 없어요. 제가 일방적으로 질 뿐이라 승부가 안 되지 않을까요……?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「果たしてそうだろうか？\u3000やってみなければわからない、ということもある」"
translation = "「과연 그럴까? 해보지 않으면 모르는 일도 있는 법이지.」"

[[dialogue]]
speaker = "unk"
original = "俺にも何故、ジュエリーがこんな提案をしたのかは分からない。"
translation = "나로서도 왜 주얼리가 이런 제안을 했는지 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "だが自信たっぷりの笑みを浮かべている様子を見ると、何か意図があるのだろうと思えてくる。"
translation = "하지만 자신만만한 미소를 띄우고 있는 모습을 보니, 뭔가 의도가 있을 거라는 생각이 든다."

[[dialogue]]
speaker = "unk"
original = "重く考えずに遊んでみたら？"
translation = "깊게 생각하지 말고 즐겨보는 게 어때?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「会長さんがそうおっしゃるなら……」"
translation = "「회장님이 그렇게 말씀하신다면……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふふ、では始めよう。キャラクターを選びたまえ」"
translation = "「후후후, 그럼 시작하지. 캐릭터를 골라주게나.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……では、このキャラクターにします」"
translation = "「……그럼, 이 캐릭터로 할게요.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ほう、いいのかな？\u3000そのキャラクターのコンボはゲーム中最高難易度だと聞いたけれど？」"
translation = "「호오, 괜찮겠나? 그 캐릭터의 콤보는 게임 중 최고 난이도라고 들었네만?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「難しいことは分からないので、おそらく誰を選んでも変わらないと思います」"
translation = "「어려운 건 잘 몰라서, 아마 누굴 골라도 똑같을 거라 생각해요.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そうか。では私は容赦なく最強と呼び声の高いこのキャラクターを選ばせてもらおう」"
translation = "「그런가. 그럼 나는 사정없이 최강이라 불리는 이 캐릭터를 고르도록 하지.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ゲームをするときも、日傘は差したままなんですね？」"
translation = "「게임할 때도 양산은 쓴 채군요?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ、このスタイルに慣れてしまってね。むしろこのスタイルの方がパフォーマンスを出せるんだ」"
translation = "「아아, 이 스타일에 익숙해져서 말이야. 오히려 이 스타일일 때 퍼포먼스가 더 잘 나오지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ではゲーム開始だ」"
translation = "「그럼 게임 개시다.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「どうしたんだい、棒立ちじゃないか。そちらが来ないのなら遠慮なく攻めさせてもらうよ」"
translation = "「왜 그러나, 가만히 서 있기만 하고. 그쪽에서 오지 않는다면 사양 않고 공격하겠네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ふふ、逃げても無駄だよ。飛び道具があるからね。ジャンプで避けるか、ガードしたらどうだい？」"
translation = "「후후, 도망쳐도 소용없어. 원거리 무기가 있으니까 말이야. 점프로 피하거나 가드 하는 게 어떤가?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「あっさり１ラウンド終了だ。いいのかい、このまま何もせず花婿を奪われてしまっても？」"
translation = "「허무하게 1라운드 종료군. 괜찮겠나, 이대로 아무것도 하지 못한 채 신랑을 빼앗겨버려도?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「奪われるもなにも……これはウェディングフォームの解除のためにやっていることですから。そもそも会長さんは私の花婿ではありません」"
translation = "「빼앗긴다니 무슨…… 이건 웨딩 폼의 해제를 위해 하는 거니까요. 애초에 회장님은 제 신랑이 아니에요.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ではキミは助手を快く私に譲ってくれるというのかな？」"
translation = "「그럼 자네는 기꺼이 조수를 나에게 양보해주겠다는 건가?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そんなことを言っている内に、第二ラウンドも端に追い詰められてしまったね。さあ、そこからどうやって窮地を脱するのかな？」"
translation = "「그런 소리를 하는 사이에 제2라운드도 구석으로 몰려버렸군. 자, 거기서 어떻게 궁지를 벗어날 거지?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おや、ようやく足掻きをみせるのかい？\u3000だが、少しばかり遅すぎたようだ。キミはその鳥籠から出ることは出来ない」"
translation = "「오야, 드디어 발버둥을 치는 건가? 하지만 조금 늦은 것 같군. 자네는 그 새장에서 나갈 수 없어.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「このまま一方的に最後まで削ってしまおう。キミは何も出来ないまま、地に倒れ伏すんだ」"
translation = "「이대로 일방적으로 끝까지 깎아버리지. 자네는 아무것도 못한 채 땅에 쓰러지는 걸세.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（ああもう、鬱陶しい！\u3000この……いい加減に、しろっ！！！）"
translation = "(아아 정말, 시끄러워! 이…… 적당히 좀, 하라구!!!)"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「っ！！？\u3000今のを躱したっ！？」"
translation = "「윽!!? 방금 그걸 피했다고!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（ここから……！！）"
translation = "(여기서부터다……!!)"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……やられた。実に見事なコンボだったよ」"
translation = "「……당했군. 실로 훌륭한 콤보였네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（はっ！？\u3000やっちゃった、つい……！）"
translation = "(핫!? 저질렀다, 나도 모르게……!)"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「イレーナさん、やはりこのゲームを日常的にプレイしているね？」"
translation = "「이레이나 양, 역시 이 게임을 일상적으로 플레이하고 있군?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「っ……これは……コントローラーをガチャガチャしていたら、たまたま上手くいって……」"
translation = "「윽…… 이건…… 컨트롤러를 막 눌렀더니 우연히 잘 풀려서……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「対戦前に言ったはずだよ。そのキャラクターのコンボはゲーム中最高難易度だと。偶然で出せるようなものではない」"
translation = "「대전 전에 말했을 텐데. 그 캐릭터의 콤보는 게임 중 최고 난이도라고. 우연히 나올 수 있는 게 아니야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ぅ……」"
translation = "「으……」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私は推理の合間にゲームで気分転換をするのだけど、普段はシミュレーションゲームをプレイしていてね」"
translation = "「나는 추리 틈틈이 게임으로 기분 전환을 하는데, 평소에는 시뮬레이션 게임을 즐기지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「けれどシミュレーションゲームはいかんせんプレイに時間がかかる。そこで最近評判になっている格闘ゲームにも手を出してみた」"
translation = "「하지만 시뮬레이션 게임은 아무래도 플레이 시간이 많이 걸려. 그래서 최근 평판이 좋은 격투 게임에도 손을 대보았네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ある日、私がこのゲームのネット対戦をしていると、興味深い対戦相手に出会った」"
translation = "「어느 날, 내가 이 게임의 넷 대전을 하던 중 흥미로운 대전 상대를 만났지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「圧倒的な技量で追い詰められ、あと一撃で負かされてしまう……と、そんな状況に陥った時、モンスターの出現を告げるアラートが鳴った」"
translation = "「압도적인 기량으로 몰려 한 대만 더 맞으면 지게 되는…… 그런 상황에 빠졌을 때, 몬스터의 출현을 알리는 경보가 울렸어.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「するとどうしたことだろう。その対戦相手はすぐさまゲームを放棄したんだ」"
translation = "「그러자 어떻게 됐겠나. 그 대전 상대는 곧바로 게임을 포기했지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そして私が出撃し、アステラの出現した現場に駆け付けると……そこに先に到着していたのはキミだった」"
translation = "「그리고 내가 출격하여 아스텔라가 출현한 현장에 달려갔더니…… 그곳에 먼저 도착해 있던 건 자네였어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それが、私がこのゲームをプレイしている根拠だと言うのでしょうか？」"
translation = "「그것이 제가 이 게임을 플레이한다는 근거라는 건가요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「その推理は少々強引なように思えます。ただの偶然かもしれませんし、モンスターの出現のアラートを聞いて避難したのかもしれません」"
translation = "「그 추리는 조금 억지스러운 것 같아요. 그냥 우연일 수도 있고, 몬스터 출현 경보를 듣고 피난했을지도 모르잖아요.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そうかもしれない。全世界でプレイされているゲームなのだから、対戦相手と偶然に遭遇する事はそうそうあり得ないだろう」"
translation = "「그럴지도 모르지. 전 세계에서 플레이되는 게임인 만큼 대전 상대와 우연히 마주칠 일은 좀처럼 없을 테니까.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「しかし、どうしても気になってしまってね……しばらくキミを観察していたんだ」"
translation = "「하지만 아무래도 신경이 쓰여서 말이야…… 한동안 자네를 관찰했네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「すると、キミが寝不足の兆候を見せているタイミングが、ランクマッチのシーズンリセットや新しいＤＬＣの配信日と一致することがわかった」"
translation = "「그러자 자네가 수면 부족 징후를 보이는 타이밍이 랭크 매치 시즌 리셋이나 새로운 DLC 배포일과 일치한다는 걸 알게 됐지.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「そしてキミが先ほど見せた見事なコンボは、初心者には到底不可能なものだ」"
translation = "「그리고 자네가 방금 보여준 훌륭한 콤보는 초보자에게는 도저히 불가능한 것이야.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「明確に換言するならば──キミはこのゲームをかなりやり込んでいるプレイヤーだ」"
translation = "「명확하게 환언하자면── 자네는 이 게임을 상당히 깊게 파고든 플레이어다.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………はぁ」"
translation = "「…………하아.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうよ、神官が格ゲーやってたら悪い？」"
translation = "「그래, 신관이 격투 게임 하는 게 나빠?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたの言う通り、あたしは本当の自分を隠してる」"
translation = "「네 말대로 나는 진짜 나를 숨기고 있어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「慈しみ深い聖女なんて真っ赤なウソ。みんなに祭り上げられて仕方なく演じてるだけのエセ聖女」"
translation = "「자비로운 성녀라니 새빨간 거짓말. 다들 추켜세우니까 어쩔 수 없이 연기하고 있는 가짜 성녀라구.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「みんなを騙してる性悪で、口も悪くて、女神様だって信じてない！\u3000それが本当のあたしなのよ！」"
translation = "「모두를 속이고 있는 성격 나쁘고, 입도 험하고, 여신님 같은 거 믿지도 않아! 그게 진짜 나라구!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっと……あたしの正体を暴いておいて、どうしてそっちが唖然としてるわけ？」"
translation = "「잠깐…… 내 정체를 밝혀놓고 왜 그쪽이 멍하니 있는 거야?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「私が伝えたかったのは……聖女らしくない趣味でも隠す必要はない」"
translation = "「내가 전하고 싶었던 건…… 성녀답지 않은 취미라도 숨길 필요는 없다는 거였네.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「助手と一緒に熱中して遊べば、ぎこちなさも取れて夫婦らしく振る舞えるのではないか……ということだったんだが」"
translation = "「조수와 함께 열중해서 놀면 어색함도 사라지고 부부답게 행동할 수 있지 않을까…… 하는 거였는데.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「いやはや、本来のキミはそういう性格だったんだね」"
translation = "「이런 이런, 본래 자네는 그런 성격이었군.」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「明解に換言するならば……私は驚いている」"
translation = "「명쾌하게 환언하자면…… 나는 놀랐네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それじゃ……もしかして……あたしの、自爆？」"
translation = "「그럼…… 설마…… 내 자폭?」"

[[dialogue]]
speaker = "unk"
original = "そういうことっぽいね"
translation = "그런 것 같네."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁああああ～～～～～っ！！？」"
translation = "「하아아아아~~~~~악!!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だって、あんな思わせぶりな言い方をされたら誰だってそう思うじゃない！？」"
translation = "「그치만 그렇게 의미심장하게 말하면 누구라도 그렇게 생각하잖아!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「すまない、こんな事になるとは思わなかった。だが安心して欲しい。この事は決して口外しないと誓おう」"
translation = "「미안하네, 이런 일이 될 줄은 몰랐어. 하지만 안심하게나. 이 일은 결코 발설하지 않겠다고 맹세하지.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いやそういう問題じゃ──」"
translation = "「아니 그런 문제가──」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「おや」"
translation = "「오야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「こんな時にモンスター！？」"
translation = "「이럴 때 몬스터!?」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ここから近いようだし、ウェディングフォームの力を試すチャンスかもしれないね」"
translation = "「여기서 가까운 모양이니 웨딩 폼의 힘을 시험해 볼 찬스일지도 모르겠군.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あーもう、いろいろ立て込んでるところに……！\u3000こうなったらボコボコにしてストレス発散してやるわ！」"
translation = "「아 정말, 여러 가지로 복잡한 판에……! 이렇게 된 거 박살 내서 스트레스나 풀어주겠어!」"

