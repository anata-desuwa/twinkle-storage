[[dialogue]]
speaker = "ルネア"
original = "「あなたたち、中々やるじゃない！！」"
translation = "「너희들, 꽤 하는걸!!」"

[[dialogue]]
speaker = "エグザエル"
original = "「ふむ、あれだけ偉そうに登場してあっさり負けるとは……ルネア様、もしや少々太られましたかな？」"
translation = "「흠, 저렇게 거만하게 등장해서 간단히 패배하다니…… 루네아 님, 혹시 조금 살이 찌셨습니까?」"

[[dialogue]]
speaker = "ルネア"
original = "「トドメの一撃を入れようったって、そうは行かないわ！」"
translation = "「마지막 일격을 가하려고 해도, 그렇게는 안 될걸!」"

[[dialogue]]
speaker = "エグザエル"
original = "「おっ、フッ！！？」"
translation = "「옷, 큿!!?」"

[[dialogue]]
speaker = "ルネア"
original = "「女神の奥の手、エグザエルバリアーーーー！！！」"
translation = "「여신의 비장의 카드, 에그자엘 배리어ーーーー!!!」"

[[dialogue]]
speaker = "エグザエル"
original = "「デストロォォーーーーーーーーーィィイ！！？！？」"
translation = "「데스트로오오ーーーーーーーーーー이이이이!!?!？」"

[[dialogue]]
speaker = "ルネア"
original = "「フッ、天使長エグザエルの体は、すべてのビームと攻撃を遮断するわ」"
translation = "「큭, 천사장 에그자엘의 몸은, 모든 빔과 공격을 차단해」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「凄いわ！\u3000全力ビームだったのに無傷よ！！」"
translation = "「대단해! 전력 빔이었는데 무사해!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですがキャリーケースは完全にデストロイされているのですが、良かったんでしょうか……」"
translation = "「하지만 캐리어 케이스는 완전히 디스트로이 되었습니다만, 괜찮은 것일까요……」"

[[dialogue]]
speaker = "ルネア"
original = "「あれは特別製だもの。すぐに再生するから問題ないわ」"
translation = "「저건 특별 제작이니까. 금방 재생되니 문제없어」"

[[dialogue]]
speaker = "エグザエル"
original = "「我が輩の人権もデストロイですぞーーーーーー！！？」"
translation = "「이 몸의 인권도 디스트로이입니다조ーーーーーー!!?」"

[[dialogue]]
speaker = "ルネア"
original = "「天使長に人権なんてないわ！！\u3000さあ、私のために何度でも砕けなさい！」"
translation = "「천사장에게 인권 따위는 없어!! 자, 나를 위해 몇 번이고 부서지렴!」"

