[[dialogue]]
speaker = "unk"
original = "第４話,ウィステリアと一緒,P"
translation = "제4화, 위스테리아와 함께"

[[dialogue]]
speaker = "unk"
original = "俺はウィステリアさんの新居探しの手伝いで、物件の下見に同行していた。"
translation = "나는 위스테리아 씨의 새집 찾기를 돕기 위해 매물 확인에 동행하고 있었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「新居探し、手伝ってくれてありがとう、会長くん。私じゃ気付かないところを指摘してくれて助かるわ」"
translation = "「집 찾기 도와줘서 고마워, 회장군. 나라면 눈치채지 못했을 부분을 지적해 줘서 도움이 돼」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけど、なかなかいい物件が見つからないわね……」"
translation = "「하지만 좀처럼 좋은 매물이 안 보이네……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「空きがあってもすぐ埋まったり、目星をつけてた物件で水漏れが見つかったり……」"
translation = "「빈방이 있어도 금방 차버리거나 점찍어둔 매물에서 누수가 발견되거나……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それどころか不動産屋さんにトラブルが起きて内見できなかったり……やっぱり呪われてるわ」"
translation = "「그뿐만 아니라 부동산 중개인에게 문제가 생겨서 집을 못 보게 되거나…… 역시 저주받았어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「このままだとリノさんが帰ってきても、居候をすることになりそう……迷惑かけたくないのに……」"
translation = "「이대로라면 리노 씨가 돌아오셔도 계속 얹혀살게 될 것 같아…… 폐 끼치고 싶지 않은데……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「俺としては、ウィステリアさんと長く一緒にいられて幸運……？」"
translation = "「저로서는 위스테리아 씨와 오래 함께 있을 수 있어서 행운……?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もう、会長くんってば……そんなこと言われたら、嬉しくなっちゃうじゃない」"
translation = "「정말, 회장군도 참…… 그런 말을 들으면 기뻐지잖아」"

[[dialogue]]
speaker = "unk"
original = "このまま一緒に住みませんか？"
translation = "이대로 계속 같이 살까요?"

[[dialogue]]
speaker = "ウィステリア"
original = "「えええっ！？」"
translation = "「에에엣!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「魅力的な申し出だけど、さすがにずっとお邪魔になるわけにはいかないし、学園にも一時的なことだって説明してるし……」"
translation = "「매력적인 제안이지만 역시 계속 신세 질 수는 없고 학원에도 일시적인 거라고 설명해 뒀으니까……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そりゃ、君とずっと一緒にいられるのは嬉しいし、至れり尽くせりなんだけど……」"
translation = "「그야 너와 계속 함께 있을 수 있는 건 기쁘고 더할 나위 없지만……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だいたい、私が彼女でいいの？\u3000年上だし、運が悪いし……魔将になったせいでさらに不運になっちゃったし」"
translation = "「애초에 내가 여자친구라도 괜찮겠어? 연상이고 운도 나쁘고…… 마장이 된 탓에 더 불운해졌는데」"

[[dialogue]]
speaker = "unk"
original = "それでも俺はウィステリアさんが好きです"
translation = "그래도 저는 위스테리아 씨가 좋아요"

[[dialogue]]
speaker = "ウィステリア"
original = "「ぁ……」"
translation = "「아……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……ふふ、会長くんには敵わないわね。ありがとう、私も君が好きよ」"
translation = "「……후후, 회장군에게는 못 당하겠네. 고마워, 나도 네가 좋아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でもこのまま一緒に住むのはやめておくわ。２人で住むなら──」"
translation = "「하지만 이대로 같이 사는 건 그만둘게. 둘이서 산다면──」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あら、ウィステリアじゃない」"
translation = "「어머, 위스테리아잖아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、エスメラルダ先輩。こんなところで奇遇──」"
translation = "「아, 에스메랄다 선배. 이런 곳에서 기우──」"

[[dialogue]]
speaker = "キリカ"
original = "「……ウィステリア」"
translation = "「……위스테리아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「げ、キリカ」"
translation = "「게, 키리카」"

[[dialogue]]
speaker = "キリカ"
original = "「露骨に嫌な顔をしないでください。私はあなたに何もしていません」"
translation = "「노골적으로 싫은 티 내지 마세요. 저는 당신에게 아무것도 하지 않았습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そういうあなたこそ嫌そうな顔してるでしょうが。私だって何もしてないわよ」"
translation = "「그러는 당신이야말로 싫은 표정 짓고 있잖아. 나도 아무것도 안 했다고」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「２人は相変わらず仲良しね～」"
translation = "「두 사람은 여전히 사이가 좋네~」"

[[dialogue]]
speaker = "ウィステリア"
original = "「仲良くないですってば！\u3000どうしてエスメラルダ先輩とキリカが一緒にいるんですか？」"
translation = "「사이가 안 좋다니까요! 왜 에스메랄다 선배랑 키리카가 같이 있는 거예요?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「買い出しに出てて、今そこで会ったのよ。本当に偶然ね～」"
translation = "「장 보러 나왔다가 방금 여기서 만났단다. 정말 우연이네~」"

[[dialogue]]
speaker = "キリカ"
original = "「そういうウィステリアこそ、緋宮会長と何をしていたのです？」"
translation = "「그러는 위스테리아야말로 히노미야 회장과 무엇을 하고 있었던 겁니까?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えっ！？\u3000それは……その……キリカには関係ないでしょ」"
translation = "「엣!? 그건…… 그…… 키리카랑은 상관없잖아」"

[[dialogue]]
speaker = "ウィステリア"
original = "（今一緒に住んでるとは言えないし……）"
translation = "(지금 같이 살고 있다고는 말 못 해……)"

[[dialogue]]
speaker = "エスメラルダ"
original = "「リノさんから聞いてるわ。ウィステリアのマンションが住めなくなって、今は会長さんのおうちにお世話になってるのよね」"
translation = "「리노 씨에게 들었단다. 위스테리아의 맨션에 살 수 없게 되어서 지금은 회장님 댁에서 신세 지고 있다면서」"

[[dialogue]]
speaker = "ウィステリア"
original = "「言っちゃった！？」"
translation = "「말해버렸어!?」"

[[dialogue]]
speaker = "キリカ"
original = "「つまり一緒に住んでいると……？\u3000ウィステリア。非常時とはいえ、異性の生徒のところに上がり込むのは不健全ではないですか？」"
translation = "「즉, 함께 살고 있다는……? 위스테리아. 비상시라고는 해도 이성인 학생의 집에 들어앉는 것은 불건전하지 않습니까?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「花嫁騒動やってたあなたには言われたくないわよ！」"
translation = "「신부 소동 벌였던 당신에게는 듣고 싶지 않아!」"

[[dialogue]]
speaker = "キリカ"
original = "「んな……っ！？\u3000それとこれとは関係ないでしょう」"
translation = "「머……!? 그것과 이것은 상관없지 않습니까」"

[[dialogue]]
speaker = "キリカ"
original = "「緋宮会長。ウィステリアが無理やりお邪魔して、迷惑をおかけしていませんか？」"
translation = "「히노미야 회장. 위스테리아가 억지로 눌러앉아 폐를 끼치고 있지는 않습니까?」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんは俺の大事な人ですから"
translation = "위스테리아 씨는 제 소중한 사람이니까요"

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くん……」"
translation = "「회장군……」"

[[dialogue]]
speaker = "キリカ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "キリカ"
original = "「そうですか。それは差し出がましいことを申し上げました。申し訳ありません」"
translation = "「그렇습니까. 제가 참견을 했군요. 죄송합니다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ふふふ。ウィステリアと会長さんも本当に仲良しね♪」"
translation = "「후후후. 위스테리아와 회장님도 정말 사이가 좋네♪」"

[[dialogue]]
speaker = "キリカ"
original = "「ウィステリア。特別な関係だからと調子に乗って羽目を外さないように。節度を持った行動を心がけなさい」"
translation = "「위스테리아. 특별한 관계라고 해서 우쭐해져서 도를 넘지 않도록. 절도 있는 행동을 유념하세요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「わかってるわ！\u3000あなたに言われるまでもないわよ！」"
translation = "「알고 있어! 당신이 말 안 해도 안다고!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「そうそう。さっきの話で思い出したんだけど──」"
translation = "「맞다 맞아. 방금 이야기로 생각났는데──」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「キリカのウェディングフォームも、ウィステリアの魔将フォームも、まだデータを取ってなかったわよね。ぜひデータを取らせて♪」"
translation = "「키리카의 웨딩 폼도 위스테리아의 마장 폼도 아직 데이터를 안 뽑았었지. 꼭 데이터를 뽑게 해줘♪」"

[[dialogue]]
speaker = "キリカ"
original = "「私は買い出しがありますので失礼します」"
translation = "「저는 장 볼 것이 있어서 실례하겠습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、逃げた！\u3000私たちも行きましょ、会長くんっ！」"
translation = "「아, 도망쳤다! 우리도 가자, 회장군!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あ、ちょっと～」"
translation = "「아, 잠깐만~」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ、なんとか逃げられたわね……。探求心に火がついたエスメラルダ先輩は怖いのよ……」"
translation = "「후우, 겨우 도망쳤네……. 탐구심에 불붙은 에스메랄다 선배는 무섭다고……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それにしてもキリカってば、あんな言い方しなくてもいいじゃない。相変わらずうるさいわね」"
translation = "「그나저나 키리카는 정말, 저런 식으로 말 안 해도 되잖아. 여전히 시끄럽다니까」"

[[dialogue]]
speaker = "unk"
original = "キリカ師匠なりに認めてくれたのかと"
translation = "키리카 스승님 나름대로 인정해 주신 게 아닐까요"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうだとしても、素直じゃないったらありゃしないわ」"
translation = "「그렇다고 해도 솔직하지 못하다니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「まぁ、キリカらしいけど」"
translation = "「뭐, 키리카답지만」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でも嬉しかったわ。私のこと、大事な人って言ってくれて」"
translation = "「하지만 기뻤어. 나를 소중한 사람이라고 말해줘서」"

[[dialogue]]
speaker = "ウィステリア"
original = "「さっき言いかけたけど、もし２人で暮らすなら、２人で場所を決めて、２人でそこに住みたいわ」"
translation = "「아까 말하려다 말았는데 만약 둘이서 산다면 둘이서 장소를 정하고 둘이서 그곳에 살고 싶어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「どこに住むとしても、その方が素敵に暮らせそうじゃない？」"
translation = "「어디에 살든 그편이 훨씬 멋지게 살 수 있을 것 같지 않아?」"

[[dialogue]]
speaker = "unk"
original = "俺もその方がいいです！"
translation = "저도 그편이 좋아요!"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふっ、それじゃ将来暮らす場所を考えながら、物件を探しましょうか」"
translation = "「후후, 그럼 장래에 살 곳을 생각하면서 매물을 찾아볼까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「せっかく会長くんと一緒にいられるんだから、時間をかけていろいろ巡ってみたいわ」"
translation = "「기왕 회장군과 함께 있을 수 있는 거니까 시간을 들여서 여기저기 둘러보고 싶어」"

[[dialogue]]
speaker = "unk"
original = "しかし翌日──"
translation = "하지만 다음 날──"

[[dialogue]]
speaker = "ウィステリア"
original = "「え、ここ空いてるの！？\u3000今すぐ決めないと埋まっちゃう？\u3000決めます！\u3000ここに入居します！」"
translation = "「에, 여기 비어 있어!? 지금 당장 안 정하면 나간다고? 정할게요! 여기 입주할게요!」"

[[dialogue]]
speaker = "unk"
original = "ちょうどいい物件がすぐに見つかり、ウィステリアさんとの同居生活はあっさり終わりを告げた。"
translation = "딱 좋은 매물이 금방 발견되어 위스테리아 씨와의 동거 생활은 허무하게 끝을 고했다."

[[dialogue]]
speaker = "ウィステリア"
original = "「もっと会長くんと一緒にいられると思ったのに……やっぱり私って運がないわ～～っ！！」"
translation = "「더 회장군과 함께 있을 수 있을 줄 알았는데…… 역시 나란 여자는 운이 없어~~!!」"

