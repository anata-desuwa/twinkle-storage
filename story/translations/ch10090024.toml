[[dialogue]]
speaker = "unk"
original = "第４話,女社長になっても,P"
translation = "제4화, 여사장이 되어도, P"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いや～。まさかセンパイから連絡をもらえるとは思わなかったよ～」"
translation = "「이야~. 설마 선배한테 연락을 받을 줄은 몰랐어~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でも久しぶりに会えて嬉しかった♪\u3000会長さんのことも紹介できたし♪」"
translation = "「그래도 오랜만에 만나서 기뻤어♪ 회장님도 소개해 줄 수 있었고♪」"

[[dialogue]]
speaker = "unk"
original = "流星学園の元星徒会長さんですっけ？"
translation = "유성 학원의 전 성도회장님이었던가요?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そーそー。今は女社長として働いてる、うちの憧れの人」"
translation = "「맞아 맞아. 지금은 여사장으로 일하고 있는, 내 동경의 대상」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「カジノで知り合った人にセンパイと付き合いのある人がいたらしくてさ。うちが女社長目指して色々と動いてること聞いたみたい」"
translation = "「카지노에서 알게 된 사람 중에 선배랑 아는 사이가 있었나 봐. 내가 여사장을 목표로 이것저것 움직이고 있다는 걸 들은 모양이야」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「今までも何度か相談の電話はしてたんだけど、本気で社長目指すようになってからはあえて連絡しないようにしてたんだよね」"
translation = "「지금까지도 몇 번인가 상담 전화는 했었지만, 본격적으로 사장을 목표로 하게 된 뒤로는 일부러 연락하지 않으려고 했거든」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「立派な社長になってから堂々と会いに行こうと思って。連絡しちゃうと頼り切りになっちゃいそうだったから」"
translation = "「당당하게 사장이 된 다음에 떳떳하게 만나러 가려고. 연락하면 자꾸 의지하게 될 것 같았으니까」"

[[dialogue]]
speaker = "unk"
original = "だから今日も世間話だけだったんですね"
translation = "그래서 오늘도 일상적인 이야기뿐이었군요"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いやいや、うちは隙あらば起業へのアドバイスを聞こうとしてたよ？\u3000でもでもセンパイのノロケ話がとまんなかったじゃん！」"
translation = "「아니 아니, 난 틈만 나면 창업 조언을 들으려고 했다구? 근데 선배의 자기 자랑 섞인 연애담이 멈추질 않았잖아!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ていうかセンパイが結婚してたとか初耳だったんですケド！\u3000まずうちにゆえよ！\u3000結婚式にも呼ばれてないよ！」"
translation = "「그보다 선배가 결혼했다는 건 처음 듣는 소리였다구! 우선 나한테 말했어야지! 결혼식에도 초대 안 받았어!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長時代は『あたしは生涯独身を貫くつもりよ』とかゆってたクセにさ。その割に旦那さんとは学生時代に出会ったとかゆーし」"
translation = "「회장 시절에는 『난 평생 독신으로 지낼 생각이야』 같은 소릴 했으면서 말이야. 그러면서 남편분과는 학생 때 만났다고 하고」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま……大方うちに結婚報告するの恥ずかしかったんだろうけど。結婚式も身内だけで終わらせたとみたね」"
translation = "「뭐…… 보아하니 나한테 결혼 보고 하는 게 부끄러웠던 거겠지만. 결혼식도 친척들끼리만 끝낸 모양이네」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だからきっと誰かにノロケ話を聞いてもらいたくてウズウズしてたんだよ。ものすっごいマシンガントークだったし♪」"
translation = "「그러니까 분명 누군가에게 연애 자랑을 하고 싶어서 좀이 쑤셨던 거야. 엄청난 머신건 토크였는걸♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あれはあれで楽しかったけどね♪\u3000あんなに女の子してるセンパイ、初めてみたよ♪」"
translation = "「그건 그것대로 즐거웠지만 말이야♪ 그렇게 여자여자한 선배, 처음 봤어♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「やっぱし恋は人を変えるもんだね～。あのセンパイがまさかまさかの結婚とは～」"
translation = "「역시 사랑은 사람을 바꾸는 거네~. 그 선배가 설마설마하던 결혼이라니~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だけど……うん。おかげでうちも……」"
translation = "「하지만…… 응. 덕분에 나도……」"

[[dialogue]]
speaker = "unk"
original = "どうしました？"
translation = "왜 그러세요?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「っっ。な、なんでもない。それより行こっ？\u3000暗くなったら危ないし……！」"
translation = "「윽. 아, 아무것도 아니야. 그보다 가자? 어두워지면 위험하니까……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あ……そろそろ分かれ道だね。会長さんと歩いてると、道のりが短いなぁ……」"
translation = "「아…… 슬슬 갈림길이네. 회장님이랑 걷고 있으면, 길이 짧게 느껴져……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あれ。こんなところにお店できてたんだ？\u3000見て見て、ウェディングドレスのオーダーメイドだって」"
translation = "「어라. 이런 곳에 가게가 생겼었네? 봐봐, 웨딩드레스 맞춤 제작이래」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「センパイもこういうの着たのかなぁ。そういえば結婚式の写真は見せてもらえなかったね？\u3000ふふ、恥ずかしかったのかな？」"
translation = "「선배도 이런 걸 입었으려나. 그러고 보니 결혼식 사진은 안 보여줬네? 후후, 부끄러웠던 걸까?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちもいつかこんなドレスを……。ウェディングドレスを着てもいいんだよね……？」"
translation = "「나도 언젠가 이런 드레스를……. 웨딩드레스를 입어도 되는 거겠지……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「実はさ。センパイが結婚したって聞いて安心したんだ。女社長でも結婚しちゃってもいいもんなんだーって」"
translation = "「사실 말이야. 선배가 결혼했다는 소릴 듣고 안심했어. 여사장이라도 결혼해도 되는 거구나 하고」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ほら社長さんって忙しいイメージあるじゃん？\u3000会社を経営する以上、色々考えたり、動いたりしなくちゃいけないし」"
translation = "「봐봐, 사장님은 바쁜 이미지가 있잖아? 회사를 경영하는 이상, 여러 가지 생각하고, 움직여야 하니까」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だからセンパイも生涯独身宣言してるのかなーって思ってたからさ。ま、勘違いだったみたいだけどね？」"
translation = "「그래서 선배도 평생 독신 선언을 한 건가 싶었거든. 뭐, 착각이었던 것 같지만 말이야?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おかげで……うん。一番の悩みの種がなくなっちゃった。センパイの話を聞けて、やっぱり良かったかも……」"
translation = "「덕분에…… 응. 제일 큰 고민거리가 사라졌어. 선배 이야기를 들을 수 있어서 역시 좋았을지도……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……ねえ会長さん。改めて聞くけど、さ……？」"
translation = "「……저기 회장님. 다시 한번 묻겠는데, 말이야……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もしうちが社長になって、会長さんが新星学園卒業したら……パートナーにならない？」"
translation = "「만약 내가 사장이 되고, 회장님이 신성 학원을 졸업하면…… 파트너가 되어주지 않을래?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「今度のパートナーっていうのは、仕事のって意味じゃなくて、その……」"
translation = "「이번 파트너라는 건, 일적인 의미가 아니라, 그……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「その……ね？」"
translation = "「그…… 알지?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「～～っっ。こ、答えは卒業までに聞かせてくれたらいいから……！\u3000ちっとも急ぎじゃないし、まだ早すぎる話だし……！」"
translation = "「~~윽. 대, 대답은 졸업할 때까지 들려주면 되니까……! 전혀 급한 거 아니고, 아직 너무 이른 이야기니까……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んじゃ今日はこれで！\u3000付き合ってくれてありがと！\u3000今日はこのまま１人で帰るから──」"
translation = "「그럼 오늘은 여기까지! 같이 있어 줘서 고마워! 오늘은 이대로 혼자 갈 테니까──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「──ひゃっ！？」"
translation = "「──히얏!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ど……どーしたの？\u3000そんなに抱き締められたら帰れないよ……」"
translation = "「왜…… 왜 그래? 그렇게 껴안으면 못 돌아가잖아……」"

[[dialogue]]
speaker = "unk"
original = "俺もセーラさんのところに永久就職しますから"
translation = "저도 세라 씨네 회사에 평생 취직할 거니까요"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「～～～っっ！？\u3000は、恥ずかしいよ、こんな街中で……。すぐ答え出さなくてもいいってゆったじゃん……」"
translation = "「~~~윽!? 부, 부끄러워, 이런 길 한복판에서……. 바로 대답 안 해도 된다고 했잖아……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でも……えへへ。嬉しい……。その言葉が欲しかったから……」"
translation = "「그래도…… 에헤헤. 기뻐……. 그 말을 듣고 싶었으니까……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん……ちゅっ、んふ……<emoji=heart04>」"
translation = "「응…… 츄, 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「卒業までに、絶対心変わりしないでね……？」"
translation = "「졸업할 때까지, 절대 마음 변하면 안 돼……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「一足先に卒業しちゃうけど……他の女の子に鼻の下伸ばしちゃダメだよ？」"
translation = "「한발 먼저 졸업해버리지만…… 다른 여자애한테 한눈팔면 안 된다?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「こう見えてうち……ウサギちゃんに負けず劣らずけっこー寂しがり屋なんだから。１人にしちゃ……絶対ダメだからね？」"
translation = "「이래 봬도 나…… 토끼짱 못지않게 꽤 외로움을 잘 탄단 말이야. 혼자 두면…… 절대 안 되니까?」"

[[dialogue]]
speaker = "unk"
original = "約束しますよ"
translation = "약속할게요"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふ、うんっ。なら安心だね」"
translation = "「후후, 응. 그럼 안심이네」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ね。やっぱり１人で帰るの寂しいから、家まで送っていって？\u3000遠回りして帰ろ？」"
translation = "「저기. 역시 혼자 가는 건 외로우니까, 집까지 데려다줄래? 멀리 돌아서 가자?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちらの明るい結婚生活の話でもしながら、ゆっくりゆーっくり帰りたいな<emoji=heart04>」"
translation = "「우리들의 밝은 결혼 생활 이야기라도 하면서, 천천히 아주 천천히 가고 싶어<emoji=heart04>」"

