[[dialogue]]
speaker = "unk"
original = "何の事前準備もないまま『ロミオとジュリエット』の稽古が始まった。"
translation = "아무런 사전 준비도 없이 『로미오와 줄리엣』의 연습이 시작되었다."

[[dialogue]]
speaker = "メイプル"
original = "「花の都ヴェローナにて、いずれも劣らぬ名門のモンタギュー家とキャピュレット家！\u3000蔦のように絡む両家の宿怨は、愛し合う男女の命運を狂わせるのであったー！」"
translation = "「꽃의 도시 베로나에, 누구에게도 뒤지지 않는 명문 몬태규 가문과 캐퓰릿 가문! 담쟁이덩굴처럼 얽힌 두 가문의 숙원은 사랑하는 남녀의 운명을 뒤흔들어 놓았으니─!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「よし、ロミオの出番だ」"
translation = "「좋아, 로미오 차례다.」"

[[dialogue]]
speaker = "ベンヴォーリオ"
original = "「やあ、おはよう、ロミオくん」"
translation = "「야아, 안녕, 로미오 군.」"

[[dialogue]]
speaker = "unk"
original = "そんなに早いか？"
translation = "벌써 시간이 그렇게 됐어?"

[[dialogue]]
speaker = "ベンヴォーリオ"
original = "「まだ９時になったばかりだよ」"
translation = "「이제 막 9시가 됐을 뿐이야.」"

[[dialogue]]
speaker = "unk"
original = "気持ちが重い時は、時間が経つのが遅く感じるな"
translation = "마음이 무거울 때는 시간이 느리게 가는 것 같군"

[[dialogue]]
speaker = "ロクサーナ"
original = "「む……？\u3000ちょっと待て。会長、演劇の経験があるのか？」"
translation = "「음……? 잠깐 기다려라. 회장, 연기 경험이 있나?」"

[[dialogue]]
speaker = "unk"
original = "前にアルバイトで少し"
translation = "예전에 아르바이트로 조금"

[[dialogue]]
speaker = "ロクサーナ"
original = "「道理でな、思っていたより悪くない。絶望的な演技力を想像し、怒鳴りつける言葉を用意していたが、どうやら必要なくなった」"
translation = "「어쩐지. 생각보다 나쁘지 않군. 절망적인 연기력을 상상하며 고함을 지를 준비를 하고 있었다만, 아무래도 필요 없어진 모양이다.」"

[[dialogue]]
speaker = "unk"
original = "二言しか喋ってないのに……"
translation = "두 마디밖에 안 했는데……"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私を舐めているのか？\u3000経験者かどうか察するのにだらだらと聞く必要はない。第一声で即わかる」"
translation = "「나를 얕보는 거냐? 경험자인지 아닌지 판단하는 데 구질구질하게 들을 필요는 없다. 첫 마디에 바로 알 수 있지.」"

[[dialogue]]
speaker = "メイプル"
original = "「初めてなのに部長にそこまで言わせるなんて、さっすが、お兄ちゃん！」"
translation = "「처음인데 부장님이 그렇게 말하게 만들다니, 역시 오빠야!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「まだド素人に毛と手足が生えた程度だが……できる奴と分かったからには厳しくいく」"
translation = "「아직 생초보 수준이긴 하다만…… 할 줄 아는 녀석이라는 걸 안 이상 엄하게 하겠다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「いちいち止めていたら、一幕だけで稽古の時間が終わってしまうからな。このままジュリエット登場の三場まで続ける」"
translation = "「일일이 멈췄다간 1막 연습만 하다 끝날 테니까. 이대로 줄리엣이 등장하는 3장까지 계속하지.」"

[[dialogue]]
speaker = "unk"
original = "そして、第三場。藍の扮するジュリエットの出番だ。"
translation = "그리고 제3장. 아이가 분한 줄리엣의 차례다."

[[dialogue]]
speaker = "乳母"
original = "「お嬢様ったら、どこに行かれたんでしょう？\u3000お嬢様ー？\u3000ジュリエット様ーっ！」"
translation = "「아가씨도 참, 어디로 가신 걸까요? 아가씨─? 줄리엣 님─!」"

[[dialogue]]
speaker = "ジュリエット"
original = "「まあ、どうしたの？\u3000誰がお呼び？」"
translation = "「어머, 무슨 일이야? 누가 불러?」"

[[dialogue]]
speaker = "ジュリエット"
original = "「──結婚だなんて！\u3000そんな身に過ぎたこと、考えるどころか、夢に見たことすらありませんわ」"
translation = "「──결혼이라니요! 그런 분에 넘치는 일은 생각하기는커녕 꿈에서조차 본 적도 없답니다.」"

[[dialogue]]
speaker = "ジュリエット"
original = "「──そうね、好きになれるように、お目にかかってみるわ。それで好きになれるものならね」"
translation = "「──그래요, 좋아할 수 있도록 만나 보겠어요. 그걸로 좋아할 수 있는 것이라면요.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「どうだ、会長。藍のヤツ、さっきまでとは、まるで別人だろう？」"
translation = "「어떠냐, 회장. 저 아이, 조금 전까지와는 마치 딴사람 같지?」"

[[dialogue]]
speaker = "unk"
original = "同一人物とは思えない……！"
translation = "동일 인물이라고는 생각되지 않아……!"

[[dialogue]]
speaker = "ロクサーナ"
original = "「くっくっく、いい反応だ。その驚く顔が見たかった！」"
translation = "「큭큭큭, 좋은 반응이다. 그 놀라는 얼굴이 보고 싶었지!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「藍は役の深層まで入り込む憑依型の役者だ。演じているその間、藍は藍でなくなる。名前を呼んでも、振り向かないくらいだ」"
translation = "「아이는 배역의 심층까지 파고드는 빙의형 배우다. 연기하는 동안 아이는 아이가 아니게 되지. 이름을 불러도 뒤돌아보지 않을 정도다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「藍をヒロインに抜擢するなど配役ミスだと思っただろうが、あれほどの類稀な演技力を、たかが男性恐怖症ごときで眠らせておくのは、あまりにも惜しい」"
translation = "「아이를 히로인으로 발탁한 게 배역 실수라고 생각했겠지만, 저 정도의 희귀한 연기력을 고작 남성 공포증 따위로 썩혀두는 건 너무나 아깝다.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なんとしてでも、藍を使えるようにしたい私の意図が理解できただろう？」"
translation = "「어떻게 해서든 아이를 쓸 수 있게 만들려는 내 의도를 이해했겠지?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「──よし、第三場、終了。一旦、休憩にする」"
translation = "「──좋아, 제3장 종료. 일단 휴식하겠다.」"

[[dialogue]]
speaker = "メイプル"
original = "「ふぁ～、やっと休憩～。どう、お兄ちゃん？\u3000あたし、なかなかやるでしょ～！」"
translation = "「후아~ 드디어 휴식~. 어때, 오빠? 나 제법 하지~!」"

[[dialogue]]
speaker = "unk"
original = "変幻自在だね"
translation = "자유자재네"

[[dialogue]]
speaker = "メイプル"
original = "「にへへ♪\u3000お兄ちゃんに褒められた～♪\u3000でも、藍はあたしよりもっとスッゴいんだよ！」"
translation = "「니헤헤♪ 오빠한테 칭찬받았다~♪ 그래도 아이는 나보다 훨씬 더 대단하다구!」"

[[dialogue]]
speaker = "藍"
original = "「あ、ありがとうございます……ジュリエット役は、前にもやったことがあるので……」"
translation = "「고, 고맙습니다…… 줄리엣 역은 전에도 해본 적이 있어서……」"

[[dialogue]]
speaker = "メイプル"
original = "「そうだったんだ！\u3000悲劇のヒロインのジュリエットは、藍にベストマッチだよね！」"
translation = "「그랬구나! 비극의 히로인인 줄리엣은 아이한테 찰떡궁합이지!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「合っているに決まっているだろう。誰がキャスティングしたと思っている。特に今回の脚本は、当て書きだからな」"
translation = "「어울리는 게 당연하지 않느냐. 누가 캐스팅했다고 생각하는 거냐. 특히 이번 각본은 맞춤형이니까 말이다.」"

[[dialogue]]
speaker = "unk"
original = "当て書き？"
translation = "맞춤형?"

[[dialogue]]
speaker = "藍"
original = "「その役を演じる俳優を、あらかじめ決めておいてから脚本を書くことです」"
translation = "「그 역을 맡을 배우를 미리 정해두고 각본을 쓰는 걸 말해요.」"

[[dialogue]]
speaker = "メイプル"
original = "「部長、例えばあたしがジュリエットをやることになったら、また別の脚本になるんですよね？」"
translation = "「부장님, 예를 들어 제가 줄리엣을 하게 되면 또 다른 각본이 되는 거죠?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「当然だが、そもそもお前はジュリエットってタマじゃない。お前を主役に宛がったら、どんな舞台だろうが喜劇になってしまうからな」"
translation = "「당연하지, 애초에 넌 줄리엣 같은 타입이 아니다. 너를 주역으로 앉혔다간 어떤 무대든 코미디가 되어버릴 테니까.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「その分、端役を大量に宛がってやっているというわけだ。台詞数だけなら、ジュリエットとロミオをも凌ぐぞ」"
translation = "「그 대신 단역을 잔뜩 배정해 주지 않았느냐. 대사 수만 따지면 줄리엣과 로미오마저 능가할 거다.」"

[[dialogue]]
speaker = "メイプル"
original = "「演者が少ないから、兼ね役でフォローしてるだけじゃないですか～！」"
translation = "「배우가 적어서 1인 다역으로 때우는 것뿐이잖아요~!」"

[[dialogue]]
speaker = "unk"
original = "第五場。"
translation = "제5장."

[[dialogue]]
speaker = "unk"
original = "あのご婦人は誰なんだ？\n今宵、俺は初めて本当に美しい女性を見た！"
translation = "저 귀부인은 누구지?\\n오늘 밤, 나는 처음으로 진정 아름다운 여인을 보았다!"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ロミオとジュリエットの出会いのシーン。キャピュレット家での仮面舞踏会だ」"
translation = "「로미오와 줄리엣의 만남의 장면. 캐퓰릿 가문에서의 가면무도회다.」"

[[dialogue]]
speaker = "unk"
original = "もし私の手がこの清き御堂を穢したならば\nその罪をどうにか大目に見ていただきたい"
translation = "만약 내 손이 이 거룩한 사당을 더럽혔다면\\n그 죄를 부디 너그러이 보아 주시기를"

[[dialogue]]
speaker = "unk"
original = "如何にも深窓の令嬢なジュリエットを演じる藍と向き合い、手を差し出す。"
translation = "흡사 심방의 영애 같은 줄리엣을 연기하는 아이와 마주하며 손을 내민다."

[[dialogue]]
speaker = "ジュリエット"
original = "「巡礼様に申します。こうして私の手を握──ぴゃっ！？」"
translation = "「순례자님께 아룁니다. 이렇게 제 손을 잡── 퍄악!?」"

[[dialogue]]
speaker = "unk"
original = "俺に触れた途端、藍はウサギのように飛びのき、その手を払った。"
translation = "내게 닿자마자 아이는 토끼처럼 뛰어오르며 그 손을 뿌리쳤다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「カットだ、カット。ロミオの手を払い除けるジュリエットが何処にいる」"
translation = "「컷이다, 컷. 로미오의 손을 뿌리치는 줄리엣이 어디 있나.」"

[[dialogue]]
speaker = "藍"
original = "「ご、ごめんなさいっ……！」"
translation = "「죄, 죄송합니다……!」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんの手に触った瞬間に、魔法が解けたみたいに素に戻っちゃったね」"
translation = "「오빠 손에 닿는 순간 마법이 풀린 것처럼 제정신으로 돌아와 버렸네.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「やはりどれほど役に没頭していても、肉体同士の接触でスイッチが切れるようだな」"
translation = "「역시 아무리 배역에 몰입하고 있어도 육체적 접촉으로 스위치가 꺼지는 모양이군.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「まあ、いい。続けるぞ。出会いの挨拶とばかりにロミオはすかさず、ジュリエットにキスをする」"
translation = "「뭐, 됐다. 계속하자. 만남의 인사랍시고 로미오는 지체 없이 줄리엣에게 키스를 한다.」"

[[dialogue]]
speaker = "藍"
original = "「ぴゃあぁあああぁぁぁぁっ！！？」"
translation = "「퍄아아아아아악!!?」"

[[dialogue]]
speaker = "unk"
original = "ジュリエットが絶対にあげそうにない甲高い悲鳴が響き渡った。"
translation = "줄리엣이 절대 낼 것 같지 않은 날카로운 비명이 울려 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "手も繋げないのに、キスは無理でしょ！？"
translation = "손도 못 잡는데 키스는 무리잖아!?"

[[dialogue]]
speaker = "ロクサーナ"
original = "「減るモノでもあるまいに。キスぐらい、海外じゃ挨拶代わりだろう」"
translation = "「닳는 것도 아닐 텐데. 키스 정도는 외국에선 인사 대신이지 않느냐.」"

[[dialogue]]
speaker = "藍"
original = "「減ります！\u3000大切な何かが減っちゃいますよぅ！」"
translation = "「닳아요! 소중한 무언가가 닳아 없어진다구요!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「やれやれ。このロミオとジュリエットには家同士のしがらみ以上の障害が待ち受けているようだな」"
translation = "「이런이런. 이 로미오와 줄리엣은 가문끼리의 갈등 이상의 장애물이 기다리고 있는 모양이군.」"

[[dialogue]]
speaker = "unk"
original = "なかなか先は長そうだ。"
translation = "갈 길이 꽤 멀어 보인다."

