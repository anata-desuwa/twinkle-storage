[[dialogue]]
speaker = "unk"
original = "それは、なんの変哲もないとある午後のことだった。"
translation = "그것은 아무런 변함없는 어느 오후의 일이었다."

[[dialogue]]
speaker = "unk"
original = "少なくとも俺にとっては。"
translation = "적어도 나에게는."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ、ついにこの日が来たね<emoji=heart04>」"
translation = "「후후, 드디어 이 날이 왔네<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「？？？\u3000今日特別なイベントでもあった？」"
translation = "「??? 오늘 특별한 이벤트라도 있어?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それはもうビッグなイベントが<emoji=heart04>\u3000今日という日をどれだけ待ち侘びたか<emoji=heart04>」"
translation = "「그야말로 빅 이벤트가<emoji=heart04> 오늘이라는 날을 얼마나 기다려왔는지<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "不意にナターシャがぎゅっと密着してきて、股間に手を這わせてくる。"
translation = "불현듯 나타샤가 꽉 밀착해오며, 가랑이 사이로 손을 뻗어온다."

[[dialogue]]
speaker = "クロト"
original = "「ちょっ、んんっ！？\u3000いきなりどこ触って……！？」"
translation = "「잠깐, 으응!? 갑자기 어딜 만지는……!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もちろん、おち○ちんだよ<emoji=heart04>\u3000ふふ、狙い通り性欲ムンムンだ<emoji=heart04>\u3000ちょっと触れただけで、ギンギンに勃起しちゃってる<emoji=heart04>」"
translation = "「물론 자지야<emoji=heart04> 후후, 노린 대로 성욕이 넘쳐흐르네<emoji=heart04> 살짝 만졌을 뿐인데 빳빳하게 발기해버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「これなら上手くいきそう<emoji=heart04>\u3000会長さんの性欲は、イベントの成功に欠かせない要素だからね<emoji=heart04>」"
translation = "「이거라면 잘될 것 같아<emoji=heart04> 회장님의 성욕은 이벤트 성공에 빠질 수 없는 요소니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「だ、だからイベントって一体っ──」"
translation = "「그, 그러니까 이벤트라는 게 대체──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「危険日だよ、き・け・ん・び<emoji=heart04>\u3000私がものすごーく赤ちゃん孕みやすい日ってこと<emoji=heart04>」"
translation = "「위험일이야, 위·험·일<emoji=heart04> 내가 엄─청나게 아기를 임신하기 쉬운 날이라는 거」"

[[dialogue]]
speaker = "ナターシャ"
original = "「今日は会長さんに私を孕ませてもらおうと思って<emoji=heart04>\u3000ずっとチャンスを窺ってたの<emoji=heart04>」"
translation = "「오늘은 회장님한테 나를 임신시켜달라고 하려고<emoji=heart04> 계속 기회를 엿보고 있었어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「孕ませって──っっ！？」"
translation = "「임신이라니──!?」"

[[dialogue]]
speaker = "unk"
original = "戸惑っている間に、ナターシャが俺を押し倒してくる。"
translation = "당황하는 사이에 나타샤가 나를 밀어 넘어뜨린다."

[[dialogue]]
speaker = "unk"
original = "そして、有無を言わさず馬乗りになってきて──"
translation = "그리고 유무를 따지지 않고 말 타기 자세로 올라타서는──"

[[dialogue]]
speaker = "ナターシャ"
original = "「んん……<emoji=heart04>\u3000見るからにやらしいザーメンで金玉パンパンだ……<emoji=heart04>」"
translation = "「으음……<emoji=heart04> 보기에도 야한 정액으로 불알이 빵빵해……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「会長さんとは何度もエッチしてきたけど、今までで一番勃起してくれちゃってる……<emoji=heart04>」"
translation = "「회장님과는 몇 번이나 섹스해왔지만, 지금까지 중에 제일 발기해줬어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ナターシャ、いきなり何を……！？」"
translation = "「나타샤, 갑자기 뭘……!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だから、見ての通りセックスだよ<emoji=heart04>\u3000子作りセックス<emoji=heart04>」"
translation = "「그러니까, 보는 대로 섹스야<emoji=heart04> 애 만들기 섹스<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私、魔王の血筋を絶やさないために、会長さんを監視したり、護衛したりしてるでしょ？」"
translation = "「나, 마왕의 혈통을 끊기지 않게 하려고 회장님을 감시하거나 호위하고 있잖아?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でもそれって、けっこう大変なんだよね。四六時中、会長さんにくっついてないといけないし」"
translation = "「하지만 그거 꽤 힘들거든. 24시간 내내 회장님한테 붙어있어야 하고」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁ最近はそんな時間も悪くないと思ってるけど……それでも、大変なことは大変なんだよね」"
translation = "「뭐 요즘은 그런 시간도 나쁘지 않다고 생각하지만…… 그래도 힘든 건 힘든 거거든」"

[[dialogue]]
speaker = "ナターシャ"
original = "「で、思いついたんだよ。魔王の血筋を残したいなら、私が魔王の子孫を産んじゃえばいいじゃんって<emoji=heart04>」"
translation = "「그래서 생각했어. 마왕의 혈통을 남기고 싶다면, 내가 마왕의 후손을 낳아버리면 되잖아, 라고<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「魔王の子孫を産むって……──んんっ！」"
translation = "「마왕의 후손을 낳는다니……──으응!」"

[[dialogue]]
speaker = "unk"
original = "むわっと妖しい湿気を帯びた割れ目を、ナターシャがいやらしくペニスに擦り付けてくる。"
translation = "후끈하고 묘한 습기를 머금은 가랑이를 나타샤가 음란하게 페니스에 문질러온다."

[[dialogue]]
speaker = "unk"
original = "ビーチの爽やかさとは対照的な艶やかな色香に、思わず股間が反応してしまって……"
translation = "해변의 상쾌함과는 대조적인 요염한 색기에 나도 모르게 가랑이가 반응해버려서……"

[[dialogue]]
speaker = "ナターシャ"
original = "「んふふ<emoji=heart04>\u3000本能に抵抗しようとしても無駄だよ<emoji=heart04>」"
translation = "「응후후<emoji=heart04> 본능에 저항하려고 해도 소용없어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、会長さんは存分に気持ち良くなってくれたらいいよ<emoji=heart04>\u3000責任とか取らなくて大丈夫だから……<emoji=heart04>」"
translation = "「뭐, 회장님은 마음껏 기분 좋아지면 돼<emoji=heart04> 책임 같은 거 안 져도 괜찮으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あなたは、ただ酔ってくれたらいーの……<emoji=heart04>\u3000女を自分の子種で孕ませる、その快感に……ね<emoji=heart04>」"
translation = "「당신은 그저 취해주면 돼……<emoji=heart04> 여자를 자신의 씨앗으로 임신시키는 그 쾌감에…… 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてナターシャは、自身に俺のペニスを沈み込ませて──"
translation = "그리고 나타샤는 자신에게 내 페니스를 가라앉히며──"

[[dialogue]]
speaker = "ナターシャ"
original = "「あぁああんっ……<emoji=heart04>\u3000ふぁっ、あっ、はぁぁあんっっ……<emoji=heart04>」"
translation = "「아아아앙……<emoji=heart04> 화아, 앗, 하아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふふ、挿れた瞬間から、どっくどくっ……<emoji=heart04>\u3000おち○ちん、ものすっごく跳ねてるよ……<emoji=heart04>」"
translation = "「후후후, 삽입한 순간부터 덜컥덜컥……<emoji=heart04> 자지가 엄청나게 뛰고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「油断したら、すぐにでも精子漏れてきそう……<emoji=heart04>」"
translation = "「방심하면 금방이라도 정자가 샐 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でもダーメ、まだダメだからね？\u3000もっと淫らで、もっと濃厚な、つよつよ精子に育ててもらわなくっちゃ……<emoji=heart04>」"
translation = "「하지만 안─돼, 아직 안 되니까? 좀 더 음란하고 좀 더 농후한, 강하디강한 정자로 키워줘야겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ナ、ナターシャ──うぁっ……！？」"
translation = "「나, 나타샤──으아……!?」"

[[dialogue]]
speaker = "unk"
original = "火照ったおま○こでペニスを妖しく刺激してくるナターシャ。"
translation = "달아오른 보지로 페니스를 묘하게 자극해오는 나타샤."

[[dialogue]]
speaker = "unk"
original = "巧みに気持ちいい場所を扱いてくるのに、射精だけはさせないよう締めてきて、もどかしさが募る。"
translation = "교묘하게 기분 좋은 곳을 훑어오면서도, 사정만은 시키지 않으려는 듯 조여와서 애가 탄다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ、ビュービューできなくてちょっと辛い？\u3000だけど、それも今だけだよ<emoji=heart04>」"
translation = "「후후, 뷰뷰 못 해서 좀 힘들어? 하지만 그것도 지금뿐이야<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ただ射精するより、もっとこのおま○この快感味わいたいって……<emoji=heart04>\u3000溜めに溜めた性欲、子宮にぶちまけたいって……<emoji=heart04>」"
translation = "「그냥 사정하는 것보다 좀 더 이 보지의 쾌감을 맛보고 싶다고……<emoji=heart04> 쌓이고 쌓인 성욕을 자궁에 쏟아붓고 싶다고……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そんな風に思えるように、んっ、はぁ、あぁあんっ……<emoji=heart04>\u3000快楽の海に誘ってあげるから……<emoji=heart04>」"
translation = "「그런 생각이 들도록, 응, 하아, 아아앙……<emoji=heart04> 쾌락의 바다로 이끌어줄 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「蕩けるような快感に、溺れさせてあげる……<emoji=heart04>」"
translation = "「녹아내릴 듯한 쾌감에 빠지게 해줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ねっとりとフェラをするように、トロトロの淫肉がペニスを淫らに吸ってくる。"
translation = "끈적하게 펠라치오를 하듯, 걸쭉한 음육이 페니스를 음란하게 빨아들인다."

[[dialogue]]
speaker = "unk"
original = "腰を上下されるたびに、甘くじっとり絡みついてきて、頭がクラクラしてしまう。"
translation = "허리를 위아래로 움직일 때마다 달콤하고 축축하게 엉겨 붙어와서 머리가 어질어질해진다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ほーら、わかる？\u3000今当たってるのが、あぁん、んふぁん、会長さんの子種を受け止める危険日子宮だよ……<emoji=heart04>」"
translation = "「자아, 알겠어? 지금 닿고 있는 게, 아앙, 응화앙, 회장님의 씨앗을 받아낼 위험일 자궁이야……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いつも以上に、んふぁ、あぁあんっ、くぱくぱ開いておち○ちんにかぶりついちゃってるでしょ……<emoji=heart04>」"
translation = "「평소보다 더, 응화, 아아앙, 뻐끔뻐끔 열려서 자지를 집어삼키고 있잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「赤ちゃんの部屋ってね……<emoji=heart04>\u3000排卵してるとこーなっちゃうの……<emoji=heart04>」"
translation = "「아기방이라는 건 말이야……<emoji=heart04> 배란하고 있으면 이렇게 돼버려……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「妊娠させてもらうために、とってもやらしくドロドロになって……<emoji=heart04>\u3000自分からおち○ちんを頬張りに降りていって……<emoji=heart04>」"
translation = "「임신당하기 위해서 아주 야하게 질척질척해져서……<emoji=heart04> 스스로 자지를 머금으러 내려와서는……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あっ、はぁっ、あぁああんっ……<emoji=heart04>\u3000ほら、わかるかな……<emoji=heart04>\u3000わかるでしょ……<emoji=heart04>\u3000私の膣内、いつもより断然、熱を持ってるの……<emoji=heart04>」"
translation = "「앗, 하앗, 아아아앙……<emoji=heart04> 자, 알까나……<emoji=heart04> 알겠지……<emoji=heart04> 내 질 내부, 평소보다 훨씬 열을 띠고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体重を下ろされるごとに、かぷかぷと子宮口が亀頭を甘噛みしてくる。"
translation = "체중을 실어 내릴 때마다 뻐끔뻐끔 자궁구가 귀두를 애무하듯 깨문다."

[[dialogue]]
speaker = "unk"
original = "膣内で糸を引いてるのがわかるくらい、粘っこくてグチョグチョの愛液の感触が伝わってきて、どうにかなってしまいそうだ。"
translation = "질 내부에서 실을 뽑는 게 느껴질 정도로 끈적하고 질척이는 애액의 감촉이 전해져와서 어떻게 되어버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "そしてこの小さな穴の先に、ナターシャの卵子があると思うと、どうしようもなく息が荒くなってしまう。"
translation = "그리고 이 작은 구멍 너머에 나타샤의 난자가 있다고 생각하니 어쩔 수 없이 숨이 거칠어진다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んぁぁんっ……<emoji=heart04>\u3000ビュビュビュって我慢汁噴き出しちゃってるっ……<emoji=heart04>」"
translation = "「응아아앙……<emoji=heart04> 뷰뷰뷰하고 쿠퍼액을 뿜어내고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んふふ、順調に孕ませたい欲が高まってきてるみたいだねっ……<emoji=heart04>」"
translation = "「응후후, 순조롭게 임신시키고 싶은 욕구가 높아지고 있는 모양이네……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「さっきまであんなに戸惑ってたのに、はぁっ、あっ、ふぁああんっ……<emoji=heart04>\u3000どんどんその気になっていってるのわかるよ……<emoji=heart04>」"
translation = "「아까까지 그렇게 당황했으면서, 하앗, 앗, 화아아앙……<emoji=heart04> 점점 그럴 마음이 들어가는 거 다 보여……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私の卵子を受精させたくて、あっ、あっ、あぁぁっ……<emoji=heart04>\u3000会長さんの精子が、おち○ちんが、滾ってきてるのよーくわかるっ……<emoji=heart04>」"
translation = "「내 난자를 수정시키고 싶어서, 앗, 앗, 아아앗……<emoji=heart04> 회장님의 정자가, 자지가 들끓어 오르는 거 아주 잘 보여……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……これ以上続けたらっ……」"
translation = "「큭…… 이 이상 계속했다간……!」"

[[dialogue]]
speaker = "unk"
original = "理性を振り絞って彼女を止めようとするけれど、どんなに力を込めてもその柔らかな体を押し返せない。"
translation = "이성을 쥐어짜 그녀를 멈추려 하지만, 아무리 힘을 줘도 그 부드러운 몸을 밀어낼 수 없다."

[[dialogue]]
speaker = "unk"
original = "むしろもがけばもがくほど、ペニスが深々とナターシャの中に沈み込んでいく。"
translation = "오히려 몸부림치면 칠수록 페니스가 깊숙이 나타샤의 안으로 가라앉는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ、だから会長さんは何も気にしなくていいんだってば……<emoji=heart04>\u3000孕ませた責任とか、後のこととか、考えなくていーの<emoji=heart04>」"
translation = "「후후, 그러니까 회장님은 아무것도 신경 쓰지 않아도 된다니까……<emoji=heart04> 임신시킨 책임이라든가 뒷일 같은 거 생각 안 해도 돼<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もっと原始的な欲望に溺れちゃっていーんだよ……<emoji=heart04>\u3000危険日の女がいて、種づけされたそーに子宮を降ろしてる……<emoji=heart04>」"
translation = "「좀 더 원시적인 욕망에 빠져버려도 된다고……<emoji=heart04> 위험일인 여자가 있고, 씨를 뿌려달라는 듯 자궁을 내리고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「なら、あっ、はぁっ、あぁあっ、考えることはひとつだけでしょっ……<emoji=heart04>」"
translation = "「그럼, 앗, 하앗, 아아앗, 생각할 건 하나뿐이잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「孕ませてやるっておち○ちん昂らせなよっ……<emoji=heart04>\u3000自分のメスにしてやるって、はぁっ、あっ、んぁあんっ、精子みなぎらせなよっ……<emoji=heart04>」"
translation = "「임신시켜주겠다고 자지를 고양시키라고……<emoji=heart04> 자신의 암컷으로 만들어주겠다고, 하앗, 앗, 응아앙, 정자를 미치게 하라고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰遣いがどんどん苛烈になってきて、亀頭に子宮をぶつけられ、理性が削られていく。"
translation = "허리 놀림이 점점 가팔라지고, 귀두에 자궁이 부딪히며 이성이 깎여나간다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あぁあんっ、はぁっ、あはぁあんっ、気持ちいいっ……<emoji=heart04>\u3000会長さんのおち○ちんがどんどん膨らんできてっ……<emoji=heart04>」"
translation = "「아아앙, 하앗, 아하아앙, 기분 좋아……<emoji=heart04> 회장님의 자지가 점점 부풀어 올라서……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私も欲情しちゃうっ……<emoji=heart04>\u3000んぁっ、はぁっ、あぁあんっ、孕ませられたく、なってきちゃうっ……<emoji=heart04>」"
translation = "「나도 발정해버려……<emoji=heart04> 응앗, 하앗, 아아앙, 임신당하고 싶어, 져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もっと、んはぁあんっ、興奮させてあげるねっ……<emoji=heart04>\u3000おち○ちん感じさせてあげるっ……<emoji=heart04>」"
translation = "「더, 응하아앙, 흥분시켜줄게……<emoji=heart04> 자지를 느끼게 해줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私を孕ませることしか考えられなくしてあげるっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「나를 임신시키는 것밖에 생각할 수 없게 해줄게……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとナターシャは、降りっぱなしの子宮とは真逆に、体をぐっと浮かせて──"
translation = "그러자 나타샤는 계속 내려와 있던 자궁과는 반대로 몸을 훅 띄우더니──"

[[dialogue]]
speaker = "ナターシャ"
original = "「あっ、はぁっ、あっ、あっ、あっ、んぁぁああんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 하앗, 앗, 앗, 앗, 응아아아앙!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くあっ、ああああっっ……！！？」"
translation = "「크악, 아아아앗……!!?」"

[[dialogue]]
speaker = "unk"
original = "ビーチ中に卑猥な水音が響きそうなくらい激しく、ナターシャが体を弾ませてくる。"
translation = "해변 전체에 외설적인 물소리가 울려 퍼질 정도로 격렬하게 나타샤가 몸을 튕겨온다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あぁあんっ、気持ちいいっ、イっちゃうっ……<emoji=heart04>\u3000子宮の中まで、あっ、あっ、あっ、おち○ちん入ってきそうっ……<emoji=heart04>」"
translation = "「아아앙, 기분 좋아, 가버려……<emoji=heart04> 자궁 안까지, 앗, 앗, 앗, 자지가 들어올 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「会長さんも、わかるでしょっ……<emoji=heart04>\u3000先っぽが、私の赤ちゃんの部屋に、いっぱい当たってるのっ……<emoji=heart04>」"
translation = "「회장님도 알겠지……<emoji=heart04> 끝부분이 내 아기방에 잔뜩 닿고 있는 거……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ここに直出ししたら、ふぁっ、はぁっ、あぁあっ、妊娠確定だよっ……<emoji=heart04>\u3000あっ、あっ、絶対孕んじゃうからっ……<emoji=heart04>」"
translation = "「여기에 직접 싸버리면, 화앗, 하앗, 아아앗, 임신 확정이야……<emoji=heart04> 앗, 앗, 절대 임신해버릴 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これがナターシャの子宮の感触なのだと思うと、どうしても本能が止められない。"
translation = "이것이 나타샤의 자궁 감촉이라고 생각하니 도저히 본능을 멈출 수 없다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ひゃあぁあんっ……<emoji=heart04>\u3000我慢汁ドピュドピュ出されるだけで、全身焼けそうっ……<emoji=heart04>\u3000子宮に出されるのってこんなにっ……<emoji=heart04>」"
translation = "「히야아앙……<emoji=heart04> 쿠퍼액을 울컥울컥 내뿜는 것만으로 전신이 타버릴 것 같아……<emoji=heart04> 자궁에 싸이는 게 이렇게나……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私も射精、楽しみになってきたっ……<emoji=heart04>\u3000腰、ふぁああんっ、とまんないっ……<emoji=heart04>」"
translation = "「나도 사정이 기대되기 시작했어……<emoji=heart04> 허리가, 화아아앙, 멈추질 않아……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「好きとか嫌いとかっ、恋とか愛とかっ、私には縁のない言葉だと思ってたけどっ……<emoji=heart04>」"
translation = "「좋다느니 싫다느니, 사랑이라느니 애정이라느니, 나랑은 인연이 없는 말이라고 생각했는데……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私も、んぁ、あっ、あっ、一匹のメスだったんだねっ……<emoji=heart04>」"
translation = "「나도, 응아, 앗, 앗, 한 마리의 암컷이었구나……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あなたのおち○ちんで、体が疼いちゃうっ……<emoji=heart04>」"
translation = "「당신의 자지에 몸이 쑤셔버려……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あなたに孕ませて欲しいって、はぁっ、あっ、くはぁあんっ、孕ませられたいって、欲情しちゃうっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신이 임신시켜줬으면 좋겠다고, 하앗, 앗, 쿠하아앙, 임신당하고 싶다고 발정해버려어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつものクールな顔を乱して、あのナターシャがメスの表情で腰を振ってくる。"
translation = "평소의 쿨한 얼굴을 무너뜨리고, 그 나타샤가 암컷의 표정으로 허리를 흔들어 온다."

[[dialogue]]
speaker = "unk"
original = "膣内をキツキツに締めて、俺に孕まされるために精子を搾り出そうとしてきて……！"
translation = "질 내부를 꽉꽉 조이며, 나에게 임신당하기 위해 정자를 짜내려고 하고……!"

[[dialogue]]
speaker = "ナターシャ"
original = "「赤ちゃんっ、作っちゃおうよっ<emoji=heart04>\u3000私を、あっ、はぁっ、んふぁぁっ、あなただけのメスにしちゃおうっ……<emoji=heart04>」"
translation = "「아기, 만들자<emoji=heart04> 나를, 앗, 하앗, 응후아앗, 당신만의 암컷으로 만들어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私はとっくに準備できてるからっ<emoji=heart04>\u3000あなたの赤ちゃん宿す準備っ、あっ、あっ、できてるからっ<emoji=heart04>」"
translation = "「나는 벌써 준비됐으니까<emoji=heart04> 당신의 아기를 잉태할 준비, 앗, 앗, 됐으니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "オスの本能が、メスを孕ませたい欲望が、俺の情欲を真夏の太陽のように燃え上がらせる。"
translation = "수컷의 본능이, 암컷을 임신시키고 싶은 욕망이, 나의 정욕을 한여름의 태양처럼 불타오르게 한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「くひゃっ、あふっ、ああぁあっ<emoji=heart04>\u3000ドクドクいってるっ<emoji=heart04>\u3000おち○ちんに、めいっぱい精子詰まってきてるっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠햣, 아훗, 아아아앗<emoji=heart04> 울컥울컥 거리고 있어<emoji=heart04> 자지에, 정자가 가득 차오르고 있어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おま○こイっちゃうっ<emoji=heart04>\u3000赤ちゃんの部屋っ、あふぁっ、火照ってきちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000たくさん腰振り下ろしちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지 가버려어<emoji=heart04> 아기방이, 아홧, 뜨거워져 버려어<emoji=heart04><emoji=heart04><emoji=heart04> 허리 잔뜩 흔들어 내릴게<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが腰をぶつけてくるたびに、カウパーがとめどなく湧き出す。"
translation = "나타샤가 허리를 부딪쳐 올 때마다, 쿠퍼액이 끝도 없이 솟아 나온다."

[[dialogue]]
speaker = "unk"
original = "卵子の待ち受ける子宮にペニスを打ち込む度に、孕ませたい欲が高まっていく。"
translation = "난자가 기다리는 자궁에 페니스를 박아넣을 때마다, 임신시키고 싶은 욕구가 높아져 간다."

[[dialogue]]
speaker = "ナターシャ"
original = "「はふぁああっ<emoji=heart04>\u3000んあああっ<emoji=heart04>\u3000あぁあああんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000熱いっ<emoji=heart04>\u3000体が溶けてなくなっちゃいそうっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하후아아앗<emoji=heart04> 응아아앗<emoji=heart04> 아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 뜨거워<emoji=heart04> 몸이 녹아서 없어져 버릴 것 같아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「がむしゃらに腰振っちゃうっ<emoji=heart04>\u3000もっと、あっ、あっ、あぁああんっ、あなたを感じさせる腰の振り方、知ってるのにっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「필사적으로 허리를 흔들게 돼<emoji=heart04> 더, 앗, 앗, 아아아앙, 당신을 느끼게 하는 허리 놀림, 알고 있는데도오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だけど、やめられないっ<emoji=heart04>\u3000とまんないっ<emoji=heart04>\u3000バカみたいにおち○ちんに抱きついてっ<emoji=heart04>\u3000キスしてっ、吸い付いてっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하지만, 멈출 수 없어<emoji=heart04> 멈추지 않아<emoji=heart04> 바보처럼 자지에 매달려서<emoji=heart04> 키스하고, 매달리고오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが荒い吐息を漏らしながら、一心不乱に体を浮き沈みさせてくる。"
translation = "나타샤가 거친 숨을 내뱉으며, 일심불란하게 몸을 위아래로 움직인다."

[[dialogue]]
speaker = "unk"
original = "彼女が本気で俺に孕まされたがってるのがわかって、俺の子種を求めているのが伝わってきて、もう我慢できない。"
translation = "그녀가 진심으로 나에게 임신당하고 싶어 하는 것이 느껴지고, 나의 씨앗을 원하고 있다는 것이 전해져 와서, 이제 참을 수 없다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あっ、あっ、あっ、あっ、いいよっ、出してっ<emoji=heart04>\u3000２人の赤ちゃん作ろっ、作っちゃおっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗, 좋아, 내보내 줘<emoji=heart04> 둘의 아기 만들자, 만들자아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「絶対、あはぁあんっ、孕むからぁっ<emoji=heart04>\u3000元気な赤ちゃんっ、ふぁっ、はぁっ、産むからぁっ<emoji=heart04>」"
translation = "「절대, 아하아앙, 임신할 테니까아<emoji=heart04> 건강한 아기, 홧, 하앗, 낳을 테니까아<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「思いっきりぶっかけてっ<emoji=heart04>\u3000私の卵子にぶっかけて、受精させてっ<emoji=heart04>」"
translation = "「마음껏 뿌려줘<emoji=heart04> 내 난자에 뿌려서, 수정시켜줘어<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あなたの孕ませ精子っ<emoji=heart04>\u3000ギンギンに滾ったつよつよザーメンっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신의 임신 정자<emoji=heart04> 빳빳하게 끓어오른 강한 정액<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私の子宮にっ、赤ちゃんの部屋にっ<emoji=heart04>\u3000たくさんっ、たくさんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「내 자궁에, 아기방에<emoji=heart04> 가득, 가득<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「注ぎ込んでえぇぇえっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「부어 넣어줘어어어억~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「くふぁああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あふあっ、ああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠후아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04> 아후앗, 아앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全体重を乗せてくるナターシャを突き上げながら、溜まりに溜まった精子を一気にぶちまける。"
translation = "전 체중을 실어 오는 나타샤를 밀어 올리며, 쌓이고 쌓인 정자를 단번에 쏟아붓는다."

[[dialogue]]
speaker = "ナターシャ"
original = "「あぁああんっ<emoji=heart04>\u3000ヤッバいっ、イクっ、イクぅぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앙<emoji=heart04> 대박이야, 가, 가아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「想像以上にこれっ、あふあぁあっ、幸せでっ<emoji=heart04>\u3000気持ち、よすぎてぇっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「상상 이상으로 이거, 아후아아앗, 행복해서<emoji=heart04> 기분, 너무 좋아아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の精子で彼女の子宮がたぷたぷになっていく感覚があまりにも気持ちいい。"
translation = "나의 정자로 그녀의 자궁이 찰랑찰랑해지는 감각이 너무나도 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "壊れた蛇口のように、ドクドクと精液が噴き出し続けてしまう。"
translation = "고장 난 수도꼭지처럼, 울컥울컥 정액이 계속해서 뿜어져 나온다."

[[dialogue]]
speaker = "ナターシャ"
original = "「着床してるのわかるっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000私の卵子が、あなたの精子とセックスしてるの、お腹で感じるっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「착상하는 거 알겠어……<emoji=heart04><emoji=heart04><emoji=heart04> 내 난자가, 당신의 정자와 섹스하고 있는 거, 배에서 느껴져어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁはっ……あっ、子宮、いっぱいになるぅ……<emoji=heart04>\u3000はぁっ、あっ……んん～～っ……<emoji=heart04>」"
translation = "「하아핫…… 앗, 자궁, 가득 차버려……<emoji=heart04> 하앗, 앗…… 응응~~……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「んふぁぁっっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はぁっ、はぁっ……ふふふっ……<emoji=heart04>\u3000出されすぎて、おち○ちん抜けちゃった……<emoji=heart04>」"
translation = "「응후아아앗……<emoji=heart04><emoji=heart04><emoji=heart04> 하앗, 하앗…… 후후후……<emoji=heart04> 너무 많이 나와서, 자지가 빠져버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「お腹の中、ものすごく熱い……<emoji=heart04>\u3000文字通り受精しちゃった……<emoji=heart04>\u3000会長さんの精子、たっぷり受け止めちゃったよ……<emoji=heart04>」"
translation = "「뱃속이, 엄청 뜨거워……<emoji=heart04> 말 그대로 수정해버렸어……<emoji=heart04> 회장님의 정자, 듬뿍 받아버렸네……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
original = "「本当に私をママにしちゃったね……<emoji=heart04>\u3000パーパ……<emoji=heart04>」"
translation = "「정말로 나를 엄마로 만들어버렸네……<emoji=heart04> 아빠……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蕩けた顔で荒い吐息を漏らしながら、悪戯っぽくナターシャが呟いてくる。"
translation = "황홀해진 얼굴로 거친 숨을 내쉬며, 장난스럽게 나타샤가 중얼거린다."

[[dialogue]]
speaker = "クロト"
original = "「責任はちゃんと取るよ。無責任に終わらせたりしないから──」"
translation = "「책임은 제대로 질게. 무책임하게 끝내지 않을 테니까──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "クロト"
original = "「ナターシャ……？」"
translation = "「나타샤……?」"

[[dialogue]]
speaker = "unk"
original = "息を整えながら、無言で俺を見下ろすナターシャ。"
translation = "숨을 고르며 무언으로 나를 내려다보는 나타샤."

[[dialogue]]
speaker = "unk"
original = "この流れはもしかして──"
translation = "이 흐름은 설마──"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ。ほんとにこんな突然子作りセックスするわけないじゃん。盛り上がっちゃってカワイイ～<emoji=heart04>」"
translation = "「후후. 정말로 이렇게 갑자기 애 만들기 섹스를 할 리가 없잖아. 흥분해버리다니 귀여워~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「やっぱり！」"
translation = "「역시!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁいいじゃん。そのつもりでセックスするの、すっごく気持ち良かったでしょ？」"
translation = "「뭐 어때. 그럴 생각으로 섹스하는 거, 엄청 기분 좋았지?」"

[[dialogue]]
speaker = "クロト"
original = "「それは……確かに……」"
translation = "「그건…… 확실히……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「魔王は過去に天界を脅かした危険な存在。そう簡単に魔王の血族を増やしたら、私が聖庭園に消されちゃうよ」"
translation = "「마왕은 과거에 천계를 위협했던 위험한 존재. 그렇게 쉽게 마왕의 혈족을 늘리면, 내가 성정원에 지워져 버린다고」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でももし聖庭園が、私に魔王の子どもを産めって命令したらその時は──」"
translation = "「하지만 만약 성정원이, 나한테 마왕의 아이를 낳으라고 명령한다면 그때는──」"

[[dialogue]]
speaker = "クロト"
original = "「──ッ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの言葉に本能が反応し、背筋がゾクッと震える。"
translation = "나타샤의 말에 본능이 반응하여, 등줄기가 오싹하게 떨린다."

[[dialogue]]
speaker = "ナターシャ"
original = "「その時はあなたの赤ちゃん、本当に孕んじゃうから。このお腹を大きくして、あなたの子どもを産むよ」"
translation = "「그때는 당신의 아기, 정말로 임신해버릴 테니까. 이 배를 부풀려서, 당신의 아이를 낳을 거야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だからその時は、私のお腹にたっぷり種付けしてね──パ～パ<emoji=heart04>」"
translation = "「그러니까 그때는, 내 배에 듬뿍 씨내리기 해줘──아~빠<emoji=heart04>」"

