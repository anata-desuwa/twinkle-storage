[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ティッシュ配りの後、他のバイトも経験してみたものの──"
translation = "티슈 배포 후에, 다른 아르바이트도 경험해 보았지만──"

[[dialogue]]
speaker = "unk"
original = "メイド喫茶では接客に不向きだからと不採用にされ……"
translation = "메이드 카페에서는 접객에 부적합하다는 이유로 불채용되고……"

[[dialogue]]
speaker = "unk"
original = "電器屋のアウトレットショップでは、商品のことがわからず右往左往し……"
translation = "가전제품 아울렛 샵에서는, 상품에 대해 몰라 우왕좌왕하고……"

[[dialogue]]
speaker = "unk"
original = "守護天使の２人はことごとく上手くいっていないのだった。"
translation = "수호천사 두 사람은 사사건건 일이 잘 풀리지 않는 것이었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「フィーニスの塔と世界の摂理を守護すること以外、私に何ができるのでしょうか」"
translation = "「피니스의 탑과 세계의 섭리를 수호하는 것 외에, 제가 무엇을 할 수 있는 걸까요?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ものすごく大変なお仕事だと思いますけど……」"
translation = "「엄청나게 힘든 일이라고 생각하는데요……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いえ、今はそのフィーニスの塔さえ守れずに堕天使に身を堕としてしまいました。申し訳ありません、私はダメな守護天使です……」"
translation = "「아뇨, 지금은 그 피니스의 탑조차 지키지 못하고 타락천사가 되어버렸습니다. 죄송합니다, 저는 쓸모없는 수호천사예요……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「仕事には大なり小なり専門性があり、まず習得することから始めなければならない。働くことがこれほど難しいとは……ヒトは皆苦労しているのだな」"
translation = "「일에는 크고 작은 전문성이 있어, 우선 습득하는 것부터 시작해야만 하지. 일하는 것이 이토록 어렵다니…… 인간들은 모두 고생하고 있군.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「しかし働いている間に腹が空いたらどうしているのだ？\u3000皆そんなに我慢強いのか？\u3000むぅ……想像を超える忍耐だ」"
translation = "「하지만 일하는 동안에 배가 고파지면 다들 어떻게 하는 거지? 다들 그렇게 인내심이 강한 건가? 흠…… 상상을 초월하는 인내다.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「それはアルモタヘルさんだからのような……」"
translation = "「그건 아르모타헬 씨라서 그런 것 같은데……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「重ね重ね迷惑をおかけしてすみません。私には引きこもってドラマをエンドレス視聴するのがお似合いです……」"
translation = "「거듭 폐를 끼쳐서 죄송합니다. 제게는 방구석에 틀어박혀서 드라마를 엔들리스 시청하는 게 어울려요……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我も働くことを甘く見ていた。我は物を食らうことしか能のない愚鈍な守護天使だ……」"
translation = "「와가도 일하는 것을 우습게 보았다. 와가는 먹는 것밖에 재주가 없는 어리석은 수호천사다……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「うーん、そろそろほんとに教皇庁に怒られそう……」"
translation = "「으음, 이제 정말 교황청에 혼날 것 같아……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「何かちょうどいい仕事はないかなぁ。社会常識があまりなくても大丈夫で、食べ物に関係ない仕事……」"
translation = "「뭔가 딱 적당한 일은 없으려나. 사회 상식이 별로 없어도 괜찮고, 음식과 관련 없는 일……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「うーん……自分でもなかなか無茶を言ってる気がする……」"
translation = "「으음…… 내가 생각해도 꽤 무리한 말을 하는 것 같아……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「一度方針を見直してみよっか。何でもやってみるんじゃなくて、適性から仕事を考えるとか」"
translation = "「일단 방침을 재검토해 볼까. 뭐든 해보는 게 아니라, 적성에 따라 일을 생각한다든지.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「マグダレナさんは良くも悪くも、のんびりしている、おっとりしてるって感じでしょうか」"
translation = "「마그달레나 씨는 좋든 나쁘든, 느긋하다거나 얌전하다는 느낌일까요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「私、そんなにのんびりしているでしょうか？」"
translation = "「제가 그렇게 느긋한가요?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「してるぞ」"
translation = "「그렇다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そんなにはっきり言わなくても……」"
translation = "「그렇게 딱 잘라 말하지 않아도……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（あと天然もあるけど、それは言わないでおこう……）"
translation = "(거기다 천연 속성도 있지만, 그건 말하지 말자……)"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「すみません、何千何万年という時間を生きてきたせいで、ヒトの感覚とはズレているのかもしれません……」"
translation = "「죄송합니다, 수천수만 년이라는 시간을 살아온 탓에, 인간의 감각과는 어긋나 있는 걸지도 모르겠네요……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「守護天使だからスケールが大きいですね……」"
translation = "「수호천사니까 스케일이 크네요……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「アルモタヘルさんは威圧感があるのと、あと食いしん坊なところでしょうか。燃費は義体の性能によるところが大きいと思うけど……」"
translation = "「아르모타헬 씨는 위압감이 있는 거랑, 그리고 먹보인 점일까요. 연비는 의체의 성능에 따른 부분이 크다고 생각하지만……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ううむ、難儀だな。性能を調整するには義体そのものを作り直す必要があるかもしれん」"
translation = "「으음, 난처하군. 성능을 조정하려면 의체 자체를 다시 만들 필요가 있을지도 모르겠어.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「何より我はこの体を気に入っている。我はこの体になって初めて物を食べた。そして味を知った。だから我はヒトに近づくことができた」"
translation = "「무엇보다 와가는 이 몸이 마음에 든다. 와가는 이 몸이 되고 나서 처음으로 음식을 먹었다. 그리고 맛을 알게 되었지. 그래서 와가는 인간에게 다가갈 수 있었다.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「この体は確かに腹が空く。だがその分いろんなものを食し、いろんな味を知ることができる。我はそれがいいのだ」"
translation = "「이 몸은 확실히 배가 고프다. 하지만 그만큼 다양한 것을 먹고, 다양한 맛을 알 수 있지. 와가는 그것이 좋다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「アルモタヘル……」"
translation = "「아르모타헬……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「迷惑をかけているのは承知しているのだが……」"
translation = "「민폐를 끼치고 있다는 건 알고 있다만……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「じゃあそこは今のままで行きましょう」"
translation = "「그럼 그 부분은 지금 그대로 가죠.」"

[[dialogue]]
speaker = "unk"
original = "あっさり！？"
translation = "그렇게 간단히!?"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「守護天使のおふたりの状態が安定しているのは、奇跡のようなものかもしれない。貴重な戦力でもあるんだし、弄って何かあったら本末転倒だから」"
translation = "「수호천사 두 분의 상태가 안정되어 있는 건 기적 같은 일일지도 몰라요. 귀중한 전력이기도 하고, 건드렸다가 무슨 일 생기면 본말전도니까.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「それに、今は個々人の事情に合わせて仕事を選ぶものでしょ」"
translation = "「게다가, 지금은 개인 사정에 맞춰서 일을 선택하는 시대잖아요.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「すまぬな。お前には手間をかけさせる」"
translation = "「미안하군. 너에게 수고를 끼치게 해서.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「まぁ、謝るなら生活費を出してる教皇庁の人に対してですね」"
translation = "「뭐, 사과하신다면 생활비를 대주고 있는 교황청 사람들에게 하세요.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「耳が痛い！」"
translation = "「뼈 아픈 소리군!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「同じくです……」"
translation = "「저도 마찬가지입니다……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「！\u3000ごめん、ちょっと秋葉原に帰らないと」"
translation = "「! 미안, 잠깐 아키하바라로 돌아가야겠어.」"

[[dialogue]]
speaker = "unk"
original = "何かあったんですか？"
translation = "무슨 일이라도 생겼나요?"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「うん、秋葉原の商店街から連絡があってね。アイドルイベントにファンが想定より集まっちゃったらしいの」"
translation = "「응, 아키하바라 상점가에서 연락이 왔는데. 아이돌 이벤트에 팬들이 예상보다 많이 모였나 봐.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「お願いしたイベント会社の人も想定外だったらしくて……もしかしたら大変なことになるかも」"
translation = "「부탁했던 이벤트 회사 사람도 예상 밖이었던 모양이라…… 어쩌면 큰일이 날지도 몰라.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ドローン飛ばして何とか誘導できるかな……。とりあえず帰らなきゃ」"
translation = "「드론을 띄워서 어떻게든 유도할 수 있으려나……. 일단 돌아가야겠어.」"

[[dialogue]]
speaker = "unk"
original = "俺も手伝います"
translation = "저도 도울게요."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「何ができるかわかりませんが……私も力にならせてください」"
translation = "「무엇을 할 수 있을지 모르겠지만…… 저도 힘을 보태게 해주세요.」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ここまで世話になって、何もせぬわけにはいくまい」"
translation = "「여기까지 신세를 지고서 아무것도 안 할 수는 없지.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「皆さん……」"
translation = "「여러분……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「それじゃ、遠慮なく頼らせてもらいますね！\u3000秋葉原のためにお願いします！」"
translation = "「그럼, 사양 않고 도움을 받을게요! 아키하바라를 위해 부탁드려요!」"

