[[dialogue]]
speaker = "unk"
original = "第１３話,可能性の収束,B"
translation = "제13화, 가능성의 수렴"

[[dialogue]]
speaker = "unk"
original = "──効いている。"
translation = "──통하고 있다."

[[dialogue]]
speaker = "unk"
original = "間違いなく、ディザスターハンドにダメージが蓄積されているのがわかる。"
translation = "틀림없이 디재스터 핸드에 대미지가 축적되고 있다는 것을 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "アルタイルの戦力はとうとう、この厄災の化身と渡り合えるまでに成長していた。"
translation = "알타이르의 전력은 마침내 이 재앙의 화신과 맞설 수 있을 정도로 성장해 있었다."

[[dialogue]]
speaker = "煌嶺"
original = "「頃合いだ──厄災よ」"
translation = "「때가 되었구나── 재앙이여.」"

[[dialogue]]
speaker = "煌嶺"
original = "「妾のものとなれ──！！」"
translation = "「소첩의 것이 되어라──!!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の九尾から、以前にも見た火球──機械型モンスターを包み込んだ──が姿を現す。大きさは、あの時と比べるべくもない極大サイズだ。"
translation = "코레이의 구미에서 예전에도 보았던 화구──기계형 몬스터를 집어삼켰던──가 모습을 드러낸다. 크기는 그때와는 비교도 할 수 없는 극대 사이즈다."

[[dialogue]]
speaker = "unk"
original = "そのままディザスターハンドを包み込むが……"
translation = "그대로 디재스터 핸드를 집어삼키지만……"

[[dialogue]]
speaker = "煌嶺"
original = "「ほう、拒むか──」"
translation = "「호오, 거부하는가──」"

[[dialogue]]
speaker = "煌嶺"
original = "（知性のない、意思を持たぬモンスターならばこれで意のままだが──そうか）"
translation = "(지성이 없는, 의지를 갖지 못한 몬스터라면 이것으로 뜻대로 움직이겠다만── 그런가.)"

[[dialogue]]
speaker = "煌嶺"
original = "「ククク……貴様──その<ruby>形<rt>なり</rt></ruby>でまだ生きておるのか？\u3000……興味が尽きん！」"
translation = "「크크크…… 네놈── 그 모습로 아직 살아있는 것이냐? ……흥미가 끊이질 않는구나!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「離れなさい──霊力の鎖をかける！！」"
translation = "「물러나세요── 영력의 사슬을 걸겠어요!!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの霊力による拘束で、厄災の右腕ははっきりとその動きを鈍らせている。"
translation = "루비네의 영력에 의한 구속으로, 재앙의 오른팔은 확연히 그 움직임이 둔해지고 있다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「命令系統は、復活させた……！\u3000でも、くっ……長くは持たない……！」"
translation = "「명령 계통은 부활시켰어……! 하지만, 윽…… 오래 버티지는 못해……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「こいつは何かを破壊する以外は、激しい抵抗をする……！\u3000その場で大人しくしろというのは、もう難しい……！！」"
translation = "「이 녀석은 무언가를 파괴하는 것 이외에는 격렬하게 저항해……! 그 자리에서 얌전히 있으라고 하는 건 이제 어려워……!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そ、そうだっ……！\u3000転送装置でベガに送るのはどうかな！？」"
translation = "「그, 그래……! 전송 장치로 베가에 보내는 건 어떨까!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「いいえ。それは無意味……平行世界の移動はラクシスの持つ、お父様さえ自由にはできない権能……！」"
translation = "「아니요. 그건 무의미해요…… 평행세계의 이동은 락시스가 가진, 아버님조차 자유롭게 할 수 없는 권능……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「転送装置の力も、ディザスターハンドから抽出したものを利用している……ベガに送っても自身の力ですぐに戻ってくるわ！」"
translation = "「전송 장치의 힘도 디재스터 핸드에서 추출한 것을 이용하고 있어요…… 베가에 보내도 자신의 힘으로 금방 돌아올 거예요!」"

[[dialogue]]
speaker = "unk"
original = "この暴れ狂う怪物を拘束できる空間さえあれば……そんな場所、この地球には……"
translation = "이 날뛰는 괴물을 구속할 수 있는 공간만 있다면…… 그런 장소, 이 지구에는……"

[[dialogue]]
speaker = "unk"
original = "──いや！"
translation = "──아니!"

[[dialogue]]
speaker = "クロト"
original = "「ルヴィネ──宇宙だ！\u3000あの天体なら、もしかしたら……！」"
translation = "「루비네── 우주야! 저 천체라면 혹시……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──！\u3000いいアイデアだわ……！」"
translation = "「──! 좋은 아이디어예요……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「命令するわ、厄災の右腕……！\u3000あなたに目的を与えてあげる──一直線で向かいなさい！！」"
translation = "「명령한다, 재앙의 오른팔……! 너에게 목적을 부여해주마── 일직선으로 향하거라!!」"

[[dialogue]]
speaker = "unk"
original = "その天体は、宇宙空間に点在する特異点。"
translation = "그 천체는 우주 공간에 점재하는 특이점."

[[dialogue]]
speaker = "unk"
original = "きわめて高密度で、凄まじい重力を持つ。物質だけでなく光すらも飲み込む漆黒の天体。"
translation = "극도로 고밀도이며, 엄청난 중력을 가진다. 물질뿐만 아니라 빛조차 삼켜버리는 칠흑의 천체."

[[dialogue]]
speaker = "unk"
original = "コラプサーと言えば俺たちになじみが深い──その名を、ブラックホール。"
translation = "콜랩서라고 하면 우리에게 친숙한── 그 이름은 블랙홀."

[[dialogue]]
speaker = "ルヴィネ"
original = "「アドミン・オーバーライド──！！！」"
translation = "「어드민 오버라이드──!!!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが強固に命じた、単純で明快な目的指示。"
translation = "루비네가 강력하게 명령한, 단순하고 명쾌한 목적 지시."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドは、その指示を忠実に受け──地球の外へ放逐された。"
translation = "디재스터 핸드는 그 지시를 충실히 받아── 지구 밖으로 방출되었다."

[[dialogue]]
speaker = "グレイス"
original = "「や、やりました、か……？」"
translation = "「해, 해낸 건가요……?」"

[[dialogue]]
speaker = "チナ"
original = "「……ああ。やった……ルヴィを止められた……死の未来も回避できた……！」"
translation = "「……아아. 해냈어…… 루비를 멈췄어…… 죽음의 미래도 회피했어……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィ……！！」"
translation = "「루비……!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「みんな……ありがとう。それに……本当にごめんなさい……」"
translation = "「모두들…… 고마워요. 그리고…… 정말로 미안해요……」"

[[dialogue]]
speaker = "レティシア"
original = "「もう謝らないで。ルヴィが無事だった。それだけで、十分だわ」"
translation = "「이제 사과하지 마. 루비가 무사했어. 그것만으로 충분해.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ──俺たちの……勝ちだ！！」"
translation = "「아아── 우리들의…… 승리다!!」"

[[dialogue]]
speaker = "梨緒"
original = "「空が……！！\u3000元に、戻った……」"
translation = "「하늘이……!! 원래대로 돌아왔어……」"

[[dialogue]]
speaker = "unk"
original = "地上で獅子奮迅の働きをした梨緒は、アルタイルの勝利を実感していた──"
translation = "지상에서 사자분신의 활약을 펼친 리오는 알타이르의 승리를 실감하고 있었다──"

[[dialogue]]
speaker = "梨緒"
original = "「……ジグが視た未来は回避できたか、ベアト？」"
translation = "「……지그가 보았던 미래는 회피했나 보네, 베아토?」"

[[dialogue]]
speaker = "梨緒"
original = "「いいや、心配することはないな。ベアトのことだ、きっとうまくやっている」"
translation = "「아니, 걱정할 건 없겠지. 베아토니까, 분명 잘 해내고 있을 거야.」"

[[dialogue]]
speaker = "梨緒"
original = "「……流石に、今から登るのは無理だな」"
translation = "「……역시 지금부터 올라가는 건 무리겠네.」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔の入口に腰を下ろした梨緒は、空を見上げる。"
translation = "피니스의 탑 입구에 걸터앉은 리오는 하늘을 올려다본다."

[[dialogue]]
speaker = "梨緒"
original = "「…………綺麗だ」"
translation = "「………… 아름답네.」"

[[dialogue]]
speaker = "unk"
original = "一面の青空をまた見ることができた。"
translation = "일면의 푸른 하늘을 다시 볼 수 있었다."

[[dialogue]]
speaker = "unk"
original = "そのことが、何よりも──"
translation = "그 사실이 무엇보다도──"

[[dialogue]]
speaker = "梨緒"
original = "「…………！？」"
translation = "「…………!?」"

[[dialogue]]
speaker = "梨緒"
original = "「お、終わったんじゃないのか……？\u3000なぜ！？」"
translation = "「끄, 끝난 게 아니었나……? 왜!?」"

[[dialogue]]
speaker = "梨緒"
original = "「────誰だッ！？」"
translation = "「──── 누구냐!?」"

[[dialogue]]
speaker = "unk"
original = "背後に何者かの気配を察し、梨緒がクロスボウを構える。"
translation = "등 뒤에서 누군가의 기척을 감지하고 리오가 크로스보우를 겨눈다."

[[dialogue]]
speaker = "unk"
original = "視線の先にいたのは──"
translation = "시선 끝에 있었던 것은──"

[[dialogue]]
speaker = "梨緒"
original = "「お前は、一体……！？」"
translation = "「너는 대체……!?」"

[[dialogue]]
speaker = "unk"
original = "──理解を拒む、１人の敵。"
translation = "──이해를 거부하는, 한 명의 적."

[[dialogue]]
speaker = "クロト"
original = "「終わったな、ルヴィネ」"
translation = "「끝났네, 루비네.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……ええ。でもまだ、お父様の説得が待っている。むしろここからが本番でしょう」"
translation = "「……네. 하지만 아직 아버님 설득이 기다리고 있어요. 오히려 지금부터가 본편이겠죠.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「緋宮クロト。あなたに預けておくわ。この転送装置」"
translation = "「히노미야 쿠로토. 당신에게 맡겨둘게요. 이 전송 장치.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私にはもう必要ない。世界のために、あなたが使ってくれれば──」"
translation = "「나에게는 이제 필요 없어요. 세계를 위해서 당신이 사용해 준다면──」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………？」"
translation = "「…………?」"

[[dialogue]]
speaker = "クロト"
original = "「ルヴィネ？\u3000急にどうしたんだ、変身を解くなんて」"
translation = "「루비네? 갑자기 왜 그래, 변신을 풀다니.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「いえ……私はそんなこと……していない……」"
translation = "「아니요…… 나는 그런 짓…… 하지 않았……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「どうして……？\u3000霊力が突然、なくなった──？」"
translation = "「어째서……? 영력이 갑자기 사라졌어──?」"

[[dialogue]]
speaker = "？？？"
original = "「──返してもらったのよ。不出来な姉には過ぎた力だもの」"
translation = "「── 돌려받은 거야. 모자란 언니에게는 과분한 힘이니까.」"

[[dialogue]]
speaker = "unk"
original = "聞き覚えのある──しかしまるで聞き覚えのない、そんな声が届いた瞬間。"
translation = "낯익은── 하지만 전혀 낯설기도 한, 그런 목소리가 들려온 순간."

[[dialogue]]
speaker = "ルヴィネ"
original = "「────か、はっ……！？」"
translation = "「──── 커, 헉……!?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの華奢な身体を──幾本もの光の羽根が貫いた。"
translation = "루비네의 가냘픈 몸을── 수많은 빛의 깃털이 꿰뚫었다."

[[dialogue]]
speaker = "unk"
original = "おびただしい量の鮮血が噴きだし──"
translation = "엄청난 양의 선혈이 뿜어져 나오고──"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが──倒れた。"
translation = "루비네가── 쓰러졌다."

[[dialogue]]
speaker = "レティシア"
original = "「……え？」"
translation = "「……에?」"

[[dialogue]]
speaker = "チナ"
original = "「あ……？」"
translation = "「아……?」"

[[dialogue]]
speaker = "グレイス"
original = "「ルッ──」"
translation = "「루──」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィ──！？」"
translation = "「루비──!?」"

[[dialogue]]
speaker = "unk"
original = "血の海で横たわるルヴィネに駆け寄る、極星学園のみんな。"
translation = "피바다 속에 누워있는 루비네에게 달려가는 극성학원의 모두들."

[[dialogue]]
speaker = "unk"
original = "ジグが視た死の未来が、実現──してしまった……？"
translation = "지그가 보았던 죽음의 미래가 실현── 되어버린 것인가……?"

[[dialogue]]
speaker = "unk"
original = "──誰だ、こいつは。"
translation = "── 누구냐, 이 녀석은."

[[dialogue]]
speaker = "？？？"
original = "「仲間を守護天使として連れていく──まさか本気にしていただなんてね。お父様がそんなことを許すはずがないでしょう？」"
translation = "「동료를 수호천사로 데려가겠다니── 설마 진심으로 믿고 있었을 줄이야. 아버님이 그런 걸 허락하실 리가 없잖아?」"

[[dialogue]]
speaker = "？？？"
original = "「貴女はとっくに見限られている。利用できそうだから、今日まで泳がせていたにすぎない」"
translation = "「당신은 진작에 버림받았어. 이용할 가치가 있을 것 같아서 오늘까지 살려두었을 뿐이야.」"

[[dialogue]]
speaker = "？？？"
original = "「お父様はとても失望しておられたわ。友達と離れたくない……リクリエなんて起こしたくない……何を言っているの？\u3000気持ち悪い」"
translation = "「아버님은 무척 실망하셨어. 친구들과 헤어지고 싶지 않아…… 리크리에 따위 일으키고 싶지 않아…… 무슨 소리를 하는 거야? 기분 나빠.」"

[[dialogue]]
speaker = "？？？"
original = "「本当に無様……生命の維持に必要な臓器は全て潰した。そのまま苦しみもがいて、死になさい」"
translation = "「정말 꼴불견이네…… 생명 유지에 필요한 장기는 전부 으깨놓았어. 그대로 괴로워하며 몸부림치다 죽어버려.」"

[[dialogue]]
speaker = "？？？"
original = "「１０年間、お疲れ様……役立たずのルヴィネ。そしてさようなら」"
translation = "「10년 동안 수고했어…… 쓸모없는 루비네. 그리고 작별이야.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「これからは私──新しいルヴィネが、リクリエを引き継ぐわ」"
translation = "「이제부터는 나── 새로운 루비네가 리크리에를 이어받겠어.」"

