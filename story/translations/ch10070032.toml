[[dialogue]]
speaker = "unk"
original = "第２話,ルリエルと海デート～お昼間編～,P"
translation = "제2화, 루리엘과 바다 데이트 ~낮 편~, P"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「バシャバシャ～！\u3000バシャシャ～！」"
translation = "「첨벙첨벙~! 첨벙첨벙~!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぷはぁっ……！\u3000ゴールなのですっ！」"
translation = "「푸하앗……! 골인인 거예요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへ、どうですかぁ？\u3000だいぶ上達してきたと思いません？\u3000バタ足はもう完璧にマスターしちゃいましたよ」"
translation = "「에헤헤, 어때요? 꽤 실력이 늘었다고 생각하지 않으세요? 발차기는 이제 완벽하게 마스터해 버렸다고요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「やっぱり会長さんがゴールになってくれると頑張れちゃいますね。絶対に会長さんのところまで辿り着こうって思いますから」"
translation = "「역시 회장님이 골이 되어주시면 힘이 나네요. 절대로 회장님이 있는 곳까지 도달하자고 생각하게 되니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも、たくさん泳いだので疲れちゃいました。浮いてる余裕もないので、ぎゅ～っと抱き締めて浮き輪の代わりになってくれませんか？」"
translation = "「하지만, 많이 헤엄쳐서 지쳐버렸어요. 떠 있을 여력도 없으니까, 꼬옥 안아서 튜브 대신이 되어주지 않을래요?」"

[[dialogue]]
speaker = "unk"
original = "甘えんぼさんめ"
translation = "어리광쟁이 같으니"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぁん……えへへ、違いますよぉ。会長さんがわたしの足が付かない場所まで泳がせるからじゃないですかぁ」"
translation = "「환…… 에헤헤, 아니에요~. 회장님이 제 발이 닿지 않는 곳까지 헤엄치게 해서 그렇잖아요~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんこそ、わざとこんな場所まで泳がせたんじゃないですか？\u3000わたしに抱きついてもらうために、自分だけが足の付くところをゴールにして」"
translation = "「회장님이야말로, 일부러 이런 곳까지 헤엄치게 한 거 아닌가요? 저에게 안기게 하려고, 자신만 발이 닿는 곳을 골로 정해서」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「前より沖の方に出ちゃってますし……もしかしなくても、わたしと２人きりになりたかったんじゃないですか？」"
translation = "「전보다 먼바다 쪽으로 나와 버렸고…… 혹시라도, 저와 둘이서만 있고 싶었던 거 아닌가요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへ、図星ですか？\u3000図星でしょう！\u3000えいえいっ、もーっとくっついてあげちゃいますぅ～！」"
translation = "「에헤헤, 정곡인가요? 정곡이죠! 에잇에잇, 좀 더 달라붙어 버릴 거예요~!」"

[[dialogue]]
speaker = "unk"
original = "わわわ、溺れる溺れる"
translation = "와와와, 빠진다 빠져"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちょっと～、重そうに聞こえる発言はＮＧですよ。そこは軽い軽いって持ち上げてくれないとです」"
translation = "「정말~, 무겁게 들리는 발언은 NG예요. 거기선 가볍다 가볍다 하며 들어 올려줘야 한다고요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもでも、海ってやっぱり楽しいですね？\u3000プカプカ浮いてるだけでも気持ちいいですし」"
translation = "「그치만 그치만, 바다는 역시 즐겁네요? 둥둥 떠 있는 것만으로도 기분 좋고요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「それに、とーっても静かで……。まるで世界にわたしと会長さんしかいないような気分になっちゃいます」"
translation = "「게다가, 어어엄청 조용해서…… 마치 세상에 저와 회장님밖에 없는 듯한 기분이 되어버려요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ビーチにいる人たちも、わたしたちのことなんて気にしてないでしょうしね。こーして、くっついてたら……ん。１人で泳いでるのか２人で泳いでるのかもわからなそうです」"
translation = "「해변에 있는 사람들도, 우리 일 따위는 신경 쓰지 않겠죠. 이렇게, 달라붙어 있으면…… 음. 혼자서 헤엄치고 있는 건지 둘이서 헤엄치고 있는 건지도 모를 것 같아요」"

[[dialogue]]
speaker = "unk"
original = "ルリエルならすっぽり胸の中に収まるしな"
translation = "루리엘이라면 품 안에 쏙 들어오니까 말이야"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふふ、すっぽり収めて何をするつもりなんですか？\u3000一応お外ですよ、ここ」"
translation = "「후후, 쏙 집어넣어서 뭘 할 셈인가요? 일단 밖이라고요, 여기」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「さっきから、抱っこする振りしてお尻もスリスリされちゃってるような気もしますし……。エッチな彼氏さんですぅ……」"
translation = "「아까부터, 안아주는 척하면서 엉덩이도 부비부비 당하고 있는 듯한 기분도 들고…… 야한 남자친구님이에요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だけど、嬉しいです……。イチャイチャしたくなっちゃいます……」"
translation = "「하지만, 기뻐요…… 꽁냥꽁냥하고 싶어져요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もっとお顔近づけてください。キスしたくなっちゃいました……」"
translation = "「좀 더 얼굴을 가까이해 주세요. 키스하고 싶어졌어요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちゅっ……んっ……んちゅっ……んんっ……<emoji=heart04>」"
translation = "「쪽…… 음…… 음쫔…… 음음…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへ……塩からいです<emoji=heart04>」"
translation = "「에헤헤…… 짭짤해요 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう少しだけ遠くまで泳いでみる？"
translation = "조금만 더 멀리까지 헤엄쳐 볼래?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……溺れさせないでくださいよ？\u3000前に溺れかけちゃった時は、もー海なんかこりごりだーって思っちゃったんですから」"
translation = "「……빠뜨리지 말아주세요? 전에 빠질 뻔했을 때는, 이제 바다 같은 건 질색이다─라고 생각했으니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんに溺れる分には……んっ、ちゅっ<emoji=heart04>\u3000えへへ、構わないですけど……<emoji=heart04>」"
translation = "「회장님에게 빠지는 거라면…… 음, 쪽 <emoji=heart04> 에헤헤, 상관없지만요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほら早く……もっと人気のない場所まで連れていってください？\u3000なんならそこで、キスよりもーっと恋人らしいことも──」"
translation = "「자 어서…… 좀 더 인적 없는 곳까지 데려가 주세요? 이왕이면 거기서, 키스보다 더 연인다운 일도──」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「おふたりともっ、ご無事ですかっ！？」"
translation = "「두 분 다, 무사하십니까!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひぃあっ！？\u3000イ、イクシーさんっ！？」"
translation = "「히익!? 이, 익시 씨!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「もう大丈夫ですよっ、掴まってくださいっ──って、あれ？\u3000溺れてる様子はありませんね？\u3000岸から見た時は確かに──……あっ！」"
translation = "「이제 괜찮아요, 잡으세요── 어라? 빠진 기색은 없네요? 해안에서 봤을 때는 분명──…… 앗!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぇっ！？\u3000ど、どうしたんですかぁ？\u3000何もしてませんよぉ？\u3000わたしたちはただ、水泳の特訓をしていただけですからっ……！」"
translation = "「훼!? 어, 어떻게 된 건가요? 아무것도 안 했어요? 저희는 그저, 수영 특훈을 하고 있었을 뿐이니까요……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「コ、コホン。すみません、私の早とちりでおふたりの濃厚なイチャイチャタイムを邪魔してしまったようですね」"
translation = "「코, 흠. 죄송합니다, 제 짐작으로 두 분의 농후한 꽁냥 타임을 방해해 버린 모양이군요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ちなみにですが……この辺りは無人の小島が多く点在していて、恋人の方々はそちらへ向かわれるそうですよ。ここからならあちらの島が近いと思います」"
translation = "「참고로 말입니다만…… 이 근처는 무인 소도가 많이 산재해 있어서, 연인분들은 그쪽으로 향한다고 하더군요. 여기서라면 저쪽 섬이 가깝다고 생각합니다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「妙な気遣いしないでください！？」"
translation = "「묘한 배려 하지 마세요!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「もしも疲れてビーチへ戻れなくなってしまった際は連絡してくださいね……？\u3000そ、それでは……！」"
translation = "「혹시 지쳐서 해변으로 돌아갈 수 없게 되었을 때는 연락해 주세요……? 그, 그럼……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ですからわたしたちは──って、行ってしまいました」"
translation = "「그러니까 저희는── 어라, 가버렸네요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……それより、どうします？\u3000教えてもらった小島行ってみますか……？」"
translation = "「……그보다, 어떡할까요? 가르쳐준 무인도 가볼까요……?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんが行きたいって言うなら、その……。行くのもやぶさかではありませんけど……」"
translation = "「회장님이 가고 싶다고 하신다면, 그…… 가는 게 싫지는 않지만요……」"

[[dialogue]]
speaker = "unk"
original = "海より人気も……なさそうだしな"
translation = "바다보다 인적도…… 없을 것 같고 말이지"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そ、そうですね。じゃあ、えへへ、そこでゆっくり──……」"
translation = "「그, 그렇네요. 그럼, 에헤헤, 거기서 천천히──……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はあぁ……恋人と２人きりの無人島、きっと戻ってこられる時には２人揃って水着の下まで日焼けしておられて……」"
translation = "「하아아…… 연인과 둘만의 무인도, 분명 돌아오실 때는 두 분이 나란히 수영복 아래까지 타 계시겠죠……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「～～っっ！？\u3000どうしてまだいるんですかぁ！？\u3000戻ったんじゃなかったんですかっ！？」"
translation = "「~~윽!? 어째서 아직 있는 건가요!? 돌아간 거 아니었나요!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ぶ、無事におふたりが無人島に辿り着くのを見送ってから戻ろうと思いまして。これもライフセーバーとしての務めですから……！」"
translation = "「무, 무사히 두 분이 무인도에 도착하는 걸 배웅하고 나서 돌아가려고 생각해서요. 이것도 라이프세이버로서의 임무니까요……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そんなにジロジロ見られて行けるわけないじゃないですかぁっ。というか、そもそも無人島になんて行くつもりありませんしっ……！」"
translation = "「그렇게 빤히 쳐다보는데 갈 수 있을 리 없잖아요. 그보다, 애초에 무인도 같은 데 갈 생각 없거든요……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「今にも向かおうとしていたではありませんか。私のことはその辺のヒトデか何かだと思って、気にせず向かってください……」"
translation = "「당장이라도 향하려 하시지 않았습니까. 저는 그 근처의 불가사리나 무언가라고 생각하시고, 신경 쓰지 말고 향해 주세요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「き、岸に戻ろうとしてただけですっ。ほら行きましょう、会長さんっ……！\u3000わたし、唐突にかき氷が食べたくなってきました……！」"
translation = "「해, 해안으로 돌아가려던 것뿐이에요. 자 가요, 회장님……! 저, 갑자기 빙수가 먹고 싶어졌어요……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あっ、そちらは危険ですっ。その辺りは急に水深が深くなっていて──」"
translation = "「앗, 그쪽은 위험합니다. 그 근처는 갑자기 수심이 깊어져서──」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あぶっ！？\u3000あぶぶぶぶぅぅっっ！！？\u3000お、溺れっ……！！」"
translation = "「어부!? 어부부부부부부웃!!? 빠, 빠진……!!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ルリエルさんっ！？」"
translation = "「루리엘 씨!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うぅ～！\u3000やっぱり海なんて、もうこりごりですよぉ～！！」"
translation = "「으으~! 역시 바다 같은 건, 이제 질색이에요~!!」"

