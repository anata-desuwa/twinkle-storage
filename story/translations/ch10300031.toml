[[dialogue]]
speaker = "unk"
original = "第１話,ナミエルたちのお泊り会,P"
translation = "제1화, 나미엘들의 외박 모임, P"

[[dialogue]]
speaker = "unk"
original = "それは、ナミエルとアムがクリスマスフォームになり、１メートル以上離れられない二人三脚状態になってしまっていた、ある日のこと。"
translation = "그것은, 나미엘과 아무가 크리스마스 폼이 되어, 1미터 이상 떨어질 수 없는 2인 3각 상태가 되어 버렸던, 어느 날의 일이었다."

[[dialogue]]
speaker = "unk"
original = "２人は離れられない状態のままで上手く戦えるようにと、運動場で訓練を行っていた。"
translation = "두 사람은 떨어질 수 없는 상태 그대로 잘 싸울 수 있도록, 운동장에서 훈련을 하고 있었다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「よしっ、ドッジボールの成果が出てるね、ナミエル♪」"
translation = "「좋아읏, 피구의 성과가 나오고 있네, 나미엘♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、アム先輩。これならモンスターが現れても、なんとか戦えそうです。ただ……」"
translation = "「네, 아무 선배. 이 정도라면 몬스터가 나타나도, 어떻게든 싸울 수 있을 것 같습니다. 다만……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「先程からその……強い視線をずっと、背中に感じているのですが……」"
translation = "「아까부터 그…… 강한 시선을 계속, 등 뒤에서 느끼고 있습니다만……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルがチラッと少し離れた物陰に目をやると、そこからこちらを覗き見ている人物が１人。"
translation = "나미엘이 슬쩍 조금 떨어진 그림자에 눈을 돌리자, 그곳에서 이쪽을 엿보고 있는 인물이 한 명."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「じ～っ……」"
translation = "「지이~읏……」"

[[dialogue]]
speaker = "unk"
original = "それは、アムのライバルにしてクラスメイトでもある、附属校３年生の『桜十路エルデリーゼ』であった。"
translation = "그것은, 아무의 라이벌이자 클래스메이트이기도 한, 부속고 3학년의 『사쿠라코지 엘데리제』였다."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「えっと……エルゼ？\u3000なんでわざわざ隠れて覗いてるの？」"
translation = "「어, 에루제? 왜 일부러 숨어서 엿보고 있는 거야?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「い、いえ、別に……私はただ、ライバルであるアムの近況を確認しにきただけですわ」"
translation = "「아, 아니요, 별로…… 저는 그저, 라이벌인 아무의 근황을 확인하러 왔을 뿐입니다만」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え、エルデリーゼ先輩、ごきげんよう」"
translation = "「어, 엘데리제 선배, 안녕하신가요」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「あっ、ナミエル様……ご、ごきげんようですわ」"
translation = "「앗, 나미엘 님…… 아, 안녕하신가요」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「申し訳ございません。私、ナミエル様の訓練を邪魔するつもりはなくて。ですが、その……」"
translation = "「죄송합니다. 저는, 나미엘 님의 훈련을 방해할 생각은 없었습니다. 하지만, 그……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アムのライバルとしては、最近、戦闘訓練ができていなかったので、どのような状況なのか気になってしまいまして……」"
translation = "「아무의 라이벌로서는, 최근, 전투 훈련을 할 수 없었기 때문에, 어떤 상황인지 궁금해져서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「う～ん……そういえば２人って、今まであんまり接点がなかったよね？\u3000――よし！\u3000だったら、エルゼも混ぜて、みんなでお泊り会をしよう！」"
translation = "「으ー음…… 그러고 보니 두 사람은, 지금까지 별로 접점이 없었지? ――좋아! 그렇다면, 엘제도 섞어서, 다 같이 하룻밤 묵는 모임을 하자!」"

[[dialogue]]
speaker_original = "２人"
speaker_translation = "2명"
original = "「えっ……？」"
translation = "「엣……?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まさか、私の部屋でお泊り会を開くことになるなんて……」"
translation = "「설마, 제 방에서 하룻밤 묵는 모임을 열게 될 줄이야……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私、サランお姉様以外のお家にお泊りするのは初めてですわ……！\u3000ワクワク♪」"
translation = "「저는, 사란 언니님 이외의 집에서 묵는 건 처음입니다와……! 두근두근♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（ワクワクしているエルデリーゼ先輩は可愛いので、いいのですが……）"
translation = "（두근거리고 있는 엘데리제 선배는 귀여우니, 괜찮지만……）"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「――改めましてナミエル様、本日は部屋に押しかけるような形になってしまい、申し訳ございませんわ」"
translation = "「――다시 한번 나미엘 님, 오늘은 방에 들이닥치는 모양새가 되어 버려, 죄송합니다와」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ、いえ……！\u3000言い出したのは、アム先輩ですし……」"
translation = "「아, 아니요……! 먼저 말 꺼낸 건, 아무 선배고……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですが、せっかくこうして一緒にお泊り会をする機会を頂けた以上、これを機に私、ナミエル様と親交を深めたいですわ」"
translation = "「하지만, 모처럼 이렇게 함께 묵는 모임을 가질 기회를 얻은 이상, 이를 계기로 저는, 나미엘 님과 친교를 깊게 하고 싶습니다와」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……そうですね。共にリクリエと戦う星騎士として、交流を深めておくことは確かに大事だと、私も思います」"
translation = "「……그렇네요. 함께 리크리에와 싸우는 성기사로서, 교류를 깊게 해 두는 것은 확실히 중요하다고, 저도 생각합니다」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ええ。それでは――ナミエル様のご趣味からお聞きしてもよろしいでしょうか？」"
translation = "「네. 그럼――나미엘 님의 취미부터 여쭤봐도 괜찮을까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え？\u3000はい。えっと……趣味は、たとえば……『勉学に励む』ことでしょうか？」"
translation = "「네? 네. 음…… 취미는, 예를 들면…… 『학업에 힘쓰는』 것일까요?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「まあ！\u3000ナミエル様は勉学にご興味がありますのね♪\u3000私もですわ！\u3000うふふっ♪」"
translation = "「어머! 나미엘 님은 학업에 흥미가 있으시군요♪ 저도입니다와! 우후훗♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あの……エルゼ？\u3000なんかお見合いしてるみたいな感じになってるけど？」"
translation = "「저…… 엘제? 뭔가 맞선 보는 듯한 느낌이 드는데?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ちなみに、ナミエル様はどんな教科がお好みですの？」"
translation = "「덧붙여서, 나미엘 님은 어떤 교과를 좋아하십니까?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そうですね……数学が特に好きでしょうか？\u3000難しい問題の数式が綺麗に解けた時の感覚は、塵１つ残さず掃除を完了させた時の感覚と、通ずるものがあります」"
translation = "「그렇네요…… 수학이 특히 좋을까요? 어려운 문제의 수식이 깔끔하게 풀렸을 때의 감각은, 먼지 하나 남기지 않고 청소를 완료했을 때의 감각과, 통하는 바가 있습니다」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「わかりますわ！\u3000答えが１つに定まる『確実性』ですわよね♪\u3000パズルを解くみたいで、すごく楽しいですの♪」"
translation = "「알겠습니다와! 답이 하나로 정해지는 『확실성』이군요♪ 퍼즐을 푸는 것 같아서, 굉장히 즐겁습니다와♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……！\u3000あの、でしたらエルデリーゼ先輩、よろしければ勉強を教えて頂くことはお願いできますでしょうか？」"
translation = "「……! 저, 그렇다면 엘데리제 선배, 괜찮으시다면 공부를 가르쳐 주시는 것을 부탁드려도 될까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「実は私、附属校３年の範囲まで事前に勉強を進めているのですが、数学でわからない部分があって――」"
translation = "「실은 저는, 부속고 3학년 범위까지 사전에 공부를 진행하고 있는데, 수학에서 모르는 부분이 있어서――」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「は！？\u3000ちょっと待ってナミエル、１年生なのにもうそんな先まで勉強してるの……！？」"
translation = "「하!? 잠깐 기다려 나미엘, 1학년인데 벌써 그렇게 앞까지 공부하고 있는 거야……!?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「す……素晴らしいですわ、ナミエル様！\u3000勉強に対して、そこまでの強い意欲をお持ちだなんて……！\u3000私でよければ、ぜひ協力致しますわ！」"
translation = "「느…… 훌륭하십니다와, 나미엘 님! 공부에 대해서, 그 정도의 강한 의욕을 가지고 계시다니……! 저로 괜찮다면, 꼭 협력하겠습니다와!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ありがとうございます……！\u3000少しお待ち下さい。３年生の履修範囲の問題集で……えっと、この問題なのですが……」"
translation = "「감사합니다……! 잠시만 기다려 주세요. 3학년 이수 범위의 문제집에서…… 음, 이 문제인데요……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「なるほど……これはちょっと、複雑な式ですわね。では、ノートとペンをお借りして……」"
translation = "「과연…… 이건 좀, 복잡한 식입니다와. 그럼, 노트와 펜을 빌려서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「待って待って！\u3000お泊り会なのに、なんか勉強会が始まっているんだけど！？」"
translation = "「기다려 기다려! 묵는 모임인데, 뭔가 공부 모임이 시작되고 있잖아!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――なるほど……！\u3000その数式を使えば、綺麗に解まで繋がるんですねっ……！\u3000さすがです……！」"
translation = "「――과연……! 그 수식을 사용하면, 깔끔하게 해답까지 연결되는군요……! 역시 대단하십니다……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「うふふっ♪\u3000実は私も前に、このタイプの問題で頭を悩ませたことがあったので、その時に解法をしっかりと覚えておきましたの♪」"
translation = "「우후훗♪ 실은 저도 전에, 이 타입의 문제로 골머리를 앓았던 적이 있어서, 그때 해법을 확실히 외워 두었습니다와♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ありがとうございます、エルデリーゼ先輩……！\u3000おかげで綺麗に理解することができました」"
translation = "「감사합니다, 엘데리제 선배……! 덕분에 깔끔하게 이해할 수 있었습니다」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「いえいえ。――ナミエル様、どうか今後は私のことをエルゼとお呼び下さいまし。勉強好きの仲間として、その方が私も嬉しいですわ♪」"
translation = "「별말씀을요. ――나미엘 님, 부디 이제부터는 저를 엘제라고 불러 주십시오. 공부를 좋아하는 동료로서, 그 편이 저도 기쁩니다와♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……！\u3000はい、エルゼ先輩。よろしければ、他の教科などもご相談させて頂いてもよろしいでしょうか？」"
translation = "「……! 네, 엘제 선배. 괜찮으시다면, 다른 교과 등도 상담해 드려도 괜찮을까요?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ふふっ、もちろんですわ♪\u3000私、気の合う素敵な後輩ができて嬉しいですの♪」"
translation = "「후훗, 물론입니다와♪ 저는, 마음이 맞는 멋진 후배가 생겨서 기쁩니다와♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あれ？\u3000なんかナミエル、あたしとよりもエルゼの方と仲良くなってない？」"
translation = "「어라? 뭔가 나미엘, 나랑보다 엘제 쪽이랑 더 친해지지 않았어?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「よろしければ、アム先輩も勉強会に混ざりますか？」"
translation = "「괜찮으시다면, 아무 선배도 공부 모임에 섞이실까요?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「できれば勉強以外でお願いしたいんだけど！？」"
translation = "「가능하면 공부 말고 다른 걸로 부탁하고 싶은데!?」"

[[dialogue]]
speaker = "unk"
original = "こうして、お泊り会を通して、エルデリーゼとも接点ができたナミエルなのだった。"
translation = "이렇게, 묵는 모임을 통해, 엘데리제와도 접점이 생긴 나미엘이었다."

