[[dialogue]]
speaker = "unk"
original = "ヴィーナスの『美鶴の心を開け大作戦』の影響ですっかり美鶴と仲良くなり、恋人になってからしばらくの月日が経った。"
translation = "비너스의 작전 영향으로 미츠루와 완전히 친해져 연인이 된 지도 어느덧 시간이 꽤 흘렀다."

[[dialogue]]
speaker = "unk"
original = "恋仲になってからの彼女の変化は、一番近くで見続けてる俺ですら目を疑うほどだった。"
translation = "연인이 된 후 그녀의 변화는 가장 가까이서 지켜보는 나조차 눈을 의심할 정도였다."

[[dialogue]]
speaker = "unk"
original = "星騎士の任務がない時は、必ず美鶴と放課後デート。"
translation = "성기사 임무가 없을 때는 반드시 미츠루와 방과 후 데이트."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さんの手、あったかい。ぎゅー、ぎゅー」"
translation = "「회장님 손, 따뜻해. 꼬옥, 꼬옥.」"

[[dialogue]]
speaker = "unk"
original = "美鶴の方から積極的に指を絡めてきて、恋人繋ぎで街を練り歩く。"
translation = "미츠루가 먼저 적극적으로 손가락을 얽어오며 연인들의 손잡기 방식으로 거리를 활보한다."

[[dialogue]]
speaker = "unk"
original = "俺の方しか見ていない美鶴は気づいてなさそうだけど、周囲の注目の的だ。"
translation = "나만 바라보고 있는 미츠루는 눈치채지 못한 것 같지만 주변의 시선이 집중되어 있다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さん、クレープ美味しいよ。あーん」"
translation = "「회장님, 크레이프 맛있어. 아~앙.」"

[[dialogue]]
speaker = "unk"
original = "露店で買ったひとつのクレープを仲良く分け合う。今更、間接キス程度じゃ動じない。"
translation = "노점에서 산 크레이프 하나를 사이좋게 나누어 먹는다. 이제 와서 간접 키스 정도론 동요하지 않는다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ほっぺにクリームついてるし。ちゅっ<emoji=heart04>」"
translation = "「뺨에 크림 묻었어. 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クリームを取るという名目で、隙あらばほっぺにキス。"
translation = "크림을 닦아준다는 명목으로 틈만 나면 뺨에 키스."

[[dialogue]]
speaker = "unk"
original = "これまで希薄だった人付き合いの時間を、俺１人から一気に取り返すみたいな怒涛のスキンシップで、ただひたすらに幸せな時間を過ごした。"
translation = "지금까지 희박했던 인간관계의 시간을 나 한 사람에게서 한꺼번에 되찾으려는 듯한 노도와 같은 스킨십으로 오로지 행복한 시간만을 보냈다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、楽しい放課後デートも必ず終わりがやってくる。"
translation = "그렇다고는 해도 즐거운 방과 후 데이트도 반드시 끝이 오기 마련이다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「もうデートおしまい？\u3000お別れすんの、寂しい……」"
translation = "「벌써 데이트 끝이야? 헤어지는 거 아쉬워……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「また明日も会えるよ。メッセージも送るし」"
translation = "「내일 또 만날 수 있잖아. 메시지도 보낼 거고.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「や。会長さんとずっと一緒にいたい……ね、もうちょっとだけ。うちの部屋、寄ってかない？」"
translation = "「아니. 회장님이랑 계속 같이 있고 싶어…… 저기, 조금만 더. 내 방에 들렀다 가지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "名残惜しそうに俺の袖を引っ張り、寂しげな顔をした恋人の提案を拒めるはずもなかった。"
translation = "아쉬운 듯 내 소매를 붙잡고 쓸쓸한 표정을 짓는 연인의 제안을 거절할 수 있을 리 없었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ようこそ、会長さん……ん、ちゅ」"
translation = "「어서 와, 회장님…… 응, 쪽.」"

[[dialogue]]
speaker = "unk"
original = "九浄家の美鶴の部屋へとお邪魔し、ふたりきりになった途端──"
translation = "쿠죠 가문에 있는 미츠루의 방으로 들어가 단둘이 되자마자──"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んぅ……ちゅ、ちゅっ……ん、ちゅぴ、ちゅぱ、ちゅぱっ……ぷぁっ、はぁ……会長さん、好き、好きぃ……<emoji=heart04>」"
translation = "「응으…… 쪽, 쪼옥…… 응, 츄릅, 츄릅, 츄르릅…… 푸핫, 하아…… 회장님, 좋아, 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "街中での優しいキスなんてお遊戯みたいに、お互いを貪るような唾液を舐め回すキスで求め合う。"
translation = "거리에서의 가벼운 키스는 소꿉장난이었던 것처럼 서로를 탐하는 듯 타액을 핥아대는 키스로 서로를 갈구한다."

[[dialogue]]
speaker = "unk"
original = "愛し合ってる恋人同士のサインだ。"
translation = "서로 사랑하는 연인들 사이의 신호다."

[[dialogue]]
speaker = "unk"
original = "彼女の部屋でふたりきりになれば、セックスに雪崩れ込むのは至って自然で、いつも通り。"
translation = "그녀의 방에서 단둘이 있으면 섹스로 이어지는 것은 매우 자연스럽고 평소와 같은 일이었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さんとえっちなチューしたら……うちのおま○こ、くちゅくちゅになっちゃった……恥ずかし」"
translation = "「회장님이랑 야한 뽀뽀 하니까…… 내 보지, 질척질척해져 버렸어…… 부끄러워.」"

[[dialogue]]
speaker = "unk"
original = "大きく開いた股間の中心──サーモンピンク色の割れ目からは熱いとろみが零れていて、股間から太ももにかけて愛液の伝った跡まで残っている。"
translation = "크게 벌린 가랑이의 중심── 살몬 핑크색 틈새에선 뜨거운 진액이 흘러나오고 있고 가랑이에서 허벅지까지 애액이 흐른 자국까지 남아 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デートの時から胸を押し付けてきたり、足を絡めてただろ。最初っからエッチしたくてたまらないの、バレバレだったよ」"
translation = "「데이트할 때부터 가슴을 밀착시키거나 다리를 얽어왔잖아. 처음부터 섹스하고 싶어 못 견디겠다는 거 다 들통났었다고.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「む。そーゆー会長さんだって、デートの途中でおち○ぽムクムクしてたくせに。ちゃんと気づいてるよ」"
translation = "「무. 그런 회장님이야말로 데이트 도중에 자지 불끈불끈하고 있었으면서. 다 알고 있었다고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……手繋いでる時に、美鶴がいやらしい握り方してくるから」"
translation = "「그건…… 손잡고 있을 때 미츠루가 야하게 쥐어오니까.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え。いやらしい握り方なんてしてないし。指と指の間を優しくさわさわしてただけじゃん」"
translation = "「에. 야하게 쥐지 않았어. 손가락 사이사이를 부드럽게 쓰담쓰담했을 뿐이잖아.」"

[[dialogue]]
speaker = "unk"
original = "手先が器用な美鶴のタッチは、とても繊細で、そっと撫でられるだけで思わず股間が反応してしまう。"
translation = "손재주가 좋은 미츠루의 터치는 아주 섬세해서 살짝 어루만져지는 것만으로도 나도 모르게 가랑이가 반응하고 만다."

[[dialogue]]
speaker = "unk"
original = "今に至るまでの前戯はその時から始まっていたというわけだ。"
translation = "지금에 이르기까지의 전희는 그때부터 시작되었던 셈이다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さんの手、あったかくて、安心するし、触ってるだけでとっても気持ちいいから好き」"
translation = "「회장님 손, 따뜻해서 안심되고 만지는 것만으로도 너무 기분 좋으니까 좋아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「手だけで満足なのか？」"
translation = "「손으로만 만족하는 거야?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「会長さん、いじわる」"
translation = "「회장님, 심술궂어.」"

[[dialogue]]
speaker = "unk"
original = "美鶴の指がペニスへと伸び、そっとなぞった。先端から溢れている先走り汁が美鶴の指に絡みつく。"
translation = "미츠루의 손가락이 자지 쪽으로 뻗어 나와 살며시 훑었다. 끝부분에서 스며 나온 쿠퍼액이 미츠루의 손가락에 엉겨 붙는다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「これ……おち○ぽはもっと好き<emoji=heart04>\u3000熱くて、硬くって……うちの知らない奥の奥まで届いて……うちを気持ちよくしてくれるから、だぁい好き……<emoji=heart04>」"
translation = "「이거…… 자지는 훨씬 더 좋아<emoji=heart04> 뜨겁고, 단단하고…… 내가 모르는 저 깊은 안쪽까지 닿아서…… 나를 기분 좋게 해주니까, 정말 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さわさわとまさぐられているだけで、ペニスには大量の血が巡り、限界まで勃起させられてしまう。"
translation = "살랑살랑 어루만져지는 것만으로도, 자지에는 대량의 혈액이 돌아 한계까지 발기해 버리고 만다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「こんな恥ずかしい言葉、いつから言えるようになっちゃったんだろ……おち○ぽなんて、えっちすぎ」"
translation = "「이런 부끄러운 말, 언제부터 할 수 있게 된 걸까…… 자지라니, 너무 야해」"

[[dialogue]]
speaker = "unk"
original = "最初は男性器の名前すら恥ずかしくて言えなかった美鶴が、いつの間にやらここまでの成長を遂げた。"
translation = "처음에는 남성기 이름조차 부끄러워서 말하지 못했던 미츠루가 어느샌가 이만큼의 성장을 이루었다."

[[dialogue]]
speaker = "unk"
original = "彼女をいやらしい方向に変えたのが自分だと思うと、誇らしいやら感慨深いやら申し訳ないやらだ。"
translation = "그녀를 음란한 방향으로 변화시킨 것이 자신이라고 생각하니, 자랑스럽기도 하고 감개무량하기도 하고 미안하기도 하다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちがこんなえっちになっちゃうなんて、思ってなかったし。会長さんがうちのこと、おかしくしちゃったんだからね？\u3000分かってる？」"
translation = "「내가 이렇게 야하게 변해버릴 줄은 몰랐는걸. 회장님이 나를 이상하게 만들어 버린 거니까 말이야? 알고 있어?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「だから……ちゃんと責任取って。いっぱい気持ちよくしてくれなきゃ許してあげなーい……<emoji=heart04>」"
translation = "「그러니까…… 제대로 책임져. 잔뜩 기분 좋게 해주지 않으면 안 용서해 줄 거야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁ、あ……硬ぁいの当たってるし……会長さんのおち○ぽと、うちのおま○こ、チュッチュッしてる……<emoji=heart04>」"
translation = "「하아, 아…… 딱딱한 게 닿고 있고…… 회장님의 자지와 내 보지가 츄츄하고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁ、んぁ……あれ？\u3000や、おち○ぽ逃げちゃダメじゃん……なんで入れてくれないの？」"
translation = "「하아, 응아…… 어라? 자, 자지가 도망가면 안 되잖아…… 왜 안 넣어주는 거야?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ひゃうっ、おち○ぽでお尻ぺちぺちすんのダメ……うちのおま○この場所、分かってるくせに」"
translation = "「히얏, 자지로 엉덩이 찰싹찰싹하는 건 안 돼…… 내 보지 위치, 알고 있으면서」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「焦らすのやだ……おち○ぽ……おち○ぽ早く入れてよ……おま○こ切なくて、苦しいから……このまま、生ぁ、生でいいんだから……ね？」"
translation = "「애태우는 거 싫어…… 자지…… 자지 빨리 넣어줘…… 보지가 애틋하고, 괴로우니까…… 이대로, 생, 생으로 해도 되니까…… 응?」"

[[dialogue]]
speaker = "unk"
original = "美鶴の切ない喘ぎに、理性をとろとろに溶かされる。"
translation = "미츠루의 애절한 신음 소리에 이성이 걸쭉하게 녹아내린다."

[[dialogue]]
speaker = "unk"
original = "俺だって一刻も早く交わりたい。焦らすのも、もう限界だ。"
translation = "나 또한 한시라도 빨리 섞이고 싶다. 애태우는 것도 이제 한계다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁ、はっ……ちょうだい、おち○ぽ……おま○こに直接……生ハメえっち、シて……？」"
translation = "「하아, 하윽…… 줘, 자지…… 보지에 직접…… 노콘 섹스, 해줘……?」"

[[dialogue]]
speaker = "unk"
original = "何度も入れてるから、見えてなくても膣口の位置は分かっている。ぷにぷにの陰唇に、ガチガチのペニスをあてがって──"
translation = "몇 번이나 넣었기에 보지 않고도 질구의 위치는 알고 있다. 말랑말랑한 음순에 딱딱해진 자지를 갖다 대고──"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あっ……！\u3000おち○ぽ、クる……おっきいの、入って、うちのお腹ん中ぁ──」"
translation = "「앗……! 자지, 온다…… 커다란 게, 들어와서, 내 배 속이──」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「──んぁっ！？\u3000ぁ、はぁあぁぁんっ<emoji=heart04>」"
translation = "「──응앗!? 아, 하아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一番太い亀頭が入ってしまえば、あとはぬるりと。愛液に満ちた膣道を一気に突き抜け、最奥の子宮口をノックした。"
translation = "가장 굵은 귀두가 들어가 버리면 그다음은 미끄러지듯. 애액으로 가득 찬 질도를 단숨에 꿰뚫고 가장 안쪽의 자궁구를 노크했다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁ、はっ……あんっ……！\u3000はっ……はぁぁ……ぜぇんぶ入ったぁ……うちのおま○こ……会長さんのでいっぱいに広がっちゃったぁっ……<emoji=heart04>」"
translation = "「하아, 하윽…… 안……! 하윽…… 하아아…… 전부 다 들어왔어…… 내 보지…… 회장님 걸로 가득 벌어져 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んぅ……最初は痛かったのに、もう気持ちいいだけぇ……はぁ、はっ、みっちり埋まってるだけで幸せ……」"
translation = "「응으…… 처음엔 아팠는데, 이젠 기분 좋기만 해…… 하아, 하윽, 꽉 메워져 있는 것만으로도 행복해……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おっきいおち○ぽで、おま○こ広げられちゃうの、『会長さんのものにされた』ってカンジ……きゃんっ<emoji=heart04>」"
translation = "「커다란 자지로 보지가 벌어져 버리는 거, 『회장님의 것이 되었다』는 느낌이야…… 꺄앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手持無沙汰な手で、背後から美鶴のおっぱいを鷲掴む。見た目以上にたっぷりとしたボリュームがあり、抜群の揉み心地だ。"
translation = "심심해진 손으로 뒤에서 미츠루의 가슴을 움켜쥔다. 겉보기보다 훨씬 묵직한 볼륨감이 있어 주무르는 맛이 일품이다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んぅっ……はぁ……会長さん、おっぱいもみもみするの、好きだよね……男の人って、みんなそーなの？」"
translation = "「응으…… 하아…… 회장님, 가슴 조물조물하는 거 좋아하는구나…… 남자들은 다 그래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな好きだと思うよ。女の子の体だから、やっぱり気になっちゃうんだ」"
translation = "「다들 좋아할걸. 여자아이의 몸이니까 역시 신경 쓰이는 법이야.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そーなんだ……その気持ち、分かるかも。あっ、はぁん……うちも会長さんを測った時、男の人の体、気になっちゃったから……」"
translation = "「그렇구나…… 그 마음, 이해할지도. 앗, 하앙…… 나도 회장님 치수를 쟀을 때, 남자의 몸이 신경 쓰였으니까……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁはぁ……腕の太さも、胸板の厚さも、女の人にはついてないお股の出っ張り……おち○ぽも、どうなってるのかなって」"
translation = "「하아 하아…… 팔의 굵기도, 가슴팍의 두께도, 여자한테는 없는 가랑이의 불룩한 부분…… 자지도 어떻게 생겼나 싶어서」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あの時、そんなこと気にしてたんだ。プロの仕事をしてるんじゃなかったの？」"
translation = "「그때 그런 걸 신경 쓰고 있었구나. 프로로서 일하던 게 아니었어?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「う。仕方ないじゃん……あんなのどーしたって、気になっちゃうってば……嗅いだことのない匂いもしてたし」"
translation = "「우. 어쩔 수 없잖아…… 그런 건 아무리 해도 신경 쓰여 버린단 말이야…… 맡아본 적 없는 냄새도 났고」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふ、はぁ……あれからずーっと、会長さんのことが気になっちゃって……大変だったんだよ」"
translation = "「후, 하아…… 그때부터 계속 회장님이 신경 쓰여서…… 큰일이었다니까.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも、あんなに気になってたおち○ぽが、今はうちの膣内に入って……会長さんとひとつになってるのって、すっごく不思議……嬉し……んんっ<emoji=heart04>」"
translation = "「그치만 그렇게 궁금했던 자지가 지금은 내 질 안에 들어와서…… 회장님과 하나가 되어 있다는 게 정말 신기해…… 기뻐…… 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁ、あぁん……！\u3000おま○この壁、ひっかかれてるぅ……！\u3000はぁ、はっ……ぁあぁ、ん、んっ、ふぅ……はぁん……！」"
translation = "「하아, 아앙……! 보지 벽이 긁히고 있어……! 하아, 하윽…… 아아아, 응, 응, 후으…… 하앙……!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁ、はっ、ああぁ……おち○ぽ、きもちいい、きもちいい……！\u3000はぁ、あんっ、深ぁいとこまで……子宮の入り口に、ゴツゴツ当たるのっ……<emoji=heart04>」"
translation = "「하아, 하윽, 아아아…… 자지, 기분 좋아, 기분 좋아……! 하아, 앙, 깊은 곳까지…… 자궁 입구에 울퉁불퉁 닿고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁっ、あぁん！\u3000や、勝手にえっちな声、出ちゃう……ひぁ！\u3000あ、あぁっ……んぁ、ひゃ、あ、はぁぁんっ！」"
translation = "「하앗, 아앙! 야, 멋대로 야한 목소리가 나와 버려…… 히아! 아, 아앗…… 응아, 히야, 아, 하아아앙!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んゃ、らっ、らめぇ！\u3000すぐ、おかひくっ、おかひくなる！\u3000おち○ぽ、きもちよすぎだよぉ……<emoji=heart04>」"
translation = "「응냐, 아, 안 돼! 금방, 이항해, 이상해져! 자지, 너무 기분 좋단 말이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「勝手に、んっ！\u3000声おっきくなっちゃう……あんまり大きな声出したら、他の人に聞かれちゃうかもなのに……」"
translation = "「멋대로, 응! 목소리가 커져 버려…… 너무 크게 소리 내면 다른 사람이 들을지도 모르는데……」"

[[dialogue]]
speaker = "unk"
original = "九浄家の屋敷には何人もの使用人がいて、学園での知り合いだって何人もいる。"
translation = "쿠죠 가문의 저택에는 수많은 고용인이 있고 학원 지인들도 여럿 있다."

[[dialogue]]
speaker = "unk"
original = "俺と美鶴の関係は既に周知だ。美鶴の部屋から喘ぎ声が聞こえてきたら、俺と美鶴が情事に耽っているのもバレバレだろう。"
translation = "나와 미츠루의 관계는 이미 공공연한 사실이다. 미츠루의 방에서 신음 소리가 들려온다면 나와 미츠루가 정사에 빠져 있다는 것도 뻔히 들통날 것이다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んぅ！\u3000やっぱ、無理っ、無理ぃっ、声我慢できないし……ぁん！\u3000はぁっ、はぅ、おま○こっ、おま○こきもちよしゅぎて……んぃぅぅんッッッ<emoji=heart04><emoji=heart04>」"
translation = "「응으! 역시, 무리야, 무리이, 목소리 참을 수 없어…… 앙! 하앗, 하으, 보지, 보지 너무 기분 좋아서…… 응이우으응으으으윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛液だろうか。潮だろうか。股間の辺りで温かな飛沫が散った。"
translation = "애액일까, 오줌일까. 가랑이 주변으로 따뜻한 물보라가 튀었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ん、ひぅ……軽く、イッちゃったぁ……<emoji=heart04>\u3000ずっと、おち○ぽ欲しくて、うずうずしてたから……おま○こ、敏感になりすぎ……<emoji=heart04>」"
translation = "「응, 히으…… 가볍게 가버렸어……<emoji=heart04> 계속 자지 갖고 싶어서 근질근질했으니까…… 보지가 너무 예민해졌어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あっ、んぁ、はぁ……うちの体全部、おち○ぽの槍で貫かれてるみたいで……きもちよすぎて、あたまバカになっちゃうってぇ……<emoji=heart04>」"
translation = "「앗, 응아, 하아…… 내 몸 전부가 자지 창에 꿰뚫리는 것 같아서…… 너무 기분 좋아서 머리가 바보가 돼버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっと気持ちよくなっていいよ。俺にだけ、乱れておバカになっちゃってる美鶴、見せてほしいな」"
translation = "「더 기분 좋아져도 돼. 나한테만 흐트러져서 바보가 되어버린 미츠루를 보여줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「う、そんなこと言われたら、拒めないじゃん……会長さんにだけだよ？\u3000えっちなとこも、おバカなとこも、うちの全部、見せちゃうね……<emoji=heart04>」"
translation = "「우, 그런 말을 들으면 거절할 수 없잖아…… 회장님한테만이야? 야한 모습도, 바보 같은 모습도, 내 전부를 보여줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘く絶頂し、感度の増した美鶴の膣肉が、ペニスの根元から先端までをキュッと締め上げてくる。"
translation = "달콤하게 절정에 달해 감도가 치솟은 미츠루의 질 육벽이 자지의 뿌리부터 끝까지 꽉 조여온다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「もっと、もーっと、一緒に、きもちよくなろ<emoji=heart04>」"
translation = "「좀 더, 좀 더어, 같이 기분 좋아지자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "緩いセックスはここでおしまい。本気のピストンのおねだりだ。"
translation = "느긋한 섹스는 여기서 끝. 본격적인 피스톤질의 요구다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んあぁぁぁん！？\u3000あっ、ああっ、あ、あっ、んぁ、あっ、ああぁ<emoji=heart04>\u3000今日の会長さん、いつもより、激しっ……んぁ、やっ、ひぁ、んぁあぁぁぁっ……<emoji=heart04>」"
translation = "「응아아아앙!? 앗, 아앗, 아, 앗, 응아, 앗, 아아아<emoji=heart04> 오늘의 회장님, 평소보다 격해…… 응아, 싫어, 히아, 응아아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そんなっ、パンパンっ、されたらっ……！\u3000すぐ、イッちゃ、イっちゃうってぇ<emoji=heart04>\u3000んぃっ、ひぅうぅん！？」"
translation = "「그렇게 팡팡거리면……! 금방 가버려, 가버린단 말이야<emoji=heart04> 응잇, 히으으으응!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おち○ぽっ、おち○ぽぉ……<emoji=heart04>\u3000ひぁ、あっ、はぁ、あぁっ、ひぅ！\u3000ん、んぅぅーっ！\u3000きもちいいっ、きもちいいしか、わかんないっ……<emoji=heart04>」"
translation = "「자지, 자지이……<emoji=heart04> 히아, 앗, 하아, 아앗, 히으! 응, 응으으으으윽! 기분 좋아, 기분 좋다는 것밖에 모르겠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁぅんっ！？\u3000あっ、あ！\u3000ああぁっ、激ひいっ！\u3000ふぁ、うぅうぅんっ！\u3000ひぅ、ひゅご、ひゅごぉいっ<emoji=heart04>」"
translation = "「하아응!? 앗, 아! 아아앗, 격해! 화, 우으으응! 히으, 혀, 혀어억, 혀어억해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "足を大きく広げて勃起を受け入れているせいで性器の隙間から空気が入りこみ、ぶぢゅん、ぶぢゅんと空気を孕んだ結合音が鳴り響く。"
translation = "다리를 넓게 벌리고 발기를 받아들이고 있는 탓에 성기 틈새로 공기가 들어가 부직, 부직 하며 공기를 머금은 결합음이 울려 퍼진다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おち○ぽっ、きもちよしゅぎてっ、おっ、おかひくっ、おかひくなっひゃ<emoji=heart04>\u3000んぅ、んきゅ、んぅうぅぅんっ<emoji=heart04>」"
translation = "「자지, 너무 기분 좋아서, 이, 이상해, 이상해져버렷<emoji=heart04> 응으, 응큐, 응으으으으으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁっ、はーっ、はぅぅんっ<emoji=heart04>\u3000すごっ、すごいの、おっきくてきもちいいの、ぞわぞわキテるっ……！\u3000ひぅ、うぅぅん<emoji=heart04>」"
translation = "「하앗, 하아, 하으으응<emoji=heart04> 굉장해, 굉장한 게, 크고 기분 좋은 게 소름 끼치게 오고 있어……! 히으, 우으으으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あ、ぁんっ！\u3000子宮っ、ぐりぐりしちゃだめ……それイッちゃう、またイッちゃうからっ……あっ、あっ<emoji=heart04>」"
translation = "「아, 아앙! 자궁, 비비면 안 돼…… 그거 가버려, 또 가버리니까…… 앗, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが埋まっているおへそのちょっと下辺りを撫でると、子宮を突き上げている振動が微かに手に伝わった。"
translation = "자지가 묻혀 있는 배꼽 바로 아랫부분을 어루만지자 자궁을 밀어 올리는 진동이 미세하게 손으로 전해졌다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んひぅっ！\u3000やんっ、そこ、入ってる、おち○ぽ入ってるからぁ……<emoji=heart04>」"
translation = "「응히윽! 앗, 거기, 들어있어, 자지 들어있으니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ひゃ、優しくナデナデされたら、キュンキュンしちゃう……会長さんの赤ちゃん、欲しくなっちゃう……<emoji=heart04>」"
translation = "「히야, 상냥하게 쓰담쓰담 당하면 가슴이 두근거려 버려…… 회장님의 아기, 갖고 싶어지게 돼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「このまま出されたら、ホントに……まだ学生なのに、赤ちゃんデキちゃうかもっ……<emoji=heart04>\u3000でも、出しちゃうつもりなんだよね……？」"
translation = "「이대로 싸버리면 정말로…… 아직 학생인데 아기가 생겨버릴지도 몰라……<emoji=heart04> 하지만, 싸버릴 생각이지……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「美鶴がイヤなら外に出すよ。美鶴の綺麗な体を、俺の精液で汚しちゃうのも、興奮するし」"
translation = "「미츠루가 싫다면 밖에 쌀게. 미츠루의 깨끗한 몸을 내 정액으로 더럽히는 것도 흥분되니까.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「えっ……やだ、そのままぁ……おち○ぽ、うちの膣内でイッて……せーし、そのまま、ちょうだぁいっ<emoji=heart04>」"
translation = "「엣…… 싫어, 이대로…… 자지, 내 질 안에서 가줘…… 정액 이대로 줘어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なかぁ……中出しがいいのっ……！\u3000せーしっ、おま○こに、子宮に、びゅーびゅー射精してっ……<emoji=heart04>」"
translation = "「안에…… 질내사정이 좋아……! 정액, 보지에, 자궁에 뷰뷰하고 사정해줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「せーしっ、会長さんのせーし、子宮に欲しぃ、会長さんのアツいの、ぜぇんぶ感じたいの……<emoji=heart04>」"
translation = "「정액, 회장님의 정액, 자궁에 갖고 싶어, 회장님의 뜨거운 거 전부 느끼고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「元気な精子、たっぷり出して……孕ませて……うちのこと、会長さんのお嫁さんにしてっ……<emoji=heart04>」"
translation = "「건강한 정자 듬뿍 내줘서…… 임신시켜서…… 나를 회장님의 신부로 만들어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛い彼女の耳元で、愛しい彼女の名を何度も囁きながら、ピストンを速め、昇りつめていく。"
translation = "귀여운 여자친구의 귓가에 사랑스러운 그녀의 이름을 몇 번이고 속삭이며 피스톤질 속도를 높여 절정으로 올라간다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はぁん……<emoji=heart04>\u3000みつる、みつるってぇ、えっちしながら名前呼ばれると、しあわせになっちゃう……おま○こぞくぞくしちゃうよぉ……<emoji=heart04>」"
translation = "「하앙……<emoji=heart04> 미츠루, 미츠루라고, 섹스하면서 이름 불리면 행복해져…… 보지가 오싹오싹해져 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「いっぱい、名前呼んでっ……うちも好きっ<emoji=heart04>\u3000会長さん好きっ<emoji=heart04>\u3000だぁい好きっ……愛してる……<emoji=heart04>」"
translation = "「잔뜩 이름 불러줘…… 나도 좋아<emoji=heart04> 회장님이 좋아<emoji=heart04> 정말 좋아…… 사랑해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ひぁん！？\u3000や、感じすぎちゃうっ、や、だめ、ホントにイッちゃ、イッちゃう……<emoji=heart04>\u3000会長さんと一緒にイキたいのにぃっ！\u3000まだ、先にイッちゃうのヤ……<emoji=heart04>」"
translation = "「히앙!? 야, 너무 느껴버려, 야, 안 돼, 정말 가버려, 가버려……<emoji=heart04> 회장님이랑 같이 가고 싶은데! 아직, 먼저 가버리는 거 시러……<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んっ、はぁ、あ、あっ、いっしょ、いっしょがいいっ！\u3000いっしょに、きもちいいとこ、イこぉ……<emoji=heart04>」"
translation = "「응, 하아, 아, 앗, 같이, 같이 가고 싶어! 같이 기분 좋은 곳으로 가자……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "美鶴の甘え声に理性と意識が吹っ飛ぶ。込み上げてきた熱い情欲を、美鶴の膣内に解き放つ準備はできた。"
translation = "미츠루의 애교 섞인 목소리에 이성과 의식이 날아간다. 끓어오르는 뜨거운 정욕을 미츠루의 질 내에 해방할 준비가 되었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おち○ぽ、びくんびくんしてぅぅ<emoji=heart04>\u3000ね、もーすぐらよねっ、いっぱい、いっぱい、ナカにちょーらぁいっ<emoji=heart04>」"
translation = "「자지 파르르 떨고 있어어<emoji=heart04> 있지, 이제 곧이지? 잔뜩, 잔뜩 안으로 줘어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はんっ！？\u3000はふっ、んんぅ、好きっ！\u3000しゅきぃ、だぁいしゅきぃっ<emoji=heart04>\u3000ひゃ、やぁっ！\u3000イッ、イクッ、イッひゃっ<emoji=heart04>」"
translation = "「하응!? 하후, 응응으, 좋아! 좋아해, 정말 좋아해<emoji=heart04> 히야, 야아! 가, 간다, 가버렷<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふぁっ！？\u3000あっ、あ！\u3000あぁあぁぁっ！\u3000イク――イクッ、イクイクイグイっひゃうぅうぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화앗!? 앗, 아! 아아아앗! 가── 간다, 가버려가버려가버렷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「んひあぁ～～～～～～っ！！？\u3000あっ！\u3000あっ、ひぁ！\u3000んぅくっ、んぁ、はっ、んひっ、はぁ、ぅうふぅんっ<emoji=heart04>」"
translation = "「응히아아～～～～～～윽!!? 앗! 앗, 히아! 응으윽, 응아, 하윽, 응히, 하아, 우으후으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「はっ！？\u3000はっ、ひはっ、はぁあぁっ！\u3000はぁ、はぁっ！\u3000はっ、うぅん、はぁ……ふぁ、あっ……っきゅぅん<emoji=heart04>」"
translation = "「하윽!? 하윽, 히하윽, 하아아앗! 하아, 하앗! 하윽, 우으응, 하아…… 화, 앗…… 뀽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膨れ上がったペニスの先端から、大量の精液が噴き出す。"
translation = "부풀어 오른 자지 끝에서 대량의 정액이 뿜어져 나온다."

[[dialogue]]
speaker = "unk"
original = "数億の子種が美鶴の子宮奥に叩き付けられ、エクスタシーと同時に子宮に精を吐き出された快感に、美鶴の全身は悦びを訴え、激しく痙攣した。"
translation = "수억 개의 씨앗이 미츠루의 자궁 깊숙한 곳에 쏟아부어졌고, 엑스터시와 동시에 자궁에 정을 토해진 쾌감에 미츠루의 전신은 환희를 호소하며 격렬하게 경련했다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふぁ、はっ、はぁん……<emoji=heart04>\u3000まだっ、せーし、出へる……<emoji=heart04>\u3000お腹ん中……会長さんのせーしで、たっぽたぽぉ……<emoji=heart04>」"
translation = "「화, 하윽, 하앙……<emoji=heart04> 아직 정액 나오고 있어……<emoji=heart04> 배 속이…… 회장님의 정액으로 출렁출렁해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段クールな美鶴からは想像できないトロ顔に、俺も濃い精液をとめどなく吐き散らす。"
translation = "평소 쿨한 미츠루에게서는 상상도 할 수 없는 황홀한 표정에 나도 진한 정액을 끊임없이 쏟아낸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すっごく、気持ち良かった……愛してるよ、美鶴」"
translation = "「정말 기분 좋았어. 사랑해, 미츠루.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「きゅぅぅん……<emoji=heart04>\u3000はぁ、はぁっ……うちも……愛してる……<emoji=heart04>\u3000んっ、まだせーし出てるし……ぜぇんぶ、最後まで出し切ってね……ふふ<emoji=heart04>」"
translation = "「뀽……<emoji=heart04> 하아, 하앗…… 나도…… 사랑해……<emoji=heart04> 응, 아직 정액 나오고 있고…… 전부 마지막까지 다 짜내줘…… 후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "収縮を繰り返すペニスと睾丸に連動するように、美鶴の膣肉もキュッキュッと締め付け、射精を促す。"
translation = "수축을 반복하는 자지와 고환에 연동하듯 미츠루의 질 육벽도 꽉꽉 조여오며 사정을 재촉한다."

[[dialogue]]
speaker = "unk"
original = "脳が痺れるような絶頂の余韻が途絶えるまで、俺は美鶴の膣内にとどまり続けた。"
translation = "뇌가 저릴 듯한 절정의 여운이 끊길 때까지 나는 미츠루의 질 내에 계속 머물렀다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「きゃんっ……おち○ぽ抜けちゃった」"
translation = "「꺄앙…… 자지 빠져버렸어.」"

[[dialogue]]
speaker = "unk"
original = "精魂吐き出しきって力を失ったペニスが、自然に美鶴の膣内からズルリと抜けた。"
translation = "정력을 다 쏟아내고 힘을 잃은 자지가 자연스럽게 미츠루의 질 안에서 주르륵 빠져나왔다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あっ……会長さんの精子、溢れちゃってるじゃん……もったいなぁい……<emoji=heart04>」"
translation = "「앗…… 회장님 정액이 흘러넘치고 있잖아…… 아까워라……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "栓を失った膣穴からは、泡立った白濁が逆流して溢れ、布団に大きな染みを作る。"
translation = "마개를 잃은 질구에서는 거품 섞인 백탁액이 역류해 넘쳐흐르며 이불에 커다란 얼룩을 만든다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もったいなくないよ。またいくらでも出せるし」"
translation = "「아깝지 않아. 또 얼마든지 내줄 수 있으니까.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ホント？\u3000またいっぱい生えっちしてくれるんだ？\u3000ふふ……嬉しーなぁ……<emoji=heart04>」"
translation = "「정말? 또 잔뜩 노콘 섹스해줄 거야? 후후…… 기쁘다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "美鶴がうっとりと蕩けた瞳で微笑む。初めて会った時に比べて、随分と表情も豊かになった。"
translation = "미츠루가 황홀하게 녹아내린 눈동자로 미소 짓는다. 처음 만났을 때와 비교하면 표정이 무척 풍부해졌다."

[[dialogue]]
speaker = "unk"
original = "いや、もしかすると、彼女の表情は最初から何も変わっていなくて、俺が些細な変化に気付けるようになっただけなのかもしれない。"
translation = "아니, 어쩌면 그녀의 표정은 처음부터 아무것도 변하지 않았고, 내가 사소한 변화를 알아차릴 수 있게 된 것뿐일지도 모른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あっ、そろそろ帰らないと……」"
translation = "「앗, 슬슬 돌아가야겠는데……」"

[[dialogue]]
speaker = "unk"
original = "どれだけの時間、美鶴との逢瀬に夢中になっていたんだろうか。もう帰る予定の時間はとっくに過ぎていた。"
translation = "얼마나 오랫동안 미츠루와의 만남에 몰두했던 걸까. 돌아가기로 예정한 시간은 이미 한참 지나 있었다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「だーめ<emoji=heart04>」"
translation = "「안 돼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "名残惜しいけれど、お暇しようとした俺の体を、美鶴は熱烈なハグで止めた。"
translation = "아쉽지만 자리를 뜨려던 나의 몸을 미츠루는 열렬한 포옹으로 붙잡았다."

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「もうちょっとだけ、ギリギリまで、うちの傍にいて……ちゅ、ちゅっ、んっ……<emoji=heart04>\u3000会長さん、だぁい好き<emoji=heart04>」"
translation = "「조금만 더, 마지막 순간까지 내 곁에 있어줘…… 츄, 츄우, 응……<emoji=heart04> 회장님, 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗まみれの火照った体が冷えるまで、俺たちは抱き合ったまま、何度も何度も蜜のような甘いキスを交わすのだった。"
translation = "땀 범벅이 되어 달아오른 몸이 식을 때까지, 우리는 서로 껴안은 채 몇 번이고 꿀처럼 달콤한 키스를 나누었다."

