[[dialogue]]
speaker = "unk"
original = "第７話,太陽と金星のティータイム,B"
translation = "제7화, 태양과 금성의 티타임, B"

[[dialogue]]
speaker = "unk"
original = "それから……しばし俺たちは待機していた。"
translation = "그리고…… 잠시 우리는 대기하고 있었다."

[[dialogue]]
speaker = "unk"
original = "世界もアポロも救うハッピーエンドを求めて、ヴィーナスは『日誌』の導きを待ち続けた。"
translation = "세계도 아폴로도 구할 해피 엔딩을 바라며, 비너스는 『일지』의 인도를 계속 기다렸다."

[[dialogue]]
speaker = "unk"
original = "一日、また一日と……平穏な日々が過ぎてゆく。"
translation = "하루, 또 하루…… 평온한 나날이 지나간다."

[[dialogue]]
speaker = "unk"
original = "しかし、待てど暮らせど『日誌』は次のページを記してくれなかった。"
translation = "하지만, 아무리 기다려도 『일지』는 다음 페이지를 기록해주지 않았다."

[[dialogue]]
speaker = "unk"
original = "フィオナの本当のお姉さんが昏睡状態にあるままで──ただ、いたずらに時間が過ぎていく……。"
translation = "피오나의 진짜 언니가 혼수상태인 채로── 그저, 덧없이 시간이 흘러간다……."

[[dialogue]]
speaker = "ヴィーナス"
original = "「……はぁぁ……どうして、肝心な時に……！」"
translation = "「……하아아…… 왜, 중요한 순간에……!」"

[[dialogue]]
speaker = "unk"
original = "机に突っ伏して唸るヴィーナス。"
translation = "책상에 엎드려 신음하는 비너스."

[[dialogue]]
speaker = "unk"
original = "気づけば星見家での会合から、十日ばかりの月日が経過していた。"
translation = "정신을 차려보니 호시미 가문에서의 회합으로부터, 열흘 정도의 시간이 경과해 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「今までなら……困った時はすぐ、次の一歩を示してくれたのに……」"
translation = "「지금까지라면…… 곤란할 때는 바로, 다음 한 걸음을 보여줬는데……」"

[[dialogue]]
speaker = "unk"
original = "──未来の日誌。"
translation = "──미래의 일지."

[[dialogue]]
speaker = "unk"
original = "彼女がそう称するダイアリーは未だに進展を見せず、焦燥はますます募っていくばかりだった。"
translation = "그녀가 그렇게 칭하는 다이어리는 아직도 진전을 보이지 않고, 초조함은 더욱 커져갈 뿐이었다."

[[dialogue]]
speaker = "unk"
original = "厳密には数日おきに書き込まれてはいたものの、そのどれもが取るに足らない出来事だった。"
translation = "엄밀히는 며칠 간격으로 기록되기는 했지만, 그 모든 것이 별 볼 일 없는 일이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（急がないと……フィオナのお姉さんは、今も苦しんでるかもしれないっていうのに……！）"
translation = "（서둘러야 해…… 피오나의 언니는, 지금도 괴로워하고 있을지도 모른단 말이야……!）"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはいてもたってもいられず、大聖堂へと駆け出していた。"
translation = "비너스는 안절부절못하며, 대성당으로 달려가고 있었다."

[[dialogue]]
speaker = "unk"
original = "ここに来れば何かヒントが得られるかもと期待して──『太陽の壁画』の前に立ち尽くす。"
translation = "여기에 오면 뭔가 힌트를 얻을 수 있을까 기대하며── 『태양의 벽화』 앞에 우두커니 서 있다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「はあ、はあ……ふぅ」"
translation = "「하아, 하아…… 후우」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（何も……起こらないわよね。まあ、わかってたけど）"
translation = "（아무것도…… 일어나지 않겠지. 뭐, 알고 있었지만）"

[[dialogue]]
speaker = "ヴィーナス"
original = "（じれったいわね──どう動けばいいかもわからない時間なんて……）"
translation = "（답답하네── 어떻게 움직여야 할지도 모르는 시간이라니……）"

[[dialogue]]
speaker = "unk"
original = "日誌の記述が増えたり、あるいは数奇な<ruby>栞<rt>しおり</rt></ruby>がもたらされたりと……"
translation = "일지의 기술이 늘어나거나, 혹은 기이한 책갈피가 전해지거나……"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのこれまでの行動には、常に何かしらの道しるべが存在してきた。"
translation = "비너스의 지금까지의 행동에는, 항상 무언가의 길잡이가 존재해 왔다."

[[dialogue]]
speaker = "unk"
original = "しかし今の彼女には、頼るべき指標が見つからない。"
translation = "하지만 지금의 그녀에게는, 의지할 지표가 보이지 않는다."

[[dialogue]]
speaker = "unk"
original = "友人の姉を救いたいという一心に──答えてくれるものが何もない。"
translation = "친구의 언니를 구하고 싶다는 일념에── 대답해 주는 것이 아무것도 없다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスにとって、そんな五里霧中は生まれて初めての事態だった。"
translation = "비너스에게 있어서, 그런 오리무중은 태어나서 처음 겪는 사태였다."

[[dialogue]]
speaker = "unk"
original = "そこへ……"
translation = "그때……"

[[dialogue]]
speaker = "フィオナ"
original = "「あら──ヴィーナスさん。奇遇ですね」"
translation = "「어머── 비너스 씨. 우연이네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナ……」"
translation = "「피오나……」"

[[dialogue]]
speaker = "フィオナ"
original = "「よかったら──お茶でもしていきませんか？\u3000たまには女子会というのも、悪くないのではないかと」"
translation = "「괜찮으시다면── 차라도 한잔하고 가시겠어요? 가끔은 여자들만의 모임도, 나쁘지 않을 것 같아서요」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアへと入ったヴィーナスにフィオナ。"
translation = "카페테리아로 들어선 비너스와 피오나."

[[dialogue]]
speaker = "unk"
original = "２人のテーブルに注文した品々が運ばれてくる。"
translation = "두 사람의 테이블에 주문한 품목들이 옮겨져 온다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナの……それ、何？」"
translation = "「피오나의…… 그거, 뭐야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「野いちごのハーブティーです。初めて頼むメニューでしたが」"
translation = "「산딸기 허브티입니다. 처음 시켜보는 메뉴였지만요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へえ、おいしそうね！\u3000なんかおしゃれだし」"
translation = "「헤에, 맛있겠다! 뭔가 멋있고」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。ヴィーナスさんは──」"
translation = "「후후. 비너스 씨는──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私はスパイシーハニーチャイ！\u3000とアフタヌーンティーセット！」"
translation = "「나는 스파이시 허니 차이! 그리고 애프터눈 티 세트!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの目の前には豪奢なケーキスタンドが鎮座していた。"
translation = "비너스의 눈앞에는 호화로운 케이크 스탠드가 자리 잡고 있었다."

[[dialogue]]
speaker = "unk"
original = "三段トレイにはスコーンから林檎のカップケーキ、ラズベリーのマカロンといった品々が丁寧に並べられている。"
translation = "삼단 트레이에는 스콘부터 사과 컵케이크, 라즈베리 마카롱 같은 품목들이 정성스럽게 놓여 있다."

[[dialogue]]
speaker = "フィオナ"
original = "「……そ、そんなに食べ切れるのですか」"
translation = "「……그, 그렇게 다 드실 수 있겠어요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「楽勝よ！\u3000全部おすすめだから、シェアして一緒に食べましょ！」"
translation = "「식은 죽 먹기지! 전부 추천 메뉴니까, 나눠서 같이 먹자!」"

[[dialogue]]
speaker = "unk"
original = "突発的に始まったティーパーティーは賑やかに進んでいった。"
translation = "돌발적으로 시작된 티 파티는 시끌벅적하게 진행되었다."

[[dialogue]]
speaker = "unk"
original = "しばらくお茶を楽しんだのち、ヴィーナスは思い立ったように訊ねる。"
translation = "잠시 차를 즐긴 후, 비너스는 문득 생각난 듯 묻는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「それで……もしかしてなんだけど、私のこと探してた？」"
translation = "「그래서…… 혹시 말인데, 나 찾고 있었어?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。はい。鋭いですね」"
translation = "「후후. 네. 예리하시네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いきなりすぎたもの。でも、どうして？」"
translation = "「갑작스러웠으니까. 근데, 왜?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ……まずは、謝ろうと思って」"
translation = "「네…… 우선은, 사과하려고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「謝る？」"
translation = "「사과?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。あの時は──私もつい、むきになってしまいました。せっかくのご厚意だったのに、頑なになってしまって、ごめんなさい」"
translation = "「네. 그때는── 저도 그만, 흥분해 버렸습니다. 모처럼의 호의였는데, 고집을 부려서, 죄송합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ああ──別にいいわよ。そんなの」"
translation = "「아아── 괜찮아. 그런 거」"

[[dialogue]]
speaker = "unk"
original = "あの時──というのが星見邸宅における一件を指していたのは、ヴィーナスにも伝わった。"
translation = "그때──라는 것이 호시미 저택에서의 사건을 가리키고 있다는 것은, 비너스에게도 전해졌다."

[[dialogue]]
speaker = "unk"
original = "彼女らが顔を合わせるのはあれ以来となる。"
translation = "그녀들이 얼굴을 마주하는 것은 그 이후가 된다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、そう言うってことは考えも変わったってこと？」"
translation = "「근데, 그렇게 말한다는 건 생각도 바뀌었다는 거야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……いいえ。今もなすべきことに変わりはありません」"
translation = "「……아닙니다. 지금도 해야 할 일에는 변함이 없습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「が、頑固ねえ……！」"
translation = "「고, 고집쟁이네……!」"

[[dialogue]]
speaker = "unk"
original = "アポロを抹殺する──星見フィオナは自らそう宣言した。"
translation = "아폴로를 말살한다── 호시미 피오나는 스스로 그렇게 선언했다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスにとって、それこそが許しがたい一線だった。"
translation = "비너스에게 있어서, 그것이야말로 용서할 수 없는 선이었다."

[[dialogue]]
speaker = "フィオナ"
original = "「誤解しないでくださいね。ヴィーナスさんのお気持ちは……大変ありがたいものと思っています」"
translation = "「오해하지 말아 주세요. 비너스 씨의 마음은…… 매우 감사한 것이라고 생각하고 있습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが……現実。私はもう、五年も姉さんと会話をしていません。歳も、ずいぶん離れてしまいました」"
translation = "「하지만…… 현실. 저는 벌써, 5년이나 언니와 대화를 하지 않았습니다. 나이도, 꽤 멀어졌습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「会いたくない──と言えば、嘘になりますが。心のどこかで諦めてしまっていたのも事実です」"
translation = "「만나고 싶지 않다──고 말하면, 거짓말이 되겠지만. 마음속 어딘가에서 포기해 버렸던 것도 사실입니다」"

[[dialogue]]
speaker = "unk"
original = "そんな時に現れたのが──仮面を被ったあの存在だった。"
translation = "그때 나타난 것이── 가면을 쓴 그 존재였다."

[[dialogue]]
speaker = "unk"
original = "儚げに遠くを眺めるフィオナを見て、ヴィーナスにもその心情がありありと伝わった。"
translation = "덧없이 먼 곳을 바라보는 피오나를 보고, 비너스에게도 그 심정이 역력히 전해졌다."

[[dialogue]]
speaker = "フィオナ"
original = "「確かに私は姉さんのことを皆さんに打ち明けました。しかしそれは、同じ仲間として共有しないのは不誠実だと思ったからです」"
translation = "「확실히 저는 언니에 대한 것을 여러분에게 털어놓았습니다. 하지만 그것은, 같은 동료로서 공유하지 않는 것은 불성실하다고 생각했기 때문입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「仮面の少女──アポロが姉の形をした<ruby>厄災<rt>やくさい</rt></ruby>であることに変わりありません。学園の決定通り、討伐すべきでしょう」"
translation = "「가면의 소녀── 아폴로가 언니의 모습을 한 재앙이라는 것에는 변함이 없습니다. 학원의 결정대로, 토벌해야 할 것입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……考えを変える気はないのね」"
translation = "「……생각을 바꿀 생각은 없는 거네」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。私は──流星学園の星徒会長にして、星見家を担うフィオナですから」"
translation = "「네. 저는── 유성 학원의 성도 회장이자, 호시미 가문을 짊어질 피오나니까요」"

[[dialogue]]
speaker = "unk"
original = "まっすぐにフィオナの視線を受け止めたあと、ヴィーナスもまた凛々しく返した。"
translation = "똑바로 피오나의 시선을 받아낸 후, 비너스 또한 늠름하게 대답했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナは──自分の役目に縛られすぎてる。無理をしすぎよ、どう見ても」"
translation = "「피오나는── 자신의 역할에 너무 얽매여 있어. 아무리 봐도 무리를 너무 한다고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「本当はお姉さんのことを助けたいのに……みんなに迷惑がかかるからって、本心を押し殺してる。違う？」"
translation = "「사실은 언니를 돕고 싶은데…… 모두에게 폐가 될까 봐, 본심을 억누르고 있어. 아니야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "それはフィオナにとって図星だった。"
translation = "그것은 피오나에게 정곡이었다."

[[dialogue]]
speaker = "unk"
original = "抱えるものの多い彼女にとって、姉を助けたいという想いはエゴでしかないと切り捨てていた。"
translation = "짊어진 것이 많은 그녀에게, 언니를 돕고 싶다는 마음은 이기심일 뿐이라고 잘라내고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「だったら……なんなのです。もし仮にそうだとしても、私は私の役目を果た──もぐっ！？」"
translation = "「그렇다면…… 무엇이란 말입니까. 설령 그렇다고 해도, 저는 저의 역할을 다── 옴뇸뇸!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うるさい！\u3000私のマカロンでも食べてなさい！」"
translation = "「시끄러워! 내 마카롱이나 먹고 있어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「も、もぐもぐ……ふぁ、ふぁひをふるんへふは」"
translation = "「우, 우물우물…… 바, 바를을 다해아 하느데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「言っておくけどねえ、それくらいで私が諦めると思ったら大間違いよ」"
translation = "「말해두지만, 그 정도로 내가 포기할 거라고 생각하면 큰 착각이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が救うと言ったら救うの。アポロのことも、お姉さんのことも……絶対に諦めないんだから！」"
translation = "「내가 구한다고 했으면 구하는 거야. 아폴로도, 언니도…… 절대로 포기하지 않을 테니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "清々しいほど強引なヴィーナスの主張は、先日から少しも揺らいでいなかった。"
translation = "상쾌할 정도로 강압적인 비너스의 주장은, 며칠 전부터 조금도 흔들리지 않았다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「安心しなさいフィオナ。今は、ちょっと停滞してるけど……日誌が私たちを導いてくれるはずだから」"
translation = "「안심해 피오나. 지금은, 조금 정체되어 있지만…… 일지가 우리를 이끌어 줄 테니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「これまでのように──ですか」"
translation = "「지금까지처럼── 말입니까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。きっと、クロトが世界もアポロも救うための道筋を──示してくれるはずよ♪」"
translation = "「응. 분명, 쿠로토가 세계도 아폴로도 구할 수 있는 길을── 보여줄 거야♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長のことを──信頼しているのですね」"
translation = "「히노미야 회장님을── 신뢰하고 계시는군요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん？\u3000まあね。クロトこそ真の魔王だもの──そこはお姉さんにも譲れないわ」"
translation = "「응? 뭐 그렇지. 쿠로토야말로 진정한 마왕이니까── 그건 언니에게도 양보할 수 없어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（っと思ったけど、別に魔王って２人いてもいいのかしら？\u3000そこは考えたことなかったわね……）"
translation = "「(라고 생각했지만, 딱히 마왕이 2명 있어도 괜찮은 걸까? 그건 생각해 본 적 없었네……)」"

[[dialogue]]
speaker = "フィオナ"
original = "「……お２人の関係性はとても不思議です。隣の学園で御前試合が行われたと聞いた時は、どんなに<b>ばちばち</b>しているかと思っていましたのに」"
translation = "「……두 분의 관계성은 매우 신기합니다. 옆 학원에서 어전 시합이 열렸다고 들었을 때는, 얼마나 <b>불꽃</b> 튀고 있을까 생각했습니다만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あはは。あれはちょっとクロトを試したかっただけよ♪」"
translation = "「아하하. 그건 좀 쿠로토를 시험해 보고 싶었을 뿐이야♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうなのですか？\u3000よい機会ですから、お話を聞いてみたいですね」"
translation = "「그러신가요? 좋은 기회이니, 이야기를 들어보고 싶네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、あれはね……」"
translation = "「응, 그건 말이지……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはクロトの入学から御前試合までの経緯を語った。"
translation = "비너스는 쿠로토의 입학부터 어전 시합까지의 경위를 이야기했다."

[[dialogue]]
speaker = "unk"
original = "それからクロトとの出会いまで、あらかじめ日誌に記されていたことも……。"
translation = "그리고 쿠로토와의 만남까지, 미리 일지에 기록되어 있던 것도…….」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういうわけだから──私はそもそも、クロトのことを最初から認識していたの。運命のパートナーみたいなものね！」"
translation = "「그런 이유니까── 나는 애초에, 쿠로토를 처음부터 인식하고 있었어. 운명의 파트너 같은 거지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど。ヴィーナスさんにとっては──その日誌こそが、人生そのものなのですね」"
translation = "「과연. 비너스 씨에게는── 그 일지야말로, 인생 그 자체인 것이군요」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに、運命のパートナー──ですか」"
translation = "「게다가, 운명의 파트너── 말입니까」"

[[dialogue]]
speaker = "unk"
original = "そうして、全てを聞いたフィオナはひと言。"
translation = "그렇게, 모든 것을 들은 피오나는 한마디."

[[dialogue]]
speaker = "フィオナ"
original = "「お付き合いされているんですか？」"
translation = "「교제하고 계신 건가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ぶっ」"
translation = "「풉」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがチャイを噴き出した。"
translation = "비너스가 차이를 뿜어냈다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「な、なんなのよ藪からステッキに！\u3000そんな話してないじゃない！」"
translation = "「뭐, 뭐냐고 갑자기! 그런 이야기 안 했잖아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「至って自然な解釈です。運命の赤い糸で結ばれた男女ならば、その後も関係が深まっていくものと思われます」"
translation = "「지극히 자연스러운 해석입니다. 운명의 붉은 실로 맺어진 남녀라면, 그 후에도 관계가 깊어지는 것이라고 생각됩니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちち、違うわよ！\u3000私たちの関係は出会った時から変わってないってば！」"
translation = "「아, 아냐! 우리 관계는 만났을 때부터 변하지 않았다고!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あら。意外でした。デートくらいは済ませているものかと」"
translation = "「어머. 의외였습니다. 데이트 정도는 끝냈을 것이라고」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに……その出会いは何年も前から記されていたんですよね。ふふふ……非常にドラマチックです」"
translation = "「게다가…… 그 만남은 몇 년 전부터 기록되어 있었던 것이군요. 후후후…… 매우 드라마틱합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィーオーナー……！」"
translation = "「피오나아……!」"

[[dialogue]]
speaker = "unk"
original = "自分がからかわれていることに気づいたヴィーナスは、頬を膨らませてフィオナをにらんだ。"
translation = "자신이 놀림받고 있다는 것을 깨달은 비너스는, 볼을 부풀리고 피오나를 노려보았다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私がクロトと出会ったのは──クロトを鍛えるためよ。クロトは魔王なのに、それを自覚していないから」"
translation = "「내가 쿠로토와 만난 것은── 쿠로토를 단련시키기 위해서야. 쿠로토는 마왕인데, 그걸 자각하지 못하고 있으니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど。私の印象としては、そこが少し意外です。ヴィーナスさんなら──自分が魔王になってやる、と考えそうなものですが」"
translation = "「과연. 저의 인상으로서는, 그 점이 조금 의외입니다. 비너스 씨라면── 자신이 마왕이 되어주겠다고, 생각할 법도 한데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私にその資格はないもの。魔王の血統の話は──フィオナもよく知ってるでしょ」"
translation = "「나에게 그 자격은 없는 걸. 마왕의 혈통 이야기는── 피오나도 잘 알고 있잖아」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、それはそうですが……」"
translation = "「네, 그렇긴 합니다만……」"

[[dialogue]]
speaker = "unk"
original = "フィオナの疑問は何も彼女に限った話ではなかった。"
translation = "피오나의 의문은 결코 그녀에게만 국한된 이야기는 아니었다."

[[dialogue]]
speaker = "unk"
original = "新星星徒会の面々もみな、クロトのことになるとサポートに徹そうとするヴィーナスを当初は不思議に思っていた。"
translation = "신성 성도회의 멤버들도 모두, 쿠로토에 관한 일이라면 서포트에 전념하려는 비너스를 처음에는 신기하게 생각하고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長を鍛えるようにと──日誌に記されていたのですか？」"
translation = "「히노미야 회장님을 단련시키라고── 일지에 기록되어 있었던 것입니까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そりゃもちろ、ん……ん？\u3000もち……ろん……あれ？」"
translation = "「그야 당여, ㄴ…… 응? 당…… 연…… 어라?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナスさん……？」"
translation = "「비너스 씨……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、いや、えっと──よくよく思い返すと、直接書かれてたわけじゃなかったわね」"
translation = "「아, 아니, 음── 곰곰이 되짚어 보니, 직접 쓰여 있던 건 아니었네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、クロトと運命の出会いを果たして、彼の魔王としての素質を目覚めさせる──なんて書いてあるんだから。それはもう私が手ずから鍛え上げろって書いてあるようなものよね！」"
translation = "「하지만, 쿠로토와 운명적인 만남을 이루고, 그의 마왕으로서의 소질을 일깨운다── 라고 쓰여 있으니까. 그건 이미 내가 직접 단련시키라고 쓰여 있는 거나 마찬가지잖아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「そ、そうでしょうか？」"
translation = "「그, 그럴까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんうん！\u3000実際、出会ったばかりのクロトは全然そんな自覚なかったし」"
translation = "「응응! 실제로, 막 만났을 때의 쿠로토는 전혀 그런 자각 없었고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから御前試合の後もビシバシ鍛えてあげてるのよ！\u3000早くクロトが立派な魔王になれますようにって！」"
translation = "「그러니까 어전 시합 후에도 팍팍 단련시켜 주고 있는 거라고! 빨리 쿠로토가 훌륭한 마왕이 될 수 있도록 말이야!」"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど……」"
translation = "「과연……」"

[[dialogue]]
speaker = "フィオナ"
original = "「でもそれって、解釈次第ではありますよね」"
translation = "「하지만 그거, 해석하기 나름이기도 하죠」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「魔王の素質を目覚めさせる──という意味なら、例の御前試合の際に役目は一度終えているはずです」"
translation = "「마왕의 소질을 일깨운다──라는 의미라면, 그 어전 시합 때 역할은 한 번 끝났어야 합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そしてヴィーナスさんの立場からすれば──その後、彼に負けないよう己を高める、という道もありえたでしょう」"
translation = "「그리고 비너스 씨의 입장에서 본다면── 그 후, 그에게 지지 않도록 자신을 높이는, 그런 길도 있었을 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「けれどヴィーナスさんは、最後まで緋宮会長につきっきりで鍛え上げるという選択をした……」"
translation = "「하지만 비너스 씨는, 끝까지 히노미야 회장님에게 전념하여 단련시킨다는 선택을 했습니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「その理由は一体、なぜなんでしょうね？」"
translation = "「그 이유는 대체, 무엇일까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そ、それは……考えたこともなかったけど。私なんかより、クロトのほうが優先っていうか……」"
translation = "「그, 그건…… 생각해 본 적도 없지만. 나보다, 쿠로토 쪽이 우선이라고 할까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんとなく……？\u3000私が、クロトの面倒みてあげなきゃって気がして……えっと、特に深い理由はないんだけど……！」"
translation = "「왠지 모르게……? 내가, 쿠로토를 돌봐줘야 할 것 같은 기분이 들어서…… 음, 딱히 깊은 이유는 없는데……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ──いえ。他愛ない冗談です。ヴィーナスさんはそれほど、緋宮会長と一緒にいたいのかと思って」"
translation = "「후후── 아닙니다. 시시한 농담입니다. 비너스 씨는 그 정도로, 히노미야 회장님과 함께 있고 싶은 건가 싶어서」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だ、だからそういう関係じゃないってばっ」"
translation = "「그, 그러니까 그런 관계 아니라고!」"

[[dialogue]]
speaker = "unk"
original = "話がひと段落つくと、２人のドリンクも底をつき始めた。"
translation = "이야기가 일단락되자, 두 사람의 음료도 바닥나기 시작했다."

[[dialogue]]
speaker = "フィオナ"
original = "「……もし」"
translation = "「……만약」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "フィオナ"
original = "「もし──その日誌に書かれた未来が、絶望的なものだったとしたら、どうしますか？」"
translation = "「만약── 그 일지에 쓰인 미래가, 절망적인 것이었다면, 어떻게 하시겠습니까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！\u3000よくない未来……ってこと？」"
translation = "「! 좋지 않은 미래……라는 거야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。未来を記す──と言っても、それは必ずしも楽観的な道筋を示すばかりではないでしょう」"
translation = "「네. 미래를 기록한다──고 해도, 그것이 반드시 낙관적인 길만을 보여주는 것은 아닐 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「時には……計り知れない試練が見えることもあるはずです」"
translation = "「때로는…… 헤아릴 수 없는 시련이 보일 수도 있을 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「立ち向かってもどうしようもないような壁が──この先にそびえ立っている。そんな事実がもしわかったとしても、打つ手はない」"
translation = "「맞서도 어쩔 수 없는 듯한 벽이── 이 앞에 우뚝 솟아 있다. 그런 사실을 만약 알게 된다고 해도, 손쓸 방법은 없다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そんな時……ヴィーナスさんだったら、どうするのかと思いまして」"
translation = "「그럴 때…… 비너스 씨라면, 어떻게 할지 궁금해서요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んー……確かに、そうなったら参っちゃうわよね」"
translation = "「음ー…… 확실히, 그렇게 되면 참 곤란하겠네」"

[[dialogue]]
speaker = "unk"
original = "おとがいに手をあてて考えるヴィーナス。"
translation = "턱에 손을 대고 생각하는 비너스."

[[dialogue]]
speaker = "unk"
original = "しかしその思考は短く、そしてあっけなく切り上げられた。"
translation = "하지만 그 사고는 짧았고, 그리고 싱겁게 끝났다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま、みんなに任せればいいんじゃない？\u3000私たちって１人じゃないし♪」"
translation = "「뭐, 모두에게 맡기면 되지 않을까? 우리는 혼자가 아니니까♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのあっけらかんとした答えを聞いて、フィオナは目を丸くした。"
translation = "비너스의 태평스러운 대답을 듣고, 피오나는 눈을 동그랗게 떴다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が頼ってるのはクロトだけじゃないもの。アナにもマトイにもサーシャさんにも、最近じゃ流星のみんなにだってお世話になってる」"
translation = "「내가 의지하는 건 쿠로토뿐만이 아닌 걸. 아나에게도 마토이에게도 사샤 씨에게도, 요즘엔 유성의 모두에게도 신세를 지고 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もちろんフィオナもね。だから──もし絶望的な未来が見えたら、お任せしちゃうかも！」"
translation = "「물론 피오나도. 그러니까── 만약 절망적인 미래가 보인다면, 맡겨 버릴지도!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ……ダメですよ。ヴィーナスさんも立ち向かってもらわないと」"
translation = "「후후…… 안 됩니다. 비너스 씨도 맞서 싸워주셔야죠」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、そうね。でも、そん時はそん時くらいでいいのよ♪」"
translation = "「응, 그렇네. 하지만, 그때는 그때 정도로 괜찮아♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ……はい。私も少し、ヴィーナスさんを見習うべきかもと思えてきました」"
translation = "「후후…… 네. 저도 조금, 비너스 씨를 본받아야 할지도 모른다고 생각하게 되었습니다」"

[[dialogue]]
speaker = "unk"
original = "日誌を頼る。そこに無理筋が記されていたら、みんなを頼る。"
translation = "일지를 의지한다. 거기에 무리한 방법이 기록되어 있다면, 모두를 의지한다."

[[dialogue]]
speaker = "unk"
original = "どこまでも自分以外の誰かを信頼できるヴィーナスの姿は──フィオナにとって、なぜだか輝かしく映っていた。"
translation = "어디까지나 자신 이외의 누군가를 신뢰할 수 있는 비너스의 모습은── 피오나에게, 왠지 모르게 빛나 보였다."

