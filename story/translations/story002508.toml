[[dialogue]]
speaker = "unk"
original = "アステラ内部に踏み入れ、奥へと進んでいく。"
translation = "아스텔라 내부로 발을 들여, 안쪽으로 나아간다."

[[dialogue]]
speaker = "エスメラルダ"
original = "『アステラ内部に入られると、その動向を観察するのが難しいです』"
translation = "『아스텔라 내부에 들어가 버리면, 그 동향을 관찰하는 것이 어렵습니다』"

[[dialogue]]
speaker = "エスメラルダ"
original = "『私は外でモンスターに備えておきますので、学園長の能力についてはきちんと観察しておいてください』"
translation = "『저는 밖에서 몬스터에 대비해둘 테니, 학원장님의 능력에 대해서는 확실히 관찰해 주세요』"

[[dialogue]]
speaker = "unk"
original = "出来るだけ頑張ります"
translation = "최대한 노력하겠습니다"

[[dialogue]]
speaker = "unk"
original = "（俺に何が分かるわけでもないけど）"
translation = " (내가 뭘 안다고 해서 알 수 있는 것도 아니지만)"

[[dialogue]]
speaker = "ラティエ"
original = "「エルデリーゼ嬢、きみはこういった実戦に参加したことはあるのか？」"
translation = "「엘데리제 양, 자네는 이런 실전에 참가한 적이 있나?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「以前、魔界に封印された守護天使様の解放作戦に参加したことはありますわ」"
translation = "「이전, 마계에 봉인된 수호천사님의 해방 작전에 참가한 적은 있습니다와」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ですが、アステラの内部に侵入しての戦いは初めてですの」"
translation = "「하지만, 아스텔라 내부에 침입해서 싸우는 건 처음이에요」"

[[dialogue]]
speaker = "ラティエ"
original = "「では、この景色は恐いだろうな」"
translation = "「그럼, 이 풍경은 무섭겠군」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そ、そんなことはありませんわ！\u3000全然大丈夫ですの！」"
translation = "「그, 그런 일은 없습니다와! 전혀 괜찮아요!」"

[[dialogue]]
speaker = "ラティエ"
original = "「強がらなくてもいい。初めては誰でも不安なものだ」"
translation = "「허세 부리지 않아도 좋다. 처음은 누구라도 불안한 법이지」"

[[dialogue]]
speaker = "ラティエ"
original = "「会長くん、エルデリーゼ嬢の手を握ってあげているといい」"
translation = "「회장군, 엘데리제 양의 손을 잡아주도록 하게」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「えっ！？\u3000ほ、本当に大丈夫ですのに……」"
translation = "「엣!? 정, 정말로 괜찮습니다만……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それに会長様は、学園長様と手をつなぎたいはずですわ！」"
translation = "「게다가 회장님은, 학원장님과 손을 잡고 싶으실 거예요!」"

[[dialogue]]
speaker = "unk"
original = "が、学園長……手、繋ぎますか？"
translation = "학, 학원장님…… 손, 잡을까요?"

[[dialogue]]
speaker = "unk"
original = "えっ？\u3000あ、それは……"
translation = "엣? 아, 그건……"

[[dialogue]]
speaker = "ラティエ"
original = "「もう下手な芝居はしなくていい」"
translation = "「이제 서툰 연기는 하지 않아도 좋다」"

[[dialogue]]
speaker = "ラティエ"
original = "「デートと言うのは口実。全ては九浄ヘレナの差し金なのだろう？」"
translation = "「데이트라는 건 구실. 모든 건 쿠죠 헬레나의 사주겠지?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "『ぜ、全部バレてる！？』"
translation = "『저, 전부 들켰어!?』"

[[dialogue]]
speaker = "エスメラルダ"
original = "『学園長は全てお見通しだった、ということね……はぁ……』"
translation = "『학원장님은 모든 걸 꿰뚫어 보고 계셨다는 거군요…… 하아……』"

[[dialogue]]
speaker = "ラティエ"
original = "「第一、水着をプレゼントしてデートに誘うなど、どう考えてもおかしい。恋愛ごとに疎い私であっても気付かないはずがないだろう」"
translation = "「애초에, 수영복을 선물하고 데이트에 유혹하다니, 아무리 생각해도 이상하지. 연애에 어두운 나라고 해도 눈치채지 못할 리가 없지 않나」"

[[dialogue]]
speaker = "unk"
original = "ですよね～……"
translation = "그렇죠~……"

[[dialogue]]
speaker = "ラティエ"
original = "「つまりだ、エルデリーゼ嬢。きみは何も気にすることなく会長くんの手を取っていい、そういうことだ」"
translation = "「즉, 엘데리제 양. 자네는 아무것도 신경 쓸 것 없이 회장군의 손을 잡아도 된다, 그런 뜻이다」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「か、会長様……」"
translation = "「회, 회장님……」"

[[dialogue]]
speaker = "unk"
original = "手、繋ごうか？"
translation = "손, 잡을까?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お願いしますわ……」"
translation = "「부탁드려요……」"

[[dialogue]]
speaker = "ラティエ"
original = "「はっはっは、初々しくていいな！\u3000エルデリーゼ嬢も恥じらう様子が可愛いぞ」"
translation = "「핫핫하, 풋풋해서 좋군! 엘데리제 양도 부끄러워하는 모습이 귀엽구나」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「か、からかわないでくださいませ！」"
translation = "「노, 놀리지 말아주세요와!」"

[[dialogue]]
speaker = "ラティエ"
original = "「ふふふ、すまない……と、そんな話をしていたら最深部に到着だ」"
translation = "「후후후, 미안하군…… 오, 그런 이야기를 하다 보니 최심부에 도착했군」"

[[dialogue]]
speaker = "ラティエ"
original = "「あれがこのアステラを発生させている親玉というわけだ」"
translation = "「저것이 이 아스텔라를 발생시키고 있는 우두머리라는 소리다」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あのモンスターを倒せば、このアステラは消滅するということですわね？」"
translation = "「저 몬스터를 쓰러뜨리면, 이 아스텔라는 소멸한다는 것이군요?」"

[[dialogue]]
speaker = "ラティエ"
original = "「そういうことだな」"
translation = "「그렇게 되겠지」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「では、私にお任せくださいっ！」"
translation = "「그럼, 제게 맡겨주세요!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「キャッスル・ブレイカーっ！！！」"
translation = "「캐슬 브레이커!!!」"

[[dialogue]]
speaker = "unk"
original = "勢いよく、モンスターに向かって突進していくエルゼ。"
translation = "기세 좋게, 몬스터를 향해 돌진해 가는 엘제."

[[dialogue]]
speaker = "unk"
original = "その攻撃は、最強の矛という異名に恥じない鋭い速さを持っていた。"
translation = "그 공격은, 최강의 창이라는 이명에 부끄럽지 않은 날카로운 속도를 가지고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「っ……消えた！？\u3000躱されましたの！？\u3000確かに捉えたはずでしたのに！」"
translation = "「윽…… 사라졌어!? 피한 건가요!? 분명히 포착했을 터인데!」"

[[dialogue]]
speaker = "unk"
original = "モンスターの姿を見失い、動揺から隙を作ってしまう。"
translation = "몬스터의 자취를 놓치고, 동요하여 빈틈을 만들고 만다."

[[dialogue]]
speaker = "unk"
original = "そこにモンスターの攻撃が襲い掛かった。"
translation = "그곳에 몬스터의 공격이 엄습했다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「っ……！！」"
translation = "「윽……!!」"

[[dialogue]]
speaker = "unk"
original = "凶刃がエルゼに届く前に、俺と学園長がその攻撃を弾く。"
translation = "흉인이 엘제에게 닿기 전에, 나와 학원장이 그 공격을 튕겨낸다."

[[dialogue]]
speaker = "ラティエ"
original = "「焦り過ぎたな、１人で突出するのは最も危険な行為だ」"
translation = "「너무 서둘렀군, 혼자서 돌출되는 것은 가장 위험한 행위다」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "ラティエ"
original = "「会長くん、合わせられるな？」"
translation = "「회장군, 맞출 수 있겠지?」"

[[dialogue]]
speaker = "unk"
original = "もちろんです！"
translation = "물론입니다!"

[[dialogue]]
speaker = "unk"
original = "学園長の動きに合わせて、俺も攻撃を繰り出す。"
translation = "학원장의 움직임에 맞춰, 나도 공격을 내지른다."

[[dialogue]]
speaker = "unk"
original = "反撃を受けたモンスターは怯み、間合いが出来る。"
translation = "반격을 받은 몬스터는 겁을 먹고, 거리가 생긴다."

[[dialogue]]
speaker = "ラティエ"
original = "「バラクィエル──」"
translation = "「바라키엘──」"

[[dialogue]]
speaker = "unk"
original = "学園長の手にした、美しい剣が翻った。"
translation = "학원장의 손에 든, 아름다운 검이 번뜩였다."

[[dialogue]]
speaker = "ラティエ"
original = "「アポカリプティック・ウィンドっ！」"
translation = "「아포칼립틱 윈드!」"

[[dialogue]]
speaker = "unk"
original = "モンスターは学園長の繰り出した攻撃を逃れようとした。"
translation = "몬스터는 학원장이 내지른 공격을 피하려 했다."

[[dialogue]]
speaker = "unk"
original = "だが、学園長の剣はまるで生き物のように伸び、うねり、その急所へと突き刺さる。"
translation = "하지만, 학원장의 검은 마치 생물처럼 늘어나고, 꿈틀거리며 그 급소를 꿰뚫는다."

[[dialogue]]
speaker = "unk"
original = "その瞬間を見逃さず、俺はエルゼの背中を押す。"
translation = "그 순간을 놓치지 않고, 나는 엘제의 등을 민다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ライトニング・ストライクっ！！」"
translation = "「라이트닝 스트라이크!!」"

[[dialogue]]
speaker = "unk"
original = "エルゼの強烈な一撃がモンスターを貫く。"
translation = "엘제의 강렬한 일격이 몬스터를 관통한다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はぁ……はぁ……」"
translation = "「하아…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "強く念じるように、モンスターを睨みつけるエルゼ。"
translation = "강하게 염원하듯, 몬스터를 노려보는 엘제."

[[dialogue]]
speaker = "unk"
original = "やがて、モンスターは徐々に動きを止め、静かに崩れ落ちていく。"
translation = "이윽고, 몬스터는 서서히 움직임을 멈추고, 조용히 무너져 내린다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「や、やりました……の……？」"
translation = "「해, 해냈나……요……?」"

[[dialogue]]
speaker = "unk"
original = "張り詰めていた空気が解けていく。"
translation = "팽팽하던 공기가 풀려나간다."

[[dialogue]]
speaker = "unk"
original = "それと同時に、アステラの消滅が始まり周囲の景色が変わっていったのだった。"
translation = "그와 동시에, 아스텔라의 소멸이 시작되어 주위의 풍경이 변해갔다."

