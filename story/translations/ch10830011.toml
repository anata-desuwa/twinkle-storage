[[dialogue]]
speaker = "unk"
original = "第１話,暴虐の吸血鬼,P"
translation = "제1화, 폭학의 흡혈귀"

[[dialogue]]
speaker = "unk"
original = "某日、アステラが２つ同時に出現。１つは星徒会メンバーに任せ、俺はフェリシーとソフレの２人と一緒に、もう片方のアステラへと突入していた。"
translation = "어느 날, 아스텔라가 두 개 동시에 출현. 하나는 성도회 멤버에게 맡기고, 나는 펠리시와 소프레 두 사람과 함께, 다른 한쪽의 아스텔라로 돌입하고 있었다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふわぁ～。せっかくいい感じのお昼寝タイムだったのに、叩き起こされて面倒なのだわ……」"
translation = "「후아아~. 간만에 기분 좋은 낮잠 타임이었는데, 깨우다니 귀찮은 거예요……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレったら、そんなこと言わずに、シャキッと起きて頑張ろうよ～！」"
translation = "「소프레도 참, 그런 말 하지 말고, 정신 차리고 열심히 하자~!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレのモットーは『働いたら負け』なのよ。大体、ソフレが所属しているのは流星学園なのだわ」"
translation = "「소프레의 모토는 『일하면 지는 것』이에요. 애초에 소프레가 소속된 곳은 유성학원인 거예요」"

[[dialogue]]
speaker = "unk"
original = "友達のよしみで、そこをなんとか！"
translation = "친구 좋다는 게 뭐야, 거기서 어떻게든 좀 부탁해!"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「友達とか、調子のいいことを言って……大体、会長とそんなものになった覚えはないのよ」"
translation = "「친구라니, 말만 좋게 하고…… 애초에 회장과 그런 사이가 된 기억은 없는걸요」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「え～、会長くんとも、この前の事件を一緒に解決した仲じゃない！」"
translation = "「에~ 회장군하고도, 저번 사건을 같이 해결한 사이잖아!」"

[[dialogue]]
speaker = "unk"
original = "２人とは少し前、保健室に目撃される不審者の一件で知り合い、仲よくなった。"
translation = "두 사람과는 조금 전, 양호실에서 목격된 수상한 사람 건으로 알게 되어, 친해졌다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふん。ソフレは仕方なく協力しただけで、別に仲よくなったつもりはないのだわ」"
translation = "「흥. 소프레는 어쩔 수 없이 협력했을 뿐이지, 딱히 친해진 생각은 없어요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「というか、フェリシー！\u3000お前のこともまだ、友達だと認めた覚えはないのよ！」"
translation = "「그보다, 펠리시! 너도 아직 친구라고 인정한 기억은 없는걸요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「えぇ～！？\u3000そんな～！」"
translation = "「에에~!? 너무해~!」"

[[dialogue]]
speaker = "unk"
original = "そして彼女は、流星学園２年生、ソフレ・ヴァートリン。１００年前に流星市国で暴れまわり、『暴虐の吸血鬼』という二つ名で恐れられた存在である。"
translation = "그리고 그녀는 유성학원 2학년, 소프레 바트린. 100년 전에 유성시국에서 난동을 부려, 『폭학의 흡혈귀』라는 이명으로 두려움을 샀던 존재이다."

[[dialogue]]
speaker = "unk"
original = "その際に、エクソシストであったフェリシーの曾祖母によって封印され、現在は封印を解く為に、星騎士として奮闘中（？）であった。"
translation = "그 당시, 엑소시스트였던 펠리시의 증조할머니에 의해 봉인되어, 현재는 봉인을 풀기 위해 성기사로서 분투 중(?)이었다."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレってば、素直じゃないんだから……って、そんなこと言ってる間に、モンスターが来たよ！」"
translation = "「소프레도 참 솔직하지 못하다니까…… 앗, 그런 말 하는 사이에 몬스터가 왔어!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「スヤァ～………………スヤスヤ……♪」"
translation = "「쿨쿨~……………… 새근새근……♪」"

[[dialogue]]
speaker = "unk"
original = "って、この状況で寝てる！？"
translation = "아니, 이 상황에서 자고 있어!?"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「仕方ない。それなら――ソフレ、ほら起きて！\u3000こちょこちょこちょこちょ～♪」"
translation = "「어쩔 수 없네. 그렇다면―― 소프레, 자 일어나! 간질간질간질간질~♪」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……！\u3000ちょっ、お前！\u3000止めるのだわ！\u3000やめっ……あはっ！\u3000あはははははっ！」"
translation = "「……! 잠깢, 너! 그만두세요! 그만…… 아핫! 아하하하하핫!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「戦う気になった！？」"
translation = "「싸울 마음이 생겼어!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「く、くすぐったいのだわ！\u3000わ、わかったから！\u3000ちゃんと起きるから、止めるのだわ！」"
translation = "「가, 간지러워요! 아, 알았으니까! 제대로 일어날 테니까 그만둬주세요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「はぁはぁ……全く。こうなったら、さっさとアステラを消滅させて、帰って寝るのだわ！」"
translation = "「하아 하아…… 정말이지. 이렇게 된 이상, 얼른 아스텔라를 소멸시키고 돌아가서 자는 거예요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「出でよ、雷雲」"
translation = "「나타나라, 뇌운」"

[[dialogue]]
speaker = "unk"
original = "ソフレが指を鳴らすと、武器のパイプからもくもくと雲が量産されて、アステラ内の頭上を埋め尽くしていく。そして――"
translation = "소프레가 손가락을 튕기자, 무기인 파이프에서 뭉게뭉게 구름이 양산되어 아스텔라 내의 머리 위를 가득 채워 나간다. 그리고――"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「落雷で一斉砲撃なのだわ！」"
translation = "「낙뢰로 일제 포격인 거예요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――ふぅ。これでアステラ内の敵反応は全滅。コアも破壊したのだわ」"
translation = "「――후우. 이걸로 아스텔라 내의 적 반응은 전멸. 코어도 파괴한 거예요」"

[[dialogue]]
speaker = "unk"
original = "たった一撃で！？"
translation = "단 한 방에!?"

[[dialogue]]
speaker = "unk"
original = "その後、アステラは本当にすぐ消滅して、もう１つのアステラも攻略に成功したと、ヴィーナスから連絡があった。"
translation = "그 후, 아스텔라는 정말 금방 소멸했고, 다른 하나의 아스텔라도 공략에 성공했다고 비너스에게 연락이 왔다."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「さすがソフレ、やる気を出せば一騎当千だね！」"
translation = "「역시 소프레, 의욕을 내면 일당백이네!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ん？\u3000なに、会長？\u3000――改めて、ソフレの強さをすごいと思ったって？」"
translation = "「응? 뭐야, 회장? ――새삼 소프레의 강함이 대단하다고 생각했다고?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「別に、これくらい当然なのだわ。腐っても、ソフレはヴァートリン家で歴代最強と言われた吸血鬼なのよ」"
translation = "「딱히 이 정도는 당연한걸요. 썩어도 소프레는 바트린 가문에서 역대 최강이라 불린 흡혈귀인걸요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレの能力は『<ruby>雷雲<rt>らいうん</rt></ruby>使い』。本気を出せば、アステラどころか、この流星市国の空を雷雲で覆い尽くして、雷の雨を降らすことも可能なのだわ」"
translation = "「소프레의 능력은 『뇌운 술사』. 본 실력을 내면 아스텔라는커녕, 이 유성시국의 하늘을 뇌운으로 뒤덮어 번개 비를 내리게 하는 것도 가능한 거예요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「まあ……それはとても疲れるから、今更やる気なんてないけど」"
translation = "「뭐…… 그건 너무 피곤하니까, 이제 와서 할 마음 따윈 없지만요」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「それに今は、１００年反省して、『<ruby>善<rt>い</rt></ruby>い吸血鬼』になったもんね♪」"
translation = "「게다가 지금은 100년 동안 반성해서, 『착한 흡혈귀』가 됐으니까♪」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「はあ？\u3000そんなものになった覚えはないのだわ！」"
translation = "「하아? 그런 게 된 기억은 없는 데요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「またまた～、学園を一緒に卒業して、卒業旅行に行こうって約束したじゃん♪」"
translation = "「또 그런다~ 학원을 같이 졸업해서 졸업 여행 가자고 약속했잖아♪」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレはまだ、了承なんてしてないのよ！」"
translation = "「소프레는 아직 승낙한 적 없는걸요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「でも、今回のアステラ攻略で、また卒業旅行に１歩近づいたし！」"
translation = "「하지만 이번 아스텔라 공략으로 또 졸업 여행에 한 걸음 다가갔고!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「さっきソフレの封印を確認したら、刑期が１年短くなってたよ♪\u3000やったね！」"
translation = "「방금 소프레의 봉인을 확인했더니, 형기가 1년 줄어들어 있었어♪ 잘됐다!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「たった１年ぽっちじゃないの。封印はまだ２７９９年分も残ってるのよ？\u3000全然嬉しくないのだわ」"
translation = "「고작 1년뿐이잖아요. 봉인은 아직 2799년분이나 남아있다고요? 전혀 기쁘지 않아요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「星騎士として善行を積んだら刑期が減るといっても、こんなペースじゃ、毎日アステラを攻略したところで卒業までに間に合いっこないのよ」"
translation = "「성기사로서 선행을 쌓으면 형기가 줄어든다고는 해도, 이런 페이스라면 매일 아스텔라를 공략해 봤자 졸업 전까지 맞출 수 없는걸요」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「大丈夫大丈夫。コツコツ頑張ってれば、そのうちドカンと大活躍できるチャンスが必ずやって来るって！」"
translation = "「괜찮아 괜찮아. 꾸준히 노력하다 보면 머지않아 크게 활약할 기회가 반드시 올 거야!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「心配性の癖に、お前のその根拠のない自信は一体どこからやって来るのだわ……」"
translation = "「걱정쟁이인 주제에, 너의 그 근거 없는 자신감은 도대체 어디서 나오는 것인가요……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ん～、エクソシストの勘ってやつかな？\u3000善行を積めば、それはいずれ自分に返って来るものだよ。女神様だって、ソフレが頑張ればきっと、見ていてくれるはずだしね！」"
translation = "「음~ 엑소시스트의 감이랄까? 선행을 쌓으면 그건 언젠가 자신에게 돌아오는 법이야. 여신님도 소프레가 노력하면 분명 지켜봐 주실 거고 말이지!」"

[[dialogue]]
speaker = "unk"
original = "実際、俺はすごく助かったしな。ありがとう"
translation = "실제로 나는 큰 도움을 받았으니까. 고마워."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……！\u3000べ、別に、感謝される為にやったわけじゃないのだわ。ソフレはただ、さっさと帰って寝たいから、目の前の面倒事を仕方なく片づけただけなのよ」"
translation = "「……! 딱, 딱히 감사받으려고 한 건 아니에요. 소프레는 그저 얼른 돌아가서 자고 싶으니까, 눈앞의 귀찮은 일을 어쩔 수 없이 치웠을 뿐인걸요」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「おっ、ソフレ、もしかしてちょっと照れてる？」"
translation = "「오, 소프레, 혹시 좀 수줍어하는 거야?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「なっ……そんなわけないのだわ！\u3000お礼ごときで、ソフレは嬉しくなったりなんかしないのよ！」"
translation = "「나앗…… 그럴 리 없는 거예요! 고맙다는 말 따위로 소프레는 기뻐지거나 하지 않는걸요!」"

[[dialogue]]
speaker = "unk"
original = "かつて『暴虐の吸血鬼』と恐れられたソフレが、昔どんな感じだったのか、俺には分からない。"
translation = "과거에 『폭학의 흡혈귀』라고 두려움을 샀던 소프레가 예전에 어떤 느낌이었는지 나는 모른다."

[[dialogue]]
speaker = "unk"
original = "でも今は、友達として仲良くしていきたいと、素直に思うのだった。"
translation = "하지만 지금은 친구로서 사이좋게 지내고 싶다고 솔직하게 생각하는 것이었다."

