[[dialogue]]
speaker = "ルリエル"
original = "「う、う～ん……」"
translation = "「우, 으~음……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ここは……？」"
translation = "「여기는……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この商店街、なんだか見覚えがあるような……」"
translation = "「이 상점가, 왠지 본 적이 있는 것 같은데……」"

[[dialogue]]
speaker = "ロロット"
original = "「おお、懐かしきこの景色……どうやら、無事に帰ってこられたようですね！\u3000ひとまず、じいやにお迎えを頼まずに済みそうです」"
translation = "「오오, 그리운 이 풍경…… 아무래도, 무사히 돌아온 것 같네요! 일단, 집사에게 마중을 부탁하지 않아도 될 것 같습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ということは……！」"
translation = "「그렇다는 것은……!」"

[[dialogue]]
speaker = "ナナカ"
original = "「そっ、アタシたちの住んでる、流星町でい！」"
translation = "「그렇지, 우리들이 살고 있는, 유성 마을이다!」"

[[dialogue]]
speaker = "ロロット"
original = "「皆さん、ようこそ！」"
translation = "「여러분, 어서 오세요!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ってことでまずは、腹ごしらえといこうじゃないの！\u3000へい、かけそばお待ちぃ！」"
translation = "「라는 거로 우선은, 배를 채우러 가자고! 헤이, 카케소바 나왔소!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わぁ、おいしそう～！\u3000実は、ちょっと楽しみだったのよね～」"
translation = "「와아, 맛있겠다~! 실은, 좀 기대하고 있었어~」"

[[dialogue]]
speaker = "ナナカ"
original = "「こっちはざるそばね、へいお待ちぃ！」"
translation = "「이쪽은 자루소바요, 헤이 나왔소!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます。ですが、こんなに悠長にしていていいのでしょうか……」"
translation = "「감사합니다. 하지만, 이렇게 한가롭게 있어도 괜찮을까요……」"

[[dialogue]]
speaker = "ロロット"
original = "「まあまあ、腹が減ってはいい探索はできぬ、と言いますからね」"
translation = "「뭐어 뭐어, 배가 고프면 좋은 탐색을 할 수 없다고 하니까요」"

[[dialogue]]
speaker = "ナナカ"
original = "「そーいうこと！\u3000まずは夕霧庵特製のソバ食いねぇ！」"
translation = "「그렇고말고! 우선은 유우기리안 특제 소바 먹으라구!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ！\u3000ずるずるっ……せっかくご馳走してくれるんだから、いただかないと失礼よ！\u3000もぐもぐ……っ」"
translation = "「그래! 후루룩…… 모처럼 대접해 주는 건데, 안 먹으면 실례지! 냠냠……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あの、喋るか食べるか、どちらかにした方がいいのでは……？」"
translation = "「저, 말하거나 먹거나, 둘 중 하나를 하는 편이 좋지 않을까요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でも、本当においしいです。以前いただいた時の記憶が曖昧だったので、また味わえて嬉しいです」"
translation = "「하지만, 정말로 맛있습니다. 이전에 먹었을 때의 기억이 희미해서, 다시 맛볼 수 있어서 기쁩니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「そいつは何より！\u3000自慢じゃないけど、この商店街にある飲食店の中でも、結構な人気なもんでねぇ」"
translation = "「그거 다행이네! 자랑은 아니지만, 이 상점가에 있는 음식점 중에서도, 꽤 인기 있는 편이라서 말이야」"

[[dialogue]]
speaker = "ロロット"
original = "「それはもう自慢では？」"
translation = "「그건 이미 자랑 아닌가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「納得の味です」"
translation = "「납득이 가는 맛입니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「あ、いやいやっ、勿論他のお店もおいしいからねっ」"
translation = "「아, 아니 아니! 물론 다른 가게들도 맛있으니까!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ほら、アタシは別にお勧めしないけどさ、ぶぶづけが推してる和菓子屋さんとか、さっちんがハマってるショコラのケーキとか……っ」"
translation = "「봐, 나는 딱히 추천하지는 않지만 말이야, 부부즈케가 밀고 있는 화과자 가게라든가, 삿칭이 빠져 있는 쇼콜라 케이크라든가……!」"

[[dialogue]]
speaker = "ロロット"
original = "「情緒が迷子では？」"
translation = "「정서가 미아가 아닌가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ、あとで他のお店も寄ってみたいわ！」"
translation = "「그럼, 나중에 다른 가게도 들러보고 싶어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええっと、本来の目的を見失わないで下さいね」"
translation = "「에엣, 본래의 목적을 잃지 말아 주세요」"

[[dialogue]]
speaker = "ナナカ"
original = "「おっと、そうだった。そんで、どっから探すんだっけ？」"
translation = "「이런, 그랬지. 그래서, 어디서부터 찾는 거였지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はっ……！\u3000勢いで空間の裂け目に飛び込んじゃったから、手がかりらしい手がかりが何もないわ！」"
translation = "「핫……! 기세로 공간의 틈에 뛰어들어 버려서, 단서라고 할 만한 단서가 아무것도 없어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね。できるだけ、効率的に捜索できるといいのですが……」"
translation = "「그렇습니다. 되도록, 효율적으로 수색할 수 있으면 좋겠는데요……」"

[[dialogue]]
speaker = "ナナカ"
original = "「ん～……よしきた、合点承知でい！」"
translation = "「음~…… 좋아, 알겠소!」"

[[dialogue]]
speaker = "ナナカ"
original = "「要は、パパッとあちこち見て回れりゃいいわけでしょ？\u3000だったらアタシに任せときな！」"
translation = "「요점은, 후딱 여기저기 둘러보면 되는 거잖아? 그렇다면 나한테 맡겨!」"

[[dialogue]]
speaker = "ナナカ"
original = "「なんなら捜索ついでに、道中で町の案内できちゃうぐらいにゃあ、土地勘バッチリだかんね！」"
translation = "「하다못해 수색하는 김에, 도중에 마을 안내까지 할 수 있을 정도로, 지리에 빠삭하거든!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へ～、それは頼もしいわね！\u3000以前はドタバタしてて、あんまり案内してもらうどころじゃなかったし」"
translation = "「헤~, 그거 든든하네! 이전에는 정신없이 바빠서, 제대로 안내받을 상황이 아니었고」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね、まだまだ異世界を堪能しきれていませんでしたから！」"
translation = "「그렇습니다, 아직 이세계를 충분히 만끽하지 못했으니까요!」"

[[dialogue]]
speaker = "ロロット"
original = "「ええ、ええ、方舟に乗ったつもりでどうぞ。わたしにも、人間界の情報を網羅した、このガイドブックがありますからね！」"
translation = "「네, 네, 방주에 탄 셈 치고 오세요. 저에게도, 인간계의 정보를 망라한, 이 가이드북이 있으니까요!」"

[[dialogue]]
speaker = "ロロット"
original = "「どうしてもと言うことでしたら、わたしの特別なお散歩コースもご覧に入れましょう」"
translation = "「정 그러시다면, 저의 특별한 산책 코스도 보여드리죠」"

[[dialogue]]
speaker = "ルリエル"
original = "「それは、ちょっと怪しいんですけど……」"
translation = "「그건, 좀 수상한데요……」"

[[dialogue]]
speaker = "ロロット"
original = "「そんなことありませ～ん！」"
translation = "「그런 일 없어요~!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ちなみにさ、常連さんや商店街の知り合いに軽く当たってみてたんだけど、この辺じゃ特に、怪しい人影の目撃情報とかはないみたいだね」"
translation = "「참고로 말이야, 단골손님이나 상점가 지인들에게 가볍게 물어봤는데, 이 근처에서는 딱히, 수상한 인물의 목격 정보 같은 건 없는 것 같네」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっ、既に情報収集が進んでいたんですね……！」"
translation = "「엣, 벌써 정보 수집이 진행되고 있었군요……!」"

[[dialogue]]
speaker = "ロロット"
original = "「ほほう、さすがはせっかちな会計さん、ナイスな手際です」"
translation = "「호오, 역시 성급한 회계 담당, 멋진 솜씨입니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「せっかちは余計でいっ」"
translation = "「성급한 건 여분이다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「では、商店街以外の場所から捜索していく、という感じなのでしょうか……？」"
translation = "「그럼, 상점가 이외의 장소부터 수색해 나가는, 그런 느낌일까요……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「な～んだ、デザートはお預けみたいね」"
translation = "「뭐~야, 디저트는 보류인 것 같네」"

[[dialogue]]
speaker = "ナナカ"
original = "「決まりだね！\u3000そんじゃあとにかく善は急げ、食べ終わったら出発でい！」"
translation = "「결정이다! 그럼 어쨌든 선은 급할수록 좋으니, 다 먹으면 출발이다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「へぇ……この道が、こちらの世界の流星学園への、通学路なんですね」"
translation = "「헤에…… 이 길이, 이쪽 세계의 유성 학원으로의, 통학로군요」"

[[dialogue]]
speaker = "ロロット"
original = "「こうやって歩くのも、たまにはいいものですね～」"
translation = "「이렇게 걷는 것도, 가끔은 좋은 것이네요~」"

[[dialogue]]
speaker = "ナナカ"
original = "「ロロちゃんまで物珍しそうにしてんのはなんなの」"
translation = "「로로짱까지 신기한 듯이 구는 건 뭐야」"

[[dialogue]]
speaker = "ロロット"
original = "「いつもはじいやに送り迎えをしてもらってばかりですので、時には初心に返ってお散歩するのも、いいものなのです」"
translation = "「평소에는 집사에게 데려다 달라고만 했기 때문에, 때로는 초심으로 돌아가 산책하는 것도, 좋은 것입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんだか、のどかな景色で落ち着くわね」"
translation = "「왠지, 평화로운 풍경이라 마음이 놓이네」"

[[dialogue]]
speaker = "ナナカ"
original = "「まあ、魔族と戦ったり、人災でベッキバキにぶっ壊されたり、意外と退屈しない道でもあるんだけどね」"
translation = "「뭐, 마족과 싸우거나, 인재로 박살 나거나, 의외로 지루하지 않은 길이기도 하지만 말이야」"

[[dialogue]]
speaker = "ルリエル"
original = "「……なんだか、こちらの世界はこちらの世界で、色々と大変なのですね」"
translation = "「……왠지, 이쪽 세계는 이쪽 세계대로, 여러 가지로 힘든 일이 많군요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、そういえば、リアさんや聖沙はどこにいるのかしら。久しぶりに会いたいわ」"
translation = "「아, 그러고 보니, 리아 씨나 미사는 어디에 있는 걸까. 오랜만에 만나고 싶어」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね。それに、また協力を仰げるのであれば、心強いですし」"
translation = "「그렇습니다. 게다가, 다시 협력을 구할 수 있다면, 든든하고요」"

[[dialogue]]
speaker = "ナナカ"
original = "「あぁ～、それがさ～……」"
translation = "「아~, 그게 말이야~……」"

[[dialogue]]
speaker = "ナナカ"
original = "「リア先輩、ヘレナさんの弾丸温泉巡りツアーに、無理矢理連れて行かれちゃったみたいでさ……」"
translation = "「리아 선배, 헬레나 씨의 탄환 온천 순회 투어에, 억지로 끌려간 것 같아서 말이야……」"

[[dialogue]]
speaker = "ナナカ"
original = "「んで、ツアーのチケットがもう一枚あるからって、聖沙もそれに巻き込まれたらしいんだよね」"
translation = "「그래서, 투어 티켓이 한 장 더 있다고 해서, 미사도 거기에 휘말린 것 같더라고」"

[[dialogue]]
speaker = "ロロット"
original = "「副会長さんは、ウキウキでついて行ったようでしたが」"
translation = "「부회장님은, 신나서 따라간 것 같았습니다만」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうでしたか、それは残念です。タイミングが悪かったですね」"
translation = "「그랬군요, 그건 유감입니다. 타이밍이 안 좋았네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そっかぁ、なら仕方ないわね。今はとにかく、私たちだけでクロトを探しましょ」"
translation = "「그렇구나, 그럼 어쩔 수 없네. 지금은 일단, 우리들끼리 쿠로토를 찾자」"

[[dialogue]]
speaker = "メイプル"
original = "「どう、お兄ちゃんの様子は」"
translation = "「어때, 오빠의 상태는」"

[[dialogue]]
speaker = "パッキー"
original = "「クックック……しっかりと拘束の暗示がかかっているようだぜ」"
translation = "「크크크…… 확실히 구속의 암시가 걸려 있는 것 같군」"

[[dialogue]]
speaker = "パッキー"
original = "「必要最低限の会話はできるようにしておいたが、ま、これならそう簡単には逃げ出せないだろうよ」"
translation = "「필요 최소한의 대화는 할 수 있도록 해뒀지만, 뭐, 이 정도면 그렇게 쉽게 도망치지는 못할 거다」"

[[dialogue]]
speaker = "メイプル"
original = "「よろしい。それじゃあお兄ちゃん、早速だけど、本題に入らせてもらうね」"
translation = "「좋아. 그럼 오빠, 바로 본론으로 들어가 볼게」"

[[dialogue]]
speaker = "メイプル"
original = "「ここまでしておいてなんだけど、ホントはあたし、あんまり手荒な真似はしたくないんだよね……」"
translation = "「여기까지 해놓고 하는 말이지만, 사실 나는, 별로 거친 짓은 하고 싶지 않아……」"

[[dialogue]]
speaker = "メイプル"
original = "「だから、シンお兄ちゃんから奪った魔王因子を、おとなしく返して！\u3000そうすれば、安全に解放してあげる」"
translation = "「그러니까, 신 오빠에게서 빼앗은 마왕 인자를, 얌전히 돌려줘! 그렇게 하면, 안전하게 해방시켜 줄게」"

[[dialogue]]
speaker = "unk"
original = "魔王の力はシンから譲り受けたんだ"
translation = "마왕의 힘은 신에게서 물려받은 거다"

[[dialogue]]
speaker = "メイプル"
original = "「はあ～？\u3000なに言ってるの……」"
translation = "「하아~? 무슨 말을 하는 거야……」"

[[dialogue]]
speaker = "メイプル"
original = "「それに……あたしは、マカロンじゃなくて、メイプル……？」"
translation = "「게다가…… 나는, 마카롱이 아니라, 메이플……?」"

[[dialogue]]
speaker = "メイプル"
original = "「そんな、ことは……」"
translation = "「설마, 그런……」"

[[dialogue]]
speaker = "メイプル"
original = "「あたしは、見習いだけど、魔王で……お兄ちゃんの妹で……」"
translation = "「나는, 견습이지만, 마왕이고…… 오빠의 여동생이고……」"

[[dialogue]]
speaker = "パッキー"
original = "「ん？\u3000おい、妹……」"
translation = "「응? 이봐, 여동생……」"

[[dialogue]]
speaker = "メイプル"
original = "「でも、世界を救ったクルセイダースの末裔だし……モノクラウン家の娘で……あ、あれ……？」"
translation = "「하지만, 세계를 구한 크루세이더스의 후예이고…… 모노크라운 가문의 딸이고…… 아, 어라……?」"

[[dialogue]]
speaker = "パッキー"
original = "「おっと、騙されちゃいけねーぜ！\u3000寝言は寝て言いな！」"
translation = "「이런, 속아 넘어가면 안 돼! 헛소리는 자면서 해라!」"

[[dialogue]]
speaker = "メイプル"
original = "「はっ……！\u3000う、うん……！」"
translation = "「핫……! 으, 응……!」"

[[dialogue]]
speaker = "パッキー"
original = "「オメーはただ、今の自分の信念に従って行動してりゃいいんだぜ」"
translation = "「너는 그저, 지금의 네 신념에 따라 행동하고 있으면 되는 거다」"

[[dialogue]]
speaker = "メイプル"
original = "「わ、わかってるよっ……！\u3000そんなこと、言われなくても……」"
translation = "「아, 알고 있다구……! 그런 거, 말하지 않아도……」"

[[dialogue]]
speaker = "パッキー"
original = "「クックック……いい子だぜ」"
translation = "「크크크…… 착하군」"

[[dialogue]]
speaker = "メイプル"
original = "「でも……うぅ～、なんだか頭の中がモヤモヤして、落ち着かない………」"
translation = "「하지만…… 으으~, 왠지 머릿속이 답답하고, 불안해………」"

[[dialogue]]
speaker = "メイプル"
original = "「ちょっと、アルザードでもさすって落ち着こう……」"
translation = "「잠깐, 알자드라도 문지르면서 진정하자……」"

[[dialogue]]
speaker = "unk"
original = "……ねえ、大丈夫？"
translation = "……저기, 괜찮아?"

[[dialogue]]
speaker = "メイプル"
original = "「……にひひ、平気平気～。この大剣アルザードは、あたしの自慢の相棒なんだから」"
translation = "「……니히히, 괜찮아 괜찮아~. 이 대검 알자드는, 나의 자랑스러운 단짝이니까」"

[[dialogue]]
speaker = "メイプル"
original = "「ほら、どう、かっこいいでしょ～♪\u3000羨ましい？\u3000そうだよね、そうだよね～。ちょっとだけなら、近くで見せてあげてもいいよっ」"
translation = "「봐, 어때, 멋있지~♪ 부러워? 그렇지 그렇지~. 아주 조금만이라면, 가까이서 보여줘도 돼」"

[[dialogue]]
speaker = "パッキー"
original = "「あっ、おい、不用意に手放すと……！」"
translation = "「앗, 이봐, 경솔하게 손을 놓으면……!」"

[[dialogue]]
speaker = "メイプル"
original = "「…………っ」"
translation = "「…………!」"

[[dialogue]]
speaker = "メイプル"
original = "「……うっ、うわぁ～ん！\u3000アルザード取られたぁ～～！」"
translation = "「……윽, 으아앙~! 알자드 빼앗겼어~~!」"

[[dialogue]]
speaker = "パッキー"
original = "「あーほら、言わんこっちゃない……ちょっと剣を手放すと、すぐ幼○化しちまうんだからよ……」"
translation = "「아이고, 거봐, 내가 뭐랬어…… 잠깐 검을 놓으면, 바로 유아화해 버리니까 말이야……」"

[[dialogue]]
speaker = "メイプル"
original = "「ヤダヤダヤダ～～っ！\u3000返してかえして～～っ！」"
translation = "「싫어 싫어 싫어~~! 돌려줘 돌려줘~~!」"

[[dialogue]]
speaker = "パッキー"
original = "「ったく、おしゃぶりにしてはクセが強すぎるぜ……」"
translation = "「이런, 쪽쪽이 치고는 버릇이 너무 강하군……」"

[[dialogue]]
speaker = "ナナカ"
original = "「みんな、こっちから鳴き声が聞こえたよ！」"
translation = "「다들, 이쪽에서 우는 소리가 들렸어!」"

[[dialogue]]
speaker = "ロロット"
original = "「あの方はきっと、さらわれてしまった不安で、泣き叫んでいるのですね……」"
translation = "「저분은 분명, 납치당한 불안함에, 울부짖고 계시는군요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトはそんなに情けなくないわよっ」"
translation = "「쿠로토는 그렇게 한심하지 않아!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、いましたよ、あそこです！」"
translation = "「앗, 있었어요, 저기입니다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長っ！」"
translation = "「히노미야 회장!」"

[[dialogue]]
speaker = "パッキー"
original = "「チッ、しまった、見つかっちまったぜ……！」"
translation = "「칫, 이런, 들켜 버렸잖아……!」"

[[dialogue]]
speaker = "メイプル"
original = "「うぅ……ぐす……っ」"
translation = "「으윽…… 훌쩍……!」"

