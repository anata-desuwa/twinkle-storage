[[dialogue]]
speaker = "unk"
original = "第２話,魔界の正月異文化,P"
translation = "제2화, 마계의 정월 이문화, P"

[[dialogue]]
speaker = "unk"
original = "俺とトリシャさん、ヴィーナスとフィオナの百人一首対決の結果は──"
translation = "나와 트리샤 씨, 비너스와 피오나의 햐쿠닌잇슈 대결 결과는──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん、私たちの勝ちね！\u3000思ってた以上に白熱したわ！」"
translation = "「후훈, 우리들의 승리네! 생각했던 것 이상으로 달아올랐어!」"

[[dialogue]]
speaker = "トリシャ"
original = "「残念です……それなりの枚数が取れたと思ったのですが……」"
translation = "「아쉽습니다…… 나름대로 많은 장수를 집었다고 생각했습니다만……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、とても手強かったですよ。初めてとは思えないくらいでした」"
translation = "「에에, 정말 만만치 않았어요. 처음이라고는 믿기지 않을 정도였답니다.」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは楽しかった？"
translation = "「트리샤 씨는 즐거웠어?」"

[[dialogue]]
speaker = "トリシャ"
original = "「は、はい……楽しかったです……とても……」"
translation = "「하, 네…… 즐거웠습니다…… 아주 많이……」"

[[dialogue]]
speaker = "トリシャ"
original = "「また、やりたいです……その時までに、ちゃんと覚えておきます……」"
translation = "「또 하고 싶습니다…… 그때까지는 제대로 외워 두겠습니다……」"

[[dialogue]]
speaker = "unk"
original = "次は勝ちましょう！"
translation = "「다음엔 이기자!」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……必ず……！」"
translation = "「네…… 반드시……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ところでトリシャさん。さっきはカルタをしましたけど、魔界にも正月ならではの遊びや文化はあるのですか？」"
translation = "「그런데 트리샤 씨. 방금은 카르타를 했습니다만, 마계에도 정월만의 놀이나 문화가 있나요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「そうですね……日本ほど華々しくはありませんが……新年を迎える準備や宴は、魔界にも……あります」"
translation = "「글쎄요…… 일본만큼 화려하지는 않지만…… 신년을 맞이하는 준비나 연회는 마계에도…… 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "魔界の正月文化、興味深いです"
translation = "「마계의 정월 문화, 흥미롭네요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「そうでしょうか……？\u3000さして面白くもないかと思いますが……私が知っているものでよければ、ご紹介します……」"
translation = "「그럴까요……? 그다지 재미있지도 않을 거라 생각합니다만…… 제가 아는 것이라도 괜찮다면 소개해 드리겠습니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「物心つく前に両親と離れ離れになってしまいましたし……あまり他人と接していなかったので、定かではない部分もありますが……」"
translation = "「철들기 전에 부모님과 떨어지게 되었고…… 타인과 접할 기회가 거의 없었기에 확실치 않은 부분도 있습니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっと重めのスタートだわ！」"
translation = "「시작부터 좀 무거워!」"

[[dialogue]]
speaker = "トリシャ"
original = "「それに……いくつかの地方を転々としてたので……全ての地域で共通とも限りません……」"
translation = "「게다가…… 여러 지방을 전전했기에…… 모든 지역 공통이라고 할 수도 없습니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど。お雑煮ひとつ取っても、地方によって味が全然違ったりしますしね」"
translation = "「과연. 오조니 하나만 봐도 지방에 따라 맛이 전혀 다르기도 하니까요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「ああ……お雑煮やお節料理のように、特定の物……パンやお菓子を食す文化はありますね……」"
translation = "「아아…… 오조니나 오세치 요리처럼 특정한 것…… 빵이나 과자를 먹는 문화는 있네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「ナッツのクリームをたっぷり使ったパンを……食べます……。歯が浮きそうなほどに甘く……それでいて香ばしく……とても美味です」"
translation = "「너츠 크림을 듬뿍 사용한 빵을…… 먹습니다……. 이가 들뜰 정도로 달고…… 그러면서도 고소해서…… 아주 맛있습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ケーキみたいで美味しそうね！\u3000お取り寄せはできないのかしら？」"
translation = "「케이크 같아서 맛있겠네! 주문 배달은 안 되려나?」"

[[dialogue]]
speaker = "トリシャ"
original = "「できれば私もお願いしたいところですが……難しいですね……残念です」"
translation = "「가능하다면 저도 부탁드리고 싶은 참입니다만…… 어렵겠네요…… 아쉽습니다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「他には……大きなお家では針葉樹を１本買ってきて……デコレーションをしていました……門松に近いかもしれません……」"
translation = "「그 외에는…… 큰 집에서는 침엽수를 한 그루 사 와서…… 장식을 하곤 했습니다…… 카도마츠와 비슷할지도 모르겠네요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「スケールが大きいですね。ちなみに、それはクリスマスツリーではないのですよね？」"
translation = "「스케일이 크네요. 참고로 그건 크리스마스트리는 아니겠죠?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……あくまでクリスマスではなく、新年にです……約１か月ほど……飾っておきます」"
translation = "「네…… 어디까지나 크리스마스가 아니라 신년에요…… 약 한 달 정도…… 장식해 둡니다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「他には、そうですね……魔獣の毛皮をかぶって……街を練り歩いたり……」"
translation = "「또 다른 건, 글쎄요…… 마수의 모피를 뒤집어쓰고…… 거리를 행진하거나……」"

[[dialogue]]
speaker = "フィオナ"
original = "「日本でいうところの獅子舞みたいですね」"
translation = "「일본의 사자춤(시시마이) 같은 거네요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「シシマイと違うのは、狩られた本物の魔獣の毛皮を用いてることですね……他にも……元日の１日だけで、ご飯を７回食べたり……」"
translation = "「시시마이와 다른 점은 사냥한 진짜 마수의 모피를 사용한다는 점이네요…… 그 밖에도…… 원단 하루 동안만 밥을 일곱 번 먹거나……」"

[[dialogue]]
speaker = "トリシャ"
original = "「年明けに、熟した果実を他人の家のドアに叩きつけて、真っ赤に染め上げるという風習も……」"
translation = "「새해에 잘 익은 과일을 타인의 집 문에 내던져서 새빨갛게 물들이는 풍습도……」"

[[dialogue]]
speaker = "unk"
original = "ケンカになりそう！"
translation = "「싸움 나겠어!」"

[[dialogue]]
speaker = "unk"
original = "ちょっとスプラッタ！"
translation = "「좀 스플래터한데!」"

[[dialogue]]
speaker = "トリシャ"
original = "「いえ、仲の良い家に当てるのです……紅く染まれば染まるほど、友人が多いという証明に……故に……私の家が赤に染まったことはありませんでした……フフフ……」"
translation = "「아니요, 사이가 좋은 집에 던지는 겁니다…… 붉게 물들면 물들수록 친구가 많다는 증명이기에…… 고로…… 저희 집이 붉게 물든 적은 없었습니다…… 후후후……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「大丈夫、来年は私がトリシャを真っ赤に染めてあげるわ！」"
translation = "「괜찮아, 내년에는 내가 트리샤를 새빨갛게 물들여 줄게!」"

[[dialogue]]
speaker = "トリシャ"
original = "「それは……嬉しいです……友達……にへへ」"
translation = "「그건…… 기쁩니다…… 친구…… 니헤헤.」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ、真っ赤に染めるのは家の方では……」"
translation = "「아니, 새빨갛게 물들이는 건 집 쪽이 아닐지……」"

[[dialogue]]
speaker = "unk"
original = "でもトリシャさんは嬉しそう"
translation = "「하지만 트리샤 씨는 기뻐 보여.」"

[[dialogue]]
speaker = "フィオナ"
original = "「……そうですね。多少風習と違っても、きっといい思い出になります」"
translation = "「……그렇네요. 다소 풍습과는 다르더라도 분명 좋은 추억이 될 거예요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「他には……玄関のドアの上に、ニンニクを飾り……幸福を招く妖精をお出迎えします……」"
translation = "「그 외에는…… 현관문 위에 마늘을 장식하고…… 행복을 부르는 요정을 맞이합니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「吸血鬼除けのような感じですが、日本でいうところのしめ縄飾りでしょうか？\u3000幸福の妖精というのも、まるで座敷童みたいですね」"
translation = "「흡혈귀 퇴치 같은 느낌입니다만, 일본의 시메나와 장식 같은 걸까요? 행복의 요정이라는 것도 마치 자시키와라시 같네요.」"

[[dialogue]]
speaker = "unk"
original = "──などなど、トリシャの口から様々な魔界の異文化風習が伝えられた。"
translation = "──등등, 트리샤의 입을 통해 다양한 마계의 이문화 풍습이 전해졌다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「とっても面白かったわ！\u3000世の中にはまだまだ知らないことがいっぱいね！」"
translation = "「정말 재미있었어! 세상에는 아직 모르는 게 잔뜩 있네!」"

[[dialogue]]
speaker = "フィオナ"
original = "「魔界の風習であっても、どこか人間界と遠からずな部分があるのですね。世界の繋がりを感じられて、とても興味深かったです」"
translation = "「마계의 풍습이라도 어딘가 인간계와 멀지 않은 부분이 있군요. 세계의 연결을 느낄 수 있어서 무척 흥미로웠습니다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……私がこの国に親しみを感じるのも……そういった繋がりによるものなのでしょう……フフフ」"
translation = "「네…… 제가 이 나라에 친밀감을 느끼는 것도…… 그런 연결 때문이겠지요…… 후후후.」"

[[dialogue]]
speaker = "トリシャ"
original = "「こちらの振袖も……着てる内にすっかり馴染みました……和装の文化、とても素晴らしいですね……」"
translation = "「이 후리소데도…… 입고 있는 동안 완전히 익숙해졌습니다…… 와장(和装) 문화, 정말 훌륭하네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふふ、でもね、トリシャ。和装には思わぬ落とし穴があるのよ！」"
translation = "「후후후, 하지만 말이야, 트리샤. 와장에는 생각지도 못한 함정이 있다구!」"

[[dialogue]]
speaker = "トリシャ"
original = "「落とし穴ですか……？\u3000なんでしょう……何か間違っていたでしょうか……」"
translation = "「함정인가요……? 뭘까요…… 뭔가 잘못된 걸까요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「和服はね、下着を着けないものなの！」"
translation = "「전통 의상은 말이야, 속옷을 입지 않는 법이야!」"

[[dialogue]]
speaker = "トリシャ"
original = "「そ……そうなのですか……？\u3000上は着けていませんが、下は履いてしまっていますね……」"
translation = "「그…… 그런가요……? 위는 입지 않았습니다만, 아래는 입어 버렸네요……」"

[[dialogue]]
speaker = "unk"
original = "上、つけてないの！？"
translation = "「위, 안 입었어!?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……羽根つきの時も、百人一首の時も……下手に動くと、ずり落ちてしまいそうでした……」"
translation = "「네…… 하네츠키 때도, 햐쿠닌잇슈 때도…… 서투르게 움직이면 흘러내려 버릴 것 같았습니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「トリシャさんの胸元に、下着の紐が見えないとは思っていましたが、まさかつけていなかったとは……！\u3000いえ、肝心な箇所はまだ見えていませんが！」"
translation = "「트리샤 씨의 가슴팍에 속옷 끈이 보이지 않는다고는 생각했습니다만, 설마 안 입고 계셨을 줄이야……! 아니, 핵심적인 부분은 아직 안 보입니다만!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「鉄壁のブロックね！」"
translation = "「철벽 블록이네!」"

[[dialogue]]
speaker = "unk"
original = "ごくり……！"
translation = "「꿀꺽……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長、鼻の下が伸びてますよ。ちなみに和装で下着を着用しなかったのは昔の話ですからね」"
translation = "「히노미야 회장님, 코밑이 늘어났어요. 참고로 와장에서 속옷을 착용하지 않았던 건 옛날이야기니까요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね、クロトみたいにえっちな目で見る男の子もいるから、ニプレスくらいはつけた方が良いかもだわ」"
translation = "「맞아, 쿠로토처럼 야한 눈으로 보는 남자애도 있으니까 니플 패치 정도는 붙이는 게 좋을지도 몰라.」"

[[dialogue]]
speaker = "トリシャ"
original = "「はぁ……ですが、乳房くらい……見られても構わないのでは……？」"
translation = "「하아…… 하지만 유방 정도는…… 보여져도 상관없지 않을까요……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「トリシャさん！？」"
translation = "「트리샤 씨!?」"

[[dialogue]]
speaker = "トリシャ"
original = "「そんなに驚くことでしょうか……？\u3000友達同士ならば、一緒にお風呂に入ったり……裸体を見せ合うのも……普通では……？\u3000減る物でもありませんし……」"
translation = "「그렇게 놀랄 일인가요……? 친구 사이라면 같이 목욕을 하거나…… 나체를 서로 보여주는 것도…… 보통 아닌가요……? 닳는 것도 아니고요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「絶対に普通ではありませんよ！？\u3000まさかトリシャさん自身が、一番の異文化の持ち主とは思いませんでした……」"
translation = "「절대로 보통이 아니에요!? 설마 트리샤 씨 본인이 가장 큰 이문화의 소유자일 줄은 몰랐습니다……」"

[[dialogue]]
speaker = "unk"
original = "最後の最後でトリシャさんの過激な異文化感が炸裂したけれど、これは人間界・魔界には関係なく。"
translation = "마지막의 마지막에 트리샤 씨의 과격한 이문화 감각이 작렬했지만, 이건 인간계나 마계와는 상관없이."

[[dialogue]]
speaker = "unk"
original = "ただ単にトリシャさんの人づきあいの距離感がズレてるだけなのかもしれない。"
translation = "그저 단순히 트리샤 씨의 인간관계 거리감이 어긋나 있는 것뿐일지도 모른다."

