[[dialogue]]
speaker = "unk"
original = "第４話,時計の針を進めて,P"
translation = "제4화, 시계 바늘을 돌려서"

[[dialogue]]
speaker = "unk"
original = "その日、モンスター出現の報せを受け、俺はトワちゃんや星徒会メンバーと共に現場へ急行し、応戦していた。"
translation = "그날, 몬스터 출현 소식을 듣고 나는 토와짱이나 성도회 멤버들과 함께 현장으로 급행하여 응전하고 있었다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギギ！」"
translation = "「기기!」"

[[dialogue]]
speaker_original = "女性"
speaker_translation = "여성"
original = "「この子は傷つけさせない……！」"
translation = "「이 아이는 다치게 하지 않겠어……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はああぁっ！\u3000バレンタインマーキュリー！」"
translation = "「하아아앗! 발렌타인 머큐리!」"

[[dialogue]]
speaker_original = "女性"
speaker_translation = "여성"
original = "「あっ……！」"
translation = "「앗……!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギーーッ！？」"
translation = "「기이익!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふぅ……よかった、間に合って。怪我はありませんか？」"
translation = "「후우…… 다행이다, 늦지 않아서. 다친 곳은 없나요?」"

[[dialogue]]
speaker_original = "女性"
speaker_translation = "여성"
original = "「うん、大丈夫。助けてくれてありがとう、トワ」"
translation = "「응, 괜찮아. 구해줘서 고마워, 토와.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え？\u3000あっ――カコ！？」"
translation = "「에? 앗――카코!?」"

[[dialogue]]
speaker = "unk"
original = "戦闘を終えて現場が落ち着いた頃、トワちゃんのところへ行くと、知り合いらしい大人の女性と話していた。"
translation = "전투를 마치고 현장이 진정되었을 무렵, 토와짱이 있는 곳으로 가니 아는 사이인 듯한 성인 여성과 이야기하고 있었다."

[[dialogue]]
speaker = "unk"
original = "トワちゃん、そちらの方は？"
translation = "「토와짱, 그분은?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、会長くん！\u3000紹介するね。この人は私が学園に通っていた頃の同級生で――」"
translation = "「앗, 회장 군! 소개할게. 이분은 내가 학원에 다닐 때 동급생이었던――」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「初めまして、会長くん。私は元星騎士で、トワやマリオンと一緒に星徒会をやってた『<ruby>時川<rt>ときかわ</rt></ruby>カコ』って言います。よろしくね♪」"
translation = "「처음 뵙겠습니다, 회장 군. 나는 전 성기사로 토와나 마리온이랑 같이 성도회를 했던 『토키카와 카코』라고 해요. 잘 부탁해♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「カコはね、当時マリオンに負けないくらい強い副会長だったんだよ～」"
translation = "「카코는 말이야, 당시 마리온에게 지지 않을 정도로 강했던 부회장이었어~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「今はこんなに綺麗で落ち着いた人妻さんだけど、当時は巨大なメイスをバットみたいにぶん回す、ゴリゴリの近距離型星騎士で～」"
translation = "「지금은 이렇게 예쁘고 차분한 유부녀 씨지만, 당시엔 거대한 메이스를 배트처럼 휘두르는 우락부락한 근거리형 성기사였고~」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「ちょっ、言い方！\u3000なんかゴリラみたいな聞こえるからやめて～」"
translation = "「잠깐, 말하는 뽄새 봐! 왠지 고릴라처럼 들리니까 그만해~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あははっ♪\u3000ごめんごめん。でも、ほんと強かったんだよ！\u3000――そういえば、体はもう大丈夫？\u3000最近忙しくてなかなか会いに行けてなかったけど……」"
translation = "「아하하♪ 미안 미안. 하지만 정말 강했다니까! ――그러고 보니 몸은 이제 괜찮아? 요즘 바빠서 좀처럼 만나러 가지 못했는데……」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「うん、もうすっかり元気♪\u3000これでも元星騎士だからね。それに――この子を守るために、お母さんとしても頑張らないと」"
translation = "「응, 이제 완전히 건강해♪ 이래 봬도 전 성기사니까. 게다가―― 이 아이를 지키기 위해서 엄마로서도 힘내야지.」"

[[dialogue]]
speaker = "unk"
original = "カコさんの腕には、小さな赤ちゃんがすやすやと眠っていた。"
translation = "카코 씨의 품에는 작은 아기가 새근새근 잠들어 있었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふふっ……可愛い♪\u3000確か、女の子だったよね？」"
translation = "「후훗…… 귀여워♪ 분명 여자아이였지?」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「うん。ありがとね、トワ。助けてくれて……。でも、びっくりしちゃった！\u3000まさかそんな可愛い衣装で現れるなんて」"
translation = "「응. 고마워, 토와. 구해줘서……. 하지만 깜짝 놀랐어! 설마 그런 귀여운 의상으로 나타날 줄이야.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ！？\u3000あっ、こ、これは最近新しく変身できるようになった『バレンタインフォーム』で……」"
translation = "「에? 앗, 이, 이건 최근에 새로 변신할 수 있게 된 『발렌타인 폼』이라서……」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「先生としてだけじゃなく、星騎士としても活躍してるって聞いたよ。マリオンから」"
translation = "「선생님으로서뿐만 아니라 성기사로서도 활약하고 있다고 들었어. 마리온한테서.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「今も強くなり続けてるなんて、トワはほんとすごい星騎士だね。……正直、ちょっと羨ましいくらい」"
translation = "「지금도 계속 강해지고 있다니, 토와는 정말 대단한 성기사네. ……솔직히 조금 부러울 정도야.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「カコ……？」"
translation = "「카코……?」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「さっきみたいにモンスターに襲われても、私はもう星力を使えなくて、この子を守ってあげられないから……」"
translation = "「방금처럼 몬스터에게 습격당해도 나는 이제 성력을 쓸 수 없어서 이 아이를 지켜줄 수 없으니까……」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「――ごめんね、トワ。ずっと謝らなきゃと思っていたことがあるの。私が星力を失った時……泣きながら『私の分まで戦ってほしい』ってお願いしたこと、覚えてる？」"
translation = "「――미안해, 토와. 줄곧 사과해야겠다고 생각했던 게 있어. 내가 성력을 잃었을 때…… 울면서 『내 몫까지 싸워줘』라고 부탁했던 거 기억해?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……うん、覚えてるよ」"
translation = "「……응, 기억해.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「もしかしたら、あれがトワのプレッシャーになってたんじゃないかって……私、後から気づいたの」"
translation = "「어쩌면 그게 토와에게 프레셔가 됐던 게 아닐까 하고…… 나중에야 깨달았어.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「でも、頑張っているトワを見ていたら……やっぱり気にしなくていいなんて、今更言えなくなっちゃって……」"
translation = "「하지만 열심히 하는 토와를 보고 있으면…… 역시 신경 쓰지 않아도 된다고 이제 와서 말할 수 없게 되어버려서……」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「トワが本当は、自分の特殊体質をあまり好きじゃないってこと……私、知ってたのに。……本当にごめん」"
translation = "「토와가 사실은 자신의 특수 체질을 별로 좋아하지 않는다는 거…… 나 알고 있었는데. ……정말 미안해.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、カコさんは深く頭を下げる。トワちゃんは１度息を吸って、ゆっくりと口を開いた。"
translation = "그렇게 말하며 카코 씨는 깊이 고개를 숙인다. 토와짱은 한 번 숨을 들이키고 천천히 입을 열었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……確かに、そう思ったこともあったよ。でも――最近はね、この『自動回復』の特殊体質があってよかったって、素直に思えるようになってきたんだ」"
translation = "「……분명 그렇게 생각한 적도 있었어. 하지만―― 요즘은 말이야, 이 『자동 회복』 특수 체질이 있어서 다행이라고 솔직하게 생각하게 됐어.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そのおかげで私は、今もこうして――友達の幸せを守ることができる」"
translation = "「그 덕분에 나는 지금도 이렇게―― 친구의 행복을 지킬 수 있으니까.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だから、今度は私からカコにお願いするね。カコは『お母さん』として、その子を幸せにしてあげて」"
translation = "「그러니까 이번엔 내가 카코한테 부탁할게. 카코는 『엄마』로서 그 아이를 행복하게 해줘.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「この子を、幸せに……？」"
translation = "「이 아이를 행복하게……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そう。それは私にはできない――お母さんになったカコだからこそ、できることだから」"
translation = "「응. 그건 나한테는 불가능한―― 엄마가 된 카코이기에 할 수 있는 일이니까.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「……うん、そうだね。ありがとう、トワ」"
translation = "「……응, 그렇네. 고마워, 토와.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「私――お母さんとしてもっと強くなるよ」"
translation = "「나―― 엄마로서 좀 더 강해질게.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん！\u3000私も――カコたちの想いを背負って頑張るから♪」"
translation = "「응! 나도―― 카코 일행의 마음을 짊어지고 힘낼 테니까♪」"

[[dialogue]]
speaker = "unk"
original = "２人は互いに笑い合い、未来への決意を言葉にした。"
translation = "두 사람은 서로 마주 보며 웃고, 미래를 향한 결의를 말로 나누었다."

[[dialogue]]
speaker = "unk"
original = "そしてカコさんは、ふと俺の方に視線を向ける。"
translation = "그리고 카코 씨는 문득 내 쪽으로 시선을 돌린다."

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「ところで……トワって、会長くんと『いい感じ』だったりする？」"
translation = "「그런데…… 토와는 회장 군이랑 『좋은 느낌』이거나 해?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ！？\u3000どどど、どうして！？」"
translation = "「에엣!? 어어어, 어째서!?」"

[[dialogue]]
speaker = "unk"
original = "一応、教師と生徒という関係のため、恋人であることはなるべく周囲には内緒にしている。焦るトワちゃんを見て、カコさんは優しく笑った。"
translation = "일단 교사와 학생이라는 관계이기에 연인인 것은 가급적 주변에는 비밀로 하고 있다. 당황하는 토와짱을 보며 카코 씨는 부드럽게 웃었다."

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「ふふっ、長い付き合いだもの、見ればわかるわよ。大丈夫、私は応援してるから♪」"
translation = "「후훗, 오래 알고 지냈는걸, 보면 알 수 있어. 괜찮아, 나는 응원하고 있으니까♪」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「トワが私の幸せを守ってくれたみたいに、私もトワの幸せを応援する。――友達としてね♪」"
translation = "「토와가 나의 행복을 지켜준 것처럼 나도 토와의 행복을 응원할게. ――친구로서 말이야♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「し、幸せって……<emoji=heart04>\u3000あぅ……<emoji=heart04>」"
translation = "「시, 행복이라니……<emoji=heart04> 아우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くしながら、ちらりと俺の方を見つめるトワちゃん。"
translation = "얼굴을 붉히며 슬쩍 내 쪽을 훔쳐보는 토와짱."

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「星騎士として頑張るのも大事だけど、自分を犠牲にしないでね。『トワ自身の幸せ』も、ちゃんと大切にして」"
translation = "「성기사로서 노력하는 것도 중요하지만 자신을 희생하지는 마. 『토와 자신의 행복』도 제대로 소중히 여겨줘.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「リクリエと戦う為に自分を犠牲にしないで、トワ自身の幸せもちゃんと忘れずに追いかけてね」"
translation = "「리크리에와 싸우기 위해 자신을 희생하지 말고, 토와 자신의 행복도 잊지 말고 쫓아가줘.」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「……でも、守ってくれる人がいるみたいだし、大丈夫か♪\u3000ね、会長くん？」"
translation = "「……하지만 지켜줄 사람이 있는 것 같으니 괜찮으려나♪ 그치, 회장 군?」"

[[dialogue]]
speaker = "unk"
original = "はい。トワちゃんの幸せは、俺が守ります"
translation = "「네. 토와짱의 행복은 제가 지키겠습니다.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「！\u3000か、会長くん……<emoji=heart04>\u3000え、えへへへぇ<emoji=heart04>」"
translation = "「! 회, 회장 군……<emoji=heart04> 에, 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少しして、カコさんの旦那さんが駆けつけてきた。モンスター襲撃の知らせを聞いて、仕事を抜けて慌てて来たらしい。"
translation = "조금 뒤, 카코 씨의 남편분이 달려왔다. 몬스터 습격 소식을 듣고 일을 제쳐두고 허겁지겁 달려온 모양이었다."

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「――じゃあ、もうそろそろ私は行くね。今日は助けてくれて本当にありがと、トワ」"
translation = "「――자, 이제 슬슬 나는 가볼게. 오늘은 도와줘서 정말 고마워, 토와」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん。また今度、近いうちに――あっ、そうだ！\u3000聞き忘れてた！」"
translation = "「응. 다음에 또 조만간――앗, 맞다! 물어보는 걸 깜빡했어!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「カコの娘ちゃん、名前はなんていうの？」"
translation = "「카코의 따님 말이야, 이름이 뭐야?」"

[[dialogue]]
speaker_original = "カコ"
speaker_translation = "카코"
original = "「――『ミライ』だよ」"
translation = "「――『미라이』야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ミライちゃん……うん、とっても素敵な名前だね♪」"
translation = "「미라이짱…… 응, 정말 멋진 이름이네♪」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんはそう言って笑顔で手を振り、カコさん親子を見送った。"
translation = "토와짱은 그렇게 말하며 미소로 손을 흔들고, 카코 씨 모녀를 배웅했다."

[[dialogue]]
speaker = "unk"
original = "去っていく背中を見つめたあと、トワちゃんは俺の方を振り返り、少し照れくさそうに微笑んだ。"
translation = "떠나가는 뒷모습을 지켜본 뒤, 토와짱은 내 쪽을 돌아보며 조금 수줍은 듯 미소 지었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それじゃあ会長くん、帰ろっか。――私たちの学園に♪」"
translation = "「그럼 회장군, 돌아갈까. ――우리들의 학원으로♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私、星騎士としてもっと頑張るよ。幸せな『未来』を守る為に」"
translation = "「나, 성기사로서 좀 더 힘낼게. 행복한 『미래』를 지키기 위해서」"

[[dialogue]]
speaker = "unk"
original = "ああ、頑張ろう。一緒に"
translation = "아아, 힘내자. 함께"

[[dialogue]]
speaker = "unk"
original = "俺は頷き、トワちゃんの手をそっと握る。彼女も微笑み返し、指を絡めて恋人繋ぎに握り直した。"
translation = "나는 고개를 끄덕이며, 토와짱의 손을 살며시 잡는다. 그녀도 미소로 화답하며, 손가락을 얽어 연인 잡기로 다시 고쳐 잡았다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん♪\u3000えへへ<emoji=heart04>」"
translation = "「응♪ 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その笑顔は、俺が何よりも好きな――あたたかい未来の光だった。"
translation = "그 미소는, 내가 무엇보다 좋아하는――따뜻한 미래의 빛이었다."

