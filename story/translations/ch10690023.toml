[[dialogue]]
speaker = "unk"
original = "第３話,恋人でもママに甘えたい,P"
translation = "제3화, 연인이라도 마마에게 어리광부리고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "セシアと付き合い始めてから数日経った、ある放課後のこと。"
translation = "세시아와 사귀기 시작하고 며칠이 지난 어느 방과 후의 일."

[[dialogue]]
speaker = "セシア"
original = "「会長、今日はプレゼントがあって、持ってきたわ♪」"
translation = "「회장님, 오늘은 선물이 있어서 가져왔어요♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は突然、クリスマスフォームを着て訪ねて来るなり、サンタの袋からごそごそと物を取り出して、机の上に並べて行く。"
translation = "그녀는 갑자기 크리스마스 폼을 입고 찾아오더니 산타 자루에서 부스럭부스럭 물건을 꺼내 책상 위에 늘어놓기 시작한다."

[[dialogue]]
speaker = "unk"
original = "こ、これは一体……？"
translation = "이, 이건 대체……?"

[[dialogue]]
speaker = "セシア"
original = "「ほら、わたくしたち、めでたく付き合い始めたでしょう？\u3000だから――」"
translation = "「자, 우리들 경사스럽게 사귀기 시작했잖아요? 그러니까──」"

[[dialogue]]
speaker = "セシア"
original = "「今後必要になるであろう、『赤ちゃんグッズ』を色々考えてきたのよ♪」"
translation = "「앞으로 필요하게 될 『아기 용품』을 여러 가지 생각해 왔어요♪」"

[[dialogue]]
speaker = "unk"
original = "それはあまりに気が早すぎない！？"
translation = "그건 너무 성급한 거 아냐!?"

[[dialogue]]
speaker = "セシア"
original = "「何か勘違いしているようだけれど、これはわたくしが使うものよ？」"
translation = "「뭔가 착각하고 있는 것 같은데, 이건 제가 쓸 거예요」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "무슨 소리야!?"

[[dialogue]]
speaker = "セシア"
original = "「わたくし、昨夜気づいたの。恋人同士になったということは、それってつまり……」"
translation = "「저, 어젯밤에 깨달았어요. 연인 사이가 됐다는 건 즉……」"

[[dialogue]]
speaker = "セシア"
original = "「これからはわたくしも甘えたい時、会長に女の子フォームに変身してもらって、『クロトママ』に甘え放題ということよね？」"
translation = "「앞으로는 저도 어리광부리고 싶을 때, 회장님이 여자애 폼으로 변신해 줘서 『쿠로토 마마』한테 어리광 마음껏 피울 수 있다는 거죠?」"

[[dialogue]]
speaker = "unk"
original = "俺は以前、アニマ先輩の作った附属生の女の子アバターに魂を移して附属校に通ったことがあり、その姿でセシアからママ判定に合格。"
translation = "나는 이전에 아니마 선배가 만든 부속생 여자아이 아바타에 혼을 옮겨 부속교에 다닌 적이 있고, 그 모습으로 세시아로부터 마마 판정에 합격."

[[dialogue]]
speaker = "unk"
original = "彼女から『クロトママ』と呼ばれていた経験がある……！"
translation = "그녀로부터 『쿠로토 마마』라고 불렸던 경험이 있다……!"

[[dialogue]]
speaker = "unk"
original = "しかも、現在ではフォームチェンジ技術の発展により、俺の別フォームの１つとしていつでも変身可能になっていたりする。"
translation = "게다가 현재는 폼 체인지 기술의 발전으로 나의 다른 폼 중 하나로서 언제든 변신 가능하게 되어 있기도 하다."

[[dialogue]]
speaker = "セシア"
original = "「ほら、例えば、この『おしゃぶり』」"
translation = "「자, 예를 들어 이 『공갈 젖꼭지』」"

[[dialogue]]
speaker = "セシア"
original = "「赤ちゃんに限らず、これを咥えるとヒトは安心するものらしいわ♪」"
translation = "「아기뿐만 아니라 이걸 물면 사람은 안심하는 모양이에요♪」"

[[dialogue]]
speaker = "unk"
original = "俺のママになるという話だったのでは！？"
translation = "내 마마가 된다는 이야기 아니었어!?"

[[dialogue]]
speaker = "セシア"
original = "「もちろん、会長が甘えてくれるのなら、わたくしはあなたのママになることも、やぶさかではないわ」"
translation = "「물론 회장님이 어리광부려 준다면, 저는 당신의 마마가 되는 것도 마다하지 않아요」"

[[dialogue]]
speaker = "セシア"
original = "「お互いがお互いのママになり、甘え、甘えさせてもらう……これぞまさに永久機関というものよね♪」"
translation = "「서로가 서로의 마마가 되어 어리광부리고, 어리광을 받아준다…… 이것이야말로 진정한 영구기관이라는 거죠♪」"

[[dialogue]]
speaker = "unk"
original = "それはヒトをダメにする機関では……！？"
translation = "그건 사람을 망치는 기관 아니야……!?"

[[dialogue]]
speaker = "紅明"
original = "「話は聞かせてもらったぜ！\u3000２人とも恋人同士になったんだってな！\u3000ヒュー☆\u3000おめでとう！！」"
translation = "「이야기는 들었다구! 둘 다 연인 사이가 됐다며! 휘익~☆ 축하해!!」"

[[dialogue]]
speaker = "セシア"
original = "「紅明ママ！」"
translation = "「코우메이 마마!」"

[[dialogue]]
speaker = "unk"
original = "というか、何故に紅明までサンタ衣装！？"
translation = "그보다 왜 코우메이까지 산타 복장인 거야!?"

[[dialogue]]
speaker = "unk"
original = "うおっ、ビックリした！？\u3000ありがとう！！"
translation = "우왓, 깜짝이야!? 고마워!!"

[[dialogue]]
speaker = "紅明"
original = "「ふっ、それはもちろん、ノリだぜ☆」"
translation = "「훗, 그건 물론 기분이지☆」"

[[dialogue]]
speaker = "セシア"
original = "「……そわそわ」"
translation = "「……소근소근」"

[[dialogue]]
speaker = "unk"
original = "ふと、俺はセシアが紅明に甘えたそうにしていることに気づく。"
translation = "문득 나는 세시아가 코우메이에게 어리광부리고 싶어 한다는 사실을 깨달았다."

[[dialogue]]
speaker = "unk"
original = "なので――"
translation = "그러니──"

[[dialogue]]
speaker = "unk"
original = "セシア、我慢しなくていいんだぞ"
translation = "세시아, 참지 않아도 괜찮아"

[[dialogue]]
speaker = "セシア"
original = "「え……？」"
translation = "「엣……?」"

[[dialogue]]
speaker = "unk"
original = "――セシアは恋人の俺が目の前にいるのに、紅明ママに甘えるのは問題があると遠慮したんじゃないか？"
translation = "──세시아는 연인인 내가 눈앞에 있는데 코우메이 마마에게 어리광부리는 건 문제가 있다고 사양한 거 아냐?"

[[dialogue]]
speaker = "unk"
original = "そんな風に口にすると、セシアは驚いたように……"
translation = "그렇게 말하자 세시아는 놀란 듯이……"

[[dialogue]]
speaker = "セシア"
original = "「どうして……わかったの？」"
translation = "「어떻게…… 알았나요?」"

[[dialogue]]
speaker = "unk"
original = "セシアを見てきた『蓄積』ってやつかな"
translation = "세시아를 지켜봐 온 『축적』 덕분이랄까"

[[dialogue]]
speaker = "セシア"
original = "「……！\u3000会長！」"
translation = "「……! 회장님!」"

[[dialogue]]
speaker = "unk"
original = "セシアは、ぱぁっと嬉しそうな笑顔を浮かべながら、俺に抱き着いてきて──"
translation = "세시아는 확 기쁜 미소를 띄우며 나에게 안겨 와서──"

[[dialogue]]
speaker = "セシア"
original = "「わたくし、やっぱり会長を恋人に選んでよかったわ♪」"
translation = "「저, 역시 회장님을 연인으로 고르길 잘했어요♪」"

[[dialogue]]
speaker = "紅明"
original = "「さっすがダーリン♪\u3000カッコよくて、アタシも惚れ直しちゃうぜ☆」"
translation = "「과연 달링♪ 멋있어서 나도 다시 반해버리겠어☆」"

[[dialogue]]
speaker = "紅明"
original = "「というわけで、セッシー♪\u3000ダーリンと恋人になっても、紅明ママは来る者拒まずだぜ～？」"
translation = "「그런 고로 세시♪ 달링이랑 연인이 돼도 코우메이 마마는 오는 사람 안 막는다구~?」"

[[dialogue]]
speaker = "セシア"
original = "「紅明ママ～！\u3000わ～い♪」"
translation = "「코우메이 마마~! 와아♪」"

[[dialogue]]
speaker = "紅明"
original = "「お～、よしよし☆」"
translation = "「오~ 착하다 착해☆」"

[[dialogue]]
speaker = "セシア"
original = "「えへへ♪\u3000やっぱり紅明ママのおっぱいは大きくて、抱き着くと安心するわ<emoji=heart04>」"
translation = "「에헤헤♪ 역시 코우메이 마마의 가슴은 커서 안기면 안심돼요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「話は聞かせてもらったわ！\u3000２人とも恋人同士になったんだってね！\u3000おめでとう！！」"
translation = "「이야기는 들었어! 둘 다 연인 사이가 됐다며! 축하해!!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス！？\u3000何故に水着フォーム！？"
translation = "비너스!? 왜 수영복 폼인 거야!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんかそっちの方が面白そうだと思って！」"
translation = "「왠지 그쪽이 더 재미있을 것 같아서!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それはそうと、今ならクロトママに絶賛甘え放題サービス中だって聞いたわ。それで私、気づいたんだけど――」"
translation = "「그건 그렇고, 지금이라면 쿠로토 마마에게 절찬 어리광 마음껏 서비스 중이라며. 그래서 나 깨달았는데──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私、娘なのにクロトママには１度も甘えたことないのよね！\u3000だから１度、思いっきり甘えてみたいわ♪」"
translation = "「나, 딸인데도 쿠로토 마마한테는 한 번도 어리광부린 적이 없단 말이지! 그러니까 한 번 실컷 어리광부려 보고 싶어♪」"

[[dialogue]]
speaker = "unk"
original = "う～ん……"
translation = "으음……"

[[dialogue]]
speaker = "unk"
original = "確かにセシアには他のママに甘えることをＯＫしたが、だからと言って男の俺が他の女子とスキンシップしていいことにはならない気がする。"
translation = "확실히 세시아에게는 다른 마마에게 어리광부리는 걸 OK 했지만, 그렇다고 해서 남자인 내가 다른 여자애랑 스킨십을 해도 된다는 건 아닌 것 같은 기분이 든다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ガーン！\u3000ダメなのぉ！？\u3000クロトママを出して頂戴！\u3000パパのドケチ！！」"
translation = "「가안! 안 되는 거야아!? 쿠로토 마마를 내놔! 아빠 구두쇠!!」"

[[dialogue]]
speaker = "unk"
original = "甘え放題サービス中とはいかないが、変身して見せるだけなら……ということで、とりあえず附属生フォームに変身する。"
translation = "어리광 마음껏 서비스 중까진 안 되겠지만, 변신해서 보여주기만 한다면…… 하는 생각에 우선 부속생 폼으로 변신한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「これが噂のクロトママの姿なのね！\u3000思っていた以上に可愛いわ！」"
translation = "「이게 소문으로 듣던 쿠로토 마마의 모습이구나! 생각했던 것보다 더 귀여워!」"

[[dialogue]]
speaker = "セシア"
original = "「……ぷっく～」"
translation = "「……뿌우」"

[[dialogue]]
speaker = "unk"
original = "セシアが頬を膨らませて、俺の制服の袖を引っ張っていることに気づいた。"
translation = "세시아가 볼을 부풀리고 내 교복 소매를 잡아당기고 있다는 사실을 깨달았다."

[[dialogue]]
speaker = "セシア"
original = "「……なんか、他の女の子がクロトママに甘えるのは、あんまり嬉しくないわ」"
translation = "「……왠지 다른 여자애가 쿠로토 마마한테 어리광부리는 건 별로 안 기뻐요」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000そ、それって……"
translation = "에!? 그, 그건……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「セシア、もしかして『嫉妬』しているの？」"
translation = "「세시아, 혹시 『질투』하는 거야?」"

[[dialogue]]
speaker = "紅明"
original = "「マジか～！」"
translation = "「실화냐~!」"

[[dialogue]]
speaker = "セシア"
original = "「これが、嫉妬……？\u3000なんか胸がこう、ちょっとモヤモヤするわ」"
translation = "「이게 질투……? 왠지 가슴이 이렇게 좀 답답해요」"

[[dialogue]]
speaker = "セシア"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女がすごく可愛くて、思わずぎゅっと抱き締めてしまう。"
translation = "나는 그런 그녀가 너무 귀여워서 나도 모르게 꼬옥 껴안아 버린다."

[[dialogue]]
speaker = "セシア"
original = "「んっ……<emoji=heart04>\u3000クロトママ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쿠로토 마마<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「えへへ<emoji=heart04>\u3000胸が温かくなって、胸のモヤモヤがスーッと無くなっていくわ<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 가슴이 따뜻해져서 가슴의 답답함이 싹 사라져 가요<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「ヒュー☆」"
translation = "「휘익~☆」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんかよく分からないけど、お熱いわね♪\u3000クロトママ！」"
translation = "「뭔지는 잘 모르겠지만 뜨겁네♪ 쿠로토 마마!」"

[[dialogue]]
speaker = "unk"
original = "それからセシアが満足するまで、俺は彼女を抱き締めたまま、頭を撫で続けるのだった――"
translation = "그 후 세시아가 만족할 때까지 나는 그녀를 안은 채로 머리를 계속 쓰다듬어 주었다──"

