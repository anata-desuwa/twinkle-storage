[[dialogue]]
speaker = "unk"
original = "第３話,ＢＩＧ寒い冬の過ごし方,P"
translation = "제3화, BIG 추운 겨울을 보내는 법"

[[dialogue]]
speaker = "unk"
original = "冬のある日。いつものように星徒会業務をしていると──"
translation = "겨울 어느 날. 평소처럼 성도회 업무를 하고 있자──"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー！\u3000タスケテくださーい！」"
translation = "「회장님! 도와주세용!」"

[[dialogue]]
speaker = "unk"
original = "リップル！？\u3000何があったんだ！？"
translation = "「리플!? 무슨 일이야!?」"

[[dialogue]]
speaker = "リップル"
original = "「冬サムイです！\u3000このままではコゴエテしまいまーす！」"
translation = "「겨울은 추워용! 이대로는 얼어 죽고 말 거예용!」"

[[dialogue]]
speaker = "マトイ"
original = "「まぁ水着だもんね……。普通に制服着ればいいんじゃないの？」"
translation = "「그야 수영복이니까 그렇지……. 평범하게 교복 입으면 되는 거 아니야?」"

[[dialogue]]
speaker = "リップル"
original = "「ノー！\u3000水着は夏のショーチョー。エンドレスサマーを大きくするタメには、ワタシが夏のココロを忘れないコトが大事です」"
translation = "「노! 수영복은 여름의 상징. 엔들리스 서머를 크게 하기 위해서는 제가 여름의 마음을 잊지 않는 것이 중요합니당」"

[[dialogue]]
speaker = "リップル"
original = "「つまり、常に水着でいるコトが必要ナノです！」"
translation = "「즉, 항상 수영복으로 있는 것이 필요해용!」"

[[dialogue]]
speaker = "マトイ"
original = "「なる……ほど……？\u3000でもさすがに服は着ないと寒いんじゃないかな……？」"
translation = "「그렇……구나……? 하지만 역시 옷을 입지 않으면 춥지 않을까……?」"

[[dialogue]]
speaker = "リップル"
original = "「ノンノン、そこはダイジョーブです。見えない極薄の結界をまとうコトで、服の代わりにシテいますから」"
translation = "「논논, 그건 괜찮습니당. 보이지 않는 아주 얇은 결계를 두르는 것으로 옷 대신으로 쓰고 있으니까용」"

[[dialogue]]
speaker = "マトイ"
original = "「そんなのアリなんだ！？」"
translation = "「그런 게 가능해!?」"

[[dialogue]]
speaker = "リップル"
original = "「それでも、サムイものはサムイのでーす……。せめて冬らしいタノシミがあれば気分も違うとオモウのですが……」"
translation = "「그래도 추운 건 추운 거예용……. 적어도 겨울다운 즐거움이 있다면 기분도 다를 거라고 생각합니당만……」"

[[dialogue]]
speaker = "unk"
original = "寒いと温かいものが美味しくなるよ"
translation = "「추우면 따뜻한 음식이 맛있어져」"

[[dialogue]]
speaker = "リップル"
original = "「温かいモノ……ラーメンとかですか？」"
translation = "「따뜻한 거…… 라면 같은 건가용?」"

[[dialogue]]
speaker = "マトイ"
original = "「そうだね、ラーメンもいいし……冬といえばおでんも美味しいよね♪」"
translation = "「그렇지, 라면도 좋고…… 겨울 하면 오뎅도 맛있지♪」"

[[dialogue]]
speaker = "リップル"
original = "「オデン……聞いたことある気がします……」"
translation = "「오뎅…… 들어본 적 있는 것 같아용……」"

[[dialogue]]
speaker = "マトイ"
original = "「じゃあ星徒会の仕事も落ち着いたし、ちょっと買ってこよっか」"
translation = "「그럼 성도회 일도 일단락됐으니 좀 사러 갈까」"

[[dialogue]]
speaker = "unk"
original = "寒風が吹く中、学園に一番近いコンビニでおでんを買いに行く。"
translation = "찬바람이 부는 가운데, 학원에서 가장 가까운 편의점으로 오뎅을 사러 간다."

[[dialogue]]
speaker = "unk"
original = "戻ってくる頃には、体はすっかり冷え切っていた。"
translation = "돌아올 때쯤에는 몸이 완전히 식어 있었다."

[[dialogue]]
speaker = "リップル"
original = "「う～っ、サムイでーす！\u3000ブルブル……」"
translation = "「우~, 추워용! 덜덜……」"

[[dialogue]]
speaker = "マトイ"
original = "「確かに寒かったぁ……今日の冷え込みは一際かも。でもこういう日こそおでんが美味しくなるね」"
translation = "「확실히 춥네…… 오늘 추위는 유난히 심할지도. 하지만 이런 날이야말로 오뎅이 맛있어지지」"

[[dialogue]]
speaker = "リップル"
original = "「ソレでは……イタダキまーす！\u3000はふはふ……オオ、これは確かにカラダが温まりますね♪」"
translation = "「그러면…… 잘 먹겠습니당! 하후하후…… 오오, 이건 확실히 몸이 따뜻해지네용♪」"

[[dialogue]]
speaker = "マトイ"
original = "「でしょ！\u3000やっぱり冬はおでんだよ♪」"
translation = "「그치! 역시 겨울은 오뎅이야♪」"

[[dialogue]]
speaker = "マトイ"
original = "「雪が積もってれば、雪合戦なんかもできるけど……今は全然降ってないから無理かな」"
translation = "「눈이 쌓여 있으면 눈싸움 같은 것도 할 수 있겠지만…… 지금은 전혀 안 내리니까 무리려나」"

[[dialogue]]
speaker = "リップル"
original = "「フムフム……冬の楽しみ方、イロイロあるんですね～」"
translation = "「흠흠…… 겨울을 즐기는 법, 여러 가지가 있군뇨~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ただいま～」"
translation = "「다녀왔어~」"

[[dialogue]]
speaker = "マトイ"
original = "「あれ、ヴィーナスどこ行ってたの？」"
translation = "「어라, 비너스 어디 갔다 왔어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「購買よ。冬の楽しみ方がどうのって言ってたけど、それならこれよ！」"
translation = "「매점이야. 겨울을 즐기는 법이 어쩌고 하던데, 그렇다면 이거지!」"

[[dialogue]]
speaker = "リップル"
original = "「アイスクリーム……？\u3000サムイのに冷たいもの食べるんデスか？」"
translation = "「아이스크림……? 추운데 차가운 걸 먹는 건가용?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん、わかってないわね。寒いからこそ、うんと暖房を効かせて、ぬくぬくしながらアイスを食べるのよ」"
translation = "「후훈, 모르시는구먼. 추우니까 더더욱 난방을 빵빵하게 틀고 따끈따끈하게 있으면서 아이스를 먹는 거야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アイスあげるから、リップルもやってみなさい。マトイたちの分もあるわよ」"
translation = "「아이스 줄 테니까 리플도 해봐. 마토이 일행들 것도 있어」"

[[dialogue]]
speaker = "マトイ"
original = "「ありがと、じゃあバニラもらうね」"
translation = "「고마워, 그럼 바닐라로 받을게」"

[[dialogue]]
speaker = "リップル"
original = "「どれどれ……あ～ん」"
translation = "「어디 어디…… 아~앙」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どう？\u3000美味しいでしょ？」"
translation = "「어때? 맛있지?」"

[[dialogue]]
speaker = "リップル"
original = "「ウーン……確かにオイシイですけど、ビーチで食べるアイスの方がオイシイ気がします……」"
translation = "「으음…… 확실히 맛있습니당만, 해변에서 먹는 아이스크림이 더 맛있는 것 같아용……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ～っ！？」"
translation = "「에에~!?」"

[[dialogue]]
speaker = "マトイ"
original = "「さすがに夏のビーチが比較対象なら、負けちゃうのも仕方ないかもね」"
translation = "「과연 여름 해변이 비교 대상이라면, 져버리는 것도 어쩔 수 없을지도 모르겠네」"

[[dialogue]]
speaker = "リップル"
original = "「う～、アイス食べたらサムクなってきました……でもオデンはもうありませーん……コマリました」"
translation = "「으~, 아이스크림을 먹었더니 추워졌어요…… 하지만 오뎅은 이제 없답니-다…… 곤라-ㄴ해요」"

[[dialogue]]
speaker = "リップル"
original = "「！\u3000イイコト考えました。カイチョー、動かナイでくださいね♪」"
translation = "「! 좋은 생각이 났어요. 회장, 움직이-지 말아 주세요♪」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーにハグです♪」"
translation = "「회장에게 허그예요♪」"

[[dialogue]]
speaker = "unk"
original = "わわっ"
translation = "와와앗"

[[dialogue]]
speaker = "リップル"
original = "「こうしてカイチョーと密着してればアタタカイです♪\u3000最初からこうすればヨカッタです♪」"
translation = "「이렇게 회장과 밀착해 있으면 따뜻-해요♪ 처음부터 이렇게 하면 좋았-을 텐데요♪」"

[[dialogue]]
speaker = "リップル"
original = "「エヘヘ……カイチョーとくっついているとハッピーです……♪」"
translation = "「에헤헤…… 회장과 붙어 있으면 해피해요……♪」"

[[dialogue]]
speaker = "リップル"
original = "「ホッペタに～……チュッ<emoji=heart04>」"
translation = "「볼에다~…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「リップルってば大胆！？」"
translation = "「리플도 참 대담하네!?」"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺からも……"
translation = "그럼 나도……"

[[dialogue]]
speaker = "リップル"
original = "「あ<emoji=heart04>\u3000カイチョーにキスされちゃいました<emoji=heart04>」"
translation = "「아<emoji=heart04> 회장에게 키스당해 버렸어요<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「会長も大胆！？」"
translation = "「회장도 대담해!?」"

[[dialogue]]
speaker = "リップル"
original = "「サムクなると、カイチョーがもっと温かく感じます。サムクていいコト、ありました。冬はギューってしていっぱい温まりましょー♪」"
translation = "「추워지면 회장이 좀 더 따뜻하게 느껴져요. 추워서 좋은 일도 있네요. 겨울은 꼬옥- 하고 잔뜩 온기를 나눠요-♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どんな寒さもカップルの前には無力ってことね」"
translation = "「어떤 추위도 커플 앞에서는 무력하다는 거네」"

[[dialogue]]
speaker = "マトイ"
original = "「はは……リップルらしいね」"
translation = "「하하…… 리플답네」"

