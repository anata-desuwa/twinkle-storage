[[dialogue]]
speaker = "unk"
original = "流星寮クリスマスパーティー実行委員会、第２回が開催される。"
translation = "유성 기숙사 크리스마스 파티 실행위원회 제2회가 개최된다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「というわけで、やりたいことを全部やっちゃおうと思うんだけど、アポロちゃん的にはどうかな？」"
translation = "「그런 이유로 하고 싶은 걸 전부 해버릴까 하는데, 아폴로 짱 생각은 어때?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ごちゃ混ぜクリスマスか……うん、いいと思うぞ！\u3000こんなパーティーなら絶対みんなも楽しいはずだ！」"
translation = "「이것저것 섞인 크리스마스인가…… 응, 좋다고 생각해! 이런 파티라면 분명 다들 즐거울 거야!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「寮長殿の希望ももちろん叶えるつもりだ。アポロがしたいこともな」"
translation = "「기숙사장님의 희망도 물론 들어줄 생각이다. 아폴로가 하고 싶은 것도 말이지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしがしたいこと……」"
translation = "「내가 하고 싶은 것……」"

[[dialogue]]
speaker = "unk"
original = "あれから新しくやりたいことは出来た？"
translation = "그때 이후로 새로 하고 싶은 게 생겼어?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん……そうだな。それこそ上品なクリスマスパーティーにそぐわないかもしれないが……」"
translation = "「음…… 그렇군. 그야말로 품위 있는 크리스마스 파티에는 어울리지 않을지도 모르겠지만……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは流星ライダーの何かがあったらいいなぁって思う！\u3000流星ライダーは強くてかっこいいから、みんなに大人気だしな！」"
translation = "「나는 유성 라이더에 관련된 게 있으면 좋겠다고 생각해! 유성 라이더는 강하고 멋지니까 모두에게 인기 만점이거든!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「パーティーには附属生も参加するから、そういう子にはウケがいいかもね」"
translation = "「파티에는 부속생들도 참가하니까 그런 아이들에게는 인기가 좋을지도 모르겠네.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うーん……」"
translation = "「으음……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「アニュラスは反対か？」"
translation = "「아뉴라스는 반대인가?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「否、それでは足りない！」"
translation = "「아니, 그것만으론 부족하다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なにっ！？」"
translation = "「뭐랏!?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「流星ライダー・アポロの何かをやるなら、流星剣騎ファイバーの何かもやって欲しい！」"
translation = "「유성 라이더 아폴로와 관련된 걸 한다면, 유성검기 파이버와 관련된 것도 해줬으면 한다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おまえっ……まさか、流星剣騎シリーズ派かっ！？」"
translation = "「너…… 설마, 유성검기 시리즈 파였나!?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ふっ……確かに流星ライダーはいいものだと聞く。しかし、流星剣騎だって負けてはいない！」"
translation = "「훗…… 확실히 유성 라이더는 훌륭한 작품이라고 들었다. 하지만 유성검기 또한 지지 않는다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「もし流星剣騎の何かをやるなら、その役目、このアニュラス・セイファートに任せて欲しい！\u3000見事、演じて見せよう──せいっ！！」"
translation = "「만약 유성검기와 관련된 무언가를 한다면, 그 역할, 이 아뉴라스 세이퍼트에게 맡겨줬으면 한다! 멋지게 연기해 보이지── 세잇!!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うわ、なんか気持ち悪い動き」"
translation = "「우와, 왠지 기분 나쁜 움직임.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「気持ち悪くなぁい！！」"
translation = "「기분 나쁘지 않다!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「流星ライダーに出てくる怪人みたいな動きだったぞ……」"
translation = "「유성 라이더에 나오는 괴인 같은 움직임이었다고……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それじゃあヒーローショー、やる？\u3000アニュラスに怪人役をやってもらって」"
translation = "「그럼 히어로 쇼 할래? 아뉴라스에게 괴인 역을 맡기고.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「怪人役！？\u3000流星剣騎ではなくて？」"
translation = "「괴인 역!? 유성검기가 아니라?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そしてもちろん、あたしが流星ライダー役だ！」"
translation = "「그리고 당연히, 내가 유성 라이더 역이다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「むむむ……今日１番の笑顔をしている……」"
translation = "「으으으…… 오늘 중 가장 환한 미소를 짓고 있군……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「わかった！\u3000みんなの笑顔のため、怪人を演じてみせよう！\u3000その代わりアポロも少しだけ我慢だぞ。流星ライダーをやりたい子は他にもいるだろうからな」"
translation = "「알았다! 모두의 미소를 위해 괴인을 연기해 보이지! 그 대신 아폴로도 조금만 참아다오. 유성 라이더를 하고 싶은 아이는 다른 애들도 있을 테니까 말이다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もちろんだ！\u3000流星ライダーは大人気だから、交替でやるぞ！」"
translation = "「당연하지! 유성 라이더는 인기 만점이니까 교대로 할 거다!」"

[[dialogue]]
speaker = "unk"
original = "パーティーで出す料理の方はどうするんだ？"
translation = "파티에서 낼 요리는 어떻게 할 거야?"

[[dialogue]]
speaker = "unk"
original = "ところで今気が付いたんだが"
translation = "그런데 이제야 깨달은 건데,"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「カフェテリアはカフェテリアで忙しいだろうからな……やはりお店で注文することになるだろう」"
translation = "「카페테리아는 카페테리아대로 바쁠 테니까 말이다…… 역시 가게에서 주문하게 되겠지.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そうなるかな……でも、せっかくだから私たちでも用意しない？」"
translation = "「그렇게 되려나…… 하지만 모처럼이니까 우리도 준비해 보지 않을래?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「なにっ！？」"
translation = "「뭐랏!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いいな！\u3000アニュラスが作ったご馳走食べてみたいぞ！」"
translation = "「좋네! 아뉴라스가 만든 진미를 먹어보고 싶다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そそ、それはおすすめ出来ないぞ。生憎、料理はからきしなんだ」"
translation = "「그, 그건 추천할 수 없다. 안타깝게도 요리는 전혀 못 하거든.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうなのか？\u3000それは残念だ……」"
translation = "「그런가? 그거 아쉽네……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うぐっ……そんなにがっかりしないでくれ。万が一、私の料理を食べさせてアポロがお腹を壊したら大変だから……」"
translation = "「으윽…… 그렇게 실망하지 말아다오. 만에 하나 내 요리를 먹고 아폴로가 배탈이라도 나면 큰일이니까……」"

[[dialogue]]
speaker = "unk"
original = "アニュラスの特訓は俺に任せて"
translation = "아뉴라스의 특훈은 나한테 맡겨."

[[dialogue]]
speaker = "unk"
original = "だったら特訓だ！"
translation = "그렇다면 특훈이다!"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「と、特訓！？\u3000それは……ちょっと心惹かれるな……」"
translation = "「트, 특훈!? 그건…… 조금 마음이 끌리는군……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「特訓ならあたしも参加したいぞ！」"
translation = "「특훈이라면 나도 참가하고 싶다!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アポロちゃんもやるんだ」"
translation = "「아폴로 짱도 하는구나.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「流星ライダーでも、みんなで料理の特訓をする回があるんだ！」"
translation = "「유성 라이더에서도 다 함께 요리 특훈을 하는 화가 있거든!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「なるほどね。じゃあ、気になっちゃうか」"
translation = "「과연. 그럼 신경 쓰일 수밖에 없겠네.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000だからアニュラスと一緒に料理の特訓するぞ！」"
translation = "「응! 그러니까 아뉴라스랑 같이 요리 특훈 할 거다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「む、む……特訓……いや、だめだ！\u3000どうだろう、料理は私抜きというのは？\u3000特訓は舞亜にしてやってくれ」"
translation = "「음, 음…… 특훈…… 아니, 안 된다! 요리에서 나는 빼는 게 어떠냐? 특훈은 마이아에게 해줘.」"

[[dialogue]]
speaker = "unk"
original = "舞亜は料理できるから"
translation = "마이아는 요리 할 줄 아니까."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「くっ……そうなのか！？」"
translation = "「큭…… 그런가!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「諦め悪いよ、アニュラス。立派な流星の騎士になれるよう、不退転の気持ちで料理特訓しよう」"
translation = "「포기가 빠르네, 아뉴라스. 훌륭한 유성의 기사가 될 수 있도록 불퇴전의 각오로 요리 특훈 하자.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ぐぬぬ……そこで流星の騎士を出されたら逃げられない……わかった、承知しよう」"
translation = "「구누누…… 거기서 유성의 기사를 꺼내면 도망칠 수 없지…… 알았다, 승낙하마.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「やったぁ！\u3000よーし、でっかいクリスマスケーキ作るぞ～！\u3000実物大ブッシュドノエルだ！」"
translation = "「앗싸! 좋아, 커다란 크리스마스 케이크를 만드는 거다~! 실물 크기 부슈 드 노엘이다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あ、いや、それは無理だ。急に難易度上がってないか？\u3000ほら、誰か何とか言ってくれ」"
translation = "「아, 아니, 그건 무리다. 갑자기 난이도가 너무 올라가지 않았나? 이봐, 누가 어떻게든 말 좀 해줘.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ケーキ作りは、流星の騎士にも荷が重いぞ～～～っ！！」"
translation = "「케이크 만들기는 유성의 기사에게도 벅차단 말이다~~~!!」"

