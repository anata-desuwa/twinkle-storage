[[dialogue]]
speaker = "クーシェン"
original = "「イックうぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어으으으으으으으으으으으으으으으으으으윽<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아아아아아아아아아아앗~~~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の一番奥にペニスを突き入れ、限界まで堪えていた射精欲を解放した。"
translation = "나는 그녀의 가장 깊숙한 곳에 페니스를 찔러넣고, 한계까지 참아왔던 사정욕을 해방했다."

[[dialogue]]
speaker = "クーシェン"
original = "「はあああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000にーにーの精子、いっぱい出てるぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 니니 정자, 잔뜩 나오고 있어어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「ふあああぁっ<emoji=heart04>\u3000どくどくって脈打って、お腹の中注がれてるぅ～～っ<emoji=heart04><emoji=heart04>\u3000んっ……ふううぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 꿀렁꿀렁하고 맥동하며 뱃속에 부어지고 있어어어~~~앗<emoji=heart04><emoji=heart04> 응…… 후우우우우우~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「はああぁ～～～っ<emoji=heart04>\u3000中出し射精、気持ちいぃ～～<emoji=heart04>\u3000あふぅう<emoji=heart04>\u3000ありがとうございますぅぅ<emoji=heart04>\u3000ふうぅぅ<emoji=heart04>」"
translation = "「하아아아아아아~~~앗<emoji=heart04> 질내 사정, 기분 좋아아아아~~<emoji=heart04> 아후으으<emoji=heart04> 감사합니다아아아아아으으<emoji=heart04> 후우으으으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「はあぁ……<emoji=heart04>\u3000おま○こ、幸せぇ……<emoji=heart04>\u3000んんぅ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 보지, 행복해애……<emoji=heart04> 응응으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて射精が止まり、俺はゆっくりとペニスを引き抜く。"
translation = "이윽고 사정이 멈추고, 나는 천천히 페니스를 뽑아냈다."

[[dialogue]]
speaker = "クーシェン"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "放心した様子のクーシェン。俺は彼女の顔に手を伸ばし、頬に触れながら語りかける。"
translation = "넋이 나간 듯한 모습의 쿠셴. 나는 그녀의 얼굴에 손을 뻗어, 뺨을 어루만지며 말을 건넸다."

[[dialogue]]
speaker = "クロト"
original = "「クーシェン、大丈夫か？」"
translation = "「쿠셴, 괜찮아?」"

[[dialogue]]
speaker = "クーシェン"
original = "「ん……？\u3000あっ……ちょっと一瞬、意識飛んでたかも……<emoji=heart04>」"
translation = "「응……? 앗…… 좀 일순간, 의식이 날아갔을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてクーシェンは少し呼吸を整えてから──"
translation = "그리고 쿠셴은 잠시 호흡을 가다듬고 나서──"

[[dialogue]]
speaker = "クーシェン"
original = "「はあぁぁ<emoji=heart04>\u3000セックス、すっごく気持ちよかった～～<emoji=heart04>」"
translation = "「하아아아아<emoji=heart04> 섹스, 정말 기분 좋았어어~~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も気持ち良かったよ」"
translation = "「나도 기분 좋았어」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、頭を優しく撫でる。"
translation = "그렇게 말하며, 머리를 부드럽게 쓰다듬는다."

[[dialogue]]
speaker = "クーシェン"
original = "「んっ、えへへへへぇ<emoji=heart04>\u3000なんかちょっと変なこと言っちゃった気もするけど、セックスしてる時って、自由だね♪」"
translation = "「응, 에헤헤헤헤헤<emoji=heart04> 왠지 좀 이상한 말을 해버린 기분도 들지만, 섹스하고 있을 때는 자유롭네♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「ウキキ♪\u3000普段だったら恥ずかしくて言えないことも、さ。おち○ちんとおま○こが繋がってると、全部言えちゃう気がする<emoji=heart04>」"
translation = "「우키키♪ 평소라면 부끄러워서 말 못 할 것도 말이야. 자지랑 보지가 이어져 있으면, 전부 말할 수 있는 기분이 들어<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「だから……ね？\u3000にーにー<emoji=heart04>」"
translation = "「그러니까…… 그치? 니니<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「これからは毎日３回くらい、セックスしよっか<emoji=heart04>」"
translation = "「이제부터는 매일 3번 정도, 섹스할까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなにできるか！\u3000と言おうとしたけれど、射精を終えたばかりのペニスは、クーシェンのその言葉で再び硬さを取り戻してしまうのだった。"
translation = "그렇게나 할 수 있겠냐! 라고 말하려 했지만, 사정을 막 마친 페니스는 쿠셴의 그 말에 다시금 강직함을 되찾고 마는 것이었다."

