[[dialogue]]
speaker = "unk"
original = "そんな風に懇願され、俺は昂る欲望のまま腰を限界まで激しく突き動かす。"
translation = "그렇게 간청받으며, 나는 치솟는 욕망대로 허리를 한계까지 격렬하게 밀어넣었다."

[[dialogue]]
speaker = "クーシェン"
original = "「ああああああっ<emoji=heart04><emoji=heart04>\u3000おち○ちん激しいぃっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아앗<emoji=heart04><emoji=heart04> 자지 격렬해애애앗<emoji=heart04> 대단해<emoji=heart04> 대단해애애앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>\u3000きたっ<emoji=heart04>\u3000気持ちいいまた登ってきたっ<emoji=heart04><emoji=heart04>\u3000これイクっ<emoji=heart04>\u3000すごいイキ方しちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
