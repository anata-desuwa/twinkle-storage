[[dialogue]]
speaker = "unk"
original = "クーシェンと恋人関係になってから少し経った、ある日のこと。"
translation = "쿠셴과 연인 관계가 되고 조금 지난 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "彼女は今日も「星騎士として流星市国を一周パトロールしてくる」と、元気よく星徒会室を飛び出して行ったのだが――"
translation = "그녀는 오늘도 「성기사로서 유성 시국을 한 바퀴 순찰하고 올게」라며 활기차게 성도회실을 뛰어 나갔지만――"

[[dialogue]]
speaker = "クーシェン"
original = "「はぁっ……はぁっ……！\u3000にーにー、ただいま……！」"
translation = "「하앗…… 하앗……! 오빠, 다녀왔어……!」"

[[dialogue]]
speaker = "クロト"
original = "「おかえり～、って……どうしたんだ？\u3000何かあったのか？」"
translation = "「어서 와~ 인데…… 왜 그래? 무슨 일 있었어?」"

[[dialogue]]
speaker = "unk"
original = "息を荒げて余裕がなさそうな様子のクーシェンに、俺は書類作業の手を止めて、彼女の元へと歩み寄る。"
translation = "숨을 거칠게 몰아쉬며 여유가 없어 보이는 쿠셴의 모습에, 나는 서류 작업의 손을 멈추고 그녀의 곁으로 다가간다."

[[dialogue]]
speaker = "クーシェン"
original = "「ダメだ……！\u3000ボク、もう我慢できないっ」"
translation = "「안 돼……! 나, 이제 못 참겠어」"

[[dialogue]]
speaker = "クロト"
original = "「へ？\u3000――おわぁっ！？」"
translation = "「헤? ――우와앗!?」"

[[dialogue]]
speaker = "unk"
original = "勢い良く抱き着いてきたクーシェンに、俺はそのまま押し倒されてしまい――"
translation = "기세 좋게 매달려 온 쿠셴에게 나는 그대로 눌려버렸고――"

[[dialogue]]
speaker = "クーシェン"
original = "「はあぁっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ！\u3000にーにーの……おち○ちん<emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 하아앗<emoji=heart04> 하아앗<emoji=heart04> 후우웃! 오빠의…… 자지<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のズボンを下ろして、ペニスを前にした彼女は更に息を荒くする。"
translation = "내 바지를 내리고 페니스를 마주한 그녀는 더욱 숨을 거칠게 쉰다."

[[dialogue]]
speaker = "クーシェン"
original = "「あぁあぁぁっ<emoji=heart04>\u3000にーにー！\u3000ボクとっ、エッチなこと！\u3000エッチしたいよねっ！？\u3000エッチしてあげるから、さっさとおち○ちん大きくしてっ<emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 오빠! 나랑, 야한 거! 야한 거 하고 싶지!? 야한 거 해줄 테니까 얼른 자지 키워줘<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「童貞のにーにーは<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000知らないだろうけど<emoji=heart04>\u3000……はぁぁっ<emoji=heart04>\u3000魔族が発情期になったら、恋人はその相手をするのが、義務なんだからねっ<emoji=heart04>」"
translation = "「동정인 오빠는<emoji=heart04> 아아아<emoji=heart04> 모르겠지만<emoji=heart04> ……하아앗<emoji=heart04> 마족이 발정기가 되면 연인은 그 상대가 되어주는 게 의무니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「発情期！？」"
translation = "「발정기!?」"

[[dialogue]]
speaker = "unk"
original = "クーシェンと恋人になった後、紅明から『獣人系魔族の発情期』については聞かされていた。"
translation = "쿠셴과 연인이 된 후, 코우메이로부터 『수인계 마족의 발정기』에 대해서는 들은 적이 있었다."

[[dialogue]]
speaker = "unk"
original = "紅明が聞き出した情報によると、クーシェンの発情期はこれまでまだ１度も来ていないらしいとのことだったが――"
translation = "코우메이가 알아낸 정보에 따르면, 쿠셴의 발정기는 지금까지 아직 단 한 번도 오지 않았다고 했지만――"

[[dialogue]]
speaker = "unk"
original = "恋人になってスキンシップもするようになった結果、近々初めての発情期が訪れる可能性は高いだろう、と紅明は言っていた。"
translation = "연인이 되어 스킨십도 하게 된 결과, 조만간 첫 발정기가 찾아올 가능성이 높을 것이라고 코우메이는 말했었다."

[[dialogue]]
speaker = "クーシェン"
original = "「――発情を抑える薬？\u3000はっあぁぁっ<emoji=heart04>\u3000そんなの、飲むわけないじゃんっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「――발정을 억제하는 약? 하아아아앗<emoji=heart04> 그런 거 먹을 리 없잖아<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「おち○ちん<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000おま○こしよっ<emoji=heart04>\u3000おま○こ<emoji=heart04>\u3000おま○こ～っ<emoji=heart04>」"
translation = "「자지<emoji=heart04> 아아앗<emoji=heart04> 보지 하자<emoji=heart04> 보지<emoji=heart04> 보지~잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はこんな時の為にと鞄の中に備えていた抑制薬を飲むようになんとか説得を試みるも、クーシェンはイヤイヤと首を横に振る。"
translation = "나는 이런 때를 위해 가방 안에 대비해 두었던 억제 약을 먹으라고 어떻게든 설득을 시도해 보지만, 쿠셴은 싫다며 고개를 가로저었다."

[[dialogue]]
speaker = "クーシェン"
original = "「ふわぁぁん<emoji=heart04>\u3000にーにーとおま○こしたい～っ<emoji=heart04>\u3000ああぁぁっ<emoji=heart04>\u3000おま○この中に、おち○ちん入れるのぉ<emoji=heart04>\u3000一番エッチなやつ<emoji=heart04>\u3000おま○こセックスぅ<emoji=heart04>」"
translation = "「후아앙<emoji=heart04> 오빠랑 보지 하고 싶어~엇<emoji=heart04> 아아아앗<emoji=heart04> 보지 안에 자지 넣는 거어<emoji=heart04> 제일 야한 거<emoji=heart04> 보지 섹스으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いやでもこんな、初めてなのに……」"
translation = "「아니 그치만 이런, 처음인데……」"

[[dialogue]]
speaker = "unk"
original = "俺たちは正直、恋人になってからそんなに時間が経っていないし、クーシェンとの関係は大切にしたいと思っているので、迷ってしまう。"
translation = "우리들은 솔직히 연인이 되고 나서 그렇게 시간이 흐르지 않았고, 쿠셴과의 관계를 소중히 하고 싶다고 생각하고 있어서 망설여진다."

[[dialogue]]
speaker = "クーシェン"
original = "「あはぁぁっ<emoji=heart04>\u3000もうっ<emoji=heart04>\u3000にーにーの意気地なしっ<emoji=heart04>\u3000んふぅぅっ<emoji=heart04>\u3000あぁぁ<emoji=heart04>いいから、にーにーはおち○ちん、大きくしてくれればいいのっ<emoji=heart04>」"
translation = "「아하앗<emoji=heart04> 정말<emoji=heart04> 오빠 겁쟁이<emoji=heart04> 응후우웃<emoji=heart04> 아아아<emoji=heart04> 됐으니까 오빠는 자지 키워주기만 하면 돼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして有無を言わさず、彼女はおま○こをペニスに擦り付け始める。"
translation = "그렇게 유무를 불문하고 그녀는 보지를 페니스에 문지르기 시작한다."

[[dialogue]]
speaker = "クーシェン"
original = "「んっ<emoji=heart04>\u3000ふわあああぁぁぁっ<emoji=heart04>\u3000おち○ちん、おま○こに擦れてっ<emoji=heart04>\u3000んんっ、あはぁぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후아아아아앗<emoji=heart04> 자지, 보지에 스쳐서어<emoji=heart04> 응응, 아하앗<emoji=heart04> 앗<emoji=heart04> 응우웃<emoji=heart04> 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「クーシェン、最初からそんな強くしたら、お股痛くなっちゃうぞ！？」"
translation = "「쿠셴, 처음부터 그렇게 세게 하면, 가랑이 아파진다고!?」"

[[dialogue]]
speaker = "クーシェン"
original = "「いいのっ<emoji=heart04>\u3000にーにーだって雑魚童貞なんだから<emoji=heart04>\u3000んふぅぅっ<emoji=heart04>\u3000わかったようなこと言うなぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……んふぅぅ<emoji=heart04>」"
translation = "「괜찮아<emoji=heart04> 니니도 허접 동정이니까<emoji=heart04> 응후으으<emoji=heart04> 다 아는 것처럼 말하지 마<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아…… 응후으으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あんっ<emoji=heart04>\u3000これくらい全然痛くないしっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000バトルの攻撃受ける方が、よっぽど痛いんだから<emoji=heart04>\u3000むしろ……ふあぁぁっ<emoji=heart04>\u3000んんぅっ……あふうぅうっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 이 정도는 전혀 안 아프니까<emoji=heart04> 하아앙<emoji=heart04> 배틀 공격을 받는 게 훨씬 더 아프단 말이야<emoji=heart04> 오히려…… 후아아앗<emoji=heart04> 응응으…… 아후우으으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「刺激強くって<emoji=heart04>\u3000おま○こ……おま○こ気持ちいいっ<emoji=heart04><emoji=heart04>\u3000んはぁぁっ……あぁぁんっ<emoji=heart04>」"
translation = "「자극이 너무 강해서<emoji=heart04> 보지…… 보지 기분 좋아아<emoji=heart04><emoji=heart04> 응하아아…… 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000にーにーはおち○ちん大っきくだけ、してればいいのっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000いいよぉ<emoji=heart04>\u3000雑魚童貞でも、やればできるじゃぁん<emoji=heart04>\u3000ふあぁぁ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아아아<emoji=heart04> 니니는 자지만 크게 하고 있으면 돼<emoji=heart04> 아아앙<emoji=heart04> 좋아아<emoji=heart04> 허접 동정이라도 하면 되잖아아<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「はああぁっ……<emoji=heart04>\u3000にーにーのおち○ちん、すごい！\u3000男のヒトって、はふぅぅん<emoji=heart04>\u3000こんなに大きく、なるんだぁ<emoji=heart04>\u3000んんんぅ<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 니니 자지, 대단해! 남자란 건, 하후으으응<emoji=heart04> 이렇게나 커지는구나아<emoji=heart04> 응응응으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「これならもう、大丈夫だよね！？\u3000おち○ちん、入れちゃうからっ<emoji=heart04>\u3000ふうぅっ……んうぅっ<emoji=heart04>」"
translation = "「이거라면 이제, 괜찮겠지!? 자지, 넣을 거니까아<emoji=heart04> 후우으…… 응으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クーシェンは膣穴にペニスの先端をあてがうと、そのまま躊躇いなく腰を落として――"
translation = "쿠셴은 질 구멍에 페니스의 끝부분을 갖다 대더니, 그대로 망설임 없이 허리를 내려서──"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ――ふああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000にーにーのおち○ちん、来たぁ～～～っ<emoji=heart04>」"
translation = "「앗── 후아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 니니 자지, 들어왔다아~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「んっ<emoji=heart04>\u3000はああぁっ……<emoji=heart04>\u3000これ、やばいっ<emoji=heart04>\u3000おま○こいっぱいに押し広げられてるぅっ<emoji=heart04>\u3000んふぅぅぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아앗……<emoji=heart04> 이거, 위험해<emoji=heart04> 보지 가득히 밀어 넓혀지고 있어어<emoji=heart04> 응후으으으으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000にーにー、中でピクピクしてるぅ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000ボクのおま○こ、そんなに気持ちいいのぉ？」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 니니, 안에서 움찔움찔거려어<emoji=heart04> 하아아…… 후우으<emoji=heart04> 내 보지, 그렇게 기분 좋아?」"

[[dialogue]]
speaker = "クーシェン"
original = "「んっ<emoji=heart04>\u3000にーにーの童貞おち○ちん、よわよわで雑魚なんだろうけど<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000ボクが満足する前に、出したりしちゃダメだからねっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 니니의 동정 자지, 약해 빠진 허접이겠지만<emoji=heart04> 하아앙<emoji=heart04> 내가 만족하기 전에 싸버리면 안 되니까 말이야<emoji=heart04> 응후으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「先に、はっきり言っておくぞ。……クーシェンは、すごく可愛い」"
translation = "「먼저, 확실히 말해두지. ……쿠셴은, 정말 귀여워」"

[[dialogue]]
speaker = "クーシェン"
original = "「えっ！？\u3000んんぅ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000ど、どうしたの、突然……？」"
translation = "「엣!? 응응으<emoji=heart04> 하아아<emoji=heart04> 어, 어쩌다 갑자기……?」"

[[dialogue]]
speaker = "クロト"
original = "「そんな可愛い恋人が、男のち○ちんをイライラさせるとどうなるのか――身をもって味合わせてやるっ！」"
translation = "「그렇게 귀여운 연인이, 남자의 자지를 초조하게 만들면 어떻게 되는지── 몸소 맛보게 해주지!」"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ！？\u3000――ふわあああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちんがおま○この中、出たり入ったりぃ<emoji=heart04>\u3000これがセックスぅっ<emoji=heart04>」"
translation = "「앗!? ──후와아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지가 보지 안에서, 나갔다 들어왔다 해애<emoji=heart04> 이게 섹스으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "騎乗位ではあるものの、俺は男の意地を見せるべく、下から腰を突き上げてクーシェンのおま○こを刺激していく。"
translation = "기승위이긴 하지만, 나는 남자의 자존심을 보여주기 위해 아래에서 허리를 쳐올리며 쿠셴의 보지를 자극해 나갔다."

[[dialogue]]
speaker = "クーシェン"
original = "「はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んうぅ……<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000んはぁっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……ふああぁっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 응아아<emoji=heart04> 후아아<emoji=heart04> 응으으……<emoji=heart04> 앗, 앙<emoji=heart04> 응하아<emoji=heart04> 응후으<emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 하아아…… 후아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……！\u3000初めてなのに、愛液の量が凄くて、ぬるぬるだっ」"
translation = "「큭……! 처음인데도 애액의 양이 엄청나서, 미끈미끈해」"

[[dialogue]]
speaker = "クーシェン"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>あぁあんっ<emoji=heart04>\u3000にーにー威勢はいいけど、もう気持ちよさそうな顔してるぅ<emoji=heart04>\u3000あはぁぁん<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000だっさ～<emoji=heart04>\u3000ちょろ～い<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04> 니니 기세는 좋지만, 벌써 기분 좋은 표정 짓고 있어어<emoji=heart04> 아하아앙<emoji=heart04> 응후으<emoji=heart04> 찌질해~<emoji=heart04> 허접해~<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000んふうぅうっ<emoji=heart04>\u3000ボクのおま○こはぁ、つよつよみたいだねぇ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000にーにーのは、図体だけ大っきな雑魚おち○ちんっ<emoji=heart04>\u3000はあぁっ……んふうぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응후우으으으<emoji=heart04> 내 보지는 말이야, 짱짱한 것 같네에<emoji=heart04> 앙<emoji=heart04> 니니 거는 덩치만 큰 허접 자지이<emoji=heart04> 하아아…… 응후우으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「よわよわのにーにーが<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000ボクのつよつよおま○こに勝とうだなんて、むりむり～<emoji=heart04>\u3000んんんぅ……ふあわぁあっ<emoji=heart04>」"
translation = "「약해 빠진 니니가<emoji=heart04> 아아앙<emoji=heart04> 내 짱짱한 보지를 이기려 들다니, 무리무리~<emoji=heart04> 응응응으…… 후아와아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は負けじと、ペニスを動かす角度を変えて、膣内で彼女が感じるポイントを探っていく。"
translation = "나는 지지 않고, 페니스를 움직이는 각도를 바꿔가며 질 내에서 그녀가 느끼는 포인트를 찾아 나갔다."

[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000――んあぁぁああっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> ──응아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ここが気持ちいいのかっ？」"
translation = "「여기가 기분 좋은 거냐!」"

[[dialogue]]
speaker = "クーシェン"
original = "「違うもんっ<emoji=heart04>\u3000あはぁあっ……んんぅっ<emoji=heart04>\u3000むしろ、にーにーが気持ち良くて、堪らないんじゃないの～？」"
translation = "「아니거든<emoji=heart04> 아하아앗…… 응응으으<emoji=heart04> 오히려 니니가 기분 좋아서 참을 수 없는 거 아니야~?」"

[[dialogue]]
speaker = "unk"
original = "ならばと俺は、今クーシェンが反応した場所を集中的に擦って刺激していく。"
translation = "그렇다면 하고 나는 방금 쿠셴이 반응한 곳을 집중적으로 문질러 자극해 나갔다."

[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000くうぅっ<emoji=heart04>\u3000ふうぅっ……んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ……んんぅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04> 응<emoji=heart04> 쿠우으<emoji=heart04> 후우으…… 응으으<emoji=heart04> 하아아<emoji=heart04> 앗<emoji=heart04> 응으으<emoji=heart04> 후우으…… 응응으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかし、まだ耐えて、平気そうな顔を装うクーシェン。"
translation = "하지만, 아직 견디며 아무렇지 않은 척 표정을 꾸미는 쿠셴."

[[dialogue]]
speaker = "クーシェン"
original = "「んんっ<emoji=heart04>\u3000そ、それがにーにーの、全力ってことぉ～？\u3000あっ<emoji=heart04>\u3000んんんっ……<emoji=heart04>」"
translation = "「응응<emoji=heart04> 그, 그게 니니의 전력이라는 거야아~? 앗<emoji=heart04> 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「こんくらいしかっ<emoji=heart04>\u3000気持ちよく、させられないなんてぇ<emoji=heart04>\u3000やっぱり雑魚おち○ちんだねぇ～<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んくぅぅっ<emoji=heart04>」"
translation = "「이 정도밖에<emoji=heart04> 기분 좋게 못 해주다니이<emoji=heart04> 역시 허접 자지네에~<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응쿠으으으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「発情しまくってる<emoji=heart04>\u3000頭エロエロの彼女のことすら、あはぁぁん<emoji=heart04>\u3000イかせられないなんて<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000情けな～い<emoji=heart04>\u3000男として恥ずかしくないの～？\u3000んんんぅ<emoji=heart04>」"
translation = "「발정 잔뜩 한<emoji=heart04> 머릿속이 야한 생각뿐인 여자친구조차, 아하아앙<emoji=heart04> 못 가게 만들다니<emoji=heart04> 앙<emoji=heart04> 한심해~<emoji=heart04> 남자로서 부끄럽지도 않아~? 응응응으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あんっ<emoji=heart04>\u3000まあ魔王でも、今日まで童貞だったんだからっ<emoji=heart04>\u3000仕方ないよね～？\u3000んふぅぅ<emoji=heart04>\u3000これだと、にーにーだけ先に、イっちゃいそうかな～？\u3000んふぅっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 뭐 마왕이라도, 오늘까지 동정이었으니까아<emoji=heart04> 어쩔 수 없나아~? 응후으으<emoji=heart04> 이러다가 니니만 먼저 가버릴 것 같은데에~? 응후으<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あぁんっ<emoji=heart04>\u3000ボク、全然動いてないのに～<emoji=heart04>\u3000おち○ちん、弱すぎ～<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000カッコ悪～い<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 나, 전혀 안 움직이고 있는데에~<emoji=heart04> 자지 너무 약해~<emoji=heart04> 응으으<emoji=heart04> 꼴사나워~<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「はあぁぁっ<emoji=heart04>\u3000このままおま○こに降参しちゃえ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000情けなく精液出しちゃえっ<emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 이대로 보지한테 항복해버려어<emoji=heart04> 아앙<emoji=heart04> 한심하게 정액 싸버려어<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「雑魚ざこ<emoji=heart04>\u3000ざ～こ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000雑魚おち○ちん<emoji=heart04>\u3000ほらほらっ<emoji=heart04>\u3000早くイっちゃえっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁああっ<emoji=heart04>」"
translation = "「허접허접<emoji=heart04> 허~접<emoji=heart04> 아아아앗<emoji=heart04> 허접 자지이<emoji=heart04> 자자<emoji=heart04> 빨리 가버려어<emoji=heart04> 응응으으<emoji=heart04> 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「これが、男の本気だと思ってるのかっ？\u3000素直になったら、もっと気持ち良く、してやるぞ！」"
translation = "「이게 남자의 진심이라고 생각하는 거냐! 솔직해지면 더 기분 좋게 해줄 테니까!」"

[[dialogue]]
speaker = "クーシェン"
original = "「えっ！？\u3000これ以上、もっと気持ち良く……！？\u3000んんんぅぅっ<emoji=heart04>\u3000はぁぁっ、ふわぁぁぁっ<emoji=heart04>」"
translation = "「엣!? 이 이상으로, 더 기분 좋게……!? 응응응으으으<emoji=heart04> 하아아앗, 후와아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クーシェンは背筋をゾクゾクと震わせながら、熱い吐息を漏らす。"
translation = "쿠셴은 등줄기를 오싹오싹 떨면서 뜨거운 숨결을 내뱉었다."

[[dialogue]]
speaker = "クロト"
original = "「素直にならないなら、止めちゃってもいいんだぞ？\u3000ほら――」"
translation = "「솔직해지지 않는다면 멈춰버려도 괜찮다고? 자──」"

[[dialogue]]
speaker = "unk"
original = "俺はわざと腰の勢いを緩めてみせる。"
translation = "나는 일부러 허리의 기세를 늦춰 보였다."

[[dialogue]]
speaker = "クーシェン"
original = "「あっ……<emoji=heart04>\u3000そんなっ<emoji=heart04>\u3000んぅ、手を抜くなんて……<emoji=heart04>\u3000うぅぅぅ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 그럴 수가<emoji=heart04> 응으, 적당히 하다니……<emoji=heart04> 으으으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "黙ったまま、今度は彼女が感じていた場所を刺激するのも止める。"
translation = "침묵을 지킨 채, 이번에는 그녀가 느끼고 있던 장소를 자극하는 것도 멈췄다."

[[dialogue]]
speaker = "クーシェン"
original = "「あぁっ……いい感じだったのに……！\u3000ううぅ、ううぅぅぅ～～～！」"
translation = "「아앗…… 기분 좋았는데……! 으으으, 으으으으으~~~!」"

[[dialogue]]
speaker = "unk"
original = "ついには、俺が腰を振るのを完全に止めようとすると――"
translation = "마침내 내가 허리를 흔드는 것을 완전히 멈추려 하자──"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ……やぁぁっ<emoji=heart04>\u3000おち○ちん止めちゃうのダメぇっ<emoji=heart04>」"
translation = "「앗…… 싫어어<emoji=heart04> 자지 멈추는 거 안 돼애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それまで完全に受け身で煽ってばかりいたクーシェンが、焦ったように必死に腰振りながら声を上げる。"
translation = "그때까지 완전히 수동적으로 도발만 하던 쿠셴이, 당황한 듯 필사적으로 허리를 흔들며 소리를 질렀다."

[[dialogue]]
speaker = "クーシェン"
original = "「あっ、あっ、あっ……ダメ、ダメぇ<emoji=heart04>\u3000にーにー、動いてぇ<emoji=heart04>\u3000ボク、こんな中途半端なところで止められたらぁ……あっ、あぁぁぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗…… 안 돼, 안 돼애<emoji=heart04> 니니, 움직여줘어<emoji=heart04> 나, 이런 어중간한 상태에서 멈춰버리면…… 앗, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「んうううぅ～～～<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000イジワルやめてよぉ～～～っ<emoji=heart04>\u3000こんなのっ、あああっ<emoji=heart04>\u3000頭、おかしくなっちゃうぅぅぅ<emoji=heart04>」"
translation = "「응으으으으~~~<emoji=heart04> 아아아앗<emoji=heart04> 심술 부리지 마아~~~앗<emoji=heart04> 이런 거어, 아아앗<emoji=heart04> 머리 이상해져버려어어어<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「発情っ<emoji=heart04>\u3000発情してるんだってばぁぁっ<emoji=heart04>\u3000あっ、あっ、あぁぁあっ<emoji=heart04>\u3000自分じゃどうにもっ、ならないのっ<emoji=heart04>\u3000おま○こ熱くてっ、どうにかなっちゃうからぁぁ……<emoji=heart04>」"
translation = "「발정<emoji=heart04> 발정했단 말이야아아앗<emoji=heart04> 앗, 앗, 아아아앗<emoji=heart04> 나 스스로는 어떻게도 안 된다구웃<emoji=heart04> 보지 뜨거워서 어떻게 돼버릴 것 같으니까아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「だったら……何か言うことがあるだろ？\u3000クーシェン」"
translation = "「그렇다면…… 뭔가 할 말이 있을 텐데? 쿠셴」"

[[dialogue]]
speaker = "クーシェン"
original = "「んっ、ふうぅぅぅぅ～～～～っ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふわぁぁっっ、あふぅぅんっ<emoji=heart04>」"
translation = "「응, 후으으으으으~~~~앗<emoji=heart04> 아아앗<emoji=heart04> 후와아아앗, 아후으으응<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「ああぁぁぁあっ<emoji=heart04>\u3000あぁぁっ、ご、ごめっ、ごめんなさいぃっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000謝りますぅ<emoji=heart04>\u3000素直に言う、からぁっ<emoji=heart04>」"
translation = "「아아아아아앗<emoji=heart04> 아아앗, 미, 미안, 미안해요오옷<emoji=heart04><emoji=heart04><emoji=heart04> 사과할게요오<emoji=heart04> 솔직하게 말할 테니까아아<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「本当は、にーにーのおち○ちん<emoji=heart04>\u3000大きくて固くて<emoji=heart04>\u3000すっごく気持ちいいのぉ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふわぁっ<emoji=heart04>\u3000ああぁあっ<emoji=heart04>」"
translation = "「사실은 니니 자지<emoji=heart04> 크고 딱딱해서<emoji=heart04> 정말 기분 좋아아아<emoji=heart04><emoji=heart04> 앙<emoji=heart04> 후와앗<emoji=heart04> 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「おま○こすぐに負けちゃうの<emoji=heart04>\u3000恥ずかしくてぇ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000強がってましたぁっ<emoji=heart04>\u3000んうぅぅ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「보지 금방 져버리는 거<emoji=heart04> 부끄러워서어<emoji=heart04> 하아앙<emoji=heart04> 강한 척했어요옷<emoji=heart04> 응으으으<emoji=heart04> 하아아앗<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「本当はもっとっ<emoji=heart04>\u3000つよつよおち○ちんで<emoji=heart04>\u3000ボクのよわよわおま○こ、気持ち良くして欲しいですっ<emoji=heart04><emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000言っちゃったぁぁぁ<emoji=heart04>」"
translation = "「사실은 좀 더어<emoji=heart04> 짱짱한 자지로<emoji=heart04> 내 약해 빠진 보지 기분 좋게 해주길 원해요오<emoji=heart04><emoji=heart04> 아아아앗<emoji=heart04> 말해버렸다아아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「よく言えたな――じゃあ、お望み通り……わからせてやるからなっ！」"
translation = "「잘 말했어── 그럼, 원하는 대로…… 확실히 가르쳐줄 테니까!」"

[[dialogue]]
speaker = "クーシェン"
original = "「んっ<emoji=heart04>\u3000はいぃぃっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000にーにーのおち○ちんで、よわよわおま○こ<emoji=heart04>\u3000たっぷりわからせてくださぁい<emoji=heart04>」"
translation = "「응<emoji=heart04> 네에에엣<emoji=heart04><emoji=heart04><emoji=heart04> 니니 자지로 내 약해 빠진 보지<emoji=heart04> 듬뿍 가르쳐주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「ふああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しいの、来たあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 격렬한 거 왔다아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふうぅっ――んっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04><emoji=heart04> 하아아<emoji=heart04> 후아아앗<emoji=heart04> 앙<emoji=heart04> 후우으── 응<emoji=heart04> 앗앗앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「おち○ちん、奥まで来てるぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000気持ちいい～～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁああん<emoji=heart04>」"
translation = "「자지 깊숙이까지 오고 있어어<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아앗<emoji=heart04> 대단해<emoji=heart04> 기분 좋아아아~~~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
original = "「おま○こ気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000これ好きぃ～～っ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
