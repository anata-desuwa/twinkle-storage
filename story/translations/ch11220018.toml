[[dialogue]]
speaker = "クーシェン"
original = "「んふぅぅぅっ<emoji=heart04>\u3000知らないの押し寄せて来るぅ～～<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>\u3000これイっちゃう<emoji=heart04>\u3000ボク、気持ちいいので飛んでっちゃうっ<emoji=heart04><emoji=heart04>」"
