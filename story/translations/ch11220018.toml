[[dialogue]]
speaker = "クーシェン"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000射精っ<emoji=heart04>\u3000にーにー射精する？\u3000うんっ<emoji=heart04>\u3000来てきてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000にーにーの精液、ボクの中にいっぱい出してぇっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 사정<emoji=heart04> 니니 사정해? 응<emoji=heart04> 어서 어서어<emoji=heart04> 앗<emoji=heart04> 응아아앗<emoji=heart04> 니니 정액, 내 안에 듬뿍 내보내 줘어어앗<emoji=heart04>」"

[[dialogue]]
