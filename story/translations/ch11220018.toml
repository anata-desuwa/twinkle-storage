[[dialogue]]
speaker = "クーシェン"
original = "「やばいっ<emoji=heart04>\u3000にーにー飛んじゃうっ<emoji=heart04>\u3000ボク飛んじゃうっ<emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
