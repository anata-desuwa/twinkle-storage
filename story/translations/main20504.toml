[[dialogue]]
speaker = "unk"
original = "第４話,顕現せし力,B"
translation = "제4화, 현현한 힘, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「オオオッ……！」"
translation = "「오오오옷……!」"

[[dialogue]]
speaker = "unk"
original = "クロトが腕を振りかぶり、梨緒の頭を吹き飛ばさんと鉄槌が襲い来る。"
translation = "쿠로토가 팔을 휘둘러 리오의 머리를 날려버리려는 듯 철퇴 같은 주먹이 덮쳐온다."

[[dialogue]]
speaker = "unk"
original = "──だが、そこに梨緒はいなかった。"
translation = "──하지만 그곳에 리오는 없었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そこだ！」"
translation = "「거기다!」"

[[dialogue]]
speaker = "unk"
original = "梨緒は最小限の動きで拳を躱すと、稲妻の矢でクロトの肩を撃ち抜いた。"
translation = "리오는 최소한의 움직임으로 주먹을 피하더니, 번개의 화살로 쿠로토의 어깨를 꿰뚫었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グウゥゥッ！」"
translation = "「구우우웃!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "クロトの拳が再び迫る──が、今度は梨緒は動かない。"
translation = "쿠로토의 주먹이 다시 육박한다── 하지만 이번에 리오는 움직이지 않는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ディバインスフィア！」"
translation = "「디바인 스피어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "拳が届く前に光条に包まれ、瘴気を焼かれながらクロトが飛び退く。"
translation = "주먹이 닿기 전에 광조에 휩싸여, 장기를 태우며 쿠로토가 뒤로 물러난다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「梨緒、あなた今のが間に合うって見えてたの！？」"
translation = "「리오, 당신 방금 그게 늦지 않을 거란 걸 알고 있었어!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「視覚的に見えるわけではないが、なんとなくわかるんだ。たとえば──」"
translation = "「시각적으로 보이는 건 아니지만, 왠지 모르게 알 수 있어. 예를 들면──」"

[[dialogue]]
speaker = "unk"
original = "先ほど戦いながら放った、一本の矢。"
translation = "조금 전 싸우면서 쏘아 올린, 한 발의 화살."

[[dialogue]]
speaker = "unk"
original = "それが空から真っ直ぐに落ちてきて、距離を取ったクロトに雷となって突き刺さる。"
translation = "그것이 하늘에서 일직선으로 떨어져, 거리를 벌린 쿠로토에게 벼락이 되어 내리꽂힌다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「オオオオッ！？」"
translation = "「오오오오옷!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「こんな感じに……な」"
translation = "「이런 느낌으로…… 말이지.」"

[[dialogue]]
speaker = "unk"
original = "未来予知がごとく先を読み、紙一重で躱し、寸分狂わず矢を当てる。"
translation = "미래 예지라도 하듯 앞을 읽고, 종이 한 끗 차이로 피하며, 추호의 오차도 없이 화살을 맞힌다."

[[dialogue]]
speaker = "unk"
original = "まるで運命を見透すようなその力は、今までの梨緒には持ちえなかったもので、翼とともに顕現したのは明らかだ。"
translation = "마치 운명을 꿰뚫어 보는 듯한 그 힘은, 지금까지의 리오에게는 없었던 것으로, 날개와 함께 현현한 것이 분명했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「すごいじゃない！\u3000この調子なら、何とかなるかもしれないわね！」"
translation = "「대단하잖아! 이 기세라면 어떻게든 될지도 모르겠네!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ヴィーナス、次は大きいのが来る。一瞬早く攻めて、彼の攻撃を潰してくれ！」"
translation = "「비너스, 다음은 큰 게 온다. 한발 앞서 공격해서, 그의 공격을 무너뜨려 줘!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わかんないけどわかったわ！」"
translation = "「모르겠지만 알겠어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グオオオオッ──！！」"
translation = "「구오오오옷──!!」"

[[dialogue]]
speaker = "unk"
original = "クロトが低い唸りを上げ、拳撃を繰り出そうとする瞬間、わずかに先んじて光条が迸る。"
translation = "쿠로토가 낮은 신음 소리를 내며 권격을 내지르려는 순간, 아주 조금 앞서 광조가 번뜩인다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「シャイニングゴッデスビーーームッ！！！」"
translation = "「샤이닝 가디스 비이이임!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──ッ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "unk"
original = "その隙を逃さず──"
translation = "그 틈을 놓치지 않고──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「悪しきものを切り裂け──」"
translation = "「악한 것을 베어 갈라라──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ディメンション──エクスウェーブ！！！」"
translation = "「디멘션── 엑스 웨이브!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「オオオオオーーーーーッ！！？？」"
translation = "「오오오오오오오옷!!??」"

[[dialogue]]
speaker = "unk"
original = "そして放たれた雷の波動が刃と化し、リクリエの瘴気を引き裂いた。"
translation = "그리고 방출된 번개의 파동이 칼날이 되어, 리크리에의 장기를 찢어발겼다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ク……オオ……」"
translation = "「크…… 오오……」"

[[dialogue]]
speaker = "unk"
original = "身にまとう瘴気を全て剥がされたクロト。"
translation = "몸에 두르고 있던 장기를 전부 뜯겨 나간 쿠로토."

[[dialogue]]
speaker = "unk"
original = "だがそれも一瞬。次の瞬間にはリクリエの瘴気が爆発的に膨れ上がるだろう。"
translation = "하지만 그것도 잠시. 다음 순간에는 리크리에의 장기가 폭발적으로 부풀어 오를 것이다."

[[dialogue]]
speaker = "unk"
original = "その隙間を縫って、光の矢がクロトの胸に吸い込まれる。"
translation = "그 틈새를 비집고, 빛의 화살이 쿠로토의 가슴으로 빨려 들어간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "だがクロトは苦痛に表情を歪めることもなく、正気を取り戻す気配もない。"
translation = "하지만 쿠로토는 고통으로 표정을 일그러뜨리지도 않고, 제정신을 차릴 기색도 없다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何も起きないわよ！？」"
translation = "「아무 일도 안 일어나는데!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「大丈夫だ」"
translation = "「괜찮다.」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間──"
translation = "다음 순간──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！！？？」"
translation = "「!!??」"

[[dialogue]]
speaker = "unk"
original = "クロトの全身に稲妻が迸った。"
translation = "쿠로토의 전신에 번개가 휘몰아쳤다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何が起きてるの！？」"
translation = "「무슨 일이 일어나고 있는 거야!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「緋宮クロトの中に封印されたリクリエの力を、今は完全に取り除くことはできない」"
translation = "「히노미야 쿠로토 안에 봉인된 리크리에의 힘을, 지금은 완전히 제거할 수 없어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ならば、ジグに植え付けられた力だけを、緋宮クロトの内側から焼き尽くす！」"
translation = "「그렇다면, 지그에게 심어진 힘만을 히노미야 쿠로토의 내면에서 태워 없애겠다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなことできるの！？」"
translation = "「그런 게 가능해!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「人の体を動かすのは電気信号だ。そして雷も電気……なら内側から攻めるには都合がいい」"
translation = "「사람의 몸을 움직이는 건 전기 신호다. 그리고 번개도 전기…… 그렇다면 내면에서 공략하기엔 안성맞춤이지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グ──オオオオッーー！！」"
translation = "「구── 오오오오옷──!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「正気に戻れ！\u3000緋宮クロト！」"
translation = "「제정신으로 돌아와라! 히노미야 쿠로토!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト！！」"
translation = "「쿠로토!!」"

[[dialogue]]
speaker = "unk"
original = "そして閃光が一際強く煌き──"
translation = "그리고 섬광이 한층 더 강하게 반짝이고──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "光が晴れると、クロトが膝を突き、その場に倒れる。"
translation = "빛이 걷히자, 쿠로토가 무릎을 꿇고 그 자리에 쓰러진다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「やった……か？」"
translation = "「해낸…… 건가?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっ！？\u3000それ言っちゃダメなやつ！」"
translation = "「잠깐!? 그거 말하면 안 되는 대사라고!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの指摘に、キョトンと目を丸くする梨緒。"
translation = "비너스의 지적에, 멍하니 눈을 동그랗게 뜨는 리오."

[[dialogue]]
speaker = "unk"
original = "その背後からガーディアンが接近してきて──"
translation = "그 배후에서 가디언이 접근해 오고──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！？\u3000小型の極星従騎──！？」"
translation = "「!? 소형 극성종기──!?」"

[[dialogue]]
speaker = "unk"
original = "しかしガーディアンは梨緒たちに攻撃する間もなく、闇を帯びた拳に砕かれた。"
translation = "하지만 가디언은 리오 일행을 공격할 틈도 없이, 어둠을 머금은 주먹에 박살 났다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！\u3000この攻撃は──」"
translation = "「! 이 공격은── 탈」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう、２人とも。おかげで帰ってこれた」"
translation = "「고마워, 둘 다. 덕분에 돌아올 수 있었어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まったく！\u3000寝坊は困るわよ、パパ！」"
translation = "「정말이지! 늦잠은 곤란하다구, 아빠!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……気を付けるよ」"
translation = "「하하…… 조심할게.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと梨緒の前に立ち、拳を下ろすクロト。"
translation = "비너스와 리오 앞에 서서, 주먹을 내리는 쿠로토."

[[dialogue]]
speaker = "unk"
original = "その目には、確かに理性の光が宿っていた。"
translation = "그 눈에는 분명히 이성의 빛이 깃들어 있었다."

[[dialogue]]
speaker = "unk"
original = "傷ついた──いや、傷つけた２人に向けて、俺は改めて深々と頭を下げる。"
translation = "상처 입은── 아니, 상처 입힌 두 사람을 향해, 나는 다시 한번 깊숙이 고개를 숙인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん。リクリエの力に呑まれかけていた」"
translation = "「미안. 리크리에의 힘에 집어삼켜질 뻔했어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「このくらい平気よ。パパの面倒見てあげるって言ったでしょ？」"
translation = "「이 정도는 아무렇지도 않아. 아빠를 돌봐주겠다고 말했잖아?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王を止めると決意した時から、覚悟はできている」"
translation = "「마왕을 멈추겠다고 결의했을 때부터, 각오는 되어 있다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……が、足蹴にされるとはさすがに思わなかった。まあ、貴重な体験ではあったかな」"
translation = "「……만, 발길질을 당할 줄은 역시 생각 못 했군. 뭐, 귀중한 체험이긴 했나.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う……本当にすまな──」"
translation = "「으…… 정말 미안하──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「謝罪というなら、戦いが終わったら勝負を受けてもらう。私の気が済むまでな」"
translation = "「사죄라고 한다면, 싸움이 끝나면 승부를 받아줘야겠다. 내 기분이 풀릴 때까지 말이지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ああ、わかった」"
translation = "「……아아, 알았어.」"

[[dialogue]]
speaker = "unk"
original = "梨緒は見るからにボロボロになりながらも、気丈に微笑む。"
translation = "리오는 보기에 만신창이가 된 상태이면서도, 꿋꿋하게 미소 짓는다."

[[dialogue]]
speaker = "unk"
original = "今回は……いや、今回も彼女に助けられた。"
translation = "이번에는…… 아니, 이번에도 그녀에게 도움을 받았다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「また勝負するの～？\u3000飽きないわね」"
translation = "「또 승부하는 거야~? 질리지도 않네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ていうか、気が済むまで勝負するなら、今までもそうだったじゃない？」"
translation = "「그보다, 기분이 풀릴 때까지 승부한다면, 지금까지도 그랬던 거 아니야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なっ！？\u3000そ、そんなことは……」"
translation = "「나앗!? 그, 그런 건……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ンッ、ンン……まずは流星市国を守ることが先決だ。それ以外のことは後で考えよう」"
translation = "「흠, 흠흠…… 우선은 유성시국을 지키는 게 선결이다. 그 이외의 일은 나중에 생각하자.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ごまかした……）"
translation = "（얼버무렸다……）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（ごまかしたわね……）"
translation = "（얼버무렸네……）"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おやおや、ホントに魔王を止めちゃったね。天界の特務エージェントも形無しだよ」"
translation = "「이런 이런, 정말로 마왕을 멈춰버렸네. 천계의 특무 에이전트도 체면이 말이 아니야.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃんすごかった！\u3000かっこよかったよ！」"
translation = "「리오짱 대단했어! 멋있었어!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ああ、君たちのおかげで立ち上がれた。ありがとう、ベアト、ナターシャ」"
translation = "「……아아, 너희 덕분에 일어설 수 있었다. 고맙다, 베아토, 나타샤.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だがあの力の正体は私にもよくわからない……あれはいったい何だったんだ？」"
translation = "「하지만 그 힘의 정체는 나도 잘 모르겠어…… 그건 대체 뭐였지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「自分のことなのにわからないの？」"
translation = "「본인 일인데도 모르는 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、本当に。少なくとも、こちらの世界に来る前はあんな力を出したことはなかった」"
translation = "「아아, 정말로. 적어도 이쪽 세계에 오기 전에는 저런 힘을 낸 적이 없었다.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の背中に顕現した天使の翼と、未来視に近い行動予測。"
translation = "리오의 등에 현현한 천사의 날개와, 미래시에 가까운 행동 예측."

[[dialogue]]
speaker = "unk"
original = "そして俺を射貫いた雷から感じたのは、星力だけではなかった。"
translation = "그리고 나를 꿰뚫은 번개에서 느낀 것은, 성력뿐만이 아니었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（俺はあの力を知っている……<ruby>霊屑<rt>クロスダスト</rt></ruby>に宿る霊力のような……）"
translation = "（나는 그 힘을 알고 있어…… <ruby>영설<rt>크로스 더스트</rt></ruby>에 깃든 영력 같은……）"

[[dialogue]]
speaker = "unk"
original = "梨緒が普通の人間だとすれば、セイファート前学園長のように後天的に得たものなのだろうか？"
translation = "리오가 평범한 인간이라면, 세이파트 전 학원장처럼 후천적으로 얻은 것일까?"

[[dialogue]]
speaker = "unk"
original = "なら、それはどこで……？"
translation = "그렇다면 그것은 어디서……?"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「残念ながら考察している暇はない。こうしている間にも極星学園の侵攻は進んでいる」"
translation = "「안타깝게도 고찰하고 있을 틈은 없다. 이러는 동안에도 극성학원의 침공은 계속되고 있어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、早く極星の指揮官を見つけて──」"
translation = "「아아, 빨리 극성의 지휘관을 찾아서──」"

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「キシャーッ！！」"
translation = "「키샤앗!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「機械型モンスター……！」"
translation = "「기계형 몬스터……!」"

[[dialogue]]
speaker = "unk"
original = "傷ついたヴィーナスと梨緒を背に庇い、機械型モンスターと対峙する。"
translation = "상처 입은 비너스와 리오를 등 뒤로 보호하며, 기계형 몬스터와 대치한다."

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「シャーッ！」"
translation = "「샤앗!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「後ろからもモンスター！？\u3000ほんと節操ないわね！」"
translation = "「뒤에서도 몬스터!? 정말 절조 없다니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あれ？\u3000見慣れたサメというか、機械化してないモンスターがどうしてここに……？」"
translation = "「어라? 낯익은 상어라고 해야 하나, 기계화되지 않은 몬스터가 왜 여기에……?」"

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「キシャーーッ！！」"
translation = "「키샤아앗!!」"

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「シャーーッ！！」"
translation = "「샤아앗!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え……？\u3000モンスターとモンスターが戦ってる……！？\u3000しかもサメ同士なんだけど！？」"
translation = "「에……? 몬스터랑 몬스터가 싸우고 있어……!? 게다가 상어끼리인데!?」"

[[dialogue]]
speaker = "unk"
original = "モンスターがこちらの味方をするなんてありえない──"
translation = "몬스터가 우리 편을 들 리가 없다──"

[[dialogue]]
speaker = "unk"
original = "いや、三界にただ１人、モンスターすら従えられる存在がいた。"
translation = "아니, 삼계에 단 한 명, 몬스터조차 부릴 수 있는 존재가 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まさか──」"
translation = "「설마──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「おっと、あのモンスターには手を出すでないぞ。妾の所有物だ」"
translation = "「어이쿠, 저 몬스터에게는 손을 대지 말거라. 소첩의 소유물이니라.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「煌嶺……！」"
translation = "「코레이……!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「何を驚いている？\u3000妾が流星市国にいることは知っておろう」"
translation = "「무엇을 놀라느냐? 소첩이 유성시국에 있다는 것은 알고 있었을 터이거늘.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたがあの煌嶺ね！\u3000なんていうか、悪そうなやつのオーラがするわ！」"
translation = "「당신이 그 코레이구나! 뭐랄까, 나쁜 녀석의 오라가 느껴져!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふむ、そういう貴様は九浄の娘か。魔王とは親子と聞いたが、揃って能天気な顔をしているな」"
translation = "「흐음, 그런 귀공은 쿠죠의 딸인가. 마왕과는 부녀 사이라고 들었다만, 나란히 태평한 얼굴을 하고 있구나.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「聞いた聞いたっ！？\u3000私、クロトと似てるって！」"
translation = "「들었어 들었어!? 나, 쿠로토랑 닮았대!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今のは喜ぶところか……？」"
translation = "「방금 그건 기뻐할 대목인가……?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「しかしどうした魔王、すでにくたびれているではないか。モンスターごときにやられたか？」"
translation = "「그나저나 어찌 된 것이냐 마왕, 벌써 지쳐 있지 않느냐. 몬스터 따위에게 당했느냐?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それとも……己の身に宿した力に食われかけたか？」"
translation = "「아니면…… 제 몸에 깃든 힘에 잡아먹힐 뻔했느냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "俺の中に封じたリクリエが暴走したのを知ってか知らずか、煌嶺の言葉に心臓が跳ねる。"
translation = "내 안에 봉인한 리크리에가 폭주한 것을 아는지 모르는지, 코레이의 말에 심장이 뛴다."

[[dialogue]]
speaker = "unk"
original = "モンスターすら従える魔界の女帝。それも魔王の系譜となれば、他の魔王のことなどお見通しとでも言うのか。"
translation = "몬스터조차 부리는 마계의 여제. 그것도 마왕의 계보라면, 다른 마왕의 일 정도는 훤히 꿰뚫고 있다는 것인가."

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「シャー……」"
translation = "「샤아……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ほう、やはり機械型の方が強いのか。欲しくなってきたぞ。よって──」"
translation = "「호오, 역시 기계형 쪽이 강한 것인가. 탐이 나는구나. 따라서──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾のものとなれ！」"
translation = "「소첩의 것이 되거라!」"

[[dialogue]]
speaker = "unk"
original = "揺らめく九尾の尾から炎が広がり、勝ち残った方のモンスターを包み込む。"
translation = "넘실거리는 구미의 꼬리에서 불꽃이 번져나가, 살아남은 쪽의 몬스터를 감싼다."

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「キシャー！？」"
translation = "「키샤아!?」"

[[dialogue]]
speaker = "unk"
original = "するとモンスターも炎の球と化して、尾の中に吸い込まれていった。"
translation = "그러자 몬스터도 불꽃 구체가 되어, 꼬리 속으로 빨려 들어갔다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふむ、強靭になったとはいえ所詮はモンスターか。御するなど容易い」"
translation = "「흐음, 강인해졌다고는 하나 결국은 몬스터인가. 다스리는 것쯤이야 식은 죽 먹기지.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「──来い！」"
translation = "「──오너라!」"

[[dialogue]]
speaker_original = "マキナ・スクアルス"
speaker_translation = "마키나 스쿠알스"
original = "「キシャーッ！！」"
translation = "「키샤아앗!!」"

[[dialogue]]
speaker = "unk"
original = "そしてモンスターは煌嶺の尾から解き放たれると、同じ形をしたモンスターめがけて突進していく。"
translation = "그리고 몬스터는 코레이의 꼬리에서 해방되자, 같은 형태를 한 몬스터를 향해 돌진해 간다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「せいぜい役に立つがよい」"
translation = "「기껏해야 도움이 되도록 하여라.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今のでモンスターを支配したってこと……？\u3000すごい力ね！」"
translation = "「방금 걸로 몬스터를 지배했다는 거야……? 대단한 힘이네!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あ、そうそう。新学園長のシノさんから、魔王さんに伝言だよ～」"
translation = "「아, 맞다 맞다. 신학원장인 시노 씨가 마왕 씨한테 전할 말이 있대~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「キャラ変わった！？\u3000二重人格ってやつ！？」"
translation = "「캐릭터 바뀌었어!? 이중인격이라는 거야!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ううん、<ruby>二重人格<rt>そういうの</rt></ruby>じゃないよ。ただの気分」"
translation = "「으응, 이중인격 아니야. 그냥 기분.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シノさんから俺に伝言……？\u3000今ここで？」"
translation = "「시노 씨가 나한테 전언을……? 지금 여기서?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「うん。魔王さんが一番、極星星徒会と接触する可能性が高いからって」"
translation = "「응. 마왕 씨가 가장 극성성도회와 접촉할 가능성이 높으니까라면서.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「香堂チナがなぜアルタイルに宣戦布告したのか疑問がある──って、学園長が言ってた」"
translation = "「코도 치나가 왜 알타이르에 선전포고를 했는지 의문이 있다── 고, 학원장님이 말했어.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「<ruby>アルタイル側<rt>敵</rt></ruby>の戦う意志を鈍らせる作戦かもしれないけど、アルタイルが戦う準備を整えちゃう危険性も高い」"
translation = "「알타이르 쪽의 전의를 꺾으려는 작전일지도 모르지만, 알타이르가 싸울 준비를 갖춰버릴 위험성도 높거든.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「真にこの戦いが生存競争であるなら、デネブの存在は知らせず、情報のアドバンテージを持っていた方がいいはずだって」"
translation = "「진정으로 이 싸움이 생존 경쟁이라면, 데네브의 존재는 알리지 않고 정보의 우위를 점하고 있는 편이 나았을 거라나 봐.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……なるほど。ありがとう」"
translation = "「……과연. 고마워.」"

[[dialogue]]
speaker = "unk"
original = "確かにデネブ側の視点で見れば、あの宣戦布告をするメリットはあまりない。"
translation = "확실히 데네브 측의 시점에서 보면, 그 선전포고를 할 메리트는 별로 없다."

[[dialogue]]
speaker = "unk"
original = "ならどうして……？\u3000そもそもあれはチナ自身の意思だったのか……？"
translation = "그렇다면 어째서……? 애초에 그건 치나 자신의 의지였을까……?"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それじゃ、私はあの馬のガーディアンもコレクションするから、この辺ブラブラしてるね」"
translation = "「그럼, 나는 저 말 형태 가디언도 컬렉션할 거니까, 이 근처 어슬렁거리고 있을게.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「極星従騎をコレクションか……心強いといえば心強いが、大丈夫か？\u3000戦況は芳しくないぞ」"
translation = "「극성종기를 컬렉션이라니…… 든든하다면 든든하지만, 괜찮겠어? 전황이 좋지 않다구.」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「誰に言ってるの？\u3000私はキュリオスの皇帝だよ？」"
translation = "「누구한테 말하는 거야? 나는 큐리오스의 황제라구?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「<ruby>キュリオス<rt>うち</rt></ruby>の子も出してあげるから、期待してていいよ♪」"
translation = "「큐리오스 애들도 내보낼 테니까, 기대해도 좋아♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うちの子……？」"
translation = "「우리 애들……?」"

