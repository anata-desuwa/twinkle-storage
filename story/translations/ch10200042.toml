[[dialogue]]
speaker = "unk"
original = "第２話,友達への秘密,P"
translation = "제2화, 친구에게는 비밀, P"

[[dialogue]]
speaker = "unk"
original = "色々あったクリスマスも終わり、俺はルルカとカフェテリアでのんびりしていた。"
translation = "이런저런 일이 있었던 크리스마스도 끝나고, 나는 루루카와 카페테리아에서 한가롭게 쉬고 있었다."

[[dialogue]]
speaker = "unk"
original = "そこへ、ルルカのクラスメイトであるリーリアが通りかかって、３人でお茶することになり――"
translation = "그때 루루카의 클래스메이트인 리리아가 지나가다가 셋이서 차를 마시게 되었고──"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ～、ほんとに疲れた～。クリスマス前日の夜まで、ずっとドタバタしてて……」"
translation = "「아~ 정말 피곤해~. 크리스마스 전날 밤까지 계속 정신없어서……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あはは♪\u3000ルルカちゃん、お疲れマジカル～☆」"
translation = "「아하하♪ 루루카짱, 수고 매지컬~☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、私にもプレゼントくれて、嬉しかったよ♪\u3000手作りのブレスレット、大切にするね」"
translation = "「그래도 나한테도 선물 줘서 기뻤어♪ 직접 만든 팔찌, 소중히 간직할게」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うんっ。頑張って用意したから、喜んでもらえたなら嬉しいな♪」"
translation = "「응. 열심히 준비했으니까 기뻐해 준다면 나도 좋아♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なんにしても、忙しいクリスマスは終わったし、今日はだらーんと過ごすつもり～」"
translation = "「어쨌든 바쁜 크리스마스는 끝났고, 오늘은 빈둥거리며 보낼 생각이야~」"

[[dialogue]]
speaker = "unk"
original = "でも、年末はまた忙しいんじゃない？"
translation = "하지만 연말에는 또 바쁘지 않아?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うっ。思い出させないでよ、お兄ちゃん」"
translation = "「윽. 떠올리게 하지 마, 오빠」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「何か面倒な用事でもあるの？」"
translation = "「뭐 귀찮은 일이라도 있어?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「面倒っていうか、別に嫌ではないんだけどね～。それなりに手間なのは確かかなぁ」"
translation = "「귀찮다기보다 딱히 싫은 건 아닌데 말이야~. 나름대로 손이 많이 가는 건 사실이려나」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「とにかく！\u3000今日だけはそういうのもぜ～んぶ忘れて、のんびり休むって決めたの！」"
translation = "「어쨌든! 오늘만큼은 그런 것도 저~언부 잊고 느긋하게 쉬기로 정했어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だから、お兄ちゃん、カフェオレ飲ませて～<emoji=heart04>」"
translation = "「그러니까 오빠, 카페오레 마시게 해줘~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "はいはい、カフェオレをどうぞ、可愛い妹様"
translation = "네네, 카페오레 여기 있습니다, 귀여운 여동생님"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ……ぷぁ～～っ♪\u3000甘くておいし～<emoji=heart04>\u3000ありがとね、お兄ちゃん。愛してる<emoji=heart04>」"
translation = "「응…… 푸하아~~♪ 달콤하고 맛있어~<emoji=heart04> 고마워, 오빠. 사랑해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も世界一愛してるぞ"
translation = "나도 세상에서 제일 사랑해"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ～<emoji=heart04>\u3000世界一とか照れちゃうな～～、んもぅ<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 세상에서 제일이라니 부끄럽네~~ 정말<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ～、はいはい。ご馳走さまです～」"
translation = "「아~ 네네. 잘 먹었습니다~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「というか、可愛い後輩を差し置いて、イチャイチャ見せつけてくれるじゃないですか、センパイ。すっかりルルカちゃんとのカップリングが板についちゃってる感じで」"
translation = "「그보다 귀여운 후배를 제쳐두고 꽁냥거리는 걸 보여주시다니요, 선배. 아주 루루카짱이랑 커플링이 몸에 밴 느낌이네요」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、ごめん、つい……なんか見せつけるようなことしちゃって」"
translation = "「앗, 미안, 나도 모르게…… 뭔가 염장 지르는 짓을 해버렸네」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ～、いいのいいの。ルルカちゃんが幸せそうなのを見るのは、私も嬉しいんで♪」"
translation = "「아~ 아냐 아냐. 루루카짱이 행복해 보이는 걸 보는 건 나도 기쁘니까♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ただセンパイには、ちょっと色々文句は言いたいですけどね！\u3000ぷんぷん！」"
translation = "「다만 선배한테는 좀 이것저것 따지고 싶긴 하지만요! 흥흥!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――でも今は、そんなことより！\u3000ルルカちゃんはもう見た？」"
translation = "「──하지만 지금은 그것보다! 루루카짱은 벌써 봤어?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「<ruby>汐<rt>うしお</rt></ruby>ルカルカの新衣装！\u3000クリスマスツリーがモチーフで、め～っちゃ可愛かった～♪」"
translation = "「시오 루카루카의 새 의상! 크리스마스트리가 모티브인데, 어~엄청 귀여웠어~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ギクッ……！」"
translation = "「찔끔……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う、うん、そうだね。すごく可愛かった～。さすがルカルカ～って感じで。あははっ……」"
translation = "「으, 응, 그렇네. 엄청 귀여웠어~. 역시 루카루카~라는 느낌으로. 아하하……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でもあの衣装、ルルカちゃんのクリスマスフォームに似てたよね～」"
translation = "「근데 그 의상, 루루카짱의 크리스마스 폼이랑 닮았더라~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ギクギクッ……！」"
translation = "「찔끔찔끔……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「メン限の配信で先行公開とかされてた感じ？\u3000あたし、見逃しちゃってたかな……？」"
translation = "「멤버십 한정 방송에서 선공개 같은 거 된 느낌? 내가 놓쳤던 걸까……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、すぐに合わせてくるなんて、さすがルルカちゃん、筋金入りの『お姉ちゃん』だね！」"
translation = "「그래도 금방 맞춰 입고 나오다니, 역시 루루카짱, 뼛속까지 『언니』구나!」"

[[dialogue]]
speaker = "unk"
original = "──『お姉ちゃん』とは、Ｖチューバールカルカの女性リスナーを指す呼び名である。"
translation = "──『언니』란 VTuber 루카루카의 여성 리스너를 가리키는 호칭이다."

[[dialogue]]
speaker = "unk"
original = "ルルカが汐ルカルカの『中の人』である事実は、俺を始めとした一部のヒトしか知らない。リーリアに対しては、ルルカは『ルカルカの熱心なファン』ということになっている。"
translation = "루루카가 시오 루카루카의 '안의 사람'이라는 사실은 나를 비롯한 일부 사람밖에 모른다. 리리아에게 루루카는 '루카루카의 열성 팬'으로 알려져 있다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そうだ！\u3000よかったらまた、クリスマスフォーム見せてくれない？」"
translation = "「맞다! 괜찮으면 다시 한번 크리스마스 폼 보여주지 않을래?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え！？\u3000こ、ここで……？」"
translation = "「엣!? 여, 여기서……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ダメ？」"
translation = "「안 돼?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ダメってわけじゃないけど……ちょっと場所的に目立つというかぁ……」"
translation = "「안 되는 건 아니지만…… 좀 장소적으로 눈에 띈달까……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「大丈夫！\u3000私とセンパイで隠すから。ね、お願い♪」"
translation = "「괜찮아! 나랑 선배가 가려줄게. 응, 부탁해♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「わかった。それなら……。じゃあ、変身するよ？\u3000チェンジ、クリスマスフォーム！」"
translation = "「알았어. 그렇다면……. 그럼 변신할게? 체인지, 크리스마스 폼!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「おお～♪\u3000うんっ、やっぱりルカルカにそっくり♪\u3000すごく可愛い！」"
translation = "「오오~♪ 응, 역시 루카루카랑 똑같아♪ 엄청 귀여워!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そ、そう？\u3000まぁ、あたしは最古参『お姉ちゃん』だからね～。あははっ……」"
translation = "「그, 그래? 뭐, 나는 최고참 『언니』니까 말이야~. 아하하……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「さっすが～♪\u3000ねぇねぇ、もっとよく見せてくれない？\u3000配信だと、後ろとかよく見えなかったからさ。どうなってるのかなって」"
translation = "「역시나~♪ 저기 저기, 좀 더 자세히 보여주지 않을래? 방송에서는 뒤쪽 같은 게 잘 안 보였거든. 어떻게 되어 있나 해서」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「い、いいけど、撮影はなしでお願いね？」"
translation = "「조, 좋지만 촬영은 하지 말아줘?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え～、撮っちゃダメ～？\u3000すっごく可愛いのに」"
translation = "「에~ 찍으면 안 돼~? 이렇게나 귀여운데」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「さ、さすがに目立っちゃうから！\u3000お兄ちゃんも壁役の強化をお願いっ」"
translation = "「그, 그건 너무 눈에 띄니까! 오빠도 벽 역할을 더 강화해 줘」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「むぅ～、じゃあ見るだけで我慢する～……おお～っ、ここはこうなってるんだ！\u3000へぇぇ～～っ」"
translation = "「무으~ 그럼 보는 걸로만 참을게~…… 오오~ 여기는 이렇게 되어 있구나! 헤에~~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――うんっ、満足した！\u3000撮影はまた今度の機会にってことで♪」"
translation = "「──응, 만족했어! 촬영은 다음에 기회가 되면 하는 걸로♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「諦めてなかったんだ……」"
translation = "「포기 안 했었구나……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「だって、私はルルカちゃんほどじゃないけど、これでもルカルカのメンバーシップに入会して応援してる『お姉ちゃん』だから♪」"
translation = "「그야 나는 루루카짱 정도는 아니지만, 그래도 루카루카 멤버십 가입해서 응원하는 『언니』니까♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――っと、いけない、話し込んでたらもうこんな時間！」"
translation = "「──앗, 안 되겠다, 얘기하다 보니 벌써 시간이 이렇게 됐네!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ごめん、用事があるから行くね！\u3000ルルカちゃん、センパイ、お先に失礼しまーす♪」"
translation = "「미안, 용무가 있어서 가볼게! 루루카짱, 선배, 먼저 실례하겠습니다~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……ねえ、お兄ちゃん」"
translation = "「……있지, 오빠」"

[[dialogue]]
speaker = "unk"
original = "リーリアに教えたくなった？"
translation = "리리아에게 알려주고 싶어졌어?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん。リーリアちゃんは友達だもん。あと、アナちゃんにも」"
translation = "「응. 리리아짱은 친구인걸. 그리고 아나짱한테도」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「フニちゃんたちにはもう知られちゃってるし、リーリアちゃんたちにも、あたしがルカルカの中の人だって、話しておきたい」"
translation = "「후니짱들한테는 이미 들켜버렸고, 리리아짱들한테도 내가 루카루카 안의 사람이라고 말해두고 싶어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だけど……カミングアウトしたら、やっぱり怒っちゃうかな？\u3000ずっと黙ってたわけだし……」"
translation = "「하지만…… 커밍아웃하면 역시 화낼까? 계속 입 다물고 있었으니까……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫だよ。２人なら怒ったりしない"
translation = "괜찮을 거야. 그 두 사람이라면 화내지 않을 거야"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そうだよね……でも、いざ自分から明かそうと思うと、やっぱり怖いんだ。だから――」"
translation = "「그렇겠지…… 하지만 막상 직접 밝히려고 생각하니 역시 무서워. 그러니까──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、勇気を貰ってもいい？」"
translation = "「오빠, 용기를 얻어도 될까?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ぎゅ～ってハグして、お兄ちゃんパワーを充電して欲しい。そうしたらあたし、頑張れるから」"
translation = "「꼬옥 허그해서 오빠 파워를 충전해 줬으면 좋겠어. 그러면 나, 힘낼 수 있을 것 같으니까」"

[[dialogue]]
speaker = "unk"
original = "わかった。おいで"
translation = "알았어. 이리 와"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん。――んっ……♪」"
translation = "「응. ──응……♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ねぇ、お兄ちゃん。もしちゃんとリーリアちゃんとアナちゃんに伝えられたら、ご褒美にキスしてくれる？」"
translation = "「있지, 오빠. 만약 제대로 리리아짱이랑 아나짱한테 전하고 오면, 보상으로 키스해 줄 거야?」"

[[dialogue]]
speaker = "unk"
original = "ああ。沢山してやる"
translation = "그래. 잔뜩 해줄게"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ♪\u3000なら、必ず伝えて戻ってくるから――」"
translation = "「에헤헤♪ 그럼 반드시 전하고 돌아올 테니까──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そしたら、いっぱいいっぱい、あたしのこと甘やかしてね、お兄ちゃん<emoji=heart04>」"
translation = "「그러면 잔뜩잔뜩 나 예뻐해 줘야 해, 오빠<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……よしっ。じゃあ、気合い入れて、行ってきます！」"
translation = "「……좋아. 그럼 기합 넣고 다녀오겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "と、その様子を、カフェテリアの入り口から覗いている人物が２人――"
translation = "그런 모습을 카페테리아 입구에서 엿보고 있는 인물이 두 명──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「うーん、どうしよう。困った展開になっちゃったなぁ」"
translation = "「으음, 어쩌지. 곤란한 전개가 되어버렸네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むしろ都合がいいのでは？\u3000リーリアさんにとっては既知の情報だったわけですし」"
translation = "「오히려 잘된 것 아닙니까? 리리아 씨에게는 이미 알고 있던 정보였으니까요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そうなんだけど～。途中で気づいちゃったせいで、こっちもずっと言えずにいたなんて、今のルルカちゃんと同じぐらい気まずいってば～」"
translation = "「그렇긴 한데~. 중간에 눈치채버린 탓에 이쪽도 계속 말 못 하고 있었다니, 지금 루루카짱만큼이나 어색하다구~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、ルルカさんはもう、決断したみたいですよ。ほら、今度こそ上手く伝えて下さい」"
translation = "「하지만 루루카 씨는 이미 결심한 모양이에요. 자, 이번에야말로 잘 전해 주세요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルカルカのファンとして、ルルカさんのことをこれからも全力で応援するって」"
translation = "「루카루카의 팬으로서, 루루카 씨를 앞으로도 전력으로 응원하겠다고」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今度は私も一緒に、２人の友達として立ち会いますから」"
translation = "「이번에는 저도 함께, 두 사람의 친구로서 동석할 테니까요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「アナちゃん……！」"
translation = "「아나짱……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――よしっ、こっちも勇気出た！\u3000私もルルカちゃんに本当のことを伝えて来るね」"
translation = "「──좋아, 이쪽도 용기가 났어! 나도 루루카짱한테 사실대로 말하고 올게」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お供しますよ」"
translation = "「동행하겠어요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ねぇ、ルルカちゃん。ちょっと話があるんだけど――」"
translation = "「있지, 루루카짱. 잠깐 할 말이 있는데──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あれ？\u3000リーリアちゃんとアナちゃん！\u3000ちょうどよかった、あたしも２人に大事な話があって……！」"
translation = "「어라? 리리아짱이랑 아나짱! 마침 잘됐다, 나도 두 사람한테 중요한 할 말이 있어서……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あのね、あたし、２人に秘密にしてたことがあるの――」"
translation = "「저기 말이야, 나 두 사람한테 비밀로 하던 게 있어──」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「うん。実は、私もなんだ」"
translation = "「응. 사실 나도야」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "こうして友達同士、３人はカミングアウトを果たすのだった――"
translation = "이렇게 친구들끼리 세 사람은 커밍아웃을 완수하는 것이었다──"

