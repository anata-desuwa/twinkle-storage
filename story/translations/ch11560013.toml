[[dialogue]]
speaker = "unk"
original = "第３話,花織、Ｖチューバーにハマる,P"
translation = "제3화, 카오리, 브이튜버에 빠지다, P"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「それでね！\u3000ちえりちゃんが思い切って先輩に自分の想いを打ち明けるんだけど、なんとその先輩の正体がね──！」"
translation = "「그래서 말이야! 치에리짱이 큰맘 먹고 선배에게 자기 마음을 고백하는데, 무려 그 선배의 정체가──!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あ～もう、わかったから静かに歩きなさいよ！」"
translation = "「아~ 이제 알았으니까 조용히 좀 걸어!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「カオリンも『トレちぇり』見ようよ！\u3000この世界じゃないと見れないんだよ？\u3000見とかないと損だって！」"
translation = "「카오린도 『트레치에』 보자! 이 세계가 아니면 못 본다구? 안 보면 손해라니까!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「あ～、そっか。この世界にいる間しか楽しめないものもあるもんね～」"
translation = "「아~ 그렇네. 이 세계에 있는 동안에만 즐길 수 있는 것도 있으니까 말이야~」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「そういう意味では、ここあも『トレちぇり』ちょっと気になってきたかも～。あとはファッションの流行とか！」"
translation = "「그런 의미에선 코코아도 『트레치에』 조금 궁금해졌을지도~. 아니면 패션 유행이라든가!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「服屋さんはちょっとわかんないけど、『トレちぇり』なら絶対ある！\u3000……そう、ここ秋葉原ならね！！」"
translation = "「옷 가게는 잘 모르겠지만, 『트레치에』라면 분명 있어! ……그래, 여기 아키하바라라면 말이지!!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「まあ、服はお店に行かなくても、街ゆく人を見れば流行はなんとなく掴めるしね～。それで、何か『トレちぇり』関係の買い物がある感じ？」"
translation = "「뭐, 옷은 가게에 안 가도 길가는 사람들을 보면 유행은 대충 파악되니까~. 그래서 뭔가 『트레치에』 관련 쇼핑이라도 할 생각이야?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「うん！\u3000『トレちぇり』はちょっと前の作品だけど、まだまだ人気あるからグッズも残ってるって聞いたし、頑張って探すぞーっ！」"
translation = "「응! 『트레치에』는 좀 예전 작품이지만 아직 인기가 많아서 굿즈도 남아있다고 들었거든, 열심히 찾아볼 거야!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「探してどうすんの？\u3000元の世界に戻る時に持って帰れるかわからないんだよ？\u3000だったらグッズを見つけても意味ないじゃん」"
translation = "「찾아서 뭐 하게? 원래 세계로 돌아갈 때 가져갈 수 있을지 모르잖아. 그렇다면 굿즈를 찾아도 의미 없잖아」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「眺めて楽しむんだよ！」"
translation = "「바라보며 즐기는 거야!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そんなことのために駆り出されたわけ？」"
translation = "「그런 것 때문에 끌려 나온 거야?」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「まーまー、これも観光の一環だと思って楽しもーよ♪」"
translation = "「자자, 이것도 관광의 일환이라고 생각하고 즐기자구♪」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「まあ、ここあさんがそう言うなら……」"
translation = "「뭐, 코코아 씨가 그렇게 말씀하신다면……」"

[[dialogue]]
speaker = "unk"
original = "魔法少女アニメ『トレジャーキャプター☆ちえり』にはまったいろはに連れられて、３人は秋葉原にやってきた。"
translation = "마법 소녀 애니메이션 『트레저 캡터☆치에리』에 빠진 이로하에게 이끌려, 세 사람은 아키하바라에 왔다."

[[dialogue]]
speaker = "unk"
original = "そこは彼女たちの知る世界と変わらない電気街であり、サブカルチャーの聖地でもあるようだ。"
translation = "그곳은 그녀들이 알던 세계와 다를 바 없는 전자 상가이자, 서브컬처의 성지이기도 한 모양이다."

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「レッツゴー♪」"
translation = "「렛츠 고♪」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あ、ちょっと待ちなさいって！」"
translation = "「아, 잠깐 기다리라니까!」"

[[dialogue]]
speaker = "unk"
original = "駆け出したいろはの後を追って、通りを進んでいく。"
translation = "달려나간 이로하의 뒤를 쫓아 거리를 나아간다."

[[dialogue]]
speaker = "unk"
original = "ふと、店先に並べられたモニターに映ったそれが、花織の目を引いた。"
translation = "문득 가게 앞에 나열된 모니터에 비친 그것이 카오리의 눈길을 끌었다."

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「あれ？\u3000どしたの、カオリン？」"
translation = "「어라? 왜 그래, 카오린?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「こ、この子……」"
translation = "「이, 이 애……」"

[[dialogue]]
speaker_original = "ルカルカ"
speaker_translation = "루카루카"
original = "『キュー、キュー、キューッとおはドルフィン☆』"
translation = "『큐, 큐, 큐ー웃하고 오하 돌핀☆』"

[[dialogue]]
speaker_original = "ルカルカ"
speaker_translation = "루카루카"
original = "『お兄ちゃんお姉ちゃんたちの可愛い妹アイドル、汐ルカルカだよ♪\u3000今日の配信もいっぱい楽しんでいってね～♪』"
translation = "『오빠 언니들의 귀여운 여동생 아이돌, 시오 루카루카야♪ 오늘 방송도 많이 즐겨줘~♪』"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「かわいいっ！！！！！！！！」"
translation = "「귀여워!!!!!!!!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はぁ……ルカルカちゃん……おはどるふぃ～ん……今日もげんきでかわいいねぇ……<emoji=heart04>」"
translation = "「하아…… 루카루카짱…… 오하 돌핀…… 오늘도 활기차고 귀엽네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「花織さん、さっきからずっとこの調子なんですけど……」"
translation = "「카오리 씨, 아까부터 계속 이 상태인데요……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ものの見事にハマっちゃったみたいですね☆」"
translation = "「보기 좋게 빠져버린 모양이네요☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「も～、今日は『トレちぇり』目当てで出かけたのに！\u3000そこからはルカルカグッズを買い漁るカオリンに付き合わされっぱなしだったよ！」"
translation = "「정말~ 오늘은 『트레치에』 목적으로 나왔는데! 그때부터는 루카루카 굿즈를 싹쓸이하는 카오린에게 계속 끌려다녔다구!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「にゃははは♪\u3000グッズを買っても持って帰れないって言っても、聞く耳持たずって感じでね～」"
translation = "「냐하하하♪ 굿즈를 사도 못 가져간다고 말해도, 전혀 들으려 하지 않는 느낌이라서 말이야~」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「推しは推せる時に推せ、これが鉄則です！」"
translation = "「최애는 빨 수 있을 때 빨아라, 이것이 철칙입니다!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「そもそもこの『ルカルカ』って子は誰？\u3000何かのアニメのキャラ？」"
translation = "「애초에 이 『루카루카』라는 애는 누구야? 무슨 애니메이션 캐릭터?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ルカルカちゃんはＶチューバーさんですよ」"
translation = "「루카루카짱은 브이튜버예요」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「ぶいちゅーばー？」"
translation = "「브이튜버?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「アバターを用いて生放送などの配信活動を行っている人ですね～」"
translation = "「아바타를 이용해서 생방송 등의 전송 활동을 하고 있는 사람이에요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ルカルカちゃんは登録者数５０万人を超える、個人勢の中では特に人気のＶチューバーさんなんですよ」"
translation = "「루카루카짱은 구독자 수가 50만 명을 넘는, 개인세 중에서는 특히 인기 있는 브이튜버예요」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「へぇ～、そんなのがあるんだ！\u3000絵が動いてるのは、中の人が動かしてるってこと？」"
translation = "「헤~ 그런 게 있구나! 그림이 움직이는 건 안의 사람이 움직이고 있다는 거야?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「絵とか言うな！\u3000中の人などいない！」"
translation = "「그림이라니 하지 마! 안의 사람 같은 건 없어!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「ご、ごめん……」"
translation = "「미, 미안……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「これはだいぶガチってますね～」"
translation = "「이건 꽤 진심이네요~」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「魔法少女アニメに夢中になってる時のいろはすみたいになってるし～」"
translation = "「마법 소녀 애니메이션에 푹 빠져 있을 때의 이로하스처럼 됐고~」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「だってルカルカ、可愛いんだもん！\u3000可愛いだけじゃなくて面白いし、どんなことにも体当たりで向かっていって！」"
translation = "「그치만 루카루카, 귀여운걸! 귀여울 뿐만 아니라 재미있고, 어떤 일이든 몸을 던져서 부딪히고!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「すっごい頑張り屋さんだし、ファンサもすごいんだよ？\u3000こんなの応援するしかないじゃん！」"
translation = "「엄청 노력파인 데다 팬 서비스도 대단하다구? 이런 건 응원할 수밖에 없잖아!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「というわけで、これからＶチューバートレカの開封を行います！」"
translation = "「그런 의미로, 지금부터 브이튜버 트레카 개봉을 진행하겠습니다!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「狙うはルカルカちゃんのサイン入りＳＳＲカード！\u3000お願いっ、当たって！」"
translation = "「노리는 건 루카루카짱의 친필 사인 SSR 카드! 제발, 나와줘!」"

[[dialogue]]
speaker = "unk"
original = "１パック目を開封する。"
translation = "1팩째를 개봉한다."

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「どうどう？\u3000当たった？」"
translation = "「어때 어때? 나왔어?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「残念ながら……」"
translation = "「안타깝게도……」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「ヤカンマンにネコ大名……。なんか人間以外のアバターもいっぱいいるんだね～」"
translation = "「야칸맨에 네코 대명…… 왠지 인간 이외의 아바타도 잔뜩 있네~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ヤカンマンはゲームを全てヤマカンでプレイするスタイルの配信者です。ネコ大名は戦乱の時代から下剋上を志してタイムスリップしてきた猫という設定ですね」"
translation = "「야칸맨은 게임을 전부 어림짐작으로 플레이하는 스타일의 스트리머예요. 네코 대명은 전란의 시대에서 하극상을 지향하며 타임 슬립 해온 고양이라는 설정이죠」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トレジアンナさん、詳しいですね……」"
translation = "「트레지안나 씨, 박식하시네요……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いえいえ、ほんの嗜み程度です☆」"
translation = "「아니에요, 아주 조금 즐기는 정도입니다☆」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「お目当てのルカルカちゃんは当たらずか～」"
translation = "「목표인 루카루카짱은 안 나왔나~」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「まだまだ序の口だから！\u3000どんどん行くよ～っ！」"
translation = "「아직 시작일 뿐이니까! 계속 간다~앗!」"

[[dialogue]]
speaker = "unk"
original = "２パック目、３パック目……"
translation = "2팩째, 3팩째……"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「……当たんないね」"
translation = "「……안 나오네」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「カオリン、もしかしてくじ運悪い？」"
translation = "「카오린, 혹시 뽑기운 없어?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そんなことない！\u3000普通だよっ！」"
translation = "「그럴 리 없어! 평범하다구!」"

[[dialogue]]
speaker = "unk"
original = "４パック目、５パック目、６パック目……そしてついに、残されたパックは１つだけになった。"
translation = "4팩째, 5팩째, 6팩째…… 그리고 마침내 남겨진 팩은 단 하나가 되었다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ＳＳＲどころかＲのルカルカも出ないとは……」"
translation = "「SSR은커녕 R 루카루카도 안 나오다니……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「うぇ～～ん！\u3000ルカルカ～、出て来てよ～っ！」"
translation = "「으아앙! 루카루카~ 나와줘~엇!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そうです、今こそサチさんの出番では？」"
translation = "「맞아요, 지금이야말로 사치 씨가 나설 차례 아닌가요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ？\u3000私ですか？」"
translation = "「엣? 저요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「幸運体質のサチさんにかかればＳＳＲの１枚や２枚なんてことないですよね？\u3000なんてったって幸運の魔法少女ですから♪」"
translation = "「행운 체질인 사치 씨라면 SSR 한두 장쯤은 아무것도 아니죠? 뭐니 뭐니 해도 행운의 마법 소녀니까요♪」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「そうなの！？」"
translation = "「정말!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ええ、まあ……一応、そんな感じですけど」"
translation = "「에에, 뭐…… 일단 그런 느낌입니다만」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「出来れば自分でお迎えしたかったけど、背に腹は代えられないよね！\u3000サチちゃん、ウチの命運を託した！」"
translation = "「가능하면 직접 영접하고 싶었지만, 찬밥 더운밥 가릴 때가 아니지! 사치짱, 나의 운명을 맡길게!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「託されても引ける保証はないですよーっ！！」"
translation = "「맡겨져도 뽑는다는 보장은 없어요ー옷!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そもそも私がパックを引くならともかく、花織さんが引いたものを私が開けても意味ないんじゃ……」"
translation = "「애초에 제가 팩을 고른다면 몰라도, 카오리 씨가 고른 걸 제가 연다고 해서 의미가 있을지……」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "（自分で引いたらＳＳＲ当てられるんだ……幸運の魔法少女、おそるべし！）"
translation = "（직접 뽑으면 SSR을 맞힐 수 있구나…… 행운의 마법 소녀, 무시무시해!）"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「大丈夫、外しても恨みっこなし！\u3000どーせこの状況で神引きできる運命力なんて、ウチは持ち合わせてないから！」"
translation = "「괜찮아, 못 뽑아도 원망하기 없기! 어차피 이런 상황에서 갓뽑기를 할 수 있는 운명력 같은 건 나한테 없으니까!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「わ、わかりました……では、私が開封します……」"
translation = "「아, 알겠습니다…… 그럼 제가 개봉할게요……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ドキドキ……」"
translation = "「두근두근……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ、キラキラしてるカード、ありました……サインもあるみたいです──」"
translation = "「아, 반짝거리는 카드, 있어요…… 사인도 있는 것 같아요──」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ウソ！\u3000マジで当たり！？\u3000すごい、サチちゃん！\u3000ありがとうっ！！！！」"
translation = "「거짓말! 진짜 당첨!? 대단해, 사치짱! 고마워!!!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも、ルカルカちゃんじゃないみたいです。酒美タイゾウさんのサイン入りＳＳＲカードですね」"
translation = "「하지만 루카루카짱은 아닌 것 같아요. 사케미 타이조 씨의 사인 SSR 카드네요」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ぎゃーーーっ！！\u3000叫びたいのはこっちだっての！！」"
translation = "「갸아아아!! 소리 지르고 싶은 건 이쪽이라고!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あの～……」"
translation = "「저기~……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ、ルルカ先輩、こんにちは」"
translation = "「아, 루루카 선배, 안녕하세요」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「こんにちは～。盛り上がってたみたいだけど、何のお話をしてたのかな～？」"
translation = "「안녕~. 분위기가 달아오른 것 같은데, 무슨 이야기를 하고 있었니~?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「こちらの方は初めて流星市国にやってきたのですが、汐ルカルカさんというＶチューバーさんにハマってしまいまして」"
translation = "「이분은 처음으로 유성시국에 오셨는데, 시오 루카루카라는 V튜버분에게 빠져버리셔서요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「トレーディングカードで彼女を引き当てようとした結果、惨敗に終わってしまった、という感じです」"
translation = "「트레이딩 카드로 그녀를 뽑으려 시도한 결과, 참패로 끝나버렸다, 는 느낌입니다」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はぁ……せめてＲでいいから欲しかったな～……」"
translation = "「하아…… 적어도 R이라도 좋으니까 갖고 싶었어~……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっと～、Ｒでよければあたし、持ってるけど……いる？」"
translation = "「엣토~, R로 괜찮다면 나, 가지고 있는데…… 필요하니?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「実はあたしもルカルカの視聴者だから、同じファンのよしみで……はい、どうぞ」"
translation = "「실은 나도 루카루카의 시청자니까, 같은 팬끼리 정으로…… 자, 여기」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ありがとう！\u3000ええと、ルルカさん？」"
translation = "「고마워! 에또, 루루카 씨?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカだよ、よろしくね」"
translation = "「우미노베 루루카야, 잘 부탁해」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ルルカさん。ウチ、朝永花織って言います！\u3000ルカルカちゃんのことは今日初めて知ったんだけど、めっちゃいいよね！」"
translation = "「루루카 씨. 나, 아사나가 카오리라고 해요! 루카루카짱에 대해서는 오늘 처음 알았지만, 진짜 최고지!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あはは、なんか嬉しいな～。これからも応援よろしくお願いします」"
translation = "「아하하, 왠지 기쁘네~. 앞으로도 응원 잘 부탁해」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「もちろんだよ！\u3000って、あれ……？」"
translation = "「물론이지! 어라, 근데……?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「…………ルルカ……ルカルカ？」"
translation = "「…………루루카…… 루카루카?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うっ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「なんか声の感じも似てるような……でも、そんなことってあるの……？」"
translation = "「왠지 목소리 느낌도 닮은 것 같은데…… 하지만, 그런 일이 있을 수 있나……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、あのあのあの！\u3000花織さん、違いますよっ！\u3000名前も声も似てるかもしれませんが、ルカルカは……」"
translation = "「아, 저기저기저기! 카오리 씨, 아니에요! 이름이랑 목소리도 닮았을지 모르지만, 루카루카는……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あーーーっ！！！\u3000大丈夫です、それ以上は大丈夫ですからっ！！」"
translation = "「아아아!!! 괜찮아요, 그 이상은 괜찮으니까요!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「これからも同士として、ルカルカちゃんのこと応援していきましょうね！」"
translation = "「앞으로도 동지로서, 루카루카짱을 응원해 나가도록 해요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そ、そうだね……あはは……それじゃあたしはこれで……」"
translation = "「그, 그러게…… 아하하…… 그럼 난 이만……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「カードありがとう、宝物にするから！」"
translation = "「카드 고마워, 보물로 간직할게!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「……何だったの、今のやり取り？\u3000２人だけで分かり合ってる感じだったけど……」"
translation = "「……뭐였어, 방금 그 대화? 둘이서만 통하는 느낌이었는데……」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「サチちゃん……」"
translation = "「사치짱……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「は、はい」"
translation = "「네, 네」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ありがとーーーっ！！！\u3000サチちゃんの幸運、すごすぎるよーーーっ！！！！」"
translation = "「고마워ーーー!!! 사치짱의 행운, 너무 대단해ーーー!!!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ？\u3000えっ？\u3000えっ？？？」"
translation = "「엣? 엣? 엣???」"

[[dialogue]]
speaker = "unk"
original = "涙を流すほど感激している花織を尻目に、そこに集まった一同はその涙の意味するところを誰も理解できていないのだった。"
translation = "눈물을 흘릴 정도로 감격하고 있는 카오리를 뒤로하고, 그곳에 모인 일동은 그 눈물이 의미하는 바를 아무도 이해하지 못하고 있었다."

