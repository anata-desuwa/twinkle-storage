[[dialogue]]
speaker = "シャロン"
original = "「はぁああああああっっ！！」"
translation = "「하아아아아아아아아앗!!」"

[[dialogue]]
speaker = "イレーナ"
original = "「シャロン！」"
translation = "「샤론!」"

[[dialogue]]
speaker = "シャロン"
original = "「ええっ！\u3000私は右を、イレーナさまは左をですねっ！」"
translation = "「네! 저는 오른쪽을, 이레이나 님은 왼쪽을 부탁드려요!」"

[[dialogue]]
speaker = "unk"
original = "２人でバッタバッタ敵を……"
translation = "둘이서 몬스터들을 척척……"

[[dialogue]]
speaker = "イレーナ"
original = "「バカ。１人で前に出すぎよシャロン。張り切りすぎてまた貧血を起こしても知らないわよ」"
translation = "「바보. 혼자 너무 앞으로 나가지 마 샤론. 너무 기운 넘치게 굴다가 또 빈혈 일으켜도 난 모른다.」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまを信じておりますので。たとえ私が倒れても、いえ倒れる前に支えてくださるでしょうから」"
translation = "「이레이나 님을 믿고 있으니까요. 설령 제가 쓰러져도, 아니 쓰러지기 전에 지탱해 주실 테니까요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ～？\u3000あたし頼みってこと？\u3000ったく、こっちの身にも──なれっての！」"
translation = "「하아~? 나한테 의지하겠다는 거야? 나 원 참, 내 입장도 좀── 돼보라고!」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ。相変わらずお口は悪いのに、なんと温かなお力なのでしょうか。イレーナさまのお優しさが垣間見えますね」"
translation = "「후후. 여전히 말투는 험하시면서, 어쩌면 이렇게 따뜻한 힘인 걸까요. 이레이나 님의 다정함이 엿보이네요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ただ普通に力を使ってるだけよっ……！\u3000あたしに手間かけさせた分は働いてもらうから！」"
translation = "「그냥 평범하게 힘을 쓰고 있는 것뿐이야……! 나를 수고스럽게 한 만큼 일하게 만들 거니까!」"

[[dialogue]]
speaker = "シャロン"
original = "「くすくす。承知いたしました」"
translation = "「킥킥. 알겠습니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「てかそのカッコどうにかなんないの？\u3000あたしとちょっと被ってんじゃない」"
translation = "「그보다 그 복장 어떻게 안 돼? 나랑 좀 겹치잖아.」"

[[dialogue]]
speaker = "シャロン"
original = "「サンタクロースといえば子どもの守人として有名ですので。我々にもそう在れと女神様が仰っておられるのですよ」"
translation = "「산타클로스라고 하면 아이들의 수호자로 유명하니까요. 저희에게도 그렇게 있으라고 여신님께서 말씀하시는 거예요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「だからあたしまで巻き込まないでってば。あたしは自分でやったのよ」"
translation = "「그러니까 나까지 끌어들이지 말라니까. 난 내가 직접 한 거야.」"

[[dialogue]]
speaker = "シャロン"
original = "「だとしたら色使いを再考なされた方がいいのではないでしょうか。聖女というには色合いが……」"
translation = "「그렇다면 색상을 다시 고려해보시는 게 좋지 않을까요. 성녀라고 하기엔 색감이……」"

[[dialogue]]
speaker = "イレーナ"
original = "「これはどうしようもなかったのっ。何度も調整したけど、なぜか黒以外の色になってくれなくて……！」"
translation = "「이건 어쩔 수 없었단 말이야. 몇 번이나 조정했지만, 왠지 검은색 이외의 색이 되어주질 않아서……!」"

[[dialogue]]
speaker = "シャロン"
original = "「それこそ女神様がイレーナさまのお側にいる証ではありませんか！\u3000きっとお言葉遣いに品がないと<ruby>窘<rt>たしな</rt></ruby>めておられるのですよ！」"
translation = "「그것이야말로 여신님께서 이레이나 님 곁에 계신다는 증거가 아니겠습니까! 분명 말투에 품위가 없다고 타이르시는 걸 거예요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「だからなんでもかんでも女神に繋げるなっての！\u3000そういうとこが気に入らないって言ってんでしょうに！」"
translation = "「그러니까 뭐든 다 여신이랑 연결하지 말라니까! 그런 점이 마음에 안 든다고 말했잖아!」"

[[dialogue]]
speaker = "unk"
original = "それにしても２人とも──"
translation = "그건 그렇고 둘 다──"

[[dialogue]]
speaker = "イレーナ"
original = "「……ちょっと。なにジロジロ見てんのよ？\u3000一応戦闘中よ、戦闘中」"
translation = "「……저기. 뭘 빤히 쳐다보는 거야? 일단 전투 중이라고, 전투 중.」"

[[dialogue]]
speaker = "シャロン"
original = "「はて……。私どもの装束に何かおかしなところがありますでしょうか？」"
translation = "「어머나……. 저희 복장에 어디 이상한 곳이라도 있나요?」"

[[dialogue]]
speaker = "unk"
original = "普段以上に際どいなと……"
translation = "평소 이상으로 아슬아슬하구나 싶어서……"

[[dialogue]]
speaker = "イレーナ"
original = "「なっ……！？\u3000だからどこ見てんのよ、このエロ会長！」"
translation = "「나앗……!? 그러니까 어딜 보는 거야, 이 에로 회장!」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ。流石は女神様です。武器に合わせていつも以上に動きやすい召し物を授けてくださいました」"
translation = "「후후. 역시 여신님이십니다. 무기에 맞춰서 평소보다 더 움직이기 편한 옷을 내려주셨어요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「えっ、あんたそう思ってんの？\u3000やっぱズレてるわ……」"
translation = "「엣, 너 그렇게 생각하는 거야? 역시 감각이 어긋나 있네……」"

[[dialogue]]
speaker = "unk"
original = "よし、早くモンスターを倒して戻ろう！"
translation = "좋아, 빨리 몬스터를 쓰러뜨리고 돌아가자!"

[[dialogue]]
speaker = "シャロン"
original = "「はい！\u3000パーティーの準備もまだまだ残っていますので！」"
translation = "「네! 파티 준비도 아직 많이 남아 있으니까요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんた、早く戻ってあたしたちをじっくり眺めたいだけなんじゃないでしょうね？\u3000モンスターより先にこの男を退治するべきなんじゃないかしら……」"
translation = "「당신, 빨리 돌아가서 우리를 느긋하게 감상하고 싶을 뿐인 거 아니야? 몬스터보다 먼저 이 남자를 퇴치해야 하는 게 아닐까……」"

[[dialogue]]
speaker = "シャロン"
original = "「！\u3000現れました、イレーナさま！」"
translation = "「! 나타났습니다, 이레이나 님!」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ……。直前にアホな話してたせいで緊張感も何もないわね」"
translation = "「하아……. 직전에 바보 같은 대화를 한 탓에 긴장감도 뭣도 없네.」"

[[dialogue]]
speaker = "イレーナ"
original = "「つーかモンスターまでふざけた見た目してるわ……さっさとぶっ飛ばしましょ」"
translation = "「그보다 몬스터까지 장난스러운 모습이나 하고 있고…… 얼른 날려버리자.」"

[[dialogue]]
speaker = "シャロン"
original = "「そうですね。私とイレーナさまが力を合わせれば、この程度のモンスターなど問題ではありません」"
translation = "「그러네요. 저와 이레이나 님이 힘을 합치면 이 정도 몬스터 따위는 문제가 아닙니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「さぁ行くわよ、シャロン！\u3000この不届き者にキツーイお仕置きをプレゼントしてあげなくちゃ！」"
translation = "「자, 가자, 샤론! 이 무례한 녀석에게 아주 따~끔한 벌을 선물해 줘야지!」"

[[dialogue]]
speaker = "シャロン"
original = "「ええ、背中はお任せしました、イレーナさま！」"
translation = "「네, 등 뒤는 맡겨주세요, 이레이나 님!」"

[[dialogue]]
speaker = "unk"
original = "（なんだかんだで仲いいなぁ……）"
translation = "（이래저래 사이가 좋네……）"

[[dialogue]]
speaker = "イレーナ"
original = "「こら、そこ！\u3000あんたもニヤニヤしてないでとっとと構えなさい！」"
translation = "「이봐, 거기! 당신도 싱글벙글 웃지 말고 어서 무기나 잡아!」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまも援護をお願いいたします！\u3000前衛は私が務めますから！」"
translation = "「회장님도 원호를 부탁드립니다! 전위는 제가 맡을 테니까요!」"

[[dialogue]]
speaker = "unk"
original = "ああ！"
translation = "그래!"

