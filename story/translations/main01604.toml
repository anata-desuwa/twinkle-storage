[[dialogue]]
speaker = "unk"
original = "第５話,星見の長女、その使命,B"
translation = "제5화, 별을 보는 장녀, 그 사명, B"

[[dialogue]]
speaker = "unk"
original = "フィオナと敵対することに、一瞬の躊躇いを見せるアポロ。"
translation = "피오나와 적대하는 것에, 일순간의 주저함을 보이는 아폴로."

[[dialogue]]
speaker = "unk"
original = "フィオナは俺と同じ魔王の系譜。だが、決して平行世界の根源ではない。"
translation = "피오나는 나와 같은 마왕의 계보. 하지만, 결코 평행 세계의 근원은 아니다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そ……そうだ。ソイツだって……オマエの仲間には違いないだろう！」"
translation = "「그…… 그렇다. 그 녀석도…… 너의 동료임에는 틀림없겠지!」"

[[dialogue]]
speaker = "unk"
original = "アポロは苦々しげにフィオナを見つめる。"
translation = "아폴로는 씁쓸한 듯 피오나를 바라본다."

[[dialogue]]
speaker = "unk"
original = "彼女の中にもまだ、葛藤が残っているようだった。"
translation = "그녀 안에도 아직, 갈등이 남아있는 듯했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ふう」"
translation = "「……후우」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「無理しなくていいんですよ、姉さん」"
translation = "「무리하지 않으셔도 돼요, 언니」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "そしてフィオナは──何もかも包み込むように、優しく笑った。"
translation = "그리고 피오나는── 모든 것을 감싸 안듯이, 상냥하게 웃었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「『使徒』としてのあなたの志は──十分に理解しました」"
translation = "「『사도』로서의 당신의 뜻은── 충분히 이해했습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──けれど。それはあくまで、仮面があなたに貼りつけたペルソナでしかないはずです」"
translation = "「──하지만. 그것은 어디까지나, 가면이 당신에게 붙인 페르소나일 뿐일 겁니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「本当の、優しかった姉さんなら、今のあなたの行為を望んだはずがない」"
translation = "「진정한, 상냥했던 언니라면, 지금의 당신의 행위를 바라지 않았을 거예요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……思い上がるな！」"
translation = "「……건방지게 굴지 마!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしを人間だと思ってるのか？\u3000勝てると思ってるのか？\u3000話せば通じると思ってるのか？」"
translation = "「나를 인간이라고 생각하는 건가? 이길 수 있다고 생각하는 건가? 이야기하면 통할 거라고 생각하는 건가?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「見ただろ！\u3000あたしは何度だって強くなる。人間じゃない。オマエ達なんかに勝てる相手じゃないんだ！」"
translation = "「봤잖아! 나는 몇 번이고 강해진다. 인간이 아니야. 너희들 따위에게 이길 수 있는 상대가 아니라고!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「思い上がってなどいません。私が硬く信じているのは、私と姉さんの絆です」"
translation = "「건방지게 굴고 있지 않습니다. 제가 굳게 믿고 있는 것은, 저와 언니의 유대입니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なんだと……？」"
translation = "「뭐라고……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かに……俺たちじゃ、無限に再創生を続けられる君には勝てないかもしれない」"
translation = "「확실히…… 우리들로는, 무한히 재창생을 계속할 수 있는 너를 이길 수 없을지도 몰라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど──君自身が殻を破ることは、できるはずだ」"
translation = "「하지만── 너 자신이 껍질을 깨는 것은, 가능할 거야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……っ！」"
translation = "「……윽!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ、そうです。姉さん──あなた自身なら、打ち勝てるはずなんです。リクリエの使徒に！」"
translation = "「네, 그렇습니다. 언니── 당신 자신이라면, 이겨낼 수 있을 겁니다. 리크리에의 사도를!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしが──あたしに、だと……？」"
translation = "「내가── 나를, 말인가……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あんたにもし、お姉さんとしての心が残ってるなら──」"
translation = "「언니에게 만약, 언니로서의 마음이 남아 있다면──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「現状、一番ワンチャンあるよね」"
translation = "「현실적으로, 가장 일말의 가능성이 있지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい！\u3000わたしのような者の言葉は、届かないかもしれませんが……！」"
translation = "「네! 저 같은 사람의 말은, 닿지 않을지도 모르겠지만……!」"

[[dialogue]]
speaker = "unk"
original = "無理でも──内からなら。"
translation = "무리하더라도── 내부에서라면."

[[dialogue]]
speaker = "unk"
original = "あの強固な仮面の外殻を、打ち崩せるかも知れない。俺たちはみんなそう信じている。"
translation = "저 강고한 가면의 외피를, 부술 수 있을지도 모른다. 우리들은 모두 그렇게 믿고 있다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……フ」"
translation = "「……후」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「姉としての心……か」"
translation = "「언니로서의 마음……인가」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「確かに……いくつか、思い出せる断片はある。ギエルにもそう語った」"
translation = "「확실히…… 몇 가지, 떠올릴 수 있는 단편은 있다. 기엘에게도 그렇게 말했다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「姉妹で一緒に寝たり、ごっこ遊びをしたりな。懐かしいなんて気持ちもある」"
translation = "「자매끼리 함께 자거나, 소꿉놀이를 하거나 말이지. 그립다는 기분도 있다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なら……！」"
translation = "「그렇다면……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──だけど。今のあたしは、アポロなんだ」"
translation = "「──하지만. 지금의 나는, 아폴로다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「今さら……星見という人間には、もう戻れない。あたしはもう、この世界に影響を及ぼしすぎた」"
translation = "「이제 와서…… 호시미라는 인간으로는, 더 이상 돌아갈 수 없다. 나는 이미, 이 세계에 너무 많은 영향을 미쳤다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──姉、さん……」"
translation = "「──언, 니……」"

[[dialogue]]
speaker = "unk"
original = "アポロは──ふっと儚げに笑った。"
translation = "아폴로는── 픽 하고 덧없이 웃었다."

[[dialogue]]
speaker = "unk"
original = "そこにはどこか、諦めが滲んでいるようで……"
translation = "그곳에는 어딘가, 포기가 스며 있는 듯하여……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……いいだろう。昔話をしてやる。どうせ終わる、ごみ箱みたいな世界に捨て去っていくにはちょうどいい」"
translation = "「……좋다. 옛날이야기를 해주지. 어차피 끝날, 쓰레기통 같은 세계에 버리고 가기에는 딱 좋다」"

[[dialogue]]
speaker = "unk"
original = "それから、とつとつと過去を語り始めた──"
translation = "그리고, 조용히 과거를 이야기하기 시작했다──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──星見の家には定めがあった」"
translation = "「──호시미 가문에는 정해진 운명이 있었다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「『月の壁画』が伝わる星見家において、来たるリクリエの再来においては『魔王』を輩出すること──と」"
translation = "「『달의 벽화』가 전해지는 호시미 가문에서, 다가올 리크리에의 재림에는 『마왕』을 배출할 것──이라고」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そして、その使命は双子の長女に委ねられた」"
translation = "「그리고, 그 사명은 쌍둥이 중 장녀에게 위임되었다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「双子の姉妹はよく２人で遊んだものだった。離れていた時の記憶さえ、思い当たらぬほどだ」"
translation = "「쌍둥이 자매는 둘이서 자주 놀곤 했다. 떨어져 있던 때의 기억조차, 떠오르지 않을 정도다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だが……長女には魔王となる使命がある。やがて、妹に構っている暇はなくなっていった」"
translation = "「하지만…… 장녀에게는 마왕이 될 사명이 있다. 이윽고, 여동생에게 신경 쓸 틈은 없어졌다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……あの頃……」"
translation = "「……그 시절……」"

[[dialogue]]
speaker = "unk"
original = "フィオナは唇を噛み締めていた。"
translation = "피오나는 입술을 깨물고 있었다."

[[dialogue]]
speaker = "unk"
original = "記憶のなかに、思い当たる節がいくつもあるのだろう。"
translation = "기억 속에, 떠오르는 부분이 여럿 있는 것이리라."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「星見の長女は早くより星とのリンクに成功していた。星騎士としてみれば、逸材と言ってよかったろう」"
translation = "「호시미 가문의 장녀는 일찍부터 별과의 링크에 성공했다. 성기사로서 보자면, 인재라고 해도 좋았을 것이다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そして本人もたゆまぬ鍛錬を続けていた。すでに一騎当千の実力は備えていたと言っていい」"
translation = "「그리고 본인도 끊임없는 단련을 계속했다. 이미 일기당천의 실력은 갖추고 있었다고 해도 좋다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だが……それでも、星見の長女は苦悩していた。魔王に求められる資質は、並大抵のものではなかったからだ」"
translation = "「하지만…… 그럼에도, 호시미 가문의 장녀는 고뇌하고 있었다. 마왕에게 요구되는 자질은, 보통의 것이 아니었기 때문이다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「世俗の人間がリクリエの脅威を正確に理解していたとは言い難い。３０００年前の厄災など、ほとんどが抽象的にしか語られてこなかった」"
translation = "「세속의 인간이 리크리에의 위협을 정확하게 이해하고 있었다고 말하기는 어렵다. 3000년 전의 재앙 따위는, 대부분이 추상적으로만 이야기되어 왔다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だが星見の長女は違った。より詳細で、鮮明で、かつ抗わねばならない世界の危機をずっと聞かされてきたからこそ、重圧に耐えきれなかった」"
translation = "「하지만 호시미 가문의 장녀는 달랐다. 더욱 상세하고, 선명하며, 게다가 맞서 싸워야 할 세계의 위기를 계속 들어왔기 때문에, 중압감을 견디지 못했다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「学園の偉そうな連中がわざわざ成長具合を確かめにきたりな。当然、妹と遊んでいる場合などではなくなった」"
translation = "「학원의 거만한 녀석들이 일부러 성장 정도를 확인하러 오기도 했지. 당연히, 여동생과 놀고 있을 때가 아니게 되었다」"

[[dialogue]]
speaker = "unk"
original = "アポロ──人間だった頃のアポロ──は、絶えずプレッシャーに押し潰されそうになっていたという。"
translation = "아폴로── 인간이었을 적의 아폴로──는, 끊임없이 압박감에 짓눌릴 것만 같았다고 한다."

[[dialogue]]
speaker = "unk"
original = "そして、運命の歯車が致命的に違えてしまったのは、その後で。"
translation = "그리고, 운명의 톱니바퀴가 치명적으로 어긋나 버린 것은, 그 후였다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そして──星見の長女は何度目かの誕生日を迎えた。それは、正式な『フィオナ』の襲名日だった」"
translation = "「그리고── 호시미 가문의 장녀는 몇 번째인가의 생일을 맞이했다. 그것은, 정식적인 『피오나』의 습명일이었다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……っ……」"
translation = "「……윽……」"

[[dialogue]]
speaker = "unk"
original = "隣のフィオナが息を呑んだ。それだけで、続く結末がわかった気がした。"
translation = "옆의 피오나가 숨을 삼켰다. 그것만으로, 이어질 결말을 알 것 같았다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「その日を境に──星見の長女は長い眠りについた」"
translation = "「그날을 기점으로── 호시미 가문의 장녀는 긴 잠에 빠졌다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どうして？\u3000さあ。だが、糸が切れてしまったんだろう」"
translation = "「왜냐고? 글쎄. 하지만, 실이 끊어져 버렸겠지」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「逃げたかったのだ。奴は。世界を救うまで終わらない、魔王という使命から」"
translation = "「도망치고 싶었던 것이다. 그 녀석은. 세계를 구할 때까지 끝나지 않는, 마왕이라는 사명으로부터」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そして星見の長女は混沌の瘴気に包まれ、以来、二度と目覚めることはなかった……」"
translation = "「그리고 호시미 가문의 장녀는 혼돈의 장기에 휩싸여, 이후, 두 번 다시 눈을 뜨지 못했다……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そして、代わりに──奴の<ruby>魂魄<rt>こんぱく</rt></ruby>を引き継いだ『使徒』が平行世界をまたいでやってきた」"
translation = "「그리고, 대신에── 그 녀석의 혼백을 이어받은 『사도』가 평행 세계를 넘어 찾아왔다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「デネブの世界は片付いた。残るアルタイルさえ刷新できれば、今代のリクリエは完遂する」"
translation = "「데네브의 세계는 정리되었다. 남은 알타이르만 쇄신할 수 있다면, 이번 대의 리크리에는 완수된다」"

[[dialogue]]
speaker = "unk"
original = "それが今、目の前にいるアポロ。仮面を被ったリクリエの使徒。"
translation = "그것이 지금, 눈앞에 있는 아폴로. 가면을 쓴 리크리에의 사도."

[[dialogue]]
speaker = "unk"
original = "本体が目覚めなくなったことといい、彼女の使命は常に『アルタイルの魔王を倒す』ことに帰結している。"
translation = "본체가 깨어나지 않게 된 것과 마찬가지로, 그녀의 사명은 항상 『알타이르의 마왕을 쓰러뜨리는 것』으로 귀결되고 있다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「……フィオナ。今のって……」"
translation = "「……피오나. 방금 그건……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ええ。事実です。私の知っている姉さんのまま」"
translation = "「……네. 사실입니다. 제가 알고 있는 언니 그대로」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「『リクリエの使徒』というのはな。誰にでもなれるものじゃないんだ」"
translation = "「『리크리에의 사도』라는 건 말이지. 아무나 될 수 있는 게 아니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「強くなきゃいけない。ヒーローのように。後はそう、使命感も必要だ。やるべきことをなすんだからな。真面目で努力家なのがいい」"
translation = "「강해야 한다. 히어로처럼. 그리고 그래, 사명감도 필요하다. 해야 할 일을 해내는 거니까. 성실하고 노력가인 것이 좋다」"

[[dialogue]]
speaker = "unk"
original = "あまりに残酷な基準だった。"
translation = "너무나도 잔혹한 기준이었다."

[[dialogue]]
speaker = "unk"
original = "生来、強い責任感を抱いてしまったばかりに、アポロは都合よく仮面に取り込まれた。"
translation = "선천적으로 강한 책임감을 품어 버린 탓에, 아폴로는 편리하게 가면에게 흡수되었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（なら──その資質ってのを満たしていたのは恐らく、学園長の奥さんも……）"
translation = "（그렇다면── 그 자질이라는 것을 충족했던 것은 아마도, 학원장의 부인도……）"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「宇宙が三つに分かたれているとはいえ──個々人に宿る魂、あいでんてぃてぃというものは共通だ」"
translation = "「우주가 세 개로 나뉘어 있다고는 해도── 개개인에게 깃든 혼, 아이덴티티라는 것은 공통이다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「星見の長女は魂レベルでリクリエに同調した。そうでなきゃ使徒になんかなれない」"
translation = "「호시미 가문의 장녀는 혼 레벨에서 리크리에에 동조했다. 그렇지 않으면 사도 따위가 될 수 없다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「わかるか？\u3000星見の長女の<ruby>精神<rt>ココロ</rt></ruby>が望んだんだよ。この世界は完璧じゃない──よりよく正されなくちゃならないんだ、って」"
translation = "「알겠나? 호시미 가문의 장녀의 정신이 바란 것이다. 이 세계는 완벽하지 않다── 더 좋게 바로잡아져야 한다, 라고」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だから、今さら、オマエの言う『姉さん』なんかに、戻っていいわけないだろう……！」"
translation = "「그러니, 이제 와서, 네가 말하는 『언니』 따위로, 돌아가도 될 리가 없잖아……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぁっ……」"
translation = "「앗……」"

[[dialogue]]
speaker = "unk"
original = "アポロは<ruby>自棄<rt>やけ</rt></ruby>で己を曲げないわけじゃなかった。"
translation = "아폴로는 자포자기로 자신을 굽히는 것이 아니었다."

[[dialogue]]
speaker = "unk"
original = "彼女は自分が世界にもたらした影響も、悪事も、すべてを理解していて……"
translation = "그녀는 자신이 세계에 가져온 영향도, 악행도, 모든 것을 이해하고 있으며……"

[[dialogue]]
speaker = "unk"
original = "己の正しいルーツを自覚しつつも、仮面による使徒としての支配を受け入れている──いや、受け入れざるをえなくなっている。"
translation = "자신의 올바른 근원을 자각하면서도, 가면으로 인한 사도로서의 지배를 받아들이고 있다── 아니, 받아들일 수밖에 없게 되었다."

[[dialogue]]
speaker = "unk"
original = "元の人格が強い使命感を抱いていたからこそ──彼女はアポロを<b>降りられない</b>んだ。"
translation = "원래의 인격이 강한 사명감을 품고 있었기 때문에── 그녀는 아폴로를 <ruby>그만둘 수 없는<rt>・・・ ・ ・・</rt></ruby> 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（頑固さは……姉妹譲り、だな）"
translation = "（고집은…… 자매가 똑같군）"

[[dialogue]]
speaker = "unk"
original = "アポロの表情が悲しげに見えたのもきっと、気のせいなんかじゃなくて。"
translation = "아폴로의 표정이 슬프게 보였던 것도 분명, 기분 탓이 아니었을 것이다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんか……むかつくな」"
translation = "「왠지…… 짜증 나네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。心が折れたりすることくらい、誰だって一度はあるものね」"
translation = "「네. 마음이 꺾이거나 하는 일 정도는, 누구에게나 한 번은 있는 법이니까요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そこにつけ込もうというリクリエも、仮面も最低です」"
translation = "「거기에 파고들려는 리크리에도, 가면도 최악입니다」"

[[dialogue]]
speaker = "unk"
original = "世界規模の厄災に抗う『魔王』になるか──"
translation = "세계 규모의 재앙에 맞서는 『마왕』이 될 것인가──"

[[dialogue]]
speaker = "unk"
original = "それとも世界規模の厄災を従える『英雄』になるか──"
translation = "아니면 세계 규모의 재앙을 복종시키는 『영웅』이 될 것인가──"

[[dialogue]]
speaker = "unk"
original = "彼女には最初から、その両極端な２つの道しか残されていなかった。"
translation = "그녀에게는 처음부터, 그 양극단의 두 가지 길밖에 남아 있지 않았다."

[[dialogue]]
speaker = "unk"
original = "類まれなる血統と資質がゆえの……悲劇だ。"
translation = "유례없는 혈통과 자질 때문에…… 비극이다."

