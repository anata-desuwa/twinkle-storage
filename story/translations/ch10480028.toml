[[dialogue]]
speaker = "unk"
original = "恋人としての仲も大分深まってきたある休日。俺とマムはリゾート結界のプライベートビーチで、束の間のデートを楽しんでいたのだが――"
translation = "연인으로서의 사이도 상당히 깊어진 어느 휴일. 나와 마무는 리조트 결계의 프라이빗 비치에서 잠시 동안의 데이트를 즐기고 있었는데――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……ちゅっ……<emoji=heart04>」"
translation = "「음…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はマムを抱き寄せて、キスを交わす。"
translation = "나는 마무를 끌어안고 키스를 나눈다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅっ……ちゅぷっ、れろちゅっ<emoji=heart04>\u3000んむっ……ちゅっ、ちゅれるっ<emoji=heart04>」"
translation = "「쪽…… 쮸웁, 레로쥬릅<emoji=heart04> 음무…… 쪽, 츄르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅぱっ、ぷはぁ……<emoji=heart04>\u3000ふぅ……全く、昼間からこんなに大きくして……<emoji=heart04>」"
translation = "「쪽, 푸하아……<emoji=heart04> 후우…… 정말이지, 대낮부터 이렇게 크게 만들고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムは俺の海パンをそっと撫でながら言った。"
translation = "마무는 내 수영복 위를 살며시 쓰다듬으며 말했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは、マムが挑発してくるから……」"
translation = "「그건 마무가 도발하니까……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「何を言ってるの。キスしたそうな顔をしてたから、誘ってあげたのよ」"
translation = "「무슨 소릴 하는 거야. 키스하고 싶은 얼굴을 하고 있길래, 유혹해 준 거잖아」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「って、あんっ……<emoji=heart04>\u3000手がやらしいわよ。どこを触っているの？」"
translation = "「앗, 앙……<emoji=heart04> 손이 야해. 어딜 만지는 거야?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やれやれ……仕方のない子ね<emoji=heart04>\u3000このままじゃ、収まりつかないでしょうし……」"
translation = "「이런이런…… 어쩔 수 없는 아이네<emoji=heart04> 이대로는 진정되지 않을 테고……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そこの木陰で……してあげるわ<emoji=heart04>」"
translation = "「저기 나무 그늘에서…… 해 줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元で甘く囁くマム。堪らない誘惑だが――"
translation = "귓가에 달콤하게 속삭이는 마무. 참을 수 없는 유혹이지만――"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「たまには……俺も彼氏として、男らしいところを見せないとね」"
translation = "「가끔은…… 나도 남자친구로서, 남자다운 모습을 보여줘야지」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「え？\u3000きゃっ……！？」"
translation = "「에? 꺄악……!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「こ、こら、何してるの……！？」"
translation = "「이, 이봐, 뭐 하는 거야……!?」"

[[dialogue]]
speaker = "unk"
original = "俺はマムの体を持ち上げると――"
translation = "나는 마무의 몸을 들어 올렸고――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ま、まさかこの体勢でする気……！？」"
translation = "「설, 설마 이 자세로 할 생각……!?」"

[[dialogue]]
speaker = "unk"
original = "そう、いわゆる駅弁スタイルだ。"
translation = "그래, 이른바 에키벤 스타일이다."

[[dialogue]]
speaker = "unk"
original = "マムは他の女の子より小柄だから、前からこうやってしてみたかったのだ。それと――"
translation = "마무는 다른 여자애들보다 몸집이 작아서, 전부터 이렇게 해보고 싶었다. 그리고――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――引力操作を使って、私の体重を軽くする……？」"
translation = "「――인력 조작을 써서, 내 체중을 가볍게 하라고……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうすれば、この体勢でも無理なくエッチできるかなって」"
translation = "「그러면 이 자세로도 무리 없이 에치할 수 있을 것 같아서」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もう、そんなことに私の能力を使おうだなんて……」"
translation = "「정말이지, 그런 일에 내 능력을 쓰려고 하다니……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ダメかな？」"
translation = "「……안 될까?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……全く、仕方ないわね。でも、その代わり――」"
translation = "「……정말, 어쩔 수 없네. 하지만 그 대신――」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺の鎖骨を撫でながら、囁く。"
translation = "그녀는 내 쇄골을 어루만지며 속삭인다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゃんと男らしいところを、見せるのよ……<emoji=heart04>」"
translation = "「제대로 남자다운 모습을 보여줘야 해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イエス・マム」"
translation = "「예스 마무」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、彼女の首筋にキスをしていく。"
translation = "나는 고개를 끄덕이고, 그녀의 목덜미에 키스를 해 나간다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000あっ……こら、あんまり強くしちゃダメよ。キスマークが残ったら、貴方とエッチしたって、寮生の子たちにバレちゃうじゃない……<emoji=heart04>」"
translation = "「응<emoji=heart04> 앗…… 이봐, 너무 강하게 하면 안 돼. 키스 마크가 남으면, 너랑 에치했다고 기숙사생 아이들에게 들켜버리잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――想像したら興奮する？\u3000んっ<emoji=heart04>\u3000スケベ……<emoji=heart04>」"
translation = "「――상상하니까 흥분돼? 응<emoji=heart04> 변태……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どうしても付けたいのなら、服に隠れる場所にしなさい……あんっ<emoji=heart04>」"
translation = "「정 남기고 싶다면, 옷에 가려지는 곳에 해…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お許しがもらえたので、鎖骨よりも下の辺りに強くキスをする。"
translation = "허락을 받았기에, 쇄골보다 아래쪽에 강하게 키스한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000やったわね……だったら、私もお返しよ……んっ、ちゅうぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 해버렸네…… 그렇다면 나도 답례야…… 응, 츄우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅぱぁっ……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000ほら、同じところにくっきりと、付けてあげたわよ……<emoji=heart04>」"
translation = "「츄파앗……<emoji=heart04> 하아아<emoji=heart04> 자, 똑같은 곳에 선명하게 남겨줬어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムは艶やかな笑みを浮かべて――"
translation = "마무는 요염한 미소를 지으며――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふ……これでお揃いね<emoji=heart04>」"
translation = "「후후…… 이걸로 세트네<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム……！」"
translation = "「마무……!」"

[[dialogue]]
speaker = "unk"
original = "俺は興奮に任せて、マムのお尻を鷲掴みにする。"
translation = "나는 흥분에 몸을 맡기고, 마무의 엉덩이를 움켜쥔다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あんっ……<emoji=heart04>」"
translation = "「앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから彼女の綺麗な髪に鼻を埋めて、大きく息を吸う。"
translation = "그러고는 그녀의 고운 머리카락에 코를 묻고, 크게 숨을 들이마신다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「こ、こら……<emoji=heart04>\u3000熱くて少し汗かいてるから、そんなに匂いを嗅いじゃダメよ……<emoji=heart04>」"
translation = "「이, 이봐……<emoji=heart04> 더워서 땀이 좀 났으니까, 그렇게 냄새 맡으면 안 돼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫。マム、いい匂いだから……」"
translation = "「괜찮아. 마무, 좋은 냄새 나니까……」"

[[dialogue]]
speaker = "unk"
original = "汗をかいてることで濃くなった、好きな女の子の匂い。その甘い蜜のようなフェロモンに誘われて、俺の興奮はますます高まっていく。"
translation = "땀을 흘려 진해진, 좋아하는 여자애의 냄새. 그 달콤한 꿀 같은 페로몬에 이끌려, 나의 흥분은 점점 고조되어 간다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ……<emoji=heart04>\u3000お尻の揉み方、いやらしい……んんっ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 엉덩이 주무르는 법, 야해…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マムって、いいお尻してるよね」"
translation = "「마무는 엉덩이가 참 예쁘네」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……<emoji=heart04>\u3000何を言ってるのよ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 무슨 소릴 하는 거야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「小柄なのにむちっとしてて……すごくエッチだ」"
translation = "「아담한데도 쫀득해서…… 정말 에치해」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん……バカ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁ、んんっ……<emoji=heart04>」"
translation = "「응…… 바보<emoji=heart04> 앗…… 앙<emoji=heart04> 하아아, 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ああぁっ……<emoji=heart04>\u3000大きくなったチ○ポ、あそこに当たってる……んあぁっ<emoji=heart04>」"
translation = "「아아앗……<emoji=heart04> 커진 자지, 거기에 닿고 있어…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おま○こ、もうぐちょぐちょになってる。……マムも興奮してる？」"
translation = "「보지, 벌써 축축해졌어. ……마무도 흥분했어?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000竜は性欲が強いって、教えたでしょうっ<emoji=heart04>\u3000……エッチなことを始めたら、こうなるに決まってるのっ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 용은 성욕이 강하다고 가르쳐줬잖아<emoji=heart04> ……에치한 짓을 시작하면 이렇게 되는 게 당연하단 말이야<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あぁんっ……<emoji=heart04>\u3000熱くて固いチ○ポ、クリに擦れて……ふあぁっ<emoji=heart04>」"
translation = "「아앙……<emoji=heart04> 뜨겁고 딱딱한 자지, 클리에 스쳐서…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁ<emoji=heart04>\u3000相変わらず大きくて、ドラゴンおま○こ疼いちゃう……<emoji=heart04>\u3000んっ、ふうぅ……ふあぁっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 여전히 커서 드래곤 보지가 욱신거려……<emoji=heart04> 응, 후우…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム……もう、挿れてもいい？」"
translation = "「마무…… 이제 넣어도 돼?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん<emoji=heart04>\u3000いいわよ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私も、興奮して、堪らなくなってきた、からぁ……<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「나도 흥분해서 참을 수 없게 됐으니까……<emoji=heart04> 후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ<emoji=heart04>\u3000チ○ポの先……おま○こに当たってぇ<emoji=heart04>\u3000んんんぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 자지 끝이…… 보지에 닿아서어<emoji=heart04> 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あぁぁっ<emoji=heart04>\u3000入ってくるっ……<emoji=heart04>\u3000は、ああぁぁぁっ……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 들어온다……<emoji=heart04> 하, 아아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふあぁぁぁんっ……<emoji=heart04><emoji=heart04>\u3000入っ、たぁっ<emoji=heart04>\u3000……はふぅぅん<emoji=heart04>」"
translation = "「후아아아앙……<emoji=heart04><emoji=heart04> 들어, 왔다아<emoji=heart04> ……하후우운<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ああぁっ<emoji=heart04>\u3000この体勢だと、チ○ポが奥まで、突き刺さってぇっ……<emoji=heart04>\u3000んっ、はあぁっ……ふうぅぅ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 이 자세면 자지가 깊은 곳까지 찔러 들어와서어……<emoji=heart04> 응, 하아앗…… 후우우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふ、深いぃ……<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「기, 깊어어……<emoji=heart04> 하아앗…… 응응<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、動いて大丈夫そう？」"
translation = "「마무, 움직여도 괜찮겠어?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁ……ふぅ……ん<emoji=heart04>\u3000いいわよ。遠慮せずに来なさい……<emoji=heart04>」"
translation = "「하아…… 후우…… 응<emoji=heart04> 좋아. 사양 말고 오렴……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふあぁぁぁあぁっ<emoji=heart04><emoji=heart04>\u3000チ○ポピストン、来たあぁぁっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ……んあぁあっ<emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04> 자지 피스톤, 왔다아아앗<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗, 후우웃…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あんっ、あぁんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ……んうぅっ<emoji=heart04>\u3000んっ、はあぁっ<emoji=heart04>\u3000あんっ……はあぁっ、んんっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「앙, 아앙<emoji=heart04> 하아앗, 후우웃…… 응우웃<emoji=heart04> 응, 하아앗<emoji=heart04> 앙…… 하아앗, 응응<emoji=heart04> 후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ピストンの度に、奥の深いところまで……どちゅどちゅってぇ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ……んんんっ<emoji=heart04>」"
translation = "「피스톤 할 때마다 깊은 곳까지…… 도츄도츄거려어<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗, 후우웃…… 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ<emoji=heart04>\u3000動く度に子宮口、キスされてるぅ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>\u3000んうぅっ……あっ、んあぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 움직일 때마다 자궁구에 키스당하고 있어어<emoji=heart04> 하아앗…… 응아앗<emoji=heart04> 응우웃…… 앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……マムのドラゴンおま○こ、気持ちいい……！」"
translation = "「큭…… 마무의 드래곤 보지, 기분 좋아……!」"

[[dialogue]]
speaker = "unk"
original = "竜の特性なのか、マムの体は小柄なのに、膣は俺のペニスを余裕で全部飲み込んでしまう。"
translation = "용의 특성인지 마무의 몸은 아담한데도, 질은 내 페니스를 여유롭게 전부 삼켜버린다."

[[dialogue]]
speaker = "unk"
original = "そしてこちらの射精を促すように中がうねうねと動き、１度知ったら忘れられないような、病みつきになる快楽を与えてくる。"
translation = "그리고 이쪽의 사정을 재촉하듯 안이 꿈틀꿈틀 움직이며, 한 번 알면 잊을 수 없는, 중독될 것 같은 쾌락을 선사한다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方のも、いいわよ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>」"
translation = "「네 것도 좋아<emoji=heart04> 응<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗…… 응우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「固くて熱くて、なにより大き過ぎな魔王チ○ポ<emoji=heart04>\u3000あんっ……んっ、ふうぅぅっ<emoji=heart04>\u3000あっ、はあぁっ……ふわあぁっ<emoji=heart04>」"
translation = "「딱딱하고 뜨겁고, 무엇보다 너무 큰 마왕 자지<emoji=heart04> 앙…… 응, 후우우웃<emoji=heart04> 앗, 하아앗…… 후와아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁぁん<emoji=heart04>\u3000ドラゴンおま○こ、いつも負かして……あんっ<emoji=heart04>\u3000凶悪な強さで、生意気なんだからっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁっ……んふうぅっ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 드래곤 보지를 맨날 이겨 먹고…… 앙<emoji=heart04> 흉악한 강함이라니, 건방지다니까<emoji=heart04> 앙<emoji=heart04> 하아아앗…… 응후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マムは確かっ、この辺りが好きだったよね……？」"
translation = "「마무는 분명, 이쯤을 좋아했었지……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ……そこぉっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04><emoji=heart04>\u3000弱いところズリズリってぇ……ふああぁっ<emoji=heart04>\u3000擦り、上げられてるぅ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>」"
translation = "「앗…… 거기이잇<emoji=heart04> 하아아아앙<emoji=heart04><emoji=heart04> 약한 곳을 즈리즈리하고오…… 후아아앗<emoji=heart04> 문질러 올려지고 있어어<emoji=heart04> 하아앗…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あんっ<emoji=heart04>\u3000はあぁっ……ふああぁんっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000あっ、あんっ……はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하아앗…… 후아아앙<emoji=heart04> 하아앗…… 응우웃<emoji=heart04> 앗, 앙…… 하아앗<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んふぅぅ<emoji=heart04>\u3000極太カリに、ゴリゴリ引っ掻かれてぇっ……<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000はあぁっ、んうぅっ……ふああぁっ<emoji=heart04>」"
translation = "「응후우우<emoji=heart04> 굵은 귀두에 고리고리 긁혀서어……<emoji=heart04> 앗, 앗<emoji=heart04> 하아앗, 응우웃…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……ああっ<emoji=heart04>\u3000なに？\u3000またキス、するの……？\u3000上の口でも、この私を跪かせちゃう気かしら？\u3000んんっ……<emoji=heart04>」"
translation = "「응…… 아앗<emoji=heart04> 뭐야? 또 키스할 거야……? 위의 입으로도 이 나를 무릎 꿇릴 셈일까? 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「もう、仕方ないわね<emoji=heart04>\u3000――んむっ<emoji=heart04>\u3000ちゅっ……ちゅうぅっ<emoji=heart04>」"
translation = "「정말, 어쩔 수 없네<emoji=heart04> ――응뭇<emoji=heart04> 츄…… 츄우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅっ……ちゅぱっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅるるっ<emoji=heart04>\u3000れろちゅっ、ちゅむむっ<emoji=heart04>\u3000ちゅぱっ……れるれるっ。んっ、ちゅっ<emoji=heart04>」"
translation = "「츄…… 츄팟<emoji=heart04> 츄푸푸…… 츄루루<emoji=heart04> 레로츄, 츄무무<emoji=heart04> 츄팟…… 레를레를. 응, 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はあぁぁ<emoji=heart04>\u3000舌、激しっ……<emoji=heart04>\u3000んむっ、れろちゅっ……れるれるっ<emoji=heart04>\u3000ちゅるるっ……ちゅぱっ、れろちゅっ……ちゅうぅっ<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 혀, 격렬해……<emoji=heart04> 응뭇, 레로츄…… 레를레를<emoji=heart04> 츄루루…… 츄팟, 레로츄…… 츄우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅぱっ……上の口も、はぁぁぁ<emoji=heart04>\u3000たっぷりディープキス、されて……んんぅ<emoji=heart04>\u3000頭の奥まで、熱くなってきちゃう<emoji=heart04>」"
translation = "「츄팟…… 위의 입도, 하아아아<emoji=heart04> 듬뿍 딥 키스 당해서…… 응응우<emoji=heart04> 머릿속까지 뜨거워져 버려」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あっ……誰か来たかも……？」"
translation = "「앗…… 누가 왔을지도……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ち、ちょっと待ちなさいっ……<emoji=heart04>\u3000星徒会の子……！？\u3000だ、誰？」"
translation = "「자, 잠깐 기다려봐……<emoji=heart04> 성도회 아이……!? 누, 누구?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ、あんっ<emoji=heart04>\u3000ダメッ、これ深いから声出ちゃうっ<emoji=heart04>\u3000あっ……はあぁっ、んうぅっ……んあぁっ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 안 돼, 이거 깊어서 소리 나온단 말이야<emoji=heart04> 앗…… 하아앗, 응우웃…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「１回止めて、どこかに隠れないと……！\u3000あっ<emoji=heart04>\u3000こ、こら、ダメだってば……<emoji=heart04>\u3000んっ……あっ、あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「한 번 멈추고 어디 숨어야……! 앗<emoji=heart04> 이, 이봐, 안 된다니까……<emoji=heart04> 응…… 앗, 앗<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「こんなところ見られたら、寮長としての威厳が……んんっ<emoji=heart04>\u3000はあぁっ……あっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「이런 곳을 들키면 사감으로서의 위엄이…… 응응<emoji=heart04> 하아앗…… 앗<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やっ……ダメぇ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ、んあぁっ……！」"
translation = "「얏…… 안 돼에<emoji=heart04> 앙<emoji=heart04> 하아앗…… 응우웃<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗, 응아앗……!」"

[[dialogue]]
speaker = "unk"
original = "制止の声をあげつつも、マムのおま○こはキュンキュンと激しく反応している。"
translation = "제지하는 목소리를 내면서도, 마무의 보지는 큥큥거리며 격렬하게 반응하고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、冗談だよ。本当は誰も来てない」"
translation = "「미안, 농담이야. 사실 아무도 안 왔어」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なっ……！？」"
translation = "「뭐……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも……ちょっと興奮したでしょ？」"
translation = "「하지만…… 조금 흥분했지?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「も、もう……！\u3000許さないから！\u3000お仕置きよっ――えいっ<emoji=heart04><emoji=heart04>」"
translation = "「정, 정말……! 용서하지 않을 거니까! 벌이야―― 에잇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムのおま○こが俺のペニスを、きゅうぅっと強く締め付けて来る。"
translation = "마무의 보지가 내 페니스를 뀨우욱 하고 강하게 조여 온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くうぅっ！？\u3000き、気持ちいい……！」"
translation = "「쿠우웃!? 기, 기분 좋아……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000ほら、貴方の好きな、おま○この本気ハグよ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 하아앗…… 후우웃<emoji=heart04> 자, 네가 좋아하는 보지의 진심 허그야<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んんっ<emoji=heart04>\u3000はあっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000どう？\u3000貴方が名器だと言ったドラゴンおま○こ、気持ちいいかしら？<emoji=heart04>」"
translation = "「응응<emoji=heart04> 하앗<emoji=heart04> 응…… 후우웃<emoji=heart04> 어때? 네가 명기라고 말한 드래곤 보지, 기분 좋니?<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000あっ、はあぁっ……んうぅっ<emoji=heart04>\u3000はあぁぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 앙<emoji=heart04> 하아앗, 후우웃<emoji=heart04> 앗, 하아앗…… 응우웃<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000どうしたの？\u3000情けない声を出して。もう降参して、イっちゃうのかしら？\u3000んっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「후후<emoji=heart04> 앙<emoji=heart04> 왜 그래? 한심한 소리를 내고. 벌써 항복하고 가버리는 걸까? 응<emoji=heart04> 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや……負けない……！\u3000俺は、今日こそマムを孕ませてみせる……！」"
translation = "「아니…… 지지 않아……! 나는 오늘이야말로 마무를 임신시키고 말겠어……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000はぁぁ、男らしい宣言ね<emoji=heart04>\u3000はぁぁ<emoji=heart04>……でも、できるのかしら？\u3000今日まで月のものは、毎月来てるけど……？」"
translation = "「어머<emoji=heart04> 응응응<emoji=heart04> 하아아, 남자다운 선언이네<emoji=heart04> 하아아<emoji=heart04>…… 하지만 할 수 있을까? 오늘까지 달거리는 매달 꼬박꼬박 오고 있는데……?」"

[[dialogue]]
speaker = "unk"
original = "竜は魔界でも数が少ない種族だ。マム曰く、それは妊娠自体のハードルが高いからだという。"
translation = "용은 마계에서도 수가 적은 종족이다. 마무의 말에 따르면, 그건 임신 자체의 장벽이 높기 때문이라고 한다."

[[dialogue]]
speaker = "unk"
original = "強い子孫を残す為、極めて強い精子を求めるのだそうだ。更に妊娠してからも『厳選期間』という他の種にはない過程が存在し、出産まで最低でも３年はかかるという。"
translation = "강한 자손을 남기기 위해 극도로 강한 정자를 원한다고 한다. 게다가 임신하고 나서도 『엄선 기간』이라는 다른 종에는 없는 과정이 존재하며, 출산까지 최소 3년은 걸린다고 한다."

[[dialogue]]
speaker = "unk"
original = "それ故に、性行為の頻度を増やす為、竜という種族は性欲が強いのだという。"
translation = "그렇기에 성행위의 빈도를 늘리기 위해 용이라는 종족은 성욕이 강한 것이라고 한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それでも……マムのこと、本気で愛してるから！」"
translation = "「그래도…… 마무를 진심으로 사랑하니까!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000なら、その魔王チ○ポで、竜の私を跪かせてみせなさい……っ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후후<emoji=heart04> 그럼 그 마왕 자지로 용인 나를 무릎 꿇려 보렴……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、マムのお尻を強く鷲掴みにして――"
translation = "나는 고개를 끄덕이고, 마무의 엉덩이를 강하게 움켜쥐며――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ―――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗―――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふぁぁああぁっ<emoji=heart04><emoji=heart04>\u3000本気ピストン、来たあぁっ<emoji=heart04>\u3000あっ、あっ、んああぁぁっ<emoji=heart04>\u3000あんっ、あんっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>」"
translation = "「화아아아앗<emoji=heart04><emoji=heart04> 진심 피스톤, 왔다아앗<emoji=heart04> 앗, 앗, 응아아아앗<emoji=heart04> 앙, 앙<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000この体勢で激しい突き上げ、すごいぃ<emoji=heart04>\u3000あんっ、あんっ、あぁんっ<emoji=heart04>\u3000ふあああっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 이 자세로 격렬하게 밀어 올리는 거, 굉장해에<emoji=heart04> 앙, 앙, 아앙<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「奥までノックされて、子宮にキュンキュン響くぅ<emoji=heart04><emoji=heart04>\u3000はぁっ、あぁぁん<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、んううぅっ<emoji=heart04>」"
translation = "「안쪽까지 노크당해서 자궁에 큥큥 울려어<emoji=heart04><emoji=heart04> 하앗, 아아앙<emoji=heart04> 하아아앗<emoji=heart04> 앗, 앗, 앗, 응우우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふああぁっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000ふわあぁぁっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 아아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 아아앙<emoji=heart04> 후와아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、気持ちいい……っ？」"
translation = "「마무, 기분 좋아……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000ゴリゴリどちゅどちゅされて<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000魔王チ○ポで気持ちよくなっちゃうっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 기분 좋아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 고리고리 도츄도츄 당해서<emoji=heart04> 아앙<emoji=heart04> 마왕 자지로 기분 좋아져 버려어<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000奥っ<emoji=heart04>\u3000あっ、あっ、いいっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000奥、すごいぃっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 응아아앗<emoji=heart04> 안쪽<emoji=heart04> 앗, 앗, 좋아<emoji=heart04> 후아아앗<emoji=heart04> 안쪽, 굉장해에<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んああぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000チ○ポ気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000竜の体、征服されちゃうっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 아아앗<emoji=heart04> 자지 기분 좋아아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 용의 몸, 정복당해버려어<emoji=heart04> 앙<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マム、もうイキそう……！」"
translation = "「마무, 나 이제 갈 것 같아……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ<emoji=heart04>\u3000いいわよ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000私もそろそろイキそうっ<emoji=heart04>\u3000あっ、あっ、んああぁっ<emoji=heart04>\u3000はふぅぅんっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 좋아……<emoji=heart04> 하아앙<emoji=heart04> 나도 슬슬 갈 것 같아아<emoji=heart04> 앗, 앗, 응아아앗<emoji=heart04> 하후우운<emoji=heart04> 앗, 앗<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁぁぁっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000マムの中に、いっぱい出しちゃいなさいっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 아아앗<emoji=heart04> 마무 안에 잔뜩 싸버리렴<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あぁあっ、くるっ<emoji=heart04>\u3000大きいの登ってくるぅ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいのぉっ<emoji=heart04>\u3000んああぁっ――<emoji=heart04><emoji=heart04>」"
translation = "「아아앗, 온다아<emoji=heart04> 큰 게 올라와아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋아<emoji=heart04> 보지 기분 좋아아아<emoji=heart04> 응아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ<emoji=heart04>\u3000イク、イクイクイクイク――っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000イっちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 간다, 가 가 가 가――앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗<emoji=heart04> 가버려어<emoji=heart04><emoji=heart04><emoji=heart04> 가――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「イックうぅぅぅーーーーっ<emoji=heart04><emoji=heart04>\u3000ふああぁぁあぁぁああ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어ーーーー앗<emoji=heart04><emoji=heart04> 후아아아아아아아아아아～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は欲望の限りを、マムの子宮目がけてぶちまけ続ける。"
translation = "나는 욕망이 닿는 대로 마무의 자궁을 향해 쏟아붓는다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はああぁぁ～～～っ<emoji=heart04>\u3000魔王の孕ませ精子、中にいっぱい入って来るぅ～～っ<emoji=heart04>\u3000んああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아～～～앗<emoji=heart04> 마왕의 임신 정자, 안에 잔뜩 들어와아～～앗<emoji=heart04> 응아아아～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あぁぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000はぁぁぁっ、子宮、満タンになっちゃうくらい……注がれてぇ<emoji=heart04>\u3000熱ぅいっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 굉장해<emoji=heart04> 하아아아앗, 자궁, 가득 찰 정도로…… 부어져서어<emoji=heart04> 뜨거워어어<emoji=heart04> 하아앗, 후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はああぁっ……<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000やっと射精、止まったぁ……<emoji=heart04>\u3000ふうぅ、はあぁっ<emoji=heart04>」"
translation = "「하아아아앗……<emoji=heart04> 아앙<emoji=heart04> 드디어 사정, 멈췄다아……<emoji=heart04> 후우, 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あっ、あんっ<emoji=heart04>\u3000チ○ポ抜けて……<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 자지 빼줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はぁ……はぁ……<emoji=heart04>\u3000んん……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方の精子、入り切らずに、溢れて来てる……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000相変わらず、凶悪な射精量なんだから……<emoji=heart04>」"
translation = "「네 정자, 다 안 들어가고 넘쳐흐르고 있어……<emoji=heart04> 응<emoji=heart04> 여전히 흉악한 사정량이라니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「してる最中のマムが、エッチ過ぎるせいだよ」"
translation = "「하고 있는 도중의 마무가 너무 야한 탓이야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ……でも、貴方の男らしい攻めも、なかなか悪くなかったわよ<emoji=heart04>」"
translation = "「후후…… 하지만 네 남자다운 공격도 제법 나쁘지 않았어<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マムはそっと、キスをしてくれる。"
translation = "마무는 살며시 키스를 해준다."

[[dialogue]]
speaker = "unk"
original = "それから少し、余韻を楽しむように抱き合ってから――"
translation = "그러고는 잠시 여운을 즐기듯 껴안고 있다가――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……さて、会長。汚れちゃったし、１回シャワーを浴びに行きましょうか」"
translation = "「……자, 회장. 더러워졌으니 한 번 샤워하러 갈까요」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「せっかくだし、このまま海の家まで運んでもらおうかしら？」"
translation = "「이왕이면 이대로 바다의 집까지 옮겨다 줄래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イエス・マム」"
translation = "「예스 마무」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ……よろしく頼むわ。ああ、そうだ……言い忘れてたわ。熱が冷める前に――」"
translation = "「후후…… 잘 부탁해. 아, 맞다…… 잊은 게 있었네. 열기가 식기 전에――」"

[[dialogue]]
speaker = "unk"
original = "マムは俺の耳元でそっと囁く。"
translation = "마무는 내 귓가에 살며시 속삭인다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長。私も……愛してるわよ<emoji=heart04>」"
translation = "「회장. 나도…… 사랑해<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「って、あら？\u3000もう……悪い子ね。また復活して、お尻に当たってるわよ？」"
translation = "「어라? 벌써…… 나쁜 아이네. 다시 부활해서 엉덩이에 닿고 있잖아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは……マムが不意打ちするから……」"
translation = "「이건…… 마무가 기습하니까……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私のせい？\u3000でも、シャワーは一緒に浴びるだけよ？\u3000ふふっ<emoji=heart04>」"
translation = "「내 탓이야? 하지만 샤워는 같이 하는 것뿐이라구? 후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつもシャワールームに着くと、仕方ないわねと甘くささやいて、また恋人のお世話してくれるマムなのだった――"
translation = "그렇게 말하면서도 샤워실에 도착하자, 어쩔 수 없네 하며 달콤하게 속삭이며 다시 연인을 돌봐주는 마무였다――"

