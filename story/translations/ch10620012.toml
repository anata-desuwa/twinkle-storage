[[dialogue]]
speaker = "unk"
original = "第２話,日傘探偵の秘密,P"
translation = "제2화, 양산 탐정의 비밀, P"

[[dialogue]]
speaker = "unk"
original = "ジュエリーと知り合ってから少し経ったある日のこと。"
translation = "쥬얼리와 알게 된 지 얼마 지나지 않은 어느 날."

[[dialogue]]
speaker = "unk"
original = "スケジュールがたまたま空いたのを見計らったかのように、彼女から大聖堂で会わないかと呼び出しを受けた――"
translation = "스케줄이 마침 비었다는 걸 꿰뚫어 본 것처럼, 그녀로부터 대성당에서 만나지 않겠느냐는 호출을 받았다──"

[[dialogue]]
speaker = "ジュエリー"
original = "「やあ、我が助手。呼び出しに応じてくれて、ありがとう」"
translation = "「야아, 나의 조수. 호출에 응해줘서 고마워」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ん？\u3000何を読んでいたのかって？\u3000私は昔から、謎や事件が大好物でね」"
translation = "「응? 뭘 읽고 있었냐고? 나는 옛날부터 수수께끼나 사건을 아주 좋아해서 말이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「推理小説はよく読むんだ。キミを待つついでに、昔たくさん読んだ懐かしい作品を読み返していたところさ」"
translation = "「추리 소설은 자주 읽어. 너를 기다리는 김에 예전에 많이 읽었던 그리운 작품을 다시 읽고 있던 참이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「この大聖堂は、この国に来てからお気に入りの場所でね。推理小説を読む時や、静かに過ごしたい時はよく足を運んでいるんだ」"
translation = "「이 대성당은 이 나라에 온 뒤로 마음에 들어 하는 장소야. 추리 소설을 읽을 때나, 조용히 지내고 싶을 때는 자주 발걸음을 옮기곤 하지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その際には、こうして戦闘服に変身するのがお決まりになっている。ほらこれ、シスター服に似ているだろう？」"
translation = "「그럴 때는 이렇게 전투복으로 변신하는 게 정해진 수순이야. 자 봐, 시스터복과 닮지 않았니?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「自前で本当のシスター服も持っているのだが、こっちの方が着替えも一瞬で済むし、持ち歩かずに済むから面倒がなくていい。ふふっ、便利で助かっているよ」"
translation = "「따로 진짜 시스터복도 가지고 있긴 하지만, 이쪽이 갈아입는 것도 순식간이고 가지고 다닐 필요도 없어서 번거롭지 않아 좋거든. 후훗, 편리해서 도움을 받고 있어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それで、今回キミを呼び出した理由だけど、我が助手になったキミに、私のパーソナル情報を話しておこうと思ってね」"
translation = "「그래서, 이번에 너를 불러낸 이유인데, 나의 조수가 된 너에게 내 퍼스널 정보를 이야기해 두려고 생각해서 말이야.」"

[[dialogue]]
speaker = "unk"
original = "いや、助手はまだ認めてないけどね！？"
translation = "아니, 조수는 아직 인정 안 했는데!?"

[[dialogue]]
speaker = "ジュエリー"
original = "「はは、私の想像では、すぐに認めることになっているよ」"
translation = "「하하, 내 상상으로는 곧 인정하게 되어 있어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「まあ、キミは星徒会長なわけだし、プリマステラでもある私のことを詳しく知っておいて、損はないだろう？」"
translation = "「뭐, 너는 성도회장이기도 하니까, 프리마스테라이기도 한 나에 대해 자세히 알아둬서 손해 볼 건 없잖아?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私が探偵だと、先日キミに知ってもらったわけだが、私の言う探偵というものは、おそらくキミが思っているものと、実は意味合いが違っていてね」"
translation = "「내가 탐정이라는 건 요전번에 네가 알게 되었지만, 내가 말하는 탐정이라는 건 아마 네가 생각하는 것과는 사실 의미가 좀 달라서 말이지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「自分で言うのも恥ずかしいけれど、私は『名探偵』という役職なんだよ。生まれながらにね」"
translation = "「내 입으로 말하기는 부끄럽지만, 나는 『명탐정』이라는 역직이야. 태어날 때부터 말이지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「聞いたことはないかもしれないが、１つ、この世界に昔から存在しているワードを出そう。それは『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』――海外では『ロールスター』とも呼ばれている」"
translation = "「들어본 적은 없을지도 모르겠지만, 하나 이 세계에 옛날부터 존재해 온 단어를 꺼내 볼까. 그것은 『선성자』―― 해외에서는 『롤스타』라고도 불리지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その名の通り、星に選ばれた者であり、『<ruby>役職<rt>ロール</rt></ruby>』という運命の星の元に生まれて来た者のことを指す。そして、その選星者の１人が、私なんだ」"
translation = "「그 이름대로 별에 선택받은 자이며, 『역직』이라는 운명의 별 아래 태어난 자를 가리켜. 그리고 그 선성자 중 한 명이 바로 나야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私の役職は、<b>名探偵</b>。ちなみに、他に例を挙げると『予言者』『大怪盗』などがある」"
translation = "「나의 역직은 **명탐정**. 참고로 다른 예를 들자면 『예언자』, 『대괴도』 등이 있어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「予言者は先日、キミにも少し話したね。キミが運命の相手であると教えてくれた、私の友人だよ。もう１つの大怪盗の方は、幾度となく取り逃がしている私の宿敵さ」"
translation = "「예언자는 요전번에 너에게도 조금 이야기했었지. 네가 운명의 상대라고 가르쳐 준 내 친구야. 또 다른 하나인 대괴도 쪽은 몇 번이고 놓치고 있는 내 숙적이지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「大怪盗『フランボウ』。現在進行形で、流星市国にも出没しているよ」"
translation = "「대괴도 『플랑보』. 현재진행형으로 유성시국에도 출몰하고 있어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「正体は私の想像も働かなくて、未だに分からない。そのうちキミの力を借りることもあるかもしれないね」"
translation = "「정체는 내 상상력도 발휘되지 않아서 아직도 모르겠어. 조만간 네 힘을 빌릴 일이 있을지도 모르겠네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それはさておき、星に選ばれた名探偵としての私の使命は、世界に隠された謎を解き明かすことにある。リクリエがまさにそれさ」"
translation = "「그건 그렇고, 별에 선택받은 명탐정으로서의 내 사명은 세계에 숨겨진 수수께끼를 밝혀내는 데 있어. 리크리에가 바로 그거야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「リクリエが何故起きるのか。その背景にはどうも、私は何者かの存在を感じずにはいられない。名探偵としての能力でね」"
translation = "「리크리에가 왜 일어나는가. 그 배경에는 아무래도 나는 누군가의 존재를 느끼지 않을 수 없어. 명탐정으로서의 능력으로 말이지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「選星者はどうやって自らが選ばれた存在だと知るのかといえば、天からの啓示があるんだ。いつ啓示を受けたかは分からないけれど――」"
translation = "「선성자는 어떻게 스스로가 선택받은 존재라는 걸 아느냐고 묻는다면, 하늘의 계시가 있어. 언제 계시를 받았는지는 모르겠지만――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「気付いた時には、確かに自分は選星者であり、どんな役目なのか、何の能力を持っているのかを自覚しているんだ」"
translation = "「깨달았을 때는 확실히 자신은 선성자이며, 어떤 역할인지, 어떤 능력을 갖추고 있는지 자각하게 돼.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「名探偵に与えられる能力は『事件が起きる場所を直感で察知出来る』というものだ。私はそれを使って、リクリエに関する痕跡を追って来た」"
translation = "「명탐정에게 주어지는 능력은 『사건이 일어날 장소를 직감으로 알아챌 수 있다』는 거야. 나는 그걸 사용해서 리크리에에 관한 흔적을 쫓아왔어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その結論として、裏で誰かが動いているという確信を得た。リクリエが迫りつつある現在、近いうちにその何者かは動き出すだろう」"
translation = "「그 결론으로서 배후에서 누군가가 움직이고 있다는 확신을 얻었지. 리크리에가 다가오고 있는 현재, 머지않아 그 누군가는 움직이기 시작할 거야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「名探偵としての直感がそう告げている。だから会長、キミには私の助手として、リクリエの黒幕を捕まえる手伝いをして欲しいのさ」"
translation = "「명탐정으로서의 직감이 그렇게 말하고 있어. 그러니까 회장, 너는 내 조수로서 리크리에의 흑막을 잡는 걸 도와줬으면 해.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「愛しているから側に置きたいという理由を抜きにしても、ね」"
translation = "「사랑하니까 곁에 두고 싶다는 이유를 빼고서라도 말이야.」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら、ぜひ協力する"
translation = "그런 일이라면 기꺼이 협력할게."

[[dialogue]]
speaker = "ジュエリー"
original = "「ははっ、キミならそう言ってくれるだろうと想像していたよ。さすがは私が見込んだ男だ」"
translation = "「하핫, 너라면 그렇게 말해 줄 거라고 상상하고 있었어. 역시 내가 눈여겨본 남자다워.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「引き受けてくれてありがとう。愛しているよ、我が助手♪」"
translation = "「맡아줘서 고마워. 사랑해, 나의 조수♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺はジュエリーの差し出した手を取り、握手を交わした。それが終わると、彼女は先程まで読んでいた推理小説を手渡して来た――"
translation = "그렇게 나는 쥬얼리가 내민 손을 잡고 악수를 나누었다. 그것이 끝나자 그녀는 방금 전까지 읽고 있던 추리 소설을 건네주었다――"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手になってくれたキミに、私のもう１つ重要なパーソナリティーを明かそう」"
translation = "「조수가 되어 준 너에게 내 또 다른 중요한 퍼스널리티를 밝히지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その推理小説――『ブラウン神父の童心』に登場する探偵のことを、キミは知っているかい？」"
translation = "「그 추리 소설―― 『브라운 신부의 동심』에 등장하는 탐정에 대해 너는 알고 있니?」"

[[dialogue]]
speaker = "unk"
original = "蝙蝠傘を持っている探偵だっけ？"
translation = "박쥐우산을 들고 다니는 탐정이었던가?"

[[dialogue]]
speaker = "unk"
original = "ブラウン神父……"
translation = "브라운 신부……"

[[dialogue]]
speaker = "ジュエリー"
original = "「世界三大探偵と呼ばれている内の１人さ。本名は『Ｊ・ブラウン』という」"
translation = "「세계 3대 탐정이라 불리는 이들 중 한 명이야. 본명은 『J. 브라운』이라고 하지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「イギリスを始めとして世界を飛び回り、各地の教会で司祭を勤めていた……アマチュアの探偵だ」"
translation = "「영국을 시작으로 세계를 누비며 각지의 교회에서 사제를 지냈던…… 아마추어 탐정이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「好奇心旺盛で、謎や事件が大好物、真相を見抜くコツは『自分が犯人になりきること』だそうだよ。いやはや、笑ってしまうね」"
translation = "「호기심 왕성하고 수수께끼나 사건을 아주 좋아하지. 진상을 꿰뚫어 보는 비결은 『자신이 범인이 되어 보는 것』이라고 해. 이야, 웃음이 나올 정도지?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「どんな人だったのか、手に取るように想像が出来てしまう」"
translation = "「어떤 사람이었는지 손에 잡힐 듯이 상상이 가거든.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それじゃあ、改めて名乗らせて貰うよ」"
translation = "「그럼 새삼스럽게 다시 이름을 대도록 할게.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私の名前は、<ruby>ジュエリー<rt>Ｊ</rt></ruby>・<b>ブラウン</b>。その小説で活躍が描かれた、ブラウン神父の子孫――」"
translation = "「내 이름은, **쥬얼리<rt>J</rt></ruby> · 브라운**. 그 소설에서 활약이 그려진 브라운 신부의 후손――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「日傘を差した名探偵さ」"
translation = "「양산을 든 명탐정이야.」"

