[[dialogue]]
speaker = "unk"
original = "とある放課後、新星学園２年生の教室が並ぶ廊下にて。"
translation = "어느 방과 후, 신성 학원 2학년 교실이 늘어선 복도에서."

[[dialogue]]
speaker = "unk"
original = "同級生である３人が歓談を交わしていたのだが、その中であることが話題に上がる。"
translation = "동급생인 세 사람이 담소를 나누고 있었는데, 그중 어떤 것이 화제에 오른다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「こどもの日……！」"
translation = "「어린이날……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「レミカに言われるまで、そんな日があることをすっかり忘れてたわ！」"
translation = "「레미카가 말해주기 전까지, 그런 날이 있다는 걸 완전히 잊고 있었어!」"

[[dialogue]]
speaker = "レミカ"
original = "「私も、街の広場のイベントで『鯉のぼり』が上げられているのを見て、思い出してさ」"
translation = "「나도 거리 광장 이벤트에서 『코이노보리』가 걸려 있는 걸 보고 생각났거든」"

[[dialogue]]
speaker = "メルエル"
original = "「人間界の、子供の成長をお祝いする日か～。確かに、学園ではあんまり話題にならないよね？」"
translation = "「인간계의 어린이 성장을 축하하는 날인가~. 확실히 학원에서는 별로 화제가 안 되지?」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。小さい頃はお祝いしてもらった記憶があるけど、ある程度大きくなってからは家でも全然話題に上がらなくなったなって」"
translation = "「응. 어릴 때는 축하받았던 기억이 있지만, 어느 정도 크고 나서는 집에서도 전혀 화제가 안 나오게 됐거든」"

[[dialogue]]
speaker = "unk"
original = "そんな風にヴィーナスと話しているのは、友人である『愛戸レミカ』と『姫咲メルエル』であった。"
translation = "그렇게 비너스와 이야기하고 있는 것은 친구인 『아이도 레미카』와 『히메사키 메루엘』이었다."

[[dialogue]]
speaker = "メルエル"
original = "「そういうのってあるよね。子供の頃はお父さん、お母さんと遊びに出かけたりしたけど、学園に通うようになってからは、その頻度も減っていっちゃって……」"
translation = "「그런 거 있지. 어릴 때는 아빠, 엄마랑 놀러 나가기도 했지만, 학원에 다니게 된 뒤로는 그 빈도도 줄어들어서……」"

[[dialogue]]
speaker = "メルエル"
original = "「気づいて思い返すと、ちょっと寂しい気持ちになっちゃったりするかも」"
translation = "「문득 돌이켜보면 조금 쓸쓸한 기분이 들기도 할지도」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こどもの日と言えば……昔、ヘレナちゃんに家で鯉のぼりを上げてもらったこと、思い出したわ！」"
translation = "「어린이날이라고 하면…… 옛날에 헬레나 짱이 집에서 코이노보리를 달아줬던 거 생각났어!」"

[[dialogue]]
speaker = "レミカ"
original = "「まあ、この年にもなって毎年お祝いされたりしたら、さすがに恥ずかしい気持ちになっちゃうからアレだけど……懐かしい気分にはなるよね」"
translation = "「뭐, 이 나이가 돼서 매년 축하받거나 하면 아무래도 부끄러운 기분이 드니까 좀 그렇지만…… 그리운 기분은 드네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうかしら？\u3000私はクロトに『こどもの日』をお祝いしてもらえたら、今でもすごく嬉しいと思うわよ♪」"
translation = "「그럴까? 나는 쿠로토가 『어린이날』을 축하해준다면 지금도 정말 기쁠 것 같은데♪」"

[[dialogue]]
speaker = "メルエル"
original = "「ふふっ、ヴィーナスちゃんのそういう純真なところ、とっても素敵だね♪」"
translation = "「후훗, 비너스 짱의 그런 순진한 점, 정말 멋지네♪」"

[[dialogue]]
speaker = "レミカ"
original = "「確かにヴィーナスらしい。私も『可愛いアイドル』を目指す上で、そういう子供心を思い出すことが重要なのかも……」"
translation = "「확실히 비너스답네. 나도 『귀여운 아이돌』을 목표로 하는 입장에서 그런 동심을 떠올리는 게 중요할지도……」"

[[dialogue]]
speaker = "レミカ"
original = "「って、ヴィ、ヴィーナス……？\u3000なんか体が光ってない？」"
translation = "「그나저나, 비, 비너스……? 왠지 몸이 빛나고 있지 않아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら？」"
translation = "「어머?」"

[[dialogue]]
speaker = "メルエル"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「眩しくて何も見えないわ！」"
translation = "「눈부셔서 아무것도 안 보여!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの体が強く発光し、やがて収まると――"
translation = "비너스의 몸이 강하게 발광하더니, 이윽고 빛이 가라앉자――"

[[dialogue]]
speaker = "レミカ"
original = "「なっ……！\u3000これって！？」"
translation = "「나, 앗……! 이건!?」"

[[dialogue]]
speaker = "メルエル"
original = "「えぇっ！？\u3000どういうことぉ！？」"
translation = "「에엣!? 어떻게 된 거야!?」"

[[dialogue]]
speaker = "unk"
original = "そこに広がった光景を見て、３人は目を見開くのだった。"
translation = "그곳에 펼쳐진 광경을 보고, 세 사람은 눈을 크게 떴다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ク～ロ～ト～！」"
translation = "「쿠~로~토~!」"

[[dialogue]]
speaker = "unk"
original = "俺が星徒会室で事務作業に取りかかろうとしていると、ドタバタという足音と共に聞き慣れた声が近づいてきた。"
translation = "내가 성도회실에서 사무 작업을 시작하려는데, 우당탕거리는 발소리와 함께 귀에 익은 목소리가 다가왔다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「大変よ！\u3000また不思議なことが起きたわ！」"
translation = "「큰일이야! 또 이상한 일이 일어났어!」"

[[dialogue]]
speaker = "unk"
original = "何事かと思っていると、ヴィーナスの後ろから小さな人影が元気よく飛び出してくる。"
translation = "무슨 일인가 싶어 보고 있자니, 비너스의 뒤에서 작은 인영이 활기차게 튀어나온다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「じゃじゃ～ん♪」"
translation = "「짜잔~♪」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000ヴィーナスがもう１人！？"
translation = "엣!? 비너스가 한 명 더!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうなのよ！\u3000なんか急に、小さい私が増えちゃったの！」"
translation = "「그렇다니까! 왠지 갑자기, 어린 내가 늘어나 버렸어!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「よくわからないけど、体が小さくなって２人になったわ、パパ！」"
translation = "「잘 모르겠지만, 몸이 작아지더니 두 명이 됐어, 아빠!」"

[[dialogue]]
speaker = "unk"
original = "驚いて思考停止してしまっていると、続いて別の２人が星徒会室へ入ってくる。"
translation = "놀라서 사고가 정지해 있자, 이어서 다른 두 사람이 성도회실로 들어온다."

[[dialogue]]
speaker = "メルエル"
original = "「か、会長くん、こんにちは。ちょっと相談があって……」"
translation = "「회, 회장군, 안녕. 잠깐 상담할 게 있어서……」"

[[dialogue]]
speaker = "レミカ"
original = "「ごめん、会長。面倒事が発生しちゃって……」"
translation = "「미안, 회장. 귀찮은 일이 발생해 버려서……」"

[[dialogue]]
speaker = "unk"
original = "それは、同級生であるメルエルやレミカであった。"
translation = "그들은 동급생인 메루엘과 레미카였다."

[[dialogue]]
speaker = "unk"
original = "と、その後ろから――"
translation = "그리고, 그 뒤에서――"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「えへへ♪\u3000キミの幼なじみも２人に増えちゃいました～、なんてね♪」"
translation = "「에헤헤♪ 너의 소꿉친구도 두 명으로 늘어나 버렸답니다~, 농담이야♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私も……気づいたら、体がこうなっちゃってて……」"
translation = "「나도…… 정신 차려보니 몸이 이렇게 돼버려서……」"

[[dialogue]]
speaker = "unk"
original = "メルエルとレミカも増えてる～～～っ！？"
translation = "메루엘과 레미카도 늘어나 있잖아~~~!? 덕분에 나는 깜짝 놀라 소리를 지르고 말았다."

[[dialogue]]
speaker = "unk"
original = "突然増えてしまった３人の分身に、俺は驚きの声を上げてしまうのだった。"
translation = "갑자기 늘어나 버린 세 명의 분신에, 나는 경악의 목소리를 높이고 말았다."

