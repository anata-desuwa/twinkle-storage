[[dialogue]]
speaker = "unk"
original = "その後、校内で見失ったロストアイテムを捜索するために、手分けをして探すことになった。"
translation = "그 후 교내에서 놓친 로스트 아이템을 수색하기 위해 조를 나누어 찾기로 했다."

[[dialogue]]
speaker = "unk"
original = "チームを２つに分けて、こちらはサーシャさん、シズハ、俺といったメンバーだ。"
translation = "팀을 둘로 나누어 이쪽은 사샤 씨, 시즈하, 나로 구성된 멤버다."

[[dialogue]]
speaker = "シズハ"
original = "「ふふっ。こうやって最初からお姉ちゃんとロストアイテムを探すのは初めてだね」"
translation = "「후후. 이렇게 처음부터 누나랑 로스트 아이템을 찾는 건 처음이네」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～。シズハが魔法少女活動をしているって知った件も、完全に偶然だったわけだし」"
translation = "「그렇네~. 시즈하가 마법소녀 활동을 하고 있다는 걸 알게 된 건도 완전히 우연이었으니까」"

[[dialogue]]
speaker = "ディーラック"
original = "「ひひっ♪\u3000ロストアイテムは危険な道具だからネ～。そう簡単に、色んな人へ存在がバレたらまずいのサ」"
translation = "「히히♪ 로스트 아이템은 위험한 도구니까 말이지~. 그렇게 쉽게 여러 사람에게 존재가 들통나면 곤란하다네」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんと同じスタンスだ\n関係者は皆、同じように考えるんだな"
translation = "트레지안나 씨와 같은 입장이군. 관계자들은 다들 똑같이 생각하는구나."

[[dialogue]]
speaker = "シズハ"
original = "「サチちゃんの協力者じゃなかったら、こうやって会長とも知り合えなかったわけで、偶然に感謝感謝～♪」"
translation = "「사치짱의 협력자가 아니었다면 이렇게 회장님이랑도 알게 되지 못했을 테니, 우연에 감사 감사~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ～。シズハ、いつになくご機嫌ね～？」"
translation = "「우후후~. 시즈하, 평소보다 더 기분이 좋아 보이네~?」"

[[dialogue]]
speaker = "シズハ"
original = "「そりゃあそうだよ。少し前まで、病院のベッドで寝たきりだった私が、お姉ちゃんやそのお友達と一緒に、こうやってお散歩できてるんだから！」"
translation = "「그야 당연하지. 조금 전까지 병원 침대에서 누워만 있던 내가, 누나랑 그 친구분과 함께 이렇게 산책하고 있으니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら♪\u3000はしゃぐのはいいけれど、転んだりしないようにね？」"
translation = "「어머 어머♪ 신나는 건 좋지만 넘어지거나 하지 않도록 하렴?」"

[[dialogue]]
speaker = "シズハ"
original = "「えっへへ～。わかってますよ～っと……とと？\u3000おおっと！」"
translation = "「에헤헤~ 알고 있어요~ 영차…… 어어? 오옷!」"

[[dialogue]]
speaker = "unk"
original = "シズハは何もないところで一瞬足をもつれさせたが、なんとか自力で踏みとどまった。"
translation = "시즈하는 아무것도 없는 곳에서 순간 발이 꼬였지만, 어떻게든 자력으로 버텨냈다."

[[dialogue]]
speaker = "サーシャ"
original = "「ほら、言わんこっちゃないわ。手を繋いであげるから、先に行かないで並んで歩きましょう？」"
translation = "「봐, 내 말이 맞지. 손을 잡아 줄 테니까 앞서가지 말고 나란히 걷자?」"

[[dialogue]]
speaker = "シズハ"
original = "「大丈夫、大丈夫～！\u3000私の体はもう本当に健康そのものなんだから。これはただの運動不足というか、鍛錬不足だよ」"
translation = "「괜찮아, 괜찮아~! 내 몸은 이제 정말 건강 그 자체니까. 이건 그냥 운동 부족이랄까, 단련 부족이야」"

[[dialogue]]
speaker = "シズハ"
original = "「そ・れ・に～♪\u3000お姉ちゃんとスキンシップするなら、お手手なんかよりも、私はこっちの方が興味深々だな～」"
translation = "「그·리·고~♪ 누나랑 스킨십을 한다면 손 같은 것보다 나는 이쪽에 흥미진진하단 말이지~」"

[[dialogue]]
speaker = "シズハ"
original = "「と、言うわけで。お尻タ～チ♪」"
translation = "「그런 고로. 엉덩이 터치♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あぁんっ<emoji=heart04>」"
translation = "「아앙~♥」"

[[dialogue]]
speaker = "unk"
original = "サーシャさん……！？"
translation = "사샤 씨……!?"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん……？\u3000どうしたのかしら、そんなに顔を赤くしたりして」"
translation = "「회장군……? 왜 그래, 그렇게 얼굴을 붉히고」"

[[dialogue]]
speaker = "サーシャ"
original = "「私の声……？\u3000うふふ♪\u3000シズハの揉み方が上手だったから、つい～」"
translation = "「내 목소리……? 우후후♪ 시즈하가 만지는 솜씨가 좋아서 그만~」"

[[dialogue]]
speaker = "シズハ"
original = "「私、そんないやらしい揉み方してないからね……！？」"
translation = "「나, 그렇게 야하게 주무르지 않았거든!?」"

[[dialogue]]
speaker = "シズハ"
original = "「あああっ、会長もディーちゃんも、そんな冷ややかな目で見ないで……！！」"
translation = "「아아앗, 회장님도 디짱도 그렇게 싸늘한 눈으로 보지 마……!!」"

[[dialogue]]
speaker = "シズハ"
original = "「そりゃ……！\u3000お姉ちゃんのお尻、大きくて柔らかそうで、揉み心地は最高だろうなとは思ったけど！」"
translation = "「그야……! 누나 엉덩이, 크고 부드러워 보여서 만지는 느낌은 최고겠다고는 생각했지만!」"

[[dialogue]]
speaker = "unk"
original = "やっぱりアレはセクハラだったんだ……！"
translation = "역시 저건 성희롱이었어……!"

[[dialogue]]
speaker = "シズハ"
original = "「ちーがーうーの！\u3000思ったけど、欲望は心の底に押し込んで、あくまで今回はタッチに留めたのぉ！」"
translation = "「아-니-라-고-! 생각은 했지만 욕망은 마음속 깊이 눌러 담고, 이번엔 어디까지나 터치에 그친 거야!」"

[[dialogue]]
speaker = "サーシャ"
original = "「うんうん、シズハのお尻への気遣いは、本物だと思うわ♪」"
translation = "「응응, 시즈하의 엉덩이에 대한 배려는 진짜라고 생각해♪」"

[[dialogue]]
speaker = "ディーラック"
original = "「ひひっ。会長がお尻を抑えてシズハちゃんから距離を取ってるぞ。２度とシズハちゃんに背後は見せないという構えだネ」"
translation = "「히히. 회장이 엉덩이를 가리고 시즈하짱에게서 거리를 두고 있다네. 다시는 시즈하짱에게 뒤를 보이지 않겠다는 자세야」"

[[dialogue]]
speaker = "シズハ"
original = "「も～～！\u3000お姉ちゃんが変な声出すからぁ！\u3000絶対わざとでしょぉ！」"
translation = "「정말~! 누나가 이상한 소리를 내니까 그렇잖아! 분명히 일부러 그런 거지!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんなことないわよ～♪」"
translation = "「그럴 리 없잖니~♪」"

[[dialogue]]
speaker = "シズハ"
original = "「ずるいわよ！\u3000こうなったら、お姉ちゃんも私のお尻揉んで！！」"
translation = "「치사해! 이렇게 된 이상 누나도 내 엉덩이 주물러!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪\u3000大胆な告白ね～」"
translation = "「어머나~♪ 대담한 고백이네~」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも私は、シズハの可愛いお尻よりも、こっちの方がいいかしら」"
translation = "「하지만 난 시즈하의 귀여운 엉덩이보다 이쪽이 더 좋을까나」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんはそう言って、シズハの頭を優しく撫でる。"
translation = "사샤 씨는 그렇게 말하며 시즈하의 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker = "シズハ"
original = "「はぅぅ……お姉ちゃんのバカ。これじゃあ私だけ変態みたいじゃない」"
translation = "「하우우…… 누나 바보. 이러면 나만 변태 같잖아」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら。それじゃあこれ、もうやめちゃう……？」"
translation = "「어머 어머. 그러면 이거 이제 그만할까……?」"

[[dialogue]]
speaker = "シズハ"
original = "「それもダメ……。お姉ちゃんはお姉ちゃんなんだから、私のこともっと甘やかして」"
translation = "「그것도 안 돼……. 누나는 누나니까, 나를 더 어리광 받아 줘」"

[[dialogue]]
speaker = "サーシャ"
original = "「大歓迎よ～。シズハが求めてくれるなら、好きなだけ頭なんて撫でてあげるんだから<emoji=heart04>」"
translation = "「대환영이야~. 시즈하가 원한다면 원하는 만큼 머리 정도는 쓰다듬어 줄 테니까♥」"

[[dialogue]]
speaker = "unk"
original = "は～。眼福、眼福"
translation = "하~. 눈 호강이네, 눈 호강."

[[dialogue]]
speaker = "ディーラック"
original = "「……キミたち、遊ぶのもいいけど、ひと段落したらロストアイテムもちゃんと探すんだぞ？」"
translation = "「……자네들, 노는 것도 좋지만 일단락되면 로스트 아이템도 제대로 찾으라구?」"

