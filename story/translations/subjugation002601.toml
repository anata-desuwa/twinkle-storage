[[dialogue]]
speaker = "unk"
original = "それは、とある夏の日のこと──"
translation = "그것은 어느 여름날의 일──"

[[dialogue]]
speaker = "ルリエル"
original = "「海です～～！！」"
translation = "「바다인 것이에욧~~!!」"

[[dialogue]]
speaker = "アポロ"
original = "「わっはっは！\u3000夏といえばやっぱりビーチだよな！」"
translation = "「왓하하! 여름 하면 역시 비치지!」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ……やはりここに来なくては、夏という気がしませんね」"
translation = "「흠…… 역시 이곳에 오지 않으면 여름이라는 기분이 들지 않는군요.」"

[[dialogue]]
speaker = "unk"
original = "絶好の海日和ということで、俺たちはリゾート結界を訪れていた。"
translation = "절호의 바다 날씨라 우리들은 리조트 결계를 방문해 있었다."

[[dialogue]]
speaker = "unk"
original = "先日、桜十路家の遊園地にも新しいプールができていたが、ビーチもそれに負けないくらい賑わっていた。"
translation = "요전 날, 사쿠라코지 가문의 유원지에도 새로운 풀장이 생겼지만, 비치도 그에 못지않게 북적이고 있었다."

[[dialogue]]
speaker = "リップル"
original = "「ハーイ、皆サーン！\u3000リップルデース！\u3000今日はよくぞおいでくださいマシタ！」"
translation = "「하-이, 여러분-! 리플데-스! 오늘은 잘 오셨어마시타!」"

[[dialogue]]
speaker = "リップル"
original = "「せーの……」"
translation = "「하-나, 둘……」"

[[dialogue]]
speaker = "リップル＆ソフィア"
original = "「エンドレスサマーへ、ようこそ！！」"
translation = "「엔들리스 서머에 오신 것을 환영합니다!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ！\u3000目一杯楽しませてもらうわ！」"
translation = "「그래! 마음껏 즐겨 주겠어!」"

[[dialogue]]
speaker = "マトイ"
original = "「すっかりソフィアちゃんがホスト側に……」"
translation = "「어느새 소피아 짱이 호스트 쪽으로……」"

[[dialogue]]
speaker = "サーシャ"
original = "「冬に初めて訪れて以来、すっかり<ruby>足繁<rt>あししげ</rt></ruby>く通うようになっちゃって……ちょっとでも寒い日が続くと、すぐリゾートに行きたがるのよ」"
translation = "「겨울에 처음 방문한 이래로 아주 발길이 잦아져서 다니게 돼버려서…… 조금이라도 추운 날이 계속되면 금방 리조트에 가고 싶어 한단다.」"

[[dialogue]]
speaker = "アポロ"
original = "「海は楽しいもんな！\u3000気持ちはわかるぞ、ソフィア！」"
translation = "「바다는 즐거우니까! 기분은 이해한다고, 소피아!」"

[[dialogue]]
speaker = "unk"
original = "あんまりはしゃぎすぎないように"
translation = "너무 들뜨지 않도록 해."

[[dialogue]]
speaker = "unk"
original = "アポロも……"
translation = "아폴로도……."

[[dialogue]]
speaker = "アポロ"
original = "「大丈夫だっての。心配性だなあ、魔王は」"
translation = "「괜찮다니까. 걱정도 팔자네, 마왕은.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれ──そういえばフィオナはいないの？」"
translation = "「어라── 그러고 보니 피오나는 없어?」"

[[dialogue]]
speaker = "ルリエル"
original = "「フィオナ会長たちは、次の作戦会議があるとかで今日は来れないみたいです♪\u3000その分、わたしが存分に楽しんでくると約束しました！」"
translation = "「피오나 회장님 일행은 다음 작전 회의가 있다면서 오늘은 못 오시는 것 같구욧♪ 그만큼 제가 마음껏 즐기고 오겠다고 약속했어욧!」"

[[dialogue]]
speaker = "マトイ"
original = "「流星の作戦会議……」"
translation = "「유성의 작전 회의……」"

[[dialogue]]
speaker = "アナ"
original = "「それは……地味に戦力外通告されているのでは？」"
translation = "「그건…… 은근슬쩍 전력 외 통보를 받은 것 아닙니까?」"

[[dialogue]]
speaker = "ルリエル"
original = "「え？\u3000ええ？\u3000そ、そんなことないですよねえ、会長さん！？」"
translation = "「에? 에에? 거, 그럴 리 없죠, 회장님!?」"

[[dialogue]]
speaker = "unk"
original = "ソフィアもいるから"
translation = "소피아도 있으니까."

[[dialogue]]
speaker = "unk"
original = "せめて楽しもう"
translation = "적어도 즐기자고."

[[dialogue]]
speaker = "サーシャ"
original = "「今日は私たちだけで貸し切っちゃっていいのかしら？」"
translation = "「오늘은 우리끼리만 빌려도 괜찮은 걸까?」"

[[dialogue]]
speaker = "リップル"
original = "「ハーイ！\u3000ここはプライベート仕様なので、皆サンだけで好きにエンジョイしてもらってＯＫデース！」"
translation = "「하-이! 여기는 프라이빗 사양이라 여러분끼리 마음대로 엔조이해주셔도 OK데-스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「リップルも一緒に遊びましょうよ！」"
translation = "「리플도 같이 놀자!」"

[[dialogue]]
speaker = "リップル"
original = "「Ｏｈ、ありがたい申し出デース！」"
translation = "「Oh, 고마운 제안데-스!」"

[[dialogue]]
speaker = "リップル"
original = "「ですがワタシも流星の皆サンと同じでこれから大事な会議があるのデース。お気持ちだけ頂戴しておきマース」"
translation = "「하지만 저도 유성 여러분과 마찬가지로 이제부터 중요한 회의가 있어마스. 마음만 받아두겠어마-스.」"

[[dialogue]]
speaker = "ソフィア"
original = "「会議……？\u3000私も初耳ですが……」"
translation = "「회의……? 저도 처음 듣는 이야기입니다만……」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ！\u3000イベントのスポンサーサンとハナシをする予定がありマース！」"
translation = "「하이! 이벤트 스폰서 상과 이야기할 예정이 있어마-스!」"

[[dialogue]]
speaker = "unk"
original = "スポンサー？"
translation = "스폰서?"

[[dialogue]]
speaker = "unk"
original = "イベント？"
translation = "이벤트?"

[[dialogue]]
speaker = "リップル"
original = "「よくぞお聞きくださいマシタ！\u3000最近は皆サンのおかげで、リゾート結界もたくさんの生徒サンたちに来てもらえるようになりマシタ」"
translation = "「잘 물어봐주셨어마시타! 최근에는 여러분 덕분에 리조트 결계도 많은 학생 상들이 와주시게 되었어마시타.」"

[[dialogue]]
speaker = "リップル"
original = "「そこで今年の夏は、も～っと盛り上がるように、このリゾート結界あげての『特別イベント』を企画しているのデース！」"
translation = "「그래서 이번 여름은 더~욱 고조되도록, 이 리조트 결계를 통틀어 『특별 이벤트』를 기획하고 있는 것이데-스!」"

[[dialogue]]
speaker = "ルリエル"
original = "「おおっ！」"
translation = "「오오!」"

[[dialogue]]
speaker = "アポロ"
original = "「へえ！\u3000面白そうだな！」"
translation = "「헤에! 재미있겠는데!」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい！\u3000新しいプールも盛り上がってますけど、私は断然リゾート結界派です！\u3000負けていられません！」"
translation = "「네! 새로운 풀장도 활기차지만, 저는 단연 리조트 결계 파입니다! 지고 있을 수 없어요!」"

[[dialogue]]
speaker = "マトイ"
original = "「それで、そのイベントって？」"
translation = "「그래서 그 이벤트라는 게 뭐야?」"

[[dialogue]]
speaker = "リップル"
original = "「フッフッフ……ズバリ！\u3000『水着コンテスト』デース！」"
translation = "「훗훗훗…… 바로! 『수영복 콘테스트』데-스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「水着コンテストですって！？」"
translation = "「수영복 콘테스트라고!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら……」"
translation = "「어머나……」"

[[dialogue]]
speaker = "リップル"
original = "「フフフ。楽しみになってきたでショウ？」"
translation = "「후후후. 기대되기 시작했죠-?」"

[[dialogue]]
speaker = "アポロ"
original = "「おお！\u3000すごいぞリップル！」"
translation = "「오오! 대단해 리플!」"

[[dialogue]]
speaker = "アポロ"
original = "「んで水着コンテストってなんだ？\u3000全員で泳ぎっこでもするのか！？\u3000あたしの犬かきが火を噴く時がきたよーだな！」"
translation = "「근데 수영복 콘테스트가 뭐야? 다 같이 수영 시합이라도 하는 거야!? 내 개헤엄이 불을 뿜을 때가 온 것 같구먼!」"

[[dialogue]]
speaker = "ソフィア"
original = "「いえ、水着コンテストというと通常……」"
translation = "「아니요, 수영복 콘테스트라고 하면 보통……」"

[[dialogue]]
speaker = "リップル"
original = "「よりセクシーな水着姿を披露したレディが優勝デース！\u3000みなみなこぞって参加してクダサーイ！」"
translation = "「더 섹시한 수영복 자태를 선보인 레이디가 우승데-스! 모두 모두 모여서 참가해주세-요!」"

[[dialogue]]
speaker = "アポロ"
original = "「セクシーだと！？」"
translation = "「섹시라고!?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。この手の審査においては通常、大人びたプロポーションが好まれますから──お子さま体型のアポロさんには向かないかと」"
translation = "「네. 이런 종류의 심사에서는 보통 어른스러운 프로포션이 선호되니까── 어린애 체형인 아폴로 씨에게는 맞지 않을 듯하군요.」"

[[dialogue]]
speaker = "アポロ"
original = "「そうなのか？\u3000でもあたし、アナとかソフィアとそう変わんないぞ？」"
translation = "「그래? 하지만 나, 아나나 소피아랑 별반 다르지 않다고?」"

[[dialogue]]
speaker = "アナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "２人とも魅力的"
translation = "둘 다 매력적이야."

[[dialogue]]
speaker = "unk"
original = "アナ、落ち着いて"
translation = "아나, 진정해."

[[dialogue]]
speaker = "マトイ"
original = "「にしても、今どき水着コンテストって──むしろ時代に逆行してない？」"
translation = "「그건 그렇고 요즘 세상에 수영복 콘테스트라니── 오히려 시대에 역행하고 있지 않아?」"

[[dialogue]]
speaker = "アナ"
original = "「そうですね。昨今は身体的な美を審査するのもどうかという観点から、見直されることも多いのですが……」"
translation = "「그렇군요. 최근에는 신체적인 미를 심사하는 것도 어떤가 하는 관점에서 재고되는 경우도 많습니다만……」"

[[dialogue]]
speaker = "リップル"
original = "「そーなのデスか？\u3000しかしビーチでは定番のイベントとお聞きシマシタ！\u3000スポンサーサンから」"
translation = "「그-런가요? 하지만 비치에서는 정석인 이벤트라고 들었어마스! 스폰서 상에게서.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら……」"
translation = "「어머나……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そのスポンサーからの情報、ちょっと偏ってない……？」"
translation = "「그 스폰서의 정보, 좀 편향된 거 아냐……?」"

[[dialogue]]
speaker = "unk"
original = "──などと、不安な空気になりかけていたところ……。"
translation = "──라며 불안한 공기가 감돌려던 찰나……."

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ──何やら騒がしいと思ったら、星徒会の諸君か」"
translation = "「후후후── 왠지 소란스럽다 했더니 성도회 제군들인가.」"

[[dialogue]]
speaker = "ソフィア"
original = "「！\u3000あなたは──」"
translation = "「! 당신은──」"

[[dialogue]]
speaker = "unk"
original = "もしかして……"
translation = "설마……."

[[dialogue]]
speaker = "unk"
original = "スポンサーって……"
translation = "스폰서라는 게……."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヘレナちゃん！？」"
translation = "「헬레나 짱!?」"

