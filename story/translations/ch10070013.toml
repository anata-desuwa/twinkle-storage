[[dialogue]]
speaker = "unk"
original = "第３話,三界の柱？,P"
translation = "제3화, 삼계의 기둥?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「むむ……むむむむ…………」"
translation = "「으음…… 으으으음…………」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、新星の会長さんっ、こんにちはっ。実はわたし……大変なことに気付いてしまったかもしれないのです」"
translation = "「아, 신성의 회장님, 안녕하세요! 사실 저…… 큰일인 걸 깨달아버렸을지도 몰라요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「天界と人間界を繋ぐ柱になれと、じっちゃんはわたしに言いました。わたしはそのために頑張ってきました」"
translation = "「천계와 인간계를 잇는 기둥이 되라고 할아버지는 저에게 말씀하셨어요. 저는 그걸 위해 노력해 왔고요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもそれってどういう意味なんでしょうか？」"
translation = "「하지만 그게 무슨 의미일까요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「天界と人間界の柱……でも天界と人間界を繋いでいるのってフィーニスの塔ですよね？」"
translation = "「천계와 인간계의 기둥…… 하지만 천계와 인간계를 잇고 있는 건 피니스 탑이잖아요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「フィーニスの塔みたいに大きくなればいいんでしょうか？\u3000でも天界に届くくらい背が高くなるなんて無理ですよぅ……」"
translation = "「피니스 탑처럼 커지면 되는 걸까요? 하지만 천계에 닿을 정도로 키가 커지는 건 무리예요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……柱はたとえ？\u3000柱のように頼りになる人？\u3000あぁ～、なんだ、そういうことなのですねっ」"
translation = "「……기둥은 비유? 기둥처럼 의지가 되는 사람? 아아~ 뭐야, 그런 거였군요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「柱のようにすごい人……つまりフィオナ会長ですっ。ルリエルがフィオナ会長のように……」"
translation = "「기둥처럼 대단한 사람…… 즉 피오나 회장님이에요! 루리엘이 피오나 회장님처럼……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「流星学園星徒会長のルリエルなのですっ。流星市国、そして世界はこのスーパー天使ルリエルが守るのですよ」"
translation = "「유성 학원 성도회장 루리엘입니다! 유성시국, 그리고 세계는 이 슈퍼 천사 루리엘이 지키는 거예요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「星徒会長たるもの、生徒の声を聞くことも仕事なのです。え～、なになに……部活の予算？\u3000グラウンドの使用許可？」"
translation = "「성도회장이라면 학생들의 목소리를 듣는 것도 일이죠. 에~ 어디 보자…… 동아리 예산? 운동장 사용 허가?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あれ、この書類ってどうするんでしょうか？\u3000どの先生のところに行けばいいんでしたっけ？」"
translation = "「어라, 이 서류는 어떻게 하는 걸까요? 어느 선생님께 가야 했더라?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ルリエル会長、転生ゲームやりませんか？」"
translation = "「루리엘 회장님, 전생 게임 하지 않을래요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わーい、やるのです～♪」"
translation = "「와아, 할래요~♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うぅ～っ、ルリエルにはできる気がしないのです……」"
translation = "「우으~ 루리엘에게는 할 수 있을 것 같지 않아요……」"

[[dialogue]]
speaker = "unk"
original = "そこで遊ばなければいいのでは……？"
translation = "거기서 놀지 않으면 되는 거 아냐……?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いやぁ～……フィリスティアでは友達と遊んだりできなかったのでついつい……」"
translation = "「그게~…… 필리스티아에서는 친구랑 놀거나 할 수 없었어서 그만……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも！\u3000副会長ならできるかもしれません。セーラ先輩みたいに……」"
translation = "「하지만! 부회장이라면 할 수 있을지도 몰라요. 세라 선배처럼……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちょりーっす、ルリエルだよ～。うちさ、流星学園で副会長してるんだよね～」"
translation = "「쵸리~쓰, 루리엘이야~. 나 말이야, 유성 학원에서 부회장 하고 있거든~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「やっぱギャルなら映えだよね～。タピオカ持って～、ＤＩＳＣで撮ってアップっと。キャハハ～」"
translation = "「역시 갸루라면 사진빨이지~. 타피오카 들고~ DISC로 찍어서 업로드 완료. 캬하하~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あとは～……ギャルって何すればいいんだっけ？\u3000ネイル？\u3000日サロ？\u3000え～っとぉ……」"
translation = "「다음은~…… 갸루는 뭘 해야 하더라? 네일? 태닝? 에~ 그러니까……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うーん、ルリエルにギャルは難しいのです……」"
translation = "「으음, 루리엘에게 갸루는 어려워요……」"

[[dialogue]]
speaker = "unk"
original = "（副会長と関係なくなってる……）"
translation = "(부회장하고 상관없어지고 있어……)"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ではユウリ先輩なら……」"
translation = "「그럼 유우리 선배라면……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「オラオラオラー！\u3000オレは流星星徒会の特攻隊長、ルリエル様だー！」"
translation = "「오라오라오라! 나는 유성 성도회의 특공대장, 루리엘 님이시다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「モンスターだろうがリクリエだろうが、オレ様がぶっ飛ばしてやるぜ！\u3000あーっはっはっは！」"
translation = "「몬스터든 리크리에든, 이 몸이 날려버려 주겠어! 아~하하하!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あん？\u3000意見の陳情？\u3000星徒会に逆らう連中もまとめてボッコボコにしてやる！\u3000流星学園は星徒会の天下だぜ！」"
translation = "「앙? 의견 진정? 성도회에 대드는 녀석들도 한꺼번에 박살 내주마! 유성 학원은 성도회의 천하다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あはははっ、楽しそうですぅ～」"
translation = "「아하하하, 즐거워 보여요~」"

[[dialogue]]
speaker = "unk"
original = "（絶対そんなんじゃなかった）"
translation = "(절대 그런 느낌 아니었어)"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも柱って感じではないですねぇ。ソフィアなら――」"
translation = "「하지만 기둥이라는 느낌은 아니네요. 소피아라면――」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ちょっと待ってください」"
translation = "「잠시 기다려 주세요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おわぁっ！？」"
translation = "「오와앗!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「妙に変な予感がして来てみれば、何失礼なことしてるんですか。これじゃ私は『うぅ～、寒いですぅ～』って震えるだけになるじゃないですか」"
translation = "「묘하게 이상한 예감이 들어서 와보니, 무슨 실례되는 짓을 하는 건가요. 이러면 저는 『우으~ 추워요~』라며 떨기만 하는 사람이 되잖아요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そそ、そんなことはないのですよ……？」"
translation = "「그, 그럴 리가 없잖아요……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「目が泳いでる……」"
translation = "「눈동자가 흔들리고 있어요……」"

[[dialogue]]
speaker = "unk"
original = "（完全に図星の反応だ……）"
translation = "(완전히 정곡을 찔린 반응이다……)"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うーん、ルリエルでは他の皆さんのようにはなれなさそうですね……どうすればいいのでしょうかぁ？」"
translation = "「으음, 루리엘은 다른 분들처럼은 될 수 없을 것 같네요…… 어떻게 하면 좋을까요?」"

