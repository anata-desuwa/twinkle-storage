[[dialogue]]
speaker = "unk"
original = "第１話,もう１人の転入生,P"
translation = "제1화, 또 한 명의 전입생, P"

[[dialogue]]
speaker = "unk"
original = "ある日、トワ先生と街へ買い出しに出掛けていた時のこと――"
translation = "어느 날, 토와 선생님과 시내로 비품을 사러 나갔을 때의 일──"

[[dialogue]]
speaker = "トワ先生"
original = "「いや～、キミが備品の買い出しを手伝ってくれて、先生助かっちゃったよ～♪」"
translation = "「이야~, 자네가 비품 구매를 도와줘서 선생님은 정말 살았어~♪」"

[[dialogue]]
speaker = "unk"
original = "困った時は手伝いますから、言って下さい"
translation = "곤란할 때는 도와드릴 테니 말씀해 주세요."

[[dialogue]]
speaker = "トワ先生"
original = "「ありがとう♪\u3000その時はまたお願いしちゃおうかな。……あれ？」"
translation = "「고마워♪ 그때는 또 부탁해 버릴까나. ……어라?」"

[[dialogue]]
speaker = "フェニエル"
original = "「うぅ……都会の街はなまら複雑で、まるで迷路です……」"
translation = "「으으…… 도시 거리는 참말로 복잡해서 마치 미로 같아요……」"

[[dialogue]]
speaker = "unk"
original = "何か困り事ですか？"
translation = "무슨 곤란한 일이라도 있나요?"

[[dialogue]]
speaker = "unk"
original = "こんにちは"
translation = "안녕하세요."

[[dialogue]]
speaker = "フェニエル"
original = "「ぴぃっ！？\u3000ど、同年代の男の人……！」"
translation = "「삐익!? 또, 또래 남자분……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「どどどどうしよう、声掛けてもらったのは嬉しいけど、私、人見知りだし、知らない男の人だし……あわわわ……」"
translation = "「어어어어떡하지, 말을 걸어주신 건 기쁘지만, 나, 낯가림도 심하고 모르는 남자분이고…… 아와와와……」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっと、驚かせちゃってごめんね？\u3000私は新星学園というところで教師をしている、トワって言うの」"
translation = "「저기, 놀라게 해서 미안해? 나는 신성학원이라는 곳에서 교사를 하고 있는 토와라고 해.」"

[[dialogue]]
speaker = "トワ先生"
original = "「こっちの男の子は、その学園の星徒会長で……だから、怪しい者じゃないから安心して？」"
translation = "「이쪽 소년은 그 학원의 성도회장이고…… 그러니까 수상한 사람이 아니니까 안심해?」"

[[dialogue]]
speaker = "フェニエル"
original = "「新星学園……！\u3000それって、流星学園の隣にある……？」"
translation = "「신성학원……! 그거, 유성학원 옆에 있는……?」"

[[dialogue]]
speaker = "フェニエル"
original = "「し、失礼しました……私、初めての上京で、緊張してしまって……」"
translation = "「실, 실례했습니다…… 저, 처음 하는 상경이라 긴장해 버려서……」"

[[dialogue]]
speaker = "フェニエル"
original = "「私の名前は、フェニエルって言います。この度、流星学園に入学することになった、転入生ですっ」"
translation = "「제 이름은 페니엘이라고 합니다. 이번에 유성학원에 입학하게 된 전입생이에요!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、俺と同じだ"
translation = "그럼 나랑 똑같네."

[[dialogue]]
speaker = "unk"
original = "転入生！"
translation = "전입생!"

[[dialogue]]
speaker = "フェニエル"
original = "「えっ、会長さんも転入生だったんですか……？\u3000でも、会長をされているんですよね？」"
translation = "「엣, 회장님도 전입생이었나요……? 하지만 회장을 맡고 계신 거죠?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふふっ、やっぱりそう思うよね！\u3000それがアニメとか漫画みたいな展開でね――」"
translation = "「후훗, 역시 그렇게 생각하지! 그게 애니메이션이나 만화 같은 전개라서 말이야──」"

[[dialogue]]
speaker = "フェニエル"
original = "「そんなことが……！\u3000転入してすぐに会長になっちゃうなんて、なまら凄いです！」"
translation = "「그런 일이……! 전입하자마자 회장이 되어버리다니, 참말로 대단해요!」"

[[dialogue]]
speaker = "unk"
original = "自分でもまだ実感湧かないんだけどね"
translation = "나 자신도 아직 실감이 안 나지만 말이야."

[[dialogue]]
speaker = "フェニエル"
original = "「私も同じです。まさか自分が星騎士になるだなんて、ついこの間までは思ってませんでしたから……」"
translation = "「저도 마찬가지예요. 설마 제가 별의 기사가 될 줄은 요 전까지는 생각도 못 했으니까요……」"

[[dialogue]]
speaker = "トワ先生"
original = "「え？\u3000それってどういう……」"
translation = "「에? 그건 무슨……」"

[[dialogue]]
speaker = "フェニエル"
original = "「実は私、この間まで星力を持ってなかったんです。事故に遭って、能力に目覚めて……」"
translation = "「사실 저, 요 전까지는 성력을 가지고 있지 않았어요. 사고를 당해서 능력에 눈을 뜨게 되어서……」"

[[dialogue]]
speaker = "トワ先生"
original = "「後天的に突然覚醒したってこと！？\u3000驚いた。かなり珍しいケースだよ……！」"
translation = "「후천적으로 갑자기 각성했다는 거야!? 놀랍네. 꽤 드문 케이스야……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「それどころか、これまで私、自分のことを人間だと思ってたんです。でも、いざ能力に覚醒したら、頭に羽が生えて来て……どうやら私、純血の天使だったみたいで」"
translation = "「그뿐만 아니라 지금까지 저, 제 자신을 인간이라고 생각했어요. 하지만 막상 능력에 각성하니까 머리에 날개가 돋아나서…… 아무래도 저, 순혈 천사였나 봐요.」"

[[dialogue]]
speaker = "unk"
original = "えっ、でもご両親は……？"
translation = "엣, 하지만 부모님은……?"

[[dialogue]]
speaker = "フェニエル"
original = "「ああ、えっと私、北海道の孤児院で育ったんです。といっても、子供は私しか居なくて、廃業していた院長先生がご厚意で育てて下さってただけなんですけど」"
translation = "「아아, 저기 저는 홋카이도의 고아원에서 자랐어요. 그렇다고 해도 아이는 저밖에 없었고, 폐업하셨던 원장 선생님이 호의로 키워주셨을 뿐이지만요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「両親は昔、事故で亡くなってて……天使だった両親が、どうして人間界で暮らしていたのかは、よく分かっていないんです」"
translation = "「부모님은 옛날에 사고로 돌아가셔서…… 천사였던 부모님이 어째서 인간계에서 살고 계셨는지는 잘 모르겠어요.」"

[[dialogue]]
speaker = "unk"
original = "変なこと聞いて、ごめん"
translation = "이상한 걸 물어봐서 미안해."

[[dialogue]]
speaker = "unk"
original = "そうだったんだ……"
translation = "그랬었구나……"

[[dialogue]]
speaker = "フェニエル"
original = "「いえ！\u3000言い出したのは私ですし、私自身も純血の天使だと知った時は同じ疑問を持ちましたから、お気になさらないで下さい！」"
translation = "「아니에요! 말을 꺼낸 건 저고, 저 자신도 순혈 천사라는 걸 알았을 때는 똑같은 의문을 가졌으니까 신경 쓰지 마세요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「それに村の皆さんが私を家族だと言ってくれて、実の娘のように育ててくれたので……境遇が不幸だとか、悲しいとか思ったことは全然ないんです」"
translation = "「게다가 마을 분들이 저를 가족이라고 해주시고 친딸처럼 키워주셔서…… 처지가 불행하다거나 슬프다고 생각한 적은 전혀 없어요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「むしろ上京して、皆と離れてしまったことが不安で、ちょっと寂しかったんですけど……こうして、会長さんやトワ先生とも出会えましたし！」"
translation = "「오히려 상경해서 모두와 떨어져 버린 것이 불안해서 조금 외로웠지만…… 이렇게 회장님이나 토와 선생님과도 만날 수 있었으니까요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「どうぞ私のことは、『フニ』と呼んで下さい。院長先生が付けてくれた、お気に入りの愛称なんですっ」"
translation = "「부디 저를 『후니』라고 불러주세요. 원장 선생님이 지어주신 마음에 드는 애칭이에요!」"

[[dialogue]]
speaker = "unk"
original = "わかった。よろしくね、フニ"
translation = "알았어. 잘 부탁해, 후니."

[[dialogue]]
speaker = "トワ先生"
original = "「フニちゃん、学園は違いますけど、困ったことがあれば先生を頼って下さいね！\u3000連絡先も交換しましょう♪」"
translation = "「후니짱, 학원은 다르지만 곤란한 일이 있으면 선생님을 의지하렴! 연락처도 교환하자♪」"

[[dialogue]]
speaker = "フェニエル"
original = "「はいっ、ありがとうございます、トワ先生！」"
translation = "「네! 감사합니다, 토와 선생님!」"

[[dialogue]]
speaker = "unk"
original = "フニは何に困っていたんだ？"
translation = "후니는 무엇 때문에 곤란해하고 있었어?"

[[dialogue]]
speaker = "unk"
original = "それで、話は戻るけど"
translation = "그래서 이야기가 돌아가는데."

[[dialogue]]
speaker = "フェニエル"
original = "「えっと、実は……お恥ずかしながら、こんな大都会に来るのは、初めてで……」"
translation = "「저기, 사실은…… 부끄럽게도 이런 대도시에 오는 건 처음이라서……」"

[[dialogue]]
speaker = "フェニエル"
original = "「流星学園までの道が分からなくて、迷ってしまいました……」"
translation = "「유성학원까지 가는 길을 몰라서 길을 잃어버렸어요……」"

[[dialogue]]
speaker = "トワ先生"
original = "「それなら、先生達も学園に帰るところだったから、一緒に行こう♪\u3000あ、ただその前に、買い出しの荷物が山のようにあって――」"
translation = "「그렇다면 선생님들도 학원에 돌아가려던 참이었으니까 같이 가자♪ 아, 다만 그전에 구매한 짐이 산더미처럼 있어서──」"

[[dialogue]]
speaker = "トワ先生"
original = "「宅配便で送る手配をしなくちゃいけないから、その後で大丈夫かな？」"
translation = "「택배로 보낼 수속을 해야 하니까 그 후에 괜찮을까?」"

[[dialogue]]
speaker = "フェニエル"
original = "「それは全然大丈夫です！\u3000……でも、荷物というのは、そこに積んでらっしゃるもので全部ですか？」"
translation = "「그건 전혀 괜찮아요! ……하지만 짐이라는 건 거기에 쌓여 있는 게 전부인가요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん、ここの縦一列の段ボールで全部……って、フニちゃん！？」"
translation = "「응, 여기 세로 한 줄 골판지 상자가 전부…… 어, 후니짱!?」"

[[dialogue]]
speaker = "フェニエル"
original = "「でしたら……」"
translation = "「그렇다면……」"

[[dialogue]]
speaker = "トワ先生"
original = "「ちょっと待って、それ全部は持ち上げられないし、危ないよ！」"
translation = "「잠깐 기다려, 그거 전부는 못 들어 올리고 위험해!」"

[[dialogue]]
speaker = "フェニエル"
original = "「よっと」"
translation = "「영차.」"

[[dialogue]]
speaker = "トワ先生"
original = "「え……ええぇぇぇっ！？」"
translation = "「에…… 에에에에엑!?」"

[[dialogue]]
speaker = "unk"
original = "軽々と持ち上げた！？"
translation = "가볍게 들어 올렸어!?"

[[dialogue]]
speaker = "トワ先生"
original = "「えっ！？\u3000変身してないどころか、星力使ってないよね！？\u3000どうやってるのそれ！？」"
translation = "「엣!? 변신하지 않은 건 물론이고 성력도 안 썼지!? 어떻게 한 거야 그거!?」"

[[dialogue]]
speaker = "フェニエル"
original = "「昔から村の人たちのお手伝いをしていたら、自然と力持ちになりました」"
translation = "「옛날부터 마을 분들 일을 도와드렸더니 자연스럽게 힘이 세졌어요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「だからこれも、私に優しくしてくれた皆さんのおかげです♪」"
translation = "「그러니까 이것도 저에게 친절하게 대해주신 여러분 덕분이에요♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「力持ちとか、そういうレベルかな……！？\u3000物理法則が歪んで見えるけど！」"
translation = "「힘이 세다거나 그런 차원일까나……!? 물리 법칙이 왜곡되어 보이는데!」"

[[dialogue]]
speaker = "unk"
original = "──こうして、俺はもう１人の転入生と知り合いになったのだった。"
translation = "──이렇게 해서 나는 또 한 명의 전입생과 알게 된 것이었다."

