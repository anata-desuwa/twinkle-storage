[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、連れてきてくれてありがとう～！」"
translation = "「오빠, 데려와 줘서 고마워~!」"

[[dialogue]]
speaker = "unk"
original = "リーナが海の家で焼きそばを食べたいと言ったので、俺たちは流星市国を少し離れた海水浴場に来ていた。"
translation = "리나가 바닷가 집에서 야키소바를 먹고 싶다고 해서 우리는 유성시국을 조금 벗어난 해수욕장에 와 있었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「テレビでね、海の家の焼きそばはおいしいって言ってたから、来てみたかったんだぁ。焼きそば、本当においしいね」"
translation = "「TV에서 바닷가 집 야키소바는 맛있다고 해서 와보고 싶었어어. 야키소바 정말 맛있다」"

[[dialogue]]
speaker = "unk"
original = "リゾート結界もいいけど、折角だから思い切って、実際にリーナが見た海の家までやってきた。"
translation = "리조트 결계도 좋지만 기왕 온 김에 리나가 실제로 본 바닷가 집까지 찾아왔다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「食べたら、一緒に遊ぼうね。スイカ割りはこの前したし……う～ん、どうしよっかな～。あははっ！」"
translation = "「다 먹으면 같이 놀자. 수박 깨기는 저번에 했고…… 으음, 어떻게 할까나~. 아하하!」"

[[dialogue]]
speaker = "unk"
original = "焼きそばがお気に召したようで、リーナは上機嫌だ。連れてきてよかった。"
translation = "야키소바가 마음에 들었는지 리나는 기분이 매우 좋다. 데려오길 잘했다."

[[dialogue]]
speaker = "unk"
original = "──この時まではそう思っていた。"
translation = "──이때까지는 그렇게 생각했다."

[[dialogue]]
speaker = "unk"
original = "リーナに泳ぎ方を教えていたら、いつの間にか海水浴場から離れてしまったようだ。"
translation = "리나에게 수영을 가르쳐주다 보니 어느샌가 해수욕장에서 멀어진 모양이다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふふっ<emoji=heart04>\u3000……２人きりになっちゃったね、お兄ちゃん」"
translation = "「후훗<emoji=heart04> ……둘만 남게 됐네, 오빠」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ぎゅ～っ<emoji=heart04>」"
translation = "「꾸욱<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "不意にリーナが抱き着いてきた。水着越しに女の子の柔らかい感触が伝わってくる。"
translation = "갑자기 리나가 안겨 왔다. 수영복 너머로 여자아이의 부드러운 감촉이 전해진다."

[[dialogue]]
speaker = "unk"
original = "まずい。そう思ったときには、俺の体も反応してしまっていた。"
translation = "위험하다. 그렇게 생각했을 때는 이미 내 몸도 반응하고 있었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ダメだよ、お兄ちゃん。お外でおち○ちんおっきくしちゃ……あはっ、お兄ちゃんの固いの、リーナのお腹にあたってる」"
translation = "「안 돼, 오빠. 밖에서 자지 커지면…… 아하, 오빠의 딱딱한 거, 리나 배에 닿고 있어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「すーり、すーり…………あっ<emoji=heart04>\u3000おち○ちんびくんって動いたぁ<emoji=heart04>\u3000そんなにリーナとえっちしたいんだ？」"
translation = "「부비, 부비………… 앗<emoji=heart04> 자지 움찔하고 움직였어어<emoji=heart04> 그렇게 리나랑 섹스하고 싶어?」"

[[dialogue]]
speaker = "unk"
original = "小悪魔的な笑みを浮かべ、体を擦りつけてくるリーナ。"
translation = "소악마 같은 미소를 지으며 몸을 비벼오는 리나."

[[dialogue]]
speaker = "unk"
original = "首を横に振らなければいけないはずなのに……気が付いたら頷いていた。"
translation = "고개를 저어야만 하는데…… 정신을 차려보니 고개를 끄덕이고 있었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「いいよ、お兄ちゃん。リーナもお兄ちゃんとエッチしたい……<emoji=heart04>」"
translation = "「좋아, 오빠. 리나도 오빠랑 섹스하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「見て見て、リーナのおま○こ、お兄ちゃんのおち○ちんが欲しくて、もうこんなになっちゃった」"
translation = "「봐봐, 리나 보지, 오빠 자지 갖고 싶어서 벌써 이렇게 돼버렸어」"

[[dialogue]]
speaker = "unk"
original = "水着をずらし、秘所を見せつけるリーナ。"
translation = "수영복을 걷어내고 비소를 과시하는 리나."

[[dialogue]]
speaker = "unk"
original = "当然、濡れているのは海水ではない。可愛らしい水着のはずがひどく淫靡に映る。"
translation = "당연히 젖어있는 것은 바닷물이 아니다. 귀여운 수영복이었을 텐데 몹시 음란하게 비친다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ほら、いつもみたいに指いれてぇ。お兄ちゃんのなが～い指でリーナのおま○こなでなでしてぇ<emoji=heart04>」"
translation = "「자, 평소처럼 손가락 넣어줘. 오빠의 기~다란 손가락으로 리나 보지 쓰담쓰담해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言われるがままに、リーナの膣に指を挿れる。小さな体に似合いの小さな穴。熱さと締め付けにくらくらする。"
translation = "시키는 대로 리나의 질에 손가락을 넣는다. 작은 몸에 어울리는 작은 구멍. 열기와 조임에 어질어질하다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「っ、あっ<emoji=heart04>\u3000お兄ちゃんの、指、すごいっ<emoji=heart04>\u3000リーナの指じゃ、届かないとこ、お兄ちゃんの指でなでなで、されてるっ<emoji=heart04>」"
translation = "「윽, 앗<emoji=heart04> 오빠 손가락 굉장해앗<emoji=heart04> 리나 손가락으론 안 닿는 곳을 오빠 손가락으로 쓰담쓰담 당하고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ん、リーナ、これ好きぃ<emoji=heart04>\u3000あっ……んん……<emoji=heart04>」"
translation = "「응, 리나 이거 좋아아<emoji=heart04> 앗…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一度寝込みを襲われてから、歯止めが利かずにリーナの誘惑に屈し続けている。"
translation = "한번 잠결에 덮쳐진 후로 제동이 걸리지 않은 채 리나의 유혹에 계속 굴복하고 있다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あぁっ<emoji=heart04>\u3000お兄ちゃんの指、おっきいのっ<emoji=heart04>\u3000リーナの中でお兄ちゃん感じると、おま○こキュンキュンしちゃうっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 오빠 손가락 커어엇<emoji=heart04> 리나 안에서 오빠 느끼니까 보지 큥큥거려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "せめて痛くないようにと前戯をしっかりするようにしたら、リーナはこれを気に入ってしまったようだ。"
translation = "적어도 아프지 않게 전희를 확실히 해줬더니 리나는 이것을 마음에 들어 한 모양이다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふうぅ、ん、あっ<emoji=heart04>\u3000ん、ん、あぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「후우우, 응, 앗<emoji=heart04> 응, 응, 아아앗<emoji=heart04> 응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の指の動きに合わせて、リーナが声を上げる。溢れだす蜜は、彼女が女であることを俺に突き付ける。"
translation = "내 손가락의 움직임에 맞춰 리나가 소리를 낸다. 흘러넘치는 애액은 그녀가 여자라는 사실을 나에게 들이민다."

[[dialogue]]
speaker = "unk"
original = "それを否定することは絶対にできない。<ruby>妹<rt>リーナ</rt></ruby>を女にしたのは俺だからだ。"
translation = "그것을 부정할 수는 절대로 없다. <ruby>여동생<rt>리나</rt></ruby>을 여자로 만든 것은 나니까."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……お兄ちゃん。リーナ、指だけじゃ我慢できないよ。お兄ちゃんのおち○ちん、欲しいな……」"
translation = "「……오빠. 리나, 손가락만으로는 못 참겠어. 오빠 자지 갖고 싶어……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんもリーナのおま○こにおち○ちん挿れたいよね？\u3000お兄ちゃんのおち○ちん、リーナのおま○こでいっぱいぎゅーってしてあげる」"
translation = "「오빠도 리나 보지에 자지 넣고 싶지? 오빠 자지, 리나 보지로 가득 꽉 조여줄게」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「だから、お兄ちゃんのおち○ちん──ちょうだい<emoji=heart04>」"
translation = "「그러니까 오빠 자지── 줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「んんっ──<emoji=heart04>\u3000お兄ちゃんが、リーナの中、入ってきたっ<emoji=heart04>」"
translation = "「응응──<emoji=heart04> 오빠가 리나 안에 들어왔어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナが腰を下ろし、俺のペニスを咥え込む。"
translation = "리나가 허리를 내리며 내 페니스를 삼킨다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ん……ふう……はぁ……お兄ちゃんの、おっきくて、硬くて……は、あ……リーナのお腹、押し広げられてる……」"
translation = "「음…… 후우…… 하아…… 오빠 거, 크고 딱딱해서…… 하, 아…… 리나 배가 억지로 벌려지고 있어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「痛くない？」"
translation = "「아프지 않아?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ううん、ちょっとびっくりしただけ……でも、まだ、動かないで……」"
translation = "「으응, 조금 깜짝 놀랐을 뿐…… 하지만 아직 움직이지 마……」"

[[dialogue]]
speaker = "unk"
original = "身体が小さい分、膣も小さく、ペニスを受け入れるだけでも苦しげだ。しっかり濡らしても、入れたばかりはきついようだ。"
translation = "몸이 작은 만큼 질도 작아서 페니스를 받아들이는 것만으로도 고통스러워 보인다. 충분히 적셔도 갓 넣었을 때는 빡빡한 모양이다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「んん、ふぅ……はぁ……お兄ちゃんが、リーナの中にいる……嬉しい……<emoji=heart04>」"
translation = "「응응, 후우…… 하아…… 오빠가 리나 안에 있어…… 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "繋がったところから肉の感触を感じる。わずかな刺激でさえ心地いい。"
translation = "이어진 곳에서 살의 감촉이 느껴진다. 아주 작은 자극조차 기분 좋다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……お兄ちゃんのおち○ちん、リーナの中でビクビクしてる。気持ちいいんだ？」"
translation = "「……오빠 자지, 리나 안에서 파르르 떨고 있어. 기분 좋은 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ、ああ……すごく気持ちいいよ」"
translation = "「아, 아아…… 정말 기분 좋아」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふふっ、よかった。リーナも、お兄ちゃんのおち○ちん気持ちいいよ<emoji=heart04>」"
translation = "「후훗, 다행이다. 리나도 오빠 자지 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナの膣は狭く、きゅっと締め付けてくる。甘えるように吸い付いてくると感じるのは、俺の願望だろうか。"
translation = "리나의 질은 좁고 꽉 조여온다. 어리광 부리듯 빨아들이는 듯한 느낌은 내 원망일까."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……ん、そろそろ動いていいよ。リーナのおま○こでいっぱい気持ちよくなってね<emoji=heart04>」"
translation = "「……응, 이제 움직여도 돼. 리나 보지로 잔뜩 기분 좋아져줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あっ、んん、ふあっ<emoji=heart04>\u3000んん、あぁ～っ<emoji=heart04>\u3000あふっ、あ、ああ～<emoji=heart04>」"
translation = "「앗, 응응, 후앗<emoji=heart04> 응응, 아아~앗<emoji=heart04> 아흑, 아, 아아~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナの求めに応じて、ゆっくり腰を動かす。"
translation = "리나의 요구에 맞춰 천천히 허리를 움직인다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんのおち○ちん、リーナの中ずるずるって擦れてる……体の奥がぞくぞく、するっ<emoji=heart04>\u3000ひぁあ、あぁっ……んぁ～っ……<emoji=heart04>」"
translation = "「오빠 자지, 리나 안에서 찌릿찌릿 긁히고 있어…… 몸 안쪽이 오싹오싹해앳<emoji=heart04> 히아아, 아앗…… 응아~앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の動きに合わせて、リーナも腰を揺らす。いけないと分かっていても、抗えない快楽に脳が染まっていく。"
translation = "내 움직임에 맞춰 리나도 허리를 흔든다. 안 된다는 걸 알면서도 거부할 수 없는 쾌락에 뇌가 물들어간다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、ふああっ<emoji=heart04>\u3000お兄ちゃん、大好きっ<emoji=heart04>\u3000お兄ちゃんのおち○ちんも大好きっ<emoji=heart04>\u3000あ、ふぁっ、大好きって気持ちがお腹の奥からあふれてくるのっ<emoji=heart04>」"
translation = "「아, 후아앗<emoji=heart04> 오빠 정말 좋아<emoji=heart04> 오빠 자지도 정말 좋아아<emoji=heart04> 아, 후앗, 좋아한다는 마음이 배 속 깊은 곳에서 넘쳐나앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「好き、好き、好き、好き、大好き、お兄ちゃん大好きっ<emoji=heart04>」"
translation = "「좋아, 좋아, 좋아, 좋아, 정말 좋아, 오빠 정말 좋아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「優しいのが好き、お願い聞いてくれるのが好き、リーナのこと見てくれるのが好きっ<emoji=heart04>」"
translation = "「상냥한 게 좋아, 부탁 들어주는 게 좋아, 리나 봐주는 게 좋아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんは？\u3000お兄ちゃんはリーナのこと好き？」"
translation = "「오빠는? 오빠는 리나 좋아해?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……大好きだよ」"
translation = "「아아…… 정말 좋아해」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、ああっ<emoji=heart04>\u3000やったぁ……嬉しいなぁ…………えへへ<emoji=heart04>」"
translation = "「아, 아앗<emoji=heart04> 앗싸…… 기쁘다아………… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナの甘い声が理性を麻痺させる。リーナの笑顔を見ると、自分は間違ってないと信じたくなってしまう。"
translation = "리나의 달콤한 목소리가 이성을 마비시킨다. 리나의 미소를 보면 자신이 틀리지 않았다고 믿고 싶어진다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「わたしも、ん、大好きだよっ<emoji=heart04>\u3000だからいっぱいいっぱい気持ちよくなってっ<emoji=heart04>」"
translation = "「나도, 응, 정말 좋아해애앗<emoji=heart04> 그러니까 잔뜩잔뜩 기분 좋아져엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000リーナで、もっと気持ちよくなってぇ<emoji=heart04>」"
translation = "「오빠<emoji=heart04> 오빠<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 리나로 더 기분 좋아져줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さいけどちゃんと膨らんだ胸が押し付けられ、否応にも女を意識させられる。"
translation = "작지만 확실히 부풀어 오른 가슴이 밀착되어 어쩔 수 없이 여자를 의식하게 된다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、ふあ、ああっ<emoji=heart04>\u3000んん、あ、ふあっ<emoji=heart04>\u3000────あぁっ<emoji=heart04>」"
translation = "「아, 후아, 아앗<emoji=heart04> 응응, 아, 후앗<emoji=heart04> ────아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「今の、すごい…………おち○ちん、奥まで、来たっ<emoji=heart04>」"
translation = "「방금 거 대단해………… 자지, 끝까지 왔어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナは体が小さいから、簡単に奥まで貫いてしまう。俺にも確かな感触があった。"
translation = "리나는 몸이 작아서 간단히 끝까지 꿰뚫어 버린다. 나에게도 확실한 감촉이 있었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「今の、なに……？\u3000身体の奥がぎゅーってなってびっくりしちゃった」"
translation = "「방금 거 뭐야……? 몸 안쪽이 꽉 조여서 깜짝 놀랐어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーナの子宮口にち○ちんが当たったんだと思う」"
translation = "「리나의 자궁구에 자지가 닿은 거라고 생각해」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「しきゅうこう？\u3000子宮の入り口ってこと？」"
translation = "「자궁구? 자궁의 입구라는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう。子宮っていうのは……」"
translation = "「응. 자궁이라는 건……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナ、お勉強したから知ってるよ。子宮って女のひとの体にある赤ちゃんのお部屋だよね？」"
translation = "「리나, 공부해서 알아. 자궁은 여자 몸에 있는 아기 방이지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う、うん、そうだよ」"
translation = "「어, 응, 맞아」"

[[dialogue]]
speaker = "unk"
original = "リーナに勉強を教えた時、保健の教科書もあったのを思い出す。俺は教えなかったけど、しっかり読んでいたようだ。"
translation = "리나에게 공부를 가르칠 때 보건 교과서도 있었던 것이 떠오른다. 나는 가르치지 않았지만 확실히 읽었던 모양이다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんのおち○ちんがリーナの赤ちゃんのお部屋ノックしてくれたんだぁ……だからこんなに気持ちいいんだ……アハハハッ」"
translation = "「오빠 자지가 리나 아기 방을 노크해줬구나아…… 그래서 이렇게 기분 좋은 거구나…… 아하하하」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナたち、本当に赤ちゃん作ってるんだね。ここが、リーナとお兄ちゃんの赤ちゃんの……家族のお部屋なんだ<emoji=heart04>」"
translation = "「리나네 정말로 아기 만드는 거네. 여기가 리나랑 오빠 아기의…… 가족의 방이구나아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蠱惑的な笑みを浮かべ、下腹部をなでるリーナ。"
translation = "매혹적인 미소를 지으며 하복부를 쓰다듬는 리나."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「アハ、お兄ちゃんのおち○ちんビクッって反応した。リーナと赤ちゃん作るの気持ちいいんだね」"
translation = "「아하, 오빠 자지 움찔하고 반응했어. 리나랑 아기 만드는 거 기분 좋은 거구나」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナの体もね、お兄ちゃんの赤ちゃん欲しいって言ってるの<emoji=heart04>\u3000お兄ちゃんと赤ちゃん作りたいって<emoji=heart04>」"
translation = "「리나의 몸도 말야, 오빠의 아기를 원한다고 말하고 있어<emoji=heart04> 오빠랑 아기 만들고 싶다고<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「んっ<emoji=heart04>\u3000ああぁっ、ふあ、んあ<emoji=heart04>\u3000はぁあん、ああっ<emoji=heart04>\u3000赤ちゃん作るの、気持ちいいねっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 아아앗, 후아, 응아<emoji=heart04> 하아앙, 아앗<emoji=heart04> 아기 만드는 거, 기분 좋네에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナが自分から腰を深く下ろし始めた。さっきの衝撃を求めて、子宮口を押し付けるようにぐりぐりと押し付ける。"
translation = "리나가 스스로 허리를 깊게 내리기 시작했다. 방금 전의 충격을 갈구하며 자궁구를 짓누르듯이 그리그리 문지르며 압박한다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、今の、もっと、もっとして<emoji=heart04>\u3000リーナの赤ちゃんのお部屋、いっぱい突いてっ<emoji=heart04>」"
translation = "「오빠, 지금 거, 좀 더, 좀 더 해줘<emoji=heart04> 리나의 아기 방, 잔뜩 찔러줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000んんぁああっ<emoji=heart04>\u3000ずんずんって、おち○ちん、響いてるっ<emoji=heart04>\u3000おっきなおち○ちんでリーナの中いっぱいになってるっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 응응아아앗<emoji=heart04> 즈큰즈큰하고, 자지, 울리고 있어어<emoji=heart04> 커다란 자지로 리나 안이 가득 차고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が動くよりも激しく、リーナが腰を振る。貪るという言葉が浮かぶほど、リーナの責めが勢いを増す。"
translation = "내가 움직이는 것보다 격렬하게 리나가 허리를 흔든다. 탐한다는 말이 떠오를 정도로 리나의 몰아붙임이 기세를 더한다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あっ<emoji=heart04>\u3000ふあっ、あ、あ、あああああぁっ<emoji=heart04>\u3000お兄ちゃんの、おち○ちん、リーナの赤ちゃんのお部屋、届いてるっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후앗, 아, 아, 아아아아아앗<emoji=heart04> 오빠의, 자지, 리나의 아기 방에, 닿고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣肉が強く締め付けながら摩擦し、気を抜けば果ててしまいそうで、歯を食いしばる。"
translation = "질 근육이 강하게 조여들며 마찰하고, 정신을 놓으면 가버릴 것 같아 어금니를 악문다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーナ、離してくれ……！」"
translation = "「리나, 놔줘……!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「どうして？」"
translation = "「어째서?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このままじゃ、また、リーナの中に……」"
translation = "「이대로라면, 또, 리나 안에……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ダぁメ<emoji=heart04>\u3000お兄ちゃんも、お勉強したでしょ<emoji=heart04>\u3000おま○この、中で、あっ<emoji=heart04>\u3000せーえき、出さないと、赤ちゃんできない、よっ？」"
translation = "「안 대에<emoji=heart04> 오빠도, 공부했잖아아<emoji=heart04> 보지, 안에서, 앗<emoji=heart04> 정액, 내보내지 않으면, 아기 안 생긴다구우?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「それに、リーナの、中で、出した方が、お兄ちゃんも、リーナも気持ち、いい、でしょっ<emoji=heart04>」"
translation = "「게다가, 리나의, 안에서, 내보내는 편이, 오빠도, 리나도 기분, 좋, 잖아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ねっ……お・に・い・ちゃ・ん<emoji=heart04>」"
translation = "「그치…… 오·빠·야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナが下腹部に力を込め、膣が強く収縮した。文字通り、俺を離すまいと締め付ける。"
translation = "리나가 하복부에 힘을 주자 질이 강하게 수축했다. 문자 그대로 나를 놓지 않겠다는 듯이 조여온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐ……っ！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「我慢しないで、いいん、だよっ<emoji=heart04>\u3000お兄ちゃんっ<emoji=heart04>\u3000リーナのおま○こで気持ちよくなって……あっ<emoji=heart04>\u3000だってリーナ、お兄ちゃん大好きなんだもんっ」"
translation = "「참지 않아도, 괜찮, 다구우<emoji=heart04> 오빠아<emoji=heart04> 리나 보지로 기분 좋아져서…… 앗<emoji=heart04> 그치만 리나, 오빠 정말 좋아하는걸」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナはお兄ちゃんが大好きで、お兄ちゃんはリーナが大好きっ<emoji=heart04>\u3000なら、赤ちゃんできてもいいよね？」"
translation = "「리나는 오빠를 정말 좋아하고, 오빠는 리나를 정말 좋아해<emoji=heart04> 그럼, 아기 생겨도 괜찮지?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ううん、できてもいいじゃなくて、赤ちゃん作らなきゃっ<emoji=heart04>\u3000だってリーナとお兄ちゃんは家族だからっ<emoji=heart04>」"
translation = "「으응, 생겨도 괜찮은 게 아니라, 아기 만들어야지이<emoji=heart04> 왜냐면 리나랑 오빠는 가족이니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、お兄ちゃん、お兄ちゃんっ<emoji=heart04>\u3000リーナと家族つくろっ<emoji=heart04>\u3000リーナと家族になろうっ<emoji=heart04>\u3000ずっとずっと一緒にいよっ<emoji=heart04>」"
translation = "「오빠, 오빠, 오빠아<emoji=heart04> 리나랑 가족 만들자아<emoji=heart04> 리나랑 가족이 되자아<emoji=heart04> 계속 계속 함께 있자아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「一緒に幸せになろう、お兄ちゃん<emoji=heart04>」"
translation = "「함께 행복해지자, 오빠<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "リーナの瞳が俺を射抜いた。途端に体に力が入らなくなり、抵抗できなくなる。"
translation = "리나의 눈동자가 나를 꿰뚫었다. 순간 몸에 힘이 들어가지 않게 되어 저항할 수 없게 된다."

[[dialogue]]
speaker = "unk"
original = "以前もあったことで、コラプサーの力かとも思ったが違う。これはリーナの固有の星術。そして、きっと俺だけに効く星術だ。"
translation = "이전에도 있었던 일이라 콜랩서의 힘인가 생각했지만 다르다. 이것은 리나 고유의 성술. 그리고 분명 나에게만 통하는 성술이다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「んあっ<emoji=heart04>\u3000あっ、はあぁ<emoji=heart04>\u3000そう、もっと、もっとして、お兄ちゃん、お兄ちゃあん<emoji=heart04>\u3000リーナのおま○こ、いっぱい突いてっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗, 하아아<emoji=heart04> 그래, 좀 더, 좀 더 해줘, 오빠, 오빠아아<emoji=heart04> 리나 보지, 잔뜩 찔러줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体の自由は利かないのに、感覚だけはしっかりあって、気が付いたら俺も腰を振っていた。それ以外のことは何も考えられない。"
translation = "몸의 자유는 듣지 않는데 감각만은 확실히 살아있어서, 정신을 차려보니 나도 허리를 흔들고 있었다. 그 외의 것은 아무것도 생각할 수 없다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、ああんっ<emoji=heart04>\u3000お兄ちゃんの、おち○ちんっ<emoji=heart04>\u3000リーナの赤ちゃんのお部屋、たたいてるっ<emoji=heart04>\u3000せーえき出したいってビクビクしてるっ<emoji=heart04>」"
translation = "「아, 아앙앗<emoji=heart04> 오빠의, 자지잇<emoji=heart04> 리나의 아기 방을, 두드리고 있어어<emoji=heart04> 정액 내보내고 싶어서 움찔움찔하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ──あ──あ──ふぁあああああ～～っ<emoji=heart04>\u3000リーナも、欲しいっ<emoji=heart04>\u3000お兄ちゃんのせーえきいっぱい欲しいよぉっ<emoji=heart04>\u3000んあ、あっ<emoji=heart04>」"
translation = "「아── 아── 아── 화아아아아아아~~앗<emoji=heart04> 리나도, 원해애<emoji=heart04> 오빠 정액 잔뜩 원해애애앗<emoji=heart04> 응아, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナのおま○こ、熱くて、切ないのっ<emoji=heart04>\u3000お兄ちゃんの赤ちゃん欲しいって、リーナのお腹がきゅーってなるのっ<emoji=heart04>」"
translation = "「리나 보지, 뜨겁고, 애달파아<emoji=heart04> 오빠 아기 갖고 싶어서, 리나 배가 뀨우하고 돼애애<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナね、知ってるよ？\u3000女のひとには、卵子っていう赤ちゃんの素があって、子宮の中に、出てくるのっ<emoji=heart04>」"
translation = "「리나 말야, 알고 있어? 여자한테는 난자라는 아기의 씨앗이 있어서, 자궁 안으로, 나오는 거야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「んんっ<emoji=heart04>\u3000卵子はね、男のひとの、精子と、くっつくと、赤ちゃんになるんだよっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 난자는 말야, 남자의, 정자랑, 합쳐지면, 아기가 되는 거야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「すごい、よねっ<emoji=heart04>\u3000あっ、お兄ちゃんの精子と、リーナの卵子、が、くっつくと、赤ちゃんになるんだっ<emoji=heart04>\u3000ふあっ<emoji=heart04>」"
translation = "「대단, 하지이<emoji=heart04> 앗, 오빠 정자랑, 리나 난자, 가, 합쳐지면, 아기가 되는 거야아<emoji=heart04> 후앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうなリーナの甘い声。毒のように俺の思考を支配して、イメージさせてしまう。"
translation = "기쁜 듯한 리나의 달콤한 목소리. 독처럼 나의 사고를 지배하고, 이미지를 그리게 만든다."

[[dialogue]]
speaker = "unk"
original = "俺の精子が、リーナの中で卵子と結びつくところを。"
translation = "나의 정자가 리나 안에서 난자와 결합하는 장면을."

[[dialogue]]
speaker = "unk"
original = "俺の子を孕んだリーナの姿を。"
translation = "내 아이를 밴 리나의 모습을."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふああああ～～～っ<emoji=heart04>\u3000あ、はあっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000お兄ちゃんのおち○ちん奥まで来てるっ<emoji=heart04>\u3000おち○ちんで、からだ浮いちゃうっ<emoji=heart04>」"
translation = "「후아아아아아~~~앗<emoji=heart04> 아, 하앗<emoji=heart04> 응아아앗<emoji=heart04> 오빠 자지 끝까지 오고 있어어<emoji=heart04> 자지 때문에, 몸이 떠버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんっ<emoji=heart04>\u3000お兄ちゃん、お兄ちゃん、お兄ちゃんお兄ちゃんお兄ちゃんお兄ちゃんお兄ちゃんお兄ちゃあんっ<emoji=heart04>」"
translation = "「오빠아<emoji=heart04> 오빠, 오빠, 오빠오빠오빠오빠오빠오빠오빠오빠아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はあんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000来る、来る、来ちゃうっ<emoji=heart04>\u3000リーナもイっちゃうっ<emoji=heart04>\u3000イクイクイクイク～～～っ<emoji=heart04>」"
translation = "「하앙앗<emoji=heart04> 앗<emoji=heart04> 온다, 온다, 와버려어<emoji=heart04> 리나도 가버려어<emoji=heart04> 가가가가아아아~~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ひああっ<emoji=heart04>\u3000お兄ちゃんのおち○ちんビクビクしてるっ<emoji=heart04>\u3000ああぁ～<emoji=heart04>\u3000お兄ちゃんのせーえきもう出る<emoji=heart04>\u3000リーナの中に出してっ<emoji=heart04>」"
translation = "「히아앗<emoji=heart04> 오빠 자지 움찔움찔하고 있어어<emoji=heart04> 아아아~<emoji=heart04> 오빠 정액 벌써 나와아<emoji=heart04> 리나 안에 내보내줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふわぁ──あ、ああ～～～～<emoji=heart04><emoji=heart04>\u3000お兄ちゃんの精子、リーナの卵子にいっぱいかけてぇっ<emoji=heart04><emoji=heart04>\u3000お兄ちゃんで受精させてぇ～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후와아──아, 아아~~~~<emoji=heart04><emoji=heart04> 오빠 정자, 리나 난자에 잔뜩 뿌려줘어어<emoji=heart04><emoji=heart04> 오빠가 수정시켜줘어어어어~~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はああああああああああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い誘惑に理性が溶かされ、リーナの一番奥で射精する。"
translation = "달콤한 유혹에 이성이 녹아내려 리나의 가장 깊숙한 곳에서 사정한다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、あんっ<emoji=heart04>\u3000おなかのなか、熱いよぉ……びゅーって、お兄ちゃんの精子が、リーナの中にぃ……ふあっ<emoji=heart04>」"
translation = "「아, 아앙<emoji=heart04> 뱃속, 뜨거워어…… 뷰우하고, 오빠 정자가, 리나 안에에…… 후앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナの子宮、お兄ちゃんでいっぱいになるぅ……<emoji=heart04>\u3000赤ちゃんのお部屋、お兄ちゃんで満たしてぇ……<emoji=heart04>」"
translation = "「리나 자궁, 오빠로 가득 차버려어……<emoji=heart04> 아기 방, 오빠로 채워줘어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ん、んんっ<emoji=heart04>\u3000もっと、精子ぃ……<emoji=heart04>\u3000んん──<emoji=heart04>\u3000んふぅ<emoji=heart04>」"
translation = "「응, 응읏<emoji=heart04> 좀 더, 정자아……<emoji=heart04> 응응──<emoji=heart04> 응후우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーナはぐりぐりと子宮口を亀頭に押し付けながら、下腹部に力を込め、ぎゅうっと精液を搾り取ってくる。"
translation = "리나는 자궁구를 귀두에 그리그리 문지르면서 하복부에 힘을 주어 꼬옥 정액을 쥐어짜 온다."

[[dialogue]]
speaker = "unk"
original = "意識してやっているのか無意識なのかは分からないけど、俺は一切抵抗できなくて。"
translation = "의식해서 하는 건지 무의식인지는 모르겠지만, 나는 일절 저항할 수 없어서."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はぁ……んんっ<emoji=heart04>\u3000んん～～～～っ<emoji=heart04>\u3000また、びゅって<emoji=heart04>\u3000せーえき出てるぅ……んっ<emoji=heart04>」"
translation = "「하아…… 응읏<emoji=heart04> 응응~~~~앗<emoji=heart04> 또, 뷰우하고<emoji=heart04> 정액 나오고 있어어…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐっ、うぅ……」"
translation = "「큭, 으으……」"

[[dialogue]]
speaker = "unk"
original = "下半身に力を込め、一滴残らずリーナの中に精を放つ。いけないと思っていたはずなのに、今は真逆のことを考えている自分がいた。"
translation = "하반신에 힘을 주어 일절 남김없이 리나 안에 정을 쏟아낸다. 안 된다고 생각했을 텐데, 지금은 정반대의 것을 생각하는 내가 있었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんの、まだ出てる<emoji=heart04>\u3000いいよっ<emoji=heart04>\u3000全部出して……んんっ……<emoji=heart04>」"
translation = "「오빠 거, 아직 나오고 있어<emoji=heart04> 괜찮아아<emoji=heart04> 전부 내보내줘…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あっ<emoji=heart04>\u3000抜けちゃった……せーえきいっぱい出たぁ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 빠져버렸다…… 정액 잔뜩 나왔어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精も根も尽き果てた。魂ごと搾り取られたような気がする。"
translation = "진이 다 빠졌다. 영혼까지 짜인 듯한 기분이 든다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんの精子、こぼれちゃう……せっかくリーナの中に出してくれたのにぃ」"
translation = "「오빠 정자, 흘러넘쳐버려…… 어렵게 리나 안에 내보내줬는데에」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けた秘所から、俺の精液が漏れていた。後悔しなきゃいけないはずなのに……そんな気持ちが湧く余裕さえない。"
translation = "페니스가 빠진 비소에서 나의 정액이 새어 나오고 있었다. 후회해야 할 텐데…… 그런 기분이 들 여유조차 없다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「おま○こジンジンして、熱くて……まだお兄ちゃんが中にいるみたい。お腹の奥がぽかぽかするの<emoji=heart04>」"
translation = "「보지 징징거리고, 뜨거워서…… 아직 오빠가 안에 있는 것 같아. 배 깊숙한 곳이 포근포근해<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんの精子、きっと今、リーナの子宮の中を泳いでるんだね……。ふふっ、ちゃんと受精できるかなぁ<emoji=heart04>」"
translation = "「오빠 정자, 분명 지금, 리나 자궁 속을 헤엄치고 있겠지…… 후후, 제대로 수정될까나아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛おしそうに下腹部をさするリーナ。言うまでもなく、子宮の位置だ。"
translation = "사랑스럽다는 듯이 하복부를 어루만지는 리나. 말할 것도 없이 자궁의 위치다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ほらっ、お兄ちゃんも触ってみて」"
translation = "「봐봐, 오빠도 만져봐」"

[[dialogue]]
speaker = "unk"
original = "リーナに言われるがまま、俺もリーナの胎をなでる。いつか本当に、ここに命が宿るのだろうか。いやもしかすると既に……"
translation = "리나가 시키는 대로 나도 리나의 배를 어루만진다. 언젠가 정말로 이곳에 생명이 깃드는 것일까. 아니 어쩌면 이미……"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あっ<emoji=heart04>\u3000お兄ちゃんの手、気持ちいい……」"
translation = "「앗<emoji=heart04> 오빠 손, 기분 좋아……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あははっ……赤ちゃん、楽しみだね。お兄ちゃん<emoji=heart04>」"
translation = "「아하하…… 아기, 기대되네. 오빠<emoji=heart04>」"

