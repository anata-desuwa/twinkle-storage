[[dialogue]]
speaker = "unk"
original = "リップルとクリスマスデートした後、まだ別れたくなくて、家で一緒に過ごしていた。"
translation = "리플과 크리스마스 데이트를 마친 뒤, 아직 헤어지기 아쉬워서, 집에서 함께 시간을 보내고 있었다."

[[dialogue]]
speaker = "リップル"
original = "「カイチョー<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ちゅるっ<emoji=heart04>\u3000ちゅぅ、ちゅるる……んちゅっ、ちゅぱぁ……<emoji=heart04>\u3000じゅるる、じゅぷっ……じゅれるれろ<emoji=heart04>」"
translation = "「츄릅<emoji=heart04> 쮸우, 츄르르…… 응츄, 츄파아……<emoji=heart04> 쥬르르, 쥬퓻…… 쥬렐레로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇が触れ合うキスから始まり、どちらからともなく舌を絡め合う。"
translation = "입술이 맞닿는 키스로 시작해, 어느 쪽이라 할 것도 없이 혀를 얽는다."

[[dialogue]]
speaker = "リップル"
original = "「んふぅ……んちゅるちゅる<emoji=heart04>\u3000エッチなキス、しちゃってます……ちゅるれろ、れろ、れりゅ……<emoji=heart04>\u3000カイチョーとキスするの、スキ、です……れるれちゅる<emoji=heart04>」"
translation = "「응후우…… 응츄르츄르<emoji=heart04> 야한 키스, 해버리고 있어요…… 츄르레로, 레로, 레류……<emoji=heart04> 회장님이랑 키스하는 거, 좋아, 해요…… 레를레츄르<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして濃密なキスをしていると、当然体も密着し、リップルの大きな胸が当たる。"
translation = "이렇게 농밀한 키스를 하고 있으면, 당연히 몸도 밀착되어 리플의 커다란 가슴이 닿는다."

[[dialogue]]
speaker = "unk"
original = "リボンだけを身に着けたクリスマスフォームはとても大胆で、おっぱいが今にもこぼれそうだし、大事なところがリボンからはみ出て見えてしまいそうだ。"
translation = "리본만을 몸에 걸친 크리스마스 폼은 무척 대담해서, 가슴이 당장이라도 쏟아질 것 같고, 소중한 곳이 리본 밖으로 비어져 나와 보일 것만 같다."

[[dialogue]]
speaker = "クロト"
original = "「リップルのクリスマスフォームって、すごく肌が出てるよな……」"
translation = "「리플의 크리스마스 폼 말이야, 노출이 엄청나네……」"

[[dialogue]]
speaker = "リップル"
original = "「ワカってます。でもカイチョーはヨロコんでくれますよね？」"
translation = "「알고 있어요. 하지만 회장님은 기뻐해 주실 거죠?」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000もちろん」"
translation = "「! 당연하지」"

[[dialogue]]
speaker = "unk"
original = "恋人が自分のために大胆な格好をしてくれて、喜ばない男はいない。"
translation = "연인이 자신을 위해 대담한 차림을 해주는데, 기뻐하지 않을 남자는 없다."

[[dialogue]]
speaker = "リップル"
original = "「カイチョーのここ、大きくなってます……<emoji=heart04>」"
translation = "「회장님의 여기, 커졌어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルの言う通り、ズボンの中でいきり立つ。"
translation = "리플의 말대로, 바지 속에서 기세등등하게 솟아오른다."

[[dialogue]]
speaker = "unk"
original = "しかしリップルの股間のリボンも湿っているように見えた。"
translation = "하지만 리플의 가랑이 사이 리본도 젖어있는 것처럼 보였다."

[[dialogue]]
speaker = "リップル"
original = "「今夜のワタシはクリスマスプレゼントなので、カイチョーのスキにしてください……<emoji=heart04>」"
translation = "「오늘 밤의 저는 크리스마스 선물이니까, 회장님 마음대로 하세요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーのモノですから、ワタシの体、思う存分使ってください……<emoji=heart04>」"
translation = "「회장님의 것이니까, 제 몸, 마음껏 써주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー、こういうのはドウですか？」"
translation = "「회장님, 이런 건 어떤가요?」"

[[dialogue]]
speaker = "unk"
original = "リップルの提案通り、両手足をリボンで縛って動きを奪う。"
translation = "리플의 제안대로, 양 손발을 리본으로 묶어 움직임을 봉쇄한다."

[[dialogue]]
speaker = "リップル"
original = "「あ……<emoji=heart04>\u3000ホントに動けません……これでカイチョーに何をされてもテイコウできませんね……」"
translation = "「아……<emoji=heart04> 정말로 움직일 수 없어요…… 이걸로 회장님께 무슨 짓을 당해도 저항할 수 없겠네요……」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー専用のオナホとして、たくさん犯されてシマイます……<emoji=heart04>」"
translation = "「회장님 전용 오나홀로서, 잔뜩 범해지고 말 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルの豊満な肉体を欲望のまま蹂躙する──想像しただけで情欲がこれ以上ないほど膨らむ。"
translation = "리플의 풍만한 육체를 욕망 가는 대로 유린한다── 상상한 것만으로 정욕이 이보다 더할 수 없을 정도로 부풀어 오른다."

[[dialogue]]
speaker = "unk"
original = "気を抜けば、今にも理性を忘れて襲い掛かってしまいそうだ。"
translation = "정신을 놓으면, 당장이라도 이성을 잊고 덮쳐버릴 것만 같다."

[[dialogue]]
speaker = "リップル"
original = "「それに──」"
translation = "「그리고──」"

[[dialogue]]
speaker = "クロト"
original = "「それに？」"
translation = "「그리고?」"

[[dialogue]]
speaker = "リップル"
original = "「実は今日、アブない日なんです<emoji=heart04>」"
translation = "「실은 오늘, 위험한 날이에요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "リップル"
original = "「前はウソでしたけど、今日はホントのホントに赤ちゃんデキちゃう日なんです<emoji=heart04>」"
translation = "「전에는 거짓말이었지만, 오늘은 정말로 정말로 아기가 생겨버리는 날이에요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「だけど受精してもダイジョーブですよ？\u3000受精卵を極小の結界で保護して『孕ませ予約』シテおけますから」"
translation = "「하지만 수정되어도 괜찮아요. 수정란을 극소 결계로 보호해서 『임신 예약』 해둘 수 있으니까요」"

[[dialogue]]
speaker = "リップル"
original = "「だから今度こそ、カイチョーの精子で受精させて、孕ませてクダさい<emoji=heart04>」"
translation = "「그러니까 이번에야말로, 회장님의 정자로 수정시켜서, 임신시켜 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "思う存分犯して孕ませてほしい……そんなおねだりをされて本能を抑えられるはずがなく、怒張したペニスをリップルの秘部へと突き立てた。"
translation = "마음껏 범해서 임신시켜 주길 바란다…… 그런 애원을 듣고 본능을 억누를 수 있을 리 없었고, 노장한 자지를 리플의 비부로 찔러 넣었다."

[[dialogue]]
speaker = "リップル"
original = "「んん～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000カイチョーのオチ○チン、キテますっ……<emoji=heart04>\u3000ふぁあっ……あっ、ああっ……<emoji=heart04>」"
translation = "「응응~~~~~~~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04> 회장님의 자지, 들어오고 있어요……<emoji=heart04> 화아…… 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「オチ○チン、とってもＢＩＧで……おま○こ、イッパイになって……っ<emoji=heart04>\u3000はぁ、あ……ワタシの中、カイチョーで満たされてます<emoji=heart04>」"
translation = "「자지, 너무나 BIG해서…… 보지, 가득 차버려서……<emoji=heart04> 하아, 아…… 제 안, 회장님으로 채워지고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ふはぁ……はぁ、ああっ……<emoji=heart04>\u3000カイチョーが、ワタシの中で、動いて……んんっ……おま○こ、擦れてますぅ……<emoji=heart04>」"
translation = "「후하아…… 하아, 아앗……<emoji=heart04> 회장님이, 제 안에서, 움직여서…… 응읏…… 보지, 쓸리고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内はすでにたっぷりの蜜で濡れていて、いきなり奥まで挿入されたペニスを嬉しそうに締め付けてきた。"
translation = "질 내는 이미 듬뿍 젖어 있어서, 갑자기 안쪽까지 삽입된 자지를 기쁜 듯이 조여 왔다."

[[dialogue]]
speaker = "unk"
original = "リップルが俺にぎゅっとしがみついてくるみたいで、快感と愛おしさが溢れてくる。"
translation = "리플이 나에게 꽉 매달려 오는 것 같아서, 쾌감과 애틋함이 넘쳐흐른다."

[[dialogue]]
speaker = "リップル"
original = "「はあぁっ、あっ、あっ、んんっ<emoji=heart04>\u3000動けナイのにズンズンされて……ヘンな、カンジ、です……ふぁ、あっ……ああぁんっ<emoji=heart04>」"
translation = "「하아앗, 앗, 앗, 응읏<emoji=heart04> 움직일 수 없는데 쿵쾅거려져서…… 이상한, 기분, 이에요…… 화, 앗…… 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000オチ○チン、たくさん動かして……あっ、んっ……カイチョーに、おま○こ使われてますっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 자지, 많이 움직여줘서…… 앗, 응…… 회장님에게, 보지 사용당하고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を大きくグラインドさせ、ペニスと粘膜を摩擦させて、リップルの中の感触を楽しむ。"
translation = "허리를 크게 그라인드 시키며, 페니스와 점막을 마찰시켜 리플 안의 감촉을 즐긴다."

[[dialogue]]
speaker = "リップル"
original = "「はぁ、はっ……カイチョー、ワタシのおま○こ、気持ちイイですか？」"
translation = "「하아, 하윽…… 회장님, 제 보지, 기분 좋은가요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、リップルの中、すごく気持ちいい……！」"
translation = "「아아, 리플의 안, 엄청나게 기분 좋아……!」"

[[dialogue]]
speaker = "リップル"
original = "「んんっ<emoji=heart04>\u3000気持ちイイって言われると、カイチョーのオナホとして、ウレシイです<emoji=heart04>\u3000もっともっと気持ちよくナッテください<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 기분 좋다는 말을 들으니, 회장님의 오나홀로서 기뻐요<emoji=heart04> 좀 더 좀 더 기분 좋아져 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ひぁっ、あっ、あっ<emoji=heart04>\u3000んっ……んん～～っ<emoji=heart04>\u3000オチ○チン、ビクビクして、喜んでます……っ<emoji=heart04>」"
translation = "「히아앗, 앗, 앗<emoji=heart04> 응…… 으으음~~윽<emoji=heart04> 자지, 파르르 떨면서 기뻐하고 있어요……윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蜜でトロトロになった肉ひだがペニスを撫で、熱く柔らかな膣壁が隙間なく密着して締め付けてくる。"
translation = "애액으로 질척해진 고기 주름이 페니스를 어루만지고, 뜨겁고 부드러운 질벽이 틈새 없이 밀착되어 조여 온다."

[[dialogue]]
speaker = "unk"
original = "ゾクゾクと腰の奥が震えるような快感を覚えながら、勢いよく突き続ける。"
translation = "오싹오싹하게 허리 깊은 곳이 떨리는 듯한 쾌감을 느끼며, 기세 좋게 계속 찌른다."

[[dialogue]]
speaker = "リップル"
original = "「はあぁ……はっ、あっ……カイチョー、イツモより力強くて、ドキドキします……っ<emoji=heart04>\u3000おま○この奥、キュンってナリます<emoji=heart04>」"
translation = "「하아아…… 하앗, 앗…… 회장님, 평소보다 힘차서 두근거려요……윽<emoji=heart04> 보지 안쪽이 찡해져요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「んんんっ<emoji=heart04>\u3000はっ、あっ、はあぁっ……<emoji=heart04>\u3000動けナイのに、たくさん突かれて、カイチョーのモノにされてます……っ<emoji=heart04>」"
translation = "「으으응윽<emoji=heart04> 핫, 앗, 하아아윽……<emoji=heart04> 움직일 수 없는데 잔뜩 찔려서, 회장님의 것으로 만들어지고 있어요……윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突かれた勢いでたぷたぷと揺れる大きなおっぱいに、手を伸ばして鷲掴みにする。"
translation = "찔리는 기세에 출렁출렁 흔들리는 커다란 가슴에 손을 뻗어 움켜쥔다."

[[dialogue]]
speaker = "リップル"
original = "「ひぁああ～～～っ<emoji=heart04>\u3000おっぱい、触られるのスキですっ<emoji=heart04>\u3000カイチョーの手で、ぐにぐに揉まれて、体、熱くなります……っ<emoji=heart04>」"
translation = "「히아아아~~~윽<emoji=heart04> 가슴, 만져지는 거 좋아해요!<emoji=heart04> 회장님의 손에 꾸르륵 주물러져서, 몸이 뜨거워져요……윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルのおっぱいは手に収まらないほど大きくて、ぎゅっと握ると指の間から肉がこぼれる。"
translation = "리플의 가슴은 손에 다 담기지 않을 정도로 커서, 꽉 쥐면 손가락 사이로 살점이 흘러넘친다."

[[dialogue]]
speaker = "リップル"
original = "「はぁあっ、あっ……んんっ<emoji=heart04>\u3000カイチョーにおっぱい揉まれるの、気持ちイイです……<emoji=heart04>」"
translation = "「하아앗, 앗…… 응윽<emoji=heart04> 회장님한테 가슴 주물러지는 거, 기분 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ふぁ、はあぁっ……あんっ<emoji=heart04>\u3000おっぱい触りながら、カイチョーのオチ○チン、また大きくナッテ……んっ、んんっ、ああっ<emoji=heart04>」"
translation = "「후아, 하아아윽…… 아앙<emoji=heart04> 가슴 만지면서 회장님의 자지, 또 커져서…… 응, 응윽, 아아윽<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000乳首、クリクリされるのイイです<emoji=heart04>\u3000ひぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000先っぽ、イジられると、切なくナリますっ<emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 유두, 굴려지는 거 좋아요<emoji=heart04> 히우윽<emoji=heart04> 응윽<emoji=heart04> 끝부분, 만져지면 애타게 돼요!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうにきゅうきゅうと締め付けてくる圧力を感じながら、ツンと硬くなった乳首を軽くつねる。"
translation = "기쁜 듯이 꽉꽉 조여오는 압력을 느끼며, 빳빳하게 딱딱해진 유두를 가볍게 꼬집는다."

[[dialogue]]
speaker = "リップル"
original = "「ひんっ！？」"
translation = "「히응!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、悲鳴にも似た声が上がり、痛いぐらいにペニスを圧迫された。"
translation = "그 순간, 비명에 가까운 소리가 터져 나왔고, 아플 정도로 자지가 압박되었다."

[[dialogue]]
speaker = "リップル"
original = "「今の、ちょっとイタイのに、気持ちイイです……っ<emoji=heart04>\u3000ふあっ、あぁっ……カイチョーの、おもちゃにされちゃってます……<emoji=heart04>」"
translation = "「방금 거, 조금 아픈데도, 기분 좋아요……っ<emoji=heart04> 하앗, 아아앗…… 회장님의 장난감이 되어버리고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ひっ<emoji=heart04>\u3000また、乳首、ギュッてされて……ひゃんっ<emoji=heart04><emoji=heart04>\u3000カイチョーに、乳首イジメられて、気持ちよくナッテます<emoji=heart04>\u3000んっ──んんんっ<emoji=heart04><emoji=heart04>」"
translation = "「히익<emoji=heart04> 또, 유두, 꽉 쥐여서…… 히양<emoji=heart04><emoji=heart04> 회장님한테 유두 괴롭힘당해서, 기분 좋아져 버려요<emoji=heart04> 응──으으윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抵抗できないリップルの乳首を弄び、征服欲が満たされる。"
translation = "저항하지 못하는 리플의 유두를 농락하며 정복욕을 채운다."

[[dialogue]]
speaker = "unk"
original = "本能に衝き動かされるまま、さらに責めが激しくなっていって──"
translation = "본능에 이끌리는 대로 공세는 더욱 격렬해져 가고──"

[[dialogue]]
speaker = "リップル"
original = "「ひぁああああっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000カイチョー、激しい、ですっ<emoji=heart04>\u3000んあっ、あっ、あっ──んん～～～っ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 회장님, 격렬, 해요<emoji=heart04> 응앗, 앗, 앗──으으으음<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「深いトコロまで、突かれてっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おっきなオチ○チン、奥に、当たってますっ<emoji=heart04>」"
translation = "「깊은 곳까지, 찔러서<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 커다란 자지, 안쪽에, 닿고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅ～～っ<emoji=heart04>\u3000ランボウに、おま○こ、ズンズンされてますっ<emoji=heart04>\u3000ワタシの中、グチャグチャにされてますっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 으으으윽<emoji=heart04> 난폭하게, 보지, 즈음즈음 당하고 있어요<emoji=heart04> 제 안, 엉망진창으로 헤집어지고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界までいきり立ったペニスが、リップルの中を蹂躙する。"
translation = "한계까지 부풀어 오른 자지가 리플의 안을 유린한다."

[[dialogue]]
speaker = "unk"
original = "荒々しく腰を動かし、力任せに突き入れ、欲望のまま肉穴を堪能していた。"
translation = "거칠게 허리를 움직여 힘껏 찔러 넣으며, 욕망이 이끄는 대로 고기 구멍을 만끽했다."

[[dialogue]]
speaker = "リップル"
original = "「んんっ<emoji=heart04>\u3000ん～～っ<emoji=heart04>\u3000カイチョー、力強くて、おま○こ、コワレちゃいそうですっ<emoji=heart04>\u3000オチ○チン、強すぎ、ですっ<emoji=heart04>」"
translation = "「으음<emoji=heart04> 으응<emoji=heart04> 회장님, 힘차서, 보지, 망가져 버릴 것 같아요<emoji=heart04> 자지, 너무 강, 해요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000でも、ランボウなカイチョーもスキ<emoji=heart04>\u3000コワレるくらい、突いてくださいっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앗<emoji=heart04> 아아앗<emoji=heart04> 하지만, 난폭한 회장님도 좋아<emoji=heart04> 망가질 정도로, 찔러 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシは、カイチョーの、オナホですからっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000ワタシのおま○こ、好きなだけ、使ってクダさいっ<emoji=heart04>」"
translation = "「저는, 회장님의, 오나홀이니까요<emoji=heart04> 으음<emoji=heart04> 히아아앗<emoji=heart04> 제 보지, 마음껏, 사용해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身を叩きつけながら、淡いピンク色の乳首に吸い付く。"
translation = "하반신을 부딪치며 연분홍빛 유두를 빨아들인다."

[[dialogue]]
speaker = "リップル"
original = "「んん～～～～っ<emoji=heart04><emoji=heart04>\u3000んっ……おっぱい、チューチューされてます……っ<emoji=heart04>\u3000ふっ、あっ……ミルク飲むみたいに、おっぱい吸ってますっ<emoji=heart04>」"
translation = "「으으으음<emoji=heart04><emoji=heart04> 응…… 가슴, 쪽쪽 당하고 있어요……っ<emoji=heart04> 훗, 앗…… 우유 마시는 것처럼 가슴을 빨고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー、ワタシのミルク欲しいんデスね？\u3000はっ、あっ<emoji=heart04>\u3000イイですよっ……んあっ……孕んだら、カイチョーのために、ミルク出しますからっ<emoji=heart04>」"
translation = "「회장님, 제 우유를 원하시는 거군요? 하앗, 앗<emoji=heart04> 좋아요…… 응앗…… 임신하면, 회장님을 위해서 우유 내보낼 테니까요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「赤ちゃんだけじゃなくて、カイチョーの分まで、ミルクたくさん出します、から……っ<emoji=heart04>\u3000んんっ、ふあぁっ<emoji=heart04>\u3000ワタシのミルク、飲んでくださいっ<emoji=heart04>」"
translation = "「아기뿐만 아니라, 회장님 몫까지 우유 가득 내보낼 테니까……っ<emoji=heart04> 으음, 하아앗<emoji=heart04> 제 우유, 마셔 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルのミルクを想像し、甘い味を思い浮かべながら、乳首を甘噛みする。"
translation = "리플의 우유를 상상하며 달콤한 맛을 떠올리고 유두를 살짝 깨문다."

[[dialogue]]
speaker = "リップル"
original = "「ひやぁあああっ<emoji=heart04><emoji=heart04>\u3000乳首、またイジメられて……ひぅうっ<emoji=heart04>\u3000んんぅ～～っ<emoji=heart04>」"
translation = "「히야아아앗<emoji=heart04><emoji=heart04> 유두, 또 괴롭힘당해서…… 히우웃<emoji=heart04> 으으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あ──あ──<emoji=heart04>\u3000おっぱいとおま○こ、一緒にイキますっ<emoji=heart04>\u3000イク、イク、イッちゃいますぅ～～～～っ<emoji=heart04>」"
translation = "「아──아──<emoji=heart04> 가슴이랑 보지, 같이 가버려요<emoji=heart04> 가요, 가, 가버려요어어어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「んん～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「으으으으으으으음<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "縛られた四肢をビクビクを跳ねさせ、ぎゅっと膣を絞って絶頂するリップル。"
translation = "결박된 사지를 파르르 떨며 질을 꽉 조이며 절정에 달하는 리플."

[[dialogue]]
speaker = "unk"
original = "だけど俺はそのまま腰を動かし続けて……"
translation = "하지만 나는 그대로 허리를 계속 움직여서……"

[[dialogue]]
speaker = "リップル"
original = "「ひぃんっ！？\u3000ダメですっ！？\u3000まだイッてる、のにっ──んん～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히잉!? 안 돼요!? 아직 가고 있는데──으으으으음<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000頭、ヘンになりますっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ぁんんっ<emoji=heart04>\u3000気持ちよすぎて、オカシクなりますっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 머리, 이상해져요<emoji=heart04> 히아앗<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 너무 기분 좋아서, 어떻게 되어버릴 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「何も、考えられなくナッテ……ひっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000ホントに……あっ<emoji=heart04>\u3000カイチョーの、オナホにされちゃいますっ<emoji=heart04>」"
translation = "「아무것도 생각할 수 없게 되어서…… 히익<emoji=heart04> 아아앗<emoji=heart04> 정말로…… 앗<emoji=heart04> 회장님의, 오나홀이 되어버려요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルの体を快楽を得るための道具として使う。"
translation = "리플의 몸을 쾌락을 얻기 위한 도구로서 사용한다."

[[dialogue]]
speaker = "unk"
original = "絶頂が止まらない膣は、震えながらきゅうきゅうと締め付けてきて、極上の快感だ。"
translation = "절정이 멈추지 않는 질은 떨리면서 꽉꽉 조여왔고, 그건 극상의 쾌감이었다."

[[dialogue]]
speaker = "リップル"
original = "「んぁああっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000またイク、イッちゃいますっ<emoji=heart04>\u3000イクイク、イッくぅぅっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 앗, 앗<emoji=heart04> 또 가요, 가버려요<emoji=heart04> 가요가요, 가버렷<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ひぁ──あ──あ──あああぁ～～っ<emoji=heart04>\u3000おま○こイキますっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000イクイクイクぅううっ<emoji=heart04><emoji=heart04>」"
translation = "「히아──아──아──아아아아아앗<emoji=heart04> 보지 가요<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 가요가요가요오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ひぁああ～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルがまたあっけなく絶頂し、強く締め付けられて絶頂が近づく。"
translation = "리플이 다시 허무하게 절정에 달하고, 강하게 조여지는 감각에 나 역시 사정이 가까워진다."

[[dialogue]]
speaker = "クロト"
original = "「リップル、今度こそ孕ませるぞ……！」"
translation = "「리플, 이번에야말로 임신시켜 주마……!」"

[[dialogue]]
speaker = "リップル"
original = "「──！\u3000はっ──あっ──ハイ<emoji=heart04>\u3000リップルは、カイチョー専用の、孕ませオナホですからっ<emoji=heart04>\u3000出して、くださいっ<emoji=heart04>」"
translation = "「──! 핫──앗──네<emoji=heart04> 리플은, 회장님 전용 임신 오나홀이니까요<emoji=heart04> 싸 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシのおま○こに、射精してクダさいっ<emoji=heart04>\u3000赤ちゃんデキるように<emoji=heart04>\u3000ワタシの奥の奥に、子宮に、いっぱい精液注いでクダさいっ<emoji=heart04>」"
translation = "「제 보지에 사정해 주세요<emoji=heart04> 아기가 생기도록<emoji=heart04> 제 안쪽 깊숙한 곳에, 자궁에 정액 가득 부어 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000今度こそ、孕ませてっ<emoji=heart04>\u3000カイチョーの精子で、ワタシの卵子、受精させてくださいっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 이번에야말로 임신시켜 줘<emoji=heart04> 회장님의 정자로 제 난자, 수정시켜 주세요<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ひぁああ～～っ<emoji=heart04>\u3000オチ○チン、子宮に何度も当たって、孕ませたいって言ってマスっ<emoji=heart04>\u3000赤ちゃん作りたいって、伝わってきマスっ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04> 자지가 자궁에 몇 번이나 닿아서, 임신시키고 싶다고 말하고 있어요<emoji=heart04> 아기를 만들고 싶다는 게 전해져 와요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「んぁっ──あっ──あっ──あっ──んん～～～っ<emoji=heart04>\u3000思いっきり<emoji=heart04>\u3000カイチョーの精子<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000出してくださぁいっっ<emoji=heart04>」"
translation = "「응앗──앗──앗──앗──으으으음<emoji=heart04> 마음껏<emoji=heart04> 회장님의 정자<emoji=heart04> 싸 줘<emoji=heart04> 싸 주세요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ひっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000ビューッって<emoji=heart04>\u3000子宮に<emoji=heart04>\u3000精液、注いで<emoji=heart04>\u3000孕ませてくださいぃぃっ<emoji=heart04><emoji=heart04>」"
translation = "「히익<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아앗<emoji=heart04> 퓨우우욱 하고<emoji=heart04> 자궁에<emoji=heart04> 정액 쏟아서<emoji=heart04> 임신시켜 주세요오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして亀頭を子宮口に押し付け、限界まで高まった射精欲を解き放つ──"
translation = "그리고 귀두를 자궁구에 밀어붙여 한계까지 높아진 사정 욕구를 해방한다──"

[[dialogue]]
speaker = "リップル"
original = "「ひぃあぁぁあああっ<emoji=heart04><emoji=heart04>\u3000ふぁ──ん──んん～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히이아아아아아앗<emoji=heart04><emoji=heart04> 후아──응──으으으으으으으음<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーの精液、おま○こに、ビュクビュクーって……ふああぁっ<emoji=heart04>\u3000あ……あ……熱いの、お腹に、注がれて、ますっ……<emoji=heart04>」"
translation = "「회장님의 정액이, 보지에 부글부글하고…… 후아아앗<emoji=heart04> 아…… 아…… 뜨거운 게 배 안에 쏟아지고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000カイチョーの孕ませ精子が、子宮に入ってきて──んん～～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ＢＩＧ気持ちイイ、です……っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응<emoji=heart04> 회장님의 임신 정자가 자궁으로 들어와서──으으으응<emoji=heart04> 앗<emoji=heart04> 엄청나게 기분 좋아요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルの中に一滴でも多く注ごうとペニスが脈動し、膣壁も子種をねだるように強く絞ってくる。"
translation = "리플의 안에 한 방울이라도 더 쏟아붓기 위해 자지가 맥동하고, 질벽도 씨를 갈구하듯 강하게 조여온다."

[[dialogue]]
speaker = "リップル"
original = "「んんっ……<emoji=heart04><emoji=heart04>\u3000まだ、出て……っ<emoji=heart04>\u3000カイチョーのオチ○チンが、ワタシを孕ませたいって、精子、出してます……っ<emoji=heart04>」"
translation = "「으음……<emoji=heart04><emoji=heart04> 아직 나오고 있어……っ<emoji=heart04> 회장님의 자지가 저를 임신시키고 싶어서 정자를 내보내고 있어요……っ<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はあぁ<emoji=heart04>\u3000お腹、熱いぃ……あ……ふぁあんっ<emoji=heart04>\u3000カイチョーの精液で、お腹、イッパイですぅ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 배 안이 뜨거워요…… 아…… 후아앙<emoji=heart04> 회장님의 정액으로 배 안이 가득해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "意識が遠くなるほど下半身が強く脈打ち、膣口から溢れるまで注いで、ようやく射精が止まった。"
translation = "의식이 멀어질 정도로 하반신이 강하게 맥동했고, 질구에서 넘쳐흐를 때까지 쏟아붓고 나서야 겨우 사정이 멈췄다."

[[dialogue]]
speaker = "リップル"
original = "「はぁ、はぁ……あ<emoji=heart04>\u3000おま○こ、まだイッてます……<emoji=heart04>\u3000こんなにすごいの、ハジメテです……<emoji=heart04>」"
translation = "「하아, 하아…… 아<emoji=heart04> 보지, 아직 가고 있어요……<emoji=heart04> 이렇게 대단한 거, 처음이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リボンで縛られたまま、小さく身を震わせるリップル。"
translation = "리본에 묶인 채로 몸을 잘게 떠는 리플."

[[dialogue]]
speaker = "unk"
original = "膣壁もひくひくと小刻みにペニスを締め続けていた。"
translation = "질벽도 움찔움찔하며 잘게 페니스를 계속 조이고 있었다."

[[dialogue]]
speaker = "リップル"
original = "「はぁはぁ……オチ○チン、まだ入ってます……」"
translation = "「하아 하아…… 자지, 아직 들어있어요……」"

[[dialogue]]
speaker = "クロト"
original = "「こうした方が受精しやすいと思って」"
translation = "「이러는 편이 수정하기 쉽다고 생각해서.」"

[[dialogue]]
speaker = "リップル"
original = "「んっ<emoji=heart04>\u3000おま○こまだ気持ち良くて、オカシクなっちゃいますよ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 보지 아직 기분 좋아서, 이상해져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーにたくさん射精されて、きっと受精シテます……カイチョーに孕まされちゃいマシた<emoji=heart04>」"
translation = "「회장님한테 잔뜩 사정 당해서, 분명 수정됐을 거예요…… 회장님한테 임신당해 버렸어용<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「エヘヘ<emoji=heart04>\u3000今日はワタシがプレゼントなのに、カイチョーにクリスマスプレゼントもらっちゃいマシた<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 오늘은 내가 선물인데, 회장님한테 크리스마스 선물을 받아버렸네용<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「でもこの子を産んであげられるのは、リクリエをヤッつけた後にナリそうですね」"
translation = "「하지만 이 아이를 낳아줄 수 있는 건, 리크리에를 해치운 뒤가 되겠네여」"

[[dialogue]]
speaker = "クロト"
original = "「俺がリップルも世界も守るよ。必ず」"
translation = "「내가 리플도 세계도 지킬게. 반드시.」"

[[dialogue]]
speaker = "リップル"
original = "「……ハイ。頼りにシテますね、ワタシの旦那サマ<emoji=heart04>」"
translation = "「……네. 믿고 있을게용, 나의 서방님<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04>」"

