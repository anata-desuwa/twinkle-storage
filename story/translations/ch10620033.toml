[[dialogue]]
speaker = "unk"
original = "第３話,ジュエリーとブライダルモデル,P"
translation = "제3화, 쥬얼리와 브라이덜 모델, P"

[[dialogue]]
speaker = "unk"
original = "ある休日、俺とジュエリーは結婚式場へやってきていた。"
translation = "어느 휴일, 나와 쥬얼리는 결혼식장에 와 있었다."

[[dialogue]]
speaker = "女性カメラマン"
original = "「じゃあ、今日はよろしくね、ジュエリーちゃん♪」"
translation = "「자, 그럼 오늘 잘 부탁해, 쥬얼리짱♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。こちらこそよろしく頼むよ、カメラマンさん」"
translation = "「아아. 나야말로 잘 부탁하네, 카메라맨 씨」"

[[dialogue]]
speaker = "unk"
original = "最近、ジュエリーはウェディングフォームで事件を解決するようになったことから、『花嫁探偵』と呼ばれるようになっていた。"
translation = "최근 쥬얼리는 웨딩 폼으로 사건을 해결하게 된 덕분에 『신부 탐정』이라 불리게 되었다."

[[dialogue]]
speaker = "unk"
original = "それが有名になった結果、以前フィオナが広告の『ブライダルモデル』を務めたこの結婚式場から、今回はジュエリーにお願いできないかと依頼が来たのだ。"
translation = "그것이 유명해진 결과, 이전에 피오나가 광고의 『브라이덜 모델』을 맡았던 이 결혼식장에서 이번에는 쥬얼리에게 부탁하고 싶다는 의뢰가 온 것이다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、愛する助手と、結婚式を挙げる新郎新婦になって、写真を撮ってもらえるんだ。こんな依頼なら受け得というものさ」"
translation = "「후훗, 사랑하는 조수와 결혼식을 올리는 신랑 신부가 되어 사진을 찍을 수 있다니. 이런 의뢰라면 받아들일 수밖에 없지」"

[[dialogue]]
speaker = "unk"
original = "そうして、ジュエリーと新郎新婦になりきっての撮影が始まった。"
translation = "그렇게 해서 쥬얼리와 신랑 신부가 된 기분으로 촬영이 시작되었다."

[[dialogue]]
speaker = "女性カメラマン"
original = "「はい、お互いを見つめ合って～……それじゃあ、会長くん、ジュエリーちゃんの花嫁姿を褒めてあげてくれるかな～？」"
translation = "「네, 서로 마주 봐주시고~…… 그럼 회장군, 쥬얼리짱의 신부 모습을 칭찬해줄래~?」"

[[dialogue]]
speaker = "unk"
original = "すごく似合っていて、綺麗だよ"
translation = "정말 잘 어울려, 아름다워"

[[dialogue]]
speaker = "ジュエリー"
original = "「ありがとう。だが、それよりも今日は……キミのタキシード姿の方がすごく決まっていてカッコいいよ」"
translation = "「고맙다. 하지만 그보다도 오늘은…… 자네의 턱시도 차림이 훨씬 더 잘 어울리고 멋져」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私にとって世界一カッコいい男性の晴れ姿だ」"
translation = "「나에게 있어 세계에서 가장 멋진 남성의 예복 차림이다」"

[[dialogue]]
speaker = "女性カメラマン"
original = "「２人ともいいわね～！\u3000本当のカップルだからこその表情！\u3000そしてこのムード！\u3000お姉さん、興奮しちゃうっ♪」"
translation = "「둘 다 좋네~! 진짜 커플이기에 가능한 표정! 그리고 이 분위기! 언니, 흥분돼버려♪」"

[[dialogue]]
speaker = "女性カメラマン"
original = "「次はジュエリーちゃん、手を差し出してみて。新郎役の会長くんはその手を取って」"
translation = "「다음은 쥬얼리짱, 손을 내밀어 봐. 신랑 역인 회장군은 그 손을 잡고」"

[[dialogue]]
speaker = "unk"
original = "カメラマンさんの指示に従って、俺は差し出されたジュエリーの手を取る。"
translation = "카메라맨 씨의 지시에 따라 나는 내밀어진 쥬얼리의 손을 잡는다."

[[dialogue]]
speaker = "ジュエリー"
original = "「指輪、か……」"
translation = "「반지, 인가……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「撮影の為とはいえ、これは……想像していたよりも破壊力があるな」"
translation = "「촬영을 위해서라고는 하나, 이건…… 상상했던 것보다 파괴력이 있군」"

[[dialogue]]
speaker = "unk"
original = "照れ顔のジュエリーも、すごくかわいいよ"
translation = "수줍어하는 쥬얼리도 정말 귀여워"

[[dialogue]]
speaker = "ジュエリー"
original = "「っ……そ、そんなこと言われると……ますます恥ずかしくなってしまうじゃないか……<emoji=heart04>」"
translation = "「윽…… 그, 그런 말을 들으면…… 점점 더 부끄러워져 버리지 않는가……<emoji=heart04>」"

[[dialogue]]
speaker = "女性カメラマン"
original = "「これよ！\u3000この雰囲気を写真に収める為に、私はウェディング写真を撮り続けているのよ！\u3000ありがとうございますっ！！」"
translation = "「이거야! 이 분위기를 사진에 담기 위해 나는 웨딩 사진을 계속 찍는 거야! 감사합니다!!」"

[[dialogue]]
speaker = "unk"
original = "俺たちのやり取りを見て、興奮気味のカメラマンさんは夢中でシャッターを切り続けている。……ちょっと、変わってる人かもしれない。"
translation = "우리 대화를 보며 흥분한 기색의 카메라맨 씨는 정신없이 셔터를 계속 누르고 있다. ……조금 특이한 사람일지도 모르겠다."

[[dialogue]]
speaker = "女性カメラマン"
original = "「――最後は、式場の奥で２人が愛を誓い合うカットを撮りましょう」"
translation = "「──마지막은 식장 안쪽에서 두 사람이 사랑을 맹세하는 컷을 찍죠」"

[[dialogue]]
speaker = "unk"
original = "その提案を受け、俺はジュエリーの手を取って祭壇へ歩いていく。"
translation = "그 제안을 받아 나는 쥬얼리의 손을 잡고 제단으로 걸어간다."

[[dialogue]]
speaker = "unk"
original = "そして、祭壇の前で見つめ合った。"
translation = "그리고 제단 앞에서 서로를 마주 보았다."

[[dialogue]]
speaker = "ジュエリー"
original = "「……助手。またこうして結婚式場で愛を誓い合えるなんて、嬉しいよ」"
translation = "「……조수. 다시 이렇게 결혼식장에서 사랑을 맹세할 수 있다니 기쁘군」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、『好き』や『愛』を言葉にして誓うのは、何度やってもいいものだからね」"
translation = "「후훗, 『좋아함』이나 『사랑』을 말로 해서 맹세하는 건 몇 번을 해도 좋은 법이니까」"

[[dialogue]]
speaker = "unk"
original = "ジュエリー、愛してるよ"
translation = "쥬얼리, 사랑해"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、私もだ。助手――」"
translation = "「아아, 나도다. 조수──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミは私の、『人生の助手』になってくれるかい？」"
translation = "「자네는 나의 『인생의 조수』가 되어주겠나?」"

[[dialogue]]
speaker = "unk"
original = "喜んで。これからもずっと、隣にいるよ"
translation = "기꺼이. 앞으로도 계속 곁에 있을게"

[[dialogue]]
speaker = "unk"
original = "俺たちは見つめ合い、お互いに引き付けられるようにして──唇を重ね合っていた。"
translation = "우리들은 서로를 바라보다가, 서로에게 이끌리듯── 입술을 겹쳤다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄웁……<emoji=heart04>」"

[[dialogue]]
speaker = "女性カメラマン"
original = "「ちょっ、まさかのサプライズキスッ！？」"
translation = "「잠깐, 설마 했던 서프라이즈 키스!?」"

[[dialogue]]
speaker = "女性カメラマン"
original = "「あ、甘ぁぁぁいっ！！\u3000こんなのもう本当の結婚式じゃない！？」"
translation = "「다, 달콤해애애애애! 이 정도면 이제 진짜 결혼식 아니야!?」"

[[dialogue]]
speaker = "unk"
original = "シャッター音を無限に響かせながら、夢中で撮影を続けるカメラマンさんであった。"
translation = "셔터 소리를 무한히 울리며 정신없이 촬영을 이어가는 카메라맨 씨였다."

[[dialogue]]
speaker = "unk"
original = "撮影後、ＤＩＳＣのデータで写真を確認する。"
translation = "촬영 후, DISC 데이터로 사진을 확인한다."

[[dialogue]]
speaker = "女性カメラマン"
original = "「ほら見て、このジュエリーちゃんの表情……すごくいいでしょ！？\u3000これはもう、宣伝効果抜群になること間違いなしよ！」"
translation = "「자 봐봐, 이 쥬얼리짱의 표정…… 정말 좋지!? 이건 이제 홍보 효과 발군이 될 게 틀림없어!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ……なんだか、思っていたよりずっと写真映りが良くて驚いてしまったよ……」"
translation = "「후후…… 왠지 생각했던 것보다 훨씬 사진이 잘 나와서 놀랐군……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ところで、助手。私はずっと、こんな表情をしていたのかい？」"
translation = "「그런데 조수. 나는 내내 이런 표정을 짓고 있었던 건가?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「この写真も……これもだ。どれを見ても頬を染めて、嬉しそうに微笑んでいる……」"
translation = "「이 사진도…… 이것도다. 어느 것을 봐도 뺨을 붉히고 기쁜 듯 미소 짓고 있어……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「明解に換言するならば、まるで……乙女じゃないか<emoji=heart04>」"
translation = "「명쾌하게 환언하자면, 마치…… 소녀 같지 않은가<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ずっとだよ。俺といる時のジュエリーの表情だ"
translation = "계속 그랬어. 나와 있을 때의 쥬얼리 표정이야"

[[dialogue]]
speaker = "ジュエリー"
original = "「そうか……そうなんだな。キミといる時、こんなにも表情が変わるのか、私は……」"
translation = "「그런가…… 그랬던 거군. 자네와 있을 때 이렇게나 표정이 변하는구나, 나는……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それを改めて見せつけられると……少々照れ臭いな……<emoji=heart04>」"
translation = "「그걸 새삼스레 확인하게 되니…… 조금 쑥스럽군……<emoji=heart04>」"

[[dialogue]]
speaker = "女性カメラマン"
original = "「ふふっ、私の写真、気に入ってもらえたかしら？」"
translation = "「후훗, 내 사진 맘에 들었을까?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。こんな素晴らしい写真を撮ってくれて、とても感謝している」"
translation = "「아아. 이런 훌륭한 사진을 찍어줘서 정말 감사하고 있네」"

[[dialogue]]
speaker = "ジュエリー"
original = "「機会があればまた、助手と２人で写真を撮りたい。その時は――あなたにお願いしてもいいだろうか？」"
translation = "「기회가 있다면 다시, 조수와 둘이서 사진을 찍고 싶어. 그때는―― 당신에게 부탁해도 될까?」"

[[dialogue]]
speaker = "女性カメラマン"
original = "「もちろん！\u3000喜んで撮らせていただくわ♪」"
translation = "「물론이죠! 기쁘게 찍어드릴게요♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ありがとう、ぜひ頼むよ」"
translation = "「고마워, 부디 부탁하네」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ……楽しみが増えたな、我が助手。卒業までにたくさん……いや、卒業してからも――」"
translation = "「후후…… 즐거움이 늘었구나, 나의 조수. 졸업할 때까지 많이…… 아니, 졸업하고 나서도――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「２人でたくさん、写真を撮っていこう」"
translation = "「둘이서 잔뜩, 사진을 찍어가자」"

[[dialogue]]
speaker = "unk"
original = "笑顔でそう言うジュエリーを見ながら、俺もまた未来の楽しみを思い描くのだった。"
translation = "미소 지으며 그렇게 말하는 주얼리를 보면서, 나 또한 미래의 즐거움을 그려보는 것이었다."

