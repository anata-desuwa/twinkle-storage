[[dialogue]]
speaker = "unk"
original = "第１話,曖昧な関係に終止符を,P"
translation = "제1화, 애매한 관계에 종지부를 찍다, P"

[[dialogue]]
speaker = "unk"
original = "放課後、校舎に背を預けて俺は人を待っていた。"
translation = "방과 후, 교사에 등을 기대고 나는 사람을 기다리고 있었다."

[[dialogue]]
speaker = "unk"
original = "待ち合わせの相手は羽宮蘭美。九浄家のメイド長にして新星学園３年の飛び級天才少女だ。"
translation = "약속 상대는 하네미야 라비. 쿠죠 가문의 메이드장이자 신성 학원 3학년의 월반 천재 소녀다."

[[dialogue]]
speaker = "unk"
original = "彼女とは、デートに誘われたことをきっかけに仲良くなり、バレンタインデーにチョコレートを貰うほどの関係になっていた。"
translation = "그녀와는, 데이트 신청을 계기로 친해져, 밸런타인 데이에 초콜릿을 받을 정도의 관계가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "そして今日、彼女のことを校舎の外れに呼び出したのは、俺なりの一大決心を固めてのことだった。"
translation = "그리고 오늘, 그녀를 교사 외곽으로 불러낸 것은, 나 나름의 일대 결심을 굳혔기 때문이었다."

[[dialogue]]
speaker = "蘭美"
original = "「待たせたわね」"
translation = "「기다리게 했네」"

[[dialogue]]
speaker = "unk"
original = "ごめん、わざわざ呼び出したりして"
translation = "미안, 일부러 불러내고"

[[dialogue]]
speaker = "蘭美"
original = "「構わないわ。それでどうしたのかしら、こんな人気のない場所に呼び出したりして？」"
translation = "「상관없어. 그런데 무슨 일이야, 이렇게 인기척 없는 장소로 불러내고?」"

[[dialogue]]
speaker = "蘭美"
original = "「まあ、何も言わなくても私にはちゃんと分かっているのだけれど……ふふふ」"
translation = "「뭐, 아무 말 안 해도 나는 제대로 알고 있지만……후후후」"

[[dialogue]]
speaker = "蘭美"
original = "「ずばり、デートのお誘いでしょう？\u3000予定が埋まってしまう前に、早めに押さえておこうという算段ね！」"
translation = "「단도직입적으로, 데이트 신청이겠지? 일정이 차 버리기 전에, 미리 잡아두려는 속셈이네!」"

[[dialogue]]
speaker = "蘭美"
original = "「でも心配しなくていいわ。メイド長として忙しい身ではあるけれど、私が貴方の誘いを断ったことなんてあったかしら？」"
translation = "「하지만 걱정할 필요 없어. 메이드장으로서 바쁜 몸이긴 하지만, 내가 네 초대를 거절한 적이 있었던가?」"

[[dialogue]]
speaker = "unk"
original = "一度もない、ね"
translation = "한 번도 없어, 그렇지"

[[dialogue]]
speaker = "蘭美"
original = "「でしょう？\u3000それよりもデートコースは決めているのかしら？」"
translation = "「그렇지? 그보다 데이트 코스는 정했어?」"

[[dialogue]]
speaker = "蘭美"
original = "「次のデートは……どこがいいかしら？\u3000渋谷？\u3000六本木？\u3000それともお台場？\u3000一緒に行ってみたい場所がいっぱいで迷うわね」"
translation = "「다음 데이트는……어디가 좋을까? 시부야? 롯폰기? 아니면 오다이바? 같이 가보고 싶은 장소가 많아서 고민되네」"

[[dialogue]]
speaker = "蘭美"
original = "「えっ、違う？\u3000まさか……会長のお仕事が忙しくなってきたから、しばらくデートは出来ない、とか……？」"
translation = "「엣, 아니라고? 설마……회장 일이 바빠져서, 당분간 데이트는 못 한다, 라든가……?」"

[[dialogue]]
speaker = "蘭美"
original = "「まあ、そういうことなら、仕方ないわね……貴方には貴方の都合があるのだから……」"
translation = "「뭐, 그런 거라면, 어쩔 수 없지……너에게는 너의 사정이 있을 테니까……」"

[[dialogue]]
speaker = "蘭美"
original = "「えっ、それも違う？\u3000……だとしたら、どうして私を呼び出したのかしら？」"
translation = "「엣, 그것도 아니라고? ……그렇다면, 왜 나를 불러낸 거야?」"

[[dialogue]]
speaker = "unk"
original = "ちょっと背伸びをしてくれる？"
translation = "잠깐 까치발을 들어 줄래?"

[[dialogue]]
speaker = "蘭美"
original = "「背伸び？\u3000私は背伸びが必要なほど小さくはないけれど……まあいいわよ」"
translation = "「까치발? 나는 까치발이 필요할 정도로 작지는 않지만……뭐, 괜찮아」"

[[dialogue]]
speaker = "蘭美"
original = "「んーーーーーっ！\u3000こ、これでいいかしら？」"
translation = "「음ーーーーー읏! 이, 이걸로 됐어?」"

[[dialogue]]
speaker = "蘭美"
original = "「む、無理なんてしていないわ。だけど、あと１０秒で終わりにするわよ！」"
translation = "「무, 무리는 안 하고 있어. 하지만, 앞으로 10초 후에 끝낼 거야!」"

[[dialogue]]
speaker = "unk"
original = "俺は目をつぶって背伸びする蘭美の頬に、浅くキスをした。"
translation = "나는 눈을 감고 까치발을 드는 라비의 뺨에, 가볍게 키스했다."

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃっ！！？」"
translation = "「뺘앗!!?」"

[[dialogue]]
speaker = "蘭美"
original = "「ほ、ほっぺに、キス！？\u3000ふ、ふふ……いきなりそんなことしてくるなんて思わなかったわ……さすがに驚いたじゃない」"
translation = "「보, 뺨에, 키스!? 후, 후후……갑자기 그런 짓을 해 올 줄은 몰랐어……역시 놀랐잖아」"

[[dialogue]]
speaker = "蘭美"
original = "「ん……？\u3000ああ、そういえばバレンタインの時に、私の方からやったわね……つまり、その時のお返しということかしら？」"
translation = "「음……? 아아, 그러고 보니 밸런타인 때, 내가 먼저 했었지……즉, 그때의 답례라는 건가?」"

[[dialogue]]
speaker = "蘭美"
original = "「いい傾向ね。こういったスキンシップを気軽に取れるようになったのは、私たちの仲が深まってきた証拠だわ」"
translation = "「좋은 경향이네. 이런 스킨십을 거리낌 없이 할 수 있게 된 것은, 우리 사이가 깊어졌다는 증거야」"

[[dialogue]]
speaker = "蘭美"
original = "「会長からそれを求めてくれるようになったのは、喜ばしいことよ……ふ、ふふふ」"
translation = "「회장이 그것을 요구하게 된 것은, 기쁜 일이야……후, 후후후」"

[[dialogue]]
speaker = "unk"
original = "俺と付き合ってほしい！"
translation = "나와 사귀어 줘!"

[[dialogue]]
speaker = "unk"
original = "蘭美のことが好きだ！"
translation = "라비를 좋아해!"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃゃゃゃゃっ！！！？」"
translation = "「뺘야야야야읏!!!?」"

[[dialogue]]
speaker = "蘭美"
original = "「つ、つ、付き合って、って……急に、な、な、何を言い出しちゃってんのかしらっ！？」"
translation = "「사, 사, 사귀자, 니……갑자기, 무, 무, 무슨 말을 꺼내는 거야읏!?」"

[[dialogue]]
speaker = "蘭美"
original = "「そ、それってもしかして……愛の告白、ということ……なの？」"
translation = "「그, 그건 혹시……사랑의 고백, 이라는 것……인 거야?」"

[[dialogue]]
speaker = "蘭美"
original = "「そう……曖昧だった関係を、そろそろはっきりさせよう……そういうことなのね？」"
translation = "「그래……애매했던 관계를, 슬슬 확실히 하자……그런 뜻인 거네?」"

[[dialogue]]
speaker = "蘭美"
original = "「すぅ～～はぁ～～～～ふぅ……」"
translation = "「스읍～～하아～～～～후우……」"

[[dialogue]]
speaker = "蘭美"
original = "「以前も話したことがあるのだけれど、もう一度確認するわ」"
translation = "「이전에도 이야기한 적이 있지만, 다시 한번 확인할게」"

[[dialogue]]
speaker = "蘭美"
original = "「私はメイドを目指す条件として、両親から未来の婿候補を探すように言われてる」"
translation = "「나는 메이드를 목표로 하는 조건으로, 부모님에게서 미래의 사위 후보를 찾으라고 들었어」"

[[dialogue]]
speaker = "蘭美"
original = "「私と付き合うということは、魔界の貴族に婿入りするってことよ。……それも分かった上で告白してくれた、ということでいいのよね？」"
translation = "「나와 사귄다는 것은, 마계의 귀족에게 데릴사위로 들어온다는 거야. ……그것도 알고서 고백해 준 것으로, 이해해도 되는 거지?」"

[[dialogue]]
speaker = "蘭美"
original = "「そう……貴方なら結婚相手として申し分ないわ……お父様とお母様も、きっと喜んでくれるでしょう」"
translation = "「그래……너라면 결혼 상대로 나무랄 데 없어……아버님과 어머님도, 분명 기뻐해 주실 거야」"

[[dialogue]]
speaker = "unk"
original = "どうかな、蘭美？"
translation = "어때, 라비?"

[[dialogue]]
speaker = "蘭美"
original = "「……嬉しいわ、会長。貴方と恋人になれて。私の答えは、もちろんＯＫよ」"
translation = "「……기뻐, 회장. 너와 연인이 되어서. 내 대답은, 물론 OK야」"

[[dialogue]]
speaker = "蘭美"
original = "「私にしてはゆっくりした進展だったけど、その甲斐があったというものよ」"
translation = "「나로서는 느린 진전이었지만, 그럴 가치가 있었다는 거지」"

[[dialogue]]
speaker = "蘭美"
original = "「それじゃ会長、晴れて恋人同士になった私たちが、一番最初にしなければならないことは、何かしら？」"
translation = "「그럼 회장, 정식으로 연인 사이가 된 우리가, 가장 먼저 해야 할 일은, 뭘까?」"

[[dialogue]]
speaker = "蘭美"
original = "「ほら、恥ずかしがっていないで……ここまで来たらちゃんときめなさい」"
translation = "「자, 부끄러워하지 말고……여기까지 왔으면 제대로 정해 봐」"

[[dialogue]]
speaker = "unk"
original = "目を閉じてくれる？"
translation = "눈을 감아 줄래?"

[[dialogue]]
speaker = "蘭美"
original = "「ん<emoji=heart04>\u3000わかったわ」"
translation = "「응<emoji=heart04> 알았어」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁ……ちゅ<emoji=heart04>\u3000ちゅ、んんっ<emoji=heart04>」"
translation = "「하아……츄<emoji=heart04> 츄, 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
original = "「ふぁ……。ふふっ、口づけは初めて、ね……」"
translation = "「파아……후훗, 입맞춤은 처음이네……」"

[[dialogue]]
speaker = "蘭美"
original = "「不思議な感じだったわ……でも、これからは沢山、こういうこともしていって……当たり前のように出来るようになるのかしら」"
translation = "「이상한 느낌이었어……하지만, 이제부터는 잔뜩, 이런 것도 해나가서……당연하게 할 수 있게 되는 걸까」"

[[dialogue]]
speaker = "蘭美"
original = "「会長。今後は恋人として、それから婚約者として、末永くよろしく頼むわよ<emoji=heart04>」"
translation = "「회장. 앞으로는 연인으로서, 그리고 약혼자로서, 오래도록 잘 부탁해<emoji=heart04>」"

