[[dialogue]]
speaker = "unk"
original = "第１話,フレイムフォーム,P"
translation = "제1화, 플레임 폼, P"

[[dialogue]]
speaker = "unk"
original = "黒ベア子の出現から一夜明けて……"
translation = "흑베아코의 출현으로부터 하룻밤이 지나고……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──ででーん！\u3000どうだ魔王、改めてこいつが……アポロちゃんフレイムフォームだぜ！」"
translation = "「──짜잔! 어떠냐 마왕, 새롭게 태어난 이 녀석이…… 아폴로짱 플레임 폼이라구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おっと、あんまり近づくとヤケドするぞ。ま──あたしの愛の熱に溶かされたいなら、構わないけどな！」"
translation = "「오옷, 너무 가까이 오면 화상 입는다구. 뭐── 내 사랑의 열기에 녹아버리고 싶다면, 상관없지만 말이야!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしがノリノリだって？\u3000そりゃそうだ、やっぱフォームチェンジっていったらヒーローの華だろ？\u3000まさかこんな形で叶うなんて思わなかったぜ」"
translation = "「내가 신나 보인다고? 그야 당연하지, 역시 폼 체인지라고 하면 히어로의 꽃이잖아? 설마 이런 형태로 이루어질 줄은 몰랐다구」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フッフッフ──芸術は爆発だ、ってな！\u3000こいつを着てると、全身から『いんすぴれーしょん』が湧いてくる気がするぜ！」"
translation = "「훗훗훗── 예술은 폭발이다, 이거지! 이걸 입고 있으면, 온몸에서 『인스피레이션』이 솟구치는 기분이라구!」"

[[dialogue]]
speaker = "unk"
original = "不便じゃないの？"
translation = "불편하지 않아?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ。黒ベア子のやつがなんであたしにこれを着せたのかはわかんねーけど……特に動きづらかったりはしないぞ。むしろ身軽なくらいだ」"
translation = "「아아. 흑베아코 녀석이 왜 나한테 이걸 입혔는지는 모르겠지만…… 딱히 움직이기 어렵거나 하진 않아. 오히려 몸이 가벼울 정도라구」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ただ参ったことに、元のフォームに戻れなくなっちゃってんだよな」"
translation = "「다만 곤란하게도, 원래 폼으로 돌아갈 수 없게 되어버렸단 말이지」"

[[dialogue]]
speaker = "unk"
original = "ダメじゃん？"
translation = "안 되잖아?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うむ……確かに、ずっとこのままってのは良くないかもしれん。パンツとはワケが違うからな」"
translation = "「으음…… 확실히, 계속 이대로인 건 좋지 않을지도 모르겠군. 팬티와는 차원이 다르니까 말이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000元に戻る方法を一緒に探してくれるって？\u3000さすが魔王だな、助かるぞ！」"
translation = "「응? 원래대로 돌아가는 방법을 같이 찾아주겠다고? 역시 마왕이네, 고맙다구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ただし！\u3000その前にだ！\u3000この新たに生まれ変わったあたしの姿を、皆の衆に見せびらかしてやるぜ～～！！」"
translation = "「하지만! 그전에 말이야! 이 새로 태어난 나의 모습을, 모두에게 자랑해 주겠어～～!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ～も～どうしよどうしよ。アナがいなくちゃ事務仕事が回らないし、サーシャさんにも頼れないし……！」"
translation = "「아～ 정말 어떡해 어떡해. 아나가 없으면 사무 업무가 안 돌아가고, 사샤 씨한테도 의지할 수 없고……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──邪魔するぜ！」"
translation = "「──실례하겠다구!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──ってわぁっ！？\u3000会長──と、アポロちゃん？」"
translation = "「──어라 왓!? 회장님──이랑, 아폴로짱?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふっ、いかにもだ！\u3000どうだマトイ、生まれ変わったあたしの姿は！」"
translation = "「후후, 그렇다! 어떠냐 마토이, 새로 태어난 나의 모습은!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「な、なんかいつもと違う感じだね……！\u3000すごい情熱を感じるっていうか……！」"
translation = "「나, 뭔가 평소랑 다른 느낌이네……! 엄청난 정열이 느껴진달까……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だろ～！？\u3000マトイはよくわかってるな！\u3000この新フォームの魅力を！」"
translation = "「그렇지～!? 마토이는 잘 아는구나! 이 신 폼의 매력을!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「楽しそう──なのはいいんだけど、こっちは今それどころじゃなくて……星徒会の業務が山盛りなの～！」"
translation = "「즐거워 보이는 건── 좋지만, 이쪽은 지금 그럴 때가 아니라서…… 성도회의 업무가 산더미라구～!」"

[[dialogue]]
speaker = "unk"
original = "大変そうだね、マトイ"
translation = "힘들어 보이네, 마토이"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うんうん、実は……って他人事じゃないでしょ会長！\u3000アナとサーシャさんがいなくなっちゃったんだよ～！？」"
translation = "「응응, 사실은…… 이 아니라 남 일처럼 말하지 마세요 회장님! 아나랑 사샤 씨가 없어져 버렸다니까요～!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「まあまあ、そう焦るなマトイ。アナとサーシャも今頃、あたしと同じく新フォームに心躍らせてるかもしれないぜ！」"
translation = "「자자, 그렇게 서두르지 마 마토이. 아나랑 사샤도 지금쯤, 나처럼 신 폼에 마음이 설레고 있을지도 모른다구!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええ……？\u3000な、何がどうなってるの……？」"
translation = "「에에……? 뭐, 뭐가 어떻게 된 거야……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ま、その事件もあたしらが解決してやるさ。よおし魔王、次は流星のほうに向かうぞ！」"
translation = "「뭐, 그 사건도 우리가 해결해 주지. 좋았어 마왕, 다음은 유성 쪽으로 향하자구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──はっはっは！\u3000頼もう！」"
translation = "「──하하하! 실례하겠네!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うわ、なんか知らん人きた！」"
translation = "「우와, 웬 모르는 사람이 왔어!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「星徒会室という拠点に襲撃を仕掛けてくるとは大した敵です。ただちに撃退の準備を──」"
translation = "「성도회실이라는 거점에 습격을 가해오다니 대단한 적입니다. 즉시 격퇴 준비를──」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──待て待て！\u3000あたしだ、アポロだ！」"
translation = "「──기다려 기다려! 나야, 아폴로라구!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん？\u3000おお、ホントだ」"
translation = "「응? 오오, 진짜네」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ！\u3000新たな魅力に目覚めたアポロ嬢なのニャ！」"
translation = "「냐! 새로운 매력에 눈을 뜬 아폴로 양인 거냐옹!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふん。どうだ、このアポロ様の新衣装は。クールさとホットさが一緒になったナイスデザインだろ？」"
translation = "「후훈. 어떠냐, 이 아폴로 님의 새 의상은. 쿨함과 핫함이 공존하는 나이스 디자인이지?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「おおう、なんかイメチェンしてんな。しかもその戦闘服って──あたしと同じ『炎』か？」"
translation = "「오오, 뭔가 이미지 변신했네. 게다가 그 전투복── 나랑 같은 『불꽃』인가?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふっふっふ……その通り！\u3000それもあたしの炎はただの炎じゃないぞ、芸術の爆炎なんだ！」"
translation = "「훗훗훗…… 그렇지! 그것도 내 불꽃은 평범한 불꽃이 아니라구, 예술의 폭염이다!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「芸術……？」"
translation = "「예술……?」"

[[dialogue]]
speaker = "unk"
original = "自慢したいみたい"
translation = "자랑하고 싶은가 봐"

[[dialogue]]
speaker = "unk"
original = "付き合ってあげて"
translation = "장단 좀 맞춰줘"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うんうん、確かにこっちのアポロちゃんもイカしてる感じ♪」"
translation = "「응응, 확실히 이쪽 아폴로짱도 멋진 느낌♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ……見るからに暖かそうなので、そばに置いておきたいです」"
translation = "「에에…… 보기만 해도 따뜻해 보여서, 곁에 두고 싶네요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへへ。そんなくっつくなって、ソフィア」"
translation = "「헤헤헤. 그렇게 달라붙지 말라구, 소피아」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「んでもよ、どうしたんだ？\u3000セレスティアが進化でもしたのか？」"
translation = "「그건 그렇고, 어떻게 된 거야? 셀레스티아가 진화라도 한 건가?」"

[[dialogue]]
speaker = "unk"
original = "黒ベア子のせいで……"
translation = "흑베아코 때문에……"

[[dialogue]]
speaker = "unk"
original = "かくかくしかじか"
translation = "이러저러해서"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「黒ベア子……クマロボ……お祭り……？\u3000また妙なことが起きてるみたいだな」"
translation = "「흑베아코…… 곰 로봇…… 축제……? 또 묘한 일이 일어난 모양이네」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ。消えたアナ達のためにも、あたし達はなんとかしなくちゃいけないんだ」"
translation = "「아아. 사라진 아나 일행을 위해서라도, 우리는 어떻게든 해야만 해」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そう言えば、先ほど正門前で謎のクマ型ロボを見かけましたね」"
translation = "「그러고 보니, 아까 정문 앞에서 수수께끼의 곰 형태 로봇을 봤어요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「む！\u3000そいつだ。他のやつに迷惑かけないとも限らないからな──普段とは違うけど、出動の必要ありだぜ！」"
translation = "「무! 그 녀석이다. 다른 녀석들에게 폐를 끼치지 않으리란 법도 없으니까── 평소와는 다르지만, 출동할 필요가 있다구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よーし出かけるぞ魔王、クマ狩りの時間だ！\u3000あたしのハートが燃えたぎるぜ……ファイヤー！」"
translation = "「좋아 출동이다 마왕, 곰 사냥 시간이다! 내 하트가 불타오른다구…… 파이어!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いつにも増してガッツマシマシだねー、アポロちゃん」"
translation = "「평소보다 더 의욕이 넘치네, 아폴로짱」"

