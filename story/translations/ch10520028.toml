[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふぅ……誰もいない海で泳ぐのは、心地がいいものだな」"
translation = "「후우…… 아무도 없는 바다에서 수영하는 건 기분이 좋군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「私と貴様が交際していることはあまり大っぴらにはできんからな。プライベートビーチを貸し切りにできるのはとても助かる」"
translation = "「나와 네가 교제하고 있다는 건 그리 대놓고 드러낼 수 없으니까 말이다. 프라이빗 비치를 전세 낼 수 있는 건 아주 도움이 되는군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……ところで貴様。海で遊ぶばかりでいいのか？\u3000お互い、久しぶりの休日だ」"
translation = "「……그런데 너. 바다에서 놀기만 해도 괜찮은 건가? 서로 오랜만의 휴일이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「泳いでいる時から不躾な視線を感じる。まぁ……嫌ではないんだが」"
translation = "「수영할 때부터 무례한 시선이 느껴지는군. 뭐…… 싫지는 않지만」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの魅力的な水着姿についつい見惚れてしまっていた俺は、素直に『エッチなことがしたい』と伝えた。"
translation = "세드나 씨의 매력적인 수영복 차림에 그만 넋을 잃고 보고 있던 나는, 솔직하게 『야한 일을 하고 싶다』고 전했다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……やはりな。したかったのならば、素直にそう言えばいいものを」"
translation = "「……역시나군. 하고 싶었다면 솔직하게 그렇게 말하면 될 것을」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「デートが始まってすぐに求めるなど、軽薄に見られると思ったか？\u3000フ──おかしなところで律儀なやつだ」"
translation = "「데이트가 시작되자마자 요구하는 게 경박하게 보일 거라 생각했나? 후── 묘한 부분에서 고지식한 녀석이군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「構わんさ。魔女と人間は時間の概念が違う。私たちから見れば、人間はいつだって生き急ぐ生き物だ」"
translation = "「상관없다. 마녀와 인간은 시간의 개념이 달라. 우리가 보기엔 인간은 언제나 서둘러 살아가는 생물이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それでは行くか。このプライベートビーチには、水上コテージもあると聞いた」"
translation = "「그럼 갈까. 이 프라이빗 비치에는 수상 코테지도 있다고 들었다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ここしばらく逢えなかったからな。私も色々と鬱憤が溜まっている。しっかりと貴様の体で、発散させてもらおうか？」"
translation = "「한동안 만나지 못했으니까 말이야. 나도 여러모로 울분이 쌓여 있어. 확실하게 네 몸으로 발산하게 해줄까?」"

[[dialogue]]
speaker = "unk"
original = "コテージのとびきり大きなベッドの上で、あられもなく水着をはだけたセドナさんが、視界いっぱいに映る。"
translation = "코테지의 아주 커다란 침대 위에서, 아낌없이 수영복을 헤친 세드나 씨가 시야 가득히 비친다."

[[dialogue]]
speaker = "unk"
original = "たっぷりと実ったおっぱいに、はしたなく広げられた両足。海と青空を背負って俺を見つめるセドナさんは、とても楽しそうだ。"
translation = "듬뿍 여문 가슴에, 부끄럽게 벌려진 양다리. 바다와 푸른 하늘을 등지고 나를 바라보는 세드나 씨는 아주 즐거워 보인다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なんだお前。まだ触れてもいないのに、こんなにも一物を大きくして……童貞でもあるまい。大げさなやつめ」"
translation = "「뭐냐 너. 아직 닿지도 않았는데 이렇게나 일물을 크게 키우고…… 동정도 아닐 텐데. 호들갑스러운 녀석이군」"

[[dialogue]]
speaker = "unk"
original = "この状況で勃起しない男はいない。それにここ最近、セドナさんとこういう時間を取ることも難しかったから、ずっとオアズケ状態だったのだ。"
translation = "이 상황에서 발기하지 않는 남자는 없다. 게다가 최근 세드나 씨와 이런 시간을 갖기도 어려웠기에 계속 참아온 상태였다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「何……前回、<ruby>番<rt>つが</rt></ruby>った後から一度も射精をしていない……？\u3000自ら慰めることもしていないのか？」"
translation = "「뭐…… 지난번 <짝지은 뒤로 한 번도 사정하지 않았다고……? 스스로 달래는 일도 하지 않은 건가?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「射精するなら私の身体で──だと？\u3000フフ……人間の若い雄に我慢は辛いだろうに」"
translation = "「사정한다면 내 몸에서── 라고? 후후…… 젊은 인간 수컷에게 참는 건 고역이었을 텐데」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だがちょうどいい。私も、お前と番う時以外で性欲の発散などしないからな……」"
translation = "「하지만 마침 잘됐군. 나도 너와 짝지을 때 이외에는 성욕 발산 같은 건 하지 않으니까……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。端的に言うと、かなり『溜まって』いる」"
translation = "「아아. 단적으로 말하자면 꽤나 『쌓여』 있다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔女は本来、生殖を必要としない種だというのに。妙なところで、人間の影響を受けているようだ」"
translation = "「마녀는 본래 생식을 필요로 하지 않는 종인데도. 묘한 부분에서 인간의 영향을 받고 있는 모양이군」"

[[dialogue]]
speaker = "unk"
original = "魔女は世界樹から産み落とされる。男女で番って子をなす人間とは違うから、性欲という概念も人間より薄いと聞いたことがあった。"
translation = "마녀는 세계수에서 태어난다. 남녀가 짝지어 자식을 낳는 인간과는 다르기에 성욕이라는 개념도 인간보다 옅다고 들은 적이 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし今の彼女は、俺のペニスを熱い眼差しで見下ろし、女性器からもとろりと愛液を滴らせている。"
translation = "하지만 지금의 그녀는 내 페니스를 뜨거운 눈빛으로 내려다보며, 성기에서도 걸쭉하게 애액을 흘리고 있다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「認めたくはないが、お前と何度も番ううち……私の身体にも変化があったようだな」"
translation = "「인정하고 싶지는 않지만, 너와 몇 번이나 짝짓는 사이…… 내 몸에도 변화가 있었던 모양이군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「体の芯が熱い。お前と繋がり、一滴残らず搾り取ってやりたい──そんな欲を抑えきれん」"
translation = "「몸속 깊은 곳이 뜨거워. 너와 연결되어 한 방울도 남김없이 짜내고 싶어── 그런 욕구를 억누를 수 없군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「久方ぶりの交尾だ。今日は激しめに行くぞ……？」"
translation = "「오랜만의 교미다. 오늘은 격렬하게 가겠다……?」"

[[dialogue]]
speaker = "unk"
original = "そうして、セドナさんのひやりと冷たい指先が、ペニスの勃起角度を調節して──"
translation = "그렇게 세드나 씨의 서늘하고 차가운 손가락 끝이 페니스의 발기 각도를 조절하고──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「くっ──ぁ、あっ……ぁあぁあっ……<emoji=heart04>」"
translation = "「큭── 아, 앗…… 아아아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "反りかえるペニスが、セドナさんの秘部へと一息に飲み込まれていった。"
translation = "휘어지는 페니스가 세드나 씨의 비부로 단숨에 삼켜져 갔다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んんっ……はぁ、あ、あぁあっ……<emoji=heart04>\u3000フフ、全部入ったな……ンっ<emoji=heart04>」"
translation = "「음으윽…… 하아, 아, 아아앗…… <emoji=heart04> 후후, 전부 들어갔군…… 응윽 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「相変わらず、無駄に太くて、硬い一物だ……ふぅ、んんっ……私の中で、ビクビクと震えて……」"
translation = "「여전히 쓸데없이 굵고 딱딱한 일물이군…… 후우, 음윽…… 내 안에서 움찔움찔 떨리며……」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの膣内は、相変わらずとても熱い。挿入したペニスと膣内の境目がわからないほどに、温かい柔肉に包まれている。"
translation = "세드나 씨의 질 내는 여전히 아주 뜨겁다. 삽입한 페니스와 질 내부의 경계를 알 수 없을 정도로 따뜻한 부드러운 살덩이에 감싸여 있다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「私の<ruby>膣内<rt>なか</rt></ruby>の方が熱い……か<emoji=heart04>」"
translation = "「내 질 내부 쪽이 더 뜨겁다…… 인가 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まあ、致し方ないだろう。んんっ<emoji=heart04>\u3000私は焔を……熱を司る魔女なのだから。昂れば昂るほど、体温も上がるさ」"
translation = "「뭐, 어쩔 수 없겠지. 음윽 <emoji=heart04> 나는 불꽃을…… 열을 다스리는 마녀니까. 고조되면 고조될수록 체온도 올라가거든」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「では、お前の一物を責め立ててやる。だが、わかっているだろうな？\u3000すぐに果てたら許さん──ぞっ<emoji=heart04>」"
translation = "「그럼 네 일물을 몰아붙여 주마. 하지만 알고 있겠지? 금방 가버리면 용서하지 않겠다── 고! <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はぁ、あぁっ、んんっ……ふぅ、んんっ……あ、あぁっ、はあぁ、んん、んんっ<emoji=heart04>」"
translation = "「하아, 아앗, 음윽…… 후우, 음윽…… 아, 아앗, 하아, 음, 음윽 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いいぞ、いい、具合だっ……んんっ<emoji=heart04>\u3000お前の一物、今日もしっかり反りかえってっ……はぁ、あっ……んん、んぁ、あぁっ……<emoji=heart04>」"
translation = "「좋아, 좋은 기분이다…… 음윽 <emoji=heart04> 네 일물, 오늘도 확실히 휘어지고 있어…… 하아, 앗…… 음, 응아, 아앗…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んんっ……お前は、どうだ？\u3000気持ちがいいかっ……私の、<ruby>膣内<rt>なか</rt></ruby>はっ……<emoji=heart04>」"
translation = "「음윽…… 너는 어떠냐? 기분이 좋나……? 내 질 내부은…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言うまでもなく最高だった。セドナさんの熱を帯びた膣内で包まれ、締めあげられながらシゴかれる──気持ちよくないはずがない。"
translation = "말할 것도 없이 최고였다. 세드나 씨의 열기를 띤 질 내부에 감싸여 조여지면서 비벼지는 것── 기분 좋지 않을 리가 없다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フフっ……ご満悦のようだなっ……では、もっと硬くしろっ……<emoji=heart04>」"
translation = "「후후…… 만족스러운 모양이군…… 그럼 더 딱딱하게 만들어라…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「熱くて硬い一物が、私は好きだっ……いいか、果てるその時まで、この硬さを維持しろ<emoji=heart04>\u3000んん、んんぅ、はっ、はぁああっ<emoji=heart04>」"
translation = "「뜨겁고 딱딱한 일물이 나는 좋다…… 알겠나, 가버리는 그 순간까지 이 강도를 유지해라 <emoji=heart04> 음, 음으, 하, 하아아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「お前が昂れば、昂っただけ、私もしっかりと応えてやろうっ……ん、ふぅ、んんっ……んんう、はぁ、んんっ<emoji=heart04>」"
translation = "「네가 고조되면 고조된 만큼 나도 확실히 응해주마…… 응, 후우, 음윽…… 음으, 하아, 음윽 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「やはり、性行為はっ……はぁ<emoji=heart04>\u3000男を組み伏せるに、限るなっ……はぁ、あっ……ふぅ……あぁっ<emoji=heart04>」"
translation = "「역시 성행위는…… 하아 <emoji=heart04> 남자를 굴복시키는 게 제일이군…… 하아, 앗…… 후우…… 아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「自分のペースで、心地よいところを擦れる……くぅ、あっ<emoji=heart04>\u3000ふぅっ……フフっ♪」"
translation = "「자신의 페이스로 기분 좋은 곳을 문지를 수 있어…… 쿠우, 앗 <emoji=heart04> 후우…… 후후♪」"

[[dialogue]]
speaker = "unk"
original = "セドナさんとは色々な体位を試したが、彼女の一番のお気に入りは騎乗位だった。"
translation = "세드나 씨와는 여러 체위를 시도했지만, 그녀가 가장 좋아하는 것은 기승위였다."

[[dialogue]]
speaker = "unk"
original = "責めるプレイが性に合うのだろう。俺は為すがままで、ゆさっ、ゆさっ、と揺れる彼女のおっぱいに見とれてしまう。"
translation = "몰아붙이는 플레이가 적성에 맞는 것이리라. 나는 속수무책으로 흔들흔들 흔들리는 그녀의 가슴에 넋을 잃고 만다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フ──こういうことをしている時の雄は、皆っ……ン<emoji=heart04>\u3000こうなのか？\u3000胸ばかり、ジロジロと……<emoji=heart04>」"
translation = "「후── 이런 짓을 할 때의 수컷은 다들…… 응 <emoji=heart04> 이런 건가? 가슴만 빤히…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "水着姿の時からわかっていたことだが、セドナさんのスタイルは抜群だ。"
translation = "수영복 차림일 때부터 알고 있었지만, 세드나 씨의 몸매는 발군이다."

[[dialogue]]
speaker = "unk"
original = "騎乗位では特におっぱいの揺れが強調されるから、何度唾を飲んでも喉が渇く。"
translation = "기승위에서는 특히 가슴의 흔들림이 강조되기에 몇 번이나 침을 삼켜도 목이 마른다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いいぞ……？\u3000好きなだけ見るがいい。許してやる……ふぅっ……んあ、はっ……ふぅうっ<emoji=heart04>」"
translation = "「좋다……? 마음껏 봐라. 허락해주마…… 후우…… 응아, 하…… 후우우 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「貴様が興奮すると、私にとってもいいことづくめだからなっ……ほら、たっぷりと、シゴき立てて、やるっ<emoji=heart04>」"
translation = "「네가 흥분하면 나에게도 좋은 일뿐이니까 말이야…… 자, 듬뿍 비벼주마…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「一物が硬く反りかえれば、もっと心地よい、だろうし……んんっ<emoji=heart04>\u3000貴様が私の身体に夢中というのも、気分がいいっ……あっ<emoji=heart04>」"
translation = "「일물이 딱딱하게 휘어지면 더 기분 좋을 테고…… 음윽 <emoji=heart04> 네가 내 몸에 빠져 있다는 것도 기분이 좋아…… 앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「パートナーなのだから、互いの欲求不満は、こういう時にしっかりとっ……発散して──ぁっ<emoji=heart04>\u3000おかなくては、なっ<emoji=heart04>」"
translation = "「파트너니까 서로의 욕구불만은 이럴 때 확실히…… 발산해── 앗 <emoji=heart04> 두어야지, 응 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかしこう何度も目の前でおっぱいを弾ませられると、触りたくなってしまうのが男の性だ。"
translation = "하지만 이렇게 몇 번이나 눈앞에서 가슴을 튕겨대면 만지고 싶어지는 것이 남자의 본능이다."

[[dialogue]]
speaker = "unk"
original = "気づいた時には、おっぱいをすくい上げるようにして揉みこんでいた。"
translation = "정신을 차렸을 때는 가슴을 떠받치듯 움켜쥐며 주무르고 있었다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──んんっ<emoji=heart04>\u3000こ、こらっ……貴様っ<emoji=heart04>\u3000許可してやったのは、見ることだけだぞ？」"
translation = "「──음윽 <emoji=heart04> 이, 이봐…… 네 녀석 <emoji=heart04> 허락한 건 보는 것뿐이다?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はぁ、んんっ……乳房を、触る時はっ……ふぅっ<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000許可を取れと、いつも言っている、だろうが……<emoji=heart04>」"
translation = "「하아, 음윽…… 유방을 만질 때는…… 후우 <emoji=heart04> 앗 <emoji=heart04> 허락을 받으라고 항상 말하지 않았느냐…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すみません、つい……」"
translation = "「죄송합니다, 저도 모르게……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まったく。雄は本当に乳房が好き、だなっ……<emoji=heart04>\u3000こんなもの、ただの脂肪の、塊だぞ……？\u3000んんっ<emoji=heart04>\u3000はぁ、ふぅっ<emoji=heart04>」"
translation = "「정말이지. 수컷은 정말 유방을 좋아하군…… <emoji=heart04> 이런 거 그냥 지방 덩어리라고……? 음윽 <emoji=heart04> 하아, 후우 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「大きくて肩が凝るし、戦闘の際は、邪魔になるっ……あっても何の役にも立たないっ……んん、ふぅっ、はぁ、んんっ<emoji=heart04>」"
translation = "「커서 어깨도 결리고, 전투 때는 방해가 된다…… 있어도 아무 도움이 안 돼…… 음, 후우, 하아, 음윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの愚痴を聞きながら、パン生地をこねるみたいにおっぱいを夢中で揉みしだく。"
translation = "세드나 씨의 푸념을 들으면서 빵 반죽을 주무르듯 가슴을 정신없이 주물러댄다."

[[dialogue]]
speaker = "unk"
original = "そうすると、頭の芯がじゅわじゅわととろけていくような気分になるからたまらない。"
translation = "그러면 머릿속이 쥬와쥬와 녹아내리는 기분이 들어 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "興奮が止まらない。どんどん、どんどんペニスが硬くなる──"
translation = "흥분이 멈추지 않는다. 점점, 점점 페니스가 딱딱해진다──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふ、ふふっ……<emoji=heart04>\u3000そう、何の役にも立たない、と思っていたの、だがな……<emoji=heart04>」"
translation = "「후, 후후…… <emoji=heart04> 그래, 아무 도움이 안 된다고 생각했다만…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「お前と番うようになってから、ふぅっ……考えを、改めるように、なった……<emoji=heart04>」"
translation = "「너와 짝짓게 된 뒤로 후우…… 생각을 고쳐먹게 되었어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふぅっ……男を誘惑し、さらに昂らせるには、乳房は手っ取り早くて、便利だっ<emoji=heart04>\u3000ふふっ……いいぞ、もっと、揉むといい……<emoji=heart04>」"
translation = "「후우…… 남자를 유혹하고 더욱 고조시키기엔 유방은 간편하고 편리하군 <emoji=heart04> 후후…… 좋다, 더 주물러라…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はぁ、あ、ああっ……<emoji=heart04>\u3000これだ、熱い一物、私の好みだっ……奥に当たって、んぁああっ<emoji=heart04>」"
translation = "「하아, 아, 아앗…… <emoji=heart04> 이거다, 뜨거운 일물, 내 취향이야…… 깊숙이 닿아서, 응아아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──はぁあっ<emoji=heart04>\u3000んん、んぅ<emoji=heart04>\u3000揉むのはいいが──ンっ<emoji=heart04>\u3000乳首ばかり責めるな……尻を打ち付け、づらい、だろうがっ<emoji=heart04>」"
translation = "「──하아앗 <emoji=heart04> 음, 음으 <emoji=heart04> 주무르는 건 좋다만── 응윽 <emoji=heart04> 유두만 괴롭히지 마라…… 엉덩이를 찧기 힘들지 않느냐…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セックスするたびに、セドナさんの乳首を吸ったり弄ったりしていたせいだろうか。"
translation = "섹스할 때마다 세드나 씨의 유두를 빨거나 만지작거린 탓일까."

[[dialogue]]
speaker = "unk"
original = "ただでさえ敏感な乳首が、随分と感じやすくなっているらしかった。"
translation = "안 그래도 민감한 유두가 상당히 느끼기 쉽게 변한 모양이었다."

[[dialogue]]
speaker = "unk"
original = "凛々しい彼女のエッチな声が聞きたくて、強めの刺激で乳首にいたずらをしてみる。"
translation = "늠름한 그녀의 야한 목소리가 듣고 싶어서 강한 자극으로 유두에 장난을 쳐본다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふぁぁあっ──！？\u3000ん、んぅっ……こいつ……<emoji=heart04>\u3000爪の先で、カリカリと──ぁうっ<emoji=heart04>\u3000ふ、ふぅっ<emoji=heart04>\u3000んんんぅっ──<emoji=heart04>」"
translation = "「하아아앗──!? 응, 음으윽…… 이 녀석…… <emoji=heart04> 손톱 끝으로 긁지── 아윽 <emoji=heart04> 후, 후우 <emoji=heart04> 음음음으윽── <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「こういうことばかりっ、んんっ<emoji=heart04>\u3000すぐに上達するのだからっ……敵わんなっ……んぁ<emoji=heart04>\u3000はぁ、ふぅっ、んぁあっ……<emoji=heart04>」"
translation = "「이런 것만 음윽 <emoji=heart04> 금방 숙달되니까…… 당해낼 수가 없군…… 응아 <emoji=heart04> 하아, 후우, 응아앗…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「乳首で感じてるセドナさん、可愛いです」"
translation = "「유두로 느끼는 세드나 씨, 귀여워요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──こいつ、いい度胸だ……♪\u3000自分が組み伏せられている立場だと、忘れているらしいな……<emoji=heart04>」"
translation = "「──이 녀석, 배짱 좋군……♪ 자기가 굴복당하고 있는 입장이라는 걸 잊은 모양이지…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「女性の乳房を弄ぶ悪漢には、灸をすえてやらねば、ならんな──んんっ！」"
translation = "「여성의 유방을 농락하는 악한에게는 뜨거운 맛을 보여줘야겠군── 음윽!」"

[[dialogue]]
speaker = "unk"
original = "セドナさんがニヤリと笑う。そして──"
translation = "세드나 씨가 씨익 웃는다. 그리고──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「もう加減はなしだっ……んん、んっ<emoji=heart04>\u3000んっんっ！\u3000んぁ、あっ、はぁ、ああっ！」"
translation = "「이제 봐주지 않겠다…… 음, 응윽 <emoji=heart04> 응윽응윽! 응아, 앗, 하아, 아앗!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「貴様が果てるまで、このペースで責め立てて、くれるっ……はぁ、ふぅっ、んっ、ふぅっ、ふぅうっ、んんんっ<emoji=heart04>」"
translation = "「네 녀석이 가버릴 때까지 이 페이스로 몰아붙여 주마…… 하아, 후우, 응, 후우, 후우우, 음음음 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を捕食するみたいに前傾姿勢を取って、肉厚のお尻をパンパン、パンパンと高速でぶつけてくる。"
translation = "나를 포식하듯 전경 자세를 취하고 살집 있는 엉덩이를 팡팡, 팡팡 하고 고속으로 부딪쳐 온다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふぅ、んん、んぁ、はぁ、んんっ<emoji=heart04>\u3000なんだ、まだ硬く、できるのか？\u3000いいぞ、昂れ、もっと興奮しろっ……あぅ、んん、んんん！」"
translation = "「후우, 음, 응아, 하아, 음윽 <emoji=heart04> 뭐냐, 아직 더 딱딱해질 수 있는 건가? 좋다, 고조되어라, 더 흥분해라…… 아우, 음, 음음음!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そうして私を満足、させろっ<emoji=heart04>\u3000はぁ、んっ、パートナー、であるのならば、なっ……！」"
translation = "「그렇게 나를 만족시켜라 <emoji=heart04> 하아, 응, 파트너라면 말이다……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ほら、ほら、ほらっ……<emoji=heart04>\u3000お前はこの動きが好きだろう？\u3000んぅ、ふぅっ、はぁっ……尻肉がたわむほどの、杭打ち、だっ……<emoji=heart04>」"
translation = "「자, 자, 자…… <emoji=heart04> 너는 이 움직임을 좋아하지? 음으, 후우, 하앗…… 엉덩잇살이 휠 정도의 말뚝 박기다…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あの真面目な、ネビュラを統括する女傑が──つま先立ちのがに股で俺を責め立ててくる。"
translation = "그 진지한, 네뷸라를 통괄하는 여걸이── 까치발을 하고 다리를 벌린 채 나를 몰아붙여 온다."

[[dialogue]]
speaker = "unk"
original = "激しい杭打ちのたびに吐息が、汗が、いくつも弾ける。水着姿のセドナさんは本当に綺麗で、いやらしい。"
translation = "격렬한 말뚝 박기 때마다 숨결이, 땀이 몇 번이고 튄다. 수영복 차림의 세드나 씨는 정말로 아름답고 천박하다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「こら、あまり動くなっ<emoji=heart04>\u3000気持ちいいのはわかるが、尻をもじもじと、動かすんじゃない……んん、ふぅ、んんっ！」"
translation = "「이봐, 너무 움직이지 마라 <emoji=heart04> 기분 좋은 건 알겠다만 엉덩이를 꼼지락거리며 움직이지 마…… 음, 후우, 음윽!」"

[[dialogue]]
speaker = "unk"
original = "騎乗位ピストンの快感が激しすぎて、俺の意思とは無関係に腰がうずいてしまう。"
translation = "기승위 피스톤의 쾌감이 너무 격렬해서 내 의지와는 상관없이 허리가 들썩거리고 만다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ジッとしていろ。でないと、私の気持ちいいところに当てづらいっ……この、動くなと、言うにっ……<emoji=heart04>」"
translation = "「가만히 있어라. 안 그러면 내 기분 좋은 곳에 맞추기 힘들다…… 이, 움직이지 말라고 하는데…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たしなめるように叱られるも、身体が勝手に動いてしまうのだ。"
translation = "타이르듯 꾸중을 들어도 몸이 멋대로 움직여 버리는 것이다."

[[dialogue]]
speaker = "unk"
original = "熱く濡れそぼった女性器と、ぱちゅんぱちゅんと弾むお尻の感触──どれもこれもペニスに毒で、気持ちが良すぎる。"
translation = "뜨겁게 젖어든 성기와 파춘파춘 튕기는 엉덩이의 감촉── 하나하나가 페니스에 독이 되어 너무나 기분이 좋다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「仕方のないやつだっ……なら、動けないように、してやる……んちゅぅっ<emoji=heart04>」"
translation = "「어쩔 수 없는 녀석이군…… 그럼 움직이지 못하게 해주마…… 응츄우 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セドナさんが覆いかぶさってきて、貪るみたいな口付け──"
translation = "세드나 씨가 덮쳐와서 탐하는 듯한 입맞춤──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んちゅるっ、ちゅぅっ……んんちゅ、ちゅる、れぇ、れりゅぅ、んちゅりゅ、れるれる、ちゅるるぅっ<emoji=heart04>」"
translation = "「응츄루, 츄우…… 응응츄, 츄루, 레에, 레류우, 응츄류, 레루레루, 츄루루우 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ちゅ、んちゅ、ちゅぅっ……キスしている間も、一物は、しっかり、シゴいてやろうっ……ちゅる、んちゅる、れえええ、れる<emoji=heart04>」"
translation = "「츄, 응츄, 츄우…… 키스하는 동안에도 일물은 확실히 비벼주마…… 츄루, 응츄루, 레에에에, 레루 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺をベッドに縫い付けるみたいな、激しいキス。ペニスの周りに落とされるヒップの柔らかさと重みに、身動きも取れなくなる。"
translation = "나를 침대에 꿰매는 듯한 격렬한 키스. 페니스 주변으로 떨어지는 힙의 부드러움과 무게에 몸을 움직일 수도 없게 된다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ちゅぱ、んちゅっ……ちゅぱ、んれりゅ、ちゅる、んちゅ、ちゅぅっ……れぇ～っ<emoji=heart04>」"
translation = "「츄파, 응츄…… 츄파, 응레류, 츄루, 응츄, 츄우…… 레에~ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セドナさんは普段、あまりキスをしてくれない。"
translation = "세드나 씨는 평소에 키스를 잘 해주지 않는다."

[[dialogue]]
speaker = "unk"
original = "だが行為の最中ならば、唇の端からよだれがこぼれるほどの激しいキスを、抵抗もなく、してくれる。"
translation = "하지만 행위 도중이라면 입가에서 침이 흐를 정도의 격렬한 키스를 저항 없이 해준다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んれりゅ、れるれる、れろれろっ……んちゅう<emoji=heart04>\u3000お前、ちゅる、わかるぞ……ちゅぱっ<emoji=heart04>\u3000そろそろ、限界だろ……んれりゅ、れぇ<emoji=heart04>」"
translation = "「응레류, 레루레루, 레로레로…… 응츄우 <emoji=heart04> 너, 츄루, 알겠다고…… 츄파 <emoji=heart04> 슬슬 한계지…… 응레류, 레에 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ちゅうっ、んちゅ、れるれる、れぇっ……いいぞ、このまま一気に搾り取ってやる……ちゅ、んちゅんちゅりゅ……ぷはぁっ……！」"
translation = "「츄우, 응츄, 레루레루, 레에…… 좋다, 이대로 단숨에 짜내 주마…… 츄, 응츄응츄류…… 푸하아!」"

[[dialogue]]
speaker = "unk"
original = "騎乗位のラストスパートのために、セドナさんがキスを中断した。"
translation = "기승위의 라스트 스퍼트를 위해 세드나 씨가 키스를 중단했다."

[[dialogue]]
speaker = "unk"
original = "そして、今日一番の激しい尻ピストンがやってくる──"
translation = "그리고 오늘 중 가장 격렬한 엉덩이 피스톤이 찾아온다──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んっ！\u3000んんぅっ！\u3000んっ！\u3000はぁっ！\u3000あっあっ、あっあっあっ！\u3000んんっ、ふぅううっ！\u3000ふぅ、あぁっ、ぁあ、はぁあっ！」"
translation = "「응! 음으윽! 응! 하앗! 앗앗, 앗앗앗! 음윽, 후우우우! 후우, 아앗, 아아, 하아앗!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「このまま射精まで、ずっと、このペースで、一物をシゴいて、やるっ……<emoji=heart04>\u3000はぁ、はぁっ、あっ、ふぅ、んん、んぅ、んんんっ！」"
translation = "「이대로 사정할 때까지 계속 이 페이스로 일물을 비벼주마…… <emoji=heart04> 하아, 하앗, 앗, 후우, 음, 음으, 음음음!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いいか、だからっ……ふぅっ、んんっ！\u3000限界まで我慢、しろっ<emoji=heart04>\u3000しっかりと、子種を、溜めろよ……？」"
translation = "「알겠나, 그러니까…… 후우, 음윽! 한계까지 참아라 <emoji=heart04> 확실하게 씨앗을 모아두라고……?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はぁ、んん、んぅ、ふう、んんんっ！\u3000そして、私の奥で、すべて、吐き出せっ……！\u3000いいか、わかったかっ……<emoji=heart04>」"
translation = "「하아, 음, 음으, 후우, 음음음! 그리고 내 안쪽에서 전부 뱉어내라……! 알겠나, 알았냐고…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "夢中で頷いて、押し寄せてくる射精欲求を少しでも遠ざけるために、身体をこわばらせる俺。"
translation = "정신없이 고개를 끄덕이며 밀려오는 사정 욕구를 조금이라도 멀리하기 위해 몸을 굳히는 나."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フフっ<emoji=heart04>\u3000いい返事だっ<emoji=heart04>\u3000お前の、とてもいいぞ、よく馴染むっ……<emoji=heart04>」"
translation = "「후후 <emoji=heart04> 좋은 대답이다 <emoji=heart04> 네 것, 아주 좋아, 잘 어울려…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の頬をそっと撫でるセドナさん。発情しきった眼差しにゾクゾクした。"
translation = "내 뺨을 살며시 쓰다듬는 세드나 씨. 완전히 발정 난 눈빛에 소름이 돋았다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「貴様が出す瞬間に、膣に力を込めて……んん！\u3000ふぅっ<emoji=heart04>\u3000思いきり搾り上げて、やるからな……」"
translation = "「네가 내보내는 순간에 질에 힘을 줘서…… 음! 후우 <emoji=heart04> 힘껏 짜내 줄 테니까……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まだまだ楽しんでやりたいが……もうそろそろ我慢の限界っ、そんな顔をしている、ぞ……<emoji=heart04>」"
translation = "「더 즐겨주고 싶지만…… 이제 슬슬 참기 힘들다는 그런 얼굴을 하고 있군…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いや──ちょうどいい。私もそろそろ、達してしまい、そうだからなっ……<emoji=heart04>」"
translation = "「아니── 마침 잘됐어. 나도 슬슬 가버릴 것 같으니까 말이야…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「行くぞ、最後に、思いきり、激しくっ……ん、んんぅっ！」"
translation = "「간다, 마지막으로 힘껏 격렬하게…… 음, 음으윽!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あ、ぁ、あ、ぁ、あ、あっ<emoji=heart04>\u3000はぁあっ、ふぅうっ、んんぅっ、はぁっ、あっあっあっ、んんんんっ<emoji=heart04>」"
translation = "「아, 아, 아, 아, 아, 앗 <emoji=heart04> 하아앗, 후우우, 음으윽, 하앗, 앗앗앗, 음음음음 <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あぁ、来るっ、来る、来るっ──もうすぐだ、あ、ぁ、あっ──んん、んんんっ、んんぅっ──あぁああ──！！」"
translation = "「아아, 온다, 온다, 온다── 이제 곧이야, 아, 아, 앗── 음음, 음음음, 음으윽── 아아아아──!!」"

[[dialogue]]
speaker = "unk"
original = "ペニスの内側をすごい勢いで精液が登り始める。もう抑えきれない──"
translation = "페니스 안쪽을 엄청난 기세로 정액이 타고 오르기 시작한다. 이제 억누를 수 없어──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いいぞっ──魔王っ、出せっ<emoji=heart04>\u3000私の<ruby>膣内<rt>なか</rt></ruby>に、貴様の子種──出せ出せ、出せ出せ出せっ──<emoji=heart04>」"
translation = "「좋다── 마왕, 내보내라 <emoji=heart04> 내 질 내부에 네 녀석의 씨앗── 내보내라 내보내라, 내보내라 내보내라 내보내라── <emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んんんっ──ぁ、あぁあああっ──ぁあぁああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「음음음── 아, 아아아아앗── 아아아아아~~~ <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの熱い膣内で、爆発するみたいな射精が巻き起こる。"
translation = "세드나 씨의 뜨거운 질 내에서 폭발하는 듯한 사정이 일어난다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んんぅっ<emoji=heart04>\u3000ふうぅうっ<emoji=heart04>\u3000あっあっ、あぁあぁっ！\u3000なんだ、この量はっ……<emoji=heart04>\u3000はぅ、んんっ……ふぅうう～っ<emoji=heart04><emoji=heart04>」"
translation = "「음으윽 <emoji=heart04> 후우우우 <emoji=heart04> 앗앗, 아아아아! 뭐야 이 양은…… <emoji=heart04> 하우, 음윽…… 후우우우~ <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精が止まらない。びゅくびゅく、びゅくびゅく──何度も何度も精液を吐き出し続ける。"
translation = "사정이 멈추지 않는다. 뷰큭뷰큭, 뷰큭뷰큭── 몇 번이고 몇 번이고 정액을 계속 뱉어낸다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はぁ、んんっ……ふうぅっ……んん、んぅあっ……あぁあ、あぁあっ……<emoji=heart04>」"
translation = "「하아, 응으…… 후우우…… 응, 응아…… 아아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンは止まったのに、膣内はまだうねうねと動き回っている。"
translation = "피스톤은 멈췄는데도, 질 내부는 여전히 꿈틀꿈틀 움직이고 있다."

[[dialogue]]
speaker = "unk"
original = "一滴も残さんと言いたげに、セドナさんの膣内が揉むように動いているのだった。"
translation = "한 방울도 남기지 않겠다는 듯이, 세드나 씨의 질 내부가 쥐어짜듯 움직이고 있었다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あぁあっ……まずいのは、わかっているんだが……<ruby>膣内<rt>なか</rt></ruby>に出されるのは、格別に、心地がいいっ……んん、ふぅうっ……<emoji=heart04>」"
translation = "「아아앗…… 안 된다는 건 알고 있지만…… 질 내에 싸이는 건, 각별히, 기분이 좋아…… 응, 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──そうして。"
translation = "──그렇게."

[[dialogue]]
speaker = "unk"
original = "長い長い射精の果てに、とうとう撃ち終わりが訪れて……ペニスが、女性器から引き抜かれた。"
translation = "길고 긴 사정 끝에, 드디어 발사가 끝나고…… 페니스가, 여성기에서 뽑혀 나왔다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「んんんっ……ぁあ、はぁああっ……<emoji=heart04>\u3000はぁああっ……ふぅううぅっ……<emoji=heart04>」"
translation = "「응응으…… 아아, 하아아앗……<emoji=heart04> 하아아앗…… 후우우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フフ……いつ見ても、呆れた射精量だな……<emoji=heart04>」"
translation = "「후후…… 언제 봐도, 어처구니없는 사정량이군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「次から、次へと……はぁ……まだ、こぼれ出てくるぞ……<emoji=heart04>」"
translation = "「계속해서, 끊임없이…… 하아…… 아직도, 흘러넘치고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気持ち、良すぎました……」"
translation = "「기분, 너무 좋았어요……」"

[[dialogue]]
speaker = "unk"
original = "ようやくそれだけ吐き出して、ベッドの上で深呼吸をする俺。"
translation = "겨우 그 말 한마디를 내뱉고, 침대 위에서 심호흡을 하는 나."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ずいぶん満足そうな顔をしているが……まだ終わらんぞ？」"
translation = "「꽤 만족스러운 얼굴을 하고 있다만…… 아직 안 끝났다?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………え？」"
translation = "「…………에?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「当然だろう。忙しい身の上の私たちの、久しぶりのセックスだ。次の機会もまたしばらく先のことになるに決まっている」"
translation = "「당연하지 않나. 바쁜 몸인 우리에게 있어, 오랜만의 섹스다. 다음 기회도 또 한참 뒤가 될 게 뻔해.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だから、できる時にしっかりと欲望を解消しておかなくてはな……？」"
translation = "「그러니, 할 수 있을 때 확실히 욕망을 해소해 두어야 하지 않겠나……?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「何、心配するな。魔女の森から、いくつか使える香草は持ってきてある」"
translation = "「뭐, 걱정 마라. 마녀의 숲에서, 몇 가지 쓸만한 향초는 가져왔으니까.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「飲めばたちまち精力漲る、そんな強壮薬の類をな……」"
translation = "「마시면 즉시 정력이 넘쳐흐르는, 그런 강장제 종류를 말이지……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フフ……私が満足するまで付き合ってもらうぞ？」"
translation = "「후후…… 내가 만족할 때까지 어울려줘야겠어?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なにせお前は、私のパートナー、なのだからな……<emoji=heart04>」"
translation = "「어쨌든 너는, 나의 파트너, 이니까 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後──セドナさんとのセックスは、日が暮れるまでたっぷりと続いたのだった。"
translation = "그 후── 세드나 씨와의 섹스는, 해가 저물 때까지 듬뿍 이어졌던 것이었다."

