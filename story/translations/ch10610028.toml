[[dialogue]]
speaker = "unk"
original = "──お寺でのお参りデートを済ませたその後。"
translation = "──절에서의 참배 데이트를 마친 그 직후."

[[dialogue]]
speaker = "マリオン"
original = "「この後はどちらに向かいましょう？\u3000ご自宅？\u3000それとも──あら？」"
translation = "「이 다음은 어디로 향할까요? 댁으로? 아니면── 어라?」"

[[dialogue]]
speaker = "unk"
original = "マリオンは俺の下半身の変化に目敏く気づいたらしい。"
translation = "마리온은 내 하반신의 변화를 발 빠르게 알아챈 모양이다."

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ。このような屋外でおち○ちんを腫らしてしまうだなんて……はしたないですよ」"
translation = "「어머어머. 이런 야외에서 자지를 부풀려 버리다니…… 조신하지 못하네요」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、マリオンが隣にいるだけで勝手に……」"
translation = "「미안, 마리온이 옆에 있는 것만으로 멋대로……」"

[[dialogue]]
speaker = "unk"
original = "マリオンが傍にいて、指を絡め合う恋人つなぎで手を重ねて、腕を組まれて、ふくよかな胸を押し付けてられて。"
translation = "마리온이 곁에 있고, 손가락을 얽는 연인 잡기로 손을 겹치고, 팔짱을 끼고, 풍만한 가슴을 밀착해 와서."

[[dialogue]]
speaker = "unk"
original = "彼女からふんわりと漂ってくる甘い匂いを嗅ぐだけで、勃起してしまう。もはや条件反射に近い。"
translation = "그녀에게서 살랑살랑 풍겨오는 달콤한 향기를 맡는 것만으로 발기해 버린다. 이제는 조건반사에 가깝다."

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、謝る必要なんてありませんよ。勃起は男性の生理現象ですものね」"
translation = "「후후, 사과하실 필요 없답니다. 발기는 남성의 생리 현상인걸요」"

[[dialogue]]
speaker = "マリオン"
original = "「私に女を感じ、好意を寄せてくださっている何よりの証拠……あなた様の恋人として嬉しいです」"
translation = "「저에게서 여자를 느끼고, 호의를 품어 주신다는 무엇보다 확실한 증거…… 당신의 연인으로서 기뻐요」"

[[dialogue]]
speaker = "マリオン"
original = "「しかしそのままだと苦しいですよね。足腰が立たなくなるくらい、た～っぷりと満足させて差し上げますから」"
translation = "「하지만 그대로 두면 괴로우시겠죠. 허리가 제대로 서지 않을 정도로, 푸~욱 만족시켜 드릴 테니까요」"

[[dialogue]]
speaker = "unk"
original = "恋人のマリオンと肌を重ねたのも、一度や二度じゃない。"
translation = "연인인 마리온과 살을 맞댄 것도 한두 번이 아니다."

[[dialogue]]
speaker = "unk"
original = "セックスに始まり、フェラにパイズリ、手コキ、脇コキ、足コキ、髪コキ、ｅｔｃ……"
translation = "섹스를 시작으로, 펠라에 파이즈리, 핸드잡, 겨드랑이잡, 풋잡, 머리카락잡, etc……"

[[dialogue]]
speaker = "unk"
original = "体中のありとあらゆる部位を使うテクニックを駆使され、男の限界まで絞られるだけ絞られる。"
translation = "몸 안의 온갖 부위를 사용하는 테크닉을 구사당해, 남자의 한계까지 짜일 대로 짜인다."

[[dialogue]]
speaker = "unk"
original = "しかし、いつもいつも一方的に俺が気持ちよくしてもらっているだけで、マリオンのことはちっとも満足させられていないのだ。"
translation = "하지만 언제나 일방적으로 나만 기분 좋아질 뿐, 마리온은 조금도 만족시켜 주지 못하고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「それなんだけどさ。今日はマリオンを気持ちよくさせたい……最後までイカせてあげたいんだけど……ダメかな」"
translation = "「그건 말인데. 오늘은 마리온을 기분 좋게 해주고 싶어…… 끝까지 가게 해주고 싶은데…… 안 될까」"

[[dialogue]]
speaker = "マリオン"
original = "「きゅうぅぅん……<emoji=heart04>\u3000なんていじらしく、とてもお可愛らしい……<emoji=heart04>」"
translation = "「뀨우우웅……<emoji=heart04> 어쩌면 이렇게 기특하고, 너무나도 귀여우실까……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「そんな嬉しい申し出をしていただけるなんて……<emoji=heart04>\u3000あなた様のお気持ちだけで、私、スイッチが入ってしまいました……」"
translation = "「그런 기쁜 제안을 해주시다니……<emoji=heart04> 당신의 그 마음만으로 저, 스위치가 켜져 버렸어요……」"

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、はぁっ……家に帰るまでお預けなんて……もう１秒すら我慢できません……今すぐ、そこのお手洗いででも──」"
translation = "「하아, 하아…… 집에 갈 때까지 참으라니…… 이제 1초도 못 참겠어요…… 지금 당장, 저기 화장실에서라도──」"

[[dialogue]]
speaker = "クロト"
original = "「今すぐしたいのはやまやまだけど、公共マナーは守ろうね！？」"
translation = "「당장 하고 싶은 마음은 굴뚝같지만, 공공 에티켓은 지키자고!?」"

[[dialogue]]
speaker = "マリオン"
original = "「それでは、何処に──あっ、良い場所を見つけましたよ。あちらに向かいましょう」"
translation = "「그렇다면 어디로── 앗, 좋은 장소를 찾았어요. 저쪽으로 가요」"

[[dialogue]]
speaker = "unk"
original = "あちら──マリオンが指したのは、浅草の裏路地。妖しいネオンの灯る、ラブホテル通りだ。"
translation = "저쪽── 마리온이 가리킨 곳은 아사쿠사의 뒷골목. 묘한 네온사인이 켜진 러브호텔 거리다."

[[dialogue]]
speaker = "クロト"
original = "「ちょ、ちょっ──！」"
translation = "「자, 잠깜──!」"

[[dialogue]]
speaker = "unk"
original = "力強く腕を引かれ、俺たちカップルはその誘蛾灯へと一直線に吸い込まれるのだった──"
translation = "힘차게 팔을 끌려, 우리 커플은 그 유아등 속으로 일직선으로 빨려 들어갔다──"

[[dialogue]]
speaker = "unk"
original = "ホテルに入室すると、マリオンは「刺激的に参りましょう」と言って葬礼の衣装に変身して──"
translation = "호텔에 입실하자 마리온은 「자극적으로 가보죠」라며 장례 복장으로 변신하고서──"

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、はぁっ……<emoji=heart04>\u3000失礼します……<emoji=heart04>」"
translation = "「하아, 하아……<emoji=heart04> 실례하겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「マ、マリオン、ちょっと落ち着こう？\u3000ほら、シャワー浴びないと……」"
translation = "「마, 마리온, 좀 진정하자? 봐, 샤워도 해야 하고……」"

[[dialogue]]
speaker = "unk"
original = "あっという間に肌を露わにしたマリオンに押し倒され、ベッドに仰向けに転がされてしまった。既に劣勢の予感をひしひしと感じる。"
translation = "순식간에 살결을 드러낸 마리온에게 밀쳐져, 침대에 대자로 눕혀지고 말았다. 벌써부터 열세의 예감이 뼈저리게 느껴진다."

[[dialogue]]
speaker = "マリオン"
original = "「今すぐ、あなた様と交わりたくて……私のおま○こ、こんなにヒクついて……求めてしまっているんです。これ以上、焦らさないでくださいませ……<emoji=heart04>」"
translation = "「지금 당장 당신과 섞이고 싶어서…… 제 보지, 이렇게 실룩거리며…… 원하고 있어요. 더 이상 애태우지 말아 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスで触れるマリオンの股間は、湿り気と高温を帯びていた。"
translation = "페니스로 닿는 마리온의 가랑이는 습기와 고온을 머금고 있었다."

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、ぁん……あなた様のおち○ちん、いつもよりアツくて、カチカチ……はぁ、んぁぁ……<emoji=heart04>」"
translation = "「하아, 아앙…… 당신의 자지, 평소보다 뜨겁고, 딱딱해…… 하아, 응아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "踊るように腰とお腹を前後にくねらせながら、秘裂からあふれ出る愛液を俺のペニスになすりつけてくる。"
translation = "춤추듯 허리와 배를 앞뒤로 비틀면서, 비열에서 흘러넘치는 애액을 내 페니스에 문지른다."

[[dialogue]]
speaker = "マリオン"
original = "「聞こえます……？\u3000私のおま○こと、あなた様のおち○ちんが擦れて、くちゅくちゅって……いやらし～い音を立てていますね……<emoji=heart04>」"
translation = "「들리시나요……? 제 보지와 당신의 자지가 스쳐서, 쿠츄쿠츄하고…… 음란~한 소리를 내고 있네요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んふふっ、素股だけでも達してしまいそうじゃないですか……<emoji=heart04>\u3000ですが、これだけで満足してはいけませんよ……今日は私のこともイかせてくれるんですよね？」"
translation = "「응후훗, 가랑이질만으로 가버릴 것 같지 않나요……<emoji=heart04> 하지만 이것만으로 만족해서는 안 돼요…… 오늘은 저도 가게 해주기로 하셨죠?」"

[[dialogue]]
speaker = "マリオン"
original = "「私と勝負……どちらが先に相手を参ったと言わせられるか、イかせ合いっこです<emoji=heart04>」"
translation = "「저와 승부예요…… 누가 먼저 상대를 두손 두발 다 들게 할지, 서로 가게 만들기 시합이에요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンはより悩ましく腰を振り乱す。たったこれだけの摩擦なのに凄まじい快感を生み出していて、漏れる息を抑えられなくなる。"
translation = "마리온은 더욱 요염하게 허리를 흔들어댄다. 단지 이 정도의 마찰일 뿐인데 엄청난 쾌감을 만들어내고 있어서, 새어 나오는 숨소리를 억누를 수 없게 된다."

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ……もしかして、もう出ちゃいそうになってますか？\u3000タマタマにた～っぷり溜め込んでる精液、ぴゅぴゅ～ってしちゃうんですか～？」"
translation = "「어머어머…… 혹시 벌써 나와버릴 것 같나요? 불알에 가~아득 담아둔 정액을 퓨퓨~하고 싸버리는 건가요~?」"

[[dialogue]]
speaker = "マリオン"
original = "「そんなに早いと、私をイかせるなんて夢のまた夢になってしまいますけど……よろしいので？\u3000ふふ<emoji=heart04>」"
translation = "「그렇게 빠르면 저를 가게 만드는 건 꿈속의 꿈이 되어버릴 텐데…… 괜찮으시겠어요? 후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を見下ろすマリオンの、嘲笑うかのような眼差し。"
translation = "나를 내려다보는 마리온의 비웃는 듯한 눈빛."

[[dialogue]]
speaker = "クロト"
original = "「う、くぅぅっ……そう、言われても……っ！」"
translation = "「으, 윽…… 그렇게 말해도……!」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、くちゅくちゅされるだけで、精液出したくなっちゃったんですね？\u3000私はまだちっとも満足してませんのに……」"
translation = "「후후, 쿠츄쿠츄 당하는 것만으로 정액을 내보내고 싶어졌나 보네요? 저는 아직 조금도 만족하지 못했는데……」"

[[dialogue]]
speaker = "マリオン"
original = "「だめですよ……ここで射精しちゃったら、あなた様の負ぁけ……もうおま○こには入れさせてあげません」"
translation = "「안 돼요…… 여기서 사정해 버리면 당신의 패배~…… 이제 보지에는 넣어주지 않을 거예요」"

[[dialogue]]
speaker = "マリオン"
original = "「タマタマにい～っぱい詰まってる精液、無駄撃ちしかさせてあげませんからね～……<emoji=heart04>」"
translation = "「불알에 가~아득 차 있는 정액, 헛되이 쏟게만 해 드릴 테니까요~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンは弄ぶようにタマ袋を柔らかく揉み解しながらも、腰の動きを止めようとしない。"
translation = "마리온은 놀리듯이 부랏큐를 부드럽게 주물러 풀면서도, 허리의 움직임을 멈추려 하지 않는다."

[[dialogue]]
speaker = "クロト"
original = "「そんな──あっ……はぁ……<emoji=heart04>」"
translation = "「그런──앗……하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンの膣内に入れたい一心で唇を噛み、目を閉じて、必死に射精感を押し殺そうとする。"
translation = "마리온의 질 내에 넣고 싶은 일념으로 입술을 깨물고, 눈을 감고, 필사적으로 사정감을 억눌러 죽이려 한다."

[[dialogue]]
speaker = "unk"
original = "しかし何か別のことを考えようとしても、ペニスに奔る電撃のような快感は、その思考の全てを塗りつぶした。"
translation = "하지만 다른 무언가를 생각하려 해도, 페니스에 달리는 전격 같은 쾌감은 그 사고의 모든 것을 덧칠해 버렸다."

[[dialogue]]
speaker = "マリオン"
original = "「うふふ、我慢してるあなた様のお顔、と～ってもお可愛いです……そんな切ないお顔をされたら、もっとも～っと好きになっちゃいます……♪」"
translation = "「우후후, 참고 계시는 당신의 얼굴, 너~무나 귀여우세요…… 그런 애절한 얼굴을 하시면, 더~욱더 좋아하게 돼 버려요……♪」"

[[dialogue]]
speaker = "クロト"
original = "「あ、あぁ、はぁ……マリオン、早く挿入れさせて……！」"
translation = "「아, 아아, 하아…… 마리온, 빨리 삽입하게 해줘……!」"

[[dialogue]]
speaker = "マリオン"
original = "「だぁめです……あなた様、もっといやらしくおねだりしてください……<emoji=heart04>」"
translation = "「안~ 돼요…… 당신, 좀 더 야하게 졸라 보세요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「逞しくなってるおち○ちん、私のおま○こに入れたいんですよね？\u3000私のこと、めちゃくちゃにイかせて、理解らせたいんですよね？」"
translation = "「늠름해져 있는 자지, 제 보지에 넣고 싶은 거죠? 저를 엉망진창으로 가게 해서, 참교육하고 싶은 거죠?」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……挿入れさせてっ……マリオンのおま○この中に……ち○ちん、入れたい、入れたいっ……入れさせてっ……！」"
translation = "「큭…… 삽입하게 해줘…… 마리온의 보지 안에…… 자지, 넣고 싶어, 넣고 싶어…… 넣게 해줘……!」"

[[dialogue]]
speaker = "マリオン"
original = "「はぁい……よく、できまし――た……っ<emoji=heart04>」"
translation = "「네에…… 참, 잘했어~요…… 윽<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んん～～～～～～っ♪」"
translation = "「응으으으으윽♪」"

[[dialogue]]
speaker = "クロト"
original = "「くぅぅぅっ……！」"
translation = "「쿠우우욱……!」"

[[dialogue]]
speaker = "unk"
original = "一瞬にして、勃起はマリオンの膣内に飲みこまれ、尖端から根元までが温かなぬめりに包み込まれた。"
translation = "순식간에 발기는 마리온의 질 내에 삼켜졌고, 끝부분부터 뿌리까지 따스한 미끄러움에 감싸였다."

[[dialogue]]
speaker = "マリオン"
original = "「ふぅ、んっ、ふぁ、あぁあぁ……入っちゃいましたね……はぁぁ、きもちい……やっぱり生でおち○ちんを感じるのが最高ですねっ……<emoji=heart04>」"
translation = "「후우, 응, 하, 아아아아…… 들어가 버렸네요…… 하아아, 기분 좋아…… 역시 생으로 자지를 느끼는 게 최고네요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はっ、んぁ……ヌルヌルで、あったかくて、マリオンのおま○こ、めちゃくちゃ気持ちいいっ……！」"
translation = "「핫, 응아…… 미끈미끈하고, 따뜻해서, 마리온의 보지, 미치도록 기분 좋아……!」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、ありがとうございます……<emoji=heart04>\u3000ん、は……あなた様のおち○ちんも、私の膣内をみっっっちりと埋め尽くして……先っぽが子宮口をコリコリ刺激して……<emoji=heart04>」"
translation = "「후후, 감사합니다……<emoji=heart04> 응, 하…… 당신의 자지도, 제 질 내부를 가아아득 채우고…… 끝부분이 자궁 입구를 고리고리 자극해서……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ちょろちょろ我慢汁を漏らしてるのまで感じちゃいます……<emoji=heart04>\u3000はぁあぁんっ……ずぅっと……これが欲しかったんです……<emoji=heart04>」"
translation = "「졸졸 쿠퍼액을 흘리고 있는 것까지 느껴져요……<emoji=heart04> 하아아앙…… 계속…… 이걸 원했어요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ふぁ……あっ……生ハメ子作りぃ……あなた様の赤ちゃん、孕みたいです……<emoji=heart04>\u3000このまま、た～っぷり子種を出してくださるのですよね……？<emoji=heart04>」"
translation = "「후아…… 앗…… 노콘 아기 만들기이…… 당신의 아기, 임신하고 싶어요……<emoji=heart04> 이대로, 듬~뿍 씨물을 내보내 주실 거죠……?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンは何度も俺の子を孕みたいと口にし続けていた。"
translation = "마리온은 몇 번이고 내 아이를 임신하고 싶다고 계속해서 입에 담았다."

[[dialogue]]
speaker = "unk"
original = "悦びに満ちた顔で腰を上下させると、結合部はじゅぶじゅぶと、いやらしく粘ついた水音を響かせる。"
translation = "기쁨에 찬 얼굴로 허리를 상하로 움직이자, 결합부는 쥬부쥬부하고, 천박하게 끈적이는 물소리를 울린다."

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、はっ……んぁあぁっ……<emoji=heart04>\u3000ふぅ、んっ、私のおま○こ、きもちいいですか？\u3000あなた様専用の孕ませ穴ですよ～<emoji=heart04>」"
translation = "「하아, 하…… 응아아앗……<emoji=heart04> 후우, 응, 제 보지, 기분 좋은가요? 당신 전용 임신 구멍이에요~<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あなた様が一番きもちよくなれるおま○こなんですから……隅々まで味わってくださいね～<emoji=heart04>」"
translation = "「당신이 가장 기분 좋아질 수 있는 보지니까…… 구석구석까지 맛봐주세요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たわわなマリオンのおっぱいが、珠のような汗の雫を撒き散らしながら、ぶるんぶるんと揺れる。"
translation = "풍만한 마리온의 가슴이, 구슬 같은 땀방울을 뿌리며 출렁출렁 흔들린다."

[[dialogue]]
speaker = "unk"
original = "しかも膣内がうねうねと蠢き、ペニスに絡んできて、もうたまらない。"
translation = "게다가 질 내부가 꿈틀꿈틀 요동치며 페니스에 엉겨 붙어 와서, 이제 참을 수 없다."

[[dialogue]]
speaker = "クロト"
original = "「うっ、く……き、きもちよすぎるって……うぁっ……」"
translation = "「으윽, 윽…… 기, 기분 너무 좋잖아…… 으아앗……」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、おち○ちん、あっさり負けちゃいそうですね<emoji=heart04>\u3000いいですよ、いつもみたいにぴゅっぴゅしちゃいましょ<emoji=heart04>」"
translation = "「후후, 자지, 허무하게 져버릴 것 같네요<emoji=heart04> 괜찮아요, 평소처럼 퓨퓨 해버리자고요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「旦那様へのご奉仕も一流メイドの嗜み……タマタマの中身、１滴残らず搾り尽くして差し上げます<emoji=heart04>」"
translation = "「서방님을 향한 봉사도 일류 메이드의 소양…… 불알 속 내용물, 한 방울도 남김없이 짜내 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオン任せで寝転んでいるだけなのに、温かな膣肉に扱かれて、ペニスは勝手に射精への階段を駆け昇ってしまう。"
translation = "마리온에게 맡긴 채 누워 있을 뿐인데도, 따뜻한 질 근육에 조여지며 페니스는 멋대로 사정을 향한 계단을 뛰어 올라가 버린다."

[[dialogue]]
speaker = "unk"
original = "このままマリオンが与える快感に溺れてるだけじゃ駄目だ。これじゃいつも通りだ。"
translation = "이대로 마리온이 주는 쾌감에 빠져 있기만 해서는 안 된다. 이래서는 평소와 다름없다."

[[dialogue]]
speaker = "unk"
original = "今日はマリオンもイカせて、２人一緒に気持ちよくなるって決めてるんだから──"
translation = "오늘은 마리온도 가게 해서, 둘이 함께 기분 좋아지기로 결정했으니까──"

[[dialogue]]
speaker = "マリオン"
original = "「えっ……？\u3000きゃ……んぁうんっ！？」"
translation = "「엣……? 꺄…… 응아웅!?」"

[[dialogue]]
speaker = "unk"
original = "不意を突くように腰を真上に跳ね上げ、マリオンの体を浮き上がらせるほど強く子宮口を突いた。"
translation = "허를 찌르듯 허리를 위로 튕겨 올려, 마리온의 몸이 떠오를 정도로 강하게 자궁 입구를 찔렀다."

[[dialogue]]
speaker = "マリオン"
original = "「んぁ、んぃひっ、んっ、うぅぅんっ<emoji=heart04>\u3000そんなっ、いきなり、なんて……んっ<emoji=heart04>\u3000ズルいですぅ<emoji=heart04>」"
translation = "「응아, 응이힛, 응, 우우웅<emoji=heart04> 그런, 갑자기, 라니…… 응<emoji=heart04> 치사해요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンが今までにない反応を見せる。やっぱり責めるのは慣れてても、責められるのには不慣れなのか。"
translation = "마리온이 지금까지 본 적 없는 반응을 보인다. 역시 공격하는 것에는 익숙해도, 당하는 것에는 서투른 건가."

[[dialogue]]
speaker = "クロト"
original = "「ここから俺の反撃だ。マリオンのこと、絶対にイかせるからっ……！」"
translation = "「여기서부터 내 반격이야. 마리온, 반드시 가게 만들 테니까……!」"

[[dialogue]]
speaker = "マリオン"
original = "「んぃっ<emoji=heart04>\u3000ひぃんっ！？\u3000はっ、あ、かはっ、はぁ、んぁぁっ<emoji=heart04>\u3000ひんっ、しゅ、しゅごぉい<emoji=heart04>」"
translation = "「응이잇<emoji=heart04> 히잉!? 핫, 아, 카핫, 하아, 응아아앗<emoji=heart04> 히잉, 거, 거어어어어어엄청나요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んぁ、おま○こから、頭までっ、おち○ちんで貫かれてる、みたぁいっ<emoji=heart04>\u3000こんな余裕、残してたんですねぇっ……？<emoji=heart04>」"
translation = "「응아, 보지에서부터 머리까지, 자지로 꿰뚫리는 것, 가타아아아아앗<emoji=heart04> 이런 여유, 남겨두고 있었군요……?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "余裕なんてありゃしない。気を抜いたら、一瞬でイッてしまいそうだ。"
translation = "여유 같은 건 있을 리 없다. 정신을 놓으면, 순식간에 가버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "いくら責めに転じてるとはいえ、マリオンのおま○こを往復しているのだから、俺の快感も昂る一方。"
translation = "아무리 공세로 돌아섰다고는 해도, 마리온의 보지를 왕복하고 있기에 나의 쾌감도 고조될 뿐."

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、んっ<emoji=heart04>\u3000きっ、気持ちいいです、それ、いいっ、いいっ<emoji=heart04>\u3000んぁっ、はっ、はぁあぁぁっ<emoji=heart04>\u3000あッ、んぁあぁんっ<emoji=heart04>」"
translation = "「하아, 응<emoji=heart04> 기, 기분 좋아요, 그거, 좋아, 좋아<emoji=heart04> 응앗, 핫, 하아아아앗<emoji=heart04> 아앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あぁーっ<emoji=heart04>\u3000あっ、ああぁぁーっ<emoji=heart04>\u3000おかしい、おかしいのっ<emoji=heart04>\u3000おま○こっ、おかしくなりますっ<emoji=heart04>\u3000おち○ちんすごいっ、すっごいですぅ<emoji=heart04>」"
translation = "「아아─앗<emoji=heart04> 앗, 아아아─앗<emoji=heart04> 이상해, 이상해애<emoji=heart04> 보지이, 이상해져요오<emoji=heart04> 자지 대단해, 대어어어단해요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンはペニスが抜けるギリギリまで腰を浮かし、次の瞬間には一気に奥まで呑み込む。最奥で亀頭と子宮口がぶつかり、体液が混ざり合う。"
translation = "마리온은 페니스가 빠지기 직전까지 허리를 띄우고, 다음 순간에는 단숨에 안쪽까지 집어삼킨다. 가장 깊은 곳에서 귀두와 자궁 입구가 충돌하며, 체액이 뒤섞인다."

[[dialogue]]
speaker = "マリオン"
original = "「はぁっ、あっ、んぁぁん、おま○この奥とおち○ちん、ちゅっちゅしてますっ<emoji=heart04>\u3000はぁ、きもちいっ、えっちなキス、すーっごくきもちいいれすよぉっ<emoji=heart04>」"
translation = "「하앗, 앗, 응아앙, 보지 안쪽이랑 자지가, 츄츄 하고 있어요<emoji=heart04> 하아, 기분 조아, 야한 키스, 저어어엉말 기분 좋아여어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パンッパンッとスパンキングのような下腹部同士がぶつかる音が鳴り、俺とマリオンの淫靡な喘ぎが部屋に響く。"
translation = "팡팡 하고 스팽킹을 하는 것 같은 하복부끼리 부딪치는 소리가 나고, 나와 마리온의 음란한 신음이 방안에 울려 퍼진다."

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、んぁあぁぁッ、おち○ちん、すごぉいっ、すごいですぅっ<emoji=heart04>\u3000あっ、んぁ、はぁあぁぁぁッ<emoji=heart04>」"
translation = "「하아, 응아아아앗, 자지, 대단해애, 대단해요옷<emoji=heart04> 앗, 응아, 하아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "意識の全てがピストン運動だけに持っていかれている。俺ももう限界だ。"
translation = "의식의 전부가 피스톤 운동에만 쏠려 있다. 나도 이제 한계다."

[[dialogue]]
speaker = "unk"
original = "いつもなら、もう３回はイッていてもおかしくないほどの強烈な快感を、意地で食い止めて──"
translation = "평소라면 벌써 세 번은 가버렸어도 이상하지 않을 정도의 강렬한 쾌감을 오기로 억누르며──"

[[dialogue]]
speaker = "unk"
original = "いや、何かおかしい。ペニスに強烈な違和感と既視感がある。"
translation = "아니, 뭔가 이상하다. 페니스에 강렬한 위질감과 기시감이 느껴진다."

[[dialogue]]
speaker = "マリオン"
original = "「──ふふ、お気づきになりました、か……？\u3000あなた様自身が、射精を食い止めているのではありませんよ<emoji=heart04>」"
translation = "「──후후, 눈치채셨나, 요……? 당신 스스로가 사정을 억누르고 있는 게 아니에요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、あっ……前にもやらせていただきましたが、どんなに気持ちよくなっても射精できない魔法が、おち○ちんにかかっているんです」"
translation = "「하아, 앗…… 전에도 해드렸지만, 아무리 기분 좋아져도 사정할 수 없는 마법이 자지에 걸려 있거든요」"

[[dialogue]]
speaker = "unk"
original = "この既視感──パイズリで５連続射精を体験した時のアレだ。"
translation = "이 기시감── 파이즈리로 5연속 사정을 체험했을 때의 그것이다."

[[dialogue]]
speaker = "unk"
original = "解放される瞬間、腰が抜けて、目の前が真っ白になり、気絶してしまうほどに強烈な限界を超えた絶頂。"
translation = "해방되는 순간 허리에 힘이 풀리고, 눈앞이 새하얘지며, 기절해버릴 정도로 강렬하게 한계를 넘어선 절정."

[[dialogue]]
speaker = "マリオン"
original = "「私がおま○こでイクのと同時に解呪されます。確実に一緒にイケるなんて、最高の魔法だと思いませんか？」"
translation = "「제가 보지로 가는 것과 동시에 해제돼요. 확실하게 함께 갈 수 있다니, 최고의 마법이라고 생각하지 않나요?」"

[[dialogue]]
speaker = "クロト"
original = "「え、いやいやそんなの聞いてないっ……！」"
translation = "「에, 아니 아니 그런 거 못 들었어……!」"

[[dialogue]]
speaker = "マリオン"
original = "「あなた様の頑張る顔があまりにもお可愛らしくて……内緒にしていました<emoji=heart04>」"
translation = "「당신의 노력하는 얼굴이 너무나도 귀여우셔서…… 비밀로 하고 있었답니다<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「いつもよりは踏ん張っているようですけど……既に幾度かはイッてしまっているようですね<emoji=heart04>\u3000私がイクまでに何度イッてしまわれるのでしょう？」"
translation = "「평소보다는 버티고 계신 것 같지만…… 이미 몇 번인가는 가버리신 모양이네요<emoji=heart04> 제가 갈 때까지 몇 번이나 가버리시는 걸까요?」"

[[dialogue]]
speaker = "マリオン"
original = "「あんまり絶頂の回数を重ねてしまうと、快感に耐えきれず、おち○ちんがおバカになってしまいますよ<emoji=heart04>」"
translation = "「너무 절정 횟수가 겹쳐버리면, 쾌감을 견디지 못하고 자지가 바보가 되어버릴 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "既に疲労は限界に近いのに、突き上げが止められない。蓄積している何発分もの絶頂を、１秒でも早く解放したい。"
translation = "이미 피로는 한계에 가까운데, 치올리기가 멈추지 않는다. 축적되어 있는 몇 발 분량의 절정을 일초라도 빨리 해방하고 싶다."

[[dialogue]]
speaker = "マリオン"
original = "「ふふふ、おち○ちんが壊れちゃうほどの快感が押し寄せてくると分かっていても……止められないですよね<emoji=heart04>\u3000一度覚えちゃったら、戻れませんよね～<emoji=heart04>」"
translation = "「후후후, 자지가 망가질 정도의 쾌감이 밀려올 것을 알고 있어도…… 멈출 수 없으시죠<emoji=heart04> 한번 배워버리면, 돌아갈 수 없거든요~<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あはぁ、はぁ、んぅうぅんっ<emoji=heart04>\u3000私を感じさせようと、一生懸命おち○ちんパコパコして……お可愛い、お可愛いですっ、うれひいですっ<emoji=heart04>」"
translation = "「아하아, 하아, 응으으응<emoji=heart04> 저를 느끼게 하려고 열심히 자지 파코파코 해서…… 귀여워, 귀여우세요, 기뻐요오<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あなた様の専用おま○こ、いっぱい感じてくださいね<emoji=heart04>\u3000あっ、はぁ、んぁあぁっ、んぅうぅんッ<emoji=heart04>」"
translation = "「당신의 전용 보지, 잔뜩 느껴주세요<emoji=heart04> 앗, 하아, 응아앗, 응으으응<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ご安心ください、私、ちゃ～んと感じていますから……あなた様のおち○ちんでイカされちゃいますから、このまま、おま○こほじり続けてくださいね<emoji=heart04>」"
translation = "「안심하세요, 저, 져어어엉말 느끼고 있으니까…… 당신의 자지로 가버릴 테니까, 이대로 보지 계속 후벼파주세요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んぁ、はっ、はぁぁ、あっ、あぁんっ<emoji=heart04>\u3000あっ、いいです、いいですよぉっ……<emoji=heart04>\u3000きもちいいの、広がってますぅ……<emoji=heart04>」"
translation = "「응아, 핫, 하아아, 앗, 아앙<emoji=heart04> 앗, 좋아요, 좋아요오……<emoji=heart04> 기분 좋은 거, 퍼지고 있어요어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンの肉ひだは意思のある生き物みたいに、ペニスにぬらぬらとまとわりつき、最大の絶頂を促してくる。"
translation = "마리온의 육벽은 의지가 있는 생물처럼 페니스에 미끈미끈하게 휘감기며, 최대한의 절정을 재촉해 온다."

[[dialogue]]
speaker = "マリオン"
original = "「はっ、んんんっ<emoji=heart04>\u3000私がイクのと同時に、あなた様の蓄積した精液が解放されますっ……<emoji=heart04>」"
translation = "「핫, 응응응<emoji=heart04> 제가 가는 것과 동시에, 당신의 축적된 정액이 해방됩니다아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頭の中にバチバチと火花が散った。限界を超えて溜められた興奮が解き放たれようとしている。"
translation = "머릿속에 파지직하고 불꽃이 튀었다. 한계를 넘어 쌓인 흥분이 해방되려 하고 있다."

[[dialogue]]
speaker = "unk"
original = "ヤバい。ヤバい。ヤバい！\u3000海綿体が信じられないほどに膨れ上がり、睾丸が収縮し、絶頂の大津波が押し寄せてくる。"
translation = "위험해. 위험해. 위험해! 해면체가 믿기지 않을 정도로 부풀어 오르고, 고환이 수축하며, 절정의 대쓰나미가 몰려온다."

[[dialogue]]
speaker = "クロト"
original = "「～～ッッッ！！？\u3000ごめん、ごめんごめん！\u3000降参っ、参った！\u3000俺の負けだからっ、これ止めて止めて、死ぬ、死ぬっ、イキ死んじゃうからっ……！」"
translation = "「~~윽윽윽!!? 미안, 미안 미안! 항복, 항복이야! 내가 졌으니까, 이거 멈춰줘 멈춰줘, 죽어, 죽는다고, 싸다 죽어버릴 것 같으니까……!」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、ごめんなさい。もう私にも止められないんです。射精を我慢したのはあなた様の意思です<emoji=heart04>」"
translation = "「후후, 죄송해요. 이제 저도 멈출 수 없답니다. 사정을 참은 건 당신의 의사니까요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「でも、無理ですよね～？\u3000あなた様は気持ちいいことがやめられない男の子ですから<emoji=heart04>」"
translation = "「하지만, 무리겠죠~? 당신은 기분 좋은 것을 그만둘 수 없는 남자아이니까요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「何発分の絶頂になるかは想像もつきませんが……気持ち良すぎるあまり、死んじゃわないでくださいね<emoji=heart04>」"
translation = "「몇 발 분의 절정이 될지는 상상조차 가지 않지만…… 너무 기분 좋은 나머지, 죽지 말아 주세요네<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んぁ、はぁ、あっ、んぁ、ああ、はっ、はぁあぁぁぁぁッ<emoji=heart04>\u3000イきそっ……イきそぉ……っ<emoji=heart04>」"
translation = "「응아, 하아, 앗, 응아, 아아, 하앗, 하아아아아아앗<emoji=heart04> 가버릴 것 같…… 가버릴 것 같아아……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「精液くださいっ<emoji=heart04>\u3000あっつぅい精液、た～っぷり中出しされたら、私、はしたなく、淫らにイッてしまいますからぁっ<emoji=heart04>」"
translation = "「정액 주세요<emoji=heart04> 뜨거어운 정액, 가~득 질내사정 당하면, 저, 상스럽고 음란하게 가버릴 테니까요오<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「はぁっ、ぁあぁん、一緒、一緒にイキましょうねっ<emoji=heart04>\u3000あなた様と一緒っ、きもちいいとこ、連れてってくださいねっ<emoji=heart04>」"
translation = "「하앗, 아아앙, 같이, 같이 가요오<emoji=heart04> 당신과 함께, 기분 좋은 곳으로 데려가 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んぁっ、あっ、あぁっ<emoji=heart04>\u3000膣内で、膨れ上がってっ……<emoji=heart04>\u3000あっ、すごい、すごい、すごいですっ<emoji=heart04>」"
translation = "「응앗, 앗, 아앗<emoji=heart04> 질 내에서, 부풀어 올라서……<emoji=heart04> 앗, 대단해, 대단해, 대단해요옷<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んひぁ、あぁ、このまま、このままくだひゃいっ<emoji=heart04>\u3000おま○こっ、おま○こに全部っ、あなた様の溜め込んだ精液全部ぅうぅぅっ<emoji=heart04>」"
translation = "「응히아, 아아, 이대로, 이대로 주세요옷<emoji=heart04> 보지이, 보지에 전부, 당신이 쌓아둔 정액 전부우우우읏<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「んぁ゛っ<emoji=heart04>\u3000イキます、イキます、んんんっ<emoji=heart04>\u3000イクっイグっイクイクイクイクイッグ──」"
translation = "「응아아앗<emoji=heart04> 가요, 가요, 으으으읏<emoji=heart04> 간다 간다 간다간다간다간다 가아앙──」"

[[dialogue]]
speaker = "マリオン"
original = "「イッッッックぅうぅぅぅうぅぅぅぅぅぅぅぅっっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아아아아아악<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「イッ、イク、イクイクッイックゥんっ<emoji=heart04><emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000あぁあぁはぁあぁぁぁん<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가, 가, 가가각 가버렷<emoji=heart04><emoji=heart04> 응으읏<emoji=heart04> 아아아하아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あ゛っ<emoji=heart04>\u3000んぁ゛っ<emoji=heart04>\u3000あっ、ひっ、ひきゅっ<emoji=heart04>\u3000んぃっ、ひっ、んきゅぅうぅんっ<emoji=heart04>」"
translation = "「아으윽<emoji=heart04> 응아아윽<emoji=heart04> 앗, 히윽, 히큐웃<emoji=heart04> 응잇, 히윽, 응큐우우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「出てるっ、出てますっ<emoji=heart04>\u3000ふぁ、あっ<emoji=heart04>\u3000アツいっ、アッツぅい精液、どびゅどびゅ出てますぅっ<emoji=heart04>」"
translation = "「나오고 있어, 나오고 있어요옷<emoji=heart04> 화, 앗<emoji=heart04> 뜨거워, 뜨거어운 정액, 푸슉푸슉 나오고 있어요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンを絶頂に至らせたにも関わらず、彼女のイキ顔を拝む余裕はなかった。"
translation = "마리온을 절정에 이르게 했음에도 불구하고, 그녀의 가버린 얼굴을 감상할 여유는 없었다."

[[dialogue]]
speaker = "クロト"
original = "「っっっっ！？\u3000ぁ、あ、あ゛っ！\u3000あ゛っ、あ゛っ、あ゛ぁあああぁあぁあぁぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으으으윽!? 아, 아, 아윽! 아윽, 아윽, 아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "脳の神経を焼き切りそうなほどの快感が、ペニスのみならず全身を駆け巡る。体は雷に打たれたように跳ね躍った。"
translation = "뇌 신경을 다 태워버릴 듯한 쾌감이 자지뿐만 아니라 전신을 휘감는다. 몸은 벼락이라도 맞은 것처럼 튀어 올랐다."

[[dialogue]]
speaker = "マリオン"
original = "「あッ、あぁ、ふぁうぅぅん<emoji=heart04>\u3000すごぉい、どばどば、精液、止まんないですね<emoji=heart04>\u3000私の子宮、いっぱいになっちゃいます。何回分の射精でしょう？」"
translation = "「아앗, 아아, 하우우웅<emoji=heart04> 굉장해요, 울컥울컥, 정액, 멈추질 않네요<emoji=heart04> 제 자궁, 가득 차버리겠어요. 몇 번 분량의 사정인가요?」"

[[dialogue]]
speaker = "クロト"
original = "「んぅうぅぅぐぅぅぅっ！？\u3000ふぐっ！？\u3000んぁ、あ゛っ、あ゛っ、んぁ゛あぁああぁぁぁあぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「음우우우구우우읏!? 푸흡!? 음아, 아윽, 아윽, 음아아아아아아아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "答える余裕なんてあるはずもなく、マリオンの膣内にペニスを埋めたまま、射精が鎮まるまで……"
translation = "대답할 여유 따위 있을 리도 없고, 마리온의 질 내에 자지를 박아 넣은 채로, 사정이 잦아들 때까지……"

[[dialogue]]
speaker = "unk"
original = "俺はまな板の上の魚のようにビクビクと体を震わせることしかできなかった──"
translation = "나는 도마 위의 물고기처럼 비르르 몸을 떠는 것밖에는 할 수 없었다──"

[[dialogue]]
speaker = "マリオン"
original = "「はぁ、はぁっ、あ、んぁあぁぁ、はっ、はぁっ<emoji=heart04>\u3000あ、んぁあぁぁ……ああぁ……しゅごぉい……<emoji=heart04>」"
translation = "「하아, 하앗, 아, 응아아아, 하앗, 하앗<emoji=heart04> 아, 응아아아…… 아아아…… 조와요……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「あなた様の精液が、こんなにたっぷり……中から零れてしまいました……もったいないです」"
translation = "「당신 성함의 정액이, 이렇게 듬뿍…… 안에서 흘러넘쳐 버렸어요…… 아까워라」"

[[dialogue]]
speaker = "マリオン"
original = "「ですが、溢れるほど愛情を注いでいただいたならば、子宝も授かれることでしょう。お参りした甲斐があったというものです<emoji=heart04>」"
translation = "「하지만, 넘칠 정도로 애정을 쏟아주셨으니, 아이도 가질 수 있겠지요. 참배한 보람이 있었다는 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁーっ！\u3000はぁーっ、はぁーっ、はぁーっ！」"
translation = "「하아─! 하아─, 하아─, 하아─!」"

[[dialogue]]
speaker = "unk"
original = "もはや言葉を返すことすらできない。"
translation = "이제는 말을 돌려주는 것조차 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "汗が、ヨダレが、涙が、鼻水が、体中の穴という穴から体液がだらだらと垂れ流れてる。自分でも止めることができない。どろどろでぐちゃぐちゃだ。"
translation = "땀이, 침이, 눈물이, 콧물이, 온몸의 구멍이란 구멍에서 체액이 줄줄 흘러나오고 있다. 스스로도 멈출 수가 없다. 걸쭉하고 엉망진창이다."

[[dialogue]]
speaker = "マリオン"
original = "「あなた様の前で、はしたなくイッてしまうなんて……とっても気持ちよかったです<emoji=heart04>」"
translation = "「당신 앞에서, 천박하게 가버리다니…… 정말 기분 좋았어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗まみれの顔で、髪を乱し、繋がったまま、吐息を混じえてマリオンは囁く。"
translation = "땀투성이 얼굴로 머리카락을 흩뜨린 채, 연결된 상태로 숨을 몰아쉬며 마리온은 속삭인다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、マリオンはたった一度の絶頂。俺は無様に何度達したかもわからない。圧倒的大敗北だ。"
translation = "그렇다고는 해도, 마리온은 단 한 번의 절정. 나는 보기 흉하게 몇 번을 도달했는지도 모른다. 압도적인 대패배다."

[[dialogue]]
speaker = "マリオン"
original = "「勘違いされているようですけど……今までの子作りでも、私、ちゃんと気持ちよくなれていましたし、満足していたのですよ？」"
translation = "「착각하고 계신 모양입니다만…… 지금까지의 아이 만들기에서도, 저, 제대로 기분 좋았고 만족하고 있었다고요?」"

[[dialogue]]
speaker = "クロト"
original = "「そ、そうなの……？」"
translation = "「그, 그래……?」"

[[dialogue]]
speaker = "マリオン"
original = "「ええ。男性は射精し、肉体が満足するまでがセックスですけど、女性は精神的に満足すれば、充分に満ち足りるんです」"
translation = "「네. 남성은 사정하고 육체가 만족할 때까지가 섹스지만, 여성은 정신적으로 만족하면 충분히 채워진답니다」"

[[dialogue]]
speaker = "マリオン"
original = "「例えば──愛するあなた様が、私の手や口やおま○こで身悶え、お可愛らしく射精している姿を見ているだけで、私は満足してしまうのですよ」"
translation = "「예를 들면── 사랑하는 당신이, 제 손이나 입이나 보지로 몸부림치며, 귀엽게 사정하고 있는 모습을 보는 것만으로도, 저는 만족해버리는 것이지요」"

[[dialogue]]
speaker = "クロト"
original = "「そういうもの……？」"
translation = "「그런 거야……?」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふふっ、私から性行為の主導権を握ろうだなんて、ざっと見積って１０００年ほど早いかと<emoji=heart04>\u3000まだまだ精進が必要ですね<emoji=heart04>」"
translation = "「후후후, 저한테서 성행위의 주도권을 잡으려 하다니, 대충 어림잡아 1000년은 빠르달까요<emoji=heart04> 아직 정진이 필요하겠네요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うん、マリオンに相応しい男になれるよう、もっと頑張るから……ずっと一緒にいてくれる……？」"
translation = "「응, 마리온에게 어울리는 남자가 될 수 있도록 더 노력할 테니까…… 계속 함께 있어 줄래……?」"

[[dialogue]]
speaker = "マリオン"
original = "「きゅうぅううぅんっっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「규우우우우우우웅<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「ズ、ズルいです……息も絶え絶えに、そんな切なくもお可愛いことを言われてしまっては……私、もう我慢も手加減もできなくなってしまいます……<emoji=heart04>」"
translation = "「지, 치사해요…… 숨을 헐떡이면서, 그렇게 애틋하고도 귀여운 말을 하시다니…… 저, 이제 참지도 살살 하지도 못하게 되어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「え……！？\u3000今ので我慢も手加減もしてた……！？」"
translation = "「에……!? 방금 것까지 참고 살살 한 거였어……!?」"

[[dialogue]]
speaker = "マリオン"
original = "「もちろんですとも<emoji=heart04>\u3000私の本気、まだこの程度ではありませんよ。その気になれば、人形だって作れるわけですし──」"
translation = "「물론이죠<emoji=heart04> 저의 본심, 아직 이 정도가 아니에요. 마음만 먹으면 인형도 만들 수 있으니까요──」"

[[dialogue]]
speaker = "unk"
original = "そうだった。たった１人のマリオン相手ですら、この体たらく。複数のマリオンに同時に責められたら、どうなってしまうんだ……？"
translation = "그랬다. 단 한 명의 마리온을 상대로조차 이 꼴이다. 여러 명의 마리온에게 동시에 당한다면, 어떻게 되어버리는 거지……?"

[[dialogue]]
speaker = "マリオン"
original = "「綺麗に洗い流して、少し休憩したら、もう１ラウンドと参りましょう。私の体以外で射精できなくなるよう、骨の髄まで覚えさせて差し上げます<emoji=heart04>\u3000ふふふ<emoji=heart04>」"
translation = "「깨끗이 씻어내고 조금 휴식한 뒤에, 한 라운드 더 가도록 하죠. 제 몸 이외로는 사정할 수 없게 되도록, 뼛속까지 기억하게 해드릴게요<emoji=heart04> 후후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "この夜──俺はマリオンの手練手管により、２桁の射精に至ることとなる。"
translation = "이날 밤── 나는 마리온의 수완에 의해, 두 자릿수 사정에 이르게 된다."

[[dialogue]]
speaker = "クロト"
original = "「ううう゛ああぁああ゛あ゛ぁぁああああっっっ！！？？」"
translation = "「우우우아아아아아아아아아아아앗!!??」"

[[dialogue]]
speaker = "unk"
original = "仮にこれからあと１０００回、体を重ねたところで、マリオンに勝てる未来は見えやしなかった。"
translation = "만약 앞으로 1000번 더 몸을 섞는다 해도, 마리온에게 이길 미래는 보이지 않았다."

