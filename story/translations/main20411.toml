[[dialogue]]
speaker = "unk"
original = "第１１話,神の影,B"
translation = "제11화, 신의 그림자, B"

[[dialogue]]
speaker = "unk"
original = "放課後、俺が星徒会業務を行っていると、星徒会室の扉をノックする音が響いた。"
translation = "방과 후, 내가 성도회 업무를 보고 있자 성도회실 문을 노크하는 소리가 울렸다."

[[dialogue]]
speaker = "梨緒"
original = "「失礼する、緋宮クロト」"
translation = "「실례하마, 히노미야 쿠로토.」"

[[dialogue]]
speaker = "梨緒"
original = "「新星星徒会に共有したい情報があるんだが、時間はもらえるだろうか？\u3000例の“真なる神”についてだ」"
translation = "「신성 성도회에 공유하고 싶은 정보가 있는데, 시간을 내줄 수 있을까? 예의 “진정한 신”에 대해서다.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、もちろん聞くよ」"
translation = "「아아, 물론이지.」"

[[dialogue]]
speaker = "梨緒"
original = "「選挙管理委員会で図書館の資料をあたってみたんだが、残念ながら“真なる神”の有力な情報は見つからなかった」"
translation = "「선거관리위원회에서 도서관 자료를 뒤져봤지만, 안타깝게도 “진정한 신”에 대한 유력한 정보는 찾지 못했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「だがアポロが言っていたんだ。“真なる神”とは、かつてバジュラ教団なる組織が信仰していた、チャカパラ神かもしれないと」"
translation = "「하지만 아폴로가 말하더군. “진정한 신”이란 과거 바주라 교단이라는 조직이 신봉했던 차카파라 신일지도 모른다고.」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "クロト"
original = "「フィーニスの塔で出会った亡霊が、チャカパラ神は『女神を超越する存在』と言っていた……。確かに関係がありそうだ」"
translation = "「피니스의 탑에서 만난 망령이 차카파라 신은 『여신을 초월하는 존재』라고 말했어……. 확실히 관계가 있을 것 같네.」"

[[dialogue]]
speaker = "梨緒"
original = "「チャカパラ神やバジュラ教団についてわかっていることは？」"
translation = "「차카파라 신이나 바주라 교단에 대해 알고 있는 것은?」"

[[dialogue]]
speaker = "クロト"
original = "「あまり多くはないな。約３０００年前、リクリエを進めようと魔王ラクシスと対立していたことくらいだ」"
translation = "「그리 많지는 않아. 약 3000년 전, 리크리에를 진행하려고 마왕 락시스와 대립했다는 것 정도다.」"

[[dialogue]]
speaker = "クロト"
original = "「ネビュラには考古学者がいて、チャカパラ神について調べていた魔女がいたそうなんだけど……彼女がまとめた資料はある事件でほとんど失われてしまったらしい」"
translation = "「네뷸라에는 고고학자가 있고, 차카파라 신에 대해 조사하던 마녀가 있었다고 하는데…… 그녀가 정리한 자료는 어떤 사건으로 대부분 소실된 모양이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「……そうか。なかなかうまくはいかないものだな」"
translation = "「……그런가. 좀처럼 뜻대로 되지는 않는군.」"

[[dialogue]]
speaker = "梨緒"
original = "「それとチャカパラ神のような『女神と異なる信仰』は、今までにいくつか存在するらしい。ベアトとナターシャが似た存在を知っていた」"
translation = "「그리고 차카파라 신 같은 『여신과 다른 신앙』은 지금까지 몇 가지 존재하는 모양이다. 베아토와 나타샤가 비슷한 존재를 알고 있었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「それが“真なる神”と関係するかはわからないが」"
translation = "「그것이 “진정한 신”과 관계가 있는지는 모르겠지만.」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう。星徒会でもチャカパラ神について調べてみるよ」"
translation = "「고마워. 성도회에서도 차카파라 신에 대해 조사해볼게.」"

[[dialogue]]
speaker = "unk"
original = "仮面を付けたリクリエの使徒は、人格や記憶を上書きされているようで、ある意味役を演じているようなものだ。"
translation = "가면을 쓴 리크리에의 사도는 인격이나 기억이 덮어씌워진 것 같아, 어떤 의미로는 역할을 연기하고 있는 것이나 다름없다."

[[dialogue]]
speaker = "unk"
original = "ジグの言葉に意味があるとは限らないが、『女神を超越する存在』というのは気になった。バジュラ教団など他にも同様の発言をした者がいるのならば、注視する必要がある。"
translation = "지그의 말에 의미가 있다고는 할 수 없지만, 『여신을 초월하는 존재』라는 것은 마음에 걸렸다. 바주라 교단 등 다른 곳에서도 비슷한 발언을 한 자가 있다면 주시할 필요가 있다."

[[dialogue]]
speaker = "梨緒"
original = "「そしてもう１つ。私の素性に関してわかったことがある」"
translation = "「그리고 한 가지 더. 내 정체에 관해 알게 된 것이 있다.」"

[[dialogue]]
speaker = "梨緒"
original = "「君とフィオナは、平行世界について教えてくれた。だからこの件は、私も伝えておく必要があると思ったんだ」"
translation = "「너와 피오나는 평행세계에 대해 알려주었지. 그래서 이 건은 나도 전해둘 필요가 있다고 생각했다.」"

[[dialogue]]
speaker = "unk"
original = "梨緒はこの世界の『梨緒・Ａ・クリステレス』がすでに死亡していること、そして自身が平行世界ベガから来たであろうことを、淡々と話した。"
translation = "리오는 이 세계의 『리오·A·크리스테레스』가 이미 사망했다는 것, 그리고 자신이 평행세계 베가에서 왔을 것이라는 사실을 담담하게 이야기했다."

[[dialogue]]
speaker = "クロト"
original = "「……なるほど、経緯は理解した。でも落ち着いているんだな」"
translation = "「……과연, 경위는 이해했어. 하지만 침착하네.」"

[[dialogue]]
speaker = "梨緒"
original = "「まぁ、受け止めるのに多少の抵抗はあったがな」"
translation = "「뭐, 받아들이는 데 다소 저항은 있었지만 말이다.」"

[[dialogue]]
speaker = "梨緒"
original = "「だがやるべきことは変わらない。ジグを取り戻し、リクリエを止める。それだけだ」"
translation = "「하지만 해야 할 일은 변하지 않아. 지그를 되찾고 리크리에를 멈춘다. 그뿐이다.」"

[[dialogue]]
speaker = "unk"
original = "梨緒はこれからもリクリエと戦うと言う。"
translation = "리오는 앞으로도 리크리에와 싸우겠다고 말한다."

[[dialogue]]
speaker = "unk"
original = "しかしチナが現れ、あの宣戦布告をしてから気になっていることがあった。"
translation = "하지만 치나가 나타나 그 선전포고를 한 뒤로 신경 쓰이는 것이 있었다."

[[dialogue]]
speaker = "クロト"
original = "「だけど、もしチナが言っていたことが本当なら、今アルタイルとデネブが存続しているのは……」"
translation = "「하지만 만약 치나가 말한 것이 사실이라면, 지금 알타이르와 데네브가 존속하고 있는 건……」"

[[dialogue]]
speaker = "unk"
original = "３つの世界でリクリエを押し付け合っているという説が本当なら、一時でもアルタイルに平穏が戻ったのは、ベガが滅んだ影響かもしれない。"
translation = "세 세계에서 리크리에를 서로 떠넘기고 있다는 설이 사실이라면, 잠시라도 알타이르에 평온이 돌아온 것은 베가가 멸망한 영향일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "ならアルタイルもデネブも、梨緒にとって許しがたい存在ではないのか……？"
translation = "그렇다면 알타이르도 데네브도 리오에게 있어서 용서할 수 없는 존재가 아닐까……?"

[[dialogue]]
speaker = "梨緒"
original = "「いいや。ベガが滅んだことが、アルタイルやデネブのせいだとは思っていない」"
translation = "「아니. 베가가 멸망한 것이 알타이르나 데네브의 탓이라고는 생각하지 않는다.」"

[[dialogue]]
speaker = "梨緒"
original = "「正直に言って、私は香堂チナの言葉をまるで信じていないんだ」"
translation = "「솔직히 말해서, 나는 코도 치나의 말을 전혀 믿지 않아.」"

[[dialogue]]
speaker = "クロト"
original = "「どうしてそこまで言い切れるんだ？」"
translation = "「어떻게 그렇게 단정 지을 수 있는 거야?」"

[[dialogue]]
speaker = "梨緒"
original = "「簡単だ。あの手が、片方の世界を潰したところで、もう一方の世界を見逃すと思うか？」"
translation = "「간단하다. 그 손이 한쪽 세계를 무너뜨렸다고 해서, 다른 한쪽 세계를 눈감아줄 것 같나?」"

[[dialogue]]
speaker = "unk"
original = "ディザスターハンド。"
translation = "디재스터 핸드."

[[dialogue]]
speaker = "unk"
original = "極星学園やジグを超える、現在最大の脅威。"
translation = "극성학원이나 지그를 넘어서는 현재 최대의 위협."

[[dialogue]]
speaker = "unk"
original = "間近で相対したからわかる。あれは破滅の化身だ。"
translation = "가까이서 상대해봤기에 알 수 있다. 저것은 파멸의 화신이다."

[[dialogue]]
speaker = "梨緒"
original = "「私の世界は破滅を迎えた」"
translation = "「내 세계는 파멸을 맞이했다.」"

[[dialogue]]
speaker = "梨緒"
original = "「だからこそ思うんだ。他の平行世界を滅ぼしたところでリクリエは止まらない」"
translation = "「그렇기에 생각하는 거다. 다른 평행세계를 멸망시킨다고 해서 리크리에가 멈추지는 않아.」"

[[dialogue]]
speaker = "梨緒"
original = "「例の動画も見た。香堂チナは言葉の通りの内容を信じているんだろうが……」"
translation = "「예의 동영상도 봤다. 코도 치나는 말 그대로의 내용을 믿고 있는 거겠지만……」"

[[dialogue]]
speaker = "梨緒"
original = "「片方が消えれば、もう片方が生き残る──私に言わせるなら、それは希望的観測だ」"
translation = "「한쪽이 사라지면 다른 한쪽이 살아남는다── 내 입장에서 말하자면 그것은 희망 섞인 관측일 뿐이다.」"

[[dialogue]]
speaker = "クロト"
original = "「……なるほど」"
translation = "「……과연.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の見立ては、ある意味チナや煌嶺よりも過酷で厳しい。"
translation = "리오의 견해는 어떤 의미에서 치나나 코레이보다도 가혹하고 엄격하다."

[[dialogue]]
speaker = "unk"
original = "だが今までリクリエと対峙してきたなら、頷けるものではあった。"
translation = "하지만 지금까지 리크리에와 대치해왔다면 고개를 끄덕일 만한 것이었다."

[[dialogue]]
speaker = "梨緒"
original = "「それにジグの動きも気になる」"
translation = "「게다가 지그의 움직임도 신경 쓰여.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグは積極的に介入することなく、アルタイルとデネブの星騎士の衝突を観察しようとしていた。リクリエの使徒なら、私たちもチナも敵であるはずなのに」"
translation = "「지그는 적극적으로 개입하지 않고 알타이르와 데네브의 성기사 충돌을 관찰하려 했지. 리크리에의 사도라면 우리도 치나도 적이어야 할 텐데.」"

[[dialogue]]
speaker = "梨緒"
original = "「彼女には何か思惑がある。元々飄々としていて真意が掴みにくいところはあったが、理由なく敵を見逃すようなやつではない」"
translation = "「그녀에게는 무언가 의도가 있다. 원래 표표해서 진의를 파악하기 어려운 면은 있었지만, 이유 없이 적을 눈감아줄 녀석은 아니다.」"

[[dialogue]]
speaker = "梨緒"
original = "「そしてアルタイルとデネブが戦い消耗すれば、最後に笑うのはリクリエだ」"
translation = "「그리고 알타이르와 데네브가 싸워 소모되면 마지막에 웃는 것은 리크리에다.」"

[[dialogue]]
speaker = "unk"
original = "ジグを唯一知る者として意見をくれるのはありがたい。"
translation = "지그를 유일하게 아는 자로서 의견을 주는 것은 고마운 일이다."

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒の動きを考えれば、軽々にデネブとの戦いを決断すべきでないように思える。"
translation = "리크리에의 사도의 움직임을 생각하면 섣불리 데네브와의 싸움을 결단해서는 안 될 것처럼 느껴진다."

[[dialogue]]
speaker = "梨緒"
original = "「そして最後に。選挙管理委員会として、星徒会の監視は継続中だ。星徒会長として恥ずかしくない行動を心がけるように」"
translation = "「그리고 마지막으로. 선거관리위원회로서 성도회의 감시는 계속 중이다. 성도회장으로서 부끄럽지 않은 행동을 유념하도록.」"

[[dialogue]]
speaker = "unk"
original = "ピシッと姿勢を正して、鋭い視線を向けてくる梨緒。"
translation = "자세를 바짝 바로잡고 날카로운 시선을 보내오는 리오."

[[dialogue]]
speaker = "unk"
original = "こんな時でもぶれないというか、真面目というか……平行世界の星徒会で副会長をしていたのも頷ける。"
translation = "이런 때에도 흔들리지 않는달까, 성실하달까…… 평행세계의 성도회에서 부회장을 지냈다는 것도 납득이 간다."

[[dialogue]]
speaker = "unk"
original = "そんな梨緒だからこそ、頼めることがある。"
translation = "그런 리오이기에 부탁할 수 있는 일이 있다."

[[dialogue]]
speaker = "クロト"
original = "「選管の梨緒に手伝ってほしいことがあるんだが、いいか？」"
translation = "「선관의 리오에게 도와줬으면 하는 일이 있는데, 괜찮을까?」"

[[dialogue]]
speaker = "梨緒"
original = "「？\u3000選管の？」"
translation = "「? 선관의?」"

