[[dialogue]]
speaker = "unk"
original = "こどもの日パーティーから１週間ほど経って──"
translation = "어린이날 파티로부터 일주일 정도 지나서──"

[[dialogue]]
speaker = "unk"
original = "小さなレミカは、大きなレミカと相談して、あることを行おうとしていた。"
translation = "어린 레미카는 큰 레미카와 상담하여 어떤 일을 하려고 하고 있었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――ライブの準備はこんな感じでいいかな？」"
translation = "「――라이브 준비는 이 정도면 될까?」"

[[dialogue]]
speaker = "レミカ"
original = "「そうだね。みんな、手伝ってくれてありがとう」"
translation = "「그렇네. 얘들아, 도와줘서 고마워」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「こどもの日パーティーを手伝ってもらったんだもの。もちろん協力するわよ！」"
translation = "「우리도 축하받은 파티를 도와줬는걸. 당연히 협력해야지!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「といっても、私の得意分野じゃないから、メルエルやパパの方がたくさん頑張ったんだけどね！\u3000えっへん♪」"
translation = "「그렇다고 해도 내 전공 분야가 아니라서 메루엘이랑 아빠가 훨씬 더 많이 노력했지만 말이야! 에헴♪」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「でも、２人のレミカちゃんでアイドルユニットを組んでライブをするだなんて思わなかったよ」"
translation = "「그나저나 두 명의 레미카 짱이 아이돌 유닛을 결성해서 라이브를 할 줄은 몰랐어」"

[[dialogue]]
speaker = "unk"
original = "そう、２人のレミカは、学園内のイベントとしてミニライブを開催しようとしていた。"
translation = "그렇다, 두 명의 레미카는 학원 내 이벤트로 미니 라이브를 개최하려 하고 있었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私が小さくなった体で望むとすれば――やっぱり『可愛いアイドル』になりたいってことだからね♪」"
translation = "「내가 작아진 몸으로 바라는 게 있다면―― 역시 『귀여운 아이돌』이 되고 싶다는 거니까♪」"

[[dialogue]]
speaker = "レミカ"
original = "「事務所に所属している以上、私だけの意思で思いきったイメージチェンジってできないから、ちょうどいいチャンスかなって思ったんだよ」"
translation = "「사무소에 소속되어 있는 이상 내 의지만으로 파격적인 이미지 변신은 할 수 없으니까, 마침 좋은 기회라고 생각했어」"

[[dialogue]]
speaker = "メルエル"
original = "「前に私と『アーネスト』のライブをした時も、事務所さんから１度ＮＧが出ちゃったもんね」"
translation = "「전에 나랑 『어니스트』 라이브를 했을 때도 사무소에서 한번 거절당했었지」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「うん。仕事としてやっている以上、そういったしがらみは避けられないよね」"
translation = "「응. 직업으로 하고 있는 이상 그런 제약은 피할 수 없으니까」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「でも、小さくなった私なら、愛戸レミカとは別の『新人アイドル』として、自由にイメチェンできるから」"
translation = "「하지만 작아진 나라면 아이도 레미카와는 다른 『신인 아이돌』로서 자유롭게 이미지 변신을 할 수 있으니까」"

[[dialogue]]
speaker = "レミカ"
original = "「そして、私も一緒のステージに立つことで、観に来てくれたファンの人たちが小さい私の姿を見てどう思うのか、反応を伺うことができる」"
translation = "「그리고 나도 함께 무대에 섬으로써 보러 와준 팬분들이 어린 내 모습을 보고 어떻게 생각하는지 반응을 살필 수 있어」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ただ、ちょっと悩んでるのが、小さい私がどんな自分を演出するかってことなんだよね……」"
translation = "「다만 조금 고민인 게, 어린 내가 어떤 자신을 연출할까 하는 점인데……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「真面目な話なんだけど……会長は、私がどんなキャラを演じたら可愛く見えると思う？」"
translation = "「진지한 얘긴데…… 회장은 내가 어떤 캐릭터를 연기해야 귀여워 보일 것 같아?」"

[[dialogue]]
speaker = "unk"
original = "ちなみに今はどんな風に行こうと考えてる？"
translation = "참고로 지금은 어떤 식으로 가려고 생각 중이야?"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「こ、この場で演じるのはちょっと恥ずかしいけど……コホン」"
translation = "「이, 이 자리에서 연기하는 건 좀 부끄럽지만…… 큼큼」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――みんな～♪\u3000愛戸レミカの従妹、『愛戸ミソラ』だよ～☆\u3000今日はライブを見に来てくれてありがと～<emoji=heart04>」"
translation = "「――여러분~♪ 아이도 레미카의 사촌, 『아이도 미소라』야~☆ 오늘 라이브 보러 와줘서 고마워~<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「レミカ！\u3000その『ミソラ』っていうのは何！？」"
translation = "「레미카! 그 『미소라』라는 건 뭐야!?」"

[[dialogue]]
speaker = "レミカ"
original = "「普通に考えて、『私が２人に増えちゃいました』って言われても、正直意味不明でしょ？」"
translation = "「상식적으로 생각해서 『내가 두 명으로 늘어났습니다』라고 해봤자 솔직히 이해 불능이잖아?」"

[[dialogue]]
speaker = "メルエル"
original = "「ま、まあ、当事者である私たち自身、正直意味は不明だと思ってるからね……」"
translation = "「뭐, 뭐 당사자인 우리 자신도 솔직히 의미 불명이라고 생각하니까……」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。だから、ライブに来てくれたファンに対しては、私の従妹っていう設定にしようと思って」"
translation = "「응. 그래서 라이브에 와준 팬들에게는 내 사촌이라는 설정으로 가려고 해」"

[[dialogue]]
speaker = "メルエル"
original = "「ミソラちゃん……だっけ？\u3000可愛い名前だね♪」"
translation = "「미소라 짱……이었나? 귀여운 이름이네♪」"

[[dialogue]]
speaker = "unk"
original = "う～ん、でも、ちょっとあざといかも……？"
translation = "으음, 하지만 조금 영악해 보일지도……?"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「あ、あざといって……じゃあ会長は、どんな感じなら可愛いと思うの？」"
translation = "「여, 영악하다니…… 그럼 회장은 어떤 느낌이 귀엽다고 생각해?」"

[[dialogue]]
speaker = "unk"
original = "俺は１度深呼吸してから、かつてのバイト経験を活かして、演じてみせる。"
translation = "나는 한 번 심호흡하고 나서 과거의 아르바이트 경험을 살려 연기해 보인다."

[[dialogue]]
speaker = "unk"
original = "こんな感じとか、どうかにゃん？"
translation = "이런 느낌은 어떠냐옹?"

[[dialogue]]
speaker = "レミカ"
original = "「にゃん！？」"
translation = "「냐옹!?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「か、会長くん、可愛い～～っ！\u3000可愛い、可愛すぎるよぉ！\u3000えっ、何！？\u3000その喋り方は何なの！？」"
translation = "「회, 회장군, 귀여워~~! 귀여워, 너무 귀엽잖아! 엣, 뭐야!? 그 말투는 대체 뭐야!?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「パパが急に、可愛い女の子に変身したみたいだわ！」"
translation = "「아빠가 갑자기 귀여운 여자아이로 변신한 것 같아!」"

[[dialogue]]
speaker = "メルエル"
original = "「女の子姿に変身してるところは見たことあるけど、喋り方が女の子っぽいのは初めて見たかも！？」"
translation = "「여자아이 모습으로 변신한 건 본 적 있지만, 말투가 여자아이 같은 건 처음 본 것 같아!?」"

[[dialogue]]
speaker = "unk"
original = "これは猫耳メイドの喋り方だにゃん！"
translation = "이건 고양이 귀 메이드 말투다옹!"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ぶふっ！？\u3000か、会長、ちょっと待って……くっ、ふふふふっ……！\u3000可愛いけど、なんで猫耳メイド……！？」"
translation = "「푸흡!? 회, 회장, 잠깐만…… 큭, 후후후훗……! 귀엽긴 한데 왜 고양이 귀 메이드야……!?」"

[[dialogue]]
speaker = "unk"
original = "可愛くなかったかにゃん？"
translation = "안 귀여웠냐옹?"

[[dialogue]]
speaker = "レミカ"
original = "「ぶふふっ……！\u3000い、いや可愛いと、思うけれども……！」"
translation = "「푸후훗……! 아, 아니 귀엽다고는 생각하지만……!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――え？\u3000ちなみに名前は『クロにゃん』？\u3000ぷはっ……！\u3000い、いや別に笑ってないから……！\u3000あはっ、あはははははっ！」"
translation = "「――에? 참고로 이름은 『쿠로냥』? 푸핫……! 아, 아니 딱히 웃은 거 아니니까……! 아핫, 아하하하하하!」"

[[dialogue]]
speaker = "レミカ"
original = "「そ、そう……くふっ……！\u3000アイドルはこんなことで笑ったりしないから……！\u3000あ、ダメ、あはははははっ！」"
translation = "「그, 그래…… 크훕……! 아이돌은 이런 걸로 웃거나 하지 않으니까……! 아, 안 돼, 아하하하하하!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「思いっきり笑ってるわ！」"
translation = "「대놓고 웃고 있잖아!」"

[[dialogue]]
speaker = "unk"
original = "俺はそれから喋り方を元に戻して、レミカに言う。"
translation = "나는 다시 말투를 원래대로 되돌리고 레미카에게 말한다."

[[dialogue]]
speaker = "unk"
original = "レミカは自然体のままでいいと思うよ"
translation = "레미카는 자연스러운 모습 그대로가 좋다고 생각해."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "無理に演じようとするよりも、レミカは今みたいに肩の力を抜いて、『素』の感じでやるのが一番可愛いと思う。"
translation = "억지로 연기하려고 하기보다 레미카는 지금처럼 어깨에 힘을 빼고 『본모습』으로 하는 게 가장 귀엽다고 생각해."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「す、素が可愛いとか言われても……どうしたらいいのか……恥ずかしいし……」"
translation = "「보, 본모습이 귀엽다는 말을 들어도…… 어떻게 해야 할지…… 부끄럽기도 하고……」"

[[dialogue]]
speaker = "unk"
original = "子供の頃に戻ったつもりで、楽しめばいい"
translation = "어릴 때로 돌아갔다고 생각하고 즐기면 돼."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「子供の頃に戻ったつもりで……？」"
translation = "「어릴 때로 돌아갔다고 생각하고……?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、言葉を続ける。"
translation = "나는 고개를 끄덕이며 말을 잇는다."

[[dialogue]]
speaker = "レミカ"
original = "「――子供の頃に憧れた『可愛いアイドル』みたいに、ステージで思いっきりライブを楽しむ……？」"
translation = "「――어릴 때 동경했던 『귀여운 아이돌』처럼 무대에서 마음껏 라이브를 즐긴다……?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「つまり、全力でビームを撃つみたいなものね！！」"
translation = "「즉, 전력으로 빔을 쏘는 것과 같은 거네!!」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「全力で楽しいライブをやる……そっか、そうだよね！」"
translation = "「전력으로 즐거운 라이브를 한다…… 그렇구나, 그렇네!」"

[[dialogue]]
speaker = "メルエル"
original = "「演出とか、どう見せるとか、きっと大事なことだと思うけど……そういう難しいことは、むしろいつもやってることでしょ？」"
translation = "「연출이라든가 어떻게 보여줄지 같은 건 분명 중요한 일이겠지만…… 그런 어려운 건 오히려 평소에 항상 하고 있는 거잖아?」"

[[dialogue]]
speaker = "メルエル"
original = "「それよりも、可愛い衣装で可愛い歌を、全力で歌って踊って、楽しんでる姿を見せる！」"
translation = "「그것보다 귀여운 의상에 귀여운 노래를 전력으로 노래하고 춤추며 즐거워하는 모습을 보여주는 것!」"

[[dialogue]]
speaker = "メルエル"
original = "「そこに全力をかけることが、レミカちゃんの理想に繋がるんじゃないかな？」"
translation = "「거기에 전력을 다하는 것이 레미카 짱의 이상으로 이어지는 게 아닐까?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「確かに……私が憧れた『流星スターピース』は、そういうアイドルだったかも。うん。私、やってみる！」"
translation = "「확실히…… 내가 동경했던 『유성 스타 피스』는 그런 아이돌이었을지도 몰라. 응. 나 해볼게!」"

[[dialogue]]
speaker = "unk"
original = "その翌日の放課後。レミカ２人によるミニライブが行われた。"
translation = "그 이튿날 방과 후. 두 명의 레미카에 의한 미니 라이브가 열렸다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「みんな～！\u3000今日は来てくれてありがとう！\u3000短いライブだったけど、楽しんでもらえたかな～？」"
translation = "「여러분~! 오늘 와줘서 고마워! 짧은 라이브였지만 즐거웠어~?」"

[[dialogue]]
speaker = "unk"
original = "今回初めて登場したレミカの従妹、という設定にも関わらず、沢山の生徒たちが集まったアリーナの観客席から大きな歓声が上がる。"
translation = "이번에 처음 등장한 레미카의 사촌이라는 설정임에도 불구하고, 수많은 학생이 모인 아레나 관객석에서 커다란 함성이 터져 나온다."

[[dialogue]]
speaker = "unk"
original = "それほどに小さいレミカは、１人のアイドルとしてキラキラと輝いていた。それは、大きいレミカも同じで――"
translation = "그만큼 어린 레미카는 한 명의 아이돌로서 반짝반짝 빛나고 있었다. 그것은 큰 레미카도 마찬가지여서――"

[[dialogue]]
speaker = "レミカ"
original = "「私からもありがとう！\u3000今回また初めて組んだユニットだったけど、私自身、ライブをしててすごく楽しかった……！」"
translation = "「나도 고마워! 이번에 또 처음 결성한 유닛이었지만, 나 자신도 라이브를 하면서 정말 즐거웠어……!」"

[[dialogue]]
speaker = "unk"
original = "彼女はアーネストのライブをした時にも垣間見せた、キラキラとした笑顔を浮かべていた。"
translation = "그녀는 어니스트 라이브를 했을 때도 살짝 보여주었던 반짝이는 미소를 짓고 있었다."

[[dialogue]]
speaker = "レミカ"
original = "「私、これからも……みんなに笑顔を与えられるようなアイドルを目指したい！」"
translation = "「나 앞으로도…… 모두에게 미소를 줄 수 있는 그런 아이돌을 목표로 하고 싶어!」"

[[dialogue]]
speaker = "レミカ"
original = "「子供の頃に見た、キラキラした笑顔で、みんなに元気を与えられるようなアイドルに！」"
translation = "「어릴 때 봤던 반짝이는 미소로 모두에게 활기를 줄 수 있는 그런 아이돌이!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「うん。私も――キラキラな笑顔が似合う、可愛いアイドルになりたい♪」"
translation = "「응. 나도―― 반짝이는 미소가 어울리는 귀여운 아이돌이 되고 싶어♪」"

[[dialogue]]
speaker = "unk"
original = "ステージの上で２人のレミカは向き合って、互いに笑顔を浮かべ合うのだった。"
translation = "무대 위에서 두 명의 레미카는 서로 마주 보며 미소를 주고받았다."

[[dialogue]]
speaker = "unk"
original = "果たして拍手喝采の中でライブは終了した。"
translation = "박수갈채 속에서 라이브는 종료되었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ふぅ～……ただいま」"
translation = "「후우~…… 다녀왔어」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「レミカ、すごかったわ！\u3000ライブも大盛り上がりだったわね♪」"
translation = "「레미카, 대단했어! 라이브도 엄청나게 달아올랐네♪」"

[[dialogue]]
speaker = "メルエル"
original = "「あれ？\u3000大きい方のレミカちゃんは？」"
translation = "「어라? 큰 레미카 짱은?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「実はステージから降りると同時に私の体が光って、元の１人に戻ったんだ」"
translation = "「사실 무대에서 내려옴과 동시에 내 몸이 빛나더니 원래의 한 명으로 돌아왔어」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「じゃあ、レミカの望みはちゃんと叶ったってことね♪」"
translation = "「그럼 레미카의 소원은 제대로 이루어졌다는 거네♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「うん、ステージで思いっきり歌って踊って、思い出したよ」"
translation = "「응, 무대에서 마음껏 노래하고 춤추면서 떠올렸어」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「子供の頃に初めてアイドルのライブを観た時の、キラキラして思わず笑顔が溢れてくるような感動……」"
translation = "「어릴 때 처음으로 아이돌 라이브를 봤을 때의, 반짝반짝해서 나도 모르게 미소가 넘쳐흐르던 그 감동……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私はあの時、流星スターピースの２人が浮かべた、観ている人たちまで笑顔にしちゃうようなキラキラな笑顔に、何よりも憧れたんだ」"
translation = "「나는 그때 유성 스타 피스의 두 사람이 지었던, 보는 사람들까지 웃게 만드는 반짝이는 미소를 무엇보다 동경했었어」"

[[dialogue]]
speaker = "unk"
original = "今日のレミカの笑顔は、最高に可愛かったぞ"
translation = "오늘 레미카의 미소는 최고로 귀여웠어."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……！\u3000か、会長はいつもそうやって、恥ずかしくなることをドストレートに言う……」"
translation = "「……! 회, 회장은 항상 그렇게 부끄러워지는 말을 돌직구로 한다니까……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「でも……アドバイスのおかげで、また１歩前進できたから……」"
translation = "「하지만…… 조언 덕분에 또 한 걸음 전진할 수 있었으니까……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ありがと……会長」"
translation = "「고마워…… 회장」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ふふっ、照れながらお礼を言うレミカも可愛いわね♪」"
translation = "「후훗, 수줍어하며 고맙다고 말하는 레미카도 귀엽네♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「び、ヴィーナスも、そういうことはいちいち言わなくていいから！」"
translation = "「비, 비너스도 그런 건 일일이 말 안 해도 되니까!」"

[[dialogue]]
speaker = "メルエル"
original = "「レミカちゃんも１人に戻ったし、残るは私だけだね！」"
translation = "「레미카 짱도 한 명으로 돌아왔고, 남은 건 나뿐이네!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「メルエルが小さい体になって望むこと、もう分かったの？」"
translation = "「메루엘이 작은 몸이 되어서 바라는 것, 이제 알았어?」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。い、一応、ちっちゃな私と２人で話し合って考えといたんだけど――」"
translation = "「응. 이, 일단 어린 나랑 둘이서 의논해서 생각해두긴 했는데――」"

[[dialogue]]
speaker = "unk"
original = "ちらっとメルエルが俺と視線を合わせながら、口を開こうとする。"
translation = "슬쩍 메루엘이 나와 시선을 맞추며 입을 열려 한다."

[[dialogue]]
speaker = "unk"
original = "が、しかし。"
translation = "하지만."

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「ごめんね……大きい私には悪いけど、相談してた内容、なかったことにして欲しいな」"
translation = "「미안해…… 큰 나에게는 미안하지만, 의논했던 내용 없었던 걸로 해줬으면 좋겠어」"

[[dialogue]]
speaker = "メルエル"
original = "「えっ？\u3000どういうこと……？」"
translation = "「에? 그게 무슨 소리야……?」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「ヴィーナスちゃんやレミカちゃんにも申し訳ないけど……私、さっき決めたんだ」"
translation = "「비너스 짱이나 레미카 짱에게도 미안하지만…… 나 방금 결정했어」"

[[dialogue]]
speaker = "メルエル（幼少）"
original = "「私は、自分のやりたいことを叶える為に――このまま元の１人には戻らないって！」"
translation = "「나는 내가 하고 싶은 일을 이루기 위해―― 이대로 원래의 한 명으로 돌아가지 않겠어!」"

[[dialogue]]
speaker = "メルエル"
original = "「なっ！？」"
translation = "「나닛!?」"

[[dialogue]]
speaker = "unk"
original = "ここに来ての小さなメルエルの宣言に、その場にいた全員が言葉を失ってしまうのだった。"
translation = "갑작스러운 어린 메루엘의 선언에 그 자리에 있던 전원이 말을 잃고 말았다."

