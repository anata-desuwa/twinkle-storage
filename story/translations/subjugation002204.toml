[[dialogue]]
speaker = "unk"
original = "ある日、東京の量販店で起きた事件について、警察から協力を依頼されてやって来ていた俺とジュエリー。"
translation = "어느 날, 도쿄의 양판점에서 일어난 사건에 대해 경찰로부터 협력 의뢰를 받고 찾아온 나와 주얼리."

[[dialogue]]
speaker = "unk"
original = "『日傘探偵』の見事な推理によって、今回も事件は無事に解決したのだが――"
translation = "『양산 탐정』의 훌륭한 추리에 의해 이번에도 사건은 무사히 해결되었으나──"

[[dialogue]]
speaker = "ミネコ"
original = "「いや～、まさか事件現場に偶然居合わせちゃうとはね～」"
translation = "「이런~ 설마 사건 현장에 우연히 같이 있게 될 줄이야~」"

[[dialogue]]
speaker = "unk"
original = "帰りの道中、俺たちはミネコと並んで歩いていた。"
translation = "돌아오는 길에 우리는 미네코와 나란히 걷고 있었다."

[[dialogue]]
speaker = "unk"
original = "居合わせたのは本当に偶然……？"
translation = "같이 있었던 건 정말 우연……?"

[[dialogue]]
speaker = "ミネコ"
original = "「ん？\u3000ふふっ♪\u3000さってね～♪\u3000会長はどっちだと思う？」"
translation = "「응? 후훗♪ 글쎄~♪ 회장님은 어느 쪽이라고 생각해?」"

[[dialogue]]
speaker = "unk"
original = "おどけて見せるミネコ。"
translation = "익살스럽게 구는 미네코."

[[dialogue]]
speaker = "unk"
original = "と、ジュエリーが少し考えるように顎を擦りながら、口を開く。"
translation = "그러자 주얼리가 조금 생각하듯 턱을 문지르며 입을 연다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ。確かに、ミネコの立場を考えれば、疑いたくなるところだが……」"
translation = "「흠. 확실히 미네코의 입장을 생각하면 의심하고 싶어지는 대목이다만……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おそらく、今回は本当に偶然なのだろう」"
translation = "「아마 이번에는 정말 우연일 거야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「推測するに、キミは――」"
translation = "「추측건대 너는──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「胸を大きくする為の『豊胸グッズ』を、あの量販店に買いに来ていたんじゃないか？」"
translation = "「가슴을 크게 만들기 위한 『가슴 확대 기구』를 저 양판점에 사러 왔던 게 아니냐?」"

[[dialogue]]
speaker = "ミネコ"
original = "「な、ななな、何をいきなり言い出すのかなジュエリー！？」"
translation = "「뭐, 뭐뭐뭐, 뭘 갑자기 꺼내는 거야 주얼리!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なに、ここ最近のキミの行動を見ていて気づいたのさ。学園の女生徒たちの胸を、よくチラ見していることにね」"
translation = "「아니, 최근 네 행동을 보고 깨달았지. 학원 여학생들의 가슴을 자주 힐끔거리고 있다는 것을 말이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私も少なからず感じたことがあるから、すぐにわかったよ。この学園の女生徒はズバリ――」"
translation = "「나도 적잖이 느낀 적이 있어서 바로 알 수 있었어. 이 학원의 여학생들은 딱 잘라 말해──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「『巨乳率』がやたらと高い」"
translation = "「『거유율』이 지나치게 높아.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「しかも、その平均サイズは、大人顔負けのグラビア並みだ」"
translation = "「게다가 그 평균 사이즈는 성인 뺨치는 그라비아 수준이다.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だが、キミは私と同じ、『持たざる者』の側だ」"
translation = "「하지만 너는 나와 같은 『가지지 못한 자』의 편이지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ぐはぁっ！？」"
translation = "「구학!?」"

[[dialogue]]
speaker = "unk"
original = "初めて大怪盗にダメ―ジが入った！？"
translation = "처음으로 대괴도에게 대미지가 들어갔다!?"

[[dialogue]]
speaker = "ミネコ"
original = "「だ、だからって、なんで私が豊胸グッズを買いに来てたとか……！」"
translation = "「그, 그렇다고 왜 내가 가슴 확대 기구를 사러 왔다고……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「昨日は私も含め、クラス内の『持たざる者』の間でグッズの話が盛り上がっていたからね。あの量販店に売っているらしい、という話にもなった」"
translation = "「어제는 나를 포함해 클래스 내의 『가지지 못한 자』들 사이에서 기구 이야기가 달아올랐으니까 말이야. 저 양판점에 팔고 있다는 이야기도 나왔었지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その時、普段なら話に混ざってくるキミが、あえて距離をとって様子を伺っていたのを、少々不思議に思っていたんだよ」"
translation = "「그때 평소라면 대화에 끼어들 네가 굳이 거리를 두고 눈치를 살피던 것을 조금 이상하게 생각하고 있었어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そして、<b>キミの母親</b>のことを思えば、少なからずコンプレックスを抱いていることは、想像に難くない」"
translation = "「그리고 **네 어머니**를 생각하면 적잖이 콤플렉스를 품고 있을 거라는 건 상상하기 어렵지 않지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「わ、私の母親が誰かは、明かしてなかったはずだけど……？」"
translation = "「내, 내 어머니가 누군지는 밝히지 않았을 텐데……?」"

[[dialogue]]
speaker = "unk"
original = "ミネコのお母さん……？"
translation = "미네코의 어머니……?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、助手にはそのことはまだ、話してなかったね」"
translation = "「아아, 조수에게는 그 이야기는 아직 안 했었군.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ミネコが前に１度、流星寮の私の部屋に無理矢理泊まりに来たことがあってね」"
translation = "「미네코가 저번에 한 번 유성 기숙사의 내 방에 억지로 자러 온 적이 있어서 말이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「就寝する前の『自分語りタイム』とやらで、彼女がどういう経緯で怪盗をやっているのかを聞いたんだよ」"
translation = "「취침 전의 『자기 고백 타임』인가 뭔가 하는 것에서 그녀가 어떤 경위로 괴도를 하고 있는지 들었거든.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その結果判明したのが、彼女の父親が未だ現役の、世界的に有名な『怪盗』である、ということだった」"
translation = "「그 결과 판명된 것이 그녀의 아버지가 아직 현역인 세계적으로 유명한 『괴도』라는 것이었어.」"

[[dialogue]]
speaker = "unk"
original = "え、現役の怪盗？\u3000それって……"
translation = "에, 현역 괴도? 그거라면……"

[[dialogue]]
speaker = "unk"
original = "現在、世界で話題に上がる怪盗は、<b>２人</b>存在している。"
translation = "현재 세계에서 화제가 되는 괴도는 **두 명** 존재한다."

[[dialogue]]
speaker = "unk"
original = "１人は、大怪盗フランボウ。そして、もう１人は――"
translation = "한 명은 대괴도 플랑보. 그리고 또 한 명은──"

[[dialogue]]
speaker = "ジュエリー"
original = "「フランボウが現れるずっと前から活動し続けている、人間界で知らぬ者なき大怪盗――」"
translation = "「플랑보가 나타나기 훨씬 전부터 계속 활동하고 있는, 인간계에서 모르는 자가 없는 대괴도──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「通称『ルパン・ザ・ピンキー』。ミネコはその実の娘だよ」"
translation = "「통칭 『루팡 더 핑키』. 미네코는 그 친딸이야.」"

[[dialogue]]
speaker = "unk"
original = "ルパンの娘！？\u3000ならミネコのお母さんは……"
translation = "루팡의 딸!? 그럼 미네코의 어머니는……"

[[dialogue]]
speaker = "ジュエリー"
original = "「ここまで言えば、後は想像がつくだろう？\u3000有名なルパン一味の女性。ミネコは明言こそしないが……つまりはそういうことだろう」"
translation = "「이쯤 말하면 나머지는 상상이 가겠지? 유명한 루팡 일당의 여성. 미네코는 명언하지 않았지만…… 즉 그런 것이겠지.」"

[[dialogue]]
speaker = "unk"
original = "ミネコは怪盗ルパンの末裔だったんだ……"
translation = "미네코는 괴도 루팡의 후예였구나……"

[[dialogue]]
speaker = "ミネコ"
original = "「血筋的にはね。でも――私は今後もルパンを名乗る気はないよ」"
translation = "「혈통적으로는 말이야. 하지만── 나는 앞으로도 루팡이라 칭할 생각은 없어.」"

[[dialogue]]
speaker = "ミネコ"
original = "「娘の私にも実年齢がわからないあのバカ親父が、まだまだ現役で有名だからね。仮に名乗ったところで、私の評価が『ルパンの娘』より上がることは、絶対にない」"
translation = "「딸인 나조차 실제 나이를 모르는 그 바보 아버지가 아직 현역으로 유명하니까 말이야. 설령 자처해봤자 내 평가가 『루팡의 딸』보다 올라갈 일은 절대 없어.」"

[[dialogue]]
speaker = "ミネコ"
original = "「そんなの私、嫌なんだよね。私は――」"
translation = "「그런 거 난 싫거든. 나는──」"

[[dialogue]]
speaker = "ミネコ"
original = "「親父が現役のうちに、親父に勝ちたい。だから、過去の選星者であった『フランボウ』を名乗らせてもらうことにしたんだ」"
translation = "「아버지가 현역일 때 아버지에게 이기고 싶어. 그래서 과거의 선성자였던 『플랑보』를 자처하기로 했어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ちなみに、私は流星市国に来る前に１度、ルパンと事件でぶつかったことがある」"
translation = "「참고로 나는 유성 시국에 오기 전에 한 번 루팡과 사건으로 부딪힌 적이 있어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だけど結果は――完敗だったよ」"
translation = "「하지만 결과는── 완패였지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「本人曰く、選星者には選ばれなかったし、星力も一切持っていない一般人とのことだったが……それであの実力は、もはや規格外という他ない」"
translation = "「본인 말로는 선성자로는 뽑히지 않았고 성력도 일절 없는 일반인이라고 했지만…… 그런데도 그 실력은 이미 규격 외라고 할 수밖에 없어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「掴みどころがなくてなんだか憎めない、面白いおじ様だった。……だが、次会った時は負ける気もないけどね」"
translation = "「종잡을 수 없어서 왠지 미워할 수 없는 재미있는 아저씨였지. ……하지만 다음에 만났을 때는 질 생각도 없지만 말이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「――と、それはそうと、ミネコが豊胸したがっているという話だったね」"
translation = "「──하고, 그건 그렇고 미네코가 가슴 확대를 하고 싶어 한다는 이야기였지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「いや、そんなこと一言も言ってないから！」"
translation = "「아니, 그런 말 한마디도 안 했다니까!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「まあ、待ちたまえ、ミネコ。私が言いたいのは、同じく持たざる者として、キミの気持ちはわかるし、それに対してのアドバイスもできるということだ」"
translation = "「뭐, 기다리게 미네코. 내가 하고 싶은 말은 똑같이 가지지 못한 자로서 네 기분은 이해하고, 그에 대한 조언도 해줄 수 있다는 거다.」"

[[dialogue]]
speaker = "ミネコ"
original = "「え？\u3000ジュエリーもまさか……おっぱいを大きくするために、何かしてるの？」"
translation = "「에? 주얼리도 설마…… 가슴을 키우기 위해 뭔가 하고 있어?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いいや、してない」"
translation = "「아니, 안 해.」"

[[dialogue]]
speaker = "ミネコ"
original = "「なんのアドバイスなわけ！？」"
translation = "「무슨 조언이라는 거야!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私のアドバイスは――」"
translation = "「내 조언은──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「胸の大きさ関係なく愛してくれる相手を見つければ、コンプレックスなど気にならなくなるということだ」"
translation = "「가슴 크기에 관계없이 사랑해 줄 상대를 찾으면 콤플렉스 따위 신경 쓰이지 않게 된다는 거다.」"

[[dialogue]]
speaker = "ミネコ"
original = "「その相手って……？」"
translation = "「그 상대라는 건……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ♪\u3000それはもちろん、我が愛する助手に決まっているだろう？」"
translation = "「후훗♪ 그건 물론 나의 사랑하는 조수로 정해져 있겠지?」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?"

[[dialogue]]
speaker = "ミネコ"
original = "「会長、明らかに予想外って顔してるけど……」"
translation = "「회장님, 명백하게 예상 밖이라는 표정을 짓고 있는데……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「問題ない。私は助手を心から信じているからね。ふふっ♪」"
translation = "「문제없어. 나는 조수를 진심으로 믿고 있으니까 말이야. 후훗♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「……なんか私、しばらく見てて気づいたんだけど」"
translation = "「……왠지 나 당분간 지켜보며 깨달은 건데.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ジュエリーって会長のことに対しては、急にバカになるよね……」"
translation = "「주얼리는 회장님에 대해서는 갑자기 바보가 되네……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「失礼な。キミにはわからないかもしれないが――これが『愛』というやつだよ♪」"
translation = "「무례하군. 너는 모를지도 모르지만── 이게 『사랑』이라는 거다♪」"

[[dialogue]]
speaker = "unk"
original = "ふふん♪\u3000と自信たっぷりの笑顔で、堂々と胸を張って言うジュエリーなのであった――"
translation = "흥♪ 하고 자신만만한 미소로 당당하게 가슴을 펴고 말하는 주얼리였다──"

