[[dialogue]]
speaker = "unk"
original = "第１２話,ＶＳ星喰らいシャドウ・黒騎士戦闘後,B"
translation = "제12화, VS 별 먹보 섀도우·흑기사 전투 후, B"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「メルエル！\u3000敵陣の中央に風穴を開けるよ、突っ込んで！」"
translation = "「멜엘! 적진 중앙에 구멍을 뚫을 거야, 돌격해!」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「任せて！！\u3000────たあぁあぁああぁっ！！」"
translation = "「맡겨줘!! ────타아아아아아아앗!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「────ぐぅうっ！！」"
translation = "「────구우웃!!」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「いい動きだね～♪\u3000私たち、けっこー良いコンビかも？」"
translation = "「좋은 움직임이네~♪ 우리, 꽤 좋은 콤비일지도?」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「デネブでも一緒に戦ったしね！\u3000マインちゃん、どんどん行こう！」"
translation = "「데네브에서도 같이 싸웠으니까! 마인짱, 계속 가자!」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「りょ～かい♪\u3000会長に情けない報告もできないし！\u3000爆弾ちゃんバズーカ、一斉射撃っ！！」"
translation = "「라~져♪ 회장님께 한심한 보고를 할 수는 없지! 폭탄짱 바주카, 일제 사격!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「集団相手なら私にお任せください──デッドエンド・コラプサー！！！」"
translation = "「집단 상대라면 제게 맡겨주세요── 데드 엔드 콜랩서!!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──エラーを検知。処理スピード、異常」"
translation = "「──에러 감지. 처리 스피드, 이상」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「こちらの攻撃。空振り、空振り、空振り──何故！？」"
translation = "「이쪽의 공격. 헛스윙, 헛스윙, 헛스윙── 어째서!?」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「みんな、感覚を研ぎ澄ませて！\u3000黒騎士までの道を切り開くよ！！」"
translation = "「모두, 감각을 날카롭게 세워! 흑기사까지 가는 길을 여는 거야!!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はは！\u3000いいぞ！\u3000もっと加速星術を飛ばせ！\u3000楽しくなってきた！」"
translation = "「하하! 좋아! 가속 성술을 더 날려라! 즐거워지기 시작했어!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「げ、激戦区すぎでございますわ～！？\u3000いくら光の魔女のブーストがあるからって！\u3000一歩間違えば即死なのですけど！？」"
translation = "「격, 격전지 너무해요~!? 아무리 빛의 마녀의 부스트가 있다고 해도! 한 번만 실수해도 즉사라니까요!?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「嗚呼──ホロウ・ルヴィネのシャドウ。美しいものが儚く散る様は、どうしてこんなにも素晴らしいのでしょう！」"
translation = "「아아── 홀로우 루비네의 섀도우. 아름다운 것이 덧없이 흩어지는 모습은 어찌나 이리 훌륭한지!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「みんな消えちゃえ、消えちゃえ消えちゃえ消えちゃえ──！！」"
translation = "「전부 사라져버려, 사라져버려 사라져버려 사라져버려──!!」"

[[dialogue]]
speaker_original = "エンジュ"
speaker_translation = "엔쥬"
original = "「気に入らないっ……消滅する時もあっさりした顔しやがって！\u3000覚悟もない癖に戦場に出てくるなっ！！」"
translation = "「맘에 안 들어…… 소멸할 때도 무덤덤한 표정 짓고 말이야! 각오도 없는 주제에 전장에 나오지 마!!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「全部私の獲物だ！\u3000もっと斬らせろ！！」"
translation = "「전부 내 사냥감이다! 더 베게 해줘!!」"

[[dialogue]]
speaker_original = "メテオラ"
speaker_translation = "메테오라"
original = "「あたしのグレネードも負けてないぞっ──火力ＭＡＸだ！！」"
translation = "「내 그레네이드도 지지 않는다고── 화력 MAX다!!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "「ぐぅ、ううぅっ────！？」"
translation = "「구, 우우웃────!?」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「見えたっ──！！」"
translation = "「보였다──!!」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「これが、最後の一発──！！」"
translation = "「이것이 마지막 한 발──!!」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「おおぉぉぉおぉぉおおおおおっ────！！！」"
translation = "「오오오오오오오오오오오오옷────!!!」"

[[dialogue]]
speaker = "unk"
original = "コハルコの加速星術で人智を超えるスピードを手に入れた星騎士たちが、一斉に黒騎士に肉薄する。"
translation = "코하루코의 가속 성술로 인지를 초월한 스피드를 얻은 성기사들이 일제히 흑기사에게 육박한다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "「──ムゥウゥゥゥウウンッ！！！」"
translation = "「──무우우우우우운!!!」"

[[dialogue]]
speaker = "unk"
original = "亡き父の幻影が振り下ろした一撃は、思わず見惚れてしまうほどの<ruby>裂帛<rt>れっぱく</rt></ruby>の一撃。"
translation = "죽은 아버지의 환영이 휘두른 일격은 자신도 모르게 넋을 잃고 볼 정도의 예리한 일격."

[[dialogue]]
speaker = "unk"
original = "──しかし。"
translation = "──하지만."

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「──遅いッ！！！」"
translation = "「──느려!!!」"

[[dialogue]]
speaker = "unk"
original = "アニュラスは一刀の剣でそれを弾き、黒騎士の体勢を崩した。"
translation = "아뉴라스는 칼 한 자루로 그것을 튕겨내 흑기사의 자세를 무너뜨렸다."

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「私は……１人じゃない！\u3000仲間の力で──今！\u3000貴方を超えるッ！！」"
translation = "「나는…… 혼자가 아니야! 동료들의 힘으로── 지금! 당신을 넘어서겠다!!」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「最後はみんなで──！！」"
translation = "「마지막은 다 같이──!!」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「うん──アニュラスちゃん！！」"
translation = "「응── 아뉴라스짱!!」"

[[dialogue]]
speaker_original = "３人"
speaker_translation = "3명"
original = "『ユニゾン！！！』"
translation = "『유니존!!!』"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「スプリーム────デターミネーションッ！！！」"
translation = "「슈프림──── 데터미네이션!!!」"

[[dialogue]]
speaker = "unk"
original = "アニュラス、メルエル、ネーゼマインのユニゾンアタックが、黒騎士に致命の一撃を与えた──"
translation = "아뉴라스, 멜엘, 네제마인의 유니존 어택이 흑기사에게 치명적인 일격을 가했다──"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "「グ…………ゥ、ァッ…………！！」"
translation = "「구………… 우, 앗…………!!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "「フ…………フ、フフ………………」"
translation = "「후………… 후, 후후………………」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "「見事、だ…………星、騎、士…………」"
translation = "「훌륭, 하다………… 성, 기, 사…………」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「……終わった、ね」"
translation = "「……끝났, 네」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「うん……これで、ようやく会長をベガに呼ぶことができるよ……」"
translation = "「응…… 이걸로 겨우 회장님을 베가로 부를 수 있게 됐어……」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「…………お父様、さようなら」"
translation = "「…………아버님, 안녕히 가세요」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「どうか──安らかに────」"
translation = "「부디── 평온하게────」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そうか。連絡ありがとう、メルエル」"
translation = "「……그래. 연락 고마워, 멜엘」"

[[dialogue]]
speaker = "unk"
original = "平行世界門から、最後の『星喰らい』を討滅した報せを受け取った。"
translation = "평행세계 문으로부터 마지막 『별 먹보』를 토멸했다는 소식을 받았다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……魔王、いよいよだな」"
translation = "「……마왕, 드디어군」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「今の勝利によって視える未来が変わった──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の位置が、特定できたよ」"
translation = "「지금의 승리로 인해 보이는 미래가 바뀌었어── 『<ruby>XELOS<rt>제로스</rt></ruby>』의 위치를 특정해냈어」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「最終決戦だね、会長？」"
translation = "「최종결전이네, 회장?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………ああ。待たせたな、極星学園のみんな」"
translation = "「…………아아. 기다리게 했군, 극성학원 모두들」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ええ。魔王、行きましょう」"
translation = "「……네. 마왕, 가요」"

[[dialogue]]
speaker = "unk"
original = "俺は右手を握り、開き──そこに宿る厄災の力を確認した。"
translation = "나는 오른손을 쥐었다 펴며── 그곳에 깃든 재액의 힘을 확인했다."

[[dialogue]]
speaker = "unk"
original = "……問題ない。"
translation = "……문제없어."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「行こう──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』のところに」"
translation = "「가자── 『<ruby>XELOS<rt>제로스</rt></ruby>』가 있는 곳으로」"

