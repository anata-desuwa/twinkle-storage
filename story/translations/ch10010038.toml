[[dialogue]]
speaker = "unk"
original = "この前お蔵入りになった広告写真の代わりに、より無難な写真を撮ることになった。"
translation = "지난번에 보류된 광고 사진 대신에, 좀 더 무난한 사진을 찍게 되었다."

[[dialogue]]
speaker = "フィオナ"
original = "「撮影の準備ができるまでもうしばらくかかるそうです。２人きりにしてもらえたのは……気を遣われたのでしょうか」"
translation = "「촬영 준비가 될 때까지 좀 더 시간이 걸린다고 합니다. 둘만 있게 해준 것은…… 배려해 준 것일까요」"

[[dialogue]]
speaker = "unk"
original = "純白のドレスに身を包み、ティアラを<ruby>戴<rt>いただ</rt></ruby>くフィオナはまさしくお姫様だ。"
translation = "순백의 드레스를 입고, 티아라를 쓴 피오나는 그야말로 공주님이다."

[[dialogue]]
speaker = "unk"
original = "そんなフィオナと２人きりで、情動が沸き起こらないはずがなく……"
translation = "그런 피오나와 단둘이 있는데, 정념이 솟아오르지 않을 리가 없고……"

[[dialogue]]
speaker = "フィオナ"
original = "「あなた……」"
translation = "「당신……」"

[[dialogue]]
speaker = "unk"
original = "フィオナの宝玉のような瞳が俺を見つめる。"
translation = "피오나의 보옥 같은 눈동자가 나를 바라본다."

[[dialogue]]
speaker = "unk"
original = "引き寄せられるように、自然と唇が触れ合って──"
translation = "이끌리듯이, 자연스레 입술이 맞닿고──"

[[dialogue]]
speaker = "フィオナ"
original = "「んちゅっ……ちゅっ、ちゅぅ……<emoji=heart04>」"
translation = "「응츄…… 츄, 츄우……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちゅぅ……ちゅるれろ……んふ、んれろ、れろ……じゅるる、ちゅるっ……ちゅるるんっ<emoji=heart04>」"
translation = "「츄우…… 츄르레로…… 응후, 응레로, 레로…… 쥬르르, 츄르…… 츄르르응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "啄むような口付けを繰り返した後、舌を絡め合い、唾液の音が混じる熱烈なキスに変わっていく。"
translation = "쪼아 먹는 듯한 입맞춤을 반복한 후, 혀를 얽히고 침 소리가 섞이는 열렬한 키스로 변해간다."

[[dialogue]]
speaker = "フィオナ"
original = "「ちゅぷぷっ、ちゅるっ……んふぅ、んちゅるちゅる……ぷぁ──<emoji=heart04>」"
translation = "「츄뿌뿌, 츄르…… 응후우, 응츄르츄르…… 푸아──<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「大きいの、お腹に当たってますよ」"
translation = "「큰 거, 배에 닿고 있어요」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナのドレス、セクシーだってずっと思ってた」"
translation = "「피오나의 드레스, 섹시하다고 계속 생각했어」"

[[dialogue]]
speaker = "フィオナ"
original = "「もう……開き直っちゃって」"
translation = "「정말…… 뻔뻔하게」"

[[dialogue]]
speaker = "unk"
original = "肩や胸元が露出しているのは言わずもがな。ドレスから覗く白い太ももや、丸いヒップのラインが上品な色香を漂わせる。"
translation = "어깨나 가슴팍이 노출되어 있는 것은 말할 것도 없다. 드레스 사이로 보이는 하얀 허벅지나, 둥근 엉덩이 라인이 고상한 색기를 풍긴다."

[[dialogue]]
speaker = "unk"
original = "そんなフィオナを前にして、タキシードの下でペニスが屹立していた。"
translation = "그런 피오나를 앞에 두고, 턱시도 아래에서 페니스가 우뚝 솟아 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「これじゃ撮影できませんから、今のうちに……ね？」"
translation = "「이래선 촬영할 수 없으니까, 지금 이 시간에…… 안 될까요?」"

[[dialogue]]
speaker = "unk"
original = "フィオナは慣れた手つきで俺の衣装を脱がし、導くように横たえて……"
translation = "피오나는 익숙한 손길로 나의 의상을 벗기고, 이끌듯이 눕히고……"

[[dialogue]]
speaker = "フィオナ"
original = "「もう、仕方ありませんね」"
translation = "「정말, 어쩔 수 없네요」"

[[dialogue]]
speaker = "unk"
original = "両手を握り、ヴェールを身に着けたまま俺に跨るフィオナ。"
translation = "양손을 잡고, 베일을 쓴 채 나에게 올라타는 피오나."

[[dialogue]]
speaker = "unk"
original = "言葉とは裏腹に嬉しそうな、期待と興奮を帯びた表情が、俺の情欲を刺激する。"
translation = "말과는 달리 기쁜 듯한, 기대와 흥분을 띤 표정이, 나의 정욕을 자극한다."

[[dialogue]]
speaker = "クロト"
original = "「エッチな花嫁だ」"
translation = "「야한 신부네」"

[[dialogue]]
speaker = "フィオナ"
original = "「だって花婿さんがエッチですから。あなたのせいでこうなっちゃったんです<emoji=heart04>」"
translation = "「왜냐하면 신랑님이 야하니까요. 당신 때문에 이렇게 돼버린 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フィオナの裸体が式場の白い光を浴びて、まるで芸術品のよう。"
translation = "피오나의 나체가 식장의 하얀 빛을 받아, 마치 예술품 같다."

[[dialogue]]
speaker = "unk"
original = "身じろぎすると胸がぷるんと揺れて、男の本能がいきり立つのを感じた。"
translation = "움직일 때마다 가슴이 출렁하고 흔들려, 남자의 본능이 솟아오르는 것을 느꼈다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ……あなたのおち○ちん、とっても大きくなってます。今までで一番かもしれません」"
translation = "「후후…… 당신의 자지, 굉장히 커졌어요. 지금까지 중 최고일지도 몰라요」"

[[dialogue]]
speaker = "unk"
original = "結婚式場──カップルが愛を誓う場所で、フィオナと繋がることに興奮を感じずにはいられない。"
translation = "결혼식장──커플이 사랑을 맹세하는 장소에서, 피오나와 연결되는 것에 흥분을 느끼지 않을 수 없다."

[[dialogue]]
speaker = "フィオナ"
original = "「じゃあ……おち○ちん、入れちゃいますね」"
translation = "「그럼…… 자지, 넣어버릴게요」"

[[dialogue]]
speaker = "unk"
original = "フィオナが自分から体を持ち上げ、屹立するペニスの真上に腰を持ってくる。"
translation = "피오나가 스스로 몸을 들어 올려, 우뚝 솟은 페니스 바로 위에 허리를 가져온다."

[[dialogue]]
speaker = "unk"
original = "そしてぐっと腰を下ろして──"
translation = "그리고 꾹 허리를 내리고──"

[[dialogue]]
speaker = "フィオナ"
original = "「ふああぁっ……<emoji=heart04>\u3000あなたのおち○ちん、大きいっ……<emoji=heart04>」"
translation = "「후아아앗……<emoji=heart04> 당신의 자지, 커엇……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスのおかげか、何度も交わってきたからか、フィオナの膣は容易くペニスを受け入れ、奥まで飲み込んだ。"
translation = "키스 덕분인지, 몇 번이고 관계를 맺어왔기 때문인지, 피오나의 질은 쉽게 페니스를 받아들여, 안쪽까지 삼켰다."

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁ……お腹の中、あなたでいっぱいになってます……<emoji=heart04>\u3000あなたと繋がってるの、幸せです……<emoji=heart04>」"
translation = "「하아아…… 배 속, 당신으로 가득 찼어요……<emoji=heart04> 당신과 연결되어 있는 거, 행복해요……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「おち○ちん、熱くて、硬くて……こうしてると、私の中にあなたがいてくれるのを感じるんです<emoji=heart04>」"
translation = "「자지, 뜨겁고, 단단해서…… 이렇게 있으면, 제 안에 당신이 있어주는 걸 느껴요<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ん、はぁ……おち○ちん、私にぴったりで……ふぅ<emoji=heart04>\u3000あなたのおち○ちん、おま○こで覚えちゃいました……<emoji=heart04>」"
translation = "「응, 하아…… 자지, 저에게 딱 맞아서…… 후우<emoji=heart04> 당신의 자지, 보지로 외워버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスをお腹に収めたまま、その感触を味わうフィオナ。"
translation = "페니스를 배에 담은 채, 그 감촉을 맛보는 피오나."

[[dialogue]]
speaker = "unk"
original = "蜜で濡れた膣壁がペニスに密着し、俺もフィオナとの繋がりを強く感じていた。"
translation = "꿀로 젖은 질벽이 페니스에 밀착하고, 나도 피오나와의 연결을 강하게 느끼고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ、はぁ……じゃあ、一緒に気持ち良くなりましょうね<emoji=heart04>」"
translation = "「하아, 하아…… 그럼, 같이 기분 좋아지자고요<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んっ……はぁ、はぁ……はあぁっ<emoji=heart04>\u3000いつもあなたがしてくれるから……はあぁ……今日は私が、動きますね……<emoji=heart04>」"
translation = "「응…… 하아, 하아…… 하아앗<emoji=heart04> 항상 당신이 해주니까…… 하아아…… 오늘은 제가, 움직일게요……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふあぁっ<emoji=heart04>\u3000はぁっ……あっ……あんっ<emoji=heart04>\u3000おち○ちん、中で擦れて……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000気持ちいい、ですかっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 하앗…… 앗…… 앙<emoji=heart04> 자지, 안에서 비벼져서……<emoji=heart04> 응응<emoji=heart04> 기분 좋아요, 인가요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、すごくいいよ」"
translation = "「아아, 엄청 좋아」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、嬉しいですっ<emoji=heart04>\u3000私の中で感じて……はあぁっ……もっと、もっと、気持ち良くなってくださいね<emoji=heart04>」"
translation = "「후후, 기뻐요<emoji=heart04> 제 안에서 느껴서…… 하아앗…… 더, 더, 기분 좋아져 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めての時はあんなに<ruby>初心<rt>うぶ</rt></ruby>だったフィオナが、自分から積極的に腰を振って、俺を快楽に導こうとしている。"
translation = "처음에는 그렇게 순진했던 피오나가, 스스로 적극적으로 허리를 흔들며, 나를 쾌락으로 이끌려고 하고 있다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふっ……んんっ……こうして腰を動かすと、おち○ちんが、出たり入ったりして……んっ……ひああぁ……<emoji=heart04>」"
translation = "「훗…… 응응…… 이렇게 허리를 움직이면, 자지가, 나왔다 들어갔다 해서…… 응…… 히아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁっ……ぁっ……あっ、あぁんっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あなたのが、中で大きくなってますっ<emoji=heart04>」"
translation = "「하아앗…… 앗…… 앗, 아앙<emoji=heart04> 응응<emoji=heart04> 당신 것이, 안에서 커지고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んんっ<emoji=heart04>\u3000そうです……私を、感じて……はっ、はぁっ……<emoji=heart04>\u3000あなた……あなたぁ……<emoji=heart04>\u3000んっ……はっ……ふああぁっ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 맞아요…… 저를, 느껴줘요…… 핫, 하앗……<emoji=heart04> 당신…… 당신아……<emoji=heart04> 응…… 핫…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体を上下させながらフィオナがより強く手を握り、俺も愛おしい気持ちが溢れてくる。"
translation = "몸을 상하로 움직이면서 피오나가 더욱 강하게 손을 잡고, 나도 사랑스러운 감정이 넘쳐흐른다."

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁ……あっ……んっ<emoji=heart04>\u3000私も、あなたを感じてます、から……<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000お腹の中で、ビクってして……<emoji=heart04>」"
translation = "「하아아…… 앗…… 응<emoji=heart04> 저도, 당신을 느끼고 있으니까……<emoji=heart04> 아앗<emoji=heart04> 배 속에서, 움찔하고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ふるふると揺れるおっぱいに吸い寄せられて、桃色の先端に舌を伸ばした。"
translation = "부르르 흔들리는 가슴에 이끌려, 복숭앗빛 끝에 혀를 뻗었다."

[[dialogue]]
speaker = "フィオナ"
original = "「ひあぁんっ<emoji=heart04>\u3000んん……おっぱい、ペロペロされてます……<emoji=heart04>\u3000んっ、乳首、舐められるの、気持ちいいっ……<emoji=heart04>」"
translation = "「히아앙<emoji=heart04> 응응…… 가슴, 낼름낼름 당하고 있어요……<emoji=heart04> 응, 젖꼭지, 핥아지는 거, 기분 좋아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "つんと硬くなった乳首を唇で含んで吸う。"
translation = "톡 튀어나와 단단해진 젖꼭지를 입술로 머금고 빨았다."

[[dialogue]]
speaker = "フィオナ"
original = "「ん～～っ<emoji=heart04>\u3000はぁ……ふふ、おっぱいちゅっちゅして、赤ちゃんみたい……<emoji=heart04>」"
translation = "「음~~<emoji=heart04> 하아…… 후후, 가슴 쮸쮸해서, 아기 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁ<emoji=heart04>\u3000んん……ふぅ……<emoji=heart04>\u3000おっぱい、たくさん吸ってください……<emoji=heart04>\u3000私の体は全部、あなたのものなんですから……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 응응…… 후우……<emoji=heart04> 가슴, 많이 빨아주세요……<emoji=heart04> 제 몸은 전부, 당신 것이니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "母が我が子にするように、慈愛のこもった表情で乳を吸わせるフィオナ。"
translation = "어머니가 자식에게 하듯이, 자애가 담긴 표정으로 젖을 빨게 하는 피오나."

[[dialogue]]
speaker = "unk"
original = "だけど膣壁は震えながらペニスをきゅっと締め付け、その快感を物語っていた。"
translation = "하지만 질벽은 떨면서 페니스를 꽉 조여, 그 쾌감을 이야기하고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「はっ……んんっ……<emoji=heart04>\u3000ちゅーちゅーって、おっぱい吸われると、お腹の奥、キュンキュンして……はぁっ、ああぁっ<emoji=heart04>」"
translation = "「핫…… 응응……<emoji=heart04> 쮸ー쮸ー하고, 가슴 빨리면, 배 속 깊은 곳, 큥큥하고…… 하앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「でもおっぱいだけじゃなくて、こっちも……<emoji=heart04>」"
translation = "「하지만 가슴뿐만 아니라, 이쪽도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "物欲しそうに潤む瞳がぐっと近づいてきて、唇と唇が触れ合った。"
translation = "무언가를 원하는 듯 촉촉해진 눈동자가 꾹 다가와, 입술과 입술이 맞닿았다."

[[dialogue]]
speaker = "フィオナ"
original = "「んっ……ちゅっ、ちゅっ……じゅるっ、ちゅるるっ……ちゅるれるっ、ちゅぱっ、ちゅるぅっ<emoji=heart04>」"
translation = "「응…… 츄, 츄…… 쥬르, 츄르르…… 츄르레르, 츄팟, 츄르읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「じゅぷるっ……れりゅれりゅ、ちゅるるっ<emoji=heart04>\u3000あなた、あなたぁ……<emoji=heart04>\u3000んふ、んんっ、じゅるんっ……ちゅるれりゅれりゅ<emoji=heart04>」"
translation = "「쥬뿌르…… 례류례류, 츄르르<emoji=heart04> 당신, 당신아……<emoji=heart04> 응후, 응응, 쥬르응…… 츄르레류레류<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスの合間に愛情たっぷりの声で呼ばれ、体の芯が燃えるように熱くなる。"
translation = "키스 중간에 애정이 가득 담긴 목소리로 불려, 몸의 중심이 타오르듯이 뜨거워진다."

[[dialogue]]
speaker = "フィオナ"
original = "「あなた……んちゅっ、ちゅりゅっ、れりゅっ<emoji=heart04>\u3000んふぅ、ふっ、んんっ<emoji=heart04>\u3000れるれる、じゅぷぅっ、じゅぷるるっ<emoji=heart04>」"
translation = "「당신…… 응츄, 츄류, 례류<emoji=heart04> 응후우, 훗, 응응<emoji=heart04> 레르레르, 쥬푸읏, 쥬뿌르르<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んじゅぷるっ、んっ、じゅぷっ、じゅるんっ<emoji=heart04>\u3000んふぁ、ふっ……じゅぷっ……もっと、もっと……あなたと繋がりたいですぅ……<emoji=heart04>」"
translation = "「응쥬뿌르, 응, 쥬프, 쥬르응<emoji=heart04> 응화, 훗…… 쥬프…… 더, 더…… 당신과 연결되고 싶어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いを求める気持ちは激しさを増していって──"
translation = "서로를 원하는 마음은 격렬함을 더해가고──"

[[dialogue]]
speaker = "フィオナ"
original = "「ふあああっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああ～～～～っ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아~~~~<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁっ──はっ──ああぁっ<emoji=heart04>\u3000お腹、熱いぃっ<emoji=heart04>\u3000気持ちいいですぅっ<emoji=heart04>\u3000ふやぁっ<emoji=heart04>\u3000はぁっ、はぁっ、あんんっ<emoji=heart04>」"
translation = "「하아앗── 핫── 아아앗<emoji=heart04> 배, 뜨거워어<emoji=heart04> 기분 좋아요오<emoji=heart04> 후야앗<emoji=heart04> 하앗, 하앗, 아응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "式場で淫らに腰を振る花嫁。"
translation = "식장에서 음란하게 허리를 흔드는 신부."

[[dialogue]]
speaker = "unk"
original = "ヴェールをなびかせながら、ペニスを根元まで飲み込み、深く繋がり合う。"
translation = "베일을 휘날리며, 페니스를 뿌리까지 삼키고, 깊게 연결되어 얽힌다."

[[dialogue]]
speaker = "フィオナ"
original = "「おち○ちん太くて、お腹の中、削られてるみたいぃ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「자지 굵어서, 배 속, 깎이는 것 같아아……<emoji=heart04> 앗<emoji=heart04> 아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナ、ちょっといいか？」"
translation = "「피오나, 잠깐 괜찮을까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「──え？\u3000おち○ぽって、言ってほしいんですか？\u3000んもう、好きですね……<emoji=heart04>\u3000んんはぁ<emoji=heart04>\u3000おち○ちんより恥ずかしいですけど……いいですよ<emoji=heart04>」"
translation = "「──엣? 자지라고, 말해줬으면 좋겠나요? 어휴, 좋아하시네요……<emoji=heart04> 응응하아<emoji=heart04> 자지보다 부끄럽지만…… 괜찮아요<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「おち○ぽいい<emoji=heart04>\u3000おち○ぽいいですっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000はぁはっ<emoji=heart04>\u3000あ──あ──んん～～っ<emoji=heart04>」"
translation = "「자지 좋아<emoji=heart04> 자지 좋아요<emoji=heart04> 기분 좋아앗<emoji=heart04> 하아핫<emoji=heart04> 아── 아── 응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「大きなおち○ぽで<emoji=heart04>\u3000おま○こぐちゅぐちゅされてっ<emoji=heart04>\u3000ふあっ<emoji=heart04>\u3000おち○ぽ好きっ<emoji=heart04>\u3000体が、蕩けちゃいそうですぅっ<emoji=heart04>」"
translation = "「커다란 자지로<emoji=heart04> 보지 꾸륵꾸륵 당해서<emoji=heart04> 후앗<emoji=heart04> 자지 좋아앗<emoji=heart04> 몸이, 녹아버릴 것 같아요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の興奮を煽るように甘えた声で喘ぐフィオナ。"
translation = "나의 흥분을 부추기듯이 응석 부리는 목소리로 신음하는 피오나."

[[dialogue]]
speaker = "unk"
original = "フィオナも恍惚とした笑みを浮かべ、淫らな自分を楽しんでいるようだった。"
translation = "피오나도 황홀한 미소를 띠며, 음란한 자신을 즐기고 있는 듯했다."

[[dialogue]]
speaker = "クロト"
original = "「フィオナはやっぱりエッチなお嫁さんだな」"
translation = "「피오나는 역시 야한 신부네」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、エッチな花嫁なんです<emoji=heart04>\u3000あなたのおち○ぽの気持ち良さ、おま○こが覚えちゃってますからっ<emoji=heart04>」"
translation = "「네, 야한 신부예요<emoji=heart04> 당신의 자지의 기분 좋음, 보지가 외워버렸으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふぁあっ、あっ<emoji=heart04>\u3000いっぱいエッチしてっ<emoji=heart04>\u3000私のおま○こ、あなたのおち○ぽの形になってますからぁっ<emoji=heart04>」"
translation = "「화앗, 앗<emoji=heart04> 잔뜩 야하게 해줘요<emoji=heart04> 저의 보지, 당신의 자지 모양이 되어 있으니까아<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「あなた専用の<emoji=heart04>\u3000お嫁さんおま○こで<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000たくさん<emoji=heart04>\u3000たくさん<emoji=heart04>\u3000射精してくださいっ<emoji=heart04>」"
translation = "「당신 전용의<emoji=heart04> 신부 보지로<emoji=heart04> 후아아앗<emoji=heart04> 잔뜩<emoji=heart04> 잔뜩<emoji=heart04> 사정해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひあっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000腰動かすの、止まら、ないっ<emoji=heart04>\u3000はっ──はっ──んんぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히앗<emoji=heart04> 아앗<emoji=heart04> 허리 움직이는 거, 멈추지, 않아앗<emoji=heart04> 핫── 핫── 응응우~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "白い光に包まれながら２人で愛を貪る。"
translation = "하얀 빛에 감싸이면서 둘이서 사랑을 탐한다."

[[dialogue]]
speaker = "unk"
original = "ぐちゅぐちゅと淫らな音を響かせながら、深く、激しく、交わり絡み合う。"
translation = "꾸륵꾸륵 음란한 소리를 울리면서, 깊게, 격렬하게, 섞이고 얽힌다."

[[dialogue]]
speaker = "フィオナ"
original = "「あなた……あなたぁ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きですっ<emoji=heart04>\u3000大好きですっ<emoji=heart04>」"
translation = "「당신…… 당신아……<emoji=heart04> 하아앗<emoji=heart04> 핫<emoji=heart04> 핫<emoji=heart04> 좋아<emoji=heart04> 좋아요<emoji=heart04> 정말 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も好きだ、エリシア……！」"
translation = "「나도 좋아해, 엘리시아……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「！？\u3000私はフィオナで……」"
translation = "「!? 저는 피오나인데……」"

[[dialogue]]
speaker = "unk"
original = "愛おしい気持ちが溢れた瞬間、その名を口に出していた。"
translation = "사랑스러운 감정이 넘쳐흐른 순간, 그 이름을 입 밖에 내고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女は世界を守るため、エリシアの名を捨て、フィオナとなった。"
translation = "그녀는 세계를 지키기 위해, 엘리시아의 이름을 버리고, 피오나가 되었다."

[[dialogue]]
speaker = "unk"
original = "彼女の覚悟は理解している。それでも今は呼ばずにはいられなかった。"
translation = "그녀의 각오는 이해하고 있다. 그럼에도 지금은 부르지 않을 수 없었다."

[[dialogue]]
speaker = "フィオナ"
original = "「ま、待ってください……その名前はもう……」"
translation = "「마, 기다려 주세요…… 그 이름은 이제……」"

[[dialogue]]
speaker = "クロト"
original = "「知ってる。だけど俺だけでも本当の名前で呼びたい。俺は君の花婿なんだから」"
translation = "「알고 있어. 하지만 나만이라도 진짜 이름으로 부르고 싶어. 나는 너의 신랑이니까」"

[[dialogue]]
speaker = "フィオナ"
original = "「──！！」"
translation = "「──!!」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、俺の手を握る力がぎゅっと強くなって──"
translation = "그 순간, 나의 손을 잡는 힘이 꽉 강해지고──"

[[dialogue]]
speaker = "フィオナ"
original = "「はい……！\u3000はい……！\u3000呼んでください、私の名前を！」"
translation = "「네……! 네……! 불러주세요, 저의 이름을!」"

[[dialogue]]
speaker = "クロト"
original = "「愛してる、エリシア！！」"
translation = "「사랑해, 엘리시아!!」"

[[dialogue]]
speaker = "エリシア"
original = "「はい！\u3000エリシアです！\u3000あなたの花嫁──あなたのエリシアですっ！」"
translation = "「네! 엘리시아예요! 당신의 신부── 당신의 엘리시아예요!」"

[[dialogue]]
speaker = "エリシア"
original = "「ひああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000エリシアは、あなたを愛しています<emoji=heart04>\u3000あなたの赤ちゃん欲しいですっ<emoji=heart04>\u3000家族になりたいですっ<emoji=heart04>」"
translation = "「히아앗<emoji=heart04> 앗<emoji=heart04> 엘리시아는, 당신을 사랑하고 있어요<emoji=heart04> 당신의 아기 갖고 싶어요<emoji=heart04> 가족이 되고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「１人っ子じゃきっと寂しいですから、兄弟姉妹ができるように、２人……ううん、もっと、産んであげたいんですっ<emoji=heart04>」"
translation = "「외동이면 분명 외로울 테니까, 형제자매가 생기도록, 두 명…… 아니, 더, 낳아주고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、たくさん家族を作ろう！」"
translation = "「아아, 잔뜩 가족을 만들자!」"

[[dialogue]]
speaker = "エリシア"
original = "「はいっ<emoji=heart04>\u3000作りましょうっ<emoji=heart04>\u3000あなたと私の、家族<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「네<emoji=heart04> 만들어요<emoji=heart04> 당신과 저의, 가족<emoji=heart04> 하아앗<emoji=heart04> 아앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「お嫁さんおま○こに射精してっ<emoji=heart04>\u3000私に赤ちゃんくださいっ<emoji=heart04>\u3000孕ませてくださいっ<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000はぁっ──はっ──ああぁんっ<emoji=heart04>」"
translation = "「신부 보지에 사정해 줘요<emoji=heart04> 저에게 아기 주세요<emoji=heart04> 임신시켜 주세요<emoji=heart04> 앗<emoji=heart04> 하앗── 핫── 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「んぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あなたのおち○ぽ、爆発しそうにドクドク跳ねてるっ<emoji=heart04>\u3000もう、出るんですねっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아앗<emoji=heart04> 앙<emoji=heart04> 당신의 자지, 폭발할 것처럼 두근두근 뛰고 있어요<emoji=heart04> 이제, 나오는군요<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「ひぃああっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000おち○ぽ、奥に<emoji=heart04>\u3000子宮に当たってますっ<emoji=heart04>\u3000お腹の奥、熱くてっ、キュンキュンしますっ<emoji=heart04>」"
translation = "「히이아앗<emoji=heart04> 아아앙<emoji=heart04> 자지, 안쪽에<emoji=heart04> 자궁에 닿고 있어요<emoji=heart04> 배 속 깊은 곳, 뜨거워서, 큥큥해요<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「んんんっ<emoji=heart04>\u3000奥に届くの、すごいぃっ<emoji=heart04>\u3000ふああっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あなたのおち○ぽで<emoji=heart04>\u3000お嫁さんおま○こイキますっ<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 안쪽에 닿는 거, 굉장해애<emoji=heart04> 후아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 당신의 자지로<emoji=heart04> 신부 보지 가요<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「あ──あ──あ──んんああぁ～～っ<emoji=heart04><emoji=heart04>\u3000出してっ<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000あなたのせーえき、わたしの中に、たくさん出してぇっ<emoji=heart04><emoji=heart04>」"
translation = "「아── 아── 아── 응응아아~~<emoji=heart04><emoji=heart04> 내줘요<emoji=heart04> 내줘요<emoji=heart04> 당신의 정액, 제 안에, 잔뜩 내줘요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「あなたの赤ちゃん、産みますからぁっ<emoji=heart04><emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000お嫁さんおま○こイク<emoji=heart04>\u3000イク<emoji=heart04>\u3000イッちゃいますーーーっ<emoji=heart04><emoji=heart04>」"
translation = "「당신의 아기, 낳을 테니까아<emoji=heart04><emoji=heart04> 화앗<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 신부 보지 가<emoji=heart04> 가<emoji=heart04> 가버려요오~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「ふああぁっ──あ──ひやあああああああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아앗── 아── 히야아아아아아아~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「ああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000出てるっ<emoji=heart04>\u3000びゅるびゅるーって<emoji=heart04>\u3000中に、出てるぅっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000んん～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아앗<emoji=heart04> 앗<emoji=heart04> 나오고 있어<emoji=heart04> 뷰르뷰르ー하고<emoji=heart04> 안에, 나오고 있어어<emoji=heart04> 하아아앗<emoji=heart04> 응응~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "互いに絶頂に達した瞬間、強く強く手を握り合った。"
translation = "서로 절정에 달한 순간, 강하게 강하게 손을 맞잡았다."

[[dialogue]]
speaker = "unk"
original = "繋いだ手から伝わる想いを感じながら、エリシアの奥に精をたっぷりと注ぎ込む。"
translation = "맞잡은 손에서 전해지는 마음을 느끼면서, 엘리시아의 안쪽에 정액을 듬뿍 쏟아 넣는다."

[[dialogue]]
speaker = "エリシア"
original = "「あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000おま○この中で、おち○ぽ、ドクドク跳ねて……ふぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응응<emoji=heart04> 보지 안에서, 자지, 두근두근 뛰고…… 화앗<emoji=heart04> 굉장해<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「あ、あついぃっ<emoji=heart04>\u3000あなたの熱い精液、染み込んできて……あ、やけどしちゃいそうですっ<emoji=heart04>」"
translation = "「아, 뜨거워어<emoji=heart04> 당신의 뜨거운 정액, 스며들어 와서…… 아, 데어버릴 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「んっはあぁ……<emoji=heart04>\u3000私の子宮が、あなたの精液、飲んでるぅ……<emoji=heart04>\u3000は……あ……ん～～～っ……<emoji=heart04><emoji=heart04>」"
translation = "「응하아아……<emoji=heart04> 저의 자궁이, 당신의 정액, 마시고 있어어……<emoji=heart04> 하…… 아…… 응~~~……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「はあぁ……はぁ……<emoji=heart04>\u3000ふふ、お腹の中、あなたので満たされてます……<emoji=heart04>\u3000たくさん出されたから溢れちゃってますね<emoji=heart04>」"
translation = "「하아아…… 하아……<emoji=heart04> 후후, 배 속, 당신 것으로 채워졌어요……<emoji=heart04> 잔뜩 나와서 넘쳐흐르고 있네요<emoji=heart04>」"

[[dialogue]]
speaker = "エリシア"
original = "「えへへ……実はスタッフさんにお願いして、２人きりにしてもらったんです。でもそろそろ服を整えないといけませんね」"
translation = "「에헤헤…… 실은 스태프분에게 부탁해서, 둘만 있게 해달라고 했어요. 하지만 슬슬 옷을 정리해야겠네요」"

[[dialogue]]
speaker = "unk"
original = "ぎゅっと手を握りながら、エリシアが愛おしそうに微笑む。"
translation = "꽉 손을 잡으면서, 엘리시아가 사랑스럽게 미소 짓는다."

[[dialogue]]
speaker = "unk"
original = "この笑顔が何よりも大事だと、心の奥底から実感した。"
translation = "이 미소가 무엇보다 소중하다고, 마음속 깊은 곳에서 실감했다."

[[dialogue]]
speaker = "エリシア"
original = "「私とあなたは魔王ですから、次のリクリエに備えて血を残さなければなりません。先代魔王ラクシスと、その伴侶フェリシアのように」"
translation = "「저와 당신은 마왕이니까, 다음 리크리에에 대비해서 피를 남겨야 합니다. 선대 마왕 라크시스와, 그 반려 페리시아처럼」"

[[dialogue]]
speaker = "エリシア"
original = "「でもそれだけじゃなくて……あなたと幸せな家族を作りたいです」"
translation = "「하지만 그것뿐만이 아니라…… 당신과 행복한 가족을 만들고 싶어요」"

[[dialogue]]
speaker = "クロト"
original = "「俺もだよ。幸せになろう、エリシア」"
translation = "「나도야. 행복해지자, 엘리시아」"

[[dialogue]]
speaker = "エリシア"
original = "「ふふふ。今の言葉、絶対に忘れませんよ。約束ですから♪」"
translation = "「후후후. 지금의 말, 절대로 잊지 않을 거예요. 약속이니까요♪」"

[[dialogue]]
speaker = "エリシア"
original = "「子どもができてお腹が大きくなった私も……いっぱい愛してくださいね♪」"
translation = "「아이가 생겨서 배가 커진 저도…… 잔뜩 사랑해 주세요♪」"

