[[dialogue]]
speaker = "unk"
original = "トワに迷惑をかけていることを申し訳なく思ったイクシリオンは、これまで隠していたことを打ち明け始めた。"
translation = "토와에게 폐를 끼치고 있는 것을 미안하게 생각한 익실리온은 지금까지 숨겨왔던 것을 털어놓기 시작했다."

[[dialogue]]
speaker = "イクシリオン"
original = "「――私、妄想癖は小さい頃からあったんです。でも、天界にいた頃は、それが良い方向に働いていたと思います」"
translation = "「――제 망상벽은 어릴 때부터 있었어요. 하지만 천계에 있을 때는 그것이 좋은 방향으로 작용했다고 생각합니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「理想の星騎士として、自分のなりたい姿を毎日思い描くことで、それが一種のイメージトレーニングになっていたんです」"
translation = "「이상의 성기사로서 자신이 되고 싶은 모습을 매일 상상함으로써 그것이 일종의 이미지 트레이닝이 되었거든요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そのおかげで、人間界に来るまでに鍛錬を重ね、附属校に入学してすぐ、プリマステラの資格を得ることができました」"
translation = "「그 덕분에 인간계에 오기 전까지 단련을 거듭해 부속교에 입학하자마자 프리마스텔라 자격을 얻을 수 있었습니다.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ですが……人間界に来て私は、『漫画』という文化に出会ってしまったんです……！」"
translation = "「하지만…… 인간계에 와서 저는 『만화』라는 문화를 만나고 말았습니다……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それは、書店で何気なく手に取った、試し読みの少女漫画でした。その内容が――」"
translation = "「그것은 서점에서 아무 생각 없이 집어 든 미리보기용 순정 만화였습니다. 그 내용이――」"

[[dialogue]]
speaker = "イクシリオン"
original = "「その……想像していた以上に、男女の関係が情熱的に描かれていたんです……<emoji=heart04>」"
translation = "「그…… 상상했던 것 이상으로 남녀 관계가 정열적으로 그려져 있었어요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それはもう、これまでの人生で味わったことのない衝撃でした。まさに『晴天の霹靂』という人間界のことわざの通り……！」"
translation = "「그건 정말 지금까지의 인생에서 맛본 적 없는 충격이었습니다. 그야말로 『청천벽력』이라는 인간계의 속담 그대로……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ～、なるほど……それで」"
translation = "「아~ 그렇구나…… 그래서.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい……それ以来、私は好奇心が抑えられなくなってしまって……」"
translation = "「네…… 그 이후로 저는 호기심을 억제할 수 없게 되어서……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そういう描写の多い漫画を探しては、隠れて読み漁り、エッチな妄想をするようになってしまったんです……！」"
translation = "「그런 묘사가 많은 만화를 찾아 숨어서 탐독하며 야한 망상을 하게 되어 버렸습니다……!」"

[[dialogue]]
speaker = "トワ先生"
original = "（……ああ、わかる。私も同じくらいの頃、親にも友達にも言えずにこっそり読んでたなぁ……言えないけど）"
translation = "(……아아, 이해해. 나도 그맘때쯤 부모님한테도 친구한테도 말 못 하고 몰래 읽었었지…… 말은 못 하지만)"

[[dialogue]]
speaker = "イクシリオン"
original = "「それで、会長が転入してきて、御前試合で戦う勇姿を見てからは……その……会長に対しても、エッチな妄想をするようになってしまって……！」"
translation = "「그러다 회장님이 전학 오고 어전 시합에서 싸우는 용맹한 모습을 본 뒤로는…… 그…… 회장님에 대해서도 야한 망상을 하게 되어 버려서……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ですが最近……それもスランプになってしまっているみたいなんです……」"
translation = "「하지만 최근…… 그것도 슬럼프에 빠져버린 것 같아요……」"

[[dialogue]]
speaker = "トワ先生"
original = "「スランプ？」"
translation = "「슬럼프?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい。最近は、会長の妄想をしても……なぜか手が触れただけでドキドキしてしまうような――」"
translation = "「네. 최근에는 회장님 망상을 해도…… 왜인지 손이 닿기만 해도 두근거려 버리는 그런――」"

[[dialogue]]
speaker = "イクシリオン"
original = "「全然エッチじゃない、<b>プラトニック</b>な妄想ばかりするようになってしまったんです……！」"
translation = "「전혀 야하지 않은 <b>플라토닉</b>한 망상만 하게 되어 버렸습니다……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長が私に好きだと言ってくれたり、ただ手を繋いで恋人同士になるような妄想ばかりで……逆に申し訳なくなってしまって……！」"
translation = "「회장님이 저를 좋아한다고 말해주거나 그저 손을 잡고 연인이 되는 그런 망상뿐이라서…… 반대로 죄송한 마음이 들어버려서……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「殿方なら、若い女性とエッチなことをするのは喜んでもらえるだろうとは思っているのですが――」"
translation = "「남성분이라면 젊은 여성과 야한 짓을 하는 걸 기뻐해 주실 거라 생각하고는 있습니다만――」"

[[dialogue]]
speaker = "イクシリオン"
original = "「しかし、勝手に恋人にしてしまうのは、さすがにいけないことなんじゃないかと……！」"
translation = "「하지만 마음대로 연인으로 삼아버리는 건 역시 안 될 일이 아닐까 싶어서……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「いやいや！\u3000なんか色々ズレてる気がするよ！？\u3000偏見も混じってるし！」"
translation = "「아니 아니! 뭔가 여러 가지로 어긋나 있는 느낌인데!? 편견도 섞여 있고!」"

[[dialogue]]
speaker = "トワ先生"
original = "「というかイクシリオンちゃん、会長くんのこと、好きなんだよね？\u3000だったら別におかしくないと思うけど……」"
translation = "「그보다 익실리온 양, 회장군을 좋아하는 거지? 그렇다면 별로 이상할 거 없다고 생각하는데……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「えっ？\u3000いえ、好きだなんてそんなおこがましいこと、思っていません！\u3000チョコは、感謝を込めた<b>義理</b>チョコです！」"
translation = "「엣? 아뇨, 좋아한다니 그런 황송한 생각은 하지 않습니다! 초콜릿은 감사를 담은 <b>의리</b> 초콜릿이에요!」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっ！？\u3000もしかして、イクシリオンちゃん……会長くんのことが好きって自覚、ないの？」"
translation = "「엣!? 설마 익실리온 양…… 회장군을 좋아한다는 자각, 없어?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「えぇっ！？\u3000わ、私……会長のことが好きだったんですか！？」"
translation = "「에엣!? 저, 제가…… 회장님을 좋아했던 건가요!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「本当に今気づいたの！？」"
translation = "「정말 이제야 안 거야!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ま、待ってください……じゃあ、最近エッチな妄想ができなくなったのは……」"
translation = "「기, 기다려 주세요…… 그럼 최근 야한 망상을 못 하게 된 건……」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっと……多分、恋のドキドキが勝っちゃった感じなんじゃないかな……？」"
translation = "「그게…… 아마 사랑의 두근거림이 이겨버린 느낌 아닐까……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ああああああっ！？！？\u3000そ、そんな……恥ずかしい～～っ！！」"
translation = "「아아아아앗!? 그, 그런…… 부끄러워요~~!!」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん……今まで自覚がなかったのが、むしろすごいビックリだよ……」"
translation = "「응…… 지금까지 자각이 없었다는 게 오히려 엄청 놀라워……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「うぅ……バレンタインフォームが解除できないのも、このスランプが関係してるのかもしれないと思っていたのですが……」"
translation = "「으으…… 발렌타인 폼을 해제할 수 없는 것도 이 슬럼프가 관계있을지도 모른다고 생각했습니다만……」"

[[dialogue]]
speaker = "トワ先生"
original = "「一応、無関係とは言えないかもしれないね。会長くんのことを思う気持ちが強すぎて、フォームの力まで暴走しちゃってるのかも……」"
translation = "「일단 무관하다고는 할 수 없겠네. 회장군을 생각하는 마음이 너무 강해서 폼의 힘까지 폭주해 버린 걸지도……」"

[[dialogue]]
speaker = "unk"
original = "ショックを受けたように、イクシリオンはさらに肩を落とす。"
translation = "충격을 받은 듯 익실리온은 더욱 어깨를 늘어뜨린다."

[[dialogue]]
speaker = "イクシリオン"
original = "「……だとしたら、これって直せるんでしょうか？」"
translation = "「……그렇다면 이건 고칠 수 있는 걸까요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私、妄想癖を直そうと、本やネットで何度も調べて対策しようとしてきました……」"
translation = "「저, 망상벽을 고치려고 책이나 인터넷으로 몇 번이나 찾아보고 대처하려고 노력해 왔습니다……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「でも、どうしてもダメで……今回ついに、周りまで巻き込むような事態まで引き起こしてしまって……」"
translation = "「하지만 아무리 해도 안 돼서…… 이번에 결국 주변까지 휘말리게 하는 사태까지 일으키고 말아서……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「この悪い癖は、どうすれば直せるんでしょうか……？」"
translation = "「이 나쁜 버릇은 어떻게 하면 고칠 수 있을까요……?」"

[[dialogue]]
speaker = "unk"
original = "トワはそんなイクシリオンに歩み寄り、そっと肩に手を置く。"
translation = "토와는 그런 익실리온에게 다가가 살며시 어깨에 손을 얹는다."

[[dialogue]]
speaker = "トワ先生"
original = "「イクシリオンちゃん――その妄想癖は、直す必要なんてないよ。それは強みにもなるから」"
translation = "「익실리온 양―― 그 망상벽은 고칠 필요 없어. 그건 강점도 될 수 있으니까.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「強み……？」"
translation = "「강점……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「そう。『何かに夢中になる』ってことは、悪いことじゃない。むしろ他の人にはない集中力を持ってるってことだよ」"
translation = "「응. 『무언가에 열중한다』는 건 나쁜 게 아니야. 오히려 다른 사람에게는 없는 집중력을 가지고 있다는 뜻이야.」"

[[dialogue]]
speaker = "トワ先生"
original = "「イクシリオンちゃんはまだ、バレンタインフォームを上手く制御できてないだけで――」"
translation = "「익실리온 양은 아직 발렌타인 폼을 잘 제어하지 못하고 있을 뿐이지――」"

[[dialogue]]
speaker = "トワ先生"
original = "「使いこなせば、妄想癖は『極限の集中力』として、力に変えられるはず」"
translation = "「잘 다루게 되면 망상벽은 『극한의 집중력』으로서 힘으로 바꿀 수 있을 거야.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私の妄想癖が……力に……？\u3000本当に、そんなことが……？」"
translation = "「제 망상벽이…… 힘으로……? 정말 그런 일이……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「……先生もさ、体の細胞が星力で『自動回復』しちゃうっていう、特殊体質を持ってるんだ」"
translation = "「……선생님도 말야, 몸의 세포가 성력으로 『자동 회복』되어 버리는 특수 체질을 가지고 있어.」"

[[dialogue]]
speaker = "トワ先生"
original = "「そのせいで今も時々、自分だけいつまでも大人に成長できてないような……そういうネガティブな気分になる時がある」"
translation = "「그 탓에 지금도 가끔 나만 언제까지나 어른으로 성장하지 못하는 것 같은…… 그런 부정적인 기분이 들 때가 있어.」"

[[dialogue]]
speaker = "トワ先生"
original = "「だけどさ、考え方をポジティブに変えれば、そのおかげで私は他の人よりもずっと長く、星騎士として戦い続けることができるんだよね」"
translation = "「하지만 말야, 생각을 긍정적으로 바꾸면 그 덕분에 나는 다른 사람보다 훨씬 오래 성기사로서 계속 싸울 수 있는 거잖아.」"

[[dialogue]]
speaker = "トワ先生"
original = "「つまりそれって、他の人よりも長く、星騎士として強くなれるチャンスがあるってことでしょ？」"
translation = "「즉 그건 다른 사람보다 오래 성기사로서 강해질 기회가 있다는 뜻이지?」"

[[dialogue]]
speaker = "トワ先生"
original = "（……そう思えるようになったのは、私も割と最近になって――会長くんやメイプルちゃんたちと出会ってからだけど）"
translation = "(……그렇게 생각할 수 있게 된 건 나도 비교적 최근의 일이지만―― 회장군이나 메이플 양 일행과 만난 뒤부터지만)"

[[dialogue]]
speaker = "トワ先生"
original = "「――だから、イクシリオンちゃんも、考え方を少し変えてみよう」"
translation = "「――그러니까 익실리온 양도 생각을 조금 바꿔보자.」"

[[dialogue]]
speaker = "トワ先生"
original = "「妄想癖は『直す』んじゃなく『鍛える』。集中力として磨けば、それはあなただけの強みになる」"
translation = "「망상벽은 『고치는』 게 아니라 『단련하는』 것. 집중력으로서 갈고닦으면 그건 너만의 강점이 될 거야.」"

[[dialogue]]
speaker = "トワ先生"
original = "「だから、自分を卑下しないで。自信を持って」"
translation = "「그러니까 자신을 비하하지 마. 자신감을 가져.」"

[[dialogue]]
speaker = "トワ先生"
original = "「イクシリオンちゃんが頑張りたいと思うなら――トワ先生が、いくらでも力になるから！」"
translation = "「익실리온 양이 노력하고 싶다고 생각한다면―― 토와 선생님이 얼마든지 힘이 되어줄 테니까!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「先生……」"
translation = "「선생님……」"

[[dialogue]]
speaker = "unk"
original = "――と、その時。"
translation = "――그때였다."

[[dialogue]]
speaker = "ルルカ"
original = "「お邪魔しま～す♪\u3000……あれ？」"
translation = "「실례합니~다♪ ……어라?」"

[[dialogue]]
speaker = "ルルカ"
original = "「トワ先生？\u3000どうして新星寮に？\u3000それにイクシリオンちゃんも……その衣装、どうしたの？」"
translation = "「토와 선생님? 왜 신성료에? 게다가 익실리온 양도…… 그 의상 어떻게 된 거야?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ルルカちゃん……？」"
translation = "「루루카 양……?」"

[[dialogue]]
speaker = "unk"
original = "新星寮に現れたルルカは、トワとイクシリオンの姿を見て、不思議そうに目をぱちくりさせるのだった。"
translation = "신성료에 나타난 루루카는 토와와 익실리온의 모습을 보고 신기한 듯 눈을 깜빡이는 것이었다."

