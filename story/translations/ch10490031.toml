[[dialogue]]
speaker = "unk"
original = "第１話,紅明のお母さん・過去編,P"
translation = "제1화, 코우메이의 엄마·과거 편, P"

[[dialogue]]
speaker = "unk"
original = "恋人の紅明と街に出かけていた休日、モンスター出現の報告を受け、俺たちは東京駅前に駆けつけて戦闘を行っていた――"
translation = "연인인 코우메이와 거리에 나갔던 휴일, 몬스터 출현 보고를 받고 우리는 도쿄역 앞으로 달려가 전투를 벌이고 있었다──"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「今日も元気で、勝利の風を吹かすぜ！\u3000威風堂々――」"
translation = "「오늘도 활기차게, 승리의 바람을 불게 하겠슴다! 위풍당당──」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「芭蕉扇！！」"
translation = "「파초선!!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギギーッ！？\u3000……！」"
translation = "「기기익!? ……!」"

[[dialogue]]
speaker = "unk"
original = "クーシェンが魔界から持ってきた『芭蕉扇』によって覚醒した、紅明の『ラクシャシーフォーム』。"
translation = "쿠셴이 마계에서 가져온 『파초선』에 의해 각성한 코우메이의 『라크샤시 폼』."

[[dialogue]]
speaker = "unk"
original = "その圧倒的な『風』の星術によって、紅明は新種の機械型モンスターでさえもあっという間に一掃してしまった――"
translation = "그 압도적인 『바람』의 성술에 의해 코우메이는 신종 기계형 몬스터조차 눈 깜짝할 사이에 일소해 버렸다──"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ふぅっ♪\u3000これにて一件落着☆\u3000ダーリン、お疲れっしょ～！\u3000ウェ～イ☆」"
translation = "「후우♪ 이걸로 사건 해결☆ 달링, 수고했슴다~! 웨이☆」"

[[dialogue]]
speaker = "unk"
original = "元気な笑顔で、ハイタッチを交わしてくる紅明。"
translation = "활기찬 미소로 하이파이브를 해오는 코우메이."

[[dialogue]]
speaker = "unk"
original = "お疲れ様。新フォーム、すごかった"
translation = "수고했어. 새로운 폼, 대단했어"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「んモー<emoji=heart04>\u3000ダーリンにそんな褒められると、嬉しくなっちゃうっしょ♪」"
translation = "「음메<emoji=heart04> 달링한테 그렇게 칭찬받으니 기뻐지네♪」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ラクシャシーフォームは、アタシの前世のお袋殿――『羅刹女』の力を引き出すことができるからね。力の源になっている芭蕉扇のお陰でもあるっしょ！」"
translation = "「라크샤시 폼은 내 전생의 어머님── 『나찰녀』의 힘을 끌어낼 수 있으니까. 힘의 근원이 된 파초선 덕분이기도 하구!」"

[[dialogue]]
speaker = "unk"
original = "紅明は、実は前世の記憶がある『転生者』である。そして彼女の前世は２０００年前――『西遊記』に登場する「牛魔王」と「羅刹女」の間に生まれた娘、「<ruby>紅孩児<rt>こうがいじ</rt></ruby>」なのだ。"
translation = "코우메이는 사실 전생의 기억이 있는 『전생자』이다. 그리고 그녀의 전생은 2000년 전── 『서유기』에 등장하는 「우마왕」과 「나찰녀」 사이에서 태어난 딸, 「홍해아」인 것이다."

[[dialogue]]
speaker = "unk"
original = "俺はふと、気になったことを聞いてみる。"
translation = "나는 문득 궁금한 것을 물어본다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「うん？\u3000――羅刹女がどんなヒトだったのかって？」"
translation = "「응? ──나찰녀가 어떤 사람이었냐고?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「それはもう、絶世の美女と言われるくらい、すごく綺麗なママだったよ♪」"
translation = "「그건 뭐, 절세미녀라고 불릴 정도로 정말 예쁜 엄마였어♪」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「なのによく、アタシの方がおっぱい大きいことに嫉妬の炎を燃やして、頬をぷく～っとハムスターみたいに膨らませてた」"
translation = "「그런데 자주 내가 가슴이 더 큰 것에 질투의 불꽃을 태우며 볼을 햄스터처럼 빵빵하게 부풀리곤 했지」"

[[dialogue]]
speaker = "unk"
original = "コンプレックスだったのか……"
translation = "콤플렉스였던 건가……"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あはは☆\u3000そうなんよ。お袋殿の方が、ずっと美人だったのにね」"
translation = "「아하하☆ 맞아. 어머님이 훨씬 미인이었는데 말이야」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「でも、夫や家族を深く愛していて、ヤンチャだったアタシのことも、たくさん可愛がってくれた」"
translation = "「하지만 남편과 가족을 깊이 사랑했고, 장난꾸러기였던 나도 많이 예뻐해 주셨어」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「アタシとは違って、奥ゆかしいママだったよ。ただ……同時に不安や怒りを素直に表現できない、不器用な性格だった。怒るのが苦手だったんよ」"
translation = "「나와는 다르게 조신한 엄마였어. 다만…… 동시에 불안이나 분노를 솔직하게 표현하지 못하는 서툰 성격이었지. 화내는 걸 잘 못했어」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「牛魔王……親父殿は、勝手によく妾を作っていて、その度に本当は内心怒ってた」"
translation = "「우마왕…… 아버님은 멋대로 첩을 자주 만들었고, 그때마다 사실 내심 화가 나 있었어」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「だけど、お袋殿はそれでも親父殿のことを愛していたから、付き添おうとしていたんだ」"
translation = "「하지만 어머님은 그래도 아버님을 사랑했기에 곁을 지키려 하셨지」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「そうして、気づけば怒るタイミングを逃してしまった。親父殿はもう、アタシにも、お袋殿にも止められない『欲望に飲まれた怪物』になってしまっていたんだ」"
translation = "「그러다 보니 어느새 화낼 타이밍을 놓쳐버렸어. 아버님은 이미 나도, 어머님도 멈출 수 없는 『욕망에 삼켜진 괴물』이 되어버린 상태였지」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「お袋殿はもっと早く怒って、親父殿の道を正すべきだったと後悔してたよ……だから、自分の代わりに親父殿を止めて欲しいと、アタシにこの芭蕉扇を託したんだ」"
translation = "「어머님은 좀 더 빨리 화를 내서 아버님의 길을 바로잡았어야 했다고 후회하셨어…… 그래서 자신 대신 아버님을 멈춰달라고 나에게 이 파초선을 맡기신 거야」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「それでアタシは修業して、このラクシャシーフォームを手に入れてから、悟空たちと共に親父殿との最終決戦に挑んだってわけさ」"
translation = "「그래서 나는 수행해서 이 라크샤시 폼을 얻은 뒤 오공 일행과 함께 아버님과의 최종 결전에 도전했다는 말씀」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「その激戦の中で、芭蕉扇を崖から落としちゃって……完全に失われたものだと思ってたけど、まさかこうして時を経て、戻って来るとは思わなかったよ」"
translation = "「그 격전 중에 파초선을 절벽 아래로 떨어뜨려 버려서…… 완전히 잃어버린 줄 알았는데, 설마 이렇게 시간이 흘러 돌아올 줄은 몰랐어」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、彼女は大切なものに触れるような手つきで撫でる。"
translation = "그렇게 말하며 그녀는 소중한 것을 만지는 듯한 손길로 쓰다듬는다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あ、ちなみにお袋殿は、孫ができた時は、それはもう嬉しそうに可愛がって、デレデレのお祖母ちゃんをやってたよ」"
translation = "「아, 참고로 어머님은 손주가 생겼을 때 정말 기뻐하며 예뻐해 주신, 데레데레한 할머니였어」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「だから、色々後悔もあっただろうけど、余生は幸せに過ごせたんじゃないかな」"
translation = "「그러니 여러 후회도 있었겠지만, 여생은 행복하게 보내지 않았을까」"

[[dialogue]]
speaker = "unk"
original = "俺は羅刹女の話を聞いて、そういえば紅明が<b>怒っている</b>姿を見たことがないことに気づく。"
translation = "나는 나찰녀의 이야기를 듣고 그러고 보니 코우메이가 <b>화내고</b> <b>있는</b> 모습을 본 적이 없다는 사실을 깨닫는다."

[[dialogue]]
speaker = "unk"
original = "もしかして……紅明も怒るのって苦手？"
translation = "혹시…… 코우메이도 화내는 거 잘 못해?"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「……！\u3000うん。実はそう、アタシも結構苦手なタイプなんだ」"
translation = "「……! 응. 사실 그래, 나도 꽤 서툰 타입이야」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あっ、でも、誤解されたくないから言うけど、実はいつも内心怒ってるとか、そういうわけじゃないよ？」"
translation = "「앗, 하지만 오해받고 싶지 않으니까 말해두는데, 사실 항상 내심 화나 있다거나 그런 건 아니라구?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「……アタシは苦手って言うよりも、『怒り』ってあんまりよくわからないところがあるんよ」"
translation = "「……나는 서투르다기보다 『분노』라는 걸 잘 모르겠는 면이 있어」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「そりゃ、腹が立つ時が全くないわけじゃないけど……怒っているより、笑ってた方が楽しいじゃん？」"
translation = "「그야 화가 날 때가 아예 없는 건 아니지만…… 화내고 있는 것보다 웃고 있는 게 더 즐겁잖아?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「でも、『怒りがわからないからって、叱らないのは間違っている！』って、当時悟空がアタシをぶん殴りながら叱ってくれたんだ」"
translation = "「하지만 『분노를 모른다고 해서 꾸짖지 않는 것은 잘못이다!』라고 당시 오공이 나를 때려가며 꾸짖어 줬어」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「そのおかげで、アタシは逃げずに親父殿と向き合うことができた」"
translation = "「그 덕분에 나는 도망치지 않고 아버님과 마주할 수 있었지」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「それから、アタシ自身がママになる経験もして、ちゃんと『叱る』ってことが自分でもできるようになったんだよ」"
translation = "「그 후 나 자신이 엄마가 되는 경험도 하면서 제대로 『꾸짖는』 것을 스스로도 할 수 있게 된 거야」"

[[dialogue]]
speaker = "unk"
original = "なら、俺がもし……"
translation = "그렇다면 내가 만약……"

[[dialogue]]
speaker = "unk"
original = "――魔王として間違ったことをしそうになった時は、叱ってくれ。"
translation = "──마왕으로서 잘못된 일을 하려 할 때는 꾸짖어 줘."

[[dialogue]]
speaker = "unk"
original = "俺は彼女にそう伝える。"
translation = "나는 그녀에게 그렇게 전한다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ダーリン……。――うしし☆\u3000もちろん！」"
translation = "「달링……. ──우시시☆ 물론이지!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「妻としてこれからも隣で支えて、んモー！\u3000なんでやねん☆\u3000って夫婦漫才みたいにツッコんであげるから、安心するっしょ♪\u3000だから、ダーリンも――」"
translation = "「아내로서 앞으로도 곁에서 지탱하며, 음메! 왜 저래☆ 하고 부부 만담처럼 츳코미를 걸어줄 테니까 안심하라구♪ 그러니까 달링도──」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「もし迷った時は、ちゃんとアタシに相談してよね。人生２周目の経験で、バッチリ元気が出るアドバイスをしちゃうから☆」"
translation = "「혹시 고민될 때는 꼭 나한테 상담해 줘. 인생 2회차의 경험으로 확실히 기운이 나는 어드바이스를 해줄 테니까☆」"

[[dialogue]]
speaker = "unk"
original = "そう言って、俺の腕に抱き着く紅明。"
translation = "그렇게 말하며 내 팔에 매달리는 코우메이."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あっ……んっ♪\u3000ふふふっ<emoji=heart04>\u3000ダーリンの手、くすぐったいっしょ<emoji=heart04>」"
translation = "「앗…… 응♪ 후후후<emoji=heart04> 달링 손, 간지럽다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が頭を撫でると、彼女は嬉しそうな笑顔を浮かべるのだった――"
translation = "내가 머리를 쓰다듬자 그녀는 기쁜 듯한 미소를 짓는 것이었다──"

