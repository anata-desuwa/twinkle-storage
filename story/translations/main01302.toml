[[dialogue]]
speaker = "unk"
original = "第２話,グレート・ウォール,B"
translation = "제2화, 그레이트 월, B"

[[dialogue]]
speaker = "unk"
original = "「<b>人間界を犠牲に</b>他の二界を救う──なんて。そんなギャンビットは、あまり褒められた手ではないわね」"
translation = "「<ruby>인간계를 희생하여<rt>・・・・ ・・・・</rt></ruby> 다른 두 세계를 구한다──라니. 그런 갬빗은, 별로 칭찬받을 만한 수는 아니네」"

[[dialogue]]
speaker = "リノ"
original = "「私の息子──どこへやったのかしら？\u3000セドナ」"
translation = "「내 아들── 어디로 보냈니? 세드나」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ……あなたは……？」"
translation = "「앗…… 당신은……?」"

[[dialogue]]
speaker = "カヤ"
original = "「誰──？」"
translation = "「누구──?」"

[[dialogue]]
speaker = "セドナ"
original = "「……リノか」"
translation = "「……리노인가」"

[[dialogue]]
speaker = "セドナ"
original = "「今さらここへ顔を出すとは──どういう風の吹き回しだ？\u3000入場を許可した覚えはないが」"
translation = "「이제 와서 여기에 얼굴을 내밀다니── 무슨 바람이 분 거지? 입장을 허가한 기억은 없는데」"

[[dialogue]]
speaker = "リノ"
original = "「つれないわね、相変わらず。まあ……あなたらしいと言えばらしいけど」"
translation = "「쌀쌀맞기는, 여전하네. 뭐…… 당신답다고 하면 당신답지만」"

[[dialogue]]
speaker = "unk"
original = "リノ──人間界では緋宮リノと名乗っている──彼女は、セドナの冷徹な態度にため息をついた。"
translation = "리노── 인간계에서는 히노미야 리노라고 자칭하고 있는── 그녀는, 세드나의 냉철한 태도에 한숨을 쉬었다."

[[dialogue]]
speaker = "アイリーン"
original = "「上官──この方とは、どういうご関係なのでしょうか……？」"
translation = "「상관── 이분과는, 어떤 관계이신지요……?」"

[[dialogue]]
speaker = "セドナ"
original = "「昔なじみ……いや。とうに切れた縁だ」"
translation = "「옛 친구…… 아니. 이미 끊어진 인연이다」"

[[dialogue]]
speaker = "セドナ"
original = "「森を去り、ネビュラを抜けたはみ出し者──<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>だよ。おまえ達、この惨めな姿を目に焼きつけておけ」"
translation = "「숲을 떠나, 네뷸라를 빠져나간 낙오자── 길 잃은 마녀다. 너희들, 이 비참한 모습을 눈에 새겨 두어라」"

[[dialogue]]
speaker = "アイリーン"
original = "「<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>……！\u3000は、初めて会いました……」"
translation = "「길 잃은 마녀……! 처, 처음 만났습니다……」"

[[dialogue]]
speaker = "カヤ"
original = "「人間界で──人間に紛れて暮らしてた、ってこと……？」"
translation = "「인간계에서── 인간들 사이에 섞여 살았다는 거야……?」"

[[dialogue]]
speaker = "リノ"
original = "「人を珍獣みたいに言わないでくれる？\u3000別に尻尾は出してないわよ」"
translation = "「사람을 희귀 동물처럼 말하지 말아 줄래? 딱히 꼬리는 내밀지 않았어」"

[[dialogue]]
speaker = "リノ"
original = "「かつてのパートナーに向かって──ずいぶんな言い草じゃないかしら？」"
translation = "「옛 파트너에게 향하는 말치고는── 너무 심한 말 아닌가?」"

[[dialogue]]
speaker = "セドナ"
original = "「ほざくな。魔女の掟を破った者に、今さらかける情けなどない」"
translation = "「헛소리 마라. 마녀의 규칙을 어긴 자에게, 이제 와서 베풀 정 따위 없다」"

[[dialogue]]
speaker = "アイリーン"
original = "（パートナー──そういえば……上官には昔、バディを組んでいた相方がいたとか）"
translation = "（파트너── 그러고 보니…… 상관에게는 옛날에, 콤비를 맺었던 상대가 있었다고）"

[[dialogue]]
speaker = "カヤ"
original = "（噂程度だけど、聞いたことある。ネビュラの筆頭エージェントペア──二人で多くの戦果を上げたって）"
translation = "（소문 정도지만, 들어본 적 있어. 네뷸라의 필두 에이전트 페어── 둘이서 많은 전과를 올렸다고）"

[[dialogue]]
speaker = "アイリーン"
original = "（でも……だったらどうして、二人は道を違えてしまったんでしょう……？）"
translation = "（하지만…… 그렇다면 어째서, 두 사람은 길을 달리하게 된 걸까요……?）"

[[dialogue]]
speaker = "unk"
original = "アイリーンらのささやきも意に介さず、向かい合った旧縁の仲は互いを見据えていた。"
translation = "아이린 등의 속삭임도 개의치 않고, 마주 선 옛 인연의 사이는 서로를 응시하고 있었다."

[[dialogue]]
speaker = "リノ"
original = "「どうも数日前から──愛しい息子の姿が見えなくってね。探してるところなのよ」"
translation = "「며칠 전부터── 사랑스러운 아들의 모습이 보이지 않아서 말이야. 찾고 있는 중이야」"

[[dialogue]]
speaker = "セドナ"
original = "「息子か。いつ貴様が人間の子など身ごもったのだ？」"
translation = "「아들이라. 언제 네놈이 인간의 아이를 임신했단 말이냐?」"

[[dialogue]]
speaker = "リノ"
original = "「拾ったのよ。たまたまね」"
translation = "「주웠어. 우연히」"

[[dialogue]]
speaker = "セドナ"
original = "「ふん。緋宮と名乗る人間のことなら把握している。しかし、奴は学園所属の星騎士のはずだ。訪ねる場所がお門違いではないか？」"
translation = "「흥. 히노미야라고 자칭하는 인간에 대해서는 파악하고 있다. 하지만, 그놈은 학원 소속의 성기사일 터. 찾아올 곳이 잘못된 것 아닌가?」"

[[dialogue]]
speaker = "リノ"
original = "「アナちゃんからも聞いたわよ。ちょっと遠出してるだけだから心配しないで──ってね」"
translation = "「아나짱에게서도 들었어. 잠깐 멀리 나간 것뿐이니 걱정하지 말라고── 말이야」"

[[dialogue]]
speaker = "リノ"
original = "「でも、もしかしたらあなたなら──何か知ってるんじゃないかと思って」"
translation = "「하지만, 혹시 당신이라면── 무언가 알고 있지 않을까 해서」"

[[dialogue]]
speaker = "セドナ"
original = "「……意地の悪い女だ。そこまで掴んでいるなら、最初から素直に問えばいい」"
translation = "「……심술궂은 여자군. 거기까지 파악하고 있다면, 처음부터 솔직하게 물으면 될 것을」"

[[dialogue]]
speaker = "unk"
original = "セドナは諦めたように嘆息し、それから淡々と語った。"
translation = "세드나는 포기한 듯 한숨을 쉬고, 그러고 나서 담담하게 말했다."

[[dialogue]]
speaker = "セドナ"
original = "「確かに我々は緋宮クロト──並びに学園の生徒５名を魔界へ送った。“うろ”を通じてな。だが、それはあくまで彼らの要望を聞き届けた結果にすぎない」"
translation = "「확실히 우리는 히노미야 쿠로토── 더불어 학원의 학생 5명을 마계로 보냈다. “우로”를 통해서 말이지. 하지만, 그것은 어디까지나 그들의 요망을 들어준 결과에 지나지 않는다」"

[[dialogue]]
speaker = "リノ"
original = "「そうね。ヴィーナスちゃんの失踪──引くに引けない状況だったのは聞いたわ」"
translation = "「그렇지. 비너스짱의 실종── 물러설 수 없는 상황이었다는 건 들었어」"

[[dialogue]]
speaker = "リノ"
original = "「だけど……あなたが彼らを送った理由は、他にもあるんじゃない？」"
translation = "「하지만…… 당신이 그들을 보낸 이유는, 그 외에도 있지 않아?」"

[[dialogue]]
speaker = "セドナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "リノから問いをぶつけられ、セドナはしばし逡巡したのち、こぼした。"
translation = "리노에게 질문을 받은 세드나는 잠시 망설인 뒤, 입을 열었다."

[[dialogue]]
speaker = "セドナ"
original = "「……奴らは邪魔だ。グレート・ウォール計画遂行のために」"
translation = "「……그놈들은 방해된다. 그레이트 월 계획 수행을 위해」"

[[dialogue]]
speaker = "リノ"
original = "「……！\u3000やっぱり……」"
translation = "「……! 역시나……」"

[[dialogue]]
speaker = "リノ"
original = "「あなた達はそこまで見越して──<ruby>星騎士<rt>スターナイト</rt></ruby>の戦力減衰を狙ったのね……！」"
translation = "「당신들은 거기까지 내다보고── <ruby>성기사<rt>스타 나이트</rt></ruby>의 전력 감퇴를 노린 거였군……!」"

[[dialogue]]
speaker = "セドナ"
original = "「……ふぅ。そう鼻息を荒くするな」"
translation = "「……후우. 그렇게 콧김을 뿜지 마라」"

[[dialogue]]
speaker = "セドナ"
original = "「リノ。貴様はまだ計画の骨子しか知らない。まだ我々が歩むべき進路を模索していた頃の」"
translation = "「리노. 네놈은 아직 계획의 골자밖에 모른다. 아직 우리가 나아가야 할 진로를 모색하고 있던 시절의 것을」"

[[dialogue]]
speaker = "セドナ"
original = "「グレート・ウォールはすでに──最も実現性の高い作戦として決定づけられている。異を挟む隊員は誰もいない」"
translation = "「그레이트 월은 이미── 가장 실현 가능성이 높은 작전으로 결정되었다. 이의를 제기하는 대원은 아무도 없다」"

[[dialogue]]
speaker = "セドナ"
original = "「ここはもう、貴様のいた時代とは違うのだよ。魔女も、ネビュラも、人間界もな」"
translation = "「여기는 이제, 네놈이 있던 시대와는 다른 것이다. 마녀도, 네뷸라도, 인간계도 말이지」"

[[dialogue]]
speaker = "リノ"
original = "「っ……なら──条件が揃ったっていうの……！？」"
translation = "「윽…… 그렇다면── 조건이 갖춰졌다는 거야……!?」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ。喜ぶべきことに、な」"
translation = "「아아. 기뻐해야 할 일이지, 그래」"

[[dialogue]]
speaker = "セドナ"
original = "「グレート・ウォール──それは、リクリエの打破という我々の宿願を果たすための計画」"
translation = "「그레이트 월── 그것은, 리크리에의 타파라는 우리의 숙원을 이루기 위한 계획」"

[[dialogue]]
speaker = "セドナ"
original = "「そのために我々は心血を注いできた。ネビュラという組織を立ち上げ、人間界に本部を構え、着々と準備を進めてきた」"
translation = "「그를 위해 우리는 심혈을 기울여 왔다. 네뷸라라는 조직을 세우고, 인간계에 본부를 세우고, 착착 준비를 진행해 왔다」"

[[dialogue]]
speaker = "セドナ"
original = "「計画の骨子はただひとつ──リクリエの計り知れない力を<b>封じ込める</b>こと」"
translation = "「계획의 골자는 단 하나── 리크리에의 헤아릴 수 없는 힘을 <b>봉인하는</b> 것」"

[[dialogue]]
speaker = "セドナ"
original = "「三界を巻き込んでリセットする超常現象。その膨大なエネルギーを人間界という一点に集約させ、封鎖する」"
translation = "「삼계를 휘말리게 하여 리셋하는 초자연 현상. 그 방대한 에너지를 인간계라는 한 지점에 집약시켜, 봉쇄한다」"

[[dialogue]]
speaker = "セドナ"
original = "「それによって──本来なら被害が及ぶはずの魔界と天界をリクリエから防ぐ。魔力障壁によって蓋をしてな」"
translation = "「그로써── 본래라면 피해가 미칠 마계와 천계를 리크리에로부터 막는다. 마력 장벽으로 뚜껑을 덮어서 말이지」"

[[dialogue]]
speaker = "unk"
original = "それは言わば──人間界<b>でのみ</b>リクリエを起こさせる方法論だった。"
translation = "그것은 말하자면── 인간계<b>에서만</b> 리크리에를 일으키는 방법론이었다."

[[dialogue]]
speaker = "カヤ"
original = "「ん。私たちも……そう聞かされてきた。三界を救うのは難しいから、せめて二界は守るんだって」"
translation = "「응. 우리도…… 그렇게 들어왔다. 삼계를 구하는 건 어려우니, 적어도 두 세계는 지킨다고」"

[[dialogue]]
speaker = "アイリーン"
original = "「はい──ネビュラの魔女ならば皆、障壁の魔法は十分に会得してきました」"
translation = "「네── 네뷸라의 마녀라면 모두, 장벽의 마법은 충분히 습득해 왔습니다」"

[[dialogue]]
speaker = "セドナ"
original = "「無論──他種族が巻き込まれぬよう最善の手は尽くす。<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を占拠し、被害が<ruby>伝播<rt>でんぱ</rt></ruby>せぬよう封鎖する。そのためのエージェントはすでに派遣済みだ」"
translation = "「물론── 다른 종족이 휘말리지 않도록 최선의 수는 다한다. <ruby>경계의 호수<rt>라고 시에로</rt></ruby>를 점거하고, 피해가 전파되지 않도록 봉쇄한다. 그를 위한 에이전트는 이미 파견을 마쳤다」"

[[dialogue]]
speaker = "セドナ"
original = "「三界に散ったあらゆるネビュラの支部が……ひとつの理想へ向けて動いている。それだけだ」"
translation = "「삼계에 흩어진 모든 네뷸라의 지부가…… 하나의 이상을 향해 움직이고 있다. 그뿐이다」"

[[dialogue]]
speaker = "リノ"
original = "「確かに……リクリエの阻止はネビュラの本懐。その点に関して異論はないわ」"
translation = "「확실히…… 리크리에의 저지는 네뷸라의 본분. 그 점에 관해서는 이견이 없어」"

[[dialogue]]
speaker = "リノ"
original = "「……けれど、大事なことが抜けているわね。リクリエの力を閉じ込めたあと、人間界はどうなるっていうの？」"
translation = "「……하지만, 중요한 것이 빠져 있네. 리크리에의 힘을 가둔 뒤, 인간계는 어떻게 된다는 거야?」"

[[dialogue]]
speaker = "unk"
original = "セドナは瞑目し、冷徹に答えた。"
translation = "세드나는 눈을 감고, 냉철하게 대답했다."

[[dialogue]]
speaker = "セドナ"
original = "「人間界は──そのまま滅ぶ。三界をまたごうという破壊に、ひとつの領域が抗えるはずもない。貴様の言う通り、<ruby>代償<rt>ギャンビット</rt></ruby>だ」"
translation = "「인간계는── 그대로 멸망한다. 삼계를 넘나드는 파괴에, 하나의 영역이 맞설 수 있을 리 없다. 네놈이 말한 대로, 대가다」"

[[dialogue]]
speaker = "リノ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "カヤ、アイリーンの２名もまた静かに目を伏せただけだった。"
translation = "카야, 아이린 두 명 역시 조용히 눈을 내리깔 뿐이었다."

[[dialogue]]
speaker = "unk"
original = "彼女らネビュラのエージェントにとって──その結末は“現実的な解決策”として周知されていたものだった。"
translation = "그녀들 네뷸라의 에이전트에게 있어── 그 결말은 “현실적인 해결책”으로서 주지되어 있던 것이었다."

[[dialogue]]
speaker = "リノ"
original = "「グレート・ウォール計画は確かに……私のいた頃からひとつのビジョンとしてあった」"
translation = "「그레이트 월 계획은 확실히…… 내가 있던 시절부터 하나의 비전으로서 존재했어」"

[[dialogue]]
speaker = "リノ"
original = "「けれどあれには──二つの問題点があったはず。ひとつはリクリエのエネルギーを集約させるその手段。もうひとつは、障壁を維持するだけの魔力」"
translation = "「하지만 그것에는── 두 가지 문제점이 있었을 터. 하나는 리크리에의 에너지를 집약시키는 그 수단. 또 하나는, 장벽을 유지할 만큼의 마력」"

[[dialogue]]
speaker = "セドナ"
original = "「その通り。だが……それらの障壁は、どちらも数奇な幸運によって解消された」"
translation = "「그렇다. 하지만…… 그 장벽들은, 둘 다 기이한 행운에 의해 해소되었다」"

[[dialogue]]
speaker = "セドナ"
original = "「特にひとつ目──最大の難関と思われた『リクリエの集約』に関しては、我々が手を尽くすまでもなくなった」"
translation = "「특히 첫 번째── 최대의 난관이라 여겨졌던 『리크리에의 집약』에 관해서는, 우리가 손을 쓸 필요조차 없어졌다」"

[[dialogue]]
speaker = "リノ"
original = "「……！\u3000どういうこと──？」"
translation = "「……! 무슨 말이야──?」"

[[dialogue]]
speaker = "セドナ"
original = "「わざわざこちらが干渉せずとも、あちらからまとまってくれたのさ。リクリエ現象にまつわる膨大なエネルギーを濃縮させた『<ruby>核<rt>コア</rt></ruby>』となって」"
translation = "「굳이 이쪽이 간섭하지 않아도, 그쪽에서 스스로 뭉쳐주었지. 리크리에 현상에 얽힌 방대한 에너지를 농축시킨 『핵』가 되어서 말이다」"

[[dialogue]]
speaker = "セドナ"
original = "「『リクリエの使徒』──仮面を被った人間体としてな。もっとも、当人はアポロなどと名乗っていたが」"
translation = "「『리크리에의 사도』── 가면을 쓴 인간체로서 말이지. 물론, 당사자는 아폴로 따위로 자칭하고 있었지만」"

[[dialogue]]
speaker = "リノ"
original = "「仮面の……！\u3000貴女たちは、あれをそう捉えたのね」"
translation = "「가면의……! 당신들은, 저것을 그렇게 파악한 거였군」"

[[dialogue]]
speaker = "セドナ"
original = "「直接の交戦と、星騎士たちからの情報を踏まえて我々はひとつの結論に辿り着いた」"
translation = "「직접적인 교전과, 성기사들에게서 얻은 정보를 바탕으로 우리는 하나의 결론에 도달했다」"

[[dialogue]]
speaker = "セドナ"
original = "「リクリエの使徒は常軌を逸した存在だ。おそらく現状はまだ、核に宿った人格が力の大部分を抑え込んでいる状態だろう」"
translation = "「리크리에의 사도는 상궤를 벗어난 존재다. 아마 현 상황은 아직, 핵에 깃든 인격이 힘의 대부분을 억누르고 있는 상태일 게다」"

[[dialogue]]
speaker = "セドナ"
original = "「だが……奴の消耗が激しくなれば、その制御もいずれは解き放たれる」"
translation = "「하지만…… 그놈의 소모가 심해지면, 그 제어도 언젠가는 해방될 것이다」"

[[dialogue]]
speaker = "セドナ"
original = "「要するに、追い詰めれば追い詰めるほど、あれは新たな力に目覚めるわけだ。フフ──実にヒーローらしいではないか」"
translation = "「요컨대, 몰아붙이면 몰아붙일수록, 저것은 새로운 힘에 눈을 뜨는 셈이지. 후후── 실로 히어로답지 않은가」"

[[dialogue]]
speaker = "unk"
original = "アポロはリクリエの使徒である。"
translation = "아폴로는 리크리에의 사도이다."

[[dialogue]]
speaker = "unk"
original = "よって、彼女が引き出す底力とはすなわち、リクリエに由来するエネルギーということになる。"
translation = "따라서, 그녀가 끌어내는 잠재력이란 즉, 리크리에에 유래하는 에너지라는 것이 된다."

[[dialogue]]
speaker = "セドナ"
original = "「そして……これは我々にとって極めて幸運だ。リクリエというマクロな天災を相手取らずとも、人間体ひとつを対処すれば済むのだからな」"
translation = "「그리고…… 이것은 우리에게 있어 지극히 행운이다. 리크리에라는 거시적인 천재를 상대하지 않아도, 인간체 하나를 대처하면 되는 것이니까」"

[[dialogue]]
speaker = "リノ"
original = "「仮面の使徒……ネビュラは、彼女との直接対決を望んでいるのね」"
translation = "「가면의 사도…… 네뷸라는, 그녀와의 직접 대결을 바라고 있는 거였군」"

[[dialogue]]
speaker = "リノ"
original = "「でも──使徒の見かけがいくら人間だとしても、本質がリクリエであることに変わりない。そう容易くはいかないはずよ」"
translation = "「하지만── 사도의 겉모습이 아무리 인간이라 해도, 본질이 리크리에라는 것에는 변함이 없어. 그렇게 쉽지는 않을 터」"

[[dialogue]]
speaker = "セドナ"
original = "「いかにも。真価を見せたあれとの戦闘は、それこそ人間界が耐えきれぬほどの死闘となるだろう」"
translation = "「당연하다. 진가를 드러낸 저것과의 전투는, 그야말로 인간계가 견뎌내지 못할 정도의 사투가 될 것이다」"

[[dialogue]]
speaker = "セドナ"
original = "「だが……構わない。この身が灰燼に帰そうとも、一族の宿願が果たされるのならば」"
translation = "「하지만…… 상관없다. 이 몸이 잿더미로 돌아간다 해도, 일족의 숙원이 이루어진다면」"

[[dialogue]]
speaker = "リノ"
original = "「セドナ……」"
translation = "「세드나……」"

[[dialogue]]
speaker = "unk"
original = "セドナの<ruby>双眸<rt>そうぼう</rt></ruby>には覚悟の<ruby>焔<rt>ほむら</rt></ruby>がたぎっていた。"
translation = "세드나의 두 눈에는 각오의 불꽃이 끓어오르고 있었다."

[[dialogue]]
speaker = "unk"
original = "ネビュラ擁するグレート・ウォール計画──その真意は<ruby>使徒<rt>アポロ</rt></ruby>を人間界へ封じ込めることで、もろともに滅び去ってもらおうという算段だった。"
translation = "네뷸라가 내세운 그레이트 월 계획── 그 진의는 사도를 인간계에 봉인함으로써, 함께 멸망하게 하려는 속셈이었다."

[[dialogue]]
speaker = "セドナ"
original = "「残るひとつの懸念点──障壁を維持する根源についても、示し合わせたかのように救いの手がもたらされた」"
translation = "「남은 하나의 현안── 장벽을 유지할 근원에 대해서도, 미리 약속이라도 한 듯 구원의 손길이 찾아왔다」"

[[dialogue]]
speaker = "セドナ"
original = "「当代における光の魔女──クラウディア様の生誕によって」"
translation = "「당대에 있어서의 빛의 마녀── 클라우디아 님의 탄생으로 인해」"

[[dialogue]]
speaker = "リノ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "セドナ"
original = "「よって、今の我々に選択の余地はない。ただリクリエから魔界と天界を守るため全力を尽くすだけだ」"
translation = "「따라서, 지금 우리에게 선택의 여지는 없다. 그저 리크리에로부터 마계와 천계를 지키기 위해 전력을 다할 뿐이다」"

[[dialogue]]
speaker = "リノ"
original = "「あなたは……ここが、人間界がどうなってもいいっていうの？」"
translation = "「당신은…… 여기가, 인간계가 어떻게 되든 상관없다는 거야?」"

[[dialogue]]
speaker = "セドナ"
original = "「青い。青いな。いつからそんな甘えたことを抜かすようになった、リノ」"
translation = "「어리석군. 어리석어. 언제부터 그런 나약한 소리를 지껄이게 되었나, 리노」"

[[dialogue]]
speaker = "セドナ"
original = "「よいとか悪いとか──そんな次元の話ではないんだ、これは。この計画を除き、実現の可能性が高いプランは他にひとつもない」"
translation = "「좋다거나 나쁘다거나── 그런 차원의 이야기가 아니다, 이것은. 이 계획을 제외하고, 실현 가능성이 높은 계획은 달리 하나도 없다」"

[[dialogue]]
speaker = "セドナ"
original = "「トカゲの尻尾と言うつもりはない。だが、心の臓を守るためには──腕や足さえも犠牲に払わねばならない時もある」"
translation = "「도마뱀 꼬리라고 말할 생각은 없다. 하지만, 심장을 지키기 위해서는── 팔이나 다리마저도 희생해야 할 때가 있는 법」"

[[dialogue]]
speaker = "セドナ"
original = "「何もかも無事で済む方策……そんなものがあれば、どれほど楽だったろうかと思うよ」"
translation = "「모든 것이 무사할 수 있는 방책…… 그런 것이 있다면, 얼마나 편했을까 싶다」"

[[dialogue]]
speaker = "unk"
original = "そう語るセドナの手は自然と力み、震えていた。"
translation = "그렇게 말하는 세드나의 손은 저절로 힘이 들어가 떨리고 있었다."

[[dialogue]]
speaker = "セドナ"
original = "「初代『光の魔女』──真祖ディアナは森を救った。だが、その救済の法をもってしても、リクリエそのものは防げなかった」"
translation = "「초대 『빛의 마녀』── 진조 디아나는 숲을 구했다. 하지만, 그 구제의 법을 가지고도, 리크리에 그 자체는 막을 수 없었다」"

[[dialogue]]
speaker = "セドナ"
original = "「以来、白虎暦も、朱雀暦を経ても……私たちの祖は度重なるリクリエを退けられなかった。彼女らの無念は今も森の書庫に刻まれている」"
translation = "「이후, 백호력도, 주작력을 거쳐도…… 우리 조상들은 거듭되는 리크리에를 물리칠 수 없었다. 그녀들의 무념은 지금도 숲의 서고에 새겨져 있다」"

[[dialogue]]
speaker = "セドナ"
original = "「ゆえに今こそ、組織の──いや、一族の悲願は果たされねばならない。その尊さは貴様も承知のはずだ、リノ！」"
translation = "「그러니 지금이야말로, 조직의── 아니, 일족의 비원은 이루어져야 한다. 그 존엄함은 네놈도 알고 있을 터다, 리노!」"

[[dialogue]]
speaker = "リノ"
original = "「っ……私たち──魔女の……そうね……」"
translation = "「윽…… 우리── 마녀의…… 그렇네……」"

[[dialogue]]
speaker = "unk"
original = "セドナの気迫を前に、リノは言葉を飲み込んだ。"
translation = "세드나의 기백 앞에, 리노는 말을 삼켰다."

[[dialogue]]
speaker = "unk"
original = "魔女。世界樹に棲まう、長久にして平穏なる一族。"
translation = "마녀. 세계수에 사는, 오래고 평온한 일족."

[[dialogue]]
speaker = "unk"
original = "彼女たちの『森』は元来、三界とも隣接した小さなひとつの庭だった。"
translation = "그녀들의 『숲』은 본래, 삼계와도 인접한 작은 하나의 정원이었다."

[[dialogue]]
speaker = "unk"
original = "森へ迷い込んだ天使を助けたり、はたまた魔界へ紛れた魔女が魔族から施しを受けたり……他種族とも隔てなく交流していた。"
translation = "숲에 길을 잃은 천사를 돕거나, 아니면 마계로 숨어든 마녀가 마족에게서 도움을 받거나…… 다른 종족과도 거리낌 없이 교류하고 있었다."

[[dialogue]]
speaker = "unk"
original = "中でも人間たちとの交流は盛んで、互いに『森』を行き来するほどの絆を結んでいた。"
translation = "그중에서도 인간들과의 교류는 활발하여, 서로 『숲』을 왕래할 정도의 인연을 맺고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし、彼女たちの存在はやがて他種族から疎まれるようになる。"
translation = "하지만, 그녀들의 존재는 이윽고 다른 종족에게서 소외되기 시작한다."

[[dialogue]]
speaker = "unk"
original = "当時、三界に降り掛かっていた数多の厄災のためだった。"
translation = "당시, 삼계에 닥치고 있던 수많은 재앙 때문이었다."

[[dialogue]]
speaker = "unk"
original = "現代においてそれは『リクリエ』現象として周知されているが、当時の暦に厄災を定義する言葉は存在しなかった。"
translation = "현대에 있어서 그것은 『리크리에』 현상으로 주지되어 있지만, 당시의 역법에는 재앙을 정의하는 단어가 존재하지 않았다."

[[dialogue]]
speaker = "unk"
original = "そして、何もかも謎めいたこの災いの数々は、やがて魔女たちのせいではないかと囁かれるようになった。"
translation = "그리고, 모든 것이 수수께끼였던 이 재앙들은, 이윽고 마녀들 때문이 아닌가 하고 속삭여지기 시작했다."

[[dialogue]]
speaker = "unk"
original = "すべての人が魔女を悪とみなしていたわけではない。"
translation = "모든 사람이 마녀를 악으로 간주하고 있었던 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "だが、人々の心に巣食う猜疑心はやがて、魔女への迫害という形で顕れていった。"
translation = "하지만, 사람들의 마음에 자리 잡은 의심은 이윽고, 마녀에 대한 박해라는 형태로 드러났다."

[[dialogue]]
speaker = "unk"
original = "種族の危機にさらされた魔女たちは──『魔女の森』を完全に三界から切り離すことで生き延びた。"
translation = "종족의 위기에 노출된 마녀들은── 『마녀의 숲』을 완전히 삼계로부터 분리함으로써 살아남았다."

[[dialogue]]
speaker = "unk"
original = "より正確に表現すれば、森全体を覆う結界によって三界との空間的な繋がりを断ったのだ。"
translation = "더 정확하게 표현하자면, 숲 전체를 뒤덮는 결계에 의해 삼계와의 공간적인 연결을 끊은 것이다."

[[dialogue]]
speaker = "unk"
original = "そんな秘儀を可能にしたのが、真祖ディアナによる『光の魔法』だった。"
translation = "그런 비의를 가능하게 한 것이, 진조 디아나에 의한 『빛의 마법』이었다."

[[dialogue]]
speaker = "unk"
original = "その奇跡とも呼べる結界は再構成の瘴気さえ完全に遮断し、結果、魔女の森はリクリエによる災禍からも免れた。"
translation = "그 기적이라고도 불리는 결계는 재구성의 장기마저 완전히 차단했고, 결과, 마녀의 숲은 리크리에로 인한 재앙에서도 벗어났다."

[[dialogue]]
speaker = "unk"
original = "だが……かつて絆を結んだはずの三界は、リクリエに呑まれ滅んでしまった。"
translation = "하지만…… 한때 인연을 맺었을 터인 삼계는, 리크리에에 삼켜져 멸망하고 말았다."

[[dialogue]]
speaker = "unk"
original = "魔女たちは彼らを恨まなかった。"
translation = "마녀들은 그들을 원망하지 않았다."

[[dialogue]]
speaker = "unk"
original = "ただ、一度は手を取り合ったはずの絆を捨て、自分たちだけが生き残ってしまったという消えない罪の意識だけが残った。"
translation = "다만, 한때 손을 잡았을 터인 인연을 버리고, 자신들만이 살아남고 말았다는 지워지지 않는 죄의식만이 남았다."

[[dialogue]]
speaker = "unk"
original = "ディアナには人間の盟友がいた。"
translation = "디아나에게는 인간인 맹우가 있었다."

[[dialogue]]
speaker = "unk"
original = "盟友から託された言葉が、いつまでも彼女の心に突き刺さっていた。"
translation = "맹우에게서 부탁받은 말이, 언제까지나 그녀의 마음에 박혀 있었다."

[[dialogue]]
speaker = "unk"
original = "『この世界は直に滅んでしまうようだ。君たちだけでも逃れたほうがいい』"
translation = "『이 세계는 곧 멸망할 것 같다. 너희들만이라도 피하는 편이 좋다』"

[[dialogue]]
speaker = "unk"
original = "さらに時は巡り、魔女たちは『森』でひっそりと暮らしながら幾度ものリクリエを観察した。"
translation = "시간은 더욱 흘러, 마녀들은 『숲』에서 조용히 살아가면서 여러 번의 리크리에를 관찰했다."

[[dialogue]]
speaker = "unk"
original = "魔女たちにとって、無力さを突きつけられる日々だった。"
translation = "마녀들에게 있어, 무력함을 직시당하는 나날이었다."

[[dialogue]]
speaker = "unk"
original = "隔絶された森から彼らに手を差し伸べることは叶わず、また実現したとてあの厄災を防げる保証などなかった。"
translation = "격절된 숲에서 그들에게 손을 내미는 것은 불가능했고, 또한 실현된다 한들 그 재앙을 막을 수 있다는 보장 따위는 없었다."

[[dialogue]]
speaker = "unk"
original = "それでも魔女たちは連綿と歴史を見つめながら──『リクリエ』について見識を深めていく。"
translation = "그럼에도 마녀들은 끊임없이 역사를 바라보며── 『리크리에』에 대해 식견을 깊게 해 나갔다."

[[dialogue]]
speaker = "unk"
original = "結果、多くのことがわかった。この厄災は何千年かに一度訪れ、すべてを無に帰していくのだと。"
translation = "결과, 많은 것을 알게 되었다. 이 재앙은 수천 년에 한 번 찾아와, 모든 것을 무로 되돌린다는 것을."

[[dialogue]]
speaker = "unk"
original = "そして終わりを迎えた先では、また新たな始まりがあるのだと。"
translation = "그리고 끝을 맞이한 그 앞에는, 또다시 새로운 시작이 있다는 것을."

[[dialogue]]
speaker = "unk"
original = "魔女たちの歴史、その礎にはずっと、太古の時代に築いた三種族たちとの絆があった。"
translation = "마녀들의 역사, 그 초석에는 줄곧, 태고 시대에 쌓았던 세 종족들과의 인연이 있었다."

[[dialogue]]
speaker = "unk"
original = "その過去を胸に、幾度も幾度も、世界の滅ぶさまを見続けてきた。"
translation = "그 과거를 가슴에 품고, 몇 번이고 몇 번이고, 세계가 멸망하는 모습을 계속 지켜보았다."

[[dialogue]]
speaker = "unk"
original = "そんな折だ。"
translation = "그러던 참이었다."

[[dialogue]]
speaker = "unk"
original = "旧森羅暦におけるリクリエは──『魔王』なる存在の率いたクルセイダースによって撃退された。"
translation = "구 신라력에서의 리크리에는── 『마왕』이라는 존재가 이끈 크루세이더스에 의해 격퇴되었다."

[[dialogue]]
speaker = "unk"
original = "それを契機に、再び『森』は三界へのアクセスが可能となった。"
translation = "그것을 계기로, 다시 『숲』은 삼계로의 접근이 가능해졌다."

[[dialogue]]
speaker = "unk"
original = "魔女たちにはこれまでの歴史を通じて得た膨大な叡智と魔法がある。"
translation = "마녀들에게는 지금까지의 역사를 통해 얻은 방대한 예지와 마법이 있다."

[[dialogue]]
speaker = "unk"
original = "そして魔王が予言した通り、次のリクリエはさらに数千年の時を経て必ずやってくる。"
translation = "그리고 마왕이 예언한 대로, 다음 리크리에는 더욱 수천 년의 시간을 거쳐 반드시 찾아온다."

[[dialogue]]
speaker = "unk"
original = "その規模は最高にして最大。どんな世界さえも抗えない必滅の厄災となって。"
translation = "그 규모는 최고이자 최대. 어떤 세계조차도 맞설 수 없는 필멸의 재앙이 되어서."

[[dialogue]]
speaker = "unk"
original = "ならば──今度こそリクリエを退ける一助となるのが自分たちの使命。魔女たちはそう考えた。"
translation = "그렇다면── 이번에야말로 리크리에를 물리치는 데 일조하는 것이 자신들의 사명. 마녀들은 그렇게 생각했다."

[[dialogue]]
speaker = "unk"
original = "今は亡き真祖ディアナの悲願を、今度こそ成就させよう、と。"
translation = "지금은 고인이 된 진조 디아나의 비원을, 이번에야말로 성취시키자고."

[[dialogue]]
speaker = "リノ"
original = "（始祖たちの願い……そうね。セドナも、理解してないはずがない。それでも……）"
translation = "（시조들의 소원…… 그렇지. 세드나도, 이해하지 못했을 리가 없어. 그런데도……）"

[[dialogue]]
speaker = "unk"
original = "それでも、この非情な作戦を遂行せざるを得なかった。"
translation = "그런데도, 이 비정한 작전을 수행할 수밖에 없었다."

[[dialogue]]
speaker = "unk"
original = "戦力差を見積もれば、今の星騎士では今代のリクリエには到底抗えないから。"
translation = "전력 차이를 가늠해 보면, 지금의 성기사로는 이번 대의 리크리에에는 도저히 맞설 수 없기 때문이다."

[[dialogue]]
speaker = "unk"
original = "その現実はリノも理解していただけに、ネビュラの決断は責められなかった。"
translation = "그 현실을 리노도 이해하고 있었기에, 네뷸라의 결단을 탓할 수 없었다."

[[dialogue]]
speaker = "カヤ"
original = "「……長官。この<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>さん、どうする？」"
translation = "「……장관. 이 야가 씨는, 어떻게 할까요?」"

[[dialogue]]
speaker = "セドナ"
original = "「お帰り願おう。我々も準備が忙しい。流星群は勢いを強めている──直に『<ruby>核<rt>コア</rt></ruby>』も姿を現すはずだ」"
translation = "「돌아가 주길 바라지. 우리도 준비가 바쁘다. 유성우는 기세를 더하고 있다── 곧 『핵』도 모습을 드러낼 터」"

[[dialogue]]
speaker = "リノ"
original = "「──待って」"
translation = "「──잠깐」"

[[dialogue]]
speaker = "リノ"
original = "「あなた達の決意は──よく理解したわ。でも、今回の流星群については、いくつか目測を見誤っていたはず」"
translation = "「당신들의 결의는── 잘 이해했어. 하지만, 이번 유성우에 대해서는, 몇 가지 예측을 잘못했을 터」"

[[dialogue]]
speaker = "アイリーン"
original = "「……確かに、私たちの予測よりいくらか早い到来でしたが」"
translation = "「……확실히, 저희의 예측보다 다소 이른 도래였습니다만」"

[[dialogue]]
speaker = "セドナ"
original = "「想定より多少早まっただけだ。今後の進行に支障はない」"
translation = "「상정보다 다소 빨라졌을 뿐이다. 이후의 진행에 지장은 없다」"

[[dialogue]]
speaker = "リノ"
original = "「その分、準備はいくらか不十分なはずよね」"
translation = "「그만큼, 준비는 다소 불충분할 터지」"

[[dialogue]]
speaker = "セドナ"
original = "「だったらなんだ──」"
translation = "「그렇다면 뭐란 말이냐──」"

[[dialogue]]
speaker = "リノ"
original = "「機会を頂戴」"
translation = "「기회를 줘」"

[[dialogue]]
speaker = "unk"
original = "セドナの言葉へ被せるように、リノはきっぱり告げた。"
translation = "세드나의 말에 덧씌우듯이, 리노는 단호하게 고했다."

[[dialogue]]
speaker = "セドナ"
original = "「時間がない──と言ったはずだが。何のつもりだ？」"
translation = "「시간이 없다──고 말했을 텐데. 무슨 속셈이냐?」"

[[dialogue]]
speaker = "リノ"
original = "「グレート・ウォールの実行を止める権利は私にはない。でも、その前に、私に賭けをさせて」"
translation = "「그레이트 월의 실행을 막을 권리는 나에게 없어. 하지만, 그전에, 나에게 내기를 하게 해 줘」"

[[dialogue]]
speaker = "セドナ"
original = "「……手段があるとでも？」"
translation = "「……수단이 있다는 것이냐?」"

[[dialogue]]
speaker = "unk"
original = "リノは、無言で慎重に頷いた。"
translation = "리노는, 말없이 신중하게 고개를 끄덕였다."

[[dialogue]]
speaker = "セドナ"
original = "「これより人間界を襲うのは、３０００年前のそれすら超えるリクリエの本波だ。魔女と星騎士が力を合わせたとて、打ち克つ可能性はゼロに近い」"
translation = "「지금부터 인간계를 덮칠 것은, 3000년 전의 그것조차 뛰어넘는 리크리에의 본파다. 마녀와 성기사가 힘을 합친다 한들, 이겨낼 가능성은 제로에 가깝다」"

[[dialogue]]
speaker = "リノ"
original = "「確かに私たちだけでは不十分でしょう。でも、それを言うなら３０００年前もそうだった」"
translation = "「확실히 우리만으로는 불충분하겠지. 하지만, 그렇게 말한다면 3000년 전도 마찬가지였어」"

[[dialogue]]
speaker = "unk"
original = "３０００年前のリクリエを退けたのは誰だったか？"
translation = "3000년 전의 리크리에를 물리친 것은 누구였던가?"

[[dialogue]]
speaker = "unk"
original = "リノの告げたい言葉は決まっていた──『魔王』。"
translation = "리노가 고하고 싶은 말은 정해져 있었다── 『마왕』."

[[dialogue]]
speaker = "リノ"
original = "「私があの子を拾った責任……それを果たさなくちゃいけないのが、今なの」"
translation = "「내가 그 아이를 주운 책임…… 그것을 다해야 하는 것이, 지금이야」"

[[dialogue]]
speaker = "リノ"
original = "「だけど、そのためには……気づいてもらう必要があるかもしれない」"
translation = "「하지만, 그러기 위해서는…… 깨닫게 해 줄 필요가 있을지도 몰라」"

[[dialogue]]
speaker = "リノ"
original = "「あの子に──自分が、何者なのか」"
translation = "「그 아이에게── 자신이, 누구인지」"

