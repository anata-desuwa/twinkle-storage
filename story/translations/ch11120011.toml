[[dialogue]]
speaker = "unk"
original = "第１話,極星星徒会・香堂チナ,P"
translation = "제1화, 극성 성도회・코도 치나, P"

[[dialogue]]
speaker = "チナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアのテーブルを挟んで向かい合っている相手は、<ruby>香堂<rt>こうどう</rt></ruby>チナ。"
translation = "카페테리아 테이블을 사이에 두고 마주 보고 있는 상대는, 코도 치나."

[[dialogue]]
speaker = "unk"
original = "デネブにある極星学園の星徒会に所属する星騎士だ。"
translation = "데네브에 있는 극성 학원의 성도회에 소속된 성기사다."

[[dialogue]]
speaker = "unk"
original = "チナはアルタイルを滅ぼそうと攻撃を仕掛けたが、その目論見は俺たちが阻止した。"
translation = "치나는 알타이르를 멸망시키려 공격을 시도했지만, 그 계획은 우리가 저지했다."

[[dialogue]]
speaker = "unk"
original = "その後、極星学園の星徒会長・ルヴィネの正体が、リクリエの側に立つ新たな女神であることが判明。"
translation = "그 후, 극성 학원의 성도회장 루비네의 정체가, 리크리에 편에 서는 새로운 여신임이 판명되었다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネの真意を確かめるため、チナは俺たちと共闘することになった。"
translation = "루비네의 진의를 확인하기 위해, 치나는 우리와 공투하게 되었다."

[[dialogue]]
speaker = "チナ"
original = "「言っておくが、お前らの仲間になったわけじゃないぞ。アタシはデネブを守るために戦うんだ」"
translation = "「말해두지만, 너희들의 동료가 된 건 아니야. 나는 데네브를 지키기 위해 싸우는 거다」"

[[dialogue]]
speaker = "チナ"
original = "「本当にデネブとアルタイルが滅ぼし合わないといけないなら、アタシはまたアルタイルと戦う。いいな？」"
translation = "「정말로 데네브와 알타이르가 서로 멸망시켜야 한다면, 나는 다시 알타이르와 싸울 거다. 알겠나?」"

[[dialogue]]
speaker = "unk"
original = "今はそれで構わないよ"
translation = "지금은 그걸로 상관없다"

[[dialogue]]
speaker = "チナ"
original = "「……少しは怒るなりビビるなりしろよ。調子狂うな……」"
translation = "「……조금은 화를 내거나 겁을 내거나 해라. 맥이 빠지네……」"

[[dialogue]]
speaker = "シノ"
original = "「すみません、お待たせしました」"
translation = "「죄송합니다, 기다리게 했습니다」"

[[dialogue]]
speaker = "チナ"
original = "「アタシたちを呼んだ張本人が来たな。アタシと魔王を会わせて何の用だ？」"
translation = "「우리를 부른 장본인이 왔군. 나와 마왕을 만나게 해서 무슨 용건이지?」"

[[dialogue]]
speaker = "シノ"
original = "「暫定的とはいえ、チナさんと共闘という形を取るのですから、親睦を深めたいと思いまして」"
translation = "「잠정적이라고는 해도, 치나 씨와 공투하는 형태를 취하는 것이니, 친목을 다지고 싶어서요」"

[[dialogue]]
speaker = "シノ"
original = "「そのために古来より催されてきたのが会食です。おふたりは学生ですから、せっかくなので学園のカフェテリアを選ばせてもらいました」"
translation = "「그를 위해 고대부터 개최되어 온 것이 회식입니다. 두 분은 학생이시니, 모처럼이니 학원의 카페테리아를 선택하게 했습니다」"

[[dialogue]]
speaker = "シノ"
original = "「ちなみに、これからアルタイルで生活するチナさんに、施設の使い方を覚えてもらおうという意図もあります」"
translation = "「덧붙여서, 이제부터 알타이르에서 생활할 치나 씨에게, 시설 사용법을 익히게 하려는 의도도 있습니다」"

[[dialogue]]
speaker = "チナ"
original = "「余計なお世話だ。魔王と仲良しこよしになる気はないっての」"
translation = "「쓸데없는 참견이다. 마왕과 사이좋게 지낼 생각은 없다고」"

[[dialogue]]
speaker = "シノ"
original = "「まぁまぁ、そう仰らずに。新星・極星両校の親睦の場ですから、お代は私が持ちますし、何でも頼んでいいですよ」"
translation = "「자자, 그렇게 말씀하지 마세요. 신성・극성 양교의 친목의 장이니, 비용은 제가 부담할 것이고, 뭐든지 주문해도 괜찮아요」"

[[dialogue]]
speaker = "チナ"
original = "「んなこと言われたって、こっちのカフェテリアのメニューなんて知らねえし……」"
translation = "「그런 말 해봤자, 이쪽 카페테리아 메뉴 같은 건 모르고……」"

[[dialogue]]
speaker = "unk"
original = "俺はウルトラグレートスペシャルパフェ！"
translation = "나는 울트라 그레이트 스페셜 파르페!"

[[dialogue]]
speaker = "チナ"
original = "「少しは遠慮しろよ！\u3000はぁ……考えるのも面倒だし、アタシもそれでいいや」"
translation = "「조금은 사양해라! 하아…… 생각하는 것도 귀찮으니, 나도 그걸로 됐어」"

[[dialogue]]
speaker = "シノ"
original = "「では私もいただきますね♪」"
translation = "「그럼 저도 먹겠습니다♪」"

[[dialogue]]
speaker = "チナ"
original = "「あんたも食うのかよ」"
translation = "「너도 먹는 거냐」"

[[dialogue]]
speaker = "unk"
original = "そしてテーブルの上に、３つのウルトラグレートスペシャルパフェが鎮座する。"
translation = "그리고 테이블 위에, 세 개의 울트라 그레이트 스페셜 파르페가 자리 잡는다."

[[dialogue]]
speaker = "チナ"
original = "「パフェ、でかっ……！？\u3000アタシの顔よりでかいんじゃないか……？」"
translation = "「파르페, 크잖아……!? 내 얼굴보다 더 큰 거 아니야……?」"

[[dialogue]]
speaker = "シノ"
original = "「おお～、これは予想以上のボリュームですね。お味は……ぱく」"
translation = "「오오~, 이건 예상 이상의 볼륨이네요. 맛은…… 냠」"

[[dialogue]]
speaker = "シノ"
original = "「ん～っ♪\u3000味もウルトラグレート級ですね♪\u3000ほら、チナさんと会長さんも食べてください」"
translation = "「음~♪ 맛도 울트라 그레이트급이네요♪ 자, 치나 씨랑 회장군도 드세요」"

[[dialogue]]
speaker = "チナ"
original = "「んじゃあ……あむっ」"
translation = "「그럼…… 앙」"

[[dialogue]]
speaker = "チナ"
original = "「んん……！？\u3000これはいけるな……！\u3000甘酸っぱいフルーツと、クリームのコクがマッチして……アイスもミルクの味が濃い」"
translation = "「음음……!? 이거 괜찮네……! 새콤달콤한 과일과, 크림의 깊은 맛이 조화를 이루고…… 아이스크림도 우유 맛이 진해」"

[[dialogue]]
speaker = "チナ"
original = "「あむ、あむ……これならパフェがでかくても、ペロッといけちゃうかもな」"
translation = "「냠, 냠…… 이 정도면 파르페가 커도, 홀랑 다 먹을 수 있을지도」"

[[dialogue]]
speaker = "シノ"
original = "「ささ、後は若い２人にお任せしますので、私のことは気にせず仲を深めてください」"
translation = "「자자, 나머지는 젊은 두 분께 맡길 테니, 저 신경 쓰지 마시고 친목을 다지세요」"

[[dialogue]]
speaker = "チナ"
original = "「お見合いか。ていうかあんた、アタシたちとそんな歳変わらないだろ」"
translation = "「선인가. 그보다 너, 우리랑 그렇게 나이 차이 안 나잖아」"

[[dialogue]]
speaker = "チナ"
original = "「まぁ、仏頂面でパフェつつくよりは、適当に話した方がマシか。アタシに何か聞きたいこととかあるか、魔王？」"
translation = "「뭐, 뚱한 표정으로 파르페 찔러 먹는 것보다는, 적당히 이야기하는 게 낫겠지. 나한테 뭐 물어보고 싶은 거라도 있냐, 마왕?」"

[[dialogue]]
speaker = "unk"
original = "ご趣味は？"
translation = "취미는?"

[[dialogue]]
speaker = "チナ"
original = "「お見合いか！」"
translation = "「선이냐!」"

[[dialogue]]
speaker = "チナ"
original = "「一応答えとくけど、アタシの趣味はゲームとスケボーだ。最近それどころじゃなくて、全然滑れてないけどな」"
translation = "「일단 대답해두는데, 내 취미는 게임이랑 스케이트보드다. 요즘 그럴 상황이 아니라서, 전혀 못 타고 있지만」"

[[dialogue]]
speaker = "シノ"
original = "「文句を言いつつも、しっかり答えるんですね」"
translation = "「불평하면서도, 제대로 대답해주시는군요」"

[[dialogue]]
speaker = "チナ"
original = "「うるさい。あんたがこの流れにしたんだろ」"
translation = "「시끄러워. 네가 이 흐름을 만든 거잖아」"

[[dialogue]]
speaker = "チナ"
original = "「アタシは答えたんだから、そっちも教えろ、魔王」"
translation = "「나는 대답했으니까, 너도 가르쳐줘, 마왕」"

[[dialogue]]
speaker = "チナ"
original = "「魔王の趣味は……漫画を読むことと、時代劇を見ること……？\u3000へぇ、意外と渋い趣味してるんだな」"
translation = "「마왕의 취미는…… 만화 읽는 거랑, 시대극 보는 거……? 헤에, 의외로 고풍스러운 취미를 가졌네」"

[[dialogue]]
speaker = "チナ"
original = "「そういや、漫画や時代劇も、きっとアルタイルじゃ残ってる作品もあるんだよな」"
translation = "「그러고 보니, 만화나 시대극도, 분명 알타이르에는 남아있는 작품도 있겠지」"

[[dialogue]]
speaker = "チナ"
original = "「デネブじゃ消えた作品もある。作者やスタッフがリクリエで死んだり、データが吹っ飛んだりして……いや、だからどうってわけじゃないけど」"
translation = "「데네브에서는 사라진 작품도 있어. 작가나 스태프가 리크리에로 죽거나, 데이터가 날아가거나 해서…… 아니, 그래서 어떻다는 건 아니지만」"

[[dialogue]]
speaker = "unk"
original = "チナから俺に聞きたいことはある？"
translation = "치나에게 나에게 묻고 싶은 것은 있어?"

[[dialogue]]
speaker = "チナ"
original = "「別に魔王のことなんて知りたくねえし……いや、１つだけある」"
translation = "「딱히 마왕에 대해 알고 싶지 않고…… 아니, 하나는 있어」"

[[dialogue]]
speaker = "チナ"
original = "「お前は、アルタイルもデネブも救いたいって言ってたよな。どうしてそう思った？\u3000自分の世界が大事じゃないのか？」"
translation = "「너는, 알타이르도 데네브도 구하고 싶다고 했지. 왜 그렇게 생각했어? 네 세계가 소중하지 않은 건가?」"

[[dialogue]]
speaker = "unk"
original = "もちろん<ruby>自分の世界<rt>アルタイル</rt></ruby>は大事だ。だけど俺は『誰かを救う』ために星騎士になった。"
translation = "물론 내 세계는 소중하다. 하지만 나는 '누군가를 구하기' 위해 성기사가 되었다."

[[dialogue]]
speaker = "unk"
original = "自分がモンスターにさらわれた時にある人に助けられたこと、そして彼がきっかけで星騎士を志したことをチナに話した。"
translation = "자신이 몬스터에게 납치당했을 때 어떤 사람에게 도움을 받은 것, 그리고 그가 계기가 되어 성기사를 지망하게 된 것을 치나에게 이야기했다."

[[dialogue]]
speaker = "チナ"
original = "「ふーん……人に助けられて星騎士に、か」"
translation = "「흐음…… 사람에게 도움을 받아서 성기사가, 인가」"

[[dialogue]]
speaker = "チナ"
original = "「まぁ、わからなくはないが……それでも自分の世界を優先するべきだろ」"
translation = "「뭐, 이해 못 할 건 아니지만…… 그래도 자기 세계를 우선해야 하는 거 아니야」"

[[dialogue]]
speaker = "unk"
original = "それでも俺はこの道を行く"
translation = "그래도 나는 이 길을 간다"

[[dialogue]]
speaker = "チナ"
original = "「……やっぱり理解できないな。そういうの、欲張りっていうんじゃないのか？」"
translation = "「……역시 이해할 수 없네. 그런 거, 욕심쟁이라고 하는 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "そうともいう"
translation = "그렇다고도 한다"

[[dialogue]]
speaker = "チナ"
original = "「自覚あるんじゃねーか。とんだ魔王様だ」"
translation = "「자각은 있는 거냐. 대단한 마왕님이네」"

[[dialogue]]
speaker = "チナ"
original = "「何度でも言うが、アタシはデネブが大事だ。どちらかを選ぶならデネブを間違いなく優先する」"
translation = "「몇 번이고 말하지만, 나는 데네브가 소중하다. 둘 중 하나를 선택해야 한다면 데네브를 틀림없이 우선할 거다」"

[[dialogue]]
speaker = "unk"
original = "故郷を守りたいチナの気持ちはよく知ってるよ"
translation = "고향을 지키고 싶은 치나의 마음은 잘 알고 있다"

[[dialogue]]
speaker = "チナ"
original = "「！\u3000わ、わかってればいいんだよ、ふんっ」"
translation = "「! 아, 알고 있으면 됐어, 흥」"

[[dialogue]]
speaker = "シノ"
original = "「なるほど……会長さんは、チナさんのことは既によくご存じだったのですね。今日は余計なお世話だったかもしれません」"
translation = "「과연…… 회장군은, 치나 씨에 대해서 이미 잘 알고 계셨군요. 오늘은 쓸데없는 참견이었을지도 모르겠습니다」"

[[dialogue]]
speaker = "シノ"
original = "「あ、そうそう。私からチナさんに渡すものがありまして」"
translation = "「아, 맞다. 제가 치나 씨에게 건네드릴 것이 있어서요」"

[[dialogue]]
speaker = "チナ"
original = "「渡すもの……？\u3000ていうかその大量の本は何だ？」"
translation = "「건네줄 것……? 그보다 그 많은 책들은 뭐냐?」"

[[dialogue]]
speaker = "シノ"
original = "「チナさんの分の教科書です」"
translation = "「치나 씨 몫의 교과서입니다」"

[[dialogue]]
speaker = "チナ"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker = "シノ"
original = "「チナさんは極星学園の星騎士であり、学生でもあります」"
translation = "「치나 씨는 극성 학원의 성기사이자, 학생이기도 합니다」"

[[dialogue]]
speaker = "シノ"
original = "「学生の仕事は青春、そして勉強。星騎士だからといって、勉学を疎かにしていいわけではありません」"
translation = "「학생의 일은 청춘, 그리고 공부. 성기사라고 해서, 학업을 소홀히 해도 되는 것은 아닙니다」"

[[dialogue]]
speaker = "シノ"
original = "「学園長としてチナさんの身を預かるからには、新星学園のせいで勉強ができなかったとは言わせません！」"
translation = "「학원장으로서 치나 씨의 신변을 맡는 이상, 신성 학원 때문에 공부를 못 했다는 말은 듣지 않겠습니다!」"

[[dialogue]]
speaker = "チナ"
original = "「ええ～～～っ！？」"
translation = "「에에~~~엣!?」"

[[dialogue]]
speaker = "シノ"
original = "「さ、今までの分もしっかり勉強しましょうね♪」"
translation = "「자, 지금까지의 분량까지 확실히 공부합시다♪」"

[[dialogue]]
speaker = "チナ"
original = "「いやちょっ、待っ──どうしてこうなるんだよ～～～っ！！？」"
translation = "「아니 잠깐, 기다── 왜 이렇게 되는 거냐고~~~!!!?」"

