[[dialogue]]
speaker = "unk"
original = "第７話,光の栞,B"
translation = "제7화, 빛의 책갈피, B"

[[dialogue]]
speaker = "unk"
original = "──それから。"
translation = "──그 후."

[[dialogue]]
speaker = "unk"
original = "俺たちは同じ帰路を辿り、学園の敷地まで戻った。"
translation = "우리는 같은 귀로를 따라, 학원 부지까지 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "流星学園と新星学園は姉妹校──そして、流星学園のほうが姉の関係にあたる。"
translation = "유성 학원과 신성 학원은 자매 학교──그리고, 유성 학원 쪽이 언니 관계에 해당한다."

[[dialogue]]
speaker = "unk"
original = "２校は同じ敷地に面していながら、授業でも顔を合わせることはないという静かなライバル関係にある。"
translation = "두 학교는 같은 부지에 면해 있으면서도, 수업에서는 서로 얼굴을 마주하는 일은 없다는 조용한 라이벌 관계에 있다."

[[dialogue]]
speaker = "unk"
original = "もっともこれは学園の意図通りで、よりよい星騎士の育成がため、競争意識を持たせるために併設されたんだとか。"
translation = "무엇보다 이것은 학원의 의도대로, 더 나은 성기사의 육성을 위해, 경쟁 의식을 갖게 하려고 병설된 것이라고 한다."

[[dialogue]]
speaker = "unk"
original = "事実ヴィーナスは対抗意識を燃やしっぱなしだったので効果てきめんと言えただろう。"
translation = "사실 비너스는 대항 의식을 계속 불태우고 있었으므로 효과 만점이었다고 말할 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "そこへいくと俺は新星に対しても新参だから……いささか帰属意識に欠けているのかもしれないな。"
translation = "거기에 비하면 나는 신성 학원에 대해서도 신참이니까…… 다소 귀속 의식이 부족한 것일지도 모르겠다."

[[dialogue]]
speaker = "unk"
original = "放課後。"
translation = "방과 후."

[[dialogue]]
speaker = "unk"
original = "一度は解散になった俺たちだったが、星見会長の誘いによって再び集まっていた。"
translation = "일단은 해산했던 우리였지만, 호시미 회장의 권유로 다시 모여 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──改めてご足労いただきありがとうございます、緋宮会長。九浄さん」"
translation = "「──다시 한번 발걸음 해 주셔서 감사합니다, 히노미야 회장님. 쿠죠 씨.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「構わないよ。むしろ俺たちのほうこそ話を聞きたかった」"
translation = "「괜찮아. 오히려 우리 쪽이야말로 이야기를 듣고 싶었어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヴィーナスでいいわよ。流星のメンバーもなかなか濃ゆそうで気になっちゃったわね」"
translation = "「비너스로 됐어. 유성 학원 멤버도 꽤나 진해 보여서 신경 쓰이게 됐네.」"

[[dialogue]]
speaker = "unk"
original = "そんな話をしながら２人に連れてこられたのは、学園敷地内でも俺が足を踏み入れたことのない場所だった。"
translation = "그런 이야기를 하면서 두 사람에게 이끌려 온 곳은, 학원 부지 내에서도 내가 발을 들여놓은 적 없는 장소였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここは……大聖堂ファリア、だったか」"
translation = "「여기는…… 대성당 파리아, 였던가.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そういえば──クロトは大聖堂に来たことはあるのかしら？」"
translation = "「그러고 보니──쿠로토는 대성당에 와 본 적이 있니?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「小さい頃、何度か礼拝にはな。ただ──こんな平日に入ったのは初めてだ」"
translation = "「어릴 때, 몇 번 예배에는. 다만──이렇게 평일에 들어온 건 처음이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここは……普通に両校の生徒が集まるんだな」"
translation = "「여기는…… 평범하게 양쪽 학교 학생들이 모이는구나.」"

[[dialogue]]
speaker = "unk"
original = "大聖堂の景観は他と比べて特殊だった。"
translation = "대성당의 경관은 다른 곳과 비교해 특수했다."

[[dialogue]]
speaker = "unk"
original = "流星学園と新星学園、どちらもの制服を着た生徒たちが一堂に会しているのは……今だからこそ、不思議に思う。"
translation = "유성 학원과 신성 학원, 양쪽 모두의 교복을 입은 학생들이 한자리에 모여 있는 것은…… 지금이기에, 신기하게 느껴진다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「大聖堂は両校の中立地帯なのニャン！\u3000ここでは特に制約なく交流することが許可されているのニャン！」"
translation = "「대성당은 양쪽 학교의 중립 지대인 거냥! 여기서는 특별한 제약 없이 교류하는 것이 허가되어 있는 거냥!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「地理的にも流星、新星の中心に位置していますね」"
translation = "「지리적으로도 유성 학원, 신성 학원의 중심에 위치하고 있습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、元々交流しちゃダメなんてルールはないけど……なんとなくここが丁度いい場所ってわけ♪」"
translation = "「뭐, 원래 교류하면 안 된다는 규칙은 없지만…… 왠지 모르게 여기가 딱 좋은 장소인 거지♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なるほど」"
translation = "「과연.」"

[[dialogue]]
speaker = "unk"
original = "ただ、その両校どちらもの生徒から視線を向けられているのは……"
translation = "다만, 그 양쪽 학교 학생들 모두에게 시선을 받고 있는 것은……"

[[dialogue]]
speaker = "unk"
original = "会長同士が顔を突き合わせているからなんだろうな。"
translation = "회장끼리 얼굴을 맞대고 있기 때문이겠지."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「カフェへ行きましょうか。あそこなら、落ち着いてお話もできるはずです」"
translation = "「카페로 갈까요. 거기라면, 차분하게 이야기도 나눌 수 있을 겁니다.」"

[[dialogue]]
speaker = "unk"
original = "大聖堂にはカフェテリアまで併設されていた。"
translation = "대성당에는 카페테리아까지 병설되어 있었다."

[[dialogue]]
speaker = "unk"
original = "俺たちはひとつのテーブルを囲み、会話を始める。"
translation = "우리는 하나의 테이블을 둘러싸고, 대화를 시작한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こんな風になってるんだな……星見会長は、よくここに来るのか？」"
translation = "「이렇게 되어 있구나…… 호시미 회장은, 여기 자주 오나?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そう堅く仰らずとも。フィオナで構いませんよ、お２人とも」"
translation = "「그렇게 딱딱하게 말씀하지 않으셔도. 피오나로 괜찮습니다, 두 분 모두.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。フィオナ」"
translation = "「알았다. 피오나.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「相変わらず名前呼びのハードルが低いわね……」"
translation = "「여전히 이름 부르기의 허들이 낮네……」"

[[dialogue]]
speaker = "unk"
original = "ある程度フィオナとの距離感も掴めたところで、話題は彼女のそばにいた２人（１人と１匹？）へと移った。"
translation = "어느 정도 피오나와의 거리감도 잡힌 시점에서, 화제는 그녀의 곁에 있던 두 사람(한 명과 한 마리?)에게로 옮겨갔다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「２人とも。彼らに自己紹介をしてくれる？」"
translation = "「두 분 모두. 그들에게 자기소개를 해 주시겠어요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はい」"
translation = "「네.」"

[[dialogue]]
speaker = "unk"
original = "そうフィオナに促されたのは、ずっと彼女に付き従っていた女性と──一匹だった。"
translation = "그렇게 피오나에게 재촉받은 것은, 줄곧 그녀를 따르던 여성과── 한 마리였다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「<ruby>上月<rt>こうづき</rt></ruby>キリカと申します。星見家の秘書……またフィオナ様のお付きを務めております。以後お見知り置きを」"
translation = "「카미즈키 키리카라고 합니다. 호시미 가문의 비서…… 또한 피오나 님을 모시고 있습니다. 이후 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ワガハイはニャリオンである！\u3000偉大なるフィオナ嬢に召喚された使い魔にして、第一の臣下なのニャン！」"
translation = "「짐은 냐리온이다! 위대하신 피오나 아가씨에게 소환된 사역마이자, 제1의 신하인 거냥!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「キリカは星見家メイド隊のメイド長も務めています。ですので学生ではありませんが、うちと学園を行き来してもらっていますね」"
translation = "「키리카는 호시미 가문 메이드대의 메이드장도 맡고 있습니다. 그래서 학생은 아니지만, 저희 집과 학원을 오가도록 하고 있습니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「星見家……というと、流星教皇庁の──あの星見家だよな」"
translation = "「호시미 가문……이라고 하면, 유성 교황청의── 그 호시미 가문이 맞지.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はい。フィオナ様のお父上──教皇様は、流星・新星学園の理事長も務められています」"
translation = "「네. 피오나 님의 아버님── 교황님은, 유성・신성 학원의 이사장도 맡고 계십니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（メイドに使い魔まで連れてるなんて……すごい人たちだな。流星の星徒会は）」"
translation = "「(메이드에 사역마까지 데리고 있다니…… 대단한 사람들이군. 유성 학원의 성도회는.)」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「（ぐぬぬ……このまま引き下がるわけには……）」"
translation = "「(크으윽…… 이대로 물러설 수는……)」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「（そうだ。いっそのこと、アナたちもクロトの使い魔ってことにしちゃう？）」"
translation = "「(그래. 이참에, 아나들도 쿠로토의 사역마라고 해 버릴까?)」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（みんなに怒られるよ……）」"
translation = "「(모두에게 혼날 거야……)」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは流星に対してライバル心を燃やしていた。"
translation = "비너스는 유성 학원에 대해 라이벌 의식을 불태우고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女の九浄家も国内外に名を轟かせる『五名門』のひとつなのだが、どうも本人に家柄を誇る気はないらしい。"
translation = "그녀의 쿠죠 가문도 국내외에 이름을 떨치는 『오명문』 중 하나인데, 아무래도 본인은 가문을 자랑할 생각은 없는 듯하다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ。では、お互いのこともわかったところで……本題と参りましょう」"
translation = "「후후. 그럼, 서로에 대해서도 알게 되었으니…… 본론으로 들어갑시다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……アステラだな。事態を未然に解決してくれて、俺たちとしては助かった」"
translation = "「……아스테라 말이군. 사태를 미연에 해결해 줘서, 우리로서는 도움이 됐어.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。何事もなくてよかった──のですが。少々、頭を悩ませることも」"
translation = "「네. 아무 일 없어서 다행입니다──만. 약간, 머리를 앓게 하는 것도 있습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000アステラは消したのに？」"
translation = "「? 아스테라는 없앴는데?」"

[[dialogue]]
speaker = "unk"
original = "アステラはリクリエの影響によって生じるモンスターの巣だと聞いている。"
translation = "아스테라는 리크리에의 영향으로 생기는 몬스터의 소굴이라고 듣고 있다."

[[dialogue]]
speaker = "unk"
original = "彼女たちもその認識に誤りはないようだが、それゆえのイレギュラーが発生したという。"
translation = "그녀들도 그 인식이 틀리지 않은 듯하지만, 그렇기에 이레귤러가 발생했다고 한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「キリカ。例のものをくれる？」"
translation = "「키리카. 예의 그것을 주시겠어요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「こちらです」"
translation = "「이것입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは……？」"
translation = "「이것은……?」"

[[dialogue]]
speaker = "unk"
original = "メイドのキリカさんがテーブルの上に取り出したもの。"
translation = "메이드인 키리카 씨가 테이블 위에 꺼내 놓은 것."

[[dialogue]]
speaker = "unk"
original = "それは、白い羽の形をした栞だった。"
translation = "그것은, 하얀 깃털 모양을 한 책갈피였다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これは、私たちがあのアステラの最奥にて手に入れたもの。そして……」"
translation = "「이것은, 저희가 그 아스테라의 가장 깊은 곳에서 손에 넣은 것입니다. 그리고……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その場にいたのはモンスターではなく──一人の堕天使でした」"
translation = "「그곳에 있던 것은 몬스터가 아니라── 한 명의 타락천사였습니다.」"

