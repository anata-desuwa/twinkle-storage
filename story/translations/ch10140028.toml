[[dialogue]]
speaker = "unk"
original = "これは、わたしと会長くんがトレーニングルームでエッチしちゃうよりも、ずっと前の出来事。"
translation = "이것은 나와 회장 군이 트레이닝 룸에서 섹스해 버리기보다 훨씬 전의 일."

[[dialogue]]
speaker = "unk"
original = "会長くんとまだ初体験を済ませる前の、初々しかった頃の思い出だ。"
translation = "회장 군과 아직 첫 경험을 치르기 전인, 풋풋했던 시절의 추억이다."

[[dialogue]]
speaker = "unk"
original = "会長くんと恋人になってから、しばらく経ったある日のこと──"
translation = "회장 군과 연인이 되고 나서 시간이 꽤 흐른 어느 날──"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（うぅぅ～～。お家デートはすんなりできるくらいには慣れてきたけど、やっぱりまだまだ、わかんないことだらけだよぉ）"
translation = "（으으~~. 집 데이트는 수월하게 할 수 있을 정도로 익숙해졌지만, 역시 아직 모르는 것투성이야）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（ここ最近、会長くんの家に遊びに来るときはこっそり可愛い下着を付けてきてはいるんだけど、年上のくせにがっつきすぎかなっ！？）"
translation = "（요즘 들어 회장 군의 집에 놀러 올 때는 몰래 귀여운 속옷을 입고 오긴 하는데, 연상 주제에 너무 밝히는 걸까!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（エッチは卒業まで待つべき……？\u3000でもでも、男の子って本当はすぐにでもエッチしたいっていうし、わたしも別に全然ＯＫというか……）"
translation = "（섹스는 졸업까지 기다려야 할까……? 그치만 그치만, 남자애들은 사실 당장이라도 섹스하고 싶어 한다고 하고, 나도 딱히 전혀 OK라고 할까……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こほんっ、トワちゃん。顔赤くしながら、股間を凝視してたら、考えてること筒抜けだよ……？」"
translation = "「큼큼, 토와짱. 얼굴 붉히면서 가랑이를 응시하고 있으면 생각하는 거 다 들킨다고……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふぇぇ！？\u3000わたし、そんなにわかりやすい顔してたっ！？」"
translation = "「후에에!? 나 그렇게 알기 쉬운 표정이었어!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この際はっきり言うけど……トワちゃんさえよければ、俺はいつだってトワちゃんとエッチなことしたいって思ってる」"
translation = "「이왕 이렇게 된 거 확실히 말하겠는데…… 토와짱만 괜찮다면 난 언제든 토와짱이랑 야한 짓 하고 싶다고 생각하고 있어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、えっと……えへへぇ。そ、そうなんだぁ」"
translation = "「앗, 에토…… 에헤헤. 그, 그렇구나」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じ、じゃあ、２人だけの秘密、ってことで……ね？」"
translation = "「그, 그럼 둘만의 비밀인 걸로…… 알았지?」"

[[dialogue]]
speaker = "unk"
original = "会長くんは真剣な表情で頷くと、わたしは手を引かれて彼の部屋へと連れ込まれてしまった。"
translation = "회장 군은 진지한 표정으로 고개를 끄덕였고, 나는 손을 이끌려 그의 방으로 끌려 들어가 버렸다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（はうあぁぁっ<emoji=heart04>\u3000こ、これっ、正常位……！\u3000彼氏とラブラブでエッチなことする時の、正常位ってやつだぁ……！）"
translation = "（하우아아앗<emoji=heart04> 이, 이거 정상위……! 남자친구랑 러브러브하게 야한 짓 할 때의 정상위라는 거야……!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（って、わたしも会長くんもいつの間にか素っ裸だし、緊張しすぎて、自分がどうやって服脱いだのかも覚えてないよぉ！？）"
translation = "（그보다 나도 회장 군도 어느새 알몸이고, 너무 긴장해서 내가 어떻게 옷을 벗었는지도 기억 안 나!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぅぅぅ……ごめんね？\u3000会長くん。わたしの方が大人で先生なのに、いっつも舞い上がっちゃって、何も教えてあげられなくて……」"
translation = "「으으으…… 미안해? 회장 군. 내가 더 어른이고 선생님인데, 맨날 들떠서 아무것도 못 가르쳐주고……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トワちゃんには色んな気持ちを教えてもらってるし、舞い上がってるのは俺も一緒だから、変なこと気にしないで」"
translation = "「토와짱에겐 여러 가지 감정을 배우고 있고, 들떠 있는 건 나도 마찬가지니까 이상한 거 신경 쓰지 마」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぅ……会長くん、優しいよぉ。好きぃ<emoji=heart04>」"
translation = "「으으…… 회장 군, 다정해. 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も好きだよ、トワちゃん。……あとは、他にどうしてほしいとかある？」"
translation = "「나도 좋아해, 토와짱. ……그다음은, 달리 어떻게 해줬으면 하는 거 있어?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あぅぅ……<emoji=heart04>\u3000そ、そしたら、今繋いでる手を、ね？\u3000エッチしてる間、ずっと繋いでてくれたら、すごく嬉しいかも」"
translation = "「아으으……<emoji=heart04> 그, 그러면 지금 잡고 있는 손을 말이야? 섹스하는 동안 계속 잡고 있어 주면 정말 기쁠지도」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、うふふっ<emoji=heart04>\u3000恋人握りした手、今、ぎゅってしてくれたぁ<emoji=heart04>\u3000うんっ、こうやって手を繋いでてくれると、ドキドキしてるのに安心できて、すっごく温かい気持ちになるの<emoji=heart04>」"
translation = "「앗, 우후후<emoji=heart04> 깍지 낀 손, 지금 꽉 쥐어줬어<emoji=heart04> 응, 이렇게 손을 잡고 있어 주면 두근거리면서도 안심돼서 정말 따뜻한 기분이 들어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（って、嘘うそっ！？\u3000会長くんが手をぎゅって握るだけで、まだ刺激もされてない膣の中、濡れてきちゃってるっ！？）"
translation = "（그보다, 거짓말!? 회장 군이 손을 꽉 잡는 것만으로도 아직 자극받지도 않은 질 안이 젖어오고 있어!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（『初めては幸せだけど、結構痛い』って聞いてたけど、わたしって体格の割に結構エッチな体だったりする……！？）"
translation = "（『처음은 행복하지만 꽤 아프다』고 들었는데, 나 체격에 비해서 꽤 야한 몸인 걸까……!?）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（今だって、会長くんのあそこが擦れるだけでも、なんかほんのり気持ちいいんだけどぉ！）"
translation = "（지금도 회장 군의 거기가 스치는 것만으로도 왠지 은근히 기분 좋은데!）"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ？\u3000ううん、なんでもないよっ。……他にしてほしいこと？\u3000あっ、そ、それなら……」"
translation = "「엣? 으응, 아무것도 아니야. ……달리 해줬으면 하는 거? 앗, 그, 그렇다면……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんの……お、おち○ちんっ……挿れる前に、わたしの、お、おま○こに……擦りつけて欲しい、かも……<emoji=heart04>」"
translation = "「회장 군의…… 자, 자지…… 넣기 전에 내 보지에…… 문질러 줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん……いきなり挿れるのは、まだちょっと怖いけど……会長くんにも、早くわたしの体で、気持ち良くなって欲しいから<emoji=heart04>」"
translation = "「응…… 갑자기 넣는 건 아직 좀 무섭지만…… 회장 군도 빨리 내 몸으로 기분 좋아졌으면 하니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんの、おち○ちん<emoji=heart04>\u3000気持ち良く、なってほしいの……<emoji=heart04>」"
translation = "「회장 군의 자지<emoji=heart04> 기분 좋아졌으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん……<emoji=heart04>\u3000男の子って、恋人が『おち○ちん』とか『おま○こ』って卑猥な言葉遣いすると、興奮するんでしょ……？\u3000あっ<emoji=heart04>\u3000ほら、おち○ちん、ぴくぴくしてる」"
translation = "「으, 응……<emoji=heart04> 남자애들은 연인이 『자지』라든가 『보지』 같은 천박한 말을 쓰면 흥분하는 거지……? 앗<emoji=heart04> 봐, 자지 움찔움찔하고 있어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「やっぱり、そうなんだぁ<emoji=heart04>\u3000じゃ、じゃあ……まだちょっと恥ずかしい、けど……これからも『おち○ちん』とか『おま○こ』って、呼ぶね？<emoji=heart04>」"
translation = "「역시 그렇구나<emoji=heart04> 그, 그럼…… 아직 좀 부끄럽지만…… 앞으로도 『자지』라든가 『보지』라고 부를게?<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はっ、あぁぁぁ<emoji=heart04>\u3000会長くんのおち○ちん、ぬるぬるしてきたぁ<emoji=heart04>\u3000うんっ<emoji=heart04>\u3000わたしのおま○こも、ぬるぬるしてきてるよぉ<emoji=heart04>\u3000エッチなことする準備、始めちゃってるの<emoji=heart04>」"
translation = "「핫, 아아아<emoji=heart04> 회장 군의 자지, 미끈미끈해졌어<emoji=heart04> 응<emoji=heart04> 내 보지도 미끈미끈해지고 있어<emoji=heart04> 야한 짓 할 준비 시작해버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あとは……ふぅぅ<emoji=heart04>\u3000キスしよぉ<emoji=heart04>\u3000おち○ちんとおま○こを擦り合わせながら、キスしたぁい……<emoji=heart04>」"
translation = "「그리고…… 후우<emoji=heart04> 키스하자<emoji=heart04> 자지랑 보지를 문지르면서 키스하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んっ……ちゅっ<emoji=heart04>\u3000ちゅ、ちゅっ<emoji=heart04>\u3000はぁぁ……ちゅぷぷっ、くちゅるっ、ちゅちゅちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04> 쯉, 쯉<emoji=heart04> 하아…… 츄릅, 쿳츄, 쯉쯉쯉<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はっ、あはぁぁっ<emoji=heart04>\u3000すごいよぉ<emoji=heart04>\u3000直接、触ってないのにぃ……好きな人に愛してもらってるって思うだけでっ<emoji=heart04>\u3000おま○こ、どんどん気持ち良くなってきちゃってるぅ……<emoji=heart04>」"
translation = "「핫, 아하아앗<emoji=heart04> 대단해…… 직접 만지지 않았는데도…… 좋아하는 사람에게 사랑받고 있다고 생각하는 것만으로! 보지, 점점 기분 좋아져 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ……キス<emoji=heart04>\u3000たくさんキスしよぉ<emoji=heart04>\u3000ちゅぷっ……はぷちゅっ<emoji=heart04>\u3000ちゅる、ちゅるっ、くちゅる<emoji=heart04>\u3000れちゅるっ、じゅるる……はちゅんっ<emoji=heart04>」"
translation = "「앗…… 키스<emoji=heart04> 키스 많이 하자<emoji=heart04> 쯉…… 하웁쯉<emoji=heart04> 츄릅, 츄릅, 쿳츄<emoji=heart04> 레츄릅, 쥬르르…… 하아쯉<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぅぅぅ<emoji=heart04>\u3000すごいよぉ、会長くぅん<emoji=heart04>\u3000わたしの体、今までにないくらい、気持ち良くなっちゃってるのぉ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>」"
translation = "「하으으으<emoji=heart04> 대단해, 회장 구운<emoji=heart04> 내 몸, 지금까지 없었을 정도로 기분 좋아져 버렸어. 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だから、もう、大丈夫だから……<emoji=heart04>\u3000はぁぁぁ<emoji=heart04>\u3000会長くんのおち○ちん、挿れてぇ……<emoji=heart04>」"
translation = "「그러니까 이제 괜찮으니까……<emoji=heart04> 하아아아<emoji=heart04> 회장 군의 자지, 넣어줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふわぁぁぁぁっ<emoji=heart04><emoji=heart04>\u3000おち○ちん、挿って来たぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후와아아아앗<emoji=heart04><emoji=heart04> 자지 들어왔어어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はあぁぁ～～～っ<emoji=heart04>\u3000あああっ、んふぅぅうんっ<emoji=heart04>\u3000すごいよぉ、おっきぃ……<emoji=heart04>\u3000はぁぁぁ、んふぅぅ<emoji=heart04>」"
translation = "「하아아~~~앗<emoji=heart04> 아아앗, 응후우우운<emoji=heart04> 대단해, 커……<emoji=heart04> 하아아아, 응후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ？\u3000い、痛くないか……って？\u3000う、うんっ<emoji=heart04>\u3000覚悟してたんだけど、正直、全然痛くなかったよぉ……<emoji=heart04>」"
translation = "「엣? 아, 아프지 않냐고……? 으, 응<emoji=heart04> 각오했었는데 솔직히 전혀 안 아팠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はふぅ<emoji=heart04>\u3000ずっと繋いでてくれた手がねっ、ぎゅっ、ぎゅって……わたしのこと気遣うみたいに、何度も握りしめてくれた、からぁ……<emoji=heart04>」"
translation = "「하후우<emoji=heart04> 계속 잡고 있어 준 손이 말이야, 꽉, 꽉 하고…… 나를 배려해 주는 것처럼 몇 번이고 쥐어줬으니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それにたくさん、キスもしてくれて……<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000好きって、言ってくれた、からぁ<emoji=heart04>\u3000んっ、ふぅぅぅ……<emoji=heart04>」"
translation = "「게다가 키스도 잔뜩 해주고……<emoji=heart04> 하아앙<emoji=heart04> 좋아한다고 말해줬으니까……<emoji=heart04> 응, 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたしぃ、会長くんに愛されてるんだって感じるだけでっ<emoji=heart04>\u3000お腹の奥……うぅん、おま○こが、ね？<emoji=heart04>\u3000キュンキュンして、どんどん気持ち良く、なってきちゃうのぉ<emoji=heart04>」"
translation = "「나, 회장 군에게 사랑받고 있다고 느끼는 것만으로! 배 속 깊은 곳…… 아니, 보지가 말이야?<emoji=heart04> 큥큥거려서 점점 더 기분 좋아져 버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぅぅぅ～～……なんかわたし、興奮しすぎて、とんでもないこと、はぁぁっ<emoji=heart04>\u3000口走っちゃってない？\u3000処女なのに淫乱とか、ドン引きだよね……？」"
translation = "「으으으~~…… 왠지 나 너무 흥분해서 엄청난 소리를 하아앗<emoji=heart04> 내뱉고 있지 않아? 처녀인데 음란하다니, 정떨어지지……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トワちゃんの性欲が強かったなんて知ったら、嬉しくてもっと好きになっちゃうよ」"
translation = "「토와짱의 성욕이 강했다는 걸 알면 기뻐서 더 좋아하게 될 거야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぅあぁぁっ<emoji=heart04>\u3000はっ、あぁぁんっ<emoji=heart04>\u3000それ、殺し文句だよぉ<emoji=heart04>\u3000わたし、会長くんの言葉だけで、おま○こ気持ち良く、なっちゃってるぅぅ<emoji=heart04>」"
translation = "「하으아앗<emoji=heart04> 하앗, 아아앙<emoji=heart04> 그거 완전 뿅 가버리는 말이야<emoji=heart04> 나 회장 군의 말만으로 보지 기분 좋아져 버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「他にはもっとないの？\u3000トワちゃんが淫乱で恥ずかしい、俺好みの女の子だっていう情報」"
translation = "「그 외에는 더 없어? 토와짱이 음란해서 부끄러운, 내 취향의 여자애라는 정보」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ん、ふわぁぁぁぁっ<emoji=heart04>\u3000会長くん、ドＳだぁ……<emoji=heart04>\u3000私の彼氏、Ｓなんだぁ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000たぶんわたし、Ｍだからぁ、すっごく相性、いいかもぉ……<emoji=heart04>」"
translation = "「응, 후와아아아앗<emoji=heart04> 회장 군, 도S야……<emoji=heart04> 내 남자친구, S구나<emoji=heart04> 하아앙<emoji=heart04> 아마 나 M이라서 정말 궁합 좋을지도 몰라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごい、入れてるだけなのに、どんどん濡れてくるよ。もっと他にはないの？」"
translation = "「대단해, 넣고만 있는데도 점점 젖어오네. 더 다른 건 없어?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「他に……？\u3000はぁぁ<emoji=heart04>\u3000他って言われてもぉ、わたしもエッチするの、今日が初めてだからぁ……<emoji=heart04>\u3000ふあぁぁん<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「다른 거……? 하아아<emoji=heart04> 다른 거라고 해도 나도 섹스하는 거 오늘이 처음이라……<emoji=heart04> 후아아앙<emoji=heart04> 응응으<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ<emoji=heart04>\u3000そうだぁ<emoji=heart04>\u3000ひとりエッチ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000オナニーする時はぁ、クリトリス<emoji=heart04>\u3000クリトリスをいじめてもらう妄想しながらぁ、たくさん弄ってましたぁ<emoji=heart04>\u3000あぁぁん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 맞다<emoji=heart04> 자위<emoji=heart04> 하아앙<emoji=heart04> 자위할 때는 클리토리스<emoji=heart04> 클리토리스를 괴롭힘당하는 망상을 하면서 잔뜩 만졌습니다아<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、クリトリスを撫でながらピストンしてあげるね……それに、もうかなりほぐれてきたから、大丈夫そうかな」"
translation = "「그럼 클리토리스를 매만지면서 피스톤 해줄게…… 그리고 이미 꽤 풀어졌으니까 괜찮을 것 같네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗──<emoji=heart04><emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 후아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아앙<emoji=heart04> 후아아앗<emoji=heart04> 응…… 하아앗<emoji=heart04> 앙<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くん、好きぃ<emoji=heart04>\u3000また手、ぎゅって握ってくれてぇ……<emoji=heart04>\u3000ふわぁぁぁぁっ<emoji=heart04>\u3000反対の手で、クリトリスなでなでされちゃったらぁ<emoji=heart04>\u3000ああああっ、感じすぎちゃうよぉ<emoji=heart04>」"
translation = "「회장 군, 좋아해<emoji=heart04> 또 손, 꼬옥 잡아주고……<emoji=heart04> 후와아아아앗<emoji=heart04> 반대쪽 손으로 클리토리스 쓰담쓰담 당해버리면어어<emoji=heart04> 아아아앗, 너무 느껴버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ<emoji=heart04>\u3000すごいっ、好きな人とのセックス、すごいよぉ<emoji=heart04>\u3000こんなの気持ち良すぎるぅ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 대단해애, 좋아하는 사람이랑 하는 섹스, 대단해에<emoji=heart04> 이런 거 너무 기분 조아아<emoji=heart04> 아아앗<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「おま○こ、溶けちゃうよぉぉ……<emoji=heart04>\u3000あんっ、はぁぁん<emoji=heart04>\u3000外のクリトリスと、おま○この中、両方気持ち良くてぇ、ドロドロに溶けちゃうよぉぉ<emoji=heart04>」"
translation = "「보지, 녹아버려어어……<emoji=heart04> 앙, 하아앙<emoji=heart04> 겉에 있는 클리토리스랑 보지 안쪽, 양쪽 다 기분 조아서어, 걸쭉하게 녹아버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「刺激がきつすぎるとかは……ない？\u3000トワちゃん」"
translation = "「자극이 너무 세다거나 하진…… 않아? 토와짱」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あぁぁん<emoji=heart04>\u3000ないの、全然ないよぉ、会長くんっ<emoji=heart04>\u3000だから怖いのっ<emoji=heart04>\u3000気持ち良すぎてぇ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000わたしってすっごく、エッチだったんじゃないかって<emoji=heart04>\u3000ふぁぁん<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 업써, 전혀 업써어, 회장 군!<emoji=heart04> 그래서 무서어<emoji=heart04> 너무 기분 조아서어<emoji=heart04> 아앙<emoji=heart04> 나 사실은 저어엉말, 음란했던 게 아닐까 시퍼서어<emoji=heart04> 화앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さっきも言ったでしょ。トワちゃんがエッチでも、もっと好きになるだけだよ。だからもっと見せて」"
translation = "「아까도 말했잖아. 토와짱이 음란해도 더 좋아하게 될 뿐이야. 그러니까 더 보여줘」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぁぁぁんっ<emoji=heart04>\u3000わかったぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000見せるっ<emoji=heart04>\u3000見せるよぉ<emoji=heart04>\u3000会長くんにだけはっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000わたしのエッチなところ、全部、見せちゃうからぁ<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 알게써어<emoji=heart04> 앙<emoji=heart04> 보여줄게에<emoji=heart04> 보여줄 거야아<emoji=heart04> 회장 군한테만으은!<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 내 야한 모습, 전부 보여줄 테니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000だから、だから会長くんも……んふぅぅぅ<emoji=heart04>\u3000わたしのおま○こで、気持ち良くなってぇ……<emoji=heart04>\u3000あっ、あっ、あっ、あぁぁぁああっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하아앙<emoji=heart04> 그러니까, 그러니까 회장 군도…… 응후으으으<emoji=heart04> 내 보지로 기분 조아져서어……<emoji=heart04> 앗, 앗, 앗, 아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うんっ……俺ももう、これ以上はセーブできなさそう、だから……っ」"
translation = "「응…… 나도 이제 더 이상은 절제 못 할 것 같으니까……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗──<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000激しいっ<emoji=heart04>\u3000……ふあぁぁん<emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000はっ、ふああぁぁぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 격해애!<emoji=heart04> ……후아아앙<emoji=heart04> 앙, 앙, 앙<emoji=heart04> 하아아앙<emoji=heart04> 하앗, 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「おち○ちん、気持ちいいよぉ<emoji=heart04>\u3000あっ、あっ、あっ、んあぁぁぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいいのぉ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「자지, 기분 조아아<emoji=heart04> 앗, 앗, 앗, 응아아아앗<emoji=heart04> 기분 조아아<emoji=heart04> 기분 조은 거 가태에……<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんも、気持ちいいっ？<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000もっともっと、わたしで気持ち良くなってぇ<emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「회장 군도 기분 조아?<emoji=heart04> 하아앙<emoji=heart04> 기뻐어!<emoji=heart04> 좀 더 좀 더, 나로 기분 조아져어<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うんっ<emoji=heart04>\u3000うんっ<emoji=heart04>\u3000手もずっと握っててくれるのっ、わかってるからぁ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000あっ、あっ、んああぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 손도 계속 잡아주고 있는 거 알고 이쓰니까아<emoji=heart04> 하아아앙<emoji=heart04> 앗, 앗, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「優しくてっ<emoji=heart04>\u3000激しくてぇ……<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000会長くん、大好きなのぉ……<emoji=heart04>\u3000ふああぁん<emoji=heart04>」"
translation = "「다정하고오<emoji=heart04> 격해애……<emoji=heart04> 아아앙앗<emoji=heart04> 하아아<emoji=heart04> 회장 군, 너무 조아해에……<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000また激しくなったぁ<emoji=heart04>\u3000おち○ちん、まだ太くなるぅ<emoji=heart04>\u3000わたしの中で、気持ちいいところ全部、こすれてるのぉ<emoji=heart04>\u3000んあぁぁっ<emoji=heart04>\u3000ふああぁぁん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 또 격해져써어<emoji=heart04> 자지, 아직 더 커져어<emoji=heart04> 내 안에서 기분 조은 곳 전부 비벼지고 이써어<emoji=heart04> 응아아앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぁぁぁん<emoji=heart04>\u3000もうダメっ、きちゃうぅぅ<emoji=heart04>\u3000あっ、あっ、あぁぁぁん<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 이제 안 돼애, 가버려어어<emoji=heart04> 앗, 앗, 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くぅん<emoji=heart04>\u3000わたしもう、イっちゃう……っ<emoji=heart04>\u3000イっちゃうよぉぉっ<emoji=heart04>\u3000あっ、あっ、あっ、はぁぁぁんっ<emoji=heart04>」"
translation = "「회장 구운<emoji=heart04> 나 이제 가버려……!<emoji=heart04> 가버릴 거야아앗<emoji=heart04> 앗, 앗, 앗, 하아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「トワちゃん、俺ももうすぐ……っ」"
translation = "「토와짱, 나도 이제 곧……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うんっ<emoji=heart04>\u3000うんっ<emoji=heart04>\u3000はぁぁぁんっ<emoji=heart04>\u3000一緒にイこうっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 하아아앙앗<emoji=heart04> 같이 가자아!<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんの精液、おま○こに中出ししてほしいよぉ<emoji=heart04>\u3000わたしの中に、全部出してぇ<emoji=heart04>\u3000はっ、あああっ<emoji=heart04>\u3000ふああぁぁん<emoji=heart04>」"
translation = "「회장 군의 정액, 보지에 질내사정 해조쓰면 조케써어<emoji=heart04> 내 안에 전부 내보내조오<emoji=heart04> 하앗, 아아앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「おま○こ、くるっ<emoji=heart04>\u3000おま○こキちゃうよぉっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「보지, 온다아<emoji=heart04> 보지 와버려어엇<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きだ、トワちゃん……っ！」"
translation = "「사랑해, 토와짱……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んあああああぁぁぁっ<emoji=heart04>\u3000好きぃ<emoji=heart04>\u3000好き好き好きぃ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふあぁぁぁぁぁあああっ<emoji=heart04>\u3000あっ、あっ、あっ、あああっ<emoji=heart04>」"
translation = "「응아아아아아아앗<emoji=heart04> 조아해에<emoji=heart04> 조아조아조아해에<emoji=heart04> 아아앗<emoji=heart04> 후아아아아아아아아앗<emoji=heart04> 앗, 앗, 앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「イク、イクイクイクイクイクぅ、イっちゃうぅぅぅぅーーーーー<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아, 가가가가가아, 가버려어어어어어어─────<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「イックぅぅぅぅ～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어~~~~~~~~~~~엇<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아─────────앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ああぁぁぁぁぁぁ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はぁぁ、ふああぁん<emoji=heart04>\u3000会長くんの精液、わたしの子宮まで入って来てるよぉぉぉ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「아아아아아아아아~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 하아아, 후아아앙<emoji=heart04> 회장 군의 정액, 내 자궁까지 들어오고 이써어어어<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ああああっ<emoji=heart04>\u3000射精、すごいのぉ<emoji=heart04>\u3000まだ続いて……<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000お腹の奥いっぱいまで、会長くんを感じるよぉ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 사정, 대단해에<emoji=heart04> 아직 계속되고오……<emoji=heart04> 하아아앙<emoji=heart04> 배 속 깊은 곳까지 회장 군이 느껴져어<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「んんっ……<emoji=heart04>\u3000はふぅ<emoji=heart04>\u3000ふわあぁぁ<emoji=heart04>\u3000ようやく収まった、かなぁ？<emoji=heart04>\u3000んんぅ<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 하후으<emoji=heart04> 후와아아<emoji=heart04> 겨우 멈춘 거 가태애<emoji=heart04> 응응으<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はぁぁ……<emoji=heart04>\u3000これが、恋人同士のエッチ、なんだねぇ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 이게 연인 사이의 섹스구나아<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はふぅ……えっと、その、会長くんは……き、気持ち良かった、かな……？」"
translation = "「하후으…… 저기, 그게, 회장 군은…… 기, 기분 조아써어……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっ、なんでそんなに自信なさそうなのって……そ、そりゃあ……してる最中、わたしの方はずっと気持ち良くって……」"
translation = "「엣, 왜 그렇게 자신 없어 보이냐니…… 그, 그야…… 하는 도중에 나는 계속 기분 조아서어……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんにばっかり、よがらされちゃったというか……わたしはその、すごく気持ち良かったんだけどぉ……」"
translation = "「회장 군한테만 계속 가버려지게 됐다고 해야 하나…… 나는 그게, 정말 기분 조아찌마안……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたしの方は全然、会長くんのために出来たことがなかったような気がしてぇ……」"
translation = "「나는 전혀, 회장 군을 위해서 해준 게 없는 것 같은 기분이 들어서어……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え？\u3000エッチでよがってるわたしの姿でめちゃくちゃ興奮した……？\u3000そ、そうなんだぁ……<emoji=heart04>」"
translation = "「에? 섹스하면서 가버리는 내 모습에 엄청 흥분했다구……? 그, 그렇구나아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でもこれは、ちょっと危険だねぇ……。色んな規則が、淫蕩に耽ることを禁止する意味がよくわかったなぁ」"
translation = "「하지만 이건 좀 위험하네에…… 여러 규칙이 음탕함에 빠지는 걸 금지하는 의미를 잘 알 거 가태애」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だ、ダメダメっ、毎日エッチなんてしてたら、会長くんはよくても、先生がお猿さんになっちゃうよっ！」"
translation = "「아, 안 돼안 돼! 매일 섹스 같은 거 하면, 회장 군은 괜찮아도 선생님이 원숭이가 되어버릴 거야!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それだけわたしとのエッチを気に入ってくれたのは、しょ、正直ちょっと嬉しいけど……<emoji=heart04>\u3000でもこれからは、回数やタイミングについては、ちょっと真面目に考えましょう」"
translation = "「그만큼 나랑 하는 섹스를 맘에 들어 해준 건, 소, 솔직히 좀 기쁘지만……<emoji=heart04> 하지만 이제부터 횟수나 타이밍에 대해서는 좀 진지하게 생각해보자」"

[[dialogue]]
speaker = "unk"
original = "こうして、わたしと会長くんの初エッチは幕を閉じた。"
translation = "이렇게 나와 회장 군의 첫 섹스는 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "この日以降、私は開花してしまった自分の性欲に悩まされ、ほぼ毎日オナニーしながら、年下の彼氏にそのことを相談できず悶々とした日々を送ることになるのだが……"
translation = "이날 이후, 나는 개화해버린 자신의 성욕에 시달리며, 거의 매일 자위하면서 연하의 남자친구에게 그 사실을 상담하지 못한 채 번민하는 나날을 보내게 되는데……"

[[dialogue]]
speaker = "unk"
original = "それはまた別のお話。"
translation = "그것은 또 다른 이야기."

