[[dialogue]]
speaker = "unk"
original = "一連の事件が解決し、ステラが異世界から戻って来た。"
translation = "일련의 사건이 해결되고, 스텔라가 이세계에서 돌아왔다."

[[dialogue]]
speaker = "ステラ"
original = "「やっぱり団長さんのそばが一番落ち着きますね～」"
translation = "「역시 단장님 곁이 제일 마음 편하네요～」"

[[dialogue]]
speaker = "unk"
original = "さっそく部屋にやって来たステラは、そのままリラックスモードに入っている。"
translation = "서둘러 방으로 찾아온 스텔라는, 그대로 릴랙스 모드에 들어가 있다."

[[dialogue]]
speaker = "unk"
original = "知らない人だらけの異世界では、いろいろ苦労しただろうと思って訊ねてみると、予想外に自信たっぷりな様子だった。"
translation = "모르는 사람투성이인 이세계에서는 여러모로 고생했을 거라 생각하고 물어보니, 예상외로 자신만만한 모습이었다."

[[dialogue]]
speaker = "ステラ"
original = "「心配しなくても大丈夫でしたよ！\u3000ちゃーんとしっかり交流もしてきましたから」"
translation = "「걱정 안 하셔도 괜찮았어요! 제대로 확실하게 교류도 하고 왔으니까요.」"

[[dialogue]]
speaker = "ステラ"
original = "「本当ですよ？\u3000異世界でボクもいろんな経験を積んで、ひと回りもふた回りも成長したんです」"
translation = "「정말이라니까요? 이세계에서 저도 여러 경험을 쌓고, 한층 더 두층 더 성장했답니다.」"

[[dialogue]]
speaker = "unk"
original = "立派なことを言いつつも、ステラは完全に気の抜けきった様子でゴロゴロしている。"
translation = "듬직한 말을 하면서도, 스텔라는 완전히 긴장이 풀린 모습으로 뒹굴거리고 있다."

[[dialogue]]
speaker = "unk"
original = "果たしてどれだけステラが成長したのか、確かめてみたいという気持ちが芽生えてきた。"
translation = "과연 얼마나 스텔라가 성장했는지, 확인해 보고 싶은 마음이 싹트기 시작했다."

[[dialogue]]
speaker = "ステラ"
original = "「え？\u3000いいですよ、そんなに疑うなら確かめてもらっても。どうやって確かめるのか知りませんけど……きゃっ！？」"
translation = "「네? 좋아요, 그렇게 의심하신다면 확인해 보셔도. 어떻게 확인하는지는 모르겠지만…… 꺄앗!?」"

[[dialogue]]
speaker = "ステラ"
original = "「だ、団長さんっ！\u3000か、鏡！\u3000鏡に映っちゃってますっ！」"
translation = "「다, 단장님! 거, 거울! 거울에 비치고 있어요!」"

[[dialogue]]
speaker = "ステラ"
original = "「何がって……ぜ、全部ですよぉっ！\u3000恥ずかしいところ、全部、映っちゃってますって……あっ、あぁあぁっ<emoji=heart04>」"
translation = "「뭐가냐니…… 전, 전부라구요오! 부끄러운 곳, 전부, 비치고 있다구요…… 앗, 아아앗❤️」"

[[dialogue]]
speaker = "unk"
original = "鏡面にはステラの可愛らしい局部と、こちらの熱くいきり立った肉棒が映っている。"
translation = "거울면에는 스텔라의 귀여운 국부와, 이쪽의 뜨겁게 발기한 육봉이 비치고 있다."

[[dialogue]]
speaker = "ステラ"
original = "「こ、こんなことされたら……はぁあぁっ<emoji=heart04>\u3000ボクじゃなくても、恥ずかしいに決まってますよっ！」"
translation = "「이, 이런 짓을 당하면…… 하아앗❤️ 저라도, 부끄러운 게 당연하잖아요!」"

[[dialogue]]
speaker = "ステラ"
original = "「あぁあっ、はぁぁ<emoji=heart04>\u3000だいたいこんな方法で、ボクが向こうの世界でちゃんと交流できてたかなんて……んんぅ<emoji=heart04>\u3000確かめられるはず、ないじゃないですかぁ！」"
translation = "「아아앗, 하아아❤️ 애초에 이런 방법으로, 제가 저쪽 세계에서 제대로 교류하고 왔는지 어떤지를…… 응으❤️ 확인받을 수 있을 리 없잖아요!」"

[[dialogue]]
speaker = "unk"
original = "ステラの抗議は至極もっともだ。"
translation = "스텔라의 항의는 지극히 당연하다."

[[dialogue]]
speaker = "unk"
original = "だがパンパンに張り詰めたこちらのモノは、もう収まりがつかないほど興奮状態になってしまっている。"
translation = "하지만 팽팽하게 부풀어 오른 이쪽의 물건은, 이제 멈출 수 없을 정도로 흥분 상태가 되어버렸다."

[[dialogue]]
speaker = "ステラ"
original = "「えっ？\u3000ま、まさか……<emoji=heart04>\u3000はぁぁあっ<emoji=heart04>\u3000鏡に映したまま、するつもりですかぁ……？」"
translation = "「엣? 설마……❤️ 하아앗❤️ 거울에 비친 채로, 할 생각인가요……?」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁぁんっ<emoji=heart04>\u3000だって……団長さんのこの、おっきなおち○ちん……<emoji=heart04>\u3000ボクのに入るところ、目の当たりにするなんてぇ……はふぅぅん<emoji=heart04>」"
translation = "「하아앙❤️ 왜냐면…… 단장님의 이, 커다란 자지……❤️ 제 안으로 들어가는 곳, 눈앞에서 보다니…… 하푸우운❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ど、ドキドキなんてしてませんよっ！\u3000あぁぁっ<emoji=heart04>\u3000ただ、今までちゃんと、見たことなかったかもしれないと思ってぇ……<emoji=heart04>」"
translation = "「두, 두근거리지 않았어요! 아아앗❤️ 단지, 지금까지 제대로, 본 적이 없었을지도 모른다고 생각해서……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あっ……！\u3000んんぅ、はふぅぅん<emoji=heart04>\u3000おち○ちん……スリスリしないでくださいよぉ<emoji=heart04>」"
translation = "「앗……! 응으, 하푸운❤️ 자지…… 비비지 마세요오❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「や、んぅう……<emoji=heart04>\u3000こんなにカチカチになった……団長さんのおち○ちん<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000おま○こにスリスリ、されたらぁ……<emoji=heart04>\u3000ボク……ボクぅ<emoji=heart04>」"
translation = "「시, 응우……❤️ 이렇게 딱딱해진…… 단장님의 자지❤️ 아아앗❤️ 보지에 비비면…… 저…… 저어❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「うぅぅ<emoji=heart04>\u3000団長さんの、意地悪ぅ……<emoji=heart04>」"
translation = "「우우우❤️ 단장님의, 심술쟁이……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「は、恥ずかしい、ですけど……<emoji=heart04>\u3000はぁぁあっ<emoji=heart04>\u3000正直に言うと、見たいって気持ちも、あります……<emoji=heart04>」"
translation = "「부, 부끄럽지만……❤️ 하아앗❤️ 솔직히 말하면, 보고 싶다는 마음도, 있어요……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あはぁぁ<emoji=heart04>\u3000団長さんのおち○ちんと、ボクのおま○こっ<emoji=heart04>\u3000ひとつになってる、ところ……<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「아하아아❤️ 단장님의 자지와, 제 보지❤️ 하나가 되어있는, 곳……❤️ 응으❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「わかり、ましたぁ<emoji=heart04>\u3000いい、ですよ……<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000このまま、団長さんのおち○ちんが入るとこ……見せてください<emoji=heart04>」"
translation = "「알겠, 어요❤️ 좋아요……❤️ 하아앗❤️ 이대로, 단장님의 자지가 들어가는 곳…… 보여드릴게요❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁっ……！\u3000あぁううっ<emoji=heart04>\u3000んんんぅ<emoji=heart04><emoji=heart04>」"
translation = "「하앗……! 아아우우❤️ 응응응으❤️❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ぁ、あぁあっ<emoji=heart04>\u3000団長さんの……おっきなおち○ちんっ<emoji=heart04>\u3000ボクのおま○こ、かき分けて……っ<emoji=heart04>」"
translation = "「아, 아아앗❤️ 단장님의…… 커다란 자지❤️ 제 보지, 갈라놓고……❤️」"

[[dialogue]]
speaker = "unk"
original = "熱く膨張しきった肉棒が、ステラの小さな割れ目を押し分けて入っていく。"
translation = "뜨겁게 팽창한 육봉이, 스텔라의 작은 틈새를 밀어헤치고 들어간다."

[[dialogue]]
speaker = "unk"
original = "その様子がはっきり鏡に映って、詳細に見て取れた。"
translation = "그 모습이 선명하게 거울에 비쳐, 상세하게 들여다볼 수 있었다."

[[dialogue]]
speaker = "ステラ"
original = "「はぁ、ぁ……ああぁ<emoji=heart04>\u3000んんっ……んふぅうっ<emoji=heart04>\u3000ぁ……はぁあ、あぁあっ……<emoji=heart04>」"
translation = "「하아, 아…… 아아아❤️ 응으…… 응후우우❤️ 아…… 하아아, 아아앗……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あぁんっ<emoji=heart04>\u3000ボク……団長さんと、ひとつになってるところ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000見せつけ、られてるぅ<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「아앙❤️ 저…… 단장님과, 하나가 되어있는 곳❤️ 하아앗❤️ 보여지고, 있어요❤️ 응으❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「変な、感じですぅ<emoji=heart04>\u3000んんうっ<emoji=heart04>\u3000恥ずかし過ぎて、死んじゃいそうなのにぃ……<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000でも……どうして、いつも以上に胸がドキドキしてぇ……<emoji=heart04>」"
translation = "「이상한, 기분이에요❤️ 응응우❤️ 너무 부끄러워서, 죽어버릴 것 같은데……❤️ 아아앗❤️ 하지만…… 왜, 평소보다 가슴이 두근거려서……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あぁああっ<emoji=heart04>\u3000おち○ちんが、おま○こを貫いてるところから……目が、離せませんっ<emoji=heart04>\u3000んんっ、は、ぁううっ……<emoji=heart04>」"
translation = "「아아아앗❤️ 자지가, 보지를 꿰뚫고 있는 곳에서…… 눈을, 뗄 수가 없어요❤️ 응으, 하, 아우우……❤️」"

[[dialogue]]
speaker = "unk"
original = "戸惑ったような声を漏らしながら、ステラもその光景に釘付けになっている。"
translation = "당황한 듯한 신음을 흘리며, 스텔라도 그 광경에 못 박혀 있다."

[[dialogue]]
speaker = "ステラ"
original = "「団長さん……ボク、知りたい、です<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000団長さんのおち○ちんが……どうやって、ボクのおま○こに出たり、入ったり、するのかぁ……<emoji=heart04>」"
translation = "「단장님…… 저, 알고 싶어요❤️ 아아앗❤️ 단장님의 자지가…… 어떻게, 제 보지에 나왔다, 들어갔다, 하는지……❤️」"

[[dialogue]]
speaker = "unk"
original = "ステラから発せられたその言葉に動かされるように、ゆっくりとピストンを始めた。"
translation = "스텔라에게서 나온 그 말에 이끌리듯, 천천히 피스톤을 시작했다."

[[dialogue]]
speaker = "ステラ"
original = "「あぁああっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000はぁ、あっ……あぁあっ<emoji=heart04>\u3000あ、んんっ、あっ、ああっ<emoji=heart04>」"
translation = "「아아아앗❤️ 아아앙❤️ 하아, 앗…… 아아앗❤️ 아, 응으, 앗, 아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「すごい、ですっ<emoji=heart04>\u3000んんんっ……本当に、ボクのおま○こっ<emoji=heart04>\u3000こんなに太くて硬いものが、ズボズボしてぇ……んんぅっ<emoji=heart04>」"
translation = "「대단해요❤️ 응응읏…… 정말로, 제 보지에❤️ 이렇게 굵고 딱딱한 것이, 즈보즈보하고…… 응으❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「血管が浮き出るくらい、パンパンに張り詰めたおち○ちんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000ボクの<ruby>膣<rt>なか</rt></ruby>で、ヌルヌルになって……<emoji=heart04>\u3000は、あぁあっ<emoji=heart04>」"
translation = "「혈관이 튀어나올 정도로, 팽팽하게 부풀어 오른 자지❤️ 아아앙❤️ 제 질에서, 미끌미끌해져서……❤️ 하, 아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ボクのおま○こって、こんなに濡れてたんですね……<emoji=heart04>\u3000はぁあん<emoji=heart04>\u3000団長さんのおち○ちんが欲しくて、こんなにぃ……<emoji=heart04>\u3000あ、ああんっ<emoji=heart04>」"
translation = "「제 보지란 게, 이렇게 젖어있었군요……❤️ 하아앙❤️ 단장님의 자지를 원해서, 이렇게나……❤️ 아, 아앙❤️」"

[[dialogue]]
speaker = "unk"
original = "ステラの膣は熱い蜜液に満たされており、スムーズなピストンと心地よい摩擦を与えてくれた。"
translation = "스텔라의 질은 뜨거운 꿀물로 가득 차 있어, 부드러운 피스톤과 기분 좋은 마찰을 주었다."

[[dialogue]]
speaker = "unk"
original = "ジュプジュプといやらしい粘液の音を立てて、ステラの内側がかき回されていく。"
translation = "쥬프쥬프 하고 야한 점액 소리를 내며, 스텔라의 안쪽이 휘저어져 간다."

[[dialogue]]
speaker = "ステラ"
original = "「あんっ<emoji=heart04>\u3000ふわあっ、ふぅう、ああぁ、んんぅ<emoji=heart04>\u3000はぁ、あ、ああ……エッチな、音……しちゃってますっ<emoji=heart04>\u3000んんうっ<emoji=heart04>」"
translation = "「앙❤️ 후와앗, 후우우, 아아아, 응으❤️ 하아, 아, 아아…… 야한, 소리…… 나고 있어요❤️ 응응우❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「こんなふうに、ボク……はぁあん<emoji=heart04>\u3000団長さんに、エッチされてたんですねっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000知らな、かったです……<emoji=heart04>」"
translation = "「이런 식으로, 저…… 하아앙❤️ 단장님께, 섹스 당하고 있었군요❤️ 아아앙❤️ 몰랐, 어요……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「男の人の、おち○ちんが……女の子のおま○こ、ぬっちゅぬっちゅって、出入りする、ところっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000なんだかすごく、エッチで、恥ずかしいっ<emoji=heart04><emoji=heart04>」"
translation = "「남자의, 자지가…… 여자아이 보지에, 눗츄눗츄 하고, 출입하는, 곳❤️ 아아앗❤️ 왠지 엄청, 야하고, 부끄러워❤️❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あんっ<emoji=heart04>\u3000恥ずかしいのに、目が離せないですっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>\u3000恥ずかしいとこ見てると、余計ドキドキしてっ<emoji=heart04>\u3000ドキドキすると、気持ちよくなっちゃうっ<emoji=heart04>」"
translation = "「앙❤️ 부끄러운데, 눈을 뗄 수가 없어요❤️ 응후운❤️ 부끄러운 곳 보고 있으면, 더 두근거려서❤️ 두근거리면, 기분 좋아져 버려서❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あぁあぁっ<emoji=heart04>\u3000もっと、動いてくださいっ<emoji=heart04>\u3000ボクの恥ずかしいおま○こが、団長さんのおち○ちんを飲み込むところ、もっとよく見せてぇ……<emoji=heart04>」"
translation = "「아아아앗❤️ 더, 움직여 주세요❤️ 제 부끄러운 보지가, 단장님의 자지를 집어삼키는 곳, 더 잘 보여줘요……❤️」"

[[dialogue]]
speaker = "unk"
original = "ステラの要望通り、少しずつ大胆に、ピストンの可動域を広げていく。"
translation = "스텔라의 요구대로, 조금씩 대담하게, 피스톤의 가동 범위를 넓혀간다."

[[dialogue]]
speaker = "unk"
original = "もう今の段階で、頭が痺れるほどに気持ちがいい。"
translation = "벌써 지금 단계에서, 머리가 저릿할 정도로 기분이 좋다."

[[dialogue]]
speaker = "ステラ"
original = "「あぁんっ<emoji=heart04>\u3000気持ちよくて……あぁあっ<emoji=heart04>\u3000声、出ちゃいますっ<emoji=heart04>\u3000んんっ、あっ、ああんっ<emoji=heart04>」"
translation = "「아아앙❤️ 기분 좋아서…… 아아앗❤️ 소리, 나와버려요❤️ 응으, 앗, 아아앙❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ボク、赤ちゃんみたいに、抱っこされながら……んんぅ<emoji=heart04>\u3000エッチな声、上げちゃってますっ<emoji=heart04>\u3000あああっ、これすっごく、恥ずかしいですっ<emoji=heart04>」"
translation = "「저, 아기처럼, 안겨 있으면서…… 응으❤️ 야한 소리, 내버리고 있어요❤️ 아아앗, 이거 엄청, 부끄러워요❤️」"

[[dialogue]]
speaker = "unk"
original = "ステラの甘い喘ぎを聞きながら、もっと深い交わりを求めて突き込む。"
translation = "스텔라의 달콤한 신음을 들으며, 더 깊은 교합을 원하며 찔러 넣는다."

[[dialogue]]
speaker = "ステラ"
original = "「んっ……！\u3000はぁう、んんぅっ<emoji=heart04>\u3000はぁ、あ、あああっ<emoji=heart04>\u3000おち○ちん……もっと奥の方まで、届いて……<emoji=heart04>」"
translation = "「응……! 하아우, 응으❤️ 하아, 아, 아아앗❤️ 자지…… 더 안쪽까지, 닿아줘……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000一番先っちょのところが、赤ちゃんのお部屋<emoji=heart04>\u3000ズンズンって……んんっ、あっ、あああ<emoji=heart04>」"
translation = "「앗❤️ 앗❤️ 아아앗❤️ 맨 끝부분이, 아기방❤️ 즌즌하고…… 응으, 앗, 아아아❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「そんなこと、されたらぁ……<emoji=heart04>\u3000頭の中、真っ白に、なっちゃうじゃないですかぁ<emoji=heart04>\u3000んっ、あっ、あっ、あ、あ、ああっ……<emoji=heart04>」"
translation = "「그런 짓, 당하면……❤️ 머릿속, 하얗게, 되어버리잖아요❤️ 읏, 앗, 앗, 아, 아, 아아앗……❤️」"

[[dialogue]]
speaker = "unk"
original = "言葉面とは裏腹にその声は「もっと<emoji=heart04>\u3000もっと<emoji=heart04>」とせがむように甘ったるく、さらにステラの膣もさらなる刺激を求めて強く締め付けてくる。"
translation = "말과는 반대로 그 목소리는 「더❤️ 더❤️」 하고 조르는 듯 달콤했고, 더욱이 스텔라의 질도 더 큰 자극을 원하며 강하게 조여온다."

[[dialogue]]
speaker = "unk"
original = "その期待に応えるように、今まで以上にピストンを激しくしていく。"
translation = "그 기대에 부응하듯, 지금까지 이상으로 피스톤을 격렬하게 해나간다."

[[dialogue]]
speaker = "ステラ"
original = "「あああっ！\u3000あ、んんっ……あ、あああっ！」"
translation = "「아아앗! 아, 응으…… 아, 아아앗!」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁ、あぁあっ<emoji=heart04>\u3000急にそんな、激しくっ<emoji=heart04>\u3000んんっ、あっ、あああっ<emoji=heart04>」"
translation = "「하아, 아아앗❤️ 갑자기 그렇게, 격렬하게❤️ 응으, 앗, 아아앗❤️」"

[[dialogue]]
speaker = "unk"
original = "激しくなった動きにステラが声を上げる。"
translation = "격렬해진 움직임에 스텔라가 소리를 높인다."

[[dialogue]]
speaker = "ステラ"
original = "「あっ、あ、あぁあっ<emoji=heart04>\u3000やんんっ、くんぅううっ<emoji=heart04>\u3000む、無理、無理ぃっ<emoji=heart04>\u3000んんっ、あっ、ああっ<emoji=heart04>」"
translation = "「앗, 아, 아아앗❤️ 싫어엉, 끙우우우❤️ 무, 무리, 무리이❤️ 응으, 앗, 아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「そんなに、されたらっ<emoji=heart04>\u3000あっ、あ、あああっ<emoji=heart04>\u3000おま○こ、壊れちゃいますっ<emoji=heart04>\u3000あ、あっ、ああ、あ、あああっ<emoji=heart04>」"
translation = "「그렇게, 당하면❤️ 앗, 아, 아아앗❤️ 보지, 망가져 버려요❤️ 아, 앗, 아아, 아, 아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ふわぁあぁっ<emoji=heart04>\u3000じゅぼじゅぼっていやらしい音、すごいですぅ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁあぁんっ<emoji=heart04>」"
translation = "「후와아앗❤️ 쥬보쥬보 하는 야한 소리, 엄청나요오❤️ 앙❤️ 앙❤️ 아아아앙❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「鏡に映ってるっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000あんなに激しくっ、おち○ちん出し入れされてっ<emoji=heart04>\u3000おま○こ、よだれ垂らしてっ、全部飲み込んじゃってますぅ<emoji=heart04>」"
translation = "「거울에 비치고 있어❤️ 아아앙❤️ 그렇게 격렬하게, 자지 넣었다 뺐다 당해서, 보지, 침 흘리면서, 전부 집어삼키고 있어요오❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁう、ううっ<emoji=heart04>\u3000ボク、こんなエッチな顔してたんだぁ……<emoji=heart04>\u3000はぁあんっ<emoji=heart04>」"
translation = "「하아우, 우우❤️ 저, 이렇게 야한 얼굴 하고 있었구나……❤️ 하아앙❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「こんな、嬉しそうな顔して、おち○ちん飲み込んじゃってっ<emoji=heart04>\u3000あぁああぁっ<emoji=heart04>\u3000恥ずかしいっ、恥ずかしいですぅ<emoji=heart04>」"
translation = "「이렇게, 기쁜 듯한 얼굴 하고, 자지 집어삼켜 버려서❤️ 아아아앗❤️ 부끄러워, 부끄러워요오❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あぁああぁあぁっ<emoji=heart04>\u3000ボクのエッチなところ、全部見られてますっ<emoji=heart04>\u3000ふわぁあんっ<emoji=heart04>\u3000恥ずかしいの、気持ちいいですぅ<emoji=heart04>」"
translation = "「아아아아아앗❤️ 제 야한 곳, 전부 보여지고 있어요❤️ 후와아앙❤️ 부끄러운 거, 기분 좋아요오❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「団長さんにっ、んんっ、あ、あ、ああ、あっ<emoji=heart04>\u3000おち○ちんズボズボされて……もっともっと、気持ちよくなっちゃいますっ<emoji=heart04>」"
translation = "「단장님께, 응으, 아, 아, 아아, 앗❤️ 자지 즈보즈보 당해서…… 더더욱, 기분 좋아져 버려요❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁ、あぁあ、あっ<emoji=heart04>\u3000だって……仕方ないんですっ<emoji=heart04>\u3000団長さんとのエッチ、気持ちいいんですからっ、あ、あああっ<emoji=heart04>」"
translation = "「하아, 아아, 앗❤️ 왜냐면…… 어쩔 수 없잖아요❤️ 단장님과의 섹스, 기분 좋으니까, 아, 아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「優しく、されるのもっ、んうぅうっ、好き、ですけどぉっ<emoji=heart04>\u3000こんなふうに、激しく、されるのも……好きだからっ、は、ぁ、あああぁあっ<emoji=heart04>」"
translation = "「상냥하게, 당하는 것도, 응우우우, 좋아, 하지만요오❤️ 이런 식으로, 격렬하게, 당하는 것도…… 좋아하니까, 하, 아, 아아아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「だから、仕方ないですよねっ、団長さんっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000こんな、恥ずかしい女の子に、なっちゃってもぉ<emoji=heart04>\u3000あっ、あ、あ、あ、あ、ああっ！！」"
translation = "「그러니까, 어쩔 수 없잖아요, 단장님❤️ 아아앗❤️ 이렇게, 부끄러운 여자아이가, 되어버려도오❤️ 앗, 아, 아, 아, 아, 아앗!!」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしがってるステラも、恥ずかしいのが気持ちよくなっちゃうステラも、大好きだ。"
translation = "부끄러워하는 스텔라도, 부끄러운 게 기분 좋아져 버리는 스텔라도, 정말 좋아한다."

[[dialogue]]
speaker = "unk"
original = "ステラにそう伝えると、表情が緩んでステラはますます行為に没頭していく。"
translation = "스텔라에게 그렇게 전하자, 표정이 풀리며 스텔라는 더욱 행위에 몰두해 간다."

[[dialogue]]
speaker = "ステラ"
original = "「団長さん、大好きですぅ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000大好きな団長さんのおち○ちんでっ、あぁあっ<emoji=heart04>\u3000ボクの気持ちいいとこ、いっぱい攻めてくださいっ、あっ、ああっ<emoji=heart04>」"
translation = "「단장님, 정말 좋아해요오❤️ 아아앙❤️ 정말 좋아하는 단장님의 자지로, 아아앗❤️ 제 기분 좋은 곳, 잔뜩 공격해 주세요, 앗, 아앗❤️」"

[[dialogue]]
speaker = "unk"
original = "叫びながらステラの膣が痛いほどに締め付けてくる。"
translation = "외치면서 스텔라의 질이 아플 정도로 조여온다."

[[dialogue]]
speaker = "ステラ"
original = "「だ、だって……大好きだからぁ<emoji=heart04>\u3000あんっ、おま○こ、締まっちゃうんですっ<emoji=heart04>\u3000団長さんのおち○ちん、ぎゅーってしちゃうんですっ<emoji=heart04>」"
translation = "「그, 왜냐면…… 정말 좋아하니까아❤️ 앙, 보지, 조여져 버려요❤️ 단장님의 자지, 꽉 하고 해버려요❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ああっ、あっ、あ、ああっ<emoji=heart04>\u3000気持ちいいの、止まらないっ<emoji=heart04>\u3000んんぅ、あっ、あ、あ、ああ、あ、あ、あああっ<emoji=heart04>」"
translation = "「아앗, 앗, 아, 아앗❤️ 기분 좋은 거, 멈추지 않앗❤️ 응으, 앗, 아, 아, 아아, 아, 아, 아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ボクの中でっ、団長さんも気持ちよくなってぇ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あん<emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「제 안에서, 단장님도 기분 좋아져서❤️ 앙❤️ 앙❤️ 아아앙❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「んくぅううっ、はあぁあっ<emoji=heart04>\u3000あっ、あ……おち○ちん、ビクビクしてるの、分かりますっ<emoji=heart04>\u3000んんっ、あっ、あぁああっ！」"
translation = "「응쿠우우, 하아앗❤️ 앗, 아…… 자지, 비쿠비쿠 하는 거, 알겠어요❤️ 응으, 앗, 아아아앗!」"

[[dialogue]]
speaker = "ステラ"
original = "「ボクも、イッちゃう……んんぅっ、あっ、ああ、あ、ああっ<emoji=heart04>\u3000もうイクっ、んぅうう、ん、んくぅ、んんんっ<emoji=heart04>\u3000あっ、あ、あぁあ、あ、あ、ああんっ<emoji=heart04>」"
translation = "「저도, 가버려…… 응으, 앗, 아아, 아, 아앗❤️ 이제 가, 응우우우, 응, 응쿠우, 응응읏❤️ 앗, 아, 아아아, 아, 아, 아앙❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あぁあんっ<emoji=heart04>\u3000もう限界、イッちゃいますっ<emoji=heart04>\u3000団長さんっ、団長さぁんっ<emoji=heart04>\u3000あっ、あっ、あああっ<emoji=heart04>」"
translation = "「아아앙❤️ 이제 한계, 가버려요❤️ 단장님, 단장니이임❤️ 앗, 앗, 아아앗❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ボクもうっ<emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>\u3000イクイク、イっちゃうぅぅぅ<emoji=heart04>\u3000ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04>\u3000ふあぁああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「저 이제❤️ 앗앗앗앗앗❤️ 가가, 가버려어어어❤️ 아아, 아아, 아아, 아아, 아아앗❤️ 후아아아～～～❤️❤️❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「あぁああぁあああぁああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうぅぅぅ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아아아아～～～❤️❤️❤️ 가아아아아아～～～～～～～～❤️❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "最後にステラの膣奥深くまで先端を叩きつけ、同時に欲望の全てを解放する。"
translation = "마지막으로 스텔라의 질 안쪽 깊숙이 선단을 내리꽂으며, 동시에 욕망의 전부를 해방한다."

[[dialogue]]
speaker = "ステラ"
original = "「ああぁああぁぁっ<emoji=heart04><emoji=heart04>\u3000んんっ、あっ、あ、ああああ～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아아앗❤️❤️ 응으, 앗, 아, 아아아아～～～～❤️❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁぅ……んんぅっ<emoji=heart04>\u3000あぁあぁっ<emoji=heart04>\u3000団長さんのが……ドクドクって、脈打ってぇ<emoji=heart04>\u3000ぁあ、あ、ああっ……<emoji=heart04>」"
translation = "「하아우…… 응으❤️ 아아아앗❤️ 단장님의 것이…… 둑둑 하고, 맥동쳐서❤️ 아아, 아, 아앗……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「ふわぁあぁっ<emoji=heart04>\u3000ボクの中に……あったかいの、いっぱい……流れ込んできてますぅ<emoji=heart04>\u3000んんっ……んぅ、あぁあ、ああっ<emoji=heart04>」"
translation = "「후와아앗❤️ 제 안에…… 따뜻한 거, 잔뜩…… 흘러들어오고 있어요오❤️ 응으…… 응으, 아아, 아앗❤️」"

[[dialogue]]
speaker = "unk"
original = "ステラは大きく身体を震わせながら、自身の内側を満たしていく温かい液体を感じていた。"
translation = "스텔라는 크게 몸을 떨면서, 자신의 안쪽을 채워가는 따뜻한 액체를 느끼고 있었다."

[[dialogue]]
speaker = "ステラ"
original = "「はぁ……ぅ……<emoji=heart04>\u3000はふぅぅん……<emoji=heart04>」"
translation = "「하아…… 으……❤️ 하푸운……❤️」"

[[dialogue]]
speaker = "unk"
original = "心地よい放出感に包まれながら、ステラの膣内からゆっくりと自身を引き抜く。"
translation = "기분 좋은 방출감에 감싸이면서, 스텔라의 질내에서 천천히 자신을 뽑아낸다."

[[dialogue]]
speaker = "unk"
original = "すると内側を満たしていたものが、トロトロと流れ出した。"
translation = "그러자 안쪽을 채우고 있던 것이, 주르륵 흘러나왔다."

[[dialogue]]
speaker = "unk"
original = "ステラは乱れた息を整えながら、鏡に映るその光景にうっとりと見入っている。"
translation = "스텔라는 흐트러진 숨을 가다듬으며, 거울에 비치는 그 광경에 넋을 잃고 바라보고 있다."

[[dialogue]]
speaker = "ステラ"
original = "「あぁ……いっぱい、こぼれてます<emoji=heart04>\u3000団長さん、こんなにボクで、気持ちよくなってくれたんですね……<emoji=heart04>」"
translation = "「아아…… 잔뜩, 흘러넘치고 있어요❤️ 단장님, 이렇게나 저로, 기분 좋아져 주셨군요……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「えへへへへへぇ<emoji=heart04>\u3000なんだか、とっても嬉しいです……<emoji=heart04>」"
translation = "「에헤헤헤헤헤헤❤️ 왠지, 굉장히 기뻐요……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「はぁぁ……<emoji=heart04>\u3000鏡に映った自分を見ながらエッチするの、恥ずかしかったけど……いつも以上に興奮しちゃったかもです<emoji=heart04>」"
translation = "「하아아……❤️ 거울에 비친 자신을 보면서 섹스하는 거, 부끄러웠지만…… 평소 이상으로 흥분해 버렸을지도 몰라요❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「団長さんは、どうでしたか……<emoji=heart04>」"
translation = "「단장님은, 어떠셨나요……❤️」"

[[dialogue]]
speaker = "unk"
original = "ステラの痴態を目の当たりにしながらの行為、そんなもの興奮しないわけがない。"
translation = "스텔라의 치태를 눈앞에서 보면서의 행위, 그런 것에 흥분하지 않을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "そう答えると、ステラはうんうんと頷く。"
translation = "그렇게 대답하자, 스텔라는 응응 하고 고개를 끄덕인다."

[[dialogue]]
speaker = "ステラ"
original = "「今まで曖昧だった団長さんとのエッチ姿が、ちゃんと見たことで鮮明に頭の中に残っちゃってます……<emoji=heart04>」"
translation = "「지금까지 애매했던 단장님과의 섹스 모습이, 제대로 본 덕분에 선명하게 머릿속에 남아버렸어요……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「なんだか、しばらく忘れられそうにないかも……<emoji=heart04>」"
translation = "「왠지, 당분간 잊을 수 없을지도……❤️」"

[[dialogue]]
speaker = "ステラ"
original = "「今夜は、それを思い出して……」"
translation = "「오늘 밤은, 그걸 떠올리며……」"

[[dialogue]]
speaker = "ステラ"
original = "「って、何を言わせるんですかぁ！」"
translation = "「라니, 무슨 말을 시키시는 거예요오!」"

[[dialogue]]
speaker = "ステラ"
original = "「もーっ、団長さん！\u3000このままエッチな光景が頭から離れなくなっちゃったら、責任を取ってもらいますからねっ<emoji=heart04>」"
translation = "「모ー, 단장님! 이대로 야한 광경이 머릿속에서 떠나지 않게 되면, 책임져 주셔야 해요❤️」"

[[dialogue]]
speaker = "unk"
original = "ステラの可愛い抗議を聞きながら、その時はステラが満足するまでたっぷり可愛がってやろうと心に決めるのだった。"
translation = "스텔라의 귀여운 항의를 들으며, 그때는 스텔라가 만족할 때까지 잔뜩 귀여워해 주리라 마음먹는 것이었다."

