[[dialogue]]
speaker = "unk"
original = "第１話,目覚めたチナ,B"
translation = "제1화, 깨어난 치나, B"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトたちがデネブに飛ばされた後、チナは気を失い、新星学園に身柄を拘束されていた。"
translation = "히노미야 쿠로토 일행이 데네브로 날아간 후, 치나는 정신을 잃고 신성학원에 신병이 구속되어 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ん……んん……」"
translation = "「으…… 으으……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ここは……どこだ……？\u3000アタシは転送装置を使って、アルタイルを滅ぼそうと──」"
translation = "「여기는…… 어디지……? 아타시는 전송 장치를 사용해서 알타이르를 멸망시키려──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「！\u3000そうだ、アタシは魔王に負けて……」"
translation = "「! 맞아, 아타시는 마왕에게 져서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「良かった、目が覚めたんだね」"
translation = "「다행이다, 정신이 들었구나.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「怪我も大したことなくて安心したわ～」"
translation = "「부상도 심하지 않아서 안심했어~」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「！？\u3000お前らは、新星学園の……！？」"
translation = "「!? 너희는 신성학원의……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長たちとの戦闘の後、気絶したあなたを拘束させてもらいました」"
translation = "「회장님 일행과의 전투 후, 기절한 당신을 구속했습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ここは新星学園の会議室です。アニマ先輩に改造してもらって、即席の独房にしています」"
translation = "「여기는 신성학원의 회의실입니다. 아니마 선배가 개조해 주셔서 즉석 독방으로 쓰고 있어요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「セレスティアは会長に破壊されましたし、力ずくで脱出することはできませんよ」"
translation = "「셀레스티아는 회장님에게 파괴되었으니 힘으로 탈출할 수는 없어요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「くっ…………」"
translation = "「큭…………」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あなたには聞きたいことがあります。ですが手荒なことをするつもりは──」"
translation = "「당신에게 묻고 싶은 것이 있습니다. 하지만 거칠게 다룰 생각은──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……れ」"
translation = "「……해.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「やるならやれ！\u3000捕虜になるつもりはない！」"
translation = "「할 거면 해라! 포로가 될 생각은 없다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええっ、何言ってるのっ！？」"
translation = "「에엣, 무슨 말을 하는 거야!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、いきなり物騒ね～」"
translation = "「어머어머, 갑자기 험악하네~」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「人質になって、デネブを脅かすくらいなら死んだほうがマシだ！\u3000さっさとやれ！」"
translation = "「인질이 되어 데네브를 위협할 바에야 죽는 게 나아! 어서 해라!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょ、ちょっと待って！\u3000人質とかそんなこと考えてないから！」"
translation = "「잠, 잠깐 기다려! 인질이라니 그런 거 생각 안 하니까!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうです、私たちはあなたを傷つけるつもりはありません。さすがに自由の身にすることはできませんが」"
translation = "「맞습니다, 저희는 당신을 해칠 생각이 없습니다. 물론 자유의 몸으로 해줄 수는 없지만요.」"

[[dialogue]]
speaker = "unk"
original = "声を荒げて訴えるチナに、マトイは慌てて目を丸くし、アナはゆっくり首を横に振って否定する。"
translation = "목소리를 높여 호소하는 치나에게 마토이는 당황하며 눈을 동그랗게 떴고, 아나는 천천히 고개를 저으며 부정한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「新星学園は『デネブとともにリクリエと立ち向かう』と決めました」"
translation = "「신성학원은 『데네브와 함께 리크리에에 맞서기로』 결정했습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あなたを傷つけてしまったら、デネブ側の心象を害し、共闘が叶わなくなる可能性がある。だからあなたに危害を加えることはありません」"
translation = "「당신을 해치게 되면 데네브 측의 심기를 건드려 공투가 이루어지지 않을 가능성이 있습니다. 그러니 당신에게 위해를 가하는 일은 없을 겁니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「たとえあなたを害する者がいたとしても、手は出させません。緋宮会長が不在である今、星徒会役員である私たちが責任を持って守ります」"
translation = "「설령 당신을 해치려는 자가 있다 해도, 손대게 두지 않겠습니다. 히노미야 회장님이 부재중인 지금, 성도회 임원인 저희가 책임지고 지키겠습니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ハン、自分たちの世界を滅ぼそうとしたやつを守るなんて、会長がバカならお前ら役員もバカだな」"
translation = "「흥, 자기들 세계를 멸망시키려 한 녀석을 지키다니, 회장이 바보라면 너희 임원들도 바보로군.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「『デネブとともにリクリエに立ち向かう』──だって？」"
translation = "「『데네브와 함께 리크리에에 맞선다』──라고?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そんなことできるもんか！\u3000『生き残る世界は１つだけ』って、ルヴィ──ルヴィネ会長が言ってたんだ！」"
translation = "「그딴 게 가능할 리 있나! 『살아남는 세계는 단 하나뿐』이라고, 루비── 루비네 회장님이 말했단 말이다!」"

[[dialogue]]
speaker = "unk"
original = "囚われの身になっても、チナは頑なな態度を崩さない。"
translation = "사로잡힌 몸이 되어서도 치나는 완강한 태도를 굽히지 않는다."

[[dialogue]]
speaker = "unk"
original = "しかしアナも動じず、いつもの調子で言葉を返す。"
translation = "하지만 아나도 동요하지 않고 평소와 같은 어조로 말을 받아친다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルヴィネという人物の言葉が真実かどうかは不明です。私たちも否定する証拠は持ち合わせていません」"
translation = "「루비네라는 인물의 말이 진실인지 아닌지는 불분명합니다. 저희도 부정할 증거는 가지고 있지 않아요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが私たち星騎士が戦うべき相手は、平行世界ではなくリクリエです。会長も、私たち星徒会役員も、そう考えています」"
translation = "「하지만 저희 성기사가 싸워야 할 상대는 평행세계가 아니라 리크리에입니다. 회장님도, 저희 성도회 임원들도 그렇게 생각하고 있습니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "まるで視線で貫かんばかりに、アナを鋭くにらむチナ。"
translation = "마치 시선으로 꿰뚫을 듯이 아나를 날카롭게 노려보는 치나."

[[dialogue]]
speaker = "unk"
original = "互いの主張はやはり平行線だ。アルタイルとデネブ、２つの世界のごとく交わることはない。"
translation = "서로의 주장은 역시 평행선이다. 알타이르와 데네브, 두 세계처럼 결코 섞이는 일은 없다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ところでちょっと教えてほしいんだけど、あなたが持っていた装置は平行世界を渡るものなのよね？」"
translation = "「그런데 조금 가르쳐줬으면 좋겠는데, 네가 가지고 있던 장치는 평행세계를 건너는 물건이지~?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんたちがあの装置を破壊して、穴に吸い込まれるところは映像で見たわ」"
translation = "「회장님 일행이 그 장치를 파괴하고 구멍에 빨려 들어가는 건 영상으로 봤거든~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だったらあの時発生した穴は、デネブに繋がっているのかしら？\u3000会長くんたちは今デネブにいるの？」"
translation = "「그렇다면 그때 발생한 구멍은 데네브로 이어져 있는 걸까~? 회장님 일행은 지금 데네브에 있는 거니~?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、何も言ってくれないわね～」"
translation = "「어머, 아무 말도 안 해주네~」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前らは敵だ。ほいほい答えるわけないだろ。拷問されたって言うもんか！」"
translation = "「너희는 적이다. 순순히 대답할 리 없잖아. 고문을 당한대도 말할까 보냐!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、拷問なんてするつもりないんだけど……」"
translation = "「아니, 고문 같은 거 할 생각 없는데……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（会長くんたちが今どうしてるか、少しでもわかればと思ったんだけど、難しそうね。心配だけど今は信じるしかないわ）"
translation = "(회장님 일행이 지금 어떻게 지내는지 조금이라도 알 수 있을까 했는데, 어렵겠네~ 걱정되지만 지금은 믿을 수밖에 없겠어~)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（そうですね……。だけどヴィーナスも会長も、そう簡単にやられるわけありません……！）"
translation = "(그렇네요……. 하지만 비너스도 회장님도 그렇게 쉽게 당할 리 없어요……!)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（ヴィーナス前会長を始め、平行世界を超える事例は今までにもありました）"
translation = "(비너스 전 회장님을 비롯해 평행세계를 넘은 사례는 지금까지도 있었습니다.)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（それに会長には、平行世界を渡る魔王ラクシスの力があります。何とかなる……と思いましょう）"
translation = "(게다가 회장님에게는 평행세계를 건너는 마왕 락시스의 힘이 있습니다. 어떻게든 될 거라…… 믿기로 하죠.)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（そして私たちはこの世界で、今できることをしなければ）"
translation = "(그리고 저희는 이 세계에서 지금 할 수 있는 일을 해야 합니다.)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（うん……！）"
translation = "(응……!)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「香堂チナさん。あなたと私たちは、今は敵です」"
translation = "「코도 치나 씨. 당신과 저희는 지금은 적입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「情報を渡さないために黙秘するのも、確かに１つの選択でしょう。無理やり聞き出すようなことはしません」"
translation = "「정보를 넘기지 않기 위해 묵비권을 행사하는 것도 분명 하나의 선택이겠죠. 억지로 캐묻는 짓은 하지 않겠습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですがあなたの言葉には腑に落ちない点があります」"
translation = "「하지만 당신의 말에는 납득이 가지 않는 점이 있습니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前のせいで、アタシの家族は……！」"
translation = "「너 때문에 내 가족은……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "『君の家族……？\u3000なんのことだ、君はいったい！？』"
translation = "『너의 가족……? 무슨 소리지, 너는 대체!?』"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前はアタシたちの世界を破壊した……！\u3000この魔王め……！」"
translation = "「너는 우리 세계를 파괴했어……! 이 마왕 녀석……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あなたは以前、『魔王クロトがデネブを破壊した』と言っていました。あれはどういう意味ですか？」"
translation = "「당신은 이전에 『마왕 쿠로토가 데네브를 파괴했다』고 말했습니다. 그건 무슨 의미입니까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私たちが知る限り、デネブの緋宮クロトもリクリエと戦っていたはずです。でなければヴィーナス前会長は──」"
translation = "「저희가 아는 한, 데네브의 히노미야 쿠로토도 리크리에와 싸우고 있었을 터입니다. 그렇지 않다면 비너스 전 회장님은──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「何言ってる！！\u3000魔王クロトはデネブを裏切って、アルタイルに逃げたんだ！！」"
translation = "「무슨 소릴 하는 거야!! 마왕 쿠로토는 데네브를 배신하고 알타이르로 도망쳤단 말이다!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい……？\u3000緋宮会長が、デネブからアルタイルに……？」"
translation = "「네……? 히노미야 회장님이 데네브에서 알타이르로……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ん～……どういうことかしら？\u3000私たちの知っている会長くんは、アルタイルの会長くんよね～？」"
translation = "「음~…… 어떻게 된 일일까~? 우리가 알고 있는 회장님은 알타이르의 회장님인데 말이야~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長がデネブから来た……？\u3000いやそれはヴィーナスの話じゃ……」"
translation = "「회장님이 데네브에서 왔다고……? 아니, 그건 비너스의 이야기 아니었나……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いいや、ルヴィネ会長が言ってたんだ！\u3000あいつは、魔王クロトは、自分が生まれたデネブを見捨ててアルタイルに──」"
translation = "「아니야, 루비네 회장님이 말씀하셨어! 그 녀석은, 마왕 쿠로토는 자기가 태어난 데네브를 버리고 알타이르로──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いいえ、そんなはずはありません」"
translation = "「아니요, 그럴 리 없습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長──この世界の緋宮クロトは、リノさんが幼い頃から養育してきました。その記録もあります」"
translation = "「회장님── 이 세계의 히노미야 쿠로토는 리노 씨가 어릴 적부터 양육해 왔습니다. 그 기록도 남아 있고요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それに会長がデネブから来たのであれば、ヴィーナス前会長を知っていなければおかしいですし、わざわざ覚醒させる意味もありません」"
translation = "「게다가 회장님이 데네브에서 온 것이라면 비너스 전 회장님을 모를 리가 없고, 일부러 각성시킬 의미도 없습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですからチナさん。敵味方の立場とは関係なく、あなたの認識には何かしらの齟齬があるのではないでしょうか？」"
translation = "「그러니 치나 씨. 적과 아군이라는 입장을 떠나서, 당신의 인식에는 무언가 착오가 있는 게 아닐까요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「は……？\u3000お前ら……何言って……？」"
translation = "「하……? 너희들…… 무슨 소리를……?」"

