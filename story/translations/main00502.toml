[[dialogue]]
speaker = "unk"
original = "第３話,異暦と時代の壁画,B"
translation = "제3화, 이력과 시대의 벽화, B"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "「ピピ──ガガ──プシュウゥゥ………………」"
translation = "「삐삐──가가──푸슈우우우………………」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……なんとか３人でも突破できたか」"
translation = "「……어떻게든 세 명으로도 돌파했나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「前よりちょっと手強いカンジだったかな♪」"
translation = "「전보다 조금 벅찬 느낌이었으려나♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ。さすがはご両名です」"
translation = "「후후. 역시 두 분이시군요.」"

[[dialogue]]
speaker = "unk"
original = "３人は３人でも、両学園の粋を集めたチームだ。"
translation = "세 명은 세 명이라도, 양 학원의 정예를 모은 팀이다."

[[dialogue]]
speaker = "unk"
original = "フィオナとヴィーナスに比べると、今の俺が若干劣っているのは否めないが……"
translation = "피오나와 비너스에 비하면, 지금의 내가 약간 뒤처지는 것은 부정할 수 없지만……"

[[dialogue]]
speaker = "unk"
original = "それでも星騎士たちの中では精鋭揃いと言っていいだろう。"
translation = "그래도 성기사들 중에서는 정예들만 모였다고 해도 좋을 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「実際……これがもし人間界にぞろぞろ出てきたら危ないな。大型モンスタークラスの強さがある」"
translation = "「실제……이게 만약 인간계에 우르르 쏟아져 나온다면 위험하겠군. 대형 몬스터 급의 강함이 있어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫じゃない？\u3000この機械たちはだって、塔を守る存在なんでしょ？」"
translation = "「괜찮지 않아? 이 기계들은 탑을 지키는 존재잖아?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「理屈で言えばそうですが……この先何が起こるかは、正直読めませんよね」"
translation = "「이론적으로는 그렇습니다만…… 이 앞에 무슨 일이 일어날지는, 솔직히 예측할 수 없지요.」"

[[dialogue]]
speaker = "unk"
original = "俺たちが何者かもわからぬまま襲撃してくる時点でガーディアンたちも壊れている。"
translation = "우리들이 누구인지도 모른 채 습격해 오는 시점에서 가디언들도 고장 나 있다."

[[dialogue]]
speaker = "unk"
original = "この一帯に沈んでいる瘴気の汚染──その影響は存在の根底までもを<ruby>混濁<rt>こんだく</rt></ruby>させる。"
translation = "이 일대에 가라앉아 있는 장기의 오염── 그 영향은 존재의 근간마저도 혼탁하게 만든다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こいつらは第一階層のものより強かった。もし、このまま先に進んでいくなら……」"
translation = "「이 녀석들은 제1계층의 것보다 강했어. 만약, 이대로 계속 나아간다면……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「上部へ進むほど強大な守護者が待っている──というのも、ありそうな話です」"
translation = "「상부로 나아갈수록 강대한 수호자가 기다리고 있다──는 것도, 있을 법한 이야기입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ならクロトが先頭ね！\u3000私たちはその後をついてくわ！」"
translation = "「그럼 쿠로토가 선두네! 우리는 그 뒤를 따라갈게!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。いざという時は盾になるから、援護を頼む」"
translation = "「알았어. 만일의 경우에는 방패가 될 테니, 지원을 부탁해」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ。頼もしいんですね」"
translation = "「후후. 든든하시군요.」"

[[dialogue]]
speaker = "unk"
original = "これでも男だ。"
translation = "이래 봬도 남자다."

[[dialogue]]
speaker = "unk"
original = "未知のダンジョンを前に不安な気持ちはあるが、矢面に立つなら自分が適任だろう。"
translation = "미지의 던전을 앞에 두고 불안한 마음은 있지만, 선봉에 설 사람은 자신이 적임일 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フィオナは<ruby>殿<rt>しんがり</rt></ruby>よ！\u3000もし私たちが危険な状況になったら、撤退の判断をしてね！」"
translation = "「피오나는 후위야! 만약 우리가 위험한 상황이 되면, 철수 판단을 해 줘!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ……フォーメーションですね。かしこまりました」"
translation = "「후후…… 포메이션이군요. 알겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "フィオナはいつでも冷静な判断を下してくれる。"
translation = "피오나는 언제나 냉정한 판단을 내려준다."

[[dialogue]]
speaker = "unk"
original = "殿を任せるなら、確かにふさわしいと言えた。"
translation = "후위를 맡긴다면, 확실히 적합하다고 말할 수 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そして私は遊撃手にして主砲よ！\u3000前からでも後ろからでも、ガンガン壊れたガーディアンどもを打ち抜くわ」"
translation = "「그리고 나는 유격수이자 주포야! 앞에서든 뒤에서든, 마구 고장 난 가디언들을 꿰뚫어 버릴 거야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「２人とも、私が本気になったからには大船に乗ったつもりでいなさい！\u3000……あ、でもクロトはサボっちゃダメよ。実戦経験は貴重なんだから」"
translation = "「두 사람 다, 내가 진심이 된 이상 배에 올라탄 셈 치고 있어! ……아, 그래도 쿠로토는 게으름 피우면 안 돼. 실전 경험은 귀중하니까」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスもいつになく張り切っている。"
translation = "비너스도 평소와 다름없이 의욕이 넘친다."

[[dialogue]]
speaker = "unk"
original = "このメンバーならきっと大丈夫だろう。"
translation = "이 멤버라면 분명 괜찮을 것이다."

[[dialogue]]
speaker = "unk"
original = "フィーニス第二階層の内部を進んでいく俺たち。"
translation = "피니스 제2계층의 내부를 계속 나아가는 우리들."

[[dialogue]]
speaker = "unk"
original = "道中、ガーディアンとの交戦を何度か繰り広げつつも……"
translation = "도중, 가디언과의 교전을 몇 번이고 벌이면서도……"

[[dialogue]]
speaker = "unk"
original = "俺たちの話題は、必然と第二階層の独特な雰囲気へ派生する。"
translation = "우리들의 화제는, 필연적으로 제2계층의 독특한 분위기로 파생된다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「にしても……な～んか見覚えある雰囲気よね、ここ」"
translation = "「그렇다고 해도…… 어쩐지 낯익은 분위기네, 여기」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。このあたりとか、壁画……そっくりだな」"
translation = "「아아. 이 근처라든지, 벽화…… 똑같군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "<b>何</b>に……かは言うまでもなかった。"
translation = "<b>무엇</b>에……인지는 말할 필요도 없었다."

[[dialogue]]
speaker = "unk"
original = "大聖堂に飾られていた『太陽の壁画』──"
translation = "대성당에 장식되어 있던 『태양의 벽화』──"

[[dialogue]]
speaker = "unk"
original = "第二階層の壁にある絵や象形は、あれに酷似したタッチで印されていた。"
translation = "제2계층의 벽에 있는 그림이나 상형은, 그것과 흡사한 터치로 새겨져 있었다."

[[dialogue]]
speaker = "unk"
original = "どこまでも続く通路の壁には、同じ絵柄がずらりと並んでいる。"
translation = "어디까지나 이어지는 통로의 벽에는, 똑같은 그림들이 줄지어 늘어서 있다."

[[dialogue]]
speaker = "unk"
original = "天使の絵。魔族の絵。"
translation = "천사의 그림. 마족의 그림."

[[dialogue]]
speaker = "unk"
original = "人間の絵もあれば、普通の哺乳類や爬虫類の姿もある。"
translation = "인간의 그림도 있고, 평범한 포유류나 파충류의 모습도 있다."

[[dialogue]]
speaker = "unk"
original = "環境もまた多種多様で、荒野があれば野原もあって海も川も森林もある。"
translation = "환경 또한 다종다양하여, 황야가 있으면 들판도 있고 바다도 강도 삼림도 있다."

[[dialogue]]
speaker = "unk"
original = "有り体に言って、森羅万象を描いた壁画と称してもよかった。"
translation = "솔직히 말해, 삼라만상을 그린 벽화라고 칭해도 좋았다."

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "그러나……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、どういうこと！？\u3000こっちに描かれてるの……ビルだわ！」"
translation = "「어, 뭐야!? 여기에 그려져 있는 거…… 빌딩이잖아!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こちらには自動車と……それから飛行機が描かれていますね。かなり旧式のようですが」"
translation = "「이쪽에는 자동차와…… 그리고 비행기가 그려져 있네요. 상당히 구식인 것 같습니다만.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こっちは天界の様子で……こっちは魔界か？\u3000時代が進んでるのは間違いないな」"
translation = "「여기는 천계의 모습이고…… 여기는 마계인가? 시대가 발전하고 있는 건 틀림없군」"

[[dialogue]]
speaker = "unk"
original = "歩くにつれ。進むにつれ。"
translation = "걸을수록. 나아갈수록."

[[dialogue]]
speaker = "unk"
original = "壁画のテイストこそ変わらないものの、描かれている内容──その文明が段々と発展しているのがわかる。"
translation = "벽화의 테이스트는 변하지 않지만, 그려져 있는 내용── 그 문명이 점차 발전하고 있다는 것을 알 수 있다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どゆこと……？\u3000自然を描くものじゃなかったの？」"
translation = "「무슨 소리야……? 자연을 그리는 게 아니었어?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「自然を含めたすべて──というのが正しいのかもしれません」"
translation = "「자연을 포함한 모든 것──이 맞을지도 모릅니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これらが描いているのは……『世界の歴史』、と言ったところでしょうか」"
translation = "「이것들이 그리고 있는 것은…… 『세계의 역사』, 라고 할 수 있을까요.」"

[[dialogue]]
speaker = "unk"
original = "世界。"
translation = "세계."

[[dialogue]]
speaker = "unk"
original = "それも三界すべての歴史だ。"
translation = "그것도 삼계 모든 역사의."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほど……なら、このまま進んでけばいずれ私たちの時代に着くってことね♪」"
translation = "「과연…… 그럼, 이대로 계속 나아가면 언젠가 우리들의 시대에 도착한다는 거네♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……だと、俺も思ってたんだが」"
translation = "「……라고, 나도 생각했는데」"

[[dialogue]]
speaker = "unk"
original = "立ち並ぶ高層ビル群が描かれた人間界の図。"
translation = "줄지어 늘어선 고층 빌딩군이 그려진 인간계의 그림."

[[dialogue]]
speaker = "unk"
original = "しかし、その次に現れた壁画は一気にその文明レベルを落としていた。"
translation = "하지만, 그 다음에 나타난 벽화는 단숨에 그 문명 수준을 떨어뜨리고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これは──石と棍棒、ですか」"
translation = "「이것은── 돌과 곤봉, 입니까.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……焚き火。石貨。それから、狩りの様子か」"
translation = "「……모닥불. 석화. 그리고, 사냥하는 모습인가」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え──あ、あれ？\u3000なんか巻き戻ってない、これ……？」"
translation = "「에── 아, 어라? 뭔가 되감기 된 거 아니야, 이거……?」"

[[dialogue]]
speaker = "unk"
original = "ここに入ってすぐの地点でも見た壁画だった。"
translation = "여기에 들어서자마자 봤던 벽화였다."

[[dialogue]]
speaker = "unk"
original = "道を間違えてしまったのかと、ヴィーナスはあたふたして来た道を振り返る。"
translation = "길을 잘못 들었나 싶어, 비너스는 허둥대며 왔던 길을 돌아본다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや……大丈夫だヴィーナス。これが絵の順番なんだろう」"
translation = "「아니…… 괜찮아 비너스. 이게 그림의 순서일 거야」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「村落の誕生──車輪の発明──それから国同士の戦争も経て……」"
translation = "「촌락의 탄생── 수레바퀴의 발명── 그리고 나라 간의 전쟁도 거쳐서……」"

[[dialogue]]
speaker = "unk"
original = "通路を進みつつ脇の壁画を眺めていく俺たち。"
translation = "통로를 나아가면서 옆의 벽화를 바라보는 우리들."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今度は無人飛行機が描かれています。先ほどのビル群より、もういくらか技術が発展したようですね」"
translation = "「이번에는 무인 비행기가 그려져 있습니다. 아까의 빌딩군보다, 이제 좀 더 기술이 발전한 것 같네요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、次は……？」"
translation = "「그럼, 다음은……?」"

[[dialogue]]
speaker = "unk"
original = "さらに一歩を踏み進める。"
translation = "다시 한 걸음을 내딛는다."

[[dialogue]]
speaker = "unk"
original = "すると、現れた壁画はやはり『石と棍棒』だった。"
translation = "그러자, 나타난 벽화는 역시 『돌과 곤봉』이었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「また原始時代！\u3000私たち、グルグル同じとこ回ってたりしないわよね？」"
translation = "「또 원시 시대! 우리, 빙글빙글 같은 곳을 돌고 있는 거 아니지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっと先に行こう。そうすればわかるはず」"
translation = "「더 앞으로 가자. 그러면 알 수 있을 거야」"

[[dialogue]]
speaker = "unk"
original = "それからずっと進んでも同じだった。"
translation = "그 후로 계속 나아가도 똑같았다."

[[dialogue]]
speaker = "unk"
original = "原初があり、中世があり、近代があり、現代的な発展を迎えては、再び原初に戻る。"
translation = "원초가 있고, 중세가 있고, 근대가 있고, 현대적인 발전을 맞이했다가, 다시 원초로 돌아간다."

[[dialogue]]
speaker = "unk"
original = "輪廻するように繰り返されるこのサイクルは、決して壁画の枚数不足なんかじゃない。"
translation = "윤회하듯이 반복되는 이 사이클은, 결코 벽화의 매수 부족 같은 게 아니다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っ、どういうことなの──いつまで経っても現代にたどり着かないじゃない」"
translation = "「읏, 무슨 소리야── 아무리 시간이 지나도 현대에 도달하지 않잖아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「また『石と棍棒』だ。その前の絵は、つい数十年前くらいのテクノロジーに見えるのに……」"
translation = "「또 『돌과 곤봉』이다. 그 전 그림은, 불과 수십 년 전쯤의 기술처럼 보이는데……」"

[[dialogue]]
speaker = "unk"
original = "近代から原始へ。"
translation = "근대에서 원시로."

[[dialogue]]
speaker = "unk"
original = "その、相容れない２つの絵の狭間に立ち尽くしていると──"
translation = "그, 서로 상반되는 두 그림의 틈새에 우두커니 서 있을 때──"

[[dialogue]]
speaker = "？？？"
original = "「その絵と絵の間が、リクリエ──」"
translation = "「그 그림과 그림 사이가, 리크리에──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！\u3000誰……！？」"
translation = "「! 누구……!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、あなたは……！」"
translation = "「아, 당신은……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「守護天使……マグダレナ、さん？」"
translation = "「수호 천사…… 막달레나 씨?」"

[[dialogue]]
speaker = "unk"
original = "俺は咄嗟に前へ踏み出し、ヴィーナスとフィオナを背中に隠す。"
translation = "나는 순간적으로 앞으로 나아가, 비너스와 피오나를 등 뒤에 숨긴다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「よい覇気です。緋宮クロトさま。こうして相まみえるのは初めまして、ですね」"
translation = "「좋은 패기입니다. 히노미야 쿠로토 님. 이렇게 서로 마주하는 것은 처음 뵙겠습니다, 이지요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……前にも、第一階層の終点で出会ったはず。だが」"
translation = "「……전에도, 제1계층의 종점에서 만났을 터. 하지만」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ええ。あれは一時的な残留思念。今の私も霊体ですが、ようやくリアルタイムでのコンタクトが可能となりました」"
translation = "「예. 그것은 일시적인 잔류 사념. 지금의 저도 영체입니다만, 드디어 실시간으로 접촉이 가능하게 되었습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「<ruby>精悍<rt>せいかん</rt></ruby>なお顔つきです。それに、御子を守るように立つお心構えも素晴らしいですね」"
translation = "「늠름한 얼굴빛입니다. 게다가, 미코를 지키려는 듯 서 계신 마음가짐도 훌륭하시군요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "こちらの警戒心も見透かされていた。"
translation = "이쪽의 경계심마저도 꿰뚫어 보고 있었다."

[[dialogue]]
speaker = "unk"
original = "今の彼女から敵意やリクリエの瘴気は感じられなかったが……流星星徒会は、堕天使となった彼女と交戦したという話も聞く。"
translation = "지금의 그녀에게서 적의나 리크리에의 장기는 느껴지지 않았지만…… 유성 성도회는, 타락천사가 된 그녀와 교전했다는 이야기도 듣는다."

[[dialogue]]
speaker = "unk"
original = "ひとまず油断すべきではないだろう。"
translation = "일단 방심해서는 안 될 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「御子って確か私のことよね。あなた、この前は言いたいことだけ言って消えちゃったじゃない！」"
translation = "「미코는 분명 나를 말하는 거지. 당신, 저번에는 하고 싶은 말만 하고 사라져 버렸잖아!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「失礼いたしました。残る力を御子に授けたつもりでしたが、お役に立ちましたか？」"
translation = "「실례했습니다. 남은 힘을 미코에게 전해 드리고자 했습니다만, 도움이 되었습니까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「立ったよーな、立ってないよーな……」"
translation = "「된 것 같기도, 안 된 것 같기도……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（第一階層の終点では……ヴィーナスさんの日誌に、記述が追加されていましたね）"
translation = "（제1계층의 종점에서는…… 비너스 씨의 일지에, 기술이 추가되어 있었습니다.）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ああ。でも結局、アポロの出現でかき乱された格好になる）"
translation = "（아아. 하지만 결국, 아폴로의 출현으로 흐트러진 꼴이 되었지）"

[[dialogue]]
speaker = "unk"
original = "「この塔を登れ」と彼女はかつて俺たちに告げた。"
translation = "「이 탑을 오르라」고 그녀는 예전에 우리들에게 고했다."

[[dialogue]]
speaker = "unk"
original = "俺たちを導こうという意志は感じられるが、どこまで信用してよいものか。"
translation = "우리들을 인도하려는 의지는 느껴지지만, 어디까지 신용해야 할지."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「お恥ずかしながら。今の私も仮初の身には違いありません。魔界の深部に囚われた本体が解放されない限りは」"
translation = "「부끄럽습니다만. 지금의 저도 임시의 몸임에는 틀림없습니다. 마계의 심부에 갇힌 본체가 해방되지 않는 한은.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふーん……でも、今回は出てこれたのね」"
translation = "「흐음…… 근데, 이번에는 나올 수 있었네」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。私が堕天した際の交戦記録を辿って、錬金に長けたさる星騎士の方が、守護天使としての魂の一端を逆探知してくださいました」"
translation = "「예. 제가 타천했을 당시의 교전 기록을 더듬어, 연금에 능통한 어떤 성기사 분이, 수호 천사로서의 혼의 일단을 역탐지해 주셨습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（錬金に長けた星騎士の方、というと……）"
translation = "（연금에 능통한 성기사 분, 이라면……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（アニマ先輩のことだな……）"
translation = "（아니마 선배 말이지……）"

[[dialogue]]
speaker = "unk"
original = "あの人も大概なスキルを身に着けているものだ。"
translation = "그 사람도 대단한 스킬을 익히고 있는 법이다."

[[dialogue]]
speaker = "unk"
original = "ならばこれは救いの船として、こちらも情報を引き出す機会と捉えよう。"
translation = "그렇다면 이것은 구원의 배로 여기고, 이쪽도 정보를 이끌어낼 기회로 삼자."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「先ほど──あなたは気になることを言った。この絵と絵の間が『リクリエ』だと」"
translation = "「아까── 당신은 신경 쓰이는 말을 했어. 이 그림과 그림 사이가 『리크리에』라고」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「さようです。私は『リクリエ』の本質、そしてルールをあなた方にお伝えすべく参じました」"
translation = "「그렇습니다. 저는 『리크리에』의 본질, 그리고 규칙을 당신들에게 전해 드리고자 왔습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「<b>幾たび</b>のリクリエを乗り越えた者として」"
translation = "「<b>수차례</b>의 리크리에를 극복한 자로서.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「幾たびの……それに、リクリエの本質──ですか」"
translation = "「수차례의…… 게다가, 리크리에의 본질── 입니까.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ええ。今、あなた方の目の前にある壁画は、それを端的に表しています」"
translation = "「예. 지금, 당신들 눈앞에 있는 벽화는, 그것을 단적으로 나타내고 있습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「第一階層の最奥で残した、私の言葉を覚えておりますでしょうか？」"
translation = "「제1계층의 최심부에서 남긴, 저의 말을 기억하고 계십니까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「確か……三界の徹底的な破滅が迫っている、と」"
translation = "「분명…… 삼계의 철저한 파멸이 다가오고 있다고.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。それも事実。そして……」"
translation = "「예. 그것도 사실. 그리고……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんが残していた言葉。リクリエについて。それは確か……"
translation = "막달레나 씨가 남겼던 말. 리크리에에 대해서. 그것은 분명……"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "『端的に申し上げましょう。リクリエとは主の意思すらも越えた──摂理の再構築によるものです』"
translation = "『단적으로 말씀드리겠습니다. 리크리에는 주인의 의지마저 넘어선── 섭리의 재구축에 의한 것입니다』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……摂理の再構築」"
translation = "「……섭리의 재구축」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「その通りです。リクリエとは摂理の再構築。そして摂理の再構築とは、<b>それ</b>なのです」"
translation = "「그렇습니다. 리크리에는 섭리의 재구축. 그리고 섭리의 재구축이란, <b>그것</b>입니다.」"

[[dialogue]]
speaker = "unk"
original = "そう言ってマグダレナさんが指し示したのは、『サイバー社会』壁画と『石と棍棒』壁画の間にある空白だった。"
translation = "그렇게 말하며 막달레나 씨가 가리킨 것은, 『사이버 사회』 벽화와 『돌과 곤봉』 벽화 사이에 있는 공백이었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ？\u3000ここに絵が隠れてるってこと？」"
translation = "「엣? 여기에 그림이 숨겨져 있다는 거야?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──いえ。なるほど」"
translation = "「──아닙니다. 과연.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「絵には描かれていませんが──ここで<b>何か</b>が起こっていた。ということですね」"
translation = "「그림에는 그려져 있지 않지만── 여기서 <b>무언가</b>가 일어났다. 라는 것이군요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「さようです。星見様は聡明ですね」"
translation = "「그렇습니다. 별을 보는 분은 총명하시군요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「リクリエとは世界を漂白する現象。訪れるのは世界の破滅。そう聞き及んでいることと思います」"
translation = "「리크리에는 세계를 표백하는 현상. 찾아오는 것은 세계의 파멸. 그렇게 들어 알고 계실 거라 생각합니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「常識よね。ていうか、あなたもそう言ってたじゃない」"
translation = "「상식이지. 아니, 당신도 그렇게 말했잖아」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。ですがこの世界は、実は、何度となくリクリエを経験しているのです」"
translation = "「예. 하지만 이 세계는, 사실은, 몇 번이고 리크리에를 경험하고 있는 것입니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "彼女はサラリとそう言ってのけた。"
translation = "그녀는 아무렇지도 않게 그렇게 말했다."

[[dialogue]]
speaker = "unk"
original = "無論、黙っていられないのはヴィーナスで……"
translation = "물론, 가만히 있을 수 없는 것은 비너스였고……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっと！\u3000ありえないわよ、リクリエによる世界の破滅は──３０００年前の『魔王』が防いだんだから！」"
translation = "「잠깐! 말도 안 돼, 리크리에에 의한 세계의 파멸은── 3000년 전의 『마왕』이 막았으니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こればっかりは、あなたが何者だって譲るわけには──」"
translation = "「이것만은, 당신이 누구든 양보할 수는──」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いえ。御子のおっしゃることも事実です」"
translation = "「아닙니다. 미코께서 말씀하시는 것도 사실입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ってあれっ？\u3000じゃ、じゃあ結局どっちなのよ！」"
translation = "「──라고 어랏? 그, 그럼 결국 어느 쪽인 거야!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「どちらも真──ということです。人類はかつてのリクリエを『魔王』の力によって防いだ、これは私も観測している事実」"
translation = "「둘 다 진실──이라는 것입니다. 인류는 과거의 리크리에를 『마왕』의 힘으로 막았다, 이것은 저도 관측하고 있는 사실.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そ、そうよ。だったらそれでいいじゃない」"
translation = "「그, 그래. 그렇다면 그걸로 됐잖아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（守護天使までも……）"
translation = "（수호 천사마저도……）"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんもヴィーナスと同じく『魔王』を英雄視していた。"
translation = "막달레나 씨도 비너스와 마찬가지로 『마왕』을 영웅시하고 있었다."

[[dialogue]]
speaker = "unk"
original = "その言説を聞いたのはヴィーナス、アポロに続いて３人目だ。"
translation = "그 언설을 들은 것은 비너스, 아폴로에 이어 세 번째다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ですが。それはそれとして、世界は幾度もリクリエを経験しているのです。これも私が観測してきた歴史」"
translation = "「하지만. 그것과는 별개로, 세계는 몇 번이고 리크리에를 경험하고 있는 것입니다. 이것도 제가 관측해 온 역사.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「は……はあっ！？\u3000言ってることめちゃくちゃなんですけど！」"
translation = "「하…… 하아!? 말하는 게 엉망진창이잖아!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "その言葉を聞いて俺の脳裏に閃きがよぎった。"
translation = "그 말을 듣고 내 머릿속에 섬광이 스쳐 지나갔다."

[[dialogue]]
speaker = "unk"
original = "当の彼女は未だ、壁画と壁画の間を指し示している。"
translation = "정작 그녀는 여전히, 벽화와 벽화 사이를 가리키고 있다."

[[dialogue]]
speaker = "unk"
original = "『サイバー社会』と『石と棍棒』の間──<b>何か</b>が起きたという地点を。"
translation = "『사이버 사회』와 『돌과 곤봉』 사이── <b>무언가</b>가 일어났다는 지점을."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（リクリエを魔王が防いだ──世界はリクリエを経験している──この２つは、相容れないようで実は成り立つ）"
translation = "（리크리에를 마왕이 막았다── 세계는 리크리에를 경험하고 있다── 이 두 가지는, 서로 상반되는 듯하면서도 사실 성립한다）"

[[dialogue]]
speaker = "unk"
original = "要は時系列の問題だ。"
translation = "요점은 시계열의 문제다."

[[dialogue]]
speaker = "unk"
original = "魔王とやらが実在した３０００年前──よりもさらに過去に、似たような事象が起こっていたとするなら？"
translation = "마왕이라는 존재가 실재했던 3000년 전──보다 훨씬 과거에, 비슷한 사상이 일어났다고 한다면?"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まさか──マグダレナさん。あなたは」"
translation = "「설마── 막달레나 씨. 당신은」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちが生きている世界は……<b>１回目じゃない</b>、とでも言いたいのか」"
translation = "「우리들이 살고 있는 세계는…… <ruby>첫 번째가 아니다<rt>・ ・・・ ・・・</rt></ruby>, 라고라도 말하고 싶은 건가」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ご明察です──緋宮クロトさま。世界は魔王という存在が生まれるより遥か昔に、リクリエの到来を許している」"
translation = "「명철하십니다── 히노미야 쿠로토 님. 세계는 마왕이라는 존재가 태어나기 훨씬 이전에, 리크리에의 도래를 허용하고 있습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「さらに言えばそれより過去も、そのまた過去も。リクリエは周期的に世界を飲み込んでいました」"
translation = "「더 나아가 그보다 과거도, 또 그 과거도. 리크리에는 주기적으로 세계를 집어삼키고 있었습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「な……ななな……！？」"
translation = "「나…… 나나나……!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「それこそが『摂理の再構築』──私がお伝えしたかった『リクリエのルール』です」"
translation = "「그것이야말로 『섭리의 재구축』── 제가 전해 드리고 싶었던 『리크리에의 규칙』입니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そういう、ことか」"
translation = "「……그런, 것이었나」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リクリエとは世界の終焉──しかし、<b>その後</b>のことまで考えなくてはならなかったのですね」"
translation = "「리크리에는 세계의 종언── 하지만, <ruby>그 후<rt>・ ・</rt></ruby>의 일까지 생각해야 했던 것이군요.」"

[[dialogue]]
speaker = "unk"
original = "脳内をショックが駆け巡る。"
translation = "뇌리에 충격이 휘몰아친다."

[[dialogue]]
speaker = "unk"
original = "なんということだ。まさか、終わりと思っていたリクリエを世界は何度も経験していただなんて……。"
translation = "이럴 수가. 설마, 끝이라고 생각했던 리크리에를 세계는 몇 번이고 경험하고 있었다니……."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あーもーっ待ちなさい！\u3000意味不明で置いてけぼりなんですけど、私にもわかるように説明しなさーいっ！」"
translation = "「아ー 정말! 기다려! 의미를 모르겠어서 나만 뒤처지고 있잖아, 나도 알 수 있게 설명해 줘!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふむ……御子のご理解力はご両名に比較すると劣る様子」"
translation = "「흐음…… 미코의 이해력은 두 분에 비교하면 떨어지는 듯합니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「冷静に分析されると腹立つわね……」"
translation = "「냉정하게 분석당하니 짜증 나네……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「問題ありません。それでは確認も兼ね、順序立ててご説明させていただきます」"
translation = "「문제없습니다. 그럼 확인도 겸해, 순서대로 설명해 드리겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "すると、マグダレナさんは壁画のひとつを指さした。"
translation = "그러자, 막달레나 씨는 벽화 중 하나를 가리켰다."

[[dialogue]]
speaker = "unk"
original = "進歩した文明の次にあたる──原初の世界の絵だ。"
translation = "진보한 문명 다음 순서에 해당하는── 원초의 세계 그림이다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「まず世界の歴史は『石と棍棒』に始まっています。実際にはヒト型の存在すらない期間もあったのでしょうが、絵にはなっていないようです」"
translation = "「먼저 세계의 역사는 『돌과 곤봉』으로 시작하고 있습니다. 실제로는 인간 형태의 존재조차 없는 기간도 있었겠지만, 그림으로는 되어 있지 않은 듯합니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ここで人間界に国ができ、時を同じくして魔界に文明が誕生します。天界はまだのんびりしています」"
translation = "「여기서 인간계에 나라가 생기고, 때를 같이하여 마계에 문명이 탄생합니다. 천계는 아직 한가롭습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふむふむ……森羅暦５００年くらいかしら？」"
translation = "「흐음흐음…… 신라력 500년쯤일까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですね。確か、天界に初めて国が興ったのは６００年ごろと……」"
translation = "「그렇네요. 분명, 천계에 처음 나라가 일어난 것은 600년경이라고……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いいえ」"
translation = "「아닙니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「これは──<b>朱雀暦</b>５００年の出来事です。発展の度合いとしては森羅暦と変わりありませんが」"
translation = "「이것은── <b>주작력</b> 500년의 사건입니다. 발전의 정도는 신라력과 다르지 않습니다만.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「す……すざくれき？\u3000って何？\u3000クロトっ」"
translation = "「스…… 주작력? 그게 뭐야? 쿠로토!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや。聞いたこともない」"
translation = "「아니. 들어본 적도 없어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私もですね。魔界や天界にも、そういった異なる暦はなかったと記憶していますが……」"
translation = "「저도 그렇습니다. 마계나 천계에도, 그러한 다른 역법은 없었던 것으로 기억합니다만……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。見聞なくして当然です。今の世界には存在しない暦ですから」"
translation = "「예. 들어본 적이 없는 것이 당연합니다. 지금의 세계에는 존재하지 않는 역법이니까요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い……今の世界、って……」"
translation = "「지…… 지금의 세계, 라고……」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんはそれ以上深掘りすることなく、そのままゆっくり歩いては壁画の推移を指し示していく。"
translation = "막달레나 씨는 더 이상 깊이 파고들지 않고, 그대로 천천히 걸으며 벽화의 추이를 가리킨다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「この後、三界の発展は平行して続いていきます」"
translation = "「이후, 삼계의 발전은 평행하게 계속됩니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「たとえばこちらの絵ではある程度の文明に達していますね。人間界には科学技術の成熟が見られます」"
translation = "「예를 들어 이쪽 그림에서는 어느 정도의 문명에 도달했군요. 인간계에는 과학 기술의 성숙이 보입니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちの感覚で言えば……２０００年ごろの様子に見える」"
translation = "「우리들의 감각으로 말하면…… 2000년경의 모습으로 보인다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ええ、およそ２０００年ごろにあたりますね」"
translation = "「예, 대략 2000년경에 해당합니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そして次をご覧ください。およそ２５００年ごろ──魔界滅亡の様子が描かれています」"
translation = "「그리고 다음을 보십시오. 대략 2500년경── 마계 멸망의 모습이 그려져 있습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、魔界が滅亡！？」"
translation = "「마, 마계가 멸망!?」"

[[dialogue]]
speaker = "unk"
original = "見てみると、実際に魔界が阿鼻叫喚になっている図が描かれていた。"
translation = "보면, 실제로 마계가 아비규환이 된 그림이 그려져 있었다."

[[dialogue]]
speaker = "unk"
original = "また、その上空にはきらびやかなドラゴンの姿が描かれていて……"
translation = "또한, 그 상공에는 찬란한 드래곤의 모습이 그려져 있고……"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「煌竜ヴィライア──そう称された魔物の襲来により、あまねく生命は息絶えてしまいました」"
translation = "「황룡 빌라이아── 그렇게 칭해진 마물의 습격으로, 모든 생명은 숨을 거두고 말았습니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そんな化け物が」"
translation = "「……그런 괴물이」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほえ～、そんなことがあって魔界が滅んじゃったなんて……大変ね」"
translation = "「호에~, 그런 일이 있어서 마계가 멸망했다니…… 큰일이네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──って、よく考えたらんなわけないわよ！\u3000今のサーシャさん達はどこで生まれたっていうのよ」"
translation = "「──라고, 잘 생각해 보니 그럴 리가 없잖아! 지금의 사샤 씨들은 어디서 태어났다는 거야」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うちにもソフィアがいます。が……恐らく、それとは関係ないのでしょうね」"
translation = "「저희에게도 소피아가 있습니다. 하지만…… 아마도, 그것과는 관계가 없겠지요.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。矛盾は生じません」"
translation = "「예. 모순은 생기지 않습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「なぜならこれは森羅暦２５００年ではなく、朱雀暦２５００年の出来事なのですから」"
translation = "「왜냐하면 이것은 신라력 2500년이 아니라, 주작력 2500년의 사건이기 때문입니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「完全に別世界……ってことか」"
translation = "「완전히 다른 세계……라는 건가」"

[[dialogue]]
speaker = "unk"
original = "そう聞くと、あたかもパラレルワールドのような連想をしてしまいそうになるが違う。"
translation = "그렇게 들으면, 마치 패러렐 월드 같은 연상을 해 버릴 것 같지만 다르다."

[[dialogue]]
speaker = "unk"
original = "なぜならこの壁画たちは一列に連なっているのだから……。"
translation = "왜냐하면 이 벽화들은 일렬로 이어져 있기 때문이다……."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んー……でも２５００年ごろが描かれてるってことは、もうすぐ私たちの時代に追いつくわね」"
translation = "「음ー…… 근데 2500년경이 그려져 있다는 건, 이제 곧 우리들의 시대를 따라잡겠네」"

[[dialogue]]
speaker = "unk"
original = "ならば、その文明はさらなる発展を遂げて今日に至るだろうか？"
translation = "그렇다면, 그 문명은 더욱 발전을 이루어 오늘에 이르렀을까?"

[[dialogue]]
speaker = "unk"
original = "答えは否だ。"
translation = "대답은 '아니오'다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「次の壁画は……空白。そしてまた、『石と棍棒』です」"
translation = "「다음 벽화는…… 공백. 그리고 다시, 『돌과 곤봉』입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へ……ど、どゆこと……！？」"
translation = "「헤…… 무, 무슨 소리야……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この『石と棍棒』からはまた──次なる暦が始まるってわけだな」"
translation = "「이 『돌과 곤봉』으로부터는 또── 다음 역법이 시작된다는 거군」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ご明察です。ここから先に描かれているのは、玄武暦での出来事です」"
translation = "「명철하십니다. 이곳부터 앞에 그려져 있는 것은, 현무력에서의 일입니다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、また新しい暦が……！\u3000ええっと、つまり……整理すると……！」"
translation = "「마, 또 새로운 역법이……! 에엣, 그러니까…… 정리하자면……!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは一旦立ち止まり、これまでの情報を頭でまとめ始めた。"
translation = "비너스는 일단 멈춰 서서, 지금까지의 정보를 머릿속으로 정리하기 시작했다."

[[dialogue]]
speaker = "unk"
original = "俺も推察こそ立ってはいるものの──慮外の真実に驚愕を禁じ得ない。"
translation = "나도 추측이야 서 있지만── 예상 밖의 진실에 경악을 금할 수 없다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……さすがにわかったわ。ここに描かれているのは──<b>私たちの世界の過去</b>、ってことね」"
translation = "「……역시 알겠어. 여기에 그려져 있는 것은── <ruby>우리들의 세계의 과거<rt>・・・・ ・・・ ・・</rt></ruby>라는 거네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──恐らく、そう言いたいんだろう」"
translation = "「──아마도, 그렇게 말하고 싶은 거겠지」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ええ。こうして歴史が並べられていることが、何よりの証左と言えます」"
translation = "「예. 이렇게 역사가 나열되어 있다는 것이, 무엇보다도 증거라고 할 수 있습니다」"

[[dialogue]]
speaker = "unk"
original = "ここに描かれている壁画の様子は──そのどれも森羅暦に至るより前の世界。"
translation = "여기에 그려져 있는 벽화의 모습은── 그 어느 것도 신라력에 이르기 전의 세계."

[[dialogue]]
speaker = "unk"
original = "世界は何度も『石と棍棒』になるまで文明を白紙に帰されて、その度に再び０からのスタートを余儀なくされた。"
translation = "세계는 몇 번이고 『돌과 곤봉』이 될 때까지 문명을 백지화당했고, 그때마다 다시 0부터의 시작을 강요당했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「世界の初期化。それこそが、リクリエの正体といったところでしょうか」"
translation = "「세계의 초기화. 그것이야말로, 리크리에의 정체라고 할 수 있을까요」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いかにも。リクリエは確かに世界の破滅──しかし終焉には、次なる始動がつきものです」"
translation = "「과연. 리크리에는 확실히 세계의 파멸── 하지만 종언에는, 다음 시동이 따르기 마련입니다」"

[[dialogue]]
speaker = "unk"
original = "新たな文明を始めるためのリセット──"
translation = "새로운 문명을 시작하기 위한 리셋──"

[[dialogue]]
speaker = "unk"
original = "俺たちが終わりだと思っていたリクリエは、これまで幾度も繰り返されてきたやり直しだったのだと知る。"
translation = "우리들이 끝이라고 생각했던 리크리에는, 지금까지 몇 번이고 반복되어 온 되풀이였다는 것을 알게 된다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「機構は理解しましたが……なぜ、世界はこのようなことを繰り返しているのでしょうか？」"
translation = "「기구는 이해했습니다만…… 왜, 세계는 이러한 일을 반복하고 있는 것일까요?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「その答えは──この暦の行き着く先を見れば、おわかりいただけるかもしれません」"
translation = "「그 대답은── 이 역법이 다다르는 곳을 보면, 아실 수 있을지도 모릅니다」"

[[dialogue]]
speaker = "unk"
original = "壁画の続きはこれまでと変わりなかった。"
translation = "벽화의 이어짐은 이전과 다르지 않았다."

[[dialogue]]
speaker = "unk"
original = "原初があり、中世があり、近代があり、現代的な発展を迎えては、再び原初に戻る。"
translation = "원초가 있고, 중세가 있고, 근대가 있고, 현대적인 발전을 맞이하고는, 다시 원초로 돌아간다."

[[dialogue]]
speaker = "unk"
original = "しかし……"
translation = "하지만……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あれ？\u3000さっきの『魔界滅亡』の絵がないわよ？」"
translation = "「어라? 아까의 『마계 멸망』 그림이 없네?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「はい。この世界では、朱雀暦２５００年に訪れた天災を避け、三界ともどもさらなる発展を遂げました」"
translation = "「네. 이 세계에서는, 주작력 2500년에 찾아온 천재지변을 피해, 삼계 모두 더한 발전을 이루었습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「しかしそのおかげで天界と魔界による大戦争が発生。人間界も必然とそれに巻き込まれ、未知の滅びへと向かいます」"
translation = "「하지만 그 덕분에 천계와 마계에 의한 대전쟁이 발생. 인간계도 필연적으로 그것에 휘말려, 미지의 멸망으로 향합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「信じられないな……そんなのが実際に起こっていたなんて」"
translation = "「믿을 수 없군…… 그런 것이 실제로 일어나고 있었다니」"

[[dialogue]]
speaker = "unk"
original = "人間界の文明は既に現代と遜色ないレベルに達していた。"
translation = "인간계의 문명은 이미 현대와 손색없는 수준에 도달해 있었다."

[[dialogue]]
speaker = "unk"
original = "聖なる術式を操る天界と、科学を極めた人間界と、モンスターを手中に収めた魔界が熾烈な争いを繰り広げている。"
translation = "성스러운 술식을 다루는 천계와, 과학을 극한으로 파고든 인간계와, 몬스터를 손안에 넣은 마계가 치열한 싸움을 벌이고 있다."

[[dialogue]]
speaker = "unk"
original = "けれど……"
translation = "하지만……"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「この争いも２７００年あたりで途絶え……また『石と棍棒』の時代が始まります」"
translation = "「이 싸움도 2700년쯤에서 끊기고…… 다시 『돌과 곤봉』의 시대가 시작됩니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そうして次も、また同じように歴史が続いていきますが……いずれも前の世界よりはスムーズに発展が進みます」"
translation = "「그렇게 다음도, 또 똑같이 역사가 이어져 가지만…… 어느 쪽이든 이전 세계보다는 순조롭게 발전이 진행됩니다」"

[[dialogue]]
speaker = "unk"
original = "朱雀暦の終点は２５００年すぎだった。"
translation = "주작력의 종점은 2500년이 지났을 때였다."

[[dialogue]]
speaker = "unk"
original = "しかし玄武暦の終点は２７００年を越えて。"
translation = "하지만 현무력의 종점은 2700년을 넘어서."

[[dialogue]]
speaker = "unk"
original = "恐らく次に始まったこの壁画群は、２９００年ごろまでその寿命を延ばすに違いない。"
translation = "아마도 다음에 시작된 이 벽화군은, 2900년경까지 그 수명을 늘리는 것이 틀림없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「<b>文明が長生きしている</b>。それと、天災の描写も明らかに減っている」"
translation = "「<ruby>문명이 오래 지속되고 있다<rt>・・・ ・・ ・・・・ ・・</rt></ruby>. 그리고, 천재지변의 묘사도 확실히 줄어들고 있다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「よい着眼点です、クロトさま。摂理の再構築──その本質とはすなわち、その刷新にあるのです」"
translation = "「좋은 착안점입니다, 쿠로토 님. 섭리의 재구축── 그 본질이란 즉, 그 쇄신에 있는 것입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「世界そのものを発展させるための、システム──」"
translation = "「세계 그 자체를 발전시키기 위한, 시스템──」"

[[dialogue]]
speaker = "unk"
original = "魔界が滅んでしまう厄災が訪れるなら、<b>次の世界</b>ではそれを防ぐ。"
translation = "마계가 멸망해 버리는 액운이 찾아온다면, <ruby>다음 세계<rt>・・ ・・</rt></ruby>에서는 그것을 막는다."

[[dialogue]]
speaker = "unk"
original = "三界を巻き込んだ戦争が起こってしまうのなら、<b>次の世界</b>ではその火種を取り除く。"
translation = "삼계를 휘말리게 한 전쟁이 일어나 버린다면, <ruby>다음 세계<rt>・・ ・・</rt></ruby>에서는 그 불씨를 제거한다."

[[dialogue]]
speaker = "unk"
original = "いわば世界の自浄作用だ。"
translation = "말하자면 세계의 자정 작용이다."

[[dialogue]]
speaker = "unk"
original = "大戦争が、天変地異が、文明の停滞が見受けられたとき、そのエラーを元に次の世界を構築するアップデート。"
translation = "대전쟁이, 천변지이가, 문명의 정체가 보였을 때, 그 에러를 바탕으로 다음 세계를 구축하는 업데이트."

[[dialogue]]
speaker = "unk"
original = "気が遠くなるほど超大なスパンで世界はサイクルを繰り返し、徐々に徐々に発展を続けてきたのだという。"
translation = "아득해질 정도로 거대한 스팬으로 세계는 사이클을 반복하며, 서서히 서서히 발전을 계속해 왔다고 한다."

[[dialogue]]
speaker = "unk"
original = "そしてその最後にあたるのが、今の俺たちの世界のはずで……。"
translation = "그리고 그 마지막에 해당하는 것이, 지금 우리들의 세계일 터이고…….」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「世界を刷新すると言えば聞こえはいい──が」"
translation = "「세계를 쇄신한다고 말하면 듣기에는 좋지만──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……そのシステムが機能する度に！\u3000そこにあった命が、助けを求める人々が、なすすべもなく蹂躙されていったってことじゃないか！？」"
translation = "「그것은…… 그 시스템이 기능할 때마다! 그곳에 있던 생명이, 도움을 청하는 사람들이, 아무런 방법도 없이 유린당해 왔다는 거 아니야!?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ええ、いかにも。しかしリクリエという機構に善しも悪しきもありません」"
translation = "「예, 과연. 하지만 리크리에라는 기구에 좋고 나쁨은 없습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ただ世界そのものがより良く発展するのを求めて、新陳代謝のごとく終焉と再誕を繰り返す。それだけです」"
translation = "「단지 세계 그 자체가 더욱 좋게 발전하는 것을 원하여, 신진대사처럼 종언과 재탄을 반복할 뿐. 그것뿐입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「馬鹿な……」"
translation = "「말도 안 돼……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ちなみに、このことを知っているのは……」"
translation = "「덧붙여서, 이 사실을 알고 있는 것은……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あなた方だけです。これらの真実は、リクリエを乗り越えた私たちのような存在でもない限り、知る由もありません」"
translation = "「당신들뿐입니다. 이러한 진실은, 리크리에를 극복한 저희와 같은 존재가 아닌 한, 알 도리가 없습니다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうしようクロト。私たち、世界の真実ってやつに近づいちゃった！？」"
translation = "「어쩌지 쿠로토. 우리, 세계의 진실이라는 것에 가까워져 버렸어!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「できれば信じたくない類の真実だけどな」"
translation = "「가능하다면 믿고 싶지 않은 종류의 진실이지만」"

[[dialogue]]
speaker = "unk"
original = "単なる世界の破滅というより、理屈がわかったからこそ脅威が増したように感じられた。"
translation = "단순한 세계의 파멸이라기보다, 이치를 알았기 때문에 오히려 위협이 증가한 것처럼 느껴졌다."

[[dialogue]]
speaker = "unk"
original = "そんな、世界そのものを作り変える超大なシステムに対して、俺たちに抗える術はあるのだろうか……？"
translation = "그런, 세계 그 자체를 바꿔 만드는 거대한 시스템에 대해서, 우리들에게 저항할 방법은 있는 것일까……?"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「もうそろそろ通路も終点を迎えます。行きましょう」"
translation = "「이제 곧 통로도 종점에 다다릅니다. 가시죠」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──あ、ちょっと。この絵の暦は何なのよ、スザク、ゲンブって来たら次はビャッコ？」"
translation = "「──아, 잠깐. 이 그림의 역법은 뭐야, 스자쿠, 겐부라고 왔으면 다음은 뱌코?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ふふ──決まっています」"
translation = "「후후── 정해져 있습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「『森羅暦』です」"
translation = "「『신라력』입니다」"

[[dialogue]]
speaker = "unk"
original = "原始──古代──中世──近代と──壁画を巡っていく俺たち。"
translation = "원시── 고대── 중세── 근대와── 벽화를 돌아보는 우리들."

[[dialogue]]
speaker = "unk"
original = "やがてたどり着いた通路の終点には小部屋があった。"
translation = "이윽고 다다른 통로의 종점에는 작은 방이 있었다."

[[dialogue]]
speaker = "unk"
original = "それはすなわち、この描かれた歴史もひとつの終点を迎えたことを意味している。"
translation = "그것은 즉, 이 그려진 역사도 하나의 종점을 맞이했다는 것을 의미한다."

[[dialogue]]
speaker = "unk"
original = "そして、その終点にあったものとは──"
translation = "그리고, 그 종점에 있던 것이란──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは……」"
translation = "「이것은……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "俺たちの前に現れた最後の壁画。"
translation = "우리들 앞에 나타난 마지막 벽화."

[[dialogue]]
speaker = "unk"
original = "それは、今度こそ見覚えのあるものだった。"
translation = "그것은, 이번에야말로 본 적이 있는 것이었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「魔王の絵──大聖堂の、太陽の壁画！！」"
translation = "「마왕의 그림── 대성당의, 태양의 벽화!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っと思ったけど──あれ？\u3000ちょっと違う？」"
translation = "「이라고 생각했는데── 어라? 좀 다른가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……違う、な」"
translation = "「……다르군」"

[[dialogue]]
speaker = "unk"
original = "似ている。"
translation = "닮았다."

[[dialogue]]
speaker = "unk"
original = "けれど、決定的に違う。"
translation = "하지만, 결정적으로 다르다."

[[dialogue]]
speaker = "unk"
original = "呆然とする俺たちの横で、フィオナがつぶやいた。"
translation = "망연자실한 우리들 옆에서, 피오나가 중얼거렸다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「月の壁画……」"
translation = "「달의 벽화……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これは──私の家にある『月の壁画』。それと全く同じものです」"
translation = "「이것은── 제 집에 있는 『달의 벽화』. 그것과 완전히 똑같은 것입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナの家──って、流星教皇庁か？」"
translation = "「피오나의 집──이라니, 유성 교황청인가?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。中でも、居住スペースですが」"
translation = "「네. 그중에서도, 주거 공간입니다만」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『太陽の壁画』とは違う──ってことよね……」"
translation = "「『태양의 벽화』와는 다르다──는 거네……」"

[[dialogue]]
speaker = "unk"
original = "これまでの壁画はずっと、リクリエによる初期化を挟んで幾度となく文明の発展が描かれ続けてきた。"
translation = "지금까지의 벽화는 줄곧, 리크리에에 의한 초기화를 사이에 두고 몇 번이고 문명의 발전이 계속 그려져 왔다."

[[dialogue]]
speaker = "unk"
original = "しかしそれもここが終点。"
translation = "하지만 그것도 여기가 종점."

[[dialogue]]
speaker = "unk"
original = "今に繋がっている時代の最後がこれだとするなら、答えはひとつしかない。"
translation = "지금과 이어져 있는 시대의 마지막이 이것이라고 한다면, 대답은 하나밖에 없다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。これは」"
translation = "「예. 이것은」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「『魔王がリクリエを食い止めた』絵です」"
translation = "「『마왕이 리크리에를 저지했다』 그림입니다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "息を呑む。"
translation = "숨을 삼킨다."

[[dialogue]]
speaker = "unk"
original = "その説明は、ヴィーナスやマグダレナさんが語ったのと同じ。"
translation = "그 설명은, 비너스나 막달레나 씨가 말했던 것과 같다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「──なるほど。星見の家には、こちらが残されておりましたか」"
translation = "「──과연. 호시미의 집에는, 이것이 남아 있었군요」"

[[dialogue]]
speaker = "unk"
original = "魔王が悪者か英雄か。"
translation = "마왕이 악당인가 영웅인가."

[[dialogue]]
speaker = "unk"
original = "そんな言説は今どうでもよくなっていた。"
translation = "그런 언설은 지금 아무래도 상관없게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "この絵を見て、何よりも無視できなかったのは……"
translation = "이 그림을 보고, 무엇보다도 무시할 수 없었던 것은……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この顔──クロトにそっくりじゃない？」"
translation = "「이 얼굴── 쿠로토랑 똑같지 않아?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「似てる……な」"
translation = "「닮았군……」"

[[dialogue]]
speaker = "unk"
original = "自分でも自覚せざるを得ないほど、その人物は俺とよく似ていた。"
translation = "스스로도 자각하지 않을 수 없을 정도로, 그 인물은 나와 매우 닮아 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「すごいわ！\u3000クロトは魔王だって信じてたけど……本当に３０００年前も活躍してたなんて！」"
translation = "「대단해! 쿠로토는 마왕이라고 믿고 있었지만…… 정말로 3000년 전에도 활약했다니!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いやいや……俺本人ってことはありえないだろ」"
translation = "「아니 아니…… 나 본인이라는 건 있을 수 없잖아」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そうですね。こちらは３０００年前に訪れたリクリエを阻んだ──魔王ラクシスの絵になります」"
translation = "「그렇습니다. 이것은 3000년 전에 찾아온 리크리에를 저지한── 마왕 락시스의 그림이 됩니다」"

[[dialogue]]
speaker = "unk"
original = "魔王。英雄。リクリエを食い止め、ここまで描かれてきた歴史のサイクルを破綻させた存在。"
translation = "마왕. 영웅. 리크리에를 저지하고, 여기까지 그려져 온 역사의 사이클을 파탄시킨 존재."

[[dialogue]]
speaker = "unk"
original = "ただ『リクリエを止めた』ということの意味が、これまでと全く違う様相になって立ち上がってくる。"
translation = "단지 『리크리에를 멈췄다』는 것의 의미가, 이전과는 완전히 다른 양상으로 떠오른다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「歴史上においてリクリエが阻止されたのはこれが初めて。そしてここから、世界はさらに三千年も続いていく」"
translation = "「역사상에서 리크리에가 저지된 것은 이것이 처음. 그리고 이곳부터, 세계는 더욱 삼천 년이나 계속됩니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「おわかりいただけたでしょうか。森羅暦という今の世界は、過去のそれとは比較にならぬほど長久化している」"
translation = "「이해하셨을까요. 신라력이라는 지금의 세계는, 과거의 그것과는 비교가 되지 않을 정도로 장구화되어 있습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「より正確に言えば──現在の森羅暦の前に、旧森羅暦とも呼べる時代があった。その境目こそが、リクリエの失敗」"
translation = "「더욱 정확히 말하자면── 현재의 신라력 이전에, 구 신라력이라고도 불릴 수 있는 시대가 있었습니다. 그 경계야말로, 리크리에의 실패」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「魔王のおかげで、ってことね……！？」"
translation = "「마왕 덕분에, 라는 거네……!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リクリエ側からすれば──魔王のせいで、というところでしょうか」"
translation = "「리크리에 측에서 본다면── 마왕 때문에, 라고 할 수 있을까요」"

[[dialogue]]
speaker = "unk"
original = "俺たちが太古の昔と思っていた３０００年前──『リクリエ防衛』。"
translation = "우리들이 태고의 옛날이라고 생각했던 3000년 전── 『리크리에 방어』."

[[dialogue]]
speaker = "unk"
original = "それは、それよりも遥かに悠久な歴史の、たった先端でしかなかったと知る。"
translation = "그것은, 그보다 훨씬 유구한 역사의, 단지 끝자락에 불과했다는 것을 알게 된다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ただ、リクリエを撃退したと言っても無傷では済みませんでした。滅亡は免れながらも、文明はここでしばらく後退します」"
translation = "「단지, 리크리에를 격퇴했다고 해도 무사하지는 못했습니다. 멸망은 면했지만, 문명은 이곳에서 한동안 후퇴합니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ゆえに魔王ラクシスは策を講じました。森羅という暦をゼロに戻し、リクリエでない新たな世界の存続を望んだのです」"
translation = "「그러므로 마왕 락시스는 책략을 강구했습니다. 신라라는 역법을 제로로 되돌리고, 리크리에가 아닌 새로운 세계의 존속을 바란 것입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そこから３０００年後が、今の時代ってことか……」"
translation = "「그곳으로부터 3000년 후가, 지금 시대라는 건가……」"

[[dialogue]]
speaker = "unk"
original = "森羅という暦がリクリエを元年としているのはそのためだという。"
translation = "신라라는 역법이 리크리에를 원년으로 삼고 있는 것은 그 때문이라고 한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「しかし……疑問です。世界が長生きしているのなら、リクリエにとっても悪くない結果なのではないでしょうか」"
translation = "「하지만…… 의문입니다. 세계가 오래 지속되고 있다면, 리크리에에게도 나쁘지 않은 결과가 아닌 것일까요」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いいえ。森羅暦は異例の長命──にもかかわらず、文明の発展はさほど進んでいません」"
translation = "「아닙니다. 신라력은 이례적인 장수── 임에도 불구하고, 문명의 발전은 그다지 진행되지 않았습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「刷新と効率化を望むリクリエにとって……最も忌むべき結果となっているのです」"
translation = "「쇄신과 효율화를 바라는 리크리에에게 있어…… 가장 꺼려야 할 결과가 되고 있는 것입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「勝手な……！」"
translation = "「제멋대로인……!」"

[[dialogue]]
speaker = "unk"
original = "リクリエに善悪の区別などないとマグダレナさんは言っていた。"
translation = "리크리에에 선악의 구별 같은 건 없다고 막달레나 씨는 말했다."

[[dialogue]]
speaker = "unk"
original = "文明を加速させぬ人類が<b>だらだら</b>生きているのが、恐らく非効率的と判断されているのだろう。"
translation = "문명을 가속시키지 않는 인류가 <b>느릿느릿</b> 살고 있는 것이, 아마도 비효율적이라고 판단되고 있는 것이겠지."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ですから、<b>ガタ</b>が来ているでしょう。星雲巣の出現──モンスターの蔓延──あれらはリクリエの予兆ですが、隙につけ込まれている結果です」"
translation = "「그러므로, <b>탈</b>이 나고 있는 것이겠지요. 성운 소굴의 출현── 몬스터의 만연── 그것들은 리크리에의 예조입니다만, 틈을 타 파고들고 있는 결과입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私のお気に入りのドライヤーはもうオンボロだけど、子どもの頃から使ってるから手放せないわ。それと似たようなもんってことね！？」"
translation = "「내가 가장 좋아하는 드라이어는 이제 낡았지만, 어릴 때부터 써서 놓을 수가 없어. 그것과 비슷한 거라는 거네!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そ、そうだな」"
translation = "「그, 그렇군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わかりやすくはありますね」"
translation = "「이해하기 쉽게는 되었네요」"

[[dialogue]]
speaker = "unk"
original = "いわば旧型の世界を使い古しているのが、今と言ったところか。"
translation = "말하자면 구형의 세계를 낡을 대로 낡게 쓰고 있는 것이, 지금이라고 할 수 있을까."

[[dialogue]]
speaker = "unk"
original = "ゆえにリクリエは３０００年越しに、今度こそ──初期化を完遂しようとしてくる。"
translation = "그러므로 리크리에는 3000년을 넘어, 이번에야말로── 초기화를 완수하려고 해 온다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「だからこそ、此度のリクリエは強大なのです。守護天使である私にも──主たる女神にも予測がつかないほどの」"
translation = "「그렇기에, 이번 리크리에는 강대한 것입니다. 수호 천사인 저에게도── 주인인 여신에게도 예측할 수 없을 정도의」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やり直しのやり直し……ってところか」"
translation = "「되풀이의 되풀이……라는 건가」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「世界の発展──意図は理解した。でも、現実に生きる俺たちが認められることじゃないな」"
translation = "「세계의 발전── 의도는 이해했다. 하지만, 현실에 사는 우리들이 인정할 수 있는 일은 아니군」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だったらやることはひとつよ！\u3000クロトが魔王としての力を取り戻して、また撃退してやれば──」"
translation = "「그렇다면 할 일은 하나야! 쿠로토가 마왕으로서의 힘을 되찾아서, 다시 격퇴해 주면──」"

[[dialogue]]
speaker = "unk"
original = "そう。"
translation = "그래."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがこちらを向いた瞬間だった。"
translation = "비너스가 이쪽을 돌아본 순간이었다."

