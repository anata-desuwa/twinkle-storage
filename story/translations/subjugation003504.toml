[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆっゆっゆ～♪\u3000幽霊ゾンビ退治ゆ～♪」"
translation = "「유유유~♪ 유령 좀비 퇴치유~♪」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ジャクリーヌさん、楽しそうだね」"
translation = "「자클린 씨, 즐거워 보이네.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「映画の中に入ったみたいで嬉しいゆ～♪」"
translation = "「영화 속에 들어온 것 같아서 기쁘유~♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「冥界の怪異が相手でも全く恐れる様子がないとは……さすがはジャクリーヌさんですね」"
translation = "「명계의 괴이 상대로도 전혀 두려워하는 기색이 없다니…… 역시 자클린 씨네요……」"

[[dialogue]]
speaker = "unk"
original = "こうしてゾンビ型幽霊の討伐作戦は実行された。"
translation = "이렇게 좀비형 유령의 토벌 작전은 실행되었다."

[[dialogue]]
speaker = "unk"
original = "マトイ、ソフィア、舞亜、ウズメには、混乱している現場に向かい、事態の収拾に当たってもらっている。"
translation = "마토이, 소피아, 마아, 우즈메에게는, 혼란스러운 현장으로 향해 사태 수습을 맡겼다."

[[dialogue]]
speaker = "unk"
original = "その間に残った俺たちが、片っ端からゾンビ型幽霊を調伏していく、という作戦だ。"
translation = "그사이에 남은 우리가, 닥치는 대로 좀비형 유령을 조복해 나간다는 작전이다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ジャクリーヌさんやトリシャさんが見た映画は、私たちみたいな格好をした子が出てくるんだよね？」"
translation = "「자클린 씨나 트리샤 씨가 본 영화는, 우리 같은 차림을 한 아이가 나오는 거지?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆっ！？\u3000ミルフィーはあれを見てないゆ？」"
translation = "「유유!? 밀피는 그걸 안 봤유?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん……いきなりヘレナさんに呼び出されて、これを着て戦うように言われた感じだから……」"
translation = "「응…… 갑자기 헬레나 씨에게 불려가서, 이걸 입고 싸우라는 말을 들은 느낌이라……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「人工戦闘服ってその元になっているテーマにアプローチすることで力を引き出せるようになるんだよね」"
translation = "「인공 전투복이란 건 그 근원이 되는 테마에 접근함으로써 힘을 끌어낼 수 있게 되는 거지.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「元になった映画を知らない私が、この戦闘服の力をちゃんと引き出せるのかな？\u3000うーん……心配だよ……」"
translation = "「근원이 된 영화를 모르는 내가, 이 전투복의 힘을 제대로 끌어낼 수 있을까? 으음…… 걱정돼……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆゆっ♪\u3000だったら今からみんなで映画を見ればいいゆ♪」"
translation = "「유유유♪ 그렇다면 지금부터 다 같이 영화를 보면 되유♪」"

[[dialogue]]
speaker = "unk"
original = "さすがにそんな時間の余裕はないから"
translation = "아무래도 그럴 시간적 여유는 없으니까."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～……残念だゆ……」"
translation = "「유~…… 아쉽유……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「だ、大丈夫かと思います……。むしろ、ミルフィーさんは……最初は何も知らないままの方がいいのかもしれません……」"
translation = "「괘, 괜찮을 거라 생각합니다……. 오히려, 밀피 씨는…… 처음에는 아무것도 모르는 채인 편이 좋을지도 모릅니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えっ、どういうことですか？」"
translation = "「에, 그게 무슨 뜻인가요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「その映画では、ヒロインの女の子が何も知らないまま……お爺さんから宿命を引き継いで冥界道士になります……」"
translation = "「그 영화에서는, 히로인인 여자아이가 아무것도 모르는 채…… 할아버지로부터 숙명을 이어받아 명계도사가 됩니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それって……今の私の状況に近い、ということですか？」"
translation = "「그건…… 지금 내 상황이랑 비슷하다는 뜻인가요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……その通りです……。そしてミルフィーさんを助けて、一人前の道士に成長させていくのがオトモの幽霊ゾンビのお役目……」"
translation = "「후후…… 그 말대로입니다……. 그리고 밀피 씨를 도와서, 어엿한 도사로 성장시켜 나가는 것이 동료 유령 좀비의 역할……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そうだったゆ！\u3000ヒトリがてぇてぇさに悶絶してたゆ！！」"
translation = "「그랬유! 히토리가 테에테에함에 몸부림치고 있었유!!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えっと……てぇてぇ？」"
translation = "「저기…… 테에테에?」"

[[dialogue]]
speaker = "unk"
original = "仲良しの２人を見て言うことだよ"
translation = "사이좋은 두 사람을 보고 하는 말이야."

[[dialogue]]
speaker = "unk"
original = "尊いってことかな"
translation = "소중하다는 뜻일까."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「霊衣を纏いし２人……主とオトモが魂の交わりによって協力し、冥界より湧きし幽霊ゾンビを駆逐する……それも物語の見どころのひとつ……」"
translation = "「영의를 두른 두 사람…… 주인과 동료가 혼의 교류를 통해 협력하여, 명계로부터 솟아난 유령 좀비를 구축한다…… 그것도 이야기의 볼거리 중 하나……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「オトモとしてミルフィーさんの魂に触れ、壮麗な音色を奏でることで、より高みへと昇華するのでしょう……」"
translation = "「동료로서 밀피 씨의 혼에 닿아, 장려한 음색을 연주함으로써, 더욱 높은 곳으로 승화하는 것이겠죠……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うーん、トリシャさんの表現はわかりづらいけど、つまりその、てぇてぇ感じで頑張ろうってことですね？」"
translation = "「으음, 트리샤 씨의 표현은 알기 어렵지만, 그러니까 그, 테에테에한 느낌으로 열심히 하자는 거네요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「にへへ、そうです……オトモダチですから……てぇてぇも可能……」"
translation = "「니헤헤, 그렇습니다…… 친구니까요…… 테에테에도 가능……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「思う存分てぇてぇするゆ！\u3000そして２人の戦いがいよいよ始まるんだゆ！」"
translation = "「마음껏 테에테에 하는 유! 그리고 두 사람의 싸움이 드디어 시작되는 거유!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お待ちください。その前に、ミルフィーさんには基本的な霊具の使い方を覚えて頂かなくては……」"
translation = "「잠시만요. 그전에, 밀피 씨에게는 기본적인 영구 사용법을 익히게 해야 합니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あ、それは助かります。人工戦闘服の起動は出来てるけど、まだ力を引き出せている感じがしなくて……」"
translation = "「아, 그건 도움이 되겠네요. 인공 전투복 기동은 됐지만, 아직 힘을 끌어내고 있다는 느낌이 안 들어서……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「アイテムもいろいろ貰ったんですけど、何に使うものなのか、どうやって使うものなのか全然分からないんです」"
translation = "「아이템도 여러 가지 받았는데, 어디에 쓰는 물건인지, 어떻게 쓰는 물건인지 전혀 모르겠거든요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「分かりました。ミルフィーさんが一人前の道士になれるよう、私が導きましょう……」"
translation = "「알겠습니다. 밀피 씨가 어엿한 도사가 될 수 있도록, 제가 인도하죠……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「修行パート来たゆ！」"
translation = "「수행 파트 왔유!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「まずはこちらの八卦鏡です。これは死色を帯びた霊力を感知し、その在所へ誘う力を有しています……」"
translation = "「우선은 이 팔괘경입니다. 이것은 사색을 띤 영력을 감지하여, 그 소재지로 유도하는 힘을 가지고 있습니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それはヘレナさんからも聞きました。この鏡はゾンビ型幽霊を見つけるレーダーの役割があるって」"
translation = "「그건 헬레나 씨에게도 들었어요. 이 거울은 좀비형 유령을 찾아내는 레이더 역할이 있다고.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「見つけた後は、捕獲するか調伏するか、ですけど……どうすればいいんですか？」"
translation = "「찾아낸 뒤에는, 포획하든 조복하든 하는 건데…… 어떻게 하면 되나요?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「幽霊ゾンビとは木剣を用いて戦います」"
translation = "「유령 좀비와는 목검을 사용하여 싸웁니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ミルフィーさんの持つ霊具の数々は、星力を通すことで霊的な存在に極めて有効な武器となるのです」"
translation = "「밀피 씨가 가진 영구들은, 성력을 통하게 함으로써 영적인 존재에게 극히 유효한 무기가 되는 것입니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「星力を通すんですね。わかりました、やってみます……むむむっ……！」"
translation = "「성력을 통하게 하는 거군요. 알겠습니다, 해볼게요…… 으으음……!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「す、すごい集中力なの……」"
translation = "「어, 엄청난 집중력이유……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「星力の高まりを感じます……星力が変換され、次第に異なる相を見せてゆく……これがミルフィーさんにのみ与えられた特別な力です……」"
translation = "「성력의 고조를 느낍니다…… 성력이 변환되어, 점차 다른 양상을 보여간다…… 이것이 밀피 씨에게만 주어진 특별한 힘입니다……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「よくわかんないけどかっこいいゆ♪」"
translation = "「잘 모르겠지만 멋있유♪」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……視えた！\u3000仙桃剣！」"
translation = "「……보였다! 선도검!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「どんどん行くよ～！\u3000一の斬！\u3000二の払い！\u3000三薙ぎ！」"
translation = "「계속 간다~! 첫 번째 베기! 두 번째 쳐내기! 세 번째 휘두르기!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「貫け！\u3000悪霊退散！」"
translation = "「꿰뚫어라! 악령퇴산!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふおおお～～～、ミルフィーかっこよかったの♪」"
translation = "「후오오오~~, 밀피 멋있었유♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「尋常ならざる動きでした……まるで星の導きを授かりし流麗な連撃……お見事です……」"
translation = "「심상치 않은 움직임이었습니다…… 마치 별의 인도를 받은 듯한 유려한 연격…… 훌륭합니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そうですか？\u3000確かに自分でも、普段とは動きが違うなって感じましたけど」"
translation = "「그, 그런가요? 확실히 스스로도, 평소와는 움직임이 다르다는 걸 느꼈지만요.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「これが特別な人工戦闘服の能力なんだね……ヘレナさん凄すぎだよ……」"
translation = "「이게 특별한 인공 전투복의 능력이구나…… 헬레나 씨 너무 대단해……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「トリシャも同じことができるゆ？」"
translation = "「트리샤도 똑같은 거 할 수 있유?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……私はミルフィーさんと役割が異なりますので……」"
translation = "「후후…… 저는 밀피 씨와 역할이 다르니까요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「きっとトリシャもすっごいことが出来そうなの♪\u3000映画でもオトモは大活躍だったの～♪」"
translation = "「분명 트리샤도 엄청난 걸 할 수 있을 거유♪ 영화에서도 동료는 대활약이었유~♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「さて、どうでしょう。オトモはあくまでオトモですから……」"
translation = "「글쎄요, 어떨까요. 동료는 어디까지나 동료니까요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆっ、ゆっ、他には何が出来るゆ？」"
translation = "「유, 유, 또 다른 건 뭐 할 수 있유?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えっと……それじゃこの粉は何なのかな？」"
translation = "「저기…… 그럼 이 가루는 뭐야?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「論より証拠、使って見ましょう。ジャクリーヌさん、協力して頂けますか？」"
translation = "「백문이 불여일견, 사용해 보죠. 자클린 씨, 협력해주시겠습니까?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「何をすればいいゆ？」"
translation = "「뭘 하면 되유?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私たちに見えないよう、姿を消して頂ければと……」"
translation = "「저희에게 보이지 않도록, 모습을 감춰주셨으면 합니다만……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆっ、そのくらい余にかかれば簡単なの♪」"
translation = "「유유, 그 정도야 여에게 맡기면 간단하유♪」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「わっ、一瞬で消えた」"
translation = "「왓, 순식간에 사라졌다.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ひゅ～、どろどろどろ～……なの♪」"
translation = "「휴~, 도로도로도로~…… 유♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ではジャクリーヌさんがいる辺りに向かって、先程の粉に星力をこめて撒いてみてください」"
translation = "「그럼 자클린 씨가 있는 근처를 향해, 아까 그 가루에 성력을 담아 뿌려보세요.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ええと……んん……こうかなっ！」"
translation = "「저기…… 으음…… 이렇게인가!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆっ！？\u3000いきなりバフっとしたゆ！？」"
translation = "「유!? 갑자기 퍽 하고 왔유!?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「けど痛くもかゆくもないの♪\u3000余にはなんの効果もないゆ～♪」"
translation = "「하지만 아프지도 가렵지도 않유♪ 여에게는 아무 효과도 없유~♪」"

[[dialogue]]
speaker = "unk"
original = "丸見えになったぞ"
translation = "다 보이게 됐다고."

[[dialogue]]
speaker = "unk"
original = "いやいや、ばっちり効いてるし"
translation = "아니 아니, 제대로 듣고 있거든."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「特別な星力を浴びせることにより、幽世に揺蕩う不確定な存在を現世に固定化し、顕現させる……そういった力があります……」"
translation = "「특별한 성력을 쬐게 함으로써, 유세에 떠도는 불확정적인 존재를 현세에 고정화하여, 현현시킨다…… 그런 힘이 있습니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もしゾンビ型幽霊が目視できなくても、この粉を使えば大丈夫そうだね」"
translation = "「만약 좀비형 유령이 눈에 보이지 않아도, 이 가루를 쓰면 괜찮을 것 같네.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「これで準備は整いました。では、八卦鏡を使って敵を探し、討伐に向かいましょう」"
translation = "「이걸로 준비는 끝났습니다. 그럼, 팔괘경을 사용해 적을 찾아 토벌하러 가죠.」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えっと、それじゃ八卦鏡を手のひらの上に乗せて……水平になるようにして……」"
translation = "「저기, 그럼 팔괘경을 손바닥 위에 올려놓고…… 수평이 되게 해서……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「この反応……近い！\u3000むむむ……見つけた、そこだーーーっ！！！」"
translation = "「이 반응…… 가까워! 으으음…… 찾았다, 거기다──앗!!!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ？」"
translation = "「유?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あれ？\u3000ジャクリーヌさんの方を指しちゃってるけど……」"
translation = "「어라? 자클린 씨 쪽을 가리키고 있는데……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「違うゆ！\u3000余は幽霊ゾンビじゃないゆ～っ♪」"
translation = "「아니유! 여는 유령 좀비가 아니유~♪」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……条件付けを間違えていますね……これでは幽霊全体を探査することになってしまいます……」"
translation = "「후후…… 조건 설정을 잘못했네요…… 이래서는 유령 전체를 탐사하게 되어버립니다……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ある意味大成功してるゆ……」"
translation = "「어떤 의미로는 대성공이유……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「な、なるほど。ゾンビ型幽霊のみに絞らなきゃダメなんですね」"
translation = "「그, 그렇구나. 좀비형 유령으로만 좁히지 않으면 안 되는 거군요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ミルフィーさんになら決して難しくはないはずです。何度か練習すれば使いこなせるようになると思います……」"
translation = "「밀피 씨라면 결코 어렵지 않을 겁니다. 몇 번 연습하면 능숙하게 다룰 수 있게 될 거라 생각합니다……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「わかりました。頑張ってみます！」"
translation = "「알겠습니다. 열심히 해볼게요!」"

[[dialogue]]
speaker = "unk"
original = "そこら中で暴れてるみたいだけどね"
translation = "여기저기서 날뛰고 있는 것 같지만 말이야."

[[dialogue]]
speaker = "unk"
original = "まあ探すまでもなく"
translation = "뭐 찾을 필요도 없이."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「水を差すようなことを言わないゆ！」"
translation = "「찬물 끼얹는 소리 하지 말유!」"

[[dialogue]]
speaker = "unk"
original = "ご、ごめんなさい"
translation = "미, 미안해."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あれ？\u3000待って……ジャクリーヌさんの他にも近くに反応があるみたい！」"
translation = "「어라? 잠깐…… 자클린 씨 말고도 근처에 반응이 있는 것 같아!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフフ、星辰の輪が回り始めたようですね……あとは運命の導きに従うのみ……」"
translation = "「후후후, 성신의 고리가 돌기 시작한 모양이네요…… 나머지는 운명의 인도에 따를 뿐……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「今度こそ敵ゆ！\u3000針の指す方に突撃ゆ！」"
translation = "「이번에야말로 적이유! 바늘이 가리키는 쪽으로 돌격이유!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「はい！\u3000行きましょう、みなさん！」"
translation = "「네! 가요, 여러분!」"

