[[dialogue]]
speaker = "unk"
original = "ロストアイテムにマーキングが成功したので、追跡する前にプリムラ達と合流することになった。"
translation = "로스트 아이템 마킹에 성공했기에, 추적하기 전에 프리뮬러 일행과 합류하기로 했다."

[[dialogue]]
speaker = "unk"
original = "プリムラと連絡をとって、待ち合わせ場所の保健室で待つことに。"
translation = "프리뮬러와 연락하여 약속 장소인 양호실에서 기다리기로 한다."

[[dialogue]]
speaker = "unk"
original = "それにしても、追跡できるなんて便利だな"
translation = "그나저나 추적할 수 있다니 편리하네."

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私の星力の特性が、『力を<ruby>留<rt>とど</rt></ruby>める』ことなんです。それを応用して、攻撃を当てた相手に私の星力を帯電させ、その反応を追跡することができます」"
translation = "「제 성력의 특성이 『힘을 머무르게 하는』 것이거든요. 그것을 응용해, 공격을 맞힌 상대에게 제 성력을 대전시켜 그 반응을 추적할 수 있습니다」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トマルくんのマーキング能力は、持続時間も追跡範囲も本当に優秀なんです。ロストアイテム回収でも、これまで何度もお世話になってます」"
translation = "「토마루 군의 마킹 능력은 지속 시간도 추적 범위도 정말 우수해요. 로스트 아이템 회수에서도 지금까지 몇 번이나 도움을 받았답니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いや～、本当に助かりますよね～。ロストアイテムは今回みたいに逃げ回るやつが多いので、私的にはもう、トマルさんがいない状況とか想像したくないくらいですよ～」"
translation = "「이야~ 정말 도움이 되죠~. 로스트 아이템은 이번처럼 도망 다니는 녀석들이 많아서, 제 입장에서는 이제 토마루 씨가 없는 상황 같은 건 상상하고 싶지 않을 정도예요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「トマルさん、可愛くて有能でマジ天使！\u3000って毎回思ってます」"
translation = "「토마루 씨, 귀엽고 유능하고 완전 천사! 라고 매번 생각하고 있어요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「……あの、サチさま。少しよろしいでしょうか？」"
translation = "「……저기, 사치 님. 잠시 괜찮으실까요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「うん？\u3000トマルくん、どうしたの？」"
translation = "「응? 토마루 군, 왜 그래?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「今のうちに、サチさまに伝えておきたいことがありまして。――プリムラさまのことについてです」"
translation = "「지금 미리 사치 님께 전해두고 싶은 것이 있어서요. ――프리뮬러 님에 관한 이야기입니다」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……もしかして、プリムラが私に対して怒ってること？」"
translation = "「……혹시 프리뮬러가 나한테 화나 있는 거?」"

[[dialogue]]
speaker = "unk"
original = "（サチもやっぱり気にしてたんだな……）"
translation = "(사치도 역시 신경 쓰고 있었구나……)"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ええ、そうです」"
translation = "「네, 그렇습니다」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私が思うに……プリムラさまは、深刻な怒りを抱えているというよりは――」"
translation = "「제가 생각하기에…… 프리뮬러 님은 심각한 분노를 품고 있다기보다는――」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「子供のように感情的になってしまっているのではないかと、そんな感じがするんです」"
translation = "「아이처럼 감정적이 되어버린 게 아닐까 하는, 그런 느낌이 들어요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「感情的に……」"
translation = "「감정적으로……」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「サチさま……私は、サチさまとプリムラさまと知り合ってから半年以上、近くでお２人の関係を見てきました」"
translation = "「사치 님…… 저는 사치 님과 프리뮬러 님을 알게 된 지 반년 이상, 가까이서 두 분의 관계를 지켜봐 왔습니다」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私がロストアイテムの事件に巻き込まれて、助けてくれた時から……お２人のことを大切な友達だと思っています」"
translation = "「제가 로스트 아이템 사건에 휘말렸을 때 구해주신 뒤로…… 두 분을 소중한 친구라고 생각하고 있어요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「でも、お２人の関係は、私とサチさまの関係とはやっぱり別のものですよね？」"
translation = "「하지만 두 분의 관계는 저와 사치 님의 관계와는 역시 다른 것이겠죠?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「多分、私とサチさんとの関係とも違いますよね～」"
translation = "「아마 저와 사치 씨의 관계와도 다를 거예요~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トレジアンナさんとは……そうですね。例えるなら、親戚で居候しているお姉さんみたいな……四六時中一緒にいますし……」"
translation = "「트레지안나 씨와는…… 그렇네요. 비유하자면 친척집에 얹혀사는 언니 같은…… 24시간 내내 같이 있기도 하고……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「お～、いいですね～♪\u3000よかったら、今度から『お姉ちゃん』って呼んでくれてもいいんですよ？」"
translation = "「오~ 좋네요~♪ 괜찮다면 이제부터 『언니』라고 불러줘도 된다고요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「絶対に呼びません」"
translation = "「절대로 안 불러요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ありゃ～」"
translation = "「아이고~」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ふふっ……プリムラさまが怒っているのって、もしかすると……今のサチさまみたいなことなのかも」"
translation = "「후후…… 프리뮬러 님이 화내고 있는 건, 어쩌면…… 지금의 사치 님 같은 것일지도 몰라요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「近しいからこそ、素直に言えないことって……あるじゃないですか」"
translation = "「가깝기 때문에 오히려 솔직하게 말할 수 없는 것들이…… 있잖아요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「サチさまとプリムラさまの関係だからこそ、言いづらい。プリムラさまの場合はほら、人一倍素直な方じゃありませんから」"
translation = "「사치 님과 프리뮬러 님의 관계이기에 말하기 어려운 거죠. 프리뮬러 님의 경우는 보시다시피 남들보다 솔직한 분이 아니니까요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「素直に……言えない……」"
translation = "「솔직하게…… 말할 수 없다……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（私とプリムラの関係は、一体、なんて言うべきなんだろう……？）"
translation = "(나와 프리뮬러의 관계는 도대체 뭐라고 해야 할까……?)"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（腐れ縁……？\u3000それは合ってるけど、なんかもっと……違う気がする……）"
translation = "(악연……? 그건 맞지만, 뭔가 좀 더…… 다른 느낌이 들어……)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「みんな、大変なの！」"
translation = "「얘들아, 큰일이야!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「姉さま、慌てた様子でどうされたのですか？\u3000両手に抱えているその方々は……！？」"
translation = "「누님, 당황하신 기색으로 어찌 된 일입니까? 양손에 안고 계신 그분들은……!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「本校の生徒の方たちですよね！？\u3000気を失っているみたいですけど、まさかロストアイテムの被害者ですか！？」"
translation = "「본교 학생분들이죠!? 정신을 잃은 것 같은데, 설마 로스트 아이템의 피해자인가요!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ここに向かってる最中にロストアイテムが現れて、この子たちを襲ってたの……！」"
translation = "「여기 오던 중에 로스트 아이템이 나타나서 이 아이들을 습격하고 있었어……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それだけじゃなくて、ほかの生徒たちも襲おうと暴れはじめて……！\u3000それで、プリムラちゃんが――」"
translation = "「그뿐만 아니라 다른 학생들도 습격하려고 날뛰기 시작해서……! 그래서 프리뮬러 짱이――」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「プリムラちゃんがロストアイテムを抑えるから、その間にみんなを保健室へ運んでって私に……！」"
translation = "「프리뮬러 짱이 로스트 아이템을 막을 테니까, 그사이에 모두를 양호실로 옮겨달라고 나한테……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「プリムラ……！」"
translation = "「프리뮬러……!」"

[[dialogue]]
speaker = "unk"
original = "サチは呟いて、険しい表情を浮かべるのだった。"
translation = "사치는 중얼거리며 험악한 표정을 짓는 것이었다."

