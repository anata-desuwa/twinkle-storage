[[dialogue]]
speaker = "unk"
original = "第２話,魔女のゲーム,P"
translation = "제2화, 마녀의 게임, P"

[[dialogue]]
speaker = "unk"
original = "イニシュの記憶を取り戻すのを手伝うことになったのだが──"
translation = "이니슈의 기억을 되찾는 것을 돕게 되었는데──"

[[dialogue]]
speaker = "イニシュ"
original = "「お邪魔します、魔王」"
translation = "「실례하겠습니다, 마왕」"

[[dialogue]]
speaker = "アイリーン"
original = "「おジャマしまーす♪」"
translation = "「실례하겠습니당～♪」"

[[dialogue]]
speaker = "アイリーン"
original = "「どうして会長さんのおうちにって……もちろん遊びに来たんだよ！\u3000どんなきっかけでイニシュさんの記憶が戻るかわからないからね♪」"
translation = "「어째서 회장님 댁이냐니…… 당연히 놀러 온 거지! 어떤 계기로 이니슈 씨의 기억이 돌아올지 모르니까 말이야♪」"

[[dialogue]]
speaker = "イニシュ"
original = "「よろしくお願いします」"
translation = "「잘 부탁드립니다」"

[[dialogue]]
speaker = "unk"
original = "（普通に遊びたいだけでは？）"
translation = "(그냥 놀고 싶은 게 아닌지?)"

[[dialogue]]
speaker = "アイリーン"
original = "「というわけで……じゃじゃーん！\u3000マッドスタンパー！」"
translation = "「그런 의미에서…… 짜잔! 매드 스탬퍼!」"

[[dialogue]]
speaker = "アイリーン"
original = "「あー、魔女もゲームするんだって思ったでしょ？\u3000イニシュさんだってこのゲーム得意なんだから！」"
translation = "「아─, 마녀도 게임을 하냐고 생각했지? 이니슈 씨도 이 게임 잘한다니까!」"

[[dialogue]]
speaker = "イニシュ"
original = "「得意というほどではありませんが。それなりです」"
translation = "「잘한다고 할 정도는 아닙니다만. 그럭저럭입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「今までは待機時はスリープしていましたが、最近はリクリエの激化に伴い、起動して待機することが多いため、空き時間で人間界のゲームをプレイしています」"
translation = "「전에는 대기 시에는 슬립하고 있었습니다만, 최근에는 리크리에의 격화에 따라 기동하여 대기하는 일이 많기 때문에, 남는 시간에 인간계의 게임을 플레이하고 있습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「ねぇねぇ、早くやろーよ！\u3000……って、会長さん流星市国の人なのにマッドスタンパー知らないの？\u3000仕方ないから私の貸してあげるね！」"
translation = "「저기 저기, 빨리 하자! ……어라, 회장님 유성시국 사람인데 매드 스탬퍼 몰라? 어쩔 수 없네, 내 거 빌려줄게!」"

[[dialogue]]
speaker = "イニシュ"
original = "「では私からこのゲームの説明を。マッドスタンパー、略してマドスタは、スタンプ煽り上等ＦＰＳゲームです」"
translation = "「그럼 제가 이 게임의 설명을. 매드 스탬퍼, 줄여서 매드스타는 스탬프 도발 환영 FPS 게임입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「ＦＰＳとは、ファーストパーソンシューティングの略で、操作するキャラクターの視点でプレイするゲームです」"
translation = "「FPS란 퍼스트 퍼슨 슈팅의 약자로, 조작하는 캐릭터의 시점에서 플레이하는 게임입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「ＦＰＳゲームは銃器が使われることが多いですが、マドスタはスタンプを武器にしているのが最大の特徴です」"
translation = "「FPS 게임은 총기류가 쓰이는 경우가 많지만, 매드스타는 스탬프를 무기로 삼고 있는 것이 최대의 특징입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「攻撃が命中すると、ダメージが発生すると同時に設定したスタンプが画面に表示されます。そしてこのスタンプによる煽り合いが重要なゲームです」"
translation = "「공격이 명중하면 대미지가 발생하는 것과 동시에 설정한 스탬프가 화면에 표시됩니다. 그리고 이 스탬프를 통한 도발전이 중요한 게임입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「たとえば『やんのかコラ』スタンプで攻撃された場合、『お前の勝ちでいいよ』スタンプで反撃に成功すると、いい煽りとしてポイントが加算されます」"
translation = "「예를 들어 『한판 붙을래?』 스탬프로 공격받았을 경우, 『네가 이긴 걸로 해줄게』 스탬프로 반격에 성공하면 좋은 도발로서 포인트가 가산됩니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「煽りに対する返しが的外れだった場合、または反撃のスタンプ攻撃が命中しなかった場合、煽り合いで勝利したとして相手にポイントが加算されます」"
translation = "「도발에 대한 반응이 핀트가 어긋났을 경우, 혹은 반격 스탬프 공격이 명중하지 않았을 경우 도발전에서 승리한 것으로 간주하여 상대에게 포인트가 가산됩니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「こうして相手を倒しながら煽ってポイントを稼ぎ、試合時間終了時に多くのポイントを持っていたチームの勝利となります」"
translation = "「이렇게 상대를 쓰러뜨리며 도발하여 포인트를 벌고, 경기 시간 종료 시에 많은 포인트를 가진 팀이 승리하게 됩니다」"

[[dialogue]]
speaker = "unk"
original = "けっこうクソゲーでは？"
translation = "꽤 망겜 아닌가?"

[[dialogue]]
speaker = "アイリーン"
original = "「そんなことないよ！\u3000人間界で三千万人がプレイしてる人気ゲームなんだから！」"
translation = "「그렇지 않아! 인간계에서 3천만 명이 플레이하는 인기 게임이라니까!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫なのか人間界……"
translation = "괜찮은 건가 인간계……"

[[dialogue]]
speaker = "イニシュ"
original = "「プレイヤーは何もスタンプを持っていない状態でゲームを開始し、ゲーム序盤はフィールドを回ってスタンプを集めます」"
translation = "「플레이어는 아무런 스탬프도 가지지 않은 상태에서 게임을 시작하며, 게임 초반에는 필드를 돌며 스탬프를 수집합니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「この時、煽りとして汎用性のあるスタンプや、そのスタンプに対してカウンターになるスタンプを集めておきましょう」"
translation = "「이때 도발로서 범용성 있는 스탬프나 그 스탬프에 대해 카운터가 되는 스탬프를 모아둡시다」"

[[dialogue]]
speaker = "イニシュ"
original = "「またスタンプによって射程や攻撃速度、使用回数などが違います。シューティングゲームでもありますので、自分に合ったものを選ぶのもよいです」"
translation = "「또한 스탬프에 따라 사거리나 공격 속도, 사용 횟수 등이 다릅니다. 슈팅 게임이기도 하므로 자신에게 맞는 것을 고르는 것도 좋습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「じゃあイニシュさんと同じチームでマッチしてみようよ！\u3000負けてもいいから怖がらなくても大丈夫。ていうかイニシュさん強いから平気だって」"
translation = "「그럼 이니슈 씨랑 같은 팀으로 매칭해보자! 져도 괜찮으니까 무서워하지 않아도 돼. 그보다 이니슈 씨 강하니까 괜찮다니까」"

[[dialogue]]
speaker = "イニシュ"
original = "「いえ、それなりです」"
translation = "「아니요, 그럭저럭입니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「またまた～。私よりランク高いくせに」"
translation = "「또 그런다～. 나보다 랭크 높으면서」"

[[dialogue]]
speaker = "イニシュ"
original = "「１チームは４人ですので、私と魔王のほかに２人がアサインします。他のプレイヤーの意図を読むのも大事です」"
translation = "「한 팀은 4명이므로 저와 마왕 이외에 2명이 배정됩니다. 다른 플레이어의 의도를 읽는 것도 중요합니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「！\u3000始まりました。まずはスタンプを集めてください。使用しやすいのは『お前がそう思うんなら以下略』のスタンプです」"
translation = "「! 시작되었습니다. 우선 스탬프를 모아주세요. 사용하기 편한 것은 『네가 그렇게 생각한다면 이하 생략』 스탬프입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「私は先陣を切って敵の進行を阻止します。──接敵。ターゲット捕捉」"
translation = "「저는 선봉에 서서 적의 진행을 저지하겠습니다. ──접적. 타겟 포착」"

[[dialogue]]
speaker = "イニシュ"
original = "「スタンプ発射。命中。追撃。撃破確認」"
translation = "「스탬프 발사. 명중. 추격. 격파 확인」"

[[dialogue]]
speaker = "アイリーン"
original = "「イニシュさんやっぱりつよっ！」"
translation = "「이니슈 씨 역시 강해!」"

[[dialogue]]
speaker = "アイリーン"
original = "「しかもイニシュさんが使ってるのは『お上手ですね』スタンプ！\u3000これは相手の攻撃をかわしながら使うとポイントが加算されるんだよ」"
translation = "「게다가 이니슈 씨가 쓰고 있는 건 『참 잘하시네요』 스탬프! 이건 상대의 공격을 피하면서 쓰면 포인트가 가산되는 거야」"

[[dialogue]]
speaker = "イニシュ"
original = "「『ありがとうございます』スタンプも同様の効果があります。技量が劣る相手や操作を誤った相手に対し、皮肉を込めた煽りです」"
translation = "「『감사합니다』 스탬프도 같은 효과가 있습니다. 기량이 떨어지는 상대나 조작을 실수한 상대에 대해 비꼬는 의미를 담은 도발입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「タイムラグはありますが、敵を倒してもまた復活してきます。同様に、こちらがやられても復活するので安心してください」"
translation = "「타임랙은 있지만 적을 쓰러뜨려도 다시 부활합니다. 마찬가지로 이쪽이 당해도 부활하니 안심하십시오」"

[[dialogue]]
speaker = "イニシュ"
original = "「敵が魔王に接近してきました。注意してくださ──」"
translation = "「적이 마왕에게 접근해왔습니다. 주의해주세──」"

[[dialogue]]
speaker = "unk"
original = "あ、スタンプ押された！？"
translation = "아, 스탬프 찍혔다!?"

[[dialogue]]
speaker = "イニシュ"
original = "「煽られても焦らずに反撃を。『で、オチは？』スタンプに対しては、『ごめん、話が難しかったね』スタンプで返しましょう。……そうです、いい煽りです」"
translation = "「도발당해도 당황하지 말고 반격을. 『그래서, 결론은?』 스탬프에 대해서는 『미안, 얘기가 어려웠지』 스탬프로 받아칩시다. ……그렇습니다, 좋은 도발입니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「また魔王を狙っている敵がいますね。『惜しい』スタンプで攻撃。撃墜成功」"
translation = "「또 마왕을 노리는 적이 있네요. 『아깝네』 스탬프로 공격. 격추 성공」"

[[dialogue]]
speaker = "イニシュ"
original = "「このまま煽り続けて優勢を維持してください。タイムアップまであと５……４……３……」"
translation = "「이대로 도발을 계속하며 우세를 유지하십시오. 타임업까지 앞으로 5…… 4…… 3……」"

[[dialogue]]
speaker = "イニシュ"
original = "「２……１……０」"
translation = "「2…… 1…… 0」"

[[dialogue]]
speaker = "イニシュ"
original = "「お疲れ様です。私たちの勝利です」"
translation = "「수고하셨습니다. 저희의 승리입니다」"

[[dialogue]]
speaker = "unk"
original = "イニシュのおかげで勝てた"
translation = "이니슈 덕분에 이겼어"

[[dialogue]]
speaker = "イニシュ"
original = "「いえ、魔王も初めてなのによい煽りでした。初めてのマッチはどうでしたか？」"
translation = "「아뇨, 마왕도 처음인데 좋은 도발이었습니다. 첫 매치는 어떠셨나요?」"

[[dialogue]]
speaker = "unk"
original = "楽しかった！"
translation = "즐거웠어!"

[[dialogue]]
speaker = "イニシュ"
original = "「なら良かったです。途中煽られて苛ついても、マッチで勝利することが最大の煽りなのだと信じて、冷静さを失わずに戦ってください」"
translation = "「그렇다면 다행입니다. 도중에 도발당해서 짜증이 나더라도, 매치에서 승리하는 것이 최대의 도발이라 믿고 냉정함을 잃지 말고 싸워주세요」"

[[dialogue]]
speaker = "アイリーン"
original = "「イニシュさん、今日は何か思い出せた？」"
translation = "「이니슈 씨, 오늘은 뭐 좀 기억난 거 있어?」"

[[dialogue]]
speaker = "イニシュ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ、特に何も思い出してないっぽい」"
translation = "「아, 딱히 아무것도 기억 안 나는 모양이네」"

[[dialogue]]
speaker = "イニシュ"
original = "「いえ、思い出していないこともないような……」"
translation = "「아뇨, 기억나지 않는 것도 아닌 것 같은……」"

[[dialogue]]
speaker = "イニシュ"
original = "「何だか……昔……楽しいことがあった気がします」"
translation = "「왠지…… 옛날에…… 즐거운 일이 있었던 기분이 듭니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「あー！\u3000イニシュさんが笑ってるー！」"
translation = "「아! 이니슈 씨가 웃고 있어!」"

[[dialogue]]
speaker = "イニシュ"
original = "「では新しいマッチを始めましょう。次も楽しいゲームになるといいですね」"
translation = "「그럼 새로운 매치를 시작하죠. 다음에도 즐거운 게임이 되면 좋겠네요」"

