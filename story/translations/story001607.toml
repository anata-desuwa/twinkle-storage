[[dialogue]]
speaker = "unk"
original = "新型モンスターを撃破したゴールデングースの面々は、疲れを露わにしながら事務所へと帰還した。"
translation = "신형 몬스터를 격파한 골든 구스의 면면은 피로를 드러내며 사무소로 귀환했다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「はー、疲れたー……」"
translation = "「하ー, 피곤해ー……」"

[[dialogue]]
speaker = "セナリィ"
original = "「犯罪者には逃げられてしまいましたけど、あのような邪魔が入ってしまったなら、やむを得ませんわね」"
translation = "「범죄자는 놓쳐버렸습니다만 그런 방해가 들어와 버렸다면 어쩔 수 없겠네요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私が出遅れたことで、あなたたちに怖い想いをさせたことについて謝罪しますわ。ごめんなさい」"
translation = "「제가 늦게 나타나는 바람에 당신들에게 무서운 경험을 하게 한 점 사과합니다. 미안해요.」"

[[dialogue]]
speaker = "ミウ"
original = "「謝らないでください！\u3000危ないところを助けていただき、ありがとうございます。私たち、自分の力を過信していました」"
translation = "「사과하지 마세요! 위험한 상황에서 도와주셔서 감사합니다. 저희, 자신의 힘을 과신하고 있었어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「この数週間の起動テストで少しは飼い慣らしたつもりでしたけど、まったく、とんだじゃじゃ馬ですわ」"
translation = "「이 몇 주간의 기동 테스트로 조금은 길들였다고 생각했는데 정말이지 지독한 말괄량이군요.」"

[[dialogue]]
speaker = "ミウ"
original = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォーム……先ほどの社長のお姿ですよね」"
translation = "「<ruby>여제<rt>엠프레스</rt></ruby> 폼…… 아까 사장님의 모습이죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ。あなたたちに内緒にしていた企業秘密とはアレのことですわ」"
translation = "「네. 당신들에게 내색하지 않았던 기업 비밀이란 게 바로 저것입니다.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「めちゃ格好良かったです！\u3000まるでスーパーロボットの必殺技でした！」"
translation = "「진짜 멋있었어요! 마치 슈퍼 로봇의 필살기 같았어요!」"

[[dialogue]]
speaker = "ミウ"
original = "「あんな隠し玉があったなんて……私たちにまだ話せないのでしたら無理には尋ねませんけど、どうして内緒にされてたんですか？」"
translation = "「그런 비장의 카드가 있었다니…… 저희에게 아직 말씀하실 수 없는 거라면 억지로 묻지는 않겠지만 어째서 비밀로 하셨던 건가요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「今のあなたたちなら信頼が置けますし、そろそろ話しておいた方が良さそうですわね」"
translation = "「지금의 당신들이라면 신뢰할 수 있고 슬슬 이야기해 두는 게 좋을 것 같군요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォームは従来の戦闘服より遥かに強力ですが、起動時間や星力消費に難がありますの」"
translation = "「<ruby>여제<rt>엠프레스</rt></ruby> 폼은 기존의 전투복보다 훨씬 강력하지만 기동 시간이나 성력 소비에 난항을 겪고 있습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「空っぽからフル充填するのに丸１日以上かかりますわ。そして、稼働時間は節約しても、いいとこ２０分」"
translation = "「바닥에서부터 풀 충전하는 데 꼬박 하루 이상 걸립니다. 그리고 가동 시간은 아껴 써도 기껏해야 20분.」"

[[dialogue]]
speaker = "ミウ"
original = "「丸１日チャージして、２０分ですか……！？\u3000燃費悪すぎ……！」"
translation = "「꼬박 하루 충전해서 20분인가요……!? 연비가 너무 나빠요……!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「どうして、そんな星力食い虫を使ってるんですか？\u3000社長ならいつもの姿でもパパパーッ！\u3000とやっつけられるじゃないですか」"
translation = "「어째서 그런 성력 먹는 하마를 쓰고 계신 거예요? 사장님이라면 평소 모습으로도 파파팟! 하고 해치울 수 있잖아요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「新型モンスターと戦闘したのなら、理解したのではありませんの？\u3000あいつらは並の星騎士では倒せない」"
translation = "「신형 몬스터와 전투했다면 이해한 거 아닙니까? 저 녀석들은 보통 성기사로는 쓰러뜨릴 수 없어요.」"

[[dialogue]]
speaker = "ミウ"
original = "「それは確かに……まったく歯が立ちませんでした」"
translation = "「그건 확실히…… 전혀 상대가 안 됐어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「あなたたちは決して弱くない。並以上の能力を持つあなたたちですら手も足も出なかったのですから、私でも苦戦を強いられるのは必至ですわ」"
translation = "「당신들은 결코 약하지 않아요. 평균 이상의 능력을 갖춘 당신들조차 손도 발도 못 냈으니 저라 해도 고전을 면치 못하는 건 필연입니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「故に、使い慣れていなくとも、新たなる強大な力に頼った」"
translation = "「그렇기에 손에 익지 않았더라도 새로운 강대한 힘에 기댔던 거죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「しかし、この疑似ノヴァフォームはまだ試作段階。九浄へレナ様に頼まれて、ゴールデングースで試験運用を行っているんですのよ」"
translation = "「하지만 이 의사 노바 폼은 아직 시험 단계. 쿠죠 헬레나 님께 부탁받아 골든 구스에서 시험 운용을 행하고 있는 중이랍니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォームの運用結果次第では、疑似ノヴァフォームの量産化も見込まれることでしょう。忌むべき新型モンスターたちの殲滅にも一役買うわけです」"
translation = "「<ruby>여제<rt>엠프레스</rt></ruby> 폼의 운용 결과에 따라 의사 노바 폼의 양산화도 전망할 수 있겠죠. 가증스러운 신형 몬스터들의 섬멸에도 한몫 거드는 셈입니다.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「すっ……すっごーーーーい！\u3000さっすがはあたしたちの社長です！」"
translation = "「와아…… 대애애애박! 역시 우리 사장님이에요!」"

[[dialogue]]
speaker = "ミウ"
original = "「九浄家の一大事業に、ゴールデングースが一枚噛んでるってことですよね！」"
translation = "「쿠죠 가문의 일대 사업에 골든 구스가 한다리 걸치고 있다는 거네요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「そういうことになりますわね。もちろん、女帝の名を冠するに相応しい、私の類稀なる実力を見込まれてのものですわ！」"
translation = "「그렇게 되는 거겠죠. 물론 여제의 이름을 따기에 어울리는 저의 유례없는 실력을 인정받아서인 겁니다!」"

[[dialogue]]
speaker = "ミウ"
original = "「未来を見据えた最新装備の試験運用を任されているだなんて！\u3000さすがはセナリィ社長！\u3000まだ見習いとはいえ、ゴールデングースにいることが誇らしいです！」"
translation = "「미래를 내다본 최신 장비의 시험 운용을 맡고 계시다니! 역시 세나리 사장님! 아직 견습이긴 하지만 골든 구스에 있는 게 자랑스러워요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「疑似ノヴァフォームが量産化されたら、テスト運用を務めあげたセナリィ社長の名前が、一生刻まれて！\u3000ゴールデングースの評判も鰻登り！」"
translation = "「의사 노바 폼이 양산화되면 테스트 운용을 완수한 세나리 사장님의 이름이 평생 새겨지겠네요! 골든 구스의 평판도 수직 상승!」"

[[dialogue]]
speaker = "セナリィ"
original = "「え、ええ！\u3000当然、そういう流れになりますわね！」"
translation = "「어, 에에! 당연히 그런 흐름이 되겠네요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「でも、こんなに燃費が悪いんじゃ、量産化にはまだまだ先は長そうですよねー」"
translation = "「하지만 이렇게 연비가 나쁘면 양산화까지는 아직 갈 길이 멀어 보이네요ー.」"

[[dialogue]]
speaker = "セナリィ"
original = "「今までの比ではない性能を持つ以上、過度なエネルギー消費も仕方のないことなのでしょうけど……ここを解決しないことには、量産化は夢のまた夢ですわね」"
translation = "「지금까지와는 비교도 할 수 없는 성능을 가진 이상 과도한 에너지 소비도 어쩔 수 없는 거겠지만…… 여기를 해결하지 않고서는 양산화는 꿈속의 꿈이겠죠.」"

[[dialogue]]
speaker = "ミウ"
original = "「巨大なタンクをつけるわけにもいかないですし……星力がすぐに枯渇してしまうなら、再充填できる方法さえ見つかれば……」"
translation = "「거대한 탱크를 달 수도 없고…… 성력이 금방 고갈된다면 재충전할 수 있는 방법만 찾아내면……」"

[[dialogue]]
speaker = "セナリィ"
original = "「それが簡単に思いつけば苦労はしませんわ。さ、あなたたちはもうお家に帰る時間ですわよ。今日も一日、お疲れさま」"
translation = "「그게 쉽게 떠오르면 고생 안 하겠죠. 자, 당신들은 이제 집에 돌아갈 시간이에요. 오늘도 하루 고생했어요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はい！\u3000お疲れさまでした！」"
translation = "「네! 수고하셨습니다!」"

[[dialogue]]
speaker = "ミウ"
original = "「お先に失礼します」"
translation = "「먼저 실례하겠습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふう……２人とも行きましたわね。なんとかバレずに済みましたわ……あいたたたた……！」"
translation = "「휴…… 둘 다 갔군요. 어떻게든 안 들키고 끝났네요…… 아이구구구……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォームの弱点はもうひとつ……全力を出した後、全身がとんでもない筋肉痛に襲われることですわ……！」"
translation = "「<ruby>여제<rt>엠프레스</rt></ruby> 폼의 약점은 또 하나…… 전력을 다한 뒤 온몸에 엄청난 근육통이 찾아온다는 점입니다……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「まったく、とんでもない暴れ馬ですわ──いだだだだだ！」"
translation = "「정말이지 말도 안 되는 야생마라니까요── 아야야야야!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしたちには隠してたみたいだけど、セナリィ社長、苦しそうだったね。あれだけ凄いパワーだと体にかかる負荷もヤバいんだろーなー」"
translation = "「우리한텐 숨기려는 것 같았지만 세나리 사장님 무척 괴로워 보였지. 저렇게 대단한 파워라면 몸에 가해지는 부하도 엄청나겠지ー」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしたちのために頑張ってくれてるセナリィ社長のためにも、もっと頑張らなきゃだね、ミウ──」"
translation = "「우리를 위해 노력해 주시는 세나리 사장님을 위해서라도 더 열심히 해야겠어, 미우──」"

[[dialogue]]
speaker = "ミウ"
original = "「うーん……エネルギー問題かぁ……ヒマワリちゃんの星術を駆使すれば、或いは──」"
translation = "「으음…… 에너지 문제인가…… 히마와리짱의 성술을 구사하면 어쩌면──」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「おっ、ミウがプランニングモードに入ってんねー」"
translation = "「오, 미우가 플래닝 모드에 들어갔네ー」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ミウのことだから、きっとスッゴいアイデアが思いついちゃうんだろうなー。楽しみにしておこーっと♪」"
translation = "「미우니까 분명 엄청난 아이디어를 떠올려 주겠지ー. 기대하고 있어야지♪」"

