[[dialogue]]
speaker = "unk"
original = "第２話,魔王の現状,B"
translation = "제2화, 마왕의 현상, B"

[[dialogue]]
speaker_original = "ダークキングフワッチ"
speaker_translation = "다크 킹 후왓치"
original = "「イーーーーーッ！」"
translation = "「이이이익!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アビスインパクト！」"
translation = "「어비스 임팩트!」"

[[dialogue]]
speaker_original = "ダークキングフワッチ"
speaker_translation = "다크 킹 후왓치"
original = "「イ～～……」"
translation = "「이이잉……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、クロトなら魔王の力を使わなくてもこのくらい余裕よね」"
translation = "「뭐, 쿠로토라면 마왕의 힘을 쓰지 않아도 이 정도는 여유네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんなが付き合ってくれたおかげだよ」"
translation = "「모두가 함께해 준 덕분이야」"

[[dialogue]]
speaker = "unk"
original = "以前、破滅した世界のビジョンが見えると同時に、魔王の力が暴走しかけた。"
translation = "이전에 파멸한 세계의 비전이 보임과 동시에, 마왕의 힘이 폭주할 뻔했다."

[[dialogue]]
speaker = "unk"
original = "だから今は魔王の力を封印し、自分の星力だけで戦うトレーニングをしていた。"
translation = "그래서 지금은 마왕의 힘을 봉인하고, 자신의 성력만으로 싸우는 트레이닝을 하고 있었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、緋宮くんの中で何が起きたの？\u3000いまだによくわかってないんだけど……」"
translation = "「그치만, 히노미야 군 안에서 무슨 일이 일어난 거야? 아직도 잘 모르겠는데……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「では整理しましょう。緋宮会長には魔王の力が２つありました」"
translation = "「그럼 정리하죠. 히노미야 회장님에게는 마왕의 힘이 두 가지 있었습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ひとつは、オルタナティブ世界から先代魔王ラクシスが持ち帰った因子によるもの」"
translation = "「하나는, 얼터너티브 세계에서 선대 마왕 락시스가 가져온 인자에 의한 것」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「霊力と魔力、そして星力を融合させることで、さらに高次元の力を引き出すものです」"
translation = "「영력과 마력, 그리고 성력을 융합시킴으로써, 더욱 고차원의 힘을 이끌어내는 것입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この魔王因子は星見家などラクシスの子孫にも受け継がれています」"
translation = "「이 마왕 인자는 호시미 가문 등 락시스의 후손에게도 계승되고 있습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、フィオナさんやアポロちゃんがそうだよね」"
translation = "「응, 피오나 씨나 아폴로짱이 그렇지」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そしてもう１つが──」"
translation = "「그리고 또 하나가──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラクシスが先天的に持っていた、世界を超える力──だな」"
translation = "「락시스가 선천적으로 가지고 있던, 세계를 넘는 힘──이지」"

[[dialogue]]
speaker = "unk"
original = "先代魔王ラクシスの生まれ変わりである俺だけが、その力を受け継いでいる。"
translation = "선대 마왕 락시스의 환생인 나만이 그 힘을 계승하고 있다."

[[dialogue]]
speaker = "unk"
original = "ラクシスの力は、異なる世界を渡るばかりか、平行世界の可能性を呼び寄せることもできた。"
translation = "락시스의 힘은 서로 다른 세계를 건너는 것뿐만 아니라, 평행세계의 가능성을 불러들일 수도 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「緋宮会長は、その力を自覚する前から無意識に使っていたと思われます」"
translation = "「히노미야 회장님은 그 힘을 자각하기 전부터 무의식적으로 사용하고 있었다고 생각됩니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、今思えば心当たりがあるよ」"
translation = "「아아, 지금 생각하면 짚이는 데가 있어」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ふ──さすがは魔王の血族。中々やるようですが、所詮はただの空拳……」"
translation = "「후── 과연 마왕의 혈족. 제법인 듯합니다만, 결국은 평범한 주먹……」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「っ！？」"
translation = "「윽!?」"

[[dialogue]]
speaker = "unk"
original = "あの時、一度は防がれたはずの拳がギエルに命中していた。"
translation = "그때, 분명 한 번 막혔을 터인 주먹이 기엘에게 명중해 있었다."

[[dialogue]]
speaker = "unk"
original = "あれは平行世界から呼び出された俺の拳が、ギエルに打撃を与えていたのだ。"
translation = "그것은 평행세계에서 호출된 나의 주먹이 기엘에게 타격을 주었던 것이다."

[[dialogue]]
speaker = "unk"
original = "以前暴走しかけたのは、ラクシスが元々持っていた『世界を超える力』の方だ。"
translation = "이전에 폭주할 뻔했던 것은 락시스가 원래 가지고 있던 『세계를 넘는 힘』 쪽이다."

[[dialogue]]
speaker = "unk"
original = "だからラクシスの力を使わずに戦う訓練を積んでいたけど、無意識のうちに使っていた力を、意識的に封印するのはなかなか難しい。"
translation = "그래서 락시스의 힘을 쓰지 않고 싸우는 훈련을 쌓고 있었지만, 무의식중에 쓰던 힘을 의식적으로 봉인하는 것은 꽤 어려웠다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今の俺は、普通の星騎士と同じように自分の星力だけで戦っている。星徒会長なんだから、それでも最強じゃないとな」"
translation = "「지금의 나는 보통 성기사와 마찬가지로 자신의 성력만으로 싸우고 있어. 성도회장이니까, 그래도 최강이어야지」"

[[dialogue]]
speaker = "unk"
original = "みんなのおかげで、魔王の力を全力で引き出した時ほどではなくても、かなり戦えるようになった。"
translation = "모두 덕분에 마왕의 힘을 전력으로 끌어냈을 때만큼은 아니더라도, 꽤 싸울 수 있게 되었다."

[[dialogue]]
speaker = "unk"
original = "そうでなければ梨緒との御前試合も勝てなかっただろう。"
translation = "그렇지 않았다면 리오와의 어전시합도 이기지 못했을 것이다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「な、なるほど……理解できた気がする」"
translation = "「그, 그렇구나…… 이해가 된 것 같아」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、どうしてラクシスの力が暴走しかけたのかしら～？」"
translation = "「그치만, 어째서 락시스의 힘이 폭주할 뻔했던 걸까~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それなんですが──」"
translation = "「그건 말이지──」"

[[dialogue]]
speaker = "unk"
original = "あれは梨緒との御前試合があった日の夕方のこと。"
translation = "그것은 리오와의 어전시합이 있었던 날 저녁의 일."

[[dialogue]]
speaker = "unk"
original = "俺とフィオナが梨緒を呼び出し、重要な話し合いを行った最後に、梨緒は言った。"
translation = "나와 피오나가 리오를 불러내 중요한 대화를 나눈 마지막에, 리오는 말했다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「新星学園の制服を着た守護天使から伝言だ」"
translation = "「신성학원 교복을 입은 수호천사가 전한 말이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「『魔王は他の世界で敗北しているから、その可能性を収束させれば、同じ末路を辿ることが確定してしまう』」"
translation = "「『마왕은 다른 세계에서 패배했기에, 그 가능성을 수렴시키면 같은 말로를 걷는 것이 확정되어 버린다』」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「詳しく聞かれても私にはわからない……が、その顔を見る限り、意味は伝わったようだな」"
translation = "「자세히 물어도 나는 모른다……만, 그 표정을 보니 의미는 전달된 모양이군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は──緋宮クロトは、平行世界ベガとデネブでリクリエに屈している。つまり敗北の可能性を収束させれば──」"
translation = "「나는── 히노미야 쿠로토는, 평행세계 베가와 데네브에서 리크리에에 굴복하고 있어. 즉 패배의 가능성을 수렴시키면──」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アルタイルの緋宮クロトが勝利しても、２対１で負けちゃう──ってわけね～」"
translation = "「알타이르의 히노미야 쿠로토가 승리해도, 2대 1로 져버린다는…… 거네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「なるほど～、そういうことなら納得だわ～。可能性を収束させるっていっても、いいことばかりじゃないのね～」"
translation = "「과연~, 그런 거라면 납득이야~. 가능성을 수렴시킨다고 해도 좋은 일만 있는 건 아니네~」"

[[dialogue]]
speaker = "unk"
original = "俺たちがいるこの世界はアルタイル。そしてベガとデネブという２つの平行世界が他に存在している。"
translation = "우리가 있는 이 세계는 알타이르. 그리고 베가와 데네브라는 두 평행세계가 따로 존재하고 있다."

[[dialogue]]
speaker = "unk"
original = "おそらくベガとデネブの俺は良くて死……最悪、暴走した俺のように世界を破滅させる側に回っているだろう。"
translation = "아마 베가와 데네브의 나는 잘해야 죽음…… 최악의 경우, 폭주한 나처럼 세계를 파멸시키는 쪽에 서 있을 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃあ何、前の戦いの時はたまたま上手くいってただけってこと？」"
translation = "「그럼 뭐야, 저번 싸움 때는 어쩌다 운 좋게 잘 풀렸던 것뿐이라는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうかもしれない。あるいは力を自覚し、強力になることで、余計なものまで引き寄せてしまったのか……」"
translation = "「그럴지도 몰라. 아니면 힘을 자각하고 강력해짐으로써, 불필요한 것까지 끌어당겨 버린 건지……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どの道、今のままじゃ魔王の力は全力で使えない」"
translation = "「어쨌든 지금 이대로는 마왕의 힘을 전력으로 쓸 수 없어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「オルタナティブ世界の魔王の力があるなら、それでラクシスの力を抑え込んだりできないの？」"
translation = "「얼터너티브 세계의 마왕의 힘이 있다면, 그걸로 락시스의 힘을 억누르거나 할 수 없는 거야?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おそらく会長は、生来持っていたラクシスの力の方が根幹にあるものと思われます」"
translation = "「아마 회장님은 태생적으로 가진 락시스의 힘 쪽이 근간에 있을 것으로 보입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それにオルタナティブ世界の魔王の力は、星力・魔力・霊力を融合させ、さらなる力を得るもの」"
translation = "「게다가 얼터너티브 세계의 마왕의 힘은 성력, 마력, 영력을 융합해 더 큰 힘을 얻는 것」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「暴走した会長がその力を使った場合、さらに手が付けられなくなる可能性があります」"
translation = "「폭주한 회장님이 그 힘을 사용할 경우, 더욱 손을 쓸 수 없게 될 가능성이 있습니다」"

[[dialogue]]
speaker = "unk"
original = "それはまさに最悪のケースだ。"
translation = "그것은 그야말로 최악의 케이스다."

[[dialogue]]
speaker = "unk"
original = "力を御すことができなければ、この世界に牙を剥くことになるだろう。"
translation = "힘을 제어할 수 없게 된다면, 이 세계에 이빨을 드러내게 될 것이다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「な、なるほど……それはヤバいどころじゃないね……」"
translation = "「그, 그렇구나…… 그건 위험한 정도가 아니네……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゃあ今、強い敵が来たらとんでもないピンチに……」"
translation = "「그럼 지금 강한 적이 오면 엄청난 위기가……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、だからこうして、少しでも強くなろうとしているんでしょ～？」"
translation = "「후후, 그러니까 이렇게 조금이라도 강해지려고 하는 거잖아~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それはそうですけど……いえ、そうですね。星徒会が弱音なんて言ってられませんっ」"
translation = "「그건 그렇지만…… 아니, 그렇네요. 성도회가 약한 소리를 할 수는 없죠!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「この数ヶ月で、星徒会もノヴァフォームの獲得に成功したわけだし……いざとなったら私たちが緋宮くんを守るよ！」"
translation = "「지난 몇 달 동안 성도회도 노바 폼 획득에 성공했으니까…… 유사시에는 우리가 히노미야 군을 지킬게!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。頼りにしてる」"
translation = "「고마워. 믿고 있을게」"

[[dialogue]]
speaker = "unk"
original = "暗いニュースばかりではない。"
translation = "어두운 뉴스만 있는 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "マトイ、サーシャ先輩、アナはこの数ヶ月の間に、強力な力を有する新戦闘服、ノヴァフォームを手に入れていた。"
translation = "마토이, 사샤 선배, 아나는 지난 몇 달 사이에 강력한 힘을 지닌 새 전투복, 노바 폼을 손에 넣었다."

[[dialogue]]
speaker = "unk"
original = "とは言え──その力があれば、魔神ギエル級の厄災に太刀打ちできるのかといえば、難しいと言わざるを得ない。"
translation = "그렇다고는 해도── 그 힘이 있다면 마신 기엘급의 재앙에 맞설 수 있느냐고 묻는다면, 어렵다고 할 수밖에 없다."

[[dialogue]]
speaker = "unk"
original = "リクリエの本波や魔王の力は、単純な力比べとは異なる、文字通り異次元の力だった。"
translation = "리크리에의 본파나 마왕의 힘은 단순한 힘겨루기와는 다른, 말 그대로 이차원의 힘이었다."

[[dialogue]]
speaker = "unk"
original = "だからこそ、『魔王の力を封印した状態でのパワーアップ』と同時に、『魔王の力の制御』を取り戻す方法も探る必要がある。"
translation = "그렇기에 『마왕의 힘을 봉인한 상태에서의 파워 업』과 동시에 『마왕의 힘의 제어』를 되찾을 방법도 찾아야 한다."

[[dialogue]]
speaker = "unk"
original = "やらなければならないことは山積みだが、やれるところからやっていくしかない。今の俺たちにできることをするんだ。"
translation = "해야 할 일은 산더미 같지만, 할 수 있는 것부터 해 나갈 수밖에 없다. 지금의 우리가 할 수 있는 일을 하는 거다."

