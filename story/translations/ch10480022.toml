[[dialogue]]
speaker = "unk"
original = "第２話,竜は素直じゃない,P"
translation = "제2화, 용은 솔직하지 않아, P"

[[dialogue]]
speaker = "unk"
original = "流星寮の寮長であり、マムと並んで学園最強クラスの星騎士であるヒルディオーネ先輩に、訓練を見てもらっていたある日のこと――"
translation = "유성 기숙사의 사감이며, 맘과 나란히 학원 최강 클래스의 성기사인 힐디 오네 선배에게 훈련을 지도받던 어느 날의 일──"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「会長、今の打撃はちょっと動きを直した方がいいかもしれませんわね」"
translation = "「회장, 지금 타격은 조금 움직임을 고치는 편이 좋을지도 모르겠네요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ちょっと失礼しますわ。大きな隙ができないように、構えはこうして……」"
translation = "「잠시 실례하겠습니다. 큰 빈틈이 생기지 않도록 자세는 이렇게……」"

[[dialogue]]
speaker = "マハムート"
original = "「じ～っ……」"
translation = "「빤히～～……」"

[[dialogue]]
speaker = "unk"
original = "えっと……マム？"
translation = "저기…… 맘?"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ここ最近、訓練になるとよく見に来ていますけれど、何か気になることでもあるんですの？」"
translation = "「요즘 들어 훈련 때마다 자주 보러 오시는데, 뭐 신경 쓰이는 거라도 있으신가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「何よ。他人の訓練を見るのは、別におかしいことじゃないでしょう？」"
translation = "「뭐야. 남의 훈련을 보는 건 딱히 이상한 일이 아니잖아?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……ひょっとしてと思っていたのですけれど、マム、あなた……」"
translation = "「……혹시나 생각했습니다만, 맘, 당신……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「会長と付き合い始めましたの？」"
translation = "「회장과 사귀기 시작했나요?」"

[[dialogue]]
speaker = "マハムート"
original = "「！？\u3000…………何を言っているの？\u3000そんなわけないでしょう」"
translation = "「!? …………무슨 소리를 하는 거야? 그럴 리 없잖아」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いま、思いっきり間がありましたわよ？」"
translation = "「방금 완전히 뜸을 들이셨는데요?」"

[[dialogue]]
speaker = "マハムート"
original = "「気のせいよ。変な勘繰りをしないで頂戴」"
translation = "「기분 탓이야. 이상한 억측은 하지 말아줘」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あら、そうですの？\u3000じゃあ別に、会長を千園寺家の婿候補にさせて頂いても構いませんわね？」"
translation = "「어머, 그런가요? 그럼 딱히 회장을 센온지 가문의 사위 후보로 삼아도 상관없겠네요?」"

[[dialogue]]
speaker = "マハムート"
original = "「は！？\u3000何よいきなり！？」"
translation = "「하!? 뭐야 갑자기!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「実は、前々から考えていたのですわ。会長と一緒に鍛練をするようになって、真面目な男性であると実感しておりましたし――」"
translation = "「사실 전부터 생각하고 있었습니다. 회장과 함께 단련하게 되면서 성실한 남성이라는 걸 실감하고 있었고──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私とは気も合いますし、婿として早めに勧誘しておくのが、よいのではないかと」"
translation = "「저와는 마음도 잘 맞으니, 사위로서 일찌감치 권유해 두는 것이 좋지 않을까 하고요」"

[[dialogue]]
speaker = "マハムート"
original = "「何よそれ……そんな一方的な……」"
translation = "「뭐야 그게…… 그런 일방적인……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「まあ、そこは千園寺家の事情というものですわ。妃竜院家だって、いずれは婿を迎えなければならないのでしょう？」"
translation = "「뭐, 그건 센온지 가문의 사정이라는 것이지요. 히류인 가문도 언젠가는 사위를 맞이해야 하잖아요?」"

[[dialogue]]
speaker = "マハムート"
original = "「それは、そうだけど……」"
translation = "「그건 그렇지만……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「というわけで会長、今日からあなたを我が千園寺家の婿候補とさせて頂きますわ♪\u3000つきましてはこの後、カフェテリアでじっくりお話を……」"
translation = "「그런 고로 회장, 오늘부터 당신을 저희 센온지 가문의 사위 후보로 삼겠습니다♪ 그런 의미에서 이따가 카페테리아에서 자세히 이야기를……」"

[[dialogue]]
speaker = "マハムート"
original = "「……引力操作！」"
translation = "「……인력 조작!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おっと、ミラージュブレイカー♪」"
translation = "「오옷, 미라주 브레이커♪」"

[[dialogue]]
speaker = "マハムート"
original = "「くっ……相変わらずデタラメな星術ね……！」"
translation = "「큭…… 여전히 터무니없는 성술이네……!」"

[[dialogue]]
speaker = "unk"
original = "――ヒルディオーネ先輩がマムと互角と言われ、そして彼女が周りから『努力する星騎士の模範』と言われる<ruby>所以<rt>ゆえん</rt></ruby>。"
translation = "──힐디 오네 선배가 맘과 호각이라 불리며, 그녀가 주변에서 『노력하는 성기사의 모범』이라 불리는 이유."

[[dialogue]]
speaker = "unk"
original = "それが、努力によって後天的に得た固有の星術『ミラージュブレイカー』である。"
translation = "그것이 노력에 의해 후천적으로 얻은 고유 성술 『미라주 브레이커』이다."

[[dialogue]]
speaker = "unk"
original = "相手の技を『物理的に破壊可能な対象』として定義し、ドリルの一撃によって打ち砕く。それはマムの強力な『引力操作』でさえも、決して例外ではない。"
translation = "상대의 기술을 『물리적으로 파괴 가능한 대상』으로 정의하고, 드릴의 일격으로 박살 낸다. 그것은 맘의 강력한 『인력 조작』조차 결코 예외는 아니다."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いかがしましたか、マム？\u3000まさか妃竜院家の婿として、会長が惜しくなりましたの？」"
translation = "「왜 그러시나요, 맘? 설마 히류인 가문의 사위로서 회장이 아까워진 건가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「……違うわ。家は関係ない。私はただ――」"
translation = "「……아니야. 가문은 상관없어. 나는 그저──」"

[[dialogue]]
speaker = "マハムート"
original = "「人の<b>彼氏</b>に手を出すな、とそう言いたいだけよ」"
translation = "「남의 <b>남자친구</b>에게 손대지 마, 라고 그렇게 말하고 싶을 뿐이야」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あら、さっきは否定していましたわよ？」"
translation = "「어머, 아까는 부정하셨잖아요?」"

[[dialogue]]
speaker = "マハムート"
original = "「……あなた、本当は気づいていてやってるでしょう」"
translation = "「……너, 사실은 알고서 그러는 거지」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふふっ……ふふふっ、おーっほっほっほ！\u3000バレてしまいましたか♪」"
translation = "「후후…… 후후후, 오호호호! 들켜버렸나요♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――でも、まさかあのマムが焼き餅を焼くだなんて。まるで普通の乙女みたいで、ニヤニヤを抑えるのが大変でしたわ♪」"
translation = "「──그렇지만 설마 그 맘이 질투를 하다니. 마치 평범한 소녀 같아서 웃음을 참느라 힘들었습니다♪」"

[[dialogue]]
speaker = "マハムート"
original = "「失礼なドリルね。引力操作でその髪、無理矢理ストレートパーマにするわよ」"
translation = "「무례한 드릴이네. 인력 조작으로 그 머리카락, 억지로 스트레이트 파마로 만들어줄게」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーほっほっほ♪\u3000やれるものならやってみなさい！\u3000いくら試したところで――」"
translation = "「오호호호♪ 할 수 있으면 해보시지 그래요! 아무리 시도해봤자──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「千園寺家伝統の縦ロールは、ミラージュブレイカーのごとくストレートパーマを一切受け付けませんことよ！」"
translation = "「센온지 가문 전통의 세로 롤은 미라주 브레이커처럼 스트레이트 파마를 일절 받아들이지 않는답니다!」"

[[dialogue]]
speaker = "unk"
original = "血筋による癖っ毛だった！？"
translation = "혈통에 의한 곱슬머리였어!?"

[[dialogue]]
speaker = "マハムート"
original = "「……悪かったわね、ヒルディー。素直に謝るわ」"
translation = "「……미안하게 됐네, 힐디. 솔직하게 사과할게」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いや憐れまないで下さる！？\u3000そこは謝る方が失礼でしてよ！？」"
translation = "「아니 동정하지 말아 주실래요!? 거기서 사과하는 게 더 무례하다고요!?」"

[[dialogue]]
speaker = "unk"
original = "それから訓練を終えて、新星学園への帰り道。マムと２人で歩いていると――"
translation = "그러고 나서 훈련을 마치고 신성 학원으로 돌아가는 길. 맘과 둘이서 걷고 있자니──"

[[dialogue]]
speaker = "マハムート"
original = "「訓練が終わっても、まだ星徒会の仕事が残ってるとはね。大変そうだけど、大丈夫なの？」"
translation = "「훈련이 끝나도 아직 성도회 업무가 남아있다니. 힘들 것 같은데 괜찮아?」"

[[dialogue]]
speaker = "マハムート"
original = "「――スケジュール通り？\u3000本当かしら？」"
translation = "「──스케줄 대로라고? 정말일까?」"

[[dialogue]]
speaker = "マハムート"
original = "「って、どうしたの？\u3000――さっきのこと？」"
translation = "「그보다, 왜 그래? ──방금 그 일?」"

[[dialogue]]
speaker = "unk"
original = "マム、俺のことを『彼氏』って……"
translation = "맘, 저를 『남자친구』라고……"

[[dialogue]]
speaker = "マハムート"
original = "「あれは……」"
translation = "「그건……」"

[[dialogue]]
speaker = "マハムート"
original = "「貴方を試すとは言ったけど、付き合っていることに……変わりはないでしょう？」"
translation = "「너를 시험한다고는 했지만, 사귀고 있다는 사실에…… 변함은 없잖아?」"

[[dialogue]]
speaker = "マハムート"
original = "「何か文句ある？」"
translation = "「뭐 불만 있어?」"

[[dialogue]]
speaker = "unk"
original = "ありません！\u3000むしろ嬉しいです！"
translation = "없습니다! 오히려 기뻐요!"

[[dialogue]]
speaker = "マハムート"
original = "「……何よ、ヒルディオーネみたいにニヤニヤして……。でも、そういうわけだから……」"
translation = "「……뭐야, 힐디 오네처럼 히죽거리기는…… 하지만 그렇게 됐으니까……」"

[[dialogue]]
speaker = "マハムート"
original = "「貴方も変に浮気とか、するんじゃないわよ」"
translation = "「너도 이상하게 바람피우거나 하지 마」"

[[dialogue]]
speaker = "unk"
original = "イエス・マム！"
translation = "예스, 맘!"

[[dialogue]]
speaker = "マハムート"
original = "「……星徒会の仕事、まだあるなら手伝ってあげるわ」"
translation = "「……성도회 업무, 아직 남았다면 도와줄게」"

[[dialogue]]
speaker = "unk"
original = "少し照れ臭そうな顔をしながらも、一緒に星徒会室へと向かってくれるマムなのだった――"
translation = "조금 쑥스러운 표정을 지으면서도 함께 성도회실로 향해주는 맘이었다──"

