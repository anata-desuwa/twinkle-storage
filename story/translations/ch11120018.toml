[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「くらえーーーっ！！」"
translation = "「받아라ーーー앗!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「よし、またアタシの勝ちだな！\u3000これで３連勝だ！」"
translation = "「좋아, 또 내가 이겼군! 이걸로 3연승이다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今度は勝てると思ったのに……。俺の方がやりこんでるはずなのに、チナは強いな」"
translation = "「이번엔 이길 수 있을 거라고 생각했는데……. 내가 더 열심히 했을 텐데, 치나는 강하네.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ははっ、格ゲーはいろいろコツがあるからな。知りたかったら教えてやるぞ」"
translation = "「하핫, 격투 게임은 여러 가지 요령이 있으니까. 알고 싶으면 가르쳐 줄 수도 있다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だけど１０年前のゲームでも、やっぱり面白いもんは面白いもんだな。つい熱中しちまった」"
translation = "「하지만 10년 전 게임이라도, 역시 재미있는 건 재미있는 거네. 나도 모르게 열중해 버렸어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（１０年前……）"
translation = "「(10년 전……)」"

[[dialogue]]
speaker = "unk"
original = "最新ゲームを昔のゲーム扱いされることにチクッとした胸の痛みを覚えつつ、ゲームを続ける。"
translation = "최신 게임을 옛날 게임 취급당하는 것에 콕 찌르는 듯한 가슴의 통증을 느끼면서, 게임을 계속한다."

[[dialogue]]
speaker = "unk"
original = "だけど……"
translation = "하지만……"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ん？\u3000じっとこっち見てどうした？」"
translation = "「응? 가만히 이쪽을 보고 무슨 일이야?」"

[[dialogue]]
speaker = "unk"
original = "戦いがどうなったとしても、チナはいずれデネブの世界に帰ってしまう。"
translation = "싸움이 어떻게 되든, 치나는 결국 데네브의 세계로 돌아가 버린다."

[[dialogue]]
speaker = "unk"
original = "デネブに会いに行くことができればいいが、そうでなければチナとは二度と会えなくなる。"
translation = "데네브에 만나러 갈 수 있으면 좋겠지만, 그렇지 않다면 치나와는 두 번 다시 만날 수 없게 된다."

[[dialogue]]
speaker = "unk"
original = "だから俺は──"
translation = "그래서 나는──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きだ、チナ」"
translation = "「좋아해, 치나.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「はぁああああっ！！？\u3000あんた、何言ってるのかわかってんのか！？」"
translation = "「하아아아아앗!!? 너, 무슨 말 하는지 알고 있는 거야!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシとあんたは別の世界の人間だ。それに必要があれば、アタシはまたアルタイルと戦う」"
translation = "「나와 너는 다른 세계의 인간이다. 게다가 필요하다면, 나는 다시 알타이르와 싸울 거다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかってる。それでも好きだ」"
translation = "「알고 있어. 그래도 좋아해.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……あんた、本当にバカなんだな。そういうとこ、あんたらしいと思うけど」"
translation = "「……너, 정말 바보구나. 그런 점이 너답다고 생각하지만.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシはあんたのこと、嫌いじゃない。アタシだって、その……離れたくないって思ってる」"
translation = "「나는 너를, 싫어하지 않아. 나도, 그…… 떨어지고 싶지 않다고 생각하고 있어.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だから……」"
translation = "「그러니까……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ほら……好きにしろ」"
translation = "「자…… 마음대로 해.」"

[[dialogue]]
speaker = "unk"
original = "チナが俺のベッドの上で服をはだけ、緊張した顔で俺を見つめる。"
translation = "치나가 내 침대 위에서 옷을 헤치고, 긴장한 얼굴로 나를 바라본다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいのか？」"
translation = "「괜찮겠어?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシはあんたのこと、好きって<b>言えない</b>。<b>言うわけにはいかない</b>。だからせめて……な」"
translation = "「나는 너를 좋아한다고 <ruby>말할 수 없어<rt>・・・・ ・ ・</rt></ruby>. <ruby>말해서는 안 돼<rt>・・・・ ・・</rt></ruby>. 그러니까 적어도…… 말이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……わかった」"
translation = "「……알았어.」"

[[dialogue]]
speaker = "unk"
original = "俺たちは一時的に共闘関係になったとはいえ、また敵に戻るかもしれない。"
translation = "우리는 일시적으로 공투 관계가 되었지만, 다시 적으로 돌아갈지도 모른다."

[[dialogue]]
speaker = "unk"
original = "だからあえて言葉で気持ちを確かめ合うことはせず、ただ体を重ねる。"
translation = "그래서 굳이 말로 마음을 확인하지 않고, 그저 몸을 겹친다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ触っていくよ」"
translation = "「그럼 만져볼게.」"

[[dialogue]]
speaker = "unk"
original = "小ぶりで可愛らしいおっぱいに手を伸ばし、そっと愛撫していく。"
translation = "작고 귀여운 가슴에 손을 뻗어, 살며시 애무해 나간다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ん……はぁ……こんな小さな胸、触って嬉しいのか……？」"
translation = "「응…… 하아…… 이렇게 작은 가슴, 만져서 기쁜 거야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろん。チナのおっぱいだから」"
translation = "「물론이지. 치나의 가슴이니까.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「っ……バカ……んぁっ……はぁ、は……んん……」"
translation = "「읏…… 바보…… 응앗…… 하아, 하…… 응응……」"

[[dialogue]]
speaker = "unk"
original = "指に力を込める度、小さな乳房がふにふにと形を変え、チナが声を漏らしながら震える。"
translation = "손가락에 힘을 줄 때마다, 작은 유방이 말랑말랑하게 형태를 바꾸고, 치나가 신음을 흘리며 떨린다."

[[dialogue]]
speaker = "unk"
original = "秘部に視線を向けると、そこから透明な蜜がにじみ出していた。"
translation = "은밀한 곳에 시선을 돌리자, 그곳에서 투명한 꿀이 배어 나오고 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ぅ……あんまりじっと見るなよ……恥ずかしいんだから。魔王だって……あ──」"
translation = "「으윽…… 너무 빤히 보지 마…… 부끄러우니까. 마왕도…… 아──」"

[[dialogue]]
speaker = "unk"
original = "チナがペニスの勃起に気付き、目を丸くして俺の股間を凝視する。"
translation = "치나가 페니스의 발기를 알아차리고, 눈을 동그랗게 뜨고 내 가랑이를 응시한다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「魔王の、すごくでかい……。これ、いつもこうなってる……わけじゃないんだよな？」"
translation = "「마왕의, 엄청 크네……. 이거, 항상 이렇게 되어 있는…… 건 아니지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、チナの前だからこんなに大きくなってるんだよ」"
translation = "「응, 치나 앞에서니까 이렇게 커진 거야.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そ、そうか……やっぱり物好きなやつ……」"
translation = "「그, 그런가…… 역시 별난 녀석……」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くするチナの股間にペニスを添え、もう一度尋ねる。"
translation = "얼굴을 붉히는 치나의 가랑이에 페니스를 대고, 다시 한번 묻는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当にいいんだな？」"
translation = "「정말로 괜찮은 거지?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「何度も言わせるなよ……好きにしろって言ってんだろ」"
translation = "「몇 번이나 말하게 하지 마…… 마음대로 하라고 했잖아.」"

[[dialogue]]
speaker = "unk"
original = "こんな時でも強気な口調を崩さないチナに、彼女らしさを感じる。"
translation = "이런 때에도 강한 어조를 무너뜨리지 않는 치나에게 그녀다움을 느낀다."

[[dialogue]]
speaker = "unk"
original = "そして亀頭で膣口を押し広げて──"
translation = "그리고 귀두로 질 입구를 밀어 넓히고──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「くうぅ～～～～～っ……！」"
translation = "「크으으으~~~~~~~윽……!」"

[[dialogue]]
speaker = "unk"
original = "小さな体にペニスを力ずくで押し込み、チナの顔が痛みに歪んだ。"
translation = "작은 몸에 페니스를 억지로 밀어 넣자, 치나의 얼굴이 고통으로 일그러졌다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫か？」"
translation = "「괜찮아?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふっ……ふぅ……星騎士なんだから、このくらい平気だっての……はぁ……でもあんたもつらそうな顔してないか……？」"
translation = "「훗…… 후우…… 성기사니까, 이 정도는 아무렇지도 않다고…… 하아…… 근데 너도 괴로운 표정 짓고 있는 거 아니야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、つらいんじゃなくて、チナの中がきつくて気持ちいいんだ」"
translation = "「아니, 괴로운 게 아니라, 치나 안이 꽉 조여서 기분 좋은 거야.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そ、そうか……ならいいんだけど」"
translation = "「그, 그런가…… 그럼 됐는데.」"

[[dialogue]]
speaker = "unk"
original = "チナの体が小さいせいか、膣壁が強くペニスを締めつけてきて、こうして繋がっているだけでも快感が押し寄せる。"
translation = "치나의 몸이 작은 탓인지, 질벽이 강하게 페니스를 조여와서, 이렇게 연결되어 있는 것만으로도 쾌감이 밀려온다."

[[dialogue]]
speaker = "unk"
original = "それにチナの熱い体温や、蜜の濡れた感触、粘膜の柔らかさも相まって、ペニスがさらに怒張していく。"
translation = "게다가 치나의 뜨거운 체온과, 애액에 젖은 감촉, 점막의 부드러움까지 더해져, 페니스가 더욱 팽창해 간다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んんっ……！？\u3000あんたのが、ビクッてして……んっ……アタシの中で大きくなってる……」"
translation = "「응응……!? 네 거가, 움찔하고…… 응…… 내 안에서 커지고 있어……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふぅ……はぁ……そんなに気持ちいいんなら、我慢しなくていいぞ……」"
translation = "「후우…… 하아…… 그렇게 기분 좋다면, 참지 않아도 돼……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ん、はぁ……はあぁ……アタシは大丈夫だから、好きに、動けよ……」"
translation = "「응, 하아…… 하아아…… 나는 괜찮으니까, 마음대로, 움직여……」"

[[dialogue]]
speaker = "unk"
original = "チナの言葉に頷き、様子を窺いながら、腰をゆっくり前後に動かし始める。"
translation = "치나의 말에 고개를 끄덕이고, 눈치를 살피면서, 허리를 천천히 앞뒤로 움직이기 시작한다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「くっ……んっ……はぁ、はぁ……んっ、はっ……はあぁ……」"
translation = "「큭…… 응…… 하아, 하아…… 응, 핫…… 하아아……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふぅ、はぁ……アタシの中で、動いてる……？\u3000はぁ……はっ……熱くて、大きい……これがあんたの、ち○ぽなんだな……」"
translation = "「후우, 하아…… 내 안에서, 움직이고 있어……? 하아…… 핫…… 뜨겁고, 커다래…… 이게 네, 자○이구나……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んんっ……あんたのち○ぽで、アタシの中、広げられて……はっ、あぁ……あんたの形にされてる……」"
translation = "「응응…… 네 자○으로, 내 안, 넓혀지고…… 핫, 아아…… 네 모양이 되고 있어……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「はぁ……ふぅ……はぁっ……これがエッチ……なんだな……はっ……はあぁ……」"
translation = "「하아…… 후우…… 하앗…… 이게 섹스……구나…… 핫…… 하아아……」"

[[dialogue]]
speaker = "unk"
original = "慣らすようにペニスを小さく動かし、互いの性器を摩擦させていく。"
translation = "익숙해지도록 페니스를 작게 움직이며, 서로의 성기를 마찰시킨다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふっ……うっ……はぁ……はぁ……あんたのち○ぽと、アタシのあそこが擦れて……はあぁ……」"
translation = "「훗…… 윽…… 하아…… 하아…… 네 자○이랑, 내 거기가 비벼져서…… 하아아……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んはあぁ……あんたのち○ぽ、熱い……はっ……ふああぁっ……あっ、はっ……んんっ……」"
translation = "「응하아아…… 네 자○, 뜨거워…… 핫…… 후아아앗…… 앗, 핫…… 응응……」"

[[dialogue]]
speaker = "unk"
original = "愛液で濡れた粘膜とペニスが擦れ合う度、甘い快感が走る。"
translation = "애액으로 젖은 점막과 페니스가 마찰할 때마다, 달콤한 쾌감이 달린다."

[[dialogue]]
speaker = "unk"
original = "そしてチナと直接繋がることで感じられる温もりに、言葉にならない感動を覚えた。"
translation = "그리고 치나와 직접 연결됨으로써 느껴지는 따스함에, 말로 표현할 수 없는 감동을 느꼈다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……チナの中も熱いよ……」"
translation = "「크윽…… 치나 안도 뜨거워……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そう、なのか……？\u3000はっ、はぁ……お腹の中で、あんたのを感じて……んぁっ……こんなの、初めて、だ……」"
translation = "「그런, 건가……? 핫, 하아…… 배 속에서, 네 것을 느끼고…… 응앗…… 이런 거, 처음, 이야……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「はぁっ……あっ……あんなおっきいのが、ほんとにアタシの中に、入るんだな……んん……」"
translation = "「하앗…… 앗…… 저렇게 커다란 게, 정말로 내 안에, 들어가는구나…… 응응……」"

[[dialogue]]
speaker = "unk"
original = "ペニスを突き入れると、膣壁に包まれてチナの体温を感じる。"
translation = "페니스를 찔러 넣자, 질벽에 감싸여 치나의 체온을 느낀다."

[[dialogue]]
speaker = "unk"
original = "チナの言う通り初めての感触で、深く繋がった実感があった。"
translation = "치나의 말대로 처음 느껴보는 감촉으로, 깊이 연결되었다는 실감이 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んっ……はぁ……あそこ、変な感じ、する……」"
translation = "「응…… 하아…… 거기, 이상한 느낌, 들어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やっぱり痛い？」"
translation = "「역시 아파?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「痛いっていうよりも……はぁ……ジンジン？\u3000いや、ムズムズするような……」"
translation = "「아프다기보다는…… 하아…… 찌릿찌릿? 아니, 근질근질한 듯한……」"

[[dialogue]]
speaker = "unk"
original = "チナが快感を感じているのかと思い、前後の動きを少し大きくしてみると──"
translation = "치나가 쾌감을 느끼고 있는 건가 싶어, 앞뒤 움직임을 조금 크게 해보자──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んん～～～っ<emoji=heart04>」"
translation = "「응응~~~읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ち○ぽで、中、擦られて……はぁっ、ああっ……なんか、感じる……んんっ<emoji=heart04>\u3000ひぁああっ……あっ……ふやあぁっ<emoji=heart04>」"
translation = "「자○으로, 안, 비벼져서…… 하앗, 아앗…… 뭔가, 느껴져…… 응응읏<emoji=heart04> 히야아앗…… 앗…… 후야아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「これが、気持ちいいって、ことなのか……？\u3000はあぁ……あっ……んっ……んんぅ～～っ<emoji=heart04>」"
translation = "「이게, 기분 좋다는, 건가……? 하아아…… 앗…… 응…… 응응으~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "チナが確かに快感を覚えていることに安堵し、腰を動かすペースを上げながら、ペニスを膣壁に擦り当てていく。"
translation = "치나가 확실히 쾌감을 느끼고 있다는 것에 안도하며, 허리를 움직이는 페이스를 올리면서, 페니스를 질벽에 문지른다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あんたのち○ぽで、アタシの中、擦れてぇ……はぁっ……ふぅっ……んんっ……<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 앗<emoji=heart04> 응응읏<emoji=heart04> 네 자○으로, 내 안, 비벼져서…… 하앗…… 후읏…… 응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「はあぁ……はっ……やっぱり、あんたの、大きい……ひぁっ<emoji=heart04>\u3000あんたのち○ぽで、アタシのお腹、いっぱいになってるっ……」"
translation = "「하아아…… 핫…… 역시, 네 거, 커다래…… 히얏<emoji=heart04> 네 자○으로, 내 배, 가득 차고 있어……」"

[[dialogue]]
speaker = "unk"
original = "ペニスと粘膜が摩擦する度に、チナの体がビクビクと反応し、蜜の量も増していく。"
translation = "페니스와 점막이 마찰할 때마다, 치나의 몸이 움찔움찔 반응하고, 애액의 양도 늘어난다."

[[dialogue]]
speaker = "unk"
original = "そしてチナともっと繋がりたくて、唇を重ねる。"
translation = "그리고 치나와 더 연결되고 싶어서, 입술을 포갠다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んんっ──！？\u3000んっ……んちゅっ……ちゅぅっ……<emoji=heart04>」"
translation = "「응응──!? 응…… 응츕…… 츄읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "チナは目を見開いて驚いていたけど、拒むことなく受け入れてくれた。"
translation = "치나는 눈을 크게 뜨고 놀랐지만, 거부하지 않고 받아들여 주었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ちゅっ……ちゅる……んふっ……<emoji=heart04>\u3000ちゅる、れろ……んっ、んんっ……んれる、れぇろ……ちゅぷちゅるっ……<emoji=heart04>」"
translation = "「츕…… 츄릅…… 응훗……<emoji=heart04> 츄릅, 렐로…… 응, 응응읏…… 응렐, 레에로…… 츕츄릅읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を絡め、互いの唾液を混ぜ合わせると、膣壁もぎゅっと締め付けてくる。"
translation = "혀를 얽고, 서로의 타액을 섞자, 질벽도 꽉 조여온다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ちゅるる……んふっ……ふっ……んんっ<emoji=heart04>\u3000んふぁ……ちゅぷっ、ちゅるっ…れるれろ<emoji=heart04>」"
translation = "「츄르르…… 응훗…… 훗…… 응응읏<emoji=heart04> 응화…… 츕읏, 츄릅읏… 렐르렐로<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んん……ちゅぷちゅるっ……ぷぁっ……<emoji=heart04>\u3000いきなり、キスしてきやがって……んぁっ……ビックリしたっての……はっ、んっ……<emoji=heart04>」"
translation = "「응응…… 츕츄릅읏…… 푸앗……<emoji=heart04> 갑자기, 키스하고 지랄이야…… 응앗…… 깜짝 놀랐다고…… 핫, 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇が離れると、唾液の糸が垂れて落ちた。"
translation = "입술이 떨어지자, 타액의 실이 늘어져 떨어졌다."

[[dialogue]]
speaker = "unk"
original = "口では怒ったように言うものの、興奮を表すように、秘部から蜜が溢れていた。"
translation = "입으로는 화난 듯 말하지만, 흥분을 나타내듯, 은밀한 부위에서 애액이 넘쳐흐르고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「チナのおま○こ、トロトロになってるよ」"
translation = "「치나의 보○, 질척질척해지고 있어」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「～～っ<emoji=heart04>\u3000お、おま○こ言うなっての……んはっ、はぁっ……<emoji=heart04>」"
translation = "「~~~읏<emoji=heart04> 보, 보○이라고 하지 말라고…… 응핫, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中がほぐれてきたのか、動きもスムーズになってきた。これなら激しくしても大丈夫そうだ。"
translation = "안이 풀린 것인지, 움직임도 부드러워졌다. 이 정도라면 격렬하게 해도 괜찮을 것 같다."

[[dialogue]]
speaker = "unk"
original = "それなら──"
translation = "그렇다면──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひぁあああっ！？\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぃああっ<emoji=heart04>\u3000ち○ぽ、ズンズンって、勢いよく……っ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「히야아아앗!? 응앗<emoji=heart04> 앗<emoji=heart04> 히이아앗<emoji=heart04> 자○, 쑥쑥하고, 힘차게……읏<emoji=heart04> 화앗<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひやぁあっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんぁああっ<emoji=heart04>\u3000激し、いっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000深いところまで、来てるっ<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 아앗<emoji=heart04> 응응아아앗<emoji=heart04> 격렬, 해읏<emoji=heart04> 화아아앗<emoji=heart04> 아앗<emoji=heart04> 깊은 곳까지, 오고 있어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んんぁっ──はっ──あっ──ひやぁああっ<emoji=heart04>\u3000おま○こズボズボされてっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おっきなち○ぽで、おま○こ、いっぱいにされてるっ<emoji=heart04>」"
translation = "「응응앗──핫──앗──히야아아앗<emoji=heart04> 보○ 쑤컹쑤컹 당하고읏<emoji=heart04> 히얏<emoji=heart04> 앗<emoji=heart04> 커다란 자○으로, 보○, 가득 채워지고 있어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふぁあっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ぁんっ<emoji=heart04>\u3000お腹、熱いぃっ<emoji=heart04>\u3000ひやぁあっ<emoji=heart04>\u3000ひあっ──あっ──んんあぁああっ<emoji=heart04>」"
translation = "「화앗<emoji=heart04> 아앗<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 배, 뜨거워읏<emoji=heart04> 히야아앗<emoji=heart04> 히앗──앗──응응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最初は挿入を拒むようにきつかった膣内も、すっかりペニスの形に広がっていた。"
translation = "처음에는 삽입을 거부하듯 꽉 조였던 질 안도, 완전히 페니스의 모양으로 넓어져 있었다."

[[dialogue]]
speaker = "unk"
original = "とめどなく溢れる愛液がぐちゅぐちゅと卑猥な音を響かせ、ベッドのシーツに染みを作る。"
translation = "끊임없이 흘러넘치는 애액이 질척질척하고 음란한 소리를 울리며, 침대 시트에 얼룩을 만든다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふああぁっ<emoji=heart04>\u3000ひやぁっ<emoji=heart04>\u3000ぁんっ<emoji=heart04>\u3000ち○ぽ、奥まで、来てっ<emoji=heart04>\u3000ひやっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000おま○こ、ぐちゃぐちゃにされてるっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 히야앗<emoji=heart04> 앙<emoji=heart04> ㅈㅗㅅ, 안쪽까지, 와줘<emoji=heart04> 히얏<emoji=heart04> 아아앗<emoji=heart04> ㅂㅈ, 엉망진창이 되고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んぁ──あ──あ──あぁああっ<emoji=heart04>\u3000んひぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000ち○ぽ、ズン、ズンって来て、気持ちいいっ<emoji=heart04>」"
translation = "「응아──아──아──아아아앗<emoji=heart04> 응히앗<emoji=heart04> 아아앗<emoji=heart04> ㅈㅗㅅ, 쿵, 쿵하고 와서, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を前後に動かしながら、かわいく揺れるおっぱいにまた手を伸ばす。"
translation = "허리를 앞뒤로 움직이면서, 귀엽게 흔들리는 가슴에 다시 손을 뻗는다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひぃんっ！？\u3000何す──んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000乳首、指で、くりくりされて<emoji=heart04>\u3000ひやあぁんっ<emoji=heart04>」"
translation = "「히이잉!? 뭐 하──응응<emoji=heart04> 앗<emoji=heart04> 젖꼭지, 손가락으로, 빙글빙글 만져져서<emoji=heart04> 히야아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "存在を主張するように硬くなった乳首を、きゅっと摘まむ。"
translation = "존재를 주장하듯 단단해진 젖꼭지를, 꽉 집는다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んん～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응~~~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとチナはガクガクと体を震わせ、声にならない喘ぎを上げた。"
translation = "그러자 치나는 덜덜 몸을 떨며, 소리 없는 신음을 질렀다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「おっぱいで、こんな感じたこと、ない……んんっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「가슴으로, 이렇게 느낀 적, 없어…… 응응<emoji=heart04> 후아앗<emoji=heart04> 하아아앗<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んはぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おっぱいとおま○こ、一緒に、されてぇっ<emoji=heart04>\u3000はぁはぁっ<emoji=heart04>\u3000変に、なるぅっ<emoji=heart04>」"
translation = "「응하앗<emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> 가슴이랑 ㅂㅈ, 같이, 당하고<emoji=heart04> 하아하아<emoji=heart04> 이상하게, 될 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を責める度に、ただでさえ狭い膣がさらに収縮し、ペニスをきつく絞った。"
translation = "젖꼭지를 괴롭힐 때마다, 안 그래도 좁은 질이 더욱 수축하며, 페니스를 세게 조였다."

[[dialogue]]
speaker = "unk"
original = "強くなる快感に射精欲が増していくのを感じながら、腰の動きを加速させる。"
translation = "강해지는 쾌감에 사정욕이 더해지는 것을 느끼면서, 허리의 움직임을 가속시킨다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひぁああっ<emoji=heart04>\u3000ふあっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ち○ぽが、奥まで、来てる<emoji=heart04>\u3000おま○こ、熱いぃっ<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 후앗<emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> ㅈㅗㅅ이, 안쪽까지, 오고 있어<emoji=heart04> ㅂㅈ, 뜨거워<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして亀頭が子宮口に届いて──"
translation = "그리고 귀두가 자궁구에 닿고──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふあああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なんだ、これっ……？\u3000ち○ぽが、アタシの奥に……んんんっ<emoji=heart04>\u3000んぁ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ち○ぽが当たる度に、頭、真っ白になるっ<emoji=heart04>」"
translation = "「이게, 뭐야……? ㅈㅗㅅ이, 내 안에…… 응응응<emoji=heart04> 응아<emoji=heart04> 응응<emoji=heart04> ㅈㅗㅅ이 닿을 때마다, 머리가, 새하얘져<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ん～っ<emoji=heart04>\u3000あ、これ、ダメっ<emoji=heart04>\u3000お腹の奥が、きゅってなって<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000なんか、来るっ<emoji=heart04>」"
translation = "「힉<emoji=heart04> 응응<emoji=heart04> 응~<emoji=heart04> 아, 이거, 안 돼<emoji=heart04> 배 안쪽이, 꽉 조여져서<emoji=heart04> 핫<emoji=heart04> 앗<emoji=heart04> 뭔가, 올 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺も、もうイキそうだ……！」"
translation = "「윽…… 나도, 이제 곧 갈 것 같아……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──！\u3000これがイク、ってことなのか……ひぁっ、はあぁっ<emoji=heart04>\u3000アタシ、イキそうなんだな……<emoji=heart04>」"
translation = "「──! 이게 간다는, 건가…… 히얏, 하아앗<emoji=heart04> 나, 갈 것 같구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いいぞ……出して……はあぁっ、あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000アタシの中に、あんたの……出してくれ……ふはぁっ、はっ、ああぁっ<emoji=heart04>」"
translation = "「좋아…… 내보내줘…… 하아앗, 앗<emoji=heart04> 앙<emoji=heart04> 내 안에, 너의…… 내보내줘…… 후하앗, 핫, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ラストスパートをかけ、下半身を打ち付けるように腰を動かす。"
translation = "라스트 스퍼트를 걸며, 하반신을 부딪치듯이 허리를 움직인다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んんぁあっ──あっ──あっ──あぁあああっ<emoji=heart04>\u3000激しっ、いっ<emoji=heart04>\u3000おま○こ、壊れそうっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000ち○ぽ、奥に、何度もぶつかって<emoji=heart04>\u3000ひぁっ、ああぁんっ<emoji=heart04>」"
translation = "「응응아앗──앗──앗──아아아아앗<emoji=heart04> 격렬, 해<emoji=heart04> ㅂㅈ, 부서질 것 같아<emoji=heart04> 후아아앗<emoji=heart04> ㅈㅗㅅ, 안쪽에, 몇 번이고 부딪혀서<emoji=heart04> 히얏, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000お腹の奥、きゅってして、イキそう<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イクぅっ<emoji=heart04>」"
translation = "「홧<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 배 안쪽, 꽉 조여져서, 갈 것 같아<emoji=heart04> 아앗<emoji=heart04> ㅂㅈ 간다<emoji=heart04> 가아<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひぃあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んぁあっ<emoji=heart04>\u3000あ──あ──あ──イッちゃうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「히야앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 아──아──아──가버려<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ひやぁああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히야아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んっ……んんんっ<emoji=heart04>\u3000熱、いっ……<emoji=heart04>\u3000はぁ、はっ……んんっ<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ん～っ<emoji=heart04>」"
translation = "「응…… 응응응<emoji=heart04> 뜨거, 워……<emoji=heart04> 하아, 핫…… 응응<emoji=heart04> 하아<emoji=heart04> 응<emoji=heart04> 응~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ビクビクと体を跳ねさせながら、射精を受け止めるチナ。"
translation = "움찔움찔 몸을 튀기면서, 사정을 받아들이는 치나."

[[dialogue]]
speaker = "unk"
original = "絶頂とともに膣がぎゅうっとしがみつくように締め付けてきて、強い快感に包まれながら射精を続ける。"
translation = "절정과 함께 질이 꽉 매달리듯이 조여와, 강한 쾌감에 휩싸이면서 사정을 계속한다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシの中で、ち○ぽが、ドクドクって……はあぁ<emoji=heart04>\u3000ふはぁ……はぁ……んっ……<emoji=heart04>」"
translation = "「내 안에서, ㅈㅗㅅ이, 두근두근…… 하아<emoji=heart04> 후하아…… 하아…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んんんっ……<emoji=heart04>\u3000熱いの、まだ、出てる……<emoji=heart04>\u3000アタシの中、いっぱいになるぅ……<emoji=heart04>\u3000んっはぁ……<emoji=heart04>」"
translation = "「응응응……<emoji=heart04> 뜨거운 게, 아직, 나오고 있어……<emoji=heart04> 내 안, 가득 차……<emoji=heart04> 응하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「はぁ……はあぁ……はぁ、はぁ……」"
translation = "「하아…… 하아아…… 하아, 하아……」"

[[dialogue]]
speaker = "unk"
original = "ペニスを引き抜くと、膣口から白い精液がドロリと垂れてくる。"
translation = "페니스를 빼내자, 질구에서 하얀 정액이 끈적하게 흘러내린다."

[[dialogue]]
speaker = "unk"
original = "俺とチナが繋がった証だ。"
translation = "나와 치나가 연결되었다는 증거다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「はぁ、はぁ……本当に、最後までしちゃったな……」"
translation = "「하아, 하아…… 정말로, 끝까지 해버렸네……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシは、デネブを守るためなら死んでもいいと思ってた。……いや、今でもそう思ってる」"
translation = "「나는, 데네브를 지키기 위해서라면 죽어도 좋다고 생각했어. ……아니, 지금도 그렇게 생각해」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だから誰かとエッチすることなんかないと思ってたけど……よりにもよって、あんたとすることになるとはな……」"
translation = "「그래서 누구와도 섹스할 일은 없을 거라고 생각했는데…… 하필이면, 너와 하게 될 줄이야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「後悔してる？」"
translation = "「후회하고 있어?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……いいや。してないよ」"
translation = "「……아니. 안 해」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「もしデネブとアルタイルに別れても……あんたのこと、忘れないから」"
translation = "「만약 데네브와 알타이르가 갈라져도…… 너를, 잊지 않을 테니까」"

[[dialogue]]
speaker = "unk"
original = "そう言って寂しそうに笑むチナ。"
translation = "그렇게 말하며 쓸쓸하게 웃는 치나."

[[dialogue]]
speaker = "unk"
original = "チナがデネブに帰ったとしても、いつか必ず会いに行こうと、心の中で決めたのだった。"
translation = "치나가 데네브로 돌아간다고 해도, 언젠가 반드시 만나러 가겠다고, 마음속으로 결정한 것이었다."

