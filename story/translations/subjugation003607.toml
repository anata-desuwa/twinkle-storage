[[dialogue]]
speaker = "フワッチ"
original = "「イ～～ッ」"
translation = "「이~~잇.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あいつらね……」"
translation = "「저 녀석들이네……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「では張り切っていこうじゃないか──ジュエルローズ！」"
translation = "「그럼 힘차게 가볼까── 쥬얼 로즈!」"

[[dialogue]]
speaker = "unk"
original = "繰り出された攻撃がヒットし、モンスターを消滅させる。"
translation = "내지른 공격이 적중하여 몬스터를 소멸시킨다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ。エクリプスフォームも良いが、こちらも気に入ったよ」"
translation = "「흠. 에클립스 폼도 좋지만 이쪽도 마음에 드는군.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「さあ、イレーナさんも試してみるといい」"
translation = "「자, 이레이나 양도 시험해 보게나.」"

[[dialogue]]
speaker = "イレーナ"
original = "「どうしてそんな恥ずかしい格好でそんな堂々と戦えるわけ？\u3000信じられないんだけど……」"
translation = "「어째서 그런 부끄러운 차림으로 그렇게 당당하게 싸울 수 있는 거야? 믿기지가 않는데……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「愚問だね。助手とウェディングドレスで並んで戦うことが出来る。これほど誇らしいことがあるだろうか」"
translation = "「우문이군. 조수와 웨딩드레스로 나란히 서서 싸울 수 있다니, 이 얼마나 자랑스러운 일인가.」"

[[dialogue]]
speaker = "イレーナ"
original = "「そういやあんた、普段から愛しの助手だの何だの恥ずかしげもなく言ってたわね……」"
translation = "「그러고 보니 너, 평소에도 사랑스러운 조수니 뭐니 부끄러운 줄도 모르고 말했었지……」"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～！」"
translation = "「이~~!」"

[[dialogue]]
speaker = "unk"
original = "イレーナ！\u3000そっちに行った！"
translation = "이레이나! 그쪽으로 갔어!"

[[dialogue]]
speaker = "イレーナ"
original = "「分かってるわよ！\u3000ディアマンテ・レガーメ！」"
translation = "「알고 있어! 디아만테 레가메!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「文句を言いながらも、ちゃんと使いこなしているじゃないか」"
translation = "「투덜대면서도 제대로 다루고 있지 않나.」"

[[dialogue]]
speaker = "イレーナ"
original = "「誰かに見られる前にさっさと片付けたいだけよ」"
translation = "「누가 보기 전에 얼른 해치우고 싶을 뿐이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ、私も負けていられないね。……そこだ！」"
translation = "「후후, 나도 지고 있을 수는 없지. ……거기다!」"

[[dialogue]]
speaker = "unk"
original = "イレーナに負けじとモンスターに攻撃するジュエリー。"
translation = "이레이나에게 지지 않으려 몬스터를 공격하는 주얼리."

[[dialogue]]
speaker = "unk"
original = "しかし慣れないウェディングフォームのせいか、モンスターを仕留めそこなってしまった。"
translation = "하지만 익숙지 않은 웨딩 폼 탓인지 몬스터를 마무리 짓지 못하고 말았다."

[[dialogue]]
speaker = "イレーナ"
original = "「ああもうっ！\u3000ちょっと浮かれ過ぎっ！」"
translation = "「아 정말! 너무 들떴다구!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「すまない、助かったよ」"
translation = "「미안하네, 살았어.」"

[[dialogue]]
speaker = "unk"
original = "イレーナがジュエリーを攻撃からかばう。"
translation = "이레이나가 주얼리를 공격으로부터 감싼다."

[[dialogue]]
speaker = "unk"
original = "その隙に今度こそ、ジュエリーは全ての敵をなぎ倒したのだった。"
translation = "그 틈을 타 이번에야말로 주얼리는 모든 적을 휩쓸어버렸다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふぅ……どうにか片付いたようだね」"
translation = "「후우…… 어떻게든 정리된 모양이군.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ええ。それじゃ、人が集まってくる前にあたしたちは退散しましょ」"
translation = "「그래. 그럼 사람들이 모이기 전에 우리는 퇴각하자.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「どうしてだい？\u3000せっかくだからウェディングフォームを皆にお披露目していけばいいのに」"
translation = "「어째서인가? 기왕이면 웨딩 폼을 모두에게 보여주고 가면 좋을 텐데.」"

[[dialogue]]
speaker = "イレーナ"
original = "「絶対に嫌よ。こんな格好、出来れば誰にも見られたくないわ。フォームが解除出来たらそのままお蔵入りにしてやるんだから」"
translation = "「절대로 싫어. 이런 모습, 가능하다면 누구에게도 보이고 싶지 않아. 폼이 해제되면 그대로 영원히 봉인해버릴 거니까.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それはもったいない。白いドレスを翻して舞うように戦うキミの姿は、まさに聖女そのものだった。市井の人々もその姿を見たいと思うのだけど」"
translation = "「그건 아깝군. 하얀 드레스를 휘날리며 춤추듯 싸우는 자네의 모습은 그야말로 성녀 그 자체였어. 마을 사람들도 그 모습을 보고 싶어 할 텐데.」"

[[dialogue]]
speaker = "イレーナ"
original = "「だとしたら、ますます誰にも見せたくないわ」"
translation = "「그렇다면 더더욱 누구에게도 보여주기 싫어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おや、何故だい？」"
translation = "「오야, 어째서지?」"

[[dialogue]]
speaker = "イレーナ"
original = "「……そもそもあたしが聖女とか言われて崇められること自体が間違っているのよ」"
translation = "「……애초에 내가 성녀니 뭐니 불리며 숭배받는 것 자체가 잘못된 거야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしは別に熱心に女神さまを信じているわけでもないし、みんなが思っているような慈しみの心なんて持ち合わせていない」"
translation = "「나는 딱히 열성적으로 여신님을 믿는 것도 아니고, 사람들이 생각하는 것 같은 자비로운 마음 같은 건 가지고 있지 않아.」"

[[dialogue]]
speaker = "イレーナ"
original = "「本当のあたしを見たあんたなら分かるでしょ？\u3000こんなあたしが聖女なんておこがましいにも程があるわ」"
translation = "「진짜 나를 본 너라면 알 거 아냐? 이런 내가 성녀라니 가당치도 않다구.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イレーナ"
original = "「このウェディングフォームだって同じよ。あたしに花嫁なんて相応しくない」"
translation = "「이 웨딩 폼도 마찬가지야. 나한테 신부 같은 건 어울리지 않아.」"

[[dialogue]]
speaker = "イレーナ"
original = "「聖女の仮面を被っている時ならいざ知らず、本当のあたしを花嫁に欲しがる物好きなんてどこにもいないんだから」"
translation = "「성녀의 가면을 쓰고 있을 때라면 몰라도 진짜 나를 신부로 원하는 괴짜 같은 건 어디에도 없을 테니까.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「イレーナさん……どうやらキミは勘違いをしているようだね」"
translation = "「이레이나 양…… 아무래도 자네는 착각을 하고 있는 모양이군.」"

[[dialogue]]
speaker = "イレーナ"
original = "「勘違い？」"
translation = "「착각?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミは自分のことをエセ聖女だと思っているようだけど……違うね、キミは本物の聖女だ」"
translation = "「자네는 자신을 가짜 성녀라고 생각하는 모양이지만…… 아니야, 자네는 진짜 성녀야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「それもお得意の推理？」"
translation = "「그것도 특기인 추리야?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いいや。推理するまでもない、私は知っているからね」"
translation = "「아니. 추리할 것도 없지, 나는 알고 있으니까.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あれは私がイタリアで事件を解決した後の出来事、珍しく出現したモンスターに襲われてしまった時のことだ」"
translation = "「그건 내가 이탈리아에서 사건을 해결한 뒤의 일, 드물게 출현한 몬스터에게 습격당했을 때의 일이라네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「当時の私はまだ戦闘経験も少なく、モンスターに追い込まれてしまった」"
translation = "「당시의 나는 아직 전투 경험도 적어 몬스터에게 몰리고 말았지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「手傷を負い、袋小路に追い詰められ……朦朧とした意識の中、最後の瞬間を覚悟した──その時だった」"
translation = "「부상을 입고 막다른 골목에 몰려…… 몽롱한 의식 속에서 마지막 순간을 각오했을── 그때였어.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ああもう！\u3000しっかりしなさい！！」"
translation = "「아 정말! 정신 차리라구!!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「叱咤の声と共に、私を助けてくれた人がいた」"
translation = "「질타하는 목소리와 함께, 나를 구해준 사람이 있었지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「本当はお礼を言いたかったのだけど、残念なことに私を助けてくれたその声の主が誰なのかは分からなかった。途中で意識を失ってしまったからね」"
translation = "「사실은 감사를 표하고 싶었지만, 안타깝게도 나를 구해준 그 목소리의 주인공이 누구인지는 알 수 없었어. 도중에 의식을 잃어버렸으니까 말이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「しかし本当のキミを見て理解した。あの時、私を助けてくれたのはキミだったんだね、イレーナさん」"
translation = "「하지만 진짜 자네를 보고 이해했네. 그때 나를 구해준 건 자네였군그래, 이레이나 양.」"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イレーナ"
original = "「そんなこと、あったような……なかったような……ごめん、あんまり覚えてないんだけど」"
translation = "「그런 일이, 있었던 것 같기도 하고…… 없었던 것 같기도 하고…… 미안, 별로 기억이 안 나는데.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「うん、そうだろうと思ったよ。だけどね、私はそこにキミの本質があると思っているんだ」"
translation = "「응, 그럴 거라고 생각했어. 하지만 말이야, 나는 거기에 자네의 본질이 있다고 생각하고 있네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あの時、キミはモンスターの群れの中に飛び込み、果敢に戦って私を助けてくれた」"
translation = "「그때 자네는 몬스터 무리 속으로 뛰어들어, 과감하게 싸워서 나를 구해 주었지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あれはキミにとって当然の行動だった。特別なことではなかった」"
translation = "「그건 자네에게 있어 당연한 행동이었어. 특별한 일이 아니었지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミは見返りを求めることなく、苦しむ者に救いの手を差し伸べることが出来る。時に我が身の危険も顧みず誰かを守ることが出来る」"
translation = "「자네는 대가를 바라지 않고, 고통받는 자에게 구원의 손길을 내밀 수 있어. 때로는 자신의 위험도 돌보지 않고 누군가를 지킬 수 있지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その優しさは聖女の仮面をかぶっている時も、本当の自分をさらけ出している時も変わらない」"
translation = "「그 상냥함은 성녀의 가면을 쓰고 있을 때도, 진짜 자신을 드러내고 있을 때도 변하지 않아.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「明解に換言するならば──キミはまごうこと無き聖女だ」"
translation = "「명쾌하게 환언하자면── 자네는 틀림없는 성녀라네.」"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それに思い出してみてくれ\u3000キミの素顔を知って、離れて行った者が１人でもいるかい？」"
translation = "「그리고 떠올려 보게. 자네의 맨얼굴을 알고서 떠나간 자가 단 한 명이라도 있나?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "イレーナ"
original = "（シャロン……）"
translation = "（샤론……）"

[[dialogue]]
speaker = "イレーナ"
original = "（ウルスラ……）"
translation = "（우르술라……）"

[[dialogue]]
speaker = "イレーナ"
original = "（いやこいつは記憶から消しておきたい……なかったことにしましょ）"
translation = "（아니 이 녀석은 기억에서 지워두고 싶어…… 없었던 일로 하자구）"

[[dialogue]]
speaker = "イレーナ"
original = "（会長も……この子も……）"
translation = "（회장님도…… 이 아이도……）"

[[dialogue]]
speaker = "ジュエリー"
original = "「私の推理によるとそんな人はいない、と思うのだが……どうかな、助手？」"
translation = "「내 추리에 따르면 그런 사람은 없다고 생각하는데…… 어떤가, 조수?」"

[[dialogue]]
speaker = "unk"
original = "名推理だよ、ジュエリー"
translation = "명추리야, 주얼리."

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ…………何よ、もう……」"
translation = "「하아………… 뭐야, 정말……」"

[[dialogue]]
speaker = "イレーナ"
original = "「結局、あたしが１人で空回ってただけってことじゃない……」"
translation = "「결국, 나 혼자 헛돌고 있었을 뿐이라는 거잖아……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ。そういうことだよ、イレーナさん」"
translation = "「후후. 그런 법이라네, 이레이나 양.」"

[[dialogue]]
speaker = "イレーナ"
original = "「そうね……あたしは聖女だっていばるつもりはないけど……もう少し、本当の自分に自信を持ってみようかしら」"
translation = "「그래…… 내가 성녀라고 뽐낼 생각은 없지만…… 조금 더 진짜 내 모습에 자신을 가져 볼까나.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「うん、それでいいと思うよ」"
translation = "「응, 그러면 된다고 생각하네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そうだ。仲良くなった記念に、私のことは『ジュエリー』と呼び捨てにしてほしい」"
translation = "「그렇지. 친해진 기념으로, 나를 부를 때는 『주얼리』라고 이름을 편하게 불러줬으면 좋겠어.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ええ、そうさせてもらうわ。あたしも『イレーナ』でいいわよ」"
translation = "「그래, 그렇게 하도록 할게. 나도 『이레이나』라고 불러도 돼.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おっと、そういうわけにもいかないよ」"
translation = "「앗, 그건 곤란하다네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私は流星学園の１年生、イレーナさんは２年生だ。年長者は敬わないとね」"
translation = "「나는 유성학원 1학년, 이레이나 양은 2학년이지. 연장자는 공경해야지.」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーってそういうの気にするの！？"
translation = "주얼리가 그런 걸 신경 써!?"

[[dialogue]]
speaker = "ジュエリー"
original = "「失敬だな、我が助手。私は敬語が苦手なだけだ」"
translation = "「실례로군, 나의 조수여. 나는 경어가 서툴 뿐이라네.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ま、気持ちはわかるわ。敬語って肩凝るわよね」"
translation = "「뭐, 기분은 이해해. 경어는 어깨가 결리니까 말이야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「だから今後は、プライベートの時は遠慮なく言いたいこと言わせてもらうわ。いいわよね、<b>ジュエリー</b>？」"
translation = "「그러니까 앞으로 사적인 자리에서는 사양 않고 하고 싶은 말 다 하겠어. 괜찮지, <b>주얼리</b>?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、よろしく、イレーナさん」"
translation = "「아아, 잘 부탁하네, 이레이나 양.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「──さて、とても今更になってしまったが、改めてお礼を言わせてほしい」"
translation = "「──자, 아주 때늦은 감이 있지만, 다시 한번 감사를 표하고 싶군.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「では今度こそちゃんと伝えておかなくてはね」"
translation = "「그럼 이번에야말로 제대로 전해두어야겠지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あの時は危ないところを助けてくれてありがとう、イレーナさん」"
translation = "「그때는 위험한 상황에서 구해줘서 고마워, 이레이나 양.」"

[[dialogue]]
speaker = "イレーナ"
original = "「……どういたしまして。今度は手間かけさせないでよね」"
translation = "「……별말씀을. 다음부턴 수고 끼치지 말라구.」"

