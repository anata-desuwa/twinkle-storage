[[dialogue]]
speaker = "unk"
original = "第４話,レイラと海の思い出,P"
translation = "제4화, 레이라와 바다의 추억"

[[dialogue]]
speaker = "unk"
original = "俺とレイラはとあるビーチに来ていた。"
translation = "나와 레이라는 어느 해변에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "人の手を離れて久しいのか、ゴミが散乱し、宿泊施設らしき建物もひどく傷んでいた。"
translation = "사람의 손길이 닿지 않은 지 오래인지 쓰레기가 흩어져 있고 숙박 시설 같은 건물도 심하게 훼손되어 있었다."

[[dialogue]]
speaker = "unk"
original = "それでも、レイラは目を細めて呟いた。"
translation = "그래도 레이라는 눈을 가늘게 뜨며 중얼거렸다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「懐かしい……」"
translation = "「그리워……」"

[[dialogue]]
speaker = "unk"
original = "何故、俺たちがここにいるのかというと……"
translation = "왜 우리가 여기에 있느냐면……"

[[dialogue]]
speaker = "unk"
original = "俺とレイラはヘレナちゃんの呼び出しを受け、九浄家を訪れた。"
translation = "나와 레이라는 헬레나짱의 부름을 받고 쿠죠 가를 방문했다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「失礼いたします」"
translation = "「실례하겠습니다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「立てばプリティ、座ればゴージャス、ヘレナちゃんである。よく来てくれた、ふたりとも」"
translation = "「서면 프리티, 앉으면 고저스, 헬레나님이다. 잘 왔군, 둘 다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ご無沙汰しております、ヘレナ様」"
translation = "「오랜만에 뵙습니다, 헬레나 님」"

[[dialogue]]
speaker = "unk"
original = "落ち着いた様子でレイラが頭を下げた。こうしていると、良家の令嬢なんだと思い出す。"
translation = "차분한 모습으로 레이라가 고개를 숙였다. 이러고 있으면 좋은 가문의 영애라는 사실이 떠오른다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。此度の用向きだが、九浄家で海水浴場跡を買い取ってな。その様子を見てきてもらいたい。ここだ」"
translation = "「음. 이번 용건인데, 쿠죠 가에서 해수욕장 터를 매입해서 말이지. 그 상태를 좀 보고 왔으면 한다. 여기다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ここは……かつて、百目騎の保養所だったところですね」"
translation = "「여기는…… 과거에 도우메키의 요양소였던 곳이네요」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ああ、その通りだ。売りに出されて数年が経ち、だいぶ荒廃しているようでな。再開発の前にかつての姿を知る者に様子を見てきてほしい。魔王はその付き添いだ」"
translation = "「그래, 맞다. 매물로 나온 지 몇 년이 지나 꽤 황폐해진 것 같더군. 재개발 전에 예전 모습을 아는 사람이 상태를 보고 왔으면 해서 말이야. 마왕은 그 동행이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「もちろん報酬ははずもう。どうだ、頼まれてくれるか？」"
translation = "「물론 보수는 두둑이 주지. 어떤가, 맡아주겠나?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……はい、承りました」"
translation = "「……네, 알겠습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「子どもの頃は毎年、お父様お母様と来ていたんです。会社の保養所でしたから、働いている人のお子さんもいて、みんなで花火したり、スイカ割りしたり……」"
translation = "「어릴 때는 매년 아버님, 어머님과 왔었어요. 회사의 요양소였으니까 일하는 분들의 아이들도 있어서 다 같이 불꽃놀이도 하고 수박 깨기도 하고……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お父様が塩釜でチキンをまるごと一羽、焼いたことがあったんです。すごく塩辛くて、お母様に食べるのを止められて、悔しかったのを覚えています」"
translation = "「아버님이 소금 가마에 치킨을 통째로 한 마리 구웠던 적이 있었어요. 너무 짜서 어머님이 먹는 걸 말리셔서 억울했던 기억이 나요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私が沖に流された時なんか、お母様が飛んで助けてくれました。母は星騎士でしたから、私の小さい時にはまだほんの少しだけ星力が残っていたんです」"
translation = "「제가 먼바다까지 떠내려갔을 때는 어머님이 날아와서 구해주셨어요. 어머니는 성기사였으니까 제가 어릴 때는 아직 아주 조금 성력이 남아 있었거든요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「母が飛ぶのを見たのはその時が最初で最後ですね。でも、かっこよかったな……」"
translation = "「어머니가 나는 걸 본 건 그때가 처음이자 마지막이네요. 하지만 멋있었지……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ここに来ると、いろんなことを思い出しますね。変わってしまう前に、面影があるうちに来れてよかった。ヘレナ様のお気遣いですね」"
translation = "「여기에 오면 여러 가지 일이 떠오르네요. 변해버리기 전에, 흔적이 있을 때 올 수 있어서 다행이에요. 헬레나 님의 배려네요」"

[[dialogue]]
speaker = "unk"
original = "綺麗にしてくるよ"
translation = "깨끗하게 하고 오자"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え？\u3000ヘレナ様から依頼されたのは現状確認だけですし、魔王さんがそんなことしなくていいんですよ？」"
translation = "「에? 헬레나 님께 의뢰받은 건 현황 확인뿐이고, 마왕님이 그런 일 안 하셔도 되는데요?」"

[[dialogue]]
speaker = "unk"
original = "俺もレイラと思い出を作りたい"
translation = "나도 레이라와 추억을 만들고 싶어"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「もう、ずるいです。あなたは本当に、私の欲しい言葉をくれるんですから……もっと大好きになっちゃいます」"
translation = "「정말, 치사해요. 당신은 정말로 제가 원하는 말을 해주니까…… 더 좋아하게 되어버리잖아요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「思い出、たくさん作りましょうね」"
translation = "「추억, 잔뜩 만들어요」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、浜辺を掃除して回った。"
translation = "그러고 나서 우리는 해변을 청소하며 돌아다녔다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ラスターグリルシュート！」"
translation = "「러스터 그릴 슛!」"

[[dialogue]]
speaker = "unk"
original = "ゴミはレイラがブラックホールで消し飛ばしてくれるので意外と早く終わった。"
translation = "쓰레기는 레이라가 블랙홀로 날려버려 줘서 의외로 빨리 끝났다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あははうふふ～ここまでおいで～」"
translation = "「아하하 우후후~ 여기까지 와보시지~」"

[[dialogue]]
speaker = "unk"
original = "ま、待て～"
translation = "기, 기다려~"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「カップルって海に来ると追いかけっこするイメージでしたけど、実際にやってみると意味分かんないですね」"
translation = "「커플은 바다에 오면 쫓고 쫓기기를 하는 이미지였지만 실제로 해보니 의미를 모르겠네요」"

[[dialogue]]
speaker = "unk"
original = "急に落ち着かないで"
translation = "갑자기 진지해지지 마"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「では次はお互いに水をかけ合いましょう。位置について……よーい、ドン！」"
translation = "「그럼 다음은 서로에게 물을 뿌려봐요. 제자리에…… 준비, 땅!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あははは！\u3000やっぱり意味わかんないですねこれ！」"
translation = "「아하하하! 역시 의미 모르겠네요 이거!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ、お腹の音が……お恥ずかしい。遊んだら、お腹空いてきましたね……近くに食べるところあるといいんですけど」"
translation = "「아, 배꼽시계가…… 부끄러워라. 노니까 배가 고파졌네요…… 근처에 먹을 곳이 있으면 좋겠는데」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……そんなこともあろうかと、バーベキューセットをご用意？\u3000さすが魔王さん、私に理解ある彼氏すぎます。さすまおです」"
translation = "「……그럴 줄 알고 바비큐 세트를 준비? 역시 마왕님, 저를 너무 잘 아는 남자친구예요. 사스마오(역시 마왕님)입니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「では、焼きましょう。お肉を！」"
translation = "「그럼 구워보죠. 고기를!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふぅ、満足。ご馳走さまでした」"
translation = "「후우, 만족. 잘 먹었습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「『潮風に\u3000箸が止まらぬ\u3000バーベキュー』──レイラ、心の一句」"
translation = "「『바닷바람에 젓가락이 멈추지 않는 바비큐』── 레이라, 마음의 한 구절」"

[[dialogue]]
speaker = "unk"
original = "俳句の出来はともかく、喜んでくれたようだ。レイラのひゅごひゅごに負けないよう肉を焼いた甲斐がある。"
translation = "하이쿠의 솜씨는 어쨌든 기뻐해 준 모양이다. 레이라의 먹성에 지지 않게 고기를 구운 보람이 있다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私ばっかり食べててごめんなさい。今度、私もご馳走しますね。魔獣を焼くのは得意なんです」"
translation = "「저만 잔뜩 먹어서 죄송해요. 다음에 저도 대접할게요. 마수를 굽는 건 자신 있거든요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「コラプサーのみんなと魔界にいた頃は、いろんな魔獣を狩って食べていました。私が戦うと可食部がなくなるので、もっぱら火の番と焼く係をしていたんです」"
translation = "「콜랩서 동료들과 마계에 있던 시절에는 여러 마수를 사냥해서 먹었어요. 제가 싸우면 먹을 수 있는 부위가 없어지니까 주로 불 관리와 굽는 담당을 했었거든요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔界つくしや魔界タンポポも食べたことありますよ。見た目は怖いけど、味は美味しかったです」"
translation = "「마계 냉이나 마계 민들레도 먹어본 적 있어요. 겉모습은 무섭지만 맛은 있었답니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふふっ、なんだか不思議ですね。両親といた頃の私は、世間知らずのお嬢様でしたけど、今は６本足の魔獣の味も知っているんですから」"
translation = "「후후, 왠지 신기하네요. 부모님과 있을 때의 저는 세상 물정 모르는 아가씨였는데, 지금은 다리 6개 달린 마수의 맛도 알고 있으니까요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「両親が亡くなって、星騎士にもなれなくて……私は全てを諦めました」"
translation = "「부모님이 돌아가시고 성기사도 될 수 없어서…… 저는 모든 걸 포기했었어요」"

[[dialogue]]
speaker = "unk"
original = "レイラの視線が海岸線を走る。何を思い出しているのかは、俺には分からない。"
translation = "레이라의 시선이 해안선을 따라 달린다. 무엇을 떠올리고 있는지는 나는 알 수 없다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「でも死に損なって、あの人に出会いました。魔法で吊り上げられて、星空が足元に広がっていたのをよく覚えています」"
translation = "「하지만 죽지 못해 그분을 만났죠. 마법으로 매달려 밤하늘이 발밑에 펼쳐져 있던 걸 잘 기억하고 있어요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それから、あの人に導かれて、コラプサーのみんなに出会って……あなたと敵として対峙しました」"
translation = "「그리고 그분의 인도로 콜랩서 동료들을 만나고…… 당신과 적으로 대치했죠」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「今はそのあなたと星空を見上げている。この星空を、私はずっと忘れないと思います」"
translation = "「지금은 그 당신과 밤하늘을 올려다보고 있어요. 이 밤하늘을 저는 영원히 잊지 못할 것 같아요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さん。どうか、これからも、私と一緒にいてくれますか？」"
translation = "「마왕님. 부디 앞으로도 저와 함께해주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "この星空に誓うよ"
translation = "이 밤하늘에 맹세할게"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はい。私もあなたへの想いをこの星空に誓います」"
translation = "「네. 저도 당신을 향한 마음을 이 밤하늘에 맹세해요」"

[[dialogue]]
speaker = "unk"
original = "レイラの顔が近付く。"
translation = "레이라의 얼굴이 가까워진다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ちゅっ」"
translation = "「쪽」"

[[dialogue]]
speaker = "unk"
original = "ほんのりバーべキュー味のキスをした。"
translation = "어렴풋이 바비큐 맛이 나는 키스를 했다."

