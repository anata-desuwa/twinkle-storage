[[dialogue]]
speaker = "unk"
original = "第３話,後輩とからかいスキンシップ,P"
translation = "제3화, 후배와 장난스러운 스킨십, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。リーリアが俺の家に遊びに来ていたのだが――"
translation = "어느 휴일. 리리아가 우리 집에 놀러 와 있었는데――"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、今日はですね～、マジカルチェ～ンジ☆」"
translation = "「선배, 오늘은요~, 매지컬 체~인지☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「このアルカンシェルフォームの力を更に強化する為に、絆を高めるイチャイチャをしたいと思います☆」"
translation = "「이 아르캉시엘 폼의 힘을 더욱 강화하기 위해, 유대감을 높이는 꽁냥꽁냥을 하고 싶어요☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「――具体的にどんなことをするのか、ですか？」"
translation = "「――구체적으로 어떤 걸 하냐고요?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「そりゃあセンパイ、手を繋いだりとか、ハグとか、キスとか～<emoji=heart04>」"
translation = "「그야 선배, 손을 잡거나, 허그라든가, 키스라든가~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつも通りじゃない？"
translation = "평소랑 똑같지 않아?"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ちっちっち♪\u3000今日は一味違いますよ～？」"
translation = "「쯧쯧쯧♪ 오늘은 한 끗 다릅니다요~?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「今日はズバリ、『からかいモード』のままスキンシップをします！」"
translation = "「오늘은 바로, 『장난 모드』인 채로 스킨십을 하겠습니다!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「つまりは、私が普段の時以上にセンパイのことを煽りながら、イチャイチャしちゃう感じですね☆」"
translation = "「즉, 제가 평소 이상으로 선배를 놀리면서 꽁냥꽁냥해 버리는 느낌이죠☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「それでは、早速始めちゃいましょう！\u3000レッツマジカル☆」"
translation = "「그러면, 바로 시작해 버리죠! 렛츠 매지컬☆」"

[[dialogue]]
speaker = "unk"
original = "俺の隣、ソファーに座ったリーリアは、肩をくっ付けて来ながら言う。"
translation = "내 옆, 소파에 앉은 리리아는 어깨를 밀착해 오며 말한다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ふふっ、センパ～イ、今日は私がどんなに可愛くても、勝手にスキンシップをしちゃったら負けですよ～？」"
translation = "「후후, 선~배, 오늘은 제가 아무리 귀여워도 마음대로 스킨십을 해 버리면 지는 거예요~?」"

[[dialogue]]
speaker = "unk"
original = "さっきは『する』って言ってたのに？"
translation = "아까는 『한다』고 했으면서?"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ダメで～す、そんな簡単に許可はしてあげませ～ん☆」"
translation = "「안 돼~요, 그렇게 간단히 허락해 주지 않을 거예~요☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「私が今から段階的にスキンシップをして行くので、それより先はお預けです♪」"
translation = "「제가 지금부터 단계적으로 스킨십을 해 나갈 테니까, 그 이상은 금지예요♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「まずは、手から行きます☆\u3000こうして、センパイの手の上から、私の可愛い手を重ねて～<emoji=heart04>」"
translation = "「우선은 손부터 갑니다☆ 이렇게, 선배의 손 위로 제 귀여운 손을 겹쳐서~<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ほら、やわやわと触ったり、スリスリしちゃいますよ～？\u3000ふふっ、すりすり……<emoji=heart04>」"
translation = "「봐요, 보들보들 만지거나, 부비부비해 버릴 거예요~? 후후, 부비부비……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは俺の耳元に唇を寄せ、息を吹きかけるように囁いて来る。"
translation = "리리아는 내 귓가에 입술을 가까이 대고, 숨결을 불어넣듯 속삭여 온다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「次に、ここから１本１本指を絡めて～、恋人繋ぎにしてっちゃいますね～<emoji=heart04>」"
translation = "「다음으로, 여기서 손가락을 하나하나 얽어서~ 연인끼리 손잡기로 넘어가 볼게요~<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「じっくりと感触を確かめるように～……指と指の間にそ～っと<emoji=heart04>\u3000ぴとっってくっ付けて……<emoji=heart04>\u3000ふふっ、どうですか～？」"
translation = "「천천히 감촉을 확인하듯이~…… 손가락 사이에 살며~시<emoji=heart04> 착 하고 붙여서……<emoji=heart04> 후후, 어때요~?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「付き合い始めてからはちょっと慣れちゃった気がしてましたけど、こうしてゆっくり手を繋ぐと、違う感じがしませんか？」"
translation = "「사귀기 시작한 뒤로는 좀 익숙해진 기분이 들었지만, 이렇게 천천히 손을 잡으니까 느낌이 다르지 않나요?」"

[[dialogue]]
speaker = "unk"
original = "そうして片手を恋人繋ぎにした後、もう片方の手が俺の頬へと伸ばされ、そっと触れる。"
translation = "그렇게 한쪽 손을 깍지 낀 뒤, 다른 한쪽 손이 내 뺨으로 뻗어와 살며시 닿는다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「センパイ<emoji=heart04>\u3000次はお顔を撫でちゃいますね<emoji=heart04>」"
translation = "「선배<emoji=heart04> 다음은 얼굴을 쓰다듬어 드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ほ～ら、すりすり～<emoji=heart04>\u3000そこから、指の腹で優し～く、さわさわしちゃいますよ～<emoji=heart04>\u3000こしょこしょ<emoji=heart04>」"
translation = "「자~아, 부비부비~<emoji=heart04> 거기서부터 손가락 끝으로 부드~럽게, 살랑살랑 만져 버릴 거예요~<emoji=heart04> 간질간질<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「首筋からうなじの辺りとか、どうですか～？\u3000ふふっ、今ちょっとピクッと反応しましたね<emoji=heart04>\u3000センパイ、感じちゃったんですか～？」"
translation = "「목덜미에서 뒷목 근처라든가, 어떠세요~? 후훗, 방금 살짝 움찔하고 반응했네요<emoji=heart04> 선배, 느껴버린 건가요~?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「他に感じそうなところは～、耳たぶの裏とかですかね？\u3000ひと差し指で付け根をなぞるように～……あはっ<emoji=heart04>」"
translation = "「그 외에 느낄 것 같은 곳은~, 귓볼 뒤쪽일까요? 검지 손가락으로 뿌리 부분을 덧그리듯이~…… 아핫<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「なんですか、センパイ？\u3000呼吸が荒くなってますよ～？」"
translation = "「왜 그러세요, 선배? 호흡이 거칠어지고 있어요~?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、リーリアはひと差し指を俺の唇へと持って来て、撫でる。"
translation = "그렇게 말하며, 리리아는 검지 손가락을 내 입술로 가져와 문지른다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「いつもセンパイのこの唇が、私の唇にキスして、可愛がって、気持ち良くしてくれてるんですよね～<emoji=heart04>」"
translation = "「항상 선배의 이 입술이, 제 입술에 키스하고, 예뻐해 주고, 기분 좋게 해주는 거죠~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアはそのひと差し指を自分の唇へと持って行って、わざとらしく悪戯な笑みを浮かべる。"
translation = "리리아는 그 검지 손가락을 자신의 입술로 가져가, 짐짓 장난스러운 미소를 짓는다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ん……<emoji=heart04>\u3000ふふっ、間接キスしちゃいました<emoji=heart04>」"
translation = "「음……<emoji=heart04> 후훗, 간접 키스 해버렸네요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「――さて、じゃあ次は～、えいっ☆」"
translation = "「――자, 그럼 다음은~, 에잇☆」"

[[dialogue]]
speaker = "unk"
original = "リーリアは俺と正面から向き合う形で、膝の上に座る。"
translation = "리리아는 나와 정면으로 마주 보는 형태로 무릎 위에 앉는다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ハグして、全身密着しちゃいますね<emoji=heart04>\u3000それっ<emoji=heart04>」"
translation = "「허그해서, 전신을 밀착해 버릴게요<emoji=heart04> 자앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「センパイに、ぎゅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「선배에게, 꼬~~옥<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛い後輩彼女の柔らかい体の感触と、温かな体温、それといい匂いに包まれる。"
translation = "귀여운 후배 여자친구의 부드러운 몸의 감촉과 따뜻한 체온, 그리고 좋은 향기에 휩싸인다."

[[dialogue]]
speaker = "unk"
original = "思わず手が彼女の背中へと動いて、そのまま抱き締めたい衝動に駆られるが、すんでのところで耐える。"
translation = "나도 모르게 손이 그녀의 등 뒤로 움직여, 그대로 껴안고 싶은 충동에 휩싸이지만, 간발의 차로 참아낸다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「あれあれ～？\u3000センパイ、まだ我慢しちゃうんですか～？」"
translation = "「어라어라~? 선배, 아직 참으시는 건가요~?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「センパイの体、熱くなって、心臓がドキドキしちゃってるのが伝わって来てますよ<emoji=heart04>」"
translation = "「선배의 몸이 뜨거워져서, 심장이 두근두근거리는 게 전해져 오고 있다고요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「このままキスしちゃってもいいんですよ～？」"
translation = "「이대로 키스해 버려도 괜찮은데 말이죠~?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ほら、こんなにお互いの唇が近くにあるのに……<emoji=heart04>」"
translation = "「봐요, 이렇게 서로의 입술이 가까이 있는데……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今にも唇が触れそうな距離にまで顔を近づけながら、リーリアは煽る。"
translation = "당장이라도 입술이 닿을 듯한 거리까지 얼굴을 가까이하며, 리리아는 도발한다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「センパイ、ここまで耐えるなんて、もしかして私のこと、そんなに好きじゃないんですか～？\u3000リーリア悲しいな～<emoji=heart04>」"
translation = "「선배, 여기까지 참다니, 혹시 저를 그렇게 좋아하지 않는 건가요~? 리리아 슬퍼라~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は首を横に振って、答えた。"
translation = "나는 고개를 가로저으며 대답했다."

[[dialogue]]
speaker = "unk"
original = "なるべく長く見ていたいんだ"
translation = "가급적 오래 보고 싶으니까"

[[dialogue]]
speaker = "unk"
original = "からかって来るリーリアが愛おし過ぎるから"
translation = "놀려대는 리리아가 너무나도 사랑스러우니까"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「せ、センパイ、その言い方は反則ですよぉ……<emoji=heart04>」"
translation = "「서, 선배, 그런 말은 반칙이에요오……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「そんなこと言われると、私の方が我慢できなくなっちゃうじゃないですかっ<emoji=heart04>」"
translation = "「그런 말을 들으면, 제 쪽이 참을 수 없게 되어버리잖아요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアの方から、唇を重ねて来る。"
translation = "리리아 쪽에서 입술을 겹쳐 온다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「センパイっ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「선배<emoji=heart04> 으음……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「はあぁ……<emoji=heart04>\u3000センパイ……ちゅっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 선배…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「好き<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000センパイ<emoji=heart04>\u3000好き、しゅき……<emoji=heart04>」"
translation = "「좋아해<emoji=heart04> 응……<emoji=heart04> 선배<emoji=heart04> 좋아, 조아해……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「쪽…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後はあっと言う間にからかいモードじゃなくなり、デレデレと沢山甘えまくってくる可愛いリーリアなのであった――"
translation = "그 후로는 순식간에 놀리기 모드가 사라지고, 헤벌레하며 잔뜩 어리광을 부려대는 귀여운 리리아였다――"

