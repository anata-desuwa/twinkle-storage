[[dialogue]]
speaker = "unk"
original = "ある日の放課後──アニマ先輩の実験に付き合った結果、俺は４人に分裂してしまった（もう何を言っているのか自分でもわからない）。"
translation = "어느 날 방과 후── 아니마 선배의 실험을 도와준 결과, 나는 4명으로 분열되어 버렸다 (이제 나조차 무슨 말을 하는 건지 모르겠다)."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「会長様が４人に分裂って──マジで増えてやがりますわ！？」"
translation = "「회장님이 4명으로 분열이라니── 진짜로 늘어나 있잖아요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「わ～お。ほんとだ。顔も声もそっくりの会長が４人……あっははは♪\u3000錬金術やば～い♪」"
translation = "「와~오. 정말이네. 얼굴도 목소리도 똑같은 회장이 4명…… 앗하하하♪ 연금술 대박~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ちゃんと元に戻るんですの、これ！？」"
translation = "「제대로 원래대로 돌아오는 건가요, 이거!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「薬効を解除するための薬、明日までに完成させるって言ってたよ。つまり今日１日だけは我慢するしかないってことだね～♪」"
translation = "「약효를 해제하기 위한 약, 내일까지 완성하겠다고 했어. 즉 오늘 하루 동안은 참을 수밖에 없다는 거네~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひ♪\u3000ね～、セナリィ。ちょっと相談なんだけど」"
translation = "「니히♪ 저기~, 세나리이. 잠깐 상담할 게 있는데」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「なんです？\u3000何か嫌な予感がするのですが……」"
translation = "「뭡니까? 뭔가 불길한 예감이 듭니다만……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「こんなにいっぱいいるんだからさ～♪\u3000会長、１人くらい貰ってっちゃってもい～い？」"
translation = "「이렇게나 많이 있으니까 말이야~♪ 회장, 한 명 정도는 내가 가져가도 돼~?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「はぁ！？\u3000そんなのダメに決まってます！\u3000１人だろうが４人だろうが、会長様の恋人は私ただ１人ですわ！？」"
translation = "「하아!? 그럴 리가 없잖아요! 한 명이든 네 명이든, 회장님의 연인은 저 단 한 명뿐이에요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちぇ～♪\u3000ざーんねん。ここのとこ会長、セナリィとばっかりつるんで付き合い悪いんだもん。たまには２人で遊びたかったな～♪」"
translation = "「쳇~♪ 아쉬워라. 요즘 회장, 세나리이랑만 붙어 다녀서 안 놀아준단 말이야. 가끔은 둘이서 놀고 싶었는데~♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「呑気なことを言ってる場合じゃありませんわ。薬が前倒しで完成するかもしれないでしょう。分裂体が別行動するのはダメです！」"
translation = "「태평한 소리 하고 있을 때가 아니에요. 약이 예정보다 빨리 완성될지도 모르잖아요. 분열체가 따로 행동하는 건 안 돼요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「会長様、明日の朝まで私と一緒に過ごしますわよ！\u3000もちろん、４人全員でですわ！」"
translation = "「회장님, 내일 아침까지 저랑 같이 지내는 거예요! 물론, 4명 전원 다 같이요!」"

[[dialogue]]
speaker = "unk"
original = "確かにここから、さらに分裂なんてしたらもう手が付けられない。手練れのセナリィに付き添ってもらえるなら『俺たち』も安心だ。"
translation = "확실히 여기서 더 분열이라도 했다간 손을 쓸 수가 없다. 실력자인 세나리이가 곁에 있어 준다면 『우리』도 안심이다."

[[dialogue]]
speaker = "unk"
original = "結局その後、俺たち４人はセナリィに連れられ、ゴールデングースの事務所にお泊まりをすることになった。"
translation = "결국 그 후, 우리 4명은 세나리이에게 이끌려, 골든 구스의 사무실에서 하룻밤을 묵게 되었다."

[[dialogue]]
speaker = "unk"
original = "そして──数時間後。"
translation = "그리고── 몇 시간 후."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「どどどっ、どうしてこうなりますの～！？」"
translation = "「어어어, 어째서 이렇게 되는 건가요~!?」"

[[dialogue]]
speaker_original = "クロト１"
speaker_translation = "쿠로토 1"
original = "「だってセナリィ、今日はデートの約束があっただろ？」"
translation = "「그치만 세나리이, 오늘은 데이트 약속이 있었잖아?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「え、えぇ。そうですわね……！？\u3000お食事をした後は、ホテルにお泊まりなんてことも、話しておりましたわ……！」"
translation = "「에, 에에. 그렇긴 하네요……!? 식사를 한 뒤에는, 호텔에서 묵는다는 얘기도, 하긴 했었습니다만……!」"

[[dialogue]]
speaker_original = "クロト２"
speaker_translation = "쿠로토 2"
original = "「俺たち。この日のために溜めてたっていうか……」"
translation = "「우리들. 이날을 위해서 쌓아왔다고나 할까……」"

[[dialogue]]
speaker_original = "クロト３"
speaker_translation = "쿠로토 3"
original = "「最近、忙しくて恋人らしいこともできてなかったし……」"
translation = "「최근에 바빠서 연인다운 일도 못 했고……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「それは私も申し訳なく思っていますわ。ですから順番にとお伝えしたじゃありませんの……！？」"
translation = "「그건 저도 죄송하게 생각하고 있어요. 그러니까 순서대로라고 말씀드리지 않았나요……!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「リクエストに応えてバニー衣装にも着替えたのですから、せめてお１人ずつで……」"
translation = "「리퀘스트에 응해서 바니 의상으로도 갈아입었으니까, 적어도 한 분씩……」"

[[dialogue]]
speaker_original = "クロト４"
speaker_translation = "쿠로토 4"
original = "「無理だよセナリィ。俺たち、みんなセナリィが大好きなんだから」"
translation = "「무리야 세나리이. 우리들, 모두 세나리이를 정말 좋아하니까」"

[[dialogue]]
speaker = "unk"
original = "いくら相手が自分とはいえ、知らないところでセナリィが喘ぎ、中出しされることになるだなんて。"
translation = "아무리 상대가 자신이라곤 해도, 모르는 곳에서 세나리이가 신음하며 질내사정 당하게 된다니."

[[dialogue]]
speaker = "unk"
original = "そしていざ自分の番が来たら、自分以外の精液で汚れたセナリィが出てくる？\u3000そんなの耐えられない──というか一番手をめぐって殴り合いが起きそうだ。"
translation = "그리고 막상 자기 차례가 왔을 때, 자신 이외의 정액으로 더러워진 세나리이가 나온다? 그런 건 견딜 수 없다── 아니, 애초에 첫 번째 자리를 두고 난투극이 벌어질 것 같다."

[[dialogue]]
speaker = "unk"
original = "だったらいっそのこと４人全員でしたい。それが俺たちの結論だった。"
translation = "그럴 바엔 차라리 4명 전원이서 하고 싶다. 그것이 우리들의 결론이었다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ど、独占欲が強すぎますわ！？」"
translation = "「도, 독점욕이 너무 강해요!?」"

[[dialogue]]
speaker = "unk"
original = "でもセナリィが、昼間ネーゼマインに見せた独占欲と同じだよ──そう同時に告げる俺たち。"
translation = "하지만 세나리이가 낮에 네제마인에게 보여준 독점욕이랑 똑같아── 그렇게 동시에 고하는 우리들."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ぅう……そう仰られると……で、でも……それだけ想っていただけているというのは、恋人冥利に尽きますわね……<emoji=heart04>」"
translation = "「으우…… 그렇게 말씀하시면…… 하, 하지만…… 그만큼 생각해주고 계신다는 건, 연인으로서 더할 나위 없는 영광이네요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ひょ、ひょえぇ……ヤバいですわ……おま○ことアナルと……右手と左手……<emoji=heart04>」"
translation = "「히, 히에에…… 장난 아니에요…… 보지랑 뒷보지랑…… 오른손이랑 왼손……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私、体中のいたるところで……会長様のおち○ちんの熱さ、感じてしまっていますわ……<emoji=heart04>」"
translation = "「저, 몸 안의 구석구석까지…… 회장님의 자지의 뜨거움, 느껴버리고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト１"
speaker_translation = "쿠로토 1"
original = "「なんだかんだ言って、セナリィも期待してるんだろ？\u3000愛撫もしてないのに、おま○こから愛液がダラダラ垂れて、アナルの入り口まで濡らしてるぞ？」"
translation = "「이러니저러니 해도, 세나리도 기대하고 있는 거지? 애무도 안 했는데, 보지에서 애액이 줄줄 흘러서, 애널 입구까지 적시고 있다고?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そ、それは……会長様たちが、勃起したおち○ちんを、こすり付けてくるからですわ……っ<emoji=heart04>」"
translation = "「그, 그것은…… 회장님들이, 발기한 자지를, 문질러 대기 때문입니다……っ<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「興奮したオスの匂いもいつもの４倍……っ<emoji=heart04>\u3000はぁぁぁっ、こんなの……おま○こを興奮させない方が、無理というもの……っ<emoji=heart04>」"
translation = "「흥분한 수컷의 냄새도 평소의 4배……っ<emoji=heart04> 하아아앗, 이런 거…… 보지를 흥분시키지 않는 게, 무리라는 것……っ<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あぁぁぁ……っ<emoji=heart04>\u3000４つのおち○ちんが、どれもびくんびくんと脈打って……わ、わかりましたわ<emoji=heart04>\u3000４人全員、同時にお相手いたしますっ！」"
translation = "「아아아아……っ<emoji=heart04> 4개의 자지가, 하나같이 파르르 떨리며 맥동해서…… 아, 알겠습니다<emoji=heart04> 4명 전원, 동시에 상대해 드리겠어요!」"

[[dialogue]]
speaker = "unk"
original = "了解も得られたということで、話しているうちに愛液でますます濡れそぼっていたセナリィのおま○ことアナルへ、メリメリとペニスを埋めていく──"
translation = "양해를 얻었다는 것으로, 이야기하는 동안 애액으로 더욱 흠뻑 젖어 있던 세나리의 보지와 애널로, 뿌득뿌득 페니스를 묻어간다──"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「うぅぅうっ──お、ぉ、おぉぉおっ～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「우으으읏──오, 오, 오오오옷~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「かっ<emoji=heart04>\u3000かは、ぁ、あっぁっ……<emoji=heart04>\u3000はぁ、ふぅ、ふぅうっ……や、やべっ<emoji=heart04>\u3000これは、やっべぇ、ですわぁっ<emoji=heart04>」"
translation = "「커<emoji=heart04> 커하, 아, 앗아……<emoji=heart04> 하아, 후우, 후우웃…… 야, 위험해<emoji=heart04> 이건, 지, 진짜 위험해요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふぅッ<emoji=heart04>\u3000ふぅうッ<emoji=heart04>\u3000ふぅうッ……<emoji=heart04>\u3000以前の、あ、あにゃるびーず、なんてっ……メじゃない刺激っ……はふぅうっ<emoji=heart04>」"
translation = "「후우<emoji=heart04> 후우우<emoji=heart04> 후우우……<emoji=heart04> 이전의, 애, 애널 비즈, 같은 건…… 비교도 안 되는 자극…… 하후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「おま○こと、お尻の穴に、ぃっ<emoji=heart04>\u3000かか、会長様の、おっきなおち○ちんが、ずっぷり根元までぇっ……ぉぅうっ……<emoji=heart04>」"
translation = "「보지랑, 똥구멍에, 에잇<emoji=heart04> 회, 회장님의, 커다란 자지가, 뿌리 끝까지 푹…… 오우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "未経験の圧迫感に喘ぐセナリィだが──俺たちに襲い来る感触もまた、経験したことのないものだった。"
translation = "미경험의 압박감에 헐떡이는 세나리였지만── 우리에게 엄습하는 감촉 또한, 경험해 본 적 없는 것이었다."

[[dialogue]]
speaker = "unk"
original = "分裂体となった俺は、なぜか『他の俺』の感覚も共有している……１本のペニスに、セナリィの体の温もりを４人分感じる……！"
translation = "분열체가 된 나는, 왠지 『다른 나』의 감각도 공유하고 있다…… 1개의 페니스에, 세나리의 몸의 온기를 4인분 느끼고 있어……!"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふぅ、ふぅっ……ほぉ、ぉおっ……<emoji=heart04>\u3000感覚の共有って、ま、マジですのっ……？」"
translation = "「후우, 후우…… 호오, 오옷……<emoji=heart04> 감각 공유라니, 지, 진짜인가요……?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「おま○こに入れてるのに、アナルにも入ってる感じが、して……？」"
translation = "「보지에 넣고 있는데, 애널에도 들어와 있는 느낌이, 들어서……?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私の手で握っている会長様も……おぉぉっ<emoji=heart04>\u3000おま○ことアナルの締め付けが、なぜか感じられる……？\u3000そ、そんなことがっ……<emoji=heart04>」"
translation = "「제 손으로 쥐고 있는 회장님도…… 오오옷<emoji=heart04> 보지와 애널의 조임이, 왠지 느껴져요……? 그, 그런 일이……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「はぁあっ……ふぅうぅぅ<emoji=heart04>\u3000でも、それなら、よ、よかった、ですわぁっ……<emoji=heart04>」"
translation = "「하아앗…… 후우우우<emoji=heart04> 하지만, 그렇다면, 다, 다행이에요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ジャンケンで負けて、手コキになってしまったお２人の会長様っ……おぉぉっ<emoji=heart04>\u3000とても残念そうに、しておりましたの、気になってました、からぁ……<emoji=heart04>」"
translation = "「가위바위보에서 져서, 손으로 하게 되어버린 두 분의 회장님…… 오오옷<emoji=heart04> 무척 아쉬워하고 계셔서, 신경 쓰였으니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「でも感覚共有、しているのであれば……<emoji=heart04>\u3000おふぅ<emoji=heart04>\u3000皆様全員、隔てなくっ……愛して差し上げられますわ……おほぅ<emoji=heart04>」"
translation = "「하지만 감각 공유를, 하고 있다면……<emoji=heart04> 오후우<emoji=heart04> 여러분 전원, 차별 없이…… 사랑해 드릴 수 있어요…… 오호우<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「さ、さぁ<emoji=heart04>\u3000動いてください……<emoji=heart04>\u3000恋人のおま○ことアナル、楽しんで……手コキも頑張りますのでっ<emoji=heart04>」"
translation = "「자, 자아<emoji=heart04> 움직여 주세요……<emoji=heart04> 연인의 보지와 애널, 즐겨줘요…… 손으로 하는 것도 열심히 할 테니까요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いじらしいことを言われて、４人全員に火が付く──そうしてセナリィと俺たちの５Ｐセックスが始まった。"
translation = "기특한 소리를 듣고, 4명 전원에게 불이 붙는다── 그렇게 세나리와 우리들의 5P 섹스가 시작되었다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「んんぅおっ！？\u3000お、ぉお、おぉおっ<emoji=heart04>\u3000ほぉおっ<emoji=heart04>\u3000ゥおっ<emoji=heart04>\u3000ぉ、ぉお、ほぉっ<emoji=heart04>\u3000ほおぉおっ<emoji=heart04>\u3000お、ぉおお、おぉお～っ！？」"
translation = "「음음으옷!? 오, 오오, 오오옷<emoji=heart04> 호오옷<emoji=heart04> 우옷<emoji=heart04> 오, 오오, 호옷<emoji=heart04> 호오오옷<emoji=heart04> 오, 오오오, 오오오~앗!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あ、あひぃ──ぁあ、はぁあ、ふぅううっ<emoji=heart04>\u3000おぉおっ<emoji=heart04>\u3000や、やべぇ<emoji=heart04>\u3000やべぇ、ですわコレっ<emoji=heart04>\u3000うぉ、お、おぉ、ぉっ<emoji=heart04>」"
translation = "「아, 아히──아아, 하아아, 후우우우웃<emoji=heart04> 오오옷<emoji=heart04> 야, 야바위<emoji=heart04> 야바위해요 이거어<emoji=heart04> 우오, 오, 오오, 오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「おま○この奥、ご、ゴリゴリ<emoji=heart04>\u3000ズンズン、突き込まれ、ながらっ……おぉおおっ<emoji=heart04>」"
translation = "「보지 안쪽, 고, 고리고리<emoji=heart04> 즈음즈음, 찔러 넣어지, 면서…… 오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふう、ふぅ、ふぅうう～っ！？\u3000アナルも同時に<emoji=heart04>\u3000ぶっといおち○ちんで、ほじくり、返され、てえぇっ<emoji=heart04>\u3000おぉほ～っ<emoji=heart04>」"
translation = "「후우, 후우, 후우우우~앗!? 애널도 동시에<emoji=heart04> 굵직한 자지로, 파헤쳐, 지고오오옷<emoji=heart04> 오오호~옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「はぁあ、あぁ、あ、あぁうう～<emoji=heart04>\u3000も、もちろんっ<emoji=heart04>\u3000手コキも、や、やや、休みません、わぁあ<emoji=heart04>\u3000おぉ、ふぅう<emoji=heart04>」"
translation = "「하아아, 아아, 아, 아아우우~<emoji=heart04> 무, 물론<emoji=heart04> 손으로 하는 것도, 쉬, 쉬쉬, 쉬지 않아요오오<emoji=heart04> 오오, 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「大好きな会長様のおち○ちんっ<emoji=heart04>\u3000いっぱい、しこしこ<emoji=heart04>\u3000しこしこ<emoji=heart04>\u3000してっ……悦んでいただかないと──んんっ、ふぉぉっ<emoji=heart04>」"
translation = "「정말 좋아하는 회장님의 자지잇<emoji=heart04> 잔뜩, 슥삭슥삭<emoji=heart04> 슥삭슥삭<emoji=heart04> 해서…… 기뻐해 주셔야 하니까── 응읏, 포오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私っ、よかった<emoji=heart04>\u3000両利きで、よかった、です<emoji=heart04>\u3000拳銃の扱いで、慣れております<emoji=heart04>\u3000左右同時の動きっ<emoji=heart04>\u3000しこしこ<emoji=heart04>\u3000しゅっしゅっ……んおおっ<emoji=heart04>」"
translation = "「나, 다행이야<emoji=heart04> 양손잡이라서, 다행이에요<emoji=heart04> 권총 다루는 걸로, 익숙해져 있어요<emoji=heart04> 좌우 동시의 움직임잇<emoji=heart04> 슥삭슥삭<emoji=heart04> 슈슉슈슉…… 응오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "濡れそぼった前後の穴へピストンを受け、普段の凛々しさが消し飛ぶほどに感じながらも、セナリィは手コキ奉仕をやめない。"
translation = "흠뻑 젖은 앞뒤 구멍으로 피스톤을 받으며, 평소의 늠름함이 날아갈 정도로 느끼면서도, 세나리는 수음 봉사를 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "それだけでも器用なのに、下腹に力を入れて、女性器とアナルにも緩急をつけた締め付けを送ってくれている。"
translation = "그것만으로도 기교가 대단한데, 아랫배에 힘을 주어, 여성기와 애널에도 완급 조절을 한 조임을 보내오고 있다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「会長様、気持ち、いいですかっ？\u3000私の全身、すべてご堪能くださっ……おお、ほぉおっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000お゛ぅう<emoji=heart04>\u3000んほぉっ<emoji=heart04>」"
translation = "「회장님, 기분, 좋으신가요? 제 전신, 전부 만끽해 주세…… 오오, 호오오옷<emoji=heart04> 응으읏<emoji=heart04> 오<emoji=heart04> 오우우<emoji=heart04> 응호옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「んんぁ、はあぁ、ふぅうっ、ふはぁあ、あ、ああっぅっ<emoji=heart04>\u3000お、ぉお、おぉおおっ<emoji=heart04>\u3000もっとほぢって、くだ、しゃいましぇっ<emoji=heart04>\u3000おぅっ<emoji=heart04>」"
translation = "「음음아, 하아, 후우웃, 후하아아, 아, 아앗우읏<emoji=heart04> 오, 오오, 오오오옷<emoji=heart04> 좀 더 파헤쳐, 주세효오옷<emoji=heart04> 오웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「遠慮はいりませんっ、おぉおっ<emoji=heart04>\u3000４人全員、気持ちよくなっで──おぉぉおぉっ！？」"
translation = "「사양은 필요 없어요, 오오옷<emoji=heart04> 4명 전원, 기분 좋아져서── 오오오오옷!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふぅう、ぉお、ぉっ<emoji=heart04>\u3000あ゛っ<emoji=heart04>\u3000あ゛ぅう<emoji=heart04>\u3000んぉぉおおぉっ！\u3000お、ぉお、おおぉっ<emoji=heart04>\u3000あ、イ、イグ<emoji=heart04>\u3000気持ちいいの、もう来ます、ぅ──<emoji=heart04>」"
translation = "「후우우, 오오, 오옷<emoji=heart04> 아<emoji=heart04> 아우우<emoji=heart04> 응오오오오옷! 오, 오오, 오오옷<emoji=heart04> 아, 가, 가요<emoji=heart04> 기분 좋은 거, 이제 와요오──<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「おおぉっ──んぅおおぉおぉおおお～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오오옷──응으오오오오오오오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あ、ぁ゛～～～っ<emoji=heart04>\u3000はぁ、はぁああ<emoji=heart04>\u3000あうぅ<emoji=heart04>\u3000ピストン、休まずにそんにゃっ<emoji=heart04>\u3000おぅう<emoji=heart04>\u3000ほぉっ<emoji=heart04>\u3000おほぉォおォっ！？」"
translation = "「아, 아아~~~앗<emoji=heart04> 하아, 하아아아<emoji=heart04> 아우우<emoji=heart04> 피스톤, 쉬지 않고 그렇게에<emoji=heart04> 오우우<emoji=heart04> 호오앗<emoji=heart04> 오호오오오오옷!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「イってる私に構わず、そんなピストン、をぉっ<emoji=heart04>\u3000ふぅう<emoji=heart04>\u3000ふぅううっ<emoji=heart04>\u3000会長様、け、ケダモノ、すぎますわぁぁっ──おぅう<emoji=heart04>」"
translation = "「가버리는 저에겐 아랑곳없이, 그런 피스톤, 을으옷<emoji=heart04> 후우우<emoji=heart04> 후우우우웃<emoji=heart04> 회장님, 너, 너무 짐승 같아요오오──오우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「で、でもぉっ<emoji=heart04>\u3000私、へ、平気ですわ<emoji=heart04>\u3000おぉお～っ<emoji=heart04>\u3000おっおっ<emoji=heart04>\u3000おぉおおっ<emoji=heart04>\u3000今日は４人がお相手、ですから、ぁっ<emoji=heart04>」"
translation = "「하, 하지만요오옷<emoji=heart04> 저, 괘, 괜찮아요오<emoji=heart04> 오오오~옷<emoji=heart04> 오옷오옷<emoji=heart04> 오오오오옷<emoji=heart04> 오늘은 4명이 상대, 니까요오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「か、覚悟は、ふぅっ<emoji=heart04>\u3000ふぅうっ<emoji=heart04>\u3000キメてきました、ぁっ<emoji=heart04>\u3000おぅっ<emoji=heart04>\u3000お、ぉうっ<emoji=heart04>\u3000おおぅっ<emoji=heart04>\u3000おっおっおっおぅっ<emoji=heart04>」"
translation = "「가, 각오는, 후우웃<emoji=heart04> 후우우웃<emoji=heart04> 다지고 왔어요오옷<emoji=heart04> 오웃<emoji=heart04> 오, 오우웃<emoji=heart04> 오오우웃<emoji=heart04> 오옷오옷오옷오우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ぁ──ぁぁぁっ<emoji=heart04>\u3000もっど<emoji=heart04>\u3000もっど速きゅっ<emoji=heart04>\u3000して、くれへぇっ<emoji=heart04>\u3000いいんでしゅ、よぉおぉっ<emoji=heart04>」"
translation = "「아──아아아앗<emoji=heart04> 조옴 더<emoji=heart04> 조옴 더 빠르궤에<emoji=heart04> 해, 줘어어엇<emoji=heart04> 괜찮아요오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「会長様、いっぱい求めてっ<emoji=heart04>\u3000おぉぉっ<emoji=heart04>\u3000恋人の私を、求めてくださっ──おぅうぅっ<emoji=heart04>\u3000ほぉお、おぉ゛<emoji=heart04>\u3000ぉおお～っ！」"
translation = "「회장님, 잔뜩 원해줘요옷<emoji=heart04> 오오오옷<emoji=heart04> 연인인 저를, 원해 주세──오우우우읏<emoji=heart04> 호오오, 오오<emoji=heart04> 오오오~앗!」"

[[dialogue]]
speaker = "unk"
original = "女性器もアナルも滑りすぎて、ペニスが抜けてしまいそうなほどに感じているセナリィ。"
translation = "여성기도 애널도 너무 미끄러워서, 페니스가 빠져버릴 것 같다고 느끼고 있는 세나리."

[[dialogue]]
speaker = "unk"
original = "それなのにもっと強くしていいだなんて言ってくれる──どれだけ喘いでも両手で握ったペニスをしごく丁寧さは変わらない。"
translation = "그런데도 좀 더 강하게 해도 좋다고 말해준다── 아무리 헐떡여도 양손으로 쥔 페니스를 문지르는 정성스러움은 변하지 않는다."

[[dialogue]]
speaker = "unk"
original = "俺たち全員の性欲がさらに昂っていくのを感じる──！"
translation = "우리 전원의 성욕이 더욱 고조되는 것을 느낀다──!"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ぁ──あ゛あ゛あ゛あ゛っ！？\u3000ほぉおぉっ<emoji=heart04>\u3000おゥっ<emoji=heart04>\u3000おォおォおぉおおっ<emoji=heart04>\u3000あ゛ぁ゛あああぁああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아──아아아아아앗!? 호오오오옷<emoji=heart04> 오우옷<emoji=heart04> 오오오오오오오옷<emoji=heart04> 아아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「おち○ちん、ゴリゴリやべぇっ<emoji=heart04>\u3000それやべぇですッ<emoji=heart04>\u3000おぅうう<emoji=heart04>\u3000私のおま○こ、弱いところ、ばかり──ほぉおおぉぉんっ<emoji=heart04>」"
translation = "「자지, 고리고리 위험해앳<emoji=heart04> 그거 위험해요옷<emoji=heart04> 오우우우<emoji=heart04> 제 보지, 약한 곳, 뿐이라── 호오오오오온읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あ、あぅ、ぁ、ああぁあぁ！？\u3000アナルの方から突かれてるおち○ちんっ<emoji=heart04>\u3000おぉ<emoji=heart04>\u3000おま○このおち○ちんとっ<emoji=heart04>\u3000ほぉおぅ<emoji=heart04>」"
translation = "「아, 아우, 아, 아아아아아!? 애널 쪽에서 찔리고 있는 자지잇<emoji=heart04> 오오<emoji=heart04> 보지의 자지랑잇<emoji=heart04> 호오오우<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私のお腹の中で、おち○ちんの先っぽがぶつかりあって──あ、が、ぁあ、ぁぁぁぁっ！？\u3000はひぃいいっ<emoji=heart04><emoji=heart04>\u3000あ、あぁうううっ<emoji=heart04>」"
translation = "「제 배 속에서, 자지 끝부분이 서로 부딪혀서── 아, 가, 아아, 아아아아앗!? 하히이이잇<emoji=heart04><emoji=heart04> 아, 아아우우우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ひ、響くぅっ<emoji=heart04>\u3000おぅううっ<emoji=heart04>\u3000ほぉおおっ<emoji=heart04>\u3000おおぉおっ<emoji=heart04>\u3000あ、あぁ、あぁああっ<emoji=heart04>\u3000ぁ、ぁ、ああぅう、ぁぉおぉっ<emoji=heart04>」"
translation = "「울, 울려요오옷<emoji=heart04> 오우우우웃<emoji=heart04> 호오오오옷<emoji=heart04> 오오오오옷<emoji=heart04> 아, 아아, 아아아앗<emoji=heart04> 아, 아, 아아우우, 아오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ま──またイギュっ<emoji=heart04>\u3000おま○ことあなりゅっ<emoji=heart04>\u3000同時イキ、しちゃいま──ほぉお、ぉおおお～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가──또 가버려어엇<emoji=heart04> 보지랑 애너얼<emoji=heart04> 동시 가버림, 해버려어── 호오오, 오오오오~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ほっぎゅぅうぅっ──んぉぉおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あ──あ～～～っ！？\u3000あ、あぁ、あぁああ、ぁああ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「호규우우웃──응오오오오~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아──아~~~앗!? 아, 아아, 아아아아, 아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛らしいバニー衣装のまま、電流でも流されているみたいにビクつくセナリィ。"
translation = "귀여운 바니 의상 그대로, 전류라도 흐르는 것처럼 파르르 떠는 세나리."

[[dialogue]]
speaker = "unk"
original = "イキすぎて心配になった俺たちだったが、その遠慮を見越したかのように、女性器とアナル、そして両手の締め付けが増した。"
translation = "너무 가버려서 걱정이 된 우리였지만, 그 망설임을 내다본 것처럼, 여성기와 애널, 그리고 양손의 조임이 강해졌다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「やめないでっ<emoji=heart04>\u3000構わず、動いて、くださいっ<emoji=heart04>\u3000んぅ<emoji=heart04>\u3000ほぉっ<emoji=heart04>\u3000おぉうっ<emoji=heart04>\u3000ほぉお、お、ぉおっ……<emoji=heart04>」"
translation = "「멈추지 마요옷<emoji=heart04> 상관 말고, 움직여, 주세요옷<emoji=heart04> 응우<emoji=heart04> 호오옷<emoji=heart04> 오오우웃<emoji=heart04> 호오오, 오, 오오옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「殿方は、セックス中に止まるの、イヤでしょうっ……？\u3000私のことは気にせず、ピストン、続けてっ──ほぉ、おぅっ、お、おぉおっ<emoji=heart04>」"
translation = "「남성분들은, 섹스 중에 멈추는 거, 싫어하시죠……? 저는 신경 쓰지 말고, 피스톤, 계속해줘요── 호오, 오우웃, 오, 오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「せっかくの５Ｐ、ですわっ<emoji=heart04>\u3000せっかくのっ……ほぉっ<emoji=heart04>\u3000バニーの私との、まぐわい、ですのよっ……おぉううっ<emoji=heart04>」"
translation = "「어렵사리 성사된 5P, 니까요옷<emoji=heart04> 어렵사리…… 호오옷<emoji=heart04> 바니인 저와의, 정사, 라구요…… 오오우우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「最後まで止めないでっ……ご堪能、くださいまし──ぴょ、ぴょんっ<emoji=heart04><emoji=heart04>」"
translation = "「마지막까지 멈추지 말고…… 만끽해 주세요── 뿅, 뿅옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト１"
speaker_translation = "쿠로토 1"
original = "「セナリィ……！！」"
translation = "「세나리……!!」"

[[dialogue]]
speaker_original = "クロト２"
speaker_translation = "쿠로토 2"
original = "「そんなウサギのマネ、されたらっ……俺たち！！」"
translation = "「그런 토끼 흉내까지, 내면…… 우리들!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「もっと<emoji=heart04>\u3000興奮して、おぉっ<emoji=heart04>\u3000くださいまし<emoji=heart04>\u3000お、ぉおっ<emoji=heart04>\u3000会長様のおち○ちん、４本全部愛おしいですっ……ぴょんっ<emoji=heart04>\u3000ぴょぉんっ<emoji=heart04>」"
translation = "「좀 더<emoji=heart04> 흥분해, 오옷<emoji=heart04> 주세요오<emoji=heart04> 오, 오오옷<emoji=heart04> 회장님의 자지, 4개 전부 사랑스러워요…… 뿅옷<emoji=heart04> 뿅오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セナリィのバニーコスエッチ。４人全員へこれ以上なく心を尽くしてくれる、ふしだらだけど愛情にまみれたエッチ──"
translation = "세나리의 바니 코스 섹스. 4명 전원에게 이보다 더할 수 없을 정도로 정성을 다해주는, 음탕하지만 애정 어린 섹스──"

[[dialogue]]
speaker = "unk"
original = "ゾクリと俺たち全員のペニスが震えて、精液がペニスを少しずつ登っていくのがわかった。"
translation = "오싹하며 우리 전원의 페니스가 떨리고, 정액이 페니스를 조금씩 타고 올라오는 것을 알 수 있었다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ぁ、あはぁ、あぁあっ<emoji=heart04>\u3000おち○ちん、ぶっとく、なって──ほお、おぉっ<emoji=heart04>\u3000もうすぐ、出るのです、わねっ<emoji=heart04>」"
translation = "「아, 아하아, 아아앗<emoji=heart04> 자지, 굵어져서── 호오, 오오옷<emoji=heart04> 이제 곧, 나오는 거, 네요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「いっぱいウサギに種付け、してくださいぃ<emoji=heart04>\u3000ぴょん<emoji=heart04>\u3000ぴょんっ<emoji=heart04>\u3000ぴょぉ──お、おぉおぉお、おぉお～っ！？」"
translation = "「잔뜩 토끼에게 씨내리기, 해주세요오오<emoji=heart04> 뿅<emoji=heart04> 뿅옷<emoji=heart04> 뿅오── 오, 오오오오, 오오오~앗!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お、ぉお、おぉ、お、おぉ、お、おぉおっ<emoji=heart04>\u3000パンパン、やべっ<emoji=heart04>\u3000やべっ、やべぇです、わ、ぁ、ぁ、あうぅう～っ<emoji=heart04>」"
translation = "「오, 오오, 오오, 오, 오오, 오, 오오오옷<emoji=heart04> 팡팡, 위험해<emoji=heart04> 위험해, 위험해요오, 아, 아, 아우우우~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お、お願い、お願いですわっ<emoji=heart04>\u3000ほぉんっ<emoji=heart04>\u3000おぉおっ<emoji=heart04>\u3000あれ、あれ言ってくださいっ<emoji=heart04>\u3000俺の、おぉお<emoji=heart04>\u3000俺の女になれって、あれぇっ<emoji=heart04>」"
translation = "「부, 부탁, 부탁이에요오옷<emoji=heart04> 호오온읏<emoji=heart04> 오오오옷<emoji=heart04> 그거, 그거 말해 주세요옷<emoji=heart04> 내, 오오오<emoji=heart04> 내 여자가 되라고, 그거어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふぅ、ふぅううっ<emoji=heart04>\u3000おぉおっ<emoji=heart04>\u3000私、４人の会長様から、愛の告白、されたい、です──わぁああ──ほぉお、おぉお、ぉおっ<emoji=heart04>」"
translation = "「후우, 후우우우웃<emoji=heart04> 오오오옷<emoji=heart04> 저, 4명의 회장님으로부터, 사랑의 고백, 받고 싶어, 요── 아아아아── 호오오, 오오오, 오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト１"
speaker_translation = "쿠로토 1"
original = "「セナリィっ……！」"
translation = "「세나리……!」"

[[dialogue]]
speaker_original = "クロト２"
speaker_translation = "쿠로토 2"
original = "「俺の……いやっ！」"
translation = "「나의…… 아니!」"

[[dialogue]]
speaker_original = "クロト３"
speaker_translation = "쿠로토 3"
original = "「俺たちの女に──っ！」"
translation = "「우리들의 여자가──!」"

[[dialogue]]
speaker_original = "クロト４"
speaker_translation = "쿠로토 4"
original = "「なれッ！\u3000思いっきりイけっ！！」"
translation = "「되어라! 마음껏 가버려!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「んきゅぅううぅううっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あ、あ、あ、あぁ～～～っ<emoji=heart04>\u3000なりましゅわっ<emoji=heart04>\u3000なりましゅぅっ<emoji=heart04>\u3000私は一生、会長様のモノぉ──ぉおぉお～っ！？」"
translation = "「응큐우우우우우우읏<emoji=heart04><emoji=heart04><emoji=heart04> 아, 아, 아, 아아~~~앗<emoji=heart04> 되겠어요오옷<emoji=heart04> 되겠어요오오옷<emoji=heart04> 저는 평생, 회장님의 것으으으── 오오오오~앗!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「おっおっおっおっおっおっおっおっおっおっ<emoji=heart04><emoji=heart04>\u3000ほおぉっ、イグっ<emoji=heart04>\u3000デカいのキましゅっ<emoji=heart04>\u3000イグイグ、イグイグイグイグ──っ<emoji=heart04><emoji=heart04>」"
translation = "「오옷오옷오옷오옷오옷오옷오옷오옷오옷오옷<emoji=heart04><emoji=heart04> 호오오옷, 가요옷<emoji=heart04> 커다란 거 와요오옷<emoji=heart04> 가요가요, 가요가요가요가요──앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「イッグぅううぅぅうぅぅうう～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「オオオォぉおぉおお～っ<emoji=heart04>\u3000ぉおおおおおっ<emoji=heart04>\u3000ほぉぉおぉおおお～～～っ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오오오오오오오~옷<emoji=heart04> 오오오오오오옷<emoji=heart04> 호오오오오오오오오~~~옷……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "４人全員の一斉の射精──セナリィの美しい肢体が一瞬にして汚されていく。"
translation = "4명 전원의 일제 사정── 세나리의 아름다운 지체가 순식간에 더러워져 간다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「お、おぅうっ<emoji=heart04>\u3000おぉおお～っ<emoji=heart04>\u3000おぉおうぅうおおぉ<emoji=heart04>\u3000精液、すっごぉっ……オぁあぁあっ……ぁ、がァ、あぁぁあ──<emoji=heart04>」"
translation = "「어, 어우우웃<emoji=heart04> 오오오오~옷<emoji=heart04> 오오오우우오오오<emoji=heart04> 정액, 엄청나아…… 오아아아앗…… 아, 가, 아아아아──<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「おま○こっ……あうう<emoji=heart04>\u3000あなりゅっ……ふぅ、ぅうっ……<emoji=heart04>\u3000そして、お、お顔まで、ぉおっ……<emoji=heart04>」"
translation = "「보지잇…… 아우우<emoji=heart04> 애널으으…… 후우, 우웃……<emoji=heart04> 그리고, 어, 얼굴까지, 오옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「全身で、会長様の精液、あ、浴びてっ……ほぉ、ぅうっ……はぁ、あああっ……し、幸せ、ぇええっ……<emoji=heart04><emoji=heart04>」"
translation = "「온몸으로, 회장님의 정액, 아, 뒤집어쓰고…… 호오, 우웃…… 하아, 아아앗…… 해, 행복해, 에에엣……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが痺れるほどの大量射精を４人分──それもようやく終わりを告げて……"
translation = "페니스가 저릴 정도의 대량 사정을 4인분── 그것도 마침내 끝을 고하고……"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「んんぁあぁあっ……<emoji=heart04>\u3000はぁあぁ～っ……はぁぁああ～っ……はふぅう、ふぅうう～っ……<emoji=heart04>」"
translation = "「응으아아아앗……<emoji=heart04> 하아아아~앗…… 하아아아아~앗…… 하후우, 후우우~앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「こ、これぇ……５Ｐ……凄まじい、快感ですわ、ぁ……ふ、ぅっ<emoji=heart04>\u3000あ、まだ──おま○こイグ<emoji=heart04>\u3000イクッ……うぅう──オっ<emoji=heart04>」"
translation = "「이, 이거어…… 5P…… 엄청난, 쾌감이에요, 아…… 후, 읏<emoji=heart04> 아, 아직── 보지 가버려<emoji=heart04> 가버렷…… 우우── 오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あ、あひぃっ……<emoji=heart04>\u3000イった衝撃で、アナルもっ──お、おぉぅっ……<emoji=heart04>\u3000甘イキ、と、止まりません、わあ、ぁっ……<emoji=heart04>\u3000はうぅ<emoji=heart04>」"
translation = "「아, 아히잇……<emoji=heart04> 가버린 충격으로, 애널도── 오, 오오웃……<emoji=heart04> 단내 섞인 숨이, 머, 멈추지 않아요, 아, 앗……<emoji=heart04> 하우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セックスが終わってもなお、ビクつきの止まらないセナリィ。流石に今日はもう無理だろう……そう思って腰を引こうとする俺たちだったが。"
translation = "섹스가 끝났음에도 여전히, 경련이 멈추지 않는 세나리. 역시 오늘은 이제 무리겠지…… 그렇게 생각하며 허리를 빼려던 우리들이었지만."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あ、だ、ダメっ……<emoji=heart04>\u3000まだ、ですわっ……<emoji=heart04>\u3000お手々で、シゴいた会長様たちも……<emoji=heart04>」"
translation = "「아, 아, 안 돼……<emoji=heart04> 아직, 이에요옷……<emoji=heart04> 손으로, 흔들어 주신 회장님들도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「わ、私のおま○こか、アナルっ……どっちか、使って、ほ、欲しいですわ……っ<emoji=heart04>」"
translation = "「제, 제 보지나, 애널…… 어느 쪽이든, 써, 써 주셨으면 해요……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「分け隔て、なく<emoji=heart04>\u3000愛したい、ですわ……<emoji=heart04>\u3000４人の恋人に優劣なんて、つけたくありません、ものっ……<emoji=heart04>」"
translation = "「차별, 없이<emoji=heart04> 사랑하고 싶어, 요……<emoji=heart04> 4명의 연인에게 우열 같은 건, 두고 싶지 않으니까, 요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「どうぞっ……た、立ち位置を変えて……ご満足するまで……セナリィを抱いてください……ぴょんっ<emoji=heart04>」"
translation = "「어서요…… 서, 서 있는 위치를 바꿔서…… 만족하실 때까지…… 세나리를 안아 주세요…… 뿅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなこと言われたら、止まれなくなる。俺たち全員、満足するまでセナリィを抱き潰すことになってしまうのに。"
translation = "그런 말을 들으면, 멈출 수 없게 된다. 우리들 전원, 만족할 때까지 세나리를 안아 뭉개버리게 될 텐데."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「望むところ、ですわ<emoji=heart04>\u3000だって<emoji=heart04>\u3000愛しております、ものっ<emoji=heart04>\u3000会長様──来てぇ……っ<emoji=heart04>」"
translation = "「바라던 바, 예요<emoji=heart04> 그야<emoji=heart04> 사랑하고 있으니까, 요<emoji=heart04> 회장님── 와 줘요……읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは立ち位置を変え、セナリィにたっぷりの劣情をぶつけた。"
translation = "그렇게 우리들은 위치를 바꾸어, 세나리에게 듬뿍 열정을 쏟아부었다."

[[dialogue]]
speaker = "unk"
original = "結局１人あたり５発──合計２０発を、バニーのセナリィに注いで、飲ませて、ぶっかけた。"
translation = "결국 1인당 5발── 합계 20발을, 바니 차림의 세나리에게 쏟아붓고, 먹이고, 뿌려댔다."

[[dialogue]]
speaker = "unk"
original = "そしてくたびれ果てた５人全員で、泥のような眠りに就いたのだった──"
translation = "그리고 기진맥진해진 5명 전원, 진흙 같은 잠에 빠져들었다──"

