[[dialogue]]
speaker = "unk"
original = "フニが高熱を出して倒れてしまった翌日。"
translation = "후니가 고열을 내며 쓰러진 다음 날."

[[dialogue]]
speaker = "unk"
original = "あれから、病院の先生を呼んだり、両学園の強力な回復星術を使える生徒にお願いしたりと手は尽くしているが、未だに彼女は目覚めていなかった。"
translation = "그때부터 병원 선생님을 부르기도 하고, 두 학원의 강력한 회복 성술을 쓰는 학생들에게 부탁하기도 하며 손을 썼지만 아직 그녀는 눈을 뜨지 못하고 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まさか、こんなことになるなんて……」"
translation = "「설마 이렇게 될 줄이야……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「これって多分、フニちゃんの中にいるっていう不死鳥……ホウちゃんの影響だよね？」"
translation = "「이거 아마 후니 짱 안에 있다는 불사조…… 호우 짱의 영향이겠지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お医者さんも、魔獣がヒトの体の中に共生しているケースなんて聞いたことがないから、すぐには解決方法がわからないって言ってた……」"
translation = "「의사 선생님도 마수가 인간의 몸 안에서 공생하는 케이스 따위 들어본 적이 없어서 바로 해결 방법은 모르겠다고 하셨대……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「一体、どうしたら……」"
translation = "「대체 어쩌면 좋아……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「もしかしたら、わかるかもしれないわ」"
translation = "「어쩌면 알 수 있을지도 몰라요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「昨日、フニが倒れて、そのおでこに触れた時……」"
translation = "「어제 후니가 쓰러졌을 때 이마에 손을 댔더니……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしのことを呼ぶ声が聞こえたの。最初はフニが言っているのかと思っていたのだけれど……」"
translation = "「저를 부르는 목소리가 들렸어요. 처음엔 후니가 말하는 건가 싶었지만……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「今、この流星寮のロビーまで来てわかったわ。フニの部屋の方から、別の気配が伝わってきてる」"
translation = "「지금 이 유성 기숙사 로비까지 와보니 알겠어요. 후니의 방 쪽에서 다른 기운이 전해져 오고 있어요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それってもしかして……」"
translation = "「그거 혹시……」"

[[dialogue]]
speaker = "unk"
original = "不死鳥の……？"
translation = "불사조의……?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ。多分……わたくしは、もしかしたら――」"
translation = "「네. 아마도…… 저는 어쩌면――」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「転生する前、アウクセシアだった時に、その不死鳥に会ったことがあるのかもしれないわ」"
translation = "「전생하기 전, 아우크세시아였을 때 그 불사조와 만난 적이 있을지도 몰라요.」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、フニの様子を見に、彼女の部屋を訪れる。"
translation = "그리하여 우리들은 후니의 상태를 보러 그녀의 방을 방문했다."

[[dialogue]]
speaker = "unk"
original = "セシアが近づいて、フニの額にそっと触れると――"
translation = "세시아가 다가가 후니의 이마에 살며시 손을 대자――"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっ、何これ……！？ 一体何が起こってるの……！？」"
translation = "「엣, 뭐야 이거……!? 대체 무슨 일이 일어나는 거야……!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「これは……」"
translation = "「이건……」"

[[dialogue]]
speaker = "unk"
original = "視界が開けると、そこには見知らぬ景色が広がっていた。"
translation = "시야가 트이자 그곳에는 낯선 풍경이 펼쳐져 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「な、何ここ……！？」"
translation = "「여, 여기 어디야……!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「多分これは――フニの中の『精神世界』よ。そして、この風景の元となった場所は魔界……わたくし、何となくだけど、この風景の場所へ来たことがある気がするわ」"
translation = "「아마 여기는―― 후니 안의 『정신 세계』예요. 그리고 이 풍경의 모태가 된 장소는 마계…… 저는 왠지 모르겠지만 이 풍경이 있는 곳에 와본 적이 있는 기분이 들어요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それにあたし達、なんか勝手にクリスマスフォームに変身してるよ！？ これって……？」"
translation = "「그보다 우리 왠지 멋대로 크리스마스 폼으로 변신해 있어!? 이건……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それはおそらく――」"
translation = "「그건 아마도――」"

[[dialogue]]
speaker_original = "フェニックス"
speaker_translation = "피닉스"
original = "「お待ちしていました。守護天使アウクセシア」"
translation = "「기다리고 있었습니다. 수호천사 아우크세시아.」"

[[dialogue]]
speaker = "unk"
original = "声は、空から聞こえてきた。"
translation = "목소리는 하늘에서 들려왔다."

[[dialogue]]
speaker = "unk"
original = "俺たちが見上げると、大きな翼を広げた影が俺たちの前へと降り立つ。"
translation = "우리가 올려다보자 커다란 날개를 펼친 그림자가 우리 앞에 내려앉았다."

[[dialogue]]
speaker_original = "フェニックス"
speaker_translation = "피닉스"
original = "「初めまして、ルルカ。そして、お久しぶりです、アウクセシア、ラクシス――いえ、今はセシアとクロト、でしたか」"
translation = "「처음 뵙겠습니다, 루루카. 그리고 오랜만이군요, 아우크세시아, 라크시스―― 아니, 지금은 세시아와 쿠로토라고 했던가요.」"

[[dialogue]]
speaker_original = "フェニックス"
speaker_translation = "피닉스"
original = "「フニから話に聞いていると思いますが、私がヒトに呼ばれる不死鳥――魔獣『フェニックス』です」"
translation = "「후니에게 들어서 알고 있겠지만, 제가 인간에게 불리는 불사조―― 마수 『페닉스』입니다.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「その姿……フニは今、あなたの中にいるのね」"
translation = "「그 모습…… 후니는 지금 당신 안에 있는 거군요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "フェニックス"
speaker_translation = "피닉스"
original = "「……ええ、その通りです。ここ最近で、私との融合が加速度的に進んでいます」"
translation = "「……네, 그렇습니다. 최근 들어 저와의 융합이 가속도적으로 진행되고 있습니다.」"

[[dialogue]]
speaker_original = "フェニックス"
speaker_translation = "피닉스"
original = "「単刀直入に言いましょう、セシア。あなたをここに呼んだのは他でもありません――」"
translation = "「단도직입적으로 말하죠, 세시아. 당신을 여기에 부른 건 다름이 아닙니다――」"

[[dialogue]]
speaker_original = "フェニックス"
speaker_translation = "피닉스"
original = "「あなたの守護天使の力で、私を消して欲しいのです」"
translation = "「당신의 수호천사의 힘으로 저라는 존재를 지워주셨으면 합니다.」"

[[dialogue]]
speaker = "unk"
original = "不死鳥は落ち着きながらもはっきりとした声で、そう告げるのだった――"
translation = "불사조는 차분하면서도 명확한 목소리로 그렇게 고하는 것이었다――"

