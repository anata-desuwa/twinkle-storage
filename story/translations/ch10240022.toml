[[dialogue]]
speaker = "unk"
original = "第２話,ヨミとクリスマス,P"
translation = "제2화, 요미와 크리스마스, P"

[[dialogue]]
speaker = "unk"
original = "今日はクリスマス当日。一緒に過ごそうと約束していたヨミが、家を訪ねてきた――"
translation = "오늘은 크리스마스 당일. 함께 보내기로 약속했던 요미가 집으로 찾아왔다──"

[[dialogue]]
speaker = "ヨミ"
original = "「め、メリークリスマスです、会長……♪」"
translation = "「메, 메리 크리스마스예요, 회장님……♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「――あ、この衣装ですか？\u3000せっかくのクリスマスなので、今日こそ出番かなって……」"
translation = "「──아, 이 의상 말인가요? 기왕 크리스마스니까 오늘이야말로 입을 때인가 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "似合ってて、とてもかわいいよ"
translation = "잘 어울려, 정말 귀여워."

[[dialogue]]
speaker = "ヨミ"
original = "「えへへ……♪\u3000会長に褒められると、照れちゃいます……<emoji=heart04>」"
translation = "「에헤헤……♪ 회장님이 칭찬해 주시니 쑥스럽네요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「それで、今日は会長にクリスマスプレゼントを用意してきてまして――これ、どうぞ……！」"
translation = "「그래서 오늘은 회장님께 드릴 크리스마스 선물을 준비해 왔어요── 이거 받으세요……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「もちろん、中身を開けて大丈夫ですよ。喜んでもらえるかどうかわからなくて、色々悩んだんですけど……」"
translation = "「물론 내용물을 열어보셔도 돼요. 좋아해 주실지 몰라서 이것저것 고민했는데……」"

[[dialogue]]
speaker = "ヨミ"
original = "「でも、私が会長に渡したいものを選ぶことにしました。ちょっと恥ずかしいんですけど……」"
translation = "「하지만 제가 회장님께 드리고 싶은 걸 고르기로 했어요. 조금 부끄럽지만……」"

[[dialogue]]
speaker = "unk"
original = "これは、お守り？"
translation = "이건 부적이야?"

[[dialogue]]
speaker = "ヨミ"
original = "「はい。実家の天ヶ崎神宮に伝わるやり方で作ったものでして……<b>縁結び</b>のお守りなんです……」"
translation = "「네. 본가인 아마가사키 신궁에 전해 내려오는 방식으로 만든 건데…… <b>인연</b> <b>맺기</b> 부적이에요……」"

[[dialogue]]
speaker = "ヨミ"
original = "「その……これからもずっと、一緒にいられますようにって。えへへ……♪」"
translation = "「그…… 앞으로도 계속 함께 있을 수 있기를 빌며. 에헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "照れながら言うヨミに、愛おしい気持ちが込み上げてくる。俺も用意していたプレゼントを渡すことにした。"
translation = "수줍게 말하는 요미에게 사랑스러운 마음이 솟구친다. 나도 준비한 선물을 건네기로 했다."

[[dialogue]]
speaker = "ヨミ"
original = "「え、会長も私にクリスマスプレゼントを……？\u3000あ、ありがとうございます……♪」"
translation = "「에, 회장님도 제게 크리스마스 선물을……? 고, 고맙습니다……♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「わあぁ……綺麗な鈴のペンダント……！」"
translation = "「와아…… 예쁜 방울 펜던트……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「あれ？\u3000これ、鈴に宝石が付いてませんか？\u3000なんだかすごく高価そうな……」"
translation = "「어라? 이거 방울에 보석이 박혀 있지 않나요? 왠지 굉장히 비싸 보이는데……」"

[[dialogue]]
speaker = "ヨミ"
original = "「――えっ、秘密でバイトして買ったんですか？\u3000そんな高いものを私に……？」"
translation = "「──엣, 비밀로 아르바이트해서 사신 거예요? 그런 비싼 걸 제게……?」"

[[dialogue]]
speaker = "unk"
original = "確かにちょっと高かったけど、鈴型で珍しいし、ヨミに似合いそうだからプレゼントしたかったのだ。そのことを伝えると――"
translation = "확실히 좀 비쌌지만, 방울 모양이라 특이하고 요미에게 잘 어울릴 것 같아서 선물하고 싶었어. 그 말을 전하자──"

[[dialogue]]
speaker = "ヨミ"
original = "「会長……爆裂嬉しいです<emoji=heart04>\u3000大切にします……！」"
translation = "「회장님…… 폭렬 기뻐요<emoji=heart04> 소중히 간직할게요……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「お礼にってわけじゃないですけど、私、会長にもう１つプレゼントがあるんです。受け取ってくれますか？」"
translation = "「답례라고 하긴 그렇지만 저, 회장님께 선물이 하나 더 있어요. 받아주시겠어요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「できました。会長、どうぞ召し上がってみて下さい」"
translation = "「다 됐습니다. 회장님, 어서 드셔보세요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「――はい。会長に食べてもらう為に、実は前々から料理の練習をしていたんです」"
translation = "「──네. 회장님께 대접하기 위해 사실 전부터 요리 연습을 하고 있었거든요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「まだまだ未熟なので、簡単な親子丼と、お味噌汁ではあるんですけど……」"
translation = "「아직 미숙해서 간단한 오야코동과 미소시루뿐이긴 하지만……」"

[[dialogue]]
speaker = "ヨミ"
original = "「ど、どうでしょうか……？」"
translation = "「어, 어떤가요……?」"

[[dialogue]]
speaker = "unk"
original = "うまい！"
translation = "맛있어!"

[[dialogue]]
speaker = "ヨミ"
original = "「本当ですか？\u3000よかったです……♪」"
translation = "「정말인가요? 다행이다……♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「私、カフェテリアでも受付担当に回されてしまうくらい、料理が苦手だったんですけど……その――」"
translation = "「저, 카페테리아에서도 접수 담당으로 밀려날 정도로 요리를 못 했지만…… 그──」"

[[dialogue]]
speaker = "ヨミ"
original = "「将来の為に、料理は上手くなっておきたいなって、思ったので……」"
translation = "「미래를 위해서 요리는 잘해두고 싶다고 생각해서……」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ……会長……<emoji=heart04>」"
translation = "「앗…… 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「そんないきなり抱き締められたら、ドキドキしちゃいます……<emoji=heart04>」"
translation = "「그렇게 갑자기 안아주시면 두근거려버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヨミが可愛いことを言うのが悪い"
translation = "요미가 귀여운 소리를 하는 게 나빠."

[[dialogue]]
speaker = "ヨミ"
original = "「そんなつもりは……くんくん……<emoji=heart04>」"
translation = "「그럴 의도는…… 킁킁……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はあぁ……<emoji=heart04>\u3000好きな会長の匂いで私、ウットリしてきちゃいます……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 좋아하는 회장님 냄새에 저, 황홀해져버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もヨミの匂い、好きだよ"
translation = "나도 요미 냄새 좋아해."

[[dialogue]]
speaker = "ヨミ"
original = "「こやん<emoji=heart04>\u3000嗅がれるのはまだ、恥ずかしいです……<emoji=heart04>」"
translation = "「코양<emoji=heart04> 맡아지는 건 아직 부끄러워요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ、だ、ダメです会長<emoji=heart04>\u3000これ以上スキンシップしてたら、止まらなくなっちゃいますから……！」"
translation = "「앗, 아, 안 돼요 회장님<emoji=heart04> 이 이상 스킨십하면 멈출 수 없게 되어버리니까요……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「せめて、食事が終わってから――んっ……<emoji=heart04>」"
translation = "「적어도 식사가 끝나고 나서── 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「会長……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に甘いクリスマスを過ごしていると、あっという間に夜になってしまう。"
translation = "그렇게 달콤한 크리스마스를 보내고 있으니 어느새 밤이 되어버렸다."

[[dialogue]]
speaker = "ヨミ"
original = "「もうこんな時間……名残惜しいですが、そろそろお屋敷に帰らないといけませんね……」"
translation = "「벌써 시간이 이렇게…… 아쉽지만 슬슬 저택으로 돌아가야겠네요……」"

[[dialogue]]
speaker = "ヨミ"
original = "「――え？\u3000そのことなら大丈夫？」"
translation = "「──에? 그 일이라면 괜찮다고요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「――ヴィーナスお嬢様に許可をもらっている……ですか？\u3000今日はずっと、私と一緒にいたいからって？」"
translation = "「──비너스 아가씨께 허락을 받았다……고요? 오늘은 계속 저와 함께 있고 싶다면서요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「こ、こやあぁぁ～～～っ。なんかそれ、周りに今日のことが伝わっちゃってるってことですよね……？\u3000ば、爆裂恥ずかしいです……！」"
translation = "「코, 코야아아~~. 왠지 그거 주변에 오늘 일이 다 알려졌다는 소리죠……? 폭, 폭렬 부끄러워요……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「――い、いえ。嫌じゃないです……恥ずかしいですけど、正直……嬉しいです」"
translation = "「──아, 아니요. 싫지 않아요…… 부끄럽긴 하지만 솔직히…… 기뻐요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「私もまだ、会長と離れたくなかったですから……<emoji=heart04>」"
translation = "「저도 아직 회장님과 떨어지기 싫었으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヨミ、好きだ"
translation = "요미, 좋아해."

[[dialogue]]
speaker = "ヨミ"
original = "「はい……<emoji=heart04>\u3000私も、好きです……<emoji=heart04>」"
translation = "「네……<emoji=heart04> 저도 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「――ん……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「──응……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺とヨミはそれからもゆっくりと、お互いの好きを確かめ合うのだった――"
translation = "나와 요미는 그 후로도 천천히 서로의 사랑을 확인하는 것이었다──"

