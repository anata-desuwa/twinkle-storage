[[dialogue]]
speaker = "unk"
original = "第２話,ヴィーナスと星見姉妹,P"
translation = "제2화, 비너스와 호시미 자매, P"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「パパ、私ね、やってみたいことがあるの！」"
translation = "「아빠, 나 말이야, 해보고 싶은 게 있어!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「前にパパが女の子に変身して、附属校に通ってたことがあったでしょ？」"
translation = "「전에 아빠가 여자애로 변신해서 부속 학교에 다녔던 적이 있었지?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「私もあれと同じように、附属校に通ってみたいわ！」"
translation = "「나도 그것처럼 부속 학교에 다녀보고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "――と、そんなやりとりがあり、あっという間に附属校への体験転入を始めてしまったヴィーナス。"
translation = "――라는 대화가 오가고, 눈 깜짝할 사이에 부속 학교 체험 전입을 시작해 버린 비너스."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「パパ、ただいま～♪」"
translation = "「아빠, 다녀왔어~♪」"

[[dialogue]]
speaker = "unk"
original = "おかえり。附属校はどうだった？"
translation = "「왔어? 부속 학교는 어땠어?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「すっごく楽しかったわ！\u3000それでね、同じクラスに――」"
translation = "「정말 즐거웠어! 그래서 말인데, 같은 반에――」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ヴィーナス～！」"
translation = "「비너스~!」"

[[dialogue]]
speaker = "unk"
original = "そう言って星徒会室に駆け込んできたのは、なんとアポロだった。"
translation = "그렇게 말하며 성도회실로 달려 들어온 것은, 놀랍게도 아폴로였다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ヤバイぞ！\u3000すぐそこのスーパー、ポテトチップスが半額らしい！\u3000早く買いに行こうぜ！」"
translation = "「위험해! 바로 저기 슈퍼에서 감자칩이 반값이라나 봐! 빨리 사러 가자고!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「本当！？\u3000それってつまり、いつもと同じお金で倍の量を買えるってことよね！？」"
translation = "「정말!? 그건 즉 평소랑 같은 돈으로 두 배의 양을 살 수 있다는 거지!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あっ、そうか！\u3000そう考えたら、２個買った方が得だな！」"
translation = "「앗, 그렇구나! 그렇게 생각하면 2개 사는 게 이득이네!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いや待てよ……ってことは、お互いに２個ずつ別の味を買って分け合えば、４倍楽しめるってことじゃねーか！？」"
translation = "「아니 잠깐만…… 그렇다는 건 서로 2개씩 다른 맛을 사서 나눠 먹으면 4배로 즐길 수 있다는 거 아냐!?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「さすがアポロ、天才ね！」"
translation = "「역시 아폴로, 천재네!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「あっ、私も思いついたわ！\u3000それ、パパの分も買えば、６倍になるんじゃないかしら！？」"
translation = "「앗, 나도 생각났어! 그거 아빠 몫까지 사면 6배가 되지 않을까!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おいおいヴィーナス、お前、閃きの天才か！？\u3000ひゃっほーい！\u3000なら今日は、みんなでポテトパーティーだぜ～♪」"
translation = "「어이어이 비너스, 너 번뜩임의 천재냐!? 히야호! 그럼 오늘은 다 같이 포테토 파티다~♪」"

[[dialogue]]
speaker = "unk"
original = "いや仲いいな、２人共！"
translation = "「아니, 둘이 정말 친하네!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よう、魔王！\u3000今日附属校の方で、ヴィーナスと改めて仲よくなったぞ！」"
translation = "「여어, 마왕! 오늘 부속 학교 쪽에서 비너스랑 다시 친해졌다고!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「実は附属校で、アポロと同じクラスになったのよ♪」"
translation = "「사실 부속 학교에서 아폴로랑 같은 반이 됐어♪」"

[[dialogue]]
speaker = "unk"
original = "そういえば、アポロはフィオナの姉ではあるが……目覚めるまでは体の成長が止まっていた為、現在は附属校の１年生として学園生活を送っている。"
translation = "그러고 보니 아폴로는 피오나의 언니이긴 하지만…… 깨어나기 전까지 몸의 성장이 멈춰 있었기 때문에, 현재는 부속 학교 1학년으로서 학원 생활을 보내고 있다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いや～、でもまさか、ヴィーナスの体が小さくなって附属校に来るなんてな～。テンションの上がるサプライズだったぜ！」"
translation = "「이야~ 근데 설마 비너스의 몸이 작아져서 부속 학교에 올 줄이야. 텐션 올라가는 서프라이즈였다고!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは附属校の１年生として体験転入することになったので、そこでたまたま、アポロと同じクラスになったようだ。"
translation = "비너스는 부속 학교 1학년으로 체험 전입을 하게 되었기에, 거기서 우연히 아폴로와 같은 반이 된 모양이다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「――それでね、アポロと放課後、２人で遊ぶ約束をしてたの♪」"
translation = "「――그래서 말이야, 아폴로랑 방과 후에 둘이서 놀기로 약속했어♪」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「前からヴィーナスとは気が合うと思ってたんだ！\u3000せっかくクラスメイトにもなったわけだし、いい機会だったからな！」"
translation = "「전부터 비너스랑은 마음이 잘 맞는다고 생각했거든! 마침 클래스메이트도 됐고 좋은 기회였으니까!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「そうね♪\u3000私たち、これからもっと仲よしになれそうな気がするわ！」"
translation = "「그렇네♪ 우리들, 앞으로 더 사이좋게 지낼 수 있을 것 같은 기분이 들어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ！\u3000家でポテトパーティーをしながら、一緒に流星ライダーを観ようぜ！」"
translation = "「아아! 집에서 포테토 파티를 하면서 같이 유성 라이더를 보자고!」"

[[dialogue]]
speaker = "unk"
original = "それから、俺も一緒にスーパーへ行って、大量の半額ポテトチップスを買い込み、星見家へお邪魔することになった。"
translation = "그 후, 나도 함께 슈퍼에 가서 대량의 반값 감자칩을 사들고 호시미 가에 실례하게 되었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん、ただいま帰りました～」"
translation = "「언니, 다녀왔습니다~」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう、フィオナ、お帰り～！\u3000もぐもぐ……お前も一緒にポテトパーティーやろうぜ！」"
translation = "「오우, 피오나, 왔냐! 우물우물…… 너도 같이 포테토 파티 하자고!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ポテトパーティー……？\u3000って、緋宮会長も！？」"
translation = "「포테토 파티……? 어라, 히미야 회장님도!?」"

[[dialogue]]
speaker = "unk"
original = "お邪魔してます"
translation = "「실례하고 있어.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それにそちらは……」"
translation = "「그리고 그쪽은……」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「私よ、フィオナ！\u3000前にチャットで言ってた、『リトルフォーム』に変身してるの♪」"
translation = "「나야, 피오나! 전에 채팅으로 말했던 『리틀 폼』으로 변신 중이야♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「えっ、もしかして、ヴィーナスさんですか！？\u3000ね、姉さんと同じくらい小さくて可愛い……！」"
translation = "「엣, 혹시 비너스 씨인가요!? 어, 언니만큼이나 작고 귀여워……!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「あっ、今は附属生になってるから、呼び方を変えた方がいいかしら？」"
translation = "「앗, 지금은 부속생이니까 부르는 법을 바꾸는 게 좋을까?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「お邪魔してるわ、フィオナお姉ちゃん♪」"
translation = "「실례할게, 피오나 언니♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お、お姉ちゃん！？」"
translation = "「어, 언니!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わ、私が、お姉ちゃんに……！\u3000はあぁあっ<emoji=heart04>」"
translation = "「내, 내가 언니가 되다니……! 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000『お姉ちゃん』呼びに憧れがあったのか？\u3000まあ確かに、フィオナが『お姉ちゃん』って呼ばれることはないな！」"
translation = "「응? 『언니』라고 불리는 거에 동경이 있었나? 뭐 확실히 피오나가 『언니』라고 불릴 일은 없지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふむふむ。そうなると、あたしが長女で、フィオナが次女、ヴィーナスが三女か……アリだな！」"
translation = "「흠흠. 그렇게 되면 내가 장녀고, 피오나가 차녀, 비너스가 삼녀인가…… 괜찮네!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ヴィーナス、あたしのことも、お姉ちゃんって呼んでいいぞ！」"
translation = "「비너스, 나도 언니라고 불러도 된다고!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「いいわね！\u3000アポロお姉ちゃん♪\u3000これからよろしくね！」"
translation = "「좋아! 아폴로 언니♪ 앞으로 잘 부탁해!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう♪\u3000姉妹みたいに仲よくしようぜ！」"
translation = "「오우♪ 자매처럼 사이좋게 지내자고!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そ、そうですね……！」"
translation = "「그, 그렇네요……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ヴィーナスさんがリトルフォームの時は、本物のお姉ちゃんになったつもりで、絆を深め合うのはアリかもしれませんっ！」"
translation = "「비너스 씨가 리틀 폼일 때는 진짜 언니가 된 셈 치고 유대를 깊게 다지는 건 괜찮을지도 모르겠어요!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「本当？\u3000じゃあ、フィオナお姉ちゃんには、遠慮なく甘えちゃうわね♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「정말? 그럼 피오나 언니한테는 사양 않고 어리광 부릴게♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふわわぁっ！？\u3000そんな甘えるように抱き着いてきて……！\u3000か、可愛いっ<emoji=heart04>\u3000つい頭をナデナデしたくなってしまいます……！」"
translation = "「후와와앗!? 그렇게 어리광 부리듯이 안겨 오다니……! 귀, 귀여워<emoji=heart04> 나도 모르게 머리를 쓰다듬어주고 싶어져요……!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「あっ……えへへ<emoji=heart04>\u3000お姉ちゃんの手、くすぐったいわ♪」"
translation = "「앗…… 에헤헤<emoji=heart04> 언니 손, 간지러워♪」"

[[dialogue]]
speaker = "unk"
original = "（ヴィーナスって、実は魔性の女なのかも……）"
translation = "(비너스는 사실 마성의 여자인 걸지도……)"

[[dialogue]]
speaker = "unk"
original = "そうして、星見姉妹から妹のように可愛がられるヴィーナスなのであった。"
translation = "그렇게 호시미 자매로부터 여동생처럼 귀여움받는 비너스였다."

