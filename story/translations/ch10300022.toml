[[dialogue]]
speaker = "unk"
original = "第２話,ナミエルと婿修行,P"
translation = "제2화, 나미엘과 사위 수행"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「拭き取りが甘いですよ。しっかり水気を取りきらないと窓に拭き跡が残ってしまいます」"
translation = "「물기가 덜 닦였습니다. 제대로 물기를 다 닦아내지 않으면 창문에 자국이 남는다고요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あれ？\u3000何してるんですか、お二人とも」"
translation = "「어라? 뭐 하고 계세요, 두 분 다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ああフニさま。緋宮会長にお掃除の指導をしていたところです」"
translation = "「아, 후니 님. 히노미야 회장님께 청소 지도를 하던 중이었습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「今のご時世、夫も家事ができないと話になりませんからね。緋宮会長は今もそれなりですが、さらなるレベルアップをしていただく必要があります」"
translation = "「요즘 세상에 남편도 집안일을 못 하면 말이 안 되니까요. 히노미야 회장님은 지금도 어느 정도 하시지만, 더 레벨업을 하실 필요가 있습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ほらそこ。埃が残っていますよ。隅々まで目を光らせてお掃除してください」"
translation = "「자, 거기. 먼지가 남아 있어요. 구석구석 눈을 부라리며 청소해 주세요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ふふ、ラブラブなんだね。会長さんとお付き合いしてるのは知ってたけど、思ってた以上にナミエルちゃんが幸せそうで良かった」"
translation = "「후후, 꽁냥거리고 있네. 회장님이랑 사귀고 있는 건 알고 있었지만, 생각했던 것 이상으로 나미엘 짱이 행복해 보여서 다행이야.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「なっ。どうしてそうなるんですか。単に家事を教えているだけと言ったでしょう。おかしな勘違いしていませんか？」"
translation = "「나앗. 어째서 그렇게 되는 겁니까. 단순히 집안일을 가르치고 있을 뿐이라고 했잖습니까. 이상한 오해 하고 계신 거 아니에요?」"

[[dialogue]]
speaker = "unk"
original = "デートじゃなかったんだ？"
translation = "데이트가 아니었어?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「～～っっ！\u3000違います！\u3000誰が雇われ先でデートなんかしますかっ。馬鹿なこと言わずに手を動かしてください」"
translation = "「~~~~! 아닙니다! 누가 고용된 곳에서 데이트 같은 걸 합니까. 바보 같은 소리 말고 손을 움직이세요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ、やっぱりラブラブじゃないですかぁ。そんなにヤイヤイ言うナミエルちゃん初めて見ましたよ～」"
translation = "「에헤헤, 역시 꽁냥거리는 거 맞잖아요~ 그렇게 쫑알쫑알 말하는 나미엘 짱 처음 봤다고요~」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「それに、さっき夫も家事ができないと話にならないって言ってましたし。会長さんとのこと、そこまで考えてるんですね？」"
translation = "「게다가 아까 남편도 집안일을 못 하면 말이 안 된다고 했고요. 회장님이랑 거기까지 생각하고 있는 거죠?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「へ……？\u3000っっ。それは言葉の綾で……！」"
translation = "「헤……? 윽. 그건 말실수로……!」"

[[dialogue]]
speaker = "unk"
original = "それ母さんにも言ってたね"
translation = "그거 엄마한테도 말했었지"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「黙ってください。次に許可なくその口を開いたらモップを突っ込みますよ。そのうるさい口を掃除してあげますから」"
translation = "「조용히 하세요. 다음에 허가 없이 그 입을 열면 걸레를 처박아 버릴 겁니다. 그 시끄러운 입을 청소해 드릴 테니까요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「照れなくてもいいじゃないですかぁ。やっぱりアレですか？\u3000この間の花嫁騒動で将来を意識するようになったとか」"
translation = "「부끄러워하지 않아도 되잖아요~ 역시 그거예요? 요전의 신부 소동으로 장래를 의식하게 됐다거나.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「照れてもいませんし、意識もしていません。……あまりおかしな口を叩きますと、フニさまのお口も掃除しますよ？」"
translation = "「부끄러워하지도 않고 의식하지도 않습니다. ……자꾸 이상한 소리 하시면 후니 님 입도 청소해 버릴 거예요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴぃっ！？\u3000め、目から本気の殺気が漏れてますよぉ……！」"
translation = "「삐익!? 누, 눈에서 진심 어린 살기가 뿜어져 나오고 있어요……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まったくもう。私は本当にただ緋宮会長に家事を教えていただけですのに」"
translation = "「정말이지 원. 저는 정말 그냥 히노미야 회장님께 집안일을 가르치고 있었을 뿐인데.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そうだ。丁度いいです。フニさま、私の代わりに緋宮会長の指導をしてください」"
translation = "「맞다. 마침 잘됐네요. 후니 님, 저 대신 히노미야 회장님 지도를 해주세요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴえ？\u3000私がですか？」"
translation = "「삐에? 제가요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「イチャイチャしているように思われるのは心外ですから。それにフニさまの勉強にもなります」"
translation = "「꽁냥거리는 것처럼 보이는 건 불쾌하니까요. 게다가 후니 님 공부도 될 겁니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「人に教えるには三倍の理解が必要と言いますからね。今までのアルバイトの成果、見せてもらいますよ」"
translation = "「남을 가르치려면 세 배의 이해가 필요하다고 하니까요. 지금까지의 아르바이트 성과를 보여주시죠.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「うっ、まさかの抜き打ち業務審査……！？\u3000い、いいですけど、ナミエルちゃんはいいんですか？\u3000せっかく会長さんと二人きりで過ごせますのに……」"
translation = "「윽, 설마 했던 기습 업무 심사……!? 아, 알았지만 나미엘 짱은 괜찮아요? 모처럼 회장님이랑 둘이서 보낼 수 있는데……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですから構いません。デートではないと何度言えばわかるんですか」"
translation = "「그러니까 상관없다고요. 데이트가 아니라고 몇 번을 말해야 알아듣겠습니까.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それより早く指導を始めてください。私は少し離れたところで見ていますから」"
translation = "「그것보다 빨리 지도를 시작하세요. 저는 조금 떨어진 곳에서 보고 있을 테니까.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はい……！」"
translation = "「네, 네……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ええとですね……？\u3000テーブルを拭かれる時は、薄めた中性洗剤を使って拭いていきまして……。アルコールは使っちゃダメですよ？\u3000塗料が溶けちゃう恐れがありまして──」"
translation = "「음 그러니까요……? 테이블을 닦으실 때는 희석한 중성세제를 사용해서 닦아 나가시고요……. 알코올은 쓰면 안 돼요! 도료가 녹을 우려가 있어서──」"

[[dialogue]]
speaker = "unk"
original = "こういう感じかな"
translation = "이런 느낌인가"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わぁ、とってもお上手ですね会長さん！\u3000私なんかより、よっぽど筋がいいですよぉ～！」"
translation = "「와아, 정말 잘하시네요 회장님! 저보다 훨씬 소질이 있으세요~!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ、調子に乗っちゃいましたね～？\u3000拭き残しがありますよ～？\u3000ほーら、ここです、ここ──……って。しゅ、しゅみませんっ、お顔近づけ過ぎちゃいましたねっ」"
translation = "「아, 우쭐해지셨나요~? 덜 닦인 곳이 있다고요~? 자~ 여기예요, 여기──…… 앗. 죄, 죄송합니다, 얼굴을 너무 가까이 대버렸네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……っっ……」"
translation = "「……윽……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「今度は床の雑巾がけです！\u3000モップを使うのもいいですが、頑固な汚れを取る時は雑巾がけに限ります！\u3000力が入りますからね！」"
translation = "「이번에는 바닥 걸레질이에요! 밀대를 쓰는 것도 좋지만, 찌든 때를 뺄 때는 걸레질이 최고죠! 힘이 들어가니까요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私の後に続いてくださ～い──って、んひゃあっ。や、やっぱりダメですっ、スカートの中、見えちゃうかもですから……！」"
translation = "「저를 따라오세~요 ── 앗, 히익. 여, 역시 안 돼요, 치마 속이 보일지도 모르니까……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「っっ……！！」"
translation = "「윽……!!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「それでは次は──」"
translation = "「그럼 다음은──」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ウォッホン！\u3000もういいです、もう十分です。あとは私が教えます」"
translation = "「에헴! 이제 됐습니다, 충분해요. 나머지는 제가 가르치겠습니다.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴえっ？\u3000でも、まだ教え始めたばか──」"
translation = "「삐에? 하지만 아직 가르치기 시작한 지 얼마──」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「わ・た・し・が・お・し・え・ま・す！」"
translation = "「제·가·가·르·칩·니·다!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴいぃっ！！？\u3000し、したっけ私は自分の持ち場戻んますぅ～！！」"
translation = "「삐이익!!? 아, 알았당께요 전 제 구역으로 돌아갈게유~!!」"

[[dialogue]]
speaker = "unk"
original = "あんなに凄まなくても"
translation = "그렇게 윽박지르지 않아도"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「す、凄んでなんかいません。緋宮会長こそなんですか。フニさまにデレデレデレデレ間抜け面を晒して」"
translation = "「으, 윽박지르지 않았습니다. 히노미야 회장님이야말로 뭡니까. 후니 님한테 헤벌레해서 멍청한 낯짝이나 보여주고.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あなたの恋人は、その……私です、のに……」"
translation = "「당신의 연인은, 그…… 저, 인데……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルが見てたから張り切ってただけだよ"
translation = "나미엘이 보고 있어서 힘냈던 것뿐이야"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「優しく囁かれても騙されませんよ。そもそも私がヤキモチを焼いているかのような物言いはやめてください」"
translation = "「상냥하게 속삭여도 속지 않을 거예요. 애초에 제가 질투라도 하고 있다는 식의 말투는 그만둬 주세요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それにもし、デレデレしてなかったのなら……私のことが好きだって言うのなら、もっとその、わかりやすい行動を……」"
translation = "「게다가 만약, 헤벌레하고 있었던 게 아니라면…… 저를 좋아한다고 한다면, 좀 더 그, 알기 쉬운 행동을……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふぁ──……んんっ！？\u3000んふっ……んっ、んちゅ……<emoji=heart04>」"
translation = "「후아──…… 응읏!? 응후…… 응, 으츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ぷはぁ、はぁ、はぁ……<emoji=heart04>\u3000キ、キスして欲しかったわけでは……<emoji=heart04>\u3000抱き締めてくださるだけで良かったですのに……<emoji=heart04>」"
translation = "「푸하아, 하아, 하아……<emoji=heart04> 키, 키스해 주길 바랐던 건 아니……<emoji=heart04> 그냥 안아주시는 것만으로도 좋았을 텐데……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ま、まぁいいです。緋宮会長のお気持ちはわかりましたから。それより、お掃除指導の方、進めて参りますよ」"
translation = "「뭐, 뭐어 됐습니다. 히노미야 회장님의 마음은 알았으니까요. 그보다, 청소 지도 쪽을 계속해 나가겠어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「メイド隊流家事術をばっちりマスターしていただきますからね？\u3000わ……私との、将来のため……にも……ごにょごにょ……」"
translation = "「메이드대식 가사술을 완벽하게 마스터하게 해 드릴 테니까요? 저…… 저와의, 장래를…… 위해서…… 이기도…… 중얼중얼……」"

