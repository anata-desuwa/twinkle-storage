[[dialogue]]
speaker = "unk"
original = "第３話,２人のパンケーキ作り,P"
translation = "제3화,두 사람의 팬케이크 만들기,P"

[[dialogue]]
speaker = "unk"
original = "ソフィアが家にやってきて、一緒にパンケーキを作ることになった。"
translation = "소피아가 집에 찾아와 함께 팬케이크를 만들게 되었다."

[[dialogue]]
speaker = "unk"
original = "前回はサーシャさん用に作ったパンケーキだったから、今回は俺用に作りたい……と、最初はそういう話だった。"
translation = "지난번에는 사샤 씨를 위해 만든 팬케이크였으니, 이번에는 나를 위해 만들고 싶다…… 처음에 이야기는 그러했다."

[[dialogue]]
speaker = "unk"
original = "けれどお菓子作りなら俺も参加できるので、せっかくだから２人で一緒に作ろうということになった次第だ。"
translation = "하지만 과자 만들기라면 나도 참가할 수 있으므로, 이왕 이렇게 된 김에 둘이서 함께 만들기로 한 것이다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いかにお菓子作りが得意な会長さんでも、こちらはサラン先生の直伝、負けるわけにはいきません。──あ、卵を割ってくれてありがとうございます」"
translation = "「아무리 과자 만들기에 능숙한 회장님이라도, 이쪽은 사란 선생님의 직전(直傳), 질 수는 없습니다. ──아, 계란을 깨 주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どちらが美味しいパンケーキを作るか勝負ですよ！\u3000──やっぱりハチミツとバターはたっぷり乗せがいいですよね？\u3000やはり私たちは気が合います」"
translation = "「어느 쪽이 맛있는 팬케이크를 만드는지 승부예요! ──역시 꿀과 버터는 듬뿍 올려야 좋겠죠? 역시 우리는 마음이 잘 맞습니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ああ、お皿を取って並べておいてくれたんですね。私では背が届かなくて困っていたんです、ありがとうございます」"
translation = "「아아, 접시를 꺼내서 늘어놓아 주셨군요. 저는 키가 닿지 않아서 곤란했는데, 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "とまあ、そんな調子で仲良くお菓子作りに没頭し──"
translation = "뭐, 그런 식으로 사이좋게 과자 만들기에 몰두하고──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「完成～♪」"
translation = "「완성~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それでは早速頂きましょう。まずは私の作ったものを食べてもらいましょうか」"
translation = "「그럼 바로 먹어봅시다. 우선 제가 만든 것을 드셔보실까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい、あ～ん<emoji=heart04>」"
translation = "「네, 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "食べさせてくれるの？"
translation = "먹여주는 거야?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ、もちろんです。恋人が食べさせてくれる、というのもパンケーキを美味しくする味付けのひとつなのですよ」"
translation = "「네, 물론이죠. 연인이 먹여주는 것도 팬케이크를 맛있게 만드는 양념 중 하나랍니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どうですか、私のパンケーキは？\u3000美味しいでしょう？」"
translation = "「어떠세요, 제 팬케이크는? 맛있죠?」"

[[dialogue]]
speaker = "unk"
original = "それじゃ俺のも"
translation = "그럼 내 것도"

[[dialogue]]
speaker = "unk"
original = "美味し過ぎる"
translation = "너무 맛있다"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんも私に食べさせてくれるのですか？」"
translation = "「회장님도 저에게 먹여주시는 건가요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まあ仕方ありませんね。条件はフェアでなくては……あーんっ<emoji=heart04>」"
translation = "「뭐, 어쩔 수 없네요. 조건은 공평해야 하니…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「う……さすが会長さん、私の作ったのに負けず劣らずの美味しさです……」"
translation = "「으…… 역시 회장님, 제가 만든 것에 못지않게 맛있어요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「悔しいですが今日のところは引き分けという事にしておきましょう」"
translation = "「분하지만 오늘은 무승부로 해두죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もっと腕を磨いておきますので、またこうやって一緒に作って食べさせ合いましょう♪」"
translation = "「더 실력을 갈고닦아 둘 테니, 또 이렇게 함께 만들어서 서로 먹여줍시다♪」"

[[dialogue]]
speaker = "unk"
original = "受けて立とう！"
translation = "받아들이겠다!"

[[dialogue]]
speaker = "unk"
original = "その後も仲良く互いにあーんしながら、２人で作ったパンケーキを食べ終えた。"
translation = "그 후로도 사이좋게 서로 아앙 해주면서, 둘이서 만든 팬케이크를 다 먹었다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker = "unk"
original = "他に何かしたいことある？"
translation = "따로 하고 싶은 거 있어?"

[[dialogue]]
speaker = "unk"
original = "お腹もふくれたところで"
translation = "배도 부른 김에"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうですね……今日の目的であるパンケーキ作りは達成したので、あとはお話でもしながらゆっくりしましょう」"
translation = "「글쎄요…… 오늘의 목적인 팬케이크 만들기는 달성했으니, 나머지는 이야기라도 하면서 느긋하게 보내죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ところで会長さん、聞きたいことがあったのですが」"
translation = "「그나저나 회장님, 여쭤보고 싶은 것이 있었는데요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんが妹好きというのは本当ですか？」"
translation = "「회장님이 여동생을 좋아한다는 것이 사실인가요?」"

[[dialogue]]
speaker = "unk"
original = "誤報だ！！"
translation = "오보야!!"

[[dialogue]]
speaker = "unk"
original = "どこ情報！！？"
translation = "어디 정보야!!?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おや、間違いなのですか……」"
translation = "「어머, 틀린 정보인가요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私は体型的に小柄ですし、何より実際妹でもあります」"
translation = "「저는 체형적으로도 아담하고, 무엇보다 실제로 여동생이기도 합니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もし会長さんがお望みなら、『お兄ちゃん』と呼んであげても良いのですが？」"
translation = "「혹시 회장님이 원하신다면, '오빠'라고 불러드릴 수도 있는데요?」"

[[dialogue]]
speaker = "unk"
original = "ソフィアが、お兄ちゃん……"
translation = "소피아가, 오빠라니……"

[[dialogue]]
speaker = "unk"
original = "っ……"
translation = "윽……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「じと～……これはクロですね」"
translation = "「지긋이~…… 이거 흑심이 있군요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「素直になったらどうです？\u3000お兄ちゃんになって私からそう呼ばれたいと」"
translation = "「솔직해지는 게 어때요? 오빠가 되어서 저에게 그렇게 불리고 싶다고.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふっ、分かりました。では兄妹ごっこをしましょう。今から会長さんは私のお兄ちゃんです、いいですね？」"
translation = "「후훗, 알겠습니다. 그럼 오누이 놀이를 하죠. 지금부터 회장님은 저의 오빠입니다, 알겠죠?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えへへ、それではお兄ちゃん、いつものをお願いします♪」"
translation = "「에헤헤, 그럼 오빠, 늘 하던 거 부탁해요♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もー、いつものあれに決まってるじゃないですか。お膝の上に座らせてください<emoji=heart04>」"
translation = "「모~, 늘 하던 그거 말하는 거잖아요. 무릎 위에 앉게 해 주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「よいしょっと。やっぱり妹の定位置は、お兄ちゃんのお膝の上ですね♪」"
translation = "「영차. 역시 여동생의 지정석은 오빠의 무릎 위네요♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ほらほら、お膝の上に乗せているだけですか？\u3000お兄ちゃんならもっと妹を可愛がってくれなくては」"
translation = "「자자, 무릎 위에 앉혀만 둘 건가요? 오빠라면 여동생을 더 귀여워해 줘야죠.」"

[[dialogue]]
speaker = "unk"
original = "抱きしめようか？"
translation = "안아줄까?"

[[dialogue]]
speaker = "unk"
original = "頭を撫でようか？"
translation = "머리를 쓰다듬어 줄까?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「両方です、両方。ぎゅーっと抱きしめながら頭をなでなでしてください」"
translation = "「둘 다요, 둘 다. 꼬옥 안아주면서 머리를 쓰담쓰담해 주세요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そうそう、いい感じです。姉さんに抱っこされるのとはまた違った感じがしていいですね」"
translation = "「그래 그래, 느낌 좋아요. 언니에게 안기는 것과는 또 다른 느낌이라 좋네요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「むっ……今、ちょっと邪心が入りましたか？\u3000なでなでがちょっとエッチな感じでしたよ？」"
translation = "「음…… 지금, 혹시 좀 사심이 들어갔나요? 쓰담쓰담이 좀 야릇한 느낌이었어요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お兄ちゃんは妹に対してエッチな感情を抱かないものです。だから、そういう気持ちは捨てて可愛がってください<emoji=heart04>」"
translation = "「오빠는 여동생에게 야릇한 감정을 품는 법이 아니에요. 그러니, 그런 마음은 버리고 귀여워해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "難しい要求をされながら、俺とソフィアは食後のまったりした時間を過ごしたのだった。"
translation = "어려운 요구를 받으면서, 나와 소피아는 식후의 나른한 시간을 보냈던 것이었다."

