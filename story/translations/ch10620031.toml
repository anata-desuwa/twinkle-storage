[[dialogue]]
speaker = "unk"
original = "第１話,ジュエリーと家族の挨拶,P"
translation = "제1화, 쥬얼리와 가족의 인사"

[[dialogue]]
speaker = "unk"
original = "ジュエリーとイレーナのウェディング騒動から少し経った頃。"
translation = "쥬얼리와 이레이나의 웨딩 소동으로부터 조금 시간이 흘렀을 무렵."

[[dialogue]]
speaker = "unk"
original = "ウェディングフォームの固定化は無事に解除されたものの、それ以来ジュエリーは、たびたび俺の家へ花嫁修業に訪れていた。"
translation = "웨딩 폼의 고정화는 무사히 해제되었지만, 그 이후로 쥬얼리는 자주 나의 집으로 신부 수업을 하러 찾아오고 있었다."

[[dialogue]]
speaker = "リノ"
original = "「ここはこうやってね、角を落とすように拭くと、綺麗に見えるのよ～」"
translation = "「여기는 이렇게 말야, 모서리를 쳐내듯이 닦으면 깨끗해 보인단다~」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なるほど、確かに理にかなっている」"
translation = "「과연, 확실히 이치에 맞는군」"

[[dialogue]]
speaker = "リノ"
original = "「うんうん、いい感じ。不器用だから家事は苦手って言ってたけど、ジュエリーちゃん、上手にできてるじゃない♪」"
translation = "「응응, 좋은 느낌이야. 서투르니까 가사는 잘 못한다고 했지만, 쥬얼리짱, 아주 잘하고 있잖니♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「リノさんの教え方が上手いからだよ。不器用な私でも、スポンジが水を吸うように吸収できてしまうのさ」"
translation = "「리노 씨가 가르쳐 주는 방식이 훌륭해서 그래. 서투른 나라도 스펀지가 물을 빨아들이듯 흡수해 버리게 되는걸」"

[[dialogue]]
speaker = "リノ"
original = "「まあ♪\u3000ジュエリーちゃんってばお上手～♪」"
translation = "「머나♪ 쥬얼리짱도 참 말솜씨도 좋다니까~♪」"

[[dialogue]]
speaker = "unk"
original = "（むしろ器用なのでは？）"
translation = "(오히려 손재주가 좋은 거 아냐?)"

[[dialogue]]
speaker = "unk"
original = "（日傘を持ったまま掃除ができるのは）"
translation = "(양산을 든 채로 청소를 할 수 있다는 건)"

[[dialogue]]
speaker = "unk"
original = "そんな俺の心のツッコミをよそに、ジュエリーは片手で日傘を差したまま、家事の練習を続けていく。"
translation = "그런 나의 마음속 딴지는 아랑곳하지 않고, 쥬얼리는 한손으로 양산을 쓴 채 가사 연습을 계속해 나간다."

[[dialogue]]
speaker = "リノ"
original = "「さて、次はお料理──と思ったんだけど、これは私じゃない方がいいかな～。クロト、バトンタッチできるかしら？」"
translation = "「자, 다음은 요리──라고 생각했는데, 이건 내가 아닌 쪽이 좋으려나~. 쿠로토, 바통 터치할 수 있을까?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おや？\u3000リノさんは料理が苦手なのかい？」"
translation = "「오야? 리노 씨는 요리를 잘 못하는 건가?」"

[[dialogue]]
speaker = "unk"
original = "いや、できるけど、味にこだわりがないんだ"
translation = "아니, 할 줄은 알지만, 맛에 고집이 없거든"

[[dialogue]]
speaker = "リノ"
original = "「私はつい、味よりも栄養を優先して考えちゃうのよね～。だから料理に関しては、私じゃない方がいいかなーって」"
translation = "「나는 나도 모르게 맛보다 영양을 우선해서 생각하게 되거든~. 그래서 요리에 관해서는 내가 아닌 쪽이 좋겠다고 생각해서」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なるほど……では我が助手、いつもの感じでお願いしようかな」"
translation = "「과연…… 그럼 나의 조수, 평소처럼 부탁하도록 할까」"

[[dialogue]]
speaker = "unk"
original = "いつものって……アレをやるの？"
translation = "평소처럼이라니…… 그걸 하는 거야?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。あの方法がいちばん効率よく料理スキルを習得できそうだからね♪」"
translation = "「아아. 그 방법이 가장 효율적으로 요리 스킬을 습득할 수 있을 것 같으니까 말이야♪」"

[[dialogue]]
speaker = "リノ"
original = "「なになに？\u3000２人の秘密とかずるい～！\u3000お母さんにも教えてよ～！」"
translation = "「뭐야 뭐야? 둘만의 비밀이라니 치사해~! 엄마한테도 알려줘~!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ほら、リノさんもこう言ってるじゃないか」"
translation = "「이봐, 리노 씨도 이렇게 말하고 있잖아」"

[[dialogue]]
speaker = "unk"
original = "それから、俺はキッチンに立つジュエリーの後ろに回る。"
translation = "그러고 나서, 나는 키친에 서 있는 쥬얼리의 뒤로 돌아간다."

[[dialogue]]
speaker = "unk"
original = "そのまま彼女を抱き込むようにして手を重ねて、『二人羽織』のような姿勢で料理を始めた。"
translation = "그대로 그녀를 껴안듯이 손을 겹치고, 『후타리바오리』 같은 자세로 요리를 시작했다."

[[dialogue]]
speaker = "リノ"
original = "「あら～<emoji=heart04>\u3000いつもそうやって、抱きしめられながら教えてもらってるの～？」"
translation = "「어머나~ <emoji=heart04> 항상 그렇게 껴안긴 채로 배우고 있는 거니~?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「傘を差したまま料理をするというのは、思いのほか難易度が高くてね」"
translation = "「우산을 쓴 채로 요리를 한다는 것은 생각보다 난이도가 높아서 말이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その結果こうやって、助手が後ろから支えてくれる形に行き着いたというわけさ」"
translation = "「그 결과 이렇게 조수가 뒤에서 지탱해 주는 형태로 귀착되었다는 뜻이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「その甲斐あって、包丁の扱いも随分上達した。野菜を切ろうとするたびに指を切ることも、もうなくなったよ」"
translation = "「그 보람이 있어서 칼질도 꽤 늘었어. 채소를 썰려고 할 때마다 손가락을 베는 일도 이제 없어졌지」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、なんだかもうすっかり、本当に新婚さんって感じね～♪」"
translation = "「후훗, 왠지 벌써 완전히 정말로 신혼부부 같은 느낌이네~♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「リノさんからそう言われると、こそばゆく感じるよ」"
translation = "「리노 씨에게 그런 말을 들으니 간지러운 기분이 드는군」"

[[dialogue]]
speaker = "ジュエリー"
original = "「愛する助手にぴったり寄り添ってもらいながら、共に料理をするという約束も叶えてもらった……私は幸せ者だよ<emoji=heart04>」"
translation = "「사랑하는 조수에게 딱 달라붙어 도움을 받으며 함께 요리를 하겠다는 약속도 이루었어…… 나는 행복한 사람이야 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて食事の準備が整い、３人でテーブルを囲むことになった。"
translation = "이윽고 식사 준비가 끝나고, 세 명은 테이블에 둘러앉게 되었다."

[[dialogue]]
speaker = "リノ"
original = "「――そういえば、ジュエリーちゃんのご両親って、どんな人なの？」"
translation = "「──그러고 보니, 쥬얼리짱의 부모님은 어떤 분들이시니?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私の父は、もともとイギリスで神父をしていたんだ。けれど今は引退して、私と同じように探偵の仕事をしている」"
translation = "「나의 아버지는 원래 영국에서 신부님을 하셨어. 하지만 지금은 은퇴하고 나와 마찬가지로 탐정 일을 하고 계시지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「周りからは、『司祭探偵』なんて呼ばれているよ」"
translation = "「주변에서는 『사제 탐정』이라고 불리고 있어」"

[[dialogue]]
speaker = "リノ"
original = "「お父さんも探偵なのね！\u3000さすがブラウン神父様の血筋だわ♪」"
translation = "「아버님도 탐정이시구나! 과연 브라운 신부님의 혈통다워♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「父は神父だった頃から破天荒な人でね。私と同じで謎解きが好きで、探偵の真似事をしていたそうだよ」"
translation = "「아버지는 신부 시절부터 파천황적인 분이셨거든. 나와 마찬가지로 수수께끼 풀이를 좋아해서 탐정 흉내를 내곤 하셨다고 해」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そしてある時、母と出会って恋に落ちてしまって……神父を引退したんだ」"
translation = "「그러다 어느 날, 어머니와 만나 사랑에 빠져버려서…… 신부를 은퇴하신 거야」"

[[dialogue]]
speaker = "リノ"
original = "「まあ！\u3000まるでドラマみたいね♪」"
translation = "「세상에! 마치 드라마 같네♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「引退した後は、それまでのコネを頼って、困っている人から依頼を受けるようになってね。自然と探偵の仕事をするようになったそうだ」"
translation = "「은퇴하신 후에는 그동안의 인맥을 의지해 곤란해하는 사람들의 의뢰를 받게 되셨지. 자연스럽게 탐정 일을 하게 되신 모양이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それで……私がまだ幼い頃、現地で大司教様を暗殺しようとする事件が起きてね」"
translation = "「그리고…… 내가 아직 어렸을 때, 현지에서 대주교님을 암살하려는 사건이 일어났거든」"

[[dialogue]]
speaker = "ジュエリー"
original = "「父はその犯人を見つけ出し、大司教様を無事に守り抜いた。その功績が認められて、『名誉司祭』の称号を頂いたんだ」"
translation = "「아버지는 그 범인을 찾아내어 대주교님을 무사히 지켜내셨지. 그 공적을 인정받아 『명예 사제』 칭호를 받으셨어」"

[[dialogue]]
speaker = "リノ"
original = "「それで『司祭探偵』というわけね！\u3000お父さん、すごい人じゃない♪」"
translation = "「그래서 『사제 탐정』이라는 거구나! 아버님, 대단한 분이시잖니♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ……普段は、日本の言葉で言う『<ruby>昼行灯<rt>ひるあんどん</rt></ruby>』みたいな人なんだけどね」"
translation = "「후훗…… 평소에는 일본 말로 하면 『무능해』 보이는 분이지만 말이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ともあれ、私はそんな父の影響を受けて育ったんだ」"
translation = "「어쨌든 나는 그런 아버지의 영향을 받으며 자랐어」"

[[dialogue]]
speaker = "リノ"
original = "「それで、ジュエリーちゃん。ご両親には、クロトと付き合ってることはもう伝えてるの？」"
translation = "「그래서, 쥬얼리짱. 부모님께는 쿠로토와 사귀고 있다는 걸 이미 말씀드렸니?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「伝えているよ。父も母もＤＩＳＣを使えるからね」"
translation = "「말씀드렸어. 아버지도 어머니도 DISC를 사용하실 수 있으니까」"

[[dialogue]]
speaker = "unk"
original = "えっ、それって……筒抜けってこと！？"
translation = "엣, 그 말은…… 다 들키고 있다는 거야!?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。私が初めて報告したときの父は、面白いくらい動揺していたよ」"
translation = "「아아. 내가 처음 보고했을 때 아버지는 웃음이 나올 정도로 동요하셨지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「でも、落ち着いてからは、１度挨拶をしたいとも言っていたな。今度、カメラ越しに挨拶するかい？」"
translation = "「하지만 진정한 뒤에는 한 번 인사를 나누고 싶다고도 말씀하셨어. 다음에 카메라 너머로 인사할래?」"

[[dialogue]]
speaker = "unk"
original = "こ、心の準備をしておきます……"
translation = "마, 마음의 준비를 해 두겠습니다……"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、クロト、ちゃんと面と向かってご挨拶しとかなきゃダメよ～？」"
translation = "「후훗, 쿠로토, 제대로 얼굴을 마주 보고 인사를 드리지 않으면 안 된단다~?」"

[[dialogue]]
speaker = "リノ"
original = "「そうだ、ジュエリーちゃんとの結婚が決まった時には、旅行も兼ねて直接会いに行きましょうか♪」"
translation = "「맞다, 쥬얼리짱과의 결혼이 결정됐을 때는 여행도 겸해서 직접 만나러 갈까♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いいね。卒業旅行も兼ねた、家族旅行というわけだ」"
translation = "「좋네. 졸업 여행도 겸한 가족 여행이라는 거군」"

[[dialogue]]
speaker = "リノ"
original = "「あら、卒業してすぐなんて早いわね♪\u3000うふふっ♪」"
translation = "「어머, 졸업하고 바로라니 빠르기도 해라♪ 우후후♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私はそれくらい早く結婚したいつもりだけど……キミはどう思っているのかな、助手？」"
translation = "「나는 그 정도로 빨리 결혼하고 싶은 마음이지만…… 너는 어떻게 생각하고 있지, 조수?」"

[[dialogue]]
speaker = "unk"
original = "それも心の準備をしておきます……"
translation = "그것도 마음의 준비를 해 두겠습니다……"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ♪\u3000楽しみにしているよ」"
translation = "「후훗♪ 기대하고 있을게」"

[[dialogue]]
speaker = "unk"
original = "俺の反応に、ジュエリーと母さんは揃って楽しそうな笑顔を浮かべるのだった。"
translation = "나의 반응에 쥬얼리와 엄마는 나란히 즐거운 듯한 미소를 짓는 것이었다."

