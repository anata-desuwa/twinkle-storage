[[dialogue]]
speaker = "unk"
original = "第２話,ウェンディの節約術,P"
translation = "제2화, 웬디의 절약술, P"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「おや、会長さん。お買い物ですか？\u3000しかし微妙な表情をされていますね」"
translation = "「어라, 회장님. 쇼핑인가요? 하지만 미묘한 표정을 짓고 계시네요.」"

[[dialogue]]
speaker = "unk"
original = "実はお金がなくて……"
translation = "사실 돈이 없어서……"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「お金？\u3000会長さんが？」"
translation = "「돈이요? 회장님이?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「新星学園に転入するためにアルバイトをして、節約もしていたとネビュラのデータにありました。お金に困る人ではないと思っていましたが」"
translation = "「신성 학원에 전입하기 위해 아르바이트를 하고, 절약도 하고 있었다고 네뷸라의 데이터에 있었어요. 돈 때문에 곤란해할 분은 아니라고 생각했습니다만.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……ふむふむ。バイトをやめた上、人付き合いで出費も多くなったと。なるほどそれは頷けますね」"
translation = "「……흠흠. 알바를 그만둔 데다, 대인관계로 지출도 많아졌다고요. 과연 그건 납득이 가네요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「それなら私がお役に立ちましょう。収支の正常化も私の仕事ですから」"
translation = "「그렇다면 제가 도움이 되어 드리죠. 수지 정상화도 제 업무니까요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「お邪魔します」"
translation = "「실례하겠습니다.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「では収入と支出のバランスを見直していきましょう。お金を使うことは悪ではありませんが、収入に見合わない支出は自分のためになりません」"
translation = "「그럼 수입과 지출의 균형을 재검토해 보죠. 돈을 쓰는 것은 악이 아니지만, 수입에 맞지 않는 지출은 자신에게 도움이 되지 않아요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「お小遣いの金額と、最近お金を使ったものを教えていただけますか？\u3000収入を増やす、支出を減らすを考える前に、可視化するのが大事です」"
translation = "「용돈 금액이랑, 최근에 돈을 쓴 항목들을 알려주시겠어요? 수입을 늘리거나 지출을 줄이는 걸 생각하기 전에, 가시화하는 게 중요해요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あと帳簿も付けましょう。事業者ではないので、あまりきっちりしたものでなくでも構いません。記録すること、見直せることが重要ですから」"
translation = "「그리고 장부도 씁시다. 사업자가 아니니까 너무 꼼꼼한 게 아니어도 상관없어요. 기록하는 것, 되돌아볼 수 있는 것이 중요하니까요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ふむ。漫画雑誌に、コンビニでの買い食い、友人と出かけた時の飲食代などなど……」"
translation = "「흠. 만화 잡지에, 편의점에서 사 먹는 간식, 친구들과 나갔을 때의 음식값 등등……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「確かにこれではお金がないと言いたくなるでしょう。しかし主だった出費はどれも減らせるものですね」"
translation = "「확실히 이래서는 돈이 없다고 말하고 싶어지겠네요. 하지만 주요 지출은 전부 줄일 수 있는 것들이네요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「勘違いしないでください。無駄とは言いません。その消費から得るものは少なからずあるでしょう」"
translation = "「오해하지 마세요. 무의미하다고는 하지 않겠습니다. 그 소비로 얻는 것이 적지는 않겠죠.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ですがそれが、あなたの経済状況に見合ったものかということです」"
translation = "「하지만 그것이, 당신의 경제 상황에 걸맞은 것인가 하는 점입니다.」"

[[dialogue]]
speaker = "unk"
original = "耳が痛い……！"
translation = "귀가 따가워……!"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「今はバイトできない以上、支出を削るしかありませんね」"
translation = "「지금은 알바를 할 수 없는 이상, 지출을 깎는 수밖에 없겠네요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「まず漫画雑誌ですが、掲載作品は全て読んでいますか？\u3000でなければ、単行本を待った方が経済的かと思います」"
translation = "「먼저 만화 잡지인데, 게재 작품을 전부 읽고 있나요? 그렇지 않다면 단행본을 기다리는 게 경제적이라고 봐요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「最新話を読みたいのはわかります。話題の作品もありますし、うっかりネタバレを見てしまう危険もありますから」"
translation = "「최신화를 읽고 싶은 마음은 이해해요. 화제작도 있고, 무심코 스포일러를 보게 될 위험도 있으니까요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ですから支出削減案の１つとしておきます」"
translation = "「그러니까 지출 삭감안 중 하나로 두겠습니다.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「次はコンビニの買い食いですが──我慢しなさい。早く家に帰ってきなさい。以上」"
translation = "「다음은 편의점 간식인데── 참으세요. 빨리 집에 들어가세요. 이상.」"

[[dialogue]]
speaker = "unk"
original = "切り捨てられた！？"
translation = "잘려 나갔어!?"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「半分は冗談ですよ。ショックを受けないでください」"
translation = "「절반은 농담이에요. 충격받지 마세요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ついつい買い食いをしてしまう場合は昼食を見直しましょう」"
translation = "「자꾸 간식을 사 먹게 되는 경우에는 점심 식사를 재검토합시다.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「昼食が足りないということであれば、お母様に相談すれば昼食代やお小遣いを上げてもらえるのではないですか？\u3000入るお金を増やせるとしたら唯一ここです」"
translation = "「점심이 부족하다는 거라면, 어머니께 상담해서 점심값이나 용돈을 올려달라고 할 수 있지 않나요? 들어오는 돈을 늘릴 수 있다면 유일하게 여기예요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「無計画な買い食いは、カロリーや塩分の摂りすぎ、ひいては肥満など健康障害につながるので控えるべき──」"
translation = "「무계획한 간식 섭취는 칼로리나 염분 과다, 나아가 비만 등 건강 장애로 이어지므로 삼가야──」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──いけません。自分の言葉が自分に突き刺さるところでした。とりあえず、食べ過ぎは良くないということだけ言っておきます」"
translation = "「──안 되겠어요. 제 말이 제 자신을 찌르려고 했네요. 일단, 과식은 좋지 않다는 것만 말해두겠습니다.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そして友人との飲食代。これが新星学園転入後に一番支出額が増えた項目ですね」"
translation = "「그리고 친구와의 음식값. 이게 신성 학원 전입 후에 가장 지출액이 늘어난 항목이네요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「まず、外で人と会うのを控えましょう。学生なら学園でできることは学園で。休日は自宅か相手のお宅に行けばいい話です」"
translation = "「먼저, 밖에서 사람 만나는 걸 자제하세요. 학생이라면 학원에서 할 수 있는 일은 학원에서. 휴일은 자택이나 상대방의 집으로 가면 될 일입니다.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「また新星学園や流星学園は特殊な学園で、裕福──という言葉では表現できないレベルの家庭の子女もいます。心当たりありますよね？」"
translation = "「또한 신성 학원이나 유성 학원은 특수한 학원이라, 유복──이라는 말로는 표현할 수 없는 수준의 가정 자제들도 있어요. 짐작 가는 구석이 있죠?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いいですか、ああいった人たちの経済観念に影響されてはなりません。自分の収入に見合った消費を心がけてください」"
translation = "「잘 들으세요, 그런 사람들의 경제 관념에 영향을 받아서는 안 됩니다. 자신의 수입에 맞는 소비를 유념해 주세요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そしてお金がない時は、付き合いだからと流されずに正直に言いましょう」"
translation = "「그리고 돈이 없을 때는, 분위기에 휩쓸리지 말고 정직하게 말하세요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「だって、会長さんの周りの人はそんなことで離れていかないでしょう？」"
translation = "「왜냐하면, 회장님 주변 사람들은 그런 일로 떠나가지 않을 거잖아요?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「モンスターの捕獲に協力してもらいましたから、私は会長さんのことを知っているつもりです」"
translation = "「몬스터 포획에 협력받았으니까, 저는 회장님에 대해 알고 있다고 자부합니다.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ですから、少々付き合いが悪くなっても大丈夫ですよ」"
translation = "「그러니까, 조금 어울려주지 못하게 되어도 괜찮아요.」"

[[dialogue]]
speaker = "unk"
original = "ウェンディ……！"
translation = "웬디……!"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「まぁ、私であれば……時間がある時はお相手します。私個人のお金には困っていませんし、お茶代くらいであれば出しますよ」"
translation = "「뭐, 저라면…… 시간이 있을 때는 상대해 드릴게요. 저는 개인적인 돈은 부족하지 않으니, 찻값 정도라면 내 드릴게요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「さて、話を戻しましょう。さきほど挙げたプランを実行すると……軽く計算して、毎月の支出の３０％はカットできると思います」"
translation = "「자, 이야기를 되돌리죠. 방금 든 플랜을 실행하면…… 가볍게 계산해서 매월 지출의 30%는 컷할 수 있다고 생각합니다.」"

[[dialogue]]
speaker = "unk"
original = "相談に乗ってくれてありがとう"
translation = "상담해 줘서 고마워"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「いえいえ、元はと言えば迷惑をかけたのは私ですから」"
translation = "「아뇨 아뇨, 원래 따지고 보면 폐를 끼친 건 저니까요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「おっと、そろそろ時間ですね。ネビュラの活動資金を増やすために、いろいろ出向かなきゃいけないところがあるんですよ」"
translation = "「앗, 슬슬 시간이네요. 네뷸라의 활동 자금을 늘리기 위해 여러 군데 들러야 할 곳이 있거든요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「合間であれば、またお話しできると思います。それでは失礼しますね」"
translation = "「짬이 나면 또 이야기할 수 있을 거예요. 그럼 실례하겠습니다.」"

