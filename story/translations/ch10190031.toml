[[dialogue]]
speaker = "unk"
original = "第１話,新たな誓い,P"
translation = "제1화, 새로운 맹세, P"

[[dialogue]]
speaker = "unk"
original = "紫桜の里で起きた事件を解決し視察を終えた俺たちは、空間転移装置を使って九浄の屋敷へと戻ってきた。"
translation = "자앵의 마을에서 일어난 사건을 해결하고 시찰을 마친 우리들은, 공간 전송 장치를 사용해 쿠죠의 저택으로 돌아왔다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うぷっ……やっぱあたし、この空間転移っていうのは苦手かも……」"
translation = "「우웁…… 역시 난, 이 공간 전송이라는 건 서툴지도……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「また酔ったでござるか？\u3000そんな時には師匠特製の秘薬でござる！」"
translation = "「또 멀미하는 것이오? 그럴 때는 스승님 특제 비약인 것이오!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「おししょー様の薬の効果は分かってるけど、今回はちょっちパス……ふつーに休んでれば治るっしょ」"
translation = "「스승님의 약 효과는 알고 있지만, 이번엔 쪼매 패스…… 그냥 쉬고 있으면 나을 거야」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「飲み薬ですからね……転移酔いとは相性が悪いかもしれません」"
translation = "「마시는 약이니까요…… 전송 멀미와는 상성이 나쁠지도 모릅니다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それもそうでござるな……ではウズメ殿は少し休んでいるでござる。当主様への報告はせつなたちに任せるでござるよ」"
translation = "「그것도 그렇구려…… 그럼 우즈메 공은 조금 쉬고 있는 것이오. 당주님께 드리는 보고는 세츠나 일행에게 맡기는 것이오」"

[[dialogue]]
speaker = "unk"
original = "ウズメをお願い"
translation = "우즈메를 부탁해"

[[dialogue]]
speaker = "unk"
original = "ヨミヨミ、任せてもいい？"
translation = "요미요미, 맡겨도 될까?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わかりました。さあウズメさん、こちらへ」"
translation = "「알겠습니다. 자 우즈메 씨, 이쪽으로」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うん、ありがとー、ヨミヨミ」"
translation = "「응, 고마워~, 요미요미」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ヨミ殿がついていれば安心でござるな。さて主様、我らは当主様へ帰還の報告に参るでござるよ」"
translation = "「요미 공이 붙어 있다면 안심인 것이오. 자 주인님, 저희는 당주님께 귀환 보고를 하러 가는 것이오」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「よく戻った。両名とも無事でなによりだ」"
translation = "「잘 돌아왔다. 두 사람 모두 무사해서 다행이군」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ヨミ殿は転移酔いのウズメ殿に付き添ってもらっているでござる」"
translation = "「요미 공은 전송 멀미를 하는 우즈메 공을 간호하고 있는 것이오」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ。報告は受けているが、転移酔いを起こす者もいるようだな。アニマに伝えておくとしよう」"
translation = "「흠. 보고는 받았다만, 전송 멀미를 일으키는 자도 있는 모양이군. 아니마에게 전해두도록 하지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それよりもアステラの件だ。偶然だろうが、シズル殿の依頼が功を奏したようだな」"
translation = "「그보다 아스테라의 건이다. 우연이겠지만, 시즈루 공의 의뢰가 주효했던 모양이군」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「師匠の依頼？\u3000いったい何のことでござるか？」"
translation = "「스승님의 의뢰? 대체 무슨 소리인 것이오?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ、聞いていないか。今回の転移先を紫桜の里に選定した理由は、彼の者より依頼があったからなのだ」"
translation = "「흠, 듣지 못했나. 이번 전송지를 자앵의 마을로 선정한 이유는, 그자로부터 의뢰가 있었기 때문이다」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「なんと、そういうことでござったか……」"
translation = "「세상에, 그런 일이었던 것이오……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「新たな人工戦闘服も、全て彼女の意向によるものだ。里の未来を託す忍に相応しき装束を、とな」"
translation = "「새로운 인공 전투복도, 전부 그녀의 의향에 따른 것이다. 마을의 미래를 기탁할 닌자에게 어울리는 복장을, 이라고 말이지」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「まさか、師匠がそんなことをしてくれてただなんて……」"
translation = "「설마, 스승님이 그런 일을 해주셨다니……」"

[[dialogue]]
speaker = "unk"
original = "いいお師匠様だね"
translation = "좋은 스승님이네"

[[dialogue]]
speaker = "unk"
original = "優しい人だね"
translation = "상냥한 분이네"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ううっ、ししょおぉ～～。今のせつながあるのは、師匠のおかげにござるよぉ～～」"
translation = "「으으윽, 스승니이임~~. 지금의 세츠나가 있는 건, 스승님 덕분인 것이오오~~」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「アステラの発生は偶然でも、あれがなければせつなは過去を振り切れなかったやも知れませぬ」"
translation = "「아스테라의 발생은 우연이라도, 그것이 없었다면 세츠나는 과거를 떨쳐내지 못했을지도 모르오」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様。今ここで改めて、せつなの成長した姿を見て欲しいでござる！」"
translation = "「주인님. 지금 여기서 다시 한번, 세츠나의 성장한 모습을 봐주셨으면 하는 것이오!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「勇気と慈愛を胸に――目覚めよっ！\u3000《開花》フォォォーーーームっっ！！」"
translation = "「용기와 자애를 가슴에── 깨어나라! 《개화》 포오오오옴!!」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「これが……成長したせつなの姿にござる……」"
translation = "「이것이…… 성장한 세츠나의 모습인 것이오……」"

[[dialogue]]
speaker = "unk"
original = "立派だね"
translation = "훌륭하네"

[[dialogue]]
speaker = "unk"
original = "すごいよ"
translation = "대단해"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「有難きお言葉にござる。ですが、せつな１人では到底ここに至れなかったでござる」"
translation = "「과분한 말씀인 것이오. 하지만, 세츠나 혼자서는 도저히 여기까지 도달하지 못했을 것이오」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「師匠と里のみんな、ヨミ殿にウズメ殿……そして主様がいてくれたから……」"
translation = "「스승님과 마을의 모두들, 요미 공과 우즈메 공…… 그리고 주인님이 있어 주셨기에……」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「みんなの力でせつなは成長できたでござる。そのことを、しかと胸に刻みつけるでござる」"
translation = "「모두의 힘으로 세츠나는 성장할 수 있었던 것이오. 그 사실을, 확실히 가슴에 새겨두는 것이오」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「あのような悲劇を、二度と起こさぬために、この《開花》フォームに誓って！」"
translation = "「그런 비극을, 두 번 다시 일으키지 않기 위해, 이 《개화》 폼에 맹세코!」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「そして、忍として、主様に更なる忠誠を……！」"
translation = "「그리고, 닌자로서, 주인님께 더욱 깊은 충성을……!」"

[[dialogue]]
speaker = "unk"
original = "今まで通りでいいよ"
translation = "지금 그대로도 좋아"

[[dialogue]]
speaker = "unk"
original = "そこまで堅苦しく考えなくても"
translation = "그렇게까지 딱딱하게 생각하지 않아도"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「そうは参りませぬ！」"
translation = "「그럴 수는 없소!」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「忍は護る相手がいて、初めて強くなれる。せつなは今回の件で、それを学んだでござる」"
translation = "「닌자는 지킬 상대가 있어야, 비로소 강해질 수 있소. 세츠나는 이번 일로, 그것을 배운 것이오」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「そして、その相手が自分にとって大切な御仁であれば、より力を発揮できる、と」"
translation = "「그리고, 그 상대가 자신에게 소중한 분이라면, 더욱 힘을 발휘할 수 있다고」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「…………にゃっ？\u3000い、今のは少々ハレンチな台詞でござったか？」"
translation = "「…………냐앗? 바, 방금 건 조금 파렴치한 대사였소?」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「け、けど、否定はしないでござる。主様の忍として、更なる忠心を以て、お仕えする所存！」"
translation = "「하, 하지만, 부정은 하지 않겠소. 주인님의 닌자로서, 더욱 깊은 충심을 가지고, 모실 생각인 것이오!」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「ということで主様。今回はこれにて任務終了にござるが、今後ともせつなをよろしく、でござるよ♪」"
translation = "「그런 고로 주인님. 이번에는 이것으로 임무 종료인 것이오나, 앞으로도 세츠나를 잘 부탁하는 것이오♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、気持ちも新たにせつなは忠誠を誓ってくれるのだった。"
translation = "이렇게 해서, 마음을 새롭게 다진 세츠나는 충성을 맹세해주는 것이었다."

