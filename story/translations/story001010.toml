[[dialogue]]
speaker = "unk"
original = "堕天使パテルを倒して数日後。ことの経緯を改めて星徒会で報告した。"
translation = "타천사 파텔을 쓰러뜨리고 며칠 후. 사건의 경위를 다시금 성도회에 보고했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「よくやったわクロト。大変だったみたいね」"
translation = "「잘했어 쿠로토. 고생 많았던 모양이네」"

[[dialogue]]
speaker = "unk"
original = "いろいろあった……"
translation = "여러 가지 일이 있었어……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何はともあれお疲れ様。遊園地のお土産もありがとね♪」"
translation = "「어찌 됐든 수고했어. 유원지 기념품도 고마워♪」"

[[dialogue]]
speaker = "マトイ"
original = "「あの日以来、『死神』の噂もなし。今度こそ完全解決ね。……ホッ、よかった～」"
translation = "「그날 이후로, 『사신』의 소문도 없어. 이번에야말로 완전 해결이네. ……후우, 다행이다~」"

[[dialogue]]
speaker = "サーシャ"
original = "「ところで、堕天使はどうやってフィーニスの塔から出てきたのかしら？」"
translation = "「그런데, 타천사는 어떻게 피니스의 탑에서 나온 걸까?」"

[[dialogue]]
speaker = "アナ"
original = "「ダメージを負った堕天使は身を隠し、会長たちがフィーニスの塔から帰還するのに乗じて抜け出した……そう考えれば辻褄は合います」"
translation = "「데미지를 입은 타천사는 몸을 숨기고, 회장님 일행이 피니스의 탑에서 귀환하는 틈을 타 빠져나왔다…… 그렇게 생각하면 앞뒤가 맞습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「服にくっついてる虫みたいね」"
translation = "「옷에 붙어있는 벌레 같네」"

[[dialogue]]
speaker = "unk"
original = "パテルはどうなった？"
translation = "파텔은 어떻게 됐어?"

[[dialogue]]
speaker = "アナ"
original = "「アニマ先輩の義体には適合しませんでした。やはり分裂した魂を収集するのが難しかったようです」"
translation = "「아니마 선배의 의체에는 적합하지 않았습니다. 역시 분열된 영혼을 수집하는 것이 어려웠던 모양입니다」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "マトイ"
original = "「それは残念だけど……きっとまた会えるよ」"
translation = "「그건 아쉽지만…… 분명 다시 만날 수 있을 거야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね。ちょこざいなチビっ子みたいだし、そのうちひょっこり顔を出すわよ」"
translation = "「그렇네. 맹랑한 꼬맹이 같으니, 머지않아 쑥 하고 얼굴을 내밀 거야」"

[[dialogue]]
speaker = "サーシャ"
original = "「いつか鎌仲間で会ってみたいわね～」"
translation = "「언젠가 낫 동료끼리 만나보고 싶네~」"

[[dialogue]]
speaker = "グロリア"
original = "「あ、会長さん、こんにちは」"
translation = "「아, 회장님, 안녕하세요」"

[[dialogue]]
speaker = "フラン"
original = "「よ、遊園地以来だな」"
translation = "「여어, 유원지 이후로 처음이네」"

[[dialogue]]
speaker = "unk"
original = "この前はありがとう"
translation = "지난번엔 고마웠어"

[[dialogue]]
speaker = "グロリア"
original = "「いいえ。私こそ会長さんのおかげで助かりました」"
translation = "「아니요. 저야말로 회장님 덕분에 살았습니다」"

[[dialogue]]
speaker = "フラン"
original = "「死神と戦うなんてまたとない経験ができたしな。わらわら出てくるのは予想外だったが──」"
translation = "「사신과 싸우다니 다시없을 경험을 하기도 했고 말이야. 바글바글 튀어나오는 건 예상 밖이었지만──」"

[[dialogue]]
speaker = "フラン"
original = "「あー！\u3000先に死神倒したら御前試合って約束してたのに、結局勝負つかなかったじゃねえか！\u3000クソッ、会長に挑戦するチャンスだったのに！」"
translation = "「아-! 먼저 사신 쓰러뜨리면 어전 시합 하기로 약속했었는데, 결국 승부가 안 났잖아! 젠장, 회장에게 도전할 찬스였는데!」"

[[dialogue]]
speaker = "グロリア"
original = "「ふふ、フランさんは相変わらずですね」"
translation = "「후후, 프랑 씨는 여전하시네요」"

[[dialogue]]
speaker = "フラン"
original = "「あ、グロリア。スカートの後ろめくれてんぞ」"
translation = "「아, 글로리아. 치마 뒤쪽 뒤집혔어」"

[[dialogue]]
speaker = "グロリア"
original = "「あっ、お恥ずかしい……失礼しました」"
translation = "「앗, 부끄러워라…… 실례했습니다」"

[[dialogue]]
speaker = "グロリア"
original = "「やはりフランさんは親切ですね。死ぬならフランさんと一緒に……」"
translation = "「역시 프랑 씨는 친절하시네요. 죽는다면 프랑 씨와 함께……」"

[[dialogue]]
speaker = "unk"
original = "グロリアさんも変わりませんね……"
translation = "글로리아 씨도 변함없네요……"

[[dialogue]]
speaker = "フラン"
original = "「……グロリア」"
translation = "「……글로리아」"

[[dialogue]]
speaker = "グロリア"
original = "「はい」"
translation = "「네」"

[[dialogue]]
speaker = "フラン"
original = "「パテルに文句つけられた時はああ言ったが、本気で生きたくないやつに『生きろ』だなんて言うつもりはねえ」"
translation = "「파텔이 시비 걸었을 때는 그렇게 말했지만, 진심으로 살고 싶지 않은 녀석에게 『살아라』 같은 말을 할 생각은 없어」"

[[dialogue]]
speaker = "フラン"
original = "「今も死にたいって思ってるか？」"
translation = "「지금도 죽고 싶다고 생각하고 있어?」"

[[dialogue]]
speaker = "グロリア"
original = "「……はい」"
translation = "「……네」"

[[dialogue]]
speaker = "グロリア"
original = "「でも生きなければいけない。両親が繋いでくれた命ですから」"
translation = "「하지만 살아야만 해요. 부모님이 이어주신 목숨이니까요」"

[[dialogue]]
speaker = "グロリア"
original = "「だけどそれだけじゃなくて……少しだけ、生きたいとも思っています」"
translation = "「하지만 그것뿐만이 아니라…… 아주 조금은, 살고 싶다고도 생각하고 있어요」"

[[dialogue]]
speaker = "グロリア"
original = "「この前の遊園地は楽しかったですから。割引券ももらいましたし、また行きたいです」"
translation = "「지난번 유원지는 즐거웠으니까요. 할인권도 받았고, 다시 가고 싶어요」"

[[dialogue]]
speaker = "フラン"
original = "「……そうか」"
translation = "「……그래」"

[[dialogue]]
speaker = "グロリア"
original = "「プルちゃんも一緒だといいのですけど。アニマさんの作った義体は……」"
translation = "「푸루짱도 함께라면 좋을 텐데. 아니마 씨가 만든 의체는……」"

[[dialogue]]
speaker = "unk"
original = "ダメだったらしいです"
translation = "안 됐던 모양이에요"

[[dialogue]]
speaker = "グロリア"
original = "「そうですか……残念です」"
translation = "「그렇군요…… 아쉽네요」"

[[dialogue]]
speaker = "フラン"
original = "「フン、オレはあいつのことなんざどうでもいいっての。どうせ鬱陶しいことしか言ってこないしな」"
translation = "「흥, 나는 그 녀석 따위 아무래도 상관없어. 어차피 짜증 나는 소리밖에 안 할 테니까」"

[[dialogue]]
speaker = "フラン"
original = "「……だけど絶叫マシーン勝負の決着は付け損ねたな」"
translation = "「……하지만 절규 머신 승부의 결판은 못 냈네」"

[[dialogue]]
speaker = "グロリア"
original = "「フランさんは素直じゃないですね」"
translation = "「프랑 씨는 솔직하지 못하시네요」"

[[dialogue]]
speaker = "フラン"
original = "「うるせえ」"
translation = "「시끄러워」"

[[dialogue]]
speaker = "環"
original = "「さぁさ、今日も魔王とヴィーナスをストーキングしますかね。ホント地道すぎて涙ちょちょぎれちゃうよ。これでもボク守護天使なのに」"
translation = "「자자, 오늘도 마왕이랑 비너스를 스토킹해 볼까. 진짜 너무 꾸준해서 눈물이 앞을 가리네. 이래 봬도 나 수호천사인데」"

[[dialogue]]
speaker = "パテル"
original = "『聞こえますか……あたしはあなたの心に直接話しかけています……』"
translation = "『들립니까…… 저는 당신의 마음에 직접 말을 걸고 있습니다……』"

[[dialogue]]
speaker = "環"
original = "「いや、ほんとに直接話しかけてこないでよ。守護天使《試練》のパテルがいきなり何の用さ」"
translation = "「아니, 진짜로 직접 말을 걸지 말라고. 수호천사 《시련》의 파텔이 갑자기 무슨 용무야」"

[[dialogue]]
speaker = "パテル"
original = "『ラクシャ～、体ちょうだい？』"
translation = "『락샤~, 몸 좀 줘?』"

[[dialogue]]
speaker = "環"
original = "「は？\u3000パテルはリクリエに手出ししない方針でしょ？\u3000何するつもり？」"
translation = "「하? 파텔은 리크리에에 손대지 않는 방침이잖아? 뭘 할 생각이야?」"

[[dialogue]]
speaker = "パテル"
original = "『いや～、悲しい別れを演出して、後で出てきて驚かそうと思ったらホントに義体が使えなくてさ。あたしが驚いちゃった！』"
translation = "『아니~, 슬픈 이별을 연출하고 나중에 나타나서 깜짝 놀라게 해주려고 했는데 진짜로 의체를 못 쓰게 돼서 말야. 내가 다 놀랐어!』"

[[dialogue]]
speaker = "環"
original = "「茶番じゃん。グダグダだな～」"
translation = "「엉망진창이네. 어설프다니까~」"

[[dialogue]]
speaker = "パテル"
original = "『だからお願～い、肉体作って作って～っ。あなたの権能ならできるでしょ。その体もそうやって拵えたものだし』"
translation = "『그러니까 부탁~해, 육체 만들어 줘 만들어 줘~. 당신의 권능이라면 가능하잖아. 그 몸도 그렇게 장만한 거니까』"

[[dialogue]]
speaker = "環"
original = "「そう言われてもさ、今は守護天使の力も制限されてるし、ホイホイ出せるものじゃないんだよ？」"
translation = "「그렇게 말해도 말이지, 지금은 수호천사의 힘도 제한되어 있고, 휙휙 내줄 수 있는 게 아니라고?」"

[[dialogue]]
speaker = "パテル"
original = "『そこをなんとかお願い！\u3000死に関わる守護天使のよしみでさー』"
translation = "『거기 좀 어떻게 부탁해! 죽음에 관련된 수호천사끼리 정을 생각해서 말야~』"

[[dialogue]]
speaker = "パテル"
original = "『早くしないと遊園地の割引券使えなくなっちゃうよ～！\u3000早く早く～！』"
translation = "『빨리 안 하면 유원지 할인권 못 쓰게 된단 말이야~! 빨리빨리~!』"

[[dialogue]]
speaker = "環"
original = "「うるさ～い！\u3000駄々っ子か！\u3000仕方ないなぁ……肉体を用意する代わり、ボクの手伝いもしてもらうからね！」"
translation = "「시끄러~워! 어린애냐! 어쩔 수 없네…… 육체를 준비해 주는 대신, 내 일도 도와줘야 할 테니까!」"

[[dialogue]]
speaker = "パテル"
original = "『やった～！\u3000ラクシャ大好きー！\u3000さすが『流転』を司る守護天使様は心が広いなぁ～！』"
translation = "『만세~! 라쿠샤 정말 좋아! 역시 『유전』을 관장하는 수호천사님은 마음이 넓다니까~!』"

[[dialogue]]
speaker = "環"
original = "「言葉に心がこもってないなぁ……」"
translation = "「말에 영혼이 안 담겨 있네……」"

[[dialogue]]
speaker = "パテル"
original = "『いよぉし、待っててね！\u3000今度こそ三界を遊び尽くすぞ～！』"
translation = "『좋아아아, 기다려! 이번에야말로 삼계를 마음껏 즐겨주겠어~!』"

