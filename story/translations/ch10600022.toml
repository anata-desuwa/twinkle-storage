[[dialogue]]
speaker = "unk"
original = "第２話,付き合ってることは絶対ナイショ,P"
translation = "제2화, 사귀는 건 절대 비밀, P"

[[dialogue]]
speaker = "unk"
original = "晴れて恋人関係になった俺とレミカ。しかし彼女はワールドクラスのアイドルなので、当然恋愛沙汰は御法度だ。"
translation = "당당히 연인 관계가 된 나와 레미카. 하지만 그녀는 월드 클래스 아이돌이기에, 당연히 연애 관련은 금물이다."

[[dialogue]]
speaker = "レミカ"
original = "「会長。言うまでもないけど、私と会長が付き合ってることは内緒だよ」"
translation = "「회장님. 말할 것도 없지만, 나랑 회장님이 사귀는 건 비밀이야」"

[[dialogue]]
speaker = "unk"
original = "仲のいい友達に教えるのもダメだよね"
translation = "친한 친구한테 알려주는 것도 안 되겠지"

[[dialogue]]
speaker = "レミカ"
original = "「もちろん。そういう気の緩み、小さな穴がダムを決壊させるんだから。気を引き締めて行こう」"
translation = "「당연하지. 그런 마음의 해이함, 작은 구멍이 댐을 붕괴시키는 법이니까. 정신 바짝 차리고 가자」"

[[dialogue]]
speaker = "レミカ"
original = "「あ、もちろん偶然会った時にまで、よそよそしかったら逆に不自然だから。あんまり神経質になるのもよくないよ？」"
translation = "「아, 물론 우연히 만났을 때까지 너무 서먹서먹하면 역으로 부자연스러우니까. 너무 신경질적이 되는 것도 좋지 않아?」"

[[dialogue]]
speaker = "レミカ"
original = "「そう。人の目がある時は、同じ学園に通う生徒同士、違和感のない範囲で接するってことで。ＯＫかな？」"
translation = "「응. 남의 눈이 있을 때는 같은 학원에 다니는 학생끼리, 위화감 없는 범위에서 접하는 걸로. OK지?」"

[[dialogue]]
speaker = "unk"
original = "レミカの言うことは至極もっともなので、俺も気を付けようと肝に銘じた──のだが。"
translation = "레미카의 말은 지극히 정당했기에, 나도 주의하자고 가슴에 새겼다── 그런데."

[[dialogue]]
speaker = "unk"
original = "それでは、ここ数日のレミカさんを見ていただこう。まずは朝の時間帯。"
translation = "그럼, 요 며칠간의 레미카 씨를 살펴보자. 우선 아침 시간대."

[[dialogue]]
speaker = "マトイ"
original = "「あっ、会長おはよう。偶然だね、一緒に登校しよっか」"
translation = "「앗, 회장님 안녕. 우연이네, 같이 등교할까」"

[[dialogue]]
speaker = "マトイ"
original = "「朝は大変だよねー。寮で暮らしてる子はぎりぎりまで寝てられるから羨ましいなー」"
translation = "「아침은 힘들지─. 기숙사에서 사는 애들은 아슬아슬할 때까지 잘 수 있으니까 부럽다─」"

[[dialogue]]
speaker = "マトイ"
original = "「あれ、なんだか校門前が騒がしいね……？」"
translation = "「어라, 왠지 교문 앞이 소란스럽네……?」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、愛戸さんが立ってる。そりゃあ騒がれるわけだね。流石はアイドル」"
translation = "「아, 아이도 씨가 서 있어. 저러니 소란스러울 수밖에 없지. 역시나 아이돌」"

[[dialogue]]
speaker = "unk"
original = "（俺を待ってる──！？）"
translation = "(나를 기다리고 있어──!?)"

[[dialogue]]
speaker = "レミカ"
original = "「──会長、おはよ。偶然だね」"
translation = "「──회장님, 안녕. 우연이네」"

[[dialogue]]
speaker = "マトイ"
original = "「偶然……！？」"
translation = "「우연……!?」"

[[dialogue]]
speaker = "レミカ"
original = "「<ruby>詠野<rt>よみの</rt></ruby>さんもおはよ。一緒に教室行こっか」"
translation = "「요미노 씨도 안녕. 같이 교실로 갈까」"

[[dialogue]]
speaker = "マトイ"
original = "「う、うん……そうだね……？」"
translation = "「으, 응…… 그렇네……?」"

[[dialogue]]
speaker = "マトイ"
original = "（あ、あれ～？\u3000愛戸さんって<ruby>新星寮<rt>ラルーナ</rt></ruby>に住んでるよね。なんでわざわざ校門のところで立って、会長を待ってたんだろ……？）"
translation = "(어, 어라~? 아이도 씨는 <ruby>라 루나<rt>신성료</rt></ruby>에 살잖아. 왜 일부러 교문 앞에 서서 회장님을 기다리고 있었던 거지……?)"

[[dialogue]]
speaker = "unk"
original = "──また、ある日の休み時間。"
translation = "──또, 어느 날의 쉬는 시간."

[[dialogue]]
speaker = "マトイ"
original = "「でね。その時にヴィーナスが……」"
translation = "「그래서 말이야. 그때 비너스가……」"

[[dialogue]]
speaker = "レミカ"
original = "「失礼します」"
translation = "「실례합니다」"

[[dialogue]]
speaker = "マトイ"
original = "「愛戸さん？\u3000どうかしたの」"
translation = "「아이도 씨? 무슨 일이야?」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。会長に用事があってさ……ごめん、教科書を忘れちゃったんだけど貸してくれる？\u3000……ありがと、助かるよ」"
translation = "「응. 회장님한테 용건이 있어서…… 미안, 교과서를 깜빡했는데 빌려줄 수 있을까? ……고마워, 살았어」"

[[dialogue]]
speaker = "レミカ"
original = "「あ……寝癖ついてる。ふふ♪\u3000教科書、借りるお返しに直してあげるよ。動かないでね」"
translation = "「아…… 자고 일어나서 머리 뻗쳤네. 후후♪ 교과서 빌려준 답례로 고쳐 줄게. 움직이지 마?」"

[[dialogue]]
speaker = "unk"
original = "（レミカ……距離が近いよ……！）"
translation = "（레미카…… 거리가 너무 가까워……！）"

[[dialogue]]
speaker = "マトイ"
original = "（また愛戸さん……最近、教室によく来るなあ……？\u3000ていうか教科書、どうして隣の席の子に見せてもらわないんだろ？）"
translation = "（또 아이토 양…… 요즘 교실에 자주 오네……? 그나저나 교과서는 왜 옆자리 애한테 안 보여달라고 하는 거지?）"

[[dialogue]]
speaker = "unk"
original = "──また、ある日の昼休み。"
translation = "──다시, 어느 날의 점심시간."

[[dialogue]]
speaker = "マトイ"
original = "「カフェのご飯って定期的に更新されるから飽きなくていいよね。ん～、おいしい。午後の授業も頑張れそう！」"
translation = "「학식 메뉴는 정기적으로 바뀌어서 질리지 않아 좋네. 음~ 맛있어. 오후 수업도 힘낼 수 있겠어!」"

[[dialogue]]
speaker = "レミカ"
original = "「会長、それに詠野さんも。私もここで一緒に食べていい？」"
translation = "「회장님, 그리고 에노 씨도. 나도 여기서 같이 먹어도 될까?」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、う、うん……！\u3000もちろんいいよ。でも愛戸さん、まだ何も買ってないみたいだけど……？」"
translation = "「앗, 어, 응……! 물론 좋지. 하지만 아이토 양, 아직 아무것도 안 산 것 같은데……?」"

[[dialogue]]
speaker = "レミカ"
original = "「会長が何食べるのかなって気になって──うん、それだね。じゃあ私も同じやつにしよっと。それじゃ、すぐ戻ってくるから」"
translation = "「회장님이 뭘 먹을지 궁금해서── 응, 그거네. 그럼 나도 같은 걸로 할게. 그럼, 금방 돌아올 테니까.」"

[[dialogue]]
speaker = "マトイ"
original = "「……あやしい。最近、会長と愛戸さん、距離がすご～く近いような……！\u3000まさか……！？」"
translation = "「……수상해. 요즘 회장님이랑 아이토 양, 거리가 어어어엄청 가까운 것 같은데……! 설마……!?」"

[[dialogue]]
speaker = "unk"
original = "（バレるに決まってる……こんなの……！）"
translation = "（들키는 게 당연해…… 이런 건……！）"

[[dialogue]]
speaker = "unk"
original = "──と、こんなことがあり。とうとう放課後、俺とレミカはマトイに呼び出されて……"
translation = "──라며, 이런 일이 있었고. 마침내 방과 후, 나와 레미카는 마토이에게 불려가서……"

[[dialogue]]
speaker = "マトイ"
original = "「２人に聞きたいことがあります！\u3000単刀直入に聞くけど、お付き合いしてるよね！？\u3000もうネタは上がってるんだよ！」"
translation = "「두 사람에게 묻고 싶은 게 있습니다! 단도직입적으로 묻겠는데, 사귀고 있지!? 이미 증거는 다 잡았다고!」"

[[dialogue]]
speaker = "レミカ"
original = "「え、そ、そんなことないよ。私と会長は、ただの友人で……」"
translation = "「에, 그, 그럴 리가 없잖아. 나랑 회장님은 그냥 친구고……」"

[[dialogue]]
speaker = "マトイ"
original = "「普通の男女の友人は、毎朝校門で偶然出会ったり、休み時間のたびに会いに来たりしません！\u3000寝癖も直したりしません！」"
translation = "「평범한 남녀 친구는 매일 아침 교문에서 우연히 만나거나 쉬는 시간마다 보러 오지 않아요! 머리 뻗친 것도 안 고쳐준다고요!」"

[[dialogue]]
speaker = "レミカ"
original = "「──ぅ」"
translation = "「──윽」"

[[dialogue]]
speaker = "マトイ"
original = "「お付き合いするのはいいと思うけど！\u3000もうちょっと隠した方がいいよ！」"
translation = "「사귀는 건 좋다고 생각하지만! 좀 더 숨기는 게 좋아!」"

[[dialogue]]
speaker = "マトイ"
original = "「ていうか、どうしてそんな攻めた行動を取っちゃうの？\u3000クールな愛戸さんらしくもない……」"
translation = "「그나저나 왜 그렇게 대담하게 행동하는 거야? 쿨한 아이토 양답지도 않게……」"

[[dialogue]]
speaker = "レミカ"
original = "「……頭ではわかってるんだけど。自分で思った以上に舞い上がってるのかな……時間ができると、会長に会いたくなっちゃって……」"
translation = "「……머리로는 알고 있는데. 스스로 생각한 것 이상으로 들떠 있는 걸까…… 시간이 나면 회장님을 보고 싶어져서……」"

[[dialogue]]
speaker = "レミカ"
original = "「クラス違うし、私は寮暮らしだから登下校も一緒にできないし。夜は仕事で連絡取れない時間も多いから、日中は反動が来ちゃって……」"
translation = "「반도 다르고, 난 기숙사 생활이라 등하교도 같이 못 하니까. 밤에는 일 때문에 연락 안 되는 시간도 많아서, 낮에 반동이 오나 봐……」"

[[dialogue]]
speaker = "レミカ"
original = "「で、でもほら。会長はよくプロデュース業で私と一緒にいるよね。だったら、あれぐらいの距離感でも違和感、そんなにないんじゃないかな……？」"
translation = "「하, 하지만 봐봐. 회장님은 프로듀스 업무로 나랑 자주 있잖아. 그렇다면 저 정도 거리감이라도 위화감은 그렇게 없지 않을까……?」"

[[dialogue]]
speaker = "レミカ"
original = "「今回の件だって、詠野さんの勘が鋭かっただけ、とか……」"
translation = "「이번 일도 에노 씨의 감이 날카로웠을 뿐이라든가……」"

[[dialogue]]
speaker = "マトイ"
original = "「バリバリに違和感があるよ！？\u3000付き合いたてのカップルにしか見えないって！\u3000今はまだそこまで目立ってないから、今のうちに矯正しなきゃ……！」"
translation = "「위화감이 넘쳐흐른다고!? 갓 사귀기 시작한 커플로밖에 안 보인단 말이야! 지금은 아직 그렇게 눈에 띄지 않으니까, 지금 당장 교정해야 해……!」"

[[dialogue]]
speaker = "レミカ"
original = "「お、ＯＫ。ここから巻き返す。会長──お互い頑張ろっか」"
translation = "「오, 오케이. 여기서부터 만회할게. 회장님── 서로 노력하자」"

[[dialogue]]
speaker = "unk"
original = "頑張るのはレミカだよ！？"
translation = "노력해야 하는 건 레미카라고!?"

[[dialogue]]
speaker = "マトイ"
original = "「ダメだよ会長！\u3000今回のはほぼ１００％、愛戸さんの落ち度だけど！\u3000恋人同士なんだから責任は<ruby>５０％５０％<rt>フィフティーフィフティー</rt></ruby>だよ！！」"
translation = "「안 돼 회장님! 이번 건 거의 100% 아이토 양의 잘못이지만! 연인 사이니까 책임은 <ruby>50% 50%<rt>피프티 피프티</rt></ruby>야!!」"

[[dialogue]]
speaker = "unk"
original = "は、はい……！"
translation = "네, 넵……！"

[[dialogue]]
speaker = "マトイ"
original = "「愛戸さんも！\u3000会うにしてももう少し違和感のないように！\u3000とりあえず毎時間、教室に来るのは我慢しようね！」"
translation = "「아이토 양도! 만난다고 해도 좀 더 위화감 없도록! 일단 매시간 교실에 오는 건 참자!」"

[[dialogue]]
speaker = "レミカ"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker = "マトイ"
original = "「せっかくお付き合いしてるんだから、くだらないゴシップで台無しになったらいやでしょ？」"
translation = "「어렵게 사귀는 건데, 쓸데없는 가십으로 망쳐버리면 싫잖아?」"

[[dialogue]]
speaker = "レミカ"
original = "「うん……」"
translation = "「응……」"

[[dialogue]]
speaker = "マトイ"
original = "「頑張って隠しながらお付き合いしようね！」"
translation = "「힘내서 숨기면서 사귀자!」"

[[dialogue]]
speaker = "レミカ"
original = "「詠野さん、なんだかお母さんみたい……愛のあるお説教って感じ……」"
translation = "「에노 씨, 왠지 엄마 같아…… 사랑이 담긴 설교라는 느낌……」"

[[dialogue]]
speaker = "unk"
original = "はい……マトイママ……！"
translation = "네…… 마토이 엄마……！"

[[dialogue]]
speaker = "マトイ"
original = "「茶化さないの！」"
translation = "「농담하지 마!」"

[[dialogue]]
speaker = "unk"
original = "守護天使のセシアが、マトイをママ判定する気持ちが少しだけわかった俺たちなのだった。"
translation = "수호천사 세시아가 마토이를 엄마로 판정하는 기분을 조금은 알 것 같은 우리였다."

[[dialogue]]
speaker = "unk"
original = "なお、マトイのお説教が効いたのか。その後のレミカは実に自然に友人関係の距離を装えるようになるのだった……"
translation = "그나저나 마토이의 설교가 효과가 있었는지. 그 후의 레미카는 정말 자연스럽게 친구 관계의 거리를 가장할 수 있게 되었다……"

[[dialogue]]
speaker = "unk"
original = "──いや、できるなら最初からやってよ！？"
translation = "──아니, 할 수 있으면 처음부터 하라고!?"

