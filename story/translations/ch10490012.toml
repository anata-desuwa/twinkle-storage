[[dialogue]]
speaker = "unk"
original = "第２話,そうだ、海へ行こう！,P"
translation = "제2화, 그래, 바다로 가자!, P"

[[dialogue]]
speaker = "unk"
original = "紅明からダーリン呼びされるようになり、しばらく経ったある日のこと──"
translation = "코우메이에게 달링이라 불리게 된 지 어느덧 시간이 꽤 흐른 어느 날──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、西に行こうぜ！！！」"
translation = "「달링, 서쪽으로 가자구!!!」"

[[dialogue]]
speaker = "unk"
original = "唐突に何事！？"
translation = "갑자기 웬일이야!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ウェーイ！\u3000かっとばすぜ～！」"
translation = "「웨이! 달려보자구~!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、こっちこっち～！」"
translation = "「달링, 이쪽이야 이쪽~!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ほら、見えた！\u3000海だよ、海！！！\u3000めっちゃ綺麗～！」"
translation = "「봐봐, 보였다! 바다야, 바다!!! 완전 예뻐~!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いや～、めっちゃ西に飛んだわ～！\u3000海見えるくらい飛んだわ～！」"
translation = "「이랴~, 엄청 서쪽으로 날아왔네~! 바다가 보일 정도로 날아왔어~!」"

[[dialogue]]
speaker = "unk"
original = "何だったんだ、今の！？"
translation = "방금 그건 뭐였던 거야!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ほら、このところ星徒会の仕事で忙しそうだったじゃん？」"
translation = "「봐봐, 요즘 성도회 업무 때문에 바빠 보였잖아?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「だから海でも見たら、ダーリンの溜まった疲れも吹っ飛ぶかなと思って☆」"
translation = "「그래서 바다라도 보면 달링의 쌓인 피로도 싹 날아갈까 싶어서☆」"

[[dialogue]]
speaker = "unk"
original = "だからダーリンって何！？"
translation = "그러니까 달링은 또 뭐야!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「まあまあ、その話は置いておいて。めっちゃ飛んで、喉乾いたっしょ？」"
translation = "「자자, 그 이야기는 접어두고. 엄청 날아와서 목마르지?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はい、ホルスタミンあるから、２人で飲みましょうや」"
translation = "「자, 홀스타민 있으니까 둘이서 마시자구」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ちなみに飲む時は、腰に手を当てて、上を向きながらグイッと飲む、温泉上がりスタイルがオススメだぜ☆」"
translation = "「참고로 마실 때는 허리에 손을 얹고 위를 보면서 쭉 들이켜는 온천 스타일을 추천한다구☆」"

[[dialogue]]
speaker = "unk"
original = "紅明の実家が作ってるんだっけ……"
translation = "코우메이네 본가에서 만드는 거였지……"

[[dialogue]]
speaker = "unk"
original = "そういえばこれって、"
translation = "그러고 보니 이건,"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そうそう、牛一族で世の為人の為、『善哉乳業』って会社をやってるのよ！」"
translation = "「맞아 맞아, 우 씨 일족이 세상을 위해 사람을 위해, 『젠자이 유업』이라는 회사를 하고 있어!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「牛一族の祖先は昔、魔界から人間界に移住して来てさ、それから乳業を営むようになったんだよね」"
translation = "「우 씨 일족의 조상은 옛날에 마계에서 인간계로 이주해 와서, 그때부터 유업을 경영하게 됐거든」"

[[dialogue]]
speaker = "unk"
original = "要するに紅明は人間界出身の魔族なのか"
translation = "요컨대 코우메이는 인간계 출신 마족이라는 건가"

[[dialogue]]
speaker = "unk"
original = "前もそんな話してたけど、"
translation = "전에도 그런 이야기를 했던 것 같은데,"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そういうこと！」"
translation = "「정답!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ところで、ダーリンは『西遊記』って知ってるかな？」"
translation = "「그건 그렇고, 달링은 『서유기』라고 알아?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そうそう、孫悟空や三蔵法師で有名な話ね！」"
translation = "「맞아 맞아, 손오공이랑 삼장법사로 유명한 이야기지!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「じゃあ、『<ruby>紅孩児<rt>こうがいじ</rt></ruby>』っていうのは誰だか分かるかい？」"
translation = "「그럼, 『홍해아』가 누구인지 알아?」"

[[dialogue]]
speaker = "unk"
original = "西遊記に登場する敵……だっけ？"
translation = "서유기에 등장하는 적……이었나?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「その通り！\u3000西遊記のラスボス『牛魔王』の<b>娘</b>なんだけど、最初は三蔵法師一行と敵対してたんだよね」"
translation = "「정답! 서유기의 라스보스 『우마왕』의 <b>딸</b>인데, 처음에는 삼장법사 일행과 적대했었지」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「でも、戦いを繰り返すうちに敗れて、改心し、それ以降は三蔵法師一行に加わったんだな！」"
translation = "「하지만 싸움을 거듭하는 동안 패배해서 개심하고, 그 이후로는 삼장법사 일행에 합류했어!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「その後は父親の牛魔王を倒して、人間界に残ることを選択した。これまでやって来た悪事の贖罪の為にね」"
translation = "「그 후에는 아버지인 우마왕을 쓰러뜨리고 인간계에 남는 것을 선택했지. 지금까지 저질러 온 악행을 속죄하기 위해서 말이야」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そうして世の為人の為と始めたのが、善哉乳業の大本ってわけさ！！！」"
translation = "「그렇게 세상을 위해 사람을 위해 시작한 것이 젠자이 유업의 시초라는 말씀!!!」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000ちょっと待って、じゃあまさか……！？"
translation = "에!? 잠깐만, 그럼 설마……!?"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そう、牛一族は紅孩児の血を引く子孫なのさ！\u3000凄いっしょ？」"
translation = "「그래, 우 씨 일족은 홍해아의 피를 이어받은 후손이야! 대단하지?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「この話すると皆驚いてくれるから、アタシの鉄板ネタなんだぜ☆\u3000うしし♪」"
translation = "「이 이야기 하면 다들 놀라니까 내 단골 소재라구☆ 우시시♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ちなみに、２０００年前に紅孩児の掲げた『世の為人の為』ってモットーは今も一族に受け継がれてて、それはアタシ、誇らしく思ってるんだよね！」"
translation = "「참고로 2000년 전에 홍해아가 내걸었던 『세상을 위해 사람을 위해』라는 모토는 지금도 일족에게 계승되고 있어서, 난 그게 참 자랑스러워!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ホルスタミンを昔から変わらず作り続けて、皆に元気と笑顔を与え続けてる。それって凄いことじゃん？」"
translation = "「홀스타민을 예전부터 변함없이 계속 만들어서 모두에게 활력과 미소를 계속 주고 있잖아. 그거 대단한 일이잖아?」"

[[dialogue]]
speaker = "unk"
original = "善哉乳業、凄い会社だったんだな……"
translation = "젠자이 유업, 대단한 회사였구나……"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「でしょ～♪\u3000アタシの自慢なんだぜ☆」"
translation = "「그치~♪ 내 자랑이라구☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「牛一族の秘伝で作られたこのエナジー牛乳、ホルスタミンもね！\u3000さあさあ、ダーリン、グイッと飲んで、グイッと！」"
translation = "「우 씨 일족의 비전으로 만들어진 이 에너지 우유, 홀스타민도 말이야! 자자, 달링, 쭉 들이켜, 쭉!」"

[[dialogue]]
speaker = "unk"
original = "（腰に手を当てて、ホルスタミンを飲む）"
translation = "(허리에 손을 얹고 홀스타민을 마신다)"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おっ、いい飲みっぷり！\u3000どうよ、元気出て来たかい！？」"
translation = "「오, 마시는 폼이 좋은데! 어때, 기운이 좀 나!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「──それなら良かった！\u3000善哉善哉、これでまた仕事頑張れそうだね、うしし♪」"
translation = "「──그럼 다행이네! 선재선재, 이걸로 또 업무 힘낼 수 있겠네, 우시시♪」"

[[dialogue]]
speaker = "unk"
original = "元気が出たのは紅明と一緒に居たからだと思う"
translation = "기운이 난 건 코우메이랑 같이 있어서라고 생각해"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ん？\u3000ホルスタミンだけじゃなくて、アタシも？」"
translation = "「응? 홀스타민뿐만 아니라 나 때문에도?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー♪\u3000ダーリンってば、嬉しいこと言ってくれるじゃん！」"
translation = "「음모~♪ 달링도 참, 기쁜 소리를 해주네!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「まあ、アタシは『見るエナジードリンク』とか『ホルスタミンの擬人化』とか言われている、スーパータレントだかんね！！！」"
translation = "「뭐, 나는 『보는 에너지 드링크』라느니 『홀스타민의 의인화』라느니 불리는 슈퍼 탤런트니까!!!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「これからもダーリンが疲れてたら、言われなくても元気にしちゃうんで、そこんところよろしく元気☆」"
translation = "「앞으로도 달링이 지쳐 있으면 말하지 않아도 기운 나게 해줄 테니까, 그 점 잘 부탁해 활기☆」"

[[dialogue]]
speaker = "unk"
original = "気分転換のお礼に、紅明と今度はゆっくり海へ遊びに行くのも良いかもしれない──そんな風に思うのだった。"
translation = "기분 전환에 대한 답례로, 다음에는 코우메이와 느긋하게 바다에 놀러 가는 것도 좋을지도 모르겠다── 그런 생각이 들었다."

