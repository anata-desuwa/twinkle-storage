[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あんたの趣味か？\u3000趣味なのかっ！？\u3000返答次第じゃ今日の夕陽は拝ませねえぞ！？」"
translation = "「네 취향임? 취향이냐고!? 대답 여하에 따라 오늘 석양은 못 볼 줄 알아라!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「い、いえ、こ、これはその……違うんです！\u3000誤解です！」"
translation = "「아, 아니요, 그, 그건 그게…… 아닙니다! 오해예요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「なーるなる。カジノといえばバニーガールだもんね～。こりゃ納得するしかないよ、ユウリちゃん♪」"
translation = "「그렇지 그렇지. 카지노 하면 바니걸이지~. 이건 납득할 수밖에 없어, 유우리짱♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「んじゃあたしらもシャツとベストでいいじゃないっすか！\u3000百歩譲ってウサ耳までだろ！？」"
translation = "「그럼 우리도 셔츠랑 조끼면 되잖아! 백번 양보해서 토끼 귀까지라니까!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「勇者スキル『早着替え』は聖剣自身が最適な形態を選択する仕組みでして……」"
translation = "「용사 스킬 『옷 갈아입히기』는 성검 스스로가 최적의 형태를 선택하는 방식이라서……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「はぁ～っ！？\u3000じゃあこの聖剣がバニーを選んだってのかよ！？\u3000どうなってんだよあんたの王国は！？」"
translation = "「하아~!? 그럼 이 성검이 바니를 골랐다는 거임!? 대체 네 왕국은 어떻게 돼먹은 거임!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "（反論できない……！）"
translation = "(반론할 수 없어……!)"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「肩も足も出てるし……こんなエロ衣装、誰が進んで着たがるんだよ！？」"
translation = "「어깨도 다리도 다 나오고…… 이런 야한 의상, 누가 좋아서 입고 싶어 하겠냐고!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「えーそう？\u3000うちは着てみたいと思ってたケドな～。バニースーツ可愛いじゃん♪\u3000おっぱい超盛りやすいし、お尻や太もももムチムチに見えるし♪」"
translation = "「에이 설마? 난 입어보고 싶다고 생각했는데~. 바니 수트 귀엽잖아♪ 가슴 모으기도 짱 쉽고, 엉덩이랑 허벅지도 탱글탱글해 보이고♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「セーラさんは普段から胸の谷間おっぴろげてるからそう思うだけで……！\u3000あたしはこういうの似合わないんすってば！」"
translation = "「세라 씨는 평소에도 가슴골 훤히 드러내고 다니니까 그렇게 생각하는 거지……! 나는 이런 거 안 어울린단 말임!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「人を脱ぎたがりみたいに言わないでってばー。てゆかユウリちゃんも超似合ってるって。新星の会長さんもそう思うっしょ？」"
translation = "「사람을 노출증 환자처럼 말하지 말라니까~. 그보다 유우리짱도 엄청 잘 어울려. 신성의 회장님도 그렇게 생각하지?」"

[[dialogue]]
speaker = "unk"
original = "２人ともエ──すごく可愛いよ"
translation = "둘 다 에── 정말 귀여워"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「いまエロいっつおうとしたよな！？\u3000まさかあんたも共犯か、この真性のエロ会長っ！」"
translation = "「방금 에로하다고 말하려고 했지!? 설마 너도 공범이냐, 이 진성 에로 회장!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「お、上手いこと言うね～♪\u3000真性と新星をかけたワケだ♪」"
translation = "「오, 말 잘하는데~♪ 진성이랑 신성을 엮은 거네♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「別にかけたつもりじゃないっすよ！？」"
translation = "「딱히 엮으려고 한 거 아님!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「と、とにかく申し訳ありませんでしたっ。まさかこうなるとは思いもしなかったもので……」"
translation = "「아, 아무튼 정말 죄송합니다. 설마 이렇게 될 줄은 생각지도 못해서……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「少し考えりゃわかるだろ！？\u3000あんたも海パン一丁で過ごしてみろ！？」"
translation = "「조금만 생각하면 알 거 아님!? 너도 수영복 한 장만 걸치고 지내봐라!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「海パン一丁って──わ、私がですかっ！？\u3000そんな破廉恥な真似できるわけがっ……！」"
translation = "「수영복 한 장이라니── 저, 제가요!? 그런 파렴치한 짓을 할 수 있을 리가……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「そのできるわけのない破廉恥な真似をあんたはあたしにやらせてんだよぉ～……！」"
translation = "「그 할 수 있을 리 없는 파렴치한 짓을 너는 나한테 시키고 있는 거라고오~……!」"

[[dialogue]]
speaker = "unk"
original = "まぁまぁ落ち着いて"
translation = "자자, 진정해"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「こっち見んじゃねえ！\u3000こんな格好で人前に出ろっつーなら、あたし……！」"
translation = "「이쪽 보지 마! 이런 모습으로 사람들 앞에 나가라고 하면, 나……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「まさかバイト辞めるとかゆわないよね～？\u3000後輩がお腹空かせて待ってるぞ～？\u3000近々誕生日会もあるとか聞いたケド？」"
translation = "「설마 알바 그만둔다고 하진 않겠지~? 후배가 배고파하며 기다리고 있다구? 조만간 생일 파티도 있다고 들었는데~?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うっ、確かにあのバイト代は見過ごせねえ……！\u3000豪勢な誕生日会開いてやるって啖呵切っちまってるし……！」"
translation = "「윽, 확실히 저 알바비는 놓칠 수 없어……! 성대한 생일 파티 열어주겠다고 큰소리쳐버렸고……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「なら頑張らないと♪\u3000王子も悪気があったわけじゃないんだしさ～？」"
translation = "「그럼 힘내야지♪ 왕자님도 악의가 있어서 그런 건 아닐 테고 말이야~?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だよね、王子<emoji=heart04>\u3000うちらのセクシーな格好見たくてバニーにしたわけじゃないよね～<emoji=heart04>」"
translation = "「그치, 왕자님♥ 우리들의 섹시한 모습을 보고 싶어서 바니로 만든 건 아니지~?♥」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「は、はい。それはもちろん」"
translation = "「네, 네. 물론이죠.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……あれ？\u3000うち、あんま似合ってない？」"
translation = "「……어레? 나 별로 안 어울려?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「へ？\u3000いえ、とてもお似合いかと思いますが……」"
translation = "「헤? 아니요, 매우 잘 어울린다고 생각합니다만……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「なら反応が薄いな～。こーんなに近づいてるのに。もしかしてもしかして、王子って女の子に興味ない感じ？」"
translation = "「그것치고는 반응이 시큰둥하네~. 이렇게나 가까이 있는데. 설마 설마, 왕자님은 여자애한테 관심 없는 타입?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そ、そんなことはないですよっ？\u3000興味津々です！\u3000男ですからね！」"
translation = "「그, 그럴 리가요!? 관심 아주 많습니다! 남자니까요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「その割には全然ドキドキしてなさそーな。新星の会長さん的には、うちのバニー姿どう思う？」"
translation = "「그거치고는 전혀 두근거리지 않는 것 같은데~. 신성의 회장님은 내 바니 모습 어때?」"

[[dialogue]]
speaker = "unk"
original = "い、いつも以上に絶景です……"
translation = "이, 평소보다 더 절경이야……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そーそーそうゆう反応が見たかったんだよ～♪\u3000自己肯定感爆上がり♪\u3000くれぐれもバイト中に鼻の下伸ばさないようにね～<emoji=heart04>」"
translation = "「그래그래, 그런 반응을 원했다구~♪ 자존감 폭발♪ 부디 알바 중에 코 밑 늘리고 있지 말라구~♥」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「な……なるほど。男なら鼻の下を伸ばすべきだったのですね……。あれくらい凝視する方が女性の自信にも繋がる、と……」"
translation = "「그…… 그렇군요. 남자라면 코 밑을 늘려야 하는 것이었군요……. 저 정도로 응시하는 편이 여성의 자신감으로도 이어진다, 고……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「……ん？\u3000ちょっ──てめっ、なに人の胸覗き込もうとしてやがんだ、ぶっ殺すぞ！？」"
translation = "「……응? 잠깐── 너 이 새끼, 왜 남의 가슴을 훔쳐보려고 지랄이야, 죽고 싶음!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「えっ！？\u3000す、少しでも励みになればと思いまして……！」"
translation = "「엣!? 조, 조금이라도 격려가 될까 싶어서……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「人の胸見て何に励むつもりだ、このエロ王子！\u3000次覗き込もうとしたら本気でぶっ飛ばすからな！？」"
translation = "「남의 가슴 보고 뭘 격려하겠다는 거임, 이 에로 왕자! 한 번만 더 훔쳐보면 진짜 날려버린다!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ご、ごめんなさ～いっ！！」"
translation = "「죄, 죄송합니~다!!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん～……？\u3000王子ってどっか不思議だねー？\u3000男の子として、ちょっちズレてるってゆーか……」"
translation = "「음~……? 왕자님은 어딘가 신기하네~? 남자애로서 쫌 어긋나있다고 해야 하나……」"

[[dialogue]]
speaker = "unk"
original = "そ、それより肩慣らしでもしておかないか？"
translation = "그, 그것보다 몸이라도 좀 풀어두는 게 어때?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あー確かに。力の使い方も変わってるもんね～」"
translation = "「아, 확실히. 힘을 쓰는 법도 달라졌으니까 말이야~」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「まさかこの格好でトレーニング行く気っすか！？\u3000あたしはごめんすよ……」"
translation = "「설마 이 꼬락서니로 트레이닝 갈 생각임!? 난 사양임……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「人目には慣れておいた方がいーって。じゃないといざという時に対応できないじゃん」"
translation = "「남들의 시선에는 익숙해지는 편이 좋다니까. 그래야 만약의 상황에 대응할 수 있잖아.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「それはそうっすけどっ」"
translation = "「그건 그렇지만!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「！\u3000どうやら街にモンスターが出現したようです！」"
translation = "「! 아무래도 거리에 몬스터가 출현한 모양입니다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「お<ruby>誂<rt>あつら</rt></ruby>え向きじゃん♪\u3000前哨戦に蹴散らしちゃおうよ♪」"
translation = "「안성맞춤이네♪ 전초전으로 해치워버리자구♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「蹴散らしにって──この格好で！？」"
translation = "「해치우러 가다니── 이 모습으로!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふ。羞恥心はここに置いていきな、お嬢さん……。そんな重たい荷物背負ってたら次の戦場じゃ生きていけないぜ？」"
translation = "「후. 수치심은 여기 두고 가라구, 아가씨……. 그런 무거운 짐을 짊어지고 있으면 다음 전장에선 살아남을 수 없다구?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「セーラさんはなんでそんなノリノリなんすか！？」"
translation = "「세라 씨는 왜 그렇게 신난 거임!?」"

[[dialogue]]
speaker = "unk"
original = "とにかく急ごう！"
translation = "아무튼 서두르자!"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「嘘だろ、おいっ！？\u3000今回ばかりは他の人に任せて──」"
translation = "「거짓말이지, 야!? 이번만큼은 다른 사람한테 맡기고──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いいからいいから♪\u3000はい連行♪」"
translation = "「됐으니까 됐으니까♪ 자, 연행♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「い──嫌だぁぁああっ～～！！\u3000行きたくないっ～～！！」"
translation = "「이── 싫어어어어어~~!! 가기 싫다구~~!!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「いましたっ！\u3000あそこです！」"
translation = "「찾았습니다! 저기예요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「よーし行くよユウリちゃん！\u3000セクシーに決めちゃうよん！」"
translation = "「좋아 간다 유우리짱! 섹시하게 결정해버리자구!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「こんな姿あたしのキャラじゃねえ……。こんな姿あたしのキャラじゃねえ……。こんな姿あたしのキャラじゃねえ……！」"
translation = "「이런 모습 내 캐릭터 아님……. 이런 모습 내 캐릭터 아님……. 이런 모습 내 캐릭터 아님……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぅ。どうやら皆さん、問題なく戦えそうですね」"
translation = "「후우. 아무래도 여러분, 문제없이 싸울 수 있을 것 같네요.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ユウリちゃんも上手く新しい力使いこなしてたじゃん♪\u3000サイコロを武器にするなんて超お洒落だし♪」"
translation = "「유우리짱도 새로운 힘을 잘 다루던걸♪ 주사위를 무기로 쓰다니 엄청 세련됐고♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「み、見られた……。こんな格好してるとこ、街の人に……。あはは、もうあたし、お嫁に行けねえ……」"
translation = "「보, 보여버렸어……. 이런 차림을 하고 있는 걸 거리 사람들한테……. 아하하, 이제 나 시집 다 갔음……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あー……燃え尽きちゃってるや。バイトまでに血の気が戻るといいけど」"
translation = "「아~…… 하얗게 불태워버렸네. 알바 시작 전까지 정신이 돌아오면 좋겠는데.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「スタイルが良くてとてもお似合いだと思うのですが……」"
translation = "「스타일이 좋아서 정말 잘 어울린다고 생각합니다만……」"

[[dialogue]]
speaker = "unk"
original = "うな垂れると谷間がさらに──"
translation = "고개를 숙이니까 가슴골이 더──"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「～～っっ！？\u3000どこ見てんだ、このエロ会長！！」"
translation = "「~~!! 어디 보고 있는 거임, 이 에로 회장!!」"

[[dialogue]]
speaker = "unk"
original = "ユウリの平手の音が、小気味よく街に響いたのだった──"
translation = "유우리의 손바닥 소리가 경쾌하게 거리에 울려 퍼졌던 것이다──"

