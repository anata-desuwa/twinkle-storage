[[dialogue]]
speaker = "unk"
original = "第１話,死神との再会,P"
translation = "제1화, 사신과의 재회"

[[dialogue]]
speaker = "unk"
original = "遊園地での堕天使の一件からしばらく。"
translation = "유원지에서의 타천사 사건으로부터 한동안 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "消えたパテルのためにアニマ先輩が義体を用意してくれたものの、適合はできなかった。"
translation = "사라진 파텔을 위해 아니마 선배가 의체를 준비해 주었지만, 적합하지는 않았다."

[[dialogue]]
speaker = "unk"
original = "それに守護天使パテルはリクリエに介入する気はないとも言っていた。"
translation = "게다가 수호천사 파텔은 리크리에에 개입할 생각이 없다고도 말했었다."

[[dialogue]]
speaker = "unk"
original = "もしかするともう二度と会うことはないかもしれない──"
translation = "어쩌면 이제 두 번 다시 만날 일은 없을지도 모른다──"

[[dialogue]]
speaker = "？？？"
original = "「ふぅ～～」"
translation = "「후우~~」"

[[dialogue]]
speaker = "unk"
original = "耳に息が！？"
translation = "귀에 숨결이!?"

[[dialogue]]
speaker = "パテル"
original = "「やー、魔王♪\u3000また会ったね！」"
translation = "「야~, 마왕♪ 또 만났네!」"

[[dialogue]]
speaker = "パテル"
original = "「アハハッ、驚いてる驚いてる。カラスがマシンガン食らったような顔してるよ♪」"
translation = "「아하핫, 놀란다 놀라. 까마귀가 머신건이라도 얻어맞은 것 같은 표정이야♪」"

[[dialogue]]
speaker = "パテル"
original = "「死は音もなく忍び寄るものだからね。魔王に気付かれずに近づくくらい楽勝だよ」"
translation = "「죽음은 소리 없이 다가오는 법이니까. 마왕이 눈치채지 못하게 접근하는 것 정도는 낙승이지」"

[[dialogue]]
speaker = "パテル"
original = "「おやおや、どうしてあたしがここにいるんだって言いたそうだね。だけどそれは企業秘密。魔王が相手でも話せないなー」"
translation = "「오호라, 어째서 내가 여기 있느냐고 묻고 싶은 모양이네. 하지만 그건 기업 비밀. 마왕이라도 말해줄 수 없단다~」"

[[dialogue]]
speaker = "unk"
original = "それでも会えて嬉しい"
translation = "그래도 만나서 기뻐"

[[dialogue]]
speaker = "パテル"
original = "「へー、素直に喜ぶんだね。そういうところちょっとかわいいかも」"
translation = "「헤에, 솔직하게 기뻐하네. 그런 점은 좀 귀여울지도」"

[[dialogue]]
speaker = "パテル"
original = "「もしかしたら、あたしが敵かもしれないのにね……？」"
translation = "「어쩌면, 내가 적일지도 모르는데……?」"

[[dialogue]]
speaker = "パテル"
original = "「アハハッ、ビビらなくてもだいじょーぶだいじょーぶ。ホントに敵だったら後ろからバッサリ切ってるから。安心していーよ」"
translation = "「아하핫, 겁먹지 않아도 괜찮아~ 괜찮아. 정말 적이었다면 뒤에서 싹둑 베어버렸을 테니까. 안심해도 돼~」"

[[dialogue]]
speaker = "パテル"
original = "「ま、味方とも言い切れないけど。前も言ったけど、あたしは基本的にリクリエ静観派だから」"
translation = "「뭐, 아군이라고 단정 지을 수도 없지만. 전에도 말했듯이, 난 기본적으로 리크리에 정관파니까 말이야」"

[[dialogue]]
speaker = "パテル"
original = "「あたしは『淘汰』を司る守護天使。つまり死神。命を選別する者」"
translation = "「나는 『도태』를 관장하는 수호천사. 즉 사신. 생명을 선별하는 자」"

[[dialogue]]
speaker = "パテル"
original = "「相手が気に入ったからって長生きさせたり、嫌いだからって早死にさせたり、私情を挟むことはあってはならない」"
translation = "「상대가 마음에 든다고 오래 살게 하거나, 싫다고 일찍 죽게 하거나, 사사로운 감정을 개입시켜서는 안 돼」"

[[dialogue]]
speaker = "パテル"
original = "「たとえリクリエが起こっても、その後には新しい世界ができる。つまり新しい命が生まれる」"
translation = "「설령 리크리에가 일어나더라도, 그 뒤에는 새로운 세계가 생겨나. 즉 새로운 생명이 태어나는 거지」"

[[dialogue]]
speaker = "パテル"
original = "「今生きている命と、これから生まれてくる命を、あたしの感情で天秤にかけるわけにはいかないからね」"
translation = "「지금 살아있는 생명과 앞으로 태어날 생명을, 내 감정으로 저울질할 수는 없으니까」"

[[dialogue]]
speaker = "パテル"
original = "「──って、こんなつまらない話しに来たんじゃないや。グロリアは元気？\u3000フランはしぶとそうだから別に気にしてないけど」"
translation = "「──랄까, 이런 지루한 얘기 하러 온 게 아니야. 글로리아는 잘 지내? 프랑은 끈질겨 보이니까 딱히 신경 안 쓰지만」"

[[dialogue]]
speaker = "パテル"
original = "「……２人とも元気？\u3000そっかそっか。ならいいんだけど」"
translation = "「……둘 다 잘 지내? 그렇구나 그렇구나. 그럼 됐지만」"

[[dialogue]]
speaker = "パテル"
original = "「あたしヒマしててさー、ちょっと遊ばな～い？\u3000魔王だってカワイイあたしと遊びたいでしょ？\u3000今ならこの美少女プルちゃんが付き合ってあげるよっ」"
translation = "「나 심심해서 말이야~, 좀 놀지 않을래~? 마왕도 귀여운 나랑 놀고 싶지? 지금이라면 이 미소녀 푸루짱이 상대해 줄게!」"

[[dialogue]]
speaker = "パテル"
original = "「ね？\u3000プリチーでキュートなプルちゃんがいいことしてあ・げ・る<emoji=heart04>」"
translation = "「응? 프리티하고 큐트한 푸루짱이 좋은 거 해·줄·게<emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
original = "「ねぇ今いやらしいこと考えた？\u3000考えちゃった？\u3000プププッ、魔王ってエッチなんだ～」"
translation = "「있지, 지금 야한 생각 했지? 해버렸지? 푸푸풋, 마왕은 변태라니까~」"

[[dialogue]]
speaker = "パテル"
original = "「──って、無視して行こうとしないで！？\u3000からかってごめんってば！？」"
translation = "「──랄까, 무시하고 가려고 하지 마!? 놀려서 미안하다니까!?」"

[[dialogue]]
speaker = "パテル"
original = "「んも～、魔王ってばノリが悪いんだから。でもお外で話してるのもなんだしー……お茶するお金もないしー……」"
translation = "「정말~, 마왕은 참 분위기 파악을 못 한다니까. 하지만 밖에서 이야기하는 것도 좀 그렇고~…… 차 마실 돈도 없고~……」"

[[dialogue]]
speaker = "パテル"
original = "「魔王のおうちにお邪魔するね！」"
translation = "「마왕의 집으로 실례할게!」"

[[dialogue]]
speaker = "パテル"
original = "「お～、これが魔王のおうちかー！\u3000でも魔王っていうくらいだから、厳つくて座り心地悪そうな玉座とか、目が光る髑髏の燭台とかあっても面白かったのになー」"
translation = "「오~, 이게 마왕의 집인가~! 하지만 마왕이라는 이름에 걸맞게, 험악하고 앉기 불편해 보이는 옥좌라든가, 눈이 빛나는 해골 촛대 같은 게 있어도 재밌었을 텐데 말이야~」"

[[dialogue]]
speaker = "パテル"
original = "「ねぇねぇ、今からでも魔王っぽく改造しない？\u3000マンションごと城にしてさ、バカみたいに広い玉座の間を──」"
translation = "「있지 있지, 지금이라도 마왕답게 개조하지 않을래? 맨션째로 성으로 만들어서, 바보같이 넓은 옥좌의 방을──」"

[[dialogue]]
speaker = "パテル"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "何か食べる？"
translation = "뭐 좀 먹을래?"

[[dialogue]]
speaker = "パテル"
original = "「ううん、これくらい平気……」"
translation = "「으응, 이 정도는 괜찮아……」"

[[dialogue]]
speaker = "パテル"
original = "「あぅ……またお腹の音が……」"
translation = "「아우…… 또 배꼽시계가……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫？"
translation = "괜찮아?"

[[dialogue]]
speaker = "パテル"
original = "「あー……この体になってから全然食べてなくてさ。ていうか食べるって行為がちょっとね」"
translation = "「아~…… 이 몸이 되고 나서 전혀 먹질 않아서 말이야. 그보다 먹는다는 행위가 좀 그래」"

[[dialogue]]
speaker = "パテル"
original = "「マグダレナたちの義体と違って、この体は本物の天使の肉体に近い。でも食べるってことは、命を奪うってことでしょ？\u3000不干渉主義のあたしとしては抵抗があるんだよねー」"
translation = "「막달레나 일행의 의체와 달리, 이 몸은 진짜 천사의 육체에 가까워. 하지만 먹는다는 건 생명을 앗아간다는 거잖아? 불간섭주의인 나로서는 저항감이 있단 말이지~」"

[[dialogue]]
speaker = "unk"
original = "でもそれが生きるってことだ"
translation = "하지만 그게 살아간다는 거야"

[[dialogue]]
speaker = "パテル"
original = "「う……わかってはいるんだけど。勢いで体作ってもらうんじゃなかったかなぁ……」"
translation = "「우…… 알고는 있지만. 기세로 몸을 만들어 달라고 하는 게 아니었나 봐……」"

[[dialogue]]
speaker = "パテル"
original = "「ん？\u3000何それ……お菓子？\u3000あたしにくれるの？」"
translation = "「응? 그건 뭐야…… 과자? 나 주는 거야?」"

[[dialogue]]
speaker = "unk"
original = "少しでも食べた方がいい"
translation = "조금이라도 먹는 게 좋아"

[[dialogue]]
speaker = "パテル"
original = "「食べないとあたしの体が心配？\u3000はぁ……そこまで言われると断れないなぁ」"
translation = "「안 먹으면 내 몸이 걱정돼? 하아…… 그렇게까지 말하면 거절할 수 없네」"

[[dialogue]]
speaker = "パテル"
original = "「あ～ん。あむあむ……ごくっ」"
translation = "「아~앙. 냠냠…… 꿀꺽」"

[[dialogue]]
speaker = "パテル"
original = "「……これが食べるってことか。お腹にものが入ると元気出るね」"
translation = "「……이게 먹는다는 거구나. 배에 뭐가 들어가니까 기운이 나네」"

[[dialogue]]
speaker = "パテル"
original = "「守護天使なのに人間に教えられちゃった気分だよ。なんか敗北感」"
translation = "「수호천사인데 인간에게 가르침을 받은 기분이야. 왠지 패배감」"

[[dialogue]]
speaker = "パテル"
original = "「でも感謝はしてるよ。おいしかった。ありがとね」"
translation = "「그래도 감사는 하고 있어. 맛있었어. 고마워」"

[[dialogue]]
speaker = "パテル"
original = "「隙あり～っ！\u3000コチョコチョコチョ～！」"
translation = "「빈틈 발견~! 간질간질간질~!」"

[[dialogue]]
speaker = "パテル"
original = "「アハハッ、死神相手に油断しちゃダメだよ♪\u3000死はいつでもあなたを狙ってるんだから」"
translation = "「아하핫, 사신을 상대로 방심하면 안 돼♪ 죽음은 언제나 당신을 노리고 있으니까」"

[[dialogue]]
speaker = "パテル"
original = "「リクリエから世界を救う魔王であろうと、突然の死は起こりうる。戦いの中で死ねるとは限らない」"
translation = "「리크리에로부터 세계를 구하는 마왕일지라도, 돌연사는 일어날 수 있어. 반드시 싸움 속에서 죽으리란 법은 없거든」"

[[dialogue]]
speaker = "パテル"
original = "「あなたのことは嫌いじゃないけど、直接助けてはあげられないから気を付けてね」"
translation = "「당신이 싫지는 않지만, 직접 도와줄 수는 없으니까 조심해」"

[[dialogue]]
speaker = "パテル"
original = "「じゃ、おやつもごちそうになったしそろそろ帰るね。シーユーアゲイン♪」"
translation = "「자, 간식도 잘 얻어먹었으니 슬슬 가볼게. 씨 유 어게인♪」"

