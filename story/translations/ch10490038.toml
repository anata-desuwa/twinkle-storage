[[dialogue]]
speaker = "unk"
original = "星徒会の仕事で夜遅くまで残業してしまった、ある日のこと。"
translation = "성도회 일로 밤늦게까지 잔업을 하게 된 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "ようやく終わってヘトヘトになりながら、紅明にＤＩＳＣでメッセージを送りつつ、帰り支度をしていると――"
translation = "겨우 끝나서 녹초가 된 채 코우메이에게 DISC로 메시지를 보내며 퇴근 준비를 하고 있자──"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ダーリン、仕事お疲れ様<emoji=heart04>」"
translation = "「달링, 일하느라 수고했어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「紅明、迎えに来てくれたのか？\u3000ごめん、約束してたのに待たせちゃって……」"
translation = "「코우메이, 마중 나와 준 거야? 미안, 약속했는데 기다리게 해서……」"

[[dialogue]]
speaker = "unk"
original = "今日は紅明の家に泊まりに行く約束をしていたのだが、追加の割り込み作業が入って、すっかり遅くなってしまった。"
translation = "오늘은 코우메이의 집에 자러 가기로 약속했었지만, 추가 업무가 끼어드는 바람에 아주 늦어버렸다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「いやいや、気にする必要ナッシングだぜ☆\u3000会長の仕事を頑張ってたんだから、えらいえらい♪」"
translation = "「아니 아니, 신경 쓸 필요 나씽이라구☆ 회장 일을 열심히 한 거니까 기특해 기특해♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。でも、どうして『ラクシャシーフォーム』を着てるんだ？」"
translation = "「고마워. 그런데 왜 『라크샤시 폼』을 입고 있는 거야?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ダーリン、お疲れっしょ？\u3000だから、今日は奥さんっぽく甘やかして癒しちゃおうかなと思って<emoji=heart04>」"
translation = "「달링, 피곤하잖아? 그래서 오늘은 아내처럼 응석 받아주며 치유해 줄까 해서<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「それに……この衣装でまだ、したことなかったっしょ？\u3000どうどう？」"
translation = "「게다가…… 이 의상으로는 아직 안 해봤잖아? 어때 어때?」"

[[dialogue]]
speaker = "unk"
original = "そんな風に耳元で甘く囁かれれば、断れるわけもなく――"
translation = "그런 식으로 귓가에 달콤하게 속삭이면 거절할 수 있을 리도 없고──"

[[dialogue]]
speaker = "unk"
original = "逸る気持ちを抑えながら、俺は紅明の住む高級マンションの部屋へと向かう。"
translation = "급한 마음을 억누르며 나는 코우메이가 사는 고급 맨션 방으로 향한다."

[[dialogue]]
speaker = "unk"
original = "それから、紅明に言われるがまま仰向けにベッドに寝転がった。彼女は俺の上に跨ると――"
translation = "그 후, 코우메이가 시키는 대로 침대에 천장을 보고 누웠다. 그녀는 내 위에 올라타더니──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ん……<emoji=heart04>\u3000はあぁ……ふうぅぅ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아…… 후우우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふふっ♪\u3000ダーリンはそのまま休んで、楽にしてていいからね<emoji=heart04>」"
translation = "「후훗♪ 달링은 그대로 쉬면서 편하게 있으면 돼<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今日は、疲れてるダーリンの為に――『全肯定エッチ』、しちゃうっしょ<emoji=heart04>」"
translation = "「오늘은 피곤한 달링을 위해서── 『전긍정 섹스』 해버리자구<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全肯定エッチ……？」"
translation = "「전긍정 섹스……?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そう♪\u3000ダーリンの好きなところ、い～っぱい言って、褒めながらエッチしちゃうぜ<emoji=heart04>」"
translation = "「응♪ 달링의 좋은 점을 아주 많이 말하며 칭찬하면서 섹스할 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――ん？\u3000今から『全肯定する』って宣言されても、嬉しくないんじゃないかって？」"
translation = "「──응? 지금부터 『전긍정하겠다』고 선언당해도 기쁘지 않을 것 같다고?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「まあまあ♪\u3000百聞は一見に如かずっしょ<emoji=heart04>\u3000じゃあ、まずは～」"
translation = "「자자♪ 백문이 불여일견이라구<emoji=heart04> 그럼 우선은~」"

[[dialogue]]
speaker = "unk"
original = "紅明はそっと、俺の頭を優しく撫で始めた。"
translation = "코우메이는 살며시 내 머리를 상냥하게 쓰다듬기 시작했다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いつもお仕事頑張ってて、えらいえらい<emoji=heart04>」"
translation = "「항상 일 열심히 하고, 기특해 기특해<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンの真面目に頑張ってるところ、カッコよくって好きだよ<emoji=heart04>」"
translation = "「달링이 성실하게 노력하는 모습, 멋있어서 좋아해<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今日はご褒美で、いっぱい甘えていいからね<emoji=heart04>」"
translation = "「오늘은 보상으로 잔뜩 응석 부려도 되니까 말야<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ<emoji=heart04>\u3000おち○ぽも、いいこいいこしてあげる<emoji=heart04>」"
translation = "「응<emoji=heart04> 자지도 착하지 착하지 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紅明はペニスも撫でるようにスマタし始める。"
translation = "코우메이는 페니스도 쓰다듬듯이 스마타를 하기 시작한다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……<emoji=heart04>\u3000ふうぅ<emoji=heart04>\u3000はぁっ……んんっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후우<emoji=heart04> 하아…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おち○ぽ、すぐ大きくなって<emoji=heart04>\u3000元気でいいこ……<emoji=heart04>\u3000んふぅ……はあぁ……<emoji=heart04>\u3000あっ……んんぅ<emoji=heart04>」"
translation = "「자지, 금방 커져서 착하네……<emoji=heart04> 응후…… 하아아……<emoji=heart04> 앗…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶妙な力加減で与えられる甘い快楽に、俺のペニスは素直に反応してしまう。"
translation = "절묘한 힘 조절로 주어지는 달콤한 쾌락에 내 페니스는 솔직하게 반응해 버린다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁぁ……<emoji=heart04>\u3000いつ見ても、大きくて固くて、立派……<emoji=heart04>\u3000イケメン魔王おち○ぽ<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 언제 봐도 크고 딱딱하고 훌륭해……<emoji=heart04> 꽃미남 마왕 자지<emoji=heart04> 응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ゆっくりマンズリしてるのに、アタシのおま○こキュンキュンして<emoji=heart04>\u3000愛液いっぱい溢れてきちゃう<emoji=heart04>\u3000あっ……んふぅ……<emoji=heart04>」"
translation = "「천천히 자위하고 있는데 내 보지가 큥큥거려서<emoji=heart04> 애액이 잔뜩 넘쳐흘러 버려<emoji=heart04> 앗…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んんっ<emoji=heart04>\u3000ダーリンのおち○ぽ好きすぎて、もうぬるぬるになっちゃった……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「으응<emoji=heart04> 달링 자지가 너무 좋아서 벌써 미끌미끌해졌어……<emoji=heart04> 하아아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「今度はアタシのおま○この中で、い～っぱい、よしよししてあげるね<emoji=heart04>\u3000よいしょっ……<emoji=heart04>\u3000んぅっ<emoji=heart04>」"
translation = "「이번엔 내 보지 안에서 아주 많이 요시요시 해줄게<emoji=heart04> 영차……<emoji=heart04> 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紅明がペニスの先っぽを膣穴にあてがう。"
translation = "코우메이가 페니스 끝부분을 질 구멍에 갖다 댄다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んんっ……はあぁぁ<emoji=heart04>\u3000イきたくなったら、我慢せずにいつでも、イっていいからね……<emoji=heart04>」"
translation = "「으응…… 하아아아<emoji=heart04> 싸고 싶어지면 참지 말고 언제든 싸도 되니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それじゃあ、入れちゃうよ～<emoji=heart04>\u3000んっ――<emoji=heart04>」"
translation = "「그럼 넣을게~<emoji=heart04> 응──<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ――んんぅ～～～っ<emoji=heart04>\u3000はあぁ～っ<emoji=heart04>\u3000ふうぅっ……んふぅっ<emoji=heart04>\u3000おち○ぽ、いらっしゃ～い<emoji=heart04>」"
translation = "「앗── 으응으으으읏<emoji=heart04> 하아아~앗<emoji=heart04> 후우읏…… 응후읏<emoji=heart04> 자지야, 어서 와<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "温かいお風呂に浸かるような快楽にペニスが包まれて、俺は思わず吐息がこぼれる。"
translation = "따뜻한 욕조에 몸을 담그는 듯한 쾌락에 페니스가 감싸여, 나는 나도 모르게 한숨이 새어 나온다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んふっ<emoji=heart04>\u3000ダーリン、おま○こ気持ちいい？\u3000アタシがご奉仕するから、いっぱい気持ち良くなってね<emoji=heart04>」"
translation = "「응후<emoji=heart04> 달링, 보지 기분 좋아? 내가 봉사할 테니까 잔뜩 기분 좋아지렴<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紅明はゆっくりと優しく、腰を動かし始める。"
translation = "코우메이는 천천히 상냥하게 허리를 움직이기 시작한다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ――<emoji=heart04><emoji=heart04>\u3000はぁ……ふぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁ……ふうぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁ……ふうぅ<emoji=heart04>\u3000んうぅっ……はあぁっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「응──<emoji=heart04><emoji=heart04> 하아…… 후우<emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 하아아…… 후우우<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하아아…… 후우우<emoji=heart04> 응으읏…… 하아아앗<emoji=heart04> 응후읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、今日もお仕事お疲れ様っ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000おま○こマッサージ、どうですか～？」"
translation = "「달링, 오늘도 일하느라 수고했어<emoji=heart04> 응…… 후우읏<emoji=heart04> 보지 마사지, 어떠신가요~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ～、ゆる気持ちいい……」"
translation = "「아~ 노곤노곤하니 기분 좋아……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んふっ<emoji=heart04>\u3000どんどん甘やかしちゃうぞ～<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000ダーリン、好き<emoji=heart04>\u3000大好き<emoji=heart04>」"
translation = "「응후<emoji=heart04> 계속 응석 받아줄 거야~<emoji=heart04> 응……<emoji=heart04> 달링, 좋아해<emoji=heart04> 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紅明は俺の目を真っすぐに見つめながら、愛を囁く。"
translation = "코우메이는 내 눈을 똑바로 바라보며 사랑을 속삭인다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンの好きなところ、挙げていっちゃうね<emoji=heart04>\u3000まずは……可愛い笑顔が好きっ<emoji=heart04>\u3000はあぁっ……んんぅっ<emoji=heart04>」"
translation = "「달링의 좋은 점, 하나씩 말해볼게<emoji=heart04> 우선은…… 귀여운 미소가 좋아<emoji=heart04> 하아아앗…… 으응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はぁぁ<emoji=heart04>\u3000ダーリンの笑顔を見てると、胸がキュンってなって、元気が出ちゃうっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 달링의 미소를 보고 있으면 가슴이 큥 하고 울려서 기운이 나버려<emoji=heart04> 응…… 후우읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それから、ダーリンの優しいところが好きっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>」"
translation = "「그리고 달링의 다정한 점이 좋아<emoji=heart04> 앗…… 안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はふぅぅ……<emoji=heart04>\u3000アタシが変なこと言っても、受け入れてくれるのが好きっ<emoji=heart04>\u3000んんっ……ふあぁっ<emoji=heart04>」"
translation = "「하후우우……<emoji=heart04> 내가 이상한 말을 해도 받아주는 게 좋아<emoji=heart04> 으응…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いつも、んんぅ<emoji=heart04>\u3000アタシのテンションに付き合ってくれるの嬉しくて、もっと楽しくなっちゃう<emoji=heart04>\u3000はあぁっ……あふぅう<emoji=heart04>」"
translation = "「항상, 으응<emoji=heart04> 내 텐션에 맞춰주는 게 기뻐서 더 즐거워져 버려<emoji=heart04> 하아아앗…… 아후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あんっ<emoji=heart04>\u3000あとは――アタシのことだけ、一途に愛してくれるのも好きっ<emoji=heart04>\u3000んっ……はぁあんっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 그리고── 나만을 일편단심으로 사랑해 주는 것도 좋아<emoji=heart04> 응…… 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「他にもダーリンのこと、好いてる女の子たくさんいるのに、んんぅ<emoji=heart04>\u3000アタシのことを好きだって言ってくれて……すごく嬉しいっ<emoji=heart04>\u3000ふうぅっ……んあぁっ<emoji=heart04>」"
translation = "「그 외에도 달링을 좋아하는 여자애들이 잔뜩 있는데, 으응<emoji=heart04> 나를 좋아한다고 말해줘서…… 정말 기뻐<emoji=heart04> 후우읏…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンとこうして愛し合えて、世界一幸せぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>」"
translation = "「달링과 이렇게 사랑을 나눌 수 있어서 세계에서 제일 행복해<emoji=heart04> 앗<emoji=heart04> 응아아안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紅明の腰の動きは緩やかなのに、俺は無性に興奮が高まってきて、彼女のおっぱいに手を伸ばして鷲掴みにしてしまう。"
translation = "코우메이의 허리 움직임은 완만한데도 나는 무턱대고 흥분이 고조되어 그녀의 가슴에 손을 뻗어 움켜쥐고 만다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あんっ<emoji=heart04>\u3000ダーリンにおっぱい、触ってもらっちゃってるぅ<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000いつでも、好きなだけ揉んでいいからね<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁぁんっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 달링이 가슴 만져주고 있어어<emoji=heart04> 으응으<emoji=heart04> 언제든 마음껏 주물러도 되니까 말야<emoji=heart04> 앗<emoji=heart04> 응아아아안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に笑顔で受け入れてくれるので、１００センチ超えＩカップを誇るその爆乳を、欲望のままに揉みしだいていく。"
translation = "그런 식으로 웃으며 받아주기에, 100센티가 넘는 I컵을 자랑하는 그 폭유를 욕망이 이끄는 대로 주물러 터뜨린다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んんんぅ<emoji=heart04>\u3000ダーリン、おっぱい揉むの上手ぅ<emoji=heart04>\u3000はあぁっ……んふぅっ<emoji=heart04>」"
translation = "「으으으응<emoji=heart04> 달링, 가슴 주무르는 거 잘해애<emoji=heart04> 하아아앗…… 응후읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000んんぅっ……んあぁっ<emoji=heart04>\u3000ふあぁっ……はああぁんっ<emoji=heart04>」"
translation = "「응으읏<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 기분 좋아<emoji=heart04> 하아아앗…… 후우읏<emoji=heart04> 으응으읏…… 응아앗<emoji=heart04> 후아앗…… 하아아아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「力強いのに、優しい揉み方で<emoji=heart04>\u3000おっぱいキュンキュン、感じちゃうっ<emoji=heart04>\u3000あっ……んあぁんっ<emoji=heart04>\u3000ダーリンの手、気持ち良くて好きぃ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「힘차면서도 부드러운 손길이라<emoji=heart04> 가슴이 큥큥 느껴져버려<emoji=heart04> 앗…… 응아아안<emoji=heart04> 달링 손, 기분 좋아서 좋아아<emoji=heart04> 하아아앗<emoji=heart04> 후아아아안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紅明とエッチする時は、どうしてもその大きく揺れるおっぱいに惹かれてしまう。だから、今ではすっかり、彼女が喜ぶ力加減が手に染み付いてしまっていた。"
translation = "코우메이와 섹스할 때는 아무래도 그 크게 흔들리는 가슴에 끌리게 된다. 그래서 이제는 완전히 그녀가 기뻐하는 힘 조절이 손에 배어 있었다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はぁんっ<emoji=heart04>\u3000おっぱい喜んで、母乳いっぱい、溢れて来ちゃう<emoji=heart04>\u3000んんぅ～<emoji=heart04>」"
translation = "「하아안<emoji=heart04> 가슴이 기뻐서 모유가 잔뜩 넘쳐흘러 나와<emoji=heart04> 으응으~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手の平に収まりきらない弾力の感触を堪能していると、彼女の乳首周りから、濃いフェロモンの匂いを漂わせた液体が滴り落ちてくる。"
translation = "손바닥에 다 들어오지 않는 탄력의 감촉을 만끽하고 있자, 그녀의 유두 주변에서 진한 페로몬 냄새를 풍기는 액체가 뚝뚝 떨어진다."

[[dialogue]]
speaker = "unk"
original = "それは紅明の体質によるもの。牛系魔族は妊娠していなくとも、性的に興奮すると愛液のように母乳が溢れてきてしまうのだ。"
translation = "그것은 코우메이의 체질에 의한 것. 소 계열 마족은 임신하지 않았더라도 성적으로 흥분하면 애액처럼 모유가 흘러나오고 마는 것이다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000ダーリン、今日もおっぱい飲む？」"
translation = "「응<emoji=heart04> 후우읏……<emoji=heart04> 달링, 오늘도 가슴 마실래?」"

[[dialogue]]
speaker = "unk"
original = "俺がこくこくと頷くと、彼女は俺の顔の前までおっぱいを持ってきてくれて、嬉しそうに微笑む。"
translation = "내가 끄덕끄덕 고개를 끄덕이자 그녀는 내 얼굴 앞까지 가슴을 가져다주며 기쁜 듯 미소 짓는다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んふっ<emoji=heart04>\u3000はい――どうぞ<emoji=heart04>」"
translation = "「응후<emoji=heart04> 자── 여기 있어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は花の蜜に誘われる蜂のように、すぐさま乳首に吸い付き、母乳を飲み始めた。"
translation = "나는 꽃의 꿀에 유혹당하는 벌처럼 곧바로 유두에 달라붙어 모유를 마시기 시작했다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ――んあああぁ～っ<emoji=heart04><emoji=heart04>\u3000ダーリンにおっぱい、ちゅっちゅって吸われるの好きぃっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗── 응아아아아~앗<emoji=heart04><emoji=heart04> 달링이 가슴 쪽쪽 빨아주는 거 좋아아<emoji=heart04> 안<emoji=heart04> 하아아앗…… 응으읏<emoji=heart04> 후아아아안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "１度味わってしまうと夢中になってしまう、紅明の母乳の味。"
translation = "한 번 맛보면 빠져들고 마는 코우메이의 모유 맛."

[[dialogue]]
speaker = "unk"
original = "性的興奮によって分泌されるそれは、ほのかに甘い、雄を惹きつける濃厚なフェロモンの味がする。"
translation = "성적 흥분에 의해 분비되는 그것은 은은하게 달콤하며 수컷을 유혹하는 농후한 페로몬 맛이 난다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、アタシのおっぱいミルク美味しい？\u3000――んっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000いっぱい飲んでいいからねっ<emoji=heart04>\u3000あっ……ふあぁんっ<emoji=heart04>」"
translation = "「달링, 내 가슴 우유 맛있어? ──응<emoji=heart04> 기뻐<emoji=heart04> 잔뜩 마셔도 되니까 말야<emoji=heart04> 앗…… 후아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んあぁぁっ<emoji=heart04>\u3000ダーリンにおっぱい飲んでもらうの好きぃ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000幸せ感じちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ……はぁんっ<emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 달링이 가슴 마셔주는 거 좋아아<emoji=heart04> 후아아아앗<emoji=heart04> 행복이 느껴져버려<emoji=heart04> 앗<emoji=heart04> 안…… 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000ダーリンのおち○ぽ、もっと大きくなってるぅ<emoji=heart04>\u3000んっ……ふあぁっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 대단해<emoji=heart04> 앗…… 안<emoji=heart04> 달링 자지, 더 커졌어어<emoji=heart04> 응…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "牛系魔族の興奮して出る母乳には、男性の精力を元気にしてしまう回復効果と、興奮を促す媚薬効果があるという。"
translation = "소 계열 마족이 흥분해서 내뿜는 모유에는 남성의 정력을 회복시키는 효과와 흥분을 촉진하는 미약 효과가 있다고 한다."

[[dialogue]]
speaker = "unk"
original = "おかげでただでさえギンギンに固くなっていたペニスが、更にどくんどくんと脈打って大きくなってしまっていた。"
translation = "덕분에 가뜩이나 팽팽하게 굳어 있던 페니스가 더욱 두근두근 맥동하며 커져 버렸다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はああぁっ……<emoji=heart04>\u3000ダーリンの絶倫おち○ぽ、男らしくて好きぃ<emoji=heart04>\u3000子宮キュンキュンして、おま○こ絡み付いちゃうっ<emoji=heart04>\u3000んっ……ふうぅぅっ<emoji=heart04>」"
translation = "「하아아아앗……<emoji=heart04> 달링의 절륜 자지, 남자다워서 좋아아<emoji=heart04> 자궁이 큥큥거려서 보지가 휘감겨버려<emoji=heart04> 응…… 후우우우읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "きゅうきゅうと膣壁がペニスを締め付けてきて、強烈な快楽に襲われ、射精感が込み上げてくる。"
translation = "질벽이 꽉꽉 페니스를 조여오며 강렬한 쾌락이 덮쳐오고, 사정감이 북받쳐 오른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！\u3000紅明、俺もう……！」"
translation = "「큭……! 코우메이, 나 이제……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うんっ<emoji=heart04>\u3000いいよ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ダーリンの元気な精子、アタシの子宮いっぱい中出しして<emoji=heart04>」"
translation = "「응<emoji=heart04> 괜찮아<emoji=heart04> 앗, 안<emoji=heart04> 달링의 기운찬 정자, 내 자궁에 잔뜩 질내사정 해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000アタシもいっぱい、おま○こピストンで、気持ち良くしてあげるからっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우읏<emoji=heart04> 나도 잔뜩 보지 피스톤으로 기분 좋게 해줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んんっ――<emoji=heart04><emoji=heart04>」"
translation = "「으응──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000――んあああああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> ──응아아아아아아~앗<emoji=heart04><emoji=heart04> 응<emoji=heart04> 후읏<emoji=heart04> 앗<emoji=heart04> 후아아아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあああぁ～～っ<emoji=heart04>\u3000ダーリンのおち○ぽ、奥当たって気持ちいいっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「하아아아아~앗<emoji=heart04> 달링 자지, 깊숙이 닿아서 기분 좋아<emoji=heart04> 응<emoji=heart04> 응읏<emoji=heart04> 앗<emoji=heart04> 으응읏<emoji=heart04> 응후읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んううぅ～～っ<emoji=heart04><emoji=heart04>\u3000激しいピストン好きぃっ<emoji=heart04>\u3000どちゅどちゅ奥突かれるの気持ちいいのぉっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「응으으으~읏<emoji=heart04><emoji=heart04> 격렬한 피스톤 좋아아<emoji=heart04> 퍽퍽 안쪽을 찔리는 거 기분 좋아아<emoji=heart04> 앗<emoji=heart04> 후우읏<emoji=heart04> 앗<emoji=heart04> 하아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「もっと気持ちいいの欲しくなって、腰動いちゃうぅんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「더 기분 좋은 걸 원하게 돼서 허리가 움직여버려어<emoji=heart04> 응<emoji=heart04> 후우읏<emoji=heart04> 흥<emoji=heart04> 흥<emoji=heart04> 응후응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンのおち○ぽ、カリ極太で好きぃ<emoji=heart04>\u3000おま○このいいところ刺激されて、メロメロになっちゃうっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000んうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「달링 자지, 귀두가 엄청 굵어서 좋아아<emoji=heart04> 보지의 좋은 곳을 자극당해서 헤롱헤롱해져버려<emoji=heart04> 응후읏<emoji=heart04> 흥<emoji=heart04> 흥<emoji=heart04> 응으응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>\u3000子宮口、どちゅどちゅ気持ちいいっ<emoji=heart04>\u3000おち○ぽにキスされてるみたいで好きぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응으읏<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 응아아안<emoji=heart04> 자궁구, 퍽퍽 기분 좋아<emoji=heart04> 자지가 키스해 주는 것 같아서 좋아아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아아안<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んん～～～っ<emoji=heart04><emoji=heart04>\u3000好き好きぃ<emoji=heart04>\u3000おち○ぽ、男らしく立派で大好きぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「으응~~~읏<emoji=heart04><emoji=heart04> 좋아 좋아아<emoji=heart04> 자지, 남자답고 훌륭해서 너무 좋아아<emoji=heart04> 앗<emoji=heart04> 하아아앗<emoji=heart04> 후아앗<emoji=heart04> 응아아안<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いつも気持ち良くしてくれるの好きぃ<emoji=heart04>\u3000アタシのおま○こ、いっぱいになるまで中出ししてくれるの好きぃっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「항상 기분 좋게 해주는 게 좋아아<emoji=heart04> 내 보지가 가득 찰 때까지 질내사정 해주는 게 좋아아<emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 아아안<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おま○こ、いつも惚れちゃう<emoji=heart04>\u3000ダーリンのおち○ぽに愛してもらえて、幸せぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「보지, 항상 반해버려<emoji=heart04> 달링 자지에게 사랑받을 수 있어서 행복해에<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 후아아아안<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「――んんぅ<emoji=heart04>\u3000ダーリン、もしかしてキスしたいの？\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「──으응<emoji=heart04> 달링, 혹시 키스하고 싶어? 하아아앗<emoji=heart04> 후우읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うんっ<emoji=heart04>\u3000いいよっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ベロチューしながら、らぶらぶハメハメしよぉ<emoji=heart04>\u3000んちゅぅっ――<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 좋아<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 딥키스 하면서 러브러브 하메하메 하자아<emoji=heart04> 응츄우──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んむぅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅむっ<emoji=heart04>\u3000ちゅぷぷっ<emoji=heart04>\u3000――んちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅるっ<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000――ちゅれるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「응무읏<emoji=heart04> 쪽<emoji=heart04> 쮸읍<emoji=heart04> 쮸부붓<emoji=heart04> ──응쪽<emoji=heart04> 쫍<emoji=heart04> 츄릅<emoji=heart04> 쥬르르<emoji=heart04> ──쥬렐<emoji=heart04> 렐렐<emoji=heart04> 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んはぁっ<emoji=heart04><emoji=heart04>\u3000ベロチューハメ、気持ちよしゅぎぃ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000しゅきぃっ<emoji=heart04>\u3000もっとぉっ<emoji=heart04>\u3000――んんぅ～<emoji=heart04><emoji=heart04>」"
translation = "「은하앗<emoji=heart04><emoji=heart04> 딥키스 하메, 기분 너무 조하아<emoji=heart04> 하아아앗<emoji=heart04> 조하아<emoji=heart04> 더어어<emoji=heart04> ──으응으~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ちゅっ<emoji=heart04>\u3000ちゅぶぶっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000――気持ち良くて、理性とろけひゃうっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000じゅるるっ<emoji=heart04>\u3000じゅれるっ<emoji=heart04>\u3000ちゅぱぁっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 쮸부붓<emoji=heart04> 레로츄<emoji=heart04> 응후읏<emoji=heart04> ──기분 좋아서 이성이 녹아버려어<emoji=heart04> 응쪽<emoji=heart04> 쥬르르<emoji=heart04> 쥬렐<emoji=heart04> 츄파앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んむっ<emoji=heart04>\u3000しゅき<emoji=heart04>\u3000ダーリン、しゅきぃっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「응뭇<emoji=heart04> 조하<emoji=heart04> 달링, 조하아<emoji=heart04> 응쪽<emoji=heart04> 쪽<emoji=heart04> 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺も好きだ！」"
translation = "「윽…… 나도 좋아해!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ちゅぱっ<emoji=heart04>\u3000――はあぁっ<emoji=heart04>\u3000ダーリン<emoji=heart04><emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅむっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000しゅきっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000――しゅき、しゅき<emoji=heart04><emoji=heart04>\u3000しゅきしゅきしゅきぃ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「츄파앗<emoji=heart04> ──하아아앗<emoji=heart04> 달링<emoji=heart04><emoji=heart04> 쪽<emoji=heart04> 쮸읍<emoji=heart04> 응쪽<emoji=heart04> 조하<emoji=heart04> 응뭇<emoji=heart04> 츄파앗<emoji=heart04> ──조하, 조하<emoji=heart04><emoji=heart04> 조하조하조하아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「紅明、もうイキそうだ……！」"
translation = "「코우메이, 이제 갈 것 같아……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うんっ<emoji=heart04>\u3000アタシもイキそうだから、一緒にぃ<emoji=heart04>」"
translation = "「응<emoji=heart04> 나도 갈 것 같으니까 같이이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は紅明の動きに合わせて、下から激しくピストンする。"
translation = "나는 코우메이의 움직임에 맞춰 아래에서 격렬하게 피스톤질을 한다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ！？\u3000――ふあああああぁっ<emoji=heart04><emoji=heart04>\u3000ピストンすごいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000はあぁあんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいぃっ<emoji=heart04><emoji=heart04>」"
translation = "「앗!? ──후아아아아아앗<emoji=heart04><emoji=heart04> 피스톤 대단해<emoji=heart04> 앗<emoji=heart04> 응아아앗<emoji=heart04> 하아아안<emoji=heart04> 기분 좋아<emoji=heart04> 보지 기분 좋아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000――んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 안<emoji=heart04> 하아아앗<emoji=heart04> 후아아아앗<emoji=heart04> ──응<emoji=heart04> 후우읏<emoji=heart04> 아앗<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「紅明、ダメだ、出るっ――！」"
translation = "「코우메이, 안 돼, 나온다──!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000アタシもぉっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はあああぁっ<emoji=heart04>\u3000来るっ<emoji=heart04>\u3000くるくるっ<emoji=heart04>\u3000アクメ来ちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 나도오<emoji=heart04> 응아아앗<emoji=heart04> 후아앗<emoji=heart04> 하아아아앗<emoji=heart04> 온다<emoji=heart04> 온다온다<emoji=heart04> 절정 와버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ああああああっ<emoji=heart04><emoji=heart04>\u3000ダーリン、イっちゃうっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아아앗<emoji=heart04><emoji=heart04> 달링, 가버려어<emoji=heart04><emoji=heart04> 간다아<emoji=heart04><emoji=heart04> 가버려가버려가버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버렷──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「イックううううううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어어어어어어어어어어어어어어───앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아아아아아아아아아아~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ダーリンの精子、元気に入って来るぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아~앗<emoji=heart04><emoji=heart04><emoji=heart04> 달링 정자, 기운차게 들어와아아아~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んあああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000子宮の中、ダーリンのでいっぱいで幸せぇ……<emoji=heart04>」"
translation = "「응아아아아~앗<emoji=heart04><emoji=heart04> 자궁 안이 달링 걸로 가득해서 행복해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んうぅ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ダーリンの射精、長くて好きぃ<emoji=heart04>\u3000中出し気持ちいい……<emoji=heart04>」"
translation = "「응으<emoji=heart04> 하아아앗……<emoji=heart04> 달링 사정, 길어서 좋아아<emoji=heart04> 질내사정 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふうぅっ……<emoji=heart04>\u3000止まったみたいっしょ……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「후우읏……<emoji=heart04> 멈춘 것 같다구……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はゆっくりとペニスを引き抜くと――"
translation = "그녀는 천천히 페니스를 뽑아내더니──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「하아아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んふっ……<emoji=heart04>\u3000今日もいっぱい出たね<emoji=heart04>\u3000ダーリン、気持ち良かった……？」"
translation = "「응후……<emoji=heart04> 오늘도 잔뜩 나왔네<emoji=heart04> 달링, 기분 좋았어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、最高だった……」"
translation = "「아아, 최고였어……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「なら良かったっしょ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ご奉仕してたのに、アタシも一緒に気持ち良くなってイっちゃった……<emoji=heart04>」"
translation = "「그럼 다행이라구……<emoji=heart04> 응<emoji=heart04> 봉사하고 있었는데 나도 같이 기분 좋아져서 가버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全肯定エッチ、実際にやってみると、なんというか……体だけじゃなくて、心も気持ち良くなってしまった……」"
translation = "「전긍정 섹스, 실제로 해보니까 뭐랄까…… 몸뿐만 아니라 마음도 기분 좋아져 버렸어……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んふっ<emoji=heart04>\u3000アタシは本当に思ってること、言っただけなんだけどね<emoji=heart04>」"
translation = "「응후<emoji=heart04> 나는 정말로 생각하는 걸 말했을 뿐이지만 말야<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「でも、普段思っててもきっかけがないと言い出せないことって沢山あるし、すごくラブラブなエッチができたっしょ<emoji=heart04>」"
translation = "「하지만 평소에 생각하고 있어도 계기가 없으면 꺼내지 못하는 것들이 많고, 정말 러브러브한 섹스를 할 수 있었다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうだな。今度は、俺が紅明を『全肯定』して、エッチしちゃおっか」"
translation = "「그렇네. 이번에는 내가 코우메이를 『전긍정』하면서 섹스해 볼까」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー<emoji=heart04>\u3000ダーリンってば、そんなんしたらアタシ、メロメロになり過ぎてアへ顔になっちゃうし<emoji=heart04>」"
translation = "「음모~<emoji=heart04> 달링도 참, 그런 짓 하면 나 너무 헤롱헤롱해져서 아헤가오 되어버린다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「……って、ダーリン？\u3000もしかして、疲れて眠くなってきちゃった？」"
translation = "「……어라, 달링? 혹시 피곤해서 잠이 오기 시작했어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ん……ああ、ちょっと……」"
translation = "「응…… 아아, 조금……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「なら……このままゆっくり休んでいいよ♪\u3000後片づけはアタシがしとくから」"
translation = "「그럼…… 이대로 푹 쉬어도 돼♪ 뒷정리는 내가 해둘 테니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「紅明にだけさせるのは、ちょっと……」"
translation = "「코우메이한테만 시키는 건 좀……」"

[[dialogue]]
speaker = "unk"
original = "と言いつつも、俺の意識は徐々に暗闇に落ちていく。"
translation = "라고 말하면서도 내 의식은 서서히 어둠 속으로 떨어진다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「気にしなくていいっしょ。だってアタシは……ダーリンの奥さんだし<emoji=heart04>」"
translation = "「신경 쓰지 않아도 된다구. 왜냐면 나는…… 달링의 아내니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「エッチもしたければいつでも、好きな時にできるんだから<emoji=heart04>\u3000……ちゅっ<emoji=heart04>」"
translation = "「섹스도 하고 싶으면 언제든 하고 싶을 때 할 수 있으니까<emoji=heart04> ……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、紅明はおでこにキスをしてくれる。"
translation = "그렇게 말하며 코우메이는 이마에 키스를 해준다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、お休みなさい。また明日、元気に会おうね……♪」"
translation = "「달링, 잘 자. 내일 또 건강하게 만나자……♪」"

[[dialogue]]
speaker = "unk"
original = "俺は優しく頭を撫でられて、幸福な気分で眠りにつくのだった――"
translation = "나는 상냥하게 머리를 쓰다듬어지며 행복한 기분으로 잠에 든다──"

