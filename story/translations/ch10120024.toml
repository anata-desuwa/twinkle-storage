[[dialogue]]
speaker = "unk"
original = "第４話,キリカとケーキ入刀,P"
translation = "제4화, 키리카와 케이크 커팅, P"

[[dialogue]]
speaker = "キリカ"
original = "「全くもう……わざわざ式場を訪れる必要はないのでは？\u3000ウェディングドレス姿程度、自室で見せて差し上げますよ？」"
translation = "「정말이지…… 굳이 식장을 방문할 필요가 있나요? 웨딩드레스 차림 정도는 방에서 보여드릴 텐데요?」"

[[dialogue]]
speaker = "キリカ"
original = "「休憩中とはいえ職務中ですし。あまりお屋敷から離れてしまうと、ゆったり２人で過ごせる時間がむしろ少なく──……」"
translation = "「휴식 중이라고는 해도 직무 중이고요. 너무 저택에서 멀어지면 오붓하게 둘이서 보낼 수 있는 시간이 오히려 적어──……」"

[[dialogue]]
speaker = "キリカ"
original = "「っっ！\u3000な、何事ですっ！？」"
translation = "「윽! 무, 무슨 일입니까!?」"

[[dialogue]]
speaker = "みんな"
original = "「おめでとうございま～す！」"
translation = "「축하드려요~!」"

[[dialogue]]
speaker = "キリカ"
original = "「は……はい？\u3000なぜフィオナお嬢様とメイド隊がお揃いに？\u3000それに私は一体何を祝われて……？」"
translation = "「하…… 예? 왜 피오나 아가씨와 메이드대가 다 모여 있는 거죠? 게다가 저는 대체 무엇을 축하받는……?」"

[[dialogue]]
speaker = "ナミエル"
original = "「これは……現れるタイミングが早かったのでは？」"
translation = "「이거…… 나타나는 타이밍이 너무 빨랐던 거 아닐까요?」"

[[dialogue]]
speaker = "マリオン"
original = "「段取り担当はフェニエルさんでしたよね？\u3000今だと言うから物陰から飛び出してクラッカーを鳴らしたのですけど」"
translation = "「순서 담당은 페니엘 씨였죠? 지금이라고 하기에 물건 뒤에서 튀어나와서 폭죽을 터뜨린 건데요」"

[[dialogue]]
speaker = "フェニエル"
original = "「ぴぃっ！？\u3000しゅしゅしゅ、しゅみませんっ！\u3000てっきりもう色々と伝えられた後かと思いましてっ……！！」"
translation = "「삐익!? 죄죄죄, 죄송합니다! 당연히 벌써 이것저것 전해진 뒤인 줄 알고서요……!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「まぁまぁ細かいことはいいじゃない。緋宮会長が恥ずかしい想いをするだけだから♪」"
translation = "「자자, 세세한 건 상관없잖아. 히노미야 회장님이 부끄러워할 뿐이니까♪」"

[[dialogue]]
speaker = "キリカ"
original = "「状況が掴めないのですが……」"
translation = "「상황 파악이 안 됩니다만……」"

[[dialogue]]
speaker = "unk"
original = "ええとね……"
translation = "에 그러니까……"

[[dialogue]]
speaker = "フィオナ"
original = "「プロポーズだよ、プロポーズ♪\u3000緋宮会長が今からキリカにプロポーズするの♪」"
translation = "「프로포즈야, 프로포즈♪ 히노미야 회장님이 지금부터 키리카에게 프로포즈할 거야♪」"

[[dialogue]]
speaker = "キリカ"
original = "「プロポっ──！？」"
translation = "「프로포즈──!?」"

[[dialogue]]
speaker = "マリオン"
original = "「既に三ヶ月分のお給金をお嬢様に前借りしたそうですよ？\u3000そこでプロポーズするつもりだと発覚してしまっただとか」"
translation = "「이미 석 달 치 월급을 아가씨께 가불했다고 하더라고요? 거기서 프로포즈할 생각이라는 게 들통나 버렸달까」"

[[dialogue]]
speaker = "フェニエル"
original = "「そこでメイド隊総出でおふたりをお祝いしようというお話になったんです！\u3000ウェディングケーキも作ったんですよ！」"
translation = "「그래서 메이드대 전원이 두 분을 축하해 드리기로 이야기가 된 거예요! 웨딩케이크도 만들었다고요!」"

[[dialogue]]
speaker = "ナミエル"
original = "「私はプロポーズに失敗して玉砕なさる緋宮会長を見に来ただけですが。メイド長も同棲生活を経て、緋宮会長に嫌気が差してきた頃でしょうし」"
translation = "「저는 프로포즈에 실패해서 옥쇄하시는 히노미야 회장님을 보러 온 것뿐입니다만. 메이드장도 동거 생활을 거치며 히노미야 회장님에게 정이 떨어졌을 즈음일 테고」"

[[dialogue]]
speaker = "キリカ"
original = "「それでわざわざ式場へ……？\u3000皆さまの前で公開プロポーズをするために……？」"
translation = "「그래서 굳이 식장으로……? 여러분 앞에서 공개 프로포즈를 하기 위해서……?」"

[[dialogue]]
speaker = "unk"
original = "プロポーズしてから出てきてもらうはずだったけど"
translation = "프로포즈하고 나서 나오게 할 생각이었는데"

[[dialogue]]
speaker = "フィオナ"
original = "「裏でこっそり覗いているのか、目の前で見ているのかの違いですよ♪\u3000さぁさぁ早くプロポーズしてください！\u3000熱い愛の言葉を聞かせてください！」"
translation = "「뒤에서 몰래 엿보느냐, 눈앞에서 보느냐의 차이일 뿐이야♪ 자자 빨리 프로포즈하세요! 뜨거운 사랑의 고백을 들려달라고요!」"

[[dialogue]]
speaker = "キリカ"
original = "「～～っっ。ま、待ってください。まだ心の準備が……！」"
translation = "「～～윽. 기, 기다려 주세요. 아직 마음의 준비가……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「はわー、あんなにお顔を真っ赤にしたキリカさん初めて見ました……」"
translation = "「하와─, 저렇게 얼굴을 새빨갛게 붉힌 키리카 씨는 처음 봐요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「お声まで上擦らせて……」"
translation = "「목소리까지 떨리시고……」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふ、キリカさんの鉄面皮が剥がれるなんて。恋は人を変えるものですね」"
translation = "「우후후, 키리카 씨의 철면피가 벗겨지다니. 사랑은 사람을 바꾸는 것이군요」"

[[dialogue]]
speaker = "キリカ"
original = "「コ、コホン。あなたたちは早く職務に戻りなさい。休憩時間はとっくの昔に終わっているはずです。先代も隠居先に戻られてくださいませ」"
translation = "「코, 코흡. 당신들은 빨리 직무로 돌아가세요. 휴식 시간은 진작에 끝났을 터입니다. 선대께서도 은거지로 돌아가 주십시오」"

[[dialogue]]
speaker = "マリオン"
original = "「おやおや。私は隠居したつもりはないのですが」"
translation = "「어라어라. 저는 은거할 생각은 없습니다만」"

[[dialogue]]
speaker = "フィオナ"
original = "「メイド隊のみんなには午後から休暇を出したから♪\u3000それにみんな、キリカの幸せを一緒にお祝いしたいの」"
translation = "「메이드대 모두에게는 오후부터 휴가를 줬으니까♪ 그리고 모두 키리카의 행복을 함께 축하하고 싶어 해」"

[[dialogue]]
speaker = "フィオナ"
original = "「……幸せになってね、キリカ？\u3000星見家に仕える使用人としてじゃなく、家族の一員として、あなたの幸せを祈っている」"
translation = "「……행복해져야 해, 키리카? 호시미 가문을 섬기는 고용인으로서가 아니라, 가족의 일원으로서 당신의 행복을 빌고 있어」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様……」"
translation = "「아가씨……」"

[[dialogue]]
speaker = "unk"
original = "キリカ"
translation = "키리카"

[[dialogue]]
speaker = "キリカ"
original = "「っっ。は、はいっ」"
translation = "「윽. 네, 넷」"

[[dialogue]]
speaker = "unk"
original = "俺と結婚してください"
translation = "나와 결혼해 주세요"

[[dialogue]]
speaker = "キリカ"
original = "「……本当にあなたは身勝手なお方ですね。心の準備もさせず、自分の想いばかり強引に伝えてこられて……」"
translation = "「……정말 당신은 제멋대로인 분이시군요. 마음의 준비도 시켜주지 않고, 자기 생각만 강압적으로 전해 오시고……」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが──……ん、ちゅっ<emoji=heart04>」"
translation = "「하지만──…… 응, 츄<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「この上なく嬉しいです。皆の前でプロポーズしてくれたこと、結婚して欲しいと告げてくれたこと」"
translation = "「더할 나위 없이 기쁩니다. 모두의 앞에서 프로포즈해 준 것, 결혼해 달라고 말해준 것」"

[[dialogue]]
speaker = "キリカ"
original = "「こんな私で良ければ、是非もらってください。私もずっと、あなたと<ruby>夫婦<rt>めおと</rt></ruby>になりたいと願っておりましたから……ちゅっ」"
translation = "「이런 저라도 괜찮다면, 부디 데려가 주세요. 저도 계속 당신과 부부가 되고 싶다고 바라고 있었으니까요…… 츄」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふぁー……？\u3000い、今、チューしました……？\u3000してましたよねっ？」"
translation = "「화아─……? 지, 지금 뽀뽀했어요……? 했죠?」"

[[dialogue]]
speaker = "ナミエル"
original = "「誓いの口づけを花嫁にさせるなんて、だらしない男性です。……と、というかいつまでチュッチュし合ってるのですか」"
translation = "「맹세의 입맞춤을 신부에게 시키다니, 한심한 남성입니다. ……그, 그보다 언제까지 쪽쪽거리고 있을 셈입니까」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、どれだけキスしても足りないくらい幸せということですよ。今の内にウェディングケーキを運んできましょうか」"
translation = "「후후, 아무리 키스해도 부족할 만큼 행복하다는 뜻이죠. 이쯤 해서 웨딩케이크를 운반해 올까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ほーら２人とも♪\u3000イチャイチャするのは帰ってからにして、初めての共同作業しないと♪」"
translation = "「자자 두 사람 다♪ 꽁냥거리는 건 집에 가서 하고, 첫 공동 작업을 해야지♪」"

[[dialogue]]
speaker = "キリカ"
original = "「ちゅ、んっ……～～っっ。わ、私としたことが。皆さまがいらっしゃることを失念していて……！」"
translation = "「츄, 응…… ～～윽. 저, 저답지 않게. 여러분이 계시다는 걸 잊고 있어서……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「さあ２人とも。仲良くナイフを握って？\u3000ナミエル、フェニエル、とびきりの笑顔を撮影してあげてね？」"
translation = "「자 두 사람 다. 사이좋게 나이프를 쥐어봐? 나미엘, 페니엘, 최고의 미소를 촬영해 줘?」"

[[dialogue]]
speaker = "キリカ"
original = "「せ、急かさないでください。ひゃっ……！\u3000て、手が触れてっ……」"
translation = "「재, 재촉하지 마세요. 히얏……! 소, 손이 닿아서……」"

[[dialogue]]
speaker = "unk"
original = "こうして手を取り合いながら生きていこう"
translation = "이렇게 손을 맞잡으며 살아가자"

[[dialogue]]
speaker = "キリカ"
original = "「っっ。は……はい」"
translation = "「윽. 네…… 알겠습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「しかし寿退社はいたしませんよ？\u3000これからも私はフィオナお嬢様を支え続ける所存ですから。メイド長として、お嬢様の家族の一員として、それだけは譲れません」"
translation = "「하지만 결혼 퇴직은 하지 않을 겁니다? 앞으로도 저는 피오나 아가씨를 계속 보필할 생각이니까요. 메이드장으로서, 아가씨의 가족의 일원으로서, 그것만은 양보할 수 없습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが……同じくらいあなたのことも支えたいと思っております。世界にただ１人、私が心に決めた……愛するあなたを」"
translation = "「하지만…… 그만큼 당신도 지탱해 드리고 싶다고 생각합니다. 세상에 단 한 명, 제가 마음으로 정한…… 사랑하는 당신을」"

[[dialogue]]
speaker = "キリカ"
original = "「さあケーキを切り分けましょうか。お嬢様も今か今かと待ち侘びていらっしゃいます」"
translation = "「자, 케이크를 나누어 볼까요. 아가씨도 지금인가 저금인가 하며 애타게 기다리고 계시니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「幸せいっぱいの笑顔を見せつけて、ふふ。お嬢様を安心させてあげましょう」"
translation = "「행복 가득한 미소를 보여주며, 후후. 아가씨를 안심시켜 드리죠」"

