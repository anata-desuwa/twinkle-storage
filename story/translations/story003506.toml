[[dialogue]]
speaker = "unk"
original = "メルエルが、小さな自分からの告白する宣言をされた翌朝。"
translation = "메루엘이 어린 자신으로부터 고백 선언을 들은 다음 날 아침."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁ……」"
translation = "「하아……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエル、おはよう」"
translation = "「메루엘, 안녕」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、か、会長くん……！？」"
translation = "「앗, 회, 회장군……!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えっ！？\u3000――朝から元気がないように見える？\u3000そ、そんなことないよ？」"
translation = "「엣!? ――아침부터 기운이 없어 보인다고? 그, 그렇지 않아?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「心配してくれてありがとう♪\u3000ちょっとひと息ついてただけだから、大丈夫！」"
translation = "「걱정해 줘서 고마워♪ 그냥 잠깐 숨을 돌리고 있었을 뿐이니까, 괜찮아!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「じ、じゃあ、教室に行くから、またね♪」"
translation = "「그, 그럼, 교실에 갈 테니까, 나중에 봐♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って笑顔を見せて、メルエルはクロトから逃げるようにその場を立ち去るのだった。"
translation = "그렇게 말하며 미소를 지어 보이고는, 메루엘은 쿠로토에게서 도망치듯 그 자리를 떠났다."

[[dialogue]]
speaker = "unk"
original = "その日の放課後。"
translation = "그날 방과 후."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「メルエル～！」"
translation = "「메루엘~!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、ヴィーナスちゃん！\u3000それにレミカちゃんも、どうしたの？\u3000体が小さくなってる間は附属校に通ってるんじゃ……」"
translation = "「앗, 비너스짱! 게다가 레미카짱도, 무슨 일이야? 몸이 작아져 있는 동안에는 부속 학교에 다니고 있는 게……」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「ねぇ、メルエル。小さい自分と、何かあった？」"
translation = "「저기, 메루엘. 작은 자신이랑 무슨 일 있었어?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「！\u3000ご、ごめんね。まだちっちゃな自分と意見が合わなくて、それで２人には迷惑かけちゃって……」"
translation = "「! 미, 미안해. 아직 어린 나랑 의견이 맞지 않아서, 그래서 두 사람에게 폐를 끼쳐버렸네……」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「それは気にしなくていいんだけど、会長が私たちに相談しに来てさ」"
translation = "「그건 신경 쓰지 않아도 되는데, 회장이 우리한테 상담하러 왔었거든.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんが……？」"
translation = "「회장군이……?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「パパがメルエルの様子が変だって心配してて、それで私とレミカに相談に乗ってあげて欲しいってお願いしにきたのよ！」"
translation = "「아빠가 메루엘의 상태가 이상하다고 걱정해서, 그래서 나랑 레미카한테 상담 좀 해달라고 부탁하러 왔었어!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そうだったんだ。会長くんに、また迷惑をかけちゃったなぁ……」"
translation = "「그랬구나. 회장군에게 또 폐를 끼쳐버렸네……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あのね……実は――」"
translation = "「저기…… 사실은――」"

[[dialogue]]
speaker = "unk"
original = "空き教室へと移動しながら、メルエルは昨日、小さな自分と話した時のことを打ち明ける。"
translation = "빈 교실로 이동하면서, 메루엘은 어제 어린 자신과 이야기했을 때의 일을 털어놓는다."

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「そっか。小さなメルエルが、会長に……」"
translation = "「그렇구나. 작은 메루엘이 회장에게……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん。自分の気持ちは自分が１番よくわかってるから、私、何も言えなくなっちゃって……」"
translation = "「응. 내 마음은 내가 제일 잘 알고 있으니까, 나, 아무 말도 할 수 없게 되어버려서……」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「う～ん、なるほどね！\u3000難しいことはよくわからないけれど――」"
translation = "「으음~ 그렇구나! 어려운 건 잘 모르겠지만――」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「メルエル！\u3000こういう時は、気晴らしにバトルよ♪」"
translation = "「메루엘! 이럴 때는 기분 전환으로 배틀이야♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えぇええぇえ”ぇっ”！？」"
translation = "「에에에에에에엑!?」"

[[dialogue]]
speaker = "unk"
original = "それから、３人はアリーナへと移動して、仮想結界システムを起動。"
translation = "그러고 나서 세 사람은 아레나로 이동하여 가상 결계 시스템을 기동."

[[dialogue]]
speaker = "unk"
original = "一緒に戦闘訓練を行うことになった。"
translation = "함께 전투 훈련을 하게 되었다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「行くわよ、メルエル！\u3000――リトルシューティングスター！」"
translation = "「간다, 메루엘! ――리틀 슈팅 스타!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「くぅっ……！\u3000ヴィーナスちゃん、小さな体でもすごく強い！」"
translation = "「쿠윽……! 비너스짱, 작은 몸인데도 정말 강해!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ふふん♪\u3000そうでしょ～？\u3000武器が『ビーム銃』になったから、前より色々なビームを撃てるようになったのよ♪」"
translation = "「후훗♪ 그렇지~? 무기가 『빔 건』으로 바뀌어서 전보다 다양한 빔을 쏠 수 있게 됐거든♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ねぇ、メルエル！\u3000私、思うんだけど、難しくてどうしたらいいかわからない時は、とりあえず戦ってみればいいと思うのよ！」"
translation = "「저기, 메루엘! 내 생각엔 말이야, 어려워서 어떻게 해야 할지 모를 때는 일단 싸워보면 된다고 봐!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「戦う？」"
translation = "「싸운다구?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「そう！\u3000それで負けたとしても、どうやって勝てるかを考えて！\u3000またチャレンジすればいいと思うの！」"
translation = "「응! 그래서 지더라도 어떻게 하면 이길 수 있을지를 생각해서! 다시 챌린지하면 된다고 생각해!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「勝てるまで、何度だって！」"
translation = "「이길 때까지 몇 번이고!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でも……！\u3000私は、ちっちゃい自分の気持ち、わかっちゃうから……」"
translation = "「하지만……! 나는 어린 나의 마음을 알아버리니까……」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「メルエルはクロトのこと、ちっちゃい自分に取られちゃってもいいの！？」"
translation = "「메루엘은 쿠로토를 어린 자신에게 빼앗겨버려도 괜찮은 거야!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「私は小さい私と元の１人に戻れるから、パパの頬っぺたにキスするのを我慢してたけど、ちっちゃいメルエルは元に戻る気はないって言ってるんでしょ？」"
translation = "「나는 작은 나랑 원래의 하나로 돌아갈 수 있으니까 아빠 볼에 키스하는 걸 참고 있었지만, 어린 메루엘은 원래대로 돌아갈 생각이 없다고 했다며?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「もし私だったら、小さい自分だけパパとイチャイチャするのは、ずるいからイヤだって思うわ！」"
translation = "「만약 나라면, 작은 나만 아빠랑 꽁냥거리는 건 치사해서 싫다고 생각할 거야!」"

[[dialogue]]
speaker = "unk"
original = "小さい姿になったヴィーナスのビームがメルエルにヒットして、仮想結界システムがヴィーナスに勝ち星のランプを付ける。"
translation = "작은 모습이 된 비너스의 빔이 메루엘에게 적중하고, 가상 결계 시스템이 비너스에게 승리의 램프를 점등한다."

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「ぷっ……ふふふっ……！\u3000よくわからない時は、とりあえず戦うって……！」"
translation = "「푸흡…… 후후훗……! 잘 모를 때는 일단 싸우라니……!」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「でも――私も、ヴィーナスの言っていることは間違ってないと思うよ」"
translation = "「하지만―― 나도 비너스가 하는 말이 틀리지 않다고 생각해.」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「メルエルは会長のこと、誰にも譲りたくないくらい、すごく好きなんだよね？」"
translation = "「메루엘은 회장을 누구에게도 양보하고 싶지 않을 정도로 정말 좋아하는 거지?」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「私、メルエルには本当にアイドルの才能があると思うし……チャンスがあればまた『アーネスト』としてユニットを組みたいって、今でも思ってる」"
translation = "「나, 메루엘에겐 정말 아이돌의 재능이 있다고 생각하고…… 기회가 있다면 다시 『어니스트』로서 유닛을 짜고 싶다고 지금도 생각하고 있어.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「！\u3000レミカちゃん……」"
translation = "「! 레미카짱……」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「でも、メルエルはみんなに愛を与えるアイドルよりも、会長１人に対しての一途な愛を貫くことを選んだでしょ？」"
translation = "「하지만 메루엘은 모두에게 사랑을 주는 아이돌보다 회장 한 사람에 대한 일편단심 사랑을 관철하는 걸 선택했잖아?」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「その気持ちは、小さいメルエルもきっと同じ。だったら――メルエルが選ぶべき道は１つ」"
translation = "「그 마음은 어린 메루엘도 분명 똑같을 거야. 그렇다면―― 메루엘이 택해야 할 길은 하나.」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「一途な気持ちで、自分に負けちゃダメだよ」"
translation = "「한결같은 마음으로 자신에게 지면 안 돼.」"

[[dialogue]]
speaker_original = "レミカ（幼少）"
speaker_translation = "레미카(어린 시절)"
original = "「元の１人に戻るとか、そんなのは後で考えればいい。いま大事なのは、メルエルの気持ちだよ」"
translation = "「원래의 하나로 돌아간다거나 그런 건 나중에 생각하면 돼. 지금 중요한 건 메루엘의 마음이야.」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「メルエルなら、大丈夫よ！」"
translation = "「메루엘이라면 괜찮을 거야!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「だって、メルエルはすごくいい子だもの！\u3000自信を持って、小さな自分に全力でぶつかればいいわ！」"
translation = "「그야 메루엘은 정말 착한 아이인걸! 자신감을 갖고 작은 자신에게 전력으로 부딪치면 돼!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「相手は自分なんだから、全力で挑めば、必ず気持ちは伝わるはずよ！」"
translation = "「상대는 자신이니까, 전력으로 도전하면 반드시 진심이 전해질 거야!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ヴィーナスちゃん、レミカちゃん……２人共、ありがとう」"
translation = "「비너스짱, 레미카짱…… 둘 다 고마워.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私――もう１度自分と話してみるよ！」"
translation = "「나―― 다시 한번 나 자신과 이야기해 볼게!」"

[[dialogue]]
speaker = "unk"
original = "そうして、小さな自分と改めて話し合おうと決意したメルエルだったが、問題が発生していた。"
translation = "그렇게 어린 자신과 다시 대화하기로 결심한 메루엘이었지만, 문제가 발생했다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちっちゃい私、一体どこに行っちゃったんだろう……！？」"
translation = "「어린 나, 도대체 어디로 가버린 걸까……!?」"

[[dialogue]]
speaker = "unk"
original = "肝心の小さなメルエルが姿を消していた。附属校の教室にも、臨時で用意してもらった寮の部屋にもその姿がない。"
translation = "정작 중요한 어린 메루엘이 모습을 감추고 있었다. 부속 학교 교실에도, 임시로 마련된 기숙사 방에도 그 모습이 없다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（会長くんやヴィーナスちゃん、レミカちゃんにも協力してもらって探してるけど……）"
translation = "(회장군이나 비너스짱, 레미카짱에게도 협력을 구해서 찾고 있지만……)"

[[dialogue]]
speaker = "unk"
original = "小さい自分が何を思って行動しているのか、メルエルは考えてみる。"
translation = "어린 자신이 무슨 생각을 하고 행동하는지 메루엘은 생각해 본다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（ちっちゃい私も、心は同じ。なら、考えることは――）"
translation = "(어린 나도 마음은 똑같아. 그렇다면 생각하는 건――)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（もしかして……会長くんに今日告白を？\u3000だとしたら、場所は……）"
translation = "(설마…… 회장군에게 오늘 고백을? 그렇다면 장소는……)"

[[dialogue]]
speaker = "unk"
original = "メルエルは頭の中に、ある場所を思い浮かべるのだった。"
translation = "메루엘은 머릿속에 어느 장소를 떠올렸다."

