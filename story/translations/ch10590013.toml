[[dialogue]]
speaker = "unk"
original = "第３話,楽しい時をいつまでも,P"
translation = "제3화, 즐거운 시간을 언제까지나, P"

[[dialogue]]
speaker = "unk"
original = "ある日、リップルからリゾート結界の新機能について紹介したいと、２校の星徒会長である俺とフィオナは呼び出しを受けた――"
translation = "어느 날, 리플로부터 리조트 결계의 신기능에 대해 소개하고 싶다는 부름을 받고 두 학교의 성도회장인 나와 피오나가 찾아갔다──"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「２人共、お忙しい中来てくれて、アリガトございます！」"
translation = "「두 분 다 바쁘신 와중에 와주셔서 감사함다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえいえ、リゾート結界は生徒達からも人気で、学園の新しい施設と言ってもいいくらいですから。その運営を手伝うのも、星徒会の仕事のうちですよ」"
translation = "「아니요, 리조트 결계는 학생들에게도 인기라서 학원의 새로운 시설이라고 해도 될 정도니까요. 그 운영을 돕는 것도 성도회의 업무 중 하나예요」"

[[dialogue]]
speaker = "unk"
original = "スケジュール調整して来たから、大丈夫だよ"
translation = "스케줄 조정해서 왔으니까 괜찮아"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それでリップルさん、新機能とは一体、どのようなものなんですか？」"
translation = "「그래서 리플 씨, 신기능이란 대체 어떤 것인가요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「実際に試して貰えば、効果が分かりやすいとオモいます！\u3000久しぶりにこの３人で揃いましたし――」"
translation = "「실제로 시험해 보시면 효과를 알기 쉬울 거라 생각함다! 오랜만에 이 세 명이 모였으니──」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「海でサーフィンをして遊びましょう♪」"
translation = "「바다에서 서핑을 하며 놉시다♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「よし、大きな波が来ましたね。私も夏合宿から更に練習を重ねて出来るようになった大技……２人に披露します！」"
translation = "「좋아, 큰 파도가 왔네요. 저도 여름 합숙 때보다 더 연습해서 할 수 있게 된 큰 기술…… 두 분께 선보이겠어요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「波に乗って……行きます！\u3000はあぁぁぁっ、パイプライン！\u3000――からの！」"
translation = "「파도를 타고…… 갑니다! 하아아아앗, 파이프라인! ──에서!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワオッ！？\u3000ただのエアリアルじゃありません……！\u3000空中でバック転する最高難易度の大技！」"
translation = "「와오!? 평범한 에어리얼이 아님다……! 공중에서 뒤공중돌기를 하는 최고 난이도의 큰 기술!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ロデオフリップ！！！」"
translation = "「로데오 플립!!!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「わあぁぁぁっ！\u3000やりました！\u3000フィオナ、本当にロデオフリップを成功させちゃいマシタぁぁぁっ！」"
translation = "「와아아앗! 해냈슴다! 피오나, 정말로 로데오 플립을 성공시켰슴다아아앗!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぅ……よしっ！\u3000見てくれましたか、リップルさん、会長さんっ」"
translation = "「후우…… 좋아! 보셨나요, 리플 씨, 회장님」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000見ました！\u3000見てましたよ！\u3000今の星力なしデスよね！？\u3000ワタシでも滅多に成功しないのに、ＢＩＧ凄いです！\u3000感動で～す♪」"
translation = "「네♪ 봤슴다! 보고 있었슴다! 방금 거 성력 없이 하신 거죠!? 저도 좀처럼 성공하지 못하는데 BIG 대단함다! 감동임다~♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふっ、あれからすっかりサーフィンにハマっちゃいまして。リゾート結界のおかげで場所も困りませんし、休日に息抜きがてら、よく練習してたんです」"
translation = "「후후, 그때부터 완전히 서핑에 빠져버려서요. 리조트 결계 덕분에 장소도 걱정 없고, 휴일에 기분 전환 겸 자주 연습했답니다」"

[[dialogue]]
speaker = "unk"
original = "すっかり追い抜かれちゃったな"
translation = "완전히 추월당해 버렸네"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ、私も出来るようになったんですから、多才な会長さんならすぐに覚えられますよ」"
translation = "「아니요, 저도 할 수 있게 되었으니 다재다능하신 회장님이라면 금방 배울 수 있을 거예요」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウですよ！\u3000カイチョーだって、あれからもうエアリアルが出来るようになってるんデスから！」"
translation = "「그럼요! 회장님도 그때부터 벌써 에어리얼을 할 수 있게 되셨으니까요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フィオナに負けないように、ワタシと一緒にロデオフリップを練習しましょー！」"
translation = "「피오나에게 지지 않도록 저와 함께 로데오 플립을 연습합시다!」"

[[dialogue]]
speaker = "unk"
original = "待って、最高難易度って言ってなかった！？"
translation = "잠깐, 최고 난이도라고 하지 않았어!?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「サーフィン仲間として、私も会長さんのロデオフリップ習得を全力で応援します。ですから、会長さんも一緒にサーフィンの高みへ登り詰めましょう――さあ」"
translation = "「서핑 동료로서 저도 회장님의 로데오 플립 습득을 전력으로 응원하겠습니다. 그러니 회장님도 함께 서핑의 정점에 올라보자고요── 자」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「さあさあ♪\u3000カイチョーもレッツ、サーフィンで～す！」"
translation = "「자자♪ 회장님도 레츠, 서핑임다~!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ……ええぇぇぇ～～～っ！？"
translation = "잠깐…… 에에에에엥~~~!?"

[[dialogue]]
speaker = "unk"
original = "それからロデオフリップの特訓が続き――"
translation = "그 후로 로데오 플립 특훈이 이어지고──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぅ……長いこと練習に夢中になってしまいましたね。そろそろ海を上がりましょうか」"
translation = "「후우…… 오랫동안 연습에 꿈중해 버렸네요. 슬슬 바다에서 나갈까요」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ、そうデスね！\u3000１度、海の家で休憩しましょー♪」"
translation = "「네, 그렇슴다! 일단 바다의 집에서 휴식하죠~♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「会長さんがまだロデオフリップを習得出来てないのに、切り上げるのは心苦しいですが……」"
translation = "「회장님이 아직 로데오 플립을 습득하지 못했는데 끝내는 건 마음이 아픕니다만……」"

[[dialogue]]
speaker = "unk"
original = "いや、今日中に習得は無理だよ！？"
translation = "아니, 오늘 안에 습득은 무리라고!?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「――そういえば、すっかり忘れてしまってましたが、結界の新機能って一体何だったのでしょう？\u3000目立って変わった様子はありませんでしたが……」"
translation = "「──그러고 보니 완전히 잊고 있었습니다만, 결계의 신기능이란 대체 무엇이었나요? 눈에 띄게 변한 모습은 없었습니다만……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フッフッフ、今こそそれを明かす時デスね！\u3000実はその『変わらない』というのが、今回のポイントなのです！」"
translation = "「훗훗훗, 지금이야말로 그것을 밝힐 때임다! 사실 그 『변하지 않는다』는 것이 이번의 포인트임다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「２人共、あれを見て下さい！」"
translation = "「두 분 다 저기를 봐주세요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リップルさんの指差した先……海の家にある時計、ですか？\u3000――え？」"
translation = "「리플 씨가 가리킨 곳…… 바다의 집에 있는 시계인가요? ──어라?」"

[[dialogue]]
speaker = "unk"
original = "時刻が……入って来た時の時間と同じ？"
translation = "시각이…… 들어왔을 때 시간이랑 똑같아?"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウで～す♪\u3000今はまだ半日程度が限界ですが、これがエンドレスサマーで新しく実装を考えている機能――」"
translation = "「맞슴다~♪ 지금은 아직 반나절 정도가 한계임다만, 이것이 엔들리스 서머에 새로 구현을 생각하고 있는 기능──」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「結界内の時間経過を停止する、名付けて『エターナル・バケーション・システム』で～す！」"
translation = "「결계 내의 시간 경과를 정지시키는, 이름하여 『에터널 버케이션 시스템』임다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え……えぇぇぇっ！？\u3000時間を止める！？\u3000そんなこと出来るはず……」"
translation = "「에…… 에에엣!? 시간을 멈춘다니!? 그런 게 가능할 리가……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウ言うと思ってました！\u3000結界を解除して、現実世界に戻りま～す♪」"
translation = "「그렇게 말할 줄 알았슴다! 결계를 해제하고 현실 세계로 돌아가겠슴다~♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「新星学園の星徒会室……時計は！？\u3000なっ……じ、時間が本当に、リゾート結界に入った時のままです！」"
translation = "「신성 학원의 성도회실…… 시계는!? 나…… 시, 시간이 정말로 리조트 결계에 들어갔을 때 그대로예요!」"

[[dialogue]]
speaker = "unk"
original = "嘘ぉ！？"
translation = "거짓말!?"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フフフ！\u3000これで引き続き、サーフィンの練習が出来ますね♪」"
translation = "「후후후! 이걸로 계속해서 서핑 연습을 할 수 있겠네요♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ドウですか、カイチョー、フィオナ！\u3000この機能が完成し、実装された暁には、学園の皆はもっとハッピーになれるはずです！」"
translation = "「어떻슴까, 회장님, 피오나! 이 기능이 완성되어 구현될 때에는 학원의 모두가 더 행복해질 수 있을 검다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ユクユクはこれを一般にも広めて、リゾート結界へ沢山の人をヨビコミます。その人達から夏が好きという気持ちをちょっとずつ分けて貰い――」"
translation = "「차후에는 이것을 일반인들에게도 퍼뜨려서 리조트 결계에 많은 사람을 불러모을 검다. 그 사람들로부터 여름을 좋아한다는 기분을 조금씩 나눠 받아──」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「それをエネルギーに変換して、結界サイズを拡張。やがては流星市国を覆って、常夏の世界実現への足掛かりに……！」"
translation = "「그것을 에너지로 변환해서 결계 사이즈를 확장. 이윽고 유성시국을 뒤덮어 상여름의 세계 실현을 위한 발판으로……!」"

[[dialogue]]
speaker = "unk"
original = "あ、アウトォ――ッ！！！"
translation = "아, 아웃──!!!"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「えぇっ、カイチョー、何故デスか！？」"
translation = "「엣, 회장님, 왜 그럼까!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リップルさん、これはダメです！\u3000凄いけど、実装したら色々問題なやつです！」"
translation = "「리플 씨, 이건 안 돼요! 대단하지만 구현하면 여러 가지로 문제인 녀석이에요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウなのですか？\u3000皆ハッピーになれる、素敵なアイデアだと思ったのデスが……」"
translation = "「그런 검까? 모두 행복해질 수 있는 멋진 아이디어라고 생각했슴다만……」"

