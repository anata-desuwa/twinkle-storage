[[dialogue]]
speaker = "unk"
original = "第１話,キリカと疑似新婚生活,P"
translation = "제1화, 키리카와 의사 신혼생활, P"

[[dialogue]]
speaker = "キリカ"
original = "「おきて……さい……」"
translation = "「일어나…… 세요……」"

[[dialogue]]
speaker = "キリカ"
original = "「起きて……ください」"
translation = "「일어나…… 주세요」"

[[dialogue]]
speaker = "キリカ"
original = "「ふふ……もう。仕方ありませんね……」"
translation = "「후후…… 정말. 어쩔 수 없군요……」"

[[dialogue]]
speaker = "キリカ"
original = "「ん……ちゅっ……」"
translation = "「응…… 츄……」"

[[dialogue]]
speaker = "キリカ"
original = "「っっ。おはようございます。いつまで眠りこけているのですか？\u3000そろそろ空が白む頃ですよ？」"
translation = "「윽. 좋은 아침입니다. 언제까지 잠만 자고 계실 건가요? 슬슬 동이 틀 무렵이라고요?」"

[[dialogue]]
speaker = "unk"
original = "キリカ……？\u3000俺はどうして星見家に？"
translation = "키리카……? 내가 왜 호시미 가문에?"

[[dialogue]]
speaker = "キリカ"
original = "「……まだ寝惚けておられるようですね。ここは私の私室です」"
translation = "「……아직 잠이 덜 깨신 모양이군요. 여기는 제 개인실입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「覚えておりませんか？\u3000お嬢様の計らいで、昨日からしばらく私の部屋で寝泊まりすることになったことを」"
translation = "「기억나지 않으십니까? 아가씨의 배려로, 어제부터 당분간 제 방에서 머물게 된 것을」"

[[dialogue]]
speaker = "キリカ"
original = "「私との……その……け、けけ……」"
translation = "「저와의…… 그…… 겨, 겨겨……」"

[[dialogue]]
speaker = "キリカ"
original = "「け、け、結婚生活の予行演習……ですか？」"
translation = "「겨, 겨, 결혼 생활의 예행연습…… 인가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「うん♪\u3000恋人って結婚する前に同棲するものでしょ？」"
translation = "「응♪ 연인이면 결혼하기 전에 동거하는 법이잖아?」"

[[dialogue]]
speaker = "キリカ"
original = "「コ、コホン。大変有り難いお申し出ですが、私共には必要ありませんかと。仕事に差し障る可能性もありますので」"
translation = "「크, 흠. 대단히 감사한 제안입니다만, 저희에게는 필요 없지 않을까 합니다. 업무에 지장을 줄 가능성도 있으니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「だからこその同棲じゃない。実際に一緒に暮らしてみて、自分の生活がどう変化するのか確認してみなくちゃ」"
translation = "「그러니까 동거하는 거지. 실제로 같이 살아보면서, 자신의 생활이 어떻게 변화하는지 확인해 봐야지」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに案外、仕事にも身が入るようになるんじゃない？\u3000恋人が一つ屋根の下にいてくれた方が、いつ連絡が届くかどうかキリカも気を揉まずに済むでしょ？」"
translation = "「게다가 의외로, 일도 더 잘하게 되지 않겠어? 연인이 한 지붕 아래 있어 주는 편이, 언제 연락이 올지 키리카도 마음 졸이지 않아도 되잖아?」"

[[dialogue]]
speaker = "キリカ"
original = "「私は気など揉んでおりません」"
translation = "「저는 마음 같은 거 졸이지 않았습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、嘘ばっかり。いつも気にしてるくせに。とにかく緋宮会長には私から伝えておくから。キリカは部屋の片付けでもしておきなさい」"
translation = "「후후, 거짓말쟁이. 맨날 신경 쓰면서. 아무튼 히노미야 회장에게는 내가 말해둘 테니까. 키리카는 방 정리나 해둬」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカも好きな人とイチャイチャできる時間が多い方がいいでしょ？\u3000結婚前に同棲していると離婚率も大幅に下がるらしいしね♪」"
translation = "「키리카도 좋아하는 사람이랑 꽁냥거릴 수 있는 시간이 많은 게 좋잖아? 결혼 전에 동거하면 이혼율도 대폭 낮아진대♪」"

[[dialogue]]
speaker = "キリカ"
original = "「……ともかくお嬢様の強い要望で同棲する流れになったのです。私は特段必要性を感じませんでしたが、お嬢様にああも言われては従うほかありませんので」"
translation = "「……어쨌든 아가씨의 강한 요망으로 동거하는 흐름이 되었습니다. 저는 딱히 필요성을 느끼지 못했습니다만, 아가씨께서 저렇게 말씀하시니 따를 수밖에 없어서요」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様にも困ったものです。漫画か何かの影響か、恋人同士は四六時中イチャコラしたがっていると思い込んでおられるようでして」"
translation = "「아가씨도 참 곤란한 분입니다. 만화 같은 것의 영향인지, 연인끼리는 사시사철 꽁냥거리고 싶어 한다고 믿고 계시는 모양이라서요」"

[[dialogue]]
speaker = "unk"
original = "そういえばさっき唇に温かい感触が……"
translation = "그러고 보니 방금 입술에 따뜻한 감촉이……"

[[dialogue]]
speaker = "キリカ"
original = "「よ、涎を垂らしておられましたからね。見ていられず口元を拭かせていただいただけです」"
translation = "「치, 침을 흘리고 계셨으니까요. 차마 볼 수 없어서 입가를 닦아드린 것뿐입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「それにしても……人のベッドでよく熟睡できますね？」"
translation = "「그건 그렇고…… 남의 침대에서 참 잘도 주무시는군요?」"

[[dialogue]]
speaker = "unk"
original = "キリカの気配と匂いに安心しちゃって"
translation = "키리카의 기척이랑 냄새 때문에 안심해 버려서"

[[dialogue]]
speaker = "キリカ"
original = "「そ……そうですか。しかし匂いがするというのはいただけませんね。まるで私の洗濯が行き届いていないように聞こえます」"
translation = "「그…… 그렇습니까. 하지만 냄새가 난다는 건 곤란하군요. 마치 제 세탁이 제대로 되지 않은 것처럼 들립니다」"

[[dialogue]]
speaker = "キリカ"
original = "「眠っている間も忙しなく寝返りを打たれて……。何度も布団を跳ねのけておりましたよ？」"
translation = "「잠든 동안에도 쉴 새 없이 뒤척이시고……. 몇 번이나 이불을 걷어차셨다고요?」"

[[dialogue]]
speaker = "キリカ"
original = "「寝言も大きかったですし……。私の名前を幾度も呼んで……。話しかけられているのかと思って、どれだけ返事をしてしまったことか……」"
translation = "「잠꼬대도 컸고…… 제 이름을 몇 번이나 부르셔서……. 말을 거시는 줄 알고, 얼마나 대답을 해버렸는지 모릅니다……」"

[[dialogue]]
speaker = "unk"
original = "安眠の邪魔しちゃった？"
translation = "잠 방해했어?"

[[dialogue]]
speaker = "キリカ"
original = "「い、いえ。恋人が隣で眠っているだけで目が冴えてしまうほど色呆けしておりません」"
translation = "「아, 아니요. 연인이 옆에서 자고 있다는 것만으로 눈이 번쩍 뜨일 만큼 사랑에 빠져 있지는 않습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「むしろ、あなたの方が心配です。欲望に忠実で強引なお方ですからね。同棲するとなると一体何をされるかわかったものではありません」"
translation = "「오히려 당신 쪽이 걱정입니다. 욕망에 충실하고 강압적인 분이니까요. 동거하게 되면 도대체 무슨 짓을 당할지 알 수 없으니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「寝起きする度に目覚めのキスをせがまれるかもしれませんし、夜眠る時は手を繋いでほしいと頼まれる恐れもあります」"
translation = "「일어날 때마다 아침 키스를 졸라댈지도 모르고, 밤에 잘 때는 손을 잡아달라고 부탁할 우려도 있습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「今のところそのような要望はありませんが……念のため、いつも以上に時間と心に余裕を持たせてはいますよ？」"
translation = "「지금으로서는 그런 요망은 없습니다만…… 만약을 위해, 평소 이상으로 시간과 마음의 여유를 두고는 있다고요?」"

[[dialogue]]
speaker = "キリカ"
original = "「私は特別そういった気持ちはありませんが、あなたがそのようなイチャイチャを求めてこないとは限りませんからね」"
translation = "「저는 특별히 그런 마음은 없습니다만, 당신이 그런 꽁냥거림을 요구해 오지 않으리라는 보장은 없으니까요」"

[[dialogue]]
speaker = "unk"
original = "イチャイチャしていいってこと？"
translation = "꽁냥거려도 된다는 뜻이야?"

[[dialogue]]
speaker = "キリカ"
original = "「決して推奨しているわけではありません。同棲にあたり、あらゆる想定と時間の確保をしてある……というだけです」"
translation = "「결코 권장하고 있는 것은 아닙니다. 동거에 있어, 모든 상정 상황과 시간 확보를 해두었다……는 것뿐입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「たとえば……ん、ちゅっ……。こ、こんな風に突然キスをされても、んんっ……仕事に差し障るようなことはありませんから……」"
translation = "「예를 들어…… 응, 츄. 이, 이런 식으로 갑자기 키스를 당해도, 응응…… 업무에 지장이 생기는 일은 없으니까요……」"

[[dialogue]]
speaker = "キリカ"
original = "「むしろ、その。我慢は決してされないようにお願いいたします……。変に遠慮されてしまうと予行演習になりませんので……」"
translation = "「오히려, 그. 참는 일은 결코 없으시길 부탁드립니다……. 이상하게 사양하시면 예행연습이 되지 않으니까요……」"

[[dialogue]]
speaker = "キリカ"
original = "「あ──……んんっ、ちゅぁっ<emoji=heart04>\u3000キ、キスをしろと言っているわけではありません<emoji=heart04>\u3000あくまで、私との結婚生活で行うであろうことをしていただきたいだけです……<emoji=heart04>」"
translation = "「아──…… 응윽, 츄아앗<emoji=heart04> 키, 키스를 하라고 말하는 게 아닙니다<emoji=heart04> 어디까지나, 저와의 결혼 생활에서 할 법한 일을 해주셨으면 할 뿐입니다……<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「おはようと声をかけながら抱き締めたり……だとか<emoji=heart04>\u3000もう少しだけ二人でゴロゴロしてしまおうとくっついてきたり……だとか<emoji=heart04>」"
translation = "「잘 잤냐고 말을 걸면서 껴안는다거나…… 라든지<emoji=heart04> 조금만 더 둘이서 뒹굴거리자고 달라붙는다거나…… 라든지<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「未来の結婚生活を前提に様々な想定を──ひゃっ！\u3000……はぁはぁ……<emoji=heart04>\u3000ん……ちゅっ、はむぅん……<emoji=heart04>」"
translation = "「미래의 결혼 생활을 전제로 다양한 상정을── 히얏! ……하아 하아……<emoji=heart04> 응…… 츄, 함웅……<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「や、やはり欲望に忠実で強引なお方ですね……<emoji=heart04>\u3000将来の結婚生活が思いやられます……<emoji=heart04>」"
translation = "「여, 역시 욕망에 충실하고 강압적인 분이시네요……<emoji=heart04> 장래의 결혼 생활이 걱정됩니다……<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが……ちゅっ、れるぅん……<emoji=heart04>\u3000お好きになさってください……<emoji=heart04>\u3000お嬢様からも自身の生活がどう変化するのか、見定めろと仰せつかっておりますので……<emoji=heart04>」"
translation = "「하지만…… 츄, 레루웅……<emoji=heart04> 마음대로 하세요……<emoji=heart04> 아가씨께서도 자신의 생활이 어떻게 변화하는지, 지켜보라고 명하셨으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
original = "「今まで以上に幸せな日々を送れるということだけは……はぁはぁ、確かな変化のようですが……<emoji=heart04>」"
translation = "「지금까지 이상으로 행복한 나날을 보낼 수 있다는 것만큼은…… 하아 하아, 확실한 변화인 것 같습니다만……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "早く結婚したくなっちゃうね？"
translation = "빨리 결혼하고 싶어지네?"

[[dialogue]]
speaker = "キリカ"
original = "「～～っっ。結論を出すのが早すぎます。これからゆっくりじっくり時間をかけて、その答えを出していこうというお話なのですから」"
translation = "「～～윽. 결론을 내리는 게 너무 빠릅니다. 이제부터 천천히 느긋하게 시간을 들여서, 그 답을 내보자는 이야기니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「共に暮らすことで新たな一面を互いに知ることになるでしょう。もしかすると価値観のすれ違い等も出てくるかもしれません」"
translation = "「함께 삶으로써 새로운 면을 서로 알게 되겠죠. 어쩌면 가치관의 차이 등도 생길지 모릅니다」"

[[dialogue]]
speaker = "キリカ"
original = "「その時は……遠慮せずに仰ってください。私も言わせていただきますから。２人の価値観を擦り合わせて……より幸せな日々を目指していきましょう？」"
translation = "「그때는…… 사양 말고 말씀해 주세요. 저도 말할 테니까요. 두 사람의 가치관을 맞춰가며…… 더 행복한 나날을 목표로 삼도록 하죠?」"

[[dialogue]]
speaker = "キリカ"
original = "「……コ、コホン。それではそろそろ行きましょうか。朝食の支度や朝の清掃がありますので」"
translation = "「……크, 흠. 그럼 슬슬 가볼까요. 아침 식사 준비와 아침 청소가 있으니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「何を目を丸くしておられるのですか？\u3000もちろん、あなたにも手伝っていただきますよ？」"
translation = "「뭘 눈을 동그랗게 뜨고 계시는 건가요? 당연히, 당신도 도와주셔야죠?」"

[[dialogue]]
speaker = "キリカ"
original = "「私と結婚するのであれば、それ即ち星見家の使用人になるのと同義です。たとえ結婚しても私はメイドを辞めませんから」"
translation = "「저와 결혼한다면, 그것은 곧 호시미 가문의 고용인이 되는 것과 동의어입니다. 비록 결혼해도 저는 메이드를 그만두지 않을 테니까요」"

[[dialogue]]
speaker = "キリカ"
original = "「師としてこれまで以上にビシバシ鍛えていきますよ。ふふふ、お覚悟してくださいね？」"
translation = "「스승으로서 지금까지 이상으로 엄격하게 단련시켜 줄게요. 후후후, 각오해 두세요?」"

