[[dialogue]]
speaker = "unk"
original = "第１話,小さくなったフィクサー,P"
translation = "제1화, 작아진 픽서, P"

[[dialogue]]
speaker = "unk"
original = "『こどもの日』の一件で、ヴィーナスの不思議な力によって、新たな姿『リトルフォーム』が覚醒した後。"
translation = "『어린이날』 사건으로 비너스의 신비한 힘에 의해 새로운 모습인 『리틀 폼』이 각성한 뒤."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「――じゃ～ん！\u3000というわけで、これが新生フィクサーの姿よ♪」"
translation = "「――짠! 그런 고로 이게 신생 픽서의 모습이야♪」"

[[dialogue]]
speaker = "unk"
original = "新星学園星徒会の仲間たちに、俺とヴィーナスは事情説明を行っていた。"
translation = "신성학원 성도회 동료들에게 나와 비너스는 사정 설명을 하고 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お～、次の新フォームはこう来ましたか。これまた興味深い……」"
translation = "「오~ 다음 신규 폼은 이렇게 왔나요. 이것 참 흥미롭군요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「本当に体が小さくなっちゃうんだ……！\u3000リトルフォーム、普通じゃないね！」"
translation = "「정말로 몸이 작아져 버렸네……! 리틀 폼, 보통이 아닌걸!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「きゃ～っ<emoji=heart04>\u3000小さくなったヴィーナスちゃん、すっごく可愛いわ～♪\u3000お姉ちゃん、ハグしたくなっちゃう～♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「꺄아~<emoji=heart04> 작아진 비너스짱, 정말 너무 귀여워~♪ 언니, 허그하고 싶어지네~♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの小さな姿を見て興奮したサーシャさんが、勢いよく抱き着く。"
translation = "비너스의 작은 모습을 보고 흥분한 사샤 씨가 기세 좋게 껴안는다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「わぷっ！？\u3000サーシャさんってば、そんなに強く抱き着かれたら息が苦しいわ♪」"
translation = "「와푸!? 사샤 씨도 참, 그렇게 세게 껴안으면 숨이 막혀요♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、ごめんなさい。でも、小さいヴィーナスちゃんがあまりに可愛いから、私のこと『お姉ちゃん』って呼んで欲しくなっちゃうわ～♪」"
translation = "「어머나~ 미안해. 하지만 작은 비너스짱이 너무 귀여워서, 나를 『언니』라고 불러줬으면 좋겠는걸~♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「私もリトルフォームの時は、子供になったような気分になるからいいわよ♪\u3000サーシャお姉ちゃん♪」"
translation = "「나도 리틀 폼일 때는 어린아이가 된 기분이 드니까 괜찮아요♪ 사샤 언니♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「っ！？\u3000きゃ～っ<emoji=heart04><emoji=heart04>\u3000ヴィーナスちゃん、嬉しい～！\u3000私がお姉ちゃんよ～<emoji=heart04>\u3000よしよしっ♪\u3000ぎゅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「윽!? 꺄아~<emoji=heart04><emoji=heart04> 비너스짱, 기뻐~! 내가 언니야~<emoji=heart04> 착하지 착해♪ 꼬오옥~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「む～っ！？\u3000今度こそおっぱいで息ができないわ、お姉ちゃん！」"
translation = "「무으!? 이번에야말로 가슴 때문에 숨을 못 쉬겠어요, 언니!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……サーシャ先輩、そんなこと言ってると、またソフィアさんに嫉妬されちゃいますよ」"
translation = "「……사샤 선배, 그런 소리 하고 있으면 또 소피아 씨한테 질투 살 거예요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、なんだろう？\u3000なんか前にもこんなことがあったようなデジャヴが……」"
translation = "「근데 뭐랄까? 왠지 전에도 이런 일이 있었던 것 같은 데자뷔가……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この星徒会が発足してまだ間もない頃、前会長が頭を打って、精神が幼く退行してしまった時の記憶じゃないでしょうか？」"
translation = "「이 성도회가 발족한 지 얼마 안 됐을 무렵, 전 회장님이 머리를 부딪쳐서 정신이 어리게 퇴행해 버렸을 때의 기억 아닐까요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それだ！\u3000あの時は大変だったな～」"
translation = "「그거다! 그때 참 힘들었지~」"

[[dialogue]]
speaker = "unk"
original = "ちょっと懐かしいな"
translation = "조금 그립네."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「それ、私は全然覚えてないのよね！\u3000みんなで空飛ぶかけっこをしたって言ってたっけ？」"
translation = "「그거, 나는 전혀 기억이 안 난단 말이지! 다 같이 하늘을 날며 달리기 시합을 했다고 했었나?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「そうだ！\u3000せっかく小さな体に変身できるようになったことだし、パパやみんなとまた同じように遊びたいわ♪」"
translation = "「맞다! 기왕 작은 몸으로 변신할 수 있게 된 거니까, 아빠랑 모두랑 다시 그때처럼 놀고 싶어♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えぇ～！？\u3000星力で空飛ぶガチのかけっこをまたやるの！？」"
translation = "「에에~!? 성력으로 하늘을 나는 본격적인 달리기 시합을 또 하는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちは仮想結界で天界フィールドを選択し、戦闘服に変身した状態で空を飛び回ってのレースを行うことになった。"
translation = "그렇게 우리들은 가상 결계에서 천계 필드를 선택하고, 전투복으로 변신한 상태에서 하늘을 날아다니는 레이스를 하기로 했다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ぎゅ～ん♪」"
translation = "「규웅♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「やったわ！\u3000私が１番でゴールよ♪」"
translation = "「해냈다! 내가 1등으로 골인이야♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、すごいわ～♪」"
translation = "「어머나~ 대단해라~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「負けた～！\u3000ていうか、小さくなってもめちゃくちゃ速い！」"
translation = "「졌다~! 그나저나 작아져도 엄청나게 빨라!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むしろ通常戦闘服より、パワーアップしてる感すらありますね」"
translation = "「오히려 통상 전투복보다 파워 업 한 느낌마저 드네요.」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「私、記憶喪失になった時のこと全然覚えてないから、みんなで空飛ぶかけっこをしたって聞いた時、すごく羨ましかったのよね！」"
translation = "「나, 기억상실이 됐을 때의 일을 전혀 기억 못 하니까, 다 같이 하늘을 날며 달리기 시합을 했다는 얘길 들었을 때 정말 부러웠거든!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「だからこうしてみんなと遊べて、とっても嬉しいわ♪」"
translation = "「그래서 이렇게 모두랑 놀 수 있어서 정말 기뻐♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そっか。なら……私も本気で遊んじゃおっかな♪」"
translation = "「그렇구나. 그렇다면…… 나도 진심으로 놀아볼까나♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ、そうですね。いつもはあまりやらない、飛行技術を鍛える為の訓練にもなりますし」"
translation = "「네, 그렇네요. 평소에는 잘 하지 않는 비행 기술을 연마하기 위한 훈련도 될 테고요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、本気でってことなら、アレよね～♪」"
translation = "「후훗, 진심으로 한다면 그거지~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もちろん！」"
translation = "「물론이지!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレムです」"
translation = "「노 프라블럼입니다.」"

[[dialogue]]
speaker_original = "３人"
speaker_translation = "3명"
original = "「――チェンジ、ノヴァフォーム！！」"
translation = "「――체인지, 노바 폼!!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「――よ～し……それじゃあヴィーナス、今度は負けないよ！」"
translation = "「――조~아…… 그럼 비너스, 이번에는 지지 않을 거야!」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「わぁ～っ♪\u3000すごい！\u3000みんなで全力飛行レース、ワクワクしてきたわ！」"
translation = "「와아~♪ 대단해! 다 같이 전력 비행 레이스, 두근두근거려!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「仮想結界内ですから、出力を限界まで上げてもノープロブレムです」"
translation = "「가상 결계 내부니까, 출력을 한계까지 높여도 노 프라블럼입니다.」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「あらあら、うふふっ♪\u3000それじゃあ、お姉ちゃんもたまには先輩らしく、星騎士としてカッコいいところを見せなきゃならないわね～♪」"
translation = "「어머어머, 우후후♪ 그럼 언니도 가끔은 선배답게, 성기사로서 멋진 모습을 보여줘야겠네~♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「パパも、全力で勝負よ！」"
translation = "「아빠도, 전력으로 승부야!」"

[[dialogue]]
speaker = "unk"
original = "ああ、もちろんだ！"
translation = "「아아, 물론이지!」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは、小さい頃に戻って追いかけっこをするような気持ちで、空を飛び回って遊ぶのだった。"
translation = "그렇게 우리들은, 어린 시절로 돌아가 술래잡기를 하는 듯한 기분으로, 하늘을 날아다니며 노는 것이었다."

[[dialogue]]
speaker = "unk"
original = "その後、ヴィーナスは全力で遊んで疲れたのか、眠くなってしまったようで、俺がおんぶして九浄邸まで送ることになった。"
translation = "그 후, 비너스는 전력으로 놀아서 지쳤는지 졸음이 온 모양이라, 내가 업어서 쿠죠 저택까지 데려다주게 되었다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「んうぅ……あれ？\u3000パパ……？」"
translation = "「으음…… 어라? 아빠……?」"

[[dialogue]]
speaker = "unk"
original = "起きたか？"
translation = "「깼어?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「もしかして……家まで送ってくれるの？」"
translation = "「혹시…… 집까지 데려다주는 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「パパ、確か記憶喪失になった日も、私をこうやっておぶってくれたのよね」"
translation = "「아빠, 분명 기억상실이 된 날에도 나를 이렇게 업어줬었지.」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「遊んだことは覚えてないけど……パパにおんぶしてもらっている最中に、記憶が戻ったんだったわ」"
translation = "「논 건 기억나지 않지만…… 아빠한테 업혀 있는 도중에 기억이 돌아왔었어.」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「――え？\u3000あの時、私がパパのことを『お父さんみたいだ』って言ってた？」"
translation = "「――에? 그때 내가 아빠를 보고 『아버지 같다』고 말했어?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ふふっ、それってつまり、私の勘は当たってたってことよね♪」"
translation = "「후훗, 그건 즉 내 직감이 맞았다는 거네♪」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつ、ぎゅっと背中に抱き着きながら、顔をすりすりさせてくるヴィーナス。"
translation = "그렇게 말하며, 꽉 등에 매달리면서 얼굴을 부비부비해 오는 비너스."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「んふふ<emoji=heart04>\u3000パパの背中、あったかくて、いい匂いがするわ♪\u3000私の好きな匂い……<emoji=heart04>」"
translation = "「음후후<emoji=heart04> 아빠 등, 따뜻해서 좋은 냄새가 나♪ 내가 좋아하는 냄새……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「あっ、そうだわ。あの時も確か、パパっていい匂いがする～って思ってたけど……今ならそれがどうしてかわかるわ♪」"
translation = "「앗, 맞다. 그때도 분명 아빠한테 좋은 냄새가 난다~고 생각했었는데…… 지금이라면 그게 왜인지 알 것 같아♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「私、あの時からきっと……パパのことをもう、男の人として好きだったのよ<emoji=heart04>」"
translation = "「나, 그때부터 분명…… 아빠를 벌써 남자로 좋아하고 있었던 거야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ねぇ、パパはいつから、私のことを女の子として好きになっていたの？」"
translation = "「있지, 아빠는 언제부터 나를 여자애로 좋아하게 된 거야?」"

[[dialogue]]
speaker = "unk"
original = "え？\u3000う～ん、そうだな……"
translation = "「어? 음~ 글쎄……」"

[[dialogue]]
speaker = "unk"
original = "話を振られて考えてみるが、いつからかは正直わからない。気づいたらもう、好きになっていた。"
translation = "질문을 받고 생각해 보지만, 언제부터인지는 솔직히 모르겠다. 정신을 차려보니 이미 좋아하고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし俺も、ヴィーナスを背負った時に『いい匂いがする』と思ったことが、記憶として蘇ってくる。"
translation = "하지만 나 역시, 비너스를 업었을 때 『좋은 냄새가 난다』고 생각했던 것이 기억으로 되살아난다."

[[dialogue]]
speaker = "unk"
original = "もしかしたら、それがヴィーナスを女の子として意識するきっかけだったのかもしれない。"
translation = "어쩌면 그것이 비너스를 여자애로 의식하게 된 계기였을지도 모른다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「へぇ～、パパも私の匂いでドキドキしてたのね♪\u3000なら、小さい私の匂いはどうかしら？\u3000すりすり～<emoji=heart04>」"
translation = "「헤에~ 아빠도 내 냄새에 두근두근했구나♪ 그럼 어린 내 냄새는 어때? 부비부비~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「あっ！\u3000パパの心臓、ドキッってしてるのがちょっと聞こえてきたわ♪」"
translation = "「앗! 아빠 심장이 두근! 하고 뛰는 게 조금 들렸어♪」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「――うん？\u3000恋人になって、あの時よりももっと私のことが好きになっているから？」"
translation = "「――응? 연인이 되어서 그때보다 더 내가 좋아졌으니까?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「ふふっ♪\u3000私もあの時より、ず～っと大好きよ、パパ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「후훗♪ 나도 그때보다 훨씬 더 좋아해, 아빠<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元で囁きながら、ヴィーナスは俺の頬っぺたにキスしてくる。"
translation = "귓가에 속삭이며, 비너스는 내 뺨에 키스해 온다."

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「――ん～？\u3000そういうことされると、恋人としてイチャイチャしたくなっちゃう？」"
translation = "「――음~? 그런 짓을 당하면 연인으로서 꽁냥꽁냥하고 싶어져?」"

[[dialogue]]
speaker_original = "ヴィーナス（幼少）"
speaker_translation = "비너스(어린 시절"
original = "「えへへっ<emoji=heart04>\u3000じゃあこのまま、九浄のお屋敷に泊まってく？\u3000パ～パ<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 그럼 이대로 쿠죠 저택에서 자고 갈래? 아~빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、イタズラする子供のように笑ってみせるヴィーナスなのだった。"
translation = "그렇게 말하며, 장난치는 아이처럼 웃어 보이는 비너스였다."

