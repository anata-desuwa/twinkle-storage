[[dialogue]]
speaker = "unk"
original = "第２話,類は友を呼ぶ,P"
translation = "제2화, 유유상종"

[[dialogue]]
speaker = "unk"
original = "メルエルと再会してから２週間ほど。彼女は毎日のように俺の教室を訪ねては、他愛のない雑談をして行くようになっていた。"
translation = "메르엘과 재회하고 나서 2주 정도. 그녀는 매일같이 내 교실을 찾아와 시시콜콜한 잡담을 나누고 가곤 했다."

[[dialogue]]
speaker = "メルエル"
original = "「──それでね、マトイちゃんから美味しいケーキ屋さんを教えてもらったんだ。もしよかったら今度、２人で食べに行かない？」"
translation = "「──그래서 말이야, 마토이짱한테 맛있는 케이크 가게를 추천받았어. 혹시 괜찮으면 다음에 둘이서 먹으러 가지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "一応、俺も男である。……幼なじみとはいえ、彼女の態度を見ていると、少なからず頭を過ぎることもあるわけで──"
translation = "일단 나도 남자다. ……소꿉친구라고는 해도 그녀의 태도를 보고 있으면 적잖이 머릿속을 스치는 생각도 있는 법이라──"

[[dialogue]]
speaker = "unk"
original = "（もしかして俺、好かれてる……？）"
translation = "(혹시 나, 사랑받고 있는 건가……?)"

[[dialogue]]
speaker = "メルエル"
original = "「うん？\u3000会長くん、どうかした？」"
translation = "「응? 회장군, 왜 그래?」"

[[dialogue]]
speaker = "メルエル"
original = "「──何でもない？\u3000ふふっ、変なの♪」"
translation = "「──아무것도 아니야? 후훗, 이상해라♪」"

[[dialogue]]
speaker = "unk"
original = "（変に浮かれないように、気を付けよう）"
translation = "(괜히 들뜨지 않도록 조심하자.)"

[[dialogue]]
speaker = "unk"
original = "（いやいやいや、都合良すぎる考えだ……）"
translation = "(아니 아니 아니, 너무 형편 좋은 생각이야……)"

[[dialogue]]
speaker = "ヴィーナス"
original = "「たるんでるわよ、クロト！」"
translation = "「늘어져 있네, 쿠로토!」"

[[dialogue]]
speaker = "メルエル"
original = "「わっ……九浄さん！？」"
translation = "「왓…… 쿠죠 씨!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、どうしたんだいきなり？"
translation = "비너스, 갑자기 무슨 일이야?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「このところ、そこの女子と暇さえあれば雑談しているでしょう。会長になってまだ日も浅いのに、だらしがないわ！」"
translation = "「요즘 저기 있는 여자애랑 틈만 나면 잡담하고 있잖아. 회장이 된 지 얼마 되지도 않았는데 한심해!」"

[[dialogue]]
speaker = "メルエル"
original = "「ごめんね、九浄さん……そうだよね、会長くんも星徒会長になったばかりで忙しいのに。私が押し掛けてたせいで、時間を使わせちゃってたよね……」"
translation = "「미안해, 쿠죠 씨…… 그렇네, 회장군도 성도회장이 된 지 얼마 안 돼서 바쁠 텐데. 내가 들이닥친 탓에 시간을 쓰게 해버렸네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アナタは別に悪くないわ！\u3000クロトが女の子にチヤホヤされて、デレデレしているのが悪いのよ」"
translation = "「너는 딱히 잘못 없어! 쿠로토가 여자애한테 치여서 헤벌레하고 있는 게 잘못인 거야.」"

[[dialogue]]
speaker = "unk"
original = "俺、そこまでデレデレしてないと思うんだが！？"
translation = "나, 그렇게까지 헤벌레하고 있지는 않다고 생각하는데!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「とにかく放課後になったんだし、いつまでも雑談してないでさっさと星徒会室に行くわよ！」"
translation = "「어쨌든 방과 후가 됐으니까 언제까지고 잡담하지 말고 빨리 성도회실로 가자고!」"

[[dialogue]]
speaker = "メルエル"
original = "「あっ、九浄さん待って。実は私、会長くんと九浄さんにお願いしようと思ってたことがあって──」"
translation = "「앗, 쿠죠 씨 기다려 봐. 사실 나, 회장군이랑 쿠죠 씨한테 부탁하고 싶은 게 있어서──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000お願いって、一体何かしら？」"
translation = "「? 부탁이라니, 대체 뭐지?」"

[[dialogue]]
speaker = "メルエル"
original = "「あの……私も星徒会役員に加えてもらえませんかっ！」"
translation = "「저기…… 저도 성도회 임원으로 넣어주실 수 없을까요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん、いつも忙しそうにしているでしょ？\u3000それを見てて、手伝いたいなって思ったの。事務仕事も覚えるし、戦闘面でも役に立つと思う。だから──」"
translation = "「회장군, 항상 바빠 보이잖아? 그걸 보고 도와주고 싶다고 생각했어. 사무 일도 배울 거고, 전투 면에서도 도움이 될 거야. 그러니까──」"

[[dialogue]]
speaker = "メルエル"
original = "「私も星徒会に入りたいです！」"
translation = "「저도 성도회에 들어가고 싶어요!」"

[[dialogue]]
speaker = "unk"
original = "メルエル、本気なのか？"
translation = "메르엘, 진심이야?"

[[dialogue]]
speaker = "メルエル"
original = "「うんっ。私も、頑張るキミを近くで支えたいんだ」"
translation = "「응. 나도 노력하는 너를 곁에서 지탱해주고 싶어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だ……ダメよ！\u3000そう簡単に認めるわけにはいかないわ！」"
translation = "「아…… 안 돼! 그렇게 쉽게 허락할 수는 없어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まず、星徒会役員はアステラを攻略するだけの高い戦闘力が求められるわ。それを確かめてみないことには……」"
translation = "「우선 성도회 임원은 아스텔라를 공략할 수 있을 만큼의 높은 전투력이 요구돼. 그걸 확인해 보지 않고서는……」"

[[dialogue]]
speaker = "メルエル"
original = "「姫咲メルエル、１年生の時からプリマステラです！\u3000実力が問題なら、もちろんテストを受けます！」"
translation = "「히메사키 메르엘, 1학년 때부터 프리마스텔라입니다! 실력이 문제라면 당연히 테스트를 받겠어요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ち、力があるだけじゃダメよ。アステラ攻略を行う星徒会は、プリマステラ以上に大きな危険と責任が伴う立場で、それには強い覚悟が……」"
translation = "「히, 힘이 있는 것만으로는 안 돼. 아스텔라 공략을 수행하는 성도회는 프리마스텔라 이상으로 큰 위험과 책임이 따르는 입장이라, 거기엔 강한 각오가……」"

[[dialogue]]
speaker = "メルエル"
original = "「私のモットーは、一意専心。一度やると決めたことは、最後まで諦めずに貫き通します！」"
translation = "「제 좌우명은 일의전심. 한 번 하기로 마음먹은 일은 끝까지 포기하지 않고 관철합니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ぐ……こ、これは一度、女同士で話し合わなければならないようね……」"
translation = "「으…… 이, 이건 한 번 여자끼리 이야기를 나눠봐야겠군……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト。悪いけど少しの間、席を外して貰えるかしら？」"
translation = "「쿠로토. 미안하지만 잠시 자리를 비켜줄래?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、何かムキになってないか！？"
translation = "비너스, 왠지 오기가 생긴 거 아니야!?"

[[dialogue]]
speaker = "unk"
original = "待て待て！"
translation = "잠깐 기다려 봐!"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん、私からもお願い。……私には九浄さんの気持ちが何となく分かるから、少しの間２人で話をさせて欲しいな」"
translation = "「회장군, 나도 부탁할게. ……나는 쿠죠 씨의 기분을 왠지 알 것 같으니까, 잠시 둘이서 이야기를 하게 해줘.」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺は１人、教室から追い出されてしまった……。"
translation = "그렇게 나는 혼자 교실에서 쫓겨나고 말았다……."

[[dialogue]]
speaker = "unk"
original = "しかし、やはりいつもと様子の違うヴィーナスが、なにを言い出すかも心配だ。そんなわけで、こっそり中を覗いてみると──"
translation = "하지만 역시 평소와 모습이 다른 비너스가 무슨 말을 꺼낼지도 걱정이다. 그래서 몰래 안을 들여다보니──"

[[dialogue]]
speaker = "メルエル"
original = "「──実は私、会長くんとは幼なじみなの。でも、長い間離れてたから再会できたのが嬉しくて、ついはしゃいじゃって……ごめんなさい」"
translation = "「──사실 나, 회장군과는 소꿉친구야. 하지만 오랫동안 떨어져 있어서 재회한 게 너무 기뻐서 그만 들떠버렸어…… 미안해.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんな事情があったのね……。確かに、昔馴染みと再会したら、嬉しくなってしまうものよね。意地悪な真似をしてしまったわ。ごめんなさい」"
translation = "「그런 사정이 있었구나……. 확실히 옛 친구와 재회하면 기뻐지기 마련이지. 심술궂은 짓을 해버렸네. 미안해.」"

[[dialogue]]
speaker = "メルエル"
original = "「ううん、いいの。私、さっきも言ったけど……九浄さんが何で機嫌を悪くしてたのか、何となく分かるから」"
translation = "「아니야, 괜찮아. 나, 아까도 말했지만…… 쿠죠 씨가 왜 기분이 안 좋았는지 왠지 알 것 같으니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000……なんのことかしら？\u3000私は別に、機嫌が悪かったなんてこともなかったわ！」"
translation = "「? ……무슨 소린지 모르겠네. 난 딱히 기분이 안 좋았던 적 없어!」"

[[dialogue]]
speaker = "メルエル"
original = "「あれ？\u3000私の勘違い……だったのかな？\u3000うー－ん、私のこの手の勘って、結構当たるんだけどなぁ」"
translation = "「어라? 내가 착각한…… 건가? 으음, 내 이런 쪽의 감은 꽤 잘 맞는데 말이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何のことを言ってるのかはわからないけど、そう……クロトの幼なじみなのね。ということは、クロトが小っちゃかった時、どんな風だったも、覚えてるってこと？」"
translation = "「무슨 소릴 하는 건진 모르겠지만, 그래…… 쿠로토의 소꿉친구였구나. 그렇다는 건 쿠로토가 꼬맹이였을 때 어떤 모습이었는지도 기억하고 있다는 거야?」"

[[dialogue]]
speaker = "メルエル"
original = "「もちろん！\u3000あ、昔の会長くんって、今のカッコいい感じとはまたちょっと違って、すっごく可愛くてね──」"
translation = "「물론이지! 아, 옛날의 회장군은 지금의 멋진 느낌과는 또 다르게 엄청 귀여워서──」"

[[dialogue]]
speaker = "unk"
original = "（なんか笑い合ってる……？）"
translation = "(왠지 서로 웃고 있는데……?)"

[[dialogue]]
speaker = "unk"
original = "しばらくして、また教室内の様子を伺ってみると──"
translation = "잠시 후, 다시 교실 안의 상황을 살피니──"

[[dialogue]]
speaker = "メルエル"
original = "「ねぇ、ヴィーナスちゃん！\u3000今日これから２人で街に遊びに出掛けない？\u3000あっ、でも星徒会の仕事があるんだっけ……」"
translation = "「있지, 비너스짱! 오늘 이따가 둘이서 시내에 놀러 가지 않을래? 앗, 하지만 성도회 업무가 있었지……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいわね、メルエル！\u3000今日はもともと星徒会を休みにするつもりだったから大丈夫！\u3000本当はそのことを伝えようと思って、ここに来たのよ」"
translation = "「좋네, 메르엘! 오늘은 원래 성도회를 쉴 생각이었으니까 괜찮아! 사실 그 말을 전하려고 여기 온 거야.」"

[[dialogue]]
speaker = "unk"
original = "（いつの間にか名前を呼び合うくらい仲良くなってる！？）"
translation = "(어느새 이름을 부를 정도로 친해졌어!?)"

[[dialogue]]
speaker = "メルエル"
original = "「あはは、そうだったんだ。よし、じゃあ親交を深める為に、一緒に街へ繰り出そう♪」"
translation = "「아하하, 그랬구나. 좋아, 그럼 친목을 다지기 위해 같이 시내로 나가자♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、行きましょう！\u3000メルエルにはとっておきのスイーツ店を紹介するわ！」"
translation = "「그래, 가자! 메르엘에게는 아껴둔 디저트 가게를 소개해 줄게!」"

[[dialogue]]
speaker = "unk"
original = "そのまま親友のように笑い合いながら、反対側の扉から出て行ってしまう２人。"
translation = "그대로 절친처럼 서로 웃으며 반대편 문으로 나가버리는 두 사람."

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000なんか俺、忘れさられてない……？"
translation = "어라? 왠지 나, 잊혀진 거 아니야……?"

