[[dialogue]]
speaker = "unk"
original = "第１話,海の申し子、プトラ,P"
translation = "제1화, 바다의 아이, 푸트라"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「海だ～～～っ！！！」"
translation = "「바다다~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "彼方まで広がる青い海を前にして、プトラがキラキラと目を輝かせる。"
translation = "저 멀리까지 펼쳐진 푸른 바다 앞에서 푸트라가 반짝반짝 눈을 빛낸다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「このリゾート結界はリップルさんが作り出したものなんですよ」"
translation = "「이 리조트 결계는 리플 씨가 만들어낸 거예요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウなのです！\u3000リゾート結界の中では、年中サマーがタノシメます！」"
translation = "「그런 것입니나리! 리조트 결계 안에서는 일 년 내내 서머를 즐길 수 있습니마시타!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「すごーい！\u3000冬の寒い日でも夏の海で遊べちゃうね！」"
translation = "「우와~! 추운 겨울날에도 여름 바다에서 놀 수 있겠네!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「でも結界って……世界をまるごとひとつ作っちゃったってこと？\u3000そんなこと出来ちゃうの！？」"
translation = "「근데 결계라니…… 세계를 통째로 하나 만들어버렸다는 거야? 그런 게 가능해!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000デキちゃいます！」"
translation = "「예! 가능합니나리!」"

[[dialogue]]
speaker = "unk"
original = "桁外れな能力ではあるけど"
translation = "엄청난 능력이긴 하지만"

[[dialogue]]
speaker = "unk"
original = "まあリップルの場合"
translation = "뭐 리플의 경우라면"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「へぇ～、すごいな～。ちょっと水に手をつけてみてー……と」"
translation = "「헤에~ 대단하네~. 물에 손 좀 살짝 담가보고……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「おお～、ほんとに海だ！\u3000しかもちょっとぬるい夏の海だ！\u3000さっそくだけど泳いでもいいかな？」"
translation = "「오오~ 진짜 바다다! 게다가 좀 미지근한 여름 바다야! 당장이지만 수영해도 될까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろんよ、そのつもりで連れてきたんだから。まずは水着になりましょう！」"
translation = "「물론이지, 그럴 생각으로 데려온 거니까. 우선 수영복으로 갈아입자!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ、そうですね。では──変身！」"
translation = "「네, 그렇네요. 그럼── 변신!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どう？\u3000これが星騎士の戦闘服のひとつ、水着フォームよ！」"
translation = "「어때? 이게 성기사의 전투복 중 하나인 수영복 폼이야!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「うおっ！？\u3000いきなり水着になった！」"
translation = "「우와!? 갑자기 수영복이 됐어!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「へぇ～、いろんな戦闘服があるんだね。しかも水着かわいい！\u3000変身もすぐ着替えられて便利！」"
translation = "「헤에~ 여러 가지 전투복이 있구나. 게다가 수영복 귀여워! 변신도 바로 갈아입을 수 있어서 편하네!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「プトラさんには水着を用意したのでこれに着替えて──」"
translation = "「푸트라 씨 몫으로 수영복을 준비했으니 이걸로 갈아입으시고──」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「大丈夫！\u3000今はあたしも変身できるから！」"
translation = "「괜찮아! 지금은 나도 변신할 수 있으니까!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「へん！\u3000しん！」"
translation = "「변! 신!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「じゃーん！\u3000あたしのはこのまま泳げるんだよ！\u3000それいけ～！」"
translation = "「짜잔! 내 거는 이대로 수영할 수 있어! 자 가자~!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「プトラさん、真っ先に突っ込んでいっちゃいましたね……」"
translation = "「푸트라 씨, 제일 먼저 뛰어들어 가버렸네요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「元気がよくていいじゃない！\u3000私たちも行くわよ！」"
translation = "「활기차고 좋잖아! 우리도 가자고!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ミンナで思いきり夏を楽しみましょー♪」"
translation = "「모두 함께 마음껏 여름을 즐깁시나리~♪」"

[[dialogue]]
speaker = "unk"
original = "みんなで和気あいあい海を楽しんでいたのだが、気が付くとプトラとリップルの勝負が始まっていた。"
translation = "다 함께 화기애애하게 바다를 즐기고 있었는데, 정신을 차려보니 푸트라와 리플의 승부가 시작되어 있었다."

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシはアワビやサザエ、イワガキにウニも獲ってキました！」"
translation = "「저는 전복이랑 소라, 바윗굴에 성게도 잡아 왔습니마시타!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「なんのなんの、あたしは貝だけじゃなくてお魚も捕まえてきたもんね～♪」"
translation = "「천만에 말씀, 나는 조개뿐만 아니라 물고기도 잡아 왔는걸~♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ムムム……ナカナカやりますね！」"
translation = "「음음음…… 제법 합니나리!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「すごい量ね……２人合わせてどれだけ獲ってきたの？」"
translation = "「엄청난 양이네…… 둘이 합쳐서 얼마나 잡아 온 거야?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私たちだけでは食べきれそうにないですね」"
translation = "「우리끼리만으로는 다 못 먹을 것 같네요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ではミンナを呼んで、ミンナで食べればモンダイありませーん♪」"
translation = "「그럼 모두를 불러서 다 같이 먹으면 문제 없습니나리~♪」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「いいねいいね。フレイマリンでも大漁の時はそうしてたよ。浜焼きで火を囲みながら食べるの♪」"
translation = "「좋네 좋아. 프레이마린에서도 대어일 때는 그렇게 했어. 해변에서 불을 둘러싸고 먹는 거야♪」"

[[dialogue]]
speaker = "unk"
original = "すごく楽しそうだな"
translation = "무척 즐거워 보이네"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「うん！\u3000みんなで食べればサイコーに楽しいよ♪」"
translation = "「응! 다 같이 먹으면 최고로 즐거워♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「じゃあ人を集めてきますね。流星星徒会のみんなも呼びましょうか」"
translation = "「그럼 사람들을 불러올게요. 유성 성도회 친구들도 부를까요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オネガイしまーす♪」"
translation = "「부탁합니나리~♪」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「でもほんとにすごいね～。この海が全部、リップルの作り出したものだなんて」"
translation = "「근데 정말 대단하네~. 이 바다가 전부 리플이 만들어낸 거라니.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「えへへ、エンジョイしながら、ガンバって作りました」"
translation = "「에헤헤, 엔조이하면서 열심히 만들었습니마시타.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今も新しい結界を作り続けていると聞きましたが？」"
translation = "「지금도 새로운 결계를 계속 만들고 있다고 들었습니다만?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウなんです！\u3000もっともっとミンナに夏を楽しんでホシイのです！」"
translation = "「그렇습니나리! 좀 더 좀 더 모두가 여름을 즐겨주길 바랍니마시타!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「リップルは夏が大好きなんだね？」"
translation = "「리플은 여름을 정말 좋아하는구나?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「もちろんです！\u3000プトラは夏、スキですか？」"
translation = "「물론입니나리! 푸트라는 여름, 좋아합니까나리?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「とーぜん！\u3000あたしも夏はだいすきだよ♪」"
translation = "「당연하지! 나도 여름은 정말 좋아해♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「なら仲間です！\u3000プトラ、いい笑顔です♪」"
translation = "「그럼 동료입니나리! 푸트라, 좋은 미소입니나리♪」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えへへ、笑顔を褒めてもらえるのは嬉しいな」"
translation = "「에헤헤, 미소를 칭찬받는 건 기쁘네.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「というかみんなと一緒に居ると自然に楽しくなっちゃうんだけどね！」"
translation = "「그보다 모두와 함께 있으면 자연스럽게 즐거워지지만 말이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お待たせ～、適当に人を呼んできたわよ～！」"
translation = "「오래 기다렸지~ 적당히 사람들 불러왔어~!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「おーい、こっちだよ～！\u3000一緒に食べよ～～～っ♪」"
translation = "「어이~ 이쪽이야~! 같이 먹자~~~♪」"

[[dialogue]]
speaker = "unk"
original = "底抜けに明るい元気少女のプトラ。"
translation = "한없이 밝고 활기찬 소녀 푸트라."

[[dialogue]]
speaker = "unk"
original = "彼女の周りには自然と笑顔があふれてくる、そんな不思議な魅力を持った女の子だった。"
translation = "그녀의 주변에는 자연스럽게 미소가 넘쳐나는, 그런 신기한 매력을 가진 아이였다."

