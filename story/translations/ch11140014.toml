[[dialogue]]
speaker = "unk"
original = "第４話,１人の天使として,P"
translation = "제4화, 한 명의 천사로서"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「とうとう明日、デネブに帰るんだね～……」"
translation = "「드디어 내일 데네브로 돌아가네~……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「うぅ……まだまだ遊び足りないですが……！」"
translation = "「으으…… 아직 더 놀고 싶은데 말이에요……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「いい加減、デネブにいる私たちと居場所を交換しないとね」"
translation = "「슬슬 데네브에 있는 우리와 장소를 교대해야 하니까」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ああ。そうだよな……ま、これからいくらでも、アルタイルに来れる機会はあるよな！」"
translation = "「그래. 맞어…… 뭐, 앞으로 얼마든지 알타이르에 올 기회는 있을 테니까!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「チナの言う通り──とは言うけれど、せっかくの機会よ。皆、アルタイルで過ごす最後の１日、心残りのないようにね？」"
translation = "「치나 말대로야── 라고는 해도 모처럼의 기회야. 얘들아, 알타이르에서 보내는 마지막 날, 미련이 남지 않도록 알겠지?」"

[[dialogue]]
speaker = "unk"
original = "明日の朝早くに、ルヴィネたちはデネブへ帰ってしまう。"
translation = "내일 아침 일찍 루비네 일행은 데네브로 돌아가 버린다."

[[dialogue]]
speaker = "unk"
original = "もちろん今生の別れなんかじゃない──けれど。"
translation = "물론 영영 이별인 건 아니지만── 그래도."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……魔王、どうかしたの？」"
translation = "「……마왕, 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "今夜、少し時間を貰えるか？"
translation = "오늘 밤, 잠깐 시간을 내줄 수 있어?"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ、問題ないわ。皆と違って予定もないし──空けておくわね」"
translation = "「응, 문제없어. 다른 애들과 달리 예정도 없고── 비워둘게」"

[[dialogue]]
speaker = "unk"
original = "その日の夜──俺は禁域となっているフィーニスの塔のふもとで、ルヴィネと落ち合った。"
translation = "그날 밤── 나는 금역이 된 피니스의 탑 기슭에서 루비네와 만났다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王、待たせたわね。こんなところで何の用事かしら」"
translation = "「마왕, 기다리게 했네. 이런 곳에서 무슨 일이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……というより、その大荷物はどうしたの？\u3000望遠鏡に、レジャーシート。水筒にお弁当まで……？」"
translation = "「……그보다 그 커다란 짐은 뭐야? 망원경에 돗자리. 물통에 도시락까지……?」"

[[dialogue]]
speaker = "unk"
original = "天体観測でもどうかなと思って"
translation = "천체 관측이라도 어떨까 싶어서"

[[dialogue]]
speaker = "unk"
original = "アルタイル最後の夜に……"
translation = "알타이르 마지막 밤에……"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あら……ふふ、楽しい催しね。誘ってくれてありがとう」"
translation = "「어머…… 후후, 즐거운 행차네. 권해줘서 고마워」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも──他は誰もいないのね？」"
translation = "「하지만── 다른 사람은 아무도 없는 거야?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネとゆっくり過ごしたい"
translation = "루비네와 느긋하게 보내고 싶어"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そう？\u3000物好きなのね、貴方。わかったわ。星徒会長同士、積もる話もあるでしょうし──」"
translation = "「그래? 별난 사람이네, 당신. 알았어. 성도회장끼리 할 이야기도 많을 테니──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「星空を眺めながらお喋りするだなんて、とても星騎士らしいわね。付き合うわ」"
translation = "「별하늘을 바라보며 수다를 떨다니, 무척 성기사답네. 함께할게」"

[[dialogue]]
speaker = "unk"
original = "新星学園の備品である天体望遠鏡はとても高性能だ。"
translation = "신성학원의 비품인 천체 망원경은 성능이 매우 뛰어나다."

[[dialogue]]
speaker = "unk"
original = "今日はよく晴れていて、夜空を彩る星々がはっきりと見える。"
translation = "오늘은 날씨가 맑아서 밤하늘을 수놓은 별들이 또렷하게 보인다."

[[dialogue]]
speaker = "unk"
original = "軽食のサンドイッチをつまみながら、望遠鏡を交代で覗き込み、ルヴィネと楽しい時間を過ごした──"
translation = "가벼운 샌드위치를 집어 먹으며 망원경을 교대로 들여다보고, 루비네와 즐거운 시간을 보냈다──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王、随分と物知りね。というより、星の解説に慣れてるのかしら？」"
translation = "「마왕, 제법 박식하네. 그보다 별 해설에 익숙한 걸까?」"

[[dialogue]]
speaker = "unk"
original = "昔、プラネタリウムでバイトしてたから"
translation = "옛날에 플라네타륨에서 알바했었거든"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私はしたことがないわ、これで２敗目……！」"
translation = "「나는 해본 적 없어, 이걸로 2패째……!」"

[[dialogue]]
speaker = "unk"
original = "きっとやってると思ってた"
translation = "분명 해봤을 거라고 생각했어"

[[dialogue]]
speaker = "unk"
original = "そうなのか？"
translation = "그런 거야?"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……貴方には言ったこと、なかったかしら。私、極星の皆に嘘を吐いていたのよ」"
translation = "「……당신에겐 말한 적 없었나. 나, 극성 모두에게 거짓말을 했었어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「星力なんて使えないのに、ポラリスが守護星だと偽って……」"
translation = "「성력 같은 건 쓸 수 없는데 폴라리스가 수호성이라고 속이며……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今でこそ嘘から出た真になってしまったけれど──ずっと、それが引っかかっていてね」"
translation = "「지금에야 거짓말이 참말이 되어버렸지만── 계속 그게 마음에 걸렸었거든」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「星空を眺めると、嘘吐きだって責められているような気になるから……避けていたの」"
translation = "「밤하늘을 바라보면 거짓말쟁이라고 비난받는 기분이 들어서…… 피하고 있었어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「だけど、貴方のお陰でテルルの作った星たちと、改めて向き合う機会ができた」"
translation = "「하지만 당신 덕분에 테룰이 만든 별들과 새롭게 마주할 기회가 생겼어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……だから、今夜の誘いは嬉しかったわ。ありがとう、魔王」"
translation = "「……그러니까 오늘 밤의 초대는 기뻤어. 고마워, 마왕」"

[[dialogue]]
speaker = "unk"
original = "喜んでくれたのなら、よかった"
translation = "기뻐해 줬다면 다행이야"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ねえ魔王。聞いてもいいかしら？」"
translation = "「……저기 마왕. 물어봐도 될까?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「今夜、どうして私だけを呼んでくれたの？」"
translation = "「오늘 밤, 왜 나만 불러준 거야?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ゆっくり過ごしたいって思ってくれたのは、嬉しい。でも……他の要件もあるんじゃないかしら？」"
translation = "「느긋하게 보내고 싶다고 생각해 준 건 기뻐. 하지만…… 다른 용건도 있는 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "……だいたい察しがついてたりする？"
translation = "……대충 짐작하고 있어?"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「見くびらないで頂戴。わざわざ私だけを呼び出したのだから、推測は容易でしょう。あなたはきっと──」"
translation = "「얕보지 말아줘. 일부러 나만 불러냈으니 추측은 쉽잖아. 당신은 분명──」"

[[dialogue]]
speaker = "unk"
original = "──好きだ、ルヴィネ"
translation = "──좋아해, 루비네"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「デネブとアルタイルの合同訓練。その日程でも詰めるつもりで──」"
translation = "「데네브와 알타이르의 합동 훈련. 그 일정이라도 논의할 생각으로──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………待ちなさい。今、なんて言ったの？」"
translation = "「…………기다려. 지금 뭐라고 했어?」"

[[dialogue]]
speaker = "unk"
original = "合同訓練の日程でも詰めようかなって！"
translation = "합동 훈련 일정이라도 논의할까 해서!"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「嘘よ！\u3000告白したじゃない、今！？」"
translation = "「거짓말! 고백했잖아, 방금!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……予想外の事態、なのだけれど。てっきり星徒会長同士で行う、ミーティングか何かだと……」"
translation = "「……예상치 못한 사태이긴 하지만. 틀림없이 성도회장끼리 하는 미팅이나 뭐 그런 건 줄 알고……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あ……ちょ、ちょっと待って。そんながっかりした顔、しないで頂戴……ただ予想外だっただけで……こ、断ってるわけでは、ないの……」"
translation = "「아…… 자, 잠깐 기다려. 그런 실망한 얼굴 하지 말아줘…… 그냥 예상 밖이었을 뿐이지…… 거, 거절하는 건 아니야……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……何よ、意外そうな顔をして」"
translation = "「……뭐야, 의외라는 얼굴 하고」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あ、貴方にはたくさん世話になったわ。どれだけのことを、私はしてもらったと思っているの？」"
translation = "「다, 당신에겐 신세를 많이 졌어. 내가 당신에게 얼마나 많은 것을 받았다고 생각하는 거야?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ベアトたちと離ればなれにならずにすんだのも、今私が生きていることだって……全部、魔王のおかげだわ」"
translation = "「베아트 일행과 떨어지지 않아도 되었던 것도, 지금 내가 살아 있는 것도…… 전부 마왕 덕분이야」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あれだけのことをされたら……憎からず思ったって、当然でしょう？\u3000何も、不思議なことは……ないわ」"
translation = "「그 정도 일을 겪으면…… 좋게 생각하는 게 당연하잖아? 딱히 이상할 건…… 없어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ただ──貴方の周りにはたくさん、素敵な人がいるから。まさか自分が想われているだなんて、考えもしなかっただけ……」"
translation = "「다만── 당신 주변엔 멋진 사람이 잔뜩 있으니까. 설마 내가 사랑받고 있을 줄은 생각지도 못했을 뿐……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「でも……聞いてもいい、かしら？\u3000どうして……ううん、いつから、私のことをそんな風に……？」"
translation = "「하지만…… 물어봐도 될까? 왜…… 아니, 언제부터 나를 그런 식으로……?」"

[[dialogue]]
speaker = "unk"
original = "命のやり取りをしている時から、好きだった"
translation = "목숨을 건 싸움을 할 때부터 좋아했어"

[[dialogue]]
speaker = "unk"
original = "実は……一目惚れなんだ"
translation = "사실은…… 첫눈에 반한 거야"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そっ、それは…………うん。その、こういう時、どういう言葉を紡げばいいのか……わからないわね」"
translation = "「그, 그건………… 응. 그, 이럴 때 어떤 말을 자아내야 할지…… 모르겠네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいえ、ちゃんと言葉にするわ……言葉に、したい」"
translation = "「아니, 제대로 말로 할게…… 말로 하고 싶어」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王……貴方の言葉、貴方の気持ちが……とっても嬉しいわ」"
translation = "「마왕…… 당신의 말, 당신의 마음이…… 너무나 기뻐」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「心臓が物凄くドキドキしていて……きっと私の顔、見たことがないくらい、真っ赤ね」"
translation = "「심장이 엄청나게 두근거려서…… 분명 내 얼굴, 본 적 없을 정도로 빨갛겠네」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「だから……その……」"
translation = "「그러니까…… 그……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私も、貴方のことが好き……」"
translation = "「나도 당신을 좋아해……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「極星の皆に対する『好き』とも、この世界に向けた『好き』とも違う……」"
translation = "「극성 모두에 대한 『좋아함』과도, 이 세계를 향한 『좋아함』과도 달라……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「魔王のこと、１人の男の子として──大好きよ」"
translation = "「마왕을 한 명의 남자애로서── 정말 좋아해」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ねえ。良かったら貴方も、極星の皆と同じように……私のことを呼んでくれるかしら」"
translation = "「……저기. 괜찮다면 당신도 극성 애들과 마찬가지로…… 나를 불러줄래?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「特別に親しい人からは、そう呼ばれたいの──ね？」"
translation = "「특별히 친한 사람에겐 그렇게 불리고 싶어── 응?」"

[[dialogue]]
speaker = "unk"
original = "────ルヴィ、好きだ"
translation = "────루비, 좋아해"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「うん……魔王。私も…………あっ──」"
translation = "「응…… 마왕. 나도………… 앗──」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ん──ちゅっ<emoji=heart04>」"
translation = "「응── 츄 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "女神も創造神もいない、不安定な世界を俺たちは生きていく。"
translation = "여신도 창조신도 없는 불안정한 세계를 우리는 살아간다."

[[dialogue]]
speaker = "unk"
original = "けれど『ルヴィ』と一緒なら──きっと大丈夫。"
translation = "하지만 『루비』와 함께라면── 분명 괜찮을 거야."

[[dialogue]]
speaker = "unk"
original = "抱きしめた彼女の温もりを感じながら、俺はそのことを確信するのだった──"
translation = "껴안은 그녀의 온기를 느끼며 나는 그 사실을 확신했다──"

