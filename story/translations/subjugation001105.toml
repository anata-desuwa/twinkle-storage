[[dialogue]]
speaker = "unk"
original = "飲み屋を出て、マリオンと別れた後、トワは自宅への帰路を歩いていた。"
translation = "선술집을 나와 마리온과 헤어진 후 토와는 집으로 가는 길을 걷고 있었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（家に帰って、もう１度メイプルちゃんとよく話そう）"
translation = "（집에 돌아가서 다시 한번 메이플짱과 잘 이야기하자）"

[[dialogue]]
speaker = "unk"
original = "そう決意して顔を上げた、その時だった。"
translation = "그렇게 결심하고 고개를 든 그 때였다."

[[dialogue]]
speaker_original = "一般男性"
speaker_translation = "일반 남성"
original = "「うわあぁっ！？\u3000モンスターが出たぞぉーーーッ！」"
translation = "「우와앗!? 몬스터가 나타났다아──앗!」"

[[dialogue]]
speaker_original = "一般女性"
speaker_translation = "일반 여성"
original = "「キャーッ！\u3000こっち来ないで！\u3000誰か助けてーーーッ！」"
translation = "「꺄악! 이쪽으로 오지 마! 누가 좀 도와줘요──엇!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「悲鳴！？\u3000モンスターが近くに！？」"
translation = "「비명!? 몬스터가 근처에!?」"

[[dialogue]]
speaker = "unk"
original = "トワが現場に駆け付けると――"
translation = "토와가 현장으로 달려가자──"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「みんな、逃げろ！\u3000ここは魔王メイプルが引き受ける！」"
translation = "「모두 도망쳐! 여기는 마왕 메이플이 맡는다!」"

[[dialogue]]
speaker = "unk"
original = "メイプルは黒い方のパペットを構えて、その名を呼ぶ。"
translation = "메이플은 검은색 퍼펫을 자세를 잡고 그 이름을 부른다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ゆくぞ、我が眷族『アルザード』！\u3000くらえ、闇の黒き刃！」"
translation = "「가자, 나의 권속 『알자드』! 먹어라, 어둠의 검은 칼날!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「クラウンデスパレードッ！！」"
translation = "「크라운 데스퍼레이드!!」"

[[dialogue]]
speaker = "unk"
original = "星術で斬撃を飛ばし、周囲のモンスターを蹴散らして行く。"
translation = "성술로 참격을 날려 주변의 몬스터를 흩어버린다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「よし、数は多いけど、そんなに強いやつはいない……！\u3000これならあたし１人でも、みんなの避難が終わるまで戦える！」"
translation = "「좋아, 수는 많지만 그렇게 강한 녀석은 없어……! 이 정도라면 나 혼자서도 모두 피난이 끝날 때까지 싸울 수 있어!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「メイプルちゃん……！」"
translation = "「메이플짱……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっ？\u3000あっ……トワちゃん……！」"
translation = "「엣? 앗…… 토와짱……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……悪いけど、あたしはこのまま戦闘を止める気はないよ。まだ周囲の人達の避難が十分じゃない。誰かがここに残って、モンスターを引きつけておかないと――」"
translation = "「……미안하지만 나는 이대로 전투를 멈출 생각이 없어. 아직 주변 사람들의 피난이 충분하지 않아. 누군가 여기 남아서 몬스터를 유인해 두지 않으면──」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「メイプルちゃん。あのね――」"
translation = "「메이플짱. 저기──」"

[[dialogue]]
speaker = "unk"
original = "トワが言いかけた、次の瞬間。"
translation = "토와가 말을 꺼내려던 다음 순간."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっ、何！？\u3000辺りが急に暗く……！？」"
translation = "「엣, 뭐야!? 주변이 갑자기 어두워지고……!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「この感じ……まさか……！？」"
translation = "「이 느낌…… 설마……!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「こ、ここって……」"
translation = "「여, 여기는……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「アステライトの内部……！？\u3000なんでいきなり……！？」"
translation = "「아스텔라이트의 내부……!? 왜 갑자기……!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……アステラがちょうど、私たちが立っていた場所に発生したんだよ」"
translation = "「……아스텔라가 마침 우리가 서 있던 장소에 발생한 거야」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えぇっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「レアケースだけど、過去には幾つも事例がある。高層ビルを丸ごと取り込むように発生したりとかね」"
translation = "「드문 케이스지만 과거에는 여러 사례가 있어. 고층 빌딩을 통째로 집어삼키듯이 발생한다든가 말이야」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも、これはその中でもかなり運が悪い。ここはおそらく、アステラの中心部……！」"
translation = "「하지만 이건 그중에서도 상당히 운이 나빠. 여기는 아마도 아스텔라의 중심부……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「な、なにあのモンスター……？」"
translation = "「무, 뭐야 저 몬스터는……?」"

[[dialogue]]
speaker = "unk"
original = "背筋がゾクッとするような、強大なリクリエの気配。トワがメイプルの視線の先を追うと――"
translation = "등골이 서늘해지는 강대한 리크리에의 기척. 토와가 메이플의 시선 끝을 쫓자──"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「これまで学園で確認されたモンスターのデータは全部覚えてる。でも、このモンスターは知らない……！」"
translation = "「지금까지 학원에서 확인된 몬스터 데이터는 전부 기억하고 있어. 하지만 이 몬스터는 몰라……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「新種……！」"
translation = "「신종……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん……しかも、間違いなく強い……！」"
translation = "「응…… 게다가 틀림없이 강해……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……トワちゃん。あたしたち、ここは逃げるべき、だよね？」"
translation = "「……토와짱. 우리 여기서는 도망쳐야겠, 지?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「絶対に突っ込んじゃダメ。星徒会がここに辿り着くまで、ひたすら逃げ回るの。……いい？」"
translation = "「절대로 덤벼들면 안 돼. 성도회가 여기에 도착할 때까지 한사코 도망 다니는 거야. ……알았지?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「わかった。今回はちゃんと、言うことを聞くから」"
translation = "「알았어. 이번에는 제대로 말을 들을 테니까」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "モンスターは２人を見据え、ゆっくりと接近してくる。"
translation = "몬스터는 두 사람을 주시하며 천천히 접근해 온다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「メイプルちゃん……来るよ！」"
translation = "「메이플짱…… 온다!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……うん！」"
translation = "「……응!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「……グオオオォォォーーーッ！」"
translation = "「……구오오오오──엇!」"

[[dialogue]]
speaker = "unk"
original = "モンスターが咆哮を上げる。"
translation = "몬스터가 포효한다."

[[dialogue]]
speaker = "unk"
original = "トワとメイプルは戦闘を開始するのだった。"
translation = "토와와 메이플은 전투를 개시했다."

