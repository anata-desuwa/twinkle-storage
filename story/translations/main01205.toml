[[dialogue]]
speaker = "unk"
original = "第５話,幻夢,B"
translation = "제5화, 환몽, B"

[[dialogue]]
speaker = "クロト"
original = "（っああ──今の──記憶、は──）"
translation = "（으윽 아아── 방금── 기억, 은──）"

[[dialogue]]
speaker = "unk"
original = "白濁と意識が戻ってくる。その前に、ヴィーナスの姿が紡がれた。"
translation = "백탁과 의식이 되돌아온다. 그 앞에, 비너스의 모습이 이어졌다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふーん。そういうことだったのね」"
translation = "「흐음. 그런 거였네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「平行世界……そんなのがあるなんてね。私に昔の記憶がないのも、腑に落ちちゃった」"
translation = "「평행 세계…… 그런 게 있다니. 나에게 옛 기억이 없는 것도, 납득이 가버렸어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「<b>だから</b>──私は<ruby>デネブ<rt>あっち</rt></ruby>から来たみたい。本当は、アルタイルの世界に私はいなかったのね」"
translation = "「<ruby>그래서<rt・・・</rt><rt>저쪽</rt></ruby>── 나는 데네브에서 온 것 같아. 사실은, 알타이르 세계에 나는 없었던 거네.」"

[[dialogue]]
speaker = "unk"
original = "彼女はすっかり事態を飲み込めているようで、何度もうなずいていた。"
translation = "그녀는 완전히 사태를 이해하고 있는 듯, 몇 번이고 고개를 끄덕였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトだって……何度か垣間見てきたんじゃない？\u3000ここじゃない、どこかの自分の記憶」"
translation = "「쿠로토도…… 몇 번인가 엿봤던 거 아니야? 여기가 아닌, 어딘가의 자기 자신의 기억을.」"

[[dialogue]]
speaker = "クロト"
original = "（それ──は……）"
translation = "（그것──은……）"

[[dialogue]]
speaker = "unk"
original = "──ある。"
translation = "──있다."

[[dialogue]]
speaker = "unk"
original = "しかしそれは、今までただの幻としてしか処理してこなかった。"
translation = "하지만 그것은 지금까지 단순한 환상으로만 처리해 왔다."

[[dialogue]]
speaker = "unk"
original = "でも、あれは……平行世界の俺が見た確かな記憶の残滓だったのかもしれない。"
translation = "하지만, 그것은…… 평행 세계의 내가 본 확실한 기억의 잔재였을지도 모른다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「もし思い出せたなら……私たちの関係も、もうわかっちゃったかしら。クロト」"
translation = "「혹시 기억해 냈다면…… 우리들의 관계도, 벌써 알아버렸으려나. 쿠로토.」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ。理解したよ。俺たちは最初から──出会う運命だったんだな」"
translation = "「……아아. 이해했어. 우리는 처음부터── 만날 운명이었던 거네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ハッピーエンドにはまだ早いけどね。向こうの私、まだまだ大ピンチだし」"
translation = "「해피 엔딩에는 아직 이르지만. 저쪽의 나, 아직도 대위기이고.」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫だ。必ず救う──だってヴィーナスは、俺の……」"
translation = "「괜찮아. 반드시 구할게── 왜냐하면 비너스는, 나의……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あはは、続きは向こうでね。じゃそゆことで──頼りにしてるわよ。クロト」"
translation = "「아하하, 다음은 저쪽에서 하자. 그럼 그런 걸로── 믿고 있을게. 쿠로토.」"

