[[dialogue]]
speaker = "unk"
original = "第２話,暴走,B"
translation = "제2화, 폭주, B"

[[dialogue]]
speaker = "クロト"
original = "「くっ……はぁ……はぁ……」"
translation = "「큭…… 하아…… 하아……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「くぅ……今の、クロトがやったの……？」"
translation = "「쿠우…… 방금 거, 쿠로토가 한 거야……?」"

[[dialogue]]
speaker = "梨緒"
original = "「ヴィーナス、何があった！？」"
translation = "「비너스, 무슨 일이 있었지!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私にもわかんないわ！\u3000突然クロトが苦しみ出したと思ったら、衝撃波がドカーンってなって！」"
translation = "「나도 모르겠어! 갑자기 쿠로토가 괴로워하기 시작하더니 충격파가 콰광 하고 터져서!」"

[[dialogue]]
speaker = "梨緒"
original = "「苦しみ出して……？\u3000まさか──」"
translation = "「괴로워하기 시작하더니……? 설마──」"

[[dialogue]]
speaker = "梨緒"
original = "「以前ジグが現れた時、やつが魔王に何かしていた」"
translation = "「이전에 지그가 나타났을 때, 녀석이 마왕에게 무언가를 했었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「ギリギリで阻止できたものと思っていたが、甘かったか……！」"
translation = "「간발의 차로 저지했다고 생각했는데, 안일했나……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ジグが……！？\u3000何それ、あいつのせいでクロトがあんなになっちゃったってこと！？」"
translation = "「지그가……!? 뭐야 그게, 그 녀석 때문에 쿠로토가 저렇게 됐다는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスたちの視線の先には、幽鬼のように佇む緋宮クロトの姿があった。"
translation = "비너스 일행의 시선 끝에는 유령처럼 서 있는 히노미야 쿠로토의 모습이 있었다."

[[dialogue]]
speaker = "unk"
original = "さらにクロトはその腕を振りかぶって──"
translation = "게다가 쿠로토는 그 팔을 휘둘러──"

[[dialogue]]
speaker = "クロト"
original = "「ク……オオオ……ッ！」"
translation = "「크…… 오오오……윽!」"

[[dialogue]]
speaker = "unk"
original = "獣じみた呻きとともに、瘴気を帯びた拳を繰り出した。"
translation = "짐승 같은 신음과 함께 장기를 띤 주먹을 내질렀다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは咄嗟に杖に星力を宿し、拳撃の威力を相殺しながら受け止めた。"
translation = "비너스는 황급히 지팡이에 성력을 실어 권격의 위력을 상쇄하며 받아냈다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト──！」"
translation = "「쿠로토──!」"

[[dialogue]]
speaker = "梨緒"
original = "「この……！」"
translation = "「이……!」"

[[dialogue]]
speaker = "unk"
original = "梨緒が彼を止めようと矢を放つが、クロトがまとう紫の瘴気に呑まれて消える。"
translation = "리오가 그를 멈추려고 화살을 쏘지만, 쿠로토가 두른 보랏빛 장기에 삼켜져 사라진다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「この力……リクリエの……！？」"
translation = "「이 힘…… 리크리에의……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まさか自分に封印してたリクリエの力に操られてるってこと！？\u3000今まで抑えられてたのに！？」"
translation = "「설마 자신에게 봉인했던 리크리에의 힘에 조종당하고 있다는 거야!? 지금까지 억제하고 있었는데!?」"

[[dialogue]]
speaker = "クロト"
original = "「オオオッ……！」"
translation = "「오오오옷……!」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……」"
translation = "「큭……」"

[[dialogue]]
speaker = "unk"
original = "クロトが低い叫びを上げて迫り、梨緒とヴィーナスが左右に散開して回避する。"
translation = "쿠로토가 낮은 외침을 지르며 다가오고, 리오와 비너스가 좌우로 산개하여 회피한다."

[[dialogue]]
speaker = "unk"
original = "次の瞬間、２人が元居た場所に拳が叩きつけられ、地鳴りとともにアスファルトが抉れて大穴を開けた。"
translation = "다음 순간, 두 사람이 원래 있던 자리에 주먹이 내리꽂혔고, 지면이 울리며 아스팔트가 파여 커다란 구멍이 뚫렸다."

[[dialogue]]
speaker = "梨緒"
original = "「インパルスストリーム！」"
translation = "「임펄스 스트림!」"

[[dialogue]]
speaker = "クロト"
original = "「ウウッ……！」"
translation = "「우우윽……!」"

[[dialogue]]
speaker = "unk"
original = "モンスターを焼き焦がす稲妻の奔流も、拳の一薙ぎでかき消される。"
translation = "몬스터를 태워버리는 번개의 분류도 주먹질 한 번에 지워진다."

[[dialogue]]
speaker = "ナターシャ"
original = "「うひゃー、さすが魔王ってところかな」"
translation = "「우와─, 역시 마왕답다고 해야 할까.」"

[[dialogue]]
speaker = "梨緒"
original = "「魔王の真の力はこんなものじゃない。彼が本気なら、私たちはとっくに倒されている」"
translation = "「마왕의 진정한 힘은 이 정도가 아니야. 그가 진심이라면 우리는 진작에 쓰러졌을 거다.」"

[[dialogue]]
speaker = "梨緒"
original = "「おそらく今表に出ているのは、ジグに暴走させられたリクリエの力だけ。彼はまだ世界を滅ぼすまいと抗っているんだ」"
translation = "「아마 지금 겉으로 드러난 것은 지그에 의해 폭주한 리크리에의 힘뿐. 그는 아직 세계를 멸망시키지 않으려고 저항하고 있어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「じゃあ、まだ暴走しかけってところか。でもこのままだと、完全に暴走するのも時間の問題じゃない？」"
translation = "「그럼 아직 폭주하려는 참인가. 하지만 이대로라면 완전히 폭주하는 것도 시간문제 아냐?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「残念ながら私の出番かな。今回は手を汚さず終わると思ってたんだけど、早すぎるお別れだったね」"
translation = "「유감스럽게도 내 차례인가 보네. 이번에는 손 안 더럽히고 끝날 줄 알았는데, 너무 이른 작별이었어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まさか、クロトを消すってこと！？\u3000そんなことさせないわよ！」"
translation = "「설마 쿠로토를 없애겠다는 거야!? 그런 짓 하게 두지 않아!」"

[[dialogue]]
speaker = "梨緒"
original = "「魔王を抹殺する……最悪の選択肢として、それもあり得るかもしれない。だが一介のエージェントでしかない君にそれが可能なのか？」"
translation = "「마왕을 말살한다…… 최악의 선택지로서 그럴 가능성도 있을지 모르지. 하지만 일개 에이전트에 불과한 네가 그것이 가능한가?」"

[[dialogue]]
speaker = "unk"
original = "“どうやって魔王を消すのか”──問われたナターシャは軽薄な笑みを消して、あるものを差し出した。"
translation = "“어떻게 마왕을 없앨 것인가”── 질문을 받은 나타샤는 경박한 웃음을 지우고 어떤 것을 내밀었다."

[[dialogue]]
speaker = "unk"
original = "ナターシャの手のひらの上に浮かぶ、小さな光。"
translation = "나타샤의 손바닥 위에 떠 있는 작은 빛."

[[dialogue]]
speaker = "unk"
original = "その正体は……"
translation = "그 정체는……"

[[dialogue]]
speaker = "ナターシャ"
original = "「シエルの鍵。天界で新たに発掘された秘宝だよ」"
translation = "「시엘의 열쇠. 천계에서 새로 발굴된 비보야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「鍵？\u3000ただ光ってるようにしか見えないんだけど……」"
translation = "「열쇠? 그냥 빛나는 것처럼밖에 안 보이는데……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁね。鍵っていっても形のないプログラムのようなものだから」"
translation = "「뭐 그렇지. 열쇠라고 해도 형태가 없는 프로그램 같은 거니까.」"

[[dialogue]]
speaker = "unk"
original = "かつてリクリエの力を封印しようとして失われた天界の秘宝“シエルの<ruby>筐<rt>はこ</rt></ruby>”。"
translation = "과거 리크리에의 힘을 봉인하려다 소실된 천계의 비보 “시엘의 상자”."

[[dialogue]]
speaker = "unk"
original = "これはそれと対になるものだとナターシャは言う。"
translation = "이것은 그것과 쌍을 이루는 것이라고 나타샤는 말한다."

[[dialogue]]
speaker = "ナターシャ"
original = "「この鍵は、筐を開けるためのものじゃない。シエルの鍵の機能は、対象を跡形もなく消滅させること」"
translation = "「이 열쇠는 상자를 열기 위한 게 아니야. 시엘의 열쇠의 기능은 대상을 흔적도 없이 소멸시키는 것.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「つまり、筐ごと綺麗さっぱり消し飛ばすのが本来の使い方ってワケ。“シエル”が誰か知らないけど面白いこと考えるよね」"
translation = "「즉, 상자째로 깔끔하게 날려버리는 게 본래의 사용법이라는 소리지. “시엘”이 누군지는 모르겠지만 재미있는 생각을 하네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃああの戦いの時にそれがあれば、クロトはリクリエの力を自分に封印しなくてよかったってこと！？」"
translation = "「그럼 그때 그 싸움에서 그게 있었다면, 쿠로토는 리크리에의 힘을 자신에게 봉인하지 않아도 됐다는 거야!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「かもね。でも仕方ないじゃん、あの時は鍵が見つかってなかったんだから」"
translation = "「그럴지도. 하지만 어쩔 수 없잖아, 그때는 열쇠를 찾지 못했으니까.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ただし、この鍵は１回使ったら消える。かつ消滅させられるのは筐と同サイズのものだけ。魔王を消すなら、しっかり近づいて心臓を消さなきゃ」"
translation = "「단, 이 열쇠는 한 번 쓰면 사라져. 게다가 소멸시킬 수 있는 건 상자와 같은 사이즈의 물건뿐. 마왕을 없애려면 확실히 접근해서 심장을 지워야 해.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「効果範囲は限定的だけど、その分確実だよ。この鍵なら魔王をやれる。……どうする？」"
translation = "「효과 범위는 한정적이지만 그만큼 확실해. 이 열쇠라면 마왕을 해치울 수 있어. ……어떡할래?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうするって、そんなの許すわけないでしょ！？」"
translation = "「어떡하긴, 그런 걸 허락할 리 없잖아!?」"

[[dialogue]]
speaker = "unk"
original = "声を荒げるヴィーナスを意に介さず、ナターシャの冷たい目が梨緒を見つめる。"
translation = "소리를 높이는 비너스를 아랑곳하지 않고, 나타샤의 차가운 눈이 리오를 꿰뚫는다."

[[dialogue]]
speaker = "unk"
original = "差し出した手は、“これを使え”と言外に告げていた。"
translation = "내민 손은, “이것을 써라”라고 무언 중에 고하고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "梨緒"
original = "（魔王が堕ちるなら、私が討つ──そう決めたはずだ。ならこの鍵は私が使うべき……）"
translation = "(마왕이 타락한다면 내가 벤다── 그렇게 결심했을 터다. 그렇다면 이 열쇠는 내가 써야……)"

[[dialogue]]
speaker = "梨緒"
original = "（いや、これがジグの策略か。魔王が堕ちるのを指を咥えて見ているか、それとも魔王を討つか選べと）"
translation = "(아니, 이것이 지그의 책략인가. 마왕이 타락하는 것을 손가락 빨며 지켜볼 것인지, 아니면 마왕을 벨 것인지 선택하라는 건가)"

[[dialogue]]
speaker = "梨緒"
original = "（ならば私はどちらも選ばない。魔王は止める。そして彼をやらせはしない……！）"
translation = "(그렇다면 나는 어느 쪽도 선택하지 않겠어. 마왕은 저지한다. 그리고 그를 죽게 내버려 두지 않겠어……!)"

[[dialogue]]
speaker = "梨緒"
original = "「いや、まだだ。まだできることはあるはずだ」"
translation = "「아니, 아직이다. 아직 할 수 있는 일이 있을 거야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ほんとに？\u3000手遅れにならない？」"
translation = "「정말로? 너무 늦어버리지 않겠어?」"

[[dialogue]]
speaker = "梨緒"
original = "「さっき言った通り、魔王の力はまだ抑えられている。まだ魔王は止められる。私が止める」"
translation = "「방금 말한 대로, 마왕의 힘은 아직 억제되고 있어. 아직 마왕은 멈출 수 있다. 내가 멈추겠어.」"

[[dialogue]]
speaker = "梨緒"
original = "「だから──私がやられたら魔王を消してくれ」"
translation = "「그러니까── 내가 당하면 그때 마왕을 없애줘.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……ＯＫ。じゃあ任せたよ、委員長。私は極星従騎の相手してるから」"
translation = "「……OK. 그럼 맡길게, 위원장. 나는 극성종기를 상대하고 있을 테니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、私がやられる前にくたばるなよ」"
translation = "「그래, 내가 당하기 전에 뒈지지나 마라.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふっ、言うねぇ」"
translation = "「후훗, 제법인데~」"

[[dialogue]]
speaker = "クロト"
original = "「オオッ……！」"
translation = "「오오옷……!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「させません！」"
translation = "「하게 두지 않겠어요!」"

[[dialogue]]
speaker = "unk"
original = "リクリエの力を帯びた拳を、鮮血色の槍で迎え撃つ。"
translation = "리크리에의 힘을 띤 주먹을 선혈색 창으로 맞서 싸운다."

[[dialogue]]
speaker = "unk"
original = "紫色の瘴気と膨大な星力がぶつかり合い、嵐のような衝撃とともに爆ぜた。"
translation = "보랏빛 장기와 방대한 성력이 충돌하여 폭풍 같은 충격과 함께 터져 나갔다."

[[dialogue]]
speaker = "ベアトリス"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "梨緒"
original = "「魔王を押さえてくれてありがとう、ベアト。続きは私が受け持つ。ベアトはナターシャを援護してくれ」"
translation = "「마왕을 붙잡아줘서 고마워, 베아토. 다음은 내가 맡을게. 베아토는 나타샤를 원호해줘.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「うん、わかった」"
translation = "「응, 알았어.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「頑張って、梨緒ちゃん」"
translation = "「힘내, 리오짱.」"

[[dialogue]]
speaker = "梨緒"
original = "「ありがとう。やってみせるよ」"
translation = "「고마워. 해내 보이겠어.」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスとナターシャがガーディアンに向かい、梨緒とヴィーナスの２人がクロトに対峙する。"
translation = "베아트리스와 나타샤가 가디언을 향하고, 리오와 비너스 두 사람이 쿠로토와 대치한다."

[[dialogue]]
speaker = "unk"
original = "ここでクロトを止められなければ、彼はナターシャに討たれるか、さもなくば世界を滅ぼすことになる。"
translation = "여기서 쿠로토를 멈추지 못하면, 그는 나타샤에게 살해당하거나 그렇지 않으면 세계를 멸망시키게 된다."

[[dialogue]]
speaker = "梨緒"
original = "「奇しくも彼に御前試合で敗れた者同士。リベンジといこうか」"
translation = "「기묘하게도 그에게 어전시합에서 패배한 자들끼리군. 리벤지라고 할까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は別に悔しくとも何ともないんだけど……でも、そうね。新星星徒会のフィクサーとして、今のクロトには負けられないわ！」"
translation = "「나는 딱히 분하다거나 그런 거 전혀 없지만…… 그래도, 그래. 신성성도회의 픽서로서, 지금의 쿠로토에게는 질 수 없지!」"

[[dialogue]]
speaker = "クロト"
original = "「クッ……オオッ……！」"
translation = "「큭…… 오오옷……!」"

[[dialogue]]
speaker = "unk"
original = "俺の喉から、低い地鳴りのような声が響いた。"
translation = "내 목에서 낮은 땅울림 같은 소리가 울려 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "汚泥にまみれたように全身に瘴気が絡みつき、振り払うようにもがく。"
translation = "진흙탕에 처박힌 것처럼 전신에 장기가 뒤엉켜, 떨쳐내려는 듯 몸부림친다."

[[dialogue]]
speaker = "unk"
original = "いや、もがいているつもりなのに……"
translation = "아니, 몸부림치고 있다고 생각하는데……"

[[dialogue]]
speaker = "クロト"
original = "「ウオオッ……！」"
translation = "「우오오옷……!」"

[[dialogue]]
speaker = "unk"
original = "俺の中に巣食う<ruby>破滅<rt>リクリエ</rt></ruby>に命じられるままに、拳を振るう。"
translation = "내 안에 둥지를 튼 <ruby>파멸<rt>리크리에</rt></ruby>이 명령하는 대로 주먹을 휘두른다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「きゃっ……！？」"
translation = "「꺄악……!?」"

[[dialogue]]
speaker = "クロト"
original = "（俺は……何をしているんだ……？\u3000何をしていたんだっけ……？）"
translation = "(나는…… 무엇을 하고 있는 거지……? 무엇을 하고 있었더라……?)"

[[dialogue]]
speaker = "unk"
original = "意識が朦朧としている。"
translation = "의식이 몽롱하다."

[[dialogue]]
speaker = "unk"
original = "俺でない何かが、俺の中に根を張り、俺を塗り変えていく。"
translation = "내가 아닌 무언가가 내 안에 뿌리를 내리고 나를 덧칠해간다."

[[dialogue]]
speaker = "クロト"
original = "（やめ……ろ……！）"
translation = "(그만…… 둬……!)"

[[dialogue]]
speaker = "unk"
original = "俺の中に宿る魔王の因子を我が物にせんと、破滅の種子が根を伸ばす。"
translation = "내 안에 깃든 마왕의 인자를 제 것으로 만들고자, 파멸의 씨앗이 뿌리를 뻗는다."

[[dialogue]]
speaker = "unk"
original = "もし魔王の力までリクリエに奪われれば一巻の終わりだ。これだけは侵させてなるものかと歯を食いしばる。"
translation = "만약 마왕의 힘까지 리크리에에게 빼앗기면 끝장이다. 이것만은 침범당하지 않겠다고 이를 악문다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「くぅ～、いったいわね……！\u3000でも本気のクロトならこんなもんじゃないわ！\u3000ヘのパンダよ！」"
translation = "「쿠우~, 아프잖아……! 하지만 진심인 쿠로토라면 이 정도가 아닐 거야! 식은 죽 먹기라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が止めてあげるわ、クロト！」"
translation = "「내가 멈춰줄게, 쿠로토!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの鎖が絡みつき──"
translation = "비너스의 사슬이 얽혀들고──"

[[dialogue]]
speaker = "梨緒"
original = "「そこ！」"
translation = "「거기!」"

[[dialogue]]
speaker = "unk"
original = "雷光の矢が俺の体を射貫いた。"
translation = "뇌광의 화살이 내 몸을 꿰뚫었다."

[[dialogue]]
speaker = "unk"
original = "痛い──はずなのに痛くない。"
translation = "아프다── 분명 그럴 텐데 아프지 않다."

[[dialogue]]
speaker = "unk"
original = "全身の感覚がなくなっていく。俺の体が俺でなくなる。"
translation = "전신의 감각이 사라져간다. 내 몸이 내가 아니게 된다."

[[dialogue]]
speaker = "unk"
original = "まるで幽霊になって、暴れる俺を後ろから眺めているみたいだ。"
translation = "마치 유령이 되어 날뛰는 나를 뒤에서 바라보고 있는 것만 같다."

[[dialogue]]
speaker = "クロト"
original = "（俺を……止めてくれ……！）"
translation = "(나를…… 멈춰줘……!)"

