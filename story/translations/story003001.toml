[[dialogue]]
speaker = "unk"
original = "それはクリスマスも近づいた、とある日の昼下がり――"
translation = "그것은 크리스마스도 다가온, 어느 날의 늦은 오후――"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「フニ、ひとつ聞きたいことがありますわ」"
translation = "「후니, 하나 묻고 싶은 것이 있습니다만」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はい、何でしょうか？」"
translation = "「네, 네, 무엇이신가요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「前回のクリスマス、フニはセシア様をお手伝いしてプレゼント配りをしていましたわね？」"
translation = "「지난번 크리스마스, 후니는 세시아님을 도와 선물을 나눠주고 있었지요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そうですね。セッシーちゃんとルルカちゃんのお手伝いをさせてもらいました」"
translation = "「그렇습니다. 셋시짱과 루루카짱을 돕게 해 주셨습니다」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あの時はお姉様に『無暗に高価なものを配りまくるのはよくない』というアドバイスを頂きましたよね」"
translation = "「그때 언니에게 『함부로 고가품을 마구 뿌리는 것은 좋지 않다』는 조언을 받았었지요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「うむむむむむ……」"
translation = "「으음으음으음으음……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……お姉様？」"
translation = "「……언니?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……決めましたわ」"
translation = "「……정했습니다」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「え？」"
translation = "「네?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「<ruby>流星寮<rt>イルソーレ</rt></ruby>でクリスマスパーティーを開きますわよっ！」"
translation = "「유성 기숙사에서 크리스마스 파티를 열겠습니다!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ど、どうしたんですか、急に？」"
translation = "「무, 무슨 일이세요, 갑자기?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「以前より我が流星寮でも、クリスマスの催しを開きたいと考えていたんですの！」"
translation = "「이전부터 우리 유성 기숙사에서도, 크리스마스 행사를 열고 싶다고 생각하고 있었습니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「クリスマスパーティーは毎回カフェテリアで盛大に行われていますわ。しかし、それは流星、新星、附属生という学園全体のものですわ」"
translation = "「크리스마스 파티는 매번 카페테리아에서 성대하게 열리고 있습니다. 하지만, 그것은 유성, 신성, 부속생이라는 학원 전체의 것입니다」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私の提案するのは、流星寮の寮生たち全員が楽しめるような、伝統と格式あるパーティーですの！」"
translation = "「제가 제안하는 것은, 유성 기숙사의 기숙사생들 전원이 즐길 수 있는, 전통과 격식 있는 파티입니다!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「流星寮のパーティー……楽しそうですね、いいと思います」"
translation = "「유성 기숙사의 파티…… 즐거울 것 같네요, 좋다고 생각합니다」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「必ずや流星寮の名に相応しい素晴らしいパーティーにして見せますわ！\u3000マムにはぜぇ～～～ったい真似できない、エレガントなクリスマスパーティーに！」"
translation = "「반드시 유성 기숙사의 이름에 걸맞은 훌륭한 파티로 만들어 보이겠습니다! 맘은 절～～～대 흉내 낼 수 없는, 우아한 크리스마스 파티로!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お姉様……もしかして本音はそちらでは……？」"
translation = "「언니…… 혹시 본심은 그쪽이신가요……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「いいですか、フニ。お金は天下の回りもの！\u3000祭事においてお金を使わない者に、大きな<ruby>商談<rt>チャンス</rt></ruby>は舞い込んでこないものですわ！」"
translation = "「알겠습니까, 후니. 돈은 세상의 돌아가는 것! 제사에서 돈을 쓰지 않는 자에게, 큰 상담은 굴러 들어오지 않는 법입니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「というわけで、パーティーにはいくらつぎ込んでも構いません！\u3000足りない分は私のポケットマネーから出させていただきますわ！」"
translation = "「그런 이유로, 파티에는 얼마를 쏟아부어도 상관없습니다! 부족한 부분은 제 용돈에서 내겠습니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そうですわね、例えばですけどプロの楽団を呼ぶのはどうかしら？\u3000フルオーケストラで聖歌を唄うなんて大感動間違いなしですわ！」"
translation = "「그렇습니다만, 예를 들어서 전문 악단을 부르는 것은 어떨까요? 풀 오케스트라로 성가를 부른다면 대감동 틀림없습니다!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「以前に頂いたアドバイスと真逆を突っ走っているように思うのは気のせいでしょうか……」"
translation = "「이전에 받은 조언과는 정반대로 폭주하고 있는 것 같은 것은 기분 탓일까요……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「流星寮の威光を示すには必要な出費ですわ！」"
translation = "「유성 기숙사의 위광을 보여주기 위해서는 필요한 지출입니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「とにかく、開催しますわよ！\u3000流星寮プレゼンツのクリスマスパーティー！」"
translation = "「어쨌든, 개최하겠습니다! 유성 기숙사 프레젠트의 크리스마스 파티!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わかりました。でもお姉様、クリスマスまでそれほど日がありません」"
translation = "「알겠습니다. 하지만 언니, 크리스마스까지 그렇게 날이 많이 남지 않았습니다」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「当日までの準備期間、お姉様も私もちょうど色々忙しくて、スケジュールがびっしりなんですがどうしましょう？」"
translation = "「당일까지의 준비 기간, 언니도 저도 마침 여러 가지로 바빠서, 스케줄이 꽉 차 있는데 어떻게 할까요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「根性で何とかしますわ！」"
translation = "「근성으로 어떻게든 하겠습니다!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そ、そんな……さすがに根性だけではどうにもなりませんよ……」"
translation = "「서, 설마…… 아무리 그래도 근성만으로는 어떻게 되지 않아요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「万全を期すためにも無理をせず、任せられるところは誰かに任せてしまった方がよいのではないでしょうか……？」"
translation = "「만전을 기하기 위해서라도 무리하지 않고, 맡길 수 있는 부분은 누군가에게 맡겨 버리는 것이 좋지 않을까요……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふむ……一理ありますわね」"
translation = "「흠…… 일리가 있습니다만」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「我が流星寮には、そういった企画を見事に実現してみせる優秀な人材も揃っているはずですわ」"
translation = "「우리 유성 기숙사에는, 그러한 기획을 훌륭하게 실현해 보일 우수한 인재도 갖추어져 있을 것입니다」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「<ruby>新星寮<rt>ラルーナ</rt></ruby>との格の違いを見せつけるためにも、寮生から実行委員を選出するのが妥当な判断かもしれませんわね」"
translation = "「신성 기숙사와의 격차를 보여주기 위해서라도, 기숙사생 중에서 실행위원을 선출하는 것이 타당한 판단일지도 모르겠습니다」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「では、正式に募集をかけてみますね？」"
translation = "「그럼, 정식으로 모집을 해 볼까요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ええ、頼んだわよフニ！」"
translation = "「네, 부탁합니다 후니!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「テーマは『流星寮の品格に相応しいクリスマスパーティー』、やる気のある者なら誰でも歓迎しますわ！」"
translation = "「테마는 『유성 기숙사의 품격에 걸맞은 크리스마스 파티』, 의욕 있는 사람이라면 누구든 환영합니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000どんな子が集まってくれるのか、今から楽しみですわっ♪」"
translation = "「오호호호호! 어떤 아이들이 모여줄지, 지금부터 기대됩니다♪」"

[[dialogue]]
speaker = "unk"
original = "こうして……流星寮クリスマスパーティーの実行スタッフを募集するポスターが<b>大々的に</b>貼りだされたのだった。"
translation = "이렇게 해서…… 유성 기숙사 크리스마스 파티의 실행 스태프를 모집하는 포스터가 대대적으로 붙여진 것이었다."

