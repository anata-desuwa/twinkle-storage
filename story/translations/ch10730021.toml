[[dialogue]]
speaker = "unk"
original = "第１話,緋宮リノの初恋,P"
translation = "제1화, 히노미야 리노의 첫사랑, P"

[[dialogue]]
speaker = "unk"
original = "ある朝。私――緋宮リノは起床してきた息子に声をかける。"
translation = "어느 날 아침. 나── 히노미야 리노는 기상해온 아들에게 말을 건다."

[[dialogue]]
speaker = "リノ"
original = "「あっ、クロト……お、おはよう」"
translation = "「앗, 쿠로토…… 아, 안녕」"

[[dialogue]]
speaker = "unk"
original = "う、うん。おはよう、母さん"
translation = "으, 응. 안녕, 엄마"

[[dialogue]]
speaker = "unk"
original = "ぎこちない返事をして、クロトは顔を洗いにそそくさとリビングを離れていってしまう。"
translation = "어색하게 대답하고 쿠로토는 세수하러 서둘러 거실을 떠나 버린다."

[[dialogue]]
speaker = "リノ"
original = "（ああ……気まずいことになっちゃったわ……）"
translation = "(아아…… 어색한 상황이 되어버렸네……)"

[[dialogue]]
speaker = "unk"
original = "クロトの変な反応の原因は分かっている。少し前に見てしまった『夢』だ。"
translation = "쿠로토의 이상한 반응의 원인은 알고 있다. 조금 전에 보고 만 『꿈』이다."

[[dialogue]]
speaker = "リノ"
original = "（私は魔女として、『空間魔法』に最も適性がある）"
translation = "(나는 마녀로서, 『공간 마법』에 가장 적성이 있다)"

[[dialogue]]
speaker = "リノ"
original = "（その中でも、私だけに可能なのが『世界の境界を超越し、平行世界を観測する』ことができる『平行観測』という固有の魔法だ）"
translation = "(그중에서도 나에게만 가능한 것이 『세계의 경계를 초월하여, 평행 세계를 관측하는』 것이 가능한 『평행 관측』이라는 고유 마법이다)"

[[dialogue]]
speaker = "リノ"
original = "（でも、その魔法には厄介な点がある）"
translation = "(하지만 그 마법에는 성가신 점이 있다)"

[[dialogue]]
speaker = "リノ"
original = "（制御が非常に難しい魔法で、時折、私の意思とは無関係に発動してしまうことがあるのだ）"
translation = "(제어가 매우 어려운 마법이라서 때때로 내 의사와는 무관하게 발동해버리는 경우가 있는 것이다)"

[[dialogue]]
speaker = "リノ"
original = "（例えばそう……私の意識が離れた、眠っている時などに、異なる世界の記憶を観測し、『夢』として勝手に流れ込んで来てしまうことがある）"
translation = "(예를 들면 그래…… 내 의식이 떨어진, 잠들어 있을 때 등에 다른 세계의 기억을 관측하여 『꿈』으로서 멋대로 흘러 들어와 버리는 경우가 있다)"

[[dialogue]]
speaker = "リノ"
original = "（それで今回、クロトが以前よりも魔王の力を覚醒させた影響か、<b>事故</b>が起きてしまった――）"
translation = "(그래서 이번에, 쿠로토가 이전보다 마왕의 힘을 각성시킨 영향인지, <b>사고</b>가 일어나 버렸다──)"

[[dialogue]]
speaker = "リノ"
original = "（私が見た夢を、クロトも同じく見てしまったのだ）"
translation = "(내가 본 꿈을 쿠로토도 똑같이 보고 만 것이다)"

[[dialogue]]
speaker = "リノ"
original = "（そのことがなんとなく、私にも感覚的に伝わって来てしまっている。そして、それはクロトも同様）"
translation = "(그 사실이 왠지 모르게 나에게도 감각적으로 전해져 오고 있다. 그리고 그것은 쿠로토도 마찬가지)"

[[dialogue]]
speaker = "リノ"
original = "（『同じ夢を見た』ということが、お互いに伝わってしまっているのだ）"
translation = "(『같은 꿈을 꾸었다』는 사실이 서로에게 전해져 버린 것이다)"

[[dialogue]]
speaker = "リノ"
original = "（その夢の内容が、一体何だったのかといえば――）"
translation = "(그 꿈의 내용이 대체 무엇이었느냐 하면──)"

[[dialogue]]
speaker = "リノ"
original = "（それは……平行世界で、私と、クロトと同一存在である魔王――ラクシスが<b>恋人</b>として寄り添い、触れ合っている記憶だ）"
translation = "(그것은…… 평행 세계에서 나와 쿠로토와 동일 존재인 마왕── 라크시스가 <b>연인</b>으로서 바짝 다가앉아 접촉하고 있는 기억이다)"

[[dialogue]]
speaker = "リノ"
original = "（私の観測した平行世界では、クロトは魔王ラクシスとして目覚めて成長しているようだった。おそらく、私とは後から違う形で知り合ったのだろう）"
translation = "(내가 관측한 평행 세계에서는 쿠로토는 마왕 라크시스로서 깨어나 성장해 있는 것 같았다. 아마 나와는 나중에 다른 형태로 알게 된 것이겠지)"

[[dialogue]]
speaker = "リノ"
original = "（その結果、親子ではなく、男女として仲良くなり、恋愛関係になった――）"
translation = "(그 결과 부모 자식이 아니라 남녀로서 친해져 연애 관계가 되었다──)"

[[dialogue]]
speaker = "unk"
original = "夢で見た記憶を思い出し、私は顔が熱くなってしまう。"
translation = "꿈에서 본 기억을 떠올리며 나는 얼굴이 뜨거워지고 만다."

[[dialogue]]
speaker = "リノ"
original = "（そして、クロトとあんなことやこんなことを……）"
translation = "(그리고 쿠로토와 그런 일이나 이런 일을……)"

[[dialogue]]
speaker = "リノ"
original = "（って、いけないいけない！\u3000何を考えているの私！\u3000相手は血が繋がっていないとはいえ、これまで本当の息子のように思って育てて来た子なのよ！？）"
translation = "(아니, 안 돼 안 돼! 무슨 생각을 하는 거야 나! 상대는 피가 섞이지 않았다고는 해도 지금까지 진짜 아들처럼 생각하며 키워온 아이라구!?)"

[[dialogue]]
speaker = "unk"
original = "私はぶんぶんと首を横に振って、クロトがリビングに戻って来る前に、変な考えを振り払うのだった――"
translation = "나는 세차게 고개를 가로저어 쿠로토가 거실로 돌아오기 전에 이상한 생각을 떨쳐버리는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "それから数日後のこと。"
translation = "그로부터 며칠 뒤의 일."

[[dialogue]]
speaker = "unk"
original = "ただいま、母さん"
translation = "다녀왔어, 엄마"

[[dialogue]]
speaker = "リノ"
original = "「あっ……お帰りなさい」"
translation = "「앗…… 다녀왔니」"

[[dialogue]]
speaker = "リノ"
original = "「ちょうど緑茶を淹れたばっかりなんだけど……クロトも飲む？」"
translation = "「마침 녹차를 막 우려냈는데…… 쿠로토도 마실래?」"

[[dialogue]]
speaker = "unk"
original = "あのさ……夢の話なんだけど"
translation = "있잖아…… 꿈 이야기인데"

[[dialogue]]
speaker = "リノ"
original = "「！？\u3000ごほっ……ごほごほっ！」"
translation = "「!? 쿨럭…… 쿨럭쿨럭!」"

[[dialogue]]
speaker = "unk"
original = "私は緑茶を飲んでいた途中で言われて、むせてしまう。"
translation = "나는 녹차를 마시던 도중에 그 말을 듣고 사레가 들리고 만다."

[[dialogue]]
speaker = "unk"
original = "母さん、大丈夫！？"
translation = "엄마, 괜찮아!?"

[[dialogue]]
speaker = "リノ"
original = "「え、ええ。……やっぱり、クロトも同じ夢を見ちゃったのよね」"
translation = "「에, 에에. ……역시 쿠로토도 같은 꿈을 꿔버린 거구나」"

[[dialogue]]
speaker = "unk"
original = "クロトは頷く。"
translation = "쿠로토는 고개를 끄덕인다."

[[dialogue]]
speaker = "リノ"
original = "「その……夢を見たのは、お母さんの魔法のせいなの」"
translation = "「그…… 꿈을 꾼 건 엄마 마법 때문이야」"

[[dialogue]]
speaker = "unk"
original = "私はそれから『平行観測』の魔法について説明をして――"
translation = "나는 그제야 『평행 관측』 마법에 대해 설명을 하고──"

[[dialogue]]
speaker = "リノ"
original = "「つまりは、意図しない事故で……。だから、今回のことは忘れてくれるとありがたいわ」"
translation = "「그러니까, 의도치 않은 사고로……. 그래서 이번 일은 잊어주면 고맙겠어」"

[[dialogue]]
speaker = "リノ"
original = "「でも、お母さんの変なところを見せちゃって、気持ち悪かったわよね……ごめんなさい」"
translation = "「하지만 엄마의 이상한 모습을 보여줘서 기분 나빴겠지…… 미안해」"

[[dialogue]]
speaker = "unk"
original = "気持ち悪いわけない！"
translation = "기분 나쁠 리가 없잖아!"

[[dialogue]]
speaker = "unk"
original = "クロトはそう言うと、両手で私の手を取る。"
translation = "쿠로토는 그렇게 말하며 두 손으로 내 손을 잡는다."

[[dialogue]]
speaker = "リノ"
original = "「へ！？\u3000く、クロト……！？」"
translation = "「헤!? 쿠, 쿠로토……!?」"

[[dialogue]]
speaker = "unk"
original = "クロトの顔を見ると……そこには私が大切にして来た最愛の男の子の、真剣な眼差しがあって。"
translation = "쿠로토의 얼굴을 보니…… 거기에는 내가 소중히 여겨온 최애하는 소년의 진지한 눈빛이 있어서."

[[dialogue]]
speaker = "リノ"
original = "（あ、あの夢を見たせいか、クロトの顔がいつもの２００％増しくらいで、イケメンに見えちゃう……！）"
translation = "(아, 그 꿈을 본 탓인지 쿠로토의 얼굴이 평소보다 200%는 더 잘생겨 보여……!)"

[[dialogue]]
speaker = "unk"
original = "母さんは、俺のこと――"
translation = "엄마는 나를──"

[[dialogue]]
speaker = "リノ"
original = "「お、お母さん、今思い出しちゃったわっ！」"
translation = "「어, 엄마, 지금 생각났어!」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "어?"

[[dialogue]]
speaker = "unk"
original = "ばっと手を引っ込めて、立ち上がる私。"
translation = "확 손을 빼내고 일어서는 나."

[[dialogue]]
speaker = "リノ"
original = "「晩ご飯の買い物、すっかり忘れちゃってた！\u3000ちょっとスーパーまでダッシュで行ってくるわね！！」"
translation = "「저녁 반찬 사는 걸 깜빡 잊고 있었어! 잠깐 슈퍼까지 대시해서 다녀올게!!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、母さん？"
translation = "잠깐, 엄마?"

[[dialogue]]
speaker = "リノ"
original = "「行ってきまぁぁぁ～～～す！！！」"
translation = "「다녀오겠습니드아아아아아~~~~~~아아악!!!」"

[[dialogue]]
speaker = "unk"
original = "そのまま、私は家から逃げるように飛び出して来てしまった。"
translation = "그대로 나는 집에서 도망치듯 뛰쳐나와 버렸다."

[[dialogue]]
speaker = "リノ"
original = "（ああ……マズい……。本当に、マズいわ……！）"
translation = "(아아…… 큰일이야……. 정말 큰일이라구……!)"

[[dialogue]]
speaker = "リノ"
original = "（クロトは息子なのに――）"
translation = "(쿠로토는 아들인데──)"

[[dialogue]]
speaker = "unk"
original = "自身の胸に手を当てる。"
translation = "자신의 가슴에 손을 얹는다."

[[dialogue]]
speaker = "リノ"
original = "（私、今この瞬間、生まれていちばんドキドキしちゃってる……）"
translation = "(나, 지금 이 순간 태어나서 가장 두근거리고 있어……)"

[[dialogue]]
speaker = "unk"
original = "高鳴る心臓の鼓動に、私はどうしようもなく戸惑ってしまうのだった――"
translation = "높게 뛰는 심장 고동에 나는 어찌할 바를 모른 채 당황하고 마는 것이었다──"

