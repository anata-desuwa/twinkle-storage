[[dialogue]]
speaker = "レイラ"
original = "「あ、こんばんは、魔王さん。基地にご用事ですか？」"
translation = "「아, 안녕하세요, 마왕님. 기지에 용건 있으신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「うん、レイラに会いに来たんだけど……」"
translation = "「응, 레이라를 만나러 왔는데……」"

[[dialogue]]
speaker = "レイラ"
original = "「あひゃっ！？\u3000そ、そうなんですか……それは、恐縮です……」"
translation = "「아히얏!? 그, 그런가요…… 그것참, 황송하네요……」"

[[dialogue]]
speaker = "unk"
original = "俺とレイラは、お互い意識し合っている……と思う。"
translation = "나와 레이라는 서로 의식하고 있다……고 생각한다."

[[dialogue]]
speaker = "unk"
original = "とはいえレイラは贖罪の途中だし、複雑な立場だ。大っぴらに交際することはなかなか難しい。"
translation = "그렇다고는 해도 레이라는 속죄 중이고 복잡한 입장이다. 대놓고 교제하는 것은 꽤나 어려운 일이다."

[[dialogue]]
speaker = "レイラ"
original = "「そ、それじゃお部屋に案内しますね……」"
translation = "「그, 그럼 방으로 안내할게요……」"

[[dialogue]]
speaker = "レイラ"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "脚をもつれさせたレイラを咄嗟に受け止める。"
translation = "발이 꼬인 레이라를 잽싸게 받아낸다."

[[dialogue]]
speaker = "レイラ"
original = "「あ、ありがとうございます、魔王さん……」"
translation = "「가, 감사합니다, 마왕님……」"

[[dialogue]]
speaker = "レイラ"
original = "「……あ」"
translation = "「……아」"

[[dialogue]]
speaker = "unk"
original = "レイラの大きな胸が密着して、その柔らかさに下半身がつい反応してしまった。"
translation = "레이라의 커다란 가슴이 밀착되자, 그 부드러움에 하반신이 그만 반응하고 말았다."

[[dialogue]]
speaker = "unk"
original = "だけど密着しているということは、レイラも俺の体に触れているわけで……"
translation = "하지만 밀착되어 있다는 것은 레이라도 내 몸에 닿아 있다는 뜻이고……"

[[dialogue]]
speaker = "レイラ"
original = "「魔王さんも、<b>そういうこと</b>したいんですか……？」"
translation = "「마왕님도, <b>그런</b> <b>거</b> 하고 싶으신 건가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「……うん。レイラとなら、したい」"
translation = "「……응. 레이라라면 하고 싶어」"

[[dialogue]]
speaker = "レイラ"
original = "「！\u3000じゃ、じゃあ、その……」"
translation = "「! 그, 그럼, 그……」"

[[dialogue]]
speaker = "レイラ"
original = "「ちゅ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇と唇が触れるキス。レイラが至近距離で恥ずかしそうにはにかむ。"
translation = "입술과 입술이 닿는 키스. 레이라가 아주 가까운 거리에서 수줍게 미소 짓는다."

[[dialogue]]
speaker = "レイラ"
original = "「魔王さんを興奮させた責任、取らないといけませんね……」"
translation = "「마왕님을 흥분시킨 책임, 져야겠네요……」"

[[dialogue]]
speaker = "unk"
original = "そして顔を真っ赤にしたレイラに、部屋に案内されて──"
translation = "그리고 얼굴을 붉게 물들인 레이라에게 방으로 안내받아──"

[[dialogue]]
speaker = "レイラ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "大事なところを剥き出しにして、ベッドの上で向かい合う。"
translation = "중요한 곳을 드러낸 채 침대 위에서 마주 본다."

[[dialogue]]
speaker = "unk"
original = "いつも気になっていた大きな胸も露わになって、ペニスが硬くなっていくのを感じる。"
translation = "항상 신경 쓰였던 커다란 가슴도 드러나고, 자지가 단단해지는 것을 느낀다."

[[dialogue]]
speaker = "クロト"
original = "「レイラ、いいのか？」"
translation = "「레이라, 괜찮겠어?」"

[[dialogue]]
speaker = "レイラ"
original = "「は、はい……意識しちゃったら、何もしない方が気まずいですし……私だって、あなたと<b>そういうこと</b>したかったですから……」"
translation = "「네, 네…… 의식해 버렸는데 아무것도 안 하는 게 더 서먹하니까요…… 저도 당신과 <b>그런</b> <b>거</b> 하고 싶었으니까……」"

[[dialogue]]
speaker = "レイラ"
original = "「でも……男の人のってこんなに大きいんですね……」"
translation = "「하지만…… 남자분 건 이렇게 크군요……」"

[[dialogue]]
speaker = "unk"
original = "レイラは顔を赤く染めながらも、ペニスを何度もチラチラと見ている。レイラもレイラで気になっているらしい。"
translation = "레이라는 얼굴을 붉히면서도 자지를 몇 번이고 힐끗힐끗 보고 있다. 레이라도 레이라대로 신경 쓰이는 모양이다."

[[dialogue]]
speaker = "クロト"
original = "「いつもはこんなんじゃないよ。レイラの前だから」"
translation = "「평소엔 이렇지 않아. 레이라 앞이라서 그래」"

[[dialogue]]
speaker = "レイラ"
original = "「っ……そ、そうなんですね……」"
translation = "「읏…… 그, 그렇군요……」"

[[dialogue]]
speaker = "unk"
original = "ペニスをレイラの股間に沿えると、濡れた感触とともに、柔らかな肉の弾力が返ってくる。"
translation = "자지를 레이라의 가랑이에 갖다 대자, 젖은 감촉과 함께 부드러운 살의 탄력이 전해진다."

[[dialogue]]
speaker = "レイラ"
original = "「んんっ……！\u3000あなたの、大きいだけじゃなくて熱い……」"
translation = "「응응……! 당신 거, 크기만 한 게 아니라 뜨거워……」"

[[dialogue]]
speaker = "レイラ"
original = "「こんな大きいの、本当に入るんでしょうか……？\u3000不安ですけど……」"
translation = "「이렇게 큰 게 정말 들어갈까요……? 불안하지만……」"

[[dialogue]]
speaker = "レイラ"
original = "「でも、欲しいです……あなたとひとつに、なりたいです……」"
translation = "「하지만 갖고 싶어요…… 당신과 하나가 되고 싶어요……」"

[[dialogue]]
speaker = "クロト"
original = "「……レイラ」"
translation = "「……레이라」"

[[dialogue]]
speaker = "レイラ"
original = "「はい、来てください……」"
translation = "「네, 들어오세요……」"

[[dialogue]]
speaker = "レイラ"
original = "「んくっ……んん～～～～～っ」"
translation = "「응긋…… 으으으으으음~~~~~!」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスをゆっくりと押し込み、亀頭が膣口を広げて中へと進んでいく。"
translation = "팽창한 자지를 천천히 밀어 넣자, 귀두가 질 입구를 넓히며 안으로 나아간다."

[[dialogue]]
speaker = "unk"
original = "そしてぶちっと柔らかいものを破った感触がして、わずかに赤い血が伝った。"
translation = "그리고 툭 하고 부드러운 것이 파열되는 감촉이 들더니, 살짝 붉은 피가 배어 나왔다."

[[dialogue]]
speaker = "クロト"
original = "「レイラ、大丈夫？」"
translation = "「레이라, 괜찮아?」"

[[dialogue]]
speaker = "レイラ"
original = "「っ……ぅ……大丈夫、です……」"
translation = "「읏…… 으…… 괜찮아, 요……」"

[[dialogue]]
speaker = "レイラ"
original = "「思ったより痛くない……なんてことないですし、むしろ思ったより痛いですけど……」"
translation = "「생각보다 안 아파……는커녕 오히려 생각보다 아프지만……」"

[[dialogue]]
speaker = "レイラ"
original = "「思ったよりも、嬉しいです……ん、はぁ……温かくて、密着感すごくて……抱き締め合うよりもっと満たされるというか……」"
translation = "「생각보다 기뻐요…… 응, 하아…… 따뜻하고 밀착감이 엄청나서…… 서로 껴안는 것보다 더 채워지는 기분이라고 할까……」"

[[dialogue]]
speaker = "レイラ"
original = "「これが、ひとつになるってことなんですね……」"
translation = "「이게 하나가 된다는 거군요……」"

[[dialogue]]
speaker = "unk"
original = "繋がった下半身は熱く濡れた粘膜に隙間なく包まれ、俺もレイラの柔らかさと温もりを感じる。"
translation = "연결된 하반신은 뜨겁고 젖은 점막에 빈틈없이 감싸여, 나 또한 레이라의 부드러움과 온기를 느낀다."

[[dialogue]]
speaker = "レイラ"
original = "「んっ……！\u3000あなたのお、おち○ちん、ビクッてしました……気持ちいいんですか？」"
translation = "「응……! 당신의 자, 자지가 움찔거렸어요…… 기분 좋으신가요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、レイラはまだ痛いだろうけど、すごく気持ちいいよ」"
translation = "「아아, 레이라는 아직 아프겠지만 정말 기분 좋아」"

[[dialogue]]
speaker = "レイラ"
original = "「そ、そうですか……じゃあ、動いていいですよ……」"
translation = "「그, 그런가요…… 그럼 움직이셔도 돼요……」"

[[dialogue]]
speaker = "クロト"
original = "「本当に大丈夫？」"
translation = "「정말 괜찮겠어?」"

[[dialogue]]
speaker = "レイラ"
original = "「はい、多分大丈夫です……それにきっと、動いてもらった方が、私も気持ち良くなれると思うので……」"
translation = "「네, 아마 괜찮을 거예요…… 그리고 분명 움직여주시는 편이 저도 기분 좋아질 수 있을 것 같아서……」"

[[dialogue]]
speaker = "unk"
original = "そこまで言われてじっとしていられるはずもなく、下半身をゆっくり前後させ始める。"
translation = "그렇게까지 말하는데 가만히 있을 수 있을 리 없었고, 하반신을 천천히 앞뒤로 움직이기 시작한다."

[[dialogue]]
speaker = "レイラ"
original = "「んんっ……！\u3000ふはぁ……はぁ……ぁ……んん……」"
translation = "「응응……! 후하아…… 하아…… 아…… 응응……」"

[[dialogue]]
speaker = "unk"
original = "馴染ませるように、腰を小さく動かす。"
translation = "길들이듯이 허리를 작게 움직인다."

[[dialogue]]
speaker = "unk"
original = "するとペニスと粘膜が摩擦して、それだけで強烈な快感が走った。"
translation = "그러자 자지와 점막이 마찰하며 그것만으로도 강렬한 쾌감이 달렸다."

[[dialogue]]
speaker = "レイラ"
original = "「はぁ、はっ……私の中で……ぁっ……あなたのが、擦れてる……ふぅ……はぁ……はあぁ……」"
translation = "「하아, 핫…… 제 안에서…… 앗…… 당신 게 스치고 있어…… 후우…… 하아…… 하아아……」"

[[dialogue]]
speaker = "レイラ"
original = "「あっ……はぁ……んんっ……これが、エッチなんだ……ふぁああっ……はぁ……」"
translation = "「앗…… 하아…… 응응…… 이게 섹스구나…… 화아아앗…… 하아……」"

[[dialogue]]
speaker = "クロト"
original = "「苦しくない？」"
translation = "「괴롭지는 않아?」"

[[dialogue]]
speaker = "レイラ"
original = "「ちょ、ちょっと……苦しいかもです……。はぁ、あっ……おち○ちん大きくて、お腹の中から、広げられて……変な感じ……」"
translation = "「조, 조금…… 괴로울지도 몰라요. 하아, 앗…… 자지가 커서 뱃속부터 벌려지는 게…… 이상한 느낌……」"

[[dialogue]]
speaker = "レイラ"
original = "「でもあなたが私の中に、いるのが感じられて……はぁ、はっ……嫌いじゃ、ないです……」"
translation = "「하지만 당신이 제 안에 있다는 게 느껴져서…… 하아, 핫…… 싫지는 않아요……」"

[[dialogue]]
speaker = "レイラ"
original = "「あっ、んんっ……熱いおち○ちんが、中で動いて……んっ……あなたと繋がってるの、よくわかります……ふぁっ、はぁ……」"
translation = "「앗, 응응…… 뜨거운 자지가 안에서 움직여서…… 응…… 당신과 연결되어 있다는 거 잘 알겠어요…… 화앗, 하아……」"

[[dialogue]]
speaker = "unk"
original = "レイラが俺と繋がることを喜んでくれて嬉しい。"
translation = "레이라가 나와 연결되는 것을 기뻐해 주니 기쁘다."

[[dialogue]]
speaker = "unk"
original = "次第に蜜の量が増し、レイラも少しずつ自分から腰を動かしていく。"
translation = "점차 애액의 양이 늘어나고, 레이라도 조금씩 스스로 허리를 움직여 간다."

[[dialogue]]
speaker = "レイラ"
original = "「ふっ……んっ……はっ……あぁんっ<emoji=heart04>\u3000はぁはっ……あっ、んっ、あっ……はっ……はあぁっ<emoji=heart04>」"
translation = "「훗…… 응…… 핫…… 아앙앗<emoji=heart04> 하아핫…… 앗, 응, 앗…… 핫…… 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「はぁ……おち○ちん、ほんとに大きくて……んんっ……中、ぐりぐりってされてる……んっ、あっ……んんんっ<emoji=heart04>」"
translation = "「하아…… 자지, 정말로 커서…… 응응…… 안이 꾸물꾸물 눌리고 있어…… 응, 앗…… 응으음앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「レイラの声、エッチになってきたよ」"
translation = "「레이라 목소리, 야해졌어」"

[[dialogue]]
speaker = "レイラ"
original = "「ひぁっ！？\u3000そ、そんなこと言わないで……あっ、はぁっ、ぁん……<emoji=heart04>\u3000魔王さん、いじわるです……ふっ、はぁっ……<emoji=heart04>」"
translation = "「히앗!? 그, 그런 말 하지 마세요…… 앗, 하앗, 아앙……<emoji=heart04> 마왕님, 짓궂으세요…… 훗, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが動く度、レイラが声と体を震わせるのが可愛らしくて、その甘い響きに情欲を刺激される。"
translation = "자지가 움직일 때마다 레이라가 목소리와 몸을 떨게 하는 것이 사랑스러워서, 그 달콤한 울림에 정욕이 자극된다."

[[dialogue]]
speaker = "レイラ"
original = "「んんっ……！？\u3000おち○ちんビクッてして、大きくなった……？\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000中で、擦れてぇ……<emoji=heart04>」"
translation = "「응응……!? 자지가 움찔거리면서 커졌어……? 앗<emoji=heart04> 응<emoji=heart04> 안에서 문질러져서어……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「はぁ、はっ……んっ……ひやああっ<emoji=heart04>\u3000おち○ちん擦れるの、気持ちいい……お腹、熱くなるぅ……んっ、んぅ……<emoji=heart04>」"
translation = "「하아, 핫…… 응…… 히야아앗<emoji=heart04> 자지 비벼지는 거 기분 좋아…… 배가 뜨거워져어…… 응, 응우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身がぶつかる勢いで、大きなおっぱいがたぷたぷと重そうに揺れている。"
translation = "하반신이 부딪히는 기세로 커다란 가슴이 출렁출렁 무겁게 흔들리고 있다."

[[dialogue]]
speaker = "レイラ"
original = "「はぁ、はっ……<emoji=heart04>\u3000魔王さんが、すごいエッチな目で、私のおっぱい見てる……<emoji=heart04>」"
translation = "「하아, 핫……<emoji=heart04> 마왕님이 엄청 야한 눈으로 제 가슴 보고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「見られてるだけなのに、おっぱいジンジンしちゃう……<emoji=heart04>\u3000はぁ、はぁっ、んん……こんなの、初めて……はあぁっ……<emoji=heart04>」"
translation = "「보기만 하는데도 가슴이 징징거려요……<emoji=heart04> 하아, 하아앗, 응응…… 이런 거 처음이야…… 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラの乳首はぷっくりといやらしく膨らんでいて、興奮を物語っているようだ。"
translation = "레이라의 유두는 볼록하게 음란하게 부풀어 있어 흥분을 대변하는 듯하다."

[[dialogue]]
speaker = "クロト"
original = "「レイラの乳首、けっこう大きいんだな」"
translation = "「레이라 유두, 꽤 크구나」"

[[dialogue]]
speaker = "レイラ"
original = "「や、気にしてるのにぃ……ふっ……はぁ、はぁっ……<emoji=heart04>」"
translation = "「야, 신경 쓰고 있는데에…… 훗…… 하아, 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラの胸に手を伸ばし、指先で乳首に軽く触れる。"
translation = "레이라의 가슴에 손을 뻗어 손가락 끝으로 유두를 가볍게 만진다."

[[dialogue]]
speaker = "レイラ"
original = "「ひやぁああっ！？\u3000あっ、乳首くりくりしちゃダメっ<emoji=heart04>\u3000ふぁっ……んっ、んんっ<emoji=heart04>」"
translation = "「히야아아앗!? 앗, 유두 굴리면 안 돼욧<emoji=heart04> 화앗…… 응, 응응앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳房を揉むとどこまでも指が食い込むようで、極上の柔らかさを味わう。"
translation = "유방을 주무르자 끝없이 손가락이 파묻히는 듯하여 극상의 부드러움을 맛본다."

[[dialogue]]
speaker = "レイラ"
original = "「んん～～っ<emoji=heart04>\u3000おっぱい、おもちゃにされてるみたい……ふぁああっ<emoji=heart04>\u3000んんぅっ……ふあぁっ……あっ、ああぁっ<emoji=heart04>」"
translation = "「응으으음앗<emoji=heart04> 가슴이 장난감이 된 것 같아…… 화아아앗<emoji=heart04> 응응웃…… 후아앗…… 앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「あっ、はぁ……はぁんっ<emoji=heart04>\u3000おま○こと、おっぱい、一緒にぃ……ひやぁっ<emoji=heart04>\u3000体、溶けちゃいそう……ふぁあっ<emoji=heart04>\u3000ああんっ<emoji=heart04>」"
translation = "「앗, 하아…… 하앙앗<emoji=heart04> 보지랑 가슴이랑 같이이…… 히야앗<emoji=heart04> 몸이 녹아버릴 것 같아…… 화앗<emoji=heart04> 아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "胸への愛撫に反応するように、膣壁がきゅうっと締め付けてくる。"
translation = "가슴을 향한 애무에 반응하듯 질벽이 꽉 조여 온다."

[[dialogue]]
speaker = "unk"
original = "より快感を求めるように、俺もレイラも動きを加速させていって──"
translation = "더욱 쾌감을 갈구하듯 나와 레이라 모두 움직임을 가속하며──"

[[dialogue]]
speaker = "レイラ"
original = "「ひああぁっ<emoji=heart04>\u3000あっ──あっ──あっ──んん～～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぁあああっ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04> 앗── 앗── 앗── 응으으음앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 화아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「初めては、ロマンチックなエッチにしようって、思ってたのにっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000腰、動いちゃうっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>」"
translation = "「첫 경험은 로맨틱한 섹스를 하려고 생각했는데엣<emoji=heart04> 앗<emoji=heart04> 허리가 멋대로 움직여버려엇<emoji=heart04> 히앗<emoji=heart04> 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「はしたないのに、やめられないのっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「천박한데 멈출 수가 없어엇<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 핫<emoji=heart04> 아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「んはぁ、はっ、はああぁっ<emoji=heart04>\u3000おま○こズンズンされるの、気持ちいいっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひやぁああっ<emoji=heart04>」"
translation = "「은하아, 핫, 하아아아앗<emoji=heart04> 보지 쿵쿵 찔리는 거 기분 좋아앗<emoji=heart04> 화앗<emoji=heart04> 앗<emoji=heart04> 히야아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽を貪るのに夢中になり、腰をぶつけ合う。"
translation = "쾌락을 탐닉하는 데 몰두하여 허리를 맞부딪힌다."

[[dialogue]]
speaker = "unk"
original = "とろとろになったレイラの表情が目の前にあるのがたまらない。"
translation = "황홀해진 레이라의 표정이 눈앞에 있는 것이 견딜 수 없다."

[[dialogue]]
speaker = "レイラ"
original = "「んんんっ<emoji=heart04>\u3000魔王さんのおち○ちん、深いところまで、来てる<emoji=heart04>\u3000はぁっ、あっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>」"
translation = "「응으으음앗<emoji=heart04> 마왕님의 자지가 깊은 곳까지 들어오고 있어<emoji=heart04> 하앗, 앗<emoji=heart04> 히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「ふああぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おち○ちん、奥まで、来て……んぁあっ<emoji=heart04>\u3000私のおま○こ、魔王さんのおち○ちんの、形になってるぅ……<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 응응앗<emoji=heart04> 자지가 끝까지 들어와서…… 응아앗<emoji=heart04> 제 보지가 마왕님의 자지 모양이 되어가고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「ひっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んぁああっ<emoji=heart04>\u3000おま○こ、いやらしい音して、る……ひぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>」"
translation = "「힛<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응아아아앗<emoji=heart04> 보지에서 상스러운 소리가 나아…… 히앗<emoji=heart04> 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私の中、おち○ちんで、ぐちゅぐちゅに、かき混ぜられてるっ……<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000んはっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「화앗<emoji=heart04> 앗<emoji=heart04> 제 안이 자지로 뭉글뭉글하게 휘저어지고 있어엇……<emoji=heart04> 아아아앗<emoji=heart04> 은핫<emoji=heart04> 응응웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内は熱く蕩け、ペニスはより硬さを増し、繋がり合った性器でお互いを感じる。"
translation = "질 안은 뜨겁게 녹아내리고, 자지는 더욱 단단해지며 연결된 성기로 서로를 느낀다."

[[dialogue]]
speaker = "unk"
original = "大きな胸がさらに激しく揺れて、誘われるように乳首に口付けする。"
translation = "커다란 가슴이 더욱 격렬하게 흔들리고, 유혹되듯 유두에 입을 맞춘다."

[[dialogue]]
speaker = "レイラ"
original = "「ふやぁあああっ<emoji=heart04>\u3000おっぱい、ちゅぱちゅぱって、吸っちゃダメぇ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「후야아아아아앗<emoji=heart04> 가슴 쪽쪽 빨면 안 돼에엣<emoji=heart04> 힛<emoji=heart04> 응<emoji=heart04> 응응앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「おっぱい大きいからって、ミルク、まだ出ませんからぁ……<emoji=heart04>\u3000ひぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000吸い方、エッチです……んっ……ふやぁああっ<emoji=heart04>」"
translation = "「가슴 크다고 우유는 아직 안 나온다니까요오……<emoji=heart04> 히웃<emoji=heart04> 응<emoji=heart04> 빠는 방법 너무 야해요…… 응…… 후야아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身の奥から熱がこみ上げてきて、射精欲が限界寸前まで高まっていく。"
translation = "하반신 깊은 곳에서 열기가 치밀어 올라 사정 욕구가 한계 직전까지 높아진다."

[[dialogue]]
speaker = "クロト"
original = "「レイラ……もう……！」"
translation = "「레이라…… 이제……!」"

[[dialogue]]
speaker = "レイラ"
original = "「んんんっ<emoji=heart04>\u3000おち○ちん、ドクンドクンして、爆発しそうっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000で、でもダメですよ……<emoji=heart04>」"
translation = "「응으으음앗<emoji=heart04> 자지가 두근두근거려서 폭발할 것 같아앗……<emoji=heart04> 앗<emoji=heart04> 응응앗<emoji=heart04> 하지만 안 돼요……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「中に出しちゃ、ダメです……<emoji=heart04>\u3000はっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000赤ちゃん、できちゃいますからっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「안에 싸면 안 돼요……<emoji=heart04> 핫<emoji=heart04> 응<emoji=heart04> 아기 생겨버리니까아……<emoji=heart04> 앗<emoji=heart04> 화앗<emoji=heart04> 하아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラは口ではそう言いながらも、ペニスを抜こうとする素振りはなく、深く咥え込んだまま腰を振り続ける。"
translation = "레이라는 입으로는 그렇게 말하면서도 자지를 빼려는 기색 없이 깊이 머금은 채 허리를 계속 흔든다."

[[dialogue]]
speaker = "クロト"
original = "「でもレイラだって……！」"
translation = "「하지만 레이라도……!」"

[[dialogue]]
speaker = "レイラ"
original = "「だって、しょうがないじゃないですかっ……<emoji=heart04>\u3000はぁっ、あっ<emoji=heart04>\u3000エッチするの、気持ちいいんですからっ……<emoji=heart04>」"
translation = "「그야 어쩔 수 없잖아요옷……<emoji=heart04> 하앗, 앗<emoji=heart04> 섹스하는 거 기분 좋으니까앗……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「ふぁっ──あっ──あぁんっ<emoji=heart04>\u3000止まれ、ない……中に出してもらったら、絶対気持ちいいって、本能でわかるからぁっ<emoji=heart04>」"
translation = "「화앗── 앗── 아앙앗<emoji=heart04> 멈출 수 없어…… 안에 싸주면 절대 기분 좋을 거라는 거 본능으로 아니까아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「あなたの精子、欲しいですっ<emoji=heart04>\u3000お腹の、奥に<emoji=heart04>\u3000子宮に、出してほしいって、思っちゃうんですっ<emoji=heart04>」"
translation = "「당신의 정액 갖고 싶어요옷<emoji=heart04> 배 깊숙이, 자궁에 싸달라고 생각하게 돼요옷<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「はっ──あ──あ──んん～～っ<emoji=heart04>\u3000あなたの赤ちゃん欲しいって、おま○こキュンキュンしてるっ<emoji=heart04>」"
translation = "「핫── 아── 아── 응으으음~~~~~!앗<emoji=heart04> 당신 아기 갖고 싶다고 보지가 큥큥거려엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮が降りてきたのか、亀頭と子宮口が何度もぶつかり、その度に快感が走る。"
translation = "자궁이 내려온 것인지 귀두와 자궁구가 몇 번이고 부딪히고 그때마다 쾌감이 달린다."

[[dialogue]]
speaker = "レイラ"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000そんな、おねだりするみたいに奥、突かれたらぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000子宮で、受け止めて、あげたくなっちゃうっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 앗<emoji=heart04> 안 돼앗<emoji=heart04> 그렇게 조르는 것처럼 깊이 찌르면아앗<emoji=heart04> 하앗<emoji=heart04> 응응앗<emoji=heart04> 자궁으로 받아내고 싶어져버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう止まれない。レイラを俺で染めたい。レイラの全部を俺のものにしたい……！"
translation = "이제 멈출 수 없다. 레이라를 나로 물들이고 싶다. 레이라의 전부를 내 것으로 만들고 싶어……!"

[[dialogue]]
speaker = "レイラ"
original = "「ひぁああ～～っ<emoji=heart04>\u3000あっ──んっ──んんんっ<emoji=heart04>\u3000はげ、しいっ<emoji=heart04>\u3000おち○ちん、奥に、ズンズンされてぇ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁあっ<emoji=heart04>」"
translation = "「히아아아아~~~~~앗<emoji=heart04> 앗── 응── 응응으음앗<emoji=heart04> 격해애앳<emoji=heart04> 자지 깊숙이 쿵쿵 들어와서어<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「あぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おま○こ切ないっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000子宮が、精子、欲しいって言ってるのっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 하앗<emoji=heart04> 응응앗<emoji=heart04> 보지가 애달파앗<emoji=heart04> 응아앗<emoji=heart04> 응웃<emoji=heart04> 자궁이 정액 달라고 하고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「出してっ<emoji=heart04>\u3000出してぇ<emoji=heart04>\u3000私も、イクっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000おま○こイキますっ<emoji=heart04>\u3000あ──あ──あ──んぅ～～っ<emoji=heart04>」"
translation = "「싸줘엇<emoji=heart04> 싸줘어어<emoji=heart04> 나도 가아앗<emoji=heart04> 화아아아앗<emoji=heart04> 보지 가버려요오옷<emoji=heart04> 아── 아── 아── 응우우움앗<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「イクイクイクっ<emoji=heart04>\u3000イッちゃうっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あなたの、精子っ、出してっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひやぁっ<emoji=heart04>\u3000私の、子宮に、注いでぇええっ<emoji=heart04>」"
translation = "「간다간다간닷<emoji=heart04> 가버려엇<emoji=heart04> 응아앗<emoji=heart04> 앗<emoji=heart04> 당신의 정액 싸줘어엇<emoji=heart04> 힛<emoji=heart04> 히야앗<emoji=heart04> 내 자궁에 쏟아줘어어어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「ふぁっ──あっ──んんぁあ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화앗── 앗── 응응아아아아아~~~~~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラの奥で、熱い粘膜に包まれながら射精する。"
translation = "레이라의 안에서 뜨거운 점막에 감싸인 채 사정한다."

[[dialogue]]
speaker = "unk"
original = "たっぷりの愛液の中で、ぎゅっと絞られながら精を注ぐ、強烈な快感に頭が真っ白になる。"
translation = "듬뿍 고인 애액 속에서 꽉 짜이며 정을 쏟아붓는 강렬한 쾌감에 머릿속이 하얘진다."

[[dialogue]]
speaker = "レイラ"
original = "「ふぁあぁああっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000出てるっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000熱いのっ<emoji=heart04>\u3000来てるっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ああぁ～～っ……<emoji=heart04>」"
translation = "「화아아아아아앗<emoji=heart04> 하앗<emoji=heart04> 나오고 있어엇<emoji=heart04> 응응앗<emoji=heart04> 뜨거운 게 오고 있어엇<emoji=heart04> 하아아앗<emoji=heart04> 아아아아~~~~~앗……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「あぁっ<emoji=heart04>\u3000熱いの、ドプドプって、入ってきてっ<emoji=heart04>\u3000気持ち、いいっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000たくさん、入って、くるぅ……んん～～っ……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 뜨거운 게 왈칵왈칵 들어와서 기분 좋아앗<emoji=heart04> 하아앗<emoji=heart04> 잔뜩 들어와아…… 응으으음~~~~~!앗……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「はぁ……はぁ……ふぅ……はあぁ……<emoji=heart04>」"
translation = "「하아…… 하아…… 후우…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
original = "「あ……ほんとに、中に出しちゃいましたね……あなたが出してくれたの、溢れちゃってます……」"
translation = "「아…… 정말로 안에 싸버리셨네요…… 당신이 싸주신 거 넘쳐흐르고 있어요……」"

[[dialogue]]
speaker = "レイラ"
original = "「今日は大丈夫な日だから、問題ないと思いますけど……本当はダメなんですからね？」"
translation = "「오늘은 괜찮은 날이라 문제없을 거라 생각하지만…… 원래는 안 되는 거라니까요?」"

[[dialogue]]
speaker = "クロト"
original = "「レイラだってやめる気なかったくせに」"
translation = "「레이라도 그만둘 생각 없었으면서」"

[[dialogue]]
speaker = "レイラ"
original = "「それは……その、あなたのおち○ちんが気持ち良すぎるのがいけないんです」"
translation = "「그건…… 그, 당신의 자지가 너무 기분 좋은 게 잘못이에요」"

[[dialogue]]
speaker = "クロト"
original = "「俺のせいにした……」"
translation = "「내 탓으로 돌렸어……」"

[[dialogue]]
speaker = "unk"
original = "男としてはとても嬉しいセリフなんだけども。"
translation = "남자로서 대단히 기쁜 대사긴 하지만 말이다."

[[dialogue]]
speaker = "レイラ"
original = "「でもいいんですか？\u3000私は咎人ですよ」"
translation = "「하지만 괜찮으시겠어요? 전 죄인인데요」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫だよ、俺は魔王だから」"
translation = "「괜찮아, 난 마왕이니까」"

[[dialogue]]
speaker = "レイラ"
original = "「……そうですね。悪名高い魔王がいてくれるなら、百目騎家の再興も間違いないです」"
translation = "「……그렇네요. 악명 높은 마왕님이 계셔주신다면 도메키 가문의 재건도 확실하겠어요」"

[[dialogue]]
speaker = "レイラ"
original = "「最初は敵でしたけど、あなたのこと、頼りにしています。だからこれからも末永く……よろしくお願いしますね」"
translation = "「처음에는 적이었지만 당신을 의지하고 있어요. 그러니까 앞으로도 오래도록…… 잘 부탁드려요」"

[[dialogue]]
speaker = "unk"
original = "レイラは一度は道を踏み外した。"
translation = "레이라는 한때 길을 잘못 들었다."

[[dialogue]]
speaker = "unk"
original = "だけど俺がいる限り、誰かを、そして自分を傷つける道は進ませないと、心の中で誓ったのだった。"
translation = "하지만 내가 있는 한 누구를, 그리고 자신을 상처 입히는 길로는 가게 하지 않겠다고 마음속으로 맹세했다."

