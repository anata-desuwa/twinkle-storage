[[dialogue]]
speaker = "unk"
original = "リーリアと恋人関係になってから、しばらくが経ったある日の放課後。"
translation = "리리아와 연인 관계가 되고 나서 한참이 지난 어느 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "彼女が１人、空き教室に入って行くのを見かけたので、気になって追いかけてみると──"
translation = "그녀가 혼자 빈 교실로 들어가는 것을 보았기에 궁금해서 뒤쫓아가 보니──"

[[dialogue]]
speaker = "リーリア"
original = "「……よし、これで私の準備はオッケーで……後はセンパイから力を……」"
translation = "「……좋아, 이걸로 내 준비는 됐고…… 나머지는 선배한테 힘을……」"

[[dialogue]]
speaker = "クロト"
original = "「俺が何だって？」"
translation = "「내가 뭐 어쨌다고?」"

[[dialogue]]
speaker = "リーリア"
original = "「うわっ、センパイ！？\u3000いつからそこに！？」"
translation = "「우와앗, 선배!? 언제부터 거기에!?」"

[[dialogue]]
speaker = "リーリア"
original = "「も、もしかして……私の独り言、聞こえちゃってたりしました？」"
translation = "「호, 혹시…… 내 혼잣말 들렸나요?」"

[[dialogue]]
speaker = "リーリア"
original = "「いやいや、何も手に持ってたりなんかしませんよ！？\u3000ちょっと１人になりたい気分だっただけで。ほら、そういうのって誰にでもあったりするじゃないですか！」"
translation = "「아니아니, 아무것도 손에 들고 있거나 하지 않거든요!? 그냥 좀 혼자 있고 싶은 기분이었을 뿐이라서. 봐요, 그런 건 누구에게나 있잖아요!」"

[[dialogue]]
speaker = "unk"
original = "何か隠そうとしているのは明白だったので、俺はリーリアを<b>尋問</b>することにした。"
translation = "뭔가 숨기려 하는 것이 명백했기에 나는 리리아를 <b>심문</b>하기로 했다."

[[dialogue]]
speaker = "リーリア"
original = "「きゃっ！？\u3000せ、センパイ、何するんですかっ」"
translation = "「꺄악!? 서, 선배, 뭐 하시는 거예요」"

[[dialogue]]
speaker = "リーリア"
original = "「学園でこんなこと……やっ、脱がしちゃ……あんっ<emoji=heart04>」"
translation = "「학원에서 이런 짓을…… 얏, 벗기지 마…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「うぅ……センパイのエッチぃ……。確かにこの時間、ここは滅多に人、来ませんけど……」"
translation = "「으으…… 선배 변태…… 확실히 이 시간에 여기는 좀처럼 사람 안 오지만……」"

[[dialogue]]
speaker = "クロト"
original = "「隠していることを正直に言えば、止めるけど？」"
translation = "「숨기고 있는 걸 솔직하게 말하면 멈추겠지만?」"

[[dialogue]]
speaker = "リーリア"
original = "「そ、それはぁ……」"
translation = "「그, 그건……」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ！\u3000センパイ、おっぱい触っちゃ……んっ、ふぅっ……ふあぁんっ<emoji=heart04>\u3000揉み方やらしいです……はぁっ、んんっ……んあぁっ……<emoji=heart04>」"
translation = "「앗, 아앙! 선배, 가슴 만지면…… 응, 후우…… 후아앙<emoji=heart04> 주무르는 법 야해요…… 하앗, 응응…… 응아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「やぁんっ……首筋にキスは、皆に跡見られちゃいますよぉ……<emoji=heart04>\u3000はぁぁ、んあぁんっ……ちゅっ、ちゅってそんなにしちゃ、ダメぇ<emoji=heart04>\u3000ふぅぅ、あぁんっ<emoji=heart04>」"
translation = "「야앙…… 목덜미에 키스는 다들 자국 본단 말이에요……<emoji=heart04> 하아아, 응아앙…… 츄, 츄라고 그렇게 하면 안 돼애<emoji=heart04> 후우우, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイとエッチなことしたって、知られちゃうぅ……あっ、はぁっ……ふぅんっ、ダメなのにぃ……んっ、ふぅっ……ふあぁんっ……<emoji=heart04>」"
translation = "「선배랑 야한 짓 했다고 들켜버려어…… 앗, 하앗…… 후웅, 안 되는데에…… 응, 후우…… 후아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ！？\u3000だ、ダメ、センパイッ……いま下はぁ……！」"
translation = "「앗!? 아, 안 돼, 선배…… 지금 아래는……!」"

[[dialogue]]
speaker = "リーリア"
original = "「やぁぁ……<emoji=heart04>\u3000おま○こもう濡れてるの、バレちゃうぅ<emoji=heart04>\u3000あぁんっ、指入っちゃっ……んあぁっ、くぅんっ……んうぅっ、ふあぁんっ……<emoji=heart04>」"
translation = "「야아아……<emoji=heart04> 보지 벌써 젖어있는 거 들켜버려어<emoji=heart04> 아앙, 손가락 들어갔…… 응아앗, 쿠웅…… 응우읏, 후아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はぁんっ、ゆっくり、かき回しちゃダメぇっ<emoji=heart04>\u3000ふあぁっ、んあぁんっ<emoji=heart04>\u3000はぁんっ、やぁ……センパイの指と、おま○この間……愛液が糸引いちゃって、るぅ……ふぅぅ<emoji=heart04>」"
translation = "「하앙, 천천히 휘저으면 안 돼애앗<emoji=heart04> 후아앗, 응아앙<emoji=heart04> 하앙, 야아…… 선배 손가락이랑 보지 사이…… 애액이 실을 끌고 있어어…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ふあぁっ、センパイのおち○ちん当たって……んあぁっ、大きいっ<emoji=heart04>\u3000あっ、はぁんっ……先っぽ擦られて、感じちゃうっ……あんっ、ふあぁんっ<emoji=heart04>」"
translation = "「후아앗, 선배 자지 닿아서…… 응아앗, 커어어<emoji=heart04> 앗, 하앙…… 끝부분 비벼져서 느껴버려어…… 앙, 후아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「教室で何してたのか言わないと、このまま入れちゃうからな……」"
translation = "「교실에서 뭐 하고 있었는지 말 안 하면 이대로 넣어버릴 거니까……」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……それは秘密で……あっ、あっ<emoji=heart04>\u3000おち○ちんの先っぽ、おま○こに、くちゅぅってしてぇ……はぁっ<emoji=heart04>\u3000ふぅっ……んあぁっ、入れられちゃうぅ。はぁぁ……あぁんっ<emoji=heart04>」"
translation = "「응…… 그건 비밀이라…… 앗, 앗<emoji=heart04> 자지 끝부분, 보지에 꾸욱꾸욱 해줘어…… 하앗<emoji=heart04> 후우…… 응아앗, 넣어버려어. 하아아…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ふあぁぁっ、来ちゃうっ……センパイのおち○ちん、入り口押し広げてぇ……はぁっ、ふぅぅっ……<emoji=heart04>」"
translation = "「후아아앗, 와버려앗…… 선배 자지, 입구를 밀어 넓혀서어…… 하앗, 후우우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ──ふあああぁぁぁあああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「응──후아아아아아아아아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "リーリア"
original = "「はぁぁっ、んあっ、はぁぁっ<emoji=heart04><emoji=heart04>\u3000んんっ……学園でおち○ちん、入れられてるぅ……あっ、ふあぁっ……ダメなのにぃ……んくぅっ、はぁんっ……感じちゃうぅっ……あぁんっ<emoji=heart04>」"
translation = "「하아앗, 응앗, 하아아앗<emoji=heart04><emoji=heart04> 응응…… 학원에서 자지, 들어오고 있어어…… 앗, 후아앗…… 안 되는데에…… 응쿠윽, 하앙…… 느껴버려어엇…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「だ、ダメですぅっ……はぁっ、んうぅっ……そんなに言われても、秘密、ですからぁ<emoji=heart04>\u3000あっ、あんっ……そこ、そこ擦っちゃダメぇ……ふぅっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「아, 안 돼요오옷…… 하앗, 응우읏…… 그렇게 말씀하셔도, 비밀, 이니까요오<emoji=heart04> 앗, 아앙…… 거기, 거기 비비면 안 돼애…… 후우, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んはぁっ……お、おち○ちんなんかに、屈しませんからっ<emoji=heart04>\u3000……はぁっ、んあぁんっ<emoji=heart04>\u3000んはぁっ、はあっ、んんぅっ<emoji=heart04>」"
translation = "「응하앗…… 자, 자지 따위한테, 굴복하지 않을 거니까요옷<emoji=heart04> ……하앗, 응아앙<emoji=heart04> 응하앗, 하앗, 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んひあぁっ！？\u3000せ、センパイ、乳首は……ダメぇっ<emoji=heart04><emoji=heart04>\u3000弱いのっ、弱いからぁ<emoji=heart04>\u3000んひぃっ、ひあぁんっ<emoji=heart04>\u3000クリクリしちゃ、ダメぇっ……はぁんっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「응히아앗!? 서, 선배, 유두는…… 안 돼애앗<emoji=heart04><emoji=heart04> 약해앳, 약하니까아아<emoji=heart04> 응히잇, 히아앙<emoji=heart04> 만지작거리면, 안 돼애앗…… 하앙, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んあぁんっ、乳首吸っちゃダメぇっ！\u3000そこいじめられると、んんっ、気持ちよくなっちゃうからぁ……はあぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응아앙, 유두 빨면 안 돼애앗! 거기 괴롭히면, 응응, 기분 좋아져 버리니까아…… 하아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「き、気持ちいいっ……はぁんっ、ふあぁんっ<emoji=heart04>\u3000乳首気持ちいいよぉっ<emoji=heart04>\u3000ひぃんっ、ひあぁんっ……あっ、あぁんっ、センパイ……はあぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「기, 기분 좋아앗…… 하앙, 후아앙<emoji=heart04> 유두 기분 좋아아욧<emoji=heart04> 히잉, 히아앙…… 앗, 아앙, 선배…… 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ふああぁぁっ、耳、甘噛みしちゃダメっ<emoji=heart04>\u3000やぁっ、んあぁんっ……！\u3000ゾクゾクって<emoji=heart04>\u3000おま○こキュッて、なっちゃうからぁ<emoji=heart04>\u3000あっ、はぁんっ……ふあぁぁ<emoji=heart04>」"
translation = "「후아아아앗, 귀, 살짝 깨물면 안 돼앗<emoji=heart04> 야앗, 응아앙……! 소름이 돋아서어<emoji=heart04> 보지가 뀨욱 하고, 되어버리니까아<emoji=heart04> 앗, 하앙…… 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁぁっ、だめ、だめぇっ<emoji=heart04>\u3000んんっ、ふぅ、はあっ、ひあぁんっ<emoji=heart04>\u3000体震えちゃうっ、んふっ……おま○こ熱く、なっちゃうのぉ……はぁぁ……ひあぁんっ<emoji=heart04>」"
translation = "「아아앗, 안 돼, 안 돼애앗<emoji=heart04> 응응, 후우, 하앗, 히아앙<emoji=heart04> 몸이 떨려버려엇, 응훗…… 보지가 뜨거워져, 버리는걸요오…… 하아아…… 히아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んぅぅっ、乳首コリコリ、ダメぇ……<emoji=heart04>\u3000あっ、あっ、んんぅぅ<emoji=heart04>\u3000耳舐めと乳首いじめ、同時じゃ頭とろけちゃう……ふあぁぁっ、はあぁぁんっ<emoji=heart04>」"
translation = "「응으읏, 유두 굴리는 거, 안 돼애……<emoji=heart04> 앗, 앗, 응응으으<emoji=heart04> 귀 핥는 거랑 유두 괴롭히기, 동시에 하면 머리가 녹아버려어…… 후아아앗, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ほらっ……もっと奥まで入っちゃうぞ……？」"
translation = "「봐…… 더 깊은 곳까지 들어간다고……?」"

[[dialogue]]
speaker = "リーリア"
original = "「んんっ、はあっ、ふぁぁぁぁっ<emoji=heart04><emoji=heart04>\u3000センパイのおち○ちん、奥まで届いてっ<emoji=heart04>\u3000んんぅっ！\u3000あ、はぁんっ、んあぁぁんっ<emoji=heart04>\u3000声、出ちゃうっ……んううっ<emoji=heart04><emoji=heart04>」"
translation = "「응응, 하앗, 후아아아아앗<emoji=heart04><emoji=heart04> 선배 자지, 안쪽까지 닿아서어<emoji=heart04> 응응읏! 아, 하앙, 응아아앙<emoji=heart04> 목소리, 나와버려어…… 응우우읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ、センパイ待ってぇ<emoji=heart04>\u3000奥突かれちゃうと、降参しちゃうっ<emoji=heart04>\u3000ふあぁっ、おま○こ降参、しちゃうからぁっ<emoji=heart04>！\u3000はぁっ、ふあぁっ……んあぁぁんっ！<emoji=heart04>」"
translation = "「앗, 아앙, 선배 기다려어<emoji=heart04> 안쪽 찔려버리면, 항복해버려엇<emoji=heart04> 후아앗, 보지가 항복, 해버리니까아앗<emoji=heart04>! 하앗, 후아앗…… 응아아앙! <emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「だ、ダメぇ……センパイおち○ちん、気持ちいいっ<emoji=heart04>\u3000ふあぁぁっ、奥まで届いて、気持ちいいよぉっ<emoji=heart04>\u3000あっ、はっ、はぁんっ<emoji=heart04>\u3000もう、ダメぇっ！\u3000はあぁっ、ふあぁぁんっ<emoji=heart04>！」"
translation = "「아, 안 돼애…… 선배 자지, 기분 좋아앗<emoji=heart04> 후아아앗, 안쪽까지 닿아서, 기분 좋아아욧<emoji=heart04> 앗, 하앗, 하앙<emoji=heart04> 이제, 안 돼애앗! 하아앗, 후아아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「何を隠してるんだ、リーリアっ……！」"
translation = "「무얼 숨기고 있는 거냐, 리리아……!」"

[[dialogue]]
speaker = "リーリア"
original = "「んんっ、はぁ、はぁ……ま、魔弾！\u3000魔弾を作ろうと、してたんですぅ。この右手のぉ……んあぁっ、ふうぅっ……！」"
translation = "「응응, 하아, 하아…… 마, 마탄! 마탄을 만들려고, 했었단 말이에요오. 이 오른손의…… 응아앗, 후우우읏……!」"

[[dialogue]]
speaker = "リーリア"
original = "「私の星力を込めた弾丸にぃ……ふあぁっ、んうぅ……センパイの星力を加えることでぇ……あっ、んんっ……『相愛の魔弾』を、作ろうとしてたのぉ……あっ、はぁっ、んあぁっ<emoji=heart04>」"
translation = "「제 성력을 담은 탄환에에…… 후아앗, 응우우…… 선배의 성력을 더해서어…… 앗, 응응…… 『상애의 마탄』을, 만들려고 했어어…… 앗, 하앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「だ、だって、この魔弾が完成したらぁ……はぁぁっ、ふぅぅっ<emoji=heart04>\u3000センパイと私が、間違いなく両想いだって、証拠になるから……んあぁっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「그, 그치만, 이 마탄이 완성되면어…… 하아아앗, 후우우읏<emoji=heart04> 선배랑 제가, 틀림없이 서로 사랑한다는, 증거가 되니까…… 응아앗, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「なっ……『そんなことか』って、軽くないですか！？\u3000あっ、はぁんっ……やっぱりセンパイ、私の扱いが雑……ふうぅっ、んあぁっ……んんっ！？」"
translation = "「나앗…… 『그런 일인가』라니, 너무 가볍지 않나요!? 앗, 하앙…… 역시 선배, 저를 대하는 게 너무 대충…… 후우우읏, 응아앗…… 응응!?」"

[[dialogue]]
speaker = "リーリア"
original = "「んあっ、キスぅ……ちゅっ、ちゅぷっ、ぷちゅるっ<emoji=heart04>\u3000ここでキスするの、ずるいぃ……んちゅっ、ちゅうっ、ちゅぷぷっ<emoji=heart04>\u3000んっ、センパイ……ちゅむっ、むちゅるっ<emoji=heart04>」"
translation = "「응앗, 키스으…… 츄, 츄릅, 푸츄루<emoji=heart04> 여기서 키스하는 거, 치사해애…… 응츄, 츄우, 츄푸푸<emoji=heart04> 응, 선배…… 츄뭇, 무츄루<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んふぅ……キス気持ちいい<emoji=heart04>\u3000ちゅっ、ちゅうぅ、ちゅぱっ……舌絡めるの、気持ちいいですぅ……ちゅむっ、ちゅるるっ、ちゅぷぷっ……ぷはぁっ<emoji=heart04>」"
translation = "「응후우…… 키스 기분 좋아아<emoji=heart04> 츄, 츄우우, 츄파…… 혀 섞는 거, 기분 좋아아욧…… 츄뭇, 츄루루, 츄푸푸…… 푸하앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……リーリア、好きだ。愛してる」"
translation = "「……리리아, 좋아해. 사랑해.」"

[[dialogue]]
speaker = "リーリア"
original = "「はぁぁぁ……<emoji=heart04>\u3000センパイ、耳元で甘く囁くのダメぇ<emoji=heart04>\u3000ん、んあぁぁっ、ふあぁぁ……おま○こ嬉しくなって、愛液溢れちゃう<emoji=heart04><emoji=heart04>\u3000……はあぁっ、はあぁ<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 선배, 귓가에서 달콤하게 속삭이는 거 안 돼애<emoji=heart04> 응, 응아아아앗, 후아아아…… 보지가 기뻐져서, 애액이 넘쳐버려어<emoji=heart04><emoji=heart04> ……하아아앗, 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「世界で１番好きだ。……愛してる、リーリア」"
translation = "「세상에서 제일 좋아해. ……사랑한다, 리리아.」"

[[dialogue]]
speaker = "リーリア"
original = "「やあぁぁっ、連呼するのダメぇっ<emoji=heart04>\u3000ん、はぁ、はぁ……おま○こ嬉しくて<emoji=heart04>\u3000おち○ちんに絡み付いちゃってるぅぅぅ<emoji=heart04>\u3000……あぁぁっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「야아아앗, 연호하는 거 안 돼애앗<emoji=heart04> 응, 하아, 하아…… 보지가 기뻐서어<emoji=heart04> 자지에 얽혀버리고 있어어어어<emoji=heart04> ……아아아앗, 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、私もう、たまんないですっ<emoji=heart04>\u3000んあぁぁっ、いつもみたいにもっと、はぁっ、んくっ、もっと激しくぅ……！\u3000はぁっ、はぁっ、はああっ<emoji=heart04>」"
translation = "「선배, 저 이제, 못 참겠어요옷<emoji=heart04> 응아아아앗, 평소처럼 좀 더, 하앗, 응윽, 좀 더 격렬하게에……! 하앗, 하앗, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイの逞しいおち○ちんで、リーリアのこと……いっぱい気持ちよくしてぇ<emoji=heart04>」"
translation = "「선배의 늠름한 자지로, 리리아를…… 잔뜩 기분 좋게 해줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あんっ、センパイ……ふああぁぁぁ、ああああああ──────ッ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙, 선배…… 후아아아아아, 아아아아아아──────앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はあぁぁんっ！\u3000これ、これ好きぃ<emoji=heart04>\u3000あっ、あっ、んあぁぁっ！\u3000センパイの本気のピストン<emoji=heart04>\u3000ふあぁぁぁっ、すごっ、凄いぃんっ<emoji=heart04>\u3000はっ、はっ、んあぁぁんっ<emoji=heart04>！」"
translation = "「하아아앙앗! 이거, 이거 좋아아<emoji=heart04> 앗, 앗, 응아아아앗! 선배의 진심 피스톤<emoji=heart04> 후아아아아앗, 굉장해, 굉장해애앗<emoji=heart04> 핫, 핫, 응아아아앙앗<emoji=heart04>!」"

[[dialogue]]
speaker = "リーリア"
original = "「本気で求められてる感じがして、これ、好きっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000はっ、はひっ、気持ちいい<emoji=heart04>\u3000ふっ、ふぅぅ、ふあぁぁぁっ<emoji=heart04>\u3000気持ちいいのぉ<emoji=heart04>\u3000あっ、あっ、ふあぁぁんっ！」"
translation = "「진심으로 원해지는 느낌이 들어서, 이거, 좋아앗<emoji=heart04> 좋아앗<emoji=heart04> 핫, 하히, 기분 좋아아<emoji=heart04> 훗, 후우우, 후아아아아앗<emoji=heart04> 기분 좋아아욧<emoji=heart04> 앗, 앗, 후아아아앙앗!」"

[[dialogue]]
speaker = "リーリア"
original = "「奥っ、奥いいのぉ<emoji=heart04>\u3000んあぁぁっ、おま○こにも熱烈なおち○ちんキス<emoji=heart04>\u3000はっ、はぁっ、あぁぁんっ、気持ちいいっ<emoji=heart04>\u3000あぁぁっ、おち○ちんキス好きぃっ<emoji=heart04>」"
translation = "「안쪽, 안쪽 좋아아욧<emoji=heart04> 응아아아앗, 보지에도 열렬한 자지 키스<emoji=heart04> 핫, 하앗, 아아아앙, 기분 좋아앗<emoji=heart04> 아아아앗, 자지 키스 좋아아욧<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁぁっ、激しいっ<emoji=heart04>\u3000んあぁぁっ、おち○ちん突かれるたび、気持ちよすぎてっ……愛液ぴゅっぴゅっって、溢れちゃうぅ<emoji=heart04>\u3000はっ、はっ、はあぁぁんっ<emoji=heart04>！」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 하아아앗, 격렬해앗<emoji=heart04> 응아아아앗, 자지 찔릴 때마다, 너무 기분 좋아서어…… 애액이 퓨퓨 하고, 넘쳐버려어어<emoji=heart04> 핫, 핫, 하아아아앙앗<emoji=heart04>!」"

[[dialogue]]
speaker = "リーリア"
original = "「ふああぁぁっ、センパイ好きっ、好きなのぉ<emoji=heart04>\u3000あっ、あっ、はあぁんっ、愛してますぅ<emoji=heart04>\u3000はっ、はぁっ、あぁんっ、だからもっと、もっと突いてぇ<emoji=heart04>\u3000んあぁぁっ<emoji=heart04>！」"
translation = "「후아아아앗, 선배 좋아앗, 좋아해욧<emoji=heart04> 앗, 앗, 하아아앙, 사랑해욧<emoji=heart04> 핫, 하앗, 아앙, 그러니까 좀 더, 좀 더 찔러줘어<emoji=heart04> 응아아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "リーリア"
original = "「ふあぁぁぁっ、気持ちいいっ<emoji=heart04>\u3000あっ、あっ、センパイのおち○ちん、最高ですぅっ<emoji=heart04>\u3000あぁぁんっ、センパイ好きっ、センパイ大好きぃ<emoji=heart04>\u3000はあぁぁんっ<emoji=heart04>！」"
translation = "「후아아아아앗, 기분 좋아앗<emoji=heart04> 앗, 앗, 선배 자지, 최고예요오옷<emoji=heart04> 아아아앙, 선배 좋아앗, 선배 너무 좋아아<emoji=heart04> 하아아아앙앗<emoji=heart04>!」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あっ、あっ……<emoji=heart04>\u3000センパイのおち○ちん凄いっ、まだ大きくなるぅ<emoji=heart04>」"
translation = "「앗, 앗, 앗……<emoji=heart04> 선배 자지 굉장해앗, 아직 더 커져어<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はぁっ、はぁっ、んくっ、はああぁ！\u3000射精、射精したいんですよね？\u3000いいですよ<emoji=heart04>\u3000来て、私の中に射精してくださいっ、ん、はあああっ<emoji=heart04>」"
translation = "「하앗, 하앗, 응윽, 하아아아! 사정, 사정하고 싶은 거죠? 괜찮아요오<emoji=heart04> 어서, 제 안에 사정해 주세요옷, 응, 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「私もっ、イッちゃいそうっ<emoji=heart04>\u3000凄いのきちゃいそうですっ<emoji=heart04>\u3000あっ、あっ、はあんっ<emoji=heart04>\u3000だから、センパイ、センパイも一緒にぃ<emoji=heart04>\u3000はっ、はっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「저도옷, 가버릴 것 같아앗<emoji=heart04> 굉장한 게 올 것 같아요옷<emoji=heart04> 앗, 앗, 하앙앗<emoji=heart04> 그러니까, 선배, 선배도 같이이이<emoji=heart04> 핫, 핫, 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はあ、はああっ<emoji=heart04>\u3000んあっ、ふぁぁんっ<emoji=heart04>\u3000出して、出してくださいっ、センパイの精液、私の中に、出してっ<emoji=heart04>\u3000んはっ、はああぁぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아, 하아앗<emoji=heart04> 응앗, 후아앙앗<emoji=heart04> 내보내 줘요, 내보내 주세요옷, 선배의 정액, 제 안에, 내보내 줘엇<emoji=heart04> 응핫, 하아아아아앙앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「リーリアの中に、愛の証……いっぱいぶちまけてぇぇぇっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「리리아 안에, 사랑의 증거…… 잔뜩 쏟아부어줘어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「愛してる、リーリアッ！！！」"
translation = "「사랑해, 리리아!!」"

[[dialogue]]
speaker = "リーリア"
original = "「リーリアもっ<emoji=heart04>\u3000愛してるっ<emoji=heart04>\u3000愛してるぅ<emoji=heart04>\u3000センパイっ<emoji=heart04>\u3000センパイっ<emoji=heart04>\u3000センパァァァイっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああっ、ああっ、あああっ<emoji=heart04>」"
translation = "「리리아도옷<emoji=heart04> 사랑해욧<emoji=heart04> 사랑해어어<emoji=heart04> 선배애앗<emoji=heart04> 선배애앗<emoji=heart04> 선배애애애애애앗<emoji=heart04><emoji=heart04><emoji=heart04> 아앗, 아앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「きてきてきてきてぇっ<emoji=heart04>\u3000ふぁああああ<emoji=heart04><emoji=heart04>\u3000イっちゃうっ<emoji=heart04>\u3000イクイクっ、イクイクイク──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「와줘와줘와줘와줘어엇<emoji=heart04> 후아아아아아<emoji=heart04><emoji=heart04> 가버려엇<emoji=heart04> 가가, 가가각──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「っ……ふああああああっ。イッ、クぅぅぅ────────―っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 후아아아아아아앗. 가, 가버려어어어어어────────어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んあああぁぁぁあああ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあああぁぁぁ──────<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 하아아아아아아──────<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「……ふああぁぁぁ<emoji=heart04>\u3000センパイの精液、子宮にいっぱい注がれちゃってるぅ……<emoji=heart04>」"
translation = "「……후아아아아아<emoji=heart04> 선배의 정액, 자궁에 잔뜩 부어지고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はあぁぁぁ……<emoji=heart04>\u3000センパイの星力もいっぱい、私のお腹の中に……<emoji=heart04>」"
translation = "「하아아아아……<emoji=heart04> 선배의 성력도 잔뜩, 제 배 속에……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ……おち○ちん抜けちゃう……<emoji=heart04>」"
translation = "「앗, 아앙…… 자지 빠져버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んはぁ……<emoji=heart04>\u3000えへへぇ、学園でセンパイとエッチ、しちゃったぁ<emoji=heart04>」"
translation = "「응하아……<emoji=heart04> 에헤헤, 학원에서 선배랑 야한 짓, 해버렸다아<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「……あっ！？\u3000相愛の魔弾……完成してる……！」"
translation = "「……앗!? 상애의 마탄…… 완성됐어……!」"

[[dialogue]]
speaker = "unk"
original = "彼女が右手を開くと、そこには綺麗な純白の魔弾があった。"
translation = "그녀가 오른손을 펴자, 그곳에는 아름다운 순백의 마탄이 있었다."

[[dialogue]]
speaker = "クロト"
original = "「これで俺の好きって気持ちも、ちゃんと伝わったってことかな？」"
translation = "「이걸로 내 좋아한다는 마음도, 제대로 전해졌다는 뜻일까?」"

[[dialogue]]
speaker = "リーリア"
original = "「はいっ。えへ、えへへ……これが私とセンパイの純愛の証……♪」"
translation = "「네엣. 에헤, 에헤헤…… 이게 저와 선배의 순애의 증거……♪」"

[[dialogue]]
speaker = "unk"
original = "とても嬉しそうな顔で、魔弾に頬擦りするリーリア。"
translation = "무척 기쁜 얼굴로, 마탄에 뺨을 비비는 리리아."

[[dialogue]]
speaker = "クロト"
original = "「（本当は、別の秘密に関連することかと思ってたけど……）」"
translation = "「(실은, 다른 비밀에 관련된 건가 싶었는데……)」"

[[dialogue]]
speaker = "クロト"
original = "「（まあでも、リーリアが幸せそうだし、今日のところはいいか）」"
translation = "「(뭐 하지만, 리리아가 행복해 보이니, 오늘은 이걸로 됐나)」"

[[dialogue]]
speaker = "unk"
original = "──でも、いつか。"
translation = "──하지만, 언젠가."

[[dialogue]]
speaker = "unk"
original = "彼女が抱えているもう一つ秘密も、打ち明けてくれたらいいな、と思う。"
translation = "그녀가 품고 있는 또 하나의 비밀도, 털어놓아 주었으면 좋겠다고 생각한다."

[[dialogue]]
speaker = "unk"
original = "だって俺は、リーリアの恋人なのだから。"
translation = "왜냐하면 나는, 리리아의 연인이니까."

[[dialogue]]
speaker = "unk"
original = "純白の魔弾を見ながら、俺はその日が早く来ることを、改めて願うのだった。"
translation = "순백의 마탄을 보며, 나는 그날이 빨리 오기를 다시 한번 바라는 것이었다."

