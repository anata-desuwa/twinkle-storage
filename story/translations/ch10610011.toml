[[dialogue]]
speaker = "unk"
original = "第1話,口説き魔メイド,P"
translation = "제1화, 유혹하는 메이드, P"

[[dialogue]]
speaker = "unk"
original = "流星学園星徒会長であるフィオナに渡す書類があり、出向いていた時のこと。"
translation = "유성학원 성도회장인 피오나에게 전달할 서류가 있어 방문했을 때의 일."

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長。わざわざ星徒会室まで足を運んでいただいて、ありがとうございます」"
translation = "「히미야 회장. 일부러 성도회실까지 발걸음 해주셔서 감사합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうだ、せっかくいらっしゃったんですし、少しお茶でも――」"
translation = "「맞다, 어렵게 오셨으니 차라도 조금――」"

[[dialogue]]
speaker = "？？？"
original = "「フィオナお嬢様、ご来客のところ失礼致します。お茶とお菓子をお持ちしました」"
translation = "「피오나 아가씨, 손님이 계신 와중에 실례하겠습니다. 차와 과자를 가져왔습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「マリオンさん！\u3000ありがとうございます。ちょうどお茶を用意しようと思っていたところで……ひょっとして、それを見越して準備を？」"
translation = "「마리온 씨! 감사합니다. 마침 차를 준비하려던 참이었는데…… 설마 그걸 내다보고 준비를?」"

[[dialogue]]
speaker = "マリオン"
original = "「ええ。お嬢様でしたらきっと、新星の会長様をもてなすだろうと思いましたので。僭越ながら、先んじて用意させていただきました」"
translation = "「예. 아가씨라면 분명 신성의 회장님을 대접하실 거라 생각했으니까요. 참견일지 모르겠으나 미리 준비해 보았습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「さすがマリオンさんですね。いつも素晴らしい気配りで、助かります」"
translation = "「역시 마리온 씨네요. 언제나 훌륭한 배려 덕분에 큰 도움이 돼요」"

[[dialogue]]
speaker = "マリオン"
original = "「お褒め頂き光栄です。ああ、それにしてもフィオナお嬢様、今日も実にお可愛らしいですこと♪」"
translation = "「칭찬해 주시니 영광입니다. 아아, 그나저나 피오나 아가씨, 오늘도 실로 사랑스러우시네요♪」"

[[dialogue]]
speaker = "マリオン"
original = "「手の甲に失礼致しますね……ちゅっ<emoji=heart04>」"
translation = "「손등에 실례하겠습니다…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひゃっ！？\u3000ま、マリオンさん！\u3000緋宮会長が見ている前でそんな……口づけなんて……っ」"
translation = "「히약!? 마, 마리온 씨! 히미야 회장이 보고 있는 앞에서 그런…… 입맞춤이라니……っ」"

[[dialogue]]
speaker = "マリオン"
original = "「申し訳ありません。<ruby>私<rt>わたくし</rt></ruby>の悪い癖です。お嬢様を前にするとつい、愛おしい気持ちを抑えられなくなってしまい……お許し下さいませ」"
translation = "「죄송합니다. 저의 나쁜 버릇입니다. 아가씨 앞에 서면 그만 사랑스러운 마음을 억누를 수 없게 되어버려서…… 용서해 주십시오」"

[[dialogue]]
speaker = "マリオン"
original = "「ああ、でも……ふふっ……<emoji=heart04>\u3000こうして手の甲に口づけさせていただく度、変わらず照れた反応をして下さるお嬢様は、また実にお可愛らしく……<emoji=heart04>」"
translation = "「아아, 하지만…… 후훗……<emoji=heart04> 이렇게 손등에 입을 맞출 때마다 변함없이 수줍어하는 반응을 보여주시는 아가씨는 또한 실로 사랑스러우셔서……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「――おっと……いけませんね。新星の会長様をお待たせしてしまいました」"
translation = "「――이런…… 안 되겠군요. 신성의 회장님을 기다리게 해버렸습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「大変失礼致しました、会長様。私は星見家メイド隊所属、マリオン・ネイマールと申します」"
translation = "「정말 실례했습니다, 회장님. 저는 호시미 가 메이드대 소속, 마리온 네이마르라고 합니다」"

[[dialogue]]
speaker = "マリオン"
original = "「流星学園では、メイドとして様々な雑務を担当させていただいております。以後、どうぞお見知りおきを」"
translation = "「유성학원에서는 메이드로서 다양한 잡무를 담당하고 있습니다. 앞으로 부디 잘 부탁드립니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「雑務担当とは言っても、マリオンさんは本当に処理能力がすごくて、１人で全ての雑務を回せてしまう程なんですよ」"
translation = "「잡무 담당이라고는 해도, 마리온 씨는 정말 처리 능력이 대단해서 혼자서 모든 잡무를 다 해낼 정도예요」"

[[dialogue]]
speaker = "フィオナ"
original = "「流星学園がいつも綺麗に、快適に保たれているのは、マリオンさんが管理してくれているおかげと言っても、過言ではありません」"
translation = "「유성학원이 언제나 깨끗하고 쾌적하게 유지되는 건 마리온 씨가 관리해 주시는 덕분이라고 해도 과언이 아니랍니다」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ、そこまで褒めていただけて、光栄の極みです、お嬢様」"
translation = "「후훗, 그렇게까지 칭찬해 주시다니 영광의 극치입니다, 아가씨」"

[[dialogue]]
speaker = "unk"
original = "すごいメイドさんなんですね"
translation = "대단한 메이드시네요"

[[dialogue]]
speaker = "マリオン"
original = "「いえいえ、私は皆さまのお世話をできるメイドの仕事が好きでやっているだけですので」"
translation = "「아니요 아니요, 저는 여러분을 돌보는 메이드 일이 좋아서 하고 있을 뿐이니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「すごいというのなら、私よりも新星の会長様の方が、もっとすごいと思いますよ？\u3000入学早々にあの九浄ヴィーナス様に勝って、星徒会長になられて……」"
translation = "「대단하다고 하신다면, 저보다는 신성의 회장님이 훨씬 더 대단하다고 생각해요? 입학하자마자 그 쿠죠 비너스 님을 이기고 성도회장이 되셔서……」"

[[dialogue]]
speaker = "マリオン"
original = "「私も実は、あの御前試合を拝見させていただいてたんです。戦う会長様の雄姿は実に凛々しく……同時に、何度倒されても立ち上がる様子は健気でもあり――」"
translation = "「저도 실은 그 어전 시합을 배견했었거든요. 싸우는 회장님의 웅시는 실로 늠름하고…… 동시에 몇 번을 쓰러져도 다시 일어나는 모습은 기특하기도 해서――」"

[[dialogue]]
speaker = "マリオン"
original = "「普段の純朴でお可愛らしい容姿とのギャップに、私、思わず胸がキュンとトキめいてしまいました……<emoji=heart04>」"
translation = "「평소의 순박하고 사랑스러운 외모와의 갭에 저도 모르게 가슴이 큥 하고 설레버렸답니다……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「え？\u3000ま、マリオンさん……？」"
translation = "「에? 마, 마리온 씨……?」"

[[dialogue]]
speaker = "マリオン"
original = "「そう、これはきっと運命だったのです。ここで出会ったのも見えない赤い糸に導かれてのことに違いありません。ですから――」"
translation = "「그래요, 이건 분명 운명이었던 겁니다. 여기서 만난 것도 보이지 않는 붉은 실에 이끌린 것이 틀림없어요. 그러니까――」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様、これから是非、私とも仲良くして下さいましね……ちゅっ<emoji=heart04>」"
translation = "「회장님, 앞으로 부디 저와도 사이좋게 지내주세요…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ファッ！？"
translation = "화앗!? (파앗!?)"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長の手にも口づけを……！？\u3000まさか、あのマリオンさんが――」"
translation = "「히미야 회장의 손에도 입맞춤을……!? 설마 그 마리온 씨가――」"

[[dialogue]]
speaker = "フィオナ"
original = "「女の人以外を口説くなんて……！\u3000初めて見ました！」"
translation = "「여자 이외의 사람을 꼬시다니……! 처음 봤어요!」"

[[dialogue]]
speaker = "unk"
original = "いつもそんなことしてるの、この人！？"
translation = "항상 그런 짓을 하고 다니는 거야, 이 사람!?"

[[dialogue]]
speaker = "フィオナ"
original = "「マリオンさんは先程も言った通り、メイドとしてすごく有能な方なのですが……可愛い子には目がないというか……その……」"
translation = "「마리온 씨는 아까도 말했다시피 메이드로서 굉장히 유능한 분이지만…… 귀여운 아이에 사족을 못 쓴다고 할까…… 그게……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちょっと、肉食系と言いますか……」"
translation = "「조금, 육식계라고나 할까……」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふ♪\u3000私に気を遣って言葉を選ぶお嬢様も、お可愛らしいですこと<emoji=heart04>」"
translation = "「자자, 우후후♪ 저를 배려해서 말을 고르시는 아가씨도 사랑스러우시네요<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「私は可愛い女の子を目の前にするとつい、お声をかけたくなってしまうのです。悪癖でお恥ずかしい限りですが……」"
translation = "「저는 귀여운 여자아이를 눈앞에 두면 그만 말을 걸고 싶어지거든요. 악벽이라 부끄러울 따름입니다만……」"

[[dialogue]]
speaker = "unk"
original = "でも、どうして男の俺に……"
translation = "하지만 어째서 남자인 나에게……"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ<emoji=heart04>\u3000実は私、そろそろ結婚や子育てをしてみたいと考えておりまして……」"
translation = "「후훗<emoji=heart04> 실은 저, 슬슬 결혼이나 육아를 해보고 싶다고 생각하고 있어서요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「け、結婚！？」"
translation = "「결, 결혼!?」"

[[dialogue]]
speaker = "unk"
original = "子育て！？"
translation = "육아!?"

[[dialogue]]
speaker = "マリオン"
original = "「はい。それで、好みのお可愛いらしい男の子を探していたところだったのです<emoji=heart04>」"
translation = "「네. 그래서 취향에 맞는 사랑스러운 남자아이를 찾고 있던 참이었답니다<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
original = "「――おや？\u3000会長様、可愛いと言われて戸惑った顔をされていらっしゃいますね」"
translation = "「――어라? 회장님, 귀엽다는 말을 듣고 당황한 표정을 지으시네요」"

[[dialogue]]
speaker = "マリオン"
original = "「嘘ではありませんよ。会長様のお顔立ちは中性的でお可愛らしく……実に私好みですので<emoji=heart04>」"
translation = "「거짓말이 아니에요. 회장님의 생김새는 중성적이고 사랑스러워서…… 실로 제 취향이거든요<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「中性的で可愛い顔……ちょっとわかる気がします」"
translation = "「중성적이고 귀여운 얼굴…… 조금 알 것 같은 기분이 들어요」"

[[dialogue]]
speaker = "unk"
original = "フィオナさん！？"
translation = "피오나 씨!?"

[[dialogue]]
speaker = "マリオン"
original = "「それに、御前試合で拝見した通り、心も体も強くていらっしゃいます」"
translation = "「게다가 어전 시합에서 보았듯이 몸도 마음도 강하시고요」"

[[dialogue]]
speaker = "マリオン"
original = "「男らしく強いのに、お可愛い……そんな会長様はまさに、私が探していた男の子像にピッタリというわけです」"
translation = "「남자답고 강하면서도 사랑스러운…… 그런 회장님은 그야말로 제가 찾던 남자아이 상에 딱 들어맞는다는 뜻입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「というわけで、これから是非、よろしくお願い致しますね。会長様♪」"
translation = "「그런 고로, 앞으로 부디 잘 부탁드려요. 회장님♪」"

[[dialogue]]
speaker = "マリオン"
original = "「公私共に……ふふっ<emoji=heart04>」"
translation = "「공적으로나 사적으로나…… 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリオンさんの浮かべた大人の色っぽい笑みに、思わずドキッとしてしまう俺なのだった――"
translation = "마리온 씨가 띄운 어른스럽고 요염한 미소에 나도 모르게 가슴이 두근거리고 마는 나였다――"

