[[dialogue]]
speaker = "unk"
original = "ついに覚醒したヒルディオーネはマハムートと再び激戦を開始し、試合は一気にクライマックスへと突入していた――"
translation = "마침내 각성한 힐디 오네는 마하무트와 다시 격전을 시작했고, 시합은 단숨에 클라이맥스로 돌입하고 있었다――"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「はあああぁーーーっ！！」"
translation = "「하아아아아ーーー앗!!」"

[[dialogue]]
speaker = "unk"
original = "スチームオーバーブーストの時よりも更なる超速で動き回るヒルディオーネは、マハムートの引力球の追尾を抜けて、肉薄する。"
translation = "스팀 오버 부스트 때보다 더욱 초고속으로 움직이는 힐디 오네는, 마하무트의 인력구 추적을 따돌리고, 근접한다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「メテオクローッ！」"
translation = "「메테오 클로옷!」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「スパイラルエクストリームッ！！」"
translation = "「스파이럴 익스트림!!」"

[[dialogue]]
speaker = "unk"
original = "マハムートの爪撃と、ヒルディオーネの槍が激突する。競り負け吹き飛ばされたのは――マハムートの方だった。"
translation = "마하무트의 발톱 공격과, 힐디 오네의 창이 격돌한다. 밀려나 날아간 것은―― 마하무트 쪽이었다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「ぐっ……！？」"
translation = "「크윽……!?」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "（ヒルディオーネの覚醒フォームの<ruby>身体能力<rt>フィジカル</rt></ruby>は、竜の力を最大限引き出せる私のノヴァフォームをも上回っている……！）"
translation = "（힐디 오네의 각성 폼의 신체 능력은, 용의 힘을 최대한 끌어낼 수 있는 나의 노바 폼마저 능가하고 있어……!）"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "（いや、これは能力で『物理法則に干渉』している……！？\u3000だからこそ、竜の膂力すらも真正面から吹き飛ばすことができる……！）"
translation = "（아니, 이건 능력으로 『물리 법칙에 간섭』하고 있는 건가……!? 그렇기에, 용의 완력조차도 정면에서 날려버릴 수 있는……!）"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「っ……だとしても！\u3000――引力球！」"
translation = "「윽…… 그렇다고 해도! ――인력구!」"

[[dialogue]]
speaker = "unk"
original = "マハムートは無数の引力球を全方位に発生させ、ヒルディオーネの動きに制限をかけようとするが――"
translation = "마하무트는 무수한 인력구를 전방위에 발생시켜, 힐디 오네의 움직임을 제한하려 하지만――"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「――全て打ち砕きますわ！！\u3000ミラージュペネトレイターッ！！！」"
translation = "「――전부 부숴버리겠습니다요!! 미라지 페네트레이터!!!」"

[[dialogue]]
speaker = "unk"
original = "槍のドリルが回転し、そこから発せられる螺旋の波動が竜巻のごとく、周囲の引力球を飲み込み、一掃する。"
translation = "창의 드릴이 회전하고, 거기에서 발산되는 나선의 파동이 회오리바람처럼, 주위의 인력구를 집어삼키고 일소한다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "（これまで１度も砕けなかった引力球が、ドリルの回転の余波だけであっさりと破壊される……！）"
translation = "（지금까지 한 번도 부서지지 않았던 인력구가, 드릴 회전의 여파만으로 간단히 파괴되다니……!）"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "（あの槍の前ではもう、迂闊に引力球を使えない！）"
translation = "（저 창 앞에서는 이제, 경솔하게 인력구를 사용할 수 없어!）"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「今ですわ！\u3000ミーティアスマッシャーッ！！」"
translation = "「지금입니다요! 미티어 스매셔!!」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「っ……！！」"
translation = "「윽……!!」"

[[dialogue]]
speaker = "unk"
original = "一瞬で距離を詰めたヒルディオーネが、マハムートに拳を叩き込む。咄嗟に防御の体勢を取るマハムートだが、再び吹き飛ばされる。"
translation = "순식간에 거리를 좁힌 힐디 오네가, 마하무트에게 주먹을 내리꽂는다. 황급히 방어 태세를 취하는 마하무트지만, 다시 날아간다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（このまま一気に押し切りますわ！）"
translation = "（이대로 단숨에 밀어붙이겠습니다요!）"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「っ……甘いわよ！\u3000デストームテイルッ！！」"
translation = "「윽…… 물러! 데스 스톰 테일!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「かはっ――！？」"
translation = "「크하앗――!?」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネが繰り出した蹴りを受け流し、マハムートがカウンターで尻尾の鉄球を<ruby>鳩尾<rt>みぞおち</rt></ruby>に叩き込む。"
translation = "힐디 오네가 내민 발차기를 흘려내고, 마하무트가 카운터로 꼬리의 철구를 명치에 내리꽂는다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……どうやら、覚醒したばかりで、まだ力の加減と感覚の調整が間に合ってないようね」"
translation = "「……아무래도, 막 각성해서, 아직 힘 조절과 감각 조정이 따라가지 못하는 모양이네」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「いくら<ruby>身体能力<rt>フィジカル</rt></ruby>で上回ろうと、そこに隙がある限りは――」"
translation = "「아무리 신체 능력으로 앞선다 해도, 거기에 틈이 있는 한은――」"

[[dialogue]]
speaker = "unk"
original = "今度はマハムートが一気に距離を詰め、ヒルディオーネの蹴りをかわして、ガードの上から強烈な拳の一撃を叩きこむ。"
translation = "이번에는 마하무트가 단숨에 거리를 좁히고, 힐디 오네의 발차기를 피하며, 가드 위로 강렬한 주먹 일격을 내리꽂는다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「この私を圧倒できるなどと、決して思い上がらないことねっ、ヒルディオーネ！」"
translation = "「이 나를 압도할 수 있을 거라고, 결코 우쭐대지 마, 힐디 오네!」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「くうぅっ……！？」"
translation = "「크으으읏……!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（<ruby>私<rt>わたくし</rt></ruby>には覚醒した力をすぐさま使いこなせるような<ruby>才能<rt>センス</rt></ruby>はない。そして、覚醒フォームの練度はマムの方が遥かに上……！\u3000その『技』に今、打ち勝つには――）"
translation = "（저에게는 각성한 힘을 곧바로 능숙하게 다룰 수 있을 만한 재능는 없다. 그리고, 각성 폼의 숙련도는 마무 쪽이 훨씬 위……! 그 『기술』을 지금, 이겨내려면――）"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（絶対に負けないという強い意志！\u3000『心』で上回るしかありませんわ！）"
translation = "（절대로 지지 않겠다는 강한 의지! 『마음』으로 앞설 수밖에 없습니다요!）"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「はああぁっーーー！！」"
translation = "「하아아아앗ーーー!!」"

[[dialogue]]
speaker = "unk"
original = "全力で再び加速し、マハムートと格闘戦を繰り広げるヒルディオーネ。"
translation = "전력으로 다시 가속하며, 마하무트와 격투전을 펼치는 힐디 오네."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「ふんっ――！！」"
translation = "「흥읏――!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「はぁっ――！！」"
translation = "「하앗――!!」"

[[dialogue]]
speaker = "unk"
original = "吹き飛ばし、吹き飛ばされの応酬を繰り返し、やがてマハムートが手の平をかざす。"
translation = "서로 날려버리고 날아가는 공방을 반복하고, 이윽고 마하무트가 손바닥을 내민다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「森羅万象――引力操作！」"
translation = "「삼라만상―― 인력 조작!」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「っ……！！」"
translation = "「윽……!!」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネに足枷をはめるように引力球が形成され、その場に拘束される。"
translation = "힐디 오네에게 족쇄를 채우듯이 인력구가 형성되어, 그 자리에 구속된다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「たった１つに能力を収束させた特製引力球よ。あなたのドリルで無効化できるにしても、一瞬の隙は生まれる」"
translation = "「단 하나에 능력을 수렴시킨 특제 인력구야. 네 드릴로 무효화할 수 있다고 해도, 한순간의 틈은 생기지」"

[[dialogue]]
speaker = "unk"
original = "マハムートが口を開き、これまでで最大の星力が急速に１点の炎球となって、収束する。"
translation = "마하무트가 입을 열고, 지금까지 중 최대의 성력이 급속히 한 점의 염구가 되어, 수렴한다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「だから――この一撃で、終わらせるわ！！」"
translation = "「그러니―― 이 일격으로, 끝내겠어!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（避けられない……！\u3000いや――）"
translation = "（피할 수 없어……! 아니――）"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（だったら、ここで打ち勝つしかありませんの！！）"
translation = "（그렇다면, 여기서 이겨낼 수밖에 없습니다요!!）"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「ドラゴニックノヴァフレアーーーッ！！！」"
translation = "「드래고닉 노바 플레어ーーー앗!!!」"

[[dialogue]]
speaker = "unk"
original = "マハムートが放つ全力の<ruby>炎の息吹<rt>ドラゴンブレス</rt></ruby>。ヒルディオーネはそれを真正面から、今できる最大の一撃で迎え撃つ。"
translation = "마하무트가 뿜어내는 전력의 불의 숨결. 힐디 오네는 그것을 정면에서, 지금 할 수 있는 최대의 일격으로 맞받아친다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「――不可能を超えて、限界のその先へ！」"
translation = "「――불가능을 넘어, 한계의 그 너머로!」"

[[dialogue]]
speaker = "unk"
original = "槍のドリルが回転し、水の星力が眩い輝きを纏って螺旋を描く。"
translation = "창의 드릴이 회전하고, 물의 성력이 눈부신 빛을 두르고 나선을 그린다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「打ち砕け！！\u3000アンリミテッドブレイカァァァーーーッ！！！」"
translation = "「부숴버려!! 언리미티드 브레이커아아아ーーー앗!!!」"

[[dialogue]]
speaker = "unk"
original = "両者の全力がぶつかり合い、せめぎ合う。"
translation = "양자의 전력이 부딪치고, 서로 다툰다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「はあああぁぁぁーーーっ！！！」"
translation = "「하아아아아아ーーー앗!!!」"

[[dialogue]]
speaker = "unk"
original = "洗練されたマムの本気の星力が、ヒルディオーネの螺旋を飲み込んでいく。"
translation = "세련된 마무의 진심 성력이, 힐디 오네의 나선을 집어삼켜 간다."

[[dialogue]]
speaker = "unk"
original = "だが、ヒルディオーネは決して一歩も引かない。"
translation = "하지만, 힐디 오네는 결코 한 발짝도 물러서지 않는다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（……敗北には慣れていますの。後輩にも、何度もみっともない負け姿を晒してきましたわ）"
translation = "（……패배에는 익숙합니다요. 후배에게도, 몇 번이나 꼴사나운 패배하는 모습을 보여왔습니다요）"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（それでも、言ってくれましたの）"
translation = "（그럼에도, 말해주었습니다요）"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "（お姉様はお姉様らしく、一番カッコいいところを見せて、と）"
translation = "（언니님은 언니님답게, 가장 멋진 모습을 보여달라고）"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「だから――」"
translation = "「그러니――」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「私は何度負けたって！」"
translation = "「저는 몇 번을 져도!」"

[[dialogue]]
speaker = "unk"
original = "己の可能性を信じる『心』でドリルを回し、螺旋を描く！！"
translation = "자신의 가능성을 믿는 『마음』으로 드릴을 돌리고, 나선을 그린다!!"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「何度だって、立ち上がり続けてみせますわぁぁぁーーーッ！！！」"
translation = "「몇 번이고, 계속 일어서 보이겠습니다요오오오ーーー앗!!!」"

[[dialogue]]
speaker = "unk"
original = "果たして、全力の撃ち合いの末、最後まで立っていたのは――"
translation = "과연, 전력의 맞대결 끝에, 마지막까지 서 있던 것은――"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「くっ……」"
translation = "「크윽……」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「はぁ……はぁ……はぁ……」"
translation = "「하아…… 하아…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "妃竜院マハムートではなく――千園寺ヒルディオーネの方だった。"
translation = "히류인 마하무트가 아닌―― 치온지 힐디 오네 쪽이었다."

[[dialogue]]
speaker_original = "寮生Ｃ"
speaker_translation = "기숙사생 C"
original = "「……あ」"
translation = "「……아」"

[[dialogue]]
speaker_original = "寮生Ｄ"
speaker_translation = "기숙사생 D"
original = "「お姉様が……」"
translation = "「언니님이……」"

[[dialogue]]
speaker_original = "寮生Ｅ"
speaker_translation = "기숙사생 E"
original = "「お姉様がついに……！」"
translation = "「언니님이 마침내……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「っ……マムに……勝ちました……！」"
translation = "「윽…… 마무에게…… 이겼어요……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "『しょ、勝者は――』"
translation = "『자, 승자는――』"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "『千園寺ヒルディオーネ先輩だぁぁぁーーーっ！！\u3000あの最強無敗のマムを打ち破り、星霊舞闘会、ついに初優勝ぉぉぉぁーーーっ！！！』"
translation = "『치온지 힐디 오네 선배다아아아ーーー앗!! 그 최강 무패의 마무를 물리치고, 성령무투회, 마침내 첫 우승으으으아ーーー앗!!!』"

[[dialogue]]
speaker = "unk"
original = "紅明の宣言と同時に、大歓声に湧き立つアリーナ。"
translation = "홍명의 선언과 동시에, 대환호성으로 들끓는 아레나."

[[dialogue]]
speaker_original = "寮生Ａ"
speaker_translation = "기숙사생 A"
original = "「お姉様が勝った……！\u3000ずっと……ずっと追いかけ続けてきた、マムに……！」"
translation = "「언니님이 이겼어……! 계속…… 계속 쫓아왔던, 마무에게……!」"

[[dialogue]]
speaker_original = "寮生Ｂ"
speaker_translation = "기숙사생 B"
original = "「すごいですわ……！\u3000お姉様、本当にすごい……！」"
translation = "「대단합니다요……! 언니님, 정말 대단해요……!」"

[[dialogue]]
speaker = "unk"
original = "嗚咽を漏らし、涙をボロボロとこぼす寮生たち。"
translation = "오열을 흘리며, 눈물을 뚝뚝 흘리는 기숙사생들."

[[dialogue]]
speaker = "unk"
original = "そんな中、ヒルディオーネは息を整えながら、倒れているマムへとゆっくりと歩み寄る。"
translation = "그런 가운데, 힐디 오네는 숨을 고르며, 쓰러져 있는 마무에게 천천히 다가간다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「……マム」"
translation = "「……마무」"

[[dialogue]]
speaker = "unk"
original = "声を掛け、手を差し出す。"
translation = "말을 걸고, 손을 내민다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "マハムートは黙ってその手を取り、起き上がる。"
translation = "마하무트는 말없이 그 손을 잡고, 일어선다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……私」"
translation = "「……나」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「今……死ぬほど悔しいわ」"
translation = "「지금…… 죽을 만큼 분해」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ええ。そうでしょうね」"
translation = "「네. 그렇겠지요」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「私もいつも思っておりますわ。だって――宿命のライバルですもの」"
translation = "「저도 항상 그렇게 생각하고 있습니다요. 왜냐하면―― 숙명의 라이벌이니까요」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……ふっ」"
translation = "「……훗」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「優勝おめでとう、ヒルディー」"
translation = "「우승 축하해, 힐디」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ありがとうございますわ、マム」"
translation = "「감사합니다요, 마무」"

[[dialogue]]
speaker = "unk"
original = "大歓声と拍手に包まれる中、２人は柔らかな表情を浮かべて、握手を交わすのだった――"
translation = "대환호성과 박수에 둘러싸인 가운데, 두 사람은 부드러운 표정을 지으며, 악수를 나누는 것이었다――"

