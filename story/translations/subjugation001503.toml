[[dialogue]]
speaker = "カティア"
original = "「すみませんっ、魔王様。ちょっとお手洗い行ってきまーすっ」"
translation = "「죄송해요, 마왕님. 잠시 화장실 좀 다녀올게요!」"

[[dialogue]]
speaker = "カティア"
original = "「ふー……間に合った……」"
translation = "「후우…… 겨우 살았다……」"

[[dialogue]]
speaker = "カティア"
original = "「でも犯人の手がかり、なかなか見つからないなぁ……」"
translation = "「하지만 범인의 단서, 좀처럼 보이지 않네……」"

[[dialogue]]
speaker = "カティア"
original = "「いや、弱気になっちゃダメだ。こういう時こそ頑張らないと」"
translation = "「아니, 약해지면 안 돼. 이럴 때일수록 힘내야지」"

[[dialogue]]
speaker = "カティア"
original = "「もし私が犯人を見つけたら……むふふ……きっと魔王様が頭をなでなでして、わふわふしてくれてぇ……」"
translation = "「만약 내가 범인을 찾아낸다면…… 무후후…… 분명 마왕님이 머리를 쓰담쓰담, 부비부비 해주셔서어……」"

[[dialogue]]
speaker = "カティア"
original = "「ふふふ、こうしちゃおけない！\u3000早く魔王様と合流しなくては……！」"
translation = "「후후후, 이러고 있을 순 없지! 빨리 마왕님과 합류해야……!」"

[[dialogue]]
speaker = "イングリット"
original = "「おい、そこの貴様」"
translation = "「어이, 거기 네놈」"

[[dialogue]]
speaker = "カティア"
original = "「はい？」"
translation = "「네?」"

[[dialogue]]
speaker = "カティア"
original = "（はっ！？\u3000日本刀を持ってる天使！\u3000犯人の特徴と一致する！\u3000ていうか見るからにヤバいヤツ！）"
translation = "（헉!? 일본도를 든 천사! 범인의 특징과 일치해! 그보다 딱 봐도 위험한 녀석이야!）"

[[dialogue]]
speaker = "カティア"
original = "「こ、ここは撤退します……！\u3000逃げるが勝ちです！」"
translation = "「여, 여기선 퇴각합니다……! 도망치는 게 이기는 거예요!」"

[[dialogue]]
speaker = "イングリット"
original = "「貴様！\u3000この私から逃げられると思うなよ！」"
translation = "「네놈! 나에게서 도망칠 수 있을 거라 생각 마라!」"

[[dialogue]]
speaker = "カティア"
original = "「わふ～っ！\u3000追いかけてこないでください～！」"
translation = "「와앙~! 쫓아오지 마세요~!」"

[[dialogue]]
speaker = "イングリット"
original = "「貴様が逃げるからだ！」"
translation = "「네놈이 도망치기 때문이다!」"

[[dialogue]]
speaker = "カティア"
original = "「わふ～っ！\u3000追いかけてこないでください～！」"
translation = "「와앙~! 쫓아오지 마세요~!」"

[[dialogue]]
speaker = "カティア"
original = "（ヤバいヤバいヤバいっ！\u3000このままじゃ追いつかれちゃう！）"
translation = "（위험해 위험해 위험해! 이대로라면 따라잡히겠어!）"

[[dialogue]]
speaker = "カティア"
original = "（追いつかれる前に奇襲をかける？\u3000ダメっ！\u3000絶対負けちゃう！）"
translation = "（따라잡히기 전에 기습을 할까? 안 돼! 무조건 진다구!）"

[[dialogue]]
speaker = "カティア"
original = "「わふっ！\u3000アステラが目の前に！？」"
translation = "「와앙! 아스텔라가 눈앞에!?」"

[[dialogue]]
speaker = "カティア"
original = "「ど、どどどどうしよう！\u3000もうあの人にも追いつかれそうだし！\u3000ええい、こうなったらイチかバチか！\u3000アステラに突っ込む！」"
translation = "「어, 어어어어떡하지! 벌써 저 사람한테 따라잡힐 것 같고! 에잇, 이렇게 된 거 모 아니면 도다! 아스텔라에 돌입한다!」"

[[dialogue]]
speaker = "カティア"
original = "「コラプサーに捕まるくらいなら、アステラの方がマシだ！\u3000ええーい！」"
translation = "「콜랩서에게 잡히느니 아스텔라 쪽이 낫지! 에잇!」"

[[dialogue]]
speaker = "カティア"
original = "「はぁはぁっ……！\u3000なんとか逃げ切れた……！」"
translation = "「하아 하아……! 겨우 따돌렸다……!」"

[[dialogue]]
speaker = "イングリット"
original = "「誰から逃げ切れたんだ？」"
translation = "「누구에게서 따돌렸다는 거냐?」"

[[dialogue]]
speaker = "カティア"
original = "「ひええええ！？\u3000コラプサー！？」"
translation = "「히익!? 콜랩서!?」"

[[dialogue]]
speaker = "イングリット"
original = "「ほう、私がコラプサーということを知っているのか」"
translation = "「호오, 내가 콜랩서라는 걸 알고 있나 보군」"

[[dialogue]]
speaker = "カティア"
original = "（ほ、本当にコラプサーだった……！\u3000私、事件の犯人と２人きりになっちゃってる！）"
translation = "（저, 정말 콜랩서였어……! 나, 사건의 범인이랑 단둘이 남겨져 버렸어!）"

[[dialogue]]
speaker = "イングリット"
original = "「私はイングリット。強者を求めるコラプサーだ」"
translation = "「나는 잉그리드. 강자를 찾는 콜랩서다」"

[[dialogue]]
speaker = "カティア"
original = "（今までのコラプサーとは違う名前……新しいコラプサー！）"
translation = "（지금까지의 콜랩서와는 다른 이름…… 새로운 콜랩서!）"

[[dialogue]]
speaker = "イングリット"
original = "「さて、そろそろ問わせてもらおう。貴様はプリマステラか？」"
translation = "「자, 슬슬 묻도록 하지. 네놈은 프리마스텔라인가?」"

[[dialogue]]
speaker = "カティア"
original = "「ち、違う……！\u3000私はプリマステラじゃないワン！」"
translation = "「아, 아냐……! 난 프리마스텔라가 아니다멍!」"

[[dialogue]]
speaker = "イングリット"
original = "「なんだ、プリマステラではないのか。無駄骨だったな」"
translation = "「뭐냐, 프리마스텔라가 아니었나. 헛수고였군」"

[[dialogue]]
speaker = "カティア"
original = "「う、うるさいワン……！\u3000プリマステラじゃなくても立派な星騎士だガオ！」"
translation = "「시, 시끄럽다멍……! 프리마스텔라가 아니어도 훌륭한 성기사다크앙!」"

[[dialogue]]
speaker = "イングリット"
original = "「貴様のような有象無象には興味がない。やはり狙うべきは魔王か……」"
translation = "「네놈 같은 오합지졸에겐 흥미 없다. 역시 노려야 할 건 마왕인가……」"

[[dialogue]]
speaker = "カティア"
original = "「──！？\u3000魔王様に手を出すのは許さないぞ！」"
translation = "「──!? 마왕님께 손대는 건 용납 못 한다!」"

[[dialogue]]
speaker = "イングリット"
original = "「魔王を襲うのに、なぜ貴様の許可がいる？\u3000弱者に口を開く権利はない」"
translation = "「마왕을 습격하는데 왜 네놈의 허락이 필요하지? 약자에게 입을 열 권리는 없다」"

[[dialogue]]
speaker = "カティア"
original = "「私は魔王様の忠実なしもべだワン！」"
translation = "「나는 마왕님의 충실한 암캐다멍!」"

[[dialogue]]
speaker = "イングリット"
original = "「ほう、貴様が魔王様の下僕だと？」"
translation = "「호오, 네놈이 마왕의 하수인이라고?」"

[[dialogue]]
speaker = "カティア"
original = "「そうだワン！\u3000どうだ恐れ入ったか！」"
translation = "「그렇다멍! 어떠냐 겁나지!」"

[[dialogue]]
speaker = "イングリット"
original = "「なるほどな。だったら、貴様を血祭りに上げれば、魔王を釣る餌になるか」"
translation = "「과연 그렇군. 그렇다면 네놈을 피의 제물로 바치면 마왕을 낚을 미끼가 되겠나」"

[[dialogue]]
speaker = "カティア"
original = "「ち、血祭り……！？」"
translation = "「피, 피의 제물……!?」"

[[dialogue]]
speaker = "イングリット"
original = "「下僕がなぶり殺しにされれば、魔王も戦う気になるだろう」"
translation = "「하수인이 잔인하게 죽임을 당하면 마왕도 싸울 마음이 생기겠지」"

[[dialogue]]
speaker = "カティア"
original = "「ま、魔王様は冷酷なお方だから、そんなことでは動かないワン……！」"
translation = "「마, 마왕님은 냉혹한 분이라 그런 걸로는 안 움직인다멍……!」"

[[dialogue]]
speaker = "イングリット"
original = "「ほう。さすがは魔王と呼ばれるだけあるな。ますます興味が湧いてくる」"
translation = "「호오. 과연 마왕이라 불릴 만하군. 더욱더 흥미가 생기는군」"

[[dialogue]]
speaker = "カティア"
original = "「私に協力するなら、魔王様に話をつけてやってもいいガオ」"
translation = "「나한테 협력한다면 마왕님께 말은 잘 해줄 수 있다크앙」"

[[dialogue]]
speaker = "イングリット"
original = "「本当か？」"
translation = "「정말이냐?」"

[[dialogue]]
speaker = "カティア"
original = "「もちろんだワン。その代わりこのアステラを出るまで、私の護衛をしてもらうガオ」"
translation = "「당연하다멍. 그 대신 이 아스텔라를 나갈 때까지 나의 호위를 맡아라크앙」"

[[dialogue]]
speaker = "イングリット"
original = "「ふむ。いいだろう」"
translation = "「흠. 좋다」"

[[dialogue]]
speaker = "カティア"
original = "（やった！\u3000これでアステラを出るまで安全になれた！）"
translation = "（됐다! 이걸로 아스텔라를 나갈 때까지는 안전해졌어!）"

[[dialogue]]
speaker = "カティア"
original = "（そしてあわよくば、アステラのモンスターと相打ちにさせて、弱ったところを確保してやる！）"
translation = "（그리고 운 좋으면 아스텔라의 몬스터와 동귀어진 시키고, 약해진 틈을 타서 확보해주마!）"

[[dialogue]]
speaker = "イングリット"
original = "「そうと決まれば早くアステラを出るぞ、犬」"
translation = "「그렇게 정해졌으면 빨리 아스텔라를 나간다, 개」"

[[dialogue]]
speaker = "カティア"
original = "「私は犬じゃないワン！\u3000カティアっていう立派な名前があるワン！」"
translation = "「난 개가 아니다멍! 카티아라는 훌륭한 이름이 있다멍!」"

[[dialogue]]
speaker = "イングリット"
original = "「覚えられない。犬でいいだろう」"
translation = "「못 외운다. 그냥 개면 충분하겠지」"

[[dialogue]]
speaker = "カティア"
original = "「むかーっ！\u3000そんな難しい名前じゃないガオ！」"
translation = "「부글부글! 그렇게 어려운 이름 아니거든크앙!」"

[[dialogue]]
speaker = "イングリット"
original = "「戦いに関係ないことに興味はない」"
translation = "「전투와 상관없는 것엔 관심 없다」"

[[dialogue]]
speaker = "カティア"
original = "（な、なんだこいつ……！\u3000いくらコラプサーでも言ってることめちゃくちゃだ……！）"
translation = "（뭐, 뭐야 이 녀석……! 아무리 콜랩서라지만 말이 안 통하잖아……!）"

