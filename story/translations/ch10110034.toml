[[dialogue]]
speaker = "unk"
original = "第４話,マトイと普通の朝,P"
translation = "제4화, 마토이와 평범한 아침, P"

[[dialogue]]
speaker = "unk"
original = "マトイが以前遊びに来て母さんと挨拶をしてから、彼女は毎朝のように、家まで迎えに来てくれるようになった。"
translation = "마토이가 예전에 놀러 와서 어머니와 인사를 나눈 뒤로, 그녀는 매일 아침처럼 집 앞까지 마중을 나와주게 되었다."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「会長、そろそろ時間だし、学園に行こっか」"
translation = "「회장님, 슬슬 시간이니까 학원에 가자.」"

[[dialogue]]
speaker = "リノ"
original = "「マトイちゃん、朝早いのに、いつもクロトを迎えに来てくれて、ありがとね♪」"
translation = "「마토이짱, 아침 일찍인데 항상 쿠로토를 데리러 와줘서 고마워♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「いえいえ！\u3000私が好きでやってることなので。星徒会が忙しい日でも、朝ならその……恋人の時間を過ごせるというか……」"
translation = "「아니에요! 제가 좋아서 하는 일이니까요. 성도회가 바쁜 날이라도 아침이라면 그…… 연인만의 시간을 보낼 수 있다고 해야 할까……」"

[[dialogue]]
speaker = "リノ"
original = "「あらあら、うふふっ♪\u3000クロトったら、愛されてるわね～」"
translation = "「어머 어머, 우후훗♪ 쿠로토도 참, 사랑받고 있네~」"

[[dialogue]]
speaker = "unk"
original = "今度、俺もまた、マトイの家に迎えに行くよ"
translation = "다음에 나도 다시 마토이네 집으로 마중 나갈게."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「うん！\u3000お父さんお母さんも、また朝食を一緒にどうかって行ってたから、喜ぶと思う♪」"
translation = "「응! 아빠랑 엄마도 또 아침 식사를 같이하자고 하셨으니까 기뻐하실 거야♪」"

[[dialogue]]
speaker = "リノ"
original = "「ふふっ、マモリちゃんとススムさんには、私からも息子をよろしくお願いしますって言ってたって、伝えておいてね♪」"
translation = "「후훗, 마모리짱이랑 스스무 씨에게는 나도 아들을 잘 부탁한다고 전했다고 꼭 말해줘♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「はい、必ず。……それじゃあ、リノさん、そろそろ行って来ます」"
translation = "「네, 반드시요. ……그러면 리노 씨, 슬슬 다녀오겠습니다.」"

[[dialogue]]
speaker = "リノ"
original = "「は～い♪\u3000２人とも、元気に行ってらっしゃ～い♪」"
translation = "「네~에♪ 둘 다 활기차게 다녀오렴~♪」"

[[dialogue]]
speaker = "unk"
original = "そうして俺とマトイは、２人で並んで通学路を歩いて行く。"
translation = "그렇게 나와 마토이는 둘이서 나란히 등굣길을 걸어간다."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「きょ、今日もいい朝だね～。何か、いつもよりも気分が高揚してくるというか～……」"
translation = "「오, 오늘도 좋은 아침이네~. 뭔가 평소보다 더 기분이 고양된다고 해야 할까~……」"

[[dialogue]]
speaker = "unk"
original = "なんか緊張してるような……"
translation = "왠지 긴장하고 있는 것 같은데……"

[[dialogue]]
speaker = "unk"
original = "？\u3000……マトイ、どうかしたか？"
translation = "? ……마토이, 왜 그래?"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「えっ！？\u3000じ、実は、その……会長、あのね――」"
translation = "「엣!? 사, 사실은 그…… 회장님, 저기 말이야――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「今日は、手を繋いで登校とか……どうかなって！」"
translation = "「오늘은 손을 잡고 등교하는 건…… 어떨까 싶어서!」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「い、今までは、恥ずかしくて……人目がない時とかにしてたけど……」"
translation = "「지, 지금까지는 부끄러워서…… 사람 눈이 없을 때만 하곤 했지만……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「会長と恋人になってから、時間も経って慣れて来たし……あとその、もう新星学園生なら全員に、私たちが恋人同士だってバレちゃってるし……」"
translation = "「회장님과 연인이 되고 나서 시간도 흘러서 익숙해졌고…… 그리고 그, 이제 신성학원생이라면 전원에게 우리가 연인 사이라는 걸 들켜버렸고……」"

[[dialogue]]
speaker = "unk"
original = "まあ……確かに"
translation = "뭐…… 확실히 그렇지."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「それはもう、全然構わないんだけど……」"
translation = "「그건 이제 전혀 상관없긴 한데……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「あとはそう、この前のノヴァフォームの一件とかもあって……私、会長の恋人として、もうちょっと自信を持てるようになりたいなって！」"
translation = "「나머지는 그래, 지난번 노바 폼 건도 있고 해서…… 나, 회장님의 연인으로서 좀 더 자신감을 가질 수 있게 되고 싶어서!」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「だから、手を繋いで歩くくらいは、人目を気にしないで堂々とできるようになれたらと……！」"
translation = "「그러니까 손을 잡고 걷는 정도는 남의 시선을 신경 쓰지 않고 당당하게 할 수 있게 되고 싶어……!」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら、喜んで"
translation = "그런 거라면 기꺼이."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「う、うん♪\u3000じゃあ、失礼して――」"
translation = "「으, 응♪ 그럼 실례해서――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイの方から、そっと俺の手を取って、繋ぐ。"
translation = "마토이가 먼저 살며시 내 손을 잡고 깍지를 낀다."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「い、意識しちゃうと、ちょっとドキドキするけど……えへへ♪\u3000会長の手、温かくて心地良いな<emoji=heart04>」"
translation = "「의, 의식해버리니까 조금 두근거리지만…… 에헤헤♪ 회장님 손, 따뜻해서 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「って、会長、どうしたの？\u3000なんか驚いたような顔してるけど……」"
translation = "「어라, 회장님 왜 그래? 왠지 놀란 것 같은 얼굴인데……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「――手を繋ぐといっても、恋人繋ぎだとは思わなかった？\u3000えっ、恋人だから、そっちの方が普通かなって思ったんだけど……」"
translation = "「――손을 잡는다고 해도 연인 깍지를 낄 줄은 몰랐다고? 엣, 연인이니까 그쪽이 더 당연하다고 생각했는데……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「ふ、普通の繋ぎ方にした方が、よかったかな？\u3000……やめちゃう？」"
translation = "「펴, 평범하게 잡는 게 좋았을까? ……그만둘까?」"

[[dialogue]]
speaker = "unk"
original = "……いや、マトイがいいなら、それがいい"
translation = "……아니, 마토이가 좋다면 그게 좋아."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「いいの？\u3000……えへへ<emoji=heart04>\u3000ありがと、会長……<emoji=heart04>」"
translation = "「정말? ……에헤헤<emoji=heart04> 고마워, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってマトイは嬉しそうに、ぎゅっと恋人繋ぎの手を握り直すのだった。"
translation = "그렇게 말하며 마토이는 기쁜 듯이 깍지 낀 손을 꽉 다시 고쳐 쥐었다."

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「って、気づいたらもう、学園の前まで来ちゃったね……よしっ」"
translation = "「앗, 정신 차려보니 벌써 학원 앞까지 와버렸네…… 좋아.」"

[[dialogue]]
speaker = "unk"
original = "マトイはそっと繋いでいた手を離して──"
translation = "마토이는 살며시 잡고 있던 손을 놓고――"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「ＴＰＯは弁えなきゃだもんね！\u3000普通モードに切り替えて、教室に行こう！」"
translation = "「TPO는 지켜야 하니까! 평범 모드로 전환해서 교실로 가자!」"

[[dialogue]]
speaker = "unk"
original = "早くも頭を切り替えて『普通のクラスメイト』の顔になるマトイに、少しの名残り惜しさを感じていると――"
translation = "재빨리 머릿속을 전환해 『평범한 반 친구』의 얼굴이 되는 마토이에게 약간의 아쉬움을 느끼고 있자――"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「…………ん～～。誰もこっち、注目してないよね？」"
translation = "「…………으음~. 아무도 이쪽 주목 안 하고 있지?」"

[[dialogue]]
speaker = "unk"
original = "マトイ？\u3000キョロキョロして一体どうし──"
translation = "마토이? 두리번거리며 대체 뭘――"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「会長……<emoji=heart04>」"
translation = "「회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、マトイが校門の影に俺を引っ張り、覗き込むように顔を近づけてきたかと思うと――"
translation = "다음 순간, 마토이가 교문 그림자로 나를 끌어당겨 들여다보듯 얼굴을 가까이 가져다 댔는가 싶더니――"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "っ……！？！？"
translation = "윽……!?!?"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「えへへ♪\u3000学園まで来たら自重するつもりだったのに……しちゃった<emoji=heart04>」"
translation = "「에헤헤♪ 학원까지 오면 자제할 생각이었는데…… 해버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「続きは……また２人きりになった時に、ね<emoji=heart04>」"
translation = "「뒷일은…… 다시 둘만 있게 됐을 때, 하자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "離れて照れた笑みを浮かべながら、小さい声で言うマトイ。"
translation = "떨어져서 수줍은 미소를 띠며 작은 목소리로 말하는 마토이."

[[dialogue]]
speaker = "unk"
original = "こ、攻撃力が高すぎる……！"
translation = "공, 공격력이 너무 높아……!"

[[dialogue]]
speaker = "クラスの女子"
original = "「マトイ、おはよ～！」"
translation = "「마토이, 안녕~!」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「うん、おはよ～♪\u3000ねぇ、昨日のドラマ観た？\u3000――ヤバかったよね～」"
translation = "「응, 안녕~♪ 얘, 어제 드라마 봤어? ――대박이었지~」"

[[dialogue]]
speaker = "unk"
original = "俺は教室に行ってからもドキドキがまだ収まらず、普通モードでクラスメイトと話しているマトイに、ちらっと視線を向けていると――"
translation = "나는 교실에 가서도 두근거림이 가라앉지 않아 평범 모드로 친구들과 이야기하고 있는 마토이에게 슬쩍 시선을 보내고 있자――"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「……！\u3000えへへ……<emoji=heart04>」"
translation = "「……! 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "クラスの女子"
original = "「？\u3000どうしたのマトイ、急に笑顔になったりして？」"
translation = "「? 왜 그래 마토이, 갑자기 웃고 그래?」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「ううん、何でもない♪」"
translation = "「으응, 아무것도 아니야♪」"

[[dialogue]]
speaker = "unk"
original = "クラスメイトの子の視線に入らない位置で小さく手を振って、微笑み返してくれる彼女が可愛すぎて、内心悶えてしまう俺なのであった――"
translation = "반 친구의 시선에 닿지 않는 위치에서 작게 손을 흔들며 미소 지어주는 그녀가 너무 귀여워서, 내심 몸부림치고 마는 나였다――"

