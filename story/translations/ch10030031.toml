[[dialogue]]
speaker = "unk"
original = "第１話,甘えたがりな恋人,P"
translation = "제1화, 어리광 부리고 싶은 연인"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと恋人になってから迎えたお正月休み。俺たちはデートに出かけることになった――"
translation = "비너스와 연인이 되고 나서 맞이한 설날 연휴. 우리들은 데이트를 나가게 되었다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト～！\u3000おっはよ～♪」"
translation = "「쿠로토~! 안녕~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃ～ん♪\u3000今日のデートは、お正月っていうことで晴れ着にしてみたわ！」"
translation = "「짜잔~♪ 오늘 데이트는 설날이니까 설빔으로 입어봤어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、いつもよりオシャレしたくて、うちのメイド長にメイクしてもらったの♪\u3000どうかしら？」"
translation = "「그래도 평소보다 더 멋내고 싶어서, 우리 메이드장에게 메이크업도 받았단다♪ 어떠니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――綺麗？\u3000えへへ～♪\u3000ありがと♪」"
translation = "「──예뻐? 에헤헤~♪ 고마워♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それで、今日なんだけど、新年になって初めてのデートじゃない？」"
translation = "「그래서, 오늘 말인데, 새해 들어 첫 데이트잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その記念にスペシャルな感じにしたいと思って、私、考えてきたの！\u3000ズバリ今回は――」"
translation = "「그 기념으로 스페셜한 느낌을 내고 싶어서, 내가 생각해왔어! 바로 이번엔──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトにお姫様抱っこしてもらいながらデートしてみたいんだけど、どうかしら！？」"
translation = "「쿠로토에게 공주님 안기를 받은 채로 데이트를 해보고 싶은데, 어때!?」"

[[dialogue]]
speaker = "unk"
original = "さすがに人前だと目立って恥ずかしいよ！？"
translation = "아무래도 남들 앞이면 눈에 띄어서 부끄러운데!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ♪\u3000冗談よ。ただ――」"
translation = "「후훗♪ 농담이야. 다만──」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺の腕に抱き着いてきた。"
translation = "비너스는 내 팔에 매달려 왔다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その分、今日はいっぱい甘えちゃうんだから<emoji=heart04>\u3000えへへ♪\u3000じゃあ、いきましょ！」"
translation = "「그만큼 오늘은 잔뜩 어리광 부릴 거니까<emoji=heart04> 에헤헤♪ 자, 가자!」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは街へ移動し、デートを開始したのだが――"
translation = "그러고 나서 우리들은 시내로 이동해 데이트를 시작했지만──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇねぇ、クロト、こういう人通りが多いところでもイチャイチャしてるカップルって、たまに見るわよね？」"
translation = "「저기 저기, 쿠로토, 이런 유동 인구가 많은 곳에서도 꽁냥거리는 커플들 가끔 보이잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だから、意外とやってみると、大丈夫な気がしない？\u3000というわけで、ん～<emoji=heart04>」"
translation = "「그러니까 의외로 해보면 괜찮을 것 같지 않아? 그런 의미에서, 음~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――なにって、キスのおねだりよ<emoji=heart04>\u3000恋人なんだし、別におかしくないでしょ？」"
translation = "「──뭐냐니, 키스해달라는 거지<emoji=heart04> 연인 사이인데 별로 이상할 거 없잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――お姫様抱っこより恥ずかしいからＮＧ？\u3000ふふっ、じゃあ、人気のないところを見つけたら、いいの？」"
translation = "「──공주님 안기보다 부끄러우니까 안 된다고? 후훗, 그럼 사람 없는 곳을 찾으면 괜찮은 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ～！\u3000今ちょっと、考える間があったわよ？\u3000恋人なんだから、顔見たらわかっちゃうんだから♪」"
translation = "「아~! 지금 잠깐 고민했지? 연인 사이니까 얼굴만 봐도 다 안다고♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、キスがお預けなら仕方ないわね。その代わりに繋いだ手の方でイチャイチャすることにするわ」"
translation = "「하지만 키스가 보류라면 어쩔 수 없네. 그 대신 맞잡은 손 쪽으로 꽁냥거리기로 하겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほら、こうやって小指だけで繋いでみたりすると……赤い糸で繋がってるみたいな感じがしない？\u3000えへへ♪」"
translation = "「자, 이렇게 새끼손가락만 걸고 있으면…… 붉은 실로 이어진 듯한 느낌이 들지 않아? 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "ウィンドウショッピングを楽しんだ後、俺たちはカフェに入って、ケーキを注文する。"
translation = "윈도쇼핑을 즐긴 후, 우리들은 카페에 들어가 케이크를 주문한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト、いつもみたいに食べさせて～♪\u3000あ～ん<emoji=heart04>」"
translation = "「쿠로토, 평소처럼 먹여줘~♪ 아~앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――あむっ♪\u3000もぐもぐ……ん～<emoji=heart04>\u3000初めて入ったお店だけど、聞いていた通り、すごく美味しいわ♪」"
translation = "「──아함♪ 우물우물…… 음~<emoji=heart04> 처음 온 가게인데 듣던 대로 정말 맛있어♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほら、今度はクロトが食べる番よ。フォークでケーキを切って……はい、口開けて？\u3000あ～ん<emoji=heart04>」"
translation = "「자, 이번엔 쿠로토가 먹을 차례야. 포크로 케이크를 잘라서…… 자, 입 벌려봐? 아~앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どう？\u3000ショートケーキ、甘くて美味しい？\u3000じゃあ今度は、クロトの注文したチョコレートケーキが食べたいわ♪」"
translation = "「어때? 쇼트케이크, 달콤하고 맛있어? 그럼 이번엔 쿠로토가 주문한 초콜릿 케이크를 먹고 싶어♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ～ん<emoji=heart04>\u3000あむっ♪\u3000ん～<emoji=heart04>\u3000こっちもすごく美味しくて、頬っぺたが落ちちゃいそう♪」"
translation = "「아~앙<emoji=heart04> 아함♪ 음~<emoji=heart04> 이쪽도 정말 맛있어서 뺨이 떨어질 것 같아♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「恋人だと、２つ頼んで、こういう食べさせ合いっこができるからお得よね♪」"
translation = "「연인이면 두 개 시켜서 이렇게 서로 먹여줄 수 있으니까 이득이네♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え？\u3000――恋人でも、必ずしもするわけではない？\u3000そうなの？」"
translation = "「에? ──연인이라고 반드시 그러는 건 아니라고? 그래?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ、だから星徒会のみんなに話した時、バカップルだって言ってたのね！\u3000私は気にしないけど！」"
translation = "「앗, 그래서 성도회 애들한테 말했을 때 닭살 커플이라고 했던 거구나! 나는 상관없지만!」"

[[dialogue]]
speaker = "unk"
original = "俺は気になるんだけど！？"
translation = "나는 신경 쓰이는데!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だとしても、あ～んしてもらうのって、それだけで幸せがトッピングされて、美味しくなる感じがしない？」"
translation = "「그렇다고 해도, 아~앙 받는 건 그것만으로도 행복이 토핑돼서 더 맛있어지는 느낌 안 들어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私はこれからも、クロトにい～っぱい、あ～んってしてもらいたいわ。クロトはどう？」"
translation = "「나는 앞으로도 쿠로토에게 아~앙 하고 잔뜩 받고 싶어. 쿠로토는 어때?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――えへへ♪\u3000じゃあ、食べさせ合いっこの続きね♪」"
translation = "「──에헤헤♪ 그럼 서로 먹여주기 계속하자♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はい、クロトもチョコケーキ、あ～ん<emoji=heart04>」"
translation = "「자, 쿠로토도 초코 케이크, 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからもヴィーナスと色んなところを周り、気づけば夜になっていた。"
translation = "그 후로도 비너스와 여러 곳을 돌다 보니 어느덧 밤이 되었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もうこんな時間！\u3000これ以上遅くなると、九浄家のみんなに心配されちゃうわね」"
translation = "「벌써 시간이 이렇게! 더 늦으면 쿠죠가 식구들이 걱정하겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だけど、今日は恋人っぽいことが沢山できたし、満足なお正月デートだったわ♪」"
translation = "「그래도 오늘은 연인다운 일을 잔뜩 할 수 있어서 만족스러운 설날 데이트였어♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあ、帰りましょうか――って、クロト？」"
translation = "「그럼 이제 돌아갈까── 어라, 쿠로토?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きゃっ……こ、これって、お姫様抱っこ？」"
translation = "「꺄악…… 이, 이거 공주님 안기야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――もう辺りは暗いし、帰り道なら目立たないから？」"
translation = "「──이미 주변도 어둡고, 귀갓길이면 눈에 안 띄니까?」"

[[dialogue]]
speaker = "unk"
original = "それに、冗談っぽく言ってたけど、本当はしてもらいたそうな顔だったから、と俺は告げる。"
translation = "게다가 농담처럼 말했지만 사실은 받고 싶어 하는 표정이었으니까, 라고 나는 전한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！\u3000クロト……♪」"
translation = "「……! 쿠로토……♪」"

[[dialogue]]
speaker = "unk"
original = "よし、じゃあ行くぞ"
translation = "좋아, 그럼 가자."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わぁ～～～っ♪\u3000ふふっ、見て見て、流れ星が綺麗だわ！」"
translation = "「와아~~~♪ 후훗, 봐봐, 별똥별이 예쁘네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇ、クロト！」"
translation = "「저기, 쿠로토!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありがと。今日のデートは大満足よ♪」"
translation = "「고마워. 오늘 데이트는 정말 만족스러워♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ご満悦のヴィーナスは、俺の頬にキスをしてくれたのだった――"
translation = "대만족한 비너스는 내 뺨에 키스를 해주었다──"

