[[dialogue]]
speaker = "unk"
original = "リクリエの本波を退けてからも、俺たち星騎士の戦いは続いていた。"
translation = "리크리에의 본파를 물리치고 나서도 우리 성기사들의 싸움은 계속되고 있었다."

[[dialogue]]
speaker = "unk"
original = "特に最近は、従来の生物型モンスターではなく、堅牢な耐久性を持つ機械型モンスターの出現頻度が上昇している。"
translation = "특히 최근에는 기존의 생물형 몬스터가 아니라 견고한 내구성을 가진 기계형 몬스터의 출현 빈도가 상승하고 있다."

[[dialogue]]
speaker = "unk"
original = "手練れのプリマステラでも危険を伴う相手──しかし俺たち星騎士も、指を咥えているばかりじゃない。"
translation = "노련한 프리마스텔라도 위험을 동반하는 상대── 하지만 우리 성기사들도 손가락만 빨고 있지는 않다."

[[dialogue]]
speaker = "unk"
original = "星騎士のさらなる潜在能力を引き出す『ノヴァフォーム』。"
translation = "성기사의 한층 더 높은 잠재 능력을 끌어내는 『노바 폼』."

[[dialogue]]
speaker = "unk"
original = "研鑽を積んだ上で、精神的なブレイクスルーを成し得た星騎士に、魔王の力を注ぐことで解放できる新型戦闘フォームである。"
translation = "연마를 거듭한 뒤 정신적인 돌파구를 이뤄낸 성기사에게 마왕의 힘을 주입함으로써 해방할 수 있는 신형 전투 폼이다."

[[dialogue]]
speaker = "unk"
original = "……ノヴァフォームについては、使い手が増えたことで多少の研究が進んだ。"
translation = "……노바 폼에 대해서는 사용자가 늘어남에 따라 어느 정도 연구가 진행되었다."

[[dialogue]]
speaker = "unk"
original = "瞬間的な出力は既存の戦闘服を大きく凌駕するものの、星力の燃費が悪く、長期戦闘には向かない。"
translation = "순간적인 출력은 기존의 전투복을 크게 능가하지만 성력 연비가 나빠 장기전에는 적합하지 않다."

[[dialogue]]
speaker = "unk"
original = "変身を解いた後の疲労もかなりのものであるらしく、使用者に大きな負荷を強いる。"
translation = "변신을 푼 뒤의 피로도 상당한 것 같아 사용자에게 큰 부담을 강요한다."

[[dialogue]]
speaker = "unk"
original = "しかし、そうしたデメリットを踏まえてもなお、機械型モンスターへの有効な攻撃手段であることは間違いなかった。"
translation = "하지만 그런 단점을 감안하더라도 기계형 몬스터에 대한 유효한 공격 수단임은 틀림없었다."

[[dialogue]]
speaker = "unk"
original = "現在、新星星徒会は、ノヴァフォームを獲得した星騎士を増やすことが喫緊の課題となっている。"
translation = "현재 신성학생회는 노바 폼을 획득한 성기사를 늘리는 것이 시급한 과제가 되어 있다."

[[dialogue]]
speaker = "unk"
original = "だから俺は今日も、彼女の訓練に付き合っていた──"
translation = "그래서 나는 오늘도 그녀의 훈련을 돕고 있었다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「赤き惑星の力、ここに──スカーレットシータ！」"
translation = "「붉은 행성의 힘, 여기에── 스칼렛 세타!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ふう。会長、今日も訓練に付き合っていただき、ありがとうございました」"
translation = "「……후우. 회장님, 오늘도 훈련을 도와주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「昨日の反省を生かして、攻め手を変えてみたのですが……どうでしょう？」"
translation = "「어제의 반성을 살려 공격 방식을 바꿔보았는데…… 어떨까요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノヴァフォーム覚醒の兆しとなる輝きは、私の中に見えるでしょうか？」"
translation = "「노바 폼 각성의 전조가 되는 광채가 제 안에서 보이나요?」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームを得るために行使する魔王の力──『アルケインノヴァエクストリーム』。"
translation = "노바 폼을 얻기 위해 행사하는 마왕의 힘── 『알케인 노바 익스트림』."

[[dialogue]]
speaker = "unk"
original = "覚醒が可能になった星騎士には、俺にだけ感知することができる『魂の輝き』が見えるのだが……"
translation = "각성이 가능해진 성기사에게는 나에게만 감지되는 『영혼의 광채』가 보이는데……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むむ……そのお顔を見るに、私はまだ覚醒には至れないようですね。残念です」"
translation = "「음음…… 그 표정을 보니 저는 아직 각성에 이르지 못한 모양이네요. 아쉽습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こうして放課後は毎日、会長とマンツーマンの特訓をしていますが……道はなかなかに険しそうですね」"
translation = "「이렇게 방과 후 매일 회장님과 일대일 특훈을 하고 있지만…… 길은 꽤 험난해 보이네요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でも焦っても仕方がありません。仮説と実践を繰り返し、今後も邁進していきたいと思います」"
translation = "「하지만 조급해해도 소용없죠. 가설과 실천을 반복하며 앞으로도 매진하고 싶습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「２人とも、お疲れ様～♪」"
translation = "「둘 다 수고했어~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「昨日よりも動きが良くなってたと思うよ！\u3000アナ、これからも頑張って！」"
translation = "「어제보다 움직임이 좋아졌다고 생각해! 아나, 앞으로도 힘내!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「イエス。先輩方の足を引っ張らないよう、全力を尽くす所存です。つきましては、頑張ったのでご褒美をください」"
translation = "「예스. 선배님들의 발목을 잡지 않도록 전력을 다할 생각입니다. 그런 의미에서 열심히 했으니 포상을 주세요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もちろんよ～。疲れてるだろうし、お姉ちゃんがぎゅーってしてあげる～<emoji=heart04>」"
translation = "「물론이지~. 지쳤을 테니 언니가 꼬옥 해줄게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナの大好きな和菓子、用意してあるよ。今日はこし餡たっぷりのおまんじゅう。食べる？」"
translation = "「아나가 제일 좋아하는 화과자 준비해 뒀어. 오늘은 고운 팥앙금이 가득 든 만쥬야. 먹을래?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「厳正なる審査の結果、マトイ先輩を今日のＭＶＰとします。花より団子、ハグよりも和菓子」"
translation = "「엄정한 심사 결과, 마토이 선배를 오늘의 MVP로 선정합니다. 금강산도 식후경, 허그보다는 화과자.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あーん、またおまんじゅうに負けちゃったわ～……お姉ちゃん、悔しいっ！」"
translation = "「아앙, 또 만쥬한테 져버렸네~…… 언니는 분해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いい加減諦めましょう。アナの中で和菓子は絶対の１位なんですから……」"
translation = "「이제 그만 포기하세요. 아나에게 화과자는 절대적인 1위니까요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いつの日かお姉ちゃんの愛が、和菓子に打ち勝つ日がくると思ってるのに～。しょんぼりだわ～……」"
translation = "「언젠가 언니의 사랑이 화과자를 이길 날이 올 거라고 생각하는데~. 시무룩해지네~……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もぐもぐ。その愛は実りません。もぐもぐもぐ」"
translation = "「우물우물. 그 사랑은 결실을 보지 못합니다. 우물우물우물.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁ……やはり薄皮のおまんじゅうには、舌触りのなめらかなこし餡がベストマッチ。糖分で疲れも吹き飛びます♪」"
translation = "「하아…… 역시 얇은 피의 만쥬에는 혀끝에 닿는 느낌이 매끄러운 고운 팥앙금이 베스트 매치. 당분 덕분에 피로도 날아가네요♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「たっだいま～！\u3000パトロールから帰ったわ！\u3000アナ、調子はどう？」"
translation = "「다녀왔어~! 순찰 마치고 돌아왔어! 아나, 상태는 어때?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もぐもぐ。残念ながらおまんじゅうの他に、何の成果も得られませんでした」"
translation = "「우물우물. 안타깝게도 만쥬 외에는 아무런 성과도 얻지 못했습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「昨日と同じってわけねー。んー、一体全体、ノヴァフォームを得るための条件って何なのかしら？」"
translation = "「어제랑 똑같다는 거네ー. 흠, 도대체 노바 폼을 얻기 위한 조건이 뭘까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「新星星徒会の中でも、まだ覚醒してないのは私とアナだけだし。焦るわね……！」"
translation = "「신성학생회 중에서도 아직 각성하지 못한 건 나랑 아나뿐이고. 조바심 나네……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「って言ってもヴィーナスは素のままで、ノヴァフォームの私と同じくらいの火力を出しちゃってる気もするんだけど……」"
translation = "「그렇다고는 해도 비너스는 평소 상태로 노바 폼인 나랑 비슷한 화력을 내는 것 같기도 하지만……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「この前も、機械型モンスターを私と一緒に倒してたのに、撃破数が同じだったし！」"
translation = "「저번에도 기계형 몬스터를 나랑 같이 쓰러뜨렸는데 격퇴 수가 같았고!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あいつ滅茶苦茶硬いわよね！？\u3000ビームの撃ちすぎでクタクタになっちゃうから嫌いだわ」"
translation = "「그 녀석 엄청 단단하잖아!? 빔을 너무 쏴서 기진맥진해지니까 싫다구.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長は色々と規格外ですから……もぐもぐ。そういうわけで現状、一番足を引っ張ってるのは私です。焦りますね……もぐもぐ」"
translation = "「전 회장님은 여러모로 규격 외니까요…… 우물우물. 그런 고로 현상태에서 가장 발목을 잡고 있는 건 저입니다. 초조하네요…… 우물우물.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あんまり焦ってる感じがしない……！」"
translation = "「별로 초조해하는 느낌이 안 들어……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──ごくん。まあ、他にも色々と搦め手を講じていますから」"
translation = "「──꿀꺽. 뭐, 그 밖에도 여러 가지 방책을 강구하고 있으니까요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「カラメテ？\u3000新しい和菓子かしら？」"
translation = "「방책? 새로운 화과자 이름인가?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「正攻法とは違う作戦って意味だよ、ヴィーナス」"
translation = "「정공법과는 다른 작전이라는 뜻이야, 비너스.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「機械型モンスターの守備力は堅牢の一言。それなのに出現数は増加の一途をたどってる」"
translation = "「기계형 몬스터의 수비력은 견고함 그 자체. 그런데도 출현 수는 계속 늘어나고 있습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「だからこそ、戦闘力が飛びぬけていない星騎士でも、戦える体制を整えるべきだと考えました」"
translation = "「그렇기에 전투력이 뛰어나지 않은 성기사라도 싸울 수 있는 체제를 갖춰야 한다고 생각했습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実は数日前から、機械型モンスターを弱らせる薬品の生成を、アニマ先輩に依頼しています」"
translation = "「실은 며칠 전부터 기계형 몬스터를 약화시키는 약품 생성을 아니마 선배님께 의뢰해 뒀습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なるほど……！\u3000困った時の錬金術ってわけだね」"
translation = "「그렇구나……! 역시 곤란할 때는 연금술이지.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。この後、購買部で会う約束です。というわけで会長、一緒に行きましょう」"
translation = "「네. 이따가 매점에서 만나기로 약속했습니다. 그런 고로 회장님, 같이 가시죠.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長に試したい新薬があるそうなので。副作用があったらすまないネ～、と言っていました」"
translation = "「회장님에게 테스트하고 싶은 신약이 있다고 하더군요. 부작용이 있으면 미안하다네~, 라고 말했습니다.」"

[[dialogue]]
speaker = "unk"
original = "また女の子になっちゃう……"
translation = "또 여자가 되어버려……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫！\u3000クロトは女の子になっても可愛いから！！」"
translation = "「괜찮아! 쿠로토는 여자가 되어도 귀여우니까!!」"

[[dialogue]]
speaker = "unk"
original = "何も大丈夫じゃないが？？？"
translation = "하나도 안 괜찮은데???"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは……頑張ってね、会長」"
translation = "「아하하…… 힘내, 회장님.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「行ってらっしゃ～い<emoji=heart04>」"
translation = "「다녀오렴~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そういうわけで、俺はアナと共に、アニマ先輩の待つ購買部へと向かったのだが──"
translation = "그리하여 나는 아나와 함께 아니마 선배가 기다리는 매점으로 향했는데──"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「いらっしゃいませ、お待ちしておりました」"
translation = "「어서 오세요, 기다리고 있었습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「お初にお目にかかります。私は購買部の美少女看板娘２号。不動シュティレと申します。ぶい（無表情でピース）」"
translation = "「처음 뵙겠습니다. 저는 매점의 미소녀 간판녀 2호. 후도 슈틸레라고 합니다. 브이 (무표정으로 피스)」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「えっと……？」"
translation = "「어라……?」"

[[dialogue]]
speaker = "unk"
original = "──どちら様！？"
translation = "──누구세요!?"

[[dialogue]]
speaker = "unk"
original = "そこには、まったく見知らぬ附属校の生徒の姿があった。"
translation = "그곳에는 전혀 본 적 없는 부속교 학생의 모습이 있었다."

