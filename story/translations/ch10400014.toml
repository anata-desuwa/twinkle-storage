[[dialogue]]
speaker = "unk"
original = "第４話,アイリーンの想い,P"
translation = "제4화, 아이린의 마음, P"

[[dialogue]]
speaker = "アイリーン"
original = "「デートしよっ、会長さん♪」"
translation = "「데이트하자, 회장님♪」"

[[dialogue]]
speaker = "unk"
original = "いきなり……！？"
translation = "갑자기……!?"

[[dialogue]]
speaker = "アイリーン"
original = "「デートって、仲のいい男の人と行くって聞いたよ。とっても楽しいんでしょ？\u3000ならしない理由ないでしょっ」"
translation = "「데이트란 건 사이좋은 남자랑 가는 거라고 들었어. 엄청 즐거운 거지? 그렇다면 안 할 이유가 없잖아.」"

[[dialogue]]
speaker = "アイリーン"
original = "「デートしたい～っ、したいしたいしたい～っ！」"
translation = "「데이트하고 싶어~, 하고 싶어 하고 싶어 하고 싶어~!」"

[[dialogue]]
speaker = "アイリーン"
original = "「…………ダメ？」"
translation = "「…………안 돼?」"

[[dialogue]]
speaker = "unk"
original = "わかった、デートしよう！"
translation = "알았어, 데이트하자!"

[[dialogue]]
speaker = "アイリーン"
original = "「やったー！\u3000じゃあ今度のお休みはデートだねっ」"
translation = "「앗싸! 그럼 이번 휴일은 데이트네.」"

[[dialogue]]
speaker = "アイリーン"
original = "「会長さーんっ、こっちこっちー！」"
translation = "「회장님~, 여기야 여기!」"

[[dialogue]]
speaker = "アイリーン"
original = "「それじゃ……えいっ♪\u3000おてて、ぎゅ～っと♪」"
translation = "「그럼…… 에잇♪ 손, 꼬옥♪」"

[[dialogue]]
speaker = "アイリーン"
original = "「どうして手を繋ぐんだって……だってデートでしょ？\u3000デートでは男の人と女の人がこうするって聞いたよ？」"
translation = "「왜 손을 잡냐니…… 그치만 데이트잖아? 데이트에선 남자랑 여자가 이렇게 한다고 들었어.」"

[[dialogue]]
speaker = "アイリーン"
original = "「えへへ……こうしてると不思議な気持ちになるね。会長さんもなるよね？\u3000うんうん、会長さんも一緒だよね～っ♪」"
translation = "「에헤헤…… 이러고 있으면 신기한 기분이 드네. 회장님도 그렇지? 응응, 회장님도 마찬가지구나~♪」"

[[dialogue]]
speaker = "アイリーン"
original = "「よーしっ、じゃあレッツゴー！」"
translation = "「조아쓰, 그럼 렛츠 고!」"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー！」"
translation = "「호!」"

[[dialogue]]
speaker = "アイリーン"
original = "「ん～？\u3000何あれ？\u3000アイスをひっくり返して――そんなことしたら落ちちゃうっ！？\u3000あれ、落ちない……？」"
translation = "「음~? 저건 뭐야? 아이스크림을 뒤집어서── 저렇게 하면 떨어지잖아!? 어라, 안 떨어지네……?」"

[[dialogue]]
speaker = "アイリーン"
original = "「へぇ～、トルコアイスっていうんだ！\u3000そんなのもあるんだね。おじさーん、アイス２つくださーい」"
translation = "「헤에~, 터키 아이스크림이라고 하는구나! 그런 것도 있네. 아저씨~, 아이스크림 두 개 주세요─」"

[[dialogue]]
speaker = "アイリーン"
original = "「ありがとうございまーすっ。えへへっ、ちょっと多めにおまけしてもらっちゃった～♪」"
translation = "「고맙습니다~. 에헤헤, 조금 많이 덤으로 받았어~♪」"

[[dialogue]]
speaker = "アイリーン"
original = "「ぺろっ。ん～っ、甘くておいしーっ♪\u3000はい、ミーちゃん」"
translation = "「할짝. 음~, 달콤하고 맛있어~♪ 자, 미짱.」"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー♪」"
translation = "「호♪」"

[[dialogue]]
speaker = "unk"
original = "学校はどう？"
translation = "학교는 어때?"

[[dialogue]]
speaker = "アイリーン"
original = "「すっごく楽しい！\u3000知らないことばっかりだし、ご飯はおいしいし、クラスのみんなも優しくしてくれるし」"
translation = "「엄청 즐거워! 모르는 것투성이고, 밥은 맛있고, 반 친구들도 다들 친절하게 대해줘.」"

[[dialogue]]
speaker = "アイリーン"
original = "「魔女とかネビュラのことは知ってる人にしか言えないから、秘密にしてるけど。遠い外国の人って設定なんだ♪」"
translation = "「마녀나 네뷸라에 대해서는 아는 사람한테밖에 말 못 하니까 비밀로 하고 있지만. 먼 외국 사람이라는 설정이야♪」"

[[dialogue]]
speaker = "アイリーン"
original = "「ぺろ、ぺろぺろ……あ～んっ♪\u3000ごちそうさまー。アイスってすごくおいしいけど、魔女の森にはないんだよね。魔法で作れないかな？」"
translation = "「할짝, 할짝할짝…… 아~앙♪ 잘 먹었습니다─. 아이스크림은 정말 맛있지만, 마녀의 숲에는 없단 말이지. 마법으로 못 만들까?」"

[[dialogue]]
speaker = "アイリーン"
original = "「よーし、次はお買い物！\u3000あとは映画とー、水族館とー、観覧車とー、あと夜景も見たいな～。……え、一日じゃそんなに回れない～？」"
translation = "「조아쓰, 다음은 쇼핑! 그다음은 영화랑─, 수족관이랑─, 관람차랑─, 그리고 야경도 보고 싶다~. ……에, 하루 만에 그렇게는 다 못 돌아다녀~?」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ、それならまたデートすればいいねっ。会長さんといっぱいデートしたいな～<emoji=heart04>」"
translation = "「아, 그러면 또 데이트하면 되겠네. 회장님이랑 잔뜩 데이트하고 싶어~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やりたいことたくさんだ"
translation = "하고 싶은 게 많구나."

[[dialogue]]
speaker = "アイリーン"
original = "「うん。お母さんがネビュラに所属してて、こっちの世界のことをいっぱいお話してくれたから、知ってるけど知らないことがたくさんあるんだ」"
translation = "「응. 엄마가 네뷸라에 소속되어 있어서 이쪽 세계 이야기를 잔뜩 해줬으니까, 알고 있지만 모르는 게 잔뜩 있어.」"

[[dialogue]]
speaker = "アイリーン"
original = "「だからお母さんが教えてくれたものを自分で見てみたい。行きたいところ、食べたいもの、やってみたいことばっかり」"
translation = "「그러니까 엄마가 가르쳐준 것들을 직접 보고 싶어. 가고 싶은 곳, 먹고 싶은 것, 해보고 싶은 것투성이야.」"

[[dialogue]]
speaker = "アイリーン"
original = "「デートだってそう。魔女は女しかいないから、森じゃ男の人とデートなんかできなかったもん」"
translation = "「데이트도 그래. 마녀는 여자밖에 없으니까, 숲에선 남자랑 데이트 같은 건 못 했는걸.」"

[[dialogue]]
speaker = "アイリーン"
original = "「自由の女神に、ピラミッドに、コロッセオに……地上絵も見たいな」"
translation = "「자유의 여신상에, 피라미드에, 콜로세움에…… 지상화도 보고 싶어.」"

[[dialogue]]
speaker = "アイリーン"
original = "「人間界だけじゃなくて魔界にも行ってみたい。お母さんが言ってたんだけど、魔界ってとってもメチャクチャらしいよ。きっとすごく楽しいよっ」"
translation = "「인간계뿐만 아니라 마계에도 가보고 싶어. 엄마가 말했는데, 마계는 엄청 엉망진창이래. 분명 엄청 즐거울 거야.」"

[[dialogue]]
speaker = "unk"
original = "お母さんが大好きなんだな"
translation = "어머니를 정말 좋아하는구나."

[[dialogue]]
speaker = "アイリーン"
original = "「うん、大好き！」"
translation = "「응, 정말 좋아해!」"

[[dialogue]]
speaker = "アイリーン"
original = "「ネビュラは撤退しろって命令したけど、お母さんはこの世界をたくさん見てきたから、守りたくなったんだと思う」"
translation = "「네뷸라는 철수하라고 명령했지만, 엄마는 이 세계를 많이 봐왔으니까 지키고 싶어진 거라고 생각해.」"

[[dialogue]]
speaker = "アイリーン"
original = "「私はお母さんが守ろうとした世界を見たいんだ。ね、ミーちゃん」"
translation = "「나는 엄마가 지키려고 했던 세계를 보고 싶어. 그치, 미짱.」"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー」"
translation = "「호.」"

[[dialogue]]
speaker = "アイリーン"
original = "「いろんなものを見て回ったら、お母さんが最期に見たものを私も見に行くの。その時は一緒に来てくれないかな、会長さん？」"
translation = "「이것저것 보러 돌아다니면, 엄마가 마지막에 봤던 것을 나도 보러 갈 거야. 그때는 같이 와주지 않을래, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "うん、きっと"
translation = "응, 꼭."

[[dialogue]]
speaker = "アイリーン"
original = "「ありがとう！」"
translation = "「고마워!」"

[[dialogue]]
speaker = "アイリーン"
original = "「じゃあデートの続きだね。……あ、あのお城みたいな建物は何？\u3000入ってみたいな～」"
translation = "「그럼 데이트 계속하자. ……아, 저 성 같은 건물은 뭐야? 들어가 보고 싶다~.」"

[[dialogue]]
speaker = "アイリーン"
original = "「なんでそんなに慌ててるの？\u3000アイリーンには早い？\u3000もーっ、子ども扱いしないでってばー！」"
translation = "「왜 그렇게 당황하는 거야? 아이린한테는 일러? 정말~, 어린애 취급하지 말라니까─!」"

[[dialogue]]
speaker = "アイリーン"
original = "「じゃああれ買って、あれ。指輪。キラキラしてるやつ！」"
translation = "「그럼 저거 사줘, 저거. 반지. 반짝반짝하는 거!」"

[[dialogue]]
speaker = "アイリーン"
original = "「それもアイリーンには早い？\u3000え～っ、会長さんのイジワルっ」"
translation = "「그것도 아이린한테는 일러? 에~, 회장님 심술쟁이.」"

[[dialogue]]
speaker = "アイリーン"
original = "「なーんて、ウソウソ。指輪って大好きな人にあげるものなんでしょ？」"
translation = "「농~담, 거짓말이야. 반지는 정말 좋아하는 사람한테 주는 거지?」"

[[dialogue]]
speaker = "アイリーン"
original = "「だから指輪はまた今度。会長さんが私のこと大好きになったら、その時はプレゼントしてもらうからねっ！」"
translation = "「그러니까 반지는 다음에. 회장님이 나를 정말 좋아하게 되면, 그때 선물 받을 거니까!」"

