[[dialogue]]
speaker = "シズル"
original = "「はじめまして、鵜飼シズルです。ようこそ紫桜の里へお越しくださいました。みなさんを歓迎します」"
translation = "「처음 뵙겠습니다, 우카이 시즈루입니다. 자앵마을에 오신 것을 환영해요. 여러분을 환영합니다.」"

[[dialogue]]
speaker = "unk"
original = "この方が師匠……？"
translation = "이분이 스승님……?"

[[dialogue]]
speaker = "unk"
original = "ええと……？"
translation = "저기……?"

[[dialogue]]
speaker = "シズル"
original = "「初めましての方には大抵驚かれてしまいますが、これでもそれなりに年を重ねているんですよ」"
translation = "「처음 뵙는 분들은 대부분 놀라시지만, 이래 봬도 나름대로 나이를 먹었답니다.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「どっからどう見ても、ちっちゃかわいい女の子でしょー」"
translation = "「어디로 봐도 작고 귀여운 여자아이잖아─」"

[[dialogue]]
speaker = "せつな"
original = "「師匠は若作りでござるからなぁ」"
translation = "「스승님은 젊어 보이려 애쓰시니까 말이오 소.」"

[[dialogue]]
speaker = "シズル"
original = "「もー、若作りとは何事ですか？\u3000いつまでもお若くて良いですね～、とかいろいろ言い方はあるでしょう？」"
translation = "「정말, 젊어 보이려 애쓰다니 무슨 말씀이세요? 언제까지나 젊으셔서 좋겠네요~라든가 여러 가지 표현이 있잖아요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「若いなんてレベルじゃないんですけど……それに、只者じゃないオーラを感じます……」"
translation = "「젊은 수준이 아닌 것 같은데…… 게다가, 보통이 아닌 오라가 느껴져요……」"

[[dialogue]]
speaker = "ヨミ"
original = "「って……ひー、ふー、みー、よー……９本！？\u3000ってことはもしかして『九尾の狐』なんですか！？」"
translation = "「그보다…… 하나, 둘, 셋, 넷…… 9개!? 그건 설마 『구미호』인가요!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「尻尾が多い方がいいの？\u3000じゃあヨミヨミのちょー凄いバージョンってことだ～」"
translation = "「꼬리가 많은 게 좋은 거야? 그럼 요미요미의 초 굉장한 버전이라는 거네~」"

[[dialogue]]
speaker = "ヨミ"
original = "「同じ狐耳ではありますが、種族としては全く違う種族です……でも、ちょー凄いってところはその通りです」"
translation = "「같은 여우 귀이긴 합니다만, 종족으로서는 완전히 다른 종족이에요…… 하지만 초 굉장하다는 점은 맞아요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「へえ～、そうなんだー！\u3000あ、記念にちょっちモフらせてもらっていいですかっ？」"
translation = "「헤에~ 그렇구나! 아, 기념으로 초큼 복슬복슬하게 만져봐도 될까요?」"

[[dialogue]]
speaker = "シズル"
original = "「もふ、ですか……？」"
translation = "「모후모후, 말인가요……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「触って、撫でて、その感触を確かめたいってことですよ～」"
translation = "「만지고, 쓰다듬고, 그 감촉을 확인하고 싶다는 뜻이에요~」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちょっ、ウズメさん、失礼ですよっ」"
translation = "「잠깐, 우즈메 씨, 실례잖아요!」"

[[dialogue]]
speaker = "シズル"
original = "「えへへっ♪\u3000触るくらいでしたらいいですよ、どうぞどうぞです♪」"
translation = "「에헤헤♪ 만지는 정도라면 괜찮아요, 어서 어서요♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「やったー！\u3000それじゃ遠慮なく……もふもふもふもふ……おーっ、めっちゃもふもふだぁ～」"
translation = "「야호! 그럼 사양 않고…… 복슬복슬복슬복슬…… 오─ 진짜 복슬복슬하다아~」"

[[dialogue]]
speaker = "unk"
original = "俺ももふってみたい"
translation = "나도 만져보고 싶어"

[[dialogue]]
speaker = "unk"
original = "もふもふが気になる"
translation = "복슬복슬한 게 신경 쓰여"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000会長まで！」"
translation = "「코얏!? 회장님까지!」"

[[dialogue]]
speaker = "シズル"
original = "「お客人と親睦を深めるためなら、尻尾の１もふや２もふくらいは喜んでお受けします♪」"
translation = "「손님과 친목을 다지기 위해서라면, 꼬리 한두 번 복슬복슬하는 것 정도는 기쁘게 받겠답니다♪」"

[[dialogue]]
speaker = "シズル"
original = "「ヨミさんもどうですか？\u3000せつなも久し振りにいいですよ～」"
translation = "「요미 씨도 어떠세요? 세츠나도 오랜만에 괜찮아요~」"

[[dialogue]]
speaker = "せつな"
original = "「やったー！\u3000師匠の尻尾でござる～！\u3000もふもふもふもふ……」"
translation = "「야호! 스승님의 꼬리오 소~! 복슬복슬복슬복슬……」"

[[dialogue]]
speaker = "ヨミ"
original = "「みんなしてずるいです！\u3000わ、私も……シズルさんのお尻尾をもふらせて頂きます！」"
translation = "「다들 치사해요! 저, 저도…… 시즈루 씨의 꼬리를 복슬복슬하게 만져보겠습니다!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁぁんっ、なんとしゅばらしい手触り……もふもふもふもふ……」"
translation = "「코야아앙, 어쩜 이리 훌륭한 감촉이…… 복슬복슬복슬복슬……」"

[[dialogue]]
speaker = "シズル"
original = "「こんなとき尻尾が沢山あってよかったと思いますね～」"
translation = "「이럴 때 꼬리가 많이 있어서 다행이라고 생각하네요~」"

[[dialogue]]
speaker = "せつな"
original = "「師匠～、師匠ぉ～、会いたかったでござる～～」"
translation = "「스승님~ 스승니임~ 보고 싶었소 소~~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、そっか。シズルさんってござるちゃんのおししょー様なんだっけ。一瞬忘れかけてたかも……」"
translation = "「아, 맞다. 시즈루 씨는 고자루짱의 스승님이었지. 순간 잊을 뻔했을지도……」"

[[dialogue]]
speaker = "せつな"
original = "「そうでござるよ。里の者はみんな、師匠の教えを受けて立派な忍者に成長するでござる！」"
translation = "「그렇소 소. 마을 사람들은 모두 스승님의 가르침을 받아 훌륭한 닌자로 성장하오 소!」"

[[dialogue]]
speaker = "せつな"
original = "「師匠はすごいんでござるよ。ちっちゃくても、誰も敵わない最強の忍者でござる！」"
translation = "「스승님은 대단하오 소. 작아도 아무도 이기지 못하는 최강의 닌자이오 소!」"

[[dialogue]]
speaker = "シズル"
original = "「そんなことはありませんよ。日々、己の未熟さを痛感するばかりです」"
translation = "「그런 건 아니에요. 매일 자신의 미숙함을 통감할 뿐인걸요.」"

[[dialogue]]
speaker = "unk"
original = "偉いぞ、よしよし"
translation = "착하구나, 쓰담쓰담"

[[dialogue]]
speaker = "unk"
original = "こんなに小さいのに！"
translation = "이렇게 작은데!"

[[dialogue]]
speaker = "シズル"
original = "「あはっ、褒められてしまいました♪」"
translation = "「아하, 칭찬받아 버렸네요♪」"

[[dialogue]]
speaker = "せつな"
original = "「主様……忘れているかもしれませぬが、師匠はせつなたちよりずっと高齢なのでござるよ」"
translation = "「주군…… 잊고 계실지도 모르겠지만, 스승님은 세츠나 일행보다 훨씬 고령이오 소.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そうなん？\u3000しょーじきそんな風には見えないけど……何歳くらいなんですか？」"
translation = "「진짜? 솔직히 그렇게는 안 보이는데…… 몇 살 정도인가요?」"

[[dialogue]]
speaker = "シズル"
original = "「正確には覚えていないんですが……５００歳くらいでしょうか？」"
translation = "「정확히는 기억나지 않습니다만…… 500살 정도일까요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「わ……思ってた以上にご長寿だし！」"
translation = "「와…… 생각했던 것보다 더 장수하시잖아!」"

[[dialogue]]
speaker = "ヨミ"
original = "「九尾の狐は魔界のあらゆる種族の中でも特に長命の種族なんですよ」"
translation = "「구미호는 마계의 모든 종족 중에서도 특히 수명이 긴 종족이거든요.」"

[[dialogue]]
speaker = "せつな"
original = "「師匠は村の長よりも年長なのでござる」"
translation = "「스승님은 촌장님보다도 연배이오 소.」"

[[dialogue]]
speaker = "シズル"
original = "「あの子のおしめを替えていた、そんな時期もありましたね～」"
translation = "「그 아이 기저귀를 갈아주던, 그런 시기도 있었죠~」"

[[dialogue]]
speaker = "せつな"
original = "「里の者は大抵そうなのでござる。師匠はみんなのお母さんでもあるのでござる」"
translation = "「마을 사람들은 대개 그렇소 소. 스승님은 모두의 어머니이기도 하오 소.」"

[[dialogue]]
speaker = "シズル"
original = "「そうですね……でもせつなは特別です。赤ちゃんのころから我が子のように手塩にかけて育てたんですから」"
translation = "「그렇네요…… 하지만 세츠나는 특별해요. 아기 때부터 내 자식처럼 정성껏 키웠으니까요.」"

[[dialogue]]
speaker = "シズル"
original = "「せつなは期待に応えて立派に育ってくれました、私の誇りですよ♪」"
translation = "「세츠나는 기대에 부응해 훌륭하게 자라주었어요, 제 자랑이랍니다♪」"

[[dialogue]]
speaker = "せつな"
original = "「し、ししょおぉ～～～っ」"
translation = "「스, 스승니이이임~~」"

[[dialogue]]
speaker = "シズル"
original = "「まったくもう、甘えんぼさんなんですね～。みなさんすみません、恥ずかしいところをお見せしてしまって」"
translation = "「정말이지, 어리광쟁이라니까요~ 여러분 죄송해요, 부끄러운 모습을 보여드려서.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「たまにはいいっしょ。ござるちゃんも久し振りのおししょー様にめいっぱい甘えちゃいな～」"
translation = "「가끔은 괜찮잖아. 고자루짱도 오랜만에 스승님께 잔뜩 어리광 부리라구~」"

[[dialogue]]
speaker = "せつな"
original = "「ウズメ殿～、お言葉に甘えるでござる～！！」"
translation = "「우즈메 공~! 말씀대로 어리광 부리겠소 소~!!」"

[[dialogue]]
speaker = "unk"
original = "こうして、久し振りの師匠との再会に甘えまくるせつなだった。"
translation = "그렇게, 오랜만의 스승님과의 재회에 한껏 어리광을 부리는 세츠나였다."

