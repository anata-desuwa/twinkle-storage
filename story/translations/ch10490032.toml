[[dialogue]]
speaker = "unk"
original = "第２話,紅明のお母さん・現代編,P"
translation = "제2화, 코우메이의 엄마·현대 편, P"

[[dialogue]]
speaker = "unk"
original = "それはある日の放課後、俺が星徒会室へ向かおうと、廊下を歩いていた時のこと。"
translation = "그것은 어느 날 방과 후, 내가 성도회실로 향하려고 복도를 걷고 있었을 때의 일."

[[dialogue]]
speaker = "女性"
original = "「ごめんなさい、ちょっといいかしら～？」"
translation = "「실례합니다, 잠시 괜찮을까요~?」"

[[dialogue]]
speaker = "unk"
original = "声を掛けられて振り返ると、そこにいたのは見知らぬ美人な魔族女性。聞けば、星徒会室へ用事があるらしく、俺が星徒会長であることを名乗ると――"
translation = "목소리가 들려 돌아보니 그곳에는 낯선 미인 마족 여성이 있었다. 들어보니 성도회실에 용무가 있는 모양이라 내가 성도회장임을 밝히자──"

[[dialogue]]
speaker = "女性"
original = "「そっか、キミが紅明ちゃんの『ダーリンくん』か～☆」"
translation = "「그렇구나, 네가 코우메이 짱의 『달링 군』이구나~☆」"

[[dialogue]]
speaker = "unk"
original = "え？\u3000もしかしてあなたは……"
translation = "에? 혹시 당신은……"

[[dialogue]]
speaker = "unk"
original = "<b>すごく大きな胸</b>で目を引くその女性は、ふんわりと柔らかな笑顔を浮かべるのだった――"
translation = "<b>굉장히</b> <b>큰</b> <b>가슴</b>으로 눈길을 끄는 그 여성은 부드럽고 온화한 미소를 짓는 것이었다──"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン！\u3000全速力でやって来たぜ！！」"
translation = "「달링! 전속력으로 달려왔슴다!!」"

[[dialogue]]
speaker = "女性"
original = "「あっ、紅明ちゃ～ん☆\u3000遊びに来ちゃった♪」"
translation = "「앗, 코우메이 짱☆ 놀러 왔단다♪」"

[[dialogue]]
speaker = "紅明"
original = "「いや、来るとか全然聞いてないんだけど！？\u3000<b>お母さん</b>！」"
translation = "「아니, 온다는 소리 전혀 못 들었는데!? <b>엄마</b>!」"

[[dialogue]]
speaker = "女性"
original = "「ごめ～ん☆\u3000噂のダーリンくんに会ってみたくて～。ちょうど時間が空いてたから、学園にホルスタミンを届けるついでにね♪」"
translation = "「미안~☆ 소문의 달링 군을 만나보고 싶어서~. 마침 시간이 비어서 학원에 홀스타민을 전해주는 길에 들렀지♪」"

[[dialogue]]
speaker = "unk"
original = "そう、この女性はなんと、紅明の<b>現代の</b>お母さんであった。"
translation = "그렇다, 이 여성은 무려 코우메이의 <b>현대의</b> 어머니였다."

[[dialogue]]
speaker = "紅明"
original = "「予想外のサプライズを食らったけど、改めてダーリンに紹介するっしょ。アタシのお母さんで、『<ruby>善財乳業<rt>ぜんざいにゅうぎょう</rt></ruby>』の社長をやってる――」"
translation = "「예상치 못한 서프라이즈를 당했지만, 다시 달링에게 소개할게. 우리 엄마이자 『젠자이 유업』의 사장을 맡고 있는──」"

[[dialogue]]
speaker = "明鈴"
original = "「うふふっ、<ruby>牛明鈴<rt>ぎゅうめいりん</rt></ruby>で～す♪\u3000紅明ちゃんの製造元やってま～す☆」"
translation = "「우후후, <ruby>규우 메이린<rt>규우메이린</rt></ruby>이에요♪ 코우메이 짱의 제조원을 맡고 있답니다☆」"

[[dialogue]]
speaker = "紅明"
original = "「言い方っ！！」"
translation = "「말투 보소!!」"

[[dialogue]]
speaker = "明鈴"
original = "「ついでに、オレンジのパッケージと緑のイナズママークでお馴染み、エナジードリンク『ホルスタミン』の製造元の代表取締役社長をやってま～す♪」"
translation = "「더불어 오렌지 패키지와 녹색 번개 마크로 친숙한 에너지 드링크 『홀스타민』의 제조원 대표이사 사장을 맡고 있어요♪」"

[[dialogue]]
speaker = "unk"
original = "いつもお世話になっております！！！"
translation = "항상 신세 지고 있습니다!!!"

[[dialogue]]
speaker = "unk"
original = "紅明がイメージキャラクターを務めるＣМと、『元気、足りてる？』のキャッチコピーで有名な、乳製エナジードリンク『ホルスタミン』。"
translation = "코우메이가 이미지 캐릭터를 맡은 CM과 『기운, 부족해?』라는 카피로 유명한 유제품 에너지 드링크 『홀스타민』."

[[dialogue]]
speaker = "unk"
original = "飲めば急速に<ruby>星力<rt>スタミナ</rt></ruby>を回復してくれるそれは、１日に何度もモンスターが出現することもある流星市国において、星騎士には欠かせない必需品である。"
translation = "마시면 급속도로 <ruby>성력<rt>스태미나</rt></ruby>를 회복해 주는 그것은 하루에도 몇 번씩 몬스터가 출현하는 유성시국에서 성기사에게 없어서는 안 될 필수품이다."

[[dialogue]]
speaker = "明鈴"
original = "「こちらこそ、娘がいつもお世話になってま～す♪\u3000社長と言っても、ダーリンくんとはこれから仲良くするんだし、気軽に『明鈴ママ』って呼んでね☆」"
translation = "「저야말로 우리 딸이 항상 신세 지고 있어요♪ 사장이라고는 해도 달링 군과는 앞으로 사이좋게 지낼 거니까 편하게 『메이린 마마』라고 불러줘☆」"

[[dialogue]]
speaker = "明鈴"
original = "「それにしても～……ほうほう♪\u3000ダーリンくん、見れば見る程、めっちゃ私の好み～☆\u3000――えいっ<emoji=heart04>」"
translation = "「그나저나~…… 호오호오♪ 달링 군, 보면 볼수록 딱 내 스타일이야~☆ ──에잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "不意に腕に抱き着かれて、大きく柔らかな感触に挟まれる。"
translation = "느닷없이 팔에 매달려 크고 부드러운 감촉 사이에 끼인다."

[[dialogue]]
speaker = "unk"
original = "こ、これは……！\u3000紅明より大きい！？"
translation = "이, 이것은……! 코우메이보다 커!?"

[[dialogue]]
speaker = "unk"
original = "ちなみに、紅明は現在１０１センチのＩカップである。そういえば以前紅明が、お母さんは自分よりも大きいＪカップだと――"
translation = "참고로 코우메이는 현재 101센티의 I컵이다. 그러고 보니 이전에 코우메이가 엄마는 자신보다 큰 J컵이라고──"

[[dialogue]]
speaker = "紅明"
original = "「ちょいちょいちょい！？\u3000娘の彼氏にベタベタくっ付き過ぎっしょ！」"
translation = "「잠깐잠깐잠깐!? 딸의 남자친구한테 너무 끈적끈적하게 붙는 거 아냐!」"

[[dialogue]]
speaker = "明鈴"
original = "「大丈夫～♪\u3000ママ、バツイチだから☆」"
translation = "「괜찮아~♪ 엄마, 돌싱이니까☆」"

[[dialogue]]
speaker = "紅明"
original = "「むしろ不安なんだが！？」"
translation = "「오히려 불안한데!?」"

[[dialogue]]
speaker = "明鈴"
original = "「え～、でも紅明ちゃん、みんな笑顔で幸せになれるなら、ダーリンくんのハーレムもアリ、ってよく言ってるじゃない？」"
translation = "「에~ 하지만 코우메이 짱, 모두가 웃으며 행복해질 수 있다면 달링 군의 하렘도 찬성이라고 자주 말했잖니?」"

[[dialogue]]
speaker = "紅明"
original = "「そ、それは確かに言ってるけども！\u3000自分のママがダーリンとくっ付くとか、さすがにさらっとスルーできないものがあるっしょ！？」"
translation = "「그, 그건 확실히 말했지만! 자기 엄마가 달링이랑 엮이는 건 역시 아무렇지 않게 넘길 수 없는 면이 있다구!?」"

[[dialogue]]
speaker = "明鈴"
original = "「んモ～、紅明ちゃんって、いつもは笑顔で大人みたいに受け流すのに、私の前だと急に子供っぽくワガママになるわよね～」"
translation = "「음메~ 코우메이 짱은 평소에는 웃으면서 어른처럼 넘기더니 내 앞에서는 갑자기 어린애처럼 떼를 쓴다니까~」"

[[dialogue]]
speaker = "明鈴"
original = "「特にダーリンくんと付き合い始めてからは、色々言い訳して、私とダーリンくんを会わせないようにしてたし～」"
translation = "「특히 달링 군이랑 사귀기 시작한 뒤로는 이런저런 핑계를 대며 나랑 달링 군을 못 만나게 했었지~」"

[[dialogue]]
speaker = "紅明"
original = "「ちょっ！？\u3000そんなことダーリンの前でわざわざ言わなくていいじゃん！？\u3000お母さんは早く帰るっしょ！」"
translation = "「잠깐!? 그런 걸 달링 앞에서 굳이 말 안 해도 되잖아!? 엄마는 빨리 돌아가라구!」"

[[dialogue]]
speaker = "unk"
original = "と、珍しく恥ずかしそうにしている紅明を尻目に、明鈴さんが耳元でこっそり囁く。"
translation = "라며 드물게 부끄러워하는 코우메이를 뒤로하고 메이린 씨가 귓가에 살짝 속삭인다."

[[dialogue]]
speaker = "明鈴"
original = "「ふふふっ♪\u3000すごいわね、ダーリンくん」"
translation = "「후후후♪ 대단하네, 달링 군」"

[[dialogue]]
speaker = "明鈴"
original = "「いつも達観してる紅明ちゃんが、こんなに動揺することなんて、滅多にないのよ？\u3000それくらい、キミのことが好きなのね♪」"
translation = "「항상 달관해 있는 코우메이 짱이 이렇게 동요하는 일은 좀처럼 없거든? 그 정도로 너를 좋아하는구나♪」"

[[dialogue]]
speaker = "紅明"
original = "「って、お母さん！\u3000いまダーリンにこそっと何を吹き込んだのさ！？」"
translation = "「잠깐, 엄마! 지금 달링한테 몰래 무슨 소리를 불어넣은 거야!?」"

[[dialogue]]
speaker = "明鈴"
original = "「別に～、なんでも～？」"
translation = "「별로~ 아무것도~?」"

[[dialogue]]
speaker = "紅明"
original = "「後でこっそり、２人きりでダーリンと会おうとか、絶対許さないかんね！？」"
translation = "「나중에 몰래 둘이서만 달링이랑 만나려고 한다거나 절대 허락 안 할 거니까!?」"

[[dialogue]]
speaker = "明鈴"
original = "「はいはい、大丈夫だって～。ママはたまにダーリンくんを貸してもらうだけでいいから～♪」"
translation = "「네네, 괜찮다니까~. 엄마는 가끔 달링 군을 빌리기만 하면 되니까~♪」"

[[dialogue]]
speaker = "紅明"
original = "「しれっとハーレムに入る気満々じゃん！？」"
translation = "「슬쩍 하렘에 들어올 생각 만만이잖아!?」"

[[dialogue]]
speaker = "明鈴"
original = "「あっ♪\u3000ダーリンくん、ＤＩＳＣの連絡先交換しよ～☆」"
translation = "「앗♪ 달링 군, DISC 연락처 교환하자~☆」"

[[dialogue]]
speaker = "紅明"
original = "「却下っしょ！！！\u3000ダーリンに連絡する際はアタシを通さなきゃＮＧだから！」"
translation = "「기각이라구!!! 달링한테 연락할 때는 나를 거치지 않으면 NG니까!」"

[[dialogue]]
speaker = "明鈴"
original = "「紅明ちゃん、タレントなのにマネージャーみた～い♪」"
translation = "「코우메이 짱, 탤런트인데 매니저 같네~♪」"

[[dialogue]]
speaker = "unk"
original = "にこにこと柔和な笑顔を浮かべながら、終始楽しそうに娘をからかう明鈴さんなのであった――"
translation = "싱글벙글 온화한 미소를 지으며 내내 즐겁게 딸을 놀리는 메이린 씨였다──"

