[[dialogue]]
speaker = "unk"
original = "バトルウィーク６日目。寮生たちがパトロールを終えて、全員帰宅した後──"
translation = "「배틀 위크 6일째. 기숙사생들이 순찰을 마치고 전원 귀가한 후──」"

[[dialogue]]
speaker = "unk"
original = "<ruby>『白昼の極星』<rt>エトワール・イルソーレ</rt></ruby>こと千園寺ヒルディオーネと、<ruby>『宵闇の極星』<rt>エトワール・ラルーナ</rt></ruby>こと妃竜院マハムートは、寮のテーブルを挟んで静かに向かい合っていた。"
translation = "「<ruby>『백주의 극성』<rt>에투알 일 소레</rt></ruby>인 센온지 힐디오네와, <ruby>『초저녁의 극성』<rt>에투알 라 루나</rt></ruby>인 키류인 마하무트는 기숙사 테이블을 사이에 두고 조용히 마주 보고 있었다.」"

[[dialogue]]
speaker = "unk"
original = "（流れで同席したけど……）"
translation = "(어쩌다 보니 동석하게 됐는데……)"

[[dialogue]]
speaker = "マハムート"
original = "「相変わらず、機能性無視の美術品だらけで、悪趣味なロビーね……」"
translation = "「여전히 기능성은 무시하고 미술품만 가득해서 취미가 고약한 로비네……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほっ！\u3000高貴なものの価値は、高貴な心の持ち主にしか分からないということですわ！」"
translation = "「오~홋홋홋! 고귀한 것의 가치는 고귀한 마음을 가진 자만이 알 수 있는 법이랍니다!」"

[[dialogue]]
speaker = "マハムート"
original = "「あのねぇ……これでも私は、魔界の貴族なのよ？」"
translation = "「저기 말이야…… 이래 봬도 난 마계의 귀족이라고?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「もちろん、存じておりますわ。魔界で３０００年以上……いいえ、<b>有史以前</b>から続くと言われる竜の一族ですもの」"
translation = "「물론 알고 있답니다. 마계에서 3000년 이상…… 아니, **유사 이전**부터 이어져 왔다고 전해지는 용의 일족이니까요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あなた方からすれば流星市国の『五名門』程度、最近勢いづいてきただけの成金に見えるのでしょう」"
translation = "「당신들 입장에서 보면 유성시국의 『오명문』 따위 최근 기세가 오른 벼락부자로 보이겠지요.」"

[[dialogue]]
speaker = "マハムート"
original = "「……別にそこまで言うつもりはないわよ」"
translation = "「……딱히 그렇게까지 말할 생각은 없었어.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いえ、千園寺が力を持ったのは宇宙開発事業が成功してからのこと。歴史の浅さを隠すつもりはありませんわ」"
translation = "「아니요, 센온지가 힘을 가진 건 우주 개발 사업이 성공하고 나서의 일. 역사가 짧다는 걸 숨길 생각은 없답니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「――ですが、だからこそ、と言えますわ」"
translation = "「──하지만 그렇기에 더더욱 할 말이 있어요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「寮長であり、家名を背負う者だからこそ、それに相応しい教養や振る舞いが求められるんですの」"
translation = "「기숙사장이며 가문을 짊어진 자이기에 그에 걸맞은 교양과 품행이 요구되는 거예요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「リーダーに相応しい振る舞いがあってこそ、仲間たちは躊躇いを捨てて付いてきてくれるのですから」"
translation = "「리더다운 품행이 있어야만 동료들은 주저함을 버리고 따라와 주는 법이니까요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「その箔付けにお金が必要ならお金を使い、教養が必要なら教養を使う。歴史の浅い我々には、手段を選んでいる余裕なんてありませんの」"
translation = "「그 겉치레에 돈이 필요하면 돈을 쓰고, 교양이 필요하면 교양을 쓰죠. 역사가 짧은 저희에게는 수단을 가릴 여유 따위 없답니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「歴史の重みを知ればこそ、足りない物を補わなければ、決して追いつくことは敵わないのですから」"
translation = "「역사의 무게를 알기에 부족한 점을 채우지 않으면 결코 따라잡을 수 없으니까요.」"

[[dialogue]]
speaker = "マハムート"
original = "「ふっ……ふふっ……あははははっ！」"
translation = "「훗…… 후훗…… 아하하하하!」"

[[dialogue]]
speaker = "unk"
original = "（マムが……本気で笑ってる？）"
translation = "(마무가…… 진심으로 웃고 있어?)"

[[dialogue]]
speaker = "マハムート"
original = "「はーっ……どうやら、まだまだ私も、あなたのことを見誤っていたようね」"
translation = "「하아──…… 아무래도 내가 여태까지 당신을 잘못 보고 있었던 모양이네.」"

[[dialogue]]
speaker = "マハムート"
original = "「ヒルディー、あなたの言ってることは、何も間違っていないわ」"
translation = "「힐디, 당신이 하는 말은 무엇 하나 틀리지 않았어.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「マム……？」"
translation = "「마무……?」"

[[dialogue]]
speaker = "マハムート"
original = "「ええ、ええ。その通りよ。持てる手段のすべてを用い、ただ勝利という結果をもたらす」"
translation = "「그래, 그래. 그대로야. 가질 수 있는 수단을 모두 동원해 그저 승리라는 결과를 가져온다.」"

[[dialogue]]
speaker = "マハムート"
original = "「我々高貴なる者に求められるのは、ただただ、その勝利だけだわ」"
translation = "「우리 고귀한 자들에게 요구되는 건 그저 그 승리뿐이지.」"

[[dialogue]]
speaker = "マハムート"
original = "「私に芸術や教養はわからないけれど、それがあなたの持てる手段、勝つための努力だというのなら、認めなければならないわ」"
translation = "「난 예술이나 교양은 모르겠지만, 그것이 당신이 가진 수단이며 이기기 위한 노력이라는 거라면 인정해야겠어.」"

[[dialogue]]
speaker = "マハムート"
original = "「千園寺ヒルディオーネ。確かにあなたは私のライバルよ。……いつか必ず、あなたを私の元に跪かせてあげるから、覚悟なさい」"
translation = "「센온지 힐디오네. 확실히 당신은 나의 라이벌이야. ……언젠가 반드시 당신을 내 앞에 무릎 꿇게 해 줄 테니 각오하렴.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「っ……ふふっ、おーっほっほっほ！\u3000実にエレガントですわ、妃竜院マハムート！」"
translation = "「윽…… 후훗, 오~홋홋홋! 참으로 엘리먼트하군요, 키류인 마하무트!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私はこれまで、どんな不可能も打ち砕いてきましたわ。だからマム、あなたという壁も必ず、最後には優雅に打ち砕いてさしあげましてよ！」"
translation = "「저는 지금까지 그 어떤 불가능도 타파해 왔답니다. 그러니 마무, 당신이라는 벽도 반드시 마지막에는 우아하게 깨뜨려 보이겠어요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ただし、あくまで<b>優雅に</b>、ですわ！\u3000あなたは努力と言いましたけど、そこだけは訂正させて頂きますわ」"
translation = "「다만 어디까지나 **우아하게** 말이죠! 당신은 노력이라고 하셨지만 그 부분만은 정정해 두겠어요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「努力とは、高貴な者ならばして当然のこと。それをわざわざ口にすることを控えるのがエレガントというものでしてよ」"
translation = "「노력이란 고귀한 자라면 당연히 해야 하는 것. 그것을 굳이 입 밖으로 내는 걸 삼가는 게 엘레강트한 것이랍니다.」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ……いいわね。とてもいいわ。私も久々に、竜の血が騒いできた感じがするもの」"
translation = "「후훗…… 좋네. 아주 좋아. 나도 오랜만에 용의 피가 끓어오르는 기분이 들어.」"

[[dialogue]]
speaker = "マハムート"
original = "「――今日が終わった時点で、今月の討伐スコアはＳクラスモンスター１体分、流星寮がリード……で合っているわよね？」"
translation = "「──오늘이 끝난 시점에서 이번 달 토벌 스코어는 S클래스 몬스터 1마리 분량만큼 유성 기숙사가 리드…… 맞지?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ、その通りですわ。あのポイント差を、よくぞこの短期間で埋めたもの。賞賛に値しますわ」"
translation = "「네, 맞답니다. 그 포인트 차이를 이 짧은 기간에 메우다니 칭찬할 만하군요.」"

[[dialogue]]
speaker = "マハムート"
original = "「それは、ここにいる会長のおかげよ。彼が今の<ruby>新星寮<rt>ラルーナ</rt></ruby>に足りなかったものを補ってくれた」"
translation = "「그건 여기 있는 회장 덕분이야. 그가 지금의 <ruby>신성 기숙사<rt>라 루나</rt></ruby>에 부족했던 점을 채워줬어.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「なるほど……ふふっ、それを聞いてしまったら、ますます<ruby>流星寮<rt>イルソーレ</rt></ruby>に欲しくなってしまいますわね」"
translation = "「과연…… 후훗, 그걸 들어버리니 점점 더 <ruby>유성 기숙사<rt>일 소레</rt></ruby>로 데려오고 싶어지네요.」"

[[dialogue]]
speaker = "マハムート"
original = "「おあいにく様。最後に勝つのは私達よ。……けれど、このイベントがなければ、今月は負けていたでしょうね」"
translation = "「안타깝게 됐네. 마지막에 웃는 건 우리야. ……하지만 이 이벤트가 없었다면 이번 달은 졌을지도 모르겠네.」"

[[dialogue]]
speaker = "マハムート"
original = "「私たちの闘争心に火をつけてくれて、感謝しているわ。ヒルディオーネ」"
translation = "「우리의 투쟁심에 불을 지펴준 것에 감사할게. 힐디오네.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「何を勝ち誇っていますの。まだ私たちがリードしているんですのよ？」"
translation = "「무엇을 벌써 이긴 것처럼 구시나요. 아직 저희가 리드하고 있답니다?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「確かに賞賛に値する追い上げではありましたが、Ｓクラス１体分は決して小さなスコアではありませんわ」"
translation = "「확실히 칭찬할 만한 추격이었지만 S클래스 1마리 분량은 결코 작은 점수가 아니에요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そして、明日は学園も休みの日……。<ruby>流星寮<rt>イルソーレ</rt></ruby>総出でパトロールを行えば、これをひっくり返すのは不可能でしてよ！」"
translation = "「그리고 내일은 학원도 쉬는 날……. <ruby>유성 기숙사<rt>일 소레</rt></ruby> 총동원으로 순찰을 하면 이것을 뒤집는 건 불가능하답니다!」"

[[dialogue]]
speaker = "マハムート"
original = "「確かに簡単ではないわね。でも、不可能というほど絶望的な差ではないわ。あと一歩、頑張れば届くところまで来ている」"
translation = "「확실히 쉽지는 않겠네. 하지만 불가능할 정도로 절망적인 차이는 아니야. 앞으로 한 걸음, 노력하면 닿을 곳까지 와 있어.」"

[[dialogue]]
speaker = "マハムート"
original = "「それに……戦いは逆境ほど燃える。そうでしょう？」"
translation = "「게다가…… 싸움은 역경일수록 타오르는 법이잖아?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……言いますわね。ならば、受けて立ちましょう」"
translation = "「……말은 잘하시는군요. 그렇다면 받아들이겠어요.」"

[[dialogue]]
speaker = "マハムート"
original = "「私たちも、明日のパトロールはこれまで以上の人数で計画しているんですもの」"
translation = "「저희도 내일 순찰은 지금까지보다 더 많은 인원으로 계획하고 있답니다.」"

[[dialogue]]
speaker = "マハムート"
original = "「最終日、総力戦と行こうじゃないの」"
translation = "「마지막 날, 총력전으로 가보자고.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「望むところですわ……！」"
translation = "「바라던 바예요……!」"

[[dialogue]]
speaker = "unk"
original = "２人は不敵に、楽しそうに笑い合う。ここまで来たら勝ちたいと、俺も心が強く燃えている。"
translation = "「두 사람은 대담하게, 즐겁다는 듯 서로 웃는다. 여기까지 왔으면 이기고 싶다고 나도 마음이 뜨겁게 달아오른다.」"

[[dialogue]]
speaker = "unk"
original = "こうして、運命の最終日が幕を開ける――"
translation = "「그렇게 운명의 마지막 날이 막을 올린다──」"

