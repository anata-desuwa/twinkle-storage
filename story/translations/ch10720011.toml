[[dialogue]]
speaker = "unk"
original = "第１話,百合崎ミアはオトナな風紀委員？,P"
translation = "제1화, 유리자키 미아는 어른스러운 풍기위원?, P"

[[dialogue]]
speaker = "ミア"
original = "「だーかーらーっ。私は附属生じゃないーっ」"
translation = "「그─러─니─까─! 나는 부속생이 아니야─!」"

[[dialogue]]
speaker = "ミア"
original = "「歴とした新星学園の１年生だってばっ！\u3000風紀委員の百合崎ミアっ！\u3000今は朝の服装チェック中で──」"
translation = "「어엿한 신성학원 1학년이라니까! 풍기위원 유리자키 미아! 지금은 아침 복장 체크 중이라──」"

[[dialogue]]
speaker = "unk"
original = "とある日の朝。学園に登校してきたところで大きな叫び声が聞こえてきた。"
translation = "어느 날 아침. 학원에 등교하던 중에 커다란 외침 소리가 들려왔다."

[[dialogue]]
speaker = "ミア"
original = "「あっ、会長さん、いいところに……！\u3000この先生に説明して……！\u3000私がこの学園の生徒だってこと、風紀委員だってこと……！」"
translation = "「앗, 회장님, 마침 잘 오셨어요……! 이 선생님께 설명 좀 해주세요……! 제가 이 학원의 학생이라는 거, 풍기위원이라는 거……!」"

[[dialogue]]
speaker = "ミア"
original = "「はぁはぁ、ありがとう、助かったわ……。危うく自分の学園からつまみ出されちゃうところだった……」"
translation = "「하아 하아, 고마워요, 살았어요……. 하마터면 자기 학교에서 쫓겨날 뻔했어……」"

[[dialogue]]
speaker = "ミア"
original = "「ちゃんと新星の制服を着てるのに、ちょっぴり体が小さいからって私を迷子の附属生と勘違いしちゃって。見ない顔だったけど新しく入った先生かしら。ホント失礼しちゃうわ」"
translation = "「분명 신성의 교복을 입고 있는데, 조금 체구가 작다고 해서 나를 길 잃은 부속생으로 착각하다니. 처음 보는 얼굴이었는데 새로 부임한 선생님일까. 정말 실례야」"

[[dialogue]]
speaker = "ミア"
original = "「……そういえば会長さんにも全く同じことをされたわよね？\u3000ほら、あの時よ。会長さんと初めて出会った時のこと……！」"
translation = "「……그러고 보니 회장님한테도 똑같은 일을 당했었지? 왜, 그때 말이야. 회장님과 처음 만났을 때……!」"

[[dialogue]]
speaker = "ミア"
original = "「あの日も私、朝からみんなの服装チェックをしてて──」"
translation = "「그날도 나, 아침부터 모두의 복장 체크를 하고 있어서──」"

[[dialogue]]
speaker = "ミア"
original = "「だーかーらーっ。私は迷子でもなければ附属生でもないのっ。風紀委員よ、ふーきいーんっ」"
translation = "「그─러─니─까─! 나는 미아도 아니고 부속생도 아니야. 풍기위원이라고, 풍기위원─!」"

[[dialogue]]
speaker = "ミア"
original = "「いいからネクタイを直しなさいっ。おかしな方向に曲がってるじゃないっ。それでも星徒会長さんなのっ？」"
translation = "「됐으니까 넥타이나 고쳐 매! 이상한 방향으로 꺾여 있잖아. 그러고도 성도회장이야?」"

[[dialogue]]
speaker = "ミア"
original = "「姿は俗性を表すって言ってね。外見は内面を映し出す鏡なんだからっ。会長さんがそんなことだから誰も風紀を守ろうとしないのっ」"
translation = "「모습은 속성을 나타낸다고 하잖아. 외면은 내면을 비추는 거울이니까! 회장님이 그 모양이니까 아무도 풍기를 지키려 하지 않는 거야!」"

[[dialogue]]
speaker = "ミア"
original = "「難しい言葉を知ってるね～──じゃないのよ！\u3000ひゃふっ、だから頭を撫でないでっ。えらいえらいじゃないからぁ～！！」"
translation = "「어려운 단어를 알고 있네~──가 아니라고! 히야훕, 그러니까 머리 쓰다듬지 마! 장하다 장하다가 아니니까아~!!」"

[[dialogue]]
speaker = "ミア"
original = "「むきぃ～！\u3000今思い出してもムカムカするわっ。私がどれだけ注意しても、妙に優しい笑顔を向けながら人の頭をなでなでしてきて……！」"
translation = "「으으윽~! 지금 생각해도 부글부글 끓어올라! 내가 아무리 주의를 줘도 묘하게 다정한 미소를 지으면서 남의 머리를 쓰담쓰담해오고……!」"

[[dialogue]]
speaker = "ミア"
original = "「完全に私のこと子ども扱いしてたわよねっ……！\u3000さっきの先生よりもよっぽど失礼だったわよ……！」"
translation = "「완전히 나를 어린애 취급했었지……! 아까 그 선생님보다 훨씬 더 실례였다고……!」"

[[dialogue]]
speaker = "unk"
original = "まぁまぁあめ玉でも舐めて落ち着いて"
translation = "자자 사탕이라도 먹고 진정해"

[[dialogue]]
speaker = "unk"
original = "ぬいぐるみあげるから機嫌直して"
translation = "인형 줄 테니까 기분 풀어"

[[dialogue]]
speaker = "ミア"
original = "「だから私のこと子ども扱いしないでってば！\u3000ちんちくりんだからって私のこと見くびらないでっ！」"
translation = "「그러니까 나를 어린애 취급하지 말라니까! 땅꼬마라고 나를 얕보지 마!」"

[[dialogue]]
speaker = "ミア"
original = "「大体どうして私ばっかり子ども扱いされるのよっ。確かにちょっぴりっ、ほんのちょびっとだけ身長は低いかもしれないけど……！」"
translation = "「애초에 왜 나만 어린애 취급당하는 거야! 확실히 조오금, 아주 쪼오금 키가 낮을지도 모르지만……!」"

[[dialogue]]
speaker = "ミア"
original = "「でもでもネーゼマインさんだって私と身長あんまり変わらないじゃない……！\u3000私ばっかりおかしいわ……！」"
translation = "「하지만 하지만 네제마인 씨도 나랑 키 별로 차이 안 나잖아……! 나만 이상해……!」"

[[dialogue]]
speaker = "ミア"
original = "「むしろ私の方がよっぽどオトナに見られて然るべきなのに……！\u3000服装のチェックやケンカの仲裁をして、学園の風紀を守っているわけだもの……！」"
translation = "「오히려 내가 훨씬 어른스럽게 여겨져야 마땅한데……! 복장 체크나 싸움 중재를 하면서 학원의 풍기를 지키고 있는 거니까……!」"

[[dialogue]]
speaker = "unk"
original = "マインにはオトナなお胸が……"
translation = "마인에겐 어른스러운 가슴이……"

[[dialogue]]
speaker = "unk"
original = "それこそブカブカな服のせいじゃ……"
translation = "그거야말로 헐렁한 옷 탓이 아니야……"

[[dialogue]]
speaker = "ミア"
original = "「なっ──ど、どこ見てるのこの変態っ！\u3000風紀違反よっ、風紀違反っ！\u3000減点１なんだからっ！」"
translation = "「앗── 어, 어디 보는 거야 이 변태! 풍기 위반이야, 풍기 위반! 감점 1점이니까!」"

[[dialogue]]
speaker = "ミア"
original = "「そもそもこの服がブカブカなのは今だけだもんっ……！\u3000成長を見越して、わざと大きめのサイズを買ってるのっ……！」"
translation = "「애초에 이 옷이 헐렁한 건 지금뿐이라고……! 성장을 내다보고 일부러 큰 사이즈를 산 거야……!」"

[[dialogue]]
speaker = "ミア"
original = "「来年の今頃には会長さんの身長なんて追い抜いちゃってるんだからっ……！\u3000胸だって、そのっ、ネーゼマインさんよりボインボインになってるもんっ……！」"
translation = "「내년 이맘때쯤엔 회장님 키 따위 추월해버릴 거니까……! 가슴도, 그게, 네제마인 씨보다 빵빵해질 거란 말이야……!」"

[[dialogue]]
speaker = "ミア"
original = "「そ──そもそもそのだらしない格好は何っ？\u3000またネクタイが曲がってるじゃない。減点２よっ、減点２！」"
translation = "「그── 그보다 그 단정치 못한 차림은 뭐야? 또 넥타이가 삐뚤어졌잖아. 감점 2점이야, 감점 2점!」"

[[dialogue]]
speaker = "ミア"
original = "「そこに直りなさい。私が整えてあげるから。服装の乱れは心の乱れ。星徒会長がそんなズボラでどうするのっ」"
translation = "「거기 똑바로 서. 내가 정돈해 줄 테니까. 복장의 흐트러짐은 마음의 흐트러짐. 성도회장이 그렇게 덜렁거려서 어떡해」"

[[dialogue]]
speaker = "ミア"
original = "「いいからじっとしてるっ。～～っっ！！\u3000ち、違うもんっ！\u3000話題を逸らしたわけじゃないっ！」"
translation = "「됐으니까 가만히 있어. ~~윽!! 아, 아니거든! 화제를 돌린 게 아니야!」"

[[dialogue]]
speaker = "ミア"
original = "「学園の風紀を守ることが風紀委員の仕事なんだからっ。風紀を乱す輩は私が矯正してやるのっ」"
translation = "「학원의 풍기를 지키는 것이 풍기위원의 일이니까. 풍기를 어지럽히는 무리는 내가 교정해 주는 거야」"

[[dialogue]]
speaker = "ミア"
original = "「確か、ここをこうして……──あ、あれ？\u3000こんがらがっちゃった……！？」"
translation = "「분명히 여기를 이렇게 해서……── 어, 어라? 엉켜버렸어……!?」"

[[dialogue]]
speaker = "ミア"
original = "「うぅ、下からだと見えづらい……！\u3000んっ、んんっ……！\u3000やり方は合ってるはずなのにっ……！」"
translation = "「우으, 아래에서는 잘 안 보여……! 응, 으응……! 방법은 맞을 텐데……!」"

[[dialogue]]
speaker = "unk"
original = "屈もうか？"
translation = "허리 숙여줄까?"

[[dialogue]]
speaker = "ミア"
original = "「～～っっ。余計なお世話よっ。そこまで私、ちっちゃくないもんっ。このくらい、んっ、んんんっ、簡単に直せるんだからっ……！」"
translation = "「~~윽. 쓸데없는 참견이야. 그 정도로 나, 작지 않다고. 이 정도는, 응, 으응응, 간단히 고칠 수 있으니까……!」"

[[dialogue]]
speaker = "ミア"
original = "「ネクタイの結び方だってちゃんと、知ってるっ……！\u3000毎朝ママがパパに結んであげてるところ見てる、もんっ……！」"
translation = "「넥타이 매는 법 정도는 제대로 알고 있어……! 매일 아침 엄마가 아빠한테 매주는 거 보고 있단 말이야……!」"

[[dialogue]]
speaker = "ミア"
original = "「たとえちょっぴり身長が小っちゃくたって、つま先のつま先まで使って立てばっ……！\u3000んっ、んんっ……！\u3000私にだって……！」"
translation = "「비록 아주 조금 키가 작다 해도, 발끝의 발끝까지 써서 서면……! 응, 으응……! 나라도……!」"

[[dialogue]]
speaker = "ミア"
original = "「よ、よしっ、後はこのままっ、はぁはぁっ、上手に引っ張ればっ──……」"
translation = "「조, 좋아, 이대로만, 하아 하아, 잘 잡아당기면──……」"

[[dialogue]]
speaker = "ミア"
original = "「──できたっ！\u3000ほらほら見て見て、真っ直ぐ綺麗に結べてるっ！\u3000えへへっ、私にだってできるんだからっ♪」"
translation = "「──됐다! 봐봐 봐봐, 똑바로 예쁘게 매졌어! 에헤헤, 나도 할 수 있다고♪」"

[[dialogue]]
speaker = "ミア"
original = "「これで私が子どもじゃないってわかったでしょっ？\u3000ネクタイを結んであげられるのはオトナな女性だけだもんっ♪」"
translation = "「이걸로 내가 어린애가 아니라는 거 알았지? 넥타이를 매줄 수 있는 건 어른스러운 여성뿐이니까♪」"

[[dialogue]]
speaker = "ミア"
original = "「よーし、このままもう一回結んであげるわねっ。いいからいいからっ。ネクタイの綺麗な結び方、私が教えてあげるのっ」"
translation = "「좋아, 이대로 한 번 더 매줄게. 됐으니까 됐으니까. 넥타이를 예쁘게 매는 법, 내가 가르쳐 줄게」"

[[dialogue]]
speaker = "ミア"
original = "「ここをね、んっ……んんっ、こーしてっ。くるっと回して、ぎゅーっとして……」"
translation = "「여기를 말이야, 응…… 으응, 이렇게. 휘익 돌려서, 꽉 하고……」"

[[dialogue]]
speaker = "ミア"
original = "「やったっ──またできたっ！\u3000えへへっ、しかもさっきより綺麗に結べてるっ！」"
translation = "「됐다!── 또 됐어! 에헤헤, 게다가 아까보다 예쁘게 매졌어!」"

[[dialogue]]
speaker = "ミア"
original = "「ねねっ、もう一回っ！\u3000もう一回していいっ？\u3000次はね次はね、もっーと難しい結び方で結んであげるからっ！」"
translation = "「저기 저기, 한 번 더! 한 번 더 해도 돼? 다음엔 다음엔, 더어어욱 어려운 매듭법으로 매줄 테니까!」"

[[dialogue]]
speaker = "unk"
original = "ふふふ、じゃあお願いしようかな"
translation = "후후후, 그럼 부탁해볼까"

[[dialogue]]
speaker = "ミア"
original = "「えへへっ、うんっ！\u3000私に任せてっ！\u3000じゃあねじゃあね、今度は──……」"
translation = "「에헤헤, 응! 나한테 맡겨줘! 그럼 그럼, 이번에는──……」"

[[dialogue]]
speaker = "ミア"
original = "「って──～～っっ！！\u3000また私のこと子ども扱いしてるわねっ！？\u3000その顔よ、その顔……！\u3000すっごくニヤニヤしてるじゃない……！」"
translation = "「어── ~~윽!! 또 나를 어린애 취급하고 있지!? 그 표정이야, 그 표정……! 엄청 싱글벙글하고 있잖아……!」"

[[dialogue]]
speaker = "ミア"
original = "「私としたことがネクタイを結べただけではしゃぎ過ぎちゃったわ……！\u3000こんなことで喜ぶなんてそれこそ子どもみたいじゃない……！」"
translation = "「나도 참 넥타이 좀 맸다고 너무 들떴어……! 이런 걸로 기뻐하다니 그야말로 어린애 같잖아……!」"

[[dialogue]]
speaker = "unk"
original = "気がついちゃったか……"
translation = "눈치챘나……"

[[dialogue]]
speaker = "unk"
original = "すごく微笑ましかったのに……"
translation = "정말 흐뭇했는데……"

[[dialogue]]
speaker = "ミア"
original = "「なっ──……！！\u3000完全に人のこと子どもだと思って……！\u3000出会った頃からちっとも反省してくれてないじゃないっ……！」"
translation = "「앗──……!! 완전히 사람을 어린애로 생각하고……! 처음 만났을 때부터 조금도 반성하지 않았잖아……!」"

[[dialogue]]
speaker = "ミア"
original = "「減点よっ、減点っ！\u3000反省文書いてもらうんだからっ！\u3000風紀委員をおちょくるなんて言語道断よっ！」"
translation = "「감점이야, 감점! 반성문 쓰게 할 거니까! 풍기위원을 놀리다니 언어도단이야!」"

[[dialogue]]
speaker = "ミア"
original = "「いいから来なさいっ。『ミアさんはオトナです』って原稿用紙１０枚分みっちり書かせてやるわ……！」"
translation = "「됐으니까 따라와. 『미아 씨는 어른입니다』라고 원고지 10장 분량으로 빽빽하게 쓰게 해 주겠어……!」"

[[dialogue]]
speaker = "ミア"
original = "「そのネクタイよりもよっぽど曲がった性根を矯正してやるんだからっ……！\u3000もう二度と私のこと子ども扱いさせないもん……！」"
translation = "「그 넥타이보다 훨씬 비뚤어진 심보를 교정해 줄 거니까……! 이제 두 번 다시 나를 어린애 취급 못 하게 할 거야……!」"

