[[dialogue]]
speaker = "unk"
original = "守護天使の２人から俺宛に、力を借りたいと要請があった。"
translation = "수호천사 두 사람으로부터 나에게 힘을 빌리고 싶다는 요청이 왔다."

[[dialogue]]
speaker = "unk"
original = "守護天使といえば世界を運営する力を持ち、女神にも近い高位の存在。"
translation = "수호천사라고 하면 세계를 운영하는 힘을 가진, 여신에게도 가까운 고위 존재."

[[dialogue]]
speaker = "unk"
original = "もしかすると世界の危機かもしれない……！"
translation = "어쩌면 세계의 위기일지도 몰라……!"

[[dialogue]]
speaker = "コハルコ"
original = "「あれ、会長さんがどうしてここに？」"
translation = "「어라, 회장님이 어째서 여기에?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「私たちが会長さまをお呼びしたのです」"
translation = "「저희가 회장님을 부른 것입니다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「我々の呼びかけに応えてくれたようだな。感謝するぞ、人の子よ」"
translation = "「우리의 부름에 응해준 모양이구나. 감사하마, 사람의 아이여」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんは何してたところですか？"
translation = "코하루코 씨는 뭐 하던 중이었나요?"

[[dialogue]]
speaker = "コハルコ"
original = "「ここの設備を使って守護天使さんの義体のデータ取り──つまり健康診断、かな」"
translation = "「여기 설비를 써서 수호천사분들의 의체 데이터 수집 ── 그러니까 건강검진 중이었어」"

[[dialogue]]
speaker = "コハルコ"
original = "「アニマさんが作った義体は高性能ではあるけど、運用においてはまだまだ未知数な部分が多いから」"
translation = "「아니마 씨가 만든 의체는 고성능이긴 하지만 운용에 있어서는 아직 미지수인 부분이 많으니까」"

[[dialogue]]
speaker = "コハルコ"
original = "「運動機能や認知機能、その他生命維持に必要な各種機能に異常がないかチェックしてたんだけど、今のところ２人とも異常なし。健康そのものだね」"
translation = "「운동 기능이나 인지 기능, 그 외 생명 유지에 필요한 각종 기능에 이상이 없는지 체크하고 있었는데, 현재로선 두 분 다 이상 없음. 건강 그 자체네」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「うむ。あれだけ栄養を摂取しているのだから当然だ」"
translation = "「음. 그만큼 영양을 섭취하고 있으니 당연하다」"

[[dialogue]]
speaker = "コハルコ"
original = "「アルモタヘルさんは食べすぎかと思ったけど、義体の消化能力と代謝のおかげだね……」"
translation = "「아르모타헬 씨는 너무 많이 먹는 거 아닌가 싶었는데, 의체의 소화 능력과 대사 덕분이네……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「これは何の機械でしょうか……？\u3000ピカピカと光っておりますね」"
translation = "「이건 무슨 기계인가요……? 번쩍번쩍 빛나고 있네요」"

[[dialogue]]
speaker = "コハルコ"
original = "「あ～っ、マグダレナさん、それは触っちゃダメ～！」"
translation = "「아앗, 마그달레나 씨, 그건 만지면 안 돼~!」"

[[dialogue]]
speaker = "コハルコ"
original = "「ごめん、お待たせ。えーと、マグダレナさん、会長さんを呼んだ理由を教えてもらえますか？」"
translation = "「미안, 기다렸지. 저기, 마그달레나 씨, 회장님을 부른 이유를 알려주시겠어요?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい。会長さまにお願いしたいのは他でもありません」"
translation = "「네. 회장님께 부탁드리고 싶은 것은 다름이 아닙니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「私とアルモタヘルがアルバイトできるように手伝っていただきたいのです！」"
translation = "「저와 아르모타헬이 아르바이트를 할 수 있도록 도와주셨으면 합니다!」"

[[dialogue]]
speaker = "unk"
original = "はいぃぃっ！？"
translation = "네에에엣!?"

[[dialogue]]
speaker = "コハルコ"
original = "「守護天使さんが……アルバイト？」"
translation = "「수호천사분이…… 아르바이트?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「アニマさまの義体で受肉して以来、我々は教皇庁から生活費をいただいて暮らしています」"
translation = "「아니마 님의 의체로 수육한 이래, 저희는 교황청으로부터 생활비를 지원받아 살고 있습니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「しかしモンスターやアステラが発生している時はまだいい……いえよくないのですが。戦っていない時の我々は暇を持て余すばかりなのです」"
translation = "「하지만 몬스터나 아스텔라가 발생하고 있을 때는 차라리 낫지만…… 아니 낫지 않지만요. 싸우지 않을 때의 저희는 시간이 너무 남아돌 뿐입니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「例えば……アルモタヘル、あなたは昨日何をしていましたか？」"
translation = "「예를 들어…… 아르모타헬, 당신은 어제 무엇을 했나요?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「午前は流星市国初出店のカフェでコーヒーを嗜み、昼食は香り高い十割そばを賞味し、間食にケバブ、夕食にラーメンを食し、夜食にアイスを食って寝た」"
translation = "「오전에는 유성시국에 처음 생긴 카페에서 커피를 즐기고, 점심은 향이 좋은 메밀국수를 맛보았으며, 간식으로 케밥, 저녁으로 라멘을 먹고, 야식으로 아이스크림을 먹고 잤다」"

[[dialogue]]
speaker = "コハルコ"
original = "（本当に食べてばっかりだ！？）"
translation = " (정말 먹기만 했잖아!?) "

[[dialogue]]
speaker = "マグダレナ"
original = "「ちなみに私は鉄壁の刑務所から脱獄するドラマを一気見しておりました。ドキドキハラハラする大変面白い作品でした」"
translation = "「참고로 저는 철벽 교도소에서 탈옥하는 드라마를 정주행하고 있었습니다. 두근두근 조마조마한 아주 재미있는 작품이었죠」"

[[dialogue]]
speaker = "コハルコ"
original = "（気持ちはわかるけど！\u3000そんな生活ちょっとうらやましい！）"
translation = " (마음은 이해하지만! 그런 생활 좀 부러워!) "

[[dialogue]]
speaker = "アルモタヘル"
original = "「守護天使ともあろう者が、人に世話になってばかりではな。少しくらいは自分で使う金を自らの労働で稼ぎたいのだ」"
translation = "「수호천사라는 자가 사람에게 신세만 져서야 되겠나. 조금 정도는 스스로 쓸 돈을 자신의 노동으로 벌고 싶다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ですから、幾多のアルバイトをこなしてきたという会長さまのお力を貸していただきたいのです」"
translation = "「그러니 수많은 아르바이트를 섭렵했다는 회장님의 힘을 빌리고 싶습니다」"

[[dialogue]]
speaker = "コハルコ"
original = "「なるほど、それなら確かに会長さんが適任かもね。仕事なら私もいろいろしてるけど……」"
translation = "「과연, 그렇다면 확실히 회장님이 적임자일지도 모르겠네. 일이라면 나도 이것저것 하고 있지만……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「コハルコさまのお仕事といえば……」"
translation = "「코하루코 님의 일이라고 하면……」"

[[dialogue]]
speaker = "コハルコ"
original = "「学園のシステム・セキュリティ関連にデータの分析、あと放送委員としてのオペレーター活動ですね」"
translation = "「학원 시스템·보안 관련 데이터 분석이랑 방송위원으로서의 오퍼레이터 활동 정도네」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「どれも我々には無理だな。手伝おうとすれば余計に迷惑がかかるだろう」"
translation = "「전부 우리에게는 무리군. 도우려 했다간 오히려 폐를 끼칠 거다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「コハルコさまは本当に多才で、新星学園に貢献されているお方。私などは頭が下がります」"
translation = "「코하루코 님은 정말 다재다능하셔서 신성학원에 공헌하시는 분. 저로서는 고개가 숙여집니다」"

[[dialogue]]
speaker = "コハルコ"
original = "「守護天使さんに言われると恐縮です……」"
translation = "「수호천사분께 그런 말을 들으니 송구스럽네요……」"

[[dialogue]]
speaker = "コハルコ"
original = "「誰に電話かけてるの？\u3000あ、バイトなら環さんかな」"
translation = "「누구한테 전화 거는 거야? 아, 알바라면 타마키 씨인가」"

[[dialogue]]
speaker = "環"
original = "『どしたの会長？\u3000遊びのお誘いとか？\u3000それならバイトの予定次第だけど──』"
translation = "『무슨 일이야 회장? 놀러 가자는 제안? 그렇다면 알바 일정에 따라 다르지만──』"

[[dialogue]]
speaker = "環"
original = "『守護天使がバイトしたいって言ってる？\u3000え～、そんなの勝手にやらせときなよー』"
translation = "『수호천사가 알바하고 싶어 한다고? 에~ 그런 건 알아서 하게 내버려 둬~』"

[[dialogue]]
speaker = "環"
original = "『コホン。ほら、守護天使さまってめちゃくちゃエライ存在だから。畏れ多いし粗相があるといけないし、悪いけど他をあたってよ。ごめんねー』"
translation = "『코흠. 봐봐, 수호천사님들은 엄청나게 높으신 분들이잖아. 황송하기도 하고 실례라도 하면 큰일이니까, 미안하지만 다른 데 알아봐 줘. 미안해~』"

[[dialogue]]
speaker = "コハルコ"
original = "「どうだった？\u3000……って、その顔はダメだったみたいだね」"
translation = "「어땠어? ……인 걸 보니 안 된 모양이네」"

[[dialogue]]
speaker = "コハルコ"
original = "「あ、そうだ！\u3000もうすぐ秋葉原でイベントがあるから、それを手伝ってもらおうかな」"
translation = "「아, 맞다! 곧 아키하바라에서 이벤트가 있으니까 그걸 도와달라고 할까」"

[[dialogue]]
speaker = "unk"
original = "イベント？"
translation = "이벤트?"

[[dialogue]]
speaker = "コハルコ"
original = "「うん。私の実家は秋葉原にあるんだけど、最近モンスターの動きが活発で、秋葉原全体で客足が少なくなっててね」"
translation = "「응. 우리 본가가 아키하바라에 있는데, 최근 몬스터의 움직임이 활발해서 아키하바라 전체적으로 손님이 줄었거든」"

[[dialogue]]
speaker = "コハルコ"
original = "「今一度秋葉原に興味を持ってもらおう、ってことでイベントを催すことになったの」"
translation = "「다시 한번 아키하바라에 관심을 갖게 하자, 라는 취지로 이벤트를 열기로 했어」"

[[dialogue]]
speaker = "コハルコ"
original = "「アニメ、ゲーム、漫画、アイドル……電器やメイドまで、秋葉原らしいものを集めたイベントなんだ」"
translation = "「애니메이션, 게임, 만화, 아이돌…… 가전제품이나 메이드까지 아키하바라다운 것들을 모은 이벤트야」"

[[dialogue]]
speaker = "コハルコ"
original = "「題してアキバフェスタ。店先で特設ショップを開いたり、アニメとのコラボメニューが出たり、アイドルの新曲リリースイベントもあるんだよ」"
translation = "「이름하여 아키바 페스타. 점포 앞에서 특설 샵을 열거나 애니메이션 콜라보 메뉴가 나오기도 하고, 아이돌 신곡 릴리스 이벤트도 있어」"

[[dialogue]]
speaker = "コハルコ"
original = "「私はいろいろ手伝わないといけないことがあるから、会長さんが守護天使さんをサポートしてくれる？」"
translation = "「나는 이것저것 도와야 할 일이 많으니까 회장님이 수호천사분들을 서포트해 줄래?」"

[[dialogue]]
speaker = "unk"
original = "わかりました！"
translation = "알겠습니다!"

[[dialogue]]
speaker = "アルモタヘル"
original = "「助かるぞ、２人とも。我ら守護天使、秋葉原の助けになれるよう力を尽くそう」"
translation = "「도움이 되는군, 두 사람 다. 우리 수호천사, 아키하바라의 도움이 될 수 있도록 힘을 다하마」"

[[dialogue]]
speaker = "コハルコ"
original = "「そんな大げさな……」"
translation = "「그렇게 거창하게는……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「私とアルモタヘルは生まれて以来ずっと守護天使しかしていなかったため、他で働いた経験がありません」"
translation = "「저와 아르모타헬은 태어난 이래로 계속 수호천사만 해왔기 때문에 다른 곳에서 일해본 경험이 없습니다」"

[[dialogue]]
speaker = "コハルコ"
original = "「守護天使しかしてないって、守護天使は職業なの……？」"
translation = "「수호천사만 했다니, 수호천사가 직업인가요……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ご迷惑をおかけすると思いますが、何卒よろしくお願い致します」"
translation = "「폐를 끼치게 될 거라 생각합니다만, 아무쪼록 잘 부탁드립니다」"

