[[dialogue]]
speaker = "unk"
original = "第８話,天使のきざはし,B"
translation = "제8화, 천사의 징검다리, B"

[[dialogue]]
speaker = "アポロ"
original = "「ふん……こんな壁は、壊せばいいだけだ。どいつもこいつも小賢しい」"
translation = "「흥…… 이런 벽은, 부수면 그만이다. 이놈이고 저놈이고 잔꾀만 부리네」"

[[dialogue]]
speaker = "アポロ"
original = "「やはり一度、思い知らせなきゃならないようだな……！」"
translation = "「역시 한 번, 깨닫게 해 줘야 할 것 같군……!」"

[[dialogue]]
speaker = "クロト"
original = "「仮面から<ruby>碧<rt>あお</rt></ruby>色の炎──あれは……」"
translation = "「가면에서 푸른색의 불꽃── 저건……」"

[[dialogue]]
speaker = "unk"
original = "アポロの仮面へ向かって、天から碧色のオーラが吸収されていた。"
translation = "아폴로의 가면을 향해, 하늘에서 푸른색 오라가 흡수되고 있었다."

[[dialogue]]
speaker = "unk"
original = "その様子を見て俺は彼の最期を思い出す──"
translation = "그 모습을 보고 나는 그의 최후를 떠올린다──"

[[dialogue]]
speaker = "セイファート"
original = "「ああ、そうだ……最後に伝えておこう。少年」"
translation = "「아아, 그래…… 마지막으로 전해 두마. 소년」"

[[dialogue]]
speaker = "セイファート"
original = "「妻を操っていた使徒の仮面……あれには、休息の瞬間がある」"
translation = "「아내를 조종하던 사도의 가면…… 저것에는, 휴식의 순간이 있다」"

[[dialogue]]
speaker = "クロト"
original = "「休息──だって……？」"
translation = "「휴식──이라고……?」"

[[dialogue]]
speaker = "セイファート"
original = "「リクリエが根源とはいえ……常に活動を続けられるわけではない。宇宙から、絶えず力を補給している」"
translation = "「리크리에가 근원이라고는 하나…… 항상 활동을 계속할 수는 없다. 우주에서, 끊임없이 힘을 보급하고 있지」"

[[dialogue]]
speaker = "セイファート"
original = "「その信号こそが……<ruby>碧<rt>あお</rt></ruby>色のオーラだ。私は……戦い疲れた妻が、何度もそうするのを見た」"
translation = "「그 신호야말로…… 푸른색의 오라다. 나는…… 싸움에 지친 아내가, 몇 번이고 그러는 것을 보았다」"

[[dialogue]]
speaker = "クロト"
original = "「リクリエのエネルギーは無尽蔵じゃない──アポロは今、新たに宇宙から力をたくわえている」"
translation = "「리크리에의 에너지는 무진장이 아니야── 아폴로는 지금, 새로이 우주에서 힘을 비축하고 있어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれ、充電中ってことね……！？」"
translation = "「저거, 충전 중이라는 거네……!?」"

[[dialogue]]
speaker = "アナ"
original = "「グレート・ウォールの内部で力を限りなく発散させたことで──ガス欠になっているのでしょう」"
translation = "「그레이트 월 내부에서 힘을 한없이 발산했기 때문에── 연료가 떨어진 것이겠지요」"

[[dialogue]]
speaker = "アポロ"
original = "「だったらなんだ？\u3000あたしはもっと強くなる。オマエたちなんかヨユーで消し飛ばせるくらいの力をもらってるんだ」"
translation = "「그렇다면 뭐? 나는 더 강해질 거다. 너희들 따위 여유롭게 날려버릴 정도의 힘을 받고 있으니」"

[[dialogue]]
speaker = "unk"
original = "確かにこれは危機だ。"
translation = "확실히 이것은 위기다."

[[dialogue]]
speaker = "unk"
original = "でも、もし、この局面さえ凌げれば──アポロを枯渇させるチャンスでもある。"
translation = "하지만, 만약, 이 국면만 버텨낸다면── 아폴로를 고갈시킬 기회이기도 하다."

[[dialogue]]
speaker = "クロト"
original = "「なら──やることはひとつ、だな」"
translation = "「그렇다면── 할 일은 하나, 이군」"

[[dialogue]]
speaker = "アポロ"
original = "「……！\u3000なんだ──？」"
translation = "「……! 뭐야──?」"

[[dialogue]]
speaker = "unk"
original = "退路も断たれた結界の内部。対峙するのはリクリエの化身と化した少女。"
translation = "퇴로도 끊긴 결계의 내부. 대치하는 것은 리크리에의 화신이 된 소녀."

[[dialogue]]
speaker = "unk"
original = "もはや、出し惜しみする理由はどこにもない。"
translation = "이제 와서, 아까워할 이유는 어디에도 없다."

[[dialogue]]
speaker = "クロト"
original = "「外に被害が及ぶ心配はない──なら、アポロに宿るエネルギーをすべて、<b>使い果たさせる</b>ことだって可能なはずだ」"
translation = "「밖에 피해가 미칠 걱정은 없다── 그렇다면, 아폴로에게 깃든 에너지를 전부, <ruby>모두 소진시키게<rt>・・ ・・・・・</rt></ruby> 하는 것 또한 가능할 것이다」"

[[dialogue]]
speaker = "マトイ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "セーラ"
original = "「うちらが<ruby>保<rt>も</rt></ruby>つ限り……だね」"
translation = "「우리가 버티는 한…… 이네」"

[[dialogue]]
speaker = "ユウリ"
original = "「保たせるさ。血反吐吐いてもな」"
translation = "「버티게 할 거다. 피를 토하더라도 말이지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「必ずあの仮面からアポロを解き放って──お姉さんを取り戻すわよ！\u3000ついでにリクリエもやっつけちゃうんだから！」"
translation = "「반드시 저 가면에서 아폴로를 해방시키고── 언니를 되찾을 거야! 덤으로 리크리에도 해치워 버릴 테니까!」"

[[dialogue]]
speaker = "unk"
original = "一致団結。俺たちの覚悟はとうに決した。"
translation = "일치단결. 우리의 각오는 이미 정해졌다."

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ありがとうございます──皆さん。私も、それに応えます」"
translation = "「감사합니다── 여러분. 저도, 그것에 응하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナの全身が照り輝く。そして、日輪が祈りに応えた。"
translation = "피오나의 전신이 눈부시게 빛난다. 그리고, 태양이 기도에 응답했다."

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「──アポロニア・レイ──」"
translation = "「──아폴로니아 레이──」"

[[dialogue]]
speaker = "unk"
original = "天上の雲間から──放射状の光が差し込んだ。"
translation = "천상의 구름 사이에서── 방사형의 빛이 쏟아져 들어왔다."

[[dialogue]]
speaker = "unk"
original = "それは、今までありえなかった、天使の階段とも呼ばれる太陽の兆し──"
translation = "그것은, 지금까지 있을 수 없었던, 천사의 계단이라고도 불리는 태양의 징조──"

[[dialogue]]
speaker = "アナ"
original = "「天蓋に裂け目が生じています……！\u3000これなら、星とのリンクも元通りになるかもしれません──！」"
translation = "「천개에 틈이 생기고 있습니다……! 이 정도라면, 별과의 연결도 원래대로 돌아올지도 모릅니다──!」"

[[dialogue]]
speaker = "ルリエル"
original = "「本当です──！\u3000むしろ、いつもより力が湧いてくるような……！」"
translation = "「정말입니다──! 오히려, 평소보다 힘이 솟아나는 듯한……!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ──俺たちにまで熱さが<ruby>滾<rt>たぎ</rt></ruby>ってくる」"
translation = "「아아── 우리에게까지 뜨거움이 끓어오른다」"

[[dialogue]]
speaker = "ユウリ"
original = "「へへっ、気持ちいいじゃねーか──ハートまでガツンとくるっつうか」"
translation = "「헤헷, 기분 좋잖아── 심장까지 쾅 하고 울린다고 할까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それが……フィオナの力なのね」"
translation = "「그게…… 피오나의 힘이구나」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ。私と太陽の熱量は……地上にいる者すべてを逃しません」"
translation = "「네. 저와 태양의 열량은…… 지상에 있는 모든 자를 놓치지 않습니다」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「私の灼熱で──あなたの心の鎧を脱がせてみせます。姉さん」"
translation = "「저의 작열로── 당신의 마음의 갑옷을 벗겨 보이겠습니다. 언니」"

[[dialogue]]
speaker = "アポロ"
original = "「ちっ……なんだこの──熱さは。ああ、鬱陶しい……」"
translation = "「칫…… 뭐야 이── 뜨거움은. 아아, 성가셔……」"

[[dialogue]]
speaker = "unk"
original = "グレート・ウォールの内部に広がっていく灼熱。"
translation = "그레이트 월 내부에 퍼져나가는 작열."

[[dialogue]]
speaker = "unk"
original = "俺たちにとっては心地よい温もりだった。"
translation = "우리에게는 기분 좋은 온기였다."

[[dialogue]]
speaker = "unk"
original = "けれど相対するアポロはまるで、蒸し焼きにされたかのような疲弊を感じていた。"
translation = "하지만 맞서는 아폴로는 마치, 찜 구이가 된 듯한 피로를 느끼고 있었다."

[[dialogue]]
speaker = "unk"
original = "この熱さはいわば──フィオナが姉を想うことによって生じる、情熱的な告白の顕現。"
translation = "이 뜨거움은 말하자면── 피오나가 언니를 생각함으로써 생기는, 정열적인 고백의 현현."

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「──すぅっ」"
translation = "「──후우」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「『正義は太陽と共にある』」"
translation = "「『정의는 태양과 함께 있다』」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「『よこしまな悪党はまとめて全部──私の光で救ってみせよう』"
translation = "「『간사한 악당은 모조리 전부── 저의 빛으로 구원해 보이겠습니다』"

[[dialogue]]
speaker = "アポロ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "アポロ"
original = "「その……セリフは……」"
translation = "「그…… 대사는……」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ふふ。見せ場を取ってしまったでしょうか」"
translation = "「후후. 제 볼거리를 빼앗아 버린 걸까요」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「いずれにせよこれで──最終話です。姉さん。共に、ハッピーエンドを迎えましょう！」"
translation = "「어쨌든 이걸로── 최종화입니다. 언니. 함께, 해피 엔딩을 맞이합시다!」"

