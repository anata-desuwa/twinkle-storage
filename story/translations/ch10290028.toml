[[dialogue]]
speaker = "シャルレーヌ"
original = "「ぁんっ<emoji=heart04>\u3000ごめんなさい魔王様ぁ<emoji=heart04>\u3000んん<emoji=heart04>\u3000魔王様のえろち○ぽ気持ち良すぎてぇっ<emoji=heart04>\u3000おま○こ勝手に締まっちゃうんです～<emoji=heart04>」"
translation = "「앙♥ 죄송해요 마왕님♥ 응♥ 마왕님의 야한 자지가 너무 기분 좋아서♥ 보지가 멋대로 조여버려요~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「でも、射精はしないで、んぅっ<emoji=heart04>\u3000くださいねぇ？\u3000私ぃ、魔王様が負けるところ、見たくないのでぇっ……あぁんっ<emoji=heart04>」"
translation = "「하지만 사정은 하지 말아, 응윽♥ 주세요? 저, 마왕님이 지는 모습 보고 싶지 않으니까요…… 아앙♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁ、あぁあ、んんぅっ、んぁああっ<emoji=heart04>\u3000おち○ちん気持ちいぃっ<emoji=heart04>\u3000ぁあっ、はぁあっ、んんぅうっ<emoji=heart04>\u3000好きぃっ<emoji=heart04>」"
