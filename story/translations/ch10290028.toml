[[dialogue]]
speaker = "シャルレーヌ"
original = "「なんでダメなんです？\u3000あんっ<emoji=heart04>\u3000恋人なんですから、好きって言うのは当たり前のことですよ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「왜 안 된다는 거예요? 앙♥ 연인이니까 좋아한다고 말하는 건 당연한 거잖아요♥ 응후웅♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「好き<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きぃっ……好き<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000あ、あぁんっ<emoji=heart04>\u3000やぁんっ……魔王様だぁい好き<emoji=heart04>\u3000お慕いしてますっ<emoji=heart04>」"
translation = "「좋아해♥ 좋아해♥ 좋아해…… 좋아해♥ 응윽♥ 아, 아앙♥ 야앙…… 마왕님 정말 좋아해요♥ 사모하고 있어요♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ふわぁぁん<emoji=heart04>\u3000シャルレーヌぅ、好きって気持ちい～っぱい込めて<emoji=heart04>\u3000おま○こキュッキュッて、んぅっ<emoji=heart04>\u3000締めちゃいますね～？\u3000んぁあっ<emoji=heart04>」"
translation = "「후와앙♥ 샬레느, 좋아하는 마음 가~득 담아서♥ 보지를 꽉꽉, 응윽♥ 조여버릴게요~? 응앗♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「好き、好き、好き、好き、好きぃー……はあぁんっ<emoji=heart04>\u3000魔王様、世界で一番好きっ……宇宙で一番大好きぃ……あ、あ、あぁ、ああっ<emoji=heart04>」"
translation = "「좋아해, 좋아해, 좋아해, 좋아해, 좋아해~…… 하아앙♥ 마왕님, 세상에서 제일 좋아해…… 우주에서 제일 좋아해…… 아, 아, 아아, 아앗♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ヤバぁ♪\u3000ふわぁぁん<emoji=heart04>\u3000おち○ちんぶっとくなりすぎて、尻尾の拘束、むりむり～って広げられて、きてるぅっ……<emoji=heart04>\u3000んふぅぅん<emoji=heart04>」"
translation = "「대박♪ 후와앙♥ 자지가 너무 굵어져서 꼬리 구속이 무리무리~ 하고 벌어지고 있어……♥ 응후우웅♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「これはぁ、もっと気合い入れて、搾り上げるみたいに、んんぅ<emoji=heart04>\u3000おち○ちん締め付けないと、ダメかも、ですね<emoji=heart04>\u3000あ、はぁっ<emoji=heart04>」"
translation = "「이건 좀 더 기합 넣어서 짜내듯이, 응윽♥ 자지를 조이지 않으면 안 될지도 모르겠네요♥ 아, 하앗♥」"

[[dialogue]]
speaker = "unk"
original = "今までシャルレーヌにたくさんマゾ開発されたとはいえ、責めに対して耐久力が上がっているわけではない。"
translation = "지금까지 샬레느에게 잔뜩 마조 개발을 당했다고는 해도, 공격에 대한 내구력이 올라간 것은 아니다."

[[dialogue]]
speaker = "unk"
