translation = "「하아, 응으읏, 아, 아, 아, 응우읏♥ 한심하게, 패배 표명하며 조르는 말을 해준다면…… 구속, 풀어줄게요♥」"

[[dialogue]]
speaker = "unk"
original = "そんな情けない宣言はしちゃいけない。俺はみんなのために強い魔王であらねばならないんだ。"
