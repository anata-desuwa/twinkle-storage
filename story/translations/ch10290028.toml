[[dialogue]]
speaker = "シャルレーヌ"
original = "「くすっ<emoji=heart04>\u3000おち○ちん反応しましたぁ<emoji=heart04>\u3000はぁ、んふぅう<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000魔王様、本当に弱いですね～？\u3000私に……好き<emoji=heart04>\u3000って言われるの♪」"
translation = "「쿠훗♥ 자지가 반응했어요♥ 하아, 응후우♥ 아앙♥ 마왕님, 정말 약하시네요~? 저한테…… 좋아해♥ 라는 말 듣는 거♪」"

[[dialogue]]
speaker = "クロト"
original = "「ぁ、だ、だめっ……！！」"
