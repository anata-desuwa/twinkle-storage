[[dialogue]]
speaker = "unk"
original = "だけどそれは同時に、俺への攻撃にもなっているから──凄まじい快感がペニスで弾けてしまう。"
translation = "하지만 그것은 동시에 나에 대한 공격이기도 해서── 엄청난 쾌감이 자지에서 터져버린다."

[[dialogue]]
speaker = "クロト"
original = "「は、激し、ぃっ……もうちょっと、ゆっくり……！」"
