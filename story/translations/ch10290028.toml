[[dialogue]]
speaker = "シャルレーヌ"
original = "「もぉ……そんな泣きそうな目でおねだりして<emoji=heart04>\u3000それじゃあしょうがないですねぇっ……んぅ<emoji=heart04>」"
translation = "「정말…… 그렇게 울 것 같은 눈으로 조르다니♥ 그럼 어쩔 수 없네요…… 응♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「動き、速～くしてっ……<emoji=heart04>\u3000私が、自分で……はぁ<emoji=heart04>\u3000おま○この弱いところに、おち○ちん当ててあげます<emoji=heart04>」"
translation = "「움직임, 빠르~게 해줄게요……♥ 제가 직접…… 하아♥ 보지의 약한 부분에 자지를 맞춰줄게요♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ここからは我慢比べですよ、魔王様？\u3000せーのっ<emoji=heart04>」"
