[[dialogue]]
speaker = "シャルレーヌ"
original = "「んんぅっ<emoji=heart04>\u3000ぁあんっ<emoji=heart04>\u3000はぁ、んんぅっ<emoji=heart04>\u3000あはぁ、ここ、ここ好きぃっ<emoji=heart04>\u3000おま○この奥ぅっ<emoji=heart04>\u3000行き止まりの、ところぉ<emoji=heart04>」"
translation = "「응윽♥ 아앙♥ 하아, 응윽♥ 아하, 여기, 여기 좋아♥ 보지 깊숙한 곳♥ 막다른 곳♥」"

[[dialogue]]
speaker = "シャルレーヌ"
