[[dialogue]]
speaker = "シャルレーヌ"
original = "「まさかデート中にモンスターの群れと遭遇しちゃうだなんて……でも会長さん、見事な戦いぶりでした♪」"
translation = "「설마 데이트 중에 몬스터 무리와 조우할 줄이야…… 하지만 회장님, 훌륭한 전투였어요♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「応援に来てくださった星騎士の方々への指示も的確だったし……とってもカッコよかったですよ<emoji=heart04>」"
translation = "「응원하러 와주신 성기사분들에 대한 지시도 정확했고…… 정말 멋졌어요♥」"

[[dialogue]]
speaker = "unk"
original = "街の平和を守れたこと、そして恋人であるシャルレーヌに褒めてもらえたことが、とても嬉しい。"
translation = "거리의 평화를 지켰다는 것, 그리고 연인인 샬레느에게 칭찬받은 것이 매우 기쁘다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「でもー……会長さんのすっごくカッコいいところを見ちゃった反動でしょうか？」"
translation = "「하지만~…… 회장님의 정말 멋진 모습을 본 반동일까요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「今の私、何だか無性に……会長さんが情けな～く負けちゃうところが見たいなーって気分なんですよね～<emoji=heart04>」"
translation = "「지금의 저, 왠지 무턱대고…… 회장님이 한심~하게 져버리는 모습이 보고 싶다는 기분이거든요~♥」"

[[dialogue]]
speaker = "unk"
original = "あれ──流れが変わったな？"
translation = "어라── 흐름이 바뀌었나?"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「まだ戦いの熱も体にこもってて、ウズウズしちゃってますし……くふっ<emoji=heart04>\u3000今からホテル、行きません？」"
translation = "「아직 전투의 열기도 몸에 남아있어서 근질근질하기도 하고…… 크훗♥ 지금부터 호텔, 안 갈래요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「お付き合いしてる私たちを気遣って、他の方々は先に帰っちゃいましたし……丁度いいでしょう？\u3000ほら、早く～<emoji=heart04>」"
translation = "「사귀고 있는 저희를 배려해서 다른 분들은 먼저 돌아가 버렸고…… 딱 좋잖아요? 자, 빨리~♥」"

[[dialogue]]
speaker = "unk"
original = "妖艶に微笑むシャルレーヌに手を引かれ、俺はラブホテルの一室へとたどり着き……"
translation = "요염하게 미소 짓는 샬레느에게 이끌려, 나는 러브호텔의 한 방에 도착했고……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「今日はこの香りにしますね～……特別調合したとっておきです<emoji=heart04>」"
translation = "「오늘은 이 향기로 할게요~…… 특별히 조합한 비장의 향수예요♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「いっぱい吸いこんでください<emoji=heart04>\u3000男の人にだけ作用する、体の自由と引き換えに感度を何倍にも高めてくれる媚薬の香水……<emoji=heart04>」"
translation = "「잔뜩 들이마셔 주세요♥ 남자에게만 작용하는, 몸의 자유와 맞바꿔 감도를 몇 배나 높여주는 미약 향수……♥」"

[[dialogue]]
speaker = "unk"
original = "差し出された香りを嗅いだ途端、足腰から力が抜けて……俺はあっさりとシャルレーヌに押し倒されてしまった──"
translation = "내밀어진 향기를 맡자마자 허리에서 힘이 빠지며…… 나는 허무하게 샬레느에게 눌려 넘어가 버렸다──"

[[dialogue]]
speaker = "unk"
original = "あまりに情けない恰好で焦らされ続けて──もう何十分が経っただろう？"
translation = "너무나 한심한 꼴로 계속 애태워진 지── 벌써 몇십 분이 지났을까?"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁっ……はぁあっ……<emoji=heart04>\u3000魔王様、まだ挿入はしませんよ？\u3000しっかり前戯をしないと、ですからね……ぁんっ<emoji=heart04>」"
translation = "「하앗…… 하아앗……♥ 마왕님, 아직 삽입은 안 할 거예요? 제대로 전희를 해야 하니까요……앙♥」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌの女性器での素股と、巻き付いた尻尾によるリズミカルな上下運動。ペニスに送られるすさまじい快感に、俺の体は震えっぱなしだ。"
translation = "샬레느의 성기를 이용한 스마타와, 몸을 감싼 꼬리에 의한 리드미컬한 상하 운동. 자지에 전해지는 엄청난 쾌감에 내 몸은 계속 떨리고 있다."

[[dialogue]]
speaker = "クロト"
original = "「うぁ……で、出るっ……もう出るっ……シャルレーヌっ……！」"
translation = "「으아…… 나, 나온다…… 이제 나와…… 샬레느……!」"

[[dialogue]]
speaker = "unk"
original = "ペニスが発射準備を始めると、シャルレーヌはそれを素早く察知して──"
translation = "자지가 발사 준비를 시작하자, 샬레느는 그것을 재빨리 알아채고──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「射精はダ～メ<emoji=heart04>\u3000同じ事を何回言わせるんですか～、魔王様っ<emoji=heart04>」"
translation = "「사정은 안~ 돼♥ 똑같은 말을 몇 번이나 하게 만드는 거예요, 마왕님♥」"

[[dialogue]]
speaker = "unk"
original = "ぎゅぅううっ──！"
translation = "꽈아아악──!"

[[dialogue]]
speaker = "クロト"
original = "「ううぅぅうっ……！？」"
translation = "「으으으으윽……!?」"

[[dialogue]]
speaker = "unk"
original = "ペニスの根元に巻き付いたシャルレーヌの尻尾がきつく締まる。せり上がろうとしていた精液が、きっちり通せんぼされてしまった。"
translation = "자지 뿌리에 감긴 샬레느의 꼬리가 세게 조여진다. 치밀어 오르려던 정액이 빈틈없이 가로막혀 버렸다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「やぁん<emoji=heart04>\u3000精液は１滴も出ませんけど……おち○ちんはすっごく震えてますね～<emoji=heart04>\u3000ビクンビクンって、いやらし～い<emoji=heart04>」"
translation = "「야안♥ 정액은 한 방울도 안 나오지만…… 자지는 엄청 떨고 있네요~♥ 파들파들거리는 게, 야해라~♥」"

[[dialogue]]
speaker = "unk"
original = "精液を空撃ちすると、痛いような痒いような不思議な感覚になる。逃げ場を失った熱が体にこもる苛烈な焦らし……"
translation = "정액을 헛발질하면 아픈 듯 가려운 듯한 신기한 감각이 된다. 퇴로를 잃은 열기가 몸에 고이는 가혹한 고문……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くすくす♪\u3000射精の波が引いたみたいなので、いっぱいおま○こスリスリと尻尾コキ、してあげますね～<emoji=heart04>」"
translation = "「쿠스쿠스♪ 사정의 파도가 물러간 것 같으니, 잔뜩 보지 비비기랑 꼬리 딸, 해줄게요~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「情けな～い格好をしてるのに、ギンギンに勃起してる魔王ち○ぽ……死ぬほどコキ倒してあげちゃいます<emoji=heart04>」"
translation = "「한심~한 꼴을 하고 있는데도 빳빳하게 발기한 마왕 자지…… 죽을 만큼 흔들어 줄게요♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほぉら、おま○こでスリスリ<emoji=heart04>\u3000尻尾でシコシコ<emoji=heart04>\u3000シャルレーヌのご奉仕、い～っぱい味わってください<emoji=heart04>」"
translation = "「봐요, 보지로 부비부비♥ 꼬리로 슥삭슥삭♥ 샬레느의 봉사, 가~득 맛봐주세요♥」"

[[dialogue]]
speaker = "クロト"
original = "「……っ！\u3000──っ、ぁっ……ぅっ……！？」"
translation = "「……윽! ──윽, 앗…… 윽……!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁぁあっ<emoji=heart04>\u3000情けない声ぇ……<emoji=heart04>\u3000もしかして魔王様ぁ、もう負けちゃいそうなんです？」"
translation = "「하아아앗♥ 한심한 목소리……♥ 설마 마왕님, 벌써 져버릴 것 같아요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「そんなはずないですよねぇ？\u3000だって魔王様は、世界を救ったヒーローなんですもの～……キャハハハっ<emoji=heart04>」"
translation = "「그럴 리 없겠죠? 왜냐면 마왕님은 세계를 구한 히어로인걸요~…… 캬하하하♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほぉら、い～っぱい深呼吸して？\u3000シャルレーヌが調合したぁ、エロ～い気持ちになっちゃう香水、くんくんして～？」"
translation = "「자, 가~득 심호흡해 볼까요? 샬레느가 조합한, 야~한 기분이 되어버리는 향수, 킁킁해봐요~?」"

[[dialogue]]
speaker = "unk"
original = "バクバクと心臓が早鐘を打っている。今日の香水はかなり効果が強い。嗅ぐとそれだけでペニスから先走りが出るほどの強力な催淫作用がある。"
translation = "심장이 미친 듯이 뛰고 있다. 오늘의 향수는 꽤 효과가 강하다. 맡는 것만으로도 자지에서 쿠퍼액이 나올 정도의 강력한 최음 작용이 있다."

[[dialogue]]
speaker = "unk"
original = "これ以上嗅ぐと、またすぐに射精しそうになってしまう……！"
translation = "이 이상 맡으면 또 금방 사정해버릴 것 같아……!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「魔王様、どうして深呼吸してくれないんです？\u3000恋人のシャルレーヌのお願い、聞くのイヤなんですか？」"
translation = "「마왕님, 왜 심호흡 안 해줘요? 연인인 샬레느의 부탁, 듣기 싫은 건가요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あっ……もしかしてシャルレーヌのこと、実はそんなに好きじゃないんでしょうか……？\u3000だったら落ち込んじゃいます……」"
translation = "「앗…… 혹시 샬레느를 사실 그렇게 좋아하지 않는 걸까요……? 그렇다면 상처받을 거예요……」"

[[dialogue]]
speaker = "unk"
original = "そんなことはあるわけがない。俺はシャルレーヌのことが大好きだ！"
translation = "그럴 리가 없다. 나는 샬레느를 정말 좋아한다!"

[[dialogue]]
speaker = "unk"
original = "俺の体は意思とは無関係に、反射的に深呼吸をしてしまい──"
translation = "내 몸은 의사와 관계없이 반사적으로 심호흡을 해버렸고──"

[[dialogue]]
speaker = "クロト"
original = "「～～～～～～っ！？」"
translation = "「~~~~~~~~!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「キャハハハっ<emoji=heart04>\u3000魔王様、そんながっつくみたいに息を吸い込んでくれるだなんて♪\u3000おち○ちん、死ぬほど跳ねちゃってますよ？」"
translation = "「캬하하하♥ 마왕님, 그렇게 게걸스럽게 숨을 들이마셔 주다니♪ 자지가 죽을 듯이 튀어 오르고 있다고요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「でも嬉しい<emoji=heart04>\u3000シャルレーヌのこと、大好きなんですね<emoji=heart04>」"
translation = "「하지만 기뻐♥ 샬레느를 정말 좋아하는 거군요♥」"

[[dialogue]]
speaker = "unk"
original = "あ、精液が出るっ……！\u3000このまま出せたらめちゃくちゃ気持ちいい……！"
translation = "아, 정액이 나온다……! 이대로 내보낼 수 있다면 엄청나게 기분 좋을 거야……!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「──だからって射精はさせませんよ～<emoji=heart04>\u3000はい、おち○ちんギュゥ～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「──그렇다고 사정하게 두지는 않을 거예요~♥ 자, 자지 꽈아악~♥♥♥」"

[[dialogue]]
speaker = "クロト"
original = "「ぁ──が、ぁ──っ！？」"
translation = "「아── 가, 아──윽!?」"

[[dialogue]]
speaker = "unk"
original = "また精液の空撃ち……頭がおかしくなりそうなほどのオアズケ。"
translation = "또 정액 헛발질…… 머리가 이상해질 정도의 감질맛."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふ<emoji=heart04>\u3000さて、たっぷり汗もかきましたし……そろそろ繋がりましょうか<emoji=heart04>」"
translation = "「쿠후후♥ 자, 땀도 듬뿍 흘렸으니…… 슬슬 이어져 볼까요♥」"

[[dialogue]]
speaker = "unk"
original = "待って欲しい。せめて、息が整うまで。射精していなくてもペニスは何度もイっているんだ、こんな敏感な状態で飲み込まれたら……！"
translation = "기다려 줬으면 좋겠다. 적어도 숨을 고를 때까지. 사정하지 않았어도 자지는 몇 번이나 가버렸다, 이런 민감한 상태로 삼켜진다면……!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「シャルレーヌのちっちゃなおま○こでぇ……おち○ちんにご奉仕させていただきます──ねっ<emoji=heart04>」"
translation = "「샬레느의 조그만 보지로…… 자지에게 봉사해 드릴게요── 알겠죠♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ずっぷぅ～っ……<emoji=heart04>\u3000ぁあぁっ……すっごく気持ちい～<emoji=heart04>\u3000魔王様のおち○ちん、あったかぁ～い<emoji=heart04>」"
translation = "「쥬붑……♥ 아아앗…… 정말 기분 좋아~♥ 마왕님 자지, 따뜻해~♥」"

[[dialogue]]
speaker = "クロト"
original = "「ふぅぐううぅっ──！？」"
translation = "「후우구우우윽──!?」"

[[dialogue]]
speaker = "unk"
original = "ぷにぷにと柔らかいのにギチギチと締め上げてくる、シャルレーヌの名器に耐えられない。またイク──！"
translation = "말랑말랑하면서도 꽉꽉 조여오는 샬레느의 명기에 버틸 수가 없다. 또 가버려──!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ダメでーす<emoji=heart04>\u3000精液は通せんぼでーすっ<emoji=heart04>\u3000尻尾をぎゅ～っ<emoji=heart04>」"
translation = "「안 돼요~♥ 정액은 통행금지예요~♥ 꼬리를 꽈악~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「出せないってわかってるのに、何度も何度もイキたがっちゃうんですから……懲りませんねぇ、このおバカち○ぽ<emoji=heart04>」"
translation = "「못 낸다는 걸 알면서도 몇 번이고 몇 번이고 가고 싶어 하다니…… 포기를 모르네요, 이 바보 자지♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あっという間にイったらつまらないですよ？\u3000ほら、動きますからっ……じっくり、長～く<emoji=heart04>\u3000セックスを楽しみましょ？」"
translation = "「순식간에 가버리면 재미없잖아요? 자, 움직일 테니까…… 느긋하게, 오~래♥ 섹스를 즐겨볼까요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000あっ、ぁっ……あぁんっ<emoji=heart04>\u3000やぁんっ<emoji=heart04>」"
translation = "「아♥ 응윽♥ 하아앗♥ 응후♥ 앗, 앗…… 아앙♥ 야앙♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「魔王様のおち○ちん、太くてすっごく気持ちいいですー……はぁぁん<emoji=heart04>\u3000こんなに逞しい勃起ができるだなんて、惚れ直しちゃう……<emoji=heart04>」"
translation = "「마왕님 자지, 굵어서 정말 기분 좋아요…… 하아앙♥ 이렇게 늠름하게 발기할 수 있다니, 다시 반해버려……♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あぁぁっ<emoji=heart04>\u3000本当にたまんない……あんなにカッコよく指揮してたのに、私の前ではちんぐり返しでアヘアヘ言っちゃって……<emoji=heart04>」"
translation = "「아아앗♥ 정말 못 참겠어…… 그렇게 멋지게 지휘해놓고, 제 앞에서는 발라당 누워서 아헤아헤 거리고……♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほらほら<emoji=heart04>\u3000ぱん、ぱんっ<emoji=heart04>\u3000ぱんっ、ぱんっ<emoji=heart04>\u3000シャルレーヌのおま○こでぇ、勃起おち○ちん<emoji=heart04>\u3000ぱん、ぱん、ぱんっ<emoji=heart04>」"
translation = "「봐요 봐요♥ 팡, 팡♥ 팡, 팡♥ 샬레느의 보지로, 발기 자지♥ 팡, 팡, 팡♥」"

[[dialogue]]
speaker = "unk"
original = "お尻を打ち付けるたび、タイミングを合わせて『ぱんぱん』と言って煽ってくるシャルレーヌ。"
translation = "엉덩이를 부딪칠 때마다 타이밍을 맞춰 『팡팡』이라며 도발해오는 샬레느."

[[dialogue]]
speaker = "unk"
original = "小馬鹿にされているのは間違いないのに、その屈辱感さえ気持ちがいい。俺はすっかり、シャルレーヌにマゾとして調教されてしまっていた。"
translation = "바보 취급당하고 있는 게 분명한데도 그 굴욕감마저 기분이 좋다. 나는 완전히 샬레느에게 마조로서 조교당해 있었다."

[[dialogue]]
speaker = "クロト"
original = "「シャっ……シャリュ、レっ……もう無理っ、出る、出るっ！」"
translation = "「샤…… 샬레, 느…… 이제 무리야, 나와, 나온다고!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あは～、呂律まわってない<emoji=heart04>\u3000ざこち○ぽ、またイっちゃうのぉ？\u3000だ～めっ<emoji=heart04>\u3000んぅっ、イかせないからっ<emoji=heart04>」"
translation = "「아하~, 발음이 꼬였어♥ 허접 자지, 또 가버리는 거야? 안~ 돼♥ 응, 안 보내줄 거니까♥」"

[[dialogue]]
speaker = "unk"
original = "尻尾の拘束はいっこうに緩めてくれない。ペニスの根元でずっとぐるぐると精液がうねっているような感覚に、眩暈がする……"
translation = "꼬리의 구속은 전혀 늦춰주지 않는다. 자지 뿌리에서 계속 뱅글뱅글 정액이 소용돌이치는 듯한 감각에 현기증이 난다……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「魔王様？\u3000そうやってご自身のっ、んぅっ<emoji=heart04>\u3000おち○ちんにばかり、意識されたら寂しいです……はぁ、あぁっ<emoji=heart04>」"
translation = "「마왕님? 그렇게 본인의, 응윽♥ 자지에만 신경 쓰시면 섭섭해요…… 하아, 아앗♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ぁあんっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000ほらぁ、騎乗位エッチで揺れてる、シャルレーヌのおっぱい<emoji=heart04>\u3000見て～？」"
translation = "「응♥ 앗♥ 아앙♥ 응윽♥ 봐요, 기승위 섹스로 흔들리는 샬레느의 가슴♥ 봐줘요~?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ぱん<emoji=heart04>\u3000ぱんっ<emoji=heart04>\u3000するたびにぃ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000たぷん<emoji=heart04>\u3000たぷんっ<emoji=heart04>\u3000って揺れてる、私のおっぱい<emoji=heart04>\u3000いっぱい見て欲しい、ですぅ<emoji=heart04>」"
translation = "「팡♥ 팡♥ 할 때마다♥ 하아앙♥ 출렁♥ 출렁♥ 하고 흔들리는 제 가슴♥ 잔뜩 봐주셨으면 해요♥」"

[[dialogue]]
speaker = "unk"
original = "見たらダメなのに。これ以上性欲を煽られたらおかしくなるのに。小柄なシャルレーヌの大きなおっぱいには抗えない。"
translation = "보면 안 되는데. 이 이상 성욕을 자극받으면 이상해질 텐데. 아담한 샬레느의 커다란 가슴에는 저항할 수 없다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あぁん♪\u3000魔王様のエッチな視線<emoji=heart04>\u3000おっぱいにいっぱい感じますっ<emoji=heart04>\u3000はぁあっ、んんっ……ふぅっ……んんぅっ<emoji=heart04>」"
translation = "「아앙♪ 마왕님의 야한 시선♥ 가슴에 잔뜩 느껴져요♥ 하아앗, 응윽…… 후우…… 응윽♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「もっとエッチな気分になりましょう？\u3000バカみたいにおち○ちん震わせて、濃ゆ～い精液、いっぱい作っちゃいましょう？」"
translation = "「더 야한 기분이 되어볼까요? 바보처럼 자지 파들거리면서, 진~한 정액, 잔뜩 만들어버릴까요?」"

[[dialogue]]
speaker = "クロト"
original = "「で、出るっ、出る出るっ……うぅう！？」"
translation = "「나, 나온다, 나온다 나온다…… 으으윽!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あはぁん<emoji=heart04>\u3000ダメ～<emoji=heart04>\u3000射精はまだダメっ<emoji=heart04>\u3000んん、魔王様の情けないお顔、ぁん<emoji=heart04>\u3000ゾクゾクしちゃう……<emoji=heart04>\u3000もっともっと見せてください<emoji=heart04>」"
translation = "「아하앙♥ 안 돼~♥ 사정은 아직 안 돼♥ 응, 마왕님의 한심한 얼굴, 앙♥ 짜릿짜릿해……♥ 더 더 보여주세요♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んふぅっ<emoji=heart04>\u3000弱音を吐いちゃ駄目<emoji=heart04>\u3000ほぉら頑張れ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000おち○ちん頑張れっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000射精したい欲求に負けるなっ<emoji=heart04>\u3000負けるな～っ<emoji=heart04>」"
translation = "「응후♥ 약한 소리 하면 안 돼♥ 자, 힘내♥ 아아앗♥ 자지 힘내라고♥ 응♥ 사정하고 싶은 욕구에 지지 마♥ 지지 마~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁ、んんんっ<emoji=heart04>\u3000シャルレーヌのおま○こ、ぬるぬるのくちゅくちゅのとろとろで……あぁん<emoji=heart04>\u3000すっごく、気持ちいいと思うけどぉっ……<emoji=heart04>」"
translation = "「하아, 응으윽♥ 샬레느의 보지, 미끈미끈 질척질척 걸쭉해서…… 아앙♥ 정말 기분 좋다고 생각하겠지만~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「負けるなぁっ<emoji=heart04>\u3000んふぅん<emoji=heart04>\u3000むしろ、魔王様のおっきいおち○ちんで、私を屈服させてみてくださ～いっ<emoji=heart04>\u3000はふぅぅん<emoji=heart04>」"
translation = "「지지 마~♥ 응후웅♥ 오히려 마왕님의 커다란 자지로 저를 굴복시켜 보세요~♥ 하후우웅♥」"

[[dialogue]]
speaker = "クロト"
original = "「こ、こんな体勢じゃあ、シャルレーヌを攻めるだなんて無理だっ……！」"
translation = "「이, 이런 자세로는 샬레느를 공격하는 건 무리야……!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あはっ<emoji=heart04>\u3000何それ～？\u3000んんんっ<emoji=heart04>\u3000正常位とかバックだったら、勝てるって言いたいの～？\u3000はぁ、んん、ぁあっ<emoji=heart04>」"
translation = "「아핫♥ 그게 뭐야~? 응응윽♥ 정상위나 후배위라면 이길 수 있다는 거야~? 하아, 응, 아앗♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「どんな体勢でもっ……あ、んんうっ<emoji=heart04>\u3000シャルレーヌのおま○こに勝てたこと、一度もないくせにぃ～<emoji=heart04>」"
translation = "「어떤 자세라도…… 아, 응윽♥ 샬레느의 보지한테 이긴 적 한 번도 없으면서~♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「いっつも先に音を上げて……はぁんっ<emoji=heart04>\u3000ピュッピュしちゃうっ、んんぅ<emoji=heart04>\u3000ざこち○ぽのくせに～っ<emoji=heart04>」"
translation = "「맨날 먼저 소리 지르면서…… 하앙♥ 찍찍 싸버리는, 응윽♥ 허접 자지 주제에~♥」"

[[dialogue]]
speaker = "クロト"
