[[dialogue]]
speaker = "シャルレーヌ"
original = "「そういう強がりっ……あ、あ、あぅうっ<emoji=heart04>\u3000彼女の前で、するなぁっ<emoji=heart04>\u3000あ、はぁ、んんぅ、ふぅ、ふぁあっ<emoji=heart04>」"
translation = "「그런 강한 척…… 아, 아, 아우우읏♥ 그녀 앞에서, 하지 마앗♥ 아, 하아, 응응으, 후우, 화아앗♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「魔王様はぁ、ほんとーは情けない、ざこなの<emoji=heart04>\u3000シャルレーヌの前で、いっぱい見せて来たでしょ？\u3000んぅ、ふぅ、ふぅ、はぁ<emoji=heart04>」"
translation = "「마왕님은~, 사실은 한심한, 허접인걸♥ 샬레느 앞에서, 잔뜩 보여줬었지? 응, 후우, 후우, 하아♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほら、言っちゃえ<emoji=heart04>\u3000言っちゃえ、言っちゃえ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000早く言わないとっ……私が先に、イっちゃいますよぉ？」"
translation = "「자, 말해버려♥ 말해버려, 말해버려♥ 아앙♥ 빨리 말하지 않으면…… 내가 먼저, 가버린다구요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私がイったら、セックスは終わりです<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000後で情けなく、自分の手でシコシコしなきゃいけなく、なっちゃいますよっ<emoji=heart04>\u3000んふぅぅん<emoji=heart04>」"
translation = "「내가 가버리면, 섹스는 끝이에요♥ 하아앙♥ 나중에 한심하게, 자기 손으로 자지러지게 흔들어야만 하게, 되어버린다구요♥ 응후우운♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あ、あ、あ、あ、あっ<emoji=heart04>\u3000おち○ちんヤバっ<emoji=heart04>\u3000おへその裏に、ぐりぐりするの気持ちいぃっ<emoji=heart04>\u3000あ、あ、あ、あ、あぁっ<emoji=heart04>」"
translation = "「아, 아, 아, 아, 앗♥ 자지 위험해♥ 배꼽 뒤를, 그리그리 문지르는 거 기분 좋아아앗♥ 아, 아, 아, 아, 아앗♥」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌがイってしまう。彼女の中で出せなくなる。"
translation = "샬레느가 가버린다. 그녀의 안에서 내보낼 수 없게 된다."

[[dialogue]]
speaker = "unk"
original = "そんなの──"
translation = "그런 건──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あ、あ、やぁんんっ<emoji=heart04>\u3000おま○こ気持ちいい、もうイク<emoji=heart04>\u3000イク、イクぅっ──<emoji=heart04>」"
translation = "「아, 아, 야아앙♥ 보지 기분 좋아, 이제 가♥ 가, 가버렷──♥」"

[[dialogue]]
speaker = "unk"
original = "絶対に──"
translation = "절대로──"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「イク、イク、イク、イク、イクっ──<emoji=heart04>」"
translation = "「가, 가, 가, 가, 가버렷──♥」"

[[dialogue]]
speaker = "unk"
original = "嫌だ──！"
translation = "싫어──!"

[[dialogue]]
speaker = "クロト"
original = "「──世界の危機を救った魔王のくせに！！\u3000大好きな女の子のおま○こには勝てないクソザコでごめんなさい！！！」"
translation = "「──세계의 위기를 구한 마왕인 주제에!! 제일 좋아하는 여자아이의 보지에는 이길 수 없는 개허접이라 죄송합니다!!!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「～～～～っ<emoji=heart04>\u3000ふわぁぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁん<emoji=heart04>\u3000言っちゃいましたねぇ、魔王様ぁっ<emoji=heart04>」"
translation = "「~~~~읏♥ 후와아앗♥ 앗♥ 앗♥ 앗♥ 아아앙♥ 말해버렸네요, 마왕님♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「尻尾緩めてあげますっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000だから一緒に、一緒にイこ<emoji=heart04>\u3000んんぅうっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000イクイクイク──イクぅうぅぅ～っ……！！」"
translation = "「꼬리 늦춰줄게요♥ 아앗♥ 그러니까 같이, 같이 가자♥ 응응우읏♥ 아아앗♥ 가버려 가버려 가버려── 가버려어어어~앗……!!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んんんあぁあぁぁぁあぁぁああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응응아아아아아아아아아아아아~~앗♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "尻尾の拘束が緩んだ直後、ダムの決壊みたいな射精が始まった。"
translation = "꼬리의 구속이 풀린 직후, 댐이 붕괴하는 것 같은 사정이 시작되었다."

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あっ──んんぅあっ！？\u3000あ、ふわぁぁっ……すっごぉい<emoji=heart04>\u3000射精っ<emoji=heart04>\u3000おま○この中で、びゅうびゅう、出てるぅっ<emoji=heart04>」"
translation = "「앗──응응우앗!? 아, 후와아앗…… 굉장해♥ 사정♥ 보지 안에서, 뷰븃, 나오고 있어어엇♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「んふぅっ、んんぅっ、あ、ぁっ──ん、んぁあぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응후읏, 응응읏, 아, 아앗──응, 응아아앗♥♥♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「勢いヤバぁ……んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000奥にびゅくびゅく、いっぱい当たって、るぅっ……<emoji=heart04>」"
translation = "「기세 위험해…… 응♥ 응응♥ 깊숙한 곳에 뷰큿뷰큿, 잔뜩 닿고, 있어어……♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「と、止まらない、じゃないっ……この<emoji=heart04>\u3000ほんと、ドスケベなんだから、ぁっ……<emoji=heart04>\u3000あ──ふぅぅうっ<emoji=heart04>」"
translation = "「머, 멈추지 않아, 가 아니잖아…… 이♥ 정말, 도스케베라니까아, 앗……♥ 아──후우우읏♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「射精、勢いすごくって──ぉっ<emoji=heart04>\u3000おぉっ<emoji=heart04>\u3000気持ちぃっ……んんぅっ……ぁ、あ、ぁっ……<emoji=heart04><emoji=heart04>」"
translation = "「사정, 기세가 엄청나서──오♥ 오오♥ 기분 좋아…… 응응읏……아, 아, 앗……♥♥」"

[[dialogue]]
speaker = "unk"
original = "そのまま気を失いそうになるほどの大量射精が、何十秒もかけてじっくりと続いて──"
translation = "그대로 정신을 잃을 것 같을 정도의 대량 사정이, 수십 초에 걸쳐 정성스럽게 이어지고──"

[[dialogue]]
speaker = "unk"
original = "もう出し尽くしたと思っていたのに。ペニスを引き抜く瞬間の刺激で、また精液が飛んで──シャルレーヌのおっぱいまで汚してしまった……"
translation = "이제 다 쏟아냈다고 생각했는데. 페니스를 뽑는 순간의 자극으로, 다시 정액이 튀어서── 샬레느의 가슴까지 더럽히고 말았다……"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はぁあ～っ……ふぅうう～っ……はぁ～っ……ふぅう～っ……<emoji=heart04>」"
translation = "「하아아~앗…… 후우우우~앗…… 하아~앗…… 후우우~앗……♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「射精、ようやくおさまりましたね～……くふふ、魔王様の敗北宣言……最高でしたぁ<emoji=heart04>」"
translation = "「사정, 겨우 가라앉았네요~…… 쿠후후, 마왕님의 패배 선언…… 최고였어요♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「すっごく強いのに……みんなの憧れなのに……シャルレーヌの言うこと、ぜーんぶ聞いてくれる……くふふっ<emoji=heart04>」"
translation = "「엄청 강한데…… 모두의 동경인데…… 샬레느가 말하는 거, 저언부 들어줘…… 쿠후후♥」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「これからもず～っと一緒にいましょう？\u3000情けなくて、カッコ悪いところ……シャルレーヌだけに、いっぱい見せて……♪」"
translation = "「앞으로도 계~속 함께 있어요? 한심하고, 꼴사나운 모습…… 샬레느한테만, 잔뜩 보여줘……♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「とっても素敵な……私だけの魔王様……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「정말 멋진…… 나만의 마왕님……♥♥♥」"

