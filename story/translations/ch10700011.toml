[[dialogue]]
speaker = "unk"
original = "第１話,フレンドリーなギャル天使,P"
translation = "제1화, 프렌들리한 갸루 천사"

[[dialogue]]
speaker = "unk"
original = "お正月休みが明けて、数日後のこと。流星寮に用事があって、俺がそこで偶然会ったフィオナと話していると――"
translation = "정월 연휴가 끝나고 며칠 뒤의 일. 유성 기숙사에 용무가 있어서 내가 그곳에서 우연히 만난 피오나와 대화하고 있자──"

[[dialogue]]
speaker = "フィオナ"
original = "「――なるほど。水着フォームに続いて、晴れ着フォームを……それは興味深いですね。あとで是非、拝見してみたいです」"
translation = "「──그렇군요. 수영복 폼에 이어 설빔 폼을…… 그건 흥미롭네요. 나중에 꼭 보고 싶어요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ！\u3000会長くんじゃ～ん♪」"
translation = "「앗! 회장군이잖아~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ちょりっす～♪\u3000今日はどうしたの～？\u3000って、フィオナ会長も！\u3000こんにちは～♪」"
translation = "「쵸릿쓰~♪ 오늘은 어쩐 일이야~? 어라, 피오나 회장님도! 안녕하세요~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「こんにちは、ウズメ。今、会長くんって呼んでたけど、もしかして緋宮会長と知り合いだったの？」"
translation = "「안녕, 우즈메. 방금 회장군이라고 불렀는데, 혹시 히노미야 회장님이랑 아는 사이였니?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はい。お正月にソフィのことで相談したのがきっかけで、あっという間に仲良くなっちゃいました♪」"
translation = "「네. 정월에 소피 일로 상담한 게 계기가 되어서 순식간에 친해져 버렸어요♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「確かに２人共、友達作りが上手だもんね。気が合いそう」"
translation = "「확실히 둘 다 친구 사귀는 걸 잘하니까. 마음이 잘 맞겠어.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへへ～♪\u3000そうなんですよ～。今ではもう、すっかり友達、みたいな？」"
translation = "「에헤헤~♪ 맞아요~. 지금은 이제 완전히 친구, 같은 느낌?」"

[[dialogue]]
speaker = "フィオナ"
original = "「お正月の話はちょうど緋宮会長から聞いてたところなんだけど、ソフィアがサーシャさんと仲直りしたんだってね。私も気になってたから、よかった」"
translation = "「정월 이야기는 방금 히노미야 회장님한테 듣던 참인데, 소피아가 사샤 씨랑 화해했다면서. 나도 신경 쓰였는데 다행이야.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はい！\u3000姉妹一緒に初詣に行って、わだかまりを解くことができて……あたしとしても、ソフィの晴れやかな笑顔が見れて、すごく嬉しかったです♪」"
translation = "「네! 자매가 함께 하츠모데에 가서 앙금을 풀 수 있었고…… 저로서도 소피의 밝은 미소를 볼 수 있어서 정말 기뻤어요♪」"

[[dialogue]]
speaker = "unk"
original = "改めて、彼女はソフィアのクラスメイトで親友の、流星学園１年生、雨野ウズメイア。"
translation = "다시 말하지만 그녀는 소피아의 클래스메이트이자 절친인 유성 학원 1학년, 아마노 우즈메이야."

[[dialogue]]
speaker = "unk"
original = "ソフィアとサーシャさんを一緒に初詣に行かせたいと、俺とヴィーナスに相談してきたことがきっかけで知り合った。"
translation = "소피아와 사샤 씨를 함께 하츠모데에 보내고 싶다며 나와 비너스에게 상담해 온 것을 계기로 알게 되었다."

[[dialogue]]
speaker = "unk"
original = "ギャルな見た目だが、友達想いな、優しい女の子である。"
translation = "갸루 같은 외모지만 친구를 아끼는 상냥한 여자아이다."

[[dialogue]]
speaker = "フィオナ"
original = "「そういえば、初詣を通して、ウズメも晴れ着フォームに変身できるようになったんだって？\u3000どんな感じなの？」"
translation = "「그러고 보니 하츠모데를 통해 우즈메도 설빔 폼으로 변신할 수 있게 됐다면서? 어떤 느낌이니?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「それだったら、見せちゃいますよ！\u3000――変身！」"
translation = "「그거라면 보여드릴게요! ──변신!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「じゃ～ん♪\u3000これがあたしの新しい戦闘服、晴れ着フォームで～す！\u3000どうですか、フィオナ会長！」"
translation = "「쨔잔~♪ 이게 제 새로운 전투복, 설빔 폼이에요~! 어때요, 피오나 회장님!」"

[[dialogue]]
speaker = "フィオナ"
original = "「こ、これは……！」"
translation = "「이, 이것은……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「え～っと……なんというか――ざ、斬新なアレンジの晴れ着？\u3000だね……？」"
translation = "「에── 그러니까…… 뭐랄까── 처, 참신한 어레인지의 설빔? 이네……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「なんで疑問形！？」"
translation = "「왜 의문형이에요!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ソフィがトンチキとか言ってたけど、この晴れ着ってそんなに変なの！？\u3000ヘレナちゃんもノリノリでデザインしてくれてたのに……！」"
translation = "「소피가 엉터리라느니 어쩌느니 했지만, 이 설빔이 그렇게 이상해요!? 헬레나짱도 신나서 디자인해 줬는데……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「いや、可愛いとは思うよ？\u3000ただ、その……帯の結び目が前側だし……」"
translation = "「아니, 귀엽다고는 생각해. 다만, 그…… 오비의 매듭이 앞쪽이고……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「結び目って後ろ側じゃないとおかしいの！？」"
translation = "「매듭은 뒤쪽이 아니면 이상한 거예요!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「リボンみたいでアリだと思ったのに……！」"
translation = "「리본 같아서 괜찮을 줄 알았는데……!」"

[[dialogue]]
speaker = "unk"
original = "まぁでも、本当に似合ってると思うよ"
translation = "뭐 하지만, 정말 잘 어울린다고 생각해."

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くん……！\u3000えへへ♪\u3000ありがと！\u3000あたしとしても念願の和装戦闘服だから、気に入ってるんだ～♪」"
translation = "「회장군……! 에헤헤♪ 고마워! 나로서도 염원하던 일본풍 전투복이라 마음에 든다구~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「ウズメは日本伝統文化が好きって言ってたものね」"
translation = "「우즈메는 일본 전통문화를 좋아한다고 했었지.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はい♪\u3000それが理由で天界から降りてきて、この学園に入学したくらいだし！」"
translation = "「네♪ 그 이유로 천계에서 내려와 이 학원에 입학했을 정도니까요!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ、もちろんリクリエと戦おうって気持ちも本物ですよ？\u3000大好きな日本文化が消されちゃうなんて、絶対に許せませんし！」"
translation = "「앗, 물론 리크리에와 싸우겠다는 마음도 진짜예요! 정말 좋아하는 일본 문화가 사라지는 건 절대 용서할 수 없으니까요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「でも、入学してわずか１ヶ月で、その……今時な女子の格好に変わった時は驚いたよ。セーラさんの影響だっていうのは知ってたけど……」"
translation = "「하지만 입학하고 불과 한 달 만에 그…… 요즘 여자애 같은 모습으로 변했을 때는 놀랐어. 세라 씨의 영향이라는 건 알고 있었지만……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ギャルファッションですか？\u3000セーラ先輩の私服がカッコ可愛いな～って思って、色々教えてもらったら、ハマっちゃったんですよ～」"
translation = "「갸루 패션 말인가요? 세라 선배의 사복이 멋지구 귀엽다고 생각해서 이것저것 배웠더니 푹 빠져버렸어요~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「みんなからよく言われますけど、ギャルファッションだって日本の立派な伝統文化ですから！」"
translation = "「다들 자주 말하지만 갸루 패션도 일본의 훌륭한 전통문화니까요!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「伝統っていうのは、新しいものが続いてゆくことで、いつしか呼ばれるようになるものなんで！」"
translation = "「전통이라는 건 새로운 것이 계속 이어지면서 어느샌가 불리게 되는 거니까요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「知り合ったばかりの時の、天使らしい清楚系の格好も、私は可愛かったと思うよ」"
translation = "「처음 만났을 때의 천사다운 청초한 스타일도 나는 귀여웠다고 생각해.」"

[[dialogue]]
speaker = "unk"
original = "前のウズメがどんなだったのか、気になる"
translation = "예전의 우즈메가 어땠는지 궁금하네."

[[dialogue]]
speaker = "ウズメイア"
original = "「え、そう？\u3000えへへ♪\u3000２人にそう言われると、たまにはイメチェンしてみるのもいいかも♪」"
translation = "「에, 그래요? 에헤헤♪ 두 분이 그렇게 말씀하시니 가끔은 이미지 체인지를 해보는 것도 좋을지도♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、そうだ！\u3000せっかくだし、あたしと入れ替えでフィオナ会長もギャルファッションにイメチェンしてみませんか？\u3000お試しで！」"
translation = "「아, 맞다! 이왕 이렇게 된 거 저랑 교대로 피오나 회장님도 갸루 패션으로 이미지 체인지 해보실래요? 시험 삼아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「私が！？」"
translation = "「내가!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「フィオナ会長、ただでさえ可愛くてモテモテなんだから、ギャルな格好したら天下無双だし！」"
translation = "「피오나 회장님은 가만히 있어도 귀여워서 인기 폭발이니까 갸루 차림을 하면 천하무적이라구요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「い、一応、星徒会長としてのイメージというものがありますから……」"
translation = "「이, 일단 성도회장으로서의 이미지라는 게 있으니까……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「みんなの前では難しいかもしれないけど、部屋で遊びで着るだけなら、誰にも文句言われないし、問題なくないですか！？」"
translation = "「모두 앞에서는 어려울지 몰라도 방에서 놀면서 입는 것뿐이라면 아무도 뭐라 안 할 테고 문제없지 않아요!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしの部屋で今度、メイクして遊びましょう！\u3000服も貸しますし！」"
translation = "「제 방에서 다음에 메이크업하고 놀아요! 옷도 빌려드릴게요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「…………なるほど、部屋の中だけなら……って、いやいやいや！」"
translation = "「…………그렇구나, 방 안에서만이라면…… 아니아니아니!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「この反応は脈ありっしょ！！」"
translation = "「이 반응은 가능성 있다구!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くんだって、フィオナ会長のギャルファッション、見てみたいよね！？」"
translation = "「회장군도 피오나 회장님의 갸루 패션, 보고 싶지!?」"

[[dialogue]]
speaker = "unk"
original = "ギャルファッションのフィオナ……！"
translation = "갸루 패션의 피오나……!"

[[dialogue]]
speaker = "フィオナ"
original = "「えぇっ！？\u3000緋宮会長までそんなこと……！\u3000は、恥ずかしいですから……」"
translation = "「에엣!? 히노미야 회장님까지 그런 말을……! 부, 부끄러우니까요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ～、フィオナ会長ってば、顔赤くなってるし～！\u3000めっちゃ乙女で可愛いんだけど～♪」"
translation = "「아~ 피오나 회장님두 참, 얼굴 빨개졌네~! 완전 소녀 같고 귀여운데~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「も～、からかわないでくださいっ、ウズメ……！」"
translation = "「정말~ 놀리지 마세요, 우즈메……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あははっ、ごめんなさ～い♪」"
translation = "「아하핫, 미안해요~♪」"

[[dialogue]]
speaker = "unk"
original = "フィオナとも学年の枠を越えて仲良くするウズメ。そんな彼女を改めてすごいと思うのだった――"
translation = "피오나와도 학년의 벽을 넘어 사이좋게 지내는 우즈메. 그런 그녀를 새삼 대단하다고 생각하게 되는 것이었다──"

