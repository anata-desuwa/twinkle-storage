[[dialogue]]
speaker = "unk"
original = "ネーゼマインと恋人として付き合い始めて、しばらく経ったある日のこと。"
translation = "네제마인과 연인으로 사귀기 시작하고 시간이 꽤 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は星徒会の仕事が終わった後、彼女と待ち合わせをしていた――"
translation = "나는 성도회 업무가 끝난 뒤 그녀와 약속을 하고 있었다――"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ、会長～。仕事お疲れさま～♪」"
translation = "「앗, 회장님~. 업무 수고했어~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ううん、私もそんなに待ってなかったから、大丈夫だよ～。ここに来る前に、色々と準備してたから♪」"
translation = "「으응, 나도 그렇게 많이 기다리지 않았으니까 괜찮아~. 여기 오기 전에 이것저것 준비하고 있었거든♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「何の準備かって？\u3000にひひ♪\u3000それは家に着いてからのお楽しみ～☆」"
translation = "「무슨 준비냐고? 니히히♪ 그건 집에 도착해서 기대해 봐~☆」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――うん、今日は私ん家、両親とも明日まで帰ってこないから」"
translation = "「――응, 오늘은 우리 집, 부모님 두 분 다 내일까지 안 돌아오시거든」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いつものストレス解消は、私の部屋で……ね<emoji=heart04>」"
translation = "「평소의 스트레스 해소는 내 방에서…… 알지♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃ～ん♪\u3000というわけで、これが今日のエッチアイテムで～す<emoji=heart04>」"
translation = "「짜잔~♪ 그런 고로, 이게 오늘의 야한 아이템입니다~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000キミの、何それ！？\u3000って驚いた顔、いつ見てもウケる～♪」"
translation = "「니히히♪ 너의, 그게 뭐야!? 하고 놀란 얼굴, 언제 봐도 웃겨~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これはぁ、私特製のローションをた～っぷり付けてぇ、ぬるぬるにした、ストッキングだよ<emoji=heart04>」"
translation = "「이건 말이지~, 내 특제 로션을 듬~뿍 묻혀서 미끈미끈하게 만든 스타킹이야♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「し・か・も～<emoji=heart04>\u3000さっきまで私が履いてたぁ……脱ぎたてホヤホヤ<emoji=heart04>」"
translation = "「게·다·가~♥ 방금 전까지 내가 신고 있었던…… 막 벗은 따끈따끈한 거♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「今日はこれを使って、キミのおち○ぽを責めちゃいま～す<emoji=heart04>」"
translation = "「오늘은 이걸 사용해서 너의 자지를 괴롭혀 줄게♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「お手柔らかにって？\u3000きゃははっ♪\u3000おち○ぽ、期待でもう勃起しちゃってるのに～？\u3000ぜんぜん説得力ないよ～？<emoji=heart04>」"
translation = "「살살 해달라고? 꺄하핫♪ 자지, 기대돼서 벌써 발기해 버렸으면서~? 전혀 설득력 없어~?♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それじゃあ、私がするから、キミは動いちゃダメだからね？\u3000行くよ～<emoji=heart04>」"
translation = "「그럼 내가 할 테니까 너는 움직이면 안 돼? 간다~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほ～ら<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000シュッシュ<emoji=heart04>\u3000にひひ<emoji=heart04>\u3000どうしたの～？\u3000今、すっごい情けない声が出たよ～？」"
translation = "「보라구♥ 눅적눅적♥ 슉슉♥ 니히히♥ 왜 그래~? 지금 엄청 한심한 소리가 났어~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぬっちゅぬっちゅ<emoji=heart04>\u3000え～？\u3000刺激強いって～？\u3000でもぉ、キミはそれで気持ちよく、なっちゃうんでしょ～？\u3000ほらほら～<emoji=heart04>\u3000シュッシュシュ～<emoji=heart04>」"
translation = "「눅적눅적♥ 에~? 자극이 강하다고~? 하지만 너는 그걸로 기분 좋아져 버리는 거잖아~? 자자~♥ 슉슉슉~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あのね～、ネットで調べたんだけどぉ、男の人って射精だけじゃなく、女の子みたいに潮吹きもできるんだって～<emoji=heart04>」"
translation = "「있잖아~, 인터넷으로 알아봤는데~, 남자도 사정만 하는 게 아니라 여자애처럼 조수도 뿜을 수 있대~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「普通は射精したら終わりだけどぉ……<emoji=heart04>\u3000その後におち○ぽの先っぽを刺激し続けることで、できるんだってさ<emoji=heart04>」"
translation = "「보통은 사정하면 끝이지만……♥ 그 뒤에 자지 끝을 계속 자극하면 할 수 있다더라고♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～？\u3000にひひ<emoji=heart04>\u3000そのまさかだよ～<emoji=heart04>\u3000今日はぁ～……私、キミの潮吹きが見たいな～って思って～<emoji=heart04>」"
translation = "「응? 니히히♥ 바로 그거야~♥ 오늘은~…… 나, 너의 조수를 보고 싶다고 생각해서~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――潮吹きなんてしたことない？\u3000だからぁ……そんなキミの初めてが見たいんだよ～<emoji=heart04>」"
translation = "「――조수 같은 건 해본 적 없다고? 그러니까…… 그런 너의 처음을 보고 싶은 거야~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ねぇ……私のおま○こで初めて中出し決めた時みたいにぃ、キミの情けな～いエッチな顔……私に見せて<emoji=heart04>」"
translation = "「저기…… 내 보지에 처음으로 질내사정 했을 때처럼, 너의 한심하~고 야한 얼굴…… 나한테 보여줘♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――あはっ、きゃははっ♪\u3000今の煽りでおち○ぽ一気に固くしちゃうとか、キミってばチョロすぎ～<emoji=heart04>」"
translation = "「――아핫, 꺄하하♪ 방금 도발로 자지를 단번에 딱딱하게 만들다니 너 정말 쉽네~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふ……<emoji=heart04>\u3000しかも刺激強いとか言っておきながら、気持ちよくてたまらないって顔しちゃって～<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>\u3000シュッシュシュ<emoji=heart04>」"
translation = "「응후……♥ 게다가 자극이 강하다고 해놓고는 기분 좋아서 견딜 수 없다는 얼굴을 하고~♥ 눅적눅적♥ 슉슉슉♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「キミのおち○ぽ、デカくて凶悪なのに、責められると本当に雑魚だね～<emoji=heart04>\u3000雑魚ザコざ～こ<emoji=heart04>\u3000図体だけの雑魚ち○ぽ<emoji=heart04>」"
translation = "「너의 자지, 크고 흉악한데 괴롭힘당하면 정말 허접이네~♥ 허접 허접 허~접♥ 덩치만 큰 허접 자지♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……<emoji=heart04>\u3000女の子にバカにされてるのに、おち○ぽ我慢できずに、もうガッチガチ<emoji=heart04>\u3000キミもいつの間にか、すっかりマゾの変態さんになっちゃったね～<emoji=heart04>」"
translation = "「응……♥ 여자애한테 바보 취급당하는데도 자지 참지 못하고 벌써 빳빳♥ 너도 어느새 완전히 마조 변태님이 되어버렸네~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふふっ、私のせい？\u3000そうだよ～♪\u3000ストレス解消する時は意地悪していいって、キミが言ったんだから<emoji=heart04>\u3000その責任は取ってもらわないと<emoji=heart04>」"
translation = "「후후, 내 탓이라고? 맞아~♪ 스트레스 해소할 때는 짓궂게 굴어도 된다고 네가 말했으니까♥ 그 책임은 져줘야겠어♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――きゃはっ<emoji=heart04>\u3000気持ちよすぎて、女の子みたいな喘ぎ声出てる<emoji=heart04>\u3000ん……ふうぅ……<emoji=heart04>\u3000そんな反応されたら、私も興奮しちゃうよ～、もう<emoji=heart04>」"
translation = "「――꺄핫♥ 기분 너무 좋아서 여자애 같은 신음이 나오고 있어♥ 응…… 후우……♥ 그런 반응을 보이면 나도 흥분해 버리잖아, 정말♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ねぇ、キミの情けない声、もっと聞かせて<emoji=heart04>\u3000ぬっちゅぬっちゅ、シュッシュ<emoji=heart04>\u3000ぬりゅぬりゅ、シュシュシュ<emoji=heart04>\u3000んっ……はあぁ……おま○こも濡れてきちゃう<emoji=heart04>」"
translation = "「저기, 너의 한심한 소리 더 들려줘♥ 눅적눅적, 슉슉♥ 미끈미끈, 슉슉슉♥ 응…… 하아…… 보지도 젖어버려♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～？\u3000気持ちよすぎて辛いから、早くイかせてほしい？\u3000仕方ないな～<emoji=heart04>\u3000早漏の雑魚ち○ぽ<emoji=heart04>\u3000ほら、激しくしちゃうよ～」"
translation = "「음~? 기분 너무 좋아서 괴로우니까 빨리 가게 해달라고? 어쩔 수 없네~♥ 조루 허접 자지♥ 자, 격하게 해줄게」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぐちゅぐちゅシュッシュ<emoji=heart04>\u3000ぬりゅぬりゅシュシュシュ<emoji=heart04>\u3000ぬちゅぬちゅシュッシュ<emoji=heart04>\u3000にゅるにゅるシュシュシュ<emoji=heart04>\u3000ねちゃねちゃシュッシュ<emoji=heart04>\u3000ぬちゃぬちゃシュシュ<emoji=heart04>」"
translation = "「구축구축 슉슉♥ 미끈미끈 슉슉슉♥ 눅적눅적 슉슉♥ 미끈미끈 슉슉슉♥ 끈적끈적 슉슉♥ 질척질척 슉슉♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら、イキそう？\u3000にひひ、イっちゃえ<emoji=heart04>\u3000ぬちゅぬちゅシュシュ<emoji=heart04>\u3000にゅるにゅるピュッピュ<emoji=heart04>」"
translation = "「자, 갈 것 같아? 니히히, 가버려♥ 눅적눅적 슉슉♥ 미끈미끈 찍찍♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら<emoji=heart04>\u3000もう、イっちゃいなよ<emoji=heart04>\u3000イけ、イけイけイけ<emoji=heart04>\u3000イっ――」"
translation = "「자♥ 이제 가버리라구♥ 가라, 가가각♥ 가――」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はいっ、スト～ップ！\u3000そう簡単に、イかせてあげませ～ん<emoji=heart04>」"
translation = "「자, 스톱! 그렇게 쉽게 가게 해주지 않을 거야♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それにね、知らなかった……？\u3000男の人は亀頭を責められるだけじゃ、気持ち良くても射精できないんだよ？\u3000竿を縦にゴシゴシ～ってしないと、精液出ないの<emoji=heart04>」"
translation = "「그리고 말이야, 몰랐어……? 남자는 귀두만 괴롭힘당해서는 기분 좋아도 사정할 수 없대. 기둥을 세로로 슥슥~ 하지 않으면 정액이 안 나와♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――んふっ……きゃははははは<emoji=heart04>\u3000あ～<emoji=heart04>\u3000その切なそうな顔、たまらないよ～<emoji=heart04>」"
translation = "「――응훗…… 꺄하하하하하♥ 아~♥ 그 애타는 얼굴, 견딜 수 없어~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁ……<emoji=heart04>\u3000ゾクゾクして、おま○こから愛液溢れてきちゃう<emoji=heart04>」"
translation = "「하아아……♥ 짜릿해서 보지에서 애액이 넘쳐버려♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「もっと私が、じっくりねっとり、気持ちよくイジメちゃうんだから……<emoji=heart04>」"
translation = "「좀 더 내가 천천히 끈적하게, 기분 좋게 괴롭혀 줄 거니까……♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほらぁ<emoji=heart04>\u3000今度は手コキで、竿も責めちゃうからね～<emoji=heart04>\u3000ぬっちゅぬっちゅ、シッコシッコ<emoji=heart04>」"
translation = "「자♥ 이번엔 손으로 기둥도 괴롭혀 줄게~♥ 눅적눅적, 슥슥♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……<emoji=heart04>\u3000熱くて固～い<emoji=heart04>\u3000我慢汁とローションでもう、ぬっるぬる<emoji=heart04>\u3000すうぅ……<emoji=heart04>\u3000オスの匂いすっごい……頭くらくらしちゃう……んふぅ<emoji=heart04>」"
translation = "「응……♥ 뜨겁고 딱딱해~♥ 쿠퍼액이랑 로션 때문에 벌써 미끈미끈♥ 후우……♥ 수컷 냄새 엄청나…… 머리가 어질어질해…… 응후♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「息とか吹きかけてみたりして<emoji=heart04>\u3000ふ～っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000唇ちょっと当たっちゃった<emoji=heart04>\u3000もう１回……ふ～っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ほら、おち○ぽ暴れな～い……ちゅっ<emoji=heart04>」"
translation = "「입김 같은 걸 불어보기도 하고♥ 후~♥ 응♥ 입술이 살짝 닿아버렸네♥ 한 번 더…… 후~♥ 앙♥ 자, 자지 날뛰지 마…… 쪽♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはっ<emoji=heart04>\u3000おち○ぽピクッとした～<emoji=heart04>\u3000ぬっちゅぬっちゅ、シッコシッコ<emoji=heart04>\u3000キスだけで感じちゃう雑魚ち○ぽ、気持ちいいでちゅか～？\u3000ぬりゅぬりゅ、シッコシッコ<emoji=heart04>」"
translation = "「꺄핫♥ 자지 움찔했어~♥ 눅적눅적, 슥슥♥ 키스만으로 느껴버리는 허접 자지, 기분 좋은가요~? 미끈미끈, 슥슥♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おやおや～？\u3000焦らさないで、イカせてほしい？\u3000はあぁ<emoji=heart04>\u3000私の前でだけ見せてくれる、切なそうにおねだりする顔、愉悦を感じちゃう……<emoji=heart04>」"
translation = "「어라어라~? 뜸 들이지 말고 가게 해달라고? 하아아♥ 내 앞에서만 보여주는 애타게 조르는 얼굴, 유열을 느껴버려……♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「答えはもちろん、ノーだよ～<emoji=heart04>\u3000雑魚ち○ぽは大人しく、私に言うこと聞いて、我慢汁濡らしてれば～？」"
translation = "「대답은 당연히 노야~♥ 허접 자지는 얌전하게 내 말 들으면서 쿠퍼액이나 적시고 있으라구~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ<emoji=heart04>\u3000雑魚ザコざ～こ<emoji=heart04>\u3000少しは男らしく我慢しなよ～」"
translation = "「꺄하하핫♥ 허접 허접 허~접♥ 조금은 남자답게 참아보라구~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぬっちゅぬっちゅ、シッコシッコ<emoji=heart04>\u3000んふっ……<emoji=heart04>\u3000カリの裏のところ、ちょっと擦っただけで、女の子みたいな甘い喘ぎ声上げちゃって<emoji=heart04>」"
translation = "「눅적눅적, 슥슥♥ 응훗……♥ 귀두 테두리 부분을 조금 문질렀을 뿐인데 여자애 같은 달콤한 신음을 내고♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「情けなさすぎて、笑っちゃうんですけど～<emoji=heart04>\u3000ほら、にゅっぷにゅっぷ、シッコシッコ<emoji=heart04>」"
translation = "「너무 한심해서 웃음이 나오는데~♥ 자, 눅눅, 슥슥♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ローションまみれのストッキング<emoji=heart04>\u3000これでまた、亀頭を集中的にシコシコしたら、どうなっちゃうのかな～？\u3000あはぁ<emoji=heart04>」"
translation = "「로션 범벅인 스타킹♥ 이걸로 다시 귀두를 집중적으로 문질문질하면 어떻게 되려나~? 아하♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「カリ裏、ぬりゅぬりゅ、シ～ッコシッコ<emoji=heart04>\u3000からの～、亀頭をぬっちゅぬっちゅぬっちゅ、シ～ッコシッコ<emoji=heart04>」"
translation = "「테두리 미끈미끈, 스~윽슥♥ 그리고 귀두를 눅적눅적눅적, 스~윽슥♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははっ<emoji=heart04>\u3000おち○ぽ、ビクビクしてる～<emoji=heart04>\u3000亀頭シコシコ、そんな気持ちいいんだ～？」"
translation = "「꺄하핫♥ 자지 파르르 떨고 있어~♥ 귀두 문질문질, 그렇게 기분 좋아~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぐっちゅぐっちゅ、ぬっぽぬっぽ<emoji=heart04>\u3000ぬっちゅぬっちゅ、にゅっぽにゅっぽ<emoji=heart04>」"
translation = "「구축구축 눅적눅적♥ 눅적눅적 눅적눅적♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほらほら～<emoji=heart04>\u3000カリ裏から擦り上げるのと同時に、亀頭の先っぽをぐちゅぐちゅぐちゅぐちゅ～～っ<emoji=heart04>」"
translation = "「자자~♥ 테두리부터 문질러 올리는 것과 동시에 귀두 끝을 구축구축구축구축~~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぬっぷぬっぷ、にゅっこにゅっこ<emoji=heart04>\u3000先っぽぐりぐり～<emoji=heart04>\u3000ぬっちゅぬっちゅ<emoji=heart04>」"
translation = "「눅적눅적 눅적눅적♥ 끝부분 문질문질~♥ 눅적눅적♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～あ～、そんな女々しく感じちゃって～<emoji=heart04>\u3000私じゃなかったら今頃、男らしくなくて幻滅～ってフラれちゃってるところだよ～？」"
translation = "「아~아~, 그렇게 계집애처럼 느껴버리고~♥ 내가 아니었으면 지금쯤 남자답지 못하다고 정떨어져서 차였을 거라구~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……大丈夫、俺はマインとしか付き合わないから！」"
translation = "「윽…… 괜찮아, 나는 마인하고만 사귈 거니까!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「なっ……！？\u3000な、なんで急にマジレスしちゃうかなぁ！？\u3000え、エッチ盛り上げる為の冗談に決まってるでしょ！」"
translation = "「나……!? 왜, 왜 갑자기 진지하게 대답하는 거야!? 에, 에로 분위기 띄우기 위한 농담인 게 당연하잖아!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「というか、私としか付き合わないって、それって将来……ああもう、適当に直球ストレート投げつけてきて……！\u3000色々考えちゃうじゃん！」"
translation = "「그보다 나하고만 사귄다니, 그거 장래에…… 아아 정말, 적당히 돌직구를 던지라구……! 이것저것 생각하게 되잖아!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そういうの、今はいいから！\u3000キミはおち○ぽに集中してればいいの！」"
translation = "「그런 건 지금 됐으니까! 너는 자지에나 집중해!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら、にゅっぷにゅっぷ、シッコシッコ<emoji=heart04>\u3000ぬっちゅぬっちゅ、にゅっぽにゅっぽ<emoji=heart04>」"
translation = "「자, 눅적눅적 슥슥♥ 눅적눅적 눅적눅적♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふふっ<emoji=heart04>\u3000そろそろ本格的に、我慢できなくなってきたんじゃない？\u3000イカせてほしいなら、おねだりしてほしいな～？\u3000にゅっぽにゅっぽ、くりくりくり～<emoji=heart04>」"
translation = "「응후후♥ 슬슬 본격적으로 못 참게 된 거 아니야? 가게 해달라고 빌었으면 좋겠는데~? 눅적눅적, 조물조물~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――なっ！？\u3000結婚するからイカせてほしい！？\u3000って、さっきので味を占めてるでしょ！\u3000もう、許さないから！」"
translation = "「――뭐!? 결혼할 테니까 가게 해달라고!? 방금 걸로 맛 들였지! 정말, 용서 안 할 거야!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いいよ、お望み通りイカせてあげる！\u3000ただ、その代わり、潮吹きするまで、泣いても止めてあげないからっ<emoji=heart04>」"
translation = "「좋아, 소원대로 가게 해줄게! 다만 그 대신에 조수 뿜을 때까지 울어도 안 멈춰줄 거니까♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ、行くよ～！\u3000えいっ<emoji=heart04>」"
translation = "「자, 간다~! 에잇♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぬちゅぬちゅシコシコ<emoji=heart04>\u3000にゅぷにゅぷシコシコ<emoji=heart04>\u3000ぐりぐりぐり～<emoji=heart04>」"
translation = "「눅적눅적 슥슥♥ 눅적눅적 슥슥♥ 조물조물~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「くちゅくちゅにゅっぽにゅっぽ<emoji=heart04>\u3000ぐっちゅぐっちゅぬっぽぬっぽ<emoji=heart04>\u3000シコシコちゅっぽちゅっぽ<emoji=heart04>」"
translation = "「구축구축 눅적눅적♥ 구축구축 눅적눅적♥ 슥슥 눅적눅적♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000体仰け反っちゃって、雑魚ザコざ～こ、雑魚ち○ぽ<emoji=heart04>\u3000さっさとイっちゃえ、精液出しちゃえ<emoji=heart04>\u3000ぬちゅぬちゅシッコシッコ<emoji=heart04>」"
translation = "「하아앗♥ 몸이 뒤로 넘어가네, 허접 허접 허~접, 허접 자지♥ 얼른 가버려, 정액 내뿜어버려♥ 눅적눅적 슥슥♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぐちゅぐちゅにゅっぽにゅっぽ<emoji=heart04>\u3000タマタマも揉んじゃうよ～<emoji=heart04>\u3000精液、出せ出せ<emoji=heart04>」"
translation = "「구축구축 눅적눅적♥ 불알도 만져줄게~♥ 정액 내놔 내놔♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「気持ちよく射精しちゃえ<emoji=heart04>\u3000もみもみ～<emoji=heart04>\u3000にゅっぷにゅっぷシッコシッコ<emoji=heart04>」"
translation = "「기분 좋게 사정해버려♥ 조물조물~♥ 눅적눅적 슥슥♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははっ<emoji=heart04>\u3000気持ちいいって言いすぎ～<emoji=heart04>\u3000喘げ喘げ～<emoji=heart04>\u3000情けないところ、全部見せちゃえ<emoji=heart04>」"
translation = "「꺄하핫♥ 기분 좋다는 말 너무 많이 해~♥ 신음해 신음해~♥ 한심한 모습 전부 보여줘♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私がい～っぱい、馬鹿にしてあげる<emoji=heart04>\u3000雑魚ざ～こ<emoji=heart04>\u3000男失格の変態<emoji=heart04>」"
translation = "「내가 마~니 바보 취급해 줄게♥ 허접 허~접♥ 남자 실격인 변태♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000くちゅくちゅにゅっぽにゅっぽ<emoji=heart04>\u3000その泣きそうな声、たまんないよ～<emoji=heart04>\u3000シコシコちゅっぽちゅっぽ<emoji=heart04>\u3000女の子の前で情けな～い<emoji=heart04>」"
translation = "「하아앗♥ 구축구축 눅적눅적♥ 그 울 것 같은 목소리, 못 참겠어~♥ 슥슥 눅적눅적♥ 여자애 앞에서 한심해라~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふうぅっ……<emoji=heart04>\u3000興奮しすぎて、おち○ぽイジってるだけでおま○こ感じてきちゃった<emoji=heart04>」"
translation = "「후우우……♥ 너무 흥분해서 자지 만지고 있는 것만으로도 보지가 느껴버려♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ……んっ<emoji=heart04>\u3000イキそ……<emoji=heart04>\u3000ぐちゅぐちゅにゅっぽにゅっぽ<emoji=heart04>\u3000ぬちゅぬちゅシコシコシコ～<emoji=heart04>」"
translation = "「앗…… 응♥ 갈 것 같……♥ 구축구축 눅적눅적♥ 눅적눅적 슥슥슥~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ<emoji=heart04>\u3000おち○ぽ膨らんできた<emoji=heart04>\u3000キミもイキそう？\u3000イけイけ、イっちゃえ<emoji=heart04>\u3000ほら、シコシコちゅっぽちゅっぽ<emoji=heart04>\u3000にゅぷにゅぷじゅっぽじゅっぽ<emoji=heart04>」"
translation = "「앗♥ 자지 부풀어 올랐어♥ 너도 갈 것 같아? 가라 가라, 가버려♥ 자, 슥슥 눅적눅적♥ 눅적눅적 눅적눅적♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「タマタマに溜まった精液、全部出せ<emoji=heart04>\u3000もみもみシッコシッコ<emoji=heart04>\u3000ほら、情けない声出して、欲望のまま射精しちゃえ<emoji=heart04>\u3000早く、早く早く<emoji=heart04>」"
translation = "「불알에 쌓인 정액 전부 내놔♥ 조물조물 슥슥♥ 자, 한심한 소리 내면서 욕망대로 사정해버려♥ 빨리, 빨리빨리♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「煽ってくる私に、わからせ顔射で反撃したくないの～？\u3000生意気小娘に射精でマーキング<emoji=heart04>\u3000出せ出せ、出しちゃえ<emoji=heart04>\u3000気持ちよく、ぶっかけちゃえ<emoji=heart04>」"
translation = "「도발하는 나한테 굴욕적인 안면사정으로 반격하고 싶지 않아~? 건방진 꼬맹이한테 사정으로 마킹♥ 내놔 내놔, 내버려♥ 기분 좋게 뿌려버려♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「もう出ちゃう？\u3000でちゃうの？\u3000出せ出せ出せ<emoji=heart04>\u3000ほら、精液登ってきた<emoji=heart04>\u3000ギリギリまで来た来た来た<emoji=heart04>\u3000気持ちいいのもうすぐだよ～<emoji=heart04>」"
translation = "「벌써 나와? 나오는 거야? 내놔 내놔 내놔♥ 자, 정액 올라왔어♥ 아슬아슬하게 왔다 왔다 왔다♥ 기분 좋은 거 이제 곧이야~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほらほらほら<emoji=heart04>\u3000もう出そう？\u3000いいよ<emoji=heart04>\u3000出して出して出して<emoji=heart04>\u3000射精しちゃえ<emoji=heart04>\u3000イけ、イけイけイけイけイけ――」"
translation = "「자자자♥ 이제 나올 것 같아? 좋아♥ 내놔 내놔 내놔♥ 사정해버려♥ 가라, 가라 가라 가라 가라 가라――」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はい、どっぴゅん<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자, 뿌직♥♥♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「っ……はああぁぁぁぁああんっ<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000精液いっぱい出たぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 하아아아아아아앙♥ 아아아악♥ 정액 엄청 나왔어어어어어~~~~~~~~~~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んあぁっ……<emoji=heart04>\u3000射精量凄すぎ……<emoji=heart04>\u3000雑魚なのに精力つよつよち○ぽ……<emoji=heart04>\u3000んんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「응아앗……♥ 사정량 너무 많아……♥ 허접인데 정력은 짱짱 자지……♥ 응응♥ 후우우……♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「精液沢山ぶっかけられて、匂いで私も軽く、イっちゃった……<emoji=heart04>」"
translation = "「정액 잔뜩 뿌려져서 냄새 때문에 나도 살짝 가버렸어……♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「キミは……ふふっ<emoji=heart04>\u3000放心した顔してる～<emoji=heart04>\u3000そんなに気持ち良かったんだ<emoji=heart04>」"
translation = "「너는…… 후후♥ 넋 나간 얼굴 하고 있어~♥ 그렇게 기분 좋았구나♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おかげで、私もイジメ甲斐があったよ～<emoji=heart04>\u3000私だけの雑魚ち○ぽ……<emoji=heart04>\u3000お礼のキスしちゃう……ちゅっ<emoji=heart04>」"
translation = "「덕분에 나도 괴롭히는 보람이 있었어~♥ 나만의 허접 자지……♥ 답례로 키스해 줄게…… 쪽♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――さて、じゃあ……続きと行こうかな～？」"
translation = "「――자, 그럼…… 다음으로 넘어가 볼까나~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……マイン！？\u3000な、なんでまた亀頭をシゴき始めて……うあっ！？」"
translation = "「윽…… 마인!? 왜, 왜 다시 귀두를 문지르기 시작하는 거야…… 우앗!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おやおや、もうお忘れかな～？\u3000キミが泣いても、潮吹きするまで止めてあげないって言ったよね～？」"
translation = "「어라어라, 벌써 잊었나~? 네가 울어도 조수 뿜을 때까지 안 멈춰준다고 했지~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「だから、射精したばかりで敏感なところに、追い打ちをかけてるんだよ～<emoji=heart04>」"
translation = "「그러니까 사정한 직후라 민감한 곳에 몰아붙이고 있는 거야~♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――にひっ<emoji=heart04>\u3000ダ～メ<emoji=heart04>\u3000待ったはな～し<emoji=heart04>\u3000我慢我慢<emoji=heart04>\u3000これからすっごく気持ちよくなるんだから<emoji=heart04>」"
translation = "「――니힛♥ 안~돼♥ 기다려주는 거 없~기♥ 참아 참아♥ 이제부터 엄청 기분 좋아질 거니까♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ちなみに潮吹きの後は～<emoji=heart04>\u3000私の濡れ濡れおま○こも、い～っぱい相手してもらうから、そのつもりで<emoji=heart04>」"
translation = "「참고로 조수 뿜은 뒤에는~♥ 내 흠뻑 젖은 보지도 잔~뜩 상대해 줘야 하니까 각오하라구♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「よろしくね、未来のダーリン<emoji=heart04>\u3000にひひ……<emoji=heart04>」"
translation = "「잘 부탁해, 미래의 달린♥ 니히히……♥」"

[[dialogue]]
speaker = "unk"
original = "意趣返しとばかりに、ちろっと舌を出して笑うマイン。その後、俺はあえなく初めての潮吹きを体験してしまうのだった――"
translation = "앙갚음이라도 하듯 혀를 낼름 내밀며 웃는 마인. 그 후 나는 속절없이 첫 조수를 경험하고 마는 것이었다――"

