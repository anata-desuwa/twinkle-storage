[[dialogue]]
speaker = "unk"
original = "ユウリが新星に来てくれた代わりに、俺が新星の星徒会長として流星学園の生徒たちと訓練をつけた。"
translation = "유우리가 신성에 와준 대신에, 내가 신성 학생회장으로서 유성 학원의 학생들과 훈련을 함께했다."

[[dialogue]]
speaker = "unk"
original = "星騎士としては新米ではあるが、この活動が両校の力の底上げになるといいのだが。"
translation = "성기사로서는 신참이지만, 이 활동이 양교의 실력을 끌어올리는 데 도움이 되었으면 좋겠는데."

[[dialogue]]
speaker = "unk"
original = "汗を流そうとシャワーのある更衣室に入ると――"
translation = "땀을 씻으려고 샤워실이 있는 탈의실에 들어가자――"

[[dialogue]]
speaker = "ユウリ"
original = "「なっ！？\u3000なんであんたが入ってくるんだよ！？」"
translation = "「앗!? 왜 당신이 들어오는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "そこにいたのは、トレーニングか部活あがりと思われる、うっすら汗をかいた下着姿のユウリ。ということは――"
translation = "그곳에 있었던 것은, 트레이닝이나 부활동이 끝난 듯한, 얇게 땀이 맺힌 속옷 차림의 유우리. 그렇다는 것은――"

[[dialogue]]
speaker = "ユウリ"
original = "「そうだよ、こっちは女子更衣室だバカヤロー！\u3000男子更衣室は……ああ、そうか、男子更衣室って小さいから見つけられなかったんだな……」"
translation = "「그래, 여기는 여자 탈의실이다 이 바보 멍청아! 남자 탈의실은…… 아아, 그렇구나, 남자 탈의실은 작아서 못 찾았던 거구나……」"

[[dialogue]]
speaker = "unk"
original = "危ない、ユウリ以外の生徒がいたら社会的に死んでいるところだった。"
translation = "위험했다, 유우리 이외의 학생이 있었다면 사회적으로 죽었을 뻔했다."

[[dialogue]]
speaker = "ユウリ"
original = "「いつまで更衣室にいるつもりだ、さっさと出てけ。それともあたしのところに来るってことは、元から<b>そのつもり</b>か？」"
translation = "「언제까지 탈의실에 있을 셈이야, 빨리 나가. 아니면 내 쪽으로 온다는 건, 애초에 <b>그럴</b> <b>셈</b>이었나?」"

[[dialogue]]
speaker = "unk"
original = "目の前には半裸のユウリ。他に誰もいない空間。"
translation = "눈앞에는 반라의 유우리. 아무도 없는 공간."

[[dialogue]]
speaker = "unk"
original = "<b>そんなつもり</b>はなかったが、この状況で興奮しないといえばウソになるわけで……"
translation = "<b>그럴</b> <b>셈</b>은 없었지만, 이 상황에서 흥분하지 않는다고 하면 거짓말이 되는 법이라……"

[[dialogue]]
speaker = "ユウリ"
original = "「へっ、やっぱりその気なんじゃねえか。ガチガチにしやがって」"
translation = "「헷, 역시 그럴 생각이었잖아. 빳빳하게 세우고는 말이야.」"

[[dialogue]]
speaker = "unk"
original = "後ろから足を抱きかかえると、ユウリは抵抗する様子もなく不敵に笑う。"
translation = "뒤에서 다리를 껴안자, 유우리는 저항하는 기색도 없이 대담하게 웃는다."

[[dialogue]]
speaker = "unk"
original = "――やれるものならやってみろ、と言わんばかりに。"
translation = "――할 수 있다면 해봐, 라고 말하는 듯이."

[[dialogue]]
speaker = "ユウリ"
original = "「固まっちまってどうした？\u3000股についてるのは飾りか？\u3000誰か来るのが怖いのか？」"
translation = "「굳어버려서 왜 그래? 가랑이에 달린 건 장식이야? 누가 오는 게 무서운 거야?」"

[[dialogue]]
speaker = "unk"
original = "健康的な肌を大胆に晒し、ブラからこぼれた胸を揺らしながら挑発する。"
translation = "건강한 피부를 대담하게 드러내고, 브래지어에서 넘쳐흐른 가슴을 흔들며 도발한다."

[[dialogue]]
speaker = "unk"
original = "ここまで堂々としているのだから、ユウリもこの先を望んでいるのかもしれない。"
translation = "이렇게나 당당하게 굴고 있으니, 유우리도 이 다음을 바라고 있는 것일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "それなら――"
translation = "그렇다면――"

[[dialogue]]
speaker = "ユウリ"
original = "「んああ～～～～っ<emoji=heart04>\u3000んっ……はあぁ……はぁ……」"
translation = "「응아아～～～～앗<emoji=heart04> 응……하아아……하아……」"

[[dialogue]]
speaker = "unk"
original = "張り詰めた亀頭を膣口へと押し込むと、不敵に笑んでいたユウリの表情が歪む。"
translation = "팽팽해진 귀두를 질구로 밀어 넣자, 불적하게 웃고 있던 유우리의 표정이 일그러진다."

[[dialogue]]
speaker = "ユウリ"
original = "「へっ、女子更衣室で突っ込んできやがって。この変態」"
translation = "「헷, 여자 탈의실에서 쑤셔 박고 말이야. 이 변태」"

[[dialogue]]
speaker = "unk"
original = "けれどそれは痛みではなく快感の表情だ。"
translation = "하지만 그것은 고통이 아니라 쾌감의 표정이다."

[[dialogue]]
speaker = "unk"
original = "言葉で強がりはすれど、内から沸き上がる快楽は隠しきれていなかった。"
translation = "말로 강한 척은 해도, 안에서 치밀어 오르는 쾌락은 숨기지 못하고 있었다."

[[dialogue]]
speaker = "ユウリ"
original = "「はぁ、はぁ……相変わらずでかいな。あたしの中、あんたの形になりそうだ」"
translation = "「하아, 하아…… 여전히 크네. 내 안, 네 모양이 되어버릴 것 같아」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも、ユウリの中は淡く濡れていてペニスの侵入を妨げることはない。"
translation = "그렇게 말하면서도, 유우리의 안은 옅게 젖어 있어 자지의 침입을 방해하지 않는다."

[[dialogue]]
speaker = "unk"
original = "足を抱えたまま腰を押し上げ、ぐっと奥へと進ませる。"
translation = "다리를 안은 채 허리를 밀어 올려, 훅 하고 안쪽으로 전진시킨다."

[[dialogue]]
speaker = "ユウリ"
original = "「んんんっ……<emoji=heart04>」"
translation = "「으으응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段の勇ましいユウリからは想像できない、かわいらしい声がこぼれた。"
translation = "평소의 용맹한 유우리에게선 상상할 수 없는, 귀여운 목소리가 새어 나왔다."

[[dialogue]]
speaker = "クロト"
original = "「気持ちいい？」"
translation = "「기분 좋아?」"

[[dialogue]]
speaker = "ユウリ"
original = "「べ、別に気持ち良くなんかねえし」"
translation = "「벼, 별로 기분 좋지 않거든」"

[[dialogue]]
speaker = "unk"
original = "ごまかすように強気の表情を作ろうとするが、やはり快楽の色は隠せていない。"
translation = "얼버무리려는 듯 강한 척하는 표정을 지으려 하지만, 역시 쾌락의 빛은 숨기지 못한다."

[[dialogue]]
speaker = "unk"
original = "そんなユウリをもっと喘がせたくて、もっとかわいい声を聞きたくて、ユウリの中でペニスを動かしていく。"
translation = "그런 유우리를 좀 더 헐떡이게 하고 싶어서, 좀 더 귀여운 목소리를 듣고 싶어서, 유우리의 안에서 자지를 움직여 간다."

[[dialogue]]
speaker = "ユウリ"
original = "「ひああぁ～～っ<emoji=heart04>\u3000あっ……はぁっ……んん～っ……<emoji=heart04>\u3000ふぁっ、あっ……ああぁ～っ<emoji=heart04>」"
translation = "「히아아아～～앗<emoji=heart04> 앗……하앗……으으응～앗……<emoji=heart04> 화앗, 앗……아아아～앗<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「はあぁっ、あっ……んっ……<emoji=heart04>\u3000ち○ちんビクビクさせやがって、やる気満々じゃねえか……はぁ……んぁああっ<emoji=heart04>」"
translation = "「하아아, 앗……응……<emoji=heart04> 자지 덜덜 떨게 만들고는, 의욕이 아주 가득하잖아……하아……응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "引いては突き、ペニスと膣壁が摩擦する度に艶めかしい嬌声が上がる。"
translation = "당겼다 찌르며, 페니스와 질벽이 마찰할 때마다 요염한 교성이 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "ユウリは魔族と人間のハーフであり、獣の特徴を持つからなのか、後ろから突かれるのに弱かった。"
translation = "유우리는 마족과 인간의 하프이며, 수인의 특징을 가지고 있기 때문인지 뒤에서 찔리는 것에 약했다."

[[dialogue]]
speaker = "ユウリ"
original = "「大きいのが……あたしの中で……はぁっ、あんっ……んんっ……<emoji=heart04>\u3000はぁ……はっ……はぁっ、はんっ……<emoji=heart04>」"
translation = "「커다란 게…… 내 안에서…… 하아, 앙……으응……<emoji=heart04> 하아……하……하아, 항……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「更衣室、なのに……ふあぁ、はんっ……<emoji=heart04>\u3000はぁはっ、はぁ……んんっ、はっ、はぁ、んあぁっ……<emoji=heart04>」"
translation = "「탈의실, 인데…… 후아, 항……<emoji=heart04> 하아하, 하아……으응, 하, 하아, 응아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ユウリは普段からトレーニングを欠かさず、部活の助っ人もこなしているからか、締め付けが強い。"
translation = "유우리는 평소부터 트레이닝을 거르지 않고, 부활동의 도우미도 해내고 있기 때문인지, 조임이 강하다."

[[dialogue]]
speaker = "unk"
original = "怒張して敏感になったペニスが熱く柔らかな肉壁に圧迫され、とろりとした蜜も絡みついてきて、軽く動かしているだけで強烈な快楽に襲われた。"
translation = "팽창해서 민감해진 페니스가 뜨겁고 부드러운 육벽에 압박되고, 걸쭉한 애액도 얽혀와서, 가볍게 움직이는 것만으로도 강렬한 쾌락이 덮쳐왔다."

[[dialogue]]
speaker = "クロト"
original = "「やっぱり気持ちいいんじゃないか？」"
translation = "「역시 기분 좋은 거 아니야?」"

[[dialogue]]
speaker = "ユウリ"
original = "「気持ち良く、なんか……ん──んんっ<emoji=heart04>\u3000はぁ、あん……ふっ、く、んん……<emoji=heart04>」"
translation = "「기분 좋고, 뭐고…… 응──으응<emoji=heart04> 하아, 앙……훗, 윽, 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを動かす度、声とともにユウリの肩がビクビクと震える。"
translation = "페니스를 움직일 때마다, 목소리와 함께 유우리의 어깨가 움찔움찔 떨린다."

[[dialogue]]
speaker = "unk"
original = "突き出した衝撃でおっぱいも揺れて、ますます興奮が高まっていく。"
translation = "찔러 넣는 충격에 가슴도 흔들려서, 점점 더 흥분이 고조되어 간다."

[[dialogue]]
speaker = "ユウリ"
original = "「はっ、あんっ……大きいのが、中で擦れてっ……はっ、んっ……あぁ、はぁ、はんっ……<emoji=heart04>」"
translation = "「하, 앙…… 커다란 게, 안에서 비벼져서…… 하, 응…… 아아, 하아, 항……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしの中、広がってる……ふぁ、はぁ……んんっ……<emoji=heart04>\u3000んはっ、あぁっ、はぁ……ひぁっ、あんっ……<emoji=heart04>」"
translation = "「내 안, 벌어지고 있어…… 후아, 하아……으응……<emoji=heart04> 응하, 아앗, 하아……히앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突き入れたペニスが蜜をかき混ぜ、ぐちゅぐちゅといやらしい音が更衣室に響く。"
translation = "찔러 넣은 페니스가 애액을 휘저으며, 구축구축하고 야한 소리가 탈의실에 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "筋肉で引き締まった体に顔を近づけていくと……"
translation = "근육으로 탄탄한 몸에 얼굴을 가까이 대자……"

[[dialogue]]
speaker = "ユウリ"
original = "「なっ！？\u3000おいコラ、そんなとこ嗅ぐな！」"
translation = "「나앗!? 야 이봐, 그런 데 냄새 맡지 마!」"

[[dialogue]]
speaker = "unk"
original = "らしくなく、慌てて顔を赤くするユウリがかわいい。"
translation = "유우리답지 않게, 당황하며 얼굴을 붉히는 모습이 귀엽다."

[[dialogue]]
speaker = "unk"
original = "すんすんと鼻を鳴らすと、制汗剤の爽やかな香りに混じって、ユウリの匂いを感じた。"
translation = "킁킁 코를 울리자, 데오드란트의 상쾌한 향기에 섞여서, 유우리의 체취가 느껴졌다."

[[dialogue]]
speaker = "ユウリ"
original = "「バカ！\u3000嗅ぐなって言ってんだろ、変態っ！」"
translation = "「바보! 맡지 말라고 했잖아, 변태!」"

[[dialogue]]
speaker = "unk"
original = "ユウリが身体を動かした後の汗の匂い。"
translation = "유우리가 몸을 움직인 뒤의 땀 냄새."

[[dialogue]]
speaker = "unk"
original = "いつもより強いユウリの匂いを直接吸い込み、ペニスがさらに張り詰めていく。"
translation = "평소보다 강한 유리의 냄새를 직접 들이마시자, 자지가 더욱 팽팽하게 부풀어 오른다."

[[dialogue]]
speaker = "ユウリ"
original = "「んんっ……<emoji=heart04>\u3000なんでこんなんでち○ちんおっきくしてんだよぉ……バカバカバカ！」"
translation = "「으응……<emoji=heart04> 왜 이런 걸로 자지 커지게 하고 난리야…… 바보바보바보!」"

[[dialogue]]
speaker = "unk"
original = "怒りながらも抵抗はせず、バカと罵倒する声すらかわいい。"
translation = "화내면서도 저항은 하지 않고, 바보라고 매도하는 목소리조차 귀엽다."

[[dialogue]]
speaker = "unk"
original = "さらに血流で膨張したペニスを往復させて、これでも気持ち良くないのかと言わんばかりに膣壁を刺激してやる。"
translation = "더욱 혈류로 팽창한 자지를 왕복시켜서, 이래도 기분 좋지 않냐는 듯이 질벽을 자극해 준다."

[[dialogue]]
speaker = "ユウリ"
original = "「ふわあぁっ……ああぁ～っ<emoji=heart04>\u3000やめ、それ卑怯……んああぁ～～っ<emoji=heart04>\u3000んはぁっ、はぁっ、んんっ……<emoji=heart04>」"
translation = "「후와아앗…… 아아아~앗<emoji=heart04> 그만, 그거 비겁해…… 응아아아~~앗<emoji=heart04> 응하앗, 하앗, 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ち○ちん、太くて、硬くて……ふはぁ、はん……あんっ<emoji=heart04>\u3000あっ、んっ……くぅっ……ひあぁ～～っ<emoji=heart04>」"
translation = "「자지, 굵고, 딱딱해서…… 후하아, 항…… 앙<emoji=heart04> 앗, 응…… 쿠우…… 히아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを包む肉ひだが震え、とろとろの蜜の感触と相まって得も言われぬ快楽を生む。"
translation = "자지를 감싸는 살주름이 떨리고, 걸쭉한 애액의 감촉과 어우러져 말로 표현할 수 없는 쾌락을 낳는다."

[[dialogue]]
speaker = "unk"
original = "そしてユウリの奥をめがけて、ペニスを思い切り突き出した。"
translation = "그리고 유리의 안쪽을 향해, 자지를 힘껏 내질렀다."

[[dialogue]]
speaker = "ユウリ"
original = "「んん～～～～～っ！！」"
translation = "「으으으으으으윽!!」"

[[dialogue]]
speaker = "unk"
original = "ズン、と奥に届き、衝撃が快感に変わる。"
translation = "즈응, 하고 안쪽에 닿으며 충격이 쾌감으로 변한다."

[[dialogue]]
speaker = "ユウリ"
original = "「んっ、はっ、あんっ<emoji=heart04>\u3000コツコツ当たって……はぁ、はっ、んんっ……はぁっ、うああぁっ<emoji=heart04>」"
translation = "「응, 핫, 앙<emoji=heart04> 콕콕 닿아서…… 하아, 핫, 으응…… 하앗, 우아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「奥に……んんーーっ<emoji=heart04>\u3000はぁはっ、あぁ、ん……あっ、あっ、あっ……ひぁああっ<emoji=heart04>」"
translation = "「안쪽에…… 으으으윽<emoji=heart04> 하아하앗, 아아, 응…… 앗, 앗, 앗…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふはぁっ、あっ、あぁんっ<emoji=heart04>\u3000そんなに、ズンズンされたら……んっ……んんぅ～っ<emoji=heart04>\u3000はぁっ、はっ、はんっ……んん……んあぁ～～っ<emoji=heart04>」"
translation = "「후하앗, 앗, 아앙<emoji=heart04> 그렇게, 쿵쾅거리면…… 응…… 으으응~윽<emoji=heart04> 하앗, 핫, 항…… 으응…… 응아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "勢いをつけて突いてやると、いつもは強気な表情がどんどん蕩けていき、すっかり快楽に染まっていく。"
translation = "기세를 몰아 찔러대자, 평소의 강 기세였던 표정이 점점 황홀하게 풀리며 완전히 쾌락에 물들어 간다."

[[dialogue]]
speaker = "ユウリ"
original = "「くっ……んぅ～っ……<emoji=heart04>\u3000気持ちいいとこばっかり突いてきやがって……はぁ……んあっ、はぁんっ……<emoji=heart04>」"
translation = "「큭…… 응으~윽……<emoji=heart04> 기분 좋은 곳만 골라서 찔러대고…… 하아…… 응앗, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ユウリのおま○こ、とろとろで気持ちいいよ」"
translation = "「유리의 보지, 걸쭉해서 기분 좋아」"

[[dialogue]]
speaker = "ユウリ"
original = "「うっせえ！\u3000あっ……はっ、あっ……ふあぁっ、あっ、あぁっ……<emoji=heart04>」"
translation = "「시끄러워! 앗…… 핫, 앗…… 후아앗, 앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "片足を大きく上げる体勢は、犬がおしっこする姿勢にも似ていた。"
translation = "한쪽 다리를 크게 들어 올린 자세는, 개가 오줌을 누는 자세와도 닮아 있었다."

[[dialogue]]
speaker = "unk"
original = "獣の交尾さながらに、ユウリの奥めがけて激しく突き回す。"
translation = "짐승의 교미처럼 유리의 안쪽을 향해 격렬하게 찔러댄다."

[[dialogue]]
speaker = "ユウリ"
original = "「んんっ、はっ、あっ、あんっ……<emoji=heart04>\u3000はあぁっ、あっ、あぁっ……あっ、はっ……ふあぁっ……<emoji=heart04>」"
translation = "「으응, 핫, 앗, 앙……<emoji=heart04> 하아앗, 앗, 아앗…… 앗, 핫…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁ……あっ……んんっ<emoji=heart04>\u3000気持ちいいところ、当たって……ひぁああっ<emoji=heart04>」"
translation = "「후아…… 앗…… 응으윽<emoji=heart04> 기분 좋은 곳, 닿아서…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "整った毛並みのしっぽが揺れ、頭から伸びた耳がピコピコ動くのが愛らしい。"
translation = "가지런한 털의 꼬리가 흔들리고, 머리에서 뻗은 귀가 쫑긋쫑긋 움직이는 것이 사랑스럽다."

[[dialogue]]
speaker = "unk"
original = "後ろからの体位であることを利用して、子宮口のあたりにぐりぐりと亀頭を押し付けてやる。"
translation = "뒤에서 하는 체위인 것을 이용해, 자궁구 근처에 구리구리 귀두를 밀어붙여 준다."

[[dialogue]]
speaker = "ユウリ"
original = "「ひあぁああっ！？\u3000そこは──ひゃぅっ……<emoji=heart04>\u3000はぁっ、はっ、はっ……んぁ、んんはぁっ……<emoji=heart04>」"
translation = "「히아아앗!? 그곳은── 히야앗……<emoji=heart04> 하아, 하아, 하아…… 응아, 응응하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁がペニスを締め付けながらひくひくと震え、弾力のある肉ひだがぎゅっと絡みついてくる。"
translation = "질벽이 자지를 조여대며 파르르 떨리고, 탄력 있는 살주름이 꽉 얽혀온다."

[[dialogue]]
speaker = "ユウリ"
original = "「んん～～っ<emoji=heart04>\u3000そこばっかり……んっ、んぁああっ……<emoji=heart04>\u3000やめっ……おかしくなるっ……ぅあっ、ああっ……<emoji=heart04>」"
translation = "「응으으~~윽<emoji=heart04> 그곳만…… 응, 응아아앗……<emoji=heart04> 그만…… 이상해져…… 으앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふわあっ、あっ、あんっ……<emoji=heart04>\u3000あたしの中、かき回されてる……んんっ……あっ、ふぁああっ……<emoji=heart04>」"
translation = "「후와앗, 앗, 안……<emoji=heart04> 내 안, 휘저어지고 있어…… 응으윽…… 앗, 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "後ろからペニスで貫かれ、震えながら喘ぐユウリ。"
translation = "뒤에서 자지로 꿰뚫려, 떨면서 신음하는 유리."

[[dialogue]]
speaker = "unk"
original = "愛おしい気持ちに衝き動かされ、肩越しに唇を奪う。"
translation = "사랑스러운 마음에 이끌려, 어깨 너머로 입술을 빼앗는다."

[[dialogue]]
speaker = "ユウリ"
original = "「んんっ！？\u3000んっ……ちゅぱっ、ちゅるっ……んふぅ……ん……<emoji=heart04>」"
translation = "「응으윽!? 응…… 츄파, 츄르릅…… 응후…… 음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "驚きはしたけど拒みせず、俺が舌を差し入れるのに応じて唾液を絡め合う。"
translation = "놀라기는 했지만 거부하지 않고, 내가 혀를 밀어 넣는 것에 응하며 타액을 서로 섞는다."

[[dialogue]]
speaker = "ユウリ"
original = "「んちゅっ、ちゅぱっ、んっ……んふっ、ふぅ……ちゅるっ、ちゅぱちゅぱ……へる、へろ……ちゅるるっ、んんっ……<emoji=heart04>」"
translation = "「응츄, 츄파, 응…… 응훗, 후우…… 츄르릅, 츄파츄파…… 헤르, 헤로…… 츄르르릅, 응으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「んぅ……へろれろっ、んんっ……くちゅる、ちゅるっ<emoji=heart04>\u3000はぁ、んっ、んっ……ちゅぷるっ、ちゅぱっ、れろっ……ちゅぱっ、ぴちゃぴちゃ<emoji=heart04>」"
translation = "「응으…… 헤로레로, 응으윽…… 쿠츄르, 츄르릅<emoji=heart04> 하아, 응, 응…… 츄푸르, 츄파, 레로…… 츄파, 피차피차<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスしながら胸にも手を伸ばし、女性らしくむっちりしたおっぱいをこの手で弄ぶ。"
translation = "키스하면서 가슴에도 손을 뻗어, 여성스럽고 육덕진 가슴을 이 손으로 주무른다."

[[dialogue]]
speaker = "ユウリ"
original = "「んんぅ～っ<emoji=heart04>\u3000んちゅっ、ちゅる……んっ、ふっ……はぁはっ……んふっ、んちゅるちゅる……<emoji=heart04>」"
translation = "「응으으~윽<emoji=heart04> 응츄, 츄르릅…… 응, 훗…… 하아하아…… 응훗, 응츄르츄르……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "性器で繋がりながら唇を重ね、おっぱいを揉みしだいてユウリを味わい尽くす。"
translation = "성기로 이어진 채 입술을 겹치고, 가슴을 비벼대며 유리를 남김없이 맛본다."

[[dialogue]]
speaker = "unk"
original = "射精欲が限界まで高まり、本能のままユウリの瑞々しい体を貪る。"
translation = "사정욕이 한계까지 높아져, 본능대로 유리의 싱그러운 몸을 탐한다."

[[dialogue]]
speaker = "ユウリ"
original = "「んっちゅっ……ちゅっ、ちゅぱっ、れろれろ……はぁ、んんっ<emoji=heart04>\u3000れろっ、ちゅぱっ……じゅるっ、じゅるるっ……ちゅっ、ちゅぅっ<emoji=heart04>」"
translation = "「응츄…… 츄, 츄파, 레로레로…… 하아, 응으윽<emoji=heart04> 레로, 츄파…… 쥬릅, 쥬르르릅…… 츄, 츄우윽<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ちゅぱっ、ちゅるっ……んっ、はぁん……んっ、ちゅるるっ<emoji=heart04>\u3000はぁ、はぁ……んちゅぅっ、じゅぷっ、くちゅっ……じゅぱっ、じゅるるるっ<emoji=heart04>」"
translation = "「츄파, 츄르릅…… 응, 하앙…… 응, 츄르르릅<emoji=heart04> 하아, 하아…… 응츄우, 쥬풋, 쿠츄…… 쥬파, 쥬르르르릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さらに高まる衝動を叩きつけるように、荒々しくペニスを突き込んでいく。"
translation = "더욱 거세지는 충동을 내던지듯, 거칠게 자지를 박아 넣는다."

[[dialogue]]
speaker = "ユウリ"
original = "「んん～～っ<emoji=heart04><emoji=heart04>\u3000はぁっ、はっ、はっ……あ、激しいっ……ふああっ、はんっ……<emoji=heart04>」"
translation = "「응, 으으~~읏<emoji=heart04><emoji=heart04> 하아, 하아, 하아…… 아, 격렬해…… 후아아, 항……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「はあっ、あっ……ん～っ<emoji=heart04>\u3000あっ、あっ、あっ……あぁんっ<emoji=heart04>\u3000ち○ちん、熱いっ……うぁああ～～っ！」"
translation = "「하아, 아…… 응~읏<emoji=heart04> 아, 아, 아…… 아앙<emoji=heart04> 자지, 뜨거워…… 우아아아~~앗!」"

[[dialogue]]
speaker = "unk"
original = "勢いよく腰を突き出すと、ユウリの引き締まったお尻の肉が下半身にぶつかった。"
translation = "기세 좋게 허리를 들이밀자, 유우리의 탄탄한 엉덩이 살이 하반신에 부딪혔다."

[[dialogue]]
speaker = "unk"
original = "肉厚の弾力を感じながら、欲望を加速させてしゃにむに叩きつける。"
translation = "두툼한 탄력을 느끼며, 욕망을 가속시켜 무턱대고 두드려 넣는다."

[[dialogue]]
speaker = "ユウリ"
original = "「奥、ばっか……あっ、あんっ……<emoji=heart04>\u3000はぁ……はっ、はっ……んんっ……はあぁっ、あっ、あっ、んんーーっ<emoji=heart04>」"
translation = "「안쪽, 너무…… 아, 안……<emoji=heart04> 하아…… 하아, 하아…… 응…… 하아아, 아, 아, 으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふあぁっ、あっ……はぁ……イクぅっ……おま○こズボズボされてっ……んん――イックぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아, 아…… 하아…… 가버렷…… 보지 즈보즈보 당해서…… 응── 가버려어어~~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮口に当たる感触が快感に変わり、奥に届く度に神経がショートしそうだ。"
translation = "귀두가 자궁구에 닿는 감촉이 쾌감으로 변하고, 안쪽에 닿을 때마다 신경이 쇼트될 것 같다."

[[dialogue]]
speaker = "ユウリ"
original = "「あっ、はっ、あんっ<emoji=heart04>\u3000イッてるのに……ふ──ん――んぁああ～～っ<emoji=heart04>\u3000そんなに、突かれたら、変になるっ……あ、あ……んん～～っ<emoji=heart04>」"
translation = "「아, 하아, 아앙<emoji=heart04> 가고 있는데…… 후── 응── 응아아아~~앗<emoji=heart04> 그렇게, 찔러대면, 이상해져…… 아, 아…… 응응~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁっ、はっ……あ、あ、あ、あんっ<emoji=heart04>\u3000気持ち、いいっ……ふぁっ……あっ、はっ、はっ……ひゃああっ<emoji=heart04>」"
translation = "「하아, 하아…… 아, 아, 아, 아앙<emoji=heart04> 기분, 좋아…… 후아…… 아, 하아, 하아…… 히야아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつもは強くて頼もしいユウリの痴態に情欲が燃え上がり、体の奥から熱いものがせり上がってくる。"
translation = "평소에는 강하고 듬직한 유우리의 치태에 정욕이 불타올라, 몸 안쪽에서 뜨거운 것이 치밀어 오른다."

[[dialogue]]
speaker = "ユウリ"
original = "「ひゃあっ！？\u3000あたしの中で、ち○ちんドクドクして……はぁ、は……ああっ、はっ、んんんっ……<emoji=heart04>」"
translation = "「히야앗!? 내 안에서, 자지가 둑둑거려서…… 하아, 하…… 아앗, 하아, 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「さきっぽ奥にぶつかって……うぁ、はあぁんっ……<emoji=heart04>\u3000ひやぁっ、あっ、はっ、はっ……うぁああ～～っ<emoji=heart04>」"
translation = "「끝부분이 안쪽에 부딪혀서…… 우아, 하아앙……<emoji=heart04> 히야앗, 아, 하아, 하아…… 우아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここが流星学園の更衣室で、ふさわしくない行為なのはわかっている。"
translation = "이곳이 유성 학원의 탈의실이고, 어울리지 않는 행위라는 것은 알고 있다."

[[dialogue]]
speaker = "unk"
original = "それでもただセックスに……いや交尾に夢中になってがむしゃらに腰を振っていた。"
translation = "그래도 그저 섹스에…… 아니 교미에 몰두해서 무아지경으로 허리를 흔들고 있었다."

[[dialogue]]
speaker = "ユウリ"
original = "「あっ、はっ、はっ、はんっ……<emoji=heart04>\u3000はあぁっ、あっ、ああっ……んんっ――ひやぁああっ<emoji=heart04>」"
translation = "「아, 하아, 하아, 항……<emoji=heart04> 하아아, 아, 아앗…… 응── 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「んんっ、はっ、あっ、あっ――ふぁああっ<emoji=heart04>\u3000はぁっ、はっ、はん……ふぁ……あっ、ああぁっ、んんぁあっ……<emoji=heart04>」"
translation = "「응, 하아, 아, 아── 후아아앗<emoji=heart04> 하아, 하아, 항…… 후아…… 아, 아아앗, 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉はいらない。"
translation = "말은 필요 없다."

[[dialogue]]
speaker = "unk"
original = "息を切らせ、汗にまみれ、じゅぷじゅぷと卑猥な音を響かせて、獣のように交わる。"
translation = "숨을 몰아쉬고, 땀에 젖어, 쥬퓌쥬퓌하고 비열한 소리를 울리며, 짐승처럼 교미한다."

[[dialogue]]
speaker = "ユウリ"
original = "「ふぁあっ、はっ、はっ、んんぁあ～～っ<emoji=heart04>\u3000はぁ、はっ、はっ……んぁっ、んん～～っ<emoji=heart04>」"
translation = "「후아앗, 하아, 하아, 응아아~~앗<emoji=heart04> 하아, 하아, 하아…… 응아, 응응~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「はあぁっ、はっ、はんっ……んんぁっ、あぁっ……<emoji=heart04>\u3000あっ、あっ、あ……は、んんっ――」"
translation = "「하아아, 하아, 항…… 응아, 아앗……<emoji=heart04> 아, 아, 아…… 하, 응──」"

[[dialogue]]
speaker = "unk"
original = "そして限界を超えた瞬間――"
translation = "그리고 한계를 넘은 순간──"

[[dialogue]]
speaker = "ユウリ"
original = "「ん――ふぁああ～～っ……<emoji=heart04>\u3000はあぁっ、熱いぃ……ふぁっ、あぁ……あたしの中に、出てるっ……んんっ<emoji=heart04>」"
translation = "「응── 후아아아~~앗……<emoji=heart04> 하아아, 뜨거워…… 후아, 아아…… 내 안에, 나오고 있어…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「中でドクドクして……ふああっ、あっ、はんっ……んっ、はあぁんっ……<emoji=heart04>」"
translation = "「안에서 둑둑거려서…… 후아아, 아, 항…… 응, 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ユウリの奥深くでペニスが跳ね、熱い精を容赦なく吐き出していく。"
translation = "유우리의 깊은 곳에서 페니스가 튀어 오르며, 뜨거운 정액을 사정없이 뱉어낸다."

[[dialogue]]
speaker = "unk"
original = "さながら獣の種付けのように、本能のまま精をユウリの子宮へと注ぎ込む。"
translation = "흡사 짐승의 씨붙이기처럼, 본능대로 정액을 유우리의 자궁으로 쏟아붓는다."

[[dialogue]]
speaker = "ユウリ"
original = "「あ、あ、あ、あ……せーし、入ってきて……あ、はあぁ……あぁっ……<emoji=heart04>」"
translation = "「아, 아, 아, 아…… 정자, 들어와서…… 아, 하아아…… 아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭を子宮口に密着させたまま何度も脈打ち、膣口から精液を溢れさせた。"
translation = "귀두를 자궁구에 밀착시킨 채 몇 번이고 고동치며, 질구에서 정액을 넘쳐흐르게 했다."

[[dialogue]]
speaker = "ユウリ"
original = "「はぁ、はぁ……ったく、勝手に出しやがって。まぁ今日は大丈夫だけどさ」"
translation = "「하아, 하아…… 나 원 참, 멋대로 싸지르고 말이야. 뭐 오늘은 괜찮지만.」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁ～、部活の後にさんざんやられて、さすがのあたしもクタクタだ。あんたは平気なのかよ」"
translation = "「하아~, 부활동 후에 실컷 당해서, 아무리 나라도 녹초라고. 너는 멀쩡한 거냐.」"

[[dialogue]]
speaker = "unk"
original = "俺も流星学園の生徒の相手をした後なので、かなりフラフラだ。"
translation = "나도 유성 학원 학생의 상대가 된 후라, 꽤 비틀비틀하다."

[[dialogue]]
speaker = "unk"
original = "でも今はユウリを支える重みが心地いい。"
translation = "하지만 지금은 유우리를 지탱하는 무게감이 기분 좋다."

[[dialogue]]
speaker = "ユウリ"
original = "「おい……」"
translation = "「어이……」"

[[dialogue]]
speaker = "unk"
original = "ユウリが僅かに潤んだ瞳で俺を呼ぶ。"
translation = "유우리가 약간 젖은 눈동자로 나를 부른다."

[[dialogue]]
speaker = "unk"
original = "それだけでユウリの意図がわかった気がした。"
translation = "그것만으로 유우리의 의도를 알 것 같은 기분이 들었다."

[[dialogue]]
speaker = "ユウリ"
original = "「ん……っ、ちゅるっ、ちゅぱっ……ちゅっ、ちゅっ、ちゅぅっ<emoji=heart04>\u3000れろれろ……んれろ……じゅっ、じゅぷっ、じゅぷるるるっ<emoji=heart04>\u3000──ぷはぁっ<emoji=heart04>」"
translation = "「응…… 츄르릅, 츄릅…… 츄, 츄, 츄우<emoji=heart04> 레로레로…… 응레로…… 쥬릅, 쥬퓌, 쥬퓌르르르<emoji=heart04> ──푸하아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして唾液が垂れるほど濃厚なキスを交わし、急いで片付けて女子更衣室を後にしたのだった。"
translation = "그리고 타액이 늘어질 정도로 농후한 키스를 나누고, 서둘러 정리한 뒤 여자 탈의실을 뒤로했다."

