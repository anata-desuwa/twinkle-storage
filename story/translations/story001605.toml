[[dialogue]]
speaker = "unk"
original = "ミウとヒマワリがゴールデングースに見習いとして入社し、早半月ほどが経過した。"
translation = "미우와 히마와리가 골든 구스에 견습으로 입사하고 벌써 보름 정도가 경과했다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「最近はＩＴ系と金属の株が絶好調だねー。むしろ、絶好調すぎるかもー？」"
translation = "「최근에는 IT 계열이랑 금속 주식이 절정이네ー. 오히려 너무 절정일지도ー?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そろそろ下げそうだから、一旦利確しておこっと。ポチッと」"
translation = "「슬슬 떨어질 것 같으니까 일단 익절해둬야지. 클릭.」"

[[dialogue]]
speaker = "セナリィ"
original = "（ゴールデングースの資産が増える音が聞こえたわ……実に喜ばしいことなんですけども！）"
translation = "(골든 구스의 자산이 불어나는 소리가 들려…… 실로 기쁜 일입니다만!)"

[[dialogue]]
speaker = "セナリィ"
original = "「ミウ、今着手中の依頼が１件ありましたわよね。大型ペットの捜索と捕獲依頼だったかしら」"
translation = "「미우, 지금 착수 중인 의뢰가 한 건 있었죠. 대형 펫의 수색과 포획 의뢰였던가요.」"

[[dialogue]]
speaker = "ミウ"
original = "「あっ、ごめんなさい、社長。そちら、既に解決済みです」"
translation = "「앗, 죄송해요 사장님. 그건 이미 해결했어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「いつの間に！？」"
translation = "「어느 사이에!?」"

[[dialogue]]
speaker = "ミウ"
original = "「昨晩、社長の手を煩わせるまでもないと思ったので、ヒマワリちゃんとお出かけついでに解決しちゃいました……マズかったですか？」"
translation = "「어젯밤 사장님의 손을 번거롭게 할 것까지도 없다고 생각해서, 히마와리짱과 외출한 김에 해결해 버렸거든요…… 좋지 않았나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「……いえ、構いませんわ。お疲れさま」"
translation = "「……아니요, 상관없습니다. 고생했어요.」"

[[dialogue]]
speaker = "ミウ"
original = "「捕獲対象がヘビやカエルじゃなくて良かったです。私、爬虫類や両生類が苦手なもので……」"
translation = "「포획 대상이 뱀이나 개구리가 아니라서 다행이었어요. 전 파충류나 양서류가 약해서……」"

[[dialogue]]
speaker = "セナリィ"
original = "「意外ですわ。ミウにも苦手なものがありますのね」"
translation = "「의외군요. 미우에게도 약점이 있다니.」"

[[dialogue]]
speaker = "ミウ"
original = "「もちろんですよ。セナリィ社長は、苦手なものなんてなさそうですよね」"
translation = "「당연하죠. 세나리 사장님은 약점 같은 건 없으실 것 같지만요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「え、ええ、当然ですわ！\u3000仮にあったとしても、決して赤の他人に弱点を悟られてはなりませんわよ」"
translation = "「어, 에에, 당연하죠! 설령 있다 해도 결코 남에게 약점을 들켜서는 안 된답니다.」"

[[dialogue]]
speaker = "ミウ"
original = "「あっ……そうですね。気をつけます。ヘビやカエルを生で食べろと言われたら、口を割ってしまうかもしれません」"
translation = "「앗…… 그렇네요. 조심할게요. 뱀이나 개구리를 생으로 먹으라고 하면 입을 열어버릴지도 몰라요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「それは嫌いじゃなくてもキツそうですわね……」"
translation = "「그건 싫어하지 않아도 힘들 것 같군요……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ミウ、ちょっとこっち来てー？」"
translation = "「미우, 잠깐 이쪽으로 와봐ー!」"

[[dialogue]]
speaker = "ミウ"
original = "「はーい、どうしたの。ヒマワリちゃん」"
translation = "「네에, 무슨 일이야 히마와리짱.」"

[[dialogue]]
speaker = "セナリィ"
original = "「……マズいですわ」"
translation = "「……위험해요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私、何もしておりませんのに……偉そうに椅子にふんぞり返ってるだけで勝手に運営資金が増えていきますわ……」"
translation = "「제가 아무것도 하지 않았는데도…… 거만하게 의자에 거들먹거리고만 있어도 알아서 운영 자금이 불어나고 있어요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「いえ、悪いことではないのですけど……優秀な社員が働いてくれてるおかげで、何もしないで左団扇……不労所得……」"
translation = "「아니, 나쁜 일은 아닙니다만…… 우수한 사원이 일해주는 덕분에 아무것도 안 하고 유유자적…… 불로소득……」"

[[dialogue]]
speaker = "セナリィ"
original = "「社長としては最も望ましく、憧れすら抱いてた状況にもかかわらず……なんなんですの、この虚しさは！」"
translation = "「사장으로서는 가장 바라고 동경하기까지 했던 상황임에도 불구하고…… 뭐죠 이 허무함은!」"

[[dialogue]]
speaker = "セナリィ"
original = "「この１週間、あの子たちがたんまりと運営資金を稼いでる中、私は燃費の悪い戦闘服をテストしているだけ……私が一番何もしていないではありませんの！」"
translation = "「이 일주일간 저 아이들이 잔뜩 운영 자금을 벌어오는 동안 저는 연비 나쁜 전투복을 테스트하고 있을 뿐…… 제가 제일 아무것도 안 하고 있잖아요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「マズい……マズいですわ！\u3000このままでは社長の私が一番いらない子になってしまいます！\u3000ゴールデングースを新人２人に乗っ取られてしまいますわー！」"
translation = "「위험해…… 위험해요! 이대로라면 사장인 제가 가장 필요 없는 애가 되고 말아요! 골든 구스를 신입 둘에게 빼앗기고 말 거예요ー!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「社長？\u3000どうかしましたー？」"
translation = "「사장님? 무슨 일 있나요ー?」"

[[dialogue]]
speaker = "セナリィ"
original = "「い、いえ、なんでも。２人ともよく頑張ってくれていますわね。ちゃんと休みは取っているのかしら？」"
translation = "「아, 아니요, 아무것도. 둘 다 아주 잘해주고 있군요. 휴식은 제대로 취하고 있나요?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「もちろんですよー。その辺はミウがしっかりプランニングしてくれてるんで！」"
translation = "「물론이죠ー. 그쪽은 미우가 확실하게 플래닝해주고 있으니까!」"

[[dialogue]]
speaker = "ミウ"
original = "「ちゃんと食べて、ちゃんと寝ないと、ベストパフォーマンスは発揮できませんからね」"
translation = "「제대로 먹고 제대로 자지 않으면 베스트 퍼포먼스를 발휘할 수 없으니까요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「本当によくできた子たちですわ……」"
translation = "「정말 잘 자란 아이들이군요……」"

[[dialogue]]
speaker = "ミウ"
original = "「社長のプランニングも整えてるつもりでしたけど、お気に召さなかったでしょうか？」"
translation = "「사장님의 플래닝도 갖춰둘 생각이었는데 마음에 들지 않으셨나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「まさか。ミウの提案してくれている健康的な食事のおかげで、以前より肌ツヤもハリもいいですし、睡眠の質が向上した実感がありますわ」"
translation = "「설마요. 미우가 제안해 주는 건강한 식사 덕분에 이전보다 피부 윤기도 탄력도 좋아졌고 수면의 질이 향상된 실감이 난답니다.」"

[[dialogue]]
speaker = "ミウ"
original = "「それは何よりです。セナリィ社長の美が損なわれたりしたら、世界にとって大きな損失ですからね」"
translation = "「그거 다행이네요. 세나리 사장님의 미모가 손상되거나 하면 세계적으로 큰 손실이니까요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「損失のスケールが大きいですわね……」"
translation = "「손실의 스케일이 크군요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「２人とも入社したばかりだからってあまり張り切りすぎなくてもよろしくてよ？\u3000もう少し肩の力を抜いて──」"
translation = "「둘 다 갓 입사했다고 해서 너무 무리하지 않아도 된답니다? 좀 더 어깨의 힘을 빼고──」"

[[dialogue]]
speaker = "ミウ"
original = "「いえ、私たちなんて、社長に比べたらまだまだです」"
translation = "「아니요, 저희는 사장님에 비하면 아직 멀었어요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「社長はあたしがやってる子どもの遊びなんかより、もっともっとすごいことをしてますもんね！」"
translation = "「사장님은 제가 하는 애들 장난 같은 것보다 훨씬 훨씬 더 대단한 일을 하고 계시잖아요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「そっ、そ、そうですわね！\u3000社員のあなたたちにも言えない企業秘密案件を遂行中ですのよ！？」"
translation = "「그, 그, 그렇죠! 사원인 당신들에게도 말할 수 없는 기업 비밀 안건을 수행 중이거든요!?」"

[[dialogue]]
speaker = "ミウ"
original = "「やっぱり。詮索するつもりはありませんけど、私たちに気づかれないよう、何かこっそりとされてますよね？」"
translation = "「역시. 캐물을 생각은 없지만 저희가 눈치채지 못하게 무언가 몰래 하고 계시죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "（こっそりしてたのにバレバレでしたわー！？）"
translation = "(몰래 하고 있었는데 다 들켰잖아요ー!?)"

[[dialogue]]
speaker = "ヒマワリ"
original = "「まだあたしたちが半人前だから教えてもらえないんですよね！\u3000社長に認めてもらえるよう、まだまだ頑張ります！」"
translation = "「아직 저희가 반인분이라 가르쳐주지 않으시는 거죠! 사장님께 인정받을 수 있도록 더욱더 열심히 할게요!」"

[[dialogue]]
speaker = "ミウ"
original = "「ところで社長。先ほどからネーゼマインさんがいらしてますけど、お話されなくていいんですか？」"
translation = "「그건 그렇고 사장님. 아까부터 네제마인 씨가 와 계신데 이야기 안 하셔도 되나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「へ……？」"
translation = "「헤……?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「退屈はしてないんでお構いなく～。ミウちゃんがいれてくれた紅茶、チョー美味しいね☆」"
translation = "「지루하진 않으니까 상관하지 말라구~. 미우짱이 타준 홍차, 초 맛있네☆」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、あの子の入れる紅茶は私よりも美味しく──って、マイン！？\u3000あなた、どこに──いえ、いつからいましたの！？」"
translation = "「에에, 그 애가 타는 홍차는 나보다 맛있── 어라, 마인!? 너 어디에── 아니, 언제부터 있었니!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「えー、最初っから、ずーっとここにいたのに、セナリィってば気づいてなかったんだ。そんなに影が薄かっただなんてマインちゃんショック☆」"
translation = "「에ー 처음부터 계~속 여기 있었는데 세나리는 전혀 눈치 못 챘구나. 그렇게나 존재감이 없었다니 마인짱 쇼크☆」"

[[dialogue]]
speaker = "セナリィ"
original = "「自己主張強すぎるあなたの影が薄いはずがないでしょう。集中しすぎて、自分の世界に入っていただけですわ」"
translation = "「자기주장이 너무 강한 네 존재감이 없을 리가 없잖아요. 너무 집중해서 내 세계에 빠져 있었을 뿐입니다.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「みたいだね～。セナリィが頭抱えてぐねぐねしたり、呻いてる一部始終、見させてもらってたし。セナリィってば見てるだけで退屈しないよね～」"
translation = "「그런가 봐~. 세나리가 머리 싸매고 몸을 꼰다거나 끙끙거리는 거 처음부터 끝까지 다 봤거든. 세나리는 보고만 있어도 지루하질 않네~」"

[[dialogue]]
speaker = "セナリィ"
original = "「んなっ……！？\u3000ぐねってる途中で声のひとつもかけたらどうなんですの！？」"
translation = "「뭐랏……!? 몸을 꼬고 있는 도중에 말이라도 걸면 좀 어때서요!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「新入社員のヒマワリちゃんとミウちゃん、２人ともいい子だよね。成績抜群で頭良いし、仕事もできるし、これでゴールデングースも安泰だ♪」"
translation = "「신입 사원인 히마와리짱이랑 미우짱, 둘 다 좋은 아이네. 성적 우수하고 머리 좋고 일도 잘하고, 이걸로 골든 구스도 안심이다♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、優秀すぎる部下ってのも考えものだよねー。社長としては肩身が狭くなってるんじゃない？」"
translation = "「하지만 너무 우수한 부하라는 것도 생각할 문제네ー. 사장으로서는 입지가 좁아진 거 아니야?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ちょっ、マイン、どこまで察してますの……！？」"
translation = "「잠깐, 마인, 어디까지 짐작하고 있는 거죠……!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000私とセナリィの仲じゃん。セナリィが考えてることなんて、手に取るみたいにわかっちゃうってば」"
translation = "「니히히♪ 나랑 세나리 사이잖아. 세나리가 생각하는 것 정도는 손바닥 보듯 훤히 다 안다니까.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「さってと、面白いものも見れたし、紅茶も飲み終わったことだし、私はここらでお暇しようかな」"
translation = "「그럼, 재밌는 것도 봤고 홍차도 다 마셨으니까 난 이만 실례할까나.」"

[[dialogue]]
speaker = "セナリィ"
original = "「あなた、お茶を飲みに来ただけですの？\u3000冷やかしはお断りですわよ」"
translation = "「너, 차 마시러 온 것뿐인가요? 구경은 사절이랍니다.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「違う、違う。食い扶持に困ってそうなら、メンドい案件を押し付けようと思ってただけ」"
translation = "「아니지, 아니지. 먹고 살기 힘들어 보이면 귀찮은 안건을 떠넘기려고 했을 뿐이야.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも今のゴールデングースなら、その必要もなさそうだしね。これは公安の方で片づけちゃうよ。シアン先輩が嫌そうな顔するのが目に浮かぶな～」"
translation = "「하지만 지금의 골든 구스라면 그럴 필요도 없을 것 같네. 이건 공안 쪽에서 해결해버릴게. 시안 선배가 싫어하는 표정이 눈에 선하네~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「じゃ、可愛い部下の期待を裏切らないよう、せいぜい頑張ってね、社長さん☆」"
translation = "「그럼, 귀여운 부하들의 기대를 저버리지 않도록 나름대로 열심히 하라고, 사장님☆」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ミウちゃん、紅茶ごちそうさまー。ヒマワリちゃんも頑張ってねー♪」"
translation = "「미우짱, 홍차 잘 마셨어. 히마와리짱도 파이팅해ー♪」"

[[dialogue]]
speaker = "ミウ"
original = "「もう帰られるんですか？\u3000何のお構いもしませんで」"
translation = "「벌써 가시나요? 아무런 대접도 못 해 드려서.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「お疲れさまでーす。また遊びに来てくださいねー」"
translation = "「수고하셨어요ー. 또 놀러 오세요ー」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひっ、社長業ってタイヘーン☆」"
translation = "「니히히, 사장 노릇 참 힘드네☆」"

[[dialogue]]
speaker = "セナリィ"
original = "「まったく……マインの言う通りなのが、実に癪ですわ。尊敬してくれている２人に、不甲斐ない姿を見せるわけにはいきませんわね……」"
translation = "「정말이지…… 마인의 말대로인 게 실로 분하군요. 존경해 주는 두 사람에게 한심한 모습을 보여줄 수는 없겠네요……」"

