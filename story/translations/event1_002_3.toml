[[dialogue]]
speaker = "unk"
original = "合宿２日目。"
translation = "합숙 2일째."

[[dialogue]]
speaker = "unk"
original = "俺達は海の家に宿泊して、リップルの作った朝食を口にしていた。"
translation = "우리들은 바다의 집에서 숙박하며 리플이 만든 아침 식사를 먹고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うん、美味しいです。昨日頂いた時も思いましたが、リップルさんは料理がとてもお上手ですね」"
translation = "「음, 맛있어요. 어제 먹었을 때도 생각했지만, 리플 씨는 요리를 정말 잘하시네요」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エヘヘ～♪\u3000それほどでもないデスよ～」"
translation = "「에헤헤~♪ 그 정도는 아님다~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやいや、この焼きそばとか、本当に絶品だよ！\u3000これもお世話になった師匠さんに教わったの？」"
translation = "「아니 아니, 이 야키소바 같은 거 정말 일품이야! 이것도 신세를 졌다는 스승님께 배운 거야?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000焼きそばは大好物で、シショーに作り方をナラいました！」"
translation = "「하이♪ 야키소바는 제일 좋아하는 음식이라, 스승님께 만드는 법을 배워씀다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「海の家で食べるものはフインキだけでも美味しく感じマスが、料理が美味しいと更にハッピーな気持ちになれマスから♪」"
translation = "「바다의 집에서 먹는 건 분위기만으로도 맛있게 느껴짐다만, 요리가 맛있으면 더욱 해피한 기분이 될 수 있으니까여♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシが理想の海の家をツクるにあたって、特にこだわっているトコロです！」"
translation = "「와타시가 이상적인 바다의 집을 만드는 데 있어 특히 신경 쓰고 있는 부분임다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「このレストラン並みの料理を提供できるだけでも、海の家として十分に人気出そうな気がするけど、それだけじゃダメなの？」"
translation = "「이 레스토랑 수준의 요리를 제공할 수 있는 것만으로도 바다의 집으로서 충분히 인기 있을 것 같은데, 그것만으론 안 돼?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「内装も綺麗だし、とてもスランプとは思えないほど、素敵な場所よね～？」"
translation = "「내장도 예쁘고, 전혀 슬럼프라고는 생각되지 않을 정도로 멋진 곳인걸~?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「こんなものじゃ、まだまだタリません！\u3000ワタシが去年見たシショ―の海の家は……夏のビーチは、心に焼き付いて離れないほど、情熱的でハッピーなリゾートでした！」"
translation = "「이런 걸로는 아직 부족함다! 와타시가 작년에 본 스승님의 바다의 집은…… 여름 해변은 마음에 박혀서 잊히지 않을 정도로 정열적이고 해피한 리조트였슴다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「もちろん、アレを簡単に超えることは出来ないとワカっていますが……それでもワタシは、あのハッピーなキモチを皆にもツタえたいのです！」"
translation = "「물론 그걸 간단히 넘을 수는 없다는 걸 알고 이씀다만…… 그래도 와타시는 그 해피한 기분을 모두에게 전하고 싶은 검다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リップルさんは、職人肌なのですね。夏の海に対する強いこだわりを感じます」"
translation = "「리플 씨는 장인 기질이시군요. 여름 바다에 대한 강한 고집이 느껴집니다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000トコナツのリゾート結界は、ワタシのＢＩＧドリームですから！」"
translation = "「하이! 늘 여름인 리조트 결계는 와타시의 BIG 드림이니까여!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「夏の海はとてもハッピーな気持ちにさせてくれます。デスから、トコナツの世界を作り上げれば、いつでも皆ハッピーな気分でスゴせるです！」"
translation = "「여름 바다는 정말 해피한 기분을 느끼게 해줌다. 그러니까 늘 여름인 세계를 만들어내면 언제든 모두 해피한 기분으로 지낼 수 있는 검다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「なのでワタシはまず、このリゾート結界を理想のカタチに仕上げて、たくさんの人に訪れてもらって、夏の海の良さを広げたいとカンガえてます！」"
translation = "「그래서 와타시는 우선 이 리조트 결계를 이상적인 형태로 완성해서, 많은 사람이 찾아오게 해 여름 바다의 장점을 널리 알리고 싶다고 생각함다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うんうん、いい夢だと思うよ」"
translation = "「음음, 좋은 꿈이라고 생각해」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そして、夏の海を好きになってもらったら、そのハッピーな気持ちを少しずつ分けてもらい、リゾート結界拡大のエネルギーにヘンカンします」"
translation = "「그리고 여름 바다를 좋아하게 되면 그 해피한 기분을 조금씩 나눠 받아 리조트 결계 확대 에너지로 변환함다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へぇ～、そんなことも出来るのね！」"
translation = "「헤에~, 그런 것도 가능하구나!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「これを繰り返して行くことで、ゆくゆくはリゾート結界で世界を覆い尽くしたいとカンガえますっ」"
translation = "「이걸 반복해 나감으로써 머지않아 리조트 결계로 세계를 뒤덮고 싶다고 생각함다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そっか～、世界を……何て？」"
translation = "「그렇구나~, 세계를…… 뭐라구?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そうすれば、世界はトコナツに包まれ、真のエンドレスサマーが完成し、皆ハッピー♪\u3000というワケです！」"
translation = "「그러면 세계는 늘 여름에 감싸여 진정한 엔들리스 서머가 완성되고, 모두 해피♪ 하게 되는 검다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやいやいやいやいや、待って！？\u3000エンドレスサマーって響きが急に怖く聞こえるんだけど！？」"
translation = "「아니 아니 아니 아니 아니, 잠깐!? 엔들리스 서머라는 울림이 갑자기 무섭게 들리는데!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「皆ハッピーになれる、素敵なケイカクですよ？」"
translation = "「모두 해피해질 수 있는 멋진 계획임다?」"

[[dialogue]]
speaker = "unk"
original = "世界征服を狙うラスボス的発想！"
translation = "세계 정복을 노리는 라스보스적 발상!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……フィオナ先輩。私の見立てでは、個人の星術でそんな容量の大結界は作成不可能だと思うのですが、実際どうなんでしょう？」"
translation = "「……피오나 선배. 제 견해로는 개인의 성술로 그런 용량의 대결계는 작성 불가능하다고 생각합니다만, 실제론 어떨까요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わ、私も世界を覆うのは非現実的だと思いますが、さっき他の人から気持ちを分けてもらって、エネルギーに変換するとか何とかって……」"
translation = "「저, 저도 세계를 뒤덮는 건 비현실적이라 생각하지만, 아까 다른 사람에게 기분을 나눠 받아 에너지로 변환한다느니 뭐라느니……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……聞こえなかったことにします」"
translation = "「……안 들은 걸로 하겠습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナが遠くを見る目をしてるんだけど！？」"
translation = "「아나가 먼 곳을 보는 눈을 하고 있는데!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「リップル、あなた面白いこと考えるわね！\u3000そういう野望、私は好きよ！」"
translation = "「리플, 너 재미있는 생각을 하는구나! 그런 야망, 난 좋아!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アリガトございます♪\u3000必ず叶えてミセます！」"
translation = "「감사함다♪ 반드시 이뤄내 보이게씀다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスが肯定すると、本当に実現しちゃいそうだから止めて！」"
translation = "「비너스가 긍정하면 정말 실현될 것 같으니까 그만둬!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあまあ。リップルちゃんは良い子だし、きっと大丈夫よ～」"
translation = "「자자. 리플짱은 착한 아이고 분명 괜찮을 거야~」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アハハ！\u3000トコナツの世界になれば、自動的に皆ハッピーになるからダイジョウブですよ～♪」"
translation = "「아하하! 늘 여름인 세계가 되면 자동으로 모두 해피해지니까 괜찮슴다~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「一応真面目な解説を入れておくと、三界の摂理は守護天使様に守られているので、基本不可能です。……リップルさんの力が、守護天使様を上回らなければ」"
translation = "「일단 진지한 해설을 덧붙이자면, 삼계의 섭리는 수호천사님께서 지키고 계시기에 기본적으로 불가능합니다. ……리플 씨의 힘이 수호천사님을 상회하지 않는다면 말이죠」"

[[dialogue]]
speaker = "unk"
original = "（小声の補足が怖いなぁ……）"
translation = "（작은 목소리로 하는 보충이 무섭네……）"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「とりあえず、こうして料理を食べてくれる人達が来てくれたワケですし、今日はこの後、理想のメニューをカンガえます！」"
translation = "「어쨌든 이렇게 요리를 먹어줄 분들이 와주신 거니, 오늘은 이따가 이상적인 메뉴를 생각하게씀다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「皆さんはその間ドウゾ、リゾート結界の海を楽しんで、感想を聞かせてクダさい！」"
translation = "「여러분은 그동안 부디 리조트 결계의 바다를 즐기고 감상을 들려주세여!」"

[[dialogue]]
speaker = "unk"
original = "リップルが海の家でメニューを考えている間、俺達は海で水着フォームの訓練を行うことになった――"
translation = "리플이 바다의 집에서 메뉴를 생각하는 동안, 우리들은 바다에서 수영복 폼 훈련을 하게 되었다――"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「水鉄砲で狙い撃ちです。バン」"
translation = "「물총으로 저격입니다. 빵」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きゃっ♪\u3000アナ、よくもやったわね～、フルパワーでお返しよ！」"
translation = "「꺄앗♪ 아나, 잘도 그랬네~, 풀 파워로 되돌려주겠어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あんっ<emoji=heart04>\u3000ヴィーナスちゃん、激し過ぎよ～。水圧で水着がズレちゃうわ～」"
translation = "「앙<emoji=heart04> 비너스짱, 너무 격해~. 수압 때문에 수영복이 벗겨지겠어~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ！？\u3000会長が見てますから！\u3000すぐに隠して下さいサーシャさん！」"
translation = "「잠깐!? 회장님이 보고 계시니까! 빨리 가려주세요 사샤 씨!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。水鉄砲で会長の視界を塞ぎます」"
translation = "「노 프로블럼. 물총으로 회장님의 시야를 차단하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "うわっ、アナ！\u3000目を狙い撃つのはやめて！"
translation = "우와앗, 아나! 눈을 노리는 건 그만둬!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふっ、なんちゃって～♪\u3000嘘よ～♪」"
translation = "「우후훗, 농담이야~♪ 거짓말이라구~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「からかいましたね！？\u3000もう、許しませんよ！\u3000それ！」"
translation = "「놀리신 거군요!? 정말, 안 봐줄 거예요! 에잇!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほら、フィオナも遠慮してないで！\u3000全力で水をかけてきなさい！\u3000フィオナとは１度本気で戦ってみたかったし！」"
translation = "「자, 피오나도 사양하지 말고! 전력으로 물을 끼얹어봐! 피오나와는 한번 진심으로 싸워보고 싶었거든!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、はい！\u3000えっと、こうでしょうか……えいっ！」"
translation = "「아, 네! 저기, 이렇게 하면 될까요…… 에잇!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「きゃっ！？\u3000凄いパワー！\u3000さすが流星の星徒会長……！」"
translation = "「꺄앗!? 엄청난 파워! 역시 유성의 성도회장……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フィオナ、イイ波で～す♪\u3000サーフィンの腕がナリます！\u3000イヤッホ～♪」"
translation = "「피오나, 좋은 파도임다~♪ 서핑 실력을 발휘할 때네여! 이야호~♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとうございます。……って、リップルさん！？」"
translation = "「감사합니다. ……어라, 리플 씨!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「リップル、あなたサーフィンも上手いのね！」"
translation = "「리플, 너 서핑도 잘하는구나!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000これもシショ―からオソわりました。ワタシが一番海で好きなアソビです♪」"
translation = "「하이♪ 이것도 스승님께 배웠슴다. 와타시가 바다에서 제일 좋아하는 놀이임다♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それはいいんだけど……リップル、メニュー作りするとか言ってなかった？」"
translation = "「그건 좋은데…… 리플, 메뉴 만든다고 하지 않았어?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハッ……！\u3000ソウでした！」"
translation = "「핫……! 그래씀다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「目覚めてから同年代の友達と遊んだことがナカッタので、見ていたらつい……」"
translation = "「눈을 뜨고 나서 또래 친구들과 놀아본 적이 없어서, 보고 있자니 그만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら♪\u3000訓練が楽しそうで、我慢出来なくなっちゃったのね～」"
translation = "「어머 어머♪ 훈련이 즐거워 보여서 참을 수 없게 되어버렸나 보네~」"

[[dialogue]]
speaker = "unk"
original = "なら、今日はリップルも一緒に訓練しよう！"
translation = "그럼 오늘은 리플도 같이 훈련하자!"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョー、いいんですか？」"
translation = "「회장님, 그래도 됨까?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「――ハイ、確かに、これまで１人で居て、スランプで行き詰まってまシタけど……」"
translation = "「――하이, 확실히 지금까지 혼자 있어서 슬럼프로 막혀 이씀다만……」"

[[dialogue]]
speaker = "unk"
original = "そういう時は、気分転換も必要だよ"
translation = "그럴 때는 기분 전환도 필요해"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「……！\u3000カイチョー、アリガトです！」"
translation = "「……! 회장님, 감사함다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アナタはシショ―みたいに優しい人！\u3000ダイスキです♪」"
translation = "「당신은 스승님처럼 다정한 사람! 다이스키임다♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ！？\u3000会長のほ、頬っぺたにききき、キス！？」"
translation = "「잠깐!? 회장님의 벼, 뺨에 키키키, 키스!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪」"
translation = "「어머나~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「わお。大胆です」"
translation = "「와오. 대담합니다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エヘヘ♪\u3000シショーがオクサンにしていた、最大の親愛を示すアイサツです♪」"
translation = "「에헤헤♪ 스승님이 사모님께 하시던, 최대의 친애를 나타내는 인사임다♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハッピーな気持ちが溢れて、初めてやってみましたが、ちょっと照れマスね……」"
translation = "「해피한 기분이 넘쳐서 처음으로 해봤슴다만, 조금 부끄럽네여……」"

[[dialogue]]
speaker = "unk"
original = "俺もちょっと、ビックリした……"
translation = "나도 좀 놀랐어……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よし、それじゃあリップルも訓練参加ね！\u3000手加減しないわよ～。えいっ！」"
translation = "「좋아, 그럼 리플도 훈련 참가야! 봐주지 않을 거니까. 에잇!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「おっと、簡単にはくらいマセンよ！\u3000結界バリアー発動です！」"
translation = "「오토토, 쉽게 당하지 않슴다! 결계 배리어 발동임다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なっ！？\u3000透明な壁に水を弾かれたわ！？」"
translation = "「뭐!? 투명한 벽에 물이 튕겨 나갔어!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「結界はそんな使い方も出来るんですね……！」"
translation = "「결계는 그런 식으로도 쓸 수 있군요……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「海はワタシの得意フィールドです。簡単にはマケません！」"
translation = "「바다는 와타시의 주특기 필드임다. 쉽게 지지 않슴다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「面白いわ！\u3000フィオナ、手を貸しなさい！\u3000協力して、あの結界バリアーを破るのよ！」"
translation = "「재미있네! 피오나, 손을 빌려줘! 협력해서 저 결계 배리어를 깨부수는 거야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「は、はい、分かりました。全力でやってみます！」"
translation = "「네, 네, 알겠습니다. 전력으로 해볼게요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「受けてタチます！\u3000カモンです！」"
translation = "「받아주게씀다! 커먼 임다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うわっ！？\u3000３人とも、私達巻き込んでるから！\u3000パワー出し過ぎ……きゃ～～～っ！？」"
translation = "「우와앗!? 세 사람 다, 우리까지 휘말리고 있잖아! 파워를 너무 내고 있어…… 꺄아아악!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あっ。マトイ先輩、水着取れてます」"
translation = "「앗. 마토이 선배, 수영복 벗겨졌습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪」"
translation = "「어머나~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやぁぁぁっ！？\u3000会長、こっち見ないでぇぇぇ～～～っ！」"
translation = "「시러어어억!? 회장님, 이쪽 보지 마아아아아악!」"

[[dialogue]]
speaker = "unk"
original = "いや、見てな――うわっぷ！？"
translation = "아니, 안 보―― 우왓푸!?"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アハハハ！\u3000カイチョーも波にナガされてます！」"
translation = "「아하하하! 회장님도 파도에 휩쓸리고 이씀다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「こんなにハッピーなのは、ヒサシぶりです♪」"
translation = "「이렇게 해피한 건 오랜만임다♪」"

[[dialogue]]
speaker = "unk"
original = "訓練という名の水遊びになってしまっていたが、その日、俺達は心ゆくまで海を楽しんだのだった――"
translation = "훈련이라는 이름의 물놀이가 되어버렸지만, 그날 우리들은 마음껏 바다를 즐겼다――"

