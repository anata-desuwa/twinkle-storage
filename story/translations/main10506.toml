[[dialogue]]
speaker = "unk"
original = "第６話,閃へのプレゼントだぴょん！,B"
translation = "제6화, 센에게 주는 선물이다뿅!, B"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お……お嬢様……ぐ、偶然ですね……」"
translation = "「아…… 아가씨…… 우, 우연이네요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「閃、探してたのよ！\u3000なかなか見つからなくて困ったわ」"
translation = "「센, 찾고 있었어! 좀처럼 보이지 않아서 곤란했다니까」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「も、申し訳ありません……」"
translation = "「죄, 죄송합니다……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「実はね、閃にビックリドッキリなサプライズプレゼントがあるのよ！\u3000驚いた？」"
translation = "「사실은 말이야, 센에게 깜짝 놀랄 서프라이즈 선물이 있어! 놀랐어?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「は、はい……びっくりしました……」"
translation = "「하, 네…… 깜짝 놀랐습니다……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「は、はは……」"
translation = "「하, 하하……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「バレバレよ。下手な演技はおよしなさい、閃」"
translation = "「다 들켰단다. 어설픈 연기는 그만두거라, 센」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「う……」"
translation = "「우……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「やっぱり予測の星眼を持つ閃にサプライズプレゼントは難しかったようね」"
translation = "「역시 예측의 성안을 가진 센에게 서프라이즈 선물은 어려웠던 모양이구나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ？\u3000じゃ全部演技で最初から気付いてたってこと？」"
translation = "「엣? 그럼 전부 연기고 처음부터 알고 있었다는 거야?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「も、申し訳ありません……」"
translation = "「죄, 죄송합니다……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様の護衛である閃が、今日に限ってこちらから探しても出会えないというのは変だと思ったのよ」"
translation = "「아가씨의 호위인 센이, 오늘따라 이쪽에서 찾아도 만날 수 없다는 건 이상하다고 생각했단다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「大方、プレゼントを渡されるのにベストなタイミングを見計ろうとして、却ってわざとらしい登場になってしまった、といったところかしら？」"
translation = "「대충, 선물을 받기에 베스트인 타이밍을 가늠하려다 오히려 부자연스러운 등장이 되어버린 것 아니겠느냐?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お察しの通りです……」"
translation = "「짐작하신 대로입니다……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それで、どこまで先を見通せているのかしら？」"
translation = "「그래서, 어디까지 내다보고 있는 거니?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「メイド長のクリスマスフォームを覚醒させるためにプレゼントを配っていることと……クリスマスの思い出を聞いて回っていること……」"
translation = "「메이드장님의 크리스마스 폼을 각성시키기 위해 선물을 나눠주고 계신 것과…… 크리스마스의 추억을 묻고 다니시는 것……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「後は……お２人が何をプレゼントに選んだのか……くらいでしょうか……」"
translation = "「나머지는…… 두 분이 무엇을 선물로 고르셨는지…… 정도일까요……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「つまり全部ってことじゃない！！」"
translation = "「즉 전부라는 거잖아!!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「そ……そういうことになります……」"
translation = "「그…… 그렇게 됩니다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「つまんない～。もー、さっさとプレゼント渡しちゃって終わりにしましょう」"
translation = "「재미없어~. 정말, 얼른 선물 주고 끝내버리자」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「そんなぁ～～……！」"
translation = "「너무해요~~……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「とんでもなくすごい能力なんだけど、こういう時には不便ね……予測の星眼」"
translation = "「터무니없이 대단한 능력이지만, 이럴 때는 불편하구나…… 예측의 성안」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「親にも同じことを言われたことがあります……」"
translation = "「부모님께도 같은 말을 들은 적이 있습니다……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あんな事は滅多に起きることじゃないんだから、無理に星眼を開いたままにしていなくていいんだよって」"
translation = "「그런 일은 좀처럼 일어나는 게 아니니까, 억지로 성안을 켠 채로 있지 않아도 된다고」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「でも、もし私が<b>視て</b>いなかったばかりに、災いを避けられなかったら、と考えると……」"
translation = "「하지만, 만약 제가 <b>보고</b> 있지 않았기 때문에 재앙을 피하지 못한다면, 하고 생각하면……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（閃は９歳の頃、ご両親とのドライブ中にトラックと衝突するという事故に遭っている）"
translation = "(센은 9살 무렵, 부모님과의 드라이브 중에 트럭과 충돌하는 사고를 당한 적이 있다)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（その時の閃は星眼を開いておらず、事故を避けることが出来なかった）"
translation = "(그때의 센은 성안을 켜지 않았고, 사고를 피할 수 없었다)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（閃が普段から、負担のかかる星眼を開いたままにしているのは、この時のトラウマによるもの）"
translation = "(센이 평소에 부담이 가는 성안을 켠 채로 있는 것은, 이때의 트라우마 때문이다)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（自分が<b>視て</b>いれば、誰かの危機を救うことが出来るかもしれない……そんな考えに囚われるようになった）"
translation = "(자신이 <b>보고</b> 있으면, 누군가의 위기를 구할 수 있을지도 모른다…… 그런 생각에 사로잡히게 되었다)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（そして星眼を閉じることに恐怖を覚えるようにも……）"
translation = "(그리고 성안을 닫는 것에 공포를 느끼게 되기도……)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そうね、閃の場合事情が事情だから仕方がないと言えるわね」"
translation = "「그래, 센의 경우 사정이 사정인 만큼 어쩔 수 없다고 할 수 있겠구나」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「申し訳ありません……」"
translation = "「죄송합니다……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いいわよ。急がなくても少しずつ過去の傷を癒していけば──」"
translation = "「괜찮다. 서두르지 않아도 조금씩 과거의 상처를 치유해 가면──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今すぐ星眼を閉じなさい！」"
translation = "「지금 당장 성안을 닫으렴!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様ぁっ！！？」"
translation = "「아가씨!!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふっ、さすがお嬢様。容赦がないわね」"
translation = "「훗, 역시 아가씨. 가차 없으시네」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あの……星眼を閉じて、万が一お嬢様の身に何かあったら、と思うと私は──」"
translation = "「저기…… 성안을 닫고, 만에 하나 아가씨의 신변에 무슨 일이 생기면, 하고 생각하면 저는──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっとの間だけでいいから！」"
translation = "「잠깐 동안이면 되니까!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「こ、恐いです～！」"
translation = "「무, 무서워요~!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「怖くない！\u3000四の五の言わずに閉じるのよ！」"
translation = "「안 무서워! 이러쿵저러쿵 말하지 말고 닫는 거야!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「わ、わかりましたぁ～～！！！」"
translation = "「아, 알겠습니다~~~!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「閉じたかしら？」"
translation = "「닫았니?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「……閉じました」"
translation = "「……닫았습니다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「確認するけれど、あなたの星眼は視覚情報を元に、これから先に起きる未来を導き出すものよね？」"
translation = "「확인하겠는데, 네 성안은 시각 정보를 바탕으로 앞으로 일어날 미래를 도출해내는 거지?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「出力を最大にしても３分先までの予知が限界。つまり……」"
translation = "「출력을 최대화해도 3분 앞까지의 예지가 한계. 즉……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今、この場で考えたサプライズなら、閃も予測できないということで間違いないわよね？」"
translation = "「지금 이 자리에서 생각한 서프라이즈라면, 센도 예측할 수 없다는 게 틀림없겠지?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「確かにそうね！\u3000それで何をプレゼントする気なの、お嬢様？」"
translation = "「확실히 그렇네! 그래서 뭘 선물할 생각이니, 아가씨?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……それが問題なのよ、ぶっちゃけ何も思い付いてないわ！」"
translation = "「……그게 문제야, 솔직히 아무것도 생각 안 났어!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あ、あの……お嬢様、私はそのお気持ちだけで十分……」"
translation = "「저, 저기…… 아가씨, 저는 그 마음만으로 충분……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だめよ……それじゃ私の気が済まないわ……うーん、そうね……えいっ！」"
translation = "「안 돼…… 그러면 내 직성이 안 풀려…… 으음, 그래…… 에잇!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「っ……！？！？！？！？！？」"
translation = "「윽……!?!?!?!?!?!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いつも私のことを護衛してくれてありがとう、閃……なでなで」"
translation = "「항상 나를 호위해 줘서 고마워, 센…… 쓰담쓰담」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「おおおお、お嬢様……こ、これは……」"
translation = "「오오오오, 아가씨…… 이, 이것은……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「頑張ってる閃に、私から『なでなで』のプレゼントよ……なでなで」"
translation = "「열심히 하는 센에게, 내가 주는 『쓰담쓰담』 선물이야…… 쓰담쓰담」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうかしら、こんなのしか思いつかなかったけれど……サプライズを味わえてるかしら？」"
translation = "「어떠니, 이런 것밖에 생각나지 않았지만…… 서프라이즈를 맛보고 있니?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様……私……幸せです……はぅぅ……」"
translation = "「아가씨…… 저…… 행복합니다…… 하으으……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふん、驚きすぎて固まってしまってるじゃない？\u3000どうやら大成功過ぎるくらい大成功だったみたいねっ！」"
translation = "「후훙, 너무 놀라서 굳어버렸잖아? 아무래도 대성공을 넘어서 대성공이었던 모양이네!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「まあ閃にとっては、間違いなく最高のプレゼントだと思うわ」"
translation = "「뭐 센에게는 틀림없이 최고의 선물이라고 생각한다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「その後で申し訳ないけれど、こちらのクリスマスプレゼントも受け取ってね。訓練用の竹刀を収める竹刀袋よ」"
translation = "「그 뒤라서 미안하다만, 이쪽 크리스마스 선물도 받거라. 훈련용 죽도를 넣는 죽도 주머니란다」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あ、ありがとう……ございますぅ……」"
translation = "「고, 고맙…… 습니다아……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なでなでなで……」"
translation = "「쓰담쓰담쓰담……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はぅぅぅ～～……」"
translation = "「하으으으~~……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "（なんて罪作りなのかしら……お嬢様、恐ろしい子っ！！）"
translation = "(어쩜 이렇게 죄 많은 분이실까…… 아가씨, 무서운 아이!!)"

