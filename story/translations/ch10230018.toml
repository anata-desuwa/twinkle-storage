translation = "깊숙이 박힌 페니스가 맥동하며 샤론의 엉덩이에 정액을 쏟아붓는다."

[[dialogue]]
speaker = "シャロン"
original = "「はあっ……あ……うああぁ～～っ<emoji=heart04>\u3000お尻オナホに射精されて、シャロンもイッてますぅっ<emoji=heart04>」"
translation = "「하앗…… 아…… 우아아아~~앗<emoji=heart04> 엉덩이 오나홀에 사정 당해서, 샤론도 가버리고 있어요앗<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「あっ、んっ……まだ出て……<emoji=heart04>\u3000ん──ああぁ～～っ<emoji=heart04>」"
translation = "「앗, 음응…… 아직 나오고……<emoji=heart04> 응── 아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「あぁ……こんなにたくさん射精されて……ご満足いただけたようですね」"
translation = "「아아…… 이렇게나 많이 사정 당해서…… 만족하신 모양이네요」"

[[dialogue]]
speaker = "unk"
original = "シャロンの言葉を証明するように、ペニスが抜けたアナルから白い精液が垂れ落ちる。"
translation = "샤론의 말을 증명하듯, 페니스가 빠진 항문에서 하얀 정액이 흘러내린다."

[[dialogue]]
speaker = "シャロン"
original = "「お腹の中に会長さまの精液が溜まって……んんっ<emoji=heart04>\u3000いつもながら不思議な心地です<emoji=heart04>」"
translation = "「배 속에 회장님의 정액이 쌓여서…… 음응<emoji=heart04> 평소처럼 신비로운 기분이에요<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「私のお尻、会長さまのおち○ちんの形になって戻らなくなってしまいそうです……」"
translation = "「제 엉덩이, 회장님의 자지 모양이 되어서 돌아가지 않게 되어버릴 것 같아요……」"

[[dialogue]]
speaker = "unk"
original = "すっかり俺のペニスの形になってしまったアナルを見ると、本当にシャロンを俺専用のオナホにした気がして、征服感でゾクッと震える。"
translation = "완전히 내 페니스 모양이 되어버린 항문을 보니, 정말로 샤론을 내 전용 오나홀로 만든 기분이 들어 정복감에 소름이 돋는다."

[[dialogue]]
speaker = "unk"
original = "もっとシャロンとつながりが欲しくてキスしようとすると……"
translation = "더 샤론과 연결되고 싶어 키스하려고 하자……"

[[dialogue]]
speaker = "シャロン"
original = "「あの、私、シスターですから……」"
translation = "「저기, 저, 시스터니까요……」"

[[dialogue]]
speaker = "クロト"
original = "「俺は魔王だから無理やりさせてもらうよ」"
translation = "「난 마왕이니까 억지로 하게 해줄게」"

[[dialogue]]
speaker = "unk"
original = "シャロンが使った建前を利用して、強引に唇を奪う。"
translation = "샤론이 썼던 핑계를 이용해, 강제로 입술을 빼앗는다."

[[dialogue]]
speaker = "シャロン"
original = "「んんっ……<emoji=heart04>\u3000くちゅっ、ちゅるっ、じゅるる……れぇろ、ちゅぱっ……んん<emoji=heart04>」"
translation = "「음응……<emoji=heart04> 쿠쥬, 츄릅, 쥬르르…… 레로, 츄파…… 음응<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「くちゅる、れろ、ちゅぱっ……ぴちゃ、れろれろ……じゅるるっ……ぷぁ<emoji=heart04>\u3000ふふ、仕方ない魔王様ですね<emoji=heart04>」"
translation = "「쿠쥬르, 레로, 츄파…… 피챠, 레로레로…… 쥬르르…… 푸하<emoji=heart04> 후후, 어쩔 수 없는 마왕님이시네요<emoji=heart04>」"

