[[dialogue]]
speaker = "unk"
original = "人の気配がない、静かな深夜の大聖堂。"
translation = "인적 없는 고요한 심야의 대성당."

[[dialogue]]
speaker = "シャロン"
original = "「お待ちしておりました、会長さま」"
translation = "「기다리고 있었습니다, 회장님」"

[[dialogue]]
speaker = "unk"
original = "俺がこっそり入っていくと、聖者の装いをまとったシャロンが出迎えてくれる。"
translation = "내가 몰래 들어가자, 성자의 복장을 갖춘 샤론이 마중을 나온다."

[[dialogue]]
speaker = "unk"
original = "いつものシスターらしく清楚な、あるいはシャロンらしい元気な姿と違って、どこか艶を帯びた雰囲気だ。"
translation = "평소의 시스터다운 청초함이나 샤론다운 활기찬 모습과는 달리, 어딘가 요염한 분위기다."

[[dialogue]]
speaker = "unk"
original = "シャロンは涼やかに微笑むと、床に背を預けて──"
translation = "샤론은 화사하게 미소 지으며 바닥에 등을 기대고는──"

[[dialogue]]
speaker = "シャロン"
original = "「さぁどうぞ、会長さま。私を犯してください！」"
translation = "「자 어서요, 회장님. 저를 범해 주세요!」"

[[dialogue]]
speaker = "unk"
original = "自分から足を大きく開いて、下半身をむき出しにするシャロン。"
translation = "스스로 다리를 크게 벌려 하반신을 노출하는 샤론."

[[dialogue]]
speaker = "unk"
original = "いつも目を引く大きな胸がたぷたぷと揺れ、指で広げた秘裂に視線を吸い寄せられる。"
translation = "항상 눈길을 끄는 커다란 가슴이 출렁이고, 손가락으로 벌린 보지에 시선이 빨려 들어간다."

[[dialogue]]
speaker = "unk"
original = "扇情的な光景に、否応なく興奮をかき立てられる──のだが。"
translation = "선정적인 광경에 속수무책으로 흥분이 고조되지만──."

[[dialogue]]
speaker = "シャロン"
original = "「魔王が悪しき欲望に染まるなら、身を捧げて鎮めるのが神に仕えるシスターの務めです！」"
translation = "「마왕이 사악한 욕망에 물든다면, 몸을 바쳐 진정시키는 것이 신을 섬기는 시스터의 임무입니다!」"

[[dialogue]]
speaker = "unk"
original = "これは貞潔を旨とするシスターが男性と結ばれるための建前。"
translation = "이것은 정결을 모토로 하는 시스터가 남성과 맺어지기 위한 핑계."

[[dialogue]]
speaker = "unk"
original = "いや、建前だと思っているのは俺だけで、シャロンは本気なのかもしれないけど……"
translation = "아니, 핑계라고 생각하는 건 나뿐이고, 샤론은 진심일지도 모르겠지만……"

[[dialogue]]
speaker = "シャロン"
original = "「しかしシスターは貞操を守らねばなりませんので……男の方はお、おま○こに入れたいものとは存じておりますが、今日もお尻をお使いくださいませ」"
translation = "「하지만 시스터는 정조를 지켜야 하므로…… 남성분은 보, 보지에 넣고 싶어 하시는 건 알고 있지만, 오늘도 뒷보지를 사용해 주세요」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまのおち○ちんを受け入れるために、ちゃんとお尻を清めて参りました」"
translation = "「회장님의 자지를 받아들이기 위해, 제대로 항문을 깨끗이 하고 왔답니다」"

[[dialogue]]
speaker = "シャロン"
original = "「その代わり、私のおま○こをご覧くださいませ……」"
translation = "「그 대신 제 보지를 감상해 주세요……」"

[[dialogue]]
speaker = "unk"
original = "シャロンでもさすがに恥ずかしいようで、性器を自分で見せつけながら顔を赤くしている。"
translation = "샤론이라도 역시 부끄러운 모양인지, 성기를 직접 내보이면서 얼굴을 붉히고 있다."

[[dialogue]]
speaker = "unk"
original = "だけど柔肉は淡く濡れていて、期待を表しているようでもあった。"
translation = "하지만 부드러운 살결은 옅게 젖어 있어, 기대를 나타내는 것 같기도 했다."

[[dialogue]]
speaker = "unk"
original = "ペニスを性器に沿えて、腰を軽く前後に動かす。"
translation = "페니스를 성기에 대고, 허리를 가볍게 전후로 움직인다."

[[dialogue]]
speaker = "シャロン"
original = "「ん……ふっ……挿入してはいけませんよ」"
translation = "「음…… 훗…… 삽입해서는 안 돼요」"

[[dialogue]]
speaker = "unk"
original = "もちろんわかってるのだが、ぷにぷにとした肉の弾力が心地よくて、ここにペニスを入れられたらどんなに気持ちいいかと想像してしまう。"
translation = "물론 알고는 있지만, 말랑말랑한 살의 탄력이 기분 좋아서, 여기에 페니스를 넣는다면 얼마나 기분 좋을까 상상하게 된다."

[[dialogue]]
speaker = "シャロン"
original = "「あっ……はっ……はぁ<emoji=heart04>\u3000会長さまのおち○ちん、熱いです……<emoji=heart04>」"
translation = "「앗…… 학…… 하아<emoji=heart04> 회장님의 자지, 뜨거워요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を揺らす度に蜜の量が増し、ペニスがぬるぬるとした愛液にまみれていく。"
translation = "허리를 흔들 때마다 애액의 양이 늘어나고, 페니스가 미끈거리는 애액으로 범벅되어 간다."

[[dialogue]]
speaker = "unk"
original = "ペニス全体が愛液で濡れたところで、亀頭をアナルに突きつける。"
translation = "페니스 전체가 애액으로 젖었을 즈음, 귀두를 애널에 들이댄다."

[[dialogue]]
speaker = "シャロン"
original = "「どうぞ存分に欲望をぶつけてください……会長さま」"
translation = "「어서 마음껏 욕망을 부딪쳐 주세요…… 회장님」"

[[dialogue]]
speaker = "unk"
original = "シャロンの体からすっと力が抜けるのが伝わる。"
translation = "샤론의 몸에서 스르르 힘이 빠지는 것이 전해진다."

[[dialogue]]
speaker = "unk"
original = "ペニスをゆっくり押し込むと──"
translation = "페니스를 천천히 밀어 넣자──"

[[dialogue]]
speaker = "シャロン"
original = "「ふぁああああっ<emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭がアナルを広げて、シャロンの中に埋まっていく。"
translation = "귀두가 애널을 벌리며, 샤론의 안으로 파묻혀 간다."

[[dialogue]]
speaker = "unk"
original = "シャロンの体温を感じると同時に締め付けられ、強烈な快感に思わず奥歯を噛んだ。"
translation = "샤론의 체온을 느낌과 동시에 조여지며, 강렬한 쾌감에 저도 모르게 어금니를 깨물었다."

[[dialogue]]
speaker = "シャロン"
original = "「んっ……はぁ……<emoji=heart04>\u3000会長さまのおち○ちん、大きい、です<emoji=heart04>」"
translation = "「응…… 하아……<emoji=heart04> 회장님의 자지, 커, 커요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身に力を込めるごとに、いきり立ったペニスがシャロンの中にズブズブと入っていく。"
translation = "하반신에 힘을 줄 때마다, 발기한 페니스가 샤론의 안으로 즈부즈부 들어간다."

[[dialogue]]
speaker = "シャロン"
original = "「ふあぁ……んっ……<emoji=heart04>\u3000おち○ちんで、お腹の中、広げられて……んんっ、はぁ<emoji=heart04>」"
translation = "「후아아…… 응……<emoji=heart04> 자지로, 배 속, 넓혀져서…… 응응, 하아<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ふっ……くっ……んん～っ<emoji=heart04>\u3000ふ、深いぃ……あっ、はぁ、はあぁ<emoji=heart04>」"
translation = "「훗…… 윽…… 음음~<emoji=heart04> 기, 깊어어…… 앗, 하아, 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「最初は先端を入るだけでもあんなに苦労していたのに……はぁ……慣れるものなのですね」"
translation = "「처음에는 끝부분을 넣는 것만으로도 그렇게 고생했었는데…… 하아…… 익숙해지는 것이군요」"

[[dialogue]]
speaker = "unk"
original = "シャロンの言う通り、アナルはすっかり俺のペニスを受け入れるようになっていた。"
translation = "샤론의 말대로, 애널은 완전히 내 페니스를 받아들이게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "やがてペニスの大半がシャロンの中に入り、根元まで飲み込まれる。"
translation = "이윽고 페니스의 대부분이 샤론의 안으로 들어가, 뿌리까지 삼켜진다."

[[dialogue]]
speaker = "シャロン"
original = "「んん……<emoji=heart04>\u3000はあぁ……会長さまのおち○ちん、お尻に入ってしまいました……」"
translation = "「응응……<emoji=heart04> 하아아…… 회장님의 자지, 엉덩이에 들어가 버렸어요……」"

[[dialogue]]
speaker = "クロト"
original = "「動くよ」"
translation = "「움직일게」"

[[dialogue]]
speaker = "シャロン"
original = "「はい、シャロンの体を味わってください……<emoji=heart04>」"
translation = "「네, 샤론의 몸을 맛봐 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「ふあぁ、はぁ<emoji=heart04>\u3000あっ……はっ……お尻が……あぁん<emoji=heart04>」"
translation = "「후아아, 하아<emoji=heart04> 앗…… 학…… 엉덩이가…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまが、私の中で、動いて……ふぁ……おち○ちん、熱いぃ……ん～～っ<emoji=heart04>」"
translation = "「회장님이, 제 안에서, 움직여서…… 화아…… 자지, 뜨거워어…… 음~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "引いて、押して、ゆっくりとシャロンの中でペニスを前後させる。"
translation = "당기고, 밀며, 천천히 샤론의 안에서 페니스를 전후로 움직인다."

[[dialogue]]
speaker = "シャロン"
original = "「ふっ……んんっ……はぁ……あんっ<emoji=heart04>\u3000お尻、擦れて……ふぁ、はぁんっ<emoji=heart04>」"
translation = "「훗…… 음음…… 하아…… 안앗<emoji=heart04> 엉덩이, 쓸려서…… 화아, 하앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの動きに合わせて艶めかしい声を漏らすシャロン。"
translation = "페니스의 움직임에 맞춰 요염한 목소리를 흘리는 샤론."

[[dialogue]]
speaker = "unk"
original = "その度に豊満な肉体が震え、男の本能を刺激する。"
translation = "그때마다 풍만한 육체가 떨리며, 남자의 본능을 자극한다."

[[dialogue]]
speaker = "クロト"
original = "「痛くないか？」"
translation = "「아프지 않아?」"

[[dialogue]]
speaker = "シャロン"
original = "「はい、今はもう……ふ……はあぁ<emoji=heart04>\u3000何度も、おち○ちん入れましたから……<emoji=heart04>」"
translation = "「네, 이제는…… 후…… 하아아<emoji=heart04> 몇 번이나, 자지 넣었으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの形に広がったお尻の穴がいやらしい。"
translation = "페니스의 모양대로 벌어진 항문이 음란하다."

[[dialogue]]
speaker = "unk"
original = "お尻は本来ペニスを受け入れるためのものではないが、そんな歪なつながり方だからこそ興奮が増す。"
translation = "엉덩이는 본래 페니스를 받아들이기 위한 것이 아니지만, 그런 뒤틀린 연결 방식이기에 더욱 흥분이 고조된다."

[[dialogue]]
speaker = "シャロン"
original = "「んっ、はっ、あんっ<emoji=heart04>\u3000おち○ちん、全部入ってきて……お尻の中まで、会長さまのおち○ちんの形になってます……っ<emoji=heart04>」"
translation = "「응, 학, 안앗<emoji=heart04> 자지, 전부 들어와서…… 엉덩이 속까지, 회장님의 자지 모양이 되어버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「私のお尻が、会長さまのおち○ちんを気持ち良くするための穴に……ひぁ、はあぁ<emoji=heart04>」"
translation = "「제 엉덩이가, 회장님의 자지를 기분 좋게 하기 위한 구멍이…… 히아, 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そんなこと言われると、まるでオナホみたいだな」"
translation = "「그런 말을 들으니, 마치 오나홀 같네」"

[[dialogue]]
speaker = "シャロン"
original = "「おなほ……？」"
translation = "「오나홀……?」"

[[dialogue]]
speaker = "unk"
original = "少し呆けたシャロンに、世の中には男が自慰のために使う器具もあるのだと説明する。"
translation = "조금 멍해진 샤론에게, 세상에는 남자가 자위하기 위해 사용하는 기구도 있다고 설명한다."

[[dialogue]]
speaker = "シャロン"
original = "「そのようなものもあるのですか……！？\u3000世界は広いですね……」"
translation = "「그런 것도 있는 건가요……!? 세상은 넓군요……」"

[[dialogue]]
speaker = "シャロン"
original = "「確かに今の私は、会長さまを気持ちよくして差し上げることが使命です。だから私のお尻を、会長さまのオナホにしてください……！」"
translation = "「확실히 지금의 저는, 회장님을 기분 좋게 해드리는 것이 사명입니다. 그러니 제 엉덩이를, 회장님의 오나홀로 삼아주세요……!」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "言わせてしまった。"
translation = "말하게 만들고 말았다."

[[dialogue]]
speaker = "unk"
original = "聖なる神に身を捧げたはずのシスターが、俺の玩具になると宣言した。"
translation = "성스러운 신에게 몸을 바쳤을 터인 시스터가, 나의 장난감이 되겠다고 선언했다."

[[dialogue]]
speaker = "unk"
original = "背徳の快感に、ゾクリと体に震えが来る。"
translation = "배덕의 쾌감에, 몸에 소름이 돋으며 떨림이 온다."

[[dialogue]]
speaker = "シャロン"
original = "「んんっ<emoji=heart04>\u3000中で、おち○ちんビクンって……あっ、はっ、お尻が……はあぁっ<emoji=heart04>」"
translation = "「음응<emoji=heart04> 안에서, 자지가 움찔거려서…… 앗, 학, 엉덩이가…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「少しいきんでみてくれ」"
translation = "「조금 힘을 줘 봐」"

[[dialogue]]
speaker = "シャロン"
original = "「は、はい……んんっ」"
translation = "「네, 네…… 음응」"

[[dialogue]]
speaker = "unk"
original = "シャロンが下半身に力を込めると、ペニスがぎゅっと絞られた。"
translation = "샤론이 하반신에 힘을 주자, 페니스가 꽉 조여졌다."

[[dialogue]]
speaker = "シャロン"
original = "「あ──中で、おち○ちんの形、わかって……はあぁんっ<emoji=heart04>」"
translation = "「아── 안에서, 자지 모양, 느껴져서…… 하아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
original = "「おち○ちん、太くて、大きい──ふああっ<emoji=heart04>\u3000はぁ、はぁ、あ……ふっ、ああぁっ<emoji=heart04>」"
translation = "「자지, 굵고, 커요── 후아앗<emoji=heart04> 하아, 하아, 아…… 훗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "狭くなったお尻の中でペニスを動かすと、摩擦と圧迫が快感になって押し寄せてくる。"
translation = "좁아진 엉덩이 안에서 페니스를 움직이면, 마찰과 압박이 쾌감이 되어 밀려온다."

[[dialogue]]
speaker = "シャロン"
original = "「あっ、あん<emoji=heart04>\u3000シャロンのお尻は気持ちいいですか？\u3000んんっ<emoji=heart04>\u3000会長さまのオナホになれていますか？」"
translation = "「앗, 안<emoji=heart04> 샤론의 엉덩이는 기분 좋나요? 음응<emoji=heart04> 회장님의 오나홀이 되어 있나요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、すごく気持ちいいよ」"
translation = "「아아, 정말 기분 좋아」"

[[dialogue]]
speaker = "unk"
original = "とんでもない言い方になってしまっているけど、俺を気遣ってくれるシャロンがいじらしい。"
translation = "말도 안 되는 표현이 되어버렸지만, 나를 배려해 주는 샤론이 기특하다."

[[dialogue]]
speaker = "unk"
original = "だけど快感を得ているのは俺だけじゃなくて……"
translation = "하지만 쾌감을 얻고 있는 건 나뿐만이 아니라……"

[[dialogue]]
speaker = "クロト"
original = "「シャロンは気持ちいい？」"
translation = "「샤론은 기분 좋아?」"

[[dialogue]]
speaker = "シャロン"
original = "「なっ！？\u3000わ、私は気持ちよくなんてありません……！\u3000私はシスター、お尻で快感を得るなど、あってはいけませ──ふぁああっ<emoji=heart04>」"
translation = "「낫!? 저, 저는 기분 좋지 않아요……! 저는 시스터, 엉덩이로 쾌감을 얻다니, 있을 수 없── 후아아앗<emoji=heart04>」"

[[dialogue]]
