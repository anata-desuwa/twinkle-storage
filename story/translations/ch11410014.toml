[[dialogue]]
speaker = "unk"
original = "第４話,事件解決？,P"
translation = "제4화, 사건 해결?, P"

[[dialogue]]
speaker = "unk"
original = "食事を済ませた後、人探しを再開する俺たち。"
translation = "식사를 마친 후 사람 찾기를 재개하는 우리들."

[[dialogue]]
speaker = "unk"
original = "しかし、目撃情報はあれど空振りばかりで、時間ばかりが無駄に過ぎ去ってしまっていた。"
translation = "하지만 목격 정보는 있어도 허탕만 칠 뿐, 시간만 헛되이 흘러가고 있었다."

[[dialogue]]
speaker = "unk"
original = "次第に有力な情報もなくなり、ついにその足取りは完全に途絶えてしまう。"
translation = "차츰 유력한 정보도 사라지고 마침내 그 발자취는 완전히 끊기고 만다."

[[dialogue]]
speaker = "unk"
original = "と、困り果てていたところに、意外な相手からの連絡が入った。"
translation = "그렇게 곤란해하고 있던 차에 뜻밖의 상대에게서 연락이 왔다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『実はですね～、異世界から来たと思われる魔法使い？\u3000をネビュラで保護してるんですよ！』"
translation = "『실은 말이죠~, 이세계에서 온 것으로 보이는 마법사? 를 네뷸라에서 보호하고 있어요!』"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "『これって多分、センパイたちが掲示板で捜してる人じゃないかなーって思って連絡をしてみたわけです♪\u3000どうです、助かっちゃいますか？』"
translation = "『이거 아마 선배들이 게시판에서 찾고 있는 사람이 아닐까~ 싶어서 연락해 본 거랍니다♪ 어때요, 도움 좀 되나요?』"

[[dialogue]]
speaker = "unk"
original = "ネビュラの基地に向かうと、そこには捜していた女性──ノルトハウゼンさんが待っていた。"
translation = "네뷸라 기지로 향하자 그곳에는 찾고 있던 여성── 노르트하우젠 씨가 기다리고 있었다."

[[dialogue]]
speaker = "unk"
original = "無事に彼女を保護できたことに安堵しつつも、星徒会室に戻ったころにはすっかり夕方になっていた。"
translation = "무사히 그녀를 보호한 것에 안도하면서도 성도회실로 돌아왔을 때는 이미 저녁이 되어 있었다."

[[dialogue]]
speaker_original = "ベア子"
speaker_translation = "베아코"
original = "「無事に見つかったみたいですね。よかったくま……」"
translation = "「무사히 찾은 모양이네요. 다행이다곰……」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「まったく、待たせ過ぎくま！\u3000急いで次の世界に向かうくま！」"
translation = "「정말이지, 너무 기다리게 했다곰! 서둘러 다음 세계로 향하겠다곰!」"

[[dialogue]]
speaker = "unk"
original = "ベア子と黒ベア子は早速、ノルトハウゼンさんを連れて次の世界へ向かおうとする。"
translation = "베아코와 흑베아코는 곧장 노르트하우젠 씨를 데리고 다음 세계로 향하려 한다."

[[dialogue]]
speaker = "unk"
original = "それにフィオナも望んで同行することになった。"
translation = "거기에 피오나도 원해서 동행하게 되었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「まったくとんだ騒ぎに巻き込まれてしまったけれど、これでようやくお役御免といったところね」"
translation = "「정말이지 엉뚱한 소동에 휘말려 버렸지만 이걸로 겨우 소임은 다한 셈이네」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「後は、いつになるか分からないけれど、ルルゥがゲシュペンス島に無事に戻るのを見届けることくらいかしら」"
translation = "「남은 건 언제가 될지 모르겠지만 루루가 게슈펜스 섬으로 무사히 돌아가는 걸 지켜보는 것 정도일까」"

[[dialogue]]
speaker = "unk"
original = "大丈夫かな？"
translation = "괜찮을까?"

[[dialogue]]
speaker = "unk"
original = "約束は破らないとは言ってたけど"
translation = "약속은 어기지 않겠다고 하긴 했지만"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「黒い方はともかく、もう１人の方はそこそこ話の通じる相手だったし、大丈夫だとは思うわ」"
translation = "「검은 쪽은 몰라도 다른 한쪽은 그럭저럭 말이 통하는 상대였으니 괜찮을 거라 생각한단다」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それに、もしも約束を破るようなことがあれば、どういう目に遭うか……この鉄球で分からせに行くだけよ」"
translation = "「게다가 만약 약속을 어기는 일이 생긴다면 어떤 꼴을 당하게 될지…… 이 철구로 깨닫게 해주러 갈 뿐이야」"

[[dialogue]]
speaker = "unk"
original = "日々のトレーニングを思い出し、なぜか俺の背筋まで寒くなる。"
translation = "매일의 트레이닝을 떠올리니 왠지 내 등골까지 서늘해진다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「とはいえ、すぐに帰れるという状況では無さそうね」"
translation = "「그렇긴 해도 당장 돌아갈 수 있는 상황은 아닌 것 같네」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それまでルルゥは私が面倒を見るわ。今日から新星寮の私の部屋で生活なさい」"
translation = "「그때까지 루루는 내가 돌봐주마. 오늘부터 신성 기숙사의 내 방에서 생활하렴」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「マムさんのお部屋に泊めてもらえる、なの……？」"
translation = "「마무 씨 방에서 묵게 해주는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "ルルゥはそれでいい？"
translation = "루루는 그걸로 괜찮아?"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「嬉しい、なの♪」"
translation = "「기쁜 거야♪」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「マムさんとお別れするのは寂しかった、なの！\u3000ゲシュペンス島に戻るまでの間、ずっとマムさんと一緒にいるの♪」"
translation = "「마무 씨랑 헤어지는 건 외로웠던 거야! 게슈펜스 섬으로 돌아가기 전까지 계속 마무 씨랑 같이 있을 거야♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふっ、仕方がないわね。少しだけなら甘えさせてあげてもいいわ」"
translation = "「훗, 어쩔 수 없구나. 조금 정도라면 응석을 받아줘도 좋겠지」"

[[dialogue]]
speaker = "unk"
original = "実はルルゥに魅了されてる？"
translation = "사실 루루에게 매료된 거 아냐?"

[[dialogue]]
speaker = "unk"
original = "マム、もしかして……"
translation = "마무, 혹시……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私の強靭な精神力を侮ってもらっては困るわね。魅了の力は発動しているようだけど、影響などされていないわ」"
translation = "「내 강인한 정신력을 얕보면 곤란하단다. 매료의 힘은 발동하고 있는 모양이다만 영향 따위 받지 않아」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ルルゥは私に畏怖するあまり流星市国まで付いて来てしまったわ。彼女の面倒を見るのは、私にその責任があるからよ。その辺り勘違いしないで頂戴」"
translation = "「루루는 나를 경외한 나머지 유성시국까지 따라와 버렸어. 그녀를 돌보는 건 나에게 그 책임이 있기 때문이야. 그 점 착각하지 말아주렴」"

[[dialogue]]
speaker = "unk"
original = "イ、イエス・マム……"
translation = "예, 예스 마무……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ところで──」"
translation = "「그건 그렇고──」"

[[dialogue]]
speaker = "unk"
original = "（あ……嫌な予感……）"
translation = "(아…… 불길한 예감……)"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「簡単に魅了の力に惑わされてしまう会長の精神を鍛え直してあげる、そういう約束だったわね」"
translation = "「쉽게 매료의 힘에 현혹되어 버리는 회장의 정신을 단련해 주겠다, 그런 약속이었지」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「寮の門限までまだ時間があるわ。みっちり鍛えてあげるから覚悟しなさい」"
translation = "「기숙사 통금 시간까지 아직 시간이 있구나. 아주 톡톡히 단련해 줄 테니 각오하렴」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「これから会長さんの特訓が始まる、なの？」"
translation = "「이제부터 회장님의 특훈이 시작되는 거야?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ええ、あなたにも少し手伝ってもらうわ」"
translation = "「그래, 너도 조금 도와주렴」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「わかったなの！\u3000ルルゥ、頑張るの！」"
translation = "「알겠는 거야! 루루, 힘낼 거야!」"

[[dialogue]]
speaker = "unk"
original = "マムにお願いされて、ルルゥもすっかりやる気になってしまっている。"
translation = "마무의 부탁을 받고 루루도 완전히 의욕이 넘쳐버렸다."

[[dialogue]]
speaker = "unk"
original = "赤ちゃんクマロボのパパ捜し事件は一旦の幕を引いたようだが、比較にならないほど大きな試練が俺の前に立ちはだかっていたのだった。"
translation = "아기 곰 로봇의 아빠 찾기 사건은 일단락된 듯하지만, 비교도 안 될 만큼 큰 시련이 내 앞에 가로막혀 있었다."

