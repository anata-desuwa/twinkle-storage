[[dialogue]]
speaker = "unk"
original = "第１話,錬金術師の弟子です、ぶい,P"
translation = "제1화, 연금술사의 제자입니다, 브이, P"

[[dialogue]]
speaker = "unk"
original = "先日のギガンドム事件を経て、晴れて錬金術師・アニマ先輩の弟子と認められたシュティレ。"
translation = "지난번 기간돔 사건을 거쳐, 당당히 연금술사 아니마 선배의 제자로 인정받은 슈틸레."

[[dialogue]]
speaker = "unk"
original = "そんな彼女が、新星学園の星徒会室へとやってきた──"
translation = "그런 그녀가, 신성학원의 성도회실로 찾아왔다──"

[[dialogue]]
speaker = "シュティレ"
original = "「失礼いたします。会長はいらっしゃいますでしょうか？\u3000先日のお礼を改めてお伝えに参りました」"
translation = "「실례하겠습니다. 회장님 계실까요? 지난번의 감사를 다시 전하러 왔습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら？\u3000あなたは確か……」"
translation = "「어라? 당신은 분명……」"

[[dialogue]]
speaker = "シュティレ"
original = "「はい。天才錬金術師、アニマ先輩の一番弟子。閃光のシュティレと申します。ぶい」"
translation = "「네. 천재 연금술사, 아니마 선배의 수제자. 섬광의 슈틸레라고 합니다. 브이.」"

[[dialogue]]
speaker = "マトイ"
original = "「なんかカッコイイ二つ名がついてる！？\u3000ふ、普通じゃない……！！」"
translation = "「뭔가 멋진 이명이 붙어 있어!? 보, 보통이 아냐……!!」"

[[dialogue]]
speaker = "シュティレ"
original = "「先日見たロボットアニメのタイトルを一部拝借して、名乗りに使わせていただきました。ぶいぶい」"
translation = "「지난번에 본 로봇 애니메이션의 타이틀을 일부 차용해서, 자칭으로 사용해 보았습니다. 브이브이.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こうして私と顔を合わせるのは初めてよね。ふっふーん、なかなか面白い女の子みたいじゃない！」"
translation = "「이렇게 나와 얼굴을 맞대는 건 처음이지. 훗후운, 꽤 재미있는 여자아이인 것 같잖아!」"

[[dialogue]]
speaker = "シュティレ"
original = "「はい。常に『おもしれー女』を目指しております。ぶい」"
translation = "「네. 항상 『재미있는 여자』를 목표로 하고 있습니다. 브이.」"

[[dialogue]]
speaker = "マトイ"
original = "「しっかりピースサインも作ってキャラ付けもバッチリ……！\u3000そ、そうかっ、こんな風にアピールすれば普通じゃなくなるんだ……！」"
translation = "「확실하게 피스 사인도 만들고 캐릭터 설정도 완벽……! 그, 그렇구나, 이런 식으로 어필하면 보통이 아니게 되는 거구나……!」"

[[dialogue]]
speaker = "unk"
original = "マトイはすぐ影響を受けるんだから……"
translation = "마토이는 금방 영향을 받는다니까……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「初めまして、私の名前は九浄ヴィーナス！\u3000この新星星徒会のスーパー……いいえ、ウルトラフィクサーよ！！」"
translation = "「처음 뵙겠어, 내 이름은 쿠죠 비너스! 이 신성성도회의 슈퍼…… 아니, 울트라 픽서야!!」"

[[dialogue]]
speaker = "マトイ"
original = "「また肩書きがグレードアップしてる！？\u3000え、ええと、ウルトラ書記の詠野マトイです！」"
translation = "「또 직함이 업그레이드됐어!? 에, 에에또, 울트라 서기인 에이노 마토이입니다!」"

[[dialogue]]
speaker = "シュティレ"
original = "「お二人とも、仔細なご挨拶、恐縮の至り。それにしてもヴィーナス先輩は、フィクサー……？」"
translation = "「두 분 모두, 정중한 인사, 황송할 따름입니다. 그나저나 비너스 선배는, 픽서……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ、フィクサー！」"
translation = "「그래, 픽서!」"

[[dialogue]]
speaker = "シュティレ"
original = "「なんだか『グリッターマン』に出てきそうな肩書きですね。もしやビームを撃つのが得意ではありませんか？」"
translation = "「왠지 『글리터맨』에 나올 법한 직함이네요. 혹시 빔을 쏘는 것이 특기가 아니신지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ！\u3000クロト、この子鋭いわ！\u3000只者じゃないわね！」"
translation = "「앗! 쿠로토, 이 아이 예리해! 보통내기가 아닌걸!」"

[[dialogue]]
speaker = "シュティレ"
original = "「はい。シュティレは只者ではありません。なにせ錬金術師の弟子ですから」"
translation = "「네. 슈틸레는 보통내기가 아닙니다. 무려 연금술사의 제자니까요.」"

[[dialogue]]
speaker = "マトイ"
original = "「前からシュティレちゃんのこと、アナから話だけは聞いてたんだ。ちょうどお茶しようと思ってたところだから、ゆっくりしていってね」"
translation = "「전부터 슈틸레짱에 대해서, 아나한테 이야기만은 들었었어. 마침 차 마시려던 참이니까, 천천히 쉬다 가.」"

[[dialogue]]
speaker = "シュティレ"
original = "「なんと。アポもなく訊ねた私を歓迎してくださるとは」"
translation = "「이럴 수가. 약속도 없이 방문한 저를 환영해 주시다니.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイの作るお菓子は絶品よ！\u3000ほっぺが落ちないように注意することね！」"
translation = "「마토이가 만드는 과자는 일품이야! 뺨이 떨어지지 않게 주의하라구!」"

[[dialogue]]
speaker = "シュティレ"
original = "「承知いたしました。ご相伴に預かります。甘い物は好きです。わくわく」"
translation = "「알겠습니다. 대접받도록 하죠. 단것은 좋아합니다. 두근두근.」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは……普通のマドレーヌだから、過度な期待しないでね……？」"
translation = "「아하하…… 평범한 마들렌이니까, 과도한 기대는 하지 말아 줘……?」"

[[dialogue]]
speaker = "シュティレ"
original = "「市販されていないマドレーヌ、初めて食べました。卵やバターの香りがほのかに残り、口の中で溶ける。まさに<ruby>風味絶佳<rt>ふうみぜっか</rt></ruby>」"
translation = "「시판되지 않는 마들렌, 처음 먹어봤습니다. 계란과 버터의 향이 은은하게 남고, 입안에서 녹는다. 그야말로 풍미절가.」"

[[dialogue]]
speaker = "マトイ"
original = "「経験したことのない語彙で褒められてる……！」"
translation = "「경험해 본 적 없는 어휘로 칭찬받고 있어……!」"

[[dialogue]]
speaker = "シュティレ"
original = "「ご馳走様でした。時に先輩方、不躾なご依頼で恐縮なのですが……シュティレと記念撮影をしていただけませんか？」"
translation = "「잘 먹었습니다. 저기 선배님들, 무례한 부탁이라 송구스럽습니다만…… 슈틸레와 기념 촬영을 해주시지 않겠습니까?」"

[[dialogue]]
speaker = "シュティレ"
original = "「私、お近づきになった方と、自撮りをするのが趣味なのです」"
translation = "「저, 친해진 분과 셀카를 찍는 게 취미거든요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もちろんよ！\u3000ほら、マトイもクロトも！」"
translation = "「물론이지! 자, 마토이도 쿠로토도!」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっと恥ずかしいけど……こ、こうかな？」"
translation = "「조금 부끄럽지만…… 이, 이렇나?」"

[[dialogue]]
speaker = "シュティレ"
original = "「では、カメラタイマー起動です。３、２、１──ぶいっ」"
translation = "「그럼, 카메라 타이머 기동입니다. 3, 2, 1── 브잇.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ぶい！」"
translation = "「브이!」"

[[dialogue]]
speaker = "マトイ"
original = "「ぶ、ぶい……？」"
translation = "「브, 브이……?」"

[[dialogue]]
speaker = "unk"
original = "ぶい！（←もう慣れっこ）"
translation = "브이! (← 이미 익숙해짐)"

[[dialogue]]
speaker = "シュティレ"
original = "「ありがとうございます。ＤＩＳＣに写真、お送りしますね」"
translation = "「감사합니다. DISC로 사진, 보내드릴게요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがと～！\u3000へぇ、綺麗に取れてるじゃない！」"
translation = "「고마워~! 헤에, 예쁘게 잘 찍혔잖아!」"

[[dialogue]]
speaker = "マトイ"
original = "「撮影した後の写真データ、光の強さとか色々と数値をいじってたけど……シュティレちゃんってＤＩＳＣに詳しいの？」"
translation = "「촬영한 뒤에 사진 데이터, 빛의 세기라든가 여러 가지 수치를 만지던데…… 슈틸레 짱은 DISC에 대해서 잘 알아?」"

[[dialogue]]
speaker = "unk"
original = "シュティレは機械系の専門だよ"
translation = "슈틸레는 기계 계열 전문이다."

[[dialogue]]
speaker = "シュティレ"
original = "「はい。錬金術師としては卵ですが、機械いじりは得意です。たっぷりロボットアニメを見ているので」"
translation = "「네. 연금술사로서는 초보지만, 기계 만지는 건 자신 있습니다. 로봇 애니메이션을 잔뜩 보고 있으니까요.」"

[[dialogue]]
speaker = "マトイ"
original = "「それって関係あるのかな……？」"
translation = "「그게 상관이 있는 걸까……?」"

[[dialogue]]
speaker = "シュティレ"
original = "「では会長のＤＩＳＣにも送信を……と、妙ですね。送信エラーが出てしまいます」"
translation = "「그럼 회장님의 DISC에도 송신을…… 어라, 이상하네요. 송신 에러가 떠버려요.」"

[[dialogue]]
speaker = "unk"
original = "最近、ＤＩＳＣの調子が悪いんだ"
translation = "요즘, DISC의 상태가 좋지 않다."

[[dialogue]]
speaker = "シュティレ"
original = "「なんと。でしたら私にお任せください。ドリルやパイルバンカー制作は言うに及ばず、ＤＩＳＣいじりも得意です」"
translation = "「이런. 그렇다면 저에게 맡겨주세요. 드릴이나 파일 벙커 제작은 말할 것도 없고, DISC 만지는 것도 특기입니다.」"

[[dialogue]]
speaker = "シュティレ"
original = "「では失礼して──分解」"
translation = "「그럼 실례해서── 분해.」"

[[dialogue]]
speaker = "マトイ"
original = "「わっ……会長のＤＩＳＣ、あっという間にばらばらになっちゃった……！」"
translation = "「왓…… 회장님의 DISC가 순식간에 조각조각 나버렸어……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「これ、元に戻せるの？\u3000さらに壊しちゃってない？」"
translation = "「이거, 원래대로 돌릴 수 있어? 더 망가뜨린 거 아냐?」"

[[dialogue]]
speaker = "シュティレ"
original = "「そんなことはありません。機械の異常は、分解しなくてはわかりませんから……ああ、なるほど」"
translation = "「그럴 리 없습니다. 기계의 이상은 분해하지 않으면 알 수 없으니까요…… 아아, 그렇군요.」"

[[dialogue]]
speaker = "シュティレ"
original = "「原因がわかりました。部品交換の必要はありませんので、このまま処置します」"
translation = "「원인을 알았습니다. 부품 교체는 필요 없으니, 이대로 처치하겠습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「わー……すごく手際がいいね！」"
translation = "「와아…… 정말 솜씨가 좋네!」"

[[dialogue]]
speaker = "シュティレ"
original = "「よろしければ会長。ついでに機体スペックも上げておきましょうか？\u3000耐衝撃と冷却を兼ねたジェルを仕込んだりなど、小さな改造ですが」"
translation = "「괜찮으시다면 회장님. 하는 김에 기체 스펙도 올려둘까요? 내충격과 냉각을 겸한 젤을 넣는 등, 사소한 개조입니다만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えー、すごいすごい！\u3000私のもやって！」"
translation = "「에─, 대단해 대단해! 내 것도 해줘!」"

[[dialogue]]
speaker = "シュティレ"
original = "「問題ありません。この後、作業します」"
translation = "「문제없습니다. 이 다음에 작업하겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "ちょっぴり表情が硬いところもあるけれど、誰かと喋ったり親切をしたりするのはとても能動的なシュティレ。"
translation = "조금 표정이 딱딱한 면도 있지만, 누군가와 대화하거나 친절을 베푸는 것에는 매우 능동적인 슈틸레."

[[dialogue]]
speaker = "unk"
original = "変わり者だけど優しいアニマ先輩と、似通ったところのある錬金術師の弟子なのだった。"
translation = "괴짜지만 상냥한 아니마 선배와 닮은 구석이 있는 연금술사 제자였다."

[[dialogue]]
speaker = "シュティレ"
original = "「ついでにタップ１つでドリルに変形するモードも搭載しましょう。ドリルはロマンですから」"
translation = "「하는 김에 탭 한 번으로 드릴로 변형하는 모드도 탑재하죠. 드릴은 로망이니까요.」"

[[dialogue]]
speaker = "unk"
original = "待って──！？"
translation = "잠깐──!? 하나."

[[dialogue]]
speaker = "unk"
original = "こういうところも、やっぱりアニマ先輩の弟子だなあと思うのだった……"
translation = "이런 점도 역시 아니마 선배의 제자로구나, 하고 생각하는 것이었다……"

