[[dialogue]]
speaker = "セーラ"
original = "「おっつー。ようやく企画がまとまってきたね」"
translation = "「수고~ 드디어 기획이 정리됐네」"

[[dialogue]]
speaker = "unk"
original = "恒例になりつつあるミーティングを終え、流星学園へと帰ろうとするセーラさん。"
translation = "항례가 되어가는 미팅을 마치고, 유성 학원으로 돌아가려는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "俺はその見送り……なのだが。"
translation = "나는 그 배웅……을 하는 중인데."

[[dialogue]]
speaker = "セーラ"
original = "「ちょっと休憩してっていい？」"
translation = "「잠깐 쉬었다 가도 돼?」"

[[dialogue]]
speaker = "セーラ"
original = "「……誰もいないね」"
translation = "「……아무도 없네」"

[[dialogue]]
speaker = "unk"
original = "人目を盗むように空き教室に身を滑らせると、俺たち二人きり。"
translation = "남의 눈을 피하듯 빈 교실로 몸을 미끄러뜨리자, 우리 둘뿐이었다."

[[dialogue]]
speaker = "unk"
original = "引力に惹かれるように見つめ合い、心臓が高鳴る音が体の奥から響く。"
translation = "인력에 이끌리듯 서로를 바라보고, 심장이 고동치는 소리가 몸속 깊은 곳에서 울려 퍼진다."

[[dialogue]]
speaker = "セーラ"
original = "「ん……んんっ……ちゅるっ、ちゅぱっ…………はぁ、ちゅっ、んっ……んふぅ……ちゅぷっ、ちゅるるっ……」"
translation = "「음…… 응으…… 츄릅, 츄파………… 하아, 츄, 윽…… 응후…… 츄퓻, 츄르르……」"

[[dialogue]]
speaker = "セーラ"
original = "「んっはぁ…………もっと、しよっか？」"
translation = "「응하아………… 더, 할까?」"

[[dialogue]]
speaker = "セーラ"
original = "「じゃーんっ。こっちの方が好きでしょ？\u3000あ、その顔は図星だね～？\u3000戦ってる時見てたの知ってるんだから」"
translation = "「쨔잔. 이쪽을 더 좋아하지? 아, 그 표정 보니 정곡이네~? 싸울 때 훔쳐보던 거 알고 있으니까」"

[[dialogue]]
speaker = "unk"
original = "星騎士の装備に守られていた肌が露わになり、小さく身じろぎするだけで胸がたぷんと揺れる。"
translation = "성기사의 장비에 보호받던 살결이 드러나고, 작게 몸을 뒤척이는 것만으로 가슴이 출렁이며 흔들린다."

[[dialogue]]
speaker = "unk"
original = "大きなおっぱいをほぼ真下から見上げるのは圧巻で、本能的に目を奪われていた。"
translation = "다부진 가슴을 거의 바로 아래에서 올려다보는 것은 압권이라, 본능적으로 눈을 빼앗기고 있었다."

[[dialogue]]
speaker = "セーラ"
original = "「やっぱり男の子っておっぱい好きなんだ～♪\u3000ほら、おち○ちんガチガチになってる」"
translation = "「역시 남자애들은 가슴을 좋아하는구나~♪ 봐, 자지가 딱딱해졌어」"

[[dialogue]]
speaker = "セーラ"
original = "「ああいやいやいや、恥ずかしがらないで、ごめんごめん。茶化して言ったけど……嬉しいから」"
translation = "「아아 아니아니아니, 부끄러워하지 마, 미안 미안. 놀리려고 한 말이지만…… 기쁘니까」"

[[dialogue]]
speaker = "unk"
original = "セーラさんが頬を赤く染めて、手をつなぎながら緊張混じりに微笑む。"
translation = "세라 씨가 뺨을 붉게 물들이고, 손을 잡으며 긴장 섞인 미소를 짓는다."

[[dialogue]]
speaker = "セーラ"
original = "「星徒会長と副会長なのに、教室でいけないことしちゃってるね。バレたら大変だ♪」"
translation = "「성도회장이랑 부회장인데, 교실에서 못된 짓을 하고 있네. 들키면 큰일 나겠다♪」"

[[dialogue]]
speaker = "unk"
original = "でももう止まれない。やめられない。"
translation = "하지만 이제 멈출 수 없다. 그만둘 수 없다."

[[dialogue]]
speaker = "unk"
original = "下半身ははち切れそうに膨らみ、胸は爆発しそうに鼓動していて、セーラさんを求める気持ちが冷めるはずがない。"
translation = "하반신은 터질 듯이 부풀어 오르고, 가슴은 폭발할 듯 고동치고 있어서, 세라 씨를 원하는 마음이 식을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "そしてセーラさんが軽く腰を持ち上げ、亀頭に秘裂を添える。"
translation = "그리고 세라 씨가 가볍게 허리를 들어 올려, 귀두에 비열을 덧댄다."

[[dialogue]]
speaker = "セーラ"
original = "「うちの方がおねーさんだから、リードしてあげるね。……いくよ」"
translation = "「내가 누나니까, 리드해 줄게. ……간다」"

[[dialogue]]
speaker = "セーラ"
original = "「んん～～～っ……」"
translation = "「응으으으윽……」"

[[dialogue]]
speaker = "unk"
original = "セーラさんが腰を落とすと、膣口が亀頭の形に広がり、ペニスがセーラさんの中へ呑み込まれていく。"
translation = "세라 씨가 허리를 내리자, 질구가 귀두 모양으로 벌어지며, 페니스가 세라 씨의 안으로 집어삼켜져 간다."

[[dialogue]]
speaker = "unk"
original = "けれど同時に、何かを突き破る感触があって……"
translation = "하지만 동시에 무언가를 꿰뚫는 감촉이 느껴지고……"

[[dialogue]]
speaker = "セーラ"
original = "「ふっ、はぁ……ビックリした？\u3000うち、実は初めてでさ」"
translation = "「훗, 하아…… 놀랐어? 나, 사실 처음이라서」"

[[dialogue]]
speaker = "セーラ"
original = "「別に大事にとってたワケじゃないんだけど……まぁ、会長さんなら……ううん、最初は会長さんがいいなって」"
translation = "「딱히 소중히 간직했던 건 아니지만…… 뭐, 회장님이라면…… 아니, 처음은 회장님이 좋겠다고 생각했어」"

[[dialogue]]
speaker = "セーラ"
original = "「そんな心配そうな顔しなくても大丈夫。思ってたほど痛くないし」"
translation = "「그렇게 걱정스러운 표정 안 지어도 괜찮아. 생각했던 것만큼 아프지 않으니까」"

[[dialogue]]
speaker = "unk"
original = "セーラさんの性格からして、痛みを我慢しているのは間違いない。"
translation = "세라 씨의 성격상, 통증을 참고 있는 것이 틀림없다."

[[dialogue]]
speaker = "unk"
original = "けれど彼女は気丈に笑っていた。"
translation = "하지만 그녀는 꿋꿋하게 웃고 있었다."

[[dialogue]]
speaker = "セーラ"
original = "「ついで……じゃないけど、キスしよっか？」"
translation = "「하는 김에……는 아니지만, 키스할까?」"

[[dialogue]]
speaker = "unk"
original = "当然断る理由はない。俺だってしたい。"
translation = "당연히 거절할 이유는 없다. 나도 하고 싶다."

[[dialogue]]
speaker = "セーラ"
original = "「んっ……んっちゅ……ちゅっ……ちゅぱっ、ちゅっ、ちゅっ……ちゅるる<emoji=heart04>」"
translation = "「응…… 응츄…… 츄…… 츄파, 츄, 츄…… 츄르르<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最初は唇を触れ合わせる軽いキス。"
translation = "처음에는 입술을 맞대는 가벼운 키스."

[[dialogue]]
speaker = "unk"
original = "だけど次第に熱がこもり、深い口付けに変わっていく。"
translation = "하지만 점차 열기가 서리며, 깊은 입맞춤으로 변해간다."

[[dialogue]]
speaker = "セーラ"
original = "「んちゅっ、ちゅるるっ……じゅるるっ……れるれる<emoji=heart04>\u3000んふぅ……じゅるっ、ちゅぱっ、ちゅぅっ……じゅるっ、じゅるるんっ<emoji=heart04>」"
translation = "「응츄, 츄르르…… 쥬르르…… 레로레로<emoji=heart04> 응후…… 쥬릅, 츄파, 츄우…… 쥬릅, 쥬르른<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「会長、さん……んふっ……れろれろ……ちゅぷっ、ちゅぱっ<emoji=heart04>\u3000ん、はぁ……じゅるっ、じゅるるっ……ぴちゃぺちゃ、れぇろん<emoji=heart04>」"
translation = "「회장, 님…… 응후…… 레로레로…… 츄퓻, 츄파<emoji=heart04> 응, 하아…… 쥬릅, 쥬르르…… 피챠페챠, 레에론<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ぷはっ……へへっ、めちゃくちゃ濃いキスしちった♪\u3000おいしかった？\u3000会長さんのおち○ちん、キスしながらビクビクしてたよ<emoji=heart04>」"
translation = "「푸하…… 헤헤, 엄청 진하게 키스해버렸다♪ 맛있었어? 회장님 자지, 키스하면서 파르르 떨고 있었어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うセーラさんも蜜の量が増していて、俺を受け入れる体勢を整えていた。"
translation = "그렇게 말하는 세라 씨도 애액의 양이 늘어나며, 나를 받아들일 태세를 갖추고 있었다."

[[dialogue]]
speaker = "セーラ"
original = "「どう？\u3000うちのおま○こ、気持ちいい？」"
translation = "「어때? 내 보지, 기분 좋아?」"

[[dialogue]]
speaker = "unk"
original = "そんなの聞かれるまでもない。"
translation = "그런 건 물어볼 필요도 없다."

[[dialogue]]
speaker = "unk"
original = "セーラさんの中は熱くてとろとろで、敏感なペニスが柔らかな膣壁に包まれて甘く痺れるような快感が押し寄せていた。"
translation = "세라 씨의 안은 뜨겁고 걸쭉해서, 민감한 페니스가 부드러운 질벽에 감싸여 달콤하게 저리는 듯한 쾌감이 몰려오고 있었다."

[[dialogue]]
speaker = "セーラ"
original = "「なら良かった。へへへっ、うちの中、もっと感じてね」"
translation = "「그럼 다행이다. 헤헤헤, 내 안, 좀 더 느껴줘」"

[[dialogue]]
speaker = "セーラ"
original = "「ふぁ……はぁ……うちも、会長さんを感じてる……おっきくて、熱くて……あっ、はぁん……<emoji=heart04>」"
translation = "「후아…… 하아…… 나도, 회장님을 느끼고 있어…… 크고, 뜨거워서…… 앗, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "粘膜がひくひくと震えてペニスを刺激する。"
translation = "점막이 파르르 떨리며 페니스를 자극한다."

[[dialogue]]
speaker = "unk"
original = "セーラさんの中でペニスが跳ねて、先走りの汁を吐き出した。"
translation = "세라 씨의 안에서 페니스가 튀어 오르며, 쿠퍼액을 뿜어냈다."

[[dialogue]]
speaker = "セーラ"
original = "「あ……ま～たおち○ちんビクビクしてる♪\u3000もう、ホント元気なんだから」"
translation = "「아…… 또 자지가 파르르 떨고 있어♪ 정말, 참 기운차다니까」"

[[dialogue]]
speaker = "セーラ"
original = "「んん～っ……！\u3000はぁ……あ、ん…………ふ……んんぅ……」"
translation = "「응으으윽……! 하아…… 아, 응………… 후…… 응으으……」"

[[dialogue]]
speaker = "unk"
original = "馴染ませるようにゆっくり腰を上下させるセーラさん。"
translation = "익숙해지려는 듯 천천히 허리를 상하로 움직이는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "やはりまだ痛みが残っているのか、体が動く度、こらえるような声が漏れた。"
translation = "역시 아직 통증이 남아있는지, 몸이 움직일 때마다 견디는 듯한 목소리가 새어 나왔다."

[[dialogue]]
speaker = "セーラ"
original = "「ん……はぁ……おち○ちん、ホントおっきいね……んんっ、ふぁ……あぁんっ……あっ、はんっ……<emoji=heart04>」"
translation = "「응…… 하아…… 자지, 정말 크네…… 응으, 후아…… 아앙…… 앗, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "けれど声に艶めいたものが混じってきて、中からにじむ蜜の量も増してくる。"
translation = "하지만 목소리에 요염한 기운이 섞이기 시작하고, 안에서 배어 나오는 애액의 양도 늘어난다."

[[dialogue]]
speaker = "セーラ"
original = "「ふっ、んっ……はぁ……おち○ちんで、お腹いっぱいになってる……あっ、はんっ……中、擦れてぇっ……んぁ……<emoji=heart04>」"
translation = "「훗, 응…… 하아…… 자지로, 배가 가득 차고 있어…… 앗, 하앙…… 안쪽, 쓸려서어…… 응아……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「はぁ……あ……んん……太いので、うちの中、広がってるぅ……んはぁ、はぁ、ぁんっ……<emoji=heart04>」"
translation = "「하아…… 아…… 응응…… 굵은 걸로, 내 안이, 넓어지고 있어…… 응하아, 하아, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスが摩擦し、下半身を通してセーラさんの中を感じる。"
translation = "노장한 페니스가 마찰하며, 하반신을 통해 세라 씨의 안을 느낀다."

[[dialogue]]
speaker = "unk"
original = "膣壁に並んだ肉ひだがまとわりつき、ゾクゾクと快感で背筋が震えた。"
translation = "질벽에 늘어선 살주름이 휘감겨 오고, 오싹오싹한 쾌감에 등줄기가 떨렸다."

[[dialogue]]
speaker = "セーラ"
original = "「んん……ふぁ、あっ……はっ…………んん、はぁ……<emoji=heart04>」"
translation = "「응응…… 후아, 앗…… 하………… 응응, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "痛みが薄れてきたのか、体を上下させながら艶めかしい吐息を漏らすセーラさん。"
translation = "통증이 가라앉았는지, 몸을 상하로 움직이며 요염한 숨결을 내뱉는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "その大きさと柔らかさを主張するように、おっぱいが重そうに揺れる。"
translation = "그 크기와 부드러움을 주장하듯, 가슴이 무겁게 흔들린다."

[[dialogue]]
speaker = "セーラ"
original = "「ふふ、おっぱいめっちゃ見てる……もう、エッチ<emoji=heart04>」"
translation = "「후후, 가슴 엄청 보고 있네…… 정말, 야해<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ん……はぁ……おっぱい触っていいよ。うちのおっぱいは君のものなんだから。ほらほら、触って？」"
translation = "「응…… 하아…… 가슴 만져도 돼. 내 가슴은 네 것이니까. 자자, 만져봐?」"

[[dialogue]]
speaker = "unk"
original = "見せつけるように胸を揺らすセーラさん。"
translation = "보여주듯이 가슴을 흔드는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "あまりに煽情的な光景に矢も楯もたまらず、空いた手でセーラさんの胸を鷲掴みにした。"
translation = "너무나 선정적인 광경에 참지 못하고, 비어있는 손으로 세라 씨의 가슴을 움켜쥐었다."

[[dialogue]]
speaker = "セーラ"
original = "「ひゃうっ！？\u3000もう～っ、がっつきすぎだって」"
translation = "「히야우!? 정말~ 너무 달려든다니까」"

[[dialogue]]
speaker = "unk"
original = "言葉では窘めつつも、口ぶりと表情は嬉しそうだ。"
translation = "말로는 나무라면서도, 말투와 표정은 기뻐 보인다."

[[dialogue]]
speaker = "unk"
original = "めいっぱい伸ばした指を動かし、手のひらに収まりきらないおっぱいをやわやわと揉みしだく。"
translation = "최대한 뻗은 손가락을 움직여, 손바닥에 다 들어오지 않는 가슴을 말랑말랑하게 주무른다."

[[dialogue]]
speaker = "セーラ"
original = "「んんっ……！\u3000あ……はぁんっ……おっぱいが……ん、ふぅ……<emoji=heart04>」"
translation = "「응으윽……! 아…… 하앙…… 가슴이…… 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きくて、重くて、ふわふわのおっぱい。"
translation = "크고, 무겁고, 폭신폭신한 가슴."

[[dialogue]]
speaker = "unk"
original = "粘膜でペニスを摩擦されながら、その柔らかさを堪能する。"
translation = "점막으로 페니스를 마찰당하며, 그 부드러움을 만끽한다."

[[dialogue]]
speaker = "セーラ"
original = "「ふ、あ、は……あっ、あんっ<emoji=heart04>\u3000おっぱい揉みくちゃにされて、お腹きゅんきゅんしちゃう…………ふっ、んっ……<emoji=heart04>」"
translation = "「후, 아, 하…… 앗, 아앙<emoji=heart04> 가슴이 엉망진창으로 주물러져서, 배 속이 큥큥거려………… 훗, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "胸への刺激に反応するように、膣壁がペニスをきゅっと締め付け、溢れた蜜がお互いの下半身を濡らしている。"
translation = "가슴으로의 자극에 반응하듯, 질벽이 페니스를 꽉 조이고, 넘쳐흐른 애액이 서로의 하반신을 적시고 있다."

[[dialogue]]
speaker = "セーラ"
original = "「んはぁ、はぁ、ん……あ……おち○ちん、またおっきくなってる……もっと激しくてほしい？」"
translation = "「응하아, 하아, 응…… 아…… 자지, 또 커졌어…… 좀 더 격렬하게 해줬으면 좋겠어?」"

[[dialogue]]
speaker = "セーラ"
original = "「ふふっ、してほしいんだ……ならもっと激しくしたげる……<emoji=heart04>」"
translation = "「후훗, 하고 싶구나…… 그럼 좀 더 격렬하게 해줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ふぁああっ……<emoji=heart04>\u3000あっ……んっ……はぁ、はんっ<emoji=heart04>」"
translation = "「후아아앗……<emoji=heart04> 앗…… 응…… 하아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「んんっ……はっ、あっ、あっ……ふぁ、はぁんっ……<emoji=heart04>\u3000いっぱい擦れてるっ……はぁ、はぁっ……<emoji=heart04>」"
translation = "「응으윽…… 핫, 앗, 앗…… 후아, 하앙……<emoji=heart04> 잔뜩 쓸리고 있어…… 하아, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさんのしなやかな肢体が上下する度、膣口がペニスを呑み込んで、吐き出してを繰り返す。"
translation = "세라 씨의 유연한 나신이 상하로 움직일 때마다, 질구가 페니스를 삼키고 뱉어내기를 반복한다."

[[dialogue]]
speaker = "unk"
original = "俺の手から逃れたおっぱいがセーラさんの動きに合わせて跳ねる。"
translation = "내 손에서 벗어난 가슴이 세라 씨의 움직임에 맞춰 튀어 오른다."

[[dialogue]]
speaker = "セーラ"
original = "「ふっ……はっ……はっ、あぁんっ……これ、気持ちいい？」"
translation = "「훗…… 핫…… 핫, 아앙…… 이거, 기분 좋아?」"

[[dialogue]]
speaker = "セーラ"
original = "「って、聞くまでもないよね。ふぁっ、はぁ……あ……すっごく気持ち良さそうな顔してる……かわいい<emoji=heart04>」"
translation = "「라니, 물어볼 필요도 없겠네. 후앗, 하아…… 아…… 엄청 기분 좋아 보이는 표정 하고 있어…… 귀여워<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「でも多分、うちもそんな顔してる……うちもこれ好きぃ……ふっ、はっ……あっ、あんっ<emoji=heart04>」"
translation = "「하지만 아마, 나도 그런 표정일 거야…… 나도 이거 좋아아…… 훗, 핫…… 앗, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "教室に漂う愛液の匂い。ぐちゅぐちゅと響く粘液の卑猥な音。"
translation = "교실에 감도는 애액의 냄새. 구츄구츄 울려 퍼지는 점액의 비외한 소리."

[[dialogue]]
speaker = "unk"
original = "興奮と快楽が加速し、俺たちは繋がり合うのに夢中になっていた。"
translation = "흥분과 쾌락이 가속되어, 우리는 서로 이어지는 것에 열중하고 있었다."

[[dialogue]]
speaker = "セーラ"
original = "「んはぁ、はっ、ぁん……おち○ちんもっと欲しい……<emoji=heart04>\u3000んっ、ふっ……もっとぉ……はぁ、はぁ……んぅ～っ<emoji=heart04>」"
translation = "「응하아, 핫, 아앙…… 자지 더 갖고 싶어……<emoji=heart04> 응, 훗…… 더어…… 하아, 하아…… 응으~윽<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「おま○こ、熱いの……はぁっ、はぁっ……はぁ、ふっ、んんっ…………はぁっ、あっ、あんっ……<emoji=heart04>」"
translation = "「보지, 뜨거워…… 하앗, 하앗…… 하아, 훗, 응응………… 하앗, 앗, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「はあぁっ……はっ、はっ、あんっ……<emoji=heart04>\u3000お腹の中こすれて、どんどん気持ち良くなってるっ……あっ、はっ、あぁっ……<emoji=heart04>」"
translation = "「하아앗…… 핫, 핫, 아앙……<emoji=heart04> 배 속이 쓸려서, 점점 기분 좋아지고 있어…… 앗, 핫, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの感触を味わうように腰を揺らすセーラさん。"
translation = "페니스의 감촉을 맛보듯 허리를 흔드는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "セーラさんが勢いよく腰を沈めると、ペニスの先端が一番奥に届く。"
translation = "세라 씨가 기세 좋게 허리를 가라앉히자, 페니스의 끝이 가장 깊은 곳에 닿는다."

[[dialogue]]
speaker = "セーラ"
original = "「んんーーーっ！？」"
translation = "「응으으으윽!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、亀頭の先端に走った刺激と快感。"
translation = "그 순간, 귀두 끝에 달린 자극과 쾌감."

[[dialogue]]
speaker = "unk"
original = "強烈すぎるシグナルに一瞬気が遠のいた。"
translation = "강렬한 신호에 순간 정신이 아득해졌다."

[[dialogue]]
speaker = "セーラ"
original = "「はぁ、はぁ……今の、わかった……？\u3000今おち○ちんが当たったのが多分うちの子宮。赤ちゃんの部屋」"
translation = "「하아, 하아…… 방금 거, 알았어……? 지금 자지가 닿은 게 아마 내 자궁. 아기 방이야」"

[[dialogue]]
speaker = "セーラ"
original = "「はぁっ、はぁっ、はんっ……<emoji=heart04>\u3000ふはぁっ、あっ、はっ……知ってるでしょ、ここに精子出すと君の赤ちゃんできるの」"
translation = "「하앗, 하앗, 하앙……<emoji=heart04> 후하앗, 앗, 핫…… 알고 있지, 여기에 정액 내보내면 너의 아기가 생기는 거」"

[[dialogue]]
speaker = "unk"
original = "セーラさんの一番奥――子を授かり育む場所に届いたことが、たまらなく俺を燃え上がらせる。"
translation = "세라 씨의 가장 깊은 곳――아이를 점지받고 키우는 장소에 닿았다는 사실이, 견딜 수 없이 나를 불타오르게 한다."

[[dialogue]]
speaker = "unk"
original = "愛しい人を満たすことを想像し、体の奥から熱がこみ上げてくる。"
translation = "사랑스러운 사람을 채우는 것을 상상하며, 몸속 깊은 곳에서 열기가 치밀어 오른다."

[[dialogue]]
speaker = "セーラ"
original = "「ふぁあああっ……<emoji=heart04>\u3000おち○ちん、めっちゃビクビクしてるっ………<emoji=heart04>」"
translation = "「후아아앗……<emoji=heart04> 자지, 엄청 파르르 떨고 있어………<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「はぁ……はっ、はっ……いいよ、男の子って気持ち良くなったら精子出るんだよね……はっ、んんっ……出していいよ……うちのおま○こにビューって出していいよ<emoji=heart04>」"
translation = "「하아…… 핫, 핫…… 괜찮아, 남자애들은 기분 좋아지면 정액 나오잖아…… 핫, 응응…… 내보내도 돼…… 내 보지에 뷰우우하고 내보내도 돼<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「うちも君の精子ほしいから……んはっ、あっ、あ……うちの奥に君の、ちょうだいっ……<emoji=heart04>」"
translation = "「나도 네 정액 갖고 싶으니까…… 응핫, 앗, 아…… 내 깊은 곳에 네 거, 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「んんぁああ～～っ<emoji=heart04>」"
translation = "「응으아아아아~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最後のスパートをかけ、体を激しく振り乱すセーラさん。"
translation = "마지막 스퍼트를 내며, 몸을 격렬하게 휘두르는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "俺も無理やり腰を使ってペニスを突き立てる。"
translation = "나도 억지로 허리를 써서 페니스를 쳐올린다."

[[dialogue]]
speaker = "セーラ"
original = "「ひあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000下から突かれてっ……うちの奥、ズンズンされてるっ……<emoji=heart04>\u3000ふぁああっ、あっ、はぁっ……<emoji=heart04>」"
translation = "「히아앗<emoji=heart04> 아앙<emoji=heart04> 아앙<emoji=heart04> 밑에서 찔려서…… 내 깊은 곳, 즈음즈음 당하고 있어……<emoji=heart04> 후아아앗, 앗, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「奥に当たるの、すごいっ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はっ、あんっ<emoji=heart04>\u3000子宮にコツコツ当たって、気持ちいいっ……はぁ、はっ……んん～～っ<emoji=heart04>」"
translation = "「깊은 곳에 닿는 거, 굉장해……<emoji=heart04> 응윽<emoji=heart04> 핫, 아앙<emoji=heart04> 자궁에 콕콕 닿아서, 기분 좋아…… 하아, 핫…… 응으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮口にぶつかった瞬間、豊かな胸がさらに大きく揺れる。"
translation = "귀두가 자궁구에 부딪히는 순간, 풍만한 가슴이 더욱 크게 흔들린다."

[[dialogue]]
speaker = "セーラ"
original = "「会長さんのおち○ちん、好きっ……気持ちいいっ……ふぁっ、はぁんっ<emoji=heart04>\u3000んっ、あっ、ああぁっ……<emoji=heart04>」"
translation = "「회장님 자지, 좋아…… 기분 좋아…… 후앗, 하앙<emoji=heart04> 응, 앗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「んんっ<emoji=heart04>\u3000はぁっ、あぁっ……<emoji=heart04>\u3000あんっ……あんっ……あんっ<emoji=heart04>\u3000こんなのクセになるっ……忘れられなくなっちゃうっ……<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하앗, 아아앗……<emoji=heart04> 아앙…… 아앙…… 아앙<emoji=heart04> 이런 거 버릇되겠어…… 잊을 수 없게 돼버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精寸前の亀頭は敏感なんてレベルじゃなく、奥に衝突する度に意識が飛びそうだ。"
translation = "사정 직전의 귀두는 민감하다는 수준이 아니라서, 깊은 곳에 충돌할 때마다 의식이 날아갈 것 같다."

[[dialogue]]
speaker = "unk"
original = "熱く滾った精が尿道を昇って今か今かと放出を待ちわびる。"
translation = "뜨겁게 끓어오른 정이 요도를 타고 올라와 지금이나 저금이나 방출을 기다린다."

[[dialogue]]
speaker = "セーラ"
original = "「おま○こ、熱いぃっ……おち○ちん、ズボズボ入ってきてっ……ふあぁっ、はっ……はぁんっ……<emoji=heart04>」"
translation = "「보지, 뜨거워어…… 자지, 즈보즈보 들어와서…… 후아앗, 핫…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ふあぁっ、あっ、あんっ……<emoji=heart04>\u3000はぁっ……はっ、はっ、はんっ<emoji=heart04>\u3000気持ち、よすぎっ……おち○ちん大好きになるぅっ……<emoji=heart04>」"
translation = "「후아앗, 앗, 아앙……<emoji=heart04> 하앗…… 핫, 핫, 하앙<emoji=heart04> 기분, 너무 좋아…… 자지 너무 좋아하게 돼버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内は大量の蜜で溢れ、溶けてしまいそうなほど。"
translation = "질 내는 대량의 애액으로 넘쳐나, 녹아버릴 것만 같다."

[[dialogue]]
speaker = "unk"
original = "愛液をまとった肉のひだでパンパンに膨れたペニスを舐め回され、血が沸騰してしまいそうだ。"
translation = "애액을 머금은 살주름으로 팽팽하게 부푼 페니스를 핥아 돌려져, 피가 비등해버릴 것 같다."

[[dialogue]]
speaker = "セーラ"
original = "「会長さんのせーし、欲しい……欲しいよぉっ……<emoji=heart04>\u3000出して……あっついせーえき、ビューってうちの奥に出してぇっ<emoji=heart04>」"
translation = "「회장님 정액, 갖고 싶어…… 갖고 싶어어……<emoji=heart04> 내보내줘…… 뜨거운 정액, 뷰우우하고 내 깊은 곳에 내보내줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰の奥がドクドクと跳ね、ひとりでに絶頂までのカウントダウンが始まる。"
translation = "허리 깊은 곳이 두근두근 뛰며, 저절로 절정까지의 카운트다운이 시작된다."

[[dialogue]]
speaker = "unk"
original = "持ってあと数秒――なのに。"
translation = "버텨봐야 앞으로 몇 초――인데."

[[dialogue]]
speaker = "セーラ"
original = "「うちの、中にっ……はっ、あっ……あっ、あぁっ……<emoji=heart04>\u3000はぁっ、はぁっ、はっ……ん～～っ<emoji=heart04>」"
translation = "「내, 안에…… 핫, 앗…… 앗, 아아앗……<emoji=heart04> 하앗, 하앗, 핫…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セーラさんが腰を深く沈めてきて、その瞬間にカウントダウンが０になった。"
translation = "세라 씨가 허리를 깊게 가라앉혀 왔고, 그 순간 카운트다운이 0이 되었다."

[[dialogue]]
speaker = "セーラ"
original = "「あ──んんぁあああぁあ～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아── 응으아아아아아아아~~~~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口に亀頭が届き、セーラさんの奥に情欲を叩きつける。"
translation = "자궁구에 귀두가 닿아, 세라 씨의 깊은 곳에 정욕을 때려 박는다."

[[dialogue]]
speaker = "セーラ"
original = "「んんんっ……はぁんっ……<emoji=heart04>\u3000中でおち○ちん、ビクビクしてっ、熱いの出てるぅっ…………ぅあっ、はぁっ……<emoji=heart04>」"
translation = "「응으으윽…… 하앙……<emoji=heart04> 안에서 자지, 파르르 떨면서, 뜨거운 게 나오고 있어………… 우앗, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「ドクドクって、奥にっ……んんっ……<emoji=heart04>\u3000はぁ、はぁっ……せーし、入ってきてるっ……<emoji=heart04>」"
translation = "「울컥울컥하고, 깊은 곳에…… 응윽……<emoji=heart04> 하아, 하앗…… 정액, 들어오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の手をぎゅっと握り、震えながら嬌声を上げるセーラさん。"
translation = "내 손을 꽉 잡고, 떨면서 교성을 지르는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "膣がペニスを全て呑み込み、とろとろの粘膜が精を搾り取ろうと強く締め付ける。"
translation = "질이 페니스를 전부 집어삼키고, 걸쭉한 점막이 정을 짜내려는 듯 강하게 조인다."

[[dialogue]]
speaker = "セーラ"
original = "「んんんっ、はぁんっ……はぁっ、はぁっ……ぁっ……<emoji=heart04>\u3000お腹の奥、あっついっ……<emoji=heart04>」"
translation = "「응으으윽, 하앙…… 하앗, 하앗…… 아……<emoji=heart04> 배 속 깊은 곳, 뜨거워……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
original = "「あ……はっ……んんっ<emoji=heart04>\u3000まだ出てっ……んぁっ、あぁっ……あっ、あっ、あっ……あんっ<emoji=heart04>\u3000ふ……ん……んん～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아…… 핫…… 응윽<emoji=heart04> 아직 나오고 있어…… 응아, 아아앗…… 앗, 앗, 앗…… 아앙<emoji=heart04> 후…… 응…… 응으으으윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "魂が抜けるほど長い射精が続く。"
translation = "영혼이 빠져나갈 정도로 긴 사정이 이어진다."

[[dialogue]]
speaker = "unk"
original = "けれどセーラさんは亀頭に子宮口を密着させたまま、俺の射精を受け止めていた。"
translation = "하지만 세라 씨는 귀두에 자궁구를 밀착시킨 채, 나의 사정을 받아내고 있었다."

[[dialogue]]
speaker = "セーラ"
original = "「えへへへっ……たくさん出たね……ちょっと溢れちゃってる」"
translation = "「에헤헤헤…… 잔뜩 나왔네…… 좀 흘러넘치고 있어」"

[[dialogue]]
speaker = "unk"
original = "繋がったところから白くどろりとした精液が垂れ落ちる。"
translation = "연결된 곳에서 하얗고 걸쭉한 정액이 흘러 떨어진다."

[[dialogue]]
speaker = "unk"
original = "セーラさんの中にそれだけ大量の精を注いだ証だ。"
translation = "세라 씨의 안에 그만큼 대량의 정을 쏟아부었다는 증거다."

[[dialogue]]
speaker = "セーラ"
original = "「いっぱい出してくれてありがとう。君の気持ち受け取ったよ」"
translation = "「잔뜩 내보내 줘서 고마워. 너의 마음 잘 받았어」"

[[dialogue]]
speaker = "セーラ"
original = "「でも子どもは世界を守って、うちが社長になってからだね。その時は会長さんは社長夫人……じゃなくて社長<ruby>夫君<rt>ふくん</rt></ruby>だね。夫人の反対は夫君って言うんだよ、本で読んだ」"
translation = "「하지만 아이는 세계를 지키고, 내가 사장이 된 다음이야. 그때 회장님은 사장 부인……이 아니라 사장 부군이네. 부인의 반대는 부군이라고 한대, 책에서 읽었어」"

[[dialogue]]
speaker = "セーラ"
original = "「ふぅ～、誰も来なくてよかった。だけど気持ち良すぎて癖になっちゃいそう。うちがしたくなったら、またしてくれる？」"
translation = "「후우~ 아무도 안 와서 다행이다. 하지만 너무 기분 좋아서 버릇될 것 같아. 내가 하고 싶어지면, 또 해줄 거지?」"

[[dialogue]]
speaker = "unk"
original = "無論というか当然というか、むしろ俺がセーラさんを求めすぎないか心配なくらいだ。"
translation = "물론이라기보다 당연하다기보다, 오히려 내가 세라 씨를 너무 원하게 되지 않을까 걱정될 정도다."

[[dialogue]]
speaker = "セーラ"
original = "「オッケー？\u3000それじゃ最後に……ん～……ちゅっ<emoji=heart04>」"
translation = "「오케이? 그럼 마지막으로…… 음~…… 쪽<emoji=heart04>」"

