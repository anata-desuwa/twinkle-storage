[[dialogue]]
speaker = "unk"
original = "第３話,酒酔いトワイライト・中編,P"
translation = "제3화, 술 취한 트와일라잇·중편"

[[dialogue]]
speaker = "unk"
original = "夜のトレーニング中、酔っ払って千鳥足のトワ先生と遭遇した俺は、先生を休ませる為に家まで連れて来たのだった。"
translation = "밤 트레이닝 중 술에 취해 비틀거리는 토와 선생님과 조우한 나는 선생님을 쉬게 하기 위해 집까지 데려왔다."

[[dialogue]]
speaker = "トワ先生"
original = "「お水ありがと～。先生は特異体質なんれぇ、このまま少し休んでれば、酔いもすぐに回復するから～」"
translation = "「물 고마워~. 선생님은 특이체질이라아, 이대로 조금 쉬면 취기도 금방 회복되니까~」"

[[dialogue]]
speaker = "unk"
original = "さっきも特異体質だって言ってましたね"
translation = "아까도 특이체질이라고 하셨죠"

[[dialogue]]
speaker = "トワ先生"
original = "「うん、そうなの～。えっと、簡単に説明するとぉ……」"
translation = "「응, 맞아~. 에또, 간단히 설명하자면……」"

[[dialogue]]
speaker = "トワ先生"
original = "「先生の星力にまつわる話なんらけどぉ……先生は回復が得意なのね？」"
translation = "「선생님의 성력에 얽힌 이야기인데에…… 선생님은 회복이 특기거든?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ただぁその中でも、先生は更に特殊でぇ……瞬間的な回復は普通くらいなんだけど……継続的な回復能力が突出しているのぉ」"
translation = "「다만 그중에서도 선생님은 훨씬 더 특수해서어…… 순간적인 회복은 보통 정도지만 지속적인 회복 능력이 돌출되어 있어어」"

[[dialogue]]
speaker = "トワ先生"
original = "「……で、その影響なのか、先生の体はぁ──」"
translation = "「……그래서 그 영향인지 선생님의 몸은──」"

[[dialogue]]
speaker = "トワ先生"
original = "「勝手にいつも回復し続けててぇ、成長がすご～く遅いんら」"
translation = "「멋대로 항상 계속 회복하고 있어서 성장이 어어엄청 느려어」"

[[dialogue]]
speaker = "unk"
original = "若作りじゃなくて体質だったの！？"
translation = "어린 척하는 게 아니라 체질이었어!?"

[[dialogue]]
speaker = "unk"
original = "先生のロリ体型って……"
translation = "선생님의 로리 체형은……"

[[dialogue]]
speaker = "トワ先生"
original = "「ちょっと言い方ぁ！」"
translation = "「말투가 좀 그래!」"

[[dialogue]]
speaker = "トワ先生"
original = "「もう、会長くんたらぁ。先生、ロリ体型の自覚はかなりあるけどぉ……体の成長が遅くて、本当に若いんらから！」"
translation = "「정말, 회장군도 참. 선생님, 로리 체형이라는 자각은 꽤 있지만…… 몸의 성장이 느려서 정말로 젊은 거니까!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ともかくぅ……アルコールの酔い程度なら、放っておけば勝手に回復して、治っちゃうってわけぇ……」"
translation = "「어쨌든…… 알코올 취기 정도라면 내버려 두면 멋대로 회복해서 나아버린다는 뜻이야아……」"

[[dialogue]]
speaker = "unk"
original = "でも、先生がここまで深酔いするのは……"
translation = "하지만 선생님이 이렇게까지 만취하는 건……"

[[dialogue]]
speaker = "トワ先生"
original = "「ヤケ酒してるみたいだ、って？\u3000……そっか。そんな風に見えたんだ」"
translation = "「홧술 하는 것 같다, 고? ……그렇구나. 그런 식으로 보였구나」"

[[dialogue]]
speaker = "トワ先生"
original = "「……え～とね。その……ここまで酔った、原因なんだけど──」"
translation = "「……에~ 그러니까. 그…… 이렇게까지 취한 원인인데──」"

[[dialogue]]
speaker = "トワ先生"
original = "「実は、元星徒会メンバーで、仲が良かった友達がね……結婚、したの」"
translation = "「사실 전 성도회 멤버이자 사이가 좋았던 친구가 말이야…… 결혼했어」"

[[dialogue]]
speaker = "トワ先生"
original = "「ほら、ここに来る前に……結婚式の３次会から帰ってきたって、話したでしょ？」"
translation = "「봐봐, 여기 오기 전에…… 결혼식 3차에서 돌아왔다고 이야기했지?」"

[[dialogue]]
speaker = "トワ先生"
original = "「それで……な～んか、寂しくなっちゃって。……あ、友達のことはちゃんと祝福してるよ？」"
translation = "「그래서…… 왠지 외로워져서. ……아, 친구는 제대로 축복하고 있어?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ただ、改めて……先生はそういう、青春とは無縁の人生だったなぁって……思っちゃったらけ」"
translation = "「다만 새삼스럽게…… 선생님은 그런 청춘과는 인연이 없는 인생이었구나아 하고…… 생각했을 뿐이야」"

[[dialogue]]
speaker = "トワ先生"
original = "「回復体質で、成長が凄く遅いって話したじゃない？\u3000先生、そのおかげで……今も星力総量が全く衰えてないの。学生時代のままなんだ」"
translation = "「회복 체질이라 성장이 엄청 느리다고 했지? 선생님, 그 덕분에…… 지금도 성력 총량이 전혀 쇠퇴하지 않았어. 학생 시절 그대로야」"

[[dialogue]]
speaker = "トワ先生"
original = "「流星の星徒会だった学生時代は、結局、リクリエの実害は大したことなかったんら……」"
translation = "「유성의 성도회였던 학생 시절은 결국 리크리에의 실질적인 피해는 별거 아니었어어……」"

[[dialogue]]
speaker = "トワ先生"
original = "「でも、世界の終わりが来るかもしれないって、ずっと言われ続けてた……」"
translation = "「하지만 세계의 종말이 올지도 모른다고 계속 들어왔지……」"

[[dialogue]]
speaker = "トワ先生"
original = "「だから学園を卒業した時、わたしはこの体質らったから……星力が衰えて現役を退く友達の分も、頑張らなくちゃって思ったんらよね……」"
translation = "「그래서 학원을 졸업했을 때 나는 이런 체질이었으니까…… 성력이 쇠퇴해서 현역을 은퇴하는 친구들 몫까지 열심히 해야겠다고 생각했어어……」"

[[dialogue]]
speaker = "トワ先生"
original = "「それで、恩師の影響もあったし、いつか来るリクリエ本番に備えて、先生になろうって思ったの……」"
translation = "「그래서 은사님의 영향도 있었고 언젠가 올 리크리에 본방에 대비해서 선생님이 되기로 마음먹었어……」"

[[dialogue]]
speaker = "トワ先生"
original = "「生徒のみんなと一緒に世界を守る為に……わたしは先生になったんら」"
translation = "「학생 여러분과 함께 세계를 지키기 위해…… 나는 선생님이 된 거야아」"

[[dialogue]]
speaker = "トワ先生"
original = "「そのことに後悔は無いし、今の仕事に誇りを持ってるし……生徒のみんなも大好きらよ？」"
translation = "「그 일에 후회는 없고 지금 일에 자부심을 느끼고 있고…… 학생 여러분도 정말 좋아해?」"

[[dialogue]]
speaker = "トワ先生"
original = "「でも……時々、寂しくなる時があるんだぁ……」"
translation = "「하지만…… 가끔 외로워질 때가 있어어……」"

[[dialogue]]
speaker = "トワ先生"
original = "「同級生の友達に彼氏が出来たり……結婚したり……」"
translation = "「동창 친구에게 남자친구가 생기거나…… 결혼하거나……」"

[[dialogue]]
speaker = "トワ先生"
original = "「わたしはこんな体質だし、リクリエに立ち向かうことに全部捧げて来たから……男の人と恋愛する暇なんてなかった……ぐすっ」"
translation = "「나는 이런 체질이고 리크리에에 맞서는 것에 전부를 바쳐왔으니까…… 남자랑 연애할 틈 따위 없었어…… 흑」"

[[dialogue]]
speaker = "unk"
original = "先生、まさか泣いて……！？"
translation = "선생님, 설마 울고 계신……!?"

[[dialogue]]
speaker = "トワ先生"
original = "「……大丈夫、酔ってるだけだから。ぐすっ……そのせいで、ちょっと不安な気持ちに、なっちゃった、だけ……」"
translation = "「……괜찮아, 취했을 뿐이니까. 흑…… 그 때문에 조금 불안한 마음이 든 것뿐이야……」"

[[dialogue]]
speaker = "トワ先生"
original = "「というか、ごめんね……。先生、変なことまで話しちゃった……」"
translation = "「그보다 미안해……. 선생님, 이상한 것까지 말해버렸네……」"

[[dialogue]]
speaker = "トワ先生"
original = "「こんなこと、今リクリエと戦っているキミに、言うべきじゃなかったよね……」"
translation = "「이런 거, 지금 리크리에와 싸우고 있는 너에게 말해서는 안 되는 거였는데……」"

[[dialogue]]
speaker = "unk"
original = "……先生"
translation = "……선생님"

[[dialogue]]
speaker = "トワ先生"
original = "「……うん。なにかな？」"
translation = "「……응. 무슨 일이니?」"

[[dialogue]]
speaker = "unk"
original = "……そうしたら、先生は安心してくれますか？"
translation = "……그렇게 하면, 선생님은 안심해 주실 건가요?"

[[dialogue]]
speaker = "unk"
original = "リクリエは俺が止めます。"
translation = "리크리에는 제가 막겠습니다."

[[dialogue]]
speaker = "トワ先生"
original = "「会長……くん……？」"
translation = "「회장…… 군……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「あれ？\u3000なんでわたし……また涙が……」"
translation = "「어라? 왜 내가…… 또 눈물이……」"

[[dialogue]]
speaker = "トワ先生"
original = "「ごめんっ……えっとえっと……！\u3000なんだろう、嬉しくなったのに、何か急にまた涙が出て来ちゃって……」"
translation = "「미안…… 에또에또……! 뭘까, 기뻐졌는데도, 뭔가 갑자기 또 눈물이 나와 버려서……」"

[[dialogue]]
speaker = "トワ先生"
original = "「……あの……あのね……ごめん。会長くん……」"
translation = "「……저기…… 저기 있잖아…… 미안. 회장 군……」"

[[dialogue]]
speaker = "トワ先生"
original = "「また１つだけ、お願い聞いてもらっても、いい、かな……？」"
translation = "「다시 하나만 더, 부탁 들어줘도, 괜찮을, 까……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「もう少しだけ……キミの胸を、貸してくれる？」"
translation = "「조금만 더…… 네 가슴을, 빌려줄래?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ありがとう……涙が止まるまでの間だけで、いいから……」"
translation = "「고마워…… 눈물이 멈출 때까지만이라도, 좋으니까……」"

[[dialogue]]
speaker = "トワ先生"
original = "「温かくて、凄く安心する……」"
translation = "「따뜻해서, 굉장히 안심돼……」"

[[dialogue]]
speaker = "トワ先生"
original = "「こんなに安心したのは、初めてかも……」"
translation = "「이렇게 안심한 건, 처음일지도……」"

[[dialogue]]
speaker = "トワ先生"
original = "「すぅ……すぅ……。ん……会長……くん……」"
translation = "「스으…… 스으……. 음…… 회장…… 군……」"

[[dialogue]]
speaker = "unk"
original = "やがて泣き疲れたのか、小さな寝息を立てて、トワ先生は眠りについてしまうのだった。"
translation = "이윽고 우느라 지친 것인지, 작은 숨소리를 내며, 토와 선생님은 잠이 들어 버리는 것이었다."

