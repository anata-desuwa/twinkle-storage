[[dialogue]]
speaker = "unk"
original = "第１２話,ルヴィネの演説,B"
translation = "제12화, 루비네의 연설, B"

[[dialogue]]
speaker = "unk"
original = "流星市国において数年ぶりとなる星騎士養成機関──極星学園の開校初日。"
translation = "유성시국에서 수년 만에 열리는 성기사 양성 기관── 극성학원의 개교 첫날."

[[dialogue]]
speaker = "unk"
original = "学園内だけでなく、流星市国内全域に、ルヴィネの声は届けられることになっていた。"
translation = "학원 내뿐만 아니라 유성시국 전역에 루비네의 목소리가 전달되게 되어 있었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "『星騎士のみんな──極星学園への入学、本当におめでとう。私は星徒会長のルヴィネ』"
translation = "『성기사 여러분── 극성학원 입학을 진심으로 축하해. 나는 성도회장 루비네』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『思えば今日まで本当に長かった。私たちの記憶に刻み込まれたあの惨劇の日……』"
translation = "『생각해보면 오늘까지 정말 길었어. 우리의 기억에 새겨진 그 참극의 날……』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『ニュクス流星群の到来によって、この流星市国はその機能のほとんどを失ったわ』"
translation = "『닉스 유성우의 도래로 인해 이 유성시국은 그 기능 대부분을 잃었지』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『市国のシンボルであった流星学園と、新星学園。二校が擁する星騎士も、その尊い命を散らせてしまった』"
translation = "『시국의 상징이었던 유성학원과 신성학원. 두 학교가 보유한 성기사들도 그 고귀한 생명을 잃고 말았어』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『けれど──デネブの人達は諦めなかった。リクリエを跳ねのける、生き延びるという強い意志でここまで来た』"
translation = "『하지만── 데네브 사람들은 포기하지 않았어. 리크리에를 물리치고 살아남겠다는 강한 의지로 여기까지 왔어』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『この極星学園は、デネブの人々の強い意思によって創設されたもの。この学び舎を見るたびに、そのことを思い出して欲しい』"
translation = "『이 극성학원은 데네브 사람들의 강한 의지에 의해 창설된 것. 이 배움터를 볼 때마다 그 사실을 떠올려주길 바라』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『平和のために、世界のために戦う人々がいたからこそ、この学園はここに生まれたのだということを』"
translation = "『평화를 위해, 세계를 위해 싸운 사람들이 있었기에 이 학원이 이곳에 태어난 것이라는 사실을』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『そしてこの学園の扉を叩いた、自分自身を誇って欲しい。あなたたちは騎士よ。自分よりも弱い者を守る使命を抱いた、星の輝きを宿す騎士』"
translation = "『그리고 이 학원의 문을 두드린 자기 자신을 자랑스럽게 여겨줘. 당신들은 기사야. 자신보다 약한 자를 지키는 사명을 품은, 별의 빛을 숙인 기사』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『星力があるから騎士なのではないわ。弱きを助け強きをくじく──その崇高な魂を持つからこそ、あなたたちは騎士なの』"
translation = "『성력이 있기에 기사인 것이 아니야. 약한 자를 돕고 강한 자를 꺾는── 그 숭고한 영혼을 가졌기에 당신들은 기사인 거야』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『己を誇り、己を高め、未来へ向かって突き進んでほしい。それが未熟ながら星徒会長を任された私、天使ルヴィネのささやかな願い──』"
translation = "『자신을 자랑스러워하고, 자신을 높이며, 미래를 향해 매진해주길 바라. 그것이 미숙하지만 성도회장을 맡게 된 나, 천사 루비네의 소박한 소망──』"

[[dialogue]]
speaker = "unk"
original = "極星学園には、かつての学園に存在したアリーナはない。９年前の決戦の折、それは破壊されつくされていた。"
translation = "극성학원에는 과거의 학원에 존재했던 아레나는 없다. 9년 전 결전 때 그것은 완전히 파괴되어 있었다."

[[dialogue]]
speaker = "unk"
original = "グレイスは中庭に佇みながら、ルヴィネの声に耳を澄ませる。"
translation = "그레이스는 안뜰에 서서 루비네의 목소리에 귀를 기울인다."

[[dialogue]]
speaker = "ルヴィネ"
original = "『楽しい学園生活に胸を躍らせている人も多いと思う。けれど１つだけ、どうしても伝えたいことがあるの』"
translation = "『즐거운 학원 생활에 가슴 설레는 사람도 많을 거야. 하지만 한 가지만은 꼭 전하고 싶은 것이 있어』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『平行世界──その存在は以前より、私から伝えていたと思う。女神テルル様より賜ったお言葉よ』"
translation = "『평행세계── 그 존재는 이전부터 내가 전해왔다고 생각해. 여신 테루루 님으로부터 하사받은 말씀이야』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『私たちの世界はデネブ。他にベガと、アルタイルという世界が存在している──』"
translation = "『우리의 세계는 데네브. 그 외에 베가와 알타이르라는 세계가 존재하고 있어──』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『３つの平行世界は、本来あり得ない形。最後には１つにならねばならないと、女神様は仰っている』"
translation = "『세 평행세계는 본래 있을 수 없는 형태. 결국에는 하나가 되어야 한다고 여신님께서는 말씀하셨어』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『ベガはすでに滅びた。残るは、デネブとアルタイル──どちらかが滅ぶまで、不安定な世界は続いてしまう』"
translation = "『베가는 이미 멸망했어. 남은 것은 데네브와 알타이르── 어느 한쪽이 멸망할 때까지 불안정한 세계는 계속되고 말아』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『だから私は……覚悟を決めた。デネブを守るために、アルタイルと戦うと』"
translation = "『그래서 나는…… 각오를 다졌어. 데네브를 지키기 위해 알타이르와 싸우기로』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『アルタイルには、あの卑劣な裏切り者がいる──私たちの世界を捨てて、我が身可愛さに逃げだした偽りの英雄。魔王クロトが』"
translation = "『알타이르에는 그 비열한 배신자가 있어── 우리 세계를 버리고 제 몸 귀한 줄만 알고 도망친 가짜 영웅. 마왕 쿠로토가』"

[[dialogue]]
speaker = "グレイス"
original = "「緋宮……クロト！」"
translation = "「히노미야…… 쿠로토!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "『嫌な名前を聞かせてしまってごめんなさい。けれど、あの男は一度、保身のために世界を捨てた男』"
translation = "『싫은 이름을 들려주어 미안해. 하지만 그 남자는 한때 보신을 위해 세계를 버린 남자』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『いずれ、デネブを滅ぼすために行動を起こすはず』"
translation = "『머지않아 데네브를 멸망시키기 위해 행동을 개시할 거야』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『私たちの敵はモンスターだけではない。平行世界の、魔王が擁する星騎士たちとも戦わなければならない』"
translation = "『우리의 적은 몬스터뿐만이 아니야. 평행세계의 마왕이 거느린 성기사들과도 싸워야만 해』"

[[dialogue]]
speaker = "レティシア"
original = "「市国民の反応を見ていて欲しいってルヴィに言われたけれど……予想どおり。みんな驚いてるわね」"
translation = "「시민들의 반응을 지켜봐 달라고 루비가 부탁했지만…… 예상대로네. 다들 놀라고 있어」"

[[dialogue]]
speaker = "unk"
original = "平行世界は争わねばならない。世界はたった１つにならねばならないというルヴィネの言葉に、デネブ市民に動揺が広がっていく。"
translation = "평행세계는 다투어야만 한다. 세계는 단 하나가 되어야 한다는 루비네의 말에 데네브 시민들 사이에 동요가 퍼져 나간다."

[[dialogue]]
speaker = "ルヴィネ"
original = "『けれど私たちは負けない。デネブは滅びない。あなたたちには、女神がついている』"
translation = "『하지만 우리는 지지 않아. 데네브는 멸망하지 않아. 당신들에게는 여신이 함께하고 있어』"

[[dialogue]]
speaker = "レティシア"
original = "「そして──女神の遣い、ルヴィがいるものね。私たちは負けないわ」"
translation = "「그리고── 여신의 사자, 루비가 있는걸. 우리는 지지 않아」"

[[dialogue]]
speaker = "ルヴィネ"
original = "『デネブは復興を遂げたばかり。失われた技術もたくさんある──けれどアルタイルの後塵を拝すつもりはない』"
translation = "『데네브는 이제 막 부흥을 이뤘을 뿐. 잃어버린 기술도 많아── 하지만 알타이르의 뒤처리를 지켜보고만 있지는 않겠어』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『この放送を聞いているデネブのみんな。隣を見て欲しい。そこには誰がいるかしら？』"
translation = "『이 방송을 듣고 있는 데네브 여러분. 옆을 봐줘. 거기에는 누가 있니?』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『家族か、友達か──きっと愛しい人がいるはずよ。その人を守るために、奮って欲しい』"
translation = "『가족일까, 친구일까── 분명 사랑하는 사람이 있을 거야. 그 사람을 지키기 위해 떨쳐 일어나줘』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『自らの為でなく、愛しい人の未来を守るため……その強い想いが、あなたたちに宿った星の輝きを、さらに輝かせるわ』"
translation = "『자신을 위해서가 아니라 사랑하는 사람의 미래를 지키기 위해…… 그 강한 마음이 당신들에게 깃든 별의 빛을 더욱 빛나게 할 거야』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『どんな過酷な状況でも、１人でなければ乗り越えられる。私たちはそのことを知っている』"
translation = "『어떤 가혹한 상황이라도 혼자가 아니라면 이겨낼 수 있어. 우리는 그 사실을 알고 있어』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『勝ちましょう。生き延びましょう。私たちの大好きな、この世界を守るために……』"
translation = "『이깁시다. 살아남읍시다. 우리가 너무나 사랑하는 이 세계를 지키기 위해……』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『天使ルヴィネは、女神の遣いとして、そして極星学園の星徒会長として──』"
translation = "『천사 루비네는 여신의 사자로서, 그리고 극성학원의 성도회장으로서──』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『これまでに以上に、デネブのために身も心も捧げることを、ここに誓うわ』"
translation = "『지금까지 이상으로 데네브를 위해 몸과 마음을 바칠 것을 이곳에 맹세해』"

[[dialogue]]
speaker = "チナ"
original = "「アタシも誓うよ、ルヴィ。デネブを守るためなら、命なんてくれてやる」"
translation = "「나도 맹세할게, 루비. 데네브를 지키기 위해서라면 목숨이라도 내주겠어」"

[[dialogue]]
speaker = "ルヴィネ"
original = "『──今日は私の話を聴いてくれてありがとう。どうかこの極星学園での生活が、楽しく、満ち足りた日々にならんことを』"
translation = "『──오늘 내 이야기를 들어주어 고마워. 부디 이 극성학원에서의 생활이 즐겁고 충만한 나날이 되기를』"

[[dialogue]]
speaker = "ルヴィネ"
original = "『真面目な話ばかりでは退屈でしょう。この後、レクリエーションも用意しているわ。さあ、私たちの学園生活を始めましょう！』"
translation = "『진지한 이야기만 하면 지루하겠지. 이 뒤에 레크리에이션도 준비되어 있어. 자, 우리의 학원 생활을 시작하자!』"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが手元にあった通信機のスイッチをオフにすると──わぁっ、と。学園中から生徒たちの歓声の声が上がった。"
translation = "루비네가 손에 들고 있던 통신기 스위치를 끄자── 와아, 하고 학원 곳곳에서 학생들의 환호성이 터져 나왔다."

[[dialogue]]
speaker = "ベアトリス"
original = "「お疲れ様、ルヴィ。いい演説だったよ」"
translation = "「수고했어, 루비. 멋진 연설이었어」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……ベアト。あなたが反対しているのを知っていて……ごめんなさい」"
translation = "「……베아토. 네가 반대하는 걸 알면서도…… 미안해」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ううん。ルヴィの気持ちも分かるから……でも、私は諦めないよ！\u3000絶対にアルタイルと、仲良くなれる道を探してみせる！」"
translation = "「으응. 루비의 마음도 아니까…… 하지만 난 포기하지 않아! 반드시 알타이르와 사이좋게 지낼 수 있는 길을 찾아내 보이겠어!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……そう」"
translation = "「……그래」"

[[dialogue]]
speaker = "ベアトリス"
original = "「星徒会のみんなで集まろっか。お昼まだだし、何か食べよっ」"
translation = "「성도회 다 같이 모일까. 아직 점심 전이니까 뭐 좀 먹자」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……この後、教皇庁との会合もあるから。ニンニクはなしでお願いね」"
translation = "「……이 뒤에 교황청과의 회합도 있으니까. 마늘은 빼고 부탁해」"

[[dialogue]]
speaker = "ベアトリス"
original = "「え～っ！？\u3000せっかくカフェテリアのメニュー、チェックしてたのに～っ！？」"
translation = "「에~!? 공들여서 카페테리아 메뉴 체크해뒀는데~!?」"

[[dialogue]]
speaker = "チナ"
original = "「え～っと、ルヴィたちは……っと。あ、いたいた！\u3000おーい、ルヴィ──」"
translation = "「어디 보자, 루비 일행은…… 아, 찾았다! 어이, 루비──」"

[[dialogue]]
speaker = "魔族の留学生"
original = "「おい、デネブの救世主。どんな奴かと思ったら、あのちっこいやつみたいだぜ」"
translation = "「어이, 데네브의 구세주. 어떤 녀석인가 했더니 저 꼬맹이 같은 녀석인가 보군」"

[[dialogue]]
speaker = "魔族の留学生"
original = "「ほんとだ……おいおい、附属に通えるかも怪しい年頃じゃないか？\u3000本当にあれが、リクリエの危機を救ったってのか……？」"
translation = "「정말이네…… 어이 어이, 부속 학교에 다닐 수 있을지도 의심스러운 나이 아냐? 정말 저게 리크리에의 위기를 구했다는 거야……?」"

[[dialogue]]
speaker = "チナ"
original = "（魔界からの留学生か……？\u3000そりゃあルヴィはちっこいけど……）"
translation = "(마계에서 온 유학생인가……? 하기야 루비가 작긴 하지만……)"

[[dialogue]]
speaker = "魔族の留学生"
original = "「噂じゃあ、星徒会役員は全員、自分の幼なじみを指名したって話だぜ。まあ子供っぽい見た目だしな」"
translation = "「소문으로는 성도회 임원은 전부 자기 소꿉친구를 지명했다더군. 뭐, 어린애 같은 외모니까 말이야」"

[[dialogue]]
speaker = "魔族の留学生"
original = "「全員コネってか？\u3000大丈夫かよ。そんなやつが俺たちのリーダー……なんだか不安になってくるぜ」"
translation = "「전부 낙하산이라는 건가? 괜찮은 거냐고. 저런 녀석이 우리의 리더…… 왠지 불안해지는걸」"

[[dialogue]]
speaker = "チナ"
original = "（こいつら～っ。ルヴィを小馬鹿にするだなんて……！）"
translation = "(이 녀석들이~. 루비를 얕보다니……!)"

[[dialogue]]
speaker = "チナ"
original = "（でも、外から来た奴にはそう見えるのか……アタシら役員が何か粗相をしたら、それもルヴィのイメージダウンに繋がっちゃうってことだよな）"
translation = "(하지만 밖에서 온 녀석들에게는 그렇게 보이는 건가…… 우리 임원이 뭔가 실수를 하면 그것도 루비의 이미지 실추로 이어진다는 뜻이잖아)"

[[dialogue]]
speaker = "チナ"
original = "（アタシたち５人が周りからどう見えるかも、ちゃんと考えなきゃ……一枚岩じゃないと、アルタイルには勝てない）"
translation = "(우리 다섯 명이 주변에 어떻게 보일지도 제대로 생각해야 해…… 하나로 뭉치지 않으면 알타이르에는 이길 수 없어)"

[[dialogue]]
speaker = "チナ"
original = "（……これからはちゃんとした言葉遣いで、役員として恥ずかしくないように、過ごさなきゃだ。戦争を、やるんだから）"
translation = "(……이제부터는 제대로 된 말투로, 임원으로서 부끄럽지 않게 지내야 해. 전쟁을 할 거니까)"

[[dialogue]]
speaker = "チナ"
original = "「お疲れ様です、ルヴィネ会長！\u3000先ほどの演説、聞きほれてしまいました！」"
translation = "「수고하셨습니다, 루비네 회장님! 방금 전의 연설, 넋을 잃고 들었습니다!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "チナ"
original = "「ベアトリス副会長もご苦労様です！」"
translation = "「베아트리스 부회장님도 수고 많으십니다!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「えっ、えっ……！？」"
translation = "「엣, 엣……!?」"

[[dialogue]]
speaker = "チナ"
original = "「お２人とも、これから昼食でしょうか？\u3000よろしければアタシも同席させてください！」"
translation = "「두 분 다 이제 점심 식사하러 가시나요? 괜찮으시다면 저도 동석하게 해주십시오!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「チナ？\u3000ど、どうかしたの。頭でも打った……？」"
translation = "「치나? 왜, 왜 그래. 머리라도 부딪쳤어……?」"

[[dialogue]]
speaker = "チナ"
original = "「いえいえ！\u3000アタシはいつもどおりです！\u3000ルヴィネ会長！！」"
translation = "「아뇨 아뇨! 전 평소와 같습니다! 루비네 회장님!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「？？？\u3000……？？」"
translation = "「??? ……??」"

[[dialogue]]
speaker = "チナ"
original = "（……ちゃんと覚悟を決めよう。アルタイルを滅ぼすその時まで）"
translation = "(……제대로 각오를 다지자. 알타이르를 멸망시킬 그날까지)"

[[dialogue]]
speaker = "チナ"
original = "（アタシはデネブを守る星騎士だ。ルヴィネの……ルヴィネ会長の槍として働く、一本の槍だ──！）"
translation = "(나는 데네브를 지키는 성기사다. 루비네의…… 루비네 회장님의 창으로서 일하는, 한 자루의 창이다──!)"

[[dialogue]]
speaker = "チナ"
original = "（仲良しこよしの学園生活なんてしてたら……父さんと母さんがいるかもしれない世界を滅ぼすだなんて、できないだろーが……！）"
translation = "(친하게 지내는 학원 생활 따위 하고 있으면…… 아버지와 어머니가 계실지도 모르는 세계를 멸망시키는 짓 따위 못 할 거 아냐……!)"

[[dialogue]]
speaker = "チナ"
original = "（やるぞ香堂チナ──お前は、デネブの星騎士だ！！）"
translation = "(해보자 코도 치나── 너는 데네브의 성기사다!!)"

[[dialogue]]
speaker = "unk"
original = "幼なじみと距離を取るような口調に胸がちくりと痛みはしたが、それでもチナはアルタイルを滅ぼす覚悟を示すために、己を矯正し続けた。"
translation = "소꿉친구와 거리를 두는 듯한 말투에 가슴이 찌릿하고 아프기는 했지만, 그래도 치나는 알타이르를 멸망시킬 각오를 보이기 위해 자신을 계속 교정했다."

[[dialogue]]
speaker = "unk"
original = "星徒会役員としてふさわしい態度。目上の者に敬語を使い、折り目正しく、勤勉に過ごす──それはまるで仮面を被るかのよう。"
translation = "성도회 임원으로서 어울리는 태도. 윗사람에게 경어를 쓰고, 예의 바르고, 근면하게 지내는 것── 그것은 마치 가면을 쓰는 것과 같았다."

[[dialogue]]
speaker = "unk"
original = "その態度はチナに、デネブの救世主の部下として戦う覚悟をより強く実感させてくれた。"
translation = "그 태도는 치나에게 데네브 구세주의 부하로서 싸울 각오를 더욱 강하게 실감하게 해주었다."

[[dialogue]]
speaker = "unk"
original = "そして同時に──アルタイルを滅ぼす罪悪感を、ほんの少しだけ薄めてもくれたのだった。"
translation = "그리고 동시에── 알타이르를 멸망시키는 죄책감을 아주 조금이나마 덜어주기도 했던 것이었다."

[[dialogue]]
speaker = "unk"
original = "──それから１年と数ヵ月後。"
translation = "──그로부터 1년 수개월 후."

[[dialogue]]
speaker = "unk"
original = "ルヴィネが『女神』から賜ったという、平行世界間を移動する転送装置を手に、チナはアルタイルへの襲撃を開始することになる──"
translation = "루비네가 『여신』으로부터 하사받았다는 평행세계 간을 이동하는 전송 장치를 손에 들고, 치나는 알타이르 습격을 개시하게 된다──"

