[[dialogue]]
speaker = "unk"
original = "第７話,雷電,B"
translation = "제7화, 뇌전, B"

[[dialogue]]
speaker = "unk"
original = "流星学園正門──"
translation = "유성 학원 정문──"

[[dialogue]]
speaker = "unk"
original = "モンスターの姿を見て降り立ったマトイとセーラは、上空から発見したモンスターの姿を改めて捜索していた。"
translation = "몬스터의 모습을 보고 내려선 마토이와 세라는, 상공에서 발견한 몬스터의 모습을 다시 한번 수색하고 있었다."

[[dialogue]]
speaker = "セーラ"
original = "「んじゃーよろしくね、マトイちゃん♪」"
translation = "「그럼 잘 부탁해, 마토이짱♪」"

[[dialogue]]
speaker = "マトイ"
original = "「は……はいセーラ先輩！\u3000足手まといにならないように頑張り奉り候でして……」"
translation = "「하…… 네 세라 선배! 짐이 되지 않도록 열심히 받들겠습니다……」"

[[dialogue]]
speaker = "セーラ"
original = "「まーまー、そう固くならずに。うちこんなんだしさ、もっとリラックスしてこ？」"
translation = "「뭐ー뭐ー, 그렇게 딱딱하게 굴지 말고. 난 이런 사람이니까, 좀 더 편하게 하자?」"

[[dialogue]]
speaker = "マトイ"
original = "「は、はい。すーっ、はーっ……」"
translation = "「네, 네. 스읍, 하아읍……」"

[[dialogue]]
speaker = "セーラ"
original = "「イヤイヤ、深呼吸するほどの相手でもないっしょ」"
translation = "「아니아니, 심호흡할 정도의 상대도 아니잖아」"

[[dialogue]]
speaker = "unk"
original = "気楽さを促すセーラに対し、マトイは慣れない緊張に苛まれていた。"
translation = "느긋함을 재촉하는 세라에 비해, 마토이는 익숙지 않은 긴장에 시달리고 있었다."

[[dialogue]]
speaker = "マトイ"
original = "（セーラ先輩かー……近くで見ると綺麗だな……私なんかよりずっと……）"
translation = "（세라 선배인가ー…… 가까이서 보니 예쁘네…… 나 같은 것보다 훨씬……）"

[[dialogue]]
speaker = "セーラ"
original = "「マトイちゃん？\u3000あれ、なんか凹んでる感じ……？」"
translation = "「마토이짱? 어라, 뭔가 풀 죽은 것 같은데……?」"

[[dialogue]]
speaker = "マトイ"
original = "「いえ……これは単なる持病と申しますか……」"
translation = "「아뇨…… 이건 단순한 지병이라고 할까요……」"

[[dialogue]]
speaker = "unk"
original = "彼女お得意のネガティブが発動しかける。"
translation = "그녀가 특기인 부정적인 사고가 발동하려 한다."

[[dialogue]]
speaker = "unk"
original = "自称も他称もめんどくさい女マトイであったが、今日はその真価が発揮するよりも……"
translation = "자칭도 타칭도 귀찮은 여자 마토이였지만, 오늘은 그 진가가 발휘되기보다는……"

[[dialogue]]
speaker = "モンスター"
original = "「キェルルルッ！」"
translation = "「키에르르르!」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ──向こうから！」"
translation = "「앗── 저쪽에서!」"

[[dialogue]]
speaker = "unk"
original = "林に隠れていた特殊個体のモンスターが獲物を狩りに姿を現す。"
translation = "숲에 숨어 있던 특수 개체 몬스터가 먹이를 사냥하러 모습을 드러낸다."

[[dialogue]]
speaker = "unk"
original = "それは、セーラの背後から彼女たちを強襲する──も。"
translation = "그것은, 세라의 배후에서 그녀들을 강습한다──만."

[[dialogue]]
speaker = "モンスター"
original = "「──キェェェェェッ！？」"
translation = "「──키에에에에엑!?」"

[[dialogue]]
speaker = "マトイ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "セーラ"
original = "「も～。せっかく可愛い後輩ちゃんと話してる最中なのに」"
translation = "「모ー. 모처럼 귀여운 후배짱이랑 얘기하는 중인데」"

[[dialogue]]
speaker = "unk"
original = "２人の喉元を狙った鷲型のモンスターは、そのクチバシを活かすまでもなくセーラの雷撃銃により撃墜された。"
translation = "두 사람의 목덜미를 노린 독수리형 몬스터는, 그 부리를 활용할 새도 없이 세라의 뇌격총에 의해 격추되었다."

[[dialogue]]
speaker = "マトイ"
original = "（今の銃……いつの間に……！？）"
translation = "（방금 그 총…… 언제 사이에……!?）"

[[dialogue]]
speaker = "セーラ"
original = "「前もこんなん出てきた感じ？」"
translation = "「전에도 이런 거 나온 적 있어?」"

[[dialogue]]
speaker = "マトイ"
original = "「は、はい！\u3000今のと同じやつ──この前のおかしな夜の時に見ました！」"
translation = "「네, 네! 방금 것과 같은 녀석── 지난번 이상한 밤에 봤어요!」"

[[dialogue]]
speaker = "セーラ"
original = "「なるほど～。わざわざうちらに向かってきたのは、星力の強いところに惹かれて集まる習性でもあるのかな……？」"
translation = "「과연ー. 일부러 우리한테 달려든 건, 성력이 강한 곳에 끌려 모이는 습성이라도 있는 걸까……?」"

[[dialogue]]
speaker = "セーラ"
original = "「あと、ん～。<ruby>巣<rt>アステラ</rt></ruby>がないからかな？\u3000なんとなくさまよってるカンジ……勘だけど」"
translation = "「그리고, 음ー. 둥지가 없어서 그런가? 어쩐지 헤매고 있는 느낌…… 감이지만」"

[[dialogue]]
speaker = "unk"
original = "勘と言いつつも的確な分析に、マトイは憧れと頼もしさを感じた。"
translation = "감이라고 말하면서도 정확한 분석에, 마토이는 동경과 든든함을 느꼈다."

[[dialogue]]
speaker = "マトイ"
original = "「私も──私も、腐っても新星の星徒会ですから。目一杯セーラ先輩をサポートします！」"
translation = "「저도── 저도, 썩어도 신성의 성도회니까요. 힘껏 세라 선배를 서포트하겠습니다!」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、その調子。同じ雷だしね──けっこういい練習になるんじゃない？」"
translation = "「아하하, 그 기세. 같은 번개니까── 꽤 좋은 연습이 되지 않을까?」"

[[dialogue]]
speaker = "unk"
original = "マトイのロングソードに電流が宿り、足先までが雷速の加護を得る。"
translation = "마토이의 롱소드에 전류가 깃들고, 발끝까지 뇌속의 가호를 얻는다."

[[dialogue]]
speaker = "unk"
original = "対してセーラの銃口にも迸るほどの星力が宿り、二人の戦闘態勢は整った。"
translation = "반면 세라의 총구에도 번쩍일 정도의 성력이 깃들고, 두 사람의 전투 태세는 갖춰졌다."

[[dialogue]]
speaker = "モンスター"
original = "「キェルルルッ！」"
translation = "「키에르르르!」"

[[dialogue]]
speaker = "unk"
original = "そんな準備万端の彼女らの前に──数匹のモンスターが現れる。"
translation = "그런 준비 만반의 그녀들 앞에── 수 마리의 몬스터가 나타난다."

[[dialogue]]
speaker = "セーラ"
original = "「──んじゃ、軽くひねっちゃおっか」"
translation = "「──그럼, 가볍게 비틀어 버릴까」"

[[dialogue]]
speaker = "マトイ"
original = "「了解ですっ！」"
translation = "「알겠습니다!」"

