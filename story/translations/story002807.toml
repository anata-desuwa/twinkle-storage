[[dialogue]]
speaker = "ウィステリア"
original = "「か、紙屋敷さん？\u3000どちらも選ばないってどういうこと……？」"
translation = "「카, 카미야시키 양? 어느 쪽도 택하지 않는다니 그게 무슨 소리야……?」"

[[dialogue]]
speaker = "ヴィライア"
original = "『錯乱しているのかしら。いいから早くどきなさい。でなければ死ぬわよ』"
translation = "『착란이라도 일으킨 건가. 됐으니 어서 비켜라. 그렇지 않으면 죽는다』"

[[dialogue]]
speaker = "モネ"
original = "「いいえ、どきません！」"
translation = "「아니요, 비키지 않습니다!」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさんは強くて、キレイで、気さくで、優しくて……星騎士としても人としても尊敬しています。必ず助け出します」"
translation = "「위스테리아 씨는 강하고, 아름답고, 싹싹하고, 다정하고…… 성기사로서도 사람으로서도 존경하고 있어요. 반드시 구해낼 거예요」"

[[dialogue]]
speaker = "モネ"
original = "「でも、この書庫を壊すこともあり得ません！」"
translation = "「하지만 이 서고를 부수는 일도 있을 수 없어요!」"

[[dialogue]]
speaker = "モネ"
original = "「この子が教えてくれました。ここにある本は、リクリエによって滅ぼされた魔族たちの無念が記されたものだと」"
translation = "「이 아이가 가르쳐주었어요. 여기 있는 책은 리크리에에 의해 멸망한 마족들의 원념이 기록된 것이라고요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……紙屋敷さん、あくまで本は本。無念や怨念が記録されているけれど、魔族たちの魂が宿っているわけじゃないのよ」"
translation = "「……카미야시키 양, 어디까지나 책은 책이야. 원념이나 원사가 기록되어 있지만 마족들의 영혼이 깃들어 있는 건 아니라고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「魔族たちに同情しているなら、やめなさい。呪いは甘さに容易く付け込んでくるわ」"
translation = "「마족들에게 동정하고 있다면 그만둬. 저주는 나약함을 손쉽게 파고들거든」"

[[dialogue]]
speaker = "モネ"
original = "「わかっています。本は本であり、著者自身や、登場人物そのものではありません」"
translation = "「알고 있습니다. 책은 책일 뿐 저자 자신이나 등장인물 그 자체가 아니라는 건요」"

[[dialogue]]
speaker = "モネ"
original = "「けれど、確かな『足跡』です」"
translation = "「하지만 확실한 『발자국』이에요」"

[[dialogue]]
speaker = "モネ"
original = "「この書庫に収められているのは、魔族たちの生きた証なんです」"
translation = "「이 서고에 담겨 있는 것은 마족들이 살아왔던 증거예요」"

[[dialogue]]
speaker = "ヴィライア"
original = "『…………っ！』"
translation = "『…………!』"

[[dialogue]]
speaker = "モネ"
original = "「善も悪も、喜びも悲しみも、ここにはあります」"
translation = "「선도 악도, 기쁨도 슬픔도 여기에는 있어요」"

[[dialogue]]
speaker = "モネ"
original = "「怒り、憎しみ、妬み……色んな感情を本たちから感じます」"
translation = "「분노, 증오, 질투…… 여러 감정을 책들에게서 느껴요」"

[[dialogue]]
speaker = "モネ"
original = "「それは、滅びた魔族たちが感じていたもの。彼らの命の営みです」"
translation = "「그것은 멸망한 마족들이 느꼈던 것. 그들의 생명의 영위예요」"

[[dialogue]]
speaker = "モネ"
original = "「この書庫を壊してしまったら、本たちを捨ててしまったら、彼らの生きた証がなくなってしまう」"
translation = "「이 서고를 부숴버린다면, 책들을 버려버린다면 그들이 살았던 증거가 없어져 버려요」"

[[dialogue]]
speaker = "モネ"
original = "「それを記した本があるのに、彼らのことを誰も知らない、憶えていないなんてあんまりじゃないですか」"
translation = "「그걸 기록한 책이 있는데도 그들을 아무도 모르고, 기억하지 못한다는 건 너무하지 않나요」"

[[dialogue]]
speaker = "モネ"
original = "「だから、この書庫を壊すなんて、私は認めない」"
translation = "「그러니까 이 서고를 부수는 건 저는 인정 못 해요」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさんでも……いえ、たとえこの世界を作った女神様にだって、譲れません！」"
translation = "「위스테리아 씨라도…… 아니, 설령 이 세계를 만드신 여신님이라 해도 양보 못 해요!」"

[[dialogue]]
speaker = "ヴィライア"
original = "『……子どものわがままね』"
translation = "『……어린애 같은 떼를 쓰는군』"

[[dialogue]]
speaker = "ヴィライア"
original = "『このままでは呪いは暴走し、流星市国を覆い尽くす。それを止めるには、ウィステリアが呪いを受け入れるか、書庫を破壊するしかないわ』"
translation = "『이대로라면 저주는 폭주해 유성시국을 뒤덮을 것이다. 그걸 막으려면 위스테리아가 저주를 받아들이든가 서고를 파괴하는 수밖에 없다』"

[[dialogue]]
speaker = "ヴィライア"
original = "『けれど、援軍なんて呼ばせない。ウィステリアも逃がさない。あなたたちに初めから選択肢なんてないのよ』"
translation = "『하지만 원군 따위 부르게 하지 않아. 위스테리아도 보내주지 않는다. 너희에게는 처음부터 선택지 같은 건 없어』"

[[dialogue]]
speaker = "ヴィライア"
original = "『それとも、目の前でこの娘を八つ裂きにしたら、ウィステリアも諦めて受け入れるかしら』"
translation = "『아니면 눈앞에서 이 계집을 갈가리 찢어버리면 위스테리아도 포기하고 받아들이려나』"

[[dialogue]]
speaker = "ウィステリア"
original = "「こいつ……っ！」"
translation = "「이 자식이……!」"

[[dialogue]]
speaker = "モネ"
original = "「いいえ、ウィステリアさんを犠牲にはしません」"
translation = "「아니요, 위스테리아 씨를 희생시키지는 않겠어요」"

[[dialogue]]
speaker = "ヴィライア"
original = "『なら、どうするというの？』"
translation = "『그럼 어쩌겠다는 거냐?』"

[[dialogue]]
speaker = "モネ"
original = "「私がこの子たちを受け入れます。……というか読ませてくださいお願いします！」"
translation = "「제가 이 아이들을 받아들이겠습니다. ……랄까 제발 읽게 해주세요 부탁드립니다!」"

[[dialogue]]
speaker = "ヴィライア"
original = "『…………は？』"
translation = "『…………뭐?』"

[[dialogue]]
speaker = "ウィステリア"
original = "「ええと、紙屋敷さん、話聞いてた……？」"
translation = "「저기, 카미야시키 양, 내 말 듣고 있었어……?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「呪いの本って読むと呪われるのよ。こんな量の呪いの本を読んだら、発狂するか、廃人になるか、まぁ普通に死ぬわよ」"
translation = "「저주의 책이란 건 읽으면 저주받는다고. 이런 양의 저주의 책을 읽었다간 발광하거나 폐인이 되거나, 뭐 평범하게 죽는단 말이야」"

[[dialogue]]
speaker = "モネ"
original = "「本が読めるなら、呪われるくらい構いません！\u3000呪いが怖くて本が読めないくらいだったら読んで死にます！」"
translation = "「책을 읽을 수 있다면 저주받는 것 따위 상관없어요! 저주가 무서워서 책을 못 읽을 바엔 읽고 죽겠습니다!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えぇ……今は呪いより紙屋敷さんが怖いわ、私」"
translation = "「에휴…… 지금은 저주보다 카미야시키 양이 더 무섭네, 난」"

[[dialogue]]
speaker = "モネ"
original = "「本は私の友達で、かけがえのない宝物」"
translation = "「책은 저의 친구이자 무엇과도 바꿀 수 없는 보물이에요」"

[[dialogue]]
speaker = "モネ"
original = "「無念だって怨念だって、本であるなら、それすら愛しい」"
translation = "「원념이든 원사든 책이라면 그것조차 사랑스러워요」"

[[dialogue]]
speaker = "モネ"
original = "「だから、私も本にとって友達でありたいんです」"
translation = "「그러니까 저도 책에게 친구이고 싶어요」"

[[dialogue]]
speaker = "モネ"
original = "「本は本として生まれた以上、読まれたがっています。なのに、呪いの本だからって何千年も何万年も誰にも読まれないなんて、寂しすぎます！」"
translation = "「책은 책으로 태어난 이상 읽히고 싶어 해요. 그런데 저주의 책이라고 해서 수천 년 수만 년 동안 아무에게도 읽히지 못하다니 너무 외롭잖아요!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さんが本気で言ってるのはわかってるんだけど……さすがに無理が過ぎるわ」"
translation = "「카미야시키 양이 진심으로 말하는 건 알겠는데…… 역시 너무 무리야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「呪いに耐性がある私でも、１人じゃ受け止めきれないもの。まして、呪いにも魔力にも触れたことのない紙屋敷さんには到底不可能──」"
translation = "「저주에 내성이 있는 나조차 혼자서는 다 감당하지 못할 정도인걸. 하물며 저주나 마력에 닿아본 적도 없는 카미야시키 양에게는 도저히 불가능──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ん……？\u3000１人じゃ受け止めきれない……」"
translation = "「음……? 혼자서는 다 감당하지 못한다……」"

[[dialogue]]
speaker = "モネ"
original = "「どうしました、ウィステリアさん？」"
translation = "「왜 그러세요, 위스테리아 씨?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私、ちょっと思い付いちゃったかもしれないわ」"
translation = "「나, 조금 좋은 생각이 떠올랐을지도 몰라」"

