[[dialogue]]
speaker = "マハムート"
original = "「戦場において、星騎士が最も重要視するべきなのは、個人の戦闘能力よ」"
translation = "「전장에서 성기사가 가장 중요시해야 하는 건 개인의 전투 능력이야.」"

[[dialogue]]
speaker = "unk"
original = "言ってることが千園寺先輩と真逆！？"
translation = "「하는 말이 센온지 선배랑 정반대인데!?」"

[[dialogue]]
speaker = "unk"
original = "バトルウィークが始まって２日目の放課後──昨日の意趣返しということらしく、今日はマムがフニをラルーナに招いていた。"
translation = "「배틀 위크가 시작되고 2일째 방과 후── 어제의 복수라는 듯, 오늘은 마무가 후니를 라 루나로 초대했다.」"

[[dialogue]]
speaker = "フェニエル"
original = "「え、えっと……マム。お姉様の考えは間違っている……ということでしょうか？」"
translation = "「어, 저기…… 마무. 언니분의 생각은 틀렸다는…… 건가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「いいえ、そんなことはないわ。リクリエと戦って行く上で、大きなチームとしての連携力は、確かに重要なものよ」"
translation = "「아니, 그렇지는 않아. 리크리에와 싸워나가는 데 있어서 커다란 팀으로서의 연계력은 확실히 중요한 거야.」"

[[dialogue]]
speaker = "マハムート"
original = "「だけど……星力を持ち、星騎士になれる者は非常に限られているわ」"
translation = "「하지만…… 성력을 가지고 성기사가 될 수 있는 자는 매우 한정되어 있어.」"

[[dialogue]]
speaker = "フェニエル"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "マハムート"
original = "「流星市国周辺でこそ、モンスターの巣であるアステライトには、精鋭である星徒会メンバーが攻略にあたることになっている」"
translation = "「유성시국 주변에서야말로 몬스터의 둥지인 아스텔라이트에는 정예인 성도회 멤버가 공략에 나서기로 되어 있지.」"

[[dialogue]]
speaker = "マハムート"
original = "「けれど、考えてもみなさい。もし、その場に星力を持つ者が、自分１人しかいなかったとしたら？」"
translation = "「하지만 생각해 보렴. 만약 그 자리에 성력을 가진 자가 자신 한 명뿐이라면?」"

[[dialogue]]
speaker = "マハムート"
original = "「仲間はいない。助けも呼べない。なのに、モンスターはアステラから湧き出てくる――そんな絶望的な状況よ」"
translation = "「동료는 없어. 도움도 부를 수 없어. 그런데도 몬스터는 아스텔라에서 솟아 나와── 그런 절망적인 상황이야.」"

[[dialogue]]
speaker = "フェニエル"
original = "「も、もちろん、巣を壊すために、アステラに突入しますっ。なまら怖いっ、ですけど……」"
translation = "「무, 물론 둥지를 부수기 위해 아스텔라에 돌입하겠어요. 정말 무섭겠지만……요.」"

[[dialogue]]
speaker = "マハムート"
original = "「そう、あなたはいい子ね。フニ」"
translation = "「그래, 넌 착한 아이구나. 후니.」"

[[dialogue]]
speaker = "マハムート"
original = "「……でも、もしそういう状況になっても、<b>今の</b>あなたの実力のままなら、迷わず逃げなさい」"
translation = "「……하지만 만약 그런 상황이 닥쳐도, **지금의** 네 실력 그대로라면 망설이지 말고 도망치렴.」"

[[dialogue]]
speaker = "マハムート"
original = "「救援要請に３日かかっても、１ヵ月かかってでも、別の星騎士を呼びに行くべきよ。一刻も早くね」"
translation = "「구조 요청에 3일이 걸리든 한 달이 걸리든 다른 성기사를 부르러 가야 해. 한시라도 빨리 말이야.」"

[[dialogue]]
speaker = "フェニエル"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker = "マハムート"
original = "「だけど……そうも言ってられない状況というのは、いつか必ずやってくる。世界を滅ぼすような厄災が迫りつつある今、決して逃げられない戦いの時がね」"
translation = "「하지만…… 그렇게 말할 수 없는 상황은 언젠가 반드시 찾아와. 세계를 멸망시킬 재앙이 다가오고 있는 지금, 결코 피할 수 없는 싸움의 때가 말이지.」"

[[dialogue]]
speaker = "マハムート"
original = "「だからこそ、星騎士には一騎当千の戦闘能力が求められるの」"
translation = "「그렇기에 성기사에게는 일당백의 전투 능력이 요구되는 거야.」"

[[dialogue]]
speaker = "マハムート"
original = "「流星市国は、リクリエの特異点と呼ばれているわ。アステラの発生も、モンスターの出現も、その他の地域の１００倍はゆうに超えているはずよ」"
translation = "「유성시국은 리크리에의 특이점이라 불리고 있어. 아스텔라의 발생도, 몬스터의 출현도 다른 지역의 100배는 족히 넘을 거야.」"

[[dialogue]]
speaker = "マハムート"
original = "「でもね……その他の地域、例えば星騎士の支援がほとんど及ばない魔界にだって、モンスターは現れるの」"
translation = "「하지만 말이야…… 다른 지역, 예를 들어 성기사의 지원이 거의 미치지 않는 마계조차 몬스터는 나타나.」"

[[dialogue]]
speaker = "マハムート"
original = "「私は魔界にある古い一族の出身で、私たち一族はその一帯の安全を司っているわ」"
translation = "「나는 마계에 있는 오래된 일족 출신으로, 우리 일족은 그 일대의 안전을 관장하고 있어.」"

[[dialogue]]
speaker = "マハムート"
original = "「──だから、妃竜院家の者には、たった１人で数千万人の命を守る使命があるの」"
translation = "「──그래서 키류인 가문의 자에게는 단 한 명의 몸으로 수천만 명의 목숨을 지킬 사명이 있지.」"

[[dialogue]]
speaker = "マハムート"
original = "「そしてその使命は、あらゆる星騎士の元に、ある日突然降りかかってくる可能性がある」"
translation = "「그리고 그 사명은 모든 성기사의 머리 위로 어느 날 갑자기 내려앉을 가능성이 있어.」"

[[dialogue]]
speaker = "マハムート"
original = "「だから私は、<ruby>自分の寮<rt>ラルーナ</rt></ruby>生には厳しいわよ」"
translation = "「그래서 나는 <ruby>내 기숙사<rt>라 루나</rt></ruby>생들에게 엄격한 거야.」"

[[dialogue]]
speaker = "マハムート"
original = "「私の元で鍛える以上、全員が一騎当千の力を望むわ。才能のある無しなんて関係ない」"
translation = "「내 밑에서 단련하는 이상, 전원이 일당백의 힘을 갖길 원해. 재능의 유무 따윈 상관없어.」"

[[dialogue]]
speaker = "マハムート"
original = "「強くなりたいと本気で望めば、守護星は応えてくれるものなのよ」"
translation = "「강해지고 싶다고 진심으로 바라면 수호성은 응답해 주는 법이니까.」"

[[dialogue]]
speaker = "マハムート"
original = "「事実、私はそうして、どこまでも強く成長し続ける奴を１人知っている。……凄く生意気だけどね」"
translation = "「실제로 나는 그렇게 끝없이 강하게 성장해 나가는 녀석을 한 명 알고 있어. ……무척 건방지지만 말이야.」"

[[dialogue]]
speaker = "マハムート"
original = "「そういうわけでフニ、あなたも心しておくことね。もしこの寮に編入されるようなことがあったら、その時は私の手でビシバシしごいてやるから」"
translation = "「그러니 후니, 너도 명심해 두렴. 만약 이 기숙사로 편입되게 된다면 그때는 내 손으로 호되게 단련시켜 줄 테니까.」"

[[dialogue]]
speaker = "フェニエル"
original = "「いえすっ、マムっ！」"
translation = "「예스, 마무!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ、いえっ！\u3000お、お姉様とイルソーレは、決して負けません……っ」"
translation = "「앗, 아니! 어, 언니분과 일 소레는 결코 지지 않아요……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「でも……戦いの心構え、のようなものは……少しだけですが、わかった気がします」"
translation = "「하지만…… 싸움의 마음가짐 같은 건…… 조금이지만 알 것 같은 기분이 들어요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご教授いただき、ありがとうございます。マム」"
translation = "「가르침을 주셔서 감사합니다. 마무.」"

[[dialogue]]
speaker = "マハムート"
original = "「あら、あなたは何を言っているのかしら？\u3000私は敵に塩を送るような真似、した覚えはないのだけれど？」"
translation = "「어머, 너는 무슨 소리를 하는 거니? 난 적에게 소금을 보내는 짓 따위 한 기억이 없는데?」"

[[dialogue]]
speaker = "マハムート"
original = "「ただ、ラルーナに来たらイジメてやるから、覚悟なさいと言っただけよ。変な勘違いをしてないで、畏怖をもって跪きなさい」"
translation = "「그저 라 루나에 오면 괴롭혀 줄 테니 각오하라고 말했을 뿐이야. 이상한 착각 하지 말고 경외심을 갖고 무릎 꿇으렴.」"

[[dialogue]]
speaker = "フェニエル"
original = "「？\u3000……マムはとても優しい人、だと思います」"
translation = "「? ……마무는 무척 상냥한 분이라고 생각해요.」"

[[dialogue]]
speaker = "マハムート"
original = "「やれやれ、困った子ね。会長からもちゃんと、この子に警戒心を身に着けるように言ってやって頂戴」"
translation = "「이런 이런, 곤란한 아이네. 회장도 제대로 이 아이에게 경계심을 갖도록 말해 줘.」"

[[dialogue]]
speaker = "unk"
original = "マムは優しくていい人ですよ"
translation = "「마무는 상냥하고 좋은 사람이에요.」"

[[dialogue]]
speaker = "マハムート"
original = "「なっ……！？\u3000あなたね……！」"
translation = "「뭐……!? 당신 말이야……!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あれ？\u3000マムのお顔、少し赤くなっていますか……？」"
translation = "「어라? 마무의 얼굴, 조금 빨개졌나요……?」"

[[dialogue]]
speaker = "マハムート"
original = "「っ……ふっ……ふふふふっ……会長？\u3000年長者を恥ずかしがらせて悦に浸るとは、どうやら躾が足りてなかったようね……？」"
translation = "「윽…… 훗…… 후후후훗…… 회장? 연장자를 부끄럽게 만들고 즐거움에 젖다니, 아무래도 훈육이 부족했던 모양이네……?」"

[[dialogue]]
speaker = "マハムート"
original = "「――八つ当たりは大人げないですって？\u3000ええい、問答無用よ！\u3000私のけん玉で百叩きにしてあげるから、そこに直りなさい！」"
translation = "「──화풀이는 어른스럽지 못하다고? 에잇, 문답무용이야! 내 켄다마로 백 대는 때려줄 테니까 거기 딱 서!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、それっておもちゃの方ですよね！？"
translation = "「잠깐, 그거 장난감 쪽이죠!?」"

[[dialogue]]
speaker = "マハムート"
original = "「――変身後の武器だったら死んじゃう？\u3000大丈夫よ、星力を集中させてガードすれば、ギリギリ死なないわ」"
translation = "「──변신 후의 무기라면 죽는다고? 괜찮아, 성력을 집중해서 방어하면 아슬아슬하게 죽지는 않을 거야.」"

[[dialogue]]
speaker = "フェニエル"
original = "「なるほどですっ。こうやって日頃から、マムは寮生を鍛えてくれてるんですね……っ」"
translation = "「과연 그렇군요. 이렇게 평소부터 마무는 기숙사생들을 단련시켜 주고 있군요……!」"

[[dialogue]]
speaker = "unk"
original = "やめてフニ！\u3000これ以上マムを煽らないで！"
translation = "「그만해 후니! 더 이상 마무를 자극하지 마!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふっ……ふふふふふ………」"
translation = "「훗…… 후후후후후………」"

[[dialogue]]
speaker = "マハムート"
original = "「メテオインパクトォーーーッ！！！」"
translation = "「메테오 임팩트으으으──!!!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、やめっ……アッーーーーーー！！！"
translation = "「잠깐, 그만…… 아아아악──!!!」"

[[dialogue]]
speaker = "unk"
original = "そうして、突然始まったマム直々のしごきを、俺は必死に受けることになるのだった。"
translation = "「그렇게 갑자기 시작된 마무의 직접적인 단련을 나는 필사적으로 받아내게 되었다.」"

[[dialogue]]
speaker = "unk"
original = "──いやこれ、並みの星騎士が喰らったら死ぬけど！？\u3000やっぱりマムは普通に怖い！"
translation = "「──아니, 이거 평범한 성기사가 맞으면 죽는데!? 역시 마무는 평범하게 무서워!」"

