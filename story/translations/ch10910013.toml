[[dialogue]]
speaker = "unk"
original = "第３話,働く梨緒,P"
translation = "제3화, 일하는 리오 P"

[[dialogue]]
speaker = "unk"
original = "とある休日。買い物のために秋葉原まで足を延ばすと……"
translation = "어느 휴일. 쇼핑을 위해 아키하바라까지 발걸음을 옮기자……"

[[dialogue]]
speaker = "マグダレナ"
original = "「あ、会長さま、こんにちは。ティッシュどうぞ～」"
translation = "「아, 회장님, 안녕하세요. 티슈 받으세요~」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんがティッシュを配るのももう見慣れた光景だけど、１人意外な顔を見つけた。"
translation = "막달레나 씨가 티슈를 나눠주는 건 이제 익숙한 광경이지만, 한 명 의외의 얼굴을 발견했다."

[[dialogue]]
speaker = "梨緒"
original = "「ティ、ティッシュどうぞー……うぅ、誰も受け取ってくれない……」"
translation = "「티, 티슈 받으세요…… 으으, 아무도 받아주지 않아……」"

[[dialogue]]
speaker = "unk"
original = "梨緒もティッシュ配り？"
translation = "리오도 티슈 나누기?"

[[dialogue]]
speaker = "梨緒"
original = "「ひ、緋宮会長！？\u3000どうしてここに！？\u3000いや、買い物に来ることくらいあるか……」"
translation = "「히, 히노미야 회장!? 어떻게 여기에!? 아니, 쇼핑하러 오는 것 정도는 있겠지……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は今、星見家に居候しているんだが……ただで世話になるのも心苦しくてな。アルバイトをして少しでも生活費を入れることにしたんだ」"
translation = "「나는 지금 호시미 가문에 얹혀살고 있는데…… 공짜로 신세 지는 것도 마음이 불편해서 말이야. 아르바이트를 해서 조금이라도 생활비를 보태기로 했다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふ、では私やアルモタヘルと同じですね」"
translation = "「후후, 그럼 저나 알모타헬과 같네요」"

[[dialogue]]
speaker = "梨緒"
original = "「そんな、マグダレナ様と同じなんて畏れ多いです。私なんて、何も守れない役立たずですから……」"
translation = "「아뇨, 막달레나 님과 같다니 가당치도 않습니다. 저 같은 건 아무것도 지키지 못하는 무능력자니까요……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ご自分を大事になさってください、梨緒さま。それに働きたいという気持ちに、人も守護天使もありませんよ」"
translation = "「자신을 소중히 여기세요, 리오 님. 그리고 일하고 싶다는 마음에는 사람도 수호천사도 상관없답니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「しかし梨緒さま。さっきからティッシュがあまり減っていないようですが……」"
translation = "「하지만 리오 님. 아까부터 티슈가 별로 줄어들지 않는 것 같습니다만……」"

[[dialogue]]
speaker = "梨緒"
original = "「うっ……申し訳ありません。何分アルバイトは初めてなものでして……」"
translation = "「윽…… 죄송합니다. 아르바이트는 처음이라서……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「いえ、責めているのではありません。私も最初は不甲斐なかったですから」"
translation = "「아뇨, 나무라는 게 아닙니다. 저도 처음에는 한심했으니까요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ティッシュ配りが苦手なら、アルバイト経験豊富な会長さまにご指導いただいてはどうかと思いまして」"
translation = "「티슈 나누기가 서투르시다면, 아르바이트 경험이 풍부한 회장님께 지도를 받아보시면 어떨까 해서요」"

[[dialogue]]
speaker = "梨緒"
original = "「緋宮会長がアルバイトを……？\u3000そうなのか？」"
translation = "「히노미야 회장이 아르바이트를……? 그런 건가?」"

[[dialogue]]
speaker = "unk"
original = "ああ、そういうことなら力になるよ"
translation = "아아, 그런 거라면 힘이 되어줄게"

[[dialogue]]
speaker = "梨緒"
original = "「すまない……。ティッシュ配りはどうすればうまくできるんだ？\u3000私が配っていても、なかなか手に取ってもらえなくて……」"
translation = "「미안하다……. 티슈 나누기는 어떻게 하면 잘할 수 있지? 내가 나눠줘도 좀처럼 받아주질 않아서……」"

[[dialogue]]
speaker = "梨緒"
original = "「ふむふむ……ティッシュは相手の手の高さに出す……人の流れを読んで、導線を塞がないように脇に立つ……」"
translation = "「흠흠…… 티슈는 상대방의 손 높이에 내민다…… 사람의 흐름을 읽고, 동선을 막지 않도록 옆에 선다……」"

[[dialogue]]
speaker = "梨緒"
original = "「声掛けはシンプルに……そして笑顔で明るく、だな。ありがとう、参考になった」"
translation = "「말은 심플하게…… 그리고 미소로 밝게, 인가. 고맙다, 참고가 됐어」"

[[dialogue]]
speaker = "マグダレナ"
original = "「では会長さまを相手に、さっそく実践してみてはいかがでしょうか」"
translation = "「그럼 회장님을 상대로 당장 실천해 보시는 건 어떨까요」"

[[dialogue]]
speaker = "梨緒"
original = "「緋宮会長にするのか……？\u3000いや、ここは恥じてなどいられない。いくぞ」"
translation = "「히노미야 회장에게 하는 건가……? 아니, 여기서 부끄러워하고 있을 순 없지. 간다」"

[[dialogue]]
speaker = "梨緒"
original = "「ティッシュどうぞ♪」"
translation = "「티슈 받으세요♪」"

[[dialogue]]
speaker = "unk"
original = "そうそう、いい感じ"
translation = "그래그래, 좋은 느낌이야"

[[dialogue]]
speaker = "梨緒"
original = "「うぅ～～っ。通りすがりの人ならともかく、見知った相手に見られるのは……言葉にしがたい気持ちになるな……」"
translation = "「으으~~. 지나가는 사람이라면 몰라도, 아는 상대에게 보여지는 건…… 말로 표현하기 힘든 기분이 드는군……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふふ、よい笑顔でしたよ、梨緒さま」"
translation = "「후후후, 좋은 미소였어요, 리오 님」"

[[dialogue]]
speaker = "梨緒"
original = "「う……マグダレナ様まで……」"
translation = "「우…… 막달레나 님까지……」"

[[dialogue]]
speaker = "梨緒"
original = "「だがティッシュ配りの要領は学んだ。では──」"
translation = "「하지만 티슈 나누기의 요령은 배웠다. 그럼──」"

[[dialogue]]
speaker = "unk"
original = "ティッシュ配りで勝負だ！"
translation = "티슈 나누기로 승부다!"

[[dialogue]]
speaker = "梨緒"
original = "「先に言われた！？」"
translation = "「먼저 선수 뺏겼다!?」"

[[dialogue]]
speaker = "梨緒"
original = "「だが君もその気なら話が早い。どちらが多くのティッシュを配れるか勝負だ！」"
translation = "「하지만 너도 그럴 생각이라면 말이 빠르지. 누가 더 많은 티슈를 나눠주는지 승부다!」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……負けた……」"
translation = "「큭…… 졌다……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「さすが会長さま。熟練の腕でダンボール一箱分のティッシュを配り終えてしまいました」"
translation = "「역시 회장님. 숙련된 솜씨로 골판지 한 상자 분량의 티슈를 다 나눠버리셨네요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ですがティッシュ配り勝負のおかげで、あんなにたくさんあったティッシュがこの通り、すっかり少なくなりましたね」"
translation = "「하지만 티슈 나누기 승부 덕분에, 그렇게 많던 티슈가 이대로 싹 줄어들었네요」"

[[dialogue]]
speaker = "梨緒"
original = "「！\u3000そ、そうだ、勝負に負けて戦いに勝つというやつだ。私の作戦勝ちだな」"
translation = "「! 그, 그래, 승부에는 지고 싸움에는 이긴다는 녀석이다. 나의 작전 승리군」"

[[dialogue]]
speaker = "unk"
original = "（違う気がするけど、梨緒が満足ならいいか）"
translation = "(다른 것 같지만, 리오가 만족한다면 됐나)"

[[dialogue]]
speaker = "梨緒"
original = "「な、なんだその顔は！\u3000微笑ましそうに見るな！」"
translation = "「무, 뭐야 그 얼굴은! 흐뭇하게 쳐다보지 마!」"

[[dialogue]]
speaker = "梨緒"
original = "「確かに今回は私の負けだが、ティッシュ配りはもう覚えた！\u3000次は負けないからな！」"
translation = "「확실히 이번에는 나의 패배지만, 티슈 나누기는 이제 마스터했다! 다음에는 지지 않을 거니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「こんにちは。梨緒さんがバイトをしていると聞いて、見に来たのですが……」"
translation = "「안녕하세요. 리오 씨가 알바를 하고 있다고 들어서 보러 왔습니다만……」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、エリ──フィオナか。私なら大丈夫だ。今日はたくさんティッシュを配ったぞ」"
translation = "「아아, 엘리── 피오나인가. 나는 괜찮다. 오늘은 티슈를 잔뜩 나눠줬어」"

[[dialogue]]
speaker = "unk"
original = "梨緒は本当に頑張ってたよ"
translation = "리오는 정말 열심히 했어"

[[dialogue]]
speaker = "フィオナ"
original = "「なら安心しました。緋宮会長にもお世話になったようで、ありがとうございます」"
translation = "「그럼 안심이네요. 히노미야 회장님께도 신세를 진 것 같아 감사합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「梨緒さん、緋宮会長とすっかり仲良くなったみたいですね」"
translation = "「리오 씨, 히노미야 회장님과 아주 친해진 것 같네요」"

[[dialogue]]
speaker = "梨緒"
original = "「べ、別に仲良くなってなどいないっ。確かに緋宮会長には助けられたが、選挙管理委員会として適切な距離は保っている」"
translation = "「벼, 별로 친해진 게 아니다. 확실히 히노미야 회장에게 도움을 받았지만, 선거관리위원회로서 적절한 거리는 유지하고 있어」"

[[dialogue]]
speaker = "梨緒"
original = "「だろう、緋宮会長？\u3000だよな……？」"
translation = "「그렇지, 히노미야 회장? 그치……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ♪」"
translation = "「후훗♪」"

[[dialogue]]
speaker = "マグダレナ"
original = "「うふふふ♪」"
translation = "「우후후후♪」"

[[dialogue]]
speaker = "梨緒"
original = "「なんだその笑顔は！？\u3000笑うな～～っ！」"
translation = "「뭐야 그 미소는!? 웃지 마~~!」"

[[dialogue]]
speaker = "unk"
original = "梨緒が顔を赤くしてムキになればなるほど、フィオナとマグダレナさんは微笑ましそうに笑うのだった。"
translation = "리오가 얼굴을 붉히며 오기를 부리면 부릴수록, 피오나와 막달레나 씨는 흐뭇하게 웃는 것이었다."

