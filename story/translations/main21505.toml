[[dialogue]]
speaker = "unk"
original = "第５話,もしも……,B"
translation = "제5화, 만약에……"

[[dialogue]]
speaker = "unk"
original = "本日も快晴。アステラの発生はなし──"
translation = "오늘도 쾌청. 아스테라의 발생은 없음──"

[[dialogue]]
speaker = "unk"
original = "私は日課となっている会長日誌への記述を終えて、ぱたりと閉じる。"
translation = "나는 일과가 된 회장 일지에 기입을 마치고 탁 덮는다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ふう」"
translation = "「……휴우」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「お疲れ様ルヴィ。紅茶をどうぞ？」"
translation = "「수고했어, 루비. 홍차 마실래?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ありがとうレティシア。いただくわ」"
translation = "「고마워, 레티시아. 잘 마실게」"

[[dialogue]]
speaker = "unk"
original = "極星学園に転入してはや数ヵ月──"
translation = "극성학원에 전학 온 지도 벌써 몇 달──"

[[dialogue]]
speaker = "unk"
original = "私は、稀なくらいの『星力』総量を持っているという理由で、留学したばかりなのに星徒会長を任されることになってしまった。"
translation = "나는 이례적일 정도로 거대한 『성력』 총량을 가지고 있다는 이유로, 유학 온 지 얼마 되지도 않았는데 성도회장을 맡게 되고 말았다."

[[dialogue]]
speaker = "unk"
original = "役員は星徒会長による指名式だ。留学したばかりで右も左もわからないのに、人員を集めなくてはいけなかったから大変だった。"
translation = "임원은 성도회장에 의한 지명제다. 유학 온 지 얼마 되지 않아 아는 것도 없는데, 인원을 모집해야 해서 무척 힘들었다."

[[dialogue]]
speaker = "unk"
original = "レティシアは、そんな私のスカウトを二つ返事で引き受けてくれた、１学年先輩の天使の女の子。とても優しくて気が利くお姉さんだ。"
translation = "레티시아는 그런 나의 스카우트 제의를 흔쾌히 받아들여 준 한 학년 선배인 천사 소녀. 아주 상냥하고 눈치 빠른 믿음직한 언니다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あれれ？\u3000今度の大交流の名簿が見つかりません……！\u3000家に忘れてきちゃいましたかね。お母さんにメールして聞いてみましょう」"
translation = "「어라라? 이번 대교류 명단이 보이질 않습니다……! 집에 두고 온 걸까요. 어머니께 문자 보내서 여쭤봐야겠습니다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前なあ。だから持ち帰って仕事はするなって言っただろ……てか、これじゃね？」"
translation = "「너 말이야. 그러니까 일거리를 집으로 가져가지 말라고 했잖아…… 그보다 이거 아냐?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「おぉ！\u3000流石ですチナ！」"
translation = "「오오! 역시 치나입니다!」"

[[dialogue]]
speaker = "unk"
original = "あの２人はチナとグレイス。レティシアと同じく、数ヵ月前に私が勧誘した星徒会の役員だ。"
translation = "저 두 사람은 치나와 그레이스. 레티시아와 마찬가지로 몇 달 전에 내가 권유한 성도회의 임원들이다."

[[dialogue]]
speaker = "unk"
original = "グレイスは２年生で、チナは１つ歳下なのだけど……どっちがお姉さんかわからないわね。"
translation = "그레이스는 2학년이고 치나는 한 살 아래인데…… 누가 언니인지 모를 정도네."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あ、そうだルヴィ。母さんたちがさ、また家で夕食はどうかって言ってたぞ」"
translation = "「아, 맞다 루비. 우리 엄마가 말이야, 또 집에서 저녁 식사 같이하지 않겠냐고 하더라」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そうなの？\u3000わかった、バイトのシフトを調整しておくわね」"
translation = "「정말? 알았어, 아르바이트 교대 근무 조정을 해둘게」"

[[dialogue]]
speaker = "unk"
original = "学業と星騎士活動とアルバイト、すべてをこなすのは大変だけれど……とても楽しい。"
translation = "학업과 성기사 활동, 그리고 아르바이트까지 전부 소화해 내는 것은 힘들지만…… 정말이지 즐겁다."

[[dialogue]]
speaker = "unk"
original = "大交流で天界から留学する前は、こんなに楽しい日々が待っているだなんて思わなかった──"
translation = "대교류로 천계에서 유학 오기 전에는 이렇게 즐거운 나날이 기다리고 있을 줄은 상상도 못 했다──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「みんな、お疲れ様～！」"
translation = "「모두들 수고했어~!」"

[[dialogue]]
speaker = "unk"
original = "彼女はベアトリス──魔界からの留学生。"
translation = "그녀는 베아트리스── 마계에서 온 유학생."

[[dialogue]]
speaker = "unk"
original = "私と同じタイミングの大交流で人間界にやってきて、一番最初に友人となった吸血鬼の女の子で──"
translation = "나와 같은 시기에 대교류로 인간계에 와서 가장 먼저 친구가 된 흡혈귀 소녀로──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………？」"
translation = "「…………?」"

[[dialogue]]
speaker = "unk"
original = "……どうしてだろう、彼女の姿を見た瞬間、違和感を覚えてしまった。"
translation = "……어째서일까, 그녀의 모습을 본 순간 위화감이 엄습해 왔다."

[[dialogue]]
speaker = "？？？"
original = "『────ルヴィネ』"
translation = "『────루비네』"

[[dialogue]]
speaker = "？？？"
original = "『いけません──それ以上、そこにいては──』"
translation = "『안 됩니다── 더 이상 그곳에 머물러서는──』"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィ？\u3000どうかしたの、ぼーっとして」"
translation = "「루비? 무슨 일 있어? 멍하니 있고」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「えっ……あっ……いいえ。何でもないわ……」"
translation = "「엣…… 아…… 아니. 아무것도 아니야……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふふ。星徒会長さんはお疲れみたい。今日はお休みにして、みんなで遊びに行きましょうか」"
translation = "「후후. 성도회장님이 많이 피곤하신가 봐. 오늘은 이만 쉬고 다 함께 놀러 갈까?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「いいですね！\u3000美味しいものを食べに行きましょう！」"
translation = "「좋네요! 맛있는 거 먹으러 가요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あっ、それだったらとっておきのニンニク料理専門店があって──」"
translation = "「앗, 그렇다면 끝내주는 마늘 요리 전문점이 있는데──」"

[[dialogue]]
speaker = "unk"
original = "いつも通りの日常。何もおかしいことなんてない。"
translation = "평소와 다름없는 일상. 아무런 이상한 것도 없다."

[[dialogue]]
speaker = "unk"
original = "…………そう、よね？"
translation = "…………그렇지, 맞지?"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「はむっ！\u3000もぐっ！\u3000もぐもぐっ……！」"
translation = "「얌! 우걱! 우걱우걱……!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「わっ。プリンにシュークリーム、凄い量ですね……！\u3000ルヴィネ会長、これは？」"
translation = "「와아. 푸딩에 슈크림, 엄청난 양이네요……! 루비네 회장님, 이건 뭐죠?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「先日の出撃でチナが助けた子供が、桜十路の人だったらしくて。お礼が届いたのよ」"
translation = "「지난번 출격 때 치나가 구해준 아이가 사쿠라쥬로 집안의 아이였나 봐. 답례품이 도착했어」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「絶品だぞこれ！\u3000やっぱ人助けってのは最高だな！！」"
translation = "「이거 끝내주게 맛있어! 역시 사람을 돕는다는 건 최고군!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ルヴィもエステルも食べろ食べろ！\u3000グレイスが来ないうちが勝負だからな！」"
translation = "「루비도 에스텔도 어서 먹어! 그레이스가 오기 전에 승부를 봐야 하니까!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「あ、は、はい……」"
translation = "「아, 네, 네……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──グレイスからメッセージが来たわ。『飛んで向かいます』ですって」"
translation = "「──그레이스한테서 메시지가 왔어. 『날아서 가겠습니다』라는데」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「っ！？\u3000市国の外に出かけてるから、時間かかると思ってたのに──こうしちゃいられない！\u3000もぐもぐもぐっ！」"
translation = "「!? 시국 밖에 나가 있어서 시간 좀 걸릴 줄 알았는데── 이러고 있을 때가 아냐! 냠냠냠!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そ、そんなにがっついたら胸やけしてしまいますよ……！」"
translation = "「그, 그렇게 허겁지겁 먹으면 체한다고요……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふふふっ……」"
translation = "「후후훗……」"

[[dialogue]]
speaker = "unk"
original = "世界は平和そのもの。私が欲しいものは、全てここにある──でも。"
translation = "세계는 지극히 평화롭다. 내가 원하는 것은 전부 여기에 있어── 하지만."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふん、ふん、ふーん♪」"
translation = "「흠, 흠, 흠~♪」"

[[dialogue]]
speaker = "unk"
original = "花壇の花に、水やりをしているベアトを見ると、やっぱり胸がざわざわする──"
translation = "화단의 꽃에 물을 주고 있는 베아토를 보고 있으면 역시 가슴이 요동친다──"

[[dialogue]]
speaker = "unk"
original = "どこかがおかしい、そんな違和感を振り払うように……"
translation = "어딘가 이상하다는 느낌, 그런 위화감을 떨쳐버리듯……"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「チナったらもう……詰め込みすぎよ！\u3000あはははははっ！」"
translation = "「치나도 참 정말…… 너무 가득 채워 넣었잖아! 아하하하하하!」"

[[dialogue]]
speaker = "unk"
original = "笑わなければ──いけない気がした。"
translation = "웃지 않으면── 안 될 것만 같은 기분이 들었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「よーっし、撮るぞ～？\u3000祝、限定クレープゲット記念！」"
translation = "「좋아, 찍는다~? 축, 한정 크레이프 획득 기념!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「はむっ♪」"
translation = "「냠♪」"

[[dialogue]]
speaker = "unk"
original = "撮影される瞬間に、ベアトの持っているクレープにかじりつく。"
translation = "촬영되는 순간에 베아토가 들고 있는 크레이프를 베어 문다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「きゃ～っ！？」"
translation = "「꺄아~!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ルヴィ、どした？\u3000なんかずいぶんテンション高いじゃん」"
translation = "「루비, 왜 그래? 왠지 엄청 텐션이 높은데」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そう？\u3000私はいつもこんなじゃないかしら！」"
translation = "「그래? 난 항상 이렇지 않았나!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「お、お返しだよルヴィ！\u3000そっちのクレープ──はむんっ！」"
translation = "「보, 복수야, 루비! 그쪽 크레이프── 함냐!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ちょっ──わ、私の一口より絶対に大きいじゃない！？」"
translation = "「잠깐── 내 한 입보다 확실히 더 크잖아!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えへへ、お返しだもん！」"
translation = "「에헤헤, 복수다 뭐!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「やったわね～……お返しのお返しをしてあげるわ！」"
translation = "「이게 정말~…… 나도 똑같이 복수해 줄 거야!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「子供みたいだぞ、２人とも……もぐもぐ。んまいなコレ！」"
translation = "「애들 같네, 둘 다…… 우걱우걱. 진짜 맛있다, 이거!」"

[[dialogue]]
speaker = "unk"
original = "自分でもテンションがおかしいことは承知している。だけど……"
translation = "스스로도 텐션이 이상하다는 것은 자각하고 있다. 하지만……"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あはははははっ♪」"
translation = "「아하하하하하♪」"

[[dialogue]]
speaker = "unk"
original = "笑っていないと──"
translation = "웃고 있지 않으면──"

[[dialogue]]
speaker = "unk"
original = "怖くて、仕方がないの──"
translation = "무서워서 견딜 수가 없는걸──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………怖い。怖いわ……」"
translation = "「…………무서워. 무섭다고……」"

[[dialogue]]
speaker = "unk"
original = "この数日で──私の恐怖心は限界にまで膨れ上がっていた。"
translation = "요 며칠 사이── 나의 공포심은 한계치까지 팽창해 있었다."

[[dialogue]]
speaker = "unk"
original = "街全体に違和感がある。決定的なボタンを掛け違っているような、居心地の悪さ……"
translation = "거리 전체에 위화감이 든다. 결정적인 단추가 잘못 채워진 듯한 이 불편함……"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……セレスティア」"
translation = "「……세레스ティア」"

[[dialogue]]
speaker = "unk"
original = "大交流で留学してから、肌身離さず持ち続けているはずのデバイスを見ると、胸が締め付けられるように苦しい。"
translation = "대교류로 유학 온 이래로 항상 몸에 지니고 다녔을 디바이스를 보고 있으면 가슴이 미어질 듯이 괴롭다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「どうして、こんなにも苦しいの……？」"
translation = "「어째서 이렇게 괴로운 거지……？」"

[[dialogue]]
speaker = "？？？"
original = "『──それは、貴女が真実から目を背けているからです』"
translation = "『──그것은 당신이 진실로부터 눈을 돌리고 있기 때문입니다』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……っ！？\u3000また、この声……！\u3000誰、誰なの！？\u3000私をどうするつもり！？」"
translation = "「……!? 또 이 목소리……! 누구, 누구야!? 나를 어떻게 하려는 셈이야!?」"

[[dialogue]]
speaker = "？？？"
original = "『落ち着いてください……このままここにいては、貴女は本当に戻れなくなってしまいます』"
translation = "『진정하세요…… 이대로 여기에 있다가는 당신은 정말로 돌아갈 수 없게 됩니다』"

[[dialogue]]
speaker = "？？？"
original = "『本当に大切なものを、思い出してください……』"
translation = "『정말로 소중한 것을 떠올려 주세요……』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「やめて……大切なものは、ここにあるわ──」"
translation = "「그만해…… 소중한 것은 여기에 있어──」"

[[dialogue]]
speaker = "unk"
original = "ずっと。ずっとずっとずっと、欲しかった。それは全てここに──"
translation = "줄곧. 아주 오랜 세월 동안 갈구해 왔다. 그것은 전부 여기에──"

[[dialogue]]
speaker = "？？？"
original = "『いいえ。貴女の本当に大切なものは……ここではない場所に──』"
translation = "『아닙니다. 당신의 정말로 소중한 것은…… 여기가 아닌 다른 곳에──』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「………………ぁ」"
translation = "「………………아」"

[[dialogue]]
speaker = "？？？"
original = "『眼をそらさないで、受け入れるのです。そうでないと、貴女は本当に死んでしまう────』"
translation = "『눈을 돌리지 말고 받아들이는 것입니다. 그러지 않으면 당신은 정말로 죽어버립니다────』"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ぁ……ぁああぁあっ……！！」"
translation = "「……아…… 아아아앗……!!」"

[[dialogue]]
speaker = "unk"
original = "私は、ルヴィネ。"
translation = "나는 루비네."

[[dialogue]]
speaker = "unk"
original = "私は────女神の幼体。"
translation = "나는──── 여신의 유체."

[[dialogue]]
speaker = "unk"
original = "リクリエを起こすために遣わされ、そしてお父様に見捨てられて……今まさに死のうとしている、ただの抜け殻……"
translation = "리크리에를 일으키기 위해 보내졌고, 그리고 아버님께 버림받아…… 지금 이 순간 죽어가고 있는 그저 껍데기……"

[[dialogue]]
speaker = "unk"
original = "この世界は、死の間際の私が見た、<ruby>泡沫<rt>うたかた</rt></ruby>の夢──"
translation = "이 세계는 죽음의 기로에 선 내가 꾸는 물거품ruby>의 꿈──"

