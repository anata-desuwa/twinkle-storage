[[dialogue]]
speaker = "unk"
original = "第３話,豊胸ブートキャンプ,P"
translation = "제3화, 풍흉 부트캠프, P"

[[dialogue]]
speaker = "unk"
original = "とある日の放課後、星徒会室。"
translation = "어느 날 방과 후, 성도회실."

[[dialogue]]
speaker = "unk"
original = "そこには、いつになく真剣な表情をしたマトイの姿があった──"
translation = "그곳에는 평소와 다르게 진지한 표정을 지은 마토이의 모습이 있었다──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「紅明さん、私……リア充になりたいんです！」"
translation = "「코우메이 씨, 저…… 리얼충이 되고 싶어요!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ほほう……？」"
translation = "「호오……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうすれば、紅明さんみたいな人気者になれますか！？」"
translation = "「어떻게 하면 코우메이 씨 같은 인기인이 될 수 있을까요!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「なるほど、マトイっち、タレントのアタシみたいになりたいのか。それなら──」"
translation = "「과연, 마토이치, 탤런트인 나처럼 되고 싶은 거구나. 그렇다면──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「やはり……<b>おっぱい</b>っしょ！！！」"
translation = "「역시…… <b>가슴</b>이라구!!!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ねっ！！！\u3000ダーリン♪」"
translation = "「그치!!! 달링♪」"

[[dialogue]]
speaker = "unk"
original = "俺に話を振らないでくれるかな！？"
translation = "나한테 말을 돌리지 말아 줄래!?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そっか、やはりおっぱい……！\u3000おっぱいは全てを解決するんだ！」"
translation = "「그렇군요, 역시 가슴……! 가슴은 모든 것을 해결해 주는군요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だけど、紅明さんの胸が大きいのは遺伝だと思うし、私ではどうしようも……」"
translation = "「하지만 코우메이 씨의 가슴이 큰 건 유전이라고 생각하고, 저로서는 어찌할 도리가……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ちっちっち、甘いぜマトイっち。牛一族の女は意中の雄を魅了する為、いつだっておっぱいを大きくすることを考えて来た……」"
translation = "「쯧쯧쯧, 무르다구 마토이치. 우 씨 일족의 여자는 마음에 둔 수컷을 매료하기 위해 언제나 가슴을 크게 만드는 걸 생각해 왔어……」"

[[dialogue]]
speaker = "unk"
original = "（そうなの……！？）"
translation = "(정말이야……!?)"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「つまり、牛一族には２０００年研究を重ねて来た『豊胸術』が存在する……！」"
translation = "「즉, 우 씨 일족에게는 2000년 동안 연구를 거듭해 온 『풍흉술』이 존재한다……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まさか、そんなものが……！？」"
translation = "「설마 그런 것이……!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「その名も『豊胸ブートキャンプ』！」"
translation = "「그 이름하여 『풍흉 부트캠프』!」"

[[dialogue]]
speaker = "unk"
original = "（胡散臭さＭＡＸ！！！）"
translation = "(수상함 MAX!!!)"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「これを実践すれば、誰もが羨む魅力的なボディを手に入れられること間違いなしだぜ！\u3000どうだい？\u3000やるかい、マトイっち？」"
translation = "「이걸 실천하면 누구나 부러워할 매력적인 바디를 손에 넣을 수 있을 게 분명하다구! 어때? 해볼래, 마토이치?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はい！\u3000もちろん、やります！」"
translation = "「네! 물론 하겠습니다!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「なら、今日からアタシのことは教官と呼びな！\u3000返事は、サー・イエッサーだぜ！」"
translation = "「그럼 오늘부터 나를 교관이라고 불러! 대답은 서, 예스 서다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「サー・イエッサー！」"
translation = "「서, 예스 서!」"

[[dialogue]]
speaker = "unk"
original = "そうして、豊胸ブートキャンプの日々は始まった。"
translation = "그렇게 풍흉 부트캠프의 나날이 시작되었다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そう、えぐり込むように拳を繰り出すんだ！\u3000腕の筋肉よりも胸の筋肉を意識して！」"
translation = "「그래, 파고들듯이 주먹을 내지르는 거야! 팔 근육보다 가슴 근육을 의식해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「サー・イエッサー！」"
translation = "「서, 예스 서!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そして、体を徹底的に追い込んだ後は、ホルスタミンで回復！！！\u3000これを繰り返すことで、体が作られていくんだぜ！」"
translation = "「그리고 몸을 철저하게 몰아붙인 후에는 홀스타민으로 회복!!! 이걸 반복함으로써 몸이 만들어지는 거라구!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「もっとだマトイっち！\u3000お前ならもっとスクワットの回数をこなせるはずだ！」"
translation = "「더 해 마토이치! 너라면 스쿼트 횟수를 더 채울 수 있을 거다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「くっ……うおおっ！\u3000根性ぉぉぉ！」"
translation = "「큭…… 우오오! 근성이다아아!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いいぞマトイっち！\u3000お前の体は確実に進化していってるぞ！」"
translation = "「좋아 마토이치! 네 몸은 확실히 진화하고 있어!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「キレの良いパンチだ！\u3000初日からは想像できない程、動きがキレまくってるぞ、マトイっち！」"
translation = "「날카로운 펀치다! 첫날에는 상상도 못 할 정도로 움직임이 예리해졌어, 마토이치!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええ、分かります！\u3000自分でも体が進化していってるのが！」"
translation = "「네, 알 것 같아요! 제 스스로도 몸이 진화하고 있다는 게!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アナっちもいいぞ！\u3000着実に動きが良くなっている！」"
translation = "「아나치도 좋아! 착실하게 움직임이 좋아지고 있어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サー・イエッサー！」"
translation = "「서, 예스 서!」"

[[dialogue]]
speaker = "unk"
original = "何か１人増えてる！？"
translation = "어느샌가 한 명 늘어 있어!?"

[[dialogue]]
speaker = "unk"
original = "そんな日々が続いて、ついに──"
translation = "그런 나날이 이어지고 드디어──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「……完成だ、マトイっち！！！\u3000もうアタシから言うことは何もない！」"
translation = "「……완성이다, 마토이치!!! 이제 내가 더 해줄 말은 없어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ありがとうございます、教官。まるで生まれ変わったような気持ちです……」"
translation = "「감사합니다, 교관님. 마치 다시 태어난 듯한 기분이에요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今なら私……素手でモンスターを倒せる気がする！」"
translation = "「지금이라면 저…… 맨손으로 몬스터를 쓰러뜨릴 수 있을 것 같아요!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ああ、まさに完璧な筋肉だぜ！」"
translation = "「그래, 그야말로 완벽한 근육이다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええ、我ながら素晴らしい、無駄の無い筋肉……」"
translation = "「네, 제가 봐도 훌륭한, 군더더기 없는 근육……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「って、違ぁぁぁ──う！！！」"
translation = "「이 아니라, 아니자나아아──아!!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「おっぱいどこ行った！？\u3000私のおっぱいはどこに行っちゃったの、ねぇ！！」"
translation = "「가슴은 어디 갔어!? 내 가슴은 어디로 가버린 거야, 응!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いつから筋肉修行になったんですか、ブートキャンプ！？」"
translation = "「언제부터 근육 수행이 된 거예요, 부트캠프!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふっ……見て下さい会長、私もなかなか筋肉が付いてきました」"
translation = "「훗…… 보세요 회장님, 저도 제법 근육이 붙었습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナは何でちょっと嬉しそうなの！？」"
translation = "「아나는 왜 좀 기뻐 보이는 건데!?」"

[[dialogue]]
speaker = "unk"
original = "俺もブートキャンプやってみようかな"
translation = "나도 부트캠프 한번 해볼까"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おっ、ダーリンやる？\u3000おけまる～☆」"
translation = "「오, 달링 할래? 오케바리~☆」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、趣旨変わってるし！！」"
translation = "「아니, 취지가 바뀌었잖아!!」"

[[dialogue]]
speaker = "unk"
original = "後日、スレンダーになったマトイはバストサイズが少し小さくなり、筋肉質になったことで体重が増え、クラスの女子達から人気者になるのだった。"
translation = "훗날, 슬렌더해진 마토이는 가슴 사이즈가 조금 작아지고 근육질이 된 탓에 체중이 늘어, 반 여자애들 사이에서 인기인이 되었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「全然嬉しくないんだけど！？」"
translation = "「전혀 기쁘지 않은데!?」"

