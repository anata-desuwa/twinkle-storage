[[dialogue]]
speaker = "unk"
original = "第３話,アニマ凸凹コンビネーション,P"
translation = "제3화, 아니마 울퉁불퉁 콤비네이션"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。俺が星徒会室に行くと、アニマ先輩とアナが何やら話していた。"
translation = "어느 날 방과 후. 내가 성도회실에 가자 아니마 선배와 아나가 무언가 이야기하고 있었다."

[[dialogue]]
speaker = "アニマ"
original = "「やあ、お邪魔しているヨ、会長」"
translation = "「야아, 실례하고 있다요, 회장.」"

[[dialogue]]
speaker = "アナ"
original = "「お疲れ様です、会長。頼まれていた資料の作成はやっておきましたので、ノープロブレムです」"
translation = "「수고하셨습니다, 회장. 부탁하신 자료 작성은 해두었으니 노 프라블럼입니다.」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。２人は何を話していたの？"
translation = "고마워. 둘이 무슨 얘기 하고 있었어?"

[[dialogue]]
speaker = "アニマ"
original = "「実はまた、新しい薬を発明してネ。今回はアナに試して貰うのが有効だと思い、協力を依頼してたところサ」"
translation = "「사실 또 새로운 약을 발명했다요. 이번에는 아나에게 시험하게 하는 게 유효하다고 생각해서 협력을 의뢰하던 참이라다.」"

[[dialogue]]
speaker = "アナ"
original = "「不本意ですが、和菓子の提供が条件ならば仕方がありません。アニマ先輩の作る和菓子は、神聖さを感じるほどに美味しいので……」"
translation = "「내키지는 않지만, 화과자 제공이 조건이라면 어쩔 수 없습니다. 아니마 선배가 만드는 화과자는 신성함이 느껴질 정도로 맛있으니까요……」"

[[dialogue]]
speaker = "アニマ"
original = "「お菓子作りは錬金術と似ているからナ。こう見えて、薬を作る際にも味には拘る派なんだヨ♪」"
translation = "「과자 만들기는 연금술과 비슷하니까다다. 이래 봬도 약을 만들 때도 맛에는 구애되는 파라다요♪」"

[[dialogue]]
speaker = "アナ"
original = "「先輩は薬ではなく和菓子だけ作ってて下さい。そして、女神様と私に休みなく捧げ続けて下さい」"
translation = "「선배는 약 말고 화과자만 만드세요. 그리고 여신님과 저에게 쉴 새 없이 바치도록 하세요.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ、酷いナァ。せっかくアナが実験しやすいように、薬をこうして和菓子の形に仕上げたというのに」"
translation = "「후히히, 너무하다다로우. 모처럼 아나가 실험하기 편하도록 약을 이렇게 화과자 형태로 완성했는데 말이다다.」"

[[dialogue]]
speaker = "unk"
original = "２人は仲が良いんだな"
translation = "둘은 사이가 좋네"

[[dialogue]]
speaker = "アニマ"
original = "「その通りダ。まるで姉妹のように仲が良いとも」"
translation = "「그 말대로다다. 마치 자매처럼 사이가 좋다다로우.」"

[[dialogue]]
speaker = "アナ"
original = "「ノー。事実無根です。アニマ先輩が時々、和菓子を盾に実験を迫って来ているだけです」"
translation = "「노. 사실무근입니다. 아니마 선배가 가끔 화과자를 방패 삼아 실험을 강요하고 있을 뿐입니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「おやおや、ならば仕方ないナ。この実験は、会長に手伝って貰うとしよう」"
translation = "「오야오야, 그렇다면 어쩔 수 없다다로우. 이 실험은 회장에게 도움을 받기로 하겠다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「今回の実験薬は、和菓子としても美味しく出来たと思ったんだがナ……実験が嫌なら仕方がない」"
translation = "「이번 실험약은 화과자로서도 맛있게 됐다고 생각했다만…… 실험이 싫다면 어쩔 수 없지다다.」"

[[dialogue]]
speaker = "アナ"
original = "「短慮軽率です、アニマ先輩。姉妹のように仲の良い私が、その和菓子──いえ、薬を服用するに決まっているでしょう。会長に実験の代役をさせるわけにも行きませんからね、ええ」"
translation = "「단려경솔합니다, 아니마 선배. 자매처럼 사이좋은 제가 그 화과자── 아니, 약을 복용하는 건 당연하잖아요. 회장님께 실험 대역을 시킬 수는 없으니까요, 네.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒッ。さすがはアニマの心の姉妹だヨ、アナ。可愛い妹ダ、よしよし♪」"
translation = "「후히히. 역시 아니마의 마음의 자매다요, 아나. 귀여운 동생이라다, 착하지 착해♪」"

[[dialogue]]
speaker = "アナ"
original = "「雑な撫で方は髪が乱れるので止めて貰えますか、オネエチャン」"
translation = "「대충 쓰다듬으면 머리 헝클어지니까 그만해주시겠어요, 언니.」"

[[dialogue]]
speaker = "unk"
original = "ところで、その薬は一体どういう効果があるんだ？"
translation = "그런데 그 약은 대체 어떤 효과가 있는 거야?"

[[dialogue]]
speaker = "アニマ"
original = "「ああ、これカ？\u3000戦闘中の連携向上を目指したもので、名付けて『絆アップ薬』ダ」"
translation = "「아아, 이거냐로우? 전투 중의 연계 향상을 목표로 한 것으로 이름하여 『유대 업 약』이라다.」"

[[dialogue]]
speaker = "アナ"
original = "「胡散臭さ全開ですが……これを食べると絆がアップして、私とアニマ先輩のように不仲であっても、お互いの気持ちがわかるようになるとか……もぐもぐ、美味しいです……」"
translation = "「수상함이 가득합니다만…… 이걸 먹으면 유대가 올라가서 저와 아니마 선배처럼 사이가 나빠도 서로의 마음을 알게 된다든가…… 우물우물, 맛있네요……」"

[[dialogue]]
speaker = "アニマ"
original = "「ン？\u3000どうしたんだい会長、怪訝そうな顔をして」"
translation = "「응? 왜 그러냐로우 회장, 의아한 표정으로.」"

[[dialogue]]
speaker = "unk"
original = "何だかそれって……一種の惚れ薬みたいな……"
translation = "왠지 그거…… 일종의 사랑의 묘약 같은……"

[[dialogue]]
speaker = "アニマ"
original = "「フム？\u3000……なるほど。言われてみれば、そうかもしれないナ。……おや、アナ？」"
translation = "「후무? ……과연. 듣고 보니 그럴지도 모르겠다다. ……오야, 아나?」"

[[dialogue]]
speaker = "アナ"
original = "「むふー……会長っ」"
translation = "「무후─…… 회장님.」"

[[dialogue]]
speaker = "unk"
original = "あ、アナ、いきなり抱き付いてどうした！？"
translation = "아, 아나, 갑자기 매달려서 왜 그래!?"

[[dialogue]]
speaker = "unk"
original = "おわぁっ！？"
translation = "우왓!?"

[[dialogue]]
speaker = "アナ"
original = "「……感情が制御不能。よって、申し訳ありませんが、予定を大幅に前倒しして、既成事実を作る為の作戦に移行します」"
translation = "「……감정 제어 불능. 따라서 죄송합니다만 예정을 대폭 앞당겨 기성사실을 만들기 위한 작전으로 이행하겠습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「？\u3000……既成事実は既成事実です。第一段階として、キスが有効手段と考えます」"
translation = "「? ……기성사실은 기성사실입니다. 제1단계로서 키스가 유효 수단이라고 판단합니다.」"

[[dialogue]]
speaker = "アナ"
original = "「何故慌てるのです、会長。事前計算によれば、私への好感度は他の星徒会メンバーと比較しても五分。十分勝算があるところまで上がっていたはず……」"
translation = "「왜 당황하시나요, 회장님. 사전 계산에 따르면 저에 대한 호감도는 다른 성도회 멤버와 비교해도 동등. 충분히 승산이 있는 곳까지 올라와 있었을 텐데……」"

[[dialogue]]
speaker = "アニマ"
original = "「止めたまえ、アナ。薬の効果とはいえ暴走し過ぎだゾ。会長が嫌がってるダロウ？」"
translation = "「그만둬라다, 아나. 약 효과라곤 해도 너무 폭주하고 있다다로우. 회장이 싫어하고 있지 않냐로우?」"

[[dialogue]]
speaker = "アナ"
original = "「これは私と会長の問題なので、邪魔しないで下さい。というか……アニマ先輩も、何さりげなく会長に抱き付いてるんですか」"
translation = "「이건 저와 회장님의 문제니까 방해하지 마세요. 그보다…… 아니마 선배도 왜 슬그머니 회장님께 매달려 있는 건가요.」"

[[dialogue]]
speaker = "アニマ"
original = "「会長、もう心配しなくて大丈夫だゾ。キミのことは、研究パートナーとしてアニマが守るとも」"
translation = "「회장, 이제 걱정 안 해도 된다다로우. 너는 연구 파트너로서 아니마가 지키겠다다.」"

[[dialogue]]
speaker = "アナ"
original = "「アニマ先輩も私と同じで、事前に『絆アップ薬』、食べてましたよね？\u3000相互に服用することで、連携が完成するとかで」"
translation = "「아니마 선배도 저랑 똑같이 사전에 『유대 업 약』 먹었었죠? 상호 복용함으로써 연계가 완성된다면서요.」"

[[dialogue]]
speaker = "アニマ"
original = "「ああ、確かに薬は食べタ。だからこそ、アニマにはアナの暴走を止める責任がある」"
translation = "「아아, 확실히 약은 먹었다다. 그렇기에 아니마에게는 아나의 폭주를 멈출 책임이 있다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「──会長と既成事実を作るのは、研究パートナーであるアニマだ<emoji=heart04>\u3000キミではなイ」"
translation = "「──회장과 기성사실을 만드는 건 연구 파트너인 아니마라다<emoji=heart04> 네가 아니다다.」"

[[dialogue]]
speaker = "unk"
original = "先輩も思いっきり暴走してるぅぅぅ──ッ！？"
translation = "선배도 엄청나게 폭주하고 있잖아아아──악!?"

[[dialogue]]
speaker = "アニマ"
original = "「おっと会長、逃がさないゾ？\u3000キミの逃走にはもう慣れている。……アナ！」"
translation = "「오옷 회장, 놓치지 않겠다다로우? 너의 도주는 이미 익숙하다다. ……아나!」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレム。言われずとも、既に入り口の前に待機済みです」"
translation = "「노 프라블럼. 말하지 않아도 이미 입구 앞에 대기 중입니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「上出来ダ。逃げられては元も子もない」"
translation = "「잘했다다. 놓쳐버리면 아무 소용도 없지다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「よって、既成事実は二人一緒に作るということでどうダ？」"
translation = "「따라서 기성사실은 둘이 함께 만드는 걸로 어떠냐로우?」"

[[dialogue]]
speaker = "アナ"
original = "「不本意ですが……合理的な利害一致の結論として了承。アニマ先輩、挟み撃ちのカウントをお願いします」"
translation = "「내키지는 않지만…… 합리적인 이해 일치의 결론으로서 승낙. 아니마 선배, 협공 카운트 부탁드립니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「いいとも。カウント、スリー、ツー、ワン、ゼ……ロ……」"
translation = "「좋다다로우. 카운트, 쓰리, 투, 원, 제…… 로……」"

[[dialogue]]
speaker = "アナ"
original = "「急に……眠気が……ふにゃあ……」"
translation = "「갑자기…… 졸음이…… 후냐아……」"

[[dialogue]]
speaker = "unk"
original = "どうやら……薬の副作用は、急激な眠気であったらしい。"
translation = "아무래도…… 약의 부작용은 급격한 졸음이었던 모양이다."

[[dialogue]]
speaker = "unk"
original = "た、助かった……"
translation = "사, 살았다……"

[[dialogue]]
speaker = "unk"
original = "それにしても、恐ろしく息の合ったコンビネーションだった。"
translation = "그나저나 무서울 정도로 호흡이 척척 맞는 콤비네이션이었다."

[[dialogue]]
speaker = "unk"
original = "後日──"
translation = "며칠 뒤──"

[[dialogue]]
speaker = "アナ"
original = "「あっ、会長……きゅ、急用を思い出したので失礼します……」"
translation = "「앗, 회장님…… 구, 급한 일이 생각나서 실례하겠습니다……」"

[[dialogue]]
speaker = "アニマ"
original = "「っ……おっとすまなイ！\u3000今は実験で忙しくてネ！」"
translation = "「윽…… 오옷 미안하다다! 지금은 실험으로 바빠서 말이다다!」"

[[dialogue]]
speaker = "unk"
original = "顔を合わせるとそっくりな反応で恥ずかしそうに逃げ出す２人の反応を見て、やはり似た者同士だと思うのであった。"
translation = "마주치면 똑같은 반응으로 부끄러워하며 도망치는 두 사람의 반응을 보고 역시 닮은꼴이라고 생각하는 것이었다."

