[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「ど、どうして勝てないの？」"
translation = "「어, 어째서 이길 수 없는 거지?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「私に足りないものがあるっていうの……？\u3000動きをより速く……いえ、よく狙って撃つべき？」"
translation = "「나한테 부족한 게 있다는 거야……? 움직임을 더 빠르게…… 아니, 잘 조준해서 쏴야 하나?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「きっと戦えばわかるはずよ。だから──もっと勝負よ！」"
translation = "「분명 싸워보면 알 수 있을 거야. 그러니까── 좀 더 승부야!」"

