[[dialogue]]
speaker = "unk"
original = "第１２話,真実の一太刀,B"
translation = "제12화, 진실의 일태도, B"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『……なるほど、な』"
translation = "『……과연, 그렇군.』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っ……まだ動けるの……！？」"
translation = "「윽…… 아직 움직일 수 있는 거야……!?」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『動きは上々──だが……まだ、未知の力に体が追いついていないようだな』"
translation = "『움직임은 훌륭하다── 하지만…… 아직, 미지의 힘에 몸이 따라가지 못하는 모양이군.』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──ッ！」"
translation = "「──윽!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──フィオナッ！」"
translation = "「──피오나!」"

[[dialogue]]
speaker = "unk"
original = "それまで全体へ<ruby>敷衍<rt>ふえん</rt></ruby>させていた奴の霊力が──黒き剣の切っ先へと集約していく。"
translation = "그때까지 전체로 확산시키고 있던 녀석의 영력이── 검은 검의 칼끝으로 집약된다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『よく粘ったが──これで終わりだ。片割れさえいなくなれば、私には及びもしない──！』"
translation = "『잘 버텼지만── 이걸로 끝이다. 한쪽 짝만 없어진다면, 나에게 미치지도 못해──!』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "（まずいニャッ──！）"
translation = "（위험한 냥──!）"

[[dialogue]]
speaker = "unk"
original = "これまでの戦いで一度も見せていなかった──横薙ぎに滑らせるような一閃がフィオナの喉元へ迫る。"
translation = "지금까지의 싸움에서 한 번도 보여주지 않았던── 옆으로 휩쓸듯이 미끄러지는 일섬이 피오나의 목덜미로 다가온다."

[[dialogue]]
speaker = "unk"
original = "──だが。"
translation = "──하지만."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──読んでたよ」"
translation = "「──읽고 있었다.」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『──！？』"
translation = "『──!?』"

[[dialogue]]
speaker = "unk"
original = "完全な不意打ちであったはずの斬り払い──"
translation = "완벽한 기습이었을 터인 베어 넘기기──"

[[dialogue]]
speaker = "unk"
original = "その始点となる刺突による差し込みを一点で食い止める。そしてこちらも──"
translation = "그 시점이 되는 찌르기에 의한 꽂아 넣기를 한 지점에서 막아낸다. 그리고 이쪽도──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これで──終わりだッ！」"
translation = "「이걸로── 끝이다!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『ぐ──はァァッ！！』"
translation = "『그──하아앗!!』"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん──！？」"
translation = "「히노미야 군──!?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「や──やったかニャ──！？」"
translation = "「해── 해낸 거냐옹──!?」"

[[dialogue]]
speaker = "unk"
original = "崩れた重心へ追い打ちをかけるような渾身の正拳──"
translation = "무너진 무게중심에 쐐기를 박듯이 가하는 혼신의 정권──"

[[dialogue]]
speaker = "unk"
original = "全ての力を切っ先に注ぎ込んでいた彼に、この一撃を受けきる術はなかった。"
translation = "모든 힘을 칼끝에 쏟아붓고 있던 그에게, 이 일격을 받아낼 방법은 없었다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『ぐ──はっ……！\u3000なぜ──わかっ、た……私の太刀筋が──っ……！？』"
translation = "『그──핫……! 왜── 알, 아낸 것이냐…… 나의 검술이──윽……!?』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかるさ。おまえは……いや。<b>あなた</b>は必ず最後には、首から胸への斬り払いでとどめを刺そうとする」"
translation = "「알 수 있지. 너는…… 아니. <b>당신</b>은 반드시 마지막에는, 목에서 가슴으로 베어 넘기며 마무리를 지으려 한다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この前も……あの時だって、そうだった」"
translation = "「이전에도…… 그때도, 그랬다.」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『────』"
translation = "『────』"

[[dialogue]]
speaker = "unk"
original = "黒き鎧に身をまとった男の剣術は──その邪悪な波動とは裏腹に、最後まで美しかった。"
translation = "검은 갑옷을 두른 남자의 검술은── 그 사악한 파동과는 정반대로, 마지막까지 아름다웠다."

[[dialogue]]
speaker = "unk"
original = "そうして俺の拳を受けた彼の兜が、今……ぱっくりと、割れる。"
translation = "그렇게 나의 주먹을 받은 그의 투구가, 지금…… 쩍, 하고 갈라진다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「な──っ……！？」"
translation = "「뭐──윽……!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あなた──は──……」"
translation = "「당신──은──……」"

[[dialogue]]
speaker = "unk"
original = "たとえ顔が見えなくとも──俺には、彼の剣さばきだけでわかってしまった。"
translation = "설령 얼굴이 보이지 않더라도── 나에게는, 그의 검술만으로도 알아챌 수 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ようやく馬脚を現しましたね、黒騎士──いえ。セイファート学園長」"
translation = "「드디어 정체를 드러내셨군요, 검은 기사── 아니. 세이퍼트 학원장.」"

