[[dialogue]]
speaker = "unk"
original = "第１話,アポロが目覚めて,P"
translation = "제1화, 아폴로가 깨어나고"

[[dialogue]]
speaker = "unk"
original = "森羅暦において二度目となるリクリエ危機を乗り越えた俺たちは、教皇庁の一室に集まっていた。"
translation = "삼라력에서 두 번째가 되는 리크리에 위기를 극복한 우리들은, 교황청의 한 방에 모여 있었다."

[[dialogue]]
speaker = "unk"
original = "世界を跨いでやってきた、デネブ世界のアポロが帰った今……待ちわびたその時が近づいていたから。"
translation = "세계를 건너온 데네브 세계의 아폴로가 돌아간 지금…… 고대하던 그 순간이 다가오고 있었으니까."

[[dialogue]]
speaker = "unk"
original = "そう──俺たちの暮らすアルタイル世界の『アポロ』。本来の星見家の長女、フィオナの双子の姉が目を覚ます時なんだ──"
translation = "그래── 우리들이 사는 알타이르 세계의 『아폴로』. 본래 호시미 가문의 장녀이자 피오나의 쌍둥이 언니가 눈을 뜰 시간이다──"

[[dialogue]]
speaker = "unk"
original = "５年の時を経ての覚醒を星見家全体へ周知するため、駆け出そうとする俺たちを止めたのは、他ならぬアポロ本人だった。"
translation = "5년의 시간을 거친 각성을 호시미 가문 전체에 알리기 위해 달려 나가려던 우리를 멈춰 세운 것은, 다름 아닌 아폴로 본인이었다."

[[dialogue]]
speaker = "unk"
original = "まずはお前たちと話がしたい──彼女はそう言った。"
translation = "우선 너희와 이야기를 하고 싶어── 그녀는 그렇게 말했다."

[[dialogue]]
speaker = "アポロ"
original = "「……っと。すまない、着替えに手間取った」"
translation = "「……윽. 미안, 갈아입는 데 시간이 좀 걸렸어」"

[[dialogue]]
speaker = "アポロ"
original = "「ふぅ……やっぱりまだフラフラするな……」"
translation = "「후우…… 역시 아직 비틀비틀하네……」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん、無理はしないでください。５年も寝たきりだったんですから……」"
translation = "「언니, 무리는 하지 마세요. 5년이나 계속 누워 계셨으니까요……」"

[[dialogue]]
speaker = "アポロ"
original = "「いい、大丈夫だ。体の方はなまっているが……頭はしゃんとしてる。話ができないほどじゃない」"
translation = "「아니, 괜찮아. 몸은 둔해졌지만…… 머리는 또렷해. 대화를 못 할 정도는 아니야」"

[[dialogue]]
speaker = "アポロ"
original = "「人を呼べば落ち着いて話もできないだろ？\u3000それは困るんだ。魔王……それにエリシア。他のみんなにも、伝えておきたい」"
translation = "「사람을 부르면 차분하게 이야기할 수도 없잖아? 그건 곤란해. 마왕…… 그리고 엘리시아. 다른 모두에게도 전해두고 싶어」"

[[dialogue]]
speaker = "アポロ"
original = "「今のあたしがどんな状態になっているのか。これからどうしようと思っているのか……迷惑をかけてきたお前たちにまず、伝えたいんだ」"
translation = "「지금의 내가 어떤 상태인지. 앞으로 어떻게 하려고 하는지…… 폐를 끼쳐온 너희에게 우선 전하고 싶어」"

[[dialogue]]
speaker = "unk"
original = "その場にいる全員──新星学園と流星学園の星徒会メンバーたちが頷く。"
translation = "그 자리에 있는 전원── 신성 학원과 유성 학원의 성도회 멤버들이 고개를 끄덕인다."

[[dialogue]]
speaker = "フィオナ"
original = "「わかりました。では姉さん、今までのことの説明から……」"
translation = "「알겠습니다. 그럼 언니, 지금까지 있었던 일의 설명부터……」"

[[dialogue]]
speaker = "アポロ"
original = "「いや、その必要はない。あたしが眠ってからの５年間……流星市国で何が起き、先日のリクリエ防衛にまで至ったのか」"
translation = "「아니, 그럴 필요는 없어. 내가 잠든 뒤로 5년간…… 유성시국에서 무슨 일이 일어났고, 요전번의 리크리에 방어에 이르기까지」"

[[dialogue]]
speaker = "アポロ"
original = "「<b>全て見聞きして、知っている</b>からな」"
translation = "「<b>전부</b> <b>보고</b> <b>들어서</b>, <b>알고</b> <b>있으니까</b>」"

[[dialogue]]
speaker = "unk"
original = "精神が同調していた……？"
translation = "정신이 동조하고 있었다……?"

[[dialogue]]
speaker = "unk"
original = "きみはデネブ世界のアポロと"
translation = "너는 데네브 세계의 아폴로와"

[[dialogue]]
speaker = "アポロ"
original = "「そうだ。アルタイルのあたしと、デネブからやってきて、リクリエの使徒としてお前たちと相対したアポロ」"
translation = "「그래. 알타이르의 나와, 데네브에서 건너와 리크리에의 사도로서 너희와 상대했던 아폴로」"

[[dialogue]]
speaker = "アポロ"
original = "「存在は異なっても本質は同じだ。デネブのアポロが見聞きしたことは全て、あたしの記憶に刻まれている」"
translation = "「존재는 달라도 본질은 같아. 데네브의 아폴로가 보고 들은 것은 전부 내 기억에 새겨져 있어」"

[[dialogue]]
speaker = "アポロ"
original = "「みんな……すまなかった。こんなことになったのは全てあたしの責任だ」"
translation = "「모두들…… 미안했다. 이렇게 된 건 전부 내 책임이야」"

[[dialogue]]
speaker = "アポロ"
original = "「デネブのアポロがリクリエの使徒として現れたのも、アルタイルのあたしが共鳴してしまったからだ」"
translation = "「데네브의 아폴로가 리크리에의 사도로 나타난 것도, 알타이르의 내가 공명해 버렸기 때문이야」"

[[dialogue]]
speaker = "アポロ"
original = "「星見家長女の重責……誰にも相談できないと思い込んで自棄になり……こんな世界はなくなってしまえばいいと、リクリエを望んでしまったから」"
translation = "「호시미 가문 장녀라는 중책…… 누구에게도 상담할 수 없다고 단정 짓고 자포자기해서…… 이런 세계 따위 없어져 버리면 좋겠다고 리크리에를 바랐으니까」"

[[dialogue]]
speaker = "アポロ"
original = "「心の弱さを突かれた結果がこれだ。魔王にエリシア、それに世界中の人達にどんな顔を向ければいいのか……」"
translation = "「마음의 약점을 찔린 결과가 이거다. 마왕과 엘리시아, 그리고 전 세계 사람들에게 어떤 얼굴을 해야 할지……」"

[[dialogue]]
speaker = "アポロ"
original = "「償う方法も、目覚めるまでに色々考えた。家名に泥を塗った身だ。流星市国から姿を消すか。そうでなくとも星見家からは去るべきか……とな」"
translation = "「속죄할 방법도 깨어나기 전까지 여러 가지로 생각했어. 가문의 이름에 먹칠을 한 몸이다. 유성시국에서 자취를 감출지, 그렇지 않더라도 호시미 가문은 떠나야 할지…… 하고 말이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さん……！？」"
translation = "「언니……!?」"

[[dialogue]]
speaker = "アポロ"
original = "「でも──それは逃げだよな。だからもう１人のあたしが語ったあの言葉を、アルタイルのあたしからも誓わせてもらいたい」"
translation = "「하지만── 그건 도망치는 거겠지. 그러니까 또 하나의 내가 했던 그 말을, 알타이르의 나로서도 맹세하게 해줘」"

[[dialogue]]
speaker = "アポロ"
original = "「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」"
translation = "「잔뜩 폐를 끼쳐서…… 미안했다. 이번에야말로 진짜 히어로가 될 수 있도록 노력해 볼게」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしには星の力も、あの戦いで目覚めた<ruby>星見家<rt>まおう</rt></ruby>の力もある。使徒としての再創生の力は当然失ったが、役に立てるはずだ」"
translation = "「나에게는 별의 힘도, 그 전투에서 눈뜬 <ruby>호시미 가문<rt>마왕</rt></ruby>의 힘도 있어. 사도로서의 재창생의 힘은 당연히 잃었지만, 도움이 될 수 있을 거야」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしは……今度こそ本当の流星ライダーになりたい。だから引き続き、あたしのことは『アポロ』と呼んでくれ。『フィオナ』の名前はエリシアに譲ったからな」"
translation = "「나는…… 이번에야말로 진짜 유성 라이더가 되고 싶어. 그러니까 계속해서 나를 『아폴로』라고 불러줘. 『피오나』라는 이름은 엘리시아에게 양보했으니까」"

[[dialogue]]
speaker = "アポロ"
original = "「もちろん、どれもこれも、お前たちが受け入れてくれればの話だけど……」"
translation = "「물론 이 모든 건 너희가 받아들여 준다는 전제하의 이야기지만……」"

[[dialogue]]
speaker = "unk"
original = "アポロの戦いはみんなが見ていたんだから"
translation = "아폴로의 싸움은 모두가 지켜봤으니까"

[[dialogue]]
speaker = "unk"
original = "反対する人はいないよ"
translation = "반대할 사람은 없어"

[[dialogue]]
speaker = "アポロ"
original = "「うん……ありがとう」"
translation = "「응…… 고마워」"

[[dialogue]]
speaker = "アポロ"
original = "「他にも何か手土産の情報でもあれば、お前たちの役に立てたんだろうが……」"
translation = "「그 밖에 뭔가 선물할 만한 정보라도 있으면 너희에게 도움이 됐겠지만……」"

[[dialogue]]
speaker = "アポロ"
original = "「デネブのアポロが知らなかったことは、あたしにもわからないんだ。例えば『使徒を誰が生み出しているのか』なんかだな」"
translation = "「데네브의 아폴로가 몰랐던 건 나도 알 수 없어. 예를 들면 『사도를 누가 만들어내고 있는가』 같은 거 말이야」"

[[dialogue]]
speaker = "アポロ"
original = "「私があの仮面に飲み込まれていた時……頭の中にあったのは、ただただリクリエを遂行しようとする使命感だけだった」"
translation = "「내가 그 가면에 삼켜져 있었을 때…… 머릿속에 있었던 건 그저 리크리에를 수행하려는 사명감뿐이었어」"

[[dialogue]]
speaker = "アポロ"
original = "「リクリエにまつわる再創生の力がなぜ使えたのか。どうやってモンスターを生み出していたのか……その仕組みすら……」"
translation = "「리크리에에 얽힌 재창생의 힘을 왜 쓸 수 있었는지, 어떻게 몬스터를 만들어냈는지…… 그 구조조차……」"

[[dialogue]]
speaker = "unk"
original = "直感的にわかるような感じか"
translation = "직감적으로 아는 듯한 느낌인가"

[[dialogue]]
speaker = "unk"
original = "力の使い方だけが"
translation = "힘을 사용하는 법만"

[[dialogue]]
speaker = "アポロ"
original = "「そういうことだ。力になれなくて、すまない」"
translation = "「그런 셈이야. 힘이 되어주지 못해서 미안해」"

[[dialogue]]
speaker = "アポロ"
original = "「だがあたしにできることがあれば何でも言ってくれ。期待に添えるよう、応えるつもりだ」"
translation = "「하지만 내가 할 수 있는 게 있다면 뭐든 말해줘. 기대에 부응하도록 노력할 생각이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「何でも、ですか。では姉さん。まず１つ……あまり無理な喋り方はしないでください」"
translation = "「뭐든지, 인가요. 그럼 언니. 우선 하나…… 너무 무리한 말투는 쓰지 말아 주세요」"

[[dialogue]]
speaker = "アポロ"
original = "「……無理な喋り方？」"
translation = "「……무리한 말투?」"

[[dialogue]]
speaker = "フィオナ"
original = "「名前だけではなく、星見家の『フィオナ』の役回りは私が継いでいます」"
translation = "「이름뿐만 아니라, 호시미 가문의 『피오나』로서의 역할은 제가 잇고 있어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さんは、眠りに就く前の……その体に見合った、背伸びをしない喋り方をして欲しいんです」"
translation = "「언니는 잠들기 전의…… 그 몸에 어울리는, 허세 부리지 않는 말투를 써주셨으면 해요」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さんは元々わんぱくで、ジッとしていられない性格だったでしょう？」"
translation = "「언니는 원래 장난꾸러기에 가만히 있지 못하는 성격이었잖아요?」"

[[dialogue]]
speaker = "unk"
original = "言われて俺も思い出す──初めてアポロと出会ったのは、流星教皇の説教から抜け出して、走ってきた彼女とぶつかったんだっけ。"
translation = "그 말을 듣고 나도 떠올린다── 처음 아폴로와 만난 건 유성 교황의 설교에서 빠져나와 달려오던 그녀와 부딪혔을 때였던가."

[[dialogue]]
speaker = "unk"
original = "──あれが元々のアポロ。フィオナのお姉さんの性格だったな。"
translation = "──저게 원래의 아폴로. 피오나 언니의 성격이었지."

[[dialogue]]
speaker = "フィオナ"
original = "「無理をせず、自然体のままで大丈夫です。今のような真面目な喋り方はしないでいいんですよ、姉さん」"
translation = "「무리하지 말고 자연스러운 모습 그대로면 괜찮아요. 지금 같은 진지한 말투는 쓰지 않아도 돼요, 언니」"

[[dialogue]]
speaker = "アポロ"
original = "「──うん。ありがとな……『フィオナ』」"
translation = "「──응. 고마워…… 『피오나』」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。姉さんはアポロ。私はフィオナと、これまで通り名乗っていきましょう──でも」"
translation = "「네. 언니는 아폴로, 저는 피오나라고 지금까지처럼 자칭하며 지내요── 하지만」"

[[dialogue]]
speaker = "アポロ"
original = "「……でも？」"
translation = "「……하지만?」"

[[dialogue]]
speaker = "フィオナ"
original = "「誰もいない時。姉妹２人だけの時は、エリシア、と呼んでいただければ」"
translation = "「아무도 없을 때, 자매 둘뿐일 때는 엘리시아라고 불러주신다면……」"

[[dialogue]]
speaker = "アポロ"
original = "「……ああ。わかった。約束だ」"
translation = "「……아아. 알았어. 약속이야」"

[[dialogue]]
speaker = "unk"
original = "この後、星見家の長女が目を覚ましたことが、ごくごくわずかな人へのみ伝えられた。"
translation = "이후 호시미 가문의 장녀가 눈을 떴다는 사실은 아주 극소수의 사람에게만 전해졌다."

[[dialogue]]
speaker = "unk"
original = "表向き、アポロは星見家の養子ということで、フィオナの暮らす屋敷へ居候をするということで落ち着いたのだった──"
translation = "대외적으로 아폴로는 호시미 가문의 양자로서 피오나가 사는 저택에 얹혀사는 것으로 일단락되었다──"

