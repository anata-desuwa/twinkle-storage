[[dialogue]]
speaker = "unk"
original = "第１話,モーニングバニー,P"
translation = "「후우❤️ 훙, 훙, 훙❤️ 하아앗, 후우우읏❤️ 훙, 훙, 훙❤️ 응응, 후우우읏❤️ 하아앗, 후우우읏❤️ 훙, 훙❤️ 응응……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「も～♪\u3000会長ってば、リビングで寝ちゃうなんてダメだな～♪」"
translation = "제1화, 모닝 바니, P"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら会長、朝だよ～♪\u3000起きてー？」"
translation = "「정말♪ 회장도 참, 거실에서 자버리면 안 되지~♪」"

[[dialogue]]
speaker = "unk"
original = "マイン……？"
translation = "「자 회장, 아침이야~♪ 일어나ー?」"

[[dialogue]]
speaker = "unk"
original = "休日の早朝。耳元でマインの楽しげな声がする……？"
translation = "마인……?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、やっと起きた♪\u3000はろはろ～<emoji=heart04>」"
translation = "휴일 이른 아침. 귓가에서 마인의 즐거운 목소리가 들린다……?"

[[dialogue]]
speaker = "unk"
original = "どうしてバニーに！？"
translation = "「아~ 겨우 일어났다♪ 하로하로~❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひ♪\u3000せっかくダッチにもらった衣装だし、戦闘以外でも着なきゃもったいないかな～って」"
translation = "왜 바니걸 차림으로!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長の驚く顔が見たくてサプライズだよ～♪\u3000どぉかな？\u3000可愛い後輩彼女のバニー衣装～♪」"
translation = "「니히♪ 어렵게 닷지에게 받은 의상인데, 전투 말고도 안 입으면 아깝잖아~ 싶어서」"

[[dialogue]]
speaker = "unk"
original = "母さんに見られる前に着替えて！？"
translation = "「회장이 놀라는 얼굴이 보고 싶어서 깜짝 서프라이즈야~♪ 어때? 귀여운 후배 여자친구의 바니 의상~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ざ～んねん♪\u3000もうリノさんにはさっき、この格好でご挨拶しちゃった<emoji=heart04>」"
translation = "어머니에게 들키기 전에 갈아입어!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長にこの格好で起こせって命令されて仕方なく……よよよ～……って♪」"
translation = "「아쉬워라♪ 벌써 리노 씨에게는 아까 이 복장으로 인사드렸어❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「怒ってたよ～♪\u3000あとでお説教ね～って言い残して、お買い物に行っちゃった♪」"
translation = "「회장이 이 복장으로 깨우라고 명령해서 어쩔 수 없이…… 흐규흐규~…… 라면서♪」"

[[dialogue]]
speaker = "unk"
original = "理不尽すぎる！？"
translation = "「화내셨다구~♪ 나중에 설교야~ 라고 말씀하시고는 장 보러 가셨어♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000ごめんね～。最近あんまりイタズラしてなかったでしょ？\u3000ストレスゲージ溜まっちゃってさ～、つい<emoji=heart04>」"
translation = "너무 불합리하잖아!?"

[[dialogue]]
speaker = "unk"
original = "マインは定期的に『悪いことをしたくなる発作』が訪れる。"
translation = "「니히히♪ 미안해~. 최근에 별로 장난 안 쳤잖아? 스트레스 게이지가 쌓여버려서 말야~, 그만❤️」"

[[dialogue]]
speaker = "unk"
original = "その衝動を抑えるには、ストレスを溜めないことが一番だ。欲求不満の解消相手として、恋人の俺を利用してくれていいとは伝えてあるのだけど……"
translation = "마인은 정기적으로 『나쁜 짓을 하고 싶어지는 발작』이 찾아온다."

[[dialogue]]
speaker = "unk"
original = "今日のイタズラはなかなか手厳しいなあと思うのだった──"
translation = "그 충동을 억제하려면 스트레스를 쌓지 않는 것이 제일이다. 욕구불능 해소 상대로 연인인 나를 이용해도 좋다고 전해두긴 했지만……"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はいは～い、動かな～い♪\u3000耳かきしてるんだから、奥までぶすってイっちゃったらイヤでしょー？」"
translation = "오늘의 장난은 꽤나 버겁다고 생각하는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "どうして急に耳かきを……？"
translation = "「네이네이, 움직이지 마~♪ 귀 파주고 있으니까 깊숙이 푹 찔려버리면 싫잖아ー?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んー？\u3000会長、バニーの私のおっぱいだけじゃなく、太もももすっごい見てくるから……膝枕してあげたら喜ぶかな～って♪」"
translation = "왜 갑자기 귀를 파주는 거야……?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「かき、かき、かき～……っと♪\u3000それにウサギって穴掘りが好きっしょ？」"
translation = "「으음~? 회장, 바니 차림인 내 가슴뿐만 아니라 허벅지도 엄청 보고 있으니까…… 무릎베개 해주면 좋아할까 싶어서~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「この衣装に着替えてから、本能が疼くってゆーか。会長のお耳、ほじほじしたいな～って衝動が……<emoji=heart04>」"
translation = "「사각, 사각, 사각~…… 이다♪ 게다가 토끼는 굴 파는 거 좋아하잖아?」"

[[dialogue]]
speaker = "unk"
original = "絶対にそれは嘘だ！"
translation = "「이 의상으로 갈아입고 나서 본능이 근질거린달까. 회장 귀를 꼼꼼히 파고 싶다는 충동이……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ま～ね～。私がしたいだけかも……にひ♪\u3000面白いな～。耳の穴が綺麗になってくのって楽しいね～」"
translation = "절대로 그건 거짓말이다!"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「これからも耳かき、予約しとこ～っと。他の女の子にさせちゃだめだよー？\u3000もちろん自分でするのも禁止ね♪」"
translation = "「뭐~ 그렇지~. 내가 하고 싶을 뿐일지도…… 니히♪ 재밌네~. 귓구멍이 깨끗해지는 거 보는 건 즐거워~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「かきかき、かき～……<emoji=heart04>\u3000今日は休日だしゆっくりしよーね会長。リノさんが買い物から帰ってきたら、３人でお昼食べよっか」"
translation = "「앞으로도 귀 파기 예약해둘게~. 다른 여자애한테 하게 하면 안 돼ー? 물론 스스로 하는 것도 금지야♪」"

[[dialogue]]
speaker = "unk"
original = "母さんが帰ってくるまでに着替えて……！"
translation = "「사각사각, 사각~……❤️ 오늘은 휴일이니까 푹 쉬자 회장. 리노 씨가 장 보고 돌아오시면 셋이서 점심 먹자」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え～、そんなのつまんないよー……♪\u3000ん、よーし。耳かきお～わり<emoji=heart04>」"
translation = "어머니가 돌아오시기 전까지 갈아입어……!"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はーい会長、ソファに座ってー……ＯＫ♪\u3000それじゃあ──」"
translation = "「에~ 그런 거 재미없어ー……♪ 음, 좋아. 귀 파기 끝❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「だ～いぶっ<emoji=heart04>\u3000ギュー……<emoji=heart04>」"
translation = "「자 회장, 소파에 앉아ー…… OK♪ 그러면──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長の首の後ろに手をまわして、間近でジ～っ……<emoji=heart04>\u3000にひひ♪\u3000寝癖まだ残ってるねー、か～わいい<emoji=heart04>」"
translation = "「다이~브❤️ 꼬옥……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～？\u3000会長、なんだかすっごく物欲しそうな顔してるー……<emoji=heart04>」"
translation = "「회장 목 뒤로 손을 돌리고, 가까이서 빤히……❤️ 니히히♪ 자다 깬 머리 아직 남아있네, 귀~여워❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「したいことがあるならー、声に出して言ってくれないと、わかんないな～♪」"
translation = "「응~? 회장, 왠지 굉장히 간절히 바라는 표정 짓고 있어ー……❤️」"

[[dialogue]]
speaker = "unk"
original = "マインとキスしたい……"
translation = "「하고 싶은 게 있다면ー, 목소리로 말해주지 않으면 모르겠다구~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ<emoji=heart04>\u3000しょうがないな～、彼氏のおねだりだしー、応えてあげよっかな<emoji=heart04>」"
translation = "마인과 키스하고 싶어……"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んー……ちゅ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅぅっ……ちゅ<emoji=heart04>」"
translation = "「니히히❤️ 어쩔 수 없네~, 남자친구의 부탁이니까 들어줄까나❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「どーお？\u3000日曜の朝から恋人に耳かきしてもらってー<emoji=heart04>\u3000ぎゅーってハグもしてもらってからの、キス<emoji=heart04>\u3000んちゅ、ちゅー……<emoji=heart04>」"
translation = "「음~…… 쪽❤️ 쪽❤️ 쪼옥…… 쪽❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぷぁ♪\u3000最高の気分？\u3000にひひー……でも会長、油断してるね～？」"
translation = "「어때ー? 일요일 아침부터 연인이 귀 파주고ー❤️ 꼬옥 허그도 해준 뒤의 키스❤️ 응츄, 츄우……❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私は今日、イタズラをしに来たんだよー？\u3000ふふふー……<emoji=heart04>」"
translation = "「푸아♪ 최고의 기분? 니히히ー…… 하지만 회장, 방심하고 있네~?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──ただいま～♪」"
translation = "「나는 오늘 장난치러 온 거라구ー? 후후후ー……❤️」"

[[dialogue]]
speaker = "unk"
original = "マイン、離れて──"
translation = "「──다녀왔어~♪」"

[[dialogue]]
speaker = "unk"
original = "母さんが帰ってきた！"
translation = "마인, 떨어져── 어머니가 돌아오셨어!"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「──にひ♪\u3000待ってました～、この<ruby>瞬間<rt>とき</rt></ruby>をねっ♪」"
translation = "「──니히♪ 기다리고 있었습니다, 이 순간를 말이지♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んー、ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000……ちゅっちゅっちゅっ、ちゅー<emoji=heart04>」"
translation = "「음~, 쪽❤️ 쪽❤️ ……쪽쪽쪽, 츄우❤️」"

[[dialogue]]
speaker = "unk"
original = "マイン！？\u3000もうキスはやめて……！？"
translation = "마인!? 이제 키스는 그만둬……!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「えー。寂しいこと言わないでよ～。んちゅ、ちゅ<emoji=heart04>\u3000ちゅっちゅ、ちゅー<emoji=heart04>」"
translation = "「에이. 섭섭한 말 하지 마~. 응츄, 쪽❤️ 쪽쪽, 츄우❤️」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぎりぎりまでちゅーしよ<emoji=heart04>\u3000にひ～、面白いイタズラでしょ？\u3000んちゅ、ちゅ～っ<emoji=heart04>」"
translation = "「아슬아슬할 때까지 뽀뽀하자❤️ 니히~, 재밌는 장난이지? 응츄, 츄우~❤️」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クロト～？\u3000もう起きてるー？」"
translation = "「쿠로토~? 벌써 일어났니ー?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「リノさん近づいてくるねー<emoji=heart04>\u3000んちゅ<emoji=heart04>\u3000キスしてるのバレちゃうねー<emoji=heart04>\u3000んちゅ、ちゅ、ちゅっちゅっちゅ、んちゅー<emoji=heart04>」"
translation = "「리노 씨가 다가오네ー❤️ 응츄❤️ 키스하는 거 들켜버리겠네ー❤️ 응츄, 쪽, 쪽쪽쪽, 응츄우❤️」"

[[dialogue]]
speaker = "unk"
original = "むむむむ～っ！？"
translation = "으으으으으~윽!?"

[[dialogue]]
speaker = "unk"
original = "やばいやばいやばい！\u3000母さんにバレる！！\u3000リビングの扉の向こうに影が見える──！？"
translation = "위험해 위험해 위험해! 어머니에게 들키겠어!! 거실 문 너머로 그림자가 보여──!?"

[[dialogue]]
speaker = "unk"
original = "扉が開いた瞬間、マインは実に鮮やかな身のこなしで俺から離れていた──"
translation = "문이 열린 순간, 마인은 실로 선명한 몸놀림으로 나에게서 떨어져 있었다──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「お帰りなさ～い、リノさん♪」"
translation = "「다녀오셨어요, 리노 씨♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「マインちゃん、ただいま──」"
translation = "「마인짱, 다녀왔단다──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「って！？\u3000ク～ロ～ト～……！\u3000まだこの格好させてたのっ！？」"
translation = "「엇!? 쿠~로~토~……! 아직도 이 복장을 입히고 있었던 거니!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いくらお付き合いしてるからって、こんな服を着させるんじゃありません！\u3000<ruby>立朽<rt>たちくち</rt></ruby>さんのご両親に怒られちゃうでしょ～！？」"
translation = "「아무리 사귀는 사이라고 해도 이런 옷을 입히는 게 아니란다! 타치쿠치 씨 부모님께 혼날 거 아냐~!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……にひひ～♪」"
translation = "「……니히히~♪」"

[[dialogue]]
speaker = "unk"
original = "『マインが勝手に着たんだ』なんて言っても信じてもらえるわけもなく、俺はただ頷くしかないのだった。"
translation = "『마인이 멋대로 입은 거예요』라고 말해도 믿어줄 리 만무했고, 나는 그저 고개를 끄덕일 수밖에 없었다."

[[dialogue]]
speaker = "unk"
original = "くそー……このイタズラのお返し、いつか必ずしてやるからな！"
translation = "제기랄…… 이 장난에 대한 복수, 언젠가 반드시 해줄 테니까!"

