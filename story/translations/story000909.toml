[[dialogue]]
speaker = "ユウリ"
original = "「はぁ、はぁ、はぁ……！\u3000少しは、スッキリしたぜ……！」"
translation = "「하아, 하아, 하아……! 조금은, 속이 시원하네……!」"

[[dialogue]]
speaker = "セーラ"
original = "「うちらの連携めっちゃ良くなかった～？\u3000一度モンスターを取り逃がしたとは思えないツーカーぶりだったじゃーん♪」"
translation = "「우리 연계 완전 좋지 않았어~? 한 번 몬스터를 놓쳤다고는 생각되지 않는 찰떡궁합이었잖아♪」"

[[dialogue]]
speaker = "ユーリス"
original = "「ふふ、そうだね。こう言うと不謹慎だけど、今日ほど清々しい戦いはなかったよ」"
translation = "「후후, 그렇네. 이렇게 말하면 불경하지만, 오늘만큼 상쾌한 전투는 없었어.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ユウリさんには、ええと……色々と迷惑をかけてしまったかもしれないけど……」"
translation = "「유우리 씨에게는, 에토…… 여러 가지로 폐를 끼쳐버렸을지도 모르지만……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ったくホントだぜ。バニースーツを着させられるわ、恥ずかしい色仕掛けをさせられるわ。今日ほど最悪な日はなかったつーの」"
translation = "「정말이지 정말이라고. 바니 수트를 입게 되질 않나, 부끄러운 미인계를 하게 되질 않나. 오늘만큼 최악인 날은 없었다니까.」"

[[dialogue]]
speaker = "ユウリ"
original = "「でも……ま。終わってみりゃ割と楽しかったぜ。新しいダチもできたしな」"
translation = "「그치만…… 뭐. 끝나고 보니 제법 즐거웠어. 새로운 친구도 생겼고 말이야.」"

[[dialogue]]
speaker = "ユーリス"
original = "「ユウリさん……」"
translation = "「유우리 씨……」"

[[dialogue]]
speaker = "ユウリ"
original = "「おら手ぇ出せよ。健闘を讃え合おうぜ、ユリアーナ」"
translation = "「어이, 손 내밀어. 건투를 서로 치하하자고, 유리아나.」"

[[dialogue]]
speaker = "ユーリス"
original = "「うんっ！」"
translation = "「응!」"

[[dialogue]]
speaker = "セーラ"
original = "「はぁ～、青春じゃな～。おばあちゃん、嬉しいよ～」"
translation = "「하아~, 청춘이구먼~. 할미는 기쁘단다~」"

[[dialogue]]
speaker = "unk"
original = "ばあさんや、わしらも茶でもしばこうぞ"
translation = "할멈, 우리도 차나 한잔하러 가세나"

[[dialogue]]
speaker = "セーラ"
original = "「そうだねぇ、お茶請けにいいおせんべいがあってのぅ」"
translation = "「그러게나 말이야, 찻물에 곁들일 좋은 센베가 있단다.」"

[[dialogue]]
speaker = "ユウリ"
original = "「アホ言いながらそれとなく現場を離れようとしてんじゃねえ！？\u3000まだ後片付けが残ってるじゃねえか！」"
translation = "「바보 같은 소리 하면서 슬쩍 현장을 이탈하려고 하지 마!? 아직 뒷정리가 남아 있잖아!」"

[[dialogue]]
speaker = "ユーリス"
original = "「この大量に散らばったカードを整理しなくちゃね。片付けを終えるまでが戦闘だよ」"
translation = "「이 대량으로 흩어진 카드를 정리해야겠네요. 정리를 마칠 때까지가 전투입니다.」"

[[dialogue]]
speaker = "セーラ"
original = "「バレちった♪\u3000にしても不思議なモンスターだったね？\u3000倒した後も消えずにカードに戻っちゃうなんて」"
translation = "「들켰네♪ 그나저나 신기한 몬스터였지? 쓰러뜨린 후에도 사라지지 않고 카드로 돌아가 버리다니.」"

[[dialogue]]
speaker = "ユーリス"
original = "「擬態というよりカード自体がモンスターに変質していたのかもしれないね。これもリクリエの影響かもしれない」"
translation = "「의태라기보다는 카드 자체가 몬스터로 변질되어 있었던 걸지도 모르겠네. 이것도 리크리에의 영향일지도 몰라.」"

[[dialogue]]
speaker = "ユウリ"
original = "「この床に散らばってるカードもさっきまでいた雑魚モンスターだよな？\u3000今はもう単なるカードにしか見えねえけど」"
translation = "「이 바닥에 흩어져 있는 카드도 방금까지 있던 잡몹들이었지? 지금은 이제 단순한 카드로밖에 안 보이지만.」"

[[dialogue]]
speaker = "セーラ"
original = "「たぶんあのボスモンスターの影響でモンスター化してたんじゃないかな？\u3000ボスモンスターを倒した拍子に戻ったみたいだし」"
translation = "「아마 저 보스 몬스터의 영향으로 몬스터화되었던 거 아닐까? 보스 몬스터를 쓰러뜨린 김에 돌아온 것 같고.」"

[[dialogue]]
speaker = "unk"
original = "身近なものがモンスターに変わる、か"
translation = "몸 근처의 물건이 몬스터로 변한다, 라"

[[dialogue]]
speaker = "ユーリス"
original = "「ああ。これは新たなる脅威だよ。ボスモンスターの残骸やモンスター化していたカードも含めて、解析班に渡そう」"
translation = "「그래. 이건 새로운 위협이야. 보스 몬스터의 잔해나 몬스터화되어 있던 카드를 포함해서 분석반에 넘기자.」"

[[dialogue]]
speaker = "ユウリ"
original = "「ちっ、焼却処分はお預けか」"
translation = "「쳇, 소각 처분은 보류인가.」"

[[dialogue]]
speaker = "セーラ"
original = "「ま、これでカジノの平和は守られたよね。原因さえわかれば、後はヘレナさんが良い感じに対処してくれるだろーし」"
translation = "「뭐, 이걸로 카지노의 평화는 지켜졌네. 원인만 알면 나머지는 헬레나 씨가 좋게 대처해 줄 테고~」"

[[dialogue]]
speaker = "unk"
original = "となれば──"
translation = "그렇게 되면──"

[[dialogue]]
speaker = "セーラ"
original = "「せっかくだし、後片付け終わったらカジノでもうひと遊びしちゃおっか♪\u3000臨時休業の札、出しちゃったし♪」"
translation = "「이왕 이렇게 된 거, 뒷정리 끝나면 카지노에서 한바탕 더 놀아버릴까♪ 임시 휴업 팻말도 내걸었으니까♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「お、いいっすね。優秀なカジノディーラーもいるしな」"
translation = "「오, 좋네. 우수한 카지노 딜러도 있으니 말이야.」"

[[dialogue]]
speaker = "unk"
original = "照れるな"
translation = "쑥스럽구만"

[[dialogue]]
speaker = "ユウリ"
original = "「あんたじゃねえよ」"
translation = "「너 말한 거 아니라고.」"

[[dialogue]]
speaker = "ユーリス"
original = "「勝手にはしゃぎ回るのはどうかと思うけど……ふふ。ま、遊戯台の点検もしたいしね。きちんと安全確認を終えるまでが警備だから」"
translation = "「멋대로 들떠서 돌아다니는 건 좀 그렇지만…… 후후. 뭐, 오락기 점검도 하고 싶으니까요. 제대로 안전 확인을 마칠 때까지가 경비니까요.」"

[[dialogue]]
speaker = "セーラ"
original = "「んじゃ決まり♪\u3000今度こそユウリちゃんのバニーガール写真、ニャリオンちゃんに送りつけてあげるぜぃ♪」"
translation = "「그럼 결정♪ 이번에야말로 유우리 짱의 바니걸 사진, 냐리온 짱에게 보내줄게~♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「ちょっ、それだけはマジやめてください！\u3000社会的に死ぬ！」"
translation = "「잠깐, 그것만은 진짜 관둬 주세요! 사회적으로 죽음!」"

[[dialogue]]
speaker = "ユーリス"
original = "「なら今度は私もプレイヤーとして参加しようかな。ユウリさんはもっと女の子らしい自分をみんなに知ってもらうべきだと思うしね」"
translation = "「그럼 이번에는 저도 플레이어로서 참가해 볼까나. 유우리 씨는 좀 더 여자애다운 자신을 모두에게 알릴 필요가 있다고 생각하거든요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁ！？\u3000てめ、裏切ったな、ポンコツ王女！？\u3000優しく手ぇ差し伸べてきた紳士っぷりはどこ行ったよ！？」"
translation = "「하아!? 이 자식, 배신했구나, 폰코츠 공주님!? 상냥하게 손을 내밀던 신사다운 모습은 어디 갔어!?」"

[[dialogue]]
speaker = "セーラ"
original = "「よーし、ディーラーさん、カード配っちゃって～。まずはポーカーで勝負といこうじゃんか♪」"
translation = "「좋아~, 딜러님, 카드 돌려줘~. 우선은 포커로 승부해보자고♪」"

[[dialogue]]
speaker = "ユーリス"
original = "「久しぶりに腕が鳴るよ。また別の勇者スキルも披露できそうだ」"
translation = "「오랜만에 실력 발휘 좀 해볼까. 또 다른 용사 스킬도 선보일 수 있을 것 같아.」"

[[dialogue]]
speaker = "unk"
original = "それじゃオープンザゲーム──！"
translation = "그럼 오픈 더 게임──!"

[[dialogue]]
speaker = "ユウリ"
original = "「いや、どこにカード飛ばすんだよ！？\u3000締まんねえな、おい！」"
translation = "「아니, 어디에 카드를 날리는 거야!? 폼 안 잡히잖아, 어이!」"

