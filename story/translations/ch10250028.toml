[[dialogue]]
speaker = "unk"
original = "先日、舞亜がフィギュアスケートの国際大会に出場した。"
translation = "며칠 전, 마이아가 피겨 스케이팅 국제 대회에 출전했다."

[[dialogue]]
speaker = "unk"
original = "俺は流星市国を離れることができず、テレビ越しでの応援になったが、舞亜は見事優勝。"
translation = "나는 유성시국을 떠날 수 없어 TV를 통해 응원했지만, 마이아는 멋지게 우승."

[[dialogue]]
speaker = "unk"
original = "彼女の帰国を待っていたのだが──"
translation = "그녀의 귀국을 기다리고 있었는데──"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ただいま～♪」"
translation = "「다녀왔어~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おかえり。だけど帰国は明日じゃなかったっけ？」"
translation = "「어서 와. 그런데 귀국은 내일 아니었어?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんに会いたいから、いろいろ前倒しして帰ってきたんだ。大会、見ててくれた？」"
translation = "「회장님 보고 싶어서, 여러 가지 앞당겨서 돌아왔어. 대회, 봐줬어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろん。ショートプログラムで少し崩れてハラハラしたけど、フリーは完璧だった。今までで最高の出来だと思う」"
translation = "「물론이지. 쇼트 프로그램에서 조금 무너져서 조마조마했지만, 프리는 완벽했어. 지금까지 중 최고의 연기였다고 생각해.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ありがとう。会長さんに情けないところ見せられないって思ったら、頑張れたんだよね。だから会長さんのおかげだよ」"
translation = "「고마워. 회장님에게 한심한 모습 보여줄 수 없다고 생각하니까, 힘낼 수 있었어. 그러니까 회장님 덕분이야.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さん……ちゅっ<emoji=heart04>\u3000んちゅっ、ちゅっ<emoji=heart04>\u3000ん……ちゅるっ、じゅる……ちゅるれろ……じゅる、ちゅぷるるっ<emoji=heart04>」"
translation = "「회장님…… 츄♥ 응츄, 츄♥ 응…… 츄르, 쥬르…… 츄르레로…… 쥬르, 츄푸르르♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ぷぁ……<emoji=heart04>\u3000最近会えてなかったから、こうして会長さんと触れ合えて嬉しいな……<emoji=heart04>\u3000あ、そうだ」"
translation = "「푸아……♥ 최근에 못 만났으니까, 이렇게 회장님이랑 닿을 수 있어서 기뻐……♥ 아, 맞다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「じゃ～ん♪\u3000巫女さんにへんし～ん♪\u3000これ、エキシビションでも着てたんだけど、見ててくれた？」"
translation = "「짜잔~♪ 무녀님으로 변~신♪ 이거, 갈라쇼에서도 입었었는데, 봐줬어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん、それも見てたよ。競技とはまた違う、優雅な演技だった」"
translation = "「응, 그것도 봤어. 경기와는 또 다른, 우아한 연기였어.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えへへ……嬉しいな♪\u3000それで、これから会長さんのためだけに演技を披露しようと思うんだけど……見てくれる？」"
translation = "「에헤헤…… 기쁘다♪ 그래서, 이제부터 회장님만을 위해서 연기를 선보이려고 하는데…… 봐줄래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺のためだけに……？」"
translation = "「나만을 위해서……?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん。会長さんにしか見せられない演技を……ね<emoji=heart04>」"
translation = "「응. 회장님에게만 보여줄 수 있는 연기를…… 말이야♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「どう？\u3000これは会長さんしか見せられないでしょ？」"
translation = "「어때? 이건 회장님밖에 못 보잖아?」"

[[dialogue]]
speaker = "unk"
original = "巫女装束をはだけ、俺の上に跨る舞亜。"
translation = "무녀복을 풀어헤치고, 내 위에 올라타는 마이아."

[[dialogue]]
speaker = "unk"
original = "秘部も胸も大胆にさらけ出していて、身じろぎする度に、スケーターらしくない大きなおっぱいが揺れる。"
translation = "비부도 가슴도 대담하게 드러내고 있어서, 몸을 움직일 때마다 스케이터답지 않은 커다란 가슴이 흔들린다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちゃんと見えてる？\u3000私のおま○こ<emoji=heart04>」"
translation = "「제대로 보여? 내 보지♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜は足を大きく開き、秘部を隠すどころか見せつけてきて、いやらしく濡れたピンクの膣口が顔を見せる。"
translation = "마이아는 다리를 크게 벌리고, 비부를 숨기기는커녕 보여주며, 야하게 젖은 핑크색 질구가 얼굴을 내민다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、すごくいやらしいよ」"
translation = "「아아, 정말 음란해.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えへへ……恥ずかしいけど嬉しい<emoji=heart04>\u3000じゃあ、あなただけのために……エッチな演技、してあげるね<emoji=heart04>\u3000はぁ……あ……ん……<emoji=heart04>」"
translation = "「에헤헤…… 부끄럽지만 기뻐♥ 그럼, 당신만을 위해서…… 야한 연기, 해줄게♥ 하아…… 아…… 응……♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜が腰を前後に揺らし、ペニスに割れ目を擦り付ける。"
translation = "마이아가 허리를 앞뒤로 흔들며, 페니스에 갈라진 틈을 문지른다."

[[dialogue]]
speaker = "unk"
original = "肉の弾力が硬いペニスに当たり、溢れ出る愛液でお互いの下半身がずぶ濡れになっていく。"
translation = "살의 탄력이 딱딱한 페니스에 닿고, 흘러넘치는 애액으로 서로의 하반신이 흠뻑 젖어간다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んっ……ふ……んんっ……<emoji=heart04>\u3000会長さんのおち○ちん、熱くて、気持ちいい……あっ<emoji=heart04>\u3000クリトリスに、当たる……<emoji=heart04>」"
translation = "「응…… 후…… 응응……♥ 회장님 자지, 뜨거워서, 기분 좋아…… 앗♥ 클리토리스에, 닿아……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はあぁ……おち○ちんおっきくなってきた……<emoji=heart04>\u3000んはぁ……大会でなかなかエッチできなかったし、会長さんも早くおま○こしたいよね？」"
translation = "「하아아…… 자지 커졌어……♥ 응하아…… 대회 때문에 좀처럼 섹스 못 했고, 회장님도 빨리 보지 하고 싶지?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あっ……<emoji=heart04>\u3000おち○ちんビクッてした……<emoji=heart04>\u3000ふふ、体は正直だね？\u3000じゃあいくよ──」"
translation = "「앗……♥ 자지 움찔했어……♥ 후후, 몸은 정직하네? 그럼 간다──」"

[[dialogue]]
speaker = "unk"
original = "舞亜は反り立つペニスの真上に腰を持ってくると、そのまま体を落として──"
translation = "마이아는 발기한 페니스 바로 위로 허리를 가져오더니, 그대로 몸을 내리며──"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふあああっ<emoji=heart04>\u3000おち○ちん……ズブブって、入ってきてぇ……<emoji=heart04>\u3000はあぁ……久々のおち○ちん、大きい……<emoji=heart04>」"
translation = "「화아아앗♥ 자지…… 즈부붑 하고, 들어와서…… 하아아…… 오랜만의 자지, 커……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ぁん……<emoji=heart04>\u3000私の中で、ビクビクして……とっても元気……<emoji=heart04>\u3000じゃあ、いっぱい踊るから、ちゃんと見ててね……<emoji=heart04>」"
translation = "「앙……♥ 내 안에서, 움찔거려서…… 정말 기운차네……♥ 자, 잔뜩 춤출 테니까, 제대로 지켜봐 줘……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁっ、はぁ……あっ……んんっ……<emoji=heart04>\u3000ふはぁ……中で、擦れて……あっ、んっ……<emoji=heart04>」"
translation = "「하앗, 하아…… 앗…… 응응……♥ 후하아…… 안에서, 비벼져서…… 앗, 응……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「おっきなおち○ちんで、私の中、ゴリゴリって……ひああぁっ<emoji=heart04>\u3000ふぁっ……あっ……はぁんっ<emoji=heart04>」"
translation = "「커다란 자지로, 내 안을 고리고리하고…… 히아아앗♥ 하앗…… 앗…… 하앙♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「やっぱり、会長さんのおち○ちん、好きっ<emoji=heart04>\u3000あっ、はぁ……んっ……おま○この中、いっぱいになってる……<emoji=heart04>」"
translation = "「역시, 회장님의 자지, 좋아♥ 앗, 하아…… 응…… 보지 안이 가득 찼어……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ずっと、これ、欲しかったんだから……<emoji=heart04>\u3000はっ、あっ……エッチしたくて、お腹の奥、疼いてたんだから……<emoji=heart04>\u3000ふぁ……あ……んんっ……<emoji=heart04>」"
translation = "「계속, 이거, 갖고 싶었으니까……♥ 하앗, 앗…… 섹스하고 싶어서, 배 속이 욱신거렸으니까……♥ 하아…… 아…… 응읏……♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜が胸を揺らしながら腰を上下させ、ペニスが膣口を出たり入ったりを繰り返す。"
translation = "마아가 가슴을 흔들며 허리를 상하로 움직이자, 페니스가 질구를 들락날락하기를 반복한다."

[[dialogue]]
speaker = "unk"
original = "粘膜は愛液で潤っていて、摩擦する度に快感が走り抜けた。"
translation = "점막은 애액으로 젖어 있어서, 마찰할 때마다 쾌감이 달려 나갔다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁっ……んっ……おち○ちんビクビクして、気持ち良くなってくれてるんだね……<emoji=heart04>\u3000今まで、できなかった分……たくさん、気持ち良く、してあげるから……<emoji=heart04>」"
translation = "「하앗…… 응…… 자지가 움찔거려서, 기분 좋아지고 있구나……♥ 지금까지, 못 했던 만큼…… 잔뜩, 기분 좋게, 해줄 테니까……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私も気持ち良くて、おま○こ、ぐちょぐちょになってる……<emoji=heart04>\u3000はっ、あっ、んっ……はあぁ、会長さんのおち○ちん、熱くて、硬いぃ……<emoji=heart04>」"
translation = "「나도 기분 좋아서, 보지가 질척질척해졌어……♥ 하앗, 앗, 응…… 하아아, 회장님의 자지, 뜨겁고, 딱딱해……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁ、はっ……ぁんっ……会長さんの、おち○ちん、好きぃ……<emoji=heart04>\u3000奥まで届くと、私のおま○こ……会長さんの、おち○ちんの形に、なっちゃうっ<emoji=heart04>」"
translation = "「하아, 하앗…… 아앙…… 회장님의, 자지, 좋아……♥ 깊은 곳까지 닿으면, 내 보지가…… 회장님의, 자지 모양이, 되어버려♥」"

[[dialogue]]
speaker = "unk"
original = "膣壁がひくひくと震えながら、隙間なくペニス全体を包み込んでいる。"
translation = "질벽이 파르르 떨리며, 틈새 없이 페니스 전체를 감싸 안고 있다."

[[dialogue]]
speaker = "unk"
original = "舞亜の熱い体温と、肉壁の柔らかさを下半身で感じ、射精欲が高まっていく。"
translation = "마아의 뜨거운 체온과, 육벽의 부드러움을 하반신으로 느끼며, 사정욕이 높아져 간다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ……んっ……会長さんが見てる……<emoji=heart04>\u3000はぁ、あっ……あっ、んっ……私のいやらしいとこ、見てる……んっ、はっ……<emoji=heart04>」"
translation = "「아…… 응…… 회장님이 보고 있어……♥ 하아, 앗…… 앗, 응…… 나의 야한 부분, 보고 있어…… 응, 하앗……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふはぁ、はぁ……あっ……<emoji=heart04>\u3000おち○ちん咥えてるおま○こ、エッチ？\u3000んんっ<emoji=heart04>\u3000ちゃんとエッチな演技できてる……？」"
translation = "「후하아, 하아…… 앗……♥ 자지를 물고 있는 보지, 야해? 으응♥ 제대로 야한 연기 하고 있어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……すごくエッチで、興奮する……くっ……」"
translation = "「아아…… 굉장히 야해서, 흥분돼…… 큭……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ならよかった……んっ……はぁ、あっ……あんっ……<emoji=heart04>\u3000私のエッチなところ、もっと見て……<emoji=heart04>」"
translation = "「그렇다면 다행이야…… 응…… 하아, 앗…… 안앗……♥ 나의 야한 모습, 좀 더 봐줘……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あなたにしか、見せないところ……はぁ、はっ……あなただけの、エッチな柊舞亜を、いっぱい見てぇ……<emoji=heart04>」"
translation = "「당신에게만, 보여주는 모습…… 하아, 하앗…… 당신만의, 야한 히이라기 마아를, 잔뜩 봐줘……♥」"

[[dialogue]]
speaker = "unk"
original = "ペニスを咥えたままいやらしく腰をくねらせ、上半身をわざと大きく動かして胸を揺らす。"
translation = "페니스를 물린 채 야하게 허리를 비틀고, 상반신을 일부러 크게 움직여 가슴을 흔든다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あんっ<emoji=heart04>\u3000会長さんが、おっぱい見てる……<emoji=heart04>\u3000ふっ……あ……いやらしい目で見てる……<emoji=heart04>」"
translation = "「안앗♥ 회장님이, 가슴을 보고 있어……♥ 훗…… 아…… 야한 눈으로 보고 있어……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さん、私のおっぱい好きだよね……<emoji=heart04>\u3000もみもみしたり、赤ちゃんみたいにチュウチュウ吸ったり……ほんと、好きなんだからぁ……<emoji=heart04>」"
translation = "「회장님, 내 가슴 좋아하지……♥ 조물조물하거나, 아기처럼 쪽쪽 빨거나…… 정말, 좋아한다니까……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はっ、あっ、んっ……<emoji=heart04>\u3000私のおっぱい好きな、会長さんも好きぃ……<emoji=heart04>\u3000ふあぁ……スケートする時は邪魔だけど、おっぱい大きくて、よかった……<emoji=heart04>」"
translation = "「하앗, 앗, 응……♥ 내 가슴을 좋아하는, 회장님도 좋아……♥ 후아아…… 스케이트 탈 때는 방해되지만, 가슴이 커서, 다행이야……♥」"

[[dialogue]]
speaker = "unk"
original = "俺の視線を釘付けにしようとするように、おっぱいがたぷたぷと揺れて、男の本能を刺激する。"
translation = "내 시선을 못 박으려는 듯이, 가슴이 출렁출렁 흔들리며, 남자의 본능을 자극한다."

[[dialogue]]
speaker = "unk"
original = "何より、舞亜が俺のために尽くしてくれるのがたまらなかった。"
translation = "무엇보다, 마아가 나를 위해 헌신해 주는 것이 견딜 수 없었다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んぁっ、あぁっ……ふああぁっ<emoji=heart04>\u3000会長さんに見られて、乳首、ジンジンしちゃう……<emoji=heart04>\u3000んっ、はっ、んっ……<emoji=heart04>」"
translation = "「응아앗, 아앗…… 후아아앗♥ 회장님이 쳐다봐서, 젖꼭지가 찌릿찌릿해버려……♥ 응, 하앗, 응……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふぁっ、はぁっ……会長さんの視線で、おっぱい、犯されてるっ……<emoji=heart04>\u3000おっぱい、気持ち良くなっちゃうっ……<emoji=heart04>」"
translation = "「하앗, 하앗…… 회장님의 시선으로, 가슴이, 범해지고 있어……♥ 가슴, 기분 좋아져 버려……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んんっ、はぁっ……<emoji=heart04>\u3000はは、ついこの前優勝してた私が……はぁっ……今頃、男の人の上で、腰を振ってるなんて……みんな思わないだろうね……<emoji=heart04>」"
translation = "「으응, 하앗……♥ 하하, 바로 얼마 전에 우승했던 내가…… 하앗…… 지금쯤, 남자 위에서, 허리를 흔들고 있다니…… 다들 생각도 못 하겠지……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あなただけに見せる、エッチな演技……<emoji=heart04>\u3000はぁっ、あっ……楽しんでくれてる……？」"
translation = "「당신에게만 보여주는, 야한 연기……♥ 하앗, 앗…… 즐겨주고 있어……?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ね、今どんな気持ち？\u3000あっ、あんっ……世界一のフィギュアスケーターを独占して、エッチしてるの、どんな気持ち……？」"
translation = "「있지, 지금 어떤 기분이야? 앗, 안앗…… 세계 제일의 피겨 스케이팅 선수를 독점해서, 섹스하는 거, 어떤 기분이야……?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふわぁっ、はっ、んんっ……あなただけの演技させて、あなた専用のおま○こにするの、どんな気持ち……？」"
translation = "「후와앗, 하앗, 으응…… 당신만의 연기를 하게 하고, 당신 전용 보지로 만드는 거, 어떤 기분이야……?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ひぁあっ……！？\u3000今、おち○ちん、すごくビクッってしたぁ……<emoji=heart04>\u3000ふふっ、そんなに気持ちいいんだぁ……<emoji=heart04>」"
translation = "「히아앗……!? 지금, 자지, 엄청 움찔했어……♥ 후훗, 그렇게 기분 좋구나……♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなこと言われたら、興奮しないはずないだろ……っ」"
translation = "「그런 말을 들으면, 흥분하지 않을 리 없잖아……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ははっ……今の、そんなに気に入ってくれたんだ<emoji=heart04>\u3000嬉しい……<emoji=heart04>\u3000んっ、はぁ……私も、すごく、体熱くなってきた……<emoji=heart04>」"
translation = "「하핫…… 방금 거, 그렇게 맘에 들어 해준 거구나♥ 기뻐……♥ 응, 하아…… 나도, 엄청, 몸이 뜨거워졌어……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私は、あなた専用だから……<emoji=heart04>\u3000あなたのものだから……<emoji=heart04>\u3000ふはぁっ、はっ、んあぁっ……もっと楽しんで<emoji=heart04>\u3000もっと味わって<emoji=heart04>」"
translation = "「나는, 당신 전용이니까……♥ 당신 것이니까……♥ 후하앗, 하앗, 응아앗…… 좀 더 즐겨줘♥ 좀 더 맛봐줘♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁっ、あっ……あっ、んあぁんっ<emoji=heart04>\u3000あなたのためなら、いくらでもエッチになるから<emoji=heart04>\u3000いやらしい女の子になるから<emoji=heart04>\u3000もっと気持ち良くなってぇっ<emoji=heart04>」"
translation = "「하앗, 앗…… 앗, 응아앙♥ 당신을 위해서라면, 얼마든지 야해질 테니까♥ 음란한 여자가 될 테니까♥ 좀 더 기분 좋아져 줘♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふぁああぁっ<emoji=heart04>\u3000はあっ──あっ──あっ──んん～～っ<emoji=heart04>\u3000おち○ちん、さっきより大きいっ<emoji=heart04>\u3000おち○ちんすごいぃっ<emoji=heart04>」"
translation = "「후아아아앗♥ 하앗──앗──앗──으으음~~♥ 자지, 아까보다 커졌어♥ 자지 굉장해♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひやぁああっ<emoji=heart04>\u3000深いところまで、届いてっ<emoji=heart04>\u3000お腹に、響くっ<emoji=heart04>\u3000はっ──あぁっ──ふああぁっ<emoji=heart04>」"
translation = "「하앗♥ 앗♥ 앗♥ 히야아아앗♥ 깊은 곳까지, 닿아서♥ 배에, 울려♥ 하앗──아앗──후아아앗♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ひあっ、はっ、あっ、んんっ<emoji=heart04>\u3000おち○ちん太くて、おま○こ広がっちゃうっ<emoji=heart04>\u3000おち○ちんの形になってるっ<emoji=heart04>」"
translation = "「히앗, 하앗, 앗, 으응♥ 자지가 굵어서, 보지가 벌어져 버려♥ 자지 모양이 되어 있어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁっ──はっ──はっ──ひぁあああっ<emoji=heart04>\u3000会長さんのおち○ちん好きっ<emoji=heart04>\u3000おま○こいっぱいにしてくれて、気持ち良くてっ、大好きぃっ<emoji=heart04>」"
translation = "「하앗──하앗──하앗──히아아아앗♥ 회장님의 자지 좋아♥ 보지를 가득 채워줘서, 기분 좋아서, 너무 좋아♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜が体を激しく上下させ、膣内でペニスと粘膜が激しく擦れ合う。"
translation = "마아가 몸을 격렬하게 상하로 움직여, 질 내에서 페니스와 점막이 격렬하게 마찰한다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちん、お腹の中で、ビクビク震えてるっ<emoji=heart04>\u3000ふぁっ、はぁっ<emoji=heart04>\u3000いっぱい、感じてくれてっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>」"
translation = "「앗♥ 앗♥ 자지가, 배 속에서, 움찔움찔 떨리고 있어♥ 하앗, 하앗♥ 잔뜩, 느껴줘서♥ 기뻐♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ぁんっ<emoji=heart04>\u3000感じてくれるの好きっ<emoji=heart04>\u3000私で、気持ち良くなってくれるの、好きっ<emoji=heart04>\u3000それなら……んんっ──<emoji=heart04>」"
translation = "「하앗♥ 앗♥ 아앙♥ 느껴주는 거 좋아♥ 나로, 기분 좋아져 주는 거, 좋아♥ 그렇다면…… 으응──♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜が下腹に力を込め、膣内がきゅっと締まる。"
translation = "마아가 하복부에 힘을 주자, 질 내이 꽉 조여진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ──！？」"
translation = "「큭──!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ<emoji=heart04>\u3000またおち○ちんビクンってした<emoji=heart04>\u3000これ気持ちいいんだ……はっ、んっ……おま○こ練習してて、良かった<emoji=heart04>」"
translation = "「아♥ 또 자지가 움찔했어♥ 이거 기분 좋구나…… 하앗, 응…… 보지 연습해두길, 잘했어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000海外行って、離れてる間、練習してたのっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000夜寝る前に、１人で、練習してたんだっ<emoji=heart04>」"
translation = "「하앗♥ 하앗♥ 앗♥ 안앗♥ 해외 가서, 떨어져 있는 동안, 연습했어♥ 하앗♥ 앗♥ 밤에 자기 전에, 혼자서, 연습했단 말이야♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜が俺のためにそこまでしてくれたのがいじらしくて、愛おしくて、射精欲が限界まで膨れ上がる。"
translation = "마아가 나를 위해 그렇게까지 해준 것이 기특하고, 사랑스러워서, 사정욕이 한계까지 부풀어 오른다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私は、会長さんだけの、柊舞亜だからっ<emoji=heart04>\u3000あなただけの、ものだからっ<emoji=heart04>\u3000私で、いっぱい感じてっ<emoji=heart04>\u3000いっぱい気持ち良くなってっ<emoji=heart04>」"
translation = "「나는, 회장님만의, 히이라기 마아니까♥ 당신만의, 것이니까♥ 나로, 잔뜩 느껴줘♥ 잔뜩 기분 좋아져 줘♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はっ──あっ──あっ──んんんっ<emoji=heart04><emoji=heart04>\u3000でも、会長さんも、私だけのものだからっ<emoji=heart04>\u3000私の会長さんだからっ<emoji=heart04>」"
translation = "「하앗──앗──앗──으으응♥♥ 하지만, 회장님도, 나만의 것이니까♥ 나의 회장님이니까♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……舞亜……？」"
translation = "「윽…… 마아……?」"

[[dialogue]]
speaker = "unk"
original = "俺が好きと言ってくれることは珍しくないけど、こんな風に強く訴えることは今までなかったから少し驚く。"
translation = "나를 좋아한다고 말해주는 일은 드물지 않지만, 이런 식으로 강하게 호소하는 일은 지금까지 없었기에 조금 놀란다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私、よく外国に行くからっ……はぁっ……会長さんが、他の子に目が行かないか、気になってた……！」"
translation = "「나, 자주 외국에 가니까…… 하앗…… 회장님이, 다른 여자애한테 눈길이 가지 않을까, 신경 쓰였어……!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はっ、ふっ、はあぁっ<emoji=heart04>\u3000私が近くにいない間、心配だった……だって、会長さんの周り、かわいい子、たくさん、いるから……っ」"
translation = "「하, 후, 하아아♥ 내가 근처에 없는 동안 걱정됐어…… 그게, 회장님 주변에 귀여운 애들 잔뜩 있으니까……っ」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「だから、私だけを見てっ<emoji=heart04>\u3000ふぁあっ──は──あ──あ──んん～～っ<emoji=heart04>\u3000私だけ好きになってぇっ<emoji=heart04>」"
translation = "「그러니까 나만 봐줘♥ 화아──하──아──아──응응～～っ♥ 나만 좋아해 줘♥」"

[[dialogue]]
speaker = "unk"
original = "舞亜はいつも自然体で、飄々としているから、そんな不安を持っていたとは思わなかった。"
translation = "마아는 언제나 자연스럽고 유유자적하니까, 그런 불안을 품고 있을 줄은 몰랐다."

[[dialogue]]
speaker = "unk"
original = "世界の頂点に立つ舞亜が、俺を──俺だけを強く求めてくれて、それが嬉しくて下半身に力が入る。"
translation = "세계의 정점에 서 있는 마아가 나를── 나만을 강렬하게 원해주는 것이 기뻐서 하반신에 힘이 들어간다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ひぁあああっ<emoji=heart04>\u3000ズンって、突き上げられてっ<emoji=heart04>\u3000会長さんのおち○ちん、奥に、届いてるっ<emoji=heart04>」"
translation = "「히아아아앗♥ 즈응 하고 찔러 올려져서♥ 회장님의 자지, 안쪽까지 닿고 있어♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫、俺は舞亜のもので、舞亜は俺のものだから……！」"
translation = "「괜찮아, 나는 마아의 것이고 마아는 내 것이니까……!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、嬉しいっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>\u3000あ──あ──あ──んぁああっ<emoji=heart04>\u3000会長さんは、私だけのものなんだ……っ<emoji=heart04>」"
translation = "「응, 기뻐♥ 후아아아앗♥ 아──아──아──앙아앗♥ 회장님은 나만의 것이야……♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぐっ……中に出すぞ、舞亜……！」"
translation = "「윽…… 안에 내보낸다, 마아……!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、出してっ<emoji=heart04>\u3000中に出して、あなたのものにしてっ<emoji=heart04>\u3000ふはぁっ、あっ、あんっ<emoji=heart04>\u3000会長さんの精液で、私の子宮、いっぱいにしてぇっ<emoji=heart04>」"
translation = "「응, 내보내 줘♥ 안에 내보내서 당신의 것으로 만들어 줘♥ 후하아, 앗, 안♥ 회장님의 정액으로 내 자궁 가득 채워줘♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000おち○ちん、一番奥に、当たってるっ<emoji=heart04>\u3000ひやぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000子宮に、精液出されたら、イクっ<emoji=heart04>\u3000イッちゃうっ<emoji=heart04>」"
translation = "「하앗♥ 앗♥ 아아앗♥ 자지, 가장 안쪽에 닿고 있어♥ 히야앗♥ 아앗♥ 자궁에 정액 나오면 가버려♥ 가버렷♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、俺もイッてる舞亜が見たい……っ！」"
translation = "「아아, 나도 가버리는 마아를 보고 싶어……!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うんっ<emoji=heart04>\u3000イッてる私を見て<emoji=heart04>\u3000エッチな私を見てっ<emoji=heart04>\u3000はっ、あっ、んっ<emoji=heart04>\u3000中出しされてイク私を見てぇっ<emoji=heart04><emoji=heart04>」"
translation = "「응♥ 가버리는 나를 봐줘♥ 야한 나를 봐줘♥ 하앗, 앗, 응♥ 질내사정 당하며 가버리는 나를 봐줘♥♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000イク、イクイクイクっ<emoji=heart04>\u3000イッちゃうっ<emoji=heart04>\u3000おま○こイッちゃうぅっ<emoji=heart04>」"
translation = "「응아♥ 앗♥ 가, 가버려 가버려♥ 가버렷♥ 보지 가버려어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふぁっ──あ──あ──あ──んんぁああ～～っ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000イッくぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아──아──아──아──응응아아아～～앗♥ 가버려 가버려♥ 가버려어～～～앗♥♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ひぁああああ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아～～～～～～～앗♥♥♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んんんっ<emoji=heart04><emoji=heart04>\u3000出てるっ<emoji=heart04>\u3000おま○この中で、せーえき、びゅーって出て……ふああぁっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イッてるぅ……っ<emoji=heart04>」"
translation = "「응응으♥ 나오고 있어♥ 보지 안에서 정액이 뷰릇하고 나와서…… 후아아앗♥ 보지 가버려♥ 가고 있어……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ああっ<emoji=heart04>\u3000せーえき熱っ、熱いぃっ<emoji=heart04>\u3000んんっ……んんぅっ……<emoji=heart04>\u3000熱いの、子宮に染み込んでるぅ……<emoji=heart04>」"
translation = "「아앗♥ 정액 뜨거워, 뜨거워어♥ 응으…… 응으으……♥ 뜨거운 거 자궁에 스며들고 있어……♥」"

[[dialogue]]
speaker = "unk"
original = "膣壁がぎゅっと締め付けてきて、心地良い圧迫に包まれながら、子宮に精を注ぎ続ける。"
translation = "질벽이 꽉 조여오고, 기분 좋은 압박에 감싸이면서 자궁에 정을 계속 쏟아붓는다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000お腹の奥に、ドクドクって……はあぁ<emoji=heart04>\u3000あなたの精液で、子宮いっぱいになるぅ……<emoji=heart04>」"
translation = "「앗♥ 앗♥ 배 안쪽에 울컥울컥하고…… 하아아♥ 당신의 정액으로 자궁 가득 차버려……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はっ……あっ……はあぁっ<emoji=heart04>\u3000おち○ちん、またビクビクして……んんっ……<emoji=heart04>\u3000ふぁああっ……<emoji=heart04>\u3000おま○こ、まだイッてるぅ……<emoji=heart04>」"
translation = "「하아…… 앗…… 하아아♥ 자지, 또 파르르 떨려서…… 응으……♥ 후아아아……♥ 보지, 아직 가고 있어……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁ、はぁ……久しぶりのエッチだったけど……良かったね……<emoji=heart04>」"
translation = "「하아, 하아…… 오랜만의 섹스였지만…… 좋았네……♥」"

[[dialogue]]
speaker = "unk"
original = "疲れを見せながらも、満足そうに微笑む舞亜。"
translation = "피로를 보이면서도 만족스럽게 미소 짓는 마아."

[[dialogue]]
speaker = "unk"
original = "俺も快感の余韻に浸りなながら、心地良い疲労に身を委ねる。"
translation = "나도 쾌감의 여운에 잠기며 기분 좋은 피로에 몸을 맡긴다."

[[dialogue]]
speaker = "unk"
original = "だけど……"
translation = "하지만……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺が移り気しないか心配って、舞亜がそんな風に思ってるなんて意外だったよ」"
translation = "「내가 마음이 변하지 않을까 걱정이라니, 마아가 그런 생각을 하고 있었다니 의외였어」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そう？\u3000女の子としてはいたって当然の発想だと思うけど」"
translation = "「그래? 여자애로서는 지극히 당연한 발상이라고 생각하는데」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫。俺が好きなのは舞亜だから」"
translation = "「괜찮아. 내가 좋아하는 건 마아니까」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「信じるからね？\u3000浮気したら凍らせちゃうから」"
translation = "「믿을 테니까? 바람피우면 얼려버릴 거야」"

[[dialogue]]
speaker = "unk"
original = "世界一のフィギュアスケーターらしくない悩みで、本人には悪いけど、かわいいと思ってしまう。"
translation = "세계 제일의 피겨 스케이터답지 않은 고민이라 본인에게는 미안하지만 귀엽다고 생각하게 된다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ……会長さんの精液、溢れてる……<emoji=heart04>\u3000こんなにたくさん出て……ふふ、嬉しい……<emoji=heart04>」"
translation = "「아…… 회장님의 정액, 넘쳐흐르고 있어……♥ 이렇게나 잔뜩 나와서…… 후후, 기뻐……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちなみに、今日は中に出してもいい日だから大丈夫。……あ、会長さん的には残念だった？」"
translation = "「참고로 오늘은 안에 내보내도 되는 날이니까 괜찮아. ……아, 회장님 입장에서는 아쉬웠어?」"

[[dialogue]]
speaker = "unk"
original = "舞亜を孕ませたらと想像すると、興奮してたまらない。"
translation = "마아를 임신시킨다면 하고 상상하니 흥분해서 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "俺の子を産んでほしい……と思うのは男の本能だろう。"
translation = "내 아이를 낳아주었으면 좋겠다…… 고 생각하는 것은 남자의 본능일 것이다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ……その顔は本気で孕ませたがってる顔だね。会長さんってば正直なんだから」"
translation = "「아…… 그 얼굴은 진심으로 임신시키고 싶어 하는 얼굴이네. 회장님도 참 솔직하다니까」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんの子どもできたらって思うと、お腹の奥キュンとしちゃうけど……まだ選手でいたいから、お預けかな」"
translation = "「회장님 아이가 생기면 어떨까 생각하면 배 안쪽이 큥 해버리지만…… 아직 선수로 남고 싶으니까, 이건 나중으로 미뤄둘까」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんの赤ちゃんは、選手を引退したら……ね？」"
translation = "「회장님의 아기는 선수를 은퇴하면…… 알았지?」"

