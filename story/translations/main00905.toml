[[dialogue]]
speaker = "unk"
original = "第５話,ステルス番犬,B"
translation = "제5화, 스텔스 번견, B"

[[dialogue]]
speaker = "unk"
original = "──そして。"
translation = "── 그리고."

[[dialogue]]
speaker = "マトイ"
original = "「えっと……あの基地はこのあたりでいいんだっけ？」"
translation = "「음, 저 기지는 이 근처가 맞던가?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。前回、連行──<b>案内</b>された際に座標を記録しておきました。沿岸部の一角に基地を構えているようです」"
translation = "「네. 지난번, 연행── <b>안내</b>되었을 때 좌표를 기록해 두었습니다. 연안부 한쪽에 기지를 두고 있는 듯합니다」"

[[dialogue]]
speaker = "ソフィア"
original = "「こちらから出向くのは初めてですね。ネビュラ……未だ謎多き組織ですが」"
translation = "「이쪽에서 찾아가는 것은 처음이네요. 네뷸라…… 아직 수수께끼가 많은 조직이지만」"

[[dialogue]]
speaker = "ユウリ"
original = "「なるほどな。うちらにない知恵を持ってそうな相手ってワケか」"
translation = "「과연. 우리에게 없는 지혜를 가지고 있을 것 같은 상대라는 건가」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。今回はその『謎』に賭けてみたいと思ってな」"
translation = "「아아. 이번에는 그 『수수께끼』에 걸어보고 싶어서 말이지」"

[[dialogue]]
speaker = "unk"
original = "俺の勘が正しければ鍵はここにある。"
translation = "내 직감이 맞다면 열쇠는 여기에 있다."

[[dialogue]]
speaker = "unk"
original = "そう信じて、この基地近辺までやってきたのだが……"
translation = "그렇게 믿고, 이 기지 근처까지 왔는데……"

[[dialogue]]
speaker = "？？？"
original = "「──何者だ」"
translation = "「── 누구냐」"

[[dialogue]]
speaker = "セーラ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "マトイ"
original = "「いつの間に──！？」"
translation = "「언제 사이에──!?」"

[[dialogue]]
speaker = "unk"
original = "無人かと思ったのも束の間、どこからか出現した少女に俺たちは睨まれていた。"
translation = "무인인 줄 알았던 것도 잠시, 어디선가 출현한 소녀에게 우리들은 노려지고 있었다."

[[dialogue]]
speaker = "？？？"
original = "「……侵入者発見。非モンスター」"
translation = "「……침입자 발견. 비 몬스터」"

[[dialogue]]
speaker = "クロト"
original = "「──待ってくれ。俺たちは新星学園の者だ」"
translation = "「── 기다려 줘. 우리는 신성 학원의 사람이다」"

[[dialogue]]
speaker = "？？？"
original = "「人間４体──魔族３体──天使２体──計９体の敵性対象確認。これより迎撃を開始する」"
translation = "「인간 4체── 마족 3체── 천사 2체── 총 9체의 적성 대상 확인. 지금부터 요격을 개시한다」"

[[dialogue]]
speaker = "サーシャ"
original = "「問答無用みたいね──よほど客人が珍しいのかしら？」"
translation = "「묻지도 따지지도 않는 것 같네── 손님이 꽤나 귀한가 보지?」"

[[dialogue]]
speaker = "クロト"
original = "「後ろにも何人か待機しているようです」"
translation = "「뒤에도 몇 명 대기하고 있는 듯합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「話は後で──きますっ！」"
translation = "「이야기는 나중에── 옵니다!」"

