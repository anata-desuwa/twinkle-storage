[[dialogue]]
speaker = "聖沙"
original = "「というわけで──色々と大変だったんだから」"
translation = "「그렇게 돼서── 여러모로 큰일이었다니까」"

[[dialogue]]
speaker = "シン"
original = "「へぇ。僕の留守中にそんな大事件が」"
translation = "「헤에. 내가 자리를 비운 사이에 그런 대사건이」"

[[dialogue]]
speaker = "聖沙"
original = "「私の勇士、咲良クンにも見せてあげたかったわ。後輩たちのお手本となる勝負は私の勝ちね♪」"
translation = "「나의 용맹한 모습, 사쿠라 군에게도 보여주고 싶었어. 후배들에게 본보기가 될 승부는 나의 승리였지♪」"

[[dialogue]]
speaker = "シン"
original = "「僕はその場にすら居合わせてなかったんだけど」"
translation = "「나는 그 자리에 있지도 않았지만 말이야」"

[[dialogue]]
speaker = "聖沙"
original = "「こ、細かいことはどうでもいいのよ！」"
translation = "「자, 자잘한 건 아무래도 상관없어!」"

[[dialogue]]
speaker = "シン"
original = "「それにしても、僕と同じく生徒会長で魔王の男の子か。会ってみたかったね」"
translation = "「그건 그렇고, 나처럼 학생회장이자 마왕인 남자아이인가. 만나보고 싶었네」"

[[dialogue]]
speaker = "聖沙"
original = "「咲良クンと違って優秀な生徒会長だったわよ？\u3000真面目でしっかり者だし、向上心もあって気骨もあったわ」"
translation = "「사쿠라 군과 달리 우수한 학생회장이었어. 성실하고 야무진 데다 향상심도 있고 기개도 있었지」"

[[dialogue]]
speaker = "シン"
original = "「むぅ。ずいぶん向こうの生徒会長の男の子を買ってるんだね……？」"
translation = "「으음. 꽤 그쪽 학생회장 남자애를 높게 치는걸……?」"

[[dialogue]]
speaker = "聖沙"
original = "「くすくす。もしかしてヤキモチ？」"
translation = "「큭큭. 혹시 질투?」"

[[dialogue]]
speaker = "シン"
original = "「べ、別にそういうわけじゃないけど」"
translation = "「딱히 그런 건 아니지만」"

[[dialogue]]
speaker = "聖沙"
original = "「素直じゃないんだから。妬いてるなら妬いてるって正直に言えばいいのに」"
translation = "「솔직하지 못하긴. 질투 나면 난다고 솔직하게 말하면 될 텐데」"

[[dialogue]]
speaker = "シン"
original = "「なら……妬いてる」"
translation = "「그럼…… 질투 나」"

[[dialogue]]
speaker = "聖沙"
original = "「えっ！？\u3000ほ、本当に……？」"
translation = "「엣!? 저, 정말로……?」"

[[dialogue]]
speaker = "シン"
original = "「当たり前だよ」"
translation = "「당연하지」"

[[dialogue]]
speaker = "聖沙"
original = "「ひゃっ。だ、抱き締めなくても。ちょっぴりからかってみただけなのに……」"
translation = "「햣. 드, 끌어안지 않아도 되는데. 조금 놀려봤을 뿐인데……」"

[[dialogue]]
speaker = "聖沙"
original = "「安心、して？\u3000彼のことは後輩としてしか見てないし……。私のライバルは……あくまで咲良クンだけよ」"
translation = "「안심, 해줘? 그 아이는 후배로밖에 안 보고 있으니까……. 나의 라이벌은…… 어디까지나 사쿠라 군뿐이야」"

[[dialogue]]
speaker = "聖沙"
original = "「そうじゃなかったら、その……。元の世界に戻ってきて、いの一番に会いに来たりしないわ」"
translation = "「안 그랬으면 그, 원래 세계로 돌아와서 제일 먼저 만나러 오거나 하지 않았을 거야」"

[[dialogue]]
speaker = "聖沙"
original = "「変身を解く間も惜しいくらい……ん、ちゅ。あなたの顔、見たかったんだもの……」"
translation = "「변신을 풀 시간조차 아까울 만큼…… 응, 츄. 당신 얼굴, 보고 싶었는걸……」"

[[dialogue]]
speaker = "unk"
original = "僕の体を抱き締め返しながら、聖沙がうっとりと甘い唇を重ねてきてくれる。"
translation = "나의 몸을 마주 안아주며, 미사가 황홀하게 달콤한 입술을 겹쳐 온다."

[[dialogue]]
speaker = "unk"
original = "それだけで僕の体は尋常じゃないほど火照り始めた。"
translation = "그것만으로 나의 몸은 심상치 않을 정도로 달아오르기 시작했다."

[[dialogue]]
speaker = "聖沙"
original = "「あ……ふふ。おっきくなってる。相変わらずエッチなんだから……」"
translation = "「아…… 후후. 커졌네. 여전하게 음란하다니까……」"

[[dialogue]]
speaker = "シン"
original = "「好きな女の子にキスされたら誰だってこうなるよ」"
translation = "「좋아하는 여자애한테 키스 받으면 누구라도 이렇게 돼」"

[[dialogue]]
speaker = "聖沙"
original = "「もう、上手なんだから。そんなこと言って油断させようとしたってそうはいかないわ」"
translation = "「정말, 말은 잘한다니까. 그런 말로 방심시키려 해도 그렇게는 안 돼」"

[[dialogue]]
speaker = "聖沙"
original = "「今夜の私はひと味違うわよ？\u3000今日こそあなたを、ふふふ、ヒンヒン言わせてあげる……♪」"
translation = "「오늘 밤의 나는 조금 다를걸? 오늘이야말로 당신을, 후후후, 앙앙 울게 해주지……♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って聖沙は僕を畳に寝かせると、そのまま僕の身体の上に乗ってきて──"
translation = "그렇게 말하며 미사는 나를 다다미에 눕히더니, 그대로 나의 몸 위에 올라타서는──"

[[dialogue]]
speaker = "聖沙"
original = "「んっ……はぁ……。もうこんなに大きくなって……。エッチなおつゆもダックダク……」"
translation = "「응…… 하아……. 벌써 이렇게나 커져서……. 음란한 국물도 질질 흐르고……」"

[[dialogue]]
speaker = "聖沙"
original = "「もしかしなくても期待してたの？\u3000ふふ、本当にハレンチね？」"
translation = "「혹시나가 아니라 기대하고 있었어? 후후, 정말 파렴치하네?」"

[[dialogue]]
speaker = "unk"
original = "悪戯っぽい笑みを浮かべながら、聖沙が熱く湿った股間を僕の物にスリスリと擦り付けてくる。"
translation = "장난스러운 미소를 띠며, 미사가 뜨겁고 젖은 가랑이를 나의 것에 문질문질하며 비벼댄다."

[[dialogue]]
speaker = "unk"
original = "そのからかうような愛撫が僕の興奮をいっそう高めてきた。"
translation = "그 놀리는 듯한 애무가 나의 흥분을 한층 더 고조시켰다."

[[dialogue]]
speaker = "聖沙"
original = "「でもいいわ。それなら、ん、はぁ、めいっぱい感じさせてあげる。いつもみたいに私を辱められると思ったら大間違いだから」"
translation = "「하지만 좋아. 그렇다면, 응, 하아, 마음껏 느끼게 해주지. 평소처럼 나를 수치스럽게 만들 수 있을 거라 생각하면 큰 오산이니까」"

[[dialogue]]
speaker = "聖沙"
original = "「向こうの世界で散々後輩たちの世話を焼いてきたんだもの。その成果、見せてあげる」"
translation = "「저쪽 세계에서 실컷 후배들을 돌봐주고 왔는걸. 그 성과, 보여주지」"

[[dialogue]]
speaker = "聖沙"
original = "「今夜は私があなたを骨抜きにしてあげちゃうんだから♪」"
translation = "「오늘 밤은 내가 당신을 홀딱 빠지게 만들어버릴 테니까♪」"

[[dialogue]]
speaker = "unk"
original = "すると聖沙は、僕の体にゆっくりと腰を下ろしてきてくれて──"
translation = "그러자 미사는 나의 몸 위로 천천히 허리를 내리며 내려앉아──"

[[dialogue]]
speaker = "聖沙"
original = "「んっ、はぁっ……<emoji=heart04>\u3000あっ……はぁあんっ……<emoji=heart04>」"
translation = "「응, 하앗……<emoji=heart04> 앗…… 하아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「どう？\u3000んっ、んっ<emoji=heart04>\u3000気持ちいい、でしょ？\u3000こういう動きされるのは、んふ、んっ<emoji=heart04>\u3000予想外だったんじゃない？」"
translation = "「어때? 응, 응<emoji=heart04> 기분 좋지? 이런 움직임 당하는 건, 응후, 응<emoji=heart04> 예상 밖이었지?」"

[[dialogue]]
speaker = "聖沙"
original = "「これこそあなたをヒンヒン言わせるための、ふふふ、秘策なんだから♪\u3000頭の芯までとろっとろにしてあげる<emoji=heart04>」"
translation = "「이거야말로 당신을 앙앙 울리기 위한, 후후후, 비책이니까♪ 머릿속까지 사르르 녹여줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ずっぽりと根元まで挿入したまま大きな弧を描くように聖沙が腰をぐわんぐわん揺らしてくれる。"
translation = "그렇게 말하며 뿌리 끝까지 완전히 삽입한 채로 커다란 호를 그리듯 미사가 허리를 흔들흔들 흔들어댄다."

[[dialogue]]
speaker = "unk"
original = "まるで僕の肉棒を軸に淫らなダンスを踊っているみたいだ。"
translation = "마치 나의 성기를 축으로 음란한 댄스를 추고 있는 것 같다."

[[dialogue]]
speaker = "unk"
original = "だけど、その動きがとてつもなく気持ちいい。ペニスが丸ごと聖沙の膣内に呑み込まれて、余すところなく舐めねぶられて。"
translation = "하지만 그 움직임이 말도 안 되게 기분 좋다. 페니스가 통째로 미사의 질 안에 집어삼켜져서 남김없이 핥아지는 느낌이다."

[[dialogue]]
speaker = "聖沙"
original = "「ふぁ、あぁ……<emoji=heart04>\u3000おち○ぽ、すごくビクンビクンしてる……<emoji=heart04>\u3000エッチでアツアツのおつゆも、ビュビュっと噴きだしてきて<emoji=heart04>」"
translation = "「하아, 아아……<emoji=heart04> 자지, 엄청 움찔움찔하고 있어……<emoji=heart04> 야하고 뜨거운 국물도 뷰븃하고 뿜어져 나와서<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「あなたがどのくらい感じてるのか、手に取るようにわかるわ<emoji=heart04>\u3000ふふふ、意外と私、この動き方、ふぁ、好きかも<emoji=heart04>」"
translation = "「당신이 얼마나 느끼고 있는지 손에 잡힐 듯이 알겠어<emoji=heart04> 후후후, 의외로 나 이 움직임, 하아, 좋아할지도<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「あなたの感じてる顔も、よーく見えるし♪\u3000ああダメよ、顔逸らしちゃ。ちゃんとだらしなく悶えてる顔見せなさい？」"
translation = "「당신이 느끼는 얼굴도 아주 잘 보이고♪ 아아 안 돼, 고개 돌리지 마. 제대로 정신없이 괴로워하는 얼굴 보여주렴?」"

[[dialogue]]
speaker = "聖沙"
original = "「じゃないと動くのやめちゃうわよ？\u3000気持ちいいコト、んっ、んふっ……<emoji=heart04>\u3000続けて欲しいでしょ？」"
translation = "「안 그러면 움직이는 거 멈출 거야? 기분 좋은 거, 응, 응후……<emoji=heart04> 계속해주길 바라는 거지?」"

[[dialogue]]
speaker = "unk"
original = "快感に喘ぐ僕を見て興が乗ったのか、さらに刺激を与えようと聖沙が小さい膣をぎゅ～っと締めてくる。"
translation = "쾌감에 헐떡이는 나를 보며 흥이 돋았는지, 한층 더 자극을 주려는 듯 미사가 좁은 질을 꼬옥~ 조여온다."

[[dialogue]]
speaker = "unk"
original = "やらしく圧迫されながらグニュングニュンとペニスを扱かれるその動きがたまらなく気持ち良くて、熱っぽい吐息が止められない。"
translation = "야하게 압박당하며 꾸덕꾸덕 페니스가 훑어지는 그 움직임이 참을 수 없을 정도로 기분 좋아서, 뜨거운 숨결을 멈출 수가 없다."

[[dialogue]]
speaker = "聖沙"
original = "「ふふふ、喘いでる喘いでる♪\u3000そういう可愛い姿が、あっ、はぁんっ<emoji=heart04>\u3000ずっと見たかったの♪」"
translation = "「후후후, 헐떡이네 헐떡여♪ 그런 귀여운 모습이, 앗, 하앙<emoji=heart04> 계속 보고 싶었어♪」"

[[dialogue]]
speaker = "聖沙"
original = "「もっともっと、んっ、んっ<emoji=heart04>\u3000可愛がってあげるわ♪\u3000涎が零れちゃうほど感じさせて、えへへ、恥ずかしいくらいイかせてあげる♪」"
translation = "「좀 더 좀 더, 응, 응<emoji=heart04> 예뻐해 줄게♪ 침이 흐를 정도로 느끼게 해서, 에헤헤, 창피할 정도로 가게 해줄게♪」"

[[dialogue]]
speaker = "聖沙"
original = "「ほーら、んっ、ふっ、んっ、んんっっ<emoji=heart04>\u3000こんな風、にっ<emoji=heart04>」"
translation = "「자아, 응, 훗, 응, 으응윽<emoji=heart04> 이런 식, 으로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "聖沙がグっと股間を押し出して、敏感な先っぽをグリグリと執拗に責め立ててくる。"
translation = "미사가 윽 하고 가랑이를 밀어내며, 민감한 끝부분을 그리그리 집요하게 몰아붙여 온다."

[[dialogue]]
speaker = "unk"
original = "ドロドロの膣壁に竿を擦り上げられながら、コリコリの子宮口で亀頭をゴシゴシと摩られて、吐息とカウパーがとまらない。"
translation = "질척이는 질벽에 성기가 쓸려 올라가면서, 단단한 자궁구에 귀두가 비벼져, 숨결과 쿠퍼액이 멈추지 않는다."

[[dialogue]]
speaker = "聖沙"
original = "「ふぁ、んふっ<emoji=heart04>\u3000おち○ぽのビクビクすごい<emoji=heart04>\u3000こんなに震えてくれるの、初めてかも……<emoji=heart04>」"
translation = "「하아, 응훗<emoji=heart04> 자지 움찔거리는 거 엄청나<emoji=heart04> 이렇게 떨어주는 거, 처음일지도……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「そんなに、んっ、ふっ、気持ち良くなってもらえてるんだ？\u3000だとしたら、え、えへへ、練習した甲斐があったかも……<emoji=heart04>」"
translation = "「그렇게나, 응, 훗, 기분 좋아진 거야? 그렇다면, 에, 에헤헤, 연습한 보람이 있었을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「なんだかんだ言って、あっ、はぁ……<emoji=heart04>\u3000いつもは、その、私ばっかり気持ち良くしてもらっちゃってるものね……<emoji=heart04>」"
translation = "「이러니저러니 해도, 앗, 하아……<emoji=heart04> 평소에는, 그게, 나만 기분 좋게 되곤 했으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「ずっと申し訳ないなって思ってた、から……<emoji=heart04>\u3000そんな風にたくさん感じてもらえると、わ、私……<emoji=heart04>」"
translation = "「계속 미안하다고 생각했었, 거든……<emoji=heart04> 그렇게 잔뜩 느껴주니까, 나, 나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "感じる僕の姿を見て、聖沙の声音が甘くなってくる。"
translation = "느끼는 나의 모습을 보며 미사의 목소리가 달콤해진다."

[[dialogue]]
speaker = "unk"
original = "表情もさっきまでの悪戯っぽい顔とは違って、嬉しそうに綻んでいた。"
translation = "표정도 조금 전까지의 장난스러운 얼굴과는 다르게, 기쁜 듯이 풀려 있었다."

[[dialogue]]
speaker = "聖沙"
original = "「も、もっともっと気持ち良くしてあげるわね<emoji=heart04>\u3000どんな風にされるのがお好みなのかしら？」"
translation = "「조, 좀 더 좀 더 기분 좋게 해줄게<emoji=heart04> 어떤 식으로 당하는 게 취향이니?」"

[[dialogue]]
speaker = "聖沙"
original = "「おま○こギュウギュウ締めた方が、んんっ、いい？\u3000それとももっと大胆に腰を回された方が気持ち良くなれる？」"
translation = "「보지 꽉꽉 조이는 게, 으응, 좋아? 아니면 좀 더 대담하게 허리를 돌리는 게 기분 좋아져?」"

[[dialogue]]
speaker = "聖沙"
original = "「なんでも言ってくれて、えへへ、いいのよ？\u3000今夜は私に任せてくれたらいいんだから……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뭐든 말해줘도, 에헤헤, 괜찮단다? 오늘 밤은 나한테 맡겨주면 되니까……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒンヒン言わせると宣言していた姿はどこへやら、デレデレの声で聖沙が問いかけてきてくれる。"
translation = "앙앙 울리겠다고 선언하던 모습은 어디 가고, 콧소리 섞인 목소리로 미사가 물어봐 준다."

[[dialogue]]
speaker = "unk"
original = "グッパグッパとおま○こを収縮させて扱き方に緩急を付けてくれたり、いじめるように擦っていた亀頭をやらしく丹念に愛撫してくれたり。"
translation = "벌름벌름 보지를 수축시키며 훑는 법에 완급을 주거나, 괴롭히듯 문지르던 귀두를 야하고 정성스럽게 애무해 주거나."

[[dialogue]]
speaker = "unk"
original = "そんな聖沙の甘いご奉仕が体が跳ねそうになるほど気持ち良くって、ペニスにどんどん熱いものが集まっていく。"
translation = "그런 미사의 달콤한 봉사가 몸이 튈 정도로 기분 좋아서, 페니스에 점점 뜨거운 것이 모여간다."

[[dialogue]]
speaker = "聖沙"
original = "「はぁん、あぁ<emoji=heart04>\u3000エッチなおつゆがのぼってきてるのわかるわ<emoji=heart04>\u3000おち○ぽ、とっても苦しそうに脈打って<emoji=heart04>」"
translation = "「하앙, 아아<emoji=heart04> 야한 국물이 올라오는 게 느껴져<emoji=heart04> 자지, 정말 괴로운 듯이 맥동하고……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「すっきり、んっ、はぁ<emoji=heart04>\u3000させてあげるわね<emoji=heart04>\u3000私の体で、んっ、ふっ、んっ<emoji=heart04>\u3000気持ち良くビュービューさせてあげる<emoji=heart04>」"
translation = "「시원하게, 응, 하아<emoji=heart04> 해줄게<emoji=heart04> 내 몸으로, 응, 훗, 응<emoji=heart04> 기분 좋게 뷰븃 하게 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すると聖沙は、さらに体を寝かせてより深々と肉棒を咥え込んでくれて──"
translation = "그러자 미사는 더욱 몸을 뉘어 깊숙이 성기를 머금어 주었고──"

[[dialogue]]
speaker = "聖沙"
original = "「あっ、はぁっ、あぁんっ、あっ、あっ、あっ<emoji=heart04>」"
translation = "「앗, 하앗, 아앙, 앗, 앗, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「どうかしらっ、はぁあんっ、このくらい速い方が、ふぁっ、あぁっ<emoji=heart04>\u3000気持ち良く、んぁぁっ、なれるでしょっ？」"
translation = "「어때, 하아앙, 이 정도로 빠른 게, 하앗, 아앗<emoji=heart04> 기분 좋게, 응아앗, 될 수 있지?」"

[[dialogue]]
speaker = "聖沙"
original = "「たくさん感じてくれて、あふっ、あっ、はぁんっ、いいからねっ<emoji=heart04>\u3000私も、あふぁあっ、す、すごく、あぁぁあんっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「잔뜩 느껴줘도, 아훗, 앗, 하앙, 괜찮으니까 말야<emoji=heart04> 나도, 아하아앗, 저, 정말, 아아아앙……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しくペニスを扱き上げられて、今にも射精しそうなくらいの快感が襲ってくる。"
translation = "격렬하게 페니스가 훑어 올려져, 당장이라도 사정할 것 같은 쾌감이 덮쳐온다."

[[dialogue]]
speaker = "unk"
original = "彼女もまた一目で頭がフワフワしてるのがわかるくらい蕩けた顔で、股間をズンズンと突き出してきてくれていた。"
translation = "그녀 또한 한눈에 머릿속이 몽롱해진 걸 알 수 있을 만큼 황홀한 얼굴로, 가랑이를 쿵쾅쿵쾅 내밀고 있었다."

[[dialogue]]
speaker = "聖沙"
original = "「自分の気持ちいいところに大好きな人の擦り付け放題で、あふぁぁっ、ダメなのにっ<emoji=heart04>\u3000あなたに気持ち良くなってもらわないとなのにっ<emoji=heart04>」"
translation = "「자기가 기분 좋은 곳에 제일 좋아하는 사람을 마음껏 문질러대서, 아하아앗, 안 되는데<emoji=heart04> 당신을 기분 좋게 해줘야 하는데<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「ああでも、はぁっ、あっ、あああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000動き始めたらやめられないっ<emoji=heart04>\u3000おち○ぽ、ふぁぁあ、気持ち、いいっ……<emoji=heart04>」"
translation = "「아아 하지만, 하앗, 앗, 아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 움직이기 시작하니까 멈출 수 없어<emoji=heart04> 자지, 하아아, 기분, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕以上に甘く大きな嬌声を上げながら、聖沙が一心不乱に腰をくねらせ続けてくれる。"
translation = "나보다 더 달콤하고 커다란 신음소리를 내며, 미사가 일심불란하게 허리를 계속 뒤튼다."

[[dialogue]]
speaker = "unk"
original = "その姿が何よりも僕の性欲を昂ぶらせてきた。彼女が僕の体を夢中で貪ってくれるのが最高に嬉しくて。"
translation = "그 모습이 무엇보다 나의 성욕을 고조시켰다. 그녀가 나의 몸을 정신없이 탐해주는 것이 최고로 기뻐서."

[[dialogue]]
speaker = "聖沙"
original = "「ずっと、あっ、あっ、ずっとシたかったのっ<emoji=heart04>\u3000あなたと、ふぁ、あっ、はぁっ、シたかったからっ<emoji=heart04>」"
translation = "「계속, 앗, 앗, 계속 하고 싶었어<emoji=heart04> 당신이랑, 하아, 앗, 하앗, 하고 싶었으니까<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「向こうの世界にいる時も、あぁんっ、あっ、はぁっ、気付いたらあなたのことばっかり考えちゃってっ<emoji=heart04>」"
translation = "「저쪽 세계에 있을 때도, 아앙, 앗, 하앗, 정신 차려보니 당신 생각만 하게 돼서<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「会えないのが、ハグしたり、キスしたり、エッチできないのが、ものすごく寂しくてっ<emoji=heart04>」"
translation = "「만날 수 없는 게, 허그하거나, 키스하거나, 섹스할 수 없는 게, 너무나도 외로워서<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「だから今夜はっ、あはぁんっ、ふぁっ、あっ、あぁっ、んはぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그러니까 오늘 밤은, 아하앙, 하앗, 앗, 아앗, 응하아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛情いっぱいに聖沙が僕を求めてきてくれているのがわかる。"
translation = "애정 가득하게 미사가 나를 원하고 있다는 것을 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "僕ももっと聖沙を求めたい。僕だって聖沙とたくさんシたかったんだっ！"
translation = "나도 좀 더 미사를 원하고 싶다. 나도 미사랑 잔뜩 하고 싶었단 말이야!"

[[dialogue]]
speaker = "聖沙"
original = "「はぁあああああんっっ<emoji=heart04>\u3000あはぁぁああんっっ<emoji=heart04>\u3000ちょっ、ダメっ、あああっ、突き上げちゃダメっっ<emoji=heart04>」"
translation = "「하아아아아앙<emoji=heart04> 아하아아앙<emoji=heart04>  잠깐, 안 돼, 아아앗, 쳐올리면 안 돼<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「今日は私がって──ふぁあああんんっっ<emoji=heart04>\u3000もう、馬鹿ぁっ<emoji=heart04>」"
translation = "「오늘은 내가 하기로── 하아아아앙<emoji=heart04> 정말, 바보<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「そんなにズンズンされたら、あふぁっ、あぁっ、また今夜も私ばっかり気持ち良くなっちゃうじゃないっ<emoji=heart04>」"
translation = "「그렇게 쿵쾅거리면, 아하앗, 아앗, 또 오늘 밤도 나만 기분 좋아져 버리잖아<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「ダメよっ、ダメぇっ<emoji=heart04>\u3000今日は私があなたを、あっ、あっ、あっ、気持ち良くしてあげるんだからっ<emoji=heart04>」"
translation = "「안 돼, 안 돼<emoji=heart04> 오늘은 내가 당신을, 앗, 앗, 앗, 기분 좋게 해주는 거니까<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「大好きなあなたにっ、いつも気持ち良くしてくれるあなたにっ、ふぁっ、あっ、あぁんっ、いっぱい、ふぁぁ、イって欲しっ……<emoji=heart04>」"
translation = "「제일 좋아하는 당신에게, 항상 기분 좋게 해주는 당신에게, 하앗, 앗, 아앙, 잔뜩, 하아아, 가게 해주고 싶……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しく膣内を突き上げる僕に負けじと、聖沙がさらに体重を落として淫らにペニスを咥え込んでくれる。"
translation = "격렬하게 질 안을 쳐올리는 나에게 지지 않으려는 듯, 미사가 더욱 체중을 실어 음란하게 페니스를 머금는다."

[[dialogue]]
speaker = "unk"
original = "口を半開きにして喘ぎながらも、僕を感じさせようと一生懸命に腰を振ってくれて。"
translation = "입을 반쯤 벌리고 헐떡이면서도, 나를 느끼게 하려고 필사적으로 허리를 흔들어 주며."

[[dialogue]]
speaker = "聖沙"
original = "「好きっ<emoji=heart04>\u3000好きよっ<emoji=heart04>\u3000大好きっ<emoji=heart04>」"
translation = "「좋아해<emoji=heart04> 좋아해<emoji=heart04> 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「たくさん感じてっ<emoji=heart04>\u3000おち○ぽミルク、あっ、あっ、私の体でたくさん作ってっ<emoji=heart04>」"
translation = "「잔뜩 느껴줘<emoji=heart04> 자지 우유, 앗, 앗, 내 몸에 잔뜩 만들어줘<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「いっぱい出して欲しいっ<emoji=heart04>\u3000しばらく会えなかった分っ、エッチできなかった分っ<emoji=heart04>\u3000たくさんっ、たくさんっ<emoji=heart04>」"
translation = "「잔뜩 내줬으면 좋겠어<emoji=heart04> 한동안 못 만났던 만큼, 섹스 못 했던 만큼<emoji=heart04> 잔뜩, 잔뜩<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕も出したい……！\u3000聖沙の膣内にっ、ありったけをっ……！"
translation = "나도 내고 싶어……! 미사의 질 안에, 있는 대로 전부를……!"

[[dialogue]]
speaker = "unk"
original = "そう思って、聖沙に負けないくらい猛烈に彼女の体を突き上げていく。"
translation = "그렇게 생각하며 미사에게 지지 않을 정도로 맹렬하게 그녀의 몸을 쳐올려 간다."

[[dialogue]]
speaker = "聖沙"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000また激しっ<emoji=heart04>\u3000ああああっ、ダメっ、ダメだってばぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 또 격해졌어<emoji=heart04> 아아아앗, 안 돼, 안 된다니까<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「おち○ぽミルク注ごうとしてくれてるのはいいけど、あっ、はぁあんっ、ズンズン突き上げるのはダメっ<emoji=heart04>」"
translation = "「자지 우유 따라주려는 건 좋지만, 앗, 하아앙, 쿵쾅쿵쾅 쳐올리는 건 안 돼<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「イっちゃっ、イクっ、イっちゃうからぁっ<emoji=heart04>\u3000今夜もまた、ふぁっ、あああっ、あなたにイかされちゃっっ<emoji=heart04>」"
translation = "「가버려, 가, 가버리니까아<emoji=heart04> 오늘 밤도 또, 하앗, 아아앗, 당신한테 당해버려서어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "「ダメ、ダメ」と言いながらも突き上げる度に聖沙が幸せそうに喘いでくれる。"
translation = "「안 돼, 안 돼」라고 말하면서도 쳐올릴 때마다 미사가 행복한 듯이 헐떡여준다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の反応が愛おしくて僕もピストンをとめられないっ。"
translation = "그런 그녀의 반응이 사랑스러워서 나도 피스톤을 멈출 수가 없다!"

[[dialogue]]
speaker = "聖沙"
original = "「あっ、はぁっ、あぁっ、んはぁぁっっ<emoji=heart04>\u3000気持ちいいっ、そこっ、ふぁあああああっ、そこダメっ、奥っ、あああああああっっ<emoji=heart04>」"
translation = "「앗, 하앗, 아앗, 응하아앗<emoji=heart04> 기분 좋아, 거기, 하아아아앗, 거기 안 돼, 안쪽, 아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「イクっ、ああああっ、また負けちゃっ<emoji=heart04>\u3000だけど気持ちいいっ<emoji=heart04>\u3000おち○ぽ、おっきいっ<emoji=heart04>\u3000パンパンになってくれてるの嬉しいっ<emoji=heart04>」"
translation = "「가버려, 아아아앗, 또 져버렸어<emoji=heart04> 하지만 기분 좋아<emoji=heart04> 자지, 커다래<emoji=heart04> 팽팽해져서 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「もうダメっ<emoji=heart04>\u3000我慢できないっ<emoji=heart04>\u3000あああっっ<emoji=heart04>\u3000イクっ、イクイクっっ<emoji=heart04>\u3000ふあぁぁあっっ、ああああああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 안 돼<emoji=heart04> 참을 수 없어<emoji=heart04> 아아앗<emoji=heart04> 가, 가버려어<emoji=heart04> 하아아앗, 아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「ぜ、絶対にいま射精しちゃダメよっ<emoji=heart04>\u3000出しちゃダメだからねっ<emoji=heart04>\u3000いま出されたら絶対負けちゃっ<emoji=heart04>\u3000すごくイっちゃうっ<emoji=heart04>」"
translation = "「제, 절대로 지금 사정하면 안 돼<emoji=heart04> 내보내면 안 되니까 말야<emoji=heart04> 지금 내버리면 절대 져버려어<emoji=heart04> 엄청 가버린단 말야<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「だから出さないでっ<emoji=heart04>\u3000少なくとも中出しはっ<emoji=heart04>\u3000絶対、外に、あっ、あっ、あっ、外に出してっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그러니까 내지 마<emoji=heart04> 적어도 질내사정은<emoji=heart04> 절대, 밖에, 앗, 앗, 앗, 밖에 내줘어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉とは裏腹に聖沙が上体をより深く寝かせて自分から奥へ奥へとペニスを咥え込ませてくる。"
translation = "말과는 반대로 미사가 상체를 더욱 깊게 뉘어 스스로 안으로 안으로 페니스를 머금게 한다."

[[dialogue]]
speaker = "unk"
original = "甘えるように口を開いた子宮口にペニスを押しつけて、一滴たりとも外に零れないようにギュウギュウ吸い付いてくる。"
translation = "어리광부리듯 입을 벌린 자궁구에 페니스를 밀어붙이며, 한 방울도 밖으로 새나가지 않도록 꽉꽉 빨아들인다."

[[dialogue]]
speaker = "聖沙"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000イクっ、きてるっ<emoji=heart04>\u3000熱い精子っ、あっ、あっ、すぐそこまできてるぅっっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 가버려, 오고 있어<emoji=heart04> 뜨거운 정액, 앗, 앗, 바로 거기까지 오고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「やっぱりダメっ<emoji=heart04>\u3000精子きてるのわかるだけでイっちゃっ<emoji=heart04>\u3000ああっ、イクぅっ<emoji=heart04>\u3000欲しく、あああっ、なっちゃっ<emoji=heart04>」"
translation = "「역시 안 돼<emoji=heart04> 정액 오는 거 아는 것만으로 가버려어<emoji=heart04> 아앗, 가버려어<emoji=heart04> 갖고 싶어, 아아앗, 져버렸어어<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「だしっ、だしてっ<emoji=heart04>\u3000もう私の負けでいいから出してっ<emoji=heart04>\u3000ビュービューしてっ<emoji=heart04>」"
translation = "「내줘, 내줘어<emoji=heart04> 이제 내가 진 걸로 좋으니까 내줘<emoji=heart04> 뷰븃 해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「イキたいっ<emoji=heart04>\u3000あなたのミルクでイキたいっ<emoji=heart04>\u3000だから奥にっ、あっ、あっ、あっ、おま○この一番奥にっ<emoji=heart04>」"
translation = "「가고 싶어<emoji=heart04> 당신의 우유로 가고 싶어<emoji=heart04> 그러니까 안쪽에, 앗, 앗, 앗, 보지의 제일 안쪽에<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「あなたのアツアツドロドロ精子っっ──いっぱいビュービューしてぇぇぇぇっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신의 뜨끈뜨끈 걸쭉한 정액── 잔뜩 뷰븃 해줘어어어어~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「あっ、ひゃふっ、はぁっっ<emoji=heart04>\u3000ああっ、あああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 히야훗, 하앗<emoji=heart04> 아앗, 아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ドビュルルルルルルっっ！！\u3000ビュルルルルルルぅぅ！！！"
translation = "도뷰르르르르르르!! 뷰르르르르르르으으!!!"

[[dialogue]]
speaker = "聖沙"
original = "「くはっ、あはぁぁ……！！\u3000で、出てるっ……<emoji=heart04>\u3000気持ちいい、んぁぁぁっ、イクっ、イクイクイクぅぅっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「크핫, 아하아아……!! 나, 나오고 있어……<emoji=heart04> 기분 좋아, 응아아아, 가, 가버려어어어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「体のビクビクとめられなっ──はふあぁっっ……<emoji=heart04>\u3000もうすっかり、ふぁぁぁ、膣内出しの感覚、クセになっちゃって……<emoji=heart04>」"
translation = "「몸이 움찔거리는 게 안 멈춰── 하후아앗……<emoji=heart04> 이제 완전히, 하아아아, 질내사정의 감각, 버릇이 돼버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「あった、かいっ……<emoji=heart04>\u3000はぁぁぁ……<emoji=heart04>\u3000しあわ、せぇ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「따뜻, 해……<emoji=heart04> 하아아아……<emoji=heart04> 행복, 해……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だらしなく口を開けながら、うっとりとした顔で聖沙が絶頂の快感に酔いしれてくれる。"
translation = "정신없이 입을 벌린 채, 황홀한 얼굴로 미사가 절정의 쾌감에 취해준다."

[[dialogue]]
speaker = "unk"
original = "僕もまた心地よい虚脱感と幸福感にいつまでも浸り続けていた。"
translation = "나 또한 기분 좋은 허탈감과 행복감에 언제까지고 계속 젖어 있었다."

[[dialogue]]
speaker = "聖沙"
original = "「はぁ、はぁ、はぁ……<emoji=heart04>\u3000結局、いつもと同じ結果になっちゃった……<emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04> 결국, 평소랑 같은 결과가 돼버렸네……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「でも、ふふふ、すごい量……<emoji=heart04>\u3000こんなに気持ち良くなってもらえたのなら、それだけでも秘策を用意してきた甲斐はあったかも……<emoji=heart04>」"
translation = "「하지만, 후후후, 엄청난 양……<emoji=heart04> 이렇게나 기분 좋아져 줬다면, 그것만으로도 비책을 준비해 온 보람은 있었을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結合部から溢れ出した白濁を眺めながら、聖沙が肩で息をして呟く。"
translation = "결합부에서 흘러넘친 백탁을 바라보며, 미사가 어깨를 들썩이며 중얼거린다."

[[dialogue]]
speaker = "unk"
original = "実際ものすごく気持ち良かった。今こうしている間も、トロトロでグチュグチュの膣内の感触が伝わってきて思わず悶えてしまう。"
translation = "실제로 엄청나게 기분 좋았다. 지금 이러고 있는 동안에도, 미끈미끈하고 질척이는 질 안의 감촉이 전해져 와 나도 모르게 몸부림치게 된다."

[[dialogue]]
speaker = "聖沙"
original = "「えへへ、もう。本当にエッチなんだから。出したばっかりなのに、こんなにビクンビクンさせちゃって……<emoji=heart04>」"
translation = "「에헤헤, 정말. 정말 야하다니까. 방금 내보냈는데도, 이렇게 움찔움찔하게 만들고……<emoji=heart04>」"

[[dialogue]]
speaker = "聖沙"
original = "「けど、いいわ。だからこそ挑み甲斐があるもの♪\u3000私も一回だけで終わるつもりなんてさらさらなかったから」"
translation = "「하지만, 좋아. 그러니까 도전할 보람이 있는걸♪ 나도 한 번으로 끝낼 생각은 눈곱만큼도 없었으니까」"

[[dialogue]]
speaker = "聖沙"
original = "「今夜は、トコトンエッチしましょ？\u3000どちらの体力が先になくなるか──勝負よ！」"
translation = "「오늘 밤은, 끝까지 야한 짓 하자? 누구 체력이 먼저 바닥날지── 승부야!」"

[[dialogue]]
speaker = "聖沙"
original = "「一晩中ビュービューさせて、唇がカサカサになっちゃうくらいチュッチュして、私の匂いが取れなくなるくらいギュウギュウ抱きついちゃうんだから」"
translation = "「밤새도록 뷰븃 하게 만들고, 입술이 까칠해질 정도로 쪽쪽하고, 내 냄새가 안 빠질 정도로 꽉 안아버릴 거니까」"

[[dialogue]]
speaker = "聖沙"
original = "「覚悟して……よね<emoji=heart04>」"
translation = "「각오해…… 야<emoji=heart04>」"

