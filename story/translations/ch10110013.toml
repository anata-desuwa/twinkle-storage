[[dialogue]]
speaker = "unk"
original = "第３話,普通じゃないアプローチ,P"
translation = "제3화, 평범하지 않은 어프로치, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。マトイから、一緒に買い物に行きたいというお誘いがあった。"
translation = "어느 휴일. 마토이로부터 함께 쇼핑하러 가고 싶다는 권유가 있었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ご、ごめんね……私のわけわからない提案に付き合ってもらっちゃって……」"
translation = "「미, 미안해…… 나의 영문 모를 제안에 어울려주게 해서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「『普通じゃないお出かけ』がしてみたいなんて話、本当に受けてくれるとは思わなくて……な、何かごめんなさいっ」"
translation = "「『평범하지 않은 외출』을 해보고 싶다는 이야기, 정말로 들어줄 줄은 몰라서…… 저, 정말 죄송해요!」"

[[dialogue]]
speaker = "unk"
original = "よろこんで協力するよ"
translation = "기쁘게 협력할게"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そう？\u3000よかった……受けてくれるとは思わなかったって言ったけど、断られた時のことも考えてなくて……えへへ」"
translation = "「그, 그래? 다행이다…… 들어줄 줄은 몰랐다고 했지만, 거절당했을 때의 일은 생각도 안 해서…… 에헤헤」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、それでね、今日なんだけど……テーマはさっきも言ったとおり『普通じゃないお出かけ』なんだ」"
translation = "「그, 그래서 말이야, 오늘인데…… 테마는 아까 말한 대로 『평범하지 않은 외출』이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やっぱり、その、普通のままじゃいやだなって思って。だって普通のままだったら、気になる人が出来ても注目してもらえないじゃない……？」"
translation = "「역시, 그게, 평범한 채로는 싫다고 생각해서. 왜냐면 평범한 채라면, 신경 쓰이는 사람이 생겨도 주목받지 못하잖아……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それで私、もうちょっと頑張ってみたいって思ったの……！」"
translation = "「그래서 나, 조금 더 노력해보고 싶다고 생각했어……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だから、今日はよろしくお願いしますっ」"
translation = "「그러니까, 오늘은 잘 부탁해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え～と……買い物リストを見る限りでは、これが最後かな。まったくヴィーナスってば、人使いが荒いんだから」"
translation = "「음~…… 쇼핑 리스트를 보아하니 이게 마지막인가. 정말이지 비너스는 사람 부려 먹는 게 거칠다니까」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ていうか、ＵＭＯとかチェスとか、遊ぶ気満々じゃない！\u3000……まあ、いいけど」"
translation = "「그보다, UMO라든가 체스라든가, 놀 생각 가득하잖아! ……뭐, 상관없지만」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、ごめんね。荷物、重くない？\u3000結構な量になっちゃってるけど……」"
translation = "「회장님, 미안해. 짐, 무겁지 않아? 꽤 양이 많아져 버렸는데……」"

[[dialogue]]
speaker = "unk"
original = "でも、今のところ普通の買い出しだな"
translation = "하지만 지금까진 평범한 장보기인걸"

[[dialogue]]
speaker = "unk"
original = "鍛えてるから大丈夫。"
translation = "단련하고 있으니까 괜찮아."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へっ！？\u3000そ、そうかな……？\u3000まあ、確かにそうかも……」"
translation = "「헤!? 그, 그런가……? 뭐, 확실히 그럴지도……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……よ、よしっ。ねえ、荷物重そうだし、一緒に持つよ」"
translation = "「……조, 좋아. 저기, 짐 무거워 보이고, 같이 들자」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「女の子に持たせるのは気が引ける……？\u3000そ、そんなの気にしなくていいから。ほらっ、貸して貸してっ……！」"
translation = "「여자아이에게 들게 하는 건 마음이 쓰여……? 그, 그런 거 신경 안 써도 되니까. 자, 이리 줘 이리 줘……!」"

[[dialogue]]
speaker = "unk"
original = "ま、マトイ……？\u3000手が……"
translation = "마, 마토이……? 손이……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「い、一緒に持つって、言ったじゃない？\u3000だだだ、だからほら……こうやって会長の手を握ってね、一緒に持ってあげてるっていうかっ……！」"
translation = "「가, 같이 든다고 말했잖아? 그그그, 그러니까 봐봐…… 이렇게 회장님 손을 잡고 말이야, 같이 들어주고 있다는 걸까……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こ、これって、ほら、ふ、普通じゃないよね！？\u3000普通の子は、こんなことしないよね！？」"
translation = "「이, 이거 봐봐, 펴, 평범하지 않지!? 평범한 애는 이런 짓 안 하지!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わ、私なら大丈夫だから！\u3000ほらっ、このまま次いこっ！\u3000私お腹減っちゃった！」"
translation = "「나, 나는 괜찮으니까! 자, 이대로 다음 가자! 나 배고파졌어!」"

[[dialogue]]
speaker = "unk"
original = "手が触れ合ったまま、マトイのオススメだというクレープ屋へ向かった──"
translation = "손이 맞닿은 채로, 마토이의 추천이라는 크레이프 가게로 향했다──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「結構早く買えたね……あそこのクレープ屋さん、いつも並んでるから時間かかると思ったんだけど」"
translation = "「꽤 빨리 샀네…… 저기 크레이프 가게, 항상 줄 서 있어서 시간 걸릴 줄 알았는데」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「早速食べよっか。はぁぁむっ……んんっ、……んん！\u3000お、美味しい……！\u3000生地がぱりぱり系なのかな？\u3000ちょっと新しい食感かも♪」"
translation = "「얼른 먹자. 하암…… 음, ……음! 마, 맛있어……! 반죽이 바삭바삭한 계열인가? 조금 새로운 식감일지도♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長のは？\u3000チョコレート味だったよね。美味しい？」"
translation = "「회장님 거는? 초콜릿 맛이었지. 맛있어?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「…………ね、ねえ、ひ、１口交換してみない？\u3000そっちの味も気になるし」"
translation = "「…………저, 저기, 하, 한 입 교환해보지 않을래? 그쪽 맛도 궁금하고」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へっ、か、間接キスになるんじゃないかって……そそそそ、そんなの全然大丈夫だよっ！\u3000同級生同士なら全然普通のことだってっ」"
translation = "「헤, 가, 간접 키스가 되는 거 아니냐니…… 그그그그, 그런 거 전혀 괜찮아! 동급생끼리라면 전혀 평범한 일이라니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はむっ……もぐ、もぐ……んっ、んんっ！？\u3000こっちもすっごく美味しい～～！\u3000中にベリー系のジャムが入ってるのかな、ちょっと酸味もあっていい感じ～♪」"
translation = "「하암…… 우물, 우물…… 음, 음음!? 이쪽도 정말 맛있어~~! 안에 베리류 잼이 들어있는 건가, 약간 신맛도 있어서 좋은 느낌~♪」"

[[dialogue]]
speaker = "unk"
original = "（マトイの頬についたチョコレートを取ってあげる）"
translation = "（마토이의 뺨에 묻은 초콜릿을 떼어준다）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っっ──！？！？！？」"
translation = "「っっ──！？！？！？」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そっ、そういうことを軽々しくするのは、普通じゃないよ！？\u3000女の子は勘違いしちゃうんだからね……っ！」"
translation = "「그, 그런 짓을 가볍게 하는 건 평범하지 않다고!? 여자아이는 착각해버리니까……!」"

[[dialogue]]
speaker = "unk"
original = "普通じゃなくていいはずなのに、何か怒られた！？"
translation = "평범하지 않아도 된다더니, 왠지 혼났다!?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……今日は付き合ってくれて、ありがとうね。なんか、空回りしっぱなしだった気もするけど……うぅ……じ、自己嫌悪……」"
translation = "「……오늘은 같이 있어 줘서 고마워. 왠지 헛바퀴만 계속 돈 기분이지만…… 으우…… 자, 자기혐오……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そもそも、私からしたら、男の子と２人でお出かけすること自体が、普通じゃなかったというか……ちょっと高望みしすぎたのかも……」"
translation = "「애, 애초에 나로서는 남자애랑 둘이서 외출하는 것 자체가 평범하지 않았다고 해야 할까…… 조금 과분한 꿈을 꾼 걸지도……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その……ごめんね？\u3000つまらなかった、よね……？\u3000でも、少しでも、気になる人に見てもらえるようになりたくて……」"
translation = "「그…… 미안해? 재미없었지……? 하지만 조금이라도 신경 쓰이는 사람에게 보이고 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "俺は楽しかったよ。マトイは楽しくなかった？"
translation = "나는 즐거웠어. 마토이는 즐겁지 않았어?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へっ？\u3000う、ううんっ、そんなことない！\u3000私も、とっても楽しかった……！」"
translation = "「헤? 아, 아니! 그런 거 아냐! 나도 정말 즐거웠어……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも……本当に？\u3000ずっと私がワタワタしてるばっかりだったし……」"
translation = "「하지만…… 정말로? 계속 나만 허둥대기만 했는데……」"

[[dialogue]]
speaker = "unk"
original = "今日のマトイは『普通』じゃなかった"
translation = "오늘의 마토이는 『평범』하지 않았어"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そうかな……？\u3000その……今日くらい普通じゃなかったら、気になる人にも見てもらえるようになる、かな……？」"
translation = "「그, 그럴까……? 그…… 오늘만큼 평범하지 않다면, 신경 쓰이는 사람에게도 보일 수 있게 될까……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ、気になる人っていうのは、そのっ！\u3000へ、変な意味じゃないよ！？」"
translation = "「앗, 신경 쓰이는 사람이라는 건 그게! 이, 이상한 의미가 아니야!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「気になる人はいるけど、いないっていうかっ！\u3000ああいや、いないわけじゃないんだけど、誤解しないで欲しいっていうか……って、何わけのわかんないこと言ってるんだ、私……！」"
translation = "「신경 쓰이는 사람은 있지만, 없다고 해야 하나! 아아 아니, 없는 건 아닌데 오해하지 말았으면 좋겠다고 해야 하나…… 나 무슨 영문 모를 소리를 하는 거야……!」"

[[dialogue]]
speaker = "unk"
original = "でもきっと、相手凄く意識すると……思うぞ？"
translation = "하지만 분명 상대도 엄청 의식할 거라고…… 생각하는데?"

[[dialogue]]
speaker = "unk"
original = "そ、そっか……。"
translation = "그, 그렇구나……."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほ、本当？\u3000それなら今日は、頑張ってよかったかな。……えへへ♪」"
translation = "「정, 정말? 그렇다면 오늘은 노력하길 잘했나 보네. ……에헤헤♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その……よければまた、こういうことに付き合ってくれると、嬉しいな。どうしても振り向いて欲しい人がいるから、頑張りたいの。ダメ……かな？」"
translation = "「그…… 괜찮다면 또 이런 거 같이 해주면 기쁠 것 같아. 어떻게든 돌아봐 줬으면 하는 사람이 있으니까 노력하고 싶어. 안…… 될까?」"

[[dialogue]]
speaker = "unk"
original = "ダメじゃない。また一緒に出掛けよう"
translation = "안 될 리 없지. 또 같이 외출하자"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うん！\u3000それじゃあ会長……約束ね♪」"
translation = "「으, 응! 그럼 회장님…… 약속이야♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゃ、じゃあ私は星徒会室に荷物だけ届けてくるからっ。ま、また明日～～～っ！」"
translation = "「그, 그럼 나는 성도회실에 짐만 갖다 놓고 올게. 또, 또 내일 봐~~~!」"

[[dialogue]]
speaker = "unk"
original = "夜でもわかるくらい、顔を赤く染めて走り去って行くマトイ。残された俺はというと──"
translation = "밤인데도 알 수 있을 정도로 얼굴을 붉게 물들이고 달려가는 마토이. 남겨진 나는──"

[[dialogue]]
speaker = "unk"
original = "（マトイの気になる人って……）"
translation = "（마토이가 신경 쓰인다는 사람은……）"

[[dialogue]]
speaker = "unk"
original = "『普通の女の子』だからこそ伝わってきてしまう好意に、どうしようもなく顔が熱くなってしまうのだった。"
translation = "『평범한 여자아이』이기에 전해져 오는 호의에, 어쩔 수 없이 얼굴이 뜨거워지고 말았다."

