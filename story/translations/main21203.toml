[[dialogue]]
speaker = "unk"
original = "第３話,勝利する未来,B"
translation = "제3화, 승리하는 미래, B"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「極星学園星徒会長、ルヴィネの最期を視た。ハッキリとね」"
translation = "「극성학원 성도회장, 루비네의 최후를 봤어. 아주 또렷하게.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なんだって……！？」"
translation = "「뭐라고……!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「誰がトドメを刺したのかはわからない。私の星眼は、未来のとある瞬間を断片的に切り取ることしかできない」"
translation = "「누가 결정타를 날렸는지는 몰라. 내 성안은 미래의 어느 순간을 단편적으로 잘라내는 것밖에 못 하니까.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「その前後に何が起こったのかは不明瞭だけれど……致命の重傷を負って、声を発することもできず倒れ伏すルヴィネを視た」"
translation = "「그 전후에 무슨 일이 일어났는지는 불분명하지만…… 치명적인 중상을 입고 목소리조차 내지 못한 채 쓰러져 있는 루비네를 봤어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「血の海で横たわるルヴィネにすがって声をかける、極星学園の４人の姿もね」"
translation = "「피바다에 누워 있는 루비네에게 매달려 말을 거는 극성학원의 4명의 모습도 말이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「血の海って……ルヴィネは女神の幼体なんだろう？\u3000そもそも出血で死ぬような生物なのか？」"
translation = "「피바다라니…… 루비네는 여신의 유체잖아? 애초에 출혈로 죽는 그런 생물이야?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がどんな考えで設計し、創造した生命体かはわからない。でも彼女は、食事や睡眠をとる必要があるのはわかっている」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』가 어떤 생각으로 설계하고 창조한 생명체인지는 몰라. 하지만 그녀는 식사나 수면을 취할 필요가 있다는 건 알고 있지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「使徒だった頃に何度かデネブで顔を合わせたことがあるんだ。強大な霊力を操ってこそいるが、体の造りが特殊なわけじゃない」"
translation = "「사도였을 때 몇 번인가 데네브에서 얼굴을 마주한 적이 있어. 강대한 영력을 다루긴 하지만 몸의 구조가 특수한 건 아니야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ルヴィネは負傷させ、殺害することが可能な敵であり……それを成し遂げる未来は確かに存在する」"
translation = "「루비네는 부상을 입히고 살해하는 것이 가능한 적이며…… 그것을 완수하는 미래는 확실히 존재해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やはり浮かない顔だね。アルタイルにとっては朗報だと思うんだけど」"
translation = "「역시 안색이 좋지 않네. 알타이르에게는 낭보라고 생각하는데.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「朗報って、オマエな……」"
translation = "「낭보라니, 너 말이야……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まあ……喜ばしい未来ではある、のかな。ルヴィネは死ぬ。イコール、リクリエは防げるってことでしょ？」"
translation = "「뭐…… 기쁜 미래이긴 한 걸까. 루비네가 죽는다. 이퀄, 리크리에는 막을 수 있다는 거잖아?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そうだね。女神テルルの後釜に据えるはずだった少女を打倒する。リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>はこの世界を覆わない……アルタイル世界の勝ちだ」"
translation = "「그래. 여신 테루루의 후계자로 세우려 했던 소녀를 타도한다. 리크리에의 본파는 이 세계를 덮지 않아…… 알타이르 세계의 승리야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あ、あたしはイヤだぞ！\u3000そんなの、ベアトが悲しむに決まってる……！」"
translation = "「나, 나는 싫다구! 그런 거, 베아토가 슬퍼할 게 뻔하잖아……!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「でも、ルヴィネが死なない場合は……」"
translation = "「하지만 루비네가 죽지 않는 경우에는……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「世界の刷新が起きて、アルタイルはベガと同じ結末をたどる。三界は破滅し、森羅歴はリセットされる」"
translation = "「세계의 쇄신이 일어나고 알타이르는 베가와 같은 결말을 걷게 돼. 삼계는 파멸하고 신라력은 리셋되지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「非情と<ruby>謗<rt>そし</rt></ruby>られるかもしれないが……私はこのことを前向きに捉えているよ」"
translation = "「비정하다고 비난받을지도 모르겠지만…… 나는 이 일을 긍정적으로 받아들이고 있어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「いつも私は、１つの未来しか視ることが出来なかった……」"
translation = "「항상 나는 하나의 미래밖에 볼 수 없었어……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「何か新しい技を覚えた時。大交流で星騎士の戦力拡充が出来た時。強力なモンスターを打倒した時……」"
translation = "「무언가 새로운 기술을 익혔을 때. 대교류로 성기사의 전력 확충이 가능해졌을 때. 강력한 몬스터를 타도했을 때……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「折に触れて星眼を使った。使って、使って、使い倒した。どれだけ覗き見ても、視える未来は１つしかありえなかった」"
translation = "「기회가 있을 때마다 성안을 썼어. 쓰고, 쓰고, 질리도록 썼지. 아무리 엿보아도 보이는 미래는 하나뿐이었어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「けれど今は違う──確かにあるんだ、破滅する以外の未来がね」"
translation = "「하지만 지금은 달라── 확실히 있어, 파멸하는 것 이외의 미래가 말이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ジグが使徒から解放された……その影響で、未来が変わった？」"
translation = "「지그가 사도에서 해방되었다…… 그 영향으로 미래가 변했다?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おそらくは。私は使徒でなくなり、アガサはノルンの力に目覚めた。極星学園の女の子たちも、ルヴィネに疑心を抱き始めている」"
translation = "「아마도. 나는 사도가 아니게 되었고 아가사는 노른의 힘에 눈을 떴어. 극성학원의 소녀들도 루비네에게 의구심을 품기 시작했지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「今のアルタイルには希望がある。ラクシスの生まれ変わりである君、魔王クロト。そして女神テルルの<ruby>御子<rt>みこ</rt></ruby>である、九浄ヴィーナス」"
translation = "「지금의 알타이르에는 희망이 있어. 락시스의 환생인 너, 마왕 쿠로토. 그리고 여신 테루루의 <ruby>어자<rt>미코</rt></ruby>인 쿠죠 비너스.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それに星見家の双子。頽廃都市の長、煌嶺……魔王ラクシスの血統も集結している」"
translation = "「게다가 호시미 가문의 쌍둥이. 퇴폐 도시의 장, 코레이…… 마왕 락시스의 혈통도 집결해 있지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、そうだ──姫咲メルエル。彼女もいたね？」"
translation = "「아아, 그래── 히메사키 메르엘. 그녀도 있었지?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「間違いなく今のアルタイルは、新旧の森羅歴を合わせても、最大最高の戦力となっている──その影響だろう」"
translation = "「틀림없이 지금의 알타이르는 신구 신라력을 합쳐도 최대 최고의 전력이 되어 있어── 그 영향이겠지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「不安定でこそあれ……勝利する未来への道は確かにある。それを魔王に伝えたかった」"
translation = "「불안정하긴 해도…… 승리하는 미래로의 길은 확실히 있어. 그걸 마왕에게 전하고 싶었어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサも魔王と同じく苦い顔をしているね」"
translation = "「아가사도 마왕과 마찬가지로 씁쓸한 표정이네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あまり軽い態度をとるな、ジグ」"
translation = "「너무 가벼운 태도 취하지 마라, 지그.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……だが、ベアトへの気遣いは感謝する。彼女をこの場に呼ぶなと言った意味はよくわかった」"
translation = "「……하지만 베아토를 배려해 준 건 고맙다. 그녀를 이 자리에 부르지 말라고 한 의미는 잘 알겠어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「あんな可愛い女の子を悲しませる趣味はないからね」"
translation = "「그런 귀여운 여자아이를 슬프게 할 취미는 없으니까 말이야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──私の話は終わりだよ。さて、会議室に行こうか。極星学園生と話をして、少しでもルヴィネの情報を集めておかないと」"
translation = "「──내 이야기는 끝이야. 자, 회의실로 갈까. 극성학원생들과 이야기해서 조금이라도 루비네의 정보를 모아둬야지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……待ってくれ。梨緒、少しいいか？」"
translation = "「……잠깐 기다려줘. 리오, 잠깐 괜찮을까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なんだ？」"
translation = "「뭐냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「守護天使ノルンの力も、ジグと同じように未来を観測できると聞いた……ジグと同じ未来が、梨緒にも視えるんだろうか？」"
translation = "「수호천사 노른의 힘도 지그와 마찬가지로 미래를 관측할 수 있다고 들었어…… 지그와 같은 미래가 리오에게도 보이는 걸까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……すまないが、私の力はジグと違う。ノルンの力は、あくまで因果の繋がりを視ることができるだけだ」"
translation = "「……미안하지만 내 힘은 지그와 다르다. 노른의 힘은 어디까지나 인과의 연결을 볼 수 있을 뿐이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「何日も、何週間も先の未来を視通すのは、守護天使の力でも不可能だ」"
translation = "「며칠, 몇 주 뒤의 미래를 꿰뚫어 보는 건 수호천사의 힘으로도 불가능해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そうか。ありがとう」"
translation = "「……그래. 고마워.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いま聞いたことは、ひとまずこの場にいる者たちの胸にしまっておいてくれ。他の皆には、タイミングを見て俺から伝える」"
translation = "「방금 들은 이야기는 우선 이 자리에 있는 사람들만 알고 있어 줘. 다른 모두에게는 타이밍을 봐서 내가 전할게.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「了解。だいぶ待たせてるし、ちょっと急ごうか」"
translation = "「라져. 꽤 기다리게 했고, 좀 서두를까.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「…………ベアト」"
translation = "「…………베아토.」"

[[dialogue]]
speaker = "unk"
original = "アルタイルはデネブと共存の道を模索する──俺はずっとそのスタンスを掲げてきた。"
translation = "알타이르는 데네브와 공존의 길을 모색한다── 나는 줄곧 그 스탠스를 내걸어 왔다."

[[dialogue]]
speaker = "unk"
original = "それを変えるつもりはない。けれど……まさかこんな事実を聞くことになるだなんて。"
translation = "그것을 바꿀 생각은 없다. 하지만…… 설마 이런 사실을 듣게 될 줄이야."

[[dialogue]]
speaker = "unk"
original = "この世界を守るためには、本当にルヴィネを討たなければならないのだろうか……？"
translation = "이 세계를 지키기 위해서는 정말로 루비네를 쳐야만 하는 것일까……?"

