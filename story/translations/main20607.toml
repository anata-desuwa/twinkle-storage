[[dialogue]]
speaker = "unk"
original = "第７話,秘密基地,B"
translation = "제7화, 비밀기지, B"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし、ここだ」"
translation = "「좋아, 여기다」"

[[dialogue]]
speaker = "unk"
original = "アポロに連れられてきたのは、ビル群の一角。"
translation = "아폴로에게 이끌려 온 곳은 빌딩 숲의 한구석."

[[dialogue]]
speaker = "unk"
original = "言われた通りにドアを開けると──"
translation = "들은 대로 문을 열자──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？\u3000ここは……？」"
translation = "「!? 여기는……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしたちの秘密基地だ。ここならルヴィネに見つかる心配もない」"
translation = "「우리들의 비밀기지다. 여기라면 루비네에게 들킬 걱정도 없지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「どうだ、かっこいいだろう？」"
translation = "「어때, 멋지지?」"

[[dialogue]]
speaker = "unk"
original = "堂々と腕を組み、フンと自慢げに鼻を鳴らすアポロ。"
translation = "당당하게 팔짱을 끼고, 흠 하며 자랑스럽게 콧소리를 내는 아폴로."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まるで流星ライダーの基地みたいです……！」"
translation = "「마치 유성 라이더의 기지 같아요……!」"

[[dialogue]]
speaker = "unk"
original = "そしてフィオナは基地のメカメカしい威容に目を輝かせていた。"
translation = "그리고 피오나는 기지의 기계적인 위용에 눈을 빛내고 있었다."

[[dialogue]]
speaker = "unk"
original = "世界が違っても、時を隔てても、やはり姉妹だ。"
translation = "세계가 달라도, 시간을 격해도, 역시 자매다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……コホン。はしゃいでいる場合ではありませんでしたね」"
translation = "「……크흠. 들떠 있을 때가 아니었네요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「いいじゃないか。テンション上がってくれた方があたしも嬉しいぞ」"
translation = "「괜찮지 않나. 텐션이 올라가 주는 편이 나도 기쁘다고」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「い、いえ……その……また後で見学させてください」"
translation = "「아, 아니요…… 그…… 나중에 다시 견학시켜 주세요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、いいぞ。武器を作るファクトリーもあるしな」"
translation = "「그래, 좋다. 무기를 만드는 팩토리도 있으니까 말이야」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ファクトリー！？\u3000ぜひ見たいです……！」"
translation = "「팩토리!? 꼭 보고 싶어요……!」"

[[dialogue]]
speaker = "unk"
original = "アポロはヒーローのように振る舞うところは以前と変わらないが、どこか落ち着きがあって、やはり大人になったと感じられた。"
translation = "아폴로는 히어로처럼 행동하는 점은 이전과 다름없지만, 어딘가 차분함이 있어 역시 어른이 되었다고 느껴졌다."

[[dialogue]]
speaker = "unk"
original = "外見の成長通り、それだけの月日を経たということなのだろう。"
translation = "외견의 성장대로, 그만큼의 세월을 거쳤다는 뜻이리라."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長、お体は大丈夫ですか？\u3000随分つらそうに見えましたけど……」"
translation = "「히노미야 회장님, 몸은 괜찮으세요? 상당히 괴로워 보였습니다만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、ありがとう、何とか動けるようになってきたよ。ヴィーナスは？」"
translation = "「아아, 고마워. 어떻게든 움직일 수 있게 됐어. 비너스는?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、私も調子が戻ってきたわ。運んでくれてありがとう、ナターシャ」"
translation = "「응, 나도 컨디션이 돌아왔어. 옮겨줘서 고마워, 나타샤」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「どーいたしまして」"
translation = "「천만에 말씀」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「金髪の女の子と、魔族の女の子もデネブに来ていたと思うんだけど、アポロは知らないか？」"
translation = "「금발 여자애랑, 마족 여자애도 데네브에 왔을 거라 생각하는데, 아폴로는 몰라?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「いいや、見てないな。その２人も仲間か？」"
translation = "「아니, 못 봤군. 그 두 사람도 동료인가?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、梨緒とベアトリスっていうんだけど。私と同じ選挙管理委員会でね」"
translation = "「응, 리오와 베아트리스라고 하는데. 나랑 같은 선거관리위원회거든」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ついでに言うと、アルタイルのアポロも選管の一員だよ」"
translation = "「덧붙여 말하자면, 알타이르의 아폴로도 선관의 일원이야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「へぇ、アルタイルのあたしは難しそうなのに入ってるんだな。ちょっと意外だ」"
translation = "「헤에, 알타이르의 나는 까다로워 보이는 곳에 들어가 있구나. 좀 의외네」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「向こうのあたしの仲間なら、こっちのあたしにとっても仲間だ。準備ができ次第探しに行くとしよう」"
translation = "「그쪽의 나의 동료라면, 이쪽의 나에게 있어서도 동료다. 준비되는 대로 찾으러 가기로 하지」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、助かるよ」"
translation = "「응, 도움이 될 거야」"

[[dialogue]]
speaker = "unk"
original = "敵地であるデネブで孤立するのは危険だ。"
translation = "적지인 데네브에서 고립되는 것은 위험하다."

[[dialogue]]
speaker = "unk"
original = "戦闘に巻き込まれていないのであればまだ無事だと思うが、早く合流したい。"
translation = "전투에 휘말리지 않았다면 아직 무사할 거라 생각하지만, 빨리 합류하고 싶다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「さて、詳しいことはまた改めて説明するが……デネブでは今は森羅暦３０１２年。お前たちとアルタイルで別れて十年後だ」"
translation = "「자, 자세한 건 나중에 다시 설명하겠지만…… 데네브는 지금 삼라력 3012년. 너희와 알타이르에서 헤어지고 10년 후다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ。あたしは本来……<ruby>アルタイル<rt>ここ</rt></ruby>にいるべき存在じゃないからな」"
translation = "「아아. 나는 본래…… 알타이르에 있어야 할 존재가 아니니까 말이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こっちのあたしが目覚めたら……なんて言うか知らないけど。フォローは頼んだぞ、ニャリオン」"
translation = "「이쪽의 내가 깨어나면…… 뭐라고 할지 모르겠지만. 뒷수습은 부탁한다, 냐리온」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「じゃあな。あたしを見捨てないでくれて、ありがとう。みんな」"
translation = "「잘 있어라. 나를 저버리지 않아 줘서 고마워. 모두들」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」"
translation = "「잔뜩 폐를 끼쳐서…… 미안했다. 이번에야말로, 진짜 히어로가 될 수 있도록 노력해 볼게」"

[[dialogue]]
speaker = "unk"
original = "ギエルと決着をつけた、フィーニスの塔の頂上での戦いの最後。"
translation = "기엘과 결판을 낸, 피니스의 탑 정상에서의 전투 마지막."

[[dialogue]]
speaker = "unk"
original = "『デネブからやってきた』リクリエの使徒であるアポロは、そう言って自分の世界へと帰っていった。"
translation = "『데네브에서 왔다』는 리크리에의 사도인 아폴로는, 그렇게 말하고 자신의 세계로 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "そのアポロと記憶を共有していた『アルタイルのアポロ』は選挙管理委員会をやっているが、今目の前にいる彼女は正真正銘、<ruby>あの時<rt>デネブ</rt></ruby>のアポロだった。"
translation = "그 아폴로와 기억을 공유하던 『알타이르의 아폴로』는 선거관리위원회를 하고 있지만, 지금 눈앞에 있는 그녀는 정진정명, 그때의 아폴로였다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ここはルヴィネに反抗するレジスタンスの秘密基地だ。まぁ実働メンバーは少数だし、反抗といっても微々たるものだがな」"
translation = "「여기는 루비네에게 저항하는 레지스탕스의 비밀기지다. 뭐 실동 멤버는 소수고, 저항이라고 해도 미미한 것이지만 말이야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「確証はないが、あたしたちレジスタンスはルヴィネを疑っている。やつには何か裏があるんじゃないかとな」"
translation = "「확증은 없지만, 우리 레지스탕스는 루비네를 의심하고 있다. 녀석에게는 뭔가 꿍꿍이가 있는 게 아닐까 하고」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……正直、デネブに来たばかりで困惑することばかりです。情報が多くて受け止め切れていません。でも──」"
translation = "「……솔직히, 데네브에 막 도착해서 당혹스러운 것뿐입니다. 정보가 많아서 다 받아들이지 못하고 있어요. 하지만──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんが生きていて良かった」"
translation = "「언니가 살아있어서 다행이에요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ホントよ！ <ruby>アルタイル<rt>あっち</rt></ruby>で別れた後心配してたんだから！」"
translation = "「정말이야! 알타이르에서 헤어진 뒤에 걱정했었다고!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、そっか。アルタイル的には、デネブは滅びたと思われてたんだっけ。十年前の話だから忘れてた」"
translation = "「아아, 그렇구나. 알타이르 입장에서는 데네브는 멸망했다고 생각됐었지. 10년 전 이야기라 잊고 있었어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「この通り、あたしは元気そのものだ。なんならお前たちより年上だぞ？」"
translation = "「이 보라고, 나는 아주 건강하다. 심지어 너희보다 연상이라고?」"

[[dialogue]]
speaker = "unk"
original = "口角を上げて不敵に笑むアポロ。"
translation = "입꼬리를 올리며 대담하게 웃는 아폴로."

[[dialogue]]
speaker = "unk"
original = "共に戦えたのはギエルとの決戦だけだったけど、彼女は確かに俺たちの仲間だ。"
translation = "함께 싸운 것은 기엘과의 결전뿐이었지만, 그녀는 확실히 우리의 동료다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「さてと……本当に久しぶりだな、エリシア」"
translation = "「그건 그렇고…… 정말 오랜만이구나, 엘리시아」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん……また会えて嬉しいです」"
translation = "「언니…… 다시 만나서 기뻐요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、あたしもだ」"
translation = "「아아, 나도다」"

[[dialogue]]
speaker = "unk"
original = "時と世界を超えて向かい合う姉と妹。"
translation = "시간과 세계를 넘어 마주 보는 언니와 동생."

[[dialogue]]
speaker = "unk"
original = "俺たちにとっては別れたのは数か月前だけど、アポロにとっては十年ぶりの再会だ。"
translation = "우리들에게 있어서 헤어진 것은 몇 개월 전이지만, 아폴로에게 있어서는 10년 만의 재회다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大きく……なりましたね」"
translation = "「많이…… 컸네요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、もうお前より年上だ。別れた時はお前より小さかったのに、今は追い越してしまった」"
translation = "「그래, 이제 너보다 연상이다. 헤어질 때는 너보다 작았는데, 지금은 앞질러 버렸어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「双子だから歳の差なんてないはずなのに、小さかったり大きかったり、不思議なもんだ」"
translation = "「쌍둥이라 나이 차이 따위 없을 텐데, 작았다가 컸다가, 신기한 노릇이지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしがいない間、エリシアは元気だったか？\u3000病気しなかったか？\u3000流星ライダーばっかり見て勉強サボってないよな？」"
translation = "「내가 없는 동안 엘리시아는 건강했나? 병치레는 안 했고? 유성 라이더만 보느라 공부 빼먹은 건 아니겠지?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「心配しなくても大丈夫です。病気もしてませんし、私、優等生ですから」"
translation = "「걱정하지 않으셔도 괜찮아요. 병도 안 걸렸고, 저, 우등생이니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんこそ、この十年、大変だったんでしょう？」"
translation = "「언니야말로, 이 10년 동안 힘들었죠?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「まぁ……いろいろあったな。デネブに戻ったらリクリエは終わっていて、ルヴィネなんてやつがいて、魔王が悪者になっていた」"
translation = "「뭐…… 여러 가지 일이 있었지. 데네브로 돌아오니 리크리에가 끝나 있었고, 루비네라는 녀석이 있고, 마왕이 악당이 되어 있었어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ルヴィネから逃げて、隠れて、何度か戦って、こうして秘密基地も作った」"
translation = "「루비네로부터 도망치고, 숨고, 몇 번인가 싸우고, 이렇게 비밀기지도 만들었지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「アルタイルでの戦いに負けないくらい、波乱の日々だったな」"
translation = "「알타이르에서의 싸움에 못지않게 파란만장한 나날이었어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん……」"
translation = "「언니……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ふ……そんな顔をするな。あたしはこうして元気にしてるからな」"
translation = "「후…… 그런 표정 짓지 마라. 나는 이렇게 건강하니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ところでデネブのフィオナ……というかエリシアはどうしたの？」"
translation = "「그런데 데네브의 피오나…… 그러니까 엘리시아는 어떻게 됐어?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まさか──」"
translation = "「설마──」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ……あたしがデネブに戻った時には、こっちのエリシアは命を落としていた」"
translation = "「아아…… 내가 데네브로 돌아왔을 때, 이쪽의 엘리시아는 목숨을 잃은 상태였다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「世界と人々を守るために戦い抜いた……ヒーローみたいに立派な最期だったと聞いている」"
translation = "「세계와 사람들을 지키기 위해 끝까지 싸웠다더군…… 히어로처럼 훌륭한 최후였다고 들었어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう……」"
translation = "「그렇구나……」"

[[dialogue]]
speaker = "unk"
original = "デネブは破滅の寸前まで追い込まれ、アルタイルよりも大きな被害を受けたと聞いている。"
translation = "데네브는 파멸 직전까지 몰렸고, 알타이르보다 큰 피해를 입었다고 들었다."

[[dialogue]]
speaker = "unk"
original = "アポロは語らないが、きっと俺たちが知る多くの星騎士も戦いで倒れているのだろう。"
translation = "아폴로는 말하지 않지만, 분명 우리가 아는 많은 성기사도 싸움에서 쓰러졌을 것이다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そんな……」"
translation = "「그럴 수가……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「どうしてお前が泣く？」"
translation = "「왜 네가 우는 거냐?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あの戦いの後、私はアルタイルの姉さんとまた会うことができました。また話すことができました」"
translation = "「그 싸움 이후, 저는 알타이르의 언니와 다시 만날 수 있었습니다. 다시 대화할 수 있었습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも姉さんはあの時別れた後、ひとりで……」"
translation = "「하지만 언니는 그때 헤어진 뒤에, 혼자서……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ひとりじゃないさ。アルタイルで共に戦ったお前たちがいるし、エリシアが遺してくれた世界がある」"
translation = "「혼자가 아니야. 알타이르에서 함께 싸운 너희들이 있고, 엘리시아가 남겨준 세계가 있어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だからあたしは、エリシアが命を懸けて守った世界を、あたしなりに守ろうとしているんだ。今度こそヒーローになれるように」"
translation = "「그래서 나는, 엘리시아가 목숨 걸고 지킨 세계를 나 나름대로 지키려고 하는 거다. 이번에야말로 히어로가 될 수 있도록」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「なぁ……エリシア。あたしはヒーローになれてるかな？」"
translation = "「있지…… 엘리시아. 나는 히어로가 되어 있을까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい……姉さんはずっと戦い続けてきた、最高のヒーローです」"
translation = "「네…… 언니는 계속 싸워온, 최고의 히어로예요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……ありがとう、エリシア」"
translation = "「……고마워, 엘리시아」"

[[dialogue]]
speaker = "unk"
original = "運命に翻弄された姉妹は、別れた時と同じようにまたぎゅっと抱き合う。"
translation = "운명에 농락당한 자매는 헤어질 때와 마찬가지로 다시 꽉 껴안는다."

[[dialogue]]
speaker = "unk"
original = "俺たちはその様子を静かに見守っていた。"
translation = "우리들은 그 모습을 조용히 지켜보고 있었다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ところでさ、ここって本当にルヴィネに見つからないの？\u3000どうやって追手の目を逃れてるわけ？」"
translation = "「그런데 말이야, 여기 정말 루비네에게 안 들키는 거야? 어떻게 추격자의 눈을 피하고 있는 건데?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「いいところに気が付いたな。ここは通常の空間から切り離された隔離空間なんだ。普通に潜伏してたらルヴィネに見つかるからな」"
translation = "「좋은 점을 짚었군. 여기는 통상적인 공간에서 격리된 격리 공간이다. 평범하게 잠복했다간 루비네에게 들킬 테니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「隔離空間？\u3000そんなのどうやって──」"
translation = "「격리 공간? 그런 걸 어떻게──」"

[[dialogue]]
speaker = "？？？"
original = "「あなたが<b>緋宮</b>クロトなら、知ってるんじゃないかしら？\u3000空間を操る魔女を」"
translation = "「당신이 <b>히노미야</b> 쿠로토라면, 알고 있지 않을까? 공간을 다루는 마녀를」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000この声は──」"
translation = "「! 이 목소리는──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「や、クロト、久しぶり！\u3000元気してたかしら～？」"
translation = "「여어, 쿠로토, 오랜만! 잘 지냈니~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん……！？」"
translation = "「어머니……!?」"

