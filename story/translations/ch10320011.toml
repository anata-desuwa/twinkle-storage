[[dialogue]]
speaker = "unk"
original = "第１話,司書のお姉さん,P"
translation = "제1화, 사서 누나, P"

[[dialogue]]
speaker = "unk"
original = "俺が新星学園に転入して数日、御前試合の前のこと――"
translation = "내가 신성학원에 전입하고 며칠, 어전 시합 전의 일――"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「こんにちは、君が噂の転入生ね。今日のオリエンテーションを担当させてもらう、司書のウィステリアよ」"
translation = "「안녕, 네가 소문의 전학생이구나. 오늘 오리엔테이션을 담당하게 된 사서 위스테리아야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「わざわざ放課後に来てもらって悪いわね。本当なら１年生が入学後に受けるものだけど、このタイミングの転入だから１人で受けてもらうわ」"
translation = "「일부러 방과 후에 오게 해서 미안해. 원래라면 1학년이 입학 후에 받는 거지만, 이 타이밍에 전입했으니까 혼자서 받게 될 거야」"

[[dialogue]]
speaker = "unk"
original = "こちらこそありがとうございます"
translation = "저야말로 감사합니다"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「うん、いい返事。じゃあまず基本的なことから」"
translation = "「응, 대답 좋네. 그럼 우선 기본적인 것부터」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>に生徒用のアプリを入れたでしょう？\u3000入館にも本の貸し出しにもアプリでの認証が必要になるから忘れないでね」"
translation = "「<ruby>DISC<rt>디스크</rt></ruby>에 학생용 앱 깔았지? 입관할 때도 책을 빌릴 때도 앱 인증이 필요하니까 잊지 마」"

[[dialogue]]
speaker = "unk"
original = "すぐに消すことになるかも"
translation = "금방 지우게 될지도 몰라요"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「どういうこと？\u3000……ああ、御前試合ね。何がどうなってそうなったか全く想像できないけど、あの会長に挑むとは大した度胸ね」"
translation = "「무슨 소리야? ……아아, 어전 시합 말이구나. 뭐가 어떻게 돼서 그렇게 된 건지 전혀 상상이 안 가지만, 그 회장에게 도전하다니 배짱 한번 두둑하네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「って、君が御前試合を挑まれた方なの？\u3000それは災難だったわね。私もそういう経験にはちょっと覚えが……いえ、何でもないわ」"
translation = "「어머, 네가 어전 시합을 도전받은 쪽이야? 그거 참 안됐네. 나도 그런 경험에는 좀 짐작 가는 게…… 아니, 아무것도 아니야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でもそんなに困った顔してないわね。むしろ前向きっていうか、やる気みなぎるって感じ。ふふっ、面白いわね、君」"
translation = "「하지만 그렇게 곤란한 얼굴은 아니네. 오히려 긍정적이라고 해야 하나, 의욕이 넘친다는 느낌. 후훗, 재미있네 너」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「勝てる勝てないは私の口から言うつもりないけど、もし負けて退学することになったら、抗議するの手伝ってあげる」"
translation = "「이길 수 있다 없다를 내 입으로 말할 생각은 없지만, 만약 져서 퇴학당하게 된다면 항의하는 거 도와줄게」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あるいは、流星学園に転入し直すのもありかもしれないわね。向こうに知り合いがいるから相談には乗れるわよ」"
translation = "「아니면 유성학원으로 다시 전입하는 방법도 있을지 몰라. 저쪽에 아는 사람이 있으니까 상담은 해줄 수 있어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「大丈夫、なんとかなるわ。全力で挑むのはもちろんだけど、気負い過ぎないようにね」"
translation = "「괜찮아, 어떻게든 될 거야. 전력으로 도전하는 건 당연하지만 너무 부담 갖지는 마」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「放課後は自主トレしてるんだっけ？\u3000じゃあオリエンテーションはさくっと終わらせましょうか」"
translation = "「방과 후에는 자율 훈련 한다고 했지? 그럼 오리엔테이션은 후딱 끝내버릴까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「本を借りる時はカウンターに持っていって、ピッと。こうしてバーコード読み取ってもらえば貸し出し手続き完了。簡単でしょ？」"
translation = "「책을 빌릴 때는 카운터로 가져가서 띡. 이렇게 바코드를 찍으면 대출 절차 완료. 간단하지?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「パソコンで図書の検索や貸し出し予約をする場合はここをクリックして……はい、こうするの。ＤＩＳＣのアプリからもできるわよ」"
translation = "「컴퓨터로 도서 검색이나 대출 예약을 할 경우에는 여기를 클릭해서…… 자, 이렇게 하는 거야. DISC 앱으로도 할 수 있어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それと、星術やリクリエに関する論文、あと新星学園の星騎士が今まで対応した案件のレポートなんかも読めるの」"
translation = "「그리고 성술이나 리크리에에 관한 논문, 그리고 신성학원의 성기사가 지금까지 대응한 사건 레포트 같은 것도 읽을 수 있어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「利用する生徒は多くないけど、星徒会長になったらお世話になるかもね」"
translation = "「이용하는 학생은 많지 않지만 성도회장이 되면 신세 질지도 모르겠네」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございました！"
translation = "감사했습니다!"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いえいえ、これも私の仕事ですから」"
translation = "「아니야, 이것도 내 일이니까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「オリエンテーションはこれで終わりだけど、質問はある？\u3000わからないことがあったら何でも聞いてね」"
translation = "「오리엔테이션은 이걸로 끝인데 질문 있어? 모르는 게 있으면 뭐든 물어봐」"

[[dialogue]]
speaker = "unk"
original = "手に持ってるその本は……？"
translation = "손에 들고 있는 그 책은……?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ～、これ？\u3000この本は肌身離さず持ってなきゃいけないというか、捨てても勝手に戻ってくるっていうか……」"
translation = "「아~ 이거? 이 책은 몸에서 떼어놓지 말고 가지고 있어야 한다고 해야 하나, 버려도 멋대로 돌아온다고 해야 하나……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「まぁ、仕事道具みたいなものよ。一応、できるだけ触らないで――」"
translation = "「뭐, 업무 도구 같은 거야. 일단 가급적이면 만지지 마――」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あわわわっ、本が重くてバランスが……」"
translation = "「아와와왓, 책이 무거워서 균형이……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あたた……無理して本を持ったら危ないって言ってるでしょ、紙屋敷さん……」"
translation = "「아야야…… 무리해서 책 들면 위험하다고 했잖아, 카미야시키 양……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ごめんなさい～っ」"
translation = "「죄송해요~」"

[[dialogue]]
speaker = "unk"
original = "大丈夫ですか？"
translation = "괜찮으세요?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あっ、ごめんなさい、下敷きにしてたわね。私は大丈夫だけど君は？\u3000怪我はない？」"
translation = "「앗, 미안해, 깔고 앉아버렸네. 나는 괜찮은데 너는? 다친 데 없어?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「……平気？\u3000良かった～。受け止めてくれてありがとう。すぐどくから」"
translation = "「……멀쩡해? 다행이다~. 받아줘서 고마워. 금방 비킬게」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あっ、近――」"
translation = "「앗, 가깝――」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（至近距離で見つめ合う２人……これは出会い？\u3000出会いなの？\u3000いつもの不運かと思ったけどこれはきっかけ？）"
translation = "（지근거리에서 서로 마주 보는 두 사람…… 이것은 만남? 만남인 거야? 평소의 불운인가 싶었지만 이건 계기?）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（転入早々、退学を突き付けられた男子生徒。窮地に立たされた彼を支えるのは、親身になって優しくしてくれる年上のお姉さん……）"
translation = "（전입하자마자 퇴학 통보를 받은 남학생. 궁지에 몰린 그를 지탱해주는 것은 친절하고 다정하게 대해주는 연상의 누나……）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（２人が特別な関係になるのに時間はかからない……）"
translation = "（두 사람이 특별한 관계가 되는 데 시간은 걸리지 않는다……）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（いいえ、生徒とそんな関係になるなんてダメよっ）"
translation = "（아니지, 학생이랑 그런 관계가 되는 건 안 돼!）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（でも教師じゃないし、節度があれば大丈夫……？\u3000年下……ありかしら……？）"
translation = "（하지만 교사도 아니고 절도만 있으면 괜찮을까……? 연하…… 가능할까……?）"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ウィステリアさん？」"
translation = "「위스테리아 씨?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひゃあっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、あはは……大丈夫、ぼーっとしてただけ。図書館は静かにしないとよね。それに重かったわよね、ごめんなさい」"
translation = "「아, 아하하…… 괜찮아, 멍하니 있었을 뿐이야. 도서관은 조용히 해야지. 그리고 무거웠지, 미안해」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「図書のことでも学園生活のことでも相談に乗るから、歳も近いし声をかけてね」"
translation = "「도서에 관한 거든 학원 생활에 관한 거든 상담해 줄 테니까, 나이도 비슷하니 말 걸어줘」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゃ、御前試合頑張って！\u3000星徒会長になった君を図書館で待ってるわ！」"
translation = "「그럼 어전 시합 힘내! 성도회장이 된 너를 도서관에서 기다릴게!」"

