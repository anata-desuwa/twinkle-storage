[[dialogue]]
speaker = "unk"
original = "第１話,感想希望,P"
translation = "제1화, 감상 희망, P"

[[dialogue]]
speaker = "unk"
original = "ある日のこと──"
translation = "어느 날의 일──"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんにお呼ばれし、九浄邸へやってきていた。"
translation = "헬레나짱의 부름을 받고, 쿠죠 저택에 와 있었다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「──ふむ。来たか、魔王」"
translation = "「──흠. 왔는가, 마왕」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そう堅くするな。私の屋敷だ、存分にくつろぐがよい」"
translation = "「그리 긴장하지 말거라. 나의 저택이니, 마음껏 편히 쉬도록 해라」"

[[dialogue]]
speaker = "unk"
original = "俺だけ呼んだ？"
translation = "나만 불렀어?"

[[dialogue]]
speaker = "unk"
original = "何の用？"
translation = "무슨 용건이야?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふふ……そうだ。本日、貴殿を呼んだのは他でもない。ぜひとも意見をうかがいたい件があってな。そこに座っていてくれ」"
translation = "「후후후…… 그렇다. 오늘 귀하를 부른 것은 다름이 아니다. 아무쪼록 의견을 묻고 싶은 건이 있어서 말이지. 거기에 앉아 있어 주게」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ん……よいしょっ……っと」"
translation = "「으음…… 영차…… 하고」"

[[dialogue]]
speaker = "unk"
original = "脱ぎ始めた！？"
translation = "벗기 시작했다!?"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「──見よ！」"
translation = "「──보아라!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これこそ我が『ヘレナ』ブランドの打ち出す新作水着──そのプロトタイプ！\u3000どうだ、魔王？」"
translation = "「이것이야말로 우리 『헬레나』 브랜드가 내놓는 신작 수영복── 그 프로토타입! 어떠냐, 마왕?」"

[[dialogue]]
speaker = "unk"
original = "でかい"
translation = "커"

[[dialogue]]
speaker = "unk"
original = "すごい"
translation = "굉장해"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それではデザインの感想になっておらん。もっとこう、気の利いた意見はないのか？」"
translation = "「그걸로는 디자인의 감상이 되지 않지 않느냐. 좀 더 뭐랄까, 재치 있는 의견은 없는 것인가?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ああ、そうだ。これを見せるために貴殿を呼んだのだ。私がデザインを手がけてきたアパレルブランド『ヘレナ』のことは知っているな？」"
translation = "「아아, 그렇다. 이것을 보여주기 위해 귀하를 부른 것이다. 내가 디자인을 다뤄온 어패럴 브랜드 『헬레나』에 대해서는 알고 있겠지?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「<ruby>弊<rt>へい</rt></ruby>ブランド『ヘレナ』はこれまで若い女子を客層にファッションを提供してきた。だが、ここらで新機軸を打ち出してみるのもアリかと思ってな」"
translation = "「우리 브랜드 『헬레나』는 지금까지 젊은 여성들을 고객층으로 패션을 제공해 왔다. 하지만, 슬슬 신기축을 내세워 보는 것도 괜찮겠다 싶어서 말이지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「実はしばし前から、夏のシーズンへ向けて水着の販売も計画していたのだ。これはその試作品第一号」"
translation = "「사실 조금 전부터, 여름 시즌을 향해 수영복 판매도 계획하고 있었다. 이것은 그 시제품 제1호」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「自ら、私のスタイルにフィットするようデザインした。ゆえに貴殿に感想を求めたのだ──どうだ、と？」"
translation = "「몸소 나의 스타일에 핏되도록 디자인했다. 그러니 귀하에게 감상을 요구한 것이다── 어떠냐고?」"

[[dialogue]]
speaker = "unk"
original = "やっぱりすごい"
translation = "역시 굉장해"

[[dialogue]]
speaker = "unk"
original = "似合ってる"
translation = "잘 어울려"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ。好いた男に褒められるというのは……ふふ、なかなか嬉しいものだな。私としたことが照れてしまうではないか」"
translation = "「흠. 좋아하는 남자에게 칭찬받는다는 것은…… 후후, 제법 기쁜 일이구나. 나답지 않게 부끄러워져 버리지 않느냐」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「しかし、具体性に欠ける感想には違いない。男性目線のアドバイスが欲しかったのだが……」"
translation = "「하지만, 구체성이 결여된 감상임에는 틀림없군. 남성 시선의 조언을 원했다만……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「この水着は特にボディラインを魅力的に引き立てるよう設計してある。出るところは出て、締まるところは締まるようにな」"
translation = "「이 수영복은 특히 바디 라인을 매력적으로 돋보이게 하도록 설계되어 있다. 나올 곳은 나오고, 들어갈 곳은 들어가도록 말이지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「特にこだわったのはこのヒップの部分だ。生地の材質も試行錯誤を重ねてな。キュッと引き締まって見えるだろう？」"
translation = "「특히 신경 쓴 것은 이 힙 부분이다. 원단 재질도 시행착오를 거듭했지. 큐 하고 긴장돼 보이지 않느냐?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ボリュームあるバストもこのように。ほれ、近うよれ。もっとじっくり見るがよい」"
translation = "「볼륨 있는 가슴도 이와 같이. 자, 가까이 오거라. 좀 더 찬찬히 봐도 좋다」"

[[dialogue]]
speaker = "unk"
original = "刺激が……"
translation = "자극이……"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「刺激が……なんだ？\u3000そうよそよそしくするでない。既に肌を重ね合わせた仲ではないか」"
translation = "「자극이…… 무엇이냐? 그리 서먹하게 굴지 말거라. 이미 살을 맞댄 사이이지 않느냐」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「逆に、貴殿が着ているのがよくないのかもしれん。魔王も脱いでよいのだぞ」"
translation = "「반대로, 귀하가 입고 있는 것이 좋지 않은 것일지도 모르겠군. 마왕도 벗어도 좋다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「その方が、むしろ実際のビーチと感覚が近しいかもしれん！\u3000ほれ、ほれ。良いではないか良いではないか」"
translation = "「그 편이 오히려 실제 비치와 감각이 가까울지도 모르지! 자, 자. 괜찮지 않느냐, 괜찮지 않느냐」"

[[dialogue]]
speaker = "unk"
original = "おやめください"
translation = "이러지 마세요"

[[dialogue]]
speaker = "unk"
original = "あ～れ～"
translation = "아~이구~"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふっふっふっ、<ruby>愛<rt>う</rt></ruby>いやつめ──このヘレナちゃんが<ruby>手籠<rt>てご</rt></ruby>めにしてやろう！」"
translation = "「훗훗훗, 기특한 녀석── 이 헬레나짱이 손아귀에 넣고 주마!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「失礼します、当主さ──あっ」"
translation = "「실례합니다, 당주 님── 앗」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「む？」"
translation = "「음?」"

[[dialogue]]
speaker = "unk"
original = "ふすまを開けて閃が入ってきた。"
translation = "미닫이문을 열고 센이 들어왔다."

[[dialogue]]
speaker = "unk"
original = "彼女が目にしたのは、水着になったヘレナちゃんと、上から脱がされようとしている俺……。"
translation = "그녀가 눈에 담은 것은, 수영복 차림이 된 헬레나짱과, 위에서부터 옷이 벗겨지려 하는 나……."

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「おっ、お取り込み中でしたか！？\u3000す、すみません──引き返しますっ！」"
translation = "「하, 한창 바쁘신 중이었나요!? 죄, 죄송합니다── 돌아가겠습니다!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「まあ待て、ちょうどよかった。実は──」"
translation = "「잠깐 기다려라, 마침 잘 됐다. 사실은──」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……行ってしまった。閃からも女性目線の意見を聞きたかったというのに、早とちりなやつだ」"
translation = "「……가 버렸군. 센에게도 여성 시선의 의견을 듣고 싶었거늘, 성급한 녀석이구나」"

[[dialogue]]
speaker = "unk"
original = "誤解された"
translation = "오해받았어"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ……せっかくお代官様ごっこに興じていたというのにな」"
translation = "「흠…… 기껏 사또 놀이에 흥을 돋우고 있었거늘」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「あの慌てようではすっかり勘違いをされてしまっただろう。私と貴殿がひそかに乳繰り合っているのではないかと」"
translation = "「저 당황하는 기색으로는 완전히 착각해 버렸겠지. 나와 귀하가 남몰래 시시덕거리고 있는 것이 아닐까 하고」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そんなに堂々と言うことか、と？\u3000はっはっは──九浄家当主として、それしきのことで心乱すわけにはいくまい」"
translation = "「그렇게 당당하게 말할 일이냐고? 하하하── 쿠죠 가문 당주로서, 그만한 일로 마음을 어지럽힐 수는 없지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それに──私たちの仲を考えたら、あながち誤解とも言えまい？」"
translation = "「게다가── 우리 사이를 생각하면, 아주 오해라고도 할 수 없지 않느냐?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「このヘレナに残ったわずかな布地……貴殿の手でめくってもよいのだぞ？」"
translation = "「이 헬레나에게 남은 근소한 천 조각…… 귀하의 손으로 들춰도 좋단다?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふふっ、よい反応だ。これだから魔王をからかうのはやめられん」"
translation = "「후후후, 좋은 반응이다. 이래서 마왕을 놀리는 것은 그만둘 수가 없군」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「今ごろ、メイド隊の間で噂されておるやもしれんな。ま、こういうのも一興というものよ」"
translation = "「지금쯤, 메이드대 사이에서 소문이 나고 있을지도 모르겠군. 뭐, 이런 것도 하나의 즐거움이지」"

[[dialogue]]
speaker = "unk"
original = "どんなハプニングがあっても、いつだって楽しげなヘレナちゃんだった……。"
translation = "어떤 해프닝이 있어도, 언제나 즐거워 보이는 헬레나짱이었다……."

