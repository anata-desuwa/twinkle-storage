[[dialogue]]
speaker = "unk"
original = "第１０話,サーシャ先輩,B"
translation = "제10화, 사샤 선배, B"

[[dialogue]]
speaker = "マトイ"
original = "「──ふぅ」"
translation = "「──후우」"

[[dialogue]]
speaker = "クロト"
original = "「なんとかなったか……？」"
translation = "「어떻게든 됐나……?」"

[[dialogue]]
speaker = "unk"
original = "昨日よりも明らかに手強い相手だったが、なんとか２人のサポートもあってスムーズに倒せた。"
translation = "어제보다 확실히 상대하기 어려운 적이었지만, 어떻게든 두 사람의 서포트도 있어서 순조롭게 쓰러뜨릴 수 있었다."

[[dialogue]]
speaker = "unk"
original = "これなら、目標タイムにも到達しているんじゃないか……？"
translation = "이 정도라면, 목표 시간에도 도달한 것 아닌가……?"

[[dialogue]]
speaker = "unk"
original = "計測結果『01:12.04』"
translation = "계측 결과 『01:12.04』"

[[dialogue]]
speaker = "アナ"
original = "「１２秒オーバーでした」"
translation = "「12초 오버였습니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「ああっ惜しい！」"
translation = "「아앗 아깝다!」"

[[dialogue]]
speaker = "アナ"
original = "「ですが、次期会長はよく戦えていました。コツは掴めたのではないかと」"
translation = "「하지만, 차기 회장님은 잘 싸웠습니다. 요령은 터득한 것 아닌가 하고요.」"

[[dialogue]]
speaker = "クロト"
original = "「そうだな。２人が弱点を教えてくれたおかげもあったけど」"
translation = "「그렇군. 두 사람이 약점을 알려준 덕분도 있었지만」"

[[dialogue]]
speaker = "unk"
original = "最終的には俺ひとりの力で一分を切らなければ、トレーニングのスタートラインにすら立てないんだものな。頑張るしかない。"
translation = "최종적으로는 나 혼자의 힘으로 1분을 끊지 못하면, 트레이닝의 시작선에조차 설 수 없는 것이니까. 열심히 할 수밖에 없다."

[[dialogue]]
speaker = "マトイ"
original = "「ていうか……緋宮くんは武器をまったく使わないんだ。珍しい」"
translation = "「그나저나…… 히노미야 군은 무기를 전혀 사용하지 않는구나. 신기하네」"

[[dialogue]]
speaker = "クロト"
original = "「ん……そうか。確かにみんなは戦闘用の得物を持ってるな」"
translation = "「음…… 그런가. 확실히 모두는 전투용 무기를 가지고 있군」"

[[dialogue]]
speaker = "アナ"
original = "「どんなアイテムを持つかは<ruby>星騎士<rt>スターナイト</rt></ruby>次第。思い入れのある物のほうが、星力を宿すにも効率がよくなります」"
translation = "「어떤 아이템을 가질지는 성기사 나름입니다. 애착이 있는 물건이 성력을 깃들게 하는 데도 효율이 좋아집니다.」"

[[dialogue]]
speaker = "unk"
original = "道ばたでモンスターと遭遇して偶発的に戦闘……"
translation = "길거리에서 몬스터와 조우하여 우발적으로 전투……"

[[dialogue]]
speaker = "unk"
original = "という野試合を繰り返してきたために、武器を持つという発想はこれまでになかった。"
translation = "라는 야전을 반복해 왔기 때문에, 무기를 가진다는 발상은 지금까지 없었다."

[[dialogue]]
speaker = "unk"
original = "ただ、特に不便でないのならわざわざ開発する必要もないとアナが言う。"
translation = "다만, 특별히 불편하지 않다면 굳이 개발할 필요도 없다고 아나가 말한다."

[[dialogue]]
speaker = "クロト"
original = "「しかし……こうやって３人で戦ってると、転入初日の朝を思い出すな」"
translation = "「하지만…… 이렇게 셋이서 싸우고 있으니, 전입 첫날 아침이 생각나는군」"

[[dialogue]]
speaker = "マトイ"
original = "「そういえば……あの時はこんなことになるなんて思わなかったけど」"
translation = "「그러고 보니…… 그때는 이런 일이 생길 거라고는 생각도 못 했지만」"

[[dialogue]]
speaker = "unk"
original = "新星学園初の登校日。"
translation = "신성 학원 첫 등교일."

[[dialogue]]
speaker = "unk"
original = "街中にモンスターが現れるや、彼女たちが助けに来てくれたこと。"
translation = "거리에 몬스터가 나타나자마자, 그녀들이 도와주러 와 준 일."

[[dialogue]]
speaker = "unk"
original = "星徒会メンバーである彼女たちは、ああして多くの戦闘を経験してきたのだろう。"
translation = "성도회 멤버인 그녀들은, 그렇게 많은 전투를 경험해 왔을 것이다."

[[dialogue]]
speaker = "クロト"
original = "「（そう言えば、あの時はもう１人……）」"
translation = "「(그러고 보니, 그때는 한 명이 더……)」"

[[dialogue]]
speaker = "サーシャ"
original = "「みんな～、やってる～？」"
translation = "「모두들~, 하고 있니~?」"

[[dialogue]]
speaker = "マトイ"
original = "「あ……サーシャさん」"
translation = "「아…… 사샤 씨」"

[[dialogue]]
speaker = "unk"
original = "噂をすればだ。"
translation = "소문하면 온다더니."

[[dialogue]]
speaker = "unk"
original = "昨日も星徒会室にいた、妖艶な雰囲気の人が、のれんをくぐるようなノリでホールへ入ってきた。"
translation = "어제도 성도회실에 있던, 요염한 분위기의 사람이, 발을 걷고 들어오는 듯한 기세로 홀에 들어왔다."

[[dialogue]]
speaker = "サーシャ"
original = "「奏サーシャ。３年生よ～。よろしくね、クロトくん♪」"
translation = "「카나데 사샤. 3학년이야~. 잘 부탁해, 쿠로토 군♪」"

[[dialogue]]
speaker = "クロト"
original = "「あ──はい。緋宮クロトです」"
translation = "「아──네. 히노미야 쿠로토입니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「サーシャさんは星徒会の会計で、魔族の先輩なの」"
translation = "「사샤 씨는 성도회의 회계 담당으로, 마족 선배야」"

[[dialogue]]
speaker = "unk"
original = "くるりと伸びた巻き角に目を見やる。"
translation = "둥글게 뻗은 뿔에 눈길을 준다."

[[dialogue]]
speaker = "unk"
original = "アナも含めると天使に魔族、そして俺たち人間も一堂に会している……"
translation = "아나를 포함하면 천사에 마족, 그리고 우리 인간도 한자리에 모여 있다……"

[[dialogue]]
speaker = "unk"
original = "こんな光景は、新星学園じゃなきゃ考えられないことだった。"
translation = "이런 광경은, 신성 학원이 아니면 생각할 수 없는 일이었다."

[[dialogue]]
speaker = "サーシャ"
original = "「それでそれで、何してたの～？\u3000ヴィーナスちゃんに随分な無茶振りされてたけど～」"
translation = "「그래서 그래서, 뭐 하고 있었니~? 비너스짱에게 꽤나 무리한 부탁을 받고 있었지만~」"

[[dialogue]]
speaker = "アナ"
original = "「かくかくしかじか。その無茶振りに応えるために頑張っていました」"
translation = "「이러이러해서. 그 무리한 부탁에 응하기 위해 노력하고 있었습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほえーなるほど……」"
translation = "「호에~ 그렇구나……」"

[[dialogue]]
speaker = "マトイ"
original = "「ちゃんと聞いてます？」"
translation = "「제대로 듣고 있어요?」"

[[dialogue]]
speaker = "unk"
original = "魔族の先輩──サーシャさんは、アナの話をこくこく頷きながら聞いていた。"
translation = "마족 선배──사샤 씨는, 아나의 이야기를 끄덕끄덕 고개를 끄덕이며 듣고 있었다."

[[dialogue]]
speaker = "unk"
original = "どこかポヤポヤした様子で、独特の穏やかさを感じさせる。"
translation = "어딘가 멍한 모습으로, 독특한 온화함을 느끼게 한다."

[[dialogue]]
speaker = "サーシャ"
original = "「あ、トレーニング用モンスター！\u3000懐かしい～昔は使ってたな」"
translation = "「아, 트레이닝용 몬스터! 그리워~ 옛날에는 썼었지」"

[[dialogue]]
speaker = "サーシャ"
original = "「ねーねーアナちゃん、わたしも測ってみていい～？」"
translation = "「저기~ 저기~ 아나짱, 나도 측정해 봐도 돼~?」"

[[dialogue]]
speaker = "アナ"
original = "「一回だけですよ」"
translation = "「한 번뿐이에요.」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは軽くはしゃぎながら、展開されたフィールドに入った。"
translation = "사샤 씨는 가볍게 들뜨면서, 전개된 필드에 들어갔다."

[[dialogue]]
speaker = "unk"
original = "慣れた様子だ。"
translation = "익숙한 모습이다."

[[dialogue]]
speaker = "サーシャ"
original = "「先輩として、かっこいいとこ見せちゃおっかな～♪」"
translation = "「선배로서, 멋진 모습 보여줄까나~♪」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイイイ！」"
translation = "「이이이이이!」"

[[dialogue]]
speaker = "unk"
original = "変身したサーシャ先輩の前に、モンスターが出現──"
translation = "변신한 사샤 선배 앞에, 몬스터가 출현──"

[[dialogue]]
speaker = "クロト"
original = "「──ってなんだアレ！？」"
translation = "「──이게 뭐야 저거!?」"

[[dialogue]]
speaker = "マトイ"
original = "「あー！\u3000サーシャさん、勝手にＳランクに設定してる……！」"
translation = "「아~! 사샤 씨, 멋대로 S랭크로 설정하고 있어……!」"

[[dialogue]]
speaker = "クロト"
original = "「それって平気なのか……！？」"
translation = "「저거 괜찮은 건가……!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「えーいっ♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker = "unk"
original = "──と危惧する間もなく、サーシャ先輩は一方的にモンスターへ氷撃を浴びせた。"
translation = "──라고 우려할 틈도 없이, 사샤 선배는 일방적으로 몬스터에게 빙격을 퍼부었다."

[[dialogue]]
speaker = "unk"
original = "そのまま、戦闘は軽やかに進んでいき……"
translation = "그대로, 전투는 경쾌하게 진행되어……"

[[dialogue]]
speaker = "アナ"
original = "「終わったようですね」"
translation = "「끝난 것 같네요.」"

[[dialogue]]
speaker = "クロト"
original = "「い……１分２秒！？」"
translation = "「이, 1분 2초!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら……１分切れるかと思ったのだけど。ふふ、でも参考になったかしら？」"
translation = "「어머…… 1분을 끊을 수 있을 거라고 생각했는데. 후후, 하지만 참고가 되었으려나?」"

[[dialogue]]
speaker = "unk"
original = "変身を解いて制服に戻るサーシャ先輩。"
translation = "변신을 풀고 교복으로 돌아오는 사샤 선배."

[[dialogue]]
speaker = "unk"
original = "今、彼女があっさり倒したモンスターはＳランク──"
translation = "지금, 그녀가 간단히 쓰러뜨린 몬스터는 S랭크──"

[[dialogue]]
speaker = "unk"
original = "伝え聞いていたヴィーナスの評価に迫るほどの強さだ。"
translation = "전해 들었던 비너스의 평가에 육박할 정도의 강함이다."

[[dialogue]]
speaker = "クロト"
original = "「……驚きました。とんでもないですね」"
translation = "「……놀랐습니다. 대단하네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「サーシャさんは会長が会長になる前の会長だもの」"
translation = "「사샤 씨는 회장이 회장이 되기 전의 회장인걸」"

[[dialogue]]
speaker = "クロト"
original = "「か、会長が快調に開帳！？」"
translation = "「카, 회장이 쾌조로 개장!?」"

[[dialogue]]
speaker = "アナ"
original = "「ヴィーナス現会長の前任、ですね」"
translation = "「비너스 현 회장의 전임자, 이지요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんなこともあったような～。なかったような～？」"
translation = "「그런 일도 있었던 것 같기도~. 없었던 것 같기도~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「でもでもクロトくん。出力ばかり気にしてちゃダメよ～、星力は扱い方も大事なんだから～」"
translation = "「그렇지만 그렇지만 쿠로토 군. 출력만 신경 써서는 안 돼~, 성력은 다루는 방법도 중요하니까~」"

[[dialogue]]
speaker = "クロト"
original = "「サーシャ先輩……」"
translation = "「사샤 선배……」"

[[dialogue]]
speaker = "unk"
original = "星力はいわば筋力。"
translation = "성력은 말하자면 근력."

[[dialogue]]
speaker = "unk"
original = "だが、いくら筋肉をつけてもイコール戦闘が上達するわけではないという。"
translation = "하지만, 아무리 근육을 붙여도 곧 전투가 향상되는 것은 아니라고 한다."

[[dialogue]]
speaker = "アナ"
original = "「次期会長は変身後の戦闘にまだ慣れてない。これは転入生なんだから、どうしようもないことですが」"
translation = "「차기 회장님은 변신 후의 전투에 아직 익숙하지 않아요. 이것은 전입생이니, 어쩔 수 없는 일입니다만」"

[[dialogue]]
speaker = "サーシャ"
original = "「なるほど～。ならやっぱり、お稽古しかないのかな～」"
translation = "「과연~. 그럼 역시, 수련밖에 없는 걸까나~」"

[[dialogue]]
speaker = "クロト"
original = "「お願いします。俺は──俺は今の会長、ヴィーナスに勝たなくちゃいけないんです」"
translation = "「부탁드립니다. 저는── 저는 지금의 회장, 비너스에게 이겨야만 합니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふふ。あんな無理難題を押し付けられても……諦めないのね」"
translation = "「후후후. 그런 무리한 요구를 강요당해도…… 포기하지 않는구나.」"

[[dialogue]]
speaker = "サーシャ"
original = "「嫌いじゃないわ、そういう子♪」"
translation = "「싫지 않아, 그런 아이♪」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに迫るほどのサーシャ先輩なら、きっといい鍛錬ができるだろう。"
translation = "비너스에게 육박할 정도의 사샤 선배라면, 분명 좋은 단련을 할 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "今の俺の力が、まだまだ及んでいないことは百も承知だけれど……"
translation = "지금 내 힘이, 아직도 미치지 못한다는 것은 백 번도 알고 있지만……"

[[dialogue]]
speaker = "ヴィーナス"
original = "『緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！』"
translation = "『히노미야 쿠로토──당신은 나와 싸워 이기고, 그 진정한 힘을 모두에게 알려야 해!』"

[[dialogue]]
speaker = "unk"
original = "彼女の姿、そして言葉が脳裏に浮かぶ。"
translation = "그녀의 모습, 그리고 말이 뇌리에 떠오른다."

[[dialogue]]
speaker = "unk"
original = "同じ星徒会役員の彼女たちだって面食らっていたのだ。言い逃れしようと思えばできたのかもしれない。"
translation = "같은 성도회 임원인 그녀들조차 당황하고 있었다. 변명하려고 마음먹으면 할 수도 있었을 것이다."

[[dialogue]]
speaker = "unk"
original = "だが、なぜだろうか。"
translation = "하지만, 왜일까."

[[dialogue]]
speaker = "unk"
original = "彼女の真っ直ぐな視線から……とても逃げる気になれなかったのは。"
translation = "그녀의 올곧은 시선에서…… 도저히 도망칠 마음이 들지 않았던 것은."

[[dialogue]]
speaker = "サーシャ"
original = "「よ～し。それじゃお姉さんからたっぷり技を盗みなさ～い」"
translation = "「좋아~. 그럼 언니에게서 기술을 잔뜩 훔쳐 가렴~」"

[[dialogue]]
speaker = "クロト"
original = "「はい！」"
translation = "「네!」"

