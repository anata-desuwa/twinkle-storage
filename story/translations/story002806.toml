[[dialogue]]
speaker = "unk"
original = "書庫から伸びた鎖が、傷ついたウィステリアの四肢を拘束し、自由を奪う。"
translation = "서고에서 뻗어 나온 사슬이 상처 입은 위스테리아의 사지를 구속하고 자유를 빼앗는다."

[[dialogue]]
speaker = "unk"
original = "それはフィーニスの塔で戒められたヴィライアの再現だった。"
translation = "그것은 피니스의 탑에서 구속되었던 빌라이아의 재현이었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「く……ぅっ……鎖で縛りつけて、いつかの意趣返しかしら？」"
translation = "「큭…… 윽…… 사슬로 묶어두다니 언젠가 당했던 보복이라도 하는 거니?」"

[[dialogue]]
speaker = "ヴィライア"
original = "『この姿は吸収した魔力からヴィライアを再現したもの。私にヴィライアとしての感情はないわ』"
translation = "『이 모습은 흡수한 마력으로 빌라이아를 재현한 것. 나에게 빌라이아로서의 감정은 없다』"

[[dialogue]]
speaker = "ヴィライア"
original = "『星力だけでよく抵抗したわ。でもこれで理解したでしょう。魔導書なしではあなたは“英雄”たりえない』"
translation = "『성력만으로 잘 저항했군. 하지만 이제 이해했겠지. 마도서 없이는 너는 “영웅”이 될 수 없다』"

[[dialogue]]
speaker = "ウィステリア"
original = "「だから、英雄なんかならないって言ってるでしょっ！」"
translation = "「그러니까 영웅 같은 건 안 된다고 했잖아!」"

[[dialogue]]
speaker = "ヴィライア"
original = "『運命を受け入れなさい。呪いに身を委ねるのよ』"
translation = "『운명을 받아들여라. 저주에 몸을 맡기는 거다』"

[[dialogue]]
speaker = "ウィステリア"
original = "「こいつ、ホント聞く耳なしね……」"
translation = "「이 녀석, 정말 말귀를 못 알아먹네……」"

[[dialogue]]
speaker = "ウィステリア"
original = "（でも、もう打つ手なし。どうしたら……）"
translation = "(하지만 이제 손쓸 방법이 없어. 어떡하지……)"

[[dialogue]]
speaker = "モネ"
original = "「どわーーーーーーーーっ！？」"
translation = "「도와아아아아아아아아악!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さん！？」"
translation = "「카미야시키 양!?」"

[[dialogue]]
speaker = "モネ"
original = "「あたた……ウィステリアさん、よかった。ご無事だったんですね」"
translation = "「아이구구…… 위스테리아 씨, 다행이다. 무사하셨군요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いや、全然ご無事じゃないけど……それより、どうして戻ってきたの！？\u3000ここは……」"
translation = "「아니, 전혀 무사하지 않은데…… 그보다 어떻게 돌아온 거야!? 여기는……」"

[[dialogue]]
speaker = "モネ"
original = "「『リクリエで滅んだ魔族の怨念を収めた書庫』なんですよね？」"
translation = "「『리크리에로 멸망한 마족의 원념을 담은 서고』인 거죠?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なんで知って……紙屋敷さん、まさかここの本を読んだの！？」"
translation = "「어떻게 알았어…… 카미야시키 양, 설마 여기 책을 읽은 거야!?」"

[[dialogue]]
speaker = "モネ"
original = "「はい。この子に教えてもらいました」"
translation = "「네. 이 아이가 가르쳐주었어요」"

[[dialogue]]
speaker = "unk"
original = "そう言って、本を見せるモネ。指先は焦げ、戦闘服もところどころ破けている。"
translation = "그렇게 말하며 책을 보여주는 모네. 손가락 끝은 타고 전투복도 여기저기 찢어져 있었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「呪いの本を読むってことはその本に呪われるってことなの。今まで読めなかった字が読めるのも、呪いを受けたからよ」"
translation = "「저주의 책을 읽는다는 건 그 책에 저주받는다는 뜻이야. 지금까지 읽지 못했던 글자를 읽을 수 있는 것도 저주를 받았기 때문이라고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「一冊読むだけでそんなにボロボロになって……でも、この書庫の危険性は理解したでしょう。ここにある本は全て呪いの本」"
translation = "「한 권 읽은 것만으로 그렇게 엉망진창이 되다니…… 하지만 이 서고의 위험성은 이해했겠지. 여기 있는 책은 전부 저주의 책이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「しかも、その呪いが流星市国に解き放たれようとしている」"
translation = "「게다가 그 저주가 유성시국에 해방되려 하고 있어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さん、私の最後の力であなたを図書館に戻すわ。援軍を呼んできて」"
translation = "「카미야시키 양, 내 마지막 힘으로 너를 도서관으로 돌려보낼게. 원군을 불러와 줘」"

[[dialogue]]
speaker = "ウィステリア"
original = "「できるだけ強力な援軍を……新星・流星両学園の星徒会を呼んで。ヴィライアが現れた。そう伝えれば必ず来てくれるわ」"
translation = "「가능한 한 강력한 원군을…… 신성·유성 양쪽 학원의 성도회를 불러줘. 빌라이아가 나타났다. 그렇게 전하면 반드시 와줄 거야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そして、この書庫を破壊するように伝えて」"
translation = "「그리고 이 서고를 파괴해달라고 전해줘」"

[[dialogue]]
speaker = "ウィステリア"
original = "「呪いが解き放たれる前にこの書庫を破壊する。それが新星学園からこの地下図書館の調査を任された、私の答えよ」"
translation = "「저주가 풀려나기 전에 이 서고를 파괴한다. 그것이 신성학원으로부터 이 지하 도서관 조사를 맡은 나의 답이야」"

[[dialogue]]
speaker = "ヴィライア"
original = "『心外ね。あなたが魔本たちの呪いを受け入れれば、破壊する必要なんてないわ』"
translation = "『섭섭하군. 네가 마본들의 저주를 받아들인다면 파괴할 필요 따위 없는데』"

[[dialogue]]
speaker = "モネ"
original = "「きゃあーっ！？\u3000おっきなドラゴン！？」"
translation = "「꺄아악!? 커다란 드래곤!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ウソ、気付いてなかったの！？」"
translation = "「세상에, 모르고 있었어!?」"

[[dialogue]]
speaker = "モネ"
original = "「本たちとウィステリアさんのことしか頭になかったので……」"
translation = "「책들이랑 위스테리아 씨 생각밖에 없어서……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あのドラゴンは煌竜ヴィライア。かつてのリクリエで世界を滅ぼした竜……の再現らしいわ」"
translation = "「저 드래곤은 황룡 빌라이아. 과거의 리크리에에서 세계를 멸망시킨 용……의 재현인 것 같아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あれの言う通りに書庫の呪いを受け入れれば、私は廃人になってしまう代わりに、強大な力を得る」"
translation = "「저 녀석 말대로 서고의 저주를 받아들이면 나는 폐인이 되는 대신 강력한 힘을 얻어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「その力でリクリエを退けること。それがあのドラゴンの目的よ」"
translation = "「그 힘으로 리크리에를 물리치는 것. 그것이 저 드래곤의 목적이야」"

[[dialogue]]
speaker = "モネ"
original = "「つまり書庫を破壊して流星市国を守るか……」"
translation = "「즉, 서고를 파괴해서 유성시국을 지키느냐……」"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさんが書庫の呪いを受け入れ、その自我と引き換えに強大な力を得るか……」"
translation = "「위스테리아 씨가 서고의 저주를 받아들이고 자아와 맞바꿔 강력한 힘을 얻느냐……」"

[[dialogue]]
speaker = "ヴィライア"
original = "『ふたつにひとつ、なんて言わせないわ』"
translation = "『둘 중 하나라고 하게 두지 않겠다』"

[[dialogue]]
speaker = "ヴィライア"
original = "『人間の娘。私の邪魔をしないなら、あなたに危害は加えないと約束するわ。私の敵はリクリエであって、人間ではないのだから』"
translation = "『인간 계집. 내 방해를 하지 않는다면 너에게 위해를 가하지 않겠다고 약속하마. 나의 적은 리크리에지 인간이 아니니까』"

[[dialogue]]
speaker = "ヴィライア"
original = "『けれど、邪魔をするなら排除するまで。命が惜しければ何もせず、書庫の隅でじっとしていなさい』"
translation = "『하지만 방해한다면 배제할 뿐이다. 목숨이 아깝다면 아무것도 하지 말고 서고 구석에 가만히 있어라』"

[[dialogue]]
speaker = "ウィステリア"
original = "「紙屋敷さん。怖いだろうけど、脅しに屈しちゃダメよ。助けを呼んできて。この書庫を壊して、流星市国を守らなくちゃ」"
translation = "「카미야시키 양. 무섭겠지만 위협에 굴하면 안 돼. 도움을 불러와 줘. 이 서고를 부수고 유성시국을 지켜야 해」"

[[dialogue]]
speaker = "ウィステリア"
original = "「大丈夫、あなたは私が守るわ」"
translation = "「괜찮아, 너는 내가 지킬게」"

[[dialogue]]
speaker = "モネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "モネ"
original = "「私は……どちらも選びません！」"
translation = "「저는…… 어느 쪽도 택하지 않겠습니다!」"

[[dialogue]]
speaker = "モネ"
original = "「私は、ウィステリアさんも、この本たちも、どちらも諦めない！！」"
translation = "「저는 위스테리아 씨도, 이 책들도, 둘 다 포기하지 않을 거예요!!」"

