[[dialogue]]
speaker = "unk"
original = "第２話,普通のカップル,P"
translation = "제2화, 평범한 커플, P"

[[dialogue]]
speaker = "unk"
original = "マトイと付き合い始めて、１週間ほど経ったある日──"
translation = "마토이와 사귀기 시작하고 1주일 정도 지난 어느 날──"

[[dialogue]]
speaker = "マトイ"
original = "「会長、この書類なんだけど、先にやっておいたよ。後は最終確認だけなんで、よろしくお願いします」"
translation = "「회장님, 이 서류 말인데, 미리 해뒀어. 나머지는 최종 확인뿐이니까, 잘 부탁드립니다」"

[[dialogue]]
speaker = "unk"
original = "ちょうど次にやろうと思ってたから、助かる"
translation = "마침 다음에 하려고 생각하던 참이었는데, 고마워"

[[dialogue]]
speaker = "マトイ"
original = "「えへへ、何となくそんな気がしてたんだ♪」"
translation = "「에헤헤, 왠지 그런 기분이 들었거든♪」"

[[dialogue]]
speaker = "マトイ"
original = "「――以心伝心だなんて、会長ってば大袈裟だよ～。これくらいは……ね？\u3000今なら普通っていうか～」"
translation = "「──이심전심이라니, 회장님도 참 과장이 심해~. 이 정도는…… 그치? 지금이라면 보통이라고 할까~」"

[[dialogue]]
speaker = "アナ"
original = "「じ～っ」"
translation = "「지~익」"

[[dialogue]]
speaker = "マトイ"
original = "「うん？\u3000アナ……こっちをじっと見て、どうしたの？」"
translation = "「응? 아나…… 이쪽을 빤히 보고, 왜 그래?」"

[[dialogue]]
speaker = "アナ"
original = "「……もしかしてお２人、付き合い始めましたか？」"
translation = "「……혹시 두 분, 사귀기 시작했나요?」"

[[dialogue]]
speaker = "マトイ"
original = "「なっ！？\u3000何でそんな……」"
translation = "「앗!? 어째서 그런……」"

[[dialogue]]
speaker = "アナ"
original = "「いやむしろ、気付かない方がおかしいレベルでは？\u3000甘いオーラが駄々漏れてますよ」"
translation = "「아니 오히려, 모르는 게 이상한 수준 아닌가요? 달콤한 오라가 줄줄 새어 나오고 있다고요」"

[[dialogue]]
speaker = "マトイ"
original = "「う、嘘！？\u3000隠してるつもりだったのに……！」"
translation = "「거, 거짓말!? 숨기려고 했었는데……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000１週間くらい前からよね～。そうなんだろうなって思ってたわ～♪」"
translation = "「우후후♪ 1주일 전쯤부터였지~. 그럴 거라고 생각했단다~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ、なに、そうなの！？\u3000クロトとマトイ、いつの間にそんな関係に……！」"
translation = "「엣, 뭐야, 그런 거야!? 쿠로토랑 마토이, 어느새 그런 관계가……!」"

[[dialogue]]
speaker = "アナ"
original = "「気付いてない人、ここにいましたね……」"
translation = "「모르는 사람, 여기 있었네요……」"

[[dialogue]]
speaker = "マトイ"
original = "「は、恥ずかしいから黙ってたけど……うん、そうなの。１週間前から私、会長と男女のお付き合いを始めることになりまして……」"
translation = "「부, 부끄러워서 가만히 있었지만…… 응, 맞아. 1주일 전부터 나, 회장님과 남녀 사이로 사귀게 되어서……」"

[[dialogue]]
speaker = "アナ"
original = "「おめでとうございます。お２人が互いに好意を抱いていることは予想出来てましたから、無事に気持ちが通じ合えたようで何より」"
translation = "「축하드려요. 두 분이 서로 호감을 품고 있다는 건 예상하고 있었으니까, 무사히 마음이 통한 것 같아 다행이네요」"

[[dialogue]]
speaker = "サーシャ"
original = "「おめでと～♪\u3000後で何か、お祝いしないといけないわね～」"
translation = "「축하해~♪ 나중에 뭔가 축하를 해줘야겠네~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おめでとう！\u3000……だけど、ちょっと待って！\u3000私にとっては突然のカミングアウトで、色々聞きたいことが山盛りよ！」"
translation = "「축하해! ……하지만 잠깐만! 나한테는 갑작스러운 커밍아웃이라, 여러 가지 묻고 싶은 게 산더미라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイはクロトのこと、いつから好きだったの？」"
translation = "「마토이는 쿠로토를 언제부터 좋아했던 거야?」"

[[dialogue]]
speaker = "マトイ"
original = "「え！？\u3000そ、それは……」"
translation = "「에!? 그, 그건……」"

[[dialogue]]
speaker = "unk"
original = "確かに、聞いてなかった"
translation = "그러고 보니, 듣지 못했네"

[[dialogue]]
speaker = "マトイ"
original = "「えっと……会長が最初に転入してきた時に、整っている顔立ちだけど、親近感を持てる雰囲気がいいなって思ってて……」"
translation = "「저기…… 회장님이 처음 전학 왔을 때, 반듯한 이목구비지만 친근감을 느낄 수 있는 분위기가 좋다고 생각했었고……」"

[[dialogue]]
speaker = "マトイ"
original = "「努力家で、諦めずに何度も立ち上がって、御前試合でヴィーナスに勝っちゃうのは、見惚れちゃうくらいカッコよかったし……」"
translation = "「노력가에, 포기하지 않고 몇 번이나 일어서서 어전 시합에서 비너스에게 이겨버리는 건, 넋을 잃고 볼 정도로 멋있었으니까……」"

[[dialogue]]
speaker = "マトイ"
original = "「それから一緒にいる内に、普通な私のこともちゃんと女の子として見てくれてることが分かったり、困っていると気付いて助けてくれる優しいところも素敵だし……」"
translation = "「그리고 같이 있는 동안에, 평범한 나도 제대로 여자애로 봐주고 있다는 걸 알게 되거나, 곤란해하면 알아채고 도와주는 다정한 점도 멋지고……」"

[[dialogue]]
speaker = "マトイ"
original = "「気付いたら……頭の中が会長でいっぱいになっちゃうくらい、好きになってました……はい」"
translation = "「정신 차려보니…… 머릿속이 회장님으로 가득 찰 정도로, 좋아하게 되었습니다…… 네」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、うふふ♪\u3000会長くん、顔が真っ赤になってるわ～」"
translation = "「어머어머, 우후후♪ 회장 군, 얼굴이 새빨개졌네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイがクロトのこと、大好きなのはよく分かったわ！\u3000告白はどっちがしたの？」"
translation = "「마토이가 쿠로토를 정말 좋아한다는 건 잘 알았어! 고백은 누가 한 거야?」"

[[dialogue]]
speaker = "マトイ"
original = "「えっと……会長がこの前、リゾート結界で遊ぼうって誘ってくれて、会長が告白してくれて……」"
translation = "「저기…… 회장님이 저번에 리조트 결계에서 놀자고 권해줘서, 회장님이 고백해줘서……」"

[[dialogue]]
speaker = "アナ"
original = "「ほほう。どちらが告白してもおかしくないと思っていましたが……会長、やりますね」"
translation = "「호오. 어느 쪽이 고백해도 이상하지 않다고 생각했습니다만…… 회장님, 제법이네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それでそれで？\u3000どんな風に告白されたの？」"
translation = "「그래서 그래서? 어떤 식으로 고백받았어?」"

[[dialogue]]
speaker = "マトイ"
original = "「さ、流石にそれは……秘密」"
translation = "「여, 역시 그건…… 비밀」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え～！\u3000凄く気になるのに～！」"
translation = "「에~! 정말 궁금한데~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあじゃあ、クロトは？\u3000マトイのどんなところが好きになったの？」"
translation = "「그럼 그럼, 쿠로토는? 마토이의 어떤 점이 좋아진 거야?」"

[[dialogue]]
speaker = "unk"
original = "俺にはいつも嬉しくて……可愛いんだ"
translation = "나에게는 언제나 기쁘고…… 귀여워"

[[dialogue]]
speaker = "unk"
original = "マトイが自分では普通だと思っていることが"
translation = "마토이가 스스로는 평범하다고 생각하는 것들이"

[[dialogue]]
speaker = "unk"
original = "――何気ない気遣いだとか、仕草だとか、好意が隠し切れないところだとか。気付けば俺にとってのマトイは、無くてはならない、当たり前の『普通』の存在になっていた。"
translation = "──아무렇지 않은 배려라든가, 몸짓이라든가, 호감을 숨기지 못하는 점이라든가. 깨닫고 보니 나에게 마토이는 없어서는 안 될, 당연한 『평범한』 존재가 되어 있었다."

[[dialogue]]
speaker = "マトイ"
original = "「会長……私、普通って言われて、こんなに嬉しく思ったのは初めて……♪」"
translation = "「회장님…… 나, 평범하다는 말을 듣고 이렇게 기쁘게 생각한 건 처음이야……♪」"

[[dialogue]]
speaker = "マトイ"
original = "「――うん、分かってる。欠かせない普通ってことは……会長にとっての『特別』ってことなんでしょ？」"
translation = "「──응, 알고 있어. 없어서는 안 될 평범함이라는 건…… 회장님에게 있어서 『특별함』이라는 거지?」"

[[dialogue]]
speaker = "マトイ"
original = "「えへへ……どうしよう、会長の気持ちが分かったら、ますます好きになっちゃったかも……♪」"
translation = "「에헤헤…… 어쩌지, 회장님의 마음을 알게 되니까 점점 더 좋아져 버렸을지도……♪」"

[[dialogue]]
speaker = "unk"
original = "……俺もだ"
translation = "……나도 그래"

[[dialogue]]
speaker = "アナ"
original = "「……何というか、普通にバカップルでは？」"
translation = "「……뭐랄까, 그냥 닭살 커플 아닌가요?」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっ！？\u3000いやいや、お互い好きなの分かっているんだから、これくらい普通のカップルでもする会話でしょ！？」"
translation = "「잠깐!? 아니아니, 서로 좋아하는 거 알고 있으니까 이 정도는 평범한 커플이라도 하는 대화잖아!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「す、凄いわマトイ！\u3000私いまちょっと、顔が熱くなってるもの！\u3000これがバカップルってやつなのね……！」"
translation = "「대, 대단해 마토이! 나 지금 조금 얼굴이 뜨거워졌는걸! 이게 닭살 커플이라는 거구나……!」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナスが赤面するレベルで恥ずかしいこと言ってた！？」"
translation = "「비너스가 얼굴을 붉힐 정도로 부끄러운 소리를 하고 있었어!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪\u3000さっきの会話で、会長くんがどんな告白したか、何となく分かっちゃったわね～♪」"
translation = "「어머~♪ 방금 대화로 회장 군이 어떤 고백을 했는지 대충 알 것 같네~♪」"

[[dialogue]]
speaker = "アナ"
original = "「ええ、満足しました。ごちそうさまです」"
translation = "「네, 만족했습니다. 잘 먹었습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なになに、２人共、告白内容が分かったの？\u3000私に教えて！」"
translation = "「뭐야 뭐야, 둘 다 고백 내용을 안 거야? 나한테도 알려줘!」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ、それはね～♪」"
translation = "「우후후, 그건 말이지~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「わあぁぁぁーーーっ！\u3000ちょっと待って！\u3000サーシャさん、ストップ！\u3000ストォォォーーーップ！！！」"
translation = "「와아아아──앗! 잠깐만! 사샤 씨, 스톱! 스토오오오옵!!!」"

[[dialogue]]
speaker = "unk"
original = "そんな風に、マトイが顔を赤くして、慌てる姿も可愛くて……うん、我ながらバカップルだなと思ってしまうのだった。"
translation = "그런 식으로 마토이가 얼굴을 붉히며 당황하는 모습도 귀여워서…… 응, 나도 참 닭살 커플이구나 하고 생각하게 되는 것이었다."

