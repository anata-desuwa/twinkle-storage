[[dialogue]]
speaker = "ヴィーナス"
original = "「学園生から星徒会宛てに通報があったのって、こっちよね」"
translation = "「학원생으로부터 성도회 앞으로 신고가 들어온 건, 이쪽이지」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、アリーナの方が騒がしい、とのことでした」"
translation = "「네, 아레나 쪽이 소란스럽다고 했습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ホントに、メイプルのことと関係あるのかしら？」"
translation = "「정말로, 메이플 일과 관계가 있는 걸까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「可能性はありますが……」"
translation = "「가능성은 있습니다만……」"

[[dialogue]]
speaker = "unk"
original = "なんだか、嫌な予感がするな……"
translation = "왠지, 불길한 예감이 든다……"

[[dialogue]]
speaker = "ロロット"
original = "「おや……？」"
translation = "「어라……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ……！\u3000見て、あそこ！」"
translation = "「앗……! 봐, 저기!」"

[[dialogue]]
speaker = "ナナカ"
original = "「なんでい、ありゃ……なんかの演説？」"
translation = "「뭐여, 저건…… 뭔가 연설이여?」"

[[dialogue]]
speaker = "メイプル"
original = "「はーっはっはっはー！」"
translation = "「하ー핫핫하ー!」"

[[dialogue]]
speaker = "メイプル"
original = "「我こそは、魔王マカロンさまだー！\u3000者ども、遠慮なくあたしを頼りにするがいい～！」"
translation = "「나야말로, 마왕 마카롱 님이다ー! 너희들, 사양 말고 나를 의지하는 게 좋을 거다~!」"

[[dialogue]]
speaker = "ナナカ"
original = "「なんか、見慣れないヤバそうなやつがいる……！」"
translation = "「뭔가, 낯선 위험해 보이는 녀석이 있어……!」"

[[dialogue]]
speaker = "ロロット"
original = "「確かに騒がしいですね」"
translation = "「확실히 소란스럽네요」"

[[dialogue]]
speaker = "パッキー"
original = "「そしてそのお供、大賢者パッキー様だぜ！」"
translation = "「그리고 그 수행원, 대현자 팟키 님이다!」"

[[dialogue]]
speaker = "ナナカ"
original = "「見慣れたヤバそうなやつもいた！」"
translation = "「낯익은 위험해 보이는 녀석도 있었다!」"

[[dialogue]]
speaker = "ロロット"
original = "「おや、パンダさんじゃないですか」"
translation = "「어머, 팬더 씨가 아닌가요」"

[[dialogue]]
speaker = "ナナカ"
original = "「てか、なにやってんでいあいつ！」"
translation = "「그나저나, 뭐 하는 거여 저 자식!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えぇ……やっぱり、またなの……」"
translation = "「에에…… 역시, 또야……」"

[[dialogue]]
speaker = "フィオナ"
original = "「今回の認識改変のこと、気になっていましたが……なんとなく、これで大体のことは察し、という感じですね」"
translation = "「이번 인식 개변에 대해, 신경 쓰였는데…… 왠지, 이걸로 대부분의 일은 짐작이 간다는 느낌이네요」"

[[dialogue]]
speaker = "ルリエル"
original = "「あら……？」"
translation = "「어머……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「妹さん、パンダさん、なにやらお客様のようですよ」"
translation = "「여동생 씨, 팬더 씨, 뭔가 손님이 온 것 같아요」"

[[dialogue]]
speaker = "パッキー"
original = "「クックック……来たか！」"
translation = "「크크크…… 왔나!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ここは、この一の子分であるわたしにお任せです！」"
translation = "「여기는, 이 첫째 부하인 저에게 맡기세요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっ、ルリエル……？」"
translation = "「엣, 루리엘……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっと……多分、本物よね」"
translation = "「음…… 아마, 진짜겠지」"

[[dialogue]]
speaker = "ナナカ"
original = "「おっ、なんか、ロロちゃんに雰囲気似てる子だね」"
translation = "「오, 뭔가, 로로짱이랑 분위기가 닮은 애네」"

[[dialogue]]
speaker = "ロロット"
original = "「何を言っているんですか、わたしはあんなにふにゃふにゃしていませんよ」"
translation = "「무슨 말씀을 하시는 건가요, 저는 저렇게 흐느적거리지 않았어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちょっとルリエル、姿が見えないと思ったら、こんなところで何をやっているの」"
translation = "「잠깐 루리엘, 모습이 안 보인다 했더니, 이런 데서 뭘 하고 있는 거야」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエル……？\u3000それはどちら様のことでしょう？」"
translation = "「루리엘……? 그건 누구를 말씀하시는 걸까요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっ」"
translation = "「엣」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やっぱりまたこのパターン！\u3000絶対あのセクハラパンダのせいでしょ、いい加減にしてよも～っ！」"
translation = "「역시 또 이 패턴! 절대 저 성희롱 팬더 때문이겠지, 적당히 좀 해 모ー옷!」"

[[dialogue]]
speaker = "ナナカ"
original = "「あぁ、うん、なんかごめん……」"
translation = "「아, 응, 뭔가 미안……」"

[[dialogue]]
speaker = "ルリエル"
original = "「初めまして。わたしは、ロロットと申します。以後お見知りおきを」"
translation = "「처음 뵙겠습니다. 저는, 로롯토라고 합니다. 앞으로 잘 부탁드립니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「え？\u3000ああ、そっくりさんとか？」"
translation = "「에? 아아, 닮은 사람이라든가?」"

[[dialogue]]
speaker = "ロロット"
original = "「そんなわけないじゃないですか～！」"
translation = "「그럴 리가 없잖아요~!」"

[[dialogue]]
speaker = "ルリエル"
original = "「むむむ、あなたは一体……」"
translation = "「으으음, 당신은 대체……」"

[[dialogue]]
speaker = "ロロット"
original = "「ふむ、きちんとしたご挨拶が必要なようですね」"
translation = "「흠, 제대로 된 인사가 필요한 것 같네요」"

[[dialogue]]
speaker = "ルリエル"
original = "「同感です」"
translation = "「동감입니다」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしこそ――」"
translation = "「저야말로――」"

[[dialogue]]
speaker = "ルリエル"
original = "「わたしは――」"
translation = "「저는――」"

[[dialogue]]
speaker = "2人"
original = "「ロロット・ローゼンクロイツです！」"
translation = "「로롯토 로젠크로이츠입니다!」"

[[dialogue]]
speaker = "ナナカ"
original = "「そっくりじゃん」"
translation = "「똑같잖아」"

[[dialogue]]
speaker = "ロロット"
original = "「ほほう、なりすましとは、随分悪質なのです」"
translation = "「호오, 사칭이라니, 꽤나 악질이네요」"

[[dialogue]]
speaker = "ルリエル"
original = "「そちらこそ、キャラ被りなんて浅はかな真似はやめて下さ～い！」"
translation = "「당신이야말로, 캐릭터 겹치기 같은 얄팍한 짓은 그만두세요~!」"

[[dialogue]]
speaker = "ロロット"
original = "「おや、被せてきているのはそちらでは？」"
translation = "「어머, 겹치고 있는 건 그쪽이 아닌가요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「なんですって～！\u3000適当なことを言わないで下さい！」"
translation = "「뭐라고요~! 적당히 말하지 마세요!」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしはいつでも、真剣そのものなのです」"
translation = "「저는 언제나, 진심 그 자체입니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「そんなにゆるくて、ふわっとしていて、真剣なわけがありませんっ」"
translation = "「그렇게 느슨하고, 푹신하고, 진심일 리가 없습니다!」"

[[dialogue]]
speaker = "ロロット"
original = "「ゆるふわでかわいいですか？\u3000それはどうも！」"
translation = "「느슨하고 푹신해서 귀엽다고요? 그건 고맙네요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「褒めてません～！」"
translation = "「칭찬하는 거 아니에요~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ、結局、どっちがどっちなんだっけ……？」"
translation = "「엣, 결국, 어느 쪽이 어느 쪽인 거였지……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ああもう、何がなんだか……」"
translation = "「아아 정말, 뭐가 뭔지……」"

[[dialogue]]
speaker = "メイプル"
original = "「にひひっ……どうやら、役者は揃ったみたいだね！」"
translation = "「니히힛…… 아무래도, 배우들은 다 모인 것 같네!」"

[[dialogue]]
speaker = "unk"
original = "メイプル、気を確かに！"
translation = "메이플, 정신 차려!"

[[dialogue]]
speaker = "メイプル"
original = "「はあ～？\u3000お兄ちゃんに言われるまでもなく、あたしはバッチリ正気だよ！」"
translation = "「하아~? 오빠가 말하지 않아도, 나는 완전히 제정신이야!」"

[[dialogue]]
speaker = "パッキー"
original = "「クックック……魔王様、さっさとやっちまおうぜ！」"
translation = "「크크크…… 마왕님, 어서 해치우자!」"

[[dialogue]]
speaker = "メイプル"
original = "「わかってるってば。くらえーっ！」"
translation = "「알고 있다니까. 받아라ー!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、クロトっ！」"
translation = "「앗, 쿠로토!」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長っ！」"
translation = "「히노미야 회장!」"

[[dialogue]]
speaker = "ナナカ"
original = "「な、なんでい、今の光は……あんた、なんかされた？」"
translation = "「뭐, 뭐여, 방금 빛은…… 너, 뭔가 당했어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっとクロト、大丈夫っ！？\u3000なんだか、ふぬけた顔になっちゃってるわよ！？」"
translation = "「잠깐 쿠로토, 괜찮아!? 뭔가, 맥 빠진 얼굴이 돼 버렸잖아!?」"

[[dialogue]]
speaker = "unk"
original = "…………。"
translation = "…………。"

[[dialogue]]
speaker = "メイプル"
original = "「にっひっひ～♪\u3000大賢者印の催眠アプリの力、思い知ったか～っ！」"
translation = "「닛히힛~♪ 대현자표 최면 앱의 힘, 깨달았느냐~!」"

[[dialogue]]
speaker = "パッキー"
original = "「効き目はバッチリのようだぜ！」"
translation = "「효과는 만점인 것 같군!」"

[[dialogue]]
speaker = "メイプル"
original = "「さ、こっちにおいで～、お兄ちゃんっ」"
translation = "「자, 이쪽으로 와~, 오빠」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、待ちなさいっ！\u3000そっちに行くんじゃないわよっ、止まりなさいってば！」"
translation = "「앗, 기다려! 그쪽으로 가면 안 돼, 멈추라니까!」"

[[dialogue]]
speaker = "メイプル"
original = "「無駄無駄～、ちょっとやそっとじゃ、この暗示は解けないよっ」"
translation = "「소용없어 소용없어~, 어지간해서는, 이 암시는 풀리지 않아!」"

[[dialogue]]
speaker = "パッキー"
original = "「さ～て、ずらかるぜ！」"
translation = "「자~, 도망가자!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ちょっと、逃げられるよ！\u3000追いかけないと！」"
translation = "「잠깐, 도망치잖아! 쫓아가야 해!」"

[[dialogue]]
speaker = "ルリエル"
original = "「むむむ～！\u3000偽物さんなんかに、邪魔はさせませんよ～！」"
translation = "「으으으~! 가짜 따위에게, 방해받지 않을 거예요~!」"

[[dialogue]]
speaker = "ロロット"
original = "「んむむむ～！\u3000そっちが邪魔です～！」"
translation = "「음으으으~! 그쪽이 방해예요~!」"

[[dialogue]]
speaker = "ナナカ"
original = "「まだやってたんかい！」"
translation = "「아직도 하고 있었냐!」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしがルリエルです！」"
translation = "「제가 루리엘입니다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「わたしがロロットです！」"
translation = "「제가 로롯토입니다!」"

[[dialogue]]
speaker = "ナナカ"
original = "「いや入れ替わるんかい！」"
translation = "「아니, 서로 바뀌는 거냐!」"

[[dialogue]]
speaker = "ルリエル"
original = "「はっ……！\u3000わたしの名前を勝手に名乗らないで下さ～い！」"
translation = "「핫……! 제 이름을 멋대로 참칭하지 마세요~!」"

[[dialogue]]
speaker = "ロロット"
original = "「どうぞどうぞ」"
translation = "「어서 오세요 어서 오세요」"

[[dialogue]]
speaker = "フィオナ"
original = "「もうっ……ルリエルっ！」"
translation = "「정말…… 루리엘!」"

[[dialogue]]
speaker = "ルリエル"
original = "「はっ、はいっ！？\u3000あら、フィオナ会長、どうされましたか……？」"
translation = "「핫, 네엣!? 어머, 피오나 회장, 무슨 일이세요……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ほっ、よかった。元に戻ったみたいです……」"
translation = "「휴, 다행이다. 원래대로 돌아온 것 같습니다……」"

[[dialogue]]
speaker = "ロロット"
original = "「チョロすぎでは？」"
translation = "「너무 단순한 거 아닌가요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「あんたもね」"
translation = "「너도 마찬가지야」"

[[dialogue]]
speaker = "パッキー"
original = "「チッ、ニセ天使の催眠が甘かったようだぜ。だが、時間稼ぎとしちゃ、上出来だぜ」"
translation = "「칫, 가짜 천사의 최면이 약했던 것 같군. 하지만, 시간 끌기로는, 성공이다」"

[[dialogue]]
speaker = "パッキー"
original = "「魔王さえ手に入れちまえば、もうここに用はないんだからな！」"
translation = "「마왕만 손에 넣으면, 더 이상 여기에 볼일은 없으니까!」"

[[dialogue]]
speaker = "メイプル"
original = "「にひひっ、マカロン様の計画は完璧なんだから！\u3000それじゃあお姉ちゃんたち、バイバ～イ♪」"
translation = "「니히힛, 마카롱 님의 계획은 완벽하니까! 그럼 언니들, 바이바~이♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ……！」"
translation = "「앗……!」"

[[dialogue]]
speaker = "ナナカ"
original = "「えっ、消えた……！？」"
translation = "「엣, 사라졌다……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「あれは……空間の裂け目……！？」"
translation = "「저것은…… 공간의 틈……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それって、この前と同じようなやつってこと……？」"
translation = "「그거, 저번이랑 같은 종류라는 거야……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね、おそらくこの先はまた例の異世界につながっているのではないかと」"
translation = "「그렇습니다, 아마도 이 앞은 또 그 이세계와 연결되어 있는 것이 아닐까 합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「以前のように、リクリエやフィーニスの塔の影響もあるのかと思っていましたが……もしかしたら今回は、何か別の力も働いているのかもしれません」"
translation = "「이전처럼, 리크리에나 피니스 탑의 영향도 있는 건가 생각했지만…… 어쩌면 이번에는, 뭔가 다른 힘도 작용하고 있는 것일지도 모릅니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「細かいことはともかく、追っかけて行くっきゃないっしょ！」"
translation = "「자세한 건 어쨌든, 쫓아가는 수밖에 없잖아!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ナナカ……！」"
translation = "「나나카……!」"

[[dialogue]]
speaker = "ナナカ"
original = "「あいつを助けるんでしょ？\u3000アタシらも協力するよ。街を案内してもらったり、助けてもらった恩もあるしさ」"
translation = "「저 자식을 도울 거잖아? 우리들도 협력할게. 마을 안내도 받고, 도움도 받은 은혜도 있고 말이야」"

[[dialogue]]
speaker = "ナナカ"
original = "「それに、あのひねくれパンダが関わってるってんなら、そもそも他人事じゃないしね！」"
translation = "「게다가, 저 비뚤어진 팬더가 관련되어 있다면, 애초에 남의 일이 아니지!」"

[[dialogue]]
speaker = "ロロット"
original = "「よい心がけです。隣人を愛想よくしろと言いますし」"
translation = "「좋은 마음가짐입니다. 이웃을 상냥하게 대하라고 하니까요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとうっ。そうと決まれば、みんな行くわよ！」"
translation = "「고마워. 그렇게 결정됐으면, 다들 가자!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ！」"
translation = "「네!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あの～、ところで、わたしは今まで、一体何を……」"
translation = "「저~, 그런데, 저는 지금까지, 대체 뭘……」"

[[dialogue]]
speaker = "ロロット"
original = "「さあさあ、もたもたしていないで、あなたも一緒に行きますよ～！\u3000ビッグウェーブに飛び込むのです～！」"
translation = "「자자, 꾸물거리지 말고, 당신도 함께 갑시다~! 빅 웨이브에 뛰어드는 거예요~!」"

