[[dialogue]]
speaker = "unk"
original = "それは、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦いを終え、学園へ帰還してから数日後のことだった。"
translation = "그것은 『<ruby>XELOS<rt>제롯</rt></ruby>』과의 싸움을 끝내고 학원으로 귀환한 지 며칠 뒤의 일이었다."

[[dialogue]]
speaker = "unk"
original = "溜め込んでしまっていた星徒会業務をこなし、ひとまず今日は帰宅しようとしたところで、恋人のマインが俺を迎えに来てくれた。"
translation = "쌓여있던 성도회 업무를 처리하고 일단 오늘은 귀가하려던 참에, 연인인 마인이 나를 마중 나와 주었다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「会長、お疲れ～」"
translation = "「회장, 수고했어~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あっ、マイン、迎えに来てくれてありがとう――」"
translation = "「앗, 마인 마중 나와줘서 고마워――」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「って……どうしてノヴァフォームに変身してるんだ？」"
translation = "「그보다…… 왜 노바 폼으로 변신하고 있는 거야?」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「うん、今日はちょっと、会長に『お仕置き』をしとかないとって思って」"
translation = "「응, 오늘은 좀 회장에게 『벌』을 줘야겠다고 생각해서」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ……お、お仕置き……？」"
translation = "「에…… 버, 벌……?」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「だって会長さ～、この前の戦い……私という恋人がいながら、ほいほい死にに行っちゃうんだもん」"
translation = "「그게 회장 말이야~ 지난번 싸움 때…… 나라는 연인이 있으면서 덜컥 죽으러 가버렸잖아」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「最終的に生きてたから良かったものの、さすがに何も無かったみたいに流したりはできないでしょ～？」"
translation = "「결과적으로 살아있어서 다행이었지만, 역시 아무 일도 없었던 것처럼 넘길 수는 없지~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う……それは……はい。すみません……」"
translation = "「으…… 그건…… 네. 죄송합니다……」"

[[dialogue]]
speaker = "unk"
original = "もちろん、紆余曲折あってのことで、好き好んで死にに行ったわけじゃない。"
translation = "물론 여러 곡절이 있었던 일이고, 좋아서 죽으러 간 것은 아니었다."

[[dialogue]]
speaker = "unk"
original = "だが――目の前で恋人が死ぬ瞬間を見せつけられたマインの気持ちを思えば、素直に頭を下げるしかなかった。"
translation = "하지만―― 눈앞에서 연인이 죽는 순간을 지켜봐야 했던 마인의 마음을 생각하면 솔직하게 고개를 숙일 수밖에 없었다."

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「正直さ～、会長が死んだところを見せられた時……闇落ちしそうになるくらい、ストレスやばかったんだよね～」"
translation = "「솔직히 말이야~ 회장이 죽는 걸 봤을 때…… 흑화할 뻔했을 정도로 스트레스 장난 아니었거든~」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「で、そこから解放された反動か――私、今めっちゃムラムラしてて～」"
translation = "「그래서 거기서 해방된 반동인지―― 나 지금 엄청 몸이 달아올라 있어서~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……え？\u3000ムラムラ……？」"
translation = "「……에? 몸이 달아올라……?」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「そう。生存本能を刺激された、的な？\u3000だ・か・ら～」"
translation = "「그래. 생존 본능을 자극받았다고 해야 하나? 그·러·니·까~」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「今から会長の赤ちゃんを孕むくらいヤリまくって――これから絶対に死ねない『パパ』にしてあげるから……覚悟してね<emoji=heart04>」"
translation = "「지금부터 회장 아기를 밸 정도로 잔뜩 해서―― 이제부터 절대 죽을 수 없는 『아빠』로 만들어 줄 테니까…… 각오해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を近づけて囁くマインの瞳には、本能的な欲求と、強い執着にも似た光が宿っていて――"
translation = "얼굴을 가까이 대고 속삭이는 마인의 눈동자에는 본능적인 욕구와 강한 집착과도 같은 빛이 서려 있었고――"

[[dialogue]]
speaker = "unk"
original = "それから俺は、マインの有無を言わさぬ勢いに押されるまま、街のラブホへと連れ込まれてしまった。"
translation = "그 뒤로 나는 마인의 거부할 수 없는 기세에 밀려 거리의 러브호텔로 끌려가고 말았다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……ふうぅっ……<emoji=heart04>\u3000これでよしっと……♪」"
translation = "「응…… 후우……<emoji=heart04> 이걸로 됐다……♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっと……マイン。なんでベッドじゃなくて、『爆弾ちゃん』の上なんだ……？」"
translation = "「저기…… 마인. 왜 침대가 아니라 『폭탄짱』 위인 거야……?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000すぐにわかるよ<emoji=heart04>\u3000――大丈夫、この子はクッション型で、爆発したりはしないから<emoji=heart04>」"
translation = "「니히히♪ 곧 알게 될 거야<emoji=heart04> ――괜찮아, 이 아이는 쿠션형이라 폭발하거나 하지는 않으니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マインの能力で召喚された使い魔――『爆弾ちゃん』。"
translation = "마인의 능력으로 소환된 사역마―― 『폭탄짱』."

[[dialogue]]
speaker = "unk"
original = "柔らかく弾力あるそのクッションの上に、俺は仰向けに寝かされていた。"
translation = "부드럽고 탄력 있는 그 쿠션 위에 나는 하늘을 보고 눕혀져 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それにしても……マイン、思ってた以上にムラムラしてないか……？」"
translation = "「그건 그렇고…… 마인, 생각했던 것보다 더 흥분한 거 아니야……?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうだよ～？\u3000だって魔界に出張してる間、ずーっとエッチできなくて我慢してたんだもん……<emoji=heart04>」"
translation = "「그렇다니까~? 그게 마계에 출장 가 있는 동안 내내 섹스 못 하고 참았단 말이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ……<emoji=heart04>\u3000だから悪いけど、今日は……会長のこと、本気で『犯し』ちゃうからね……？」"
translation = "「하아아……<emoji=heart04> 그러니까 미안하지만 오늘은…… 회장, 진심으로 『범해』버릴 거니까……?」"

[[dialogue]]
speaker = "unk"
original = "舌なめずりをしながら、悪戯心に満ちた笑みを浮かべるマイン。"
translation = "입맛을 다시며 장난기 가득한 미소를 짓는 마인."

[[dialogue]]
speaker = "unk"
original = "そのまま彼女は腰をゆっくりと揺らし、露出したペニスへと、熱を帯びた秘部を押し当ててくる。"
translation = "그대로 그녀는 허리를 천천히 흔들며, 노출된 자지에 열기를 띤 비부를 밀어붙여 온다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あれ……マイン、これ……？」"
translation = "「어라…… 마인, 이거……?」"

[[dialogue]]
speaker = "unk"
original = "その時、俺は気づく。"
translation = "그때 나는 깨닫는다."

[[dialogue]]
speaker = "unk"
original = "俺の手足と腰が、爆弾ちゃんの表面にぴたりと張り付いて、まるで拘束されているかのように動かせないことに。"
translation = "내 손발과 허리가 폭탄짱의 표면에 딱 달라붙어 마치 구속된 것처럼 움직일 수 없다는 사실을."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ<emoji=heart04>\u3000気づいた？\u3000こっそり『ラプチャーガム』でくっ付けといたんだ～♪」"
translation = "「니히히<emoji=heart04> 눈치챘어? 몰래 『랩처 검』으로 붙여놨지~♪」"

[[dialogue]]
speaker = "unk"
original = "マインの得意とする星術『ラプチャーガム』。それは、ガムのような粘着性の星力を対象にくっ付けて、拘束などができる技だ。"
translation = "마인이 특기로 하는 성술 『랩처 검』. 그것은 껌 같은 점착성 성력을 대상에 붙여 구속 등을 할 수 있는 기술이다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私が満足するまで、逃がさないから<emoji=heart04>\u3000ムラムラも限界だし、んっ……<emoji=heart04>\u3000もう挿れちゃうよ？」"
translation = "「내가 만족할 때까지 안 놓아줄 거니까<emoji=heart04> 몸도 한계고, 응……<emoji=heart04> 이제 삽입할게?」"

[[dialogue]]
speaker = "unk"
original = "すでに彼女の秘部は、溢れる愛液で濡れ切っており、ペニスと触れ合うたびにぬるりとした熱が絡みついてくる。"
translation = "이미 그녀의 비부는 흘러넘치는 애액으로 흠뻑 젖어 있었고, 자지와 닿을 때마다 미끈거리는 열기가 얽혀온다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長のこと……めちゃくちゃに犯しちゃうから<emoji=heart04>」"
translation = "「회장을…… 엉망진창으로 범해버릴 거니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう囁くと同時に、マインはペニスの先端を膣口へと導き――そのまま、一気に腰を落とした。"
translation = "그렇게 속삭임과 동시에 마인은 자지 끝을 질 입구로 인도했고―― 그대로 단숨에 허리를 내렸다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――ふあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000おち○ぽ、奥まで……ズッポリと入ったああぁ～～んっ<emoji=heart04><emoji=heart04>」"
translation = "「응―― 후아아아아~~앗<emoji=heart04><emoji=heart04> 자지, 깊숙이까지…… 쑥 하고 들어갔다아아~~앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "粘りつく水音と共に、熱を帯びた内側へと一気に呑み込まれる。絡みつく肉壁が、逃がすまいと締めつけてきた。"
translation = "질척하게 달라붙는 물소리와 함께 열기를 머금은 안쪽으로 단숨에 삼켜진다. 휘감기는 육벽이 놓치지 않겠다는 듯 조여왔다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふうぅっ……はあぁ～っ<emoji=heart04>\u3000それじゃあ――動かしちゃうから<emoji=heart04>」"
translation = "「후우…… 하아아~<emoji=heart04> 그럼―― 움직일 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マインが軽く指を鳴らすと――"
translation = "마인이 가볍게 손가락을 튕기자――"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ……はあぁっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふうぅ～っ<emoji=heart04>」"
translation = "「앗…… 하아아<emoji=heart04> 응…… 후우<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응으윽<emoji=heart04> 음후으으~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "爆弾ちゃんの体が、まるで呼吸するかのように、膨張と収縮の運動を繰り返し始めた。"
translation = "폭탄짱의 몸이 마치 호흡하듯이 팽창과 수축 운동을 반복하기 시작했다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「久しぶりのおち○ぽ、堪らな～い<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04>」"
translation = "「오랜만의 자지, 참을 수 없어~<emoji=heart04> 응<emoji=heart04> 하아아<emoji=heart04> 후아<emoji=heart04> 응으윽<emoji=heart04> 앗<emoji=heart04> 음아아<emoji=heart04> 하아아아~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膨張と収縮に合わせて、奥まで抉るような出入りが繰り返される。内側を擦り上げられるたび、ぬるりとした快感が積み重なっていく。"
translation = "팽창과 수축에 맞춰 안쪽까지 긁어내는 듯한 드나듦이 반복된다. 내벽을 문지르며 올라올 때마다 미끈거리는 쾌감이 쌓여간다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「やっぱこれがないとぉ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000この極太の魔王おち○ぽで、膣内が満たされる感じぃ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んああぁ～っ<emoji=heart04>」"
translation = "「역시 이게 있어야 해에<emoji=heart04> 응<emoji=heart04> 하앙<emoji=heart04> 이 굵직한 마왕 자지로 질 안이 가득 차는 느낌이이<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 음아아아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000おま○こ、めっちゃ気持ちいぃ～<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 보지, 너무 기분 좋아아~<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 응<emoji=heart04> 하아아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くうぅっ……！\u3000久しぶりだから、俺もっ……！」"
translation = "「크으윽……! 오랜만이라 나도……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あぁんっ<emoji=heart04>\u3000おま○この中、極太カリでゴリゴリ引っかかれて、ヤバぁいっ<emoji=heart04>\u3000気持ちぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 보지 안쪽, 굵직한 귀두로 고드득고드득 긁혀서, 위험해애<emoji=heart04> 기분 좋아아<emoji=heart04> 앗<emoji=heart04> 후아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 음아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000ヤバっ<emoji=heart04>\u3000久しぶりでもうイキそう……！」"
translation = "「하아아<emoji=heart04> 장난 아냐<emoji=heart04> 오랜만이라 벌써 갈 것 같아……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン、俺も……もうくるっ……！」"
translation = "「마인, 나도…… 이제 온다……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ<emoji=heart04>\u3000きたぁっ<emoji=heart04>\u3000絶頂、登ってくるぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 왔다아<emoji=heart04> 절정, 올라오고 있어어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んうぅっ――<emoji=heart04><emoji=heart04>」"
translation = "「하아아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 음아아<emoji=heart04> 응으윽――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン、出るっ！！！」"
translation = "「마인, 나온다!!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ――ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗―― 후아아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びくびくと震えながら、マインが絶頂に達する。"
translation = "부르르 떨면서 마인이 절정에 달한다."

[[dialogue]]
speaker = "unk"
original = "俺も同時に射精した――はずだったが……。"
translation = "나도 동시에 사정했다――고 생각했지만……."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あれ？\u3000出てない……？\u3000この感覚……もしかして『絶頂チャージ』……！？」"
translation = "「어라? 안 나왔어……? 이 감각…… 혹시 『절정 차지』……!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ<emoji=heart04>\u3000正解～♪\u3000今日はとにかく気持ちよくなりたいから――お互いに絶頂チャージで、快楽をどんどん溜めていくエッチだよ<emoji=heart04>」"
translation = "「니히히<emoji=heart04> 정답~♪ 오늘은 어쨌든 기분 좋아지고 싶으니까―― 서로 절정 차진로 쾌락을 계속 쌓아가는 섹스야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "『絶頂チャージ』は、マインが以前マリオンさんから教えてもらったという術式だ。"
translation = "『절정 차지』는 마인이 이전에 마리온 씨에게 배웠다는 술식이다."

[[dialogue]]
speaker = "unk"
original = "それを使うと、絶頂したはずの身体は解放されずに、むしろそこから更に上乗せされるように快感が蓄積されていく。"
translation = "그것을 사용하면 절정했을 터인 신체는 해방되지 않고, 오히려 거기서부터 더욱 덧씌워지듯 쾌감이 축적되어 간다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁ～っ<emoji=heart04>\u3000元々溜まってるところに絶頂チャージすると、感度ヤバぁ～いっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아아~아<emoji=heart04> 원래 쌓여있는 곳에 절정 차지하니까 감도 장난 아니야아~<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아<emoji=heart04> 음아아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マインは止まらない。むしろ爆弾ちゃんの膨張と収縮運動は、さらに強さを増していく。"
translation = "마인은 멈추지 않는다. 오히려 폭탄짱의 팽창과 수축 운동은 더욱 강도를 높여간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くあぁっ……！\u3000マイン、そんな動いてたら、また……！」"
translation = "「쿠아앗……! 마인, 그렇게 움직이면 또……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ<emoji=heart04>\u3000いいよっ<emoji=heart04>\u3000どうせ出ないんだから、気にせずイっちゃえっ<emoji=heart04>」"
translation = "「니히히<emoji=heart04> 좋아앗<emoji=heart04> 어차피 안 나오니까 신경 쓰지 말고 가버려엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほらほら、イけっ<emoji=heart04>\u3000もっとイけイけっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「자자, 가앗<emoji=heart04> 더 가버려 가버려엇<emoji=heart04><emoji=heart04> 응<emoji=heart04> 응<emoji=heart04> 응으윽<emoji=heart04> 후우<emoji=heart04> 음후으으~~으<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！\u3000うああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「큭……! 으아아아~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはっ<emoji=heart04>\u3000会長、またおち○ぽビクビクしてるぅ～っ<emoji=heart04>\u3000じゃあ次は、私の番だね～<emoji=heart04>」"
translation = "「꺄핫<emoji=heart04> 회장, 또 자지 움찔움찔하고 있어어~<emoji=heart04> 그럼 다음은 내 차례네~<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、待って……！\u3000マイン、１回止まって……！」"
translation = "「기, 기다려……! 마인, 한 번만 멈춰줘……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ<emoji=heart04>\u3000なにその顔～<emoji=heart04>\u3000会長、そんなに気持ちいいの～？\u3000すっかり快楽に負けて、もうトロトロじゃん<emoji=heart04>」"
translation = "「꺄하하하<emoji=heart04> 뭐야 그 표정~<emoji=heart04> 회장, 그렇게 기분 좋은 거야~? 완전히 쾌락에 져서 벌써 흐물흐물하잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このままだと……本当におかしくなる……！」"
translation = "「이대로라면…… 정말 이상해져버려……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んふぅ～っ<emoji=heart04>\u3000大丈夫だよ<emoji=heart04>\u3000そんな情けない顔、むしろ私はゾクゾクして、興奮しちゃうからぁ～<emoji=heart04>」"
translation = "「음후으~으<emoji=heart04> 괜찮아<emoji=heart04> 그런 한심한 얼굴, 오히려 나는 오싹오싹해서 흥분되니까아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ<emoji=heart04>\u3000きたっ<emoji=heart04>\u3000今度は私がイクっ<emoji=heart04>\u3000おま○こイクイクっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 왔다<emoji=heart04> 이번엔 내가 갈게에<emoji=heart04> 보지 가버려 가버려엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うあぁっ、俺もまた――っ！」"
translation = "「으아앗, 나도 또――!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ、あっ、あっ、あっ<emoji=heart04><emoji=heart04>\u3000はああああっ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04><emoji=heart04> 하아아아앗~~~아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……うああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「큭…… 으아아아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "きゅうぅっと締め付けられる膣内。その収縮に引きずられるように、俺も再び絶頂へと叩き上げられる。"
translation = "꽉 조여드는 질 내부. 그 수축에 이끌리듯 나도 다시 절정으로 치달아 올라간다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――きゃははははっ<emoji=heart04>\u3000会長、今の声～っ<emoji=heart04>」"
translation = "「응―― 꺄하하하하하<emoji=heart04> 회장, 방금 그 목소리~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「女の子みたいでっ、情けなくてっ、すっごく可愛いよぉ～っ<emoji=heart04><emoji=heart04>\u3000ゾクゾクしちゃうぅ～っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふうぅ～っ<emoji=heart04>」"
translation = "「여자애 같아서, 한심해서, 정말 귀여워어~<emoji=heart04><emoji=heart04> 오싹오싹해버려어~<emoji=heart04> 응<emoji=heart04> 후우<emoji=heart04> 응으윽<emoji=heart04> 음후으으~으<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン、もう無理だ……！\u3000これ以上は……！」"
translation = "「마인, 이제 무리야……! 이 이상은……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「な～に～？\u3000会長、怖いの～？\u3000こんなに気持ちいいのに～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04>」"
translation = "「뭐~야~? 회장, 무서워~? 이렇게 기분 좋은데~<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 음아아<emoji=heart04> 하아아아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「大丈夫、大丈夫っ<emoji=heart04>\u3000怖がらなくていいんだよっ<emoji=heart04>\u3000エッチ中くらい、理性飛ばしてバカになっちゃえっ<emoji=heart04>」"
translation = "「괜찮아, 괜찮아앗<emoji=heart04> 무서워할 거 없어어앗<emoji=heart04> 섹스 중 정도는 이성 날리고 바보가 되어버려엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「どんなにカッコ悪い顔しても、情けない声で鳴いても――私が全部受け止めてあげるからぁ～<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふうぅ～っ<emoji=heart04>」"
translation = "「아무리 꼴불견 같은 얼굴을 해도, 한심한 목소리로 울어도―― 내가 전부 받아줄 테니까아~<emoji=heart04> 앗<emoji=heart04> 음아아<emoji=heart04> 응으윽<emoji=heart04> 음후으으~으<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら、もっと激しくしちゃうよ～？」"
translation = "「자, 더 격렬하게 해버릴게~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――<emoji=heart04><emoji=heart04>」"
translation = "「응――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んううぅっ<emoji=heart04><emoji=heart04>\u3000んふうぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000はあぁっ、あっ、あっ、あっ<emoji=heart04>\u3000んふあぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「음우우윽<emoji=heart04><emoji=heart04> 음후으으~~으<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 음아아앗<emoji=heart04><emoji=heart04> 하아아, 앗, 앗, 앗<emoji=heart04> 음후아아~~아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "爆弾ちゃんの動きはさらに加速し、それに連動するように、俺の腰が容赦なく突き上げられる。"
translation = "폭탄짱의 움직임은 더욱 가속되었고, 그것에 연동되듯 내 허리가 가차 없이 치켜 올려진다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んんぅっ<emoji=heart04>\u3000あぁ～っ<emoji=heart04>\u3000絶頂チャージで感度上がってるところに本気ピストン、効くうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「음응윽<emoji=heart04> 아아~앗<emoji=heart04> 절정 차지로 감도 올라간 상태에서 본격 피스톤, 잘 먹히네에~~에<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はああぁっ<emoji=heart04>\u3000気持ちいぃっ<emoji=heart04>\u3000おち○ぽ堪らなぁいっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 기분 좋아아앗<emoji=heart04> 자지 참을 수 없어어엇<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も逃げ場のないまま、激しい快楽が何度もペニスに襲い来る。"
translation = "나도 퇴로가 없는 채로 격렬한 쾌락이 몇 번이고 자지를 습격해 온다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んうぅ～っ<emoji=heart04><emoji=heart04>\u3000会長もほら……もっと気持ちよくなっちゃえっ<emoji=heart04>\u3000んっ、ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000んふううぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「음우으~윽<emoji=heart04><emoji=heart04> 회장도 자…… 더 기분 좋아져버려엇<emoji=heart04> 응, 흣, 흣, 흣<emoji=heart04> 음후우우~으<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、膣をきゅうっと締めつけてくるマイン。"
translation = "그렇게 말하며 질을 꽉 조여오는 마인."

[[dialogue]]
speaker = "unk"
original = "爆弾ちゃんによる強制的なピストンと内側からの締め付け。挟み込まれるような刺激が、一気に頂点へと押し上げてきた。"
translation = "폭탄짱에 의한 강제적인 피스톤과 안쪽에서의 조임. 끼어들어 오는 자극이 단숨에 정점으로 밀어 올렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くあああああっ<emoji=heart04><emoji=heart04>\u3000ダメだマイン……またイクっ！！」"
translation = "「쿠아아아아앗<emoji=heart04><emoji=heart04> 안 돼 마인…… 또 간다!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――<emoji=heart04><emoji=heart04>\u3000きゃはははっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長のアへ顔、いただきましたぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응――<emoji=heart04><emoji=heart04> 꺄하하하하앗<emoji=heart04><emoji=heart04><emoji=heart04> 회장의 아헤가오, 잘 받았습니다아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はああぁ～～っ<emoji=heart04><emoji=heart04>\u3000その顔好きぃ～っ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっと見せてぇ～っ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아~~아<emoji=heart04><emoji=heart04> 그 얼굴 너무 좋아아~앗<emoji=heart04> 더<emoji=heart04> 더 보여줘어~엇<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 음아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン、ヤバい……！\u3000イク間隔どんどん短くなって……止まらなくなるっ！」"
translation = "「마인, 위험해……! 가는 간격이 점점 짧아져서…… 멈출 수 없게 돼!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気持ちよすぎて、ペニスが……バカになるっ！！」"
translation = "「너무 기분 좋아서 자지가…… 바보가 돼버려!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ<emoji=heart04>\u3000ごめ～んっ<emoji=heart04>\u3000私、もうおま○こスイッチ入っちゃってるから、止めるの無理ぃ～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 미안~<emoji=heart04> 나 이미 보지 스위치 들어가 버려서 멈추는 거 무리야아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっあっあっ<emoji=heart04>\u3000きたっ<emoji=heart04>\u3000私もイクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04><emoji=heart04>\u3000イクううぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗<emoji=heart04> 왔다<emoji=heart04> 나도 갈게에<emoji=heart04> 가버려 가버려엇<emoji=heart04><emoji=heart04> 가버려어어~~어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ――ふあああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000おま○こ感度、私もバカになってきてヤバいぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗―― 후아아아아아앗<emoji=heart04><emoji=heart04> 보지 감도, 나도 바보가 되어버려서 장난 아니야아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ああぁ～～っ<emoji=heart04><emoji=heart04>\u3000これ、最高ぉ～～っ<emoji=heart04><emoji=heart04>\u3000興奮し過ぎて……腰が勝手に動いちゃうぅ～～っ<emoji=heart04><emoji=heart04>\u3000ふんっ、ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000んふうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아~~아<emoji=heart04><emoji=heart04> 이거 최고야아~~아<emoji=heart04><emoji=heart04> 너무 흥분해서…… 허리가 멋대로 움직여버려어~~어<emoji=heart04><emoji=heart04> 흣, 흣, 흣, 흣<emoji=heart04> 음후으응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あああっ<emoji=heart04>\u3000また来るっ……イクっ！！」"
translation = "「아아앗<emoji=heart04> 또 온다…… 간다!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ<emoji=heart04><emoji=heart04>\u3000会長おち○ぽ、本当にバカになってるぅ～～<emoji=heart04><emoji=heart04>\u3000ふんっ、ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000んふうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「꺄하하하앗<emoji=heart04><emoji=heart04> 회장 자지, 정말 바보가 되어버렸네에~~에<emoji=heart04><emoji=heart04> 흣, 흣, 흣, 흣<emoji=heart04> 음후으응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の理性はすでに崩れ落ちていた。"
translation = "내 이성은 이미 무너져 내려 있었다."

[[dialogue]]
speaker = "unk"
original = "止まるという選択肢は消え失せ、ただ互いに、貪るように快楽を積み上げ続ける。"
translation = "멈춘다는 선택지는 사라지고 오로지 서로 탐하듯 쾌락을 계속해서 쌓아간다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はああぁ～～っ<emoji=heart04><emoji=heart04>\u3000世界を救った魔王が、私のおま○こに負けちゃってるの、ゾクゾクしちゃうっ<emoji=heart04>」"
translation = "「하아아아~~아<emoji=heart04><emoji=heart04> 세계를 구한 마왕이 내 보지한테 지고 있는 거 오싹오싹해버려엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「いい感じに溜まってきたし……そろそろチャージ解放、しちゃおっかな～？\u3000んっ、んっ、んっ、んうぅっ、んふうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋게 쌓였으니까…… 슬슬 차지 해방 해볼까나~? 응, 응, 응, 응으윽, 음후으응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、マイン……それはヤバい……！\u3000こんなに溜まってる状態で解放されたら……！」"
translation = "「마, 마인…… 그건 위험해……! 이렇게 쌓인 상태에서 해방되면……!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあああっ<emoji=heart04>\u3000その泣きそうな顔、ほんと好きぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 그 울 것 같은 얼굴 진짜 좋아아~~아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「大丈夫だよぉ<emoji=heart04>\u3000私も一緒にイクからぁっ<emoji=heart04><emoji=heart04>」"
translation = "「괜찮아아<emoji=heart04> 나도 같이 갈 거니까아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ここまで溜め込んだ気持ちいいの……全部まとめて、爆発させよっ<emoji=heart04><emoji=heart04>\u3000んんっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「지금까지 쌓아둔 기분 좋은 거…… 전부 모아서 폭발시키자앗<emoji=heart04><emoji=heart04> 음음――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、爆弾ちゃんの動きが暴れ馬のように、更に激しくなった。"
translation = "그 순간 폭탄짱의 움직임이 야생마처럼 더욱 격렬해졌다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ、ふんっ、ふんっ、ふんっ、んふううぅ～～っ<emoji=heart04><emoji=heart04>\u3000んうぅっ、ふんっ、ふんっ、ふんっ、んふうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「응, 흣, 흣, 흣, 음후우우~~으<emoji=heart04><emoji=heart04> 응으윽, 흣, 흣, 흣, 음후으응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もはやいつ崩れてもおかしくないくらい、快楽が極限へと高く積み上げられていく。"
translation = "이제 언제 무너져도 이상하지 않을 만큼 쾌락이 극한으로 높게 쌓여간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああああああっ<emoji=heart04><emoji=heart04>\u3000マイン、もう無理だっ……！\u3000ずっとイクの止まらなくなってるっ！！」"
translation = "「아아아아아앗<emoji=heart04><emoji=heart04> 마인, 이제 무리야……! 계속 가는 게 안 멈춰지고 있어!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んんんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000もうちょっとだけぇ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「음음음앗<emoji=heart04><emoji=heart04><emoji=heart04> 조금만 더어어~~어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「限界ギリギリまで上げるからぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふんっ、ふんっ、ふんっ、んふううぅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「한계 아슬아슬하게까지 올릴 테니까아~~아<emoji=heart04><emoji=heart04><emoji=heart04> 흣, 흣, 흣, 음후우우응<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女自身も爆弾ちゃんの動きに合わせ、全力で腰を叩きつけてくる。"
translation = "그녀 자신도 폭탄짱의 움직임에 맞춰 온 힘을 다해 허리를 내리찍는다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ、はああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000限界っ<emoji=heart04><emoji=heart04>\u3000私も……爆発するっ<emoji=heart04><emoji=heart04>\u3000気持ちよすぎて、飛びそぉ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 하아아아~~아<emoji=heart04><emoji=heart04><emoji=heart04> 한계에엣<emoji=heart04><emoji=heart04> 나도…… 폭발해버려엇<emoji=heart04><emoji=heart04> 너무 기분 좋아서 날아가 버릴 것 같아아~~아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "互いの境界は曖昧になり、どちらの快感なのかすら分からないほどに混ざり合っていく。"
translation = "서로의 경계는 애매해지고 어느 쪽의 쾌감인지조차 알 수 없을 정도로 뒤섞여 간다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000本気でイクからっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려엇<emoji=heart04><emoji=heart04> 진짜로 가버릴 테니까앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「絶頂チャージ、全部解放するから――おち○ぽ一緒に、どっぴゅんしてぇ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「절정 차지 전부 해방할 테니까―― 자지 같이 뿎 하고 해줘어~~어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000まだっ<emoji=heart04>\u3000あとちょっとぉ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「음아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 아직앗<emoji=heart04> 조금만 더어어~~어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マイン、ダメだっ！！\u3000もう出るっ！！！」"
translation = "「마인, 안 돼!! 이제 나온다!!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふあああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000私もイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000気持ちいいの爆発するぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 나도 가버려앗<emoji=heart04><emoji=heart04><emoji=heart04> 기분 좋은 거 폭발해애~~에<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「解放するよぉ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっあっあっあっ、んああああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「해방한다아아~~아<emoji=heart04><emoji=heart04><emoji=heart04> 앗앗앗앗, 음아아아아아아아~~아<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――どっぴゅんっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「――뿎<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んんんっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000はああああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「음음음앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 하아아아아아아아아아아아아~~아<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、積み上げられていたすべての快楽が、限界を超えて決壊した。"
translation = "그 순간, 쌓여있던 모든 쾌락이 한계를 넘어 터져 나왔다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ああああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000すっごい中出し射精、来てるぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 엄청난 질내사정, 오고 있어어어~~어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "溜め込まれていた絶頂が一気に解放され、抑え込まれていた精液が、爆発するように最奥へと噴き出した。"
translation = "억눌려 있던 절정이 한꺼번에 해방되었고, 가둬져 있던 정액이 폭발하듯이 가장 깊은 곳으로 뿜어져 나왔다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000子宮の奥に精液叩き付けられて……熱くて、イっクうぅぅぅ～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응―― 후아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 자궁 안쪽에 정액이 내리꽂혀서…… 뜨거워서, 가아아버려어어어~~응<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長の射精、全然止まらなくて、すごいぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04><emoji=heart04> 하아아아~~아<emoji=heart04><emoji=heart04><emoji=heart04> 회장의 사정, 전혀 안 멈춰서 굉장해애~~에<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「中、いっぱいぃっ……<emoji=heart04><emoji=heart04>\u3000これ……ダメぇ、私もイクの止まらな――っ<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04><emoji=heart04>」"
translation = "「안에 가득히이이……<emoji=heart04><emoji=heart04> 이거…… 안 돼애, 나도 가는 게 안 멈춰――앗<emoji=heart04> 응…… 후우……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "果てしなく続く放出と、重なり続ける絶頂。"
translation = "끝없이 계속되는 방출과 겹쳐지는 절정."

[[dialogue]]
speaker = "unk"
original = "俺の思考は白く塗り潰され、ただひたすらに、多幸感だけが全身を満たしていく――"
translation = "내 사고는 하얗게 지워졌고, 그저 오로지 다행감만이 온몸을 가득 채워간다――"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁ……んっ……ふうぅ……<emoji=heart04>」"
translation = "「하아아…… 응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて意識が戻ると、マインの膣からペニスが抜けて、溢れた白濁がゆっくりと伝い落ちていた。"
translation = "이윽고 의식이 돌아오자 마인의 질에서 자지가 빠져나왔고, 넘쳐흐른 백탁이 천천히 흘러내리고 있었다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁ～<emoji=heart04>\u3000絶頂……すごすぎて、私もちょっと意識飛んじゃってたぁ～……<emoji=heart04>」"
translation = "「하아아~<emoji=heart04> 절정…… 너무 대단해서 나도 잠깐 의식이 날아가 버렸어어~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も……気持ちよすぎて、死ぬかと思った……」"
translation = "「나도…… 너무 기분 좋아서 죽는 줄 알았어……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひっ<emoji=heart04>\u3000今までで１番ってくらい乱れてたよ<emoji=heart04>\u3000はあぁ……思い出すだけで、またゾクゾクしてきちゃう……<emoji=heart04>」"
translation = "「니히히<emoji=heart04> 지금까지 중 제일이라고 할 정도로 흐트러져 있었어<emoji=heart04> 하아아…… 떠올리는 것만으로도 다시 오싹오싹해져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、マインは再び手を伸ばし、再びゆっくりとペニスを撫で始める。"
translation = "그렇게 말하면서 마인은 다시 손을 뻗어, 다시 천천히 자지를 쓰다듬기 시작한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ま、マイン……？\u3000さすがに、ちょっと休憩を……」"
translation = "「마, 마인……? 역시 좀 휴식을……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え～？\u3000ウソ～<emoji=heart04>\u3000魔王なんだから、まだまだイけるでしょ～？」"
translation = "「에~? 거짓말~<emoji=heart04> 마왕이니까 아직 더 할 수 있잖아~?」"

[[dialogue]]
speaker = "unk"
original = "白濁を絡めるように、秘部を再び擦り付けてくる。"
translation = "백탁을 묻히듯 비부를 다시 문질러 온다."

[[dialogue]]
speaker = "unk"
original = "そのぬるりとした感触に、さっきまでの余韻が、再び火を灯し始める。"
translation = "그 미끈거리는 감촉에 방금 전까지의 여운이 다시 불을 지피기 시작한다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ<emoji=heart04>\u3000ほら……魔王おち○ぽ、また大きくなってきた<emoji=heart04>」"
translation = "「니히히<emoji=heart04> 봐봐…… 마왕 자지, 다시 커졌어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「言ったでしょ～？\u3000今夜は満足するまで逃がさないって<emoji=heart04>」"
translation = "「말했잖아~? 오늘 밤은 만족할 때까지 안 보내줄 거라고<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「絶対に死ねなくなるように、しっかり赤ちゃん『孕んで』あげるから<emoji=heart04>」"
translation = "「절대 죽을 수 없게 되도록, 제대로 아기 『잉태해』 줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んっ――はあああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「응―― 하아아아~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからまた、爆弾ちゃんが上下に大きく揺れ始める。"
translation = "그러고는 다시 폭탄짱이 상하로 크게 흔들리기 시작한다."

[[dialogue]]
speaker = "unk"
original = "その夜――マインの欲求が満たされるまで、俺は何度も、何度も、搾り取られ続けることになるのだった。"
translation = "그날 밤―― 마인의 욕구가 채워질 때까지, 나는 몇 번이고, 몇 번이고 계속해서 쥐어짜이게 되는 것이었다."

