[[dialogue]]
speaker = "unk"
original = "そうして、年は明けて――"
translation = "그렇게 해서 해가 밝고――"

[[dialogue]]
speaker = "unk"
original = "迎えた新年、元旦当日。"
translation = "맞이한 신년, 원단 당일."

[[dialogue]]
speaker = "unk"
original = "俺は新星学園の校門前で、サーシャさんと待ち合わせをしていた。"
translation = "나는 신성학원 교문 앞에서 사샤 씨와 만나기로 했다."

[[dialogue]]
speaker = "？？？"
original = "「会長く～ん♪」"
translation = "「회장구~운♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あけましておめでと～♪」"
translation = "「새해 복 많이 받아~♪」"

[[dialogue]]
speaker = "unk"
original = "サーシャさん、晴れ着似合ってますね！"
translation = "사샤 씨, 설빔 잘 어울리시네요!"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあらうふふ♪\u3000ありがと～。お姉ちゃん、褒められて嬉しくなっちゃうわ～♪」"
translation = "「어머어머 우후후♪ 고마워~. 언니, 칭찬받아서 기뻐지네~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「この晴れ着、実はヘレナさんがデザインした新しい戦闘服でね。起動する為のデータが欲しいってことで、ヴィーナスちゃんがくれたの～」"
translation = "「이 설빔 사실 헬레나 씨가 디자인한 새로운 전투복이라서 말이야. 기동하기 위한 데이터가 필요하다고 비너스짱이 줬어~」"

[[dialogue]]
speaker = "サーシャ"
original = "「って、あら？\u3000そういえば、ヴィーナスちゃんの姿が見えないけど……？」"
translation = "「어라? 그러고 보니 비너스짱 모습이 안 보이는데……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「――初詣の場所で合流する予定？\u3000そうなのね～。他になにか用事でもあったのかしら？」"
translation = "「――하츠모데 장소에서 합류할 예정? 그렇구나~. 달리 무슨 용무라도 있었던 걸까?」"

[[dialogue]]
speaker = "？？？"
original = "「会長く～ん♪」"
translation = "「회장구~운♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら？」"
translation = "「어라?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あけおめ～！\u3000じゃじゃ～ん♪」"
translation = "「해피 뉴 이어~! 짜잔~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「これが、あたしの晴れ着姿だよ♪\u3000会長くん、どうどう？\u3000男子的な感想、聞かせて欲しいし♪」"
translation = "「이게 내 설빔 차림이야♪ 회장군, 어때 어때? 남자다운 감상 들려줬으면 좋겠어♪」"

[[dialogue]]
speaker = "unk"
original = "す、すごく似合ってると思うけど……"
translation = "저, 정말 잘 어울린다고 생각하는데……"

[[dialogue]]
speaker = "ウズメイア"
original = "「え？\u3000なになに？\u3000――アレンジが派手？」"
translation = "「에? 뭐라구? ――어레인지가 화려해?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えっへへ～、これ超イケてるっしょ～？\u3000ヘレナさんに提案したら、ノリノリでデザインしてくれたんだ～」"
translation = "「에헤헤~ 이거 완전 폼나지? 헬레나 씨한테 제안했더니 신나서 디자인해 주셨어~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「これぞ、日本伝統文化の最先端、って感じ？」"
translation = "「이게 바로 일본 전통문화의 최첨단이라는 느낌?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ウズメちゃ～ん！\u3000久しぶりね～♪」"
translation = "「우즈메쨔~응! 오랜만이네~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ、サーシャ先輩！\u3000あけおめです～♪」"
translation = "「앗, 사샤 선배! 새해 복 많이 받으세요~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ていうか、うわぁぁぁっ♪\u3000サーシャ先輩、晴れ着似合い過ぎだし！\u3000めっちゃ色っぽいんだけど～♪」"
translation = "「그보다 우와아아앗♪ 사샤 선배, 설빔 너무 잘 어울려요! 완전 섹시한데~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあらうふふ♪\u3000ウズメちゃんの方こそ、すごく可愛いわ～♪\u3000思わず妹にしちゃいたいくらい♪」"
translation = "「어머어머 우후후♪ 우즈메짱이야말로 정말 귀여워~♪ 무심코 여동생 삼고 싶어질 정도네♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「もう、サーシャ先輩ってば、ソフィアが聞いたら拗ねちゃいますよ～？」"
translation = "「정말, 사샤 선배도 참. 소피아가 들으면 삐칠걸요~?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あの子は拗ねてるところも可愛くてね～？\u3000って、いけないわね。こういうことばかり言っていると、また怒らせちゃうわ」"
translation = "「그 아이는 삐친 모습도 귀여워서 말이야~? 아, 안 되겠네. 이런 말만 하고 있으면 또 화내겠지.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そういえば、さっきヘレナさんがデザインしてくれたって言っていたけれど、もしかしてウズメちゃんのも晴れ着フォームなのかしら？」"
translation = "「그러고 보니 아까 헬레나 씨가 디자인해 줬다고 했는데, 혹시 우즈메짱 것도 설빔 폼이니?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えっ、ってことは、サーシャ先輩も？\u3000マジマジ！？\u3000お揃いじゃ～ん♪」"
translation = "「엣, 그럼 사샤 선배도? 진짜 진짜!? 커플룩이잖아~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ♪\u3000ウズメちゃん、和装の戦闘服が欲しかったって言ってたものね～」"
translation = "「우후후♪ 우즈메짱, 일본풍 전투복을 갖고 싶다고 했었지~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そうなんですよ～。でも、まだ起動が上手く行ってなくて～」"
translation = "「그랬었죠~. 하지만 아직 기동이 잘 안 돼서~」"

[[dialogue]]
speaker = "サーシャ"
original = "「そっかそっか。ウズメちゃんもまだなのね～。今度機会があったら、色々試してみましょうか」"
translation = "「그렇구나 그렇구나. 우즈메짱도 아직이네~. 다음에 기회가 되면 여러 가지 시도해 볼까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「それと、ウズメちゃんと会長くん、いつの間にか知り合いだったのね～」"
translation = "「그리고 우즈메짱이랑 회장군, 어느샌가 아는 사이였네~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「実はこの間、知り合ったんですよ～。会長くん、すごく話しやすいから、あっという間に仲良くなっちゃって～♪」"
translation = "「사실 얼마 전에 알게 됐어요~. 회장군, 엄청 말하기 편해서 금방 친해져 버렸거든요~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ね、会長くん♪」"
translation = "「그치, 회장군♪」"

[[dialogue]]
speaker = "unk"
original = "すっかり友達になっちゃったな"
translation = "완전히 친구가 되어버렸네."

[[dialogue]]
speaker = "サーシャ"
original = "「２人共、友達作り得意だものね～。確かに気が合いそうだわ」"
translation = "「둘 다 친구 사귀는 거 잘하니까~. 확실히 마음이 잘 맞을 것 같네.」"

[[dialogue]]
speaker = "サーシャ"
original = "「それで、晴れ着を着てるってことは、ウズメちゃんもこれから初詣かしら？」"
translation = "「그래서 설빔을 입었다는 건 우즈메짱도 이제부터 하츠모데니?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そのことなんですけど、実は、あたしもサーシャ先輩たちの初詣に、参加させてもらいたいなって思ってまして！」"
translation = "「그 일인데요, 사실 저도 사샤 선배들의 하츠모데에 참가하고 싶다고 생각해서요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、そうなの？」"
translation = "「어라, 그러니?」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは電車に乗って、流星市国の外へと移動することになった。"
translation = "그 후 우리들은 전철을 타고 유성시국 밖으로 이동하게 되었다."

[[dialogue]]
speaker = "unk"
original = "流星市国は日本の中――もっと言えば、東京の一角に存在している小さな国だ。"
translation = "유성시국은 일본 안―― 더 정확히 말하면 도쿄의 일각에 존재하는 작은 나라다."

[[dialogue]]
speaker = "unk"
original = "そして、流星教を国教としている為、お寺や神社は存在しない。"
translation = "그리고 유성교를 국교로 하고 있기 때문에 절이나 신사가 존재하지 않는다."

[[dialogue]]
speaker = "unk"
original = "その為、初詣をするなら、東京まで出向くのが一般的である。"
translation = "그 때문에 하츠모데를 하려면 도쿄까지 나가는 것이 일반적이다."

[[dialogue]]
speaker = "unk"
original = "というわけで、俺たちは東京のとある有名なお寺へとやってきていた――"
translation = "그런 고로 우리들은 도쿄의 어느 유명한 절에 도착했다――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、来たわね！\u3000あけましておめでとう、みんな♪」"
translation = "「앗, 왔구나! 새해 복 많이 받아, 얘들아♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ヴィーナス先輩、あけおめ～♪\u3000やばっ！\u3000先輩の晴れ着姿も、めちゃめちゃ綺麗なんだけど～！」"
translation = "「비너스 선배, 아케오메~♪ 대박! 선배 설빔 차림도 엄청 예쁜데~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふっふ～ん♪\u3000ありがと！\u3000たまには九浄家の娘らしく、和服姿も見せないとね！」"
translation = "「훗후~웅♪ 고마워! 가끔은 쿠죠 가문의 딸답게 기모노 차림도 보여줘야지!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト、どうかしら？\u3000今日は大人な女性を目指して、お化粧もバッチリしてもらって来たのよ！」"
translation = "「쿠로토, 어떠니? 오늘은 성숙한 여성을 목표로 화장도 완벽하게 하고 왔다구!」"

[[dialogue]]
speaker = "unk"
original = "すごく似合ってる。綺麗だ"
translation = "정말 잘 어울려. 예뻐."

[[dialogue]]
speaker = "ヴィーナス"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そ、そう。似合ってるならよかったわ！\u3000うん！」"
translation = "「그, 그래. 잘 어울린다니 다행이네! 응!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪\u3000ヴィーナスちゃんが珍しく照れてるわ～♪\u3000かわいい～♪」"
translation = "「어머나~♪ 비너스짱이 드물게 수줍어하네~♪ 귀여워~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へっ！？\u3000サーシャさん、何を言っているの！\u3000そんなことないわよ！？」"
translation = "「헷!? 사샤 씨, 무슨 소릴 하는 거야! 그런 거 아니라니까!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ♪\u3000言いながらも、顔がニヤニヤしちゃってるわよ～？」"
translation = "「우후후♪ 말하면서도 얼굴이 싱글벙글하고 있다구~?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「も、もう、サーシャさんってば！\u3000うぅ～……！」"
translation = "「저, 정말 사샤 씨도 참! 으으~……!」"

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고――"

[[dialogue]]
speaker = "？？？"
original = "「姉さん」"
translation = "「언니.」"

[[dialogue]]
speaker = "サーシャ"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんが驚いた顔をして、振り返ると――"
translation = "사샤 씨가 놀란 얼굴로 뒤돌아보자――"

[[dialogue]]
speaker = "ソフィア"
original = "「……あけまして、おめでとうございます」"
translation = "「……새해 복 많이 받으세요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ソフィ……？」"
translation = "「소피……?」"

[[dialogue]]
speaker = "unk"
original = "こうして、ついに奏姉妹は顔を合わせるのだった――"
translation = "이렇게 해서, 마침내 카나데 자매는 대면하게 된 것이었다――"

