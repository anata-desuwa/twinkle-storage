[[dialogue]]
speaker = "unk"
original = "第２話,お披露目、クリスマスフォーム,P"
translation = "제2화, 공개, 크리스마스 폼, P"

[[dialogue]]
speaker = "unk"
original = "クリスマス前の流星寮にて。"
translation = "크리스마스 전 유성 기숙사에서."

[[dialogue]]
speaker = "unk"
original = "舞亜は仲のいい友達に乞われて、クリスマスフォームのお披露目会をしていた。"
translation = "마이아는 친한 친구들의 요청으로 크리스마스 폼 공개회를 열고 있었다."

[[dialogue]]
speaker = "舞亜"
original = "「じゃあ行くよ。変身！」"
translation = "「그럼 간다. 변신!」"

[[dialogue]]
speaker = "舞亜"
original = "「どうかな？\u3000これが私のクリスマスフォーム……なんだけど」"
translation = "「어때? 이게 내 크리스마스 폼……인데.」"

[[dialogue]]
speaker = "ソフィア"
original = "「いい！\u3000すごくいいと思います」"
translation = "「좋아요! 아주 좋다고 생각해요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「めっちゃカワイイし！\u3000もちろん普段もめちゃカワだけど、更にパワーアップって感じ～」"
translation = "「완전 귀엽고! 물론 평소에도 엄청 귀엽지만, 한층 더 파워 업했다는 느낌~」"

[[dialogue]]
speaker = "舞亜"
original = "「ありがと、２人とも。うん、私もこれはかなり可愛いって思ってるんだ」"
translation = "「고마워, 둘 다. 응, 나도 이건 꽤 귀엽다고 생각하고 있어.」"

[[dialogue]]
speaker = "ソフィア"
original = "「可愛いだけでなく今度のパーティーにぴったりですね」"
translation = "「귀여울 뿐만 아니라 이번 파티에 딱이네요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんうん！\u3000ちゃんと個性も出てるし、上手に活かせばめっちゃ目立てそう」"
translation = "「응응! 개성도 잘 드러나고, 잘 활용하면 엄청 눈에 띌 것 같아.」"

[[dialogue]]
speaker = "アニュラス"
original = "「さすがは舞亜だな。とてもちゃーみんぐだと思うぞ」"
translation = "「역시 마이아로군. 매우 챠밍하다고 생각한다.」"

[[dialogue]]
speaker = "舞亜"
original = "「ちゃーみんぐって……」"
translation = "「챠밍이라니……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あれ？\u3000アニュラスもクリスマスフォーム？」"
translation = "「어라? 아뉴라스도 크리스마스 폼?」"

[[dialogue]]
speaker = "ソフィア"
original = "「もしかして、見せつけてますか？」"
translation = "「혹시, 자랑하는 건가요?」"

[[dialogue]]
speaker = "アニュラス"
original = "「見せつけているつもりはないが、私と舞亜は仲間だからな」"
translation = "「자랑할 생각은 없지만, 나와 마이아는 동료니까 말이다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「とは言いつつも、舞亜のものとは色々違うようですね」"
translation = "「말은 그렇게 하면서도, 마이아 것과는 여러모로 다른 모양이네요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「舞亜のはパティシエって感じ？」"
translation = "「마이아 건 파티시에라는 느낌?」"

[[dialogue]]
speaker = "舞亜"
original = "「私のクリスマスフォームのコンセプトはそうだね」"
translation = "「내 크리스마스 폼의 콘셉트는 그렇지.」"

[[dialogue]]
speaker = "舞亜"
original = "「アニュラスのは制服っぽいかな？」"
translation = "「아뉴라스 건 제복 같으려나?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そだね、アニュラスのクリスマスフォームもいい感じだし♪」"
translation = "「그러게, 아뉴라스의 크리스마스 폼도 괜찮은 느낌이고♪」"

[[dialogue]]
speaker = "アニュラス"
original = "「ありがとう。では感謝のバズーカを贈ろう！\u3000発射！」"
translation = "「고맙다. 그럼 감사의 바주카를 선사하마! 발사!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ちょっ！\u3000いきなり！！」"
translation = "「잠깐! 갑자기!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「耳がキーンとしたし！！」"
translation = "「귀가 멍멍하다구!!」"

[[dialogue]]
speaker = "舞亜"
original = "「アニュラス、いくら非殺傷でもばんばん発射するのは迷惑だから」"
translation = "「아뉴라스, 아무리 비살상이라도 펑펑 쏘는 건 민폐야.」"

[[dialogue]]
speaker = "舞亜"
original = "「発射する時には、ちゃんと撃ちますよって伝えてから撃たないとだめだよ」"
translation = "「쏠 때는 제대로 쏠게요라고 말하고 쏘지 않으면 안 돼.」"

[[dialogue]]
speaker = "アニュラス"
original = "「す、すまない……」"
translation = "「미, 미안하다……」"

[[dialogue]]
speaker = "舞亜"
original = "「パーティー本番では絶対やめようね。２人とも大丈夫？」"
translation = "「파티 본방에서는 절대 하지 말자. 둘 다 괜찮아?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あはは、へーきへーき……ちょっちキンキンしてるけど、たぶんすぐ治るし……」"
translation = "「아하하, 괜찮아 괜찮아…… 조금 멍하긴 한데, 아마 금방 나을 거야……」"

[[dialogue]]
speaker = "ソフィア"
original = "「私も大丈夫……」"
translation = "「저도 괜찮아요……」"

[[dialogue]]
speaker = "舞亜"
original = "「ごめんね、アニュラスが迷惑かけちゃって」"
translation = "「미안해, 아뉴라스가 폐를 끼쳐서.」"

[[dialogue]]
speaker = "ソフィア"
original = "「舞亜、ちょっとママ化してきてませんか……？」"
translation = "「마이아, 약간 엄마처럼 되어가는 거 아니에요……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「アニュラスの面倒を見てて偉いし♪」"
translation = "「아뉴라스 뒤치다꺼리도 하고 기특해♪」"

[[dialogue]]
speaker = "アニュラス"
original = "「もしかして私が娘ポジションということか？\u3000いや、それは納得がいかないぞ？」"
translation = "「혹시 내가 딸 포지션이라는 건가? 아니, 그건 납득할 수 없군?」"

[[dialogue]]
speaker = "舞亜"
original = "「それが嫌ならちゃんと自制してね」"
translation = "「그게 싫으면 제대로 자제해줘.」"

[[dialogue]]
speaker = "アニュラス"
original = "「むぅ、分かった……注意しよう」"
translation = "「무으, 알았다…… 주의하도록 하지.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「なんだかんだで仲いいね～。この調子でクリスマスパーティーを盛り上げてよ」"
translation = "「이래저래 사이좋네~. 이 기세로 크리스마스 파티 분위기를 띄워줘.」"

[[dialogue]]
speaker = "アニュラス"
original = "「ああ。我ら流星寮クリスマスパーティー実行委員に任せてくれ！」"
translation = "「음. 우리 유성 기숙사 크리스마스 파티 실행 위원에게 맡겨다오!」"

[[dialogue]]
speaker = "舞亜"
original = "「ところで２人に相談したいんだけど、このクリスマスフォーム、どう活用したらいいかな？」"
translation = "「그나저나 둘에게 상담하고 싶은 게 있는데, 이 크리스마스 폼을 어떻게 활용하면 좋을까?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「パティシエだし、スイーツ作り？」"
translation = "「파티시에니까, 디저트 만들기?」"

[[dialogue]]
speaker = "舞亜"
original = "「実はこの戦闘服の能力でスイーツを作り出せるみたいなんだよね。それとは別に私たちの手作り料理もお出しすることにはなってるよ」"
translation = "「사실 이 전투복의 능력으로 디저트를 만들어낼 수 있는 것 같더라고. 그것과는 별개로 우리 손요리도 대접하기로 되어 있어.」"

[[dialogue]]
speaker = "ソフィア"
original = "「でしたらやはり、インラインスケートをうまく活用するのがよさそうですね」"
translation = "「그렇다면 역시, 인라인스케이트를 잘 활용하는 게 좋을 것 같네요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「じゃあじゃあ！\u3000スケートで走りながらご馳走を運ぶのはどう？」"
translation = "「그럼 그럼! 스케이트로 달리면서 음식을 나르는 건 어때?」"

[[dialogue]]
speaker = "ソフィア"
original = "「なるほど、それはいいかもしれませんね！」"
translation = "「과연, 그건 좋을지도 모르겠네요!」"

[[dialogue]]
speaker = "舞亜"
original = "「スケートを滑りながら料理を運ぶ、かぁ……」"
translation = "「스케이트를 타면서 요리를 나른다, 라……」"

[[dialogue]]
speaker = "unk"
original = "やっぱり難しそう？"
translation = "역시 어려울 것 같아?"

[[dialogue]]
speaker = "unk"
original = "自然に滑れるように練習してるけど"
translation = "자연스럽게 탈 수 있게 연습하고 있지만."

[[dialogue]]
speaker = "舞亜"
original = "「軸を安定させて滑るのは簡単だけど、実際に料理を持って滑ったことはないからちょっと不安かもね」"
translation = "「축을 안정시키고 타는 건 쉽지만, 실제로 요리를 들고 타본 적은 없어서 좀 불안할지도 모르겠네.」"

[[dialogue]]
speaker = "アニュラス"
original = "「であれば、特訓だな」"
translation = "「그렇다면 특훈이다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね、私もこれはアニュラスさんに賛成です」"
translation = "「그렇네요, 저도 이건 아뉴라스 씨에게 찬성이에요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「特訓って、そんな大袈裟な……」"
translation = "「특훈이라니, 그렇게 거창하게……」"

[[dialogue]]
speaker = "舞亜"
original = "「そう？\u3000新しいことに取り組む時は、特訓するのが普通だと思うけど」"
translation = "「그래? 새로운 것에 도전할 때는 특훈하는 게 당연하다고 생각하는데.」"

[[dialogue]]
speaker = "アニュラス"
original = "「舞亜の言う通りだ」"
translation = "「마이아의 말이 맞다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「それくらいしないと、いい成績は残せませんからね」"
translation = "「그 정도는 해야 좋은 성적을 남길 수 있으니까요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「お、おおぅ……そう言えば、この３人がっつり体育会系だったよ……」"
translation = "「오, 오오…… 그러고 보니 이 세 사람, 뼛속까지 체육계였지……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ではさっそく特訓を始めましょう。アニュラスさんはサポートをお願いします」"
translation = "「그럼 당장 특훈을 시작하죠. 아뉴라스 씨는 서포트를 부탁드려요.」"

[[dialogue]]
speaker = "アニュラス"
original = "「承知した。私に任せてくれ」"
translation = "「알았다. 내게 맡겨다오.」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんは舞亜が運ぶ料理をお願いします」"
translation = "「회장님은 마이아가 운반할 요리를 부탁드려요.」"

[[dialogue]]
speaker = "unk"
original = "任せてくれ"
translation = "맡겨줘."

[[dialogue]]
speaker = "unk"
original = "了解！"
translation = "라져!"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしは？\u3000あたしも何か手伝いたいんだけど」"
translation = "「나는? 나도 뭔가 돕고 싶은데.」"

[[dialogue]]
speaker = "舞亜"
original = "「ウズメはお客さん役でお願い」"
translation = "「우즈메는 손님 역할을 해줘.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「オッケー♪\u3000じゃあ、ウェイトレスさんっ、今日の日替わり定食をお願いしまーす！」"
translation = "「오케이♪ 그럼, 웨이트리스 언니, 오늘의 추천 정식 부탁해용!」"

[[dialogue]]
speaker = "舞亜"
original = "「はーい、ご注文承りました！\u3000しばらくお待ち下さい～♪」"
translation = "「네─, 주문 받았습니다! 잠시만 기다려 주세요~♪」"

[[dialogue]]
speaker = "舞亜"
original = "「って、ここまでする必要あるの？」"
translation = "「근데, 이렇게까지 할 필요가 있어?」"

[[dialogue]]
speaker = "ソフィア"
original = "「あります」"
translation = "「있습니다.」"

[[dialogue]]
speaker = "舞亜"
original = "「即答！？\u3000まあ、ソフィがそう言うなら……やるけど」"
translation = "「즉답!? 뭐, 소피가 그렇게 말한다면…… 하겠지만.」"

[[dialogue]]
speaker = "ソフィア"
original = "「演技指導は任せて下さい。舞亜を最高に可愛いウェイトレスさんにしてみせますから！」"
translation = "「연기 지도는 맡겨주세요. 마이아를 최고의 귀여운 웨이트리스로 만들어 보일 테니까요!」"

[[dialogue]]
speaker = "unk"
original = "こうして、可愛さ全振りな舞亜のウェイトレス特訓が始まるのだった。"
translation = "이렇게 해서, 귀여움에 올인한 마이아의 웨이트리스 특훈이 시작되는 것이었다."

