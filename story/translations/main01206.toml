[[dialogue]]
speaker = "unk"
original = "第６話,偽りなき自我,B"
translation = "제6화, 거짓 없는 자아, B"

[[dialogue]]
speaker = "unk"
original = "長き時の放浪の果てに──俺たちの意識は現実へ戻ってくる。"
translation = "긴 시간의 방랑 끝에── 우리들의 의식은 현실로 되돌아온다."

[[dialogue]]
speaker = "マトイ"
original = "「っ……ぁ……今の、って……」"
translation = "「윽…… 아…… 방금, 그건……」"

[[dialogue]]
speaker = "サーシャ"
original = "「学園長の……人生……」"
translation = "「학원장의…… 인생……」"

[[dialogue]]
speaker = "フィオナ"
original = "（平行世界から実体を奪われ、仮面を被った使徒として行使される──なんて、それは……）"
translation = "（평행 세계에서 실체를 빼앗기고, 가면을 쓴 사도로서 행사된다──니, 그건……）"

[[dialogue]]
speaker = "クロト"
original = "（みんなにも見えていたみたいだな──）"
translation = "（모두에게도 보였던 것 같군──）"

[[dialogue]]
speaker = "unk"
original = "これで、彼の行動倫理は明らかになった。ヴィーナスが狙われていた理由も。"
translation = "이로써, 그의 행동 윤리는 명확해졌다. 비너스가 노려지고 있던 이유도."

[[dialogue]]
speaker = "クロト"
original = "「あなたは……<ruby>異世界<rt>デネブ</rt></ruby>に消えた奥さんを探求した結果、残酷な真実を知った」"
translation = "「당신은…… 이세계로 사라진 아내를 탐구한 결과, 잔혹한 진실을 알았다.」"

[[dialogue]]
speaker = "クロト"
original = "「そして現実世界──奥さんのいないアルタイルに絶望し、リクリエというリセットの機会を望んだ」"
translation = "「그리고 현실 세계── 아내가 없는 알타이르에 절망하고, 리크리에라는 리셋의 기회를 바랐다.」"

[[dialogue]]
speaker = "セイファート"
original = "「ああ……矮小だろう？」"
translation = "「아아…… 왜소하겠지?」"

[[dialogue]]
speaker = "セイファート"
original = "「ただ己の欲望がために破滅を招こうとした厚顔無恥な悪党だ。君たち星騎士にとって……討ち滅ぼすべき仇に違いない」"
translation = "「단지 자신의 욕망 때문에 파멸을 초래하려 한 후안무치한 악당이다. 너희 성기사들에게 있어…… 쳐부숴야 할 원수임에 틀림없다.」"

[[dialogue]]
speaker = "セイファート"
original = "「だが。それでも。<ruby>妻<rt>マルキア</rt></ruby>と会う機がリクリエにしかないというならば……私は喜んで終末を望もう！」"
translation = "「하지만. 그럼에도. 아내와 만날 기회가 리크리에밖에 없다면…… 나는 기꺼이 종말을 바라겠다!」"

[[dialogue]]
speaker = "unk"
original = "セイファート学園長が立ち上がると──全身を覆っていた黒き鎧が、砕け始めた。"
translation = "세이퍼트 학원장이 일어서자── 전신을 뒤덮고 있던 검은 갑옷이, 부서지기 시작했다."

[[dialogue]]
speaker = "セイファート"
original = "「コォォォォォォッッッ…………！」"
translation = "「크오오오오오오옷옷옷…………!」"

[[dialogue]]
speaker = "フィオナ"
original = "「鎧が──」"
translation = "「갑옷이──」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ッ……！\u3000まだ動けるのニャン……！？」"
translation = "「윽……! 아직 움직일 수 있는 거냥……!?」"

[[dialogue]]
speaker = "マトイ"
original = "「どこにあんな力が……っ……こっちは、もう──！」"
translation = "「어디에 저런 힘이…… 윽…… 이쪽은, 이제──!」"

[[dialogue]]
speaker = "unk"
original = "鎧がなくなったことで、むしろ先ほどよりも強烈な波動がこちらへ押し寄せてきた。"
translation = "갑옷이 없어진 것으로, 오히려 방금 전보다 강렬한 파동이 이쪽으로 밀려왔다."

[[dialogue]]
speaker = "クロト"
original = "「その鎧は──拘束具だったとでも言うのか！」"
translation = "「그 갑옷은── 구속구였다는 말이냐!」"

[[dialogue]]
speaker = "セイファート"
original = "「フィーニスの塔を制したあの日から、私は女神殺しの<ruby>咎<rt>とが</rt></ruby>を背負って生きてきた」"
translation = "「피니스의 탑을 제압한 그날부터, 나는 여신 살해의 허물을 짊어지고 살아왔다.」"

[[dialogue]]
speaker = "セイファート"
original = "「その代償として手にしたこの<ruby>霊力<rt>ちから</rt></ruby>は……こうして発露しているだけで周囲に多大な影響を与える」"
translation = "「그 대가로 손에 넣은 이 영력은…… 이렇게 발로하고 있는 것만으로 주위에 막대한 영향을 준다.」"

[[dialogue]]
speaker = "セイファート"
original = "「その余波を抑えるために、漆黒の鎧を利用していたが……優秀な教え子相手にもはや必要あるまい」"
translation = "「그 여파를 억누르기 위해, 칠흑의 갑옷을 이용하고 있었지만…… 우수한 제자 상대로는 이제 필요 없겠지.」"

[[dialogue]]
speaker = "unk"
original = "黒騎士という悪のペルソナを彼は脱いだ。"
translation = "검은 기사라는 악의 페르소나를 그는 벗었다."

[[dialogue]]
speaker = "セイファート"
original = "「私は……もはや私を偽らない。ただジェラルド・セイファートという悪のまま、せめてこの異分子だけは排除する……！」"
translation = "「나는…… 더 이상 나를 위장하지 않겠다. 그저 제럴드 세이퍼트라는 악으로서, 하다못해 이 이분자만은 배제하겠다……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナスさん──！」"
translation = "「비너스 씨──!」"

[[dialogue]]
speaker = "unk"
original = "とてつもない結界が俺たちとの間を阻む。"
translation = "엄청난 결계가 우리들 사이를 가로막는다."

[[dialogue]]
speaker = "unk"
original = "セイファートはこちらへ無防備に背を向け、すべての霊力をヴィーナスへの一閃に注ぎ込んだ。"
translation = "세이퍼트는 이쪽으로 무방비하게 등을 돌리고, 모든 영력을 비너스를 향한 일섬에 쏟아부었다."

[[dialogue]]
speaker = "unk"
original = "彼は自分がやられるとしても──ヴィーナスだけは排除するつもりだ！"
translation = "그는 자신이 당하더라도── 비너스만은 배제할 생각이다!"

[[dialogue]]
speaker = "セイファート"
original = "「──さらばだ、デネブの娘。その亡骸をもって……あちらへの<ruby>標<rt>しるべ</rt></ruby>となるがいい」"
translation = "「──잘 가라, 데네브의 딸. 그 유해를 가지고…… 저쪽으로의 이정표가 되는 것이 좋다.」"

[[dialogue]]
speaker = "unk"
original = "大剣が振り下ろされる。影がヴィーナスの全身を覆った。"
translation = "대검이 내리쳐진다. 그림자가 비너스의 전신을 뒤덮었다."

[[dialogue]]
speaker = "unk"
original = "しかし、その最後の一瞬まで──彼女に臆する素振りは一切なかった。"
translation = "하지만, 그 마지막 한순간까지── 그녀에게 움츠러드는 기색은 일절 없었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「──不思議よね。私、ずっと落ち着いてる」"
translation = "「──신기하지. 나, 계속 침착해.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こんなピンチは日誌のどこにもなかった。その日誌だって消えちゃって、絶望しかないはずなのに」"
translation = "「이런 위기는 일지 어디에도 없었어. 그 일지마저 사라져서, 절망밖에 없을 텐데.」"

[[dialogue]]
speaker = "セイファート"
original = "「……死を受け入れたか。賢明だ」"
translation = "「……죽음을 받아들였나. 현명하다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「違うわよ。他の誰かが決めた筋書きなんか、私にはもう必要ないって話」"
translation = "「아니거든. 다른 누군가가 정한 각본 따위, 나에게는 이제 필요 없다는 이야기.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「<b>私</b>の決めた魔王がそこにいる。それで十分。あなたと違って、どんな可能性も捨てたりしない、最強の英雄が」"
translation = "「<b>나</b>의 정한 마왕이 저기에 있어. 그걸로 충분해. 너와 달리, 어떤 가능성도 버리지 않는, 최강의 영웅이.」"

[[dialogue]]
speaker = "セイファート"
original = "「根拠なき妄想だ──！」"
translation = "「근거 없는 망상이다──!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ……確かに、今まではそうだったかも」"
translation = "「후훗…… 확실히, 지금까지는 그랬을지도.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも──その根拠なら、もうとっくに気づいてるわ。クロト自身もね！」"
translation = "「하지만── 그 근거라면, 벌써 진작에 눈치챘어. 쿠로토 자신도 말이야!」"

[[dialogue]]
speaker = "unk"
original = "彼はひとつだけ勘違いをしている。"
translation = "그는 한 가지 착각을 하고 있다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがこちらへやってきたのは、何も彼女自身の手でリクリエを食い止めるためじゃあない。"
translation = "비너스가 이쪽으로 온 것은, 결코 그녀 자신의 손으로 리크리에를 막기 위함이 아니다."

[[dialogue]]
speaker = "ヴィーナス"
original = "『クロトだって……何度か垣間見てきたんじゃない？\u3000ここじゃない、どこかの自分の記憶』"
translation = "『쿠로토도…… 몇 번인가 엿봤던 거 아니야? 여기가 아닌, 어딘가의 자기 자신의 기억을.』"

[[dialogue]]
speaker = "？？？"
original = "『世界が大変な時だからこそ……そんな時間も、大切にしなくちゃいけないのかも』"
translation = "『세계가 위험할 때일수록…… 그런 시간도, 소중히 해야 할지도.』"

[[dialogue]]
speaker = "？？？"
original = "『それじゃ、頼りにしてるわね──クロト？』"
translation = "『그럼, 믿고 있을게── 쿠로토?』"

[[dialogue]]
speaker = "unk"
original = "なぜ、彼女は俺を待っていたのか。なぜ、彼女の元となる実体は存在しないのか。"
translation = "왜, 그녀는 나를 기다리고 있었던 걸까. 왜, 그녀의 근원이 되는 실체는 존재하지 않는 걸까."

[[dialogue]]
speaker = "unk"
original = "その答えが今──そこにある。"
translation = "그 해답이 지금── 저기에 있다."

[[dialogue]]
speaker = "？？？"
original = "『この子にも名前をつけないとね。ヴィーナス──なんて、どうかしら？』"
translation = "『이 아이에게도 이름을 붙여야겠지. 비너스── 같은 건 어떨까?』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから、ねえ──今こそ世界を救ってみなさいよ。<b>パパ</b>！」"
translation = "「그러니까, 있잖아── 지금이야말로 세계를 구해 보라고. <b>아빠</b>!」"

[[dialogue]]
speaker = "クロト"
original = "「──ああ。<b>待たせて悪かったな</b>、ヴィーナス」"
translation = "「──아아. <ruby>기다리게 해서 미안했다<rt>・・・・ ・・ ・・・・</rt></ruby>, 비너스.」"

[[dialogue]]
speaker = "セイファート"
original = "「なッ……！？」"
translation = "「뭣……!?」"

[[dialogue]]
speaker = "マトイ"
original = "「は──えぇぇっ！？」"
translation = "「하── 에에엣!?」"

[[dialogue]]
speaker = "unk"
original = "それは時間も世界も超えた願い。"
translation = "그것은 시간도 세계도 초월한 소원."

[[dialogue]]
speaker = "unk"
original = "魔力──霊力──星力──全てが<ruby>渾然一体<rt>こんぜんいったい</rt></ruby>の<ruby>波濤<rt>はとう</rt></ruby>となって、俺の全身にみなぎっていく。"
translation = "마력── 영력── 성력── 모든 것이 혼연 일체의 파도가 되어, 나의 전신에 넘실거린다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あはは──最高じゃない、クロト。私のスパルタも意味があったってとこかしら」"
translation = "「아하하── 최고잖아, 쿠로토. 나의 스파르타도 의미가 있었다는 걸까.」"

[[dialogue]]
speaker = "セイファート"
original = "「<ruby>緋<rt>あか</rt></ruby>き、眼……！？\u3000これは──御前試合の、時の……！」"
translation = "「붉은, 눈……!? 이것은── 어전 시합의, 때의……!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ──あの時と同じだ。受け継がれてきた、魔王の力だ」"
translation = "「아아── 그때와 같다. 계승되어 온, 마왕의 힘이다.」"

[[dialogue]]
speaker = "クロト"
original = "「でも、俺はずっと……これを自在に引き出せずにいた。ピンチばかりの奇跡かと思っていた。だけど、違ったんだな」"
translation = "「하지만, 나는 계속…… 이것을 자유자재로 끌어내지 못하고 있었어. 위기뿐인 기적이라고 생각했지. 하지만, 달랐던 거네.」"

[[dialogue]]
speaker = "クロト"
original = "「ようやくわかった。俺が、この真価を引き出すのに、本当に必要だったものは何なのか」"
translation = "「겨우 알았다. 내가, 이 진가를 끌어내는 데, 정말로 필요했던 것이 무엇인지.」"

[[dialogue]]
speaker = "unk"
original = "──あの時も。今回も。"
translation = "──그때도. 이번에도."

[[dialogue]]
speaker = "unk"
original = "俺が、魔王として覚醒するために必要だった、最後のトリガー。"
translation = "내가, 마왕으로서 각성하기 위해 필요했던, 최후의 방아쇠."

[[dialogue]]
speaker = "unk"
original = "それは……かけがえのない<ruby>家族<rt>むすめ</rt></ruby>による、魂の叫びだったんだ。"
translation = "그것은…… 둘도 없는 가족에 의한, 영혼의 외침이었던 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あんた聞いてなかったの──<ruby>デネブ<rt>むこう</rt></ruby>と<ruby>アルタイル<rt>こっち</rt></ruby>じゃ、時間にずれが生じるんだって」"
translation = "「당신 못 들었어── 데네브와 알타이르은, 시간에 차이가 생긴다고.」"

[[dialogue]]
speaker = "セイファート"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "だから──今の俺からじゃ未来にあたる<b>別の俺</b>が、子を為していたっておかしくはない。"
translation = "그러니까── 지금의 나에게는 미래에 해당하는 <ruby>다른 나<rt>・・ ・</rt></ruby>가, 아이를 낳았다고 해도 이상할 건 없다."

[[dialogue]]
speaker = "クロト"
original = "「俺もまた……向こうの世界じゃ、滅亡を止められなかったんだろう」"
translation = "「나 역시…… 저쪽 세계에서는, 멸망을 막지 못했겠지.」"

[[dialogue]]
speaker = "クロト"
original = "「だから望んだ。俺か、ヴィーナスか、それ以外の誰かはわからないが。三つ残された世界線のひとつだけでも──リクリエを防ぎきれるように」"
translation = "「그래서 바랐다. 나든, 비너스든, 그 외의 누군가는 모르겠지만. 세 개 남겨진 세계선 중 하나라도── 리크리에를 막아낼 수 있도록.」"

[[dialogue]]
speaker = "unk"
original = "<ruby>世界Ａ<rt>ベガ</rt></ruby>は滅んだ。"
translation = "세계 A는 멸망했다."

[[dialogue]]
speaker = "unk"
original = "<ruby>世界Ｂ<rt>デネブ</rt></ruby>も危うい。"
translation = "세계 B도 위태롭다."

[[dialogue]]
speaker = "unk"
original = "だからこそ彼女はやってきたのだ。自分が生まれるよりも前の魔王を鍛えれば、せめて<ruby>世界Ｃ<rt>アルタイル</rt></ruby>の壊滅は防げるかもしれないと。"
translation = "그렇기에 그녀는 찾아온 것이다. 자신이 태어나기 전의 마왕을 단련하면, 하다못해 세계 C의 괴멸은 막을 수 있을지도 모른다고."

[[dialogue]]
speaker = "unk"
original = "あるはずのない後悔が押し寄せるとともに、ここへ至った真意が理解できる気がした。"
translation = "있을 리 없는 후회가 밀려옴과 동시에, 여기에 이른 진의를 이해할 수 있을 것 같았다."

[[dialogue]]
speaker = "セイファート"
original = "「リクリエの使徒──否──その対になる存在、だとでも……！？」"
translation = "「리크리에의 사도── 아니── 그 반대가 되는 존재, 라고라도……!?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。単純なことだ。救いの糸なんだよ、ヴィーナスは」"
translation = "「아아. 단순한 거야. 구원의 실마리인 거지, 비너스는.」"

[[dialogue]]
speaker = "unk"
original = "<ruby>こちら<rt>アルタイル</rt></ruby>の住人が<ruby>あちら<rt>デネブ</rt></ruby>に<ruby>拐<rt>さら</rt></ruby>われてしまうことがあるなら──その逆が発生してもおかしくはない。"
translation = "이쪽의 주민이 저쪽으로 납치당하는 일이 있다면── 그 반대가 발생해도 이상할 건 없다."

[[dialogue]]
speaker = "unk"
original = "そしてヴィーナスは元々、こちらじゃまだ<b>生まれてもいない</b>存在だった。"
translation = "그리고 비너스는 원래, 이쪽에서는 아직 <ruby>태어나지도 않은<rt>・・・・・ ・・</rt></ruby> 존재였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が<ruby>アルタイル<rt>こっち</rt></ruby>に来た理由なんて──最初から教えてたでしょ。不甲斐ない<ruby>父親<rt>まおう</rt></ruby>を、鍛えるためなんだって」"
translation = "「내가 알타이르에 온 이유 따위── 처음부터 가르쳐줬잖아. 못 미더운 아버지를, 단련하기 위해서라고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから──私は<ruby>救世主<rt>メシア</rt></ruby>じゃない。助っ人なのよ。<b>今度こそ</b>、クロトに真価を発揮してもらうためのね」"
translation = "「그러니까── 나는 구세주가 아니야. 조력자인 거지. <b>이번에야말로</b>, 쿠로토에게 진가를 발휘하게 하기 위한.」"

[[dialogue]]
speaker = "クロト"
original = "「耳の痛い話だ──きっとヴィーナスがいなきゃ、俺はダメだったんだろうな」"
translation = "「귀가 따가운 이야기군── 분명 비너스가 없었다면, 나는 안 됐을 거겠지.」"

[[dialogue]]
speaker = "unk"
original = "彼の妻マルキアは──エリシアの姉フィオナは──リクリエによって<ruby>拐<rt>さら</rt></ruby>われ、破滅を喚ぶ仮面の使徒として平行世界に召喚された。"
translation = "그의 아내 마르키아는── 엘리시아의 언니 피오나는── 리크리에에 의해 납치당해, 파멸을 부르는 가면의 사도로서 평행 세계에 소환되었다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがこうして俺のためにやってきたのは、その仕組みをまったく逆に利用した形になる。"
translation = "비너스가 이렇게 나를 위해 찾아온 것은, 그 구조를 완전히 반대로 이용한 형태가 된다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「日誌はもう必要ない。ここから先の未来は、どんな平行世界とも違う結末なんだから」"
translation = "「일지는 이제 필요 없어. 여기서부터의 미래는, 어떤 평행 세계와도 다른 결말이니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そっか……だから、ヴィーナスちゃんの日誌には……」"
translation = "「그렇구나…… 그래서, 비너스짱의 일지에는……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスには使命があった。俺という魔王を目覚めさせる使命が。"
translation = "비너스에게는 사명이 있었다. 나라는 마왕을 깨우는 사명이."

[[dialogue]]
speaker = "unk"
original = "そして彼女の持ち込んだ日誌には、これから先の未来が記されていた。"
translation = "그리고 그녀가 가져온 일지에는, 앞으로의 미래가 기록되어 있었다."

[[dialogue]]
speaker = "unk"
original = "だけどあの未来は、道筋は──最終的には失敗してしまった別の世界の物語でしかないんだ。"
translation = "하지만 그 미래는, 길은── 최종적으로 실패해버린 다른 세계의 이야기에 불과하다."

[[dialogue]]
speaker = "クロト"
original = "「ここから先の──本当の未来を紡げるのは……俺たちだけだ」"
translation = "「여기서부터의── 진정한 미래를 엮을 수 있는 것은…… 우리들뿐이다.」"

[[dialogue]]
speaker = "セイファート"
original = "「……ふっ……ふっ。ははははっ！」"
translation = "「……훗…… 훗. 하하하하핫!」"

[[dialogue]]
speaker = "セイファート"
original = "「平行世界間の移動は不可能──他ならぬ女神が<ruby>宣<rt>のたま</rt></ruby>ったこと。おまえは、あれさえ超越した存在だというのか！」"
translation = "「평행 세계 간의 이동은 불가능── 다름 아닌 여신이 말씀하신 것. 너는, 그것마저 초월한 존재라는 것이냐!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ──と言いたいところだけど、まあ細かい理屈なんて知らないわ。別に奇跡でも偶然でも、今私がここに立ってることだけが現実」"
translation = "「그래── 라고 말하고 싶지만, 뭐 자세한 이치 따윈 몰라. 별로 기적이라도 우연이라도, 지금 내가 여기에 서 있다는 것만이 현실.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ──ううん、魔王クロト。今度こそお願いするわ。リクリエから──アルタイルの世界を救って！」"
translation = "「아빠── 아니, 마왕 쿠로토. 이번에야말로 부탁할게. 리크리에로부터── 알타이르의 세계를 구해줘!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……俺はヴィーナスと、この世界を守るために戦う！」"
translation = "「아아…… 나는 비너스와, 이 세계를 지키기 위해 싸우겠다!」"

[[dialogue]]
speaker = "クロト"
original = "「我が魂とリンクせし大地の守護星よ──地脈を通じ、ここに始まりの兆しを灯せ」"
translation = "「나의 영혼과 링크된 대지의 수호성이여── 지맥을 통해, 여기에 시작의 징조를 밝혀라.」"

[[dialogue]]
speaker = "unk"
original = "母なる地球の胎動が凍てついた大森林を揺るがす。"
translation = "어머니인 지구의 태동이 얼어붙은 대산림을 뒤흔든다."

[[dialogue]]
speaker = "セイファート"
original = "「っ、なんという……！」"
translation = "「윽, 이 무슨……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「恐るべき闘気──ニャリオン、これは……！」"
translation = "「두려운 투기── 냐리온, 이것은……!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ──！\u3000紛れもない先代魔王と同等の……ニャ、それとも違うニャ……！」"
translation = "「냥──! 틀림없는 선대 마왕과 동등한…… 냥, 아니면 다른 거냥……!」"

[[dialogue]]
speaker = "unk"
original = "先代魔王は魔力と霊力を同時に操る無二の戦士だった。"
translation = "선대 마왕은 마력과 영력을 동시에 조종하는 유일무이한 전사였다."

[[dialogue]]
speaker = "unk"
original = "だが今の俺はそれに加えて、緋宮クロトとして培ってきた地球の星力が根底に渦巻いている。"
translation = "하지만 지금의 나는 거기에 더해, 히노미야 쿠로토로서 쌓아온 지구의 성력이 근저에 소용돌이치고 있다."

[[dialogue]]
speaker = "unk"
original = "どんな力であっても<ruby>併<rt>あわ</rt></ruby>せ呑む魔王の器は──たとえ相手が神殺しの騎士だとしても、負けはしない！"
translation = "어떤 힘이라도 함께 삼키는 마왕의 그릇은── 설령 상대가 신을 죽인 기사라고 할지라도, 지지 않는다!"

[[dialogue]]
speaker = "クロト"
original = "「妻を想い、世界すら飲み込もうとする──あんたの覚悟はよくわかった。だが、俺も……ここじゃないどこかの俺も、同じように譲れない覚悟でここまで来た」"
translation = "「아내를 생각하고, 세계조차 삼키려 하는── 당신의 각오는 잘 알았다. 하지만, 나도…… 여기가 아닌 어딘가의 나도, 똑같이 양보할 수 없는 각오로 여기까지 왔다.」"

[[dialogue]]
speaker = "クロト"
original = "「なら、後は根比べだ。たとえ同情はしても──この道だけは譲らない」"
translation = "「그렇다면, 이제는 끈기 싸움이다. 설령 동정은 하더라도── 이 길만은 양보하지 않아.」"

[[dialogue]]
speaker = "セイファート"
original = "「……<ruby>佳<rt>よ</rt></ruby>い<ruby>眼<rt>め</rt></ruby>だ。まるで、十数年の成長を経たような──いや、実際に経たのだろうな。娘という結晶を通じて」"
translation = "「……좋은 눈이다. 마치, 십수 년의 성장을 거친 듯한── 아니, 실제로 거쳤겠지. 딸이라는 결정체를 통해.」"

[[dialogue]]
speaker = "セイファート"
original = "「魔王の血統は……その名の通り魔王にも、はたまた英雄にもなりうる。──よく言ったものだ」"
translation = "「마왕의 혈통은…… 그 이름대로 마왕도, 아니면 영웅도 될 수 있다. ──잘 말한 것이다.」"

[[dialogue]]
speaker = "unk"
original = "もしかしたら別の世界じゃ、俺は魔王として<b>堕ちて</b>いたのかもしれない。"
translation = "어쩌면 다른 세계에서는, 나는 마왕으로서 <b>타락</b>했을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "だが、そうさせないために九浄ヴィーナスという存在はやってきた。なら親として、それに答えなくてどうするんだ。"
translation = "하지만, 그렇게 되지 않도록 쿠죠 비너스라는 존재는 찾아왔다. 그렇다면 부모로서, 그것에 답하지 않고 뭘 하겠는가."

[[dialogue]]
speaker = "セイファート"
original = "「ベガは滅んだ。デネブも秒読み。ここ、アルタイルの終焉さえ決せば、我が宿願は果たされる。邪魔立てはさせん──！」"
translation = "「베가는 멸망했다. 데네브도 초읽기. 여기, 알타이르의 종언마저 결정하면, 나의 숙원은 이루어진다. 방해는 시키지 않겠다──!」"

[[dialogue]]
speaker = "unk"
original = "膨れ上がっていく闇の霊力。"
translation = "부풀어 오르는 어둠의 영력."

[[dialogue]]
speaker = "unk"
original = "ここに、互いの持てるものすべてを賭した、英雄同士の死闘が幕を開ける。"
translation = "여기에, 서로가 가진 모든 것을 건, 영웅들 간의 사투가 막을 연다."

[[dialogue]]
speaker = "クロト"
original = "「いくぞセイファート──あなたの背中を今こそ超える！」"
translation = "「간다 세이퍼트── 당신의 등 뒤를 지금이야말로 넘어서겠다!」"

[[dialogue]]
speaker = "セイファート"
original = "「来い、緋宮クロト──総ての因果を、今ここに清算しよう！」"
translation = "「와라, 히노미야 쿠로토── 모든 인과를, 지금 여기에 청산하자!」"

