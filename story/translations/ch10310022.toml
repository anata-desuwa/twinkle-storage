[[dialogue]]
speaker = "unk"
original = "第２話,先輩と遊園地デート,P"
translation = "제2화, 선배와 유원지 데이트, P"

[[dialogue]]
speaker = "unk"
original = "恋人として付き合い始めて少し経った、とある休日。"
translation = "연인으로서 사귀기 시작하고 조금 지난 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "俺はアニマ先輩と遊園地へやって来ていた――"
translation = "나는 아니마 선배와 유원지에 와 있었다――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ほほう……！\u3000これが遊園地か……！」"
translation = "「호오……! 이것이 유원지인가……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000実際に来てみると、思っていたよりもワクワクするものだナ♪\u3000さて、会長、どこから回ろうカ？」"
translation = "「후히♪ 실제로 와보니 생각했던 것보다 두근거리는구나♪ 자, 회장, 어디부터 돌아볼까?」"

[[dialogue]]
speaker = "unk"
original = "聞けばアニマ先輩は、遊園地に来るのは今回が初めてだという。"
translation = "들어보니 아니마 선배는 유원지에 오는 것이 이번이 처음이라고 한다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女が最初に選んだのは――"
translation = "그런 그녀가 처음에 고른 것은――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「よし、会長。アニマは、ジェットコースターに決めたゾ♪」"
translation = "「좋아, 회장. 아니마는 제트 코스터로 정했단다♪」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ソワソワ……」"
translation = "「안절부절……」"

[[dialogue]]
speaker = "unk"
original = "そうして、ジェットコースターの待機列に並んでいる最中、何やら落ち着かない様子のアニマ先輩。"
translation = "그렇게 제트 코스터 대기 줄에 서 있는 도중, 왠지 안절부절못하는 모습의 아니마 선배."

[[dialogue]]
speaker = "unk"
original = "アニマ先輩、どうかしましたか？"
translation = "아니마 선배, 무슨 일 있나요?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ふぇっ！？\u3000ああ、いや、その……アニマも初めて来る場所だからナ、色々気になってしまうというか……」"
translation = "「훼!? 아아, 아니, 그게…… 아니마도 처음 오는 장소라 말이지, 이것저것 신경 쓰인달까……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――遊園地が初めてなのは意外だった……？」"
translation = "「――유원지가 처음인 건 의외였다……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「興味は以前からあったが、こういう場所は１人だとなかなか来ようと思わないダロウ？\u3000足を運ぶタイミングが無くてネ」"
translation = "「흥미는 예전부터 있었지만 이런 곳은 혼자서는 좀처럼 오려고 생각지 않잖니? 발걸음을 옮길 타이밍이 없어서 말이야」"

[[dialogue]]
speaker = "unk"
original = "それから、ジェットコースターに乗ることになり――"
translation = "그러고 나서 제트 코스터를 타게 되었고――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ふおおおぉぉぉっ！？\u3000アハハハッ♪\u3000すごい、すごいゾ！\u3000これが人間の生み出した『絶叫マシーン』というものか！」"
translation = "「후오오오오옷!? 아하하하♪ 대단해, 대단하다구! 이것이 인간이 만들어낸 『절규 머신』이라는 것인가!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「星騎士として、こういった激しく動き回る物は大したことナイと、甘く見ていたが、なるほど！\u3000ヒトを楽しませる為に特化すると、こういう乗り心地になるのか！\u3000面白イ♪」"
translation = "「성기사로서 이런 격렬하게 움직이는 물건은 대수롭지 않다고 얕보고 있었지만, 과연! 사람을 즐겁게 하기 위해 특화되니 이런 승차감이 되는 건가! 재밌구나♪」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「会長、閃いたゾ！\u3000リップルのリゾート結界にも、遊園地を作ってみるのはどうダ！？\u3000そこに、星騎士が楽しめるように特化した、スーパー絶叫マシーンを設置するんダ！」"
translation = "「회장, 번뜩였단다! 리플의 리조트 결계에도 유원지를 만들어보는 건 어때!? 거기에 성기사가 즐길 수 있도록 특화된 슈퍼 절규 머신을 설치하는 거야!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうすれば、通常の絶叫マシーンでは物足りないという星騎士たちも、ストレス解消できるに違いナイぃぃぃっ！」"
translation = "「그렇게 하면 일반적인 절규 머신으로는 부족하다는 성기사들도 스트레스 해소할 수 있음에 틀림없어어어엇!」"

[[dialogue]]
speaker = "unk"
original = "先輩！\u3000そんな喋ってると舌噛みますよ！？"
translation = "선배! 그렇게 말하다간 혀 깨물어요!?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒッ♪\u3000アハハハハハッ♪」"
translation = "「후히♪ 아하하하하하♪」"

[[dialogue]]
speaker = "unk"
original = "ジェットコースターを乗り終えた後、更にいくつかの絶叫マシーンを楽しんで、それからフードコートで休憩することになった。"
translation = "제트 코스터를 다 탄 뒤, 몇 가지 절규 머신을 더 즐기고 나서 푸드 코트에서 휴식을 취하게 되었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――ふぅ♪\u3000少し気分が落ち着いたゾ」"
translation = "「――후우♪ 조금 기분이 진정됐단다」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩、滅茶苦茶楽しそうでしたね"
translation = "아니마 선배, 엄청 즐거워 보이시네요"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ああ、想像以上に面白かったとも♪」"
translation = "「아아, 상상 이상으로 재미있었단다♪」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「知識だけではなく、実際に体験することが大事――という師の言葉を改めて思い出したヨ」"
translation = "「지식뿐만 아니라 실제로 체험하는 것이 중요하다――라는 스승의 말을 다시금 떠올렸어」"

[[dialogue]]
speaker = "unk"
original = "師匠？\u3000先輩の……？"
translation = "스승님? 선배의……?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ああ、アニマの錬金術の師匠ダ。そういえば、会長にはアニマの過去を話したことがなかったナ」"
translation = "「아아, 아니마의 연금술 스승님이란다. 그러고 보니 회장에게는 아니마의 과거를 이야기한 적이 없었구나」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマは、魔界の片田舎の生まれだったんだが……幸運なことに、故郷に有名な錬金術師が住んでいたんダ」"
translation = "「아니마는 마계의 어느 시골 태생이었는데…… 운 좋게도 고향에 유명한 연금술사가 살고 있었단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「アニマから見ても変わり者だったが、錬金術の腕前は素晴らしいものだっタ。まだ幼かったアニマもその技に魅せられて、弟子入りをしたんダ」"
translation = "「아니마가 보기에도 괴짜였지만 연금술 솜씨는 훌륭했어. 아직 어렸던 아니마도 그 기술에 매료되어 제자로 들어갔단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そうして錬金術を学ぶ中で、師匠からよく言われたのが、知識だけでなく体験を大事にせよ、ということだった。当時の幼いアニマは、その意味がよく分からずにいたが――」"
translation = "「그렇게 연금술을 배우는 중에 스승님에게 자주 들었던 말이, 지식뿐만 아니라 체험을 소중히 하라는 것이었지. 당시의 어린 아니마는 그 의미를 잘 모른 채 지냈지만――」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「実際に理解することになったのは、アニマが独り立ちをして、自分の工房を作り、１年間研究に没頭していた時のことダ」"
translation = "「실제로 이해하게 된 것은 아니마가 독립을 해서 자신의 공방을 만들고, 1년간 연구에 몰두하고 있었을 때의 일이야」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ある時から、閃きが極端に少なくなった。新しい発見というものができなくなっていったんダ」"
translation = "「어느 때부터인가 번뜩임이 극단적으로 적어졌어. 새로운 발견이라는 것을 할 수 없게 되어갔단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「冷静に考えれば、当たり前のコトだった。新しいものを生み出すには、新しい何かに触れる必要があるのダカラ」"
translation = "「냉정하게 생각하면 당연한 일이었지. 새로운 것을 만들어내려면 새로운 무언가에 접촉할 필요가 있으니까」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「つまりはそれが、知識だけではなく、体験をするというコト」"
translation = "「즉 그것이 지식뿐만 아니라 체험을 한다는 것」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「だから、アニマは工房を出て、１人旅に出た。そうして、人間界へ――新星学園へとやって来たんダ」"
translation = "「그래서 아니마는 공방을 나와 홀로 여행을 떠났어. 그렇게 인간계로―― 신성학원으로 오게 된 거란다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「その選択は正解だったヨ。人間界は、魔界にはない面白いものに溢れてイタ」"
translation = "「그 선택은 정답이었어. 인간계는 마계에는 없는 재미있는 것들로 넘쳐났지」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「リクリエの最前線に来たことで、世界を守るという、新たな目的意識もアニマの中に生まれタ。それから、同年代の友人や、何より――」"
translation = "「리크리에의 최전선에 온 것으로 세계를 지킨다는 새로운 목적의식도 아니마 안에 생겨났어. 그리고 또래 친구들이나, 무엇보다――」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「こうして、キミと出会うことができタ。おかげで、アニマは今まで考えもしなかった恋愛を体験することができてイル」"
translation = "「이렇게 너와 만날 수 있었지. 덕분에 아니마는 지금까지 생각지도 못했던 연애를 체험하고 있단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「新たな閃きに困らない、実に面白い毎日だヨ。フヒ♪」"
translation = "「새로운 번뜩임에 곤란할 일 없는, 실로 재미있는 매일이야. 후히♪」"

[[dialogue]]
speaker = "unk"
original = "沢山楽しみましょう"
translation = "많이 즐기기로 해요"

[[dialogue]]
speaker = "unk"
original = "なら、今日は初めての遊園地を"
translation = "그럼 오늘은 처음 온 유원지를"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ああ、そうだナ♪」"
translation = "「아아, 그렇구나♪」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たちは時間の許す限り遊園地の様々なアトラクションを体験して、帰路へと着いていた。"
translation = "그 후 우리는 시간이 허락하는 한 유원지의 다양한 어트랙션을 체험하고 귀로에 올랐다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ソワソワ……」"
translation = "「안절부절……」"

[[dialogue]]
speaker = "unk"
original = "ふと、アニマ先輩がまた落ち着かない様子になっていることに気づく。なんだかチラチラとこちらの様子を伺っているような……"
translation = "문득 아니마 선배가 다시 안절부절못하는 모습인 것을 깨닫는다. 왠지 힐끗힐끗 이쪽의 눈치를 살피는 듯한……"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩、何かありました？"
translation = "아니마 선배, 무슨 일 있어요?"

[[dialogue]]
speaker = "unk"
original = "俺が尋ねると、先輩は意を決したように口を開いて――"
translation = "내가 묻자 선배는 결심한 듯 입을 열어――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「えっと、その、ダ……会長」"
translation = "「저기, 그게 말이다…… 회장」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「帰り道の間、手を繋いでもいいダロウか……！？」"
translation = "「가는 길 동안 손을 잡아도 괜찮겠니……!?」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "에?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――ほ、本当はだナ……遊園地での待ち時間に、実験してみようと思っていたんダ」"
translation = "「――사실은 말이다…… 유원지 대기 시간에 실험해보려고 생각했었단다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「しかし、想像よりも人口密度が高くてナ。いざ試そうとしたら、なぜかとても恥ずかしい気持ちがしたんダ……」"
translation = "「하지만 상상보다 인구 밀도가 높아서 말이야. 막상 시도하려니 왠지 너무 부끄러운 기분이 들었어……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「おかしなものダ……アニマはこれまで、他人の目など気にしたことはなかっタ。いや、今も特に気にしていナイ」"
translation = "「이상한 일이야…… 아니마는 지금까지 타인의 시선 따위 신경 쓴 적 없었어. 아니, 지금도 딱히 신경 쓰지 않아」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「だが、アニマが他人から見て変なことをしていると、キミに思われることを避けたかったんダ……」"
translation = "「하지만 아니마가 남들 보기에 이상한 짓을 하고 있다고 네가 생각하는 건 피하고 싶었단다……」"

[[dialogue]]
speaker = "unk"
original = "何やら難しい話を始めてしまったアニマ先輩がおかしくて、つい笑ってしまった。"
translation = "왠지 어려운 이야기를 시작해버린 아니마 선배가 우스워서 그만 웃어버리고 말았다."

[[dialogue]]
speaker = "unk"
original = "だからあの時、ソワソワしていたんですね"
translation = "그래서 그때 안절부절못하고 있었던 거군요"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「わ、笑わなくてもいいダロウ？」"
translation = "「우, 웃지 않아도 되잖니?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――初々しいアニマが可愛くてつい？\u3000そ、そんな風に言われると、余計に恥ずかしいじゃナイか……」"
translation = "「――풋풋한 아니마가 귀여워서 그만? 그, 그렇게 말하면 더 부끄럽잖니……」"

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女の手を取り、握る。"
translation = "나는 그런 그녀의 손을 잡아 쥔다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker = "unk"
original = "次のデートでは、最初から繋ぎましょう"
translation = "다음 데이트에서는 처음부터 잡고 가요"

[[dialogue]]
speaker = "unk"
original = "恋人と手を繋ぎたいのは、変じゃないです"
translation = "연인과 손을 잡고 싶은 건 이상한 게 아니에요"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あ、ああ。ドキドキしそうだが……でも――」"
translation = "「아, 아아. 두근거릴 것 같지만…… 그래도――」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミとまた新しい体験ができるのは、楽しみダ♪\u3000フヒ♪」"
