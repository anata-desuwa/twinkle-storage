[[dialogue]]
speaker = "unk"
original = "第１話,魔女の記憶探し,P"
translation = "제1화, 마녀의 기억 찾기, P"

[[dialogue]]
speaker = "unk"
original = "先週はネビュラの一件で慌ただしい休日になってしまった。"
translation = "지난주는 네뷸라 사건으로 어수선한 휴일이 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "今日こそ気を取り直して休日を楽しみたいところだが……"
translation = "오늘이야말로 마음을 다잡고 휴일을 즐기고 싶은 참이지만……"

[[dialogue]]
speaker = "イニシュ"
original = "「奇遇ですね、魔王」"
translation = "「기우네요, 마왕」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ、会長さんだ！\u3000こんにちはー！」"
translation = "「아, 회장님이다! 안녕하세요!」"

[[dialogue]]
speaker = "unk"
original = "何してるんだ？"
translation = "뭐 하고 있어?"

[[dialogue]]
speaker = "イニシュ"
original = "「以前魔王に話した通り、私は長期間スリープ状態だったせいで記憶がありません」"
translation = "「이전에 마왕에게 말했듯이, 저는 장기간 슬립 상태였던 탓에 기억이 없습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「私は私のことがわかりません」"
translation = "「저는 저에 대해 모릅니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「だから私は私のことが知りたい。思い出したい」"
translation = "「그래서 저는 저에 대해 알고 싶어요. 떠올리고 싶습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「なので今日はアイリーンとラーメンを食べに来ました」"
translation = "「그래서 오늘은 아이린과 라멘을 먹으러 왔습니다」"

[[dialogue]]
speaker = "unk"
original = "（それはラーメンが食べたいだけでは？）"
translation = "(그건 그냥 라멘이 먹고 싶은 게 아닌지?)"

[[dialogue]]
speaker = "イニシュ"
original = "「本来なら謹慎期間のはずでしたが、セドナ長官によって短縮されました。その代わり──」"
translation = "「본래라면 근신 기간이어야 했지만, 세드나 장관님에 의해 단축되었습니다. 그 대신──」"

[[dialogue]]
speaker = "セドナ"
original = "「記憶を取り戻せ」"
translation = "「기억을 되찾아라」"

[[dialogue]]
speaker = "セドナ"
original = "「お前の失われた記憶には、我々魔女にとって重要な情報が眠っている可能性がある」"
translation = "「네 잃어버린 기억에는 우리 마녀에게 중요한 정보가 잠들어 있을 가능성이 있다」"

[[dialogue]]
speaker = "セドナ"
original = "「そのための行動はお前に任せる。基地を出ても構わんが、目立つ行動は慎め。いいな」"
translation = "「그를 위한 행동은 네게 맡기마. 기지를 나가도 좋지만, 눈에 띄는 행동은 삼가라. 알겠나」"

[[dialogue]]
speaker = "イニシュ"
original = "「──と言われました。ですので、これはセドナ長官の命令でもあるのです」"
translation = "「──라고 들었습니다. 그러니 이것은 세드나 장관님의 명령이기도 합니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「私は付き添いでーす。イニシュさんだけだとちょっと不安だからね」"
translation = "「저는 보호자예요. 이니슈 씨 혼자라면 좀 불안하니까요」"

[[dialogue]]
speaker = "アイリーン"
original = "「ねぇねぇ、今から行くのってどんなラーメン屋さん？」"
translation = "「저기 저기, 지금 가려는 곳은 어떤 라멘 가게야?」"

[[dialogue]]
speaker = "イニシュ"
original = "「とても美味な鶏白湯ラーメンを提供する店と聞いています」"
translation = "「매우 맛있는 토리파이탄 라멘을 제공하는 가게라고 들었습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「コンビニとコラボレーションしたカップ麺は私も食したことがあるので、店の味が気になっていたのですが……店先に何か書いてありますね」"
translation = "「편의점과 콜라보레이션한 컵라면은 저도 먹어본 적이 있어서 가게의 맛이 궁금했습니다만…… 가게 앞에 무언가 적혀 있네요」"

[[dialogue]]
speaker = "アイリーン"
original = "「なになに……？\u3000先月末日を以て、当店は移転しました──」"
translation = "「어디 어디……? 지난달 말일을 기해 본 점포는 이전했습니다──」"

[[dialogue]]
speaker = "アイリーン"
original = "「え～～～っ！？\u3000お店なくなっちゃったの～！？」"
translation = "「에～～～엣!? 가게가 없어져 버렸어!?」"

[[dialogue]]
speaker = "イニシュ"
original = "「残念ですが仕方ありません。日を改めましょう」"
translation = "「유감이지만 어쩔 수 없네요. 날을 다시 잡읍시다」"

[[dialogue]]
speaker = "イニシュ"
original = "「鶏白湯……ラーメン……」"
translation = "「토리파이탄…… 라멘……」"

[[dialogue]]
speaker = "unk"
original = "ここからならそんなに遠くないかも"
translation = "여기서라면 그렇게 멀지 않을지도 몰라"

[[dialogue]]
speaker = "イニシュ"
original = "「！\u3000本当ですか？」"
translation = "「! 정말입니까?」"

[[dialogue]]
speaker = "unk"
original = "俺たちは移転先を調べてそこに向かったのだが──"
translation = "우리들은 이전 장소를 조사해서 그곳으로 향했지만──"

[[dialogue]]
speaker = "アイリーン"
original = "「も～、けっこう遠いじゃん！\u3000もう足がクタクタだよー」"
translation = "「모～, 꽤 멀잖아! 벌써 다리가 후들거려요」"

[[dialogue]]
speaker = "イニシュ"
original = "「付き合わせてしまってすみません、アイリーン」"
translation = "「함께하게 해서 죄송합니다, 아이린」"

[[dialogue]]
speaker = "アイリーン"
original = "「ううん、イニシュさんのせいじゃないよ。私だってラーメン食べたかったし。でも……」"
translation = "「으응, 이니슈 씨 탓이 아니야. 나도 라멘 먹고 싶었으니까. 하지만……」"

[[dialogue]]
speaker = "イニシュ"
original = "「お店がありませんね」"
translation = "「가게가 없네요」"

[[dialogue]]
speaker = "unk"
original = "移転したばかりで地図アプリが間違ってるのかも"
translation = "막 이전한 참이라 지도 앱이 틀린 걸지도 몰라"

[[dialogue]]
speaker = "アイリーン"
original = "「え～っ！？\u3000じゃあやっぱりお店ないの！？」"
translation = "「에～엣!? 그럼 역시 가게 없는 거야!?」"

[[dialogue]]
speaker = "イニシュ"
original = "「いえ、この近くにはあるはずです。投稿された写真を頼りに探すしかありません」"
translation = "「아니요, 이 근처에는 있을 겁니다. 게시된 사진을 토대로 찾는 수밖에 없겠네요」"

[[dialogue]]
speaker = "アイリーン"
original = "「うぅ～っ、苦労した分、本当においしいラーメンじゃないと許さないんだからね！」"
translation = "「으으～, 고생한 만큼 정말 맛있는 라멘이 아니면 용서하지 않을 거니까!」"

[[dialogue]]
speaker = "アイリーン"
original = "「写真だとけっこうオシャレな感じだよね……。ねぇねぇ、イニシュさん。あれじゃない？」"
translation = "「사진 보면 꽤 세련된 느낌인데……. 저기 저기, 이니슈 씨. 저거 아니야?」"

[[dialogue]]
speaker = "イニシュ"
original = "「いえ、あれは喫茶店です」"
translation = "「아니요, 저건 찻집입니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「あれは？」"
translation = "「저건?」"

[[dialogue]]
speaker = "イニシュ"
original = "「あれはサロン──美容室のようです」"
translation = "「저건 살롱── 미용실인 것 같네요」"

[[dialogue]]
speaker = "アイリーン"
original = "「あんなにおいしそうな雰囲気なのに！？」"
translation = "「저렇게 맛있어 보이는 분위기인데!?」"

[[dialogue]]
speaker = "unk"
original = "向こうの看板は？"
translation = "저쪽 간판은?"

[[dialogue]]
speaker = "イニシュ"
original = "「<ruby>ＲＡＭＥＮ<rt>ラーメン</rt></ruby>\u3000<ruby>ＴＯＲＩＳＵＫＥ<rt>トリスケ</rt></ruby>……あれです！」"
translation = "「<ruby>RAMEN<rt>라멘</rt></ruby> <ruby>TORISUKE<rt>토리스케</rt></ruby>…… 저겁니다!」"

[[dialogue]]
speaker = "イニシュ"
original = "「鶏白湯ラーメン……凝縮された鶏の旨味がインパクトを与える、鮮烈な一杯でした」"
translation = "「토리파이탄 라멘…… 응축된 닭의 감칠맛이 임팩트를 주는 강렬한 한 그릇이었습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「お店に付くまでが大変だったけど、ほんとにおいしかった！」"
translation = "「가게에 도착하기까지 힘들었지만 정말 맛있었어!」"

[[dialogue]]
speaker = "アイリーン"
original = "「イニシュさん、ラーメンで何か思い出せた？」"
translation = "「이니슈 씨, 라멘으로 뭐 떠오른 거 있어?」"

[[dialogue]]
speaker = "イニシュ"
original = "「いえ、ラーメンに関連した記憶は思い出せませんでした」"
translation = "「아니요, 라멘과 관련된 기억은 떠올리지 못했습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「ですが──」"
translation = "「하지만──」"

[[dialogue]]
speaker = "アイリーン"
original = "「ですが？」"
translation = "「하지만?」"

[[dialogue]]
speaker = "イニシュ"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "アイリーン"
original = "「ですが何！？」"
translation = "「하지만 뭐!?」"

[[dialogue]]
speaker = "イニシュ"
original = "「すみません、言語化に時間がかかりました」"
translation = "「죄송합니다, 언어화하는 데 시간이 걸렸습니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「しかし……何と言っていいかわかりません。誰かとお店を探して彷徨った記憶が……あるような……」"
translation = "「하지만…… 뭐라고 해야 할지 모르겠네요. 누군가와 가게를 찾아 헤맸던 기억이…… 있는 듯한……」"

[[dialogue]]
speaker = "イニシュ"
original = "「それはとても些細なことのような……でもとても大事なことのような気もします」"
translation = "「그건 매우 사소한 일인 것 같은…… 하지만 매우 중요한 일인 것 같은 기분도 듭니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「さらに刺激があれば思い出せるかもしれません」"
translation = "「더 자극이 있다면 떠올릴 수 있을지도 모릅니다」"

[[dialogue]]
speaker = "イニシュ"
original = "「よろしければ魔王もまた協力していただけますか？」"
translation = "「괜찮으시다면 마왕도 다시 협력해 주시겠습니까?」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら喜んで"
translation = "그런 거라면 기꺼이"

[[dialogue]]
speaker = "イニシュ"
original = "「ありがとうございます。ではまたよろしくお願いします」"
translation = "「감사합니다. 그럼 또 잘 부탁드립니다」"

