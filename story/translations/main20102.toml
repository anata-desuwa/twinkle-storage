[[dialogue]]
speaker = "unk"
original = "第２話,終わらないリクリエ,B"
translation = "제2화, 끝나지 않는 리크리에"

[[dialogue]]
speaker = "unk"
original = "今日は、ここ最近のモンスターやアステラの発生に関するデータを星徒会で吟味していたのだが……"
translation = "오늘은 최근의 몬스터나 아스테라 발생에 관한 데이터를 성도회에서 검토하고 있었는데……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「流星群の前よりガクンと減ってるわね！\u3000このままゼロにしていくわよ！」"
translation = "「유성우 전보다 확 줄었네! 이대로 제로로 만들어 버리자구!」"

[[dialogue]]
speaker = "クロト"
original = "「いや、どうだろう。最近のモンスター発生率の横に並んだデータを見てくれ」"
translation = "「아니, 글쎄. 최근 몬스터 발생률 옆에 나열된 데이터를 좀 봐줘.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え？\u3000どれどれ……今は森羅暦３００２年で～……ん～……グニャグニャしたグラフばっかりでよくわかんないわ」"
translation = "「에? 어디 어디…… 지금은 삼라력 3002년이고~…… 음~…… 꼬불꼬불한 그래프뿐이라 잘 모르겠어.」"

[[dialogue]]
speaker = "unk"
original = "眉を吊り上げて資料とにらめっこするヴィーナス。"
translation = "눈썹을 치켜세우며 자료와 씨름하는 비너스."

[[dialogue]]
speaker = "unk"
original = "アナが横のグラフを指差しながら説明を始める。"
translation = "아나가 옆의 그래프를 가리키며 설명을 시작한다."

[[dialogue]]
speaker = "アナ"
original = "「確かにフィヴォス流星群の前を基準にすれば、モンスターもアステラも発生数は圧倒的に減少しています。それは私たちの感覚とも一致している」"
translation = "「확실히 피보스 유성우 전을 기준으로 하면, 몬스터도 아스테라도 발생 수는 압도적으로 감소했습니다. 그것은 저희의 감각과도 일치합니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。流星市国に住んでて、こんなにモンスターが出ないのって初めてだもんね」"
translation = "「응. 유성시국에 살면서 이렇게 몬스터가 안 나오는 건 처음인걸.」"

[[dialogue]]
speaker = "unk"
original = "そう。流星群の前と後のデータだけ見れば、ヴィーナスの言う通り、モンスターもアステラも減っている。"
translation = "그렇다. 유성우 전과 후의 데이터만 보면 비너스의 말대로 몬스터도 아스테라도 줄어들었다."

[[dialogue]]
speaker = "unk"
original = "だが……"
translation = "하지만……"

[[dialogue]]
speaker = "サーシャ"
original = "「資料によると、今の出現ペースは森羅歴２９５０年代に近いみたいね～。でも大きな戦いの直後なんだから、もっとゼロに近づいてもいいはずよね？」"
translation = "「자료에 따르면, 지금의 출현 페이스는 삼라력 2950년대에 가까운 것 같네~. 하지만 큰 싸움 직후니까 좀 더 제로에 가까워져도 좋을 텐데 말이야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「つまり？」"
translation = "「그 말은?」"

[[dialogue]]
speaker = "アナ"
original = "「現時点ではリクリエが収束したと見るのは早計かと」"
translation = "「현시점에서 리크리에가 수습되었다고 보는 것은 시기상조인 듯합니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え～っ！？\u3000ギエルだってやっつけたじゃない！」"
translation = "「에~!? 기엘도 해치웠잖아!」"

[[dialogue]]
speaker = "unk"
original = "そもそも、俺たちの世代が物心ついた頃からモンスターは多かったんだ。"
translation = "애초에 우리 세대가 철들 무렵부터 몬스터는 많았다."

[[dialogue]]
speaker = "unk"
original = "今の状態はそこから減っただけで、森羅歴全体で見ればそれなりの頻度だった。"
translation = "지금 상태는 거기서 줄어든 것뿐이지, 삼라력 전체로 보면 상당한 빈도였다."

[[dialogue]]
speaker = "アナ"
original = "「中長期的に観測していけば、発生率が低下していく可能性もありますが……今現れているモンスターは余波なのか、それとも本波がまた来るのか、それはわかりません」"
translation = "「중장기적으로 관측해 나가면 발생률이 저하될 가능성도 있습니다만…… 지금 나타나는 몬스터가 여파인지, 아니면 본파가 다시 올 것인지는 알 수 없습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「アポロが現れた頃ほどじゃないとしても、警戒していかないといけないな」"
translation = "「아폴로가 나타났을 때 정도는 아니더라도, 경계해야겠어.」"

[[dialogue]]
speaker = "マトイ"
original = "「うーん、スッパリ何も起きなくなるのかと思ったけど……そううまくはいかないのね……」"
translation = "「으음, 깔끔하게 아무 일도 안 일어나게 될 줄 알았는데…… 그렇게 쉽게 되지는 않네……」"

[[dialogue]]
speaker = "アナ"
original = "「魔王ラクシスが一度リクリエを退けたのが約３０００年前。それだけでも例のないことでしたが、会長が再びリクリエを阻止したのもまた異例」"
translation = "「마왕 락시스가 한 번 리크리에를 물리친 것이 약 3000년 전. 그것만으로도 유례없는 일이었지만, 회장님이 다시 리크리에를 저지한 것 또한 이례적입니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「結局、どうなるかは誰にもわからないってことね～」"
translation = "「결국 어떻게 될지는 아무도 모른다는 거네~」"

[[dialogue]]
speaker = "unk"
original = "モンスターが現れるということは、リクリエはまだ続くということだろう。"
translation = "몬스터가 나타난다는 것은 리크리에가 아직 계속된다는 뜻이리라."

[[dialogue]]
speaker = "unk"
original = "あれを最後にできなかったのは……率直に言って悔しい。"
translation = "그것을 마지막으로 만들지 못한 것은…… 솔직히 말해 분하다."

[[dialogue]]
speaker = "unk"
original = "だが嘆いていても仕方ない。俺たちが星騎士である限り、できることをするだけだ。"
translation = "하지만 한탄하고 있어도 소용없다. 우리가 성기사인 이상, 할 수 있는 일을 할 뿐이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふん。リクリエなら、クロトが何度だってぶっ飛ばしてくれるわ！\u3000ね？」"
translation = "「흥. 리크리에라면 쿠로토가 몇 번이고 날려버려 줄 거야! 그치?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、俺の目の<ruby>緋<rt>あか</rt></ruby>いうちは好きにはさせない。星徒会長として、魔王としてな」"
translation = "「그래, 내 눈이 붉은 동안에는 제멋대로 하게 두지 않아. 성도회장으로서, 마왕으로서 말이지.」"

[[dialogue]]
speaker = "マトイ"
original = "「でも次のリクリエがあるとしたら、また３０００年後でしょ？\u3000３０００年後って流星市国も新星学園もどうなってるんだろ……？」"
translation = "「하지만 다음 리크리에가 있다면 또 3000년 뒤잖아? 3000년 뒤면 유성시국도 신성학원도 어떻게 되어 있을까……?」"

[[dialogue]]
speaker = "アナ"
original = "「いえ、３０００年後とは限りません。１０００年後か、１００年後か……それとも１０年後かもしれません」"
translation = "「아니요, 3000년 뒤라고 단정할 수 없습니다. 1000년 뒤일지, 100년 뒤일지…… 아니면 10년 뒤일지도 모릅니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、そっか……そういう可能性もあるんだ……」"
translation = "「아, 그렇구나…… 그런 가능성도 있구나……」"

[[dialogue]]
speaker = "unk"
original = "３０００年前にラクシスがリクリエを退けた時よりも、今回のリクリエは強力になっていたと聞く。"
translation = "3000년 전에 락시스가 리크리에를 물리쳤을 때보다 이번 리크리에는 더욱 강력해졌다고 들었다."

[[dialogue]]
speaker = "unk"
original = "その時代その時代で星騎士が勝ってくれればいいが、退ける度にリクリエが激しさを増すとすれば、不安にならざるを得ない。"
translation = "그 시대 그 시대마다 성기사가 이겨주면 좋겠지만, 물리칠 때마다 리크리에가 격렬해진다면 불안해질 수밖에 없다."

[[dialogue]]
speaker = "アナ"
original = "「またリクリエが起こる可能性は十分にあります。警戒しておくべきでしょう」"
translation = "「다시 리크리에가 일어날 가능성은 충분히 있습니다. 경계해 두어야 하겠죠.」"

[[dialogue]]
speaker = "マトイ"
original = "「そうね。それが星徒会の役目なんだから」"
translation = "「그렇네. 그게 성도회의 역할이니까.」"

[[dialogue]]
speaker = "unk"
original = "リクリエがもう来ないと証拠付けるデータはない。現在の状況を見れば、またリクリエが発生しても不思議じゃないだろう。"
translation = "리크리에가 이제 오지 않는다고 증명할 데이터는 없다. 현재 상황을 보면 다시 리크리에가 발생해도 이상하지 않을 것이다."

[[dialogue]]
speaker = "unk"
original = "なら──"
translation = "그렇다면──"

[[dialogue]]
speaker = "クロト"
original = "「……なぁ。リクリエを完全に止めることってできないんだろうか？」"
translation = "「……저기. 리크리에를 완전히 멈추는 건 불가능한 걸까?」"

[[dialogue]]
speaker = "アナ"
original = "「完全に止める……ですか」"
translation = "「완전히 멈춘다…… 말인가요.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。マグダレナさんが言っていたことはみんなにも共有したけど……」"
translation = "「그래. 막달레나 씨가 했던 말은 모두에게도 공유했지만……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええ、いかにも。しかしリクリエという機構に善しも悪しきもありません」"
translation = "「네, 그렇고말고요. 하지만 리크리에라는 기구에 선악은 없습니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ただ世界そのものがより良く発展するのを求めて、新陳代謝のごとく終焉と再誕を繰り返す。それだけです」"
translation = "「그저 세계 그 자체가 보다 좋게 발전하기를 바라며, 신진대사처럼 종언과 재탄생을 반복할 뿐. 그것뿐입니다.」"

[[dialogue]]
speaker = "unk"
original = "リクリエの本質がマグダレナさんの言った通りなら、いくらモンスターを倒そうが、使徒を止めようが、リクリエに終わりはない。"
translation = "리크리에의 본질이 막달레나 씨가 말한 대로라면, 아무리 몬스터를 쓰러뜨리고 사도를 막아도 리크리에에 끝은 없다."

[[dialogue]]
speaker = "unk"
original = "<ruby>再創世<rt>リクリエ</rt></ruby>こそが世界の意志で、むしろ邪魔しているのは俺たちなんだから。"
translation = "재창생야말로 세계의 의지이고, 오히려 방해하고 있는 건 우리들이니까."

[[dialogue]]
speaker = "クロト"
original = "「リクリエは世界の新陳代謝……それが本当なら、その機構を止めない限り、リクリエは永遠に続く」"
translation = "「리크리에는 세계의 신진대사…… 그것이 정말이라면 그 기구를 멈추지 않는 한 리크리에는 영원히 계속돼.」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちがしていることがただの対処療法だとすれば、リクリエを止めるにはどうすればいいんだ？\u3000そもそも、今でもリクリエについてはわからないことばかりだ」"
translation = "「우리가 하고 있는 것이 그저 대증요법이라면, 리크리에를 멈추려면 어떻게 해야 하지? 애초에 지금도 리크리에에 대해서는 모르는 것투성이야.」"

[[dialogue]]
speaker = "マトイ"
original = "「うーん……２度もリクリエを止めたのに、全然わからないのはもどかしいなぁ……」"
translation = "「으음…… 두 번이나 리크리에를 막았는데도 전혀 모른다는 건 답답하네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わからなければ調べればいいのよ！\u3000私たちはそうしてきたでしょ？」"
translation = "「모르면 조사하면 되는 거야! 우리는 그렇게 해왔잖아?」"

[[dialogue]]
speaker = "クロト"
original = "「……そうだな。そのためにフィーニスの塔に登って……守護天使に出会って、リクリエの真相もそこで知った。きっとどこかに手がかりがあるはずだ」"
translation = "「……그렇지. 그러기 위해 피니스의 탑에 올랐고…… 수호천사를 만나서 리크리에의 진상도 거기서 알게 됐어. 분명 어딘가에 단서가 있을 거야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「リクリエはなくなってないとしても、世界の破滅は食い止めたわ。調べものをする時間くらいはあるわよ～」"
translation = "「리크리에가 사라지지 않았다고 해도, 세계의 파멸은 막아냈어. 조사할 시간 정도는 있다구~」"

[[dialogue]]
speaker = "クロト"
original = "「はい。焦らずにいきましょう」"
translation = "「네. 서두르지 말고 가요.」"

[[dialogue]]
speaker = "unk"
original = "時間は無限ではないが、猶予はある。"
translation = "시간은 무한하지 않지만 유예는 있다."

[[dialogue]]
speaker = "unk"
original = "その間にできることがあるはず──"
translation = "그동안 할 수 있는 일이 있을 터──"

[[dialogue]]
speaker = "unk"
original = "と考えたところで、モンスターの出現を知らせる警報が鳴った。"
translation = "라고 생각하던 찰나, 몬스터의 출현을 알리는 경보가 울렸다."

[[dialogue]]
speaker = "クロト"
original = "「何はともあれ、まずはモンスターを倒さないとな。星徒会、出撃だ！」"
translation = "「어찌 됐든 우선은 몬스터를 쓰러뜨려야겠지. 성도회, 출격이다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ！」"
translation = "「응!」"

