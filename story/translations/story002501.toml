[[dialogue]]
speaker = "unk"
original = "リクリエ──この未曽有の危機は、星騎士たちの学園にも大きな打撃を残した。"
translation = "리크리에── 이 전대미문의 위기는 성기사들의 학원에도 큰 타격을 남겼다."

[[dialogue]]
speaker = "unk"
original = "その内の最も大きな痛手のひとつが、英雄ジェラルド・セイファートを失ったことだった。"
translation = "그중 가장 뼈아픈 타격 중 하나가 영웅 제럴드 세이파트를 잃은 것이었다."

[[dialogue]]
speaker = "unk"
original = "新星学園の学園長でもあった彼は、戦士としてだけでなく、指導者としても重要な役割を果たしていたからだ。"
translation = "신성학원의 학원장이기도 했던 그는 전사로서뿐만 아니라 지도자로서도 중요한 역할을 하고 있었기 때문이다."

[[dialogue]]
speaker = "unk"
original = "リクリエ後もモンスターの出現は収まらず、早急に指導者を見出だす必要がある。"
translation = "리크리에 후에도 몬스터의 출현은 멈추지 않았고, 조속히 지도자를 찾아낼 필요가 있었다."

[[dialogue]]
speaker = "unk"
original = "理事長の九浄ヘレナは、差し当たり流星学園の学園長である白夜院ラティエに、新星学園の学園長を一時的に兼任するよう依頼した。"
translation = "이사장인 쿠죠 헬레나는 우선 유성학원의 학원장인 백야원 라티에에게 신성학원의 학원장을 일시적으로 겸임하도록 의뢰했다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「──という経緯は、あなたも良く知っている通りよ」"
translation = "「──라는 경위는 당신도 잘 알고 있는 대로야」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「元々あの人は、気付いたら仕事を放り出して姿を消してしまう自由人……」"
translation = "「원래 그 사람은 정신 차려 보면 일을 팽개치고 자취를 감춰버리는 자유인……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「学園長を兼任すれば責任感も芽生えると思ったのだけど……考えが甘かったわね。今も行方をくらませて、何処をさまよっているのやら」"
translation = "「학원장을 겸임하면 책임감도 싹틀 거라 생각했는데…… 생각이 짧았어. 지금도 행방을 감추고 어디를 헤매고 있는지 원」"

[[dialogue]]
speaker = "unk"
original = "俺に出来る仕事があれば……"
translation = "내가 할 수 있는 일이 있다면……"

[[dialogue]]
speaker = "エスメラルダ"
original = "「気持ちは有難いわ。けれど本来ラティエ学園長の仕事であるものを、あなたに負わせるのは違うでしょう？」"
translation = "「마음은 고마워. 하지만 본래 라티에 학원장의 업무인 것을 당신에게 지우는 건 아니잖아?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「どうにか学園長に自覚を持って職務に当たってもらいたいものだけど……」"
translation = "「어떻게든 학원장이 자각을 갖고 직무에 임해주길 바라는데……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「それに……学園長には私の研究に協力をお願いしているのよね」"
translation = "「게다가…… 학원장에게는 내 연구에 협력을 부탁하고 있거든」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「だから私個人としても、何とかして学園長を捕まえなくてはならないの」"
translation = "「그래서 나 개인으로서도 어떻게든 학원장을 붙잡아야만 해」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「でも逃げられてばかりで、最近は全くデータが取れていないのよね……はぁ……」"
translation = "「하지만 도망치기만 해서 최근에는 전혀 데이터를 못 따고 있단 말이지…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "と……エスメラルダ先生がわざわざ星徒会室までやってきて、そんな愚痴をこぼしていった。"
translation = "라고…… 에스메랄다 선생님이 일부러 성도회실까지 찾아와 그런 푸념을 늘어놓고 갔다."

[[dialogue]]
speaker = "unk"
original = "その後、新星学園は十六夜シノという学園長を迎え入れることになるのだが、それよりも少しだけ前の話──"
translation = "그 후, 신성학원은 이자요이 시노라는 학원장을 맞이하게 되지만, 그보다 조금 전의 이야기──"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんに呼び出され九浄家に向かうと、そこで一緒に待っていたのはエスメラルダ先生だった。"
translation = "헬레나짱에게 불려가 쿠죠 가문으로 향하자, 그곳에서 함께 기다리고 있던 건 에스메랄다 선생님이었다."

[[dialogue]]
speaker = "unk"
original = "何故エスメラルダ先生が？\u3000と、その疑問を口にする前に、ヘレナちゃんが俺を呼んだ理由を話し始めた。"
translation = "어째서 에스메랄다 선생님이? 라고 그 의문을 입에 담기도 전에 헬레나짱이 나를 부른 이유를 말하기 시작했다."

[[dialogue]]
speaker = "ヘレナ"
original = "「──我が九浄家は『五名門』の中でも、特に『人材』の分野において重要な役割を担っている」"
translation = "「──우리 쿠죠 가문은 『오명문』 중에서도 특히 『인재』 분야에 있어 중요한 역할을 맡고 있다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ひと口に人材と言っても意味は広いが、『求められた人材を紹介する』といった言葉通りの相談を受けることもある」"
translation = "「인재라고 해도 의미는 넓지만, 『필요한 인재를 소개한다』는 말 그대로의 상담을 받는 경우도 있지」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ところで……貴殿は桜十路家の経営する遊園地に、新たなプールエリアが拡張されるという話はご存知かな？」"
translation = "「그건 그렇고…… 귀공은 사쿠라코지 가문이 경영하는 유원지에 새로운 풀장 구역이 확장된다는 이야기는 알고 있나?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それが近日、いよいよ完成する。初日の入園チケットは既に売り切れてしまって、もう手に入らないほどの人気ぶりだ」"
translation = "「그것이 조만간 드디어 완성된다. 첫날 입장권은 이미 매진되어 더는 구할 수 없을 정도로 인기라더군」"

[[dialogue]]
speaker = "ヘレナ"
original = "「が……そんなプレミア付きの特別招待チケットがここに２枚ある」"
translation = "「하지만…… 그런 프리미엄이 붙은 특별 초대 티켓이 여기 두 장 있다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「貴殿にはこのチケットで、とある女性を誘ってプールデートを楽しんできて欲しい」"
translation = "「귀공은 이 티켓으로 어떤 여성을 유혹해 풀장 데이트를 즐기고 와줬으면 한다」"

[[dialogue]]
speaker = "unk"
original = "というのは誰でしょうか？"
translation = "그 여성이란 게 누구인가요?"

[[dialogue]]
speaker = "unk"
original = "……とある女性？"
translation = "……어떤 여성요?"

[[dialogue]]
speaker = "ヘレナ"
original = "「……<ruby>白夜院<rt>びゃくやいん</rt></ruby>ラティエ」"
translation = "「……백야원 라티에」"

[[dialogue]]
speaker = "ヘレナ"
original = "「このチケットは桜十路家が是非にと送ってきたものでな。つまらない人材を派遣したのでは九浄家の沽券に関わるというものだ」"
translation = "「이 티켓은 사쿠라코지 가문에서 부디 써달라며 보내온 것이다. 보잘것없는 인재를 파견했다가는 쿠죠 가문의 체면이 깎이는 법이지」"

[[dialogue]]
speaker = "ヘレナ"
original = "「その点、<ruby>緋宮<rt>ひのみや</rt></ruby>クロトに白夜院ラティエという組み合わせはとても面白いであろう？」"
translation = "「그런 점에서 <u>히노미야</u> 쿠로토와 백야원 라티에라는 조합은 무척 흥미롭지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "面白いかどうか以前に、そもそもそれは人材派遣なのか？\u3000という疑問が浮かぶ。"
translation = "흥미롭고 말고를 떠나서 애초에 그게 인재 파견인가? 하는 의문이 떠오른다."

[[dialogue]]
speaker = "unk"
original = "戸惑う俺を楽しそうに見やりながら、ヘレナちゃんは言葉を続けた。"
translation = "당황하는 나를 즐거운 듯 바라보며 헬레나짱은 말을 이었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「とまあ、それは表向きの理由で、ここからが本題だ」"
translation = "「뭐, 방금 건 표면상의 이유고 여기서부터가 본론이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「白夜院ラティエという人選は、とある相談を受けてのことでもある──そうだな、エスメラルダ」"
translation = "「백야원 라티에라는 인선은 어떤 상담을 받고 결정한 것이기도 하지── 그렇군, 에스메랄다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「はい……。会長さんには散々愚痴っていたのでご存知だと思いますが、相変わらずあの人の放浪癖が直らなくて」"
translation = "「네……. 회장님께는 워낙 푸념을 많이 해서 알고 계시겠지만, 여전히 그 사람의 방랑벽이 낫질 않아서요」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「学園長としての職務も滞らせており、私もフィオナ星徒会長もほとほと困り果てていたの」"
translation = "「학원장으로서의 직무도 지체되고 있어 저도 피오나 성도회장님도 아주 골머리를 썩고 있었거든요」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「それで何か良い策は無いかと理事長にご相談したところ、全面的に協力頂けるという話になって……」"
translation = "「그래서 뭔가 좋은 책략이 없을까 이사장님께 상담드렸더니 전면적으로 협력해 주시겠다는 이야기가 돼서……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「その通りだ。あの放蕩者にはそろそろ灸を据える必要があると思っていたのだ」"
translation = "「그렇다. 저 방탕자에게는 슬슬 따끔한 맛을 보여줄 필요가 있다고 생각하던 참이었다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「奴とは少々確執があってな……奴め、私の経営するカジノを派手に荒らしていったことがある」"
translation = "「그자와는 약간의 확집이 있어서 말이지…… 그놈, 내가 경영하는 카지노를 요란하게 털어간 적이 있다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「常識外れの幸運で勝ちまくり、一時、我がカジノはあわや閉店というところまで追い込まれてしまった」"
translation = "「상식 밖의 행운으로 연승을 거둬 일시적으로 우리 카지노가 하마터면 폐업 위기까지 몰렸었지」"

[[dialogue]]
speaker = "ヘレナ"
original = "「申し訳なさそうな顔のひとつでもすれば可愛げがあるものの、いつもの涼し気な顔を崩さぬのだから憎らしいにも程がある！」"
translation = "「미안해하는 기색이라도 보이면 귀엽기라도 하련만, 언제나처럼 태연한 얼굴을 무너뜨리지 않으니 얄밉기 짝이 없다!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふっふっふ……この恨み、晴らさずにおくべきか、だな」"
translation = "「훗훗훗…… 이 원한, 갚아주지 않을 수 없지」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「とまあ復讐に燃える理事長の協力を得て、学園長の矯正計画を始動することになったのよ」"
translation = "「뭐 그렇게 복수심에 불타는 이사장님의 협력을 얻어 학원장의 교정 계획을 시동하게 된 거야」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ですが理事長、学園長は会長さんの誘いに乗ってくれるでしょうか？」"
translation = "「하지만 이사장님, 학원장이 회장님의 유혹에 넘어와 줄까요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「なぁに、そこは星徒会長たる貴殿の腕の見せ所ではないか」"
translation = "「뭐야, 그건 성도회장인 귀공의 솜씨를 보여줄 대목이 아닌가」"

[[dialogue]]
speaker = "ヘレナ"
original = "「これまで幾人もの女性をたらしこんできた貴殿だ、たとえ相手が学園長であっても上手くやるのではないかな？」"
translation = "「지금까지 수많은 여성을 홀려온 귀공이니, 설령 상대가 학원장이라 해도 잘해내지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "そんなことしてませんから！"
translation = "그런 적 없거든요!"

[[dialogue]]
speaker = "unk"
original = "俺ってそんな風に見られてたの！？"
translation = "제가 그렇게 보였던 건가요!?"

[[dialogue]]
speaker = "ヘレナ"
original = "「まあまあ、私も無策でこんな事を頼もうとは思っていない。これを貴殿に渡しておこう」"
translation = "「자자, 나도 대책 없이 이런 일을 부탁하려는 건 아니다. 이것을 귀공에게 넘겨주지」"

[[dialogue]]
speaker = "ヘレナ"
original = "「無論、これはただの水着ではないぞ。新たに開発された水着型の人工戦闘服だ」"
translation = "「물론 이건 그냥 수영복이 아니다. 새로 개발된 수영복형 인공 전투복이다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「これをプレゼントすれば、奴をプールに誘う口実にもなろう」"
translation = "「이것을 선물하면 그자를 풀장으로 불러낼 구실도 되겠지」"

[[dialogue]]
speaker = "unk"
original = "それを口実にデートに誘うって……"
translation = "그걸 구실로 데이트를 신청하라니……"

[[dialogue]]
speaker = "unk"
original = "水着をプレゼントって……"
translation = "수영복을 선물이라니……"

[[dialogue]]
speaker = "エスメラルダ"
original = "「確かにこの水着、布面積も少なくて……これをプレゼントしてデートに誘うのは、ちょっと気持ち悪いかも……」"
translation = "「확실히 이 수영복, 천 면적도 적어서…… 이걸 선물하며 데이트 신청하는 건 좀 기분 나쁠지도……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それを言うなら、唐突に自分の通う学園の学園長をデートに誘う男はどうなのだ？」"
translation = "「그렇게 말한다면 갑작스럽게 자기가 다니는 학원의 학원장을 데이트 신청하는 남자는 어떤가?」"

[[dialogue]]
speaker = "unk"
original = "素直に事情を話してはダメなんですか？"
translation = "솔직하게 사정을 이야기하면 안 되는 건가요?"

[[dialogue]]
speaker = "unk"
original = "そもそも無理があるってことですよね！"
translation = "애초에 무리가 있다는 소리죠!"

[[dialogue]]
speaker = "エスメラルダ"
original = "「真っ向から苦言を呈したところで聞き流されるに決まってるじゃない」"
translation = "「정면에서 쓴소리해봤자 귓등으로 흘려들을 게 뻔하잖아」"

[[dialogue]]
speaker = "ヘレナ"
original = "「だから貴殿に頼むのだ。ラティエに気付かれぬよう誘い出し、桜十路家のプールで遊んできて欲しい」"
translation = "「그러니까 귀공에게 부탁하는 거다. 라티에가 눈치채지 못하게 유인해서 사쿠라코지 가문의 풀장에서 놀다 오도록」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「心配しないで。当日は私がバックアップにつくわ」"
translation = "「걱정 마. 당일에는 내가 백업할 테니까」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「会長さんの後ろに隠れてついていき、いざという時には気付かれないようにサポートします」"
translation = "「회장님 뒤에 숨어서 따라가며 만약의 상황에는 들키지 않게 서포트할게요」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「上手くいけば学園長の星力のデータも取ることが出来て一石二鳥よ♪」"
translation = "「잘되면 학원장의 성력 데이터도 딸 수 있어서 일석이조야♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「あやつの星力は他の者にない特別な力を秘めているからな」"
translation = "「그놈의 성력은 다른 자들에게 없는 특별한 힘을 숨기고 있으니까」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「会長さんは学園長を誘導して、出来るだけ人工戦闘服の性能を引き出すような立ち回りをお願いね」"
translation = "「회장님은 학원장을 유도해서 가능한 한 인공 전투복의 성능을 끌어내는 행동을 부탁해」"

[[dialogue]]
speaker = "unk"
original = "しれっと要求レベルが上がってる！？"
translation = "슬그머니 요구 레벨이 올라갔어!?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「大丈夫、会長さんならできるわ！」"
translation = "「괜찮아, 회장님이라면 할 수 있어!」"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生の目はすでに、周りの物が何も映らない研究者のそれになっていた。"
translation = "에스메랄다 선생님의 눈은 이미 주변 사물이 아무것도 비치지 않는 연구자의 그것이 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "２人の圧に屈して、結局、俺はこの頼みを承諾してしまう。"
translation = "두 사람의 압박에 굴복해 결국 나는 이 부탁을 수락하고 만다."

[[dialogue]]
speaker = "unk"
original = "こうして俺は、なぜか学園長を誘って桜十路家のプールに行くことになったのだった。"
translation = "이렇게 해서 나는 왠지 학원장을 유혹해 사쿠라코지 가문의 풀장에 가게 된 것이었다."

