[[dialogue]]
speaker = "unk"
original = "第１３話,在りし日の記憶,B"
translation = "제13화, 지난날의 기억, B"

[[dialogue]]
speaker = "unk"
original = "その後もガーディアンたちと交戦しつつフロアを昇っていく俺たち。"
translation = "그 후로도 가디언들과 교전하며 플로어를 올라가는 우리들."

[[dialogue]]
speaker = "unk"
original = "もう十以上の階を踏破しただろうか。"
translation = "벌써 열 개 이상의 층을 돌파했을까."

[[dialogue]]
speaker = "unk"
original = "そんな調子で進行していると、ようやく少し開けた地点に出た。"
translation = "그런 식으로 진행하다가, 드디어 조금 트인 지점에 다다랐다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふう──けっこう昇ってきたわね。相変わらず景色は代わり映えしないけど」"
translation = "「휴──꽤 올라왔네. 변함없이 풍경은 달라지지 않지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ガーディアンも大量に倒しちゃったけどな……」"
translation = "「가디언도 대량으로 쓰러뜨렸지만 말이야……」"

[[dialogue]]
speaker = "unk"
original = "暴走状態にあるとはいえ、女神が造ったものを打ち壊していくのにいい気はしない。"
translation = "폭주 상태라고는 해도, 여신이 만든 것을 부숴 나가는 것이 기분 좋을 리 없다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、その暴走の原因もこの先にあると考えるべきか……。"
translation = "그렇다고는 해도, 그 폭주의 원인도 이 앞에 있다고 생각해야 할까……."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長は……星騎士になってまだ１週間なんですよね。とてもそうは思えない戦闘力でした」"
translation = "「히노미야 회장님은…… 성기사가 된 지 아직 일주일밖에 안 되셨죠. 도저히 그렇게는 생각되지 않는 전투력이었습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。でも、会長になった以上は甘えたことも言ってられないな」"
translation = "「고마워. 하지만, 회장이 된 이상은 어리광 부릴 수도 없지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まだまだ！\u3000クロトの実力はこんなものじゃないのよ！\u3000魔王モードに入ったクロトは私を圧倒するくらい強いんだから！」"
translation = "「아직 멀었어! 쿠로토의 실력은 이 정도가 아니라고! 마왕 모드에 들어간 쿠로토는 나를 압도할 정도로 강하니까!」"

[[dialogue]]
speaker = "unk"
original = "自分じゃなくて俺の強さを誇ろうとするヴィーナスが、無性に無邪気で可愛く見えた。"
translation = "자신이 아닌 나의 강함을 자랑하려는 비너스가, 왠지 모르게 천진난만하고 귀엽게 보였다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「魔王モード……ですか。ふふ──でも、それだと悪者になってしまいませんか？」"
translation = "「마왕 모드…… 말인가요. 후후──하지만, 그러면 악당이 되어 버리지 않나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もそう言ってるんだが……」"
translation = "「나도 그렇게 말하고 있는데……」"

[[dialogue]]
speaker = "unk"
original = "魔王はかつて世界を蹂躙した絶対悪。"
translation = "마왕은 과거 세계를 유린했던 절대 악."

[[dialogue]]
speaker = "unk"
original = "それが、万人の認めるところの常識で──"
translation = "그것이, 만인이 인정하는 상식이며──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありえないわ。魔王は三界の覇者にして、この世界を救う英雄だもの。クロトは間違いなくその血を継ぐ存在よ！」"
translation = "「말도 안 돼. 마왕은 삼계의 패자이자, 이 세계를 구할 영웅인걸. 쿠로토는 틀림없이 그 피를 잇는 존재야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その理由は？」"
translation = "「그 이유는?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わすれた！」"
translation = "「까먹었어!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "またヴィーナスの根拠なき主張が始まった。"
translation = "또 비너스의 근거 없는 주장이 시작되었다."

[[dialogue]]
speaker = "unk"
original = "フィオナも面食らってしまっている。"
translation = "피오나도 당황한 표정이다."

[[dialogue]]
speaker = "unk"
original = "なんとか話を逸らしたい……あ、そうだ。"
translation = "어떻게든 화제를 돌리고 싶다…… 아, 맞다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういえば……さっき戦ってる時に思い出したよ。俺は昔、フィオナに会ったことがある」"
translation = "「그러고 보니…… 아까 싸우는 중에 생각났어. 나는 예전에 피오나를 만난 적이 있어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え……私に、ですか？」"
translation = "「에…… 저를, 말인가요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いきなりのカミングアウトですね」"
translation = "「갑작스러운 커밍아웃이군요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。名前に覚えがあると思ったら……そう、たしか９年くらい前の夏だ」"
translation = "「아아. 이름이 낯익다고 생각했는데…… 그래, 분명 9년 정도 전의 여름이야」"

[[dialogue]]
speaker = "unk"
original = "俺にとってはハッキリと思い出せる出来事。彼女からすれば、もう覚えちゃいないだろうけど……"
translation = "나에게는 선명하게 떠오르는 일. 그녀 입장에서는, 이제 기억하지 못하겠지만……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「新しく教皇さんが着任するって聞いて……教皇庁前の広場まで挨拶を見に行ったんだ。母さんに連れられて」"
translation = "「새로운 교황이 취임한다는 소식을 듣고…… 교황청 앞 광장까지 인사하는 걸 보러 갔었어. 어머니에게 이끌려서」"

[[dialogue]]
speaker_original = "進行"
speaker_translation = "진행"
original = "「これよりは３７１代教皇、マリウス様による挨拶と説教になります。どうか最後までご清聴くださいませ」"
translation = "「지금부터 제371대 교황, 마리우스 님의 인사와 설교가 있겠습니다. 부디 끝까지 경청해 주십시오」"

[[dialogue]]
speaker_original = "流星教皇"
speaker_translation = "유성 교황"
original = "「──親愛なる兄弟姉妹の皆さま。今日という佳き日を迎えられましたこと、慎んでお慶び申し上げます」"
translation = "「──친애하는 형제자매 여러분. 오늘이라는 좋은 날을 맞이하게 된 것을, 삼가 축하드립니다」"

[[dialogue]]
speaker_original = "流星教皇"
speaker_translation = "유성 교황"
original = "「流星市国がこの地に興りはや３０００余年。聖なる女神様が三界を産み、新たなる秩序が誕生せんという今日……」"
translation = "「유성 시국이 이 땅에 일어난 지 벌써 3000여 년. 성스러운 여신님께서 삼계를 낳으시고, 새로운 질서가 탄생하려는 오늘……」"

[[dialogue]]
speaker = "unk"
original = "太陽の日差しがじりじりと照りつける、夏の暑い日だった。"
translation = "태양의 햇살이 작열하는, 여름의 더운 날이었다."

[[dialogue]]
speaker = "unk"
original = "あれが確か第３７１代教皇──おじさんだったのを覚えているから、恐らくフィオナのお父上なんだろう。"
translation = "그때가 분명 제371대 교황── 아저씨였다는 것을 기억하고 있으니, 아마도 피오나의 아버지일 것이다."

[[dialogue]]
speaker = "unk"
original = "俺は教皇さまのお説教とやらがあまり理解できず、その場を離れてしまったのだ。"
translation = "나는 교황님의 설교라는 것을 잘 이해하지 못하고, 그 자리를 떠나 버렸다."

[[dialogue]]
speaker = "unk"
original = "そのとき──"
translation = "그때──"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「びゅーんっ！」"
translation = "「슝!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──いてっ」"
translation = "「──아야」"

[[dialogue]]
speaker = "unk"
original = "たまたま、裏手で女の子とばったりぶつかった。"
translation = "우연히, 뒷골목에서 여자아이와 딱 마주쳤다."

[[dialogue]]
speaker = "unk"
original = "その女の子は教皇さまに似た白い祭服を着ていて、明らかに変わった子だったのを覚えている。"
translation = "그 여자아이는 교황님과 비슷한 흰색 제복을 입고 있었고, 분명 특이한 아이였다는 것을 기억한다."

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「あれ？\u3000あ、ごめんごめん！\u3000だいじょーぶ？」"
translation = "「어라? 아, 미안 미안! 괜찮아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん、平気……あれ。きみは？」"
translation = "「응, 괜찮아…… 어라. 너는?」"

[[dialogue]]
speaker_original = "フィオナ？"
speaker_translation = "피오나?"
original = "「わたしこそは星見フィオナだ！\u3000少年、きみの名前は？」"
translation = "「나야말로 호시미 피오나다! 소년, 네 이름은 무엇이냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「少年って……同じくらいの歳じゃない？」"
translation = "「소년이라니…… 비슷한 또래 아닌가?」"

[[dialogue]]
speaker_original = "フィオナ？"
speaker_translation = "피오나?"
original = "「そんなことはないぞ！\u3000わたしのほうが年長者のはずだ！」"
translation = "「그렇지 않다! 내가 연장자일 것이다!」"

[[dialogue]]
speaker = "unk"
original = "その時の彼女の妙な言い回しが、なんだか新鮮だったのを覚えている。"
translation = "그때 그녀의 묘한 말투가, 왠지 모르게 신선했다는 것을 기억한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええと、ぼくは──」"
translation = "「음, 나는──」"

[[dialogue]]
speaker_original = "ガードマンＡ"
speaker_translation = "경비원 A"
original = "「フィオナ様ー。どちらへ行かれましたかー」"
translation = "「피오나 님—. 어디로 가셨습니까ー」"

[[dialogue]]
speaker_original = "ガードマンＢ"
speaker_translation = "경비원 B"
original = "「そろそろフィオナ様のご挨拶の出番ですよー。まったく、どこへ行ったんだ……」"
translation = "「슬슬 피오나 님의 인사 차례입니다ー. 정말, 어디로 간 거야……」"

[[dialogue]]
speaker_original = "フィオナ？"
speaker_translation = "피오나?"
original = "「まずい。悪の追手がわたしに迫ってきている。名残惜しいが少年、ここでお別れだ」"
translation = "「큰일이다. 악의 추격대가 나에게 다가오고 있다. 아쉽지만 소년, 여기서 작별이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「は、はあ……？」"
translation = "「하, 하아……?」"

[[dialogue]]
speaker_original = "フィオナ？"
speaker_translation = "피오나?"
original = "「それもこれもお父さまのあいさつがタイクツなのが悪いんだ。少年、ここでわたしを見たことは忘れるんだぞ！」"
translation = "「이것도 저것도 아버지의 인사가 지루한 게 나쁜 거다. 소년, 여기서 나를 본 것은 잊는 거다!」"

[[dialogue]]
speaker = "unk"
original = "当時の印象と今のフィオナのイメージがすり合わず、なかなかピンとこなかったが……"
translation = "당시의 인상과 지금의 피오나의 이미지가 맞지 않아, 좀처럼 감이 오지 않았지만……"

[[dialogue]]
speaker = "unk"
original = "あの時の少女は確かに星見フィオナだった。間違いない。"
translation = "그때의 소녀는 분명 호시미 피오나였다. 틀림없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナが太陽の星力を振るうのを見てなんとなく思い出したんだ」"
translation = "「피오나가 태양의 성력을 휘두르는 것을 보고 어쩐지 생각났어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今にして思うと、当時のフィオナはまだ子どもだったというか……はは。少しやんちゃな感じだったな」"
translation = "「이제 와서 생각하니, 그때의 피오나는 아직 어린애였다고 할까…… 하하. 조금 장난꾸러기 같은 느낌이었지」"

[[dialogue]]
speaker = "unk"
original = "そんなエピソードを披露した俺だったが、当の彼女はやや困り気味な顔をしていた。"
translation = "그런 에피소드를 이야기한 나였지만, 정작 그녀는 다소 곤란한 표정을 짓고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……えっと……」"
translation = "「……음……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「覚えてないって♪」"
translation = "「기억 못 한다고♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そりゃそうだ。別にこっちが名乗ったわけでもないからな」"
translation = "「그렇겠지. 딱히 이쪽에서 이름을 밝힌 것도 아니니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただ、あの頃から縁があったのを思い出してさ」"
translation = "「다만, 그때부터 인연이 있었다는 걸 떠올려서 말이야」"

[[dialogue]]
speaker = "unk"
original = "俺だって今になるまで忘れてたような何気ない出来事だ。"
translation = "나조차도 지금이 되어서야 잊고 있었던 아무렇지도 않은 일이다."

[[dialogue]]
speaker = "unk"
original = "向こうからしてみれば俺は大勢いた聴衆の一人でしかなかったわけで、覚えてなくて当然である。"
translation = "상대방 입장에서 보면 나는 수많은 청중 중 한 명에 불과했을 것이니, 기억하지 못하는 것이 당연하다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「にしても、ぷぷ。フィオナも可愛いところあるのね！\u3000クロトを少年呼ばわりなんて」"
translation = "「그렇다고 해도, 푸훗. 피오나도 귀여운 구석이 있네! 쿠로토를 소년이라고 부르다니」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう……ヴィーナスさん。昔のことなんですから、からかわないでください」"
translation = "「정말…… 비너스 씨. 옛날 일이니까, 놀리지 마세요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よくよく考えると、あの時からフィオナは家の務めを果たしてたんだもんな。立派だよ」"
translation = "「곰곰이 생각해 보면, 그때부터 피오나는 집안의 임무를 다하고 있었던 거네. 대단해」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え、ええ……ありがとう。大したことではありません」"
translation = "「에, 예…… 고맙습니다. 별것 아닙니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それに比べると俺は何者でもないけど。同じ星徒会長として、肩を並べるくらいになれたらなって……思うよ」"
translation = "「그에 비하면 나는 아무것도 아니지만. 같은 성도 회장으로서, 어깨를 나란히 할 수 있게 된다면…… 하고 생각해」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "魔王の話も逸らせたし、ヴィーナスも打ち解けてくれたしエピソードトークとしては十分……"
translation = "마왕 이야기도 돌렸고, 비너스도 허물없이 대해줬으니 에피소드 토크로서는 충분하다……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（……？）」"
translation = "「(……?)」"

[[dialogue]]
speaker = "unk"
original = "だが、気のせいだろうか。"
translation = "하지만, 기분 탓일까."

[[dialogue]]
speaker = "unk"
original = "昔の話をした時、一瞬──フィオナが気まずそうな顔に見えたのは。"
translation = "옛날 이야기를 했을 때, 한순간── 피오나가 곤란한 표정으로 보였던 것은."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「……まー、あれニャン。オマエもよくそんな昔のことを鮮明に覚えていたニャンね」"
translation = "「……뭐ー, 그거냥. 너도 어떻게 그런 옛날 일을 선명하게 기억하고 있었냥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……たまたまな」"
translation = "「……우연히」"

[[dialogue]]
speaker = "unk"
original = "俺は、ニャリオンにそうはぐらかしつつ答えた。"
translation = "나는, 냐리온에게 그렇게 얼버무리며 대답했다."

