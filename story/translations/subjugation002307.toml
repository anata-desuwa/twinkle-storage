[[dialogue]]
speaker = "unk"
original = "アステラの最奥に辿り着き、そこに座している大型モンスターを目にして、前世の父親の名を口にする紅明――"
translation = "아스텔라 최심부에 도착하여 그곳에 앉아 있는 대형 몬스터를 보고 전생의 아버지의 이름을 입에 올리는 코우메이──"

[[dialogue]]
speaker = "クーシェン"
original = "「ねーねー、どういうこと？」"
translation = "「언니, 어떻게 된 거야?」"

[[dialogue]]
speaker = "クーシェン"
original = "「あのモンスターが、ねーねーのお父さん――『牛魔王』って……」"
translation = "「저 몬스터가 언니의 아버지── 『우마왕』이라니……」"

[[dialogue]]
speaker = "unk"
original = "モンスターの方は、まだこちらの存在に気づいていないようだった。そこに飾られた彫像のように玉座から動く気配はない。"
translation = "몬스터 쪽은 아직 이쪽의 존재를 알아차리지 못한 듯했다. 그곳에 장식된 조각상처럼 옥좌에서 움직일 기척은 없다."

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「……いや、本物の親父殿ってわけじゃない。あれは恐らく……親父殿の姿だけを模したモンスターだと思う」"
translation = "「…… 아니, 진짜 아버지인 건 아냐. 저건 아마…… 아버지의 모습만을 본뜬 몬스터라고 생각해」"

[[dialogue]]
speaker = "クーシェン"
original = "「姿を模した……？」"
translation = "「모습을 본떠……?」"

[[dialogue]]
speaker = "unk"
original = "紅明、親父さんって確か……"
translation = "코우메이, 아버님은 분명……"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「うん。親父殿は２０００年前、人間界に侵攻して、三界を魔族の手で支配しようという野望を抱いていた」"
translation = "「응. 아버지는 2000년 전, 인간계를 침공해서 삼계를 마족의 손으로 지배하겠다는 야망을 품고 있었어」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「その為に力を求めて……リクリエを自らの中に取り込み、あの怪物の姿に変身して、『牛魔王』を名乗ったんだ」"
translation = "「그걸 위해 힘을 갈구하다…… 리크리에를 스스로의 몸에 받아들여 저 괴물의 모습으로 변신하고 『우마왕』이라 자칭했지」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「『我こそは魔王の後継者である』、と称してね」"
translation = "「『내야말로 마왕의 후계자다』라면서 말야」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「しかし結局は……リクリエを制御できるはずもなく、時間と共に親父殿の方が取り込まれてしまった。……自我まで怪物に変貌してしまったんだよ」"
translation = "「하지만 결국은…… 리크리에를 제어할 수 있을 리도 없었고, 시간과 함께 아버지가 오히려 침식당하고 말았어. …… 자아까지 괴물로 변해버렸지」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「本物の親父殿は、アタシと悟空たちで２０００年前に介錯してる。だから……あれは多分、かつてリクリエが取り込んだ牛魔王を模倣したもの」"
translation = "「진짜 아버지는 나랑 오공 일행이 2000년 전에 끝내드렸어. 그러니까…… 저건 아마 예전에 리크리에가 집어삼켰던 우마왕을 모방한 것」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「……愚かな男が招いた、自業自得の結果だよ」"
translation = "「…… 어리석은 남자가 자초한 자업자득의 결과야」"

[[dialogue]]
speaker = "クーシェン"
original = "「……許せない」"
translation = "「…… 용서 못 해」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "クーシェン"
original = "「死んだヒトの力を悪用するだなんて……！」"
translation = "「죽은 사람의 힘을 악용하다니……!」"

[[dialogue]]
speaker = "クーシェン"
original = "「確かに、牛魔王は悪い奴だったのかもしれない。でも、死んだ後にこうやって利用されるのは、違うでしょ！？」"
translation = "「분명 우마왕은 나쁜 녀석이었을지도 몰라. 하지만 죽은 뒤에 이렇게 이용당하는 건 아니잖아!?」"

[[dialogue]]
speaker = "クーシェン"
original = "「死んだヒトの力を利用して世界を滅ぼそうとするだなんて……そんなの、尊厳を踏みにじる行為じゃないか！」"
translation = "「죽은 사람의 힘을 이용해서 세계를 멸망시키려 하다니…… 그런 건 존엄을 짓밟는 행위 아냐!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「クーちん……」"
translation = "「쿠셴……」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「仕方ないよ。リクリエにそんなこと言ったって、意味はない」"
translation = "「어쩔 수 없어. 리크리에한테 그런 말을 해봤자 의미는 없어」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「地震とか台風とかの災害――天災と同じなんだ。リクリエに言葉は通じないんだよ」"
translation = "「지진이나 태풍 같은 재해── 천재지변이랑 같은 거야. 리크리에한테는 말이 통하지 않아」"

[[dialogue]]
speaker = "クーシェン"
original = "「関係ない！」"
translation = "「상관없어!」"

[[dialogue]]
speaker = "クーシェン"
original = "「たとえそれが天に決められたことだったとしても……ボクが許せないと思うから怒るんだ！」"
translation = "「설령 그것이 하늘에 의해 정해진 일이라 해도…… 내가 용서 못 하겠으니까 화내는 거야!」"

[[dialogue]]
speaker = "クーシェン"
original = "「仕方ないことだとしても、許せないことにはちゃんと怒らなくちゃ！\u3000じゃなきゃ、いざ怒らなくちゃいけない時に怒れなくなっちゃう！」"
translation = "「어쩔 수 없는 일이라 해도 용서 못 하는 일에는 제대로 화를 내야 해! 안 그러면 진짜 화내야 할 때 화낼 수 없게 된다구!」"

[[dialogue]]
speaker = "クーシェン"
original = "「ボクはまだ学園に入学して、プリマステラの資格を貰ったばかりだけど……」"
translation = "「나는 이제 막 학원에 입학해서 프리마스텔라 자격을 받았을 뿐이지만……」"

[[dialogue]]
speaker = "クーシェン"
original = "「でも！\u3000その仕方のないこと――世界の不条理に抗うのが、星騎士なんじゃないの！？」"
translation = "「하지만! 그 어쩔 수 없는 일── 세계의 부조리에 저항하는 게 성기사 아니었어!?」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「ああ、そっか。……そうだね、クーちん」"
translation = "「아아, 그렇구나. …… 그렇네, 쿠셴」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「仕方のないことだからって……全部が全部、割り切ってみせる必要はないんだ」"
translation = "「어쩔 수 없는 일이라고 해서…… 전부 다 이해하고 넘어갈 필요는 없는 거였어」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「ありがと、クーちん……アタシはまた、昔みたいに諦めちゃうところだった」"
translation = "「고마워, 쿠셴…… 나는 또 옛날처럼 포기해버릴 뻔했어」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「親父殿の偽物が現れたなら、元娘として、ちゃんと怒らなくちゃね……！」"
translation = "「아버지의 가짜가 나타났다면, 전 딸로서 제대로 화를 내줘야겠지……!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「かつて、怒りを伝えられずに後悔して、アタシにこの芭蕉扇を託した――お袋殿の為にも！」"
translation = "「일찍이 분노를 전하지 못해 후회하며 나에게 이 파초선을 맡겼던── 어머니를 위해서라도!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「でも、クーちん、キミはやっぱり――『アタシの<ruby>孫悟空<rt>リーダー</rt></ruby>』だ」"
translation = "「하지만 쿠셴, 너는 역시── 『나의 <ruby>손오공<rt>리더</rt></ruby>』야」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「たとえ記憶が無くても……生まれ変わっても、キミの中にはちゃんと受け継がれているものがある」"
translation = "「설령 기억이 없어도…… 다시 태어났어도, 너의 안에는 제대로 이어져 오고 있는 게 있어」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「かつて親父殿を止めることを諦めてしまっていたアタシを、同じ言葉で救ってくれた、『<ruby>斉天大聖<rt>せいてんたいせい</rt></ruby>』の心が」"
translation = "「예전에 아버지를 멈추는 걸 포기했던 나를 똑같은 말로 구해줬던, 『제천대성』의 마음이」"

[[dialogue]]
speaker = "クーシェン"
original = "「せーてんたいせー……？」"
translation = "「제천대성……?」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「『天にも<ruby>斉<rt>ひと</rt></ruby>しい大聖者』って意味の言葉で、孫悟空が名乗っていた称号さ。今風に言うと、二つ名ってやつかな」"
translation = "「『하늘과 맞먹는 위대한 성자』라는 뜻의 말로, 손오공이 자칭했던 칭호야. 요즘 식으로 말하면 이명이라는 거려나」"

[[dialogue]]
speaker = "クーシェン"
original = "「天にも等しい……うん、カッコいい！」"
translation = "「하늘과 맞먹는…… 응, 멋져!」"

[[dialogue]]
speaker = "クーシェン"
original = "「ボクには前世の記憶はないから、自分はやっぱり、孫悟空とは別人だと思ってしまうけど……」"
translation = "「나한테는 전생의 기억은 없으니까 역시 나는 손오공과는 별개라고 생각하지만……」"

[[dialogue]]
speaker = "クーシェン"
original = "「でも、ねーねーがそう言ってくれるのなら、ボクはその二つ名を名乗るよ！」"
translation = "「하지만 언니가 그렇게 말해준다면 나는 그 이명을 자처하겠어!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「ふふっ、そっか♪」"
translation = "「후훗, 그렇구나♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「――よし、じゃあ、気を取り直して、２０００年ぶりの牛魔王退治と行きますか！」"
translation = "「──좋아, 그럼 기운 차리고 2000년 만에 우마왕 퇴치하러 가볼까!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「ダーリン、指示をお願い！」"
translation = "「달링, 지시를 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "ああ、行こう、２人共！"
translation = "아아, 가자, 둘 다!"

[[dialogue]]
speaker = "クーシェン"
original = "「うん、にーにー！」"
translation = "「응, 오빠!」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはアステラの奥へと進み、牛魔王の前へと立つ。"
translation = "그러고 나서 우리들은 아스텔라 안으로 나아가 우마왕 앞에 선다."

[[dialogue]]
speaker = "牛魔王"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "クーシェン"
original = "「――さあさあ、リクリエ！\u3000その偽物を通して、よ～く聞け！」"
translation = "「──자 자, 리크리에! 그 가짜를 통해서 똑똑히 들어라!」"

[[dialogue]]
speaker = "クーシェン"
original = "「ボクの名は、斉天大聖クーシェン！\u3000現代に生まれ変わりし、孫悟空だ！」"
translation = "「내 이름은 제천대성 쿠셴! 현대에 다시 태어난 손오공이다!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「同じく、我こそは善財童子、牛紅明！\u3000前世の名は、紅孩児！\u3000牛魔王の元娘だぜ！」"
translation = "「마찬가지로 나야말로 선재동자, 규우 코우메이! 전생의 이름은 홍해아! 우마왕의 전 딸이라구!」"

[[dialogue]]
speaker = "クーシェン"
original = "「――それが悪人であろうとも、死んだヒトの力を悪用するその冒涜……たとえ女神様が許しても、このボクが許さない！」"
translation = "「──설령 그게 악인일지라도 죽은 사람의 힘을 악용하는 그 모독…… 여신님이 용서해도 이 내가 용서 못 해!」"

[[dialogue]]
speaker = "クーシェン"
original = "「さあ、好きな行き先を選べ――」"
translation = "「자, 좋아하는 행선지를 골라라──」"

[[dialogue]]
speaker = "クーシェン"
original = "「天国がいいか、地獄がいいか！！」"
translation = "「천국이 좋으냐, 지옥이 좋으냐!!」"

[[dialogue]]
speaker = "牛魔王"
original = "「――グオオオォォォッ！」"
translation = "「──구오오오오옷!」"

[[dialogue]]
speaker = "unk"
original = "牛魔王が玉座から立ち上がり、雄叫びを上げる。"
translation = "우마왕이 옥좌에서 일어나 포효한다."

[[dialogue]]
speaker = "クーシェン"
original = "「うりゃあぁぁぁーーーっ！」"
translation = "「이랴아아아아──!」"

[[dialogue]]
speaker = "unk"
original = "先陣を切るクーシェンのかけ声と共に、俺たちと牛魔王の戦いが始まるのだった――"
translation = "선봉에 서는 쿠셴의 기합 소리와 함께 우리와 우마왕의 싸움이 시작되는 것이었다──"

