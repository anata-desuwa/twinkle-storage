[[dialogue]]
speaker = "unk"
original = "俺たちは初詣をする為に、大きな門をくぐって、敷地内へ足を踏み入れた――"
translation = "우리들은 하츠모데를 하기 위해, 커다란 문을 지나 부지 안으로 발을 들여놓았다――"

[[dialogue]]
speaker = "ウズメイア"
original = "「おぉ～！\u3000これが元旦のお寺！\u3000すごい沢山の人が来てて、めっちゃテンション上がるんだけど～♪」"
translation = "「오오~! 이게 설날의 절! 사람이 엄청 많이 와서 텐션 완전 올라가는데~♪」"

[[dialogue]]
speaker = "unk"
original = "そっか。ウズメは初詣、初めてなのか"
translation = "그렇구나. 우즈메는 하츠모데가 처음인 건가."

[[dialogue]]
speaker = "ウズメイア"
original = "「うん！\u3000去年の春、人間界に来るまでは天界にいたしね～」"
translation = "「응! 작년 봄에 인간계에 오기 전까지는 천계에 있었으니까~」"

[[dialogue]]
speaker = "ソフィア"
original = "「ウズメさんは１年と経たず、すっかり日本に染まっちゃいましたね」"
translation = "「우즈메 씨는 1년도 채 되지 않아 완전히 일본에 물들어 버렸네요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「入学したばかりの頃は、あんなに清楚な格好をしてたのに……」"
translation = "「입학한 지 얼마 안 됐을 때는 그렇게 청초한 차림이었는데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ、そうなの！？」"
translation = "「엣, 그랬어!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「私も知らなかったわ～。ソフィの友達として紹介された時には、既に今時の女の子って感じだったけど……」"
translation = "「나도 몰랐어~. 소피의 친구로 소개받았을 때는 이미 요즘 여자아이 같은 느낌이었지만……」"

[[dialogue]]
speaker = "ソフィア"
original = "「まあ、入学して１ヶ月で、既にギャル化してましたね」"
translation = "「뭐, 입학하고 한 달 만에 이미 갸루가 되어버렸죠.」"

[[dialogue]]
speaker = "unk"
original = "早くない！？"
translation = "빨라!?"

[[dialogue]]
speaker = "ソフィア"
original = "「元凶はセーラ先輩です」"
translation = "「원흉은 세라 선배님입니다.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あはは♪\u3000ソフィアが星徒会に入って、その繋がりでセーラ先輩と知り合ったんだよね～」"
translation = "「아하하♪ 소피아가 성도회에 들어가고, 그 인연으로 세라 선배님이랑 알게 된 거지~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「セーラ先輩ってオシャレじゃん？\u3000それ見たら、自分も今時な日本のギャルファッションしたい！\u3000ってウズウズしてきちゃって、色々教えてもらったんだよね～」"
translation = "「세라 선배님 완전 멋있잖아? 그걸 보니까 나도 요즘 일본 갸루 패션을 하고 싶어서 근질근질해져서, 이것저것 배웠거든~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「で、イメチェンしてみた、的な？」"
translation = "「그래서 이미지 변신을 해봤다, 라는 느낌?」"

[[dialogue]]
speaker = "ソフィア"
original = "「当時は、日本伝統文化が好きで人間界にきたと言っていたのに、どうしてこうなったって感じでしたが……」"
translation = "「당시에는 일본 전통문화를 좋아해서 인간계에 왔다고 했으면서, 어쩌다 이렇게 됐나 싶은 느낌이었지만요……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「いやいや、ギャルファッションだって日本文化の１つじゃん？」"
translation = "「에이, 갸루 패션도 일본 문화 중 하나잖아?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「伝統っていうのは、新しいものが積み重ねられていくことで成り立っていくものだし！」"
translation = "「전통이라는 건 새로운 것이 쌓여가면서 이루어지는 법이니까!」"

[[dialogue]]
speaker = "ソフィア"
original = "「伝統も最新も両方追究した結果、トンチキなことになっていたりもしますが……その晴れ着とか」"
translation = "「전통도 최신도 양쪽 다 추구한 결과, 엉뚱한 꼴이 되어 있기도 하지만요…… 그 설빔이라든가.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「トンチキ！？」"
translation = "「엉뚱하다니!?」"

[[dialogue]]
speaker = "unk"
original = "（言葉を濁さずにツッコんだ！）"
translation = "(말을 가리지 않고 돌직구를 날렸어!)"

[[dialogue]]
speaker = "ウズメイア"
original = "「え～！？\u3000これ可愛くない？\u3000会長くんだって、すごく似合ってるって言ってくれたし！」"
translation = "「에~!? 이거 귀엽지 않아? 회장군도 정말 잘 어울린다고 말해줬다구!」"

[[dialogue]]
speaker = "ソフィア"
original = "「いや似合ってますけど、だいぶ魔改造ですよね、それ。ミニスカですし」"
translation = "「아니, 어울리긴 합니다만, 꽤 마개조되었잖아요, 그거. 미니스커트고.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ミニスカ晴れ着って今時普通じゃないの！？」"
translation = "「미니스커트 설빔은 요즘 보통 아니야!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「どこ情報なんですか、それ……」"
translation = "「어디 정보인가요, 그건……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そんな……ちゃんとネットで調べて研究したのに……」"
translation = "「세상에…… 제대로 인터넷으로 조사해서 연구했는데……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ウズメさん、思い込みで勘違いしやすいタイプですよね……。ネットの情報にも染まりやすいというか……」"
translation = "「우즈메 씨, 지레짐작으로 착각하기 쉬운 타입이죠……. 인터넷 정보에도 잘 휩쓸린달까……」"

[[dialogue]]
speaker = "unk"
original = "あ～、天界ってネット環境がないのか……"
translation = "아~, 천계에는 인터넷 환경이 없는 건가……"

[[dialogue]]
speaker = "ウズメイア"
original = "「た、確かに人間界にきて初めて、インターネットに触れたけれども……！」"
translation = "「그, 확실히 인간계에 와서 처음으로 인터넷을 접해보긴 했지만……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「で、でも、参拝のやり方とかは大丈夫なはずだし！\u3000お賽銭を賽銭箱に入れて、鈴を鳴らしてから２回礼をして……」"
translation = "「하, 하지만 참배하는 법 같은 건 괜찮을 테니까! 시전함에 돈을 넣고, 방울을 울린 다음 두 번 절하고……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「手を２回叩いてからお祈りして、最後に一礼をする。『二礼二拍手一礼』だし！」"
translation = "「손을 두 번 치고 나서 기도하고, 마지막에 한 번 절하기. 『2례 2박수 1례』라구!」"

[[dialogue]]
speaker = "ソフィア"
original = "「それは神社の場合ですね」"
translation = "「그건 신사의 경우입니다.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker = "ソフィア"
original = "「こちらはお寺なので、手は叩かずに合掌が正しいやり方です。あと鈴もないです」"
translation = "「여기는 절이라서 손을 치지 않고 합장하는 게 올바른 방법이에요. 그리고 방울도 없고요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「マジで！？」"
translation = "「진짜!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ソフィアは物知りね！\u3000ぶっちゃけ、あんまり気にしたことがなかったわ！」"
translation = "「소피아는 아는 게 많네! 솔직히 난 별로 신경 써본 적이 없었어!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「日本伝統文化オタクなのに、ソフィアに負けたし……！」"
translation = "「일본 전통문화 오타쿠인데 소피아에게 지다니……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「なんでそうなるんですか……」"
translation = "「왜 그렇게 되는 건가요……」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000ちなみに、ここのお寺の隣には、神社があるのよね。お寺と神社が並んでるなんて、面白いわ～」"
translation = "「우후후♪ 참고로 이 절 옆에는 신사가 있단다. 절과 신사가 나란히 있다니 재미있네~」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで参拝の列に並ぶ前に、俺たちは事前に打ち合わせていた作戦を実行することにした。"
translation = "이래저래 해서 참배 줄을 서기 전에, 우리들은 미리 의논했던 작전을 실행하기로 했다."

[[dialogue]]
speaker = "サーシャ"
original = "「――甘酒をもらってくる？」"
translation = "「――아마자케를 받아온다고?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はい！\u3000あたしと会長くんとヴィーナス先輩で貰ってくるんで、サーシャ先輩はソフィアと、ここで待っていて下さい」"
translation = "「네! 저랑 회장군이랑 비너스 선배님이 받아올 테니까, 사샤 선배님은 소피아랑 여기서 기다려 주세요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「２人の分も貰ってくるから、その間に姉妹水入らずでね♪」"
translation = "「두 사람 몫도 받아올 테니까, 그동안 자매끼리 오붓하게 있어♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サーシャさん、ソフィアとは年末から会ってなかったんでしょう？」"
translation = "「사샤 씨, 소피아와는 연말부터 못 만났잖아요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。クリスマスパーティーの準備とかもあったし……」"
translation = "「응. 크리스마스 파티 준비도 있었고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なら、ちょうどいいわね！」"
translation = "「그럼 딱 좋네!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「それじゃあソフィア、行ってくるね～♪」"
translation = "「그럼 소피아, 다녀올게~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい」"
translation = "「네.」"

[[dialogue]]
speaker = "サーシャ"
original = "「なんだか、みんなに気を利かせてもらっちゃったみたいね～」"
translation = "「어쩐지 모두가 배려해 준 것 같네~」"

[[dialogue]]
speaker = "サーシャ"
original = "「まさか、ヴィーナスちゃんがソフィを初詣に連れてくるとは思わなかったわ。こうして２人きりで話すのは、久しぶりかしら？」"
translation = "「설마 비너스짱이 소피를 하츠모데에 데려올 줄은 몰랐어. 이렇게 둘이서만 이야기하는 건 오랜만일까?」"

[[dialogue]]
speaker = "ソフィア"
original = "「……ええ、そうですね。ＤＩＳＣでチャットのやり取りをすることはありましたけど、実際に会って話すのは１ヶ月ぶりくらいです」"
translation = "「……네, 그렇네요. DISC로 채팅을 주고받은 적은 있었지만, 실제로 만나서 이야기하는 건 한 달 만이에요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「近頃は元気にしてた？\u3000風邪は引いてない？」"
translation = "「요즘은 잘 지냈니? 감기는 안 걸렸고?」"

[[dialogue]]
speaker = "ソフィア"
original = "「レゾフよりは寒くないので、大丈夫です」"
translation = "「레조프보다는 춥지 않아서 괜찮아요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そう。ウズメちゃんとも、変わらず仲良くやっているみたいね」"
translation = "「그래. 우즈메짱이랑도 변함없이 사이좋게 지내는 모양이네.」"

[[dialogue]]
speaker = "ソフィア"
original = "「まあ、押しが強くて困ることもありますが……なんだかんだ仲良くしてもらっています」"
translation = "「뭐, 밀어붙이는 게 강해서 곤란할 때도 있지만…… 이래저래 잘 지내고 있습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「言うのが遅くなっちゃったけど、その晴れ着、とっても似合っているわ♪\u3000ヴィーナスちゃんから聞いたけど、ソフィのも晴れ着フォームなんでしょう？」"
translation = "「말하는 게 늦어졌지만, 그 설빔 정말 잘 어울려♪ 비너스짱한테 들었는데, 소피 것도 설빔 폼이라며?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ええ。初詣にくるにあたって、もらう形になってしまいました」"
translation = "「네. 하츠모데에 오면서 받게 되었습니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「あの……姉さん」"
translation = "「저기…… 언니.」"

[[dialogue]]
speaker = "サーシャ"
original = "「うん？」"
translation = "「응?」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………えっと」"
translation = "「…………어음.」"

[[dialogue]]
speaker = "ソフィア"
original = "（事前に色々考えてきたのに、いざ面と向かって言おうとすると……上手く言葉が出てこない……）"
translation = "(미리 이것저것 생각해 왔는데, 막상 마주 보고 말하려고 하니…… 말이 잘 안 나와……)"

[[dialogue]]
speaker = "ソフィア"
original = "（どう言えばいいのか……）"
translation = "(어떻게 말하면 좋을까……)"

[[dialogue]]
speaker = "unk"
original = "と、その時。"
translation = "그때였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（ソフィア、頑張って！）"
translation = "(소피아, 힘내!)"

[[dialogue]]
speaker = "ソフィア"
original = "（あ……ヴィーナスさん……？）"
translation = "(아…… 비너스 씨……?)"

[[dialogue]]
speaker = "ヴィーナス"
original = "（あなたならできるわ！）"
translation = "(너라면 할 수 있어!)"

[[dialogue]]
speaker = "unk"
original = "物陰からソフィアを見守っていたヴィーナスは、目が合うと力強く頷いてみせる。"
translation = "물끄러미 소피아를 지켜보던 비너스는 눈이 마주치자 힘차게 고개를 끄덕여 보였다."

[[dialogue]]
speaker = "ソフィア"
original = "（そうだ……ヴィーナスさんが言っていた――）"
translation = "(맞아…… 비너스 씨가 말했던――)"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さん……」"
translation = "「언니……」"

[[dialogue]]
speaker = "ソフィア"
original = "「私は、姉さんに決闘を申し込みます！」"
translation = "「저는 언니에게 결투를 신청합니다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「け、決闘……！？」"
translation = "「결, 결투……!?」"

[[dialogue]]
speaker = "unk"
original = "ソフィアの宣言に、サーシャさんは目を丸くするのだった――"
translation = "소피아의 선언에 사샤 씨는 눈을 동그랗게 떴다――"

