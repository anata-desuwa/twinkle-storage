[[dialogue]]
speaker = "unk"
original = "第１話,仮面に封じられた力,P"
translation = "제1화, 가면에 봉인된 힘, P"

[[dialogue]]
speaker = "unk"
original = "これは私──アニュラス・セイファートの恋人である緋宮クロトが、魔界へと旅立ってからしばらくが経過した頃のこと。"
translation = "이것은 나──아뉴라스 세이파트의 연인인 히노미야 쿠로토가, 마계로 떠난 지 얼마간의 시간이 흐른 뒤의 일."

[[dialogue]]
speaker = "unk"
original = "後に『フィヴォス流星群』と名付けられる、星騎士とネビュラ、そしてアポロたちリクリエ陣営との決戦直前の出来事となる。"
translation = "훗날 『피보스 유성군』이라 이름 붙여지는, 성기사와 네뷸라, 그리고 아폴로 일행 리크리에 진영과의 결전 직전의 사건이 된다."

[[dialogue]]
speaker = "unk"
original = "その日、私は不思議な夢を見た──"
translation = "그날, 나는 이상한 꿈을 꾸었다──"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お父、様……？」"
translation = "「아버, 님……?」"

[[dialogue]]
speaker = "unk"
original = "行方知れずだったお父様が、黒騎士の鎧をまとって私の前に現れた。"
translation = "행방불명이었던 아버님이, 흑기사의 갑옷을 입고 내 앞에 나타났다."

[[dialogue]]
speaker = "unk"
original = "いくら夢とはいえタチが悪い。あのお父様が黒騎士であるわけがないのに。憧れの存在を汚された気がして、夢だというのに私は憤りを隠せなかった。"
translation = "아무리 꿈이라지만 질이 나쁘다. 그 아버님이 흑기사일 리가 없는데. 동경하는 존재를 더럽힌 기분이 들어서, 꿈인데도 나는 분노를 감출 수 없었다."

[[dialogue]]
speaker = "unk"
original = "そんな私に対して、お父様は訥々と喋り始めた──"
translation = "그런 나에 대해서, 아버님은 담담하게 이야기하기 시작했다──"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……アニュラス。このメッセージがお前に届いたということは、私はもうこの世にはいないはずだ」"
translation = "「……아뉴라스. 이 메시지가 네게 닿았다는 것은, 나는 이제 이 세상에 없을 터다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「えっ──」"
translation = "「엣──」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「魔界へ旅立つ前夜……以前、お前に贈った仮面に、特殊な術式を施した。私が死ぬことを鍵として封印が解けるように……」"
translation = "「마계로 떠나기 전날 밤…… 이전에, 네게 선물한 가면에, 특수한 술식을 베풀었다. 내가 죽는 것을 열쇠로 봉인이 풀리도록……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「封印……？\u3000し、死ぬことを鍵として……？\u3000な、何を言っているのですか、お父様……！？」"
translation = "「봉인……? 주, 죽는 것을 열쇠로……? 무, 무슨 말씀을 하시는 겁니까, 아버님……!?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私は、己の悲願のために……もう止まることはできない。が──敗れた時のことを考えて、このメッセージを遺す」"
translation = "「나는, 나의 비원을 위해…… 이제 멈출 수 없다. 하지만── 패배했을 때를 생각해서, 이 메시지를 남긴다」"

[[dialogue]]
speaker = "unk"
original = "私の声はお父様には届かない。まるで記録してある映像が再生されるかのように、お父様の言葉は止まらなかった。"
translation = "내 목소리는 아버님에게 닿지 않는다. 마치 기록되어 있는 영상이 재생되는 것처럼, 아버님의 말은 멈추지 않았다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──私は道を誤った」"
translation = "「──나는 길을 잘못 들었다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「妻を優先するあまり、娘を蔑ろにした愚かな父だ……軽蔑してほしい」"
translation = "「아내를 우선한 나머지, 딸을 소홀히 한 어리석은 아비다…… 경멸해다오」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そんなっ……い、いやっ……これは夢だ。悪い夢だ……私はまだ未熟だ。こんな馬鹿らしい妄想を……」"
translation = "「그럴 수가…… 아, 아니야…… 이건 꿈이다. 나쁜 꿈이야…… 나는 아직 미숙하다. 이런 바보 같은 망상을……」"

[[dialogue]]
speaker = "unk"
original = "最愛の父は行方知れず。恋人である会長も、ネビュラ基地へ向かったきり消息不明。そんな状況にも関わらず、最近のアステラの出現頻度は増加の一途をたどっている。"
translation = "가장 사랑하는 아버지는 행방불명. 연인인 회장도, 네뷸라 기지로 향한 채 소식불명. 그런 상황임에도 불구하고, 최근 아스텔라의 출현 빈도는 나날이 증가하고 있다."

[[dialogue]]
speaker = "unk"
original = "そう……不安定な現状に揺れる弱い心が見せた──これはただの悪夢なのだ、きっとそうだ……！"
translation = "그래…… 불안정한 현상에 흔들리는 약한 마음이 보여준── 이것은 그저 악몽인 것이다, 분명 그럴 터다……!"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「お前は私のことを心底から慕ってくれていた。だから信じられないかもしれないが……いずれ現実は突き付けられる」"
translation = "「너는 나를 진심으로 사모해 주었다. 그래서 믿기지 않을지도 모르지만…… 머지않아 현실은 들이닥칠 것이다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私は許されざる悪党であり、英雄ではない。すまない、アニュラス……」"
translation = "「나는 용서받지 못할 악당이며, 영웅이 아니다. 미안하다, 아뉴라스……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そん、なっ……」"
translation = "「그럴, 수가……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「デネブ、アルタイル、ベガ……３つの世界……」"
translation = "「데네브, 알타이르, 베가…… 세 개의 세계……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ベガは滅び、破滅まで秒読みだったデネブの惨状を見た私は……心を折られてしまった。この戦いに勝ち目はない。未来はないのだ、とな」"
translation = "「베가는 멸망하고, 파멸까지 초읽기였던 데네브의 참상을 본 나는…… 마음이 꺾이고 말았다. 이 싸움에 승산은 없다. 미래는 없는 것이다, 라고」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「残されたお前を愛し、人々と世界を守り、異なる地へ連れ去られた妻を取り戻す術を探す──そんな淡い希望を抱いて進む強さを、持つことができなかった……」"
translation = "「남겨진 너를 사랑하고, 사람들과 세계를 지키며, 다른 땅으로 끌려간 아내를 되찾을 방도를 찾는── 그런 덧없는 희망을 품고 나아갈 강함을, 가질 수 없었다……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「愚かな父から、せめてもの餞別を遺しておこうと思う。お前の仮面に……込められるだけの霊力を、込めておく」"
translation = "「어리석은 아비가, 최소한의 작별 선물을 남겨두려 한다. 네 가면에…… 담을 수 있는 만큼의 영력을, 담아두마」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「本来、人の身では扱えない力だが……女神に認められた『セイファートの血』であれば、我が物とすることができるだろう」"
translation = "「본래, 인간의 몸으로는 다룰 수 없는 힘이지만…… 여신에게 인정받은 『세이파트의 혈통』이라면, 자신의 것으로 만들 수 있겠지」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「愚かな私には過ぎた力だったが、まっすぐなお前ならばきっと……大切なもののためにこの力を使えるだろう」"
translation = "「어리석은 나에게는 과분한 힘이었지만, 곧은 너라면 분명…… 소중한 것을 위해 이 힘을 쓸 수 있겠지」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……お別れだ、アニュラス」"
translation = "「……작별이다, 아뉴라스」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……っ！\u3000待ってください！\u3000お父様！\u3000私の大切なもの……その１つはあなたです！」"
translation = "「……! 기다려 주십시오! 아버님! 제 소중한 것…… 그중 하나는 당신입니다!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「誰かの為に使えと言われれば、あなたの為にこの力を使いたい！\u3000それなのに、いなくなってしまうだなんて……！」"
translation = "「누군가를 위해 쓰라고 하신다면, 당신을 위해 이 힘을 쓰고 싶습니다! 그런데도, 사라져 버리다니……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お母様は消えてしまったのに……！\u3000お父様まで、いなくなってしまうのですか……！？」"
translation = "「어머님은 사라져 버렸는데……! 아버님까지, 없어지는 것입니까……!?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「本来ならば霊力などではなく、もっと違うもの……言葉や愛情といったものこそを、お前に贈るべきだったのだろうな……」"
translation = "「본래라면 영력 따위가 아니라, 좀 더 다른 것…… 말이나 애정 같은 것을, 네게 주었어야 했을 텐데……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「私はもう後戻りのできないところまで来てしまった。だからお前と一緒にいられない……すまない、アニュラス……」"
translation = "「나는 이제 되돌릴 수 없는 곳까지 와버렸다. 그래서 너와 함께 있을 수 없구나…… 미안하다, 아뉴라스……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お父様、そんなっ……待ってください、お父様──！！」"
translation = "「아버님, 그럴 수가…… 기다려 주십시오, 아버님──!!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「──お父様っ！？」"
translation = "「──아버님!?」"

[[dialogue]]
speaker = "unk"
original = "ソファから跳ね起きる。見慣れない部屋──ここは流星学園の星徒会室だ。"
translation = "소파에서 벌떡 일어난다. 낯선 방── 여기는 유성학원의 성도회실이다."

[[dialogue]]
speaker = "unk"
original = "ここのところ出撃があまりに多く、自室へ帰る暇もない星騎士のために一時的に開放されている休息所だった。"
translation = "요즘 출격이 너무 많아, 자기 방으로 돌아갈 틈도 없는 성기사를 위해 일시적으로 개방된 휴식처였다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「今の、夢は……」"
translation = "「방금, 꿈은……」"

[[dialogue]]
speaker = "unk"
original = "飛び起きた拍子に外れた仮面。流星学園の実技試験で主席をとった際に、父から贈られた私の宝物──そこへ手をかざしてみる。"
translation = "벌떡 일어난 반동으로 벗겨진 가면. 유성학원 실기 시험에서 수석을 했을 때, 아버지에게 선물 받은 나의 보물── 그곳에 손을 얹어본다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「夢……では、ない……のか……」"
translation = "「꿈……이, 아니…… 인 건가……」"

[[dialogue]]
speaker = "unk"
original = "そこには確かに……星力とは違う、温かな、清らかな力が宿っているのがわかった。女神様から賜った力──霊力。"
translation = "그곳에는 분명히…… 성력과는 다른, 따뜻하고, 맑은 힘이 깃들어 있는 것을 알 수 있었다. 여신님께 하사받은 힘── 영력."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お父様は、霊力を扱えた……ということは、黒騎士の、正体は……」"
translation = "「아버님은, 영력을 다룰 수 있었다…… 그렇다는 건, 흑기사의, 정체는……」"

[[dialogue]]
speaker = "unk"
original = "心の半身が欠けてしまったような感覚。遠く魔界の地で、たった今……最愛の家族が散ってしまったことを、頭ではなく魂で理解してしまった──"
translation = "마음의 반쪽이 떨어져 나간 듯한 감각. 먼 마계의 땅에서, 방금…… 가장 사랑하는 가족이 져버렸다는 것을, 머리가 아닌 영혼으로 이해해 버렸다──"

[[dialogue]]
speaker = "unk"
original = "私はどうすればいい？\u3000泣き叫ぶべきなのだろうか……心折れてふさぎ込むべきなのだろうか……？"
translation = "나는 어떻게 해야 하지? 울부짖어야 하는 걸까…… 마음이 꺾여 틀어박혀야 하는 걸까……?"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「────違う」"
translation = "「────아니야」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……私は、力を託されたんだ……ならば悲しみに膝を折ることは許されない……！」"
translation = "「……나는, 힘을 기탁받았다…… 그렇다면 슬픔에 무릎을 꿇는 것은 허용되지 않아……!」"

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣから、モンスターの出現を報せるアラームが鳴る。"
translation = "DISC에서, 몬스터의 출현을 알리는 알람이 울린다."

[[dialogue]]
speaker = "unk"
original = "私は仮面に宿っている力を引き出し、自身の星力と共に新たな力を練り上げる──！"
translation = "나는 가면에 깃들어 있는 힘을 끌어내어, 자신의 성력과 함께 새로운 힘을 연마한다──!"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「……戦おう。私はアニュラス・セイファート……誇り高き流星の騎士の、娘なのだから……！」"
translation = "「……싸우자. 나는 아뉴라스 세이파트…… 긍지 높은 유성의 기사의, 딸이니까……!」"

[[dialogue]]
speaker = "unk"
original = "魔界で黒騎士……セイファート学園長を斃し、フィーニスの塔を経由して人間界へと戻ってきた俺たち。"
translation = "마계에서 흑기사…… 세이파트 학원장을 쓰러뜨리고, 피니스의 탑을 경유하여 인간계로 돌아온 우리들."

[[dialogue]]
speaker = "unk"
original = "地上で戦っていたメンバーと合流し、互いの無事を喜んでいたその時──俺のもとへ１人の少女がやってきた。"
translation = "지상에서 싸우던 멤버들과 합류하여, 서로의 무사함을 기뻐하던 그때── 내게 한 소녀가 다가왔다."

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「ようやく帰ったか会長。無事で何よりだ……！」"
translation = "「드디어 돌아왔군 회장. 무사해서 다행이다……!」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「……ってお前！\u3000何だかずいぶん見た目が変わっているな！？\u3000魔界で何かあったのか……？」"
translation = "「……랄까 너! 왠지 꽤 모습이 변했군!? 마계에서 무슨 일이 있었던 거냐……?」"

[[dialogue]]
speaker = "unk"
original = "その恰好、どうしたんだ！？"
translation = "그 차림, 어떻게 된 거야!?"

[[dialogue]]
speaker = "unk"
original = "アニュラスこそ！？"
translation = "아뉴라스야말로!?"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「ああ……これか。少し前にお父様からの餞別を受け取ってな……新しい力を扱えるようになったんだ」"
translation = "「아아…… 이거 말이냐. 조금 전에 아버님으로부터 작별 선물을 받아서 말이지…… 새로운 힘을 다룰 수 있게 되었다」"

[[dialogue]]
speaker = "unk"
original = "セイファート学園長が……！？"
translation = "세이파트 학원장이……!?"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「ああ。お父様からもらった仮面。あれに、女神様から賜った霊力が込められていたんだ。好きに使うといい、と言われた」"
translation = "「아아. 아버님께 받은 가면. 거기에, 여신님께 하사받은 영력이 담겨 있었다. 마음껏 쓰라고 하시더군」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「不思議な夢を見た……だから何となく感じている。なあ会長……お父様は、亡くなったのだろう……？」"
translation = "「이상한 꿈을 꾸었다…… 그래서 왠지 모르게 느끼고 있어. 저기 회장…… 아버님은, 돌아가신 거겠지……?」"

[[dialogue]]
speaker = "unk"
original = "立派な最期だった……"
translation = "훌륭한 최후였어……"

[[dialogue]]
speaker = "unk"
original = "……魔界で黒騎士と刺し違えたんだ"
translation = "……마계에서 흑기사와 동귀어진했어"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「…………そうか。お父様の誇りを守ってくれて、ありがとう」"
translation = "「…………그렇군. 아버님의 긍지를 지켜줘서, 고맙다」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「さぁ、地上は私たちに任せろ。お前は空にいる<ruby>アポロ<rt>あいつ</rt></ruby>を止めに行くんだろう？」"
translation = "「자, 지상은 우리에게 맡겨라. 너는 하늘에 있는 <ruby>아폴로<rt>그 녀석</rt></ruby>을 멈추러 갈 거잖아?」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「私はリクリエを退けたいと願っていた……流星の騎士であった頃のお父様の遺志を継ぐ。この剣に誓ってな」"
translation = "「나는 리크리에를 물리치고 싶다고 바랐던…… 유성의 기사였을 적의 아버님의 유지를 잇겠다. 이 검에 맹세코 말이지」"

[[dialogue]]
speaker = "unk"
original = "黒と白──二振りの剣を掲げるアニュラスに、俺も己の使命に全力を賭けることを誓った。そうして俺たちは、それぞれの持ち場へと向かうのだった──"
translation = "검정과 하양── 두 자루의 검을 내건 아뉴라스에게, 나도 자신의 사명에 전력을 다할 것을 맹세했다. 그렇게 우리들은, 각자의 위치로 향하는 것이었다──"

