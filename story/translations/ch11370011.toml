[[dialogue]]
speaker = "unk"
original = "第１話,リトルアイドルと妹デート,P"
translation = "제1화, 리틀 아이돌과 여동생 데이트"

[[dialogue]]
speaker = "unk"
original = "こどもの日を巡る一件から、しばらく経ったある日のこと。"
translation = "어린이날을 둘러싼 일로부터 얼마간 시간이 흐른 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "その日は休日で、俺は恋人のレミカとデートの約束をしていた。"
translation = "그날은 휴일이었고, 나는 연인인 레미카와 데이트 약속을 하고 있었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「会長、お待たせ」"
translation = "「회장, 기다렸지」"

[[dialogue]]
speaker = "unk"
original = "待ち合わせ場所に現れたレミカは、こどもの日の事件をきっかけに変身できるようになった、小さな姿――『リトルフォーム』の状態だった。"
translation = "약속 장소에 나타난 레미카는 어린이날 사건을 계기로 변신할 수 있게 된 작은 모습── 『리틀 폼』 상태였다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「それじゃあ、今日は約束していた通り……」"
translation = "「그러면 오늘은 약속했던 대로……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「小さな姿での『妹デート』、始めよっか♪」"
translation = "「작은 모습으로의 『여동생 데이트』, 시작해 볼까♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「今日１日、エスコートよろしくね――<b>兄さん</b>♪」"
translation = "「오늘 하루 에스코트 잘 부탁해── <b>오빠</b>♪」"

[[dialogue]]
speaker = "unk"
original = "なぜ『妹デート』なのかというと――話は数日前にさかのぼる。"
translation = "왜 『여동생 데이트』인가 하면── 이야기는 며칠 전으로 거슬러 올라간다."

[[dialogue]]
speaker = "レミカ"
original = "「――会長。いいことを思いついたんだ」"
translation = "「──회장. 좋은 생각이 났어」"

[[dialogue]]
speaker = "レミカ"
original = "「私、アイドルをやっている都合上、外でデートしようとすると、ファンに見つかって騒ぎになっちゃう可能性があるでしょ？」"
translation = "「나, 아이돌을 하고 있는 형편상 밖에서 데이트하려고 하면 팬들에게 들켜서 소동이 날 가능성이 있잖아?」"

[[dialogue]]
speaker = "unk"
original = "以前も２人で出かけた際、正体に気づかれそうになり、ファン対応で慌ただしくなってしまったことが何度かあった。"
translation = "이전에도 둘이서 외출했을 때 정체를 들킬 뻔하여 팬 대응으로 분주해졌던 적이 몇 번 있었다."

[[dialogue]]
speaker = "レミカ"
original = "「そこで思いついたのが、『リトルフォームに変身してデートする』って案なんだ」"
translation = "「그래서 생각한 게 『리틀 폼으로 변신해서 데이트하기』라는 안이야」"

[[dialogue]]
speaker = "unk"
original = "そうか、確かにそれなら……"
translation = "그렇구나, 확실히 그거라면……"

[[dialogue]]
speaker = "レミカ"
original = "「うん。小さい姿なら、私が『愛戸レミカ』だって、まず気づかれないからね」"
translation = "「응. 작은 모습이라면 내가 『아이도 레미카』라는 걸 우선 눈치채지 못할 테니까」"

[[dialogue]]
speaker = "レミカ"
original = "「それなら周りを気にせず、もっと自由にデートできるでしょ？」"
translation = "「그러면 주변을 신경 쓰지 않고 더 자유롭게 데이트할 수 있겠지?」"

[[dialogue]]
speaker = "レミカ"
original = "「それとね……もう１つ、試してみたいことがあるの」"
translation = "「그리고 말이야…… 한 가지 더 시도해 보고 싶은 게 있어」"

[[dialogue]]
speaker = "レミカ"
original = "「せっかくだから、『妹キャラ』になりきってみたいんだ」"
translation = "「이왕 하는 거 『여동생 캐릭터』가 되어보고 싶어」"

[[dialogue]]
speaker = "unk"
original = "い、妹……？"
translation = "여, 여동생……?"

[[dialogue]]
speaker = "レミカ"
original = "「そう。笑顔の似合う『可愛いアイドル』を目指すなら、妹の可愛さって何なのか、ちゃんと知りたくて」"
translation = "「응. 웃음이 어울리는 『귀여운 아이돌』을 목표로 한다면, 여동생의 귀여움이란 게 무엇인지 제대로 알고 싶어서」"

[[dialogue]]
speaker = "unk"
original = "俺は「こどもの日の事件」の時に伝えた通り、『レミカは自然体でいるのが一番可愛い』と、改めて言葉にする。"
translation = "나는 「어린이날 사건」 때 전했던 대로, 『레미카는 자연스러운 모습으로 있는 게 가장 귀엽다』고 다시 한번 말한다."

[[dialogue]]
speaker = "レミカ"
original = "「うん、それはこの前のライブで実感したよ」"
translation = "「응, 그건 지난번 라이브에서 실감했어」"

[[dialogue]]
speaker = "レミカ"
original = "「でもね、演じてみることで学べる可愛さもあると思うんだ」"
translation = "「하지만 말이야, 연기해 보는 것으로 배울 수 있는 귀여움도 있다고 생각해」"

[[dialogue]]
speaker = "レミカ"
original = "「ライブみたいに大勢の前じゃなくて、恋人同士のごっこ遊びみたいな感じなら……気軽に試せるでしょ？」"
translation = "「라이브처럼 많은 사람들 앞이 아니라, 연인끼리의 소꿉놀이 같은 느낌이라면…… 가볍게 시도해 볼 수 있잖아?」"

[[dialogue]]
speaker = "レミカ"
original = "「だから会長、付き合ってくれないかな？」"
translation = "「그러니까 회장, 같이 해주지 않을래?」"

[[dialogue]]
speaker = "レミカ"
original = "「私の『妹ごっこ』……カノジョとして、お願い♪」"
translation = "「나의 『여동생 놀이』…… 여자친구로서 부탁할게♪」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで俺は、可愛い彼女のお願いを聞き入れ、休日に『妹デート』をすることになった。"
translation = "그런 연유로 나는 귀여운 여자친구의 부탁을 받아들여 휴일에 『여동생 데이트』를 하게 되었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「兄さん、ほら……ステップ遅れてるよ！」"
translation = "「오빠, 봐봐…… 스텝이 늦었어!」"

[[dialogue]]
speaker = "unk"
original = "電車で渋谷へと出かけ、ゲームセンターに立ち寄った俺たちは、ダンスゲームで盛り上がっていた。"
translation = "전철로 시부야에 가서 게임 센터에 들른 우리들은 댄스 게임으로 달아오르고 있었다."

[[dialogue]]
speaker = "unk"
original = "レミカには敵わないって！"
translation = "레미카에게는 당해낼 수 없다니까!"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ふふっ♪\u3000会長は星騎士の代表なんだから、これくらいのステップはできないと！」"
translation = "「후훗♪ 회장은 성기사의 대표니까 이 정도 스텝은 밟을 줄 알아야지!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ほら、リズムを合わせて♪」"
translation = "「자, 리듬을 맞춰서♪」"

[[dialogue]]
speaker = "unk"
original = "楽しそうに、そして軽やかに。レミカはキレのあるステップで、次々とフルコンボを決めていく。"
translation = "즐겁게, 그리고 경쾌하게. 레미카는 절도 있는 스텝으로 차례차례 풀 콤보를 달성해 나간다."

[[dialogue]]
speaker = "見物人の男１"
original = "「な、なんなんだあの子……ただ者じゃねぇ……！」"
translation = "「뭐, 뭐야 저 아이…… 보통내기가 아니야……!」"

[[dialogue]]
speaker = "見物人の男２"
original = "「ああ……なんか、キラキラしたオーラを感じるぜ……！」"
translation = "「아아…… 왠지 반짝반짝한 오라가 느껴진다고……!」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「よしっ♪\u3000兄さん、次の曲いくよ！」"
translation = "「좋아♪ 오빠, 다음 곡 간다!」"

[[dialogue]]
speaker = "unk"
original = "どうやら正体がバレなくても、レミカのトップアイドルとしての輝きまでは、隠しきれないらしい。"
translation = "아무래도 정체를 들키지 않아도 레미카의 톱 아이돌로서의 광채까지는 숨길 수 없는 모양이다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「はい、兄さん――あ～ん」"
translation = "「자, 오빠── 아~ 해봐」"

[[dialogue]]
speaker = "unk"
original = "ゲームセンターで遊んだ後、俺たちはスイーツカフェで一息ついていた。"
translation = "게임 센터에서 논 뒤, 우리들은 디저트 카페에서 한숨 돌리고 있었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ケーキ、美味しい？」"
translation = "「케이크 맛있어?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「普段の私だと正体がバレたら大変だから、こういうこと、なかなかできなかったよね」"
translation = "「평소의 나였다면 정체를 들키면 큰일이니까 이런 거 좀처럼 할 수 없었지」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「デート中に『あ～ん』するの、前から憧れてたんだ♪」"
translation = "「데이트 중에 『아~』 해주는 거 예전부터 동경했었어♪」"

[[dialogue]]
speaker = "unk"
original = "――逆にした方がいいんじゃないか、と俺が提案すると。"
translation = "──반대로 해주는 게 좋지 않겠냐고 내가 제안하자."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「兄さんがしてくれるの？\u3000じ、じゃあ……あ～ん」"
translation = "「오빠가 해주는 거야? 그, 그럼…… 아~」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「あむっ……もぐもぐ……んっ、甘い……<emoji=heart04>」"
translation = "「아암…… 우물우물…… 응, 달콤해……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「は、恥ずかしいけど……悪くないかも♪」"
translation = "「부, 부끄럽지만…… 나쁘지 않을지도♪」"

[[dialogue]]
speaker = "unk"
original = "照れながら微笑むその表情に、胸が少しだけ熱くなった。"
translation = "수줍게 미소 짓는 그 표정에 가슴이 조금 뜨거워졌다."

[[dialogue]]
speaker = "unk"
original = "それからもデートは続き、気づけば空は夕焼け色に染まっていた。"
translation = "그 후로도 데이트는 계속되었고, 어느덧 하늘은 노을빛으로 물들어 있었다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「ねえ、兄さん。今日のデート……私の『妹キャラ』は、どうだった？」"
translation = "「저기, 오빠. 오늘 데이트…… 나의 『여동생 캐릭터』는 어땠어?」"

[[dialogue]]
speaker = "unk"
original = "並んで歩きながら、俺は素直な感想を伝える。"
translation = "나란히 걸으며 나는 솔직한 감상을 전한다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――なりきってたけど、無理してる感じはなくて、自然体で、楽しそうだった……？」"
translation = "「──몰입하고 있었지만 억지로 하는 느낌은 없었고, 자연스럽게 즐거워 보였어……?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「それは……ほら、会長って、仲のいい後輩の子たちから『お兄ちゃん』って呼ばれてるでしょ？」"
translation = "「그건…… 봐봐, 회장은 사이좋은 후배 아이들에게 『오빠』라고 불리고 있잖아?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「私は１人っ子なのもあって……自分もちょっと、妹気分を味わってみたかったというか……」"
translation = "「나는 외동이기도 해서…… 나도 조금 여동생 기분을 맛보고 싶었다고나 할까……」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「それで、もし自分に兄がいたとしたら、『兄さん』って呼んでたかも……なんて」"
translation = "「그래서 만약 나에게 오빠가 있었다면 『오빠』라고 불렀을지도…… 하고」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、恋人より兄っぽく接した方がいい？"
translation = "그럼 연인보다 오빠처럼 대하는 게 좋아?"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker = "unk"
original = "少し間を置いてから、レミカは小さく首を振る。"
translation = "잠시 틈을 둔 뒤 레미카는 작게 고개를 젓는다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「……血の繋がってない妹で、恋人って設定じゃないとやだ<emoji=heart04>」"
translation = "「……피가 섞이지 않은 여동생이면서 연인이라는 설정이 아니면 싫어<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「だって……デートなんだから、やっぱりドキドキしたいし……<emoji=heart04>」"
translation = "「그치만…… 데이트니까 역시 두근거리고 싶고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、さりげなく俺の手を握ってくるレミカに、俺は思わず笑みがこぼれてしまう。"
translation = "그렇게 말하며 넌지시 내 손을 잡아오는 레미카에게 나는 나도 모르게 미소가 지어지고 만다."

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「――え？\u3000今の照れてる私、すごく可愛いって……？」"
translation = "「──어? 지금 부끄러워하는 나, 엄청 귀엽다고……?」"

[[dialogue]]
speaker = "レミカ（幼少）"
original = "「も、もう……バカ兄さん<emoji=heart04>」"
translation = "「정, 정말…… 바보 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに手の甲をぺちぺちと叩いてくる、そんな仕草さえ愛おしい――可愛いレミカなのだった。"
translation = "부끄러운 듯 손등을 찰싹찰싹 때려오는 그런 몸짓조차 사랑스러운── 귀여운 레미카였다."

