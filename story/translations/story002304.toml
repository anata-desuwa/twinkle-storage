[[dialogue]]
speaker = "unk"
original = "かつてネビュラに所属していた『追憶の魔女』について、マリオンさんから話を聞く。"
translation = "과거 네뷸라에 소속되어 있던 『추억의 마녀』에 대해 마리온 씨에게 이야기를 듣는다."

[[dialogue]]
speaker = "マリオン"
original = "「イザベラは私と同期で、彼女は研究者としてネビュラの職務に従事していました」"
translation = "「이자벨라는 저와 동기였고, 그녀는 연구자로서 네뷸라의 직무에 종사하고 있었습니다.」"

[[dialogue]]
speaker = "マリオン"
original = "「彼女の研究テーマの１つに、魔女の森の結界と光の魔女がありました。特に先代たるトリュファイナ様について、熱心に調べていましたね」"
translation = "「그녀의 연구 테마 중 하나가 마녀의 숲의 결계와 빛의 마녀였습니다. 특히 선대이신 트류파이나 님에 대해 열심히 조사했었죠.」"

[[dialogue]]
speaker = "マリオン"
original = "「魔女の森を再現するために、光の魔女を人為的に生み出す。それがイザベラが犯した禁忌です」"
translation = "「마녀의 숲을 재현하기 위해 빛의 마녀를 인위적으로 만들어낸다. 그것이 이자벨라가 저지른 금기입니다.」"

[[dialogue]]
speaker = "マリオン"
original = "「禁忌が露呈したイザベラは逃亡しながら研究を続け、とうとう光の魔女の複製体を生み出しました。私がイザベラを討ったのはその直後です」"
translation = "「금기가 드러난 이자벨라는 도망치면서 연구를 계속해 드디어 빛의 마녀의 복제체를 만들어냈습니다. 제가 이자벨라를 처단한 것은 그 직후입니다.」"

[[dialogue]]
speaker = "マリオン"
original = "「複製体は戦闘の際に行方不明となっていましたが……この複製体こそ、コハルコ様なのです」"
translation = "「복제체는 전투 중에 행방불명되었습니다만…… 이 복제체가 바로 코하루코 님인 것입니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「私、ネビュラなのにその辺の事情、聞かされてなかったんですけど……」"
translation = "「저, 네뷸라인데도 그런 사정은 듣지 못했는데요……」"

[[dialogue]]
speaker = "マリオン"
original = "「ええ、あなたの権限ではアクセスできない秘匿事項でしたから」"
translation = "「네, 당신의 권한으로는 액세스할 수 없는 비닉 사항이었으니까요.」"

[[dialogue]]
speaker = "マリオン"
original = "「イザベラとコハルコ様については以上です。今は、秋葉原周辺に潜ませた私の人形たちが敵の居場所を特定中です。特定でき次第、救出に……あ」"
translation = "「이자벨라와 코하루코 님에 대해서는 이상입니다. 지금은 아키하바라 주변에 잠입시킨 제 인형들이 적의 거처를 특정하는 중입니다. 특정되는 대로 구조하러…… 아.」"

[[dialogue]]
speaker = "ナツコ"
original = "「リーリアさん、宿題おわったよ！\u3000ゲームしよ！\u3000あれ、お姉ちゃんは？」"
translation = "「리리아 언니, 숙제 다 했어! 게임 하자! 어라, 언니는?」"

[[dialogue]]
speaker = "トウコ"
original = "「会長さん、来てたんですね。コハルコお姉ちゃん知りませんか？」"
translation = "「회장님, 오셨네요. 코하루코 언니 못 봤나요?」"

[[dialogue]]
speaker = "リーリア"
original = "「えっと、コハルコ先輩は……」"
translation = "「에또, 코하루코 선배는……」"

[[dialogue]]
speaker = "コハルコ父"
original = "「お姉ちゃんは急な用事があってお出かけしてるよ。でも、迷子になっちゃったみたいだ」"
translation = "「언니는 급한 용무가 있어서 나갔단다. 하지만 길을 잃어버린 모양이야.」"

[[dialogue]]
speaker = "unk"
original = "今から迎えに行ってくるね"
translation = "지금부터 데리러 갈게"

[[dialogue]]
speaker = "トウコ"
original = "「会長さん、お姉ちゃんをよろしくお願いします」"
translation = "「회장님, 언니를 잘 부탁드려요.」"

[[dialogue]]
speaker = "ナツコ"
original = "「かいちょーさんなら安心だね！\u3000じゃあ、リーリアさんゲームしよっ」"
translation = "「회장님이라면 안심이네! 그럼 리리아 언니 게임 하자!」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、どうしましょう……」"
translation = "「선배, 어쩌죠……」"

[[dialogue]]
speaker = "unk"
original = "リーリアはふたりについていてあげて"
translation = "리리아는 두 사람 곁에 있어 줘"

[[dialogue]]
speaker = "unk"
original = "秋葉原で戦闘になる可能性を考えると、誰かついていた方がいいだろう。それに、ナツコちゃんとトウコちゃんを不安にさせたくない。"
translation = "아키하바라에서 전투가 벌어질 가능성을 생각하면 누군가 곁에 있는 게 좋을 것이다. 게다가 나츠코와 토우코를 불안하게 만들고 싶지 않다."

[[dialogue]]
speaker = "リーリア"
original = "「分かりました。コハルコ先輩のこと、お願いしますね。……よし、じゃあゲームしよっか！」"
translation = "「알겠습니다. 코하루코 선배를 부탁드려요. ……좋아, 그럼 게임 할까!」"

[[dialogue]]
speaker = "コハルコ父"
original = "「緋宮くん。コハルコは何か事件に巻き込まれているんだろう？\u3000……いつも君たち星騎士を危険に晒してすまない。でも、どうかコハルコを連れて帰ってきてほしい」"
translation = "「히노미야 군. 코하루코는 무슨 사건에 휘말린 거지? ……항상 너희 성기사들을 위험에 빠뜨려서 미안하구나. 하지만 부디 코하루코를 데리고 돌아와 주길 바란다.」"

[[dialogue]]
speaker = "コハルコ父"
original = "「あの子は、なまじ何でもできるから、１人で抱え込んでしまう。情けないけど、僕ではダメだ。でも君なら……」"
translation = "「그 아이는 어설프게 뭐든 할 줄 아니까 혼자 껴안아 버려. 한심하지만 나로서는 안 돼. 하지만 너라면……」"

[[dialogue]]
speaker = "unk"
original = "必ずコハルコさんを助けます"
translation = "반드시 코하루코 씨를 구하겠습니다"

[[dialogue]]
speaker = "コハルコ父"
original = "「ありがとう。どうかあの子を……よろしく頼む」"
translation = "「고맙네. 부디 그 아이를…… 잘 부탁하네.」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんのお父さんの言葉に強く頷き、朝比奈家を後にした。"
translation = "코하루코 씨의 아버지의 말씀에 강하게 고개를 끄덕이고 아사히나가를 뒤로했다."

[[dialogue]]
speaker = "unk"
original = "マリオンさんの人形がイザベラの潜伏場所を見つけた。マリオンさんの案内に従って秋葉原を進む。"
translation = "마리온 씨의 인형이 이자벨라의 잠복처를 찾아냈다. 마리온 씨의 안내에 따라 아키하바라를 나아간다."

[[dialogue]]
speaker = "マリオン"
original = "「秋葉原中に人形を張り巡らせた甲斐がありました。懐かしい気配がします」"
translation = "「아키하바라 곳곳에 인형을 깔아둔 보람이 있군요. 그리운 기운이 느껴집니다.」"

[[dialogue]]
speaker = "unk"
original = "さっき、なんで隠れたんですか？"
translation = "아까 왜 숨으신 거예요?"

[[dialogue]]
speaker = "unk"
original = "コハルコさんの家族が店から出てきたとき、マリオンさんは姿を消していた。おそらく幻惑魔法か何かだろう。"
translation = "코하루코 씨의 가족이 가게에서 나왔을 때 마리온 씨는 모습을 감췄었다. 아마 환혹 마법이나 뭐 그런 거겠지."

[[dialogue]]
speaker = "マリオン"
original = "「……ネビュラは当初、光の魔女の複製体──コハルコ様も粛清対象としていました。光の魔女は一代に１人しか生まれないからです」"
translation = "「……네뷸라는 당초 빛의 마녀의 복제체── 코하루코 님도 숙청 대상으로 삼고 있었습니다. 빛의 마녀는 한 세대에 한 명밖에 태어나지 않기 때문이죠.」"

[[dialogue]]
speaker = "マリオン"
original = "「不完全な光の魔女の存在が、新たな光の魔女の誕生を妨げないように、と。クラウディア様がお生まれになったため、その方針は取り消されましたが」"
translation = "「불완전한 빛의 마녀의 존재가 새로운 빛의 마녀의 탄생을 방해하지 않도록 하기 위해서였습니다. 클라우디아 님이 태어나셨기에 그 방침은 취소되었습니다만.」"

[[dialogue]]
speaker = "マリオン"
original = "「私はコハルコ様をも手にかけようとしていたのです。あの頃の私は、それを疑問に思わなかった」"
translation = "「저는 코하루코 님조차 해치려 했던 것입니다. 그 시절의 저는 그것을 의문스럽게 여기지 않았죠.」"

[[dialogue]]
speaker = "マリオン"
original = "「人間と深く関わる前……トワと出会う前の私は酷く薄情な女でしたから、今になって、後ろめたくなってしまって……コハルコ様と彼女の家族に顔向け出来なかったのです」"
translation = "「인간과 깊이 엮이기 전…… 토와와 만나기 전의 저는 무척 박정한 여자였으니까요. 이제 와서 면목이 없어져서…… 코하루코 님과 그녀의 가족을 대면할 수가 없었습니다.」"

[[dialogue]]
speaker = "マリオン"
original = "「その贖罪というわけではありませんが、コハルコ様は必ず……」"
translation = "「그 속죄라는 것은 아니지만, 코하루코 님은 반드시……」"

[[dialogue]]
speaker = "マリオン"
original = "「──！\u3000会長様！」"
translation = "「──! 회장님!」"

[[dialogue]]
speaker = "unk"
original = "マリオンさんが注意を促した瞬間、俺たちの目の前が弾けた。"
translation = "마리온 씨가 주의를 준 순간, 우리 눈앞이 터져 나갔다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "レイラ"
original = "「そこまでです、魔王さん」"
translation = "「거기까지입니다, 마왕님.」"

[[dialogue]]
speaker = "レイラ"
original = "「ここから先はお通しできません。通りたければ、コラプサー首領、百目騎レイラがお相手いたします」"
translation = "「여기서부터는 보내드릴 수 없습니다. 지나가고 싶다면 콜랩서 수령, 도메키 레이라가 상대해 드리겠습니다.」"

