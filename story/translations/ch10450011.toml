[[dialogue]]
speaker = "unk"
original = "第１話,会長さんを分析させて？,P"
translation = "제1화, 회장님을 분석하게 해줘?, P"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「こんにちは、新星学園の会長さん。お邪魔するわね♪」"
translation = "「안녕, 신성학원의 회장님. 실례할게♪」"

[[dialogue]]
speaker = "unk"
original = "あなたは流星学園の……？"
translation = "당신은 유성 학원의……?"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ええ。流星学園で数学教師と……リクリエの分析官も担当しています。エスメラルダ・シーメインよ」"
translation = "「응. 유성 학원에서 수학 교사와…… 리크리에 분석관도 담당하고 있어. 에스메랄다 시메인이야.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「気さくに『エスメラルダ先生』って呼んでね♪」"
translation = "「편하게 『에스메랄다 선생님』이라고 불러줘♪」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「今日は会長さんに用事があって……って、あれれ？\u3000何だかちょっぴり、緊張してる雰囲気ね」"
translation = "「오늘은 회장님께 용건이 있어서…… 어라라? 왠지 조금 긴장한 분위기네.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「あ──そっか。私が先生だからかな」"
translation = "「아── 그렇구나. 내가 선생님이라서 그런가.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「そうよね～。急に教師が『用事がある！』なんて言い出したら、何かやっちゃったかも～って思っちゃうわよね」"
translation = "「그렇지～. 갑자기 교사가 『용건이 있어!』라고 하면, 뭔가 잘못했을지도～라고 생각하게 되지.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「大丈夫、悪いニュースじゃないから。今日は純粋に、会長さんとお話がしたくてやってきただけなの」"
translation = "「괜찮아, 나쁜 소식은 아니니까. 오늘은 순수하게 회장님과 이야기하고 싶어서 왔을 뿐이야.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ちょ～っとあなたに興味が湧いてきちゃって」"
translation = "「조～금 너에게 흥미가 생겨버려서 말이지.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ヴィーナスさんとの御前試合、私も映像で見せてもらったわ」"
translation = "「비너스 씨와의 어전 시합, 나도 영상으로 봤어.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「すごかったわね。編入して間もなかったのに勝っちゃうだなんて」"
translation = "「대단했지. 편입한 지 얼마 안 됐는데 이겨버리다니.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「私も昔は星騎士として活動していたことがあるからわかるの。あなたは普通の子たちとどこか違う。特別だってね」"
translation = "「나도 예전에는 별의 기사로 활동한 적이 있어서 알아. 너는 보통 아이들과 어딘가 달라. 특별하다고 말이야.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「わずかな訓練期間でヴィーナスさんを破ったこともそうだし、モンスターを惹きつけるっていう体質のことも気になるわ」"
translation = "「짧은 훈련 기간에 비너스 씨를 꺾은 것도 그렇고, 몬스터를 끌어들이는 체질이라는 것도 신경 쓰여.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「元星騎士として。現役の分析官として。あなたのことを色々測定させてもらいたくてやってきた、というわけね♪」"
translation = "「전직 별의 기사로서. 현역 분석관으로서. 너에 대해 이것저것 측정해 보고 싶어서 왔다는 말씀♪」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「時間があるなら、ぜひ測定に協力して欲しいのだけど……大丈夫かしら？」"
translation = "「시간이 있다면 꼭 측정에 협조해 줬으면 좋겠는데…… 괜찮을까?」"

[[dialogue]]
speaker = "unk"
original = "分析官とは、その名の通りモンスターやリクリエに関するデータを収集し、その実態を詳らかにしていく役職の事を指す。"
translation = "분석관이란 그 이름대로 몬스터나 리크리에에 관한 데이터를 수집하고 그 실태를 명명백백히 밝혀내는 직책을 말한다."

[[dialogue]]
speaker = "unk"
original = "流星学園のエスメラルダ先生と言えば、新星学園でも名の知れた分析官だ。"
translation = "유성 학원의 에스메랄다 선생님이라고 하면 신성학원에서도 이름난 분석관이다."

[[dialogue]]
speaker = "unk"
original = "みんなが俺のことを魔王だと言う。だが俺は、そんな自分のことを何も知らない。先生に調べてもらえるのならば願ったりだ。"
translation = "모두가 나를 마왕이라고 한다. 하지만 나는 그런 나 자신에 대해 아무것도 모른다. 선생님이 조사해 준다면 바랄 나위 없다."

[[dialogue]]
speaker = "unk"
original = "そう思い、俺はエスメラルダ先生の測定に付き合うことになったのだが──"
translation = "그렇게 생각하여 나는 에스메랄다 선생님의 측정에 응하게 되었는데──"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「あ。動かないでね。メジャーがずれちゃうから……ん、はーい。ありがとう♪」"
translation = "「아. 움직이지 마. 줄자가 어긋나니까…… 응, 됐다. 고마워♪」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「協力的でとっても嬉しいわ～。ふふ～、いっぱいデータが集まったわね」"
translation = "「협조적이라서 정말 기뻐～. 후후～, 데이터가 잔뜩 모였네.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「えーっと、身長でしょ、体重でしょ、肩幅に、座高に、足のサイズに視力測定も終わり……っと」"
translation = "「보자, 키랑 몸무게, 어깨너비, 앉은키에 발 사이즈랑 시력 측정도 끝났고……」"

[[dialogue]]
speaker = "unk"
original = "これって、ただの身体測定なのでは……？"
translation = "이거 그냥 신체검사 아닌가요……?"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「そうよー。測定はいつだって地味なもの。だけど侮っちゃだめ。どんな些細なことでも記録することが大事なんだから」"
translation = "「맞아. 측정은 언제나 수수한 법이야. 하지만 얕보면 안 돼. 어떤 사소한 것이라도 기록하는 게 중요하니까.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「本当に些細な数字が、大きな発見の入口になってることなんてしょっちゅうなんだから」"
translation = "「정말 사소한 숫자가 커다란 발견의 입구가 되는 일은 아주 흔하거든.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「うーん。魔王、魔王と言われるけれど……体は本当に普通の子たちと変わらないのね」"
translation = "「으음. 마왕, 마왕이라고들 하지만…… 몸은 정말 보통 아이들과 다를 게 없네.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「細身だけど、しっかり鍛えてる男の子～って感じ……」"
translation = "「마른 편이지만 확실히 단련된 남자아이～라는 느낌……」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「──いえ。思い込みは危険よね。どこかで平均値と大きくかけ離れたデータが出てくるかもしれないんだから」"
translation = "「──아니. 선입견은 위험해. 어딘가에서 평균치와 크게 동떨어진 데이터가 나올지도 모르니까.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「よし、それじゃあ第２ステップにいくわよ」"
translation = "「좋아, 그럼 제2단계로 갈게.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「服、全部脱いでくれるかしら♪」"
translation = "「옷, 전부 벗어줄래♪」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？\u3000服を！？"
translation = "에엣!? 옷을요!?"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ええ。次は体脂肪率とか筋肉の密度とか、その他色々な項目を測っていくから。制服を着たままじゃ数値がブレちゃうの」"
translation = "「응. 다음은 체지방률이나 근육 밀도, 그 외 여러 항목을 잴 거니까. 교복을 입은 채로는 수치가 틀어지거든.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「大丈夫よー。私は先生で、会長さんは生徒なんだから。好きな女の子の前じゃないんだし、恥ずかしくないでしょ～？」"
translation = "「괜찮아～. 나는 선생님이고 회장님은 학생이니까. 좋아하는 여자애 앞도 아니고, 부끄럽지 않지?」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしいです！\u3000服を引っ張らないで！"
translation = "부끄러워요! 옷 잡아당기지 마세요!"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「失礼するわね。何だか廊下まで悲鳴が聞こえたのだけど……」"
translation = "「실례하겠습니다. 왠지 복도까지 비명이 들린 것 같아서……」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「あ。ウィステリア。久しぶり～♪」"
translation = "「아. 위스테리아. 오랜만이야～♪」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「エスメラルダ先輩！？\u3000えっ、な、なななっ、何で会長くんの服を脱がしているんですかっ！？」"
translation = "「에스메랄다 선배!? 엣, 나, 나나낫, 왜 회장군의 옷을 벗기고 계신 건가요!?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「困ってるのよ～。私が『脱いで』ってお願いしてるのに、この子、脱いでくれないの」"
translation = "「곤란하다니까～. 내가 『벗어줘』라고 부탁하는데 이 아이, 안 벗어줘.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「えっ？\u3000えっえっ、えっ！？」"
translation = "「엣? 엣엣, 엣!?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「あ、そうだ。良かったらウィステリアからもお願いしてくれない？\u3000あなたの頼みなら彼も聞いてくれるかも♪」"
translation = "「아, 맞다. 괜찮다면 위스테리아도 같이 부탁해 줄래? 네 부탁이라면 그도 들어줄지도 몰라♪」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「さ、３人で！？\u3000そういうのはみだりがましいと言いますかっ……し、し、失礼しましたー！」"
translation = "「세, 세 명이서요!? 그런 건 파렴치하다고 할까…… 시, 시, 실례했습니다──!」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「あん、待ってよー、先輩が困ってるのに～！」"
translation = "「안 돼, 기다려 봐～, 선배가 곤란해하는데～!」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「っと、会長さんは逃げたら駄目よ？\u3000ちゃ～んと最後まで付き合ってね♪」"
translation = "「앗, 회장님은 도망가면 안 돼? 끝까지 확실히 어울려 줘야 해♪」"

[[dialogue]]
speaker = "unk"
original = "その後、何とか服を剥かれるのは阻止したが、ウィステリアさんに事情を説明するのに苦労したのだった……"
translation = "그 후, 어떻게든 옷이 벗겨지는 건 저지했지만, 위스테리아 씨에게 사정을 설명하느라 고생했다……"

