[[dialogue]]
speaker = "unk"
original = "第９話,アポロの弱さ,B"
translation = "제9화, 아폴로의 약함, B"

[[dialogue]]
speaker = "unk"
original = "ベアトリスを探すため、秘密基地を出た梨緒、ナターシャ、アポロ。"
translation = "베아트리스를 찾기 위해 비밀기지를 나선 리오, 나타샤, 아폴로."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「今はリノの魔法で空間をねじれさせて、デネブの一般人に見えるようにしている。よほどのことがないとバレないが、あんまり目立つなよ」"
translation = "「지금은 리노의 마법으로 공간을 비틀어서 데네브의 일반인처럼 보이게 하고 있다. 웬만한 일이 아니면 안 들키겠지만 너무 눈에 띄지는 마라.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はーい。秘密基地に隠蔽魔法に、魔女様様だね」"
translation = "「네~ 비밀기지에 은폐 마법까지, 마녀님 최고네.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だけどどうやってベアトを探そっか。極星学園に戻ってたら探しようがなくない？」"
translation = "「근데 어떻게 베아토를 찾지? 극성학원으로 돌아갔으면 찾을 방법이 없지 않아?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「バックアップメンバーが極星学園周辺を監視してくれているが、ベアトは学園には戻っていないらしい。今も街のどこかにいると思ってよさそうだ」"
translation = "「백업 멤버가 극성학원 주변을 감시하고 있는데 베아토는 학원으로 돌아가지 않은 모양이야. 지금도 거리 어딘가에 있다고 봐도 좋겠지.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「なるほど。でも街中から探すのは大変そうだなー。どうする、委員長？」"
translation = "「그렇구나. 하지만 거리 전체에서 찾는 건 힘들겠네~ 어떻게 할까, 위원장?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……梨緒？」"
translation = "「……리오?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「どうした、朝飯が足りなかったか？」"
translation = "「왜 그러지, 아침밥이 부족했나?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「アポロ。君は私に『弱さを許せ』と言った」"
translation = "「아폴로. 너는 나에게 『약함을 용서하라』고 말했다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そう言う君は、誰かに弱さを許してもらったことがあるのか？」"
translation = "「그렇게 말하는 너는 누군가에게 약함을 용서받은 적이 있는 건가?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「んー……そうだな、話しておくか」"
translation = "「음…… 그렇군, 이야기해 둘까.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……ああ、そうだ。あたしも自分の弱さを受け止めてもらって、助けてもらった」"
translation = "「……아아, 그래. 나도 내 약함을 받아들여 줘서 도움을 받았지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしは星見家の長女として生まれ、魔王になって世界を救う宿命を背負っていた」"
translation = "「나는 호시미 가문의 장녀로 태어나 마왕이 되어 세계를 구할 숙명을 짊어지고 있었다.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だが幼い頃のあたしは、その重圧に耐え切れなかった」"
translation = "「하지만 어린 시절의 나는 그 중압감을 견뎌내지 못했어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしだけが頑張らないといけない世界は間違ってる。そんな世界は壊れてしまえばいい」"
translation = "「나 혼자서만 노력해야 하는 세계는 잘못됐어. 그런 세계 따위 부서져 버리면 돼.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だから世界をまっさらにしてやる──そう思ってしまった」"
translation = "「그러니 세계를 백지로 만들어 버리겠다── 그렇게 생각하고 말았지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そこを付け込まれて、あたしはリクリエの使徒になった」"
translation = "「그 틈을 찔려 나는 리크리에의 사도가 되었다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「なるほど。その気持ちわかるかも」"
translation = "「과연. 그 기분 이해할 수 있을지도.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「使徒になってから、謝って許されないこともたくさんした。流星市国を襲って、街を破壊して、世界を滅ぼす一歩手前までいった」"
translation = "「사도가 되고 나서 사과해도 용서받지 못할 짓을 많이 저질렀다. 유성시국을 습격하고 거리를 파괴하고 세계를 멸망시키기 직전까지 갔었지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「でもフィオナや魔王はあたしを責めなかった。それどころか、あたしを救おうと手を差し伸べてくれた」"
translation = "「하지만 피오나나 마왕은 나를 탓하지 않았어. 오히려 나를 구하려고 손을 내밀어 주었지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしが何度その手を跳ねのけても、諦めずに手を伸ばしてくれたんだ」"
translation = "「내가 몇 번이나 그 손을 뿌리쳐도 포기하지 않고 손을 뻗어 주었어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そのおかげで、あたしは今ここにいる」"
translation = "「그 덕분에 나는 지금 여기에 있다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「魔王に助けられたって話だったね。アルタイルのアポロにも聞いてるよ」"
translation = "「마왕에게 구원받았다는 이야기였네. 알타이르의 아폴로에게도 들었어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そっか、その辺は向こうのあたしも一緒だったな。だけど──」"
translation = "「그렇구나, 그 부분은 저쪽의 나도 똑같았나 보네. 하지만──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だけど？」"
translation = "「하지만?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「それだけじゃないんだ」"
translation = "「그것뿐만이 아니야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「どういう意味だ……？」"
translation = "「무슨 뜻이지……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「もしあたしがリクリエの使徒になっていなければ、エリシアと一緒に戦えてたかもしれない」"
translation = "「만약 내가 리크리에의 사도가 되지 않았다면 엘리시아와 함께 싸울 수 있었을지도 몰라.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「エリシアを死なせずに済んだかもしれない。世界を守れたかもしれない」"
translation = "「엘리시아를 죽게 하지 않았을지도 모르고 세계를 지켰을지도 모르지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしのせいで、アルタイルだけじゃなくてデネブでも、いろんな人が死んだかもしれない」"
translation = "「나 때문에 알타이르뿐만 아니라 데네브에서도 많은 사람이 죽었을지도 몰라.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だけどリノはあたしを責めなかった。あいつだって息子を亡くしてるのに、エリシアが死んで泣いてるあたしを抱き締めてくれた」"
translation = "「하지만 리노는 나를 탓하지 않았어. 그 녀석도 아들을 잃었는데도 엘리시아가 죽어서 울고 있는 나를 안아주었지.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だからあたしは過ぎた過去を振り返るのはやめた。今度こそヒーローになるって約束したしな」"
translation = "「그래서 나는 지나간 과거를 돌아보는 건 그만뒀어. 이번에야말로 히어로가 되겠다고 약속했으니까 말이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「もし……」"
translation = "「만약……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ん？\u3000どうした？」"
translation = "「응? 왜 그래?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「もしリクリエの使徒になっていなければ、エリシアを死なせなかったかもしれない……君はそう言った。だが本当にそうか？」"
translation = "「만약 리크리에의 사도가 되지 않았다면, 엘리시아를 죽게 하지 않았을지도 모른다…… 너는 그렇게 말했지. 하지만 정말 그럴까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私の世界──ベガにはフィオナもエリシアもいた。私もジグもいた。それでも世界は滅んだ」"
translation = "「나의 세계── 베가에는 피오나도 엘리시아도 있었어. 나도 지그도 있었지. 그런데도 세계는 멸망했어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから、その……きっと君がいても結果は変わらなかったんじゃないか？」"
translation = "「그러니까, 그…… 분명 네가 있었어도 결과는 바뀌지 않았을 거라는 생각이 들어서.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「んん？\u3000何が言いたい？」"
translation = "「응? 무슨 말이 하고 싶은 거야?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それってアポロが弱いって意味？」"
translation = "「그거 아폴로가 약하다는 뜻이야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや！\u3000そうじゃなくて、その……」"
translation = "「아니! 그런 게 아니라, 그……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしは悪くない、って言いたいのか？」"
translation = "「내 잘못이 아니라고, 그렇게 말해주고 싶은 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そ、そうだ！\u3000そう言いたかったんだ！」"
translation = "「그, 그래! 그렇게 말하고 싶었어!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「フ……ハハハッ！\u3000お前、言い方が下手だな！\u3000最初はけなされてるのかと思ったぞ」"
translation = "「후…… 하하하! 너, 말주변이 진짜 없구나! 처음엔 비꼬는 줄 알았다고.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「でもありがとな。それが弱さを許すってことだ。ちゃんとできてるじゃないか」"
translation = "「하지만 고마워. 그게 약함을 용서한다는 거구나. 제대로 하고 있잖아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そ、そうなのか……？」"
translation = "「그, 그런 건가……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そうだよ。ま、偉そうに言ってるあたしもまだまだヒーローになろうとしてる途中だけどな」"
translation = "「그렇고말고. 뭐, 잘난 듯이 말하는 나도 아직 히어로가 되어가는 도중이지만 말이야.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そしてヒーローは弱さを強さに変えるものだ」"
translation = "「그리고 히어로는 약함을 강함으로 바꾸는 법이지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「弱さを……強さに……」"
translation = "「약함을…… 강함으로……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ。強くなりたいなら、弱さと向き合わなくちゃいけない」"
translation = "「그래. 강해지고 싶다면, 약함과 마주해야만 해.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それが『許す』ことなのか？」"
translation = "「그게 『용서』하는 거야?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、そういうことだ」"
translation = "「어, 바로 그거야.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「誰かを『赦す』ってことは、もちろん口で言うほど簡単なことじゃない。だけどそこまでわかってるなら大丈夫だろ」"
translation = "「누군가를 『용서』한다는 건, 물론 말처럼 쉬운 일은 아니지. 하지만 거기까지 깨달았다면 괜찮을 거야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「許す……赦す……」"
translation = "「용서…… 용서……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「正直、君の言っていることが全て理解できたわけじゃない」"
translation = "「솔직히, 네가 하는 말을 전부 이해한 건 아니야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それでもなんとなく……なんとなくだが、ベアトリスに話すべきことが浮かんできた気がする」"
translation = "「그래도 왠지…… 왠지 모르겠지만, 베아트리스에게 해줘야 할 말이 떠오른 것 같아.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ならお節介焼いた甲斐があるってもんだ。お前は見るからに危なっかしいから、ついつい口が出ちゃうんだよ」"
translation = "「그럼 참견한 보람이 있네. 너는 보기에도 아슬아슬해 보여서 나도 모르게 참견하게 된다니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……余計なお世話だ」"
translation = "「……쓸데없는 참견이야.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒が何か掴んだのはいいんだけどー、ベアト探しは全然進んでないんだよね。いっそベアトの方から見つけてもらうとか？」"
translation = "「리오가 뭔가 깨달은 건 좋은데 말이야─, 베아토 찾기는 전혀 진척이 없네. 차라리 베아토 쪽에서 우리를 찾아내게 한다던가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ここは敵地だ。見境なく自分たちの居場所を知らせるわけにはいかない。それに今のままではベアトは私たちを避けるだろう」"
translation = "「여기는 적지다. 무턱대고 우리 위치를 알릴 수는 없어. 게다가 지금 상태로는 베아토가 우리를 피하겠지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトにだけ伝わるメッセージでもあればいいんだが……」"
translation = "「베아토에게만 전해지는 메시지라도 있으면 좋으련만……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ベアトにだけ伝わる……か」"
translation = "「베아토에게만 전해지는…… 건가.」"

[[dialogue]]
