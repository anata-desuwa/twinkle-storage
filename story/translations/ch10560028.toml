[[dialogue]]
speaker = "アム"
original = "「ふーっ、いっぱい泳いで楽しかった～♪\u3000プライベートビーチだと、やっぱり貸し切りだから開放感があるよね！」"
translation = "「후- 잔뜩 수영해서 즐거웠어~♪ 프라이빗 비치는 역시 통째로 빌린 거라 개방감이 있네!」"

[[dialogue]]
speaker = "アム"
original = "「今日はあんまり遅くなっちゃダメってお母さんからも言われてるし。そろそろシャワー浴びて帰ろっか、会長」"
translation = "「오늘은 너무 늦으면 안 된다고 엄마한테도 들었으니까. 슬슬 샤워하고 돌아가자, 회장.」"

[[dialogue]]
speaker = "クロト"
original = "「そうしようか。先にシャワー室、使っていいよ」"
translation = "「그러자. 먼저 샤워실 써도 돼.」"

[[dialogue]]
speaker = "アム"
original = "「うん、ありがとっ♪\u3000それじゃあ……っと。うわ、また食い込んじゃってる～……」"
translation = "「응, 고마워♪ 그럼…… 앗. 우와, 또 끼어버렸어~……」"

[[dialogue]]
speaker = "unk"
original = "歩き出そうとしたアムだったが、お尻に食い込んでいたスク水の居心地が悪かったのか。くいっと直す仕草をした。"
translation = "걸어가려던 아무였지만, 엉덩이에 끼어 있던 학교 수영복이 불편했는지. 슥 하고 바로잡는 몸짓을 했다."

[[dialogue]]
speaker = "アム"
original = "「──ん、しょっと。あたし、最近またお尻が大きくなってきたかなぁ……？\u3000泳いでるとすぐ、水着が食い込んじゃうんだよね……」"
translation = "「──영, 차. 나, 최근에 또 엉덩이가 커진 건가……? 수영하고 있으면 금방 수영복이 끼어버린단 말이지……」"

[[dialogue]]
speaker = "アム"
original = "「でも買い替えるのもなあ……って、会長？\u3000どうかしたの？」"
translation = "「하지만 새로 사는 것도 좀…… 그런데 회장? 왜 그래?」"

[[dialogue]]
speaker = "アム"
original = "「──ええ！？\u3000ドキっとしたって……ちょ、ちょっと急すぎない？\u3000今の、どっかコーフンするところあった！？」"
translation = "「──에엣!? 두근거렸다니…… 조, 좀 너무 갑작스럽지 않아? 방금 게 어디 흥분할 구석이 있었다고!?」"

[[dialogue]]
speaker = "アム"
original = "「……わ、わかったよ～。相手してあげるから……その代わり、さっさと終わらせてよね？」"
translation = "「……아, 알았어~. 상대해줄 테니까…… 대신에, 빨리 끝내야 한다?」"

[[dialogue]]
speaker = "アム"
original = "「外だと恥ずかしいし……シャワー室、一緒に行こ？」"
translation = "「밖이면 부끄러우니까…… 샤워실, 같이 가자.」"

[[dialogue]]
speaker = "アム"
original = "「……って、もぉお～っ……<emoji=heart04>\u3000時間ないって言ってるのに、そんなところにおち○ちん入れちゃってるし……！」"
translation = "「……랄까, 정말~……<emoji=heart04> 시간 없다고 말했는데 벌써 그런 곳에 자지 넣어버리고……!」"

[[dialogue]]
speaker = "アム"
original = "「んんっ……水着の中でビクビクしてる……会長のおち○ちん、熱すぎじゃん……<emoji=heart04>」"
translation = "「음응…… 수영복 안에서 움찔움찔하고 있어…… 회장의 자지, 너무 뜨겁잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「会長ってさ。本当にあたしのお尻、好きだよね……エッチする前にそうやって擦りつけるの、癖になってない……？」"
translation = "「회장은 말이야. 정말 내 엉덩이 좋아하는구나…… 섹스하기 전에 그렇게 문지르는 거, 버릇이 된 거 아냐……?」"

[[dialogue]]
speaker = "クロト"
original = "「正直、なってると思う……」"
translation = "「솔직히, 된 것 같아.」"

[[dialogue]]
speaker = "unk"
original = "元気いっぱい、朗らかな性格のアム。そんな彼女がちょっぴり気にしている、大きくて丸いお尻が、俺は大好きなのだった。"
translation = "활기차고 쾌활한 성격의 아무. 그런 그녀가 조금 신경 쓰고 있는, 크고 둥근 엉덩이를 나는 아주 좋아했다."

[[dialogue]]
speaker = "アム"
original = "「うぅ～……なんか複雑。おっきいお尻、コンプレックスなんだけどなぁ……」"
translation = "「으으~…… 왠지 복잡해. 큰 엉덩이, 콤플렉스인데 말이야……」"

[[dialogue]]
speaker = "アム"
original = "「まぁ会長が喜んでくれるならいっか……おち○ちん、お尻でスリスリしてあげると……にひ♪\u3000めっちゃ気持ちよさそうな顔してくれるし<emoji=heart04>」"
translation = "「뭐 회장이 기뻐해 준다면 됐나…… 자지, 엉덩이로 부비부비 해주면…… 니히♪ 엄청 기분 좋은 표정 지어주고<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「それで、どーお？\u3000いつもはパンツの隙間に入れてるけど、今日は水着だよん？\u3000締め付けも相当きついんじゃない？」"
translation = "「그래서, 어때? 평소에는 팬티 틈새로 넣지만, 오늘은 수영복이라고? 조이는 것도 상당히 심하지 않아?」"

[[dialogue]]
speaker = "アム"
original = "「あはっ<emoji=heart04>\u3000おち○ちん、ぶるって震えた♪\u3000やっぱ強くぎゅーってされた方が、気持ちいいんだ？」"
translation = "「아핫<emoji=heart04> 자지가 파르르 떨렸어♪ 역시 강하게 꽉 조여주는 게 기분 좋은 거야?」"

[[dialogue]]
speaker = "unk"
original = "食い込みやすいと言うだけあって締め付けがすごい。水着でぴっちり押さえつけられて、柔らかな尻肉にペニスが埋まる感覚が心地よかった。"
translation = "끼기 쉽다고 말한 만큼 조임이 대단하다. 수영복으로 빈틈없이 눌려져, 부드러운 엉덩이 살에 페니스가 파묻히는 감각이 기분 좋았다."

[[dialogue]]
speaker = "アム"
original = "「わ、わわぁっ……<emoji=heart04>\u3000まだ太くなるんだ？<emoji=heart04>\u3000スクール水着、伸びちゃうってばー……<emoji=heart04>」"
translation = "「와, 와아……<emoji=heart04> 아직 더 굵어지는 거야?<emoji=heart04> 학교 수영복, 늘어난다고 정말-……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "時間がたっぷりとれるなら、このまま尻コキで１回、射精までしてしまいたいくらいだけど──"
translation = "시간을 듬뿍 낼 수 있다면, 이대로 엉덩이 섹스로 한 번, 사정까지 해버리고 싶을 정도지만──"

[[dialogue]]
speaker = "アム"
original = "「さっきも言ったけど、今日は早く帰らなきゃだからさー……？\u3000そ、そろそろ……いいでしょ？」"
translation = "「아까도 말했지만, 오늘은 일찍 돌아가야 하니까 말이야-? 슬, 슬슬…… 괜찮지?」"

[[dialogue]]
speaker = "アム"
original = "「会長のおち○ちん、あたしのおま○こに、入れて……？」"
translation = "「회장의 자지, 내 보지에, 넣어줘……?」"

[[dialogue]]
speaker = "unk"
original = "ふりふり、ふりふり──アムが真っ白なお尻を振ってくる。"
translation = "흔들흔들, 흔들흔들── 아무가 새하얀 엉덩이를 흔들어온다."

[[dialogue]]
speaker = "unk"
original = "こんなエッチな誘われ方をしたら、もっと強い刺激が欲しくなってしまう。俺はペニスを水着の隙間から引き抜いて……"
translation = "이런 음란한 유혹을 받으면, 더 강한 자극을 원하게 되어버린다. 나는 페니스를 수영복 틈새에서 뽑아내어……"

[[dialogue]]
speaker = "アム"
original = "「んんんっ……はぁ、あっ<emoji=heart04>\u3000おち○ちん、キタ、ぁっ……<emoji=heart04>」"
translation = "「음음응…… 하아, 앗<emoji=heart04> 자지, 왔다, 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「おま○こ、びしょ濡れだって……あ、当たり前じゃんっ。彼氏のおち○ちん、ずっとスリスリされて、ドキドキしてたんだから……！」"
translation = "「보지, 흠뻑 젖었다니…… 다, 당연하잖아. 남자친구 자지에 계속 부비부비 당해서, 두근두근하고 있었으니까……!」"

[[dialogue]]
speaker = "アム"
original = "「はあ、あっ……おっきぃいぃ……<emoji=heart04><emoji=heart04>\u3000あ、ぁっ……それに、んぁっ……いつもより、絶対に硬いよぉ……<emoji=heart04>」"
translation = "「하아, 앗…… 커어어……<emoji=heart04><emoji=heart04> 아, 앗…… 게다가, 응앗…… 평소보다 확실히 딱딱해……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「んん、ふぅっ……スク水姿のあたしとエッチできて、ムラムラしちゃってるの……？\u3000な、なんか会長、変態っぽくない……？<emoji=heart04>」"
translation = "「음음, 후우…… 학교 수영복 차림인 나랑 섹스할 수 있어서 야해져 버린 거야……? 왠, 왠지 회장, 변태 같지 않아……?<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「へへ<emoji=heart04>\u3000でもエッチな彼氏の欲望を満たしてあげるのも、カノジョのお役目だしっ……<emoji=heart04>\u3000いいよ、動いてっ……<emoji=heart04>」"
translation = "「헤헤<emoji=heart04> 하지만 음란한 남자친구의 욕망을 채워주는 것도 여자친구의 역할이니까……<emoji=heart04> 좋아, 움직여줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頬を染めながら笑うアムに、俺はピストンで応える──"
translation = "뺨을 붉히며 웃는 아무에게, 나는 피스톤으로 화답한다──"

[[dialogue]]
speaker = "アム"
original = "「はぁあ、あ、ああっ……ん、んんぅっ<emoji=heart04>\u3000んんぅ、ぁ、あぁあ、うぅ、んんんっ……！<emoji=heart04>」"
translation = "「하아아, 아, 아앗…… 응, 응으으<emoji=heart04> 응으, 아, 아아아, 으으, 응음……! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「は、ぁ、ぅ……あぁっ<emoji=heart04>\u3000おち○ちん、すっごく熱い、熱い、よぉぉっ……<emoji=heart04>」"
translation = "「하, 아, 우…… 아앗<emoji=heart04> 자지, 엄청 뜨거워, 뜨거워어어……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ふぅ、んんっ<emoji=heart04>\u3000あ、ぅう、んんっ<emoji=heart04>\u3000あ、あ、あああ、ぁあっ……うん<emoji=heart04>\u3000気持ち、いいっ……あっ、はぁ、んんっ<emoji=heart04>」"
translation = "「후우, 응응<emoji=heart04> 아, 우우, 응응<emoji=heart04> 아, 아, 아아아, 아앗…… 응<emoji=heart04> 기분, 좋아…… 앗, 하아, 응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゆっくりと出し入れするたびに、ぶるぶると快感で震えるアムのお尻がエロ可愛い。"
translation = "천천히 넣고 뺄 때마다 부르르 쾌감으로 떨리는 아무의 엉덩이가 야하고 귀엽다."

[[dialogue]]
speaker = "アム"
original = "「んはぁ、は、ふぅ、んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ぁっぁっぁ──あっ<emoji=heart04>\u3000おへその裏のところ、ぐりぐりってするの、だ、ダメだって、ばぁ……<emoji=heart04>」"
translation = "「음하아, 하, 후우, 응응<emoji=heart04> 앗<emoji=heart04> 앗앗앗── 앗<emoji=heart04> 배꼽 뒤쪽, 문질문질하는 거, 안, 안 된다니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "流星附属最硬のディフェンス力を持つアムだが、おま○この防御力はよわよわ。"
translation = "유성 부속 최강의 디펜스력을 가진 아무지만, 보지의 방어력은 허접. "

[[dialogue]]
speaker = "unk"
original = "ピストンのたびに、気持ちよさから太ももをきゅっと閉じる癖も、彼氏の俺だけが知っている秘密だ。"
translation = "피스톤을 할 때마다 기분 좋아서 허벅지를 꽉 오므리는 버릇도 남자친구인 나만 알고 있는 비밀이다."

[[dialogue]]
speaker = "アム"
original = "「んん、ぁ、あ、ぅ、ふぅっ<emoji=heart04>\u3000弱点を突くのは、戦いの基本って……な、何言ってるのさ、会長っ……！<emoji=heart04>」"
translation = "「응응, 아, 아, 우, 후우<emoji=heart04> 약점을 찌르는 건 싸움의 기본이라니…… 무, 무슨 말을 하는 거야, 회장……!<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「あたしだって、んんっ<emoji=heart04>\u3000会長の弱いところ、知ってるんだからっ……！<emoji=heart04>\u3000んん、んんぅ～っ……！<emoji=heart04>」"
translation = "「나도, 응응<emoji=heart04> 회장의 약한 곳, 알고 있으니까……! <emoji=heart04> 응응, 응응으으~……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを包んでいる膣穴が、揉むように動いて絡みついてくる。"
translation = "페니스를 감싸고 있는 질 구멍이 주무르듯 움직이며 얽혀온다."

[[dialogue]]
speaker = "クロト"
original = "「──っ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "アム"
original = "「おま○こ、ぎゅうってされると、はぁっ<emoji=heart04>\u3000気持ちいいでしょっ<emoji=heart04>\u3000体を使うのは、んんっ<emoji=heart04>\u3000得意なんだからね、あたしっ……んぁっ<emoji=heart04>」"
translation = "「보지, 꽉 조여지면, 하아<emoji=heart04> 기분 좋지?<emoji=heart04> 몸을 쓰는 건, 응응<emoji=heart04> 특기니까 말이야, 나…… 응앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "運動神経の良いアムは、度重なるエッチの経験から、おま○この締め付けを自在に操れるようになっていた。"
translation = "운동신경이 좋은 아무는 거듭된 섹스 경험을 통해 보지의 조임을 자유자재로 다룰 수 있게 되었다."

[[dialogue]]
speaker = "アム"
original = "「それに会長、おっきなお尻、大好きでしょ<emoji=heart04>\u3000んん、んんっ<emoji=heart04>\u3000ほ、ほらっ、見ていいよー？<emoji=heart04>\u3000いっぱいお尻見て、さっさとイっちゃい、なよっ<emoji=heart04>」"
translation = "「게다가 회장, 커다란 엉덩이 아주 좋아하잖아<emoji=heart04> 응응, 응응<emoji=heart04> 자, 자아, 봐도 된다고? <emoji=heart04> 잔뜩 엉덩이 보고, 얼른 싸버리라고<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アムが自分でお尻を掴んで、左右に引っ張って強調してくる。"
translation = "아무가 직접 엉덩이를 잡고 좌우로 벌려 강조해온다."

[[dialogue]]
speaker = "unk"
original = "柔らかいのに張りのあるヒップは、ピストンのたびにたぷったぷっと波打つからたまらない。"
translation = "부드러우면서도 탄력 있는 히프는 피스톤을 할 때마다 출렁출렁 물결치기에 참을 수가 없다."

[[dialogue]]
speaker = "アム"
original = "「あはっ♪\u3000おち○ちん、すっごく反りかえって、るぅっ♪\u3000ふ、ふっふ～ん<emoji=heart04>\u3000会長の、スケベっ<emoji=heart04>\u3000お尻マニア～……<emoji=heart04>」"
translation = "「아핫♪ 자지, 엄청나게 휘었어♪ 후, 후후─ㄴ<emoji=heart04> 회장, 변태<emoji=heart04> 엉덩이 매니아~……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「たくさんコーフンして、あたしより先にイっちゃえっ……<emoji=heart04>\u3000んん、はぁ、んん、ふぅ、んんっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>」"
translation = "「잔뜩 흥분해서 나보다 먼저 싸버려……<emoji=heart04> 응응, 하아, 응응, 후우, 응응<emoji=heart04> 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小柄な彼女の、大きなお尻のアピールにどんどん射精欲が高まってくる。"
translation = "자그마한 그녀의 커다란 엉덩이 어필에 점점 사정 욕구가 높아진다."

[[dialogue]]
speaker = "unk"
original = "強いピストンをしたい、そう思った時──"
translation = "강한 피스톤을 하고 싶다, 그렇게 생각한 때──"

[[dialogue]]
speaker = "マトイ"
original = "「は～、リップルに会えてよかったぁ～……あれ、誰か入ってる？」"
translation = "「하아~ 리플을 만나서 다행이다아~…… 어라, 누구 들어와 있어?」"

[[dialogue]]
speaker = "アム"
original = "「えっ──！？」"
translation = "「엣──!?」"

[[dialogue]]
speaker = "unk"
original = "いきなりシャワー室にマトイの声がして、驚きのあまりセックスを止めてしまう俺たち。"
translation = "갑자기 샤워실에서 마토이의 목소리가 들려, 놀란 나머지 섹스를 멈춰버리는 우리들."

[[dialogue]]
speaker = "アム"
original = "「ま、マトイ先輩！？\u3000ど、どうしてっ……？」"
translation = "「마, 마토이 선배!? 어, 어떻게……?」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、プライベートビーチ使ってる人ってアムちゃんだったんだ？\u3000ごめんね、こっちのシャワー室、失礼しま～す」"
translation = "「아, 프라이빗 비치 쓰고 있는 사람이 아무짱이었구나? 미안해, 이쪽 샤워실 좀 실례할게~」"

[[dialogue]]
speaker = "アム"
original = "「あ、あ、あのっ……！？」"
translation = "「아, 아, 저기요!?」"

[[dialogue]]
speaker = "unk"
original = "シャワー室は、いくつかの仕切りで区切られている。マトイは俺たちの隣の隣のブースへ入り、シャワーを浴び始めた。"
translation = "샤워실은 몇 개의 칸막이로 나뉘어 있다. 마토이는 우리 옆옆 부스로 들어가 샤워를 하기 시작했다."

[[dialogue]]
speaker = "マトイ"
original = "「トレーニングルームのシャワーが故障しちゃってね。リップルがリゾート結界に入れてくれたんだー」"
translation = "「트레이닝 룸 샤워가 고장 나버려서 말이야. 리플이 리조트 결계에 넣어줬어─」"

[[dialogue]]
speaker = "アム"
original = "「そ、そうだったん、ですねっ……あ、あははっ……<emoji=heart04>」"
translation = "「그, 그러셨군요…… 아, 아하하……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のペニスを根元まで咥えたまま、マトイと会話をするアム。その様子を見ていると、何だか無性に興奮してきてしまって──"
translation = "내 페니스를 뿌리까지 문 채로 마토이와 대화를 하는 아무. 그 모습을 보고 있으니 왠지 걷잡을 수 없이 흥분되어버려──"

[[dialogue]]
speaker = "アム"
original = "（……っ！？\u3000ちょ、ちょっと……なんでおち○ちん硬くしてるのっ……ダメだってば……！）"
translation = "(……윽!? 저, 저기…… 왜 자지 딱딱하게 만드는 거야…… 안 된다니까……!)"

[[dialogue]]
speaker = "アム"
original = "（シャワーの水音があるから大丈夫って……ちょ、ちょっとぉ……！？）"
translation = "(샤워 물소리가 있으니까 괜찮다니…… 저, 저기요……!?)"

[[dialogue]]
speaker = "アム"
original = "「んんんぅ！？っ<emoji=heart04>\u3000んっ、んぅぅっ、んんぅう～……！<emoji=heart04>」"
translation = "「음음음으!? 윽<emoji=heart04> 응, 응으으, 응음으으~……!<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「……？\u3000アムちゃん、何か言ったー？」"
translation = "「……? 아무짱, 뭐라고 했어?」"

[[dialogue]]
speaker = "アム"
original = "「い、いえっ！\u3000な、何、もぉ、ぉおっ……！<emoji=heart04>\u3000う、んんぅっ<emoji=heart04>\u3000ない、れすぅっ……ぁぅ、ふぅ、ぁ、ぅうう、ぅううっ……！<emoji=heart04>」"
translation = "「아, 아니요! 아, 아무, 으, 으으윽……!<emoji=heart04> 우, 응응으<emoji=heart04> 거 아니에요오…… 아우, 후우, 아, 우우우, 우우우윽……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アムを逃がさないようにピストンしながら、シャワーの蛇口を強めにひねって水音を強くする。"
translation = "아무를 놓치지 않도록 피스톤하며, 샤워기 수도꼭지를 세게 틀어 물소리를 키운다."

[[dialogue]]
speaker = "アム"
original = "「ちょ、ちょっとストップ……<emoji=heart04>\u3000はぁ、おち○ちん、奥までらめ、ぇっ……はぁっ、はぁ、ふう、ぅううっ<emoji=heart04>\u3000バレちゃ、バレちゃう、かりゃあっ……<emoji=heart04>」"
translation = "「자, 잠깐 스톱……<emoji=heart04> 하아, 자지, 안쪽까지 안 대, 에…… 하아, 하아, 후우, 우우우윽<emoji=heart04> 들켜, 들켜버리니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "スリルで全身が強張り、おま○こをぎゅうぎゅうと締めてしまうアムが可愛い。エロい。だからもっといじめたくなってしまう。"
translation = "스릴 때문에 전신이 뻣뻣해져 보지를 꽉꽉 조여버리는 아무가 귀엽다. 야하다. 그래서 더 괴롭히고 싶어진다."

[[dialogue]]
speaker = "アム"
original = "「や、やぁぁあっ……はぁぁ、そんなに奥のところ、ごりごりしたりゃっ……ふぅう～っ<emoji=heart04>\u3000んんぅっ、ふぅっ、ぁあぁ、ぁぅう～っ……<emoji=heart04>」"
translation = "「야, 야아아앗…… 하아아, 그렇게 안쪽을 고리고리 하면…… 후우우~<emoji=heart04> 응음으, 후우, 아아아, 아우우~……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ま、待って、ぇっ<emoji=heart04>\u3000おち○ちん、ぴしゅとんっ、しょこ、弱いから、りゃめぇ……ぁ、あ、あああっ<emoji=heart04>\u3000ふぅ、ふぅうっ、ふぅうう～っ<emoji=heart04>」"
translation = "「기, 기다려, 에<emoji=heart04> 자지, 피스톤, 거기 약하니까 안 대…… 아, 아, 아아아앗<emoji=heart04> 후우, 후우우, 후우우우~<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「こ、声、でりゅっ<emoji=heart04>\u3000ん、ぅ、んぉっ<emoji=heart04>\u3000え、エッチな声、とまりゃなく、なりゅ、からぁっ……！<emoji=heart04>」"
translation = "「모, 목소리, 나와버렷<emoji=heart04> 응, 으, 응오<emoji=heart04> 에, 에로한 목소리, 안 멈추게, 되니까아……! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ガマン、むりぃっ<emoji=heart04>\u3000バレりゅっ、バレたらヤバい、からあっ……あふぅうっ<emoji=heart04>\u3000──ぁ、ああ、ぁあっ<emoji=heart04>\u3000ふぅ、んん、んんぅっ……！<emoji=heart04>」"
translation = "「참는 거 무리이<emoji=heart04> 들켜버렷, 들키면 큰일 나니까아…… 아후우우<emoji=heart04> ──아, 아아, 아앗<emoji=heart04> 후우, 응응, 응응으……! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「あ、あぅっ……！\u3000ダメって言ってるのに、さ、さっきから、き、気持ち、いぃ、とこばっかり、ぃいいぃっ……！<emoji=heart04>」"
translation = "「아, 아우……! 안 된다고 말했는데, 아, 아까부터 기, 기분 조, 은 곳만, 이이이이이……! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「はっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あ、ぅーっ……んぅ、ぁ、ぁ──は、ぁあ、あっああ、ぁあ、あぁっ<emoji=heart04>\u3000んんん、ぁ、あああっ……！<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하아앗<emoji=heart04> 아, 우으─ 으, 아, 아── 하, 아아, 앗아아, 아아, 아아앗<emoji=heart04> 응응응, 아, 아아아앗……! <emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ふんふん、ふ～ん……♪」"
translation = "「흠흠, 흠~♪」"

[[dialogue]]
speaker = "アム"
original = "「おちっ、おち○ちん、ぐりぐり、りゃめぇ──ぅ、んんぅ、……は、はあああ、はぁあっ、んん、んんぅっ、ふぅうっ<emoji=heart04>」"
translation = "「자짓, 자지, 고리고리 안 대── 우, 응응으, ……하, 하아아아, 하아앗, 응응, 응응으, 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "声を抑えようとして、それでも喘ぎ声を我慢できないアムに興奮を抑えられない。"
translation = "목소리를 억누르려 하면서도 신음 소리를 참지 못하는 아무에게 흥분을 억제할 수 없다."

[[dialogue]]
speaker = "unk"
original = "セックスアピール抜群のデカ尻を引き寄せるようにして、ペニスをじっくりと根元まで突き込んでしまう。"
translation = "섹스 어필 발군인 데카지리를 끌어당기듯 하며, 페니스를 느긋하게 뿌리까지 박아 넣는다."

[[dialogue]]
speaker = "アム"
original = "「は、あぁ、あぁあっ<emoji=heart04>\u3000マトイせんぱい、にぃっ、見つかっちゃう、ってば、ぁあっ……は、あぁ、あぁあっ……<emoji=heart04><emoji=heart04>\u3000んんんっ……<emoji=heart04>」"
translation = "「하, 아아, 아아앗<emoji=heart04> 마토이 선배한테에, 드, 들켜버린다니카아앗…… 하, 아아, 아아앗……<emoji=heart04><emoji=heart04> 응응음……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「あ、ぁうっ……んんぅ、ふぅ、ぁ、あぅあっ……ぉっ<emoji=heart04>\u3000あぁあっ……ふぅ、ふうぅ、んんぅ、んんぅうう～っ……！<emoji=heart04>」"
translation = "「아, 아우윽…… 응응으, 후우, 아, 아우앗…… 오<emoji=heart04> 아아앗…… 후우, 후우우, 응응으, 응응으으으~……! <emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「──これでよし、っと。それじゃあアムちゃん、先に出るね。お邪魔しました～」"
translation = "「──이걸로 됐네. 그럼 아무짱, 먼저 나갈게. 실례했습니다~」"

[[dialogue]]
speaker = "アム"
original = "「は、はっ──は、ぃぃ、ぃっ……マトイ先輩っ、お、お疲れ様、で──すぅっ……んぁ、あ、あぁああっ……！<emoji=heart04>」"
translation = "「하, 하아─ 하, 이이, 이이…… 마토이 선배, 수, 수고하셨, 어요오…… 응아, 아, 아아아앗……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイの足音が遠ざかり、シャワー室から出て行った。"
translation = "마토이의 발소리가 멀어지며 샤워실에서 나갔다."

[[dialogue]]
speaker = "unk"
original = "ちょっと強引に求めてしまったし、怒られるかなと思ったら──アムが向けてきたのは、とろりと発情した眼差しだった。"
translation = "좀 강압적으로 요구해버렸고, 화낼까 싶었는데── 아무가 향한 것은 걸쭉하게 발정난 눈빛이었다."

[[dialogue]]
speaker = "アム"
original = "「か、会長っ……ゆっくりのぴすとん、もうダメぇっ<emoji=heart04>\u3000は、激しくっ<emoji=heart04>\u3000激しくしてぇっ<emoji=heart04>\u3000強いぱんぱん<emoji=heart04>\u3000ぱんぱんしてぇっ！<emoji=heart04>」"
translation = "「회, 회장…… 천천히 하는 피스톤, 이제 안 대<emoji=heart04> 버, 버겁게<emoji=heart04> 격렬하게 해줘<emoji=heart04> 강하게 팡팡<emoji=heart04> 팡팡 해줘! <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──アムっ！」"
translation = "「──아무!」"

[[dialogue]]
speaker = "アム"
original = "「ふぁあぁ、あ、あぁあ、あぁあ～っ……！？<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいい、気持ちいい気持ちいいっ！<emoji=heart04>\u3000おち○ちん気持ちいいよぉおぉおっ！<emoji=heart04>」"
translation = "「파아아, 아, 아아아, 아아아~……!? <emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋아, 기분 좋아 기분 좋아! <emoji=heart04> 자지 기분 좋아아아아아앗! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「それいいっ<emoji=heart04>\u3000それしてっ<emoji=heart04>\u3000もっとしてぇっ<emoji=heart04>\u3000あ、ああ、はぁ、ぁぅ、んんぅんんぁ、あ、あっあっあっ──あぁぁああ～っ……！<emoji=heart04>」"
translation = "「그거 좋아<emoji=heart04> 그거 해줘<emoji=heart04> 더 해줘어<emoji=heart04> 아, 아아, 하아, 아우, 응응응응아, 아, 앗앗앗── 아아아아아~……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイがそばにいた時から、幾度となく敏感なおま○こを突かれていたアム。"
translation = "마토이가 곁에 있었을 때부터 몇 번이고 민감한 보지를 찔리고 있던 아무."

[[dialogue]]
speaker = "unk"
original = "感じているのに声を出せないというのは、相当な『焦らし』だったに違いない。こんな風に発情して、おねだりされたのは初めてだった。"
translation = "느끼고 있는데 목소리를 낼 수 없다는 것은 상당한 『애태우기』였음이 틀림없다. 이런 식으로 발정해서 졸라온 것은 처음이었다."

[[dialogue]]
speaker = "アム"
original = "「んぉっ<emoji=heart04>\u3000お、おぉぉ、おぉぉっ<emoji=heart04>\u3000おぉおっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んんん～っ……ふぅ、ふぅうっ<emoji=heart04>\u3000やば、そこやばぁっ<emoji=heart04>\u3000気持ち、気持ちいいっ<emoji=heart04>」"
translation = "「음오<emoji=heart04> 오, 오오오, 오오오오앗<emoji=heart04> 오오오앗<emoji=heart04><emoji=heart04><emoji=heart04> 응응음~…… 후우, 후우우<emoji=heart04> 대박, 거기 대바악<emoji=heart04> 기분, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「あたしのおま○こっ<emoji=heart04>\u3000びしょびしょに濡れちゃってる<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000会長の、おち○ちん、すっごくイイっ<emoji=heart04>\u3000おっ、おっぉっ、おおぉっ！<emoji=heart04>」"
translation = "「내 보지<emoji=heart04> 비실비실 젖어버렸어<emoji=heart04> 응읏<emoji=heart04> 회장님의 자지, 정말 좋아<emoji=heart04> 오, 오오읏, 오오오읏! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつものアムなら俺より先にイクことを良しとしない。負けず嫌いな性格のせいか、ぎりぎりまでイクのを我慢して俺をイカせようとしてくるのに。"
translation = "평소의 아무라면 나보다 먼저 가는 것을 좋아하지 않는다. 지기 싫어하는 성격 탓인지, 아슬아슬할 때까지 가는 걸 참으면서 나를 가게 만들려고 하는데."

[[dialogue]]
speaker = "アム"
original = "「も、もぉ無理っ<emoji=heart04>\u3000あたしの負け<emoji=heart04>\u3000負けでいいかりゃぁっ<emoji=heart04>\u3000もっとぱんぱんっ<emoji=heart04>\u3000おま○こイカせてぇっ<emoji=heart04>\u3000あぁ、あぁあ～っ！<emoji=heart04>」"
translation = "「이, 이제 무리야<emoji=heart04> 내가 졌어<emoji=heart04> 져도 좋으니까아앗<emoji=heart04> 더 팡팡<emoji=heart04> 보지 가게 해줘어엇<emoji=heart04> 아아, 아아아~앗! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ぉ、お、おおぉおっ<emoji=heart04>\u3000会長のおち○ちん好きっ<emoji=heart04>\u3000ぶっとくて気持ちいぃよぉっ<emoji=heart04>\u3000あぁあ、ああ、うう、んんぅ<emoji=heart04>\u3000ふぅう、ぁあ、あ、ぁああ～っ！<emoji=heart04>」"
translation = "「오, 오, 오오오옷<emoji=heart04> 회장님 자지 좋아<emoji=heart04> 굵직해서 기분 좋아아앗<emoji=heart04> 아아아, 아아, 으으, 응응으<emoji=heart04> 후우우, 아아, 아, 아아아~앗! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスのピストンをより感じられるように、アムは自分でお尻の高さを調節までし始める。"
translation = "페니스의 피스톤을 더 잘 느낄 수 있도록, 아무는 스스로 엉덩이 높이를 조절하기까지 시작한다."

[[dialogue]]
speaker = "unk"
original = "セックスの快感に溺れる恋人が可愛くて、俺も全力でアムのお尻を波打たせる。"
translation = "섹스의 쾌감에 빠진 연인이 귀여워서, 나도 전력으로 아무의 엉덩이를 요동치게 만든다."

[[dialogue]]
speaker = "アム"
original = "「んんんっ！<emoji=heart04>\u3000ふぅう、ふうぅっ<emoji=heart04>\u3000ぅあ、あぁ、あぁあ～っ……！<emoji=heart04>\u3000イ、イっぢゃうっ<emoji=heart04>\u3000イっぢゃう、すごいの来る、来るぅうっ！<emoji=heart04>」"
translation = "「응응읏! <emoji=heart04> 후우우, 후우우읏<emoji=heart04> 으아, 아아, 아아아~앗……! <emoji=heart04> 가, 가버려어엇<emoji=heart04> 가버려, 굉장한 게 와, 온다아앗! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「んんぁあ、はぁあ、はああ<emoji=heart04>\u3000あああ、あぁああっ！<emoji=heart04>\u3000お、ぉ、ぉっおぉ、おぉぉ、おぉおっ！<emoji=heart04>」"
translation = "「응응아아, 하아아, 하아아<emoji=heart04> 아아아, 아아아앗! <emoji=heart04> 오, 오, 오오오, 오오오, 오오옷! <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も……限界、だっ……！」"
translation = "「나도…… 한계, 다……!」"

[[dialogue]]
speaker = "アム"
original = "「う、うんっ、あたしも限界っ<emoji=heart04>\u3000だかりゃっ<emoji=heart04>\u3000かいちょっ、中っ<emoji=heart04>\u3000中に出してっ<emoji=heart04>\u3000熱いのいっぱい、びゅーってしてっ、して、してぇぇえっ<emoji=heart04>」"
translation = "「으, 응, 나도 한계야<emoji=heart04> 그러니까앗<emoji=heart04> 회장님, 안쪽에<emoji=heart04> 안에 싸줘엇<emoji=heart04> 뜨거운 거 잔뜩, 뷰룻 하고 해줘, 해줘, 해줘어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「あ、あぁ、あぁあ、あああっ！？<emoji=heart04>\u3000イグっ、イグイグイグイグイグっ──イッグぅうぅぅううう～っ……！！<emoji=heart04>」"
translation = "「아, 아아, 아아아, 아아앗!? <emoji=heart04> 가버렷, 가버려가버려가버려가버려가버렷── 가버려어어어어어어어~어……!! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「あぁぁあっ！<emoji=heart04>\u3000ふぁあああぁああぁあ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앗! <emoji=heart04> 화아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ムチムチのお尻をがっちりと掴んで、一切の遠慮なしの中出し。"
translation = "포동포동한 엉덩이를 꽉 움켜쥐고, 일절의 사정없는 질내사정."

[[dialogue]]
speaker = "アム"
original = "「んんっ<emoji=heart04>\u3000んんんぅうっ<emoji=heart04>\u3000しゅご、ぃ、ぃいっ<emoji=heart04>\u3000熱いの、いっぱい──はぁあああっ！<emoji=heart04>\u3000あぁっ……ぁああぁっ……ぁ、あぁあ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 응응응으읏<emoji=heart04> 조, 조아, 아앗<emoji=heart04> 뜨거운 거, 잔뜩── 하아아아앗! <emoji=heart04> 아앗……아아아앗……아, 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「中出しっ……あ、ぁあ～っ……気持ち、ぃいいぃっ<emoji=heart04>\u3000ふぅ、ぅっ……んんんうっ！<emoji=heart04>」"
translation = "「질내사정…… 아, 아아~앗…… 기분, 조오오아앗<emoji=heart04> 후으, 으읏…… 응응응읏! <emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「んはぁあっ！？<emoji=heart04>\u3000お、お尻もっ！？\u3000あ、あぁぁぁっ<emoji=heart04><emoji=heart04>\u3000会長の精液、熱いよぉおおぉっ……ふわあぁああ～っ<emoji=heart04>」"
translation = "「응하아앗!? <emoji=heart04> 엉, 엉덩이도!? 아, 아아아아앗<emoji=heart04><emoji=heart04> 회장님의 정액, 뜨거워어어어엇…… 후와아아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスがアムのおま○こから外れた弾みで、スクール水着と大きなお尻にも精液をぶっかけてしまった。"
translation = "페니스가 아무의 보지에서 빠진 반동으로, 학교 수영복과 커다란 엉덩이에도 정액을 뿌리고 말았다."

[[dialogue]]
speaker = "アム"
original = "「はぁああ～っ……はぁあーっ……ふーっ……ふぅううー……ふぅうっ……<emoji=heart04>」"
translation = "「하아아아~…… 하아아…… 후우…… 후우우우…… 후우으……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「会長の精液、すっごい量<emoji=heart04>\u3000あぅっ、ふぅっ……ど、どんだけ出したの、これぇ<emoji=heart04>」"
translation = "「회장님의 정액, 엄청난 양<emoji=heart04> 아으, 후우…… 도, 대체 얼마나 싼 거야, 이거어<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ぅうぅ～……今日は、ほんとに時間、ないからぁ……ムラムラした会長と、サクっと１回、するだけのつもりだったのにぃ……<emoji=heart04>」"
translation = "「으으으~…… 오늘은, 정말로 시간이, 없으니까아…… 몸이 달아오른 회장님이랑, 가볍게 한 판, 하기만 할 생각이었는데에……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ど、どうしよう……会長<emoji=heart04>\u3000あ、あたし……もぉ、ガマンできなく……なっちゃった<emoji=heart04>\u3000もっと、もっとしたいよぉ<emoji=heart04>」"
translation = "「어, 어떡해…… 회장님<emoji=heart04> 저, 저어…… 이제, 더는 못 참겠…… 어어어<emoji=heart04> 더, 더 하고 싶어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おま○こから大量の精液をこぼしつつ、アムがお尻を振ってくる。"
translation = "보지에서 대량의 정액을 흘리면서, 아무가 엉덩이를 흔들어 온다."

[[dialogue]]
speaker = "アム"
original = "「お、おかーさんには、遅くなるって連絡……入れるから……あと１回だけ、し、しよ……？\u3000ダメ？<emoji=heart04>」"
translation = "「어, 엄마한테는, 늦는다고 연락…… 할 테니까…… 딱 한 번만 더, 하, 하자……? 안 돼?<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「いっぱい出したけど、会長のおち○ちん、まだまだできるでしょ……？<emoji=heart04>\u3000お願ぁい<emoji=heart04><emoji=heart04>」"
translation = "「잔뜩 쌌지만, 회장님 자지, 아직 더 할 수 있잖아……?<emoji=heart04> 부탁이야아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "スリルのあるエッチで発情してしまったアムが、射精したばかりの俺のペニスを、何度も何度もお尻で磨いてくる……"
translation = "스릴 넘치는 섹스로 발정해 버린 아무가, 방금 사정한 나의 페니스를 몇 번이고 몇 번이고 엉덩이로 비벼 온다……"

[[dialogue]]
speaker = "unk"
original = "それで思いきり火が点いてしまって──その後、俺は何度も何度もアムに中出しをしてしまうのだった。"
translation = "그것 때문에 완전히 불이 붙어 버려서── 그 후, 나는 몇 번이고 몇 번이고 아무에게 질내사정을 하는 것이었다."

