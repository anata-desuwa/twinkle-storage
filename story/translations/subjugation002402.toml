[[dialogue]]
speaker = "unk"
original = "解放のロストアイテムにより、封印から解き放たれたトレジアンナさん。"
translation = "해방의 로스트 아이템에 의해 봉인에서 풀려난 트레지안나 씨."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「――というわけで、ついにお披露目です☆\u3000これが私の本当の姿ですよ～♪」"
translation = "「──그런 고로, 드디어 피로연이에요☆ 이것이 저의 진짜 모습이랍니다~♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「小さいけど、大きい！」"
translation = "「작은데 커!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふっふっふっ♪\u3000前に言ったことありましたけど、可愛くてダイナマイトボディなのは嘘じゃなかったでしょ～？」"
translation = "「훗훗훗♪ 전에 말한 적 있지만, 귀엽고 다이너마이트 바디인 건 거짓말이 아니었죠~?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「これまでずっと一緒にいたのに、改めて本当のトレジアンナさんと向き合うと、変な感じがしますね」"
translation = "「지금까지 계속 함께였는데, 새삼스럽게 진짜 트레지안나 씨와 마주하니 기분이 이상하네요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私もです♪\u3000生身で会えて嬉しいですよ、サチさん♪」"
translation = "「저도 그래요♪ 실물로 만날 수 있어 기뻐요, 사치 씨♪」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに笑い合う２人。"
translation = "기쁜 듯이 서로 웃는 두 사람."

[[dialogue]]
speaker = "unk"
original = "そこでふと、サチが思い出したように――"
translation = "그때 문득 사치가 생각난 듯이──"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ、そうだ、トレジアンナさん。前にディーラックさんが言ってたことって……」"
translation = "「앗, 맞다 트레지안나 씨. 전에 디럭쿠 씨가 했던 말은……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そうでしたね。あの時は有耶無耶にしちゃってましたけど、復活した以上、ちゃんと素性を明かす必要があります」"
translation = "「그랬었죠. 그때는 흐지부지 넘어갔지만, 부활한 이상 제대로 정체를 밝힐 필요가 있어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「みなさん、まずは今まで隠していてごめんなさい。実は私の正体は――『魔女』なんです」"
translation = "「여러분, 우선 지금까지 숨겨서 죄송해요. 사실 제 정체는── 『마녀』예요」"

[[dialogue]]
speaker = "unk"
original = "以前、ディーラックが起こした、シズハの聖杯と解放のロストアイテムを巡る事件。"
translation = "이전에 디럭쿠가 일으킨 시즈하의 성배와 해방의 로스트 아이템을 둘러싼 사건."

[[dialogue]]
speaker = "unk"
original = "その時に、ディーラックがトレジアンナさんの正体について語っていたのだ。"
translation = "그때 디럭쿠가 트레지안나 씨의 정체에 대해 이야기했던 것이다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「３０００年前のリクリエよりも遥か昔、リクリエによってリセットされてしまった１つ前の人類史を生きていた魔女――それが私なんです」"
translation = "「3000년 전의 리크리에보다 훨씬 옛날, 리크리에에 의해 리셋되어 버린 바로 전 인류사를 살았던 마녀── 그것이 저예요」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「確か以前、ロストアイテムはリクリエを迎えた世界の中にあっても、再構築されずに存在し続けるものだって、仰られていましたよね」"
translation = "「분명 이전에 로스트 아이템은 리크리에를 맞이한 세계 속에 있어도 재구축되지 않고 계속 존재한다고 말씀하셨죠」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい。私はロストアイテム『精神の水晶』の中に封印されて、ずっと眠っていました。だから、リクリエを乗り越え、存在し続けられたというわけです」"
translation = "「네. 저는 로스트 아이템 『정신의 수정』 속에 봉인되어 계속 잠들어 있었어요. 그래서 리크리에를 넘어서 계속 존재할 수 있었다는 거죠」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ちなみに魔女は長寿種ですが、流石に１万年も生きた例はありません。私がこうして精神と肉体を保持していられたのは、あくまでも封印されていたお陰ですね」"
translation = "「참고로 마녀는 장수종이지만, 아무리 그래도 1만 년이나 살았던 예는 없어요. 제가 이렇게 정신과 육체를 유지할 수 있었던 건 어디까지나 봉인되어 있었던 덕분이죠」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「大昔の魔女の森では、私は『蒐集の魔女』という名で呼ばれていました。こう見えて私、当時はかなり有名な魔女だったんですよ～？」"
translation = "「아주 먼 옛날 마녀의 숲에서는 제가 『수집의 마녀』라는 이름으로 불렸어요. 이래 봬도 저, 당시에는 꽤 유명한 마녀였다고요~?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「まあでも、好奇心旺盛すぎるのが祟って、元老会とは折り合いが悪かったんですけどね～」"
translation = "「뭐 하지만 호기심이 너무 왕성했던 게 화근이 되어 원로회와는 사이가 좋지 않았지만요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「三界には霊術を始めとした未解明の不思議な力、そしてなにより――ロストアイテムが存在していると知って、よく旅に出ては蒐集して、森の中に持ち帰ってましたから」"
translation = "「삼계에는 영술을 비롯한 미해명의 신비한 힘, 그리고 무엇보다── 로스트 아이템이 존재한다는 걸 알고 자주 여행을 떠나 수집해서 숲속으로 가져왔으니까요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「で、ある時、強制的にコレクションを没収されそうになって、ついに<ruby>出奔<rt>しゅっぽん</rt></ruby>して『<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>』になっちゃったというわけです」"
translation = "「그래서 어느 날 강제로 컬렉션을 몰수당할 뻔해서 드디어 출분해 『<ruby>낙오 마녀<rt>야가</rt></ruby>』가 되어버렸다는 이야기예요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それから私は、三界を旅して興味あるものを蒐集し、研究する生活を送るようになりました」"
translation = "「그후로 저는 삼계를 여행하며 흥미 있는 것을 수집하고 연구하는 생활을 보내게 되었어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「中でも、当時から見ても大昔の『はぐれ魔女』が作り出したといわれる『ロストアイテム』たちに、私は強く興味を惹かれました」"
translation = "「그중에서도 당시 기준으로 봐도 아주 먼 옛날의 『낙오 마녀』가 만들었다고 전해지는 『로스트 아이템』들에 저는 강하게 흥미를 느꼈어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「研究にのめり込んで、自分でも真似して、幾つかのロストアイテムを作り出すことに成功しました」"
translation = "「연구에 몰두해서 저 스스로도 흉내 내며 몇 가지 로스트 아이템을 만드는 데 성공했죠」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ですが……同時に、ロストアイテムの恐ろしいリスクに気づくことにもなりました」"
translation = "「하지만…… 동시에 로스트 아이템의 무서운 리스크를 깨닫게 되기도 했어요」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それが、ロストアイテムを使うたびに排出される『マイナスエネルギー』……」"
translation = "「그것이 로스트 아이템을 사용할 때마다 배출되는 『마이너스 에너지』……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そうです。目に見えず、物理的に計測できず。しかし概念的には確かに存在すると判明したそれが、世界に膨大な塵として溜まり続けていることに」"
translation = "「맞아요. 눈에 보이지 않고 물리적으로 계측할 수 없지만, 개념적으로는 확실히 존재한다고 판명된 그것이 세계에 방대한 먼지로서 계속 쌓이고 있다는 사실을요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「溜まったマイナスエネルギーがいつか大きな災害――たとえば未曽有の大爆発のような現象を引き起こすであろうことは、予想できていました」"
translation = "「쌓인 마이너스 에너지가 언젠가 큰 재앙── 예를 들어 전대미문의 대폭발 같은 현상을 일으킬 거라는 건 예상하고 있었어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それがまさか、自我を持ってディーラックさんになるとは思いもしませんでしたが……」"
translation = "「그게 설마 자아를 가지고 디럭쿠 씨가 될 줄은 생각도 못 했지만요……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ともかく、私はマイナスエネルギーの危険性を知って、三界のロストアイテムを全て回収することを決めました。ですが、その途中でドジって――」"
translation = "「어쨌든 저는 마이너스 에너지의 위험성을 알고 삼계의 로스트 아이템을 전부 회수하기로 결정했어요. 하지만 그 도중에 실수를 해서──」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「自身がロストアイテムに封印されることになった、というわけじゃな」"
translation = "「스스로가 로스트 아이템에 봉인되게 되었다는 것이로구나」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい。その後は、以前説明した通りです。私は２年前に、リクリエの影響で目覚めて、その後にサチさんと出会ったんです」"
translation = "「네. 그 뒤는 이전에 설명한 대로예요. 저는 2년 전에 리크리에의 영향으로 깨어났고 그 후에 사치 씨를 만난 거예요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ん？\u3000でも、待てよ……」"
translation = "「응? 하지만 잠깐……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「トレジアンナの正体が魔女なのはわかったが、なら貴様が『魔法少女』というものを知ったのはいつだったのじゃ？」"
translation = "「트레지안나의 정체가 마녀인 건 알겠다만, 그럼 네놈이 『마법소녀』라는 것을 알게 된 건 언제였느냐?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「以前サチに聞いたが、貴様は最初からサチを見て、魔法少女だと騒いでおったのじゃろう？」"
translation = "「이전에 사치에게 들었다만, 네놈은 처음부터 사치를 보고 마법소녀라고 떠들어댔지 않았느냐?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あ～、それはですね～。実は元々、太古の魔女の森にも『魔女っ娘』って概念が存在していたんですよ。古くから伝わる伝説として」"
translation = "「아~ 그건 말이죠~. 사실 원래 태고의 마녀의 숲에도 『마녀 아이』라는 개념이 존재했거든요. 옛날부터 전해 내려오는 전설로서요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私は幼い頃から、その伝説が大好きだったんですけど、現代の日本で目覚めた時に魔法少女のアニメを見て、すごく感動したんです！」"
translation = "「저는 어릴 때부터 그 전설을 정말 좋아했는데, 현대의 일본에서 깨어났을 때 마법소녀 애니메이션을 보고 엄청 감동했어요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「これこそが私が憧れた伝説の英雄の姿だ、ってね♪\u3000それで今では、どっぷり魔法少女沼に浸かったオタクとなってしまったというわけです♪」"
translation = "「이것이야말로 내가 동경했던 전설의 영웅의 모습이다, 라고 말이죠♪ 그래서 지금은 푹 마법소녀 늪에 빠진 오타쿠가 되어버렸다는 이야기예요♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ちなみに、私が『先代魔法少女』だと言っていたのは――ほら、最初の頃って、魔女組織のネビュラと学園が微妙な関係だったじゃないですか～」"
translation = "「참고로 제가 『전대 마법소녀』라고 말했던 건── 봐요, 초기에는 마녀 조직 네뷸라와 학원이 미묘한 관계였잖아요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「だから、変にそことの関係を疑われたくないし、だったら魔法少女を名乗っちゃおうかな～って。てへぺろ☆」"
translation = "「그래서 괜히 그쪽과의 관계를 의심받고 싶지 않았고, 그렇다면 마법소녀라고 자처해 버릴까~ 하고요. 데헷☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、あとあと！\u3000年齢について、封印されてた期間はノーカウントですから！\u3000永遠の美少女ってことでお願いしますね☆」"
translation = "「앗, 그리고 그리고! 나이에 대해서 봉인되어 있던 기간은 노카운트니까요! 영원한 미소녀인 걸로 부탁드려요☆」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「封印をノーカウントにしても、数百年は生きてるじゃろ」"
translation = "「봉인을 노카운트로 쳐도 수백 년은 살았지 않느냐」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「トレジアンナさん！\u3000ちょっと失礼します！」"
translation = "「트레지안나 씨! 잠시 실례할게요!」"

[[dialogue]]
speaker = "unk"
original = "ふと、真面目な顔をしたシズハが、トレジアンナさんに近づいたかと思うと――"
translation = "문득 진지한 표정을 지은 시즈하가 트레지안나 씨에게 다가가는가 싶더니──"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えいっ♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんのお尻を揉みしだきながら、シズハは興奮した様子で言う。"
translation = "트레지안나 씨의 엉덩이를 주물러대며 시즈하는 흥분한 듯이 말한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「やっぱり！\u3000一目見てビビッときたわ！\u3000このお尻は、ものすごくいいものだって！」"
translation = "「역시! 한눈에 보고 찌릿하고 왔어! 이 엉덩이는 엄청나게 좋은 거라고!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「もう<emoji=heart04>\u3000シズハさんってば、触るならそう言って下さいよ～！\u3000ビックリしちゃったじゃないですか～」"
translation = "「정말<emoji=heart04> 시즈하 씨도 참, 만질 거라면 그렇게 말해달라고요~! 깜짝 놀랐잖아요~」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あまりに魅力的なお尻だったから、つい♪」"
translation = "「너무나 매력적인 엉덩이라서 그만♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はっ！？\u3000というか、気づいたんですが、直接触れるようになったのは私もじゃないですか！」"
translation = "「핫!? 그보다 깨달았는데, 직접 만질 수 있게 된 건 저도 마찬가지잖아요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「こうしてはいられません！\u3000シズハさん、失礼しますね～、えいっ♪」"
translation = "「이러고 있을 수 없죠! 시즈하 씨, 실례할게요~ 에잇♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「やんっ<emoji=heart04>」"
translation = "「얀<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんは嬉々として、シズハのお尻を触り返しはじめる。"
translation = "트레지안나 씨는 기쁘게 시즈하의 엉덩이를 맞만지기 시작한다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はああぁ～～～っ<emoji=heart04>\u3000これが本物の魔法少女の感触……！\u3000この瞬間、是非とも記憶魔法でコレクションしておかないとですね～」"
translation = "「하아아──앗<emoji=heart04> 이것이 진짜 마법소녀의 감촉……! 이 순간, 부디 기억 마법으로 컬렉션 해둬야겠네요~」"

[[dialogue]]
speaker = "unk"
original = "き、記憶魔法……？"
translation = "기, 기억 마법……?"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい♪\u3000私が昔、自作した魔法の１つで、その時感じた五感をいつでも再度味わうことができるんですよ～♪」"
translation = "「네♪ 제가 옛날에 자작한 마법 중 하나로, 그때 느낀 오감을 언제든 다시 맛볼 수 있거든요~♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私、二つ名で呼ばれてた通り『蒐集癖』がありまして～。ついついなんでも集めたくなっちゃうんですよね～♪」"
translation = "「저, 이명으로 불리던 대로 『수집벽』이 있어서요~. 나도 모르게 뭐든 모으고 싶어진단 말이죠~♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ということで～、えいっ<emoji=heart04>」"
translation = "「그런 고로~ 에잇<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ひゃんっ！？」"
translation = "「히얀!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「むふ～っ<emoji=heart04>\u3000これがサチさんのお尻ですか～。堪りませんね～♪」"
translation = "「무후~<emoji=heart04> 이것이 사치 씨의 엉덩이인가요~. 참을 수 없네요~♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっ……トレジアンナさん、なにやってるんですか！？\u3000んっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>」"
translation = "「잠깐…… 트레지안나 씨, 뭐 하시는 거예요!? 응<emoji=heart04> 후아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふっ、このまま体の匂いも記憶させてもらっていいですか～？」"
translation = "「후훗, 이대로 몸의 냄새도 기억하게 해주셔도 될까요~?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「嫌ですよ！？\u3000エッチなのは禁止です！」"
translation = "「싫어요!? 야한 건 금지예요!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「こやつ……もしや我らは、とんでもないド変態の封印を解いてしまったのでは……」"
translation = "「이 녀석…… 혹시 우리는 엄청난 대변태의 봉인을 풀어버린 것이 아니냐……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、次はプリムラさんのも記憶させて下さいね☆」"
translation = "「앗, 다음은 프리뮬라 씨의 것도 기억하게 해주세요☆」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「絶対に嫌なのじゃ！」"
translation = "「절대로 싫느니라!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「まあまあ、そう言わずに～♪\u3000そ～れ、転移魔法☆」"
translation = "「자자, 그러지 말고~♪ 자~아, 전이 마법☆」"

[[dialogue]]
speaker = "unk"
original = "と言った次の瞬間、プリムラに背後に回り込んでおり、お尻に触る魔法少女。"
translation = "라고 말한 다음 순간, 프리뮬라의 뒤로 돌아가 엉덩이를 만지는 마법소녀."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちょっ……やめっ――ひゃあぁっ！？」"
translation = "「잠깐…… 그만── 히야아앗!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あら、いい声<emoji=heart04>」"
translation = "「어머, 좋은 목소리<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「というか、さらっと今、とんでもない魔法を使ったのではないか！？」"
translation = "「그보다, 방금 아무렇지도 않게 엄청난 마법을 쓴 것 아니냐!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「魔法を蒐集しまくって光魔法以外はコンプリート、全て使えるようになりましたから☆\u3000えっへん♪」"
translation = "「마법을 잔뜩 수집해서 빛 마법 말고는 컴플리트, 전부 사용할 수 있게 됐으니까요☆ 에헴♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「それって、相当すごいのでは……？」"
translation = "「그거 상당히 대단한 거 아닌가요……?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ん～<emoji=heart04>\u3000プリムラさんの肌、前から触ってみたかったんですよね～♪\u3000本当に、もちもちぷりぷりで堪らない感触です～♪」"
translation = "「음~<emoji=heart04> 프리뮬라 씨의 피부, 전부터 만져보고 싶었거든요~♪ 정말 쫀득쫀득 탱글탱글해서 참을 수 없는 감촉이에요~♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様……！\u3000そんな褒められても、別に嬉しくなんかないのじゃ！\u3000――ふ、ふへへへぇ♪」"
translation = "「네놈……! 그렇게 칭찬해도 별로 기쁘지 않느니라! ──후, 후헤헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "相変わらずちょろい！"
translation = "여전히 허당이다!"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「さて、次はトマルさんですね～♪」"
translation = "「자, 다음은 토마루 씨네요~♪」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「わ、私もですか！？\u3000でも、私はその……お恥ずかしながら、男ですし……」"
translation = "「저, 저도인가요!? 하지만 저는 그…… 부끄럽지만 남자고……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「構いませんよ！\u3000いや、むしろご褒美です！\u3000私、可愛いは正義派なので♪」"
translation = "「상관없어요! 아니, 오히려 보상이에요! 전 귀여운 게 정의라는 주의라서♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、ちなみにトマルさんの次は、会長さんもお願いしますね～♪」"
translation = "「앗, 참고로 토마루 씨 다음은 회장님도 부탁드려요~♪」"

[[dialogue]]
speaker = "unk"
original = "俺も！？"
translation = "나도!?"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私、封印前は気になる男のヒトって全然いなかったんですけど、会長さんのことはすっごく気になるんですよ～♪」"
translation = "「저, 봉인 전에는 신경 쓰이는 남자 사람이 전혀 없었는데, 회장님은 굉장히 신경 쓰인단 말이죠~♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えっ、トレジアンナさん……！？」"
translation = "「엣, 트레지안나 씨……!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「というわけで、これから改めてよろしくお願いしますね、会長さん♪\u3000うふふっ☆」"
translation = "「그런 고로 앞으로 다시 한번 잘 부탁드려요, 회장님♪ 우후후☆」"

[[dialogue]]
speaker = "unk"
original = "そう言って、トレジアンナさんは可愛いらしく笑ってみせるのだった――"
translation = "그렇게 말하며 트레지안나 씨는 귀엽게 웃어 보였다──"

