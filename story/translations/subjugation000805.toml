[[dialogue]]
speaker = "unk"
original = "蘭美の指導により、上手く作れたかと思われたチョコであったが、再びゴーレム化してしまった。"
translation = "라비의 지도에 의해 잘 만들어진 줄 알았던 초코였으나, 다시 골렘화해 버리고 말았다."

[[dialogue]]
speaker = "ゴーレム"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "そして、ゴーレムは以前よりも活発な様子で、動き始める。"
translation = "그리고 골렘은 이전보다 활발한 모습으로 움직이기 시작한다."

[[dialogue]]
speaker = "蘭美"
original = "「ちょっ、どういうことぴょん！？\u3000ありえないぴょん！」"
translation = "「잠깐, 어떻게 된 거냣!? 말도 안 된냣!」"

[[dialogue]]
speaker = "蘭美"
original = "「――って、驚きのあまり、地元の方言が出てしまったわ！」"
translation = "「──앗, 너무 놀란 나머지 고향 사투리가 나와 버렸어!」"

[[dialogue]]
speaker = "蘭美"
original = "「でも、間違いなく、シンプルなレシピ通りに作ったはずなのに……！」"
translation = "「하지만 틀림없이 심플한 레시피대로 만들었을 텐데……!」"

[[dialogue]]
speaker = "せつな"
original = "「チョコが光っている時、星力の気配を感じたでござる！\u3000や、やっぱりせつなの星術が勝手に発動してしまっているようでござる！」"
translation = "「초코가 빛나고 있을 때 성력의 기운을 느꼈소! 여, 역시 세츠나의 성술이 멋대로 발동해 버리고 있는 모양이오!」"

[[dialogue]]
speaker = "蘭美"
original = "「本当にそんなことが……！？\u3000と、とにかく！」"
translation = "「정말 그런 일이……!? 어, 어쨌든!」"

[[dialogue]]
speaker = "蘭美"
original = "「実際にゴーレム化してしまった以上、厨房から出すわけにはいかないわ！\u3000せつな、変身して止めるわよ！」"
translation = "「실제로 골렘화해 버린 이상 주방에서 내보낼 수는 없어! 세츠나, 변신해서 막자!」"

[[dialogue]]
speaker = "せつな"
original = "「か、かしこまりでございまする！\u3000――変身！」"
translation = "「아, 알겠소! ──변신!」"

[[dialogue]]
speaker = "unk"
original = "戦闘後――"
translation = "전투 후──"

[[dialogue]]
speaker = "せつな"
original = "「ふぅ、すぐに倒せたでござる。強さは前と変わらないみたいで、助かったでござる……」"
translation = "「후우, 금방 쓰러뜨린 소. 강함은 전과 다르지 않은 것 같아 다행이오……」"

[[dialogue]]
speaker = "蘭美"
original = "「と、とりあえず……何故かゴーレム化するということは、これでよくわかったわ……」"
translation = "「이, 일단…… 왠지 모르게 골렘화한다는 건 이걸로 잘 알겠어……」"

[[dialogue]]
speaker = "蘭美"
original = "「こうなったら、ゴーレム化が起きる理由をトライ＆エラーで探るのみよ！\u3000せつなが単純に料理の腕を上げていけば、解決するかもしれないし！」"
translation = "「이렇게 된 이상 골렘화가 일어나는 이유를 시행착오를 통해 찾아내는 수밖에! 세츠나가 단순히 요리 실력을 키우면 해결될지도 모르고!」"

[[dialogue]]
speaker = "せつな"
original = "「はい！\u3000せつなのバレンタイン修業のご指導、どうかよろしくお願い致しまする！」"
translation = "「네! 세츠나의 밸런타인 수행 지도, 부디 잘 부탁드리오!」"

[[dialogue]]
speaker = "unk"
original = "そうして、再びチョコを作る２人だったが――"
translation = "그렇게 다시 초코를 만드는 두 사람이었으나──"

[[dialogue]]
speaker = "ゴーレム"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "蘭美"
original = "「レシピは守りつつ、前よりも細かなテクニックを駆使して、クオリティアップしたチョコでも、ダメ……！」"
translation = "「레시피는 지키면서 전보다 더 세밀한 테크닉을 구사해 퀄리티를 높인 초코라도 안 돼……!」"

[[dialogue]]
speaker = "せつな"
original = "「冷蔵庫から取り出す際、せつなも触らないようにしてみたでござるが……！」"
translation = "「냉장고에서 꺼낼 때 세츠나도 건드리지 않도록 해봤소만……!」"

[[dialogue]]
speaker = "蘭美"
original = "「ええい、次に行くわよ、次！」"
translation = "「에이, 다음으로 가자, 다음!」"

[[dialogue]]
speaker = "ゴーレム"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "蘭美"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "蘭美"
original = "「……せつな、メイド長命令よ」"
translation = "「……세츠나, 메이드장 명령이야.」"

[[dialogue]]
speaker = "蘭美"
original = "「今すぐここで服を脱ぎなさい！」"
translation = "「지금 당장 여기서 옷을 벗어!」"

[[dialogue]]
speaker = "せつな"
original = "「にゃんと！？\u3000いきなりどうしたでござるか！？」"
translation = "「냐니!? 갑자기 왜 그러시는 소!?」"

[[dialogue]]
speaker = "せつな"
original = "「蘭美殿のことは尊敬しているでござるが、せつなにはあいにく百合方向の趣味はなく、貞操は主様に捧げると心に決めて――」"
translation = "「라비 공을 존경하고는 있소만, 세츠나에겐 안타깝게도 백합 쪽 취미는 없으며 정조는 주군께 바치기로 마음먹었──」"

[[dialogue]]
speaker = "蘭美"
original = "「私にもそっちの趣味はないわよ！」"
translation = "「나도 그쪽 취미 없어!」"

[[dialogue]]
speaker = "蘭美"
original = "「そうじゃなくて！\u3000そのバレンタイン衣装のせいでゴーレム化してるんじゃないかって、怪しんでるの！\u3000チョコがゴーレムになってるわけだし！」"
translation = "「그게 아니라! 그 밸런타인 의상 때문에 골렘화하는 거 아닌가 의심하는 거야! 초코가 골렘이 되고 있으니까!」"

[[dialogue]]
speaker = "せつな"
original = "「なるほど！\u3000その発想はなかったでござる！」"
translation = "「과연! 그 발상은 못 했던 소!」"

[[dialogue]]
speaker = "unk"
original = "普段のメイド服に着替えて、チョコ作りにトライするせつなであったが――"
translation = "평소의 메이드복으로 갈아입고 초코 만들기에 도전하는 세츠나였으나──"

[[dialogue]]
speaker = "ゴーレム"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "せつな"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "せつな"
original = "「ゴーレム化、以前健在でござる！」"
translation = "「골렘화, 여전히 건재하오!」"

[[dialogue]]
speaker = "蘭美"
original = "「うん！\u3000違ったわね！\u3000次！」"
translation = "「응! 아니었네! 다음!」"

[[dialogue]]
speaker = "蘭美"
original = "「……試行錯誤の末、最後のハート型に流し込む作業をせつなに任せた以外、私が全部作ってみたけど……」"
translation = "「……우여곡절 끝에 마지막 하트 틀에 붓는 작업만 세츠나에게 맡긴 거 빼고는 내가 다 만들었는데……」"

[[dialogue]]
speaker = "せつな"
original = "「小さいでござる！」"
translation = "「작소!」"

[[dialogue]]
speaker = "蘭美"
original = "「誰の背が小さいですって！？」"
translation = "「누가 키가 작다는 거야!?」"

[[dialogue]]
speaker = "せつな"
original = "「蘭美殿のことは言ってないでござる！\u3000チョコゴーレムが小さく変身していることを言ったのでござる！」"
translation = "「라비 공을 말한 게 아니오! 초코 골렘이 작게 변신한 걸 말한 소이옵니다!」"

[[dialogue]]
speaker = "蘭美"
original = "「くっ……！\u3000せつながチョコに触れる頻度を限りなく少なくした結果でしょうけど……なんか不本意だわ！」"
translation = "「큭……! 세츠나가 초코에 닿는 빈도를 한없이 줄인 결과겠지만…… 뭔가 불만족스러워!」"

[[dialogue]]
speaker = "蘭美"
original = "「こうなったらもう、せつな自身にチョコ作りを極めてもらうしかないわ！\u3000これ以上ないくらい、最強のバレンタインチョコを作り上げるのよ！」"
translation = "「이렇게 된 이상 이제 세츠나 스스로 초코 만들기를 통달하는 수밖에 없어! 이보다 더 좋을 수 없을 만큼 최강의 밸런타인 초코를 만들어 내는 거야!」"

[[dialogue]]
speaker = "せつな"
original = "「せつながでござるか！？\u3000で、できるでござろうか……？」"
translation = "「세츠나가 말이오!? 할, 할 수 있겠소……?」"

[[dialogue]]
speaker = "蘭美"
original = "「やるしかないでしょ！\u3000会長に、手作りのバレンタインチョコを渡すんでしょ？」"
translation = "「할 수밖에 없잖아! 회장에게 수제 밸런타인 초코를 줄 거 아냐?」"

[[dialogue]]
speaker = "せつな"
original = "「は、はい……！\u3000わかったでござる。せつな、やってみせまする……！」"
translation = "「네, 네……! 알겠소. 세츠나, 해내 보이겠소……!」"

[[dialogue]]
speaker = "unk"
original = "蘭美の指導を受けながら、夜遅くなるまで、何度も繰り返しチョコ作りに挑戦するせつなであったが――"
translation = "라비의 지도를 받으며 밤늦게까지 몇 번이고 반복해서 초코 만들기에 도전하는 세츠나였으나──"

[[dialogue]]
speaker = "蘭美"
original = "「――これでゴーレムを無力化する方法はわかったわね。星術で凍らせれば、活動を停止させたまま冷凍保存できる」"
translation = "「──이걸로 골렘을 무력화하는 방법은 알았네. 성술로 얼리면 활동을 정지시킨 채 냉동 보관할 수 있어.」"

[[dialogue]]
speaker = "蘭美"
original = "「よし、じゃあもう１度、最初からやるわよ！\u3000せつな、次の準備を――」"
translation = "「좋아, 그럼 다시 한번 처음부터 하자! 세츠나, 다음 준비를──」"

[[dialogue]]
speaker = "せつな"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "蘭美"
original = "「せつな？」"
translation = "「세츠나?」"

[[dialogue]]
speaker = "せつな"
original = "「蘭美殿、もういいでござる……」"
translation = "「라비 공, 이제 됐소……」"

[[dialogue]]
speaker = "蘭美"
original = "「もういいって……？」"
translation = "「이제 됐다니……?」"

[[dialogue]]
speaker = "せつな"
original = "「せつなはどうやら、チョコ作りなどするべきではなかったようでござる……」"
translation = "「세츠나는 아무래도 초코 만들기 같은 건 하지 말았어야 했던 모양이오……」"

[[dialogue]]
speaker = "せつな"
original = "「さっき作ったチョコは、蘭美殿も褒めてくれて、せつなも手応えを感じた出来でござりました。しかし……」"
translation = "「방금 만든 초코는 라비 공도 칭찬해 주셨고 세츠나도 보람을 느낀 결과물이었소. 하지만……」"

[[dialogue]]
speaker = "せつな"
original = "「結局また、ダメになってしまったでござる。せつなはこれ以上、どうやってもチョコを完成させられる気が致しませぬ……」"
translation = "「결국 또 엉망이 되어 버렸소. 세츠나는 더 이상 어떻게 해도 초코를 완성할 수 있을 것 같지 않소……」"

[[dialogue]]
speaker = "せつな"
original = "「蘭美殿にも迷惑をかけて……せつなはもう、作ったチョコが無駄になるのを見たくないでござる……」"
translation = "「라비 공에게도 폐를 끼치고…… 세츠나는 이제 만든 초코가 헛수고가 되는 걸 보고 싶지 않소……」"

[[dialogue]]
speaker = "蘭美"
original = "「せつな……」"
translation = "「세츠나……」"

[[dialogue]]
speaker = "unk"
original = "蘭美はそこで１度、大きく深呼吸をする。それから、改めて口を開いた。"
translation = "라비는 거기서 한번 크게 심호흡을 한다. 그러고 나서 다시 입을 열었다."

[[dialogue]]
speaker = "蘭美"
original = "「――悪かったわ。ごめんなさい、せつな」"
translation = "「──내가 잘못했어. 미안해, 세츠나.」"

[[dialogue]]
speaker = "蘭美"
original = "「貴方の為という建前で私は、自分の指導が上手くいかないことに熱くなって、貴方の気持ちが見えなくなっていた」"
translation = "「널 위해서라는 핑계로 나는 내 지도가 잘 안 풀리는 것에 열이 받아서 네 기분을 보지 못했어.」"

[[dialogue]]
speaker = "蘭美"
original = "「だけど……お願い。よく聞いて」"
translation = "「하지만…… 부탁이야. 잘 들어줘.」"

[[dialogue]]
speaker = "蘭美"
original = "「私、２年前のメイド・オブ・メイドの決勝戦で敗北した時、これまでの人生で１番悔しくて、これからどうしたらいいのかわからない程、心が折れそうになったわ」"
translation = "「나, 2년 전 메이드 오브 메이드 결승전에서 패배했을 때 지금까지 살면서 가장 분했고, 앞으로 어떻게 해야 할지 모를 정도로 마음이 꺾일 뻔했어.」"

[[dialogue]]
speaker = "蘭美"
original = "「それくらい、当時の私は全力だったの。実家のメイド長からも太鼓判を押してもらえるくらい、メイドとして技術を磨いて臨んだ大会だった」"
translation = "「그만큼 당시의 나는 진심이었어. 본가의 메이드장님께서도 보증해 주실 정도로 메이드로서 기술을 갈고닦아 임한 대회였어.」"

[[dialogue]]
speaker = "蘭美"
original = "「自分がついに世界一のメイドになると信じて疑わなかった。でも――」"
translation = "「내가 드디어 세계 최고의 메이드가 될 거라 믿어 의심치 않았어. 하지만──」"

[[dialogue]]
speaker = "蘭美"
original = "「私は負けたの。決勝の舞台で、星見家メイド長の、<ruby>上月<rt>こうづき</rt></ruby>キリカに」"
translation = "「나는 졌어. 결승 무대에서 호시미 가문 메이드장인 코즈키 키리카에게.」"

[[dialogue]]
speaker = "unk"
original = "――星見家メイド隊メイド長・上月キリカ。星見フィオナの幼い時から、そばに仕えているお付きのメイドでもある。"
translation = "──호시미 가문 메이드대 메이드장 코즈키 키리카. 호시미 피오나가 어릴 때부터 곁에서 모시고 있는 전속 메이드이기도 하다."

[[dialogue]]
speaker = "unk"
original = "星見家に古くから使える名家の令嬢であり、メイドとしての技能は言わずもがなの才女。"
translation = "호시미 가문을 오래전부터 섬겨온 명문가의 영애이며, 메이드로서의 기능은 말할 것도 없는 재녀."

[[dialogue]]
speaker = "unk"
original = "星騎士としての実力も未だ健在。流星学園において彼女に憧れている女生徒は、決して少なくない。"
translation = "성기사로서의 실력도 여전히 건재. 유성학원에서 그녀를 동경하는 여학생은 결코 적지 않다."

[[dialogue]]
speaker = "蘭美"
original = "「――私にとって、上月キリカに負けたことが、これまでの人生で１番の敗北だった。成功すると信じて臨んだ上で、直面した大失敗だった」"
translation = "「──나에게 있어 코즈키 키리카에게 진 것이 지금까지 인생에서 가장 큰 패배였어. 성공할 거라 믿고 임한 끝에 직면한 대실패였지.」"

[[dialogue]]
speaker = "蘭美"
original = "「でもね。私にとっては大切な、無くてはならない失敗だったのよ」"
translation = "「하지만 말이야. 나에겐 소중한, 없어서는 안 될 실패였어.」"

[[dialogue]]
speaker = "蘭美"
original = "「真に最強を目指すということは、１度も敗北せずに頂点に立つことではない」"
translation = "「진정으로 최강을 지향한다는 건 단 한 번의 패배도 없이 정점에 서는 게 아니야.」"

[[dialogue]]
speaker = "蘭美"
original = "「たとえ負けて、失敗しても、諦めずにまたそこから立ち上がって、何度も頂点に立ち続けることこそが最強なのよ」"
translation = "「비록 지고 실패하더라도 포기하지 않고 다시 거기서 일어서서 몇 번이고 정점에 계속 서는 것이야말로 최강인 거야.」"

[[dialogue]]
speaker = "蘭美"
original = "「『最強は１度にしてならず』――それが、私が２年前の敗北で得た教訓よ」"
translation = "「『최강은 단번에 이루어지지 않는다』── 그게 내가 2년 전 패배에서 얻은 교훈이야.」"

[[dialogue]]
speaker = "蘭美"
original = "「失敗することは、恥ずかしいかもしれない。でも、必要不可欠なことなのよ」"
translation = "「실패하는 건 창피할지도 몰라. 하지만 반드시 필요한 일이야.」"

[[dialogue]]
speaker = "蘭美"
original = "「ヒトは誰しも、成功と失敗を繰り返して、成長をするの」"
translation = "「인간은 누구나 성공과 실패를 반복하며 성장하는 법이야.」"

[[dialogue]]
speaker = "蘭美"
original = "「失敗は決して無駄なんかじゃない」"
translation = "「실패는 결코 헛된 게 아니야.」"

[[dialogue]]
speaker = "蘭美"
original = "「だから、せつな」"
translation = "「그러니까 세츠나.」"

[[dialogue]]
speaker = "蘭美"
original = "「失敗を理由に、１番大切なものを諦めたりしないで」"
translation = "「실패를 이유로 가장 소중한 걸 포기하지 마.」"

[[dialogue]]
speaker = "せつな"
original = "「せつなの、１番大切なもの……」"
translation = "「세츠나의 가장 소중한 것……」"

[[dialogue]]
speaker = "unk"
original = "その日のバレンタイン修行は、そこでお開きになった。"
translation = "그날의 밸런타인 수행은 거기서 마무리되었다."

[[dialogue]]
speaker = "unk"
original = "しかし、せつなはその後もずっと、蘭美に言われたことを頭の中で考え続けるのだった――"
translation = "하지만 세츠나는 그 후로도 계속 라비가 해준 말을 머릿속으로 되새기고 있었다──"

