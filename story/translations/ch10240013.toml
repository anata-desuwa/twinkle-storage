[[dialogue]]
speaker = "unk"
original = "第３話,リズム感とは（宇宙）,P"
translation = "제3화, 리듬감이란 (우주)"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。俺は空き教室で、ヨミの巫女舞の練習に付き合っていた。しかし──"
translation = "어느 날 방과 후. 나는 빈 교실에서 요미의 무녀 춤 연습을 도와주고 있었다. 하지만──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ど、どうだったでしょうか、会長……？」"
translation = "「어, 어땠나요, 회장님……?」"

[[dialogue]]
speaker = "unk"
original = "その……リズム感がイマイチ、かな……"
translation = "그게…… 리듬감이 좀 별로랄까……"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うぅぅ……ですよね……。実は私、リズム感が昔から壊滅的で……」"
translation = "「으으으…… 그렇죠……. 사실 저 리듬감이 예전부터 괴멸적이라서……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「リズム感、りずむ感、リズムかん……『りずむかん』って一体何なのでしょう……」"
translation = "「리듬감, 리듬감, 리듬감…… 『리듬감』이란 도대체 무엇일까요……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000どうやらお困りのようだネ、我が心の友よ」"
translation = "「후히♪ 아무래도 곤란한 모양이네, 나의 마음의 벗이여.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「アニマ先輩！？」"
translation = "「아니마 선배!?」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩とヨミは知り合いなのか？"
translation = "아니마 선배와 요미는 아는 사이인가?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい、先輩の方から声を掛けて頂いたのがきっかけで。よくカフェテリアで一緒にお昼を食べたり、休日一緒に出掛けたりするんですよ」"
translation = "「네, 선배님이 먼저 말을 걸어주신 게 계기가 되어서요. 자주 카페테리아에서 같이 점심을 먹거나 휴일에 같이 외출하기도 해요.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒ、いわゆる接客担当同士の連帯意識というやつダ。ヨミのことは、心の友と呼ばせて貰っているヨ」"
translation = "「후히히, 이른바 접객 담당끼리의 연대 의식이라는 거다. 요미는 마음의 벗이라고 부르고 있지.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「それはともかく、ここはアニマの発明した薬の出番ダロウ。名付けて『リズムワカール』！」"
translation = "「그건 그렇고, 여기선 아니마가 발명한 약이 나설 차례겠지. 이름하여 『리듬와카루』!」"

[[dialogue]]
speaker = "unk"
original = "胡散臭すぎる……！"
translation = "너무 수상쩍어……!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「リズム感がわかるようになるってことですか！？\u3000た、確かに上手い話過ぎて、ちょっと信じ難いですけど……」"
translation = "「리듬감을 알게 된다는 건가요!? 화, 확실히 너무 좋은 이야기라 좀 믿기 힘들지만……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「効果は一時的だが、至って本気だとも。……どうするね、ヨミ？\u3000例によって副作用は出るだろうが、体に害が無いことだけは保障するヨ」"
translation = "「효과는 일시적이지만 아주 진지하다고. ……어떡할래, 요미? 예의 부작용은 있겠지만 몸에 해가 없다는 것만은 보장하지.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わ、私は……少しでもリズム感が掴めるきっかけになるなら、試してみたいです！\u3000アニマ先輩が天才なのは、よくわかってますし」"
translation = "「저, 저는…… 조금이라도 리듬감을 잡을 계기가 된다면 시도해보고 싶어요! 아니마 선배가 천재라는 건 잘 알고 있고요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……よし、行きます！\u3000ごくごく…………あれ、意外と美味しい……？」"
translation = "「……좋아, 갑니다! 꿀꺽꿀꺽………… 어라, 의외로 맛있네……?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そう……この味を例えるなら──宇宙です」"
translation = "「그래요…… 이 맛을 비유하자면── 우주입니다.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、私には今……頭の中に無限に広がる宇宙が見えます。リズム感が何なのか、宇宙の彼方が見えるようにわかって来ました」"
translation = "「회장님, 저에게는 지금…… 머릿속에 무한히 펼쳐지는 우주가 보여요. 리듬감이 무엇인지 우주 너머가 보이듯이 알게 되었어요.」"

[[dialogue]]
speaker = "unk"
original = "よし、一緒に保健室に行こう！"
translation = "좋아, 같이 보건실에 가자!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「急くな会長、ヨミはラリってるわけではなイ」"
translation = "「서두르지 마 회장, 요미는 약에 취한 게 아니다.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうか……ようやく私にも分かりました。これが『リズム』というものの正体だったのですね」"
translation = "「그렇군요…… 드디어 저도 알았습니다. 이것이 『리듬』이라는 것의 정체였군요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「広がる宇宙の中で、私はついに──リズム感の真理に到達しました」"
translation = "「펼쳐지는 우주 속에서 저는 마침내── 리듬감의 진리에 도달했습니다.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、アニマ先輩！\u3000これから巫女舞を踊ってみます。今ならばきっと──」"
translation = "「회장님, 아니마 선배님! 지금부터 무녀 춤을 춰보겠습니다. 지금이라면 분명──」"

[[dialogue]]
speaker = "unk"
original = "──ヨミはつい先程までとは別人のように、本当に圧倒的な出来栄えの美しい巫女舞を披露してみせた。"
translation = "──요미는 조금 전까지와는 딴판으로 정말 압도적인 솜씨의 아름다운 무녀 춤을 선보였다."

[[dialogue]]
speaker = "unk"
original = "本当にリズム感が完璧になってる……！"
translation = "정말로 리듬감이 완벽해졌어……!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「素晴らしいゾ、心の友よ！\u3000ちゃんと薬の効果が発揮されたようだナ」"
translation = "「훌륭하다, 마음의 벗이여! 제대로 약의 효과가 발휘된 모양이군.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ありがとうございます、アニマ先輩のおかげです！\u3000まさかこんなに巫女舞を踊れるようになるなんて……感動です！」"
translation = "「감사합니다, 아니마 선배님 덕분이에요! 설마 이렇게 무녀 춤을 출 수 있게 되다니…… 감동이에요!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちなみに、後学の為に教えてくれヨミ。……リズム感の真理とは、一体どのようなものなんダ？」"
translation = "「참고로 후학을 위해 알려줘, 요미. ……리듬감의 진리란 대체 어떤 것이지?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「リズム感の真理とはすなわち……」"
translation = "「리듬감의 진리란 즉……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「──ズキューンと来てグワァァァって感じで、バリバリーンとブワァァァッするものですね！」"
translation = "「──즈큐웅 하고 와서 구와아아 하는 느낌으로 발리바리잉 하고 부와아아앗 하는 것이군요!」"

[[dialogue]]
speaker = "unk"
original = "語彙力！！！"
translation = "어휘력 무엇!!!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フム……それが副作用カ？」"
translation = "「흠…… 그것이 부작용인가?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ん？\u3000あれ……急に頭の中がぼやけて……」"
translation = "「응? 어라…… 갑자기 머릿속이 흐릿해지더니……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あ、ああ……宇宙が、見えなくなってしまいました……ガッカリです……」"
translation = "「아, 아아…… 우주가 보이지 않게 되어버렸어요…… 실망이에요……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「どうやら、薬の効き目が切れてしまったようだナ。……しかし、一度は真理に到達したんダ。再現することも可能なんじゃないカ？」"
translation = "「아무래도 약의 기운이 다한 모양이군. ……하지만 한 번은 진리에 도달했다. 재현하는 것도 가능하지 않겠나?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうでしょうか……？」"
translation = "「그럴까요……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「コツは掴めたかもしれないダロウ？\u3000先程の感覚を思い出しながら、もう一度舞ってみたらどうダ？」"
translation = "「요령은 잡았을지도 모르잖아? 방금 전의 감각을 떠올리며 다시 한번 춰보는 건 어떻겠나?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「な、なるほど！\u3000よし、やってみます！」"
translation = "「과, 과연! 좋아, 해보겠습니다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ズキューン！\u3000グワァァァッ！\u3000バリバリーン！\u3000ブワァァァッ！」"
translation = "「즈큐웅! 구와아아앗! 발리바리잉! 부와아아앗!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「………………えっと」"
translation = "「………………저기」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「リズム感……どこかに飛んで行っちゃいました……」"
translation = "「리듬감…… 어디론가 날아가 버렸어요……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フッ……フヒッ……まさかそのまま口に出して舞うとは……ふふ、ふふふっ（腹を抱えてうずくまる）」"
translation = "「훗…… 후히…… 설마 그걸 그대로 입 밖으로 내며 춤을 추다니…… 후후, 후후후 (배를 잡고 쓰러짐)」"

[[dialogue]]
speaker = "unk"
original = "（腹を抱えて爆笑）"
translation = "(배를 잡고 폭소)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁぁっ！？\u3000だって、先輩たちが再現しろって言うからっ！」"
translation = "「코야아아앗!? 그야 선배님들이 재현해보라고 하니까!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「わ、ワンモア……今のもう１回見たイ……！」"
translation = "「워, 원 모어…… 방금 거 한 번 더 보고 싶다……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「爆裂笑い過ぎですっ！」"
translation = "「폭렬 너무 웃으신다고요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うぅ……リズム感とは一体……（宇宙）」"
translation = "「으으…… 리듬감이란 대체…… (우주)」"

[[dialogue]]
speaker = "unk"
original = "一度真理に到達したからか、遥か遠くを見るような目をするヨミなのであった。"
translation = "한번 진리에 도달했기 때문인지 아득히 먼 곳을 보는 듯한 눈을 하는 요미였다."

