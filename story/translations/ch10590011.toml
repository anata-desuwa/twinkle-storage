[[dialogue]]
speaker = "unk"
original = "第１話,ノリノリな２人,P"
translation = "제1화, 흥이 난 두 사람, P"

[[dialogue]]
speaker = "unk"
original = "夏が終わり、新学期初日。俺は学園に転入したリップルの様子を見に向かったのだが――"
translation = "여름이 끝나고, 신학기 첫날. 나는 학원에 전입한 리플의 상태를 보러 향했는데──"

[[dialogue]]
speaker = "紅明"
original = "「それじゃ撮るよ～。アタシの近くにもっと寄って寄って～♪\u3000一緒にハイッ、チーズ☆」"
translation = "「그럼 찍는다~. 내 근처로 좀 더 붙어 붙어~♪ 같이 하잇, 치즈☆」"

[[dialogue]]
speaker = "リップル"
original = "「イェ～イ♪\u3000シリ合った記念の、ツーショットで～す！」"
translation = "「예~이♪ 알게 된 기념의, 투샷임다~!」"

[[dialogue]]
speaker = "紅明"
original = "「うん、可愛く撮れた♪\u3000ほら、ＤＩＳＣの画面、見てみ？\u3000良い感じっしょ～☆」"
translation = "「응, 귀엽게 찍혔어♪ 자, DISC 화면, 봐봐? 느낌 좋지~☆」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ♪\u3000素敵な自撮り写真デスね～！\u3000後でワタシのＤＩＳＣにも送ってホシイで～す♪」"
translation = "「와오♪ 멋진 셀카 사진임다~! 나중에 제 DISC에도 보내주셨으면 좋겠슴다~♪」"

[[dialogue]]
speaker = "紅明"
original = "「おっけー♪\u3000すぐ送るね～……って、おっ？\u3000ダーリンじゃ～ん！\u3000今日も元気してる～？」"
translation = "「오케이~♪ 바로 보낼게~…… 어랏? 달링이잖아! 오늘도 잘 지내~?」"

[[dialogue]]
speaker = "リップル"
original = "「あっ、カイチョー！\u3000コンニチハで～す♪」"
translation = "「앗, 회장님! 안녕하십니까~♪」"

[[dialogue]]
speaker = "リップル"
original = "「――ワタシの様子を見に来てくれたんデスか？\u3000アリガトございます♪\u3000学園の初授業、楽しかったデスよ！」"
translation = "「──저의 상태를 보러 와주신 검까? 감사함다♪ 학원의 첫 수업, 즐거웠슴다!」"

[[dialogue]]
speaker = "unk"
original = "２人はもしかして同じクラス？"
translation = "두 사람은 혹시 같은 반?"

[[dialogue]]
speaker = "リップル"
original = "「いえ、別のクラスで～す！\u3000今さっき、ここで出会って仲良くナリました♪」"
translation = "「아뇨, 다른 반임다! 방금 전, 여기서 만나서 친해졌슴다♪」"

[[dialogue]]
speaker = "紅明"
original = "「転入生が来るって聞いたから、友達になろうと思ってさ☆\u3000で、会ってすぐにビビっと来ちゃったワケよ！\u3000お互いノリノリな感じが合うっていうか！」"
translation = "「전학생이 온다고 들었으니까, 친구가 되려고 했지☆ 그래서 만나자마자 찌릿하고 와버린 거라구! 서로 흥이 넘치는 느낌이 맞는달까!」"

[[dialogue]]
speaker = "リップル"
original = "「また１人、気の合う友達がデキて、嬉しいで～す♪\u3000……あ！\u3000それで、今思い出したんデスが――」"
translation = "「또 한 명, 마음이 맞는 친구가 생겨서 기쁨다~♪ ……아! 그래서, 방금 생각났슴다만──」"

[[dialogue]]
speaker = "リップル"
original = "「アナタのお名前、まだ聞いてマセンでした！」"
translation = "「당신의 이름, 아직 듣지 못했슴다!」"

[[dialogue]]
speaker = "紅明"
original = "「おっ、確かに！\u3000アタシも聞いてなかったわ！」"
translation = "「앗, 그러네! 나도 듣지 못했어!」"

[[dialogue]]
speaker = "unk"
original = "名前も知らずに、あんなに仲良くしてたの！？"
translation = "이름도 모르고 그렇게 친하게 지냈던 거야!?"

[[dialogue]]
speaker = "紅明"
original = "「うししし♪\u3000ノリが合い過ぎて、聞くのすっかり忘れてたわ！\u3000ウケる～☆」"
translation = "「우시시시♪ 흥이 너무 맞아서 묻는 걸 완전히 잊고 있었어! 웃겨~☆」"

[[dialogue]]
speaker = "リップル"
original = "「ノリが良ければナントカなる。サーフィンと一緒デスね～♪」"
translation = "「흥만 좋으면 어떻게든 됨다. 서핑이랑 마찬가지임다~♪」"

[[dialogue]]
speaker = "紅明"
original = "「それじゃあ改めて名乗らないとだね。アタシは牛紅明！\u3000元気が取り柄の２年生さ！\u3000こう見えて、テレビタレントをやってるんだぜ♪\u3000ヨロシクな☆」"
translation = "「그럼 새삼스럽게 통성명해야겠네. 나는 규우 코우메이! 활력이 장점인 2학년이야! 이래 봬도 TV 탤런트를 하고 있다구♪ 잘 부탁해☆」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシはリップルとイイま～す！\u3000夏にカイチョーと出会って、新星学園にやってキマした！\u3000コウメイ、こちらこそヨロシクお願いしま～す♪」"
translation = "「저는 리플이라고 함다~! 여름에 회장님과 만나서, 신성 학원에 오게 됐슴다! 코우메이, 저야말로 잘 부탁드림다~♪」"

[[dialogue]]
speaker = "紅明"
original = "「ほうほう……それじゃあ、あだ名はズバリ『リプるん』だね☆」"
translation = "「호오호오…… 그럼 별명은 딱 『리플룬』이네☆」"

[[dialogue]]
speaker = "リップル"
original = "「オウ♪\u3000リプるん……ＢＩＧ素敵な呼び方です！\u3000ワタシ、あだ名付けて貰ったのハジメテなので、嬉しいで～す♪」"
translation = "「오우♪ 리플룬…… BIG 멋진 이름임다! 저, 별명을 얻은 건 처음이라 기쁨다~♪」"

[[dialogue]]
speaker = "紅明"
original = "「それで、アタシとしては、ダーリンとリプるんが既に親しい感じなのが気になるけど、夏に何があったんだい？」"
translation = "「그래서, 나로서는 달링이랑 리플룬이 이미 친한 느낌인 게 신경 쓰이는데, 여름에 무슨 일이 있었던 거야?」"

[[dialogue]]
speaker = "unk"
original = "星徒会の夏合宿で出会ったんだ"
translation = "성도회 여름 합숙에서 만났어"

[[dialogue]]
speaker = "リップル"
original = "「ワタシは星術で結界を作ることが出来るのデスが、トラブルで自分の結界から脱出できなくナッテしまって……」"
translation = "「저는 성술로 결계를 만들 수 있슴다만, 트러블로 제 결계에서 탈출할 수 없게 되어버려서……」"

[[dialogue]]
speaker = "リップル"
original = "「その結界がある無人島に、星徒会の皆が合宿でやってキタので～す！」"
translation = "「그 결계가 있는 무인도에, 성도회 여러분이 합숙으로 오신 검다!」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー達は空間の歪みから、結界内に迷い込んでしまって……そこでワタシと出会ったんです！」"
translation = "「회장님 일행은 공간의 왜곡 때문에 결계 안으로 길을 잃고 들어오셔서…… 거기서 저와 만난 검다!」"

[[dialogue]]
speaker = "リップル"
original = "「そうして一緒にトラブルを解決する中で、カイチョーから学園へ誘って貰ったというワケで～す♪」"
translation = "「그렇게 함께 트러블을 해결하는 과정에서, 회장님께서 학원으로 권유해 주신 거임다~♪」"

[[dialogue]]
speaker = "紅明"
original = "「なるほどね～、結界……あっ！\u3000もしかして、いま噂の『リゾート結界』ってリプるんが作ったものだったりする？」"
translation = "「그렇구나~, 결계…… 앗! 혹시 지금 소문난 『리조트 결계』란 거, 리플룬이 만든 거였어?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ！\u3000その通りです♪\u3000常夏の海がいつでも楽しめる、カイチョー達と出会った無人島をベースにツクった空間で～す！」"
translation = "「네! 맞슴다♪ 상여름의 바다를 언제든 즐길 수 있는, 회장님 일행과 만난 무인도를 베이스로 만든 공간임다~!」"

[[dialogue]]
speaker = "紅明"
original = "「マジか～！\u3000１年中、近場で夏の海を楽しめるってことっしょ？\u3000めっちゃいいじゃん！」"
translation = "「진짜냐~! 1년 내내 가까운 곳에서 여름 바다를 즐길 수 있다는 거 아냐? 대박 좋잖아!」"

[[dialogue]]
speaker = "紅明"
original = "「実はアタシ、この夏はタレント活動が忙しかったからさ。リプるんのリゾート結界には、まだ行ったことがないんだよね～」"
translation = "「사실 난 이번 여름에 탤런트 활동이 바빴으니까. 리플룬의 리조트 결계에는 아직 가본 적이 없단 말이지~」"

[[dialogue]]
speaker = "リップル"
original = "「だったら、今すぐ案内しマスよ～♪\u3000ワタシ、結界を召喚することがデキますので！」"
translation = "「그렇다면 지금 당장 안내하겠슴다~♪ 저, 결계를 소환할 수 있으니까요!」"

[[dialogue]]
speaker = "リップル"
original = "「オイデマセ、夏の海～♪\u3000ソォイッ！」"
translation = "「오이데마세, 여름의 바다로~♪ 소옷!」"

[[dialogue]]
speaker = "紅明"
original = "「うおっ！？\u3000眩しっ……！」"
translation = "「우옷!? 눈부셔……!」"

[[dialogue]]
speaker = "リップル"
original = "「コウメイ、ラッシャーセー♪\u3000ここがワタシのリゾート結界……名付けて『エンドレスサマー』で～す！」"
translation = "「코우메이, 랏샤세~♪ 여기가 저의 리조트 결계…… 이름하여 『엔들리스 서머』임다!」"

[[dialogue]]
speaker = "紅明"
original = "「うおぉぉぉっ、マジで日差しが夏！\u3000そして海の匂い！\u3000完全にモノホンじゃん！\u3000これマジでリプるんが作ったの！？\u3000パないんですけど！」"
translation = "「우오오오옷, 진짜 햇살이 여름! 그리고 바다 냄새! 완전히 진짜잖아! 이거 진짜로 리플룬이 만든 거야? 장난 아닌데!」"

[[dialogue]]
speaker = "リップル"
original = "「エヘヘ♪\u3000ワタシの星術は、結界内に自分のイメージする空間を作り上げることがデキるんです！」"
translation = "「에헤헤♪ 저의 성술은 결계 내에 제가 이미지하는 공간을 만들어낼 수 있슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシは夏の海が大好きなんデスが、この国には季節がアリますから、夏が終わってしまうのをザンネンに思ってました……」"
translation = "「저는 여름 바다를 정말 좋아함다만, 이 나라에는 계절이 있으니까, 여름이 끝나버리는 걸 아쉽게 생각했슴다……」"

[[dialogue]]
speaker = "リップル"
original = "「デスが、それなら常夏の空間を作ればいいと思って、完成したのがこのリゾート結界というワケで～す♪」"
translation = "「하지만 그렇다면 상여름의 공간을 만들면 된다고 생각해서, 완성한 것이 이 리조트 결계라는 거임다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「ちなみに、今はまだ無人島を囲える範囲が限界デスが、いずれは世界全部を結界で包み込み、常夏の世界を作り上げるのが、ワタシのＢＩＧドリームです！」"
translation = "「참고로 지금은 아직 무인도를 감쌀 수 있는 범위가 한계임다만, 언젠가는 세계 전체를 결계로 감싸서 상여름의 세계를 만들어내는 것이 저의 BIG 드림임다!」"

[[dialogue]]
speaker = "紅明"
original = "「どゆこと……？」"
translation = "「뭔 소리야……?」"

[[dialogue]]
speaker = "リップル"
original = "「夏の海は人のココロを解放して、ハッピーな気持ちにしま～す。デスので、世界中が常夏の空間になれば──」"
translation = "「여름 바다는 사람의 마음을 해방해서 행복한 기분으로 만듬다. 그러니 전 세계가 상여름의 공간이 된다면──」"

[[dialogue]]
speaker = "リップル"
original = "「皆がいつもハッピーでいられる、理想の世界がデキあがるというワケで～す♪」"
translation = "「모두가 언제나 행복할 수 있는, 이상적인 세계가 만들어진다는 거임다~♪」"

[[dialogue]]
speaker = "unk"
original = "その夢については、後で要相談ね！"
translation = "그 꿈에 대해서는 나중에 진지하게 상담하자!"

[[dialogue]]
speaker = "リップル"
original = "「ハイ？\u3000よくワカリませんが……ワカリました！」"
translation = "「네? 잘 모르겠슴다만…… 알겠슴다!」"

[[dialogue]]
speaker = "紅明"
original = "「うししし♪\u3000リプるん、めっちゃ面白い子じゃん！」"
translation = "「우시시시♪ 리플룬, 진짜 재밌는 애네!」"

[[dialogue]]
speaker = "紅明"
original = "「皆がハッピーになる常夏世界、意外とアリじゃね？」"
translation = "「모두가 행복해지는 상여름 세계, 의외로 괜찮지 않아?」"

[[dialogue]]
speaker = "unk"
original = "やめて！\u3000ノリで乗っからないで！"
translation = "그만둬! 분위기에 휩쓸리지 마!"

[[dialogue]]
speaker = "unk"
original = "乗り気になる流星市国屈指のインフルエンサーを、俺は慌てて止めるのだった──"
translation = "의욕이 넘치는 유성시국 굴지의 인플루언서를 나는 서둘러 말리는 것이었다──"

