[[dialogue]]
speaker = "unk"
original = "第４話,漫画みたいな約束,P"
translation = "제4화, 만화 같은 약속, P"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「新星学園の図書館には漫画があるのね。図書館なのに」"
translation = "「신성 학원 도서관에는 만화가 있네. 도서관인데도」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「図書館だからあるんですよ。図書館は小説、実用書、雑誌など、様々な本を収蔵する場所ですからね」"
translation = "「도서관이니까 있는 거예요. 도서관은 소설, 실용서, 잡지 등, 다양한 책을 소장하는 장소니까요」"

[[dialogue]]
speaker = "unk"
original = "深淵書庫には漫画はないの？"
translation = "심연 서고에는 만화는 없어?"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あるわけないでしょ、あんな俗っぽいもの」"
translation = "「있을 리 없잖아, 그런 속된 것이」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「深淵書庫の本たちには、かつてリクリエに滅ぼされた魔族の生涯が記されている。漫画なんて、娯楽として消費されるだけのものを一緒に並べることはできないわ」"
translation = "「심연 서고의 책들에는, 과거 리크리에에게 멸망당한 마족의 생애가 기록되어 있어. 만화 따위, 오락으로 소비될 뿐인 것을 함께 나란히 둘 수는 없어」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「確かに書庫の魔本たちは、魔族の人たちの生きた証ですけど、漫画も立派な本ですよ」"
translation = "「확실히 서고의 마본들은, 마족 분들의 산 증거지만, 만화도 훌륭한 책이에요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それに漫画はただ楽しむだけじゃなくて、歴史や健康の知識を啓蒙したりして、勉強になるものも多いんです」"
translation = "「게다가 만화는 그저 즐기는 것뿐만 아니라, 역사나 건강 지식을 계몽하기도 하고, 공부가 되는 것도 많아요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふぅん……」"
translation = "「흐음……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「まぁ、モネがそこまで言うのなら……読んでみなくもないわ」"
translation = "「뭐, 모네가 그렇게까지 말한다면…… 읽어 보지 않을 것도 없어」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（あれ？\u3000リィベルさん、もしかして漫画が読みたいんでしょうか……？）"
translation = "（어라? 리벨 씨, 혹시 만화가 읽고 싶은 걸까요……?）"

[[dialogue]]
speaker = "unk"
original = "じゃ俺の漫画、読んでみる？"
translation = "그럼 내 만화, 읽어 볼래?"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（あ、固まっちゃいましたね……やっぱり漫画に興味なかったんでしょうか……？）"
translation = "（아, 굳어 버렸네요…… 역시 만화에 흥미 없었던 걸까요……?）"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そうね。じゃあ魔王の家に伺わせてもらうわ」"
translation = "「그러네. 그럼 마왕의 집에 찾아가 볼게」"

[[dialogue]]
speaker = "unk"
original = "ええっ、いきなり！？"
translation = "엣, 갑자기!?"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「声が大きいわよ、魔王。図書館なんだから静かにしなさい」"
translation = "「목소리가 크네, 마왕. 도서관이니까 조용히 해」"

[[dialogue]]
speaker = "unk"
original = "こうして今日の放課後、リィベルが俺の家に来ることになったのだった。"
translation = "이렇게 해서 오늘 방과 후, 리벨이 내 집에 오게 된 것이었다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「失礼するわ」"
translation = "「실례할게」"

[[dialogue]]
speaker = "unk"
original = "どうぞ……"
translation = "들어와……"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふっ。どうしたの、その硬い表情は？\u3000緊張しているの？\u3000まさか私を女扱いしているのかしら」"
translation = "「훗. 왜 그래, 그 딱딱한 표정은? 긴장하고 있어? 설마 나를 여자 취급하는 걸까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「近代の魔王は初心なのね。先代はちゃっかり子孫まで残しているというのに」"
translation = "「근대의 마왕은 숫기가 없네. 선대는 능글맞게 자손까지 남겼는데도」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「言ったでしょう。私は深淵書庫の魔力と煌竜ヴィライアの因子から生まれたもの。一応は魔族ということになっているけど、命と呼べるかも怪しい存在よ」"
translation = "「말했잖아. 나는 심연 서고의 마력과 황룡 빌라이아의 인자로부터 태어난 것. 일단은 마족이라는 것이 되어 있지만, 생명이라고 부를 수 있을지도 의심스러운 존재야」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「錬金術師が作った義体と同じ、動く人形とでも思えばいいわ。どうせ、リクリエを滅ぼしたら役目を終えるのだから」"
translation = "「연금술사가 만든 의체와 같은, 움직이는 인형이라고 생각하면 돼. 어차피, 리크리에를 멸망시키면 역할을 끝낼 테니까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……急に黙って、どうしたの？\u3000飲み物はコーヒーでも紅茶でもなんでもいいわ。あ、ミルクと砂糖は要らないから」"
translation = "「……갑자기 조용해져서, 무슨 일이야? 마실 것은 커피든 홍차든 뭐든지 괜찮아. 아, 우유와 설탕은 필요 없으니까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「さて。あなたの書庫、見せてもらうわよ。…………ふむふむ。さすが漫画を読むのが趣味というだけはあるわね」"
translation = "「자. 네 서고, 보여 줄래. …………흐음흐음. 역시 만화 읽는 게 취미라는 것만은 있네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「オススメはあるかしら？\u3000は？\u3000全部？\u3000それはそうでしょうけど、全部はいっぺんに読めないから聞いてるんでしょ」"
translation = "「추천작은 있으려나? 하? 전부? 그건 그렇겠지만, 전부 한 번에 읽을 수는 없으니까 묻고 있는 거잖아」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「もう一度聞くわ。あなたのオススメを教えてちょうだい？」"
translation = "「다시 한번 물을게. 네 추천작을 알려 줄래?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……時代劇ドラマの公式コミカライズ？\u3000公式のくせにドラマと内容が全然違ってクセになる……？\u3000何を言っているの？」"
translation = "「……시대극 드라마의 공식 코미컬라이즈? 공식인데도 드라마와 내용이 전혀 달라서 중독된다고……? 무슨 말을 하는 거야?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「どれどれ……何よコレ！？\u3000侍がサイボーグになったり巨大化したり、メチャクチャじゃない。あと、この妙に濃い悪役は何？」"
translation = "「어디 보자…… 뭐야 이거!? 사무라이가 사이보그가 되거나 거대화하거나, 엉망진창이잖아. 그리고, 이 묘하게 진한 악역은 뭐야?」"

[[dialogue]]
speaker = "unk"
original = "そいつはドラマだと３分で退場したキャラ"
translation = "그 녀석은 드라마에서는 3분 만에 퇴장한 캐릭터"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「うそ！？\u3000全巻出てくるんだけど！\u3000完全にメインキャラなんだけど！」"
translation = "「거짓말!? 전권 나오는데! 완전히 메인 캐릭터인데!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ほ、他のオススメは……？」"
translation = "「다, 다른 추천작은……?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「王道の異能力バトル？\u3000……死んだはずの妹が実は生きていて……なるほど、確かに王道ね」"
translation = "「왕도의 이능력 배틀? ……죽었을 터인 여동생이 사실은 살아 있어서…… 과연, 확실히 왕도네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ただし、登場人物は全てモヒカン！？\u3000ヒロインまで例外なく！？\u3000世紀末じゃない！？」"
translation = "「단, 등장인물은 전부 모히칸!? 히로인까지 예외 없이!? 세기말이잖아!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ギャグをやりたい作者とシリアスがやりたい編集のせめぎあいでそうなった！？\u3000……そのくせ、ちゃんと面白いから頭がおかしくなりそうね」"
translation = "「개그를 하고 싶은 작가와 시리어스를 하고 싶은 편집자의 다툼으로 그렇게 되었다고!? ……그러면서도, 제대로 재미있으니까 머리가 이상해질 것 같네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「つ、次……」"
translation = "「다, 다음……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「怪物を倒すことのできる武器に選ばれた少年の成長物語……そう、今度こそ本当に王道のようね」"
translation = "「괴물을 쓰러뜨릴 수 있는 무기에 선택된 소년의 성장 이야기…… 그래, 이번에야말로 정말 왕도인 것 같네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「え、その本編完結後に連載された前日譚スピンオフ！？\u3000作者の<ruby>癖<rt>ヘキ</rt></ruby>が完全開放！？」"
translation = "「엣, 그 본편 완결 후에 연재된 전일담 스핀오프!? 작가의 버릇이 완전 개방!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「本編で最後の最後に改心し、主人公を庇って散った敵が、闇に堕ちるまでの物語……」"
translation = "「본편에서 마지막에 마지막으로 개심하여, 주인공을 감싸고 쓰러진 적이, 어둠에 타락하기까지의 이야기……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「なんて惨いの。この作者、登場人物には何をしてもいいと思っているのかしら」"
translation = "「어쩌면 이렇게 잔인할까. 이 작가, 등장인물에게는 뭘 해도 된다고 생각하는 걸까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「でもだからこそ、闇の中に一筋の光を見出すことができる…………脱帽ね」"
translation = "「하지만 그렇기 때문에, 어둠 속에서 한 줄기 빛을 찾아낼 수 있는………… 감탄스럽네」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あなたのオススメ、確かに面白いけど偏ってない？\u3000普通の漫画を読ませる気はないの？」"
translation = "「네 추천작, 확실히 재미있긴 하지만 편향되지 않았어? 평범한 만화를 읽게 할 생각은 없는 거야?」"

[[dialogue]]
speaker = "unk"
original = "リィベルにまた来てほしくて"
translation = "리벨이 다시 와 주기를 바라며"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……リクリエを阻止したら私がいなくなってしまう気がした？\u3000漫画が気になれば、また来てくれると思った？」"
translation = "「……리크리에를 저지하면 내가 사라져 버릴 것 같았어? 만화가 신경 쓰이면, 다시 와 줄 거라고 생각했어?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「『リクリエを滅ぼしたら役目を終える』……確かにそうは言ったけど」"
translation = "「『리크리에를 멸망시키면 역할을 마친다』…… 확실히 그렇게 말했지만」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……はぁ。分かったわよ」"
translation = "「……하아. 알겠어」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「約束するわ。リクリエを滅ぼした後も、あなたの家の漫画を読み終えるまでは勝手にいなくなったりしないわ。だから普通の漫画も紹介して」"
translation = "「약속할게. 리크리에를 멸망시킨 후에도, 네 집의 만화를 다 읽을 때까지는 멋대로 사라지거나 하지 않을 거야. 그러니까 평범한 만화도 소개해 줘」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「それでいいでしょう？」"
translation = "「그걸로 됐지?」"

[[dialogue]]
speaker = "unk"
original = "ああ、ありがとう"
translation = "아아, 고마워"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「別に。あなたが礼を言うことじゃないでしょうに」"
translation = "「별로. 네가 고맙다고 말할 일은 아닐 텐데」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「我ながら、変な約束をしてしまったものね。まるで漫画みたい」"
translation = "「나 스스로도, 이상한 약속을 해 버렸네. 마치 만화 같아」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「飲み物、お代わりもらえるかしら？\u3000今日は思ったより長居することになりそうね」"
translation = "「음료수, 리필해 줄 수 있을까? 오늘은 생각보다 오래 머무르게 될 것 같네」"

[[dialogue]]
speaker = "unk"
original = "ソファに腰かけ、ゆったりと漫画を楽しむリィベル。"
translation = "소파에 앉아, 느긋하게 만화를 즐기는 리벨."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を眺めながら、こんな日々がずっと続けばいいと思うのだった。"
translation = "그런 그녀를 바라보며, 이런 나날이 계속 이어지면 좋겠다고 생각했다."

