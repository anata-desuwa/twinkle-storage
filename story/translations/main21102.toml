[[dialogue]]
speaker = "unk"
original = "第２話,脱出,B"
translation = "제2화, 탈출, B"

[[dialogue]]
speaker = "チナ"
original = "「中に入ったやつらが全然出てこないと思って来てみたら、怪しい仮面したやつがいるじゃないか」"
translation = "「안에 들어간 녀석들이 전혀 나오질 않길래 와 봤더니, 수상한 가면을 쓴 녀석이 있잖아.」"

[[dialogue]]
speaker = "チナ"
original = "「新星の学園長から聞いてるぞ。お前がジグだな！」"
translation = "「신성의 학원장에게 들었다고. 네놈이 지그지!」"

[[dialogue]]
speaker = "ジグ"
original = "「新しいお客さんかな。君は新星学園に捕まっていたはずだけど、もしかしてデネブを裏切ったのかい？」"
translation = "「새로운 손님인가. 너는 신성학원에 잡혀 있었을 텐데, 혹시 데네브를 배신한 거니?」"

[[dialogue]]
speaker = "チナ"
original = "「あたしがデネブを裏切るわけないだろ！」"
translation = "「내가 데네브를 배신할 리가 없잖아!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私もいるよ！」"
translation = "「나도 있어!」"

[[dialogue]]
speaker = "グレイス"
original = "「ベアトまで！？」"
translation = "「베아토까지!?」"

[[dialogue]]
speaker = "unk"
original = "チナが乗ってきたスレイプニルの他にもう一体、同型のガーディアンが到着し、その背にはベアトリスが乗っていた。"
translation = "치나가 타고 온 슬레이프니르 외에 또 한 마리, 같은 형태의 가디언이 도착했고 그 등에는 베아트리스가 타고 있었다."

[[dialogue]]
speaker = "unk"
original = "レティシアは気を失っているのか、ベアトリスの腕に抱えられている。"
translation = "레티시아는 정신을 잃은 것인지 베아트리스의 팔에 안겨 있다."

[[dialogue]]
speaker = "クロト"
original = "（チナが極星従騎に乗ってきたのは驚いたが──これは好機かもしれない）"
translation = "（치나가 극성종기를 타고 온 것은 놀랍지만── 이건 기회일지도 몰라.）"

[[dialogue]]
speaker = "クロト"
original = "（神殿が聖庭園にぶつかるまでがタイムリミット……逆にそれまでは猶予がある）"
translation = "（신전이 성정원에 부딪힐 때까지가 타임 리미트…… 반대로 그때까지는 유예가 있어.）"

[[dialogue]]
speaker = "クロト"
original = "「今ジグの相手をするのはまずい。一旦離脱しよう！」"
translation = "「지금 지그를 상대하는 건 좋지 않아. 일단 이탈하자!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「わかりました！\u3000みんな、極星従騎に乗って！」"
translation = "「알겠습니다! 모두 극성종기에 타세요!」"

[[dialogue]]
speaker = "チナ"
original = "「そういうことなら──行け、極星従騎ホルン！」"
translation = "「그렇게 됐다면── 가라, 극성종기 호른!」"

[[dialogue]]
speaker = "ホルン"
original = "「クルルーッ！」"
translation = "「쿠루루!」"

[[dialogue]]
speaker = "unk"
original = "極星従騎スレイプニルに追従していた小型のガーディアンの群れが、ジグに殺到する。"
translation = "극성종기 슬레이프니르를 추종하던 소형 가디언 무리가 지그에게 쇄도한다."

[[dialogue]]
speaker = "ジグ"
original = "「おやおや、かわいい小鳥だね」"
translation = "「이런 이런, 귀여운 작은 새들이네.」"

[[dialogue]]
speaker = "unk"
original = "しかしジグは涼しい顔で大剣を振るい、極星従騎を次々と蹴散らしていく。"
translation = "하지만 지그는 태연한 얼굴로 대검을 휘둘러 극성종기를 차례차례 걷어찬다."

[[dialogue]]
speaker = "チナ"
original = "「お前らこっちに乗れ！」"
translation = "「너희들 이쪽에 타!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとう、チナ！\u3000助かるわ！！」"
translation = "「고마워, 치나! 살았어!!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが動けない俺とアポロを鎖で絡め取り、チナの極星従騎に乗る。"
translation = "비너스가 움직이지 못하는 나와 아폴로를 사슬로 묶어 치나의 극성종기에 태운다."

[[dialogue]]
speaker = "ナターシャ"
original = "「いくよ、メルエル」"
translation = "「가자, 메르엘.」"

[[dialogue]]
speaker = "メルエル"
original = "「う、うん……」"
translation = "「으, 응……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「梨緒ちゃんも！\u3000こっち！」"
translation = "「리오 짱도! 이쪽으로!」"

[[dialogue]]
speaker = "梨緒"
original = "「あ、ああ……！」"
translation = "「아, 아아……!」"

[[dialogue]]
speaker = "unk"
original = "ナターシャがメルエルを抱えて、梨緒とともにベアトリスの極星従騎の背に乗る。"
translation = "나타샤가 메르엘을 안고 리오와 함께 베아트리스의 극성종기 등에 탄다."

[[dialogue]]
speaker = "unk"
original = "そして２騎の極星従騎で、神殿内を後にした。"
translation = "그리고 두 기의 극성종기로 신전 내부를 뒤로했다."

[[dialogue]]
speaker = "チナ"
original = "「ひとまずは何とかなったか？」"
translation = "「일단은 어떻게든 된 건가?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、助けてくれてありがとう」"
translation = "「아아, 도와줘서 고맙다.」"

[[dialogue]]
speaker = "チナ"
original = "「別にお前らのためじゃないっての。アタシはデネブを守るために戦ってるだけだ」"
translation = "「딱히 네놈들을 위해서가 아니라고. 난 데네브를 지키기 위해 싸우고 있을 뿐이야.」"

[[dialogue]]
speaker = "クロト"
original = "「わかってる。だけどどうしてチナが極星従騎を連れているんだ？」"
translation = "「알고 있어. 하지만 어째서 치나가 극성종기를 데리고 있는 거지?」"

[[dialogue]]
speaker = "クロト"
original = "「チナが連れていた極星従騎はすべて、流星市国での戦いで倒したと思っていたんだが……」"
translation = "「치나가 데리고 있던 극성종기는 전부 유성시국에서의 전투에서 쓰러뜨렸다고 생각했는데……」"

[[dialogue]]
speaker = "チナ"
original = "「新星学園からセレスティアを借りる時、煌嶺ってやつがおまけにつけてくれたんだよ」"
translation = "「신성학원에서 셀레스티아를 빌릴 때, 코레이라는 녀석이 덤으로 붙여줬어.」"

[[dialogue]]
speaker = "クロト"
original = "「あぁ、なるほど……」"
translation = "「아아, 그렇군……」"

[[dialogue]]
speaker = "unk"
original = "流星市国で煌嶺と別れた時、『ガーディアンを捕まえる』と言っていたが、本当に自分のものにしたらしい。"
translation = "유성시국에서 코레이와 헤어질 때, 『가디언을 잡겠다』고 말하더니 정말로 자신의 것으로 만든 모양이다."

[[dialogue]]
speaker = "unk"
original = "支配下に置いた極星従騎を気前よく貸してくれたことについては、また会った時に感謝しておこう。"
translation = "지배하에 둔 극성종기를 흔쾌히 빌려준 것에 대해서는 나중에 만났을 때 감사해 두자."

[[dialogue]]
speaker = "グレイス"
original = "「チナ！\u3000大丈夫ですかチナ！」"
translation = "「치나! 괜찮습니까 치나!」"

[[dialogue]]
speaker = "チナ"
original = "「この通りピンピンしてるよ。久しぶり……ってほどでもないか、そっちこそ元気そうで何よりだよ、グレイス」"
translation = "「이 보시다시피 쌩쌩하다고. 오랜만……이라고 할 정도는 아니려나, 그쪽이야말로 건강해 보여서 다행이네, 그레이스.」"

[[dialogue]]
speaker = "グレイス"
original = "「ほっ……よかった……」"
translation = "「휴우…… 다행이다……」"

[[dialogue]]
speaker = "チナ"
original = "「まぁ……心配かけて悪かったな」"
translation = "「뭐…… 걱정 끼쳐서 미안하게 됐네.」"

[[dialogue]]
speaker = "グレイス"
original = "「ホントですよ！？\u3000アルタイルに特攻を仕掛けるなんて、みんなどれだけ心配したと思ってるんですか！！」"
translation = "「정말이라고요!? 알타이르에 특공을 걸다니, 다들 얼마나 걱정했는지 아세요!!」"

[[dialogue]]
speaker = "unk"
original = "元気なチナの様子を見て、小言を言いつつもグレイスは安堵の表情を浮かべていた。"
translation = "건강한 치나의 모습을 보고 잔소리를 하면서도 그레이스는 안도의 표정을 짓고 있었다."

[[dialogue]]
speaker = "チナ"
original = "「あとレティシアの方だけど、こっちは気絶してるだけだから。そのうち目を覚ますだろ」"
translation = "「그리고 레티시아 쪽인데, 이쪽은 기절해 있을 뿐이니까. 조만간 눈을 뜨겠지.」"

[[dialogue]]
speaker = "グレイス"
original = "「わかってますよ！\u3000それにしても、あのレティシアによく勝てましたね！」"
translation = "「알고 있어요! 그나저나 그 레티시아에게 잘도 이겼네요!」"

[[dialogue]]
speaker = "unk"
original = "奇遇にもルヴィネ以外の極星星徒会４人が、アルタイルの天界に揃った。"
translation = "기구하게도 루비네 이외의 극성성도회 4명이 알타이르의 천계에 모였다."

[[dialogue]]
speaker = "unk"
original = "しかしながら、再会を喜び合っている時間はなさそうだった。"
translation = "하지만 재회를 기뻐하고 있을 시간은 없어 보였다."

[[dialogue]]
speaker = "チナ"
original = "「で、今何が起こってるんだ？\u3000目の前で神殿が動いてるのはわかるんだが」"
translation = "「그래서 지금 무슨 일이 일어나고 있는 거야? 눈앞에서 신전이 움직이고 있는 건 알겠는데.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ジグは女神の神殿のコントロールを乗っ取って、聖庭園にぶつけようとしてるんだ」"
translation = "「지그가 여신의 신전 컨트롤을 가로채서 성정원에 부딪히려고 하고 있어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「このままだと神殿が聖庭園に激突して、両方おじゃんになるってわけ」"
translation = "「이대로라면 신전이 성정원에 격돌해서 양쪽 다 끝장난다는 소리야.」"

[[dialogue]]
speaker = "チナ"
original = "「なんだそりゃ！？\u3000そんなのアリかよ！！」"
translation = "「뭐라고!? 그런 게 말이 돼!!」"

[[dialogue]]
speaker = "unk"
original = "ジグの言葉が嘘でないことを証明するように、今も女神の神殿は聖庭園の方角に向かって移動していた。"
translation = "지그의 말이 거짓이 아님을 증명하듯 지금도 여신의 신전은 성정원 방향으로 이동하고 있었다."

[[dialogue]]
speaker = "unk"
original = "こちらも引き離されないように、極星従騎で神殿に並行して飛んでいる。"
translation = "이쪽도 뒤처지지 않도록 극성종기로 신전과 병행하여 날고 있다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ここから聖庭園までの距離を考えると……神殿がぶつかるまでざっと３時間ってところじゃないかな」"
translation = "「여기서 성정원까지의 거리를 생각하면…… 신전이 부딪힐 때까지 대략 3시간 정도 아닐까.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「じゃあ、急いで神殿を止めないと！」"
translation = "「그럼 서둘러 신전을 멈춰야 해!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、その通りだ。このままじゃアルタイルの天使はみんな消滅する」"
translation = "「아아, 맞아. 이대로라면 알타이르의 천사는 모두 소멸해.」"

[[dialogue]]
speaker = "クロト"
original = "「だけど神殿を止めるには、再び中に突入してジグを倒す必要がある」"
translation = "「하지만 신전을 멈추려면 다시 안으로 돌입해서 지그를 쓰러뜨릴 필요가 있어.」"

[[dialogue]]
speaker = "unk"
original = "天使と天界を救うには、リクリエの使徒との決着をつけなければならない。"
translation = "천사와 천계를 구하려면 리크리에의 사도와 결판을 내야만 한다."

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒の強さをよく知っているからこそ、この事実が心に重くのしかかる。"
translation = "리크리에의 사도의 강함을 잘 알고 있기에 이 사실이 마음을 무겁게 짓누른다."

[[dialogue]]
speaker = "ベアトリス"
original = "「みんなで戦えば、なんとかならないですか……？」"
translation = "「다 함께 싸우면 어떻게든 되지 않을까요……?」"

[[dialogue]]
speaker = "クロト"
original = "「神殿の中だと魔王の力が封じられているせいで、戦えるメンバーが限られているんだ」"
translation = "「신전 안에서는 마왕의 힘이 봉인되어 있는 탓에 싸울 수 있는 멤버가 한정되어 있어.」"

[[dialogue]]
speaker = "クロト"
original = "「俺とヴィーナス、アポロの３人は神殿の中で戦うのは無理そうだ。恐らくアルケインコードやノヴァフォームも使えない」"
translation = "「나와 비너스, 아폴로 세 사람은 신전 안에서 싸우는 건 무리일 것 같아. 아마 아르케인 코드나 노바 폼도 쓸 수 없겠지.」"

[[dialogue]]
speaker = "アポロ"
original = "「すまん……あたしもジグと戦いたいんだが……」"
translation = "「미안하다…… 나도 지그와 싸우고 싶지만……」"

[[dialogue]]
speaker = "unk"
original = "おそらく間に合わないだろうが、たとえフィオナを呼んできたとしても、神殿に陣取ったジグに対抗することはできないだろう。"
translation = "아마 늦겠지만 설령 피오나를 불러온다 해도 신전에 자리 잡은 지그에게 대항할 수는 없을 것이다."

[[dialogue]]
speaker = "unk"
original = "天界を守るために神殿に仕掛けられた魔王対策の罠が、今は裏目に出てしまった。"
translation = "천계를 지키기 위해 신전에 설치된 마왕 대책 함정이 지금은 역효과를 내고 말았다."

[[dialogue]]
speaker = "梨緒"
original = "「なら私が行こう。ベガから来た使徒を止めるのは、ベガの星騎士である私の役目だ」"
translation = "「그럼 내가 가겠어. 베가에서 온 사도를 멈추는 건 베가의 성기사인 나의 역할이다.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグが使徒になってしまったのは私のせいだ。だから、私が止めなければいけない」"
translation = "「지그가 사도가 되어버린 건 내 탓이야. 그러니까 내가 멈춰야만 해.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「待った。そういうのはなしって何回言わせるのさ」"
translation = "「잠깐. 그런 소리는 하지 말라고 몇 번이나 말하게 하는 거야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「天界と天使の命が懸かってるんだから、役目とか責任じゃなくて、勝てるかどうかでメンバーを決めるべきだよ」"
translation = "「천계와 천사의 목숨이 걸려 있으니까 역할이나 책임이 아니라, 이길 수 있는지 없는지로 멤버를 정해야 해.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ナターシャちゃんの言う通りだよ。今はどうやって勝つかを考えなきゃ」"
translation = "「나타샤 짱 말이 맞아. 지금은 어떻게 이길지를 생각해야 해.」"

[[dialogue]]
speaker = "梨緒"
original = "「ぅ……すまない……」"
translation = "「으…… 미안하다……」"

[[dialogue]]
speaker = "unk"
original = "ナターシャとベアトリスに反論され、項垂れる梨緒。"
translation = "나타샤와 베아트리스의 반박에 고개를 떨구는 리오."

[[dialogue]]
speaker = "unk"
original = "結果的に梨緒がジグと戦うかもしれないが、それはあくまで勝算があると判断した場合だ。"
translation = "결과적으로 리오가 지그와 싸울지도 모르지만, 그것은 어디까지나 승산이 있다고 판단될 경우다."

[[dialogue]]
speaker = "メルエル"
original = "「あの……」"
translation = "「저기……」"

[[dialogue]]
speaker = "unk"
original = "神殿内で戦えるメンバーをどう決めるか思案しようとした時、メルエルが不安そうな表情で口を開いた。"
translation = "신전 안에서 싸울 멤버를 어떻게 정할지 고심하려 할 때, 메르엘이 불안한 표정으로 입을 열었다."

[[dialogue]]
speaker = "メルエル"
original = "「神殿で戦う人を決めるために聞いておきたいんだけど……」"
translation = "「신전에서 싸울 사람을 정하기 위해 물어보고 싶은 게 있는데……」"

[[dialogue]]
speaker = "メルエル"
original = "「さっき神殿で会長くんたちが戦えなくなった時、私も星力を使えなくなったんだ。それって、私も魔王ってことなの？」"
translation = "「아까 신전에서 회장님들이 싸울 수 없게 됐을 때, 나도 성력을 쓸 수 없게 됐어. 그건 나도 마왕이라는 뜻이야?」"

[[dialogue]]
speaker = "メルエル"
original = "「……ナターシャちゃん、何か知ってる？」"
translation = "「……나타샤 짱, 뭔가 알고 있어?」"

[[dialogue]]
speaker = "unk"
original = "メルエルがナターシャに視線を向ける。"
translation = "메르엘이 나타샤에게 시선을 향한다."

[[dialogue]]
speaker = "unk"
original = "その目は、自分すら知らない秘密に怯えるようでもあった。"
translation = "그 눈은 자신조차 모르는 비밀에 겁을 먹은 듯하기도 했다."

[[dialogue]]
speaker = "ナターシャ"
original = "「んー……」"
translation = "「음─……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そう、リガルタは２０００年前に世界を破壊しようとした魔王の血族だよ」"
translation = "「그래, 리갈타는 2000년 전에 세계를 파괴하려 했던 마왕의 혈족이야.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どうして『太陽の壁画』と『月の壁画』の真実が明かされないか。それは現存する魔王の血族の迫害に繋がる可能性があるから」"
translation = "「어째서 『태양의 벽화』와 『달의 벽화』의 진실이 밝혀지지 않는가. 그것은 현존하는 마왕 혈족의 박해로 이어질 가능성이 있기 때문이지.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「結局のところ、魔王の系譜にある者が一度悪に堕ちた事実は変わらないからね」"
translation = "「결국 마왕의 계보에 있는 자가 한 번 악에 타락했다는 사실은 변하지 않으니까.」"

[[dialogue]]
speaker = "unk"
original = "ナターシャは、俺たちが知らない太陽の壁画の由来や、リガルタの秘密まで知っていて、天界にいる魔王について詳しかった。"
translation = "나타샤는 우리가 모르는 태양의 벽화의 유래나 리갈타의 비밀까지 알고 있었고, 천계에 있는 마왕에 대해 해박했다."

[[dialogue]]
speaker = "unk"
original = "メルエルの事情を知っているとすれば、きっとナターシャだろうと思われたが……"
translation = "메르엘의 사정을 알고 있다면 분명 나타샤일 것이라 생각되었지만……"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ……これ以上隠すのはもう無理か。やっぱりメルエルは女神の神殿に来てほしくなかったなぁ」"
translation = "「하아…… 더 이상 숨기는 건 이제 무리인가. 역시 메르엘은 여신의 신전에 오지 않길 바랐는데.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうだよ……メルエルは、魔王の血族だ」"
translation = "「맞아…… 메르엘은 마왕의 혈족이야.」"

[[dialogue]]
speaker = "メルエル"
original = "「！！」"
translation = "「!!」"

