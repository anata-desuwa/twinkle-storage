[[dialogue]]
speaker = "unk"
original = "週末の渋谷ともなれば、何処も人でいっぱいだった。"
translation = "주말의 시부야는 어디든 사람들로 가득했다."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「わ、わ……人込みは苦手で……あの、落ち着いて話せるところに行きませんか……？」"
translation = "「와, 와…… 인파는 질색이라…… 저기, 차분히 대화할 수 있는 곳으로 가지 않을래요……?」"

[[dialogue]]
speaker = "unk"
original = "俺たちはオープンテラスのカフェに腰を落ち着かせた。"
translation = "우리들은 오픈 테라스 카페에 자리를 잡았다."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「はぁ……まだ何もしてないのに……なんだか疲れちゃいました」"
translation = "「하아…… 아직 아무것도 안 했는데…… 왠지 지쳐버렸어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ごめんなさい、私、ずっと緊張しっぱなしで……これでも会長さんとは、お話ができている方なんですけど……」"
translation = "「죄송해요, 저 계속 긴장하고 있어서…… 이래 봬도 회장님과는 말이 통하는 편이지만요……」"

[[dialogue]]
speaker = "unk"
original = "演技してる時は、あんなに堂々としてるのに"
translation = "연기할 때는 그렇게 당당한데"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「い、いえ。演技している時も、すごく緊張しているんですよ？」"
translation = "「아, 아뇨. 연기할 때도 엄청 긴장하고 있다고요?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「でも、私の演じている役は、どんなに緊張していても、それを表には出さない子ばかりですから。役に入り込んでしまえば、わりと大丈夫なんです」"
translation = "「하지만 제가 연기하는 역할은 아무리 긴장해도 그걸 겉으로 드러내지 않는 아이들뿐이니까요. 배역에 몰입해 버리면 의외로 괜찮아요.」"

[[dialogue]]
speaker = "unk"
original = "男性が苦手な原因に心当たりは？"
translation = "남자가 서툰 원인에 짐작 가는 건 있어?"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「そうですね……私、ずっと女子校に通っていたので……新星学園に来るまで同年代の男性と接点がなかったんです」"
translation = "「글쎄요…… 저 줄곧 여고에 다녔어서…… 신성학원에 오기 전까진 또래 남자들과 접점이 없었어요.」"

[[dialogue]]
speaker = "unk"
original = "同年代以外の男性はあるんだ？"
translation = "또래 말고 다른 남자는 있었고?"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「あ、えっと……私、一応、芸能事務所に預かりで所属しているんです……あっ、レミカさんと同じ事務所なんですけど」"
translation = "「아, 그게…… 저 일단 연예 기획사에 연습생으로 소속되어 있거든요…… 앗, 레미카 씨랑 같은 기획사인데.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「たまにお仕事でお会いする男性は、皆さん、年上で……ちょっと怖い感じな方が多くて……」"
translation = "「가끔 일로 만나는 남자분들은 다들 연상이라…… 좀 무서운 느낌인 분들이 많아서……」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「その人たちに会う度、ずっと言われているんです。『アピールが弱い』『面白みがない』『そんなんじゃ芸能界じゃやっていけない』って……」"
translation = "「그 사람들을 만날 때마다 줄곧 들었어요. 『어필이 약하다』 『재미가 없다』 『그따위면 연예계에서 살아남을 수 없다』라고……」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「そんな風に言われ続けているから、芸能界にいるのも苦しくって、もう事務所もやめちゃおうかなって考えてたところで……もともと、演者志望でもなかったですしね」"
translation = "「그런 말을 계속 듣다 보니 연예계에 있는 것도 괴로워서 이제 기획사도 그만둘까 생각하던 참이었는데…… 원래 연기 지망도 아니었고요.」"

[[dialogue]]
speaker = "unk"
original = "あんなに上手いのに……！？"
translation = "그렇게 잘하는데……!?"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ふふ、ありがとうございます。小さい頃から周りの子より背が高かったので、目立ってはいたんですけど……」"
translation = "「후후, 고맙습니다. 어릴 때부터 주변 아이들보다 키가 커서 눈에 띄긴 했지만요……」"

[[dialogue]]
speaker = "unk"
original = "役者を志す転機があったの？"
translation = "배우를 지망하게 된 계기가 있었어?"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「昔いた学校の文化祭で、クラスの劇でロミオとジュリエットをやることになったんです」"
translation = "「옛날에 있던 학교 문화제 때 반 연극으로 로미오와 줄리엣을 하게 됐어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ロミオとジュリエットで、最初に与えられたのは木の役でした。ジュリエットの屋敷にある果樹園の木です」"
translation = "「로미오와 줄리엣에서 처음에 맡은 건 나무 역할이었어요. 줄리엣의 저택에 있는 과수원 나무요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「背が高いからって、それだけの理由でした。誰がやってもあまり変わらないような背景役なのに……私はそれでも真剣に取り組んでたんです」"
translation = "「키가 크다는 것, 단지 그 이유 때문이었죠. 누가 해도 별반 다를 게 없는 배경 역할인데…… 저는 그래도 진지하게 임했거든요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「でも、本番の３日前に、ジュリエット役の子が転んで足を骨折してしまい、劇に出られなくなっちゃったんです」"
translation = "「그런데 본 공연 사흘 전에 줄리엣 역인 아이가 넘어져서 다리가 부러지는 바람에 연극에 못 나오게 됐어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「突然のことだったから、クラスはてんやわんやで……花形のジュリエットですけど、役を覚えるには本番までの期日があまりにも短すぎました」"
translation = "「갑작스러운 일이라 반은 난리가 났고…… 꽃인 줄리엣이지만 대사를 외우기엔 본 공연까지 남은 기간이 너무 짧았거든요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「うろ覚えでジュリエットなんてやったら、全校生徒の前で恥をかくからって、皆で押し付け合いになって……最後の最後に木の役だった私に押し付けられたんです」"
translation = "「어설프게 줄리엣을 했다간 전교생 앞에서 망신당한다면서 다들 서로 떠넘기다가…… 마지막의 마지막에 나무 역할이었던 저한테 떠넘겨졌어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「でも、私は木の役とはいえ、ずっと舞台の上で、ジュリエット役の子が演じているのを傍で見てましたから」"
translation = "「하지만 저는 나무 역할이긴 했어도 계속 무대 위에서 줄리엣 역인 아이가 연기하는 걸 곁에서 지켜봤었거든요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「セリフもだいたい覚えてましたし、見様見真似でやってみたら、なんか……できちゃいまして」"
translation = "「대사도 대충 외우고 있었고, 흉내 내보니까 왠지…… 되더라고요.」"

[[dialogue]]
speaker = "unk"
original = "天才だ……！"
translation = "천재다……!"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「そ、そんなことないです！\u3000今と比べたら、演技も全然稚拙で、お恥ずかしい限りで……！」"
translation = "「그, 그렇지 않아요! 지금이랑 비교하면 연기도 아주 치졸해서 부끄러울 따름이고요……!」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「でも、背が高いおかげで舞台俳優に向いていたみたいですし、私の引っ込み思案な性格も、悲劇のヒロインのジュリエットに合っていたんでしょうね」"
translation = "「그래도 키가 큰 덕분에 무대 배우에 적합했던 모양이고, 제 내성적인 성격도 비극의 히로인인 줄리엣과 맞았겠죠.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「女子校でロミオ役も女の子だったおかげで、物怖じせずに済みました。文化祭での本番も大成功で、大盛り上がりでした」"
translation = "「여고라서 로미오 역도 여자애였던 덕분에 겁먹지 않고 끝낼 수 있었어요. 문화제 본 공연도 대성공해서 엄청 떠들썩했죠.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「そうしたら、文化祭での動画をライブ配信していた人がいて、その動画が今の芸能事務所の目に留まって、スカウトされて……今に至っています」"
translation = "「그랬더니 문화제 영상을 라이브로 스트리밍하던 사람이 있어서 그 영상이 지금 연예 기획사 눈에 띄어 스카우트됐고…… 지금에 이르렀어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「演技は少しは上達しましたけど、男性が怖いのはちっとも克服できてないです……あれ？」"
translation = "「연기는 조금 나아졌지만 남자가 무서운 건 조금도 극복하지 못했어요…… 어라?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ど、どうしてですかね……会長さんはあんまり怖くないです……！」"
translation = "「어, 어째서일까요…… 회장님은 별로 무섭지 않아요……!」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「私、同年代の男の子とこんな風にお喋りするのも、昔のことを話したのも初めてなんですよ……？」"
translation = "「저, 또래 남자애랑 이렇게 수다를 떠는 것도, 옛날이야기를 한 것도 처음이란 말이에요……?」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「やっぱり、メイプルさんが言っていた通りです。会長さんには人の心を開かせる不思議な力があるんですね、ふふ」"
translation = "「역시 메이플 씨가 말한 대로네요. 회장님에겐 사람의 마음을 열게 하는 신비한 힘이 있나 봐요, 후후.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「あっ、もうこんな時間……そろそろ帰りましょうか。今日はありがとうございました。とっても楽しかったです」"
translation = "「앗, 벌써 시간이 이렇게…… 슬슬 돌아갈까요. 오늘 정말 고마웠어요. 정말 즐거웠습니다.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「うぅ……すごい人……きゃっ！？」"
translation = "「으으…… 사람 많다…… 꺄앗!?」"

[[dialogue]]
speaker = "unk"
original = "スクランブル交差点でごった返す人波に、藍が飲み込まれそうになる。"
translation = "스크램블 교차로에서 북적이는 인파에 아이가 휩쓸릴 뻔한다."

[[dialogue]]
speaker = "unk"
original = "咄嗟に伸ばした腕は、なんとか藍の手を掴んでいた。"
translation = "급히 뻗은 팔은 간신히 아이의 손을 붙잡았다."

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「ひゃっ！？\u3000あ、ありがとうございます、会長さん。転んじゃうところでした……」"
translation = "「히얏!? 고, 고맙습니다, 회장님. 넘어질 뻔했어요……」"

[[dialogue]]
speaker = "unk"
original = "足を骨折したらジュリエットが演れなくなるよ"
translation = "다리 부러지면 줄리엣 연기 못 하잖아"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「……え？\u3000あっ、私が初めてジュリエットを演った時の話ですか……あはは」"
translation = "「……에? 아, 제가 처음 줄리엣을 연기했을 때 이야기인가요…… 아하하.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「……あれ？\u3000私、会長さんと手、繋げてます」"
translation = "「……어라? 저 회장님이랑 손, 잡고 있어요.」"

[[dialogue]]
speaker_original = "藍"
speaker_translation = "아이"
original = "「会長さんの手、すごく優しくて、あったかくて……ちっとも怖くないです。これなら私……舞台の上でも大丈夫そうです」"
translation = "「회장님 손, 정말 다정하고 따뜻해서…… 하나도 안 무서워요. 이 정도라면 저…… 무대 위에서도 괜찮을 것 같아요.」"

[[dialogue]]
speaker = "unk"
original = "こうして、藍は異性と手を繋ぐことを克服し、ロクサーナの差し向けたデートは見事成功したけど──"
translation = "이렇게 아이는 이성과 손잡는 것을 극복했고, 록사나가 주선한 데이트는 훌륭하게 성공했지만──"

[[dialogue]]
speaker_original = "ロクサーナ"
speaker_translation = "록사나"
original = "「ふっふっふ……！」"
translation = "「훗훗훗……!」"

[[dialogue]]
speaker = "unk"
original = "演出家がどこかでほくそ笑んでいるような気がしたのだった。"
translation = "연출가가 어딘가에서 회심의 미소를 짓고 있는 듯한 기분이 들었다."

