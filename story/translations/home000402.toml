[[dialogue]]
speaker = "いろは"
original = "「こんにちはーーー！！！\u3000『マジカミ』をプレイしてくれてた人は、お久しぶり！！\u3000そうでない人は初めまして！」"
translation = "「안녕하세요---!!! 『매지컬 미라이』를 플레이해 준 분들은 오랜만!! 그렇지 않은 분들은 처음 뵙겠습니다!」"

[[dialogue]]
speaker = "いろは"
original = "「『マジカミ』の世界からやって来た魔法少女『<ruby>遊部<rt>あそべ</rt></ruby>いろは』だよ♪」"
translation = "「『매지컬 미라이』의 세계에서 온 마법 소녀 『아소베 이로하』야♪」"

[[dialogue]]
speaker = "花織"
original = "「えっと……ちょっと名乗るの恥ずかしいけど、いろはと魔法少女をやってる『<ruby>朝永花織<rt>ともながかおり</rt></ruby>』です。よ、よろしくっ！」"
translation = "「저기…… 조금 자칭하기 부끄럽지만 이로하와 마법 소녀를 하고 있는 『토모나가 카오리』입니다. 자, 잘 부탁해!」"

[[dialogue]]
speaker = "ここあ"
original = "「同じく、２人と一緒に魔法少女をやってる『<ruby>百波瀬<rt>ゆわせ</rt></ruby>ここあ』だよ～♪\u3000背は小さいけど、いろはすやカオリンよりも１コ先輩なんだぞ♪\u3000よろしくね～☆」"
translation = "「마찬가지로 두 사람과 함께 마법 소녀를 하고 있는 『유와세 코코아』야~♪ 키는 작지만 이로하스나 카오링보다 한 살 선배라고♪ 잘 부탁해~☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「お三方、挨拶ありがとうございま～す！\u3000いいですね～♪\u3000特に照れてる花織さんの表情、可愛くてグッドですよ～☆」"
translation = "「세 분, 인사 감사합니다! 좋네요~♪ 특히 부끄러워하는 카오리 씨의 표정, 귀여워서 굿이에요~☆」"

[[dialogue]]
speaker = "花織"
original = "「そういうの言わなくていいですからっ！\u3000余計に恥ずかしくなるじゃないですか！？」"
translation = "「그런 말 안 해도 되니까요! 더 부끄러워지잖아요!?」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃははっ☆\u3000アンナちん、次は変身する流れでいいのかにゃ？」"
translation = "「냐하핫☆ 안나 칭, 다음은 변신하는 흐름이면 될까냥?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はいっ、ぜひぜひ可愛く変身ポーズを決めて、お願いしま～す♪」"
translation = "「네, 부디 귀엽게 변신 포즈를 취해주시길 부탁드려요~♪」"

[[dialogue]]
speaker = "いろは"
original = "「まっかせてー！\u3000今日の為に、かっこいいの考えてきたから！」"
translation = "「맡겨줘! 오늘을 위해서 멋진 걸 생각해 왔으니까!」"

[[dialogue]]
speaker = "花織"
original = "「というか、変身ポーズって本当に必要ある？」"
translation = "「그보다 변신 포즈가 정말 필요해?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あります！」"
translation = "「필요합니다!」"

[[dialogue]]
speaker = "いろは"
original = "「あるよ！\u3000あるとないとでは、戦闘に入る時のモチベーションが全然違うからね！？」"
translation = "「필요해! 있고 없고에 따라 전투에 들어갈 때의 모티베이션이 전혀 다르니까!?」"

[[dialogue]]
speaker = "花織"
original = "「２人共、圧がすごい……」"
translation = "「둘 다 압박이 장난 아니네……」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃはははっ♪\u3000ここあは面白いから、喜んでやるよ～☆」"
translation = "「냐하하하♪ 코코아는 재밌으니까 기쁘게 할게~☆」"

[[dialogue]]
speaker = "いろは"
original = "「よ～し、それじゃあ行くよ、カオリン！」"
translation = "「좋아, 그럼 간다, 카오링!」"

[[dialogue]]
speaker = "花織"
original = "「あ～もう！\u3000やればいいんでしょ、やれば！」"
translation = "「아 정말! 하면 되잖아, 하면!」"

[[dialogue]]
speaker = "ここあ"
original = "「３人で一緒に、せ～のっ☆」"
translation = "「셋이서 같이, 하나~둘☆」"

[[dialogue]]
speaker = "３人"
original = "「変身！！」"
translation = "「변신!!」"

[[dialogue]]
speaker = "いろは"
original = "「じゃ～ん♪\u3000アンナちゃん、どうどう～～！？」"
translation = "「짠♪ 안나짱, 어때어때~~!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「うおおおぉっ！\u3000異世界の魔法少女が３人揃った変身ポーズ、しかと記憶魔法で永久保存させて頂きましたよぉ～～！！」"
translation = "「우오오오옷! 이세계 마법 소녀 세 명이 모인 변신 포즈, 확실히 기억 마법으로 영구 보존했습니다아아~~!!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "（って、おや？\u3000今ちょっと、別の反応があったような……？）"
translation = "(엇, 그런데? 지금 잠깐 다른 반응이 있었던 것 같은데……?)"

[[dialogue]]
speaker = "陽彩"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ここあ"
original = "「よし、それじゃあ、そろそろコラボイベントを始めますかにゃ～？」"
translation = "「좋아, 그럼 슬슬 콜라보 이벤트를 시작해 볼까냥~?」"

[[dialogue]]
speaker = "花織"
original = "「サチちゃんたちも待っているだろうしね。いろは、すぐに行ける？」"
translation = "「사치짱 일행도 기다리고 있을 테고 말이야. 이로하, 바로 갈 수 있어?」"

[[dialogue]]
speaker = "いろは"
original = "「うんっ、カオリン！\u3000ここにゃん！\u3000アンナちゃんは大丈夫？」"
translation = "「응, 카오링! 코코냥! 안나짱은 괜찮아?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あっ、はい！\u3000何はともあれ、始めて行きましょう☆」"
translation = "「앗, 네! 어쨌든 시작해 보죠☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「それでは、『マジカミ×ティンクルスターナイツ』コラボ～～♪」"
translation = "「그럼 『매지컬 미라이×팅클 스타 나이츠』 콜라보~~♪」"

[[dialogue]]
speaker = "３人"
original = "「レディー・ゴー！！」"
translation = "「레디 고!!」"

