[[dialogue]]
speaker = "unk"
original = "第４話,キミとならどこでも,P"
translation = "제4화, 너와 함께라면 어디든, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺は神社へ行き、ルリエルの巫女修行を手伝っていたのだが――"
translation = "그날, 나는 신사에 가서 루리엘의 무녀 수행을 돕고 있었는데──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うぅ～、まさか雨が止まらなくなってしまうなんてぇ～……」"
translation = "「으으~ 설마 비가 그치지 않게 되어버릴 줄이야~……」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの巫女フォームの能力である『天気を操る星術』。その制御が利かなくなってしまい、空は晴れたままなのに、神社の敷地内にだけ雨が降り続けていた。"
translation = "루리엘의 무녀 폼 능력인 『날씨를 조종하는 성술』. 그 제어가 되지 않게 되어버려 하늘은 맑은데 신사 부지에만 비가 계속 내리고 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、ごめんなさいなのです。ずぶ濡れにさせちゃって……。ルリエルが調子に乗って、カッコいいところを見せようと思ったばっかりに……」"
translation = "「회장님, 죄송해요. 흠뻑 젖게 해버려서……. 루리엘이 우쭐해서 멋진 모습을 보여주려고 한 탓에……」"

[[dialogue]]
speaker = "unk"
original = "気にしなくていい"
translation = "신경 쓰지 마"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ……ルリエルの頭、撫でてくれるのですか？\u3000――訓練を頑張っているから？」"
translation = "「앗…… 루리엘의 머리, 쓰다듬어 주시는 건가요? ──훈련을 열심히 하고 있으니까?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへへへへぇ♪\u3000ありがとうなのです、会長さん<emoji=heart04>」"
translation = "「에헤헤헤헤헤♪ 고마워요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、雨が止むまでの間、俺たちは神社の縁側で休憩することになった。"
translation = "그러고 나서 비가 그칠 때까지 우리들은 신사의 툇마루에서 휴식을 취하기로 했다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、せっかくですから、煩悩解放の修業をしませんか？」"
translation = "「회장님, 이왕 이렇게 된 거 번뇌 해방 수행을 하지 않을래요?」"

[[dialogue]]
speaker = "unk"
original = "今回の煩悩はどんなのだ？"
translation = "이번 번뇌는 어떤 거야?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふふふっ、えっとですね～♪\u3000体が濡れちゃったので～、くっ付いてルリエルのことを温めて欲しいのです<emoji=heart04>」"
translation = "「후후훗, 음 그러니까요~♪ 몸이 젖어버렸으니까~ 딱 붙어서 루리엘을 따뜻하게 해줬으면 좋겠어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こんな風に手を恋人繋ぎにして、肩に寄りかかって～<emoji=heart04>」"
translation = "「이렇게 손을 깍지 끼고 어깨에 기대서~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はふぅ……<emoji=heart04>\u3000会長さんの体温が伝わって来て、落ち着きます<emoji=heart04>」"
translation = "「하후우……<emoji=heart04> 회장님의 체온이 전해져 와서 안심돼요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「――あっ、そうだ。わたし、前から会長さんに聞いてみたかったことがあるのです！」"
translation = "「──앗, 맞다. 저 전부터 회장님께 물어보고 싶었던 게 있어요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いつもルリエルの煩悩を聞いてもらってばかりで、会長さんは何か煩悩ってあったりしますか？」"
translation = "「항상 루리엘의 번뇌만 들어주시기만 하는데, 회장님은 뭔가 번뇌 같은 게 있나요?」"

[[dialogue]]
speaker = "unk"
original = "……変なこと言ってもいい？"
translation = "……이상한 말 해도 돼?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「変なことですか？\u3000……大丈夫ですよ♪\u3000どんなことなのです？」"
translation = "「이상한 말인가요? ……괜찮아요♪ 어떤 건가요?」"

[[dialogue]]
speaker = "unk"
original = "俺は最近ちょっと抱いていた欲望を口にする。"
translation = "나는 최근 조금 품고 있던 욕망을 입 밖으로 낸다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「――えっ？\u3000本当は、わざと人目があるところで抱きしめたり、キスしてみたい？」"
translation = "「──엣? 사실은 일부러 남들 눈이 있는 곳에서 껴안거나 키스해 보고 싶어?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふむふむ、なるほどぉ……ちなみにどういった理由でそんなことを？」"
translation = "「흠흠, 그렇군요…… 참고로 어떤 이유로 그런 걸?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──ルリエルが自分の恋人だって、色んな人に主張しちゃいたい……？\u3000ふむふむ、独占欲ですかぁ」"
translation = "「──루리엘이 자신의 연인이라고 여러 사람에게 주장해버리고 싶어……? 흠흠, 독점욕인가요~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いいですよ♪\u3000今度カフェテリアとか、沢山の人がいるところで見せつけちゃいますか？」"
translation = "「좋아요♪ 다음에 카페테리아라든가 사람 많은 곳에서 보여줘 버릴까요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちょっといけないことをしているみたいでドキドキしちゃいそうですけど……でも、会長さんのお願いは叶えてあげたいのです♪」"
translation = "「조금 못된 짓을 하는 것 같아서 두근거릴 것 같지만…… 그래도 회장님의 부탁은 들어주고 싶어요♪」"

[[dialogue]]
speaker = "unk"
original = "俺は愛おしさで堪らなくなって、彼女を抱き締めて、キスをする。"
translation = "나는 사랑스러움을 견딜 수 없어서 그녀를 껴안고 키스를 한다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ<emoji=heart04>\u3000会長さん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエル、大好きだ"
translation = "루리엘, 정말 좋아해"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしもなのです<emoji=heart04>\u3000愛してます、会長さん<emoji=heart04>」"
translation = "「저도예요<emoji=heart04> 사랑해요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 츄<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「――もっとしたいのですか？\u3000えへへ、いいですよ<emoji=heart04>」"
translation = "「──더 하고 싶나요? 에헤, 좋아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ミヤハルさんが帰って来ちゃうかもしれませんけど……その時はさっそく、見せつけちゃいましょう<emoji=heart04>」"
translation = "「미야하루 씨가 돌아와 버릴지도 모르지만…… 그때는 곧장 보여줘 버리죠<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000んちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04> 응츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なかなか降り止まないと思っていた雨も、ルリエルと肌を重ねて温め合っていると、いつの間にか止んでいて。"
translation = "좀처럼 그치지 않을 것 같던 비도 루리엘과 살을 맞대고 온기를 나누고 있으니 어느새 그쳐 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わぁっ♪\u3000見て下さい、会長さん！\u3000お空に虹がかかってますよ♪」"
translation = "「와아♪ 보세요, 회장님! 하늘에 무지개가 걸렸어요♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「すごく綺麗なのです♪\u3000天気雨だったからでしょうか？」"
translation = "「정말 예뻐요♪ 여우비였기 때문일까요?」"

[[dialogue]]
speaker = "unk"
original = "ルリエル、さっきの話なんだけど……"
translation = "루리엘, 아까 했던 말인데……"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「――人前でイチャイチャしたいという話、ですか？」"
translation = "「──사람들 앞에서 꽁냥거리고 싶다는 이야기 말인가요?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷く。ああは言ったものの、俺もルリエルも星徒会のメンバーだし、実際にカフェテリアでベタベタし過ぎるのは問題だろう。"
translation = "나는 고개를 끄덕인다. 그렇게 말은 했지만 나도 루리엘도 성도회 멤버고, 실제로 카페테리아에서 너무 달라붙어 있는 건 문제가 될 것이다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「――だから、ちょっと遠くに出かけて、そこでイチャイチャを？」"
translation = "「──그러니까 조금 먼 곳으로 나가서 거기서 꽁냥거림을?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わぁ～♪\u3000会長さんと遠くにお出かけ、すごく楽しそうなのです♪\u3000行きましょう！\u3000今週末にでも！」"
translation = "「와아~♪ 회장님과 멀리 외출이라니 정말 즐거울 것 같아요♪ 가요! 이번 주말이라도 당장!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あと、今は空のお散歩にも出かけたいのです♪\u3000虹が出ているうちに、一緒に近くまで見に行きましょう！」"
translation = "「그리고 지금은 하늘 산책도 나가고 싶어요♪ 무지개가 떠 있는 동안 같이 가까이서 보러 가요!」"

[[dialogue]]
speaker = "unk"
original = "虹はそばに行くと消えちゃうぞ？"
translation = "무지개는 곁에 가면 사라져 버린다고?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えっ、そうなのですか！？\u3000う～ん、でも……やっぱり行ってみたいのです！」"
translation = "「엣, 그런가요!? 으음, 하지만…… 역시 가보고 싶어요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だって――」"
translation = "「그야──」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんとなら、どこでも絶対に楽しいですから♪」"
translation = "「회장님과 함께라면 어디든 분명 즐거울 테니까요♪」"

[[dialogue]]
speaker = "unk"
original = "それから、愛しの天使に手を引かれて、俺は空のデートを楽しむのだった――"
translation = "그러고 나서 사랑스러운 천사에게 손을 이끌려 나는 하늘 데이트를 즐기는 것이었다──"

