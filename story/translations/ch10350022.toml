[[dialogue]]
speaker = "unk"
original = "第２話,お母様接近遭遇,P"
translation = "제2화, 어머님 근접 조우, P"

[[dialogue]]
speaker = "unk"
original = "今日はセナリィと恋愛パートナー契約を結んでからの初デート。"
translation = "오늘은 세나리와 연애 파트너 계약을 맺고 나서의 첫 데이트."

[[dialogue]]
speaker = "セナリィ"
original = "「うふふ、デート、デート♪\u3000会長様とデート♪」"
translation = "「우후후, 데이트, 데이트♪ 회장님과 데이트♪」"

[[dialogue]]
speaker = "unk"
original = "ウッキウキなセナリィと手を繋いで観光をしていると──"
translation = "신이 난 세나리와 손을 잡고 관광을 하고 있자니──"

[[dialogue]]
speaker = "unk"
original = "よりによって、デート中には絶対に出会いたくない人物を見かけてしまった。"
translation = "하필이면 데이트 중에는 절대로 마주치고 싶지 않은 인물을 발견하고 말았다."

[[dialogue]]
speaker = "unk"
original = "セナリィ、ちょっとこっちに隠れよう！"
translation = "세나리, 잠깐 이쪽으로 숨자!"

[[dialogue]]
speaker = "セナリィ"
original = "「きゃっ、か、会長様？\u3000誰かいましたの？」"
translation = "「꺄앗, 회, 회장님? 누가 있었나요?」"

[[dialogue]]
speaker = "リノ"
original = "「あら？\u3000あらあらあら？\u3000クロトじゃない！\u3000こんなとこで会うなんて奇遇ねぇ！」"
translation = "「어라? 어라어라어라? 쿠로토 아니니! 이런 데서 만나다니 기구하네!」"

[[dialogue]]
speaker = "unk"
original = "気づかれた……"
translation = "들켰다……"

[[dialogue]]
speaker = "リノ"
original = "「今、ちょうど研究会の帰りなのよ。思ったより早く終わったからお買い物してたんだけど……面白いところで会っちゃったわねー♪」"
translation = "「지금 막 연구회 끝나고 돌아가는 길이야. 생각보다 일찍 끝나서 쇼핑하고 있었는데…… 재미있는 곳에서 만났네~♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様？\u3000こちらの綺麗な女性は？\u3000お若いのに人妻のような風格……会長様は年上の女性にまで粉をかけてますの？」"
translation = "「회장님? 이 아름다운 여성분은? 젊으신데도 유부녀 같은 풍채…… 회장님은 연상의 여성에게까지 수작을 걸고 계신 건가요?」"

[[dialogue]]
speaker = "unk"
original = "そうじゃなくってー！"
translation = "그게 아니라니까─!"

[[dialogue]]
speaker = "リノ"
original = "「そっちの子……もしかして、クロトの彼女？」"
translation = "「그쪽 아이…… 혹시 쿠로토 여자친구니?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、会長様の彼女ですわ。私たちはラブラブデート中ですので、お邪魔虫に用はございません」"
translation = "「네, 회장님의 여자친구예요. 저희는 꽁냥꽁냥 데이트 중이니까, 방해꾼에게 볼일은 없답니다」"

[[dialogue]]
speaker = "リノ"
original = "「あら……？\u3000あっ！\u3000どこかで見た顔だと思ったら、あなた、もしかして、あのバンデット・セナリィね！」"
translation = "「어라……? 앗! 어디서 본 얼굴이다 했더니, 너 혹시 그 밴디트 세나리구나!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふうん……私をご存じとは光栄ですわね。でも、そうと知っていながら、<ruby>盗賊<rt>バンデット</rt></ruby>である私から彼を強奪しようなんて、いい度胸──」"
translation = "「흐음…… 저를 알고 계시다니 영광이네요. 하지만 그렇다는 걸 알면서도 <ruby>도적<rt>밴디트</rt></ruby>인 저에게서 그를 강탈하려 하다니, 배짱이 좋으시──」"

[[dialogue]]
speaker = "リノ"
original = "「やっぱりー！？\u3000珍しい能力の持ち主だから、前々から目をつけてたの！\u3000こんなところで会えるなんて感激だわ！\u3000すぐに気づけなくて、ごめんなさいねー！」"
translation = "「역시나─!? 희귀한 능력의 소유자라 예전부터 눈여겨보고 있었어! 이런 데서 만나다니 감격이야! 바로 알아보지 못해서 미안해~!」"

[[dialogue]]
speaker = "セナリィ"
original = "「は、はぁ……あなた、何者ですの……？」"
translation = "「하, 하아…… 당신, 정체가 뭐예요……?」"

[[dialogue]]
speaker = "リノ"
original = "「自己紹介が遅れちゃったわね。いつもクロトがお世話になってます。クロトの母のリノです」"
translation = "「자기소개가 늦었네. 항상 쿠로토가 신세 지고 있어요. 쿠로토의 엄마인 리노란다」"

[[dialogue]]
speaker = "セナリィ"
original = "「母って──かっ、会長様の、お、お母様っ！？」"
translation = "「엄마라니── 어, 회장님의 어, 어머님!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「これはこれは、とんだご無礼を！\u3000失礼いたしました！\u3000突然で、何と言えばいいやら……えーと、は、はじめまして！\u3000会長様を私にください！」"
translation = "「이거 참, 큰 실례를 범했습니다! 죄송합니다! 갑작스러워서 뭐라고 말씀드려야 할지…… 저기, 처, 처음 뵙겠습니다! 회장님을 제게 주십시오!」"

[[dialogue]]
speaker = "unk"
original = "何言い出してんの！？"
translation = "무슨 소릴 하는 거야!?"

[[dialogue]]
speaker = "unk"
original = "テンパったセナリィを他所に、俺はセナリィと付き合っていることを母さんに説明した。"
translation = "당황한 세나리를 제쳐두고, 나는 세나리와 사귀고 있다는 것을 엄마에게 설명했다."

[[dialogue]]
speaker = "リノ"
original = "「そうなのね、クロトにこんな可愛い彼女ができたなんて、お母さん、嬉しいわー」"
translation = "「그렇구나, 쿠로토에게 이렇게 귀여운 여자친구가 생기다니, 엄마는 기쁘단다─」"

[[dialogue]]
speaker = "セナリィ"
original = "「あ、ありがとうございます」"
translation = "「가, 감사합니다」"

[[dialogue]]
speaker = "リノ"
original = "「こんなところで立ち話もなんだし、お茶でもしながらゆっくりお話しない？\u3000セナリィさんはどう？」"
translation = "「이런 데서 서서 이야기하기도 좀 그러니, 차라도 마시면서 천천히 얘기하지 않을래? 세나리 양은 어때?」"

[[dialogue]]
speaker = "セナリィ"
original = "「つ、謹んでお受けいたしますわ！」"
translation = "「가, 기쁘게 받들겠습니다!」"

[[dialogue]]
speaker = "セナリィ"
original = "（まさかの会長様のお母様とのエンカウント。突発イベントにも程があるわ！）"
translation = "（설마 했던 회장님 어머님과의 인카운터. 돌발 이벤트에도 정도가 있지!）"

[[dialogue]]
speaker = "セナリィ"
original = "（でも逆に大チャンスでもある。お母様にも正式に交際を認めてもらえるよう、いいところを見せつけなくては！）"
translation = "（하지만 반대로 큰 찬스이기도 해. 어머님께도 정식으로 교제를 인정받을 수 있도록, 좋은 모습을 보여드려야지!）"

[[dialogue]]
speaker = "セナリィ"
original = "「先ほどは大変失礼しました。あまりにもお若くて、会長様のお母様だなんて夢にも思いませんでしたわ」"
translation = "「방금 전에는 정말 실례했습니다. 너무나도 젊으셔서 회장님의 어머님이라곤 꿈에도 생각지 못했어요」"

[[dialogue]]
speaker = "リノ"
original = "「やだ、お上手。聞いた？\u3000クロト。お母さん、そんなに若く見えるんだって♪」"
translation = "「어머, 말도 잘하네. 들었니? 쿠로토. 엄마가 그렇게 젊어 보인대♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「改めて……クロトさんとパートナー契──お付き合いさせていただいております、セナリィと申しますわ」"
translation = "「새삼스럽지만…… 쿠로토 씨와 파트너 계── 사귀고 있는 세나리라고 합니다」"

[[dialogue]]
speaker = "リノ"
original = "「セナリィちゃんは星徒会の人じゃないわよね？\u3000なんだったかしら、ゴールデンウィークとかなんとか……」"
translation = "「세나리 양은 성도회 사람이 아니지? 뭐였더라, 골든 위크였나 뭐였나……」"

[[dialogue]]
speaker = "セナリィ"
original = "「大型連休ではありませんわ、お母様。ゴールデングース──金のガチョウです。在学中に起業し、弊社の代表を務めております」"
translation = "「대형 연휴가 아니에요, 어머님. 골든 구스── 황금 거위입니다. 재학 중에 창업하여 저희 회사의 대표를 맡고 있어요」"

[[dialogue]]
speaker = "リノ"
original = "「まあ、すごい！\u3000その若さで社長さんなのね！？」"
translation = "「어머, 대단해! 그 나이에 사장님인 거니!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「年商は億を超えるとか超えないとか、<ruby>実しやか<rt>まことしやか</rt></ruby>に囁かれておりますわ、ほほ、ほほほ」"
translation = "「연간 매출은 억 단위를 넘는다느니 안 넘는다느니 그럴싸하게 속삭여지고 있답니다, 호호, 호호호」"

[[dialogue]]
speaker = "unk"
original = "代表が売上を把握してないのはダメでは？"
translation = "대표가 매출을 파악 못 하고 있으면 안 되는 거 아냐?"

[[dialogue]]
speaker = "セナリィ"
original = "「最近の帳簿は、ヒマワリが管理しているんですもの……！\u3000私よりも分かりやすくて、ミスが皆無なので重宝してますわ」"
translation = "「최근 장부는 히마와리가 관리하고 있는걸요……! 저보다 알기 쉽고 실수가 전무해서 중용하고 있어요」"

[[dialogue]]
speaker = "リノ"
original = "「星徒会とセナリィちゃんは接点が少なそうだけど、どうやって知り合ったのかしら。ふたりの馴れ初めなんて聞いちゃってもいい？」"
translation = "「성도회와 세나리 양은 접점이 적어 보이는데, 어떻게 알게 된 거니? 두 사람의 첫 만남 같은 거 들어봐도 될까?」"

[[dialogue]]
speaker = "セナリィ"
original = "「出会いは私が星徒会に売り込みに行ったところからですわね。思い返せば、懐かしさすらありますわ」"
translation = "「만남은 제가 성도회에 영업을 하러 갔을 때부터였죠. 생각해보면 그리움마저 느껴지네요」"

[[dialogue]]
speaker = "セナリィ"
original = "「それから会長様と幾度も合同任務を重ね……とても危険なミッションの最中でも見事な立ち回りを見せる会長様に心を奪われてしまい……」"
translation = "「그 후로 회장님과 몇 번이고 합동 임무를 거듭하며…… 매우 위험한 미션 중에도 훌륭한 몸놀림을 보여주시는 회장님께 마음을 빼앗겨 버려서……」"

[[dialogue]]
speaker = "セナリィ"
original = "「そして、星徒会の合宿に参加させていただいた時……私のようなものでも優しく認めてくれる懐の深さに、心を奪われてしまったのですわ」"
translation = "「그리고 성도회 합숙에 참가했을 때…… 저 같은 사람도 상냥하게 인정해 주는 도량의 깊이에 마음을 빼앗겨 버린 거예요」"

[[dialogue]]
speaker = "リノ"
original = "「きゃ♪\u3000クロト、やるじゃなーい。それからセナリィちゃんはゾッコンラブなのね」"
translation = "「꺄♪ 쿠로토, 제법인걸─. 그래서 세나리 양은 홀딱 반해버린 거구나」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、会長様を愛し、会長様に愛されていることを、心より誇りとしておりますわ」"
translation = "「네, 회장님을 사랑하고, 회장님께 사랑받고 있다는 것을 진심으로 자랑스럽게 여기고 있어요」"

[[dialogue]]
speaker = "セナリィ"
original = "「不束者ですが、会長様とは末永くお付き合いしたいと思っております。私たちの交際を、お母様にも認めて頂ければ」"
translation = "「부족한 몸이지만, 회장님과는 오랫동안 사귀고 싶다고 생각합니다. 저희의 교제를 어머님께서도 허락해 주신다면」"

[[dialogue]]
speaker = "リノ"
original = "「……え？\u3000なんでそんな話に？\u3000あ、もしかしてセナリィちゃん、私が見定めてると思ってたのかな？」"
translation = "「……에? 왜 이야기가 그렇게 돼? 아, 혹시 세나리 양, 내가 지켜보고 있다고 생각한 걸까?」"

[[dialogue]]
speaker = "セナリィ"
original = "「え……違いますの？」"
translation = "「에…… 아닌가요?」"

[[dialogue]]
speaker = "リノ"
original = "「認めるも認めないも、そこはクロトの自主性に任せてるからね。クロトはセナリィちゃんと末永～くお付き合いしたいんでしょ？」"
translation = "「허락하고 말고 할 것도 없이 그건 쿠로토의 자율성에 맡기고 있으니까. 쿠로토는 세나리 양과 오랫~동안 사귀고 싶은 거지?」"

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론이지"

[[dialogue]]
speaker = "リノ"
original = "「それなら、お母さんから言うことは何にもありませーん。クロトが選ぶ人に間違いなし」"
translation = "「그렇다면 엄마가 할 말은 아무것도 없어요─. 쿠로토가 선택한 사람에게 틀림은 없으니까」"

[[dialogue]]
speaker = "リノ"
original = "「セナリィちゃんがクロトを心から愛していることは最初から伝わったし、噂に聞いてたよりもずっといい子じゃない」"
translation = "「세나리 양이 쿠로토를 진심으로 사랑하고 있다는 건 처음부터 전해졌고, 소문으로 듣던 것보다 훨씬 착한 아이잖니」"

[[dialogue]]
speaker = "リノ"
original = "「お母さん、気に入っちゃった。いつでもウチに遊びに来てね」"
translation = "「엄마, 마음에 들었어. 언제든 우리 집에 놀러 오렴」"

[[dialogue]]
speaker = "セナリィ"
original = "「は、はい！\u3000伺わせていただきます！」"
translation = "「네, 네! 찾아뵙겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とセナリィは親公認カップルとなったわけだが。"
translation = "이렇게 해서 나와 세나리는 부모 공인 커플이 된 셈인데."

[[dialogue]]
speaker = "リノ"
original = "「お母さんは空気が読める女だから！\u3000ちゃーんと気を利かせて、イイ雰囲気になった所でふたりっきりにしてあげるから、ね♪」"
translation = "「엄마는 눈치 빠른 여자니까! 자알 알아서 분위기 좋을 때 두 사람만 남겨줄게, 알았지♪」"

[[dialogue]]
speaker = "unk"
original = "母さん！？"
translation = "엄마!?"

[[dialogue]]
speaker = "セナリィ"
original = "「お母様！？」"
translation = "「어머님!?」"

[[dialogue]]
speaker = "unk"
original = "そんな余計な気は回してくれなくていいと思うのであった。"
translation = "그런 불필요한 배려는 안 해줘도 된다고 생각하는 나였다."

