[[dialogue]]
speaker = "unk"
original = "第２話,使徒のシャドウ,B"
translation = "제2화, 사도의 섀도"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルルッ──！！」"
translation = "「부르르르──!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「総員、極星従騎たちの迎撃に当たってください！\u3000彗星の雨は私が撃ち落とします！」"
translation = "「전원, 극성종기들의 요격에 임해 주세요! 혜성의 비는 제가 격추하겠습니다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あわわわっ！\u3000何なんですかぁ、この物量！\u3000さばききれないですよぉ～っ！？」"
translation = "「아와와왓! 뭐예요, 이 물량은! 다 감당할 수 없다고요~!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「慌てんなルリ！\u3000──イグニッションアサルト！！」"
translation = "「당황하지 마, 루리! ──이그니션 어설트!!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ヒヒィンッ──！？」"
translation = "「히히잉──!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おぉっ……流石なのです、ユウリ先輩！」"
translation = "「오오…… 역시 대단해요, 유우리 선배!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「喜んでる暇はないよ、ルリちー！\u3000どんどん来てるっ！」"
translation = "「기뻐하고 있을 틈 없어, 루리치! 계속 오고 있다고!」"

[[dialogue]]
speaker_original = "バグキメラ"
speaker_translation = "버그 키메라"
original = "「ギィィイィッ──！」"
translation = "「기이이익──!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「極星従騎だけでなくモンスターまでっ……！」"
translation = "「극성종기뿐만 아니라 몬스터까지……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「まずいねぇ、きっと街の方もしっちゃかめっちゃかだよフィオナちゃんっ！」"
translation = "「큰일이네, 분명 거리 쪽도 엉망진창일 거야, 피오나짱!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ええ！\u3000新星学園と協力して事に当たらなくては……！」"
translation = "「네! 신성학원과 협력해서 대처해야 해요……!」"

[[dialogue]]
speaker = "unk"
original = "フィオナは地表に降り注ぐ彗星の雨を端から燃やし尽くす──その隙間を縫って緋宮クロトへ連絡を取った。"
translation = "피오나는 지표로 쏟아지는 혜성의 비를 끝에서부터 태워 버린다── 그 틈을 타서 히노미야 쿠로토에게 연락을 취했다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「緋宮会長──聞こえますか！？」"
translation = "「히노미야 회장님── 들리시나요!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そっちの状況はわかった──しばらく耐えてくれ！\u3000すぐに増援のプリマステラを派遣する！」"
translation = "「그쪽 상황은 알았다── 잠시만 버텨 줘! 곧 증원군인 프리마스텔라를 파견하겠다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「流星市国全域の防衛は俺が指示を出す！\u3000フィオナは学園の守備を頼んだ！」"
translation = "「유성시국 전역의 방위는 내가 지시하마! 피오나는 학원 수비를 부탁해!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "『任されました──！\u3000フェニックスバーンッ！！』"
translation = "『맡겨주세요──! 피닉스 번!!』"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんお待たせ！\u3000戦況の分析が終わったよ！」"
translation = "「회장군, 오래 기다렸지! 전황 분석이 끝났어!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「空の異変は間違いなく、リクリエの前兆を報せる流星群……フィヴォス流星群の時と同じで、多数のアステラが展開されてる！」"
translation = "「하늘의 이변은 틀림없이 리크리에의 전조를 알리는 유성우…… 피보스 유성우 때와 마찬가지로 다수의 아스테라가 전개되고 있어!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「一番大きいアステラは学園の上空だけど……東京駅や渋谷、浅草……フィーニスの塔を中心に範囲は今も拡大してるみたい！」"
translation = "「가장 큰 아스테라는 학원 상공이지만…… 도쿄역이나 시부야, 아사쿠사…… 피니스의 탑을 중심으로 범위는 지금도 확대되고 있는 모양이야!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そしてアステラからは、リクリエモンスターだけでなく極星従騎も出現しているようです」"
translation = "「그리고 아스테라에서는 리크리에 몬스터뿐만 아니라 극성종기도 출현하고 있는 듯합니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ルヴィネちゃんはもう隠す気もない……ってことなのかな」"
translation = "「루비네짱은 이제 숨길 생각도 없다……는 걸까」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そんな……」"
translation = "「그런……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「デネブの守護者である極星従騎が、モンスターと手を組んで街を攻撃するなんて……こんなの、見たくありません！」"
translation = "「데네브의 수호자인 극성종기가 몬스터와 손을 잡고 거리를 공격하다니…… 이런 건 보고 싶지 않아요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「くそっ！\u3000やっぱり魔王たちの言うことが、真実だってのかよ……！？」"
translation = "「젠장! 역시 마왕 녀석들이 하는 말이 진실이었다는 거냐고……!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「──確かめに行かなくてはね。ルヴィは今どこに？」"
translation = "「──확인하러 가야겠네. 루비는 지금 어디에?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「多分フィーニスの塔……だと思う。内部や頂上はモニタリングできないんだけど、それ以外の場所は考えづらいかな」"
translation = "「아마 피니스의 탑……일 거야. 내부나 정상은 모니터링할 수 없지만, 그 외의 장소는 생각하기 어렵네」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「塔の周辺を、極星従騎やモンスターが滞空しています。あそこまで防御を固めていれば、結論は一つでしょう」"
translation = "「탑 주변을 극성종기와 몬스터가 체공하고 있습니다. 저 정도로 방어를 굳히고 있다면 결론은 하나겠죠」"

[[dialogue]]
speaker = "unk"
original = "地上の防衛をしながら、フィーニスの塔を同時攻略する──この非常時に戦力を分散しなくてはいけないのは厳しい。"
translation = "지상 방위를 하면서 피니스의 탑을 동시 공략한다── 이 비상시에 전력을 분산해야 하는 것은 뼈아픈 일이다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「また緊急連絡──って……えっ！？\u3000何これっ！？」"
translation = "「또 긴급 연락── 어…… 엣!? 뭐야 이거!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くん、まずいことになったかも……！\u3000映像出すよ！」"
translation = "「회장군, 큰일 났을지도 몰라……! 영상 띄울게!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「な、ぁっ……！？」"
translation = "「나, 아……!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグとアポロのシャドウ！？」"
translation = "「지그와 아폴로의 섀도!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……ここまで辱められるとはね。流石の私も黙っていられないな」"
translation = "「……이 정도로 모욕당할 줄이야. 역시 나도 가만히 있을 수 없겠군.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リクリエが使徒の力を学習したようですね……最悪の展開です」"
translation = "「리크리에가 사도의 힘을 학습한 모양이군요…… 최악의 전개입니다」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「戦闘力の計測数値は……本物のジグちゃん達には及ばない。でも６割程度までは完璧にコピーされてる……！？」"
translation = "「전투력 측정 수치는…… 진짜 지그짱 일행에게는 미치지 못해. 하지만 60% 정도까지는 완벽하게 카피되어 있어……!?」"

[[dialogue]]
speaker_original = "新星学園の女子"
speaker_translation = "신성학원 여학생"
original = "『トワ先生！\u3000応援をお願いします！\u3000プリマステラがもう何人もやられていて──！！』"
translation = "『토와 선생님! 응원 부탁드려요! 프리마스텔라가 벌써 몇 명이나 당해서──!!』"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん！\u3000場所は分かった、すぐに──！」"
translation = "「으, 응! 장소는 알았어, 바로──!」"

[[dialogue]]
speaker = "？？？"
original = "『──余計なことはするな！\u3000おい小娘、ＤＩＳＣを寄越せ』"
translation = "『──쓸데없는 짓은 하지 마라! 어이 꼬맹이, DISC를 내놔라』"

[[dialogue]]
speaker_original = "新星学園の女子"
speaker_translation = "신성학원 여학생"
original = "『え、誰っ──きゃあぁっ！？』"
translation = "『에, 누구── 꺄아악!?』"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『聞こえているな、魔王！\u3000これは妾の獲物だ。無粋な横槍は許さん』"
translation = "『듣고 있느냐, 마왕! 이것은 소첩의 사냥감이다. 무지몽매한 참견은 용납지 않느니라』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「煌嶺！\u3000今の状況だけど──」"
translation = "「코레이! 지금 상황인데──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『デネブの女神の幼体が乗り込んできた──そうであろう？』"
translation = "『데네브의 여신의 유체가 쳐들어왔다── 그렇지 않느냐?』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ！\u3000……その、無理だとは思うけど、市街地の防衛を任せるというのは──」"
translation = "「그래! ……그게, 무리라고는 생각하지만 시가지 방위를 맡아 줄 수 있겠느냐는──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『するわけがないだろう。妾の目的は厄災の化身とまみえること。市民の命など知った事か』"
translation = "『할 리가 없지 않느냐. 소첩의 목적은 액재의 화신과 대면하는 것. 시민의 목숨 따위 알 바 아니니라』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そう言うと思った。なら、どうして使徒の幻影に執着する？」"
translation = "「……그렇게 말할 줄 알았다. 그럼 왜 사도의 환영에 집착하지?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『──不意を突かれた。まさか妾に手傷を負わせるとはな』"
translation = "『──허를 찔렸느니라. 설마 소첩에게 상처를 입힐 줄이야』"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『不届き者へ誅罰を下す──故に横槍を入れるな。邪魔立てすれば、増援ごと殺す！』"
translation = "『불한당에게 천벌을 내리겠다── 그러니 참견하지 마라. 방해한다면 증원군째로 죽여 버리겠느니라!』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……使徒のシャドウをあなたが倒してくれるならありがたい。学園生には、戦いの邪魔をするなと厳命しておく」"
translation = "「……사도의 섀도를 네가 쓰러뜨려 준다면 고맙지. 학원생들에게는 싸움을 방해하지 말라고 엄명해 두마」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『それでよい。こやつら、なかなかに骨が折れる。未来が視える女に、星力の出力を妨害する女……ちょうどいいハンデだ』"
translation = "『그러면 되었느니라. 이놈들, 제법 애를 먹이는구나. 미래를 보는 여자에 성력 출력을 방해하는 여자…… 딱 좋은 핸디캡이니라』"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「星力の妨害！？\u3000まさか『<ruby>天蓋<rt>てんがい</rt></ruby>』が──！？」"
translation = "「성력 방해!? 설마 『천개』가──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に大丈夫なのか、煌嶺……！？」"
translation = "「정말 괜찮은 거냐, 코레이……!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『それ以上、妾の身を案じる言葉を吐くな──侮辱と受け取るぞ？』"
translation = "『그 이상 소첩의 몸을 걱정하는 말을 내뱉지 마라── 모욕으로 받아들이겠느니라?』"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『聞きたいことは１つだけだ。厄災の化身を従える、ルヴィネとやらは今どこにいる？』"
translation = "『듣고 싶은 것은 한 가지뿐이다. 액재의 화신을 거느리는 루비네라는 자는 지금 어디에 있느냐?』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……フィーニスの塔。恐らくその最上階だ」"
translation = "「……피니스의 탑. 아마 그 최상층이다」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『それさえわかれば十分だ。この模造品を蹴散らした後に登るとしよう。急がねばな？』"
translation = "『그것만 알면 충분하니라. 이 모조품을 걷어찬 뒤에 오르도록 하지. 서둘러야겠지?』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、急がないと──」"
translation = "「그래, 서둘러야──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "『そうだ。貴様たちが死んでしまう──妾の助力なしで、勝てるものか。なあ？』"
translation = "『그렇느니라. 네놈들이 죽어 버릴 테니까── 소첩의 조력 없이 이길 수 있을 것 같으냐. 응?』"

[[dialogue]]
speaker = "unk"
original = "俺たちが先に倒してしまうぞ、と言いたかったんだが──言いたいだけ言い切ると、煌嶺は通信を切ってしまった。"
translation = "우리 쪽이 먼저 쓰러뜨려 버리겠다, 라고 말하고 싶었지만── 하고 싶은 말만 다 내뱉고 코레이는 통신을 끊어 버렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メンバーを決める。ルヴィネ攻略班と、地上防衛の２チームに切り分けるぞ」"
translation = "「멤버를 정하겠다. 루비네 공략반과 지상 방위의 두 팀으로 나눈다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルヴィネとディザスターハンド、双方との戦いに備える──新星星徒会のみんな。ノヴァフォームの力、存分に奮ってくれ」"
translation = "「루비네와 디재스터 핸드, 양쪽과의 싸움에 대비한다── 신성성도회 모두들. 노바 폼의 힘을 마음껏 떨쳐 줘.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まっかせなさい！\u3000ルヴィネにがつんと言ってやらなきゃね！」"
translation = "「맡겨만 줘! 루비네에게 따끔하게 한마디 해 줘야지!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「続いて、極星学園のみんな。ルヴィネの未来を変えるには、君たち４人の協力が欠かせない。俺たちと一緒に来てくれ」"
translation = "「이어서 극성학원 모두들. 루비네의 미래를 바꾸려면 너희 네 사람의 협력이 필수적이다. 우리와 함께 가 줘.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はいっ！\u3000絶対に説得してみせます……！」"
translation = "「네! 반드시 설득해 보이겠어요……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「選挙管理委員会には地上の防衛を頼みたい。本音を言うなら、決戦の場に梨緒たちがいない状況は避けたかったんだが……」"
translation = "「선거관리위원회에는 지상 방위를 부탁하고 싶어. 본심을 말하자면 결전의 장소에 리오 일행이 없는 상황은 피하고 싶었지만……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「使徒のシャドウまで出てきた今、そうも言っていられないだろう。地上は任せてくれ」"
translation = "「사도의 섀도까지 나타난 지금, 그런 말만 하고 있을 수는 없겠지. 지상은 맡겨 줘.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「余裕が生まれ次第、塔の頂上へ援護に向かう──フィオナたち流星星徒会にも声をかけておこう」"
translation = "「여유가 생기는 대로 탑 정상으로 원호를 가겠어── 피오나네 유성성도회에도 말을 해 두지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──魔王。その、未来の……」"
translation = "「──마왕. 그, 미래의……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……いいや。なんでもない」"
translation = "「……아니. 아무것도 아니야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──ディザスターハンドは、一度ベガを滅ぼした存在だ。武運を祈るよ」"
translation = "「──디재스터 핸드는 한 번 베가를 멸망시킨 존재다. 무운을 빌지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。お互いにな」"
translation = "「그래. 서로 말이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ベアト。行ってこい。君ならきっとルヴィネを救えるはずだ」"
translation = "「……베아토. 다녀와. 너라면 분명 루비네를 구할 수 있을 거야.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ありがとう、梨緒ちゃん！\u3000行ってきます！」"
translation = "「고마워, 리오짱! 다녀올게!」"

