[[dialogue]]
speaker = "unk"
original = "紅明と恋人になり、しばらく経ったある日のこと。"
translation = "코우메이와 연인이 되고 시간이 꽤 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "星徒会の残業が終わり、帰路に着こうとしていると──"
translation = "성도회 잔업이 끝나고 귀가하려던 참에──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、一緒に帰ろうぜ！！！」"
translation = "「달링, 같이 가자구!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うおっ！？\u3000ビックリした！\u3000学園に残ってたのか？」"
translation = "「우왓!? 깜짝이야! 학원에 남아 있었어?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うしし♪\u3000家に帰ってたんだけど、ダーリンの仕事終わったってチャット見て、迎えに来ちゃった☆」"
translation = "「우시시♪ 집에 갔었는데 달링 업무 끝났다는 채팅 보고 마중 나왔지☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「……何でって、そりゃあ愛ですよ、愛♪\u3000出来る恋人っしょ？」"
translation = "「……왜냐니, 그야 사랑이죠, 사랑♪ 유능한 애인이라구?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それに、ダーリンひょっとしたらお疲れかな～って思ってさ」"
translation = "「게다가 달링 혹시 피곤하지 않을까 싶어서 말이야」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「……で、どうする？」"
translation = "「……그래서, 어떻게 할래?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おっぱい、飲む？」"
translation = "「가슴, 마실래?」"

[[dialogue]]
speaker = "unk"
original = "──そうして、俺は紅明の部屋に招かれると、彼女のベッドに腰掛けた。"
translation = "──그렇게 나는 코우메이의 방에 초대받아 그녀의 침대에 걸터앉았다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あんっ……ダーリン、キスしたいの？<emoji=heart04>\u3000ちゅっ、んちゅっ……んっ、ダーリンの舌、エッチぃ……ちゅむっ、ちゅれろっ、ちゅうっ……ちゅれるっ、ちゅぷぷっ、ちゅぱっ<emoji=heart04>」"
translation = "「앙…… 달링, 키스하고 싶어?❤️ 츄, 응츄…… 응, 달링 혀, 야해…… 츄뭇, 츄레롯, 츄우…… 츄렐룻, 츄푸푸, 츄팟❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んちゅっ、ちゅぱっ<emoji=heart04>\u3000ぷはぁ……はぁ……それじゃあダーリン、横になって？\u3000アタシのおっぱいで癒して、元気にしたげる♪」"
translation = "「응츄, 츄팟❤️ 푸하아…… 하아…… 그럼 달링, 옆으로 누워볼래? 내 가슴으로 치유해서 기운 나게 해줄게♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー<emoji=heart04>\u3000ダーリンってば、こっちの服でしたいだなんて、エッチなんだから♪」"
translation = "「음모❤️ 달링도 참, 이 옷을 입은 채로 하고 싶다니 야하다니까♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「相変わらず紅明のおっぱい、凄いボリュームだ……」"
translation = "「여전하네 코우메이 가슴, 엄청난 볼륨이야……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「バスト１００センチのＩカップだぜ☆\u3000でも、そう言うダーリンのおち○ぽだって、凄いから……！」"
translation = "「바스트 100센티의 I컵이라구☆ 하지만 그렇게 말하는 달링의 자지도 대단하니까……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「大きくて逞しくて、手に収まりきらないおち○ぽ……はあぁ……イケメン過ぎるでしょ<emoji=heart04>\u3000こんなの女の子に見せたら、誰だってメロメロになっちゃうやつだし<emoji=heart04>」"
translation = "「크고 늠름해서 손에 다 들어오지 않는 자지…… 하아아…… 너무 잘생겼잖아❤️ 이런 거 여자애한테 보여주면 누구든 홀딱 반해버릴 거라구❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あんっ<emoji=heart04>\u3000ふふっ、我慢できなくなっちゃった……？\u3000いいよ、ダーリン、おっぱい好きなだけ吸って♪」"
translation = "「앙❤️ 후훗, 참을 수 없게 된 거야……? 좋아, 달링, 가슴 마음껏 빨아줘♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……アタシのおっぱいは、ダーリン専用だから<emoji=heart04>\u3000あぁんっ、乳首、舌で転がされてぇ……はあぁっ、乳首勃起しちゃう……<emoji=heart04>」"
translation = "「응…… 내 가슴은 달링 전용이니까❤️ 아앙, 유두, 혀로 굴려줘…… 하아앗, 유두 발기해버려……❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ、あっ<emoji=heart04>\u3000勃起乳首、吸われてるぅ……はぁんっ<emoji=heart04>\u3000ちゅぱちゅぱされるの、気持ちいいっ。んあぁっ、ダーリンのこと愛おしいって気持ちが溢れてきちゃう<emoji=heart04>」"
translation = "「앗, 앗❤️ 발기한 유두, 빨리고 있어…… 하앙❤️ 츄파츄파 당하는 거 기분 좋아. 응아아, 달링이 사랑스럽다는 마음이 넘쳐흘러❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……紅明にいつも癒して貰ってるお礼がしたくて、おっぱいを気持ちよくする方法、勉強してきたんだ」"
translation = "「윽…… 코우메이에게 항상 치유받는 보답을 하고 싶어서, 가슴을 기분 좋게 하는 방법, 공부해 왔어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あぁんっ……勉強って、ふふっ<emoji=heart04>\u3000なにそれ～？\u3000ダーリンを癒してるのは、アタシが好きでやってることだから……んっ、あんっ<emoji=heart04>\u3000全然気にしなくてもいいのに<emoji=heart04>」"
translation = "「아앙…… 공부라니, 후훗❤️ 뭐야 그게~? 달링을 치유하는 건 내가 좋아서 하는 거니까…… 응, 앙❤️ 전혀 신경 안 써도 되는데❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……でも嬉しくって、乳首敏感になっちゃう<emoji=heart04>\u3000はぁんっ……ダーリンに乳首吸われて、感じちゃう……あんっ、ふあぁっ<emoji=heart04>」"
translation = "「응…… 하지만 기뻐서 유두가 민감해져 버려❤️ 하앙…… 달링한테 유두 빨려서 느껴버려…… 앙, 후아아❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ<emoji=heart04>\u3000ダーリンのおち○ぽ、興奮でガッチガチぃ<emoji=heart04>\u3000我慢汁が出てて、凄いオスの匂い……あぁんっ<emoji=heart04>\u3000フェロモンむんむんで、アタシも興奮してきちゃう<emoji=heart04>」"
translation = "「응❤️ 달링 자지, 흥분해서 빳빳해❤️ 쿠퍼액이 나와서 엄청난 수컷 냄새…… 아앙❤️ 페로몬 뿜뿜이라 나도 흥분돼❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁ……ダーリンのおち○ぽも、アタシの手で癒してあげるね？<emoji=heart04>\u3000愛情込めてご奉仕するから、いっぱい気持ち良くなって♪」"
translation = "「하아아…… 달링 자지도 내 손으로 치유해 줄게?❤️ 애정을 담아서 봉사할 테니까 잔뜩 기분 좋아져줘♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……ゆっくり行くね<emoji=heart04>\u3000シコシコ……シコシコ♪\u3000すりすり……すりすり♪」"
translation = "「응…… 천천히 갈게❤️ 시코시코…… 시코시코♪ 스리스리…… 스리스리♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「カリ首のところ、気持ちいい？<emoji=heart04>\u3000カリカリ、シコシコ……あっ……ふふっ……おち○ぽ、ビクビクって喜んでる♪」"
translation = "「귀두 쪽, 기분 좋아?❤️ 카리카리, 시코시코…… 앗…… 후훗…… 자지, 움찔움찔하며 기뻐하고 있어♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「亀頭も、撫で撫でしちゃう……<emoji=heart04>\u3000あんっ、エッチなお汁いっぱい出て……アタシで気持ち良くなってくれてるの、嬉しい♪」"
translation = "「귀두도 쓰담쓰담 해줄게……❤️ 앙, 야한 즙 잔뜩 나와서…… 나 때문에 기분 좋아해 주는 거, 기뻐♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、今度は俺からも……」"
translation = "「자, 이번엔 나도……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「えっ、ダーリン、何して……ふああっ！？」"
translation = "「엣, 달링, 뭐 하는…… 후아앗!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んうぅっ、んあぁぁぁっ<emoji=heart04><emoji=heart04>！？\u3000乳首舐められただけで、クリ触られたみたいに、感じちゃうっ……<emoji=heart04>！」"
translation = "「응으윽, 응아아아앗❤️❤️!? 유두 핥아진 것만으로 클리 만져진 것처럼 느껴져버렷……❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁんっ、おっぱいが３倍気持ちよくなる愛撫って、なにそれ……っ<emoji=heart04>\u3000ふあぁっ、乳首気持ちいいっ<emoji=heart04>！\u3000んくっ、はあぁっ……あんっ、んあぁっ……ふあぁぁんっ」"
translation = "「하아앙, 가슴이 3배는 기분 좋아지는 애무라니 뭐야 그거……윽❤️ 후아아, 유두 기분 좋아❤️! 응긋, 하아아…… 앙, 응아아…… 후아아앙」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「興奮して、はあぁっ、ダーリン<emoji=heart04>\u3000出ちゃうっ、アタシ出ちゃうよぉ……！\u3000ふあああ──<emoji=heart04><emoji=heart04>」"
translation = "「흥분해서, 하아아, 달링❤️ 나올 것 같아, 나 나와버려어……! 후아아아──❤️❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はああぁぁんっ<emoji=heart04>\u3000母乳出ちゃうぅ<emoji=heart04>」"
translation = "「하아아아앙❤️ 모유 나와버려어❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふあああぁぁぁ……<emoji=heart04>\u3000ダーリンのエッチな舌使いっ、凄く気持ち良くて……んっ、はぁぁ<emoji=heart04>\u3000いつもよりいっぱい、母乳溢れてきちゃう<emoji=heart04>」"
translation = "「후아아아아아……❤️ 달링의 야한 혓놀림, 너무 기분 좋아서…… 응, 하아아❤️ 평소보다 잔뜩 모유가 흘러나와버려❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あんっ、ダーリン、夢中になっておっぱい吸ってる<emoji=heart04>\u3000んっ、はぁんっ<emoji=heart04><emoji=heart04>\u3000アタシのミルク、美味しい……<emoji=heart04>？」"
translation = "「앙, 달링, 정신없이 가슴 빨고 있어❤️ 응, 하앙❤️❤️ 내 밀크, 맛있어……❤️?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んああっ、そんないやらしく舌で弄っちゃダメぇっ……<emoji=heart04>！\u3000はぁんっ、ふあぁっ……アタシの方がダーリンより、気持ち良くなっちゃうぅ……<emoji=heart04>！」"
translation = "「응아앗, 그렇게 음란하게 혀로 괴롭히면 안 돼애……❤️! 하앙, 후아아…… 내가 달링보다 기분 좋아져버려어……❤️!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「妊娠してないのに、種族の体質で母乳が出ちゃうなんて……エッチだ」"
translation = "「임신하지도 않았는데 종족 체질로 모유가 나오다니…… 야해」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んモー<emoji=heart04>\u3000ダーリンがエッチなお口で興奮させるからでしょ<emoji=heart04>？\u3000あぁんっ、ダーリンがカウパーで、おち○ぽヌルヌルになってるのと、一緒だしぃ。ふあぁぁっ<emoji=heart04>」"
translation = "「음모❤️ 달링이 야한 입으로 흥분시키니까 그렇잖아❤️? 아앙, 달링이 쿠퍼액으로 자지 미끌미끌해진 거랑 마찬가지라구. 후아아아❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はぁんっ<emoji=heart04>\u3000ダーリンのおち○ぽ、更に大きくなっちゃってるぅ……<emoji=heart04>\u3000はあぁ……母乳の媚薬効果、効いてきたってことかな<emoji=heart04>？」"
translation = "「하앙❤️ 달링 자지, 더 커져버렸어어……❤️ 하아아…… 모유의 미약 효과가 들기 시작한 걸까❤️?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンはアタシの手コキ、どう？\u3000んっ……気持ちーい<emoji=heart04>？」"
translation = "「달링은 내 손음경질, 어때? 응…… 기분 조오아❤️?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あんっ<emoji=heart04>\u3000ダーリンが気持ち良くなってくれてると、アタシも嬉しい……♪\u3000ダーリンが幸せだと……んっ、ふあぁっ……アタシも幸せだから♪」"
translation = "「앙❤️ 달링이 기분 좋아해 주면 나도 기뻐……♪ 달링이 행복하면…… 응, 후아아…… 나도 행복하니까♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「体も心も楽にして、甘えちゃって、いいからね♪\u3000ふうぅ……<emoji=heart04>\u3000アタシがダーリンのこと、もっともっと、気持ち良くしたげるっ<emoji=heart04>」"
translation = "「몸도 마음도 편하게 하고 어리광 부려도 되니까 말이야♪ 후우……❤️ 내가 달링을 더더욱 기분 좋게 해줄게❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「──あっ、ふあああっ<emoji=heart04><emoji=heart04>！？\u3000ダーリンの手がもう片方のおっぱいにぃ<emoji=heart04>！\u3000んっ、触られただけなのに、気持ち良くて……頭の中、バチバチってしちゃうぅ<emoji=heart04><emoji=heart04>！」"
translation = "「──앗, 후아아앗❤️❤️!? 달링 손이 다른 쪽 가슴에에❤️! 응, 만져지기만 했는데 기분 좋아서 머릿속이 찌릿찌릿해져버려어❤️❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あぁんっ<emoji=heart04>\u3000ダーリンの舌で、乳首優しくコリコリされるの……気持ちいいっ<emoji=heart04>\u3000両方の乳首同時にするの、気持ちいいのぉっ<emoji=heart04>」"
translation = "「아앙❤️ 달링 혀로 유두 살살 굴려지는 거…… 기분 좋아❤️ 양쪽 유두 동시에 하는 거 기분 좋아아❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んっ……なんだか、おっぱいマッサージ、されてるみたい<emoji=heart04>\u3000はあぁんっ、ダーリン、もっとしてぇ……<emoji=heart04>！」"
translation = "「응…… 왠지 가슴 마사지 받는 것 같아❤️ 하아앙, 달링, 더 해줘……❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あんっ<emoji=heart04>\u3000アタシもダーリンのこと、もっと気持ち良くするからっ<emoji=heart04>\u3000ふあぁっ、はぁ<emoji=heart04>\u3000ほらぁ、もっと気持ち良くなってぇ<emoji=heart04>！」"
translation = "「앙❤️ 나도 달링을 더 기분 좋게 해줄 테니까❤️ 후아아, 하아❤️ 자, 더 기분 좋아져줘❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあっ、はあっ、んんっ……はぁん<emoji=heart04>\u3000先走りでおち○ぽヌルヌルだから、大きく強めにシコシコするね……？\u3000んんっ<emoji=heart04>」"
translation = "「하앗, 하앗, 응응…… 하앙❤️ 쿠퍼액으로 자지 미끌미끌하니까 크고 강하게 시코시코할게……? 응응❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「これくらいの強さが、好き？\u3000うん、分かるよっ<emoji=heart04>\u3000はあぁっ……ダーリンのおち○ぽ、ドクドクってカウパー出して……反応してくれるからっ<emoji=heart04>」"
translation = "「이 정도 강도가 좋아? 응, 알아❤️ 하아아…… 달링 자지, 두근두근하며 쿠퍼액 내보내서…… 반응해 주니까❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「カリ首こうやって……裏から刺激するのが、好きなんだよねっ？\u3000シコシコ、シュッシュって……♪\u3000シコシコ、シュッシュ♪\u3000シコシコ、シュッシュ……♪」"
translation = "「귀두 쪽 이렇게…… 뒤에서 자극하는 게 좋은 거지? 시코시코, 슛슛 하며……♪ 시코시코, 슛슛♪ 시코시코, 슛슛……♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「裏筋も撫でてあげるね<emoji=heart04>\u3000すりすり、シュッシュ……♪\u3000んっ<emoji=heart04>\u3000腰が跳ねてる……っ。気持ちいいんだ♪\u3000もっとこれ、してあげるね……♪」"
translation = "「요도 쪽도 쓸어줄게❤️ 스리스리, 슛슛……♪ 응❤️ 허리가 튕기고 있어. 기분 좋구나♪ 더 이거 해줄게……♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「亀頭もシュッシュしちゃう……<emoji=heart04>\u3000カウパーでヌルヌルだから、痛くないっしょ？<emoji=heart04>\u3000シコシコ、シュッシュ……♪\u3000シコシコ、シュッシュ♪」"
translation = "「귀두도 슛슛 해버릴래……❤️ 쿠퍼액으로 미끌미끌하니까 안 아프지?❤️ 시코시코, 슛슛……♪ 시코시코, 슛슛♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁっ<emoji=heart04>\u3000擦る度、カウパーが溢れて来て、凄いエッチ……♪」"
translation = "「하아아❤️ 문지를 때마다 쿠퍼액이 넘쳐흘러서 너무 야해……♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……紅明の手、凄く気持ちいい……！」"
translation = "「윽…… 코우메이 손, 정말 기분 좋아……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うん、気持ちいいのに身を委ねちゃっていいからね、ダーリン♪\u3000アタシはダーリンが気持ちよくなってくれれば、幸せだから<emoji=heart04>」"
translation = "「응, 기분 좋은 거에 몸을 맡겨도 되니까 말이야, 달링♪ 나는 달링이 기분 좋아지면 행복하니까❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……いや、俺も紅明を気持ち良くする……！\u3000男として、紅明にも気持ち良くなってもらいたいんだっ」"
translation = "「윽…… 아니, 나도 코우메이를 기분 좋게 해줄 거야……! 남자로서 코우메이도 기분 좋아졌으면 좋겠어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「えっ、えぇ～～……<emoji=heart04><emoji=heart04>\u3000そ、そんなこと言われちゃったら……アタシ……んんっ……<emoji=heart04><emoji=heart04>」"
translation = "「엣, 에에~~……❤️❤️ 그, 그런 소릴 들으면…… 나…… 응응……❤️❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「体が喜んで、反応しちゃう<emoji=heart04>\u3000んあぁんっ<emoji=heart04>\u3000おっぱい張ってきて……乳首も、もっと勃起しちゃうっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000母乳もっと溢れて来ちゃうよぉ<emoji=heart04>！」"
translation = "「몸이 기뻐서 반응해버려❤️ 응아앙❤️ 가슴이 부풀어 오르고…… 유두도 더 발기해버려❤️ 하앙❤️ 모유 더 넘쳐나버릴 거야❤️!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「紅明、このまま乳首でイカせちゃうからな……」"
translation = "「코우메이, 이대로 유두로 가게 해줄게……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふあぁっ<emoji=heart04>\u3000うん、ダーリン、してぇ<emoji=heart04>！\u3000アタシの乳首、もっと気持ち良く、してぇ<emoji=heart04><emoji=heart04>！」"
translation = "「후아아❤️ 응, 달링, 해줘❤️! 내 유두, 더 기분 좋게 해줘❤️❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシもダーリンのおち○ぽ<emoji=heart04>\u3000頑張ってシコシコするから……一緒に<emoji=heart04>\u3000一緒にぃ<emoji=heart04>！」"
translation = "「나도 달링 자지❤️ 열심히 시코시코할 테니까…… 같이❤️ 같이이❤️!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「紅明、好きだっ……！」"
translation = "「코우메이, 좋아해……!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふあああっ、ダーリンッ<emoji=heart04>！\u3000アタシも好きぃ<emoji=heart04>\u3000大好きぃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아앗, 달링!❤️ 나도 좋아해❤️ 너무 좋아해❤️❤️❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁぁっ、んあぁぁぁ～～っ！<emoji=heart04>\u3000ダーリン、乳首しゃぶるの激しいっ……はあぁぁんっ<emoji=heart04>」"
translation = "「하아아앗, 응아아아~~앗!❤️ 달링, 유두 빠는 거 격렬해…… 하아아앙❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000もう片方のおっぱい、乳絞りみたいにシコシコされるの、気持ちいいっ<emoji=heart04>！\u3000あぁぁんっ<emoji=heart04>\u3000出ちゃう、いっぱい出ちゃうぅっ<emoji=heart04>！\u3000ふあぁぁんっ<emoji=heart04>」"
translation = "「앗❤️ 앗❤️ 앗❤️ 다른 쪽 가슴, 젖 짜는 것처럼 시코시코 당하는 거 기분 좋아❤️! 아아앙❤️ 나와, 잔뜩 나와버려어❤️! 후아아앙❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「敏感乳首っ<emoji=heart04>\u3000エッチに弄られるの、凄いのぉっ！\u3000あぁぁんっ<emoji=heart04>\u3000癖になっちゃうっ<emoji=heart04>！」"
translation = "「민감한 유두❤️ 야하게 괴롭혀지는 거 대단해애! 아아앙❤️ 버릇될 것 같아❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「これ味わっちゃったら<emoji=heart04>\u3000もう１人で乳首オナニーしても、イケなくなっちゃうよぉっ<emoji=heart04>！\u3000あっ、あっ、はあぁぁんっ<emoji=heart04>」"
translation = "「이거 맛보면❤️ 이제 혼자서 유두 자위해도 못 가게 되어버려어! 앗, 앗, 하아아앙❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふああぁぁぁっ<emoji=heart04>\u3000乳首、クリトリスになっちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000乳首弄られると、おま○こ反応して、愛液どぷどぷ出てくりゅうっ<emoji=heart04>\u3000ひぃぃんっ<emoji=heart04>」"
translation = "「후아아아앗❤️ 유두가 클리토리스가 되어버려❤️ 앗❤️ 앗❤️ 유두 괴롭혀지면 보지가 반응해서 애액이 뚝뚝 나와버렷❤️ 히이잉❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「だ、ダーリンも一緒にぃ<emoji=heart04>\u3000おち○ぽ、ぎゅ～って握って、ゴシゴシするからぁ<emoji=heart04>\u3000ズリズリシュッシュ<emoji=heart04>\u3000ズリズリシュッシュ<emoji=heart04>」"
translation = "「다, 달링도 같이이❤️ 자지 꽉 쥐고 고시고시할 테니까아❤️ 즈리즈리슛슛❤️ 즈리즈리슛슛❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、気持ちいいっ？\u3000うんっ、アタシもぉっ<emoji=heart04>\u3000あっ、あっ、おっぱい強く吸われるの、頭とろけちゃうっ、はぁ、んはぁ、はあぁぁぁんっ<emoji=heart04>」"
translation = "「달링, 기분 좋아? 응, 나도오❤️ 앗, 앗, 가슴 세게 빨리는 거 머리가 녹아버려, 하아, 응하아, 하아아아앙❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシも、ダーリンのミルク絞って、気持ち良くするぅ<emoji=heart04>\u3000カリ首のところから亀頭に掛けて、ゴシゴシするのぉ<emoji=heart04>\u3000ズリズリシュッシュ<emoji=heart04>\u3000ズリズリシュッシュぅ<emoji=heart04>」"
translation = "「나도 달링의 밀크 짜내서 기분 좋게 해줄게❤️ 귀두 쪽부터 끝부분까지 고시고시할 거야아❤️ 즈리즈리슛슛❤️ 즈리즈리슛슛우❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んんんぅっ<emoji=heart04>\u3000カウパー凄い量っ<emoji=heart04>\u3000おち○ぽの先っぽから、どくどく出てるぅ<emoji=heart04>\u3000ズリズリシュッシュ<emoji=heart04>\u3000ズリズリシュッシュぅ<emoji=heart04>」"
translation = "「응응응윽❤️ 쿠퍼액 양이 엄청나❤️ 자지 끝에서 뚝뚝 나오고 있어어❤️ 즈리즈리슛슛❤️ 즈리즈리슛슛우❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あぁんっ<emoji=heart04>\u3000ダーリンのたまたまキュッ、キュッって<emoji=heart04>\u3000根元に引き寄せられてる……！\u3000おち○ぽも膨らんできて……！\u3000射精の準備始めてるぅっ<emoji=heart04>」"
translation = "「아앙❤️ 달링 불알이 꽉, 꽉 하고❤️ 뿌리 쪽으로 끌어당겨지고 있어……! 자지도 팽창해서……! 사정 준비 시작하고 있어어❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあぁぁっ<emoji=heart04>\u3000アタシも乳首刺激される度、お腹の奥、ゾクゾクッて<emoji=heart04>\u3000気持ちいいの、のぼってきてるの……！\u3000今までにないくらい、大きなやつぅ<emoji=heart04>\u3000ふあぁぁんっ<emoji=heart04>！」"
translation = "「하아아앗❤️ 나도 유두 자극받을 때마다 배 안쪽이 움찔움찔❤️ 기분 좋은 게 올라오고 있어……! 지금까지 없었을 정도로 큰 게에❤️ 후아아앙❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はあっ、はあああんっ<emoji=heart04><emoji=heart04>\u3000イクならダーリンと一緒っ<emoji=heart04>\u3000一緒がいいぃ<emoji=heart04>\u3000だからほら、おち○ぽイって<emoji=heart04>\u3000精液いっぱい出してぇ<emoji=heart04>」"
translation = "「하아, 하아아앙❤️❤️ 갈 거면 달링이랑 같이❤️ 같이 가고 싶어어❤️ 그러니까 자, 자지 가줘❤️ 정액 잔뜩 내보내줘❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ、きた<emoji=heart04>\u3000凄いの、のぼってきたぁっ<emoji=heart04>\u3000はあぁぁぁっ、イクイク、もうイク──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 왔다❤️ 대단한 게 올라왔어어❤️ 하아아아앗, 가요 가, 이제 가──❤️❤️❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ、あっ、おち○ぽきてっ<emoji=heart04>！\u3000きてきてっ<emoji=heart04>\u3000一緒に気持ち良いミルク出してぇっ<emoji=heart04>」"
translation = "「앗, 앗, 자지 와줘❤️! 와줘와줘❤️ 같이 기분 좋은 밀크 내보내줘어❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んあああぁぁぁっ、イク、乳首でイっちゃうっ<emoji=heart04>\u3000おっぱいミルクいっぱい出ちゃうぅっ<emoji=heart04>！」"
translation = "「응아아아아앗, 가, 유두로 가버려어❤️ 가슴 밀크 잔뜩 나와버려어❤️!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「イクイクイクイク、イっ──くぅぅぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가요가요가요가요, 가──앗❤️❤️❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「っ……おっぱいでイ、クぅぅぅ──────―っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁああああああ～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 가슴으로 가, 버려어어어어──────윽❤️❤️❤️ 후아아아아아아아아아아아아아아~~앗❤️❤️❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あぁぁぁぁっ<emoji=heart04>\u3000ふわぁぁぁ<emoji=heart04>\u3000……はふぅぅ<emoji=heart04>\u3000おっぱいミルク、射精みたいにいっぱい、出てるぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗❤️ 후와아아❤️ ……하후우❤️ 가슴 밀크, 사정하는 것처럼 잔뜩 나오고 있어어어~~~❤️❤️❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あはぁ～<emoji=heart04>\u3000ダーリンのおち○ぽミルクも、いっぱい出てるぅ<emoji=heart04>\u3000はぁんっ……凄く濃いオスの匂いで、おま○こキュンキュンしちゃう……<emoji=heart04>」"
translation = "「아하아~❤️ 달링의 자지 밀크도 잔뜩 나오고 있어❤️ 하앙…… 너무 진한 수컷 냄새라 보지가 큥큥거려……❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はぁ……はぁ……んうぅ……<emoji=heart04>\u3000今までで１番凄い、乳首イキしちゃったぁ……<emoji=heart04>」"
translation = "「하아…… 하아…… 응으으……❤️ 지금까지 중 제일 대단한 유두 절정을 해버렸어……❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリンも気持ちよく、なってくれた……？\u3000えへへ、それなら良かった♪\u3000ダーリンが喜んでくれて、アタシも幸せ……♪」"
translation = "「달링도 기분 좋아졌어……? 에헤헤, 그럼 다행이다♪ 달링이 기뻐해 줘서 나도 행복해……♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「んちゅっ<emoji=heart04>\u3000……ダーリンもアタシのこと、気持ち良くしてくれてありがと♪\u3000感謝のキスだよ<emoji=heart04>」"
translation = "「응츄❤️ ……달링도 나를 기분 좋게 해줘서 고마워♪ 감사의 키스야❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「男らしくて、ダーリンのこと、また好きになっちゃった……<emoji=heart04>」"
translation = "「남자다워서 달링이 또 좋아져 버렸어……❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……こっちこそ、紅明のおかげで癒されて、凄く元気になった」"
translation = "「……나야말로 코우메이 덕분에 치유받아서 아주 기운 났어」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ<emoji=heart04>\u3000……ダーリンのおち○ぽ、あんなに出したのに、ガッチガチのままじゃんっ<emoji=heart04>」"
translation = "「앗❤️ ……달링 자지, 그렇게나 냈는데도 빳빳한 그대로잖아❤️」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今度は俺が、紅明に飲ませてあげる番かな？」"
translation = "「이번엔 내가 코우메이에게 먹여줄 차례일까?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うんっ<emoji=heart04>」"
translation = "「응❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシのおま○こに、ダーリンのおち○ぽミルク、いっぱい飲ませて欲しい……<emoji=heart04>」"
translation = "「내 보지에 달링의 자지 밀크 잔뜩 먹여줬으면 좋겠어……❤️」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あっ、あんっ<emoji=heart04>\u3000ダーリン……ふあぁっ<emoji=heart04>」"
translation = "「앗, 앙❤️ 달링…… 후아아❤️」"

[[dialogue]]
speaker = "unk"
original = "その後、俺は彼女が満足するまで、沢山マッサージを施すのだった。"
translation = "그 후, 나는 그녀가 만족할 때까지 듬뿍 마사지를 해 주었다."

