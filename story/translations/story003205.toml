[[dialogue]]
speaker = "unk"
original = "せつな、ウズメイア、シャルレーヌは駅の方へ、俺とイレーナ、シャロンは繁華街へと向かった。"
translation = "세츠나, 우즈메, 샤를렌은 역 쪽으로, 나와 이레이나, 샤론은 번화가로 향했다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はぁっ！」"
translation = "「하앗!」"

[[dialogue]]
speaker_original = "フワッチ"
speaker_translation = "후왓치"
original = "「イ～ッ！？」"
translation = "「이~잇!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「この辺りのモンスターは片付いたみたいね……」"
translation = "「이 근처 몬스터는 정리된 모양이네……」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルルァアア！！」"
translation = "「그루루루아아!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「！\u3000機械型モンスターまで出てきた！？」"
translation = "「! 기계형 몬스터까지 나타났어!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いきますよー！」"
translation = "「갑니다!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「くっ、カカオ９９％チョコ並みの硬さですね……このままだとジリ貧かもしれません」"
translation = "「큭, 카카오 99% 초코만큼이나 단단하네요…… 이대로라면 불리해질지도 몰라요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ね、あんた、強烈な一撃、叩き込めない？\u3000あたしも合わせるから同時に──」"
translation = "「저기, 너, 강력한 일격 날릴 수 없어? 나도 맞출 테니까 동시에──」"

[[dialogue]]
speaker = "unk"
original = "よし、全力で──"
translation = "좋아, 전력으로──"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「皆さん、お困りのようですね」"
translation = "「여러분, 곤란해 보이시네요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ウルスラさま！？」"
translation = "「우르술라 님!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「バレンタインの波動を充填していたので、駆けつけるのが遅くなってしまいました。申し訳ありません」"
translation = "「발렌타인 파동을 충전하느라 달려오는 게 늦어버렸습니다. 죄송합니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ウルスラさん、あなたも戦えるんですか？」"
translation = "「우르술라 씨, 당신도 싸울 수 있나요?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はい。実は私、バレンタインが近づけば近づくほど強くなる星騎士でして」"
translation = "「네. 사실 저, 발렌타인이 다가오면 다가올수록 강해지는 성기사거든요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「バレンタインの波動を限界まで吸収した私は、最強で無敵ですよ<emoji=heart04>」"
translation = "「발렌타인 파동을 한계까지 흡수한 저는 최강이자 무적이에요<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「最強無敵！？\u3000それは頼りになります！」"
translation = "「최강무적!? 그거 든든하네요!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「これより、バレンタインを執行します」"
translation = "「지금부터, 발렌타인을 집행합니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「す、すごいですっ！\u3000ウルスラさまの星力が爆発的に膨れ上がって──！」"
translation = "「우, 우와아! 우르술라 님의 성력이 폭발적으로 부풀어 올라서──!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「トゥルーラブジャッジメント！」"
translation = "「트루 러브 저지먼트!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「一撃必殺！？\u3000すごい力です……！」"
translation = "「일격필살!? 대단한 힘이에요……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ふふ、バレンタインの素晴らしさ、伝わりました？」"
translation = "「후후, 발렌타인의 훌륭함, 전해졌나요?」"

[[dialogue]]
speaker = "unk"
original = "その驚異的な力を目の当たりにした俺たちは、コクコクと何度も頷くしかなかったのであった。"
translation = "그 경이로운 힘을 목격한 우리들은 고개를 몇 번이고 끄덕일 수밖에 없었다."

[[dialogue]]
speaker = "unk"
original = "ウルスラの大活躍によってモンスターは全て倒され、街に平和が戻った。"
translation = "우르술라의 대활약으로 몬스터는 모두 쓰러졌고, 거리에 평화가 돌아왔다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「──以上、バレンタインの使者、ウルスラ・バレンタインの活躍により、教皇庁主催のバレンタインイベントは無事に終了しました──と」"
translation = "「──이상, 발렌타인의 사자, 우르술라 발렌타인의 활약으로 교황청 주최 발렌타인 이벤트는 무사히 종료되었습니다──라고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「報告書はこんなところでいいわね。トラブルなしに終わらせてくれないのも、いつも通りっていうか……」"
translation = "「보고서는 이 정도면 되겠네. 트러블 없이 끝내주지 않는 것도 평소대로랄까……」"

[[dialogue]]
speaker = "unk"
original = "お疲れさま、イレーナ"
translation = "수고했어, 이레이나"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あら、何か用？\u3000シャロンなら先に帰ったわよ」"
translation = "「어라, 무슨 용건? 샤론이라면 먼저 돌아갔어」"

[[dialogue]]
speaker = "unk"
original = "それなら俺たちも帰ろうか"
translation = "그럼 우리도 돌아갈까"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうね、長居しててもしょうがないし……なんだか、あっという間の一日だったわね」"
translation = "「그렇네, 오래 있어 봤자 소용없고…… 왠지 눈 깜짝할 새 지나간 하루였네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、あー……あんたはさ、やっぱりチョコたくさんもらうの？\u3000あんたの周り、女の子だらけで、しかも美少女揃いだもんね」"
translation = "「아, 아~…… 너는 말이야, 역시 초코 많이 받아? 네 주변엔 여자애들뿐이고, 게다가 미소녀들뿐이잖아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、大半は義理チョコだろうけど？\u3000可愛い子からプレゼントもらったら悪い気しないわよね」"
translation = "「뭐, 대부분은 의리 초코겠지만? 귀여운 애한테 선물 받으면 기분 나쁘진 않겠지」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「中には本命もあったりしてー？\u3000……なによ、まんざらでもなさそうな顔しちゃって」"
translation = "「그중에는 진심도 있으려나~? ……뭐야, 싫지 않은 표정 짓고는」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「甘い物食べ過ぎて、虫歯にならないよう気をつけなさいよ。寝る前にはちゃんと歯を磨きなさい。……って、何言ってんだか」"
translation = "「단 거 너무 많이 먹어서 충치 생기지 않게 조심해. 자기 전에는 꼭 양치하고. ……랄까, 내가 무슨 소릴 하는 건지」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……たくさんもらうんなら、もうチョコなんていらないわよね？」"
translation = "「……많이 받는다면, 이제 초코 같은 건 필요 없겠지?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それとも逆に？\u3000１個ぐらい増えたところで、どうってことない感じだったりして？」"
translation = "「아니면 반대로? 한 개 정도 늘어난다고 해서 별 상관없는 느낌이라거나?」"

[[dialogue]]
speaker = "unk"
original = "それってどういう──"
translation = "그건 무슨──"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「う、ううん、なんでもないわ。ほら、もう暗いし早く帰りましょ」"
translation = "「으, 으응, 아무것도 아니야. 자, 이제 어두우니까 빨리 돌아가자」"

[[dialogue]]
speaker = "？？？"
original = "『帰らせませんよ』"
translation = "『보내드리지 않아요』"

[[dialogue]]
speaker = "unk"
original = "今の声は──ウルスラ！？"
translation = "방금 목소리는── 우르술라!?"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "『だって、まだバレンタインは終わっていないのですから』"
translation = "『왜냐하면, 아직 발렌타인은 끝나지 않았으니까요』"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どういう意味ですか！？」"
translation = "「무슨 뜻인가요!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "『伝えるべき想いが、手渡されるべき物が──その相手に渡らない限り、バレンタインは永遠に終わりません』"
translation = "『전해야 할 마음이, 건네져야 할 물건이── 그 상대에게 전달되지 않는 한, 발렌타인은 영원히 끝나지 않습니다』"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「な、何のことよ！？」"
translation = "「무, 무슨 소리야!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "『この期に及んで、惚けていらっしゃる』"
translation = "『이 상황에서도 시치미를 떼시는군요』"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "『イレーナさんがこっそりと懐に忍ばせている、チョコレート』"
translation = "『이레이나 씨가 몰래 품속에 숨겨두고 있는 초콜릿』"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「っ！？\u3000なんでそれを──」"
translation = "「!? 그걸 어떻게──」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "『それが会長さんの手に渡らない限り、あなたたちは一歩たりとも学園からは出られないんです』"
translation = "『그게 회장님의 손에 넘어가지 않는 한, 당신들은 한 발짝도 학원에서 나갈 수 없답니다』"

[[dialogue]]
speaker = "unk"
original = "こうして、ここに『チョコを渡さないと出られない学園』が誕生したのであった。"
translation = "이렇게 이곳에 『초코를 주지 않으면 나갈 수 없는 학원』이 탄생했다."

