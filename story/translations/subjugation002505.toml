[[dialogue]]
speaker = "unk"
original = "ボスの１人、マハムートのシャドウと戦う為に用意された仮想空間は、魔界の環境を再現したものだった。"
translation = "보스 중 한 명인 마하무트의 섀도와 싸우기 위해 준비된 가상 공간은, 마계의 환경을 재현한 것이었다."

[[dialogue]]
speaker = "unk"
original = "そして、そこには学園最強の一角と称される、もう１人の寮長が足を踏み入れていた――"
translation = "그리고 그곳에는 학원 최강의 일각이라 칭송받는, 또 다른 기숙사장이 발을 들여놓고 있었다――"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ごきげんよう。しばらくぶりですわね、サーシャ」"
translation = "「평안하신가요. 오랜만이네요, 사샤」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「うふふ、久しぶり～♪\u3000ヒルディーちゃん、やっぱりマムに挑みに来たのね～」"
translation = "「우후후, 오랜만이야~♪ 힐디 짱, 역시 마무에게 도전하러 왔구나~」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。次の<b>星霊祭</b>に向けて、いい予行演習になりますから」"
translation = "「네. 다음 성령제를 향해, 좋은 예행연습이 될 테니까요」"

[[dialogue]]
speaker = "フェニエル"
original = "「サーシャ先輩、ごきげんようですっ」"
translation = "「사샤 선배, 평안하신가요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あら～、フニちゃ～ん♪\u3000お姉ちゃん、会いたかったわ～♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「어머~, 후니 짱~♪ 언니, 보고 싶었어~♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ぁ、えへへっ。サーシャ先輩のハグ、なんか照れ臭くなっちゃいます……」"
translation = "「아, 에헤헤. 사샤 선배의 허그, 왠지 쑥스러워져 버려요……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「サーシャ、するなとは言いませんけど、程々に加減して下さいね。フニがソフィアに嫉妬されてしまいますわ」"
translation = "「사샤, 하지 말라고는 안 하겠지만 적당히 가감해 주세요. 후니가 소피아에게 질투 받아버리게 될 거예요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「は～い♪」"
translation = "「네~♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「おや、珍しい組み合わせだナ。サーシャ、ヒルディー」"
translation = "「오호, 드문 조합이다다. 사샤, 힐디」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「アニマちゃん！\u3000それに――シュティレちゃんも♪」"
translation = "「아니마 짱! 그리고――슈틸레 짱도♪」"

[[dialogue]]
speaker = "シュティレ"
original = "「こんにちは、サーシャお姉ちゃん。錬金術の弟子として、師匠と共に参戦しに来ました。ぶい」"
translation = "「안녕하세요, 사샤 언니. 연금술의 제자로서 스승님과 함께 참전하러 왔습니다. 브이」"

[[dialogue]]
speaker = "unk"
original = "指をピースさせて、Ｖサインを作りながら言うシュティレ。"
translation = "손가락으로 피스를 하며 V 사인을 만들며 말하는 슈틸레."

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あ～ん、お姉ちゃんって呼んでくれてありがと～♪\u3000シュティレちゃんにもお姉ちゃんから、挨拶のハグ～♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「아앙, 언니라고 불러줘서 고마워~♪ 슈틸레 짱에게도 언니가 하는 인사의 허그~♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "シュティレ"
original = "「おぅ。サーシャお姉ちゃんのいい匂いと柔らかさで、シュティレの回路が熱くなり、処理遅延が発生してしまいます」"
translation = "「오우. 사샤 언니의 좋은 향기와 부드러움으로 슈틸레의 회로가 뜨거워져 처리 지연이 발생해 버립니다」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「あら～♪\u3000というやつだな。フヒ♪」"
translation = "「어머나~♪ 라는 거다다. 후히♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「そうだわ、私、マトイちゃんとここに来たんだけど、さっきそこで――」"
translation = "「맞다, 나 마토이 짱이랑 여기 왔는데, 아까 저기서――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「サーシャさ～ん！\u3000あっ、みなさん集まって来てますね。こんにちは～」"
translation = "「사샤 씨~! 앗, 여러분 모여 계시네요. 안녕하세요~」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「マトイ、ごきげんよう。って、そちらは――」"
translation = "「마토이, 평안하신가요. 그런데 그쪽은――」"

[[dialogue]]
speaker = "セシア"
original = "「こんにちは、ヒルディオーネ。私もマムと遊ぼうと思ってやって来たわ♪\u3000その上、マトイママともこうして会えたから、一石二鳥ね♪」"
translation = "「안녕하세요, 힐디오네. 나도 마무랑 놀려고 찾아왔어♪ 게다가 마토이 마마와도 이렇게 만났으니 일석이조네♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「守護天使のセシア様。あ、相変わらず行動基準がブレませんわね……」"
translation = "「수호천사인 세시아 님. 여, 여전히 행동 기준이 흔들리지 않으시네요……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「あはは……なんで私がママ判定なのかは、未だにピンと来てないんですが……。ヒルディオーネ先輩の方が明らかにカリスマ性あるのに」"
translation = "「아하하…… 왜 제가 마마 판정인지는 아직도 감이 안 오지만요……. 힐디오네 선배가 훨씬 카리스마 있으신데」"

[[dialogue]]
speaker = "セシア"
original = "「母性とカリスマ性は異なるものよ、マトイママ。残念ながら、ヒルディオーネはママではないわ。寮生が呼んでいる通り『お姉様』が相応しいわね」"
translation = "「모성과 카리스마는 다른 거야, 마토이 마마. 안타깝게도 힐디오네는 마마가 아니야. 기숙사생들이 부르는 대로 『언니분』이 어울려」"

[[dialogue]]
speaker = "フェニエル"
original = "「セッシーちゃん、ごきげんよう♪」"
translation = "「세시 짱, 평안하신가요♪」"

[[dialogue]]
speaker = "セシア"
original = "「フニ♪\u3000あなたもここに来ていたのね。マトイママに不死鳥も加わって、まさに一石三鳥だわ。ふふふっ♪」"
translation = "「후니♪ 너도 여기 와 있었구나. 마토이 마마에 불사조까지 더해져서 그야말로 일석삼조야. 후후후♪」"

[[dialogue]]
speaker = "シュティレ"
original = "「こんにちは。セシアさんもいらっしゃったのですね」"
translation = "「안녕하세요. 세시아 씨도 오셨군요」"

[[dialogue]]
speaker = "セシア"
original = "「シュティレ、あなたも一緒だったのね。アニマと一緒に来たのかしら？」"
translation = "「슈틸레, 너도 함께였구나. 아니마랑 같이 온 걸까?」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「そういえば、シュティレは附属校でセシアと同じクラスと言っていたナ？」"
translation = "「그러고 보니 슈틸레는 부속교에서 세시아와 같은 반이라고 했었다다?」"

[[dialogue]]
speaker = "シュティレ"
original = "「はい、実はそうなのです。ただ、クラスで話したりもしますが……セシアさんはよくママを探しに行ってしまう為、友好度ゲージをなかなか上げられない状態です」"
translation = "「네, 사실 그렇습니다. 다만 교실에서 대화하기도 합니다만…… 세시아 씨는 자주 마마를 찾으러 가버리기 때문에 우호도 게이지를 좀처럼 올릴 수 없는 상태입니다」"

[[dialogue]]
speaker = "セシア"
original = "「あら、そうだったの？\u3000ごめんなさい。私、てっきり友達としてもう仲良くなっているつもりでいたわ」"
translation = "「어머, 그랬니? 미안해. 난 정작 친구로서 벌써 친해진 줄 알고 있었어」"

[[dialogue]]
speaker = "シュティレ"
original = "「なんと、友達だと認識してくれていたのですね。これは朗報です。後で改めてじっくりお話したいところではありますが……」"
translation = "「세상에, 친구라고 인식해 주고 있었군요. 이것은 낭보입니다. 나중에 다시 차분히 이야기하고 싶은 참입니다만……」"

[[dialogue]]
speaker = "シュティレ"
original = "「シュティレはこの機会に、実はヒルディオーネ先輩ともお近づきになりたいと思っていたのです」"
translation = "「슈틸레는 이 기회에 사실 힐디오네 선배와도 가까워지고 싶다고 생각하고 있었습니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「え？\u3000私ですの？」"
translation = "「예? 저 말인가요?」"

[[dialogue]]
speaker = "シュティレ"
original = "「はい。何故ならシュティレは――」"
translation = "「네. 왜냐하면 슈틸레는――」"

[[dialogue]]
speaker = "シュティレ"
original = "「ヒルディオーネ先輩のドリルにロマンを感じているからなのです！」"
translation = "「힐디오네 선배의 드릴에 로망을 느끼고 있기 때문입니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ろ、ロマン？」"
translation = "「로, 로망?」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「あら～♪\u3000そういうことね～」"
translation = "「어머나~♪ 그런 거구나~」"

[[dialogue]]
speaker = "シュティレ"
original = "「ヒルディオーネ先輩が強くなるにつれ、その形へと進化してきたという『ドリルランス』！\u3000そして、乱れなく美しい螺旋を描く、縦ロールヘアー！」"
translation = "「힐디오네 선배가 강해짐에 따라 그 형태로 진화해 왔다는 『드릴 랜스』! 그리고 흐트러짐 없이 아름다운 나선을 그리는 세로 롤 헤어!」"

[[dialogue]]
speaker = "シュティレ"
original = "「まさにドリルの体現者！\u3000シュティレ的にはぶいぶいぶいの、ぶいっなのです！」"
translation = "「그야말로 드릴의 체현자! 슈틸레적으로는 브이브이브이의 브이인 것입니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そ、そうなんですの？\u3000まあ、この千園寺ヒルディオーネのトレードマークのようなものですから、当然ですわね！\u3000おほほほほほっ♪」"
translation = "「그, 그런가요? 뭐, 이 센도지 힐디오네의 트레이드 마크 같은 것이니 당연하겠죠! 오호호호호호♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（本当は特別ドリルにこだわりがあるわけではなくて、髪もただの癖っ毛、ドリルも何故か勝手にそうなっただけなのですけれど……）"
translation = "(사실 딱히 드릴에 집착이 있는 건 아니고 머리도 그냥 곱슬머리, 드릴도 왠지 멋대로 그렇게 된 것뿐입니다만……)"

[[dialogue]]
speaker = "シャドウマハムート"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フェニエル"
original = "「！\u3000お姉様、マムのシャドウが現れました！」"
translation = "「! 언니분, 마무의 섀도가 나타났어요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。察知してましたわ」"
translation = "「네. 감지하고 있었습니다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それでは、歓談はここまでにして――全力で行きますわよ！」"
translation = "「그럼 환담은 여기까지 하고―― 전력으로 가겠어요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「はい、お姉様！」"
translation = "「네, 언니분!」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネが武器を構えたのを合図に、シャドウマハムートとの戦いが開始されるのだった――"
translation = "힐디오네가 무기를 겨눈 것을 신호로 섀도 마하무트와의 전투가 시작되는 것이었다――"

