[[dialogue]]
speaker = "unk"
original = "第１話,星見エリシア,B"
translation = "제1화, 호시미 엘리시아, B"

[[dialogue]]
speaker = "unk"
original = "急速の飛行を続け、ようやく先行したフィオナのもとへ到着した俺たち。"
translation = "급속한 비행을 계속하여, 겨우 앞서 나간 피오나에게 도착한 우리들."

[[dialogue]]
speaker = "unk"
original = "そこでは……予想だにしない光景が待ち受けていた。"
translation = "그곳에서는…… 예상조차 하지 못한 광경이 기다리고 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオ──えっ……？」"
translation = "「피오──엣……?」"

[[dialogue]]
speaker = "フィオナ？"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "アポロ？"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "佇むフィオナ。崩折れるアポロ。"
translation = "멈춰 서 있는 피오나. 무너져 쓰러진 아폴로."

[[dialogue]]
speaker = "unk"
original = "見知った２人──のはずだが、その雰囲気はどちらも異様。"
translation = "알고 지내던 두 사람──일 텐데, 그 분위기는 둘 다 이상하다."

[[dialogue]]
speaker = "unk"
original = "常に冷静だったはずのフィオナから、静かな激情の炎が燃え立つのを感じる。"
translation = "항상 냉정했을 터인 피오나에게서, 조용한 격정의 불꽃이 타오르는 것을 느낀다."

[[dialogue]]
speaker = "unk"
original = "また何より、知らない顔がそこにいたのも確かで……"
translation = "게다가 무엇보다, 모르는 얼굴이 그곳에 있었던 것도 확실하고……"

[[dialogue]]
speaker = "マトイ"
original = "「仮面が……！」"
translation = "「가면이……!」"

[[dialogue]]
speaker = "アポロ？"
original = "「っ……っ……！」"
translation = "「크…… 크……!」"

[[dialogue]]
speaker = "unk"
original = "頭痛に苛まれるように、額を片手で押さえる少女。"
translation = "두통에 시달리는 것처럼, 이마를 한 손으로 누르는 소녀."

[[dialogue]]
speaker = "unk"
original = "その手つきは、失われた仮面を探しているようにも映る。"
translation = "그 손짓은, 잃어버린 가면을 찾고 있는 것처럼도 보인다."

[[dialogue]]
speaker = "クロト"
original = "「……フィオナ？」"
translation = "「……피오나?」"

[[dialogue]]
speaker = "フィオナ？"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "──君がやったのか？"
translation = "──네가 한 건가?"

[[dialogue]]
speaker = "unk"
original = "そう言外に問いかけると、彼女はゆっくり時間をかけて頷いた。"
translation = "그렇게 말없이 묻자, 그녀는 천천히 시간을 들여 고개를 끄덕였다."

[[dialogue]]
speaker = "unk"
original = "この一帯では──太陽の星力が未だ余熱をくすぶらせている。"
translation = "이 일대에서는── 태양의 성력이 아직 잔열을 피우고 있다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker = "アポロ？"
original = "「……何のつもりだ」"
translation = "「……무슨 속셈이지」"

[[dialogue]]
speaker = "フィオナ？"
original = "「化けの皮を剥いだのみです。よもや素顔まで模しているとは思いませんでしたが」"
translation = "「가면을 벗겼을 뿐입니다. 설마 맨얼굴까지 흉내 내고 있을 줄은 몰랐습니다만」"

[[dialogue]]
speaker = "フィオナ？"
original = "「──あなたは誰です？\u3000一体誰に断って、その姿をしているのですか？」"
translation = "「──당신은 누구입니까? 도대체 누구에게 허락을 받고, 그 모습을 하고 있는 것입니까?」"

[[dialogue]]
speaker = "アポロ？"
original = "「ふ……ふふっ。ふふふっ」"
translation = "「후…… 후훗. 후후훗」"

[[dialogue]]
speaker = "unk"
original = "フィオナの問いかけに対して──アポロはくつくつと笑った。"
translation = "피오나의 질문에 대해── 아폴로는 킬킬 웃었다."

[[dialogue]]
speaker = "unk"
original = "それから、どこか儚げな表情で、ふっと漏らす。"
translation = "그러더니, 어딘가 덧없는 표정으로, 픽 하고 흘린다."

[[dialogue]]
speaker = "アポロ？"
original = "「相変わらず──悪ふざけには厳しいのだな。エリシア」"
translation = "「여전하군── 장난에는 엄격하구나. 엘리시아」"

[[dialogue]]
speaker = "フィオナ？"
original = "「っ……！？」"
translation = "「크……!?」"

[[dialogue]]
speaker = "unk"
original = "エリシア。"
translation = "엘리시아."

[[dialogue]]
speaker = "unk"
original = "そう呼ばれたフィオナは、なぜか身をのけぞらせるほどに驚いていた。"
translation = "그렇게 불린 피오나는, 어째서인지 몸을 뒤로 젖힐 정도로 놀라고 있었다."

[[dialogue]]
speaker = "フィオナ？"
original = "「……そう。そうですか。ただの偽者と思っていましたが──そう単純なわけでもないようですね」"
translation = "「……그렇군요. 그렇습니까. 단순한 가짜라고 생각했지만── 그렇게 단순한 것만은 아닌 듯하군요」"

[[dialogue]]
speaker = "フィオナ？"
original = "「ならば、私と向き合ってもらいましょうか──<b>姉さん</b>」"
translation = "「그렇다면, 저와 마주해 주시겠습니까── <b>언니</b>」"

[[dialogue]]
speaker = "ソフィア"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "クロト"
original = "「お姉さん──だって……？」"
translation = "「언니──라고……?」"

[[dialogue]]
speaker = "アナ"
original = "「それに──聞いたことのない名前も……」"
translation = "「게다가── 들어본 적 없는 이름도……」"

[[dialogue]]
speaker = "unk"
original = "外野である俺たちには意図が汲み取れずにいる──と、彼女はさらに衝撃的な告白をした。"
translation = "외부인인 우리들은 의도를 파악하지 못하고 있는── 그때, 그녀는 더욱 충격적인 고백을 했다."

[[dialogue]]
speaker = "フィオナ？"
original = "「……黙っていてすみません、皆さん。私は今まで自らを偽ってきました」"
translation = "「……침묵하고 있어서 죄송합니다, 여러분. 저는 지금까지 스스로를 속여왔습니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャッ……！？！？」"
translation = "「냥……!?!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「偽るって──どういうことだよ……！？」"
translation = "「속였다니── 무슨 소리야……!?」"

[[dialogue]]
speaker = "フィオナ？"
original = "「私は、星見フィオナではありません」"
translation = "「저는, 호시미 가문의 피오나가 아닙니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナは──何かを諦めたような、落ち着き払った語調で言った。"
translation = "피오나는── 무언가를 포기한 듯한, 침착한 어조로 말했다."

[[dialogue]]
speaker = "ユウリ"
original = "「フィ、フィオナじゃねえって……どういうことだよ！\u3000どっからどう見たって、あたしの知ってるフィオナだぞ」"
translation = "「피, 피오나가 아니라고…… 무슨 소리야! 어디서 어떻게 봐도, 내가 아는 피오나잖아」"

[[dialogue]]
speaker = "ソフィア"
original = "「そ……そうです！\u3000会長は今も、私の憧れる凛々しきお姿です！」"
translation = "「네…… 그렇습니다! 회장님은 지금도, 제가 동경하는 늠름한 모습이십니다!」"

[[dialogue]]
speaker = "unk"
original = "新星の俺たちだけじゃない。"
translation = "신성인 우리들만이 아니다."

[[dialogue]]
speaker = "unk"
original = "彼女と長い付き合いのはずの流星メンバーまで、驚愕を受けて戸惑っていた。"
translation = "그녀와 오랜 인연일 터인 유성 멤버들까지, 경악하며 당황하고 있었다."

[[dialogue]]
speaker = "unk"
original = "むしろ付き合いの浅い俺たちでは口を挟めないほどに。"
translation = "오히려 교류가 얕은 우리들은 끼어들 수 없을 정도로."

[[dialogue]]
speaker = "セーラ"
original = "「ん～、目の前にいるフィオナちゃんが偽者ってこと？\u3000でも、うち的にはどう見ても本物だけど」"
translation = "「음~, 눈앞에 있는 피오나짱이 가짜라는 거야? 하지만, 나로서는 아무리 봐도 진짜인데」"

[[dialogue]]
speaker = "セーラ"
original = "「もしフィオナちゃんのそっくりさんだとしても、守護星まではなりすませなくない？」"
translation = "「만약 피오나짱의 닮은꼴이라고 해도, 수호성까지는 사칭할 수 없지 않아?」"

[[dialogue]]
speaker = "アナ"
original = "「ん……そうですね。太陽の守護星を持つ方が、２人３人もいるとは思えません」"
translation = "「음…… 그렇네요. 태양의 수호성을 가진 분이, 두 명 세 명이나 있을 거라고는 생각하지 않습니다」"

[[dialogue]]
speaker = "フィオナ？"
original = "「ええ。ですから」"
translation = "「네. 그러니」"

[[dialogue]]
speaker = "フィオナ？"
original = "「皆さんと出会った時からずっと──私は名を偽っていたということです」"
translation = "「여러분과 만났을 때부터 줄곧── 저는 이름을 속이고 있었다는 것입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……！」"
translation = "「……！」"

[[dialogue]]
speaker = "ルリエル"
original = "「そ……そんな……」"
translation = "「서…… 설마……」"

[[dialogue]]
speaker = "unk"
original = "フィオナ──否、フィオナでないと明かした彼女の告白は強い波紋を呼んだ。"
translation = "피오나── 아니, 피오나가 아니라고 밝힌 그녀의 고백은 강한 파문을 일으켰다."

[[dialogue]]
speaker = "ニャリオン"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "皆の表情が驚きに満ちる中、ニャリオンだけが別種の当惑を浮かべていたのを見逃さない。"
translation = "모두의 표정이 놀라움으로 가득 찬 가운데, 냐리온만이 다른 종류의 당혹감을 띄우고 있었음을 놓치지 않는다."

[[dialogue]]
speaker = "unk"
original = "どうやらニャリオンだけは事情を知っているようだが──"
translation = "아무래도 냐리온만이 사정을 알고 있는 듯하지만──"

[[dialogue]]
speaker = "フィオナ？"
original = "「ですよね──フィオナ姉さん？」"
translation = "「그렇죠── 피오나 언니?」"

[[dialogue]]
speaker = "アポロ？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "よろめきながら立ち上がるアポロ。"
translation = "비틀거리며 일어나는 아폴로."

[[dialogue]]
speaker = "unk"
original = "だが、仮面のなくなった少女は必死に<ruby>頭<rt>かぶり</rt></ruby>を振って……"
translation = "하지만, 가면이 없어진 소녀는 필사적으로 고개를 저으며……"

[[dialogue]]
speaker = "アポロ？"
original = "「っ……いや……ちが、う」"
translation = "「크…… 아니…… 틀려」"

[[dialogue]]
speaker = "アポロ？"
original = "「あたしは……アポロだ。フィオナなんて奴は──知らない」"
translation = "「나는…… 아폴로다. 피오나 같은 녀석은── 몰라」"

[[dialogue]]
speaker = "フィオナ？"
original = "「あなたは今、私のことを呼びました。……私の名を知る者は、星見の人間以外にありえません」"
translation = "「당신은 방금, 저를 불렀습니다. ……제 이름을 아는 자는, 호시미 가문의 인간 외에는 있을 수 없습니다」"

[[dialogue]]
speaker = "フィオナ？"
original = "「本当は覚えているのに──知らぬふりを押し通すつもりですか？」"
translation = "「사실은 기억하고 있는데── 모르는 척을 계속 밀고 나갈 생각입니까?」"

[[dialogue]]
speaker = "アポロ？"
original = "「うる、さい──黙れっ……！」"
translation = "「시끄, 러워── 닥쳐……!」"

[[dialogue]]
speaker = "unk"
original = "アポロはさらに苦しみながら首を振っていた。"
translation = "아폴로는 더욱 괴로워하며 고개를 젓고 있었다."

[[dialogue]]
speaker = "unk"
original = "まるで、嫌な考えを頭から追い出すみたいに……"
translation = "마치, 싫은 생각을 머리에서 쫓아내려는 것처럼……"

[[dialogue]]
speaker = "ユウリ"
original = "「フィオナがフィオナって……！\u3000ああもう、頭が混乱してついてけねー！」"
translation = "「피오나가 피오나라니……! 아아 정말, 머리가 혼란스러워서 못 따라가겠어!」"

[[dialogue]]
speaker = "アナ"
original = "「どうやら……先ほど聞こえたものが、流星会長のお名前のようです」"
translation = "「아무래도…… 방금 들린 것이, 유성 회장님의 성함인 듯합니다」"

[[dialogue]]
speaker = "エリシア"
original = "「はい。私の本名は星見エリシア──眠れる姉に代わって、名を受け継いでいたにすぎません」"
translation = "「네. 제 본명은 호시미 엘리시아── 잠든 언니를 대신하여, 이름을 계승하고 있었을 뿐입니다」"

[[dialogue]]
speaker = "エリシア"
original = "「そして。本来の『フィオナ』はあそこにいる──姉さんのことを指します」"
translation = "「그리고. 본래의 『피오나』는 저기에 있는── 언니를 가리킵니다」"

[[dialogue]]
speaker = "アポロ？"
original = "「違う──違う違う違う！\u3000あたしは……あたしはアポロだ、フィオナなんかじゃない！」"
translation = "「틀려── 틀려 틀려 틀려! 나는…… 나는 아폴로다, 피오나 같은 거 아냐!」"

[[dialogue]]
speaker = "エリシア"
original = "「いいえ姉さん。あなたはフィオナ。星見家の長女として生まれ、魔王となる宿命を背負った人間です」"
translation = "「아닙니다 언니. 당신은 피오나. 호시미 가문의 장녀로 태어나, 마왕이 될 숙명을 짊어진 인간입니다」"

[[dialogue]]
speaker = "エリシア"
original = "「それとも──妹の顔も忘れてしまいましたか？\u3000私ばかりが成長してしまったから」"
translation = "「아니면── 여동생의 얼굴도 잊어버리셨습니까? 저만이 성장해 버렸기 때문에」"

[[dialogue]]
speaker = "アポロ？"
original = "「っ……黙れ！\u3000オマエなんか知らない──勝手に妹ヅラするな！」"
translation = "「크…… 닥쳐! 너 같은 거 몰라── 멋대로 여동생 행세 하지 마!」"

[[dialogue]]
speaker = "アポロ？"
original = "「あたしは──あたしの名前は、アポロなんだ──！！」"
translation = "「나는── 내 이름은, 아폴로란 말이야──!!」"

[[dialogue]]
speaker = "エリシア"
original = "「っ──！」"
translation = "「크──!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナを守るわよ──！」"
translation = "「피오나를 지킬 거야──!」"

[[dialogue]]
speaker = "unk"
original = "瀕死の流星が再びアポロに渦を巻き、フィオナへと押し寄せる。"
translation = "빈사의 유성이 다시 아폴로에게 소용돌이치며, 피오나에게로 밀려온다."

[[dialogue]]
speaker = "unk"
original = "全員で彼女をかばおうとした、その時──"
translation = "전원이 그녀를 감싸려 했던, 그때──"

