[[dialogue]]
speaker = "梨緒"
original = "「その後平行世界デネブに渡った私たちは、女神の上位に位置する創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在を知った」"
translation = "「그 후 평행 세계 데네브로 건너간 우리는, 여신보다 상위에 위치하는 창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』의 존재를 알게 되었다.」"

[[dialogue]]
speaker = "梨緒"
original = "「その『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』こそ、ジグが言っていた“真なる神”。リクリエを起こそうとする元凶ともいえる存在だった」"
translation = "「그 『<ruby>XELOS<rt>제로스</rt></ruby>』야말로 지그가 말하던 “진정한 신”. 리크리에를 일으키려는 원흉이라고도 할 수 있는 존재였느니라.」"

[[dialogue]]
speaker = "梨緒"
original = "「そして次は──女神の神殿」"
translation = "「그리고 다음은── 여신의 신전.」"

[[dialogue]]
speaker = "梨緒"
original = "「リクリエの使徒・ジグと、私たち星騎士の決着の場所だ」"
translation = "「리크리에의 사도 지그와, 우리 성기사들의 결전의 장소다.」"

[[dialogue]]
speaker = "unk"
original = "『デネブの極星学園が天界を襲撃し、女神の神殿を破壊しようとしている』『もし女神の神殿が破壊されれば、天使と天界が消滅する』──そう聞いた俺たちは急遽天界に渡った。"
translation = "『데네브의 극성 학원이 천계를 습격해, 여신의 신전을 파괴하려 하고 있다』 『만약 여신의 신전이 파괴되면, 천사와 천계가 소멸한다』── 그렇게 들은 우리는 급히 천계로 건너갔다."

[[dialogue]]
speaker = "unk"
original = "激闘の末に何とか極星学園を退け、アルタイルの天使たちを守れたかに思えたが……そこにジグが現れた。"
translation = "격투 끝에 어떻게든 극성 학원을 물리치고 알타이르의 천사들을 지켜낸 듯 보였으나…… 그곳에 지그가 나타났다."

[[dialogue]]
speaker = "ジグ"
original = "『やぁ、こうして会うのは久しぶりだね、星騎士の諸君』"
translation = "『여어, 이렇게 만나는 건 오랜만이네, 성기사 제군들.』"

[[dialogue]]
speaker = "梨緒"
original = "『女神の神殿が揺れて……いや、動いている！？\u3000何をした、ジグ！？』"
translation = "『여신의 신전이 흔들리고…… 아니, 움직이고 있어!? 무슨 짓을 한 거냐, 지그!?』"

[[dialogue]]
speaker = "ジグ"
original = "『神殿の機能をいじって行き先を設定させてもらったんだ』"
translation = "『신전의 기능을 건드려서 목적지를 설정해 뒀지.』"

[[dialogue]]
speaker = "ジグ"
original = "『女神の神殿はもうすぐ──聖庭園に衝突するよ』"
translation = "『여신의 신전은 곧── 성정원에 충돌할 거야.』"

[[dialogue]]
speaker = "梨緒"
original = "「女神の神殿をぶつけようなんて、大それたことをしたものだ」"
translation = "「여신의 신전을 부딪치려 하다니, 대담한 짓을 저질렀군.」"

[[dialogue]]
speaker = "梨緒"
original = "「だがジグの思い通りにはならなかった」"
translation = "「하지만 지그의 뜻대로 되지는 않았느니라.」"

[[dialogue]]
speaker = "unk"
original = "ジグは神殿の機能で魔王の力を封じたため、守護天使の力を持つ梨緒が戦った。"
translation = "지그는 신전의 기능으로 마왕의 힘을 봉인했기에, 수호천사의 힘을 가진 리오가 싸웠다."

[[dialogue]]
speaker = "梨緒"
original = "「私はジグと対峙し、『可能性はない』と言っていた言葉の意味をようやく理解した」"
translation = "「나는 지그와 대치하며, 『가능성은 없다』고 말하던 의미를 비로소 이해했느니라.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグは『<ruby>天機<rt>てんき</rt></ruby>の星眼』で、対象の可能性を見ることができたんだ。ジグに勝つには星眼の予測を打ち破る必要があった」"
translation = "「지그는 『천기의 성안』으로 대상의 가능성을 볼 수 있었던 거다. 지그에게 이기려면 성안의 예측을 타파할 필요가 있었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「私は『因果』の摂理を司る守護天使、《運命》のノルンの力を使い、ジグに対抗した。そして──」"
translation = "「나는 『인과』의 섭리를 관장하는 수호천사, 《운명》의 노른의 힘을 사용해 지그에게 대항했다. 그리고──」"

