[[dialogue]]
speaker = "unk"
original = "第１話,斉天大聖と終末兵器,P"
translation = "제1화, 제천대성과 종말 병기, P"

[[dialogue]]
speaker = "unk"
original = "紅明たちと共に、新たに確認されたＳＳ級モンスター『牛魔王』を討伐してから、少し経ったある日のこと。"
translation = "코우메이 일행과 함께 새로 확인된 SS급 몬스터 『우마왕』을 토벌하고 나서 조금 시간이 흐른 어느 날의 일."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ、にーにーだ♪\u3000え～いっ！」"
translation = "「앗, 오빠다♪ 에잇!」"

[[dialogue]]
speaker = "unk"
original = "最近聞き慣れた声が聞こえて来たかと思うと、突然お腹めがけて抱き着かれる。"
translation = "최근 귀에 익은 목소리가 들려온다 싶더니 갑자기 배를 향해 달려든다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「えっへへへぇ、おっす☆\u3000にーにー♪」"
translation = "「에헤헤헤, 안녕☆ 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "彼女はこの前、流星学園附属校へ転入した魔族の――クーシェン。"
translation = "그녀는 일전에 유성학원 부속교로 전입한 마족인── 쿠셴."

[[dialogue]]
speaker = "unk"
original = "魔界で悪党退治しながらさすらっていたところを、ネビュラ所属の魔女――マリオンにスカウトされてやってきた、小さな星騎士である。"
translation = "마계에서 악당 퇴치를 하며 떠돌던 중 네뷸라 소속 마녀인 마리온에게 스카우트되어 온 어린 성기사다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「――あのね、聞いて聞いて！\u3000ボク、ここ数日、西遊記について漫画で読んで勉強したんだ～」"
translation = "「──있지, 들어봐 들어봐! 나, 요 며칠 동안 서유기를 만화로 읽으면서 공부했어~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「孫悟空、すごいカッコよかった！\u3000まあ、ボクもこれから、負けないくらい大活躍しちゃうけどね～！」"
translation = "「손오공, 정말 멋있었어! 뭐, 나도 이제부터 지지 않을 정도로 대활약할 거지만 말이야~!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「それで、漫画で初めて知ったんだけど、<b>前世</b>の孫悟空が使ってた技で、今のボクが覚えてないものが、実は結構あるみたいなんだ！」"
translation = "「그래서 만화로 처음 알게 된 건데, <b>전생</b>의 손오공이 썼던 기술 중에서 지금의 내가 모르는 게 사실 꽤 있는 것 같아!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボク、それを知って、すごくウキウキしてきちゃってさ♪\u3000今日から早速練習して、新技習得に挑戦してみようと思うんだ！」"
translation = "「나, 그걸 알고 나서 정말 두근두근해졌거든♪ 오늘부터 당장 연습해서 신기술 습득에 도전해 보려고 해!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「にーにーもボクのカッコいい新技、早く見たいでしょ？\u3000だから練習、付き合わせてあげてもいいよ～？\u3000ウキキ♪」"
translation = "「오빠도 나의 멋진 신기술 빨리 보고 싶지? 그러니까 연습, 같이하게 해줘도 괜찮아~! 우끼끼♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「クーシェン、貴様、また『前世』の話をしてるのか？」"
translation = "「쿠셴, 네 녀석 또 『전생』 이야기를 하는 것이냐?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ、プリムラじゃん！\u3000おっす～☆」"
translation = "「앗, 프리뮬라잖아! 안녕~☆」"

[[dialogue]]
speaker = "unk"
original = "２人は知り合いなの？"
translation = "둘이 아는 사이야?"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うん！\u3000附属校で同じクラスになったんだ～」"
translation = "「응! 부속교에서 같은 반이 됐어~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「この間、眷族がこやつに御前試合で世話になったところを我も見ていたのでな。クラスメイトとして、挨拶をしてやったのじゃ」"
translation = "「얼마 전 <u>권속</u>이 이자에게 어전 시합에서 신세를 졌을 때 나도 보고 있었느니라. 클래스메이트로서 인사를 해준 것이지」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「それで聞けば、前世が孫悟空だとかぬかしておったから、『そういう年頃』なのかとスルーしてやっていたのじゃが……」"
translation = "「그래서 들어보니 전생이 손오공이라느니 뭐라느니 지껄이길래 『그런 나이』인가 싶어 넘겨주었느니라만……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ふっふっふ……プリムラ！\u3000自己紹介の時にも言ったけど、実はボクは西遊記の英雄――斉天大聖『孫悟空』の生まれ変わりなんだよ！」"
translation = "「훗훗훗…… 프리뮬라! 자기소개 때도 말했지만 사실 나는 서유기의 영웅── 제천대성 『손오공』의 환생이라고!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「じゃが、前世の記憶は持っているわけではないと」"
translation = "「허나 전생의 기억을 가지고 있는 것은 아니라고 하지 않았느냐」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うんっ！\u3000全く覚えてないんだよね～」"
translation = "「응! 전혀 기억 안 나거든~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「覚えとらんのに、なんで前世が孫悟空だとわかるんじゃ……」"
translation = "「기억하지도 못하는데 어째서 전생이 손오공이라는 걸 아는 게냐……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「紅明ねーねーが前世で会ったことあるらしいんだけど、ボクは孫悟空と見た目が瓜二つなんだって！」"
translation = "「코우메이 언니가 전생에서 만난 적이 있다는데, 내가 손오공이랑 외모가 판박이래!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「前世で会ったってどういうことなんじゃ……」"
translation = "「전생에서 만났다니 그게 무슨 소리냐……」"

[[dialogue]]
speaker = "unk"
original = "怪訝そうな顔を浮かべるプリムラに、俺はクーシェンの言っていることが本当だと説明する。"
translation = "의아한 표정을 짓는 프리뮬라에게 나는 쿠셴이 말하는 것이 사실이라고 설명해 준다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なに？\u3000紅明の奴が、実は牛魔王の娘『<ruby>紅孩児<rt>こうがいじ</rt></ruby>』の転生体で、前世の記憶を持っているじゃと……？」"
translation = "「뭐라? 코우메이 그자가 사실 우마왕의 딸 『홍해아』의 전생체이고 전생의 기억을 가지고 있단 말이냐……?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――ふむ……クーシェンの言っていることは自称だと思っておったが、眷族がそこまで言うのなら、本当のことなのじゃろう」"
translation = "「──흠…… 쿠셴이 말하는 건 자칭이라 생각했느니라만, <u>권속</u>이 거기까지 말한다면 사실인 모양이구나」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うん、ごめんね！\u3000プリムラが『悪の終末兵器』って名乗ってるのと違って、ボクは自称じゃないんだ」"
translation = "「응, 미안해! 프리뮬라가 『악의 종말 병기』라고 자칭하는 거랑 다르게 나는 자칭이 아니거든」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我も自称じゃないんじゃが！？」"
translation = "「나도 자칭이 아니니라만!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そうなの？」"
translation = "「그래?」"

[[dialogue]]
speaker = "unk"
original = "そう、プリムラもまた自称ではなく、元々はとある黒幕によって作られた本当の終末兵器であり、現在は『魔法少女』として活動していたりする。俺がそのことを説明すると――"
translation = "그렇다. 프리뮬라 또한 자칭이 아니라 원래는 어떤 흑막에 의해 만들어진 진짜 종말 병기였으며, 현재는 『마법소녀』로서 활동하고 있기도 하다. 내가 그 사실을 설명하자──"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「魔法少女って……何？」"
translation = "「마법소녀가…… 뭐야?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なんじゃ貴様、知らんのか？\u3000そういうジャンルのアニメがあるんじゃ」"
translation = "「무엇이냐, 네 녀석은 모르느냐? 그런 장르의 애니메이션이 있느니라」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「アニメ！\u3000それならボクも観てみたい！\u3000プリムラ、オススメのやつを教えて！」"
translation = "「애니메이션! 그럼 나도 보고 싶어! 프리뮬라, 추천하는 거 가르쳐줘!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「は？\u3000我のオススメじゃと？」"
translation = "「하? 나의 추천 말이냐?」"

[[dialogue]]
speaker = "unk"
original = "数日後――俺はプリムラとクーシェンが２人で一緒に昼食をしているところを見かけて、声をかける。"
translation = "며칠 뒤── 나는 프리뮬라와 쿠셴이 둘이서 함께 점심을 먹고 있는 것을 발견하고 말을 건다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「むにゃむにゃ……もぐもぐ……。あっ、にーにー！\u3000おっす～♪」"
translation = "「우냐우냐…… 우물우물……. 앗, 오빠! 안녕~♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ん……ふわぁ～……。おお、眷族か……」"
translation = "「응…… 하아암~…… 오오, <u>권속</u>인가……」"

[[dialogue]]
speaker = "unk"
original = "なんだか２人とも眠そう？"
translation = "왠지 둘 다 졸려 보이는데?"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うん！\u3000この前言ってた魔法少女のアニメを、プリムラと一緒に全話観たんだ～」"
translation = "「응! 저번에 말했던 마법소녀 애니메이션을 프리뮬라랑 같이 전편 다 봤어~」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ここ数日、クーシェンが流星寮の我の部屋に押しかけてきて、夜遅くまで魔法少女のアニメを観る羽目になったのじゃ……」"
translation = "「요 며칠 쿠셴이 유성 기숙사의 내 방으로 들이닥쳐서 밤늦게까지 마법소녀 애니메이션을 보게 되었느니라……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「にーにー、それでね！\u3000すごかったんだよ！\u3000魔法少女の服が破けて、大人おっぱいがドーンって！」"
translation = "「오빠, 그래서 말이야! 정말 대단했어! 마법소녀 옷이 찢어지더니 어른 가슴이 콰광 하고!」"

[[dialogue]]
speaker = "unk"
original = "見たのってまさか、深夜アニメの方！？"
translation = "본 게 설마 심야 애니메이션 쪽이야!?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「け、眷族、なんじゃその目は！？\u3000違うぞ！\u3000我も今まで１から全部観たものがなかったから、トレジアンナに聞いて、面白いと勧めてきたやつを観たのじゃ！」"
translation = "「궈, <u>권속</u>, 무엇이냐 그 눈은!? 아니니라! 나도 지금까지 1화부터 전부 본 게 없었기에 트레지안나에게 물어서 재미있다고 추천받은 걸 본 것이니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そしたら、そういう破廉恥な描写があるやつで……！」"
translation = "「그랬더니 그런 파렴치한 묘사가 있는 것이어서……!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～！？\u3000でも、すごくプリムラも見入ってたじゃん！\u3000特に敵が触手を召喚して、エッチな攻撃をしてくるとことか！」"
translation = "「에이~!? 하지만 프리뮬라도 엄청 몰입해서 봤잖아! 특히 적이 촉수를 소환해서 야하게 공격하는 부분이라든가!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ばっ！？\u3000公衆の面前で何を言っとるんじゃ、貴様！？」"
translation = "「바, 바보냐!? 공공장소에서 무슨 소리를 하는 게냐, 네 녀석은!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボクはもう、ウキウキしたよ♪\u3000絵なのに、あんな風にエッチなおっぱいの質感を再現できるなんて！\u3000大人おっぱい最高！！」"
translation = "「나는 정말 두근두근했다구♪ 그림인데도 그렇게 야한 가슴의 질감을 재현할 수 있다니! 어른 가슴 최고!!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっぱいおっぱい、大きな声でぬかすでないっ、このエロ猿が！」"
translation = "「가슴 가슴, 큰 소리로 떠들지 말거라, 이 에로 원숭이가!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～？\u3000プリムラは子供だな～、そんなことで恥ずかしがるなんて～♪」"
translation = "「에이~? 프리뮬라는 어린애구나~ 그런 걸로 부끄러워하다니~♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「誰が子供じゃ！\u3000『好きゲージ』が貯まると妊娠するとか、わけわからんことぬかすやつに言われたくないわ！」"
translation = "「누가 어린애란 말이냐! 『호감 게이지』가 쌓이면 임신한다느니 뭐니 말도 안 되는 소리를 지껄이는 녀석에게 듣고 싶지 않느니라!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「わかってるわかってる♪\u3000プリムラもそのうち、エッチなことがわかる時がくるから♪」"
translation = "「알아 알아♪ 프리뮬라도 조만간 야한 걸 이해할 때가 올 테니까♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なんで我の方が貴様より子供みたいになっとるんじゃああああああっ！」"
translation = "「어째서 내가 네 녀석보다 어린애처럼 되어버리는 것이냐아아아아아앗!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「わぁ～！\u3000プリムラが怒ったぁ～♪\u3000ウキキキ♪」"
translation = "「와아~! 프리뮬라가 화났다아~♪ 우끼끼끼♪」"

[[dialogue]]
speaker = "unk"
original = "その後、楽しそうに笑いながら、プリムラと追いかけっこをするクーシェンなのであった――"
translation = "그 뒤 즐겁게 웃으며 프리뮬라와 술래잡기를 하는 쿠셴이었다──"

