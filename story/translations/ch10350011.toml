[[dialogue]]
speaker = "unk"
original = "第１話,ゴシックファッションの傭兵,P"
translation = "제1화, 고딕 패션의 용병"

[[dialogue]]
speaker = "unk"
original = "星徒会長に就任して間もなくのこと。１人で執務していた時に、ある女生徒がやって来た――"
translation = "성도회장에 취임하고 얼마 지나지 않았을 때의 일. 혼자 집무를 보고 있을 때, 한 여학생이 찾아왔다――"

[[dialogue]]
speaker = "セナリィ"
original = "「失礼致しますわ。会長様、ただいまお時間よろしいでしょうか？」"
translation = "「실례하겠습니다. 회장님, 지금 시간 좀 괜찮으신가요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ありがとうございます。それでは名乗らせて頂きますわ――」"
translation = "「감사합니다. 그럼 통성명을 하도록 하죠――」"

[[dialogue]]
speaker = "セナリィ"
original = "「私は傭兵、人呼んでバンデット・セナリィと申しますわ。所属としては、新星学園の２年生になりますわね」"
translation = "「저는 용병, 사람들은 밴디트 세나리라고 부른답니다. 소속은 신성학원 2학년이 되겠네요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ちなみに自称ではなく、私、学園に来るまでは武器商人の下で傭兵を務めておりましたの。嘘だとお思いでしたら、興信所で調査をして頂いても結構ですわよ」"
translation = "「참고로 자칭이 아니라, 저, 학원에 오기 전까지는 무기 상인 밑에서 용병으로 일했었답니다. 거짓말이라고 생각하신다면, 흥신소에서 조사를 해보셔도 괜찮아요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「それで、私が今日やって来たのは、会長様へビジネスの提案をする為ですわ」"
translation = "「그래서, 제가 오늘 찾아온 것은 회장님께 비즈니스 제안을 하기 위해서예요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「傭兵であると同時に、最近新たな会社を起業しましたの。その名も『秘密結社ゴールデングース』。金のガチョウとは実に縁起の良い名前でしょう？」"
translation = "「용병인 동시에, 최근 새로운 회사를 창업했답니다. 그 이름도 『비밀 결사 골든 구스』. 황금 거위라니 참으로 상서로운 이름이죠?」"

[[dialogue]]
speaker = "unk"
original = "会社というと、他にもメンバーが？"
translation = "회사라고 하면, 다른 멤버도 있어?"

[[dialogue]]
speaker = "セナリィ"
original = "「お恥ずかしながら、まだ正式な社員は私１人だけですわ。勧誘している方は何人かいるのですが……」"
translation = "「부끄럽게도, 아직 정식 사원은 저 혼자뿐이에요. 권유하고 있는 분은 몇 명 있습니다만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「業務内容については、傭兵稼業を始めとして、見合う金額さえ払って頂ければ、喜んで何でも致しますわ――」"
translation = "「업무 내용에 대해서는, 용병 가업을 시작으로, 합당한 금액만 지불해 주신다면 기꺼이 무엇이든 하겠어요――」"

[[dialogue]]
speaker = "セナリィ"
original = "「それこそ大金ならば、言葉の通り何でも、ね♪」"
translation = "「그게 거금이라면, 말 그대로 무엇이든, 말이죠♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「どんなものにも、表と裏はあるものですわ。善があれば、悪が存在するのも必然。私はその裏側をビジネスにしたいと考えておりますの」"
translation = "「어떤 것이든 겉과 속은 있는 법이에요. 선이 있다면 악이 존재하는 것도 필연. 저는 그 뒷면을 비즈니스로 만들고 싶다고 생각하고 있어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様の星徒会は、言うなれば表側で、善の組織。しかし善であるが故に出来ない、綺麗事ではどうにもならないということは絶対に存在しますわ」"
translation = "「회장님의 성도회는 말하자면 앞면이고, 선의 조직. 하지만 선이기 때문에 할 수 없는, 겉치레만으로는 어떻게 할 수 없는 일은 반드시 존재합니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「そこで私が今回、裏側をサポートしたいという提案をしに来たというわけですの」"
translation = "「그래서 제가 이번에, 뒷면을 서포트하고 싶다는 제안을 하러 온 것이라는 말이죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私の美学は『悪即善』。お金とは幸せであり、悪とは儲かるもの。故に悪＝金＝善……つまりは、悪行も巡り巡れば善行になる、ということですわ」"
translation = "「저의 미학은 『악즉선』. 돈이란 행복이며, 악이란 돈이 되는 것. 고로 악=돈=선…… 즉, 악행도 돌고 돌면 선행이 된다는 것입니다.」"

[[dialogue]]
speaker = "unk"
original = "会ったばかりだから、簡単には頷けないな"
translation = "방금 만났으니까, 쉽게 고개를 끄덕일 수는 없겠네"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふっ、ご安心下さいな。私としても１回会っただけで信用頂けるとは思っておりませんので。営業とは繰り返し行って、信頼関係を築いて行くものですから」"
translation = "「후훗, 안심하세요. 저로서도 한 번 만난 것만으로 신용해주실 거라곤 생각하지 않으니까요. 영업이란 반복적으로 행하며 신뢰 관계를 쌓아가는 것이니까요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ですが……私の力が必要になる時は、必ず来ると確信しておりますわ。何せ世界には今、リクリエという綺麗事では済まない事態が迫りつつあるのですから」"
translation = "「하지만…… 제 힘이 필요해질 때는 반드시 올 거라고 확신하고 있어요. 어쨌든 세계에는 지금, 리크리에라는 겉치레만으로는 끝나지 않을 사태가 다가오고 있으니까요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「猫の手ならぬ、悪の手も借りたい状況……絶対にあるでしょう？」"
translation = "「고양이 손이라도 빌리고 싶은, 아니 악의 손이라도 빌리고 싶은 상황…… 반드시 있겠죠?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「お話し中のところ、失礼致しますわ」"
translation = "「이야기 중에 실례하겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "そう言って入ってきたのは流星学園の寮長である、<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネ先輩だった。"
translation = "그렇게 말하며 들어온 것은 유성학원의 기숙사장인, 센온지 힐디오네 선배였다."

[[dialogue]]
speaker = "セナリィ"
original = "「ちょっと！\u3000いきなり何ですの！？\u3000ビジネスの途中ですわよ！」"
translation = "「잠깐! 갑자기 뭐예요!? 비즈니스 도중이라니까요!」"

[[dialogue]]
speaker = "unk"
original = "どうしてここに？"
translation = "어떻게 여기에?"

[[dialogue]]
speaker = "unk"
original = "千園寺先輩……！"
translation = "센온지 선배……!"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「新星の会長様を次のお茶会へご招待にと参りましたの。そうしたら、何やら気に入らない内容が聞こえて来たものですから」"
translation = "「신성의 회장님을 다음 다과회에 초대하러 왔답니다. 그랬더니 왠지 마음에 들지 않는 내용이 들려와서 말이죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「千園寺……流星市国五名門の……！」"
translation = "「센온지…… 유성시국 오명문의……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「貴方のことは私も知っていましてよ、バンデット・セナリィ。幼い時から戦場で銃を手に取り、対峙したら星術は使わず逃げろとまで言われるゴシックファッションの傭兵」"
translation = "「당신에 대해서는 저도 알고 있어요, 밴디트 세나리. 어릴 때부터 전장에서 총을 들고, 대치하면 성술은 쓰지 말고 도망치라는 말까지 듣는 고딕 패션의 용병.」"

[[dialogue]]
speaker = "セナリィ"
original = "「光栄ですわ、千園寺ヒルディオーネ様。星力を持たぬうちから槍を振るい続け、固有の星術を得るに至った才能の超越者、星騎士の模範と呼ばれる貴方が、私に何の用ですの？」"
translation = "「영광이네요, 센온지 힐디오네 님. 성력을 갖기 전부터 창을 계속 휘둘러 고유한 성술을 얻기에 이른 재능의 초월자, 별의 기사의 모범이라 불리는 당신이 저에게 무슨 용건인가요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「単刀直入に申しましょう。私の同志たる会長に、下らない誘いはお止めなさいな。今の会長にとって、貴方の提案はまさに悪影響以外の何物でもありませんわ」"
translation = "「단도직입적으로 말하죠. 나의 동지인 회장에게 하찮은 유혹은 그만두세요. 지금의 회장에게 당신의 제안은 그야말로 악영향 이외의 아무것도 아니니까요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「そんなこと、貴方に言われる筋合いはありませんわ。第一、ビジネス中の横入りは無礼なのではなくて？」"
translation = "「그런 말, 당신에게 들을 이유는 없어요. 애초에 비즈니스 도중에 끼어드는 건 무례한 거 아닌가요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000あいにく私、悪行を良しとする人間に払う礼儀は持ち合わせていませんの」"
translation = "「오-홋홋홋! 안타깝게도 전 악행을 좋게 여기는 인간에게 베풀 예의는 가지고 있지 않답니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「価値観の相違ですわね。まあ、私としても世間知らずの令嬢に払う敬意はありませんので、どうしてもビジネスの邪魔をするというのなら戦闘で決着を――」"
translation = "「가치관의 차이군요. 뭐, 저로서도 세상 물정 모르는 영애에게 표할 경의는 없으니, 굳이 비즈니스를 방해하겠다면 전투로 결판을――」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いえ、お金が必要と言うのなら、わざわざ悪行などせずとも、私が貴方の会社に出資すればいいのですわ」"
translation = "「아니요, 돈이 필요하다고 한다면 굳이 악행 따위 하지 않아도 제가 당신의 회사에 출자하면 되는 일이에요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ホワイ！？」"
translation = "「와이!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「悪行はお金が儲かるからやるのであって、お金が儲かるのであれば悪行に固執する必要はない。違いますかしら？」"
translation = "「악행은 돈을 벌 수 있으니까 하는 것이지, 돈을 벌 수 있다면 악행에 고집할 필요는 없다. 틀렸나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふ……ふふふ……ふふふふふふ！\u3000その通りですわ、千園寺様！\u3000先程は大変失礼致しました。貴方は、私が想像していたよりもずっと聡明な方でいらっしゃいますわ！」"
translation = "「후후…… 후후후…… 후후후후후후! 그 말씀대로예요, 센온지 님! 방금 전엔 대단히 실례했습니다. 당신은 제가 상상했던 것보다 훨씬 현명한 분이시군요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふふっ、貴方の強さを真っ当に活かせそうで何よりですわ。それで、どの程度ご入用かしら？」"
translation = "「후훗, 당신의 강함을 올바르게 활용할 수 있을 것 같아 다행이네요. 그래서, 어느 정도 필요하신가요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ゴールデングースとは学園の外部組織とお見受けしましたが、従業員がどのくらい居らっしゃるのか、お聞かせ願えますこと？」"
translation = "「골든 구스는 학원 외부 조직으로 보이는데, 종업원이 어느 정도 있는지 들려주실 수 있나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「それは……いや、そう、３０人！\u3000およそ学園の１クラス分ですわ！」"
translation = "「그건…… 아니, 그래요, 30명! 대략 학원의 한 반 정도입니다!」"

[[dialogue]]
speaker = "unk"
original = "いや、まだ１人だけって……"
translation = "아니, 아직 혼자뿐이라고……"

[[dialogue]]
speaker = "セナリィ"
original = "「ちょっ……会長様！\u3000余計なことを……！\u3000ビジネスの邪魔をするんじゃねぇですわ！」"
translation = "「잠깐…… 회장님! 쓸데없는 소리를……! 비즈니스 방해하지 말란 말이야요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000さすが会長、正直者でいらっしゃいますわね！」"
translation = "「오-홋홋홋! 역시 회장, 정직하시군요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「バンデット・セナリィ。貴方が見栄を張ったことに対して責める気はございませんし、出資に見合う実力を備えていることは、経歴からも信用出来ますわ」"
translation = "「밴디트 세나리. 당신이 허세를 부린 것에 대해 책망할 생각은 없고, 출자에 걸맞은 실력을 갖추고 있다는 것은 경력으로도 신용할 수 있어요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「しかし他に社員が居ない以上、取締役としての貴方の人望が見えないことも事実。まずは貴方が自信を持って口に出来る人数を揃えてから、私のところへ来なさいな」"
translation = "「하지만 다른 사원이 없는 이상, 이사로서 당신의 인망이 보이지 않는 것도 사실. 우선은 당신이 자신 있게 입에 담을 수 있는 인원을 갖춘 뒤에 저에게 오세요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「期待していますわよ、傭兵さん？」"
translation = "「기대하고 있겠어요, 용병 씨?」"

[[dialogue]]
speaker = "セナリィ"
original = "「くそっ、大金ゲットのチャンスを逃しましたわ～～～っ！\u3000これも会長様が余計な茶々を入れるから……！」"
translation = "「젠장, 거금 획득의 기회를 놓쳤어요～～～! 이것도 회장님이 쓸데없는 참견을 해서……!」"

[[dialogue]]
speaker = "unk"
original = "信用を築くものだって言ってたよね？"
translation = "신뢰를 쌓는 것이라고 말했었지?"

[[dialogue]]
speaker = "unk"
original = "でも、営業は繰り返し行って"
translation = "하지만 영업은 반복적으로 행하며"

[[dialogue]]
speaker = "セナリィ"
original = "「それは……ええ、確かに自分でそう言いましたわね……ふぅ……。恥ずかしいところを見せてしまいましたわ。でも……」"
translation = "「그건…… 네, 확실히 제 입으로 그렇게 말했었죠…… 후우……. 부끄러운 모습을 보여버렸네요. 하지만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様にはもうちょっと、大金の価値を分かって貰いたいですわ」"
translation = "「회장님은 좀 더 거금의 가치를 알아주셨으면 좋겠어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「むーっ……」"
translation = "「무-……」"

[[dialogue]]
speaker = "unk"
original = "拗ねたように剥れてみせるセナリィを見て、意外と可愛げのある子なのかもしれない、と思うのであった。"
translation = "삐친 듯이 부루퉁해 보이는 세나리를 보며, 의외로 귀여운 구석이 있는 아이일지도 모르겠다고 생각하는 것이었다."

