[[dialogue]]
speaker = "unk"
original = "第９話,ＶＳ星喰らいシャドウ・魔神ギエル戦闘前,B"
translation = "제9화, VS 별을 먹는 자 섀도 마신 기엘 전투 전, B"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「アルタイルから乗り込んできた星騎士たちの侵攻を、許している──？」"
translation = "「알타이르에서 쳐들어온 성기사들의 침공을 허용하고 있다고──?」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ…………ギギギ、ギ…………」"
translation = "「기…………기기기, 기…………」"

[[dialogue]]
speaker = "unk"
original = "──コノママデハ、地球ヲ喰ラウコトガデキナイ！"
translation = "──이대로는 지구를 집어삼킬 수 없다!"

[[dialogue]]
speaker = "unk"
original = "──何トシテモ勝テ。コレ以上の失態は許サレナイ！！"
translation = "──어떻게 해서든 이겨라. 이 이상의 실태는 용납하지 않겠다!!"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "（フン……他の拠点の者たちの、不甲斐ないことといったら……主の足を引っ張るなど、神の従僕としての誇りはないのか？）"
translation = "（흥…… 다른 거점 녀석들이 한심하게시리……. 주인의 발목을 잡다니, 신의 종복으로서의 자부심은 없는 건가?）"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「お任せください……我が主。私にとってもこれは雪辱の機会。再び主に目をかけられ、現世へと返り咲くことができたのです……！」"
translation = "「맡겨 주십시오…… 나의 주인이여. 저에게도 이것은 설욕의 기회. 다시금 주인의 눈에 들어 현세로 복귀할 수 있었습니다……!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「真なる神の側近として、この魔神ギエル──十二分の働きをお約束いたしましょう……！」"
translation = "「진정한 신의 측근으로서 이 마신 기엘── 충분한 활약을 약속드리지요……!」"

[[dialogue]]
speaker = "unk"
original = "この魔神は、かつてアルタイルの塔の頂上で、緋宮クロトに敗れた個体の精巧なレプリカである。"
translation = "이 마신은 과거 알타이르의 탑 꼭대기에서 히노미야 쿠로토에게 패배했던 개체의 정교한 레플리카이다."

[[dialogue]]
speaker = "unk"
original = "記憶、経験、そして星騎士と世界に対する憎しみ。その全てを忠実に再現した上で、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から強大な霊力を賜っていた。"
translation = ""

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「あの魔王さえいなければ、所詮は雑魚の集まり。蹴散らしてごらんにいれましょう……！」"
translation = "「그 마왕만 없다면 결국엔 잔챙이들의 모임. 걷어차서 쫓아 버려 드리지요……!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギュゥウウ…………ガガガァ…………！！」"
translation = "「규우우…………가가가아…………!!」"

[[dialogue]]
speaker = "unk"
original = "──魔神ギエル、オ前ヲ更ナル超越者ヘト導コウ。"
translation = "──마신 기엘, 너를 더욱 뛰어난 초월자로 인도하겠다."

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「おぉおおっ！？\u3000力を……さらに与えてくださるとは！？」"
translation = "「오오오옷!? 힘을…… 더 주신단 말입니까!?」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "（主は私に期待なされている！\u3000何という栄誉か！）"
translation = "（주인께서 내게 기대를 하고 계신다! 이 얼마나 영광인가!）"

[[dialogue]]
speaker = "unk"
original = "──奴ラガ来ル！"
translation = "──놈들이 온다!"

[[dialogue]]
speaker = "unk"
original = "──見タ目コソ珍妙ダガ、奴ラハ強イ……！！"
translation = "──겉모습은 기묘하지만, 놈들은 강하다……!!"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「……珍妙？」"
translation = "「……기묘?」"

[[dialogue]]
speaker = "unk"
original = "創造神からの的を得ない忠告に、魔神が首を傾げたその時──"
translation = "창조신으로부터 갈피를 잡을 수 없는 충고를 듣고 마신이 고개를 갸웃거린 그때──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「待たせたのう、魔神ギエルとやら！！」"
translation = "「오래 기다렸구나, 마신 기엘인지 뭔지 하는 놈아!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「これ以上、ベガの地球を傷つけるのは許しませんよ！\u3000マジカル晴れ着でお相手します！！」"
translation = "「이 이상 베가의 지구를 상처 입히는 건 용납 못 해요! 매지컬 나들이옷으로 상대해 드리죠!!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「…………ぬぅ！？」"
translation = "「…………누우!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「みんな気を付けて！\u3000フィヴォス流星群の時より、この個体は強力になってる……油断しちゃダメだからね！」"
translation = "「다들 조심해! 피보스 유성군 때보다 이 개체는 강력해졌어…… 방심하면 안 되니까!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「敵の攻撃は私の空間魔法でずらしてみせるわ──安心してちょうだい！」"
translation = "「적의 공격은 내 공간 마법으로 빗겨내 주겠어── 안심하렴!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「…………な────なん、だ────！？」"
translation = "「…………무────뭐, 냐────!?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふはははは！\u3000見よ、あやつの顔を！\u3000余たちの戦力に恐れをなしておるようだのう！！」"
translation = "「푸하하하하! 보아라, 저놈의 얼굴을! 우리의 전력에 겁을 집어먹은 모양이로구나!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「単純に混乱しているだけだと思いますが……私が敵の立場でも同じリアクションをしたと思います……」"
translation = "「단순히 혼란스러워할 뿐이라고 생각합니다만…… 제가 적의 입장이었어도 똑같은 리액션을 했을 것 같네요……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふふん！\u3000敵が浮足立っているのなら僥倖というものよ！\u3000余は先刻から、魔力がうずいて仕方がないぞ！」"
translation = "「후흥! 적이 당황하고 있다면 요행인 법이지! 나는 아까부터 마력이 근질거려서 참을 수가 없구나!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「クラウディア。張り切っているのは結構ですが、力に溺れて油断してはいけませんよ？」"
translation = "「클라우디아. 의욕이 넘치는 건 좋지만, 힘에 취해 방심해서는 안 돼요?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「わかっておるとも！\u3000先代との貴重な共闘だ──今代の光の魔女の実力、とくと見てもらおうではないか！」"
translation = "「알고 있다마다! 선대와의 귀중한 공투다── 현대 빛의 마녀의 실력, 똑똑히 보게 해주지 않겠나!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ええ。私も、できうる限りのサポートをさせていただきましょう！」"
translation = "「네. 저도 할 수 있는 한 서포트하도록 하죠!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──というわけで魔神よ！\u3000メリークラウディアバースデーだ！」"
translation = "「──그런 이유로 마신이여! 메리 클라우디아 버스데이다!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「今日はクラウディア様のお誕生日じゃありませんけどー……？」"
translation = "「오늘은 클라우디아 님의 생일이 아닙니다만……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「細かいことを言うな！\u3000せっかく幹内世界からクリスマスフォームを取り寄せたのだ！」"
translation = "「세세한 건 신경 쓰지 마라! 어렵사리 간내 세계에서 크리스마스 폼을 들여온 것이다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「よって今日は臨時で、余の誕生日ということにする！\u3000あとでプレゼントを準備するのだ、皆の者！」"
translation = "「따라서 오늘은 임시로 나의 생일로 하겠다! 나중에 선물을 준비하도록 해라, 제군들!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あぁ、もう滅茶苦茶です……！」"
translation = "「아아, 정말 엉망진창이에요……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔神よ！\u3000クリスマスはサンタがメインのイベントではないぞ！\u3000余の誕生日──いや！」"
translation = "「마신이여! 크리스마스는 산타가 메인인 이벤트가 아니다! 나의 생일── 아니!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「クリスマスは余と先代の誕生日である──それを覚えた上で逝くがよい！！」"
translation = "「크리스마스는 나와 선대의 생일이다── 그것을 기억한 채로 가거라!!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あれ、私も……？」"
translation = "「어라, 저도……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「当然だ、余だけ祝っては先代に申し訳が立たんであろう！\u3000ふははははっ！」"
translation = "「당연하지, 나만 축하받아서는 선대에게 면목이 없지 않겠나! 푸하하하하!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「まあ。お気遣いありがとうございます、クラウディア」"
translation = "「어머나. 신경 써주셔서 감사해요, 클라우디아.」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「な、何を話しているのです……この魔女たちは！？」"
translation = "「무, 무슨 소리를 하는 겁니까…… 이 마녀들은!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーっし！\u3000ネビュラのみんなに負けてられないわ！\u3000美鶴、新星学園の強さを見せつけるわよー！」"
translation = "「조오아! 네뷸라 식구들에게 질 수 없지! 미츠루, 신성학원의 강함을 보여주자고!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ほーい。ま、適度に頑張りまーす。ふれ、ふれー。お嬢様～……っと」"
translation = "「호오이. 뭐, 적당히 힘낼게요~. 힘내라, 힘내라. 아가씨~…… 하고.」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「こいつらもおかしい！？\u3000世界の支配者を決める戦いを、何だと思っている……！？」"
translation = "「이 녀석들도 이상해!? 세계의 지배자를 결정하는 싸움을 뭐라고 생각하는 거냐……!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あは♪\u3000一度は世界を滅ぼしかけた魔神だ～って聞いてたのに。これしきのことで動揺するだなんて。ずいぶんと小物みたいだね～♪」"
translation = "「아하♪ 한때 세계를 멸망시킬 뻔했던 마신이라~고 들었는데. 이 정도 일로 동요하다니, 꽤나 속이 좁은 모양이네~♪」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「何ッ……！？\u3000聞き捨てならない──誰だ、貴様は！！」"
translation = "「뭐랏……!? 그냥 넘길 수 없는 소리군── 누구냐, 네놈은!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「こんにちは～♪\u3000私は頽廃都市キュリオスの皇帝、煌嶺だよ～♪」"
translation = "「안녕~♪ 나는 퇴폐도시 큐리오스의 황제, 코우레이라고 해~♪」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「それでこっちの子は、同郷の星騎士。メイプルちゃん～♪」"
translation = "「그리고 이쪽 애는 같은 고향 성기사인 메이플짱~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あ……はい。ど、どうも……」"
translation = "「아…… 네. 저, 저기…… 안녕하세요……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あれあれ？\u3000どーしてそんなにビクビクしてるのかなあ♪\u3000一緒に戦う仲間なんだから、シャンとしてくれないと～♪」"
translation = "「어라어라? 어째서 그렇게 벌벌 떨고 있을까나♪ 같이 싸우는 동료니까 정신 좀 차려주지 않으면~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "（お兄ちゃんっ！？\u3000どーしてあたしが煌嶺様とチームなの！？\u3000めちゃくちゃ怖いんだけどっ！？）"
translation = "（오빠!? 어째서 내가 코우레이 님과 팀인 거야!? 엄청나게 무서운데!?）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっとメイプル！\u3000そんなんじゃダメよ、これからギエルとバトルするんだから、ガツンと気合入れないと！」"
translation = "「잠깐 메이플! 그러면 안 돼, 이제부터 기엘이랑 배틀할 거니까 팍팍 기합 넣어야지!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなた、前に格好良くタンカ切ってたじゃない！\u3000『煌嶺は魔界に引きこもってる臆病者だから、私が魔王になって活を入れてやるんだ』、だっけ？」"
translation = "「당신, 예전에 멋지게 큰소리쳤잖아! 『코우레이는 마계에 틀어박혀 있는 겁쟁이니까, 내가 마왕이 되어서 정신을 차리게 해주겠어』라고 했던가?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「女神様に誓って、絶対そこまで言ってないよ！？」"
translation = "「여신님께 맹세코, 절대로 그렇게까지 말 안 했거든요!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「へぇ～～～～～♪\u3000なになに？\u3000メイプルちゃん、思ってたより凄いこと言うんだね？\u3000ちょっと見直しちゃったぁ♪」"
translation = "「헤에~~~~~♪ 뭐야 뭐야? 메이플짱, 생각했던 것보다 대단한 말을 하네? 조금 다시 보게 됐는걸♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「言ってません！！！\u3000見直さないでくださいっ！！」"
translation = "「안 했습니다!!! 다시 보지 마세요!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「でもメイプルちゃんは、魔王になりたいんでしょう？\u3000それも嘘だったってこと？」"
translation = "「하지만 메이플짱은 마왕이 되고 싶은 거지? 그것도 거짓말이었다는 거야?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「その夢だけは嘘じゃないです！！！\u3000譲れないです！！\u3000殺さないでください！！！」"
translation = "「그 꿈만큼은 거짓말이 아니에요!!! 양보할 수 없어요!! 죽이지 마세요!!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「メイプルちゃんは、本当に可愛いね～♪\u3000今目の前に、魔王の血統の、現役の皇帝がいるのに～♪\u3000それでも魔王になりたいんだ～？」"
translation = "「메이플짱은 정말 귀엽네~♪ 지금 눈앞에 마왕의 혈통인 현역 황제가 있는데도~♪ 그런데도 마왕이 되고 싶구나~?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「アッ、アッ……アッ……」"
translation = "「앗, 앗…… 앗……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「メイプルちゃんのかっこいい啖呵、私も聞いてみたいな～♪\u3000ほらほら～、さん、はい♪」"
translation = "「메이플짱의 멋진 일갈, 나도 들어보고 싶네~♪ 자자~, 셋, 넷♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こらーっ！\u3000それ以上は先生として見過ごせないよっ！\u3000メイプルちゃんをいじめちゃダメなんだからっ！」"
translation = "「이놈—! 그 이상은 선생님으로서 묵과할 수 없어! 메이플짱을 괴롭히면 안 된다니까!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「え～♪\u3000いじめるだなんて人聞きが悪いな～♪\u3000仲良くお喋りしてただけなのに～♪」"
translation = "「에~♪ 괴롭힌다니 말이 심하네~♪ 사이좋게 이야기하고 있었을 뿐인데~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「トワちゃん、トワちゃんっ！！\u3000トワちゃ～～～んっ！！！\u3000うわぁぁぁ～～～～～んっ」"
translation = "「토와짱, 토와짱!! 토와쨔~~~앙!!! 으아아아~~~~~앙」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ク……ククク…………！！！」"
translation = "「크…… 크크크…………!!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ、あれれ？\u3000もしかしなくても魔神さん、怒っちゃってません……？」"
translation = "「아, 어라라? 설마가 아니라 마신 씨, 화나버린 거 아니에요……?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「無理もないですよっ！\u3000こんな格好の敵が現れて、目の前で一生雑談してたら、神経逆撫でに決まってます！！」"
translation = "「그럴 만도 해요! 이런 꼴의 적이 나타나서 눈앞에서 한참 동안 잡담이나 하고 있으면, 신경이 곤두서는 게 당연하죠!!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「情けない……いくら星力が強化されているからといって、こんな奴らに敗北しているなどと……」"
translation = "「한심하군…… 아무리 성력이 강화되었다고는 하나, 이런 녀석들에게 패배하고 있다니……」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「おふざけの同窓会はそこまでです！\u3000パワーアップした魔神の力で、貴様らを地獄に送ってやる！！」"
translation = "「장난스러운 동창회는 거기까지다! 파워업한 마신의 힘으로 네놈들을 지옥으로 보내주마!!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「みんな、来るわよ──構えて！！」"
translation = "「모두, 온다── 준비해!!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ゆくぞ、死にぞこないの魔神よ！\u3000唸れ、ホーリー・ベル！！」"
translation = "「간다, 죽다 남은 마신이여! 울려라, 홀리 벨!!」"

