[[dialogue]]
speaker = "unk"
original = "第２話,カフェテリアで勉強,P"
translation = "제2화, 카페테리아에서 공부, P"

[[dialogue]]
speaker = "エスメラルダ"
original = "「この間はごめんね。私ってばデータを取ることにばっかり夢中になっちゃって……」"
translation = "「지난번엔 미안해. 내가 데이터 따는 데만 너무 정신이 팔려서……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「昔からこうなの……数字が絡むとつい周りが見えなくなっちゃうっていうか。同僚の先生方からもいっぱい叱られちゃったし……」"
translation = "「옛날부터 이랬어…… 숫자가 얽히면 나도 모르게 주변이 안 보인다고 할까. 동료 선생님들한테도 잔뜩 혼났고……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「でも本当に、お勉強を教えるだなんてことで良かったの？\u3000お詫びなんだからもっと色々お願いしてくれても良かったのに」"
translation = "「하지만 정말 공부를 가르쳐 주는 것 정도로 괜찮았어? 사과하는 거니까 좀 더 여러 가지 부탁해도 좋았을 텐데.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「でも頼ってくれたのなら応えないとね。よーし、先生に任せて！\u3000数学なら何でも教えてあげちゃうから！」"
translation = "「그래도 의지해 줬으니 응답해야지. 좋아, 선생님한테 맡겨! 수학이라면 뭐든 가르쳐 줄 테니까!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ふむふむ……新星はこのあたりまで進んでいるのね。流星学園よりも進行が速いかも」"
translation = "「흠흠…… 신성은 이 근처까지 진도가 나갔구나. 유성 학원보다 진행이 빠를지도.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あ、そこ。ケアレスミスしてるわよ」"
translation = "「아, 거기. 실수했어.」"

[[dialogue]]
speaker = "unk"
original = "（すごく距離が近い……密着しそう……）"
translation = "(거리가 너무 가까워…… 밀착될 것 같아……)"

[[dialogue]]
speaker = "エスメラルダ"
original = "「──うん。オッケー。飲み込みがいいわね。ちゃんと復習もしてるみたいだし」"
translation = "「──응. 오케이. 이해가 빠르네. 복습도 제대로 하고 있는 것 같고.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「このまま隣で見てるから、どんどん解いていこっか♪」"
translation = "「이대로 옆에서 지켜볼 테니까 계속 풀어보자♪」"

[[dialogue]]
speaker = "unk"
original = "（ちゃんと集中しないと……！）"
translation = "(제대로 집중해야 해……!)"

[[dialogue]]
speaker = "エスメラルダ"
original = "「うん、この辺りがいい区切りかも。休憩しましょう」"
translation = "「응, 이쯤이 적당한 구분점이겠네. 휴식하자.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「集中力は持って３０分。それ以上は非効率だからね」"
translation = "「집중력은 길어야 30분. 그 이상은 비효율적이니까.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「短時間の集中と、疲労を感じる前のこまめな休憩。これを繰り返すことが一番効率的なのよ」"
translation = "「단시간의 집중과 피로를 느끼기 전의 잦은 휴식. 이걸 반복하는 게 가장 효율적이야.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「喉が渇いたでしょ？\u3000先生がコーヒー買ってきてあげる。待っててね！」"
translation = "「목마르지? 선생님이 커피 사 올게. 기다려!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「こんにちは～、会長くん」"
translation = "「안녕, 회장군.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「さっきエスメラルダ先輩が見えたんだけど……飲み物を買いに行った？\u3000１人で？」"
translation = "「방금 에스메랄다 선배가 보였는데…… 음료수 사러 갔어? 혼자서?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ～……それなら財布を用意しておくといいかも」"
translation = "「아～…… 그렇다면 지갑을 준비해 두는 게 좋을지도 몰라.」"

[[dialogue]]
speaker = "unk"
original = "どういうことですか？"
translation = "무슨 말씀이세요?"

[[dialogue]]
speaker = "ウィステリア"
original = "「すぐにわかるわよ……あ、戻ってきたわ」"
translation = "「곧 알게 될 거야…… 아, 돌아왔네.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「うっかりしちゃってた。お財布にお金、ぜんぜん入ってなかったわ～」"
translation = "「깜빡했다. 지갑에 돈이 전혀 안 들어 있었어～」"

[[dialogue]]
speaker = "ウィステリア"
original = "「──やっぱり」"
translation = "「──역시나.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はい、コーヒー。ミルクと砂糖もあるわよ」"
translation = "「네, 커피. 우유랑 설탕도 있어.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「あらら。教え子にごちそうできなかった上に、後輩にフォローまでされちゃったわ」"
translation = "「어라라. 제자에게 대접하지 못한 데다, 후배에게 도움까지 받아 버렸네.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「先輩の天然は今に始まったことじゃないですから」"
translation = "「선배의 천연스러움은 어제오늘 일이 아니니까요.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「私、そんなに天然かしら？」"
translation = "「나, 그렇게 천연스러워?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そんなにです」"
translation = "「그렇고말고요.」"

[[dialogue]]
speaker = "unk"
original = "２人はどういう関係なんですか？"
translation = "두 사람은 어떤 관계인가요?"

[[dialogue]]
speaker = "ウィステリア"
original = "「流星学園の同窓生ってやつ。先輩は２学年上のクラスだったけど、なんだかんだ仲良くしてたわね」"
translation = "「유성 학원의 동창생이라는 거지. 선배는 2학년 위인 클래스였지만, 이런저런 일로 사이좋게 지냈어.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「そうそう。キリカとウィステリアと３人で、仲良かったわよね～」"
translation = "「맞아 맞아. 키리카랑 위스테리아랑 셋이서 사이좋았지～」"

[[dialogue]]
speaker = "ウィステリア"
original = "「誤解です。私とキリカは仲良くないですから」"
translation = "「오해입니다. 저랑 키리카는 사이 안 좋으니까요.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「え～？\u3000いっつも２人でお喋りしてたじゃないの」"
translation = "「에～? 언제나 둘이서 수다 떨었으면서.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あれが仲良く見えたのはエスメラルダ先輩だけです」"
translation = "「그게 사이좋게 보인 건 에스메랄다 선배뿐이에요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「エスメラルダ先輩は少し感受性がユニークというか、ずれてるというか……そのせいでびっくりするような失敗することもあるけど」"
translation = "「에스메랄다 선배는 조금 감수성이 유니크하달까, 어긋나 있달까…… 그 탓에 깜짝 놀랄 만한 실수를 할 때도 있지만.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「分析官としてはとても優秀よ。頼りにしていいんじゃないかしら」"
translation = "「분석관으로서는 매우 우수해. 의지해도 좋지 않을까 싶어.」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「ふふふ、ウィステリアに褒められちゃった♪」"
translation = "「후후후, 위스테리아한테 칭찬받았다♪」"

[[dialogue]]
speaker = "unk"
original = "（今のは褒めてないと思う）"
translation = "(방금 건 칭찬이 아니라고 생각해)"

[[dialogue]]
speaker = "ウィステリア"
original = "「先輩の抜け方は本当にひどくて、財布を忘れるとか、お金が財布に入っていないとかしょっちゅうだし」"
translation = "「선배의 덜렁거림은 정말 심해서, 지갑을 잊어버린다거나, 돈이 지갑에 안 들어 있다거나 하는 건 예사고.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「しかも研究してるとそればっかりになるのよね。ブラを付け忘れてたことも１度や２度じゃないし……」"
translation = "「게다가 연구하고 있으면 그것만 보게 되거든. 브래지어를 차는 걸 깜빡한 것도 한두 번이 아니고……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「もう、ウィステリアってばー。ブラを忘れるなんて私でもしない──」"
translation = "「정말, 위스테리아도 참. 브래지어를 잊다니 나라도 그러진──」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「……あれっ！？\u3000着けてないっ！？」"
translation = "「……어라!? 안 찼어!?」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「そういえば、研究室に置いてきたような……」"
translation = "「그러고 보니, 연구실에 두고 온 것 같은……」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「急いで取ってくるわねー、あははははー」"
translation = "「얼른 가져올게～, 아하하하하～」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ。エスメラルダ先輩は相変わらずね……」"
translation = "「하아. 에스메랄다 선배는 여전하네……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くんは先輩と仲が良いみたいね。学校は違うけど、余裕がある時はフォローしてあげて」"
translation = "「회장군은 선배랑 사이가 좋은 모양이네. 학교는 다르지만, 여유가 있을 때는 좀 챙겨 줘.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「しっかりしているのか抜けているのかわからないというか、両方なのがエスメラルダ先輩だから」"
translation = "「똑 부러지는 건지 나사가 빠진 건지 모르겠달까, 양쪽 다인 게 에스메랄다 선배니까.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「後輩としては心配になっちゃうのよ。だからよろしくね、会長くん」"
translation = "「후배로서는 걱정이 돼서 말이야. 그러니까 잘 부탁해, 회장군.」"

