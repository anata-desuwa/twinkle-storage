[[dialogue]]
speaker = "unk"
original = "気がつくと──そこは九浄家のカジノではなかった。"
translation = "정신을 차려보니── 그곳은 쿠죠 가문의 카지노가 아니었다."

[[dialogue]]
speaker = "unk"
original = "ここは一体……！？"
translation = "여기는 대체……!?"

[[dialogue]]
speaker = "unk"
original = "かつて九浄家のカジノに出没したトランプモンスターが、カジノ中のいたるところで忙しなく働いている。"
translation = "일전에 쿠죠 가문의 카지노에 출몰했던 트럼프 몬스터가 카지노 곳곳에서 바쁘게 일하고 있다."

[[dialogue]]
speaker = "unk"
original = "モンスターの近くには、可憐なバニー服に身を纏った女性が何人も──というか、モンスター以外はバニーガールしかいない……？"
translation = "몬스터 근처에는 가련한 바니복을 몸에 걸친 여성이 여러 명── 아니, 몬스터 이외에는 바니걸밖에 없다……?"

[[dialogue]]
speaker = "unk"
original = "幸いモンスターたちに今のところ敵意は見られない。ドル箱やチップを運んで、バニーガールたちと共にゲームに興じている様子だが──"
translation = "다행히 몬스터들에게 지금 당장 적의는 보이지 않는다. 돈 상자나 칩을 운반하며 바니걸들과 함께 게임을 즐기는 모습이지만──"

[[dialogue]]
speaker = "unk"
original = "こうしてはいられない。みんなを探さないと！"
translation = "이러고 있을 때가 아니다. 모두를 찾아야 해!"

[[dialogue]]
speaker = "unk"
original = "大勢のバニーとトランプモンスターでごった返す謎のカジノを走り回っていると──"
translation = "수많은 바니와 트럼프 몬스터로 북적거리는 수수께끼의 카지노를 달려 다니던 중──"

[[dialogue]]
speaker = "unk"
original = "マイン──！？"
translation = "마인──!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "unk"
original = "でも無事でよかった！"
translation = "그래도 무사해서 다행이야!"

[[dialogue]]
speaker = "unk"
original = "一体その恰好は……！？"
translation = "도대체 그 모습은……!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「えっ……まさか……会長……？」"
translation = "「엣…… 설마…… 회장……?」"

[[dialogue]]
speaker = "unk"
original = "他の２人は！？"
translation = "다른 두 사람은!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「えっと……２人なら会長を探しに行って──あ、戻ってきたっ」"
translation = "「저기…… 두 사람이라면 회장을 찾으러 가서── 아, 돌아왔다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「マイン、だめですわ。会長様はどこにも……」"
translation = "「마인, 안 돼요. 회장님은 어디에도……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──ってぇ！？\u3000会長様！？」"
translation = "「──태!? 회장님!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「こちらにも見当たりませんわ……」"
translation = "「이쪽에도 보이지 않아요……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──ですわっ！？\u3000ひひひ、緋宮会長ですのっ！？」"
translation = "「──랍니다데스왓!? 히, 히히, 히노미야 회장님이신가요!?」"

[[dialogue]]
speaker = "unk"
original = "みんな無事だったのはいいんだけど──！"
translation = "다들 무사한 건 좋은데──!"

[[dialogue]]
speaker = "unk"
original = "どうしたんだ、その恰好！？"
translation = "어떻게 된 거야, 그 모습!?"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「どうしたんだと言われましても、気がついたらいつの間にかこの姿で──というか！」"
translation = "「어떻게 된 거냐고 물으셔도, 정신을 차려보니 어느새 이 모습이라── 그보다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あの……<b>貴女</b>は、緋宮会長……なのですか？\u3000確かに面影はありますが……」"
translation = "「저기…… <b>당신</b>은, 히노미야 회장…… 인가요? 분명 면모는 남아 있습니다만……」"

[[dialogue]]
speaker = "unk"
original = "みんなの様子がおかしい。俺のことをじろじろと見てくる。何だろうと思って自分の体を見ると──"
translation = "다들 상태가 이상하다. 나를 빤히 쳐다본다. 이상해서 내 몸을 살펴보니──"

[[dialogue]]
speaker = "unk"
original = "おまけにバニー服を着てるー！？"
translation = "게다가 바니복을 입고 있어──!?"

[[dialogue]]
speaker = "unk"
original = "俺、女の子になって……！？"
translation = "나, 여자가 되어서……!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「い、意味不明なんだけどっ……ふ、ふふっ！\u3000会長、めっちゃ可愛い女の子になってる……あはははっ！」"
translation = "「의, 의미불명인데…… 후, 후훗! 회장, 엄청 귀여운 여자가 되어버렸어…… 아하하핫!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「笑ってる場合じゃねぇですわよマイン！？\u3000異常事態にもほどがありますわ！？」"
translation = "「웃고 있을 때가 아니예요 마인!? 이상 사태도 정도가 있어요!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「敵の攻撃、なのでしょうか……？\u3000この場所もアステラのような気配がいたしますが──えぇえ……？」"
translation = "「적의 공격, 인 걸까요……? 이곳도 아스텔라 같은 기운이 느껴집니다만── 에에에……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「女性にこのような、はしたない服を着させて、緋宮会長を女性に変身させる……その目的は一体……？」"
translation = "「여성에게 이런 조잡한 옷을 입히고, 히노미야 회장을 여성으로 변신시키다니…… 그 목적은 대체……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「精神攻撃、ですの？\u3000……全く意味が分かりませんわ！」"
translation = "「정신 공격, 인가요? ……도무지 의미를 모르겠어요!」"

[[dialogue]]
speaker = "unk"
original = "先輩、落ち着いてください！（ゆさゆさ）"
translation = "선배, 진정하세요! (흔들흔들)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──ぶっふぅ！\u3000おやめくださいませ、緋宮会長っ！\u3000大きな胸を揺らしながら、にじり寄らないでほしいですわ！？」"
translation = "「──붑후! 그만두세요, 히노미야 회장! 커다란 가슴을 출렁거리면서 다가오지 말아줬으면 해요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～あ。千園寺先輩まで笑い出しちゃった。でも気持ちはわかるな～」"
translation = "「아~아. 치온지 선배까지 웃기 시작했네. 하지만 기분은 이해가 가~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「普段の会長とバニーガールになっちゃった会長を重ねちゃって。ギャップでつい──ぷぷぷっ♪」"
translation = "「평소의 회장이랑 바니걸이 되어버린 회장을 겹쳐 보게 되니까. 갭 차이 때문에 그만── 푸푸풋♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「２人とも、呑気すぎますわ！\u3000ここは敵の巣！\u3000いつ攻撃が来るかわからないんですわよ！？」"
translation = "「둘 다 너무 태평해요! 여기는 적의 소굴! 언제 공격이 올지 모른단 말이예요!?」"

[[dialogue]]
speaker = "？？？"
original = "「フフフ、盛り上がっていらっしゃるようですね！」"
translation = "「후후후, 분위기가 무르익은 모양이군요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「貴方は──先ほどの怪しい男！？」"
translation = "「당신은── 아까 그 수상한 남자!?」"

[[dialogue]]
speaker = "？？？"
original = "「嗚呼──とてもお似合いです！\u3000私の可愛い子ウサギたち！」"
translation = "「아아── 아주 잘 어울립니다! 나의 귀여운 아기 토끼들!」"

[[dialogue]]
speaker = "？？？"
original = "「髪の色に合わせてバニーガールの色味も完璧！\u3000見て楽しい、喋って嬉しい！\u3000そんなバニーをイメージしましたが、私の見立てに間違いはなかった！」"
translation = "「머리색에 맞춰 바니걸의 색감도 완벽! 보고 즐겁고, 대화하니 기쁘고! 그런 바니를 이미지화했습니다만, 제 안목에 틀림은 없었군요!」"

[[dialogue]]
speaker = "？？？"
original = "「淑女の３名もお美しいですが……ヌフフフ！\u3000新星の星徒会長、あなたの美しさは想像以上だ！」"
translation = "「숙녀 세 분도 아름답지만…… 누후후후! 신성의 성도회장, 당신의 아름다움은 상상 이상이다!」"

[[dialogue]]
speaker = "？？？"
original = "「貴方を一目見た時から、絶対に女体化が似合うと！\u3000いつかバニー衣装を着させてみたいと……ずっとずっと思っていたのですよ！」"
translation = "「당신을 처음 본 순간부터 절대로 여체화가 어울릴 거라고! 언젠가 바니 의상을 입혀보고 싶다고…… 계속 계속 생각하고 있었거든요!」"

[[dialogue]]
speaker = "unk"
original = "これ、お前の趣味なのか！？"
translation = "이거, 네 취향인 거냐!?"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ヘ──ヘンタイですわ～～～っ！？」"
translation = "「벼── 변태예요~~~!?」"

