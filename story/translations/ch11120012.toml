[[dialogue]]
speaker = "unk"
original = "第２話,チナは未来人,P"
translation = "제2화, 치나는 미래인, P"

[[dialogue]]
speaker = "unk"
original = "チナと共闘することになったとはいえ、アルタイルを滅ぼそうとした極星星徒会の星騎士を完全に自由にさせておくことはできない。"
translation = "치나와 공투하게 되었다고는 하지만, 알타이르를 멸망시키려 했던 극성 성도회의 성기사를 완전히 자유롭게 둘 수는 없다."

[[dialogue]]
speaker = "unk"
original = "そのため会議室を簡易的な独房にして、いつでも監視できる体制をとっていた。"
translation = "그 때문에 회의실을 간이 독방으로 만들어, 언제든지 감시할 수 있는 체제를 갖추고 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なんだ、また見に来たのか、魔王」"
translation = "「뭐냐, 또 보러 왔나, 마왕」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「別に心配しなくても生きてるっての。ハムスターじゃねーんだから」"
translation = "「별로 걱정 안 해도 살아 있다니까. 햄스터도 아니고」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ん？\u3000なんだ？」"
translation = "「응? 뭐야?」"

[[dialogue]]
speaker = "unk"
original = "（小さくて素早いからハムスターっぽいかも）"
translation = "（작고 재빠르니까 햄스터 같을지도）"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「じっと見てどうした？\u3000変なヤツだな」"
translation = "「가만히 보고선 왜 그래? 이상한 녀석이네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「自由に出歩けないだろうし、暇潰し用にゲーム機を持ってきたよ。といっても、うちで使わなくなったちょっと古いのだけど──」"
translation = "「자유롭게 돌아다닐 수 없을 테니, 시간 때우기용으로 게임기를 가져왔어. 그렇다고 해도, 우리 집에서 안 쓰게 된 좀 오래된 거지만──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「すげー！\u3000激レアレトロゲームじゃん！」"
translation = "「대박! 완전 레어한 레트로 게임이잖아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「レトロゲーム！？」"
translation = "「레트로 게임!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやちょっと待って！\u3000そこまで古くないよ！\u3000発売されたのだって４～５年前だし、全然レトロじゃないよ！」"
translation = "「아니 잠깐만! 그렇게 오래되지 않았어! 발매된 것도 4~5년 전이고, 전혀 레트로가 아니야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ハッ──！\u3000そうか、デネブはアルタイルより１０年進んでるらしいから、チナちゃんからしたら１５年前のゲームなんだ！\u3000そりゃレトロだよ……」"
translation = "「핫──! 그렇구나, 데네브는 알타이르보다 10년 앞서 있다고 하니, 치나짱에게는 15년 전 게임이구나! 그야 레트로지……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「これ、やってもいいんだよな？」"
translation = "「이거, 해도 되는 거지?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、もちろん。古いのだから、チナちゃんが楽しめるかはわからないけど……」"
translation = "「응, 물론이지. 오래된 거니까, 치나짱이 즐길 수 있을지는 모르겠지만……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んじゃモニターに繋いで……あ、やっぱり端子は古い規格なんだな」"
translation = "「그럼 모니터에 연결하고…… 아, 역시 단자는 옛날 규격이네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、規格はまだ現行のはずなんだけど……」"
translation = "「아니, 규격은 아직 현행일 텐데……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お、映った。やっぱ画質荒いな」"
translation = "「오, 나온다. 역시 화질이 거칠군」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私、最初すごく綺麗って驚いたのに……」"
translation = "「나는 처음에 엄청 깨끗하다고 놀랐는데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これがジェネレーションギャップなんだ……お父さんが時々ショック受けてたけど、少し気持ちがわかったよ……」"
translation = "「이것이 세대 차이라는 거구나…… 아버지가 가끔 충격받으셨는데, 조금 마음을 알 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "俺もちょっと傷ついてきた……"
translation = "나도 조금 상처받았다……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「逆にデネブのゲーム機ってどうなってるの？\u3000やっぱりこっちよりすごいの？」"
translation = "「반대로 데네브의 게임기는 어떻게 되어 있어? 역시 이쪽보다 대단해?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシにとっちゃ普通のゲーム機だから、すごいかどうか聞かれてもわからねえけど、まぁアルタイルから見たらすごいんじゃないか？」"
translation = "「나한테는 평범한 게임기니까, 대단한지 어떤지 물어봐도 모르겠지만, 뭐 알타이르에서 보면 대단하지 않겠어?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「最近のだと、全世界同時に１万人参加するシューティングゲームとかあったり」"
translation = "「최근 것 중에는, 전 세계 동시 1만 명이 참가하는 슈팅 게임 같은 것도 있고」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「１万人！？\u3000本当に多いね！？」"
translation = "「1만 명!? 정말 많네!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あとミラモンも種類が増えてるし──」"
translation = "「그리고 미라몬도 종류가 늘어나고 있고──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょ、ちょっと待って！？\u3000ミラモンって、ミラクルモンスターだよね！？\u3000全世界的人気シリーズの！？」"
translation = "「자, 잠깐만!? 미라몬이라면, 미라클 몬스터 맞지!? 전 세계적인 인기 시리즈의!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ああ、そのミラモンで合ってるよ」"
translation = "「아아, 그 미라몬이 맞아」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「未来のミラモン……すごく知りたい……でも知りたくない……どうしよう……」"
translation = "「미래의 미라몬…… 너무 알고 싶어…… 하지만 알고 싶지 않아…… 어떡하지……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「言った方がいいのか？\u3000それとも言わない方がいいのか？」"
translation = "「말해주는 게 좋을까? 아니면 말하지 않는 게 좋을까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えーっと、ごめん！\u3000言わない方向でお願い！」"
translation = "「에ー또, 미안! 말하지 않는 쪽으로 부탁해!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「わかったよ。まぁバレは面白くないもんな」"
translation = "「알았다. 뭐 스포일러는 재미없으니까」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「地獄のウルトラ進化対戦環境とか、ミラモンショックとか、知らない方がいいと思うし……」"
translation = "「지옥의 울트라 진화 대전 환경이라든가, 미라몬 쇼크라든가, 모르는 편이 좋을 거라고 생각하고……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「何それ！？\u3000めっちゃ気になるワードが飛んできたんですけど！？」"
translation = "「뭐야 그거!? 엄청 신경 쓰이는 단어가 날아왔는데요!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あっ、悪い……今のは忘れてくれ」"
translation = "「앗, 미안…… 방금 건 잊어줘」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「チナちゃんってやっぱり未来の人なんだ……わかっていたつもりだけど、すごく実感しちゃった……」"
translation = "「치나짱은 역시 미래 사람이구나…… 알고 있었다고 생각했지만, 엄청 실감해 버렸어……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だけどチナちゃんゲーム楽しめてる？\u3000古いゲームだとつまらなかったりしない？」"
translation = "「하지만 치나짱 게임 즐기고 있어? 오래된 게임이라서 재미없거나 하진 않아?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ああ、楽しいぞ。アタシは初めてプレイするゲームだし、面白いゲームは何十年経っても面白いもんだ」"
translation = "「아아, 즐거워. 나는 처음 플레이하는 게임이고, 재미있는 게임은 몇십 년이 지나도 재미있는 법이다」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「リクリエでいろんなものが吹っ飛んだから、流星市国じゃ古いゲームはめちゃくちゃレアだしな」"
translation = "「리크리에로 여러 가지가 날아가 버려서, 유성시국에서는 오래된 게임이 엄청나게 레어하거든」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「正直、触れる機会があると思ってなかった。それがアルタイルで遊べるとは……なんか妙な気分だ」"
translation = "「솔직히, 접할 기회가 있을 거라고 생각하지 못했다. 그것이 알타이르에서 놀 수 있다니…… 뭔가 묘한 기분이다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……そっか。チナちゃんが気に入ってくれて良かった」"
translation = "「……그렇구나. 치나짱이 마음에 들어 해줘서 다행이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、アナからメッセージだ。どれどれ……」"
translation = "「아, 아나에게 메시지가 왔네. 어디 보자……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ん？\u3000あんたのＤＩＳＣ……」"
translation = "「응? 네 디스크……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私のＤＩＳＣがどうしたの？」"
translation = "「내 디스크가 왜?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「どこかで見たことがあるような……あ、そうだ、昔ばあちゃんが使ってたやつだ」"
translation = "「어디선가 본 적 있는 것 같은데…… 아, 맞다, 옛날에 할머니가 쓰시던 거다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「おばあちゃん……！？」"
translation = "「할머니……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「チナちゃんを相手にしていると、なんだかすごく年を取った気がする……」"
translation = "「치나짱을 상대하고 있으니, 왠지 모르게 엄청 나이를 먹은 기분이 들어……」"

[[dialogue]]
speaker = "unk"
original = "俺もそうかもしれない……"
translation = "나도 그럴지도 모른다……"

[[dialogue]]
speaker = "unk"
original = "デネブはアルタイルより１０年進んでいると頭ではわかっていても、やはりジェネレーションギャップを感じざるを得ないのだった。"
translation = "데네브가 알타이르보다 10년 앞서 있다는 것을 머리로는 알고 있어도, 역시 세대 차이를 느끼지 않을 수 없었다."

