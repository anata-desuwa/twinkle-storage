[[dialogue]]
speaker = "unk"
original = "第８話,再戦,B"
translation = "제8화, 재전, B"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あぐっ……！？」"
translation = "「아극……!?」"

[[dialogue]]
speaker = "unk"
original = "ジグの斬撃を受け、ナターシャが地に墜ちる。"
translation = "지그의 참격을 받고, 나타샤가 땅으로 추락한다."

[[dialogue]]
speaker = "unk"
original = "黒い羽や体のいたるところには傷が刻まれ、赤い血で濡れていないところはなかった。"
translation = "검은 날개와 몸 곳곳에는 상처가 새겨져, 붉은 피로 젖지 않은 곳이 없었다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はぁ、はぁ……かっこつけて引き受けたはいいけど……１人でリクリエの使徒を相手にするのは無茶だよね……」"
translation = "「하아, 하아…… 폼 잡고 맡은 것까진 좋았는데…… 혼자서 리크리에의 사도를 상대하는 건 무리였나 보네……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あー……死にそう……血ぃ出すぎ……まだ手足が繋がってるのが、奇跡だよ……」"
translation = "「아-…… 죽을 것 같아…… 피를 너무 흘렸어…… 아직 팔다리가 붙어있는 게, 기적이야……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「てか、遊んでるでしょ……？\u3000トドメを差す機会は……いくらでもあったはずなのに」"
translation = "「그보다, 놀아주고 있는 거지……? 숨통을 끊을 기회는…… 얼마든지 있었을 텐데」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まぁね。アガサが戻ってくるまでの退屈しのぎさ」"
translation = "「글쎄. 아가사가 돌아올 때까지의 심심풀이지」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はぁ……これでも天界で指折りのエージェントだったんだけどな。自信なくすなぁ……」"
translation = "「하아…… 이래 봬도 천계에서 손꼽히는 에이전트였는데 말이야. 자신감 없어지네……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「でも……梨緒が戻ってくることは、疑ってないんだ？」"
translation = "「하지만…… 리오가 돌아올 거라는 건, 의심하지 않는 거야?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ。アガサは自分の弱さに耐えられずに、“真なる神”の救いを求めるだろう」"
translation = "「아아. 아가사는 자신의 약함을 견디지 못하고, “진정한 신”의 구원을 구하겠지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「その時こそ、私とアガサは本当の仲間になれるんだ」"
translation = "「그때야말로, 나와 아가사는 진정한 동료가 될 수 있는 거다」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふーん。それは解釈違いかも」"
translation = "「흐응. 그건 해석 차이일지도」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「解釈？」"
translation = "「해석?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん。あのパッと見クールなくせしてじゃじゃ馬な梨緒が、そんなに聞き分けいいかなって」"
translation = "「응. 저 겉보기엔 쿨한 척하면서 말괄량이인 리오가, 그렇게 고분고분할까 싶어서」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふふ、君こそわかっていないね」"
translation = "「후후, 너야말로 모르고 있군」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサは弱い。誰よりも弱くて、それを認めたくなくて強がっているだけの子どもさ」"
translation = "「아가사는 약해. 누구보다 약하고, 그걸 인정하고 싶지 않아서 강한 척하고 있을 뿐인 어린아이지」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「言うねぇ、さすが星徒会長と副会長だっただけある」"
translation = "「말 잘하네, 역시 성도회장과 부회장이었던 사이답달까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まぁ間違ってはいないと思うけど……それだけじゃないと思うよ、うちの委員長は」"
translation = "「뭐 틀린 말은 아니라고 생각하지만…… 그것뿐만이 아닐 거라고 봐, 우리 위원장은」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふぅん。君はアガサを信じているんだね。いささか意外だよ」"
translation = "「후운. 너는 아가사를 믿고 있나 보군. 다소 의외인걸」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど君の相手も飽きた。そろそろ息の根を止めようか」"
translation = "「하지만 네 상대도 질렸다. 슬슬 숨통을 끊어줄까」"

[[dialogue]]
speaker = "unk"
original = "ジグが大剣を振りかぶり、満身創痍のナターシャに向かって振り下ろす──"
translation = "지그가 대검을 치켜들고, 만신창이가 된 나타샤를 향해 휘두른다──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "剣がナターシャに届く寸前、ジグの眼前に雷が走った。"
translation = "검이 나타샤에게 닿기 직전, 지그의 눈앞에 번개가 내달렸다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待たせたな、ナターシャ」"
translation = "「기다리게 했군, 나타샤」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ほんとだよ……今まさに死ぬところだったんだから」"
translation = "「정말이야…… 지금 막 죽으려던 참이었다고」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ナターシャちゃん、大丈夫！？」"
translation = "「나타샤짱, 괜찮아!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「全然だいじょーぶじゃない……死ぬ一歩手前……めっちゃ血ぃ出た……」"
translation = "「전혀 안 괜찮아…… 죽기 일보 직전…… 피 엄청 나왔어……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「吸血鬼的に血がもったいないって思ってない？」"
translation = "「흡혈귀적으로 피가 아깝다고 생각하는 거 아니야?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「思ってないよっ！\u3000ちょびっとしか！」"
translation = "「안 그래! 쬐끔밖에!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「思ってるじゃん」"
translation = "「그러고 있잖아」"

[[dialogue]]
speaker = "unk"
original = "死にかけながらも、気安いやり取りを忘れないナターシャ。"
translation = "죽어가는 와중에도, 격의 없는 대화를 잊지 않는 나타샤."

[[dialogue]]
speaker = "unk"
original = "常に命の危険と隣り合わせのエージェントにとっては、自身が殺されかけたことも、大きな出来事ではないのかもしれない。"
translation = "항상 생명의 위험과 이웃하는 에이전트에게는, 자신이 살해당할 뻔한 것도 큰 사건이 아닐지도 모른다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアト、ナターシャを頼む。戦闘になればジグの相手で精一杯になる」"
translation = "「베아트, 나타샤를 부탁한다. 전투가 시작되면 지그를 상대하는 것만으로도 벅차질 거다」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん、わかった！\u3000ナターシャちゃんは私が治療するね！」"
translation = "「응, 알았어! 나타샤짱은 내가 치료할게!」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが傷ついたナターシャを抱えて、部屋の隅へと下がっていく。"
translation = "베아트리스가 상처 입은 나타샤를 안고, 방 구석으로 물러난다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おやおや、せっかく戻ってきたのに、また私にやられに来たのかい？\u3000“真なる神”に救いを求めに来たんだと思ったんだけど」"
translation = "「이런 이런, 어렵사리 돌아왔는데, 또 나에게 당하러 온 건가? “진정한 신”에게 구원을 구하러 온 줄 알았는데 말이야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「救い……か。確かに私は弱くて何もできない、情けない人間だ」"
translation = "「구원……인가. 확실히 나는 약하고 아무것도 못 하는, 한심한 인간이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが今は、私が君を救う番だ。君が心の中で流した涙を拭ってみせる！」"
translation = "「하지만 지금은, 내가 너를 구할 차례다. 네가 마음속으로 흘린 눈물을 닦아주마!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「救う……ねぇ。さっきもそう言っていたね」"
translation = "「구한다……라. 아까도 그렇게 말했었지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど私に救いなんて不要だ。だって私はもう“真なる神”に救われているのだから」"
translation = "「하지만 나에게 구원 따윈 불필요해. 왜냐하면 나는 이미 “진정한 신”에게 구원받았으니까」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いいや、君は救われてなんかいない。君は今も絶望の闇の中だ」"
translation = "「아니, 너는 구원받지 않았어. 너는 지금도 절망의 어둠 속이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから今度こそ私が勝って、君をリクリエから解放する！」"
translation = "「그러니 이번에야말로 내가 이겨서, 너를 리크리에로부터 해방하겠어!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「“今度こそ”って言って、威勢よく挑んで負けたことが何度あったかな」"
translation = "「“이번에야말로”라고 말하며, 기세 좋게 덤볐다가 진 게 몇 번이었더라」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「さっき逃げたのでアガサの９９９敗目だ。１０００回目の勝負なら勝てると思ったかい？」"
translation = "「아까 도망친 걸로 아가사의 999패째다. 1000번째 승부라면 이길 수 있을 거라 생각했나?」"

[[dialogue]]
speaker = "unk"
original = "ジグの<b>眼</b>に、梨緒の『<ruby>可能性<rt>みらい</rt></ruby>』が映る。"
translation = "지그의 <ruby>눈<rt>·</rt></ruby>에, 리오의 『<ruby>가능성<rt>미래</rt></ruby>』이 비친다."

[[dialogue]]
speaker = "unk"
original = "梨緒は牽制のためにクロスボウを撃つ。"
translation = "리오는 견제를 위해 크로스보우를 쏜다."

[[dialogue]]
speaker = "unk"
original = "ジグは紙一重でそれを躱すと、星力をまとって突進。"
translation = "지그는 간발의 차로 그것을 피하더니, 성력을 두르고 돌진."

[[dialogue]]
speaker = "unk"
original = "押し止めようとする射撃を弾いて、梨緒を斬って捨てる──"
translation = "억누르려 하는 사격을 쳐내고, 리오를 베어 넘긴다──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ほら、やっぱりアガサの負けだ」"
translation = "「봐, 역시 아가사의 패배다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだな、私の負けだ」"
translation = "「그렇군, 나의 패배다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから──次だ」"
translation = "「그러니까── 다음이다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──！！」"
translation = "「──!!」"

[[dialogue]]
speaker = "unk"
original = "ジグが見た『<ruby>可能性<rt>みらい</rt></ruby>』の中で梨緒は敗北した。"
translation = "지그가 본 『<ruby>가능성<rt>미래</rt></ruby>』 속에서 리오는 패배했다."

[[dialogue]]
speaker = "unk"
original = "だが梨緒の表情には一切の焦りも動揺もない。"
translation = "하지만 리오의 표정에는 일절의 초조함도 동요도 없다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今勝ったのは君だろう、何を驚いている？」"
translation = "「방금 이긴 건 너일 텐데, 뭘 놀라고 있지?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君こそ大きな口を叩いておいて、負けて恥ずかしくないのかい？」"
translation = "「너야말로 큰소리를 쳐놓고, 지고서 부끄럽지도 않은 건가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだな、１０００回目の敗北……いや、可能性の中であればもっとか」"
translation = "「그렇군, 1000번째 패배…… 아니, 가능성 속이라면 더 많겠지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だからどうした」"
translation = "「그래서 어쨌다는 거냐」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「千だろうと、万だろうと、億だろうと、いくら負けようが関係ない」"
translation = "「천 번이든, 만 번이든, 억 번이든, 몇 번을 지든 상관없다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「数多の敗北を超えて、１つの勝利を手繰り寄せる。その１つが那由多の彼方にあろうとも……！」"
translation = "「수많은 패배를 넘어, 단 하나의 승리를 끌어당긴다. 그 하나가 나유타 너머에 있을지라도……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「たとえ無限に繰り返そうと、君に勝利の可能性はない……！」"
translation = "「설령 무한히 반복할지라도, 너에게 승리의 가능성은 없다……!」"

[[dialogue]]
speaker = "unk"
original = "現実で雷矢と斬撃の応酬を繰り広げながら、梨緒とジグにしか見えない可能性の地平で、幾度となくぶつかり合う。"
translation = "현실에서 뇌야와 참격의 응수를 펼치면서, 리오와 지그에게만 보이는 가능성의 지평에서, 몇 번이고 맞부딪친다."

[[dialogue]]
speaker = "unk"
original = "一瞬の間に、かつて２人がベガで重ねた勝負の数を超え、その数だけ梨緒がジグに敗北する。"
translation = "순식간에, 과거 두 사람이 베가에서 거듭한 승부의 수를 넘어, 그 수만큼 리오가 지그에게 패배한다."

[[dialogue]]
speaker = "unk"
original = "わずか数秒で天文学的な数の敗北が積み重なっていくが、それでも梨緒が怯むことはない。"
translation = "불과 수초 만에 천문학적인 수의 패배가 쌓여가지만, 그런데도 리오가 겁먹는 일은 없다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今のはジグの連撃に対して反応が遅れた……次だ」"
translation = "「방금 건 지그의 연격에 대해 반응이 늦었어…… 다음이다」"

[[dialogue]]
speaker = "unk"
original = "梨緒は可能性の中で負けても動じることなく、即座にノルンの力で次の可能性を予測し、ジグに食らいついていく。"
translation = "리오는 가능성 속에서 패해도 동요하지 않고, 즉시 노른의 힘으로 다음 가능성을 예측하며 지그에게 달려든다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「確かに先ほどとは違うようだ。それなら──」"
translation = "「확실히 아까와는 다른 모양이군. 그렇다면──」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「──ッ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスがナターシャの治療をしていると、そこにジグが急速に接近していく。"
translation = "베아트리스가 나타샤를 치료하고 있자, 그곳으로 지그가 급속히 접근한다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「見えたよ──２人が死ぬ『<ruby>可能性<rt>みらい</rt></ruby>』が」"
translation = "「보였어── 두 사람이 죽는 『<ruby>가능성<rt>미래</rt></ruby>』이」"

[[dialogue]]
speaker = "unk"
original = "ジグが死角から迫り、大剣の一振りでナターシャとベアトリスの首を刎ねる──"
translation = "지그가 사각에서 다가와, 대검을 한 번 휘둘러 나타샤와 베아트리스의 목을 친다──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "だがジグが見た『可能性』が現実になることはなく、梨緒がクロスボウで斬撃を受け止めていた。"
translation = "하지만 지그가 본 『가능성』이 현실이 되는 일은 없었고, 리오가 크로스보우로 참격을 받아내고 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「その『<ruby>可能性<rt>みらい</rt></ruby>』は私にも見えた。だから邪魔させてもらった」"
translation = "「그 『<ruby>가능성<rt>미래</rt></ruby>』은 나에게도 보였다. 그래서 방해 좀 했지」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ありがとう、梨緒ちゃん！」"
translation = "「고마워, 리오짱!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「やるじゃん」"
translation = "「제법이네」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ノルンの力を幾千幾万と使うことで、『因果』の糸を辿れるようになってきた」"
translation = "「노른의 힘을 수천수만 번 사용함으로써, 『인과』의 실을 더듬게 되었다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私はようやくノルンの遣した力を使いこなせてきたようだ」"
translation = "「나는 드디어 노른이 남긴 힘을 제대로 다루게 된 모양이다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「なるほど、これが『因果』を司るノルンの力か……いささか過小評価していたようだ」"
translation = "「과연, 이것이 『인과』를 관장하는 노른의 힘인가…… 다소 과소평가하고 있었던 모양이군」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけどこれは予測していたかい？」"
translation = "「하지만 이것도 예측하고 있었나?」"

[[dialogue]]
speaker = "unk"
original = "ジグの手の中に紫の瘴気が集まり、仮面を形作る。"
translation = "지그의 손안에 보랏빛 장기가 모여, 가면의 형상을 만든다."

[[dialogue]]
speaker = "unk"
original = "そして仮面が梨緒の顔に取り憑いて──"
translation = "그리고 가면이 리오의 얼굴에 달라붙어──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「く──っ！？」"
translation = "「크──윽!?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん！？」"
translation = "「리오짱!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「さぁ、私と一緒に新しい世界を始めよう、アガサ」"
translation = "「자, 나와 함께 새로운 세계를 시작하자, 아가사」"

