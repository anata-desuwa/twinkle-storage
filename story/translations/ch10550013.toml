[[dialogue]]
speaker = "unk"
original = "第３話,お嬢様とサイリウム,P"
translation = "제3화, 아가씨와 사이리움"

[[dialogue]]
speaker = "unk"
original = "──ある日の夜、俺はまた繁華街の方へ足を伸ばした。"
translation = "──어느 날 밤, 나는 또 번화가 쪽으로 발걸음을 옮겼다."

[[dialogue]]
speaker = "unk"
original = "今日は空腹を埋めるためではなく、エルデリーゼからの直々の呼び出し。"
translation = "오늘은 공복을 채우기 위해서가 아니라, 엘데리제로부터의 직접적인 호출."

[[dialogue]]
speaker = "unk"
original = "また夜間外出……いい加減、寮長に見つかったら怒られるぞと思いながら、俺は待ち合わせ場所に向かった。"
translation = "또 야간 외출…… 이제 그만 사감에게 들키면 혼날 텐데, 라고 생각하면서, 나는 약속 장소로 향했다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「──お待ちしておりました、会長様。時間通りですわね」"
translation = "「──기다리고 있었습니다, 회장님. 시간 맞춰 오셨군요.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「不躾ですが時間が押しておりますの。どうぞこれをお持ちになってくださいませ」"
translation = "「무례하지만 시간이 촉박합니다. 부디 이것을 가져가 주십시오.」"

[[dialogue]]
speaker = "unk"
original = "これは……サイリウム？"
translation = "이건…… 사이리움?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「さすが会長様、ご存じでしたか。使い方は……そう、パキッと折ると光ります。２本どうぞ」"
translation = "「역시 회장님, 알고 계셨군요. 사용법은…… 네, 딱 하고 꺾으면 빛납니다. 두 개 가져가세요.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「では移動しながら説明いたします。付いて来てくださいませ！」"
translation = "「그럼 이동하면서 설명하겠습니다. 따라와 주십시오!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「非常に悩みました。１人でも多くの方に協力を願いたいところですが、私の夜間外出は絶対の秘密です」"
translation = "「매우 고민했습니다. 한 분이라도 많은 분께 협력을 부탁하고 싶지만, 저의 야간 외출은 절대적인 비밀입니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「友人であるアムにも、敬愛するフィオナ会長にもお頼みしづらい用件でしたが……会長様を思い出したのですわ」"
translation = "「친구인 아무에게도, 존경하는 피오나 회장에게도 부탁하기 어려운 용건이었지만…… 회장님을 떠올렸습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お心が広いだけでなく秘密もしっかり守ってくださる。まさに理想のパートナーですので……」"
translation = "「마음이 넓을 뿐만 아니라 비밀도 확실히 지켜주십니다. 그야말로 이상적인 파트너이므로……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「今宵の応援を頼ませていただきました」"
translation = "「오늘 밤의 응원을 부탁드렸습니다.」"

[[dialogue]]
speaker = "unk"
original = "応援……？"
translation = "응원……?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はい。応援です。良いですか。今日これから行く場所は、私たちよりも輝くべき者たちがいます。私も会長様も黒子に徹するのですわ」"
translation = "「네. 응원입니다. 잘 들으십시오. 오늘 앞으로 갈 장소는, 저희보다 빛나야 할 사람들이 있습니다. 저도 회장님도 조연에 전념하는 겁니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「その場所の空気を吸えることを感謝しつつも、厳粛に。かつ情熱的に。サイリウムを振り回しましょう」"
translation = "「그 장소의 공기를 마실 수 있음에 감사하면서도, 엄숙하게. 그리고 정열적으로. 사이리움을 휘두릅시다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「今日は私の推し。地下アイドルグループのライブなのですわ……！」"
translation = "「오늘은 제가 미는 아이돌. 지하 아이돌 그룹의 라이브입니다……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「きゃああああああ！\u3000素敵！\u3000素敵ですわー！」"
translation = "「꺄아아아아아아! 멋져요! 멋집니다ー!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「大好きー！\u3000ですわ～！」"
translation = "「정말 좋아해요ー!」"

[[dialogue]]
speaker = "unk"
original = "いわゆる地下アイドルのライブに連れて行かれた俺は、エルデリーゼと共に力の限りその場を盛り上げたのだった──"
translation = "이른바 지하 아이돌 라이브에 끌려간 나는, 엘데리제와 함께 힘껏 그 장소를 달구었다──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「はー……最っ高でしたわ……メンバー全員が一丸となって歌い踊る……フィナーレまで圧倒されっぱなしでした」"
translation = "「하ー…… 최고였습니다…… 멤버 전원이 하나가 되어 노래하고 춤추는…… 피날레까지 압도당했습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様、ありがとうございます。不慣れな場でもすぐに順応してくださり感無量ですわ」"
translation = "「회장님, 감사합니다. 익숙하지 않은 장소에서도 바로 순응해 주셔서 감개무량합니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「今日はメンバーの方の１人が卒業されることもあり、どうしても盛大に送ってさしあげたかったのです」"
translation = "「오늘은 멤버 중 한 분이 졸업하는 일도 있어서, 어떻게든 성대하게 배웅해 드리고 싶었습니다.」"

[[dialogue]]
speaker = "unk"
original = "地下アイドル、好きだったんだ？"
translation = "지하 아이돌, 좋아했어?"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「あ……はい。ですがこの事は誰にも言わないでくださいね。会長様と私だけの秘密ということで」"
translation = "「아…… 네. 하지만 이 일은 누구에게도 말하지 말아 주세요. 회장님과 저만의 비밀로.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「以前にお話しましたが、私。流星学園の寮に入るまで、ずっとお目付けの厳しい実家にいたのです」"
translation = "「이전에 말씀드렸지만, 저는. 유성 학원 기숙사에 들어갈 때까지, 계속 감시가 엄격한 친가에 있었습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「寮に入り、夜間外出を覚えて間もない頃でした……路上で配られたチラシに誘われ、先ほどのグループのことを知ったのです」"
translation = "「기숙사에 들어가, 야간 외출을 배운 지 얼마 안 되었을 때였습니다…… 길거리에서 나눠준 전단지에 이끌려, 방금 그 그룹에 대해 알게 되었습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「美しい光景でした。ステージで輝こうとする同世代の少女たちは、とてもまっすぐで……」"
translation = "「아름다운 광경이었습니다. 무대에서 빛나려는 또래의 소녀들은, 매우 올곧고……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「五名門の私が、誰かを無心で応援できたのです。応援する心情を勘繰られることもなく、政治も絡まない」"
translation = "「오명문의 제가, 누군가를 아무 생각 없이 응원할 수 있었습니다. 응원하는 심정을 짐작당할 일도 없고, 정치도 얽히지 않는.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それが、それがっ……ものすっごく心地よくって！」"
translation = "「그것이, 그것이…… 엄청나게 기분 좋아서!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「星騎士の鍛錬で伸び悩んだ時。アムとの模擬戦に敗れた時。気分が落ち込むたび、彼女たちは元気をくれるのですわ……！」"
translation = "「성기사 단련에서 정체되었을 때. 아무와의 모의전에서 패배했을 때. 기분이 침체될 때마다, 그녀들은 활력을 줍니다……!」"

[[dialogue]]
speaker = "unk"
original = "本当に好きなんだな"
translation = "정말 좋아하는구나"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ええ！\u3000推しのためならこの命、いくらでも賭けられますわ……！」"
translation = "「네! 제가 미는 아이돌을 위해서라면 이 목숨, 얼마든지 걸 수 있습니다……!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……っと。すみません。私、彼女たちのことが絡むとつい熱くなってしまうようで……」"
translation = "「……읏. 죄송합니다. 저는, 그녀들과 관련된 일이라면 저도 모르게 뜨거워지는 것 같아서……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「え……？\u3000会長様も、元気をもらえたのですか？\u3000……また、ライブに連れて行ってほしい……？」"
translation = "「에……? 회장님도, 활력을 얻으셨습니까? ……또, 라이브에 데려가 주었으면……?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ふふっ！\u3000ぜひ！\u3000こちらこそ、よろしくお願いいたしますわ！\u3000ファンは多ければ多いほど、彼女たちは輝くのです！」"
translation = "「후훗! 그럼요! 저야말로, 잘 부탁드립니다! 팬은 많으면 많을수록, 그녀들은 빛나는 겁니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そうと決まれば予習が必要ですわね。リリースされたＣＤはすべて購入しております。またお貸ししますわ！」"
translation = "「그렇게 결정되었다면 예습이 필요하겠군요. 발매된 CD는 전부 구매했습니다. 또 빌려드리겠습니다!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「頑張って盛り上げていきましょうね、会長様！」"
translation = "「열심히 분위기를 띄워봅시다, 회장님!」"

[[dialogue]]
speaker = "unk"
original = "食いしん坊で、好奇心の強いお嬢様・エルデリーゼ。そんな彼女の新たな一面を知ることができた。"
translation = "식탐이 많고, 호기심이 강한 아가씨 엘데리제. 그런 그녀의 새로운 일면을 알 수 있었다."

[[dialogue]]
speaker = "unk"
original = "華やかに歌い、踊るアイドルたちから元気をもらえたのは俺も同じ。明日以降も星騎士としての活動を頑張ろう──そう思ったのだった。"
translation = "화려하게 노래하고, 춤추는 아이돌들에게서 활력을 얻은 것은 나도 마찬가지. 내일 이후로도 성기사로서의 활동을 열심히 하자── 그렇게 생각했다."

