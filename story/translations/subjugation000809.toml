[[dialogue]]
speaker = "unk"
original = "蘭美は「用事があるから、あとは２人で」と言って先に去り、俺とせつなは２人きりになった。"
translation = "라비는 「용건이 있으니 나머지는 둘이서」라고 말하며 먼저 떠났고, 나와 세츠나 둘만 남게 되었다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「な、なんかチョコを渡した後だと、照れ臭くなってしまうでござる……」"
translation = "「어, 왠지 초코를 건네고 나니 쑥스러워지는구려……」"

[[dialogue]]
speaker = "unk"
original = "せつな、チョコを食べてもいい？"
translation = "세츠나, 초코 먹어도 돼?"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「え？\u3000は、はい！\u3000もちろんでござりまする！」"
translation = "「에? 네, 네! 물론이오!」"

[[dialogue]]
speaker = "unk"
original = "俺はハートの包みを開けて、バレンタインチョコの端っこを割って、口に入れる。"
translation = "나는 하트 모양 포장을 열고 밸런타인 초코 끝부분을 떼어 입에 넣었다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……ど、どうでござるか？\u3000主様……？」"
translation = "「……어, 어떻소? 주군……?」"

[[dialogue]]
speaker = "unk"
original = "うまい！\u3000頬っぺたが落ちそうなくらい"
translation = "맛있어! 볼이 떨어질 정도로"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「よかったでござる……！\u3000えへへぇ♪\u3000美味しいと言ってもらえて、せつな、嬉しくなってしまうでござるにゃん……<emoji=heart04>」"
translation = "「다행이오……! 에헤헤♪ 맛있다고 해주셔서 세츠나, 기뻐지기 시작했소냐앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でも、主様や蘭美殿には渡せたのでござるが、他のお世話になっている方々に渡すチョコは、間に合わなかったでござる」"
translation = "「하지만 주군과 라비 공께는 드렸소만, 다른 신세 지고 있는 분들께 드릴 초코는 제때 맞추지 못했소」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「本当はもっといっぱい作って、ヴィーナスお嬢様やメイド隊のみんな、学園の友人、それから――」"
translation = "「사실은 더 많이 만들어서 비너스 아가씨나 메이드대 동료들, 학원 친구들, 그리고──」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「紫桜の里の師匠にも贈りたかったのでござるが、せつなの実力不足で時間がなかったのが、残念でござる……」"
translation = "「자앵마을의 스승님께도 보내고 싶었소만, 세츠나의 실력 부족으로 시간이 없었던 것이 아쉽소……」"

[[dialogue]]
speaker = "unk"
original = "なら、俺が手伝うから、今からでも作ろう"
translation = "그럼 내가 도와줄 테니까 지금이라도 만들자"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「え……？\u3000でも、今日中にお渡しするのは……」"
translation = "「에……? 하지만 오늘 중으로 드리는 건……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「――後日でも構わない、でござるか？」"
translation = "「──나중이라도 상관없소?」"

[[dialogue]]
speaker = "unk"
original = "たとえバレンタインでなくても、心を込めた贈り物をもらったら嬉しい。大切なのは気持ちなのだから。"
translation = "설령 밸런타인이 아니더라도 진심을 담은 선물을 받으면 기쁠 거야. 중요한 건 마음이니까."

[[dialogue]]
speaker = "unk"
original = "俺はせつなにそう伝える。"
translation = "나는 세츠나에게 그렇게 전했다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……！\u3000主様の仰る通りにござる！」"
translation = "「……! 주군의 말씀이 옳소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつな、これからまたバレンタインチョコを作って、みんなにちゃんと渡したいでござる！」"
translation = "「세츠나, 이제부터 다시 밸런타인 초코를 만들어서 모두에게 꼭 전하고 싶소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様、ありがとうございまする！」"
translation = "「주군, 고맙소!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「――主様はやっぱり、せつなが心からお仕えしたいと思える主様にござる♪」"
translation = "「──주군은 역시 세츠나가 진심으로 모시고 싶어지는 주군이오♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えへへぇ……♪」"
translation = "「에헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "せつなはそう言って、笑顔を浮かべるのだった――"
translation = "세츠나는 그렇게 말하며 미소를 짓는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "一方、蘭美は流星学園に出向き、ある人物を待ち構えていた――"
translation = "한편, 라비는 유성학원에 들러 어떤 인물을 기다리고 있었다──"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「待っていたわよ、上月キリカ」"
translation = "「기다리고 있었어, 코즈키 키리카」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「九浄家メイド長の、<ruby>羽宮<rt>はねみや</rt></ruby>様……？\u3000私になにか御用でしょうか？」"
translation = "「쿠죠 가문 메이드장이신 하네미야 님……? 제게 무슨 용건이신지요?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ええ。貴方も、今日は何の日かくらい知っているでしょう？」"
translation = "「응. 당신도 오늘이 무슨 날인지는 알고 있겠지?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「というわけで、はい、これ。私から貴方へ、バレンタインチョコよ」"
translation = "「그런 고로 자, 이거. 내가 주는 밸런타인 초코야」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「え？\u3000あ、ありがとうございます」"
translation = "「네? 아, 감사합니다」"

[[dialogue]]
speaker = "unk"
original = "蘭美からチョコを受け取ったキリカは、戸惑った様子で尋ねる。"
translation = "라비에게 초코를 받은 키리카는 당황한 기색으로 묻는다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「でも、貴方が私に……ですか？」"
translation = "「하지만 당신이 제게…… 말입니까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そうよ。意外？」"
translation = "「그래. 의외야?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はい、正直。貴方はてっきり、私に対抗心を抱いているものだと思っていましたから……」"
translation = "「네, 솔직히요. 당신은 분명 제게 대항심을 품고 있다고 생각했으니까요……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ええ、それはもう、いつだって対抗心を燃やしているわ。だって、私にとって貴方は乗り越えるべきライバルだもの」"
translation = "「그래, 그건 언제나 불태우고 있어. 내게 당신은 뛰어넘어야 할 라이벌이니까」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ただ、これはいつかの<b>お返し</b>だから」"
translation = "「다만 이건 지난번의 <b>답례</b>니까」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お返し？」"
translation = "「답례요?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「メイド・オブ・メイドの決勝戦で私が負けて、悔しくて泣いていた時、貴方が私に声をかけてきたでしょう？」"
translation = "「메이드 오브 메이드 결승전에서 내가 지고 분해서 울고 있을 때, 당신이 내게 말을 걸었잖아?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「羽宮様。今大会、実に見事なお手前でした」"
translation = "「하네미야 님. 이번 대회, 실로 훌륭한 솜씨였습니다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なに！？\u3000私が子供だと思って、慰めにでもきたわけ！？」"
translation = "「뭐야!? 내가 어린애라고 위로라도 하러 온 거야!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「馬鹿にしないで！\u3000私はこの大会、１人のメイドとして、本気で戦いにきたのよ！」"
translation = "「바보 취급 하지 마! 난 이 대회에 한 명의 메이드로서 진심으로 싸우러 온 거라고!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「いえ……私はただ、貴方のことを素直に称賛したかったのです」"
translation = "「아니요…… 저는 그저 당신을 솔직하게 칭찬하고 싶었을 뿐입니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「その若さで信じられない程に磨き抜かれたメイドスキル。たとえ天才的な才能があったとしても、並大抵の努力では、その若さでその領域まで辿り着けなかったでしょう」"
translation = "「그 나이에 믿기지 않을 정도로 연마된 메이드 스킬. 설령 천재적인 재능이 있었다 해도 어지간한 노력 없이는 그 나이에 그 영역까지 도달할 수 없었겠지요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「勝敗を分けたのは、私には仕えるべき主人がいて、貴方にはまだそういう相手がいなかったこと」"
translation = "「승패를 가른 것은 제게는 섬겨야 할 주인이 있고, 당신에게는 아직 그런 상대가 없었다는 것뿐」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ですが、貴方のメイドに対する情熱は、間違いなく私よりも上でした」"
translation = "「하지만 당신의 메이드에 대한 정열은 분명 저보다 위였습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私は、今大会で誰よりもメイドとして輝いていた貴方を、心から称賛します」"
translation = "「저는 이번 대회에서 누구보다 메이드로서 빛나던 당신을 진심으로 찬양합니다」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――あの時、貴方が言ってくれたことが、今の私の誇りになっているわ」"
translation = "「──그때 당신이 해준 말이 지금 내 긍지가 되어 있어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だから、これはそのお礼よ」"
translation = "「그러니까 이건 그 감사 인사야」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……そうですか。なら――」"
translation = "「……그렇습니까. 그렇다면──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「このお返しは、ホワイトデーにしないといけませんね」"
translation = "「이 답례는 화이트데이에 해야겠군요」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふっ。なら、世界第１位のメイドが作るお菓子、期待しているわよ？」"
translation = "「후후. 그럼 세계 1위 메이드가 만드는 과자, 기대하고 있을게?」"

[[dialogue]]
speaker = "unk"
original = "その後、蘭美は九浄家への帰り道を、鼻歌まじりに歩いていた。"
translation = "그 후 라비는 쿠죠 가문으로 돌아가는 길을 콧노래를 섞어가며 걷고 있었다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「～～♪\u3000～～～♪」"
translation = "「~~♪ ~~~♪」"

[[dialogue]]
speaker = "unk"
original = "彼女にとってキリカは、あの日から、もう１人の憧れのメイド。"
translation = "그녀에게 키리카는 그날부터 또 한 명의 동경하는 메이드."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふっ、ホワイトデー、楽しみね♪」"
translation = "「후후, 화이트데이 기대되네♪」"

[[dialogue]]
speaker = "unk"
original = "思わず笑みがこぼれて、ぴょんぴょんとスキップをしてしまう蘭美なのだった――"
translation = "나도 모르게 미소가 번져 깡충깡충 스킵을 하는 라비였다──"

