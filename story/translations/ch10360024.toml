[[dialogue]]
speaker = "unk"
original = "第４話,雨と甘噛み,P"
translation = "제4화, 비와 깨물기"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふぅ。雨、降ってきてしまいましたわね……急いで戻りませんと……」"
translation = "「후우. 비가 내리기 시작했군요…… 서둘러 돌아가지 않으면……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──ん？\u3000何ですの、あそこに置いてあるのは……段ボール？」"
translation = "「──응? 저기 놓여있는 건 뭐죠…… 골판지 상자?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「中身は────ひぃっ！？」"
translation = "「내용물은──── 히익!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あっ、緋宮会長！\u3000こ、こちらですわ！」"
translation = "「앗, 히노미야 회장! 이, 이쪽이에요!」"

[[dialogue]]
speaker = "unk"
original = "何か困った事でも！？"
translation = "무슨 곤란한 일이라도!?"

[[dialogue]]
speaker = "unk"
original = "急に電話で呼び出しだなんて"
translation = "갑자기 전화로 불러내다니."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あ……あちらの段ボールっ！\u3000捨て犬みたいなのですが、ど、どうすればよいのかと思って……！」"
translation = "「저…… 저쪽 상자! 유기견 같은데, 어, 어떻게 해야 할지 몰라서……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「緋宮会長はペットショップでアルバイトの経験もあるとのこと。犬の扱いには慣れているのではなくて……！？」"
translation = "「히노미야 회장은 펫샵에서 아르바이트 경험도 있다고 들었습니다. 개를 다루는 데는 익숙하지 않으신가요……!?」"

[[dialogue]]
speaker = "unk"
original = "ええ、大丈夫です。開けてみますね"
translation = "네, 괜찮아요. 열어볼게요."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「気を付けてくださいましっ？\u3000中を見る時は油断せず、ですわよっ？」"
translation = "「조심하세요? 안을 볼 때는 방심하지 말고 말이에요!」"

[[dialogue]]
speaker = "unk"
original = "怯え切った様子の先輩を見るに、そうとう躾のなっていない凶暴な捨て犬なのかもしれない。俺は警戒しながら、そうっと段ボールを開けてみた──"
translation = "겁에 질린 선배의 모습을 보니, 상당히 버릇없는 흉포한 유기견일지도 모른다. 나는 경계하며 조심스럽게 상자를 열어보았다──"

[[dialogue]]
speaker_original = "子犬"
speaker_translation = "강아지"
original = "「くぅ～～ん……」"
translation = "「끼잉……」"

[[dialogue]]
speaker = "unk"
original = "──ちっっっっさ！？"
translation = "──조오오오오온나 작아!?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「小さくても犬は犬です……わ、私には無理ですの……！」"
translation = "「작아도 개는 개예요…… 저, 저는 무리예요……!」"

[[dialogue]]
speaker = "unk"
original = "先輩って、犬が苦手なんですか？"
translation = "선배, 개를 무서워하나요?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「え、ええ……小さい頃にお友達が飼っていた犬に追いかけまわされて、その……を、噛まれて以来……」"
translation = "「네, 네에…… 어릴 때 친구가 기르던 개에게 쫓겨 다니다가, 그…… 를 물린 뒤로……」"

[[dialogue]]
speaker = "unk"
original = "え、どこを噛まれたって？"
translation = "에, 어디를 물렸다고요?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お……り、ですわ……」"
translation = "「엉…… 덩이, 예요……」"

[[dialogue]]
speaker = "unk"
original = "すみません、雨でよく聞こえないです"
translation = "죄송해요, 빗소리 때문에 잘 안 들려요."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あぁもう──お尻！\u3000お尻ですわ！\u3000逃げ回る私を嬉々として追い回して、がぶりとやられたんですの！！」"
translation = "「아아 정말── 엉덩이! 엉덩이예요! 도망 다니는 저를 기쁘게 쫓아와서 덥석 물어버렸답니다!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「傷痕は残りませんでしたが……うぅっ！\u3000今でも思い出しただけで背筋が凍りますわ。あの時は本当にお尻から食べられるかと！」"
translation = "「흉터는 남지 않았지만…… 으윽! 지금도 생각만 하면 등골이 오싹해요. 그때는 정말 엉덩이부터 먹히는 줄 알았다고요!」"

[[dialogue]]
speaker = "unk"
original = "なるほど、それで苦手に……？"
translation = "과연, 그래서 서툴러진 건가요……?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ええ……情けないでしょう？\u3000『<ruby>真昼の極星<rt>エトワール・イルソーレ</rt></ruby>』などと持て囃されておきながら、こんな子犬にも怖くて触れないのですわ……」"
translation = "「네…… 한심하죠? 『<ruby>진일의 극성<rt>에투알 일소레</rt></ruby>』라며 칭송받으면서, 이런 강아지도 무서워서 못 만지다니……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お、恐ろしくはありますが、この子が弱っているのもわかっています。雨に濡れて、震えて可哀想で……」"
translation = "「머, 무섭긴 하지만 이 아이가 약해져 있다는 건 알고 있어요. 비에 젖어 떨고 있는 게 가여워서……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「だ、だから緋宮会長をお呼びしたのですわ……抱き上げて、せめて濡れないところへ連れて行ってあげてくださいませんこと？」"
translation = "「그, 그래서 히노미야 회장을 부른 거랍니다…… 안아 올려서 적어도 비를 피할 수 있는 곳으로 데려가 주시지 않겠어요?」"

[[dialogue]]
speaker_original = "子犬"
speaker_translation = "강아지"
original = "「きゅぅ～～……！？」"
translation = "「낑……!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ど、どうしましたの？\u3000会長が手を伸ばしたら、急に怯えだしましたわ……！？」"
translation = "「어, 어떻게 된 거죠? 회장이 손을 뻗으니까 갑자기 겁을 먹었어요……!?」"

[[dialogue]]
speaker = "unk"
original = "もしかしたら前の飼い主が……"
translation = "어쩌면 전 주인이……"

[[dialogue]]
speaker = "unk"
original = "男性が怖いのかもしれませんね"
translation = "남성을 무서워하는 걸지도 모르겠네요."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そんなっ。では……どうすれば……？」"
translation = "「그럴 수가. 그럼…… 어떻게 하죠……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「わ──私が抱っこするんですの！？\u3000そんな、むむ、無理ですわっ……怖い、怖いですわ……！」"
translation = "「제── 제가 안는 건가요!? 그건, 무무, 무리예요…… 무서워요, 무섭단 말이에요……!」"

[[dialogue]]
speaker = "unk"
original = "俺もついていますから"
translation = "저도 곁에 있을 테니까요."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……わ、わかりましたわ。緋宮会長がいてくださるなら……ゆ、勇気を出して……」"
translation = "「……아, 알겠어요. 히노미야 회장이 계셔주신다면…… 요, 용기를 내서……」"

[[dialogue]]
speaker = "unk"
original = "恐る恐る……本当にゆっくりと、ヒルディー先輩がその両手に子犬を抱き上げる。"
translation = "조심조심…… 정말 천천히, 힐디 선배가 두 손으로 강아지를 안아 올린다."

[[dialogue]]
speaker_original = "子犬"
speaker_translation = "강아지"
original = "「くぅーん……♪\u3000かぷっ」"
translation = "「낑……♪ 냠」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ひっ！？\u3000指を噛まれ──あ、あれ……？\u3000痛くない、ですわ……？」"
translation = "「히익!? 손가락을 물── 어, 어라……? 아프지 않아요……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「これが……甘噛み、ですの？\u3000あ……甘えておりますのね、この子……？」"
translation = "「이것이…… 깨물기, 인가요? 아…… 애교를 부리는 거군요, 이 아이……?」"

[[dialogue]]
speaker_original = "子犬"
speaker_translation = "강아지"
original = "「きゅー……きゅー……かぷ、かぷ……<emoji=heart04>」"
translation = "「낑…… 낑…… 냠, 냠……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「と──」"
translation = "「저──」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「とっっっても……可愛いですわ……<emoji=heart04>」"
translation = "「저어어어엉말…… 귀여워요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふぅん。それで子犬を飼うことになったのね。名前は何て言うのかしら？」"
translation = "「후운. 그래서 강아지를 기르게 됐구나. 이름은 뭐라고 지었어?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「『千園寺ユニバース』ですわー！\u3000この子は我が流星寮の最年少メンバーであり、私の妹も同然！\u3000親しみを込めて『ユニ』とお呼びなさい！」"
translation = "「『센온지 유니버스』랍니다─! 이 아이는 우리 유성 기숙사의 최연소 멤버이자, 제 여동생이나 다름없어요! 친근하게 『유니』라고 부르세요!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「『<ruby>宇宙<rt>ユニバース</rt></ruby>』ってまた安直なネーミングね……メスでしょう？\u3000もっと可愛い名前を付けてあげればいいのに……」"
translation = "「『<ruby>우주<rt>유니버스</rt></ruby>』라니 또 단순한 네이밍이네…… 암컷이지? 좀 더 귀여운 이름을 지어주면 좋았을 텐데……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「というかあなたね、寮長が寮に動物を連れ込んだりしていいわけ？」"
translation = "「그보다 당신 말이야, 사장이 기숙사에 동물을 들여와도 되는 거야?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000<ruby>流星寮<rt>イルソーレ</rt></ruby>はもう１年以上前からペット可の物件でしてよ！」"
translation = "「오~홋홋홋! <ruby>유성 기숙사<rt>일소레</rt></ruby>는 벌써 1년 전부터 반려동물 가능 매물이었답니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ロビーや寮内も定期的な清掃が入りますし、希望者がいればペットホテルの業者様もすぐに呼べますわ！」"
translation = "「로비나 기숙사 내부도 정기적인 청소가 들어오고, 희망자가 있으면 펫 호텔 업체분들도 즉시 부를 수 있어요!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「相変わらず、どこからそんなお金が湯水のように湧き出てくるんだか……って、あら？」"
translation = "「여전하네, 어디서 그런 돈이 물 쓰듯 솟아나는 건지…… 어라?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ユニってば、床に寝転んでお腹を見せてるわ……フフ♪\u3000私への畏怖を全身でアピールしているのね？」"
translation = "「유니 녀석, 바닥에 드러누워서 배를 보여주고 있네…… 후후♪ 나에 대한 경외심을 온몸으로 어필하는구나?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「素直な子は好きよ。たっぷり撫でてあげるわ♪」"
translation = "「솔직한 아이는 좋아해. 듬뿍 쓰다듬어줄게♪」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ああっ、マム！\u3000ユニのお腹を独り占めするのはずるいですわよ！\u3000私もナデナデ……！」"
translation = "「아앗, 마무! 유니의 배를 독차지하는 건 치사해요! 저도 쓰담쓰담……!」"

[[dialogue]]
speaker_original = "ユニバース"
speaker_translation = "유니버스"
original = "「きゅぅ～～ん<emoji=heart04>」"
translation = "「낑……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000撫でるたびに可愛らしく鳴いて……でもよいですかユニ！\u3000貴女はもう千園寺の一員です！」"
translation = "「오~홋홋홋! 쓰다듬을 때마다 귀엽게 울고…… 하지만 알겠나요 유니! 당신은 이제 센온지의 일원입니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「己が雑種だということは忘れなさい！\u3000優雅かつゴージャスに！\u3000誇り高きワンコになるのですわっ！」"
translation = "「자신이 잡종이라는 사실은 잊으세요! 우아하고 고져스하게! 긍지 높은 멍멍이가 되는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "こうして捨てられていた子犬は『千園寺ユニバース』と名付けられ、流星寮でヒルディー先輩と共に暮らすようになるのだった──"
translation = "이렇게 버려졌던 강아지는 『센온지 유니버스』라는 이름을 얻어, 유성 기숙사에서 힐디 선배와 함께 살게 된 것이었다──"

