[[dialogue]]
speaker = "unk"
original = "第９話,九浄家メイド隊のお仕事,B"
translation = "제9화, 쿠죠 가 메이드대의 업무, B"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（また一段と大きなモノがうちの前に立ちはだかる。それでも、うちのやることは変わらない）"
translation = "(또다시 한층 더 커다란 녀석이 내 앞을 가로막는다. 그래도 내가 할 일은 변하지 않아.)"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（どんなモノだって、的確に弱点を突けば─）"
translation = "(어떤 것이든 정확하게 약점을 찌르면─)"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "（確実に、倒せる）"
translation = "(확실하게 쓰러뜨릴 수 있다.)"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「次……」"
translation = "「다음……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「美鶴！\u3000私の声、聞こえてる！？」"
translation = "「미츠루! 내 목소리 들려!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「……ん？」"
translation = "「……응?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「美鶴さん、戻ってきてください！」"
translation = "「미츠루 씨, 돌아와 주세요!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あ……メイド長、ヨミー。おはよ」"
translation = "「아…… 메이드장, 요미이. 안녕.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「寝ぼけてるの？\u3000一旦止まりなさい」"
translation = "「잠꼬대하니? 일단 멈추거라.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え……？\u3000あー、あー……そっか、うち、ずっと戦ってたんだっ──いたたた……！？\u3000体バッキバキなんだけど」"
translation = "「어……? 아ー, 아ー…… 그렇구나, 나 계속 싸우고 있었네── 아야야야……!? 몸이 으스러질 것 같은데.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あれだけのスピードで、あれだけの数を相手にしてたら当たり前でござるよ」"
translation = "「그만한 속도로 그만한 수를 상대하고 있었다면 당연한 일이오.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「生きてるのが不思議なくらいです……生きてますよね？\u3000お化けとかじゃないですよね？」"
translation = "「살아있는 게 신기할 정도예요…… 살아있는 거 맞죠? 유령 같은 거 아니죠?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「……うち、そんなスゴかった？」"
translation = "「……나 그렇게 대단했어?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「自覚ないんですか！？\u3000八面六臂の大活躍でしたよ」"
translation = "「자각 없으세요!? 팔면육비의 대활약이었어요.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「やー……うち、没頭しちゃうと周りのことがよくわかんなくなるんで」"
translation = "「야아…… 나, 몰두해 버리면 주변 일을 잘 모르게 돼서.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「とにかく、目の前の敵を片っ端からぶっ刺してたと思うんだけど……途中の記憶が、あんまないね」"
translation = "「어쨌든 눈앞의 적을 닥치는 대로 찔러버렸던 것 같은데…… 중간 기억이 별로 없네.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「呆れたものね。今みたいな『ゾーン』に入ることはよくあるの？」"
translation = "「어이가 없구나. 방금 같은 『존』에 들어가는 일이 자주 있니?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「服作ってると、よくありますね。時間を忘れて夢中で縫ってたら、外が明るくなってた、みたいな」"
translation = "「옷 만들고 있으면 자주 있어. 시간 가는 줄 모르고 정신없이 꿰매다 보면 밖이 밝아져 있다든가 하는 식으로.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「無我の境地というヤツでござるか？\u3000格好いいでござるぅ……せつなも会得したいでござるよ！\u3000美鶴殿、ご教授くだされ！」"
translation = "「무아의 경지라는 것이오? 멋지오…… 세츠나도 터득하고 싶소! 미츠루 공, 가르침을 주시오!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「やめときなさい。美鶴ほどの没頭、誰にでもできるようなものじゃないわ。特にあなたみたいな煩悩まみれじゃね」"
translation = "「그만두거라. 미츠루 정도의 몰입은 아무나 할 수 있는 게 아니야. 특히 너처럼 번뇌로 가득한 녀석은 더더욱.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「酷い言われようでござるぅ」"
translation = "「너무한 말씀이오.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「誰にでもできるもんじゃないんすか……ま、なんでもいーや。うちがみんなの役に立てたんならバンバンザイ」"
translation = "「아무나 할 수 있는 게 아니었구나…… 뭐, 아무래도 좋아. 내가 모두에게 도움이 됐다면 만사형통.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「世の中の全部に興味なさそうな顔しといて……何よ、あなたの胸にも熱いモノがあるのね」"
translation = "「세상만사에 관심 없다는 얼굴을 하고선…… 뭐야, 네 가슴에도 뜨거운 것이 있구나.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「うちの胸？\u3000おっぱい？\u3000メイド長のえっち」"
translation = "「내 가슴? 찌찌? 메이드장 변태.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ハートよ、ハート！\u3000文脈で察しなさいよ！」"
translation = "「하트다, 하트! 문맥으로 파악하거라!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「えっちでござるか！？」"
translation = "「변태인 것이오!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そこだけに反応するんじゃないの、エロ忍者！」"
translation = "「거기에만 반응하지 마, 에로 닌자!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「わかってますって、メイド長」"
translation = "「알고 있어요, 메이드장.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも、ハートがメラメラしてんのを認めるのって……ちょっと恥ずいじゃないですか」"
translation = "「하지만 하트가 이글거리는 걸 인정하는 건…… 좀 부끄럽잖아요.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふ、何を恥ずかしがることがあるのよ。バカね」"
translation = "「후후, 뭘 부끄러워하는 거니. 바보 같기는.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「キツい戦いだったけど、あなたの人間味に触れられたのは大きな収穫だわ」"
translation = "「힘든 싸움이었지만, 네 인간미를 접한 건 큰 수확이야.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「美鶴さん、格好良かったですよ。先ほどの戦いぶり、鬼神が如しでした！」"
translation = "「미츠루 씨, 멋있었어요. 방금 전의 싸우는 모습은 마치 귀신 같았습니다!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様に次ぐほどの美しさでした。戦闘中ということも忘れて、見惚れてしまいそうでしたよ」"
translation = "「아가씨 다음갈 정도로 아름다웠습니다. 전투 중이라는 것도 잊고 넋을 잃고 볼 뻔했어요.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「なに、みんなして、うちのこと褒め殺すつもり？\u3000てか、まだ全部片づいてないみたいなんだけど」"
translation = "「뭐야, 다들 나를 칭찬해서 죽일 셈이야? 그보다 아직 다 정리되지 않은 것 같은데.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えええ！？\u3000今たくさん倒したはずなんですけど！？」"
translation = "「에에에!? 방금 그렇게 많이 쓰러뜨렸는데 말인가요!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「大量の増援部隊が即湧きだなんて、バランス崩壊もいいとこでござるな」"
translation = "「대량의 증원 부대가 즉시 생성되다니, 밸런스 붕괴도 정도가 있소.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「しゃーない。もうひと働き──あれ？\u3000体が動かない」"
translation = "「어쩔 수 없지. 한 번 더 일해 볼까── 어라? 몸이 안 움직여.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あれだけ暴れてたなら反動が来て当然でしょ。無茶をしたら、それなりの代償があるものよ」"
translation = "「그렇게 날뛰었으니 반동이 오는 게 당연하잖니. 무리를 하면 그만한 대가가 따르는 법이야.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「こりゃ明日は１００パー筋肉痛だー。ベッドから動けなくなるヤツー」"
translation = "「이거 내일 100퍼센트 근육통이다ー. 침대에서 못 움직이는 녀석이다ー.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「明日はゆっくり休んでていいですよ。美鶴さんの仕事は、私たちが代わりにやりますんで」"
translation = "「내일은 푹 쉬셔도 돼요. 미츠루 씨의 일은 저희가 대신 할 테니까요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ただし、私たちが無事に今を乗り越えて、明日を迎えられれば、ですけどね」"
translation = "「단, 저희가 무사히 지금을 이겨내고 내일을 맞이할 수 있다면 말이죠.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「部下のあなたがあれだけの仕事をしてくれたんだもの。私ももっと働かなきゃメイド長の名折れだわ」"
translation = "「부하인 네가 그만한 일을 해줬는걸. 나도 더 일하지 않으면 메이드장의 이름이 아깝지.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ちょっとうるさいだろうけど、そこでしばらく休んでいなさい。その間くらいは私たちで持ちこたえてあげるから」"
translation = "「조금 시끄럽겠지만 거기서 잠시 쉬고 있거라. 그동안은 우리가 버텨줄 테니까.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「メイド長、カッコよ」"
translation = "「메이드장, 멋져.」"

[[dialogue]]
speaker = "？？？"
original = "「ふふ。ならば、私は蘭美以上に気張らなくてはなるまい」"
translation = "「후후. 그렇다면 나는 라비 이상으로 힘을 내야겠구나.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「貴殿らを預かる当主としてな。ヘレナちゃん、颯爽と登場だ」"
translation = "「그대들을 맡은 당주로서 말이다. 헬레나짱, 늠름하게 등장이다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ご当主様！？」"
translation = "「당주님!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「よくここまで支えてくれた、メイド隊たちよ。貴殿らを召し抱えることができたことこそ私の自慢だ」"
translation = "「여기까지 잘 버텨주었도다, 메이드대여. 그대들을 거느릴 수 있게 된 것이야말로 나의 자랑이로다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これが貴殿らが仕える九浄家当主の力だ。とくと目に焼きつけよ！」"
translation = "「이것이 그대들이 섬기는 쿠죠 가 당주의 힘이니라. 똑똑히 눈에 새기도록 하거라!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「花よ集え、豪華絢爛！」"
translation = "「꽃들이여 모여라, 호화찬란!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「う、うわぁ……敵勢力壊滅でござる……！」"
translation = "「우, 우와아…… 적 세력 괴멸이오……!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「もう全部、当主様だけで良かったじゃん」"
translation = "「그냥 전부 당주님 혼자서 해도 됐잖아.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それを言ってはおしまいな気がします」"
translation = "「그 말을 하면 끝인 것 같은 기분이 들어요.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「遅れてしまってすまない。どうしてもあの場を離れられなかったものでな」"
translation = "「늦어서 미안하구나. 아무래도 그 자리를 떠날 수 없었느니라.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「大活躍だったようだな、美鶴」"
translation = "「대활약이었다더구나, 미츠루.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「そーですね。今回ばかりはさすがに頑張りすぎましたよー」"
translation = "「그렇네요. 이번만큼은 정말 너무 열심히 해버렸어요ー.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「働きぶりを査定していただけるなら、特別ボーナスいただけたりしますー？」"
translation = "「일한 걸 사정해 주신다면 특별 보너스 같은 걸 주실 수 있나요ー?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ちょっ！？\u3000ご当主様のアレを見ておいて、よくそんな口叩けるものね……！」"
translation = "「잠깐!? 당주님의 저걸 보고도 잘도 그런 소리가 나오는구나……!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふ、いいとも」"
translation = "「후후, 좋도다.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「え、マジすか。言ってみるもんですね」"
translation = "「에, 진짜예요? 말해 보길 잘했네.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヴィーナスが無事に帰還した記念でもある。皆にも振る舞うとしよう」"
translation = "「비너스가 무사히 귀환한 기념이기도 하니라. 모두에게도 베풀도록 하지.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「それはおめでた……ん？\u3000んんん？」"
translation = "「그거 축하할…… 응? 응응응?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「当主様、今、なんと！？\u3000お嬢様が！？\u3000戻られた！？\u3000しれっと爆弾発言されましたね！？」"
translation = "「당주님, 지금 뭐라고!? 아가씨께서!? 돌아오셨다고요!? 아무렇지 않게 폭탄 발언을 하셨네요!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふ、皆に朗報だ。ヴィーナスは無事に帰還した。さすがは我が娘。もちろん、元より心配などしていなかったがな」"
translation = "「후후, 모두에게 낭보로다. 비너스는 무사히 귀환했느니라. 과연 내 딸이로다. 물론 처음부터 걱정 따위는 하지 않았지만 말이다.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「つまり、到着が遅れられたのは……？」"
translation = "「즉, 도착이 늦으신 이유는……?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。ヴィーナス帰還の報を受けていたためだ。一刻も早く駆け付けたかったのだが、場を離れられなくてな」"
translation = "「음. 비너스 귀환 소식을 듣고 있었기 때문이니라. 한시라도 빨리 달려오고 싶었으나 자리를 뜰 수 없었느니라.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お、お、お嬢様ぁあぁぁぁぁっ……ご無事で、良かった……！\u3000それで？\u3000お嬢様は何処へ！？」"
translation = "「아, 아, 아가씨이이이이잇…… 무사하셔서 다행이에요……! 그래서? 아가씨는 어디에!?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヴィーナス、並びに緋宮クロトたちは、アポロ打倒のため、フィーニスの塔へと向かった」"
translation = "「비너스, 그리고 히노미야 쿠로토 일행은 아폴로를 타도하기 위해 피니스의 탑으로 향했느니라.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「こんな街中の小競り合いじゃなくて、世界の命運をかけた戦い、ですね」"
translation = "「이런 마을 안의 소규모 다툼이 아니라, 세계의 운명을 건 싸움이군요.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。世界の命運は、ヴィーナスたちに託された」"
translation = "「음. 세계의 운명은 비너스 일행에게 맡겨졌도다.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「さぁ、皆さん！\u3000お嬢様たちが後顧の憂いなく戦えるよう、全力を尽くしましょう！」"
translation = "「자, 여러분! 아가씨 일행이 뒤 걱정 없이 싸울 수 있도록 전력을 다합시다!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「閃殿、お嬢様が無事だと分かった途端、すこぶる元気になったでござるな」"
translation = "「센 공, 아가씨가 무사하다는 걸 알자마자 굉장히 기운차졌소.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「閃さんには、お嬢様の存在が何よりのカンフル剤ですからね」"
translation = "「센 씨에게는 아가씨의 존재가 무엇보다도 강력한 각성제니까요.」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「おかげで、うちも立ち上がるくらいはできそ。このままおねんねしてるワケには行かないね」"
translation = "「덕분에 나도 일어날 정도는 할 수 있을 것 같아. 이대로 잠만 자고 있을 수는 없지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「九浄家メイド隊、全隊員に命ずる！\u3000残存アステラをひとつ残らず掃討せよ！」"
translation = "「쿠죠 가 메이드대, 전 대원에게 명하노라! 남은 아스테라를 단 하나도 남김없이 소탕하거라!」"

[[dialogue]]
speaker_original = "九浄家メイド隊"
speaker_translation = "쿠죠 가문 메이드대"
original = "「了解っ！」"
translation = "「라져!」"

