[[dialogue]]
speaker = "unk"
original = "第１話,キサナの気まぐれ,P"
translation = "제1화, 키사나의 변덕, P"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ったく逃亡生活も楽じゃねえな。どこ行っても新星だか流星だかの制服がうろちょろしてやがる」"
translation = "「참 나, 도망 생활도 편하지 않구만. 어디를 가도 신성인지 유성인지 하는 교복들이 얼쩡거리고 자빠졌으니」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「とにかく今日の寝床寝床っと。お、丁度良いところに空き家があんじゃねえか」"
translation = "「어쨌든 오늘 잘 곳 잘 곳이라고. 오, 마침 좋은 곳에 빈집이 있잖아」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ここならしばらく身を隠せ────ん？」"
translation = "「여기라면 당분간 몸을 숨길──── 응?」"

[[dialogue]]
speaker = "unk"
original = "コラプサーによる襲撃事件後、姿をくらましたキサナという女の子を探して街を見回っていた。"
translation = "콜랩서에 의한 습격 사건 이후, 모습을 감춘 키사나라는 여자아이를 찾아 거리를 둘러보고 있었다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、こんな真っ昼間から出歩いているはずが──"
translation = "그렇다고는 해도 이런 대낮부터 돌아다니고 있을 리가──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「わーったか？\u3000この街なら飯なんか漁ろうと思えばいくらでも漁れんだよ。しかもこんな上等なもんをな」"
translation = "「알았냐? 이 거리라면 밥 같은 건 뒤지려고 마음만 먹으면 얼마든지 뒤질 수 있다고. 게다가 이런 상등품을 말이지」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「つかこの街は一体どーなってんだ。まだ食える弁当を平気で捨てやがって。マジでムカつくぜ」"
translation = "「그나저나 이 거리는 대체 어떻게 된 거야. 아직 먹을 만한 도시락을 아무렇지도 않게 버리고 지랄이야. 진짜 빡치게」"

[[dialogue]]
speaker = "unk"
original = "いた！？"
translation = "찾았다!?"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ？\u3000テメエ、魔王じゃねえか。チッ、やっぱ鉢合わせちまったか。だからこんな明るいうちに出歩くのは嫌だったんだ」"
translation = "「아? 새끼야, 마왕이잖아. 칫, 역시 마주쳐 버렸나. 그래서 이런 밝을 때 돌아다니는 건 싫었다고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「見逃してくれるわけは……ねえわな。ったく面倒なことになっちまったぜ。柄にもねえことするもんじゃねえな」"
translation = "「못 본 척해 줄 리는…… 없겠지. 참 나, 귀찮게 됐구만. 어울리지도 않는 짓은 하는 게 아니네」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おい、ガキ。弁当持って先に戻っとけ。あ、ステーキ弁当は食うなよ？\u3000そりゃアタシんだからな？\u3000それ以外は好きに食っちまっていいからよ」"
translation = "「야, 꼬맹이. 도시락 들고 먼저 돌아가 있어. 아, 스테이크 도시락은 먹지 마라? 그건 내 거니까. 그거 말고는 마음대로 처먹어도 되니까」"

[[dialogue]]
speaker = "unk"
original = "その小さな女の子は……"
translation = "그 작은 여자아이는……"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あん？\u3000別に攫ってきたわけじゃねえよ」"
translation = "「앙? 딱히 납치해 온 건 아니라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「空き家同然の家に忍び込んだらコイツが部屋の隅で丸まってやがったんだ」"
translation = "「빈집이나 다름없는 집에 숨어들었더니 이 녀석이 방구석에서 웅크리고 있었거든」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「どこの国にもいるもんだな。平気でテメエのガキほっぽり出して消える親ってのは」"
translation = "「어느 나라에나 있는 모양이군. 아무렇지도 않게 지 새끼 내팽개치고 사라지는 부모라는 건」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「聞いた話じゃあ、男と出て行ったきり何日も家に帰ってきてねーんだとよ」"
translation = "「들은 바로는 남자랑 나간 뒤로 며칠이나 집에 안 들어오고 있다더군」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「そりゃ家も空き家に見えるってもんだ。テメエのガキの面倒くらい最後まで見ろっての」"
translation = "「그러니 집도 빈집처럼 보일 수밖에. 지 새끼 뒷바라지 정도는 끝까지 하란 말이야」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「このガキときたら、全然喋らねえくせに腹の虫はぐぅぐぅとうるせぇし。眠れねえったらありゃしねえ」"
translation = "「이 꼬맹이로 말할 것 같으면 전혀 말도 안 하는 주제에 뱃속 벌레는 꼬르륵하고 시끄럽고 말이야. 잠도 못 자겠더라니까」"

[[dialogue]]
speaker = "unk"
original = "それでその子のために弁当を？"
translation = "그래서 그 아이를 위해 도시락을?"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハッ、ついでだ、ついで。アタシも飯食わなきゃ生きてけねえからな。この街の地理もまだよくわかってねえからよ」"
translation = "「핫, 겸사겸사다, 겸사겸사. 나도 밥을 먹어야 살 수 있으니까 말이지. 이 거리 지리도 아직 잘 모르기도 하고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「宿と街の案内の駄賃代わりってとこだ。これでも借りは返す主義なんだよ」"
translation = "「숙박비랑 거리 안내 값 대신이라고 해 두지. 이래 봬도 빚은 갚는 주의라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「で……やんのかやらねえのかどっちだ？\u3000お優しい魔王さまがガキに免じて見逃してくれるのを期待してんだけどな？」"
translation = "「그래서…… 할 거야 말 거야 어느 쪽이냐? 친절하신 마왕 나으리가 꼬맹이를 봐서 못 본 척해 주길 기대하고 있는데 말이지?」"

[[dialogue]]
speaker = "unk"
original = "その子の保護が最優先だ"
translation = "그 아이의 보호가 최우선이다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「保護だ？\u3000正義の味方さまが何してくれるってんだよ？\u3000困ってる子どもは放っておけないってか」"
translation = "「보호라고? 정의의 사자 나으리가 뭘 해 주겠다는 건데? 곤란한 아이는 내버려 둘 수 없다 이건가」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「──施設に預ける？\u3000ふざけてんじゃねえぞ、偽善者が。そういう態度がムカつくんだよ」"
translation = "「──시설에 맡긴다고? 웃기지 마라, 위선자 새끼가. 그런 태도가 빡친다고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「テメエの道楽にコイツを巻き込んでんじゃねえよ。他人に任せても何も変わらねえ」"
translation = "「네 취미에 이 녀석을 휘말리게 하지 마. 남한테 맡겨봤자 아무것도 안 변해」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「せいぜい体を丸める場所があの家からその施設に変わるだけじゃねえか。その施設っつーのは、コイツにどれだけのことをするっつーんだよ？」"
translation = "「기껏해야 몸을 웅크릴 장소가 그 집에서 그 시설로 바뀔 뿐이잖아. 그 시설이라는 건 이 녀석한테 얼마나 대단한 걸 해 준다는 건데?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「どーせ何もしねえ。いいや、何もしねえどころか、良いように使われて終わりだ」"
translation = "「어차피 아무것도 안 해. 아니, 아무것도 안 하는 것뿐만 아니라, 좋은 대로 써먹고 버려질 뿐이라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシはな、今までずっと見てきたんだ」"
translation = "「나는 말이지, 지금까지 줄곧 봐 왔단 말이다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「泥水啜って生きてるようなアタシらに、善人ぶって近づいてきて、甘い言葉で惑わして、ついて行ったら最後、使い捨てにして高笑いするクソ野郎どもをよ」"
translation = "「흙탕물 마시며 살고 있는 우리한테 착한 척 다가와서 달콤한 말로 현혹하고, 따라갔다간 결국 소모품 취급하며 비웃는 쓰레기 같은 놈들을 말이야」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「そんなヤツらんとこに行かせるくらいなら、１人で生きていく術を身につけさせた方がよっぽどマシだ」"
translation = "「그런 놈들한테 보낼 바엔 혼자 살아가는 법을 익히게 하는 게 훨씬 낫다고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「この街はまだ食える弁当すら捨てちまうような街だしな。家から出さえすりゃいくらでも食いもんにありつける」"
translation = "「이 거리는 아직 먹을 수 있는 도시락조차 버리는 거리니까 말이야. 집 밖으로 나가기만 하면 얼마든지 먹을 걸 찾을 수 있어」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「だいたいテメエみてえなヤツが一番タチわりいんだよ。後先考えねえで、正しいことしてますって面でしゃしゃり出て来やがって」"
translation = "「애초에 너 같은 놈들이 제일 질이 안 좋아. 앞뒤 생각 안 하고 옳은 일 하고 있다는 면상으로 참견하고 자빠졌으니」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あーイライラするぜ。やっぱ一発ぶん殴──ふにゃっ！？」"
translation = "「아- 짜증 나네. 역시 한 대 갈겨── 후냐앗!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オマっ、ガキっ、どこ触って──はにゃっ！？\u3000バカ、やめろ、尻尾握るんじゃねえっ……！」"
translation = "「너 이, 꼬맹이, 어디를 만져── 하냐앗!? 바보야, 하지 마, 꼬리 잡지 마……!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「つか先に戻っとけって言ったじゃねえかっ。……はぁ？\u3000一緒に食べる？\u3000先に食いたきゃ食えっつったろっ」"
translation = "「그보다 먼저 돌아가 있으라고 했잖아. ……하아? 같이 먹자고? 먼저 먹고 싶으면 먹으라고 했잖아」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ちょっ、ひにゃっ……！？\u3000尻尾引っ張んなっ……！\u3000わかった行くっ、アタシも一緒に戻りゃいいんだろうがっ……！」"
translation = "「잠깐, 히냐앗……!? 꼬리 잡아당기지 마……! 알았어 간다, 나도 같이 돌아가면 될 거 아냐……!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チッ……つーわけだから行かせてもらうぜ？\u3000テメエの言うことなんざ信用できねえしな」"
translation = "「칫…… 그렇게 됐으니 이만 가 보지. 네 말 같은 건 신용할 수 없으니까 말이야」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それともここでやるか？\u3000腹に風穴空いても知らねえぞ？」"
translation = "「아니면 여기서 할까? 배에 구멍 나도 난 모른다?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシの力はテメエもよく知って──ひぃあっ！？\u3000オマっ、メンチ切ってる時に尻尾引っ張るんじゃねえっ……！！」"
translation = "「내 힘은 너도 잘 알── 히익!? 너 이, 기싸움 하는 중에 꼬리 잡아당기지 마……!!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「きゃふっ、んふっ、わかった、わかったからっ……！\u3000あーくそっ、とにかく追いかけてくんじゃねえぞ魔王っ……！」"
translation = "「캬흣, 응흣, 알았어, 알았으니까……! 아- 젠장, 아무튼 쫓아오지 마라 마왕……!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ったく、このガキは……。あ？\u3000ステーキ弁当だけは譲らねえっつってんだろ。アタシの大好物なんだよ」"
translation = "「참 나, 이 꼬맹이는……. 아? 스테이크 도시락만은 양보 못 한다고 했잖아. 내가 제일 좋아하는 거라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んひぃあっ……！\u3000テメ、ゴラっ、一切れだけだからな、畜生っ……！\u3000調子に乗ってっとぶっとばすぞっ」"
translation = "「응히익……! 야 이, 인마, 딱 한 조각뿐이다, 제기랄……! 기어오르면 날려버린다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「そーだ、飯食ったら水浴びしに行くぞ。昨日、庭に噴水のあるデケえ建物を見つけてな」"
translation = "「맞다, 밥 먹으면 씻으러 갈 거야. 어제 정원에 분수가 있는 커다란 건물을 찾았거든」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「は？\u3000流星学園？\u3000んだよ、んじゃ無理じゃねえか。危うく敵地に水浴びしに行くとこだったぜ……」"
translation = "「하? 유성학원? 뭐야, 그럼 안 되잖아. 하마터면 적진에 씻으러 갈 뻔했네……」"

[[dialogue]]
speaker = "unk"
original = "根っからの悪人ってわけでも……ないのか？"
translation = "천성적으로 악인인 것도…… 아닌가?"

