[[dialogue]]
speaker = "unk"
original = "第８話,ベガの記憶,B"
translation = "제8화, 베가의 기억, B"

[[dialogue]]
speaker = "ジグ"
original = "「私の勝ちだよ、アガサ。これで次の星徒会長は私だね」"
translation = "「나의 승리다, 아가사. 이걸로 다음 성도회장은 나네.」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……私の……負けだ」"
translation = "「큭…… 나의…… 패배다.」"

[[dialogue]]
speaker = "ジグ"
original = "「まぁ、元々私が会長の指名を受けていたんだけど」"
translation = "「뭐, 원래부터 내가 회장 지명을 받았었지만.」"

[[dialogue]]
speaker = "ジグ"
original = "「君が星徒会長は最強であるべきだと言うものだから、こうして御前試合じみた模擬戦を受けたんだ。結局、結果は変わらなかったね」"
translation = "「네가 성도회장은 최강이어야 한다고 말하길래, 이렇게 어전시합 같은 모의전을 받아준 거야. 결국 결과는 바뀌지 않았네.」"

[[dialogue]]
speaker = "梨緒"
original = "「うっ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "ジグ"
original = "「じゃあ、副会長はよろしくね、アガサ」"
translation = "「그럼 부회장은 잘 부탁해, 아가사.」"

[[dialogue]]
speaker = "梨緒"
original = "「は……？\u3000慰めのつもりか？」"
translation = "「하……? 위로할 셈인가?」"

[[dialogue]]
speaker = "ジグ"
original = "「いいや。慰めなんかじゃないよ」"
translation = "「아니. 위로 같은 게 아니야.」"

[[dialogue]]
speaker = "ジグ"
original = "「星徒会長は最も強い星騎士がなるものだ。では副会長はその次に強い星騎士がなるべきだろう？」"
translation = "「성도회장은 가장 강한 성기사가 되는 법. 그렇다면 부회장은 그다음으로 강한 성기사가 되어야 하지 않겠어?」"

[[dialogue]]
speaker = "ジグ"
original = "「だから私は、君を副会長として任命するよ」"
translation = "「그러니까 나는 너를 부회장으로 임명하겠어.」"

[[dialogue]]
speaker = "梨緒"
original = "「……情けのつもりなら受ける気はなかったが、了承した」"
translation = "「……동정이라면 받을 생각은 없었지만, 수락하지.」"

[[dialogue]]
speaker = "梨緒"
original = "「だが君が会長として不甲斐ない様を見せたら、容赦なくその座を奪わせてもらうからな」"
translation = "「하지만 네가 회장으로서 한심한 모습을 보인다면, 가차 없이 그 자리를 빼앗아 줄 테니까.」"

[[dialogue]]
speaker = "ジグ"
original = "「はは、それは気が抜けないな」"
translation = "「하하, 그거 긴장 늦출 수 없겠네.」"

[[dialogue]]
speaker = "ジグ"
original = "「うん、アガサはそれでいいよ。私が油断しないように、目を光らせておいてくれ」"
translation = "「응, 아가사는 그러면 돼. 내가 방심하지 않도록 잘 감시해 줘.」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……負けた……。紅茶には自信があったのに……」"
translation = "「큭…… 졌다……. 홍차에는 자신 있었는데……」"

[[dialogue]]
speaker = "ジグ"
original = "「私のコーヒーの勝利だ。ま、厳正な審査の結果だから仕方ないね」"
translation = "「내 커피의 승리네. 뭐, 엄정한 심사 결과니까 어쩔 수 없지.」"

[[dialogue]]
speaker = "梨緒"
original = "「いつの間にコーヒーを淹れられるようになったんだ……！？\u3000ジグがコーヒーを淹れているところなんて見たことなかったのに、どうやって……？」"
translation = "「언제 그렇게 커피를 내릴 수 있게 된 거냐……!? 지그가 커피를 내리는 모습 따위 본 적도 없는데, 어떻게……?」"

[[dialogue]]
speaker = "ジグ"
original = "「まぁ、勘かな」"
translation = "「뭐, 감이랄까.」"

[[dialogue]]
speaker = "梨緒"
original = "「勘！？\u3000そんなわけあるか！」"
translation = "「감!? 그럴 리가 있나!」"

[[dialogue]]
speaker = "梨緒"
original = "「きっと何かの間違いだ！\u3000私にも飲ませてみろ！\u3000……ごくっ」"
translation = "「분명 뭔가 잘못된 거다! 나도 마셔보게 해 줘! ……꿀꺽.」"

[[dialogue]]
speaker = "梨緒"
original = "「～～～っ……！\u3000お、美味しい……！」"
translation = "「~~~~윽……! 마, 맛있어……!」"

[[dialogue]]
speaker = "梨緒"
original = "「負けた……完敗だ……」"
translation = "「졌다…… 완패다……」"

[[dialogue]]
speaker = "ジグ"
original = "「乾杯とかけてる？」"
translation = "「건배랑 발음 섞은 거야?」"

[[dialogue]]
speaker = "梨緒"
original = "「かけてない！！」"
translation = "「안 섞었어!!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「何、今の記憶？\u3000いやアリーナで模擬戦してるのは、星徒会長を決める勝負なのはわかったけど」"
translation = "「뭐야, 방금 그 기억? 아니, 아레나에서 모의전 하는 건 성도회장을 정하는 승부라는 건 알겠는데.」"

[[dialogue]]
speaker = "梨緒"
original = "「私の紅茶とジグのコーヒーで勝負した時の記憶だ」"
translation = "「내 홍차와 지그의 커피로 승부했을 때의 기억이다.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ほんと何してんのさ」"
translation = "「정말 뭐 하는 거야.」"

[[dialogue]]
speaker = "梨緒"
original = "「言っただろう。私が淹れた紅茶と、ジグが淹れたコーヒー、どちらの味がいいか勝負していたんだ」"
translation = "「말했지 않나. 내가 내린 홍차와 지그가 내린 커피, 어느 쪽 맛이 더 좋은지 승부하고 있었다고.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ベガって滅亡するくらいヤバかったんじゃないの？」"
translation = "「베가는 멸망할 정도로 위험했던 거 아니었어?」"

[[dialogue]]
speaker = "梨緒"
original = "「全てが全て戦いの記憶だったわけじゃない。リクリエが本格化する前は、ちゃんと日常もあった」"
translation = "「모든 게 전부 싸움의 기억이었던 건 아니다. 리크리에가 본격화되기 전에는 제대로 된 일상도 있었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「私にとっては忘れたくても忘れられない敗北の記憶だがな……！」"
translation = "「나에게 있어서는 잊고 싶어도 잊을 수 없는 패배의 기억이지만 말이다……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どーでもいー。心底どーでもいー。あ、どうでもよすぎて２回言っちゃった」"
translation = "「상관없어. 진심으로 상관없어. 아, 너무 상관없어서 두 번 말해버렸네.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ジグはよく毎回勝負に付き合ってくれたね。ジグのことはいけ好かないけど、ちょっと同情するよ」"
translation = "「지그는 참 매번 승부에 잘 어울려 줬네. 지그가 맘에 안 들긴 하지만, 조금 동정심이 생겨.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、このくらいの記憶ならどうってことないし、さっさと先に──」"
translation = "「뭐, 이 정도 기억이라면 별거 아니니까 어서 앞으──」"

[[dialogue]]
speaker = "フェアリー"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、また出た」"
translation = "「아, 또 나왔다.」"

[[dialogue]]
speaker = "フェアリー"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「さて、今度は何を見せられることやら」"
translation = "「자, 이번엔 뭘 보여주려나.」"

[[dialogue]]
speaker = "梨緒"
original = "「この前の中間テスト……私は５教科合わせて４８５点だ！\u3000どうだ、ジグ！」"
translation = "「이번 중간고사…… 나는 5과목 합쳐서 485점이다! 어떠냐, 지그!」"

[[dialogue]]
speaker = "ジグ"
original = "「平均９７点か。やるね、アガサ。ちなみに私はこの通り」"
translation = "「평균 97점이네. 대단해, 아가사. 참고로 나는 이래.」"

[[dialogue]]
speaker = "梨緒"
original = "「どれどれ……全教科１００点！？\u3000そんなバカな！？」"
translation = "「어디 보자…… 전 과목 100점!? 그런 말도 안 되는 일이!?」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……負けた……！\u3000昨日のアステラ討伐でも、モンスターの撃破数で負けたばかりなのに……」"
translation = "「큭…… 졌다……! 어제 아스테라 토벌에서도 몬스터 격파 수로 졌는데……」"

[[dialogue]]
speaker = "ジグ"
original = "「また私の勝ちだね。これで５００勝目かな？」"
translation = "「또 나의 승리네. 이걸로 500승째인가?」"

[[dialogue]]
speaker = "梨緒"
original = "「まだ４９６敗目だ！\u3000次は……次こそは勝つからな！」"
translation = "「아직 496패째다! 다음은…… 다음번엔 반드시 이길 테니까!」"

[[dialogue]]
speaker = "ジグ"
original = "「ふふ、楽しみにしているよ♪」"
translation = "「후후, 기대하고 있을게♪」"

[[dialogue]]
speaker = "ジグ"
original = "「新星学園へ通信連絡。こちらレナーテ・Ｚ・サイフリート」"
translation = "「신성학원으로 통신 연락. 여기는 레나테 Z 자이프리트.」"

[[dialogue]]
speaker = "ジグ"
original = "「うん、モンスターの討伐は完了したよ。星徒会に被害はない。だけど──」"
translation = "「응, 몬스터 토벌은 완료했어. 성도회에 피해는 없어. 하지만──」"

[[dialogue]]
speaker = "梨緒"
original = "「うぅっ……間に合わなかった……」"
translation = "「으으…… 늦어버렸어……」"

[[dialogue]]
speaker = "ジグ"
original = "「一般人と、初期対応にあたった星騎士に犠牲者が出た。保健委員も懸命に救護しようとしてくれたが……手の施しようがなかった」"
translation = "「일반인과 초기 대응에 나섰던 성기사 중에 희생자가 발생했다. 보건 위원도 필사적으로 구호하려 했지만…… 손을 쓸 방도가 없었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「対応してくれた星騎士は、昨日校門で挨拶したばかりだった……」"
translation = "「대응해 준 성기사는 어제 교문에서 막 인사를 나눴던 사람이었는데……」"

[[dialogue]]
speaker = "梨緒"
original = "「一般人の犠牲者の中には小さな子どももいた。家族もろとも、モンスターに<ruby>轢<rt>ひ</rt></ruby>き潰された……」"
translation = "「일반인 희생자 중에는 어린아이도 있었다. 가족과 함께 몬스터에게 깔려 뭉개졌어……」"

[[dialogue]]
speaker = "ジグ"
original = "「……ああ、残念だ。本当に」"
translation = "「……아아, 유감이야. 정말로.」"

[[dialogue]]
speaker = "ジグ"
original = "「流星市国の内外で、モンスターの犠牲者が相次いでいる」"
translation = "「유성시국 안팎에서 몬스터 희생자가 잇따르고 있어.」"

[[dialogue]]
speaker = "ジグ"
original = "「最近出現したモンスターは非常に高い攻撃力と凶暴性を持っていた。おそらく、この傾向は一過性のものではないだろう」"
translation = "「최근 출현한 몬스터는 매우 높은 공격력과 흉포성을 가지고 있었어. 아마 이 경향은 일시적인 게 아니겠지.」"

[[dialogue]]
speaker = "梨緒"
original = "「リクリエが近づいているから……？」"
translation = "「리크리에가 다가오고 있기 때문에……?」"

[[dialogue]]
speaker = "ジグ"
original = "「きっとそうだね。リクリエが本格的に近づいてくるにつれて、モンスターはより強力になり、出現頻度も上がっていくだろう」"
translation = "「분명 그럴 거야. 리크리에가 본격적으로 다가옴에 따라 몬스터는 더욱 강력해지고 출현 빈도도 올라가겠지.」"

[[dialogue]]
speaker = "梨緒"
original = "「これからも、こんなことが起こるのか……！\u3000今よりももっとたくさんの犠牲が……」"
translation = "「앞으로도 이런 일이 일어나는 건가……! 지금보다 훨씬 더 많은 희생이……」"

[[dialogue]]
speaker = "梨緒"
original = "「うぅ……くぅぅっ……！」"
translation = "「으으…… 끄으윽……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ、思ったより効くなぁ……。ごめん、何か言ってあげたいんだけど、何も思い付かないや」"
translation = "「하아, 생각보다 타격이 크네……. 미안, 뭐라도 말해주고 싶은데 아무것도 안 떠올라.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「状況的に余裕がないからこれだけ聞くよ。まだ戦える、梨緒？」"
translation = "「상황상 여유가 없으니 이것만 물을게. 아직 싸울 수 있어, 리오?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ……私なら大丈夫だ」"
translation = "「아아…… 나라면 괜찮다.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「聞いといてなんだけど、あんまり大丈夫そうじゃないね。でも進むよ」"
translation = "「물어봐 놓고 미안하지만, 별로 괜찮아 보이지 않네. 그래도 전진하자.」"

[[dialogue]]
speaker = "unk"
original = "ガーディアンの動きを伺いながら神殿の中枢へと向かう。"
translation = "가디언의 움직임을 살피며 신전 중추로 향한다."

[[dialogue]]
speaker = "unk"
original = "梨緒たちも、守りの固いところが神殿の重要部位だとにらんでいた。"
translation = "리오 일행도 수비가 견고한 곳이 신전의 중요 부위라고 짐작하고 있었다."

[[dialogue]]
speaker = "フェアリー"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「邪魔！」"
translation = "「방해돼!」"

[[dialogue]]
speaker = "unk"
original = "急降下する隼のように、ナターシャが目にも止まらぬ速さでガーディアンを切り捨てる。"
translation = "급강하하는 매처럼, 나타샤가 눈에 보이지 않는 속도로 가디언을 베어 넘긴다."

[[dialogue]]
speaker = "フェアリー"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「次から次へと……！」"
translation = "「끝도 없이 나오네……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「邪魔だって言ってるでしょ！\u3000梨緒もガンガン撃って！」"
translation = "「방해된다고 했잖아! 리오도 팍팍 쏴!」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、わかっている……！」"
translation = "「아아, 알고 있다……!」"

[[dialogue]]
speaker = "unk"
original = "物量で押し潰すがごとく、梨緒とナターシャに殺到するガーディアン。"
translation = "물량으로 짓누르듯 리오와 나타샤에게 쇄도하는 가디언."

[[dialogue]]
speaker = "unk"
original = "２人は手数で対抗するが、ガーディアンの１体が攻撃をすり抜けて接近する。"
translation = "두 사람은 공격 횟수로 대항하지만, 가디언 중 한 마리가 공격을 피해 접근한다."

[[dialogue]]
speaker = "フェアリー"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「くっ……」"
translation = "「큭……」"

[[dialogue]]
speaker = "梨緒"
original = "「今……なんて……？」"
translation = "「방금…… 뭐라고……?」"

[[dialogue]]
speaker = "ジグ"
original = "「ロンドンが壊滅した。巨大なアステラに呑み込まれたそうだ」"
translation = "「런던이 괴멸했다. 거대한 아스테라에 집어삼켜졌다고 해.」"

[[dialogue]]
speaker = "ジグ"
original = "「星徒会にも内々に連絡が入ったが、じきにメディアでも報道されるだろう」"
translation = "「성도회에도 내밀하게 연락이 왔지만, 곧 미디어에서도 보도되겠지.」"

[[dialogue]]
speaker = "梨緒"
original = "「うぅ……うぅっ……」"
translation = "「으으…… 으윽……」"

[[dialogue]]
speaker = "ジグ"
original = "「アガサ……」"
translation = "「아가사……」"

[[dialogue]]
speaker = "梨緒"
original = "「ロンドンには、家族がいるんだ……祖父と祖母が住んでいて……幼い頃一緒に遊んだ友達も……」"
translation = "「런던에는 가족이 있어…… 할아버지와 할머니가 살고 계시고…… 어릴 적 같이 놀았던 친구도……」"

[[dialogue]]
speaker = "梨緒"
original = "「ぐすっ……ひぐっ、うぅっ……何も、できなかった……」"
translation = "「흐윽…… 흑, 으으윽…… 아무것도 못 했어……」"

[[dialogue]]
speaker = "梨緒"
original = "「私たちが……私が弱いせいで……うぅ、ぅっ……ううぅっ……！」"
translation = "「우리가…… 내가 약한 탓에…… 으으, 윽…… 으으윽……!」"

[[dialogue]]
speaker = "ジグ"
original = "「いつの間にか、流星市国の外にもモンスターやアステラが出現することが常識になってしまった」"
translation = "「어느새 유성시국 밖에도 몬스터나 아스테라가 출현하는 게 상식이 되어버렸어.」"

[[dialogue]]
speaker = "ジグ"
original = "「星騎士は何をやっているんだとまた言われそうだ。私たちも命を懸けて必死に戦っているのに。昨日もプリマステラが死んだばかりだ」"
translation = "「성기사는 뭘 하고 있느냐는 소리를 또 듣겠네. 우리도 목숨 걸고 필사적으로 싸우고 있는데. 어제도 프리마스텔라가 죽은 참이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「うぅ……ああ……あああぁっ……」"
translation = "「으으…… 아아…… 아아아악……」"

[[dialogue]]
speaker = "ジグ"
original = "「アガサ、ディザスターハンドとの決戦前にすまない。残念な知らせだ」"
translation = "「아가사, 디재스터 핸드와의 결전 전에 미안하다. 유감스러운 소식이야.」"

[[dialogue]]
speaker = "ジグ"
original = "「エリシアが死んだ」"
translation = "「엘리시아가 죽었어.」"

[[dialogue]]
speaker = "梨緒"
original = "「え……！？」"
translation = "「에……!?」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ。逃げ遅れた人々を守ろうとして、最期まで戦ったそうだ」"
translation = "「그래. 미처 도망치지 못한 사람들을 지키려다 마지막까지 싸웠다고 해.」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ……ああぁああああっ……！！」"
translation = "「아아…… 아아아아아아악……!!」"

[[dialogue]]
speaker = "梨緒"
original = "「そんな……そんなことって……うぅ、ううぅっ……うっ……」"
translation = "「그런…… 그런 일이…… 으으, 으으윽…… 윽……」"

[[dialogue]]
speaker = "梨緒"
original = "「ぅっ……うぅっ……エリシアは、昔からの友人で……フィオナと一緒に、星術の練習もして……ひぐ……うぅぅっ……！」"
translation = "「윽…… 으윽…… 엘리시아는 옛날부터 친구였고…… 피오나랑 같이 성술 연습도 하고…… 흐윽…… 으으윽……!」"

[[dialogue]]
speaker = "ジグ"
original = "「できればエリシアの弔いをしてあげたいけど、その時間はない」"
translation = "「할 수만 있다면 엘리시아의 장례를 치러주고 싶지만, 그럴 시간이 없어.」"

[[dialogue]]
speaker = "梨緒"
original = "「わかって……いる。生き残った私たちが、エリシアの分まで、戦わなければ……くぅっ……」"
translation = "「알고…… 있다. 살아남은 우리가 엘리시아의 몫까지 싸워야 한다는 건…… 끄윽……」"

[[dialogue]]
speaker = "梨緒"
original = "「ひくっ……うぅぅっ……エリシア……うぁああぁああっ……！！」"
translation = "「흐윽…… 으으윽…… 엘리시아…… 으아아아아악……!!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ、はぁ……ようやく倒せた。あのガーディアン、本当に悪趣味なんだから」"
translation = "「하아, 하아…… 겨우 쓰러뜨렸네. 저 가디언, 정말 취미가 고약하다니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「っ……はぁ……はぁ……」"
translation = "「윽…… 하아…… 하아……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「梨緒、大丈夫？」"
translation = "「리오, 괜찮아?」"

[[dialogue]]
speaker = "梨緒"
original = "「！\u3000あ、ああ……平気だ。心配をかけてすまない。先に進もう」"
translation = "「! 아, 아아…… 괜찮다. 걱정을 끼쳐서 미안하군. 앞으로 가자.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いや、一旦退くか、ちょっと休憩しよう？\u3000このまま進むのはまずい気がする」"
translation = "「아니, 일단 물러나거나 잠깐 쉴까? 이대로 가는 건 위험한 기분이 들어.」"

[[dialogue]]
speaker = "梨緒"
original = "「事態は一分一秒を争う。猶予はないはずだ」"
translation = "「사태는 일분일초를 다투고 있다. 여유는 없을 터다.」"

[[dialogue]]
speaker = "梨緒"
original = "「極星星徒会が神殿の機能を停止させれば、君まで消えてしまう。そんなことはさせられない」"
translation = "「극성성도회가 신전 기능을 정지시키면 너까지 사라지고 말아. 그런 일은 겪게 할 수 없다.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それはそうだけど、このままだと何を見せられるかわかったもんじゃないよ？」"
translation = "「그건 그렇지만, 이대로라면 뭘 더 보여줄지 알 수 없다고?」"

[[dialogue]]
speaker = "梨緒"
original = "「そうだな。心配してくれてありがとう」"
translation = "「그렇군. 걱정해 줘서 고맙다.」"

[[dialogue]]
speaker = "梨緒"
original = "「それでも私はこの続きを見なければいけない。そんな気がするんだ」"
translation = "「그래도 나는 이 뒤를 봐야만 한다. 그런 기분이 들어.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そこまで言うなら止めないけど……」"
translation = "「그렇게까지 말한다면 말리지는 않겠지만……」"

[[dialogue]]
speaker = "梨緒"
original = "（ガーディアンが見せた私の記憶は……次第にベガの最期へと近づいている）"
translation = "(가디언이 보여준 나의 기억은…… 점차 베가의 최후로 다가가고 있어)"

[[dialogue]]
speaker = "梨緒"
original = "（だが引っかかることがある……）"
translation = "(하지만 마음에 걸리는 게 있어……)"

[[dialogue]]
speaker = "梨緒"
original = "（ベガの最期──すなわちディザスターハンドとの戦い）"
translation = "(베가의 최후── 즉 디재스터 핸드와의 싸움)"

[[dialogue]]
speaker = "梨緒"
original = "『立て、フィオナ！\u3000動け！\u3000逃げろっ！！』"
translation = "『일어나, 피오나! 움직여! 도망쳐!!』"

[[dialogue]]
speaker = "梨緒"
original = "（ベガのフィオナが死んだあの戦いで、ジグもあそこにいたはずだ）"
translation = "(베가의 피오나가 죽었던 그 싸움에서, 지그도 분명 그곳에 있었을 터다)"

[[dialogue]]
speaker = "梨緒"
original = "（なのにどうして、私の記憶の中にジグがいないんだ……？）"
translation = "(그런데 어째서, 내 기억 속에는 지그가 없는 거지……?)"

