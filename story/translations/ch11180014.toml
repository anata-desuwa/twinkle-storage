[[dialogue]]
speaker = "unk"
original = "第４話,暗殺者の本心？,P"
translation = "제4화, 암살자의 본심?, P"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「じー」"
translation = "「빤히」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「じぃ～～」"
translation = "「빤히이~~」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「じぃーーーーーっ」"
translation = "「빤히이─────」"

[[dialogue]]
speaker = "unk"
original = "（最近すごく視線を感じる……！）"
translation = "（요즘 굉장히 시선이 느껴져……!）"

[[dialogue]]
speaker = "unk"
original = "ナターシャの気配を感じる日がしばらく続き……"
translation = "나타샤의 기척을 느끼는 날이 한동안 계속되고……"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、会長さん、おはよう。朝から会うなんて奇遇だね」"
translation = "「아, 회장님, 안녕. 아침부터 만나다니 기우네」"

[[dialogue]]
speaker = "unk"
original = "ずっと俺を監視してたんだろ？"
translation = "계속 나를 감시하고 있었지?"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まぁそれが仕事だしね。むしろ監視してなかったら仕事してないことになるし」"
translation = "「뭐, 그게 일이니까. 오히려 감시하지 않으면 일을 안 하는 게 되니까 말이야」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……最近特に視線を感じる？\u3000ん～、どうしてかなぁ～？\u3000気付かれないように監視してたはずなんだけどな～？」"
translation = "「……요즘 특히 시선이 느껴져? 음~, 왜일까나~? 들키지 않게 감시했을 텐데 말이야~?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、でもさ。よく考えたら、私は選挙管理委員会なんだから、コソコソ監視する必要なんてないんだよね」"
translation = "「아, 하지만 말이야. 잘 생각해보니 난 선거관리위원회니까, 몰래 감시할 필요 따윈 없단 말이지」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だからしばらくの間、密着取材──ならぬ密着監視させてもらうね？」"
translation = "「그러니까 당분간 밀착 취재──가 아니라 밀착 감시하게 해줄래?」"

[[dialogue]]
speaker = "unk"
original = "それから、ナターシャがいつも近くにいる生活が始まった。"
translation = "그 후로 나타샤가 항상 근처에 있는 생활이 시작되었다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「会長さん、今日は教室でお昼？\u3000ならご一緒させてもらうよ」"
translation = "「회장님, 오늘은 교실에서 점심? 그럼 같이 먹을게」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ああ、今日はゼリーじゃないよ。梨緒からサンドイッチ強奪してきたから」"
translation = "「아아, 오늘은 젤리가 아니야. 리오한테서 샌드위치를 강탈해왔으니까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「会長さんは何食べてるの？\u3000今日は購買のからあげ弁当？\u3000ねぇ、お弁当、美味しい？」"
translation = "「회장님은 뭐 먹어? 오늘은 매점의 가라아게 도시락? 저기, 도시락 맛있어?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私、自分が食べるものは関心ないけど、人が食べるところは興味あるんだ」"
translation = "「나, 내가 먹는 것엔 관심 없지만, 남이 먹는 모습에는 흥미가 있거든」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ねぇ、美味しい？\u3000美味しいなら美味しい顔してよ」"
translation = "「저기, 맛있어? 맛있으면 맛있는 표정을 지어봐」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……ふふ、そっか、美味しいんだ。会長さんも男の子だし、やっぱりこういうのが好きなんだね」"
translation = "「……후후, 그렇구나, 맛있구나. 회장님도 남자애니까, 역시 이런 걸 좋아하는구나」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「こんな時間までお仕事お疲れ様。新星学園って生徒がたくさんいるから、星徒会も大変なんだね」"
translation = "「이 시간까지 일하느라 수고했어. 신성 학원은 학생이 많으니까, 성도회도 힘들겠네」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「お茶かコーヒーでも飲む？\u3000温かい紅茶だったらほっとするかな。道具借りるね」"
translation = "「차나 커피라도 마실래? 따뜻한 홍차라면 마음이 놓일까. 도구 좀 빌릴게」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はい、どうぞ。自分はいつも水飲んでるから、上手く淹れられてるかわからないけど」"
translation = "「자, 여기. 자신은 항상 물만 마시니까, 잘 우려냈는지는 모르겠지만」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……紅茶、美味しい？\u3000ありがと、ならよかった」"
translation = "「……홍차, 맛있어? 고마워, 그렇다면 다행이야」"

[[dialogue]]
speaker = "unk"
original = "最近、距離が近くない？"
translation = "요즘 거리가 가깝지 않아?"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そりゃそうでしょ。密着監視なんだから」"
translation = "「그야 당연하잖아. 밀착 감시니까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「……そうじゃなくて心理的に？\u3000そうかな？\u3000普通に監視してるつもりなんだけどなー」"
translation = "「……그게 아니라 심리적으로? 그럴까나? 평범하게 감시하고 있을 뿐이라고 생각하는데 말이야」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ううん、ウソ。ホントはわかってるんだ、私の中で会長さんの存在が大きくなってるって」"
translation = "「으응, 거짓말. 사실은 알고 있어, 내 안에서 회장님의 존재가 커지고 있다는 거」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私は魔王を監視する任務のために、新星学園にやってきた。その任務はいつまで続くか私にもわからない」"
translation = "「나는 마왕을 감시하는 임무를 위해 신성 학원에 왔어. 그 임무가 언제까지 계속될지는 나도 몰라」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「魔王が危険な存在じゃないと聖庭園が判断すれば、その時点でお役御免でサヨナラ」"
translation = "「마왕이 위험한 존재가 아니라고 성정원이 판단하면, 그 시점에서 임무 해제되고 작별이야」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「でも……それは困るな。会長さんと一緒にいられなくなっちゃう」"
translation = "「하지만…… 그건 곤란해. 회장님과 함께 있을 수 없게 되어버리니까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そんなのイヤ……会長さんと離れたくないって、思っちゃってる……」"
translation = "「그런 건 싫어…… 회장님과 떨어지고 싶지 않다고, 생각하게 돼버렸어……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「任務なのに……私、会長さんのこと……」"
translation = "「임무인데…… 나, 회장님을……」"

[[dialogue]]
speaker = "unk"
original = "ナターシャ……"
translation = "나타샤……"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「──ていう感じで、対象と距離を縮めておくと、いざという時さくっとやれるんだよ」"
translation = "「──라는 느낌으로, 대상과 거리를 좁혀두면, 유사시에 슥삭 해치울 수 있거든」"

[[dialogue]]
speaker = "unk"
original = "そんなことだろうと思った！"
translation = "그럴 줄 알았어!"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ははは。私のことを理解してくれて何より」"
translation = "「하하하. 나를 이해해줘서 다행이야」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「どこまで本当かは会長さんの想像にお任せするよ。もしかしたら全部本当の気持ちかもね？」"
translation = "「어디까지가 진심인지는 회장님의 상상에 맡길게. 어쩌면 전부 진심일지도 모르고?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、まだいる……？\u3000ボランティア部のことで相談が──」"
translation = "「회장 군, 아직 있어……? 봉사부 일로 상담이──」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ナターシャちゃん、どうして星徒会室に……！？\u3000しかも２人きり！？」"
translation = "「나타샤 짱, 어째서 성도회실에……!? 게다가 단둘이서!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そりゃ選挙管理委員会として監視してるところだったからね」"
translation = "「그야 선거관리위원회로서 감시하던 중이었으니까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「大丈夫、何も起こらなかったよ。会長さんにはフラれちゃったから」"
translation = "「괜찮아, 아무 일도 안 일어났어. 회장님한테 차였으니까」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「フラれた！？」"
translation = "「차였다고!?」"

[[dialogue]]
speaker = "unk"
original = "フッてないよ！？"
translation = "안 찼어!?"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ナターシャちゃんの冗談か～……ビックリしちゃったよぉ」"
translation = "「나타샤 짱의 농담인가~…… 깜짝 놀랐잖아」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ははは。期待通りのリアクションありがと。メルエルはからかうと面白いね」"
translation = "「하하하. 기대했던 대로의 리액션 고마워. 메르엘은 놀리면 재밌단 말이지」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふぅ、空気こもってきたかな。窓開けて空気入れ替えよっか」"
translation = "「후우, 공기가 탁해졌나. 창문 열고 환기 좀 시킬까」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ひぁあああああっ！？」"
translation = "「히야아아아앗!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ナターシャちゃん！？\u3000どうしたの！？」"
translation = "「나타샤 짱!? 왜 그래!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「むむむ、虫っ！\u3000虫～～っ！？」"
translation = "「버, 벌레! 벌레에에~~!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ああ、窓開けたから入ってきちゃったんだね。最近温かくなってきたから、元気になったのかも」"
translation = "「아아, 창문을 열어서 들어와버렸네. 요즘 따뜻해졌으니까, 활발해진 걸지도 몰라」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「大丈夫、ナターシャちゃん。もう出ていったよ」"
translation = "「괜찮아, 나타샤 짱. 이제 나갔어」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、ありがと……」"
translation = "「고, 고마워……」"

[[dialogue]]
speaker = "unk"
original = "隙を見せるのも監視対象を油断させる演技……？"
translation = "빈틈을 보여주는 것도 감시 대상을 방심하게 하려는 연기……?"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「違う違う！\u3000ホントにダメ！」"
translation = "「아니야 아니야! 진짜 안 돼!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「人間界には、天界にいない虫も多いんだよ。天界の虫もチョウチョとか綺麗な虫ばっかりだから、最初は驚いちゃうよね」"
translation = "「인간계에는 천계에 없는 벌레도 많으니까. 천계 벌레는 나비 같은 예쁜 벌레뿐이라서, 처음엔 놀라게 되지」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ダメダメダメっ！\u3000人間界の虫はダメなの～～～～っ！！」"
translation = "「안 돼 안 돼 안 돼! 인간계 벌레는 안 된단 말이야아아아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "語る言葉には本当か嘘かわからないことが多く、ミステリアスなナターシャ。"
translation = "말하는 것에는 진실인지 거짓인지 알 수 없는 것이 많아, 미스테리어스한 나타샤."

[[dialogue]]
speaker = "unk"
original = "彼女のことは掴みどころがないと思っていたけど、意外な弱点が判明したのだった。"
translation = "그녀는 종잡을 수 없는 사람이라고 생각했지만, 의외의 약점이 판명된 것이었다."

