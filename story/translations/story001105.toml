[[dialogue]]
speaker = "ヴァレリー"
original = "「美しい。見事な太刀捌き。噂に違わぬ実力です」"
translation = "「아름답군요. 훌륭한 칼솜씨. 소문에 어긋나지 않는 실력입니다.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私はとても幸運です。この国に到着して早々、あなたのような星騎士と出会えるなんて」"
translation = "「저는 아주 운이 좋군요. 이 나라에 도착하자마자 당신 같은 성기사와 만날 수 있다니.」"

[[dialogue]]
speaker = "蛍火"
original = "「私としては不運でしたが……あなたと出会ったのが他の星騎士でなかったことは、不幸中の幸いでしょう」"
translation = "「저로서는 불운이었습니다만…… 당신과 만난 게 다른 성기사가 아니었던 것은 불행 중 다행이겠군요.」"

[[dialogue]]
speaker = "蛍火"
original = "「東雲流包丁術、壱の型──<ruby>鬼炎天焼<rt>きえんてんしょう</rt></ruby>！」"
translation = "「시노노메류 식도술, 제1형── 귀염천소!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ああ、美しい一閃でした……この身で素晴らしい技を受けることができて幸せです」"
translation = "「아아, 아름다운 일섬이었습니다…… 이 몸으로 훌륭한 기술을 받을 수 있어서 행복합니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「ダメージは通っているはずなのに倒れない……！\u3000やはりこの力は──」"
translation = "「데미지는 들어갔을 텐데 쓰러지지 않아……! 역시 이 힘은──」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ええ。すでにあなた方と交戦したキサナと同様、私は星力を吸収することができます。それが我々コラプサーの証といっていいでしょう」"
translation = "「네. 이미 당신들과 교전한 키사나와 마찬가지로, 저는 성력을 흡수할 수 있습니다. 그것이 저희 콜랩서의 증표라고 해도 좋겠지요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたは星騎士の中でも選りすぐり。この力がなくては勝負にならなかったでしょうね」"
translation = "「당신은 성기사 중에서도 엄선된 인재. 이 힘이 없었다면 승부가 되지 않았겠지요.」"

[[dialogue]]
speaker = "蛍火"
original = "「敵ながらそれは訂正させていただきます。あなたの剣技も卓越したものです」"
translation = "「적이지만 그것은 정정하도록 하겠습니다. 당신의 검기도 탁월한 것입니다.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたに褒めていただけるとは光栄です。非才なれど、剣の腕を磨いてきた甲斐がありますとも」"
translation = "「당신에게 칭찬을 듣다니 영광입니다. 비재하나마 검술을 닦아온 보람이 있군요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「しかしあなたはそろそろ限界なのでは？\u3000ダメージが蓄積しているのはあなたも同じでしょう？」"
translation = "「하지만 당신은 슬슬 한계가 아닌가요? 데미지가 축적되어 있는 건 당신도 마찬가지잖아요?」"

[[dialogue]]
speaker = "蛍火"
original = "「くっ──！」"
translation = "「큭──!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「もっと戦いを楽しんでいたいのですが、私も用事の途中でして。残念ながらそろそろ決着を付けなくてはなりません」"
translation = "「좀 더 싸움을 즐기고 싶습니다만, 저도 용무를 보던 중이라서요. 아쉽지만 슬슬 결판을 내야겠습니다.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたは本当に美しい星騎士でした。それでは──さようなら」"
translation = "「당신은 정말로 아름다운 성기사였습니다. 그럼── 안녕히.」"

[[dialogue]]
speaker = "シアン"
original = "「ブラックドッグファング！」"
translation = "「블랙 도그 팽!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「蛍火さんとの戦いに熱中しすぎましたね。寸前まで気が付きませんでした」"
translation = "「호타루비 씨와의 싸움에 너무 열중했나 보군요. 직전까지 눈치채지 못했습니다.」"

[[dialogue]]
speaker = "シアン"
original = "「チッ、しっかり反応しといてよく言うぜ」"
translation = "「칫, 제대로 반응해놓고 잘도 지껄이는군.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「蛍火さんほどではありませんが、あなたも見事な一撃でした。闇に溶け込む黒もまた美しい」"
translation = "「호타루비 씨 정도는 아니지만, 당신도 훌륭한 일격이었습니다. 어둠에 녹아드는 검정 또한 아름답지.」"

[[dialogue]]
speaker = "シアン"
original = "「キサナじゃねえが、こいつもコラプサーか。もしかすると、こいつがあの時の──」"
translation = "「키사나는 아니다만, 이 녀석도 콜랩서인가. 어쩌면 이 녀석이 그때의──」"

[[dialogue]]
speaker = "蛍火"
original = "「あなたも星騎士ですか？\u3000失礼ながら、学園でお見かけした覚えはないのですが……」"
translation = "「당신도 성기사입니까? 실례지만, 학원에서 뵌 기억이 없습니다만……」"

[[dialogue]]
speaker = "シアン"
original = "「ああ、今は新星だからあんたの先輩だよ」"
translation = "「아아, 지금은 신성이니까 너한테는 선배야.」"

[[dialogue]]
speaker = "蛍火"
original = "「今は……？」"
translation = "「지금은……?」"

[[dialogue]]
speaker = "シアン"
original = "「細かいことはいい。助けに入ったはいいが、２人がかりでもやつの相手はきついぞ」"
translation = "「세세한 건 됐어. 도와주러 들어온 건 좋은데, 둘이서 덤벼도 저 녀석 상대하는 건 벅차다고.」"

[[dialogue]]
speaker = "シアン"
original = "「キサナの時は、星徒会長と風紀委員２人を相手にして大暴れだ。あんたの実力はケチのつけようがないが、単純に人手が足りない」"
translation = "「키사나 때는 성도회장이랑 풍기위원 2명을 상대로 대난동을 피웠지. 네 실력은 나무랄 데 없지만, 단순하게 일손이 부족해.」"

[[dialogue]]
speaker = "蛍火"
original = "「同感です。彼女の脅威はこの身で理解しました。ですが退くわけにはいきません」"
translation = "「동감입니다. 그녀의 위협은 이 몸으로 이해했습니다. 하지만 물러설 수는 없습니다.」"

[[dialogue]]
speaker = "蛍火"
original = "「すでに増援も要請しているのでしょう？\u3000ならば私たちで持ちこたえましょう」"
translation = "「이미 증원도 요청하신 거겠죠? 그렇다면 저희끼리 버텨보도록 하죠.」"

[[dialogue]]
speaker = "シアン"
original = "「まぁそれしかないか。話が早いぜ」"
translation = "「뭐, 그것밖에 없나. 말이 빨라서 좋군.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私としてもありがたい展開です。輝かしい星術を、美しい技を、私にもっと見せてください……！」"
translation = "「저로서도 반가운 전개입니다. 눈부신 성술을, 아름다운 기술을, 제게 좀 더 보여주세요……!」"

[[dialogue]]
speaker = "シアン"
original = "「うるせえ。輝かしいだの美しいだのはどうでもいいから、人様に迷惑かけずにとっとお縄につきやがれ」"
translation = "「시끄러워. 눈부시든 아름답든 어찌 되든 좋으니까, 남들한테 민폐 끼치지 말고 어서 포박이나 당하시지.」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナにはどんなお洋服が似合うかな～？\u3000お兄ちゃんはフリフリのかわいいのと、大人っぽくてかっこいいのどっちが好み？」"
translation = "「리나한테는 어떤 옷이 어울릴까~? 오빠는 팔랑팔랑 귀여운 거랑, 어른스럽고 멋진 거 중에 어느 쪽이 취향이야?」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナはかわいい方が好きだけど、お兄ちゃんが好きならどんな服でも──」"
translation = "「리나는 귀여운 쪽이 좋지만, 오빠가 좋다면 어떤 옷이든──」"

[[dialogue]]
speaker = "コハルコ"
original = "『ごめんなさい、会長さん。緊急事態です』"
translation = "『죄송합니다, 회장님. 긴급사태예요.』"

[[dialogue]]
speaker = "unk"
original = "コハルコさん！"
translation = "코하루코 씨!"

[[dialogue]]
speaker = "リーナ"
original = "「も～、今いいところだったのにー」"
translation = "「에이~, 지금 딱 좋은 분위기였는데—」"

[[dialogue]]
speaker = "コハルコ"
original = "『浅草で蛍火さんがコラプサーと思われる敵と戦闘中です。至急現場に急行してください』"
translation = "『아사쿠사에서 케이카 씨가 콜랩서로 추정되는 적과 전투 중입니다. 지체 없이 현장으로 급행해 주세요.』"

[[dialogue]]
speaker = "unk"
original = "ごめん、リーナ。行かないといけないんだ"
translation = "미안, 리나. 가봐야 할 것 같아."

[[dialogue]]
speaker = "リーナ"
original = "「なになに、用事？\u3000じゃあリーナも一緒に行く！」"
translation = "「뭐야 뭐야, 볼일? 그럼 리나도 같이 갈래!」"

[[dialogue]]
speaker = "unk"
original = "危ないからダメ"
translation = "위험하니까 안 돼."

[[dialogue]]
speaker = "リーナ"
original = "「え～。リーナ、お兄ちゃんの邪魔しないよ？\u3000ちゃんとおとなしくしてるよ？\u3000それでもダメ？」"
translation = "「에에~. 리나, 오빠 방해 안 할게? 얌전하게 있을게? 그래도 안 돼?」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん……リーナを捨てちゃうの？」"
translation = "「오빠…… 리나를 버리는 거야?」"

[[dialogue]]
speaker = "unk"
original = "リーナに怪我させたくないから"
translation = "리나를 다치게 하고 싶지 않으니까."

[[dialogue]]
speaker = "リーナ"
original = "「！\u3000お兄ちゃん……」"
translation = "「! 오빠……」"

[[dialogue]]
speaker = "リーナ"
original = "「うん、わかった。行ってきて。お兄ちゃんも怪我しちゃダメだから」"
translation = "「응, 알았어. 다녀와. 오빠도 다치면 안 되니까.」"

[[dialogue]]
speaker = "リーナ"
original = "「ちゃんと戻ってきてね。リーナとの約束だよ」"
translation = "「꼭 돌아와야 해. 리나랑 약속이야.」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん……寂しいよ……」"
translation = "「오빠…… 외로워……」"

[[dialogue]]
speaker = "リーナ"
original = "「でも、どうしても行かなきゃいけない用事なら仕方ないよね。妹だもん、こういう時はちゃんと行ってらっしゃいって言ってあげないと」"
translation = "「하지만, 꼭 가야만 하는 일이라면 어쩔 수 없지. 여동생인걸, 이럴 때는 제대로 다녀오라고 말해줘야지.」"

[[dialogue]]
speaker = "リーナ"
original = "「も～、またモンスター？\u3000いい加減うっとうしいなぁ～」"
translation = "「정말~, 또 몬스터? 이제 슬슬 짜증 나네~」"

[[dialogue]]
speaker = "リーナ"
original = "「ジャマ！」"
translation = "「방해돼!」"

[[dialogue]]
speaker = "リーナ"
original = "「早く帰ってきてね……お兄ちゃん」"
translation = "「빨리 돌아와야 해…… 오빠.」"

