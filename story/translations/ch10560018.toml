[[dialogue]]
speaker = "アム"
original = "「んっ……はぁ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「응…… 하아……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ええと……？\u3000アム……？」"
translation = "「저기……? 아무……?」"

[[dialogue]]
speaker = "アム"
original = "「あ、ちょっとっ。起き上がろうとしちゃダメだってば」"
translation = "「아, 잠깐. 일어나려고 하면 안 된다니까.」"

[[dialogue]]
speaker = "アム"
original = "「今日は、ふふん、あたしが会長をリードしてあげちゃうんだから♪」"
translation = "「오늘은, 후훗, 내가 회장님을 리드해 줄 거니까♪」"

[[dialogue]]
speaker = "unk"
original = "俺の体を押さえつけるようにアムがぐっと体重をかけてくる。"
translation = "내 몸을 짓누르듯이 아무가 꾹 체중을 실어 온다."

[[dialogue]]
speaker = "クロト"
original = "「リードって……。今日はアムの部屋でデートするって話だったんじゃ？」"
translation = "「리드라니……. 오늘은 아무 방에서 데이트하기로 한 이야기 아니었어?」"

[[dialogue]]
speaker = "アム"
original = "「これも立派なデートじゃん♪\u3000会長だって、そのつもりだったんじゃないの？」"
translation = "「이것도 훌륭한 데이트잖아♪ 회장님도, 그럴 생각이었던 거 아냐?」"

[[dialogue]]
speaker = "アム"
original = "「『今日はお母さんいないから』って囁いたら……ふふふ。すごーくモジモジしてたよね？」"
translation = "「『오늘 엄마 없으니까』라고 속삭였더니…… 후후후. 어—엄청 머뭇거렸었지?」"

[[dialogue]]
speaker = "クロト"
original = "「うっ……！\u3000それは……！」"
translation = "「윽……! 그건……!」"

[[dialogue]]
speaker = "unk"
original = "期待していなかったといえば嘘になる。"
translation = "기대하지 않았다고 하면 거짓말이다."

[[dialogue]]
speaker = "unk"
original = "こうしてアムの部屋に入るのも初めてだ。"
translation = "이렇게 아무의 방에 들어오는 것도 처음이다."

[[dialogue]]
speaker = "unk"
original = "彼女の匂いが染みこんでいるベッドに寝かされているだけで、ドキドキがとまらない。"
translation = "그녀의 냄새가 배어있는 침대에 뉘어있는 것만으로도, 두근거림이 멈추지 않는다."

[[dialogue]]
speaker = "アム"
original = "「ふふふ、興奮してる興奮してる♪\u3000これなら今日こそ会長をヒーヒー言わせてあげられるかも♪」"
translation = "「후후후, 흥분하고 있어 흥분하고 있어♪ 이래서야말로 오늘이야말로 회장님을 앙앙거리게 만들어 줄 수 있을지도♪」"

[[dialogue]]
speaker = "アム"
original = "「やっぱりホームは安心感が違うねー？\u3000今までは会長のお部屋に連れ込まれて、好き放題されちゃってたから♪」"
translation = "「역시 홈그라운드는 안심감이 다르네—? 지금까지는 회장님 방으로 끌려가서, 마음껏 당하기만 했으니까♪」"

[[dialogue]]
speaker = "unk"
original = "好き放題していたとは人聞きが悪い。"
translation = "마음껏 했다니 듣기 거북하다."

[[dialogue]]
speaker = "unk"
original = "アムが緊張して、されるがままになっていただけだ。"
translation = "아무가 긴장해서, 하라는 대로 있었을 뿐이다."

[[dialogue]]
speaker = "unk"
original = "そうでなくてもアムは挿入すると……。"
translation = "그렇지 않아도 아무는 삽입하면……."

[[dialogue]]
speaker = "アム"
original = "「むむっ。なーにヤレヤレした顔してるのっ。あたしのこと舐めちゃって……！」"
translation = "「무뭇. 무—슨 어이없다는 표정 짓는 거야. 나를 얕보고 말이야……!」"

[[dialogue]]
speaker = "アム"
original = "「どーせ挿れたらすぐに余裕なくなっちゃうとか思ってるんでしょ？\u3000主導権さえ握っちゃえば、そんなことないんだからっ」"
translation = "「어차피 넣으면 금방 여유 없어질 거라고 생각하는 거지? 주도권만 잡으면, 그럴 일 없단 말이야.」"

[[dialogue]]
speaker = "アム"
original = "「それより、んっ、はぁ……<emoji=heart04>\u3000自分の心配したらどー？\u3000こーんなにカチコチにしちゃってるじゃん<emoji=heart04>」"
translation = "「그것보다, 응, 하아……<emoji=heart04> 자기 걱정이나 하—시지? 이—렇게나 딱딱하게 만들어버렸잖아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言いながらアムが軽く腰を揺らしてくる。"
translation = "말하면서 아무가 가볍게 허리를 흔들어 온다."

[[dialogue]]
speaker = "unk"
original = "小柄な体には似つかわしくない大きなお尻がタプンタプンと目の前で弾んで──その光景と感触に性欲がつい高まってしまう。"
translation = "작은 몸에는 어울리지 않는 커다란 엉덩이가 타분타분 눈앞에서 튕기고── 그 광경과 감촉에 성욕이 그만 고조되고 만다."

[[dialogue]]
speaker = "アム"
original = "「や、んっ……<emoji=heart04>\u3000ふふ、エッチ……<emoji=heart04>\u3000あたしの体が持ち上げられちゃうくらい勃起しちゃってるよ～？」"
translation = "「야, 응……<emoji=heart04> 후후, 야해……<emoji=heart04> 내 몸이 들려 올라갈 정도로 발기해 버렸네~?」"

[[dialogue]]
speaker = "アム"
original = "「本当に会長って、んっ、はぁ……<emoji=heart04>\u3000あたしのお尻、大好きだよね<emoji=heart04>\u3000なんだか変態さんっぽい……♪」"
translation = "「정말 회장님은, 응, 하아……<emoji=heart04> 내 엉덩이, 정말 좋아한다니까<emoji=heart04> 왠지 변태 씨 같아……♪」"

[[dialogue]]
speaker = "アム"
original = "「まぁでもムラムラしてくれるなら嬉しいけど……<emoji=heart04>」"
translation = "「뭐 그래도 흥분해 준다면 기쁘지만……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「お尻だけ大きいの、んふ、コンプレックスだったから……<emoji=heart04>」"
translation = "「엉덩이만 큰 거, 응후, 콤플렉스였으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "からかうようにムチムチのお尻をグリグリ押しつけてくるアム。"
translation = "놀리듯이 탱글탱글한 엉덩이를 비비며 압박해 오는 아무."

[[dialogue]]
speaker = "unk"
original = "まるでパイズリでもするように肉厚の柔肉でズボン越しにペニスを挟み込んできたりして、つい腰が浮いてしまう。"
translation = "마치 파이즈리라도 하듯이 두툼한 살집으로 바지 너머의 페니스를 끼워오거나 해서, 무심코 허리가 떠오르고 만다."

[[dialogue]]
speaker = "アム"
original = "「あぁん……<emoji=heart04>\u3000だから動いちゃダメだってば<emoji=heart04>\u3000いつもみたいに責められると思ったら大間違いだからね？」"
translation = "「아앙……<emoji=heart04> 그러니까 움직이면 안 된다니까<emoji=heart04> 평소처럼 괴롭힘당할 줄 알면 큰 오산이니까?」"

[[dialogue]]
speaker = "アム"
original = "「そっちの手の内はもうバレてるんだから。思えば、今までずーっとそっちが主導権握れるエッチばっかりされてたもん」"
translation = "「그쪽 수법은 이미 다 알고 있다고. 생각하면, 지금까지 계—속 그쪽이 주도권 잡을 수 있는 섹스만 당해왔는걸.」"

[[dialogue]]
speaker = "アム"
original = "「でも今日は、んふふ♪\u3000そーはいかないんだから♪\u3000今まで恥ずかしい声いっぱい出させてくれた分、たっぷりお返ししてあげる♪」"
translation = "「하지만 오늘은, 응후후♪ 그—렇게는 안 될 테니까♪ 지금까지 창피한 목소리 잔뜩 내게 해준 만큼, 듬뿍 돌려줄게♪」"

[[dialogue]]
speaker = "unk"
original = "プリプリとお尻を揺らして、布越しにペニスを刺激してくる。"
translation = "탱글탱글 엉덩이를 흔들며, 천 너머로 페니스를 자극해 온다."

[[dialogue]]
speaker = "unk"
original = "正直アムは体重も軽いし、起き上がろうと思えば起き上がれるが──"
translation = "솔직히 아무는 몸무게도 가볍고, 일어나려고 하면 일어날 수 있지만──"

[[dialogue]]
speaker = "アム"
original = "「はぁはぁ<emoji=heart04>\u3000ズボン湿ってきてる……<emoji=heart04>\u3000我慢汁、ダラダラ溢れてきちゃってるよ～？」"
translation = "「하아하아<emoji=heart04> 바지가 젖어오고 있어……<emoji=heart04> 쿠퍼액이, 주르륵 흘러나오고 있다구~?」"

[[dialogue]]
speaker = "アム"
original = "「えへへ、挿れて欲しい？\u3000挿れて欲しいんだよね～？\u3000あたしのここに、ん、はぁ、おち○ちん挿れたいんでしょー？」"
translation = "「에헤헤, 넣고 싶어? 넣고 싶은 거지~? 내 여기에, 응, 하아, 자지 넣고 싶은 거잖아—?」"

[[dialogue]]
speaker = "unk"
original = "硬くなっていく股間の感触に、頬を綻ばせてくれるアムが愛おしい。"
translation = "단단해져 가는 가랑이의 감촉에, 미소를 짓는 아무가 사랑스럽다."

[[dialogue]]
speaker = "unk"
original = "生意気に煽ってきながらも、まるで大好きなお菓子をもらった子供のように喜んでくれて。"
translation = "건방지게 도발해 오면서도, 마치 제일 좋아하는 과자를 받은 어린아이처럼 기뻐해 줘서."

[[dialogue]]
speaker = "unk"
original = "その無邪気な姿が何より俺の性欲を煽ってくる。"
translation = "그 천진난만한 모습이 무엇보다 나의 성욕을 부추긴다."

[[dialogue]]
speaker = "アム"
original = "「ふふふ、ならお望みどーりヒーヒー言わせてあげる♪」"
translation = "「후후후, 그럼 소원대로 앙앙거리게 해줄게♪」"

[[dialogue]]
speaker = "アム"
original = "「絶対にじーっとしててね？\u3000すぐにイかせてあげちゃうんだから♪」"
translation = "「절대로 가마—니 있어야 해? 금방 가게 해줄 테니까♪」"

[[dialogue]]
speaker = "アム"
original = "「というか挿れた瞬間ビュービューしちゃったりして……<emoji=heart04>\u3000えへへ、それはそれでいーけどね<emoji=heart04>」"
translation = "「그보다 넣은 순간 뷰르릇 해버리거나 해서……<emoji=heart04> 에헤헤, 그건 그것대로 좋지만 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……自信満々すぎるところは不安だけど。"
translation = "……자신만만한 점은 불안하지만."

[[dialogue]]
speaker = "アム"
original = "「むむっ。だからヤレヤレした顔しないでってばぁ。こーんなにカチコチにしちゃってるクセに～！」"
translation = "「무뭇. 그러니까 어이없다는 얼굴 하지 말라니까아. 이—렇게나 딱딱하게 해놓고선~!」"

[[dialogue]]
speaker = "アム"
original = "「覚悟しておきなよー？\u3000その余裕顔、とろっとろにしてあげるんだからっ<emoji=heart04>」"
translation = "「각오해 두라구—? 그 여유로운 얼굴, 흐물흐물하게 녹여버릴 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "得意げに言いながら、アムがズボンのチャックを下ろしてくる。"
translation = "의기양양하게 말하며, 아무가 바지의 지퍼를 내린다."

[[dialogue]]
speaker = "unk"
original = "そして小さな割れ目に先端をあてがうと、一息に腰を落としてきて──"
translation = "그리고 좁은 틈새에 선단을 갖다 대더니, 단숨에 허리를 내리누르며──"

[[dialogue]]
speaker = "アム"
original = "「ふぁっ、あっ──あふぁあぁああっっ～～！！」"
translation = "「하앗, 앗── 아화아아아앗앗~~!!」"

[[dialogue]]
speaker = "unk"
original = "それまでの煽りっぷりはどこへやら。挿入と同時にアムの顔が快感に蕩ける。"
translation = "그때까지의 도발은 어디 갔는지. 삽입과 동시에 아무의 얼굴이 쾌감에 녹아내린다."

[[dialogue]]
speaker = "アム"
original = "「は、はふっ。んっ、んふぅんっ……！\u3000お、おっき、あっ、あぁっ……！」"
translation = "「하, 하후. 응, 응후웅……! 크, 크고, 앗, 아앗……!」"

[[dialogue]]
speaker = "アム"
original = "「やっ、ダメ……あふぁっ……！\u3000ビ、ビクビク、んんんっ、とまらな……！」"
translation = "「얏, 안돼…… 아화앗……! 파, 파르르, 응응응, 멈추질 않……!」"

[[dialogue]]
speaker = "unk"
original = "ペニスをギュウギュウに締め付けながら、お尻がブルブルと痙攣するくらい激しく悶えるアム。"
translation = "페니스를 꽉꽉 조여대며, 엉덩이가 부들부들 경련할 정도로 격렬하게 몸부림치는 아무."

[[dialogue]]
speaker = "unk"
original = "やはり……こうなったか。"
translation = "역시…… 이렇게 됐나."

[[dialogue]]
speaker = "unk"
original = "戦闘では『鉄壁』を誇るアムだけど、内側からの刺激にはめっぽう弱いというか……ものすごく感じやすい。"
translation = "전투에서는 『철벽』을 자랑하는 아무지만, 내부로부터의 자극에는 무척 약하다고 해야 할까…… 엄청나게 잘 느낀다."

[[dialogue]]
speaker = "アム"
original = "「～～っっ。なに勝ち誇った顔しちゃってるの……！\u3000あたしは全然感じて、んはぁ、な、ないんだから……！」"
translation = "「~~윽. 뭘 승리했다는 얼굴 하고 있는 거야……! 나는 전혀 느끼고, 응하아, 있지, 않단 말이야……!」"

[[dialogue]]
speaker = "アム"
original = "「これは、そのっ。一気に挿れちゃって、んんっ、ちょっと驚いちゃってるだけ……！」"
translation = "「이건, 그게. 단숨에 넣어버려서, 응응, 조금 놀랐을 뿐이야……!」"

[[dialogue]]
speaker = "アム"
original = "「ヒーヒー言わせるのは、んはぁ、ん、んんっ、これからなんだから……！」"
translation = "「앙앙거리게 만드는 건, 응하아, 응, 응응, 이제부터니까……!」"

[[dialogue]]
speaker = "アム"
original = "「今日こそ、はぁはぁ、あたしが勝つんだからねっ……！\u3000模擬戦でもぉ、んんんっ、エッチでもぉ……！」"
translation = "「오늘이야말로, 하아하아, 내가 이길 거니까 말이야……! 모의전에서도오, 응응응, 섹스에서도오……!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ぎこちなく腰を揺らしてくるアム。"
translation = "그렇게 말하며, 어색하게 허리를 흔들어 오는 아무."

[[dialogue]]
speaker = "unk"
original = "けれど感じすぎないように気を付けているのか、中々に緩慢な動きだ。"
translation = "하지만 너무 느끼지 않으려고 조심하는 건지, 꽤나 느릿한 움직임이다."

[[dialogue]]
speaker = "unk"
original = "まるでお預けを食らっているようで──とても我慢ならない。"
translation = "마치 애를 태우는 것 같아서── 도저히 참을 수가 없다."

[[dialogue]]
speaker = "アム"
original = "「えっ、あっ、ちょっ……！\u3000なに動こうとして──」"
translation = "「엣, 앗, 잠깐……! 뭐야 움직이려고──」"

[[dialogue]]
speaker = "アム"
original = "「──あぁんっ！？\u3000あぁっ、ふぁ、あぁああんっ！？」"
translation = "「──아앙!? 아앗, 화, 아아앙!?」"

[[dialogue]]
speaker = "unk"
original = "気付けば、たっぷんたっぷんと大きなお尻を弾ませるように、アムを下から突き上げてしまっていた。"
translation = "정신을 차려보니, 타분타분 커다란 엉덩이를 튕기듯이, 아무를 밑에서 쳐올려 버리고 있었다."

[[dialogue]]
speaker = "アム"
original = "「あっ、あっ、あっ、あっ！\u3000ダメっ、あぁっ、ダメぇっ……！\u3000動いちゃダメだってばぁ……！」"
translation = "「앗, 앗, 앗, 앗! 안돼, 아앗, 안돼에……! 움직이면 안 된다니까아……!」"

[[dialogue]]
speaker = "アム"
original = "「今日は、ふぁ、あぁんっ、あたしがリードするって言ったのにぃっ……！\u3000やぁ、あぁ、んはぁぁあんっ……！」"
translation = "「오늘은, 화, 아앙, 내가 리드한다고 했는데에……! 야아, 아아, 응하아아앙……!」"

[[dialogue]]
speaker = "unk"
original = "必死に体重をかけて俺を押さえつけようとしてくるアム。"
translation = "필사적으로 체중을 실어 나를 누르려고 애쓰는 아무."

[[dialogue]]
speaker = "unk"
original = "だけど体が軽いこともあって、俺の動きを邪魔できない。"
translation = "하지만 몸이 가벼운 탓인지, 나의 움직임을 방해하지 못한다."

[[dialogue]]
speaker = "unk"
original = "むしろ体重をかけたことで、よりいっそう深くまでペニスが沈み込んでいって──"
translation = "오히려 체중을 실은 탓에, 더욱 깊숙이 페니스가 가라앉아 버려서──"

[[dialogue]]
speaker = "アム"
original = "「あひぃんっ、あはぁあんっ<emoji=heart04>\u3000あっ、はぁっ、あぁああっっ<emoji=heart04>」"
translation = "「아히잉, 아하아앙<emoji=heart04> 앗, 하아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「深ぁっ<emoji=heart04>\u3000はふああっ<emoji=heart04>\u3000待って、あひぃんっ<emoji=heart04>\u3000ズルいっ、あっ、あっ、あっ、ズルいってばぁ～<emoji=heart04>」"
translation = "「깊어어<emoji=heart04> 하후아앗<emoji=heart04> 기다려, 아히잉<emoji=heart04> 치사해, 앗, 앗, 앗, 치사하다니까아~<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ストップ、あひぃんっ<emoji=heart04>\u3000ストップストップぅっ<emoji=heart04>\u3000ふぁっ、あっ、あっ、あぁっ、突き上げるのやめてぇ～<emoji=heart04>」"
translation = "「스톱, 아히잉<emoji=heart04> 스톱 스톱우<emoji=heart04> 화앗, 앗, 앗, 아앗, 쳐올리는 거 그만해에~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "息も絶え絶えに甘い声で訴えられて、逆に性欲が加速してしまう。"
translation = "숨을 헐떡이며 달콤한 목소리로 호소해 와서, 반대로 성욕이 가속되어 버린다."

[[dialogue]]
speaker = "unk"
original = "大きなお尻とは裏腹に、アムの膣は小柄な見た目そのままにとても狭くて小さくて。"
translation = "커다란 엉덩이와는 정반대로, 아무의 질은 작은 겉모습 그대로 아주 좁고 작아서."

[[dialogue]]
speaker = "unk"
original = "ただでさえミチミチに締め付けてくるのに、突き上げるとブルブル震えながら、きゅーっと抱きついてきてくれて──"
translation = "그렇지 않아도 꽉꽉 조여 오는데, 쳐올리면 부들부들 떨면서, 꼬옥 매달려와 줘서──"

[[dialogue]]
speaker = "アム"
original = "「やっ、あぁっ<emoji=heart04>\u3000膣内で膨らんでっ、あふっ、はふうぅんんっっ～<emoji=heart04>」"
translation = "「얏, 아앗<emoji=heart04> 질내에서 부풀어서, 아훗, 하후우웅응~~<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「こーふん、あぁ、しすぎぃっ<emoji=heart04>\u3000け、結局またあたしの体、好き放題にされちゃってるからぁ<emoji=heart04>」"
translation = "「흥부운, 아아, 너무 해버려어<emoji=heart04> 겨, 결국 또 내 몸, 마음대로 당하고 있으니까아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "思わずガンガン腰を打ち上げてしまう。アムとのセックスが気持ち良すぎて抽挿をとめられない。"
translation = "나도 모르게 쾅쾅 허리를 쳐올리고 만다. 아무와의 섹스가 너무 기분 좋아서 추삽질을 멈출 수 없다."

[[dialogue]]
speaker = "unk"
original = "アムの体を高く浮き上がらせるとムチムチなお尻がポヨンポヨンと強く打ち付けられて、それがまた最高に気持ちいい。"
translation = "아무의 몸을 높이 띄워 올리면 탱탱한 엉덩이가 포용포용 강하게 부딪치고, 그것이 또한 최고로 기분 좋다."

[[dialogue]]
speaker = "アム"
original = "「ふぁっ、あっ、あはぁっ、あぁああんっ<emoji=heart04>」"
translation = "「화앗, 앗, 아하앗, 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ダ、ダメっ、あああっ、また先に、あぁっ、このままじゃ先にイかされちゃっ……<emoji=heart04>」"
translation = "「아, 안돼, 아아앗, 또 먼저, 아앗, 이대로라면 먼저 가버려엇……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「耐えっ、ふぁっ、耐えなきゃっ<emoji=heart04>\u3000せめて、あふぁぁっっ、先にイくのだけは、あぁ、我慢しなきゃっ……<emoji=heart04>」"
translation = "「버텨, 화앗, 버텨야 해엣<emoji=heart04> 적어도, 아화아앗, 먼저 가는 것만은, 아아, 참아야 해엣……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口を半開きにして必死に快感を堪えようとするアムがエロい。"
translation = "입을 반쯤 벌리고 필사적으로 쾌감을 참으려 하는 아무가 야하다."

[[dialogue]]
speaker = "unk"
original = "そんな可愛い悶え姿を見せられると、無理やりにでもイかせたくなってしまう。"
translation = "그런 귀여운 신음하는 모습을 보여주면, 억지로라도 보내버리고 싶어진다."

[[dialogue]]
speaker = "unk"
original = "そう思って、さらに畳みかけようとしていると──"
translation = "그렇게 생각해서, 더욱 몰아붙이려 하고 있자니──"

[[dialogue]]
speaker = "アム母"
original = "「ただいまー」"
translation = "「다녀왔어—」"

[[dialogue]]
speaker = "アム"
original = "「～～っっ！！？\u3000お、お母さん……！！？」"
translation = "「~~윽!!? 어, 엄마……!!?」"

[[dialogue]]
speaker = "unk"
original = "不意に玄関から届いた声に、アムが声と膣を強ばらせる。"
translation = "불시에 현관에서 들려온 목소리에, 아무가 목소리와 질을 굳힌다."

[[dialogue]]
speaker = "アム"
original = "「な、なんで、あぁんっ……！\u3000今日は、ふぁぁ……！\u3000一日留守にしてるって話、だったのにぃ……！」"
translation = "「왜, 왜, 아앙……! 오늘은, 화아……! 하루 종일 집 비운다고 했으면서어……!」"

[[dialogue]]
speaker = "アム"
original = "「よりにもよって、あっ、あっ、こんな時にぃ……！\u3000一旦、あぁ、とめてっ……！\u3000おち○ちん、ふぁ、とめてぇ……！」"
translation = "「하필이면, 앗, 앗, 이런 때에에……! 일단, 아아, 멈춰……! 자지, 화, 멈춰어……!」"

[[dialogue]]
speaker = "unk"
original = "母親の声を聞いて、そうでなくても狭い膣内がペニスにしがみついてくる。"
translation = "어머니의 목소리를 듣고, 그렇지 않아도 좁은 질 내부가 페니스에 달라붙는다."

[[dialogue]]
speaker = "unk"
original = "焦りと羞恥心で力が入ってしまうんだろう。だけど、その尋常じゃない締まりが気持ち良くて、さらにガン突きしてしまう。"
translation = "초조함과 수치심으로 힘이 들어가는 거겠지. 하지만 그 심상치 않은 조임이 기분 좋아서, 더욱 세게 박아버린다."

[[dialogue]]
speaker = "アム"
original = "「ん゛ふぅぅんんっっ～～！！？\u3000ん゛ふっ<emoji=heart04>\u3000ん゛んっ<emoji=heart04>\u3000ん゛っ、ん゛っ、ん゛んんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으으으응~~!!? 응으윽<emoji=heart04> 응응<emoji=heart04> 응, 응, 응으으으으응~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「バっ──ん゛はぁっ<emoji=heart04>\u3000はげひっ<emoji=heart04>\u3000らめぇっ<emoji=heart04>」"
translation = "「바── 응하앗<emoji=heart04> 격해앳<emoji=heart04> 안돼앳<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「おかっ、おかーしゃん、ん゛ぁぁっ、下にいりゅかりゃぁ<emoji=heart04>\u3000かえって、はふぁ、きちゃってるかりゃぁ<emoji=heart04>」"
translation = "「어마, 엄마, 응아앗, 밑에 있으니까아<emoji=heart04> 돌아와, 하후아, 버렸으니까아<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「バレりゅっ<emoji=heart04>\u3000バレちゃふっ<emoji=heart04>\u3000ん゛あぁっっ<emoji=heart04>\u3000こっそり彼氏部屋に呼んでエッチしてりゅのバレちゃうぅ<emoji=heart04>」"
translation = "「들켜어<emoji=heart04> 들켜버려어<emoji=heart04> 응아앗<emoji=heart04> 몰래 남친 방에 불러서 섹스하는 거 들켜버려어<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「おかーしゃん、知らにゃいかりゃ<emoji=heart04>\u3000きょーここに、ん゛はっ、あ゛ぁっ、彼氏きてりゅのしらないかりゃぁ<emoji=heart04>」"
translation = "「엄마, 모르니까아<emoji=heart04> 오늘 여기에, 응하, 아아, 남친 와 있는 거 모르니까아<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「き、きかれちゃっ<emoji=heart04>\u3000あたひの恥ずかしい声っ、ん゛んんんっっ～～<emoji=heart04><emoji=heart04>\u3000おかーしゃんに、きかれちゃうよぉ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「드, 들려버려엇<emoji=heart04> 내 부끄러운 목소리, 응으으으으응~~<emoji=heart04><emoji=heart04> 엄마한테, 들려버린다구우……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "慌てた様子でジタバタと藻掻こうとするアム。"
translation = "당황한 기색으로 허둥지둥 발버둥 치려 하는 아무."

[[dialogue]]
speaker = "unk"
original = "けれど既に感じすぎて力が入らないのか、前のめりになって俺のピストンを受け止めるばかりだ。"
translation = "하지만 이미 너무 느껴서 힘이 들어가지 않는 건지, 앞을 향해 엎드려 나의 피스톤을 받아낼 뿐이다."

[[dialogue]]
speaker = "unk"
original = "口を閉じるのがやっとの様子で、デカ尻を俺に突き上げられながらプルプルと痙攣し続けている。"
translation = "입을 다무는 것이 고작인 듯한 모습으로, 데카지리를 나에게 쳐올려 지며 부들부들 계속 경련하고 있다."

[[dialogue]]
speaker = "アム母"
original = "「玄関に靴があったけど、お友達でも来てるのー？\u3000お菓子とジュース、持っていこうかー？」"
translation = "「현관에 신발이 있던데, 친구라도 왔니—? 과자랑 주스, 가져다줄까—?」"

[[dialogue]]
speaker = "アム"
original = "「～～っっ！！\u3000いらっ、いらなっ──ん゛ふぅんんっっ<emoji=heart04>\u3000らいじょーぶっ<emoji=heart04>\u3000らいじょーぶ、らかりゃぁぁっ……！！」"
translation = "「~~윽!! 필요, 필요 없── 응으으응<emoji=heart04> 괜찮아앗<emoji=heart04> 괜찮아, 라니까아아……!!」"

[[dialogue]]
speaker = "アム母"
original = "「？？？\u3000そーお？」"
translation = "「??? 그래?」"

[[dialogue]]
speaker = "アム"
original = "「しょ、しょー……！！\u3000だかりゃこないれっ……！！\u3000お菓子とか、はふぁ、いーかりゃぁ……！！」"
translation = "「그, 그래—……!! 그러니까 오지 마앗……!! 과자 같은 거, 하후아, 됐으니까아……!!」"

[[dialogue]]
speaker = "アム母"
original = "「はーい。ああそれとお母さんね。このあと……すぐ……」"
translation = "「알았다. 아 그리고 엄마가 말이야. 이 뒤에…… 바로……」"

[[dialogue]]
speaker = "unk"
original = "呼びかけてくる母親に、声を上擦らせながら健気に答えるアム。"
translation = "말을 거는 어머니에게, 목소리를 뒤집으면서 기특하게 대답하는 아무."

[[dialogue]]
speaker = "unk"
original = "言葉を発するたびに、じゅわわと膣内が熱く潤ってきて──恥ずかしがりながらも興奮している様がありありとわかる。"
translation = "말을 내뱉을 때마다, 쥬르르 질 내부가 뜨겁게 젖어와서── 부끄러워하면서도 흥분하고 있다는 것이 확연히 느껴진다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の様子に、俺も射精欲が高まってしまって──"
translation = "그런 그녀의 모습에, 나도 사정감이 고조되어 버려서──"

[[dialogue]]
speaker = "アム"
original = "「ん゛んんっっ！！？\u3000ら、らめっ、ん゛はぁ……！！\u3000いま出しちゃらめぇ……！！」"
translation = "「응으으응!!? 아, 안돼, 응하아……!! 지금 내보내면 안돼에……!!」"

[[dialogue]]
speaker = "アム"
original = "「絶対、ん゛あぁ、我慢できないかりゃ……！！\u3000声、ふぁぁっ、出ちゃっ、おかーしゃんに、ん゛ふぁぁ、聞かれちゃ……！！」"
translation = "「절대, 응아아, 못 참으니까……!! 목소리, 화아아, 나와버려, 엄마한테, 응화아아, 들려버려……!!」"

[[dialogue]]
speaker = "unk"
original = "眉をぎゅっと曲げて、くぐもった嬌声を漏らすアムがものすごくエロい。"
translation = "눈썹을 꾹 휘게 하고, 억눌린 교성을 흘리는 아무가 엄청나게 야하다."

[[dialogue]]
speaker = "unk"
original = "ビショ濡れおま○この感触も相まって、我慢なんてできるはずもない。"
translation = "흠뻑 젖은 보지의 감촉도 한몫해서, 참을 수 있을 리가 없다."

[[dialogue]]
speaker = "アム"
original = "「ん゛ひゃっ<emoji=heart04>\u3000ん゛ぁっ<emoji=heart04>\u3000あ゛ふっ、ん゛はぁっ<emoji=heart04>」"
translation = "「응히약<emoji=heart04> 응아앗<emoji=heart04> 아훗, 응하앗<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「らめっ、ん゛あああっ、ほんとらめっ、らめらめぇっ<emoji=heart04>」"
translation = "「안돼, 응아아아앗, 진짜 안돼, 안돼안돼앳<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「きかれちゃうのにぃっ、ん゛はぁあっ、きもひっ、あふぁっ、きもひいいっっ<emoji=heart04>」"
translation = "「들려버리는데에, 응하아앗, 기분 조와, 아화앗, 기분 조와아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「おひ○ひんっ、おま○こっ、きもちよすぎてっ、いつもいじょうに敏感になりしゅぎててぇっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지잇, 보지잇, 너무 기분 좋아서어, 평소보다 더 민감해져 버려서어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「イ゛っ、イ゛グっ、イ゛グイ゛グイ゛グくぅぅ<emoji=heart04>\u3000もーむりぃっ、あ゛ふぁあああっ、あ゛あぁああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가앗, 가아앗, 가가각 가버려어어<emoji=heart04> 이제 무리이, 아화아아아아앗, 아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「もーらめぇっ<emoji=heart04>\u3000あ゛ぁあっ、まひゃ負けりゅっ<emoji=heart04>\u3000負けちゃふっ<emoji=heart04>」"
translation = "「이제 안돼앳<emoji=heart04> 아아앗, 또 져버려어<emoji=heart04> 져버린다구우<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「彼氏おひ○ひんにっ──負かされちゃふぅぅ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「남친 자지에── 패배해버려어어~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「あ゛ふぁあああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はふぁああっっ──ん゛ぁっ、あ゛あぁああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아화아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04> 하후아아앗── 응아앗, 아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出しを決めた瞬間、家中に響き渡るような大声でアムが激しく絶頂する。"
translation = "질내사정을 결정한 순간, 온 집안에 울려 퍼질 듯한 큰 소리로 아무가 격렬하게 절정한다."

[[dialogue]]
speaker = "アム"
original = "「お゛っ、お゛ぉおおおっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000熱ひのきへぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イ゛グっ、イ゛グぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오, 오오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04> 뜨거엉 기분 조와아<emoji=heart04><emoji=heart04><emoji=heart04> 가앗, 가아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ぎもひいいっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おかーしゃんにきこえちゃふのにっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ん゛はぁぁ、恥ずかひい声きかれちゃふのにぃ～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 조와아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 엄마한테 들려버리는데에<emoji=heart04><emoji=heart04><emoji=heart04> 응하아아, 부끄러운 목소리 들려버리는데에~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰が砕けてしまったのか、ムチムチのお尻が俺の股間にぴったりと張り付いてしまうほど体を下ろしてくるアム。"
translation = "허리에 힘이 풀려버린 건지, 탱탱한 엉덩이가 내 사타구니에 딱 달라붙어 버릴 정도로 몸을 내리는 아무."

[[dialogue]]
speaker = "unk"
original = "そのせいで深々とペニスが膣奥にまで届いて──その感触と射精の快感にアムが今までにないほど蕩けた顔で喘ぎ続ける。"
translation = "그 탓에 깊숙이 페니스가 질 끝까지 닿아서── 그 감촉과 사정의 쾌감에 아무가 지금까지 없었을 정도로 황홀한 얼굴로 계속 신음한다."

[[dialogue]]
speaker = "アム"
original = "「くはぁぁぁ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000まだでへぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ビュービューきへぇっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠하아아아<emoji=heart04><emoji=heart04><emoji=heart04> 아직 나와아아<emoji=heart04><emoji=heart04><emoji=heart04> 뷰르릇 기분 조와앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「きもひいいっ<emoji=heart04>\u3000中出ひきもひいいっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분 조와아아<emoji=heart04> 질내사정 기분 조와아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「会長の射精ビーム、あふぁあああっっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000きもひよしゅぎりゅよぉぉ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장님의 사정 빔, 아화아아아아앗……<emoji=heart04><emoji=heart04><emoji=heart04> 너무 기분 좋다구우우……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ガクンガクンと身を悶えさせながら、絶頂の快楽に身を委ねるアム。"
translation = "덜덜 몸을 떨면서, 절정의 쾌락에 몸을 맡기는 아무."

[[dialogue]]
speaker = "unk"
original = "俺も射精がとまらなくて、空っぽになるまで精を吐き出し続けてしまう。"
translation = "나도 사정이 멈추지 않아서, 텅 빌 때까지 정액을 계속해서 토해낸다."

[[dialogue]]
speaker = "unk"
original = "そうして、いつまで二人して惚け続けていただろうか。"
translation = "그렇게, 얼마나 둘이서 멍하니 있었을까."

[[dialogue]]
speaker = "アム"
original = "「はぁーっ、はぁーっ、はぁーっ。うぅ、また負かされちゃったぁ……」"
translation = "「하아—, 하아—, 하아—. 으으, 또 져버렸어……」"

[[dialogue]]
speaker = "アム"
original = "「こんなにお尻も汚されちゃって……。抜いた後に、はぁはぁ、出し過ぎだよぉ……」"
translation = "「이렇게 엉덩이도 더러워져 버리고……. 뺀 다음에, 하아하아, 너무 많이 쌌다구……」"

[[dialogue]]
speaker = "アム"
original = "「今日こそ主導権握るつもり、だったのにぃ……」"
translation = "「오늘이야말로 주도권 잡을 생각이었는데에……」"

[[dialogue]]
speaker = "アム"
original = "「結局また会長にあんあん喘がされて、はぁはぁ、また好き放題ズンズンされちゃったしぃ……」"
translation = "「결국 또 회장님 때문에 앙앙 소리 내버리고, 하아하아, 또 마음대로 마구 휘둘려버렸고오……」"

[[dialogue]]
speaker = "unk"
original = "悔しそうに歯ぎしりしながら、ぜぇはぁと荒い呼吸を繰り返すアム。"
translation = "분한 듯이 이를 갈며, 헉헉거리는 거친 호흡을 반복하는 아무."

[[dialogue]]
speaker = "unk"
original = "アムは気付いてないのかもしれないが、いつも夢中で腰を振らされている時点で俺の負けなんだけど。"
translation = "아무는 모르고 있는 걸지도 모르지만, 항상 정신없이 허리를 흔들게 만들고 있는 시점에서 나의 패배인데."

[[dialogue]]
speaker = "unk"
original = "でも、そういうところに気付かない子供っぽさもまた可愛い。"
translation = "하지만 그런 점을 깨닫지 못하는 어린아이 같은 면도 또한 귀엽다."

[[dialogue]]
speaker = "アム"
original = "「あ……！\u3000そ、そうだ、お母さんは……！？\u3000あたしの恥ずかしい声、はぁはぁ、聞かれちゃったんじゃ……！！」"
translation = "「아……! 마, 맞다, 엄마는……!? 내 부끄러운 목소리, 하아하아, 들려버린 거 아냐……!!」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "アム"
original = "「あ……あれ？\u3000ふつーなら飛んできそうなものなのに……」"
translation = "「어…… 어라? 보통이라면 달려오셨을 텐데……」"

[[dialogue]]
speaker = "アム"
original = "「もしかして……また出かけて行ったのかな？\u3000一日留守にするって言ってたし、忘れ物取りに来ただけだったのかも……」"
translation = "「설마…… 또 나가신 건가? 하루 종일 집 비운다고 하셨고, 잊은 물건 찾으러 오신 것뿐이었을지도……」"

[[dialogue]]
speaker = "unk"
original = "そうかもしれない。「このあと……すぐ」と、それらしいような言葉が聞こえてきた覚えがある。"
translation = "그럴지도 모른다. 「이 뒤에…… 바로」라고, 그럴듯한 말이 들려왔던 기억이 있다."

[[dialogue]]
speaker = "アム"
original = "「だったら、よーし……！\u3000次こそ、あたしがヒーヒー言わせてあげる……！」"
translation = "「그렇다면, 조아—……! 다음번에야말로 내가 앙앙거리게 해줄 거야……!」"

[[dialogue]]
speaker = "アム"
original = "「負けっ放しじゃ悔しいもん……！\u3000そもそもあたしがするって言ってたのに、いきなり責めてくるなんてズルいし……！」"
translation = "「계속 지기만 하면 분하단 말이야……! 애초에 내가 한다고 했는데, 갑자기 공격해오다니 치사하고……!」"

[[dialogue]]
speaker = "unk"
original = "気を取り直した様子で、アムが姿勢を整えようとしてくる。"
translation = "기운을 차린 듯한 모습으로, 아무가 자세를 가다듬으려 한다."

[[dialogue]]
speaker = "unk"
original = "彼女の魅力に負けているのは俺の方なのに、ムキになってしまうアムが本当に可愛らしい。"
translation = "그녀의 매력에 지고 있는 것은 나 쪽인데, 오기가 생겨버리는 아무가 정말 사랑스럽다."

[[dialogue]]
speaker = "アム"
original = "「むむっ、そのニヤニヤ顔がムカつく～！」"
translation = "「으으, 그 히죽거리는 얼굴 짜증 나~!」"

[[dialogue]]
speaker = "アム"
original = "「今度こそ絶対に、はぁはぁっ、負かしてあげるんだからねっ……！」"
translation = "「이번에야말로 절대로, 하아하아, 이겨버릴 거니까!」"

[[dialogue]]
speaker = "アム"
original = "「いっぱい気持ち良くして、んっ、はぁ……<emoji=heart04>\u3000もーっとあたしの虜に、はぁはぁっ、しちゃうんだからっ……<emoji=heart04>」"
translation = "「잔뜩 기분 좋게 해서, 응, 하아……<emoji=heart04> 더어욱 내 포로로, 하아하아, 만들어 버릴 거니까……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「覚悟しておいてよっ、ねっ<emoji=heart04>」"
translation = "「각오해두라고, 응?<emoji=heart04>」"

