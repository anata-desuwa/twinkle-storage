[[dialogue]]
speaker = "unk"
original = "第４話,ヴィーナスの夢,P"
translation = "제4화, 비너스의 꿈, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。俺はヴィーナスに誘われて、九浄家へ遊びにやってきていた。"
translation = "어느 휴일. 나는 비너스의 권유로, 쿠죠 가에 놀러 와 있었다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「パパ～！\u3000いらっしゃ～い♪」"
translation = "「아빠~! 어서 와~♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「おお、魔王よ、よく来たな。今日はゆっくりしていくがよい」"
translation = "「오오, 마왕이여, 잘 왔다. 오늘은 푹 쉬다 가도록 해라」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「えへへ～♪\u3000今日はパパにいっぱい甘えたい日だから、リトルフォームで待ってたわ！」"
translation = "「에헤헤~♪ 오늘은 아빠한테 잔뜩 어리광 부리고 싶은 날이라서, 리틀 폼으로 기다렸어!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ。ヴィーナス、子供のようにはしゃいで……」"
translation = "「후훗. 비너스, 아이처럼 들떠서는……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「リトルフォーム、実によいものだな。見るたびに可愛くて、つい色々な衣装を着せたくなってしまう」"
translation = "「리틀 폼, 실로 좋은 것이군. 볼 때마다 귀여워서, 나도 모르게 여러 옷을 입혀보고 싶어지는구나」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「私もリトルフォームになると、ヘレナちゃん<b>ママ</b>がよく頭を撫でてくれるから、つい変身したくなっちゃうわ♪」"
translation = "「나도 리틀 폼이 되면, 헬레나짱 <b>엄마</b>가 자주 머리를 쓰다듬어 주니까, 나도 모르게 변신하고 싶어져♪」"

[[dialogue]]
speaker = "unk"
original = "ママって呼んでいるところ、初めてみた"
translation = "엄마라고 부르는 건, 처음 봤다."

[[dialogue]]
speaker = "ヘレナ"
original = "「私も初めて呼ばれた時は、思わず胸がキュンとしてしまった。まさか、ヴィーナスからそう呼ばれる日が来ようとはな」"
translation = "「나도 처음 불렸을 때는, 나도 모르게 가슴이 뭉클했지. 설마, 비너스에게 그렇게 불릴 날이 올 줄이야」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「セシアもよく『ママは何人いてもいい』って言っているし、ヘレナちゃんママは『魔王ハーレム建造計画』の一員だから、モーマンタイよ♪」"
translation = "「세시아도 자주 『엄마는 몇 명이라도 좋다』고 말하고 있고, 헬레나짱 엄마는 『마왕 하렘 건조 계획』의 일원이니까, 무문제야♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふっ、まるで本当に娘ができたような感じがするな、魔王パパ<emoji=heart04>」"
translation = "「후훗, 마치 정말로 딸이 생긴 것 같은 기분이 드는군, 마왕 아빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その呼び方はリアクションに困るよ！？"
translation = "그 호칭은 반응하기 곤란하다고!?"

[[dialogue]]
speaker = "ヘレナ"
original = "「ヴィーナスが呼んでいるから、<ruby>無問題<rt>モーマンタイ</rt></ruby>であろう？\u3000ふふふっ♪」"
translation = "「비너스가 부르고 있으니, 무문제 아니겠나? 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんはイタズラっぽくウインクしながら、笑ってみせるのだった。"
translation = "헬레나짱은 장난스럽게 윙크하며, 웃어 보이는 것이었다."

[[dialogue]]
speaker = "unk"
original = "それから俺はヴィーナスと、彼女の部屋へと移動した。"
translation = "그러고 나서 나는 비너스와 함께, 그녀의 방으로 이동했다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ここからは、私がパパを独り占めね♪」"
translation = "「여기서부터는, 내가 아빠를 독차지할 거야♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ねぇ、パパ～、抱っこして～<emoji=heart04>\u3000ん～♪\u3000すりすり～<emoji=heart04>」"
translation = "「있지, 아빠~, 안아줘~<emoji=heart04> 응~♪ 부비부비~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺の膝の上で、向かい合うような形で座ると、顔をすりすりさせてくる。"
translation = "비너스는 내 무릎 위에서 서로 마주 보는 형태로 앉더니, 얼굴을 부비부비해 온다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――そうだわ！\u3000あのね、今日はパパに相談したいことがあったの」"
translation = "「――맞다! 저기 있지, 오늘은 아빠한테 상담하고 싶은 게 있었어」"

[[dialogue]]
speaker = "unk"
original = "相談したいこと？"
translation = "상담하고 싶은 것?"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「私ね、パパのハーレム計画とは別に、ここ最近、自分が学園を卒業したらどうなりたいかって考えてたの！」"
translation = "「나 말이야, 아빠의 하렘 계획과는 별개로, 요새 내가 학원을 졸업하면 어떻게 되고 싶은지 생각해 봤어!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ほら、『こどもの日をお祝いしてもらいたい』ってことで、このリトルフォームに変身できるようになったでしょ？」"
translation = "「봐봐, 『어린이날을 축하받고 싶다』는 생각으로 이 리틀 폼으로 변신할 수 있게 됐잖아?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「その時にレミカが、アイドルとして本気で夢を追っているのを見て――」"
translation = "「그때 레미카가 아이돌로서 진심으로 꿈을 쫓는 걸 보고――」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「私が将来やりたいこと……『夢』ってなんだろうって、考えてみるようになったの」"
translation = "「내가 장래에 하고 싶은 일…… 『꿈』이란 게 뭘까 하고 생각해보게 됐어」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「それでね、私――学園に通って、仲間がたくさんできて、今の毎日がすごく楽しいの！」"
translation = "「그래서 말인데, 나―― 학원에 다니면서 동료가 많이 생겨서 지금 매일매일이 정말 즐거워!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「だけど、いつかは学園を卒業しなくちゃいけない時が来るでしょ？」"
translation = "「하지만 언젠가는 학원을 졸업해야 할 때가 오잖아?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「それなら私、学園を卒業しても──そのまま学園に居られる仕事がしたいって思ったの！」"
translation = "「그렇다면 나, 학원을 졸업해도── 그대로 학원에 머물 수 있는 일을 하고 싶다고 생각했어!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「私にどんな仕事ができるのかは、まだよくわからないけれど――」"
translation = "「나한테 어떤 일을 할 수 있을지는 아직 잘 모르겠지만――」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「そのことも含めて、ヘレナちゃんに『卒業したら、学園に関わる仕事がしたい』って相談しようと思ってるの！」"
translation = "「그 점도 포함해서 헤레나 짱한테 『졸업하면 학원과 관련된 일을 하고 싶다』고 상담해 보려고 해!」"

[[dialogue]]
speaker = "unk"
original = "まだ相談はしてないんだ？"
translation = "아직 상담은 안 한 거야?"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「うん！\u3000最初に話すのは、パパがいいなって。パパが私のやりたいことをどう思うか、聞きたかったの！」"
translation = "「응! 제일 먼저 이야기하는 건 아빠였으면 해서. 아빠가 내가 하고 싶은 일을 어떻게 생각하는지 듣고 싶었어!」"

[[dialogue]]
speaker = "unk"
original = "俺は、ヴィーナスの将来の『夢』はすごくいいと思った。"
translation = "나는 비너스의 장래의 『꿈』이 굉장히 좋다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "星徒会だけじゃなく『新星学園のフィクサー』になるヴィーナスの姿が、すぐにイメージとして思い浮かんでくる感じがした。"
translation = "성도회뿐만 아니라 『신성학원의 픽서』가 되는 비너스의 모습이 곧장 이미지로서 머릿속에 떠오르는 느낌이 들었다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「新星学園のフィクサー……！\u3000それ、すごく素敵ね！」"
translation = "「신성학원의 픽서……! 그거 정말 멋지네!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「私、これから色々勉強して、もっとすごいフィクサーになれるように頑張るわ♪」"
translation = "「나, 앞으로 여러 가지 공부해서 더 대단한 픽서가 될 수 있도록 노력할게♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「あっ！\u3000もちろん、パパのお嫁さんになるのも忘れてないわよ♪」"
translation = "「앗! 물론 아빠의 신부가 되는 것도 잊지 않았어♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「私の夢の１つは、パパと一緒に子供がたくさんいる、幸せな家族を作ることなんだから♪」"
translation = "「내 꿈 중 하나는 아빠랑 같이 아이가 잔뜩 있는 행복한 가족을 만드는 거니까♪」"

[[dialogue]]
speaker = "unk"
original = "俺も、ヴィーナスと幸せな家庭を築きたい"
translation = "나도 비너스와 행복한 가정을 꾸리고 싶어"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「えへへへへへぇ<emoji=heart04>\u3000嬉しい<emoji=heart04>」"
translation = "「에헤헤헤헤헤<emoji=heart04> 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――うん？\u3000でも、魔王ハーレム建造は要相談？」"
translation = "「――응? 하지만 마왕 하렘 건조는 상담 요망?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「う～ん、みんなと仲よく家族になれたら、すっごく楽しいだろうなって私は思うんだけど～」"
translation = "「으음~ 모두와 사이좋게 가족이 된다면 정말 즐겁겠다고 나는 생각하는데~」"

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスが１番好きだから。"
translation = "나는 비너스를 제일 좋아하니까."

[[dialogue]]
speaker = "unk"
original = "ヴィーナス自身が思ってるよりも、俺はヴィーナスのことが好きなんだ、と真っすぐに彼女の目を見て伝える。"
translation = "비너스 자신이 생각하는 것보다도 나는 비너스를 좋아한다고 똑바로 그녀의 눈을 보며 전한다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「……！？\u3000パパっ<emoji=heart04>\u3000私、今すっごく『好き』って気持ちが、いっぱい溢れてきたわ<emoji=heart04>」"
translation = "「……!? 아빠<emoji=heart04> 나, 지금 정말로 『좋아』라는 기분이 한가득 넘쳐흘러 왔어<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「――え？\u3000だからもうしばらくは、私を独り占めにして、２人っきりの恋人生活を楽しみたい？」"
translation = "「――에? 그러니까 당분간은 나를 독점해서 둘만의 연인 생활을 즐기고 싶다고?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「わかったわ♪\u3000つまり、私がリトルフォームでパパに甘えたいみたいに、パパも恋人として私に甘えたいってことね<emoji=heart04>」"
translation = "「알았어♪ 즉, 내가 리틀 폼으로 아빠한테 어리광 부리고 싶은 것처럼, 아빠도 연인으로서 나한테 어리광 부리고 싶다는 거네<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「じゃあ……今日はお休みだから、パパも遠慮しないで、思いっきり私に甘えていいわよ<emoji=heart04>」"
translation = "「그럼…… 오늘은 쉬는 날이니까 아빠도 사양 말고 마음껏 나한테 어리광 부려도 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ん～っ<emoji=heart04>」"
translation = "「응~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが俺の顔を見上げて唇を差し出し、おねだりの顔をみせる。"
translation = "비너스가 내 얼굴을 올려다보며 입술을 내밀고 조르는 듯한 표정을 보여준다."

[[dialogue]]
speaker = "unk"
original = "俺はそっと、彼女の顔に近づいて――"
translation = "나는 살며시 그녀의 얼굴에 다가가서――"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「ちゅっ<emoji=heart04>\u3000……パパ、大好き<emoji=heart04>」"
translation = "「쪽<emoji=heart04> ……아빠, 너무 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスを交わして、愛の言葉を囁き合う。"
translation = "키스를 나누고 사랑의 말을 서로 속삭인다."

[[dialogue]]
speaker = "unk"
original = "俺も大好きだ、ヴィーナス"
translation = "나도 정말 좋아해, 비너스"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「んっ……パパっ<emoji=heart04>\u3000ちゅっ、ちゅっ<emoji=heart04>」"
translation = "「응…… 아빠<emoji=heart04> 쪽, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「パパ、もっとぉ……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「아빠, 더어……<emoji=heart04> 응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人だけの空間で、俺は最愛の彼女と幸せな時間を過ごすのだった。"
translation = "둘만의 공간에서 나는 최애인 그녀와 행복한 시간을 보내는 것이었다."

