[[dialogue]]
speaker = "unk"
original = "第４話,チナの想い,P"
translation = "제4화, 치나의 마음, P"

[[dialogue]]
speaker = "unk"
original = "ここ最近、チナと一緒にお昼を食べることが多くなっていた。"
translation = "요즘 들어 치나와 함께 점심을 먹는 일이 잦아졌다."

[[dialogue]]
speaker = "チナ"
original = "「ったく、またあんたか……アタシが飯食ってるとこ見て何かいいことあるのかよ？」"
translation = "「칫, 또 너냐…… 내가 밥 먹는 거 보고 뭔가 좋은 일이라도 있냐?」"

[[dialogue]]
speaker = "unk"
original = "俺的にはいいことあるよ"
translation = "나로서는 좋은 일 있지"

[[dialogue]]
speaker = "チナ"
original = "「え、マジで……？\u3000何かの特殊性癖か……？」"
translation = "「에, 진짜로……? 뭔가 특수한 성벽인가……?」"

[[dialogue]]
speaker = "チナ"
original = "「いや、深く考えるのはやめとこう。なんか妙な気分になりそうだ」"
translation = "「아니, 깊게 생각하는 건 그만두자. 뭔가 이상한 기분이 들 것 같아」"

[[dialogue]]
speaker = "チナ"
original = "「なぁ……今日の放課後だけどさ、２人きりになれるとこ、ないか？」"
translation = "「야…… 오늘 방과 후 말인데, 둘이서만 있을 수 있는 곳, 없냐?」"

[[dialogue]]
speaker = "unk"
original = "２人きりになれる場所──ということで放課後、星徒会室に来てもらった。"
translation = "둘이서만 있을 수 있는 장소──라는 이유로 방과 후, 성도회실로 와 달라고 했다."

[[dialogue]]
speaker = "チナ"
original = "「星徒会室か……確かに２人きりになるにはちょうどいいか」"
translation = "「성도회실인가…… 확실히 둘이서만 있기엔 딱 좋겠네」"

[[dialogue]]
speaker = "チナ"
original = "「単刀直入に言う。あんたに話がある」"
translation = "「단도직입적으로 말할게. 너한테 할 말이 있어」"

[[dialogue]]
speaker = "チナ"
original = "「悪かった。謝るよ」"
translation = "「미안했다. 사과할게」"

[[dialogue]]
speaker = "unk"
original = "俺の前で深々と頭を下げるチナ。"
translation = "내 앞에서 고개를 깊이 숙이는 치나."

[[dialogue]]
speaker = "unk"
original = "数十秒か、それ以上か、しばらくその姿勢を続け、ようやく顔を上げる。"
translation = "수십 초일까, 그 이상일까, 한동안 그 자세를 유지하다가, 겨우 얼굴을 든다."

[[dialogue]]
speaker = "チナ"
original = "「アタシはあんたを家族の仇だと思ってた」"
translation = "「나는 너를 가족의 원수라고 생각했어」"

[[dialogue]]
speaker = "チナ"
original = "「魔王がデネブを裏切ってアルタイルに逃げたって聞いて、あんたのせいでデネブがぐちゃぐちゃになったと思っていた」"
translation = "「마왕이 데네브를 배신하고 알타이르로 도망쳤다고 듣고, 너 때문에 데네브가 엉망진창이 되었다고 생각했어」"

[[dialogue]]
speaker = "チナ"
original = "「あんたがデネブを裏切らなければ、アタシの家族は今も生きていると、そう思っていた」"
translation = "「네가 데네브를 배신하지 않았다면, 내 가족은 지금도 살아 있을 거라고, 그렇게 생각했어」"

[[dialogue]]
speaker = "チナ"
original = "「……だけど、そうじゃないんだな」"
translation = "「……하지만, 그렇지 않더군」"

[[dialogue]]
speaker = "チナ"
original = "「あんたと戦って、ここしばらく一緒にいて、あんたがデネブを裏切ったわけじゃないってことはわかった」"
translation = "「너와 싸우고, 최근 함께 지내면서, 네가 데네브를 배신한 게 아니라는 건 알았어」"

[[dialogue]]
speaker = "チナ"
original = "「もしもどこかにデネブを裏切った魔王がいたとしても、アルタイルのあんたは別人だ。あんたはアルタイルを守ろうとする、１人の星騎士だった」"
translation = "「만약 어딘가에 데네브를 배신한 마왕이 있었다고 해도, 알타일의 너는 다른 사람이다. 너는 알타이르를 지키려고 하는, 한 명의 성기사였어」"

[[dialogue]]
speaker = "チナ"
original = "「破滅の化身とか、お前が世界を滅ぼすとか、いろいろ言って悪かった」"
translation = "「파멸의 화신이니, 네가 세계를 멸망시킬 거니, 여러 가지로 말해서 미안했다」"

[[dialogue]]
speaker = "チナ"
original = "「魔王だから、悪者扱いには慣れてる……？\u3000いや慣れちゃダメだろ。アタシが言うのもなんだけど」"
translation = "「마왕이니까, 악당 취급에는 익숙하다고……? 아니 익숙해지면 안 되지. 내가 할 말은 아니지만」"

[[dialogue]]
speaker = "unk"
original = "気にしてくれてありがとう"
translation = "신경 써줘서 고마워"

[[dialogue]]
speaker = "チナ"
original = "「ベアトは言っていた。ルヴィは新しい女神で、リクリエを起こそうとしているって」"
translation = "「베아토는 말했어. 루비네는 새로운 여신이고, 리크리에를 일으키려고 한다고」"

[[dialogue]]
speaker = "チナ"
original = "「創造神とか、新しい女神とか、そんなこと言われたってそう簡単に信じられない。ルヴィがアタシたちを騙していたなんて、思いたくない」"
translation = "「창조신이니, 새로운 여신이니, 그런 말을 들었다고 해서 그렇게 쉽게 믿을 수는 없어. 루비네가 우리를 속였다는 건, 믿고 싶지 않아」"

[[dialogue]]
speaker = "チナ"
original = "「だけど……アタシは信じたくないだけかもしれない」"
translation = "「하지만…… 나는 단지 믿고 싶지 않은 것일지도 몰라」"

[[dialogue]]
speaker = "チナ"
original = "「ルヴィは仲間なんだって、まだ信じていたいのかもしれない」"
translation = "「루비네는 동료라고, 아직 믿고 싶을지도 몰라」"

[[dialogue]]
speaker = "unk"
original = "極星学園の星徒会長・ルヴィネ。"
translation = "극성 학원의 성도회장 루비네."

[[dialogue]]
speaker = "unk"
original = "彼女は女神テルルに代わる新しい女神であり、創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に従ってリクリエを起こそうとしている。"
translation = "그녀는 여신 테루루를 대신하는 새로운 여신이며, 창조신 『제로스』에 따라 리크리에를 일으키려고 하고 있다."

[[dialogue]]
speaker = "unk"
original = "だけどルヴィネはモンスターからデネブを守ったり、アルバイトをしたりと、その目的とは矛盾する行動も取っていた。"
translation = "하지만 루비네는 몬스터로부터 데네브를 지키거나, 아르바이트를 하거나 하는 등, 그 목적과는 모순되는 행동도 취하고 있었다."

[[dialogue]]
speaker = "チナ"
original = "「だけど決めたんだ。何があろうと、アタシはデネブを守るために戦う」"
translation = "「하지만 결정했어. 무슨 일이 있어도, 나는 데네브를 지키기 위해 싸울 거야」"

[[dialogue]]
speaker = "チナ"
original = "「デネブを守るためなら誰とでも戦う。アルタイルとも、ルヴィともだ」"
translation = "「데네브를 지키기 위해서라면 누구와도 싸울 거야. 알타이르와도, 루비네와도」"

[[dialogue]]
speaker = "チナ"
original = "「もちろん戦わなくて済むならそれでいい。アタシだって好き好んでアルタイルを破壊したいわけじゃない」"
translation = "「물론 싸우지 않아도 된다면 그걸로 됐어. 나도 좋아서 알타이르를 파괴하고 싶은 건 아니야」"

[[dialogue]]
speaker = "unk"
original = "ああ、わかってるよ"
translation = "응, 알고 있어"

[[dialogue]]
speaker = "チナ"
original = "「あんたは、デネブとアルタイル、どちらも救うと言った」"
translation = "「너는, 데네브와 알타이르, 둘 다 구하겠다고 말했지」"

[[dialogue]]
speaker = "チナ"
original = "「本当に可能なら、アタシも両方の世界を守りたい。……結局あんたと同じこと言うのは癪だけどな」"
translation = "「정말로 가능하다면, 나도 양쪽 세계를 지키고 싶어. ……결국 너와 같은 말을 하는 건 분하지만 말이야」"

[[dialogue]]
speaker = "チナ"
original = "「あんたにはこの気持ちを聞いてほしかったんだ」"
translation = "「너에게 이 마음을 들어줬으면 했어」"

[[dialogue]]
speaker = "チナ"
original = "「今日２人きりになりたいって言ったのはこのためだ。聞いてくれて、ありがとう」"
translation = "「오늘 둘이서만 있고 싶다고 말한 건 이 때문이야. 들어줘서, 고마워」"

[[dialogue]]
speaker = "チナ"
original = "「ん？\u3000どうした魔王？\u3000ちょっと安心したような、がっかりしたような顔して」"
translation = "「응? 왜 그래 마왕? 뭔가 안심한 듯한, 실망한 듯한 얼굴을 하고」"

[[dialogue]]
speaker = "unk"
original = "２人きりだからてっきり告白かと思って"
translation = "둘이서만 있으니까 당연히 고백인 줄 알고"

[[dialogue]]
speaker = "チナ"
original = "「は……？\u3000こくはく……？」"
translation = "「하……? 고백……?」"

[[dialogue]]
speaker = "チナ"
original = "「はあっ！？\u3000そんなわけないだろ、この色ボケ魔王！\u3000こっちは真剣なんだぞ！」"
translation = "「하아아!? 그럴 리가 없잖아, 이 색골 마왕! 이쪽은 진지하다고!」"

[[dialogue]]
speaker = "チナ"
original = "「そもそも、アタシから告白されたって嬉しいのかよ？」"
translation = "「애초에, 나한테 고백받았다고 기쁘기라도 하냐?」"

[[dialogue]]
speaker = "unk"
original = "すごく嬉しいよ"
translation = "엄청 기뻐"

[[dialogue]]
speaker = "チナ"
original = "「はぁあああっ！？\u3000何言ってんだバカ！！」"
translation = "「하아아아앗!? 무슨 소리 하는 거야 바보!!」"

[[dialogue]]
speaker = "チナ"
original = "「ったく、からかうなっての……アタシのどこがいいんだか」"
translation = "「칫, 놀리지 말라고…… 내 어디가 좋다는 건지」"

[[dialogue]]
speaker = "チナ"
original = "「ああ、あともうひとつ、言うの忘れてた」"
translation = "「아, 그리고 하나 더, 말하는 걸 잊었어」"

[[dialogue]]
speaker = "チナ"
original = "「あんたと教皇庁で戦った時、アタシを助けてくれたよな。あんたが止めてくれなかったらアタシは死んでいた」"
translation = "「너와 교황청에서 싸웠을 때, 나를 구해줬지. 네가 멈춰주지 않았다면 나는 죽었을 거야」"

[[dialogue]]
speaker = "チナ"
original = "「あの時は、アルタイルを滅ぼせれば、アタシは死んでもよかった。だけど今生きていて、まだやるべきことがあると思っている」"
translation = "「그때는, 알타이르를 멸망시킬 수 있다면, 나는 죽어도 좋다고 생각했어. 하지만 지금 살아 있고, 아직 해야 할 일이 있다고 생각해」"

[[dialogue]]
speaker = "チナ"
original = "「だから本当に……ありがとな！」"
translation = "「그러니까 정말로…… 고마워!」"

