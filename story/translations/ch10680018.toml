[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ぎゅ～……<emoji=heart04>\u3000ふふ、落ち着いちゃうなぁ～」"
translation = "「기우~뚱……<emoji=heart04> 후후, 안심되네~」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「さ、流石に抱きつきすぎですって（汗）」"
translation = "「아, 아무리 그래도 너무 매달리시는 거 아닌가요 (땀)」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「逃げちゃダーメ。充電中なんだから♪\u3000もうしばらく抱きつかせて？」"
translation = "「도망치면 안~ 돼. 충전 중이니까 말이야♪ 조금만 더 안고 있게 해줘?」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「よ、よっぽど大変だったんですね？\u3000平行世界に行ったとか話してましたけど……」"
translation = "「정, 정말 고생 많으셨나 보네요? 평행세계에 갔다느니 하는 말씀도 하셨고……」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「事件が大変だったのもあるけど、先輩として気を張りっぱなしだったからね。こうして気を抜く暇もなくて……」"
translation = "「사건이 힘들었던 것도 있지만, 선배로서 계속 긴장하고 있었으니까 말이야. 이렇게 긴장을 풀 틈도 없어서……」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「夜遅くに呼び出しちゃってごめんね？\u3000こういう時に甘えられるのってシン君だけだから」"
translation = "「밤늦게 불러내서 미안해? 이럴 때 어리광부릴 수 있는 건 신 군뿐이라서 말이야」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「いえいえ。彼氏冥利に尽きますよ」"
translation = "「아뇨아뇨. 남자친구로서 보람을 느낍니다」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「えへへ、さっすがシン君♪\u3000なら遠慮なく甘えちゃおうかな<emoji=heart04>」"
translation = "「에헤헤, 역시 신 군♪ 그럼 사양 말고 어리광부려 볼까나<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってリア先輩が僕の顔に頬ずりしながら、体に回した手にぎゅっと力を込めて抱き締めてくる。"
translation = "그렇게 말하며 리아 선배가 내 얼굴에 볼을 비비면서, 몸을 감싼 손에 꽉 힘을 주어 끌어안는다."

[[dialogue]]
speaker = "unk"
original = "まるで抱き枕にでもなった気分だ。でもむしろ役得というか。"
translation = "마치 다키마쿠라라도 된 기분이다. 하지만 오히려 이득이라고 해야 할까."

[[dialogue]]
speaker = "unk"
original = "リア先輩の体温に包まれて、おっぱいもむにゅんむにゅんと押しつけられて、体がどんどん火照っていってしまう。"
translation = "리아 선배의 체온에 감싸여서 가슴도 뭉클뭉클하게 눌려 와, 몸이 점점 달아오르고 만다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あ……ふふふ、エッチな顔になってるゾ♪」"
translation = "「아…… 후후후, 야한 얼굴이 됐다구♪」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「っっ。す、すみません」"
translation = "「윽. 죄, 죄송합니다」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「謝らなくてもいいよ。私もシン君とイチャイチャしたくてここに呼んだんだから」"
translation = "「사과하지 않아도 돼. 나도 신 군이랑 꽁냥거리고 싶어서 여기 부른 거니까」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「たくさん、んっ……ちゅっ……<emoji=heart04>\u3000イチャイチャしよ<emoji=heart04>\u3000めいっぱい甘えさせて欲しいな♪\u3000ここなら誰かに見られる心配もないし♪」"
translation = "「잔뜩, 응…… 쪽……<emoji=heart04> 꽁냥거리자<emoji=heart04> 마음껏 어리광부리게 해줬으면 좋겠어♪ 여기라면 누가 볼 걱정도 없으니까 말이야♪」"

[[dialogue]]
speaker = "unk"
original = "恋人になってからというもの、リア先輩が日に日に甘えん坊になってきている気がする。"
translation = "연인이 된 이후로 리아 선배가 나날이 어리광쟁이가 되어가는 기분이다."

[[dialogue]]
speaker = "unk"
original = "普段は先輩としてみんなの面倒を見てくれているけど、二人きりになるとそれはもう子供みたいに甘えてくれるようになって──"
translation = "평소에는 선배로서 모두를 돌봐주고 있지만, 둘만 있게 되면 그건 이제 아이처럼 어리광부려 오게 되어서──"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「はぁはぁ、えへへ……<emoji=heart04>\u3000くっついてるだけで、すごくエッチな気分になってきちゃった……<emoji=heart04>」"
translation = "「하아 하아, 에헤헤……<emoji=heart04> 달라붙어 있는 것만으로, 엄청 야한 기분이 돼버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「そういうコトも……おねだりしちゃっていい？」"
translation = "「그런 것도…… 졸라도 될까?」"

[[dialogue]]
speaker = "unk"
original = "頬を赤くして尋ねてきてくれるリア先輩がものすごく可愛い。"
translation = "뺨을 붉히며 물어오는 리아 선배가 너무나도 귀엽다."

[[dialogue]]
speaker = "unk"
original = "口で返事するよりも先に体の方が反応してしまう。"
translation = "입으로 대답하기보다 먼저 몸 쪽이 반응해 버린다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「えへへ、決まり……だね<emoji=heart04>\u3000じゃあ、こっち来て？」"
translation = "「에헤헤, 결정……이네<emoji=heart04> 그럼, 이쪽으로 와볼래?」"

[[dialogue]]
speaker = "unk"
original = "膨れあがったズボンを見てリア先輩が頬を赤くして微笑む。そして、僕を窓際の方へ引っ張って行くと──"
translation = "부풀어 오른 바지를 보며 리아 선배가 뺨을 붉히며 미소 짓는다. 그리고 나를 창가 쪽으로 이끌고 가더니──"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「はぁ、はぁ……<emoji=heart04>\u3000おっきいのがお尻に当たって……<emoji=heart04>」"
translation = "「하아, 하아……<emoji=heart04> 커다란 게 엉덩이에 닿아서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「立ったままでいいんですか？\u3000ソファーの上とか机の上に寝転がっても……」"
translation = "「선 채로 괜찮으시겠어요? 소파 위나 책상 위에 눕히는 게……」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「今夜はめいっぱいあなたを感じたいから……<emoji=heart04>\u3000後ろから思いっきりズンズンして欲しくって……<emoji=heart04>」"
translation = "「오늘 밤은 마음껏 당신을 느끼고 싶으니까……<emoji=heart04> 뒤에서 힘껏 쿵쾅쿵쾅해 줬으면 좋겠어서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「この体勢なら奥の奥まで入ってくるから……<emoji=heart04>\u3000ものすごく気持ち良くなれるし……<emoji=heart04>」"
translation = "「이 자세라면 끝까지 깊숙이 들어오니까……<emoji=heart04> 엄청나게 기분 좋아질 수 있고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱っぽい吐息を漏らしながらリア先輩が可愛いお尻を突き出してきてくれる。"
translation = "열 섞인 숨을 내쉬며 리아 선배가 귀여운 엉덩이를 내밀어 준다."

[[dialogue]]
speaker = "unk"
original = "まるで尻尾を振っておねだりする子犬のようだ。そんな姿を恥ずかしがらずに僕へ見せてくれることが嬉しい。"
translation = "마치 꼬리를 흔들며 조르는 강아지 같다. 그런 모습을 부끄러워하지 않고 내게 보여주는 것이 기쁘다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「めいっぱい甘えちゃっていいんだよね？\u3000なら、はぁはぁ、うんと気持ち良くして欲しいな……<emoji=heart04>」"
translation = "「마음껏 어리광부려도 되는 거지? 그럼, 하아 하아, 아~주 기분 좋게 해줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「それとも流石に甘えすぎ、かな？\u3000お姉ちゃんらしくないよね？」"
translation = "「아니면 역시 너무 어리광부리는 걸까나? 언니답지 않지?」"

[[dialogue]]
speaker_original = "シン"
speaker_translation = "신"
original = "「甘えてもらえるの、すごく嬉しいです。先輩に信頼してもらってるんだなぁって実感できますから」"
translation = "「어리광부려 주시는 거, 정말 기뻐요. 선배님이 저를 신뢰하고 계신다는 게 실감이 나니까요」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ふふ、恋人になる前から信頼してるよ♪\u3000今はそれ以上に、愛してるの（はぁと）」"
translation = "「후후, 연인이 되기 전부터 신뢰하고 있었어♪ 지금은 그 이상으로, 사랑해(하트)」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「だから、ね？\u3000早く、ん……はぁ、挿れて？」"
translation = "「그러니까, 응? 빨리, 응…… 하아, 넣어줄래?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あんまり焦らされると、はぁ……んぁ……。どんどん切なくなってきちゃうから……<emoji=heart04>」"
translation = "「너무 애태우면, 하아…… 응아…… 점점 안달 나버리니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リア先輩が軽く腰を揺らして濡れそぼった秘部をペニスに擦り付けてくる。"
translation = "리아 선배가 가볍게 허리를 흔들어 젖어버린 비부를 페니스에 문질러 온다."

[[dialogue]]
speaker = "unk"
original = "こんなに可愛くおねだりされて、我慢できるわけがなかった。"
translation = "이렇게 귀엽게 조르는데 참을 수 있을 리가 없었다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あぁあああんっ<emoji=heart04>\u3000ふぁっ、あっ、くぁんっ、あはぁんっ<emoji=heart04>」"
translation = "「아아아앙<emoji=heart04> 하앗, 앗, 콰앙, 아하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「気持ち、いいっ<emoji=heart04>\u3000もっと、んぁぁっ、もっと深々と挿れてっ……<emoji=heart04>」"
translation = "「기분, 좋아<emoji=heart04> 더, 응아아, 더 깊숙이 박아줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を振る度に繋がった場所からエッチな愛液が飛び散る。ものすごくグチョグチョだ。"
translation = "허리를 흔들 때마다 연결된 곳에서 야한 애액이 튀어 나간다. 엄청나게 질척질척하다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「やぁ<emoji=heart04>\u3000水音、ふぁぁっ、恥ずかしっ……<emoji=heart04>\u3000自分でもビックリしちゃうくらい、んぁっ、あっ、はぁっ、濡れちゃってるっ……<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 물소리, 후아아, 부끄러워……<emoji=heart04> 나조차 깜짝 놀랄 정도로, 응아, 앗, 하아, 젖어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「想像以上に私、あっ、あっ、溜まっちゃってたのかもっ……<emoji=heart04>\u3000数日会えなかっただけなのにっ<emoji=heart04>\u3000数日エッチしなかっただけなのにっ<emoji=heart04>」"
translation = "「상상 이상으로 나, 앗, 앗, 쌓여 있었던 걸지도 몰라……<emoji=heart04> 며칠 못 만났을 뿐인데<emoji=heart04> 며칠 섹스하지 않았을 뿐인데<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「エッチなおつゆ、はふあぁ、どんどん溢れてきちゃっ……<emoji=heart04>\u3000ズンズンしてもらう度に、じゅわわって満ち満ちてきてっ……<emoji=heart04>」"
translation = "「야한 국물, 하후아아, 계속 흘러나와서……<emoji=heart04> 푹푹 박아줄 때마다, 쥬와와 하고 가득 차올라서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今までにないほどリア先輩が発情してくれているのがわかる。"
translation = "지금까지 없었을 정도로 리아 선배가 발정해 있다는 걸 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "膣内がまるで生き物のようにうねって、いやらしく僕のペニスにしゃぶりついてきて。"
translation = "질 내부가 마치 생물처럼 꿈틀대며, 음란하게 내 자지를 빨아당긴다."

[[dialogue]]
speaker = "unk"
original = "そのトロトロでギュウギュウの感触がたまらない。僕も一心不乱にピストンを続けてしまう。"
translation = "그 걸쭉하고 꽉 조이는 감촉이 참을 수 없다. 나도 일심불란하게 피스톤질을 계속해버린다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000体のビクビクとまらないよぉっ<emoji=heart04>\u3000いつもより、はふぁぁ、そこら中敏感になっちゃってるっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 몸이 떨리는 게 멈추지 않아아<emoji=heart04> 평소보다, 하후아아, 온몸이 민감해져 버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「おち○ちんも、んぁっ、いつもよりおっきいっ<emoji=heart04>\u3000もしかしなくても、会えない間も自分でしないでくれてたのかなっ？」"
translation = "「자지도, 응아, 평소보다 더 커<emoji=heart04> 혹시 아니더라도, 못 만나는 동안 혼자서 안 하고 참아준 걸까?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「だったら、あっ、あっ、好きなだけズンズンしていいよっ<emoji=heart04>\u3000ううんっ、いっぱいズンズンしてっ<emoji=heart04>」"
translation = "「그렇다면, 앗, 앗, 마음껏 푹푹 박아도 좋아<emoji=heart04> 아니, 잔뜩 푹푹 박아줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「今夜は二人で数日分のエッチ、しよっ<emoji=heart04>\u3000いっぱいいっぱい愛してもらいたいなっ<emoji=heart04>」"
translation = "「오늘 밤은 둘이서 며칠 치 섹스, 하자<emoji=heart04> 잔뜩잔뜩 사랑받고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛く喘ぎながらもリア先輩が甘えてきてくれて、よりいっそうペニスが硬く膨らんでしまう。"
translation = "귀엽게 신음하면서도 리아 선배가 어리광을 부려 와서, 한층 더 자지가 단단하게 부풀어 오른다."

[[dialogue]]
speaker = "unk"
original = "膣内の感触もたまらないほど気持ちいいけど、突き入れる度にブルンブルン弾む大きなおっぱいがこれまたエッチで──"
translation = "질 내의 감촉도 견딜 수 없을 만큼 기분 좋지만, 찔러 넣을 때마다 출렁출렁 튀어 오르는 커다란 가슴이 이 또한 야해서──"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「えへへっ、おっぱいばっかり見つめちゃってっ……<emoji=heart04>\u3000相変わらず、あっ、はぁっ、おっぱいが大好きなんだねっ<emoji=heart04>」"
translation = "「에헤헷, 가슴만 빤히 쳐다보고……<emoji=heart04> 여전히, 앗, 하아, 가슴을 정말 좋아하는구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「いいよっ<emoji=heart04>\u3000もっと、あっ、あっ、もっと私のおっぱい揺らしてっ？\u3000激しくブルンブルンさせちゃってっ？」"
translation = "「좋아<emoji=heart04> 더, 앗, 앗, 더 내 가슴 흔들어줘? 격하게 출렁출렁하게 해줘?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「私も、ふぁっ、あっ、はぁっ、もっともっとズンズンしてもらいたいなっ<emoji=heart04>\u3000おま○この奥、んぁぁっ、思いっきりズドンズドンして欲しいっ<emoji=heart04>」"
translation = "「나도, 후앗, 앗, 하아, 더더욱 푹푹 박히고 싶어<emoji=heart04> 보지 깊숙한 곳을, 응아아, 마음껏 쿵쾅쿵쾅 해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「そのくらいしてもらわないと、はぁっ、はぁっ、今夜はおさまりそうにないからっ<emoji=heart04>\u3000アソコ疼いてたまらないからっ<emoji=heart04>」"
translation = "「그 정도는 해줘야, 하아, 하아, 오늘 밤은 진정이 안 될 것 같으니까<emoji=heart04> 거기가 욱신거려서 참을 수 없으니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「向こうにいる間、私の中のエッチな風船がずーっと膨らみ続けてたのっ……<emoji=heart04>\u3000イチャイチャできなくて切なくて、もどかしくて、もうパンパンになっちゃってるのっ<emoji=heart04>」"
translation = "「거기에 있는 동안, 내 안의 야한 풍선이 계속 부풀어 오르고 있었어……<emoji=heart04> 꽁냥거리지 못해서 애달프고, 안달 나서, 이제 빵빵해져 버렸는걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「だからっ、はぁはぁっ、だからぁっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「그러니까, 하아하아, 그러니까아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "生半可な抽挿じゃ足りないとばかりにリア先輩がお尻をぐっぐと突き出して、少しでもセックスの快感を貪ろうとしてくる。"
translation = "어설픈 삽입으로는 부족하다는 듯 리아 선배가 엉덩이를 쑥 내밀며, 조금이라도 섹스의 쾌감을 탐하려 한다."

[[dialogue]]
speaker = "unk"
original = "こんなに欲求不満になっちゃうくらい、向こうの世界にいる間も僕を想い続けてくれていて──"
translation = "이토록 욕구불만이 될 정도로, 저쪽 세계에 있는 동안에도 나를 계속 생각해주고 있어서──"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「はひぃんっっ<emoji=heart04>\u3000あはっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000くぁっ<emoji=heart04>\u3000あふぅんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하히잉<emoji=heart04> 아핫<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 쿠앗<emoji=heart04> 아후응<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「しゅごひっ<emoji=heart04>\u3000あああぁんっっ<emoji=heart04>\u3000きもひいいっっ<emoji=heart04>\u3000いつもより乱暴でっ、ああああっ、だけどそれがまひゃっっ<emoji=heart04>」"
translation = "「대단해<emoji=heart04> 아아아앙<emoji=heart04> 기분 좋아아<emoji=heart04> 평소보다 거칠어서, 아아아아앗, 하지만 그게 머햑<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分でも突き込み過ぎかと思うくらい先輩の膣内にペニスをねじ込む。"
translation = "나 스스로도 너무 깊게 찌르는 게 아닐까 싶을 정도로 선배의 질 안에 자지를 뒤틀어 넣는다."

[[dialogue]]
speaker = "unk"
original = "しかしリア先輩はそんな荒々しいばかりの抽挿を蕩けた顔で悦んでくれた。"
translation = "하지만 리아 선배는 그런 거친 삽입을 황홀한 표정으로 기뻐해 주었다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「イクイクっ<emoji=heart04>\u3000イっちゃっ<emoji=heart04>\u3000きもひいいっっ<emoji=heart04>\u3000しゅごくきもひいいよぉっ<emoji=heart04>」"
translation = "「간다아<emoji=heart04> 가버렷<emoji=heart04> 기분 좋아아<emoji=heart04> 너무 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「私の中のエッチな風船、弾けちゃふっ<emoji=heart04>\u3000これが、あふぁっ、ずっとこれが欲しかったのぉっ<emoji=heart04>」"
translation = "「내 안의 야한 풍선, 터져버렷<emoji=heart04> 이게, 아후아, 계속 이걸 원했어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「大好きな人のおち○ちんがっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000こうやって、ふぁぁぁっっ、いっぱいズドズドして欲しかったのぉっ<emoji=heart04>」"
translation = "「좋아하는 사람의 자지가아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 이렇게, 후아아아앗, 잔뜩 쿵쾅쿵쾅 해줬으면 좋겠어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すごい締め付けだ。ペニスが千切れそうなくらいギュウギュウ閉じてきてくれる。愛液の量も一気に増えて……！"
translation = "엄청난 조임이다. 자지가 잘려 나갈 정도로 꽉꽉 조여온다. 애액의 양도 단숨에 늘어나서……!"

[[dialogue]]
speaker = "unk"
original = "あまりの気持ちよさにピストンのスピードがどんどん上がっていく。ブルンブルンと淫らに弾むおっぱいをオカズにより突き上げてしまう。"
translation = "너무나 기분 좋은 나머지 피스톤의 스피드가 점점 올라간다. 출렁출렁 음란하게 튀어 오르는 가슴을 반찬 삼아 더욱 밀어 올린다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あっ、はぁっ、あっ、あああっ<emoji=heart04>\u3000おっぱい揺れるだけでも感じちゃっ<emoji=heart04>\u3000おち○ちんでブルンブルン揺らされるのきもひいいっ<emoji=heart04>」"
translation = "「앗, 하아, 앗, 아아앗<emoji=heart04> 가슴이 흔들리는 것만으로도 느껴버렷<emoji=heart04> 자지로 출렁출렁 흔들리는 거 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「おち○ちんもどんどん熱くなってきてるっ<emoji=heart04>\u3000ああっ、これっ、これ好きっ<emoji=heart04>\u3000大好きな人が我慢できなくなってくれてる感覚ぅっ<emoji=heart04>」"
translation = "「자지도 점점 뜨거워지고 있어<emoji=heart04> 아앗, 이거, 이거 좋아<emoji=heart04> 좋아하는 사람이 참을 수 없게 되어버리는 감각으읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ただでさえおっきいのにっ、ふぁああっっ、膣内でミチミチ膨らんでっ<emoji=heart04>\u3000私のおま○こ、やらしく広げられちゃってっ<emoji=heart04>」"
translation = "「안 그래도 큰데, 후아아아앗, 질 안에서 꽉꽉 부풀어서<emoji=heart04> 내 보지, 야하게 벌려져 버려서<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「もっとぉっ<emoji=heart04>\u3000もっと膨らませてっ<emoji=heart04>\u3000ガッチガチのバッキバキにしてっ<emoji=heart04>」"
translation = "「더어<emoji=heart04> 더 부풀려줘<emoji=heart04> 돌처럼 빳빳하게 만들어줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あなたが興奮してくれてるのわかると、あはぁあんっっ<emoji=heart04>\u3000私も興奮しちゃうからぁっ<emoji=heart04>\u3000さらに気持ち良くなっちゃうからぁっ<emoji=heart04>」"
translation = "「당신이 흥분하고 있는 게 느껴지면, 아하아앙<emoji=heart04> 나도 흥분해버리니까아<emoji=heart04> 훨씬 더 기분 좋아져 버리니까아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕の射精欲を察したリア先輩が膣内をビクビク痙攣させながら、中出しをねだるように子宮を下ろしてきてくれる。"
translation = "나의 사정 욕구를 알아챈 리아 선배가 질 내부를 파르르 경련시키며, 질내사정을 조르듯이 자궁을 내려준다."

[[dialogue]]
speaker = "unk"
original = "そのエッチな甘えっぷりがとんでもなく嬉しかった。僕とのセックスを、中出しを、心から期待してくれていて──"
translation = "그 야한 어리광이 말도 못 하게 기뻤다. 나와의 섹스를, 질내사정을, 진심으로 기대해주고 있어서──"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「くぁっ、あっ、あっ、あっ<emoji=heart04>\u3000一段とはげひっっ<emoji=heart04>\u3000あああああっ、らめっ、イっひゃっ<emoji=heart04>」"
translation = "「쿠앗, 앗, 앗, 앗<emoji=heart04> 한층 더 격해앳<emoji=heart04> 아아아아앗, 안 돼, 가버려엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「きもひよすぎへ、口とじられにゃひっ<emoji=heart04>\u3000あふぁあっっ<emoji=heart04>\u3000あああああっっ<emoji=heart04>\u3000イきゅイきゅイきゅぅぅぅっっ<emoji=heart04>」"
translation = "「너무 기분 조아서, 입이 안 다무러뎌엇<emoji=heart04> 아후아앗<emoji=heart04> 아아아아앗<emoji=heart04> 가 가 가버려어어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「割っへぇっ<emoji=heart04>\u3000わたひの欲求不満っ、あなひゃのおひんひんで解消しへぇっ<emoji=heart04>\u3000わたひの甘えんぼおま○こ慰めへぇっ<emoji=heart04>」"
translation = "「허해둿<emoji=heart04> 내 욕구불만, 당신 자지로 해소해둿<emoji=heart04> 내 어리광쟁이 보지 달래둿<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「本当にずっひょ寂しかっひゃのっ<emoji=heart04>\u3000切なかっひゃのぉっ<emoji=heart04>\u3000あなひゃとエッチれきにゃくへ、ずっひょ、ずっひょぉっ<emoji=heart04>」"
translation = "「정말로 계호 외로워허어<emoji=heart04> 애달파허어<emoji=heart04> 당신이랑 섹스 못해허, 계호, 계호오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あつひの欲ひいっ<emoji=heart04>\u3000中にいっぱひ出しへ欲ひいっ<emoji=heart04>\u3000あなひゃのしゃーせーでイキひゃいっ<emoji=heart04>\u3000おもいっきりイキひゃいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뜨거운 거 원해애<emoji=heart04> 안에 잔뜩 내보내 둿<emoji=heart04> 당신의 정액으로 가고 시퍼어<emoji=heart04> 마음껏 가고 시퍼어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "僕もイキたいっ。リア先輩の甘えんぼおま○こでっ。こんなにも僕を求めてくれるエッチなおま○こでっ……！！"
translation = "나도 가고 싶어. 리아 선배의 어리광쟁이 보지에. 이토록 나를 원하는 야한 보지에……!!"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あっ、あっ、あっ、あっ、あっ<emoji=heart04>\u3000きへりゅっ<emoji=heart04>\u3000のぼってきへりゅっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗, 앗<emoji=heart04> 와아아앗<emoji=heart04> 올라와버려어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「わたひもしゅごいのくりゅっ<emoji=heart04>\u3000エッチな風船が私のおっぱいみたいにパツンパツンに膨らんできちゃふぅっっ<emoji=heart04>」"
translation = "「나도 대단한 거 와아아앗<emoji=heart04> 야한 풍선이 내 가슴처럼 빵빵하게 부풀어 올라버려어어읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「弾けさせへっ<emoji=heart04>\u3000あなひゃのおち○ちんミルクれ、んぁっ、あっ、あぁあんっ、弾けさせへぇっ<emoji=heart04>」"
translation = "「터뜨려둿<emoji=heart04> 당신의 자지 밀크로, 응아, 앗, 아아앙, 터뜨려둿<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「数日分の溜まったせーしっ<emoji=heart04>\u3000エッチできなくへウズウズしへたイチャラブせーしぃっ<emoji=heart04>」"
translation = "「며칠 치 쌓인 정액<emoji=heart04> 섹스 못 해서 근질근질했던 꽁냥 정액으으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「わたひの甘えんぼおま○こにぃっ<emoji=heart04>\u3000ああああっっ<emoji=heart04>\u3000寂しがり屋の赤ちゃんの部屋にぃっっ<emoji=heart04>」"
translation = "「내 어리광쟁이 보지에에<emoji=heart04> 아아아아앗<emoji=heart04> 외로움 잘 타는 아기 방에에에엣<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「全部全部っ──ぶちまけてぇぇぇぇえっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「전부 전부── 쏟아내 줘어어어어엇~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あっ──ああああああああああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イきゅイきゅイきゅぅぅぅぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗── 아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가 가 가버려어어어어어어어어읏~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ガクガクガクぅぅっとリア先輩が体中を震わせながら、腰を海老反らせる。"
translation = "덜덜덜덜 하고 리아 선배가 온몸을 떨며 허리를 뒤로 젖힌다."

[[dialogue]]
speaker = "unk"
original = "僕もそんなリア先輩の体を抱えながら、溜まりに溜まった精子を膣内に注ぎ続ける。"
translation = "나도 그런 리아 선배의 몸을 끌어안으며, 쌓이고 쌓인 정액을 질 안에 계속 주입한다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ふぁああああああああっ<emoji=heart04><emoji=heart04>\u3000さいこうにきもひいいっっ……<emoji=heart04>\u3000割れっ<emoji=heart04>\u3000エッチな風船割れたぁぁぁっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아앗<emoji=heart04><emoji=heart04> 최고로 기분 좋아아……<emoji=heart04> 터졌어<emoji=heart04> 야한 풍선 터졌어어어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「やっぱりしゅごひっ<emoji=heart04>\u3000しゃーせーしゅごいっ<emoji=heart04>\u3000きもひいいっ、しあわせぇっ<emoji=heart04>\u3000あ゛ぁっ<emoji=heart04>\u3000あ゛あぁぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「역시 대단해에<emoji=heart04> 사정 대단해애<emoji=heart04> 기분 좋아, 행복해애<emoji=heart04> 아아아앗<emoji=heart04> 아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口を半開きにしたまま、リア先輩が激しく喘いで僕以上に絶頂し続けてくれる。"
translation = "입을 반쯤 벌린 채, 리아 선배가 격하게 신음하며 나 이상으로 계속 절정하고 있다."

[[dialogue]]
speaker = "unk"
original = "僕とのセックスを、中出しを、それだけ嬉しく思ってくれているのがわかって、ちっとも射精がとまらない。"
translation = "나와의 섹스를, 질내사정을 그만큼이나 기쁘게 여겨주고 있다는 걸 알게 되자, 사정이 전혀 멈추지 않는다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ふぁぁぁぁっっ……<emoji=heart04>\u3000きもひいいっ……<emoji=heart04>\u3000イクっ、あふぁっ、イクイクぅぅっ……<emoji=heart04>」"
translation = "「후아아아아앗……<emoji=heart04> 기분 좋아아……<emoji=heart04> 간다, 아후아, 가버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「このまま一生、あふぁぁぁっ……<emoji=heart04>\u3000あなひゃにビュービューしてもらいたいよぉ……<emoji=heart04>」"
translation = "「이대로 평생, 아후아아아……<emoji=heart04> 당신이 뷰뷰 해줬으면 좋겠어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、どれくらい二人でイキ続けただろう。"
translation = "그렇게 얼마나 둘이서 계속 절정했을까."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「はぁー……<emoji=heart04>\u3000はぁー……<emoji=heart04>\u3000はぁー……<emoji=heart04>\u3000まだ、あふぅ……<emoji=heart04>\u3000ビュルビュルしてくれてる……<emoji=heart04>」"
translation = "「하아─……<emoji=heart04> 하아─……<emoji=heart04> 하아─……<emoji=heart04> 아직, 아후……<emoji=heart04> 뷰릇뷰릇 해주고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「そっちも、えへへ……<emoji=heart04>\u3000相当溜まってくれてたんだね……<emoji=heart04>\u3000嬉しい……<emoji=heart04>\u3000好きなだけ出してくれていいからね……<emoji=heart04>」"
translation = "「그쪽도, 에헤헤……<emoji=heart04> 상당히 쌓여 있었구나……<emoji=heart04> 기뻐……<emoji=heart04> 원하는 만큼 내보내 줘도 되니까 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒くて甘い吐息を繰り返しながらも、リア先輩がだらしなく射精を続ける僕を甘えさせてくれる。"
translation = "거칠고 달콤한 숨결을 내뱉으면서도, 리아 선배가 속절없이 사정을 계속하는 나를 받아준다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「でも、たった数日会えなかっただけで、はぁはぁ、こんなにも寂しくなっちゃうんだね……<emoji=heart04>」"
translation = "「하지만, 겨우 며칠 못 만났을 뿐인데, 하아하아, 이렇게나 외로워지는구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「こんなにも、えへへ……<emoji=heart04>\u3000イチャイチャしたくて、エッチしたくて、たまらなくなっちゃうんだ……<emoji=heart04>」"
translation = "「이렇게나, 에헤헤……<emoji=heart04> 꽁냥거리고 싶고, 섹스하고 싶어서, 참을 수 없게 되어버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「すごく気持ち良くしてもらったのに、はぁはぁ……<emoji=heart04>\u3000もっともっと甘えさせてもらいたくなっちゃうよ……<emoji=heart04>」"
translation = "「정말 기분 좋게 해줬는데, 하아하아……<emoji=heart04> 더더욱 어리광부리고 싶어져 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おねだりするようにギュムムとリア先輩がペニスを抱き締めてきてくれる。僕も先輩が甘えてきてくれるのが嬉しい。"
translation = "조르듯이 꾸욱 하며 리아 선배가 자지를 품어준다. 나도 선배가 어리광부려 주는 게 기쁘다."

[[dialogue]]
speaker = "unk"
original = "もっと甘やかしたいし、僕も甘えたくなってしまう。"
translation = "더 어리광을 받아주고 싶고, 나도 어리광부리고 싶어진다."

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「あ……<emoji=heart04>\u3000またおっぱいに目が行ってるゾ……<emoji=heart04>\u3000エッチなミルクも先っぽからビュビュって出ちゃってる……<emoji=heart04>」"
translation = "「아……<emoji=heart04> 또 가슴에 눈이 가 있네에……<emoji=heart04> 야한 밀크도 끝부분에서 뷰븃 하고 나와버리고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「えへへ、なら今度は私がおっぱいで気持ち良くしてあげるね<emoji=heart04>\u3000たくさん甘えさせてあげるから……<emoji=heart04>」"
translation = "「에헤헤, 그럼 이번에는 내가 가슴으로 기분 좋게 해줄게<emoji=heart04> 잔뜩 어리광부리게 해줄 테니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「その代わり、ふふふ<emoji=heart04>\u3000そのあとはまた交代してね<emoji=heart04>\u3000まだまだ私、甘え足りないから……<emoji=heart04>」"
translation = "「대신에, 후후후<emoji=heart04> 그 뒤에는 다시 교대하는 거다? 아직 나, 어리광이 부족하니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「今夜は、はぁはぁ……<emoji=heart04>\u3000一晩中、あなたとイチャイチャしたいな……<emoji=heart04>」"
translation = "「오늘 밤은, 하아하아……<emoji=heart04> 밤새도록, 당신이랑 꽁냥거리고 싶어……<emoji=heart04>」"

