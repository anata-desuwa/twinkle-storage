[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「住宅街でモンスターが出現したようです。行きましょう、会長さまっ！」"
translation = "「주택가에 몬스터가 출현한 모양입니다. 가시죠, 회장님!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「待って、あたしも……！」"
translation = "「기다려, 나도……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえ、イレーナさまの手を煩わせはしません。私と会長さまで対処いたしますから」"
translation = "「아니요, 이레이나 님의 손을 번거롭게 해드리지 않겠습니다. 저와 회장님이 대처할 테니까요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でも──」"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「聖女なんてやりたくないと仰っていたではありませんか。良いのですよ。イレーナさまはもう、ご無理をなさる必要はないんです」"
translation = "「성녀 같은 건 하고 싶지 않다고 말씀하시지 않았습니까. 괜찮아요. 이레이나 님은 이제 무리하실 필요 없답니다.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまは今までご立派に聖女としての務めを果たしておられました。女神様もきっとお咎めはしないでしょう」"
translation = "「이레이나 님은 지금까지 훌륭하게 성녀로서의 소임을 다하셨습니다. 여신님도 분명 벌하지 않으실 거예요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「──ですがひとつだけお伝えしたいことがあります」"
translation = "「──하지만 한 가지만 전해드리고 싶은 게 있어요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「たとえ立場ゆえの行いだったとしても、私はイレーナさまに助けていただいて感謝しています。とても嬉しかったです」"
translation = "「설령 입장 때문에 하신 일이라 해도, 저는 이레이나 님께 도움을 받아 감사하고 있습니다. 정말로 기뻤어요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまがご自身を偽りの聖女だと仰っても、私の気持ちはかわりません。決して怒ってなどいませんよ」"
translation = "「이레이나 님이 스스로를 거짓 성녀라고 말씀하셔도 제 마음은 변하지 않아요. 결코 화내고 있지 않답니다.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「では今度こそ参りましょう、会長さま」"
translation = "「그럼 이번에야말로 가시죠, 회장님.」"

[[dialogue]]
speaker = "unk"
original = "ああ、急ごうっ！"
translation = "그래, 서두르자!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、ちょっ……」"
translation = "「아, 잠깐……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「行っちゃった……」"
translation = "「가버렸네……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、もう戦わなくていいって言うならそうさせてもらうけど。痛い目に遭うのも懲り懲りだし」"
translation = "「뭐, 이제 안 싸워도 된다면 그렇게 하겠지만. 아픈 꼴을 당하는 건 이제 아주 지긋지긋하거든.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうよ、戦いなんてやりたいやつがやればいいのよ。シャロンのことなんてどうでも……」"
translation = "「그래, 싸움 같은 건 하고 싶은 녀석이나 하면 되는 거야. 샤론 같은 건 아무래도……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どうでも……」"
translation = "「아무래도……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はぁぁぁああああーっっ！！」"
translation = "「하아아아아아아아아앗!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はぁっ、はぁっ。想像以上に敵の数が多いですね……」"
translation = "「하아, 하아. 상상 이상으로 적의 수가 많네요……」"

[[dialogue]]
speaker_original = "子どもＡ"
speaker_translation = "아이 A"
original = "「助けてー！」"
translation = "「살려줘요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「！？\u3000子どもたちが巻き込まれて……一刻も早くお助けしなくては……！」"
translation = "「!? 아이들이 휘말려서…… 한시라도 빨리 구해야 해요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですがあの大型モンスター……」"
translation = "「하지만 저 대형 몬스터……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「何度も攻撃を入れているのにビクともしていません……。どうやら私の力では、あのモンスターは……」"
translation = "「몇 번이나 공격을 넣었는데도 꿈쩍도 하지 않아요……. 아무래도 제 힘으로는 저 몬스터는……」"

[[dialogue]]
speaker = "unk"
original = "とにかく今はできることをしよう"
translation = "어쨌든 지금은 할 수 있는 일을 하자"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はいっ。子どもたちの保護と避難を優先いたしましょう」"
translation = "「네. 아이들의 보호와 피난을 우선하죠.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「モンスターは私が引きつけますっ。会長さまは子どもたちの避難を──！！」"
translation = "「몬스터는 제가 유인하겠습니다. 회장님은 아이들의 피난을──!!」"

[[dialogue]]
speaker = "unk"
original = "さぁみんなこっちだ！"
translation = "자, 얘들아 이쪽이다!"

[[dialogue]]
speaker_original = "子どもＡ"
speaker_translation = "아이 A"
original = "「ふえ～ん、怖かったよ～」"
translation = "「으앙~, 무서웠어~」"

[[dialogue]]
speaker_original = "子どもＢ"
speaker_translation = "아이 B"
original = "「星騎士のお兄さん、ありがとー！」"
translation = "「성기사 오빠, 고마워요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「くっ……！\u3000やはり私の攻撃が効いておりません……！」"
translation = "「큭……! 역시 제 공격이 통하지 않고 있어요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまっ、子どもたちは……！」"
translation = "「회장님, 아이들은……!」"

[[dialogue]]
speaker = "unk"
original = "みんな無事だ！"
translation = "모두 무사해!"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「良かった！\u3000ならば我々もこのまま少しずつ後退いたしましょう！\u3000退路を確保しながら救援を待って──」"
translation = "「다행이다! 그렇다면 저희도 이대로 조금씩 후퇴하죠! 퇴로를 확보하면서 구원을 기다리며──」"

[[dialogue]]
speaker_original = "子どもＣ"
speaker_translation = "아이 C"
original = "「ふえ～んっ。行かないで、シスターさまぁ～」"
translation = "「으앙~. 가지 마요, 수녀님~」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「！\u3000女の子が一人取り残されてっ──」"
translation = "「! 여자아이가 한 명 남겨져서──」"

[[dialogue]]
speaker_original = "子どもＣ"
speaker_translation = "아이 C"
original = "「きゃああああああっっ！！？」"
translation = "「꺄아아아아아앗!!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いけませんっっ！！」"
translation = "「안 돼요!!」"

[[dialogue]]
speaker = "unk"
original = "シャロン、危ない！"
translation = "샤론, 위험해!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「このバカっ！！」"
translation = "「이 바보가!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「えっ？\u3000──きゃあっ！！？」"
translation = "「엣? ──꺄악!!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ぐぅっ……！！」"
translation = "「그윽……!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまっ！？\u3000どうしてここへ……！？\u3000それに私たちを庇って……！？」"
translation = "「이레이나 님!? 어째서 여기에……!? 게다가 저희를 감싸고……!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うっさいわね……！\u3000子どもごとあんたがやられたら、ぐっ、無駄に怪我人が増えるだけじゃない……！」"
translation = "「시끄러워……! 애랑 같이 네가 당해버리면, 윽, 쓸데없이 부상자만 늘어날 뿐이잖아……!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それよりさっさとコイツを倒しなさいよ……！\u3000このままだと３人ともマジでやられちゃうでしょっ……！」"
translation = "「그것보다 빨리 이 녀석을 쓰러뜨려……! 이대로라면 셋 다 진짜로 당해버린다고……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですが私の力ではこの敵は──」"
translation = "「하지만 제 힘으로는 이 적은──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「四の五の言わずにやりなさい！\u3000あんたがやらなきゃ誰がやるのよっ！」"
translation = "「이러쿵저러쿵 말 말고 해! 네가 안 하면 누가 하겠어!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それとも何っ？\u3000あんたが信じる女神様ってのは、こんな時に力のひとつも貸してくれないクソ野郎なのっ！？」"
translation = "「아니면 뭐야? 네가 믿는 여신님이라는 건 이런 때 힘 하나 빌려주지 않는 쓰레기 자식인 거야!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「っ……！！\u3000いいえ、そのようなことは決してっ……」"
translation = "「윽……!! 아니요, 그런 일은 결코……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「決して──ありませんっっ！！」"
translation = "「결코── 없습니다!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ああ──感じます。女神様の確かな愛を。お力を」"
translation = "「아아── 느껴져요. 여신님의 확실한 사랑을. 힘을.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「見ていてください、イレーナさま。私が今ここで証明してみせます」"
translation = "「지켜봐 주세요, 이레이나 님. 제가 지금 여기서 증명해 보이겠습니다.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「女神様の愛の実在を。私たちは皆、女神様に愛されているのだということを──！！」"
translation = "「여신님 사랑의 실재를. 저희는 모두 여신님께 사랑받고 있다는 것을──!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「セレスティアルキャレス！！」"
translation = "「셀레스티얼 캐레스!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ、はぁ。やれば、できるじゃない……。ちゃんと撃退できた、ようね……」"
translation = "「하아, 하아. 하면 되잖아……. 제대로 격퇴한, 모양이네……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナ、さま……？\u3000っっ！！\u3000しっかりしてください、イレーナさまっっ！！」"
translation = "「이레이나 님……? !! 정신 차리세요, 이레이나 님!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまぁああああ～～っ！！」"
translation = "「이레이나 님아아아아아아아아~~!!」"

