[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アニュラス、ちょっといい？」"
translation = "「아뉴라스, 잠깐 괜찮아?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「舞亜か。私に用か？」"
translation = "「마이아인가. 나에게 용건이 있나?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、昨日２人の話を聞いて、ひらめいたことがあるんだけど……」"
translation = "「응, 어제 두 사람 이야기를 듣고 번뜩인 게 있는데……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もう開き直って全部詰め込んじゃわない？」"
translation = "「그냥 아예 전부 다 집어넣어 버리지 않을래?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「それは……思いついたこと全てを取り入れよう、ということか？」"
translation = "「그건…… 떠오른 모든 것을 도입하자는 말인가?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もちろん、無理なものは除外するけどね。でも、全体のまとまりとか、そういうのはこの際忘れちゃおうって」"
translation = "「물론 무리인 건 제외하겠지만 말이야. 하지만 전체적인 조화라든가 그런 건 이번 기회에 잊어버리자고.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「みんながやりたいことを全部するの。ちぐはぐにはなるだろうけど、でもその中には何か刺さるものを見つけられる」"
translation = "「모두가 하고 싶은 걸 전부 하는 거야. 뒤죽박죽이 되겠지만, 그래도 그 안에서 누군가에게 와닿는 무언가를 찾아낼 수 있을 거야.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そんなクリスマスパーティーにしたいって、私は思うんだ」"
translation = "「그런 크리스마스 파티로 만들고 싶어, 나는.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「なるほど、それが舞亜の意見か……」"
translation = "「과연, 그것이 마이아의 의견인가……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……やっぱりアニュラスは納得いかない？」"
translation = "「……역시 아뉴라스는 납득이 안 가?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「納得いかない……というわけではないが、どうしても引っかかる点が１つある」"
translation = "「납득이 안 가는…… 것은 아니지만, 아무래도 걸리는 점이 하나 있다.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「それは、寮長殿のオーダーを無視することにならないか？」"
translation = "「그것은 기숙사장님의 오더를 무시하는 것이 되지 않겠나?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「我々はあくまでオーダーを受けた身だ。依頼主の意向を無視して、勝手なことをするわけにはいかない」"
translation = "「우리는 어디까지나 오더를 받은 입장이다. 의뢰주의 의향을 무시하고 멋대로 행동할 수는 없어.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「無視するわけじゃないの。『流星寮の品格に相応しいクリスマスパーティー』の中に詰め込めるものを全部詰め込むの」"
translation = "「무시하는 게 아니야. 『유성 기숙사의 품격에 어울리는 크리스마스 파티』 안에 집어넣을 수 있는 걸 전부 집어넣는 거야.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「寮長さんの意向は大事だけど、私は参加した全員が楽しめるクリスマスパーティーにしたい」"
translation = "「기숙사장님의 의향도 중요하지만, 나는 참가한 전원이 즐길 수 있는 크리스마스 파티를 만들고 싶어.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「寮生はいっぱいいるんだもん。元気にはしゃぎたい子もいれば、しっとり過ごしたい子もいる。モリモリ食べたい子もいれば、ほっこりしたい子もいるはずだよ」"
translation = "「기숙사생은 많이 있잖아. 신나게 떠들고 싶은 아이도 있으면 차분하게 보내고 싶은 아이도 있어. 든든하게 먹고 싶은 아이도 있으면 따뜻한 분위기를 느끼고 싶은 아이도 있을 거야.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そうだな、舞亜の言う通りだ……パーティーは参加する全員が楽しくあるべきだ」"
translation = "「그렇군, 마이아의 말이 맞다…… 파티는 참가하는 모두가 즐거워야 한다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「オッケー♪\u3000そうと決まったらアニュラスは自分のやりたい事、思いつくままどんどん提案していってね」"
translation = "「오케이♪ 그렇게 정했으면 아뉴라스는 자기가 하고 싶은 일, 생각나는 대로 팍팍 제안해 줘.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私はみんなのアイデアを全部ひとつにして、パーティー会場っていうステージを作り出して見せるから！」"
translation = "「나는 모두의 아이디어를 전부 하나로 뭉쳐서 파티장이라는 스테이지를 만들어 보여줄 테니까!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「待った」"
translation = "「기다려라.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「他にも何か気になることがあったりする？」"
translation = "「그 밖에 다른 신경 쓰이는 점이라도 있어?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「いや、そうじゃなくてだな……」"
translation = "「아니, 그게 아니라……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「舞亜はどうなんだ？\u3000全員が楽しめるパーティーというなら、舞亜の意見も含まれていなければならないだろう？」"
translation = "「마이아는 어떤가? 전원이 즐길 수 있는 파티라면 마이아의 의견도 포함되어 있어야 하지 않겠나?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私たちの意見を聞くだけではなく、舞亜も自分のやりたいことを言って欲しい。そうでなければ全員が楽しめるパーティーとは言えない」"
translation = "「우리의 의견을 듣기만 하는 게 아니라 마이아도 자신이 하고 싶은 걸 말해줬으면 한다. 그렇지 않으면 전원이 즐길 수 있는 파티라고 할 수 없지.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、そうだね。アニュラスの言う通りだ……」"
translation = "「응, 그렇네. 아뉴라스 말이 맞아……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それじゃあ私もやりたい事、言うね？\u3000そうだな～、石窯を設置してピザを食べ放題とか？」"
translation = "「그럼 나도 하고 싶은 거 말할게? 음~, 화덕을 설치해서 피자 무한 리필이라든가?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「後はビンゴゲームっぽい感じのプレゼント交換会とか！」"
translation = "「그리고 빙고 게임 같은 느낌의 선물 교환회라든가!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ほう、事前にプレゼントを集めておいて、それでビンゴを行うということか？\u3000それは楽しそうだな！」"
translation = "「호오, 사전에 선물을 모아두고 그것으로 빙고를 한다는 건가? 그거 즐거워 보이는군!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「後はね、ええと──」"
translation = "「그리고 또 말이지, 에 그러니까──」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うむ、それは私もやりたいと考えていた！\u3000ぜひ、やろう！\u3000後は私はこういうのも考えているんだが──」"
translation = "「음, 그것은 나도 해보고 싶다고 생각했다! 부디 하도록 하지! 그리고 나는 이런 것도 생각하고 있는데──」"

[[dialogue]]
speaker = "unk"
original = "こうして流星寮のクリスマスパーティーは順調に膨らんでいく。"
translation = "이렇게 유성 기숙사의 크리스마스 파티는 순조롭게 부풀어 오른다."

[[dialogue]]
speaker = "unk"
original = "全てを詰め込んで、それを実現する。そんなことが本当に可能かどうかは分からない。"
translation = "모든 것을 집어넣고 그것을 실현한다. 그런 것이 정말 가능할지는 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "だが今は何も考えずに、自分がやりたいと思ったことを提案し合う。"
translation = "하지만 지금은 아무것도 생각하지 않고 자신이 하고 싶다고 생각한 것을 서로 제안한다."

[[dialogue]]
speaker = "unk"
original = "それによって確実に何かが動き始めた──と、手ごたえを確信する舞亜とアニュラスだった。"
translation = "그로 인해 확실히 무언가가 움직이기 시작했다──며 확신을 얻는 마이아와 아뉴라스였다."

