[[dialogue]]
speaker = "unk"
original = "第２話,不運な司書さん,P"
translation = "제2화, 불운한 사서 씨, P"

[[dialogue]]
speaker = "ウィステリア"
original = "「こんにちは。御前試合勝ったそうね。星徒会長就任おめでとう」"
translation = "「안녕. 어전 시합 이겼다면서. 성도회장 취임 축하해」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます"
translation = "감사합니다"

[[dialogue]]
speaker = "ウィステリア"
original = "「じゃあ、せっかくだから会長くんって呼んじゃおうかしら。ふふっ」"
translation = "「그럼 이왕 이렇게 된 거 회장군이라고 불러버릴까나. 후훗」"

[[dialogue]]
speaker = "ウィステリア"
original = "「なんかすごかったらしいわね～。私も見たかったけど仕事中でね。ちょっと残念だわ」"
translation = "「왠지 대단했다나 봐~. 나도 보고 싶었지만 근무 중이라서 말이야. 좀 아쉽네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……はぁ～」"
translation = "「……하아~」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、ごめん。溜息出ちゃった」"
translation = "「아, 미안. 한숨이 나와버렸네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……まぁ、うん、何かあったといえばあったんだけど。この前の休みに……」"
translation = "「……뭐, 응, 무슨 일이 있었다면 있었는데. 지난 휴일에……」"

[[dialogue]]
speaker = "ウィステリア"
original = "『今日は有名なロールケーキ専門店のオープン日。あの名店の支店が出るって聞いて楽しみにしてたんだから』"
translation = "『오늘은 유명한 롤케이크 전문점의 오픈일. 그 유명한 가게의 지점이 생긴다고 해서 기대하고 있었거든』"

[[dialogue]]
speaker = "ウィステリア"
original = "『お手軽なコンビニスイーツもいいけど、たまには高級なのもね。社会人になると、こういう楽しみが大事なのよ』"
translation = "『간편한 편의점 디저트도 좋지만 가끔은 고급스러운 것도 말이야. 사회인이 되면 이런 즐거움이 중요하다고』"

[[dialogue]]
speaker = "ウィステリア"
original = "『並び始めて一時間半……あ、列進んできたわね。そろそろ買えそう……』"
translation = "『줄 서기 시작한 지 한 시간 반…… 아, 줄이 줄어드네. 슬슬 살 수 있겠어……』"

[[dialogue]]
speaker = "店員"
original = "『申し訳ありません、ロールケーキここまででーす』"
translation = "『죄송합니다, 롤케이크 여기까지입니다~』"

[[dialogue]]
speaker = "ウィステリア"
original = "『え～～っ！？』"
translation = "『에에~~!?』"

[[dialogue]]
speaker = "ウィステリア"
original = "「って、私の目の前で売り切れたのよ！」"
translation = "「라니, 내 바로 앞에서 품절된 거 있지!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「休日の贅沢を楽しみに仕事頑張ってたのに……ロールケーキ……私のロールケーキ……」"
translation = "「휴일의 사치를 기대하며 열심히 일했는데…… 롤케이크…… 내 롤케이크……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「お気に入りのルージュはどっかいくし、ドライヤーは壊れるし、間違えて部屋の水道止められるし……」"
translation = "「아끼는 루주는 어디 갔는지 안 보이고, 드라이어는 고장 나고, 실수로 방 수도까지 끊기고……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そもそも実家からして最悪だし、ろくな青春も送れなかったし、私の人生ずっとこんなのばっかり……やっぱり呪われてる……」"
translation = "「애초에 본가부터가 최악이고, 제대로 된 청춘도 못 보냈고, 내 인생은 맨날 이런 식이야…… 역시 저주받았어……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「いえ、気持ちを切り替えましょう。生徒にかっこ悪いところ見せられないわ」"
translation = "「아니야, 기분 전환하자. 학생에게 꼴사나운 모습 보여줄 순 없지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「図書館に何の用事かしら？\u3000……この前応援してくれたお礼？\u3000ふふっ、そんなのいいのに。でも嬉しいわ」"
translation = "「도서관에 무슨 용건이니? ……지난번에 응원해준 답례? 후훗, 그런 거 안 해도 되는데. 그래도 기쁘네」"

[[dialogue]]
speaker = "ウィステリア"
original = "（ハッ──もしかして私のこと気になるのかしら……？）"
translation = "（핫── 혹시 나한테 관심 있는 걸까……?）"

[[dialogue]]
speaker = "ウィステリア"
original = "（ダメ、ダメよ！\u3000情熱的な恋愛も素敵だと思うけど、星徒会長と学園職員なんだから節度を保たないと！）"
translation = "（안 돼, 안 된다고! 정열적인 연애도 멋지다고 생각하지만 성도회장과 학원 직원이니까 절도를 지켜야지!）"

[[dialogue]]
speaker = "unk"
original = "それじゃあ……"
translation = "그럼……"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひゃあっ！？\u3000な、何？」"
translation = "「히얏!? 머, 뭐야?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ああ、これから星徒会？\u3000そっか、会長のお仕事頑張ってね」"
translation = "「아아, 이제 성도회 가려고? 그렇구나, 회장 업무 힘내」"

[[dialogue]]
speaker = "ウィステリア"
original = "（純粋にお礼に来たのに何考えてるのよ私のバカ！\u3000色ボケ女～！）"
translation = "（순수하게 답례하러 온 건데 무슨 생각을 하는 거야 나란 바보는! 밝히는 여자 같으니~!）"

[[dialogue]]
speaker = "unk"
original = "その日の帰宅中――"
translation = "그날 귀가하던 중――"

[[dialogue]]
speaker = "マトイ"
original = "「はぁ、はぁ、モンスターが多い……！\u3000こんなにモンスターが出るなんて、やっぱりリクリエが近いの？」"
translation = "「하아, 하아, 몬스터가 많아……! 이렇게 몬스터가 나오다니 역시 리크리에가 가까운 거야?」"

[[dialogue]]
speaker = "unk"
original = "でもあと少しだ！"
translation = "하지만 조금만 더 가면 돼!"

[[dialogue]]
speaker = "マトイ"
original = "「うん、気を付けて！」"
translation = "「응, 조심해!」"

[[dialogue]]
speaker = "女の子"
original = "「きゃああっ！？」"
translation = "「꺄아악!?」"

[[dialogue]]
speaker = "マトイ"
original = "「！？\u3000間に合わ──」"
translation = "「!? 늦겠어――」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ……？\u3000今のは……」"
translation = "「엣……? 방금 그건……」"

[[dialogue]]
speaker = "女の子"
original = "「あ、ありがとう、お姉ちゃん」"
translation = "「고, 고마워 언니」"

[[dialogue]]
speaker = "マトイ"
original = "「ど、どうしたしまして。みんなを守ることが私たち星騎士の役目だからね。じゃあね～」"
translation = "「처, 천만에요. 모두를 지키는 게 우리 성기사의 역할이니까. 그럼 안녕~」"

[[dialogue]]
speaker = "マトイ"
original = "「被害が出なくて本当に良かった～。でもあの時の攻撃は……会長じゃない？\u3000じゃああんな強烈な攻撃誰が――」"
translation = "「피해가 없어서 정말 다행이다~. 근데 그때 그 공격은…… 회장이 아니었지? 그럼 그런 강렬한 공격을 누가――」"

[[dialogue]]
speaker = "ウィステリア"
original = "「２人ともお疲れ～。会長くんはまた会ったわね」"
translation = "「둘 다 수고했어~. 회장군은 또 만났네」"

[[dialogue]]
speaker = "マトイ"
original = "「あれ？\u3000ウィステリアさん？」"
translation = "「어라? 위스테리아 씨?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「うん、ちょっと遠くから戦いを見させてもらったわよ。さすがは新星の星徒会ね」"
translation = "「응, 조금 멀리서 싸우는 걸 지켜봤단다. 역시 신성의 성도회네」"

[[dialogue]]
speaker = "マトイ"
original = "「そう……ですね」"
translation = "「그렇……네요」"

[[dialogue]]
speaker = "ウィステリア"
original = "（ん？\u3000会長くん、こっちをじっと見てるような……）"
translation = "（응? 회장군, 이쪽을 빤히 쳐다보는 것 같은데……）"

[[dialogue]]
speaker = "ウィステリア"
original = "（偶然の再会にときめきを感じてるとか？\u3000まさかデートのお誘いかしら？\u3000大胆ね。でも喫茶店ぐらいなら……）"
translation = "（우연한 재회에 설렘을 느끼고 있다든가? 설마 데이트 신청일까? 대담하네. 하지만 찻집 정도라면……）"

[[dialogue]]
speaker = "unk"
original = "その本ずっと持ってるんですか？"
translation = "그 책 계속 들고 계시는 거예요?"

[[dialogue]]
speaker = "ウィステリア"
original = "「そこかー！」"
translation = "「그거냐!」"

[[dialogue]]
speaker = "ウィステリア"
original = "（やっぱり私のバカ！\u3000でももうちょっとお姉さんに惹かれてくれたっていいじゃない！）"
translation = "（역시 나란 바보! 하지만 좀 더 누나한테 끌려줘도 괜찮잖아!）"

[[dialogue]]
speaker = "マトイ"
original = "「確かに、ウィステリアさんがその本持ってないの見たことないですね。何かの――」"
translation = "「확실히 위스테리아 씨가 그 책 안 들고 있는 걸 본 적이 없네요. 무슨――」"

[[dialogue]]
speaker = "キリカ"
original = "「皆さま、こんにちは」"
translation = "「여러분, 안녕하세요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ええ、こんにちは。あなたも様子を見に来たの？」"
translation = "「네, 안녕하세요. 당신도 상황 보러 온 거야?」"

[[dialogue]]
speaker = "キリカ"
original = "「ええ、近くまで来ていたので。加勢の必要はなかったようですが」"
translation = "「네, 근처까지 와 있었거든요. 가세할 필요는 없었던 모양이지만요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そ」"
translation = "「그래」"

[[dialogue]]
speaker = "キリカ"
original = "「失礼いたします」"
translation = "「실례하겠습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「お知り合いですか？」"
translation = "「아는 사이인가요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ちょっとね。ま、流星市国には星見家も九浄家もあるんだから、メイドの知り合いくらいいるわ」"
translation = "「조금 말이야. 뭐, 유성시국에는 호시미 가문도 쿠죠 가문도 있으니까 메이드 아는 사람 정도는 있어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「じゃ、今日はお疲れ様。家に帰ってゆっくり休んでね～」"
translation = "「그럼 오늘 수고했어. 집에 가서 푹 쉬렴~」"

