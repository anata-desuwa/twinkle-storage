[[dialogue]]
speaker = "サラン"
original = "「こちらがプールエリア、チェリークルーズです～♪」"
translation = "「이쪽이 풀장 구역, 체리 크루즈예요~♪」"

[[dialogue]]
speaker = "unk"
original = "新しくできたプールエリア。その広さに思わず感嘆の声を上げてしまう。"
translation = "새로 생긴 풀장 구역. 그 넓이에 나도 모르게 감탄사를 터뜨리고 만다."

[[dialogue]]
speaker = "unk"
original = "元々存在していた遊園地エリアと同じくらいの広さに、大小さまざまなプールが存在している。"
translation = "원래 존재하던 유원지 구역과 맞먹는 넓이에, 크고 작은 다양한 풀장이 존재하고 있다."

[[dialogue]]
speaker = "unk"
original = "そしてその中央にある大プールは、おそらく今回の一番の目玉となるプールだろう。"
translation = "그리고 그 중앙에 있는 대형 풀장은, 아마 이번의 가장 큰 볼거리인 풀장일 것이다."

[[dialogue]]
speaker = "サラン"
original = "「この間、桜十路家の持っている豪華客船の『チェリークルーズ号』が世界一周の旅に出航したんですよ～」"
translation = "「얼마 전, 사쿠라코지 가문이 소유한 호화 여객선 『체리 크루즈 호』가 세계 일주 여행을 떠났거든요~」"

[[dialogue]]
speaker = "サラン"
original = "「その船にも甲板に大きなプールがあるんですけど、ここはそれとそっくりに作られてるんです～」"
translation = "「그 배에도 갑판에 큰 풀장이 있는데, 여기는 그것과 똑같이 만들어진 거랍니다~」"

[[dialogue]]
speaker = "ラティエ"
original = "「これは素晴らしいな。まるで本当に巨大な客船に乗っている気分が味わえそうだ」"
translation = "「이거 굉장하군. 마치 정말로 거대한 객선에 타고 있는 기분을 맛볼 수 있겠어」"

[[dialogue]]
speaker = "サラン"
original = "「うふふ、そうなんですよ～」"
translation = "「우후후, 그렇죠~」"

[[dialogue]]
speaker = "unk"
original = "売店もたくさんあるね"
translation = "매점도 많이 있네."

[[dialogue]]
speaker = "ラティエ"
original = "「ふむ、可愛らしいお店でいっぱいだ」"
translation = "「흠, 아기자기한 가게들로 가득하군」"

[[dialogue]]
speaker = "サラン"
original = "「お料理もとっても美味しいですよ～。サランもメニュー作りに協力したのです～」"
translation = "「요리도 정말 맛있답니다~. 사란도 메뉴 선정에 협력했거든요~」"

[[dialogue]]
speaker = "ラティエ"
original = "「噂には聞いているよ。きみが味を認めた料理は必ず好評を博すとか」"
translation = "「소문은 익히 들었네. 자네가 맛을 인정한 요리는 반드시 호평을 받는다고」"

[[dialogue]]
speaker = "ラティエ"
original = "「お菓子作りに関してはプロ顔負けの腕を持っていて、きみの手がけたスイーツも各所で大人気だとか」"
translation = "「과자 만들기에 관해서는 프로 뺨치는 솜씨를 가졌고, 자네가 다룬 디저트도 곳곳에서 대인기라고 하더군」"

[[dialogue]]
speaker = "サラン"
original = "「嬉しいです～。今日もぜひお腹いっぱい食べて行ってください～」"
translation = "「기뻐요~. 오늘도 꼭 배불리 먹고 가세요~」"

[[dialogue]]
speaker = "ラティエ"
original = "「ありがとう。だがその前にさっそくひと泳ぎといこうか」"
translation = "「고맙네. 하지만 그전에 우선 한바탕 수영부터 해볼까」"

[[dialogue]]
speaker = "ラティエ"
original = "「ふむ……なかなかいい着心地だ。感想はどうかな？」"
translation = "「흠…… 꽤 착용감이 좋군. 감상은 어떤가?」"

[[dialogue]]
speaker = "unk"
original = "と、とても良いと思います"
translation = "저, 정말 좋다고 생각합니다."

[[dialogue]]
speaker = "ラティエ"
original = "「はっはっは、ありがとう」"
translation = "「핫핫핫, 고맙네」"

[[dialogue]]
speaker = "ラティエ"
original = "「しかし水着フォームというのは、わざわざ着替えに行く手間がかからないから便利だな」"
translation = "「그나저나 수영복 폼이라는 건, 굳이 갈아입으러 갈 수고가 들지 않아서 편리하군」"

[[dialogue]]
speaker = "サラン"
original = "「うふふ、それじゃサランたちもここで変身するよ～」"
translation = "「우후후, 그럼 사란 일행도 여기서 변신할게~」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「了解ですわ」"
translation = "「알겠습니다」"

[[dialogue]]
speaker = "unk"
original = "学園長に続いてサランとエルゼも水着に変身する。"
translation = "학원장에 이어 사란과 엘제도 수영복으로 변신한다."

[[dialogue]]
speaker = "ラティエ"
original = "「２人とも良く似合っているな。サラン嬢の水着はお菓子をイメージしたものかな？」"
translation = "「둘 다 무척 잘 어울리는군. 사란 양의 수영복은 과자를 이미지한 건가?」"

[[dialogue]]
speaker = "サラン"
original = "「そうだと思います～。可愛くて美味しそうでとっても気に入ってるの～♪」"
translation = "「그런 것 같아요~. 귀엽고 맛있어 보여서 정말 마음에 들어요~♪」"

[[dialogue]]
speaker = "ラティエ"
original = "「エルデリーゼ嬢は白いスクール水着か。確かきみのライバルの白楯アム嬢の水着フォームもスクール水着だったと思うが」"
translation = "「엘데리제 양은 하얀 학교 수영복인가. 분명 자네의 라이벌인 시로타테 아무 양의 수영복 폼도 학교 수영복이었던 것 같은데」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「学生にとっての正装は制服ですわ。ならば水着の正装はスクール水着ですの」"
translation = "「학생에게 있어 정장은 교복입니다. 그렇다면 수영복의 정장은 학교 수영복이에요」"

[[dialogue]]
speaker = "ラティエ"
original = "「なるほど、その通りかもしれない。うむ、きみはとても真面目な子なんだな」"
translation = "「과연, 그 말대로일지도 모르겠군. 음, 자네는 아주 성실한 아이로구나」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そ、そんなことはありませんの……」"
translation = "「그, 그런 건 아니에요……」"

[[dialogue]]
speaker = "unk"
original = "知らない人からすれば謙遜に聞こえるかもしれない。"
translation = "모르는 사람이 본다면 겸손하게 들릴지도 모른다."

[[dialogue]]
speaker = "unk"
original = "だが、毎晩のように流星寮を抜け出して遊びに出かけていることを知っていると、なんと反応すればいいか困ってしまう。"
translation = "하지만, 매일 밤 유성 기숙사를 빠져나가 놀러 다니는 것을 알고 있으면, 뭐라고 반응해야 할지 곤란해진다."

[[dialogue]]
speaker = "ラティエ"
original = "「ふふ、我々の水着に見とれてしまう気持ちは分かるが、きみも早く水着に着替えたまえ」"
translation = "「후후, 우리들의 수영복에 넋을 잃는 기분은 이해하지만, 자네도 빨리 수영복으로 갈아입게나」"

[[dialogue]]
speaker = "ラティエ"
original = "「開園初日と聞いていたから混雑も覚悟していたが、案外のびのびと泳げるものだな」"
translation = "「개장 첫날이라고 들어서 혼잡할 것도 각오했네만, 의외로 여유롭게 수영할 수 있군」"

[[dialogue]]
speaker = "サラン"
original = "「お客さんがいっぱい来ても大丈夫なように、出来るだけ広くするってお話してました～」"
translation = "「손님이 많이 와도 괜찮도록, 가능한 한 넓게 만들자고 이야기했었거든요~」"

[[dialogue]]
speaker = "ラティエ"
original = "「ああ、おかげでとても快適だ」"
translation = "「아아, 덕분에 아주 쾌적하네」"

[[dialogue]]
speaker = "サラン"
original = "「この甲板のプールは、お船の方のチェリークルーズ号のプールと同じ大きさなんですよ～」"
translation = "「이 갑판 풀장은 배 쪽의 체리 크루즈 호 풀장과 같은 크기랍니다~」"

[[dialogue]]
speaker = "ラティエ"
original = "「それは興味深い。今度はその客船の方にもぜひ乗せて欲しいものだ」"
translation = "「그거 흥미롭군. 다음번엔 그 객선 쪽에도 꼭 태워줬으면 좋겠어」"

[[dialogue]]
speaker = "エスメラルダ"
original = "『じょ、冗談じゃないわ！\u3000国外に逃亡されたら追いかけるのも一苦労です！\u3000引き止めてください！』"
translation = "『노, 농담이 아니에요! 국외로 도망쳐버리면 뒤쫓는 것도 고생이라구요! 붙잡으세요!』"

[[dialogue]]
speaker = "unk"
original = "が、学園長の仕事はどうするんですか？"
translation = "하, 학원장 업무는 어떡하실 건가요?"

[[dialogue]]
speaker = "unk"
original = "（引き止めてって言われても！）"
translation = "(붙잡으라고 해도!)"

[[dialogue]]
speaker = "ラティエ"
original = "「はっはっは、そうだったな」"
translation = "「핫핫핫, 그랬었지」"

[[dialogue]]
speaker = "ラティエ"
original = "「となると私がその客船に乗れるのは、学園長を退いたあとのことになるか？\u3000ずいぶんと先のことになりそうだ」"
translation = "「그렇게 되면 내가 그 객선에 탈 수 있는 건, 학원장에서 물러난 뒤의 일이 되겠나? 꽤 먼 미래의 일이 되겠군」"

[[dialogue]]
speaker = "サラン"
original = "「学園長さんは旅がお好きなの？」"
translation = "「학원장님은 여행을 좋아하시나요?」"

[[dialogue]]
speaker = "ラティエ"
original = "「そうだね。私の人生は旅と共にあるといっても過言ではない」"
translation = "「그렇단다. 나의 인생은 여행과 함께한다고 해도 과언이 아니지」"

[[dialogue]]
speaker = "ラティエ"
original = "「人間界、天界、魔界……色々な場所に行ったが、豪華客船で世界一周というのはやったことがないな」"
translation = "「인간계, 천계, 마계…… 여러 장소에 가봤지만, 호화 여객선으로 세계 일주라는 건 해본 적이 없거든」"

[[dialogue]]
speaker = "ラティエ"
original = "「今まで私が旅をしていても、特に学園の運営に大きな影響はなかった。ならば退任を待たず、今からその旅に出ても──」"
translation = "「지금까지 내가 여행을 다녀도 딱히 학원 운영에 큰 영향은 없었네. 그렇다면 퇴임을 기다리지 말고 지금부터 그 여행을 떠나도──」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「問題あると思いますわ。今までも学園長様不在で影響が無かったわけではありませんので」"
translation = "「문제 있다고 생각합니다. 지금까지도 학원장님 부재로 영향이 없었던 게 아니니까요」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「その分、フィオナ会長を始め色々な方が大変な思いをしてこられたのだと思います」"
translation = "「그만큼 피오나 회장님을 시작으로 여러 분이 힘든 일을 겪어오셨을 거라 생각합니다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "『そう、その通りよ！\u3000あぁ、エルデリーゼさん、よく言ってくれたわ！！』"
translation = "『그래, 바로 그거야! 아아, 엘데리제 씨, 잘 말해줬어요!!』"

[[dialogue]]
speaker = "unk"
original = "エルゼの言葉にエスメラルダ先生が興奮している。"
translation = "엘제의 말에 에스메랄다 선생님이 흥분하고 있다."

[[dialogue]]
speaker = "unk"
original = "これ以上、負担をかけないでください"
translation = "더 이상 부담을 주지 말아 주세요."

[[dialogue]]
speaker = "unk"
original = "エルゼの言う通りです"
translation = "엘제의 말이 맞아요."

[[dialogue]]
speaker = "ラティエ"
original = "「うむ……そこまで言われてしまっては仕方ないな、世界一周豪華客船の旅は未来の楽しみとしよう」"
translation = "「음…… 그렇게까지 말한다면 어쩔 수 없지. 세계 일주 호화 여객선 여행은 미래의 즐거움으로 미뤄두도록 할까」"

[[dialogue]]
speaker = "unk"
original = "学園長は笑って受け流すが、エルゼは不満げな様子で学園長を見つめている。"
translation = "학원장은 웃으며 넘기지만, 엘제는 불만스러운 기색으로 학원장을 바라보고 있다."

[[dialogue]]
speaker = "unk"
original = "エルゼの様子がおかしいと思っていたが、その理由がだんだん見えてきた。"
translation = "엘제의 모습이 이상하다고 생각했는데, 그 이유가 점점 보이기 시작했다."

[[dialogue]]
speaker = "unk"
original = "エルゼはフィオナのことをとても慕っている。"
translation = "엘제는 피오나를 매우 잘 따르고 있다."

[[dialogue]]
speaker = "unk"
original = "そんなフィオナに苦労を押し付けて、好き勝手に旅を楽しんでいる学園長が許せない、とそういうことなのだろう。"
translation = "그런 피오나에게 고생을 떠넘기고, 마음대로 여행을 즐기는 학원장을 용서할 수 없다, 뭐 그런 것이리라."

