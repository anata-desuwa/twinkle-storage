[[dialogue]]
speaker = "unk"
original = "ある日、マグダレナと東京へデートに出かけていた時のこと。"
translation = "어느 날, 마그다레나와 도쿄로 데이트를 나갔을 때의 일."

[[dialogue]]
speaker = "unk"
original = "日も落ちたので、そろそろ帰ろうかと話していると――"
translation = "해도 저물었기에 슬슬 돌아갈까 이야기하고 있자――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「会長、この後、まだお時間はありますか？」"
translation = "「회장님, 이 뒤에 아직 시간 있으신가요?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「実は私、できたら寄りたいところがありまして……」"
translation = "「사실 저, 가능하다면 들르고 싶은 곳이 있어서요……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ほら、こっちの姿だと、恋人としてまだできてないことが、あったじゃないですか♪」"
translation = "「봐요, 이 모습으로는 연인으로서 아직 해보지 못한 게 있었잖아요♪」"

[[dialogue]]
speaker = "クロト"
original = "「えっ……そ、それって……」"
translation = "「엣…… 그, 그건……」"

[[dialogue]]
speaker = "unk"
original = "マグダレナは背伸びをして、俺の耳元に顔を寄せ、そっと囁く。"
translation = "마그다레나는 발꿈치를 들고 내 귓가에 얼굴을 가까이 대며 살며시 속삭인다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「キスよりも、もっとエッチなスキンシップ、です<emoji=heart04>」"
translation = "「키스보다 더 야한 스킨십, 이요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「……こっちの姿でも、してみたくありませんか？」"
translation = "「……이쪽 모습으로도 해보고 싶지 않으신가요?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふっ……<emoji=heart04>」"
translation = "「후훗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは、近くにあるラブホテルへと入ることになった。"
translation = "그렇게 우리들은 근처에 있는 러브호텔로 들어가게 되었다."

[[dialogue]]
speaker = "unk"
original = "マグダレナが制服の前をはだけさせていくと――"
translation = "마그다레나가 교복 앞섶을 풀어헤쳐 가자――"

[[dialogue]]
speaker = "unk"
original = "小さな体に不釣り合いな、大きな胸が露わになり、俺はごくりと喉を鳴らしてしまう。"
translation = "작은 몸에 어울리지 않는 커다란 가슴이 드러나고, 나는 꿀꺽 목을 울리고 만다."

[[dialogue]]
speaker = "マグダレナ"
original = "「んふっ……<emoji=heart04>\u3000会長、目が釘付けになっちゃってますよ<emoji=heart04>」"
translation = "「응훗……<emoji=heart04> 회장님, 눈을 떼지 못하고 계시네요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「そんなにママダレナのおっぱい、見たかったんですか？」"
translation = "「그렇게 마마다레나의 가슴, 보고 싶었나요?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長のおち○ちん、あっという間にムクムクって大きくなって……<emoji=heart04>」"
translation = "「회장님의 자지, 순식간에 불끈불끈 커져서……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「遠慮せずに、触っていいんですよ？\u3000このおっぱいは、アナタだけのものなんですから……<emoji=heart04>」"
translation = "「부끄러워 말고 만져도 된다고요? 이 가슴은 당신만의 것이니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言われて俺は我慢できずに、両手でそのたわわな胸を鷲掴みにする。"
translation = "그 말에 나는 참지 못하고 양손으로 그 풍만한 가슴을 움켜쥔다."

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ、あんっ……<emoji=heart04>\u3000んっ……ふぅ……<emoji=heart04>\u3000はあぁっ……んっ……<emoji=heart04>\u3000あっ……ふうぅっ……<emoji=heart04>\u3000んっ……はあぁっ……<emoji=heart04>」"
translation = "「앗, 안……<emoji=heart04> 응…… 후우……<emoji=heart04> 하아앗…… 응……<emoji=heart04> 앗…… 후우우……<emoji=heart04> 응…… 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「乳首がもう、ぷっくり勃起しちゃってる」"
translation = "「유두가 벌써, 빳빳하게 발기해 버렸어」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んっ……<emoji=heart04>\u3000は、はい……<emoji=heart04>\u3000この体は、前のアバターよりも、感度が高く設定してあるみたいで……あんっ<emoji=heart04>」"
translation = "「응윽……<emoji=heart04> 하, 네……<emoji=heart04> 이 몸은, 이전 아바타보다 감도가 높게 설정되어 있는 것 같아서…… 앙잇<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「おっぱいを揉まれるだけで、とても、感じちゃいます……ふうぅっ<emoji=heart04>」"
translation = "「가슴을 주물러지는 것만으로도, 너무, 느껴버려요…… 후우우읏<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ……！\u3000んあぁっ<emoji=heart04>\u3000ち、乳首触られるの、すごく感じちゃ……あっ<emoji=heart04>\u3000ふあぁっ……はあぁんっ<emoji=heart04>」"
translation = "「앗……! 응아앗<emoji=heart04> 유, 유두 만져지는 거, 너무 느껴버렷…… 앗<emoji=heart04> 후아앗…… 하아앙잇<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ、あんっ<emoji=heart04>\u3000乳首コリコリされるの、刺激すごいぃ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000あっ……んっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「앗, 안잇<emoji=heart04> 유두를 굴려지는 거, 자극이 엄청나요오<emoji=heart04> 후아앗<emoji=heart04> 응윽…… 하아앗<emoji=heart04> 앗…… 응윽<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「――は、はい<emoji=heart04>\u3000気持ち、いい<emoji=heart04>\u3000乳首気持ちいいですっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ……ふああぁっ<emoji=heart04>」"
translation = "「――네, 네에<emoji=heart04> 기분, 좋아<emoji=heart04> 유두 기분 좋아요옷<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응우윽…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あんっ……<emoji=heart04>\u3000会長のが、おま○この入り口に当たって……あぁんっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>」"
translation = "「안잇……<emoji=heart04> 회장님의 것이, 보지의 입구에 닿아서…… 아앙잇<emoji=heart04> 하아앗…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長のおち○ちん、すごいです……<emoji=heart04>\u3000この小さな体だと、もっと大きく、逞しく見えて……あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んうぅっ……ふあぁっ<emoji=heart04>」"
translation = "「회장님의 자지, 굉장해요……<emoji=heart04> 이 작은 몸으로는, 더욱 크고, 늠름해 보여서…… 앗<emoji=heart04> 응아앗<emoji=heart04> 응우윽…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「クリに擦れて、もっと感じちゃいます<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000んうぅっ……ふあぁっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>」"
translation = "「클리에 쓸려서, 더 느껴버려요<emoji=heart04> 앗<emoji=heart04> 아앙잇<emoji=heart04> 응우윽…… 후아앗<emoji=heart04> 하아앗…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「中に入れられるのを想像したら、おま○こキュンってなって……はぁぁ<emoji=heart04>\u3000愛液がいっぱい溢れて、きちゃいます……あっ<emoji=heart04>\u3000はあぁああっ<emoji=heart04>」"
translation = "「안에 넣어지는 걸 상상했더니, 보지가 큥 하고 울려서…… 하아아<emoji=heart04> 애액이 잔뜩 넘쳐, 버려요…… 앗<emoji=heart04> 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すごい量の愛液で、俺のペニスはもうすっかりぬるぬるの状態だ。"
translation = "엄청난 양의 애액으로, 내 페니스는 이제 완전히 미끌미끌한 상태다."

[[dialogue]]
speaker = "クロト"
original = "「マグダレナ……もうそろそろ、挿れても大丈夫そう？」"
translation = "「막달레나…… 이제 슬슬, 삽입해도 괜찮겠어?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んっ……はいっ<emoji=heart04>\u3000私のおま○こ、とっくに期待でぐちょぐちょになっちゃってますから、大丈夫、です<emoji=heart04>」"
translation = "「응윽…… 네엣<emoji=heart04> 제 보지, 벌써 기대감으로 구쵸구쵸하게 되어버렸으니까, 괜찮아, 요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長、どうぞママダレナの中に、きて下さい……<emoji=heart04>」"
translation = "「회장님, 어서 막달레나의 안에, 와 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ……！\u3000会長の先っぽが、おま○この穴を広げて……んんっ……<emoji=heart04>」"
translation = "「앗……! 회장님의 끝부분이, 보지 구멍을 넓히며…… 응응윽……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はあぁっ<emoji=heart04>\u3000中、押し広げられて……あっ――<emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 안쪽이, 밀려 넓혀져서…… 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んああぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、来ましたぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지, 들어왔어요오오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はあぁ～～～っ……<emoji=heart04><emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000おっきぃ……<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>」"
translation = "「하아아~~~앗……<emoji=heart04><emoji=heart04> 응윽…… 후우읏<emoji=heart04> 커어……<emoji=heart04> 하아앗…… 후우읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「マグダレナ、痛くないか？」"
translation = "「막달레나, 아프지 않아?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んっ……<emoji=heart04>\u3000はい<emoji=heart04>\u3000大丈夫、です……<emoji=heart04>」"
translation = "「응윽……<emoji=heart04> 네<emoji=heart04> 괜찮아, 요……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「２度目の処女も会長に捧げることができて、とても幸せな気分です……<emoji=heart04>」"
translation = "「두 번째 처녀도 회장님께 바칠 수 있어서, 너무 행복한 기분이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はぁぁ<emoji=heart04>\u3000むしろもっと、会長のことを感じさせて、欲しいです。だから――」"
translation = "「하아아<emoji=heart04> 오히려 좀 더, 회장님을 느끼게 해줬으면 좋겠어요. 그러니까――」"

[[dialogue]]
speaker = "マグダレナ"
original = "「動いて、下さい……<emoji=heart04>」"
translation = "「움직여, 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04><emoji=heart04> 하아앗<emoji=heart04> 후아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000はあぁっ……ふあぁっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000んうぅっ……はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 안……<emoji=heart04> 하아앗……후아앗<emoji=heart04> 응……하아앗<emoji=heart04> 응으윽……하아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「か、体の感度のせいで、痛いのより、気持ちよく、なっちゃいますっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ、あぁんっ……<emoji=heart04>\u3000はあぁっ……ふあぁっ<emoji=heart04>」"
translation = "「모, 몸의 감도 때문에, 아픈 것보다 기분 좋아져 버려요<emoji=heart04> 안<emoji=heart04> 하아앗<emoji=heart04> 앗, 아앙……<emoji=heart04> 하아앗……후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「処女を捧げたばかり、なのに……んんっ<emoji=heart04>\u3000気持ちよくて、頭ふわふわ、しちゃいます<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあぁっ……ふああぁ<emoji=heart04>」"
translation = "「처녀를 바친 지 얼마 안 됐는데……응윽<emoji=heart04> 기분 좋아서 머리가 둥실둥실해져요<emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 하아아앗……후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「おち○ちん、すごいです<emoji=heart04>\u3000大きくて固くて……んあぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁぁんっ……ふあぁっ<emoji=heart04>\u3000んうぅっ……んあぁぁっ<emoji=heart04>」"
translation = "「자지, 굉장해요<emoji=heart04> 크고 딱딱해서……응아앗<emoji=heart04> 기분 좋아<emoji=heart04> 안<emoji=heart04> 하아앙……후아앗<emoji=heart04> 응으윽……응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、マグダレナの小さなおま○こがぴったり絡みついてきて、気持ちいい……！」"
translation = "「나도, 막달레나의 좁은 보지가 딱 달라붙어 와서 기분 좋아……!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あぁんっ<emoji=heart04>\u3000嬉しいですぅ<emoji=heart04>\u3000あぁぁあっ……！\u3000おち○ちん、奥まできて――ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아앙<emoji=heart04> 기뻐요오<emoji=heart04> 아아아앗……! 자지, 끝까지 들어와서――후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はぁぁんっ<emoji=heart04>\u3000子宮口にキス、されちゃってますぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……ふああぁっ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 자궁구에 키스, 당하고 있어요오<emoji=heart04> 앗<emoji=heart04> 하아앗……후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000……はあぁんっ<emoji=heart04>\u3000奥、すごいっ<emoji=heart04>\u3000おち○ちんキス、気持ちいいですっ<emoji=heart04>\u3000はあぁっ……んああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> ……하아앙<emoji=heart04> 안쪽, 굉장해<emoji=heart04> 자지 키스, 기분 좋아요<emoji=heart04> 하아앗……응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は顔を近づけて、マグダレナの唇を奪う。"
translation = "나는 얼굴을 가까이 대고, 막달레나의 입술을 빼앗는다."

[[dialogue]]
speaker = "マグダレナ"
original = "「んむっ……！？<emoji=heart04>\u3000上の口も、同時にキス、しちゃうんれすか？\u3000んっ……<emoji=heart04>」"
translation = "「응뭇……!?<emoji=heart04> 위의 입도 동시에 키스해 버리는 건가요? 응……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ちゅっ……ちゅぷぷっ……んっ<emoji=heart04>\u3000舌入って……んむっ<emoji=heart04>\u3000ちゅっ……れろちゅっ。ちゅぱっ<emoji=heart04>\u3000ちゅっ……ちゅぷぷっ。ちゅるるっ<emoji=heart04>」"
translation = "「츄……츄푸푸……응<emoji=heart04> 혀 들어와서……응뭇<emoji=heart04> 츄……레로츄. 츄파<emoji=heart04> 츄……츄푸푸. 츄루루<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んっ……はあぁっ<emoji=heart04>\u3000逞しいおち○ちんと一緒に<emoji=heart04>\u3000んあぁぁん<emoji=heart04>\u3000ダブルキスされたら、頭とろけて、メロメロになっちゃいますぅ……<emoji=heart04>」"
translation = "「응……하아앗<emoji=heart04> 늠름한 자지와 함께<emoji=heart04> 응아아앙<emoji=heart04> 더블 키스 당하면 머리가 녹아서 헤롱헤롱해져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んむっ<emoji=heart04>\u3000ちゅっ……ちゅぷぷっ。れろちゅっ<emoji=heart04>\u3000ちゅっ……ちゅぱっ。ちゅるるっ<emoji=heart04>\u3000ちゅれるっ……れろちゅっ<emoji=heart04>\u3000ちゅっ……ちゅぱっ<emoji=heart04>」"
translation = "「응뭇<emoji=heart04> 츄……츄푸푸. 레로츄<emoji=heart04> 츄……츄파. 츄루루<emoji=heart04> 츄레룻……레로츄<emoji=heart04> 츄……츄파<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はキスしながら、再びマグダレナの胸を鷲掴みにする。"
translation = "나는 키스하면서 다시 막달레나의 가슴을 움켜쥔다."

[[dialogue]]
speaker = "マグダレナ"
original = "「んんっ！？\u3000ぷはっ……！\u3000あああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おっぱい強く揉まれるの、感じちゃいます<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응윽!? 푸핫……! 아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가슴 세게 주물러지는 거 느껴져요<emoji=heart04><emoji=heart04> 안<emoji=heart04> 하아앗……후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04><emoji=heart04>\u3000おっぱい絞るみたいに、乳首まで擦られるの凄い<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>\u3000ふうぅっ……はあぁっ……<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04><emoji=heart04> 가슴 짜는 것처럼 유두까지 문질러지는 거 굉장해<emoji=heart04> 응윽<emoji=heart04> 하아앗……응아앗<emoji=heart04> 후우윽……하아앗……<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んあぁっ<emoji=heart04>\u3000乳首コリコリ、気持ちいいですぅ<emoji=heart04>\u3000おま○こ、キュンキュンしちゃいます<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>……はあぁんっ！<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 유두 꼬집는 거 기분 좋아요오<emoji=heart04> 보지가 큥큥거려요<emoji=heart04> 안<emoji=heart04> 안<emoji=heart04>……하아앙!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナのおま○こが俺のをきゅうきゅうと締め付けてきて、思わず声を上げてしまう。"
translation = "막달레나의 보지가 내 것을 꽉꽉 조여 와서, 나도 모르게 소리를 내고 만다."

[[dialogue]]
speaker = "クロト"
original = "「くっ！\u3000ヤバい……！\u3000気持ちよすぎて、油断したらすぐにでも出ちゃいそうだ……！」"
translation = "「큭! 위험해……! 너무 기분 좋아서 방심하면 금방이라도 나올 것 같아……!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んっ<emoji=heart04>\u3000いいですよ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000遠慮せずに、望むまま動いてっ<emoji=heart04>\u3000出して下さい……<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 괜찮아요<emoji=heart04> 앗, 안<emoji=heart04> 사양 말고 원하는 대로 움직여서<emoji=heart04> 내보내 주세요……<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「こっちの体にも、会長のものだって証っ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000いっぱい刻んで、欲しいです<emoji=heart04>\u3000だから――」"
translation = "「이쪽 몸에도 회장님의 것이라는 증표를<emoji=heart04> 하아앗<emoji=heart04> 잔뜩 새겨줬으면 좋겠어요. 그러니까――」"

[[dialogue]]
speaker = "マグダレナ"
original = "「いっぱいいっぱい<emoji=heart04>\u3000種付けして下さいっ<emoji=heart04>」"
translation = "「잔뜩잔뜩<emoji=heart04> 씨뿌리기 해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……マグダレナ！」"
translation = "「윽……막달레나!」"

[[dialogue]]
speaker = "unk"
original = "俺は我慢できずに、腰の動きを激しくする。"
translation = "나는 참지 못하고 허리 움직임을 격렬하게 한다."

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ、あっ、あっ、すごいっ<emoji=heart04>\u3000ふあぁぁん<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000はっ、ふああぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 굉장해<emoji=heart04> 후아아앙<emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 응아아앗<emoji=heart04> 핫, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「激しいピストン、気持ちいいですっ<emoji=heart04>\u3000あっ、あっ、あっ、んあぁっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「격렬한 피스톤, 기분 좋아요<emoji=heart04> 앗, 앗, 앗, 응아앗<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「おち○ちん気持ちいいっ<emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000はぁぁっ、んああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「자지 기분 좋아<emoji=heart04> 안, 안, 안<emoji=heart04> 하아앗, 응아아앗<emoji=heart04> 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は大きく揺れるマグダレナの胸をまた鷲掴みにして、今度は口で乳首にむしゃぶり付く。"
translation = "나는 크게 흔들리는 막달레나의 가슴을 다시 움켜쥐고, 이번에는 입으로 유두를 탐닉한다."

[[dialogue]]
speaker = "マグダレナ"
original = "「ああぁあっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000そんな会長<emoji=heart04>\u3000激しくしながら、おっぱい吸われたりしたら<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 그런 회장님<emoji=heart04> 격렬하게 하면서 가슴 빨리면<emoji=heart04> 앗, 앗, 앗, 응아아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あんっ、あんっ、あんっ<emoji=heart04>\u3000乳首強く吸われるの気持ちいい<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んっ、んっ、んっ、んうぅっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「안, 안, 안<emoji=heart04> 유두 세게 빨리는 거 기분 좋아<emoji=heart04> 응아앗<emoji=heart04> 응, 응, 응, 응으윽<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000乳首、舌で転がされるのも、気持ちいいです<emoji=heart04>\u3000あんっ、あんっ、あんっ、ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 유두를 혀로 굴리는 것도 기분 좋아요<emoji=heart04> 안, 안, 안, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はぁぁぁん<emoji=heart04>\u3000あっ、あっ、んああぁっ<emoji=heart04>\u3000ダメッ、きちゃいます<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 앗, 앗, 응아아앗<emoji=heart04> 안 돼, 와버려요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長っ、私もうイっちゃいそうです<emoji=heart04>\u3000イっちゃいますぅぅ……<emoji=heart04>\u3000あっ、あっ、あっ、あぁぁんっ<emoji=heart04>」"
translation = "「회장님, 저 이제 가버릴 것 같아요<emoji=heart04> 가버려요오……<emoji=heart04> 앗, 앗, 앗, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺ももう、イキそうだ……！」"
translation = "「나도 이제, 갈 것 같아……!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「は、はいっ<emoji=heart04>\u3000きて、きて下さいっ<emoji=heart04>\u3000ママダレナと一緒にっ<emoji=heart04>\u3000精液出してぇ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하, 네에<emoji=heart04> 와주세요, 와주세요<emoji=heart04> 마마달레나와 함께<emoji=heart04> 정액 내보내 줘어<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んあああぁぁっ<emoji=heart04><emoji=heart04>\u3000おち○ちん激しいぃっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000ダメダメッ<emoji=heart04>\u3000気持ちいいですっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04><emoji=heart04> 자지 격렬해애<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 안 돼안 돼<emoji=heart04> 기분 좋아요<emoji=heart04> 응아앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000くる<emoji=heart04>\u3000きちゃいます<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 온다<emoji=heart04> 와버려요<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「マグダレナ、中に出すぞ……！」"
translation = "「막달레나, 안에 싼다……!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長<emoji=heart04>\u3000きて下さいっ<emoji=heart04>\u3000種付け射精っ<emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장님<emoji=heart04> 와주세요<emoji=heart04> 씨뿌리기 사정<emoji=heart04> 앗앗앗앗앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「いく、イクイクイクイクイクッ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다, 가가가가가앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버렷――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「イックぅぅぅーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어――――――엇<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아―――――――――앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はあああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長の熱い子種が、子宮いっぱい、入ってきてますぅ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああぁぁっ……<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 회장님의 뜨거운 씨앗이 자궁 가득 들어오고 있어요오<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ<emoji=heart04>\u3000すごいっ……<emoji=heart04>\u3000会長の射精まだ続いて……はあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 굉장해……<emoji=heart04> 회장님의 사정 아직 계속돼서……하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「んっ……<emoji=heart04>\u3000ふうぅ、ふぅぅぅ……<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000やっと止まりましたぁ……<emoji=heart04>\u3000はあぁ……ふうぅ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후우, 후우우……<emoji=heart04> 아앗<emoji=heart04> 겨우 멈췄어요……<emoji=heart04> 하아아……후우우<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長の熱いので、お腹の奥まで、いっぱいになっちゃってます……<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「회장님의 뜨거운 걸로 배 속 깊은 곳까지 가득 차 버렸어요……<emoji=heart04> 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はあぁ……<emoji=heart04>\u3000小さい体でのエッチ、すごく気持ちよかったです……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 작은 몸으로 하는 섹스, 정말 기분 좋았어요……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長も、気持ちよかったですか？\u3000あっ……えへへ<emoji=heart04>\u3000えっちした後に頭撫でてもらうの、嬉しいです<emoji=heart04>」"
translation = "「회장님도 기분 좋았나요? 앗……에헤헤<emoji=heart04> 섹스한 뒤에 머리 쓰다듬어 주는 거 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「これでこっちの体も、全部会長のものになれましたね……<emoji=heart04>」"
translation = "「이걸로 이쪽 몸도 전부 회장님의 것이 되었네요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう、マグダレナ。本当に、大好きだ」"
translation = "「고마워, 막달레나. 정말로, 정말 좋아해.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい<emoji=heart04>\u3000私もです……<emoji=heart04>\u3000大好きですよ、会長<emoji=heart04>」"
translation = "「네<emoji=heart04> 저도요……<emoji=heart04> 정말 좋아해요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は再び、マグダレナに顔を近づけ、キスをする。"
translation = "나는 다시 막달레나에게 얼굴을 가까이 대고 키스를 한다."

[[dialogue]]
speaker = "マグダレナ"
original = "「あ……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>\u3000ちゅぷぷっ……れろちゅっ……ちゅるるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>」"
translation = "「아……<emoji=heart04> 응……츄<emoji=heart04> 츄푸푸……레로츄……츄루루<emoji=heart04> 츄파<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はあぁ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「――そういえば、会長。アニマさまから伝言があるのですが……」"
translation = "「――그러고 보니 회장님. 아니마 님으로부터 전언이 있는데요……」"

[[dialogue]]
speaker = "クロト"
original = "「えっ、今……？\u3000というか、伝言って……？」"
translation = "「엣, 지금……? 그보다 전언이라니……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「まだまだ研究中ではあるそうなんですが――」"
translation = "「아직 연구 중이긴 하다고 합니다만――」"

[[dialogue]]
speaker = "マグダレナ"
original = "「実際にエッチしている時のデータが集まれば、いずれこのアバターでも、本当に妊娠ができるようになるかもしれない、だそうです<emoji=heart04>」"
translation = "「실제로 섹스하고 있을 때의 데이터가 모이면, 언젠가 이 아바타로도 정말로 임신을 할 수 있게 될지도 모른대요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ええっ……！？」"
translation = "「에엣……!?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「もしそれが叶う時がきたら……会長はどうしますか？」"
translation = "「만약 그게 이루어질 때가 온다면…… 회장님은 어떻게 하실 건가요?」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺の耳元に口を寄せて、そっと囁く。"
translation = "그녀는 내 귓가에 입을 대고 살며시 속삭인다."

[[dialogue]]
speaker = "マグダレナ"
original = "「本当に……種付け、しちゃいますか？<emoji=heart04>」"
translation = "「정말로…… 씨뿌리기, 해버릴까요?<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「――私は会長とだったら……ママダレナになっても、いいですよ<emoji=heart04>」"
translation = "「――저는 회장님과 함께라면…… 마마달레나가 되어도 괜찮아요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言われて、俺は思わず想像してしまい――"
translation = "그런 말을 듣고 나는 나도 모르게 상상해 버려서――"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ……<emoji=heart04>\u3000会長ったら、すごいです……<emoji=heart04>\u3000もう元気に……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 회장님도 참, 굉장해요……<emoji=heart04> 벌써 기운차게……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ママダレナに甘えるの、延長しちゃいますか？\u3000ふふっ……<emoji=heart04>」"
translation = "「마마달레나에게 응석 부리는 거, 연장해 버릴까요? 후훗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉通り、俺はラブホテルの時間を延長するくらい、彼女に甘えてしまうのだった――"
translation = "그 말대로 나는 러브호텔 시간을 연장할 정도로 그녀에게 응석 부리는 것이었다――"

