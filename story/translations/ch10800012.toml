[[dialogue]]
speaker = "unk"
original = "第２話,熱戦？\u3000休日チェス勝負！,P"
translation = "제2화, 열전? 휴일 체스 승부!"

[[dialogue]]
speaker = "unk"
original = "そして、翌日。"
translation = "그리고 다음 날."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「来たぜ、会長！」"
translation = "「왔다고, 회장!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こんにちは、フラン先輩。本日の勝負は私が立ち会います」"
translation = "「안녕하세요, 프랑 선배. 오늘의 승부는 제가 입회하겠습니다.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「おう、助かるぜ。公平にジャッジしてくれよな」"
translation = "「오, 고맙군. 공정하게 판정해달라고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「勝負の方法は？\u3000オレはなんでもいいぜ！\u3000どんな内容だろうが、逃げも隠れもしねえ！」"
translation = "「승부 방법은? 난 뭐든 상관없어! 어떤 내용이든 도망치지도 숨지도 않을 테니까!」"

[[dialogue]]
speaker = "unk"
original = "平和的にゲームで勝負だ"
translation = "평화적으로 게임으로 승부하자"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ゲームぅ？\u3000拳と拳でやり合うんじゃないのかよ。もちろんいいけどよ」"
translation = "「게임? 주먹 대 주먹으로 맞붙는 게 아니었냐고. 물론 좋긴 하지만 말이야.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フラン先輩の得意なゲームはなんですか？」"
translation = "「프랑 선배가 잘하는 게임은 뭔가요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレが得意なゲーム……？\u3000ははぁん、なるほど。オレの得意なゲームでコテンパンにして、ぐうの音も言わせなくするって魂胆か？」"
translation = "「내가 잘하는 게임……? 하하안, 그렇군. 내가 잘하는 게임으로 박살을 내서 아무 말도 못 하게 만들 속셈인가?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「でも、オレはオレが負けたと思うまで挑み続けるぜ！\u3000デカく成長した時にリベンジするからな！」"
translation = "「하지만 난 내가 졌다고 생각할 때까지 계속 도전할 거야! 더 크게 성장했을 때 리벤지할 거니까!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ちなみにオレの得意なゲームはチェスだ」"
translation = "「참고로 내가 잘하는 게임은 체스다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど。こう見えて、フラン先輩は学力テストでは必ず学年５０位以内には入る秀才ですから。意外と頭脳派なのですね」"
translation = "「그렇군요. 이래 보여도 프랑 선배는 학력 테스트에서 항상 전교 50등 안에는 드는 수재니까요. 의외로 두뇌파네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「こう見えてとか意外ととか本人の前で言うなよ」"
translation = "「이래 보여도라든가 의외라든가 본인 앞에서 말하지 마.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ま、成績のことはほんとだがな。生きることは戦いだ。オレは勉強からもテストからも逃げねえ」"
translation = "「뭐, 성적 얘기는 사실이지만 말이야. 사는 건 싸움이다. 난 공부로부터도 테스트로부터도 도망치지 않아.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さて。会長はチェスはお得意ですか」"
translation = "「자. 회장님은 체스를 잘하시나요?」"

[[dialogue]]
speaker = "unk"
original = "いや、よくわからない"
translation = "아니, 잘 몰라"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「そっか、そっか、よくわか――はぁ？\u3000マジかよ！？\u3000チェスわからない人類なんて存在するのか！？」"
translation = "「그렇구나, 그렇구나, 잘 모── 뭐? 실화냐!? 체스 모르는 인류가 존재한다고!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かにチェスは世界最大のマインドゲームですが、フラン先輩の主語は大きいですね」"
translation = "「확실히 체스는 세계 최대의 마인드 게임이지만, 프랑 선배의 주어가 너무 크네요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フラン先輩、チェス初心者の会長をコテンパンにするチャンスです。どうぞ」"
translation = "「프랑 선배, 체스 초보인 회장님을 박살 낼 기회입니다. 자요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いやなんでそっちがノリノリなんだよ」"
translation = "「아니 왜 그쪽이 신난 건데.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「右も左もわからねえやつを倒して、何も面白くねえし、勝ったところで何の栄誉も得られねえ」"
translation = "「아무것도 모르는 녀석을 이겨봤자 하나도 재미없고, 이겨봤자 아무런 영광도 없다고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「むしろ、初心者狩りで会長に勝ったなんて自慢したら、末代までの笑いものだぜ」"
translation = "「오히려 초보자 사냥으로 회장을 이겼다고 자랑했다간 대대손손 웃음거리가 될걸.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よし、せっかくだからコマの動かし方からレクチャーしてやる。まずはポーンだけどよ……」"
translation = "「좋아, 이왕 이렇게 된 거 기물 움직이는 법부터 강의해주지. 일단 폰인데 말이야……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「チェックだ」"
translation = "「체크다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「逃れる術はありませんね。チェックメイトです」"
translation = "「벗어날 방법이 없네요. 체크메이트입니다.」"

[[dialogue]]
speaker = "unk"
original = "強い……負けました"
translation = "강하다…… 졌습니다"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「これでオレの３戦３勝だな」"
translation = "「이걸로 내 3전 3승이군.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「コテンパンですね、会長。そろそろ休憩にしましょう。もぐもぐタイムです」"
translation = "「완패네요, 회장님. 슬슬 휴식하죠. 간식 타임입니다.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「さすがは会長、筋がいいな。一戦ごとにいい動きになってやがる。でも、オレにはまだ遠く及ばねえ」"
translation = "「역시 회장, 감이 좋군. 판마다 움직임이 좋아지고 있어. 하지만 나에겐 아직 한참 멀었어.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ま、もう少しやれば、ハンデ付きなら勝てるようになるかもな」"
translation = "「뭐, 조금 더 하면 핸디캡이 있다면 이길 수 있게 될지도 모르겠네.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「チェック！」"
translation = "「체크!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「どうあがいても４手後に会長の敗北ですね」"
translation = "「어떻게 발버둥 쳐도 4수 뒤에 회장님의 패배네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「っしゃ！\u3000７戦７勝……っと、つい喜んじまった」"
translation = "「샤! 7전 7승…… 앗, 나도 모르게 기뻐해 버렸네.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「途中、ちょっとヤバい局面もあったなー。うかうかしてたら、あっという間に追いつかれちまいそうだぜ」"
translation = "「도중에 좀 위험한 국면도 있었지─. 방심하다간 순식간에 따라잡히겠어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フラン先輩は手ほどきがお上手です。何かコツでも？」"
translation = "「프랑 선배는 가르치는 솜씨가 좋으시네요. 비결이라도?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「コツってもんでもねえけどさ。手ほどきって応援みたいなもんだろ？」"
translation = "「비결이랄 것도 없지만 말이야. 가르치는 건 응원 같은 거잖아?」"

[[dialogue]]
speaker = "unk"
original = "わかるようなわからないような"
translation = "알 것 같기도 하고 모를 것 같기도 하고"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「へへ、でも、まだまだ負けてやんないぜ。せめて、卒業までに一矢報いてくれよな」"
translation = "「헤헤, 그래도 아직은 져주지 않을 거야. 적어도 졸업 전까지는 한 방 먹여보라고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「って、もうこんな時間か！\u3000時間を忘れて遊んじまったぜ」"
translation = "「어라, 벌써 시간이 이렇게 됐나! 시간 가는 줄 모르고 놀아버렸군.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「てっきり今日は会長と熱い勝負ができるもんだと思ってたのによ。ちょっと騙された気分だぜ」"
translation = "「오늘 회장이랑 뜨겁게 한판 붙을 수 있을 줄 알았는데 말이야. 좀 속은 기분이야.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、フラン先輩は非常に楽しまれていたようですが」"
translation = "「하지만 프랑 선배는 굉장히 즐거워 보였습니다만.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ああ、めちゃくちゃ楽しかったぜ！」"
translation = "「아아, 엄청 즐거웠다고!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「才能溢れるやつが、みるみる成長していくのを目の前で見てたんだからな。応援のし甲斐もあるってもんだ。これだから強いやつとやり合うのはたまんねえ」"
translation = "「재능 넘치는 녀석이 눈에 띄게 성장해가는 걸 눈앞에서 봤으니까 말이야. 응원할 맛도 난다고. 이래서 강한 녀석이랑 엮이는 건 참을 수 없다니까.」"

[[dialogue]]
speaker = "unk"
original = "また遊ぼう！"
translation = "또 놀자!"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ああ！\u3000めいっぱい遊ぶつもりじゃなかったんだけどな……ま、いいか！」"
translation = "「아아! 실컷 놀 생각은 아니었는데…… 뭐, 상관없나!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「すっげえ楽しい休日だったよ。会長、ありがとな！」"
translation = "「더할 나위 없이 즐거운 휴일이었어. 회장, 고마워!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フラン先輩がチェスが好きなこと、ご存じでしたか？」"
translation = "「프랑 선배가 체스를 좋아한다는 거, 알고 계셨나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「真っ向から戦うのではなく、彼女を気持ちよく楽しませてやりこめる。猪突猛進な彼女にはない発想でしたね」"
translation = "「정면으로 싸우는 게 아니라 그녀를 기분 좋게 즐겁게 해서 굴복시키다니. 저돌맹진하는 그녀에겐 없는 발상이었네요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これが勝負に負けて戦いに勝つ……ということでしょうか」"
translation = "「이것이 승부에는 지고 싸움에는 이긴다……라는 걸까요.」"

