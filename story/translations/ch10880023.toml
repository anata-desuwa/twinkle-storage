[[dialogue]]
speaker = "unk"
original = "第３話,この気持ちの名前,P"
translation = "제3화, 이 마음의 이름, P"

[[dialogue]]
speaker = "unk"
original = "リーナの希望で遊園地併設のプールに遊びに来た。"
translation = "리나의 희망으로 유원지 병설 수영장에 놀러 왔다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ここ、前から来てみたかったんだ。ありがとう、お兄ちゃんっ！」"
translation = "「여기 전부터 와보고 싶었어. 고마워, 오빠아!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、大好きっ！\u3000ぎゅーっ」"
translation = "「오빠, 정말 좋아! 꾸욱」"

[[dialogue]]
speaker = "unk"
original = "笑顔で抱き着いてくるリーナ。これまで何度もあったことだけど、水着だとリーナの柔らかい感触が直に伝わってくる。"
translation = "웃으며 안겨 오는 리나. 지금까지 몇 번이나 있었던 일이지만, 수영복이니 리나의 부드러운 감촉이 직접적으로 전해져 온다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……どうしたの、お兄ちゃん？」"
translation = "「……왜 그래, 오빠?」"

[[dialogue]]
speaker = "unk"
original = "ごめん、考えごとしてた"
translation = "미안, 생각 좀 하느라"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「もう、リーナと遊びに来てるのにぃ」"
translation = "「정말, 리나랑 놀러 왔으면서어」"

[[dialogue]]
speaker = "unk"
original = "兄として振舞おうとしても、やはり異性の女の子であることを意識してしまう。"
translation = "오빠로서 행동하려 해도 역시 이성인 여자아이임을 의식하게 된다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、会長くん？」"
translation = "「어라, 회장 군?」"

[[dialogue]]
speaker = "unk"
original = "こんにちは、サーシャさん"
translation = "안녕하세요, 사샤 씨"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、この人は？\u3000……ふぅん、お兄ちゃんの学園の先輩なんだ」"
translation = "「오빠, 이 사람은? ……후웅, 오빠 학원의 선배구나」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お兄ちゃん？\u3000あ、会長くんの妹さんかしら～。私は奏サーシャよ、よろしくね～」"
translation = "「오빠? 아, 회장 군의 여동생일까나~. 나는 카나데 사샤야, 잘 부탁해~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、奇遇ね。私たちも姉妹でデートなの～」"
translation = "「후훗, 우연이네. 우리도 자매끼리 데이트 중이야~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さん姉さん、見てください！\u3000焼きたてのパンケーキが…………コホン」"
translation = "「언니 언니, 보세요! 갓 구운 팬케이크가………… 코험」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あの、これはですね、姉さんに焼きたてのパンケーキを食べてほしかっただけで、はしゃいでいるわけではありません。いいですね？」"
translation = "「저기, 이건 말이죠, 언니에게 갓 구운 팬케이크를 먹게 해주고 싶었을 뿐이지 신난 게 아닙니다. 알겠죠?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「じゃあ、お姉ちゃんのこと大好きなんだねっ！\u3000リーナもお兄ちゃんのこと大好きっ！」"
translation = "「그럼 언니를 정말 좋아하는 거네! 리나도 오빠 정말 좋아해!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いや、ちがっ……」"
translation = "「아니, 그게 아냐……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええっ、違うの？\u3000お姉ちゃんはソフィが大好きなのに、寂しいわぁ……くすん」"
translation = "「에엣, 아니야? 언니는 소피를 정말 좋아하는데, 서운해라…… 훌쩍」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ああもう、違いませんよ！\u3000そういう小芝居やめてくださいっ」"
translation = "「아아 정말, 아니지 않아요! 그런 연극 좀 그만두세요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、ごめんなさい。でもソフィがお姉ちゃんのこと大好きで嬉しいわ」"
translation = "「후훗, 미안해. 하지만 소피가 언니를 정말 좋아해 줘서 기뻐」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もう、調子がいいんですから」"
translation = "「정말, 능청스럽다니까요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あなたは初めましてですね。奏ソフィアです。よろしくお願いします」"
translation = "「당신은 처음 뵙겠네요. 카나데 소피아입니다. 잘 부탁합니다」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナは<ruby>火憑<rt>ひづき</rt></ruby>リーナだよっ！」"
translation = "「리나는 <ruby>히즈키<rt>히즈키</rt></ruby> 리나야!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんたちもスイーツがお目当てかしら？\u3000ここのスイーツはすごく美味しいから、私も驚いちゃった～」"
translation = "「회장 군 일행도 스위츠가 목적인 걸까나? 여기 스위츠 정말 맛있어서 나도 깜짝 놀랐어~」"

[[dialogue]]
speaker = "unk"
original = "このプール『チェリークルーズ』ではフードメニューにも力を入れていて、特にサランが考案したスイーツは専門店にもひけはとらない。"
translation = "이 수영장 『체리 크루즈』에서는 푸드 메뉴에도 힘을 쓰고 있으며, 특히 사란이 고안한 스위츠는 전문점에도 뒤지지 않는다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ここのパフェがとっても美味しいってレイラお姉ちゃんが言ってたから、お兄ちゃんと食べてみたかったの！」"
translation = "「여기 파르페가 아주 맛있다고 레이라 언니가 말해서 오빠랑 먹어보고 싶었어!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ほらほら、見て見て～♪\u3000レイラお姉ちゃんが撮ってくれた写真、こんなに綺麗なの♪」"
translation = "「자자, 봐봐~♪ 레이라 언니가 찍어준 사진, 이렇게 예뻐♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「このスイカがたくさんのったパフェ、グランスイカパフェって言うんだって。これをお兄ちゃんと２人で食べるんだ！」"
translation = "「이 수박이 잔뜩 올라간 파르페, 그랜드 수박 파르페라고 한대. 이걸 오빠랑 둘이서 먹을 거야!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すごいボリュームね。でもすごく美味しそう……私たちも食べる、ソフィ？」"
translation = "「엄청난 볼륨이네. 하지만 정말 맛있어 보여…… 우리도 먹을까, 소피?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんが食べたいなら買ってくればいいじゃないですか。手伝ってあげてもいいですよ」"
translation = "「언니가 먹고 싶다면 사 오면 되잖아요. 도와줄 수도 있다고요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「じゃあ決まりね。私たちで買ってくるから、ソフィとリーナちゃんは席をお願いね～」"
translation = "「그럼 결정됐네. 우리끼리 사 올 테니까 소피랑 리나짱은 자리를 맡아줘~」"

[[dialogue]]
speaker = "unk"
original = "俺とサーシャさんの２人で、売店にパフェを買いに行く。"
translation = "나와 사샤 씨 둘이서 매점에 파르페를 사러 간다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ…………行っちゃった」"
translation = "「아………… 가버렸다」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「う～～～～」"
translation = "「으~~~~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どうしたんですか？」"
translation = "「왜 그러세요?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんがサーシャさんと一緒に行っちゃった……キレイな人だし、お兄ちゃんとも仲よさそうだったし……うぅ～～～～」"
translation = "「오빠가 사샤 씨랑 같이 가버렸어…… 예쁜 사람이고 오빠랑도 사이 좋아 보였고…… 으으~~~~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ……？\u3000あ、もしかして姉さんに嫉妬しているんですか？」"
translation = "「하아……? 아, 혹시 언니를 질투하는 건가요?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「しっと？」"
translation = "「질투?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええと、私もうまく言えませんが、人を羨ましく思って、そのせいで怒りや苛立ちを感じること……でしょうか」"
translation = "「저기, 저도 잘 설명은 못 하겠지만, 남을 부럽게 생각해서 그 때문에 화나 짜증을 느끼는 것……일까요」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「いかりやいらだち……」"
translation = "「화나 짜증……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ、そうです。例えば、会長さんが知らない人と楽しそうに話していたら、イライラしたりモヤモヤしませんか？」"
translation = "「네, 맞아요. 예를 들어 회장님이 모르는 사람이랑 즐겁게 이야기하고 있으면 짜증 나거나 답답하지 않나요?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「する！\u3000すごいする！\u3000この前もおさななじみ？\u3000の人がお兄ちゃんとすっごく楽しそうにお話してた！\u3000その間、今みたいに胸が苦しかったの！」"
translation = "「나! 엄청 나! 전에도 소꿉친구? 라는 사람이 오빠랑 아주 즐겁게 이야기했어! 그때 지금처럼 가슴이 답답했어!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「分かります。私も人間界に来てすぐの時は、姉さんが知らない人と親しげに話していて、イライラしたものです。私は置いていったのに、と」"
translation = "「이해합니다. 저도 인간계에 오고 얼마 안 됐을 때는 언니가 모르는 사람이랑 친하게 이야기해서 짜증 났던 적이 있어요. 나는 내버려 두고, 라면서요」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「そうなんだ。ソフィアちゃんはそのあとどうしたの？」"
translation = "「그렇구나. 소피아짱은 그 후에 어떻게 했어?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どうというか……意地を張ってしまって、しばらくは姉さんには冷たくあたってしまいました。結局、素直に自分の気持ちを伝えて仲直りしましたが」"
translation = "「어떻게 했다기보다…… 고집을 부려서 한동안은 언니에게 차갑게 대해버렸어요. 결국 솔직하게 제 마음을 전하고 화해했지만요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「リーナさん。モヤモヤするなら、その気持ち、会長さんに伝えてみませんか？\u3000解決にはならないかもしれませんが、それでも、伝えることに意味はあると思うんです」"
translation = "「리나 씨. 답답하다면 그 마음, 회장님께 전해보지 않겠어요? 해결은 안 될지도 모르지만, 그래도 전하는 것에 의미는 있다고 생각해요」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「気持ちを伝える……お兄ちゃんに……」"
translation = "「마음을 전한다…… 오빠한테……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ、姉さんたち戻ってきましたよ。話してみたらどうですか」"
translation = "「아, 언니들이 돌아왔네요. 이야기해보는 건 어때요」"

[[dialogue]]
speaker = "unk"
original = "俺がパフェを持って戻ってくると、入れ替わるようにソフィアがサーシャさんのところに行く。"
translation = "내가 파르페를 들고 돌아오자 교대하듯이 소피아가 사샤 씨가 있는 곳으로 간다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お、お兄ちゃん。あのね……」"
translation = "「오, 오빠. 저기 말야……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お話があるの……」"
translation = "「할 말이 있어……」"

