[[dialogue]]
speaker = "unk"
original = "第２話,異世界での触れ合い・後編,P"
translation = "제2화, 이세계에서의 접촉·후편, P"

[[dialogue]]
speaker = "サチ"
original = "「陽彩さん、それでは流星市国を案内させて頂きますね」"
translation = "「아키사 씨, 그러면 유성시국을 안내해드릴게요」"

[[dialogue]]
speaker = "プリムラ"
original = "「我が美味しいチョコスイーツの店を教えてやろう！」"
translation = "「내가 맛있는 초코 디저트 가게를 가르쳐주마!」"

[[dialogue]]
speaker = "シズハ"
original = "「私も自分のお気に入りスポット、色々オススメしちゃいますよ～♪」"
translation = "「저도 제가 좋아하는 장소들, 여러 가지 추천해드릴게요~♪」"

[[dialogue]]
speaker = "陽彩"
original = "「ああ。そうだな……よろしく頼む」"
translation = "「아아. 그래…… 잘 부탁해」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナと図書館で語り合った翌日。陽彩は、サチ、プリムラ、シズハの３人に誘われて、流星市国の市街地へとやって来ていた。"
translation = "트레지안나와 도서관에서 이야기를 나눈 다음 날. 아키사는 사치, 프리뮬러, 시즈하 세 사람의 권유로 유성시국 시가지로 나와 있었다."

[[dialogue]]
speaker = "陽彩"
original = "（ぼくたちの世界には流星市国が存在していないから観光案内する――と言われて、街に連れ出されてしまった……）"
translation = "（우리 세계에는 유성시국이 존재하지 않으니 관광 안내를 하겠다――는 말을 듣고, 거리로 끌려 나와 버렸다……）"

[[dialogue]]
speaker = "陽彩"
original = "（正直あまり気は進まないから断ろうと思ったが……今回の件ではとても迷惑をかけたし、助けてもらった恩があるからな……）"
translation = "（솔직히 별로 내키지 않아서 거절하려고 했지만…… 이번 건으로는 아주 큰 폐를 끼쳤고, 도움받은 은혜가 있으니까 말이지……）"

[[dialogue]]
speaker = "unk"
original = "ちなみに、トレジアンナは異世界のゲートを開く準備をする為に、今日はアニマに協力を頼みに行っており不在だった。"
translation = "참고로, 트레지안나는 이세계 게이트를 열 준비를 하기 위해, 오늘은 아니마에게 협력을 구하러 가서 부재중이었다."

[[dialogue]]
speaker = "陽彩"
original = "（だが、困った。今日はいろはたちも居ないし、何を話せばいいかわからないぞ……）"
translation = "（하지만 곤란하군. 오늘은 이로하 일행도 없고, 무슨 이야기를 해야 할지 모르겠어……）"

[[dialogue]]
speaker = "unk"
original = "それから、サチたちに案内されて、流星市国の観光名所を歩き回ることになった陽彩。"
translation = "그러고 나서, 사치 일행의 안내로 유성시국의 관광 명소를 돌아다니게 된 아키사."

[[dialogue]]
speaker = "サチ"
original = "「――ここから見えるのが、流星市国の教皇庁になりますね。ここに来ると空気がちょっと神聖なものに変わる感じがして、私は結構好きなんです」"
translation = "「――여기서 보이는 것이 유성시국의 교황청이에요. 이곳에 오면 공기가 조금 신성하게 변하는 느낌이 들어서, 저는 꽤 좋아한답니다」"

[[dialogue]]
speaker = "陽彩"
original = "「なるほど。日本の東京の敷地内に、小さな宗教国家が存在しているというわけか……」"
translation = "「과연. 일본 도쿄의 부지 내에, 작은 종교 국가가 존재하고 있다는 건가……」"

[[dialogue]]
speaker = "陽彩"
original = "（ぼくたちの世界にも、欧州に似たような国は存在しているから、そこまで驚くようなことではない。それよりもぼくは――）"
translation = "（우리 세계에도 유럽에 비슷한 국가가 존재하니, 그렇게 놀랄 일은 아니야. 그보다 나는――）"

[[dialogue]]
speaker = "陽彩"
original = "（向こうの世界にはない星力と、リクリエに対抗するために発達した技術を多数所持している<b>学園</b>――この２つの方が興味を惹かれる、というのが正直なところだ）"
translation = "（저쪽 세계에는 없는 성력과, 리크리에에 대항하기 위해 발달한 기술을 다수 보유한 <b>학원</b>―― 이 두 가지가 더 흥미를 끈다는 게 솔직한 심정이다）"

[[dialogue]]
speaker = "プリムラ"
original = "「ここが我が認めた世界最強のチョコスイーツが食べられるカフェじゃ！」"
translation = "「이곳이 내가 인정한 세계 최강의 초코 디저트를 먹을 수 있는 카페다!」"

[[dialogue]]
speaker = "サチ"
original = "「えっと、プリムラは自分が認めたものはなんでも世界最強と言ってしまうというか……でも、本当に美味しいお店なんですよ！」"
translation = "「저기, 프리뮬러는 자기가 인정한 건 뭐든지 세계 최강이라고 말해버린달까…… 하지만, 정말 맛있는 가게예요!」"

[[dialogue]]
speaker = "シズハ"
original = "「すごく美味しいよね～♪\u3000陽彩さんはどれにします？\u3000はい、メニューをどうぞ♪」"
translation = "「정말 맛있지~♪ 아키사 씨는 어떤 걸로 하실래요? 자, 메뉴판 여기요♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「ちなみに我のオススメは、ジャンボチョコパフェじゃ！\u3000味も最強ながら、量も最強じゃぞ！」"
translation = "「참고로 나의 추천은 점보 초코 파페다! 맛도 최강이지만, 양도 최강이니라!」"

[[dialogue]]
speaker = "陽彩"
original = "「いや、ぼくはシンプルなチョコケーキでいい」"
translation = "「아니, 나는 심플한 초코 케이크면 돼」"

[[dialogue]]
speaker = "陽彩"
original = "（チョコは考えごとをするときに集中できるから、好きな方ではある。だが、味にこだわりがあるわけじゃないし、ちょっと食べられれば十分だ……）"
translation = "（초코는 생각할 때 집중할 수 있게 해주니 좋아하는 편이긴 하다. 하지만, 맛에 집착이 있는 건 아니니, 조금 먹을 수 있다면 충분해……）"

[[dialogue]]
speaker = "unk"
original = "やがて、注文したチョコレートケーキが１つテーブルに運ばれてきて、陽彩は何気なくそれを口にする。"
translation = "이윽고, 주문한 초콜릿 케이크가 테이블로 운반되어 왔고, 아키사는 아무 생각 없이 그것을 입에 담는다."

[[dialogue]]
speaker = "陽彩"
original = "「……！\u3000これ……め、滅茶苦茶美味い……！」"
translation = "「……! 이거…… 머, 엄청나게 맛있어……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「フハハハ！\u3000そうじゃろう！\u3000ここのチョコスイーツはどれも最強なのじゃ♪」"
translation = "「후하하하! 그럴 줄 알았느니라! 여기 초코 디저트는 뭐든지 최강이라니까♪」"

[[dialogue]]
speaker = "陽彩"
original = "「こんな美味しいチョコケーキを食べたのは、生まれて初めてかもしれない……！\u3000あむっ……もぐもぐ……」"
translation = "「이렇게 맛있는 초코 케이크를 먹은 건 태어나서 처음일지도 몰라……! 아음…… 우물우물……」"

[[dialogue]]
speaker = "シズハ"
original = "「陽彩さん、もう食べ終わっちゃいましたね♪\u3000またメニュー見ますか？」"
translation = "「아키사 씨, 벌써 다 드셨네요♪ 다시 메뉴판 보실래요?」"

[[dialogue]]
speaker = "陽彩"
original = "「あ……ああ。せっかくだし、もう１つ何か頼もうかな……」"
translation = "「아…… 아아. 기왕 이렇게 된 거, 하나 더 시켜볼까나……」"

[[dialogue]]
speaker = "サチ"
original = "「新星学園には、天才美食家のサラン先輩って人がいるんですけど……」"
translation = "「샛별 학원에는 천재 미식가인 사란 선배라는 분이 계시는데요……」"

[[dialogue]]
speaker = "サチ"
original = "「流星市国の飲食店は、そのサラン先輩に認められたい店主さんたちが集まってくるので、名店が多いんです」"
translation = "「유성시국의 음식점들은 그 사란 선배에게 인정받고 싶어 하는 주인분들이 모여들어서, 명점이 많답니다」"

[[dialogue]]
speaker = "シズハ"
original = "「でも、陽彩さんがようやくちょっと興味ありそうな顔をしてくれて、よかった～♪」"
translation = "「그래도 아키사 씨가 드디어 조금 흥미 있어 보이는 표정을 지어줘서 다행이다~♪」"

[[dialogue]]
speaker = "陽彩"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "シズハ"
original = "「なんか、無理やり連れ出す感じになっちゃったかなって……サチちゃんとちょっと話してたんです」"
translation = "「왠지 억지로 끌고 나온 느낌이 된 것 같아서…… 사치짱이랑 조금 이야기했거든요」"

[[dialogue]]
speaker = "サチ"
original = "「私たち、陽彩さんとも仲良くなりたくてお誘いしたんですけど……」"
translation = "「저희, 아키사 씨와도 친해지고 싶어서 초대했는데요……」"

[[dialogue]]
speaker = "サチ"
original = "「陽彩さん、本当は何か別にしたいことがあったりしますか？\u3000もしそうなら、今日は付き合わせてしまって申し訳ないなって……」"
translation = "「아키사 씨, 사실은 뭔가 따로 하고 싶은 게 있으신가요? 만약 그렇다면, 오늘은 억지로 동행하게 한 것 같아 죄송해서요……」"

[[dialogue]]
speaker = "シズハ"
original = "「こっちの世界でやりたいことがあったら、ぜひ教えて下さい！\u3000陽彩さんが『楽しい』って思ってくれることが大事なので！」"
translation = "「이쪽 세계에서 하고 싶은 일이 있다면 꼭 알려주세요! 아키사 씨가 『즐겁다』고 느껴주는 게 가장 중요하니까요!」"

[[dialogue]]
speaker = "陽彩"
original = "「……すまない。年下の女の子たちにここまで気を遣わせてしまうなんてな」"
translation = "「……미안하다. 연하의 여자아이들에게 이렇게까지 신경을 쓰게 만들다니」"

[[dialogue]]
speaker = "陽彩"
original = "「今更だが……ぼくもちゃんと自己開示しようと思う」"
translation = "「새삼스럽지만…… 나도 제대로 자기 공개를 하려고 해」"

[[dialogue]]
speaker = "陽彩"
original = "「ぼくとしては、本当は……街を観光するよりも、学園などの施設を見て回って、この世界の最先端技術に触れてみたいというのが本音なんだ……」"
translation = "「나로서는, 사실은…… 거리를 관광하는 것보다, 학원 등의 시설을 둘러보고, 이 세계의 최첨단 기술을 접해보고 싶다는 게 본심이야……」"

[[dialogue]]
speaker = "プリムラ"
original = "「なんじゃ、それならそうと早く言えばいいじゃろう！\u3000なかなか面倒なやつじゃな！」"
translation = "「뭐냐, 그렇다면 그렇다고 진작 말하면 될 것 아니냐! 꽤 번거로운 녀석이구나!」"

[[dialogue]]
speaker = "サチ"
original = "「それなら、この後は学園に戻りましょう！」"
translation = "「그렇다면 이다음엔 학원으로 돌아가요!」"

[[dialogue]]
speaker = "陽彩"
original = "「……いいのか？」"
translation = "「……괜찮겠어?」"

[[dialogue]]
speaker = "シズハ"
original = "「もちろん♪\u3000学園の最先端技術といえば――仮想結界システムとかですかね～？」"
translation = "「물론이죠♪ 학원의 최첨단 기술이라고 하면―― 가상 결계 시스템 같은 걸까요~?」"

[[dialogue]]
speaker = "陽彩"
original = "「仮想結界……？」"
translation = "「가상 결계……?」"

[[dialogue]]
speaker = "陽彩"
original = "「これが、仮想結界で再現した魔界！？」"
translation = "「이것이 가상 결계로 재현한 마계!?」"

[[dialogue]]
speaker = "陽彩"
original = "「すごい……！\u3000まるで本当にそこへ行っているかのような感覚だ！\u3000フルダイブＶＲ技術が、この世界では実用にこぎつけているのか！」"
translation = "「대단해……! 마치 정말로 그곳에 가 있는 듯한 감각이야! 풀 다이브 VR 기술이 이 세계에서는 실용화 단계에 이르렀다는 건가!」"

[[dialogue]]
speaker = "サチ"
original = "「はい。アニマ先輩という天才錬金術師が、トレジアンナさんとも協力して、星騎士が全力で訓練できるようにと最近になって完成させたんです」"
translation = "「네. 아니마 선배라는 천재 연금술사분이 트레지안나 씨와도 협력해서, 성기사가 전력으로 훈련할 수 있도록 최근에 완성하셨어요」"

[[dialogue]]
speaker = "陽彩"
original = "「しかもヘッドセット式を飛び越して、実物の体をシームレスで仮想空間内に入れているなんて……！\u3000信じられない、一体どうやっているんだ……！？」"
translation = "「게다가 헤드셋 방식을 뛰어넘어, 실제 몸을 심리스로 가상 공간 내에 넣고 있다니……! 믿을 수 없어, 대체 어떻게 하고 있는 거지……!?」"

[[dialogue]]
speaker = "サチ"
original = "「なんでも、結界星術の仕組みを応用して、結界内では体が物理的な影響を受けない、透明人間のような設定になっているとか、なんとか……？」"
translation = "「듣기로는 결계 성술의 원리를 응용해서, 결계 내에서는 몸이 물리적인 영향을 받지 않는 투명 인간 같은 설정으로 되어 있다던가, 뭐라던가……?」"

[[dialogue]]
speaker = "陽彩"
original = "「そうか……！\u3000その上から体と同位置にアバターを被せることで、実体験と変わらない戦闘訓練を再現でき、現実の体は物理的なダメージを受けないようにしているのか！」"
translation = "「그렇군……! 그 위에 몸과 같은 위치에 아바타를 씌움으로써 실체험과 다름없는 전투 훈련을 재현할 수 있고, 현실의 몸은 물리적인 대미지를 입지 않도록 한 건가!」"

[[dialogue]]
speaker = "プリムラ"
original = "「おい、シズハ。難しくて何を言ってるか、我にはよくわからんのじゃが……」"
translation = "「어이, 시즈하. 어려워서 무슨 말을 하는지 나로선 도통 모르겠느니라만……」"

[[dialogue]]
speaker = "シズハ"
original = "「うん、大丈夫！\u3000私にもよくわかってないから！」"
translation = "「응, 괜찮아! 나도 잘 모르니까!」"

[[dialogue]]
speaker = "陽彩"
original = "「ここが、あの大きなフィーニスの塔の頂上……！」"
translation = "「여기가 그 커다란 피니스의 탑 꼭대기……!」"

[[dialogue]]
speaker = "陽彩"
original = "「これが天界……！」"
translation = "「이것이 천계……!」"

[[dialogue]]
speaker = "陽彩"
original = "「すごい、すごいな！\u3000この虹の橋は一体どうなっているんだ！？\u3000ちゃんと渡れるようになっている。あとでこれも、学園の天使に話を聞きたいところだ……！」"
translation = "「대단해, 대단하군! 이 무지개 다리는 대체 어떻게 되어 있는 거지!? 제대로 건널 수 있게 되어 있어. 나중에 이것도 학원의 천사에게 이야기를 듣고 싶은데……!」"

[[dialogue]]
speaker = "サチ"
original = "「あの～、陽彩さん……？」"
translation = "「저기~, 아키사 씨……?」"

[[dialogue]]
speaker = "陽彩"
original = "「よし、ここで気になる点も、ひと通り確認してくるか……！」"
translation = "「좋아, 여기서 궁금한 점도 대강 확인하고 올까……!」"

[[dialogue]]
speaker = "unk"
original = "そうして仮想結界を解除し現実へ戻ってきた頃には、すっかり夕方になってしまっていた。"
translation = "그렇게 가상 결계를 해제하고 현실로 돌아왔을 무렵에는 어느덧 저녁이 되어버렸다."

[[dialogue]]
speaker = "プリムラ"
original = "「まさか、仮想結界で再現できる場所をひと通り歩き回ることになるとは、思わなかったのじゃ……」"
translation = "「설마 가상 결계로 재현할 수 있는 장소를 죄다 돌아다니게 될 줄은 몰랐느니라……」"

[[dialogue]]
speaker = "シズハ"
original = "「ある意味、名所巡りだったね……仮想空間だったから、体は疲れてないけど、精神的にはちょっとヘトヘトな感じ……」"
translation = "「어떤 의미에선 명소 순례였네…… 가상 공간이었으니까 몸은 피곤하지 않지만, 정신적으로는 좀 녹초가 된 느낌……」"

[[dialogue]]
speaker = "陽彩"
original = "「うぅ～、やってしまった……」"
translation = "「으으~, 저질러 버렸군……」"

[[dialogue]]
speaker = "陽彩"
original = "「まさか魔界や天界を体験できるとは思ってもみなかったから、柄にもなくはしゃいでしまった気がする…………本当にすまない」"
translation = "「설마 마계나 천계를 체험할 수 있을 거라곤 생각도 못 해서, 평소답지 않게 들떠버린 것 같아………… 정말 미안하다」"

[[dialogue]]
speaker = "サチ"
original = "「いえ、それほどまでに仮想結界を楽しんでもらえたってことですから。何よりです」"
translation = "「아니에요, 그만큼 가상 결계를 즐겨주셨다는 뜻이니까요. 다행입니다」"

[[dialogue]]
speaker = "陽彩"
original = "「……ぼくはやっぱり、周りと合わせるのが苦手だ……」"
translation = "「……나는 역시 주변에 맞추는 게 서툴러……」"

[[dialogue]]
speaker = "サチ"
original = "「苦手？」"
translation = "「서툴러?」"

[[dialogue]]
speaker = "陽彩"
original = "「ああ……ぼくは昔から、周りとは興味の引かれる対象が違っていて、話が合わなかった。だから、誰かと一緒に居ても退屈に感じることが多くて……」"
translation = "「아아…… 나는 예전부터, 남들과는 흥미를 느끼는 대상이 달라서 말이 통하지 않았어. 그래서 누군가와 함께 있어도 지루하게 느껴지는 적이 많았고……」"

[[dialogue]]
speaker = "陽彩"
original = "「いつしか、むやみに触れ合っても摩擦を起こすだけ。触れ合わなければ、摩擦など起こらなくて済む……そう考えるようになっていた」"
translation = "「어느샌가, 무턱대고 어울려봤자 마찰만 일어날 뿐. 어울리지 않으면 마찰 따위 일어날 일도 없다…… 그렇게 생각하게 되었지」"

[[dialogue]]
speaker = "陽彩"
original = "「でも……いろはたちと出会ってから、最近は他者との関わりも大事なものだと、少しずつ理解ができるようになってきたんだ……」"
translation = "「하지만…… 이로하 일행과 만나고 나서, 최근에는 타인과의 관계도 소중한 것이라고 조금씩 이해할 수 있게 되었어……」"

[[dialogue]]
speaker = "陽彩"
original = "「だから……悪かった。キミたちにまた、迷惑をかけてしまって」"
translation = "「그러니까…… 미안했다. 너희에게 또 폐를 끼쳐서」"

[[dialogue]]
speaker = "プリムラ"
original = "「でも、仮想結界は楽しめたんじゃろ？」"
translation = "「하지만, 가상 결계는 즐거웠지 않느냐?」"

[[dialogue]]
speaker = "陽彩"
original = "「ああ、もちろんだ。こんなに何かに熱中したのは久しぶりだ……」"
translation = "「아아, 물론이다. 이렇게 무언가에 열중한 건 오랜만이야……」"

[[dialogue]]
speaker = "プリムラ"
original = "「なら、許してやるのじゃ！\u3000迷惑かけたとか、暗い話は面倒じゃからな！」"
translation = "「그럼 용서해주마! 폐를 끼쳤다느니 하는 어두운 이야기는 귀찮으니까 말이다!」"

[[dialogue]]
speaker = "プリムラ"
original = "「その代わり、腹も減ったし、我はまたどこか美味い物を食べに行きたいのじゃ！」"
translation = "「그 대신 배도 고프니, 짐은 또 어딘가 맛있는 것을 먹으러 가고 싶구나!」"

[[dialogue]]
speaker = "陽彩"
original = "「……ぼくも一緒にか？」"
translation = "「……나도 같이인가?」"

[[dialogue]]
speaker = "プリムラ"
original = "「うむ。それでこの前の悪魔騒動と、今日の件はチャラじゃ！」"
translation = "「음. 그걸로 요전번의 악마 소동이랑 오늘의 건은 퉁치기로 하자!」"

[[dialogue]]
speaker = "サチ"
original = "「と、プリムラは言ってますけど、それは建前で、お腹減ってたらご飯食べに行きませんかっていう普通のお誘いです」"
translation = "「라고 프리뮬러는 말하고 있습니다만, 그건 핑계고 배고프니까 밥 먹으러 가지 않겠냐는 평범한 권유예요」"

[[dialogue]]
speaker = "プリムラ"
original = "「サチ！\u3000余計なことを言うでない！」"
translation = "「사치! 쓸데없는 소리를 하지 마라!」"

[[dialogue]]
speaker = "陽彩"
original = "「……ぼくは、キミたちが面白いと思うような話はできないぞ？」"
translation = "「……나는 너희가 재미있어할 만한 이야기는 못 한다고?」"

[[dialogue]]
speaker = "シズハ"
original = "「話題なんていくらでもありますよ！\u3000例えば……私たち、こっちの世界の魔法少女の話とか！」"
translation = "「화젯거리야 얼마든지 있어요! 예를 들면…… 저희, 이쪽 세계의 마법 소녀 이야기라든가!」"

[[dialogue]]
speaker = "陽彩"
original = "「言われてみれば……トレジアンナからも、キミたちがこれまでどんな風に活動してきたのは、詳しく聞けてなかったな……」"
translation = "「듣고 보니…… 트레지아나에게도 너희가 지금까지 어떤 식으로 활동해 왔는지는 자세히 듣지 못했군……」"

[[dialogue]]
speaker = "サチ"
original = "「陽彩さんなら、魔法少女やロストアイテムのことについて話しても大丈夫ですし……どうでしょうか？」"
translation = "「아키사 씨라면 마법 소녀나 로스트 아이템에 대해 이야기해도 괜찮으니까요…… 어떠신가요?」"

[[dialogue]]
speaker = "陽彩"
original = "「……わかった。何を食べに行くんだ？」"
translation = "「……알았다. 뭘 먹으러 가는 거지?」"

[[dialogue]]
speaker = "プリムラ"
original = "「決まりじゃな！\u3000それなら我が気に入っているハンバーグ屋を教えてやろう！\u3000その名も『ギガバーグ本舗』じゃ！」"
translation = "「결정됐구나! 그렇다면 짐이 마음에 들어 하는 함바그집을 알려주마! 그 이름도 『기가버그 본점』이니라!」"

[[dialogue]]
speaker = "陽彩"
original = "「店名からして重たそうだな……」"
translation = "「가게 이름부터가 묵직해 보이는군……」"

[[dialogue]]
speaker = "プリムラ"
original = "「なんじゃと！？\u3000ええい、騙されたと思って１度食べてみるのじゃ！」"
translation = "「뭐라느냐!? 에잇, 속는 셈 치고 한번 먹어보란 말이다!」"

[[dialogue]]
speaker = "unk"
original = "４人はその後、なんだかんだハンバーグ屋へ行き、魔法少女の話題で盛り上がるのだった。"
translation = "네 사람은 그 후, 이러니저러니 해도 함바그집에 가서 마법 소녀 화제로 꽃을 피웠다."

[[dialogue]]
speaker = "unk"
original = "――そうして、あっという間に１週間が経過し、陽彩たちが元の世界へ帰る時がやってきた。"
translation = "――그렇게 눈 깜짝할 사이에 1주일이 경과하고, 아키사 일행이 원래 세계로 돌아갈 때가 왔다."

[[dialogue]]
speaker = "陽彩"
original = "「トレジアンナ、世話になったな」"
translation = "「트레지아나, 신세 많이 졌다」"

[[dialogue]]
speaker = "unk"
original = "いろはたちが先に別れの挨拶を済ませた後、陽彩はトレジアンナと別れの握手を交わす。"
translation = "이로하 일행이 먼저 작별 인사를 마친 후, 아키사는 트레지아나와 작별의 악수를 나눈다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「いえいえ～♪\u3000お互い、それぞれの場所で頑張って行きましょう」"
translation = "「아뇨아뇨~♪ 서로 각자의 장소에서 힘내기로 해요」"

[[dialogue]]
speaker = "サチ"
original = "「陽彩さん！\u3000悪魔との戦い、いろはさんたちと一緒に頑張って下さい！」"
translation = "「아키사 씨! 악마와의 싸움, 이로하 씨 일행과 함께 힘내세요!」"

[[dialogue]]
speaker = "プリムラ"
original = "「悪魔の力に飲み込まれず、今度は制御してみせるがいい！」"
translation = "「악마의 힘에 집어삼키지 말고, 이번에야말로 제어해 보거라!」"

[[dialogue]]
speaker = "シズハ"
original = "「いろはさんたちと仲良く、自分の願いを叶えてね♪」"
translation = "「이로하 씨 일행과 사이좋게 지내며 자신의 소원을 이루길 바라요♪」"

[[dialogue]]
speaker = "陽彩"
original = "「……ああ。サチ、プリムラ、シズハ」"
translation = "「……아아. 사치, 프리뮬러, 시즈하」"

[[dialogue]]
speaker = "陽彩"
original = "「この前は……ありがとう。ハンバーグ屋での話、楽しかった」"
translation = "「요전번에는…… 고마웠다. 함바그집에서의 이야기, 즐거웠어」"

[[dialogue]]
speaker = "プリムラ"
original = "「……！\u3000ふん♪\u3000次来た時は、別の美味い店にも案内してやるのじゃ！」"
translation = "「……! 흥♪ 다음에 왔을 때는 다른 맛있는 가게로 안내해주마!」"

[[dialogue]]
speaker = "シズハ"
original = "「またきっと遊びに来てね！\u3000私も魔法少女、頑張るから！」"
translation = "「또 꼭 놀러 와! 나도 마법 소녀 열심히 할 테니까!」"

[[dialogue]]
speaker = "サチ"
original = "「陽彩さん、またいつか！\u3000この世界を変わらず守って、お待ちしてます！」"
translation = "「아키사 씨, 다음에 또 봐요! 이 세계를 변함없이 지키며 기다리고 있을게요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「陽彩さん、お元気で！\u3000またお会いしましょう♪」"
translation = "「아키사 씨, 건강하세요! 또 만나요♪」"

[[dialogue]]
speaker = "陽彩"
original = "「ああ――」"
translation = "「아아――」"

[[dialogue]]
speaker = "unk"
original = "陽彩はゲートに向けて歩き出しながら１度、振り返って。"
translation = "아키사는 게이트를 향해 걸어가다 한 번 뒤돌아보고."

[[dialogue]]
speaker = "陽彩"
original = "「みんな、またな」"
translation = "「모두들, 또 보자」"

[[dialogue]]
speaker = "unk"
original = "口元を緩めながら軽く手を振り、元の世界へと帰っていくのだった。"
translation = "입가에 미소를 띠며 가볍게 손을 흔들고 원래 세계로 돌아갔다."

