[[dialogue]]
speaker = "unk"
original = "第１１話,リクリエの衝動,B"
translation = "제11화, 리크리에의 충동, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リノ！\u3000α地点へ使徒を移送しろ！」"
translation = "「리노! α지점으로 사도를 이송해!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「はい、魔王様！\u3000空間接続──開始します！」"
translation = "「네, 마왕님! 공간 접속── 개시합니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「クラウディア！\u3000この場にいる者全員に、認識変異の魔法をかけろ！\u3000証拠を残すな！」"
translation = "「클라우디아! 이 자리에 있는 모든 이들에게 인식 변이 마법을 걸어! 증거를 남기지 마!」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「すでにやっておる──リノ！\u3000早く飛ばせ！」"
translation = "「이미 하고 있도다── 리노! 빨리 날려버려라!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「貴様たち……いったい、何を──！？」"
translation = "「네놈들…… 대체 무엇을──!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「パラレル・アクト──トランスファー！！」"
translation = "「패럴렐 액트── 트랜스퍼!!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「グ──ヌゥウゥ──！？」"
translation = "「그── 으으으──!?」"

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「……あれ？\u3000私、いったい何を……？」"
translation = "「……어라? 나 대체 뭘……?」"

[[dialogue]]
speaker = "unk"
original = "魔神ギエルを目撃したという事実を、その場にいた者はすべて忘れた。"
translation = "마신 기엘을 목격했다는 사실을 그 자리에 있던 사람들은 모두 잊었다."

[[dialogue]]
speaker_original = "流星市国民"
speaker_translation = "유성시 국민"
original = "「あ、いけない──電車に遅れちゃう！」"
translation = "「아, 안 돼── 기차 늦겠다!」"

[[dialogue]]
speaker = "unk"
original = "ここからは、ベガ世界の誰もが知らない物語。"
translation = "여기서부터는 베가 세계의 누구도 모르는 이야기."

[[dialogue]]
speaker = "unk"
original = "世界の終焉をかけた戦いが始まる──"
translation = "세계의 종언을 건 싸움이 시작된다──"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ここは……どこだ？\u3000人間界、天界、魔界……その、どこでもない……？」"
translation = "「여기는…… 어디냐? 인간계, 천계, 마계…… 그 어디도 아닌……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここは三界から隔絶された、魔女だけの世界──世界樹の<ruby>麓<rt>ふもと</rt></ruby>」"
translation = "「여기는 삼계에서 격절된 마녀들만의 세계── 세계수의 기슭」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そして希崎レイト。お前の墓場だ」"
translation = "「그리고 키자키 레토. 네 무덤이다」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「……すでにその名は捨てたのです。聞くたびに忌々しい……真なる『神』より賜った私に対する、愚弄に他ならない！」"
translation = "「……이미 그 이름은 버렸습니다. 들을 때마다 불쾌하군요…… 진정한 『신』으로부터 하사받은 나에 대한 모욕에 불과해!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「私は選ばれたのです！\u3000成り代わったのです！\u3000特別な存在に──！！」"
translation = "「나는 선택받았습니다! 다시 태어난 것입니다! 특별한 존재로──!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……特別であることに、価値なんてない。どうしてお前は気づかないんだ？」"
translation = "「……특별하다는 것에 가치 따윈 없어. 왜 넌 깨닫지 못하는 거지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「普通であることは、自由であるということだ……俺はただの人間だった頃のお前が、羨ましい」"
translation = "「평범하다는 것은 자유롭다는 뜻이다…… 난 평범한 인간이었을 적의 네가 부러워」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「黙りなさい！\u3000魔王ラクシスなどと……本当か嘘かはどうでもいい！\u3000血祭にあげてくれる！」"
translation = "「입 닥치세요! 마왕 락시스니 뭐니…… 진짜인지 가짜인지는 상관없어! 피의 축제로 만들어 주마!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──間に合ったか。魔王、準備はいいか」"
translation = "「──늦지 않았나 보군. 마왕, 준비는 됐느냐」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。修行の成果を今こそ見せる」"
translation = "「아아. 수행의 성과를 지금이야말로 보여주겠어」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……拾い上げてから今この時まで、できうる限りの薫陶をお前に授けてきた」"
translation = "「……거두어들인 후 지금까지, 할 수 있는 모든 훈도를 네게 전수해 왔다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「行け。使徒を圧倒してみせろ」"
translation = "「가라. 사도를 압도해 보여라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、見ていてくれ！\u3000あなたが育てた息子の、最初で最後の晴れ舞台を！！」"
translation = "「아아, 지켜봐 줘! 당신이 키운 아들의 처음이자 마지막 화려한 무대를!!」"

[[dialogue]]
speaker = "unk"
original = "今の俺に、かつての霊力は存在しない。手にしているのは、数年前に守護星となった地球の星力。"
translation = "지금의 내게 과거의 영력은 존재하지 않는다. 손에 쥔 것은 몇 년 전 수호성이 된 지구의 성력."

[[dialogue]]
speaker = "unk"
original = "母さんから施された地獄の戦闘訓練……全身で骨折したことのない箇所など存在しないほどに痛めつけ、今わの際を何度さ迷ったか。"
translation = "엄마로부터 받은 지옥의 전투 훈련…… 온몸에 골절되지 않은 곳이 없을 정도로 몰아붙여 죽음의 문턱을 몇 번이나 헤맸던가."

[[dialogue]]
speaker = "unk"
original = "そのたびに治癒の魔法を施されて息を吹き返す。その過程で、星力総量をじわりじわりと伸ばし続けた。"
translation = "그때마다 치유 마법을 받아 숨을 몰아쉬었다. 그 과정에서 성력 총량을 조금씩 조금씩 늘려왔다."

[[dialogue]]
speaker = "unk"
original = "単純な星力だけなら、俺は新星の星徒会長の５倍以上──そして星力だけじゃない。"
translation = "단순한 성력만이라면 난 신성 성도회장의 5배 이상── 그리고 성력뿐만이 아니다."

[[dialogue]]
speaker = "unk"
original = "俺にはネビュラの魔女たちから借り受けた──人間でありながら行使できる、<ruby>模造品<rt>デッドコピー</rt></ruby>の魔法の力がある！！"
translation = "내게는 네뷸라의 마녀들에게 빌려온── 인간이면서도 행사할 수 있는 <ruby>모조품<rt>데드 카피</rt></ruby>의 마법의 힘이 있다!!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ツェツィーリエ！\u3000俺に施した模造魔導術式──１３番まで全て解除しろ！！」"
translation = "「체칠리에! 내게 시술한 모조 마도 술식── 13번까지 전부 해제해!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ラジャー♪\u3000対リクリエ決戦兵器のお披露目だねぇ……凍結解除っ！」"
translation = "「라져♪ 대 리크리에 결전 병기의 피로연이네…… 동결 해제!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ネビュラ総員──ロッドを掲げろ！\u3000魔力を、魔王へありったけ送り込むのだ！！」"
translation = "「네뷸라 전원── 로드를 들어라! 마력을 마왕에게 있는 대로 쏟아부어라!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────────ッ！！！！」"
translation = "「────────윽!!!!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「何だ、貴様……髪の色が、半分だけ、白く……！？」"
translation = "「뭐냐, 네놈…… 머리카락 색이 반만 하얗게……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「霊力が扱えれば……かつての魔王の力も使えた。でもそれが叶わない以上……別のモノで補うしかないからな」"
translation = "「영력을 다룰 수 있다면…… 과거 마왕의 힘도 쓸 수 있었어. 하지만 그게 불가능한 이상…… 다른 것으로 보충할 수밖에 없으니까」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「魔神を舐めすぎではないですか！？\u3000その程度のブーストで、私に敵うわけが──」"
translation = "「마신을 너무 얕보는 것 아닙니까!? 그 정도 부스트로 나를 이길 수 있을 리가──」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ぬ──がっ！？\u3000何だ、今の拳の攻撃……どこからだ！？」"
translation = "「으── 컥!? 뭐야, 방금 그 주먹 공격…… 어디서 날아온 거냐!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「<ruby>陽炎<rt>かげろう</rt></ruby>の魔女・カヤの隠蔽魔法。簡単に言えばステルスだ──不可視の俺が、お前の周囲を包囲している」"
translation = "「아지랑이의 마녀 카야의 은폐 마법. 쉽게 말해 스텔스다── 보이지 않는 내가 너의 주위를 포위하고 있어」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ご、ぉっ──！？\u3000馬鹿な、増えている！？\u3000なぜだ、なぜ──」"
translation = "「커, 헉──!? 말도 안 돼, 늘어나고 있어!? 왜냐, 어째서──」"

[[dialogue]]
speaker = "unk"
original = "<ruby>水鏡<rt>すいきょう</rt></ruby>の魔女・ウェンディの複製魔法を、不可視の俺に重ね掛けした。ヤツの周囲には今、<b>目に映らない俺の複製体が７人いる</b>。"
translation = ""

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──燃えろ、骨の芯まで」"
translation = "「──타올라라, 뼛속까지」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ヌ──ガァァアアアァッ！？」"
translation = "「으── 아아아아악!?」"

[[dialogue]]
speaker = "unk"
original = "母さんの焔を宿した、灼熱の拳打。ダメージの通りはこれが１番良さそうだ。"
translation = "엄마의 불꽃을 품은 작열하는 권격. 데미지가 들어가는 건 이게 제일 좋아 보인다."

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「消え失せろ──マクロ・ノヴァ・ブラスト！！！」"
translation = "「사라져라── 마크로 노바 블래스트!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「パラレル・アボイド──！」"
translation = "「패럴렐 어보이드──!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「なッ──！？」"
translation = "「뭐──!?」"

[[dialogue]]
speaker = "unk"
original = "敵の攻撃はすべて、リノの空間魔法を応用して位相をずらす──技の規模から見て、１撃でも当たれば俺たちは跡形もないだろう。"
translation = "적의 공격은 모두 리노의 공간 마법을 응용해 위상을 어긋나게 한다── 기술의 규모로 보아 한 방이라도 맞으면 우린 흔적도 남지 않겠지."

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「なんだ──貴様は、なんなんだ──！！？？」"
translation = "「뭐냐── 네놈은 대체 뭐란 말이냐!!??」"

[[dialogue]]
speaker = "unk"
original = "拳から衝撃波を放つ──これはリーリアの『魔弾』の応用。"
translation = "주먹에서 충격파를 방출한다── 이것은 리리아의 『마탄』의 응용."

[[dialogue]]
speaker = "unk"
original = "７人の俺を正確無比に動かすこの力は、マリオンの『人形縫製』。"
translation = "7명의 나를 정확무비하게 움직이는 이 힘은 마리온의 『인형 봉제』."

[[dialogue]]
speaker = "unk"
original = "全身に外科手術で埋め込んだ魔力を内包した宝石──これによって後天的に魔法を発動するのが、今の俺の全力だ！！"
translation = "전신에 외과 수술로 심은 마력을 내포한 보석── 이것에 의해 후천적으로 마법을 발동하는 것이 지금 나의 전력이다!!"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「イヤダ──ヤメロ──私ハヨウヤク──超越シタ者ニ、成レタ、ノニ──！？」"
translation = "「싫어── 그만둬── 나는 드디어── 초월한 자가 될 수 있었는데──!?」"

[[dialogue]]
speaker = "unk"
original = "無数の拳打の嵐で魔神を圧倒し──"
translation = "무수한 권격의 폭풍으로 마신을 압도하고──"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ギ──ァ──ァアァアアアアアァ────ッッッッ！？！？」"
translation = "「기── 아── 아아아아아아아────!!!!????」"

[[dialogue]]
speaker = "unk"
original = "彼の体内から飛び出てきた、暗黒の宝玉に手を伸ばす──"
translation = "그의 체내에서 튀어나온 암흑의 보옥에 손을 뻗는다──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それが<ruby>核<rt>コア</rt></ruby>だ──逃すな！！」"
translation = "「그게 <ruby>핵<rt>코어</rt></ruby>이다── 놓치지 마라!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ディマイズ──ブレイカー────ッ！！！！！」"
translation = "「디마이즈── 브레이커─────!!!!」"

[[dialogue]]
speaker = "unk"
original = "宝玉を打ち砕くと魔神ギエル──希崎レイトは、その場に倒れこむ。そして、うぞうぞと湧き出てくるのは……リクリエの瘴気！"
translation = "보옥을 때려 부수자 마신 기엘── 키자키 레토는 그 자리에 쓰러졌다. 그리고 꾸역꾸역 솟아 나오는 것은…… 리크리에의 장기!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん。後は頼んだ──」"
translation = "「엄마. 나머지는 부탁해──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「…………ああ」"
translation = "「…………아아」"

[[dialogue]]
speaker = "unk"
original = "俺はリクリエの瘴気を封じる器として、自らを差し出す。"
translation = "나는 리크리에의 장기를 봉인할 그릇으로서 자신을 내던진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全て呑みこんでやる──俺に従え、リクリエ────！！！！」"
translation = "「전부 삼켜주마── 나를 따라라, 리크리에────!!!!」"

[[dialogue]]
speaker = "unk"
original = "暴れ狂う瘴気を全て体内に取り込む──その実感と共に。"
translation = "미쳐 날뛰는 장기를 전부 체내로 받아들인다── 그 실감과 함께."

[[dialogue]]
speaker = "unk"
original = "俺の意識は、そこで途絶えた────"
translation = "나의 의식은 거기서 끊어졌다────"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "そして、それから１週間後。"
translation = "그리고 그로부터 일주일 후."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「──やっぱり兄さんって色々と規格外ですよね～」"
translation = "「──역시 오빠는 여러모로 규격 외라니까요~」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「出鱈目すぎるよねえ、魔王ちゃん。まさかこんなにもあっさり、リクリエの瘴気を封じ込めちゃうだなんてさー♪」"
translation = "「엉망진창이라니까, 마왕 짱. 설마 이렇게나 싱겁게 리크리에의 장기를 봉인해 버릴 줄이야~♪」"

[[dialogue]]
speaker = "unk"
original = "ギエルを創り変えたあのリクリエの瘴気を、俺という器に呑み込んで１週間が経った。"
translation = "기엘을 창조했던 그 리크리에의 장기를 나라는 그릇에 삼킨 지 일주일이 지났다."

[[dialogue]]
speaker = "unk"
original = "拍子抜けするほどにあっさりと、それは俺のコントロール下に収まっていた。"
translation = "허무할 정도로 싱겁게 그것은 내 통제하에 들어와 있었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「まあ余はわかっておったぞ。お兄はリクリエなんぞに負けんことくらいな！」"
translation = "「뭐 짐은 알고 있었도다. 오빠가 리크리에 따위에게 지지 않을 것 정도는 말이다!」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「……安心はできない。長官が元老会を説得できるかも不明」"
translation = "「……안심할 순 없어. 장관님이 원로회를 설득할 수 있을지도 불명」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「全員、揃っているな」"
translation = "「전원 모였군」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「セドナ！\u3000どうだったのだ、あの石頭たちの説得は！？」"
translation = "「세도나! 어땠느냐, 그 돌머리 녀석들의 설득은!?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「…………経過観察ということで、承諾を取り付けました」"
translation = "「…………경과 관찰이라는 것으로 승낙을 받아냈습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「本当に！？」"
translation = "「정말!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「元老会にとっても、魔王様がいなくなるのは痛手という結論に至ったみたい……！」"
translation = "「원로회에게도 마왕님이 없어지는 건 큰 손실이라는 결론에 도달한 모양이에요……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そもそもリクリエをコントロールできないという判断から、魔王を再封印するという結論を出していたからな……」"
translation = "「애초에 리크리에를 컨트롤할 수 없다는 판단하에 마왕을 재봉인한다는 결론을 내렸었으니까……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「瘴気を抑えられている以上、<ruby>封理再誕<rt>レナトゥス</rt></ruby>はしなくていい。ヴォイド・プランはいったん凍結する。それが元老会の結論だ」"
translation = "「장기를 억제하고 있는 이상 <ruby>봉리재탄<rt>레나투스</rt></ruby>는 하지 않아도 돼. 보이드 플랜은 일단 동결한다. 그것이 원로회의 결론이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………そっか」"
translation = "「…………그렇구나」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、俺は──"
translation = "그럼 난──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………っ」"
translation = "「…………윽」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魔王様……泣いて……？」"
translation = "「마왕님…… 울고 계세요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺……まだ、みんなと一緒に、いられるんだな……」"
translation = "「나…… 아직 다들하고 같이 있을 수 있는 거구나……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……兄さん」"
translation = "「……오빠」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よかった……本当に……よかった…………」"
translation = "「다행이다…… 정말로…… 다행이야…………」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……お前には、再誕してからずっと不自由を強いてきた。辛い日々だっただろう」"
translation = "「……너에게는 재탄하고 나서 줄곧 부자유를 강요해 왔다. 괴로운 나날이었겠지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「息子よ──何がしたい？\u3000母が、何でも叶えてやる」"
translation = "「아들아── 무엇이 하고 싶으냐? 에미가 뭐든 들어주마」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………学園に、また行きたい。今度はスパイじゃなくて……ただの学生として……」"
translation = "「…………학원에 다시 가고 싶어. 이번엔 스파이가 아니라…… 그냥 학생으로서……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……ああ」"
translation = "「……그래」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「友達をたくさん作って……放課後に遊んでさ……」"
translation = "「친구도 많이 사귀고…… 방과 후에 놀고……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「部活動とか、委員会とか……ああ、そうだ。アルバイトとかも、してみたいな……」"
translation = "「동아리 활동이나 위원회 같은 거…… 아, 맞다. 아르바이트 같은 것도 해보고 싶어……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「全て叶えてやる。だからもう泣くな。よく頑張ったな──クロト」"
translation = "「전부 들어주마. 그러니 이제 울지 마라. 정말 잘해주었다── 크로토」"

[[dialogue]]
speaker = "unk"
original = "──クロト。そうか。そうだよな。"
translation = "──크로토. 그렇구나. 그렇지."

[[dialogue]]
speaker = "unk"
original = "普通の人間として暮らしていけるんだったら、俺は『緋宮クロト』なんだ──"
translation = "평범한 인간으로 살아갈 수 있다면 난 『히노미야 크로토』인 거야──"

[[dialogue]]
speaker = "unk"
original = "これから始まるんだ。俺がずっと望んでいた、平和で、平凡な日常が……！"
translation = "이제부터 시작되는 거야. 내가 줄곧 원해왔던 평화롭고 평범한 일상이……!"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魔王様。また新星学園のパンフレットを見てるんですか？」"
translation = "「마왕님. 또 신성학원 팜플렛을 보고 계신가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。部活動、すごい数でさ！\u3000どれに入ろうかなって」"
translation = "「아아. 동아리 활동 수가 엄청나서! 어디에 들어갈까 해서」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んー。だったらボランティア部とかいいんじゃないですか？」"
translation = "「음~. 그렇다면 봉사부 같은 거 괜찮지 않아요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんで？」"
translation = "「왜?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えー。だって兄さんに片想いしてる、天使のお姫様がいるところじゃないですか～♪」"
translation = "「에이~ 그야 오빠를 짝사랑하는 천사 공주님이 있는 곳이잖아요~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょぉ！？」"
translation = "「잠까아!?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「はぇ！？\u3000魔王様、ど、どど、どういうことですかっ！？\u3000私というものがありながら！\u3000やっぱり若い女の子がいいんですかぁ！？」"
translation = "「하에!? 마왕님, 어, 어어, 어떻게 된 건가요!? 저라는 사람이 있는데도! 역시 젊은 여자가 좋은 건가요!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーリア……お前、どうしてそういう！」"
translation = "「리리아…… 너 어떻게 그런 소리를!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あははは！\u3000おっもしろ～い♪」"
translation = "「아하하하! 재밌어라~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────っ？」"
translation = "「────윽?」"

[[dialogue]]
speaker = "unk"
original = "なんだ、今の。"
translation = "뭐지, 방금."

[[dialogue]]
speaker = "unk"
original = "────────セ。"
translation = "────────워."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魔王様、どうかしましたか？」"
translation = "「마왕님, 무슨 일 있으세요?」"

[[dialogue]]
speaker = "unk"
original = "今の<b>美しい</b>光景はなんだ。何を見たんだ、俺は。"
translation = "방금 그 <b>아름다운</b> 광경은 뭐지. 뭘 본 거지, 난."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（…………美しい？\u3000そんな、馬鹿な）"
translation = "（…………아름다워? 그럴 리가）"

[[dialogue]]
speaker = "unk"
original = "全てが壊れた世界。死に絶えた世界──あれが美しいわけが──"
translation = "모든 것이 부서진 세계. 죽어버린 세계── 저게 아름다울 리가──"

[[dialogue]]
speaker = "unk"
original = "壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ──"
translation = "부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라──"

[[dialogue]]
speaker = "unk"
original = "リクリエが命じている────"
translation = "리크리에가 명령하고 있다────"

[[dialogue]]
speaker = "unk"
original = "滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ──"
translation = "멸망시켜라멸망시켜라멸망시켜라멸망시켜라멸망시켜라멸망시켜라멸망시켜라──"

[[dialogue]]
speaker = "unk"
original = "いや、違う──俺自身が、あの光景を起こしたくて、仕方がない。そう思っている──"
translation = "아니, 틀려── 나 자신이 저 광경을 일으키고 싶어서 견딜 수가 없어. 그렇게 생각하고 있어──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「兄さん……？」"
translation = "「오빠……?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魔王様……？」"
translation = "「마왕님……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぅあ、あぁあ、ぁぁぁぁっ──！？！？！？！？」"
translation = "「으아, 아아, 아아아아──!?!?!?!?!?」"

[[dialogue]]
speaker = "unk"
original = "壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ──"
translation = "부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라부숴라──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「離れろっ！\u3000俺から、今すぐ離れてくれ！！！」"
translation = "「떨어져! 나한테서 당장 떨어지라고!!!」"

[[dialogue]]
speaker = "unk"
original = "さもないと──"
translation = "안 그러면──"

[[dialogue]]
speaker = "unk"
original = "滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ──"
translation = "멸망시켜라멸망시켜라멸망시켜라멸망시켜라멸망시켜라멸망시켜라멸망시켜라──"

[[dialogue]]
speaker = "unk"
original = "<size=50>────みんなを、\n\u3000\u3000\u3000\u3000殺してしまう！！！！</size>"
translation = "<size=50>────모두를,\n\u3000\u3000\u3000\u3000죽여버리고 말 거야!!!!</size>"

[[dialogue]]
speaker = "unk"
original = "とても、静かだ。"
translation = "아주 고요하다."

[[dialogue]]
speaker = "unk"
original = "──なんで？"
translation = "──왜?"

[[dialogue]]
speaker = "unk"
original = "誰も、動かないから。"
translation = "아무도 움직이지 않으니까."

[[dialogue]]
speaker = "unk"
original = "──どうして？"
translation = "──어째서?"

[[dialogue]]
speaker = "unk"
original = "俺が、１人残らず──この手で■したからだ。"
translation = "내가 단 한 명도 남김없이── 이 손으로 ■했으니까."

[[dialogue]]
speaker = "unk"
original = "妹も、姉も、友人も、母も──恋人も。"
translation = "여동생도, 누나도, 친구도, 엄마도── 연인도."

[[dialogue]]
speaker = "unk"
original = "みんなみんなみんなみんなみんなみんなみんなみんなみんなみんな──"
translation = "모두모두모두모두모두모두모두모두모두모두──"

[[dialogue]]
speaker = "unk"
original = "俺が俺が俺が俺が俺が俺が俺が俺が俺が俺が俺が俺が俺が俺が俺が──"
translation = "내가내가내가내가내가내가내가내가내가내가내가내가내가내가내가──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うああああぁぁぁああああああああ！？！？！？！？！？」"
translation = "「으아아아아아아아아아아아아아아아!?!?!?!?!?!?!?」"

[[dialogue]]
speaker = "unk"
original = "俺が■した！\u3000俺が■した！！！\u3000俺が俺が俺が俺が俺が──！！！"
translation = "내가 ■했다! 내가 ■했다!!! 내가내가내가내가내가──!!!"

[[dialogue]]
speaker = "unk"
original = "どうすればいい！？\u3000どうすれば償える！？\u3000どうすればもう一度、みんなに──会えるんだ────！？"
translation = "어떡해야 해!? 어떡해야 보상할 수 있지!? 어떡해야 다시 한번 모두를── 만날 수 있는 거야────!?"

[[dialogue]]
speaker = "unk"
original = "──やり直せばいい。"
translation = "──다시 시작하면 돼."

[[dialogue]]
speaker = "unk"
original = "──創るなら、まず壊す。"
translation = "──만들려면 먼저 부순다."

[[dialogue]]
speaker = "unk"
original = "──それが世界の理。<ruby>再創生<rt>リ・クリエイション</rt></ruby>。"
translation = "──그것이 세계의 이치. <ruby>재창생<rt>리 크리에이션</rt></ruby>."

[[dialogue]]
speaker = "unk"
original = "──全ての世界が無に帰すれば、お前は再び、愛しい者達と巡り合うことができるだろう。"
translation = "──모든 세계가 무로 돌아가면 넌 다시 사랑하는 자들과 만날 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "──そうか。"
translation = "──그런가."

[[dialogue]]
speaker = "unk"
original = "────世界を壊して、やり直せば。"
translation = "────세계를 부수고 다시 시작하면."

[[dialogue]]
speaker = "unk"
original = "──────みんなに会えるんだな？"
translation = "──────모두를 만날 수 있는 거구나?"

[[dialogue]]
speaker = "unk"
original = "──壊す。滅ぼす。"
translation = "──부순다. 멸망시킨다."

[[dialogue]]
speaker = "unk"
original = "────目につく全ての命を、この手で残さず刈り取る。"
translation = "────눈에 띄는 모든 생명을 이 손으로 남김없이 베어 넘긴다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「緋宮、くん？\u3000どうしたの……怖い顔、して……？」"
translation = "「히노미야 군? 왜 그래…… 무서운 얼굴을 하고……?」"

[[dialogue]]
speaker = "unk"
original = "──誰だ、この子。"
translation = "──누구지, 이 애."

[[dialogue]]
speaker = "unk"
original = "────知らない子だな。"
translation = "────모르는 애로군."

[[dialogue]]
speaker = "unk"
original = "──世界の刷新のために、魔王の血統は邪魔だ。"
translation = "──세계의 쇄신을 위해 마왕의 혈통은 방해된다."

[[dialogue]]
speaker = "unk"
original = "──そうなのか。"
translation = "──그런가."

[[dialogue]]
speaker = "unk"
original = "──魔王の器は全て根絶やしにしなくてはならない。"
translation = "──마왕의 그릇은 모두 뿌리 뽑아야 한다."

[[dialogue]]
speaker = "unk"
original = "──世界を滅ぼすために、最も効率のいい姿をイメージしろ。"
translation = "──세계를 멸망시키기 위해 가장 효율적인 모습을 이미지해라."

[[dialogue]]
speaker = "unk"
original = "──破壊の化身へと姿を変えるのだ。"
translation = "──파괴의 화신으로 모습을 바꾸는 거다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「にげ……ろ…………め……る……え……」"
translation = "「도망……쳐…………메……르……엘……」"

[[dialogue]]
speaker = "unk"
original = "──何を言っているんだ、俺は。"
translation = "──무슨 말을 하고 있는 거야, 나는."

[[dialogue]]
speaker = "unk"
original = "──全てを壊さなければ、みんなに会えないだろう？"
translation = "──모든 것을 부수지 않으면, 모두를 만날 수 없잖아?"

[[dialogue]]
speaker = "unk"
original = "──さぁ行け。魔王ラクシス。お前は招かれるべき……"
translation = "──자, 가라. 마왕 락시스. 너는 초대받아야 할……"

[[dialogue]]
speaker = "unk"
original = "──厄災の化身である。"
translation = "──재앙의 화신이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ガ、ァ──ァァアアアァァア────！！！」"
translation = "「가, 아──아아아아아아아────!!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「この力は……リクリエ！？\u3000それと、魔王の、力──！！」"
translation = "「이 힘은…… 리크리에!? 게다가, 마왕의, 힘──!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「緋宮くんは……私と同じ、魔王の……！？」"
translation = "「히노미야 군은…… 나와 같은, 마왕의……!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（ダメ……私の力じゃ、この“手”は止められない……。力の差がありすぎる）"
translation = "(안 돼…… 내 힘으론, 이 “손”을 멈출 수 없어……. 힘의 차이가 너무 커)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（でも、この“手”の正体が緋宮くんで──魔王の器なら、<b>私のアルケインコード</b>が通用する！）"
translation = "(하지만, 이 “손”의 정체가 히노미야 군이고── 마왕의 그릇이라면, <b>나의 아르케인 코드</b>가 통할 거야!)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（きっと私は、ここで死ぬ……。だけどいつか、誰かがこの強大な魔王を救ってくれるなら──）"
translation = "(분명 나는 여기서 죽겠지……. 하지만 언젠가, 누군가 이 강대한 마왕을 구해준다면──)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そう考えたら、これはきっと終わりじゃないから──だから、怖くないよ」"
translation = "「그렇게 생각하면, 이건 분명 끝이 아니니까── 그러니까, 무섭지 않아」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「今ではない、いつかの勝利……いつかの平和のために、礎になる」"
translation = "「지금이 아닌, 언젠가의 승리…… 언젠가의 평화를 위해, 초석이 되겠어」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「姫として生かされてきた私の使命は、今この時のためだって、わかったから──」"
translation = "「공주로서 살아온 나의 사명은, 지금 이 순간을 위해서였다는 걸 알았으니까──」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「緋宮くん……ううん、クロトくん！\u3000行くよ！！」"
translation = "「히노미야 군…… 아니, 쿠로토 군! 간다!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──アルケインカオスクエーサー！！！」"
translation = "「──아르케인 카오스 퀘이서!!!」"

[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "滅亡が具現していた。"
translation = "멸망이 구현되어 있었다."

[[dialogue]]
speaker = "unk"
original = "“<ruby>世界の再創生<rt>リ・クリエイション</rt></ruby>”を命じられた少年は既に<ruby>魔王の器<rt>エリシア、メルエル</rt></ruby>さえ取り込み、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。"
translation = "“<ruby>세계의 재창생<rt>리 크리에이션</rt></ruby>”을 명받은 소년은 이미 <ruby>마왕의 그릇<rt>엘리시아, 멜엘</rt></ruby>마저 집어삼키고, 퇴폐한 황야를 여전히 끝나지 않는 폭거에 휘말리게 한다."

[[dialogue]]
speaker = "unk"
original = "創るなら、まず壊す。"
translation = "창조하려면, 우선 부순다."

[[dialogue]]
speaker = "unk"
original = "単純な道理であっても、それが億万の力で実行されれば世界はひとたまりもない。"
translation = "단순한 도리일지라도, 그것이 억만의 힘으로 실행되면 세계는 견뎌낼 재간이 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グ……オ……ギ……ギギ……ガ……ゴ……ググ……」"
translation = "「그…… 오…… 기…… 기기…… 가…… 고…… 구구……」"

[[dialogue]]
speaker = "unk"
original = "破壊の化身が唸りを上げる。"
translation = "파괴의 화신이 울부짖는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「立て、フィオナ！\u3000動け！\u3000逃げろっ！！」"
translation = "「일어나, 피오나! 움직여! 도망쳐!!」"

[[dialogue]]
speaker = "unk"
original = "残された最後の芽を摘むべく、絶望の黒き<ruby>腕<rt>かいな</rt></ruby>が<ruby>颶風<rt>ぐふう</rt></ruby>とともに迸った。"
translation = "남겨진 마지막 싹을 꺾기 위해, 절망의 검은 팔이 강풍과 함께 뿜어져 나왔다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（ごめん、エリシア──私のせいで）"
translation = "(미안해, 엘리시아── 나 때문에)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「フィオナ！\u3000フィオナーーーーーッ！！！」"
translation = "「피오나! 피오나아아아아아아아!!!」"

[[dialogue]]
speaker = "unk"
original = "世界が１つ滅んだ。"
translation = "세계가 하나 멸망했다."

[[dialogue]]
speaker = "unk"
original = "それもまた、女神すら超える秩序によって定められた運命──"
translation = "그것 또한, 여신조차 초월한 질서에 의해 정해진 운명──"

