[[dialogue]]
speaker = "unk"
original = "新星学園１年生で、周囲には秘密でＶチューバーとして活動している『<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカ』。"
translation = "신성학원 1학년으로 주변에는 비밀로 하고 버츄얼 유튜버로 활동하고 있는 『우미노베 루루카』."

[[dialogue]]
speaker = "unk"
original = "彼女はバレンタイン配信のネタ探しを兼ねて、友人のリーリアやアナが暮らす新星寮へと取材に訪れたところだった。"
translation = "그녀는 발렌타인 방송 소재 찾기를 겸해 친구인 리리아나 아나가 사는 신성료로 취재를 온 참이었다."

[[dialogue]]
speaker = "unk"
original = "トワは、イクシリオンのスランプの部分だけを伏せて、それ以外の事情をルルカに説明する。"
translation = "토와는 익실리온의 슬럼프 부분만 빼고 그 외의 사정을 루루카에게 설명한다."

[[dialogue]]
speaker = "トワ先生"
original = "「――そんな感じで、ここ１週間ずっとチョコ作りに苦戦してるんだ」"
translation = "「――그런 느낌으로 요 1주일 동안 계속 초콜릿 만들기에 고전하고 있어.」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふむふむ、なるほど～。だったら……あたしも一緒に作ってみてもいいですか？\u3000お兄ちゃんに贈るチョコを作る予定だったんで、一石二鳥ですし♪」"
translation = "「흠흠, 그렇군요~. 그렇다면…… 저도 같이 만들어 봐도 될까요? 오빠에게 줄 초콜릿을 만들 예정이었으니까 일석이조이기도 하고요♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ですが、先ほど説明した通り、私と一緒に作業をすると、ルルカさんまで巻き込んでしまう可能性が……！」"
translation = "「하지만 방금 설명드린 대로 저와 함께 작업하면 루루카 씨까지 휘말리게 할 가능성이……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「大丈夫だよ♪\u3000同じ１年生だし、困ってるなら助け合わなきゃ！\u3000それにね――」"
translation = "「괜찮아♪ 같은 1학년이고 곤란해하고 있다면 서로 도와야지! 그리고 말야――」"

[[dialogue]]
speaker = "ルルカ"
original = "「今の話を聞いて、ちょっと思いついたんです。もしかしたら、あたしなら解決できるかもって♪」"
translation = "「방금 이야기를 듣고 좀 생각난 게 있어요. 어쩌면 저라면 해결할 수 있을지도 몰라요♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "unk"
original = "そうしてルルカも加わり、３人で再びチョコ作りを始めた。するとまもなく、イクシリオンの体が再び光り始める。"
translation = "그렇게 루루카도 합류하여 셋이서 다시 초콜릿 만들기를 시작했다. 그러자 곧 익실리온의 몸이 다시 빛나기 시작한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「！\u3000ルルカさん、やはり私のバレンタインフォームが反応してます！\u3000気を付けて下さい！」"
translation = "「! 루루카 씨, 역시 제 발렌타인 폼이 반응하고 있어요! 조심하세요!」"

[[dialogue]]
speaker = "ルルカ"
original = "「うん、わかった！\u3000よ～し――」"
translation = "「응, 알았어! 좋~아――」"

[[dialogue]]
speaker = "unk"
original = "ルルカは落ち着いた表情で、イクシリオンの力の余波を受け止める。そして――"
translation = "루루카는 차분한 표정으로 익실리온의 힘의 여파를 받아낸다. 그리고――"

[[dialogue]]
speaker = "ルルカ"
original = "「変身！」"
translation = "「변신!」"

[[dialogue]]
speaker = "ルルカ"
original = "「――これが、あたしのバレンタインフォーム……！」"
translation = "「――이게 내 발렌타인 폼……!」"

[[dialogue]]
speaker = "unk"
original = "光が収まると、トワと同じようにルルカも、バレンタインフォームへと姿を変えていた。"
translation = "빛이 잦아들자 토와와 마찬가지로 루루카도 발렌타인 폼으로 모습을 바꾸고 있었다."

[[dialogue]]
speaker = "ルルカ"
original = "（やっぱり……衣装のイメージは、ルカルカのバレンタイン配信用にデザインしたやつが反映されてる。うん、この感じなら――！）"
translation = "(역시…… 의상 이미지는 루카루카의 발렌타인 방송용으로 디자인한 게 반영되어 있어. 응, 이 느낌이라면――!)"

[[dialogue]]
speaker = "トワ先生"
original = "「ルルカちゃん、それじゃあこのままチョコ作りを続けるよ！\u3000準備はいい？」"
translation = "「루루카 양, 그럼 이대로 초콜릿 만들기를 계속할게! 준비됐어?」"

[[dialogue]]
speaker = "ルルカ"
original = "「はい、トワちゃん先生！\u3000大丈夫です！」"
translation = "「네, 토와짱 선생님! 괜찮아요!」"

[[dialogue]]
speaker = "unk"
original = "視線を交わし、頷き合う３人。再びチョコ作りを始めていく。"
translation = "시선을 교환하며 고개를 끄덕이는 세 사람. 다시 초콜릿 만들기를 시작해 나간다."

[[dialogue]]
speaker = "unk"
original = "――やがて、調理を続けているルルカの前に、クロトが姿を現した。"
translation = "――이윽고 조리를 계속하고 있는 루루카 앞에 쿠로토가 모습을 드러냈다."

[[dialogue]]
speaker = "クロト"
original = "「あれ？\u3000ルルカじゃないか。新星寮のキッチンで何を作ってるんだ？」"
translation = "「어라? 루루카잖아. 신성료 주방에서 뭘 만들고 있는 거야?」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、お兄ちゃん！\u3000実はね、あたし、お兄ちゃんに渡すチョコを作ってるの♪」"
translation = "「앗, 오빠! 실은 말야, 나 오빠한테 줄 초콜릿을 만들고 있어♪」"

[[dialogue]]
speaker = "クロト"
original = "「本当か？\u3000嬉しいな。どんなチョコを作ってくれるんだ？」"
translation = "「정말? 기쁜걸. 어떤 초콜릿을 만들어 주는 거야?」"

[[dialogue]]
speaker = "ルルカ"
original = "「う～ん、それは――バレンタイン当日まで秘密っ♪」"
translation = "「으음, 그건―― 발렌타인 당일까지 비밀♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ルルカはウィンクをひとつ。"
translation = "그렇게 말하며 루루카는 윙크를 한 번."

[[dialogue]]
speaker = "unk"
original = "手の甲に油性マジックで書いておいた文字を確認しながら、はっきりと唱える。"
translation = "손등에 유성 매직으로 써둔 글자를 확인하며 또렷하게 외친다."

[[dialogue]]
speaker = "ルルカ"
original = "「――<b>ルルカワールド</b>！」"
translation = "「――<b>루루카</b> <b>월드</b>!」"

[[dialogue]]
speaker = "クロト"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "ルルカ"
original = "「――よしっ♪\u3000トワちゃん先生！\u3000イクシリオンちゃん！\u3000能力、上手く使えたよ！」"
translation = "「――좋았어♪ 토와짱 선생님! 익실리온 양! 능력 잘 사용했어!」"

[[dialogue]]
speaker = "unk"
original = "気づけばクロトの姿は消え、代わりに現れたのは、イクシリオンとトワの２人だった。"
translation = "정신을 차려보니 쿠로토의 모습은 사라지고 대신 나타난 것은 익실리온과 토와 두 사람이었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「すごいです、ルルカさん！\u3000本当に妄想トリップ中に<b>仮想空間</b>を展開してしまうなんて……！」"
translation = "「대단해요, 루루카 씨! 정말 망상 트립 중에 <b>가상</b> <b>공간</b>을 전개해 버리다니……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ルルカちゃんの『仮想空間を作り出す力』を応用して、妄想トリップしている私たちの<b>脳内</b>に結界のような空間を構築する――」"
translation = "「루루카 양의 『가상 공간을 만들어내는 힘』을 응용해서 망상 트립 중인 우리 <b>뇌내</b>에 결계 같은 공간을 구축한다――」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それならば、こうして妄想トリップ中でも、意識を保ったまま行動できる……！」"
translation = "「그렇다면 이렇게 망상 트립 중에도 의식을 유지한 채 행동할 수 있어……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「うんっ♪\u3000あとは現実のキッチンをそのまま仮想空間内に投影して、現実の体の動きと同期させれば――」"
translation = "「응♪ 나머지는 현실의 주방을 그대로 가상 공간 내에 투영해서 현실의 몸의 움직임과 동기화시키면――」"

[[dialogue]]
speaker = "ルルカ"
original = "「ＶＲヘッドセットを付けてるみたいに、ちゃんとチョコ作りを続けられる、ってわけ♪」"
translation = "「VR 헤드셋을 쓰고 있는 것처럼 제대로 초콜릿 만들기를 계속할 수 있다는 말씀♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「本当にすごいよ、ルルカちゃん！\u3000まさかこんな使い方を思いつくなんて！」"
translation = "「정말 대단해, 루루카 양! 설마 이런 사용법을 생각해내다니!」"

[[dialogue]]
speaker = "ルルカ"
original = "「えへへ♪\u3000あたし、戦闘はあんまり得意じゃないけど……お兄ちゃんの力になれるように、少しずつ星騎士としても頑張ろうって思ってて！」"
translation = "「에헤헤♪ 나 전투는 별로 자신 없지만…… 오빠에게 힘이 될 수 있도록 조금씩 성기사로서도 노력하려고 생각하고 있거든!」"

[[dialogue]]
speaker = "ルルカ"
original = "「この前、友達と訓練してた時に、精神干渉が得意な星術使いの子がいて……。どうやったら対抗できるか考えてるうちに、こうすればいけるかもって！」"
translation = "「지난번에 친구랑 훈련했을 때 정신 간섭이 특기인 성술사 아이가 있어서…… 어떻게 하면 대항할 수 있을까 생각하다 보니 이렇게 하면 될지도 모르겠다 싶었어!」"

[[dialogue]]
speaker = "ルルカ"
original = "「だから今回も、もしかしたらイクシリオンちゃんの問題に役立つかもって思ったんです♪」"
translation = "「그래서 이번에도 어쩌면 익실리온 양의 문제에 도움이 될지도 모른다고 생각했어요♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「能力は考え方次第で、強さになり得る……。本当にすごいです、ルルカさん！」"
translation = "「능력은 생각하기에 따라 강함이 될 수 있다니…… 정말 대단해요, 루루카 씨!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふふっ、よかった。ルルカちゃんのおかげで、イクシリオンちゃんも元気を取り戻したみたい♪」"
translation = "「후훗, 다행이다. 루루카 양 덕분에 익실리온 양도 활기를 되찾은 것 같네♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はい！\u3000先生の言葉の意味が、今ならよくわかります。私もルルカさんを見習って、バレンタインフォームを使いこなせるように頑張ります！」"
translation = "「네! 선생님의 말씀의 의미를 이제야 잘 알 것 같아요. 저도 루루카 씨를 본받아 발렌타인 폼을 잘 다룰 수 있도록 노력하겠습니다!」"

[[dialogue]]
speaker = "ルルカ"
original = "「なんかよくわかんないけど……イクシリオンちゃんにとっても一石二鳥になったみたいだね♪」"
translation = "「뭔가 잘은 모르겠지만…… 익실리온 양에게도 일석이조가 된 것 같네♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「よ～し、これで妄想トリップの問題も解決したし――」"
translation = "「좋~아, 이걸로 망상 트립 문제도 해결됐고――」"

[[dialogue]]
speaker = "ルルカ"
original = "「イクシリオンちゃん！\u3000お兄ちゃんに渡すチョコも、絶対に成功させちゃおう♪」"
translation = "「익실리온 양! 오빠에게 줄 초콜릿도 꼭 성공시키자♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はいっ♪\u3000ルルカさん、よろしくお願い致します！」"
translation = "「네♪ 루루카 씨, 잘 부탁드립니다!」"

[[dialogue]]
speaker = "unk"
original = "こうして３人は、本格的にチョコ作りを始めるのだった。"
translation = "이렇게 세 사람은 본격적으로 초콜릿 만들기를 시작하는 것이었다."

