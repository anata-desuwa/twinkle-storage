[[dialogue]]
speaker = "unk"
original = "第１０話,作戦完了！,B"
translation = "제10화, 작전 완료!, B"

[[dialogue]]
speaker = "unk"
original = "彼らがパトロール作戦を始めて数時間──"
translation = "그들이 순찰 작전을 시작하고 수 시간──"

[[dialogue]]
speaker = "unk"
original = "各地に出没していた特殊個体もそのほとんどが掃討され、流星市国には平和が戻っていた。"
translation = "각지에 출몰하던 특수 개체도 그 대부분이 소탕되어, 유성 시국에는 평화가 돌아왔다."

[[dialogue]]
speaker = "ユウリ"
original = "「ふぅ……大体片付いたっぽいな。街の人たちも怪我人はいないみたいだったぜ」"
translation = "「휴우…… 대충 정리된 것 같네. 거리 사람들도 다친 사람은 없는 것 같았어.」"

[[dialogue]]
speaker = "セーラ"
original = "「みんな、お疲れ～♪\u3000ふふ、たまにはこういうのも楽しいじゃんね」"
translation = "「모두, 수고했어~♪ 후후, 가끔은 이런 것도 즐겁잖아.」"

[[dialogue]]
speaker = "マトイ"
original = "「ほっ……どうなることかと思いましたけど、これでセイファート学園長にもいい報告ができます」"
translation = "「휴우…… 어떻게 될까 했습니다만, 이걸로 세이퍼트 학원장에게도 좋은 보고를 할 수 있겠어요.」"

[[dialogue]]
speaker = "セーラ"
original = "「ルリちーはどうだった、今日の？」"
translation = "「루리치는 어땠어, 오늘은?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ばっちりでしたよ！\u3000同じ一年生の天使同士、抜群のコミュニケーションとコンビネーションでした！\u3000ね！\u3000アナちゃんさん！」"
translation = "「완벽했어요! 같은 1학년 천사끼리, 발군의 커뮤니케이션과 콤비네이션이었던 것입니다! 그렇죠! 아나짱 씨!」"

[[dialogue]]
speaker = "アナ"
original = "「ばっちぐ～」"
translation = "「완벽구~」"

[[dialogue]]
speaker = "マトイ"
original = "「ちゃん付けなの？\u3000さん付けなの？\u3000どっち……？」"
translation = "「짱 붙이는 거야? 씨 붙이는 거야? 어느 쪽이야……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「同級生としてはちゃん付けですが、同級生と思えぬほどご立派なのでさん付けなのです！」"
translation = "「동급생으로서는 짱을 붙이는 것이지만, 동급생이라고 생각할 수 없을 정도로 훌륭하시기에 씨를 붙이는 것입니다!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ルリエルちゃんも可愛いわね～♪\u3000ホントに真っ白な天使さんって感じ」"
translation = "「루리엘짱도 귀엽네~♪ 정말 새하얀 천사 같아.」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ、褒められました！\u3000ソフィアもサーシャ先輩と上手く連携できたでありますか？」"
translation = "「에헤헤, 칭찬받았습니다! 소피아도 사샤 선배와 잘 연계할 수 있었던 것입니까?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ん……ま、まあ。それなりに」"
translation = "「음…… 뭐, 뭐. 그럭저럭.」"

[[dialogue]]
speaker = "サーシャ"
original = "「それなり～？\u3000残念ね、あんなに仲良くお話できたのに」"
translation = "「그럭저럭~? 아쉽네, 그렇게 사이좋게 이야기할 수 있었는데.」"

[[dialogue]]
speaker = "ソフィア"
original = "「う、うるさいです。姉さんはいつもそうやって私を子ども扱いするんですから……」"
translation = "「으, 시끄럽습니다. 언니는 항상 그렇게 저를 어린애 취급하니까요……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ハハ、よかったないい先輩がいて…………え？」"
translation = "「하하, 좋겠네 좋은 선배가 있어서…………엥?」"

[[dialogue]]
speaker = "ソフィア"
original = "「あっ」"
translation = "「앗」"

[[dialogue]]
speaker = "ルリエル"
original = "「姉さんって──ええ！？\u3000サーシャ先輩はソフィアのお姉さんだったでありますか！？」"
translation = "「언니라니──에에!? 사샤 선배는 소피아의 언니였던 것입니까?!」"

[[dialogue]]
speaker = "マトイ"
original = "「びっくり。そういえばソフィアちゃんの名字聞いたことなかった……奏ソフィアちゃん、ってこと？」"
translation = "「깜짝이야. 그러고 보니 소피아짱의 성은 들어본 적 없었네…… 카나데 소피아짱, 이라는 거야?」"

[[dialogue]]
speaker = "ソフィア"
original = "「違います」"
translation = "「아닙니다.」"

[[dialogue]]
speaker = "ユウリ"
original = "「いやそうだろ。あたしら誤魔化せると思うなよ」"
translation = "「아니 맞잖아. 우리를 속일 수 있을 거라고 생각하지 마.」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは。ま、会長たちがいなくたってうちらも捨てたもんじゃないってことで♪」"
translation = "「아하하. 뭐, 회장들이 없더라도 우리도 버릴 건 아니라는 걸로♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ですね。ふふ……これにて私たちの合同出撃は終わりを迎えるのであった」"
translation = "「그렇네요. 후후…… 이것으로 저희의 합동 출격은 끝을 맞이하는 것이었다.」"

[[dialogue]]
speaker = "マトイ"
original = "「すごい無理やりまとめようとしてる」"
translation = "「엄청 억지로 마무리하려고 하네.」"

[[dialogue]]
speaker = "アナ"
original = "「兄弟姉妹の前では素が出せない性格の人は多い。ソフィアも年齢的に姉離れしたくなる年頃だから……」"
translation = "「형제자매 앞에서는 본모습을 드러내지 못하는 성격의 사람은 많습니다. 소피아도 나이적으로 언니에게서 독립하고 싶어지는 나이대이니까요……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あまり分析してやらないほうがいいと思うぞ、アナ」"
translation = "「너무 분석해주지 않는 게 좋을 거다, 아나.」"

[[dialogue]]
speaker = "unk"
original = "そうして、彼らはそれぞれの学び舎へと帰る──"
translation = "그렇게, 그들은 각자의 배움터로 돌아간다──"

[[dialogue]]
speaker = "unk"
original = "さらなる異変が起こったのは、その道中だった。"
translation = "또 다른 이변이 일어난 것은, 그 도중이었다."

