[[dialogue]]
speaker = "unk"
original = "第３話,花よりお団子ルリエル,P"
translation = "제3화, 금강산도 식후경 루리엘"

[[dialogue]]
speaker = "unk"
original = "ステラとラファエロが元の世界に戻り、フィオナたちも流星市国に帰ってきた。ここ最近はドタバタしていたが、ようやくのんびりできる放課後だ。"
translation = "스텔라와 라파엘로가 원래 세계로 돌아가고, 피오나 일행도 유성시국으로 돌아왔다. 최근 들어 북적거렸지만, 겨우 느긋하게 보낼 수 있는 방과 후다."

[[dialogue]]
speaker = "unk"
original = "そこで俺は、恋人であるルリエルをデートに誘うことにした──"
translation = "그래서 나는 연인인 루리엘을 데이트에 초대하기로 했다──"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへへへへへぇ～<emoji=heart04>\u3000会長さんとお出かけするの、久しぶりなのです♪」"
translation = "「에헤헤헤헤헤헤~ <emoji=heart04> 회장님이랑 외출하는 거 오랜만이에요♪」"

[[dialogue]]
speaker = "unk"
original = "今日もステラの衣装なんだ？"
translation = "오늘도 스텔라의 의상이네?"

[[dialogue]]
speaker = "ルリエル"
original = "「はいなのです！\u3000ステラさんの衣装、とっても可愛いですし、動きやすいから気に入っちゃいました～♪」"
translation = "「네! 스텔라 씨의 의상, 정말 귀엽고 움직이기 편해서 맘에 들어버렸거든요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「そういえば恋人の会長さんから、この格好のルリエルの感想、聞いてませんでした。どうですかー？」"
translation = "「그러고 보니 남자친구인 회장님한테 이 복장을 한 루리엘의 감상, 못 들었어요. 어때요?」"

[[dialogue]]
speaker = "unk"
original = "似合ってるよ。すごく可愛い"
translation = "잘 어울려. 정말 귀여워"

[[dialogue]]
speaker = "ルリエル"
original = "「むふふ～<emoji=heart04>\u3000もっともーっと、褒めてくれていいのですよ～？\u3000ルリエルは褒められて伸びるタイプですから！」"
translation = "「무후후~ <emoji=heart04> 좀 더, 좀 더 칭찬해 주셔도 된다고요? 루리엘은 칭찬받으면 쑥쑥 크는 타입이니까요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、そうです！\u3000お出かけ前に、花壇の様子を見てもいいですか？」"
translation = "「앗, 맞다! 외출하기 전에 화단 상태를 좀 봐도 될까요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「じゃーん♪\u3000このあたりのお花は、ルリエルもお世話を手伝っているのです！」"
translation = "「짠♪ 이 근처 꽃들은 루리엘도 돌보는 걸 돕고 있어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「カティアさんと最近、とっても仲良しになりまして～……この白くて小さいお花、名前わかりますか？」"
translation = "「카티아 씨랑 최근에 정말 친해져서요~…… 이 하얗고 작은 꽃, 이름 아세요?」"

[[dialogue]]
speaker = "unk"
original = "星の形をした花──『ステラ』だね"
translation = "별 모양을 한 꽃── 『스텔라』네"

[[dialogue]]
speaker = "ルリエル"
original = "「わっ、正解なのです！\u3000そうなんです、カティアさんが好きなお花を植えていいって言ってくれたので──ステラを選びました！」"
translation = "「와, 정답이에요! 맞아요, 카티아 씨가 좋아하는 꽃을 심어도 된다고 하셔서── 스텔라를 골랐어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、それにしてもよくご存知ですね！\u3000ルリエル、図鑑で調べるまで知らなかったのです」"
translation = "「회장님, 그나저나 정말 잘 아시네요! 루리엘은 도감으로 찾아보기 전까지 몰랐거든요.」"

[[dialogue]]
speaker = "unk"
original = "昔、花屋でアルバイトしてたから"
translation = "예전에 꽃집에서 아르바이트했었거든"

[[dialogue]]
speaker = "ルリエル"
original = "「はぇ～、会長さんって本当にいろいろなところで働いてますね～。じゃあ、カティアさんだけがお世話してる、あっちの花の名前もわかったり？」"
translation = "「하에~ 회장님은 정말 여러 곳에서 일하시네요~. 그럼 카티아 씨만 돌보고 있는 저쪽 꽃 이름도 아시려나?」"

[[dialogue]]
speaker = "unk"
original = "全部わかるよ。右から順に──"
translation = "전부 알아. 오른쪽부터 순서대로──"

[[dialogue]]
speaker = "ルリエル"
original = "「ふわ～、本当に物知りさんなのです♪\u3000会長さんとお付き合いしてると、ルリエルもどんどん賢くなっちゃうのです！」"
translation = "「후와~ 정말 박학다식하시네요♪ 회장님이랑 사귀고 있으면 루리엘도 점점 똑똑해지는 것 같아요!」"

[[dialogue]]
speaker = "unk"
original = "ステラやラファエロと交流をした影響か、ルリエルは自然や藝術といったものにも好奇心のアンテナが向き始めているみたいだ。"
translation = "스텔라나 라파엘로와 교류한 영향인지, 루리엘은 자연이나 예술 같은 것에도 호기심의 안테나가 향하기 시작한 모양이다."

[[dialogue]]
speaker = "unk"
original = "だったら今日のデートの行き先も、ちょっと変更してみようか──"
translation = "그렇다면 오늘 데이트 목적지도 조금 변경해 볼까──"

[[dialogue]]
speaker = "ルリエル"
original = "「屋上庭園、驚きました……！\u3000繁華街のビルの上に、あんなに自然豊かなスポットがあるだなんて！」"
translation = "「옥상 정원, 놀랐어요……! 번화가 빌딩 위에 저렇게 자연이 풍부한 스팟이 있다니!」"

[[dialogue]]
speaker = "unk"
original = "たまにはこういうデートもいいね"
translation = "가끔은 이런 데이트도 좋네"

[[dialogue]]
speaker = "ルリエル"
original = "「はい！\u3000それに会長さんが一緒だと、お花についていろんな解説をしてもらえるから、とっても楽しいのです～♪」"
translation = "「네! 게다가 회장님이랑 함께라면 꽃에 대해 여러 가지 해설을 들을 수 있어서 정말 즐거워요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「せっかくなので、お花だけでなく藝術にも触れたいのです！\u3000確かこの近くに、おっきな美術館が──」"
translation = "「기왕이면 꽃뿐만 아니라 예술도 접하고 싶어요! 분명 이 근처에 커다란 미술관이──」"

[[dialogue]]
speaker = "unk"
original = "案内は任せて"
translation = "안내는 맡겨줘"

[[dialogue]]
speaker = "unk"
original = "昔、アルバイトしてた美術館だな"
translation = "예전에 아르바이트했던 미술관이네"

[[dialogue]]
speaker = "ルリエル"
original = "「……たまに思うのですが。会長さんってどこなら働いたことがないのでしょう？」"
translation = "「……가끔 생각하는 건데, 회장님은 대체 어디서 일을 안 해보신 걸까요?」"

[[dialogue]]
speaker = "unk"
original = "翌日──昼休みの流星星徒会室にて、ルリエルは恋人であるクロトとのデートを、他の役員たちに語っていた。"
translation = "다음 날── 점심시간 유성 성도회실에서 루리엘은 연인인 쿠로토와의 데이트를 다른 임원들에게 이야기하고 있었다."

[[dialogue]]
speaker = "ソフィア"
original = "「屋上庭園に美術館……？\u3000ルリにしては、ずいぶんと似つかわしくないところに……」"
translation = "「옥상 정원에 미술관……? 루리치고는 꽤 어울리지 않는 곳에……」"

[[dialogue]]
speaker = "ルリエル"
original = "「似つかわしくないってなんですか～！？\u3000最近のルリエルは、自然や藝術にも興味が出てきたんです！\u3000オトナの女性なのですよ～！」"
translation = "「어울리지 않는다니 그게 무슨 말씀이세요~! 최근의 루리엘은 자연이나 예술에도 관심이 생겼다고요! 어른스러운 여성이라고요~!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、緋宮会長と仲良しみたいで何よりです。どんな花や絵画を見てきたんですか？」"
translation = "「후후, 히노미야 회장님과 사이가 좋은 것 같아 다행이네요. 어떤 꽃이나 회화를 보고 왔나요?」"

[[dialogue]]
speaker = "ソフィア"
original = "「確かに。私もあんまり行く場所じゃないので、感想が気になります」"
translation = "「확실히. 저도 잘 안 가는 곳이라 감상이 궁금하네요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「はいです、とっても楽しかったんですよー！\u3000えっと、屋上庭園ではお花を見ながら、ベンチでゆっくりできるんです！」"
translation = "「네, 정말 즐거웠어요! 음, 옥상 정원에서는 꽃을 보면서 벤치에서 느긋하게 쉴 수 있거든요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「近くの売店で売ってる、季節のお花のジュースが格別で！\u3000フルーツとはまた違った甘さがありまして～♪」"
translation = "「근처 매점에서 파는 계절 꽃 주스가 각별해서! 과일과는 또 다른 달콤함이 있더라고요~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………ん？」"
translation = "「…………응?」"

[[dialogue]]
speaker = "ルリエル"
original = "「それでそれで、美術館の中にはカフェスペースがあるんです！\u3000藝術家さんが愛した紅茶とケーキのセットが楽しめて、これまた絶品で～！」"
translation = "「그리고 그리고, 미술관 안에는 카페 공간이 있어요! 예술가가 사랑한 홍차와 케이크 세트를 즐길 수 있는데, 이게 또 일품이라서~!」"

[[dialogue]]
speaker = "フィオナ"
original = "「…………なるほど」"
translation = "「…………그렇군요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ～。会長さんとこっそり、あーんって食べさせあいっこをしたりですね～……<emoji=heart04>」"
translation = "「에헤헤~ 회장님이랑 몰래 아~ 하고 서로 먹여주기도 하고요~…… <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………思ってたのと違う感想が来ましたね。流石はルリ」"
translation = "「…………생각했던 거랑 다른 감상이 나왔네요. 역시 루리.」"

[[dialogue]]
speaker = "ルリエル"
original = "「えっ？\u3000何がですか？」"
translation = "「엣? 뭐가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「まあ、花より団子のルリエルらしいですけれど。ふふふっ」"
translation = "「뭐, 금강산도 식후경인 루리엘답네요. 후후후.」"

[[dialogue]]
speaker = "ソフィア"
original = "「オトナの女性にはまだまだ遠いみたいですね……」"
translation = "「어른스러운 여성이 되기엔 아직 멀었나 보네요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「な、なんなんですか～っ！？」"
translation = "「뭐, 뭐예요~!」"

[[dialogue]]
speaker = "unk"
original = "自然や藝術への興味が出てきたとはいえ、ルリエルはやっぱりルリエルなのだった──"
translation = "자연이나 예술에 대한 관심이 생겼다고는 해도, 루리엘은 역시 루리엘이었다──"

