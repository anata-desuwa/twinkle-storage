[[dialogue]]
speaker = "unk"
original = "ジャクリーヌと恋人同士になってから、しばらく経ったある日。"
translation = "자클린과 연인 사이가 되고 나서 얼마간의 시간이 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は彼女と繁華街へとやってきて、デートをしていた。"
translation = "나는 그녀와 번화가로 와서 데이트를 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌに繁華街にあるおいしいお菓子屋さんを紹介するという目的もある。"
translation = "자클린에게 번화가에 있는 맛있는 과자 가게를 소개한다는 목적도 있다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「このソフトクリームの特大サイズ、いろんな味を楽しめて、とってもおいしいの♪\u3000会長も一緒に食べゆ？」"
translation = "「이 소프트크림 특대 사이즈, 여러 가지 맛을 즐길 수 있어서 정말 맛있다유♪ 회장도 같이 먹겠냐유?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいのか？\u3000ジャクリーヌが食べたくて買ったものだろ？」"
translation = "「괜찮아? 자클린이 먹고 싶어서 산 거잖아?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「会長と食べるために買ったゆ！\u3000だから一緒に食べてほしいの♪」"
translation = "「회장이랑 먹으려고 산 거다유! 그러니까 같이 먹어줬으면 좋겠다유♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。それじゃあ遠慮なく……」"
translation = "「알았어. 그럼 사양 않고……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そんなに離れてないで、もっとくっついて食べるの！」"
translation = "「그렇게 떨어져 있지 말고 더 딱 붙어서 먹으라유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ぺろぺろ、ぺろぺろ♪\u3000ん～～～～♪\u3000会長と一緒に食べると、一人で舐めるよりもおいしいの<emoji=heart04>」"
translation = "「낼름낼름, 낼름낼름♪ 응~~~~♪ 회장이랑 같이 먹으니까 혼자 핥는 것보다 훨씬 맛있다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……本当にね」"
translation = "「……정말이네.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そうなの？\u3000だったら買ってよかったゆ！」"
translation = "「그래유? 그럼 사길 잘했다유!」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌの柔らかい身体がこれでもかってくらい押し付けられているため、内心は平常心でいるのがやっとだった。"
translation = "자클린의 부드러운 몸이 이래도 되나 싶을 정도로 밀착해 오고 있어서, 내심 평정심을 유지하는 것만으로도 벅찼다."

[[dialogue]]
speaker = "unk"
original = "デートということで、ただでさえ意識せざるを得ない状況のため、その柔らかさにも身体が反応してしまわないようにしないと……。"
translation = "데이트라는 사실만으로도 의식할 수밖에 없는 상황이라, 그 부드러움에 몸이 반응해버리지 않도록 주의해야 한다……."

[[dialogue]]
speaker = "unk"
original = "その後も、俺たちは街で色んな美味しいお店を食べ歩いた。"
translation = "그 후로도 우리들은 거리의 여러 맛집을 돌아다녔다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「とっても大きかったけど、これならもう１個くらい食べられそうなの♪」"
translation = "「정말 컸지만, 이거라면 하나 더 먹을 수 있을 것 같다유♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は流石にもう食べれないぞ……」"
translation = "「나는 이제 더는 못 먹겠어……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆへへ♪\u3000なんだか会長、すっごく緊張しながら食べてたし、仕方ないの♪」"
translation = "「유헤헤♪ 왠지 회장, 엄청 긴장하면서 먹었고 어쩔 수 없다유♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「でも、どうしてそんなに緊張してたゆ？」"
translation = "「그런데 왜 그렇게 긴장했냐유?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きな女の子にくっつかれたら、男の子は意識しちゃうものなんだよ……」"
translation = "「좋아하는 여자애가 달라붙으면 남자애는 의식하게 되는 법이야……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「それ知ってるの！\u3000『勃起』ってやつゆ！」"
translation = "「그거 알고 있다유! 『발기』라는 거다유!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっ！？\u3000そういうことを女の子が大声で言っちゃダメだって……！」"
translation = "「잠깐!? 그런 걸 여자애가 큰 소리로 말하면 안 된다고……!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒトリから教わったゆ。勃起したオスは、恋人と『せっくす』するの！」"
translation = "「히토리한테 배웠다유. 발기한 수컷은 연인과 『섹스』하는 거다유!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「絶対に意味わかってないで言ってるよね！？」"
translation = "「절대 의미도 모르고 말하는 거지!?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「大丈夫なの。余が知らなくても、全部会長に教えてもらうの！」"
translation = "「괜찮다유. 짐이 몰라도 전부 회장에게 배우면 된다유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「でも初めての『せっくす』はきっと会長が躊躇うから、興味があるなら強引にいかなきゃダメだよ、なの！」"
translation = "「하지만 첫 『섹스』는 분명 회장이 주저할 테니까, 흥미가 있다면 강제로 밀어붙이지 않으면 안 된다유, 라고 했다유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「というわけで、こういう時はどうすればいいか、余は予習済みゆ！\u3000会長に逃げ場はないの！」"
translation = "「그런 고로 이럴 때는 어떻게 해야 하는지 짐은 예습 끝났다유! 회장에게 도망칠 곳은 없다유!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっと！？」"
translation = "「잠깐!?」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌが指を鳴らすと、俺の体は暗闇の中に包み込まれる。"
translation = "자클린이 손가락을 튕기자, 내 몸은 어둠 속에 휩싸인다."

[[dialogue]]
speaker = "unk"
original = "その後、体が宙を浮いて持ち運ばれるような感覚。"
translation = "그 후, 몸이 공중에 떠서 옮겨지는 듯한 감각."

[[dialogue]]
speaker = "unk"
original = "どういう理屈なのか、ジャクリーヌの謎の能力によって拘束されたまま、移動させられてしまう。"
translation = "어떤 원리인지, 자클린의 수수께끼 같은 능력에 의해 구속된 채 이동당하고 만다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「さあ会長♪\u3000余に『せっくす』を教えてほしいの<emoji=heart04>」"
translation = "「자, 회장♪ 짐에게 『섹스』를 가르쳐줬으면 한다유<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "視界が開けると、そこはすでにラブホテルの中で、ジャクリーヌは半裸姿で大事なところを大胆に晒していた。"
translation = "시야가 트이자 그곳은 이미 러브호텔 안이었고, 자클린은 반라의 모습으로 소중한 곳을 대담하게 드러내고 있었다."

[[dialogue]]
speaker = "unk"
original = "……男として、ここまでしてもらって、恋人に恥をかかせるわけにはいかない。"
translation = "……남성으로서, 여기까지 해준 연인에게 창피를 줄 수는 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんか……リードできなくてごめんな」"
translation = "「왠지…… 리드하지 못해서 미안해.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「なんで謝るゆ？\u3000余が会長と『せっくす』がしてみたかっただけなの♪」"
translation = "「왜 사과하냐유? 짐이 회장과 『섹스』가 해보고 싶었을 뿐이다유♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういう無邪気で可愛いところ、好きだ。ジャクリーヌ」"
translation = "「그런 천진난만하고 귀여운 점, 좋아해. 자클린.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「嬉しいの♪\u3000余も会長のこと、大好き<emoji=heart04>」"
translation = "「기쁘다유♪ 짐도 회장, 정말 좋아한다유<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌの言葉に頷き返しながら、俺はゆっくりとジャクリーヌの女性器を指で撫で始める。"
translation = "자클린의 말에 고개를 끄덕이며, 나는 천천히 자클린의 보지를 손가락으로 쓰다듬기 시작한다."

[[dialogue]]
speaker = "unk"
original = "驚いたことに、少し愛撫しただけでジャクリーヌの女性器は一瞬で大量の愛液を分泌して、びしょびしょになった。どうやら、濡れやすい体質らしい。"
translation = "놀랍게도 살짝 애무했을 뿐인데 자클린의 보지는 순식간에 대량의 애액을 분비하며 흠뻑 젖었다. 아무래도 젖기 쉬운 체질인 듯하다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あっ<emoji=heart04>\u3000あっ……あぁぁん<emoji=heart04>\u3000な、なんなの……？\u3000余のおまた、すっごく気持ちがいいのっ。ふわぁぁん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗…… 아아앙<emoji=heart04> 무, 뭐냐유……? 짐의 가랑이, 엄청 기분 좋다유. 후와아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやらオナニーすらしたことのないらしいジャクリーヌに、セックスを教える。それが許されているという背徳感に、背筋がゾクゾクと震えた。"
translation = "아무래도 자위조차 해본 적 없는 듯한 자클린에게 섹스를 가르친다. 그것이 허락되었다는 배덕감에 등줄기가 오싹오싹 떨렸다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「はぁっ、あぁぁぁん……<emoji=heart04>\u3000あぁぁ、お、おま○こ？\u3000おまたの気持ちいいところ、おま○こって言うゆ？\u3000んんぅん<emoji=heart04>」"
translation = "「하앗, 아아아앙……<emoji=heart04> 아아아, 보, 보지? 가랑이의 기분 좋은 곳을 보지라고 하냐유? 응으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「わ、わかったゆ<emoji=heart04>\u3000これからおまたのこと、おま○こって言うゆ<emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「아, 알았다유<emoji=heart04> 이제부터 가랑이를 보지라고 부르겠다유<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「それで、あぁぁ<emoji=heart04>\u3000おま○こ気持ちいい時は、『おま○こ気持ちいい』って言った方がいいゆ？\u3000はぁぁん<emoji=heart04>\u3000わかったのぉ<emoji=heart04>」"
translation = "「그래서, 아아아<emoji=heart04> 보지 기분 좋을 때는 『보지 기분 좋아』라고 말하는 게 좋냐유? 하아앙 알았다유우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふぁ、あ……っ、ん……ぅ<emoji=heart04>\u3000会長のゆび……っ、会長のゆび、きもちいい……<emoji=heart04>」"
translation = "「파, 아……읏, 응……으<emoji=heart04> 회장의 손가락……읏, 회장의 손가락, 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「う、うん……。ぁ……、ん、あぁぁ……<emoji=heart04>\u3000そこ、んんんぅ……<emoji=heart04>」"
translation = "「으, 응……. 아……, 응, 아아아……<emoji=heart04> 거기, 응응응으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「すっごく濡れてきてるって……ゆゆゆ？\u3000余のおま○こ、なんだかヌルヌルしてるの……これ、おしっこしちゃったゆ？」"
translation = "「엄청 젖어오고 있다니…… 유유유? 짐의 보지, 왠지 미끌미끌하다유…… 이거, 오줌 싸버린 거냐유?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余のカラダ……ヘンなわけじゃないゆ……？」"
translation = "「짐의 몸…… 이상한 거 아니냐유……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヘンじゃないよ。綺麗だし、エッチだし……。世界で一番だ」"
translation = "「이상하지 않아. 예쁘고, 야하고……. 세계 제일이야.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余が……一番。ゆへへ、嬉しいの<emoji=heart04>」"
translation = "「짐이…… 제일. 유헤헤, 기쁘다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「え？\u3000これはおしっこじゃなくて、愛液って言うゆ？\u3000わ、わかったゆ<emoji=heart04>」"
translation = "「에? 이건 오줌이 아니라 애액이라고 하냐유? 아, 알았다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余が気持ちいい証拠なの？\u3000じ、じゃあ、もっとヌルヌルできるように、頑張るゆ<emoji=heart04>\u3000んっ、んふぅぅん<emoji=heart04>」"
translation = "「짐이 기분 좋다는 증거냐유? 그, 그럼 더 미끌미끌해질 수 있도록 힘내겠다유<emoji=heart04> 응, 응후으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あ……会長の、そこ……すっごくおっきくなってるけど、大丈夫かゆ？」"
translation = "「아…… 회장의 거기…… 엄청 커졌는데 괜찮냐유?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「これが男の子のおち○ちんだゆ？\u3000な、なんだかピクピクしてて、亀さんの頭みたいで……かわいいゆ<emoji=heart04>」"
translation = "「이게 남자애의 자지다유? 왠지 움찔거려서 거북이 머리 같고…… 귀엽다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆへへ、会長のおち○ちん、もっとぴくってしたの……<emoji=heart04>」"
translation = "「유헤헤, 회장의 자지, 더 움찔했다유……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どちらかというとグロテスクな気はするけど、ジャクリーヌにそう言ってもらえると嬉しくて、もっと気持ちよくしてあげたくなってしまう。"
translation = "어느 쪽인가 하면 그로테스크한 느낌은 들지만, 자클린이 그렇게 말해주니 기뻐서 더 기분 좋게 해주고 싶어진다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふぁ、んぁ<emoji=heart04>\u3000んん……<emoji=heart04>\u3000会長、それ、きもちぃ……っ、んぅっ<emoji=heart04>」"
translation = "「파, 응아<emoji=heart04> 응……<emoji=heart04> 회장, 그거 기분 조아……읏, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ひぅ！？\u3000んぁ……はっ、ああぁ<emoji=heart04>\u3000ぅう、んく……<emoji=heart04>\u3000はぁ、はぅ……<emoji=heart04>」"
translation = "「히우!? 응아…… 하앗, 아아앙<emoji=heart04> 으우, 응크……<emoji=heart04> 하아, 하우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ん……はあ、あ……<emoji=heart04>\u3000会長、だめなの……<emoji=heart04>\u3000んぁ、はぅ、うぅ……はぅ、はぁ、ん……<emoji=heart04>」"
translation = "「응…… 하아, 아……<emoji=heart04> 회장, 안 된다유……<emoji=heart04> 응아, 하우, 으으…… 하우, 하아, 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「これ、どうなってるの？\u3000おへその下、きゅうってして……<emoji=heart04>\u3000な、何だろう、この感じ……ドキドキして、切なくて……ジンジンするの……<emoji=heart04>」"
translation = "「이거 어떻게 된 거냐유? 배꼽 아래가 꽉 조여서……<emoji=heart04> 뭐, 뭐지 이 느낌…… 두근거리고, 애절하고…… 징징거린다유……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そろそろ、準備万端ってことなの……？\u3000余のおま○こが、会長のおち○んちん、受け入れる準備ができたゆ？」"
translation = "「슬슬 준비만전이라는 거냐유……? 짐의 보지가 회장의 자지를 받아들일 준비가 됐다유?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「おま○こきゅうきゅうするの、止まらないの<emoji=heart04>\u3000……う、うん<emoji=heart04>\u3000とまらにゃぃ……んぅ、んぁ、はぁぁあ<emoji=heart04>\u3000あ、うう、んっ<emoji=heart04>」"
translation = "「보지가 꾹꾹 조이는 게 멈추지 않는다유<emoji=heart04> ……으, 응<emoji=heart04> 멈추지 아냐아…… 응으, 응아, 하아아아<emoji=heart04> 아, 우우, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ぁ……んんんっ<emoji=heart04>」"
translation = "「아…… 응응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "勃起はもう十分過ぎる程だ。指でジャクリーヌの女性器をひと撫でして愛液をすくい、亀頭にまぶし、ペニスをあてがった。"
translation = "발기는 이미 충분하고도 남을 정도다. 손가락으로 자클린의 보지를 한 번 훑어 애액을 떠내어 귀두에 바르고 페니스를 갖다 대었다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふぁぁ、んぁ<emoji=heart04>\u3000あ、あぁぁ……<emoji=heart04>\u3000あ……れ？\u3000会長……ぁ、ん……<emoji=heart04>\u3000これ、おち○ちん……？」"
translation = "「후아아, 응아<emoji=heart04> 아, 아아아……<emoji=heart04> 어……라? 회장……아, 응……<emoji=heart04> 이거 자지냐유……?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「おま○この中に、おち○ちんを差し込んで、一つになるのが……『せっくす』なの？\u3000あぁぁっ、はぁぁぁん<emoji=heart04>\u3000な、なんだかちょっと、ドキドキするゆ<emoji=heart04><emoji=heart04>」"
translation = "「보지 속에 자지를 끼워 넣어서 하나가 되는 게…… 『섹스』냐유? 아아앗, 하아아앙<emoji=heart04> 왠지 좀 두근거린다유<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「大丈夫、優しくするからって……はぁぁん<emoji=heart04>\u3000会長、ありがとうなの<emoji=heart04>\u3000余は大丈夫だゆ……だから、来てほしいゆ……<emoji=heart04>」"
translation = "「괜찮아, 상냥하게 할 테니까라니…… 하아앙<emoji=heart04> 회장, 고맙다유<emoji=heart04> 짐은 괜찮다유…… 그러니까 들어왔으면 한다유……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「んぁ、あ……<emoji=heart04>\u3000ぁく、ん<emoji=heart04>\u3000いた……ぁ、はぁう、んんぅうう……<emoji=heart04><emoji=heart04>」"
translation = "「응아, 아……<emoji=heart04> 아윽, 응<emoji=heart04> 아파……아, 하아우, 응으으으으……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふぁ、はぁ、あ……ん<emoji=heart04>\u3000おち○ちん、おっきいの……っ<emoji=heart04>」"
translation = "「파, 하아, 아……응<emoji=heart04> 자지, 크다유……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「会長も、気持ちいい……の？\u3000ほ、ほんとゆ？\u3000よかったぁ……あんっ<emoji=heart04>\u3000なんだか余も、気持ちいい……んぅ、ううう<emoji=heart04>」"
translation = "「회장도 기분 좋아……? 정, 정말이냐유? 다행이다아…… 앙읏<emoji=heart04> 왠지 짐도 기분 좋아…… 응으, 으으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ん……<emoji=heart04>\u3000会長、あぅ……はぁ、ああっ<emoji=heart04>\u3000いっぱい……<emoji=heart04>\u3000おま○こ、広がってゆっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 회장, 아우…… 하아, 아앗<emoji=heart04> 가득……<emoji=heart04> 보지가 벌어지고 있다유우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「おま○こ、広がって……ぁ、ふぁ、あああぁ……<emoji=heart04>\u3000おへその下まで……んっ、ぁああう……<emoji=heart04>」"
translation = "「보지가 벌어져서…… 아, 파, 아아아아……<emoji=heart04> 배꼽 아래까지…… 응읏, 아아아우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふぁ、あ、あぁああああ……<emoji=heart04><emoji=heart04>\u3000んぅ、く……、ひぅ……<emoji=heart04>\u3000はっ、はぁ、はぅ……<emoji=heart04>」"
translation = "「파, 아, 아아아아아아……<emoji=heart04><emoji=heart04> 응으, 크……, 히우……<emoji=heart04> 하앗, 하아, 하우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あう、ん……<emoji=heart04>\u3000おへその下、ぁ、はぅうう……っ<emoji=heart04>\u3000きゅうってするの、なくなったゆ……<emoji=heart04>」"
translation = "「아우, 응……<emoji=heart04> 배꼽 아래, 아, 하우우우……읏<emoji=heart04> 꽉 조이는 게 없어졌다유……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ん、んぁ……、ああぁ<emoji=heart04>\u3000ぁう……ぁ、あ<emoji=heart04>\u3000会長の、おち○ちん、奥まで入ってきてるの……わかゆっ……入ってきてゆ<emoji=heart04>」"
translation = "「응, 응아……, 아아아<emoji=heart04> 아우……아, 아<emoji=heart04> 회장의 자지, 안쪽까지 들어오고 있는 거 알겠다유…… 들어오고 있다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「んっ<emoji=heart04>\u3000んんんぅ……<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000これが、ひとつになるってことゆ？\u3000んんんっ、そっかぁ、嬉しいゆ<emoji=heart04>\u3000はぁ、はぅぅ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 응응응으……<emoji=heart04> 하아아앙<emoji=heart04> 이게 하나가 된다는 거냐유? 응응응읏, 그렇구나, 기쁘다유<emoji=heart04> 하아, 하우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「でもなんだか、物足りないゆ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長、もっともっと、たくさん来てほしいの……<emoji=heart04>\u3000はぅぅぅん<emoji=heart04>」"
translation = "「하지만 왠지 부족하다유……<emoji=heart04> 앙읏<emoji=heart04> 회장, 더 더 많이 들어왔으면 한다유…… 하우우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジャクリーヌの可愛い言葉をきっかけに、腰の動きがさらに速くなってしまう。"
translation = "자클린의 귀여운 말을 계기로 허리의 움직임이 더욱 빨라지고 만다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あっ！？\u3000ふあああぁぁぁっ<emoji=heart04>\u3000おち○ちん速くなったゆぅ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000ふわああぁんっ<emoji=heart04>\u3000はっ、はっ、はぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗!? 후아아아아아앗<emoji=heart04> 자지 빨라졌다유우<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 후와아아앙읏<emoji=heart04> 하앗, 하앗, 하앙읏<emoji=heart04> 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「速いのきてゆっ<emoji=heart04>\u3000はぁ、ぁああ……<emoji=heart04>\u3000ふわああぁんっ<emoji=heart04>\u3000かいちょぉ……んっ、ああぁ<emoji=heart04>\u3000気持ちいいっ、きもちぃぃ……<emoji=heart04>\u3000はふぅぅん<emoji=heart04>」"
translation = "「빠른 거 오고 있다유우<emoji=heart04> 하아, 아아아……<emoji=heart04> 후와아아앙읏<emoji=heart04> 회자앙…… 응읏, 아아아<emoji=heart04> 기분 좋아, 기분 조아아……<emoji=heart04> 하후으웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふぁぁぁ……<emoji=heart04>\u3000さっきみたいに、きゅうってして<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000切なくて、ジンジンするのが、またぁ……<emoji=heart04>\u3000はぅぅん<emoji=heart04>」"
translation = "「후아아아……<emoji=heart04> 아까처럼 꽉 조여줘<emoji=heart04> 아아앙<emoji=heart04> 애절하고 징징거리는 게 다시이……<emoji=heart04> 하우으웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「これが、『せっくす』で幸せになって……イッちゃうってことゆ？\u3000あぁぁあっ<emoji=heart04>\u3000んっ、そ、そうなの？\u3000んぅ、はぁ、あああっ<emoji=heart04>」"
translation = "「이게 『섹스』로 행복해져서…… 가버린다는 거냐유? 아아아앗<emoji=heart04> 응읏, 그, 그런 거냐유? 응으, 하아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「だから、イクときは、ちゃんとイクって言うゆ？\u3000わ、わかったゆ<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000も、もう……<emoji=heart04>\u3000あ、はぁ、あぁあ……<emoji=heart04>」"
translation = "「그러니까 갈 때는 제대로 간다고 말하냐유? 아, 알았다유<emoji=heart04> 응읏, 앗, 앗, 앗<emoji=heart04> 버, 벌써……<emoji=heart04> 아, 하아, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「キスっ<emoji=heart04>\u3000キスしてほしいゆっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000会長、キスぅ<emoji=heart04>\u3000れろ、ちゅっ……れる、ちゅぷぷっ<emoji=heart04>\u3000はぷちゅ<emoji=heart04>」"
translation = "「키스<emoji=heart04> 키스해줬으면 한다유웃<emoji=heart04> 앙읏<emoji=heart04> 아아앙<emoji=heart04> 회장, 키스으<emoji=heart04> 레로, 츄…… 레루, 츄푸푸<emoji=heart04> 하푸츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000もうイクゆっ<emoji=heart04>\u3000我慢できないのっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000はぅぅ……んふぅぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 이제 간다유웃<emoji=heart04> 참을 수 없다유웃<emoji=heart04> 앙읏<emoji=heart04> 하아앙<emoji=heart04> 하우우…… 응후으읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あっ、あっ、来るっ<emoji=heart04>\u3000大きいのくるゆっ<emoji=heart04>\u3000イク、イクイクイクイクっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 온다<emoji=heart04> 큰 거 온다유웃<emoji=heart04> 간다, 가가가가가<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「イっクうううぅぅぅ～～～～～～～～っ<emoji=heart04><emoji=heart04>\u3000――はぁ、ああぁああああああぁああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아~~~~~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04> ――하아, 아아아아아아아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ひぁ、ああぁ<emoji=heart04>\u3000んっ、ああ、あ……<emoji=heart04>\u3000ぅく、あああ<emoji=heart04>」"
translation = "「히아, 아아아<emoji=heart04> 응읏, 아아, 아……<emoji=heart04> 윽, 아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ふぁ、あああ、あ……<emoji=heart04>\u3000おなか……んんぅ<emoji=heart04>\u3000あつい、ぅあ、はぁ、ああぁああ……<emoji=heart04><emoji=heart04>」"
translation = "「파, 아아아, 아……<emoji=heart04> 배 속…… 응으으<emoji=heart04> 뜨거워, 으아, 하아, 아아아아아아……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ぅあ、はぁ、ああああ……<emoji=heart04>\u3000はふぅぅ……熱いの、いっぱい……<emoji=heart04>」"
translation = "「으아, 하아, 아아아아……<emoji=heart04> 하후으으…… 뜨거운 거, 가득……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「んっ、この熱いの……<emoji=heart04>\u3000これが『せいえき』なの？」"
translation = "「응읏, 이 뜨거운 거……<emoji=heart04> 이게 『정액』이냐유?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「会長の……はぅん<emoji=heart04>\u3000白いせいえきが、おなか奥に、たくさん……<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「회장의…… 하우웅<emoji=heart04> 하얀 정액이 배 안쪽에 가득……<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「『ざーめん』とも言うゆ？\u3000ゆふふ♪\u3000会長の……ざーめん<emoji=heart04>\u3000余のおま○こに、たくさん入れてもらったの<emoji=heart04>」"
translation = "「『정액』이라고도 하냐유? 유후후♪ 회장의…… 정액<emoji=heart04> 짐의 보지에 가득 넣어줬다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あ……はぁ……。はぅ。はぁ、はぁ……はぅ、はぁ……」"
translation = "「아…… 하아……. 하우. 하아, 하아…… 하우, 하아……」"

[[dialogue]]
speaker = "unk"
original = "切なそうな声色のジャクリーヌの腰はまだ震えていた。初めての行為での疲れもあるだろう。"
translation = "애절한 목소리의 자클린의 허리는 아직 떨리고 있었다. 첫 행위의 피로도 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女に、俺は今の気持ちを伝えたくて、キスをした。"
translation = "그런 그녀에게 나는 지금의 마음을 전하고 싶어 키스를 했다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ん……ちゅっ<emoji=heart04>\u3000会長<emoji=heart04>\u3000んん……はむ、ちゅ<emoji=heart04>\u3000んぁ……かいちょ……ぁ、んっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04> 회장<emoji=heart04> 응응…… 하무, 츄<emoji=heart04> 응아…… 회자……아, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ぅん、ん……<emoji=heart04>\u3000あ……ぅ、はむ<emoji=heart04>\u3000ちゅ……んっ、はぷ、ん……っ<emoji=heart04>」"
translation = "「으응, 응……<emoji=heart04> 아……으, 하무<emoji=heart04> 츄…… 응읏, 하푸, 응……읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく、俺たちは特別言葉を交わさないまま、ただ無言で抱き合って、キスをし続けていた。"
translation = "그로부터 한동안 우리는 특별히 말을 나누지 않은 채 그저 무언으로 껴안고 키스를 계속했다."

[[dialogue]]
speaker = "unk"
original = "無限にキスをしていられそうな気さえしたが、不意にジャクリーヌが口を開いた。"
translation = "무한히 키스를 하고 있을 수 있을 것 같은 기분마저 들었지만, 문득 자클린이 입을 열었다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「はふぅぅぅ……会長、これが『せっくす』なんだゆ？\u3000とっても気持ちよくて、幸せだったの<emoji=heart04>」"
translation = "「하후으으으…… 회장, 이게 『섹스』냐유? 정말 기분 좋고 행복했다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「それに……はぁぁ<emoji=heart04>\u3000からだもこころも、あったかくて……会長のこと、もっと好きになったゆ<emoji=heart04>」"
translation = "「게다가…… 하아아<emoji=heart04> 몸도 마음도 따뜻해서…… 회장, 더 좋아하게 됐다유<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、俺も大好きだぞ」"
translation = "「아아, 나도 정말 좋아해.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆへへ♪\u3000会長のこと、もっともっと好きになりたいから、これからもたくさん、『せっくす』するの<emoji=heart04>」"
translation = "「유헤헤♪ 회장, 더 더 많이 좋아하고 싶으니까 앞으로도 많이 『섹스』하자유<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「望むところだ」"
translation = "「바라던 바야.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「約束なの♪」"
translation = "「약속이다유♪」"

[[dialogue]]
speaker = "unk"
original = "そんな初々しくも可愛らしい笑顔を見つめながら、これからも彼女を大切にしていこうと思うのだった。"
translation = "그런 풋풋하고도 귀여운 미소를 바라보며, 앞으로도 그녀를 소중히 해나가겠다고 생각하는 것이었다."

