[[dialogue]]
speaker = "マハムート"
original = "「さて、２人の転入生を賭けて競うことになったわけだけど――」"
translation = "「자, 두 명의 전입생을 걸고 경쟁하게 된 셈인데――」"

[[dialogue]]
speaker = "マハムート"
original = "「フニは流星市国外から来て間もないということだし、改めて状況を説明しておこうかしら」"
translation = "「후니는 유성시국 밖에서 온 지 얼마 안 됐다고 하니, 다시 한번 상황을 설명해 두는 게 좋겠네」"

[[dialogue]]
speaker = "フェニエル"
original = "「ありがとうございます……。北海道にもモンスターは出るんですけど、私は事故のショックなのか、戦った時の記憶が曖昧で……」"
translation = "「감사합니다……. 홋카이도에도 몬스터는 나오지만, 저는 사고의 충격 때문인지 싸웠을 때의 기억이 애매해서……」"

[[dialogue]]
speaker = "フェニエル"
original = "「自分に星力がある、って言われても、まだいまいち実感が持てていない状態なので……」"
translation = "「자신에게 성력이 있다는 말을 들어도, 아직 그다지 실감이 나지 않는 상태라……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「状況を説明……というのは、『学園対抗杯』の仕組みを、ですの？」"
translation = "「상황 설명……이라는 건, 『학원 대항배』의 구조를 말씀하시는 건가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「そうね。でも、何故そんなものがあるかを知るためにも、元凶であるリクリエの話からしておくべきでしょう」"
translation = "「그래. 하지만 왜 그런 것이 있는지 알기 위해서라도, 원흉인 리크리에 이야기부터 해두어야겠지」"

[[dialogue]]
speaker = "マハムート"
original = "「――これは普通の学園でも習うことだと思うけど、３０００年前に、リクリエというこの世を滅ぼしかねない<ruby>厄災<rt>やくさい</rt></ruby>が起こったわ」"
translation = "「――이건 일반적인 학원에서도 배우는 내용이겠지만, 3000년 전에 리크리에라는 세상을 멸망시킬 뻔한 재앙이 일어났어」"

[[dialogue]]
speaker = "マハムート"
original = "「それは魔族である私の故郷の魔界、天使のハーフであるヒルディオーネのルーツがある天界、そしてここ人間界……その三界すべてを飲み込む悪夢だったと言われているの」"
translation = "「그건 마족인 내 고향인 마계, 천사의 하프인 힐디오네의 뿌리가 있는 천계, 그리고 여기 인간계…… 그 삼계 모두를 집어삼키는 악몽이었다고 전해져」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「３０００年前は、天使、魔族、人間がそれぞれ協力して、リクリエの厄災を防いだそうですわ。その時の最終決戦場がここ、流星市国であった……と」"
translation = "「3000년 전에는 천사, 마족, 인간이 각자 협력해서 리크리에의 재앙을 막았다고 해요. 그때의 최종 결전장이 이곳, 유성시국이었다……고」"

[[dialogue]]
speaker = "フェニエル"
original = "「……ごくりっ」"
translation = "「……꿀꺽」"

[[dialogue]]
speaker = "マハムート"
original = "「ことの詳細は伏せられているけれど、代々流星市国を治めている教皇庁の星見家は、３０００年前のリクリエ収束の立役者の一族とされているわ」"
translation = "「상세한 내용은 숨겨져 있지만, 대대로 유성시국을 통치하고 있는 교황청의 호시미 가문은, 3000년 전 리크리에 수습의 주역이었던 일족으로 여겨지고 있어」"

[[dialogue]]
speaker = "マハムート"
original = "「そして、３０００年前から、リクリエはこれで終わりではない、また再び、より力を増して戻って来るであろうことが予言されていたの」"
translation = "「그리고 3000년 전부터, 리크리에는 이것으로 끝이 아니며, 다시금 더 힘을 키워 돌아올 것이 예언되어 있었지」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「かつての厄災を防いだ者達は、『クルセイダース』と呼ばれていましたわ。彼らは『霊力』と呼ばれる力を使い、リクリエと戦っていたそうです」"
translation = "「과거의 재앙을 막았던 자들은 『크루세이더스』라고 불렸어요. 그들은 『영력』이라 불리는 힘을 사용해 리크리에와 싸웠다고 해요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「しかし、霊力は３０００年前の戦いで失われてしまいました。その代わりとして、我々が崇める女神様が新たに与えてくださった力が、『星力』ですの」"
translation = "「하지만 영력은 3000년 전의 전투에서 소실되고 말았어요. 그 대신으로서 우리가 숭배하는 여신님께서 새로이 내려주신 힘이 『성력』이에요」"

[[dialogue]]
speaker = "マハムート"
original = "「そうは言っても、３０００年も前の話よ。権威化された神話であるし、どこまでが史実で、どこからが創作なのか、後世の民である我々には計りようもないけれどね」"
translation = "「그렇게 말해도 3000년 전의 이야기야. 권위화된 신화이기도 하고, 어디까지가 사실이고 어디부터가 창작인지 후세의 민초인 우리로서는 가늠할 방법이 없지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "マムは女神を信仰したりしてないんですか？"
translation = "마무는 여신을 신앙하거나 하지 않나요?"

[[dialogue]]
speaker = "マハムート"
original = "「微妙なところね。流星教の信徒かと言われれば、明確にノーよ。だけど、女神の加護をまったく信じていないのかと言えば、そういうわけでもないわ」"
translation = "「미묘한 부분이네. 유성교의 신도냐고 묻는다면 명확히 노야. 하지만 여신의 가호를 전혀 믿지 않느냐고 하면, 그런 것도 아니야」"

[[dialogue]]
speaker = "マハムート"
original = "「この世界に女神の足跡を裏付けるものはいくつかあって、『星力』はそのうちのひとつ。竜の魔族として、力には敬意を払う用意があるわ」"
translation = "「이 세계에 여신의 발자취를 뒷받침하는 것들이 몇 가지 있는데, 『성력』은 그중 하나지. 용의 마족으로서 힘에는 경의를 표할 용의가 있어」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「全く……女神様の加護をただの力呼ばわりだなんて、とんだ不信心者ですわ」"
translation = "「참 나…… 여신님의 가호를 단순한 힘 취급하다니, 엄청난 불신자로군요」"

[[dialogue]]
speaker = "マハムート"
original = "「わざわざ天界から流星市国に帰化した天使様の一族に、信心で競おうとは思わないわよ」"
translation = "「일부러 천계에서 유성시국으로 귀화한 천사님 일족과 신심으로 경쟁할 생각은 없어」"

[[dialogue]]
speaker = "フェニエル"
original = "「わ、私も……本当は天使らしいのですが、信心とかはよくわからなくて……。ううっ、ごめんなさい、お姉様……」"
translation = "「저, 저도…… 사실은 천사라고 합니다만, 신심 같은 건 잘 몰라서……. 우우, 죄송해요, 언니분……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いいのよ、フニ。信仰は与えられるものでも、強制されるものでもありませんわ。これからの人生で、あなたがあなたの信ずるものを見つけられればいいんですの」"
translation = "「괜찮아요, 후니. 신앙은 주어지는 것도, 강요받는 것도 아니에요. 앞으로의 인생에서 당신이 당신의 믿는 것을 찾아내면 되는 거예요」"

[[dialogue]]
speaker = "フェニエル"
original = "「お姉様……！\u3000私、女神様のことはなにもわからなくても、女神様を信じているお姉様のことなら、信じられますっ」"
translation = "「언니분……! 저, 여신님에 대해서는 아무것도 몰라도, 여신님을 믿고 있는 언니분이라면 믿을 수 있어요」"

[[dialogue]]
speaker = "マハムート"
original = "「こんな純粋無垢な子を、ヒルディーのところに預けていいのかは、本気で心配になってきたわね」"
translation = "「이런 순진무구한 아이를 힐디네 곳에 맡겨도 되는 건지 진심으로 걱정되기 시작하네」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「３０００年前に発見された星力は、特に若者に多く発現し、大人になると多くは消失してしまう能力であることも判明しましたわ」"
translation = "「3000년 전에 발견된 성력은 특히 젊은이들에게 많이 발현되고, 어른이 되면 대부분 소실되어 버리는 능력이라는 점도 판명되었어요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「予言によれば、リクリエは再びやってくるとのことでしたから、その対策と研究のために設立されたのが、現在に至るまで存在し続けている流星学園というわけですの」"
translation = "「예언에 따르면 리크리에는 다시 찾아올 것이라고 했기에, 그 대책과 연구를 위해 설립된 것이 현재까지 존재하고 있는 유성학원이라는 거예요」"

[[dialogue]]
speaker = "マハムート"
original = "「流星市国と流星学園は、リクリエの余波であるアステライトとモンスター対策も、長年担当してきた歴史があるわ」"
translation = "「유성시국과 유성학원은 리크리에의 여파인 아스텔라이트와 몬스터 대책도 오랫동안 담당해 온 역사가 있어」"

[[dialogue]]
speaker = "マハムート"
original = "「そして、予言に謳われたリクリエの厄災の再出現が、もうすぐであるという予想があるの」"
translation = "「그리고 예언에 읊조려진 리크리에 재앙의 재출현이 머지않았다는 예상이 있지」"

[[dialogue]]
speaker = "マハムート"
original = "「その備えの一環として、数十年前から準備されていて、つい６年前に開校されたのが、私たちの所属する新星学園というわけね」"
translation = "「그 대비의 일환으로 수십 년 전부터 준비되어, 불과 6년 전에 개교한 것이 우리가 소속된 신성학원이라는 거야」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「新星学園の特徴としては、流星学園よりも実験的な試みが多く、今まで以上に天界や魔界などから生徒を募集している点が挙げられますわね」"
translation = "「신성학원의 특징으로는 유성학원보다 실험적인 시도가 많고, 지금까지 이상으로 천계나 마계 등에서 학생을 모집하고 있다는 점을 들 수 있어요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そして、そんな流星学園と新星学園は、姉妹校であると同時に唯一無二のライバル校でもありますわ！」"
translation = "「그리고 그런 유성학원과 신성학원은 자매교인 동시에 유일무이한 라이벌교이기도 해요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「ライバル校……仲間のはずなのに、争ってしまうんですか？」"
translation = "「라이벌교…… 동료일 텐데도 서로 다투는 건가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「切磋琢磨、というやつよ。両学園は競い合い、互いに貪欲な勝利を求めあうことが推奨されているの。校則にすら、そう書かれているわ」"
translation = "「절차탁마라는 거지. 양 학원은 서로 경쟁하며 서로 탐욕스럽게 승리를 추구하는 것이 권장되고 있어. 교칙에조차 그렇게 적혀 있지」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「全ては来たるべきリクリエとの決戦に向けて備える為。私達は日々、競い合うことで、力を高め合っているのですわ」"
translation = "「모든 것은 다가올 리크리에와의 결전을 위해 대비하기 위함. 저희는 나날이 경쟁함으로써 서로의 힘을 높이고 있는 거예요」"

[[dialogue]]
speaker = "マハムート"
original = "「そして、その競争を推奨し、象徴する制度こそが、『学園対抗杯』なのよ」"
translation = "「그리고 그 경쟁을 권장하고 상징하는 제도가 바로 『학원 대항배』야」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「学園の星騎士の出撃は記録されていて、倒したモンスターの数や強さ、攻略したアステラはすべて明らかにされておりますの」"
translation = "「학원의 성기사 출격은 기록되고 있으며, 쓰러뜨린 몬스터의 수나 강함, 공략한 아스텔라는 모두 명확히 드러나요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「学園は新星開校以来、この数字を生徒たちにも公開して、両学園の生徒たちに競わせているのですわ」"
translation = "「학원은 신성 개교 이래 이 수치를 학생들에게도 공개하여, 양 학원의 학생들이 서로 경쟁하게 만들고 있는 거예요」"

[[dialogue]]
speaker = "マハムート"
original = "「ん？\u3000会長、何か質問かしら？」"
translation = "「응? 회장, 무슨 질문 있니?」"

[[dialogue]]
speaker = "マハムート"
original = "「――新星と流星の星騎士間で、敵の取り合いは発生しないのかって？」"
translation = "「――신성과 유성 성기사들 사이에 적을 가로채는 상황은 발생하지 않느냐고?」"

[[dialogue]]
speaker = "マハムート"
original = "「ほぼほぼ発生しないわね。プリマステラになるような子たちだもの、モンスターの危険性はみんなわかっているわ」"
translation = "「거의 거의 발생하지 않아. 프리마스텔라가 될 법한 아이들인걸, 몬스터의 위험성은 다들 알고 있어」"

[[dialogue]]
speaker = "マハムート"
original = "「でも、例えば流星が先に交戦したモンスターに、救援要請がないのに新星が手出ししない、みたいな暗黙の了解はあるわ」"
translation = "「하지만 예를 들어 유성이 먼저 교전 중인 몬스터에게 구원 요청이 없는데 신성이 참견하지 않는다, 같은 암묵적인 양해는 있지」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あとはそうですわね……アステライトの攻略については、早急な排除が求められる為、対処に当たった星徒会には平等に点が入るようになっていますわ」"
translation = "「그다음은 그렇네요…… 아스텔라이트 공략에 대해서는 조속한 배제가 요구되기에, 대처에 나선 성도회에는 평등하게 점수가 들어가도록 되어 있어요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ダンジョン内はより危険ですし、点取り合戦に熱中して、コアの排除が遅れたら元も子もありませんもの。協力してアステラを消滅させるのが優先ということですわ」"
translation = "「던전 안은 더욱 위험하고, 점수 따기에 열중하다가 코어 배제가 늦어지면 본전도 못 찾으니까요. 협력해서 아스텔라를 소멸시키는 것이 우선이라는 거예요」"

[[dialogue]]
speaker = "マハムート"
original = "「そういう理由もあって、アステラの対処をすることが多い星徒会同士は、代々ライバル意識が薄いのよ。一緒にアステラ攻略をした仲だから、みたいな感じでね」"
translation = "「그런 이유도 있어서 아스텔라 대처를 자주 하는 성도회끼리는 대대로 라이벌 의식이 옅어. 같이 아스텔라 공략을 한 사이니까, 같은 느낌으로 말이야」"

[[dialogue]]
speaker = "フェニエル"
original = "「確かに……それは仲良くなってしまいそうですね」"
translation = "「과연…… 그건 친해져 버릴 것 같네요」"

[[dialogue]]
speaker = "マハムート"
original = "「だけど――」"
translation = "「하지만――」"

[[dialogue]]
speaker = "マハムート"
original = "「私の寮長政権下では、そんなぬるま湯は言語道断よ……！！」"
translation = "「내 기숙사장 정권하에서는 그런 미지근한 상황은 언어도단이야……!!」"

[[dialogue]]
speaker = "マハムート"
original = "「学園対抗杯の優勝で手に入るのは、名誉だけではないわ！\u3000次年度の学園運営予算――」"
translation = "「학원 대항배 우승으로 얻는 것은 명예뿐만이 아니야! 차년도 학원 운영 예산――」"

[[dialogue]]
speaker = "マハムート"
original = "「そう！\u3000特に<b>寮予算</b>が、勝利した学園には多く割り振られるのよ！」"
translation = "「그래! 특히 <b>기숙사</b> <b>예산</b>이 승리한 학원에는 많이 배정되는 거야!」"

[[dialogue]]
speaker = "マハムート"
original = "「会長も見たでしょう！？\u3000流星寮のあり得ない高級設備を……！」"
translation = "「회장도 봤지!? 유성 기숙사의 말도 안 되는 고급 설비들을……!」"

[[dialogue]]
speaker = "unk"
original = "あれって学園対抗杯の影響なんですか！？"
translation = "저게 학원 대항배의 영향인가요!?"

[[dialogue]]
speaker = "マハムート"
original = "「そんなことあるわけないでしょう！！」"
translation = "「그럴 리가 없잖아!!」"

[[dialogue]]
speaker = "unk"
original = "ええぇぇ！？"
translation = "에에에!?"

[[dialogue]]
speaker = "マハムート"
original = "「流星は卒業生が多いのをいいことに、ＯＢ、ＯＧの寄付金で寮を好き勝手にグレードアップしてるのよ！」"
translation = "「유성은 졸업생이 많은 걸 기회 삼아 OB, OG들의 기부금으로 기숙사를 제멋대로 업그레이드하고 있는 거야!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000それこそが伝統！\u3000それだけ優秀な星騎士の方々を輩出して来たということですわ！」"
translation = "「오호호호! 그것이야말로 전통! 그만큼 우수한 성기사분들을 배출해 왔다는 증거예요!」"

[[dialogue]]
speaker = "マハムート"
original = "「こっちはまだ開校して６年なのよ！？\u3000不平等でしょうがっ！！」"
translation = "「이쪽은 이제 개교한 지 6년이라고!? 불공평하잖아!!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ふふっ、積み重ね＝パワーですわよ、マハムート。とはいえ、寮の設備云々で撃墜スコアが決まるわけではありませんわよね？」"
translation = "「후훗, 축적 = 파워예요, 마하무트. 그렇다고는 해도 기숙사 설비 따위로 격추 스코어가 결정되는 건 아니죠?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「３年連続で流星が勝利しているのは、私たち流星学園の生徒がそれだけ優秀だという証拠ですわ！」"
translation = "「3년 연속으로 유성이 승리하고 있는 건 저희 유성학원의 학생들이 그만큼 우수하다는 증거예요!」"

[[dialogue]]
speaker = "マハムート"
original = "「<ruby>星霊祭<rt>せいれいさい</rt></ruby>の舞闘会は、３年連続で新星が優勝してるのよ」"
translation = "「성령제의 무투회는 3년 연속으로 신성이 우승하고 있어」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。個人技の能力──特にマハムート、あなたの力は高く評価していますわ」"
translation = "「예. 개인기의 능력── 특히 마하무트, 당신의 힘은 높게 평가하고 있어요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「だから今年こそは、私がその天狗のように伸びた鼻っ面を叩き折って差し上げましてよ！」"
translation = "「그러니까 올해에말로 제가 그 텐구처럼 높게 솟은 콧대를 꺾어드리겠어요!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ……出来るものならやってみなさいな、蒸気女」"
translation = "「후훗…… 할 수 있다면 해보시지, 증기녀」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おほほっ♪\u3000何なら今から戦ってもよろしくてよ？\u3000チビドラゴンさん？」"
translation = "「오호호♪ 원하신다면 지금부터 싸워드려도 괜찮은데? 꼬마 드래곤 양?」"

[[dialogue]]
speaker = "unk"
original = "先輩方、脱線してますよ"
translation = "선배님들, 이야기가 샜어요"

[[dialogue]]
speaker = "マハムート"
original = "「……コホン。ともかく、寮予算が潤沢にある流星に、これ以上いい思いはさせられないってわけ」"
translation = "「……크흠. 아무튼 기숙사 예산이 풍족한 유성에게 더 이상 좋은 꼴을 보게 할 수는 없다는 뜻이야」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私たちも、先輩方が築き上げてきた栄光を、ここで終わらせるわけにはいかないという矜持がありますわ」"
translation = "「저희도 선배님들이 쌓아오신 영광을 여기서 끝낼 수는 없다는 긍지가 있어요」"

[[dialogue]]
speaker = "フェニエル"
original = "「学園対抗杯には、そんな歴史があったんですね……。とても勉強になりましたっ」"
translation = "「학원 대항배에 그런 역사가 있었군요……. 정말 공부가 되었어요」"

[[dialogue]]
speaker = "マハムート"
original = "「で、会長にとっては、今日私が教えていた月次報告書に話が戻るというわけね」"
translation = "「자, 회장에게 있어서는 오늘 내가 가르쳐주던 월차 보고서 이야기로 돌아간다는 거네」"

[[dialogue]]
speaker = "マハムート"
original = "「これで毎月の撃墜スコアを集計して、年度末になるとそれを合算……その結果で、その年の学園対抗杯の勝者が決まるわ」"
translation = "「이걸로 매달 격추 스코어를 집계하고 연말이 되면 그것을 합산…… 그 결과로 그해의 학원 대항배 승자가 결정돼」"

[[dialogue]]
speaker = "マハムート"
original = "「まあでも、ひと月分だって負けるのは気に食わないもの。今月分だけでも１回白黒付けましょう、というのが今回の催し――」"
translation = "「뭐 하지만 한 달 분이라도 지는 건 기분 나쁘니까. 이번 달 분만이라도 한번 흑백을 가리자는 것이 이번 행사――」"

[[dialogue]]
speaker = "マハムート"
original = "「『寮生争奪チキチキ花いちもんめバトルウィーク』の主旨よ」"
translation = "「『기숙사생 쟁탈 치키치키 꽃찾기 배틀 위크』의 취지야」"

[[dialogue]]
speaker = "unk"
original = "マムって、意外とノリいいですよね……"
translation = "마무는 의외로 분위기를 잘 타네요……"

[[dialogue]]
speaker = "マハムート"
original = "「力比べとゲームは好きよ。特にそこの調子に乗ってるお嬢様には、ギャフンと言わせてやらないと」"
translation = "「힘겨루기와 게임은 좋아해. 특히 저기 우쭐해 있는 아가씨에게는 뜨거운 맛을 보여줘야지」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あら、その言葉、そっくりそのままお返し致しますわ♪」"
translation = "「어머, 그 말 그대로 돌려드리지요♪」"

[[dialogue]]
speaker = "マハムート"
original = "「というわけで、明日から<ruby>新星寮<rt>ラルーナ</rt></ruby>全員でパトロールの本数を増やして、どんどんモンスターを狩っていくわ。会長も参加なさい」"
translation = "「그런 고로 내일부터 <ruby>신성 기숙사<rt>라 루나</rt></ruby> 전원이서 순찰 횟수를 늘려서 몬스터를 팍팍 사냥해 나갈 거야. 회장도 참여해」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フニ。私たちは余裕を忘れず、常に優雅に、<ruby>流星寮<rt>イルソーレ</rt></ruby>に勝利をもたらしますわよ」"
translation = "「후니. 저희는 여유를 잊지 말고 항상 우아하게 <ruby>유성 기숙사<rt>일 소레</rt></ruby>에 승리를 가져다주자고요」"

[[dialogue]]
speaker = "フェニエル"
original = "「はいっ、お姉様！」"
translation = "「네, 언니분!」"

[[dialogue]]
speaker = "unk"
original = "こうして、本格的に争奪戦の幕が切って落とされるのだった――"
translation = "이렇게 본격적으로 쟁탈전의 막이 올랐다――"

