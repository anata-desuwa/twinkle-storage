[[dialogue]]
speaker = "unk"
original = "第３話,ナミエルとアフタークリスマス①,P"
translation = "제3화, 나미엘과 애프터 크리스마스①, P"

[[dialogue]]
speaker = "unk"
original = "俺――緋宮クロトはその日、ナミエルとデートにやってきていた。"
translation = "나――히노미야 쿠로토는 그날, 나미엘과 데이트를 하러 왔었다."

[[dialogue]]
speaker = "unk"
original = "今回のクリスマスは、クリスマスフォームの一件で２人で過ごすことができなかった。その為、埋め合わせをしようと、改めてデートをすることになったのだ。"
translation = "이번 크리스마스는, 크리스마스 폼 사건으로 둘이서 보낼 수 없었다. 그래서, 만회를 하려고, 다시 데이트를 하게 된 것이다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――久しぶりに一緒に出かけると、回りたいところが沢山ありますね」"
translation = "「――오랜만에 함께 외출하니, 돌아다니고 싶은 곳이 많네요」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「とはいえ、結構歩き回りましたし、近くのスイーツカフェで可愛いスイーツを食べながら、少し休憩にしませんか？」"
translation = "「그렇다고 해도, 꽤 걸어 다녔으니, 근처 스위츠 카페에서 귀여운 스위츠를 먹으면서, 잠시 쉬는 게 어떨까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「実は今日、会長に話しておきたいこともあったので……」"
translation = "「실은 오늘, 회장에게 이야기해 두고 싶은 것도 있었기 때문에……」"

[[dialogue]]
speaker = "unk"
original = "それからスイーツカフェで、俺はナミエルから『実は今までクリスマスが苦手だった』という話を聞かされることになった。"
translation = "그리고 스위츠 카페에서, 나는 나미엘에게 『실은 지금까지 크리스마스가 싫었다』는 이야기를 듣게 되었다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――といった感じで、私の両親がクリスマスの交通事故で亡くなったという話を、アム先輩に話したんです」"
translation = "「――이런 식으로, 제 부모님이 크리스마스 교통사고로 돌아가셨다는 이야기를, 아무 선배에게 했습니다」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「なので、恋人としてお付き合いしている会長にも、ちゃんと話しておきたいと思いまして……」"
translation = "「그래서, 연인으로서 교제하고 있는 회장에게도, 제대로 이야기해 두고 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "わざわざ話してくれてありがとう"
translation = "일부러 이야기해 줘서 고마워"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ……こうして話そうと思えたのは、アム先輩のおかげです。指摘してもらえなければ、私はいつまでも胸の内に抱えたまま、今も話せずにいたかもしれません」"
translation = "「아뇨…… 이렇게 이야기할 수 있게 된 것은, 아무 선배 덕분입니다. 지적해 주지 않았다면, 저는 언제까지나 가슴속에 품은 채, 지금도 이야기하지 못하고 있었을지도 모릅니다」"

[[dialogue]]
speaker = "unk"
original = "クリスマス期間中に、ナミエルが浮かない顔をしていたことにアムが気づいて、それで事情を尋ねたのだという。"
translation = "크리스마스 기간 중에, 나미엘이 우울한 얼굴을 하고 있는 것을 아무가 눈치채고, 그래서 사정을 물어본 것이라고 한다."

[[dialogue]]
speaker = "unk"
original = "本当は俺が先に気づかなきゃいけなかったな"
translation = "사실은 내가 먼저 눈치챘어야 했는데"

[[dialogue]]
speaker = "unk"
original = "ナミエル、ごめん"
translation = "나미엘, 미안해"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ、会長。そんな顔をしないで下さい。至らないところがあるのは、私の方も一緒ですから」"
translation = "「아뇨, 회장. 그런 얼굴 하지 마세요. 부족한 점이 있는 것은, 저도 마찬가지니까요」"

[[dialogue]]
speaker = "unk"
original = "――なら、彼氏として、これからはクリスマスのいい思い出を沢山を作っていかないとな。"
translation = "――그렇다면, 남자친구로서, 이제부터는 크리스마스의 좋은 추억을 많이 만들어 나가야겠네."

[[dialogue]]
speaker = "unk"
original = "俺はそう伝えながら、持ってきた物を鞄から取り出して、ナミエルに手渡す。"
translation = "나는 그렇게 전하면서, 가져온 물건을 가방에서 꺼내서, 나미엘에게 건넨다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ……約束していたクリスマスプレゼントの交換、ですね。では私も――こちらをどうぞ」"
translation = "「앗…… 약속했던 크리스마스 선물 교환, 이군요. 그럼 저도――이것을 받으세요」"

[[dialogue]]
speaker = "unk"
original = "ナミエルからもプレゼントを渡される。俺が先に開けさせてもらうと、そこに入っていたのは――ベージュ色の『マフラー』だった。"
translation = "나미엘에게서도 선물을 받는다. 내가 먼저 열어 보니, 그 안에 들어 있던 것은――베이지색의 『목도리』였다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「料理は苦手ですが……メイドとして編み物は学んでいますので、作ってみました。まぁ、その……恋人として定番のプレゼントというか……」"
translation = "「요리는 서툴지만…… 메이드로서 뜨개질은 배우고 있으니, 만들어 봤습니다. 뭐, 그…… 연인으로서 정석적인 선물이라고 할까……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「色と柄は会長に似合いそうな――可愛いけど、中性的で落ち着いた物を考えて選んでみました」"
translation = "「색깔과 무늬는 회장에게 어울릴 만한――귀엽지만, 중성적이고 차분한 것을 생각해서 골라봤습니다」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「会長、少し前にマフラーをボロボロにしてしまったと言って、それからは使ってませんでしたよね？」"
translation = "「회장, 조금 전에 목도리를 너덜너덜하게 만들었다고 말하고, 그 후로는 사용하지 않았었죠?」"

[[dialogue]]
speaker = "unk"
original = "実は少し前に、街でモンスターが現れた際、マフラーと荷物を置いて戦っていたら、それがモンスターの攻撃に巻き込まれてしまったのだ。"
translation = "실은 조금 전에, 거리에서 몬스터가 나타났을 때, 목도리와 짐을 두고 싸우고 있었는데, 그것이 몬스터의 공격에 휘말려 버린 것이다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですから、よければその代わりにと思いまして……」"
translation = "「그러니, 괜찮으시다면 그 대신으로 생각해서……」"

[[dialogue]]
speaker = "unk"
original = "ボロボロにならないよう、大切にするから"
translation = "너덜너덜해지지 않도록, 소중히 할게"

[[dialogue]]
speaker = "unk"
original = "ありがとう。これは絶対――"
translation = "고마워. 이것은 절대――"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ、そんな大切にしなくてもいいです」"
translation = "「아뇨, 그렇게 소중히 다루지 않아도 돼요」"

[[dialogue]]
speaker = "unk"
original = "えっ、と俺が驚いていると、ナミエルはちょっと気恥ずかしそうに、そっぽを向きながら続ける。"
translation = "엣, 하고 내가 놀라자, 나미엘은 조금 쑥스러운 듯이, 외면하며 계속한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ボロボロになってしまったら……また作り直しますから」"
translation = "「너덜너덜해져 버리면…… 다시 만들면 되니까요」"

[[dialogue]]
speaker = "unk"
original = "彼女への愛おしさが溢れてきて、俺はつい頭を撫でてしまう。"
translation = "그녀를 향한 사랑스러움이 넘쳐흘러서, 나는 무심코 머리를 쓰다듬어 버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ん……<emoji=heart04>\u3000か、会長……周りに人がいて、恥ずかしいですから……」"
translation = "「응……<emoji=heart04> 카, 회장…… 주위에 사람이 있어서, 부끄러우니까요……」"

[[dialogue]]
speaker = "unk"
original = "今度は俺のプレゼントを開けて欲しいとナミエルに言う。"
translation = "이번에는 내 선물을 열어 달라고 나미엘에게 말한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ……これは……！？\u3000この『ぬいぐるみ』、会長が作ったんですか……？」"
translation = "「앗…… 이건……!? 이 『인형』, 회장님이 만드신 건가요……?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「――昔、ぬいぐるみ作りのバイトをした時の経験を活かして作った？\u3000それで、ぬいぐるみのモチーフの『白鳥』は、愛を示すシンボルとして選んだもの……？」"
translation = "「――옛날에, 인형 만들기 아르바이트를 했을 때의 경험을 살려서 만들었다고요? 그래서, 인형 모티브인 『백조』는, 사랑을 나타내는 심벌로 선택한 것……?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……ちょっと驚きました。昔、なくしてしまった<b>アヒル</b>のぬいぐるみに雰囲気が似てて……」"
translation = "「……조금 놀랐어요. 옛날에 잃어버렸던 <b>오리</b> 인형과 분위기가 닮아서……」"

[[dialogue]]
speaker = "unk"
original = "デフォルメに失敗した！？"
translation = "데포르메에 실패했다!?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「可愛くしようと思って、デフォルメに挑戦したんですか？\u3000ふふっ……なるほど」"
translation = "「귀엽게 만들려고, 데포르메에 도전한 건가요? 후훗…… 과연」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「でも、すごく可愛いです。――大切にします♪」"
translation = "「하지만, 정말 귀여워요. ――소중히 할게요♪」"

[[dialogue]]
speaker = "unk"
original = "ナミエルは嬉しそうに、ぎゅっとぬいぐるみを抱き締めるのだった。"
translation = "나미엘은 기쁜 듯이, 꼬옥 인형을 끌어안는 것이었다."

[[dialogue]]
speaker = "unk"
original = "その後、デートを再開したが――あっという間に時間は過ぎて。"
translation = "그 후, 데이트를 재개했지만――눈 깜짝할 사이에 시간은 지나가고."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もうすっかり辺りが暗くなってしまいましたね……」"
translation = "「벌써 주변이 완전히 어두워져 버렸네요……」"

[[dialogue]]
speaker = "unk"
original = "残念だけど、今日はこのくらいにしとこうか"
translation = "아쉽지만, 오늘은 이쯤에서 끝내도록 할까"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "하고, 그때였다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「え……？\u3000どうして勝手にクリスマスフォームに……！？」"
translation = "「에……? 왜 멋대로 크리스마스 폼으로……!?」"

[[dialogue]]
speaker = "unk"
original = "何故か突然、その場でクリスマスフォームに変身してしまったナミエルは、驚いたように目をぱちくりさせるのだった。"
translation = "왠지 갑자기, 그 자리에서 크리스마스 폼으로 변신해 버린 나미엘은, 놀란 듯이 눈을 깜빡이는 것이었다."

