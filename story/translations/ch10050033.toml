[[dialogue]]
speaker = "unk"
original = "第３話,ぴとっとソフィア,P"
translation = "제3화, 착 달라붙은 소피아, P"

[[dialogue]]
speaker = "リップル"
original = "「フー……なかなか困りましたデスね。例の隙間風はまだ元気ハツラツのようデース」"
translation = "「후ー…… 꽤 곤란하게 됐네욤. 그 틈새바람은 아직 기운이 펄펄한 모양임다ー.」"

[[dialogue]]
speaker = "unk"
original = "リゾート結界に時おり訪れる『隙間風』は、未だ解決を見ていなかった。"
translation = "리조트 결계에 때때로 찾아오는 『틈새바람』은, 아직 해결되지 않은 상태였다."

[[dialogue]]
speaker = "ソフィア"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "unk"
original = "何してるの？"
translation = "뭐 하고 있어?"

[[dialogue]]
speaker = "unk"
original = "ソフィア？"
translation = "소피아?"

[[dialogue]]
speaker = "ソフィア"
original = "「風よけです。また、いつあの極寒の風が吹くやらわかりませんから。会長さんの後ろに隠れることで、寒波をやり過ごせるというわけです」"
translation = "「바람막이예요. 또 언제 그 극심한 추위의 바람이 불어올지 모르니까요. 회장님 뒤에 숨음으로써, 한파를 넘길 수 있다는 계산이죠.」"

[[dialogue]]
speaker = "unk"
original = "密着してない？"
translation = "너무 밀착한 거 아냐?"

[[dialogue]]
speaker = "unk"
original = "風よけっていうか"
translation = "바람막이라기보다"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんを風よけにしつつ、私は人肌で温もりをチャージ！\u3000ん～、実にホット……これぞ一挙両得の戦法というわけです」"
translation = "「회장님을 바람막이로 삼으면서, 저는 사람의 온기로 온기를 충전! 음~, 정말 핫하네요…… 이것이야말로 일거양득의 전법이라는 거예요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「それに──ふふ。会長さんだって、水着の私に釘付けだったじゃありませんか。わかっちゃうんですからね、そういうの」"
translation = "「게다가── 후후. 회장님도, 수영복 차림인 저에게서 눈을 떼지 못했잖아요. 다 알고 있으니까요, 그런 건.」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんは、寒さに凍える私を見捨てたりしませんよね……？」"
translation = "「회장님은, 추위에 떨고 있는 저를 못 본 체하지 않으시겠죠……?」"

[[dialogue]]
speaker = "ユウリ"
original = "「おーい、ソフィア──って……何やってんだ？\u3000２人でぴったりくっついて」"
translation = "「어ー이, 소피아── 어라…… 뭐 하냐? 둘이서 딱 붙어가지고.」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんが、どうしても人肌が恋しいと。仕方ないので私がくっついてあげているのです。むふふ」"
translation = "「회장님이, 아무래도 사람의 온기가 그립다고 하셔서요. 어쩔 수 없이 제가 붙어주고 있는 거예요. 무후후.」"

[[dialogue]]
speaker = "unk"
original = "実はそう"
translation = "사실은 그래"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "ユウリ"
original = "「ホントか？\u3000会長のほう、驚いた顔してたけど……」"
translation = "「진짜냐? 회장 쪽은 놀란 얼굴을 하고 있는데……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ま、仲が良いのはいいことか。おまえ達見てたら、あたしのほうもなんか熱くなってきちまったよ」"
translation = "「뭐, 사이가 좋은 건 좋은 거지. 너희를 보고 있으니까, 나까지 왠지 뜨거워지는 기분이라고.」"

[[dialogue]]
speaker = "ルリエル"
original = "「あーっ！\u3000ソフィアと会長さんが２人でいちゃいちゃしてますーっ、ここの日差しよりもアチアチですーっ！」"
translation = "「아ー앗! 소피아랑 회장님이 둘이서 꽁냥거리고 있어욤ー, 여기 햇살보다 뜨거워욤ー!」"

[[dialogue]]
speaker = "アポロ"
original = "「ソフィアめ。あたしと変わんないくらいの背のくせに、もう大人の階段を昇ってんのか」"
translation = "「소피아 녀석. 나랑 별 차이도 없는 키 주제에, 벌써 어른의 계단을 오르고 있는 거냐구.」"

[[dialogue]]
speaker = "ソフィア"
original = "「まあ私は大人の女性ですが……そ、そんなに注目されると少しばかり恥ずかしいですね」"
translation = "「뭐 저는 어른스러운 여성이니까요…… 그, 그렇게 주목받으면 조금 부끄럽네요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「これはいちゃいちゃしたくてくっついているわけではないのです。あくまで寒さを凌ぐため、そうですよね会長さん？」"
translation = "「이건 꽁냥거리고 싶어서 붙어 있는 게 아니에요. 어디까지나 추위를 견디기 위해, 그렇죠 회장님?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ほらほら、もっとしっかり引っ付いて、風よけとしての役目を果たしてください」"
translation = "「자자, 좀 더 꽉 달라붙어서, 바람막이로서의 역할을 다해 주세요.」"

[[dialogue]]
speaker = "unk"
original = "こうすればあったかい？"
translation = "이렇게 하면 따뜻해?"

[[dialogue]]
speaker = "unk"
original = "それならいっそ……"
translation = "그럴 바엔 차라리……"

[[dialogue]]
speaker = "ソフィア"
original = "「な……！！」"
translation = "「나……!!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ななな、なんでいきなり抱きしめたりしてきて……！」"
translation = "「나나나, 왜 갑자기 껴안고 그러시는 거예요……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「う……それは、抱きしめてもらっていたほうが温かいですけど……」"
translation = "「으…… 그건, 안아주시는 쪽이 더 따뜻하긴 하지만……」"

[[dialogue]]
speaker = "ソフィア"
original = "「で、でもっ！\u3000みんなが見ている前で恥ずかしすぎます！\u3000離れてください！」"
translation = "「하, 하지만! 모두가 보고 있는 앞에서 너무 부끄러워요! 떨어져 주세요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ううっ、ブルブル！\u3000や、やっぱりダメです！\u3000離れないで、ギュッてしててください！」"
translation = "「으으, 덜덜덜! 아, 역시 안 돼요! 떨어지지 말고, 꽉 안아주세요!」"

[[dialogue]]
speaker = "セーラ"
original = "「あはは、なによ～。やってること、やっぱイチャイチャじゃん♪」"
translation = "「아하하, 뭐야~. 하는 짓이, 역시 꽁냥거리는 거잖아♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ。２人とも微笑ましいわ」"
translation = "「후후. 둘 다 보기 좋네.」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、姉さん」"
translation = "「어, 언니.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ソフィと会長くんが仲が良いのは何よりだけれど……私としては、少し妬けちゃうわね。妹の成長って意味でも」"
translation = "「소피랑 회장군이 사이가 좋은 건 무엇보다 기쁘지만…… 나로서는, 조금 샘이 나네~. 여동생의 성장이라는 의미에서도.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふふん。私だっていつまでも子どもではないのです」"
translation = "「후훈. 저도 언제까지나 어린애는 아니라고요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「……つかさ。今さらかもしんねーけど──サーシャさんの水着姿、やっぱ破壊力がすごいよな」"
translation = "「……근데 말이야. 이제 와서 하는 소리일지도 모르겠지만── 사샤 씨의 수영복 차림, 역시 파괴력이 장난 아니네.」"

[[dialogue]]
speaker = "アポロ"
original = "「わかるぞ。あれこそ大人のナイスバディーって感じだ。あたしも成長したらああならねーかな……？」"
translation = "「알 것 같다구. 저거야말로 어른의 나이스 바디라는 느낌이라구. 나도 성장하면 저렇게 되려나……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ごく……ど、どんな感触なんでしょうね？\u3000女としてもちょっと気になると申しますか……」"
translation = "「꿀꺽…… 어, 어떤 감촉일까욤? 여자로서도 조금 궁금하다고나 할까욤……」"

[[dialogue]]
speaker = "サーシャ"
original = "「もう。女の子がそんなこと言うものじゃないわよ」"
translation = "「정말. 여자아이가 그런 소리를 하는 게 아니란다.」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんはすごい"
translation = "사샤 씨는 대단해"

[[dialogue]]
speaker = "unk"
original = "確かに……"
translation = "확실히……"

[[dialogue]]
speaker = "ソフィア"
original = "「く……姉さんの水着……！\u3000身内にここまで強力な伏兵が潜んでいたとは……！」"
translation = "「큭…… 언니의 수영복……! 내부에 이렇게나 강력한 복병이 숨어 있었다니……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「も、もうっ！\u3000メッ、です！\u3000まじまじと見てはいけません──あんなハレンチなカラダ！」"
translation = "「정, 정말이지! 안 돼요! 빤히 쳐다보면 안 된다고요── 저런 파렴치한 몸매!」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃんのことをハレンチ呼ばわりだなんて。傷つくわ～、ソフィ……」"
translation = "「언니를 파렴치하다고 부르다니. 상처받는걸~, 소피……」"

[[dialogue]]
speaker = "ソフィア"
original = "「だ、だって、そのボリュームは反則すぎます……！」"
translation = "「그, 그치만, 그 볼륨은 너무 반칙이에요……!」"

[[dialogue]]
speaker = "ユウリ"
original = "（ま、どっちもいい関係ってとこか）"
translation = "(뭐, 어느 쪽이든 좋은 관계라는 건가.)"

[[dialogue]]
speaker = "ルリエル"
original = "（ソフィア、楽しそうです！）"
translation = "(소피아, 즐거워 보여요!)"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、リゾートの午後は過ぎていった……。"
translation = "이래저래, 리조트의 오후는 지나갔다……."

