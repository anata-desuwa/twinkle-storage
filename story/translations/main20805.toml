[[dialogue]]
speaker = "unk"
original = "第５話,フィーニスの塔へ,B"
translation = "제5화, 피니스의 탑으로, B"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「おはよう。朝ご飯できてるぞ」"
translation = "「안녕. 아침 밥 다 됐다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いつもありがとう。アポロには世話になりっぱなしだな」"
translation = "「언제나 고마워. 아폴로에게는 계속 신세만 지는군.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おはようございます。秘密基地で過ごしているうちに、姉さんの朝食が楽しみになってきました」"
translation = "「좋은 아침이에요. 비밀기지에서 지내는 동안, 언니의 아침 식사가 기다려지게 되었어요.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そいつは嬉しいな。リノ以外にも食べてくれる相手ができて、あたしも作り甲斐がある」"
translation = "「그거 기쁜걸. 리노 말고도 먹어줄 상대가 생겨서, 나도 만드는 보람이 있어.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「お、今日はお味噌汁に玉子焼き、塩じゃけ、おひたしか……和食もいいねぇ。なんだかほっとするよ」"
translation = "「오, 오늘은 된장국에 계란말이, 자반고등어, 나물인가…… 일식도 좋네. 왠지 마음이 놓여.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなた守護天使でしょ」"
translation = "「당신 수호천사잖아.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「流星市国暮らしも長いからねー」"
translation = "「유성시국 생활도 기니까 말이야~」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「おはよう」"
translation = "「안녕.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おはよー」"
translation = "「안녕~」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ、朝ご飯できてる。ありがとう、アポロちゃん」"
translation = "「아, 아침 밥 다 됐다. 고마워, 아폴로짱.」"

[[dialogue]]
speaker = "unk"
original = "そこに選挙管理委員会の３人も起きてきて……"
translation = "거기에 선거관리위원회의 3명도 일어나 오고……"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「おっはよー！\u3000今日も一日頑張りましょ！」"
translation = "「안녀엉! 오늘도 하루 힘내자!」"

[[dialogue]]
speaker = "unk"
original = "最後に母さんがやってきて、今秘密基地にいる全員が揃った。"
translation = "마지막으로 어머니가 오셔서, 지금 비밀기지에 있는 전원이 모였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃ……いただきまーす！」"
translation = "「그럼…… 잘 먹겠습니다!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし、じゃあ食べながら調査の結果をまとめるぞ」"
translation = "「좋아, 그럼 먹으면서 조사 결과를 정리하자.」"

[[dialogue]]
speaker = "unk"
original = "５日間ルヴィネの尾行を続けて記録した、彼女の行動パターンは……"
translation = "5일 동안 루비네의 미행을 계속하며 기록한, 그녀의 행동 패턴은……"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まず、ルヴィネは極星学園の寮に住んでいる。寮の場所は、アルタイルの流星寮と同じだね」"
translation = "「먼저, 루비네는 극성학원의 기숙사에 살고 있어. 기숙사 위치는, 알타이르의 유성 기숙사와 같네.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「学園に登校したら、パトロールに出発」"
translation = "「학원에 등교하면, 패트롤을 출발.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「モンスターと遭遇したら、すぐさま駆逐。モンスターがいない場合はいろんなところでバイトしてるね」"
translation = "「몬스터와 조우하면, 즉시 구축. 몬스터가 없는 경우는 여러 곳에서 아르바이트를 하고 있어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「何のためにバイトしてるんだろうね？\u3000まさか救世主様が金欠ってことはないと思うけど」"
translation = "「무엇을 위해 알바를 하는 걸까? 설마 구세주님께서 돈이 부족할 리는 없다고 생각하는데.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「前に聞いた時は、世界を知るため……みたいなこと言ってた気がする」"
translation = "「전에 물어봤을 때는, 세계를 알기 위해…… 같은 말을 했던 기분이 들어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「世界を知るため、ね。勉強熱心だね」"
translation = "「세계를 알기 위해, 라. 공부에 열심이네.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「バイトしまくってるとか、どっかの誰かさんみたいだ。奇遇だね」"
translation = "「알바를 엄청나게 한다니, 어디의 누구 씨 같네. 기묘한 우연이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は入学資金のためだったんだけどな……いい経験になったけど」"
translation = "「나는 입학 자금을 위해서였지만…… 좋은 경험이 됐지.」"

[[dialogue]]
speaker = "unk"
original = "そしてルヴィネの尾行でわかったことがもう１つ──"
translation = "그리고 루비네의 미행으로 알게 된 것이 한 가지 더──"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ルヴィネは昼過ぎになると、毎日のようにフィーニスの塔の中へ姿を消す」"
translation = "「루비네는 낮이 지나면, 매일같이 피니스의 탑 안으로 모습을 감춰.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だが戻ってくる時間はまちまちで、すぐに戻ってきて再びバイトに精を出すこともあれば、深夜を回ってからフィーニスの塔から出てくることもある」"
translation = "「하지만 돌아오는 시간은 제각각이라, 금방 돌아와서 다시 알바에 정성을 쏟을 때도 있고, 심야가 지나서야 피니스의 탑에서 나올 때도 있어.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ベアトは知ってたか？」"
translation = "「베아토는 알고 있었어?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ううん。ルヴィがフィーニスの塔に行ってるのは知ってたけど、そんな毎日だとは思わなかった」"
translation = "「으응. 루비가 피니스의 탑에 가고 있는 건 알고 있었지만, 그렇게 매일일 줄은 몰랐어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんなも知っての通り、フィーニスの塔は女神の聖域だ」"
translation = "「모두 알다시피, 피니스의 탑은 여신의 성역이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そしてルヴィネは女神の声が聞こえると言っていた。ルヴィネの言葉の真偽は不明だが、おそらくフィーニスの塔で何かしているんだろう」"
translation = "「그리고 루비네는 여신의 목소리가 들린다고 말했지. 루비네의 말의 진위는 불분명하지만, 아마 피니스의 탑에서 무언가 하고 있는 거겠지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーし！\u3000じゃあ私たちもフィーニスの塔に入って、現場を押さえるわよ！」"
translation = "「좋아! 그럼 우리도 피니스의 탑에 들어가서, 현장을 덮치자!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待て、ヴィーナス。フィーニスの塔にはディザスターハンドがいるかもしれない」"
translation = "「기다려, 비너스. 피니스의 탑에는 디재스터 핸드가 있을지도 몰라.」"

[[dialogue]]
speaker = "unk"
original = "アルタイルでフィーニスの塔に登った時、ディザスターハンドに襲われ、命からがら逃げ出した。"
translation = "알타이르에서 피니스의 탑에 올랐을 때, 디재스터 핸드에게 습격당해, 목숨만 겨우 건져 도망쳤다."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドと遭遇したのはアルタイルだが、あれは平行世界を超えることができる。"
translation = "디재스터 핸드와 조우한 것은 알타이르지만, 그것은 평행세계를 넘나들 수 있다."

[[dialogue]]
speaker = "unk"
original = "ならばデネブに現れても不思議じゃない。"
translation = "그렇다면 데네브에 나타나도 이상하지 않다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『コテツに入れば玉の輿』っていうでしょ！\u3000このままじゃ大事なことはわからないままよ！」"
translation = "「『호랑이 굴에 들어가야 호랑이 새끼를 잡는다』고 하잖아! 이대로는 중요한 건 모르는 채라고!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「虎穴に入らずんば虎子を得ず……か？\u3000だが一理あるか」"
translation = "「호혈에 들어가지 않으면 호자를 얻지 못한다…… 인가? 하지만 일리가 있군.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ディザスターハンドが脅威だということは聞いています」"
translation = "「디재스터 핸드가 위협적이라는 것은 들었습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが私は魔王フォームを体得しましたし、ヴィーナスさんもノヴァフォームを使えるようになったので、遭遇しても撤退することはできるのではないでしょうか」"
translation = "「하지만 저는 마왕 폼을 체득했고, 비너스 씨도 노바 폼을 사용할 수 있게 되었으니, 조우하더라도 철수할 수는 있지 않을까요.」"

[[dialogue]]
speaker = "unk"
original = "確かに今はあの時と比べて戦力は大きく向上しているし、ディザスターハンドの存在を知っているから、ある程度想定した動きができる。"
translation = "확실히 지금은 그때와 비교해 전력이 크게 향상되었고, 디재스터 핸드의 존재를 알고 있으니, 어느 정도 상정한 움직임을 할 수 있다."

[[dialogue]]
speaker = "unk"
original = "足踏みしているわけにはいかないし、リスクを取るのもやむなし……か。"
translation = "제자리걸음만 하고 있을 수는 없고, 리스크를 감수하는 것도 어쩔 수 없는 일인가……."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よし、行こう。フィーニスの塔へ」"
translation = "「좋아, 가자. 피니스의 탑으로.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「決まりね」"
translation = "「결정됐네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトとナターシャもそれで構わないか？」"
translation = "「베아토와 나타샤도 그걸로 괜찮겠나?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いいよ。いつまで経っても成果なしってわけにはいかないからね」"
translation = "「좋아. 언제까지고 성과 없음으로 있을 수는 없으니까 말이야.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん。ルヴィが何をしているのか、私も知りたいから」"
translation = "「응. 루비가 무엇을 하고 있는지, 나도 알고 싶으니까.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「じゃあボクはフィーニスの塔の中に入ったら、別行動させてもらうよ」"
translation = "「그럼 난 피니스의 탑 안에 들어가면, 따로 행동하도록 할게.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「一緒に来ないのか？」"
translation = "「같이 가지 않는 건가?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん。ちょっと心当たりがあるんだ」"
translation = "「응. 좀 짚이는 구석이 있거든.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボクがヴィーナスとともにアルタイルへ渡る時、半身をデネブに残してきたんだ」"
translation = "「내가 비너스와 함께 알타이르로 건너갈 때, 반신을 데네브에 남겨두었어.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「考えてもみてよ。１０年も守護天使が不在だったら、今頃デネブは大変なことになってるでしょ」"
translation = "「생각해 봐. 10년이나 수호천사가 부재했다면, 지금쯤 데네브는 난리가 났을걸.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう言われれば確かに……」"
translation = "「그렇게 말하니 확실히……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボクの半身は第零層に潜ませて、権能の維持と、塔内の情報の収集をさせている。接触できれば情報を得られるはずだよ」"
translation = "「내 반신을 제0층에 잠복시켜서, 권능의 유지와 탑 안의 정보 수집을 시키고 있어. 접촉할 수 있다면 정보를 얻을 수 있을 거야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。二面作戦でいこう」"
translation = "「알았다. 양면 작전으로 가자.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネを追うのも確実ではない以上、情報を得る手段は複数あった方がいいだろう。"
translation = "루비네를 쫓는 것도 확실하지 않은 이상, 정보를 얻을 수단은 여러 개 있는 편이 좋을 것이다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「じゃあ私とアポロちゃんは、緊急の時、あなたたちがアルタイルに帰れるよう準備しておくわね」"
translation = "「그럼 나랑 아폴로짱은, 긴급할 때 너희가 알타이르로 돌아갈 수 있도록 준비해 둘게.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルタイルに戻れるの？」"
translation = "「알타이르로 돌아갈 수 있어?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええ。具体的には──」"
translation = "「응. 구체적으로는──」"

