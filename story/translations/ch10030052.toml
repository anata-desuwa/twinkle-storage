[[dialogue]]
speaker = "unk"
original = "第２話,続・魔王ハーレム建造計画,P"
translation = "제2화, 속·마왕 하렘 건조 계획"

[[dialogue]]
speaker = "unk"
original = "ある日、俺はヴィーナスから九浄家に招かれて、遊びに来ていたのだが――"
translation = "어느 날, 나는 비너스의 초대를 받아 쿠죠 가문에 놀러 왔는데──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今日は、クロトの魔王ハーレム建造計画を進めるわよ！」"
translation = "「오늘은 쿠로토의 마왕 하렘 건조 계획을 진행할 거야!」"

[[dialogue]]
speaker = "unk"
original = "諦めてなかった……だと！？"
translation = "포기하지 않았었다고……!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だって、みんなで家族になるの、楽しそうじゃない？」"
translation = "「그치만 다 같이 가족이 되는 거 즐거울 것 같지 않아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ね！\u3000ヨミヨミ！」"
translation = "「그치! 요미요미!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え？\u3000私ですかっ！？」"
translation = "「에? 저 말입니까!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、それはそのぅ……。こやや……」"
translation = "「그, 그건 그게…… 꼬야야……」"

[[dialogue]]
speaker = "unk"
original = "俺から恥ずかしそうに視線をそらすヨミヨミ。何故そんな反応をするのかと思っていると――"
translation = "나에게서 부끄러운 듯 시선을 피하는 요미요미. 왜 그런 반응을 하는지 의아해하고 있자──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「実は昨日のうちに、ハーレムについて話しておいたのよ！」"
translation = "「사실 어제 미리 하렘에 대해 이야기해 뒀어!」"

[[dialogue]]
speaker = "unk"
original = "俺は事前に聞いてないんだけど！？"
translation = "나는 사전에 들은 적 없는데!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトは反対しそうだから、まずは外堀を埋めといたのよ！」"
translation = "「쿠로토는 반대할 것 같으니까 우선 주변부터 포위해 둔 거야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「だ、大事なことなので、まずは実家の両親に相談しないと……」"
translation = "「주, 중요한 일이니까 우선 본가의 부모님과 상의를 해야……」"

[[dialogue]]
speaker = "unk"
original = "全然外堀埋まってる感じじゃないんだけど！？"
translation = "전혀 주변이 포위된 느낌이 아닌데!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、クロトのことは嫌いじゃないってことよね！\u3000とりあえず、ヨミヨミは攻略済み、っと……」"
translation = "「하지만 쿠로토를 싫어하지 않는다는 거지! 일단 요미요미는 공략 완료, 라고……」"

[[dialogue]]
speaker = "unk"
original = "言いながらヴィーナスは、いつかの『未来の日誌』を思わせるデコレーションがされた『魔王ハーレム建造計画』というタイトルのノートに何やらメモをしている。"
translation = "말하면서 비너스는 예전의 『미래의 일지』를 연상시키는 장식이 된 『마왕 하렘 건조 계획』이라는 타이틀의 노트에 무언가를 메모하고 있다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000お嬢様、ちょ、ちょっと待って下さい！\u3000攻略済みというのは流石に、爆裂飛躍があるというか……！」"
translation = "「꼬얏!? 아가씨, 자, 잠깐 기다려 주세요! 공략 완료라니 그건 너무 비약이 심하다고 할까……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あら、お嬢様にヨミ、何してるの……って、会長っ！？」"
translation = "「어머, 아가씨랑 요미, 뭐 하고 있는 거야…… 어라, 회장님!?」"

[[dialogue]]
speaker = "unk"
original = "そこに現れたのは、ヨミヨミと同じく九浄家メイド隊で、そのメイド長を務めている蘭美であった。"
translation = "그곳에 나타난 것은 요미요미와 마찬가지로 쿠죠 가문 메이드대이며, 메이드장을 맡고 있는 라미였다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「い、言っとくけど、私はまだ、あなたをご主人様と認めたわけじゃないから！\u3000メイド長として、ちゃんと<b>慎重</b>に見極めてから決めるから！」"
translation = "「마, 말해두겠는데 난 아직 당신을 주인님으로 인정한 게 아니니까! 메이드장으로서 제대로 <b>신중하게</b> 지켜본 뒤에 결정할 거니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『最速』が口癖の蘭美がわざわざそう言うってことは、これも攻略済みと見て大丈夫そうね！\u3000メモメモ……」"
translation = "「『최속』이 말버릇인 라미가 굳이 그렇게 말한다는 건 이것도 공략 완료로 봐도 괜찮겠네! 메모메모……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「お嬢様！？\u3000その判断は速すぎるぴょん！？\u3000こういうのは時間をかけて、シチューを煮込むようにじっくりと焦らずに工程を経る必要が……！」"
translation = "「아가씨!? 그 판단은 너무 빨라요뿅!? 이런 건 시간을 들여서 시튜를 끓이듯이 느긋하게 서두르지 않고 공정을 거칠 필요가……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫よ！\u3000クロトなら、蘭美の望む主人になれると信じているわ！\u3000だって、クロトは世界を救う魔王だもの♪」"
translation = "「괜찮아! 쿠로토라면 라미가 원하는 주인이 될 수 있다고 믿어! 그야 쿠로토는 세계를 구하는 마왕인걸♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ、ちなみにせつなは、主様ならもちろん旦那様に大歓迎でござるよ～♪\u3000にんにん♪」"
translation = "「앗, 참고로 세츠나는 주님이라면 당연히 서방님으로 대환영이라오~♪ 닌닌♪」"

[[dialogue]]
speaker = "unk"
original = "メイド兼忍者でもあるせつなが、ドロンと煙と共に参上しながら言う。"
translation = "메이드 겸 닌자이기도 한 세츠나가 연기와 함께 나타나며 말한다."

[[dialogue]]
speaker = "unk"
original = "何となくそんな気はしてた……！"
translation = "왠지 그런 기분이 들긴 했어……!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「せつなは勝ち確ね！」"
translation = "「세츠나는 승리 확정이네!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふっふっふっ、主様が旦那様になった暁には、これまで使えなかった房中術を解禁して、あんなことやこんなことをにゃんにゃんしちゃうでござる<emoji=heart04>」"
translation = "「훗훗훗, 주님이 서방님이 되시는 새벽에는 지금까지 쓸 수 없었던 방중술을 해금해서 이런 일이나 저런 일을 냥냥해버리겠다오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「か、会長とにゃんにゃん……。こやや……」"
translation = "「회, 회장님이랑 냥냥…… 꼬야야……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あれ？\u3000みんな集まって何してるの……って、会長さん？\u3000もしかして……」"
translation = "「어라? 다들 모여서 뭐 해…… 어, 회장님? 혹시……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「美鶴、いいところに来たわね！\u3000この前言ってたハーレムの話よ！」"
translation = "「미츠루, 마침 잘 왔어! 저번에 말했던 하렘 이야기야!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ん～、うちは……ハーレムはちょっと嫌かな～」"
translation = "「음~ 전…… 하렘은 좀 싫으려나~」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「まあ、会長さんがお嬢様の旦那様になって、そのメイドとして働くって話なら、別に嫌じゃないけど。……男子の中では一番仲が良いし」"
translation = "「뭐, 회장님이 아가씨의 남편이 되고 그 메이드로서 일한다는 이야기라면 딱히 싫진 않지만. ……남자 중에서는 제일 친하기도 하고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わかったわ！\u3000ハーレムはみんなで楽しく過ごすためのものだから、そこに入らなくても美鶴は九浄家の大切なメイドよ」"
translation = "「알겠어! 하렘은 다 같이 즐겁게 지내기 위한 거니까 거기 들어오지 않아도 미츠루는 쿠죠 가문의 소중한 메이드야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ただ――美鶴がわざわざ『一番仲が良い』と言うのは気になるわね。思ってたよりもイイ感じなのかしら？」"
translation = "「다만── 미츠루가 굳이 『제일 친하다』고 말하는 건 신경 쓰이네. 생각보다 좋은 분위기인 걸까?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ん～～……そりゃまあ、新星学園で生活してて、会長さんに悪い感情向けてる女の子はいませんよ。どんだけ頑張ってくれてるか、わかりますし」"
translation = "「음~~…… 그야 뭐 신성 학원에서 생활하면서 회장님한테 나쁜 감정 품고 있는 여자애는 없죠. 얼마나 노력해 주는지 다들 아니까」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ただうちは恋人にするなら自分だけを見てくれる人がいいですし……って、これ普通のことじゃないですか？」"
translation = "「다만 전 연인으로 삼는다면 나만 봐주는 사람이 좋고…… 아, 이거 평범한 소리 아닌가요?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「お嬢様は会長さんが、他の女の子を好きでもいいんですか？」"
translation = "「아가씨는 회장님이 다른 여자애를 좋아해도 괜찮으세요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私のことを沢山愛してくれるのは疑いようもないし、特に気にしないわ！！」"
translation = "「나를 많이 사랑해 줄 거라는 건 의심할 여지도 없고, 딱히 신경 안 써!!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「わーお……すごい自信だ」"
translation = "「와아오…… 엄청난 자신감이네」"

[[dialogue]]
speaker = "unk"
original = "もちろんヴィーナスの言う通りなのだが、本人に自信満々に言われると、ちょっと照れ臭い。"
translation = "물론 비너스의 말대로지만 본인에게 당당하게 들으니 조금 쑥스럽다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにクロトは魔王なんだから、私がその寵愛を独り占めするのは良くないことだわ！\u3000クロトには１人でも多くの女の子を幸せにする義務があると思うの！」"
translation = "「게다가 쿠로토는 마왕이니까 내가 그 총애를 독점하는 건 좋지 않은 일이야! 쿠로토에겐 한 명이라도 더 많은 여자애를 행복하게 해 줄 의무가 있다고 생각해!」"

[[dialogue]]
speaker = "unk"
original = "その理屈はやっぱりよく分からないなあ！？"
translation = "그 논리는 역시 잘 모르겠는데!?"

[[dialogue]]
speaker = "unk"
original = "信頼が厚いのは嬉しいけど"
translation = "신뢰가 두터운 건 기쁘지만"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ふふふふ……やっぱりお嬢様と会長さんは面白いね。あなたたちに仕えてたら、うちもいつか会長さんのこと、好きになっちゃうかも？」"
translation = "「후후후후…… 역시 아가씨랑 회장님은 재밌네. 두 분을 모시다 보면 저도 언젠가 회장님을 좋아하게 될지도?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなったら遠慮なく私に言ってちょうだい！\u3000魔王ハーレムはいつでも新規メンバーを受付中よ！！」"
translation = "「그렇게 되면 사양 말고 나한테 말해줘! 마왕 하렘은 언제나 신규 멤버 접수 중이야!!」"

[[dialogue]]
speaker = "unk"
original = "いつでも新規メンバー受付はダメだってば！"
translation = "언제나 신규 멤버 접수는 안 된다니까!"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「わ、私は……お嬢様がハーレムを望むのであれば、そのように……」"
translation = "「저, 저는…… 아가씨가 하렘을 원하신다면 그 뜻에……」"

[[dialogue]]
speaker = "unk"
original = "うおっ！？\u3000閃、いつの間に！？"
translation = "우와!? 센, 언제부터 있었어!?"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あの……お嬢様、昨晩あれから考えたことがあるのですが、１つお聞きしてもいいでしょうか？」"
translation = "「저기…… 아가씨, 어젯밤 그 뒤로 생각해 본 게 있는데 하나 여쭤봐도 될까요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何かしら、閃ちゃん？」"
translation = "「뭘까, 센짱?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ハーレムということはつまり、一夫一妻という関係性に囚われないということ。ならば――」"
translation = "「하렘이라는 건 즉 일부일처라는 관계성에 얽매이지 않는다는 것. 그렇다면──」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様が会長さんと結婚しつつ、<b>私がお嬢様と結婚する</b>、というのはアリなのでしょうかっ！？」"
translation = "「아가씨가 회장님과 결혼하면서 <ruby>제가 아가씨와 결혼하는 것<rt>・・ ・・・・ ・・・・ ・</rt></ruby>도 가능한 것입니까!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その発想はなかったわ！\u3000閃ちゃん、あなた――」"
translation = "「그 발상은 못 했어! 센짱, 너──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「面白いことを考えるわね！\u3000いいわよ♪\u3000私とも結婚しましょう！」"
translation = "「재밌는 생각을 하는구나! 좋아♪ 나랑도 결혼하자!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「本当ですか！？\u3000お嬢様と結婚……！\u3000すうぅ～……はあぁ……すうぅ～……ふうぅぅ！」"
translation = "「정말입니까!? 아가씨와 결혼……! 스으으~…… 하아아…… 스으으~…… 후우우우!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ただし！\u3000私はクロトが１番好きだから、閃ちゃんは２番よ。あと、閃ちゃんもパパと結婚するならいいわ！」"
translation = "「단! 나는 쿠로토가 제일 좋으니까 센짱은 2번이야. 그리고 센짱도 아빠랑 결혼한다면 좋아!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「九浄家、風紀乱れ過ぎでは……？」"
translation = "「쿠죠 가문, 풍기문란이 너무 심한 거 아냐……?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむうむ。旧家名家というものは、往々にしてそういうところがあるものなのだ」"
translation = "「음음. 명문가라는 곳은 왕왕 그런 면이 있는 법이다」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「当主様、突然湧き出ないでください。あと絶対そんなわけないと思います」"
translation = "「당주님, 갑자기 나타나지 마세요. 그리고 절대 그럴 리 없다고 생각합니다」"

[[dialogue]]
speaker = "unk"
original = "手伝ってもらえませんかね！？"
translation = "좀 도와주지 않을래!?"

[[dialogue]]
speaker = "unk"
original = "２人ともあそこのバカ娘を止めるの"
translation = "둘 다 저기 있는 바보 딸 좀 말려줘"

[[dialogue]]
speaker = "unk"
original = "これ以上はとんでもないことになりそうなので、再びなんとかヴィーナスを思いとどまらせる俺なのであった――"
translation = "이 이상은 말도 안 되는 일이 벌어질 것 같아 다시 한번 어떻게든 비너스를 만류하는 나였다──"

