[[dialogue]]
speaker = "unk"
original = "第３話,怪盗との初デート,P"
translation = "제3화, 괴도와의 첫 데이트, P"

[[dialogue]]
speaker = "unk"
original = "ミネコと知り合ってからしばらく経った、ある日のこと。"
translation = "미네코와 알고 지낸 지 얼마간 지난 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は彼女から初めてのデートに誘われて、秋葉原にやって来ていたのだが――"
translation = "나는 그녀에게 처음으로 데이트 신청을 받아 아키하바라에 오게 되었는데──"

[[dialogue]]
speaker = "ミネコ"
original = "「～～♪\u3000～～～♪」"
translation = "「~~♪ ~~~♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「――ん？\u3000会長、私のこと、じっと見つめてどうかした？」"
translation = "「──응? 회장, 나를 빤히 쳐다보고 왜 그래?」"

[[dialogue]]
speaker = "ミネコ"
original = "「もしかして、いよいよ私に惚れちゃったのかな～？」"
translation = "「혹시 드디어 나한테 반해버린 걸까나~?」"

[[dialogue]]
speaker = "ミネコ"
original = "「いや～、ようやくか～。そろそろ好感度がイイ感じに貯まってきてると思ってたんだよね～♪」"
translation = "「이야~ 드디어인가~. 슬슬 호감도가 적절하게 쌓였을 거라 생각했거든~♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「――って、そうじゃないって？\u3000ふむふむ……どうして私が、戦闘服を着ているのか気になった？」"
translation = "「──엇, 그게 아니라고? 흠흠…… 왜 내가 전투복을 입고 있는지 궁금했어?」"

[[dialogue]]
speaker = "ミネコ"
original = "「それはね～、秋葉原でデートってことで、コスプレ的なノリで着てきたんだよ♪」"
translation = "「그건 말이지~ 아키하바라에서 데이트니까 코스프레 느낌으로 입고 온 거야♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「ほら、どう？\u3000私の怪盗衣装♪\u3000ここまでじっくり見られるのは、会長が初めてってくらいレアなんだよ～？」"
translation = "「봐봐, 어때? 내 괴도 의상♪ 이렇게 가까이서 자세히 보여주는 건 회장이 처음일 정도로 레어하다구~?」"

[[dialogue]]
speaker = "ミネコ"
original = "「普段は大怪盗の能力で『認識阻害』をかけてるから、変身中の私は怪盗っぽい人影にしか見えないようになってるからね」"
translation = "「평소에는 대괴도의 능력으로 『인식 저해』를 걸어두니까 변신 중인 나는 괴도 같은 인영으로밖에 안 보이게 되어 있거든.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ちなみに今は、周りには学園の制服姿にしか見えないようにしてるんだ♪\u3000つまりは、この怪盗姿が見えているのは、会長だけってわけ」"
translation = "「참고로 지금은 주변 사람들에게 학원 교복 차림으로만 보이게 해뒀어♪ 즉 이 괴도 모습이 보이는 건 회장뿐이라는 말씀.」"

[[dialogue]]
speaker = "ミネコ"
original = "「どう？\u3000嬉しい？\u3000ふふふ♪」"
translation = "「어때? 기뻐? 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "からかうようにそう言って、楽しそうに笑うミネコ。"
translation = "놀리듯이 그렇게 말하며 즐겁게 웃는 미네코."

[[dialogue]]
speaker = "unk"
original = "相手が世界を騒がす大怪盗であっても、男としては正直嬉しい気分になってしまうから、反応に困る。"
translation = "상대가 세계를 떠들썩하게 하는 대괴도라 해도 남자로서 솔직히 기쁜 기분이 들어버리기에 반응하기 곤란하다."

[[dialogue]]
speaker = "ミネコ"
original = "「って、あっ！\u3000見てみて、会長！\u3000あそこに輸入雑貨店があるよ」"
translation = "「앗, 저기 봐! 회장! 저기에 수입 잡화점이 있어.」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ♪\u3000面白そうな『お宝』がありそうな匂いがする♪\u3000レッツゴー☆」"
translation = "「후후후♪ 재미있어 보이는 『보물』이 있을 것 같은 냄새가 나♪ 렛츠 고☆」"

[[dialogue]]
speaker = "unk"
original = "そうして、店で気に入った物を購入し、ニコニコ顔のミネコ。"
translation = "그렇게 가게에서 마음에 드는 물건을 구입하고 싱글벙글한 미네코."

[[dialogue]]
speaker = "ミネコ"
original = "「ふぅ～♪\u3000素晴らしいお店だった……！\u3000まさか世界中の変なお菓子を、あそこまでラインナップ豊かに取り揃えているとは！」"
translation = "「후우~♪ 멋진 가게였어……! 설마 전 세계의 이상한 과자들을 저렇게 라인업 풍부하게 갖춰놓고 있을 줄이야!」"

[[dialogue]]
speaker = "ミネコ"
original = "「ほら、これとかすごくそそられるよ！\u3000トルクメニスタン産の『干しメロンチョコレート』！」"
translation = "「봐봐, 이거 진짜 끌려! 투르크메니스탄산 『말린 멜론 초콜릿』!」"

[[dialogue]]
speaker = "ミネコ"
original = "「ネットで調べたら、トルクメニスタンって夏場に大量のメロンが採れるんだって♪」"
translation = "「인터넷으로 찾아보니까 투르크메니스탄은 여름에 멜론이 엄청 많이 채집된대♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「その特産であるメロンを細く切って干して、チョコレートコーティングしたお菓子、ってことみたいだね☆」"
translation = "「그 특산물인 멜론을 얇게 썰어 말린 다음 초콜릿 코팅을 한 과자라는 것 같아☆」"

[[dialogue]]
speaker = "unk"
original = "ドライフルーツチョコみたいな？"
translation = "드라이 프루츠 초코 같은 건가?"

[[dialogue]]
speaker = "ミネコ"
original = "「そう言われると美味しそうな気がして来るけど、はてさて――」"
translation = "「그렇게 들으니 맛있을 것 같은 기분이 들지만, 어디 보자──」"

[[dialogue]]
speaker = "ミネコ"
original = "「いざ、実食！\u3000はい、会長も一緒に！」"
translation = "「자, 실전 시식! 자, 회장도 같이!」"

[[dialogue]]
speaker = "ミネコ"
original = "「――せ～のっ♪\u3000……あむっ！」"
translation = "「──하나 둘~♪ ……아음!」"

[[dialogue]]
speaker = "ミネコ"
original = "「もぐもぐ……んんっ！\u3000これは……！」"
translation = "「우물우물…… 응윽! 이건……!」"

[[dialogue]]
speaker = "unk"
original = "ものすごく……メンマです……"
translation = "엄청나게…… 죽순나물(멘마) 맛입니다……"

[[dialogue]]
speaker = "ミネコ"
original = "「メロンの風味は……正直あまりないね♪\u3000うん！\u3000食感がメンマに似てて、ズバリ『チョコに漬けたメンマ』って感じ♪」"
translation = "「멜론 풍미는…… 솔직히 별로 없네♪ 응! 식감이 멘마랑 닮아서 한마디로 『초코에 담근 멘마』라는 느낌♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ……<emoji=heart04>\u3000また１つ、変なお菓子に出会ってしまった<emoji=heart04>\u3000なぜチョコレートコーティングをしたのかが、全然わからない……！」"
translation = "「후후후……<emoji=heart04> 또 하나 이상한 과자를 만나버렸어<emoji=heart04> 왜 초콜릿 코팅을 한 건지 전혀 이해가 안 돼……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「これは２人でも、全部食べ切るのに苦労しそうだね☆」"
translation = "「이건 둘이서도 다 먹기 힘들겠는걸☆」"

[[dialogue]]
speaker = "unk"
original = "俺も手伝うことになってる！？"
translation = "나도 돕게 되어 있는 거야!?"

[[dialogue]]
speaker = "ミネコ"
original = "「女の子が量を食べ切れない時に、『俺が食べるよ』ってイケボで言ってくれるのが、男の子ってものでしょ？」"
translation = "「여자애가 다 못 먹을 때 『내가 먹을게』라고 멋진 목소리로 말해주는 게 남자애잖아?」"

[[dialogue]]
speaker = "unk"
original = "自分から嬉々として買ったんだよね！？"
translation = "본인이 신나서 산 거잖아!?"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ♪\u3000だって、会長――」"
translation = "「후후후♪ 그치만 회장──」"

[[dialogue]]
speaker = "ミネコ"
original = "「変な味のお菓子ってこう、挑戦したくて興味をそそられるでしょ？」"
translation = "「이상한 맛의 과자는 이렇게 도전해 보고 싶어서 흥미가 생기잖아?」"

[[dialogue]]
speaker = "unk"
original = "クソゲー好きの変態思考だこれ！"
translation = "쿠소게 좋아하는 변태 사고다 이거!"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "女性の声"
original = "「キャーッ！\u3000モンスターよー！」"
translation = "「꺄아악! 몬스터야!」"

[[dialogue]]
speaker = "男性の声"
original = "「うわぁーっ！\u3000逃げろーっ！」"
translation = "「우와악! 도망쳐!」"

[[dialogue]]
speaker = "ミネコ"
original = "「……！\u3000まさか、会長と初デートに来ている日に限って、邪魔が入るとはね」"
translation = "「……! 하필 회장과 첫 데이트하러 온 날에 방해가 들어오다니.」"

[[dialogue]]
speaker = "ミネコ"
original = "「――来い！\u3000スティールファントム！」"
translation = "「──와라! 스틸 팬텀!」"

[[dialogue]]
speaker = "unk"
original = "ミネコが技のようにその名を呼ぶと、彼女の背後から『長身の怪盗紳士』と言うべき大きな人影が立ち上がる。"
translation = "미네코가 기술명처럼 그 이름을 부르자 그녀의 등 뒤에서 『장신의 괴도 신사』라 할 만한 커다란 인영이 솟아오른다."

[[dialogue]]
speaker = "unk"
original = "それは彼女の能力が具現化した『大怪盗の化身』。"
translation = "그것은 그녀의 능력이 구현화된 『대괴도의 화신』."

[[dialogue]]
speaker = "ミネコ"
original = "「あいにく全然興味をそそられないから、速攻でちょちょいっと片付けちゃうよ」"
translation = "「공교롭게도 전혀 흥미가 안 생기니까 빛의 속도로 해치워버릴게.」"

[[dialogue]]
speaker = "unk"
original = "それから数分と経たぬ内に、モンスターは大怪盗の手であっという間に掃討された。"
translation = "그로부터 몇 분도 채 되지 않아 몬스터는 대괴도의 손에 순식간에 소탕되었다."

[[dialogue]]
speaker = "unk"
original = "俺も変身して加勢したが、その必要が全くないくらい鮮やかな、ミネコのワンサイドゲームだった。"
translation = "나도 변신해서 가세했지만 그럴 필요가 전혀 없을 정도로 선명한 미네코의 일방적인 게임이었다."

[[dialogue]]
speaker = "ミネコ"
original = "「――よし、終わりっと。これでデートを再開できるね♪」"
translation = "「──좋아, 끝. 이제 데이트 재개할 수 있겠네♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「ん？\u3000どうしたの、会長？」"
translation = "「응? 왜 그래, 회장?」"

[[dialogue]]
speaker = "unk"
original = "ミネコ、プリマステラにならないか？"
translation = "미네코, 프리마스텔라가 되지 않을래?"

[[dialogue]]
speaker = "unk"
original = "星徒会長の権限を持っている俺が推薦すれば、ミネコはすぐにでもプリマステラの資格を得ることができるだろう。"
translation = "성도회장 권한을 가진 내가 추천하면 미네코는 당장이라도 프리마스텔라 자격을 얻을 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "新種の機械型モンスターの群れを瞬殺できる程の実力なら、間違いなく学園トップクラスの星騎士である。"
translation = "신종 기계형 몬스터 무리를 순살할 정도의 실력이라면 틀림없이 학원 최고 클래스의 성기사다."

[[dialogue]]
speaker = "unk"
original = "しかし、ミネコは首を横に振った。"
translation = "하지만 미네코는 고개를 저었다."

[[dialogue]]
speaker = "ミネコ"
original = "「悪いけど……私は、世界を救うことにはあまり興味ないんだ」"
translation = "「미안하지만…… 나는 세계를 구하는 것에는 별로 관심 없어.」"

[[dialogue]]
speaker = "ミネコ"
original = "「――うん、そう。私には怪盗稼業の方があるからね」"
translation = "「──응, 맞아. 나한테는 괴도 가업이 있으니까 말이야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「私は女神に選ばれたから『大怪盗』をしているんじゃない。前にも言ったけど、これは私にとって大事な『趣味』なんだよ」"
translation = "「나는 여신에게 선택받았기 때문에 『대괴도』를 하고 있는 게 아냐. 전에도 말했지만 이건 나에게 소중한 『취미』라고.」"

[[dialogue]]
speaker = "ミネコ"
original = "「私は、鮮やかな手口でお宝を盗み出すことに、『ロマン』を感じているんだ」"
translation = "「나는 선명한 수법으로 보물을 훔쳐내는 것에 『낭만』을 느끼고 있어.」"

[[dialogue]]
speaker = "ミネコ"
original = "「私の原動力は、ロマンなんだよ、会長」"
translation = "「내 원동력은 낭만이야, 회장.」"

[[dialogue]]
speaker = "ミネコ"
original = "「世界を救うことに、私はあまりロマンを感じない。それは星騎士や選星者としての使命ってやつだからね」"
translation = "「세상을 구하는 일에는 낭만이 별로 안 느껴져. 그건 성기사나 선성자로서의 사명 같은 거잖아.」"

[[dialogue]]
speaker = "ミネコ"
original = "「そして、私は別に正義の味方になりたいわけじゃない。というより、そもそもがヒトのお宝を盗む悪党だからね」"
translation = "「그리고 나는 딱히 정의의 편이 되고 싶은 것도 아냐. 애초에 남의 보물을 훔치는 악당이니까 말이지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「あはっ♪\u3000今更だけど、星徒会長として悪党の存在は見過ごせない？\u3000プリマステラにならないなら、捕まっちゃったりして」"
translation = "「아핫♪ 이제 와서지만 성도회장으로서 악당을 보고도 못 본 척할 수 없어? 프리마스텔라가 안 된다면 잡아가기라도 하려고?」"

[[dialogue]]
speaker = "unk"
original = "俺たち星騎士は、警察とは違う"
translation = "우리 성기사는 경찰과는 달라."

[[dialogue]]
speaker = "unk"
original = "俺個人は『善くありたい』と思っているが、法では裁けない人がいたり、ルールを守っていては救えない人がいるのも事実だ。"
translation = "나 개인은 『선하고 싶다』고 생각하지만 법으로 처단할 수 없는 사람이 있고 규칙을 지켜서는 구할 수 없는 사람이 있는 것도 사실이다."

[[dialogue]]
speaker = "unk"
original = "女神テルルが選星者の中に『大怪盗』という悪人にしかなりえない役割を定めたのにも、きっと『善き者』だけでは成し遂げられないことがあると考えたからだと思っている。"
translation = "여신 텔루르가 선성자 중에 『대괴도』라는 악인이 될 수밖에 없는 역할을 정한 것도 분명 『선한 자』만으로는 이룰 수 없는 일이 있다고 생각했기 때문이라 본다."

[[dialogue]]
speaker = "unk"
original = "だから俺個人は、法律を遵守することを殊更重視はしていない――そうミネコに伝えた。"
translation = "그래서 나 개인은 법률 준수를 유독 중시하지는 않아── 그렇게 미네코에게 전했다."

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふっ♪\u3000いいねいいね、それでこそジュエリーが選んだ助手だよ。最初は冗談半分って感じだったのに、なんかマジになっちゃいそうだなぁ、私……」"
translation = "「후후후♪ 좋아 좋아, 이래야 주얼리가 고른 조수답지. 처음엔 반 농담 같은 느낌이었는데 왠지 진심이 되어버릴 것 같네, 나……」"

[[dialogue]]
speaker = "ミネコ"
original = "「まあ、そういうわけなんで、世界を救うのはキミに任せるよ、魔王様☆」"
translation = "「뭐, 그런 이유니까 세계를 구하는 건 네게 맡길게, 마왕님☆」"

[[dialogue]]
speaker = "ミネコ"
original = "「どうしても『大怪盗』の力が必要になったら、私を呼んで？\u3000星騎士の使命なんかじゃなくて、会長の個人的なお願いだったら、１回くらいは命をかけてあげてもいいよ♪」"
translation = "「정말로 『대괴도』의 힘이 필요해지면 나를 불러줄래? 성기사의 사명 같은 게 아니라 회장의 개인적인 부탁이라면 한 번 정도는 목숨을 걸어줄 수도 있어♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「その代わりと言ってはなんだけど──私が今、一番ロマンを感じているお宝を盗むの、手伝ってほしいかな♪」"
translation = "「그 대가라고 하긴 뭣하지만── 내가 지금 가장 낭만을 느끼고 있는 보물을 훔치는 거 도와줬으면 좋겠는데♪」"

[[dialogue]]
speaker = "unk"
original = "……見逃すのと手伝うのは、話が違うぞ？"
translation = "……못 본 척하는 것과 돕는 건 이야기가 다르다고?"

[[dialogue]]
speaker = "ミネコ"
original = "「大丈夫、大丈夫♪\u3000実はそれを盗み出すのは、犯罪じゃないから♪」"
translation = "「괜찮아, 괜찮아♪ 사실 그걸 훔치는 건 범죄가 아니거든♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「だって今、私が特にロマンを感じているのは――」"
translation = "「왜냐면 지금 내가 특히 낭만을 느끼고 있는 건──」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言って顔を近づけると、俺の胸に人差し指を突き付けて……"
translation = "그녀는 그렇게 말하며 얼굴을 가까이 가져가더니 내 가슴에 검지를 갖다 대고……"

[[dialogue]]
speaker = "ミネコ"
original = "「会長のハートを盗むことだもん♪\u3000ふふふっ<emoji=heart04>」"
translation = "「회장의 마음을 훔치는 거니까♪ 후후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミネコの言葉に、思わずドキッとしてしまう。"
translation = "미네코의 말에 나도 모르게 두근거리고 만다."

[[dialogue]]
speaker = "ミネコ"
original = "「――というわけで会長、デートの続き、行こっか♪」"
translation = "「──그런 이유로 회장, 데이트 계속할까♪」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言って俺の手を取り、再び街へ歩き出すのだった――"
translation = "그녀는 그렇게 말하며 내 손을 잡고 다시 거리로 걸어 나갔다──"

