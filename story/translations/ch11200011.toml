[[dialogue]]
speaker = "unk"
original = "第１話,新しい学園長,P"
translation = "제1화, 새로운 학원장, P"

[[dialogue]]
speaker = "unk"
original = "廊下を歩いていると、窓の外を眺めながら深いため息をついている百合崎ミアを見つけた。"
translation = "복도를 걷고 있자니, 창밖을 바라보며 깊은 한숨을 내쉬고 있는 유리사키 미아를 발견했다."

[[dialogue]]
speaker = "ミア"
original = "「あっ、会長さん」"
translation = "「앗, 회장님」"

[[dialogue]]
speaker = "ミア"
original = "「実は……さっき校則違反をしている生徒を見かけたから注意しようとしたんだけど……」"
translation = "「사실은…… 아까 교칙 위반을 하는 학생을 봐서 주의를 주려고 했는데……」"

[[dialogue]]
speaker = "ミア"
original = "「そしたらそのヒト、私のこと迷子の附属生扱いして、ぜんぜん言う事を聞いてくれなかったから」"
translation = "「그랬더니 그 사람, 나를 길을 잃은 부속생 취급하면서 전혀 말을 들어주지 않았거든」"

[[dialogue]]
speaker = "ミア"
original = "「それでカッとなって、思いっきり怒鳴りつけちゃったんだ……」"
translation = "「그래서 욱해서, 힘껏 소리를 질러버렸어……」"

[[dialogue]]
speaker = "ミア"
original = "「コラプサーとの戦いを通じて、精神的に少しは成長したつもりだったんだけど……」"
translation = "「콜랩서와의 전투를 통해서 정신적으로 조금은 성장했다고 생각했는데……」"

[[dialogue]]
speaker = "ミア"
original = "「でも背が低いことをあれこれ言われてしまって、そうしたら自分が抑えられなくなっちゃって」"
translation = "「하지만 키가 작은 걸로 이런저런 소리를 들어서, 그랬더니 자신을 억제할 수 없게 되어버려서」"

[[dialogue]]
speaker = "unk"
original = "爆発しちゃったんだ"
translation = "폭발해버렸구나"

[[dialogue]]
speaker = "ミア"
original = "「ええ……そんなの軽く受け流しとけばよかったのに」"
translation = "「에휴…… 그런 건 가볍게 흘려보냈으면 좋았을 텐데」"

[[dialogue]]
speaker = "ミア"
original = "「どうして私、いつまでたっても大人な振る舞いができないんだろ？」"
translation = "「어째서 난 언제까지고 어른스러운 행동을 못 하는 걸까?」"

[[dialogue]]
speaker = "ミア"
original = "「全然成長できてないじゃないって、そんなこと思ってたら……ちょっと落ち込んできちゃって……えへへ」"
translation = "「전혀 성장하지 못했잖아, 같은 생각을 했더니…… 조금 우울해져서…… 에헤헤」"

[[dialogue]]
speaker = "unk"
original = "相手のやつの方が失礼だ！"
translation = "상대방 녀석이 더 무례해!"

[[dialogue]]
speaker = "unk"
original = "ミアは何も悪くない！"
translation = "미아는 아무 잘못 없어!"

[[dialogue]]
speaker = "ミア"
original = "「……どの口が言ってるの？\u3000会長さんだって初めて会った時、私のこと附属生だって勘違いしてたじゃない」"
translation = "「……그 입이 할 소리야? 회장님도 처음 만났을 때, 나를 부속생이라고 착각했었잖아」"

[[dialogue]]
speaker = "シノ"
original = "「あら、あなたは……緋宮クロトさんじゃないですか」"
translation = "「어머, 당신은…… 히노미야 쿠로토 씨 아니신가요」"

[[dialogue]]
speaker = "unk"
original = "ミアと話しているところに声をかけてきたのは、新しく学園長に就任したばかりの女性──十六夜シノさんだった。"
translation = "미아와 이야기하고 있던 중에 말을 걸어온 것은, 새로 학원장에 취임한 지 얼마 안 된 여성── 이자요이 시노 씨였다."

[[dialogue]]
speaker = "ミア"
original = "「この方は……会長さんのお知り合い？」"
translation = "「이분은…… 회장님의 아는 분?」"

[[dialogue]]
speaker = "unk"
original = "新しい学園長さんだよ"
translation = "새로운 학원장님이야"

[[dialogue]]
speaker = "ミア"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "シノ"
original = "「初めまして、<ruby>十六夜<rt>いざよい</rt></ruby>シノです。近日中に発表があると思いますが、この度新星学園の学園長に就任しました」"
translation = "「처음 뵙겠습니다, 이자요이 시노입니다. 조만간 발표가 있을 거라 생각합니다만, 이번에 신성학원의 학원장으로 취임했습니다」"

[[dialogue]]
speaker = "ミア"
original = "「そ、そうだったんですか！\u3000大変失礼しました。新星学園１年、風紀委員の<ruby>百合崎<rt>ゆりさき</rt></ruby>ミアです」"
translation = "「그, 그러셨던 건가요! 정말 실례했습니다. 신성학원 1학년, 풍기위원인 유리사키 미아입니다」"

[[dialogue]]
speaker = "シノ"
original = "「今後ともよろしくお願いします」"
translation = "「앞으로 잘 부탁드립니다」"

[[dialogue]]
speaker = "シノ"
original = "「それで……ミアさんは何か落ち込むようなことがあったのですか？」"
translation = "「그래서…… 미아 씨는 뭔가 우울해질 만한 일이 있었나요?」"

[[dialogue]]
speaker = "ミア"
original = "「は、はい。ええと、実は──」"
translation = "「네, 네. 저기, 사실은──」"

[[dialogue]]
speaker = "unk"
original = "それからシノさんは、ミアがその生徒を注意した時の状況や、相手とのやり取りを細かく確認していった。"
translation = "그 후 시노 씨는, 미아가 그 학생을 주의했을 때의 상황이나 상대와의 대화를 세세하게 확인해 나갔다."

[[dialogue]]
speaker = "unk"
original = "急がず、丁寧に、親身な様子でミアの話を引き出していく。"
translation = "서두르지 않고 정중하게, 친근한 모습으로 미아의 이야기를 이끌어낸다."

[[dialogue]]
speaker = "unk"
original = "そして一通り話を聞き終わると、満面の笑みを浮かべながら大きく頷いてみせた。"
translation = "그리고 대강 이야기를 다 듣자, 만면에 미소를 띄우며 크게 고개를 끄덕여 보였다."

[[dialogue]]
speaker = "シノ"
original = "「ありがとうございます。何があったのかとてもよく分かりました」"
translation = "「감사합니다. 무슨 일이 있었는지 아주 잘 알았습니다」"

[[dialogue]]
speaker = "シノ"
original = "「それで……ミアさんは先走ってしまったり、つい頭に血が上ってしまう自分に落ち込んでしまっていた、と……」"
translation = "「그래서…… 미아 씨는 앞서 나가 버리거나, 무심코 머리에 피가 쏠려버리는 자신에게 실망하고 있었다, 고……」"

[[dialogue]]
speaker = "ミア"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker = "シノ"
original = "「自分の欠点を認め、それを改めようと努力することは、とても大変な事です」"
translation = "「자신의 결점을 인정하고, 그것을 고치려고 노력하는 것은 매우 힘든 일입니다」"

[[dialogue]]
speaker = "シノ"
original = "「でもミアさんはその事から逃げていません。真剣に向き合っています。これは本当に尊敬すべきことだと思います」"
translation = "「하지만 미아 씨는 그 일에서 도망치지 않았어요. 진지하게 마주하고 있습니다. 이것은 정말로 존경해야 할 일이라고 생각해요」"

[[dialogue]]
speaker = "ミア"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "シノ"
original = "「努力は裏切りません。きっと実を結ぶはずですよ」"
translation = "「노력은 배신하지 않아요. 분명 결실을 맺을 거예요」"

[[dialogue]]
speaker = "シノ"
original = "「だから落ち込まなくても大丈夫、自分を責めなくても大丈夫」"
translation = "「그러니 낙담하지 않아도 괜찮아요, 자신을 탓하지 않아도 괜찮아요」"

[[dialogue]]
speaker = "シノ"
original = "「それよりもっと褒めてあげましょう、頑張り屋のミアさんのことを、あなたが１番に、ね？」"
translation = "「그보다 좀 더 칭찬해 주자고요, 노력파인 미아 씨를 당신이 제일 먼저, 네?」"

[[dialogue]]
speaker = "ミア"
original = "「学園長……あ、ありがとうございます！」"
translation = "「학원장님…… 가, 감사합니다!」"

[[dialogue]]
speaker = "unk"
original = "元気、出たみたいだね"
translation = "기운이 난 모양이네"

[[dialogue]]
speaker = "ミア"
original = "「ええ！\u3000<ruby>白日晴天<rt>はくじつせいてん</rt></ruby>、学園長のおかげで心の曇りはすっかり晴れました。これからも一層、風紀委員の活動に打ち込めそうです」"
translation = "「네! 백일청천, 학원장님 덕분에 마음의 먹구름은 말끔히 걷혔습니다. 앞으로도 더욱 풍기위원 활동에 매진할 수 있을 것 같아요」"

[[dialogue]]
speaker = "ミア"
original = "「って言ってるそばから校則違反発見です！\u3000っと、今度は先走らないように注意して……」"
translation = "「라고 말하는 도중에 교칙 위반 발견입니다! 앗, 이번에는 앞서 나가지 않도록 주의해서……」"

[[dialogue]]
speaker = "ミア"
original = "「そこのヒトー！\u3000ちょっといいですかー！」"
translation = "「저기 거기 사람! 잠시 실례할게요!」"

[[dialogue]]
speaker = "シノ"
original = "「ふふ、力になれたようで良かったです。さて……私は彼女に注意されたという生徒さんからもお話を聞いてきますね」"
translation = "「후후, 도움이 된 것 같아 다행이네요. 자…… 저는 그녀에게 주의를 받았다는 학생분에게도 이야기를 듣고 올게요」"

[[dialogue]]
speaker = "シノ"
original = "「ええ、そうですね。一方の側の話しか聞かずに全てを決めつけてしまうのは良くありませんから」"
translation = "「네, 그렇네요. 한쪽의 이야기만 듣고 모든 걸 단정 지어버리는 건 좋지 않으니까요」"

[[dialogue]]
speaker = "シノ"
original = "「問題ないですよ。お相手の方が誰なのかは、ミアさんのお話で目星はついています」"
translation = "「문제없어요. 상대방이 누구인지는 미아 씨의 이야기로 짐작이 가니까요」"

[[dialogue]]
speaker = "unk"
original = "事も無げに言って、軽い会釈とともにその場を去っていった。"
translation = "아무렇지도 않게 말하며, 가벼운 목례와 함께 그 자리를 떠났다."

[[dialogue]]
speaker = "unk"
original = "確かにミアから相手のことについての話も聞いていたけれど、それだけで特定するには情報が足りなさすぎる。"
translation = "분명 미아로부터 상대에 대한 이야기도 듣긴 했지만, 그것만으로 특정하기에는 정보가 너무 부족하다."

[[dialogue]]
speaker = "unk"
original = "それでも目星が付けられたのは、学園の生徒の情報がしっかり頭に叩き込まれているからだろう。就任が決まってまだ時間も経っていないというのに。"
translation = "그런데도 짐작할 수 있었던 건, 학원 학생들의 정보가 확실히 머릿속에 박혀있기 때문일 것이다. 취임이 결정된 지 얼마 지나지도 않았는데 말이다."

[[dialogue]]
speaker = "unk"
original = "そして、翌日──"
translation = "그리고 다음 날──"

[[dialogue]]
speaker = "unk"
original = "昨日と同じ場所でシノさんに呼び止められた。"
translation = "어제와 같은 장소에서 시노 씨가 불러 세웠다."

[[dialogue]]
speaker = "シノ"
original = "「会長さん。ミアさんから注意を受けたという生徒さんともお話が出来ましたよ」"
translation = "「회장님. 미아 씨로부터 주의를 받았다는 학생분과도 이야기를 나눴답니다」"

[[dialogue]]
speaker = "シノ"
original = "「最初、附属生と間違えてしまったことに悪気はなかったようなのですが、その後身長についてからかったり、注意を無視したのは意図的だったそうです」"
translation = "「처음 부속생으로 착각한 것에는 악의가 없었던 모양입니다만, 그 후 키에 대해 놀리거나 주의를 무시한 것은 의도적이었다고 하더군요」"

[[dialogue]]
speaker = "シノ"
original = "「語気荒く注意されたことが気に入らず、ついつい反発してしまったとのことでした」"
translation = "「거칠게 주의를 받은 것이 마음에 들지 않아, 그만 반발해버렸다고 했습니다」"

[[dialogue]]
speaker = "シノ"
original = "「ミアさんがとても落ち込んでしまっているという話をすると、すぐに彼女のところへ謝罪しに行ってくれました」"
translation = "「미아 씨가 무척 낙담하고 있다는 이야기를 하자, 곧바로 그녀가 있는 곳으로 사과하러 가주었습니다」"

[[dialogue]]
speaker = "シノ"
original = "「謝りに来た彼に対して、ミアさんも今度は熱くならずに対応できたようです」"
translation = "「사과하러 온 그에게 미아 씨도 이번에는 흥분하지 않고 대응할 수 있었던 모양이에요」"

[[dialogue]]
speaker = "シノ"
original = "「これが彼女の自信に、少しでも繋がってくれれば良いのですが……」"
translation = "「이것이 그녀의 자신감으로 조금이라도 이어지면 좋겠습니다만……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、きっと繋がりましたよ！"
translation = "괜찮아요, 분명 이어졌을 거예요!"

[[dialogue]]
speaker = "シノ"
original = "「ふふっ、星徒会長さんからのお墨付きをいただけたなら安心ですね」"
translation = "「후훗, 성도회장님으로부터 보증을 받았다면 안심이네요」"

[[dialogue]]
speaker = "シノ"
original = "「えっ？\u3000いえいえ、そんなに褒められると恥ずかしいです……まだ学園長に就任することになったばかりで、右も左も分からない状態なのですから」"
translation = "「엣? 아뇨아뇨, 그렇게 칭찬받으니 부끄럽네요…… 아직 학원장에 취임한 지 얼마 되지 않아 갈피를 못 잡는 상태니까요」"

[[dialogue]]
speaker = "シノ"
original = "「会長さんにはこれからも色々頼ることになるかと思います。その時は力を貸してくださいね」"
translation = "「회장님에게는 앞으로도 여러모로 의지하게 될 것 같습니다. 그때는 힘을 보태주세요」"

[[dialogue]]
speaker = "unk"
original = "もちろんです！"
translation = "물론이죠!"

[[dialogue]]
speaker = "シノ"
original = "「はは……ありがとうございます」"
translation = "「하하…… 감사합니다」"

[[dialogue]]
speaker = "シノ"
original = "「では会長さん、お言葉に甘えてもう少しだけ、お時間をいただいてもいいですか？」"
translation = "「그럼 회장님, 말씀하신 김에 조금만 더 시간을 내주실 수 있을까요?」"

[[dialogue]]
speaker = "シノ"
original = "「初めてお会いした時もいろいろ教えてもらいましたが、もっともっと学園のことについて教えて欲しいんです」"
translation = "「처음 만났을 때도 여러 가지 알려주셨지만, 좀 더 좀 더 학원에 대해서 알려주셨으면 해요」"

[[dialogue]]
speaker = "シノ"
original = "「そうですね、今度は会長さんの個人的なことについても、お願いしますね……ふふ」"
translation = "「그렇네요, 이번에는 회장님의 개인적인 부분에 대해서도 부탁드릴게요…… 후후」"

[[dialogue]]
speaker = "unk"
original = "そう言って、上品な笑みを浮かべる。"
translation = "그렇게 말하며, 우아한 미소를 짓는다."

[[dialogue]]
speaker = "unk"
original = "こうして、この教育熱心な若き学園長に学園の事について教えることが、日常になっていったのだった。"
translation = "이렇게 해서 이 교육열 높은 젊은 학원장에게 학원에 대해 가르쳐주는 것이 일상이 되어갔다."

