[[dialogue]]
speaker = "unk"
original = "第２話,神出鬼没シスター,P"
translation = "제2화, 신출귀몰 시스터, P"

[[dialogue]]
speaker = "シャロン"
original = "「おはようございます。会長さま、本日の体調はいかがですか？」"
translation = "「좋은 아침입니다. 회장님, 오늘의 컨디션은 어떠신가요?」"

[[dialogue]]
speaker = "シャロン"
original = "「おはようございますっ。お風邪など引いていませんか？」"
translation = "「좋은 아침입니다앗. 감기 같은 건 걸리지 않으셨나요?」"

[[dialogue]]
speaker = "シャロン"
original = "「おはようございます！\u3000お元気ですか！？」"
translation = "「좋은 아침입니다! 잘 지내시나요!?」"

[[dialogue]]
speaker = "マトイ"
original = "「シャロンさん、だんだん抑えられなくなってくるんだろうね……」"
translation = "「샤론 씨, 점점 억제가 안 되는 모양이네……」"

[[dialogue]]
speaker = "シャロン"
original = "「お手伝いできることはありませんか？\u3000炊事、洗濯、料理、修道院の生活で全て身につけておりますよ！」"
translation = "「도와드릴 일은 없나요? 취사, 세탁, 요리, 수도원 생활로 전부 익혔답니다!」"

[[dialogue]]
speaker = "シャロン"
original = "「喉は渇いていませんか？\u3000お腹は空いていませんか？\u3000ハンカチは忘れていませんか？」"
translation = "「목은 마르지 않나요? 배는 고프지 않나요? 손수건은 잊지 않으셨나요?」"

[[dialogue]]
speaker = "マトイ"
original = "（会長のお母さんかな？）"
translation = "(회장님 엄마인가?)"

[[dialogue]]
speaker = "unk"
original = "どうしてそんなに世話を焼くんだ？"
translation = "왜 그렇게까지 챙겨주는 거야?"

[[dialogue]]
speaker = "シャロン"
original = "「おや。もしかしてご遠慮なされているのですか？」"
translation = "「어머. 혹시 사양하시는 건가요?」"

[[dialogue]]
speaker = "シャロン"
original = "「女神様の加護は、この世界の生きとし生けるものに与えられるべきもの。そして私はシスター、女神様に仕える者」"
translation = "「여신님의 가호는 이 세상의 모든 살아있는 것들에게 주어져야 할 것. 그리고 저는 시스터, 여신님을 섬기는 자」"

[[dialogue]]
speaker = "シャロン"
original = "「つまり女神様に代わって、シスターである私が皆さまをお助けしているのです！」"
translation = "「즉 여신님을 대신하여, 시스터인 제가 여러분을 돕고 있는 것입니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「そういうもの……？」"
translation = "「그런 거야……?」"

[[dialogue]]
speaker = "シャロン"
original = "「マトイさまも何かお悩みなどありますか？\u3000私が解決いたしますよ！」"
translation = "「마토이 님도 뭔가 고민 같은 게 있으신가요? 제가 해결해 드릴게요!」"

[[dialogue]]
speaker = "マトイ"
original = "「え、私！？\u3000う～ん……そうだなぁ……」"
translation = "「에, 나!? 으음…… 그렇네……」"

[[dialogue]]
speaker = "unk"
original = "休日――"
translation = "휴일――"

[[dialogue]]
speaker = "unk"
original = "新星学園に転入してからずっと忙しいので、今日は落ち着いて勉強を……"
translation = "신성 학원에 전학 온 뒤로 계속 바빴기에, 오늘은 차분히 공부를……"

[[dialogue]]
speaker = "シャロン"
original = "「おはようございます！」"
translation = "「좋은 아침입니다!」"

[[dialogue]]
speaker = "unk"
original = "鍵は！？"
translation = "열쇠는!?"

[[dialogue]]
speaker = "シャロン"
original = "「会長さまのお母さまのお許しはいただきました！」"
translation = "「회장님 어머님의 허락은 받았습니다!」"

[[dialogue]]
speaker = "シャロン"
original = "「ふっふっふ。この私に、そして女神様の愛に死角はありません。何かお力になれることはありませんかっ？」"
translation = "「훗훗훗. 저에게, 그리고 여신님의 사랑에 사각지대는 없습니다. 뭔가 힘이 되어드릴 일은 없나요앗?」"

[[dialogue]]
speaker = "unk"
original = "じゃあ復習を手伝ってほしい"
translation = "그럼 복습을 좀 도와줬으면 좋겠어"

[[dialogue]]
speaker = "シャロン"
original = "「なるほど、転入する前と新星学園では進み方が違いますものね。私に任せてくださいっ」"
translation = "「과연, 전학 오기 전과 신성 학원은 진도가 다르니까요. 저에게 맡겨주세요앗」"

[[dialogue]]
speaker = "シャロン"
original = "「前の学校ではどの程度進んだのですか？\u3000……ふむふむ、なるほど。新星学園ではここまでですね」"
translation = "「이전 학교에서는 어느 정도까지 나갔나요? ……흠흠, 그렇군요. 신성 학원에서는 여기까지네요」"

[[dialogue]]
speaker = "シャロン"
original = "「いえいえ、礼には及びません。このぐらいお安い御用です」"
translation = "「아니요 아니요, 감사 인사는 필요 없습니다. 이 정도는 식은 죽 먹기예요」"

[[dialogue]]
speaker = "シャロン"
original = "「ところで……先日、フィーニスの塔に近づかれる会長さまとヴィーナスさま、それに流星学園のフィオナさまをお見かけしたのですが」"
translation = "「그런데…… 요전번에 피니스 탑에 다가가시는 회장님과 비너스 님, 그리고 유성 학원의 피오나 님을 뵈었습니다만」"

[[dialogue]]
speaker = "シャロン"
original = "「フィーニスの塔は、生徒はもちろん、何人も立ち入ることのできない聖地。シスターとして狼藉は見過ごせません」"
translation = "「피니스 탑은 학생은 물론, 누구도 발을 들일 수 없는 성지. 시스터로서 무례한 행동은 간과할 수 없습니다」"

[[dialogue]]
speaker = "シャロン"
original = "「それに御前試合の際、前会長──ヴィーナスさまは会長さまのことを魔王だと仰っていました」"
translation = "「게다가 어전 시합 때, 전 회장──비너스 님은 회장님을 마왕이라고 부르셨죠」"

[[dialogue]]
speaker = "シャロン"
original = "「担当直入にお聞きします。会長さまは魔王なのですか？」"
translation = "「단도직입적으로 묻겠습니다. 회장님은 마왕인가요?」"

[[dialogue]]
speaker = "unk"
original = "わからない"
translation = "모르겠어"

[[dialogue]]
speaker = "シャロン"
original = "「わからないのですかっ！？」"
translation = "「모르시는 건가요앗!?」"

[[dialogue]]
speaker = "シャロン"
original = "「まさか本人にもわからないとは思ってもみませんでした……。つまり魔王の自覚はないのですね？」"
translation = "「설마 본인도 모르실 줄은 생각지도 못했습니다……. 즉 마왕이라는 자각은 없으시다는 거군요?」"

[[dialogue]]
speaker = "シャロン"
original = "「ヴィーナスさまはどうして会長さまが魔王だと仰ったのでしょう？\u3000そもそも魔王は古代の人物では？\u3000謎ですね……」"
translation = "「비너스 님은 어째서 회장님이 마왕이라고 하신 걸까요? 애초에 마왕은 고대의 인물이 아닌지? 수수께끼네요……」"

[[dialogue]]
speaker = "シャロン"
original = "「ではフィーニスの塔では何をされていたのでしょう？\u3000フィオナさまといえど、塔には簡単に踏み入れられないはずですが」"
translation = "「그럼 피니스 탑에서는 무엇을 하고 계셨나요? 피오나 님이라 해도 탑에는 쉽게 발을 들일 수 없을 텐데요」"

[[dialogue]]
speaker = "unk"
original = "悪いことはしていない"
translation = "나쁜 짓은 하지 않았어"

[[dialogue]]
speaker = "シャロン"
original = "「ふむふむ……恥じ入ることは何もないと」"
translation = "「흠흠…… 부끄러워할 일은 아무것도 없다는 거군요」"

[[dialogue]]
speaker = "シャロン"
original = "「わかりました。会長さまの真っ直ぐな目を信じましょう。シスターとしては問題ですが、会長さま方には何か理由があるのだと推察します」"
translation = "「알겠습니다. 회장님의 곧은 눈을 믿을게요. 시스터로서는 문제지만, 회장님 일행에게는 뭔가 이유가 있을 거라고 추측하겠습니다」"

[[dialogue]]
speaker = "シャロン"
original = "「しかしあなたが悪しき魔王であるならば、この私が女神様に代わって討ち果たします。よろしいですね？」"
translation = "「하지만 당신이 사악한 마왕이 된다면, 이 제가 여신님을 대신하여 처단하겠습니다. 아시겠죠?」"

[[dialogue]]
speaker = "unk"
original = "その時はよろしく"
translation = "그때는 잘 부탁해"

[[dialogue]]
speaker = "シャロン"
original = "「おや、ずいぶんと潔いご様子。悪に堕ちぬという自信の表れなのでしょうか」"
translation = "「어머, 제법 깨끗한 태도시군요. 악에 물들지 않겠다는 자신감의 표현일까요」"

[[dialogue]]
speaker = "シャロン"
original = "「ええ、きっとそうなのでしょう。会長さまが世界を滅ぼすなんて、私には想像もできませんから」"
translation = "「네, 분명 그럴 거예요. 회장님이 세계를 멸망시킨다니, 저로서는 상상도 할 수 없으니까요」"

[[dialogue]]
speaker = "シャロン"
original = "「おっと、私ばかり質問してしまいましたね。会長さまも気になることがあればご質問ください」"
translation = "「이런, 저만 질문해 버렸네요. 회장님도 궁금한 게 있다면 질문해 주세요」"

[[dialogue]]
speaker = "シャロン"
original = "「体重でもスリーサイズでも、私に隠し立てすることはありません。ちなみに好きな食べ物はシェパーズパイです！」"
translation = "「몸무게든 세 사이즈든, 저에게 숨길 건 아무것도 없답니다. 참고로 좋아하는 음식은 셰퍼드 파이예요!」"

[[dialogue]]
speaker = "シャロン"
original = "「よければお台所をお借りして何かお作りしますが……今はお腹は空いてない？\u3000さようですか。ちょっと残念です」"
translation = "「괜찮으시다면 부엌을 빌려 무언가 만들어 드릴까요…… 지금은 배가 안 고프시다고요? 그렇군요. 조금 아쉽네요」"

[[dialogue]]
speaker = "シャロン"
original = "「では勉強に戻りましょうか。せっかくですから、このままテスト対策もしてしまいましょう！」"
translation = "「그럼 공부로 돌아갈까요. 기왕 하는 거 이대로 시험 대비까지 해버리죠!」"

