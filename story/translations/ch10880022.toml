[[dialogue]]
speaker = "unk"
original = "第２話,ぬいぐるみ職人リーナ,P"
translation = "제2화, 인형 장인 리나, P"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「いらっしゃい、お兄ちゃん」"
translation = "「어서 와, 오빠」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんが来てくれたのは嬉しいけど……本当にお勉強しなきゃダメ？」"
translation = "「오빠가 와준 건 기쁘지만…… 정말로 공부해야만 해?」"

[[dialogue]]
speaker = "unk"
original = "勉強はしようね"
translation = "공부는 하자"

[[dialogue]]
speaker = "unk"
original = "そう、今日はリーナに勉強を教えるために来た。"
translation = "그래, 오늘은 리나에게 공부를 가르쳐주기 위해 왔다."

[[dialogue]]
speaker = "unk"
original = "リーナは学年で言うと附属１年生と同じ歳で、まだまだお勉強が必要だ。"
translation = "리나는 학년으로 치면 부속 1학년과 같은 나이로, 아직 공부가 필요하다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……勉強すると、色んな将来を選べるようになるから？\u3000リーナ、将来なんて分かんないよ」"
translation = "「……공부하면 여러 미래를 선택할 수 있게 되니까? 리나, 미래 같은 건 모르겠어」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「え、リーナの将来なりたいもの？\u3000……う～ん、やっぱり分かんないよぉ。リーナにはお兄ちゃんがいてくれたらいいもんっ」"
translation = "「에, 리나가 나중에 되고 싶은 거? ……으음, 역시 모르겠어어. 리나는 오빠가 있어 준다면 그걸로 충분한걸!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、リーナの好きなことや楽しいことは？"
translation = "그럼 리나가 좋아하는 것이나 즐거운 일은?"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナの好きなことや楽しいこと……お兄ちゃん以外で？\u3000う～ん……あ、リーナ、ぬいぐるみ作るの好き！」"
translation = "「리나가 좋아하는 것이나 즐거운 것…… 오빠 말고? 으음…… 아, 리나, 인형 만드는 거 좋아해!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「このクマさんもリーナが作ったんだよっ！\u3000リーナのお友達なんだ。でも、いつの間にかすぐに怪我しちゃうの」"
translation = "「이 곰돌이도 리나가 만든 거야! 리나의 친구야. 하지만 어느샌가 금방 다쳐버려」"

[[dialogue]]
speaker = "unk"
original = "周囲を見渡すと、ぬいぐるみ作りに使う生地や糸が散乱していた。熱中すると周りが見えなくなるタイプのようだ。"
translation = "주변을 둘러보니 인형 제작에 쓰이는 천이나 실이 흩어져 있었다. 열중하면 주변이 보이지 않게 되는 타입인 모양이다."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「失礼いたします。お勉強と聞いて、お飲み物とお菓子をお持ちしました」"
translation = "「실례하겠습니다. 공부하신다고 들어서 음료와 과자를 가져왔습니다」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ありがとう、マリオンさん。あ、ショートケーキだ～！\u3000リーナ、マリオンさんのケーキ好き～！」"
translation = "「고마워요, 마리온 씨. 아, 쇼트케이크다~! 리나, 마리온 씨 케이크 좋아해~!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ふふ、ありがとうございます。会長様はコーヒーでよろしかったでしょうか？」"
translation = "「후후, 감사합니다. 회장님은 커피로 괜찮으실까요?」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます"
translation = "고맙습니다"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「マリオンさん、何でもできるんだよ。お菓子もお洋服も作れるし、リーナも縫いもの教えてもらってるんだ」"
translation = "「마리온 씨는 뭐든지 할 수 있어. 과자도 옷도 만들 수 있고, 리나도 바느질 배우고 있어」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そんなそんな、お褒めいただき光栄です。おかわいいリーナ様からそこまで言われると私も昂ってしまいます……ふふふ」"
translation = "「아니에요, 과찬이십니다. 귀여운 리나 님께 그런 말을 들으니 저도 고양되어 버리네요…… 후후후」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん。レイラお姉ちゃんから、マリオンさんが気持ち悪くなったらブザーを押すように言われてるんだけど、押した方がいいかな？」"
translation = "「오빠. 레이라 언니가 마리온 씨가 기분 나빠지면 부저를 누르라고 했는데, 누르는 게 좋을까?」"

[[dialogue]]
speaker = "unk"
original = "押しちゃおっか"
translation = "눌러버릴까"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「おやおや。リーナ様、ブザーをしまってください。私がイレイザーフェニックスされてしまいます」"
translation = "「오호라. 리나 님, 부저를 넣어주세요. 제가 이레이저 피닉스 당해버립니다」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「は～い」"
translation = "「네~에」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「リーナ様は覚えが早いので、私も教えていて楽しいです。こんな形で教え子が増えるなんて思いもしませんでした」"
translation = "「리나 님은 배우는 게 빠르셔서 저도 가르치는 게 즐겁습니다. 이런 식으로 제자가 늘어날 줄은 생각지도 못했네요」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「えへへ～♪\u3000ねぇ見て！\u3000これ、次の新作なんだ」"
translation = "「에헤헤~♪ 있잖아 봐봐! 이거, 다음 신작이야」"

[[dialogue]]
speaker = "unk"
original = "リーナが取り出したスケッチブックには、見覚えのある姿が描かれていた。"
translation = "리나가 꺼낸 스케치북에는 낯익은 모습이 그려져 있었다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「アイリーンちゃんのミーちゃんと、カヤちゃんの……名前は分からないけど、いつも連れてる子。ぬいぐるみができたら２人にあげるんだ」"
translation = "「아이린짱의 미짱이랑 카야짱의…… 이름은 모르겠지만 항상 데리고 다니는 애. 인형 다 만들면 둘한테 줄 거야」"

[[dialogue]]
speaker = "unk"
original = "ミーちゃんとはアイリーンの使い魔のフクロウのことで、本来の名前はミネルバという。"
translation = "미짱이란 아이린의 사역마인 부엉이로, 원래 이름은 미네르바라고 한다."

[[dialogue]]
speaker = "unk"
original = "また、カヤはいつも小動物を連れている。名前は分からないけど、大事にしているようだ。"
translation = "또한 카야는 항상 소동물을 데리고 다닌다. 이름은 모르지만 소중히 여기는 듯하다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「アイリーンちゃんとはゲームでよく遊ぶの。カヤちゃんはあんまりゲームはしないけど、一緒に武器のお手入れするんだ。おかげでリーナのチェーンソーもピカピカだよ」"
translation = "「아이린짱이랑은 게임하며 자주 놀아. 카야짱은 게임은 별로 안 하지만 같이 무기 손질을 해. 덕분에 리나의 전기톱도 반짝반짝해」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「歳が近いからか、２人ともリーナ様とは仲良くしていただいているようです。まぁ、ゲームにはイニシュも混じりますが……」"
translation = "「나이가 비슷해서인지 두 사람 모두 리나 님과는 사이좋게 지내고 있는 것 같습니다. 뭐, 게임에는 이니슈도 섞입니다만……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんは何かリーナに作ってほしいものある？\u3000お兄ちゃんが欲しいって言ってくれたら、リーナ頑張るよ」"
translation = "「오빠는 리나가 만들어줬으면 하는 거 있어? 오빠가 갖고 싶다고 말하면 리나 힘낼게」"

[[dialogue]]
speaker = "unk"
original = "うーん、そうだなぁ……"
translation = "으음, 글쎄……"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「会長様。本日はリーナ様にお勉強を教えるためにいらしたのですよね？\u3000そろそろ本題に戻られてはいかがでしょう」"
translation = "「회장님. 오늘은 리나 님께 공부를 가르치러 오신 거죠? 슬슬 본론으로 돌아가시는 게 어떨까요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「リーナ様も。お勉強しないと会長様が帰ってしまうかもしれませんよ？」"
translation = "「리나 님도요. 공부하지 않으면 회장님이 돌아가 버리실지도 몰라요?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はーい」"
translation = "「네~에」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……え、分からない教科はないかって？\u3000うーんとね、全部！」"
translation = "「……에, 모르는 과목은 없냐고? 으음 말야, 전부!」"

[[dialogue]]
speaker = "unk"
original = "交通事故以来、コラプサーと一緒にいたリーナは勉強から遠ざかってしまっていた。どうやら大仕事になりそうだ。"
translation = "교통사고 이후 콜랩서와 함께 있었던 리나는 공부와 멀어져 있었다. 아무래도 큰일이 될 것 같다."

[[dialogue]]
speaker = "unk"
original = "あれからも度々リーナのところを訪れ、リーナの勉強を見たり、一緒に漫画を読んだりしている。"
translation = "그 후로도 자주 리나의 처소를 방문하여 리나의 공부를 봐주거나 함께 만화책을 읽기도 한다."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、作って欲しいもの決まった？\u3000まだ決まらない？\u3000じゃあリーナが選んであげる！」"
translation = "「오빠, 만들어줬으면 하는 거 정했어? 아직 안 정했어? 그럼 리나가 골라줄게!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんは好きな動物いる？\u3000リーナはやっぱりクマさん！」"
translation = "「오빠는 좋아하는 동물 있어? 리나는 역시 곰돌이!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「動物が決められないならキャラクターは？\u3000お兄ちゃん、時代劇好きだったよね？」"
translation = "「동물을 못 정하겠으면 캐릭터는? 오빠, 시대극 좋아했지?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……え、テレビでは５分で退場するのに漫画では大活躍する悪役？」"
translation = "「……에, TV에서는 5분 만에 퇴장하는데 만화에서는 대활약하는 악당?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「えぇ……悪役がいいの？\u3000お兄ちゃん、変わってるね……」"
translation = "「에에…… 악당이 좋아? 오빠, 특이하네……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんが言うなら頑張って作ってみるけど…………ううん、とにかくやってみるね」"
translation = "「오빠가 말한다면 열심히 만들어보겠지만………… 으응, 아무튼 해볼게」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「じゃあスケッチから……お兄ちゃん、その悪役が出てくる漫画貸して？\u3000ふーん、こんな顔なんだ」"
translation = "「그럼 스케치부터…… 오빠, 그 악당이 나오는 만화 좀 빌려줘? 흐음, 이런 얼굴이구나」"

[[dialogue]]
speaker = "unk"
original = "リーナがスケッチブックに悪役の姿を描いていく。ぬいぐるみなのでかなりデフォルメされているが、面影を残したままポップにアレンジされている。"
translation = "리나가 스케치북에 악당의 모습을 그려 나간다. 인형이라서 꽤 데포르메 되어있지만, 면모를 유지한 채 팝하게 어레인지되어 있다."

[[dialogue]]
speaker = "unk"
original = "絵、うまいね"
translation = "그림, 잘 그리네"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「え、ホント！？\u3000お兄ちゃんに褒められて嬉しいけど、くすぐったいよぉ……」"
translation = "「에, 정말!? 오빠한테 칭찬받으니까 기쁘지만 간지러워어……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「え、えっと、とりあえずスケッチ仕上げちゃうねっ」"
translation = "「어, 엣토, 일단 스케치 마무리할게!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "今まで見たことない、真剣な横顔。素敵なものが出来上がりそうな予感とともに、リーナの知らない一面を見れた嬉しさを感じたのだった。"
translation = "지금껏 본 적 없는 진지한 옆얼굴. 멋진 것이 완성될 것 같은 예감과 함께 리나의 모르는 일면을 볼 수 있었던 기쁨을 느꼈다."

