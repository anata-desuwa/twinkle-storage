[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ジャンジャジャ～ン！\u3000ジュリエッテ特製スパイス～！」"
translation = "「쨔잔─! 줄리에트 특제 스파이스─!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「説明しよう！\u3000ジュリエッテ特製スパイスとは、どんなクセあり魔獣の肉でもそれなりに食べられる味にしてくれる魔法の粉なのだ！」"
translation = "「설명하자면! 줄리에트 특제 스파이스란, 어떤 괴상한 마수 고기라도 그럭저럭 먹을 수 있는 맛으로 만들어주는 마법의 가루다!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「知ってるつーの。誰に向かって説明してんだ」"
translation = "「알고 있다고. 누구한테 설명하는 거냐」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナ、これ好き～！\u3000ピリ辛でおいしいよね！」"
translation = "「리나, 이거 좋아~! 매콤해서 맛있지!」"

[[dialogue]]
speaker = "unk"
original = "クーラーボックスを回収したレイラたちは、バーベキューをやり直すことにした。中に入っていた肉は流石にダメになっていたので、魔獣の釣り餌にした。"
translation = "아이스박스를 회수한 레이라 일행은 바비큐를 다시 하기로 했다. 안에 들어있던 고기는 역시 상해 있었기에 마수의 낚시 미끼로 썼다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お客様。その辺にいた魔獣のグリル～ジュリエッテ風～その辺に生えてた果物を添えて、でございます」"
translation = "「손님. 이 근처에 있던 마수 그릴 ~줄리에트 풍~ 그 근처에 자라던 과일을 곁들여서, 입니다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「その小芝居は昨日やっただろ」"
translation = "「그 상황극은 어제 했잖아」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「テンドンという日本の伝統料理にございます」"
translation = "「텐동이라고 하는 일본의 전통 요리(말장난)이옵니다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うるせえ。マジでうるせえ」"
translation = "「시끄러워. 진짜 시끄럽다고」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「この果物、リーナがとってきたんだよ！」"
translation = "「이 과일, 리나가 따온 거야!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ？\u3000魔獣はともかく、これ食えんだろうな？」"
translation = "「앙? 마수는 그렇다 치고, 이거 먹을 수 있는 거냐?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私が味見したから大丈夫。ダメだったら桜の木の下に埋めてもらってもかまわないよ」"
translation = "「내가 기미를 했으니까 괜찮아. 만약 잘못되면 벚꽃 나무 아래에 묻어줘도 상관없어」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「いや普通にその辺に埋めるわ。魔界の土になれや。で、味の方は……お、イケんじゃねぇか」"
translation = "「아니, 그냥 아무 데나 묻을게. 마계의 흙이나 되라고. 그래서 맛은…… 오, 괜찮은데?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「リーナ、よくやった。レイラ埋めていいぞ」"
translation = "「리나, 잘했다. 레이라는 묻어버려도 돼」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「わ～い！\u3000どうやって埋めよっかな～？」"
translation = "「와아─! 어떻게 묻어줄까~?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いやー！\u3000お助けー！」"
translation = "「싫어─! 살려줘─!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「くすくす、冗談だよ♪\u3000リーナがレイラお姉ちゃんにひどいことするわけないよ」"
translation = "「쿠스쿠스, 농담이야♪ 리나가 레이라 언니한테 심한 짓을 할 리 없잖아」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……う、うん。リーナは優しい子だもんね」"
translation = "「……으, 응. 리나는 착한 아이니까」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「では、気を取り直して私もお肉を……いただきます！\u3000ひゅごっ……もぐもぐ……」"
translation = "「그럼 기운을 차리고 나도 고기를…… 잘 먹겠습니다! 훕…… 우물우물……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「おいし～～～！！」"
translation = "「맛있어어어어!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「独特な魔獣のクセがスパイスによって中和され、旨みに昇華されていますね。……数種類の香草と香辛料が複雑に絡み合い、味に奥行きを生んでいます。シェフを！」"
translation = "「독특한 마수의 향이 스파이스에 의해 중화되어 감칠맛으로 승화되었군요. ……수 종류의 허브와 향신료가 복잡하게 어우러져 맛의 깊이를 더해주고 있습니다. 셰프를 불러라!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うるせぇつってんだろ！\u3000いい加減にしねえとマジで埋めっぞ！」"
translation = "「시끄럽다고 했지! 작작 안 하면 진짜 묻어버린다!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「すん……ひゅごっ……もぐもぐ……」"
translation = "「훌쩍…… 훕…… 우물우물……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「しっかし、ようやくまともなメシにありつけたぜ。さすがに昨日のは味しなかったしな」"
translation = "「그나저나 겨우 제대로 된 밥을 먹게 됐구먼. 역시 어제 건 아무 맛도 안 났단 말이지」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「キサナも変わったね。昔は食うものがあるだけマシって言って味は気にしなかったのに」"
translation = "「키사나도 변했네. 옛날에는 먹을 게 있는 것만으로 감지덕지라면서 맛은 신경 안 썼는데」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「昔の事なんざ覚えてねえよ。食うならウマい方がいいに決まってんだろ」"
translation = "「옛날 일 따위 기억 안 나. 먹을 거면 맛있는 게 나은 게 당연하잖아」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「この匂い、肉だな！\u3000私にも肉を食わせろ！\u3000早くよこせ！」"
translation = "「이 냄새, 고기로군! 나에게도 고기를 먹여라! 빨리 내놔!」"

[[dialogue]]
speaker = "unk"
original = "極度の疲労で動けないらしく、寝転がったまま声を上げるイングリット。"
translation = "극도의 피로로 움직일 수 없는 모양인지 누운 채로 소리를 지르는 잉그리드."

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、イングリットお姉ちゃん起きた」"
translation = "「아, 잉그리드 언니 일어났다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はっ、欲しけりゃ自分で取りに来い」"
translation = "「핫, 먹고 싶으면 직접 와서 가져가」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「もう、イジワルしないの。食べさせてあげるからじっとしててね。はい、あ～ん」"
translation = "「정말, 심술부리지 마. 먹여줄 테니까 가만히 있어. 자, 아~」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「あ～……あつっ！？\u3000熱すぎる！\u3000少し冷ませ」"
translation = "「아~…… 뜨거!? 너무 뜨겁다! 좀 식혀라」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「えー、ワガママだなぁ……ふー、ふー……はい、あ～ん」"
translation = "「에이, 투정 부리기는…… 후─, 후─…… 자, 아~」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「あ～ん……うまい！\u3000何の肉かさっぱり分からんが、肉の味がするぞ！」"
translation = "「아~음…… 맛있다! 무슨 고기인지 전혀 모르겠지만 고기 맛이 나는군!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お客様。その辺にいた魔獣のグリル～ジュリエッテ風～でございます」"
translation = "「손님. 이 근처에 있던 마수 그릴 ~줄리에트 풍~ 입니다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それはもういいつってんだろ」"
translation = "「그건 이제 됐다고 했잖아」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「もぐもぐ……もぐもぐ……復活！」"
translation = "「우물우물…… 우물우물…… 부활!」"

[[dialogue]]
speaker = "unk"
original = "イングリットがさながら、蛹から羽化した蝶のように立ち上がる。"
translation = "잉그리드가 마치 번데기에서 부화한 나비처럼 일어선다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私と戦え、レイラ！\u3000約束、忘れたとは言わせんぞ」"
translation = "「나와 싸워라, 레이라! 약속 잊었다고는 말 못 하겠지」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「げ。忘れててほしかった……はぁ、しょうがないな」"
translation = "「게. 잊어주길 바랐는데…… 하아, 어쩔 수 없네」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「コラプサー首領、百目騎レイラが受けて立ちます」"
translation = "「콜랩서 수령, 도우메키 레이라가 받아주겠습니다」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ようやくだ。ようやく貴様とまた戦える……」"
translation = "「드디어다. 드디어 네놈과 다시 싸울 수 있군……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「キサナ。分かってると思うけど、手出し無用だからね」"
translation = "「키사나. 알고 있겠지만 참견 금지야」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んな野暮なことしねえよ。オマエこそ負けたら分かってんだろうな」"
translation = "「그렇게 멋 모르는 짓은 안 해. 너야말로 지면 어떻게 될지 알고 있겠지」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うん、大丈夫だから見てて。リーナは……」"
translation = "「응, 괜찮으니까 지켜봐 줘. 리나는……」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナ、貝殻探してくる！\u3000持って帰るのにクーラーボックス使っていい？」"
translation = "「리나, 조개껍데기 찾아올게! 담아오는 데 아이스박스 써도 돼?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いいよー。でもあんまり遠くまで行かないでね」"
translation = "「돼─. 하지만 너무 멀리까지는 가면 안 된다?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「はーい」"
translation = "「네─」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「じゃあ、やろうか」"
translation = "「자, 그럼 시작할까」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「今度こそ、貴様に勝つ。勝って私は最強になる！」"
translation = "「이번에야말로 네놈에게 이긴다. 이기고 내가 최강이 되겠다!」"

