[[dialogue]]
speaker = "unk"
original = "俺たちは今、豪華客船『チェリークルーズ号』の甲板のプールに居た。"
translation = "우리들은 지금, 호화 여객선 『체리 크루즈 호』의 갑판 풀장에 있었다."

[[dialogue]]
speaker = "unk"
original = "そこには、デッキチェアに寝そべって夜空を見上げている俺とサラン以外に誰もいない。"
translation = "그곳에는 데크 체어에 누워 밤하늘을 올려다보고 있는 나와 사란 이외에는 아무도 없다."

[[dialogue]]
speaker = "クロト"
original = "「……静かだな…………」"
translation = "「……조용하네…………」"

[[dialogue]]
speaker = "サラン"
original = "「静かだね～……」"
translation = "「조용하네~……」"

[[dialogue]]
speaker = "クロト"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "サラン"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "その静けさに俺は少し大胆になって……"
translation = "그 정적에 나는 조금 대담해져서……"

[[dialogue]]
speaker = "クロト"
original = "「サラン……もしよかったら……」"
translation = "「사란…… 혹시 괜찮다면……」"

[[dialogue]]
speaker = "unk"
original = "隣にいるサランの手を握る。"
translation = "옆에 있는 사란의 손을 잡는다."

[[dialogue]]
speaker = "サラン"
original = "「…………うん、いいよ……会長ちゃん……しよ……」"
translation = "「…………응, 좋아…… 회장짱…… 하자……」"

[[dialogue]]
speaker = "unk"
original = "短い沈黙の後、サランの小さな手が握り返してくる。"
translation = "짧은 침묵 후, 사란의 작은 손이 되잡아온다."

[[dialogue]]
speaker = "クロト"
original = "「サラン……」"
translation = "「사란……」"

[[dialogue]]
speaker = "unk"
original = "サランの上に覆いかぶさるようにして見つめ合う。"
translation = "사란의 위를 덮치듯 올라타 서로를 바라본다."

[[dialogue]]
speaker = "サラン"
original = "「……ど、どうしたの～……黙って見つめられたら……恥ずかしいよ～……」"
translation = "「……어, 어떡해～…… 가만히 바라보면…… 부끄럽단 말이야～……」"

[[dialogue]]
speaker = "クロト"
original = "「可愛いなって、思って……」"
translation = "「귀엽다고 생각해서……」"

[[dialogue]]
speaker = "サラン"
original = "「ありがと～。でも、水着はもういっぱい褒めてもらったから……」"
translation = "「고마워～. 하지만, 수영복은 이미 잔뜩 칭찬받았으니까……」"

[[dialogue]]
speaker = "クロト"
original = "「いや、水着だけじゃなくて……サランの何もかもが可愛いなって……」"
translation = "「아니, 수영복뿐만 아니라…… 사란의 모든 게 귀엽다고……」"

[[dialogue]]
speaker = "サラン"
original = "「っっっうう～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으으으으으～～～윽♥♥♥」"

[[dialogue]]
speaker = "サラン"
original = "「どうしたの、会長ちゃん……なんだかいつものえっちと、雰囲気がちがうよ～……」"
translation = "「왜 그래, 회장짱…… 왠지 평소의 섹스랑은 분위기가 다른걸～……」"

[[dialogue]]
speaker = "クロト"
original = "「……この雰囲気がそうさせるのかな？」"
translation = "「……이 분위기가 그렇게 만드는 걸까?」"

[[dialogue]]
speaker = "unk"
original = "プールはライトアップされ、ムーディーな明かりに照らされている。"
translation = "풀장은 라이트업되어 무드 있는 조명에 비춰지고 있다."

[[dialogue]]
speaker = "unk"
original = "静かな波の音が遠くに聞こえるだけで、人の声もない。物音もしない。世界に２人だけだと錯覚させるような……静かな世界……"
translation = "먼 곳에서 들려오는 고요한 파도 소리뿐, 사람의 목소리도 없다. 아무런 소리도 나지 않는다. 세상에 둘뿐이라는 착각이 들게 하는…… 고요한 세계……"

[[dialogue]]
speaker = "サラン"
original = "「いつもはお部屋でしてるから、お外でするなんてドキドキするけど……」"
translation = "「항상 방에서만 했으니까, 밖에서 하는 건 두근거리지만……」"

[[dialogue]]
speaker = "サラン"
original = "「でも不思議なくらい、穏やかな気持ち……会長ちゃんも、そうなのかな……？」"
translation = "「하지만 신기할 정도로 평온한 기분…… 회장짱도, 그런 걸까……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、まさにそんな気持ち……」"
translation = "「아아, 정말로 그런 기분이야……」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんとのえっちはいつだって、夢中で求めちゃうけど……こんな気持ちのままえっちしたら、どうなっちゃうのかな……」"
translation = "「회장짱과의 섹스는 언제나 정신없이 원하게 되지만…… 이런 기분으로 섹스하면 어떻게 되어버릴까……」"

[[dialogue]]
speaker = "クロト"
original = "「してみようか……」"
translation = "「해볼까……」"

[[dialogue]]
speaker = "サラン"
original = "「うん……」"
translation = "「응……」"

[[dialogue]]
speaker = "unk"
original = "俺は勃起したペニスの先端を、サランの秘部へと押し当てる。"
translation = "나는 발기한 자지의 끝을 사란의 비부에 밀어붙인다."

[[dialogue]]
speaker = "unk"
original = "くちゅりという音がして、先端部分が花びらの中へもぐりこんだ。"
translation = "질척이는 소리가 나며 끝부분이 꽃잎 안으로 파고들었다."

[[dialogue]]
speaker = "クロト"
original = "「すごく濡れてる……興奮は、ちゃんとしてくれてるんだ……」"
translation = "「엄청 젖었어…… 흥분은 제대로 해주고 있구나……」"

[[dialogue]]
speaker = "サラン"
original = "「もちろんだよ～。会長ちゃんだって落ち着いてるようにみえるのに、おち○ちん、カチカチになってるよ……」"
translation = "「물론이지～. 회장짱도 차분해 보이는데, 자지, 딱딱하게 서 있어……」"

[[dialogue]]
speaker = "クロト"
original = "「そうだな……」"
translation = "「그렇네……」"

[[dialogue]]
speaker = "unk"
original = "そのカチカチのペニスを上下に動かして、サランの入り口付近を丁寧にまさぐる。"
translation = "그 딱딱한 자지를 상하로 움직이며 사란의 입구 근처를 정성스럽게 매만진다."

[[dialogue]]
speaker = "サラン"
original = "「クチュクチュって、サランのおま○こ……えっちな音、してる……んんぅう……そんなに感じてたの……？」"
translation = "「쿠츄쿠츄하고, 사란의 보지…… 야한 소리 나고 있어…… 으응…… 그렇게 느끼고 있었던 거야……?」"

[[dialogue]]
speaker = "サラン"
original = "「ぁ、ぅ……んんっ……恥ずかしい……んっ、ん……あぅ……んんん……」"
translation = "「아, 으…… 응…… 부끄러워…… 응, 윽…… 아우…… 으으음……」"

[[dialogue]]
speaker = "サラン"
original = "「っ……んんんんっ……<emoji=heart04>」"
translation = "「윽…… 으으으음……♥」"

[[dialogue]]
speaker = "unk"
original = "膣壁を押し分けて、サランの内側へペニスを押し進める。"
translation = "질벽을 밀어젖히며 사란의 안쪽으로 자지를 밀어 넣는다."

[[dialogue]]
speaker = "サラン"
original = "「ぁああ、んんっ……おち○ちん、入ってきてる……ゆっくり……出たり入ったりしてるぅ……<emoji=heart04>」"
translation = "「아아아, 응…… 자지, 들어오고 있어…… 천천히…… 들어왔다 나갔다 하고 있어……♥」"

[[dialogue]]
speaker = "unk"
original = "動きが緩やかな分、その動きを意識できるのかもしれない。"
translation = "움직임이 완만한 만큼, 그 움직임을 더 의식하게 되는 것일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "俺の微かな動きにも反応して、膣内のヒダが忙しなく蠢いた。"
translation = "나의 미세한 움직임에도 반응하여 질 안의 주름들이 분주하게 꿈틀거렸다."

[[dialogue]]
speaker = "サラン"
original = "「はぁ……ぁ……んんっ……んぅ……ぁ……熱い……んんっ……会長ちゃんの……おち○ちん……」"
translation = "「하아…… 아…… 응…… 윽…… 아…… 뜨거워…… 응…… 회장짱의…… 자지……」"

[[dialogue]]
speaker = "サラン"
original = "「んっ、ふ、んんん……はぁ、ぅ……んんんっ……ぁ……あああ……んんんっ……」"
translation = "「응, 후, 으으음…… 하아, 윽…… 으으으음…… 아…… 아아아…… 으으으음……」"

[[dialogue]]
speaker = "unk"
original = "サランの膣の具合を味わいながら、俺はゆっくりとしたピストンを続ける。"
translation = "사란의 질 상태를 맛보며 나는 천천히 피스톤질을 계속한다."

[[dialogue]]
speaker = "unk"
original = "ペニスがサランの内に押し込まれるたび、その内側から愛液がこぼれる。"
translation = "자지가 사란의 안으로 밀려 들어갈 때마다 그 안쪽에서 애액이 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "その量がサランの身体にどれだけ火がついているかを教えていた。"
translation = "그 양이 사란의 몸에 얼마나 불이 붙었는지를 알려주고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「サラン……感じてるところも可愛いよ……」"
translation = "「사란…… 느끼는 모습도 귀여워……」"

[[dialogue]]
speaker = "サラン"
original = "「んぅうう……会長ちゃん……そんなこと言われたら……余計に感じちゃうよ～……んんっ、あぁあ……<emoji=heart04>」"
translation = "「으으으으…… 회장짱…… 그런 말을 들으면…… 더 느껴버린다구～…… 응, 아아아……♥」"

[[dialogue]]
speaker = "サラン"
original = "「や、あぁあ……んんんっ……会長ちゃんに、見つめられてるだけで……イッちゃいそうだよ～……んんんっ、あ、ああっ……<emoji=heart04>」"
translation = "「아, 아아아…… 으으으음…… 회장짱이 바라보는 것만으로도…… 가버릴 것 같아～…… 으으으음…… 아, 아아앗……♥」"

[[dialogue]]
speaker = "unk"
original = "恥じらうサランに顔を近づける。"
translation = "부끄러워하는 사란에게 얼굴을 가까이한다."

[[dialogue]]
speaker = "サラン"
original = "「んっ……ん……ふ……んんっ……ちゅ……んんっ……」"
translation = "「응…… 윽…… 후…… 응…… 츄…… 응……」"

[[dialogue]]
speaker = "サラン"
original = "「んんっ……ふ……ふぁ……んんんっ……ん……ちゅ……んむ……ふ……んんんっ……ふぁ……」"
translation = "「응…… 후…… 후아…… 으으음…… 응…… 츄…… 음…… 후…… 으으음…… 후아……」"

[[dialogue]]
speaker = "unk"
original = "短くついばむようなキスを何度も繰り返す。"
translation = "짧게 쪼는 듯한 키스를 몇 번이고 반복한다."

[[dialogue]]
speaker = "unk"
original = "そして、キスの合間には身体を寄せてサランを抱きしめる。"
translation = "그리고 키스 사이사이에는 몸을 밀착해 사란을 껴안는다."

[[dialogue]]
speaker = "サラン"
original = "「はぁ、ぅうう……んん……そんな、優しく抱きしめられたら……もっと嬉しくなっちゃう……<emoji=heart04>」"
translation = "「하아, 으으으…… 응…… 그렇게 다정하게 안아주면…… 더 기뻐져버려……♥」"

[[dialogue]]
speaker = "クロト"
original = "「サランは柔らかくて抱き心地がいいからな……大好きなんだ……」"
translation = "「사란은 부드러워서 안는 느낌이 좋으니까…… 정말 좋아해……」"

[[dialogue]]
speaker = "サラン"
original = "「嬉しい……会長ちゃん、いつでもいっぱい……サランのこと抱きしめて……会長ちゃん……」"
translation = "「기뻐…… 회장짱, 언제든 잔뜩…… 사란을 안아줘…… 회장짱……」"

[[dialogue]]
speaker = "サラン"
original = "「んっ、ん……は……んんんっ……んっ……ふぅ、ん……ふぁ……ん……ふ……ちゅ、む……んんんっ……」"
translation = "「응, 윽…… 하…… 으으음…… 응…… 후우, 응…… 후아…… 응…… 후…… 츄, 읍…… 으으음……」"

[[dialogue]]
speaker = "サラン"
original = "「ちゅ、は、んん……ちゅむ……んん、ふぁ……ん……んんっ……ちゅ、ん……ふ、ちゅぱ、ん……んん……ふ……ちゅむ……」"
translation = "「츄, 하, 응…… 츄읍…… 응, 후아…… 응…… 응…… 츄, 응…… 후, 츄파, 응…… 응…… 후…… 츄읍……」"

[[dialogue]]
speaker = "unk"
original = "サランの唇を割り舌を忍び込ませると、サランはすぐに絡めてくる。"
translation = "사란의 입술을 가르고 혀를 밀어 넣자 사란은 곧바로 혀를 얽어온다."

[[dialogue]]
speaker = "unk"
original = "俺とサランはしばらく、息をすることも忘れて長い長いキスに没頭する。"
translation = "나와 사란은 한동안 숨 쉬는 것도 잊은 채 길고 긴 키스에 몰입한다."

[[dialogue]]
speaker = "サラン"
original = "「んっ、ちゅっ、ふ……ちゅ、んむ……ぷはっ、は……ちゅ、んんっ……んっ、んふ……ちゅ、んんんっ……」"
translation = "「응, 츄, 후…… 츄, 음무…… 푸핫, 하…… 츄, 으응…… 응, 응후…… 츄, 으으응……」"

[[dialogue]]
speaker = "サラン"
original = "「ふぁ、ん……はぁ……キス、気持ちいいよぉ……んんっ、ちゅ、んん、ん……ちゅは、ん……んふ……ちゅ、ちゅむ……んんっ……ふぁ……」"
translation = "「화, 응…… 하아…… 키스, 기분 좋아아…… 으응, 츄, 으응, 응…… 츄하, 응…… 응후…… 츄, 츄무…… 으응…… 화……」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ……甘いキス……飴玉みたいに溶けてなくなっちゃいそう……<emoji=heart04>\u3000んんっ……ちゅ、ふ……んんんっ……<emoji=heart04>」"
translation = "「에헤헤…… 달콤한 키스…… 사탕처럼 녹아서 없어져 버릴 것 같아……♥ 으응…… 츄, 후…… 으으으응……♥」"

[[dialogue]]
speaker = "サラン"
original = "「んっ、ちゅ、はぁ……キスだけでも、気持ちいいのに……んんっ……は……ズポズポするのも……ずっと続けてるから……んんんっ……<emoji=heart04>」"
translation = "「응, 츄, 하아…… 키스만으로도 기분 좋은데…… 으응…… 하…… 즈포즈포 하는 것도…… 계속하고 있으니까…… 으으으응……♥」"

[[dialogue]]
speaker = "unk"
original = "キスをしながらも、緩やかなピストンは続けていた。"
translation = "키스를 하면서도 완만한 피스톤은 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "舌を絡める興奮に合わせて襞がざわめき、包み込んだペニスを撫で上げていく。"
translation = "혀를 섞는 흥분에 맞춰 주름이 술렁이고, 감싸 안은 페니스를 훑어 올라간다."

[[dialogue]]
speaker = "サラン"
original = "「あっ……！\u3000あ……んんんっ……んぅ……そこ……サランの気持ちいいところだぁ～……んんんっ……<emoji=heart04>」"
translation = "「앗……! 아…… 으으으응…… 응으…… 거기…… 사란의 기분 좋은 곳이야아~…… 으으으응……♥」"

[[dialogue]]
speaker = "サラン"
original = "「はぁ、あっ……は、んんっ……会長ちゃんは、すぐに分かるんだね……サランの弱いところ……あ、あっ……あああ、ん、はぁああ……<emoji=heart04>」"
translation = "「하아, 앗…… 하, 으응…… 회장짱은 금방 아는구나…… 사란의 약한 곳…… 아, 앗…… 아아아, 응, 하아아아……♥」"

[[dialogue]]
speaker = "クロト"
original = "「分かるよ……だってもう、数えきれないくらいサランとはエッチしたから……」"
translation = "「알 수 있어…… 그야 벌써 셀 수 없을 정도로 사란과는 섹스했으니까……」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ、嬉しいな……何も言わなくても分かってもらえるの……んんっ……<emoji=heart04>」"
translation = "「에헤헤, 기쁘다…… 아무 말 안 해도 알아주는 거…… 으응……♥」"

[[dialogue]]
speaker = "サラン"
original = "「それに……会長ちゃん……知ってる……サランがして欲しいこと……んんんっ……そこ、いっぱい攻めて欲しいって……んっ、あっ……ああっ……<emoji=heart04>」"
translation = "「게다가…… 회장짱…… 알고 있어…… 사란이 해줬으면 하는 거…… 으으으응…… 거기, 잔뜩 괴롭혀줬으면 좋겠다고…… 응, 앗…… 아앗……♥」"

[[dialogue]]
speaker = "サラン"
original = "「はぁ、ぅ……んんっ……でも、変だよ……んんっ……どうして……？\u3000こんなに、ゆっくりなのに……サラン、なんだか……あっ、感じて……ぁっ……ん……」"
translation = "「하아, 으…… 으응…… 하지만 이상해…… 으응…… 어째서……? 이렇게 천천히인데…… 사란, 왠지…… 앗, 느껴져서…… 앗…… 응……」"

[[dialogue]]
speaker = "サラン"
original = "「っ……ぁ……！！！\u3000んんぅうううっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 아……!!! 으으응으으으윽……♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "サランが軽くイッたのが分かった。"
translation = "사란이 가볍게 가버린 것을 알 수 있었다."

[[dialogue]]
speaker = "サラン"
original = "「はぁ……はぁ……ん……ぁあ……ふ……んんっ……<emoji=heart04>\u3000びっくり……しちゃった……んんんっ……<emoji=heart04>」"
translation = "「하아…… 하아…… 응…… 아아…… 후…… 으응……♥ 깜짝…… 놀라버렸어…… 으으으응……♥」"

[[dialogue]]
speaker = "サラン"
original = "「こんなにゆっくりでも……イけちゃうんだ……っ……はぁ……ん……」"
translation = "「이렇게 천천히 해도…… 가버릴 수 있구나……윽…… 하아…… 응……」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ……でも……何だかふわふわで……幸せなえっちだよ……こういうのも、好き……<emoji=heart04>」"
translation = "「에헤헤…… 하지만…… 왠지 폭신폭신해서…… 행복한 섹스야…… 이런 것도 좋아……♥」"

[[dialogue]]
speaker = "サラン"
original = "「それじゃ会長ちゃん……次は会長ちゃんが気持ちよくなる番だよ……」"
translation = "「그럼 회장짱…… 다음은 회장짱이 기분 좋아질 차례야……」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう、サラン……。でも、俺は一緒がいいな……サランと一緒に気持ちよくなりたい……」"
translation = "「고마워, 사란……. 하지만 난 함께인 게 좋아…… 사란이랑 같이 기분 좋아지고 싶어……」"

[[dialogue]]
speaker = "サラン"
original = "「ふふっ……そうだね……それじゃ……一緒に気持ちよくなろ……会長ちゃん……<emoji=heart04>」"
translation = "「후후…… 그렇네…… 그럼…… 같이 기분 좋아지자…… 회장짱……♥」"

[[dialogue]]
speaker = "unk"
original = "俺は再び、抜いては差しのピストンを始める。"
translation = "나는 다시 뺐다 박았다 하는 피스톤을 시작한다."

[[dialogue]]
speaker = "unk"
original = "先ほどの緩やかなものとは違い、自分も気持ちよくなることを求めたピストン。"
translation = "방금 전의 완만한 것과는 다른, 자신도 기분 좋아지기를 갈구하는 피스톤."

[[dialogue]]
speaker = "サラン"
original = "「んっ、んっ、んっ……！\u3000んっ、はっ、あっ……あぁあ……んんっ、あっ、あっ、あ、ああっ……！」"
translation = "「응, 응, 응……! 응, 핫, 앗…… 아아아…… 으응, 앗, 앗, 아, 아앗……!」"

[[dialogue]]
speaker = "サラン"
original = "「っ、んん……はっ、あぁあ、あっ……は……んんっ……<emoji=heart04>\u3000えへへ……会長ちゃんも……気持ちよくなってる～……<emoji=heart04>」"
translation = "「윽, 으응…… 핫, 아아아, 앗…… 하…… 으응……♥ 에헤헤…… 회장짱도…… 기분 좋아지고 있어~……♥」"

[[dialogue]]
speaker = "サラン"
original = "「あ、んっ、は、ああっ……んぅ……会長ちゃんの……えっちしてる時の顔……好きぃ……んんっ、あっ、あ、ああっ……<emoji=heart04>」"
translation = "「아, 응, 하, 아앗…… 응으…… 회장짱의…… 섹스할 때 얼굴…… 좋아아…… 으응, 앗, 아, 아앗……♥」"

[[dialogue]]
speaker = "サラン"
original = "「切なそうで……汗がにじんでて……唇がちょっと震えてて……声には出ないけど……気持ち、伝わってくるよ……<emoji=heart04>」"
translation = "「애절해 보여서…… 땀이 배어 나오고…… 입술이 조금 떨리고…… 목소리로는 안 나오지만…… 기분, 전해져 와……♥」"

[[dialogue]]
speaker = "サラン"
original = "「気持ちいいよね……んんっ……えっち、気持ちいいよね……会長ちゃんっ……あああっ、ん、ふぁ、んん……あぁ、あっ、ああんっ……<emoji=heart04>」"
translation = "「기분 좋지…… 으응…… 섹스, 기분 좋지…… 회장짱…… 아아앗, 응, 화, 으응…… 아아, 앗, 아앙……♥」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんの息遣い、どんどん荒くなってる……んんんっ……おち○ちんもの動きも……乱暴になっていって……」"
translation = "「회장짱의 숨결, 점점 거칠어지고 있어…… 으으으응…… 자지의 움직임도…… 난폭해져 가고……」"

[[dialogue]]
speaker = "サラン"
original = "「でも、愛してるんだ～……サランのことが大切で……好きで好きで仕方ないって……あぁあっ……伝わってくるから……<emoji=heart04>」"
translation = "「하지만 사란하고 있는걸~…… 사란을 소중히 여기고…… 좋아하고 좋아해서 어쩔 줄 모르겠다는 게…… 아아앗…… 전해져 오니까……♥」"

[[dialogue]]
speaker = "サラン"
original = "「ああっ、あっ、あっ……ん、あ、あああっ……嬉しい……愛してる……大好きだよ……会長ちゃんっ……あっ、あああっ……<emoji=heart04>」"
translation = "「아앗, 앗, 앗…… 응, 아, 아아앗…… 기뻐…… 사랑해…… 정말 좋아해…… 회장짱…… 앗, 아아앗……♥」"

[[dialogue]]
speaker = "unk"
original = "サランの言葉に愛情と欲望がごちゃごちゃにかき混ぜられる。"
translation = "사란의 말에 애정과 욕망이 어지럽게 뒤섞인다."

[[dialogue]]
speaker = "unk"
original = "荒れ狂う気持ちを収めるために、サランの唇を貪る。"
translation = "거친 마음을 가라앉히기 위해 사란의 입술을 탐한다."

[[dialogue]]
speaker = "サラン"
original = "「んんっ……！\u3000んっ、んんっ、ちゅ、んん……ふぁあ……！\u3000んんんっ、んむ……ふ、ちゅ、ん……ちゅぷ、れろっ、んん、ふ、はぁああ……<emoji=heart04>」"
translation = "「으응……! 응, 으응, 츄, 으응…… 화아……! 으으으응, 응무…… 후, 츄, 응…… 츄푸, 레로, 으응, 후, 하아아아……♥」"

[[dialogue]]
speaker = "サラン"
original = "「キス、激し……んんっ、ちゅ、ふぁ……はぁ……キスでも、サランに夢中だって……んんっ……伝えてくれてるっ……んんんっ……<emoji=heart04>」"
translation = "「키스, 격렬해…… 으응, 츄, 화아…… 하아…… 키스로도 사란에게 빠져있다고…… 으응…… 전해주고 있어…… 으으으응……♥」"

[[dialogue]]
speaker = "サラン"
original = "「ふぁ……はぁ……ぁ……んんんっ……<emoji=heart04>\u3000はぁ、あ……どんどん……サランのおま○こ……熱くなってる……あ、あああんっ……<emoji=heart04>」"
translation = "「화…… 하아…… 아…… 으으으응……♥ 하아, 아…… 점점…… 사란의 보지가…… 뜨거워지고 있어…… 아, 아아앙……♥」"

[[dialogue]]
speaker = "サラン"
original = "「あっ、あっ、あ、んんっ……はぁ、あ……さっき、イッたばかりなのに……また、どんどん気持ちよくなってくよ……あ、ああっ、っ、あ、あああっ……<emoji=heart04>」"
translation = "「앗, 앗, 아, 으응…… 하아, 아…… 아까 막 가버렸는데…… 또 점점 기분 좋아져 가…… 아, 아앗, 윽, 아, 아아앗……♥」"

[[dialogue]]
speaker = "unk"
original = "その兆候は俺も感じ取っていた。"
translation = "그 징조는 나도 느끼고 있었다."

[[dialogue]]
speaker = "unk"
original = "ペニスを包み込んだ膣が再び収縮を始める。"
translation = "페니스를 감싸 안은 질이 다시 수축을 시작한다."

[[dialogue]]
speaker = "unk"
original = "その全てを吸い上げるような動きは、俺の欲望の全部を呑み込もうとしているかのようだった。"
translation = "그 모든 것을 빨아올리는 듯한 움직임은 내 욕망 전부를 삼키려 하는 것 같았다."

[[dialogue]]
speaker = "サラン"
original = "「はぁ、う、んんんっ……会長、ちゃん……どうしよ……サラン、また……んんんっ……！」"
translation = "「하아, 으, 으으으응…… 회장, 짱…… 어떡해…… 사란, 또…… 으으으응……!」"

[[dialogue]]
speaker = "クロト"
original = "「いいよ……俺もイキそうだから……そのまま……」"
translation = "「괜찮아…… 나도 갈 것 같으니까…… 그대로……」"

[[dialogue]]
speaker = "サラン"
original = "「うん、うん、わかった……んんっ……サラン、イクね……会長ちゃんっ……あ、ああっ……イクっ、もう……サラン、イッちゃうっ……<emoji=heart04>」"
translation = "「응, 응, 알았어…… 으응…… 사란, 갈게…… 회장짱…… 아, 아앗…… 가, 이제…… 사란, 가버려……♥」"

[[dialogue]]
speaker = "unk"
original = "ペニスを痺れた様な感覚が包んでいる。"
translation = "페니스를 저릿한 감각이 감싸고 있다."

[[dialogue]]
speaker = "unk"
original = "背筋が震え、目がくらみ、意識が霞がかったようにぼやけてくる。"
translation = "등줄기가 떨리고 눈앞이 아찔해지며 의식이 안개 낀 것처럼 흐릿해진다."

[[dialogue]]
speaker = "unk"
original = "だけど、ただ夢中で……サランと一緒に絶頂を迎えるために、無心に身体を揺さぶり続ける。"
translation = "하지만 그저 정신없이…… 사란과 함께 절정을 맞이하기 위해 무심히 몸을 계속 흔든다."

[[dialogue]]
speaker = "サラン"
original = "「あっ、あっ、あっ、あ、あ、ああっ、あ、んんっ<emoji=heart04>\u3000ん、あっ、ああっ<emoji=heart04>\u3000は、ふぁ、あ……あ、あ、あ……ああああっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아, 아, 아앗, 아, 으응♥ 응, 앗, 아앗♥ 하, 화, 아…… 아, 아, 아…… 아아아앗♥」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんっ、んんっ、会長ちゃんっ！\u3000んんっ、あっ、あ、ああっ、や、んんっ、く、あぁあ……らめっ、サラン、もう、らめぇっ……！！」"
translation = "「회장짱, 으응, 회장짱! 으응, 앗, 아, 아앗, 야, 으응, 쿠, 아아아…… 안 돼, 사란, 이제, 안 돼애……!!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ぁあ……俺も……サランの、中にっ……！！！」"
translation = "「윽…… 아아…… 나도…… 사란의 안에……!!!」"

[[dialogue]]
speaker = "サラン"
original = "「んんっ、あ、らしてっ<emoji=heart04>\u3000んんっ……サランのおま○こにっ……<emoji=heart04>\u3000会長ちゃんのせーえきっれ満たしてっ……<emoji=heart04>」"
translation = "「으응, 아, 내보내 줘♥ 으응…… 사란의 보지에……♥ 회장짱의 정액으로 채워줘……♥」"

[[dialogue]]
speaker = "サラン"
original = "「びゅーびゅーって、あふれるくらい、いっぱいのせーしでイかせてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああっ、あっ、あああっ、あ、ああっ<emoji=heart04>」"
translation = "「뷰뷰하고 넘칠 정도로 잔뜩 정자로 가게 해줘♥ 앗♥ 앗♥ 아아앗, 앗, 아아앗, 아, 아앗♥」"

[[dialogue]]
speaker = "サラン"
original = "「あああっ、あっ、あっ、あ、ああっ<emoji=heart04>\u3000らめぇっ、らめ、らめ、もうっ……イク……イクイクイクっ！\u3000イッちゃうううううっ！！！」"
translation = "「아아앗, 앗, 앗, 아, 아앗♥ 안 돼, 안 돼, 안 돼, 이제…… 가…… 가가각! 가버려어어어어엇!!!」"

[[dialogue]]
speaker = "unk"
original = "サランの身体がさっきよりも激しく、びくんびくんと跳ね上がる。"
translation = "사란의 몸이 아까보다 격렬하게 움찔움찔 튀어 오른다."

[[dialogue]]
speaker = "unk"
original = "同時に膣全体がペニスをギュッと締め付けてきて──"
translation = "동시에 질 전체가 페니스를 꽉 조여오며──"

[[dialogue]]
speaker = "クロト"
original = "「っ……！！！！！！！！」"
translation = "「윽…… !!!!!!!!」"

[[dialogue]]
speaker = "サラン"
original = "「ぁっ……あ、あああああああああああああーーーーーーっ！！！！！！！！！」"
translation = "「아앗…… 아, 아아아아아아아아아아아아아──────!!!!!!!!!」"

[[dialogue]]
speaker = "unk"
original = "快感の頂点に達した叫びを上げながら、サランが全身を<ruby>戦慄<rt>わなな</rt></ruby>かせる。"
translation = "쾌감의 정점에 달한 비명을 지르며 사란이 전신을 전율 떨게 한다."

[[dialogue]]
speaker = "サラン"
original = "「ああっ！！\u3000んっ、は、ああっ！！\u3000んぅうう……んんっ……！\u3000あ、ああっ……！！」"
translation = "「아앗!! 응, 하, 아앗!! 응으으으…… 으응……! 아, 아앗……!!」"

[[dialogue]]
speaker = "サラン"
original = "「しゅご、い……んんっ……イッて、るぅ……おま○こ……震えがとまらないぃ……んんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「대단, 해…… 으응…… 가고, 있어…… 보지…… 떨림이 멈추지 않아아…… 으응……♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "達してからもなお、サランの膣は蠢き、ペニスを刺激し続けていた。"
translation = "사정하고 나서도 여전히 사란의 질은 꿈틀거리며 페니스를 계속 자극하고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺は下半身に力を込めながら、全てを吐き出そうと限界まで脈打たせる。"
translation = "나는 하반신에 힘을 주며 모든 것을 쏟아내려는 듯 한계까지 맥동시킨다."

[[dialogue]]
speaker = "サラン"
original = "「あっ……ん……うう……んぅう……ん……<emoji=heart04>\u3000んく、ぅ……はぁ……ん……はぁ……はぁ……<emoji=heart04>」"
translation = "「앗…… 응…… 우우…… 응으으…… 응……♥ 응쿠, 우…… 하아…… 응…… 하아…… 하아……♥」"

[[dialogue]]
speaker = "unk"
original = "途切れ途切れの喘ぎを漏らしながら、ようやく長い絶頂の余韻が収まりを見せ始めた。"
translation = "끊어질 듯한 신음을 흘리며 마침내 긴 절정의 여운이 잦아들기 시작했다."

[[dialogue]]
speaker = "unk"
original = "その波がゆっくり引いたのを感じ取ると、俺はサランの中からペニスを引き抜く。"
translation = "그 파도가 천천히 물러가는 것을 느끼자 나는 사란의 안에서 페니스를 뽑아낸다."

[[dialogue]]
speaker = "サラン"
original = "「あっ……<emoji=heart04>\u3000んんぅ……ん……」"
translation = "「앗……♥ 으응으…… 응……」"

[[dialogue]]
speaker = "unk"
original = "膣口からあふれた精液は、お尻を伝って流れ、ビーチチェアに白い水たまりを作った。"
translation = "질 입구에서 넘쳐흐른 정액은 엉덩이를 타고 흘러 비치 체어에 하얀 웅덩이를 만들었다."

[[dialogue]]
speaker = "サラン"
original = "「はぁ……はぁ……ん……会長……ちゃん……」"
translation = "「하아…… 하아…… 응…… 회장…… 짱……」"

[[dialogue]]
speaker = "クロト"
original = "「ん……？」"
translation = "「응……?」"

[[dialogue]]
speaker = "サラン"
original = "「好き……<emoji=heart04>」"
translation = "「좋아해……♥」"

[[dialogue]]
speaker = "unk"
original = "それだけ言って、サランは幸せそうな笑顔を浮かべる。"
translation = "그 말만 하고 사란은 행복한 미소를 짓는다."

[[dialogue]]
speaker = "クロト"
original = "「俺も……愛してる……」"
translation = "「나도…… 사랑해……」"

[[dialogue]]
speaker = "unk"
original = "そっと唇にキスをして、それからもう一度サランをギュッと抱きしめる。"
translation = "살며시 입술에 키스하고 나서 다시 한번 사란을 꽉 껴안는다."

[[dialogue]]
speaker = "unk"
original = "そのぬくもりと柔らかさを感じながら、心地よい疲労感に身を任せるのだった。"
translation = "그 온기와 부드러움을 느끼며 기분 좋은 피로감에 몸을 맡기는 것이었다."

