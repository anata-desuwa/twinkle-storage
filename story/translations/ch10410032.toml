[[dialogue]]
speaker = "unk"
original = "第２話,激辛頂上対決,P"
translation = "제2화, 매운맛 정점 대결, P"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふぃ～。こうやってまったり休日を過ごすのも悪くないねー。会長、さっきからＤＩＳＣでなに観てるの？」"
translation = "「휘유~. 이렇게 느긋하게 휴일을 보내는 것도 나쁘지 않네ー. 회장, 아까부터 DISC로 뭐 보고 있어?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、<ruby>Ｒｙｕｔｕｂｅ<rt>リューチューブ</rt></ruby>？\u3000動画サイトかぁ」"
translation = "「아~ <ruby>Ryutube<rt>류튜브</rt></ruby>? 동영상 사이트구나」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……にひっ♪\u3000ねー会長、ＤＩＳＣ貸して？\u3000会長がどんな動画をブクマしてるのか気になるな～♪」"
translation = "「……니히♪ 저기 회장, DISC 좀 빌려줘? 회장이 어떤 영상을 북마크하고 있는지 궁금하네~♪」"

[[dialogue]]
speaker = "unk"
original = "いいよ、どうぞ"
translation = "그래, 여기."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「む～、あっさりＯＫかぁ。その信頼は嬉しいけど、見られてまずい動画は保存してないってことだよね。ツマンナ～イな～」"
translation = "「무~, 시시하게 OK인 거야. 그 신뢰는 기쁘지만 보여줘서 곤란한 영상은 저장 안 했다는 거네. 노~잼이네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まぁいっか～。にひひ、彼氏の好み、調べちゃお～っと♪」"
translation = "「뭐 됐어~. 니히히, 남자친구의 취향, 조사해봐야지~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「──あ、この子知ってる。Ｖチューバーの『<ruby>汐<rt>うしお</rt></ruby>ルカルカ』じゃん。へー、会長この子が好きなんだ～？」"
translation = "「──아, 이 애 알아. V튜버 『시오 루카루카』잖아. 헤에, 회장 이 애 좋아하는구나~?」"

[[dialogue]]
speaker = "unk"
original = "ずっと応援してるんだ"
translation = "계속 응원하고 있어."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「お～、マジだ。専用フォルダ作って、全動画がブクマされてる。へ～、意外かも……」"
translation = "「오~ 진짜다. 전용 폴더 만들어서 모든 영상이 북마크 되어있어. 헤에, 의외일지도……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長ってあんまりアイドルとか興味なさそ～に見えるけどな。もしかしてこの子、知り合いだったりするー？\u3000なんちて～♪」"
translation = "「회장은 별로 아이돌 같은 거에 관심 없~어 보였는데 말이야. 혹시 이 애, 아는 사이라거나ー? 농담이야~♪」"

[[dialogue]]
speaker = "unk"
original = "（マイン、無駄に鋭い……！）"
translation = "(마인, 쓸데없이 날카로워……!)"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ──昔のこの動画、私も知ってる～。好きなんだよね。再生してみよ～っと♪」"
translation = "「아── 옛날의 이 영상, 나도 알아~. 좋아하거든. 재생해봐야지~♪」"

[[dialogue]]
speaker_original = "汐ルカルカ"
speaker_translation = "시오 루카루카"
original = "『キュー、キュー、キューッとおはドルフィン☆\u3000今日は激辛ラーメンチャレンジしちゃいま～す！\u3000まずはお水を飲んで準備してー……！』"
translation = "『큐, 큐, 큐웃하고 오하돌핀☆ 오늘은 아주 매운 라면 챌린지 해보겠습니~다! 우선은 물을 마셔서 준비하고ー……!』"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、この子シロートだね♪\u3000激辛モノの時にお水は駄目だよ～。辛さが余計に突き刺さっちゃうのに」"
translation = "「아~ 이 애 초보네♪ 매운 거 먹을 때 물은 안 된다구~. 매운맛이 오히려 더 찔러오는데」"

[[dialogue]]
speaker_original = "汐ルカルカ"
speaker_translation = "시오 루카루카"
original = "『いったっだきまーす！\u3000ずずずっ────エ゛ンッ！？！？』"
translation = "『자아 먹겠습니~다! 호로록──── 에헥!?!!?』"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あははははっ♪\u3000これ！\u3000この変な声のリアクション！\u3000癖になるよね～っ♪」"
translation = "「아하하하하♪ 이거! 이 이상한 목소리 리액션! 중독성 있다니까~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「は～、面白かった～♪\u3000この子、最近は歌動画ばっかりでネタ系はあげなくなっちゃったよねー。私は昔の方が好きだったな～♪」"
translation = "「하~ 재밌었다~♪ 이 애 최근에는 노래 영상뿐이라 네타 계열은 안 올리게 됐지ー. 난 옛날이 더 좋았는데~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「てかアレだね、動画見てたら激辛ラーメン食べたくなってきたかも！」"
translation = "「그보다 저거다, 영상 보니까 아주 매운 라면 먹고 싶어졌을지도!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ルカルカちゃんが食べてたラーメン、有名店のコラボカップ麺なんだよ。流星市国に本店があるんだけど、食べたことある？」"
translation = "「루카루카짱이 먹던 라면, 유명 맛집 콜라보 컵라면이라구. 유성 시국에 본점이 있는데 먹어본 적 있어?」"

[[dialogue]]
speaker = "unk"
original = "いや、ないな"
translation = "아니, 없네."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それはもったいないね～♪\u3000お昼まだだし、今から行こっか！」"
translation = "「그건 아깝네~♪ 점심 전이니까 지금 바로 가자!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほら、ここだよー♪\u3000お昼前だから混んでるけど、回転早いからすぐ食べられると思うよ。並ぼ並ぼっ」"
translation = "「봐, 여기야ー♪ 점심 전이라 붐비지만 회전율이 빨라서 금방 먹을 수 있을 거야. 줄 서자 줄 서」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「失礼しま～す……って、あれ？\u3000あなたは──」"
translation = "「실례합니~다…… 어라? 당신은──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔王と公安の……？\u3000奇遇だな。お前たちもラーメンを食べに来たのか」"
translation = "「마왕과 공안의……? 기묘한 우연이군. 너희도 라면을 먹으러 온 건가」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「流星市国に住んでるのに、ここの激辛ラーメン食べたことないって会長が言うから引っ張って来たんだ～」"
translation = "「유성 시국에 살면서 여기 아주 매운 라면을 먹어본 적 없다고 회장이 말하길래 끌고 왔어~」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なるほど。ここの味を知らないのは、損失を超えて罪と言える。よかったな魔王、グルメな恋人がいたことに感謝するといい」"
translation = "「과연. 이곳의 맛을 모르는 것은 손실을 넘어 죄라고 할 수 있지. 잘됐군 마왕, 미식가인 연인이 있다는 것에 감사하도록」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「今さらだけど私が公安の所属だとか、会長と付き合ってるだとか、全部知ってるんだね。まぁネビュラだし当然か～……」"
translation = "「이제 와서지만 내가 공안 소속이라든가, 회장과 사귀고 있다든가 전부 알고 있네. 뭐 네뷸라이니 당연한가~……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ま、今はオフだし気にしないでおこっと。ここに来るってことは、セドナさんもかなりの辛党でしょ？」"
translation = "「뭐 지금은 오프니까 신경 쓰지 말아야지. 여기 온다는 건 세드나 씨도 꽤나 매운 거 좋아하나 보네?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フ──当然だ。ここは一味違うからな。つい何度も足を運んでしまう」"
translation = "「후── 당연하다. 여기는 차원이 다르니까 말이지. 나도 모르게 몇 번이고 발길을 옮기게 된다」"

[[dialogue]]
speaker = "unk"
original = "オススメのメニューってあります？"
translation = "추천하는 메뉴가 있나요?"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「イリュージョンボルケーノＭＡＸ盛りがいいだろう」"
translation = "「일루전 볼케이노 MAX 곱빼기가 좋겠지」"

[[dialogue]]
speaker = "unk"
original = "……必殺技？？？"
translation = "……필살기???"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひ♪\u3000ますます私と好みが似てるかも♪\u3000いいよね～、やっぱりボルケーノラーメンが一番だよ！\u3000油断したら死が見える辛さだし！」"
translation = "「니히♪ 점점 나랑 취향이 비슷할지도♪ 좋지~ 역시 볼케이노 라면이 최고야! 방심하면 죽음이 보이는 매운맛이고!」"

[[dialogue]]
speaker = "unk"
original = "接点のないマインとセドナさんだったが、激辛好きということもあって打ち解けたみたいだ。どうせなら３人で食べるかということになったのだが──"
translation = "접점이 없는 마인과 세드나 씨였지만, 매운 것을 좋아한다는 공통점 덕분에 금방 친해진 모양이다. 기왕이면 셋이서 먹기로 했는데──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「大将～、こんにちはー♪\u3000食べに来たよ～！」"
translation = "「사장님~ 안녕하세요ー♪ 먹으러 왔어~!」"

[[dialogue]]
speaker_original = "ラーメン店主"
speaker_translation = "라면집 주인"
original = "「いらっしゃいやせェ！\u3000おっ、ラーメンクイーンの嬢ちゃんか！」"
translation = "「어서 오쇼! 오, 라면 퀸 아가씨구만!」"

[[dialogue]]
speaker = "unk"
original = "ラーメンクイーン……？"
translation = "라면 퀸……?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「チャレンジメニューを制覇した人に与えられる称号だよ。ふふ、実はこの店の２位の実力者なんだ～♪」"
translation = "「챌린지 메뉴를 제패한 사람에게 주어지는 칭호야. 후후, 사실 이 가게의 2위 실력자라구~♪」"

[[dialogue]]
speaker = "unk"
original = "そうなんだ！？"
translation = "그렇구나!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも私より上の人がいるんだよね。１位の座のラーメンキング。その人の記録をどうしても抜けなくって……」"
translation = "「하지만 나보다 위에 있는 사람이 있거든. 1위 자리를 지키는 라면 킹. 그 사람의 기록을 도저히 못 넘어서……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「親父。今日も盛況だな」"
translation = "「아저씨. 오늘도 성황이군」"

[[dialogue]]
speaker_original = "ラーメン店主"
speaker_translation = "라면집 주인"
original = "「キ──キングッ！？」"
translation = "「키── 킹!!?」"

[[dialogue]]
speaker = "unk"
original = "──ぇえぇえぇ！？"
translation = "──에에에에엑!?"

[[dialogue]]
speaker_original = "ラーメン店主"
speaker_translation = "라면집 주인"
original = "「まさかクイーンとキングが同時の来店だとォ！？\u3000おめェら気合い入れろやァ！」"
translation = "「설마 퀸과 킹이 동시에 내점하다니!! 너희들 기합 넣어라!!」"

[[dialogue]]
speaker_original = "店員たち"
speaker_translation = "점원들"
original = "「お──押忍ッ！！」"
translation = "「오── 오쓰!!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フ──世間は狭いな。お前がクイーンだったのか」"
translation = "「후── 세상 좁군. 네가 퀸이었나」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……それはこっちのセリフだよ。あなたが記録を塗り替えるまでは、私がキングだったのに」"
translation = "「……그건 이쪽이 할 대사야. 당신이 기록을 갈아치우기 전까지는 내가 킹이었는데」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「すまんが恋人の前だからと手は抜けんぞ？\u3000激辛ラーメンは食ではない。命を賭した闘争だからな」"
translation = "「미안하지만 연인 앞이라고 해서 봐줄 순 없겠군. 아주 매운 라면은 식사가 아니다. 목숨을 건 투쟁이니까 말이지」"

[[dialogue]]
speaker = "unk"
original = "ちょっと何言ってるのかわからないです"
translation = "조금 무슨 소리인지 모르겠어요."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「受けて立つよ！\u3000今日こそキングの座を奪還するっ……！」"
translation = "「도전을 받아들이지! 오늘이야말로 킹의 자리를 탈환하겠어……!」"

[[dialogue]]
speaker = "unk"
original = "仲良く食べてバイバイしない？？？"
translation = "사이좋게 먹고 헤어지면 안 될까???"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「親父。ボルケーノラーメン、１００倍だ。この女と同時にスタートする」"
translation = "「아저씨. 볼케이노 라면, 100배다. 이 여자와 동시에 시작한다」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長はストップウォッチお願い。あと応援して。マイン頑張れ～って。頼んだよ！」"
translation = "「회장은 스톱워치 부탁해. 그리고 응원해줘. 마인 힘내라~ 라고. 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "争い、よくない！！！"
translation = "싸움은 좋지 않아!!!"

[[dialogue]]
speaker = "unk"
original = "俺がどれだけ静止しても２人は聞かず……そして数分後。火山の噴火口のようなラーメンが運ばれてきて、激闘が始まったのだった──"
translation = "내가 아무리 말려도 두 사람은 듣지 않았고…… 그리고 몇 분 뒤. 화산 분화구 같은 라면이 운반되어 오며 격투가 시작되었다──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「見事だ……まさか給水タイミングをあそこまで削って来るとはな。今日は私の負けだ……次回からは再びお前がキングを名乗るといい」"
translation = "「훌륭하다…… 설마 급수 타이밍을 저기까지 깎아낼 줄이야. 오늘은 나의 패배다…… 다음부터는 다시 네가 킹을 자처하도록 해라」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「やったっ！\u3000大勝利～！！」"
translation = "「해냈다! 대승리~!!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長の応援のおかげだよ──ちゅっ<emoji=heart04>」"
translation = "「회장의 응원 덕분이야── 쪽❤️」"

[[dialogue]]
speaker = "unk"
original = "かっらあぁああぁあああいっ！？"
translation = "매워어어어어어어어어업!!!?"

[[dialogue]]
speaker = "unk"
original = "感極まったマインにキスをされた途端、唇が痺れて感覚がなくなったんだけど──何だ、この体験！？"
