[[dialogue]]
speaker = "unk"
original = "第２話,メスガキリラクゼーション,P"
translation = "제2화, 메스가키 릴랙제이션, P"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ん～……会長さん、何だか顔色が優れませんね。もしかしてお疲れですか？」"
translation = "「음~ 회장군, 왠지 안색이 좋지 않네요. 혹시 피곤하신가요?」"

[[dialogue]]
speaker = "unk"
original = "ここのところハードワークなんだ"
translation = "요즘 하드 워크라서 말이야"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ちょっと本格的にお辛そうですねぇ……よろしければ、私が<ruby>癒<rt>い</rt></ruby>やしてあげましょうか<emoji=heart04>\u3000ちょうど２人きりですし」"
translation = "「조금 본격적으로 힘들어 보이시네요…… 괜찮으시다면 제가 치유해 드릴까요<emoji=heart04> 마침 둘뿐이기도 하고」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……あ～<emoji=heart04>\u3000今、何かいやらしいことを想像しました？\u3000言っておきますけど、まっとうな癒やしですよ？」"
translation = "「……아~<emoji=heart04> 지금 뭔가 야한 상상 했죠? 미리 말해두겠는데 건전한 치유라고요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「これでも香水で名を馳せた家の娘ですから。リラックスさせる方法はたくさん知ってるんです♪」"
translation = "「이래 봬도 향수로 이름을 날린 가문의 딸이니까요. 릴랙스시키는 방법은 많이 알고 있답니다♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それじゃあ始めちゃいますね。シャルレーヌの、リラクゼーションコースっ<emoji=heart04>」"
translation = "「그럼 시작할게요. 샤를렌의 릴랙제이션 코스~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「疲れを取るためには、まず体を温めることが先決です♪\u3000香りの良いローズヒップティーを淹れてみました。ご賞味ください<emoji=heart04>」"
translation = "「피로를 풀기 위해서는 우선 몸을 따뜻하게 하는 게 급선무예요♪ 향이 좋은 로즈힙 티를 우려 왔습니다. 드셔보세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうしてバレンタインフォームに？"
translation = "왜 발렌타인 폼으로? "

[[dialogue]]
speaker = "unk"
original = "それはありがたいんだけど……"
translation = "그건 고맙긴 한데……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「会長さんってエッチな男の子でしょう？\u3000露出の多い恰好の方が癒やされるかな～って♪\u3000キャハハっ<emoji=heart04>」"
translation = "「회장군은 야한 남자애잖아요? 노출이 많은 차림이 더 치유될까 싶어서요~♪ 캬하핫<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ほぉら、シャルレーヌが心を込めて注いだお紅茶、お残ししちゃダメですよ～？」"
translation = "「자아, 샤를렌이 정성을 담아 따른 홍차, 남기면 안 돼요~?」"

[[dialogue]]
speaker = "unk"
original = "あっ。すごくおいしい……！"
translation = "앗. 정말 맛있다……! "

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふふっ。ローズヒップは酸味の強い紅茶です」"
translation = "「후훗. 로즈힙은 산미가 강한 홍차예요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ビタミンがと～っても豊富ですし、気分の落ち着く薔薇の香りもたっぷり。体がほぐれていくでしょう？」"
translation = "「비타민이 아~주 풍부하고 기분이 차분해지는 장미 향도 듬뿍. 몸이 풀리는 것 같죠?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「香水の原料にもなる薔薇ですからね。あ、でも香りが気に入らなければ言ってください」"
translation = "「향수의 원료이기도 한 장미니까요. 아, 하지만 향이 마음에 안 들면 말해주세요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「どんなにいい香りでも、感じ方には個人差があるので」"
translation = "「아무리 좋은 향이라도 느끼는 방식에는 개인차가 있으니까요」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、すごくいい香りだよ"
translation = "괜찮아, 정말 좋은 향이야"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それは良かったです♪\u3000会長さんにぴったりの薔薇だと以前から思ってたので……やっぱり似た者同士、肌に合うんでしょうか<emoji=heart04>」"
translation = "「그거 다행이네요♪ 회장군에게 딱 맞는 장미라고 예전부터 생각했거든요…… 역시 닮은 꼴끼리 살결이 맞는 걸까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「あ、ご存じないんですか～？\u3000ローズヒップの和名を……♪」"
translation = "「아, 모르시나요~? 로즈힙의 일본 이름을……♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「『犬薔薇』って言うんですよ♪\u3000私にいっつも負けちゃってる、可愛いワンちゃんな会長さんには、ぴったりでしたね～<emoji=heart04>」"
translation = "「『들장미(개장미)』라고 하거든요♪ 나한테 맨날 지기만 하는 귀여운 멍멍이 같은 회장군에게는 딱이었네요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふ<emoji=heart04>\u3000それじゃあ体も温まったでしょうし、ここからはコリをほぐしちゃいましょう」"
translation = "「쿠후후<emoji=heart04> 그럼 몸도 따뜻해졌을 테니 이제부터 뭉친 곳을 풀어보죠」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「こうやって、デスクワークで凝った肩をお揉みしてあげますね～……わぁ、ガッチガチ～<emoji=heart04>」"
translation = "「이렇게 데스크 업무로 뭉친 어깨를 주물러 드릴게요~…… 와아, 꽉 뭉쳤어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ダメじゃないですかあ、会長さん。こぉんなにガチガチに硬くしちゃったら～<emoji=heart04>」"
translation = "「안 되잖아요, 회장군. 이~렇게 딱딱하게 굳혀버리면~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「いっぱい、溜めちゃったんですねー……<emoji=heart04>\u3000溜めすぎは体に毒ですよー？\u3000溜まっちゃう前に、定期的に発散しないと～<emoji=heart04>」"
translation = "「잔뜩 쌓아버렸군요ー……<emoji=heart04> 너무 쌓아두는 건 몸에 독이라고요? 쌓이기 전에 정기적으로 발산해야지~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ま、負けないぞ……！"
translation = "지, 지지 않을 거야……! "

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「え～？\u3000これ、リラクゼーションのためのマッサージですよぉ？\u3000勝ち負けの話なんてしてましたっけ～<emoji=heart04>」"
translation = "「에~? 이거 릴랙제이션을 위한 마사지라고요? 승부 이야기 같은 거 했었나요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「おっといけない♪\u3000疲れを体の外に出すおまじない、ちゃーんとしなくちゃ<emoji=heart04>」"
translation = "「이런, 안 되지♪ 피로를 몸 밖으로 내보내는 주문, 제대로 외워야지<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ほぉら出せ<emoji=heart04>\u3000思いっきり出せ<emoji=heart04>\u3000シャルレーヌのモミモミマッサージで～……い～っぱい<emoji=heart04>\u3000出せ出せ出せ出せ出せっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자아 내보내<emoji=heart04> 마음껏 내보내<emoji=heart04> 샤를렌의 조물조물 마사지로~…… 잔~뜩<emoji=heart04> 내보내 내보내 내보내 내보내 내보내앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──もう負けでいいです！\u3000許して！！"
translation = "──이제 패배로 쳐도 좋아! 용서해줘!! "

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「え～。さっきまで負けないって言ってたのに。手のひら大回転ですね～<emoji=heart04>\u3000なっさけなぁ～い<emoji=heart04>」"
translation = "「에~. 방금 전까지 안 진다더니. 태세 전환이 엄청나네요~<emoji=heart04> 한심해라~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「──あら、誰か来たみたいね」"
translation = "「──어머, 누가 온 모양이네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、お疲れ様～……って？\u3000シャルレーヌちゃんだ！」"
translation = "「회장, 수고했어~…… 어라? 샤를렌 짱이다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「マトイ先輩。ご無沙汰しております」"
translation = "「마토이 선배. 오랜만이에요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「久しぶりだね。星徒会に何か用事かな？」"
translation = "「오랜만이네. 성도회에 무슨 용무라도 있어?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい、ですがもう用事は終わりました。今は会長さんにお茶をお出ししていたところなんです」"
translation = "「네, 하지만 용무는 이미 끝났어요. 지금은 회장군에게 차를 대접하던 중이었답니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうだったんだ。でもごめんね、お客様にお茶を出させちゃうだなんて」"
translation = "「그랬구나. 하지만 미안해, 손님한테 차를 내오게 하다니」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「いえ。私から頼み込んだんです。何だか会長さん、すごく疲れが溜まってたみたいでしたから……」"
translation = "「아니에요. 제가 부탁한걸요. 왠지 회장군, 피로가 엄청 쌓여 있는 것 같아서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そっかぁ～。うちの会長の心配をしてくれてありがとね、シャルレーヌちゃん。流石はお付き合いしてる彼女さんってところかな？」"
translation = "「그렇구나~. 우리 회장 걱정해줘서 고마워, 샤를렌 짱. 역시 사귀는 여자친구라 이건가?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「私、会長さんとお付き合いはしていませんよ？」"
translation = "「저, 회장군이랑 사귀는 거 아닌데요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええっ、そうなの！？\u3000よく一緒にいるから、てっきり……！」"
translation = "「에엣, 그래!? 자주 같이 있길래 당연히 그런 줄……!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「たかが魔界の一貴族と、世界を救った魔王様では、釣り合いも取れませんから♪」"
translation = "「고작 마계의 일개 귀족과 세계를 구한 마왕님은 격이 맞지 않으니까요♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「む～、そんなことないと思うけどなぁ。会長だってシャルレーヌちゃんのこと、大切に思ってるはずだし……」"
translation = "「음~ 그렇지 않다고 생각하는데. 회장도 샤를렌 짱을 소중하게 생각하고 있을 거고……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──っと。ヴィーナスからメッセージだ。……え～っ、何でそんなことになってるの！？」"
translation = "「──앗. 비너스한테 메시지다. ……에에엣, 왜 그렇게 된 거야!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ごめん会長、またちょっと出かけてくるね！\u3000シャルレーヌちゃんもお客様なんだから、ゆっくりしていってね！」"
translation = "「미안 회장, 또 잠깐 나갔다 올게! 샤를렌 짱도 손님이니까 천천히 쉬다 가!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ありがとうございます、マトイ先輩♪\u3000いってらっしゃいませ」"
translation = "「감사합니다, 마토이 선배♪ 다녀오세요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふっ<emoji=heart04>\u3000マトイ先輩、私たちがお付き合いしていると思ってたみたいですよ？\u3000そういう噂が流れてるんでしょうか？」"
translation = "「쿠후후<emoji=heart04> 마토이 선배님, 우리가 사귀고 있다고 생각했나 봐요. 그런 소문이라도 돌고 있는 걸까요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「いっそのこと、噂を本当のモノにしちゃいますー？\u3000私に屈服します～って宣言、しちゃいますか～？」"
translation = "「차라리 소문을 진짜로 만들어 버릴래요~? 저한테 굴복하겠습니다~ 라고 선언해 버릴까요~?」"

[[dialogue]]
speaker = "unk"
original = "ペットになる気はない……！"
translation = "펫이 될 생각은 없어……! "

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「キャハハ<emoji=heart04>\u3000そうやって強がりする会長さん、嫌いじゃないですよ？」"
translation = "「캬하<emoji=heart04> 그렇게 허세 부리는 회장군, 싫지 않아요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それじゃあマッサージの続きをしましょうか～<emoji=heart04>\u3000ほおら、いっぱい出ぁせ<emoji=heart04>\u3000しこたま出せ<emoji=heart04>\u3000出せ出せ、出～せっ<emoji=heart04>」"
translation = "「그럼 마사지 계속할까요~<emoji=heart04> 자아, 잔뜩 내보내~<emoji=heart04> 실컷 내보내<emoji=heart04> 내보내 내보내, 내보내~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は再び、シャルレーヌに過激なマッサージを仕掛けられ、目を白黒させるのだった──"
translation = "그렇게 나는 다시 샤를렌에게 과격한 마사지를 당하며 정신을 못 차리게 되는 것이었다──"

