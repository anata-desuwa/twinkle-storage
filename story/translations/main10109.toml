[[dialogue]]
speaker = "unk"
original = "第９話,２人だけのアステラ攻略戦,B"
translation = "제9화 둘만의 아스테라 공략전 B"

[[dialogue]]
speaker = "アナ"
original = "「これがアステラ内での戦い……思っていた以上に、体が上手く動かないですね」"
translation = "「이것이 아스테라 내에서의 전투…… 생각했던 것 이상으로 몸이 잘 움직이지 않네요.」"

[[dialogue]]
speaker = "アナ"
original = "「それに追い払っても追い払っても、また新手が……どこからでも湧いて出てきます」"
translation = "「게다가 쫓아내고 쫓아내도 또 새로운 무리가…… 어디서든 솟아 나와요.」"

[[dialogue]]
speaker = "マトイ"
original = "「まったく、春先の虫じゃないんだから……チョウチョくらい可愛げがあればまだマシなんだけど」"
translation = "「정말이지, 초봄의 벌레도 아니고…… 나비 정도의 귀여움이라도 있으면 좀 나을 텐데.」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩……これはかなり危険な状況なのでは」"
translation = "「마토이 선배…… 이건 꽤 위험한 상황 아닌가요.」"

[[dialogue]]
speaker = "マトイ"
original = "「大丈夫、会長たちが来てくれるから！\u3000だから頑張ろ、アナちゃん！」"
translation = "「괜찮아, 회장님들이 오실 거니까! 그러니까 힘내자, 아나짱!」"

[[dialogue]]
speaker = "マトイ"
original = "（明らかに私たちはモンスターの猛攻に押されている）"
translation = "(명백히 우리는 몬스터의 맹공에 밀리고 있어.)"

[[dialogue]]
speaker = "マトイ"
original = "（このままだとジリ貧。いずれ防衛ラインは決壊するだろう）"
translation = "(이대로라면 소모전이야. 조만간 방어선은 결궤하겠지.)"

[[dialogue]]
speaker = "マトイ"
original = "（それでも。それでもだ）"
translation = "(그래도. 그래도 말이야.)"

[[dialogue]]
speaker = "マトイ"
original = "（先輩の私が、アナちゃんより先に弱音を吐くわけにはいかない）"
translation = "(선배인 내가 아나짱보다 먼저 약한 소리를 할 수는 없어.)"

[[dialogue]]
speaker = "マトイ"
original = "（どんな窮地でも笑顔を絶やさない。ヴィーナス会長みたいに――！）"
translation = "(어떤 궁지에서도 미소를 잃지 않아. 비너스 회장님처럼――!)"

[[dialogue]]
speaker = "マトイ"
original = "（──会長みたいに？）"
translation = "(──회장님처럼?)"

[[dialogue]]
speaker = "マトイ"
original = "「なぁんだ……このくらいの攻撃、どうってことないじゃない！」"
translation = "「뭐야…… 이 정도 공격, 아무것도 아니잖아!」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩？」"
translation = "「마토이 선배?」"

[[dialogue]]
speaker = "マトイ"
original = "「私はあのヴィーナス会長の必殺技だって耐えきった星騎士だよ！\u3000あの無茶苦茶に比べたら、この程度！」"
translation = "「나는 그 비너스 회장님의 필살기조차 견뎌낸 성기사라고! 그 엉망진창인 공격에 비하면 이 정도쯤이야!」"

[[dialogue]]
speaker = "マトイ"
original = "「このくらいで音を上げたら、会長に鼻で笑われる！」"
translation = "「이 정도로 소리를 지르면 회장님이 코웃음 칠 거야!」"

[[dialogue]]
speaker = "マトイ"
original = "「だからね、アナちゃん。ノープロブレム！\u3000アナちゃんへの攻撃は、全部私が防ぐからね！」"
translation = "「그러니까 아나짱. 노 프로블럼! 아나짱에게 가는 공격은 전부 내가 막을 테니까!」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩……ありがとうございます」"
translation = "「마토이 선배…… 감사합니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「うん、元気なお返事！\u3000いいよっ！」"
translation = "「응, 씩씩한 대답! 좋아!」"

[[dialogue]]
speaker = "アナ"
original = "「ひとつ、聞いてもいいですか？」"
translation = "「하나 물어봐도 될까요?」"

[[dialogue]]
speaker = "マトイ"
original = "「ひとつと言わず、何個でもどうぞ」"
translation = "「하나 말고 몇 개든 물어봐.」"

[[dialogue]]
speaker = "アナ"
original = "「会長たちが来るまで持ち堪えるのが、私たちの役目ですけど」"
translation = "「회장님들이 올 때까지 버티는 게 저희 역할이지만요.」"

[[dialogue]]
speaker = "アナ"
original = "「私たちで殲滅しちゃってもノープロブレムですね？」"
translation = "「저희가 섬멸해버려도 노 프로블럼이죠?」"

[[dialogue]]
speaker = "マトイ"
original = "「もちろん！」"
translation = "「물론이지!」"

[[dialogue]]
speaker = "アナ"
original = "「命令してください、マトイ先輩」"
translation = "「명령해 주세요, 마토이 선배.」"

[[dialogue]]
speaker = "マトイ"
original = "「行くよ、<b>アナ</b>！\u3000モンスターを殲滅する！」"
translation = "「간다, 아나! 몬스터를 섬멸한다!」"

[[dialogue]]
speaker = "マトイ"
original = "「ふええ……案外、何とかなったけど……疲れたぁ……」"
translation = "「후에에…… 의외로 어떻게든 됐지만…… 지쳤다아…….」"

[[dialogue]]
speaker = "アナ"
original = "「はぁー、ふぅー、ふひゅー、空気が美味しいです」"
translation = "「하아─, 후우─, 후휴─, 공기가 맛있어요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私の見せ場を奪ってくれたわね！」"
translation = "「내 활약 무대를 빼앗아 버렸네!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──なーんてね。お疲れ様。よくやったわ！」"
translation = "「──라든가 말이야. 수고했어. 잘했어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「２人とも頑張ったわね～」"
translation = "「둘 다 열심히 했네~」"

[[dialogue]]
speaker = "マトイ"
original = "「……遅かったじゃないですか」"
translation = "「……늦었잖아요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「人的被害はゼロ、建物の被害も極めて軽微。お手柄よ～」"
translation = "「인명 피해는 제로, 건물 피해도 극히 경미. 큰 공을 세웠어~」"

[[dialogue]]
speaker = "サーシャ"
original = "「まさか２人だけで片づけちゃうなんて思わなかったわ～」"
translation = "「설마 둘이서만 해결해버릴 줄은 몰랐네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何言ってるの、サーシャさん！\u3000私が見つけてきた役員なんだから当然よ！」"
translation = "「무슨 소리야, 사샤 씨! 내가 찾아온 임원이니까 당연하지!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「２人ともよくやってくれたわ。特にマトイは自主練の帰りだったんじゃないの？\u3000疲れてたでしょうに、大変だったでしょ」"
translation = "「둘 다 잘해줬어. 특히 마토이는 자율 연습 끝나고 돌아가던 길 아니었어? 피곤했을 텐데 고생 많았네.」"

[[dialogue]]
speaker = "アナ"
original = "「自主練……そうだったんですか？」"
translation = "「자율 연습…… 그랬던 건가요?」"

[[dialogue]]
speaker = "マトイ"
original = "「んー……まあね。これでも星徒会役員なんだから頑張らなきゃって思って」"
translation = "「음─…… 뭐 그렇지. 이래 봬도 성도회 임원이니까 열심히 해야겠다고 생각해서.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「誰も気づかないところで、並々ならぬ努力をしてるのがマトイなのよ」"
translation = "「아무도 모르는 곳에서 남다른 노력을 하는 게 마토이라고.」"

[[dialogue]]
speaker = "マトイ"
original = "「並々ならなくないです。普通ですよ。努力なんて誰でもできるじゃないですか」"
translation = "「남다르지 않아요. 평범해요. 노력 같은 건 누구나 할 수 있잖아요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「とんでもないわ！\u3000マトイ、あなたは今、世界の半分を敵に回したわよ！」"
translation = "「천만에! 마토이, 너는 지금 전 세계의 절반을 적으로 돌렸어!」"

[[dialogue]]
speaker = "マトイ"
original = "「何十億人も！？」"
translation = "「수십억 명이나!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いい？\u3000ほとんどの人間は、努力なんてしなくていいなら、したくないものなの」"
translation = "「알겠어? 대부분의 인간은 노력 같은 거 안 해도 된다면 하고 싶지 않은 법이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「誰が褒めてくれるわけでもないのに、努力を重ねられるマトイのそれは立派な才能なのよ！」"
translation = "「누가 칭찬해주는 것도 아닌데 노력을 거듭할 수 있는 마토이의 그것은 훌륭한 재능이라고!」"

[[dialogue]]
speaker = "サーシャ"
original = "「マトイちゃんは毎日、頑張ってて、本当に偉いわね～。花丸あげちゃ～う。なでなで、よしよし♪」"
translation = "「마토이짱은 매일 노력하고 있어서 정말 기특하네~. 참 잘했어요 도장 찍어줄게~. 쓰담쓰담, 착하다 착해♪」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、ありがとうございます」"
translation = "「아, 감사합니다」"

[[dialogue]]
speaker = "アナ"
original = "「ヴィーナス会長は、もう少し努力をした方が良いのでは。主に書類仕事の」"
translation = "「비너스 회장은 노력을 조금 더 하는 편이 좋지 않을까요. 주로 서류 업무 쪽으로요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えー、イヤよ！\u3000努力してもできないものはあるし！」"
translation = "「에─, 싫어! 노력해도 안 되는 건 있다고!」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは……」"
translation = "「아하하……」"

[[dialogue]]
speaker = "アナ"
original = "「ありがとうございます、マトイ先輩」"
translation = "「고맙습니다, 마토이 선배」"

[[dialogue]]
speaker = "マトイ"
original = "「アナちゃん……」"
translation = "「아나짱……」"

[[dialogue]]
speaker = "アナ"
original = "「アナでＯＫです」"
translation = "「아나로 OK예요」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩が私の前に立ってくれてたおかげで、安心して戦うことができました」"
translation = "「마토이 선배가 제 앞에 서 주신 덕분에 안심하고 싸울 수 있었어요」"

[[dialogue]]
speaker = "マトイ"
original = "「私からも、ありがとう。アナが必ずやってくれるって信じてたから、前で踏ん張れたんだよ」"
translation = "「나도 고마워. 아나가 반드시 해낼 거라고 믿었으니까 앞에서 버틸 수 있었던 거야」"

[[dialogue]]
speaker = "アナ"
original = "「きっと、大福を食べてたおかげですね」"
translation = "「분명 대복을 먹은 덕분이겠네요」"

[[dialogue]]
speaker = "マトイ"
original = "「ふふ、そうだね。大福さまさまだ」"
translation = "「후후, 그렇네. 대복님 덕분이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なになに？\u3000何の話？」"
translation = "「뭐야 뭐야? 무슨 이야기야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今回の件は、マトイの自信に繋がったみたいね。私たちの出番はなかったけど、ケガニのダイミョウだわ！」"
translation = "「이번 건은 마토이의 자신감으로 이어진 모양이네. 우리 차례는 없었지만, 부상 뒤의 대명이야!」"

[[dialogue]]
speaker = "サーシャ"
original = "「美味しそうね～。でもそれを言うなら怪我の功名かしら～」"
translation = "「맛있어 보이네요~. 하지만 그걸 말하려면 전화위복이라고 해야 할까요~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう、それそれ」"
translation = "「그래, 그거 그거」"

[[dialogue]]
speaker = "サーシャ"
original = "「マトイちゃんもアナちゃんも、きっともっと頼れる星徒会役員になってくれるわね～。これからが楽しみだわ～」"
translation = "「마토이짱도 아나짱도 분명 더욱 의지할 수 있는 성도회 임원이 되어주겠네~. 앞으로가 기대돼~」"

