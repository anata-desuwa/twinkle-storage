[[dialogue]]
speaker = "フラン"
original = "「しっかし見ねえな死神。『出てこい堕天使！』っつって出てくるわけねえしなー」"
translation = "「그나저나 사신이 안 보이네. 『나와라 타락천사!』라고 한다고 나올 리도 없겠지만 말이야─」"

[[dialogue]]
speaker = "グロリア"
original = "「黒い装束というお話でしたが、恥ずかしがり屋なのでしょうか？」"
translation = "「검은 옷을 입었다는 이야기였는데, 수줍음이 많은 걸까요?」"

[[dialogue]]
speaker = "フラン"
original = "「全身真っ黒とかむしろ自己主張激しいだろ」"
translation = "「전신이 새까만 건 오히려 자기주장이 강한 거 아니냐.」"

[[dialogue]]
speaker = "グロリア"
original = "「目撃情報も空振りでしたし、どうすればいいのでしょうか……。あ、張り紙がしてあります」"
translation = "「목격 정보도 허탕이었고, 어쩌면 좋을까요……. 아, 벽보가 붙어 있어요.」"

[[dialogue]]
speaker = "グロリア"
original = "「ええと……『遊園地でスタンプラリー開催中。課題をクリアしてスタンプを集めると景品がもらえます！』……だそうです」"
translation = "「어디 보자…… 『유원지에서 스탬프 랠리 개최 중. 과제를 클리어해서 스탬프를 모으면 경품을 드립니다!』……라고 하네요.」"

[[dialogue]]
speaker = "フラン"
original = "「よし、やるぞ！」"
translation = "「좋아, 하는 거다!」"

[[dialogue]]
speaker = "unk"
original = "死神を探しに来たんじゃ！？"
translation = "사신을 찾으러 온 거 아니었어!?"

[[dialogue]]
speaker = "フラン"
original = "「遊園地から勝負を挑んできてるんだぞ！\u3000受けて立たなきゃ戦士の名折れだ！」"
translation = "「유원지에서 승부를 걸어오고 있잖아! 받아주지 않으면 전사의 수치라고!」"

[[dialogue]]
speaker = "フラン"
original = "「それに死神探しが行き詰ってるんだ。何かのきっかけになるかもしれねえだろ」"
translation = "「게다가 사신 찾기도 막혀 있잖아. 뭔가 계기가 될지도 모르고 말이야.」"

[[dialogue]]
speaker = "unk"
original = "グロリアさんはどうですか？"
translation = "글로리아 씨는 어때요?"

[[dialogue]]
speaker = "グロリア"
original = "「ええと……申し訳ありません。娯楽にうとく、スタンプラリーというものを存じ上げなくて……」"
translation = "「저기…… 죄송합니다. 오락에 어두워서 스탬프 랠리라는 것을 잘 몰라서……」"

[[dialogue]]
speaker = "フラン"
original = "「カードにスタンプを押していって、全部埋まったら勝ちだ！\u3000ま、やればわかるって」"
translation = "「카드에 도장을 찍어나가서 다 채우면 이기는 거다! 뭐, 해보면 알아.」"

[[dialogue]]
speaker = "unk"
original = "じゃあ試しにやってみま──"
translation = "그럼 시험 삼아 해보자──"

[[dialogue]]
speaker = "？？？"
original = "「おにーさん♪」"
translation = "「오빠야♪」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!??"

[[dialogue]]
speaker = "？？？"
original = "「や、また会ったね。元気にしてた？\u3000歯は磨いた？\u3000夜はちゃんとぐっすり寝た？」"
translation = "「야아, 또 만났네. 잘 지냈어? 이는 닦았어? 밤에는 잠 잘 잤어?」"

[[dialogue]]
speaker = "グロリア"
original = "「あら。いつの間にか近くに……」"
translation = "「어라. 어느새 곁에……」"

[[dialogue]]
speaker = "フラン"
original = "「なんだ、附属生か。見ねえ顔だな」"
translation = "「뭐야, 부속생인가. 못 보던 얼굴이네.」"

[[dialogue]]
speaker = "？？？"
original = "「ねーねー、今楽しそうな話してたでしょ？\u3000あたしも混ぜて混ぜて？」"
translation = "「저기 저기, 지금 재밌는 얘기 하고 있었지? 나도 끼워줘 끼워줘!」"

[[dialogue]]
speaker = "フラン"
original = "「別にいいけどお前誰だよ？」"
translation = "「별 상관없다만 넌 누구냐?」"

[[dialogue]]
speaker = "プルちゃん"
original = "「んーとねー……プルちゃんって呼んで♪」"
translation = "「음─ 그러니까─…… 플짱이라고 불러줘♪」"

[[dialogue]]
speaker = "グロリア"
original = "「プルちゃん、ですね。わかりました」"
translation = "「플짱, 이군요. 알겠습니다.」"

[[dialogue]]
speaker = "フラン"
original = "「いや答えになってねえし。てかプルちゃんってなんだよ、お前にゃチビで十分だ」"
translation = "「아니 대답이 안 됐잖아. 그보다 플짱이 뭐냐, 너한텐 꼬맹이로 충분해.」"

[[dialogue]]
speaker = "プルちゃん"
original = "「え～、ひっど～い。プルちゃん、かわいいあたしにピッタリじゃない？」"
translation = "「에~ 너무해─. 플짱, 귀여운 나한테 딱이지 않아?」"

[[dialogue]]
speaker = "フラン"
original = "「かわいいとか自分で言うなや」"
translation = "「귀엽다느니 자기 입으로 말하지 마라.」"

[[dialogue]]
speaker = "プルちゃん"
original = "「あたしプルちゃん♪\u3000キャハ♪」"
translation = "「난 플짱♪ 꺄핫♪」"

[[dialogue]]
speaker = "フラン"
original = "「聞いてねえし！」"
translation = "「안 물어봤다고!」"

[[dialogue]]
speaker = "プルちゃん"
original = "「さぁさぁ、チンタラしてたら大変なことになっちゃうよ！\u3000ゴーゴーゴー！」"
translation = "「자자, 꾸물거리면 큰일 난다고! 고고고!」"

[[dialogue]]
speaker = "unk"
original = "そうしてプルちゃんも加わって、４人でスタンプを集めることになった。"
translation = "그렇게 플짱도 합류해서 네 명이 스탬프를 모으게 되었다."

[[dialogue]]
speaker = "unk"
original = "スタンプラリーの課題はクイズであったり、指定されたアトラクションに乗ったりといろいろだ。"
translation = "스탬프 랠리의 과제는 퀴즈이기도 하고, 지정된 놀이기구를 타는 등 다양했다."

[[dialogue]]
speaker = "グロリア"
original = "「あれがコーヒーカップ……遊園地のアトラクションは初めてでしたが、見た目に似合わず激しいのですね……」"
translation = "「저것이 커피잔…… 유원지 놀이기구는 처음이었는데, 겉보기와 다르게 격렬하네요……」"

[[dialogue]]
speaker = "フラン"
original = "「ありゃチビが回し過ぎだ」"
translation = "「저건 꼬맹이가 너무 돌린 탓이지.」"

[[dialogue]]
speaker = "プルちゃん"
original = "「え～、フランおねーさんだって『負けるかー！』ってめちゃくちゃ回してたじゃん」"
translation = "「에~ 프랑 언니도 『질까 보냐─!』 라면서 엄청 돌렸으면서.」"

[[dialogue]]
speaker = "unk"
original = "俺もクラクラする……"
translation = "나도 어지러워……"

[[dialogue]]
speaker = "プルちゃん"
original = "「アハハッ♪\u3000コーヒーカップのスタンプは集めたから～……次はまたクイズだ！」"
translation = "「아하하♪ 커피잔 스탬프는 모았으니까~…… 다음은 또 퀴즈다!」"

[[dialogue]]
speaker = "フラン"
original = "「なになに……朝は四本足、昼は二本足、夜は三本足、この生き物は……。ハッ、お決まりのやつだな。答えは──」"
translation = "「어디 보자…… 아침에는 네 발, 점심에는 두 발, 밤에는 세 발, 이 생물은……. 핫, 뻔한 거구먼. 정답은──」"

[[dialogue]]
speaker = "プルちゃん"
original = "「マカイフラフラダヌキ！！」"
translation = "「마계 비틀비틀 너구리!!」"

[[dialogue]]
speaker = "フラン"
original = "「なんじゃそりゃ！？」"
translation = "「그게 뭐야!?」"

[[dialogue]]
speaker = "プルちゃん"
original = "「知らないの？\u3000魔界のアマツミカにいる、いつも踊ってる愉快なタヌキだよ」"
translation = "「몰라? 마계 아마츠미카에 있는, 언제나 춤추고 있는 유쾌한 너구리야.」"

[[dialogue]]
speaker = "フラン"
original = "「そんなのいるかよ！」"
translation = "「그런 게 있을 리 없잖아!」"

[[dialogue]]
speaker = "グロリア"
original = "「ええと……ハズレでした。やはり正解はヒトですね」"
translation = "「저기…… 오답이었습니다. 역시 정답은 인간이네요.」"

[[dialogue]]
speaker = "フラン"
original = "「いねえじゃねえか！」"
translation = "「없잖아!」"

[[dialogue]]
speaker = "プルちゃん"
original = "「アハハハッ♪\u3000いたら面白いのにね♪」"
translation = "「아하하하♪ 있으면 재밌을 텐데 말이야♪」"

[[dialogue]]
speaker = "フラン"
original = "「コイツ～……！」"
translation = "「이 녀석이─……!」"

[[dialogue]]
speaker = "グロリア"
original = "「ふふ……」"
translation = "「후후……」"

[[dialogue]]
speaker = "フラン"
original = "「グロリア？」"
translation = "「글로리아?」"

[[dialogue]]
speaker = "グロリア"
original = "「あ……すみません、フランさんとプルちゃんのやり取りが面白くてつい……」"
translation = "「아…… 죄송합니다, 프랑 씨와 플짱의 대화가 재밌어서 그만……」"

[[dialogue]]
speaker = "フラン"
original = "「いや別に構わねえけど。でもそんな風に笑ってるの珍しいな」"
translation = "「아니 별상관은 없지만. 근데 그렇게 웃는 건 드문 일이네.」"

[[dialogue]]
speaker = "グロリア"
original = "「そう……でしょうか？\u3000……言われてみると、そうかもしれませんね」"
translation = "「그런…… 가요? ……듣고 보니 그럴지도 모르겠네요.」"

[[dialogue]]
speaker = "フラン"
original = "「ま、グロリアも楽しんでるってことじゃねえか。よぉし、このままスタンプ全部集めるぞ！」"
translation = "「뭐, 글로리아도 즐겁다는 거 아니겠어. 좋─아, 이대로 스탬프 전부 다 모으자!」"

[[dialogue]]
speaker = "プルちゃん"
original = "「お～っ♪」"
translation = "「오~♪」"

[[dialogue]]
speaker = "グロリア"
original = "「しかしよいのでしょうか？\u3000私たちは死神様を探しに来たのでは……」"
translation = "「하지만 이래도 괜찮은 걸까요? 저희는 사신님을 찾으러 온 건데……」"

[[dialogue]]
speaker = "フラン"
original = "「あー……ま、そのうち出てくんだろ」"
translation = "「아─…… 뭐, 조만간 나오겠지.」"

