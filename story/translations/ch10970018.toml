[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふふふ、やりましたわ……魔王様のお家に侵入しちゃいましたわっ」"
translation = "「후후후, 해냈사옵니다…… 마왕님의 집에 침입해 버렸사옵니다!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「淑女としては少しはしたないかもしれませんが、これも野望のため……仕方ないでございますの」"
translation = "「숙녀로서는 조금 품위가 없을지도 모르지만, 이것도 야망을 위해서…… 어쩔 수 없사옵니다」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「魔王様を籠絡して、野望に一歩前進でございますわ～！」"
translation = "「마왕님을 농락하고, 야망에 한 걸음 전진이옵니다~!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「……っと、大きな声を出してしまうと魔王様が起きてしまいますわ。危ない危ないでございます」"
translation = "「……앗, 큰 소리를 내면 마왕님께서 깨어나시옵니다. 위험하옵니다 위험하옵니다」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ここはそ～っと、物音を立てないように……」"
translation = "「여기는 조오용히, 소리를 내지 않도록……」"

[[dialogue]]
speaker = "クロト"
original = "「人の家で何をしてるの？」"
translation = "남의 집에서 뭘 하는 거야?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ままま魔王様！？\u3000起きてらっしゃいましたの！」"
translation = "「마마마 마왕님!? 깨어 계셨사옵니까!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（いきなり作戦失敗でございますわ～！\u3000どどどうしましょう！\u3000怒られてしまいますわ！）"
translation = "（갑자기 작전 실패이옵니다~! 어어어떻게 해야 하옵니까! 화를 내실 것이옵니다!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「魔王様、えと、その……こんばんはでございますわ！\u3000こんなところで会うなんて奇遇でございますわね！」"
translation = "「마왕님, 에또, 그…… 안녕하시옵니까! 이런 곳에서 만나다니 기묘한 우연이옵니다!」"

[[dialogue]]
speaker = "クロト"
original = "「奇遇も何も、俺の家なんだけど……でも、ジュリエッテに会えて嬉しいよ」"
translation = "기묘한 우연이고 뭐고, 우리 집인데…… 그래도, 줄리엣테를 만나서 기뻐"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（はわわっ、嬉しいなんて言われたらときめいてしまいますわ！\u3000で、ですがわたくし達は敵同士……敵らしく振舞わないとでございます！）"
translation = "（하와왓, 기쁘다고 하시면 설레어 버리옵니다! 그, 그렇지만 와타쿠시들은 적대 관계…… 적답게 행동해야 하옵니다!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくしに会えて嬉しいって……イヤらしい意味でございますの！？」"
translation = "「와타쿠시를 만나서 기쁘다니…… 음란한 뜻이옵니까!?」"

[[dialogue]]
speaker = "クロト"
original = "「へ？」"
translation = "에?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「夜中に敵である高貴なレディが家に侵入してきて、会えて嬉しいって……完全にエロでございますわ！\u3000不潔でございます！」"
translation = "「밤중에 적인 고귀한 레이디가 집에 침입해 왔는데, 만나서 기쁘다니…… 완전히 에로이옵니다! 불결하옵니다!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「もう完っ全に期待してるでございますねっ！\u3000本当にイヤらしいでございますわ～！」"
translation = "「이미 완저언히 기대하고 계신 것이옵니다! 정말로 음란하옵니다~!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ですが、わたくしはそんなに軽い女じゃありませんことよ。甘く見ないでございまし！」"
translation = "「하지만, 와타쿠시는 그렇게 가벼운 여자가 아니옵니다. 얕보지 마시옵소서!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁっ……はぁっ……<emoji=heart04>\u3000あなた様のおち○ちん、とっても大きいでございますわ……<emoji=heart04>」"
translation = "「하아앗…… 하아앗……<emoji=heart04> 당신의 자지, 너무 크옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「こんな凶悪なおち○ちんを、わたくしの中に……あなた様は鬼畜でございます……<emoji=heart04>」"
translation = "「이런 흉악한 자지를, 와타쿠시 안에…… 당신은 귀축이옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……本当にどうしてこうなったのだろう。"
translation = "……정말로 어쩌다 이렇게 된 걸까."

[[dialogue]]
speaker = "unk"
original = "ジュリエッテが家に忍び込んできて、あれよあれよという間にベッドへ引きずり込まれ──"
translation = "줄리엣테가 집에 몰래 들어와서, 눈 깜짝할 사이에 침대로 끌려 들어가──"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んんっ……<emoji=heart04>\u3000あなた様のおち○ちんっ……わたくしのアソコに当たって……あんっ<emoji=heart04>\u3000変な声が出てしまいますわ……<emoji=heart04>」"
translation = "「응응읏……<emoji=heart04> 당신의 자지잇…… 와타쿠시의 거기에 닿아서…… 앙읏<emoji=heart04> 이상한 목소리가 나와 버리옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──この状況である。"
translation = "──이 상황이다."

[[dialogue]]
speaker = "unk"
original = "ジュリエッテとは恋人ではないが、こういうシチュエーションを望んでいなかったかと言われると、嘘になる。"
translation = "줄리엣테와 연인은 아니지만, 이런 상황을 바라지 않았냐고 묻는다면, 거짓말이 된다."

[[dialogue]]
speaker = "unk"
original = "俺はこの子に確実に惹かれていた。だからこの状況は、ある種の理想でもあるわけで。"
translation = "나는 이 아이에게 확실히 끌리고 있었다. 그래서 이 상황은, 일종의 이상이기도 한 것이다."

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくしのアソコ……完全に濡れてしまってますわ……<emoji=heart04>\u3000うぅ、恥ずかしいでございますわ……<emoji=heart04>」"
translation = "「와타쿠시의 거기…… 완전히 젖어 버렸사옵니다……<emoji=heart04> 으으, 부끄럽사옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「恥ずかしくなんてないよ。ジュリエッテの裸……とっても綺麗だ」"
translation = "부끄러워할 것 없어. 줄리엣테의 나체…… 정말 아름답다"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「うぅ……<emoji=heart04>\u3000そんなにジロジロ見ないでくださいましっ<emoji=heart04>\u3000褒められても恥ずかしいものは恥ずかしいでございますのっ<emoji=heart04>」"
translation = "「으으……<emoji=heart04> 그렇게 빤히 쳐다보지 마시옵소서옷<emoji=heart04> 칭찬받아도 부끄러운 것은 부끄러운 것이옵니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ですが……<emoji=heart04>\u3000あなた様に褒められるのは嫌じゃないでございます……<emoji=heart04>\u3000むしろ、褒められれば褒められるほど……胸がキュンとなってしまいます<emoji=heart04>」"
translation = "「하지만……<emoji=heart04> 당신에게 칭찬받는 것은 싫지 않사옵니다……<emoji=heart04> 오히려, 칭찬받으면 받을수록…… 가슴이 큥 하고 울려 버리옵니다<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁっ……んっ……<emoji=heart04>\u3000魔王様、わたくし、切なくなってきましたわ……<emoji=heart04>」"
translation = "「하아앗…… 응읏……<emoji=heart04> 마왕님, 와타쿠시, 애틋해졌사옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「熱くて硬いおち○ちんをアソコで感じて……はぁ<emoji=heart04>\u3000たまらないでございますのっ<emoji=heart04>」"
translation = "「뜨겁고 단단한 자지를 거기에서 느끼고…… 하아<emoji=heart04> 참을 수 없사옵니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってジュリエッテは甘い声と潤んだ目で、俺の欲望を刺激してくる。"
translation = "그렇게 말하며 줄리엣테는 달콤한 목소리와 촉촉한 눈으로, 나의 욕망을 자극해 온다."

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくし、殿方に肌を晒すなんて初めてでございますの……<emoji=heart04>\u3000ですから……心臓がバクバクして破裂しそうなくらいでございますっ<emoji=heart04>」"
translation = "「와타쿠시, 사내에게 피부를 드러내는 것은 처음이옵니다……<emoji=heart04> 그러니…… 심장이 쿵쾅거려서 터질 것 같사옵니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ですけど……同時に期待しているわたくしも存在して……<emoji=heart04>\u3000あなた様と、ひとつになりたいって……<emoji=heart04>」"
translation = "「그렇지만…… 동시에 기대하고 있는 와타쿠시도 존재하고……<emoji=heart04> 당신과, 하나가 되고 싶다고……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「女性からエッチに誘うなんて、はしたないでございますが……言わせてくださいまし……<emoji=heart04>」"
translation = "「여성이 에로하게 유혹하는 것은, 품위가 없사옵니다만…… 말하게 해 주시옵소서……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あなた様……わたくしを、一人前のレディにしてくださいませ……<emoji=heart04>」"
translation = "「당신…… 와타쿠시를, 어엿한 레이디로 만들어 주시옵소서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「分かった……ジュリエッテを大人の女にしてみせる」"
translation = "알았어…… 줄리엣테를 어른 여자로 만들어 줄게"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「──んんんんっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000おち○ちん、入って……<emoji=heart04>\u3000はぁぁっ……ふうぅっ……<emoji=heart04>\u3000はぁっはぁ……<emoji=heart04>」"
translation = "「──응으으으으응읏<emoji=heart04> 아아아앗<emoji=heart04> 자지, 들어와……<emoji=heart04> 하아아앗…… 후우읏……<emoji=heart04> 하아앗하아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁっ……ふぅっ……<emoji=heart04>\u3000わたくしの中にっ……おち○ちんを感じますわ……<emoji=heart04>\u3000硬くてっ、大きい……<emoji=heart04>」"
translation = "「하아앗…… 후읏……<emoji=heart04> 와타쿠시 안에엣…… 자지를 느끼옵니다……<emoji=heart04> 단단하고옷, 큰……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んっ……<emoji=heart04>\u3000ああっ……<emoji=heart04>\u3000あなた様のおち○ちんっ、どんどん入ってきて……<emoji=heart04>\u3000奥までっ……くるぅっ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 아앗……<emoji=heart04> 당신의 자지잇, 점점 들어와서……<emoji=heart04> 안쪽까지잇…… 오오옵……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「──ふああああああああああああああぁぁぁぁぁ～～～～～～～っ<emoji=heart04>」"
translation = "「──후아아아아아아아아아아아아아아아아아아아아아아앗～～～～～～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁっ、はぁんっ……<emoji=heart04>\u3000わたくし、処女じゃなくなってしまいましたわ……<emoji=heart04>\u3000魔王様のおち○ちんで、大人の女性に……<emoji=heart04>」"
translation = "「하아앗, 하앙읏……<emoji=heart04> 와타쿠시, 처녀가 아니게 되어 버렸사옵니다……<emoji=heart04> 마왕님의 자지로, 어른 여성으로……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「痛みは大丈夫……？」"
translation = "아픔은 괜찮아……?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「意外と、大丈夫でございますわ……<emoji=heart04>\u3000それよりも、魔王様とひとつになれたことの方が、感慨深くて……<emoji=heart04>」"
translation = "「의외로, 괜찮사옵니다……<emoji=heart04> 그것보다도, 마왕님과 하나가 될 수 있었다는 것이, 감개무량해서……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「……ああんっ<emoji=heart04>\u3000おち○ちんっ、わたくしの中でビクビクしてございますわ……<emoji=heart04>\u3000あ、ああっ……<emoji=heart04>」"
translation = "「……아앙읏<emoji=heart04> 자지잇, 와타쿠시 안에서 움찔거리고 있사옵니다……<emoji=heart04> 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、ジュリエッテの中が気持ちよすぎて……」"
translation = "미안, 줄리엣테 안이 너무 기분 좋아서……"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「全く、仕方のない方でございますね……<emoji=heart04>\u3000わたくしの中で、いっぱい気持ちよくなってくださいまし……<emoji=heart04>」"
translation = "「정말, 어쩔 수 없는 분이시옵니다……<emoji=heart04> 와타쿠시 안에서, 잔뜩 기분 좋아지시옵소서……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ああんっ……<emoji=heart04>\u3000おち○ちんっ……おち○ちんっ、動いてるでございますぅ……<emoji=heart04>\u3000はぁぁんっ……<emoji=heart04>」"
translation = "「아앙읏……<emoji=heart04> 자지잇…… 자지잇, 움직이고 있사옵니다아……<emoji=heart04> 하아아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁんっ……<emoji=heart04>\u3000\u3000おち○ちんっ、きちゃうっ……<emoji=heart04>\u3000んっ、んんっ……んんんんぅっ……<emoji=heart04>」"
translation = "「하앙읏……<emoji=heart04> 자지잇, 올 것 같아앗……<emoji=heart04> 응읏, 응응읏…… 응으으으으읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あっ、あああんっ<emoji=heart04>\u3000あっ、はぁ……<emoji=heart04>\u3000んあああぁっ……<emoji=heart04>\u3000はぁっ……<emoji=heart04>\u3000ふぁぁっ……<emoji=heart04>」"
translation = "「앗, 아아앙읏<emoji=heart04> 앗, 하아……<emoji=heart04> 응아아아앗……<emoji=heart04> 하아앗……<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「これが、エッチなので、ございますね……<emoji=heart04>\u3000あっ、ああんっ<emoji=heart04>\u3000ふあぁっ、ああぁっ……<emoji=heart04>」"
translation = "「이것이, 에치인, 것이옵니다……<emoji=heart04> 앗, 아앙읏<emoji=heart04> 후아앗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んっ、はぁ<emoji=heart04>\u3000んっ、ああぁっ……<emoji=heart04>\u3000こんなの、初めての感覚で……んうっ……んっ<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「응읏, 하아<emoji=heart04> 응읏, 아아앗……<emoji=heart04> 이런 거, 처음 느껴보는 감각이라서…… 응읏…… 응읏<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふああっ<emoji=heart04>\u3000これ、ダメでございますわっ……<emoji=heart04>\u3000はじめてのエッチなのにっ<emoji=heart04>\u3000はしたない声がっ<emoji=heart04>\u3000ああっ……ああんっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 이거, 안 되옵니다앗……<emoji=heart04> 첫 에치인데엣<emoji=heart04> 품위 없는 목소리가앗<emoji=heart04> 아앗…… 아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あなた様のおち○ちんっ……<emoji=heart04>\u3000気持ちいいでございますのっ……<emoji=heart04>\u3000こんなのっ、我慢できませんわっ……<emoji=heart04>\u3000ああぁっ……<emoji=heart04>」"
translation = "「당신의 자지잇……<emoji=heart04> 기분 좋사옵니다앗……<emoji=heart04> 이런 거옷, 참을 수 없사옵니다앗……<emoji=heart04> 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んんんっ……<emoji=heart04>\u3000はぁっ……<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000んんっ……んんんぅっ<emoji=heart04>」"
translation = "「응응응읏……<emoji=heart04> 하아앗……<emoji=heart04> 아아아앗<emoji=heart04> 후아아앗<emoji=heart04> 응응읏…… 응으으으읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくしの、中で……ジュプジュプって、動いてぇ……<emoji=heart04>\u3000はぁ……はぁふっ……<emoji=heart04>\u3000んあああぁっ<emoji=heart04>」"
translation = "「와타쿠시, 안에서…… 줍줍 소리를 내며, 움직여어……<emoji=heart04> 하아…… 하아후읏……<emoji=heart04> 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はうっ……<emoji=heart04>\u3000おち○ちんっ、よすぎですのぉっ<emoji=heart04>\u3000このままじゃ……エッチで、ダメになってしまいますぅっ……<emoji=heart04>」"
translation = "「하우읏……<emoji=heart04> 자지잇, 너무 좋사옵니다아앗<emoji=heart04> 이대로라면…… 에치로, 망가져 버리옵니다아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あ、ああんっ……<emoji=heart04>\u3000ああうぅっ<emoji=heart04>\u3000初めてで、こんなに喘ぐなんて、はしたないのに……ひああぁっ<emoji=heart04>」"
translation = "「아, 아앙읏……<emoji=heart04> 아아우읏<emoji=heart04> 처음인데, 이렇게 신음하다니, 품위 없는데…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んっ、んんっ……<emoji=heart04>\u3000我慢っ……<emoji=heart04>\u3000我慢ですのぉっ……<emoji=heart04>\u3000はっ、はぁんっ……<emoji=heart04>」"
translation = "「응읏, 응응읏……<emoji=heart04> 참아앗……<emoji=heart04> 참는 것이옵니다아앗……<emoji=heart04> 핫, 하앙읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んくっ……<emoji=heart04>\u3000あ、ああっ……<emoji=heart04>\u3000淑女として、貴族として……ふさわしい振る舞い、を……んああぅっ<emoji=heart04>」"
translation = "「응크읏……<emoji=heart04> 아, 아앗……<emoji=heart04> 숙녀로서, 귀족으로서…… 걸맞은 행동, 을…… 응아아우읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はっ……<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000ムリっ、やっぱりムリですのっ<emoji=heart04>\u3000おち○ちんでっ、パンパンされてっ……<emoji=heart04>」"
translation = "「핫……<emoji=heart04> 아앙읏<emoji=heart04> 무리잇, 역시 무리이옵니다앗<emoji=heart04> 자지로옷, 꽉 채워져서읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んっ、んんっ<emoji=heart04>\u3000アソコからっ、気持ちいいのっ……広がってぇっ<emoji=heart04>\u3000はぁっ、はっ<emoji=heart04>\u3000止まりませんのっ……<emoji=heart04>」"
translation = "「응읏, 응응읏<emoji=heart04> 거기에서앗, 기분 좋은 것이잇…… 퍼져서어읏<emoji=heart04> 하아앗, 핫<emoji=heart04> 멈추지 않사옵니다앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふああああんっ<emoji=heart04>\u3000あなた様を籠絡するつもりだったのにっ<emoji=heart04>\u3000このままじゃっ……わたくしが堕とされてしまいますぅ……<emoji=heart04>\u3000あっ、ふぅんっ……<emoji=heart04>」"
translation = "「후아아아앙읏<emoji=heart04> 당신을 농락할 생각이었는데엣<emoji=heart04> 이대로라면앗…… 와타쿠시가 타락해 버리옵니다아……<emoji=heart04> 앗, 후웅읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「全部っ<emoji=heart04>\u3000おち○ちんが悪いでございますのっ<emoji=heart04>\u3000おち○ちんがこんなに気持ちいいだなんてっ<emoji=heart04>\u3000わたくし、知りませんでございましたわっ……<emoji=heart04>」"
translation = "「전부읏<emoji=heart04> 자지가 나쁜 것이옵니다앗<emoji=heart04> 자지가 이렇게 기분 좋다니잇<emoji=heart04> 와타쿠시, 몰랐사옵니다앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んあああんっ<emoji=heart04>\u3000あなた様もっ、わたくしのアソコっ気持ちいいでございますか……？\u3000ちゃんとっ、気持ちよくなれてございます……？」"
translation = "「응아아앙읏<emoji=heart04> 당신도옷, 와타쿠시의 거기잇 기분 좋으시옵니까……? 제대로옷, 기분 좋아지고 계시옵니까……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……気持ちよくて、正直ずっと射精しそうになってる」"
translation = "아아…… 기분 좋아서, 솔직히 계속 사정할 것 같아"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「よかった……<emoji=heart04>\u3000よかったでございますわ……<emoji=heart04>\u3000わたくしの体も、あなた様を気持ちよくさせられたのでございますね……<emoji=heart04>」"
translation = "「다행이옵니다……<emoji=heart04> 다행이옵니다아……<emoji=heart04> 와타쿠시의 몸도, 당신을 기분 좋게 해 드릴 수 있었던 것이옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あっ……<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000ならもっと……気持ちよくなってくださいましっ……<emoji=heart04>\u3000わたくしの体をっ、堪能してくださいませっ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 아앙읏<emoji=heart04> 그럼 더…… 기분 좋아지시옵소서옷……<emoji=heart04> 와타쿠시의 몸을앗, 만끽하시옵소서옷<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んんんんっ～～～～<emoji=heart04>\u3000あっ、あっ、ああっ<emoji=heart04>\u3000パンパンっ、パンパンって、激しいでございますっ<emoji=heart04>」"
translation = "「응으으으으응읏～～～～<emoji=heart04> 앗, 앗, 아앗<emoji=heart04> 꽉꽉읏, 꽉꽉 하고, 격렬하옵니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んんはぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000はぁうんっ<emoji=heart04>\u3000ふわぁあぁんっ<emoji=heart04>\u3000あなた様のが、深くまで、届いていますのっ<emoji=heart04>」"
translation = "「응응하앗<emoji=heart04> 아앗<emoji=heart04> 하아웅읏<emoji=heart04> 후와아아앙읏<emoji=heart04> 당신 것이, 깊숙이, 닿고 있사옵니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あ、ああっ、あああんっ<emoji=heart04>\u3000お、奥っ<emoji=heart04>\u3000赤ちゃんのお部屋まで、突かれてますのっ……<emoji=heart04>」"
translation = "「아, 아앗, 아아앙읏<emoji=heart04> 아, 안쪽읏<emoji=heart04> 아기 방까지, 찔리고 있사옵니다앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んんんぅっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000そこ突かれるとっ<emoji=heart04>\u3000声が我慢できませんわ<emoji=heart04>\u3000あ、あああっ<emoji=heart04>」"
translation = "「응으으으읏<emoji=heart04> 아아앗<emoji=heart04> 아앗<emoji=heart04> 거기 찔리면읏<emoji=heart04> 목소리를 참을 수 없사옵니다<emoji=heart04> 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んっ、んんぅ<emoji=heart04>\u3000たまりませんわっ<emoji=heart04>\u3000あああんっ<emoji=heart04>\u3000わたくしっ、はじめてなのにぃっ<emoji=heart04>\u3000はしたないでございますぅっ<emoji=heart04>」"
translation = "「응읏, 응으으<emoji=heart04> 참을 수 없사옵니다앗<emoji=heart04> 아아앙읏<emoji=heart04> 와타쿠시잇, 처음인데에읏<emoji=heart04> 품위 없사옵니다아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「このままじゃっ、イッてしまいますのっ<emoji=heart04>\u3000あなた様のおち○ちんでっ<emoji=heart04>\u3000イかされてしまうでございますぅっ<emoji=heart04>」"
translation = "「이대로라면앗, 가 버리옵니다앗<emoji=heart04> 당신의 자지로옷<emoji=heart04> 가게 되어 버리옵니다아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふぁぁあっ<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000んんんんっ<emoji=heart04>\u3000わたくしが、わたくしでなくなってしまう、みたい……ひぃああっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 아앙읏<emoji=heart04> 응으으으으읏<emoji=heart04> 와타쿠시가, 와타쿠시가 아니게 되어 버릴 것, 같아…… 히이아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュリエッテを絶頂へ導くために、腰の動きをより激しくする。"
translation = "줄리엣테를 절정으로 이끌기 위해, 허리의 움직임을 더욱 격렬하게 한다."

[[dialogue]]
speaker = "ジュリエッテ"
original = "「んああっ<emoji=heart04>\u3000あああんっ<emoji=heart04>\u3000くっ……<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ふわあぁあんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんんん～っ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 아아앙읏<emoji=heart04> 크읏……<emoji=heart04> 응으으으읏<emoji=heart04> 후와아아앙읏<emoji=heart04> 앙읏<emoji=heart04> 응으으으으응~읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あ──あ──ああぁんっ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000ダメでございますっ<emoji=heart04>\u3000ああああああぁっ～～っ<emoji=heart04>」"
translation = "「아──아──아아아앙읏<emoji=heart04> 안 돼<emoji=heart04> 안 되옵니다앗<emoji=heart04> 아아아아아아아앗～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ああんっ<emoji=heart04>\u3000あっ、あああんっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イっちゃいますわっ<emoji=heart04>\u3000はじめてのエッチでイクっ<emoji=heart04>」"
translation = "「아앙읏<emoji=heart04> 앗, 아아앙읏<emoji=heart04> 안 돼읏<emoji=heart04> 가앗<emoji=heart04> 가 버리겠사옵니다앗<emoji=heart04> 첫 에치로 가앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はああぁんっ<emoji=heart04>\u3000ああああんっ<emoji=heart04>\u3000おま○この奥、キュンキュンして<emoji=heart04>\u3000イク<emoji=heart04>\u3000イッちゃいそうでございますっ<emoji=heart04>」"
translation = "「하아아아앙읏<emoji=heart04> 아아아앙읏<emoji=heart04> 보지의 안쪽, 큥큥거려서<emoji=heart04> 가앗<emoji=heart04> 가 버릴 것 같사옵니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あああああっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>\u3000あなた様のおち○ちんで、イってしまいますのぉっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000はぁああんっ<emoji=heart04>」"
translation = "「아아아아아앗<emoji=heart04> 가앗<emoji=heart04> 가가 가앗<emoji=heart04> 당신의 자지로, 가 버리옵니다아앗<emoji=heart04> 응으으으읏<emoji=heart04> 하아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ジュリエッテっ！\u3000中に出すぞっ……！！」"
translation = "줄리엣테! 안에 쌀게엣……!!"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はいっ<emoji=heart04>\u3000出してくださいましっ<emoji=heart04>\u3000わたくしの子宮の中にぃっ<emoji=heart04>\u3000たくさんっ<emoji=heart04>\u3000出してぇっ<emoji=heart04>」"
translation = "「네엣<emoji=heart04> 싸 주시옵소서옷<emoji=heart04> 와타쿠시의 자궁 안에에읏<emoji=heart04> 잔뜩읏<emoji=heart04> 싸아아읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あああうっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イックぅっ<emoji=heart04><emoji=heart04>\u3000イック～～～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아우읏<emoji=heart04> 아아앗<emoji=heart04> 가앗<emoji=heart04> 가아앗<emoji=heart04><emoji=heart04> 가아앗～～～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あああぁあぁぁあぁあ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっちゃってるぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아아아아아아아아아아～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04> 가 버렸사옵니다아～～～～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界まで溜め切った精液をジュリエッテの子宮へ注ぎ込む。"
translation = "한계까지 모아 둔 정액을 줄리엣테의 자궁에 쏟아붓는다."

[[dialogue]]
speaker = "unk"
original = "目の前が真っ白になるほどの快楽で軽く意識が飛びそうだ。"
translation = "눈앞이 새하얗게 될 정도의 쾌락으로 가볍게 의식이 날아갈 것 같다."

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁあああぁあ～～～～っ<emoji=heart04>\u3000あなた様の精子でっ、子宮が満たされてございますぅ～～っ<emoji=heart04>\u3000ああああっ、ああああんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아아～～～～읏<emoji=heart04> 당신의 정자로옷, 자궁이 채워졌사옵니다아～～읏<emoji=heart04> 아아아앗, 아아아앙읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ああんっ、んあああぁ～～っ<emoji=heart04>\u3000おち○ちんっ、ビクビクしてますぅっ<emoji=heart04>\u3000中出しっ、気持ちよすぎでございますわぁ～～<emoji=heart04>」"
translation = "「아앙읏, 응아아아아～～읏<emoji=heart04> 자지잇, 움찔거리고 있사옵니다아읏<emoji=heart04> 질내 사정읏, 너무 기분 좋사옵니다아～～<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁん……<emoji=heart04>\u3000おち○ちんっ、すごいでございますわ……<emoji=heart04>\u3000頭真っ白になっちゃいますぅ……<emoji=heart04>」"
translation = "「하앙……<emoji=heart04> 자지잇, 대단하옵니다아……<emoji=heart04> 머리가 새하얗게 되어 버리옵니다아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恍惚とした笑みを浮かべるジュリエッテを見ると、幸福感が胸を満たした。"
translation = "황홀한 미소를 짓는 줄리엣테를 보니, 행복감이 가슴을 채웠다."

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ああんっ……<emoji=heart04>\u3000おち○ちんが抜けちゃうでございますわ……<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「아앙읏……<emoji=heart04> 자지가 빠져 버리옵니다아……<emoji=heart04> 하앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「はぁ……はぁっ、はぁ……<emoji=heart04>\u3000はじめてのエッチ……とっても気持ちよかったでございますわ……<emoji=heart04>」"
translation = "「하아…… 하앗, 하아……<emoji=heart04> 첫 에치…… 너무 기분 좋았사옵니다아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「子宮の中も……あなた様の精子で満たされて、この上なく幸せでございます……<emoji=heart04>」"
translation = "「자궁 안도…… 당신의 정자로 채워져서, 더할 나위 없이 행복하옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もジュリエッテとひとつになれて、本当に幸せだよ。このままずっと繋がっていたい」"
translation = "나도 줄리엣테와 하나가 될 수 있어서, 정말 행복해. 이대로 계속 연결되어 있고 싶어"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「それは褒め殺しでございますわ……<emoji=heart04>\u3000わたくし達、敵同士でしてよ……？」"
translation = "「그것은 칭찬으로 죽이는 것이옵니다아……<emoji=heart04> 와타쿠시들, 적대 관계이옵니다아……?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「……ですが、今だけは忘れてもいいかもしれませんわね<emoji=heart04>\u3000ただ、あなた様の暖かさを感じ続けていたいでございます……<emoji=heart04>」"
translation = "「……하지만, 지금만은 잊어도 좋을지도 모르옵니다<emoji=heart04> 단지, 당신의 따뜻함을 계속 느끼고 싶사옵니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「本当に幸せでございますわ……<emoji=heart04>\u3000こんな気持ちになれるんだったら、もっと早くあなた様と……<emoji=heart04>」"
translation = "「정말로 행복하옵니다……<emoji=heart04> 이런 기분이 될 수 있다면, 좀 더 빨리 당신과……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「いえ、たらればのお話をしても意味がないでございますわね……」"
translation = "「아니, 만약의 이야기를 해도 의미가 없사옵니다……」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「今はまだ、心まで奪えなくても……いつか必ず、あなた様を虜にしてみせますわ<emoji=heart04>」"
translation = "「지금은 아직, 마음까지 빼앗지 못하더라도…… 언젠가 반드시, 당신을 사로잡아 보이겠사옵니다<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「その時まで、何度でもあなた様と繋がり……<emoji=heart04>\u3000精液を頂戴いたしますでございますわ<emoji=heart04>」"
translation = "「그때까지, 몇 번이라도 당신과 연결되어……<emoji=heart04> 정액을 받겠사옵니다<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「だから覚悟しててくださいまし<emoji=heart04>\u3000大好きなあなた様<emoji=heart04>」"
translation = "「그러니 각오하고 계시옵소서<emoji=heart04> 사랑하는 당신<emoji=heart04>」"

