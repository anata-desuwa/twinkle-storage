[[dialogue]]
speaker = "unk"
original = "第１話,臨時メンバー,P"
translation = "제1화, 임시 멤버, P"

[[dialogue]]
speaker = "unk"
original = "元の世界に戻れるようになるまでの間、こっちの世界を案内してもらうことになった。"
translation = "원래 세계로 돌아갈 수 있게 될 때까지, 이쪽 세계를 안내받기로 했다."

[[dialogue]]
speaker = "unk"
original = "今日はナナカにあちこち連れて行ってもらう予定だ。"
translation = "오늘은 나나카에게 여기저기 데려다 달라고 할 예정이다."

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「って言っても、この辺りは一度、案内してもらったことがあるって話だったでしょ？」"
translation = "「라고 해도, 이 근처는 한 번 안내받은 적이 있다고 했지?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「だからさ、そんなみんなにも、ちゃ～んと楽しんでもらえるように、趣向を凝らしてみようかなって思うわけよ」"
translation = "「그러니까 말이야, 그런 너희도 자~알 즐길 수 있도록 취향을 좀 가미해 볼까 생각 중이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「楽しみね！\u3000前はゆっくり見て回る時間が取れなかったから、期待してるわよ！」"
translation = "「기대되네! 전에는 천천히 둘러볼 시간이 없었으니까 기대하고 있을게!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「わくわく……一体どんな趣向で案内してもらえるのでしょう！」"
translation = "「두근두근…… 대체 어떤 취향으로 안내받게 될까요!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「今日はなんと……アタシが会長を務める、<b>スウィーツ</b>同好会の活動に同行してもらいますっ！」"
translation = "「오늘은 무려…… 내가 회장을 맡고 있는, <b>스위츠</b> 동호회 활동에 동행하게 하겠어!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「まずはここ！\u3000今、話題沸騰中のパティスリーだよ！」"
translation = "「우선 여기! 지금 화제 비등 중인 파티스리야!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ほほう～。ここは、会計さんが今一番注目していると言っていたお店ですね」"
translation = "「호오~. 여기는 회계님이 지금 가장 주목하고 있다고 말했던 가게군요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「前に来た時、こんなお店あったかしら？」"
translation = "「전에 왔을 때 이런 가게가 있었나?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「実は、先週オープンしたばっかりなんだよね」"
translation = "「사실 지난주에 막 오픈했거든」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おー、そうなんだ。どうりで見覚えがないはずだわ」"
translation = "「오, 그렇구나. 어쩐지 낯이 안 익더라니」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ふふ～ん♪\u3000流星町は日々進化してるんでい！」"
translation = "「후후~ㄴ♪ 유성 마을은 나날이 진화하고 있다고!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こちらは何がおすすめなのかしら？」"
translation = "「여기는 뭐가 추천 메뉴니?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「そこももちろん抜かりなし！\u3000ちゃ～んとリサーチしてあるからねっ」"
translation = "「그것도 물론 빈틈없지! 제대로 리서치해 뒀으니까 말이야!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「そんじゃ、パパっと買ってくるんで、ちょっと待ってて！\u3000突撃ーっ！」"
translation = "「그럼 후딱 사 올 테니까 잠깐 기다려! 돌격이다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よかったの？\u3000みんなで買いに行ってもよかったのに」"
translation = "「좋았어? 다 같이 사러 가도 좋았을 텐데.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「人気のお店だそうですから、大勢で押しかけて邪魔にならないよう、代表して買いに行かれたのではないかと」"
translation = "「인기 있는 가게라고 하니까요, 대인원이 몰려가서 방해가 되지 않도록 대표해서 사러 가신 게 아닐까 싶어요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふむふむ、さすがスイーツ同好会だわ……その辺りもちゃんとしてるのね」"
translation = "「흠흠, 역시 스위츠 동호회네…… 그런 부분도 제대로 챙기고 있구나.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「おや、もう戻ってきましたよ」"
translation = "「어라, 벌써 돌아왔어요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「へいお待ちぃ！\u3000店員さんが、焼きたてだから早めに食べた方がいいですよ～、ってさ」"
translation = "「헤이, 기다렸지! 점원분이 갓 구운 거라 빨리 먹는 게 좋대~ 라고 하더라고.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ほい、じゃあみんな、１個ずつ受け取ってー」"
translation = "「자, 그럼 다들 하나씩 받아~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あつあつね。これって……」"
translation = "「뜨끈뜨끈하네. 이건……」"

[[dialogue]]
speaker = "unk"
original = "ワッフルだね"
translation = "와플이네"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「その通り！\u3000ただしっ、このアタシが紹介するってんだから、ただのワッフルだとは侮るなかれ！」"
translation = "「그 말대로! 하지만, 이 나님이 소개하는 거니까 그냥 와플이라고 얕보지 말라고!」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「それは、もしや……」"
translation = "「그건 설마……」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あーっと！\u3000ロロちゃん、ネタバレ禁止ってことでよろしく」"
translation = "「앗! 로로짱, 스포일러 금지라는 걸로 부탁해.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「仕方ありませんね～」"
translation = "「어쩔 수 없네요~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、食べてみればわかるでしょ。では、いただきまーす」"
translation = "「뭐, 먹어보면 알겠지. 그럼, 잘 먹겠습니다~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はむっ、もぐもぐもぐ……ほぉ、これは……」"
translation = "「함냐, 우물우물우물…… 호오, 이건……」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「もちもちしていて、とってもおいしいのです～♪」"
translation = "「쫄깃쫄깃해서 정말 맛있는 거예요~♪」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うんうん、評判通りの味だね。値段も手頃だし、こりゃあ繁盛するのも納得だわ」"
translation = "「응응, 소문대로의 맛이네. 가격도 적당하고, 이거 번창하는 것도 납득이 가.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもこれ、どうやってもちもちさせてるのかしらね。クロト、わかる？」"
translation = "「근데 이거, 어떻게 쫄깃하게 만든 걸까. 쿠로토, 알아?」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「いやいや、そこんとこは企業秘密なんだから、簡単にわかるわけ……」"
translation = "「에이, 그건 기업 비밀이니까 쉽게 알 수 있을 리가……」"

[[dialogue]]
speaker = "unk"
original = "だいたいわかったけど"
translation = "대충 알 것 같은데"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「えぇっ、ほんとにぃ！？」"
translation = "「에엣, 정말이야!?」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「わたしもわかってしまいました！\u3000これはお餅を使っています！」"
translation = "「저도 알아버렸어요! 이건 떡을 사용하고 있습니다!」"

[[dialogue]]
speaker = "unk"
original = "お餅じゃないみたいだよ"
translation = "떡은 아닌 것 같아"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うそぉ！？\u3000アタシもロロちゃんと同じで、お餅かなって思ってたのに……」"
translation = "「거짓말!? 나도 로로짱이랑 똑같이 떡인 줄 알았는데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふーん、うちのクロトはそんじょそこらのクロトじゃないんだから」"
translation = "「후후-ㄴ, 우리 쿠로토는 평범한 쿠로토가 아니니까.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「ま、まさか……原材料だけじゃなくて、作り方までわかっちゃったりとかは、さすがに……」"
translation = "「서, 설마…… 원재료뿐만 아니라 만드는 법까지 알아버린다거나 하는 건 역시……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトならわかっちゃうんだな～、これが」"
translation = "「쿠로토라면 알아버린단 말이지~ 이게.」"

[[dialogue]]
speaker_original = "ロロット"
speaker_translation = "로롯토"
original = "「ほほう～、新星の会長さんは、そんなことまでわかってしまうのですね」"
translation = "「호오~, 신성의 회장님은 그런 것까지 알아버리시는군요.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「なるほどねぇ……お菓子を作るとは聞いてたけど、ちょっと舐めてたわ。やるじゃん」"
translation = "「과연 그렇네…… 과자를 만든다는 얘긴 들었지만, 조금 얕봤어. 제법이잖아.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにしてもこのワッフル、ほんとにおいしいわね。流星市国にはない味だから、余計に気になっちゃう」"
translation = "「그건 그렇고 이 와플, 정말 맛있네. 유성시국에는 없는 맛이라 더 신경 쓰여.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねえクロト、作り方がわかるなら、向こうに帰っても作れるんじゃない？」"
translation = "「있지 쿠로토, 만드는 법을 안다면 저쪽으로 돌아가서도 만들 수 있지 않아?」"

[[dialogue]]
speaker = "unk"
original = "難しいけど出来ると思う"
translation = "어렵겠지만 가능할 것 같아"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やったぁ！\u3000それじゃよろしく頼むわねっ」"
translation = "「만세! 그럼 잘 부탁할게.」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「うむむ……こいつぁ想像以上の逸材とみた……！」"
translation = "「으음…… 이 녀석 상상 이상의 일재라고 봤다……!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「よし決めた！\u3000緋宮クロト、あなたをスウィーツ同好会の臨時メンバーに任命します！」"
translation = "「좋아 결정했어! 히노미야 쿠로토, 당신을 스위츠 동호회의 임시 멤버로 임명합니다!」"

[[dialogue]]
speaker = "unk"
original = "ええっ！\u3000俺が！？"
translation = "에엣! 내가!?"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「あっちに帰れるようになるまででいいからさ、アタシに付き合ってよ、お願いっ！\u3000アンタの能力が必要なの！」"
translation = "「저쪽으로 돌아갈 수 있게 될 때까지만이라도 좋으니까, 나랑 좀 어울려줘, 부탁이야! 너의 능력이 필요해!」"

[[dialogue]]
speaker_original = "ナナカ"
speaker_translation = "나나카"
original = "「お願いお願いお願いーーーっ！\u3000再現して欲しい気になるスウィーツが、いっぱいあるんだから～っ！」"
translation = "「부탁이야 부탁이야 부탁이야---! 재현해줬으면 하는 신경 쓰이는 스위츠가 잔뜩 있단 말이야~!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺はナナカのお願いを断り切れず、スイーツ同好会の臨時メンバーになるのだった。"
translation = "이렇게 나는 나나카의 부탁을 거절하지 못하고, 스위츠 동호회의 임시 멤버가 되는 것이었다."

