[[dialogue]]
speaker = "unk"
original = "第４話,２人はライバル,P"
translation = "제4화, 두 사람은 라이벌"

[[dialogue]]
speaker = "unk"
original = "エルデリーゼとアムは、流星附属の中でもとりわけ有名な二人組だ。"
translation = "엘데리제와 아무는, 유성 부속 중에서도 특히 유명한 두 사람이다."

[[dialogue]]
speaker = "unk"
original = "片や神速の槍の使い手。片や最強の盾の使い手。矛盾コンビと形容される２人だが……最近、彼女たちはどうにもお互いを避けているように見える。"
translation = "한 명은 신속의 창 사용자. 다른 한 명은 최강의 방패 사용자. 모순 콤비라고 형용되는 두 사람이지만…… 최근, 그녀들은 왠지 모르게 서로를 피하는 것처럼 보인다."

[[dialogue]]
speaker = "unk"
original = "何かあったのかもしれない。そう思った俺は、エルデリーゼをトレーニングに誘ってみることにした。"
translation = "무슨 일이 있었을지도 모른다. 그렇게 생각한 나는, 엘데리제를 훈련에 초대해 보기로 했다."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ふうぅ……ありがとうございました、会長様。新鮮な模擬試合でしたわ」"
translation = "「후우…… 감사합니다, 회장님. 신선한 모의 시합이었습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「その……いかがでしたか？\u3000私の槍は」"
translation = "「그…… 어떠셨습니까? 저의 창은.」"

[[dialogue]]
speaker = "unk"
original = "いつもよりキレがない気がした"
translation = "평소보다 날카로움이 없는 것 같았다"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そう、ですか……。私なりに、普段通りの動きを心がけていたつもりなのですが……」"
translation = "「그렇,습니까……. 저 나름대로, 평소와 같은 움직임을 염두에 두고 있었는데……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「やはり会長様ほどの星騎士がお相手となると、隠すのも無理な話でしたわね」"
translation = "「역시 회장님 정도의 성기사가 상대가 되니, 숨기는 것도 무리였군요.」"

[[dialogue]]
speaker = "unk"
original = "アムと何かあった？"
translation = "아무와 무슨 일 있었어?"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……っ。はい。実はその……少し前に、口論をしてしまいましたの……」"
translation = "「……윽. 네. 실은 그…… 조금 전에, 말다툼을 해버렸습니다……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「些細なことが原因だったのですが、私。『もうアムなんか知りませんわ』と心にもないことを言ってしまい……」"
translation = "「사소한 일이 원인이었지만, 제가. 『이제 아무 같은 건 몰라요』라고 진심이 아닌 말을 해버려서……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「いつも特に約束をしなくても、この時間は模擬試合をしていたのです。けれど、アムの方が時間をずらしているようで……」"
translation = "「항상 특별히 약속을 하지 않아도, 이 시간에는 모의 시합을 했었습니다. 하지만, 아무 쪽이 시간을 미루는 것 같아서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "（気付かないふりをしよう）"
translation = "(눈치채지 못한 척하자)"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私、嫌われてしまいました。きっとアムはもう顔も見たくないと思ってるに違いありませんわ……」"
translation = "「저, 미움을 받았습니다. 분명 아무는 이제 얼굴도 보고 싶지 않다고 생각하고 있는 것이 틀림없습니다……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「どうしてあんなことを言ってしまったのでしょう。一番の学友、最も信頼を置くライバルを相手に……」"
translation = "「어째서 그런 말을 해버렸을까요. 최고의 학우, 가장 신뢰하는 라이벌을 상대로……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「時間を戻せるものなら、戻したいですわ……会長様」"
translation = "「시간을 되돌릴 수 있다면, 되돌리고 싶습니다…… 회장님.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……謝る練習？\u3000ここで、ですか」"
translation = "「……사과 연습? 여기서, 말입니까?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「素直に謝れば許してもらえる……そ、そう、でしょうか……？」"
translation = "「솔직하게 사과하면 용서받을 수 있다…… 그, 그렇,습니까……?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「わかりました。練習、してみます。私たちの他は誰もいませんし。ちょうど良いかもしれませんわね……」"
translation = "「알겠습니다. 연습, 해보겠습니다. 저희 외에는 아무도 없으니. 딱 좋을지도 모르겠군요……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「すー、はー……あ、あ、あー……アムっ」"
translation = "「후우, 하아…… 아, 아, 아ー…… 아무」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そ、その。先日は申し訳ありませんでした。あなたが嫌うあだ名をわざと言ったのは、私があまりに大人げなかったです」"
translation = "「그, 그게. 지난번에는 죄송했습니다. 당신이 싫어하는 별명을 일부러 말한 것은, 제가 너무 철이 없었습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「本心ではありません……その証拠に、あ、アムの実力は私が誰よりも評価しておりますもの」"
translation = "「본심이 아닙니다…… 그 증거로, 아, 아무의 실력은 제가 누구보다 높이 평가하고 있습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「で、でも……アムにも反省して欲しいのですわ！\u3000あなたのあの行い、あまりに酷いと思うのです……！」"
translation = "「하, 하지만…… 아무도 반성해 줬으면 합니다! 당신의 그 행동, 너무 심하다고 생각합니다……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私が後で食べようと楽しみに取っておいた……ショートケーキのいちごを奪うだなんて……！」"
translation = "「제가 나중에 먹으려고 기대하며 남겨뒀던…… 쇼트케이크의 딸기를 빼앗다니……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「狼狽する私の前で『食べないから嫌いなのかと思った～』などと！\u3000いちごを嫌う女子などおりません！\u3000あんまりです！」"
translation = "「당황하는 제 앞에서 『안 먹길래 싫어하는 줄 알았어ー』라니! 딸기를 싫어하는 여자는 없습니다! 너무합니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私は謝ります。ですからあなたからも謝罪が欲しいですわ……！\u3000それにて今回の件は手打ちとしましょう……！」"
translation = "「저는 사과하겠습니다. 그러니 당신에게서도 사과를 받고 싶습니다……! 그것으로 이번 일은 없던 것으로 합시다……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あ～もうっ！\u3000悪かったってば～！」"
translation = "「아ー 정말! 미안하다고ー!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アム！？\u3000き、聞いていたんですの！？」"
translation = "「아무!? 드, 듣고 있었습니까!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ずっと居たよ、会長と模擬戦してる時から！\u3000ていうか何それ、謝る練習してる時にどうして口論してるの！？\u3000エルゼは本当にさ～！！」"
translation = "「계속 있었어, 회장이랑 모의전 할 때부터! 그보다 뭐야 그거, 사과 연습하는데 왜 말다툼을 하고 있어!? 엘제는 정말이지ー!!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「な、何か間違っていましたか……？」"
translation = "「무, 뭔가 잘못되었습니까……?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「逆効果でしょ、どう考えても！\u3000謝る時は平身低頭！\u3000いちごの件は蒸し返さなくてもあたしから言うから！」"
translation = "「역효과잖아, 아무리 생각해도! 사과할 때는 엎드려 빌어야지! 딸기 건은 다시 꺼내지 않아도 내가 말할 테니까!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そ、そうなんですの……すみません。友人と喧嘩をしたことがないものですから……」"
translation = "「그, 그렇습니까……. 죄송합니다. 친구와 싸움을 해본 적이 없어서……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はぁああ～……もう疲れたよ、喧嘩するのも。ごめんねエルゼ。いちごは冗談のつもりだったんだけど、確かにあれは悪かったよ」"
translation = "「하아아ー…… 이제 지쳤어, 싸우는 것도. 미안해 엘제. 딸기는 농담이었는데, 확실히 그건 잘못했어.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「い、いえ。私の方こそ……アムに無礼な言葉をぶつけてしまいました。許していただけますか……？」"
translation = "「아, 아니요. 저야말로…… 아무에게 무례한 말을 던졌습니다. 용서해 주시겠습니까……?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん。いいよ、許すよ。これで仲直りしよ。いいよね？」"
translation = "「응. 괜찮아, 용서할게. 이걸로 화해하자. 좋지?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「もちろんです……あ、そうです。今後はいちごが欲しい時はちゃんと事前に訊ねてください。そうすれば差し上げますから……」"
translation = "「물론입니다…… 아, 그렇습니다. 앞으로 딸기가 먹고 싶을 때는 제대로 사전에 물어봐 주세요. 그러면 드리겠습니다……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いや、食べ物の恨みは恐ろしいからやめとく」"
translation = "「아니, 음식에 대한 원한은 무서우니까 관둘래.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様も、ありがとうございました。おかげでアムと仲直りができました……って、あら？\u3000どうかしましたか」"
translation = "「회장님도, 감사합니다. 덕분에 아무와 화해할 수 있었습니다……라고, 어라? 무슨 일 있으십니까.」"

[[dialogue]]
speaker = "unk"
original = "もっと深刻な喧嘩かと……"
translation = "더 심각한 싸움인 줄 알았는데……"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「っ！？\u3000深刻ですわ！\u3000ショートケーキのいちごですわよ！？」"
translation = "「윽!? 심각합니다! 쇼트케이크의 딸기입니다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そうだよ！\u3000あたしだって不名誉なあだ名を連呼されて心に深い傷を負ったんだから！\u3000くだらない喧嘩なんてこの世にはないんだよ！」"
translation = "「맞아! 나도 불명예스러운 별명을 연호당해서 마음에 깊은 상처를 입었다고! 시시한 싸움 따위는 이 세상에 없다고!」"

[[dialogue]]
speaker = "unk"
original = "ご、ごめんなさい！？"
translation = "저, 죄송합니다!?"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……ふう。わかっていただけたようで何よりです、会長様」"
translation = "「……후우. 이해해 주신 것 같아 다행입니다, 회장님.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「何にせよ、会長が間に入ってくれたおかげでエルゼと話もできたしね……」"
translation = "「어쨌든, 회장이 중간에 끼어든 덕분에 엘제랑 이야기도 할 수 있었고 말이야……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「──よし。せっかくだしさ、エルゼ。模擬戦やっとく？」"
translation = "「──좋아. 모처럼이니까, 엘제. 모의전 할래?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「望むところです。今日も負けませんわよ、アム」"
translation = "「바라는 바입니다. 오늘도 지지 않겠습니다, 아무.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「へへんだ。あたしだって、白星取ってやるもんね！」"
translation = "「흥이다. 나도, 승리 따낼 거거든!」"

[[dialogue]]
speaker = "unk"
original = "こうしてエルゼとアムは仲直りして、一件落着……と思いきや。"
translation = "이렇게 엘제와 아무는 화해하고, 일단락……이라고 생각했는데."

[[dialogue]]
speaker = "unk"
original = "後日、『ヴィーナス前会長とフィオナ会長はどっちが強いか』というテーマでまたもや揉めるのだが、それはまた別のお話……"
translation = "훗날, 『비너스 전 회장과 피오나 회장은 누가 더 강한가』라는 주제로 또다시 다투게 되지만, 그것은 또 다른 이야기……"

