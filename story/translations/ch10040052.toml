[[dialogue]]
speaker = "unk"
original = "第２話,焔に身を任せ,P"
translation = "제2화, 불꽃에 몸을 맡기고, P"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──つーわけで、クマロボ探しにここまで来たわけだが……」"
translation = "「──뭐 그렇게 돼서, 곰 로봇을 찾으러 여기까지 왔다만……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もういない。くそ、逃げられたか」"
translation = "「벌써 없네. 젠장, 놓쳤나」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「一応、フィオナ達にも連絡しておかないとな。クマロボが新星でも出没したら大変だ」"
translation = "「일단, 피오나 일행에게도 연락해 둬야겠어. 곰 로봇이 신성에서도 출몰하면 큰일이니까」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「この戦闘服はもう十分に披露してやったし、元の『流星ライダー』フォームもあたしにとっちゃ大事なもんだからな──そろそろ元に戻らないと」"
translation = "「이 전투복은 이제 충분히 뽐냈고, 원래의 『유성 라이더』 폼도 나에겐 소중한 거니까── 슬슬 원래대로 돌아가야지」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「鍵はあのクマどもが握ってるはずだ。魔王も一緒にその方法を探してもらうぜ！」"
translation = "「열쇠는 그 곰 녀석들이 쥐고 있을 거야. 마왕도 같이 그 방법을 찾아줘야겠다구!」"

[[dialogue]]
speaker = "unk"
original = "元に戻りたいんだね"
translation = "원래대로 돌아가고 싶구나"

[[dialogue]]
speaker = "unk"
original = "その服ともさよならだ"
translation = "그 옷이랑도 작별이네"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「………………いや。このフォームもこのフォームで欲しい」"
translation = "「………………아니. 이 폼도 이 폼대로 갖고 싶어」"

[[dialogue]]
speaker = "unk"
original = "贅沢だなあ"
translation = "욕심쟁이네"

[[dialogue]]
speaker = "unk"
original = "わがままだなあ"
translation = "이기적이네"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「い、いいだろ別に！\u3000気に入っちゃったんだから！\u3000敵からもらったもんだろうがなんだろうが、一度手に入れたからにはあたしのもんだ！」"
translation = "「머, 어때서 그래! 마음에 들어버렸으니까! 적한테 받은 거든 뭐든, 일단 손에 넣은 이상 내 거라구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「とりあえずクマロボを見つけて退治しようぜ。何がどーなってるのか聞き出してやるぜ」"
translation = "「일단 곰 로봇을 찾아서 퇴치하자구. 뭐가 어떻게 된 건지 불게 해주겠어」"

[[dialogue]]
speaker_original = "クマロボ"
speaker_translation = "곰 로봇"
original = "「クマァーーーーーーーーーー！！！！！！」"
translation = "「쿠마아아아아아아아아아아!!!!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っと……話してたら出やがったな。よし、燃やし尽くすぞ魔王！」"
translation = "「앗…… 말하고 나니까 나타났네. 좋아, 태워버리자 마왕!」"

[[dialogue]]
speaker = "unk"
original = "そうして、街中に湧くクマロボを退治していった俺たちだが……。"
translation = "그렇게 해서, 거리 곳곳에 나타나는 곰 로봇을 퇴치해 나간 우리들이었지만……."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うーん……いくらクマロボを倒しても手応えないな」"
translation = "「으음…… 아무리 곰 로봇을 쓰러뜨려도 보람이 없네」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「しかもこいつら、クマァーーー！！\u3000しか喋らないから何の情報も吐いてくれないぞ……」"
translation = "「게다가 이 녀석들, 쿠마아아아──!! 하고만 말하니까 아무런 정보도 안 내뱉는다구……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「やっぱり元凶をどうにかしないとダメか……。これも全部あの黒ベア子ってやつの仕業だもんな」"
translation = "「역시 원흉을 어떻게든 하지 않으면 안 되나……. 이것도 전부 그 흑베아코라는 녀석의 짓이니까 말이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ただ、黒ベア子の行方については、うちに置いてるプトラに聞いてもわからないっていうんだよな。参ったぜ……」"
translation = "「다만, 흑베아코의 행방에 대해서는, 집에 둔 푸트라에게 물어봐도 모른다고 하더라고. 곤란하다구……」"

[[dialogue]]
speaker = "？？？"
original = "「フフ──お困りかな？\u3000若人たち」"
translation = "「후후── 곤란한 모양이군? 젊은이들」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「！？\u3000この声は──」"
translation = "「!? 이 목소리는──」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「やあ。学園外で会うとは奇遇だな」"
translation = "「야아. 학원 밖에서 만나다니 기우로군」"

[[dialogue]]
speaker = "unk"
original = "（学園内で会う方が珍しいような……）"
translation = "（학원 안에서 만나는 게 더 드문 것 같은데……）"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おお、基本学園にいない学園長じゃんか！\u3000相変わらずマント姿がキマってるな！」"
translation = "「오오, 기본적으로 학원에 없는 학원장 아냐! 여전히 망토 모습이 멋진데!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「む？\u3000アポロ嬢──そういう君は、随分とイメージチェンジしたようだな」"
translation = "「음? 아폴로 양── 그러는 자네는, 꽤나 이미지 변신을 한 모양이군」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ……そのつもりはなかったんだけど、勝手によ」"
translation = "「아아…… 그럴 생각은 없었는데, 멋대로 말이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだ！\u3000三界のあちこちを巡ってる学園長なら、このフォームとかクマロボ達の秘密だって知ってるんじゃないか？」"
translation = "「그렇지! 삼계를 여기저기 돌아다니는 학원장이라면, 이 폼이나 곰 로봇들의 비밀도 알고 있지 않아?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふむ──最近、各地から報告が上がっている不可解現象か」"
translation = "「흠── 최근, 각지에서 보고가 올라오고 있는 불가해한 현상인가」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「その格好にも関連しているようだな。聞こう」"
translation = "「그 복장과도 관련이 있는 모양이군. 듣도록 하지」"

[[dialogue]]
speaker = "unk"
original = "黒ベア子が……"
translation = "흑베아코가……"

[[dialogue]]
speaker = "unk"
original = "クマロボが……"
translation = "곰 로봇이……"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふーむ……なるほどな。もっと楽しく皆を巻き込むお祭り、か」"
translation = "「흐음…… 과연 그렇군. 좀 더 즐겁게 모두를 끌어들이는 축제, 인가」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「しかし、すまない。生憎そのような事象は──三界のどこでも聞いたことがないな」"
translation = "「하지만, 미안하네. 안타깝게도 그런 사상은── 삼계 어디에서도 들어본 적이 없군」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「う……学園長でもそうか」"
translation = "「우…… 학원장이라도 그런가」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だが……今の君からは普段にない息吹を感じる。まるでアーティストのようなそれを」"
translation = "「하지만…… 지금의 자네에게선 평소에 없는 숨결이 느껴지네. 마치 아티스트와도 같은 그것이」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「！\u3000わかるのか……あたしの芸術の炎が！」"
translation = "「! 아는 거야…… 내 예술의 불꽃을!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「無論。せっかくならその<ruby>焔<rt>ほむら</rt></ruby>に身を任せてみるのもよいのではないかな？」"
translation = "「물론이지. 이왕이면 그 <ruby>불꽃<rt>호무라</rt></ruby>에 몸을 맡겨보는 것도 좋지 않겠나?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なるほどだ。確かにな……このフォームならではの必殺技だって開発できるかもしれない」"
translation = "「그렇구나. 확실히…… 이 폼만의 필살기 같은 것도 개발할 수 있을지도 몰라」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ありがとな、学園長！\u3000あたし、なんか見えてきた気がするぜ！」"
translation = "「고마워, 학원장! 나, 뭔가 보이기 시작한 기분이라구!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「フ。礼には及ばんさ」"
translation = "「후. 고마워할 것까지는 없네」"

[[dialogue]]
speaker = "unk"
original = "そうして学園長に焚きつけられたアポロ。"
translation = "그렇게 해서 학원장에게 부추겨진 아폴로."

[[dialogue]]
speaker = "unk"
original = "この時の俺は、次に彼女がどんな行動に及ぶのか、まだわかっていなかった……。"
translation = "이때의 나는, 다음에 그녀가 어떤 행동을 할지, 아직 알지 못했다……."

