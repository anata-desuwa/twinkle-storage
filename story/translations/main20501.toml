[[dialogue]]
speaker = "unk"
original = "第１話,再襲来,B"
translation = "제1화, 재습격, B"

[[dialogue]]
speaker = "unk"
original = "流星市国全域で警報が鳴り響く。本来はモンスターの襲来を知らせるものだが、今警告すべき敵は別にいた。"
translation = "유성시국 전역에 경보가 울려 퍼진다. 본래는 몬스터의 습격을 알리는 것이지만, 지금 경고해야 할 적은 따로 있었다."

[[dialogue]]
speaker = "unk"
original = "街へと押し寄せているのは、女神のしもべであるはずのガーディアン。フィーニスの塔の守護者であるはずの彼らが、再び街を破壊しようと迫っていた。"
translation = "거리로 밀려들고 있는 것은 여신의 심부름꾼이어야 할 가디언. 피니스의 탑의 수호자여야 할 그들이 다시 거리를 파괴하려고 다가오고 있었다."

[[dialogue]]
speaker = "unk"
original = "先日撃退した極星学園が、態勢を整えてまた攻勢に出た。"
translation = "요전날 격퇴했던 극성학원이 태세를 정비하고 다시 공세에 나섰다."

[[dialogue]]
speaker = "unk"
original = "一度撤退した上での再攻撃。以前より強力な戦力を連れてきた可能性が高い。"
translation = "한번 철수한 뒤의 재공격. 이전보다 강력한 전력을 데려왔을 가능성이 높다."

[[dialogue]]
speaker = "unk"
original = "チナではなく他の役員が来ているかもしれないが、少なくとも極星星徒会の誰かがいるはずだ。"
translation = "치나가 아닌 다른 임원이 왔을지도 모르지만, 적어도 극성성도회의 누군가가 있을 터다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「敵の数と規模はわかるか？」"
translation = "「적의 수와 규모는 알 수 있나?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい、コハルコ先輩から報告が……──ッ！？」"
translation = "「네, 코하루코 선배로부터 보고가……──윽!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ガーディアン……極星従騎が流星市国と東京の各地を襲っています。その数……大小合わせて数百。今も反応は増え続けています」"
translation = "「가디언…… 극성종기가 유성시국과 도쿄 곳곳을 습격하고 있습니다. 그 수…… 대소를 합쳐 수백. 지금도 반응은 계속 늘어나고 있습니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！！」"
translation = "「!!」"

[[dialogue]]
speaker = "unk"
original = "極星従騎は、星徒会総出で倒した強敵だ。"
translation = "극성종기는 성도회 전원이 달려들어 쓰러뜨렸던 강적이다."

[[dialogue]]
speaker = "unk"
original = "以前の襲撃でも、現れた極星従騎は十数体。それが桁違いの数で襲ってきたら……"
translation = "이전 습격에서도 나타난 극성종기는 십여 체. 그것이 차원이 다른 숫자로 습격해 온다면……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それって……かなりヤバいってことなんじゃ……」"
translation = "「그거…… 상당히 위험하다는 거 아냐……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いきなりの決戦ね……」"
translation = "「갑작스러운 결전이네……」"

[[dialogue]]
speaker = "unk"
original = "世界の終わり、という言葉が頭の中でちらつく。"
translation = "세계의 종말이라는 단어가 머릿속에서 어른거린다."

[[dialogue]]
speaker = "unk"
original = "戦力的には圧倒的不利。それでも何とか活路を見出すしかない……！"
translation = "전력적으로는 압도적 불리. 그래도 어떻게든 활로를 찾아낼 수밖에 없다……!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「基本は防御と足止めに徹し、星徒会と精鋭で極星従騎を叩く」"
translation = "「기본은 방어와 발을 묶는 데 전념하고, 성도회와 정예로 극성종기를 친다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺とヴィーナスは極星従騎と戦いながらチナを見つけ、デネブに渡る方法を聞き出す。マトイたちはノヴァフォームを使いながら極星従騎を殲滅してくれ」"
translation = "「나와 비너스는 극성종기와 싸우며 치나를 찾아내 데네브로 건너갈 방법을 알아내겠어. 마토이 일행은 노바 폼을 사용하며 극성종기를 섬멸해 줘.」"

[[dialogue]]
speaker_original = "3人"
speaker_translation = "3명"
original = "「了解！」"
translation = "「라져!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わかったわ！\u3000あのちみっ子、今度こそ逃がさないわよ！」"
translation = "「알았어! 그 꼬맹이, 이번에야말로 놓치지 않겠어!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ヒヒィン！」"
translation = "「히히힝!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そこよ！」"
translation = "「거기야!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが杖を向けると、明星のごとき眩い光が鎖となってガーディアンの動きを奪う。そこに──"
translation = "비너스가 지팡이를 겨누자 샛별 같은 눈부신 빛이 사슬이 되어 가디언의 움직임을 빼앗는다. 거기에──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ディマイズブレイカー！」"
translation = "「디마이즈 브레이커!」"

[[dialogue]]
speaker = "unk"
original = "闇を帯びた拳がガーディアンの鎧を砕き、天馬は塵となって消え失せた。"
translation = "어둠을 띤 주먹이 가디언의 갑옷을 부수었고, 천마는 먼지가 되어 사라졌다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（やはり極星従騎は強い。迎撃に当たっているみんなが心配だ……）"
translation = "(역시 극성종기는 강해. 요격에 임하고 있는 모두가 걱정이야……)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（だけどこれだけの数で攻勢をかけるなら、指揮官は必要だ。だから今この瞬間も、極星星徒会の誰かは絶対にアルタイルに来ている）"
translation = "(하지만 이 정도 숫자로 공세를 펼친다면 지휘관은 필요해. 그러니 지금 이 순간도 극성성도회의 누군가는 반드시 알타이르에 와 있어.)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（デネブとの戦いを避けるためにも、その指揮官を見つけ出さないと──）"
translation = "(데네브와의 싸움을 피하기 위해서라도 그 지휘관을 찾아내야만 해──)"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「さてと……そろそろ頃合いかな」"
translation = "「자 그럼…… 슬슬 때가 됐나.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "視界が歪む。"
translation = "시야가 왜곡된다."

[[dialogue]]
speaker = "unk"
original = "自分の中で、小さな小さな何かが弾けた。"
translation = "자신의 안에서 아주 작은 무언가가 터졌다."

[[dialogue]]
speaker = "unk"
original = "まるで種が<ruby>萌芽<rt>ほうが</rt></ruby>するように、俺の中で得体の知れないものが膨らみ、根を伸ばしていく感覚。"
translation = "마치 씨앗이 발아하듯, 내 안에서 정체 모를 것이 부풀어 오르고 뿌리를 뻗어가는 감각."

[[dialogue]]
speaker = "unk"
original = "俺が、俺でない何かに浸食されていく。"
translation = "내가 내가 아닌 무언가에 침식되어 간다."

[[dialogue]]
speaker = "unk"
original = "これはもしかして──"
translation = "이것은 설마──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「えい♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker = "unk"
original = "剣の切っ先が届いたあの瞬間、ジグは俺にリクリエの力を植え付けていた……！？"
translation = "칼끝이 닿았던 그 순간, 지그는 나에게 리크리에의 힘을 심어두었던 건가……!?"

[[dialogue]]
speaker = "unk"
original = "今まで眠っていた種が、ここで目覚めようとしている──！"
translation = "지금까지 잠들어 있던 씨앗이 여기서 깨어나려 하고 있어──!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はぁ、はぁ……」"
translation = "「하아, 하아……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト、大丈夫！？\u3000顔色が悪いわよ！？」"
translation = "「쿠로토, 괜찮아!? 안색이 나쁘다고!?」"

[[dialogue]]
speaker = "unk"
original = "アポロを操り、ギエルに宿ったあの力が、俺の意識を乗っ取ろうとして──"
translation = "아폴로를 조종하고 기엘에게 깃들었던 그 힘이 나의 의식을 집어삼키려──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「く──おおおおおっ！！」"
translation = "「크── 오오오오옷!!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルル……！」"
translation = "「푸르르르……!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「相変わらず強いね、この馬。しかもこの前よりたくさん来てるし」"
translation = "「여전히 강하네, 이 말. 게다가 저번보다 훨씬 많이 왔고.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だけどちょっと慣れてきたな。──そら！」"
translation = "「하지만 조금 익숙해졌어. ──자!」"

[[dialogue]]
speaker = "unk"
original = "流星のごとき一閃が、極星従騎を剣ごと両断した。"
translation = "유성과 같은 일섬이 극성종기를 검째로 양단했다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「さすがアポロちゃん！\u3000これが魔王の力なんだ……」"
translation = "「역시 아폴로짱! 이게 마왕의 힘이구나……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（さっきから極星従騎はベアトを狙ってこない。以前ベアトの前で止まった時もあったが……）"
translation = "(아까부터 극성종기는 베아토를 노려오지 않아. 이전에 베아토 앞에서 멈췄을 때도 있었지만……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（いや、今は考えている場合ではない。脅威の排除が優先だ）"
translation = "(아니, 지금은 생각하고 있을 때가 아니야. 위협의 배제가 우선이다.)"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「敵も味方も忙しなく動いてるけど、私たちはどうする？」"
translation = "「적도 아군도 바쁘게 움직이고 있는데, 우리는 어떻게 할까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「緋宮会長と合流しよう。彼が極星星徒会と戦うなら、ジグもそこに現れる可能性が高い」"
translation = "「히노미야 회장과 합류하자. 그가 극성성도회와 싸운다면 지그도 그곳에 나타날 가능성이 높아.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「極星……星徒会……」"
translation = "「극성…… 성도회……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「どうした、ベアト？」"
translation = "「왜 그래, 베아토?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えっと、あの……梨緒ちゃん、私……」"
translation = "「저기, 그게…… 리오짱, 나……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000ルリから連絡……？」"
translation = "「응? 루리한테 연락……?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "『すみません、アポロさん！\u3000流星学園にガーディアンがたくさん来てて、今流星星徒会で対応してるんですけど、ちょっと余裕ないです～！』"
translation = "『죄송해요, 아폴로 씨! 유성학원에 가디언이 잔뜩 와서 지금 유성성도회가 대응하고 있는데, 좀 여유가 없어요~!』"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "『できればこっちを手伝ってくれると助かりま──ひゃぁっ！？』"
translation = "『가능하면 이쪽을 도와주시면 감사하겠── 히얏!?』"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「くっ……今フィオナがいないのが痛いな……」"
translation = "「큭…… 지금 피오나가 없는 게 뼈아프네……」"

[[dialogue]]
speaker = "unk"
original = "現在、流星・新星学園両校は、負傷者や付近の一般人を収容する拠点となっている。"
translation = "현재 유성·신성학원 양교는 부상자나 인근 일반인을 수용하는 거점이 되어 있다."

[[dialogue]]
speaker = "unk"
original = "新星星徒会がガーディアンの掃討に回っている分、流星星徒会が防衛にあたっているが、敵の突破を許せば甚大な被害が出るだろう。"
translation = "신성성도회가 가디언 소탕에 나선 만큼 유성성도회가 방어를 맡고 있지만, 적의 돌파를 허용하면 심대한 피해가 발생할 것이다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「アポロは流星学園の防衛に回ってくれ。学園を落とされるわけにはいかない」"
translation = "「아폴로는 유성학원 방어로 돌아가 줘. 학원을 함락당하게 둘 수는 없어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「了解！\u3000そっちも気を付けてくれ！」"
translation = "「라져! 그쪽도 조심해!」"

[[dialogue]]
speaker = "unk"
original = "アポロが翼を広げ、学園めがけて全速力で飛翔していく。"
translation = "아폴로가 날개를 펼치고 학원을 향해 전속력으로 비상해 간다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「アポロが抜けちゃうと、残念ながら大きな戦力ダウンだね」"
translation = "「아폴로가 빠지면 유감스럽게도 큰 전력 손실이네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、だが仕方ない。……それでベアト、さっき何かを言いかけていたか？」"
translation = "「아아, 하지만 어쩔 수 없지. ……그래서 베아토, 아까 무슨 말을 하려 했었나?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ、ううん、何でもない……今大変だからまた後で話すね」"
translation = "「아, 아니, 아무것도 아니야…… 지금 힘든 상황이니까 나중에 다시 얘기할게.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「わかった、後で聞かせてくれ。では私たちは──」"
translation = "「알았다, 나중에 들려줘. 그럼 우리는──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！？\u3000この衝撃は……？\u3000何が起きた……！？」"
translation = "「!? 이 충격은……? 무슨 일이 일어난 거지……!?」"

