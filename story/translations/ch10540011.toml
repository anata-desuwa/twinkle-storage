[[dialogue]]
speaker = "unk"
original = "第１話,聖剣の勇者,P"
translation = "제1화, 성검의 용사, P"

[[dialogue]]
speaker = "unk"
original = "星力の適正の有無には男女差があり、新星・流星両学園の生徒の男女比はおよそ１対９。"
translation = "성력의 적성 유무에는 남녀 차이가 있어, 신성·유성 양 학원 학생의 남녀비는 약 1대 9."

[[dialogue]]
speaker = "unk"
original = "ユーリス・フォン・ジルラントは数少ない男子生徒の１人であり、ともに研鑽を重ねる友人だ。"
translation = "유리스 폰 질란트는 몇 안 되는 남학생 중 한 명이며, 함께 연마를 거듭하는 친구다."

[[dialogue]]
speaker = "ユーリス"
original = "「流石だね、会長！\u3000私の動きにここまでついて来られるだなんて……！」"
translation = "「역시 대단해, 회장! 내 움직임을 이 정도까지 따라오다니……!」"

[[dialogue]]
speaker = "ユーリス"
original = "「どうしても君を倒してみたくなったよ！\u3000次の一撃は……全力で行く！」"
translation = "「어떻게 해서든 너를 이겨보고 싶어졌어! 다음 일격은…… 전력으로 간다!」"

[[dialogue]]
speaker = "ユーリス"
original = "「極光よ、剣に宿れ──ブリッツシュナイデン！」"
translation = "「극광이여, 검에 깃들어라── 브릿츠 슈나이덴!」"

[[dialogue]]
speaker = "環"
original = "「お～っと！\u3000王子の必殺剣が会長に炸裂！\u3000これは勝負あったか～！？」"
translation = "「오~옷! 왕자의 필살검이 회장에게 작렬! 이것으로 승부 끝인가~!?」"

[[dialogue]]
speaker = "ユーリス"
original = "「市倉さん、いつからそこに？\u3000というより、今のはいったい……？」"
translation = "「이치쿠라 씨, 언제부터 거기에? 그보다, 방금 그건 도대체……?」"

[[dialogue]]
speaker = "環"
original = "「いや～、偶然通りがかったらマジで戦ってるからさー、ここは盛り上げなきゃって」"
translation = "「아니~, 우연히 지나가는데 진짜로 싸우고 있길래 말이야, 여기선 분위기를 띄워야겠다 싶어서」"

[[dialogue]]
speaker = "環"
original = "「めちゃくちゃバチバチしてるし、男同士、譲れない物でも賭けて決闘でもしてるのかと思ったよ」"
translation = "「엄청나게 불꽃이 튀길래, 남자끼리 양보할 수 없는 거라도 걸고 결투라도 하는 줄 알았어」"

[[dialogue]]
speaker = "ユーリス"
original = "「いいえ、ただの模擬戦ですよ」"
translation = "「아니요, 평범한 모의전이에요」"

[[dialogue]]
speaker = "ユーリス"
original = "「しかし男同士の決闘……ですか。ふふ」"
translation = "「하지만 남자끼리의 결투…… 인가요. 후후」"

[[dialogue]]
speaker = "ユーリス"
original = "「傍から見ていてそこまで鬼気迫っていたのなら、全力を出した甲斐があったというものでしょうか」"
translation = "「곁에서 보기에 그 정도로 살기가 느껴졌다면, 전력을 다한 보람이 있었다고 해야 할까요」"

[[dialogue]]
speaker = "unk"
original = "叩き切られるかと思った"
translation = "베여 나가는 줄 알았다"

[[dialogue]]
speaker = "ユーリス"
original = "「どれだけスピードを上げても会長が食らいついてくるから、私も熱が入ってしまった。いい太刀筋だったろう？」"
translation = "「아무리 스피드를 올려도 회장이 물고 늘어지니까, 나도 열이 올라버렸어. 훌륭한 칼솜씨였지?」"

[[dialogue]]
speaker = "環"
original = "「すごい迫力だったなー。バトル漫画かと思っちゃったよ。ユーリスが速すぎて３人に見える時もあったし」"
translation = "「대단한 박력이었어~. 배틀 만화인 줄 알았다니까. 유리스가 너무 빨라서 3명으로 보일 때도 있었고」"

[[dialogue]]
speaker = "ユーリス"
original = "「だけど会長には凌がれてしまったね。次は別の勇者スキルを試したいから、また付き合ってくれると嬉しいな」"
translation = "「하지만 회장에게 막혀버렸네. 다음엔 다른 용사 스킬을 시험해보고 싶으니까, 또 상대해주면 기쁘겠어」"

[[dialogue]]
speaker = "環"
original = "「勇者スキル……！\u3000それってあれでしょ、ユーリスの聖剣そのものが記憶してる技なんだよね？」"
translation = "「용사 스킬……! 그거 그거지, 유리스의 성검 자체가 기억하고 있는 기술인 거지?」"

[[dialogue]]
speaker = "ユーリス"
original = "「ええ。我がジルラント王家に伝わる聖剣『エーヴィヒリヒト』には、代々の所有者が身に付けたスキルが記憶されています」"
translation = "「네. 우리 질란트 왕가에 전해지는 성검 『에비히리히트』에는, 대대로 소유자가 익힌 스킬이 기억되어 있습니다」"

[[dialogue]]
speaker = "ユーリス"
original = "「神速の乱れ切り、星力を収束させた必殺の斬撃など……先代が編み出し磨き上げた技を再現できるんですよ」"
translation = "「신속의 난무, 성력을 수습시킨 필살의 참격 등…… 선대가 고안하고 연마한 기술을 재현할 수 있거든요」"

[[dialogue]]
speaker = "環"
original = "「ほえ～……ほんとにすごい剣なんだなぁ～」"
translation = "「호에~…… 정말 대단한 검이구나~」"

[[dialogue]]
speaker = "unk"
original = "でもどうして聖剣って呼ばれてるんだ？"
translation = "근데 어째서 성검이라고 불리는 거야?"

[[dialogue]]
speaker = "ユーリス"
original = "「あぁ、それはね……」"
translation = "「아아, 그것은 말이죠……」"

[[dialogue]]
speaker = "環"
original = "「あ、それは聞いたことある！\u3000魔王を倒した勇者の剣なんだっけ」"
translation = "「아, 그건 들어본 적 있어! 마왕을 쓰러뜨린 용사의 검이라던가」"

[[dialogue]]
speaker = "ユーリス"
original = "「そう言われていますね。遠い昔、天使ジルラントが天空より授かった剣で悪逆なる魔王を討った──」"
translation = "「그렇게 전해지고 있지요. 먼 옛날, 천사 질란트가 천공으로부터 하사받은 검으로 악역무도한 마왕을 베었다──」"

[[dialogue]]
speaker = "ユーリス"
original = "「その剣は聖剣と呼ばれ、ジルラントが開いた王国とともに、今も受け継がれている──それが我が国に伝わる伝説です」"
translation = "「그 검은 성검이라 불리며, 질란트가 세운 왕국과 함께 지금까지 계승되고 있다── 그것이 우리나라에 전해지는 전설입니다」"

[[dialogue]]
speaker = "環"
original = "「あ、だから王子は天使と人間の混血なんだ。ご先祖様が天使だから」"
translation = "「아, 그래서 왕자는 천사와 인간의 혼혈이구나. 조상님이 천사니까」"

[[dialogue]]
speaker = "ユーリス"
original = "「そういうことです」"
translation = "「그렇게 된 겁니다」"

[[dialogue]]
speaker = "ユーリス"
original = "「とはいえ、魔王は厄災の擬人化という説もあるので、伝説がどこまで事実かはわかりませんが」"
translation = "「그렇다고는 해도, 마왕은 재앙의 의인화라는 설도 있어서 전설이 어디까지 사실인지는 모르겠지만요」"

[[dialogue]]
speaker = "環"
original = "「今の魔王には効くかな～、この聖剣？」"
translation = "「지금의 마왕에게도 통할까~, 이 성검?」"

[[dialogue]]
speaker = "ユーリス"
original = "「担い手次第でしょうか。自信はあるのですが」"
translation = "「사용하기 나름이겠지요. 자신은 있습니다만」"

[[dialogue]]
speaker = "ユーリス"
original = "「──なんて、あまりからかわないでください。会長が困った顔をしています」"
translation = "「──라니, 너무 놀리지 말아주세요. 회장이 곤란한 얼굴을 하고 있습니다」"

[[dialogue]]
speaker = "ユーリス"
original = "「御前試合の時、前会長が君を魔王だと言ったことは覚えているよ」"
translation = "「어전시합 때, 전 회장이 너를 마왕이라고 말했던 것은 기억하고 있어」"

[[dialogue]]
speaker = "ユーリス"
original = "「だけど私は気にしてはいない。君が新星の星徒会長にふさわしい強さと志を持っているって知っているから」"
translation = "「하지만 나는 신경 쓰지 않아. 네가 신성의 성도회장에 어울리는 강함과 뜻을 가지고 있다는 걸 알고 있으니까」"

[[dialogue]]
speaker = "ユーリス"
original = "「もちろん、会長が悪に堕ちるのなら全身全霊で戦うけどね」"
translation = "「물론, 회장이 악으로 떨어진다면 전신전령으로 싸우겠지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "もしもそうなったらよろしく"
translation = "만약 그렇게 된다면 잘 부탁해"

[[dialogue]]
speaker = "ユーリス"
original = "「ああ、約束だ」"
translation = "「아아, 약속이다」"

[[dialogue]]
speaker = "ユーリス"
original = "「さて──会長、今日はこのくらいにしておこうか。そろそろ下校時刻だ」"
translation = "「자── 회장, 오늘은 이쯤 해둘까. 슬슬 하교 시간이야」"

[[dialogue]]
speaker = "ユーリス"
original = "「そうだ、帰りに食事でもどう？\u3000学生らしくファーストフードとか」"
translation = "「맞다, 돌아가는 길에 식사라도 어때? 학생답게 패스트푸드라든지」"

[[dialogue]]
speaker = "環"
original = "「いいねいいね～、わかってるじゃん王子！\u3000青春にはやっぱりバーガーとフライドポテトだよ！」"
translation = "「좋네 좋아~, 역시 잘 아는데 왕자! 청춘에는 역시 버거와 프렌치 프라이지!」"

[[dialogue]]
speaker = "環"
original = "「でもボクはこれからバイトだから、２人で行ってくるといいよ。じゃ～ね～！」"
translation = "「하지만 난 이제부터 알바니까, 둘이서 다녀와. 안녕~!」"

[[dialogue]]
speaker = "ユーリス"
original = "「行ってしまった……彼女は掴みどころのない風のような子だね」"
translation = "「가버렸네…… 그녀는 종잡을 수 없는 바람 같은 아이구나」"

[[dialogue]]
speaker = "ユーリス"
original = "「じゃあ２人でハンバーガーを食べに行こうか。あまり経験がないからおすすめを教えてくれると助かるよ」"
translation = "「그럼 둘이서 햄버거를 먹으러 갈까. 경험이 별로 없어서 추천을 알려주면 도움이 되겠어」"

[[dialogue]]
speaker = "ユーリス"
original = "「でもその前にシャワーを浴びよう。たくさん運動した分、汗をかいてしまったから」"
translation = "「하지만 그전에 샤워를 하자. 운동을 많이 한 만큼 땀을 흘려버렸으니까」"

[[dialogue]]
speaker = "unk"
original = "そっちは女子用のシャワー室だけど……"
translation = "그쪽은 여자용 샤워실인데……"

[[dialogue]]
speaker = "ユーリス"
original = "「えっ！？\u3000あ、ああ……私としたことが間違えてしまった。ありがとう、危うく変質者になるところだったよ」"
translation = "「엣!? 아, 아아…… 내가 실수를 해버렸네. 고마워, 하마터면 변절자가 될 뻔했어」"

[[dialogue]]
speaker = "ユーリス"
original = "「……一緒にシャワー室に？\u3000えっと、それは……」"
translation = "「……함께 샤워실에? 에또, 그건……」"

[[dialogue]]
speaker = "ユーリス"
original = "「あ、そうだ！\u3000少し剣の素振りをしてから行くよ。機材の片付けもしておくから」"
translation = "「아, 맞다! 조금 검 휘두르기를 더 하고 갈게. 기자재 정리도 해둘 테니까」"

[[dialogue]]
speaker = "unk"
original = "じゃあお言葉に甘えて……"
translation = "그럼 호의에 기대서 먼저……"

[[dialogue]]
speaker = "ユーリス"
original = "「ああ、先に汗を流しておいで！\u3000あはは、あははは……」"
translation = "「아아, 먼저 땀을 씻고 와! 아하하, 아하하하……」"

[[dialogue]]
speaker = "unk"
original = "その後２人でハンバーガーショップに寄ったが、その時はいつもの優雅なユーリスに戻っていたのだった──"
translation = "그 후 둘이서 햄버거 가게에 들렀지만, 그때는 평소의 우아한 유리스로 돌아와 있었다──"

