[[dialogue]]
speaker = "unk"
original = "第１話,さらわれた金星,B"
translation = "제1화, 납치된 금성, B"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト──────ッッッ！！！」"
translation = "「쿠로토──────읏읏읏!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス──────ッッッ！！！」"
translation = "「비너스──────읏읏읏!!!」"

[[dialogue]]
speaker = "unk"
original = "──あれから。"
translation = "──그 후로."

[[dialogue]]
speaker = "unk"
original = "俺たちはなすすべなく光に包まれ、フィーニスの塔を追い出された。"
translation = "우리는 속수무책으로 빛에 휩싸여, 피니스의 탑에서 쫓겨났다."

[[dialogue]]
speaker = "unk"
original = "あの層の主である煌竜ヴィライアは打ち倒した──それをもって、俺たちは『クリア』と判定されたのだろう。"
translation = "그 계층의 주인인 황룡 빌라이아는 쓰러뜨렸다── 그것으로 우리는 『클리어』로 판정되었을 것이다."

[[dialogue]]
speaker = "unk"
original = "しかし、最後に空間を引き裂いてやってきたあの<ruby>闖入者<rt>ちんにゅうしゃ</rt></ruby>──"
translation = "하지만, 마지막에 공간을 찢고 나타난 그 침입자──"

[[dialogue]]
speaker = "unk"
original = "奴の圧倒的な力を前に俺たちは抗えず、ヴィーナスはさらわれてしまった……。"
translation = "그놈의 압도적인 힘 앞에서 우리는 저항하지 못했고, 비너스는 납치당하고 말았다……."

[[dialogue]]
speaker = "unk"
original = "そうして敗走した俺たちは、打つ手のないまま一日が経過した──"
translation = "그렇게 패주한 우리는, 손쓸 도리 없이 하루가 경과했다──"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「極めて由々しき事態です──そんなことになっていたなんて……！」"
translation = "「지극히 중대한 사태입니다── 그런 일이 있었다니……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ヴィーナスちゃん、どうか無事でいて……！」"
translation = "「비너스짱, 부디 무사해야 할 텐데……!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「本来、フィーニスの塔は立ち入りが禁止されている──が。今、その是非を問うている場合ではないな」"
translation = "「본래, 피니스의 탑은 출입이 금지되어 있다──만. 지금, 그 시비를 따질 때가 아니군」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「九浄ヴィーナスくんの身柄を奪還するため──その『黒き騎士』という存在を調査するのだ」"
translation = "「쿠죠 비너스 군의 신병을 탈환하기 위해── 그 『검은 기사』라는 존재를 조사하도록」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……緋宮くん。ＤＩＳＣは……」"
translation = "「……히노미야 군. 디스크는……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……通信不能だ。昨日から、ずっと」"
translation = "「……통신 불능이다. 어제부터, 계속」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ＤＩＳＣは、アステラ内部でさえ電波が届くはずなのですが……」"
translation = "「……디스크는, 아스테라 내부에서조차 전파가 닿을 텐데요……」"

[[dialogue]]
speaker = "unk"
original = "何度も何度もかけ直した。"
translation = "몇 번이고 몇 번이고 다시 걸었다."

[[dialogue]]
speaker = "unk"
original = "しかしあれ以来、ヴィーナスとは一切交信が取れていない。"
translation = "하지만 그 이후로, 비너스와는 일절 교신이 되지 않고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（今どこにいるんだ──あの影に何をされているんだ──何もわからない──くそっ！）"
translation = "（지금 어디에 있는 거냐── 그 그림자에게 뭘 당하고 있는 거냐── 아무것도 모르겠어── 젠장!）"

[[dialogue]]
speaker = "unk"
original = "やり場のない怒りをぶつける。<ruby>逸<rt>はや</rt></ruby>る気持ちが抑えられず、みっともない姿を<ruby>晒<rt>さら</rt></ruby>してしまっていた。"
translation = "풀 곳 없는 분노를 터뜨린다. 조급한 마음을 억누르지 못하고, 꼴사나운 모습을 드러내고 있었다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ありえねえ……！\u3000ちくしょう、あたしがしっかり守れてりゃ──」"
translation = "「말도 안 돼……! 제기랄, 내가 제대로 지켰어야 했는데──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……ユウリ先輩のせいじゃありませんよ」"
translation = "「……유우리 선배의 잘못이 아니에요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そだねー……見たことないカンジの力まで操ってたし」"
translation = "「그렇지이ー…… 본 적 없는 느낌의 힘까지 조종하고 있었고」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長……大丈夫ですか？\u3000昨日から、一睡もしていないのでしょう」"
translation = "「히노미야 회장…… 괜찮으십니까? 어제부터, 한숨도 못 주무셨지요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長はあれから、塔の探索や聞き込みを夜明けまで行っていましたから……」"
translation = "「회장님은 그 후로, 탑 탐색과 탐문을 새벽까지 진행하셨으니까요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、あの激戦の後にでありますか！？\u3000今にもぶっ倒れそうでありますよ！」"
translation = "「아, 그 격전 후에 말입니까!? 지금이라도 쓰러질 것 같으십니다요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……大丈夫だ。このくらい、あいつの苦難に比べたらなんでもないし、それに──」"
translation = "「……괜찮아. 이 정도는, 그 녀석의 고난에 비하면 아무것도 아니고, 게다가──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じっとしていられないんだ。今この瞬間にも、ヴィーナスがどうなってるのかと思うと」"
translation = "「가만히 있을 수가 없어. 지금 이 순간에도, 비너스가 어떻게 되고 있을까 생각하면」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん……」"
translation = "「히노미야 군……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（今の緋宮会長も、心配になってしまいますが……）"
translation = "（지금의 히노미야 회장도, 걱정되지만요……）"

[[dialogue]]
speaker = "unk"
original = "血が出るほどに強く拳を握る。"
translation = "피가 날 정도로 강하게 주먹을 쥔다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは今も──素性の知れぬ敵に囚われている。それを思えば……"
translation = "비너스는 지금도── 정체를 알 수 없는 적에게 붙잡혀 있다. 그것을 생각하면……"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『不穏である。デネブか、ベガか……あるべきでない世界線から混入した異分子。排除せねばならない』"
translation = "『불온하다. 데네브인가, 베가인가…… 마땅히 있어서는 안 될 세계선에서 혼입된 이분자. 배제해야 한다』"

[[dialogue]]
speaker = "unk"
original = "──俺たちの前に現れた漆黒の騎士。"
translation = "──우리 앞에 나타난 칠흑의 기사."

[[dialogue]]
speaker = "unk"
original = "奴がヴィーナスにかけていた言葉の意味も、俺たちは計りかねている。"
translation = "그놈이 비너스에게 했던 말의 의미도, 우리는 가늠하지 못하고 있다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（ニャリオンの様子があれからおかしいのも──気になるところですが……）"
translation = "（냐리온의 상태가 그 후로 이상한 것도── 신경 쓰이는 부분이지만……）"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アナちゃん。何か手がかりは掴めたかしら」"
translation = "「아나짱. 뭔가 단서를 잡았니」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「未だ不明。しかし、解析は続けています」"
translation = "「아직 불명. 하지만, 해석은 계속하고 있습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それと会長の指示で──新星学園中のリソースを前会長の捜索にあてています。あの黒い存在が残した痕跡も含めて」"
translation = "「그리고 회장님의 지시로── 신성 학원 전체의 리소스를 전 회장님 수색에 할애하고 있습니다. 그 검은 존재가 남긴 흔적을 포함해서」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「助かるわ。私もいくらだって手伝うから」"
translation = "「고맙네. 나도 얼마든지 도울 테니까」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ああ。何が何でもあの野郎を見つけ出して、落とし前つけさせねえと……！」"
translation = "「아아. 무슨 일이 있어도 그 자식을 찾아내서, 책임지게 해야지……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っ……でも──もし、あれとまた遭うことになったら……勝てるのかな……？」"
translation = "「윽…… 하지만── 만약, 저것과 다시 만나게 된다면…… 이길 수 있을까……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "あの影が俺たちに刻んでいった爪痕は、あまりにも大きかった……。"
translation = "그 그림자가 우리에게 새겨놓은 발톱 자국은, 너무나도 컸다……."

