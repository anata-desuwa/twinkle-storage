[[dialogue]]
speaker = "unk"
original = "その日は冬休みで、母さんが不在の日。俺の家にはアナが泊まりにやって来ていた。"
translation = "그날은 겨울 방학이었고, 어머니가 부재중인 날. 우리 집에는 아나가 자러 와 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さて、会長。外も暗くなってきましたし、ここからはムーディーに切り替えて、大人な夜の時間です」"
translation = "「자, 회장님. 밖도 어두워졌으니 여기서부터는 무드 있게 전환해서, 어른스러운 밤 시간이에요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お正月を迎えましたし、心機一転、本日は特別な新アイテムを用意してきました」"
translation = "「정월을 맞이했으니 심기일전, 오늘은 특별한 신 아이템을 준비해 왔습니다.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、アナが取り出して見せたのは――"
translation = "그렇게 말하며 아나가 꺼내 보인 것은――"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「名づけて『魔王ディルド』です」"
translation = "「이름하여 『마왕 딜도』입니다.」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>張型<rt>はりがた</rt></ruby>』とも呼ばれる、男性器を模した性具であった。"
translation = "『장형』이라고도 불리는, 남성기를 본뜬 성인용품이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっと、なんで『魔王』……？」"
translation = "「저기, 왜 『마왕』……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふっふっふっ、よくぞ聞いてくれました。これはアニマ先輩に協力してもらい、私の手で丹精込めて制作した代物――」"
translation = "「훗훗훗, 잘 물어봐 주셨습니다. 이것은 아니마 선배의 협력을 받아 제 손으로 정성을 다해 제작한 물건――」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「密かに会長のペニスの形状や大きさを分析、フル勃起状態を完全再現したディルドです」"
translation = "「남몰래 회장님의 페니스 형상과 크기를 분석, 풀 발기 상태를 완전 재현한 딜도입니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔王ってそういうこと！？\u3000というか、いつの間に！？」"
translation = "「마왕이 그런 의미!? 그보다 언제 사이에!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いくら玩具とはいえ、恋人に無断で浮気オナニーはしていませんので、その辺りの心配はノープロブレム」"
translation = "「아무리 장난감이라 해도 연인 몰래 바람피우며 자위하지는 않으니, 그 점은 노 프로블럼.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「無断でコピーしたのは、ちょっとプロブレムなのでは……！？」"
translation = "「무단으로 카피한 건 좀 프로블럼 아닌가……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……それについては、ノーコメントです」"
translation = "「……그것에 대해서는 노 코멘트입니다.」"

[[dialogue]]
speaker = "unk"
original = "目を逸らしながら言うアナなのであった。"
translation = "시선을 피하며 말하는 아나였다."

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはベッドの上へと移動して。"
translation = "그렇게 우리들은 침대 위로 이동해서."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んぅぅっ<emoji=heart04>\u3000お、ふおおおぉ～っ……<emoji=heart04>」"
translation = "「응으으윽<emoji=heart04> 오, 후오오오옹~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はあぁぁ……<emoji=heart04>\u3000おま○こに入り、ましたぁあ……<emoji=heart04>\u3000んふうぅ……っ<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 보지에 들어, 갔어요오오……<emoji=heart04> 응후우……윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナは騎乗位の体勢で、アニマ先輩特製のローションでぬるぬるにしたディルドを、おま○この方で迎え入れていた。"
translation = "아나는 기승위 자세로 아니마 선배 특제 로션으로 미끈미끈하게 만든 딜도를 보지 쪽으로 받아들이고 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おほおぉ……<emoji=heart04>\u3000さすがは、会長のを再現したディルド……あぁあっ<emoji=heart04>\u3000すごく大きくて、中いっぱいに、広げられちゃってますっ<emoji=heart04>」"
translation = "「오호오오……<emoji=heart04> 역시 회장님 것을 재현한 딜도…… 아아앗<emoji=heart04> 엄청 커서 안이 꽉 차게 벌어지고 있어요옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで……本当にここからアナルの方にも挿れるのか？」"
translation = "「그래서…… 정말로 여기서 애널 쪽에도 넣는 거야?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「は、はい……っ<emoji=heart04>\u3000それを期待して、魔王ディルドを作ったので<emoji=heart04>\u3000それに、二穴同時に挿れれば、浮気にはなりませんから……<emoji=heart04>\u3000はぁぁ<emoji=heart04>」"
translation = "「네, 네에……윽<emoji=heart04> 그걸 기대하고 마왕 딜도를 만들었으니까요<emoji=heart04> 게다가 두 구멍 동시에 넣으면 바람피우는 게 아니게 되니까……<emoji=heart04> 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナにとって、そこはどうしても筋を通したい部分らしい。その健気さが無性に可愛らしく思えて、俺のペニスはディルドに劣るまいと隆起していく。"
translation = "아나에게 있어서 그 부분은 어떻게든 도리를 지키고 싶은 부분인 모양이다. 그 기특함이 무척이나 사랑스럽게 느껴져, 내 페니스는 딜도에 지지 않겠다는 듯 팽창해 간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。それじゃあ、お尻の方も準備するぞ」"
translation = "「알았어. 그럼 엉덩이 쪽도 준비할게.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、俺は自分のペニスにローションをかけて、アナの尻穴に擦り付け始める。"
translation = "그렇게 말하며 나는 내 페니스에 로션을 뿌리고 아나의 똥구멍에 문지르기 시작한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んっ<emoji=heart04>\u3000ふあぁああぁぁっ<emoji=heart04>\u3000すっかり開発、されちゃったのでぇ<emoji=heart04>\u3000会長のチ○ポが肌に擦れるだけで、発情<emoji=heart04>\u3000してきちゃいますぅ<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 후아아아아앗<emoji=heart04> 완전히 개발되어 버려서어<emoji=heart04> 회장님의 자지가 살결에 스치는 것만으로 발정<emoji=heart04>해 버려요오<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "尻穴周辺にローションを塗り付けて、ヌルヌルにしていく。"
translation = "똥구멍 주변에 로션을 발라 미끈미끈하게 만든다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「か、会長……<emoji=heart04>\u3000ディルドの電源、入れてみてくださいっ<emoji=heart04>\u3000渡したリモコンで操作、できますので……<emoji=heart04>」"
translation = "「회, 회장님……<emoji=heart04> 딜도 전원, 켜봐 주세요옷<emoji=heart04> 건네드린 리모컨으로 조작할 수 있으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手の平の中に収まるくらいのサイズのリモコンには、ボタンが複数付いていた。俺はうながされるまま、電源ボタンを入れる。"
translation = "손바닥 안에 들어올 정도 사이즈의 리모컨에는 버튼이 여러 개 달려 있었다. 나는 재촉받는 대로 전원 버튼을 켠다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んおっ！？\u3000んんぅ、うぅ～っ<emoji=heart04><emoji=heart04>\u3000ふおおぉ、んおぉお～っ……！」"
translation = "「응오옷!? 응응으, 으으~윽<emoji=heart04><emoji=heart04> 후오오오, 응오오오~……!」"

[[dialogue]]
speaker = "unk"
original = "可愛い喘ぎ声を漏らすアナ。爪先に力が入り、伸びた脚が小刻みにぷるぷると震える。"
translation = "귀여운 신음 소리를 흘리는 아나. 발가락에 힘이 들어가고, 쭉 뻗은 다리가 잘게 파르르 떨린다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「こ、これぇ……<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000内側から機械的な振動っ<emoji=heart04>\u3000すごい、ですぅ<emoji=heart04>\u3000これだけでも……ふあぁあっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>」"
translation = "「이, 이거어……<emoji=heart04> 아아앗<emoji=heart04> 안쪽에서 기계적인 진동이잇<emoji=heart04> 굉장해여어<emoji=heart04> 이것만으로도…… 후아아앗<emoji=heart04> 보지 기분 좋아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お尻の方もヌルヌルになって、準備できたぞ」"
translation = "「엉덩이 쪽도 미끌미끌해져서, 준비 다 됐다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「は、はい<emoji=heart04>\u3000<b>ケツアナ</b>にもくださいっ<emoji=heart04>\u3000はあぁ～ぁ<emoji=heart04>\u3000会長の本物魔王チ○ポで、二穴セックス<emoji=heart04>\u3000お願いしますぅ<emoji=heart04>」"
translation = "「네, 네<emoji=heart04> <b>똥구멍</b>에도 주세요옷<emoji=heart04> 하아아~아<emoji=heart04> 회장님의 진짜 마왕 자지로, 두 구멍 섹스<emoji=heart04> 부탁드려요오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナは自らを差し出すように、お尻を前へと突き出してくる。俺はそんな彼女の尻穴にペニスの先端をあてがい、ゆっくりと挿入していく。"
translation = "아나는 자신을 내던지듯, 엉덩이를 앞으로 내민다. 나는 그런 그녀의 항문에 페니스의 끝을 갖다 대고, 천천히 삽입해 나간다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ――<emoji=heart04><emoji=heart04>」"
translation = "「오――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んおおぉおおぉ～～っ<emoji=heart04><emoji=heart04>\u3000お、ぉおお、おぉおぉおお～っ……！」"
translation = "「응오오오오오~~옷<emoji=heart04><emoji=heart04> 오, 오오오, 오오오오오~옷……!」"

[[dialogue]]
speaker = "unk"
original = "俺はアナの反応を伺いながら、腰をゆっくりと動かし始めた。"
translation = "나는 아나의 반응을 살피며, 허리를 천천히 움직이기 시작했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふおおぉっ<emoji=heart04>\u3000魔王チ○ポ、きましたぁ<emoji=heart04><emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふあっ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후오오옷<emoji=heart04> 마왕 자지, 왔어요오<emoji=heart04><emoji=heart04> 응으윽<emoji=heart04> 후우욱<emoji=heart04> 후아앗<emoji=heart04> 응아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ<emoji=heart04>\u3000んおぉおっ<emoji=heart04>\u3000ケツアナ、気持ちいいですぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んおぉっ<emoji=heart04>\u3000ふおぉっ<emoji=heart04>\u3000魔王チ○ポ、効くぅっ……<emoji=heart04>」"
translation = "「오옷<emoji=heart04> 응오오옷<emoji=heart04> 똥구멍, 기분 좋아요오옷<emoji=heart04> 응으윽<emoji=heart04> 응오옷<emoji=heart04> 후오옷<emoji=heart04> 마왕 자지, 잘 들어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふおぉおっ<emoji=heart04>\u3000お尻気持ちいいっ<emoji=heart04>\u3000おおぉ<emoji=heart04>\u3000ケツアナ感じますぅっ<emoji=heart04>\u3000んおおぉっ<emoji=heart04>」"
translation = "「오옷<emoji=heart04> 후우욱<emoji=heart04> 후오오옷<emoji=heart04> 엉덩이 기분 좋아앗<emoji=heart04> 오오오<emoji=heart04> 똥구멍 느껴져요오옷<emoji=heart04> 응오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナの可愛く淫らな喘ぎ声が、部屋の空気を震わせる。俺はその響きに誘われるように、ディルドのリモコンへと指先を滑らせ、静かにボタンを押し込んだ。"
translation = "아나의 귀엽고 음란한 신음소리가 방 안의 공기를 떨게 한다. 나는 그 울림에 이끌리듯, 딜도의 리모컨으로 손가락을 미끄러뜨려 조용히 버튼을 눌렀다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おぉおおっ！？\u3000ふおおおぉ～～っ<emoji=heart04><emoji=heart04>\u3000ディルド、グラインドしてヤバぁっ<emoji=heart04>\u3000こ、これ<emoji=heart04>\u3000おま○こ気持ちいいですぅっ<emoji=heart04><emoji=heart04>」"
translation = "「오오오옷!? 후오오오오~~옷<emoji=heart04><emoji=heart04> 딜도, 그라인드해서 대박이야앗<emoji=heart04> 이, 이거<emoji=heart04> 보지 기분 좋아요오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が押したのはディルドの『回転』ボタン。ディルドの先が本物のペニスではあり得ない角度で曲がって、グイングインと生き物のようにうごめいてアナの膣内をかき回す。"
translation = "내가 누른 것은 딜도의 『회전』 버튼. 딜도의 끝이 진짜 페니스로는 불가능한 각도로 꺾여서, 구잉구잉하며 생물처럼 꿈틀대며 아나의 질 내부를 휘저어 놓는다."

[[dialogue]]
speaker = "unk"
original = "膣内をぐちょぐちょに撫で回される感覚に、熱を帯びた肉壁が蕩けるようにうごめき、粘液をとろとろとあふれさせながらアナは快楽に打ち震えて甘い声を漏らす。"
translation = "질 내부를 질척질척하게 쓰다듬어지는 감각에, 열기를 띤 육벽이 녹아내리듯 꿈틀거리고, 점액을 걸쭉하게 흘려보내며 아나는 쾌락에 몸을 떨며 달콤한 목소리를 흘린다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふあああぁっ<emoji=heart04><emoji=heart04>\u3000おま○こぐりぐり、気持ちいいっ<emoji=heart04>\u3000魔王ディルドにおま○こナデナデされて、変になるぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04><emoji=heart04> 보지 슥슥, 기분 좋아앗<emoji=heart04> 마왕 딜도에게 보지 쓰담쓰담 당해서, 이상해져어~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナは興奮して堪らなくなったのか、自分でもお尻をいやらしく上下に振り始める。"
translation = "아나는 흥분해서 견딜 수 없게 되었는지, 스스로도 엉덩이를 야하게 위아래로 흔들기 시작한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はあぁっ<emoji=heart04>\u3000お、ぉおおぉぉおっ！\u3000おま○ことケツアナ<emoji=heart04>\u3000両方気持ち良くて、腰、勝手に動いちゃいますぅ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ぉほぉおおっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 오, 오오오오오옷! 보지랑 똥구멍<emoji=heart04> 양쪽 다 기분 좋아서, 허리, 멋대로 움직여버려요오<emoji=heart04> 오옷<emoji=heart04> 오옷<emoji=heart04> 오호오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「二穴両方挿れてるのに、自分で動いちゃうとか……アナは本当に淫乱だなっ」"
translation = "「두 구멍 다 넣고 있는데, 스스로 움직여버리다니…… 아나는 정말 음란하구나」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おほぉおっ<emoji=heart04>\u3000会長、ごめんなさいっ<emoji=heart04>\u3000ぉおおっ<emoji=heart04>\u3000気持ち良くなると、他のこと考えられなくなっちゃう淫乱天使でぇっ<emoji=heart04>」"
translation = "「오호오옷<emoji=heart04> 회장님, 죄송해요옷<emoji=heart04> 오오옷<emoji=heart04> 기분 좋아지면, 다른 건 생각할 수 없게 되어버리는 음란 천사라서어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長のこと、ケツアナで気持ちよくしなきゃいけないのに、ぉほぉおっ<emoji=heart04>\u3000１人で気持ちよくなってごめんなさいぃ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「회장님을, 똥꼬로 기분 좋게 해드려야 하는데, 오호오옷<emoji=heart04> 혼자서 기분 좋아져서 죄송해요오<emoji=heart04> 응으윽<emoji=heart04> 후우웃<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんな堪え性のない淫乱天使には、お仕置きが必要だなっ」"
translation = "「그렇게 참을성 없는 음란 천사에게는, 벌이 필요하겠군.」"

[[dialogue]]
speaker = "unk"
original = "俺はアナのおま○こから突き出たディルドの根元を掴むと、回転運動を続けるディルドを出し入れし始める。"
translation = "나는 아나의 보지에서 삐져나온 딜도의 뿌리 부분을 잡고, 회전 운동을 계속하는 딜도를 넣었다 뺐다 하기 시작했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ！？\u3000んおおおぉっ<emoji=heart04><emoji=heart04>\u3000グラインドしながらピストンされるのダメえぇ～～っ<emoji=heart04><emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ぉほおぉっ<emoji=heart04>\u3000おぉ、ぉぉおお～っ<emoji=heart04><emoji=heart04>」"
translation = "「오옷!? 응오오오옷<emoji=heart04><emoji=heart04> 그라인드 하면서 피스톤질 당하는 거 안 돼애애~~앗<emoji=heart04><emoji=heart04> 오옷<emoji=heart04> 오옷<emoji=heart04> 오호오옷<emoji=heart04> 오오, 오오오오~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がディルドを押し引きする度に、アナの腰が跳ね、太ももが小刻みに震える。熱く湿ったぬめりが溢れて手のひらに絡みつき、甘い喘ぎ声と水音が部屋に充満していく。"
translation = "내가 딜도를 밀고 당길 때마다, 아나의 허리가 튀어 오르고, 허벅지가 잘게 떨린다. 뜨겁고 습한 미끈거림이 넘쳐흘러 손바닥에 엉겨 붙고, 달콤한 신음 소리와 물소리가 방 안에 가득 찬다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これっ<emoji=heart04>\u3000ダメぇっ<emoji=heart04>\u3000気持ちよすぎますっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ぉおおっ<emoji=heart04>\u3000ふわぁあんっ<emoji=heart04><emoji=heart04>\u3000おま○こ、おかしくなっちゃうっ<emoji=heart04><emoji=heart04>\u3000おぉっ<emoji=heart04>\u3000んおおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「이거어<emoji=heart04> 안 돼앗<emoji=heart04> 너무 기분 좋아요옷<emoji=heart04> 오옷<emoji=heart04> 오오옷<emoji=heart04> 후와아앙앗<emoji=heart04><emoji=heart04> 보지, 이상해져 버려어엇<emoji=heart04><emoji=heart04> 오옷<emoji=heart04> 응오오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──アナと体を重ねるようになってから気づいたことだが、アナはエッチの最中、<b>強めの命令</b>を受けるとより興奮して悦ぶ傾向がある。"
translation = "──아나와 몸을 겹치게 된 이후로 깨달은 사실이지만, 아나는 섹스 도중, <b>강한</b> <b>명령</b>을 받으면 더욱 흥분해서 기뻐하는 경향이 있다."

[[dialogue]]
speaker = "unk"
original = "だから俺は、わざと強めの声色で命令する。"
translation = "그래서 나는, 일부러 강한 음색으로 명령한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に淫乱なマゾ天使だなっ。もっとおかしくなって見せろ！\u3000ほら、イけっ！」"
translation = "「정말 음란한 마조 천사로군. 더 이상해진 모습을 보여봐! 자, 가버려!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んぉっ<emoji=heart04>\u3000ぉおおっ<emoji=heart04>\u3000はいぃ<emoji=heart04>\u3000ありがとうございますぅ<emoji=heart04>\u3000イキますっ<emoji=heart04>\u3000会長、アナがイクとこ見てて下さいぃっ<emoji=heart04>\u3000ふおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응오옷<emoji=heart04> 오오옷<emoji=heart04> 네에에<emoji=heart04> 감사합니다아<emoji=heart04> 가버려요옷<emoji=heart04> 회장님, 아나가 가는 거 봐주세요오옷<emoji=heart04> 후오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さっさとイけ！\u3000ほら、イけっ！！」"
translation = "「빨리 가버려! 자, 가라고!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はいぃっ<emoji=heart04>\u3000おぉおっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04><emoji=heart04>\u3000イきますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「네에엣<emoji=heart04> 오오옷<emoji=heart04> 가요옷<emoji=heart04> 가버려 가버려엇<emoji=heart04><emoji=heart04> 가버려요오오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふおおぉおぉおぉおぉおおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오옷<emoji=heart04><emoji=heart04><emoji=heart04> 후오오오오오오오오오오오~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナの肢体は弓なりにしなり、絶頂の快楽に呑まれて小刻みに痙攣する。"
translation = "아나의 지체는 활처럼 휘어지고, 절정의 쾌락에 삼켜져 잘게 경련한다."

[[dialogue]]
speaker = "unk"
original = "俺はその瞬間、腰の動きを<b>わざと</b>緩める。だが、興奮が高まり切ったアナは、ケツアナの快楽を求めて腰を上下に振り始める。"
translation = "나는 그 순간, 허리의 움직임을 <b>일부러</b> 늦춘다. 하지만, 흥분이 극에 달한 아나는, 똥꼬의 쾌락을 갈구하며 허리를 상하로 흔들기 시작한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んっ――ふあああぁ～っ<emoji=heart04><emoji=heart04>\u3000イったのにまだ足りなくて、腰振り止まりません<emoji=heart04>\u3000ぉおっ<emoji=heart04>\u3000おぉおっ<emoji=heart04>\u3000んおぉおっ<emoji=heart04>\u3000ぉぉおお～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응윽――후아아아아~앗<emoji=heart04><emoji=heart04> 가버렸는데 아직 부족해서, 허리 흔드는 게 멈추지 않아요오<emoji=heart04> 오오옷<emoji=heart04> 오오오옷<emoji=heart04> 응오오옷<emoji=heart04> 오오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……偽物の魔王ディルドでイっちゃった癖に、まだ満足できないのか！？」"
translation = "「윽…… 가짜 마왕 딜도로 가버린 주제에, 아직도 만족 못 하는 거냐!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ご、ごめんなさぁい<emoji=heart04>\u3000おぉぉおっ<emoji=heart04>\u3000でもでもっ、本物の会長チ○ポでも、ちゃんとイかせて欲しいですぅ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んおおぉんっ<emoji=heart04>」"
translation = "「죄, 죄송해여어<emoji=heart04> 오오오옷<emoji=heart04> 하지만 하지만, 진짜 회장님 자지라도, 제대로 가게 해줬으면 좋겠어여어<emoji=heart04> 오옷<emoji=heart04> 오옷<emoji=heart04> 응오오옹<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちゃんと、っていうのは？」"
translation = "「제대로, 라는 건?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長のたくましくて熱い、本物の魔王チ○ポ<emoji=heart04>\u3000ケツアナ孕ませるような中出し大量射精してもらわないと、本気イキできないんですぅっ<emoji=heart04><emoji=heart04>\u3000──おぉ、ぉぉおお～っ<emoji=heart04><emoji=heart04>」"
translation = "「회장님의 늠름하고 뜨거운, 진짜 마왕 자지<emoji=heart04> 똥구멍 임신시킬 정도로 안에다 대량 사정해주지 않으면, 진심으로 못 간다구여어<emoji=heart04><emoji=heart04> ──오오, 오오오오~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だったらもっと腰を振って、中出ししたくなるようなおねだりしてみせろっ」"
translation = "「그렇다면 허리를 더 흔들어서, 질내사정 하고 싶어지게끔 졸라 봐라.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁいっ、会長ぉ<emoji=heart04>\u3000うぅん、<b>魔王様</b>ぁ<emoji=heart04>\u3000お、お願いしますぅ<emoji=heart04>\u3000淫乱でマゾ天使のアナを、もっともっと、快楽でバカにしてくださぁいっ<emoji=heart04><emoji=heart04>」"
translation = "「네에엣, 회장님<emoji=heart04> 으응, <b>마왕님</b><emoji=heart04> 부, 부탁드려여어<emoji=heart04> 음란하고 마조 천사인 아나를, 좀 더 좀 더, 쾌락으로 바보로 만들어주세여어잇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「たくましいおチ○ポ様で、アナのケツま○こ、ぐちゅぐちゅに犯してほしいのぉっ<emoji=heart04><emoji=heart04>\u3000アナ、魔王様専用の変態メス奴隷に堕ちたいんですぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「늠름한 자지님으로, 아나의 항문 보지, 구축구축하게 범해줬으면 좋겠어여어<emoji=heart04><emoji=heart04> 아나, 마왕님 전용 변태 암컷 노예로 타락하고 싶어여어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よし、なら――全力でイかせてやる！」"
translation = "「좋아, 그렇다면―― 전력으로 가게 해주마!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はいぃ<emoji=heart04>\u3000ありがとうございま――」"
translation = "「네에에<emoji=heart04> 감사합니――」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んおぉおおおっ！？？\u3000ぉ、ぉお、おぉお、ふぉおおぉおおぉおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오옷!?? 오, 오오, 오오오, 후오오오오오오오오오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が腰を激しく打ちつけ始めた瞬間、アナは堪えきれず歓喜の嬌声をほとばしらせた。"
translation = "내가 허리를 격렬하게 부딪치기 시작한 순간, 아나는 견디지 못하고 환희의 교성을 터뜨렸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「気持ちぃいっ<emoji=heart04>\u3000ああっ、おチ○ポ様、おチ○ポ様ぁ、おチ○ポ様～っ<emoji=heart04><emoji=heart04>\u3000お、ぉお、おぉお、んおぉおぉ～～っ！！」"
translation = "「기분 좋아아<emoji=heart04> 아앗, 자지님, 자지님, 자지님~잇<emoji=heart04><emoji=heart04> 오, 오오, 오오오, 응오오오오~~옷!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ケツま○この奥っ<emoji=heart04>\u3000気持ちいいところゾリゾリってぇ<emoji=heart04>\u3000全部ほじられてますぅ<emoji=heart04>\u3000おっ、んおぉおっ<emoji=heart04>\u3000ぉ、おぉおっ、おぉおっ<emoji=heart04>\u3000お、ぉお、ふおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「항문 보지 안쪽<emoji=heart04> 기분 좋은 곳을 드륵드륵하고<emoji=heart04> 전부 파헤쳐지고 있어여어<emoji=heart04> 오옷, 응오오옷<emoji=heart04> 오, 오오옷, 오오옷<emoji=heart04> 오, 오오, 후오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は深く突き入れてからわざと動きを緩めて、アナの喘ぎ声をじっくりと味わう。だが次の瞬間には、再び下から容赦なく突き上げ、熱く火照った腸壁をカリで擦り立てる。"
translation = "나는 깊숙이 찔러 넣은 뒤 일부러 움직임을 늦춰서, 아나의 신음 소리를 느긋하게 맛본다. 하지만 다음 순간에는, 다시 아래에서 가차 없이 치받으며, 뜨겁게 달아오른 장벽을 귀두로 문지른다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぁ、あ、あぁああぁっ<emoji=heart04><emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000やっぱり本物のおチ○ポ様すごぉいぃっ<emoji=heart04><emoji=heart04>」"
translation = "「아, 아, 아아아아앗<emoji=heart04><emoji=heart04> 아아아앗<emoji=heart04> 굉장해<emoji=heart04> 역시 진짜 자지님 굉장해여어어잇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「気持ちぃいっ<emoji=heart04>\u3000おチ○ポ様、気持ちいいですうぅ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おっ、おっ、ふおおぉっ<emoji=heart04>\u3000おっ、おっ、おっ、おっ、んおおぉおおっ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아아<emoji=heart04> 자지님, 기분 좋아여어어~~옷<emoji=heart04><emoji=heart04> 오옷, 오옷, 오옷, 후오오옷<emoji=heart04> 오옷, 오옷, 오옷, 오옷, 응오오오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……ディルドとどっちがいいんだっ？」"
translation = "「윽…… 딜도랑 어느 쪽이 더 좋으냐?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「魔王様っ、魔王様ですぅ<emoji=heart04>\u3000おぉおっ<emoji=heart04>\u3000本物のおチ○ポ様が圧倒的ぃ<emoji=heart04>\u3000おっ、おっ、おっ、ぉおおっ、ふおおぉおっ<emoji=heart04><emoji=heart04>」"
translation = "「마왕님, 마왕님이에요오<emoji=heart04> 오오옷<emoji=heart04> 진짜 자지님이 압도적이야아<emoji=heart04> 오, 오, 오, 오오옷, 후오오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おおぉっ<emoji=heart04><emoji=heart04>\u3000やばっ、イクっ<emoji=heart04>\u3000ケツま○こ、イキますっ<emoji=heart04><emoji=heart04>\u3000おっ、おっ、ふおおぉぉおぉぉおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오오옷<emoji=heart04><emoji=heart04> 대박, 가버려어<emoji=heart04> 똥꼬보지, 갑니다아<emoji=heart04><emoji=heart04> 오, 오, 후오오오오오오오오오~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度はアナルで絶頂したのだろう。肛門は痙攣するように俺のペニスを締め上げてくる。だが、俺は腰の動きを止めることなく律動を刻み続ける。"
translation = "이번에는 애널로 절정에 달한 것이리라. 항문은 경련하듯 내 페니스를 조여온다. 하지만, 나는 허리의 움직임을 멈추지 않고 율동을 계속 새겨넣는다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んあぁああぁぁあぁ～～っ<emoji=heart04><emoji=heart04>\u3000魔王様っ、ケツま○こしゅごいいぃぃっ<emoji=heart04><emoji=heart04>\u3000ぉ、ぉ、お、ぉ、ぉ、おっ<emoji=heart04>」"
translation = "「응아아아아아아아~~앗<emoji=heart04><emoji=heart04> 마왕님, 똥꼬보지 굉장해애애앳<emoji=heart04><emoji=heart04> 오, 오, 오, 오, 오, 옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「気持ちいぃっ<emoji=heart04>\u3000おチ○ポ様で幸せぇっ<emoji=heart04>\u3000ああああああっ、脳みそパチパチするぅ<emoji=heart04>\u3000気持ち良くて、しあわしぇ～～っ<emoji=heart04>」"
translation = "「기분 좋아아<emoji=heart04> 자지님 덕분에 행복해앳<emoji=heart04> 아아아아아앗, 뇌수가 파릿파릿해애<emoji=heart04> 기분 좋아서, 행보케에~~엣<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おおぉ、おっおっおっおっ<emoji=heart04><emoji=heart04>\u3000きもちぃっ<emoji=heart04>\u3000おおぉっ<emoji=heart04>\u3000幸せぇっ<emoji=heart04><emoji=heart04>\u3000ケツま○こ幸せ<emoji=heart04>\u3000おチ○ポ様でしあわしぇですぅっ<emoji=heart04><emoji=heart04>」"
translation = "「오오오, 오오오오<emoji=heart04><emoji=heart04> 기분 조아앗<emoji=heart04> 오오옷<emoji=heart04> 행복해앳<emoji=heart04><emoji=heart04> 똥꼬보지 행복해<emoji=heart04> 자지님 덕분에 행보케요오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "歓喜の嬌声を上げながら、アナの肢体は快楽の波に飲み込まれ、ぶるぶるとまた細かく震え始める。"
translation = "환희의 교성을 지르며, 아나의 사지는 쾌락의 파도에 휩쓸려, 부르르 다시 미세하게 떨리기 시작한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ<emoji=heart04>\u3000おおぉ、おっおっおっおっおっ？\u3000イクっ<emoji=heart04>\u3000またイクっ、イクイクイっクぅっ<emoji=heart04><emoji=heart04>」"
translation = "「오옷<emoji=heart04> 오오오, 오오오오오? 가버려어<emoji=heart04> 또 가, 가버려가버려가버렷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んおおぉおおぉぉぉおぉおおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오오오오오오오오오~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身を弓なりに反らせたまま、アナは再び絶頂に達し、痙攣する腸壁で俺のペニスを容赦なく締めつけてくる。"
translation = "몸을 활처럼 뒤로 젖힌 채, 아나는 다시 절정에 달해, 경련하는 장벽으로 내 페니스를 용서 없이 조여온다."

[[dialogue]]
speaker = "unk"
original = "その高ぶりをさらに焚きつけるように、俺は伸ばした手でディルドの根元を掴み、力強く抽送を開始した。"
translation = "그 고조를 더욱 부추기듯, 나는 뻗은 손으로 딜도의 뿌리를 잡고, 힘차게 추송을 개시했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あっ！？\u3000ふああああぁああぁぁあぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ディルドチ○ポっ<emoji=heart04>\u3000同時やばああぁ～～っ<emoji=heart04><emoji=heart04>\u3000ぉ、ぉお、おぉお、おぉぉお～っ！！」"
translation = "「앗!? 후아아아아아아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 딜도 자지잇<emoji=heart04> 동시공격 대바아악~~앗<emoji=heart04><emoji=heart04> 오, 오오, 오오오, 오오오오~옷!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「きもちぃっ<emoji=heart04>\u3000あぁああぁあっ<emoji=heart04>\u3000きもちぃですぅぅ<emoji=heart04>\u3000ああぁあっ<emoji=heart04>\u3000んぅ、おぉおおぉおっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おチ○ポ様ぁ<emoji=heart04>\u3000ケツま○こっ、きもちぃですぅっ<emoji=heart04><emoji=heart04>」"
translation = "「기분 조아앗<emoji=heart04> 아아아아앗<emoji=heart04> 기분 조아요오오<emoji=heart04> 아아아앗<emoji=heart04> 응으, 오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04> 자지님아<emoji=heart04> 똥꼬보지, 기분 조아요오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ありがとうございましゅっ<emoji=heart04>\u3000おぉおおっ<emoji=heart04>\u3000きもちぃぃっ<emoji=heart04><emoji=heart04>\u3000魔王しゃま、ありがとうございましゅう～～っ<emoji=heart04><emoji=heart04>」"
translation = "「고맙습니댜앗<emoji=heart04> 오오오옷<emoji=heart04> 기분 조아아앗<emoji=heart04><emoji=heart04> 마왕님, 고맙습니댜아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「大しゅきっ<emoji=heart04>\u3000魔王様<ruby>大好き<rt>だいしゅき</rt></ruby>れすぅ<emoji=heart04><emoji=heart04>\u3000うぅうぅおおおぉおっ<emoji=heart04>\u3000ケツま○こ、しあわしぇ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おっ、おっ、おんっ、んおおぉおっ<emoji=heart04><emoji=heart04>」"
translation = "「너무 죠아앗<emoji=heart04> 마왕님 너무 좋아해요<emoji=heart04><emoji=heart04> 우으우으오오오옷<emoji=heart04> 똥꼬보지, 행보케에~~엣<emoji=heart04><emoji=heart04> 오, 오, 오, 온, 응오오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……アナ！\u3000もうすぐイキそうだ、もっと腰を振れっ」"
translation = "「윽…… 아나! 이제 곧 갈 것 같아, 허리를 더 흔들어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はいぃっ、魔王しゃまぁっ<emoji=heart04>\u3000アナの腰振りっ、見ててくだしゃぁいっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000んぉおっ、おっおっおっおっ<emoji=heart04>\u3000ふおおぉおっ<emoji=heart04><emoji=heart04>」"
translation = "「하잇, 마왕님으으으윽<emoji=heart04> 아나의 허리 돌림, 봐주세에에욧<emoji=heart04> 아아앙<emoji=heart04> 응오옷, 옷옷옷옷<emoji=heart04> 후오오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナの腰が激しく上下に揺さぶられ、そのたびに<ruby>括約筋<rt>かつやくきん</rt></ruby>のきつい<ruby>環<rt>わ</rt></ruby>がペニスを根元まで擦り上げる。"
translation = "아나의 허리가 격렬하게 상하로 흔들리고, 그때마다 괄약근의 꽉 조이는 고리가 페니스를 뿌리까지 쓸어 올린다."

[[dialogue]]
speaker = "unk"
original = "腸内のヒダがうねりながら竿全体を絞り上げ、ぬめる熱に包まれた肉棒が、吸い尽くされるような快感に震えた。"
translation = "장내의 주름이 꿈틀거리며 성기 전체를 쥐어짜고, 미끈거리는 열기에 감싸인 육봉이 빨려 들어가는 듯한 쾌감에 떨렸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ<emoji=heart04>\u3000ふおおぉおぉっ<emoji=heart04><emoji=heart04>\u3000きましゅっ<emoji=heart04><emoji=heart04>\u3000ケツま○こ、大きいのきましゅうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오옷<emoji=heart04> 후오오오오옷<emoji=heart04><emoji=heart04> 와요옷<emoji=heart04><emoji=heart04> 똥꼬보지, 커다란 게 와요오오오~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しゅごいの両方くりゅっ<emoji=heart04>\u3000んぉっ、ほぉ、おおぉ、おっおっおっおっおっ<emoji=heart04><emoji=heart04>\u3000んおおおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「굉장한 거 양쪽 다 와아아앗<emoji=heart04> 응옷, 호오, 오오오, 옷옷옷옷옷<emoji=heart04><emoji=heart04> 응오오오오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「きたっ<emoji=heart04>\u3000おおきぃしゅごいのくりゅうぅぅ～っ<emoji=heart04><emoji=heart04>\u3000おぉおぉっ<emoji=heart04>\u3000んんぉっ、ぉ、ぉ、ぉおっ<emoji=heart04>\u3000ケツま○こイクっ<emoji=heart04><emoji=heart04>\u3000ふおおぉぉおおぉぉおぉぉ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「왔다앗<emoji=heart04> 크고 굉장한 게 와요오오오~옷<emoji=heart04><emoji=heart04> 오오오오옷<emoji=heart04> 응응옷, 오, 오, 오오옷<emoji=heart04> 똥꼬보지 가요옷<emoji=heart04><emoji=heart04> 후오오오오오오오오오오오오~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おぉおぉおおっ<emoji=heart04><emoji=heart04>\u3000イクっ、イクイクイクイクイグっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오오오오오오옷<emoji=heart04><emoji=heart04> 가요, 가가가가가 가버려어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナ、中に出すぞっ！！\u3000イけっ！！！」"
translation = "「아나, 안에 내보낸다!! 가버려!!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ひゃいぃっ<emoji=heart04>\u3000同時イキしましゅううぅ～～～っ<emoji=heart04><emoji=heart04>\u3000お゛お゛っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히야잇<emoji=heart04> 동시 사정해버려요오오오~~~옷<emoji=heart04><emoji=heart04> 오오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んお゛ぉおおぉおおおぉぉぉおお～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오오오오오오오오오오오오~~~~~~~~~~~~~~~~~옷<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は限界まで高ぶったペニスをアナの奥までに突き立て、溜め込んだ灼熱の欲望を一気に解き放つ。"
translation = "나는 한계까지 고조된 페니스를 아나의 깊숙한 곳까지 찔러 넣고, 쌓아두었던 작열하는 욕망을 단숨에 해방한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んおおおぉっ<emoji=heart04><emoji=heart04>\u3000おぉ、ぉぉおぉ、ふぉお゛お～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000魔王様の熱い精子で、連続イキしゅるうぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오옷<emoji=heart04><emoji=heart04> 오오, 오오오오, 후오오오오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04> 마왕님의 뜨거운 정액으로, 연속으로 가버려어어어~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精液がどくどくと注ぎ込まれる感覚に合わせて、アナの肢体は痙攣を繰り返し、甘い声が部屋いっぱいに響き渡る。"
translation = "정액이 울컥울컥 쏟아져 들어오는 감각에 맞춰 아나의 사지는 경련을 반복하고, 달콤한 목소리가 방 안 가득 울려 퍼진다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ<emoji=heart04><emoji=heart04>\u3000ふおおおぉ～～～っ<emoji=heart04><emoji=heart04>\u3000ケツま○こに中出し、気持ちぃですぅっ<emoji=heart04><emoji=heart04>\u3000あぁああっ、ありがとうございますぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 후오오오오~~옷<emoji=heart04><emoji=heart04> 뒷보지에 질내사정, 기분 좋아여어<emoji=heart04><emoji=heart04> 아아아앗, 감사합니다아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んはあぁ～っ<emoji=heart04><emoji=heart04>\u3000まだどぴゅどぴゅ続いて……あぁあぁっ、いっぱい出してもらえて、幸せぇ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응하아아~앗<emoji=heart04><emoji=heart04> 아직도 푸슉푸슉 계속돼서…… 아아아앗, 잔뜩 내보내 줘서, 행복해애……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は射精が終わってもしばらく腰を微かに揺らし、官能の余韻をゆっくりと味わってから、ペニスを引き抜く。"
translation = "나는 사정이 끝난 뒤에도 한동안 허리를 미세하게 흔들며, 관능의 여운을 천천히 맛본 뒤 페니스를 뽑아낸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んんぅっ……<emoji=heart04>\u3000はぁ……はぁっ<emoji=heart04>\u3000はふうぅ……<emoji=heart04>」"
translation = "「응응으읏……<emoji=heart04> 하아…… 하앗<emoji=heart04> 하후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナのおま○こから力が抜け、ディルドがゆっくりと抜け落ちた。"
translation = "아나의 보지에서 힘이 빠지고, 딜도가 천천히 빠져나왔다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はあぁ……ふぅぅ……<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000魔王様のおチ○ポ様と、ディルドの二穴セックス、想像以上にすごすぎましたぁ<emoji=heart04>」"
translation = "「하아아…… 후우우……<emoji=heart04> 하아앗<emoji=heart04> 마왕님의 자지님과 딜도의 이혈 섹스, 상상 이상으로 너무 굉장했어요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「気持ちよすぎて、何回絶頂したか、わかりません……<emoji=heart04><emoji=heart04>」"
translation = "「너무 기분 좋아서, 몇 번이나 절정했는지 모르겠어요……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナ、アナ。呼び方が魔王様のままになってるって……」"
translation = "「아나, 아나. 호칭이 계속 마왕님으로 되어 있다니까……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「どうしてですか、魔王様ぁ<emoji=heart04>\u3000アナは魔王様専用の、変態メス奴隷ですよぉ……<emoji=heart04>」"
translation = "「어째서인가요, 마왕님아<emoji=heart04> 아나는 마왕님 전용의 변태 암컷 노예예요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「淫乱なドＭ天使を飼う以上、責任持って、ちゃんとおチ○ポ様ケースにするべき<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「음란한 도M 천사를 기르는 이상, 책임지고 제대로 자지님 케이스로 삼아야 해요<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……このやろう」"
translation = "「윽…… 이 자식이」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000魔王様のスイッチが入った時のドＳな目、好き<emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 마왕님의 스위치가 켜졌을 때의 도S 같은 눈빛, 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……えへへへへへぇ<emoji=heart04>\u3000私のエッチなところも受け止めてくれる会長、本当に大好きです<emoji=heart04>」"
translation = "「……에헤헤헤헤헤헤<emoji=heart04> 저의 야한 부분도 받아주는 회장님, 정말 정말 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これからも淫乱ドＭ天使のアナのこと、いっぱいいっぱい、可愛がってくださいね<emoji=heart04>\u3000魔王様<emoji=heart04>」"
translation = "「앞으로도 음란 도M 천사인 아나를 잔뜩잔뜩 귀여워해 주세요<emoji=heart04> 마왕님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "性欲旺盛な恋人の可愛いおねだりに、俺はこれからも徹底的に彼女を快楽で躾け尽くすのだと、甘くも淫らに心に誓うのであった。"
translation = "성욕 왕성한 연인의 귀여운 조름에, 나는 앞으로도 철저하게 그녀를 쾌락으로 길들여 주겠노라고 달콤하면서도 음란하게 마음속으로 맹세했다."

