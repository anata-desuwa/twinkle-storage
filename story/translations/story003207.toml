[[dialogue]]
speaker = "シャロン"
original = "「ばたんきゅ～」"
translation = "「바탄큐~」"

[[dialogue]]
speaker = "unk"
original = "あっけなく撃破した……"
translation = "허무하게 격파했다……"

[[dialogue]]
speaker = "イレーナ"
original = "「２対１なのに真正面から挑んできたら、こっちが勝つに決まってるわよ」"
translation = "「2 대 1인데 정면으로 덤벼오면 우리가 이기는 게 당연하잖아」"

[[dialogue]]
speaker = "シャロン"
original = "「勝敗がわかりきっていても……女にはやらなきゃいけない時があるんですよぅ……」"
translation = "「승패가 뻔히 보여도…… 여자에겐 해야만 할 때가 있는 법이라구용……」"

[[dialogue]]
speaker = "イレーナ"
original = "「それ絶対今じゃないでしょ」"
translation = "「그거 절대 지금 아니거든」"

[[dialogue]]
speaker = "イレーナ"
original = "「まだ立ち上がるつもりなら、相手になるけど？\u3000何度やっても、あたしと会長のタッグには勝てっこないわよ？」"
translation = "「아직 일어날 생각이라면 상대해 주겠지만? 몇 번을 해도 나와 회장의 태그에는 이길 수 없다고?」"

[[dialogue]]
speaker = "シャロン"
original = "「そうですよね……２人の連携は完璧……相性抜群……私が付け入る隙なんてないですもんね……」"
translation = "「그렇죠…… 두 분의 연계는 완벽…… 궁합 최고…… 제가 끼어들 틈 따윈 없는 거군용……」"

[[dialogue]]
speaker = "イレーナ"
original = "「誤解されそうな言い回し、やめてくれる？\u3000あたしとこいつはそういうんじゃないから」"
translation = "「오해 살 만한 말투 좀 그만해줄래? 나랑 이 녀석은 그런 거 아니니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「それにあたしはね、チョコを渡すことを全否定してるんじゃないの。赤の他人に無理強いされて、チョコを渡すのがイヤなだけよ」"
translation = "「그리고 나는 말이야, 초코를 주는 걸 완전히 부정하는 게 아니야. 생판 남에게 억지로 강요받아서 초코를 주는 게 싫을 뿐이라고」"

[[dialogue]]
speaker = "シャロン"
original = "「つまり、時が来れば、イレーナさまもチョコをお渡しになる……と？」"
translation = "「즉, 때가 되면 이레이나 님도 초코를 주신다는…… 건가요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「まぁ……そうね、いつかそういう時も来るかもしれないわ。でも、それは少なくとも今じゃない」"
translation = "「뭐…… 그렇네, 언젠가 그런 때도 올지 모르지. 하지만 그건 적어도 지금은 아니야」"

[[dialogue]]
speaker = "イレーナ"
original = "「バレンタインのチョコってのはつまり……気持ちなわけでしょ？」"
translation = "「발렌타인 초코라는 건 결국…… 마음인 거잖아?」"

[[dialogue]]
speaker = "イレーナ"
original = "「それを他人に言われて渡すのって、自分の気持ちに人の気持ちが混ざるみたいで嫌じゃない？」"
translation = "「그걸 남이 시켜서 주는 건, 내 마음에 남의 마음이 섞이는 것 같아서 싫지 않겠어?」"

[[dialogue]]
speaker = "シャロン"
original = "「──ッ！！\u3000その通りです！\u3000わたしが間違っていました！」"
translation = "「──!! 그렇군요! 제가 틀렸었습니다!」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまはイレーナさまの意志でチョコを渡すべきです。私もウルスラさまをやっつけるのに協力します！」"
translation = "「이레이나 님은 이레이나 님의 의지로 초코를 주셔야 해요. 저도 우르술라 님을 해치우는 데 협력할게요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「うんうん。物分かりがよくて助かるわ」"
translation = "「응응. 말이 잘 통해서 다행이네」"

[[dialogue]]
speaker = "unk"
original = "シャロンの手のひらが高速回転している"
translation = "샤론의 태세 전환이 광속이다."

[[dialogue]]
speaker = "イレーナ"
original = "「──ってわけで、どこかで聞いてるんでしょ、ウルスラ！\u3000シャロンは取り返したわよ！」"
translation = "「──그런 이유로, 어디선가 듣고 있지, 우르술라! 샤론은 되찾았어!」"

[[dialogue]]
speaker = "ウルスラ"
original = "『残念です。シャロンさんとは分かり合えたと思っていたのに……』"
translation = "『유감이네요. 샤론 씨와는 마음이 통했다고 생각했는데……』"

[[dialogue]]
speaker = "シャロン"
original = "「ごめんなさい、ウルスラさま。でもやっぱり、ムリヤリっていうのは良くないですっ！」"
translation = "「죄송해요, 우르술라 님. 하지만 역시 억지로라는 건 좋지 않아요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんたを見つけて、みんなでボッコボコにしてあげるから、首を洗って待ってなさい！」"
translation = "「당신을 찾아내서 다 같이 박살을 내줄 테니까, 목 씻고 기다리고 있어!」"

[[dialogue]]
speaker = "ウルスラ"
original = "『あら、わざわざ見つけるのに労力を割いていただかなくても──』"
translation = "『어머, 굳이 찾아내느라 수고를 들이지 않으셔도──』"

[[dialogue]]
speaker = "ウルスラ"
original = "『私は大聖堂にいますので』"
translation = "『저는 대성당에 있으니까요』"

[[dialogue]]
speaker = "イレーナ"
original = "「居場所を教えてくれるなんて、余裕綽々じゃない」"
translation = "「거처를 알려주다니, 여유만만이네」"

[[dialogue]]
speaker = "ウルスラ"
original = "『はい。私、無敵ですから<emoji=heart04>』"
translation = "『네. 저, 무적이니까요<emoji=heart04>』"

[[dialogue]]
speaker = "ウルスラ"
original = "『チョコを渡すにせよ、私と戦うにせよ。心の準備は万全に整えてからいらしてくださいね』"
translation = "『초코를 주시든 저와 싸우시든. 마음의 준비를 만반히 갖추고 오세요』"

[[dialogue]]
speaker = "イレーナ"
original = "「癪に障るけど、探す手間が省けたわ。みんな、気を引き締めていくわよ！」"
translation = "「배알 꼴리지만 찾는 수고는 덜었네. 모두, 정신 바짝 차리고 가자고!」"

[[dialogue]]
speaker = "シャロン"
original = "「おーっ！」"
translation = "「오~!」"

[[dialogue]]
speaker = "シャロン"
original = "「で、イレーナさまは会長さま用のチョコをご用意されてるんですか？」"
translation = "「그래서, 이레이나 님은 회장님용 초코를 준비하셨나요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「そ、そんなこと、今はどうでもいいでしょ！\u3000とっとと大聖堂に行ってウルスラをぶちのめすわよ！」"
translation = "「그, 그런 건 지금 아무래도 좋잖아! 얼른 대성당에 가서 우르술라를 때려눕히자고!」"

[[dialogue]]
speaker = "unk"
original = "大聖堂の雰囲気は明らかにいつもと違っていた。"
translation = "대성당의 분위기는 명백히 평소와 달랐다."

[[dialogue]]
speaker = "シャロン"
original = "「ああっ……！\u3000大聖堂からウルスラさまの歪んだバレンタインの波動を感じます……！」"
translation = "「아앗……! 대성당에서 우르술라 님의 뒤틀린 발렌타인 파동이 느껴져요……!」"

[[dialogue]]
speaker = "イレーナ"
original = "「今更だけど、そのバレンタインの波動ってなんなの……？」"
translation = "「이제 와서 묻는 거지만, 그 발렌타인 파동이라는 게 대체 뭐야……?」"

[[dialogue]]
speaker = "ウルスラ"
original = "「ふふふ……あなたも感じてみれば理解できますよ」"
translation = "「후후후…… 당신도 직접 느껴보면 이해할 수 있을 거예요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「──！\u3000出たわね、ウルスラ！」"
translation = "「──! 나왔구나, 우르술라!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「ようこそ、イレーナさん。会長さんにチョコを渡す準備はできましたか？」"
translation = "「어서 오세요, 이레이나 씨. 회장님께 초코를 건넬 준비는 되셨나요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「くどいわね。渡さないって何度も言ってるでしょ」"
translation = "「끈질기네. 안 준다고 몇 번이나 말했잖아.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしたちの目的は、ただひとつ。あんたを叩きのめして、こんなバカげた空間から脱出することよ！」"
translation = "「우리 목적은 단 하나. 당신을 두들겨 패고, 이런 바보 같은 공간에서 탈출하는 거야!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「まあ。あのモンスターを一撃で倒した私の実力を見てなお、挑もうというのですか？」"
translation = "「어머나. 그 몬스터를 일격에 쓰러뜨린 제 실력을 보고도 도전하시겠다는 건가요?」"

[[dialogue]]
speaker = "ウルスラ"
original = "「勇気と無謀は紙一重。バレンタインデーの私は、ただの星騎士ではありませんよ？」"
translation = "「용기와 무모함은 종이 한 장 차이. 발렌타인 데이의 저는 평범한 성기사가 아니랍니다?」"

[[dialogue]]
speaker = "イレーナ"
original = "「はっ、もう勝ったつもり？\u3000油断してると足をすくわれるわよ？」"
translation = "「하, 벌써 이긴 줄 알아? 방심하다간 발목 잡힐걸?」"

[[dialogue]]
speaker = "ウルスラ"
original = "「うーん……実際に試してみないことにはご納得いただけないのでしょうか……」"
translation = "「으음…… 실제로 겪어보지 않고서는 납득하지 못하시는 걸까요……」"

[[dialogue]]
speaker = "ウルスラ"
original = "「では、しばらくの間、私はここに立っていますね」"
translation = "「그럼, 잠시 동안 저는 여기 서 있을게요.」"

[[dialogue]]
speaker = "ウルスラ"
original = "「一切反撃しませんので、全力で挑んでみてください。サービスタイムです<emoji=heart04>」"
translation = "「일절 반격하지 않을 테니, 전력으로 도전해 보세요. 서비스 타임이에요<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしと星徒会長相手に舐めプだなんていい度胸じゃない……！」"
translation = "「나랑 성도회장 상대로 날로 먹으려 들다니 배짱 한번 좋네……!」"

[[dialogue]]
speaker = "シャロン"
original = "「そうですよ！\u3000失礼しちゃいますっ！」"
translation = "「맞아요! 무례하다고요!」"

[[dialogue]]
speaker = "シャロン"
original = "「……ナメプってなんですか？\u3000ナメコのお友達ですか？」"
translation = "「……날로 먹는 게 뭔가요? 날로 먹는 회 친구인가요?」"

[[dialogue]]
speaker = "unk"
original = "舐めたプレイの略だよ"
translation = "상대를 얕보고 대충 플레이하는 걸 줄인 말이야."

[[dialogue]]
speaker = "シャロン"
original = "「なめた……プレイ……？\u3000お祈りでしょうか？」"
translation = "「얕보고…… 플레이……? 기도드리는 걸까요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「そっちの<ruby>ｐｒａｙ<rt>プレイ</rt></ruby>じゃないわよ！」"
translation = "「그쪽 pray가 아니야!」"

[[dialogue]]
speaker = "イレーナ"
original = "「要はあたしたちをおちょくってるってこと。後悔させてあげようじゃないっ……２人とも行くわよっ！」"
translation = "「요는 우리를 놀리고 있다는 소리야. 후회하게 해주자고…… 둘 다 가자!」"

