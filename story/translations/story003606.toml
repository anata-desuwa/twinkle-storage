[[dialogue]]
speaker = "unk"
original = "再び姿を現したエントロフィーと、戦闘を開始したサチとプリムラ。"
translation = "다시 모습을 드러낸 엔트로피와 전투를 개시한 사치와 프리뮬라."

[[dialogue]]
speaker = "サチ"
original = "「プリムラ、訓練通りに行くよ！」"
translation = "「프리뮬라, 훈련대로 가자!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ああ、構わん！\u3000サチ、全力でやるのじゃ！」"
translation = "「오냐, 상관없다! 사치, 전력으로 하는 것이니라!」"

[[dialogue]]
speaker = "unk"
original = "２人は視線を交わし――プリムラが武器を解除して、空いた手をサチと繋ぐ。"
translation = "두 사람은 시선을 교환하고―― 프리뮬라가 무기를 해제하고 빈손을 사치와 맞잡았다."

[[dialogue]]
speaker = "サチ"
original = "「せ～のっ！」"
translation = "「하나~ 둘!」"

[[dialogue]]
speaker = "プリムラ"
original = "「はああぁっ！！」"
translation = "「하아아앗!!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「さぁ～て、どんなもんすかね～！」"
translation = "「자~ 어디 얼마나 대단할지 보겠슴다~!」"

[[dialogue]]
speaker = "unk"
original = "手を繋いだまま２人はエントロフィーに突撃。サチが斧を振り下ろす。"
translation = "손을 잡은 채 두 사람은 엔트로피에게 돌격. 사치가 도끼를 내리친다."

[[dialogue]]
speaker = "unk"
original = "エントロフィーはそれを、マイナスエネルギーのフィールドで受け止めるが――"
translation = "엔트로피는 그것을 마이너스 에너지 필드로 받아내지만――"

[[dialogue]]
speaker = "エントロフィー"
original = "「！\u3000これは……！？」"
translation = "「! 이것은……!?」"

[[dialogue]]
speaker = "unk"
original = "エントロフィーのマイナスエネルギーが急に出力不調に陥ったように、揺らいで不安定になる。"
translation = "엔트로피의 마이너스 에너지가 갑자기 출력 부조에 빠진 것처럼 요동치며 불안정해진다."

[[dialogue]]
speaker = "サチ"
original = "（私の『不運を引き寄せる』能力を武器に込めることで――攻撃した相手にもアンラッキーを分け与える！）"
translation = "(내 『불운을 끌어당기는』 능력을 무기에 담는 것으로―― 공격한 상대에게도 언럭키를 나눠준다!)"

[[dialogue]]
speaker = "unk"
original = "揺らいだフィールドを斧が貫通し、エントロフィーは斬撃をくらって吹き飛ばされる。"
translation = "요동치는 필드를 도끼가 관통하고, 엔트로피는 참격을 맞고 튕겨 나간다."

[[dialogue]]
speaker = "エントロフィー"
original = "「くっ……面白いっすね～！」"
translation = "「큭…… 재미있슴다~!」"

[[dialogue]]
speaker = "プリムラ"
original = "「いいぞ！\u3000サチ、そのまま押すのじゃ！」"
translation = "「좋다! 사치, 그대로 밀어붙이거라!」"

[[dialogue]]
speaker = "プリムラ"
original = "（我の『放出供給』の能力は、あらゆるエネルギーを相手に合わせて最適化し、供給することができる――）"
translation = "(짐의 『방출 공급』 능력은 모든 에너지를 상대에 맞춰 최적화하여 공급할 수 있다――)"

[[dialogue]]
speaker = "プリムラ"
original = "（故に、サチと手を繋ぐことによって、サチに必要な『幸運』を供給し、『不運』のデメリットを打ち消しているのじゃ！）"
translation = "(고로 사치와 손을 잡음으로써 사치에게 필요한 『행운』을 공급하고 『불운』의 디메리트를 상쇄하고 있는 것이니라!)"

[[dialogue]]
speaker = "サチ"
original = "（私１人では、扱いきれない破滅的な能力……でも、こうして仲間の力と合わされば――！）"
translation = "(나 혼자서는 다룰 수 없는 파멸적인 능력…… 하지만 이렇게 동료의 힘과 합쳐진다면――!)"

[[dialogue]]
speaker = "サチ"
original = "「アンラッキー・テンペストッ！！」"
translation = "「언럭키 템페스트!!」"

[[dialogue]]
speaker = "unk"
original = "サチが斧を薙ぎ払い、『不運』の力で荒れ狂う暴風のような衝撃波を炸裂させる。"
translation = "사치가 도끼를 휘두르자, 『불운』의 힘으로 몰아치는 폭풍 같은 충격파가 작렬한다."

[[dialogue]]
speaker = "エントロフィーL"
original = "「うおおおぉっ！？\u3000くっ……きゃはははっ！\u3000面白いっす！！\u3000魔法少女、いいじゃないっすか！！！」"
translation = "「우오오오옷!? 큭…… 캬하하핫! 재미있슴다!! 마법 소녀, 좋지 않슴까!!!」"

[[dialogue]]
speaker = "unk"
original = "防御フィールドをかき消され、吹き飛ばされながらも、狂喜の笑い声を上げるエントロフィー。"
translation = "방어 필드가 지워지고 튕겨 나가면서도 광기 어린 웃음소리를 내는 엔트로피."

[[dialogue]]
speaker = "シズハ"
original = "「サチちゃん！\u3000プリムラちゃん！\u3000トレジアンナさん！\u3000大丈夫！？」"
translation = "「사치짱! 프리뮬라짱! 트레지안나 씨! 괜찮아!?」"

[[dialogue]]
speaker = "unk"
original = "そこへシズハたちが駆け付ける。"
translation = "그곳에 시즈하 일행이 도착한다."

[[dialogue]]
speaker = "unk"
original = "状況は！？"
translation = "상황은!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「みなさん、お待ちしてました！\u3000今のところ、サチさんとプリムラさんが押してます！」"
translation = "「여러분, 기다리고 있었습니다! 현재로서는 사치 씨와 프리뮬라 씨가 밀어붙이고 있어요!」"

[[dialogue]]
speaker = "シズハ"
original = "「通信が妨害されてなくて、よかった……！」"
translation = "「통신이 방해받지 않아서 다행이야……!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや……おそらくエントロフィーさんが意図したものでしょう。調べてみましたが、仮想空間から脱出できないように『封鎖術式』が張られています」"
translation = "「아니오…… 아마 엔트로피 씨가 의도한 것이겠죠. 조사해 보니 가상 공간에서 탈출하지 못하도록 『봉쇄 술식』이 펼쳐져 있습니다」"

[[dialogue]]
speaker = "ディーラック"
original = "「だろうね。仮想空間全体が強力なマイナスエネルギーの気配で満ちてるよ」"
translation = "「그렇겠지. 가상 공간 전체가 강력한 마이너스 에너지의 기척으로 가득해」"

[[dialogue]]
speaker = "エントロフィー"
original = "「きゃはははっ♪\u3000その通りっす！\u3000アネさんたちに逃げられちゃうと面白くないんで、出られないようにさせてもらいました～」"
translation = "「캬하하핫♪ 맞슴다! 누님들이 도망가 버리면 재미없으니까 못 나가게 만들었슴다~」"

[[dialogue]]
speaker = "エントロフィー"
original = "「あっ、ちなみに、ここで受けるダメージは現実でも反映されるような変更もしといたんで♪」"
translation = "「앗, 참고로 여기서 받는 데미지는 현실에서도 반영되도록 변경도 해뒀슴다♪」"

[[dialogue]]
speaker = "エントロフィー"
original = "「負けたら死ぬかもって緊張感があった方が、やっぱり面白いでしょ～？\u3000きゃははははっ☆」"
translation = "「지면 죽을지도 모른다는 긴장감이 있어야 역시 재미있지 않겠슴까~? 캬하하하하☆」"

[[dialogue]]
speaker = "エントロフィー"
original = "「――さて、魔法少女のアネさんたちが全員揃ったところで、ここからが本番っすよ♪」"
translation = "「――자, 마법 소녀 누님들이 전부 모였으니 이제부터가 본게임임다♪」"

[[dialogue]]
speaker = "unk"
original = "エントロフィーは向かってくるサチとプリムラの方に手をかざして、告げる。"
translation = "엔트로피는 다가오는 사치와 프리뮬라 쪽으로 손을 뻗으며 고한다."

[[dialogue]]
speaker = "エントロフィーL"
original = "「精神――反転☆」"
translation = "「정신―― 반전☆」"

[[dialogue]]
speaker = "サチ"
original = "「なっ……！？\u3000この感覚は……体が光って……！」"
translation = "「나……!? 이 감각은…… 몸이 빛나고……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「いかん！\u3000精神が暴走してしまう時のやつじゃ……！」"
translation = "「안 된다! 정신이 폭주할 때의 그것이니라……!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「触れられていないのにどうして……いや、既に１回触れられているから……！？」"
translation = "「닿지 않았는데 어떻게…… 아니, 이미 한 번 닿았었기 때문에……!?」"

[[dialogue]]
speaker = "エントロフィー"
original = "「ふふふっ、反転のロストアイテム、マジで凶悪な力っすよね～♪」"
translation = "「후후후, 반전의 로스트 아이템, 진짜 흉악한 힘이지 않슴까~♪」"

[[dialogue]]
speaker = "エントロフィー"
original = "「１回タッチしちゃえば、呪いにかかったように、こんな風にいつでも強制的に暴走、そして――」"
translation = "「한 번 터치하면 저주에 걸린 것처럼 이렇게 언제든 강제로 폭주, 그리고――」"

[[dialogue]]
speaker = "エントロフィー"
original = "「敵と味方の判別までも、反転させられちゃうんすから！」"
translation = "「적과 아군의 판별까지도 반전되어 버리니까요!」"

[[dialogue]]
speaker = "プリムラ"
original = "「……ばぶぅ♪」"
translation = "「……바부우♪」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ、お兄さん、また遊べますね<emoji=heart04>」"
translation = "「후훗, 오빠, 또 놀 수 있겠네요<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
original = "「そんな……２人共……！」"
translation = "「말도 안 돼…… 두 사람 다……!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「じゃあ、サチのアネさんとプリムラのアネさんは、こっちチームってことで、よろしくお願いしますね～♪」"
translation = "「그럼 사치 누님이랑 프리뮬라 누님은 이쪽 팀인 걸로, 잘 부탁드림다~♪」"

[[dialogue]]
speaker = "サチ"
original = "「はい。行きますよ――お兄さん♪」"
translation = "「네. 갈게요―― 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "サチが俺に攻撃を仕掛けてくる。"
translation = "사치가 나에게 공격을 시도해온다."

[[dialogue]]
speaker = "unk"
original = "サチ！\u3000しっかりしろ！"
translation = "사치! 정신 차려!"

[[dialogue]]
speaker = "サチ"
original = "「ごめんなさい。お兄さんとは、今は<b>敵同士</b>なので<emoji=heart04>」"
translation = "「죄송해요. 오빠하고는 지금 <b>적</b>이니까요<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「あぁ～いっ<emoji=heart04>\u3000アンナママぁ～<emoji=heart04>\u3000あそんで～っ♪」"
translation = "「아아~이<emoji=heart04> 안나 마마아~<emoji=heart04> 놀아줘어~♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あ、赤ちゃん化してるプリムラさんとは、さすがに戦いづらいです……！\u3000反転のロストアイテム、まさかここまでとは……！」"
translation = "「아, 아기화된 프리뮬라 씨와는 역시 싸우기 힘드네요……! 반전의 로스트 아이템, 설마 이 정도일 줄이야……!」"

[[dialogue]]
speaker = "エントロフィーL"
original = "「じゃあウチは、シズハのアネさんに相手をお願いしましょうかね～♪」"
translation = "「그럼 우리는 시즈하 누님을 상대해 볼까요~♪」"

[[dialogue]]
speaker = "シズハ"
original = "「……ディーちゃん、やるよ！」"
translation = "「……디짱, 하는 거야!」"

[[dialogue]]
speaker = "ディーラック"
original = "「ああ、わかってるよ。さすがにここは本気でやらなきゃ……マズそうだからね！」"
translation = "「그래, 알고 있어. 여긴 정말로 진심으로 하지 않으면…… 위험할 것 같으니까!」"

[[dialogue]]
speaker = "エントロフィー"
original = "「ふふっ♪\u3000１回でもタッチされたらアウトの鬼ごっこ、どこまで逃げられるっすかね～？」"
translation = "「후훗♪ 한 번이라도 터치당하면 아웃인 술래잡기, 어디까지 도망갈 수 있을까용~?」"

[[dialogue]]
speaker = "エントロフィー"
original = "「もちろん、鬼役はウチってことで――」"
translation = "「물론 술래는 저인 걸로――」"

[[dialogue]]
speaker = "unk"
original = "そう言って大きく口を開け、砂時計――『反転のロストアイテム』を飲み込むエントロフィー。"
translation = "그렇게 말하며 입을 크게 벌려 모래시계―― 『반전의 로스트 아이템』을 삼키는 엔트로피."

[[dialogue]]
speaker = "エントロフィーL"
original = "「あ～ん<emoji=heart04>\u3000……ごっくん☆」"
translation = "「아~앙<emoji=heart04> ……꿀꺽☆」"

[[dialogue]]
speaker = "エントロフィー"
original = "「ふふっ……これがウチの戦闘形態っす♪\u3000どうっすか～？」"
translation = "「후훗…… 이것이 저의 전투 형태임다♪ 어떻슴까~?」"

[[dialogue]]
speaker = "unk"
original = "こうして、暴走したサチとプリムラ、変身したエントロフィーとの乱戦が始まるのだった。"
translation = "이렇게 폭주한 사치와 프리뮬라, 변신한 엔트로피와의 난전이 시작되었다."

