[[dialogue]]
speaker = "unk"
original = "俺とマリオンさんがコラプサーの首領──百目騎レイラと対峙する。"
translation = "나와 마리온 씨가 콜랩서의 수령── 도메키 레이라와 대치한다."

[[dialogue]]
speaker = "unk"
original = "しかしレイラはマリオンさんに視線を向けず、言い捨てるように告げる。"
translation = "하지만 레이라는 마리온 씨에게 시선을 주지 않고 내뱉듯 고한다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔女の方、あなたは通っていただいてかまいません。あなたに用はありませんので」"
translation = "「마녀분, 당신은 지나가셔도 상관없습니다. 당신에게는 용건이 없으니까요.」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「おや、そうでしたか。ではお言葉に甘えましょう。……会長様、私は先に参ります。人形たちを残しますから、うまく使ってください」"
translation = "「오야, 그랬나요. 그럼 호의를 받아들이죠. ……회장님, 저는 먼저 가보겠습니다. 인형들을 남겨둘 테니 잘 활용해 주세요.」"

[[dialogue]]
speaker = "unk"
original = "マリオンが優雅に一礼し、駆けていく。宣言通り、レイラに動きはない。"
translation = "마리온이 우아하게 일례하고 달려 나간다. 선언대로 레이라에게 움직임은 없다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さん、先ほどの攻撃は警告です。魔王の力を十全に使えないあなたでは、私には敵いません。諦めてくださ……」"
translation = "「마왕님, 방금 공격은 경고입니다. 마왕의 힘을 온전히 쓰지 못하는 당신으로는 저를 이길 수 없습니다. 포기하세……」"

[[dialogue]]
speaker = "？？？"
original = "「セルフフォメーション！！」"
translation = "「셀프 포메이션!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「く──！？\u3000あなたは行ったはずじゃ！？\u3000しかもたくさん！？」"
translation = "「윽──!? 당신은 갔을 텐데!? 게다가 잔뜩!?」"

[[dialogue]]
speaker = "unk"
original = "マリオンは通称『旅団の魔女』。自身の複製人形を何体も生み出し、物量で制圧する戦法を得意としている。秋葉原を包囲していた人形がこちらに合流してくれたようだ。"
translation = "마리온은 통칭 『여단의 마녀』. 자신의 복제 인형을 여러 구 만들어 물량으로 제압하는 전술을 장기로 삼고 있다. 아키하바라를 포위하고 있던 인형들이 이쪽으로 합류해 준 모양이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「同じ顔がいくつも……不気味な能力ですね。潰れなさい、エルゴフォースブラスター！」"
translation = "「똑같은 얼굴이 여러 개…… 기분 나쁜 능력이군요. 찌그러지세요, 에르고 포스 블래스터!」"

[[dialogue]]
speaker = "unk"
original = "レイラの手から放たれた黒い球体が、マリオンの人形数体を飲み込み、瞬時に消滅させた。"
translation = "레이라의 손에서 뿜어져 나온 검은 구체가 마리온의 인형 여러 구를 삼켜 순식간에 소멸시켰다."

[[dialogue]]
speaker = "unk"
original = "単純な威力なら、今まで見てきた星術の中でも群を抜いている。"
translation = "단순한 위력이라면 지금까지 봐온 성술 중에서도 발군이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「コラプサーはブラックホールと契約し、負の星力を得ています。けれど私はそれだけでなく、星術でブラックホールを生み出すことができます」"
translation = "「콜랩서는 블랙홀과 계약해 부의 성력을 얻습니다. 하지만 저는 그뿐만 아니라 성술로 블랙홀을 만들어낼 수 있죠.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あなたの相手はブラックホールそのもの。それでも、戦いますか？」"
translation = "「당신의 상대는 블랙홀 그 자체. 그래도 싸우겠습니까?」"

[[dialogue]]
speaker = "unk"
original = "戦う。コハルコさんを助けるために"
translation = "싸우겠어. 코하루코 씨를 구하기 위해"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……分かりました。それでも私の目的を遂げます。魔王を倒し、世界を救い……私たちコラプサーは『英雄』になります」"
translation = "「……알겠습니다. 그래도 제 목적을 이룰 겁니다. 마왕을 쓰러뜨리고 세계를 구해…… 우리 콜랩서는 『영웅』이 되겠습니다.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ブラックホール・ディバウアー！」"
translation = "「블랙홀 디바우어!」"

[[dialogue]]
speaker = "unk"
original = "次々にマリオンの人形たちが集まってくるが、ブラックホールに消されていく。"
translation = "차례차례 마리온의 인형들이 모여들지만 블랙홀에 지워져 간다."

[[dialogue]]
speaker = "unk"
original = "なら俺が──！"
translation = "그렇다면 내가──!"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「無駄です！」"
translation = "「무모합니다!」"

[[dialogue]]
speaker = "unk"
original = "俺の攻撃はレイラには届かない。命中しているはずだが、やはりコラプサーの特性で打ち消されてしまう。"
translation = "내 공격은 레이라에게 닿지 않는다. 명중했을 터인데 역시 콜랩서의 특성으로 상쇄되어 버린다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あなたが攻撃する分には好都合です。私たちコラプサーは星力を吸収できますから」"
translation = "「당신이 공격하는 건 제게 안성맞춤입니다. 우리 콜랩서는 성력을 흡수할 수 있으니까요.」"

[[dialogue]]
speaker = "unk"
original = "それなら──"
translation = "그렇다면──"

[[dialogue]]
speaker = "unk"
original = "ユニゾン！"
translation = "유니존!"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「会長様の力、受け取りました──セルフディヴィジョン！！」"
translation = "「회장님의 힘, 받았습니다── 셀프 디비전!!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「きゃああああああっ！！」"
translation = "「꺄아아아아악!!」"

[[dialogue]]
speaker = "unk"
original = "例え星力でも、魔力と重ねればコラプサーにも届くはず。俺の読み通り、レイラが大きく吹き飛ぶ。"
translation = "설령 성력이라도 마력과 겹치면 콜랩서에게도 닿을 터. 내 예상대로 레이라가 크게 날아간다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……こんな手があるなんて。さすが歴戦の星騎士です。けれど、私も負けるわけにはいきません！」"
translation = "「……이런 수단이 있을 줄이야. 역시 역전의 성기사군요. 하지만 저도 질 수는 없습니다!」"

[[dialogue]]
speaker = "unk"
original = "レイラの手から、先ほどまでと同じように黒い球体が発生する。だが、それだけではない。"
translation = "레이라의 손에서 아까와 마찬가지로 검은 구체가 발생한다. 하지만 그뿐만이 아니다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「使いたくありませんでしたが……仕方ありません。これが私の切り札です。全てを無に帰す闇よ！」"
translation = "「쓰고 싶지 않았지만…… 어쩔 수 없군요. 이것이 제 필살기입니다. 모든 것을 무로 돌리는 어둠이여!」"

[[dialogue]]
speaker = "unk"
original = "黒い球体──ブラックホールが風船のように膨らんでいく。その大きさは今までの比ではない。"
translation = "검은 구체── 블랙홀이 풍선처럼 부풀어 오른다. 그 크기는 지금까지와 비할 바가 아니다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……もう一度聞きます。降伏する気はありませんか？\u3000私には、魔王を降した事実があればいいのです。何もあなたの命を奪う必要はありません」"
translation = "「……다시 한번 묻겠습니다. 항복할 생각은 없나요? 저는 마왕을 굴복시켰다는 사실만 있으면 됩니다. 굳이 당신의 목숨을 앗아갈 필요는 없어요.」"

[[dialogue]]
speaker = "unk"
original = "君こそ、どうしてこんなことを？"
translation = "너야말로 어째서 이런 짓을?"

[[dialogue]]
speaker = "unk"
original = "英雄になりたい。それ自体は珍しくない願いだが、そのために他者を犠牲にするのは常軌を逸している。"
translation = "영웅이 되고 싶다. 그 자체는 흔한 소망이지만 그러기 위해 타인을 희생시키는 것은 상궤를 벗어나 있다."

[[dialogue]]
speaker = "unk"
original = "彼女が進んでそんなことをする人間には見えない。現に、こうして降伏の選択肢を与え、命を奪うことを躊躇している。"
translation = "그녀가 발 벗고 그런 짓을 할 사람으로는 보이지 않는다. 실제로 이렇게 항복의 선택지를 주고 목숨을 앗아가는 것을 주저하고 있다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私にはこれしかないんです。運命に選ばれたあなたには分からないでしょう。……私だって欲しかった。百目騎の名に恥じない力が。世界を救う使命だって」"
translation = "「제게는 이것밖에 없단 말이에요. 운명에 선택받은 당신은 모르겠죠. ……나도 갖고 싶었어. 도메키의 이름에 부끄럽지 않은 힘이. 세계를 구하는 사명도.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……お父様も、お母様ももういない。大好きだったふたりに、もう報いることはできない！\u3000だから、せめて私は『英雄』になって、百目騎の名をこの世界に刻むんです！」"
translation = "「……아버님도 어머님도 이제 안 계셔. 정말 좋아했던 두 분께 이제 보답할 수 없단 말이야! 그러니까 적어도 나는 『영웅』이 되어서 도메키의 이름을 이 세계에 새기겠어!」"

[[dialogue]]
speaker = "unk"
original = "──そうか。君は両親に褒めてほしかったんだ"
translation = "──그렇구나. 너는 부모님께 칭찬받고 싶었구나"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……え？」"
translation = "「……에?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「褒めて……欲しかった……？\u3000そんな、子どもみたいな、こと……」"
translation = "「칭찬…… 받고 싶었다……? 그런, 어린애 같은 소릴……」"

[[dialogue]]
speaker_original = "レイラ父"
speaker_translation = "레이라 아빠"
original = "「すごいぞ、レイラ。もうこんなにプログラムが書けるようになったんだね」"
translation = "「대단하구나, 레이라. 벌써 이렇게 프로그램을 짤 수 있게 되었구나.」"

[[dialogue]]
speaker_original = "レイラ母"
speaker_translation = "레이라 엄마"
original = "「さすが百目騎の、私たちの娘だわ。これからも優しいあなたでいてね」"
translation = "「역시 도메키의, 우리 딸이야. 앞으로도 상냥한 너로 있어 주렴.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（お父様もお母様も、ほんの小さなことでもよく褒めてくれた。喜んでくれた）"
translation = "（아버님도 어머님도 아주 사소한 일이라도 자주 칭찬해 주셨어. 기뻐해 주셨지.）"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（そうだ。私はふたりに笑って欲しかった）"
translation = "（그래. 나는 두 분이 웃어주시길 바랐어.）"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（それが叶わなかったから、両親が大切にしていた百目騎という家を、名前を、価値あるものにしようとしたんだ）"
translation = "（그게 이루어질 수 없게 되었으니까, 부모님이 소중히 여기셨던 도메키라는 가문을, 이름을, 가치 있는 것으로 만들려 했던 거야.）"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（──今の私を、両親は褒めてくれるだろうか？）"
translation = "（──지금의 나를 부모님이 칭찬해 주실까?）"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（世界をよりよくする。それがふたりの願い。でも、誰かを犠牲にしてよくなった世界なんて、お父様もお母様も認めない。認めたとしても、そんな両親を私は認めない）"
translation = "（세계를 더 좋게 만든다. 그것이 두 분의 소원. 하지만 누군가를 희생시켜서 좋아진 세계 따위 아버님도 어머님도 인정하지 않으셔. 설령 인정하신다 해도 그런 부모님을 내가 인정하지 않아.）"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……あ、ああああ、あああああっ！」"
translation = "「……아, 아아아아, 아아아아악!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私は……私は……道を間違えて……」"
translation = "「나는…… 나는…… 길을 잘못 들어서……」"

[[dialogue]]
speaker = "unk"
original = "レイラの嗚咽とともにブラックホールが小さくなり、やがて消えていく。"
translation = "레이라의 오열과 함께 블랙홀이 작아지더니 이내 사라져 간다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お父様、お母様……ごめんなさい」"
translation = "「아버님, 어머님…… 죄송해요.」"

