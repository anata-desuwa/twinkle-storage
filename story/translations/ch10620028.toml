[[dialogue]]
speaker = "unk"
original = "とある休日。"
translation = "어느 휴일."

[[dialogue]]
speaker = "unk"
original = "俺は恋人のジュエリーと、リゾート結界のプライベートビーチにやって来ていた。"
translation = "나는 연인인 쥬얼리와, 리조트 결계의 프라이빗 비치에 와 있었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「そ～っと……」"
translation = "「사~알짝……」"

[[dialogue]]
speaker = "unk"
original = "彼女はおもむろに、日傘の影から手を出すと――"
translation = "그녀는 느닷없이, 양산의 그림자에서 손을 내밀더니――"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「おおっ！\u3000すごい！」"
translation = "「오옷! 대단해!」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「助手の言っていた通り、本当に日の光を浴びても痛くない！\u3000むしろ心地良い暖かさだ♪」"
translation = "「조수가 말한 대로, 정말 햇빛을 받아도 아프지 않아! 오히려 기분 좋은 따뜻함이야♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふふっ♪\u3000あははっ♪」"
translation = "「후훗♪ 아하핫♪」"

[[dialogue]]
speaker = "unk"
original = "日傘をどけて常夏の太陽を見上げながら、嬉しそうにくるくると回って、はしゃぐジュエリー。"
translation = "양산을 치우고 한여름의 태양을 올려다보며, 기쁜 듯이 빙글빙글 돌며 들떠있는 쥬얼리."

[[dialogue]]
speaker = "unk"
original = "リゾート結界は、結界の主であるリップルの設定次第で紫外線をカットすることが可能だという。"
translation = "리조트 결계는, 결계의 주인인 리플의 설정에 따라 자외선을 차단하는 것이 가능하다고 한다."

[[dialogue]]
speaker = "unk"
original = "俺からそのことを聞いたジュエリーが、是非試してみたいと言い出して、本日遊びに来たというわけである。"
translation = "나에게 그 소리를 들은 쥬얼리가, 꼭 시험해 보고 싶다고 말해서, 오늘 놀러 오게 된 것이다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふふふっ♪\u3000これはいい♪\u3000今までにないくらい開放的な気分だよ♪」"
translation = "「후후후♪ 이거 좋아♪ 지금까지 없었을 정도로 개방적인 기분이야♪」"

[[dialogue]]
speaker = "クロト"
original = "「喜んでもらえて何よりだ」"
translation = "「기뻐해 주니 무엇보다 다행이야」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「……！\u3000そうだ。いいことを思いついたぞ」"
translation = "「……! 맞아. 좋은 게 생각났다」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「なぁ助手？\u3000このプライベートビーチは今日、私たちの貸しきりで、他に誰も来ないと言っていただろう？」"
translation = "「저기 조수? 이 프라이빗 비치는 오늘, 우리들의 대절이고, 다른 누구도 오지 않는다고 했었지?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「なら――」"
translation = "「그렇다면――」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺に近付くと、耳元で囁く。"
translation = "그녀는 나에게 다가오더니, 귓가에서 속삭인다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「この開放的なロケーションの中で、エッチとか……どうだい？」"
translation = "「이 개방적인 로케이션 속에서, 야한 짓이라든가…… 어떠니?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「いわゆる、『青姦エッチ』だ<emoji=heart04>\u3000青空の下、見晴らしのいい場所で、最愛の人と睦みあったらどんな風になってしまうのか……とても好奇心が疼く<emoji=heart04>」"
translation = "「이른바, 『노출 섹스』야<emoji=heart04> 푸른 하늘 아래, 전망 좋은 곳에서, 가장 사랑하는 사람과 정을 나누면 어떤 기분이 되어버릴지…… 너무나 호기심이 자극돼<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「もちろん私の体では、しようと思ってできるものではないが──この場所なら、それも可能なんだろう？」"
translation = "「물론 내 몸으로는, 하려고 생각해서 할 수 있는 게 아니지만── 이곳이라면, 그것도 가능하겠지?」"

[[dialogue]]
speaker = "クロト"
original = "「……正直、期待してなかったと言ったら嘘になる」"
translation = "「……솔직히, 기대하지 않았다고 한다면 거짓말이겠네」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふふっ<emoji=heart04>\u3000決まりだね<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 결정됐네<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「じゃあ……」"
translation = "「그럼……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ん……<emoji=heart04>」"
translation = "「음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そっと唇を差し出してくる彼女に、俺はキスをする。"
translation = "살며시 입술을 내미는 그녀에게, 나는 키스를 한다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「음……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ちゅっ<emoji=heart04>\u3000ちゅむっ……ちゅぷっ、ちゅぷぷっ<emoji=heart04>\u3000ちゅれるっ……ちゅるるっ、れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅっ……ちゅうぅっ……ちゅぱっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 츕……츕, 츄릅<emoji=heart04> 츄르릅……츄르르, 낼름낼름<emoji=heart04> 레로쪽<emoji=heart04> 쪽……쪼오옥……츄파<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「んっ……はあぁぁ<emoji=heart04>\u3000キス、気持ちいいな……<emoji=heart04>」"
translation = "「응……하아아<emoji=heart04> 키스, 기분 좋구나……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「足の力が抜けてしまったよ……<emoji=heart04>」"
translation = "「다리에 힘이 빠져 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはビーチチェアーのところまで移動して――"
translation = "그러고 나서, 우리들은 비치 체어가 있는 곳까지 이동해서――"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「하아……후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "日傘をしまったジュエリーの白い肌が、明るい日差しの下にさらけ出される。"
translation = "양산을 치운 쥬얼리의 하얀 피부가, 밝은 햇살 아래에 노출된다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ<emoji=heart04>\u3000すごく開放的だ……♪」"
translation = "「후훗<emoji=heart04> 굉장히 개방적이야……♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だ、誰もいないとわかっていても……はぁぁ<emoji=heart04>\u3000外でおっぱいとおま○こを晒しているだけで、んぅぅ<emoji=heart04>\u3000……落ち着かない心持ちとでもいうのか、ドキドキ、するな<emoji=heart04>」"
translation = "「아, 아무도 없다는 걸 알고 있어도……하아아<emoji=heart04> 밖에서 가슴이랑 보지를 노출하고 있는 것만으로, 응으으<emoji=heart04> ……진정되지 않는 마음이라고나 할까, 두근두근, 하는군<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「人は脳内で他人の視線を想定するという……ふぅぅ<emoji=heart04>\u3000この羞恥心は、私の脳が勝手に作り出したものだと考えると、とても興味深いな<emoji=heart04>\u3000はふぅぅ……」"
translation = "「사람은 뇌 내에서 타인의 시선을 상정한다고 하지……후우우<emoji=heart04> 이 수치심은, 내 뇌가 멋대로 만들어낸 것이라고 생각하면, 무척 흥미롭군<emoji=heart04> 하후우……」"

[[dialogue]]
speaker = "クロト"
original = "「ジュエリーの肌、すごく綺麗だ」"
translation = "「쥬얼리의 피부, 정말 예뻐」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、ありがとう。多少弱いところもあるが、はぁぁ<emoji=heart04>\u3000……私は自分の肌の美しさは誇りでね。だからそれを褒められると、とても嬉しい……<emoji=heart04>」"
translation = "「후훗, 고마워. 다소 약한 부분도 있지만, 하아아<emoji=heart04> ……나는 내 피부의 아름다움에 자부심을 갖고 있거든. 그래서 그걸 칭찬받으니, 무척 기쁘구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の首筋にキスをする。"
translation = "나는 그녀의 목덜미에 키스를 한다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あんっ<emoji=heart04>\u3000助手、そんな風にしたら、また赤いキスマークが付いてしまうよ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 조수, 그런 식으로 하면, 또 붉은 키스마크가 남고 말 거야<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……<emoji=heart04>\u3000白い肌だからこそ、余計に目立ってしまうだろう<emoji=heart04>\u3000はふぅ<emoji=heart04>\u3000……この前、ミネコやフェリシーに見つけられて、大変だったんだぞ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하얀 피부라서 더 눈에 띄어 버리잖아<emoji=heart04> 하후우<emoji=heart04> ……저번에 미네코랑 펠리시한테 들켜서 큰일이었다고<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、ジュエリーは俺の恋人なんだって気分になっちゃうとつい……」"
translation = "「미안, 쥬얼리는 내 연인이라는 기분이 들면 나도 모르게 그만……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、なるほど……マーキングか。はふぅぅ<emoji=heart04>\u3000なら、せめて……服に隠れて見えないところにしてくれたまえ<emoji=heart04>」"
translation = "「후훗, 과연…… 마킹인가. 하후우우<emoji=heart04> 그렇다면, 적어도…… 옷에 가려져서 보이지 않는 곳에 해주게나<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に許可が下りるものだから、俺は首筋よりもう少し下の、肩や背中にキスを落としてゆく。"
translation = "그런 식으로 허락이 떨어진 터라, 나는 목덜미보다 조금 더 아래인 어깨나 등에 키스를 남겨 간다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ……んっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「앗…… 응<emoji=heart04> 안……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ！？\u3000ふあぁっ……<emoji=heart04>\u3000助手の指が、私のおま○こに触れて……<emoji=heart04>」"
translation = "「응!? 후아아……<emoji=heart04> 조수의 손가락이, 내 보지에 닿아서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ジュエリー、もう濡れてる」"
translation = "「쥬얼리, 벌써 젖어 있어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふうぅ……<emoji=heart04>\u3000ああ……<emoji=heart04>\u3000キミとキスをしていた時から、もう濡れ濡れさ……<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 아아……<emoji=heart04> 너랑 키스하고 있을 때부터, 벌써 흠뻑 젖었어……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミと恋人になってから沢山キスをするようになって、はぁぁ<emoji=heart04>\u3000今ではキスだけで、感じるようになってしまった……<emoji=heart04>」"
translation = "「너랑 연인이 되고 나서 키스를 많이 하게 돼서, 하아아<emoji=heart04> 이제는 키스만으로도 느끼게 되어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「感じるのは、キスだけ？」"
translation = "「느끼는 건 키스뿐이야?」"

[[dialogue]]
speaker = "unk"
original = "俺はおま○こから指を離して、お尻をそっと撫でる。"
translation = "나는 보지에서 손가락을 떼고, 엉덩이를 살며시 쓰다듬는다."

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁぁんっ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんぅっ……<emoji=heart04>\u3000あぁぁぁ<emoji=heart04>\u3000キミの思っている通りだ……<emoji=heart04>\u3000はふぅぅ<emoji=heart04>\u3000体の感度も、すっかり上がってしまって……」"
translation = "「음응……<emoji=heart04> 아아아아<emoji=heart04> 네가 생각하는 대로야……<emoji=heart04> 하후우우<emoji=heart04> 몸의 감도도 완전히 올라가 버려서……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミの手で、ちょっと撫でられるだけで……はぁぁ<emoji=heart04>\u3000感じてしまう<emoji=heart04>\u3000あぁっ<emoji=heart04>」"
translation = "「네 손으로 조금 쓰다듬어지는 것만으로도…… 하아아<emoji=heart04> 느껴버려<emoji=heart04> 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻から太ももへと、フェザータッチで撫でてゆく。"
translation = "엉덩이에서 허벅지로, 페더 터치로 쓰다듬어 간다."

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……ふうぅぅ<emoji=heart04>\u3000……はあぁ<emoji=heart04>\u3000んうぅぅ……<emoji=heart04>」"
translation = "「응…… 후우우우<emoji=heart04> ……하아아<emoji=heart04> 응우우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから片手を離して、胸へと伸ばす。"
translation = "그러고는 한 손을 떼어, 가슴으로 뻗는다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000キミの手がおっぱいに触れて……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁぁ……ふうぅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 네 손이 가슴에 닿아서……<emoji=heart04> 응<emoji=heart04> 하아아…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふあぁっ<emoji=heart04>\u3000乳首、優しく撫でちゃっ……<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 유두, 부드럽게 문질러버렷……<emoji=heart04> 하앙<emoji=heart04> 하아앗…… 후우웃……<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んあぁっ<emoji=heart04>\u3000乳首クリクリも、感じるぅ……<emoji=heart04>\u3000んうぅっ……はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ……はぁぁん<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 유두 굴리는 것도, 느껴져어……<emoji=heart04> 응우웃…… 하아앗<emoji=heart04> 앗<emoji=heart04> 응…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000おま○こに、キミのおち○ちん当たって……んんぅっ<emoji=heart04>\u3000ふうぅっ……はあぁっ……あぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 보지에, 네 자지 닿아서…… 응응웃<emoji=heart04> 후우웃…… 하아앗…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……はあぁ<emoji=heart04>\u3000おち○ちん、固くて熱くて……んんっ<emoji=heart04>\u3000ふうぅっ……腰が震えちゃう……<emoji=heart04>\u3000あっ……はあぁぁ<emoji=heart04>」"
translation = "「응…… 하아아<emoji=heart04> 자지, 딱딱하고 뜨거워서…… 응응<emoji=heart04> 후우웃…… 허리가 떨려버려……<emoji=heart04> 앗…… 하아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「愛液いっぱい溢れてきて……<emoji=heart04>\u3000ヌルヌルおち○ちんと擦れて、気持ちいい……<emoji=heart04>\u3000んっ……はあぁ……<emoji=heart04>」"
translation = "「애액 잔뜩 흘러나와서……<emoji=heart04> 미끌미끌 자지랑 비벼지니까, 기분 좋아……<emoji=heart04> 응…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はスマタですっかりヌルヌルになったペニスを擦り合わせながら、ジュエリーの耳元で囁く。"
translation = "나는 스마타로 완전히 미끌미끌해진 페니스를 비벼대며, 쥬얼리의 귓가에 속삭인다."

[[dialogue]]
speaker = "クロト"
original = "「ジュエリー、そろそろ挿れてもいい？」"
translation = "「쥬얼리, 슬슬 삽입해도 돼?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ん……<emoji=heart04>\u3000ああ、助手……私も――」"
translation = "「응……<emoji=heart04> 아아, 조수…… 나도――」"

[[dialogue]]
speaker = "unk"
original = "彼女がちらっと横目を向けて来て、微笑みながら……"
translation = "그녀가 살짝 곁눈질을 하며, 미소 지으면서……"

[[dialogue]]
speaker = "ジュエリー"
original = "「おま○こ疼きっぱなしで、キミのおち○ちん、早く挿れて欲しい<emoji=heart04>」"
translation = "「보지 계속 욱신거려서, 네 자지, 빨리 넣어줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉を聞いて更にいきり立ったペニスの先を、俺は彼女の膣穴に擦り合わせる。"
translation = "그 말을 듣고 더욱 기세등등해진 페니스 끝을, 나는 그녀의 질 구멍에 비벼댄다."

[[dialogue]]
speaker = "ジュエリー"
original = "「んあぁぁっ<emoji=heart04>\u3000キミのおち○ちん、おま○この穴に当たって……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……はあぁっ……<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 네 자지, 보지 구멍에 닿아서……<emoji=heart04> 응<emoji=heart04> 후우웃…… 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000おま○こ押し広げて、入って来――っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 보지 밀어젖히고, 들어오――옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、入って来たあぁ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지, 들어왔어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……ふうぅっ……！\u3000はあぁっ……んあぁぁ……<emoji=heart04>」"
translation = "「응…… 후우웃……! 하아앗…… 응아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女の呼吸が落ち着いてきたところで──"
translation = "그녀의 호흡이 진정되었을 무렵──"

[[dialogue]]
speaker = "クロト"
original = "「ジュエリー、動くよ？」"
translation = "「쥬얼리, 움직인다?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ<emoji=heart04>\u3000来てくれ、助手……<emoji=heart04>\u3000ああっ――<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 와줘, 조수……<emoji=heart04> 아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふあああぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あぁああぁっ<emoji=heart04>\u3000おち○ちん、気持ちぃい……っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 아아아아앗<emoji=heart04> 자지, 기분 조아……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000ふうぅっ……はあぁっ、あんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……あっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>\u3000んうぅうっ……はあぁっ、あぁぁん<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후우웃…… 하아앗, 앙<emoji=heart04> 응<emoji=heart04> 하아앗…… 앗<emoji=heart04> 후아아앗<emoji=heart04> 응우우웃…… 하아앗, 아아앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000やっぱりキミのおち○ちん、大きいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ……はあぁっ、あんっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 대단해<emoji=heart04> 역시 네 자지, 커어<emoji=heart04> 앗<emoji=heart04> 응우웃…… 하아앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んあぁっ<emoji=heart04>\u3000おっきいおち○ちん<emoji=heart04>\u3000じゅぼじゅぼされてるの、気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふうぅっ……んっ……んあぁぁっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 커다란 자지<emoji=heart04> 퍽퍽 박히는 거, 기분 좋아<emoji=heart04> 앗<emoji=heart04> 후우웃…… 응…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「太いカリでっ、あはぁぁ<emoji=heart04>\u3000気持ちいいところズリズリ、されてぇ<emoji=heart04>\u3000おま○こ喜んじゃう<emoji=heart04>\u3000ふわあぁぁっ<emoji=heart04>\u3000んうぅっ……はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「굵은 귀두로, 아하아아<emoji=heart04> 기분 좋은 곳 즈릿즈릿, 비벼져서어<emoji=heart04> 보지가 기뻐해버려<emoji=heart04> 후와아아앗<emoji=heart04> 응우웃…… 하아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はジュエリーの太ももを掴んで、より一層、大股に開かせる。"
translation = "나는 쥬얼리의 허벅지를 잡고, 한층 더 다리를 넓게 벌리게 한다."

[[dialogue]]
speaker = "ジュエリー"
original = "「やぁあっ<emoji=heart04>\u3000助手……それ、なんだか恥ずかしいぞっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000……あぁあんっ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 조수…… 그거, 왠지 부끄럽다구우<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> ……아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁん<emoji=heart04>\u3000誰にも見られてないのに、外でしてるってだけで……んんぅぅん<emoji=heart04>\u3000恥ずかしくなってしまうぅ<emoji=heart04>\u3000ああぁぁっ<emoji=heart04>\u3000はあぁあっ……ふうぅぅん<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 아무도 보고 있지 않은데, 밖에서 한다는 것만으로…… 응응우우웅<emoji=heart04> 부끄러워져 버려어<emoji=heart04> 아아아아앗<emoji=heart04> 하아아앗…… 후우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おま○こズボズボされてるところ、見せつけるように、おっぴろげてっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000見られてると思う、だけで<emoji=heart04>\u3000んぅぅぅ<emoji=heart04>\u3000おま○こキュンキュンしてしまう<emoji=heart04>」"
translation = "「보지 퍽퍽 박히는 거, 보여주듯이, 활짝 벌리고서어<emoji=heart04> 아아앙<emoji=heart04> 보여지고 있다고 생각하는, 것만으로<emoji=heart04> 응우우우<emoji=heart04> 보지가 큥큥거려 버려」"

[[dialogue]]
speaker = "クロト"
original = "「ジュエリーはエッチだな」"
translation = "「쥬얼리는 야하네」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんぅぅ<emoji=heart04>\u3000キミが私を、エッチにさせたんだぞっ<emoji=heart04>\u3000助手はエッチな女の子が、あぁぁっ<emoji=heart04>\u3000好きだろう？\u3000あっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁ……あぁんっ<emoji=heart04>」"
translation = "「응응우우<emoji=heart04> 네가 나를, 야하게 만든 거라구우<emoji=heart04> 조수는 야한 여자가, 아아아앗<emoji=heart04> 좋지? 앗<emoji=heart04> 응응웃<emoji=heart04> 하아아…… 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「うん。大好きだ。……ジュエリー、エッチで可愛いよ。愛してる」"
translation = "「응. 정말 좋아해. ……쥬얼리, 야하고 귀여워. 사랑해」"

[[dialogue]]
speaker = "unk"
original = "俺は愛の言葉を囁きながら、再び首筋にキスをする。"
translation = "나는 사랑의 말을 속삭이며, 다시 목덜미에 키스를 한다."

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000助手ぅ……<emoji=heart04>\u3000首筋にキスマーク、ダメなのに、感じちゃうっ<emoji=heart04>\u3000あぁぁあっ<emoji=heart04>\u3000恥ずかしくて、気持ちいいんだぁっ<emoji=heart04>\u3000……はあぁぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후아앗<emoji=heart04> 조수우……<emoji=heart04> 목덜미에 키스마크, 안 되는데, 느껴버려어<emoji=heart04> 아아아아앗<emoji=heart04> 부끄러우면서도, 기분 좋아아앗<emoji=heart04> ……하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ジュエリー、可愛い。感じやすい白い肌も、小さい体も、一生懸命絡み付いてくるおま○こも……エッチな喘ぎ声も、全部可愛い」"
translation = "「쥬얼리, 귀여워. 느끼기 쉬운 하얀 피부도, 작은 몸도, 열심히 조여오는 보지도…… 야한 신음소리도, 전부 귀여워」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁぁっ<emoji=heart04>\u3000助手ぅ<emoji=heart04>\u3000そんな耳元で甘く、囁かれたらっ……<emoji=heart04>\u3000んんんぅっ……ふうぅぅ<emoji=heart04>\u3000おま○このいちばん奥、キュンキュンきちゃうぅ<emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 조수우<emoji=heart04> 그렇게 귓가에서 달콤하게, 속삭여지면……<emoji=heart04> 응응응웃…… 후우우우<emoji=heart04> 보지 가장 안쪽이, 큥큥거려버려어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ここ？」"
translation = "「여기?」"

[[dialogue]]
speaker = "unk"
original = "俺はＧスポットの辺りを擦り上げる動きから、いちばん奥のＰスポットをノックするピストンにシフトした。"
translation = "나는 G스팟 주변을 훑어 올리는 움직임에서, 가장 깊은 곳의 P스팟을 노크하는 피스톤으로 전환했다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ！？\u3000ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、奥まで来たぁ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지, 안쪽까지 왔어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ……！\u3000んっ<emoji=heart04>\u3000はぁっ……ふあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふうぅっ……はあぁっ！\u3000んっ<emoji=heart04>\u3000あっ……あっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응우웃<emoji=heart04> 하아앗……! 응<emoji=heart04> 하앗…… 후아앗<emoji=heart04> 앗<emoji=heart04> 후우웃…… 하아앗! 응<emoji=heart04> 앗…… 앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「子宮にキス、されてるぅっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>\u3000奥にどちゅどちゅピストン、気持ちぃいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふうぅっ……あぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「자궁에 키스, 받고 있어어<emoji=heart04> 아앙<emoji=heart04> 후아아앗<emoji=heart04> 안쪽에 투둑투둑 피스톤, 기분 조아앗<emoji=heart04> 앗<emoji=heart04> 후우웃…… 아아앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……ふああぁっ<emoji=heart04>\u3000理性とろけてるぅ<emoji=heart04>\u3000あっ……ああっ<emoji=heart04>\u3000子宮降りてきて<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000……んああぁっ<emoji=heart04>」"
translation = "「응…… 후아아앗<emoji=heart04> 이성이 녹아버려어<emoji=heart04> 앗…… 아앗<emoji=heart04> 자궁 내려와서어<emoji=heart04> 응<emoji=heart04> 하아앗<emoji=heart04> 응우웃<emoji=heart04> ……응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おま○こが赤ちゃん作る準備、しちゃってるぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000……ふうぅっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「보지가 아기 만들 준비, 해버리고 있어어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> ……후우웃<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なら、作っちゃう？」"
translation = "「그럼, 만들어 버릴까?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の耳元で、そっと囁く。"
translation = "나는 그녀의 귓가에, 살며시 속삭인다."

[[dialogue]]
speaker = "クロト"
original = "「観客のいる野外公開セックスで、知らない人にジュエリーが孕んでるところ、見てもらっちゃう？」"
translation = "「관객이 있는 야외 공개 섹스로, 모르는 사람에게 쥬얼리가 임신하는 모습, 보여줘 버릴까?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんぅぅぅんっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、はあぁぁああぁっ<emoji=heart04><emoji=heart04>\u3000……ああぁ、ふうぅぅぅっ<emoji=heart04>」"
translation = "「응응우우우웅……<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 하아아아아아앗<emoji=heart04><emoji=heart04> ……아아아, 후우우우우웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女が背を仰け反らせ、おま○この中がきゅうぅっ<emoji=heart04>\u3000と絡み付き、快楽を味わせてくる。"
translation = "그녀가 등을 뒤로 젖히고, 보지 속이 꽉<emoji=heart04> 하고 얽혀들며, 쾌락을 맛보게 해 온다."

[[dialogue]]
speaker = "クロト"
original = "「ダメかな？\u3000俺は今ここで、ジュエリーと子作りしたい――」"
translation = "「안 될까? 나는 지금 여기서, 쥬얼리와 아이 만들기 하고 싶어――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁぁっ……<emoji=heart04>\u3000ダメだ、助手ぅ<emoji=heart04>\u3000そんな風に、言われたらぁ……<emoji=heart04>\u3000んんんぅ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んふうぅぅっ……<emoji=heart04>」"
translation = "「하아아앗……<emoji=heart04> 안 돼, 조수우<emoji=heart04> 그런 식으로, 말하면어어……<emoji=heart04> 으으으윽<emoji=heart04> 아아앗<emoji=heart04> 응후우우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁぁん<emoji=heart04>\u3000見せつけ受精セックス<emoji=heart04>\u3000欲しくなっちゃう<emoji=heart04>\u3000ふわぁぁぁっ<emoji=heart04>\u3000んぅぅぅんっ……はあぁっ……ふうぅぅっ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 보여주기 수정 섹스<emoji=heart04> 하고 싶어져 버려<emoji=heart04> 후와아아아앗<emoji=heart04> 으으으응……하아앗……후우우읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺、人前で赤ちゃん孕んじゃう、ジュエリーのエッチで恥ずかしいところ、見てみたい──」"
translation = "「나, 남들 앞에서 아기 배 버리는, 쥬얼리의 야하고 부끄러운 모습, 보고 싶어──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000あぁああぁぁっ<emoji=heart04>\u3000私も見て欲しいっ<emoji=heart04>\u3000人前でキミの赤ちゃん孕んじゃう、恥ずかしいところぉ<emoji=heart04>\u3000だから、お願いだ――」"
translation = "「앗<emoji=heart04> 아아아아앗<emoji=heart04> 나도 봐줬으면 좋겠어! 남들 앞에서 너의 아기를 배 버리는, 부끄러운 모습으을<emoji=heart04> 그러니까, 부탁이야――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私のおま○こにいっぱい種付けして、キミの赤ちゃん孕ませてくれぇ<emoji=heart04>」"
translation = "「내 보지에 잔뜩 씨세우기 해서, 너의 아기를 배게 해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ジュエリー！」"
translation = "「윽…… 쥬얼리!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あああっ――――<emoji=heart04><emoji=heart04>」"
translation = "「아아앗――――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しいピストン、来たあぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 격렬한 피스톤, 왔다아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁぁぁっ<emoji=heart04>\u3000見て<emoji=heart04>\u3000見てくれぇ<emoji=heart04>\u3000お股広げるからぁ、あぁぁん<emoji=heart04>\u3000私の恥ずかしいところ、おま○こされてるところ、見て見てぇ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 봐줘<emoji=heart04> 봐달라고오<emoji=heart04> 가랑이 벌릴 테니까, 아아앙<emoji=heart04> 나의 부끄러운 곳, 보지 당하고 있는 곳, 봐줘 봐줘어<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーは腰をカクカクと振りながら、ビーチの先にいる想像の観客に己の痴態を見せつける。"
translation = "쥬얼리는 허리를 잘랑잘랑 흔들면서, 해변 너머에 있는 상상 속의 관객에게 자신의 치태를 보여준다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっあっあっあっ<emoji=heart04>\u3000これ孕むっ<emoji=heart04>\u3000助手の赤ちゃん孕むところ見てぇ<emoji=heart04>\u3000んふぅぅ<emoji=heart04>\u3000お外で孕まされちゃう、私の恥ずかしいおま○こ見て欲しいのぉっ<emoji=heart04>\u3000くふぅぅんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 이대로 임신해버려<emoji=heart04> 조수의 아기를 임신하는 거 보고 싶어<emoji=heart04> 응후으으<emoji=heart04> 밖에서 임신당해버려, 나의 부끄러운 보지 보여주고 싶어어<emoji=heart04> 쿠후으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「種付けピストン、すごいっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000ふわぁぁんっ<emoji=heart04>\u3000んんぅっ、あぁあああぁっ<emoji=heart04>\u3000ふあぁぁんっ<emoji=heart04>」"
translation = "「씨뿌리기 피스톤, 굉장해<emoji=heart04> 앗, 앗, 앗, 아앙<emoji=heart04> 후와아앙<emoji=heart04> 응응으, 아아아아아아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あはぁあぁっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000おち○ちん凄いぃっ<emoji=heart04>\u3000んんぅん<emoji=heart04>\u3000ふわぁぁぁっっ<emoji=heart04>\u3000くふぅぅぅんっ<emoji=heart04>」"
translation = "「아하아아아<emoji=heart04> 보지 기분 좋아<emoji=heart04> 앗, 앗<emoji=heart04> 자지 굉장해에<emoji=heart04> 응응으응<emoji=heart04> 후와아아아<emoji=heart04> 쿠후으으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁっ<emoji=heart04>\u3000ダメだ<emoji=heart04>\u3000恥ずかしいっ<emoji=heart04>\u3000恥ずかしいの気持ちぃぃっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000気持ちいいことしか考えられなくなるぅぅ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 안 돼<emoji=heart04> 부끄러워<emoji=heart04> 부끄러운 거 기분 조오아<emoji=heart04> 아아앙<emoji=heart04> 기분 좋은 것밖에 생각할 수 없게 되어버려어어<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「恥ずかしがるジュエリー、可愛いっ。好きだ」"
translation = "「부끄러워하는 쥬얼리, 귀여워. 좋아해」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんんぅっ<emoji=heart04>\u3000私もだ、助手<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000キミのことが大好きっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「응응응으<emoji=heart04> 나도다, 조수<emoji=heart04> 좋아해<emoji=heart04> 너를 정말 좋아해<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후아아아응<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だから、もっと<emoji=heart04>\u3000助手のおち○ちんで、私の恥ずかしいところ暴いてくれぇっ<emoji=heart04>\u3000んふぅぅぅんっ<emoji=heart04>」"
translation = "「그러니까, 좀 더<emoji=heart04> 조수의 자지로, 나의 부끄러운 곳을 파헤쳐줘어<emoji=heart04> 응후으으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁあぁぁっ、奥っ<emoji=heart04>\u3000奥いっぱい当たって……ふああぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000気持ちいぃっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「아아아아아, 안쪽<emoji=heart04> 안쪽 잔뜩 닿아서…… 후아아아<emoji=heart04> 기분 좋아<emoji=heart04> 앗 앗 앗 앗<emoji=heart04> 기분 조아아<emoji=heart04> 응, 앗, 앗, 앗<emoji=heart04> 하아아아응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はおま○この方に片手をずらすと、彼女のクリトリスにも触れる。"
translation = "나는 보지 쪽으로 한 손을 옮겨, 그녀의 클리토리스에도 손을 댄다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ！？\u3000ふあああぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000それダメぇ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000同時にクリまで弄っちゃっ……<emoji=heart04>\u3000あっ……んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>」"
translation = "「앗!? 후아아아아아<emoji=heart04><emoji=heart04><emoji=heart04> 그거 안 돼애<emoji=heart04><emoji=heart04><emoji=heart04> 동시에 클리까지 만져져서……<emoji=heart04> 앗…… 응우으<emoji=heart04> 하아아<emoji=heart04> 후아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000クリ、コリコリ<emoji=heart04>\u3000すごく感じるぅっ<emoji=heart04>\u3000んっ、んっ、んんぅっ<emoji=heart04>\u3000ふわぁぁあっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아<emoji=heart04> 굉장해<emoji=heart04> 클리, 오돌토돌<emoji=heart04> 엄청 느껴져어<emoji=heart04> 응, 응, 응응으<emoji=heart04> 후와아아아<emoji=heart04> 응아아아응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あああぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000刺激強くて、もう来ちゃうっ<emoji=heart04>\u3000気持ちいいの、弾けるぅっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふわぁぁあんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아<emoji=heart04> 기분 좋아<emoji=heart04> 자극이 강해서, 벌써 와버려어<emoji=heart04> 기분 좋은 거, 터져버려어<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후와아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺ももう、イキそうだ……！」"
translation = "「나도 이제, 갈 것 같아……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……助手<emoji=heart04>\u3000一緒にっ<emoji=heart04>\u3000イクなら、一緒にっ<emoji=heart04><emoji=heart04>」"
translation = "「응…… 조수<emoji=heart04> 같이<emoji=heart04> 간다면, 같이<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000はあああぁんっ<emoji=heart04><emoji=heart04>\u3000んっ、ああっ、ああっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 후아아아아<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 하아아아아응<emoji=heart04><emoji=heart04> 응, 아앗, 아앗<emoji=heart04> 응아아아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ、くるっ<emoji=heart04>\u3000来るくるっ<emoji=heart04><emoji=heart04>\u3000きちゃうっ<emoji=heart04>\u3000もうイクっ<emoji=heart04>\u3000本当にイっちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 온다<emoji=heart04> 와, 온다아<emoji=heart04><emoji=heart04> 와버려<emoji=heart04> 이제 가버려<emoji=heart04> 정말로 가버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……ジュエリー、もう出る！\u3000中に出すぞ！」"
translation = "「윽…… 쥬얼리, 이제 나와! 안에 내보낼게!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はああぁっ<emoji=heart04>\u3000きてっ<emoji=heart04>\u3000いっぱい出してっ<emoji=heart04>\u3000キミの精液で孕ませてぇっ<emoji=heart04><emoji=heart04>\u3000あはぁぁんっ<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 와줘<emoji=heart04> 잔뜩 내보내줘<emoji=heart04> 너의 정액으로 임신시켜줘어<emoji=heart04><emoji=heart04> 아하아아아응<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁぁっ<emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイク、イクイクイクイクイクぅぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아<emoji=heart04> 앗 앗 앗 앗 앗<emoji=heart04><emoji=heart04> 가버려<emoji=heart04> 가, 가버려, 가버려가버려가버려어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「イッックうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아버려어어어어어어어어어어어<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아~~~~~~~~~~~~~~~~~아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000助手の精子、子宮にいっぱい入って来てるぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아<emoji=heart04><emoji=heart04><emoji=heart04> 조수의 정자가, 자궁에 잔뜩 들어오고 있어어~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ<emoji=heart04>\u3000はあああぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000精液、熱いぃ……<emoji=heart04>\u3000あぁぁ、はぁぁぁん……っ<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아아아아아~~~<emoji=heart04><emoji=heart04> 정액, 뜨거워……<emoji=heart04> 아아아, 하아아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000んんぅ……っ<emoji=heart04>\u3000すごい……<emoji=heart04>\u3000相変わらずの、射精量だ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응으……<emoji=heart04> 굉장해……<emoji=heart04> 여전한 사정량이야……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁぁぁ……<emoji=heart04>\u3000やっと射精、止まったな……<emoji=heart04>\u3000んっ……ふうぅぅ<emoji=heart04>」"
translation = "「하아아아아……<emoji=heart04> 겨우 사정이 멈췄구나……<emoji=heart04> 응…… 후으으으<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あんっ……<emoji=heart04>\u3000おち○ちん、抜けて……<emoji=heart04>」"
translation = "「아앙……<emoji=heart04> 자지, 빠져서……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はあぁ……<emoji=heart04>\u3000ふうぅう……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후으으으……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「野外公開セックス……すごく気持ち良かったぞ……<emoji=heart04>」"
translation = "「야외 공개 섹스…… 정말 기분 좋았다구……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……まあ本当に観客がいたりしたら、嫌だけどね」"
translation = "「……뭐, 정말로 관객이 있거나 하면, 싫겠지만 말이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「バカ<emoji=heart04>\u3000そんなことは、大前提に決まっているだろう？」"
translation = "「바보<emoji=heart04> 그런 건, 당연한 전제잖아?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ……んぅっ<emoji=heart04>\u3000キミの子種が、入り切らなくて、おま○こから溢れてきてしまった……<emoji=heart04>」"
translation = "「앗……응읏<emoji=heart04> 너의 씨앗이, 다 안 들어가서, 보지에서 넘쳐버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ<emoji=heart04>\u3000いつもこんなにいっぱい出されてしまっては、そのうち本当にできてしまいそうだな……<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 항상 이렇게 잔뜩 내버리면, 조만간 정말로 생겨버릴 것 같네……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「責任は取るよ」"
translation = "「책임은 질게.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふあぁぁっ<emoji=heart04>\u3000そんなこと言われてしまっては、もっと中にいっぱい……欲しくなってしまうだろう<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 그런 말을 들어버리면, 좀 더 안에 잔뜩…… 갖고 싶어지잖아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言うと、頭をそっと俺の胸に預けてきて――"
translation = "그녀는 그렇게 말하며, 머리를 살며시 내 가슴에 기대어 왔고――"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手、今日はこのまま……海辺でイチャイチャしていてもいいかい？」"
translation = "「조수, 오늘은 이대로…… 해변에서 꽁냥거리고 있어도 될까?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろんだ」"
translation = "「물론이지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ。ふふふっ<emoji=heart04>\u3000キミの、おち○ちん、また大きくなって……<emoji=heart04>\u3000これは、私も責任を取らなくてはならないね<emoji=heart04>」"
translation = "「앗. 후후훗<emoji=heart04> 너의, 자지, 다시 커져서……<emoji=heart04> 이건, 나도 책임을 지지 않으면 안 되겠네<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「愛しているよ、我が助手<emoji=heart04>」"
translation = "「사랑해, 나의 조수<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04>」"

