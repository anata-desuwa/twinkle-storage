[[dialogue]]
speaker = "unk"
original = "紅明のひと足早いクリスマスパーティー宣言で盛り上がる中、俺はタイミングを見て、セシアに話しかけた。"
translation = "코우메이의 한발 빠른 크리스마스 파티 선언으로 분위기가 달아오르는 가운데, 나는 타이밍을 봐서 세시아에게 말을 걸었다."

[[dialogue]]
speaker = "セシア"
original = "「――あら？\u3000会長、どうしたの？」"
translation = "「――어라? 회장, 무슨 일이야?」"

[[dialogue]]
speaker = "unk"
original = "あれから、記憶はどう？"
translation = "그 후로 기억은 좀 어때?"

[[dialogue]]
speaker = "セシア"
original = "「わたくしのことを気にかけてくれてたのね。ありがとう」"
translation = "「나에 대해 신경 써주고 있었구나. 고마워.」"

[[dialogue]]
speaker = "セシア"
original = "「今日、新星寮の子たちが、クリスマスプレゼントのお礼を言いにきてくれて、笑顔を沢山見ることができたわ」"
translation = "「오늘 신성료 아이들이 크리스마스 선물에 대한 답례를 하러 와줘서, 웃는 얼굴을 많이 볼 수 있었어.」"

[[dialogue]]
speaker = "セシア"
original = "「そのおかげでわたくしの中に、力はだいぶ戻ってきたと思う。でも……」"
translation = "「그 덕분에 내 안에 힘이 꽤 돌아온 것 같아. 하지만……」"

[[dialogue]]
speaker = "セシア"
original = "「残念なことに、記憶はまだ思い出せないの。なにか、あともうちょっとで思い出せそうな気はするのだけど――」"
translation = "「안타깝게도 기억은 아직 떠올릴 수 없어. 뭔가, 이제 조금만 더 하면 떠오를 것 같은 기분은 들지만――」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "セシア"
original = "「わぷっ！？」"
translation = "「와푸!?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あっ……！？\u3000申し訳ございません……！\u3000よそ見をして、ぶつかってしまいました……！\u3000お嬢さん、お怪我はありませんでしたか？」"
translation = "「앗……!? 죄송합니다……! 한눈을 팔다 부딪히고 말았습니다……! 아가씨, 다친 곳은 없으신가요?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「全く、マグダレナ、お前というやつは、昼食の補給だからと浮かれてポヤポヤとしているからそうなるのだ。もぐもぐ……」"
translation = "「정말이지, 막달레나, 너라는 녀석은 점심 보급이라며 들떠서 멍하니 있으니 그렇게 되는 것이니라. 우물우물……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「席に着く前に焼肉定食を立ち食いし始めてるあなたに言われたくないのですが……！？」"
translation = "「자리에 앉기도 전에 불고기 정식을 서서 먹기 시작한 당신에게 듣고 싶지 않은데요……!?」"

[[dialogue]]
speaker = "unk"
original = "やってきたのは、今やすっかり学園に馴染みつつある守護天使の２人――マグダレナさんと、アルモタヘルさんだった。"
translation = "나타난 것은 이제 완전히 학원에 적응해 가고 있는 수호천사 두 사람―― 막달레나 씨와 아르모타헬 씨였다."

[[dialogue]]
speaker = "マグダレナ"
original = "「って、今はそれどころではなく……！」"
translation = "「아니, 지금 그게 문제가 아니라……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「大丈夫か、天使の子よ。マグダレナの無駄に大きい乳がクッションにはなったようだが――」"
translation = "「괜찮으냐, 천사 아이여. 막달레나의 쓸데없이 커다란 젖가슴이 쿠션이 된 모양이다만――」"

[[dialogue]]
speaker = "マグダレナ"
original = "「無駄に大きいって……」"
translation = "「쓸데없이 크다니……」"

[[dialogue]]
speaker = "セシア"
original = "「っ……！\u3000今の感触は……」"
translation = "「윽……! 방금 이 감촉은……」"

[[dialogue]]
speaker = "セシア"
original = "（わたくしは、このおっぱいを知っているわ……！）"
translation = "(나는 이 가슴을 알고 있어……!)"

[[dialogue]]
speaker = "セシア"
original = "（記憶を失っても、魂が覚えている……！）"
translation = "(기억을 잃어도 영혼이 기억하고 있어……!)"

[[dialogue]]
speaker = "セシア"
original = "「<b>ママ</b>ダレナ……！」"
translation = "「<b>마마</b>달레나……!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「えっ？\u3000その呼び方は……？」"
translation = "「엣? 그 호칭은……?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「む……？\u3000よく見ればお前、その体から出ているのは、星力ではなく『霊力』ではないか？」"
translation = "「음……? 자세히 보니 네놈, 그 몸에서 나오고 있는 것은 성력이 아니라 『영력』이 아니더냐?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええ。それに体は小さくなっていますが、あなたは――」"
translation = "「네. 게다가 몸은 작아져 있습니다만, 당신은――」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「まさか、アウク<b>セシア</b>か？」"
translation = "「설마, 아우크<b>세시아</b>냐?」"

[[dialogue]]
speaker = "セシア"
original = "「ああ……ママダレナ、アルモタヘル……わたくし、思い出したのだわ」"
translation = "「아아…… 마마달레나, 아르모타헬…… 나, 떠올랐어.」"

[[dialogue]]
speaker = "unk"
original = "セシア、もしかして記憶が……？"
translation = "세시아, 설마 기억이……?"

[[dialogue]]
speaker = "セシア"
original = "「ええ。自分が何者なのか、思い出すことができた。わたくしは、ママダレナやアルモタヘルと同じ存在――」"
translation = "「응. 내가 누구인지 떠올릴 수 있었어. 나는 마마달레나나 아르모타헬과 같은 존재――」"

[[dialogue]]
speaker = "セシア"
original = "「『蓄積』を司る守護天使、《<ruby>万成<rt>ばんせい</rt></ruby>》のアウクセシア」"
translation = "「『축적』을 관장하는 수호천사, 《만성》의 아우크세시아.」"

[[dialogue]]
speaker = "セシア"
original = "「その転生体よ」"
translation = "「그 전생체야.」"

[[dialogue]]
speaker = "unk"
original = "えええぇぇぇっ！？"
translation = "에에에에에엑!?"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ、生まれ変わりの二代目だし、呼び方も気に入っているから、引き続きセシアって呼んで欲しいわ」"
translation = "「후훗, 환생한 2대째이기도 하고, 호칭도 마음에 드니까 계속 세시아라고 불러줬으면 좋겠어.」"

[[dialogue]]
speaker = "セシア"
original = "「そういうことで、改めてよろしくね、会長？」"
translation = "「그런 고로, 새삼스럽게 다시 잘 부탁해, 회장?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、小さな守護天使は、どこか大人びた笑みを浮かべてみせるのだった――"
translation = "그렇게 말하며 작은 수호천사는 어딘가 어른스러운 미소를 지어 보였다――"

