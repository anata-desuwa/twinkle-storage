[[dialogue]]
speaker = "unk"
original = "第１０話,蹂躙されるデネブ,B"
translation = "제10화, 유린당하는 데네브, B"

[[dialogue]]
speaker = "極星学園の星騎士"
original = "「ど、どうしてルヴィネ様が！？」"
translation = "「어, 어째서 루비네 님께서!?」"

[[dialogue]]
speaker = "極星学園の星騎士"
original = "「私たちの世界を守ると──あの言葉は嘘だったのですか！？」"
translation = "「우리 세계를 지키겠다고 한── 그 말씀은 거짓이었습니까!?」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「──問答に応える気はないわ。消えなさい」"
translation = "「──질문에 대답할 생각은 없다. 사라져라」"

[[dialogue]]
speaker = "極星学園の星騎士"
original = "「また、増えてっ……！\u3000ルヴィネ様……本物のルヴィネ様はどこに──！？」"
translation = "「또 늘어났어……! 루비네 님…… 진짜 루비네 님은 어디에 계시는 겁니까──!?」"

[[dialogue]]
speaker = "unk"
original = "手練れのプリマステラが１人、また１人と倒れていく──"
translation = "실력 있는 프리마스텔라가 한 명, 또 한 명 쓰러져 간다──"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「リノ！\u3000一体どうなってる──次から次へとルヴィネが現れてるぞ！？」"
translation = "「리노! 대체 어떻게 돌아가는 거야── 차례차례 루비네가 나타나고 있다고!?」"

[[dialogue]]
speaker = "リノ"
original = "「分析中よ、まさかこんな事態が起きるだなんて……！」"
translation = "「분석 중이야, 설마 이런 사태가 일어날 줄이야……!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「こいつの強さ……倒すたびに強くなっている！\u3000応援はまだか！？」"
translation = "「이 녀석의 강함…… 쓰러뜨릴 때마다 강해지고 있어! 지원군은 아직인가!?」"

[[dialogue]]
speaker = "リノ"
original = "「各地で大量に出現しているの、とても割ける戦力がないわ！\u3000持ちこたえて！！」"
translation = "「각지에서 대량으로 출현하고 있어, 도저히 뺄 수 있는 전력이 없어! 버텨줘!!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「了解だっ……でもそんなに長くは持たないぞ！！」"
translation = "「알겠다…… 하지만 그렇게 오래 버티지는 못해!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「時の流れとは残酷ね。かつては誉れある使徒であったのに、ここまで衰えてしまうだなんて……」"
translation = "「세월의 흐름이란 잔인하네. 과거에는 명예로운 사도였음에도 이렇게까지 쇠약해져 버리다니……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「立ち上がるたびに、惨めな姿をさらすことになる。はやく諦めてしまいなさい」"
translation = "「일어설 때마다 비참한 모습을 보여줄 뿐이야. 어서 포기하렴」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「言ってろ……あたしはかつて大きな過ちを犯した！\u3000こんなとこで倒れるわけにはいかないんだよ！」"
translation = "「지껄여대기는…… 나는 과거에 큰 잘못을 저질렀어! 이런 곳에서 쓰러질 수는 없단 말이다!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「アルタイルを破壊したことは、過ちではないわ。あれは世界に進歩と成長を促す、貴い行いよ？」"
translation = "「알타이르를 파괴한 것은 잘못이 아니야. 그것은 세계에 진보와 성장을 촉구하는 숭고한 행위란다?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「黙れ！！\u3000世界だけじゃない──あたしは、妹にまで剣を向けたんだぞ！」"
translation = "「닥쳐!! 세계뿐만이 아니야── 나는 여동생에게까지 칼을 겨눴단 말이다!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「これは死ぬまで背負う──あたしの業なんだッ！！！」"
translation = "「이것은 죽을 때까지 짊어지고 갈── 나의 업보란 말이다!!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「今の攻撃……全力かしら？\u3000あまりに軽すぎて、防御の必要すらなかったわね？」"
translation = "「방금 공격…… 전력이었을까? 너무나 가벼워서 방어할 필요조차 없었네?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「はぁっ……はあっ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「<b>あがり</b>の近づいた星騎士など敵ではないわ──さようなら」"
translation = "「은퇴할 때가 다가온 성기사 따위는 적수가 되지 않아── 잘 가렴」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「くっ──そおおぉっ！？」"
translation = "「큭── 소오오옵!?」"

[[dialogue]]
speaker = "？？？"
original = "「──サン・アビソル・リグレッション！！！」"
translation = "「──선 아비솔 리그레션!!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「ぐぅっ──あぁあっ！？」"
translation = "「구윽── 아아악!?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「闇の炎──まさか！？」"
translation = "「어둠의 불꽃── 설마!?」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「姉さん、無事だったんですね！！」"
translation = "「언니, 무사하셨군요!!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「──エリシア！！」"
translation = "「──엘리시아!!」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
original = "「そう──アルタイルから渡ってきたのね……」"
translation = "「그렇구나── 알타이르에서 건너온 거네……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
original = "「くっ……身体が、これ以上持たない……」"
translation = "「큭…… 몸이 더는 버티지 못해……」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「悪い……助かった。再会していきなり、カッコ悪いところ見せちゃったな……」"
translation = "「미안하다…… 살았어. 재회하자마자 꼴사나운 모습을 보여주고 말았네……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「何を言ってるんですか。これだけの手練れを相手に、どれだけ傷ついても戦い続けて──」"
translation = "「무슨 말씀을 하시는 거예요. 이 정도의 강적들을 상대로 아무리 상처 입어도 계속해서 싸우셨으면서──」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「姉さんはいつだって、最高にカッコいい私のヒーローです！」"
translation = "「언니는 언제나 제게 있어 최고의 영웅이에요!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「…………ああ！\u3000エリシアも、あたしの自慢の妹だ！！」"
translation = "「…………아아! 엘리시아도 내 자랑스러운 여동생이다!!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「せっかく再会できたのですから、積もる話もありますが……まずは今の状況をお伝えします。実は──」"
translation = "「어렵사리 재회했으니 밀린 이야기도 많지만…… 우선은 지금 상황을 전해드릴게요. 실은──」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「……なるほどな。ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に見限られて、その後釜が複製されている──とんでもないことになってきたな」"
translation = "「……과연 그렇군. 루비네는 『<ruby>XELOS<rt>제로스</rt></ruby>』에게 버림받고 그 후임들이 복제되고 있다니── 엄청난 사태가 되어 가고 있었구나」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「でも魔王たちが来てくれたんなら、どんな劣勢だって跳ね返せる！」"
translation = "「하지만 마왕 일행이 와 주었다면 어떤 열세라도 극복할 수 있어!」"

[[dialogue]]
speaker = "クロト"
original = "「それにしてもアポロ。あの時、俺たちを送ってくれた後……よく無事だったな？」"
translation = "「그나저나 아폴로. 그때 우리를 보내준 뒤에…… 잘 무사했구나?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「こっちの世界の、ネビュラの魔女たち。その生き残りに救われたんだ」"
translation = "「이쪽 세계의 네뷸라의 마녀들. 그 살아남은 이들에게 구출되었어」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「デネブのネビュラ……まだ解体されていなかったんですね！」"
translation = "「데네브의 네뷸라…… 아직 해체되지 않았었군요!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「……お前たちの馴染みの顔は、たぶん１人もいないけどな。今も各地で戦ってくれてる。だけど、とてもじゃないけど手が足りない」"
translation = "「……너희가 아는 얼굴은 아마 단 한 명도 없겠지만 말이지. 지금도 각지에서 싸워주고 있어. 하지만 도저히 손이 부족해」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……レジスタンスのアポロ。その、身勝手だとは思うのだけれど──」"
translation = "「……레지스탕스의 아폴로. 그, 이기적인 말인 줄은 알지만──」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ああ！\u3000今からあたしたちは仲間だ！\u3000よろしくな！」"
translation = "「아아! 이제부터 우리는 동료다! 잘 부탁해!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──っ。いいの？\u3000貴女は私に言いたいことが、たくさんあるはずでしょう？」"
translation = "「──윽. 정말 괜찮은 거야? 당신은 내게 하고 싶은 말이 무척 많을 텐데?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「そんなの後だ！\u3000それに熱いじゃんか、かつての敵と共闘して、さらなる巨悪を倒す！\u3000流星ライダーでもお決まりのシチュエーションだぜ！」"
translation = "「그런 건 나중 일이야! 게다가 가슴 뜨겁잖아, 과거의 적과 손을 잡고 더 거대한 악을 물리치는 것! 유성 라이더에서도 늘 나오는 상황이라구!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「ルヴィネさん。姉さんは、こういう人なんです」"
translation = "「루비네 씨. 언니는 이런 사람이에요」"

[[dialogue]]
speaker = "unk"
original = "転送直後にアポロと再会できたのは幸いだった。このまま、デネブ防衛のための作戦を──そう思っていた時だった。"
translation = "전송 직후에 아폴로와 재회할 수 있었던 것은 다행이었다. 이대로 데네브 방위를 위한 작전을── 그렇게 생각하고 있던 때였다."

[[dialogue]]
speaker = "デネブ市民"
original = "「あぁ──ルヴィネ様だ！！」"
translation = "「아아── 루비네 님이시다!!」"

[[dialogue]]
speaker = "デネブ市民"
original = "「みんな、ルヴィネ様が帰って来たぞ！\u3000極星学園の星徒会も一緒だ！！」"
translation = "「모두들, 루비네 님이 돌아오셨다! 극성학원의 성도회도 함께야!!」"

[[dialogue]]
speaker = "unk"
original = "逃げ惑っていたデネブの市民たちが感極まって押し寄せ──そして彼らの視線が、俺を捉えた──"
translation = "도망치던 데네브 시민들이 감격에 차 밀려들었고── 이윽고 그들의 시선이 나를 포착했다──"

[[dialogue]]
speaker = "デネブ市民"
original = "「お前は──緋宮クロトッ！？」"
translation = "「너는── 히노미야 쿠로토!?」"

