[[dialogue]]
speaker = "unk"
original = "第２２話,御前試合Ⅲ,B"
translation = "제22화, 어전 시합Ⅲ, B"

[[dialogue]]
speaker = "unk"
original = "お互いが最後に放った波動がぶつかり合う。"
translation = "서로가 마지막으로 내뿜은 파동이 부딪친다."

[[dialogue]]
speaker = "unk"
original = "黄金の輝きをもってしても打ち消せない俺の攻撃が、最後に彼女へと命中していた。"
translation = "황금의 빛으로도 상쇄할 수 없는 나의 공격이, 마지막에 그녀에게 명중했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私の……負けね……ふふっ、さすが……魔王……」"
translation = "「나의…… 패배네…… 후훗, 역시…… 마왕……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──ありがとな、ヴィーナス」"
translation = "「아아── 고맙다, 비너스」"

[[dialogue]]
speaker = "unk"
original = "先ほどまでの戦況から一転──"
translation = "아까까지의 전황에서 일변하여──"

[[dialogue]]
speaker = "unk"
original = "俺たちの見せた攻防は、まさしく全生徒へ贈るにふさわしい武勇となってその決着を迎えていた。"
translation = "우리들이 보여준 공방은, 그야말로 전 학생에게 선사하기에 걸맞은 무용이 되어 그 결말을 맞이하고 있었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「勝者、緋宮クロト──」"
translation = "「승자, 히노미야 쿠로토──」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「よって次期新星学園星徒会長は、彼へ任命することとする！」"
translation = "「따라서 차기 신성 학원 성도 회장은, 그에게 임명하는 것으로 한다!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え、ええぇぇぇ～～！？\u3000いつの間に！？\u3000どうなっちゃったの～～！」"
translation = "「에, 에에에에에엥!? 언제 사이에!? 어떻게 된 거예요!」"

[[dialogue]]
speaker_original = "クラスの女子Ａ"
speaker_translation = "반 여학생 A"
original = "「すごすぎなんだけど！」"
translation = "「너무 대단한데!」"

[[dialogue]]
speaker_original = "クラスの女子Ｂ"
speaker_translation = "반 여학생 B"
original = "「会長が手を抜いた……ようには見えなかったし……」"
translation = "「회장이 봐준…… 것처럼은 안 보였고……」"

[[dialogue]]
speaker = "unk"
original = "アリーナ中がざわめく。"
translation = "아레나 전체가 술렁인다."

[[dialogue]]
speaker = "unk"
original = "無理もない──自分でも驚くほどの逆転劇を演じてしまったのだから。"
translation = "무리도 아니다── 스스로도 놀랄 만한 역전극을 펼쳐 버렸으니까."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "戦闘を終えると、みなぎっていた力がどこかへ放出されていくのを感じた。"
translation = "전투를 마치자, 넘쳐흐르던 힘이 어딘가로 방출되는 것을 느꼈다."

[[dialogue]]
speaker = "unk"
original = "元に戻った……のか。"
translation = "원래대로 돌아왔……나."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さて。でも……これで、御前試合としては最高のパフォーマンスになったわね」"
translation = "「자. 하지만…… 이걸로, 어전 시합으로서는 최고의 퍼포먼스가 되었네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス……」"
translation = "「비너스……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──みんな、見たわね！？\u3000これが緋宮クロト──これからあなた達を背負って立つ、新たな星徒会長の姿よ！」"
translation = "「──모두, 봤지!? 이것이 히노미야 쿠로토── 이제부터 너희들을 짊어지고 설, 새로운 성도 회장의 모습이야!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺を称え、全生徒へ向けてそう宣言した。"
translation = "비너스는 나를 칭송하며, 전 학생을 향해 그렇게 선언했다."

[[dialogue]]
speaker = "unk"
original = "俺の戦いぶりを認めてくれたのか──盛大な拍手が巻き起こる。"
translation = "나의 싸우는 모습을 인정해 준 것일까── 성대한 박수가 터져 나온다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ほらクロト、星徒会長としてビシッとみんなにその威厳を示すのよ！」"
translation = "「자 쿠로토, 성도 회장으로서 확실하게 모두에게 그 위엄을 보여주는 거야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ、ああ……と言ってもいきなりすぎて」"
translation = "「아, 아아…… 라고 해도 너무 갑작스러워서」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「難しいこと考えなくていいから！\u3000ほらほら！」"
translation = "「어려운 거 생각할 필요 없으니까! 자, 자!」"

[[dialogue]]
speaker = "unk"
original = "転入生挨拶の後は星徒会長挨拶だなんて、波乱万丈にも程があるな。"
translation = "전학생 인사 후에는 성도 회장 인사라니, 파란만장해도 정도가 있군."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──みんな。今日のことはいきなりすぎて、まだ戸惑っている人もいるかもしれない」"
translation = "「──모두. 오늘 일은 너무 갑작스러워서, 아직 당황하고 있는 사람도 있을지 모른다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「実は俺も同じなんだ。今日までずっと迷い続けて……だけど、ヴィーナスとの戦いで、ようやく答えを出すことができた」"
translation = "「실은 나도 마찬가지다. 오늘까지 계속 망설여 왔지만…… 하지만, 비너스와의 싸움으로, 드디어 답을 낼 수 있었다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから今日から──俺が見つけた答えを示していく。星徒会長のあるべき姿っていうものを」"
translation = "「그러니 오늘부터── 내가 찾은 답을 보여주겠다. 성도 회장의 있어야 할 모습이라는 것을」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「緋宮クロトは、どんな人だって見捨てない！\u3000モンスターからも、リクリエからも！\u3000助けを求める人がいるなら──必ず救ってみせる！」"
translation = "「히노미야 쿠로토는, 어떤 사람이라도 버리지 않는다! 몬스터에게서도, 리크리에에게서도! 도움을 청하는 사람이 있다면── 반드시 구해 보이겠다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「星徒会はそのために戦う。だからみんなも、一緒に付いてきてくれ！」"
translation = "「성도회는 그것을 위해 싸운다. 그러니 모두도, 함께 따라와 달라!」"

[[dialogue]]
speaker = "unk"
original = "アリーナ中が湧き、俺に温かな声援が浴びせられる。"
translation = "아레나 전체가 들끓고, 나에게 따뜻한 성원이 쏟아진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……なんか照れるな。でも、これが会長になるっていうことか」"
translation = "「하하…… 왠지 쑥스럽네. 하지만, 이게 회장이 된다는 건가」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええそうよ──私だってもっともっと強くなる。真の魔王であるあなたに追いつけるくらい」"
translation = "「응 그래── 나도 더욱더 강해질 거야. 진정한 마왕인 너에게 따라잡을 수 있을 만큼」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトが不甲斐なかったら、星徒会長の座だってまた奪い取っちゃうんだから！\u3000気を引き締めてかかりなさい！」"
translation = "「쿠로토가 한심하면, 성도 회장 자리도 다시 빼앗아 버릴 테니까! 정신 바짝 차리고 임하도록 해!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、望むところだ！」"
translation = "「아아, 바라던 바다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「とんでもない歓声ね～」"
translation = "「엄청난 환호성이네」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん、おめでとう！\u3000ヴィーナスに勝っちゃうなんて、本当にすごいよ！」"
translation = "「히노미야 군, 축하해! 비너스에게 이기다니, 정말 대단해!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ヴィーナス前会長も、お疲れ様です」"
translation = "「비너스 전 회장님도, 수고하셨습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな……」"
translation = "「모두……」"

[[dialogue]]
speaker = "unk"
original = "星徒会のみんなが、労いの言葉と共にこちらに駆け寄ってきてくれる。"
translation = "성도회의 모두가, 위로의 말과 함께 이쪽으로 달려와 준다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふん！\u3000これでようやく、役者は全員揃ったというわけねっ！」"
translation = "「후훗! 이걸로 드디어, 배우는 전원 모였다는 거네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも──こんなのまだまだ序の口よ。これから世界を守る戦いが始まるんだから」"
translation = "「하지만── 이런 건 아직 시작에 불과해. 이제부터 세계를 지키는 싸움이 시작될 테니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトだけじゃないわよ！\u3000みんな、準備はいい？」"
translation = "「쿠로토뿐만이 아니야! 모두, 준비됐어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──やってやろう！」"
translation = "「아아── 해치워 주지!」"

[[dialogue]]
speaker_original = "みんな"
speaker_translation = "모두"
original = "「おーー！！」"
translation = "「오오ー!!」"

[[dialogue]]
speaker = "unk"
original = "まだまだ新米であることに変わりはない。これからまた迷ったりするんだろうけど。"
translation = "아직 신참이라는 것에는 변함이 없다. 이제부터 또 망설이거나 하겠지만."

[[dialogue]]
speaker = "unk"
original = "新たな仲間たちと一緒なら、どんな困難も乗り越えられるような万能感に満ちていた。"
translation = "새로운 동료들과 함께라면, 어떤 곤란도 극복할 수 있을 것 같은 만능감으로 가득 차 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（ああ、今なら──なんだって出来そうな気がする──）」"
translation = "「(아아, 지금이라면── 뭐든지 할 수 있을 것 같은 기분이 든다──)」"

[[dialogue]]
speaker = "unk"
original = "──と、思っていたのだが。"
translation = "──라고, 생각하고 있었는데."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……あっ」"
translation = "「……앗」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん──えぇっ！？」"
translation = "「음── 에엣!?」"

[[dialogue]]
speaker = "unk"
original = "緊張の糸が切れたその瞬間。自分が倒れ込んだのがわかった。"
translation = "긴장의 끈이 끊어진 그 순간. 자신이 쓰러진 것을 알았다."

[[dialogue]]
speaker = "unk"
original = "咄嗟に手を伸ばしたヴィーナスの胸に抱きかかえられる。"
translation = "황급히 손을 뻗은 비너스의 품에 안긴다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ああっやっぱり！\u3000無茶しすぎだっていうのに……」"
translation = "「아앗 역시! 너무 무리했다는 건데……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「しばらく動けないかもしれないわねぇ、クロトくん」"
translation = "「당분간 움직이지 못할지도 모르겠네, 쿠로토 군」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「彼はこれ以上ない結果を示した。ふふ、もう次期会長とは呼べませんね」"
translation = "「그는 더할 나위 없는 결과를 보여주었습니다. 후후, 이제 차기 회장이라고는 부를 수 없겠네요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「も、もう──にしたって、私にもたれかからなくてもいいでしょっ」"
translation = "「모, 모, 이제 와서── 라고 해도, 나한테 기대지 않아도 되잖아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すぅ……すぅ……」"
translation = "「스윽…… 스윽……」"

[[dialogue]]
speaker = "unk"
original = "薄れゆく意識のなかで──"
translation = "희미해져 가는 의식 속에서──"

[[dialogue]]
speaker = "unk"
original = "初めて感じたはずのヴィーナスの温もりに、俺は奇妙な懐かしみを覚えていた。"
translation = "처음 느꼈을 터인 비너스의 온기에, 나는 기묘한 그리움을 느끼고 있었다."

