[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ねぇねぇお兄ちゃんっ、リーナね、逆上がりできるようになったんだよっ！\u3000ほめてほめて～♪」"
translation = "「저기 저기 오빠, 리나 말야, 철봉 거꾸로 오르기 할 수 있게 됐어! 칭찬해 줘 칭찬해 줘~♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナ、行きたいクレープのお店があってね？\u3000一緒に食べよ、お兄ちゃん！」"
translation = "「리나, 가고 싶은 크레이프 가게가 있는데 말야? 같이 먹자, 오빠!」"

[[dialogue]]
speaker = "unk"
original = "俺が……お兄ちゃん？"
translation = "내가…… 오빠?"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「そうだよ？\u3000忘れちゃったの？\u3000妹のリーナだよ」"
translation = "「그렇다니까? 잊어버린 거야? 여동생인 리나야」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナね、お兄ちゃんにお話したいことたくさんあるんだ。学校のこと、アニメのこと、最近流行りのファッションに～……」"
translation = "「리나 말야, 오빠한테 하고 싶은 얘기가 잔뜩 있어. 학교 이야기, 애니메이션 이야기, 최근 유행하는 패션에~……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「こいつ、本当にお前の妹か……？」"
translation = "「이 녀석, 정말로 네 여동생 맞아……?」"

[[dialogue]]
speaker = "unk"
original = "いえ、俺に妹は──"
translation = "아뇨, 저에게 여동생은──"

[[dialogue]]
speaker = "unk"
original = "お兄ちゃんって呼ぶ子なら他に……"
translation = "오빠라고 부르는 애라면 다른……"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「どうしてそんなイジワル言うの、お兄ちゃん？」"
translation = "「어째서 그런 심술궂은 말을 하는 거야, 오빠?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナはお兄ちゃんの妹だよ？\u3000お兄ちゃんはリーナのお兄ちゃんだよ？」"
translation = "「리나는 오빠의 여동생이라구? 오빠는 리나의 오빠잖아?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「そうだよね？\u3000お兄ちゃん？」"
translation = "「그렇지? 오빠?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（う……こいつ、危ない匂いがするな……。会長さん、迂闊に否定はするな。触らぬ神には何とやらっていうだろ）"
translation = "（으…… 이 녀석, 위험한 냄새가 나는데……. 회장님, 함부로 부정하지 마. 긁어 부스럼 만들지 말라는 말도 있잖아）"

[[dialogue]]
speaker = "unk"
original = "え、えーと、そうかも……？"
translation = "어, 에 그러니까, 그럴지도……?"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「そうかもじゃないよ～っ。もう、お兄ちゃんってば忘れっぽいんだから」"
translation = "「그럴지도라니 너무해~. 정말, 오빠도 참 잘 잊어버린다니까」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「じゃあ一緒にクレープのお店行こう？\u3000早く行かないと並んじゃうよ～っ」"
translation = "「그럼 같이 크레이프 가게 가자! 빨리 안 가면 줄 서야 한단 말야~」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あー……悪いな、妹ちゃん。お兄ちゃんはあたしと用事があるんだ。また今度にしてくれるか？」"
translation = "「아-…… 미안하네, 꼬마 여동생. 오빠는 나랑 볼일이 있거든. 다음에 다시 와줄래?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナからお兄ちゃんを取るの？\u3000お兄ちゃんはリーナのお兄ちゃんなのに？」"
translation = "「리나한테서 오빠를 뺏을 거야? 오빠는 리나의 오빠인데?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（あ……やっぱりこれ、刺激しない方がいいやつだな）"
translation = "（아…… 역시 이거, 자극하지 않는 게 좋은 부류구나）"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あー……まぁ調べものならあたし１人でできるし……兄妹仲良くな」"
translation = "「아-…… 뭐 조사라면 나 혼자서도 할 수 있고…… 남매끼리 사이좋게 지내라고」"

[[dialogue]]
speaker = "unk"
original = "あっ、待ってくださ──"
translation = "앗, 기다려주세──"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「これでリーナとお兄ちゃんだけだね。じゃあクレープ食べに行こっ！」"
translation = "「이제 리나랑 오빠뿐이네. 그럼 크레이프 먹으러 가자!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「えへへへ、クレープおいし～♪\u3000トッピングで生クリームたっぷりにしてもらってよかったな～♪」"
translation = "「에헤헤헤, 크레이프 맛있어~♪ 토핑으로 생크림 듬뿍 얹어달라고 하길 잘했네~♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんは何にしたの？\u3000アップルシナモン？\u3000へ～、そっちもいいなー！」"
translation = "「오빠는 뭘로 했어? 애플 시나몬? 헤~, 그것도 좋겠다!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ひと口ちょうだい──って、あれ、お兄ちゃんどうしたの？\u3000クレープおいしくなかった？」"
translation = "「한 입만 줘── 어라, 오빠 왜 그래? 크레이프 맛없어?」"

[[dialogue]]
speaker = "unk"
original = "誰かと勘違いしてない……？"
translation = "누군가랑 착각하고 있는 거 아냐……?"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「え～っ、勘違いなんてしてないよ。お兄ちゃんはお兄ちゃんだもん」"
translation = "「에~, 착각 같은 거 안 했어. 오빠는 오빠인걸.」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「かっこよくリーナを助けてくれるところを見て、ビビッときちゃった。リーナのお兄ちゃんに間違いないって」"
translation = "「멋있게 리나를 구해주는 모습을 보고 찌릿하고 왔어. 리나의 오빠가 틀림없다고.」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナね、お兄ちゃんに会えなくてずっと寂しかったんだぁ～。これからはリーナと一緒だよっ」"
translation = "「리나 말야, 오빠를 못 만나서 계속 외로웠단 말야~. 이제부터는 리나랑 함께야.」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん大好き<emoji=heart04>\u3000ぎゅ～<emoji=heart04>」"
translation = "「오빠 너무 좋아<emoji=heart04> 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「え、いきなり抱きつくから驚いた……？\u3000も～、兄妹なんだからこれくらい普通でしょ」"
translation = "「어, 갑자기 안기니까 놀랐어……? 정말~, 남매니까 이 정도는 보통이잖아.」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ほらほら、お兄ちゃんのクレープひと口ちょうだい♪\u3000あ～むっ。ん～っ、こっちもおいしいね♪」"
translation = "「자자, 오빠 크레이프 한 입만 줘♪ 아~음. 음~, 이쪽도 맛있네♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナのクレープもあげるねっ。お兄ちゃん、あ～ん」"
translation = "「리나 크레이프도 줄게. 오빠, 아~앙.」"

[[dialogue]]
speaker = "unk"
original = "あ、あ～ん……"
translation = "아, 아~앙……"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナのクレープおいしい？\u3000えへへっ、ならよかった～♪」"
translation = "「리나 크레이프 맛있어? 에헤헷, 그렇다면 다행이야~♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、そうだ！\u3000リーナね、ゲームセンターも行きたいんだ。ゲームセンターって暗くて、ちょっと怖いでしょ？\u3000だからお兄ちゃんと一緒がいいんだっ」"
translation = "「아, 맞다! 리나 말야, 게임센터도 가고 싶어. 게임센터는 어둡고 조금 무섭잖아? 그러니까 오빠랑 같이 가는 게 좋아.」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナ、ゲーム上手じゃないから、お兄ちゃんが教えて？\u3000いい？」"
translation = "「리나, 게임 잘 못하니까 오빠가 가르쳐줄래? 응?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「やった～！\u3000お兄ちゃんとゲーム、ゲーム～♪\u3000あと写真も撮ろ！\u3000お兄ちゃんと一緒のシール欲しいな～♪」"
translation = "「얏호~! 오빠랑 게임, 게임~♪ 그리고 사진도 찍자! 오빠랑 같이 찍은 스티커 갖고 싶어~♪」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「さてと。あたしもあたしで調査するかね。会長さんには悪いが、こちとら単独行動は慣れっこだ。改めてキサナの追跡だが……」"
translation = "「그럼. 나도 나대로 조사를 좀 해볼까. 회장님께는 미안하지만, 이 몸은 단독 행동이 익숙하거든. 다시금 키사나의 추적이다만……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「この周辺でも赤髪の魔族の目撃情報はあるにはあるが、キサナである確証はない。流星学園や新星学園にも該当者はいるし、空振りの線も考えておく必要がある」"
translation = "「이 주변에서도 붉은 머리 마족의 목격 정보는 있긴 하지만, 키사나라는 확증은 없어. 유성학원이나 신성학원에도 해당자는 있고, 허탕 칠 가능성도 생각해둬야겠지.」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「しかしキサナとやら、魔族ってことを差し引いてもあたしと似た匂いがするな。堅気じゃねえっつうか、追う側の視点を持ってる」"
translation = "「하지만 키사나인가 하는 녀석, 마족이라는 걸 차치하더라도 나랑 비슷한 냄새가 나네. 일반인은 아니랄까, 쫓는 쪽의 시점을 가지고 있어.」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あちこちを動き回りながら、こっちの目を攪乱してるみたいだ。根城がどこかにあるとすれば、逆に目撃情報がない場所が怪しいか……」"
translation = "「여기저기 돌아다니면서 이쪽의 눈을 교란하는 모양이야. 근거지가 어딘가에 있다면, 거꾸로 목격 정보가 없는 장소가 수상하려나……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「よし、ちょっと探りを入れてみるか。キサナ以外に怪しいやつが出入りしてる可能性もあるしな」"
translation = "「좋아, 살짝 떠보도록 할까. 키사나 말고도 수상한 녀석이 드나들 가능성도 있으니까.」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「コラプサー……本当にあたしが追ってる事件と繋がってるといいんだが」"
translation = "「콜랩서…… 정말로 내가 쫓는 사건과 연결되어 있으면 좋겠는데.」"

[[dialogue]]
speaker = "？？？"
original = "「……いませんね。空振りでしたか。あまり私の手を煩わせないでいただきたいのですが……」"
translation = "「……없군요. 허탕이었습니까. 너무 제 손을 번거롭게 하지 말아주셨으면 합니다만……」"

[[dialogue]]
speaker = "？？？"
original = "「──なんて、露にも思っていませんが。早々に見つけてしまっては、せっかくの探訪の時間がなくなってしまいますから」"
translation = "「──라니, 추호도 생각하지 않지만요. 너무 일찍 찾아버리면 모처럼의 탐방 시간이 없어져 버리니까요.」"

[[dialogue]]
speaker = "？？？"
original = "「行きたいところはいくらでもあります。もうしばらく楽しませていただきましょう」"
translation = "「가고 싶은 곳은 얼마든지 있습니다. 좀 더 즐기도록 하죠.」"

