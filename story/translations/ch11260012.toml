[[dialogue]]
speaker = "unk"
original = "第２話,ＴＳ魔法少女計画,P"
translation = "제2화, TS 마법소녀 계획, P"

[[dialogue]]
speaker = "unk"
original = "サチとディーラックの幸運を巡る事件を終えて、少し経ったある日のこと。"
translation = "사치와 디락의 행운을 둘러싼 사건을 마치고 얼마 지나지 않은 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は良からぬ噂を聞いて、購買部へ勢いよく乗り込んだ――"
translation = "나는 좋지 못한 소문을 듣고 구매부로 기세 좋게 쳐들어갔다──"

[[dialogue]]
speaker = "unk"
original = "御用改めであるッ！！"
translation = "가택 수색이다!!"

[[dialogue]]
speaker = "トレジアンナ"
original = "「会長さん！？\u3000何故ここに！？」"
translation = "「회장님!? 어째서 여기에!?」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ♪\u3000バレてしまったカ」"
translation = "「후히히♪ 들켜 버렸나」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「くっ……！\u3000一体どこから情報が洩れて……」"
translation = "「큭……! 대체 어디서 정보가 샌 거지……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「――え？\u3000複数の生徒たちから、私たち２人がカフェテリアで怪しい会話をしながら、滅茶苦茶盛り上がってるのを見たって証言が寄せられた？」"
translation = "「──네? 여러 학생들로부터 저희 두 사람이 카페테리아에서 수상한 대화를 나누며 엄청나게 달아오르는 걸 봤다는 증언이 들어왔다고요?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あちゃ～！\u3000あの時でしたか～！」"
translation = "「아차~! 그때였나요~!」"

[[dialogue]]
speaker = "アニマ"
original = "「<b>アンナ</b>はそれはもうテンションが上がってたからネ。フヒ♪」"
translation = "「<b>안나</b>는 그때 정말 텐션이 높았으니까 말이야. 후히♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そりゃあ、会長さんを『ＴＳ魔法少女』に変身させるという案が、アニマさんとの共同制作なら実現可能となれば、テンションぶち上がっちゃいますよ！」"
translation = "「그야 회장님을 『TS 마법소녀』로 변신시킨다는 안이 아니마 씨와의 공동 제작이라면 실현 가능하게 됐으니 텐션이 폭발할 수밖에 없죠!」"

[[dialogue]]
speaker = "unk"
original = "変身しないよ！？"
translation = "변신 안 해!!"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そう言うと思ったから、完成するまで隠してたんですよ！」"
translation = "「그렇게 말할 줄 알고 완성될 때까지 숨기고 있었던 거예요!」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "サチ"
original = "「お、お兄さんが、女の子に変身して魔法少女に……！？」"
translation = "「오, 오빠가 여자아이로 변신해서 마법소녀가……!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あっ、サチさん！\u3000何かご用事ですか？」"
translation = "「앗, 사치 씨! 무슨 일이세요?」"

[[dialogue]]
speaker = "サチ"
original = "「は、はい。フォルトゥーナフォームの訓練を見てもらおうと思って、お願いしに来たんですけど……そしたら、購買部へ新撰組みたいに乗り込んで行くのを見かけて………」"
translation = "「하, 네. 포르투나 폼 훈련을 좀 봐주셨으면 해서 부탁드리러 왔는데…… 그랬더니 구매부로 신센구미처럼 쳐들어가는 걸 봐서………」"

[[dialogue]]
speaker = "unk"
original = "サチはナシだと思うだろ！？"
translation = "사치는 안 된다고 생각하지!?"

[[dialogue]]
speaker = "サチ"
original = "「た、確かにそうですね。常識的に考えれば、お兄さんが魔法少女に変身するのは、エッチなのでナシです！」"
translation = "「그, 확실히 그렇네요. 상식적으로 생각하면, 오빠가 마법소녀로 변신하는 건 야하니까 안 됩니다!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そんなぁ～！？\u3000ヘレナさんに頼んだら、喜んで新フォームのデザインをしてくれることになってたのに～！」"
translation = "「에엥~!? 헬레나 씨에게 부탁하면 기꺼이 새 폼의 디자인을 해주기로 했었는데~!」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんノリノリなの！？"
translation = "헬레나짱, 아주 신났네!?"

[[dialogue]]
speaker = "サチ"
original = "「ですが……」"
translation = "「하지만……」"

[[dialogue]]
speaker = "unk"
original = "サチはこれまで見たこともない程、葛藤の表情を浮かべながら──"
translation = "사치는 지금까지 본 적도 없을 정도로 갈등하는 표정을 지으며──"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんが性別ごと魔法少女に変身したら、きっと似合うだろうなと思ってしまう自分もいるんです……！」"
translation = "「오빠가 성별까지 마법소녀로 변신한다면, 분명 잘 어울릴 거라고 생각해버리는 자신도 있어요……!」"

[[dialogue]]
speaker = "unk"
original = "サチさん！？"
translation = "사치 씨!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「……会長さん」"
translation = "「……회장님」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私はかつて、ロストアイテムを自作していた時に、本当に作っていいのかと悩んだことがあります。その時、思ったんです」"
translation = "「저는 예전에 로스트 아이템을 자작하고 있을 때, 정말 만들어도 좋은 것인지 고민한 적이 있어요. 그때 생각했죠」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「――作らずに悩むより、作ってから後のことを考えればいいや……と」"
translation = "「──만들지도 않고 고민하기보다, 만들고 나서 뒷일을 생각하면 된다고…… 말이죠」"

[[dialogue]]
speaker = "unk"
original = "やらかす科学者の思考！！！"
translation = "사고 치는 과학자의 사고방식!!!"

[[dialogue]]
speaker = "unk"
original = "いやもう、実際にやらかし済みだけど！"
translation = "아니 이미 실제로 사고 쳤으면서!"

[[dialogue]]
speaker = "アニマ"
original = "「アンナ」"
translation = "「안나」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「アニマさん……？」"
translation = "「아니마 씨……?」"

[[dialogue]]
speaker = "アニマ"
original = "「我が親しき後輩の口癖を借りて、キミにこの言葉を送るヨ」"
translation = "「내 친한 후배의 입버릇을 빌려 너에게 이 말을 보내마」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩はぐっと親指を立てて、告げる。"
translation = "아니마 선배는 엄지를 척 세우며 고한다."

[[dialogue]]
speaker = "アニマ"
original = "「ノープロブレム」"
translation = "「노 프로블럼」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「オゥ……！\u3000マイソウルフレンド！」"
translation = "「오오……! 마이 소울 프렌드!」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ、ミートゥー♪」"
translation = "「후히, 미 투♪」"

[[dialogue]]
speaker = "unk"
original = "ピシパシグッグッ、と謎のハンドサインを交わす２人。"
translation = "착착 척척, 하며 수수께끼의 핸드 사인을 교환하는 두 사람."

[[dialogue]]
speaker = "unk"
original = "なにこのやり取り！？"
translation = "뭐야 이 대화는!?"

[[dialogue]]
speaker = "アニマ"
original = "「つまりは、技術の進歩とは、失敗を繰り返すことで生まれるということダ。フヒ♪」"
translation = "「즉, 기술의 진보란 실패를 반복함으로써 태어나는 법이다. 후히♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「――会長さん！\u3000どうかお願いします！\u3000これは更なるフォームチェンジ技術発展の為にも、大事なプロセスなんですよ～！」"
translation = "「──회장님! 제발 부탁드려요! 이건 더 나은 폼 체인지 기술 발전을 위해서도 중요한 프로세스란 말이에요~!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「それに、会長さんが魔法少女になってくれたら、いい感じに５人揃って、魔法少女戦隊が完成して……ふふふっ♪」"
translation = "「게다가 회장님이 마법소녀가 되어준다면 딱 좋게 5명이 모여서 마법소녀 전대가 완성되고…… 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "絶対そっちが主目的だよね！？"
translation = "절대 그쪽이 주역할이지!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あっ、しまった。つい本音が……てへぺろ☆」"
translation = "「앗, 이런. 그만 본심이…… 데헤페로☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ちなみにですね～、トマルさんは、最初友人枠でいるところから、中盤に追加戦士として魔法少女になるパターンで～」"
translation = "「참고로요~ 토마루 씨는 처음엔 친구 역할로 있다가 중반에 추가 전사로서 마법소녀가 되는 패턴으로~」"

[[dialogue]]
speaker = "unk"
original = "それはアリだな"
translation = "그건 말이 되네"

[[dialogue]]
speaker = "サチ"
original = "（アリなんだ……）"
translation = "(말이 되는구나……)"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ですよね！\u3000だから、会長さんも――」"
translation = "「그렇죠! 그러니까 회장님도──」"

[[dialogue]]
speaker = "unk"
original = "だが、認めん！！！"
translation = "하지만 인정 못 해!!!"

[[dialogue]]
speaker = "トレジアンナ"
original = "「なんでですかぁ～～～っ！」"
translation = "「어째서인가요~~~!」"

[[dialogue]]
speaker = "unk"
original = "その後、俺の魔法少女フォーム計画についてはなんとか保留ということになったが――"
translation = "그 후, 나의 마법소녀 폼 계획에 대해서는 일단 보류하기로 했지만──"

[[dialogue]]
speaker = "unk"
original = "実現する日は来ないはずだ。きっと……多分。"
translation = "실현될 날은 오지 않을 것이다. 분명…… 아마도."

