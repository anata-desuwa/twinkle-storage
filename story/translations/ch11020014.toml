[[dialogue]]
speaker = "unk"
original = "第４話,笑顔の練習です,P"
translation = "제4화, 미소 짓는 연습입니다, P"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「何と。まさかシュティレさんが、会長のことを好き……？」"
translation = "「이럴 수가. 설마 슈틸레 씨가 회장님을 좋아한다고요……?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。先日のお出かけのラストにて、ズッキュンと……乙女心がときめいちゃいました、アナお姉ちゃん」"
translation = "「네. 저번 나들이 마지막에 즈큐웅 하고…… 소녀심이 설레버렸어요, 아나 언니」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒッ♪\u3000それは面白イ！\u3000では可愛い弟子ヨ、どんな薬が欲しいのカナ？」"
translation = "「후히♪ 그거 재미있구마! 그럼 귀여운 제자여, 어떤 약이 필요하노?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「手っ取り早く会長に惚れ薬を盛るカ……あるいはシュティレをボンッキュッボンッのナイスバディに変身させるドリンクを使う手もあるナ～？」"
translation = "「손쉽게 회장한테 사랑의 묘약을 먹일까…… 아니면 슈틸레를 빵빵한 나이스 바디로 변신시키는 드링크를 쓸까나~?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「真面目な話ですよ、アニマ先輩」"
translation = "「진지한 이야기예요, 아니마 선배」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「体型変化が可能ならば、シュティレはボンッボンッボンッがいいです」"
translation = "「체형 변화가 가능하다면 슈틸레는 빵빵빵이 좋습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「シュティレさん。それはドラム缶です」"
translation = "「슈틸레 씨. 그건 드럼통입니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「憧れの装甲砲兵ドラムンに、一度でいいからなってみたいと昔から思っておりました──と、冗談はさておき」"
translation = "「동경하는 장갑포병 드럼툰이 한 번이라도 좋으니 되어보고 싶다고 예전부터 생각했었습니다── 라고, 농담은 제쳐두고」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「マスター。もし錬金術のお薬をいただけるなら、シュティレは笑顔になれる薬が欲しいです」"
translation = "「마스터. 만약 연금술 약을 주신다면, 슈틸레는 미소 지을 수 있는 약을 원합니다」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「笑顔？\u3000そんなものなら朝飯前だガ……なんでまた？」"
translation = "「미소? 그런 거라면 식은 죽 먹기다만…… 왜 또?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「昨日、ネットの叡智が集う場所、<ruby>Ｒｙｕｓｅｉ<rt>リューセイ</rt></ruby>知恵袋で投稿をしました。男子に好かれる女子の特徴は何か、と」"
translation = "「어제 인터넷의 예지가 모이는 곳, Ryusei 지식인에 게시글을 올렸습니다. 남자에게 사랑받는 여자의 특징은 무엇인가 하고요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「結果、笑顔がプリティーキュートな女子が好かれるとの結論に至ったのです」"
translation = "「결과, 미소가 프리티 큐트한 여자가 사랑받는다는 결론에 도달했습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「エビデンスに不安が残る……でも、なるほど。会長に好かれるために、可愛い笑顔を浮かべたいんですね」"
translation = "「근거가 좀 불안하네요…… 하지만 그렇군요. 회장님께 사랑받기 위해 귀여운 미소를 짓고 싶다는 거군요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「イエス。昨日もさっそく鏡の前で練習したのですが、結果はひどいものでした」"
translation = "「예스. 어제도 당장 거울 앞에서 연습했습니다만, 결과는 처참했습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「『無表情で何時間も鏡を見つめている』と両親からいたく心配されてしまいました。流石に落ち込みます」"
translation = "「『무표정으로 몇 시간이나 거울을 보고 있다』며 부모님이 몹시 걱정하셨습니다. 과연 낙담하게 되네요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「なるほど。それならばやはり、アニマの出番だナ！\u3000可愛い弟子の頼みダ。プリティーキュートな笑顔、薬でばっちり作ってやろウ！」"
translation = "「과연. 그렇다면 역시 아니마의 차례로다! 귀여운 제자의 부탁이다. 프리티 큐트한 미소, 약으로 확실히 만들어주마!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「へいストップ。お薬を前提に話を進めるのはいけません。一旦落ち着きましょう」"
translation = "「헤이 스톱. 약을 전제로 이야기를 진행하면 안 됩니다. 일단 진정하세요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もしも会長が交際をＯＫしてくれた時に、どうするんです？\u3000毎日、笑顔になれる薬を飲むつもりですか」"
translation = "「만약 회장님이 교제를 승낙해 주셨을 때 어떻게 할 건가요? 매일 미소 짓는 약을 마실 셈인가요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……それはそうなのですが。想いを伝える時くらい、素敵な笑顔を浮かべる女の子だと……思ってもらいたいのです」"
translation = "「……그건 그렇습니다만. 마음을 전할 때만큼은 멋진 미소를 짓는 여자아이로…… 생각되고 싶습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なら、なおさら練習です。昨日始めたばかりなんでしょう？\u3000今日も、明日も、明後日も、鏡の前で練習すればいいだけ」"
translation = "「그러니까 더더욱 연습이에요. 어제 시작한 참이잖아요? 오늘도, 내일도, 모레도 거울 앞에서 연습하면 될 뿐이에요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フム……しかし、シュティレは苦手だから相談してるのダロウ？\u3000時間は有限だゾ？」"
translation = "「흠…… 하지만 슈틸레는 서투니까 상담하는 거 아이가? 시간은 유한하다카이?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「笑顔は身に着ければ一生ものです、時間はたっぷりかけてもお釣りがくるでしょう」"
translation = "「미소는 익혀두면 평생의 자산입니다. 시간은 듬뿍 들여도 본전은 뽑고도 남겠죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それにシュティレさん、アニメとロマンを愛する貴女が、修行パートをサボるのはいただけません」"
translation = "「게다가 슈틸레 씨, 애니메이션과 로망을 사랑하는 당신이 수행 파트를 빼먹는 건 용납할 수 없습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……っ！\u3000アナお姉ちゃんの言う通りです。猛省します」"
translation = "「……윽! 아나 언니 말이 맞습니다. 맹성하겠습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。素敵な笑顔を会得して、想いを伝えてください。応援していますよ」"
translation = "「네. 멋진 미소를 터득해서 마음을 전하세요. 응원하고 있을게요」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000錬金術がフられたのは残念だガ、弟子が頑張るというならアニマも応援しなくてはナ！」"
translation = "「후히♪ 연금술이 퇴짜 맞은 건 아쉽다만, 제자가 노력한다면 아니마도 응원해야제!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「頑張ります。素敵な笑顔を体得したその時は、会長へ告ります。ぶい」"
translation = "「노력하겠습니다. 멋진 미소를 체득했을 때는 회장에게 고백하겠습니다. V」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（……別に練習なんてしなくても、そのままで十分愛らしい顔だとは思いますけどね）"
translation = "(……딱히 연습 같은 거 안 해도, 그 자체로 충분히 사랑스러운 얼굴이라고 생각합니다만 말이죠)"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩やシュティレと仲良くなったおかげで、俺は購買部にいつ彼女たちがいるのか、大体わかるようになっていた。"
translation = "아니마 선배나 슈틸레와 친해진 덕분에, 나는 매점에 언제 그녀들이 있는지 대충 알 수 있게 되었다."

[[dialogue]]
speaker = "unk"
original = "小腹が空いているというのに、俺はあえて数時間待ち、シュティレに会えるタイミングで顔を出したのだが──"
translation = "출출한데도 나는 일부러 몇 시간을 기다려 슈틸레를 만날 수 있는 타이밍에 얼굴을 내밀었는데──"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ハッピー、ウレピー、ウイスキー……ハッピー、ウレピー、ウイスキー……」"
translation = "「해피, 우레피, 위스키…… 해피, 우레피, 위스키……」"

[[dialogue]]
speaker = "unk"
original = "錬金術の儀式かな……？"
translation = "연금술 의식인가……?"

[[dialogue]]
speaker = "unk"
original = "鏡に向かって謎の呪文を……！"
translation = "거울을 향해 정체불명의 주문을……!"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「あ……会長。いらっしゃいませ。修行パートを見られてしまいました」"
translation = "「아…… 회장. 어서 오세요. 수행 파트를 들켜버렸군요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「実は今、シュティレは笑顔の練習中なのです。先ほどのはすべて、笑顔を作る上で必要な、表情筋を鍛えることができる単語です」"
translation = "「실은 지금 슈틸레는 미소 연습 중입니다. 방금 전의 것은 전부 미소를 짓는 데 필요한 안면 근육을 단련할 수 있는 단어들입니다」"

[[dialogue]]
speaker = "unk"
original = "笑顔の練習……何でまた急に？"
translation = "미소 연습…… 왜 또 갑자기?"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「それは……その……えーっと……」"
translation = "「그건…… 그…… 그러니까……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「看板娘として、ですね。お客様に素敵なスマイルを届けようと思ったのです。私は表情が硬いので」"
translation = "「간판 아가씨로서 말이죠. 손님들께 멋진 스마일을 전하려고 생각했습니다. 저는 표정이 딱딱해서」"

[[dialogue]]
speaker = "unk"
original = "シュティレの笑顔は、もう十分素敵だよ"
translation = "슈틸레의 미소는 이미 충분히 멋져"

[[dialogue]]
speaker = "unk"
original = "確かにちょっと硬いかもしれないけど"
translation = "확실히 좀 딱딱할지도 모르지만"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「え──」"
translation = "「에──」"

[[dialogue]]
speaker = "unk"
original = "ほら、これを見て"
translation = "자, 이걸 봐"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長のＤＩＳＣ……あ、これは私と会長が、一緒に撮った自撮り……」"
translation = "「회장의 DISC…… 아, 이건 저와 회장이 같이 찍은 셀카……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「数はたくさんありますが、やっぱり笑っていませんよ、これ……」"
translation = "「수는 많습니다만 역시 웃고 있지 않아요, 이거……」"

[[dialogue]]
speaker = "unk"
original = "俺にはどれも違った笑顔に見えるけど"
translation = "내게는 전부 다른 미소로 보이는데"

[[dialogue]]
speaker = "unk"
original = "そうかな？"
translation = "그럴까?"

[[dialogue]]
speaker = "unk"
original = "この写真は目のあたりが柔らかい。この写真は口角が少しだけど上がっている。この写真は──"
translation = "이 사진은 눈가가 부드러워. 이 사진은 입꼬리가 아주 살짝이지만 올라가 있어. 이 사진은──"

[[dialogue]]
speaker = "unk"
original = "俺は１枚ずつ、シュティレがきちんと笑顔を浮かべられていることを説明した。"
translation = "나는 한 장씩, 슈틸레가 제대로 미소를 짓고 있음을 설명했다."

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……会長は、私よりも私のことを、よく見てくれているんですね」"
translation = "「……회장은 저보다 저를 더 잘 봐주고 계시는군요」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「これまで私は……会長の前で、ちゃんと笑えていたでしょうか？」"
translation = "「지금까지 저는…… 회장 앞에서 제대로 웃고 있었나요?」"

[[dialogue]]
speaker = "unk"
original = "今もそうだよ。素敵な笑顔だ"
translation = "지금도 그래. 멋진 미소야"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……ありがとうございます。実はさっき、ちょっとだけ嘘をつきました」"
translation = "「……감사합니다. 사실 방금 조금 거짓말을 했습니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「笑顔を練習していた本当の理由は、素敵な笑顔を体得し、片想いしている男性へ告白をしたかったからなのです」"
translation = "「미소를 연습하던 진짜 이유는, 멋진 미소를 체득해 짝사랑하는 남성에게 고백을 하고 싶었기 때문입니다」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ですが、こうして何度も会長に『素敵だ』と評価されたため、すでに条件はクリアされていると判断します。よって……」"
translation = "「하지만 이렇게 몇 번이고 회장님께 『멋지다』고 평가받았으므로, 이미 조건은 클리어되었다고 판단합니다. 따라서……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「会長──あなたのことが大好きです。私を恋人にしていただけないでしょうか？」"
translation = "「회장── 당신이 너무 좋아요. 저를 연인으로 삼아주지 않으시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "突然の出来事に驚きながらも、俺は強く頷くのだった──"
translation = "갑작스러운 일에 놀라면서도 나는 힘차게 고개를 끄덕이는 것이었다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「シュティレさん……上手くいけばいいのですが。でも笑顔は本当に苦手のようですし、時間がかかるかも……おや？」"
translation = "「슈틸레 씨…… 잘 풀리면 좋겠습니다만. 하지만 미소는 정말 서투른 것 같고, 시간이 걸릴지도…… 어라?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ＤＩＳＣにシュティレさんからメッセージが……なになに。『告りました。ターゲット撃破。ぶい』……は！？」"
translation = "「DISC에 슈틸레 씨로부터 메시지가…… 어디 어디. 『고백했습니다. 타겟 격파. V』…… 하!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まだ２時間しか経ってないんですけど！？」"
translation = "「아직 2시간밖에 안 지났는데요!?」"

