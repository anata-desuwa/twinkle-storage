[[dialogue]]
speaker = "unk"
original = "第１話,悪い子トリシャ,P"
translation = "제1화, 나쁜 아이 트리샤, P"

[[dialogue]]
speaker = "unk"
original = "とある放課後、珍しくトリシャさんが星徒会室に顔を出してくれた。"
translation = "어느 방과 후, 드물게 트리샤 씨가 성도회실에 얼굴을 비춰 주었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「会長さん……今、時間はありますか？\u3000忙しくなければ少しだけ付き合って欲しい、です……」"
translation = "「회장님…… 지금, 시간 있나요? 바쁘지 않다면 조금만 같이 있어 줬으면, 해요……」"

[[dialogue]]
speaker = "unk"
original = "何に付き合えばいいのかな？"
translation = "무엇을 같이 하면 될까?"

[[dialogue]]
speaker = "unk"
original = "今は大丈夫です"
translation = "지금은 괜찮아요"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ありがとう……フフ……新しいフォームを授かってから、新しい占いに取り組むようになったのです……」"
translation = "「고마워요…… 후후…… 새로운 폼을 부여받고 나서, 새로운 점술에 몰두하게 되었답니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「今日はその練習に付き合って欲しいと思いまして……どう、ですか……？」"
translation = "「오늘은 그 연습을 같이 해줬으면 해서요…… 어때, 요……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ええ……問題ありません。むしろ会長さんだけの方が……都合がいいです……」"
translation = "「네…… 문제없습니다. 오히려 회장님뿐인 편이…… 형편이 좋아요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「まだ研究中ですから、あまり公にするものでもありませんし……そもそも占いは人の運命に触れるもの、大勢の前で行うものではありません……」"
translation = "「아직 연구 중이라서, 그다지 공개할 만한 것도 아니고…… 애초에 점술은 사람의 운명에 닿는 것, 많은 사람 앞에서 행할 것이 아니니까요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私が占いで視た会長さんの運命は……２人だけが知っていれば……いいと思います……」"
translation = "「제가 점술로 본 회장님의 운명은…… 둘만이 알고 있으면…… 좋겠다고 생각해요……」"

[[dialogue]]
speaker = "unk"
original = "そうですね"
translation = "그렇네요"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「……では、準備を始めます……変身」"
translation = "「……그럼, 준비를 시작하겠습니다…… 변신」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……新フォームになりました。これで占いの効果も上昇するはずです……」"
translation = "「후후…… 새 폼이 되었습니다. 이것으로 점술의 효과도 상승할 거예요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「それでは会長さん、そちらにおかけになって下さい……心安らかに……そうです、気を静めて……」"
translation = "「그러면 회장님, 그쪽에 앉아 주세요…… 마음 편히…… 그래요, 마음을 가라앉히고……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「失礼して、香を焚きますね……フフフ……ご安心を……危険なものではありませんよ……」"
translation = "「실례해서, 향을 피울게요…… 후후후…… 안심하시길…… 위험한 것이 아니니까요……」"

[[dialogue]]
speaker = "unk"
original = "中華料理が食べたくなる匂いだ"
translation = "중화요리가 먹고 싶어지는 냄새다"

[[dialogue]]
speaker = "unk"
original = "いい香りがしてきた"
translation = "좋은 향기가 나기 시작했다"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「占いが終わったらカフェテリアに行きましょう……会長さんの食欲を満たすものが見つかるはずです……」"
translation = "「점술이 끝나면 카페테리아에 가요…… 회장님의 식욕을 채워줄 것을 찾을 수 있을 거예요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「さて、香の煙も広がってきました……まずは……そうですね、簡単なところから……<ruby>筮竹<rt>ぜいちく</rt></ruby>を使って仕事運を占ってみましょう……」"
translation = "「자, 향의 연기도 퍼졌네요…… 우선은…… 그렇네요, 간단한 것부터…… 시초를 사용해서 직업운을 점쳐 보죠……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「…………視えました。会長さんの仕事運は――」"
translation = "「………… 보였습니다. 회장님의 직업운은──」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「星の巡り良し、但し天空に灰色の巨星在り、汝を求める声多く、多忙を極める也……」"
translation = "「별의 흐름은 좋으나, 단 천공에 회색의 거성이 있고, 그대를 찾는 목소리 많아, 몹시 바쁠지어다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「と、出ました。このフォームの能力を引き出して占いましたので……うまくできているかどうかは……」"
translation = "「라고, 나왔습니다. 이 폼의 능력을 끌어내어 점쳤으므로…… 잘 되었는지는……」"

[[dialogue]]
speaker = "unk"
original = "ほら、そこに書類の山が"
translation = "봐요, 거기에 서류 더미가"

[[dialogue]]
speaker = "unk"
original = "残念ながら当たってます"
translation = "유감스럽게도 맞았네요"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ……これは失礼しました……今まさにお忙しいのですね……でしたら、私の占いにお付き合いさせるわけには……」"
translation = "「아…… 이거 실례했습니다…… 지금 마침 바쁘신 거군요…… 그렇다면, 제 점술에 어울리게 할 수는……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いえ……この是非についても占ってみましょう。あと少しだけお付き合いください」"
translation = "「아니요…… 이 시비에 대해서도 점쳐 보죠. 조금만 더 함께해 주세요」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「次はこちらを使います。算木……と呼ばれるものだそうです……」"
translation = "「다음은 이것을 사용합니다. 산기……라고 불리는 것이라고 해요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「これで近い未来の行く末を視てみましょう……占いを続けるが吉か、終わらせるが吉か……」"
translation = "「이것으로 가까운 미래의 행방을 보죠…… 점술을 계속하는 것이 길인가, 끝내는 것이 길인가……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「……出ました。フフフ、占いを続けた方がいいみたいですね……一時的に仕事は滞りますが、良い気分転換になり、効率があがるでしょう」"
translation = "「……나왔습니다. 후후후, 점술을 계속하는 편이 좋을 것 같네요…… 일시적으로 업무는 지체되겠지만, 좋은 기분 전환이 되어, 효율이 오를 거예요」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですのでもう少しだけ……次は会長さんに占う事柄を決めてもらいましょう」"
translation = "「그러니 조금만 더…… 다음은 회장님이 점칠 내용을 정해 주세요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「難しく考える必要はありません……思い浮かんだものを口にしてみてください」"
translation = "「어렵게 생각하실 필요는 없어요…… 떠오르는 걸 입 밖으로 내보세요.」"

[[dialogue]]
speaker = "unk"
original = "恋愛運が知りたいです"
translation = "연애운이 알고 싶어요"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフ……なるほど恋愛運ですか……会長さんも多感なお年頃ですからね……」"
translation = "「후후…… 과연 연애운인가요…… 회장님도 감수성 풍부한 나이대니까요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「しかし……今の会長さんには不要だと思いますが……」"
translation = "「하지만…… 지금의 회장님에게는 필요 없다고 생각합니다만……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「少なくとも、私、という恋人がいて……そして仲睦まじく……良縁を築いているのですから……」"
translation = "「적어도, 저라는 연인이 있고…… 그리고 화목하게…… 좋은 인연을 쌓고 있으니까요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「一般的に私たちの関係は……恋人同士、と呼称するはずです……」"
translation = "「일반적으로 우리 관계는…… 연인 사이, 라고 지칭할 거예요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そそ、それとももしかして、私に恋人として至らぬ点が？\u3000確かに他の皆さんより一般常識に欠けますし、お友達も……少し増えましたが、まだまだ少ないですし」"
translation = "「그, 그, 그게 아니면 설마, 제가 연인으로서 부족한 점이? 확실히 다른 분들보다 일반 상식이 부족하고, 친구도…… 조금 늘었지만, 아직 적으니까요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そうです、ミルフィーさんにオトモダチと呼んで頂けて調子に乗っていたのでしょう。フフフ、お友達として未熟な私が恋人としてうまくやれるはずがありません……」"
translation = "「맞아요, 밀피 씨가 친구라고 불러주셔서 우쭐해져 있었나 봐요. 후후후, 친구로서 미숙한 제가 연인으로서 잘해나갈 수 있을 리가 없어요……」"

[[dialogue]]
speaker = "unk"
original = "そんなことないよ"
translation = "그렇지 않아"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「すみません……また余計に不安をかき立てるようなことを口にしてしまいました……」"
translation = "「죄송해요…… 또 괜히 불안을 부추기는 말을 입 밖으로 내버렸네요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「前にも申し上げましたが、私はいずれ師匠を探すために旅立つ宿命にあります……」"
translation = "「전에도 말씀드렸지만, 저는 언젠가 스승님을 찾기 위해 떠나야 할 숙명에 있습니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですから、この人間界においては誰とも深い縁を結ばず、漂泊し続けるべき……そう、お伝えしました……」"
translation = "「그러니, 이 인간계에서는 누구와도 깊은 인연을 맺지 않고, 계속 떠돌아야 한다…… 그렇게, 전해 드렸죠……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「それなのに……会長さんは……うう、思い出すだけで頬が熱くなってきますが……」"
translation = "「그런데도…… 회장님은…… 우우, 생각하는 것만으로 볼이 뜨거워집니다만……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「トリシャが旅に出る時は、俺も一緒だ……と言ってくれました……」"
translation = "「트리샤가 여행을 떠날 때는, 나도 함께야…… 라고 말해주셨죠……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「しかも、言うだけに留まらず……好きだ、と熱く思いの丈をぶつけてきて……更に更にっ、私を逃がさないようにきつく抱擁を……ぎゅううう～～っと……」"
translation = "「게다가, 말로만 그치지 않고…… 좋아한다고, 뜨겁게 마음을 부딪쳐 오고…… 거기다 거기다, 제가 도망치지 못하게 꽉 포옹을…… 꾸우우욱~~ 하고……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私があなたの熱意に屈し、恋する気持ちを受け入れたら……そ、その……にへへ<emoji=heart04>」"
translation = "「제가 당신의 열의에 굴복해, 사랑하는 마음을 받아들였더니…… 그, 그…… 헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ちゅー……されてしまいました<emoji=heart04>」"
translation = "「쪽…… 당해버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「駄目駄目いけません、あの時の熱い口付けを思い出すだけで、私は……私は……」"
translation = "「안 돼요 안 돼, 그때의 뜨거운 입맞춤을 떠올리는 것만으로, 저는…… 저는……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「悪い子になってしまいそうです<emoji=heart04>」"
translation = "「나쁜 아이가 되어버릴 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いえ……占い師にあるまじく、恋に溺れた身……既に悪い子であると見做すべきでしょう……」"
translation = "「아니요…… 점술가답지 않게, 사랑에 빠진 몸…… 이미 나쁜 아이로 간주해야겠죠……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「フフフ……会長さん<emoji=heart04>」"
translation = "「후후후…… 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嫌な予感がしてきた"
translation = "불길한 예감이 들기 시작했다"

[[dialogue]]
speaker = "unk"
original = "なに？"
translation = "뭐야?"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ちょうどここに私たち以外が不在なのも、きっと星の導きです……」"
translation = "「마침 이곳에 우리 말고 아무도 없는 것도, 분명 별의 인도예요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「少しだけ……こ、恋人的なこと……したくありませんか……？」"
translation = "「조금만…… 그, 연인 같은 짓…… 하고 싶지 않으신가요……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ちゅ<emoji=heart04>\u3000ってするだけですから……昨日はしましたけど、今日はまだしてもらっていませんし……夜まで待てないかもしれません……」"
translation = "「쪽<emoji=heart04> 하고 할 뿐이니까요…… 어제는 했지만, 오늘은 아직 안 해주셨고…… 밤까지 못 기다릴지도 몰라요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ね、会長さん……私、悪い子ですから<emoji=heart04>」"
translation = "「네, 회장님…… 저, 나쁜 아이니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「……………………ちゅ<emoji=heart04>」"
translation = "「……………………쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、意外にも押しが強いトリシャさんに応えて、俺たちは内緒のキスを交わすのだった。"
translation = "이렇게, 의외로 밀어붙이는 기세가 강한 트리샤 씨에게 응해서, 우리들은 비밀 키스를 나누는 것이었다."

