[[dialogue]]
speaker = "unk"
original = "第２話,釣りをするぞ！,P"
translation = "제2화, 낚시를 하자!, P"

[[dialogue]]
speaker = "unk"
original = "また別の日──"
translation = "또 다른 어느 날──"

[[dialogue]]
speaker = "アポロ"
original = "「──釣りをするぞ、魔王！」"
translation = "「──낚시를 하자, 마왕!」"

[[dialogue]]
speaker = "アポロ"
original = "「なんでかって？\u3000へへ……リップルからいいスポットを教えてもらったんだ。魚がバンバン釣れるらしーぜ！」"
translation = "「왜냐고? 헤헤…… 리플한테 좋은 포인트를 추천받았거든. 물고기가 팡팡 낚인다는 모양이라구!」"

[[dialogue]]
speaker = "アポロ"
original = "「つっても、あたしは釣りなんかやったことないからよ。どうしたもんかと思ってたんだが……」"
translation = "「그렇다곤 해도, 난 낚시 같은 건 해본 적이 없어서 말이야. 어떻게 해야 하나 싶었는데……」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王は釣りの名人だって聞いたぞ！\u3000昔やってたんだろ？\u3000なあなあ、あたしにも教えてくれよ～！」"
translation = "「마왕은 낚시의 명인이라고 들었어! 옛날에 했었다며? 응? 응? 나한테도 좀 가르쳐줘~!」"

[[dialogue]]
speaker = "unk"
original = "釣りの道は厳しいぞ"
translation = "낚시의 길은 험난하다고"

[[dialogue]]
speaker = "unk"
original = "それほどでも"
translation = "그 정도까지는"

[[dialogue]]
speaker = "アポロ"
original = "「よっしゃ、サンキューな！\u3000さっそく教えてもらったアナバまでいこーぜ！」"
translation = "「좋았어, 고마워! 당장 가르쳐준 아지트까지 가보자구!」"

[[dialogue]]
speaker = "unk"
original = "アポロに連れられ向かった岩礁地帯で、ルアーフィッシングの簡単なやり方をレクチャーすることに……。"
translation = "아폴로에게 이끌려 향한 암초 지대에서, 루어 낚시의 간단한 방법을 강의하게 되는데……."

[[dialogue]]
speaker = "アポロ"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "アポロ"
original = "「むむ……なあ……さっきから竿がピクリとも動かないぞ。やり方、間違ってないか？」"
translation = "「음음…… 저기…… 아까부터 낚싯대가 꿈쩍도 안 해. 방법, 틀린 거 아냐?」"

[[dialogue]]
speaker = "アポロ"
original = "「まだ５分しか経ってない？\u3000いやいや、もう５分だろ！\u3000この５分があったらなんでもできるぞ──ドッジとか、ビーチバレーとか！」"
translation = "「아직 5분밖에 안 지났다고? 아니아니, 벌써 5분이라구! 이 5분이면 뭐든 할 수 있어── 피구라든가, 비치발리볼이라든가!」"

[[dialogue]]
speaker = "unk"
original = "アポロは、どうせならばと海の家から一番大型のロッドを借りてきていた。初心者があれでは苦戦するだろう。"
translation = "아폴로는 이왕 하는 김에 바다의 집에서 가장 커다란 로드를 빌려온 상태였다. 초보자가 저런 걸로는 고전할 수밖에 없으리라."

[[dialogue]]
speaker = "アポロ"
original = "「え？\u3000そうやって地道に待つことが釣りのコツ……？\u3000むぅ──ならしょうがないな……」"
translation = "「에? 그렇게 끈기 있게 기다리는 게 낚시의 요령……? 으음── 그럼 어쩔 수 없지……」"

[[dialogue]]
speaker = "unk"
original = "しかし、その後──"
translation = "하지만, 그 후──"

[[dialogue]]
speaker = "アポロ"
original = "「──おおっ！？\u3000なんか引っかかったぞ！」"
translation = "「──오오!? 뭔가 걸렸어!」"

[[dialogue]]
speaker = "アポロ"
original = "「──釣れた！\u3000見ろ見ろ魔王、こいつはどうだ！？」"
translation = "「──낚았다! 봐봐 마왕, 이 녀석은 어때!?」"

[[dialogue]]
speaker = "unk"
original = "これは……"
translation = "이건……"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "アポロ"
original = "「ん？\u3000どーした、目ん玉ひん剥いて」"
translation = "「응? 왜 그래, 눈을 그렇게 크게 뜨고」"

[[dialogue]]
speaker = "アポロ"
original = "「わーたた、ピチピチ跳ねるなって！\u3000威勢がいいなこいつ」"
translation = "「와앗, 파닥파닥 뛰지 마! 기운이 넘치는 녀석이네」"

[[dialogue]]
speaker = "unk"
original = "アポロが釣り上げたのは、彼女が両手で抱えるほど巨大なハタの一種だった。"
translation = "아폴로가 낚아 올린 것은, 그녀가 양손으로 안아야 할 정도로 거대한 바리류의 일종이었다."

[[dialogue]]
speaker = "アポロ"
original = "「ん？\u3000びぎなーずらっく？\u3000魚の名前か？」"
translation = "「응? 비기너즈 럭? 물고기 이름이야?」"

[[dialogue]]
speaker = "アポロ"
original = "「それよりさ、なあ。どうなんだ、この魚？\u3000ウマイのか？」"
translation = "「그보다 말이야, 어때? 이 물고기, 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "毒があるかも"
translation = "독이 있을지도 몰라"

[[dialogue]]
speaker = "unk"
original = "食用じゃない"
translation = "식용이 아니야"

[[dialogue]]
speaker = "アポロ"
original = "「へ──食べれる部位がない？\u3000なんだよそれ～！\u3000せっかく釣れたと思ったのによ」"
translation = "「헤── 먹을 수 있는 부위가 없어? 뭐야 그게~! 기껏 낚았다고 생각했는데 말이야」"

[[dialogue]]
speaker = "アポロ"
original = "「ちぇっ、まあいいや。そんなら用はねーし、喉に引っかかった程度っぽいから海に返しとくか」"
translation = "「쳇, 뭐 상관없어. 그럼 용건은 없으니까, 목에 살짝 걸린 정도인 것 같으니 바다로 돌려보내 줄까」"

[[dialogue]]
speaker = "unk"
original = "リゾート結界の海には、南国の水温に適したカラフルな魚が多くいることがわかっていた。"
translation = "리조트 결계의 바다에는 남국의 수온에 적합한 화려한 물고기가 많이 서식하고 있다는 것을 알 수 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「んで、魔王のほうは？」"
translation = "「그래서, 마왕 쪽은?」"

[[dialogue]]
speaker = "unk"
original = "達人は粘るもの"
translation = "달인은 끈기 있게 기다리는 법"

[[dialogue]]
speaker = "unk"
original = "まだ……"
translation = "아직……"

[[dialogue]]
speaker = "アポロ"
original = "「なるほどな。さらなる大物にしか興味ねーってわけか……それでこそあたしのライバル！」"
translation = "「과연. 더 큰 대물에만 관심이 있다는 건가…… 그래야 내 라이벌답지!」"

[[dialogue]]
speaker = "アポロ"
original = "「俄然こっちも燃えてきたぜ。よし、この調子でどんどん釣り上げてやるぞ！」"
translation = "「갑자기 이쪽도 의욕이 불타오르는데. 좋아, 이 기세로 팍팍 낚아 올려 주겠어!」"

[[dialogue]]
speaker = "unk"
original = "そうして、数時間──"
translation = "그렇게, 수 시간──"

[[dialogue]]
speaker = "アポロ"
original = "「おっと──またかかったぞ！」"
translation = "「오옷── 또 걸렸다!」"

[[dialogue]]
speaker = "アポロ"
original = "「──って、あーあ。またさっきのデカコブ魚だ。食えないデカブツばっか釣れてもしょーがねーなあ」"
translation = "「──라니, 아아. 또 아까 그 커다란 혹 물고기네. 못 먹는 덩치들만 낚여봤자 소용없는데 말이야」"

[[dialogue]]
speaker = "unk"
original = "アポロはあれから、見たこともないような珍しい魚をバンバン釣り上げていた。"
translation = "아폴로는 그때부터 본 적도 없는 희귀한 물고기들을 펑펑 낚아 올리고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「ん？\u3000暴れるのに重くないのかって？\u3000んまあ、いつも担いでる大剣に比べたら大した重量じゃねーな」"
translation = "「응? 날뛰는데 무겁지 않냐고? 뭐어, 평소에 짊어지고 다니는 대검에 비하면 별거 아닌 무게지」"

[[dialogue]]
speaker = "アポロ"
original = "「んで、魔王はどうだ？\u3000あれからだいぶ時間も経ったけど……」"
translation = "「그래서 마왕은 어때? 아까부터 시간도 꽤 지났는데……」"

[[dialogue]]
speaker = "unk"
original = "一匹だけ……"
translation = "한 마리만……"

[[dialogue]]
speaker = "unk"
original = "アジが……"
translation = "전갱이가……"

[[dialogue]]
speaker = "アポロ"
original = "「アジ？\u3000へー、すげーな！\u3000きっと焼いたらウマイんだろうな」"
translation = "「전갱이? 헤에, 대단한걸! 분명 구우면 맛있겠지」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしも負けてらんないぜ。魔王に負けないくらいウマイ魚をきっと──」"
translation = "「나도 지고 있을 순 없지. 마왕에게 지지 않을 만큼 맛있는 물고기를 반드시──」"

[[dialogue]]
speaker = "リップル"
original = "「ハーイ、アポロにカイチョー！\u3000ワタシ秘蔵のスポットで、海釣りを楽しんでマスカ──って」"
translation = "「하~이, 아폴로에 회장님! 제가 아껴둔 포인트에서 바다낚시를 즐기고 있슴까── 어라」"

[[dialogue]]
speaker = "リップル"
original = "「ワーオ！？\u3000こ、これはリゾート結界にただ１匹だけ生息しているという伝説のヌシ──釣り上げたのは一体！？」"
translation = "「와오!? 이, 이것은 리조트 결계에 단 한 마리만 서식한다는 전설의 주인── 낚아 올린 건 대체 누구임까!?」"

[[dialogue]]
speaker = "アポロ"
original = "「おうリップル！\u3000サンキューな。オマエの教えてくれたスポット、それなりに魚が釣れるぞ」"
translation = "「오 리플! 고마워. 네가 가르쳐준 포인트, 나름대로 물고기가 잘 낚여」"

[[dialogue]]
speaker = "リップル"
original = "「た、確かに穴場は教えマシタけど……ここまで大漁に釣ってるアングラーは初めて見マシタ！」"
translation = "「확, 확실히 아지트를 가르쳐주긴 했슴다만…… 이렇게 대량으로 낚아 올리는 앵글러는 처음 봄다!」"

[[dialogue]]
speaker = "リップル"
original = "「まさにタイコーボー！\u3000天才釣り人の誕生デ～ス！」"
translation = "「그야말로 강태공! 천재 낚시꾼의 탄생임다~!」"

[[dialogue]]
speaker = "アポロ"
original = "「──お、また釣れた。ってまたデカブツじゃねーか。よし、しょーがねーから次はこいつを餌にして……っと……」"
translation = "「──오, 또 낚였다. 이번에도 덩치 큰 녀석이잖아. 좋아, 어쩔 수 없으니 다음은 이 녀석을 미끼로 써서……」"

[[dialogue]]
speaker = "unk"
original = "そうして、最終的に──"
translation = "그렇게, 최종적으로──"

[[dialogue]]
speaker = "アポロ"
original = "「──んまい！」"
translation = "「──맛있어!」"

[[dialogue]]
speaker = "アポロ"
original = "「むしゃむしゃ……！\u3000アジの塩焼きって、こんなにウマかったんだな！\u3000もぐもぐ……！」"
translation = "「쩝쩝……! 전갱이 소금구이가 이렇게 맛있는 거였구나! 우걱우걱……!」"

[[dialogue]]
speaker = "unk"
original = "アポロの胃袋に収まることとなったのは、こちらの釣り上げた平均サイズのアジやキスたちだった。"
translation = "아폴로의 위장 속으로 들어가게 된 것은, 이쪽이 낚아 올린 평범한 사이즈의 전갱이와 보리멸들이었다."

[[dialogue]]
speaker = "アポロ"
original = "「こんなにおいしい魚も釣れるなんて、さすがは魔王だな！\u3000見直したぜ」"
translation = "「이렇게 맛있는 물고기도 낚다니, 역시 마왕이네! 다시 봤어」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしときたら、デカくてカラフルなのばっかりで、どいつもてんで食べられやしなかったもんな。今回ばかりは完敗と認めざるをえないぜ」"
translation = "「나로 말할 것 같으면, 크고 화려한 것들뿐이라 하나같이 도저히 먹을 수가 없었으니까 말이야. 이번만큼은 완패라고 인정할 수밖에 없겠어」"

[[dialogue]]
speaker = "アポロ"
original = "「あの、カジキだっけ？\u3000でけーし痛そうなヤツは、あんまり暴れるから可愛そうで逃がしちゃったしな」"
translation = "「그, 청새치였나? 크고 아파 보이는 녀석은 너무 날뛰어서 불쌍하길래 놓아줬고 말이야」"

[[dialogue]]
speaker = "アポロ"
original = "「まったく魔王には敵わないぜ！\u3000また、あたしに釣りを教えてくれよな！」"
translation = "「정말 마왕에겐 못 당하겠어! 나중에 또 낚시 가르쳐줘!」"

[[dialogue]]
speaker = "unk"
original = "（静かな努力を誓う）"
translation = "（조용한 노력을 맹세한다）"

[[dialogue]]
speaker = "unk"
original = "はは……"
translation = "하하……"

[[dialogue]]
speaker = "unk"
original = "釣り人として、去来する敗北感のなか……"
translation = "낚시꾼으로서 밀려오는 패배감 속에서……"

[[dialogue]]
speaker = "unk"
original = "次回までに必ずやフィッシングテクニックを磨いておこうと、静かな誓いを胸に秘めるのだった。"
translation = "다음번까지 반드시 낚시 테크닉을 연마해 두겠노라고, 조용한 맹세를 가슴에 품는 것이었다."

