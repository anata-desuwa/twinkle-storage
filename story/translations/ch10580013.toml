[[dialogue]]
speaker = "unk"
original = "第３話,ヘレナちゃんとデート,P"
translation = "제3화, 헤레나짱과 데이트, P"

[[dialogue]]
speaker = "unk"
original = "とある休日、ヘレナちゃんから暇なら付き合えと呼び出されて、街へとやってきた――"
translation = "어느 휴일, 헤레나짱으로부터 한가하면 어울려 달라는 호출을 받고 거리로 나오게 되었다――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、よくぞきた、魔王よ」"
translation = "「후훗, 잘 왔다, 마왕이여」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――ここで一体なにをするのか、とな？\u3000男女２人が揃えば、決まっていよう」"
translation = "「――여기서 도대체 무엇을 할 것인가, 라고? 남녀 두 사람이 모였으니, 정해져 있지 않겠나」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ズバリ、『デート』だ」"
translation = "「바로, 『데이트』다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――ふふっ、夢にも思ってなかったという顔だな。前から貴殿のことは好みだと言っていたであろう？」"
translation = "「――후훗, 꿈에도 생각지 못했다는 얼굴이군. 전부터 귀하가 마음에 든다고 말하지 않았었나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「このプリティでゴージャスな九浄ヘレナちゃんの初めてのデート相手に選ばれたこと、光栄に思うがよい」"
translation = "「이 프리티하고 고저스한 쿠죠 헤레나짱의 첫 데이트 상대로 선택된 것, 영광으로 알도록」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「む？\u3000なにをそんな意外そうな顔をしている？」"
translation = "「음? 왜 그렇게 의외라는 표정을 짓고 있지?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――モテそうなのに、デートするのが初めてなんて驚いた？」"
translation = "「――인기 많을 것 같은데, 데이트하는 게 처음이라서 놀랐나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ああ、モテるとも。ただし、寄ってくる男は揃いも揃って欲に目のくらんだ、私の好みとは程遠い連中ばかりだったがな」"
translation = "「아아, 인기는 많고말고. 하지만 꼬이는 남자들은 하나같이 욕망에 눈이 먼, 내 취향과는 거리가 먼 녀석들뿐이었으니까」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そんな中で、九浄家の財にも権力にも特別興味はありませんという可愛い顔をした、貴殿が現れた」"
translation = "「그런 와중에, 쿠죠가의 재산에도 권력에도 특별히 흥미 없습니다 하는 귀여운 얼굴을 한 귀하가 나타났다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「故に、デートがしてみたいと思ったのだ」"
translation = "「고로, 데이트가 해보고 싶다고 생각한 것이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――そういうわけで今日１日、ワガママに付き合ってもらえるか？」"
translation = "「――그런 이유로 오늘 하루, 내 어리광에 어울려 주겠나?」"

[[dialogue]]
speaker = "unk"
original = "は、はい。俺でよければ……"
translation = "네, 네. 저라도 괜찮다면……"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「であれば、魔王よ。この九浄ヘレナについてくるがよい」"
translation = "「그렇다면 마왕이여. 이 쿠죠 헤레나를 따라오도록」"

[[dialogue]]
speaker = "unk"
original = "デートが始まると、いくつもの高級洋服店をはしごしながら、着せ替えをされる羽目になった。"
translation = "데이트가 시작되자, 여러 곳의 고급 옷가게를 전전하며 인형 놀이의 제물이 되는 처지가 되었다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、よいぞ。実に面白い。貴殿は可愛い顔立ちで、かつ素朴であるが故に、服装で大きくイメージが様変わりする。素材として申し分ない」"
translation = "「후훗, 좋군. 실로 흥미로워. 귀하는 귀여운 이목구비에 소박함까지 갖추고 있어, 복장에 따라 이미지가 크게 변하는군. 소재로서 나무랄 데 없다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「先程の紳士服もよかったが、その服も実によく似合っているぞ。我ながら会心のコーディネート。まさに――」"
translation = "「방금 전의 신사복도 좋았지만, 그 옷도 정말 잘 어울리는구나. 나로서도 회심의 코디네이트. 그야말로――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「完璧な女装だ！」"
translation = "「완벽한 여장이다!」"

[[dialogue]]
speaker = "unk"
original = "いや、なんで女装！？"
translation = "아니, 왜 여장이야!?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふっ……可愛い子には旅をさせよ、というであろう？」"
translation = "「훗…… 귀한 자식일수록 여행을 보내라고 하지 않나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「とりあえず、試着したものは全部は購入して、プレゼントしよう。どれも捨て難いからな」"
translation = "「일단 시착해 본 건 전부 구입해서 선물해주마. 어느 것 하나 버리기 아까우니 말이야」"

[[dialogue]]
speaker = "unk"
original = "この服も！？"
translation = "이 옷도!?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――もしリノに見つかったら、どう言い訳するのか、とな？\u3000ふふふっ♪\u3000それは想像したら、面白そうであるがな」"
translation = "「――만약 리노에게 들키면 어떻게 변명할 거냐고? 후후후♪ 그건 상상만 해도 재미있겠는걸」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さて、デートで来ているのだし、私もなにか試着するとしよう」"
translation = "「자, 데이트하러 온 것이니 나도 뭔가를 입어보도록 할까」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「貴殿に見せて、どんな衣装が好みなのか、聞いてみたいところであるしな」"
translation = "「귀하에게 보여주고 어떤 의상이 취향인지 물어보고 싶기도 하니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "そこから、ヘレナちゃんのプリティーでゴージャスなファッションショーが始まるのだった――"
translation = "그때부터 헤레나짱의 프리티하고 고저스한 패션쇼가 시작되는 것이었다――"

[[dialogue]]
speaker = "unk"
original = "洋服店を後にして、次にヘレナちゃんが向かった場所は、なんと猫カフェであった。"
translation = "옷가게를 뒤로하고 다음에 헤레나짱이 향한 곳은 놀랍게도 고양이 카페였다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はああぁぁぁ<emoji=heart04>\u3000見るがよい、魔王よ！\u3000この愛くるしい猫共の姿を<emoji=heart04>」"
translation = "「하아아아아아<emoji=heart04> 보아라, 마왕이여! 이 사랑스러운 고양이들의 모습을<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふふ<emoji=heart04>\u3000おのれ、そんなラブリーな声をにゃんにゃん上げても、この九浄ヘレナは落とせぬぞ<emoji=heart04>」"
translation = "「후후후<emoji=heart04> 이놈, 그런 러블리한 목소리로 냥냥 거려도 이 쿠죠 헤레나는 넘어가지 않는다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「逆にこのヘレナちゃんが、たっぷりと弄んでくれよう。ほ～ら、こっちにくるがよい<emoji=heart04>\u3000にゃ～<emoji=heart04>」"
translation = "「역으로 이 헤레나짱이 듬뿍 예뻐해 주마. 자~ 이쪽으로 오너라<emoji=heart04> 냥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふふ♪\u3000貴殿、警戒せずに寄ってくるとは、迂闊な猫め。捕まえたぞ<emoji=heart04>」"
translation = "「후후후♪ 귀하, 경계도 하지 않고 다가오다니 방심한 고양이로군. 잡았다<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「にゃ～<emoji=heart04>\u3000にゃんにゃん<emoji=heart04>\u3000にゃ～<emoji=heart04>」"
translation = "「냥~<emoji=heart04> 냥냥<emoji=heart04> 냥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うりうり～<emoji=heart04>\u3000ふふっ、ここがよいのか？\u3000ごろごろ言っておるぞ<emoji=heart04>」"
translation = "「우리우리~<emoji=heart04> 후훗, 여기가 좋은 게냐? 가르릉거리고 있구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「っと、魔王よ、どうした？\u3000貴殿もそこで見ておらず、こちらへきて一緒に愛でるがよい。猫はよいぞ？」"
translation = "「앗, 마왕이여, 왜 그러지? 귀하도 거기서 보고만 있지 말고 이쪽으로 와서 같이 예뻐해 주도록 해라. 고양이는 좋다고?」"

[[dialogue]]
speaker = "unk"
original = "猫も可愛いが、それにデレデレなヘレナちゃんも可愛いと思ってしまうのだった――"
translation = "고양이도 귀엽지만, 거기에 푹 빠진 헤레나짱도 귀엽다고 생각하게 되는 것이었다――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――そろそろ引き上げ時か。今日は実に有意義なデートであった」"
translation = "「――슬슬 돌아갈 시간인가. 오늘은 실로 유의미한 데이트였다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「気の合う男と出歩くのは、こんなにも楽しいものなのだな。教えてくれて感謝するぞ、魔王よ」"
translation = "「마음이 맞는 남자와 나들이하는 것이 이렇게나 즐거운 것이었군. 가르쳐 줘서 고맙다, 마왕이여」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――ああ、衣装は礼は別によい。代わりに、今日プレゼントした衣装は、星徒会の小娘たちにも見せてやれ。きっと面白い反応が返ってくるぞ？」"
translation = "「――아아, 의상 선물은 답례할 필요 없다. 대신 오늘 선물한 의상은 성도회의 계집애들에게도 보여주도록 해. 분명 재미있는 반응이 돌아올 테니까?」"

[[dialogue]]
speaker = "unk"
original = "女装は見せないよ！？"
translation = "여장은 안 보여줄 거야!?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、みな喜ぶと思うがな。さて、しばし待つがよい。家の者を呼ぶ。自宅まで車で送るぞ」"
translation = "「후훗, 다들 기뻐할 거라 생각하지만 말이야. 자, 잠시 기다리거라. 집 사람을 부르마. 집까지 차로 데려다주지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――ん？\u3000どうした、魔王よ。私になにか言いたいことでもあるのか？」"
translation = "「――응? 왜 그러나, 마왕이여. 나에게 무슨 할 말이라도 있나?」"

[[dialogue]]
speaker = "unk"
original = "またデートに誘ってもいい？"
translation = "다음에 또 데이트 신청해도 돼?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……！\u3000ほう？\u3000このヘレナちゃんとまたデートに来たいと？」"
translation = "「……! 호오? 이 헤레나짱과 또 데이트하고 싶다고?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、ふふふふっ！\u3000可愛いことを言うではないか」"
translation = "「후훗, 후후후후! 귀여운 소리를 하는군」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ならば今度の時は、貴殿にエスコートしてもらうとしよう」"
translation = "「그렇다면 다음번엔 귀하가 에스코트해 주도록 해라」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「期待しているぞ？」"
translation = "「기대하고 있겠다?」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんはそう言って、嬉しそうに微笑むのだった――"
translation = "헤레나짱은 그렇게 말하며 기쁜 듯이 미소 짓는 것이었다――"

