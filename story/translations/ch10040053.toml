[[dialogue]]
speaker = "unk"
original = "第３話,謎の芸術家・アポロシー出没！,P"
translation = "제3화, 수수께끼의 예술가 아폴로시 출몰!, P"

[[dialogue]]
speaker = "unk"
original = "黒ベア子の出現からしばらく──"
translation = "흑베아코의 출현으로부터 한동안──"

[[dialogue]]
speaker = "unk"
original = "アポロは未だ、フレイムフォームから元に戻れないままでいた。"
translation = "아폴로는 여전히, 플레임 폼에서 원래대로 돌아오지 못한 채로 있었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぐむむ……ぐぬぬ……むぅ……どうしたもんか……むぅ……ああして……いや……うぅん……だが…………」"
translation = "「구무무…… 구누누…… 으음…… 어떻게 하면 좋을까…… 으음…… 그렇게 해서…… 아니…… 으으음…… 하지만…………」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああいや、つらいとか苦しいとかじゃないんだ。体は大丈夫だ」"
translation = "「아아 아니, 힘들거나 괴로운 건 아냐. 몸은 괜찮다구」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ただ……この格好でいると、どうにもインスピレーションが湧き上がるのを抑えられないんだ」"
translation = "「다만…… 이 복장으로 있으면, 도저히 인스피레이션이 솟구치는 걸 억제할 수 없다구」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「この……心の奥底から燃え上がる創作意欲！\u3000今のあたしは──筆を取らずにはいられないっ！」"
translation = "「이…… 마음속 깊은 곳에서 타오르는 창작 의욕! 지금의 나는── 붓을 들지 않고는 못 배기겠어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「く……あぁっ！\u3000もうダメだ、あたしはあたしの表現をするぞ魔王──！」"
translation = "「윽…… 아앗! 이제 안 돼, 나는 나의 표현을 하겠다 마왕──!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ここを──こうして──こうで──最後にインクを──よし、仕上げだ！」"
translation = "「여기를── 이렇게── 이래서── 마지막에 잉크를── 좋아, 마무리다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふぅ、一丁あがりっと……！\u3000見ろ、これがあたし作の芸術作品──『バルーンで遊ぶヒーロー』だ！」"
translation = "「후우, 하나 완성했다구……! 봐라, 이게 내가 만든 예술 작품── 『풍선으로 노는 히어로』다!」"

[[dialogue]]
speaker = "unk"
original = "壁に絵を描いちゃダメだって！"
translation = "벽에 그림을 그리면 안 된다니까!"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それについちゃ済まない。あふれるインスピレーションを抑えきれなかった」"
translation = "「그 점에 대해선 미안해. 넘쳐흐르는 인스피레이션을 억제할 수 없었어」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──だが！\u3000真の芸術にキャンバスなんて関係ない。あたしの筆が舞った場所、そこがキャンバスだ！」"
translation = "「──하지만! 진정한 예술에 캔버스 따윈 상관없어. 내 붓이 춤춘 장소, 그곳이 캔버스다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ほら、学園長も言ってただろ。あたしの新しい<ruby>焔<rt>ほむら</rt></ruby>に身を任せろって」"
translation = "「봐, 학원장도 말했잖아. 나의 새로운 <ruby>불꽃<rt>호무라</rt></ruby>에 몸을 맡기라고」"

[[dialogue]]
speaker = "unk"
original = "確かに……"
translation = "확실히……"

[[dialogue]]
speaker = "unk"
original = "余計なことを……"
translation = "쓸데없는 소리를……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うーん、まさにアートだ……我ながら惚れ惚れする出来栄えだぜ。むむ……ますます創作意欲が湧いてきたぞ！」"
translation = "「으음, 그야말로 아트야…… 내가 봐도 황홀할 정도의 완성도라구. 으음…… 점점 창작 의욕이 솟구치는데!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こうしちゃいられない。さっそく次の作品に取りかからないとな！」"
translation = "「이러고 있을 때가 아냐. 얼른 다음 작품에 착수해야겠어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ここの壁──いい感じだ！\u3000よっ、よっ、よいっと──ペイント完了だ！」"
translation = "「여기 벽── 느낌 좋은데! 얍, 얍, 영차── 페인트 완료다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「この黒板にもチョチョイのチョイっと……うんうん。納得の出来栄えだぜ」"
translation = "「이 칠판에도 슥슥 삭삭── 응응. 납득할 만한 완성도라구」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「むむっ……ビビッときたぞ！\u3000こっちの壁にも──こう──こうっと──へへ……」"
translation = "「으음…… 팍 하고 왔다구! 이쪽 벽에도── 이렇게── 이렇게── 헤헤……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……落書き？\u3000違う、何度も言わせるな──これは芸術だ！」"
translation = "「……낙서? 아냐, 몇 번이나 말하게 하지 마── 이건 예술이라구!」"

[[dialogue]]
speaker = "unk"
original = "これは猫？"
translation = "이건 고양이?"

[[dialogue]]
speaker = "unk"
original = "これは狐？"
translation = "이건 여우야?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「違う、タヌキだ！\u3000見ろ、このずんぐりむっくりしたフォルムを」"
translation = "「아니, 너구리다! 봐라, 이 몽딸막하고 뭉툭한 폼을!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どうだ魔王？\u3000オマエに絵心があるかどうかはわからんが、ビビッとくるものがあるんじゃないか？」"
translation = "「어때 마왕? 너한테 그림 재주가 있는지는 모르겠지만, 찌릿하고 오는 게 있지 않아?」"

[[dialogue]]
speaker = "unk"
original = "確かに……"
translation = "확실히……"

[[dialogue]]
speaker = "unk"
original = "個性的な絵だね"
translation = "개성적인 그림이네."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふん、そうだろうそうだろう。なかなか見る目があるな」"
translation = "「후훙, 그렇고말고 그렇고말고. 제법 보는 눈이 있구나.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ストリートアートってやつだ。あたしのあふれるインスピレーションそのままに、学園を藝術の園に変えてやるのさ！」"
translation = "「스트리트 아트라는 거야. 나의 넘치는 영감 그대로, 학원을 예술의 정원으로 바꿔주겠어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「さすがに街でやるとメーワクだからな。学園の中ならまあなんとかなるだろ！」"
translation = "「역시 거리에서 하면 민폐니까 말이야. 학원 안이라면 뭐 어떻게든 되겠지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「学園でも迷惑だって？\u3000そんなことはない。むしろ美術の参考が増えて、感謝されるんじゃないか？」"
translation = "「학원에서도 민폐라고? 그럴 리가. 오히려 미술 참고 자료가 늘어나서, 감사받지 않겠어?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふふっ──でもってここにサインをしておくのさ。謎めいたアポロシーのサインをな」"
translation = "「후후후── 그리고 여기에 사인을 해두는 거지. 수수께끼에 싸인 아폴로시의 사인을 말이야.」"

[[dialogue]]
speaker = "unk"
original = "それっぽくなったけど……"
translation = "그럴싸해졌지만……"

[[dialogue]]
speaker = "unk"
original = "サインが子どもっぽすぎない？"
translation = "사인이 너무 아이 같지 않아?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「このミステリアスさが鍵なんだ！\u3000いいか、人は素性不明のアーティストに惹かれるものなんだ」"
translation = "「이 미스터리함이 핵심이라구! 잘 들어, 사람은 정체불명의 아티스트에게 끌리는 법이야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「学園のどこかにふと現れる謎のアート……しかしその描き手は不明……彼女は果たして何者で、いつ出没しているのか……」"
translation = "「학원 어딘가에 문득 나타나는 수수께끼의 아트…… 하지만 그 그린 이는 불명…… 그녀는 과연 누구이며, 언제 출몰하는 것인가……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへへ──このくおりてぃなら、話題になること間違いなしだ！」"
translation = "「헤헤헤── 이 퀄리티라면, 화제가 될 게 틀림없다구!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よおし、この調子でドンドン学園をあたし色に染めてやるぜ～～！！」"
translation = "「좋아, 이 기세로 팍팍 학원을 내 색깔로 물들여주겠어~~!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おらおらおらー！」"
translation = "「오라오라오라!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「芸術は爆炎だ──っ！」"
translation = "「예술은 폭염이다──!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしのアートに酔いしれ──うっ……」"
translation = "「나의 아트에 취해라── 윽……」"

[[dialogue]]
speaker = "unk"
original = "アポロ、待って"
translation = "아폴로, 기다려."

[[dialogue]]
speaker = "unk"
original = "どうなっても知らないよ"
translation = "어떻게 돼도 난 모른다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「び、びびってんじゃねえ！\u3000ここにも壁画があるくらいなんだから、あたしのアートだって歓迎されるはずだ」"
translation = "「거, 겁먹지 마! 여기에도 벽화가 있을 정도니까, 내 아트도 환영받을 게 분명해.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（でも、ちょっと怒られそうだからこのへんに小さく描いておくぜ……！）"
translation = "(하지만, 조금 혼날 것 같으니까 이쯤에 작게 그려둬야지……!)"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（なあに、心配いらない！\u3000あたしの芸術の理解者は、きっと現れてくれるばずだ）"
translation = "(뭐야, 걱정할 거 없어! 내 예술의 이해자는, 분명 나타나 줄 거라구.)"

[[dialogue]]
speaker = "unk"
original = "そうして、翌日──……。"
translation = "그렇게, 다음 날──……."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふっふっふ……今ごろ学園中あたしの話題で持ち切りだろうな。あたし──いや、謎のアーティスト・アポロシーのことで」"
translation = "「훗훗훗…… 지금쯤 학원 안이 내 화제로 떠들썩하겠지. 나── 아니, 수수께끼의 아티스트 아폴로시의 일로 말이야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いいか魔王、簡単には正体を明かすんじゃないぞ。みんなの期待が高まるまで焦らしてだな……」"
translation = "「잘 들어 마왕, 쉽게 정체를 밝히지 말라구. 모두의 기대가 높아질 때까지 애를 태우면서……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「──失礼するわ。図書館に落書きを残した不届き者はこちらにいるかしら？」"
translation = "「──실례할게요. 도서관에 낙서를 남긴 불경한 자가 이곳에 있나요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私たちの星徒会室もです。アポロさん、言い逃れはできませんよ」"
translation = "「저희 성도회실도 마찬가지예요. 아폴로 씨, 변명은 통하지 않아요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「！？\u3000な……なんであたしだってわかった！？」"
translation = "「!? 뭐…… 어떻게 나라는 걸 알았지!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だって、アポロシーのサインに名前が入っちゃってるじゃないですか」"
translation = "「그야, 아폴로시의 사인에 이름이 들어가 있잖아요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「は！？\u3000し、しまった！？」"
translation = "「하!? 이, 이런 실수를!?」"

[[dialogue]]
speaker = "unk"
original = "今さら……？"
translation = "이제 와서……?"

[[dialogue]]
speaker = "unk"
original = "気づいてなかったの……？"
translation = "눈치채지 못했던 거야……?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ま、まあ待て。にしてもあたしのアートが描かれるのは光栄なことのはずで……！」"
translation = "「머, 머 일단 기다려봐. 그건 그렇고 내 아트가 그려지는 건 영광스러운 일일 텐데……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「多少、味のある絵だったのは認めますが」"
translation = "「나름대로 맛이 느껴지는 그림이라는 건 인정합니다만.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それで罪が帳消しになるはずもないわね」"
translation = "「그걸로 죄가 사라질 리는 없겠네요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「つ、罪だとぉ！？」"
translation = "「죄, 죄라고오!?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「──アポロ様、いらっしゃいますか？\u3000大聖堂に残された『大変ご立派なアート』の件でお話がございます」"
translation = "「──아폴로 님, 계십니까? 대성당에 남겨진 『매우 훌륭한 아트』 건으로 드릴 말씀이 있습니다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うげげっ！？\u3000た……助けてくれ、魔王～～～～！」"
translation = "「우게겍!? 사…… 살려줘, 마왕~~~~!」"

[[dialogue]]
speaker = "unk"
original = "その後、アポロは自ら描いたアートたちを清掃するという、なんとも自業自得な結末を迎えるのだった……。"
translation = "그 후, 아폴로는 직접 그린 아트들을 청소하게 되는, 그야말로 자업자득인 결말을 맞이하는 것이었다……."

