[[dialogue]]
speaker = "unk"
original = "第８話,情報共有,B"
translation = "제8화, 정보 공유, B"

[[dialogue]]
speaker = "unk"
original = "目を覚ました梨緒が俺を呼んでいるという話を聞いて、保健室へと向かった。"
translation = "잠에서 깬 리오가 나를 부르고 있다는 이야기를 듣고, 보건실로 향했다."

[[dialogue]]
speaker = "unk"
original = "保健室には、ベッドに腰かけた梨緒と、選挙管理委員会のメンバーが待ち受けていた。"
translation = "보건실에는, 침대에 걸터앉은 리오와 선거관리위원회 멤버들이 기다리고 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「さっそくですまないが、情報共有がしたい。あのリクリエの使徒について、私が知っていることを話す」"
translation = "「곧바로 불러서 미안하지만, 정보 공유를 하고 싶다. 그 리크리에의 사도에 대해, 내가 알고 있는 것을 말하지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「願ってもない申し出だ。ただそういうことなら、星徒会で話し合ったことを先に共有してもいいだろうか？」"
translation = "「바라던 바야. 다만 그런 거라면, 성도회에서 논의한 내용을 먼저 공유해도 괜찮을까?」"

[[dialogue]]
speaker = "unk"
original = "俺の言葉に、梨緒は頷いてみせた。"
translation = "내 말에, 리오는 고개를 끄덕여 보였다."

[[dialogue]]
speaker = "unk"
original = "俺は先ほどまで星徒会室で整理していた、デネブと極星学園の話を選挙管理委員会のメンバーにも共有するのだった。"
translation = "나는 조금 전까지 성도회실에서 정리하고 있던 데네브와 극성학원에 관한 이야기를 선거관리위원회 멤버들에게도 공유했다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「香堂チナに、デネブの星騎士。極星学園……か」"
translation = "「코도 치나에, 데네브의 성기사. 극성학원……인가.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「…………っ」"
translation = "「…………윽.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ベアト？\u3000どうかしたか？」"
translation = "「베아트? 왜 그래?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「う、ううんっ！\u3000なんでもないよっ」"
translation = "「아, 아니야! 아무것도 아니야!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「一応確認しておくんだけど、梨緒は『極星学園』に心当たりはないの？」"
translation = "「일단 확인해두고 싶은데, 리오는 『극성학원』에 대해 짐작 가는 거 없어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ない、な。私が知っているのは、流星学園と新星学園だけだ」"
translation = "「없다. 내가 아는 건 유성학원과 신성학원뿐이다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ということは、梨緒が知ってるジグと極星学園は別陣営ってわけだ。ややこしいね」"
translation = "「그렇다는 건, 리오가 아는 지그와 극성학원은 다른 진영이라는 거네. 복잡하네.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ジグ本人の口ぶりからもそういった印象は受けた。彼女はアルタイルとデネブの星騎士の衝突を見に来たと言っていた」"
translation = "「지그 본인의 말투에서도 그런 인상을 받았어. 그녀는 알타이르와 데네브의 성기사가 충돌하는 걸 보러 왔다고 말했거든.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ともあれ、現状はチナの発言を鵜呑みにはせず、デネブに関する情報収集に専念する、というのが星徒会の暫定的な方針だ」"
translation = "「어쨌든, 현 상황은 치나의 발언을 그대로 믿지 않고, 데네브에 관한 정보 수집에 전념한다는 것이 성도회의 잠정적인 방침이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「選挙管理委員会としても異議はない。冷静な対応だと思う」"
translation = "「선거관리위원회로서도 이의는 없다. 냉정한 대응이라고 생각해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。それじゃあ、本題の方に移ろうか」"
translation = "「고마워. 그럼, 본론으로 들어갈까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「その前に、今一度『リクリエの使徒』という概念について、説明してもらってもいいだろうか？」"
translation = "「그전에, 다시 한번 『리크리에의 사도』라는 개념에 대해 설명해줄 수 있겠나?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は一度聞かされているが、ここにいる全員がその事情に明るいわけじゃない」"
translation = "「나는 한 번 들었지만, 여기 있는 모두가 그 사정에 밝은 건 아니니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「話によればアポロはその被害者らしいが……」"
translation = "「듣기로는 아폴로가 그 피해자라는 모양인데……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは被害者ってわけじゃ……！\u3000いや、すまん。それは今重要なことじゃないな……」"
translation = "「난 피해자 같은 게……! 아니, 미안. 그건 지금 중요한 게 아니지…….」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「込み入った話ではあるんだが、ひとまずアポロが『当事者』であることは間違いない」"
translation = "「복잡한 이야기긴 하지만, 일단 아폴로가 『당사자』인 건 틀림없어.」"

[[dialogue]]
speaker = "unk"
original = "俺の言葉に、アポロは自戒を込めるように、こくんと深く頷いた。"
translation = "내 말에 아폴로는 자성하듯이 고개를 깊게 끄덕였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『リクリエの使徒』というのが何なのか、俺たちも詳しく知っているわけじゃない」"
translation = "「『리크리에의 사도』가 무엇인지, 우리도 자세히 아는 건 아니야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただ星徒会はリクリエの使徒と戦ってきた。その時、仮面を被せられ、俺たちの前に立ちはだかったのは……平行世界に住むアポロだった」"
translation = "「다만 성도회는 리크리에의 사도와 싸워왔어. 그때, 가면을 쓰고 우리 앞을 가로막았던 건…… 평행세계에 사는 아폴로였지.」"

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒はなぜか、平行世界の人間が選ばれる。仮面を被り、世界の再創生を望み、リクリエの瘴気とモンスターを使役する。"
translation = "리크리에의 사도는 왠지 평행세계의 인간이 선택된다. 가면을 쓰고, 세계의 재창생을 바라며, 리크리에의 장기와 몬스터를 사역한다."

[[dialogue]]
speaker = "unk"
original = "俺たち星徒会が戦ってきたのは、そうした『リクリエの使徒』と、その従者であるギエルだった。"
translation = "우리 성도회가 싸워온 것은 그런 『리크리에의 사도』와, 그 종자인 기엘이었다."

[[dialogue]]
speaker = "unk"
original = "またそれらに関連して、アポロの正体がフィオナの双子の姉であり、リクリエの使徒の影響で長く眠っていたこと、星見家が魔王の系譜であること……"
translation = "또한 그와 관련하여 아폴로의 정체가 피오나의 쌍둥이 언니이며, 리크리에의 사도의 영향으로 오랫동안 잠들어 있었다는 것, 호시미 가문이 마왕의 계보라는 것……"

[[dialogue]]
speaker = "unk"
original = "世界の再創生を望み、リクリエに与したセイファート前学園長との戦いの顛末も、簡単に説明した。"
translation = "세계의 재창생을 바라며 리크리에에 가담한 세이파트 전 학원장과의 전투 전말도 간단히 설명했다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「アポロちゃんが、流星学園の会長のお姉さん……？\u3000信じられない話ばっかりで目が回るよ～……」"
translation = "「아폴로 짱이, 유성학원 회장님의 언니……? 믿기지 않는 이야기뿐이라 눈이 핑핑 돌아가요~……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「へー」"
translation = "「헤에.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ナターシャちゃん全然驚いてない！？」"
translation = "「나타샤 짱 전혀 안 놀라!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いや、驚いてるよ？\u3000聖庭園からある程度聞いてはいたけど、初耳な話も多かったし」"
translation = "「아니, 놀라고 있어. 성정원에서 어느 정도 듣긴 했지만, 처음 듣는 이야기도 많았고.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ただ、仕事柄あからさまにビックリするようなリアクションはしないだけ」"
translation = "「다만, 직업상 노골적으로 깜짝 놀라는 리액션은 안 할 뿐이야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おお、暗殺者はビビらないって本当だったんだな！\u3000本物っぽいぞ！」"
translation = "「오오, 암살자는 쫄지 않는다는 게 진짜였구나! 진짜 같아!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、本物だからね」"
translation = "「응, 진짜니까.」"

[[dialogue]]
speaker = "unk"
original = "暗殺者というと剣呑な印象だが、味方である分には心強い……かもしれない。"
translation = "암살자라고 하면 험악한 인상이지만, 아군인 동안에는 든든할……지도 모른다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「でもちょっと質問。さっきから当たり前のように平行世界の話してるけど、それって星徒会じゃ常識？」"
translation = "「근데 질문 하나. 아까부터 당연하다는 듯이 평행세계 이야기를 하는데, 그거 성도회에선 상식이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「常識……というか、色々あって前提になってる。物証を見せることは難しいが、フィーニスの塔で見聞きしたことや、女神テルルらしき存在の説明からも、ほぼ間違いない」"
translation = "「상식……이라기보다, 여러 일이 있어서 전제가 되어 있어. 물증을 보여주기는 어렵지만, 피니스의 탑에서 보고 들은 것이나, 여신 테루루로 추정되는 존재의 설명으로 보아 거의 틀림없어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「──待って。女神様と喋ったことあるの？」"
translation = "「──잠깐. 여신님이랑 대화해본 적 있어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「説明が難しいんだが、一方的に言葉を聞いたっていうのが一番近いかもしれない。ただ、俺も覚えてないところで、会話したことがあるような……気がする」"
translation = "「설명하기 어렵지만, 일방적으로 말을 들었다는 게 가장 가까울지도 몰라. 다만, 나도 기억나지 않는 곳에서 대화한 적이 있는 듯한…… 기분이 들어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「何それ。はっきりしてよ」"
translation = "「뭐야 그게. 확실히 좀 해봐.」"

[[dialogue]]
speaker = "unk"
original = "守護天使たちや女神テルルの言動から、ヴィーナスは女神の娘である可能性が高い。そして、ヴィーナスはデネブの緋宮クロトの娘だという。"
translation = "수호천사들이나 여신 테루루의 언동으로 보아, 비너스는 여신의 딸일 가능성이 높다. 그리고 비너스는 데네브의 히노미야 쿠로토의 딸이라고 한다."

[[dialogue]]
speaker = "unk"
original = "今まであまり真面目に考えないようにしてきたのだが、つまりデネブの俺は女神様と……？"
translation = "지금까지 너무 진지하게 생각하지 않으려 노력해왔지만, 즉 데네브의 나는 여신님과……?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「というか、ブッテキ証拠はあるじゃねーか。ヴィーナスはデネブで生まれた、緋宮クロトの娘なんだろ？」"
translation = "「그보다, 물증은 있잖아. 비너스는 데네브에서 태어난 히노미야 쿠로토의 딸이라며?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふぇっ！？」"
translation = "「혤!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "一応、この件は新星・流星の星徒会メンバーや、それに近しい人たちには伝えてある。"
translation = "일단 이 건은 신성·유성의 성도회 멤버나 그에 가까운 사람들에게는 전해두었다."

[[dialogue]]
speaker = "unk"
original = "なので、別に選挙管理委員会のメンバーに知られても問題はないのだが……元々の知り合いではなく、知り合って日が浅い人たちにバレるのは、よくわからない気まずさがあった。"
translation = "그래서 딱히 선거관리위원회 멤버들이 알게 되어도 문제는 없지만…… 원래 알던 사이가 아니라, 알게 된 지 얼마 안 된 사람들에게 들키는 건 묘한 멋쩍음이 있었다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「えーっと……ちょっと呑み込みづらいんだけど……」"
translation = "「에 그러니까…… 좀 받아들이기 힘든데……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「つまり、いつも仲良く乳繰りあってるあの賑やかな子は、血の繋がった自分の娘なの？」"
translation = "「즉, 평소에 사이좋게 꽁냥거리는 그 시끌벅적한 애가, 피가 섞인 자기 딸이라는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いつ俺がヴィーナスと乳繰りあってたって！？」"
translation = "「내가 언제 비너스랑 꽁냥거렸다고!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「これは暗殺者も引く」"
translation = "「이건 암살자도 정색하겠어.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「吸血鬼も引く」"
translation = "「흡혈귀도 정색해.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「というか誰でも引く」"
translation = "「아니 누구라도 정색하지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから乳繰り合ってないって！\u3000全員で引かないでくれ！」"
translation = "「그러니까 꽁냥거린 거 아니라고! 다들 정색하지 말아줘!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うーん、娘って言っても平行世界の娘なら、ほとんど赤の他人と変わらないのかな。歳も同じだし」"
translation = "「으음, 딸이라고 해도 평행세계의 딸이라면 거의 남이나 다름없는 걸까. 나이도 같고.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まぁ、それもそう……そうかな？」"
translation = "「뭐, 그것도 그렇…… 그런가?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "（メルエルに、『こいつだけはやめておけ』って言った方がいいのかなぁ……）"
translation = "（메르엘한테, 『이 녀석만은 그만둬』라고 말해두는 게 좋으려나……）"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、倫理的な面を追及するのは後にしよう。話が進まない」"
translation = "「아니, 윤리적인 면을 추궁하는 건 나중에 하자. 이야기가 안 진행되잖아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「とりあえず、星徒会は平行世界の存在を認識していて、それを前提に動いている、というわけだな」"
translation = "「어쨌든, 성도회는 평행세계의 존재를 인식하고 있고, 그걸 전제로 움직이고 있다는 거군.」"

[[dialogue]]
speaker = "unk"
original = "すでに事情を話したことがある梨緒から、的確なパスが飛んできた。"
translation = "이미 사정을 이야기한 적이 있는 리오로부터 정확한 패스가 날아왔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういうことになる。梨緒にはすでに一度話したが、星徒会は梨緒が平行世界から迷い込んだ人物だろうと推測していた」"
translation = "「그렇게 돼. 리오에게는 이미 한 번 말했지만, 성도회는 리오가 평행세계에서 길을 잃고 들어온 인물일 거라고 추측하고 있었어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちがいるこの世界は『アルタイル』だ。残りは『デネブ』と『ベガ』。今までは、梨緒がどこの世界からやってきたのかは不明だったんだが……」"
translation = "「우리가 있는 이 세계는 『알타이르』다. 남은 건 『데네브』와 『베가』. 지금까지는 리오가 어느 세계에서 왔는지 불분명했지만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「極星星徒会が『デネブの星騎士』を名乗ったことで、梨緒がやってきたのは『ベガ』である可能性が高くなった」"
translation = "「극성성도회가 『데네브의 성기사』를 자처하면서, 리오가 온 곳은 『베가』일 가능성이 높아졌어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「とはいえ、チナの発言は鵜呑みにせず情報収集に徹する、という方針だ。この件に関しては、わからないことを無理やり憶測で話すことは自重したいと思っている」"
translation = "「그렇긴 해도, 치나의 발언은 맹신하지 않고 정보 수집에 철저히 한다는 방침이야. 이 건에 관해서는 모르는 일을 억지로 추측해서 말하는 건 자제하고 싶어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私としても、自分が平行世界の人間である、という話を受け入れたわけではない」"
translation = "「나로서도, 내가 평행세계의 인간이라는 이야기를 받아들인 건 아니다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「情報共有には感謝するが、私は私でこの状況を見極めさせてもらいたい」"
translation = "「정보 공유에는 감사하지만, 나는 나대로 이 상황을 지켜보도록 하겠다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで構わない。今はまだ情報を収集する段階だ。色んな視点やアプローチがあった方がいいだろう」"
translation = "「그래도 좋아. 지금은 아직 정보를 수집하는 단계니까. 여러 시각이나 접근 방식이 있는 게 좋겠지.」"

[[dialogue]]
speaker = "unk"
original = "俺の言葉に、梨緒は小さく頷く。"
translation = "내 말에 리오는 작게 고개를 끄덕인다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「さて、色々回り道をしてしまったが、ようやく本題に入ろう」"
translation = "「자, 여러모로 돌아왔지만, 이제야 본론으로 들어가겠군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「昨日現れた、“真なる神の騎士”を名乗る星騎士、ジグ」"
translation = "「어제 나타난, “진정한 신의 기사”를 자처하는 성기사, 지그.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「彼女の本名はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート」"
translation = "「그녀의 본명은 레나테 Z<rt>지그</rt></ruby> 자이프리트.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私がいた新星学園の……星徒会長だ」"
translation = "「내가 있던 신성학원의…… 성도회장이다.」"

