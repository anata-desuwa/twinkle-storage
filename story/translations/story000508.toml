[[dialogue]]
speaker = "パッキー"
original = "「お、俺様のパラダイスがぁ……。野望がぁ……」"
translation = "「오, 오레사마의 파라다이스가아……. 야망이이……」"

[[dialogue]]
speaker = "リア"
original = "「ふーんだ。えっちなことしようとするからだよ」"
translation = "「흥이다. 야한 짓 하려고 하니까 그렇지」"

[[dialogue]]
speaker = "フィオナ"
original = "「随分小さくなりましたね……。これが元の大きさということでしょうか」"
translation = "「꽤 작아졌네요……. 이것이 원래 크기라는 것일까요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「そのようですね。感じていたリクリエの気配も消えています」"
translation = "「그런 것 같네요. 느끼고 있던 리크리에의 기운도 사라졌습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ともかくこれで一件落着ね。アステラも無事消滅したようだし」"
translation = "「어쨌든 이걸로 일단락됐네. 아스테라도 무사히 소멸한 것 같고」"

[[dialogue]]
speaker = "ルリエル"
original = "「全く人騒がせなパンダさんです！\u3000魔王の使い魔のくせにリクリエに化かされるなんて情けないことこの上ないですよ！」"
translation = "「정말 사람을 소란스럽게 하는 팬더 씨예요! 마왕의 사역마 주제에 리크리에에게 홀리다니 한심하기 짝이 없어요!」"

[[dialogue]]
speaker = "聖沙"
original = "「ルリエルさんがそれを言うのね……」"
translation = "「루리엘 씨가 그걸 말하는구나……」"

[[dialogue]]
speaker = "unk"
original = "にしても強敵だった"
translation = "그렇다고 해도 강적이었다"

[[dialogue]]
speaker = "パッキー"
original = "「ふ……そいつは俺様のセリフだぜ。シン様ほどじゃねえがお前も中々やるじゃねえか」"
translation = "「흥…… 그건 오레사마가 할 말이다. 신 님 정도는 아니지만 너도 꽤 하는군」"

[[dialogue]]
speaker = "パッキー"
original = "「そんなお前に、大賢者さまからのアドバイスだ。……慕ってくれるコイツらをもっと大事にしてやれ」"
translation = "「그런 너에게, 대현자 님으로부터의 조언이다. ……따라주는 이 녀석들을 더 소중히 해 줘라」"

[[dialogue]]
speaker = "パッキー"
original = "「そうすれば、ククク……コイツらのおっぱいをお前だけのものにできるだろーぜ」"
translation = "「그렇게 하면, 크크크…… 이 녀석들의 가슴을 너만의 것으로 만들 수 있을 거다」"

[[dialogue]]
speaker = "unk"
original = "パッキー……"
translation = "팟키……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「って、何をいい話風にスケベなこと言ってんのよ！」"
translation = "「라고, 뭘 좋은 이야기인 척 야한 소리를 하고 있는 거야!」"

[[dialogue]]
speaker = "パッキー"
original = "「ぎゃふん！？」"
translation = "「꽥!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「会長も会長です！\u3000何を深く頷いているのですか！」"
translation = "「회장님도 회장님이세요! 뭘 깊이 고개를 끄덕이고 계신 건가요!」"

[[dialogue]]
speaker = "リア"
original = "「も～。あんまりスケベだと女の子に嫌われちゃうゾ？」"
translation = "「모오～。 너무 야하면 여자애들에게 미움받을 거야?」"

[[dialogue]]
speaker = "聖沙"
original = "「はぁ……。どんな世界でも男の子の不純さは変わらないものね……」"
translation = "「하아……. 어떤 세계에서도 남자아이의 불순함은 변하지 않는 법이네……」"

[[dialogue]]
speaker = "ルリエル"
original = "「マグダレナさんはどうしてそんなにおっぱいが大きいんですか？\u3000私も天使としての格が上がれば大きくなりますかねっ？」"
translation = "「막달레나 씨는 어째서 그렇게 가슴이 큰 거예요? 저도 천사로서의 격이 올라가면 커질까요?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええと、天使の位と胸の大きさは無関係だと思いますが……」"
translation = "「음, 천사의 지위와 가슴 크기는 무관하다고 생각합니다만……」"

[[dialogue]]
speaker = "unk"
original = "でもこれで流星クルセイダースとは……"
translation = "하지만 이걸로 유성 크루세이더스와는……"

[[dialogue]]
speaker = "リア"
original = "「うん……お別れだね」"
translation = "「응…… 이별이네」"

[[dialogue]]
speaker = "聖沙"
original = "「短い間だったけど楽しかったわ。あまり先輩らしいことはできなかったけれどね」"
translation = "「짧은 시간이었지만 즐거웠어. 그다지 선배다운 일은 못 했지만 말이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ、そんなことはありません。伝え聞いていた通りの、まさに英雄でした。共に戦うことができて光栄です」"
translation = "「아닙니다, 그렇지 않습니다. 전해 들었던 대로, 그야말로 영웅이셨습니다. 함께 싸울 수 있어서 영광입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとう、リアさん、聖沙。あなたたちがいなかったら、きっとこの問題は解決できなかったわ」"
translation = "「고마워, 리아 씨, 미사. 너희들이 없었다면, 분명 이 문제는 해결할 수 없었을 거야」"

[[dialogue]]
speaker = "リア"
original = "「ふふ、先輩ですもの。こちらこそ、ありがとう、みんな」"
translation = "「후후, 선배잖아. 나야말로, 고마워, 모두」"

[[dialogue]]
speaker = "聖沙"
original = "「あなたたちのような星騎士がいるなら、この世界は安心よ。私たちが保証するわ」"
translation = "「너희들 같은 성기사가 있다면, 이 세계는 안심이야. 우리가 보장할게」"

[[dialogue]]
speaker = "unk"
original = "お世話になりました！"
translation = "신세 많이 졌습니다!"

[[dialogue]]
speaker = "聖沙"
original = "「それじゃあ帰りましょうか、先輩！\u3000私たちの世界へ！」"
translation = "「그럼 돌아갈까, 선배! 우리들의 세계로!」"

[[dialogue]]
speaker = "リア"
original = "「うん！\u3000またね、みんな！」"
translation = "「응! 또 보자, 모두!」"

[[dialogue]]
speaker = "パッキー"
original = "「あー……。盛り上がってるところわりぃんだけどよ」"
translation = "「아ー……. 분위기 좋을 때 미안한데 말이야」"

[[dialogue]]
speaker = "パッキー"
original = "「今すぐ帰れるわけじゃなさそうだぜ？」"
translation = "「지금 당장 돌아갈 수 있을 것 같지는 않다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「境界の乱れが落ち着くまで、しばらくこちらにいていただくことになりますね」"
translation = "「경계의 혼란이 진정될 때까지, 당분간 이쪽에 머물러 주셔야 할 것 같네요」"

[[dialogue]]
speaker = "リア＆聖沙"
original = "「ええ～～～っ！！？」"
translation = "「에에～～～!!?」"

[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "それからしばらくして──"
translation = "그리고 잠시 후──"

[[dialogue]]
speaker = "マグダレナ"
original = "「世界の交錯が収束しているようですね。今なら元の世界に戻れることでしょう」"
translation = "「세계의 교차 현상이 수렴하고 있는 것 같네요. 지금이라면 원래 세계로 돌아갈 수 있을 것입니다」"

[[dialogue]]
speaker = "パッキー"
original = "「ちっくしょ～！\u3000もー帰んなくちゃなんねーのかよ！\u3000思ってたより早かったぜ！」"
translation = "「제기이일～! 이젠 돌아가야 하는 거냐! 생각했던 것보다 빨랐다!」"

[[dialogue]]
speaker = "聖沙"
original = "「……地獄のような数日間だったわ。あれだけ決めに決めたのに、元の世界に戻れず仕舞いだなんて……」"
translation = "「……지옥 같은 며칠이었어. 그렇게나 마음먹었는데, 원래 세계로 돌아가지 못하고 끝이라니……」"

[[dialogue]]
speaker = "リア"
original = "「あ、あはは……。でも、その分みんなと過ごせて楽しかったよね」"
translation = "「아, 아하하……. 하지만, 그만큼 모두와 함께 지낼 수 있어서 즐거웠지」"

[[dialogue]]
speaker = "unk"
original = "今度こそ帰っちゃうんですね"
translation = "이번에야말로 돌아가 버리는군요"

[[dialogue]]
speaker = "ヴィーナス"
original = "「寂しくなるわ。せっかく仲良くなれたのに」"
translation = "「섭섭하겠네. 모처럼 친해졌는데」"

[[dialogue]]
speaker = "フィオナ"
original = "「きっとまた会えますよ。そんな予感がします」"
translation = "「분명 다시 만날 수 있을 거예요. 그런 예감이 듭니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「この制服、大切にします！\u3000お二人との友情の証に！」"
translation = "「이 교복, 소중히 할게요오! 두 분과의 우정의 증표로!」"

[[dialogue]]
speaker = "聖沙"
original = "「ふふ、お姉さまの言う通りね。小っ恥ずかしい想いはしたけれど、すぐに元の世界に戻されないで良かったわ」"
translation = "「후후, 언니 말이 맞아. 쑥스러운 경험은 했지만, 바로 원래 세계로 돌아가지 않아서 다행이었어」"

[[dialogue]]
speaker = "リア"
original = "「改めて──またね、みんな。あえてさよならは言わないよ？\u3000必ずまた会えると信じてるから」"
translation = "「다시 한번── 또 보자, 모두. 굳이 작별 인사는 하지 않을게? 반드시 다시 만날 거라고 믿으니까」"

[[dialogue]]
speaker = "聖沙"
original = "「私たちの世界にもまた遊びに来てちょうだい。待ってるから」"
translation = "「우리 세계에도 또 놀러 와 줘. 기다릴게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、必ず遊びに行くわ」"
translation = "「응, 반드시 놀러 갈게」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。私もまだまだ平行世界を堪能しきれていませんから」"
translation = "「네. 저도 아직 평행 세계를 마음껏 즐기지 못했으니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ローゼンクロイツさんにもお礼を言わなくちゃですし！\u3000短い間とはいえ、お世話になっちゃいましたもん！」"
translation = "「로젠크로이츠 씨에게도 감사 인사를 드려야 하고요! 짧은 시간이었다고는 해도, 신세를 져 버렸으니까요!」"

[[dialogue]]
speaker = "リア"
original = "「なら私たちも気合いを入れ直さないと。先輩として、みんなが次に来る時までに世界を救っておかなくっちゃ♪」"
translation = "「그럼 우리도 다시 기합을 넣어야겠네. 선배로서, 모두가 다음에 올 때까지 세계를 구해 놔야지♪」"

[[dialogue]]
speaker = "聖沙"
original = "「どっちが先に自分たちの世界を救えるか──勝負よ！\u3000絶対にリ・クリエなんかに負けちゃダメだからねっ？」"
translation = "「어느 쪽이 먼저 자신들의 세계를 구할 수 있을까── 승부야! 절대로 리크리에 따위에게 지면 안 돼!」"

[[dialogue]]
speaker = "unk"
original = "はい！"
translation = "네!"

[[dialogue]]
speaker = "聖沙"
original = "「ふふ、良い返事だわ。次に会える時が本当に楽しみよ」"
translation = "「후후, 좋은 대답이네. 다음에 만날 때가 정말 기대돼」"

[[dialogue]]
speaker = "リア"
original = "「忘れないでね？\u3000みんなにはたくさんの仲間がいることを。みんなの絆が、世界を救うための一番の武器だっていうことを」"
translation = "「잊지 마? 모두에게는 많은 동료가 있다는 것을. 모두의 유대가, 세계를 구하기 위한 최고의 무기라는 것을」"

[[dialogue]]
speaker = "リア"
original = "「もし私たちの力が必要な時があればいつでも呼んで？\u3000必ず駆けつけるから」"
translation = "「혹시 우리의 힘이 필요할 때가 있다면 언제든지 불러? 반드시 달려갈 테니까」"

[[dialogue]]
speaker = "聖沙"
original = "「たとえ別々の世界にいても──私たちの絆は永遠よ！」"
translation = "「설령 서로 다른 세계에 있어도── 우리의 유대는 영원해!」"

[[dialogue]]
speaker = "パッキー"
original = "「欲望はパワーだぜ！\u3000おっぱい揉んでやろうって気持ちを忘れんなよ！」"
translation = "「욕망은 파워다! 가슴 주물러 주겠다는 마음을 잊지 마라!」"

[[dialogue]]
speaker = "unk"
original = "リア先輩、聖沙さん、パッキー……！"
translation = "리아 선배, 미사 씨, 팟키……!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今度こそ本当に行っちゃったようね」"
translation = "「이번에야말로 정말로 가 버린 것 같네」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね。でも、思っていたより寂しくはありません」"
translation = "「그렇네요. 하지만, 생각했던 것보다 쓸쓸하지는 않습니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「はい。今もお二人がすぐ傍にいてくれるような気がします。これがＫＩＺＵＮＡというヤツなんでしょうか」"
translation = "「네. 지금도 두 분이 바로 옆에 계신 것 같은 기분이 들어요. 이것이 KIZUNA라는 것일까요」"

[[dialogue]]
speaker = "マグダレナ"
original = "「きっとそうですよ。縁というものは、たとえ世界を隔てても断ち切れるようなものではありませんから」"
translation = "「분명 그럴 거예요. 인연이라는 것은, 설령 세계를 갈라놓아도 끊어낼 수 있는 것이 아니니까요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さて、と。それじゃあ私たちも行きましょうか。やることもあるしね？」"
translation = "「자, 그럼 우리도 갈까. 할 일도 있고 말이야?」"

[[dialogue]]
speaker = "unk"
original = "やること？"
translation = "할 일?"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、忘れたのですか？\u3000流星学園と新星学園の交流会ですよ」"
translation = "「후후, 잊으신 건가요? 유성 학원과 신성 학원의 교류회 말입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「世界を隔てても消えない絆があるのだもの。学園同士で結べないわけがないわ」"
translation = "「세계를 갈라놓아도 사라지지 않는 유대가 있는 법. 학원끼리 맺지 못할 리가 없지」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええ。私どももより強く、深く、絆を結びましょう」"
translation = "「네. 저희도 더욱 강하게, 깊게, 유대를 맺읍시다」"

[[dialogue]]
speaker = "ルリエル"
original = "「流星クルセイダースのように一丸となってリ・クリエに立ち向かうために──ですね！」"
translation = "「유성 크루세이더스처럼 하나가 되어 리크리에에 맞서기 위해서──인 거죠!」"

[[dialogue]]
speaker = "unk"
original = "To be countinued．．．"
translation = "To be continued．．．"

