[[dialogue]]
speaker = "ロロット"
original = "「う、う～ん……ふにゃ……？」"
translation = "「우, 우웅…… 푸냐……?」"

[[dialogue]]
speaker = "ロロット"
original = "「こ、ここは、一体……」"
translation = "「여, 여기는, 대체……」"

[[dialogue]]
speaker = "ナナカ"
original = "「あっ、ロロちゃん、気がついた！？」"
translation = "「앗, 로로짱, 정신 차렸어!?」"

[[dialogue]]
speaker = "ロロット"
original = "「おや、会計さん……。はて、わたしは今まで、一体何を……？」"
translation = "「어라, 회계 씨……. 하테, 저는 지금까지, 대체 뭘……?」"

[[dialogue]]
speaker = "ナナカ"
original = "「も～、ずっと寝ぼけたままだったら、どうしようかと思ったよ～」"
translation = "「모~, 계속 잠꼬대만 하고 있었으면, 어쩌나 했어~」"

[[dialogue]]
speaker = "ロロット"
original = "「ほえ？\u3000この聡明なわたしが寝ぼけるだなんて、そんなことあるわけないじゃないですか～」"
translation = "「호에? 이 총명한 제가 잠꼬대를 하다니, 그럴 리 없지 않습니까~」"

[[dialogue]]
speaker = "ナナカ"
original = "「は～よかった～、いつものロロちゃんに戻ってる～」"
translation = "「하ー 다행이다ー, 평소의 로로짱으로 돌아왔어~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それでいいの……？」"
translation = "「그걸로 된 거야……?」"

[[dialogue]]
speaker = "ナナカ"
original = "「あと……はい、トントロ。もう落とさないようにね」"
translation = "「그리고…… 자, 톤토로. 다시는 떨어뜨리지 마」"

[[dialogue]]
speaker = "ロロット"
original = "「おっと、これはどうも。しかし、なにやら継ぎ目が増えているような……」"
translation = "「이런, 고맙습니다. 하지만, 뭔가 이음매가 늘어난 것 같은데……」"

[[dialogue]]
speaker = "ナナカ"
original = "「気のせい気のせい！」"
translation = "「기분 탓 기분 탓!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……その様子だと、どうやら認識改変も解けたみたいですね」"
translation = "「……그 모습을 보니, 아무래도 인식 개변도 풀린 것 같네요」"

[[dialogue]]
speaker = "ナナカ"
original = "「そうみたい、あんがとねっ」"
translation = "「그런 것 같아, 고마워」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん、これくらい、どうってことないわよ」"
translation = "「후훗, 이 정도는, 아무것도 아니지」"

[[dialogue]]
speaker = "フィオナ"
original = "「それにしても、また異世界から人が迷い込んできたことも含め、原因が気になるところですが……」"
translation = "「그건 그렇고, 또 이세계에서 사람이 길을 잃고 들어온 것을 포함해, 원인이 궁금합니다만……」"

[[dialogue]]
speaker = "ロロット"
original = "「ほえ～……それにしても、見慣れない場所ですねぇ～……」"
translation = "「호에~…… 그건 그렇고, 낯선 장소네요~……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……もう少し、調べる必要がありそうですね」"
translation = "「……좀 더, 조사해 볼 필요가 있을 것 같네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「お疲れ様、ナナカ。改めまして、ヴィーナスよ」"
translation = "「수고했어, 나나카. 다시 한번, 비너스야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたたちも、リアさんや聖沙と同じ、生徒会のメンバーっていうことなのよね？」"
translation = "「당신들도, 리아 씨나 미사와 같은, 학생회 멤버라는 거지?」"

[[dialogue]]
speaker = "ナナカ"
original = "「えっ、そっか、リア先輩や聖沙たちのこと知ってるんだっけ？」"
translation = "「엣, 그렇구나, 리아 선배나 미사들을 알고 있었구나?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。以前、色々と助けてもらいましたし」"
translation = "「네. 이전에, 여러모로 도움을 받았습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「軽く話には聞いてたけど、さすが、あの二人の仲間だけあって、なかなかの実力だったわ」"
translation = "「대충 이야기는 들었지만, 역시, 그 두 사람의 동료답게, 상당한 실력이었어」"

[[dialogue]]
speaker = "ナナカ"
original = "「いやいや～、それを言うなら、あんたらもすごかったじゃん」"
translation = "「아니아니~, 그걸 말하자면, 너희들도 대단했잖아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ、まあ、それほどでもないけどねっ♪\u3000もっと褒めてくれてもいいのよ！」"
translation = "「후훗, 뭐, 그 정도는 아니지만♪ 더 칭찬해 줘도 돼!」"

[[dialogue]]
speaker = "フィオナ"
original = "「しかし、また異世界のロマンが感じられるとは、思ってもみませんでした……」"
translation = "「하지만, 또 이세계의 로망을 느낄 수 있을 줄은, 생각지도 못했습니다……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナもワクワクしちゃってる？」"
translation = "「피오나도 두근거리고 있어?」"

[[dialogue]]
speaker = "フィオナ"
original = "「あっ、いえ、そういうわけでは……」"
translation = "「앗, 아뇨, 그런 건……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ、まあいいわ。それよりまずは、ナナカとロロットに、こっちの世界のこと、もう少し詳しく教えてあげないとね」"
translation = "「후훗, 뭐 됐어. 그보다 먼저, 나나카와 로롯토에게, 이쪽 세계에 대해, 좀 더 자세히 알려줘야겠지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト、フィオナ、頼んだわよ！」"
translation = "「쿠로토, 피오나, 부탁해!」"

[[dialogue]]
speaker = "ロロット"
original = "「ほほう～、そういうことでしたか～！」"
translation = "「호오~, 그런 것이었군요~!」"

[[dialogue]]
speaker = "ロロット"
original = "「つまりここは、わたしたちの住む世界とは別の世界で、皆さんは以前、先輩さんや副会長さんたちと、摩訶不思議なアドベンチャーを繰り広げていたというわけですね！」"
translation = "「즉 여기는, 저희가 사는 세계와는 다른 세계이고, 여러분은 이전에, 선배님이나 부회장님들과, 마하 신비한 어드벤처를 펼치고 있었다는 말씀이시군요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね、概ねそんなところです。理解が早くて助かります」"
translation = "「그렇습니다, 대체로 그렇습니다. 이해가 빨라서 도움이 됩니다」"

[[dialogue]]
speaker = "ロロット"
original = "「いえいえ、よくわかってはいませんが、それほどでも！」"
translation = "「아니아니, 잘은 모르겠지만, 그 정도는!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よかったわ。実は私も、なんとなくしかわかってなかったのよね」"
translation = "「다행이네. 사실 나도, 어렴풋이밖에 몰랐거든」"

[[dialogue]]
speaker = "ナナカ"
original = "「流星市国に、新星学園と流星学園、そんでもって、星騎士か～、なるほどね～……」"
translation = "「유성 시국에, 신성 학원과 유성 학원, 그리고, 성기사라~, 그렇구나~……」"

[[dialogue]]
speaker = "ナナカ"
original = "「……ん？\u3000そういやなんか、そんな話、前にリア先輩と聖沙から聞いたことあったかも」"
translation = "「……응? 그러고 보니 뭔가, 그런 이야기, 전에 리아 선배랑 미사한테 들은 적 있었을지도」"

[[dialogue]]
speaker = "ロロット"
original = "「そうでしたっけ？」"
translation = "「그랬었나요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「いや～、そっかそっか、あんたたちがねぇ～。その時は、色々大変だったみたいじゃん」"
translation = "「이야~, 그렇구나 그렇구나, 너희들이 그랬구나~. 그때는, 여러모로 힘들었던 것 같던데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まあ、それなりにはね。だけど、この私たちにかかれば、どうってことなかったわ」"
translation = "「뭐, 그럭저럭은. 하지만, 이 우리들에게 걸리면, 아무것도 아니었지」"

[[dialogue]]
speaker = "フィオナ"
original = "「リアさんや聖沙さんの協力がありましたから」"
translation = "「리아 씨와 미사 씨의 협력이 있었습니다」"

[[dialogue]]
speaker = "ロロット"
original = "「わたしも、ちょっぴりだけドキドキするような、摩訶不思議体験をしてみたいものですねぇ～」"
translation = "「저도, 살짝 두근거리는 듯한, 마하 신비 체험을 해보고 싶네요~」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、他の世界に転移している時点で、既にそれなりの体験だとは思いますけどね」"
translation = "「후후, 다른 세계로 전이했다는 시점에서, 이미 상당한 체험이라고 생각합니다만」"

[[dialogue]]
speaker = "ロロット"
original = "「おお、確かに、それもそうですね。木を食ってマヨネーズ、というやつです」"
translation = "「오오, 확실히, 그것도 그렇네요. 나무를 먹고 마요네즈, 라는 겁니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「……？？？」"
translation = "「……???」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なにそれ、おいしいの？」"
translation = "「그게 뭔데, 맛있어?」"

[[dialogue]]
speaker = "ナナカ"
original = "「てかさ、見てよロロちゃん。神族？\u3000魔族！？\u3000しかもみんなで普通に暮らしてるってさ！\u3000やばくない？」"
translation = "「그보다 말이야, 봐봐 로로짱. 신족? 마족!? 게다가 다 같이 평범하게 살고 있다니! 대박이지 않아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちにとっては、普通の光景なのにね」"
translation = "「우리에게는, 평범한 광경인데」"

[[dialogue]]
speaker = "フィオナ"
original = "「やっぱり、珍しく感じるものなんですね」"
translation = "「역시, 신기하게 느껴지는군요」"

[[dialogue]]
speaker = "ロロット"
original = "「ふむふむ、いわゆる異文化交流というやつですか～。それなら、わたしも負けてはいませんよ」"
translation = "「흠흠, 이른바 이문화 교류라는 것입니까~. 그렇다면, 저도 지지 않습니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「えっ、またまた～、なに言っちゃってんのさ」"
translation = "「엣, 또또~, 무슨 말을 하는 거야」"

[[dialogue]]
speaker = "ロロット"
original = "「あっ！\u3000そそそ、そうですね、勘違いでしたっ、天使じゃありませんからねっ！？」"
translation = "「앗! 그그그, 그렇습니다, 착각이었습니다! 천사가 아니니까요!?」"

[[dialogue]]
speaker = "ナナカ"
original = "「え、うん」"
translation = "「어, 응」"

[[dialogue]]
speaker = "ロロット"
original = "「それより、現代版のガイドブックには、全ての道はロマンに通ず、とあります。これはわくわくしてしまいますね！」"
translation = "「그보다, 현대판 가이드북에는, 모든 길은 로망으로 통한다, 라고 쓰여 있습니다. 이거 두근거리네요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あの、さっきから、なんなんですか、それは……？」"
translation = "「저, 아까부터, 그건 뭔가요……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんだかすごそうな本……ロロットは博識なのね～」"
translation = "「왠지 대단해 보이는 책…… 로롯토는 박식하네~」"

[[dialogue]]
speaker = "ロロット"
original = "「えっへん！\u3000それほどでもあります」"
translation = "「에헴! 그 정도도 있습니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「はは、気にしないでいいから」"
translation = "「하하, 신경 쓰지 않아도 돼」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃ、何はともあれ、ゆっくり観光していってちょうだいね。せっかくの貴重な体験なんだし！」"
translation = "「그럼, 무엇보다도, 천천히 관광하고 가렴. 모처럼의 귀중한 경험이니까!」"

[[dialogue]]
speaker = "ロロット"
original = "「うわ～い！\u3000新世界がわたしを呼んでいるのです～」"
translation = "「우와~이! 신세계가 저를 부르고 있습니다~」"

[[dialogue]]
speaker = "ナナカ"
original = "「いや、普通に楽しんでんじゃん……順応早いねぇ」"
translation = "「야, 평범하게 즐기고 있잖아…… 적응 빠르네」"

[[dialogue]]
speaker = "フィオナ"
original = "「何か、心配事でも？」"
translation = "「무슨, 걱정거리라도 있으신가요?」"

[[dialogue]]
speaker = "ナナカ"
original = "「そりゃ、ちょっとはね。なんでこっちの世界に飛ばされて来たかも、帰る方法もわかんないってのにさ～」"
translation = "「그야, 조금은. 왜 이 세계로 날아왔는지도, 돌아갈 방법도 모르는데 말이야~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そこは、前もなんとかなったわけだし、今回もなんとかなるんじゃない？\u3000わかんないけど」"
translation = "「거기는, 전에도 어떻게든 됐으니까, 이번에도 어떻게든 되지 않을까? 모르겠지만」"

[[dialogue]]
speaker = "ナナカ"
original = "「だといいんだけどねぇ……今頃、シンが心配してるかも」"
translation = "「그러면 좋겠는데…… 지금쯤, 신이 걱정하고 있을지도」"

[[dialogue]]
speaker = "ロロット"
original = "「ふむ、ダジャレとしては及第点でしょうか」"
translation = "「흠, 말장난으로서는 합격점일까요」"

[[dialogue]]
speaker = "ナナカ"
original = "「ダジャレじゃないやい！\u3000でもあんがと」"
translation = "「말장난 아니거든! 근데 고마워」"

[[dialogue]]
speaker = "ナナカ"
original = "「ロロちゃんのマイペースなところ、今だけは助けられてるかも」"
translation = "「로로짱의 마이페이스인 점, 지금만큼은 도움받고 있을지도」"

[[dialogue]]
speaker = "ロロット"
original = "「それはどうも！\u3000旅の道はズレても世は情け深い、と言いますしね」"
translation = "「그거 고맙습니다! 여행길은 엇나가도 세상은 정이 깊다, 라고 하니까요」"

[[dialogue]]
speaker = "ロロット"
original = "「せっかくですから、会長さんに、楽しいお土産話でも持って帰ってあげましょう」"
translation = "「모처럼이니까, 회장님에게, 즐거운 기념품 이야기라도 가져다 드립시다」"

[[dialogue]]
speaker = "ナナカ"
original = "「……うん、それもそうだね」"
translation = "「……응, 그것도 그렇네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん、どうしたのクロト、電話？」"
translation = "「응, 왜 그래 쿠로토, 전화?」"

[[dialogue]]
speaker = "unk"
original = "トワ先生からだ"
translation = "토와 선생님한테서다"

[[dialogue]]
speaker = "ナナカ"
original = "「って、こらロロちゃん！\u3000いくら珍しいからって、また勝手にどっか行くんじゃないよ！」"
translation = "「이, 이봐 로로짱! 아무리 신기하다고 해도, 또 멋대로 어딘가로 가지 마!」"

[[dialogue]]
speaker = "ロロット"
original = "「お土産話になりそうな新世界での冒険が、わたしを呼んでいるのです～」"
translation = "「기념품 이야기가 될 만한 신세계에서의 모험이, 저를 부르고 있습니다~」"

[[dialogue]]
speaker = "フィオナ"
original = "「……なんだか、リアさんや聖沙さんたちとは違って、だいぶ自由なお二人ですね」"
translation = "「……왠지, 리아 씨나 미사 씨들과는 달리, 상당히 자유로운 두 분이시네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう？\u3000でもいいじゃない、楽しいし。こっちの世界を気に入ってもらえるっていうのも、嬉しいでしょ？」"
translation = "「그래? 근데 괜찮잖아, 즐겁고. 이쪽 세계를 마음에 들어 한다는 것도, 기쁘지 않아?」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは、確かにそうですね。喜ばしいことです」"
translation = "「그건, 확실히 그렇네요. 기쁜 일입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうそう。どうせ難しいこと考えてもよくわかんないし」"
translation = "「그렇고말고. 어차피 어려운 거 생각해 봤자 잘 모르겠고」"

[[dialogue]]
speaker = "フィオナ"
original = "「あまり楽観的すぎるのも、どうかとは思いますけど……」"
translation = "「너무 낙관적인 것도, 좀 그렇다고 생각합니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、クロト、電話終わったの？\u3000トワ先生はなんて？」"
translation = "「아, 쿠로토, 전화 끝났어? 토와 선생님은 뭐라고 해?」"

[[dialogue]]
speaker = "unk"
original = "それが……"
translation = "그게……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっ、少し前からメイプルと連絡がつかないの？\u3000それで、こっちに来てないか、ってことだったんだ……」"
translation = "「엣, 조금 전부터 메이플과 연락이 안 된다고요? 그래서, 이쪽으로 오지 않았는지, 라는 거였군요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「このタイミングで……ですか。なんだか少し、気になりますね」"
translation = "「이 타이밍에…… 말인가요. 왠지 조금, 신경 쓰이네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え、待って待って、もしかして、なんか色々起こってることと関係あるかも、ってこと？」"
translation = "「어, 잠깐만 잠깐만, 혹시, 뭔가 여러 가지 일어나고 있는 일과 관계가 있을지도 모른다는 거야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「そこまではわかりませんが……情報は多いに越したことはありませんし、少し調べてみた方がいいかもしれません」"
translation = "「거기까지는 모르겠습니다만…… 정보는 많을수록 좋으니, 조금 조사해 보는 편이 좋을지도 모르겠습니다」"

[[dialogue]]
speaker = "ナナカ"
original = "「ん？\u3000どしたの、なんかあった？\u3000アタシらに手伝えることとかあれば、手伝うけど」"
translation = "「응? 왜 그래, 무슨 일 있었어? 우리들이 도울 수 있는 일이라도 있다면, 도울게」"

[[dialogue]]
speaker = "ロロット"
original = "「異世界観光以外は、お暇ですしね。お供してさしあげましょう」"
translation = "「이세계 관광 외에는, 한가하니까요. 따라가 드리겠습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうですね……」"
translation = "「그렇군요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしかしたら、ナナカさんやロロットさんにも、関係があることかもしれません……！」"
translation = "「어쩌면, 나나카 씨나 로롯토 씨와도, 관계가 있는 일일지도 모릅니다……!」"

