[[dialogue]]
speaker = "unk"
original = "第２話,ノースケベ・ノーライフ,P"
translation = "제2화, 노 스케베 노 라이프, P"

[[dialogue]]
speaker = "unk"
original = "ミヤハルが星徒会室によく顔を出すようになってから、しばらく経ったある日。"
translation = "미야하루가 성도회실에 자주 얼굴을 내비치게 된 지도 꽤 시간이 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺はミヤハルに頼んで、戦闘訓練の相手をしてもらっていた。"
translation = "나는 미야하루에게 부탁해, 전투 훈련 상대를 하고 있었다."

[[dialogue]]
speaker = "ミヤハル"
original = "「――あんっ<emoji=heart04>\u3000うち、負けてもうたわぁ」"
translation = "「――안<emoji=heart04> 내, 져버렸네예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「会長はん、さすが魔王やねぇ。最初はうちの方が勝っとったのに、繰り返すうちにどんどん強うなって」"
translation = "「회장님, 역시 마왕이네예. 처음엔 내가 이기고 있었는데, 반복할수록 점점 강해져서」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちもつい興奮して、ぬるぬるになってしもうたわぁ<emoji=heart04>」"
translation = "「내도 모르게 흥분해서, 미끌미끌해져 버렸어예<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗の話だよね！？"
translation = "땀 이야기지!?"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ、会長はん、そんなスケベぇな目でうちのこと、見んといておくれやす<emoji=heart04>\u3000頬が熱くなってまうわぁ<emoji=heart04>」"
translation = "「후훗, 회장님, 그런 야한 눈으로 내 보지 말아주이소<emoji=heart04> 뺨이 뜨거워져 버리네예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「――うん？\u3000いつもえっちな話ばっかりだけど、何がきっかけでうちがスケベぇなことに目覚めたんか気になるって？」"
translation = "「――응? 맨날 야한 이야기만 하는데, 뭐가 계기가 돼서 내가 야한 거에 눈을 떴는지 궁금하다꼬예?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そない率直に聞いてくれるくらい、うちに興味持ってくれて嬉しいわぁ<emoji=heart04>」"
translation = "「그렇게 솔직하게 물어봐 줄 정도로 내한테 흥미 가져줘서 기쁘네예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そしたら休憩がてら、縁側でお茶でもしながら、話しまひょ<emoji=heart04>」"
translation = "「카면 휴식도 할 겸, 툇마루에서 차라도 마시면서 이야기하입시더<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「はい、会長はん<emoji=heart04>\u3000お茶をどうぞぉ<emoji=heart04>」"
translation = "「자, 회장님<emoji=heart04> 차 드이소<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "縁側に移動した俺たちは、座りながら緑茶を飲む。"
translation = "툇마루로 이동한 우리는, 앉아서 녹차를 마신다."

[[dialogue]]
speaker = "ミヤハル"
original = "「それで、どこから話しまひょか？\u3000うちのこと」"
translation = "「그래서, 어디부터 이야기할까예? 내에 대해서」"

[[dialogue]]
speaker = "ミヤハル"
original = "「――せっかくだから詳しく聞きたい？\u3000ふふっ、ええよぉ<emoji=heart04>」"
translation = "「――모처럼이니까 자세히 듣고 싶다꼬예? 후훗, 좋아예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「初めて会った時に話したこともあったかもしれへんけど、うちは京都にある『安倍野家』っていう旧家の生まれでな？」"
translation = "「처음 만났을 때 말한 적이 있을지도 모르겠는데, 내는 교토에 있는 『아베노가』라는 명문가 태생이라서예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「日本では名の知れた陰陽師、『安倍晴明』はんの血を引いとるんよ」"
translation = "「일본에서 이름 좀 날린 음양사, 『아베노 세이메이』 님의 피를 이어받았거든예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ああ、ちなみに晴明はんと苗字が微妙に違うんは、時代が移り変わる中で、読み方が分かりにくいってなって、『野』って漢字を付け足したらしいわぁ」"
translation = "「아아, 참고로 세이메이 님이랑 성씨가 미묘하게 다른 건, 시대가 변하면서 읽는 법이 알기 어렵다 캐서, 『노』라는 한자를 덧붙였다 카더군예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ほんで、安倍野家は、現代まで陰陽術や巫術を使う星騎士を輩出し続けてきたんやけど……」"
translation = "「카고 아베노가는 현대까지 음양술이나 무술을 사용하는 성기사를 계속 배출해 왔는데……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「その中でもうちは、こう見えて晴明はんに並ぶ才能の持ち主とか呼ばれとるんよ。なんでも、陰陽五行の十属性全てを操れるのは、歴代でも晴明はん以来らしくてな？」"
translation = "「그중에서도 내는, 이래 봬도 세이메이 님에 필적하는 재능의 소유자라고 불리고 있어예. 뭐라더라, 음양오행의 십속성 전부를 다루는 건 역대에서도 세이메이 님 이후로 처음이라 카더군예?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「まあ、同時にスケベぇなこと大好き過ぎて『問題児』ってレッテルも貼られとるんやけど……ふふふっ<emoji=heart04>」"
translation = "「뭐, 동시에 야한 거 너무 좋아해서 『문제아』라는 낙인도 찍혀있긴 하지만예…… 후후후<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「<ruby>一時<rt>いっとき</rt></ruby>はそれを心配した両親から、『貞操を強制的に守らせる星術』を掛けられてもうたこともあってな？\u3000あの時はえろう苦労したわぁ」"
translation = "「한때는 그걸 걱정한 부모님이 『정조를 강제적으로 지키게 하는 성술』을 걸어버린 적도 있어서예. 그때는 억수로 고생했지예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「どうやらそれが、晴明はんの編み出した封印星術やったらしくてな？\u3000それを開錠する新しい星術を生み出すのに１年も掛かってもうて……」"
translation = "「우째 된 게 그게 세이메이 님이 고안한 봉인 성술이었다 카더군예? 그걸 해제하는 새로운 성술을 만들어 내는 데 1년이나 걸려버려서……」"

[[dialogue]]
speaker = "unk"
original = "安倍晴明に勝利してる！"
translation = "아베노 세이메이에게 승리했어!"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ、あの時期は、これまでの人生で１番努力したわぁ。性欲の力は偉大やね<emoji=heart04>」"
translation = "「후훗, 그 시기는 내 인생에서 제일 노력했어예. 성욕의 힘은 위대하네예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「でも、その時頑張ったおかげで、両親もうちの力を少しは認めてくれてな？」"
translation = "「그래도 그때 열심히 한 덕분에, 부모님도 내 힘을 조금은 인정해 줘서예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「もうスケベぇなことは止めへんでもええさかい、せめて好きな男の人を見つけて、その人とだけにしといて～って……うち、お父はんにガチ泣きで言われてしもたんよ」"
translation = "「이제 야한 짓 안 그만둬도 괜찮으니까, 제발 좋아하는 남자를 찾아서 그 사람하고만 해달라고~ 하며…… 내, 아부지가 진짜로 우시면서 말하시더라고예」"

[[dialogue]]
speaker = "unk"
original = "エロでお父さんをガチ泣きさせないで……"
translation = "에로함으로 아버지를 울리지 마……"

[[dialogue]]
speaker = "ミヤハル"
original = "「まあ、両親がうちのことを心配してくれてるのはわかっとるし、スケベぇなこと大好きな気持ちは抑えられんくても、その約束くらいは守ろう思うてな？」"
translation = "「뭐, 부모님이 내 걱정해 주시는 건 알고 있고, 야한 거 너무 좋아하는 마음은 억제할 수 없어도 그 약속 정도는 지키자 싶어서예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「今日まで数多の煩悩に駆られつつも、なんとか頑張って、<b>処女</b>は守り続けとるんよ」"
translation = "「오늘까지 수많은 번뇌에 휩싸이면서도 우찌우찌 노력해서, <b>처녀</b>는 계속 지키고 있어예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふふっ。うちはドスケベやけど、意外と真面目やろ？」"
translation = "「후후후. 내는 변태지만 의외로 성실하지 않능교?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「これでもなるべく言葉も選んで、オブラートに包んで喋るようにしとるんよ？」"
translation = "「이래 봬도 될 수 있는 대로 말도 골라서, 돌려서 말하려고 노력하고 있다예?」"

[[dialogue]]
speaker = "unk"
original = "それは絶対に嘘だ！！！"
translation = "그건 절대 거짓말이다!!!"

[[dialogue]]
speaker = "ミヤハル"
original = "「でもまあ、ついスケベぇな目で見られたくなってまうというか……興奮してもうて、オブラートに包み忘れることも少なくないだけなんよ<emoji=heart04>」"
translation = "「그래도 뭐, 나도 모르게 야한 눈으로 봐줬으면 좋겠다 싶달까…… 흥분해 버려서, 돌려 말하는 걸 잊어버리는 일도 적지 않을 뿐이라예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あっ<emoji=heart04>\u3000会長はん、そんなジト目でこっちを見て……うち、どうしようもないドスケベ女って思われとる<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님, 그런 도끼눈으로 내를 보고…… 내, 구제 불능인 변태 여자라고 생각하고 있지예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「アカン<emoji=heart04>\u3000そんな目で見られたらうち、濡れてまうわぁ<emoji=heart04>」"
translation = "「안 된다예<emoji=heart04> 그런 눈으로 보면 내, 젖어버린다예<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ダメだ、この陰陽師……早くなんとかしないと。"
translation = "안 되겠다, 이 음양사…… 빨리 어떻게든 하지 않으면."

[[dialogue]]
speaker = "unk"
original = "エロに目覚めたきっかけとかは？"
translation = "에로함에 눈뜬 계기 같은 건?"

[[dialogue]]
speaker = "ミヤハル"
original = "「ああ、せやったね。言うてもよくある話で、うちの場合は『反動』やね」"
translation = "「아아, 그랬지예. 말하자면 흔한 이야기인데, 내 경우에는 『반동』이라예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「こう見えて、子供の頃はうち、すごく清楚やったんよ？」"
translation = "「이래 봬도 어릴 적엔 내, 엄청 청초했거든예?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「せやけどある日、川で１冊のスケベぇな本に出会ってな？\u3000それまでの反動で、一気に見る世界が変わって、性に目覚めてもうたんよ」"
translation = "「카다가 어느 날, 강에서 야한 책 한 권을 만났지 뭐예? 그때까지의 반동으로 단숨에 보이는 세상이 바뀌어서, 성에 눈떠버렸어예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「それから、強い興味を持つようになって、今ではえっちなことに対して悟りを開く程になったというわけや<emoji=heart04>」"
translation = "「그때부터 강한 흥미를 갖게 돼서, 지금은 야한 것에 대해서 깨달음을 얻을 정도가 되었다는 소리라예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「えっちなことこそが、うちにとって１番身近な幸福。せやから、好きな男を見つけて、１日中ドスケベな生活を送れたら、それが最高の幸せや～<emoji=heart04>\u3000ってな？」"
translation = "「야한 것이야말로 내한테 제일 가까운 행복. 카니까, 좋아하는 남자를 찾아서 하루 종일 변태 같은 생활을 보낼 수 있다면, 그게 최고의 행복이다~ 싶어서예<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「で、その幸せを叶える為に、会長はんに絶賛アピール中というわけや<emoji=heart04>」"
translation = "「카고, 그 행복을 이루기 위해서 회장님한테 절찬 어필 중이라는 소리라예<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その……聞きたかったんだけど"
translation = "그…… 묻고 싶었는데"

[[dialogue]]
speaker = "ミヤハル"
original = "「――うん？\u3000どうして会長はんなのかって？」"
translation = "「――응? 왜 회장님이냐꼬예?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「それはもちろん、強いからやね<emoji=heart04>\u3000やっぱり、強い男に抱かれる方が興奮するやろ？」"
translation = "「그거야 당연히 강하니까 그렇지예<emoji=heart04> 역시 강한 남자한테 안기는 게 더 흥분되지 않겠능교?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あっ、でも、強いというのは腕っぷしのことだけを言ってるわけやないよ？」"
translation = "「앗, 근데 강하다는 게 싸움 실력만을 말하는 건 아니에예?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うち、会長はんの御前試合の時な、ヴィーナスはんと戦うのが転入生の男子やって聞いて、実はこっそり観に行ってたんよ」"
translation = "「내, 회장님 어전 시합 때 말이지예, 비너스 양이랑 싸우는 게 전학생 남자라는 소릴 듣고 사실 몰래 구경 갔었거든예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そこで会長はんが戦うのを見て……ヴィーナスはんに何度打ちのめされてボロボロになっても、諦めずに立ち上がる姿がカッコええなぁって、トキめいたんや」"
translation = "「거기서 회장님이 싸우는 걸 보고…… 비너스 양한테 몇 번이나 두들겨 맞고 엉망진창이 돼도 포기하지 않고 일어서는 모습이 멋지다 싶어서, 가슴이 두근거렸어예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「せやから、うちは――」"
translation = "「카니까 내는――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「会長はんのこと、心からええ男やって、あの時からずっと思っとるよ？」"
translation = "「회장님을 진심으로 멋진 남자라고 그때부터 줄곧 생각하고 있어예」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>」"
translation = "「후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目を真っすぐに見て微笑むミヤハルに、俺は思わずドキッとして、照れてしまうのだった――"
translation = "눈을 똑바로 쳐다보며 미소 짓는 미야하루에게 나도 모르게 가슴이 설레어, 쑥스러워지고 말았다――"

