[[dialogue]]
speaker = "unk"
original = "祝福の鐘が鳴る。"
translation = "축복의 종이 울린다."

[[dialogue]]
speaker = "unk"
original = "厳かな音楽が響き渡り、舞台を神聖な気で満たしていく。"
translation = "엄숙한 음악이 울려 퍼지며 무대를 신성한 기운으로 채워나간다."

[[dialogue]]
speaker = "unk"
original = "集まった参列者達はそれぞれ花を一輪持ち、新郎新婦を祝福しようと待っていた。"
translation = "모인 참례자들은 저마다 꽃을 한 송이씩 들고 신랑 신부를 축복하기 위해 기다리고 있었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まさか式が再開されるとは夢にも思いませんでしたが……」"
translation = "「설마 식이 재개될 줄은 꿈에도 몰랐지만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「離れ離れになった新郎と新婦が、再びこの地に集いました。そのことを、ただ喜びたいと思います」"
translation = "「떨어져 있던 신랑과 신부가 다시 이곳에 모였습니다. 그 일을 그저 기뻐하고 싶군요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新郎、準備はよろしいですか？」"
translation = "「신랑, 준비됐습니까?」"

[[dialogue]]
speaker = "unk"
original = "準備ＯＫです"
translation = "준비 OK입니다"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「では新婦、準備はよろしいですか？」"
translation = "「그럼 신부, 준비됐습니까?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はい、準備出来てます」"
translation = "「네, 준비됐어요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「では、婚礼の儀を再開しましょう」"
translation = "「그럼, 혼례 의식을 재개하겠습니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新郎緋宮クロト。あなたは有明トワを妻とし、健やかなる時も病める時も、富める時も貧しき時も、彼女を愛し、慈しむことを誓いますか？」"
translation = "「신랑 히노미야 쿠로토. 당신은 아리아케 토와를 아내로 맞이하여, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 그녀를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "unk"
original = "……誓います"
translation = "……맹세합니다"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新婦有明トワ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も、彼を愛し、慈しむことを誓いますか？」"
translation = "「신부 아리아케 토와. 당신은 히노미야 쿠로토를 남편으로 맞이하여, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 그를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はい、誓います」"
translation = "「네, 맹세합니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「では誓いの口付けを……」"
translation = "「그럼 맹세의 입맞춤을……」"

[[dialogue]]
speaker = "unk"
original = "綺麗だよ、トワ"
translation = "이뻐, 토와"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「っっ～～～～！！？」"
translation = "「윽~~~~!!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「このタイミングでそんなこと！\u3000しかも名前呼びとかっ！」"
translation = "「이 타이밍에 그런 소릴! 게다가 이름으로 부르다니!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも……結婚式、って感じ。そっか、雰囲気を作ってくれたんだね……ありがとう」"
translation = "「하지만…… 결혼식, 이란 느낌. 그렇구나, 분위기를 잡아준 거네…… 고마워」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「誓いのキスを……」"
translation = "「맹세의 키스를……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「す、すみません、しますっ」"
translation = "「죄, 죄송해요, 할게요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「…………ちゅっ」"
translation = "「…………쪽」"

[[dialogue]]
speaker = "unk"
original = "トワ先生の唇が、ちょこんと俺の頬に触れた。"
translation = "토와 선생님의 입술이 살짝 내 뺨에 닿았다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへ……ほっぺにだけど、キスしちゃった」"
translation = "「에헤헤…… 뺨이지만, 키스해 버렸다」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「さあ、次は会長くんの番だよ」"
translation = "「자, 다음은 회장군 차례야」"

[[dialogue]]
speaker = "unk"
original = "トワ先生が俺に頬を差し出してくる。"
translation = "토와 선생님이 나에게 뺨을 내민다."

[[dialogue]]
speaker = "unk"
original = "ありえないくらいに心臓をドキドキさせながら、トワ先生の頬に唇を寄せた。"
translation = "말도 안 될 정도로 심장이 두근거리면서, 토와 선생님의 뺨에 입술을 가져갔다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「まだまだ新米な花嫁だけど……これからよろしくねっ♪」"
translation = "「아직 새내기 신부지만…… 앞으로 잘 부탁해♪」"

[[dialogue]]
speaker = "unk"
original = "ああ、こちらこそよろしくね"
translation = "아아, 나야말로 잘 부탁해"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えへへ……<emoji=heart04>」"
translation = "「에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、ウェディンドレスが……戻っちゃった」"
translation = "「앗, 웨딩드레스가…… 돌아가 버렸어」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そもそもウェディングフォームを解除するための結婚式だったのですから、無事解除されて良かったのでは？」"
translation = "「애초에 웨딩 폼을 해제하기 위한 결혼식이었으니까, 무사히 해제되어 다행 아닌가요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そうなんだけど……でも、ちょっと寂しい感じがするっていうか……」"
translation = "「그렇긴 한데…… 그래도 조금 아쉬운 느낌이 든달까……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「では今度は、本物のウェディングドレスを着せてもらえばいいと思いますよ」"
translation = "「그럼 이번엔 진짜 웨딩드레스를 입혀 달라고 하면 되잖아요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「本物を……着せて……」"
translation = "「진짜를…… 입혀서……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ねえ、会長さん？」"
translation = "「그쵸, 회장님?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "……………………"
translation = "……………………"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はっ！？\u3000そそそ、そーだねっ！\u3000つ、次はちゃんとした結婚式で、ウェディングドレスを着れるように頑張らないとっ！！」"
translation = "「핫!? 그그그, 그렇네! 다, 다음엔 제대로 된 결혼식에서 웨딩드레스를 입을 수 있도록 노력해야지!!」"

[[dialogue]]
speaker = "unk"
original = "そっ、そうですよ先生っ！"
translation = "그, 그래요 선생님!"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うんっ、わたしがんばるよっ！\u3000会長くん、今回は協力してくれてありがとうねっ！」"
translation = "「응, 나 힘낼게! 회장군, 이번에 협력해줘서 고마워!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「よーし、研究も頑張らなくちゃ！\u3000ここからが本番だもんね！\u3000ウェディングフォームも手に入れたし、明日からバリバリ研究に打ち込むぞ～っ！」"
translation = "「조아─써, 연구도 열심히 해야지! 이제부터가 진짜니까! 웨딩 폼도 손에 넣었으니 내일부터 팍팍 연구에 매진하겠어~!」"

[[dialogue]]
speaker = "unk"
original = "その意気です！"
translation = "그 기세입니다!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（……やれやれ）"
translation = "(……이런이런)"

[[dialogue]]
speaker = "unk"
original = "こうしてトワ先生のウェディング騒動は決着を迎えた。"
translation = "이렇게 해서 토와 선생님의 웨딩 소동은 결말을 맞이했다."

[[dialogue]]
speaker = "unk"
original = "２人の結婚式の写真や動画は、格好の冷やかし材料としてしばらく学園の話題を席巻したが──"
translation = "두 사람의 결혼식 사진과 영상은 좋은 놀림감이 되어 한동안 학원의 화제를 휩쓸었지만──"

[[dialogue]]
speaker = "unk"
original = "それも時間の経過とともに風化して、何事もなかったかのような日常が戻ってくる。"
translation = "그것도 시간이 흐르면서 풍화되어, 아무 일도 없었다는 듯한 일상이 돌아온다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――ふぅ、今日はここまでにしとこうかな」"
translation = "「──후우, 오늘은 여기까지 할까나」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あー、もう、つっかれた～！\u3000こんな時間になっちゃって、急がないとお店が閉まっちゃうよ」"
translation = "「아─ 정말, 지친다~! 시간이 벌써 이렇게 됐네, 서두르지 않으면 가게 문 닫겠어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「さっさと片付けして帰ろ～っと」"
translation = "「얼른 치우고 가야지~」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「いつも遅くなっちゃって、メイプルちゃんに申し訳ないなぁ」"
translation = "「항상 늦어져서 메이플짱한테 미안하네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ウェディングフォームを手に入れて研究も進むかも、なんて期待してたけど……そう上手くはいかないね」"
translation = "「웨딩 폼을 얻어서 연구도 진척될까 기대했는데…… 그렇게 뜻대로 되진 않네」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あれ？\u3000こんなぼやき、前にもしたことがあるような……」"
translation = "「어라? 이런 푸념, 전에도 한 적이 있는 것 같은데……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「はっ！？\u3000そうだよ！\u3000ウェディングフォームが発生した、あの前の日の夜にも同じようなことをぼやいてたよ！」"
translation = "「핫!? 맞아! 웨딩 폼이 발생했던 그 전날 밤에도 비슷한 푸념을 했었어!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……つまり、今のわたしの生活……事件が起きる前と変わらない状態に戻っちゃってる、ってこと……」"
translation = "「……즉, 지금 내 생활…… 사건이 일어나기 전이랑 변함없는 상태로 돌아가 버렸다는 거……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「結婚したいけどお相手もいないし、どんどん歳を取っていっちゃってる……あの悲しい生活に……」"
translation = "「결혼하고 싶지만 상대도 없고, 점점 나이만 먹어가고 있는…… 그 슬픈 생활로……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "『未婚の女性が何度もウェディングドレスを着るのは、あまりいいことじゃないって言いますもんね……』"
translation = "『미혼 여성이 웨딩드레스를 몇 번이나 입는 건 별로 좋지 않다고들 하니까요……』"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "『そうなんだよ、婚期が遠のくって言うもん！\u3000それはやだぁ～！』"
translation = "『맞아, 혼기가 늦어진다고 하잖아! 그건 싫어~!』"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「婚期が……遠のく……」"
translation = "「혼기가…… 늦어져……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふぇ……や……」"
translation = "「후에…… 싫……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「やだやだやだやだ！\u3000やだよぉおおおおおおおおおおおっ！！！！！」"
translation = "「싫어싫어싫어싫어! 싫다구우우우우우우우우우우웃!!!!!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたしも結婚したいよぉおおおおおおっ！！！\u3000助けて会長くーーーーーーーん！！！！！」"
translation = "「나도 결혼하고 싶어어어어어어어어어엇!!! 살려줘 회장구우우우우우우우운!!!!!」"

[[dialogue]]
speaker = "unk"
original = "トワ先生の悲しい叫びが空しく夜空に響き渡る。"
translation = "토와 선생님의 구슬픈 절규가 허무하게 밤하늘에 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "負けるな、トワ先生！\u3000いつか本物のウェディングドレスを着て、幸せを掴み取るその日まで！"
translation = "지지 마라, 토와 선생님! 언젠가 진짜 웨딩드레스를 입고 행복을 거머쥐는 그날까지!"

