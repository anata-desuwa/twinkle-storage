[[dialogue]]
speaker = "unk"
original = "第４話,吸血鬼の初恋,P"
translation = "제4화, 흡혈귀의 첫사랑"

[[dialogue]]
speaker = "unk"
original = "ソフレの部屋へ遊びに行くという話をして以来、なんだか彼女の様子がおかしい。"
translation = "소프레의 방에 놀러 가기로 한 이야기를 한 이후로, 왠지 그녀의 상태가 이상하다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「じ～っ……」"
translation = "「지이익……」"

[[dialogue]]
speaker = "unk"
original = "あっ、ソフレ！"
translation = "앗, 소프레!"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……！\u3000そ、ソフレは用事があるのよ！\u3000会長、また今度なのだわ～！」"
translation = "「……! 소, 소프레는 볼일이 있는걸요! 회장, 다음에 봐요～～앗!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「はぁ……また会長と話せなかったのだわ……」"
translation = "「하아…… 또 회장과 이야기하지 못한 거예요……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "（この前の部屋で遊ぶ約束は、結局理由を誤魔化してキャンセルしてしまったし……）"
translation = " (지난번 방에서 놀기로 한 약속은 결국 핑계를 대서 취소해 버렸고……)"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "（会長のことを異性として意識してしまったら、部屋で２人きりなんて、どんな顔をして過ごせばいいのかわからないのだわ）"
translation = " (회장을 이성으로 의식해 버리면 방에서 둘이서만 대체 어떤 얼굴로 지내야 할지 모르는 거예요)"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "（あれから、星徒会室にも行けなくなってしまったし……）"
translation = " (그 후로 성도회실에도 갈 수 없게 되어버렸고……)"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "（こ、これも全部、ソフレが会長をす、好きかもなんて、フェリシーが余計なことを言い出すからなのだわ……！）"
translation = " (이, 이것도 전부 소프레가 회장을 조, 좋아할지도 모른다느니 펠리시가 쓸데없는 소리를 했기 때문인 거예요……!)"

[[dialogue]]
speaker = "unk"
original = "ソフレ、見つけた！"
translation = "소프레, 찾았다!"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「えっ！？\u3000か、会長！？\u3000どうしてここに！？」"
translation = "「엣!? 회, 회장!? 어떻게 여기에!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――フェリシーから、最近ここを昼寝スポットにしてると教えられて？\u3000アイツ、いつの間に調べて……」"
translation = "「――펠리시한테 최근 여기가 낮잠 스폿이라고 들어서? 그 녀석, 언제 조사한 건지……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そ、それで会長は、一体何の用なのだわ？\u3000ソフレはこれからお昼寝するから、会長の相手をする時間はないのよ」"
translation = "「그, 그래서 회장은 대체 무슨 용건인 거예요? 소프레는 이제 낮잠 잘 거라 회장 상대해 줄 시간은 없는걸요」"

[[dialogue]]
speaker = "unk"
original = "ソフレの様子が変だったから、心配になって"
translation = "소프레의 상태가 이상해서 걱정이 돼서."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そ、それは……」"
translation = "「그, 그건……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "（本当のことを面と向かって言えるわけがないのだわ……！）"
translation = " (사실대로 면전에서 말할 수 있을 리 없는 거예요……!)"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「って、会長？\u3000――聞いて欲しいって……どうしたのだわ？」"
translation = "「그보다 회장? ――들어줬으면 좋겠다니…… 무슨 일인 거예요?」"

[[dialogue]]
speaker = "unk"
original = "俺はソフレと、これからも仲よくしたい"
translation = "나는 소프레와 앞으로도 사이좋게 지내고 싶어."

[[dialogue]]
speaker = "unk"
original = "だから、変に距離を置かれているのは寂しいと伝える。"
translation = "그러니 묘하게 거리를 두는 건 외롭다고 전한다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……！\u3000で、でも、色々と難しいと思うのだわ……。会長は男で、異性だし……」"
translation = "「……! 하지만 여러모로 어렵다고 생각하는 거예요……. 회장은 남자고 이성이고……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「部屋で遊ぶ約束をした後に冷静に考えて、その……少し距離が近過ぎたかなと思ったのよ」"
translation = "「방에서 놀기로 약속한 뒤에 냉정하게 생각해서 그게…… 조금 거리가 너무 가까웠나 싶었던걸요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「だから、今までみたいな関係を続けるのは……」"
translation = "「그러니까 지금까지 같은 관계를 계속하는 건……」"

[[dialogue]]
speaker = "unk"
original = "俺は、ソフレのことが好きだ！"
translation = "나는 소프레를 좋아해!"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「えっ！？\u3000い、いきなり何を言い出すのだわ、会長！？\u3000まさか、フェリシーから何か吹き込まれたの！？」"
translation = "「엣!? 가, 갑자기 무슨 말을 하는 거예요, 회장!? 설마 펠리시한테 뭔가 들은 거야!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そ、それはあくまで、フェリシーが勝手に言っているだけであって……」"
translation = "「그, 그건 어디까지나 펠리시가 멋대로 말하는 것일 뿐이지……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――フェリシーから言われたわけじゃない？\u3000じゃあ、なんで……」"
translation = "「――펠리시한테 들은 게 아니라고? 그럼 왜……」"

[[dialogue]]
speaker = "unk"
original = "ソフレとこれ以上仲良くなる為には、自分がもっと素直にならなきゃダメだと思った。"
translation = "소프레와 이 이상 친해지기 위해서는 내가 좀 더 솔직해져야 한다고 생각했어."

[[dialogue]]
speaker = "unk"
original = "だから、恋人候補として立候補したうえで、改めて男友達として仲良くして欲しい――俺はそう伝えた。"
translation = "그러니 연인 후보로서 입후보함과 동시에 다시금 남자 친구로서 사이좋게 지내줬으면 좋겠다―― 나는 그렇게 전했다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そ、ソフレは確かに、素直じゃないと思うけど……」"
translation = "「소, 소프레는 확실히 솔직하지 못하다고 생각하지만……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「でも、そもそもソフレは吸血鬼なのよ？\u3000寿命の長さが全然違うから、その……仲良くするなら色々と覚悟が必要なのだわ」"
translation = "「하지만 애초에 소프레는 흡혈귀인걸요? 수명의 길이가 전혀 다르니까 그게…… 사이좋게 지내려면 여러모로 각오가 필요한 거예요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「それに、ソフレはフェリシーみたいにスタイルがいいわけではないのだわ」"
translation = "「게다가 소프레는 펠리시처럼 스타일이 좋은 것도 아닌걸요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「これは吸血鬼だからというわけじゃなくて、ソフレ個人が単純に発育がよくないからというか……」"
translation = "「이건 흡혈귀라서 그런 게 아니라 소프레 개인이 단순히 발육이 좋지 않달까……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「あと、会長も知っていると思うけど、１００年前までは、すごい悪さをしていたし……」"
translation = "「그리고 회장도 알다시피 100년 전까지는 엄청나게 나쁜 짓을 저질렀고……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「今だって、わかってると思うけど……捻くれてて、ワガママなのよ」"
translation = "「지금도 알고 있겠지만…… 삐딱하고 제멋대로인걸요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「付き合う異性としては、色々と問題があり過ぎると思うのだわ……」"
translation = "「사귀는 이성으로서는 여러모로 문제가 너무 많다고 생각하는 거예요……」"

[[dialogue]]
speaker = "unk"
original = "それでも、今目の前にいるソフレが好きだ"
translation = "그래도 지금 눈앞에 있는 소프레가 좋아."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ほ、本当に…………会長は物好きなんだから…………」"
translation = "「정, 정말이지………… 회장은 별난 사람이니까…………」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「後悔しても、知らないのよ？\u3000……それでもいいなら、会長を…………その…………」"
translation = "「후회해도 모르는걸요? ……그래도 좋다면 회장을………… 그…………」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「試しに……ソフレの初めての男にしてあげなくもないのだわ……」"
translation = "「시험 삼아…… 소프레의 첫 남자로 삼아주지 못할 것도 없는 거예요……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――それで一応……男女の関係になったわけだし……」"
translation = "「――그래서 일단…… 남녀 관계가 된 셈이고……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「今度はソフレの部屋に招待しても、問題はないと思うのだけど……どうかしら？」"
translation = "「이번엔 소프레의 방에 초대해도 문제는 없을 것 같은데…… 어떨까나?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――そ、そう。わかったわ。じゃあ改めて、今週末ね？」"
translation = "「――그, 그래요. 알겠어요. 그럼 다시 이번 주말이네요?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「あっ、で、でも一応、言っておくけど……」"
translation = "「앗, 하, 하지만 일단 말해두겠지만……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレはまだ、会長のことを好きと認めたわけじゃなくて、あくまでお試しなのよ。だから――」"
translation = "「소프레는 아직 회장을 좋아한다고 인정한 게 아니라 어디까지나 시험 중인걸요. 그러니까――」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「一緒にお昼寝することになっても、まだ……へ、変なことはしちゃダメだからね？」"
translation = "「함께 낮잠을 자게 되더라도 아직…… 이, 이상한 짓은 하면 안 되니까요?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「それは……ソフレにちゃんと好きって、言わせてからなんだから」"
translation = "「그건…… 소프레에게 제대로 좋아한다고 말하게 만든 다음이니까요」"

[[dialogue]]
speaker = "unk"
original = "期待するような上目遣いを向けてくるソフレに、俺は思わずドキッとしてしまうのだった――"
translation = "기대하는 듯한 상전이를 향해오는 소프레에게 나는 나도 모르게 가슴이 두근거리고 마는 것이었다――"

