[[dialogue]]
speaker = "unk"
original = "第４話,不器用なりに全力で,P"
translation = "제4화, 서툰 대로 전력으로, P"

[[dialogue]]
speaker = "unk"
original = "流星寮のクリスマスパーティーは大いに盛り上がった。"
translation = "유성 기숙사의 크리스마스 파티는 크게 흥겨웠다."

[[dialogue]]
speaker = "unk"
original = "興奮の余韻が冷めない俺は、恋人のアニュラスを伴って家に戻ってきた。"
translation = "흥분의 여운이 가시지 않은 나는, 연인인 아뉴라스와 함께 집으로 돌아왔다."

[[dialogue]]
speaker = "アニュラス"
original = "「むむむむむ……」"
translation = "「으으으으으……」"

[[dialogue]]
speaker = "unk"
original = "落ち着かない？"
translation = "진정이 안 돼?"

[[dialogue]]
speaker = "unk"
original = "どうしたの？"
translation = "왜 그래?"

[[dialogue]]
speaker = "アニュラス"
original = "「当然だっ。家長不在のところに来訪しているし、それに……」"
translation = "「당연하다. 가장이 부재중인 곳에 방문했고, 게다가……」"

[[dialogue]]
speaker = "アニュラス"
original = "「こんなっ、クリスマス全開の格好をしてるんだぞっ。浮かれすぎじゃないか？」"
translation = "「이런, 크리스마스 분위기 가득한 복장을 하고 있지 않나. 너무 들뜬 것 아닌가?」"

[[dialogue]]
speaker = "アニュラス"
original = "「パーティーの最中、私がめちゃくちゃ浮かれていたのは事実だ。しかし、パーティーは終わったんだぞ。もう日常に戻って然るべきだ」"
translation = "「파티 도중, 내가 엄청나게 들떠 있었던 것은 사실이다. 하지만 파티는 끝났지 않나. 이제 일상으로 돌아가는 것이 마땅하다.」"

[[dialogue]]
speaker = "unk"
original = "日常に戻りたくないな"
translation = "일상으로 돌아가고 싶지 않네"

[[dialogue]]
speaker = "unk"
original = "まだクリスマスは終わってないよ"
translation = "아직 크리스마스는 끝나지 않았어"

[[dialogue]]
speaker = "アニュラス"
original = "「……楽しかったからな。終わりたくない気持ちはわかる。私だって、クリスマスフォームのままでここに来てしまったのだから」"
translation = "「……즐거웠으니까 말이다. 끝나지 않았으면 하는 마음은 이해한다. 나조차 크리스마스 폼인 채로 이곳에 와 버렸으니.」"

[[dialogue]]
speaker = "アニュラス"
original = "「しかしっ、急に我に返ってしまったんだ。私ははしゃぎ過ぎていないか？\u3000リノお母様が戻ってきて、今の私を見たら、いったいどう思うか……」"
translation = "「하지만 갑자기 제정신이 들어 버렸다. 내가 너무 소란을 피운 건 아닌가? 리노 어머님이 돌아오셔서 지금의 나를 보신다면 대체 어떻게 생각하실지……」"

[[dialogue]]
speaker = "unk"
original = "うちの嫁かわいい、かな？"
translation = "우리 며느리 귀엽네, 라고 하시지 않을까?"

[[dialogue]]
speaker = "アニュラス"
original = "「よ、嫁ぇぇっっ！！？\u3000おい待て！\u3000お母様の中で、いったい私はどういう位置づけなんだ？」"
translation = "「며, 며느리이이이!!? 야, 기다려! 어머님 속에서 대체 나는 어떤 위치인 거냐?」"

[[dialogue]]
speaker = "アニュラス"
original = "「確かにそのっ、お前の恋人だし、交際を続けて行けば、いずれはその延長に……よ、嫁……お嫁さんっ、に、なることだってっっ<emoji=heart04>」"
translation = "「확실히 그, 너의 연인이고, 교제를 계속해 나간다면 언젠가는 그 연장선상에…… 며, 며느리…… 아내, 가 되는 일도 있겠지<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「うわぁぁぁっ！！\u3000私はいったい何を考えてるんだっ！\u3000煩悩退散！\u3000浮かれ心、死すべし！」"
translation = "「으아아아앗!! 나는 대체 무슨 생각을 하는 거냐! 번뇌 퇴산! 들뜬 마음은 죽어라!」"

[[dialogue]]
speaker = "unk"
original = "意識してくれて嬉しい"
translation = "의식해 줘서 기뻐"

[[dialogue]]
speaker = "unk"
original = "大袈裟だなぁ"
translation = "과장이 심하네"

[[dialogue]]
speaker = "アニュラス"
original = "「流星の騎士を目指すんだから、恋愛にうつつを抜かすのがそもそもおかしいのかもしれない。だとしたら、そんなのっ……そんなのっ……」"
translation = "「유성의 기사를 목표로 하고 있으니, 연애에 한눈을 파는 것이 애초에 이상한 것일지도 모른다. 그렇다면 그런 건…… 그런 건……」"

[[dialogue]]
speaker = "アニュラス"
original = "「騎士失格……かなぁ？」"
translation = "「기사 실격……일까?」"

[[dialogue]]
speaker = "unk"
original = "騎士ならば愛を知るべき"
translation = "기사라면 사랑을 알아야 해"

[[dialogue]]
speaker = "unk"
original = "失格じゃない"
translation = "실격이 아니야"

[[dialogue]]
speaker = "アニュラス"
original = "「そう、だな……うん、お前の言う通りだ」"
translation = "「그렇, 군…… 음, 네 말이 맞다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「悪を打倒するだけが騎士じゃない。そのことを教えてもらったはずなのに情けないな。こんな些細なことで揺らいでしまうなんて」"
translation = "「악을 타도하는 것만이 기사가 아니지. 그 사실을 배웠을 텐데 한심하군. 이런 사소한 일로 흔들리다니.」"

[[dialogue]]
speaker = "アニュラス"
original = "「私はもう否定しない。お前という恋人の存在も、人を愛する素晴らしさも」"
translation = "「나는 이제 부정하지 않겠다. 너라는 연인의 존재도, 사람을 사랑하는 숭고함도.」"

[[dialogue]]
speaker = "アニュラス"
original = "「お前の彼女にしてもらって学んだことだからな。感謝している」"
translation = "「네 여자친구가 되어 배운 것이니까 말이다. 감사하고 있다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「そうだ、感謝のついでではないが……プレゼントを用意してきたんだ。受け取ってくれ」"
translation = "「그렇다, 감사하는 마음에서 준비한 건 아니다만…… 선물을 준비해 왔다. 받아 다오.」"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺も……"
translation = "그럼 나도……"

[[dialogue]]
speaker = "unk"
original = "ありがとう！"
translation = "고마워!"

[[dialogue]]
speaker = "アニュラス"
original = "「お前もプレゼント用意してたのか。ははっ、クリスマスだもんな、しかも恋人同士なんだ、プレゼントの１つくらい用意するのが当然だろう」"
translation = "「너도 선물을 준비했었나. 하하, 크리스마스니까 말이다. 게다가 연인 사이니 선물 하나쯤 준비하는 건 당연하겠지.」"

[[dialogue]]
speaker = "アニュラス"
original = "「と……言いたいところだが、すまない！\u3000情けないことを告白するが、パーティーの準備が忙しすぎてすっかり失念していたんだ！」"
translation = "「라고…… 말하고 싶다만, 미안하다! 한심한 고백을 하자면, 파티 준비가 너무 바빠서 완전히 잊고 있었다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「教えてくれたのは舞亜だ。恋人にプレゼントを用意しておいた方がいいって」"
translation = "「알려준 건 마이아다. 연인에게 선물을 준비해 두는 편이 좋다고 말이야.」"

[[dialogue]]
speaker = "アニュラス"
original = "「そのくらい私は気が利かない女なんだ。１つのことで頭がいっぱいになって、同時に色々なことが考えられない」"
translation = "「그 정도로 나는 눈치가 없는 여자다. 한 가지 일에 머리가 꽉 차서 동시에 여러 가지를 생각하지 못하지.」"

[[dialogue]]
speaker = "アニュラス"
original = "「そんな自分も変えたいと思っている……が、今回の件を通して学ばせてもらった。自分に出来ないことは、誰かに力を借りてもいい」"
translation = "「그런 자신도 바꾸고 싶다고 생각하고 있다……만, 이번 일을 통해 배웠다. 자신이 할 수 없는 일은 누군가의 힘을 빌려도 좋다는 것을.」"

[[dialogue]]
speaker = "アニュラス"
original = "「私は私らしく。アニュラス・セイファートのまま、お前を愛したい」"
translation = "「나는 나답게. 아뉴라스 세이퍼트인 채로, 너를 사랑하고 싶다.」"

[[dialogue]]
speaker = "アニュラス"
original = "「不器用なら不器用なりに全力で、気持ちを込めて……好きだって伝え続けるからな<emoji=heart04>」"
translation = "「서투르면 서투른 대로 전력을 다해, 마음을 담아서…… 좋아한다고 계속 전할 테니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛してる♥"
translation = "사랑해♥"

[[dialogue]]
speaker = "unk"
original = "好きだよ♥"
translation = "좋아해♥"

[[dialogue]]
speaker = "アニュラス"
original = "「う、うん、知ってる。知ってても、やはり言われると嬉しいな<emoji=heart04>」"
translation = "「어, 응, 알고 있다. 알고 있어도, 역시 들으니까 기쁘구나<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「伝えたい想いがあるなら、恥ずかしがらず伝えた方がいい。真っ直ぐに届けるのが一番大事だからな」"
translation = "「전하고 싶은 마음이 있다면, 부끄러워하지 말고 전하는 편이 좋다. 똑바로 전달하는 것이 가장 중요하니까 말이다」"

[[dialogue]]
speaker = "アニュラス"
original = "「だから私は言うぞっ。そ、そのっ……キスしたい……パーティーの間ずっと我慢してたんだぞ。お前が私を褒めるたび、キスしたい、ギュッと抱き締めたいって」"
translation = "「그러니까 나는 말하겠다. 그, 그게…… 키스하고 싶다…… 파티 내내 계속 참았단 말이다. 네가 나를 칭찬할 때마다, 키스하고 싶다, 꽉 껴안고 싶다고」"

[[dialogue]]
speaker = "アニュラス"
original = "「だからするぞ。恋人だから遠慮なんてしない」"
translation = "「그러니까 하겠다. 연인이니까 사양 따윈 안 해」"

[[dialogue]]
speaker = "アニュラス"
original = "「ちゅ<emoji=heart04>\u3000んちゅ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅ～～っ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 쪽<emoji=heart04> 쪽<emoji=heart04> 쪽<emoji=heart04> 쪼오옥~~<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふへへ……キス、してしまったな<emoji=heart04>\u3000やっぱりキスするの、好きだ……<emoji=heart04>\u3000もっとしていいか？\u3000いや、駄目だと言ってもするぞ。彼氏として彼女を満足させてくれ<emoji=heart04>」"
translation = "「후헤헤…… 키스, 해버렸구나<emoji=heart04> 역시 키스하는 거, 좋다……<emoji=heart04> 더 해도 되겠나? 아니, 안 된다고 해도 할 거다. 남자친구로서 여자친구를 만족시켜 다오<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「ふふっ、好きだぞ<emoji=heart04>\u3000愛してる<emoji=heart04>\u3000いっぱいいっぱい……私のこと忘れられないくらい、キスしまくるからなっ<emoji=heart04>」"
translation = "「후훗, 좋아한다<emoji=heart04> 사랑해<emoji=heart04> 가득가득…… 나를 잊을 수 없을 정도로, 키스 퍼부을 테니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
original = "「んちゅう～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응쪼오오옥~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とアニュラスは夢中になって、キスを繰り返すのだった。"
translation = "이렇게 나와 아뉴라스는 정신없이 키스를 반복하는 것이었다."

