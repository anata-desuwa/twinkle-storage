[[dialogue]]
speaker = "unk"
original = "第４話,個人の境界,P"
translation = "제4화, 개인의 경계, P"

[[dialogue]]
speaker = "マグダレナ"
original = "「あれが噂に聞きし萌え萌えジャンケン……不思議な楽しさがありましたね」"
translation = "「저것이 소문으로 듣던 모에모에 가위바위보…… 신기한 즐거움이 있었네요.」"

[[dialogue]]
speaker = "シャロン"
original = "「私は女神様に仕える身なので、そういったサービスとはいえ、奉仕される側になるのはむずがゆかったですねー」"
translation = "「저는 여신님을 모시는 몸이라, 그런 서비스라고는 해도 봉사받는 입장이 되는 건 간지러웠어용~.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「次のお店に参りましょうか。さすがメイドの総本山。メイド喫茶がたくさんあってどれも興味深いです」"
translation = "「다음 가게로 갈까요. 역시 메이드의 총본산. 메이드 카페가 많아서 어디든 흥미로워요.」"

[[dialogue]]
speaker = "unk"
original = "合ってるような、間違ってるような……"
translation = "맞는 것 같기도 하고, 틀린 것 같기도 하고……"

[[dialogue]]
speaker = "マグダレナ"
original = "「違うのですか？\u3000こちらにメイド喫茶がたくさん所在しているとテレビで見たのですが」"
translation = "「다른가요? 이쪽에 메이드 카페가 많이 소재하고 있다고 TV에서 봤습니다만.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……ふむふむ、本来のメイドは喫茶店ではなく家に仕えるもの。星見家にいらっしゃるキリカさまなどがそうなのですね」"
translation = "「……흠흠, 본래의 메이드는 찻집이 아니라 가문을 모시는 것. 호시미 가문에 계시는 키리카 님 같은 분이 그렇군요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「なるほど、それならすでにお会いしていましたね。勘違いしていたようでした。お恥ずかしい」"
translation = "「과연, 그렇다면 이미 만나 뵈었었네요. 착각하고 있었던 모양입니다. 부끄러워라.」"

[[dialogue]]
speaker = "unk"
original = "なぜこのメンツでメイド喫茶巡り……？"
translation = "왜 이 멤버로 메이드 카페 순회를……?"

[[dialogue]]
speaker = "マグダレナ"
original = "「せっかく肉体を得たのですから、どのようなものでも体験してみたいのです。リクリエに際して不謹慎かもしれませんが……」"
translation = "「모처럼 육체를 얻었으니, 어떤 것이든 체험해 보고 싶은 거예요. 리크리에 상황에서 불경할지도 모르겠지만……」"

[[dialogue]]
speaker = "シャロン"
original = "「いえいえ、素晴らしいことだと思います。守護天使様の目で直に我々の世界を見ていただけるなんて、滅多にありませんからね」"
translation = "「아니요 아니요, 훌륭한 일이라고 생각해요. 수호천사님의 눈으로 직접 저희 세계를 봐주시다니, 좀처럼 없는 일이니까요.」"

[[dialogue]]
speaker = "シャロン"
original = "「そして私はマグダレナさまの介添えです。守護天使様は女神様とともに世界を支える偉大なる存在。教皇庁のシスターたる私がお世話しなくてどうするというものですから！」"
translation = "「그리고 저는 막달레나 님의 수발이에요. 수호천사님은 여신님과 함께 세계를 지탱하는 위대한 존재. 교황청의 시스터인 제가 모시지 않으면 어떡하겠어용!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ありがとうございます、シャロンさま。教皇庁の方々には住まいを提供していただいて本当に感謝しています」"
translation = "「감사합니다, 샤론 님. 교황청 분들께 거처를 제공받아서 정말 감사하고 있어요.」"

[[dialogue]]
speaker = "シャロン"
original = "「いえいえそんな、守護天使様からお言葉を頂くなんて畏れ多い……！\u3000むしろ光栄です！」"
translation = "「아니요 아니요 그런, 수호천사님께 말씀을 듣다니 황송해라……! 오히려 영광이에용!」"

[[dialogue]]
speaker = "シャロン"
original = "「遠慮なさらず何でも申し付けてください。このシャロン、マグダレナさまのためなら火の中水の中、アステラの中まで飛び込みます……！」"
translation = "「부담 갖지 말고 무엇이든 분부해 주세요. 이 샤론, 막달레나 님을 위해서라면 불속 물속, 아스테라 속까지 뛰어들겠어용……!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふふ……頼りにさせていただきます。シャロンさまも悩みなどありましたらお聞かせくださいね」"
translation = "「후후후…… 의지하도록 할게요. 샤론 님도 고민 같은 게 있다면 들려주세요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「それにテレビで紹介されていたメイドの衣装がかわいらしくて……メイド体験ができるお店もあるそうです。ご主人様、とお呼びしてみましょうか？」"
translation = "「게다가 TV에서 소개된 메이드 의상이 귀여워서…… 메이드 체험을 할 수 있는 가게도 있다고 해요. 주인님, 이라고 불러볼까요?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……畏れ多すぎる？\u3000ふふ、よろしいではないですか。滅多にできない経験ですよ」"
translation = "「……너무 황송하다고요? 후후, 괜찮지 않나요. 좀처럼 할 수 없는 경험이에요.」"

[[dialogue]]
speaker = "シャロン"
original = "「──モンスター！」"
translation = "「──몬스터!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「行きましょう。世界を――この街を守るために」"
translation = "「가죠. 세계를―― 이 거리를 지키기 위해.」"

[[dialogue]]
speaker = "シャロン"
original = "「きゅぅ～～……」"
translation = "「큐우우우~~……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「おっと……モンスターの討伐お疲れ様でした。さすがシャロンさま、見事な戦いぶりでありました」"
translation = "「이런…… 몬스터 토벌 수고하셨습니다. 역시 샤론 님, 훌륭한 싸움 솜씨였습니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「会長さまもお疲れ様です。どこかでお休みを……そうだ、この近くにもメイド喫茶がありましたね」"
translation = "「회장님도 수고하셨어요. 어딘가에서 휴식을…… 맞다, 이 근처에도 메이드 카페가 있었죠.」"

[[dialogue]]
speaker = "unk"
original = "メイド喫茶気に入りました？"
translation = "메이드 카페 마음에 드셨나요?"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい、とても新鮮な体験でした。オムライスにハートを描くのもかわいらしいです」"
translation = "「네, 아주 신선한 체험이었어요. 오므라이스에 하트를 그리는 것도 귀여웠고요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「……でももしかすると、行先はどこでも良かったのかもしれません」"
translation = "「……하지만 어쩌면, 목적지는 어디든 좋았을지도 모르겠네요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「以前私は、三界とは異なる領域の話をいたしましたね。個人が持つ複数の領域の話です」"
translation = "「이전에 저는 삼계와는 다른 영역에 대한 이야기를 했었죠. 개인이 가진 복수의 영역 이야기예요.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「フィーニスの塔を除いて、三界という領域は混じり合うことはなく、この世界がある限り不変です」"
translation = "「피니스의 탑을 제외하고, 삼계라는 영역은 뒤섞이는 일 없이 이 세계가 있는 한 불변합니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ですが人の持つ領域は違うと思うのです。人と繋がっていくことで広がり、重なっていくもの」"
translation = "「하지만 인간이 가진 영역은 다르다고 생각해요. 사람과 연결되어 감으로써 넓어지고, 겹쳐지는 것.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「いろんな方の領域にもっと入っていきたい。私の領域に入ってきてほしい。……もちろんあなたもその一人です」"
translation = "「여러분의 영역에 좀 더 들어가고 싶어요. 제 영역에 들어와 주었으면 해요. ……물론 당신도 그중 한 명입니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ですから今日もその一環で……メイド喫茶という経験を通してあなたと領域を重ねたかったのです」"
translation = "「그러니 오늘도 그 일환으로…… 메이드 카페라는 경험을 통해서 당신과 영역을 겹치고 싶었습니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「この身は仮初めのもの。リクリエを阻止できたとて、今の私がいつまで地上にいられるかはわかりません」"
translation = "「이 몸은 일시적인 것. 리크리에를 저지할 수 있다 한들, 지금의 제가 언제까지 지상에 있을 수 있을지는 모릅니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「戦いの中で壊れてしまうかもしれません。間もなく寿命を迎えて朽ちてしまうかもしれません」"
translation = "「싸움 속에서 부서져 버릴지도 모릅니다. 머지않아 수명을 다해 썩어버릴지도 모릅니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「今の私がいなくなった時、その記憶は本体に受け継がれるのか、無となって消えてしまうのかもわかりません」"
translation = "「지금의 제가 사라졌을 때, 그 기억이 본체에 계승될지, 무가 되어 사라져 버릴지도 모릅니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「このマグダレナはそのように不安定な、泡沫のような存在なのです」"
translation = "「이 막달레나는 그토록 불안정한, 물거품 같은 존재인 것입니다.」"

[[dialogue]]
speaker = "マグダレナ"
original = "「短い間になってしまうかもしれませんが……それでも末永長くよろしくお願いしますね」"
translation = "「짧은 기간이 되어버릴지도 모르겠지만…… 그래도 오래오래 잘 부탁드려요.」"

[[dialogue]]
speaker = "unk"
original = "よろしくお願いします"
translation = "잘 부탁드립니다."

[[dialogue]]
speaker = "マグダレナ"
original = "「ちなみに先ほど言ったメイド体験できるお店、メイド服がなかなか大胆なデザインらしいですよ？」"
translation = "「참고로 아까 말한 메이드 체험 가게, 메이드복이 꽤 대담한 디자인이라고 하더라고요?」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "シャロン"
original = "「むっ！\u3000何か不埒な気配がしたような！」"
translation = "「무옷! 뭔가 불손한 기운이 느껴진 것 같아용!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「おや、元気になられたのですね、シャロンさま。安心いたしました」"
translation = "「어라, 기운을 차리셨군요, 샤론 님. 안심했습니다.」"

[[dialogue]]
speaker = "シャロン"
original = "「いえいえ、お気遣いありがとうございますっ。しかし会長さま、守護天使さまに邪な気持ちを抱いてはなりませんよっ」"
translation = "「아니요 아니요, 신경 써주셔서 감사해용. 하지만 회장님, 수호천사님께 사악한 마음을 품어서는 안 돼용!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あらあら、シャロンさまはお厳しい。うふふふふっ」"
translation = "「어머나 어머나, 샤론 님은 엄격하시기도 해라. 우후후후훗.」"

