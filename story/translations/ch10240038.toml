[[dialogue]]
speaker = "unk"
original = "――九浄家の夜は、絢爛豪華だった。"
translation = "――쿠죠 가문의 밤은 현란하고 호화로웠다."

[[dialogue]]
speaker = "unk"
original = "ヘレナさんから特別に招待を受けた俺は、本日お屋敷に泊めてもらうことになっている。"
translation = "헬레나 씨에게 특별히 초대를 받은 나는 오늘 저택에서 묵기로 되어 있다."

[[dialogue]]
speaker = "unk"
original = "ただし泊まるのは来客用の部屋じゃない。九浄家に住み込みで働いている、ヨミの部屋だった。"
translation = "다만 묵는 곳은 내객용 방이 아니다. 쿠죠 가문에 입주해서 일하고 있는 요미의 방이었다."

[[dialogue]]
speaker = "ヨミ"
original = "「私はあくまで九浄家のメイド隊という立場なのに、こんなおもてなしされちゃっていいんでしょうか……」"
translation = "「저는 어디까지나 쿠죠 가문의 메이드대라는 입장인데, 이런 대접을 받아도 괜찮은 걸까요……」"

[[dialogue]]
speaker = "クロト"
original = "「いいと思うよ。ヘレナさんも今日は特別って言ってたしね」"
translation = "「괜찮다고 생각해. 헬레나 씨도 오늘은 특별하다고 말했으니까」"

[[dialogue]]
speaker = "ヨミ"
original = "「特別……そうですよね、わざわざウェディングフォームになってるんですから」"
translation = "「특별…… 그렇겠네요, 일부러 웨딩 폼이 되었으니까요」"

[[dialogue]]
speaker = "ヨミ"
original = "「この広間で白無垢を身に纏っていると、本当に結婚式の当日かなって錯覚しちゃいそうですよ」"
translation = "「이 대강당에서 시로무쿠를 몸에 걸치고 있으니, 정말로 결혼식 당일인가 하고 착각해 버릴 것 같아요」"

[[dialogue]]
speaker = "クロト"
original = "「みんながそういうイメージなのは、俺もなんとなく感じてる」"
translation = "「모두가 그런 이미지라는 건, 나도 왠지 모르게 느끼고 있어」"

[[dialogue]]
speaker = "ヨミ"
original = "「ですよね～。もう、参っちゃうなぁ。こんな予行演習してもらったら私……おかしな気分になっちゃう……」"
translation = "「그쵸~. 정말, 못 살겠다니까. 이런 예행연습을 해버리면 저…… 이상한 기분이 들어버려요……」"

[[dialogue]]
speaker = "クロト"
original = "「晩御飯も、精のつく料理ばっかりだったしね」"
translation = "「저녁밥도 정력에 좋은 요리들뿐이었고 말이야」"

[[dialogue]]
speaker = "ヨミ"
original = "「お屋敷のみんなも……やっぱりそういうこと、期待してるんでしょうか？」"
translation = "「저택의 모두도…… 역시 그런 걸 기대하고 있는 걸까요?」"

[[dialogue]]
speaker = "クロト"
original = "「……ヨミは嫌？」"
translation = "「……요미는 싫어?」"

[[dialogue]]
speaker = "ヨミ"
original = "「嫌じゃないですよ。でも過剰に意識させられたせいで、なんだかむらむらしちゃってて……ううっ、私我慢できないかもしれません」"
translation = "「싫지 않아요. 하지만 과하게 의식하게 된 탓에, 왠지 무라무라해서…… 우으, 저 참지 못할지도 몰라요」"

[[dialogue]]
speaker = "クロト"
original = "「なら、今夜は開き直っていっぱい楽しもう」"
translation = "「그럼, 오늘 밤은 아예 마음먹고 잔뜩 즐기자」"

[[dialogue]]
speaker = "ヨミ"
original = "「いいんですか？\u3000私、本気にしちゃいますよ<emoji=heart04>」"
translation = "「괜찮나요? 저, 진심으로 받아들일 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁ……はぁ……はぁ……ごめんなさい、せっかく私の部屋に招待したのに、我慢できなくなっちゃって……」"
translation = "「하아…… 하아…… 하아…… 죄송해요, 어렵게 제 방에 초대했는데, 참을 수 없게 되어버려서……」"

[[dialogue]]
speaker = "ヨミ"
original = "「私は悪くないです……みんながえっちな想像ばっかりさせるから……あんな風にたくさん煽られたら、いくら私だって……」"
translation = "「전 잘못 없어요…… 모두가 야한 상상만 하게 만드니까…… 저런 식으로 잔뜩 부추겨지면, 아무리 저라도……」"

[[dialogue]]
speaker = "ヨミ"
original = "「きょ、強制発情……しちゃうじゃないですかぁ<emoji=heart04>」"
translation = "「강, 강제 발정…… 해버리잖아요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もしかしてヨミ、発情しちゃってるの？」"
translation = "「혹시 요미, 발정해버린 거야?」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやんっ、さっきからそう言ってます……。普段はそこまで本能が出ないのに……どうして今日に限ってこんなに……」"
translation = "「코양, 아까부터 그렇게 말하고 있어요……. 평소에는 그 정도로 본능이 나오지 않는데…… 어째서 오늘따라 이렇게……」"

[[dialogue]]
speaker = "ヨミ"
original = "「ううっ、おま○こうずうずしてます～……あなたのおち○ぽ様が欲しくて欲しくてたまりませんっ<emoji=heart04>」"
translation = "「우으, 보지 근질근질해요~…… 당신의 자지님이 갖고 싶어서 갖고 싶어서 견딜 수 없어요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ごめんなさいごめんなさいっ、いつもみたいに普通に愛し合いたいのにっ、こんな風に無理矢理襲っちゃうみたいにしてっっ……はしたなくて両親に顔向けできませんっ」"
translation = "「죄송해요 죄송해요, 평소처럼 평범하게 사랑을 나누고 싶은데, 이런 식으로 억지로 덮치는 것처럼 해버려서…… 천박해서 부모님을 뵐 면목이 없어요」"

[[dialogue]]
speaker = "クロト"
original = "「両親も狐魔族なら、今のヨミのこと理解してくれるんじゃないかな？」"
translation = "「부모님도 여우 마족이라면, 지금의 요미를 이해해 주지 않을까?」"

[[dialogue]]
speaker = "ヨミ"
original = "「それは……そうかもしれませんけど……でもでもっ、やっぱりこういうのはよくないですっ」"
translation = "「그건…… 그럴지도 모르지만…… 하지만 하지만, 역시 이런 건 좋지 않아요」"

[[dialogue]]
speaker = "ヨミ"
original = "「私、興奮したあなたに押し倒される方が好みなのに……そういうセックスの方が好きなのに……なんで……」"
translation = "「저, 흥분한 당신에게 눌려 쓰러지는 쪽이 취향인데…… 그런 섹스가 더 좋은데…… 어째서……」"

[[dialogue]]
speaker = "クロト"
original = "「やっぱり、この前のあれが響いてるんじゃない？」"
translation = "「역시, 요전번의 그게 영향을 주고 있는 거 아냐?」"

[[dialogue]]
speaker = "ヨミ"
original = "「もしかして……当主様が仰った、子作りを許可する、ってやつですか？」"
translation = "「설마…… 당주님께서 말씀하신, 아이 만들기를 허가한다, 라는 그거 말인가요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ううっ、思い出したら意識して、おま○こうずうずしちゃいました」"
translation = "「으으, 떠올렸더니 의식돼서, 보지가 근질근질해져 버렸어요」"

[[dialogue]]
speaker = "ヨミ"
original = "「あなたと子作り……したいな<emoji=heart04>\u3000まだ正式にお嫁さんになってないけど……夫婦がするセックスは、もう何度もしてますし……」"
translation = "「당신과 아이 만들기…… 하고 싶어<emoji=heart04> 아직 정식으로 신부가 된 건 아니지만…… 부부가 하는 섹스는, 벌써 몇 번이나 했고……」"

[[dialogue]]
speaker = "ヨミ"
original = "「避妊具、いっぱいもらっちゃったけど……避妊したら、子作りにならないもん<emoji=heart04>」"
translation = "「피임 도구, 잔뜩 받아 버렸지만…… 피임하면, 아이 만들기가 안 되는걸<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「だからね……えっと……当主様の許可もあるし……ちゃんとした子作りの練習、したいなぁ<emoji=heart04>」"
translation = "「그러니까…… 에토…… 당주님의 허가도 있고…… 제대로 된 아이 만들기 연습, 하고 싶어라<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「練習なの？\u3000それとも本番？」"
translation = "「연습이야? 아니면 실전?」"

[[dialogue]]
speaker = "ヨミ"
original = "「うっ……発情してる今その質問はずるいですよぉ。ええと……ごむつけないで、出来る限り本番に近い……練習、でどうですか？」"
translation = "「윽…… 발정해 있는 지금 그 질문은 치사해요오. 에헤헤…… 고무 끼지 말고, 가능한 한 실전에 가까운…… 연습, 으로 어때요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「えへへへぇ～、おち○ぽ様がビクンって反応しちゃいましたね<emoji=heart04>\u3000やっぱり、私と子作りしたいって思ってくれたのかなぁ<emoji=heart04>」"
translation = "「에헤헤헤~, 자지 님이 비쿤 하고 반응해 버렸네요<emoji=heart04> 역시, 저랑 아기 만들기 하고 싶다고 생각해주신 걸까나<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こうして上に乗っかってすりすりしてるだけなのに、すっかり勃起してます……おち○ぽ様も完全に本気ですね<emoji=heart04>」"
translation = "「이렇게 위에 올라타서 비비고 있을 뿐인데, 완전히 발기해 있어요…… 자지 님도 완전히 진심이네요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「じゃあ……尚更このままにはしておけません。あなたのお嫁さんとして……しっかりおま○こで包み込んで、たっぷり射精させてあげますね<emoji=heart04>」"
translation = "「그럼…… 더더욱 이대로 둘 수는 없겠네요. 당신의 신부로서…… 제대로 보지로 감싸서, 듬뿍 사정하게 해드릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁんっ<emoji=heart04>\u3000んふぅ～～～～っ、ふぅっ<emoji=heart04>\u3000入り、ましたぁっっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 응후우~~~~, 후우<emoji=heart04> 들어, 갔어요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁっ、はぁっ……あなたの生おち○ぽ様……私のおま○こに入れちゃいましたぁ<emoji=heart04>\u3000あふっ、んうっ、ば、爆裂凄いですっ<emoji=heart04>\u3000一気にスイッチ入っちゃいます<emoji=heart04>」"
translation = "「하아, 하아…… 당신의 생자지님…… 제 보지에 넣어버렸어요오<emoji=heart04> 아후, 응우, 바, 폭렬 굉장해요<emoji=heart04> 단숨에 스위치 들어가 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁぁーーっ……はぁぁーーっ……お互いの粘膜がこすれ合って……えっちな匂い、むわぁって広がってます……やらしい匂い……オスとメスの交尾の匂いです……<emoji=heart04>」"
translation = "「하아아――…… 하아아――…… 서로의 점막이 비벼지면서…… 야한 냄새, 확 하고 퍼지고 있어요…… 야릇한 냄새…… 수컷과 암컷의 교미 냄새예요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こんなのだめぇっ、本気の種付けして欲しくなっちゃいますっ<emoji=heart04>\u3000はぁ……はぁ……淫らな体液の匂いが私をもっと狂わせます……こんなのもう我慢できないっ<emoji=heart04>」"
translation = "「이런 거 안 돼애, 진심으로 씨내리 받고 싶어지잖아요<emoji=heart04> 하아…… 하아…… 음란한 체액 냄새가 나를 더 미치게 해요…… 이런 거 이제 못 참겠어<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ごめんなさい、セックスは夫婦が愛を確かめ合う神聖な営みなのにっ……交尾っ<emoji=heart04>\u3000交尾のことで頭がいっぱいなのっ<emoji=heart04>\u3000子種欲しいっ、おなかの奥でごくごく飲みたいっ<emoji=heart04>」"
translation = "「죄송해요, 섹스는 부부가 사랑을 확인하는 신성한 행위인데…… 교미<emoji=heart04> 교미 생각으로 머릿속이 가득해요<emoji=heart04> 씨앗 갖고 싶어, 배 속 깊은 곳에서 꿀꺽꿀꺽 마시고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あの青臭い独特なザーメンの匂い……くさいのに、くんくんしたら爆裂興奮しちゃう、つがいのメスを夢中にさせる、あなたの子種が……欲しいですっ……<emoji=heart04>」"
translation = "「그 비릿하고 독특한 정액 냄새…… 구린데도, 킁킁거리면 폭렬 흥분해 버리는, 짝이 된 암컷을 몽롱하게 만드는, 당신의 씨앗이…… 갖고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「も、もしかするとメイド隊の子が外で聞き耳立ててるかもしれないのにっ……私っ……私ぃっ<emoji=heart04>」"
translation = "「호, 혹시 메이드대 아이가 밖에서 엿듣고 있을지도 모르는데…… 나…… 나아아<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ごめんなさい……もうどうでもいいからっ、本気の子作り交尾、しちゃいますね<emoji=heart04>\u3000あなたがだめって言ってもするから<emoji=heart04>\u3000一番奥にびゅ～って出してもらうから<emoji=heart04>」"
translation = "「죄송해요…… 이제 아무래도 좋으니까, 진심 어린 아이 만들기 교미, 해버릴게요<emoji=heart04> 당신이 안 된다고 해도 할 거니까<emoji=heart04> 가장 깊은 곳에 뷰~ 하고 내보내 줄 거니까<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「じゃあ、ズンズンパンパンしますね<emoji=heart04>\u3000腰同士をぶつけっこして、おち○ぽ様とおま○こをぐちゅぐちゅこねくり回しちゃいましょう<emoji=heart04>」"
translation = "「자, 그럼 즈큥즈큥 팡팡 할게요<emoji=heart04> 허리끼리 부딪히면서, 자지님과 보지를 구츄구츄 주물러 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふぁっ<emoji=heart04>\u3000はぁん<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁっ……<emoji=heart04>\u3000いつもより爆裂気持ちいい、ですっっ<emoji=heart04>\u3000やっぱり発情してるからこんなに気持ちいいのぉ？」"
translation = "「후아<emoji=heart04> 하앙<emoji=heart04> 앙<emoji=heart04> 아아아……<emoji=heart04> 평소보다 폭렬 기분 좋아, 요오오<emoji=heart04> 역시 발정하고 있어서 이렇게 기분 좋은 거야?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ぬちっ、ぬちちぃって……入ってるとこから、やらしー音が聞こえて……はぁぁ～っ、興奮しちゃいますぅ<emoji=heart04>」"
translation = "「누칫, 누치치이 하고…… 들어가 있는 곳에서, 야한 소리가 들려서…… 하아아~, 흥분돼 버려요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「おま○この奥の方まで……ねとねとの本気汁でいっぱいなの……感じてますかぁ？\u3000んふっ<emoji=heart04>\u3000ふぅぅっ、くっ<emoji=heart04>」"
translation = "「보지 안쪽 깊은 곳까지…… 끈적끈적한 애액으로 가득한 거…… 느끼고 있나요? 응후<emoji=heart04> 후우우, 큭<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こうして奥までぐう～～ってねじこむと……はぁん<emoji=heart04>\u3000おち○ぽ様が深く刺さって……気持ちよすぎておかしくなっちゃいます<emoji=heart04>」"
translation = "「이렇게 안쪽까지 구우~~ 하고 비틀어 넣으면…… 하앙<emoji=heart04> 자지님이 깊게 박혀서…… 너무 기분 좋아서 이상해져 버려요」"

[[dialogue]]
speaker = "ヨミ"
original = "「腰を上げて……下ろすっ……腰を上げて……下ろすっ……はぁぁっ、敏感なところがこすれて気持ちいいです～<emoji=heart04>」"
translation = "「허리를 올리고…… 내리고…… 허리를 올리고…… 내리고…… 하아아, 민감한 곳이 쓸려서 기분 좋아요~<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あなたも……気持ちいいですか？\u3000おま○この中のおち○ぽ様は、かっこよくそりかえってますけど……あなたの感想が聞きたいです<emoji=heart04>」"
translation = "「당신도…… 기분 좋나요? 보지 속의 자지님은, 멋지게 휘어있지만…… 당신의 감상을 듣고 싶어요」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁっ……はぁっ……<emoji=heart04>\u3000私はお嫁さんとして、上手に交尾できていますか？\u3000種付けしたくなるような……スケベなメス穴に仕上がっていますか？」"
translation = "「하아…… 하아……<emoji=heart04> 저는 아내로서, 능숙하게 교미하고 있나요? 씨내리 하고 싶어지는…… 야한 암컷 구멍으로 완성되어 있나요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「あなたのおち○ぽ様を……こうしてぬぷぬぷしごいたら……私の子宮に、こってり濃厚ザーメン……吐き出してもらえますか……？」"
translation = "「당신의 자지님을…… 이렇게 누푸누푸 훑어주면…… 제 자궁에, 진하고 농후한 정액…… 뱉어내 주실 건가요……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ねえ、教えてください……お嫁さんセックスで満足させられてるかどうか……知りたいんですっ<emoji=heart04>」"
translation = "「저기, 알려주세요…… 아내 섹스로 만족시키고 있는지 어떤지…… 알고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そんなのもちろんっ、最高にスケベなメス穴だよっ！\u3000こんなのいくらでも射精できそうだ」"
translation = "「그건 당연하지, 최고로 야한 암컷 구멍이야! 이런 거라면 얼마든지 사정할 수 있을 것 같아」"

[[dialogue]]
speaker = "ヨミ"
original = "「嬉しいっ<emoji=heart04>\u3000じゃあ、いっぱい頑張りますね<emoji=heart04>\u3000こうやって……んんっ<emoji=heart04>\u3000おま○この入口から……一番奥まで全部使って……あなたのおち○ぽ様にご奉仕させて頂きます<emoji=heart04>」"
translation = "「기뻐요<emoji=heart04> 그럼, 잔뜩 힘낼게요<emoji=heart04> 이렇게…… 응응<emoji=heart04> 보지 입구부터…… 가장 안쪽까지 전부 사용해서…… 당신의 자지님께 봉사하겠습니다<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000えっちな声出ちゃいますっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000やぁん<emoji=heart04>\u3000おち○ぽ様気持ちいい<emoji=heart04>\u3000子作り好き<emoji=heart04>\u3000交尾好きぃっっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 야한 목소리 나와버려요<emoji=heart04> 하아<emoji=heart04> 야앙<emoji=heart04> 자지님 기분 좋아<emoji=heart04> 아이 만들기 좋아<emoji=heart04> 교미 좋아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふあぁぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000ぱんぱんに膨らんだ竿が……ゆっくりおま○こに出たり入ったりしてますっっ<emoji=heart04>\u3000ぶちゅぶちゅ音してて……やらしー匂いもすごい……むわぁって<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 하앙<emoji=heart04> 팽팽하게 부풀어 오른 자지가…… 천천히 보지에 들락날락거리고 있어요오<emoji=heart04> 찌득찌득 소리가 나서…… 야한 냄새도 엄청나…… 확 끼쳐와서<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ただでさえセックスしてる時の匂い、興奮するのに……今日は特別、はぁはぁしちゃいます<emoji=heart04>」"
translation = "「안 그래도 섹스할 때의 냄새, 흥분되는데…… 오늘은 특별히, 하아하아 하게 돼요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「やっぱり発情してるから……？\u3000遊びじゃなくて、本気の子作り交尾してるからなの……？\u3000はぁっ、はぁっ、おま○こじんじんしてて……もうわけわかんないですっっ……」"
translation = "「역시 발정하고 있어서……? 놀이가 아니라, 진심으로 아기 만들기 교미를 하고 있어서 그런 거야……? 하아, 하아, 보지가 징징거려서…… 이제 앞뒤 분간이 안 가요오……」"

[[dialogue]]
speaker = "ヨミ"
original = "「おかしくなってるのに、腰の動きだけは止めらんなくて……んんんっ<emoji=heart04>\u3000声出ちゃうっっ、ダメぇっっ<emoji=heart04>」"
translation = "「이상해졌는데도, 허리 움직임만은 멈출 수가 없어서…… 응으으윽<emoji=heart04> 목소리 나와버려어, 안 돼애<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こんなねちっこくおち○ぽ様をしゃぶり尽くすような……ドスケベな腰使い、して……こんなはしたない交尾、絶対恥ずかしいのにっっ<emoji=heart04>」"
translation = "「이렇게 끈적하게 자지님을 빨아 대는 듯한…… 상스러운 허리 놀림을 하고…… 이런 천박한 교미, 분명 부끄러울 텐데도<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「だめ……発情してすっかり淫乱になっちゃってますっ<emoji=heart04>\u3000ごめん……ごめんなさい、こんなつもりじゃなかったのに、私っっ……」"
translation = "「안 돼…… 발정해서 완전히 음란해져 버렸어요<emoji=heart04> 미안해…… 미안해요, 이럴 생각은 아니었는데, 나아……」"

[[dialogue]]
speaker = "ヨミ"
original = "「貞淑でかわいいお嫁さんがよかったのに……これじゃ、夜は娼婦だねって言われちゃうよぉぉ<emoji=heart04>」"
translation = "「정숙하고 귀여운 신부가 좋았을 텐데…… 이래선, 밤에는 창녀네 라는 소리를 들어버리겠어어어<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「でも好きっ<emoji=heart04>\u3000大好き<emoji=heart04>\u3000もっとたくさんセックスして一緒に気持ちよくなりたいのっ<emoji=heart04>\u3000お願いっ、もっと……もっと私に種付け交尾してぇぇっ<emoji=heart04>」"
translation = "「그래도 좋아<emoji=heart04> 너무 좋아<emoji=heart04> 더 많이 섹스해서 같이 기분 좋아지고 싶어어<emoji=heart04> 부탁이야, 좀 더…… 좀 더 나한테 씨내리 교미 해줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……俺のお嫁さんがドスケベすぎるっ……こんなの種付けするしかないじゃないか！」"
translation = "「큭…… 내 신부가 너무 암캐잖아…… 이건 씨내리 할 수밖에 없잖아!」"

[[dialogue]]
speaker = "ヨミ"
original = "「はいっ、どうぞ<emoji=heart04>\u3000おたまじゃくしうじゃうじゃの精子……私の子宮に放流してくださいっ<emoji=heart04>\u3000ちゃんと受精しますからぁっ<emoji=heart04>\u3000あなたの赤ちゃん、孕ませて欲しいですっ<emoji=heart04>」"
translation = "「네에, 여기요<emoji=heart04> 올챙이 우글우글한 정자…… 제 자궁에 방류해 주세요<emoji=heart04> 제대로 수정할 테니까요오<emoji=heart04> 당신의 아기, 임신하고 싶어요오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なら、もっと本気の腰振りしてよ。ヨミのデカい尻肉パンパン叩きつけて、俺からザーメン搾り取ってっっ」"
translation = "「그럼, 좀 더 진심으로 허리 흔들어봐. 요미의 커다란 엉덩잇살을 팡팡 때려 박으면서, 나한테서 정액을 짜내라고!」"

[[dialogue]]
speaker = "ヨミ"
original = "「わ、わかりましたぁ<emoji=heart04>\u3000旦那さまがお望みなら……私も本気出しちゃいますね<emoji=heart04>」"
translation = "「아, 알겠습니다아<emoji=heart04> 서방님이 원하신다면…… 저도 진심을 내버릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「全力でズンズンパンパンして……何回びゅる～って白いの出しても、おなかたぷたぷになるまで搾り取ってあげるんですから、覚悟して下さいねっ<emoji=heart04>」"
translation = "「전력으로 퍽퍽 팡팡 해서…… 몇 번을 뷰룻~ 하고 하얀 걸 내보내도, 배가 타푸타푸해질 때까지 짜내 줄 테니까, 각오하세요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「それじゃ、行きますよ～」"
translation = "「그럼, 갑니다아~」"

[[dialogue]]
speaker = "ヨミ"
original = "「んおっ<emoji=heart04>\u3000はぁうっ<emoji=heart04>\u3000はぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000ど、どうですか？\u3000これが私の……本気交尾ですっっ<emoji=heart04>」"
translation = "「응오<emoji=heart04> 하아으<emoji=heart04> 하앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 어, 어떤가요? 이게 저의…… 진심 교미예요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「高速で……おち○ぽ様をしごいて……淫乱膣肉でめいっぱいぬぽぬぽしちゃいますからねっっ<emoji=heart04>」"
translation = "「고속으로…… 자지님을 훑으면서…… 음란한 질 내부로 잔뜩 누포누포 해버릴 테니까요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あうっ<emoji=heart04>\u3000んんっ、ふっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000やぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000本気の種付け交尾っ、気持ちよすぎますっっ<emoji=heart04>」"
translation = "「아우<emoji=heart04> 응응, 훗<emoji=heart04> 하앗<emoji=heart04> 하앙<emoji=heart04> 야앗<emoji=heart04> 기분 좋아<emoji=heart04> 진심 씨내리 교미, 너무 기분 좋아요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「こんな快楽覚えたらっ、私何度も妊娠しちゃいますっっ<emoji=heart04>\u3000いっぱい孕んで、いっぱい産んで……もぉぉ～、幸せな大家族を築いちゃうじゃないですかぁぁっ<emoji=heart04>」"
translation = "「이런 쾌락을 알아버리면, 저 몇 번이고 임신해버려요오<emoji=heart04> 잔뜩 배고, 잔뜩 낳아서…… 모오~, 행복한 대가족을 꾸려버리게 되잖아요오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ヨミとの子どもなら、いくらでも大歓迎だからっ」"
translation = "「요미와의 아이라면 얼마든지 환영이니까」"

[[dialogue]]
speaker = "ヨミ"
original = "「うれしいっ<emoji=heart04>\u3000じゃあじゃあっ、私いっぱい孕みますね<emoji=heart04>\u3000あなたの子種で受精してっ、たくさん産みますからっっ<emoji=heart04>\u3000だからもっと気持ちよくして下さいっっ<emoji=heart04>」"
translation = "「기뻐요<emoji=heart04> 그럼그럼, 저 잔뜩 밸게요<emoji=heart04> 당신의 씨앗으로 수정해서, 많이 낳을 테니까요오<emoji=heart04> 그러니까 좀 더 기분 좋게 해주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁっ、はぁっ、一番奥がうずうずしちゃってますっ<emoji=heart04>\u3000ここが子種を注ぐ穴だよって、丁寧に教えてもらってるみたいっっ<emoji=heart04>」"
translation = "「하앗, 하앗, 가장 깊은 곳이 근질근질해요오<emoji=heart04> 여기가 씨앗을 쏟는 구멍이라고, 정성스럽게 가르침 받는 것 같아아<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「だ、大丈夫ですっ<emoji=heart04>\u3000上手に子宮でごっくんしますから<emoji=heart04>\u3000旦那さまの子種は無駄にしませんっ<emoji=heart04>\u3000だから好きなだけ出してっっ<emoji=heart04>\u3000私に種付けしてぇっっ<emoji=heart04>」"
translation = "「괘, 괜찮아요<emoji=heart04> 능숙하게 자궁으로 꿀꺽할 테니까<emoji=heart04> 서방님의 씨앗은 헛되이 하지 않아요<emoji=heart04> 그러니까 원하는 만큼 내보내 줘어<emoji=heart04> 나한테 씨내리 해줘어어<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んあぁぁっ<emoji=heart04>\u3000ご、ごめんなさいっ、私もう限界みたいでっ<emoji=heart04>\u3000イっちゃいそうです<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하앗<emoji=heart04> 응아아<emoji=heart04> 죄, 죄송해요, 저 이제 한계인 것 같아서어<emoji=heart04> 가버릴 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「もう無理ぃぃ<emoji=heart04>\u3000イくっ<emoji=heart04>\u3000イっちゃいます<emoji=heart04>\u3000イく<emoji=heart04>\u3000爆裂おっきいの来たら、お嫁さんの仕事……ドスケベ搾精できなくなっちゃいますっ<emoji=heart04>」"
translation = "「이제 무리이이<emoji=heart04> 가아<emoji=heart04> 가버려요<emoji=heart04> 가아<emoji=heart04> 폭렬하게 큰 게 오면, 신부의 일…… 음란 사정 갈취를 못 하게 되어버려요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「だからお願いっ<emoji=heart04>\u3000早くっ……出してぇっ<emoji=heart04>\u3000あなたの遺伝子がたっぷり詰まったザーメン……私に種付けしてくださいっっ<emoji=heart04>」"
translation = "「그러니까 부탁이야<emoji=heart04> 빨리…… 내보내 줘어<emoji=heart04> 당신의 유전자가 듬뿍 담긴 정액…… 나한테 씨내리 해주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「お、俺もっ、もうイきそうだ！」"
translation = "「나, 나도, 이제 가버릴 것 같아!」"

[[dialogue]]
speaker = "ヨミ"
original = "「はいっっ……じゃあ一緒に……一緒にイきたいですっっ<emoji=heart04>」"
translation = "「네에에…… 그럼 같이…… 같이 가고 싶어요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「同時に頭真っ白になるような絶頂を迎えましょう<emoji=heart04>\u3000私も最後に全力でおま○こパンパンしますからぁっ<emoji=heart04>」"
translation = "「동시에 머릿속이 하얘질 정도의 절정을 맞이해요<emoji=heart04> 저도 마지막에 전력으로 보지 팡팡 할 테니까요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んあぁっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はあっ<emoji=heart04>\u3000ふぅぅ～～～っ<emoji=heart04>\u3000気持ちよすぎるよぉ<emoji=heart04>\u3000もう何度もセックスしてるのにっ、こんな気持ちいいのはじめてですぅっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 응앗<emoji=heart04> 하앗<emoji=heart04> 하앗<emoji=heart04> 후우우~~~<emoji=heart04> 너무 기분 좋아아<emoji=heart04> 벌써 몇 번이나 섹스했는데도, 이렇게 기분 좋은 건 처음이에요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「やっぱり遊びのセックスじゃなく、ほんとの子作り交尾だからっ……体がわかっちゃうんですねっっ<emoji=heart04>」"
translation = "「역시 놀이 섹스가 아니라, 진짜 아기 만들기 교미니까…… 몸이 알아버리는 거네요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000子種欲しいっ<emoji=heart04>\u3000ザーメン<emoji=heart04>\u3000孕ませてっ<emoji=heart04>\u3000あなたの赤ちゃん欲しいっ<emoji=heart04>\u3000妊娠させて下さいぃっっ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 씨앗 갖고 싶어<emoji=heart04> 정액<emoji=heart04> 임신시켜 줘어<emoji=heart04> 당신의 아기 갖고 싶어<emoji=heart04> 임신시켜 주세요오오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「もう無理ですっっ<emoji=heart04>\u3000腰振りできませんっ<emoji=heart04>\u3000イくから突いてっ<emoji=heart04>\u3000激しく突いてぇっ<emoji=heart04>\u3000おま○この一番奥っ、ずんずんしていっぱいいじめて下さいっっ<emoji=heart04>」"
translation = "「이제 무리예요오<emoji=heart04> 허리 못 흔들겠어요<emoji=heart04> 가니까 찔러줘어<emoji=heart04> 격렬하게 찔러줘어어<emoji=heart04> 보지의 가장 깊은 곳, 퍽퍽 잔뜩 괴롭혀 주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んうううぅ～～～～～っ<emoji=heart04>\u3000それダメぇっ<emoji=heart04>\u3000イグっ<emoji=heart04>\u3000イグイグイグぅぅっ<emoji=heart04>\u3000ご、ごめんなさい私イきますっっ<emoji=heart04>」"
translation = "「응으으으으~~~~~<emoji=heart04> 그거 안 돼애<emoji=heart04> 가앗<emoji=heart04> 가가각가버려어어<emoji=heart04> 죄, 죄송해요 저 가요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「イっグぅぅぅ～～～～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁぁぁ～～っ<emoji=heart04>\u3000すっごい……爆裂気持ちよかったぁぁっ<emoji=heart04>」"
translation = "「하아아아아~~<emoji=heart04> 굉장해…… 폭렬하게 기분 좋았어어어<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んふぅ……ちょうど射精のタイミングもぴったり……旦那さまの子種……びゅーっ、びゅーっ、て……注ぎ込まれてますぅ……<emoji=heart04>」"
translation = "「응후…… 마침 사정 타이밍도 딱 맞아…… 서방님의 씨앗…… 뷰웃, 뷰웃, 하고…… 쏟아지고 있어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「最高の……子作り体験でしたぁ……ありがとうございます……<emoji=heart04>」"
translation = "「최고의…… 아기 만들기 체험이었어요…… 감사합니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んぅっ……まだおち○ぽ様が頑張ってます……何度も……私に出してくれて……嬉しい<emoji=heart04>」"
translation = "「응으…… 아직 자지님이 힘내고 있어요…… 몇 번이고…… 저한테 내보내 줘서…… 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「これだけたっぷりザーメン頂いたら……ちゃんと受精するかなぁ？\u3000してくれるといいな……お嫁さんとして、ちゃんと孕んであげたい……<emoji=heart04>」"
translation = "「이만큼 듬뿍 정액을 받았으면…… 제대로 수정할까나아? 해줬으면 좋겠다…… 신부로서, 제대로 배어주고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁ……はぁ……特濃こってりザーメン……ごちそうさまでした……いつもより量も多いみたいで……嬉しいです、感謝します<emoji=heart04>」"
translation = "「하아…… 하아…… 특농 걸쭉한 정액…… 잘 먹었습니다…… 평소보다 양도 많은 것 같아서…… 기뻐요, 감사해요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふぅぅ……ずっと射精してくれたらいいのにって思いますけど……さすがに終わりみたいですね……んんっ、お疲れさまでした<emoji=heart04>」"
translation = "「후우우…… 계속 사정해주면 좋을 텐데 라고 생각하지만…… 역시 끝인 것 같네요…… 응응, 수고하셨어요」"

[[dialogue]]
speaker = "ヨミ"
original = "「じゃあ、名残惜しいですけど、いったん抜きますね……」"
translation = "「그럼, 아쉽지만, 일단 뺄게요……」"

[[dialogue]]
speaker = "ヨミ"
original = "「はぁんっ<emoji=heart04>\u3000ああっ……ずるんって……抜けちゃった……はぁ、はぁ……少し寂しいかも……」"
translation = "「하앙<emoji=heart04> 아앗…… 주르륵 하고…… 빠져버렸다…… 하아, 하아…… 조금 쓸쓸할지도……」"

[[dialogue]]
speaker = "ヨミ"
original = "「んうぅっ、ごめんなさい、結構溢れちゃいました……全部おなかに入れてあげたかったのに……上手にできなくてすみません……」"
translation = "「응으, 죄송해요, 꽤 흘러넘쳐 버렸어요…… 전부 배 안에 넣어주고 싶었는데…… 능숙하게 못 해서 죄송해요……」"

[[dialogue]]
speaker = "クロト"
original = "「謝ることないよ。何度でもヨミに出してあげるから」"
translation = "「사과할 거 없어. 몇 번이고 요미한테 내보내 줄 테니까」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふふっ、嬉しいです。ありがとうございます<emoji=heart04>」"
translation = "「후훗, 기뻐요. 감사합니다<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「なら……もっともっと、お嫁さんとしてドスケベ搾精を頑張らないとですねっ<emoji=heart04>」"
translation = "「그럼…… 좀 더 좀 더, 신부로서 음란 사정 갈취를 힘내야겠네요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「発情してるから、ちゃんと排卵してれば、高確率で受精すると思うんですけど……そこはちょっとわかりませんし」"
translation = "「발정하고 있으니까, 제대로 배란하고 있다면 높은 확률로 수정할 거라고 생각하지만…… 그건 조금 알 수 없고요」"

[[dialogue]]
speaker = "ヨミ"
original = "「なので、セックスの刺激で排卵を促すよう……もっと子作りしましょうね、旦那さま<emoji=heart04>」"
translation = "「그러니까, 섹스의 자극으로 배란을 촉구하도록…… 좀 더 아기 만들기 해요, 서방님<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「お嫁さんとしてしっかり孕みますから<emoji=heart04>\u3000頑張って赤ちゃんできるように、お互い頑張りましょう<emoji=heart04>」"
translation = "「신부로서 확실히 밸 테니까요<emoji=heart04> 힘내서 아기 생기도록, 서로 힘내요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ということで……おち○ぽ様、そろそろいいですか？\u3000あれだけずっと入ってたから、抜けちゃうと寂しくて……<emoji=heart04>」"
translation = "「그런 의미에서…… 자지님, 슬슬 괜찮나요? 그렇게 계속 들어있었으니까, 빠져버리면 쓸쓸해서……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「また、私のおま○こで……ぬぷ～～ってしますね。たぶん、さっきより具合がよくなってるはずですよ<emoji=heart04>」"
translation = "「다시, 제 보지로…… 누푸~~ 할게요. 아마, 아까보다 상태가 좋아져 있을 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「お嫁さんの中出し済みおま○こで……たくさんぬぽぬぽして気持ちよくしますから<emoji=heart04>\u3000いっぱいいっぱい子種を生産して、ぜ～んぶ私に注いで下さいねっ<emoji=heart04>」"
translation = "「신부의 질내사정 완료된 보지로…… 잔뜩 누포누포 해서 기분 좋게 해줄 테니까요<emoji=heart04> 잔뜩잔뜩 씨앗을 생산해서, 저어언부 저한테 쏟아주세요오<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「それでは、頂きます……<emoji=heart04>」"
translation = "「그러면, 잘 먹겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とヨミの子作り活動が繰り返されることになった。"
translation = "이렇게 해서, 나와 요미의 아기 만들기 활동이 반복되게 되었다."

