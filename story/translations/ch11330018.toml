[[dialogue]]
speaker = "unk"
original = "ある日、俺はリィベルに呼ばれて地下図書館に来ていた。"
translation = "어느 날, 나는 리벨에게 불려 지하 도서관에 와 있었다."

[[dialogue]]
speaker = "クロト"
original = "「俺に何か用？」"
translation = "「나한테 무슨 볼일 있어?」"

[[dialogue]]
speaker = "リィベル"
original = "「これを見て」"
translation = "「이것 좀 봐」"

[[dialogue]]
speaker = "unk"
original = "そう言ってリィベルが差し出した本は──俺が自分の部屋に隠していたエッチな漫画だった！"
translation = "그렇게 말하며 리벨이 내민 책은── 내가 내 방에 숨겨뒀던 야한 만화였다!"

[[dialogue]]
speaker = "クロト"
original = "「な！？\u3000どうしてそれをリィベルが！？」"
translation = "「뭐!? 그걸 어떻게 리벨이!?」"

[[dialogue]]
speaker = "リィベル"
original = "「あなたの部屋で見つけたに決まっているでしょう。少し借りさせてもらったわ」"
translation = "「네 방에서 찾았을 게 뻔하잖아. 잠깐 빌렸어」"

[[dialogue]]
speaker = "リィベル"
original = "「中身を見てみたけど、女がこんな簡単に快感を感じるわけないわ。やはり漫画は俗な本ね」"
translation = "「내용을 봤는데, 여자가 이렇게 쉽게 쾌감을 느낄 리가 없잖아. 역시 만화는 속된 책이네」"

[[dialogue]]
speaker = "クロト"
original = "「そう言われても……本当にこのくらい感じるかもしれないし……」"
translation = "「그렇게 말해도…… 정말 이 정도로 느낄지도 모르고……」"

[[dialogue]]
speaker = "リィベル"
original = "「いいえ、ありえないわ。エロ漫画なんて所詮フィクション。ファンタジーよ」"
translation = "「아니, 있을 수 없어. 에로 만화 따위 결국 픽션. 판타지야」"

[[dialogue]]
speaker = "リィベル"
original = "「特に何なの、このセリフ。『おち○ぽ大好き』とか、『おま○こ壊れちゃう』とか、『イッちゃう～』とか、こんなのセックスの最中に言うわけないじゃない」"
translation = "「특히 뭐야, 이 대사. 『자지 너무 좋아』라든가, 『보지 망가져 버려』라든가, 『가 버려～』라든가, 이런 걸 섹스 도중에 말할 리 없잖아」"

[[dialogue]]
speaker = "クロト"
original = "「いや、そこまで否定しなくていいだろ。実際そう言う女の子もいるかもしれない」"
translation = "「아니, 그렇게까지 부정할 필요는 없잖아. 실제로 그렇게 말하는 여자애도 있을지 모른다」"

[[dialogue]]
speaker = "リィベル"
original = "「なら、あなたが私に言わせてみせなさい。私は感じないし、この漫画が虚構だということを証明してみせるわ」"
translation = "「그렇다면, 네가 나에게 말하게 해 봐. 나는 느끼지 않고, 이 만화가 허구라는 것을 증명해 보이겠어」"

[[dialogue]]
speaker = "クロト"
original = "「えええ～～っ！！？」"
translation = "「에에에～～엣!!?」"

[[dialogue]]
speaker = "unk"
original = "そうしてお互い服を脱ぎ、リィベルが俺の膝の上に乗る。"
translation = "그렇게 서로 옷을 벗고, 리벨이 내 무릎 위에 올라탄다."

[[dialogue]]
speaker = "unk"
original = "素肌を晒し、胸や秘部を露わにしているが、人形のような澄まし顔は変わらない。"
translation = "맨살을 드러내고, 가슴이나 은밀한 부위를 노출하고 있지만, 인형 같은 새침한 얼굴은 변하지 않는다."

[[dialogue]]
speaker = "unk"
original = "リィベルは深淵書庫の管理システムが魔族の形を取ったもの。だがその白い肌や、直接触れて感じる柔らかさには、男として昂りを覚えずにはいられなかった。"
translation = "리벨은 심연 서고의 관리 시스템이 마족의 형태를 취한 것이다. 하지만 그 하얀 피부나, 직접 만져서 느껴지는 부드러움에는, 남자로서 흥분을 느끼지 않을 수 없었다."

[[dialogue]]
speaker = "リィベル"
original = "「ほら、どうしたの。さっさと手を出しなさいよ」"
translation = "「자, 왜 그래. 어서 손을 대」"

[[dialogue]]
speaker = "クロト"
original = "「本当にいいんだな……？」"
translation = "「정말로 괜찮은 거지……?」"

[[dialogue]]
speaker = "リィベル"
original = "「ええ。いいからやりなさい。どうせ私は何も感じないから」"
translation = "「응. 괜찮으니까 해. 어차피 나는 아무것도 느끼지 못하니까」"

[[dialogue]]
speaker = "unk"
original = "そこまで言われたら退く選択肢はない。"
translation = "그렇게까지 들었으니 물러설 선택지는 없다."

[[dialogue]]
speaker = "unk"
original = "緊張と興奮を覚えながら、そっとリィベルの乳房に触れる。"
translation = "긴장과 흥분을 느끼며, 살며시 리벨의 유방에 손을 댄다."

[[dialogue]]
speaker = "リィベル"
original = "「んっ……」"
translation = "「응읏……」"

[[dialogue]]
speaker = "unk"
original = "するとリィベルがわずかに声を漏らした……ような気がする。"
translation = "그러자 리벨이 아주 작게 소리를 흘린…… 듯한 기분이 든다."

[[dialogue]]
speaker = "クロト"
original = "「今ので感じた？」"
translation = "「방금 걸로 느꼈어?」"

[[dialogue]]
speaker = "リィベル"
original = "「そんなわけないでしょ」"
translation = "「그럴 리 없잖아」"

[[dialogue]]
speaker = "unk"
original = "即座に否定し、冷たい表情を崩さないリィベル。"
translation = "즉시 부정하며, 차가운 표정을 무너뜨리지 않는 리벨."

[[dialogue]]
speaker = "unk"
original = "それならこのまま愛撫を続けさせてもらおう。"
translation = "그렇다면 이대로 애무를 계속하도록 하자."

[[dialogue]]
speaker = "リィベル"
original = "「ふっ…………んん…………ふー…………はぁ…………」"
translation = "「큿………… 응………… 후ー………… 하아…………」"

[[dialogue]]
speaker = "unk"
original = "リィベルの乳房は小さいけどちゃんと柔らかくて、力を入れる度に指が食い込む。"
translation = "리벨의 유방은 작지만 제대로 부드러워서, 힘을 줄 때마다 손가락이 파고든다."

[[dialogue]]
speaker = "リィベル"
original = "「んん……どうして胸を触るの？\u3000セックスなんだから、私の膣に入れるんじゃないの？」"
translation = "「응…… 왜 가슴을 만져? 섹스니까, 내 질에 넣는 거 아니야?」"

[[dialogue]]
speaker = "クロト"
original = "「気持ち良くしておま○こを濡らさないと、お互い痛いから」"
translation = "「기분 좋게 해서 보지를 적시지 않으면, 서로 아프니까」"

[[dialogue]]
speaker = "リィベル"
original = "「気持ち良くなんてならないって、言ってるのに……ふ……はぁ……」"
translation = "「기분 좋게는 안 될 거라고, 말하고 있는데…… 큿…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "そう言いながらも、乳房を揉まれる度に、リィベルの肩が小刻みに震えている気がする。"
translation = "그렇게 말하면서도, 유방을 주무를 때마다, 리벨의 어깨가 가늘게 떨리고 있는 듯하다."

[[dialogue]]
speaker = "リィベル"
original = "「こんな小さな胸、触り甲斐がないでしょうに……んん……ウィステリアやモネくらい大きければともかく……」"
translation = "「이렇게 작은 가슴, 만질 보람이 없을 텐데…… 응…… 위스테리아나 모네 정도 크기라면 모를까……」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことないよ。ほら」"
translation = "「그렇지 않아. 자」"

[[dialogue]]
speaker = "リィベル"
original = "「あ……魔王のおち○ちんが……」"
translation = "「아…… 마왕의 자지가……」"

[[dialogue]]
speaker = "unk"
original = "リィベルの足の間で、俺のペニスが怒張し、ドクドクと脈打つ。"
translation = "리벨의 다리 사이에서, 내 페니스가 노출하고, 득득하고 맥박 친다."

[[dialogue]]
speaker = "unk"
original = "そしてペニスをリィベルの股間に押し当てて、ゆっくりと擦り合わせる。"
translation = "그리고 페니스를 리벨의 가랑이에 밀어 대고, 천천히 문지른다."

[[dialogue]]
speaker = "リィベル"
original = "「んんぅっ…………ふぅ…………ん………おち○ちん、熱い……」"
translation = "「응으읏………… 후우………… 응……… 자지, 뜨거워……」"

[[dialogue]]
speaker = "unk"
original = "ペニス越しに感じる、弾力のある肉の感触が心地いい。"
translation = "페니스 너머로 느껴지는, 탄력 있는 살의 감촉이 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "リィベルも、表情は変わらないながらも艶っぽい声を漏らしているような……"
translation = "리벨도, 표정은 변하지 않으면서도 요염한 목소리를 흘리고 있는 듯한……"

[[dialogue]]
speaker = "リィベル"
original = "「ふー…………ふー…………ん…………ぁ…………んん……」"
translation = "「후ー………… 후ー………… 응………… 아………… 응응……」"

[[dialogue]]
speaker = "unk"
original = "何度も繰り返すうちに先走りがにじみ、それを塗りたくるようにリィベルの秘部と摩擦させる。"
translation = "몇 번이고 반복하는 사이에 선골이 배어 나오고, 그것을 덧바르듯이 리벨의 은밀한 부위와 마찰시킨다."

[[dialogue]]
speaker = "unk"
original = "そしてペニスを突き立てて……"
translation = "그리고 페니스를 들이대고……"

[[dialogue]]
speaker = "リィベル"
original = "「んんん～～～～～～～っっ」"
translation = "「응으으～～～～～～～!!」"

[[dialogue]]
speaker = "unk"
original = "亀頭が膣口を広げて侵入し、処女膜を破ってリィベルと繋がる。"
translation = "귀두가 질 입구를 넓혀 침입하고, 처녀막을 찢고 리벨과 연결된다."

[[dialogue]]
speaker = "unk"
original = "初めての挿入で、リィベルに負担がかからないかと心配になったが……"
translation = "첫 삽입에, 리벨에게 부담이 가지 않을까 걱정했지만……"

[[dialogue]]
speaker = "リィベル"
original = "「んんっ……はぁ……はぁ……はあぁ……っ<emoji=heart04>」"
translation = "「응읏…… 하아…… 하아…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リィベル……？」"
translation = "「리벨……?」"

[[dialogue]]
speaker = "リィベル"
original = "「な、何よ……？\u3000私は何も感じてないわよ……ふ……んぁ……<emoji=heart04>」"
translation = "「뭐, 뭐야……? 나는 아무것도 느끼지 못하고 있어…… 큿…… 응아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルの顔から人形のような冷淡さが失われ、ほんのり赤く染まっている。"
translation = "리벨의 얼굴에서 인형 같은 냉담함이 사라지고, 희미하게 붉게 물들어 있다."

[[dialogue]]
speaker = "unk"
original = "膣からは愛液がとめどなく溢れ、粘膜が震えながらペニスに絡みついてくる。"
translation = "질에서는 애액이 끊임없이 흘러넘치고, 점막이 떨리면서 페니스에 휘감겨 온다."

[[dialogue]]
speaker = "リィベル"
original = "「セックスなんて、気持ち良くない……何をされても、感じないんだから……ふぅ、はぁ……<emoji=heart04>」"
translation = "「섹스 따위, 기분 좋지 않아…… 뭘 당해도, 느끼지 못하니까…… 후우, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「だから好きにしなさい……あんな漫画、嘘だって証明してあげる……んっ……<emoji=heart04>」"
translation = "「그러니까 마음대로 해…… 저런 만화, 거짓말이라고 증명해 줄게…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すでに証明には失敗している気がするが、リィベルがそう言うなら──"
translation = "이미 증명에는 실패한 듯하지만, 리벨이 그렇게 말한다면──"

[[dialogue]]
speaker = "リィベル"
original = "「ひぁあああっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000はぁっ……はっ……あぁんっ……<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 응읏……<emoji=heart04> 하앗…… 핫…… 아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「魔王のが……はぁ……私の中で、動いてる……？\u3000んんっ……<emoji=heart04>\u3000はぁ、はぁ……ぁん……<emoji=heart04>」"
translation = "「마왕의 것이…… 하아…… 내 안에서, 움직이고 있어……? 응읏……<emoji=heart04> 하아, 하아…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ふっ……はぁっ、はぁ……ああぁ……<emoji=heart04>\u3000おち○ちんで、私の中、広げられてるぅ……ふぁっ……んんっ……<emoji=heart04>」"
translation = "「큭…… 하앗, 하아…… 아아아……<emoji=heart04> 자지로, 내 안, 넓혀지고 있어…… 퐈앗…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さな膣がペニスをぎゅっと締め付けてきて、痛いくらいの圧迫感が襲ってくる。"
translation = "작은 질이 페니스를 꽉 조여 와서, 아플 정도의 압박감이 덮쳐 온다."

[[dialogue]]
speaker = "リィベル"
original = "「はぁ、はぁ、んんっ……<emoji=heart04>\u3000魔王の、大き、い……はぁ……はぁっ……んぅっ……<emoji=heart04>」"
translation = "「하아, 하아, 응읏……<emoji=heart04> 마왕의, 크,다…… 하아…… 하앗…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んんんっ……んっ……ふぅっ……<emoji=heart04>\u3000ふぅはぁ……あっ、あっ、あぁっ……<emoji=heart04>」"
translation = "「응으으읏…… 응읏…… 후읏……<emoji=heart04> 후우하아…… 앗, 앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蜜で濡れた膣壁が隙間なくペニスを包み、じゅぷじゅぷと音を立てて摩擦する。"
translation = "꿀로 젖은 질벽이 틈 없이 페니스를 감싸고, 주웁주웁 소리를 내며 마찰한다."

[[dialogue]]
speaker = "unk"
original = "小さな膣は狭くて、粘膜の柔らかさを強く感じ、リィベルの中でさらにペニスが膨張していく。"
translation = "작은 질은 좁아서, 점막의 부드러움을 강하게 느끼며, 리벨 안에서 더욱 페니스가 팽창해 간다."

[[dialogue]]
speaker = "リィベル"
original = "「んん～っ<emoji=heart04>\u3000魔王のが、私の中で、ビクビクして……ひぁああっ、あっ、あぁっ<emoji=heart04>」"
translation = "「응응～읏<emoji=heart04> 마왕의 것이, 내 안에서, 움찔움찔하고…… 히아아앗, 앗, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リィベル、気持ち良くなってる？」"
translation = "「리벨, 기분 좋아지고 있어?」"

[[dialogue]]
speaker = "リィベル"
original = "「そんなはず、ないでしょ……はぁ……んんっ……<emoji=heart04>\u3000んはぁ……ん……ふぅ……<emoji=heart04>」"
translation = "「그럴 리, 없잖아…… 하아…… 응읏……<emoji=heart04> 응하아…… 응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルは頑なに快感を否定するが、ペニスが動く度に艶めかしい声を漏らしてしまって、全く説得力がない。"
translation = "리벨은 완강하게 쾌감을 부정하지만, 페니스가 움직일 때마다 요염한 목소리를 흘려 버려서, 전혀 설득력이 없다."

[[dialogue]]
speaker = "リィベル"
original = "「あなたは好き勝手、腰を動かしてるようだけど……はぁ……<emoji=heart04>\u3000私は、気持ち良くなんて、ないんだから……ふあっ……ああぁんっ<emoji=heart04>」"
translation = "「너는 제멋대로, 허리를 움직이고 있는 것 같지만…… 하아……<emoji=heart04> 나는, 기분 좋지, 않으니까…… 퐈앗…… 아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んはぁ、はぁ……んっ……<emoji=heart04>\u3000あなたは猿みたいに、腰を振って……んっ、はぁ……勝手に気持ち良く、なりなさい……ぁっ……<emoji=heart04>」"
translation = "「응하아, 하아…… 응읏……<emoji=heart04> 너는 원숭이처럼, 허리를 흔들고…… 응읏, 하아…… 멋대로 기분 좋게, 돼…… 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ふあぁっ……あぁ……<emoji=heart04>\u3000んぁ……んっ……<emoji=heart04>\u3000私は、感じてなんか、いない……んふぅっ……<emoji=heart04>」"
translation = "「후아앗…… 아아……<emoji=heart04> 응아…… 응읏……<emoji=heart04> 나는, 느끼고 있지, 않아…… 응후읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかしリィベルの表情は快楽で蕩け、蜜がいやらしい音を響かせる。"
translation = "하지만 리벨의 표정은 쾌락으로 녹아내리고, 꿀이 야릇한 소리를 울린다."

[[dialogue]]
speaker = "unk"
original = "可愛いおっぱいをふにふにと揉んでみると──"
translation = "귀여운 가슴을 말랑말랑하게 주물러 보니──"

[[dialogue]]
speaker = "リィベル"
original = "「んん～～～っ<emoji=heart04>\u3000おっぱい、触らないでっ……あっ……ふぅ……<emoji=heart04>」"
translation = "「응응～～～읏<emoji=heart04> 가슴, 만지지 마읏…… 앗…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「何をされても感じないんじゃないのか？」"
translation = "「뭘 당해도 느끼지 못하는 거 아니었어?」"

[[dialogue]]
speaker = "リィベル"
original = "「ち、ちが……感じてなんか……ふぁああっ<emoji=heart04>\u3000んんはぁ……あっ……ひやぁあっ<emoji=heart04>」"
translation = "「아, 아니…… 느끼고 있지 않아…… 퐈아앗<emoji=heart04> 응응하아…… 앗…… 히야아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを突き上げながら、指先で乳首に触れる。"
translation = "페니스를 쳐 올리면서, 손가락 끝으로 유두에 닿는다."

[[dialogue]]
speaker = "リィベル"
original = "「ひぃんっ<emoji=heart04><emoji=heart04>」"
translation = "「히잉읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとリィベルが悲鳴みたいな声を上げ、ビクッと体を跳ねさせた。"
translation = "그러자 리벨이 비명 같은 소리를 내며, 움찔하고 몸을 튀게 했다."

[[dialogue]]
speaker = "リィベル"
original = "「んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000先っぽ、くりくりされて……ひあぁああっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 끝부분, 빙글빙글 만져져서…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んんんっ<emoji=heart04>\u3000やっ<emoji=heart04>\u3000乳首、いじるの、やぁっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000あっ……あっ……んん～～っ<emoji=heart04>」"
translation = "「응으으읏<emoji=heart04> 얏<emoji=heart04> 젖꼭지, 만지는 거, 싫어읏<emoji=heart04> 안 돼읏<emoji=heart04> 앗…… 앗…… 응응～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首はつんと尖って、リィベルの興奮を表しているようだ。"
translation = "젖꼭지는 톡 튀어나와서, 리벨의 흥분을 나타내는 듯하다."

[[dialogue]]
speaker = "unk"
original = "しかも先端に触れる度に、嬉しそうにきゅっと膣が締まる。"
translation = "게다가 끝에 닿을 때마다, 기쁜 듯이 꽉 질이 조인다."

[[dialogue]]
speaker = "リィベル"
original = "「先っぽばっかり、いじられて……んぁっ<emoji=heart04>\u3000はぁ、はっ……あっ……なんか、変になりそう……ひぁああっ<emoji=heart04>」"
translation = "「끝부분만, 만져져서…… 응앗<emoji=heart04> 하아, 핫…… 앗…… 뭔가, 이상해질 것 같아…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「これでも気持ち良くないんだ？」"
translation = "「이래도 기분 좋지 않다는 거야?」"

[[dialogue]]
speaker = "リィベル"
original = "「そ、そうよ……あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あなたが触れてくるから、反応してしまうだけ……ひぁっ、ああっ<emoji=heart04>」"
translation = "「그, 그래…… 앗<emoji=heart04> 응읏<emoji=heart04> 네가 만져 오니까, 반응해 버리는 것뿐…… 히앗, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ふぁっ、あぁんっ……<emoji=heart04>\u3000私を、よがらせたかったら……もっと頑張る、こと、ね……んんっ<emoji=heart04>」"
translation = "「퐈앗, 아앙읏……<emoji=heart04> 나를, 절정하게 하고 싶다면…… 좀 더 노력, 해야, 해…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それなら、リィベルが素直に『気持ちいい』と言うまで責めさせてもらおう。"
translation = "그렇다면, 리벨이 솔직하게 『기분 좋아』라고 말할 때까지 괴롭히도록 하자."

[[dialogue]]
speaker = "unk"
original = "リィベルの細い腰を捕まえ、思い切り突き上げる。"
translation = "리벨의 가는 허리를 붙잡고, 힘껏 쳐 올린다."

[[dialogue]]
speaker = "リィベル"
original = "「ひぃああ～～っ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んぁああっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000激し、いっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んぁあ～～っ<emoji=heart04>」"
translation = "「히이아아～～앗<emoji=heart04> 아앗<emoji=heart04> 응아아앗<emoji=heart04> 안 돼읏<emoji=heart04> 격렬, 해읏<emoji=heart04> 힉<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 응아아～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「おち○ちん、ズンズン、突き上げてくるっ<emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「자지가, 둥둥, 쳐 올려 와읏<emoji=heart04> 굉장해읏<emoji=heart04> 히아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응으으읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「やっ、ダメ、ダメ<emoji=heart04>\u3000おち○ちん激しいっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000あっ、あっ──ひぃあああっ<emoji=heart04>」"
translation = "「얏, 안 돼, 안 돼<emoji=heart04> 자지 격렬해읏<emoji=heart04> 퐈앗<emoji=heart04> 앗, 앗── 히이아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000大きなおち○ちん、奥まで、来るぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000はぁっ、ああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 커다란 자지, 안쪽까지, 들어와읏<emoji=heart04> 앗<emoji=heart04> 응으으읏<emoji=heart04> 하앗, 아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すっかり快楽に染まった顔で、リィベルが淫らに喘ぐ。"
translation = "완전히 쾌락에 물든 얼굴로, 리벨이 음란하게 신음한다."

[[dialogue]]
speaker = "クロト"
original = "「まだ感じてないって言うのか？」"
translation = "「아직 느끼지 못했다고 말할 거야?」"

[[dialogue]]
speaker = "リィベル"
original = "「だって、だってぇ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000はっ──あっ──ふぁああっ<emoji=heart04>」"
translation = "「왜냐면, 왜냐면에에……<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응으으읏<emoji=heart04> 핫── 앗── 퐈아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "往生際の悪いリィベルを落とすべく、思い切りペニスを突き上げる。"
translation = "고집 센 리벨을 무너뜨리기 위해, 힘껏 페니스를 쳐 올린다."

[[dialogue]]
speaker = "リィベル"
original = "「んんん～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으～～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000激しくしちゃダメ、おま○こ壊れちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 앗<emoji=heart04> 앙읏<emoji=heart04> 격렬하게 하면 안 돼, 보지 망가져 버려읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エロ漫画みたいなこと言うわけない──と言って否定したのに、とうとう自分で言ってしまった。"
translation = "에로 만화 같은 말을 할 리 없다──고 부정했는데, 결국 스스로 말해 버렸다."

[[dialogue]]
speaker = "リィベル"
original = "「ふぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000おち○ちん、奥まで、入ってきてぇ<emoji=heart04>\u3000おま○こいっぱいに、なるぅっ<emoji=heart04>」"
translation = "「퐈아앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 자지, 안쪽까지, 들어와아<emoji=heart04> 보지 가득, 차아읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リィベル、やっぱり気持ち良くなってる？」"
translation = "「리벨, 역시 기분 좋아지고 있어?」"

[[dialogue]]
speaker = "リィベル"
original = "「ち、ちが……違うからぁっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000気持ち良くなって、なんかぁ……ひあっ<emoji=heart04>\u3000ふやぁんっ<emoji=heart04>」"
translation = "「아, 아니…… 아니니까아읏<emoji=heart04> 아<emoji=heart04> 응읏<emoji=heart04> 기분 좋아지고, 있지이…… 히앗<emoji=heart04> 후야앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そうか、じゃあそろそろ負けを認めないとな」"
translation = "「그런가, 그럼 슬슬 패배를 인정해야겠네」"

[[dialogue]]
speaker = "リィベル"
original = "「ふぇ──？」"
translation = "「훼──?」"

[[dialogue]]
speaker = "unk"
original = "虚を突かれたように、普段からは想像できない間抜けな声が漏れた。"
translation = "허를 찔린 듯이, 평소에는 상상할 수 없는 얼빠진 목소리가 새어 나왔다."

[[dialogue]]
speaker = "クロト"
original = "「リィベルが感じてないのに、俺だけ気持ち良くなるのは悪いだろ？\u3000だからもうやめようかと思って」"
translation = "「리벨이 느끼지 못하는데, 나만 기분 좋아지는 건 나쁘잖아? 그래서 이제 그만둘까 해서」"

[[dialogue]]
speaker = "リィベル"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "クロト"
original = "「もう一度聞くけど……リィベルはセックス気持ちいい？」"
translation = "「다시 한번 묻겠는데…… 리벨은 섹스 기분 좋아?」"

[[dialogue]]
speaker = "リィベル"
original = "「……ッ！！」"
translation = "「……읏!!」"

[[dialogue]]
speaker = "リィベル"
original = "「ごめんなさいっ<emoji=heart04>\u3000セックス気持ちいい<emoji=heart04>\u3000おま○こされるの好きぃっ<emoji=heart04>」"
translation = "「죄송해요읏<emoji=heart04> 섹스 기분 좋아<emoji=heart04> 보지 당하는 거 좋아아읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「あっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000意地張って、ごめんなさいっ<emoji=heart04>\u3000セックス、いい<emoji=heart04>\u3000おち○ちんでズンズンされるの、気持ちいいのぉっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응앗<emoji=heart04> 응읏<emoji=heart04> 고집부려서, 죄송해요읏<emoji=heart04> 섹스, 좋아<emoji=heart04> 자지로 둥둥 당하는 거, 기분 좋은 거어읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ひああぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000おち○ちんでっ<emoji=heart04>\u3000おま○こ突かれるの好きぃっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 아앗<emoji=heart04> 힉<emoji=heart04> 자지로읏<emoji=heart04> 보지 찔리는 거 좋아아읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「おち○ぽ好き？」"
translation = "「자지 좋아해?」"

[[dialogue]]
speaker = "リィベル"
original = "「うん、好き<emoji=heart04>\u3000おち○ぽ大好きっ<emoji=heart04>\u3000あっ、あっ──んん～～っ<emoji=heart04>\u3000おち○ぽいいのぉっ<emoji=heart04>」"
translation = "「응, 좋아<emoji=heart04> 자지 너무 좋아읏<emoji=heart04> 앗, 앗── 응응～～읏<emoji=heart04> 자지 좋은 거어읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「初めてだったのに、もうセックス好きになっちゃったの<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000おち○ぽ好きっ<emoji=heart04>\u3000好きっ<emoji=heart04>」"
translation = "「처음이었는데, 벌써 섹스 좋아하게 돼 버렸어<emoji=heart04> 히앗<emoji=heart04> 아앗<emoji=heart04> 자지 좋아읏<emoji=heart04> 좋아읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んん～～っ<emoji=heart04>\u3000簡単に、おち○ぽ好きになっちゃう、淫乱おま○こで、ごめんなさいっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 앗<emoji=heart04> 응응～～읏<emoji=heart04> 쉽게, 자지 좋아하게 돼 버리는, 음란한 보지라서, 죄송해요읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "完全に陥落し、淫らな言葉を積極的に口にするリィベルに激しく興奮し、射精寸前になりながら突き上げる。"
translation = "완전히 함락되어, 음란한 말을 적극적으로 입에 담는 리벨에게 격렬하게 흥분하고, 사정 직전이 되면서 쳐 올린다."

[[dialogue]]
speaker = "unk"
original = "膣壁もぶるぶると震えながら、期待するみたいに強く締め付けてきた。"
translation = "질벽도 부들부들 떨면서, 기대하는 것처럼 강하게 조여 왔다."

[[dialogue]]
speaker = "リィベル"
original = "「んん～～～っ<emoji=heart04>\u3000あっ──あっ──ああぁっ<emoji=heart04>\u3000おち○ぽドクドクって<emoji=heart04>\u3000おま○この中で、跳ねてるっ<emoji=heart04>」"
translation = "「응응～～～읏<emoji=heart04> 앗── 앗── 아아앗<emoji=heart04> 자지가 득득하고<emoji=heart04> 보지 안에서, 뛰고 있어읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「射精、しそうっ<emoji=heart04>\u3000んぁっ、ああぁっ<emoji=heart04>\u3000だめっ<emoji=heart04>\u3000私も、イキそうっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000おま○こイッちゃうぅっ<emoji=heart04>」"
translation = "「사정, 할 것 같아읏<emoji=heart04> 응앗, 아아앗<emoji=heart04> 안 돼읏<emoji=heart04> 나도, 갈 것 같아읏<emoji=heart04> 보지 가읏<emoji=heart04> 보지 가 버려어읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ひぃああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクぅっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>」"
translation = "「히이아앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 가읏<emoji=heart04> 가읏<emoji=heart04> 가아읏<emoji=heart04> 가 가읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「あ──あ──あぁあ～～っ<emoji=heart04>\u3000イッ、イクっ<emoji=heart04>\u3000おま○こイッくぅ～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아── 아── 아아아～～앗<emoji=heart04> 가, 가읏<emoji=heart04> 보지 가아～～～～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ひぁあああああ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ふっ──<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んんんんっ<emoji=heart04>\u3000おく、ドクドクってっ<emoji=heart04>\u3000ふわぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んん～～っ<emoji=heart04>」"
translation = "「큭──<emoji=heart04> 응읏<emoji=heart04> 응으으으읏<emoji=heart04> 안쪽, 득득하고읏<emoji=heart04> 후와아앗<emoji=heart04> 앗<emoji=heart04> 응응～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小さな膣にぎゅっと締め付けられながら、リィベルの奥に精を吐き出す。"
translation = "작은 질에 꽉 조여지면서, 리벨의 안쪽에 정액을 뿜어낸다."

[[dialogue]]
speaker = "リィベル"
original = "「んん……んっ……あつ、熱いぃっ……<emoji=heart04>\u3000ふわっ、はぁ……おち○ぽビクンビクンって……ぁっ……おま○この中で、跳ねてるぅ……<emoji=heart04>」"
translation = "「응응…… 응읏…… 뜨, 뜨거워어읏……<emoji=heart04> 후왓, 하아…… 자지가 움찔움찔하고…… 앗…… 보지 안에서, 뛰고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「あっ……んっ……魔王のせーえきで、おま○こいっぱいに、なるぅ……んん……っ<emoji=heart04>」"
translation = "「앗…… 응읏…… 마왕의 정액으로, 보지 가득, 차아…… 응응……읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「はぁ……はぁ……はあぁ……<emoji=heart04>」"
translation = "「하아…… 하아…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒い息を吐きながら脱力し、俺に体を預けるリィベル。"
translation = "거친 숨을 내쉬며 탈력하고, 나에게 몸을 맡기는 리벨."

[[dialogue]]
speaker = "unk"
original = "その重さを愛おしく感じながら、小さな体を抱き締める。"
translation = "그 무게를 사랑스럽게 느끼면서, 작은 몸을 끌어안는다."

[[dialogue]]
speaker = "クロト"
original = "「ちゃんと言ってたよ、『おち○ちん大好き』って」"
translation = "「제대로 말했잖아, 『자지 너무 좋아』라고」"

[[dialogue]]
speaker = "リィベル"
original = "「うぅ……」"
translation = "「우으……」"

[[dialogue]]
speaker = "リィベル"
original = "「はぁ……認めればいいんでしょ。セックスは気持ちいいし、おち○ぽも好き。漫画もあながち虚構とは言えないようね……」"
translation = "「하아…… 인정하면 되는 거잖아. 섹스는 기분 좋고, 자지도 좋아. 만화도 꼭 허구라고는 할 수 없을 것 같네……」"

[[dialogue]]
speaker = "リィベル"
original = "「でもあなたのせいで、セックスの快感を覚えてしまったわ。私は竜の因子を持ってるから、発情したら暴れてしまうかもしれない」"
translation = "「하지만 네 탓에, 섹스의 쾌감을 기억해 버렸어. 나는 용의 인자를 가지고 있으니까, 발정하면 날뛰어 버릴지도 몰라」"

[[dialogue]]
speaker = "リィベル"
original = "「だから責任を取って、私がしたい時はちゃんと相手しなさい……<emoji=heart04>」"
translation = "「그러니까 책임을 지고, 내가 하고 싶을 때는 제대로 상대해 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んっ……ちゅっ……ちゅるるっ……<emoji=heart04>\u3000ちゅるれろ、ちゅぷ……んちゅぷっ……<emoji=heart04>」"
translation = "「응읏…… 츕…… 츄르르읏……<emoji=heart04> 츄르레로, 츕…… 응츕읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして俺はリィベルが発情する度に地下図書館に呼ばれ、彼女を満足させるまで交わるのだった──"
translation = "그리고 나는 리벨이 발정할 때마다 지하 도서관에 불려, 그녀를 만족시킬 때까지 관계를 맺는 것이었다──"

