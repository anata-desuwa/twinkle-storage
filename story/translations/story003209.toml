[[dialogue]]
speaker = "unk"
original = "俺たちの背後には固く閉ざされた扉があり、正面にはうっとりと甘い笑みを浮かべたウルスラがいる。"
translation = "우리 뒤에는 굳게 닫힌 문이 있고, 정면에는 황홀하고 달콤한 미소를 띤 우르술라가 있다."

[[dialogue]]
speaker = "unk"
original = "逃げ場はない。"
translation = "도망칠 곳은 없다."

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ふふ、イレーナさん、会長さん。お覚悟を<emoji=heart04>」"
translation = "「후후, 이레이나 씨, 회장님. 각오를<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はぁっ、はっ、はふぅん……<emoji=heart04>\u3000追い詰めちゃいました……<emoji=heart04>」"
translation = "「하아, 하아, 하후웅……<emoji=heart04> 막다른 곳까지 몰아넣었어용……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「くっ……万事休すね……」"
translation = "「큭…… 절체절명이네……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そんな怖い顔をしないでください。せっかくの綺麗な顔が台無しになってしまいます」"
translation = "「그런 무서운 얼굴 하지 마세요. 모처럼 예쁜 얼굴이 엉망이 되어버리잖아요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま、別に痛い想いをするわけではないんですよ？」"
translation = "「이레이나 님, 딱히 아픈 일을 당하는 건 아니라고요?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そう。ただ、自分の想いに、素直になるだけ」"
translation = "「그래요. 그저 자신의 마음에 솔직해질 뿐.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「身にまとう衣服を脱ぎ捨てて生まれたままの姿になるように……胸に秘めた想いを表に解き放つだけ……<emoji=heart04>」"
translation = "「몸에 걸친 의복을 벗어 던지고 태어난 그대로의 모습이 되듯이…… 가슴에 비장한 마음을 겉으로 해방할 뿐……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「得られるのは圧倒的な解放感……<emoji=heart04>\u3000それって、と～～っても気持ちいいんですよ<emoji=heart04>」"
translation = "「얻을 수 있는 건 압도적인 해방감……<emoji=heart04> 그거, 저어어엉말로 기분 좋답니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふざけんなっ！\u3000心を丸裸にさせられるなんて、ヌードになるよりよっぽどひどい辱めだわ！」"
translation = "「웃기지 마! 마음을 발가벗겨지다니, 누드가 되는 것보다 훨씬 심한 굴욕이라고!」"

[[dialogue]]
speaker = "unk"
original = "つまり矢に撃たれるくらいなら脱ぐと……？"
translation = "그러니까 화살에 맞을 바엔 벗겠다는 거야……?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「今あんた変な想像したでしょ？\u3000後でボコすわよ？」"
translation = "「지금 너 이상한 상상 했지? 나중에 조져버릴 거야?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イ、イレーナさまのヌードっ……！？\u3000そ、そんなの、想像しただけで……ぶふぅっ！」"
translation = "「이, 이레이나 님의 누드……!? 그, 그런 거 상상만 해도…… 부훩!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「シャロンまで何考えてんのよ！？」"
translation = "「샤론까지 무슨 생각 하는 거야!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あら……シャロンさんには刺激が強すぎたのでしょうか……妄想だけで鼻血を噴いて倒れてしまいました」"
translation = "「어라…… 샤론 씨에게는 자극이 너무 강했던 걸까요…… 망상만으로 코피를 뿜으며 쓰러져 버렸네요.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ああ……見たいです。見せてください、全てのヴェールを取り払ったイレーナさんの想い……<emoji=heart04>」"
translation = "「아아…… 보고 싶어요. 보여주세요, 모든 베일을 벗어 던진 이레이나 씨의 진심을……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「秘めた想いをさらけ出し、愛欲に溺れるあなたの姿を一目……<emoji=heart04>」"
translation = "「숨겨둔 마음을 드러내고 애욕에 빠진 당신의 모습을 한 번만이라도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やらせないっ！"
translation = "하게 두지 않아!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんた……！」"
translation = "「너……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「まあ、今度は会長さんが盾になって……困りました。バレンタインは女性からチョコを渡すのがしきたり。今は会長さんを撃つわけにはいきません」"
translation = "「어머, 이번엔 회장님이 방패가 되어서…… 곤란하네요. 발렌타인은 여성이 초코를 건네는 게 관습. 지금 회장님을 쏠 수는 없어요.」"

[[dialogue]]
speaker = "unk"
original = "なら諦めて、俺たちをここから出せ！"
translation = "그럼 포기하고 우릴 여기서 내보내!"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「それで言うことを聞くなら、最初からこんなことしていませんよ」"
translation = "「그걸로 말을 들을 거였다면 처음부터 이런 짓 안 했죠.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ねえ、会長さん？」"
translation = "「그쵸, 회장님?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「感情を丸裸にしたイレーナさんが、頬を赤らめてチョコを手渡す姿……見たくはないですか？」"
translation = "「감정을 발가벗긴 이레이나 씨가 뺨을 붉히며 초코를 건네는 모습…… 보고 싶지 않으신가요?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「見たいです！！」"
translation = "「보고 싶어용!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「バタッ」"
translation = "「털썩」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「また倒れた！？\u3000倒れるか倒れないのかどっちかにしなさい！」"
translation = "「또 쓰러졌어!? 쓰러질 건지 말 건지 하나만 해!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふざけないで！\u3000あたしは絶対そんな風にならないから！\u3000会長もウルスラの言うことなんか聞いちゃダメよ！」"
translation = "「까불지 마! 난 절대 그렇게 안 될 거니까! 회장도 우르술라가 하는 말 따위 들으면 안 돼!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ほら、想像してみてください。チョコレートのように甘～いイレーナさんを」"
translation = "「자, 상상해 보세요. 초콜릿처럼 다~콤한 이레이나 씨를.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「これ……バレンタインのチョコ、あげる」"
translation = "「이거…… 발렌타인 초코, 줄게.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「会長さんのこと、ずっと好きだったの……<emoji=heart04>」"
translation = "「회장님을 줄곧 좋아했어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「えへへ、だ～い好き<emoji=heart04>」"
translation = "「에헤헤, 너~무 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「どうです会長さん？\u3000甘～く気持ちを告白するイレーナさん、見たくないですか？」"
translation = "「어때요 회장님? 달콤~하게 마음을 고백하는 이레이나 씨, 보고 싶지 않나요?」"

[[dialogue]]
speaker = "unk"
original = "見たい！"
translation = "보고 싶어!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっ、あんた！？」"
translation = "「잠깐, 너!?」"

[[dialogue]]
speaker = "unk"
original = "でも素直になれないイレーナが一番可愛い！！"
translation = "하지만 솔직해지지 못하는 이레이나가 제일 귀여워!!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ！？\u3000い、いきなり何を！？」"
translation = "「하아!? 가, 갑자기 무슨 소리야!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「くっ……この揺らぎは……！？\u3000会長さんから迸るバレンタインの波動が私に干渉している……！？」"
translation = "「큭…… 이 흔들림은……!? 회장님에게서 뿜어져 나오는 발렌타인 파동이 내게 간섭하고 있어……!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どういうこと！？\u3000言ってる意味が何ひとつわかんないんだけど！？」"
translation = "「어떻게 된 거야!? 하는 말을 하나도 모르겠는데!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でも今なら……それっ！」"
translation = "「하지만 지금이라면…… 에잇!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「きゃあぁぁぁっ！？\u3000私のバレンタインの波動が、弱まっている……！？」"
translation = "「꺄아아악!? 제 발렌타인 파동이 약해지고 있어……!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「やっぱり！\u3000バレンタインの無敵効果も弱くなってる！\u3000攻撃が通るわ！」"
translation = "「역시! 발렌타인의 무적 효과도 약해졌어! 공격이 통해!」"

[[dialogue]]
speaker = "unk"
original = "イレーナは素直じゃないところがいい！"
translation = "이레이나는 솔직하지 않은 면이 좋다고!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「～～～っ！！\u3000何かムカつくから後でボコすの決定！\u3000でもその前に！」"
translation = "「~~~!! 뭔가 짜증 나니까 나중에 조져버리는 거 확정! 하지만 그전에!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしとあんたの力、あのバレンタインモンスターに見せつけてやるわよ！」"
translation = "「나와 네 힘을 저 발렌타인 몬스터에게 똑똑히 보여주자고!」"

