[[dialogue]]
speaker = "unk"
original = "俺とフィオナで、結婚式場近くに発生したアステラを消滅させた。"
translation = "나와 피오나는, 결혼식장 근처에 발생한 아스텔라를 소멸시켰다."

[[dialogue]]
speaker = "unk"
original = "周囲に湧きだしたモンスターはキリカ師匠とナミエルが倒してくれて、被害を出さずに事を収められた。"
translation = "주변에 솟아난 몬스터는 키리카 스승님과 나미엘이 쓰러뜨려 주어, 피해 없이 일을 매듭지을 수 있었다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新郎緋宮クロト。あなたは星見フィオナを妻とし、健やかなる時も病める時も、富める時も貧しき時も……」"
translation = "「신랑 <u>히노미야</u> 쿠로토. 당신은 호시미 피오나를 아내로 맞아, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「彼女を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"
translation = "「그녀를 사랑하고, 아끼며, 함께 돕고…… 목숨이 다하는 날까지 진심을 다할 것을 맹세합니까?」"

[[dialogue]]
speaker = "unk"
original = "はい、誓います"
translation = "네, 맹세합니다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新婦星見フィオナ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も……」"
translation = "「신부 호시미 피오나. 당신은 <u>히노미야</u> 쿠로토를 남편으로 맞아, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「彼を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"
translation = "「그를 사랑하고, 아끼며, 함께 돕고…… 목숨이 다하는 날까지 진심을 다할 것을 맹세합니까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい、誓います」"
translation = "「네, 맹세합니다.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「では誓いの口付けを」"
translation = "「그럼 맹세의 입맞춤을.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「じゃあ……いきますね」"
translation = "「그럼…… 갈게요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ちゅっ」"
translation = "「쪽.」"

[[dialogue]]
speaker = "unk"
original = "フィオナの唇が俺の頬にそっと触れる。"
translation = "피오나의 입술이 내 뺨에 살며시 닿는다."

[[dialogue]]
speaker = "unk"
original = "顔がかっと熱くなるのを感じながら、俺もフィオナの頬にキスを返した。"
translation = "얼굴이 확 달아오르는 것을 느끼며, 나도 피오나의 뺨에 키스로 답했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぁ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふつつか者ですが、よろしくお願いしますね……あなた」"
translation = "「부족한 사람이지만, 잘 부탁드려요…… 당신.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「どうでしょう？\u3000今までと違いはありましたか？」"
translation = "「어떤가요? 지금까지와 차이가 있었나요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今までよりずっと、心が満たされている気がします。今ならきっと──」"
translation = "「지금까지보다 훨씬, 마음이 채워진 기분이에요. 지금이라면 분명──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「元の戦闘服に戻りました……！」"
translation = "「원래의 전투복으로 돌아왔어요……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「では私たちも……」"
translation = "「그럼 저희도……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私とナミエルも戻れました。これで上月神闘流の技を存分に振るえますね」"
translation = "「나와 나미엘도 돌아왔어요. 이걸로 코즈키 신투류의 기술을 마음껏 휘두를 수 있겠네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふぅ、やはり普段の装いの方が落ち着きます。掃除もこちらの方が向いていますし」"
translation = "「후우, 역시 평소의 복장이 마음이 편해요. 청소도 이쪽이 더 적합하고요.」"

[[dialogue]]
speaker = "unk"
original = "ほっとした……"
translation = "다행이다……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ではこれで一件落着ですね。貴重な経験ができました」"
translation = "「그럼 이걸로 사건 해결이군요. 귀중한 경험을 했어요.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ～。一時はどうなることかと思ったのニャン」"
translation = "「냐~. 한때는 어떻게 되나 싶었다냥.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ニャリオン、今までどこにいたのです？\u3000途中から姿を見ないと思っていましたが……」"
translation = "「냐리온, 지금까지 어디 있었나요? 도중에 모습이 안 보인다 싶었는데……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「こっそりフィオナ嬢と新星会長の様子を見てたのニャ」"
translation = "「몰래 피오나 양과 신성 회장의 모습을 지켜보고 있었다냐.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「フィオナ嬢の一の配下として、新星会長が不甲斐なかったらガツンと言おうかと思ってたニャンが……まぁ合格ニャ」"
translation = "「피오나 양의 제일가는 부하로서, 신성 회장이 한심하면 한소리 하려 했다냥만…… 뭐, 합격이다냐.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとう、ニャリオン。心配してくれてたんだね」"
translation = "「고마워, 냐리온. 걱정해 줬구나.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャニャン、使い魔として当然のことをしたまでニャン♪」"
translation = "「냐냐냥, 사역마로서 당연한 일을 했을 뿐이다냥♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今回のことはいい経験になりました。少しだけですけど花嫁修業できましたし、結婚式の練習もして……将来が楽しみになりました」"
translation = "「이번 일은 좋은 경험이 되었어요. 조금뿐이지만 신부 수업도 할 수 있었고, 결혼식 연습도 해서…… 장래가 기대되기 시작했어요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「同時に、自分の未熟さを痛感し、ウェディングドレスを本当に着るのはまだ早いとも思いました」"
translation = "「동시에, 자신의 미숙함을 통감해서 웨딩드레스를 정말로 입는 건 아직 이르다고도 생각했고요.」"

[[dialogue]]
speaker = "unk"
original = "フィオナ！？"
translation = "피오나!?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもせっかく得た力なんですから、使わないともったいないですよね♪」"
translation = "「하지만 모처럼 얻은 힘이니까, 쓰지 않으면 손해겠죠♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ウェディングドレスを着ていると、普段の戦闘服や水着とは違う星術を使えるんです。もっと着こなして、戦いに活かせるようにしないといけません」"
translation = "「웨딩드레스를 입고 있으면 평소의 전투복이나 수영복과는 다른 성술을 쓸 수 있거든요. 좀 더 능숙하게 입어서, 전투에 활용할 수 있도록 해야겠어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お嬢様がそう仰るなら──」"
translation = "「아가씨께서 그렇게 말씀하신다면──」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お嬢様に後れを取らぬよう、星見家メイド隊の一人として、ウェディングドレスの戦闘服も十全に使いこなさなくては」"
translation = "「아가씨께 뒤처지지 않도록, 호시미 가문 메이드대의 일원으로서 웨딩드레스 전투복도 충분히 다룰 수 있게 되어야겠네요.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ええ。上月神闘流に新たな技を加えるのもよいかもしれません」"
translation = "「그래요. 코즈키 신투류에 새로운 기술을 더하는 것도 좋을지 모르겠네요.」"

[[dialogue]]
speaker = "unk"
original = "さっきは全然問題なく戦えていたような……"
translation = "방금 전엔 아무 문제 없이 싸웠던 것 같은데……"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「それは言わないお約束ニャン」"
translation = "「그건 말하지 않는 게 약속이다냥.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（もっと大人になって、自分の意志でウェディングドレスを着た時は、隣に緋宮会長がいてくれたらいいな……なんてね）"
translation = "(좀 더 어른이 되어서, 자신의 의지로 웨딩드레스를 입었을 때는 곁에 <u>히노미야</u> 회장님이 있어 준다면 좋겠네…… 라니.)"

[[dialogue]]
speaker = "unk"
original = "フィオナ？"
translation = "피오나?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ、なんでもないですよ、なんでも」"
translation = "「아뇨, 아무것도 아니에요, 아무것도.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ところでフィオナちゃん」"
translation = "「그건 그렇고 피오나 짱.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい？\u3000どうされましたトワ先生？」"
translation = "「네? 무슨 일이세요, 토와 선생님?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「この後改めて、今回の話を聞いてもいいかな。星体力学の研究としてね」"
translation = "「이후에 다시 한번, 이번 이야기를 들어봐도 될까. 성체역학 연구로서 말이야.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「トワ先生には助けていただきましたし、恥ずかしいですけど、そういうことなら……」"
translation = "「토와 선생님께는 도움을 받았고, 부끄럽지만 그런 거라면……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じゃあレポートにして学園に提出するね！\u3000絶対みんなの役に立つよ♪」"
translation = "「그럼 레포트로 만들어서 학원에 제출할게! 분명 모두에게 도움이 될 거야♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それはダメですぅ～～～～～～っ！！？」"
translation = "「그건 안 돼요~~~~~~~!!?」"

