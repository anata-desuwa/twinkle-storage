[[dialogue]]
speaker = "unk"
original = "第３話,ルカルカの人気、急上昇,P"
translation = "제3화, 루카루카의 인기, 급상승, P"

[[dialogue]]
speaker = "unk"
original = "例の水着衣装を公開してから、ルカルカチャンネルの登録者数はぐんぐん伸びているらしい。"
translation = "그 수영복 의상을 공개한 뒤로, 루카루카 채널의 구독자 수는 쭉쭉 늘어나고 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "そこでお祝いもかねてルルカを誘い、カフェでお茶をすることになった。"
translation = "그래서 축하도 겸해서 루루카를 불러, 카페에서 차를 마시기로 했다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん～っ♪\u3000ケーキおいしい！\u3000それにお兄ちゃんとのデートも久しぶり～♪」"
translation = "「음~♪ 케이크 맛있다! 게다가 오빠랑 하는 데이트도 오랜만이야~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「やっぱりおめでたいことがあった時のケーキは最高だね、お兄ちゃん！」"
translation = "「역시 축하할 일이 있을 때 먹는 케이크는 최고네, 오빠!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも本当にいいの、ごちそうになっちゃっても。デートなんだし、あたしも半分出すよ？」"
translation = "「그치만 정말 괜찮아, 얻어먹어도? 데이트니까, 나도 절반 낼게?」"

[[dialogue]]
speaker = "unk"
original = "今日はお祝いだから"
translation = "오늘은 축하하는 자리니까"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ～、ありがとう♪\u3000じゃあ今度、お兄ちゃんをお祝いする時はあたしがごちそうするね！」"
translation = "「에헤헤~, 고마워♪ 그럼 다음에 오빠를 축하할 때는 내가 쏠게!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも本当にびっくり。やっぱり水着って人気が出るんだね～。こんなことならもっと早くにやっておけばよかったかも」"
translation = "「근데 정말 깜짝 놀랐어. 역시 수영복은 인기가 많구나~. 이럴 줄 알았으면 좀 더 빨리 해둘 걸 그랬나 봐」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「登録者数、こんなにぐんぐん伸びるのは──」"
translation = "「구독자 수, 이렇게 쭉쭉 늘어나는 건──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「の、伸びるのは……あの時以来かも……」"
translation = "「느, 늘어나는 건…… 그때 이후일지도……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「水を飲まずに激辛焼きそばチャレンジ。初めてルカルカが『食べてみた』系の動画を上げた……」"
translation = "「물 안 마시고 매운 야키소바 챌린지. 처음으로 루카루카가 『먹방』 계열 영상을 올렸던……」"

[[dialogue]]
speaker = "unk"
original = "あの鼻水とくしゃみがフルコンボの？"
translation = "그 콧물에 재채기가 풀콤보였던 거?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「黒歴史だよ！？\u3000あの動画でバズったのは確かだけど、おかげで危うくネタ芸人枠になりかけちゃったんだから……！」"
translation = "「흑역사라고!? 그 영상으로 화제가 된 건 확실하지만, 덕분에 하마터면 예능인 캐릭터가 될 뻔했으니까……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いまだに切り抜かれるの、嬉しいけどなんか複雑だし……！」"
translation = "「아직도 박제돼서 돌아다니는 거, 기쁘긴 한데 뭔가 복잡하고……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも今回のバズは、水着パワーはあれどちゃんと歌動画が伸びてるもんねっ」"
translation = "「하지만 이번 화제는, 수영복 파워도 있지만 제대로 노래 영상이 늘고 있는 거니까」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんにいっぱいアドバイス貰えたし、練習もリゾート結界ですごく積んだし……」"
translation = "「오빠한테 조언도 많이 받았고, 연습도 리조트 결계에서 엄청 쌓았고……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ようやく本来目指していたルカルカっぽい伸び方になったんだから、もうあれは過去の話。汐ルカルカはこれから羽ばたくんだよ！」"
translation = "「드디어 원래 목표했던 루카루카다운 성장세가 됐으니까, 이제 그건 과거 이야기야. 시오 루카루카는 이제부터 날아오를 거야!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もっともっと素敵な新曲を出して、ファンのお兄ちゃんたちに『歌い手Ｖチューバー』として認知してもらわなきゃ……！」"
translation = "「더욱더 멋진 신곡을 내서, 팬인 오빠들에게 『우타이테 버튜버』로서 인지받아야지……!」"

[[dialogue]]
speaker = "unk"
original = "……そうだな。これからも頑張ろう"
translation = "……그렇네. 앞으로도 힘내자"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……ん？\u3000お兄ちゃん、何だかちょっぴり複雑そうな顔してるね？」"
translation = "「……응? 오빠, 왠지 조금 복잡한 표정을 짓고 있네?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、もしかして歌動画、何かまずいところでもあったかな……？」"
translation = "「아, 혹시 노래 영상, 어디 안 좋은 부분이라도 있었어……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……歌に不満はないの？\u3000え、だったらどうして？」"
translation = "「……노래에 불만은 없어? 에, 그럼 왜?」"

[[dialogue]]
speaker = "unk"
original = "ルルカのファンって男が多いだろ？"
translation = "루루카의 팬은 남자가 많잖아?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん、そうだね。女性Ｖチューバーはどうしても男性ファンの割合が多くなっちゃうから──って、えっ！？」"
translation = "「응, 그렇지. 여성 버튜버는 아무래도 남성 팬 비율이 많아지게 되니까── 어, 엣!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「も、もしかしてー。お兄ちゃん、し、嫉妬してくれちゃってたり……！？」"
translation = "「호, 혹시이-. 오빠, 지, 질투해주고 있는 거야……!?」"

[[dialogue]]
speaker = "unk"
original = "そりゃするよ。好きな子がモテてたら"
translation = "당연히 하지. 좋아하는 애가 인기 많으면"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うぅ～っ……<emoji=heart04>\u3000え、えー、何この気持ち。お兄ちゃんには悪いかもだけど、ちょっぴり嬉しいかも……」"
translation = "「우으~……<emoji=heart04> 에, 에-, 뭐야 이 기분. 오빠한테는 미안할지도 모르지만, 조금 기쁠지도……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……って、ご、ごめんね？\u3000真面目な話してる時ににやにやしちゃって」"
translation = "「……아니, 미, 미안해? 진지한 얘기 하고 있을 때 싱글벙글 웃어버려서」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんに嫉妬されるだなんて考えたこともなかったから、ちょっとびっくりしちゃったの」"
translation = "「오빠가 질투할 거라곤 생각도 못 해봐서, 조금 놀라버렸어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えーっと……今なら誰も見てない、よね……？」"
translation = "「음…… 지금이라면 아무도 안 보고, 있겠지……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん──ちゅっ<emoji=heart04>」"
translation = "「응── 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへ。あたしにはお兄ちゃんもお姉ちゃんもいっぱいいるけど、キスしたいって思うのは、目の前のお兄ちゃんだけだよ？」"
translation = "「에헤. 나한테는 오빠도 언니도 많이 있지만, 키스하고 싶다고 생각하는 건 눈앞의 오빠뿐이야?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だから安心してね。てゆーか、あたしの方から告白したんだから、そんなこと心配しなくてもいいのに」"
translation = "「그러니까 안심해. 그보다, 내가 먼저 고백했으니까 그런 거 걱정하지 않아도 되는데」"

[[dialogue]]
speaker = "unk"
original = "……嫉妬しちゃってごめんな"
translation = "……질투해서 미안해"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ううん。優しいお兄ちゃんも好きだけど、そうやって独占欲を出してくれるところも新鮮で嬉しかったよ～♪」"
translation = "「으응. 다정한 오빠도 좋지만, 그렇게 독점욕을 보여주는 부분도 신선해서 기뻤어~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それに嫉妬してたの、あたしだけじゃなかったんだ～ってわかったし」"
translation = "「게다가 질투하고 있었던 게 나뿐만이 아니었구나~ 라는 걸 알게 됐고」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えー……！\u3000もしかして気づいてないの！？\u3000星徒会のみんな、美人さんばっかりでしょっ」"
translation = "「에-……! 혹시 눈치 못 챈 거야!? 성도회 멤버들, 미인들뿐이잖아」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「嫉妬しちゃうのはお兄ちゃんだけじゃないんですよー、だ」"
translation = "「질투하는 건 오빠뿐만이 아니거든요~, 메롱」"

[[dialogue]]
speaker = "unk"
original = "ここ最近、ルカルカの登録者数がすごく伸びて、男性フォロワーのコメントを見るたびにもやもやしていた気持ちがなくなっていった。"
translation = "요 근래 루카루카의 구독자 수가 크게 늘어서, 남성 팔로워들의 댓글을 볼 때마다 답답했던 마음이 사라져 갔다."

[[dialogue]]
speaker = "unk"
original = "そうか。ルルカも俺と同じ気持ちだったんだな──"
translation = "그렇구나. 루루카도 나와 같은 마음이었던 거구나──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長。それにルルカさん、こんにちは」"
translation = "「회장님. 그리고 루루카 씨, 안녕하세요」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、アナちゃん。やっほー。カフェに来たってことは……」"
translation = "「아, 아나 짱. 안녕. 카페에 왔다는 건……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。今お２人が食べられている和風ケーキセットが目的です。九浄家メイド隊の方々が粋を凝らして作った一品だそうで、楽しみです」"
translation = "「네. 지금 두 분이 드시고 계시는 일본풍 케이크 세트가 목적입니다. 쿠죠 가문의 메이드 부대 분들이 정성을 다해 만든 일품이라고 해서 기대 중입니다」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「すっごくおいしいよ～♪\u3000コーヒーよりは紅茶が合うかな？」"
translation = "「정말 맛있어~♪ 커피보다는 홍차가 어울리려나?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですか。ありがとうございます」"
translation = "「그렇습니까. 감사합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ……ところでなんですが、お２人とも」"
translation = "「아…… 그런데 말입니다만, 두 분 다」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なあに？」"
translation = "「왜?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「公共の場でイチャイチャするのは慎んだ方がいいと思います」"
translation = "「공공장소에서 꽁냥거리는 건 삼가시는 게 좋다고 생각합니다」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え゛っ！？」"
translation = "「에엑!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルルカさん、周りを見渡していたようですが確認が甘いです。普通に私からは見えていました」"
translation = "「루루카 씨, 주변을 둘러보신 것 같습니다만 확인이 허술합니다. 평범하게 제 위치에선 보였습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まぁお２人は恋人同士なので、ある程度は良いと思いますが──」"
translation = "「뭐, 두 분은 연인 사이니까 어느 정도는 괜찮다고 생각합니다만──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、あわわわっ──はずかし～っ！」"
translation = "「아, 아와와왓── 부끄러워~!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「節度を持って交際を──あ、行ってしまいました」"
translation = "「절도를 가지고 교제를── 아, 가버리셨네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長。すみません、デートの邪魔をしてしまったようです」"
translation = "「회장님. 죄송합니다, 데이트를 방해해버린 모양이네요」"

[[dialogue]]
speaker = "unk"
original = "謝るアナにフォローを入れてから、俺はルルカを追いかけるのだった……"
translation = "사과하는 아나를 다독여 주고 나서, 나는 루루카를 뒤쫓아갔다……"

