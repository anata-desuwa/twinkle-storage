[[dialogue]]
speaker = "unk"
original = "八卦鏡の反応に従い、辿り着いた先は、演劇部の部室だった。"
translation = "팔괘경의 반응에 따라 도착한 곳은, 연극부의 부실이었다."

[[dialogue]]
speaker = "藍"
original = "「きゃあっ！\u3000ごめんなさいっ、こっちに来ないでください～っ！」"
translation = "「꺄악! 죄송해요, 이쪽으로 오지 마세요~!」"

[[dialogue]]
speaker = "メイプル"
original = "「何なのこいつら！\u3000ぴょんぴょんしながらこっちに向かってくるよ～！」"
translation = "「뭐야 이 녀석들! 뿅뿅거리면서 이쪽으로 오고 있어~!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「見つけた！\u3000ゾンビ型幽霊！」"
translation = "「찾았다! 좀비형 유령!」"

[[dialogue]]
speaker = "トリシャ"
original = "「これが冥界の邪霊……映画の通りの奇っ怪な動きですね……」"
translation = "「이것이 명계의 사령…… 영화 그대로의 기괴한 움직임이네요……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「すばしっこいから気をつけるゆ！」"
translation = "「재빠르니까 조심하유!」"

[[dialogue]]
speaker = "unk"
original = "こっちに逃げて！"
translation = "이쪽으로 도망쳐!"

[[dialogue]]
speaker = "unk"
original = "２人とも大丈夫！？"
translation = "둘 다 괜찮아!?"

[[dialogue]]
speaker = "藍"
original = "「会長さん！？\u3000わかりました、すぐそちらにっ」"
translation = "「회장님!? 알겠습니다, 금방 그쪽으로.」"

[[dialogue]]
speaker = "メイプル"
original = "「いいところに来たよ、お兄ちゃんっ。もう、こいつなんなの～？」"
translation = "「좋은 때에 왔어, 오빠. 정말, 이 녀석 뭐야~?」"

[[dialogue]]
speaker = "unk"
original = "直接的な害はないから大丈夫"
translation = "직접적인 해는 없으니까 괜찮아."

[[dialogue]]
speaker = "unk"
original = "ゾンビ型幽霊だよ"
translation = "좀비형 유령이야."

[[dialogue]]
speaker = "メイプル"
original = "「全然大丈夫じゃないってば！」"
translation = "「전혀 안 괜찮다니까!」"

[[dialogue]]
speaker = "藍"
original = "「ずっとジャンプしながら移動していますね。どうしてあんなにぴょんぴょんしているんでしょうか？」"
translation = "「계속 점프하면서 이동하고 있네요. 어째서 저렇게 뿅뿅거리고 있는 걸까요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そういうものだからゆ♪」"
translation = "「원래 그런 거유♪」"

[[dialogue]]
speaker = "メイプル"
original = "「このまま放置されても困るんだけど……これどうするつもり？」"
translation = "「이대로 방치되는 것도 곤란한데…… 이거 어떻게 할 생각이야?」"

[[dialogue]]
speaker = "unk"
original = "専門家の出番だよ"
translation = "전문가가 나설 차례야."

[[dialogue]]
speaker = "unk"
original = "ミルフィーとトリシャさんに任せよう"
translation = "밀피와 트리샤 씨에게 맡기자."

[[dialogue]]
speaker = "ミルフィー"
original = "「任せてください！\u3000いきますよっ！」"
translation = "「맡겨주세요! 갑니다!」"

[[dialogue]]
speaker = "トリシャ"
original = "「速度はミルフィーさんの方が上……ですが、あの跳躍は御しがたい……」"
translation = "「속도는 밀피 씨가 위…… 하지만, 저 도약은 다루기 어렵네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「結界を張りましょう……この部屋からは逃がしません……」"
translation = "「결계를 치죠…… 이 방에서는 놓치지 않겠습니다……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ありがとう、トリシャさん！\u3000これで心置きなく捕まえられるよ！」"
translation = "「고마워요, 트리샤 씨! 이걸로 마음 놓고 잡을 수 있겠어!」"

[[dialogue]]
speaker = "トリシャ"
original = "「結界だけではありません。ミルフィーさんのオトモとして……役に立ってみせましょう……」"
translation = "「결계뿐만이 아닙니다. 밀피 씨의 동료로서…… 도움이 되어 보이죠……」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん、ぴょーん……」"
translation = "「뿅, 뿅, 뿅……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「すごいすごいすごい！\u3000トリシャもぴょんぴょんしてるゆ～♪」"
translation = "「대단해 대단해 대단해! 트리샤도 뿅뿅거리고 있유~♪」"

[[dialogue]]
speaker = "unk"
original = "ぴょんぴょんに何の意味が……"
translation = "뿅뿅거리는 게 무슨 의미가……."

[[dialogue]]
speaker = "unk"
original = "いったいどういうこと？"
translation = "도대체 어떻게 된 거야?"

[[dialogue]]
speaker = "メイプル"
original = "「よくわからないけど、あのおばけと同じ動きだね」"
translation = "「잘 모르겠지만, 저 귀신이랑 똑같은 움직임이네.」"

[[dialogue]]
speaker = "藍"
original = "「リズムを……合わせているんでしょうか……？」"
translation = "「리듬을…… 맞추고 있는 걸까요……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん、ぴょーん……フフ、そこです」"
translation = "「뿅, 뿅, 뿅…… 후후, 거기입니다.」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「トリシャの攻撃がヒットしたゆ！」"
translation = "「트리샤의 공격이 히트했유!」"

[[dialogue]]
speaker = "メイプル"
original = "「えーと……ぴょんぴょんすることで攻撃が当たりやすくなるの？」"
translation = "「저기…… 뿅뿅거림으로써 공격이 맞기 쉬워지는 거야?」"

[[dialogue]]
speaker = "藍"
original = "「そういうわけでもないような……」"
translation = "「그런 건 아닌 것 같은데……」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん、ぴょーん……随分とトリッキーな動きですが、コツが掴めてきました……」"
translation = "「뿅, 뿅, 뿅…… 상당히 트리키한 움직임입니다만, 요령을 터득했습니다……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「トリシャさん、そっち行ったよ！」"
translation = "「트리샤 씨, 그쪽으로 갔어!」"

[[dialogue]]
speaker = "トリシャ"
original = "「お任せください……それっ、それっ……」"
translation = "「맡겨주세요…… 이얍, 이얍……」"

[[dialogue]]
speaker = "unk"
original = "（たゆんたゆんしすぎでは？）"
translation = "(너무 출렁출렁하는 거 아냐?)"

[[dialogue]]
speaker = "unk"
original = "（でも、あんなにぴょんぴょんされると……）"
translation = "(하지만, 저렇게 뿅뿅거리면……)"

[[dialogue]]
speaker = "メイプル"
original = "「……ねえお兄ちゃん、どこ見てるの？」"
translation = "「……저기 오빠, 어디 보고 있어?」"

[[dialogue]]
speaker = "藍"
original = "「もしかして……そうですよね、かなり大きいですし……」"
translation = "「설마…… 그렇겠죠, 상당히 크니까요……」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんがぼいんぼいんのおっぱい見てる～！\u3000いーけないんだー！」"
translation = "「오빠가 출렁출렁한 가슴 보고 있다~! 안 되는 건데~!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「か、会長くん！\u3000真面目に戦ってるんだからエッチな目で見ないで！」"
translation = "「회, 회장군! 진지하게 싸우고 있으니까 야한 눈으로 보지 마!」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ、私も人間界に来て学びました。男性は女性の大きな胸に目を奪われるものなのです……」"
translation = "「후후, 저도 인간계에 와서 배웠습니다. 남성은 여성의 큰 가슴에 눈을 빼앗기는 법이죠……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「他人事みたいに言ってるけど、トリシャさんのことだよ！\u3000ぴょんぴょんでぽよんぽよんなんだからっ」"
translation = "「남 일처럼 말하고 있지만, 트리샤 씨 이야기라고요! 뿅뿅거려서 출렁출렁하니까앗!」"

[[dialogue]]
speaker = "メイプル"
original = "「うーん、どっちもどっちな気がするけど……部長はどう思う？」"
translation = "「으음, 둘 다 도긴개긴인 것 같은데…… 부장은 어떻게 생각해?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「うむ、そうだな」"
translation = "「음, 그렇군.」"

[[dialogue]]
speaker = "藍"
original = "「部長！？\u3000いつのまに……」"
translation = "「부장!? 어느 틈에……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ついさっき来たところだ。留守にして済まなかったね」"
translation = "「방금 막 온 참이다. 자리를 비워서 미안하군.」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「しかし、これは甲乙つけがたいな。会長の熱い視線はどちらの胸にも注がれていたぞ」"
translation = "「하지만, 이건 우열을 가리기 힘들군. 회장의 뜨거운 시선은 양쪽 가슴 모두에 쏟아지고 있었다고.」"

[[dialogue]]
speaker = "メイプル"
original = "「だってさー！\u3000２人とも頑張れー！」"
translation = "「그렇대~! 둘 다 힘내~!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そそそ、それってつまり……会長くんが私のお、お、おっぱ……胸を見て……？\u3000そんなの困るよぉ」"
translation = "「그그그, 그건 즉…… 회장군이 내 가, 가, 가스…… 가슴을 보고……? 그런 건 곤란해애.」"

[[dialogue]]
speaker = "トリシャ"
original = "「この戦闘スタイルはぴょんぴょんしないと駄目なので……どうしようもありませんね……」"
translation = "「이 전투 스타일은 뿅뿅거리지 않으면 안 되기 때문에…… 어쩔 도리가 없네요……」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「２人ともさっきまでのキレキレな動きはどうした！\u3000このままではやられてしまうぞ！」"
translation = "「둘 다 아까까지의 날카로운 움직임은 어디 갔나! 이대로라면 당하고 말 것이다!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そんなこと言われてもっ……」"
translation = "「그런 말을 들어도오……!」"

[[dialogue]]
speaker = "メイプル"
original = "「あ、それじゃお兄ちゃんのこと目隠ししてあげる～♪\u3000藍も手伝って」"
translation = "「아, 그럼 오빠 눈을 가려줄게~♪ 아이도 도와줘.」"

[[dialogue]]
speaker = "藍"
original = "「は、はいっ。目隠しですね……よいしょっ」"
translation = "「네, 넷. 눈가리개군요…… 영차.」"

[[dialogue]]
speaker = "unk"
original = "わわっ！？"
translation = "와왓!?"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「会長が２人のオンナに抱きつかれてるゆ～♪」"
translation = "「회장이 여자 두 명한테 안겨 있구유~♪」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ええっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "メイプル"
original = "「とにかく！\u3000こっちのことはいいから、今のうちにやっちゃって！」"
translation = "「아무튼! 이쪽은 괜찮으니까, 지금 기회에 해치워버려!」"

[[dialogue]]
speaker = "トリシャ"
original = "「了解です……さあ、ミルフィーさん、一気に片付けてしまいましょう……」"
translation = "「알겠습니다…… 자, 밀피 씨, 단숨에 정리해 버리죠……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うううっ、仕方ないのはわかるけど……なんか釈然としないって言うか……」"
translation = "「으으으, 어쩔 수 없다는 건 알지만…… 뭔가 석연치 않다고 해야 하나……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「会長くんのばかぁ～～～っ！！」"
translation = "「회장군 바보오오오~~~!!」"

[[dialogue]]
speaker = "unk"
original = "こうして、不名誉な扱いと引き換えに、ゾンビ型幽霊の撃破に成功するのだった。"
translation = "이렇게, 불명예스러운 취급과 맞바꿔 좀비형 유령 격퇴에 성공하는 것이었다."

