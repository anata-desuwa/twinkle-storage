[[dialogue]]
speaker = "unk"
original = "セシアをヴィーナスから紹介された後、俺たちは大聖堂カフェテリアに移動して、お茶しながら作戦会議をすることになった。"
translation = "세시아를 비너스에게 소개받은 후, 우리들은 대성당 카페테리아로 이동해서 차를 마시며 작전 회의를 하기로 했다."

[[dialogue]]
speaker = "セシア"
original = "「紅明ママ、ここでクリスマスパーティーが開催されるのね♪\u3000生徒たちが飾り付けを進めているのが見えるわ」"
translation = "「코우메이 마마, 여기서 크리스마스 파티가 개최되는구나♪ 학생들이 장식하는 게 보여」"

[[dialogue]]
speaker = "紅明"
original = "「そうそう。去年も参加したけど、新星学園に流星学園、それに附属校の子達も集まって、すごく賑やかになるんだぜ☆」"
translation = "「맞아 맞아. 작년에도 참가했는데 신성학원에 유성학원, 게다가 부속교 아이들까지 모여서 엄청 북적거린다구☆」"

[[dialogue]]
speaker = "セシア"
original = "「そうなのね。セシア、とっても楽しみだわ♪」"
translation = "「그렇구나. 세시아, 정말 기대돼♪」"

[[dialogue]]
speaker = "unk"
original = "気になってたことがあるんだけど"
translation = "「궁금했던 게 있는데」"

[[dialogue]]
speaker = "セシア"
original = "「あら？\u3000会長、どうしたの？」"
translation = "「어라? 회장, 왜 그래?」"

[[dialogue]]
speaker = "セシア"
original = "「――わたくしが流星学園附属校の制服を着ているのはどうしてかって？\u3000それは、ヴィーナスが用意してくれたのよ」"
translation = "「――내가 유성학원 부속교 교복을 입고 있는 게 왜냐고? 그건 비너스가 준비해 준 거야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「先週末にセシアを拾ったばかりで、屋敷の中で合うサイズの服を探してたら、<b>あの人</b>が持ってきたのよ」"
translation = "「지난 주말에 세시아를 막 주웠을 때 저택 안에서 맞는 사이즈의 옷을 찾고 있었더니 <b>그</b> <b>사람</b>이 가져왔어」"

[[dialogue]]
speaker = "unk"
original = "それって、九浄家のご当主様？"
translation = "「그거 쿠죠 가문의 당주님?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう。おそらく、セシアが可愛いから着せたかっただけって気がするわ。はしゃいで、写真撮りまくってたし」"
translation = "「맞아. 아마 세시아가 귀여우니까 입히고 싶었을 뿐인 것 같아. 신나서 사진 엄청 찍어댔거든」"

[[dialogue]]
speaker = "紅明"
original = "「あはははっ♪\u3000相変わらず、面白い人だな～！\u3000でも、確かにセッシーに似合ってるっしょ、附属校の制服♪」"
translation = "「아하하하핫♪ 여전히 재미있는 사람이네~! 하지만 확실히 세시한테 잘 어울린다구, 부속교 교복♪」"

[[dialogue]]
speaker = "セシア"
original = "「うんっ、セシアも気に入ってるの♪\u3000附属校にも興味を持って、今度見学させてもらう予定なのよ」"
translation = "「응, 세시아도 마음에 들어♪ 부속교에도 흥미가 생겨서 이번에 견학 가볼 예정이야」"

[[dialogue]]
speaker = "紅明"
original = "「おっ、いいじゃん☆\u3000面白そうだし、アタシも一緒に見学付いて行こっかな～」"
translation = "「오, 좋잖아☆ 재미있어 보이니까 나도 같이 견학 따라갈까나~」"

[[dialogue]]
speaker = "セシア"
original = "「本当？\u3000セシア、紅明ママと一緒に見学できるなら、嬉しいわ♪」"
translation = "「정말? 세시아, 코우메이 마마랑 같이 견학할 수 있다면 기뻐♪」"

[[dialogue]]
speaker = "紅明"
original = "「そっか♪\u3000じゃあ、約束ね☆\u3000セッシー、指切りげんまんって知ってる？」"
translation = "「그렇구나♪ 그럼 약속이다☆ 세시, 손가락 걸고 약속하는 거 알아?」"

[[dialogue]]
speaker = "セシア"
original = "「指切りげんまん？\u3000教えて欲しいわ」"
translation = "「손가락 걸고 약속? 가르쳐 줬으면 좋겠어」"

[[dialogue]]
speaker = "unk"
original = "そんな風にしばらく談笑を続けて、飲み物でひと息ついた後――"
translation = "그렇게 한동안 담소를 나누고 음료로 한숨 돌린 후――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃあ、そろそろサンタ大作戦の話に戻りましょうか」"
translation = "「그러면 슬슬 산타 대작전 이야기로 돌아갈까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「星徒会室でも言ったけど、クロトにはセシアのプレゼント配りを手伝ってあげて欲しいの」"
translation = "「성도회실에서도 말했지만, 쿠로토는 세시아의 선물 배달을 도와줬으면 해」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトは学園問わず、交流関係が広いでしょう？\u3000だから、プレゼントを配るついでに、セシアをみんなに紹介してあげて欲しいのよ」"
translation = "「쿠로토는 학원을 불문하고 교우 관계가 넓잖아? 그러니까 선물 배달하는 김에 세시아를 모두에게 소개했으면 좋겠어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「紅明も同じく友人関係が広いから、協力してくれると助かるわ」"
translation = "「코우메이도 마찬가지로 친구 관계가 넓으니까 협력해 주면 도움이 될 거야」"

[[dialogue]]
speaker = "紅明"
original = "「なるほど、そういうことなら任されたっしょ☆\u3000セッシーは可愛いから、紹介したらみんな、すぐにメロメロになっちゃうと思うぜ？」"
translation = "「과연, 그런 일이라면 맡겨달라구☆ 세시는 귀여우니까 소개하면 다들 금방 헤벌레해질걸?」"

[[dialogue]]
speaker = "unk"
original = "クリスマスパーティーの準備はどうしよっか"
translation = "「크리스마스 파티 준비는 어떡하지」"

[[dialogue]]
speaker = "紅明"
original = "「あ～、そういえば、ダーリンたち星徒会メンバーのみんなはクリスマスパーティーの準備もしなくちゃいけないんだっけ。忙しいよね」"
translation = "「아~ 그러고 보니 달링들 성도회 멤버들은 크리스마스 파티 준비도 해야 한다고 했지. 바쁘겠네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうなのよ。だから今回、サンタ大作戦についてはクロトと紅明に一任したいと思ってるの。その代わり、私はクリスマスパーティーの準備の方を頑張るわ」"
translation = "「그렇다니까. 그래서 이번에 산타 대작전에 대해서는 쿠로토와 코우메이에게 일임하고 싶어. 그 대신 나는 크리스마스 파티 준비 쪽을 열심히 할게」"

[[dialogue]]
speaker = "紅明"
original = "「それだと、ヴィナちーはサンタ大作戦に参加できないってことか。ちょっと残念だぜ」"
translation = "「그러면 비나치는 산타 대작전에 참가 못 한다는 건가. 좀 아쉽다구」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クリスマスパーティーとセシアのこと、両方成功させる為にどうするのがいいかって考えたら、この方法が１番だと思ったのよ」"
translation = "「크리스마스 파티와 세시아 일, 양쪽 다 성공시키려면 어떻게 하는 게 좋을까 생각했더니 이 방법이 제일이라고 생각했어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトならセシアを安心して任せられる。だってクロトは――」"
translation = "「쿠로토라면 세시아를 안심하고 맡길 수 있어. 왜냐하면 쿠로토는――」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私が信じて会長の役目を任せた、いつか最強で最高の魔王になる男だもの！」"
translation = "「내가 믿고 회장 임무를 맡긴, 언젠가 최강이자 최고의 마왕이 될 남자니까!」"

[[dialogue]]
speaker = "紅明"
original = "「ヒュ～♪\u3000ヴィナちー、言うねぇ。ちょっと妬けちゃうぜ☆」"
translation = "「휘~이♪ 비나치, 한마디 하네. 좀 질투 난다구☆」"

[[dialogue]]
speaker = "セシア"
original = "「ヴィーナスにとって、会長がママのような存在ということね。わたくし、会長に少し興味が湧いてきたのだわ」"
translation = "「비너스에게 있어서 회장이 마마 같은 존재라는 거네. 나, 회장에게 조금 흥미가 생겼어」"

[[dialogue]]
speaker = "unk"
original = "そこまで言われたら、俺も頑張らないとな"
translation = "「그렇게까지 말한다면 나도 열심히 해야겠네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うんっ、頼りにしているわ、クロト♪」"
translation = "「응, 기대하고 있을게, 쿠로토♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、私が参加できない代わりに、あともう１人くらい人手があってもいいと思うのよね――」"
translation = "「하지만 내가 참가 못 하는 대신에 한 명 정도 일손이 더 있어도 좋을 것 같단 말이지――」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ、ヴィーナスお嬢様、会長、お疲れ様です」"
translation = "「앗, 비너스 아가씨, 회장님, 수고 많으세요」"

[[dialogue]]
speaker = "ヨミ"
original = "「セシアちゃんに、紅明先輩も。皆さんで集まって、なにかお話されてたんですか？」"
translation = "「세시아 짱에 코우메이 선배도. 다들 모여서 무슨 이야기 하셨나요?」"

[[dialogue]]
speaker = "紅明"
original = "「おっ、ヨミヨミ～♪\u3000任務管轄係の仕事中かい？\u3000今日も可愛いね～！\u3000挨拶ついでに尻尾をモフモフさせてくれまいか♪」"
translation = "「오, 요미요미~♪ 임무 관할계 업무 중이야? 오늘도 귀엽네~! 인사 대신에 꼬리 좀 몽글몽글하게 만지게 해주지 않으련♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「ダメです！\u3000というか、ヨミヨミ言わないで下さいっ」"
translation = "「안 돼요! 그보다 요미요미라고 부르지 말아 주세요」"

[[dialogue]]
speaker = "unk"
original = "彼女の名前は、<ruby>天ヶ崎<rt>あまがさき</rt></ruby>ヨミ。九浄家メイド隊の一員であり、魔界にあるという３０００年の歴史を持つ天ヶ崎神宮の巫女でもある。"
translation = "그녀의 이름은 아마가사키 요미. 쿠죠 가문 메이드대의 일원이며, 마계에 있다는 3000년 역사를 가진 아마가사키 신궁의 무녀이기도 하다."

[[dialogue]]
speaker = "unk"
original = "大聖堂カフェテリアで運営している任務管轄係の仕事を任されており、その名の通りリクリエに関する任務が発生した際のオペレーター業務や、受発注を担当してくれている。"
translation = "대성당 카페테리아에서 운영하는 임무 관할계 업무를 맡고 있으며, 그 이름대로 리크리에에 관한 임무가 발생했을 때의 오퍼레이터 업무나 수발주를 담당해 주고 있다."

[[dialogue]]
speaker = "unk"
original = "ヨミヨミ、仕事お疲れ様"
translation = "「요미요미, 일하느라 수고 많아」"

[[dialogue]]
speaker = "セシア"
original = "「ヨミヨミ、わたくしも尻尾触っていいかしら？\u3000ヨミヨミの尻尾は柔らかいし、毛並みもよくて、とても触り心地がいいのよね」"
translation = "「요미요미, 나도 꼬리 만져봐도 될까? 요미요미의 꼬리는 부드럽고 털도 고와서 아주 만지는 느낌이 좋거든」"

[[dialogue]]
speaker = "ヨミ"
original = "「ほら、紅明先輩がヨミヨミ、ヨミヨミっていつも呼ぶから！\u3000それがお嬢様から会長、セシアちゃんにまで、どんどん伝染していっちゃってるじゃないですかっ！」"
translation = "「봐요, 코우메이 선배가 요미요미, 요미요미 하고 맨날 부르니까! 그게 아가씨에서 회장님, 세시아 짱한테까지 점점 전염되고 있잖아요!」"

[[dialogue]]
speaker = "セシア"
original = "「ヨミヨミ、可愛い呼び方だと思うわよ？」"
translation = "「요미요미, 귀여운 호칭이라고 생각하는데?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね、うん！\u3000ヨミヨミがいいわ！」"
translation = "「그러게, 응! 요미요미가 좋겠어!」"

[[dialogue]]
speaker = "ヨミ"
original = "「もう、お嬢様まで！\u3000よくないですから！」"
translation = "「정말, 아가씨까지! 안 좋다니까요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いや、呼び方の話じゃなくて。主人として指令を出すわ！\u3000ヨミヨミもセシアのプレゼント配りを手伝いなさい！」"
translation = "「아니, 호칭 이야기가 아니라 주인으로서 지령을 내리겠어! 요미요미도 세시아의 선물 배달을 도와!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こや？\u3000えっと……どういうことですか？」"
translation = "「코야? 에…… 그게 무슨 말씀이세요?」"

[[dialogue]]
speaker = "unk"
original = "突然の指名に、目をぱちくりさせるヨミであった――"
translation = "갑작스러운 지명에 눈을 동그랗게 뜨는 요미였다――"

