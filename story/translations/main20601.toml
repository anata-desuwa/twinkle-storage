[[dialogue]]
speaker = "unk"
original = "第１話,見知らぬ世界,B"
translation = "제1화, 낯선 세계"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ビル群を見上げたまま、２人とも呆然としてしまう。"
translation = "빌딩 숲을 올려다본 채, 두 사람 모두 망연자실하고 만다."

[[dialogue]]
speaker = "unk"
original = "チナとの激戦の後だが、体の痛みすら忘れる衝撃だ。"
translation = "치나와의 격전 직후였지만, 몸의 통증조차 잊을 정도의 충격이다."

[[dialogue]]
speaker = "クロト"
original = "（ここは……どこだ？）"
translation = "(여기는…… 어디지?)"

[[dialogue]]
speaker = "クロト"
original = "（俺たちは、平行世界を渡る装置によってできた時空の穴に吸い込まれてしまった……ならここは……）"
translation = "(우리들은, 평행세계를 건너는 장치에 의해 생긴 시공의 구멍에 빨려 들어가 버렸어…… 그렇다면 여기는……)"

[[dialogue]]
speaker = "unk"
original = "向こうにフィーニスの塔が見えるから、流星市国には違いないだろう。"
translation = "저편에 피니스의 탑이 보이니, 유성시국임에는 틀림없을 것이다."

[[dialogue]]
speaker = "unk"
original = "だがこの街並みは俺たちの記憶にないものだ。"
translation = "하지만 이 거리의 풍경은 우리들의 기억에 없는 것이다."

[[dialogue]]
speaker = "クロト"
original = "（つまりここは平行世界？\u3000だがベガはすでに崩壊しているはず。ならここは──）"
translation = "(즉 여기는 평행세계? 하지만 베가는 이미 붕괴했을 터. 그렇다면 여기는──)"

[[dialogue]]
speaker = "クロト"
original = "「デネブなのか？」"
translation = "「데네브인 건가?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ここが……デネブ……私の故郷……」"
translation = "「여기가…… 데네브…… 나의 고향……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「イメージと違うわ！」"
translation = "「이미지랑 달라!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「バカでかいビルばっかりだし、ノスタルジーとか温かみが感じられないわね」"
translation = "「무지막지하게 큰 빌딩뿐이고, 노스탤지어나 따스함이 느껴지지 않네」"

[[dialogue]]
speaker = "クロト"
original = "「それは俺に言われても困る……」"
translation = "「그걸 나한테 말해도 곤란해……」"

[[dialogue]]
speaker = "unk"
original = "まさかこのビルたちも、そんな方向からクレームを受けるとは思わなかっただろう。"
translation = "설마 이 빌딩들도, 그런 방향에서 클레임을 받을 줄은 몰랐을 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王の力なら平行世界を超えられるのよね？\u3000クロトの力でアルタイルに戻れたりしない？」"
translation = "「마왕의 힘이라면 평행세계를 넘을 수 있는 거지? 쿠로토의 힘으로 알타이르로 돌아갈 수 없을까?」"

[[dialogue]]
speaker = "クロト"
original = "「魔王の力が完全に使えればあるいは……でも少なくとも今の俺には無理だ。ごめん」"
translation = "「마왕의 힘을 완전히 사용할 수 있다면 어쩌면…… 하지만 적어도 지금의 나로선 무리야. 미안.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ううん、謝ることじゃないわ。できないならできないで別の方法を探しましょ」"
translation = "「으응, 사과할 일이 아니야. 안 된다면 안 되는 대로 다른 방법을 찾아보자」"

[[dialogue]]
speaker = "unk"
original = "世界を超えるラクシスの力だが、俺は自由に平行世界を渡れるほど使いこなせていない。"
translation = "세계를 넘는 락시스의 힘이지만, 나는 자유롭게 평행세계를 건널 수 있을 정도로 숙달되지 않았다."

[[dialogue]]
speaker = "unk"
original = "それに無理に力を引き出そうとすれば、また暴走してしまうだろう。"
translation = "게다가 억지로 힘을 끌어내려 하면, 또 폭주해 버리고 말 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィオナや選挙管理委員会のみんなは……いないわね。多分一緒に穴に呑まれたと思うんだけど……」"
translation = "「피오나나 선거관리위원회 애들은…… 없네. 아마 같이 구멍에 삼켜졌을 거라 생각하는데……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、近くにいるといいんだが……」"
translation = "「아아, 근처에 있으면 좋으련만……」"

[[dialogue]]
speaker = "クロト"
original = "「ＤＩＳＣは……ダメだ、壊れてるな」"
translation = "「DISC는…… 안 되겠어, 부서졌군.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私のも故障してるわ。連絡は取れそうにないわね」"
translation = "「내 것도 고장 났어. 연락은 취할 수 없을 것 같네」"

[[dialogue]]
speaker = "クロト"
original = "「ここがデネブなら、極星学園の襲撃を受ける可能性がある。早く合流しないと……」"
translation = "「여기가 데네브라면, 극성학원의 습격을 받을 가능성이 있어. 빨리 합류하지 않으면……」"

[[dialogue]]
speaker = "クロト"
original = "「……まぁ、ここがデネブってのはまだ推測に過ぎないんだけど」"
translation = "「……뭐, 여기가 데네브라는 건 아직 추측에 불과하지만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うーん、それもそうね。確かめる方法はないかしら……」"
translation = "「으음, 그것도 그렇네. 확인할 방법은 없을까……」"

[[dialogue]]
speaker = "通行人Ａ"
original = "「ねぇ、もしかしてあれって新星学園の制服？\u3000ずいぶん前に見たきりだったから、よく覚えてないんだけど」"
translation = "「저기, 혹시 저거 신성학원의 교복? 아주 오래전에 본 게 마지막이라, 잘 기억나지는 않지만.」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「どれどれ……あ、ほんとね。赤い目立つ制服だったから覚えてるわ。コスプレでもしてるのかしら？」"
translation = "「어디 어디…… 아, 정말이네. 붉고 눈에 띄는 교복이라 기억하고 있어. 코스프레라도 하고 있는 걸까?」"

[[dialogue]]
speaker = "unk"
original = "お昼の休憩なのか、オフィスカジュアルの女性たちがこちらを怪訝そうに眺めながらヒソヒソ話している。"
translation = "점심 휴식 시간인지, 오피스 캐주얼 차림의 여성들이 이쪽을 의아한 듯 바라보며 소곤소곤 이야기하고 있다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、こっち見てる人がいるわ、ちょっと聞いてみましょう！\u3000──すみませーん！\u3000ここってデネブですかー！」"
translation = "「아, 이쪽을 보고 있는 사람이 있어, 좀 물어보자! ──저기요! 여기가 데네브인가요!」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス！？」"
translation = "「비너스!?」"

[[dialogue]]
speaker = "unk"
original = "引き留める間もなく、ヴィーナスが持ち前の行動力で突進する。"
translation = "말릴 틈도 없이, 비너스가 특유의 행동력으로 돌진한다."

[[dialogue]]
speaker = "unk"
original = "アルタイル、デネブ、ベガの平行世界の存在は、新星学園でも最近まで一部の者しか知らなかった。"
translation = "알타이르, 데네브, 베가의 평행세계의 존재는, 신성학원에서도 최근까지 일부 인원밖에 알지 못했다."

[[dialogue]]
speaker = "unk"
original = "聞いたところで、星騎士でもない一般人では答えられない。"
translation = "물어본들, 성기사도 아닌 일반인으로서는 대답할 수 없다."

[[dialogue]]
speaker = "unk"
original = "そう思ったのだが──"
translation = "그렇게 생각했는데──"

[[dialogue]]
speaker = "通行人Ａ"
original = "「そんなのデネブに決まってるじゃない。ルヴィネ様が仰っていたんだから」"
translation = "「그런 건 데네브인 게 당연하잖아. 루비네 님이 말씀하셨으니까.」"

[[dialogue]]
speaker = "unk"
original = "問われた女性は、むしろ俺たちの非常識に呆れながら答えた。"
translation = "질문을 받은 여성은, 오히려 우리들의 몰상식함에 어이없어하며 대답했다."

[[dialogue]]
speaker = "クロト"
original = "（この世界の人々は、当然のように平行世界を知っているのか？\u3000それに──）"
translation = "(이 세계의 사람들은, 당연하다는 듯이 평행세계를 알고 있는 건가? 게다가──)"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとう、ここはやっぱりデネブなのね。だけどルヴィネって……？」"
translation = "「고마워요, 여기는 역시 데네브였구나. 그런데 루비네라니……?」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「ルヴィネ様のことも知らないの？\u3000あなたたち、本当に流星市国の人？」"
translation = "「루비네 님에 대해서도 몰라? 당신들, 정말 유성시국 사람 맞아?」"

[[dialogue]]
speaker = "クロト"
original = "「すみません、世事に疎い田舎者で。最近まで魔界にいたんです」"
translation = "「죄송합니다, 세상 물정에 어두운 시골뜨기라서요. 최근까지 마계에 있었거든요.」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「あら、あなたたち魔族だったの。なら無理もない……のかしら？」"
translation = "「어머, 당신들 마족이었니. 그럼 그럴 만도…… 한 걸까?」"

[[dialogue]]
speaker = "クロト"
original = "（デネブは敵地だ。不用意に目立つと極星学園に見つかるぞ）"
translation = "(데네브는 적지다. 부주의하게 눈에 띄면 극성학원에 들키고 말아)"

[[dialogue]]
speaker = "ヴィーナス"
original = "（そうだったわね、ナイスフォローよ、クロト）"
translation = "(그랬었지, 나이스 팔로우야, 쿠로토)"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「ルヴィネ様は極星学園の星徒会長よ」"
translation = "「루비네 님은 극성학원의 성도회장이야.」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「十年前、リクリエで世界が滅びそうになった時に現れ、この世界を救った英雄。流星市国……いえ、人間界で知らない人はいないわ」"
translation = "「10년 전, 리크리에로 세계가 멸망할 뻔했을 때 나타나, 이 세계를 구한 영웅. 유성시국…… 아니, 인간계에서 모르는 사람은 없어.」"

[[dialogue]]
speaker = "クロト"
original = "（極星の会長……！）"
translation = "(극성의 회장……!)"

[[dialogue]]
speaker = "unk"
original = "意図せずして、以前から気になっていた人物の情報を得ることができた。"
translation = "의도치 않게, 이전부터 신경 쓰였던 인물의 정보를 얻을 수 있었다."

[[dialogue]]
speaker = "unk"
original = "チナが度々口にしていた存在だが、一般でも知られているのなら、それほど世に浸透しているということなのだろう。"
translation = "치나가 종종 입에 담았던 존재지만, 일반인에게도 알려져 있다면, 그만큼 세상에 침투해 있다는 뜻이리라."

[[dialogue]]
speaker = "通行人Ｂ"
original = "「世界は３つの平行世界──デネブ、アルタイル、ベガに分かれている……なんて聞いた時は驚いたけど、ルヴィネ様が言うなら間違いないわ」"
translation = "「세계는 3개의 평행세계──데네브, 알타이르, 베가로 나뉘어 있다…… 같은 말을 들었을 때는 놀랐지만, 루비네 님이 말씀하신다면 틀림없어.」"

[[dialogue]]
speaker = "通行人Ａ"
original = "「アルタイルはデネブを滅ぼそうとしているらしいけど、ルヴィネ様なら必ず勝ってデネブを守ってくれるよ」"
translation = "「알타이르는 데네브를 멸망시키려 하는 모양이지만, 루비네 님이라면 반드시 이겨서 데네브를 지켜주실 거야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（何よ、デネブの方からアルタイルを滅ぼそうとしたくせに……！\u3000それにルヴィネ様って、わざわざ様付けさせるなんて偉そうなやつだわ）"
translation = "(뭐야, 데네브 쪽에서 알타이르를 멸망시키려 했으면서……! 게다가 루비네 님이라니, 일부러 님 자까지 붙이게 하다니 거만한 녀석이네)"

[[dialogue]]
speaker = "クロト"
original = "（だがルヴィネはこの世界では随分信じられているみたいだ。チナも会長のことを信頼していた。それこそ命を懸けるくらいに）"
translation = "(하지만 루비네는 이 세계에서 상당히 신뢰받고 있는 모양이다. 치나도 회장을 신뢰하고 있었어. 그야말로 목숨을 걸 정도로)"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「でも、あなた……まさか……」"
translation = "「그런데, 당신…… 설마……」"

[[dialogue]]
speaker = "unk"
original = "女性の１人が俺の顔を見て眉をひそめる。"
translation = "여성 중 한 명이 내 얼굴을 보고 눈살을 찌푸린다."

[[dialogue]]
speaker = "unk"
original = "訝しむ表情の中に、決して小さくない不快の色が垣間見えた。"
translation = "의아해하는 표정 속에, 결코 작지 않은 불쾌함의 기색이 엿보였다."

[[dialogue]]
speaker = "クロト"
original = "「俺がどうかしましたか？」"
translation = "「제가 뭐라도 잘못했나요?」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「ひっ……！？\u3000魔王……！？」"
translation = "「히익……!? 마왕……!?」"

[[dialogue]]
speaker = "unk"
original = "俺が話しかけると、悲鳴に近い声を上げる。"
translation = "내가 말을 걸자, 비명에 가까운 소리를 지른다."

[[dialogue]]
speaker = "通行人Ａ"
original = "「魔王クロトがこんなに若いわけないでしょ」"
translation = "「마왕 쿠로토가 이렇게 젊을 리 없잖아.」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「わからないわよ？\u3000魔王なんだから、若返ったのかも」"
translation = "「모르는 일이잖아? 마왕이니까, 젊어진 걸지도.」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「……いえ、そんなわけないわよね。変な声上げてごめんなさい」"
translation = "「……아니, 그럴 리 없겠지. 이상한 소리 내서 미안해요.」"

[[dialogue]]
speaker = "クロト"
original = "「いえ、お気になさらず」"
translation = "「아뇨, 신경 쓰지 마세요.」"

[[dialogue]]
speaker = "クロト"
original = "「ですがすみません。俺たち、魔王についてもよく知らないんですけど……」"
translation = "「하지만 죄송합니다. 저희, 마왕에 대해서도 잘 모르거든요……」"

[[dialogue]]
speaker = "通行人Ｂ"
original = "「魔王クロトはデネブを裏切ってアルタイルにつき、この世界を滅ぼそうとした。……ルヴィネ様がそう仰っていたのよ」"
translation = "「마왕 쿠로토는 데네브를 배신하고 알타이르에 붙어, 이 세계를 멸망시키려 했어. ……루비네 님이 그렇게 말씀하셨거든.」"

[[dialogue]]
speaker = "チナ"
original = "「お前のせいで、アタシの家族は……！」"
translation = "「너 때문에, 내 가족은……!」"

[[dialogue]]
speaker = "チナ"
original = "「お前はアタシたちの世界を破壊した……！\u3000この魔王め……！」"
translation = "「너는 우리들의 세계를 파괴했어……! 이 마왕 놈……!」"

[[dialogue]]
speaker = "unk"
original = "チナと戦った時も、強い敵意をぶつけられた。"
translation = "치나와 싸웠을 때도, 강한 적의를 부딪쳐 왔다."

[[dialogue]]
speaker = "unk"
original = "やはりデネブでは、魔王は邪悪な存在という認識らしい。"
translation = "역시 데네브에서는, 마왕은 사악한 존재라는 인식인 모양이다."

[[dialogue]]
speaker = "通行人Ａ"
original = "「あ、ごめんなさい。そろそろ行かなきゃ。流星市国、楽しんでいってね」"
translation = "「아, 미안해요. 이제 가봐야겠어. 유성시국, 즐겁게 보내다 가렴.」"

[[dialogue]]
speaker = "クロト"
original = "「こちらこそお引止めしてすみません。ありがとうございました」"
translation = "「저희야말로 붙잡아서 죄송합니다. 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "もう少し詳しく聞きたくなるところを抑え、オフィスに戻るであろう女性たちを見送る。"
translation = "좀 더 자세히 듣고 싶어지는 마음을 억누르고, 사무실로 돌아갈 여성들을 배웅한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう、魔王は英雄だって言ってるでしょ！\u3000太陽の壁画といい、梨緒といい、デネブといい、みんな勘違いしてるんだから！」"
translation = "「정말, 마왕은 영웅이라고 말했잖아! 태양의 벽화도 그렇고, 리오도 그렇고, 데네브도 그렇고, 다들 오해하고 있다니까!」"

[[dialogue]]
speaker = "クロト"
original = "「でもここがデネブだとわかったのは収穫だよ」"
translation = "「하지만 여기가 데네브라는 걸 알게 된 건 수확이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それはそうだけど……納得いかないわ」"
translation = "「그건 그렇지만…… 납득이 안 가.」"

[[dialogue]]
speaker = "unk"
original = "魔王が悪者扱いされるのは割と慣れたものだが、ヴィーナスは不満そうに頬を膨らませる。"
translation = "마왕이 악당 취급받는 것에는 비교적 익숙해졌지만, 비너스는 불만스러운 듯 볼을 부풀린다."

[[dialogue]]
speaker = "クロト"
original = "（しかし、ルヴィネは何を考えている……？）"
translation = "(하지만, 루비네는 무슨 생각을 하고 있는 거지……?)"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスをアルタイルに送り出したことからもわかる通り、デネブの<ruby>緋宮クロト<rt>俺</rt></ruby>も世界を守るためにリクリエと戦っていた。"
translation = "비너스를 알타이르로 보내준 것에서도 알 수 있듯이, 데네브의 히노미야 쿠로토도 세계를 지키기 위해 리크리에와 싸우고 있었다."

[[dialogue]]
speaker = "unk"
original = "そしてアルタイルはデネブを滅ぼそうとしていない。むしろデネブと共にリクリエと戦おうと考えている。"
translation = "그리고 알타이르는 데네브를 멸망시키려 하지 않는다. 오히려 데네브와 함께 리크리에와 싸우려 생각하고 있다."

[[dialogue]]
speaker = "unk"
original = "誤解の可能性はあるが、ルヴィネは意図的に誤った情報を広めようとしているように思えた。"
translation = "오해의 가능성은 있지만, 루비네는 의도적으로 잘못된 정보를 퍼뜨리려 하는 것처럼 느껴졌다."

[[dialogue]]
speaker = "クロト"
original = "（それにルヴィネが世界を救ったってどういうことだ？\u3000そんなことが可能なのか？）"
translation = "(게다가 루비네가 세계를 구했다는 건 무슨 소리지? 그런 게 가능한가?)"

[[dialogue]]
speaker = "unk"
original = "俺たちはアルタイルで一度リクリエを退けた。"
translation = "우리들은 알타이르에서 한 번 리크리에를 물리쳤다."

[[dialogue]]
speaker = "unk"
original = "だからこそその脅威を知っているが、ルヴィネなる存在が１人でリクリエに打ち勝ったとはにわかには信じがたい。"
translation = "그렇기에 그 위협을 알고 있지만, 루비네라는 존재가 혼자서 리크리에를 이겨냈다는 건 선뜻 믿기 힘들다."

[[dialogue]]
speaker = "unk"
original = "……いや、今はルヴィネについて考えている場合じゃないか。"
translation = "……아니, 지금은 루비네에 대해 생각하고 있을 때가 아닌가."

[[dialogue]]
speaker = "クロト"
original = "「ひとまず、今すべきことを整理しよう」"
translation = "「일단, 지금 해야 할 일을 정리하자.」"

[[dialogue]]
speaker = "クロト"
original = "「事故とはいえ、俺たちはデネブに来ることができた。窮地ではあるが、これはチャンスでもある」"
translation = "「사고라고는 해도, 우리들은 데네브에 올 수 있었어. 궁지이긴 하지만, 이건 기회이기도 해.」"

[[dialogue]]
speaker = "クロト"
original = "「演説で話した通り、俺は極星学園に情報の真偽を<ruby>質<rt>ただ</rt></ruby>し、共にリクリエと戦うよう説得する。その絶好の機会だ」"
translation = "「연설에서 말한 대로, 나는 극성학원에 정보의 진위를 따져 묻고, 함께 리크리에와 싸우도록 설득하겠어. 그 절호의 기회다.」"

[[dialogue]]
speaker = "クロト"
original = "「だけどここは敵地。チナとの戦いで疲弊しているし、身を隠して体を休められる場所も必要だ」"
translation = "「하지만 여기는 적지야. 치나와의 싸움으로 지쳐 있고, 몸을 숨기고 쉴 수 있는 장소도 필요해.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「隠れるのはいいけど、はぐれたみんなが心配ね」"
translation = "「숨는 건 좋지만, 흩어진 애들이 걱정되네.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。俺たちが身の安全を確保できても、その間にみんながやられるのは看過できない」"
translation = "「아아. 우리들이 신변의 안전을 확보해도, 그사이에 모두가 당하는 건 간과할 수 없어.」"

[[dialogue]]
speaker = "クロト"
original = "「できるだけ目立たないようにしながら、みんなを探し──」"
translation = "「최대한 눈에 띄지 않게 하면서, 모두를 찾고──」"

[[dialogue]]
speaker = "アナウンス"
original = "『緊急警報。緊急警報。新市街の住民の方は、屋内に避難してください』"
translation = "『긴급 경보. 긴급 경보. 신시가지 주민분들은, 건물 안으로 대피해 주십시오.』"

[[dialogue]]
speaker = "アナウンス"
original = "『繰り返します。新市街周辺の方は、至急避難してください』"
translation = "『반복합니다. 신시가지 주변 분들은, 조속히 대피해 주십시오.』"

[[dialogue]]
speaker = "unk"
original = "アナウンスが放送されると、周囲の人々は即座に反応して屋内に入っていく。"
translation = "아나운서가 방송되자, 주변 사람들은 즉각 반응하여 건물 안으로 들어간다."

[[dialogue]]
speaker = "unk"
original = "混乱を見せたり悲鳴を上げたりすることもなく、避難の手本のような、まるで訓練されたような動きだ。"
translation = "혼란을 보이거나 비명을 지르는 일도 없이, 대피의 표본과 같은, 마치 훈련된 듯한 움직임이다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルル……！」"
translation = "「부르르……!」"

[[dialogue]]
speaker = "クロト"
original = "「極星従騎……！」"
translation = "「극성종기……!」"

[[dialogue]]
speaker = "unk"
original = "空から舞い降りた極星従騎は、真っ直ぐにこちらを向かって突進してくる。"
translation = "하늘에서 내려온 극성종기는, 똑바로 이쪽을 향해 돌진해 온다."

[[dialogue]]
speaker = "クロト"
original = "「もう見つかったか……こうなったら逃げても隠れても無駄だろうな。迎え撃つぞ！」"
translation = "「벌써 들켰나…… 이렇게 된 이상 도망치거나 숨어도 소용없겠지. 맞서 싸우자!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、売られたケンカは買うわよ！」"
translation = "「그래, 걸어온 싸움은 받아주겠어!」"

