[[dialogue]]
speaker = "unk"
original = "第２話,異世界和菓子グルメツアー,P"
translation = "제2화, 이세계 화과자 미식 투어, P"

[[dialogue]]
speaker = "unk"
original = "リア先輩が俺たちの世界に来て数日。星徒会の仕事を手伝ってくれる彼女に、街を案内しようという話になって──"
translation = "리아 선배가 우리 세계에 온 지 며칠. 성도회 일을 도와주는 그녀에게, 거리 안내를 하자는 이야기가 되어──"

[[dialogue]]
speaker = "リア"
original = "「はむはむ、おいし～♪\u3000このどら焼き、すごいクオリティだね！\u3000甘さ控えめの上品な餡、それを包み込むふんわりした手作りの皮！\u3000しかもアツアツの作りたて！」"
translation = "「함냐함냐, 맛있어~♪ 이 도라야키, 엄청난 퀄리티네! 단맛을 줄인 품격 있는 팥소, 그걸 감싸는 폭신폭신한 수제 피! 게다가 뜨끈뜨끈 갓 만든 거라니!」"

[[dialogue]]
speaker = "アナ"
original = "「やはりわかっていただけますか……！\u3000このみたらし団子もどうぞ。絶妙なまでのモチモチ具合と、たっぷりかかった秘伝のタレとの組み合わせが見事な逸品で──」"
translation = "「역시 알아주시는군요……! 이 미타라시 당고도 드셔보세요. 절묘한 쫄깃함과 듬뿍 뿌려진 비전 소스와의 조합이 훌륭한 일품이라서──」"

[[dialogue]]
speaker = "unk"
original = "二人とも楽しそうだね"
translation = "두 사람 다 즐거워 보이네"

[[dialogue]]
speaker = "リア"
original = "「もっちろん♪\u3000知らなかったよ～。こっちの世界にこんな和菓子の聖地があったなんて♪\u3000和菓子好きには天国だよ、天国！」"
translation = "「당연하지♪ 몰랐었어~. 이쪽 세계에 이런 화과자의 성지가 있었다니♪ 화과자 마니아에게는 천국이야, 천국!」"

[[dialogue]]
speaker = "リア"
original = "「案内してくれてありがとう、アナちゃん。ここに来ないで元の世界に戻っていたら一生後悔するところだったよ～」"
translation = "「안내해 줘서 고마워, 아나 짱. 여기 안 오고 원래 세계로 돌아갔다면 평생 후회할 뻔했단다~」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです。私も和菓子について語り合える方と一度でいいから食べ歩きをしてみたかったものですから」"
translation = "「노 프라블럼입니다. 저도 화과자에 대해 이야기를 나눌 수 있는 분과 한 번이라도 좋으니 맛집 탐방을 해보고 싶었으니까요」"

[[dialogue]]
speaker = "アナ"
original = "「普段はローテンションな私ですが、珍しく感情も高ぶっています。今は遮二無二、茶筅をぶん回して無性に抹茶を点てたい気分です。こんなにウキウキするのは久方ぶりです」"
translation = "「평소에는 텐션이 낮은 저입니다만, 드물게 감정이 고조되어 있습니다. 지금은 무작정 찻솔을 휘둘러서 말차를 내고 싶은 기분입니다. 이렇게 들뜨는 건 오랜만입니다」"

[[dialogue]]
speaker = "リア"
original = "「わぁ、アナちゃんってお抹茶まで点てられるんだ♪\u3000なら今度のお茶会は茶の湯にけって～い！\u3000私もとびっきりの和菓子を作っていくよ～♪」"
translation = "「와아, 아나 짱은 말차까지 낼 수 있구나♪ 그럼 다음 다과회는 다도회로 결정~! 나도 끝내주는 화과자를 만들어 갈게~♪」"

[[dialogue]]
speaker = "アナ"
original = "「！！\u3000是非！\u3000茶室の予約は任せてください！\u3000私もリア先輩に自作の和菓子を召し上がってもらいたいです！」"
translation = "「!! 부디! 다실 예약은 제게 맡겨주세요! 저도 리아 선배님께 제가 직접 만든 화과자를 대접해 드리고 싶습니다!」"

[[dialogue]]
speaker = "unk"
original = "俺も和菓子作りに挑戦してみようかな"
translation = "나도 화과자 만들기에 도전해 볼까"

[[dialogue]]
speaker = "リア"
original = "「いいねいいね♪\u3000それじゃあ三人で美味しい和菓子を作っちゃおう♪\u3000きっと青春と友情が詰まった良いお菓子になるよ～♪」"
translation = "「좋아 좋아♪ 그럼 셋이서 맛있는 화과자를 만들자♪ 분명 청춘과 우정이 가득 담긴 좋은 과자가 될 거야~♪」"

[[dialogue]]
speaker = "アナ"
original = "「素晴らしいアイデアです。実は私も誰かと一緒にお菓子作りをしてみたいとは常々思っていて。中々そういう機会に恵まれなかったものですから……」"
translation = "「훌륭한 아이디어입니다. 사실 저도 누군가와 함께 과자를 만들어보고 싶다고 늘 생각했거든요. 좀처럼 그런 기회가 닿지 않아서……」"

[[dialogue]]
speaker = "リア"
original = "「そうなんだ？\u3000新星学園には和菓子倶楽部とかないの？」"
translation = "「그랬구나? 유성 학원에는 화과자 클럽 같은 거 없어?」"

[[dialogue]]
speaker = "アナ"
original = "「和菓子、倶楽部……？\u3000なんですか、その心惹かれる響きの倶楽部は……」"
translation = "「화과자, 클럽……? 뭡니까, 그 마음을 사로잡는 울림의 클럽은……」"

[[dialogue]]
speaker = "リア"
original = "「ふふん。何を隠そう、このリアお姉さんは流星学園で和菓子倶楽部だったのだ～！」"
translation = "「후훈. 사실을 말하자면, 이 리아 언니는 유성 학원에서 화과자 클럽이었단다~!」"

[[dialogue]]
speaker = "アナ"
original = "「！！\u3000は、入りたい……！\u3000ものすごく入りたいです、その倶楽部……！\u3000私が流星学園の生徒なら絶対に入っています！」"
translation = "「!! 드, 들어가고 싶어……! 너무나도 들어가고 싶습니다, 그 클럽……! 제가 유성 학원 학생이었다면 반드시 들어갔을 겁니다!」"

[[dialogue]]
speaker = "リア"
original = "「新星学園でも作っちゃえばいいんだよ～。アナちゃんが部長になってさ」"
translation = "「신성 학원에서도 만들면 되잖아~. 아나 짱이 부장이 돼서 말이야」"

[[dialogue]]
speaker = "アナ"
original = "「わ、私が部長ですか？\u3000あまり自信がないです……。私、まだ一年ですし、無口で無愛想ですし、冷たい人に見られがちで……。とても人の上に立てる器では……」"
translation = "「제, 제가 부장인가요? 별로 자신 없습니다……. 저, 아직 1학년이고, 말수도 적고 싹싹하지도 않고, 차가운 사람으로 보이기 쉬워서……. 도저히 남 위에 설 그릇이……」"

[[dialogue]]
speaker = "リア"
original = "「ふふ、難しく考えすぎだってば。みんなで楽しく和菓子作ってお茶会をする場所だと思えばいいんだよ」"
translation = "「후후, 너무 어렵게 생각한다니까. 다 같이 즐겁게 화과자 만들고 다과회 하는 장소라고 생각하면 돼」"

[[dialogue]]
speaker = "リア"
original = "「それに学年なんて関係ないよ。無口で無愛想でもないと思うよ？\u3000和菓子について話してる時のアナちゃんの顔、すごくキラキラしてたもん」"
translation = "「게다가 학년 같은 건 상관없어. 말수가 적고 싹싹하지 않은 것도 아니라고 생각해? 화과자에 대해 이야기할 때 아나 짱의 얼굴, 정말 반짝반짝했는걸」"

[[dialogue]]
speaker = "アナ"
original = "「そうでしょうか……。でも私が部長で人が集まりますかね……。実は私、星徒会のメンバー以外にあまり仲のいい友人もいないので……」"
translation = "「그럴까요……. 하지만 제가 부장이라니 사람이 모일까요……. 사실 저, 성도회 멤버들 외에는 딱히 친한 친구도 없어서……」"

[[dialogue]]
speaker = "リア"
original = "「ぜーったいに集まるよ♪\u3000倶楽部っていうのは友達作りにも最適だしね♪\u3000実際こうして私とアナちゃんは和菓子を通じて仲良しになってるじゃない」"
translation = "「절~대로 모일 거야♪ 클럽이라는 건 친구 만들기에도 최적이고 말이야♪ 실제로 이렇게 나랑 아나 짱은 화과자를 통해서 단짝이 됐잖아」"

[[dialogue]]
speaker = "アナ"
original = "「な、仲良しに」"
translation = "「다, 단짝」"

[[dialogue]]
speaker = "リア"
original = "「もうマブダチだもん、私たち♪」"
translation = "「이젠 마부다치(절친)라구, 우리♪」"

[[dialogue]]
speaker = "アナ"
original = "「まぶ……？\u3000ああ、随分と古い単語を持ち出してきますね。一瞬、言葉の意味が……」"
translation = "「마부……? 아아, 상당히 오래된 단어를 꺼내시는군요. 순간, 단어의 뜻이……」"

[[dialogue]]
speaker = "リア"
original = "「あっちの世界での流行語が既に死語になってる！？」"
translation = "「저쪽 세계에서의 유행어가 벌써 사어가 됐어!?」"

[[dialogue]]
speaker = "アナ"
original = "「ハっ。すみません。私また、空気の読めない発言を……。やはり私に部長なんて大役は……」"
translation = "「핫. 죄송합니다. 제가 또, 분위기 파악 못 하는 발언을……. 역시 제게 부장 같은 중책은……」"

[[dialogue]]
speaker = "リア"
original = "「できるってば～。会長さんもそう思うよね？」"
translation = "「할 수 있다니까~. 회장님도 그렇게 생각하지?」"

[[dialogue]]
speaker = "unk"
original = "俺も入りたいな"
translation = "나도 들어가고 싶네"

[[dialogue]]
speaker = "unk"
original = "アナならできるよ"
translation = "아나라면 할 수 있어"

[[dialogue]]
speaker = "アナ"
original = "「会長……。なら、頑張って設立してみてもいいかもしれません。副会長である私の傘下に会長が入るというのは不思議な感覚もしますが……」"
translation = "「회장님……. 그렇다면, 열심히 설립해 봐도 좋을지도 모르겠네요. 부회장인 제 산하에 회장님이 들어온다는 건 신기한 느낌도 듭니다만……」"

[[dialogue]]
speaker = "リア"
original = "「その意気だよ！\u3000期間限定になっちゃうけど、もちろん私も入部するし♪」"
translation = "「그 기세야! 기간 한정이 되겠지만, 물론 나도 입부할 거고♪」"

[[dialogue]]
speaker = "リア"
original = "「三人で和菓子倶楽部を盛り上げちゃおう♪\u3000あ、でもでもスウィーツ同好会とはくれぐれも仲良くね？」"
translation = "「셋이서 화과자 클럽을 띄워보자♪ 아, 하지만 하지만 스위츠 동호회랑은 부디 사이좋게 지내야 해?」"

[[dialogue]]
speaker = "アナ"
original = "「スウィーツ同好会ですか？\u3000そんな同好会うちの学園にあったでしょうか……」"
translation = "「스위츠 동호회인가요? 그런 동호회가 저희 학원에 있었던가요……」"

[[dialogue]]
speaker = "アナ"
original = "「ですが、なんだかいいものですね。リア先輩にご提案されるまで、和菓子倶楽部を立ち上げようだなんて考えたこともありませんでした」"
translation = "「하지만, 왠지 기분 좋네요. 리아 선배님이 제안해 주시기 전까지는 화과자 클럽을 만들자니 생각도 못 했습니다」"

[[dialogue]]
speaker = "アナ"
original = "「思えば会長とこうして星徒会業務以外のことで話すこともあまりなかったような気がします。おかげで今まで以上に会長とも打ち解けられた気がしますね」"
translation = "「생각해 보면 회장님과 이렇게 성도회 업무 이외의 일로 이야기한 적도 별로 없었던 것 같네요. 덕분에 예전보다 회장님과도 더 허물없어진 느낌입니다」"

[[dialogue]]
speaker = "unk"
original = "俺も同じ気持ちだよ"
translation = "나도 같은 마음이야"

[[dialogue]]
speaker = "リア"
original = "「えっへん、それが仲良しになるということなのです♪\u3000こうやって生徒会活動以外でもバッチリ交流して、どんどん仲を深めなきゃもったいないよ」"
translation = "「엣헴, 그게 바로 친해진다는 것이랍니다♪ 이렇게 학생회 활동 이외에도 확실히 교류해서, 점점 사이를 깊게 하지 않으면 아깝잖아」"

[[dialogue]]
speaker = "リア"
original = "「モンスター退治やリクリエをとめる使命も大切だけど、まずは青春を謳歌しなくちゃね。せっかくの学園生活なんだから♪」"
translation = "「몬스터 퇴치나 리크리에를 막는 사명도 중요하지만, 우선은 청춘을 구가해야지. 어렵게 얻은 학원 생활인데 말이야♪」"

[[dialogue]]
speaker = "アナ"
original = "「青春……。しかしプリマステラの星騎士がそんなものにうつつを抜かしてしまっていいのでしょうか……」"
translation = "「청춘……. 하지만 프리마스텔라의 성기사가 그런 것에 정신을 팔아도 되는 것일까요……」"

[[dialogue]]
speaker = "リア"
original = "「当たり前だよ！\u3000クルセイダースも星騎士も軍隊じゃないんだし。楽しい日々の積み重ねが、この世界を守りたいっていう強い想いに繋がると思うんだ」"
translation = "「당연하지! 크루세이더스도 성기사도 군대가 아니잖아. 즐거운 나날의 축적이, 이 세계를 지키고 싶다는 강한 마음으로 이어진다고 생각해」"

[[dialogue]]
speaker = "アナ"
original = "「楽しい日々の積み重ねが守りたいという想いに──……確かにそうですね。リア先輩の仰る通りです」"
translation = "「즐거운 나날의 축적이 지키고 싶다는 마음으로──…… 확실히 그렇네요. 리아 선배님 말씀이 맞습니다」"

[[dialogue]]
speaker = "アナ"
original = "「私、今までただプリマステラの星騎士だから、星徒会の一員だからという理由だけで戦っていた気がします。そのために知識を蓄えたり、星力を扱う訓練をしたりして」"
translation = "「저, 지금까지 그저 프리마스텔라의 성기사니까, 성도회의 일원이니까라는 이유만으로 싸워왔던 것 같습니다. 그러기 위해 지식을 쌓고, 성력을 다루는 훈련을 하고」"

[[dialogue]]
speaker = "アナ"
original = "「でも……もっと素直に学園生活を楽しんでいいんですね。和菓子を作ったり、食べたりして、のんびりした時間を過ごしても……」"
translation = "「하지만…… 좀 더 솔직하게 학원 생활을 즐겨도 되는 거군요. 화과자를 만들거나, 먹거나 하며 느긋한 시간을 보내도……」"

[[dialogue]]
speaker = "リア"
original = "「その通りだよ♪\u3000ね、会長さん？」"
translation = "「바로 그거야♪ 그치, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "俺たちはこの日常を守るために戦ってるからね"
translation = "우리는 이 일상을 지키기 위해 싸우고 있으니까 말이야"

[[dialogue]]
speaker = "アナ"
original = "「ふふ、意外とロマンチックだったんですね、会長は。そういった部分も初めて知りました」"
translation = "「후후, 의외로 로맨틱하셨군요, 회장님은. 그런 부분도 처음 알았습니다」"

[[dialogue]]
speaker = "アナ"
original = "「私、リア先輩に出会えて本当に良かったです。和菓子を愛する同士を見つけられたことだけではなく、言葉に換言できない大切なことを教わることができました」"
translation = "「저, 리아 선배님을 만나서 정말 다행입니다. 화과자를 사랑하는 동지를 찾은 것뿐만 아니라, 말로 표현할 수 없는 소중한 것을 배울 수 있었습니다」"

[[dialogue]]
speaker = "リア"
original = "「くすくす、オーバーだなぁ。大したことは言ってないのに。でもでも、アナちゃんに何かが残せたのなら先輩として誇らしいな♪」"
translation = "「쿠스쿠스, 과장이 심하네. 별말 안 했는데. 하지만 하지만, 아나 짱에게 뭔가를 남겨줄 수 있었다면 선배로서 자랑스러워♪」"

[[dialogue]]
speaker = "リア"
original = "「じゃあ気を取り直して異世界和菓子グルメツアーを続けよう～！\u3000アナちゃんのお勧めの和菓子店、もっともっと教えて教えて☆」"
translation = "「그럼 기운 차리고 이세계 화과자 미식 투어를 계속하자~! 아나 짱이 추천하는 화과자점, 더 많이 가르쳐줘 가르쳐줘☆」"

[[dialogue]]
speaker = "アナ"
original = "「ふふ、モチのロンです。二人とも今夜は夕食を食べられないと思ってくださいね。ぜんざいにあんみつ、水ようかんに人形焼き──紹介したいお店はまだまだ残っていますから」"
translation = "「후후, 물론입니다. 두 분 다 오늘 밤은 저녁 식사를 못 할 거라고 생각하세요. 단팥죽에 안미츠, 미즈요칸에 인형 굽기── 소개하고 싶은 가게는 아직 한참 남았으니까요」"

[[dialogue]]
speaker = "unk"
original = "楽しみだ"
translation = "기대되네"

[[dialogue]]
speaker = "リア"
original = "「そうと決まれば、れっつご～！\u3000ついでにお土産も買って、星徒会のみんなと茶の湯パーティーしちゃおっか♪」"
translation = "「그렇게 결정됐으면, 렛츠 고~! 겸사겸사 선물도 사서, 성도회 모두와 다도회 파티 해버릴까♪」"

[[dialogue]]
speaker = "アナ"
original = "「はい、和菓子倶楽部の記念すべき初活動です！」"
translation = "「네, 화과자 클럽의 기념비적인 첫 활동입니다!」"

