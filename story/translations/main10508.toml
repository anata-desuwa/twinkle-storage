[[dialogue]]
speaker = "unk"
original = "第８話,ヘレナ様へのプレゼントだぴょん！,B"
translation = "제8화, 헬레나 님을 향한 선물이다뿅!, B"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「蘭美……！？」"
translation = "「라비……!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さあ！\u3000今こそ目覚めなさい、私のクリスマスフォームっ！！！」"
translation = "「자! 지금이야말로 눈을 뜨거라, 나의 크리스마스 폼!!!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「戦闘服が覚醒した！？\u3000やったわ、蘭美！\u3000すごい力を感じるわよ！」"
translation = "「전투복이 각성했어!? 해냈구나, 라비! 엄청난 힘이 느껴져!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さあ、お嬢様！\u3000一気に蹴散らしてしまいましょう！」"
translation = "「자, 아가씨! 단숨에 흩어버리죠!」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "『標的ノエネルギー拡大ヲ確認。危険度レベルＳ──速ヤカニ排除シマス──』"
translation = "『표적의 에너지 확대를 확인. 위험도 레벨 S── 신속하게 배제합니다──』"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「させないわ！！」"
translation = "「하게 두지 않아!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それがクリスマスフォームの力ね……ふふ、ワクワクさせてくれるじゃない！」"
translation = "「그게 크리스마스 폼의 힘이네…… 후후, 두근거리게 해주잖아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私も負けないわよ！\u3000そりゃぁああああっ！！！」"
translation = "「나도 지지 않아! 에잇!!!!」"

[[dialogue]]
speaker_original = "ガーディアン"
speaker_translation = "가디언"
original = "『排ジョ──』"
translation = "『배제──』"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとクリスマスフォームの蘭美。"
translation = "비너스와 크리스마스 폼의 라비."

[[dialogue]]
speaker = "unk"
original = "２人は圧倒的な殲滅力で次々に現れるコピーガーディアンを次々に破壊していく。"
translation = "두 사람은 압도적인 섬멸력으로 차례차례 나타나는 카피 가디언을 파괴해 나간다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「やぁああああああっ！！！！」"
translation = "「야아아아아아압!!!!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「今よ、お屋敷への道が開けたわ！」"
translation = "「지금이야, 저택으로 가는 길이 열렸어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「オッケー、一気に突撃よ！」"
translation = "「오케이, 단숨에 돌격이야!」"

[[dialogue]]
speaker = "unk"
original = "転がるようにして屋敷の廊下へ飛び込んだ。"
translation = "구르듯이 저택의 복도로 뛰어들었다."

[[dialogue]]
speaker = "unk"
original = "そのまま息もつかずに廊下を駆け抜け……そして九浄ヘレナの待つ部屋へと突入する。"
translation = "그대로 숨 돌릴 틈도 없이 복도를 달려 나가…… 그리고 쿠죠 헬레나가 기다리는 방으로 돌입한다."

[[dialogue]]
speaker = "unk"
original = "そこには美鶴、せつな──"
translation = "그곳에는 미츠루, 세츠나──"

[[dialogue]]
speaker = "unk"
original = "ヨミ、閃──。"
translation = "요미, 센──."

[[dialogue]]
speaker = "unk"
original = "そして、ずらりと並んだメイト隊の前に、屋敷の主であるヘレナが立っていた。"
translation = "그리고, 즐비하게 늘어선 메이드 부대 앞에, 저택의 주인인 헬레나가 서 있었다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さすがは蘭美にヴィーナス、あの警備網を突破してここまでたどり着くとはな」"
translation = "「과연 라비와 비너스, 그 경비망을 돌파하고 여기까지 도달할 줄이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「残念ながらあの程度で私たちは止められないわ」"
translation = "「아쉽지만 그 정도로 우리를 멈출 수는 없어.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふむ……ガーディアンの更なる強化も検討に入れねばならぬようだ」"
translation = "「흠…… 가디언의 추가 강화도 검토에 넣어야겠구나.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「当主様」"
translation = "「당주님.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……どうやら戦闘服の起動には成功したようだな」"
translation = "「……아무래도 전투복 기동에는 성공한 모양이군.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はい。時間はかかってしまいましたが、先程の戦いの中で……」"
translation = "「네. 시간은 걸렸습니다만, 방금 전의 싸움 속에서……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「見ていたぞ。素晴らしい戦いぶりであった」"
translation = "「보고 있었느니라. 훌륭한 싸움이었도다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「だがまだ完全に使いこなすまでには至っていない、引き出そうと思えばまだまだ力を引き出すことが出来る」"
translation = "「하지만 아직 완전히 다루는 데까지는 이르지 못했구나, 끌어내고자 한다면 더더욱 힘을 끌어낼 수 있느니라.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「精進いたします」"
translation = "「정진하겠습니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「当主様……ささやかな物ではありますが、サンタクロースからのプレゼントです」"
translation = "「당주님…… 보잘것없는 것이지만, 산타클로스가 주는 선물입니다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ありがとう、蘭美」"
translation = "「고맙구나, 라비.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ほう……これは素晴らしい扇子だ」"
translation = "「호오…… 이것 참 훌륭한 부채로다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「当主様がお持ちの扇子にくらぶべきもない品ですが、その蒐集のひとつにお加えください」"
translation = "「당주님께서 가지고 계신 부채에 비할 바는 못 되지만, 그 수집품 중 하나로 더해주십시오.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふ、何を言うか……大切にするぞ、一番の宝として私のコレクションに加えさせてもらう」"
translation = "「후후, 무슨 말을 하느냐…… 소중히 하겠느니라, 최고의 보물로서 짐의 컬렉션에 추가하도록 하마.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それから、これはクリスマスカードだな？」"
translation = "「그리고, 이것은 크리스마스 카드인가?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へぇ、そんなもの用意してたんだ……エモいわね。ヘレナちゃん、せっかくだから蘭美に読んでもらったら？」"
translation = "「헤에, 그런 걸 준비했구나…… 에모이하네. 헬레나짱, 기왕 이렇게 된 거 라비가 읽어주는 게 어때?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それはいいな。蘭美、頼めるか？」"
translation = "「그거 좋구나. 라비, 부탁해도 되겠느냐?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「かしこまりました」"
translation = "「알겠습니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「──御当主、九浄ヘレナ様」"
translation = "「──당주, 쿠죠 헬레나 님.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「メイドとして貴方の様な素晴らしい主にお仕えできたことを、何よりの幸運と思わぬ日はございません」"
translation = "「메이드로서 당신과 같은 훌륭한 주인을 모실 수 있었던 것을, 무엇보다도 행운이라 생각지 않는 날이 없습니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それは私だけではなくメイド隊の皆が、いえ、屋敷にお仕えする全ての者の気持ちであると存じます」"
translation = "「그것은 저뿐만 아니라 메이드 부대 모두가, 아니, 저택을 모시는 모든 이들의 마음이라 사료됩니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「大いなる感謝の気持ちを以って、この先もお仕えさせて頂きます」"
translation = "「커다란 감사의 마음을 담아, 앞으로도 모시도록 하겠습니다.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「貴方様の忠実なるメイド、羽宮蘭美」"
translation = "「당신의 충실한 메이드, 하네미야 라비.」"

[[dialogue]]
speaker = "unk"
original = "蘭美の言葉が終わると、九浄ヘレナは静かに──だが深く頷く。"
translation = "라비의 말이 끝나자, 쿠죠 헬레나는 조용히── 하지만 깊게 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "そして、蘭美の方に手を置くと優しく声をかけた。"
translation = "그리고, 라비의 어깨에 손을 얹으며 다정하게 말을 건넸다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こちらこそ……今後ともよろしく頼むぞ、蘭美」"
translation = "「나야말로…… 앞으로도 잘 부탁하마, 라비.」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はい、当主様」"
translation = "「네, 당주님.」"

[[dialogue]]
speaker = "unk"
original = "周囲から拍手が巻き起こる。"
translation = "주변에서 박수가 터져 나온다."

[[dialogue]]
speaker = "unk"
original = "こうして、九浄家のクリスマスは第二次サンタ作戦の大成功と共に幕を閉じたのだった。"
translation = "이렇게 해서, 쿠죠 가의 크리스마스는 제2차 산타 작전의 대성공과 함께 막을 내렸다."

