[[dialogue]]
speaker = "unk"
original = "第１４話,終焉,B"
translation = "제14화, 종언, B"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「────────ッ！？！？」"
translation = "「────────윽!?!?」"

[[dialogue]]
speaker = "unk"
original = "この創造神を消滅させる──ベガの世界の無念を、晴らしてみせる。"
translation = "이 창조신을 소멸시킨다── 베가 세계의 원한을 갚아 보이겠어."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ディザスターハンドの力を取り込んだ……これが魔王の、真の力！？」"
translation = "「디재스터 핸드의 힘을 받아들였다…… 이것이 마왕의 진정한 힘!?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「２つの世界の、緋宮会長の力を合わせた──」"
translation = "「두 세계의 히노미야 회장의 힘을 합친──」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「すごい……これが、パパの本気なのね！！」"
translation = "「대단해…… 이것이 아빠의 진심이구나!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──滅ぼす！！」"
translation = "「──멸한다!!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ──ギギ────！？」"
translation = "「기── 기기────!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お前を、この世から──消滅させる！！！」"
translation = "「너를 이 세상에서── 소멸시키겠다!!!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ────ガ──────！？！？」"
translation = "「기────가──────!?!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「お父様！\u3000逃げてください！！\u3000魔王を止められません──このままでは、お父様が！！」"
translation = "「아버님! 도망치세요!! 마왕을 멈출 수 없습니다── 이대로라면 아버님이!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな。複製体を抑えてくれ！\u3000俺は逃げた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を追撃する──！」"
translation = "「모두들, 복제체를 억제해 줘! 나는 도망친 『<ruby>XELOS<rt>제로스</rt></ruby>』를 추격하겠어──!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナたちが奮戦する極星学園の中庭に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は降り立った。いや、それはむしろ避難か──"
translation = "트레지안나 일행이 분전하는 극성학원의 중정에 『<ruby>XELOS<rt>제로스</rt></ruby>』는 내려앉았다. 아니, 그것은 차라리 피난인가──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「わ、わわわっ！？」"
translation = "「와, 와와왓!?」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「これが──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』！？」"
translation = "「이것이── 『<ruby>XELOS<rt>제로스</rt></ruby>』!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「カオス──ディメンションッ！！」"
translation = "「카오스 디멘션!!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギイィイ────ガガ、ガガガッ────！？！？」"
translation = "「기이이────가가, 가가가────!?!?」"

[[dialogue]]
speaker = "unk"
original = "どこへ逃げようとも、魔王の追撃は止まらない。"
translation = "어디로 도망치든 마왕의 추격은 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "かつて世界を滅ぼした破壊の拳が、創造神に突き刺さっていく。"
translation = "과거 세계를 멸망시켰던 파괴의 주먹이 창조신에게 꽂혀 들어간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おおおおぉおおッ──！！！」"
translation = "「오오오오오오옷──!!!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「悪神が、悲鳴をあげて……逃げ回って……？」"
translation = "「악신이 비명을 지르며…… 도망쳐 다니고 있어……?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「……会長さん！！\u3000何だかとんでもない力を手に入れちゃったみたいですね☆」"
translation = "「……회장님!! 왠지 엄청난 힘을 손에 넣어버린 모양이네요☆」"

[[dialogue]]
speaker = "unk"
original = "たまらず『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は再び逃亡を始め──それを追いかける、魔王の少年。"
translation = "견디다 못한 『<ruby>XELOS<rt>제로스</rt></ruby>』는 다시 도망치기 시작하고── 그것을 뒤쫓는 마왕 소년."

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「やめろ……お父様をこれ以上傷つけることは許さない！\u3000やめろ！！！」"
translation = "「그만둬…… 아버님을 더 이상 상처 입히는 건 허락 못 해! 그만둬!!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「対話での解決を拒んだのはお前たち神だ！！\u3000悪いが、ここから先はヒトに時代を明け渡してもらう！！」"
translation = "「대화로 해결하는 걸 거부한 건 너희 신들이다!! 미안하지만, 여기서부터는 인간에게 시대를 넘겨줘야겠어!!」"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトの放つ拳の一撃一撃は、ディザスターハンドの暴虐に匹敵している。"
translation = "히노미야 쿠로토가 내지르는 주먹 일격 일격은 디재스터 핸드의 폭거에 필적한다."

[[dialogue]]
speaker = "unk"
original = "もはやホロウの複製体など壁にもならない。"
translation = "이제 홀로우의 복제체 따위는 벽도 되지 않는다."

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「が、はぁっ──！？」"
translation = "「가, 하악──!?」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は“合理的にしか在ることができない”『神』である。"
translation = "『<ruby>XELOS<rt>제로스</rt></ruby>』는 “합리적으로만 존재할 수 있는” 『신』이다."

[[dialogue]]
speaker = "unk"
original = "ヒトと違い、無駄な行為を行うことができない、宇宙規模の巨大なプログラム。"
translation = "인간과 달리 헛된 행위를 할 수 없는 우주 규모의 거대한 프로그램."

[[dialogue]]
speaker = "unk"
original = "ゆえに──"
translation = "고로──"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ──────ギギギ────グゥウゥ────！？」"
translation = "「기────── 기기기────구우우우────!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……そんなに消えたくないか、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』」"
translation = "「……그렇게 사라지기 싫은 거냐, 『<ruby>XELOS<rt>제로스</rt></ruby>』」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はデネブの流星市国中を逃げ惑う。敵わないからだ。"
translation = "『<ruby>XELOS<rt>제로스</rt></ruby>』는 데네브의 유성시국 안을 도망쳐 다닌다. 대적할 수 없기 때문이다."

[[dialogue]]
speaker = "unk"
original = "厄災の右腕を取り込み、人智を超越したヒト──魔王。"
translation = "재앙의 오른팔을 받아들여 인지를 초월한 인간── 마왕."

[[dialogue]]
speaker = "unk"
original = "この怪物を斃すことができない。だから逃げる──逃げるしか、<b>することがない</b>のだ。"
translation = "이 괴물을 쓰러뜨릴 수 없다. 그래서 도망친다── 도망치는 것 말고는 <b>할 수 있는 게 없는</b> 것이다."

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギィィイィィィィイ────！？！？」"
translation = "「기이이이이이이이────!?!?」"

[[dialogue]]
speaker = "unk"
original = "『ＸＥＬＯＳ』が離脱し、それを高速で追いかける緋宮クロト。"
translation = "『XELOS』가 이탈하고, 그것을 고속으로 추격하는 히노미야 쿠로토."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「…………ファッ！？\u3000何ですか今の！？！？」"
translation = "「…………홧!? 방금 뭐였나요!?!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「──はは。どっちがバケモノかわかりゃしねえな。あれが魔王の全力ってやつか……！」"
translation = "「──하하. 어느 쪽이 괴물인지 모르겠구만. 저게 마왕의 전력이라는 건가……!」"

[[dialogue]]
speaker_original = "メルエル（覚醒）"
speaker_translation = "메르엘 (각성)"
original = "「みんな！\u3000ホロウたちをできる限り抑えて──これが本当に最後の戦いだよっ！」"
translation = "「모두들! 홀로우들을 가능한 한 억제해 줘── 이게 정말 마지막 싸움이야!」"

[[dialogue]]
speaker_original = "ネーゼマイン（覚醒）"
speaker_translation = "네제마인 (각성)"
original = "「会長が親玉を倒すお手伝い。最後の踏ん張りどころってね！」"
translation = "「회장이 우두머리를 쓰러뜨리는 걸 돕는 거네. 마지막으로 힘낼 차례야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アビス・オーバーロード！！！」"
translation = "「어비스 오버로드!!!」"

[[dialogue]]
speaker = "unk"
original = "──幾度目かの致命の一撃が、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の核を打ち貫く。"
translation = "──몇 번째인지 모를 치명적인 일격이 『<ruby>XELOS<rt>제로스</rt></ruby>』의 핵을 관통한다."

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「お父様……！\u3000私たちに割いている霊力を全てお戻しします！\u3000どうか──どうか！」"
translation = "「아버님……! 저희에게 할애하고 있는 영력을 모두 되돌려 드리겠습니다! 제발── 제발!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「この惑星ごと消滅を！\u3000それ以外に魔王を止める術はありません……！」"
translation = "「이 행성째로 소멸을! 그것 말고는 마왕을 멈출 방도가 없습니다……!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「そんな──！？」"
translation = "「그런──!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「まずいです！\u3000複製体がどんどん消えていって……『ＸＥＬＯＳ』に霊力が集中しています！」"
translation = "「큰일이에요! 복제체들이 점점 사라지면서…… 『XELOS』에게 영력이 집중되고 있어요!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「惑星ごとって……そんなこと、絶対にやらせられないわ！」"
translation = "「행성째라니…… 그런 짓, 절대로 하게 둘 수 없어!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「ふふふ……これでいい……」"
translation = "「후후후…… 이걸로 됐어……」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「地球の核にお父様の全霊力を注いで、壊滅させる……！」"
translation = "「지구의 핵에 아버님의 전 영력을 쏟아부어 괴멸시킨다……!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「お父様にも甚大な被害が出てしまうけれど……」"
translation = "「아버님께도 심대한 피해가 가겠지만……」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「──アハハハハハ！\u3000これでいい！」"
translation = "「──아하하하하하! 이걸로 됐어!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「お前たちは、消えるしかない──！！」"
translation = "「너희는 사라질 수밖에 없어──!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やらせるかあぁぁあぁああッ────！！！」"
translation = "「하게 둘 것 같으냐아아아아아아아아────!!!」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が最後の一撃を放つ前に──こいつをデネブの世界そのものから追い出す！！"
translation = "『<ruby>XELOS<rt>제로스</rt></ruby>』가 마지막 일격을 쏘기 전에── 이놈을 데네브의 세계 그 자체에서 쫓아낸다!!"

[[dialogue]]
speaker = "unk"
original = "教皇庁前に開いている時空の裂け目──かつてデネブの俺が残した負の遺産──これを利用する以外に手はない！"
translation = "교황청 앞에 열려있는 시공의 균열── 과거 데네브의 내가 남긴 부의 유산── 이걸 이용하는 수밖에 없어!"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「待って！？\u3000クロト──ダメ！\u3000ダメよ！\u3000待って！！」"
translation = "「기다려!? 쿠로토── 안 돼! 안 된다고! 기다려!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おおぉぉぉおぉぉぉぉおッ────！！！」"
translation = "「오오오오오오오오오오오오오오오────!!!」"

[[dialogue]]
speaker = "unk"
original = "そして俺は──『ＸＥＬＯＳ』ともども。"
translation = "그리고 나는── 『XELOS』와 함께."

[[dialogue]]
speaker = "unk"
original = "時空の裂け目へと飛び込んだ…………"
translation = "시공의 균열 속으로 뛰어들었다…………"

[[dialogue]]
speaker = "unk"
original = "創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』。そして神に付き従う複製体の全てがいなくなったデネブの教皇庁前は──穏やかな静けさを取り戻していた。"
translation = "창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』. 그리고 신을 따르는 복제체 전부가 사라진 데네브의 교황청 앞은── 평온한 정적을 되찾고 있었다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「魔王……さん？\u3000そんな……」"
translation = "「마왕…… 님? 설마……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お、おいっ！\u3000こんなのって、ないぞ……！\u3000戻ってこられるんだろ、なあっ！？」"
translation = "「이, 이봐! 이런 게 어딨어……! 돌아올 수 있는 거지, 어이!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ベアトの時は、偶然アルタイルにたどり着けたと聞いているけれど……」"
translation = "「베아트 때는 우연히 알타이르에 도달했다고 들었지만……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「わ、私が行く！\u3000一度は無事にアルタイルにたどり着けたんだし、きっと今回も……！」"
translation = "「내, 내가 가겠어! 한 번은 무사히 알타이르에 도착했었으니까 분명 이번에도……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ダメよベアト！\u3000幸運は二度も続かないわ……！\u3000どこに飛ばされるかもわからない……危険すぎる！」"
translation = "「안 돼 베아트! 행운이 두 번이나 계속되진 않아……! 어디로 날아갈지도 모르고…… 너무 위험해!」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「そんなっ……クロト！\u3000クロト────ッ！？」"
translation = "「그럴 수가…… 쿠로토! 쿠로토────!!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「間一髪でした……お父様、よくぞ御無事で……」"
translation = "「간발의 차였습니다…… 아버님, 무사하셔서 다행입니다……」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』による地球の破壊は未遂に終わったが──上手くいった。"
translation = "『<ruby>XELOS<rt>제로스</rt></ruby>』에 의한 지구 파괴는 미수로 끝났지만── 잘 풀렸다."

[[dialogue]]
speaker = "unk"
original = "当初の目論見どおり、星を破壊できればそれでよし。"
translation = "당초의 목적대로 별을 파괴할 수 있다면 그것으로 족하다."

[[dialogue]]
speaker = "unk"
original = "そうならなくとも、緋宮クロトならば必ず我が身を<ruby>挺<rt>てい</rt></ruby>してでも、時空の裂け目への道連れを選ぶだろうことは予想がついていた。"
translation = "그렇게 되지 않더라도 히노미야 쿠로토라면 반드시 제 몸을 던져서라도 시공의 균열로 동반 자살을 택할 것임은 예상하고 있었다."

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「もう緋宮クロトは、デネブにもアルタイルにも帰ることは叶いません」"
translation = "「이제 히노미야 쿠로토는 데네브에도 알타이르에도 돌아오는 것이 불가능합니다」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「あの者さえいなくなれば、世界の再創生はたやすい。ただちにデネブに戻り、今度こそ世界の刷新を成し遂げましょう」"
translation = "「그자만 없어진다면 세계의 재창생은 식은 죽 먹기. 즉시 데네브로 돌아가 이번에야말로 세계의 쇄신을 완수합시다」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「ご安心ください、お父様。デネブへ帰る経路は、はっきりと記憶しておりますので──ふふふふっ！」"
translation = "「안심하십시오, 아버님. 데네브로 돌아가는 경로는 또렷이 기억하고 있으니까요── 후후후훗!」"

