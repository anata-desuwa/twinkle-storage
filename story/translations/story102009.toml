[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「流星ライダーキーーーックっ！！」"
translation = "「유성 라이더 키이이익!!」"

[[dialogue]]
speaker_original = "クマロボ"
speaker_translation = "곰 로봇"
original = "「クマァーーーーーーーーーー！！！！！！」"
translation = "「쿠마아아아아아아아아아아!!!!!!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「楽勝だったじゃないですか。これなら私たちが変身するまでもなく、みなさんで倒しきれたと思いますよ」"
translation = "「식은 죽 먹기였잖아요. 이 정도면 우리가 변신할 것도 없이 여러분끼리도 충분히 쓰러뜨렸을 텐데요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっと、サボってんじゃないの」"
translation = "「이봐, 땡땡이치지 말라고.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「会長さんにお仕事を投げっぱなしにしているヴィーナスにだけは言われたくないですね」"
translation = "「회장님한테 일을 다 떠넘기고 있는 비너스 씨에게만큼은 듣고 싶지 않네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私はサボってるんじゃないわ、向いてないことをやろうとしないだけよ！」"
translation = "「난 땡땡이치는 게 아니야, 적성에 안 맞는 걸 안 하려고 할 뿐이지!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「だったら私も向いていないことはしないことにしますよ」"
translation = "「그렇다면 저도 적성에 안 맞는 일은 안 하기로 하죠.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あぅぅ、ケンカはやめてよ～」"
translation = "「아으으, 싸우지 마~」"

[[dialogue]]
speaker = "unk"
original = "すっかり見慣れた光景だよ"
translation = "이제 아주 익숙한 풍경이야."

[[dialogue]]
speaker = "unk"
original = "大丈夫、最近はずっとこの調子だから"
translation = "괜찮아, 요즘은 계속 이 모양이니까."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ケンカするほど仲がいい、そういうことね！」"
translation = "「싸우면서 정든다는 게 바로 이런 거네!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「いい風に纏めないでくれませんか？\u3000別に心を許した証拠にケンカしているというわけではありませんから」"
translation = "「좋게 포장하지 말아 줄래요? 딱히 마음을 열었다는 증거로 싸우는 건 아니니까요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はいはい、わかってるわよ」"
translation = "「네네, 알고 있어.」"

[[dialogue]]
speaker_original = "クマロボ"
speaker_translation = "곰 로봇"
original = "「クマァーーーーーーーーーー！！！！！！」"
translation = "「쿠마아아아아아아아아아아!!!!!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「っ！！？」"
translation = "「!!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「また来たのか？」"
translation = "「또 온 거야?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ダメくまーーー！！\u3000もっと盛り上がってくれないとつんまらないっくまーー！！！」"
translation = "「안 된다곰! 더 신나게 놀아주지 않으면 심심하다곰!!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたは！」"
translation = "「당신은!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「出たわね、黒ベア子！」"
translation = "「나타났구나, 흑베아코!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふぅん、こいつが今回の異変の元凶なのか。このフォームをくれたのはおまえなんだったら、それは感謝しなくもないけど……」"
translation = "「흐음, 이 녀석이 이번 이변의 원흉인가. 이 폼을 준 게 너라면 그건 고맙지 않은 건 아니지만……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「別世界に行ったあたしたちの仲間は返してもらわないといけないな！」"
translation = "「다른 세계로 간 우리 동료들은 돌려받아야겠어!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あたしたちも元の世界に返してねっ！」"
translation = "「우리도 원래 세계로 돌려보내 줘!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「あなたの召喚するクマロボでは、私たちは倒せませんよ。いい加減観念したらどうですか？」"
translation = "「당신이 소환하는 곰 로봇으로는 우리를 쓰러뜨릴 수 없어요. 이쯤에서 포기하는 게 어때요?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「む～～～～～～っ！！！！」"
translation = "「으으으으으!!!!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「まだまだ足りないよっ！\u3000もっと楽しくするくまっ！！！」"
translation = "「아직 한참 부족해! 더 즐겁게 만들 거다곰!!!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「む～～～～～、くま～～～～～ぁぁ！！！」"
translation = "「으으으으으, 쿠마아아아아아!!!」"

[[dialogue]]
speaker_original = "クマロボ"
speaker_translation = "곰 로봇"
original = "「グッマァーーーーーーーーーー！！！！！！」"
translation = "「구마아아아아아아아아아아!!!!!!」"

[[dialogue]]
speaker = "unk"
original = "また出てきた！"
translation = "또 나왔어!"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「今度は数が多いよ！」"
translation = "「이번엔 수가 많아!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「さすがに……私も見ているわけにはいかなそうですね」"
translation = "「과연…… 저도 구경만 하고 있을 수는 없겠네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「散らばらないように出来るだけ近くに固まって」"
translation = "「흩어지지 않게 최대한 가까이 뭉쳐요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「息を合わせて攻撃だ！」"
translation = "「호흡을 맞춰서 공격이다!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「わかったよ！」"
translation = "「알았어!」"

[[dialogue]]
speaker = "unk"
original = "背中に隙を作らないように、円陣を作って大量のクマロボに対抗する。"
translation = "등 뒤에 빈틈을 만들지 않도록 원진을 짜서 대량의 곰 로봇에 대항한다."

[[dialogue]]
speaker = "unk"
original = "確かに数は多い。けれど、数が多いだけなら問題ない。"
translation = "확실히 수는 많다. 하지만 수가 많을 뿐이라면 문제없다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ローズブレード！」"
translation = "「로즈 블레이드!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「プトラアターック！」"
translation = "「푸트라 어택!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「２人ともすっかり、こっちでの戦い方が板についたみたいですね」"
translation = "「두 분 다 완전히 이곳에서의 전투 방식이 몸에 밴 것 같네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私たちも負けてられないわね！」"
translation = "「우리도 질 수 없지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだな！\u3000ユニゾンアタック、行くぞっ！！！」"
translation = "「그래! 유니존 어택, 간다!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「アルティメットバーン！」"
translation = "「얼티밋 번!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「がうがううっ……いっぱい連れてきたのに、どんどんやられちゃう！！」"
translation = "「가우가우우…… 잔뜩 데려왔는데 자꾸 당해버려!!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「こうなったら、最後の切り札なんだっくま！！！」"
translation = "「이렇게 된 이상 마지막 히든카드다곰!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「む、あいつ何かやってくる気だ、気を付けろ！」"
translation = "「음, 저 녀석 뭔가 하려는 모양이야, 조심해!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「いでよ、きょ～～っだいクッマロボーーーっ！！！！！」"
translation = "「나와라, 거어어어대 곰 로보오오오오!!!!!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「グマァアアアアアア！！！！」"
translation = "「구마아아아아아아아!!!!」"

