[[dialogue]]
speaker = "unk"
original = "第４話,妹魔王の素直な気持ち,P"
translation = "제4화, 여동생 마왕의 솔직한 마음, P"

[[dialogue]]
speaker = "unk"
original = "遊園地デートから少し経った、とある休日。"
translation = "놀이공원 데이트로부터 얼마 지나지 않은 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "その日は、メイプルが俺の家へと遊びに来ていたのだが――"
translation = "그날은 메이플이 우리 집에 놀러 와 있었는데――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃん♪」"
translation = "「오빠♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今日は１日、家に２人きりなんでしょ？\u3000ってことは～」"
translation = "「오늘은 하루 종일 집에 둘뿐이지? 그렇다는 건~」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「人目を気にせず、イチャイチャし放題だね♪\u3000にへへへ<emoji=heart04>」"
translation = "「남의 눈치 안 보고 꽁냥꽁냥 마음껏 할 수 있겠네♪ 니헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソファーに２人で落ち着いて間もなく、メイプルは無防備に俺の腕へと抱き着いてくる。"
translation = "소파에 둘이서 자리를 잡자마자 메이플은 무방비하게 내 팔에 매달려 온다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「じ～っ……」"
translation = "「빤히――……」"

[[dialogue]]
speaker = "unk"
original = "と、メイプルが上目遣いで俺の顔を見つめてきて――"
translation = "메이플이 치켜뜬 눈으로 내 얼굴을 올려다보며――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ねぇ、お兄ちゃん……もしかして、あたしにくっ付かれて、ドキドキしてくれてる？」"
translation = "「저기, 오빠…… 혹시 나랑 달라붙어서 두근거리고 있어?」"

[[dialogue]]
speaker = "unk"
original = "そ、それは……"
translation = "그, 그건……"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あっ、その顔、やっぱりそうなんだ～？」"
translation = "「앗, 그 표정, 역시 그렇구나~?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にへへ<emoji=heart04> お兄ちゃんがあたしにドキドキしてくれてるの、嬉しい<emoji=heart04>」"
translation = "「니헤헤<emoji=heart04> 오빠가 나 때문에 두근거려 주니까 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "에!?"

[[dialogue]]
speaker = "unk"
original = "この前の遊園地もそうだが、てっきりメイプルは俺のことを『お兄ちゃん』と呼んで、兄妹ごっこの感覚で甘えているのだと思っていた。"
translation = "지난번 놀이공원 때도 그랬지만, 메이플은 나를 『오빠』라고 부르며 남매 놀이 하는 기분으로 응석 부리는 거라고만 생각했다."

[[dialogue]]
speaker = "unk"
original = "でも、もしそうじゃないのだとしたら──"
translation = "하지만 만약 그렇지 않다면──"

[[dialogue]]
speaker = "unk"
original = "俺が頭の中でモヤモヤと考えている内に、メイプルが隣でテレビをつけ始める。"
translation = "내가 머릿속으로 번뇌하는 사이 메이플이 옆에서 TV를 켜기 시작한다."

[[dialogue]]
speaker = "unk"
original = "すると――"
translation = "그러자――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あっ！\u3000観て観て、お兄ちゃん！\u3000紅明先輩が出てる！」"
translation = "「앗! 봐봐 봐봐, 오빠! 코우메이 선배가 나오고 있어!」"

[[dialogue]]
speaker = "unk"
original = "テレビでは、流星市国を代表するタレントとして有名な紅明が、最近話題の観光スポットとして『リゾート結界』を紹介するという番組が放送されていた。"
translation = "TV에서는 유성시국을 대표하는 탤런트로 유명한 코우메이가 최근 화제인 관광 스폿으로 『리조트 결계』를 소개하는 방송이 나오고 있었다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「こうしてテレビ越しで観ると、紅明先輩って芸能人なんだな～って改めて実感するよね」"
translation = "「이렇게 TV로 보니까 코우메이 선배가 연예인이라는 게 새삼 실감 나네」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「面白くて人気者で、すごく美人だし……む～っ」"
translation = "「재밌고 인기 많고, 엄청 미인이고…… 으음~」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「紅明先輩……お兄ちゃんのこと、ダーリンって呼ぶんだよね……」"
translation = "「코우메이 선배…… 오빠를 달링이라고 부르지……」"

[[dialogue]]
speaker = "unk"
original = "メイプル……？"
translation = "메이플……?"

[[dialogue]]
speaker = "unk"
original = "そこで彼女を見やると、なにやら頬を可愛くぷく～っとむくれさせていた。"
translation = "그녀를 바라보니 왠지 볼을 귀엽게 빵빵하게 부풀리고 있었다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「おっぱいだって、すごく大きいし……」"
translation = "「가슴도 엄청 크고……」"

[[dialogue]]
speaker = "unk"
original = "もしかして……紅明に焼き餅焼いてるの？"
translation = "설마…… 코우메이한테 질투하는 거야?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……だって、お兄ちゃんと仲良さそうなんだもん」"
translation = "「……그치만 오빠랑 사이좋아 보이는걸」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしは胸、全然大きくならないし……」"
translation = "「나는 가슴, 전혀 커지지 않고……」"

[[dialogue]]
speaker = "unk"
original = "ちょっとしゅんとなりながら、そんなことを言うメイプル。俺はそんなメイプルの頭に、そっと手を置いた。"
translation = "조금 시무룩해하며 그런 말을 하는 메이플. 나는 그런 메이플의 머리에 살며시 손을 얹었다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃん……？」"
translation = "「오빠……?」"

[[dialogue]]
speaker = "unk"
original = "俺は、メイプルが好きなんだ"
translation = "나는 메이플이 좋아"

[[dialogue]]
speaker = "unk"
original = "だから……胸の大きさなんて気にしない。"
translation = "그러니까…… 가슴 크기 같은 건 신경 안 써."

[[dialogue]]
speaker = "unk"
original = "くっつくとドキドキするのはメイプルだけだ。他の誰でもない、メイプルだけに好きだと思ってもらいたい。"
translation = "달라붙었을 때 두근거리는 건 메이플뿐이야. 다른 누구도 아닌 메이플만이 나를 좋아한다고 생각해 주면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "だけど、お兄ちゃんみたいだと思ってた男の人に、急にそんなことを言われたら、女の子は怖いと思う。"
translation = "하지만 오빠 같다고 생각했던 남자가 갑자기 그런 말을 하면 여자애는 무서울 거라고 생각해."

[[dialogue]]
speaker = "unk"
original = "だから今は、色々我慢してるだけなんだ。メイプルに、かっこいいお兄ちゃんで、かっこいい男の人だって、思われたかったから。"
translation = "그래서 지금은 여러모로 참고 있을 뿐이야. 메이플에게 멋진 오빠이자 멋진 남자로 보이고 싶었으니까."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃん……」"
translation = "「오빠……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「前にさ、あたしのこと妹じゃなくて、可愛い女の子だと思ってるって……言ってくれたでしょ？」"
translation = "「전에 말이야, 나를 여동생이 아니라 귀여운 여자애로 생각한다고…… 말해줬지?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あれから、一緒に過ごす中で、あたしも……」"
translation = "「그 후로 같이 지내면서 나도……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃんのこと、少しずつ男の人として意識、するようになってきた……というか」"
translation = "「오빠를 조금씩 남자로 의식하게 되었다고 할까……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そ、それでね……機会があれば、改めてその話がしたいなって……ずっと、思ってたの」"
translation = "「그, 그래서 말이야…… 기회가 되면 다시 그 이야기를 하고 싶다고…… 계속 생각했어」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「でも、いざ自分から言おうと思うと、なかなか言い出せなくて……」"
translation = "「하지만 막상 직접 말하려고 하니까 좀처럼 말이 안 나와서……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だから、クルセイダーフォームの『お兄ちゃんに甘えたい』効果が、気持ちの後押しになってくれたらって思って……」"
translation = "「그래서 크루세이더 폼의 『오빠에게 응석 부리고 싶다』는 효과가 마음을 밀어주는 계기가 됐으면 해서……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「最近はお兄ちゃんの前でだけ、わざとずっとあの格好になってたんだ……」"
translation = "「최근엔 오빠 앞에서만 일부러 계속 그 복장을 하고 있었던 거야……」"

[[dialogue]]
speaker = "unk"
original = "そこまで言ってから、彼女は１度、深呼吸をして――"
translation = "거기까지 말하고 그녀는 한 번 깊은숨을 내쉬고는――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……お兄ちゃん。あたしね――」"
translation = "「……오빠. 나는 말이야――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃんのことが大好き」"
translation = "「오빠를 정말 좋아해」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だから……改めて、あたしの恋人になって欲しいです」"
translation = "「그러니까…… 다시 한번, 내 연인이 되어주세요」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……ダメ、かな？」"
translation = "「……안 될, 까?」"

[[dialogue]]
speaker = "unk"
original = "そんなわけない。俺でよければ、喜んで"
translation = "그럴 리가 없잖아. 나라도 괜찮다면 기꺼이"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うんっ♪\u3000ありがとう、お兄ちゃん<emoji=heart04>」"
translation = "「응! 고마워, 오빠<emoji=heart04>」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「にへへっ♪」"
translation = "「니헤헤♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ねぇ、お兄ちゃん……」"
translation = "「저기, 오빠……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「その……これであたしたち、恋人同士になった、んだよね？」"
translation = "「그게…… 이제 우리 연인 사이가 된 거지?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それなら１つ、お願いごとしても、いいかな……？」"
translation = "「그렇다면 한 가지 부탁해도 될까……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「えっと、あのぉ…………キス、とかさ。ダメかな？」"
translation = "「저기, 그러니까………… 키스, 라든가. 안 될까?」"

[[dialogue]]
speaker = "unk"
original = "き、キス！？"
translation = "키, 키스!?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「や、やっぱり、いきなり過ぎたかな！？\u3000でも、この衣装のせいなのかもしれないんだけど――」"
translation = "「역, 역시 너무 갑작스러웠나!? 하지만 이 옷 때문일지도 모르겠는데――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今、すごくお兄ちゃんに甘えたくて、我慢できなくなっちゃってて……<emoji=heart04>」"
translation = "「지금 너무 오빠한테 응석 부리고 싶어서 참을 수 없게 돼버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして、もじもじしながらそんな風に言われてしまったら、断れるはずもなく。"
translation = "얼굴을 붉히며 머뭇거리며 그렇게 말하니 거절할 수 있을 리가 없었다."

[[dialogue]]
speaker = "unk"
original = "……本当にしてもいい？"
translation = "……정말 해도 돼?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うんっ<emoji=heart04>」"
translation = "「응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の両肩に手を置くと、ゆっくりと顔を近づけて――"
translation = "나는 그녀의 양어깨에 손을 올리고 천천히 얼굴을 가까이 가져가――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「んっ<emoji=heart04>\u3000お兄ちゃん……<emoji=heart04>」"
translation = "「응<emoji=heart04> 오빠……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちゅっ<emoji=heart04>」"
translation = "「츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そっとキスをした。"
translation = "살며시 키스했다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん……<emoji=heart04>\u3000ちゅっ、ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄, 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「はあぁ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きだ、メイプル"
translation = "사랑해, 메이플"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あたしも、大好き……<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>」"
translation = "「나도 정말 좋아해……<emoji=heart04> 오빠<emoji=heart04>」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「んっ<emoji=heart04>\u3000……ちゅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> ……츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも俺たちは、初めて余韻がなかなか冷めやらなくて。"
translation = "그 후로도 우리는 처음 느끼는 여운이 좀처럼 가시지 않아서."

[[dialogue]]
speaker = "unk"
original = "どれだけ時間が経っているのかもわからなくなるくらい、夢中でキスを繰り返してしまうのだった――"
translation = "얼마나 시간이 흘렀는지도 모를 정도로 정신없이 키스를 반복했다――"

