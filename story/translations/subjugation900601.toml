[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「子ども会のクリスマスパーティーの料理とその材料のリストです。特製スパイスを使った七面鳥のローストがメインの予定です」"
translation = "「어린이회 크리스마스 파티 요리와 그 재료 리스트입니다. 특제 스파이스를 사용한 칠면조 로스트가 메인이 될 예정입니다.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ありがとうございます。予算は……問題なさそうですね」"
translation = "「감사합니다. 예산은…… 문제없을 것 같네요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ですが子ども会なので、刺激が強すぎるのは避けた方がよいかもしれません」"
translation = "「하지만 어린이회니까 자극이 너무 강한 것은 피하는 편이 좋을지도 모르겠습니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ですので試食を用意しました。こちらでいかがでしょう？」"
translation = "「그래서 시식을 준비했습니다. 이 정도면 어떨까요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「頂きます。どれどれ……ええ、これなら問題ないですね。とても美味しいです」"
translation = "「잘 먹겠습니다. 어디 어디…… 네, 이거라면 문제없겠네요. 아주 맛있어요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゃ～んっ、子ども会用のクリスマスケーキのスケッチだよ～♪」"
translation = "「짠~, 어린이회용 크리스마스 케이크 스케치야~♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「おおっ、なんと見事な……！\u3000食べるのがもったいないくらいです。これなら子どもたちも喜ぶこと間違いなしですね！」"
translation = "「오오, 정말 훌륭한……! 먹기가 아까울 정도예요. 이 정도라면 아이들도 기뻐할 것이 틀림없겠네요!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ～、そう言ってくれると嬉しいな～」"
translation = "「에헤헤~ 그렇게 말해주니 기쁘네~」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「蛍火さま、サランさま。この度はご助力いただき本当にありがとうございます」"
translation = "「케이카 님, 사란 님. 이번에 도움을 주셔서 정말로 감사합니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「いえ、むしろ有り難いです。こういった場で腕を振るうことこそ料理人の本懐でありますので」"
translation = "「아니요, 오히려 감사할 따름입니다. 이런 자리에서 솜씨를 발휘하는 것이야말로 요리사의 본연의 자세니까요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「楽しいクリスマスパーティーにしようね～♪\u3000サランも腕によりをかけてお菓子を作るから～♪」"
translation = "「즐거운 크리스마스 파티로 만들자구~♪ 사란도 온 힘을 다해서 과자를 만들 테니까~♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はいっ、もちろん！\u3000子どもたちのため、女神様へ愛を伝えるため、必ずや聖誕祭を成功させましょう！」"
translation = "「네, 물론이죠! 아이들을 위해, 여신님께 사랑을 전하기 위해, 반드시 성탄제를 성공시킵시다!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いえ～～♪」"
translation = "「예이~~♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "（シャロンさんの圧が強い……ついていけるサランさんもさすがです……）"
translation = "（샤론 씨의 기세가 강하네요…… 따라가는 사란 씨도 대단하군요……）"

[[dialogue]]
speaker = "unk"
original = "イレーナとシャロンを中心に、子ども会のクリスマスパーティーの準備を進める面々。"
translation = "이레이나와 샤론을 중심으로 어린이회 크리스마스 파티 준비를 진행하는 일행."

[[dialogue]]
speaker = "unk"
original = "本番のパーティーも、この布陣なら間違いなく素敵なものになるだろうな。"
translation = "본편 파티도 이 진용이라면 틀림없이 멋진 행사가 되겠지."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぅ……食材関係の手配はだいたい済んだわね。みんな帰ったからようやく気を抜けるわ」"
translation = "「후우…… 식재료 관계 수배는 대충 끝났네. 다들 돌아갔으니 이제야 긴장을 풀 수 있겠어.」"

[[dialogue]]
speaker = "unk"
original = "教皇庁主催だからもっと厳格な会かと思った"
translation = "교황청 주최라서 더 엄격한 모임일 줄 알았어."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「確かに教皇庁内じゃ、もっと粛々にって声もあるけどね。でも子どもたちに固いこと言っても嫌われるだけよ」"
translation = "「확실히 교황청 내에서는 좀 더 엄숙하게 하라는 목소리도 있지만 말이야. 하지만 아이들한테 딱딱한 소리 해봤자 미움만 살 뿐이야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あくまでこれは子どもたちのためのクリスマスパーティーなんだから。明るく楽しませてあげるのが正解でしょ？」"
translation = "「어디까지나 이건 아이들을 위한 크리스마스 파티니까. 밝고 즐겁게 해주는 게 정답이잖아?」"

[[dialogue]]
speaker = "unk"
original = "ところでその格好……"
translation = "그런데 그 차림은……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふふん、どうかしら？\u3000せっかくならクリスマスらしい装いをと思って調整してみたの♪」"
translation = "「후훗, 어때? 이왕이면 크리스마스다운 복장으로 하고 싶어서 조정해 봤어♪」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「クリスマスといえばサンタだものね。まぁどうしてだか何度調整しても衣装が黒く染まっちゃうんだけど……」"
translation = "「크리스마스라면 산타니까 말이야. 뭐, 어째서인지 몇 번을 조정해도 의상이 검게 물들어 버리지만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもでも可愛いでしょ♪\u3000ここまで仕上げるのに結構苦労したのよ♪」"
translation = "「그래도 그래도 귀엽지♪ 여기까지 완성하는 데 꽤 고생했다구♪」"

[[dialogue]]
speaker = "unk"
original = "……性夜でも届けにでも行くつもり？"
translation = "……<ruby>성야<rt>性夜</rt></ruby>라도 배달하러 갈 생각이야?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んなわけあるかっ！\u3000なに想像してるのよ、このエロ魔王！」"
translation = "「그럴 리가 없잖아! 뭘 상상하는 거야, 이 에로 마왕!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「素晴らしいですっ」"
translation = "「훌륭합니다!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひぃあっ！？\u3000シャロ──シスターシャロン！？\u3000まだおられたのですか？」"
translation = "「히익!? 샤로── 시스터 샤론!? 아직 계셨던 건가요?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「素晴らしいです、イレーナさま！\u3000聖誕祭へのその意気込み、女神様にもしかと伝わっておりますよっ！」"
translation = "「훌륭합니다, 이레이나 님! 성탄제를 향한 그 의욕, 여신님께도 분명히 전해졌을 거예요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「い、いえ、私はそんなつもりでは……。単にクリスマスらしい気分をと……」"
translation = "「아, 아니요, 저는 그런 의도로는……. 단순히 크리스마스 기분을 좀 내보려고……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「つまり子どもたちと同じ目線に立とうとなさって！\u3000流石は聖女さまですっ。私も見習わなくてはっ」"
translation = "「즉 아이들과 같은 눈높이에 서려고 하신 거군요! 역시 성녀님다우세요. 저도 본받아야겠습니다!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、あはは……恐縮です……」"
translation = "「아, 아하하…… 과찬이세요……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（この子、いつになくテンション高いわね。勢いに磨きがかかってるわ……）"
translation = "（이 아이, 평소보다 텐션이 높네. 기세가 더 올랐어……）"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私もイレーナさまのようにパーティーに相応しい装いをできればよいのですが。このような感じでしょうか……むんっ」"
translation = "「저도 이레이나 님처럼 파티에 어울리는 차림을 할 수 있으면 좋으련만. 이런 느낌일까요…… 얍!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はぅ、上手くいきません……」"
translation = "「하우, 잘 안 되네요……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「精緻な星力操作が必要になる作業ですからね。かく言う私もいささか露出の多い衣装になってしまいましたし……」"
translation = "「정밀한 성력 조작이 필요한 작업이니까요. 그러고 보니 저도 다소 노출이 많은 의상이 되어버렸고……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえ、きっと私の女神様への愛が足りないせいですよ！\u3000浮かれる前に子どもたちのため、女神様のため、まずは聖誕祭の準備をしろと天が仰っているのです！」"
translation = "「아니요, 분명 제 여신님을 향한 사랑이 부족한 탓이에요! 들뜨기 전에 아이들을 위해, 여신님을 위해, 우선은 성탄제 준비를 하라고 하늘이 말씀하시는 거예요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そ、そうですか。ならどうか頑張ってくださ──」"
translation = "「그, 그런가요. 그럼 부디 힘내주세──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「共に参りましょう、イレーナさま！\u3000必ずやクリスマスパーティーを成功させるのです！」"
translation = "「함께 가시죠, 이레이나 님! 반드시 크리스마스 파티를 성공시키는 겁니다!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっ！？\u3000引っ張らないでくださいっ、私は神官の仕事が残って──」"
translation = "「잠깐!? 잡아당기지 마세요, 저는 신관 업무가 남아서──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「きゃあ～～～～っ！？」"
translation = "「꺄아아아아악!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ぜぇぜぇ……。いろいろやらされて疲れた……」"
translation = "「제제…… 이것저것 휘둘려서 지쳤어……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「シャロンってば、いつにも増して張り切りすぎよ……。振り回されるこっちの身にもなって欲しいわ……」"
translation = "「샤론 녀석, 평소보다 훨씬 더 의욕이 앞선다니까……. 휘둘리는 내 입장도 좀 되어달라구……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ……できることならめんどくさい企画側じゃなくて、参加側に立ちたかったわ……」"
translation = "「하아…… 할 수 있다면 귀찮은 기획 측이 아니라 참가 측에 서고 싶었어……」"

[[dialogue]]
speaker = "unk"
original = "子ども苦手そうだもんな"
translation = "아이들을 별로 안 좋아하는 것 같네."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……ふふ、いいことを思いついたわ。あたしがソリに乗って子どもたちにプレゼントを配るの。もちろんソリを引くトナカイ役はあんたね♪」"
translation = "「……후후, 좋은 생각이 났어. 내가 썰매를 타고 아이들에게 선물을 나눠주는 거야. 물론 썰매를 끄는 루돌프 역은 너야♪」"

[[dialogue]]
speaker = "unk"
original = "どうかお慈悲を……！"
translation = "부디 자비를……!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ったくもう……。ただでさえ今日は猫被って疲れたってのに、余計なツッコミ入れさせんじゃないわ」"
translation = "「참 나…… 가뜩이나 오늘은 내숭 떠느라 지쳤는데, 쓸데없는 소리나 하게 만들고 말이야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ～パネットーネ食べたーい。準備なんかしないでパーティーだけ楽しみたーい」"
translation = "「아~ 파네토네 먹고 싶다. 준비 같은 거 안 하고 파티만 즐기고 싶어.」"

[[dialogue]]
speaker = "unk"
original = "食べればいいじゃないか"
translation = "먹으면 되잖아."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あのね、パネットーネは普通のパンとは違うの。あたしもよく知らないけど、昔ながらのやり方で作った種を使うんだって。あと発酵にも時間がかかるし」"
translation = "「저기 말이야, 파네토네는 보통 빵이랑은 달라. 나도 잘은 모르지만, 옛날 방식 그대로 만든 효모를 쓴대. 게다가 발효에도 시간이 걸리고.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「母さんのパネットーネが恋しいわ。この時期になると作ってくれたっけ」"
translation = "「엄마의 파네토네가 그립네. 이 시기가 되면 만들어 주시곤 했거든.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うちの地元ではね、クリスマスといえばパネットーネだったの。自作のパネットーネを親しい友人に配るのが慣習でね」"
translation = "「우리 고향에서는 크리스마스라고 하면 파네토네였어. 직접 만든 파네토네를 친한 친구에게 나눠주는 게 관습이었지.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、自作っていっても、あたしは母さんを手伝うくらいだったけど」"
translation = "「뭐, 직접 만든다고 해도 나는 엄마를 돕는 정도였지만.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ～あ、きっと地元では今頃パネットーネを交換し合ってるんだろうなー。あたしもクリスマスパーティーの準備より、そっちに混ざりた──」"
translation = "「아~아, 분명 고향에서는 지금쯤 파네토네를 서로 교환하고 있겠지. 나도 크리스마스 파티 준비보다 그쪽에 섞이고 싶──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あっ、イレーナさま！\u3000こちらにいらっしゃったのですね！」"
translation = "「앗, 이레이나 님! 여기 계셨군요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（げっ、もう見つかった……！）"
translation = "（게흑, 벌써 들켰어……!）"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「大聖堂で何をされていたのですか？\u3000お掃除ですか？\u3000説法の練習ですか？\u3000私もお手伝いしますっ」"
translation = "「대성당에서 무엇을 하고 계셨나요? 청소인가요? 설법 연습인가요? 저도 돕겠습니다!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「い、いえ、トナカイ──じゃなくて、会長さんと子どもたちへのプレゼントを買いに行く予定を立てていたところでして」"
translation = "「아, 아니요, 루돌프──가 아니라, 회장님이랑 아이들에게 줄 선물을 사러 갈 계획을 세우던 참이었어요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「素晴らしいですっ。ぜひ私もお供させてください！」"
translation = "「훌륭합니다! 부디 저도 동행하게 해주세요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（ぐっ……！\u3000サボらせてもらえない……！）"
translation = "（윽……! 땡땡이칠 수도 없네……!）"

