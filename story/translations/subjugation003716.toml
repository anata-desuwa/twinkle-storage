[[dialogue]]
speaker = "unk"
original = "第１６話,愛おしい世界の形（中編）,B"
translation = "제16화, 사랑스러운 세계의 형태 (중편), B"

[[dialogue]]
speaker = "unk"
original = "場所は変わって──平行世界アルタイル。"
translation = "장소는 바뀌어── 평행세계 알타이르."

[[dialogue]]
speaker = "unk"
original = "デネブからやってきたグレイスたちは、緋宮クロトによって案内された場所で待機していた。"
translation = "데네브에서 건너온 그레이스 일행은 히노미야 쿠로토에 의해 안내된 장소에서 대기하고 있었다."

[[dialogue]]
speaker = "unk"
original = "新星学園の会議室では、グレイスが１人。"
translation = "신성 학원의 회의실에는 그레이스가 혼자."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「よぅしっ！\u3000まずはお茶の準備ですねっ！」"
translation = "「좋아! 우선은 차 준비부터네요!」"

[[dialogue]]
speaker = "unk"
original = "かつて軟禁場所として使われていた、新星学園の会議室。"
translation = "예전에 연금 장소로 사용되었던 신성 학원의 회의실."

[[dialogue]]
speaker = "unk"
original = "グレイスにとっては勝手知ったる我が家のようなもの。てきぱきとお湯を沸かし、ティーカップを<b>３つ</b>用意する。"
translation = "그레이스에게는 속속들이 잘 아는 우리 집 같은 곳. 능숙하게 물을 끓이고 찻잔을 <b>3개</b> 준비한다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ふっふっふ。今日この日のために、おいしいお茶の淹れ方はレティシアからばっちり習ってきています！」"
translation = "「훗훗훗. 오늘 이 날을 위해서 맛있는 차 우려내는 법을 레티시아에게 확실하게 배워 왔다고요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お湯の温度、茶葉の量──蒸らす時間にカップの色味のチョイスも完璧！\u3000最高の一杯を出さなくては！」"
translation = "「물의 온도, 찻잎의 양── 우리는 시간과 찻잔의 색감 선택도 완벽! 최고의 한 잔을 내놓아야 해요!」"

[[dialogue]]
speaker = "unk"
original = "張り切るのも当然だった。"
translation = "의욕이 넘치는 것도 당연했다."

[[dialogue]]
speaker = "unk"
original = "グレイスにとって──１０年ぶりの再会なのだから。"
translation = "그레이스에게 있어서── 10년 만의 재회이니까."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あ、あれっ？\u3000あれれっ……？\u3000手が震えてっ……あ、またこぼしちゃいましたっ……」"
translation = "「어, 어레? 어라라……? 손이 떨려서…… 아, 또 쏟아버렸어요……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「こ、こんな調子じゃいけませんねっ！\u3000深呼吸しましょう！」"
translation = "「이, 이런 식으론 안 되죠! 심호흡합시다!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「すー……はー……！\u3000すー……はー……！」"
translation = "「흡…… 하……! 흡…… 하……!」"

[[dialogue]]
speaker = "unk"
original = "しかし、どれだけ落ち着こうとしても手が震えてしまう。ティーポットを持つ手がかたかたと震えて、紅茶がうまく淹れられない。"
translation = "하지만 아무리 진정하려 해도 손이 떨려온다. 티포트를 잡은 손이 달달 떨려서 홍차를 제대로 우려낼 수 없다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「こ、こんな調子じゃいけませんねっ！\u3000『どんな時でも明るく笑え』がオベロニアの教えですっ！」"
translation = "「이, 이런 식으론 안 되죠! 『어떤 때라도 밝게 웃어라』가 오베로니아의 가르침입니다!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「笑顔には自信がありますからね。お父さんたちも、デネブが１０年先の未来だということは魔王さんから聞いているはずですし……！」"
translation = "「미소에는 자신 있으니까요. 아빠들도 데네브가 10년 뒤의 미래라는 건 마왕님께 들었을 테고……!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ばっちり大人のレディに成長したところを見せて、安心してもらわないといけません！」"
translation = "「완벽하게 어른스러운 숙녀로 성장한 모습을 보여서 안심시켜 드려야 해요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「にっこり笑顔で、ばっちりお出迎えしなくてはっ！」"
translation = "「방긋 웃는 얼굴로 확실하게 맞이해야지!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──っ！！」"
translation = "「──!!」"

[[dialogue]]
speaker = "unk"
original = "まだ準備ができていないのに、もう来てしまった──廊下で待たせるわけにはいかない。"
translation = "아직 준비가 덜 됐는데 벌써 와 버렸다── 복도에서 기다리게 할 수는 없다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「…………ど、どうぞ！！」"
translation = "「…………드, 들어오세요!!」"

[[dialogue]]
speaker = "unk"
original = "そうしてやってきたのは、１組の男女だった。"
translation = "그렇게 찾아온 것은 한 쌍의 남녀였다."

[[dialogue]]
speaker = "unk"
original = "見間違えるはずがない。大好きだった、心から尊敬していた両親。"
translation = "잘못 볼 리가 없다. 정말 좋아했던, 진심으로 존경했던 부모님."

[[dialogue]]
speaker = "unk"
original = "グレイス自らの手で埋葬をした両親が──確かに生きて、そこにいる。"
translation = "그레이스 자신의 손으로 매장했던 부모님이── 분명히 살아 움직이며 그곳에 있다."

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「……待たせたね」"
translation = "「……기다리게 했구나」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「星徒会長様から、平行世界の存在を聞いた時は驚きましたが……」"
translation = "「성도회장님으로부터 평행세계의 존재를 들었을 때는 놀랐습니다만……」"

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「ああ。１０年経っていようが……見間違えるわけがない。私たちの──大切な、娘だ」"
translation = "「그래. 10년이 지났어도…… 잘못 볼 리가 없지. 우리의── 소중한 딸이다」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「……グレイス。もっと近くに来て、顔をよく見せてくれますか？」"
translation = "「……그레이스. 좀 더 가까이 와서 얼굴을 자세히 보여주겠니?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あ………………ぁぁぁ………………」"
translation = "「아………………아아아………………」"

[[dialogue]]
speaker = "unk"
original = "──お久しぶりです！\u3000お父さん、お母さん！"
translation = "──오랜만이에요! 아빠, 엄마!"

[[dialogue]]
speaker = "unk"
original = "──平行世界の娘の、グレイスですっ！！"
translation = "──평행세계의 딸인 그레이스입니다!!"

[[dialogue]]
speaker = "unk"
original = "──お父さんやお母さんが胸を張れるような、立派な星騎士に成長したんですよ～！！"
translation = "──아빠나 엄마가 자랑스러워할 만한 훌륭한 성기사로 성장했다고요~!!"

[[dialogue]]
speaker = "unk"
original = "…………用意していた言葉は、何１つ発することができなかった。"
translation = "…………준비했던 말은 단 하나도 내뱉을 수 없었다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──うぁあぁあぁぁぁああっ！！」"
translation = "「──으아아아아아아악!!」"

[[dialogue]]
speaker = "unk"
original = "グレイスは、気づいた時には両親の胸へ飛び込んでいた。"
translation = "그레이스는 정신을 차렸을 때는 부모님의 품으로 뛰어든 뒤였다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「おとうさんっ……おかあさんっ……！！\u3000会いたかった……ずっと、ずっと会いたかったですっ……！！」"
translation = "「아빠…… 엄마……!! 보고 싶었어요…… 계속, 계속 보고 싶었어요……!!」"

[[dialogue]]
speaker = "unk"
original = "父のぬくもり。母のぬくもり。１０年前に取り上げられたそれに触れていると、涙が止まらなかった。"
translation = "아빠의 온기. 엄마의 온기. 10년 전에 빼앗겼던 그것에 닿아 있으니 눈물이 멈추지 않았다."

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「デネブで何があったか。その後の１０年、どう過ごしてきたか……全て新星学園の会長から聞いたよ」"
translation = "「데네브에서 무슨 일이 있었는지. 그 후 10년을 어떻게 지내왔는지…… 전부 신성 학원의 회장에게 들었단다」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「ええ。そして世界を守るために、あなたがどれだけ尽くしたかのかも……本当によく頑張りましたね、グレイス」"
translation = "「그래요. 그리고 세계를 지키기 위해 당신이 얼마나 애썼는지도…… 정말 고생 많았구나, 그레이스」"

[[dialogue]]
speaker = "unk"
original = "両親に頭を撫でられ、褒められて──グレイスの胸がじわりと温かくなる。"
translation = "부모님이 머리를 쓰다듬으며 칭찬해 주자 그레이스의 가슴이 뭉클해진다."

[[dialogue]]
speaker = "unk"
original = "『そうなんですよ！\u3000私、頑張りました！！』"
translation = "『그렇다니까요! 저, 열심히 했어요!!』"

[[dialogue]]
speaker = "unk"
original = "『いっぱい褒めてください！\u3000えっへん！！』"
translation = "『잔뜩 칭찬해 주세요! 에헴!!』"

[[dialogue]]
speaker = "unk"
original = "用意していたはずの言葉は言えず──グレイスは首を横に振った。"
translation = "준비했을 터인 말은 하지 못하고── 그레이스는 고개를 저었다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「違いますっ……違いますっ……私、ほ、褒められるようなこと、してません……！」"
translation = "「아니에요…… 아니에요…… 저, 칭, 칭찬받을 만한 짓 같은 거 하지 않았어요……!」"

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「おや……？」"
translation = "「어라……?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「頑張りましたけど……この１０年っ！\u3000い、いっぱい……お父さんたちとの約束、破りましたっ……！」"
translation = "「열심히는 했지만…… 지난 10년 동안! 마, 많이…… 아빠들과의 약속, 어겼어요……!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「お友達と喧嘩も、いっぱいしましたしっ……授業中に居眠りもしましたっ……お寝坊だって、たくさん……！」"
translation = "「친구랑 싸움도 많이 했고요…… 수업 시간에 꾸벅꾸벅 졸기도 했어요…… 늦잠도 엄청 많이……!」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「あら……？」"
translation = "「어머나……?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ついさっきだって、星徒会のお仕事、うっかりしてて……友達に手伝ってもらって……！」"
translation = "「방금 전만 해도 성도회 업무를 깜빡해서…… 친구가 도와주고……!」"

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「──ふふ。そうだったんだね」"
translation = "「──후후. 그랬었구나」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「あらあら……ふふ。それはいけませんね、グレイス？」"
translation = "「어머 어머…… 후후. 그건 안 되겠는걸요, 그레이스?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はいっ……だから私……魔王さんたちが、言っているような、いい子じゃないですっ……！」"
translation = "「네…… 그러니까 전…… 마왕님 일행이 말하는 것 같은 착한 아이가 아니에요……!」"

[[dialogue]]
speaker = "unk"
original = "たくさん褒めて欲しかった。自慢の娘ですと胸を張りたかった──けれど。"
translation = "잔뜩 칭찬받고 싶었다. 자랑스러운 딸이라고 가슴을 펴고 싶었다── 하지만."

[[dialogue]]
speaker = "unk"
original = "グレイスは、大好きな両親に嘘を吐くことが何よりも嫌だった。"
translation = "그레이스는 사랑하는 부모님께 거짓말을 하는 것이 무엇보다 싫었다."

[[dialogue]]
speaker = "unk"
original = "この１０年間、良いことしかしていなかったわけがない。両親に知られたら、お小言を言われるようなこともたくさんしてしまった。"
translation = "지난 10년간 좋은 일만 했을 리가 없다. 부모님이 알면 잔소리를 들을 만한 일도 잔뜩 저질러 버렸다."

[[dialogue]]
speaker = "unk"
original = "それらを包み隠さず伝えたい。叱られてもいい。自分のことを余さず知って欲しい──それがグレイスの本心だった。"
translation = "그것들을 숨김없이 전하고 싶다. 꾸중을 들어도 좋다. 자신에 대해 남김없이 알아주었으면 한다── 그것이 그레이스의 본심이었다."

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「この子は本当に……」"
translation = "「이 아이는 정말……」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「ええ。隠し事のできない、可愛い子ですね。あなた？」"
translation = "「그래요. 숨기는 걸 못 하는 귀여운 아이네요. 여보?」"

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「グレイス。新星学園の星徒会長さんや……向こうにいるルヴィネさんとも事前に話をしているよ、私たちは」"
translation = "「그레이스. 신성 학원의 성도회장님이나…… 저쪽에 있는 루비네 씨와도 사전에 이야기를 나눴단다, 우리들은」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「そう……なんですか……？」"
translation = "「그……런가요……?」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「ええ。グレイスの良いところも、ちょっぴりいけないところも……全部聞いていますからね」"
translation = "「그래요. 그레이스의 좋은 점도, 조금 안 좋은 점도…… 전부 들었으니까요」"

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「いつも明るくて、賑やかで、奔放で……少し周りを困らせることもあるけれど……」"
translation = "「언제나 밝고 시끌벅적하고 분방해서…… 조금 주변을 곤란하게 할 때도 있지만……」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「安心して背中を任せられる、頼りになる星騎士です──って」"
translation = "「안심하고 등을 맡길 수 있는 믿음직한 성기사라고── 하더구나」"

[[dialogue]]
speaker_original = "グレイスの父"
speaker_translation = "그레이스의 아버지"
original = "「グレイス。本当に立派になったね。お父さんたちの、自慢の娘だ」"
translation = "「그레이스. 정말 훌륭하게 자랐구나. 우리들의 자랑스러운 딸이다」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「────────っ」"
translation = "「────────윽」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「さぁ、お母様からの言いつけですよ？\u3000オベロニアの教えを守りなさい、グレイス──」"
translation = "「자, 어머니의 분부예요? 오베로니아의 가르침을 지키렴, 그레이스──」"

[[dialogue]]
speaker_original = "グレイスの母"
speaker_translation = "그레이스의 어머니"
original = "「……私たちの大好きな、可愛い笑顔を見せてくれますか？」"
translation = "「……우리가 정말 좋아하는 귀여운 미소를 보여주겠니?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ぁ……ぅ……うぅっ……！」"
translation = "「아…… 으…… 으으윽……!」"

[[dialogue]]
speaker = "unk"
original = "グレイスはごしごしと目元を袖でぬぐい──"
translation = "그레이스는 벅벅 눈가를 소매로 훔치고──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「────はい！\u3000お父さん、お母さんっ！！！」"
translation = "「────네! 아빠, 엄마!!!」"

[[dialogue]]
speaker = "unk"
original = "ようやくグレイスは、彼女らしい笑顔を浮かべたのだった。"
translation = "드디어 그레이스는 그녀다운 미소를 띄운 것이었다."

[[dialogue]]
speaker = "unk"
original = "──同刻。"
translation = "──같은 시각."

[[dialogue]]
speaker = "unk"
original = "アルタイルの繁華街──<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>の近くにて。"
translation = "알타이르의 번화가── <ruby>육육반점<rt>로로한텐</rt></ruby> 근처에서."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………っ！」"
translation = "「…………윽!」"

[[dialogue]]
speaker = "unk"
original = "クロトから聞いた待ち合わせ場所に到着したチナは、肉まんがたっぷり詰まった紙袋を持つ両親の姿を捉えた。"
translation = "쿠로토에게 들은 약속 장소에 도착한 치나는 고기만두가 잔뜩 담긴 종이봉투를 든 부모님의 모습을 포착했다."

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「やあ、<b>この前ぶり</b>だね──チナ」"
translation = "「안녕, <b>요 전번</b>만이구나── 치나」"

[[dialogue]]
speaker = "unk"
original = "アルタイル滞在時に、チナは一度両親たちと、偶然の再会を果たしていた。"
translation = "알타이르 체류 시에 치나는 한 번 부모님들과 우연히 재회한 적이 있었다."

[[dialogue]]
speaker = "unk"
original = "その時は素性を隠し、誤魔化していたが──今は状況が違う。"
translation = "그때는 정체를 숨기고 얼버무렸지만── 지금은 상황이 다르다."

[[dialogue]]
speaker = "unk"
original = "１０年未来を進んでいるデネブの娘が会いたがっていると、緋宮クロトが伝えてくれているのだ。"
translation = "10년 미래를 나아간 데네브의 딸이 만나고 싶어 한다고 히노미야 쿠로토가 전해준 것이다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……ど、どうも。その……あの日、偶然出会ったアタシが……その、香堂チナ、なんだ……」"
translation = "「……저, 저기. 그…… 그날 우연히 만났던 내가…… 그게, 코도 치나야……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「魔王から話を聞いた時に……お、驚いた、でしょ……？」"
translation = "「마왕에게 이야기를 들었을 때…… 노, 놀랐지……?」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「驚きは──しなかったかなぁ」"
translation = "「놀라지는── 않았으려나」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「え──」"
translation = "「에──」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「チナとぶつかったあの日……ずーっと何かが引っ掛かってて。お別れした後にね、お父さんと話をしたのよ？」"
translation = "「치나와 부딪혔던 그날…… 계속 뭔가가 걸려서. 헤어진 뒤에 말이야, 아빠랑 이야기를 했거든?」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「さっきの女の子は、もしかしてチナなんじゃないかって」"
translation = "「방금 그 여자애는 혹시 치나가 아닐까 하고」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「う、嘘……？」"
translation = "「거, 거짓말……?」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「本当だよ。根拠はないし、ありえない事だし……２人して何を言ってるんだろうって思いながら──でもね」"
translation = "「정말이야. 근거는 없고 말도 안 되는 일이지만…… 둘이서 무슨 소리를 하는 걸까 생각하면서도── 하지만 말이야」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「面影とか、雰囲気とか……私たちの宝物にそっくりだったんだもの」"
translation = "「모습이라든가 분위기라든가…… 우리 보물하고 똑 닮았었는걸」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「それでこの間、新星の会長から事情を聞いてね──やっぱり、って言っちゃったんだよな」"
translation = "「그래서 얼마 전 신성의 회장님께 사정을 듣고서── 역시나, 하고 말해버렸지 뭐야」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「わかる……もん、なんだ……？\u3000１０年も経ってる、のに……」"
translation = "「알게…… 되는 거구나……? 10년이나 지났는데도……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「当然でしょう。大切な娘のことだもの」"
translation = "「당연하지. 소중한 딸인걸」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「まさか平行世界の、未来のチナだなんてことまでは、わからなかったけどね」"
translation = "「설마 평행세계의 미래의 치나일 거라는 것까지는 몰랐지만 말이야」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「だからもう一度会いたいって、ずっと思っていた──ほら、チナ」"
translation = "「그래서 다시 한번 만나고 싶다고 계속 생각했어── 자, 치나」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「──おいで？」"
translation = "「──이리 오렴?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……おとうさんっ！\u3000おかあさんっ！！」"
translation = "「……아빠! 엄마!!」"

[[dialogue]]
speaker = "unk"
original = "人目も気にせず、チナは両親に抱き着いた。"
translation = "남의 시선도 아랑곳하지 않고 치나는 부모님께 매달렸다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「夢じゃない……あったかい……おとうさん……おかあさん……！！」"
translation = "「꿈이 아니야…… 따뜻해…… 아빠…… 엄마……!!」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「デネブでの……私たちの最期は聞いたよ。傍にいてあげられなくてごめんな、チナ……」"
translation = "「데네브에서의…… 우리의 마지막은 들었단다. 곁에 있어 주지 못해서 미안해, 치나……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「寂しい思いばかりさせて……本当にごめんなさい……」"
translation = "「외로운 생각만 들게 해서…… 정말 미안하구나……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そんなことない……！\u3000世界のために戦ってたお父さんと、お母さんはっ……アタシの、誇りだよっ……！！」"
translation = "「그렇지 않아……! 세계를 위해 싸웠던 아빠랑 엄마는…… 내 자랑이야……!!」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「……嬉しいよ、チナ。お父さんたちの遺志を継いで、立派な星騎士になってくれたんだな」"
translation = "「……기쁘구나, 치나. 아빠들의 유지를 이어받아 훌륭한 성기사가 되어 주었구나」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「会長さんやアナさんから、たくさん聞いていますよ。チナの協力があったからこそ、世界を救うことができたって……」"
translation = "「회장님이나 아나 씨에게 많이 들었단다. 치나의 협력이 있었기에 세계를 구할 수 있었다고……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「本当にびっくり。１０年後のチナが、こんなに素敵な成長を遂げているだなんて……」"
translation = "「정말 깜짝 놀랐어. 10년 뒤의 치나가 이렇게 멋지게 성장했다니……」"

[[dialogue]]
speaker = "unk"
original = "両親から向けられる評価、そして愛情は、チナがずっと欲しいと願っていたもの。"
translation = "부모님으로부터 향하는 평가, 그리고 애정은 치나가 계속 원하던 것이었다."

[[dialogue]]
speaker = "unk"
original = "だからこそチナは、目覚めた同一存在のことが気がかりだった。"
translation = "그렇기에 치나는 눈을 뜬 동일 존재가 걱정되었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……ねぇ。こっちのアタシは……ちゃんと、してるかな……？」"
translation = "「……저기. 이쪽의 나는…… 제대로 하고 있으려나……?」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「……どういう意味？」"
translation = "「……무슨 의미니?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシがデネブに帰ってから、目、醒めてるでしょ……？\u3000また母さんたちに、ワガママばっかり、言ってない……？」"
translation = "「내가 데네브로 돌아가고 나서 눈 떴지……? 또 엄마들한테 억지만 부리고 있지 않아……?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「宿題をさぼったり、朝寝坊したり……」"
translation = "「숙제를 빼먹거나 늦잠을 자거나……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「家の手伝いせずに、ゲームばっかしたり……晩御飯の前に肉まんをつまみ食いして、お腹がいっぱいだとか言って、困らせてない……？」"
translation = "「집안일은 안 돕고 게임만 하거나…… 저녁 먹기 전에 고기만두를 군것질해서 배부르다고 말하며 곤란하게 하지는 않아……?」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「う、う～ん……全部してるかもだなぁ」"
translation = "「으, 으음…… 전부 하고 있을지도 모르겠네」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「やっぱり……！\u3000あ、アタシが説教してやろっか……！？」"
translation = "「역시나! 내, 내가 설교해 줄까……!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「父さんも、母さんも……いてくれて当たり前じゃないんだって……い、言って……やる、よ……！」"
translation = "「아빠도 엄마도…… 곁에 있는 게 당연한 게 아니라고…… 마, 말해 줄게……!」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「あら……ふふふ。今のチナは、全部できてるの？」"
translation = "「어머…… 후후후. 지금의 치나는 전부 잘하고 있니?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あ、当たり前だよ！\u3000アタシ、星徒会の役員なんだから！\u3000寝坊とか遅刻とか、１回もしたことないんだ……！」"
translation = "「다, 당연하지! 나, 성도회 임원인걸! 늦잠이나 지각 같은 거 한 번도 한 적 없어……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「星騎士の訓練があるから、ゲームで夜更かしとかもしない！\u3000成績だって、上位じゃないけど、真ん中くらいにはいるし……！」"
translation = "「성기사 훈련이 있으니까 게임 하느라 밤을 새우지도 않아! 성적도 상위권은 아니지만 중간 정도는 가고……!」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「何だって……あのチナが！？」"
translation = "「뭐라고…… 그 치나가!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そ、そうだよっ。あ、アタシがいなきゃ、うちの星徒会はめちゃくちゃだよ……それくらい、しっかり者なんだ、アタシ……！」"
translation = "「그, 그래! 내, 내가 없으면 우리 성도회는 엉망진창이라니까…… 그 정도로 야무지다구, 나는……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「星徒会、手がかかるやつがいるからさ……そいつの面倒見てるうちに、掃除とか整理整頓とか、得意になっちゃって……！」"
translation = "「성도회에 손이 많이 가는 녀석이 있어서 말이야…… 그 녀석을 돌보다 보니까 청소나 정리 정돈 같은 것도 잘하게 됐고……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「星力が目覚めてもう１０年だから……模擬戦闘とかで教官の代わりだって、務めたり、するし……」"
translation = "「성력이 깨어난 지 벌써 10년이니까…… 모의 전투 같은 데서 교관 대행도 맡고 그런다구……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ずっと頑張ったよ、アタシ……天国にいるお父さんたちに、恥ずかしいって思われないように……ずっとずっと……頑張ったんだ……！」"
translation = "「계속 노력했어, 나…… 천국에 있는 아빠들에게 부끄럽지 않도록…… 계속 계속…… 노력했다구……!」"

[[dialogue]]
speaker = "unk"
original = "──だから。"
translation = "──그러니까."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だから……いっぱい褒めてよ……お父さん、お母さん……！！」"
translation = "「그러니까…… 잔뜩 칭찬해 줘…… 아빠, 엄마……!!」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「……ああ。チナ、よく頑張ったね。本当に……よく頑張った……」"
translation = "「……그래. 치나, 정말 고생 많았구나. 정말로…… 장하다……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「えらいね、チナ……よし、よし……」"
translation = "「착하지, 치나…… 오구오구……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「うぅうぅうううっ……あぁぁああぁああっ……！！！」"
translation = "「으으으으으윽…… 아아아아아아아악……!!!」"

[[dialogue]]
speaker = "unk"
original = "父と母の服を掴み、ぐしゃぐしゃになるほどに強く掴んで、チナは泣いた。"
translation = "아빠와 엄마의 옷을 붙잡고 엉망이 될 정도로 강하게 쥐며 치나는 울었다."

[[dialogue]]
speaker = "unk"
original = "こんなに大粒の涙をこぼしたのは──この人達を土の下に埋めた時以来だと、それだけははっきりわかった。"
translation = "이렇게 커다란 눈물을 흘린 것은── 이 사람들을 땅속에 묻었을 때 이후로 처음이라는 것만은 분명히 알 수 있었다."

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「じゃあ……立派なお姉さんになったチナに、頼み事をしていいかしら？」"
translation = "「그럼…… 훌륭한 언니가 된 치나에게 부탁 하나 해도 될까?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「え……？\u3000う、うん……」"
translation = "「에……? 으, 응……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「あの時にも聞いたと思うけど、もう一度……ねぇチナ。あなたはこれから『お姉さん』になるのよ」"
translation = "「그때도 들었겠지만 다시 한번…… 있잖아 치나. 너는 이제 『언니』가 되는 거란다」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「弟か、妹か、まだわからないけれど──産まれてくるこの子の名前、一緒に考えてくれる？」"
translation = "「남동생일지 여동생일지 아직 모르겠지만── 태어날 이 아이의 이름, 같이 생각해 줄래?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………うんっ！！！」"
translation = "「…………응!!!」"

[[dialogue]]
speaker = "unk"
original = "チナは、この出会いをセッティングしてくれた魔王の少年に、心からの感謝を胸に抱くのだった──"
translation = "치나는 이 만남을 세팅해 준 마왕 소년에게 마음속 깊은 감사를 품는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "──さらに、同刻。"
translation = "──또한, 같은 시각."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトに呼び出された１人の星騎士が、流星星徒会室の扉を叩いた。"
translation = "히노미야 쿠로토에게 호출된 한 성기사가 유성 성도회실의 문을 두드렸다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「し、失礼しますっ、フィオナ星徒会長……！」"
translation = "「시, 실례합니다, 피오나 성도회장님……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ようこそいらっしゃいました、アニュラスさん。急にお呼び立てして申し訳ありません」"
translation = "「어서 오세요, 아뉴라스 씨. 갑자기 불러내서 죄송합니다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「い、いえっ……新星学園の会長から、ここに来るようにと言われたのですが……本日はどのような……？」"
translation = "「아, 아니에요…… 신성 학원의 회장님으로부터 이곳으로 오라는 말을 들었습니다만…… 오늘은 어떤……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ。秘密です」"
translation = "「후후. 비밀입니다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（ま、まずいぞ……いったい何の要件だ？\u3000この間、数学の追試でさらに赤点を取ったことだろうか……？）"
translation = "（크, 큰일이다…… 대체 무슨 용건이지? 지난번 수학 재시험에서 또 낙제점을 받은 것 때문일까……?）"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（成績が赤点のプリマステラは許さないとか言われて、資格を取り上げられたり……！？）"
translation = "（성적이 낙제점인 프리마스텔라는 용서할 수 없다며 자격을 박탈당한다거나……!?）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そんなに緊張しなくても。悪いお報せではありませんから」"
translation = "「그렇게 긴장하지 않으셔도 돼요. 나쁜 소식은 아니니까요」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「は、はぁ……」"
translation = "「하, 하아……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「アニュラスさんにお客様がいらっしゃるんです。星徒会室ならばゆっくり時間が取れるかなと思いまして」"
translation = "「아뉴라스 씨에게 손님이 오셨거든요. 성도회실이라면 느긋하게 시간을 보낼 수 있을 것 같아서요」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お客様、ですか……？」"
translation = "「손님, 말인가요……?」"

[[dialogue]]
speaker = "unk"
original = "アニュラス・セイファートはあの流星の騎士の娘である。故に市国の重要なポストに立つ人物と会ったことも一度や二度ではない。"
translation = "아뉴라스 세이퍼트는 그 유성의 기사의 딸이다. 고로 시국의 중요한 위치에 있는 인물과 만난 것도 한두 번이 아니다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（お父様が亡くなられた直後は、弔問に来る客人も多かったが……はて？）"
translation = "（아버님께서 돌아가신 직후에는 조문을 오는 손님도 많았지만…… 대체 누구지?）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ……お越しになられたようですね。では私は席を外します」"
translation = "「아…… 오신 모양이네요. 그럼 저는 자리를 비켜드리겠습니다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ごゆっくりどうぞ。語らいがすんだときに、またご連絡をください」"
translation = "「천천히 대화 나누세요. 이야기가 끝나면 다시 연락해 주세요」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「な、なんなんだ？\u3000そもそも今日はカフェテリアで、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』討伐の祝勝会の予定なのに──」"
translation = "「뭐, 뭐야? 애초에 오늘은 카페테리아에서 『<ruby>XELOS<rt>제로스</rt></ruby>』 토벌 축승회 예정인데──」"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "「失礼します──」"
translation = "「실례합니다──」"

[[dialogue]]
speaker = "unk"
original = "入室してきたのは──妙齢の女性だった。"
translation = "??? : 입실해 온 것은── 묘령의 여성이었다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……？」"
translation = "「……?」"

[[dialogue]]
speaker = "unk"
original = "すらりと伸びた背筋に、しなやかな足の運び。"
translation = "훤칠하게 뻗은 등과 유연한 발걸음."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（一目見ただけでわかる……達人級の武人だ。しかし、こちらの女性、どこかで見た気が──）"
translation = "（한눈에 봐도 알 수 있어…… 달인급 무인이다. 그런데 이 여성분, 어디선가 본 듯한──）"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（……うちにある、アルバムの中で。そうだ、笑っている──この人を──）"
translation = "（……집에 있는 앨범 속에서. 그래, 웃고 있는── 이 사람을──）"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "「──元気そうね、アニュラス？」"
translation = "「──건강해 보이네, 아뉴라스?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「…………お」"
translation = "「…………어」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「おかあ、さま……？」"
translation = "「어머, 님……?」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「ええ……アニュラス。あなたの母です。正確には、アルタイルではなく、デネブの──ですが」"
translation = "「그래…… 아뉴라스. 네 엄마야. 정확히는 알타이르가 아니라 데네브의── 말이지만」"

[[dialogue]]
speaker = "unk"
original = "アニュラスの母──マルキアは歩み寄り、娘を抱きしめた。"
translation = "아뉴라스의 어머니── 마르키아는 다가와 딸을 안아주었다."

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「辛い思いをたくさんさせてしまってごめんなさい、アニュラス──」"
translation = "「힘든 일을 많이 겪게 해서 미안해, 아뉴라스──」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「あ、ぁぁあ……！」"
translation = "「아, 아아아……!」"

[[dialogue]]
speaker = "unk"
original = "アニュラスは確かにこの女性を知っている。"
translation = "아뉴라스는 분명히 이 여성을 알고 있다."

[[dialogue]]
speaker = "unk"
original = "物心ついた時にはすでに失踪しており……直接、声を交わした記憶はない。"
translation = "철이 들었을 때는 이미 실종된 상태였고…… 직접 목소리를 나눈 기억은 없다."

[[dialogue]]
speaker = "unk"
original = "けれども知っている──この温もりを。香りを──"
translation = "하지만 알고 있다── 이 온기를. 향기를──"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「いい子ね、アニュラス──しっかりパパを見習うのよ」"
translation = "「착한 아이네, 아뉴라스── 아빠를 본받아 훌륭하게 자라야 한다」"

[[dialogue]]
speaker = "unk"
original = "今までおぼろげだった母との記憶が、鮮烈に胸のうちに蘇った──"
translation = "지금까지 희미했던 어머니와의 기억이 강렬하게 가슴속에 되살아났다──"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「会長が……呼んでくれたの、ですね？\u3000デネブから、お母様を……」"
translation = "「회장님이…… 불러주신 거군요? 데네브에서 어머님을……」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「ええ。創造神を討滅した祝勝会──その前にぜひ、アルタイルの貴女に会って欲しいと。嬉しい提案をしてもらったの」"
translation = "「응. 창조신을 토멸한 축승회── 그전에 꼭 알타이르의 너를 만나고 싶다고. 기쁜 제안을 받았단다」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……ずっと会いたいと、願っていました。お母様……」"
translation = "「……계속 만나고 싶다고, 바라고 있었습니다. 어머님……」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「ええ。アニュラス……」"
translation = "「그래. 아뉴라스……」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「──ところで、あなた？\u3000いつまでそこにいるつもりです？」"
translation = "「──그건 그렇고, 당신? 언제까지 거기 있을 셈이죠?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ぇ…………」"
translation = "「어……」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「ごめんなさいね。アルタイルの自分が行ったことを、気にしていて──」"
translation = "「미안하구나. 알타이르의 자신이 저지른 일을 신경 쓰고 있어서──」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お、お父様……？\u3000来ているのですか！？\u3000お父様も！？」"
translation = "「아, 아버님……? 와 계신 건가요!? 아버님도!?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……アニュラス」"
translation = "「……아뉴라스」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「アルタイルの私がしたことは、許されることではない……本来なら、お前に姿を見せるなど、許されることではないかもしれない」"
translation = "「알타이르의 내가 한 짓은 용서받을 수 있는 일이 아니다…… 본래라면, 네게 모습을 보이는 것조차 허락되지 않을지도 모르지」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「だが、どうしても……アルタイルのお前に会いたいと──」"
translation = "「하지만, 아무래도…… 알타이르의 너를 만나고 싶어서──」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「──お父様っ！！！！」"
translation = "「──아버님!!!!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ぬぅっ！？」"
translation = "「누옷!?」"

[[dialogue]]
speaker = "unk"
original = "アニュラスは、デネブからやってきたジェラルド・セイファートの胸へと飛び込んだ。"
translation = "아뉴라스는 데네브에서 건너온 제랄드 세이파트의 품으로 뛰어들었다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「お父様……お父様……！\u3000あぁ……また、声を聞いて、姿を見られるだなんて……！」"
translation = "「아버님…… 아버님……! 아아…… 다시 목소리를 듣고, 모습을 뵐 수 있다니……!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……アニュラス」"
translation = "「……아뉴라스」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「だから言ったでしょう？\u3000この子は昔から、あなたにべったりだったのですから。会いたいに決まっています」"
translation = "「거 봐요, 내가 그랬죠? 이 아이는 예전부터 당신에게 딱 붙어 있었으니까요. 만나고 싶어 하는 게 당연하죠」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……しかし。こちらの私は──」"
translation = "「……하지만. 이곳의 나는──」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「──もう、いいのです」"
translation = "「──이제, 됐어요」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「こちらのお父様とは、別れを交わしていますから……」"
translation = "「이곳의 아버님과는 작별을 고했으니까요……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私は、あの人の名誉を守り、過ちを雪ぐために……剣を振るうと誓いました。ですからデネブのお父様が、気にする必要はありません……」"
translation = "「저는 그분의 명예를 지키고, 과오를 씻기 위해…… 검을 휘두르겠다고 맹세했습니다. 그러니 데네브의 아버님께서 신경 쓰실 필요는 없어요……」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──そうか。私は……アニュラスの逞しさを、見誤っていたようだな……だが、これだけは伝えさせてくれ」"
translation = "「──그런가. 나는…… 아뉴라스의 강인함을 과소평가했던 모양이구나…… 하지만 이것만은 전하게 해다오」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「お前のことを省みることができず……すまなかった。許してくれ、アニュラス……」"
translation = "「너를 돌보지 못해서…… 미안했다. 용서해주렴, 아뉴라스……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……いいのです。もう十分です。私はもう──満たされました」"
translation = "「……괜찮아요. 이제 충분해요. 저는 이제── 채워졌으니까요」"

[[dialogue]]
speaker = "unk"
original = "アニュラスは星騎士となってから、母の行方を探し続けていた。"
translation = "아뉴라스는 성기사가 된 후로 어머니의 행방을 계속해서 찾아다녔다."

[[dialogue]]
speaker = "unk"
original = "そしてリクリエの騒動に関わっていくうちに、母は使徒として平行世界デネブで散ったことを知った。"
translation = "그리고 리크리에 소동에 관여하면서, 어머니는 사도로서 평행세계 데네브에서 스러졌다는 사실을 알게 되었다."

[[dialogue]]
speaker = "unk"
original = "黒騎士となり、堕ちてしまった父の凶行も──新星の会長は、娘であるアニュラスにはそれとなく真実を隠そうとしていたが──知ってしまった。"
translation = "흑기사가 되어 타락해버린 아버지의 흉행도── 신성의 회장은 딸인 아뉴라스에게 넌지시 진실을 숨기려 했지만── 알아버리고 말았다."

[[dialogue]]
speaker = "unk"
original = "しかし、すべて承知の上で──彼女は今日まで折れずに、駆け抜けてきたのだ。"
translation = "하지만 모든 것을 알면서도── 그녀는 오늘까지 꺾이지 않고 달려온 것이다."

[[dialogue]]
speaker = "unk"
original = "これからは過去に囚われることなく。未来を見据え、人々の平和を守る……十全の、流星の騎士となれるように。"
translation = "이제부터는 과거에 얽매이지 않고, 미래를 내다보며 사람들의 평화를 지키는…… 온전한 유성의 기사가 될 수 있도록."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「たくさん、話が聞きたいです……お父様、お母様。幼かった頃の私の話も……デネブの世界のことも……」"
translation = "「하고 싶은 이야기가 정말 많아요…… 아버님, 어머님. 어릴 적의 제 이야기도…… 데네브 세계의 이야기도……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「この後、祝勝会にも出られるのですよね……？\u3000その後は、いつまでアルタイルに……？」"
translation = "「이후에 축승회에도 나오시는 거죠……? 그 후엔 언제까지 알타이르에……?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「極星の星徒会長──ルヴィネより長い休暇を貰っている。お前が満足するまで、付き合おう」"
translation = "「극성의 성도회장── 루비네에게 긴 휴가를 받았다. 네가 만족할 때까지 함께하마」"

[[dialogue]]
speaker_original = "マルキア"
speaker_translation = "마르키아"
original = "「あなた、そんなことを言って大丈夫？\u3000学園長としての仕事は、どんどん溜まっていくのですよ？」"
translation = "「당신, 그런 말을 해도 괜찮아요? 학원장으로서의 업무는 점점 쌓여가고 있다고요?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「え……学園長？」"
translation = "「에…… 학원장요?」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──ああ。今の私の肩書きは、極星学園の学園長だ。何、心配はいらない。アニュラスには寂しい思いをさせてきた」"
translation = "「──아아. 지금 내 직함은 극성학원의 학원장이다. 뭐, 걱정할 것 없다. 아뉴라스에게는 외로운 기분을 느끼게 해왔으니」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「何とかするさ。お前との時間の方が──大切だ」"
translation = "「어떻게든 되겠지. 너와 함께하는 시간이── 더 소중하니까」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「──お父様っ！！」"
translation = "「──아버님!!」"

[[dialogue]]
speaker = "unk"
original = "愛しい人と死に別れた時──ヒトは『やり直したい』と望むのかもしれない。"
translation = "사랑하는 사람과 사별했을 때── 사람은 『다시 시작하고 싶다』고 바라는 것일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "けれどアニュラスは思うのだ。"
translation = "하지만 아뉴라스는 생각한다."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（不幸を呑み込み、それでも前を向いた時にこそ、出会うことのできる『奇蹟』もある──）"
translation = "（불행을 삼키고, 그럼에도 앞을 향했을 때야말로 만날 수 있는 『기적』도 있어──）"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（……ありがとう、会長）"
translation = "（……고마워요, 회장님）"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "（私は今、この上もなく──幸せだ！！）"
translation = "（나는 지금, 더할 나위 없이── 행복해!!）"

