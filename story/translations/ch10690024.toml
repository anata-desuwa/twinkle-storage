[[dialogue]]
speaker = "unk"
original = "第４話,セシアと恋人スキンシップ,P"
translation = "제4화, 세시아와 연인 스킨십, P"

[[dialogue]]
speaker = "unk"
original = "セシアと恋人になってからしばらく経った、ある休日のこと。"
translation = "세시아와 연인이 되고 나서 꽤 시간이 흐른 어느 휴일의 일."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――ねぇ、会長。わたくしたち、恋人になったじゃない？」"
translation = "「──저기, 회장님. 우리들 연인이 됐잖아요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だから、恋人としての体験もちゃんと蓄積しないといけないと思うの」"
translation = "「그러니까 연인으로서의 체험도 제대로 축적해야 한다고 생각해요」"

[[dialogue]]
speaker = "unk"
original = "こ、恋人としての体験というと……？"
translation = "연, 연인으로서의 체험이라 함은……?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ。それはズバリ――」"
translation = "「네. 그건 바로──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「マッサージよ！」"
translation = "「마사지예요!」"

[[dialogue]]
speaker = "unk"
original = "ま、マッサージ！？"
translation = "마, 마사지!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「？\u3000会長、そんなに驚くこと？」"
translation = "「? 회장님, 그렇게 놀랄 일인가요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「恋人同士は男女でマッサージをし合うものらしいから、わたくし、それを体験してみたいわ」"
translation = "「연인끼리는 남녀가 마사지를 주고받는 법이라길래 저도 그걸 체험해 보고 싶어요」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、それはどこで仕入れた情報なのかと尋ねると――"
translation = "참고로 그건 어디서 얻은 정보냐고 묻자──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「もちろん、紅明ママからよ！」"
translation = "「물론 코우메이 마마한테서죠!」"

[[dialogue]]
speaker = "unk"
original = "それは一体、どういう意味でのマッサージなんだ……！？"
translation = "그건 대체 어떤 의미의 마사지인 거야……!?"

[[dialogue]]
speaker = "unk"
original = "そうして、変な想像はしないように気を付けつつ、俺たちはお互いの体をマッサージをすることになった。"
translation = "그렇게 이상한 상상은 하지 않도록 주의하며 우리들은 서로의 몸을 마사지해주기로 했다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――まずは会長からしてくれるの？\u3000じゃあ、お願いするわ♪」"
translation = "「──우선 회장님부터 해주는 건가요? 그럼 부탁할게요♪」"

[[dialogue]]
speaker = "unk"
original = "セシアは全然凝ってないな"
translation = "세시아는 전혀 뭉쳐있지 않네"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ん……♪\u3000会長の手、気持ちいいわ♪\u3000マッサージも上手なのね」"
translation = "「응……♪ 회장님 손, 기분 좋아요♪ 마사지도 능숙하시네요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――前にセラピストのバイトをしてたことがある？\u3000それは面白そうな体験ね。どんな感じだったのか、お話を聞かせて欲しいわ」"
translation = "「──예전에 테라피스트 알바를 한 적이 있다고요? 그건 재밌어 보이는 체험이네요. 어떤 느낌이었는지 이야기를 들려주길 바라요」"

[[dialogue]]
speaker = "unk"
original = "それから俺はバイトをしていた時の話をしつつ、腰や足などもマッサージしていった。"
translation = "그 후 나는 알바를 할 때의 이야기를 하며 허리와 다리 등도 마사지해 나갔다."

[[dialogue]]
speaker = "unk"
original = "俺がマッサージを一通り終えると――"
translation = "내가 마사지를 어느 정도 마치자──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふぅ……♪\u3000会長にマッサージしてもらって、体も気分もリフレッシュできたわ♪」"
translation = "「후우……♪ 회장님께 마사지 받아서 몸도 기분도 리프레시됐어요♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じゃあ次は、わたくしが会長をマッサージする番ね♪」"
translation = "「그럼 다음은 제가 회장님을 마사지할 차례네요♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「一応、ちゃんとやり方は調べて、知識を蓄積してきたのよ」"
translation = "「나름대로 제대로 방법은 조사해서 지식을 축적해 왔다구요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「こんな感じかしら……？\u3000よいしょっと」"
translation = "「이런 느낌일까요……? 영차」"

[[dialogue]]
speaker = "unk"
original = "っ……！"
translation = "윽……!"

[[dialogue]]
speaker = "unk"
original = "意識しないようにしていたつもりだったが、恋人のセシアに触れられていると思うと、なんだか恥ずかしくなって体が熱くなってくる。"
translation = "의식하지 않으려 노력했지만, 연인인 세시아가 만지고 있다고 생각하니 왠지 부끄러워져서 몸이 뜨거워진다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あら？\u3000会長……なんだか顔が赤いわよ？」"
translation = "「어라? 회장님…… 왠지 얼굴이 붉어요?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「熱でもあるのかしら？\u3000ちょっと、じっとしていてね――」"
translation = "「열이라도 있는 걸까요? 잠시만 가만히 있어 보세요──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ん……」"
translation = "「응……」"

[[dialogue]]
speaker = "unk"
original = "セシアは俺のおでこの髪をそっとかき上げると、自分のおでこをぴったりとくっ付けてくる。"
translation = "세시아는 내 이마의 머리카락을 살며시 걷어 올리더니 자신의 이마를 딱 갖다 댄다."

[[dialogue]]
speaker = "unk"
original = "心臓が、ドキッと跳ねた。"
translation = "심장이 쿵 하고 뛰었다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「うん。ちょっと熱いかしら……」"
translation = "「음. 좀 뜨거운 것 같기도……」"

[[dialogue]]
speaker = "unk"
original = "セシアと間近で目が合い、しばらく見つめ合って――"
translation = "세시아와 가까이서 눈이 마주치고 잠시 서로를 바라보다가──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "不意に、セシアの唇が、俺の唇に触れた。"
translation = "불시에 세시아의 입술이 내 입술에 닿았다."

[[dialogue]]
speaker = "unk"
original = "お互いのおでこが離れて――"
translation = "서로의 이마가 떨어지고──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……ふふっ<emoji=heart04>\u3000ファーストキス、というやつね<emoji=heart04>」"
translation = "「……후훗<emoji=heart04> 퍼스트 키스라는 거네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長とキスをしてみたかったから、紅明ママのテクニックを使っちゃったわ<emoji=heart04>」"
translation = "「회장님이랑 키스해보고 싶어서 코우메이 마마의 테크닉을 써버렸어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "も、もしかしてわざと……？"
translation = "혹시 일부러……?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「女の子は、その気もないのに男の子と肌をくっつけあったりしないのよ？\u3000守護天使であっても、ね<emoji=heart04>」"
translation = "「여자애는 그럴 마음도 없는데 남자애랑 살을 맞대거나 하지 않는다구요? 비록 수호천사일지라도 말이죠<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「次は、会長からキスをされる体験も、是非してみたいわ……<emoji=heart04>」"
translation = "「다음은 회장님으로부터 키스 받는 체험도 꼭 해보고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に言われてしまえば、俺も気持ちは抑えられなくなってしまい――"
translation = "그런 말을 들으면 나도 마음을 억누를 수 없게 되어──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あっ<emoji=heart04>\u3000会長……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ちゅっ……<emoji=heart04>\u3000ちゅ、ちゅっ<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 쪽, 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ……<emoji=heart04>\u3000――っはあぁ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> ──하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「すぐにして貰えるなんて思ってなかったけれど、会長からキス……してもらっちゃったわ<emoji=heart04>」"
translation = "「바로 해주실 줄은 몰랐는데 회장님한테 키스…… 받아버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……ねぇ、会長。キスする感覚、まだまだ蓄積不足だから――」"
translation = "「……있죠, 회장님. 키스하는 감각, 아직 축적 부족이니까──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「もう１回、してみてもいいかしら……？」"
translation = "「한 번 더 해봐도 될까요……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じゃあ、今度はわたくしから……」"
translation = "「그럼 이번엔 저부터……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――あっ、そうだわ。キスばかりに意識が行っていて、今日はまだ、大切なことが言えてなかったわ」"
translation = "「──앗, 맞다. 키스에만 정신이 팔려 있어서 오늘은 아직 중요한 말을 못 했어요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あのね、わたくし……」"
translation = "「저기요, 저……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長――あなたのことが大好きよ」"
translation = "「회장님── 당신을 정말 좋아해요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「んっ<emoji=heart04>」"
translation = "「응<emoji=heart04>」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その日、俺たちは何度もキスをして、忘れられない体験として積み重ねるのだった――"
translation = "그날 우리들은 몇 번이고 키스를 하며 잊을 수 없는 체험으로 쌓아 나갔다──"

