[[dialogue]]
speaker = "セドナ"
original = "「本当に……今日は貴様以外いないんだろうな？」"
translation = "「정말로…… 오늘은 네놈 이외에는 없는 거겠지?」"

[[dialogue]]
speaker = "セドナ"
original = "「何って……この前の返事に決まっているだろう！\u3000私をおちょくっているのか！」"
translation = "「뭐냐니…… 저번의 대답인 게 당연하지 않느냐! 나를 놀리는 거냐!」"

[[dialogue]]
speaker = "unk"
original = "その要件とは前回のこと。"
translation = "그 용건이란 지난번의 일."

[[dialogue]]
speaker = "unk"
original = "俺の告白まがいな──個人的にセドナさんを支えると宣言した件についてだ。"
translation = "내 고백 같은── 개인적으로 세드나 씨를 지탱하겠다고 선언한 건에 대해서다."

[[dialogue]]
speaker = "セドナ"
original = "「……いいぞ」"
translation = "「……좋다」"

[[dialogue]]
speaker = "セドナ"
original = "「だから……貴様が勝手に私のそばにいる分には、構わないと言っているのだ！」"
translation = "「그러니까…… 네놈이 멋대로 내 곁에 있는 것 정도는, 상관없다고 말하는 거다!」"

[[dialogue]]
speaker = "セドナ"
original = "「だが……貴様こそわかっているのか？\u3000私と貴様は、あくまでも異なる組織の長だ。外部に与える影響も……」"
translation = "「하지만…… 네놈이야말로 알고 있는 거냐? 나와 네놈은, 어디까지나 서로 다른 조직의 수장이다. 외부로 끼칠 영향도……」"

[[dialogue]]
speaker = "unk"
original = "確かに問題がないとは言えない。"
translation = "확실히 문제가 없다고는 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "だが、それ以上に俺はプライベートな意味で、セドナさんの近くにいたくなってしまった。"
translation = "하지만, 그 이상으로 나는 사적인 의미에서, 세드나 씨의 곁에 있고 싶어지고 말았다."

[[dialogue]]
speaker = "セドナ"
original = "「あくまでも一組の男女として──とは……くっ。よくもそんなセリフを真顔で言えたものだ……」"
translation = "「어디까지나 한 쌍의 남녀로서──라니…… 큭. 용케도 그런 대사를 진지한 얼굴로 내뱉는군……」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ……だが、わかった。こほん。私も──腹はくくってきたつもりだからな。あ、あまりこちらを見つめるな」"
translation = "「아아…… 하지만, 알았다. 흠흠. 나도── 각오는 다지고 온 참이니까 말이다. 너, 너무 이쪽을 빤히 쳐다보지 마라」"

[[dialogue]]
speaker = "unk"
original = "もじもじと頬を赤らめてこちらを睨むセドナさん。"
translation = "우물쭈물하며 뺨을 붉히고 이쪽을 노려보는 세드나 씨."

[[dialogue]]
speaker = "unk"
original = "こんな彼女の表情は滅多に拝めないので、それだけでも告白した甲斐があったと思えた。"
translation = "이런 그녀의 표정은 좀처럼 볼 수 없는 것이기에, 그것만으로도 고백한 보람이 있었다고 생각했다."

[[dialogue]]
speaker = "セドナ"
original = "「っ……いいだろう。それで……今夜は二人きり、だったな。大丈夫だ──意味合いは心得ている。ふう」"
translation = "「윽…… 좋다. 그래서…… 오늘 밤은 단둘이, 라고 했었지. 괜찮다── 의미는 숙지하고 있다. 후우」"

[[dialogue]]
speaker = "セドナ"
original = "「よ、よし──どういう作戦でいけばいい？\u3000作戦じゃない？\u3000え、あっ──ちょっ、待て、少し落ち着いてから──！」"
translation = "「조, 좋아── 어떤 작전으로 가면 되지? 작전이 아니라고? 에, 앗── 잠깐, 기다려, 조금 진정한 뒤에──!」"

[[dialogue]]
speaker = "unk"
original = "俺はセドナさんの手を引いて、彼女の自室へと向かった。"
translation = "나는 세드나 씨의 손을 이끌고 그녀의 방으로 향했다."

[[dialogue]]
speaker = "unk"
original = "最初こそ慌てていたセドナさんだったけれど、自室に入ったことで余裕が生まれたのだろうか。"
translation = "처음에는 당황하던 세드나 씨였지만, 자신의 방에 들어온 것으로 여유가 생긴 것일까."

[[dialogue]]
speaker = "unk"
original = "お前が望むことは何でもしてやろう──威厳たっぷりにそう宣言してくれた彼女に、俺はちょっと変わったプレイを提案してみることにした。"
translation = "네가 바라는 것이라면 무엇이든 해주마── 위엄 넘치게 그렇게 선언해 준 그녀에게, 나는 조금 색다른 플레이를 제안해 보기로 했다."

[[dialogue]]
speaker = "unk"
original = "断られたらそれまでと思っていたのだけれど……"
translation = "거절당하면 그만이라고 생각했었지만……"

[[dialogue]]
speaker = "unk"
original = "──叶ってしまった。"
translation = "──이루어지고 말았다."

[[dialogue]]
speaker = "unk"
original = "仰向けになった俺の上にセドナさんがお尻を落とした恰好。そのまま勃起したペニスを足でシゴいてもらう、倒錯的な前戯だった。"
translation = "천장을 보고 누운 내 위에 세드나 씨가 엉덩이를 내린 자세. 그대로 발기한 자지를 발로 비벼주는, 도착적인 전희였다."

[[dialogue]]
speaker = "セドナ"
original = "「っ……こ──こうしてみると……すごい光景……だな。男が──こんな近くに……」"
translation = "「윽…… 이── 이렇게 보니…… 굉장한 광경……이군. 남자가── 이렇게 가까이에……」"

[[dialogue]]
speaker = "unk"
original = "流石のネビュラ司令官でも初めて見る男性器に、動揺を隠せていない様子だった。"
translation = "과연 네뷸라의 장관이라도 처음 보는 남성기에는 동요를 숨기지 못하는 모양이었다."

[[dialogue]]
speaker = "unk"
original = "あまりに新鮮な彼女の姿に、俺も目の前にある、柔らかそうな女性器から目を離すことができない。"
translation = "너무나 신선한 그녀의 모습에, 나도 눈앞에 있는 부드러워 보이는 여성기에서 눈을 뗄 수가 없다."

[[dialogue]]
speaker = "セドナ"
original = "「ま、待て……っ……私もまだ、心の準備が。ふぅ……お、おい。あまりまじまじと裸を見るな！」"
translation = "「기, 기다려…… 윽…… 나도 아직, 마음의 준비가. 후우…… 어, 어이. 너무 빤히 알몸을 보지 마라!」"

[[dialogue]]
speaker = "unk"
original = "見るなと言われても、そんなことできない。"
translation = "보지 말라고 해도 그럴 수는 없다."

[[dialogue]]
speaker = "unk"
original = "いやらしい香りも嗅いで、どんどん俺のペニスは硬くなっていく。"
translation = "야릇한 향기도 맡으며, 점점 내 자지는 단단해져 간다."

[[dialogue]]
speaker = "セドナ"
original = "「それに……なんだ、その、いきり立った一物は。貴様──そんな顔してそんな凶暴なものを隠し持っていたのか」"
translation = "「게다가…… 뭐냐, 그, 바짝 일어선 물건은. 네놈── 그런 얼굴을 하고 그런 흉포한 것을 숨기고 있었던 거냐」"

[[dialogue]]
speaker = "unk"
original = "普段はこんなにも大きくはならない。セドナさんとの倒錯的な行為に興奮しているからだ。"
translation = "평소에는 이렇게까지 커지지는 않는다. 세드나 씨와의 도착적인 행위에 흥분하고 있기 때문이다."

[[dialogue]]
speaker = "unk"
original = "そう告げると、セドナさんはさらに顔を真っ赤にして反論した。"
translation = "그렇게 말하자, 세드나 씨는 더욱 얼굴을 새빨갛게 물들이며 반론했다."

[[dialogue]]
speaker = "セドナ"
original = "「う、うるさい。けものめ──私の肉体なんかで……そんなにおっ立てられると、どんな顔をしていいかわからないだろうが……」"
translation = "「시, 시끄럽다. 짐승 같은 놈── 내 육체 따위로…… 그렇게 세워버리면, 어떤 표정을 지어야 할지 모르지 않느냐……」"

[[dialogue]]
speaker = "unk"
original = "なめらかな肌。ふくらんだ胸。押し当てられる、温かな尻肉の感触。"
translation = "매끄러운 피부. 부풀어 오른 가슴. 맞닿는 따뜻한 엉덩이 살의 감촉."

[[dialogue]]
speaker = "unk"
original = "あの厳格なセドナさんが女性の部分をさらけ出してくれることに、男としての興奮が止まらない。"
translation = "그 엄격한 세드나 씨가 여성의 부분을 드러내 준다는 사실에, 남자로서의 흥분이 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "また俺は一応、気になっていたことを訊ねた。"
translation = "또한 나는 일단, 궁금했던 것을 물었다."

[[dialogue]]
speaker = "セドナ"
original = "「初めてか──だと？\u3000当然だ、愚か者。魔女をなんだと思っているんだ……本来、生殖行為とは無縁の存在なのだぞ」"
translation = "「처음이냐── 라고? 당연하다, 어리석은 놈. 마녀를 뭐라고 생각하는 거냐…… 본래, 생식 행위와는 무관한 존재란 말이다」"

[[dialogue]]
speaker = "unk"
original = "だから本番はおろか、このような快楽を目的としたプレイも行ったことがない。セドナさんはそう言い切った。"
translation = "그러니 본방은커녕, 이런 쾌락을 목적으로 한 플레이도 해본 적이 없다. 세드나 씨는 그렇게 단언했다."

[[dialogue]]
speaker = "セドナ"
original = "「だが、貴様がどうしてもと……どうしてもというからだぞ？\u3000ひと時のまぐわいくらい許可してやるというだけだ」"
translation = "「하지만, 네놈이 어떻게 해서든…… 어떻게 해서든이라고 하니까 말이다? 한때의 정교 정도는 허락해 주겠다는 것뿐이다」"

[[dialogue]]
speaker = "セドナ"
original = "「だからこれも──なんだ、その。リラクゼーションの一環だ。休息が必要と言ったのは貴様だからな……フンッ」"
translation = "「그러니 이것도── 뭐냐, 그. 리랙제이션의 일환이다. 휴식이 필요하다고 말한 건 네놈이니까 말이다…… 흥」"

[[dialogue]]
speaker = "unk"
original = "セドナさんは意を決したように左右の足裏に力を込めた。ペニス全体がサンドイッチされて、びくりとふるえてしまう。"
translation = "세드나 씨는 결심한 듯 좌우 발바닥에 힘을 주었다. 자지 전체가 샌드위치 되어, 움찔하며 떨리고 만다."

[[dialogue]]
speaker = "セドナ"
original = "「よし……私を支えると言ったのは、貴様だからな……せいぜい私に都合のいい駒として……いや<ruby>狗<rt>いぬ</rt></ruby>として扱ってやる」"
translation = "「좋다…… 나를 지탱하겠다고 말한 건 네놈이니까 말이다…… 기껏해야 내게 형편 좋은 장기말로서…… 아니 개로서 다뤄주마」"

[[dialogue]]
speaker = "unk"
original = "そして──始まった。"
translation = "그리고── 시작되었다."

[[dialogue]]
speaker = "セドナ"
original = "「ん……はっ……んっ……んっ、んっ……ぁっ……はっ……<emoji=heart04>」"
translation = "「응…… 하앗…… 응…… 응, 응…… 아…… 하앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ストッキング越しにもわかる、セドナさんの柔らかい足裏。"
translation = "스타킹 너머로도 알 수 있는, 세드나 씨의 부드러운 발바닥."

[[dialogue]]
speaker = "unk"
original = "そこに挟み込まれたペニスが、リズミカルな上下運動によってしごかれるのはたまらない快感だった。"
translation = "그곳에 끼워진 자지가, 리드미컬한 상하 운동에 의해 비벼지는 것은 참을 수 없는 쾌감이었다."

[[dialogue]]
speaker = "unk"
original = "シコシコと上下するたび、艶っぽく漏れるセドナさんの吐息にも興奮を煽られる。"
translation = "슈코슈코 소리를 내며 위아래로 움직일 때마다, 요염하게 새어 나오는 세드나 씨의 숨결에도 흥분이 고조된다."

[[dialogue]]
speaker = "unk"
original = "我慢できなくなった俺は、セドナさんの割れ目へ舌を伸ばした。"
translation = "참을 수 없게 된 나는 세드나 씨의 가랑이 사이로 혀를 뻗었다."

[[dialogue]]
speaker = "セドナ"
original = "「んっ──くっ、ぁっ……！\u3000な……なんだこの、感覚──は、んぁっ<emoji=heart04>\u3000へ、変だぞ……んっ、ぁっ──……！」"
translation = "「음──윽, 아……! 뭐…… 뭐야 이, 감각──은, 응아<emoji=heart04> 이, 이상해…… 음, 아──……!」"

[[dialogue]]
speaker = "unk"
original = "鼻先をぐりぐり押し付けながら開いて、むしゃぶりつくようにクンニを続けていく。"
translation = "콧날을 그리그리 문지르며 열어젖히고, 게걸스럽게 매달리듯 커닐링구스를 계속해 나간다."

[[dialogue]]
speaker = "unk"
original = "舌の力加減が知りたくて、痛みなどないかを訊ねてみると──"
translation = "혀의 힘 조절이 궁금해서, 아프지는 않은지 물어보자──"

[[dialogue]]
speaker = "セドナ"
original = "「あ、ああ……んっ……痛くは──ない。これしき、なんでもない……ただ、未知の感覚、が──ぁっ、んぁっ<emoji=heart04>」"
translation = "「아, 아아…… 음…… 아프지는── 않다. 이 정도쯤, 아무것도 아니야…… 다만, 미지의 감각, 이── 아, 응아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "逃れるように腰を浮かせるセドナさんだったが、そうはさせまいと俺は両の手で彼女のお尻を引き付ける。"
translation = "도망치듯 허리를 띄우는 세드나 씨였지만, 그렇게 두지 않겠다는 듯 나는 양손으로 그녀의 엉덩이를 끌어당긴다."

[[dialogue]]
speaker = "unk"
original = "ふるふると震える女性器を見るに、もっと奥まで舐めても良さそうだ──俺は舌をめいっぱい伸ばして、彼女の膣内を掘り進んでいく。"
translation = "파르르 떨리는 여성기를 보아하니, 좀 더 깊은 곳까지 핥아도 좋을 것 같다── 나는 혀를 한껏 뻗어 그녀의 질 내부를 파고 들어간다."

[[dialogue]]
speaker = "セドナ"
original = "「ふぅ、ふぅ、はぁ──っ……<emoji=heart04>\u3000んっ──ぁっ、はぁっっ……<emoji=heart04>\u3000自分の体に、芯ができてしまったような……んぁっ<emoji=heart04>」"
translation = "「후우, 후우, 하아──……<emoji=heart04> 음──아, 하아……<emoji=heart04> 내 몸에, 심지가 생겨버린 것 같은…… 응아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "数センチ挿し込んだだけで、俺の舌をきゅっきゅっと締め付けてくるセドナさんの膣内。"
translation = "겨우 몇 센티 삽입했을 뿐인데, 내 혀를 꽉꽉 조여오는 세드나 씨의 질 내부."

[[dialogue]]
speaker = "unk"
original = "ネビュラの統制管理官──あのセドナさんに、俺はクンニをしている。"
translation = "네뷸라의 통제관리관── 그 세드나 씨에게, 나는 커닐링구스를 하고 있다."

[[dialogue]]
speaker = "unk"
original = "少し前の日常から考えればありえないほどの、夢のような現実に浮かれてしまう。気づいたときには、舌を夢中でかき回していた。"
translation = "조금 전의 일상에서 생각하면 있을 수 없을 정도의, 꿈만 같은 현실에 들떠버린다. 정신을 차렸을 때는 혀를 정신없이 휘젓고 있었다."

[[dialogue]]
speaker = "セドナ"
original = "「はぁ、はぁ──ひんっ──！？\u3000う、動く時は言えっ……！\u3000ぁっ、んっ、んんっっ……！\u3000ぁっ、ぁっ……！」"
translation = "「하아, 하아── 히익──!? 우, 움직일 때는 말해라……! 아, 음, 으음……! 아, 아……!」"

[[dialogue]]
speaker = "unk"
original = "咎めるような物言いも弱々しい。それだけ彼女を感じさせられていることが嬉しかった。"
translation = "나무라는 듯한 말투도 힘이 없다. 그만큼 그녀를 느끼게 하고 있다는 사실이 기뻤다."

[[dialogue]]
speaker = "セドナ"
original = "「ふぅ、ふぅっ──んっ、んぁ、あっ……ぁっ<emoji=heart04>\u3000へ、へんだぞ……っ<emoji=heart04>\u3000う、うぅっ……うぅっ<emoji=heart04>」"
translation = "「후우, 후우── 음, 응아, 앗…… 아<emoji=heart04> 이, 이상해……<emoji=heart04> 으, 으으…… 으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本当に性的な行為とは無縁だったんだなと思う。テクニックもない俺の愛撫にここまで感じてくれるだなんて。"
translation = "정말로 성적인 행위와는 인연이 없었구나 싶다. 테크닉도 없는 나의 애무에 이렇게까지 느껴주다니."

[[dialogue]]
speaker = "unk"
original = "ひくひくと閉じようとする縦割れをさらに乱暴に舐め上げてみる。"
translation = "실룩실룩 닫히려는 세로 틈을 더욱 난폭하게 핥아 올려 본다."

[[dialogue]]
speaker = "セドナ"
original = "「ぁっ……はぁあっ……んぁっ……はぁっ……はぁっ……き、貴様というやつは……！」"
translation = "「아…… 하아아…… 응아…… 하아…… 하아…… 네, 네놈이라는 녀석은……!」"

[[dialogue]]
speaker = "unk"
original = "いやらしい人間だ、と思われても良かった。とにかくセドナさんに気持ちよくなってほしくて。"
translation = "천박한 인간이다, 라고 생각되어도 좋았다. 어쨌든 세드나 씨가 기분 좋아지길 바라서."

[[dialogue]]
speaker = "セドナ"
original = "「ぁっ──んぁぁッ<emoji=heart04>\u3000あッ！\u3000んっ！\u3000んぁっ<emoji=heart04>\u3000や、やめ──ふっ、んぅぅぅぅっっ…………<emoji=heart04>\u3000はっ、はぁぁっ……<emoji=heart04>」"
translation = "「아── 응아아앗<emoji=heart04> 아! 음! 응아<emoji=heart04> 그, 그만── 훗, 응으으으으으…………<emoji=heart04> 하, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろとろと溢れてくる愛液が舌に馴染むたび、心臓の鼓動が速くなっていくのが分かる。"
translation = "걸쭉하게 흘러나오는 애액이 혀에 감길 때마다, 심장 고동이 빨라지는 것을 알 수 있다."

[[dialogue]]
speaker = "セドナ"
original = "「──ふぅ、ふぅっ、はぁっ……き、貴様……なんだ──慣れているのか？\u3000このような、行為に──っ、はぁっ……っ……」"
translation = "「──후우, 후우, 하아…… 네, 네놈…… 뭐냐── 익숙한 건가? 이런, 행위에── 윽, 하아…… 윽……」"

[[dialogue]]
speaker = "unk"
original = "全然そんなことはない、と答える。"
translation = "전혀 그렇지 않다고 대답한다."

[[dialogue]]
speaker = "unk"
original = "ただ……セドナさんの痴態があまりにもいやらしいから、夢中になってしまうだけだ。"
translation = "다만…… 세드나 씨의 치태가 너무나도 음란해서, 몰두하게 될 뿐이다."

[[dialogue]]
speaker = "unk"
original = "足コキから生まれる快感に負けないよう、懸命に舌を伸ばす。"
translation = "풋잡에서 생겨나는 쾌감에 지지 않도록, 필사적으로 혀를 뻗는다."

[[dialogue]]
speaker = "セドナ"
original = "「んっ──ふぅっ、はぁっ、んぁぁ……っ……！\u3000う、ううっ……こんなのは、知らない──ぁっ、んんぁっ……！」"
translation = "「음── 후우, 하아, 응아아……! 으, 으으…… 이런 건, 몰라── 아, 응응아……!」"

[[dialogue]]
speaker = "unk"
original = "うろ覚えの知識を総動員しながら、女性器の弱いところを舌で刺激していく。"
translation = "어설프게 기억하는 지식을 총동원하면서, 여성기의 약한 곳을 혀로 자극해 나간다."

[[dialogue]]
speaker = "unk"
original = "セドナさんが嬌声を上げるたび、振動がペニスへ伝わっていくのも気持ちがいい。"
translation = "세드나 씨가 교성을 지를 때마다, 진동이 페니스로 전해지는 것도 기분이 좋다."

[[dialogue]]
speaker = "セドナ"
original = "「少し待て……っ、落ち着け……！\u3000まだ体が追いついてなっ……ぁっ……<emoji=heart04>」"
translation = "「잠깐 기다려…… 윽, 진정해라……! 아직 몸이 따라오질 않── 아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "待て、と言われると余計にやりたくなってしまう。"
translation = "기다려, 라는 말을 들으니 더욱 하고 싶어져 버린다."

[[dialogue]]
speaker = "セドナ"
original = "「はぁっ、んっ……<emoji=heart04>\u3000ふっ、ふっ、ぁっ、んぁぁぁっ……！」"
translation = "「하아, 응……<emoji=heart04> 후우, 후우, 아, 응아아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "静止を聞く気配のない俺に対して、セドナさんは喘ぎつつも足コキの挟み方を強くすることで対抗し始めた。"
translation = "멈추라는 말을 들을 기색이 없는 나에 대해서, 세드나 씨는 거친 숨을 몰아쉬면서도 풋잡의 강도를 높이는 것으로 대항하기 시작했다."

[[dialogue]]
speaker = "unk"
original = "密着しながら、お互いの弱いところを刺激しあう行為は、いつの間にか、どちらがより相手を感じさせられるかの勝負に変わり始めているみたいだった。"
translation = "밀착한 채 서로의 약한 곳을 자극하는 행위는, 어느샌가 누가 더 상대방을 느끼게 만드는가 하는 승부로 변하기 시작한 것 같았다."

[[dialogue]]
speaker = "セドナ"
original = "「んんんぅぅ～～っっ……<emoji=heart04><emoji=heart04>\u3000ぁっ、はぁっ、んあぁっ……！\u3000ふっ、ふぅっ……んっ、んんんぅぅぁっ……！」"
translation = "「응응으으～～윽……<emoji=heart04><emoji=heart04> 아, 하아, 응아앗……! 후우, 후우……응, 응응으으아앗……!」"

[[dialogue]]
speaker = "unk"
original = "大きな喘ぎ声が聞こえたら、そこはセドナさんの弱いところ。足コキで感じさせてもらっている分、お返しをしなくては。"
translation = "커다란 신음이 들린다면 그곳은 세드나 씨의 약한 부위. 풋잡으로 느끼고 있는 만큼, 보답을 해줘야지."

[[dialogue]]
speaker = "セドナ"
original = "「そ、そこはやめ──あっ、んぁっ！\u3000お、押しつけるなと──んっ、んんんぅっっ……ぁっ、ぁぁっ……<emoji=heart04>」"
translation = "「거, 거기는 그만──앗, 응앗! 미, 밀어붙이지 말라고──응, 응응으윽……아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度もしつこく舐められるのが癪だったのか、ペニスをしごく足の動きがさらに強くなった。"
translation = "몇 번이나 끈질기게 핥아지는 것이 분했는지, 페니스를 비비는 발의 움직임이 더욱 강해졌다."

[[dialogue]]
speaker = "unk"
original = "裏筋、カリ首……あらゆるところをセドナさんは、的確に足でシゴいてくれている。"
translation = "요도 주위, 귀두…… 온갖 곳을 세드나 씨는 정확하게 발로 비벼주고 있다."

[[dialogue]]
speaker = "unk"
original = "思わずクンニすることも忘れてしまうほどの気持ちよさだった。"
translation = "나도 모르게 커닐링구스 하는 것조차 잊어버릴 정도의 기분 좋음이었다."

[[dialogue]]
speaker = "unk"
original = "自分の手でシゴくよりもずっと気持ちいい刺激に、俺は夢中になっていた。気づけば「もっとして欲しい」と声に出してしまうほどに。"
translation = "자신의 손으로 비비는 것보다 훨씬 기분 좋은 자극에 나는 정신없이 빠져들었다. 정신을 차려보니 「더 해줘」라고 입 밖으로 내뱉을 정도로."

[[dialogue]]
speaker = "セドナ"
original = "「その顔──気に食わんぞ……っ……どうして、あっ<emoji=heart04>\u3000貴様はそんなに──ぁっ、んぁっ、余裕そうなんだ……っ<emoji=heart04>」"
translation = "「그 표정── 마음에 안 드는군……윽…… 어째서, 앗<emoji=heart04> 네놈은 그렇게──아, 응아, 여유로운 거냐……윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こちらもこちらで快感をこらえるのに必死で、決して余裕ではない。"
translation = "이쪽도 이쪽대로 쾌감을 참느라 필사적이라 결코 여유롭지는 않다."

[[dialogue]]
speaker = "unk"
original = "ただセドナさんは自慰の経験もないのだろうと思う。"
translation = "다만 세드나 씨는 자위 경험도 없을 것이라 생각한다."

[[dialogue]]
speaker = "unk"
original = "性的な刺激に慣れていない分、俺の方が余裕があるというだけの話だった。"
translation = "성적인 자극에 익숙하지 않은 만큼, 내가 더 여유가 있다는 것뿐인 이야기였다."

[[dialogue]]
speaker = "セドナ"
original = "「貴様も──ぁっ<emoji=heart04>\u3000少しは、んっ……<emoji=heart04>\u3000初めてらしく、しろ──っ<emoji=heart04>\u3000はぁ、はぁっ……んんぁぁっ！」"
translation = "「네놈도──아<emoji=heart04> 조금은, 응……<emoji=heart04> 처음답게, 굴어라──윽<emoji=heart04> 하아, 하아…… 응으아앗!」"

[[dialogue]]
speaker = "unk"
original = "俺にリードを奪われていると感じたのかもしれない。プライドの高いセドナさんに、それは耐え難い屈辱だったのだろうか。"
translation = "나에게 주도권을 빼앗겼다고 느낀 것일지도 모른다. 자존심 강한 세드나 씨에게 그것은 견디기 힘든 굴욕이었던 걸까."

[[dialogue]]
speaker = "unk"
original = "次の瞬間、セドナさんの足コキがより苛烈になった。"
translation = "다음 순간, 세드나 씨의 풋잡이 더욱 가열차졌다."

[[dialogue]]
speaker = "unk"
original = "ペニスを足裏で捕まえながら、ごしごしと乱暴にしごき立てられて、クンニする余裕もなくなるほどの快感が俺を襲う。"
translation = "페니스를 발바닥으로 붙잡고서 슥슥 난폭하게 비벼대어, 커닐링구스를 할 여유조차 없어질 정도의 쾌감이 나를 습격한다."

[[dialogue]]
speaker = "セドナ"
original = "「んっ、ふふ……っ。貴様のが、さらに硬くなってきたぞ……<emoji=heart04>\u3000これはどういうことだ……？」"
translation = "「응, 후후……윽. 네놈의 것이 더욱 딱딱해졌군……<emoji=heart04> 이건 어떻게 된 일이지……?」"

[[dialogue]]
speaker = "unk"
original = "ここまでの動きでコツを掴んできたのか、痛みのないぎりぎりのラインでペニスを締め上げてくる……！"
translation = "지금까지의 움직임으로 요령을 터득한 건지, 아프지 않은 아슬아슬한 라인으로 페니스를 조여온다……!"

[[dialogue]]
speaker = "セドナ"
original = "「んんっ……仕様のないやつだ……<emoji=heart04>\u3000はぁっ……はぁっ……本来ならば、はぁ、燃やしてやるところだぞ──んっ、ぁっ<emoji=heart04>」"
translation = "「응윽…… 어쩔 수 없는 녀석이군……<emoji=heart04> 하아…… 하아…… 원래대로라면, 하아, 태워버렸을 터다──응, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "セドナ"
original = "「だが……いいだろう。好きにしろ──ぁっ、んっ……<emoji=heart04>\u3000その、汚れた欲望──ぶちまけさせてやる……<emoji=heart04>」"
translation = "「하지만…… 좋다. 마음대로 해라──아, 응……<emoji=heart04> 그, 더러운 욕망── 쏟아내게 해주마……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱い吐息を吐きつつ、セドナさんはそう宣言して俺のペニスをひたすらに責め続けてくる。"
translation = "뜨거운 숨을 내뱉으며 세드나 씨는 그렇게 선언하고 내 페니스를 한결같이 몰아붙여 온다."

[[dialogue]]
speaker = "unk"
original = "先走りと汗でぬかるんで、しっとり湿ったストッキングの生地がこしゅこしゅといやらしい音を鳴らし続けていた。"
translation = "쿠퍼액과 땀으로 질척해져서 촉촉하게 젖은 스타킹 원단이 찌걱찌걱 야한 소리를 계속 내고 있었다."

[[dialogue]]
speaker = "セドナ"
original = "「はぁっ、はぁっ……はぁっ、貴様も……こうなっては、今さら、ふぅっ……引く気など、ないだろうに──あっ<emoji=heart04>」"
translation = "「하아, 하아…… 하아, 네놈도…… 이렇게 되어서는 이제 와서, 후우…… 물러날 생각 따위 없겠지──앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "このまま果てるまで続けてもらえる──期待と興奮でさらにペニスを硬くしてしまう。"
translation = "이대로 사정할 때까지 계속해줄 것이다── 기대와 흥분으로 페니스가 더욱 단단해진다."

[[dialogue]]
speaker = "unk"
original = "だが、俺の絶頂と同時に、セドナさんにもイってもらいたい。"
translation = "하지만 나의 절정과 동시에 세드나 씨도 가게 만들고 싶다."

[[dialogue]]
speaker = "unk"
original = "俺はがっつくようにして、彼女の局部へと愛撫を行った。"
translation = "나는 허겁지겁 그녀의 국부에 애무를 가했다."

[[dialogue]]
speaker = "セドナ"
original = "「あっ──あっあっ、んぁぁぁっ！\u3000んっ、くぅっ……あっ、はぁぁっ<emoji=heart04>\u3000んっ、んんぅっ、んぁぁっ！」"
translation = "「앗── 앗앗, 응아아아앗! 응, 큭…… 아, 하아아앗<emoji=heart04> 응, 응응윽, 응아아앗!」"

[[dialogue]]
speaker = "セドナ"
original = "「んぅっ、激し──ぁっ、んぁっ！\u3000フーッ、フーッ──ぁっ、んぁっ、んぁぁっ……！」"
translation = "「응윽, 격렬──아, 응앗! 후우, 후우──아, 응앗, 응아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの雌を匂わされ、いよいよ我慢の限界が訪れる。"
translation = "세드나 씨의 암컷 냄새가 풍겨오자, 드디어 참을성의 한계가 찾아온다."

[[dialogue]]
speaker = "unk"
original = "舐められながら足コキされて、足コキされながら舐め返して──部屋中に俺たち２人の喘ぎ声がこだましていた。"
translation = "빨리면서 풋잡을 당하고, 풋잡을 당하면서 되받아 빨고── 방 안에는 우리 둘의 신음 소리가 메아리치고 있었다."

[[dialogue]]
speaker = "セドナ"
original = "「んっ──んんっ──んんんっ──ああ、んぁぁっ……<emoji=heart04>\u3000来い……<emoji=heart04>\u3000貴様の子種、私に──吐き出してみろ──っ……<emoji=heart04>」"
translation = "「응── 으응── 으으응── 아아, 응아아……<emoji=heart04> 와라……<emoji=heart04> 네놈의 씨앗, 나에게── 뱉어내 봐──……<emoji=heart04>」"

[[dialogue]]
speaker = "セドナ"
original = "「受け止めてやる──ぁっ、んんぁぁっ……<emoji=heart04>\u3000あっ、ああっ、んっ、んああぁぁっ──！」"
translation = "「받아내 주마── 아, 응아아……<emoji=heart04> 앗, 아앗, 응, 응아아아──!」"

[[dialogue]]
speaker = "unk"
original = "セドナさん、セドナさん──"
translation = "세드나 씨, 세드나 씨──"

[[dialogue]]
speaker = "unk"
original = "俺は何度も彼女の名前を呼んで、ついに──"
translation = "나는 몇 번이고 그녀의 이름을 부르며, 마침내──"

[[dialogue]]
speaker = "セドナ"
original = "「んっ──んんんんんんんぅぅぅぅぅぅぅ～～～～～っっっっ………………<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응── 으으으으으으으으으으으으으～～～～～………………<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの体重を顔面に感じながらの、射精──"
translation = "세드나 씨의 체중을 안면에 느끼며, 사정──"

[[dialogue]]
speaker = "unk"
original = "もちろん精液を放ちながらも、俺は溺れるみたいにして彼女へのクンニを忘れなかった。"
translation = "물론 정액을 내뿜으면서도, 나는 익사할 것 같은 기분으로 그녀를 향한 커닐링구스를 잊지 않았다."

[[dialogue]]
speaker = "セドナ"
original = "「あ──あっ、んああ──っ──っ、っっ……！\u3000はあッ、はあッ……<emoji=heart04>\u3000ふぅ、ふぅぅっ……<emoji=heart04>」"
translation = "「아── 앗, 응아아── 앗, 윽……! 하아, 하아……<emoji=heart04> 후우, 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの気持ちよさそうな声が聞こえるたびに嬉しくなる。嬉しいと感じるたび、射精が止まらない。"
translation = "세드나 씨의 기분 좋은 듯한 목소리가 들릴 때마다 기뻐진다. 기쁘다고 느낄 때마다, 사정이 멈추지 않는다."

[[dialogue]]
speaker = "セドナ"
original = "「ぁっ──はっ、はぁっ……<emoji=heart04>\u3000びくびく、して──ぁっ、んぁぁっ……貴様のが──っっ……<emoji=heart04>」"
translation = "「아── 하, 하아……<emoji=heart04> 파르르, 떨면서── 아, 응아아…… 네놈의 것이──……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の精液だけじゃない。セドナさんの愛液もたっぷりと俺の顔にかかってしまっている──"
translation = "내 정액뿐만이 아니다. 세드나 씨의 애액도 듬뿍 내 얼굴에 묻어버리고 말았다──"

[[dialogue]]
speaker = "セドナ"
original = "「はぁ、はぁっ……私も──だと……？\u3000生意気を、言うな……<emoji=heart04>」"
translation = "「하아, 하아…… 나도── 라고……? 건방진 소리를, 하지 마라……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の射精と連動するように絶頂に達したセドナさんもまた、同じように体を震わせていた。"
translation = "내 사정과 연동하듯 절정에 달한 세드나 씨 또한, 마찬가지로 몸을 떨고 있었다."

[[dialogue]]
speaker = "unk"
original = "互いに悶え、汗だくになった肉体には、まったく力が入らなかった。"
translation = "서로 번민하며, 땀투성이가 된 육체에는 전혀 힘이 들어가지 않았다."

[[dialogue]]
speaker = "セドナ"
original = "「ふー、ふー……ああ……やって、しまった。全く──こんな形で人間と一線を越えようとは、な……っ……<emoji=heart04>」"
translation = "「후우, 후우…… 아아…… 저질러, 버렸군. 정말이지── 이런 형태로 인간과 선을 넘게 될 줄이야……<emoji=heart04>」"

[[dialogue]]
speaker = "セドナ"
original = "「貴様は……なぜそう、幸せそうなツラをしていられるのだ……もう。私の悩みなど、どうでもよくなるではないか……」"
translation = "「네놈은…… 어째서 그렇게, 행복해 보이는 낯짝을 하고 있을 수 있는 거냐…… 정말이지. 나의 고민 따위, 아무래도 상관없어지게 되지 않느냐……」"

[[dialogue]]
speaker = "unk"
original = "太ももを伝って流れ落ちてくる汗から、セドナさんの香りがただよう。"
translation = "허벅지를 타고 흘러내리는 땀에서 세드나 씨의 향기가 감돈다."

[[dialogue]]
speaker = "unk"
original = "あんなにも遠かった彼女とこんな倒錯的な前戯までできるようになったことに、俺は至上の幸福を覚えていた。"
translation = "그렇게나 멀게 느껴졌던 그녀와 이런 도착적인 전희까지 할 수 있게 된 것에, 나는 지고의 행복을 느끼고 있었다."

[[dialogue]]
speaker = "セドナ"
original = "「魔女と人間──か……。古くは交流を持っていた種族同士──何も間違った道ではないのだが……」"
translation = "「마녀와 인간── 인가……. 옛날에는 교류를 가졌던 종족끼리── 딱히 틀린 길은 아니다만……」"

[[dialogue]]
speaker = "セドナ"
original = "「……そうだな。魔女の命に、人間がついていくのは至難だ。とはいえ──長久も、滋養強壮の香草だって、森にはいくらでもある」"
translation = "「……그렇군. 마녀의 수명에 인간이 따라오는 것은 지난한 일이다. 하지만── 장수도, 자양강장의 향초도 숲에는 얼마든지 있으니까」"

[[dialogue]]
speaker = "セドナ"
original = "「それに貴様の体が特別製なのは織り込み済みだ──魔王。たとえ世界が危機を乗り越えようと、最後まで私に付き合ってもらうぞ？」"
translation = "「게다가 네놈의 몸이 특별제라는 건 이미 계산에 넣었다── 마왕. 설령 세계가 위기를 극복하더라도, 끝까지 나와 함께해줘야겠어?」"

