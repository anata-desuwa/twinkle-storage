[[dialogue]]
speaker = "unk"
original = "第９話,正義のヒーロー,B"
translation = "제9화, 정의의 히어로, B"

[[dialogue]]
speaker = "unk"
original = "次々と産み落とされるモンスターをその度に討伐しつつ、彼女を追う。"
translation = "차례차례 태어나는 몬스터를 그때마다 토벌하면서, 그녀를 쫓는다."

[[dialogue]]
speaker = "unk"
original = "ようやく少女──アポロへ追いつく頃には学園近くの繁華街にまでやってきていた。"
translation = "겨우 소녀──아폴로에게 따라잡을 무렵에는 학원 근처의 번화가에까지 와 있었다."

[[dialogue]]
speaker = "サーシャ"
original = "「ここにも人がたくさん……これ以上暴れられたら大変ね」"
translation = "「여기에도 사람이 잔뜩……이 이상 날뛰면 큰일이네.」"

[[dialogue]]
speaker = "クロト"
original = "「ええ。一刻も早く彼女を止めましょう」"
translation = "「예. 한시라도 빨리 그녀를 막읍시다.」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちが彼女へ歩み寄ろうとすると……"
translation = "그렇게, 우리가 그녀에게 다가가려고 하자……"

[[dialogue]]
speaker = "ギエル"
original = "「おっと……これほど早く到着されるとは。星騎士の粋を集めた組織というのは伊達ではないようですね」"
translation = "「이런…… 이렇게 빨리 도착하시다니. 성기사의 정수를 모은 조직이라는 것은 허세가 아닌 듯하군요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！\u3000何よ、あんた」"
translation = "「! 뭐야, 너」"

[[dialogue]]
speaker = "unk"
original = "先ほどもずっとアポロに付き従っていた男が現れた。"
translation = "아까도 계속 아폴로를 따르던 남자가 나타났다."

[[dialogue]]
speaker = "クロト"
original = "「あなたは誰だ。なぜこんな真似をする」"
translation = "「당신은 누구지. 왜 이런 짓을 하는 건가.」"

[[dialogue]]
speaker = "ギエル"
original = "「答える必要のなきこと。この身はただ、アポロ様の意のままにお仕えするだけ」"
translation = "「대답할 필요가 없는 일. 이 몸은 그저, 아폴로님의 뜻대로 모실 뿐.」"

[[dialogue]]
speaker = "ギエル"
original = "「この身は大した戦力になりえませんが……アポロ様の前座くらいなら務まるかと」"
translation = "「이 몸은 대단한 전력이 될 수는 없지만…… 아폴로님의 들러리 정도라면 해낼 수 있을까 합니다.」"

[[dialogue]]
speaker = "unk"
original = "アポロ様──"
translation = "아폴로님──"

[[dialogue]]
speaker = "unk"
original = "執事のような風体の男がそう称したところをみるに、あの少女とは主従の関係にあるというのか。"
translation = "집사 같은 풍채의 남자가 그렇게 칭한 것으로 보아, 저 소녀와는 주종 관계에 있다는 것인가."

[[dialogue]]
speaker = "アポロ"
original = "「よい、ギエル。下がれ」"
translation = "「됐다, 기엘. 물러나.」"

[[dialogue]]
speaker = "ギエル"
original = "「は。仰せのままに」"
translation = "「옛. 분부대로.」"

[[dialogue]]
speaker = "unk"
original = "軽々と宙を翔けてやってくるアポロ。"
translation = "가볍게 허공을 날아오는 아폴로."

[[dialogue]]
speaker = "unk"
original = "ギエルと呼ばれた男は<ruby>慇懃<rt>いんぎん</rt></ruby>に礼をして引き下がった。"
translation = "기엘이라고 불린 남자는 공손하게 예를 표하고 물러났다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（“アポロ”はテレビ番組だって言ってたけど、それならあの男は……？）"
translation = "「『아폴로』는 TV 프로그램이라고 했었는데, 그렇다면 저 남자는……?」"

[[dialogue]]
speaker = "アナ"
original = "（あれは知らない）"
translation = "「저건 모릅니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "（女の子のほうだけ、コスプレってことかしら？）"
translation = "「여자아이 쪽만, 코스프레라는 걸까?」"

[[dialogue]]
speaker = "アポロ"
original = "「ふふん。よくあたしに追いついたな、褒めてやろう！」"
translation = "「후훗. 잘도 나를 따라잡았군, 칭찬해 주지!」"

[[dialogue]]
speaker = "クロト"
original = "「アポロ。君は何者だ。その剣といい、モンスターを扱う能力といい……ただの女の子じゃないな」"
translation = "「아폴로. 너는 누구냐. 그 검도 그렇고, 몬스터를 다루는 능력도 그렇고…… 그냥 여자아이가 아니군.」"

[[dialogue]]
speaker = "アポロ"
original = "「無論だ！\u3000あたしは流星ライダー・アポロ──世界を守る正義のヒーローなのだからな！」"
translation = "「물론이다! 나는 유성 라이더 아폴로── 세계를 지키는 정의의 히어로니까!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「正義のヒーローって……」"
translation = "「정의의 히어로라니……」"

[[dialogue]]
speaker = "マトイ"
original = "「やってることは真逆だと思うんですけど！」"
translation = "「하는 짓은 정반대라고 생각하는데요!」"

[[dialogue]]
speaker = "アポロ"
original = "「何ぃ？」"
translation = "「뭐라고?」"

[[dialogue]]
speaker = "ギエル"
original = "「そんなことはありません。世界の混沌を払うのは、ヒーローの果たすべき立派な使命でございます」"
translation = "「그렇지 않습니다. 세계의 혼돈을 물리치는 것은, 히어로가 완수해야 할 훌륭한 사명이옵니다.」"

[[dialogue]]
speaker = "unk"
original = "こちらが正論で諭そうとしても、お付きの男がすぐに彼女を立てていた。"
translation = "이쪽이 정론으로 타이르려고 해도, 수행하는 남자가 곧바로 그녀를 치켜세웠다."

[[dialogue]]
speaker = "アポロ"
original = "「緋宮クロト──あたしの目的はただひとつ。本気のおまえと相まみえることだ」"
translation = "「히노미야 쿠로토── 나의 목적은 단 하나. 진심인 너와 맞붙는 것이다.」"

[[dialogue]]
speaker = "アポロ"
original = "「つまり──こう！」"
translation = "「즉── 이렇게!」"

[[dialogue]]
speaker = "クロト"
original = "「──っ！？」"
translation = "「──!」"

[[dialogue]]
speaker = "市民Ａ"
original = "「きゃあああ──っ！？」"
translation = "「꺄아아아──!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト──！」"
translation = "「쿠로토──!」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫だ──が、随分なことをしてくれるな」"
translation = "「괜찮다──만, 꽤나 심한 짓을 하는군.」"

[[dialogue]]
speaker = "アポロ"
original = "「はっはっは！\u3000いい反応だ！」"
translation = "「핫핫하! 좋은 반응이다!」"

[[dialogue]]
speaker = "unk"
original = "アポロが気まぐれで振るった大剣は、危うくビルを吹き飛ばして大勢の被害を出すところだった。"
translation = "아폴로가 변덕으로 휘두른 대검은, 하마터면 빌딩을 날려버려 수많은 피해를 낼 뻔했다."

[[dialogue]]
speaker = "unk"
original = "すんでのところで受け止めたが──彼女はかえって満足そうな様子で。"
translation = "간신히 막아냈지만── 그녀는 오히려 만족스러운 모습으로."

[[dialogue]]
speaker = "アポロ"
original = "「だがまだ足りない。魔王の底力はそんなもんじゃないはずだ」"
translation = "「하지만 아직 부족해. 마왕의 저력은 그런 게 아닐 텐데.」"

[[dialogue]]
speaker = "クロト"
original = "「君は──なぜ、そう俺と戦いたがる」"
translation = "「너는── 왜, 그렇게 나와 싸우고 싶어 하는 거지.」"

[[dialogue]]
speaker = "アポロ"
original = "「愚問だ。緋宮クロト──おまえこそが魔王であり、そして、魔王を倒すのはヒーローの宿命だと、太古の昔から決まっているからだ！」"
translation = "「어리석은 질문이다. 히노미야 쿠로토── 너야말로 마왕이며, 그리고, 마왕을 쓰러뜨리는 것은 히어로의 숙명이라고, 태고적부터 정해져 있기 때문이다!」"

[[dialogue]]
speaker = "アポロ"
original = "「でもっておまえ達は魔王の家来だろう！\u3000ならまとめてぶちのめしてやるのもヒーローの流儀！」"
translation = "「게다가 너희들은 마왕의 하인일 테지! 그렇다면 모조리 때려눕히는 것도 히어로의 방식!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら……家来ではなく仲間なのだけれど」"
translation = "「어머나…… 하인이 아니라 동료인데.」"

[[dialogue]]
speaker = "マトイ"
original = "「魔王をやっつけるなんて……ホントにヒーロー気取りっていうか」"
translation = "「마왕을 해치운다니…… 정말로 히어로인 척한다는 건가.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう！\u3000だから魔王は悪いやつじゃないんだってば！」"
translation = "「정말! 그러니까 마왕은 나쁜 녀석이 아니라고!」"

[[dialogue]]
speaker = "アポロ"
original = "「へ！\u3000悪もんはみんなそう言うのさ！」"
translation = "「흥! 악당은 모두 그렇게 말하는 법이지!」"

[[dialogue]]
speaker = "unk"
original = "アポロは大剣を担ぎ、夜空の高みからこちらを<ruby>睥睨<rt>へいげい</rt></ruby>する。"
translation = "아폴로는 대검을 짊어지고, 밤하늘 높은 곳에서 이쪽을 위압한다."

[[dialogue]]
speaker = "unk"
original = "──来る気か。"
translation = "──올 작정인가."

[[dialogue]]
speaker = "アポロ"
original = "「手は抜くなよ。もし、中途半端なバトルであたしを満足させられなかったら…………そうだな～」"
translation = "「대충 하지 마. 만약, 어중간한 배틀로 나를 만족시키지 못한다면………… 그렇군ー」"

[[dialogue]]
speaker = "unk"
original = "アポロは視線を上にやって考えたのち、片手をピースサインにしてこちらへ向けた。"
translation = "아폴로는 시선을 위로 향하고 생각한 뒤, 한 손을 피스 사인으로 만들어 이쪽으로 향했다."

[[dialogue]]
speaker = "unk"
original = "……２？"
translation = "……2?"

[[dialogue]]
speaker = "アポロ"
original = "「確かおまえ達の学園って、２つあるんだったよな」"
translation = "「분명 너희들의 학원 말이야, 두 개 있었지.」"

[[dialogue]]
speaker = "クロト"
original = "「？\u3000ああ……」"
translation = "「? 아아……」"

[[dialogue]]
speaker = "unk"
original = "その意味を、俺がわからずにいると──"
translation = "그 의미를, 내가 알지 못하고 있자──"

[[dialogue]]
speaker = "アポロ"
original = "「なら、あたしが<b>片っぽ消してきてやるよ</b>。これなら本気でやれるだろ？」"
translation = "「그럼, 내가 <ruby>한쪽을 지워주고 올게<rt>・・・ ・・・・ ・・</rt></ruby>. 이러면 진심으로 할 수 있겠지?」"

[[dialogue]]
speaker = "クロト"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「な──こいつ……っ」"
translation = "「뭐── 이 자식……」"

[[dialogue]]
speaker = "アナ"
original = "「冗談──ではなさそうですね」"
translation = "「농담──은 아닌 것 같네요.」"

[[dialogue]]
speaker = "unk"
original = "笑えない脅迫。しかし少女の表情は、仮面の上からもわかるほど楽しげに笑っていた。"
translation = "웃을 수 없는 협박. 하지만 소녀의 표정은, 가면 위에서도 알 수 있을 만큼 즐거운 듯 웃고 있었다."

[[dialogue]]
speaker = "ギエル"
original = "「おお。至らなかったとしても半分残そうとはなんという慈悲深さ。このギエル、心の底から感服するばかり」"
translation = "「오오. 미치지 못했다 하더라도 반을 남기려 하다니 이 얼마나 자비로우신가. 이 기엘, 진심으로 감복할 따름.」"

[[dialogue]]
speaker = "アポロ"
original = "「わっはっは、そうだろうそうだろう。ヒーローには優しさもつきものだからな！」"
translation = "「왓핫하, 그렇지 그렇지. 히어로에게는 상냥함도 따라오는 법이니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "「やるしかなさそうね、クロトくん」"
translation = "「해야 할 것 같네, 쿠로토 군.」"

[[dialogue]]
speaker = "クロト"
original = "「ええ。お力、お借りします」"
translation = "「예. 힘을 빌리겠습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「アポロ──受けて立とう。こっちはこっちで気にかかっていたんだ。俺が本当に『魔王』なのかどうか」"
translation = "「아폴로── 받아들이지. 이쪽은 이쪽대로 마음에 걸리고 있었다. 내가 정말로 『마왕』인지 아닌지.」"

[[dialogue]]
speaker = "クロト"
original = "「君がヒーローを名乗るのなら、君を倒して確かめさせてもらうとしよう」"
translation = "「네가 히어로를 자처한다면, 너를 쓰러뜨리고 확인해 보도록 하지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト……」"
translation = "「쿠로토……」"

[[dialogue]]
speaker = "アポロ"
original = "「くくく、その意気だ。実にたかぶるぞ！」"
translation = "「크크크, 그 기세다. 정말로 흥분되는군!」"

[[dialogue]]
speaker = "クロト"
original = "「──全員、戦闘準備。こちらが勝ったら──悪いが仮面を脱いでもらうぞ！」"
translation = "「──전원, 전투 준비. 우리가 이긴다면── 미안하지만 가면을 벗겨야겠다!」"

[[dialogue]]
speaker = "アポロ"
original = "「かかってこい悪党ども！\u3000このアポロ様が成敗してやる！」"
translation = "「덤벼라 악당들아! 이 아폴로님이 혼내주마!」"

