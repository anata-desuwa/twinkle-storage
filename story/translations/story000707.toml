[[dialogue]]
speaker = "unk"
original = "決闘宣言をしたソフィアは、１度深呼吸をした後、サーシャに言った。"
translation = "결투 선언을 한 소피아는 한 번 심호흡을 한 뒤, 사샤에게 말했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「３年前、姉さんが家を出て、人間界へ行ったあの日から、今日まで言えなかったことがあります」"
translation = "「3년 전, 언니가 집을 나가 인간계로 갔던 그날부터 오늘까지 하지 못한 말이 있어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ……？」"
translation = "「소피……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私……小さい頃から優しい姉さんが好きでした。私のことを大切にしてくれる姉さんのことを、疑うことなく、無邪気に信じていました」"
translation = "「저…… 어릴 때부터 상냥한 언니를 좋아했어요. 저를 소중히 여겨주는 언니를 의심 없이 천진하게 믿었어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だからこそ、それまで何も話していなかったのに、学園へ入学する為に人間界へ行くと言い出した時、私は置いてけぼりにされた気分になったんです」"
translation = "「그렇기에 그때까지 아무 말도 없다가, 학원에 입학하기 위해 인간계에 가겠다고 말했을 때, 저는 버려진 기분이 들었어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それは……ごめんなさい。あの時も言ったけれど、ソフィには相談しづらくて……なかなか言い出せなかったの」"
translation = "「그건…… 미안해. 그때도 말했지만 소피에게는 상담하기 힘들어서…… 좀처럼 말을 꺼낼 수 없었어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ。後から冷静になれば、そうだったんだろうなってわかります。ですが……私が聞きたかったのは、そういうことじゃないんです」"
translation = "「네. 나중에 냉정해지고 나서야 그랬겠구나 하고 이해했어요. 하지만…… 제가 듣고 싶었던 건 그런 게 아니에요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんっていつも、私に対して『大切だ』とか、『愛している』って言いますよね？」"
translation = "「언니는 항상 저에게 『소중하다』라든가 『사랑한다』고 말하죠?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それって……本当にそう思っているんでしょうか？」"
translation = "「그거…… 정말로 그렇게 생각하고 있나요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それはもちろん、本気で思っているわ。私にとって、ソフィは大切な家族――妹だもの」"
translation = "「그건 물론 진심으로 생각하고 있지. 나에게 소피는 소중한 가족―― 동생인걸.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「３年前、家を出る時に上手く仲直りできないままこっちへ来ちゃったけれど、気持ちが変わったりなんてしてないわ」"
translation = "「3년 전 집을 나갈 때 제대로 화해하지 못한 채 여기로 왔지만, 마음이 변하거나 하지는 않았어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今だって、昔みたいに仲直りできたらって思って――」"
translation = "「지금도 예전처럼 화해할 수 있었으면 좋겠다고 생각하고――」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも……私には信じられないです」"
translation = "「하지만…… 저는 믿을 수 없어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「本当はずっと、不安だったんです。だから、昔みたいに無邪気に振る舞うことなんてできなかった」"
translation = "「사실은 계속 불안했어요. 그래서 예전처럼 천진하게 행동할 수 없었어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんは、３年前に私と別れる時、寂しかったですか？」"
translation = "「언니는 3년 전에 저랑 헤어질 때 외로웠나요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「寂しかったわ。もちろん」"
translation = "「외로웠지. 물론이야.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それって、泣くくらいですか？」"
translation = "「그건 울 정도였나요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え……」"
translation = "「에……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私は泣いてしまいました。姉さんが家を出て行った後、しばらく何も手がつかないくらい」"
translation = "「저는 울어버렸어요. 언니가 집을 나간 뒤에 한동안 아무것도 손에 잡히지 않을 정도로요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも、姉さんは泣くほどではなかったんじゃないですか？」"
translation = "「하지만 언니는 울 정도는 아니지 않았나요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私、気づいたんです。……生まれてこの方、姉さんの泣いた顔、１度も見たことないなって」"
translation = "「저, 깨달았어요. ……태어나서 지금까지 언니가 우는 얼굴을 한 번도 본 적이 없다는 걸요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんって……本当は私なんて別にいなくても、そこまで影響がないんじゃないですか？」"
translation = "「언니는…… 사실 제가 없어도 별로 지장이 없는 거 아닌가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そんな……そんなことないわ、ソフィ」"
translation = "「그런…… 그렇지 않아, 소피.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「実際、姉さんは３年前、学園に入学することを１人で決めました」"
translation = "「실제로 언니는 3년 전, 학원에 입학하는 걸 혼자서 결정했어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それはもう、仕方がないです。姉さんはそういうヒトだし、家族であっても姉さんのそういう性質は止められないんだって、わかりました」"
translation = "「그건 이제 어쩔 수 없어요. 언니는 그런 사람이고, 가족이라도 언니의 그런 성질은 막을 수 없다는 걸 알았으니까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも去年、私が流星学園に入学した後も……姉さんは自分から時間を作って会いにくることは、なかったじゃないですか」"
translation = "「하지만 작년에 제가 유성학원에 입학한 뒤에도…… 언니는 먼저 시간을 내서 만나러 온 적이 없었잖아요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「偶然会った時は、色々と話しかけたりもしてくれますが……」"
translation = "「우연히 만났을 때는 이런저런 말을 걸어주기도 하지만……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「家族に中々会えなくて寂しいとか、相手が恋しいとか思ってる人って、そういう行動を取るでしょうか……？」"
translation = "「가족을 좀처럼 만날 수 없어서 외롭다거나, 상대가 그립다고 생각하는 사람이 그런 행동을 할까요……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だから、私は不安になるんです」"
translation = "「그래서 저는 불안해지는 거예요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「自分から会いにこない癖に、いざ会うと、ニコニコ笑って私のことを可愛がろうとするから、わからなくなる」"
translation = "「먼저 만나러 오지도 않으면서 막상 만나면 생글생글 웃으며 저를 예뻐하려고 하니까, 알 수가 없게 돼요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんにとって、私って一体、何なんですか……！？」"
translation = "「언니에게 저는 도대체 무엇인가요……!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……ソフィ……私は……！」"
translation = "「……소피…… 나는……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「…………っ」"
translation = "「…………윽.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ……ソフィ……！」"
translation = "「앗…… 소피……!」"

[[dialogue]]
speaker = "unk"
original = "追いかけようとして、しかし、サーシャは立ち止まってしまう。"
translation = "뒤쫓아가려 했으나, 사샤는 멈춰 서고 만다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（追いかけたところで、なんて言葉をかけたらいいのか、わからないわ……）"
translation = "(뒤쫓아간들, 어떤 말을 건네야 할지 모르겠어……)"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「サーシャ先輩」"
translation = "「사샤 선배님.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「大丈夫ですか……？」"
translation = "「괜찮으세요……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ウズメちゃん……。それに、会長くん……」"
translation = "「우즈메짱……. 그리고 회장군……」"

[[dialogue]]
speaker = "unk"
original = "影で様子を見守っていたウズメと俺は、サーシャさんに声をかけるのだった――"
translation = "그늘에서 지켜보던 우즈메와 나는 사샤 씨에게 말을 거는 것이었다――"

