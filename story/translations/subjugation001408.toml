[[dialogue]]
speaker = "unk"
original = "あれから俺たちはアステラに突入し、モンスターを撃滅した。"
translation = "그 후 우리는 아스텔라에 돌입해 몬스터를 격멸했다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ルリエルー、ルリエルーっ？」"
translation = "「루리에르─, 루리에르으─?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ、フィオナ会長～。会長もビーチに遊びに来たんですかぁ～？」"
translation = "「아, 피오나 회장님~. 회장님도 비치에 놀러 온 거예욧~?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ルリエルを呼びに来たの。ビーチに発生したモンスターを討伐して以来、毎日毎日こっちで遊び呆けてるって聞いたけど」"
translation = "「루리에르를 부르러 왔어. 비치에 발생한 몬스터를 토벌한 이래로 매일매일 여기서 놀고만 있다고 들었는데」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ただ遊んでるわけじゃないですよぉ～。これは特訓です！\u3000遊べば遊ぶほど力を使いこなせるようになるってわかりましたから！」"
translation = "「그냥 노는 게 아니에욧~. 이건 특훈이에욧! 놀면 놀수록 힘을 다룰 수 있게 된다는 걸 알았으니까요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ、緋宮会長の話によると、ただ遊べばいいというわけではなかったような……」"
translation = "「아니, 히노미야 회장의 말에 따르면 그냥 놀기만 하면 되는 건 아니었던 것 같은데……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「まーまー、細かいことはいいじゃないですかぁ。それよりフィオナ会長も水着に着替えて一緒に遊びましょうよ～」"
translation = "「에이, 자질구레한 건 상관없잖아욧. 그보다 피오나 회장님도 수영복으로 갈아입고 같이 놀자구욧~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「聞きましたよぉ？\u3000サーフィンにドはまりしてるんですよね？\u3000毎朝こっそり海の様子を見に行って、良い波が来てるかどうか確認してるとかぁ」"
translation = "「들었다구욧? 서핑에 푹 빠져 있다면서욧? 매일 아침 몰래 바다 상황 보러 가서 좋은 파도가 오는지 확인하고 있다든가아」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「どどど、どうしてそれを……！\u3000誰にもバレないように気を付けていたはずなのに……！」"
translation = "「어, 어, 어떻게 그걸……! 아무에게도 안 들키게 조심했을 텐데……!」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「え……？\u3000私の戦闘服を、ですか……？」"
translation = "「에……? 제 전투복을요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「は、はいっ。鍛錬のためにも、そのビキニを貸していただけませんかっ？」"
translation = "「네, 네. 단련을 위해서라도 그 비키니를 빌려주실 수 없을까요?」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「え……ええと。話の筋がよく見えなくて……。無事に新しい力を扱えるようになったんじゃ……？」"
translation = "「에…… 에또. 이야기의 흐름을 잘 모르겠어서요……. 무사히 새로운 힘을 다룰 수 있게 된 게 아니었나요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「確かにその通りです。でもまだまだ水着姿の自分に慣れないことは変わっていません」"
translation = "「확실히 말씀하신 대로예요. 하지만 여전히 수영복 차림의 저에게 익숙해지지 않은 건 변함없어요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「だからこそ、フロレンシアさんのようにもっと露出度の高い水着を着てみたいんです……！\u3000その方が興奮する──ではなく、鍛錬になりますからっ！」"
translation = "「그렇기에 프로렌시아 씨처럼 좀 더 노출도가 높은 수영복을 입어보고 싶어요……! 그게 더 흥분되──가 아니라, 단련이 되니까요!」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「そもそも私のこれは水着ではなくて……。もし付けたとしてもサイズが、その……。色々とはみ出しかねないと言いますか……」"
translation = "「애초에 제 이건 수영복이 아니라서요……. 혹시 입는다고 해도 사이즈가, 그……. 여러모로 삐져나올지도 모른다고 해야 하나……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はみ出し──っっ。が、<ruby>俄然<rt>がぜん</rt></ruby>興味が出てきてしまいました……！\u3000お願いしますっ、少しの間で構いませんのでっ、是非っ、是非っ！」"
translation = "「삐져나오다니──윽. 부쩍 흥미가 생겨버렸습니다아……! 부탁드려요, 잠시라도 상관없으니까요, 제발요, 제발요!」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「わわわっ！？\u3000引っ張らないでくださいっ！\u3000脱げますっ、脱げちゃいますからぁ～！？」"
translation = "「와와왓!? 잡아당기지 마세요! 벗겨져요, 벗겨져 버린다니까요~!」"

[[dialogue]]
speaker = "unk"
original = "やはり、はしゃぎすぎなのでは……？"
translation = "역시 너무 들뜬 거 아닌가……?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あはは……。ま、まぁオンとオフを切り替えるのも大切よ」"
translation = "「아하하……. 뭐, 온과 오프를 전환하는 것도 중요하지」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも２人とも一皮剥けたんじゃない？\u3000星力の制御ができなくて困ってるって、背中を丸めて頼ってきた時とは大違いよ」"
translation = "「그래도 둘 다 한 꺼풀 벗은 거 아니야? 성력 제어를 못 해서 곤란하다고 어깨를 움츠리며 의지해 왔을 때와는 딴판이야」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「会長くんも表情が前より柔らかくなってるしね？\u3000やっぱり知らず知らずの間に教官役のプレッシャーがあったみたいね」"
translation = "「회장 군도 표정이 전보다 부드러워졌고 말이야? 역시 자신도 모르는 사이에 교관 역할의 압박감이 있었나 보네」"

[[dialogue]]
speaker = "unk"
original = "緊張が解けたのはウィステリアさんのおかげですよ"
translation = "긴장이 풀린 건 위스테리아 씨 덕분이에요."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふ、お世辞でも嬉しいわね。会長くんはそうやっていつも笑っていた方がいいわ。私、会長くんの笑顔好きよ」"
translation = "「후후, 빈말이라도 기쁘네. 회장 군은 그렇게 항상 웃고 있는 게 좋아. 나, 회장 군의 웃는 얼굴 좋아해」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（って──わ、私、会長くんをまじまじ見つめて何を言っているのかしらっ？\u3000笑顔が好き、なんてまるで告白じゃない……！）"
translation = "（아── 나, 회장 군을 빤히 쳐다보며 무슨 말을 하는 거야!? 웃는 얼굴이 좋다니, 이건 마치 고백이잖아……!）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（生徒をそういう目で見ちゃいけないって何度も自省してきたのに。……で、でも、今の私は休暇中だし、私は職員だけど教師じゃないし……）"
translation = "（학생을 그런 눈으로 보면 안 된다고 몇 번이나 자제해 왔는데. ……하, 하지만 지금 난 휴가 중이고, 난 직원이지만 교사가 아니고……）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（気のせいかもしれないけれど、会長くんも私をじっと見つめてくれているような……。大胆な水着が功を奏しているのかしら……？）"
translation = "（기분 탓일지도 모르겠지만 회장 군도 나를 뚫어지게 봐주는 것 같고……. 대담한 수영복이 효과를 본 걸까……?）"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（もしここで『暑いわね』とか呟けば、ワンチャン会長くんも『涼みに行きますか？』なんて答えてくれて、そのままもっと熱い恋にまで発展しちゃったり──）"
translation = "（만약 여기서 『덥네』라고 중얼거리면, 어쩌면 회장 군도 『식히러 갈까요?』라고 대답해 줘서 그대로 더 뜨거운 사랑으로 발전해 버릴지도──）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「くんくん……なんだかインモラルな匂いがしますね」"
translation = "「킁킁…… 왠지 부도덕한 냄새가 나네요」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひぃあ！？」"
translation = "「히이익!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「まーたウィステリアさん、会長さんのことを独り占めにして～！\u3000あ、髪にワカメが付いてますよ？\u3000泳いだ時にくっつけちゃったんですかぁ？」"
translation = "「또오 위스테리아 씨, 회장님을 독차지하고 있어욧~! 아, 머리에 미역 붙어 있어욧? 수영할 때 붙은 거예욧?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「えっ、嘘っ！？\u3000そんなギャグみたいな姿で私、会長くんとずっと話してたの……！？\u3000じゃあ会長くんが私を見つめていたのは……」"
translation = "「에엣, 거짓말!? 그런 개그 같은 모습으로 나, 회장 군이랑 계속 이야기했던 거야……!? 그럼 회장 군이 날 쳐다보고 있었던 건……」"

[[dialogue]]
speaker = "unk"
original = "ツッコむにツッコめなくて……"
translation = "태클을 걸 수가 없어서……"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「うう、やっぱり私、呪われてるわ……。そんなバカみたいな格好で、会長くんの笑顔が好き、とか言って……。穴があったら入りたい……」"
translation = "「으으, 역시 나 저주받았나 봐……. 그런 바보 같은 꼴로 회장 군의 웃는 얼굴이 좋다니 뭐니 말하고……. 쥐구멍이라도 있으면 들어가고 싶어……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「よくわかりませんが、パーッと行きましょうよ、パーッと！\u3000せっかく海に遊びに来てるんですから！」"
translation = "「잘 모르겠지만 화끈하게 가자구욧, 화끈하게! 모처럼 바다에 놀러 왔으니까욧!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もうルリエルったら……。でも、ふふ、そうだね。良い波も来てるみたいだし、私も水着に着替えて遊んじゃおうかな」"
translation = "「정말 루리에르도 참……. 하지만 후후, 그렇네. 좋은 파도도 오는 것 같고 나도 수영복으로 갈아입고 놀아볼까」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「熱中症と脱水症状には気を付けてくださいね。海にはハプニングが付きものですから、お怪我のないようにしてください」"
translation = "「열사병이랑 탈수 증상은 조심하세요. 바다에는 해프닝이 따르기 마련이니까 다치지 않게 주의하시고요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そうですね……海にはハプニングが……泳いでる間に、ポロリしてしまったり……」"
translation = "「그렇네요…… 바다에는 해프닝이……. 수영하는 사이에 포로리 해버린다거나……」"

[[dialogue]]
speaker = "unk"
original = "ま、まぁ、今はバカンスを楽しもうか！"
translation = "뭐, 뭐어, 지금은 바캉스를 즐길까!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「よーし、じゃあまずはバーベキューから始めましょう！\u3000その後はビーチバレーをして、あとあと、足が付く場所で泳いだりもしたいですぅ～！」"
translation = "「조아써욧, 그럼 우선 바비큐부터 시작해요! 그 후에는 비치발리볼을 하고, 나아중에 발이 닿는 곳에서 수영도 하고 싶어욧~!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、私もバーベキューしたいです！\u3000大きなソーセージ焼きましょう、ソーセージ！」"
translation = "「아, 저도 바비큐 하고 싶어요! 커다란 소시지 구워요, 소시지!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「イクシーさんはどうしてそんなにソーセージ推しなのですか？\u3000ソーセージ美味しいですけど……」"
translation = "「익시 씨는 왜 그렇게 소시지를 미는 거예욧? 소시지 맛있긴 하지만……」"

[[dialogue]]
speaker = "unk"
original = "それからバーベキューをして、ビーチバレーもして、花火もして、とにかくいろいろして……夏の海をみんなで満喫したのだった。"
translation = "그 후 바비큐도 하고, 비치발리볼도 하고, 불꽃놀이도 하고, 아무튼 이것저것 하며…… 여름 바다를 다 함께 만끽했다."

