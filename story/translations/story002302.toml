[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ここのところお世話になってますけど、コハルコ先輩のご家庭って、本当いい家族ですよね」"
translation = "「요즘 신세를 지고 있습니다만, 코하루코 선배네 가정은 정말 좋은 가족이네요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「まぁね、自慢の家族だよ」"
translation = "「그렇지, 자랑스러운 가족이야.」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「すみませーん、よろしいでしょうか」"
translation = "「실례합니다~ 계신가요?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「あ、お客さんだ。お父さんはパソコンの組み立てしてるから、私行ってくるね」"
translation = "「아, 손님이다. 아빠는 PC 조립 중이시니까, 내가 다녀올게.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はぁい。じゃあ私は掃除でもしてますね」"
translation = "「네~ 그럼 전 청소라도 하고 있을게요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いらっしゃいませ。何かお探しものですか？」"
translation = "「어서 오세요. 찾으시는 물건이라도 있으신가요?」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「……はい。パソコンを自作したいのですが、久しぶりなのでいろいろ教えていただければと思いまして」"
translation = "「……네. PC를 자작하고 싶어서요. 오랜만이라 이것저것 알려주셨으면 해서 왔습니다.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「かしこまりました。最高の１台を組み上げましょうね！」"
translation = "「알겠습니다. 최고의 한 대를 조립해 보자고요!」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「まずはスペックですね。どのような用途でお考えですか？」"
translation = "「우선은 스펙이네요. 어떤 용도로 생각하고 계신가요?」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「えっと、その、特に何用とかは考えていなくて。……それほど高性能でなくてもいいんですが、スロットに余裕を持たせておこうかと」"
translation = "「에또, 그게, 딱히 용도 같은 건 생각하지 않아서요. ……그렇게 고성능이 아니어도 괜찮습니다만, 슬롯에 여유를 좀 두려고요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「なるほど、あとで拡張しやすいですからね。ゲームはよく遊ばれますか？\u3000オンラインゲームをされるのでしたらＣＰＵは最新のものがおすすめですよ」"
translation = "「과연, 나중에 확장하기 좋으니까요. 게임은 자주 하시나요? 온라인 게임을 하신다면 CPU는 최신형을 추천드려요.」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「対人戦は沼……いえ、ゲームはあまり嗜みませんね。消費電力を考えても、ＣＰＵはミドルクラスで十分だと思います」"
translation = "「대인전은 늪…… 아니, 게임은 그리 즐기지 않아요. 소비전력을 생각해도 CPU는 미들 클래스로 충분하다고 생각합니다.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふふっ。さすが経験者、お詳しいですね」"
translation = "「후훗. 역시 경험자시라 잘 아시네요.」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「いえ、それほどでは。……可笑しかったでしょうか？」"
translation = "「아니요, 그 정도는. ……이상했나요?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「若い女の子でパソコンに詳しい人は珍しいですから、嬉しくて、つい。すみません」"
translation = "「젊은 여자분 중에 PC를 잘 아는 분은 드무니까, 기뻐서 그만. 죄송해요.」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「分かります。コラ……私の友達もパソコンはさっぱりで、話が合わないんです」"
translation = "「이해해요. 콜라…… 제 친구들도 PC는 전혀 몰라서 말이 안 통하거든요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私もです。パーツの名前を出したら、なにそれ美味しいのって言われちゃって」"
translation = "「저도 그래요. 파츠 이름을 대면, 그게 뭐야? 먹는 거야? 라는 소리를 들어서요.」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「あはは、私も同じこと聞かれました」"
translation = "「아하하, 저도 똑같은 소리를 들었어요.」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「…………あ」"
translation = "「…………아.」"

[[dialogue]]
speaker = "unk"
original = "客の視線がガラスケースの中に注がれている。そこには１点のパーツがあった。"
translation = "손님의 시선이 유리 케이스 안으로 향한다. 그곳에는 파츠 하나가 놓여 있었다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「『<ruby>Ｄｏｍｅｋｉ<rt>ドーメキ</rt></ruby>』……そちらは倒産したメーカーのパーツです。評価は非常に高かったのですが、今となっては型落ちですね。もし購入をお考えでしたら、お値引きしますよ」"
translation = "「『<ruby>Domeki<rt>도메키</rt></ruby>』…… 그건 도산한 메이커의 파츠예요. 평가는 아주 높았지만, 지금은 구형 모델이죠. 혹시 구입하실 생각이라면 깎아드릴게요.」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「……これ、うちの出したパーツです」"
translation = "「……이거, 저희가 만든 파츠예요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "お客さん？"
speaker_translation = "손님?"
original = "「申し訳ありません、パソコンを買いに来たのはウソなんです」"
translation = "「죄송합니다, PC를 사러 왔다는 건 거짓말이에요.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……私は<ruby>百目騎<rt>どうめき</rt></ruby>レイラ。最後のコラプサーです」"
translation = "「……저는 도메키 레이라. 마지막 콜랩서입니다.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（百目騎といえば、五名門の一角。半導体産業で財を成した一族だ。最近は分家に事業を乗っ取られたらしいけど……）"
translation = "（도메키라면 오명문의 일각. 반도체 산업으로 부를 쌓은 일족이야. 최근엔 분가에 사업을 빼앗겼다고 들었지만……）"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（ああ、そうか。この子が、コラプサーのハッカー……私の追跡を妨害していた張本人だ）"
translation = "（아아, 그렇구나. 이 아이가 콜랩서의 해커…… 내 추적을 방해하던 장본인이야.）"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お静かに。戦いになれば、私は手加減できません。あなたのご家族もこのお店も無事では済まないでしょう。……私もそれは望んでいません」"
translation = "「조용히 하세요. 싸움이 되면 저는 봐드릴 수 없습니다. 당신의 가족도 이 가게도 무사하지 못하겠죠. ……저도 그걸 바라지는 않아요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「……何が目的なの？」"
translation = "「……목적이 뭐야?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私たちコラプサーの目的はリクリエのない世界。そのために、朝比奈コハルコさん、あなたの…………命が必要なんです」"
translation = "「우리 콜랩서의 목적은 리크리에가 없는 세계. 그러기 위해 아사히나 코하루코 씨, 당신의………… 목숨이 필요합니다.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私の……命……」"
translation = "「내…… 목숨……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ちなみに……百目騎さんの言う、リクリエのない世界……その中には私の家族も含まれるんだよね？」"
translation = "「참고로…… 도메키 씨가 말하는 리크리에가 없는 세계…… 그 안에는 내 가족도 포함되는 거지?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はい。世界の救済は必ず成し遂げます。そうでなければ、私の目的も果たされませんから」"
translation = "「네. 세계의 구제는 반드시 이뤄낼 겁니다. 그렇지 않으면 제 목적도 완수되지 않으니까요.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あらかじめ言っておきます。私の星術はコラプサーの中で最も強力です。……どんなに犠牲が出ても、止まるつもりはありません。だから、何もせずについてきてください」"
translation = "「미리 말해두겠습니다. 제 성술은 콜랩서 중에서 가장 강력합니다. ……어떤 희생이 따르더라도 멈출 생각은 없어요. 그러니까 아무것도 하지 말고 따라와 주십시오.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「分かった。あなたについていくよ」"
translation = "「알았어. 당신을 따라갈게.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……決断が早いんですね」"
translation = "「……결단이 빠르시네요.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「これでも星騎士としてはベテランだし、私じゃあなたに勝てないことは見たら理解できる。選択肢はないよ」"
translation = "「이래 봬도 성기사로서는 베테랑이고, 내가 당신을 이길 수 없다는 건 보면 알 수 있어. 선택지는 없네.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "（コラプサーの強さは実際戦ったから分かる。今は従って、相手の様子を見るしかない……）"
translation = "（콜랩서의 강함은 실제로 싸워봐서 알아. 지금은 따르면서 상대의 상태를 살필 수밖에 없어……）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「コハルコ先輩、お出かけですか？」"
translation = "「코하루코 선배, 어디 나가시나요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私、一応これでも護衛なので、お出かけなら一言欲しいんですが……そちらの方から何かされてます？」"
translation = "「저, 일단 이래 봬도 호위니까 외출하신다면 한마디 해주셨으면 하는데요…… 저분한테 무슨 일이라도 당하신 거예요?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ごめん、リーリアさん。私、行くことにしたから──」"
translation = "「미안, 리리아 씨. 나, 가기로 했으니까──」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「サイバーアナライズ！」"
translation = "「사이버 애널라이즈!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「っ！？」"
translation = "「윽!?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私は家族を守りたい……だから、バイバイ。新星のみんなによろしくね」"
translation = "「나는 가족을 지키고 싶어…… 그러니까, 바이바이. 신성의 모두에게 안부 전해줘.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ、待って……！\u3000コハルコ先輩、コハルコ先輩っ！！」"
translation = "「아, 기다려요……! 코하루코 선배, 코하루코 선배!!」"

