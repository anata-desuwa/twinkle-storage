[[dialogue]]
speaker = "unk"
original = "第４話,再会を約して,P"
translation = "제4화, 재회를 약속하며, P"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今日のクロト、どうしたの？」"
translation = "「오늘 쿠로토, 왜 그래?」"

[[dialogue]]
speaker = "マトイ"
original = "「いつになく疲れてるみたい。トレーニングのしすぎかな？」"
translation = "「여느 때보다 피곤해 보여. 훈련을 너무 많이 했나?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まあ、たまにはそういう日もあるでしょ。クロトも無理せず休んでなさい」"
translation = "「뭐, 가끔은 그런 날도 있겠지. 쿠로토도 무리하지 말고 쉬어」"

[[dialogue]]
speaker = "unk"
original = "ちょっと休めば復活するから"
translation = "잠깐 쉬면 부활하니까"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워"

[[dialogue]]
speaker = "マトイ"
original = "「そうだ、栄養ドリンク飲む？\u3000お高いやつがちょうどあるから……」"
translation = "「맞다, 영양 드링크 마실래? 비싼 게 마침 있어서……」"

[[dialogue]]
speaker = "？？？"
original = "「にんにん！\u3000そんな時こそ忍びの秘薬でござるよ～！」"
translation = "「닌닌! 그럴 때야말로 닌자의 비약이외다~!」"

[[dialogue]]
speaker = "せつな"
original = "「しゅたっ！\u3000せつな参上でござる！」"
translation = "「슈탓! 세츠나 등장이외다!」"

[[dialogue]]
speaker = "マトイ"
original = "「きゃあっ！」"
translation = "「꺄악!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう、ビックリするじゃないの！\u3000いきなり現れないでよ！」"
translation = "「정말, 놀랐잖아! 갑자기 나타나지 말라고!」"

[[dialogue]]
speaker = "シズル"
original = "「うちの子がごめんなさい。改めまして、紫桜の里の鵜飼シズルと申します」"
translation = "「우리 애가 실례했네요. 다시 인사드릴게요, 자앵마을의 우카이 시즈루라고 합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヘレナちゃんから話は聞いてるわ！\u3000ようこそ星徒会へ、ゆっくりしていってちょうだい！」"
translation = "「헬레나에게 얘기 들었어! 성도회에 온 걸 환영해, 편히 쉬다 가라고!」"

[[dialogue]]
speaker = "シズル"
original = "「ありがとうございます。お仕事の邪魔をするつもりはありませんから。ちょっと魔王さんの様子が気懸かりだっただけなので」"
translation = "「감사합니다. 업무를 방해할 생각은 없어요. 그저 마왕님 상태가 조금 걱정됐을 뿐이라서요」"

[[dialogue]]
speaker = "シズル"
original = "「やっぱりお疲れみたいですね。特製の秘薬を持って来ましたから、どうぞ飲んで下さい」"
translation = "「역시 피곤하신 모양이네요. 특제 비약을 가져왔으니, 어서 드세요」"

[[dialogue]]
speaker = "unk"
original = "秘薬こわい"
translation = "비약 무서워"

[[dialogue]]
speaker = "unk"
original = "めちゃくちゃ苦い？"
translation = "엄청나게 써?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしたの？\u3000怯えちゃってるけど……」"
translation = "「왜 그래? 겁을 집어먹고는……」"

[[dialogue]]
speaker = "せつな"
original = "「さもありなん。師匠の秘薬はめちゃ苦でござるからな！」"
translation = "「그럴 만도 하오. 스승님의 비약은 엄청나게 쓰니까 말이오!」"

[[dialogue]]
speaker = "シズル"
original = "「大丈夫ですよ、この秘薬はあま～くしてますから、里の子どもでも飲めちゃうくらいなんです」"
translation = "「괜찮아요, 이 비약은 다~ㄹ콤하게 만들어서 마을 어린아이들도 마실 수 있을 정도거든요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら、だったら安心じゃない。思い切ってグイっといっちゃいなさいよ」"
translation = "「어머, 그럼 안심이잖아. 마음 먹고 쭉 들이켜버려」"

[[dialogue]]
speaker = "マトイ"
original = "「会長の怯え方が普通じゃないんだけど……大丈夫かな？」"
translation = "「회장님이 겁먹은 게 예사롭지 않은데…… 괜찮을까?」"

[[dialogue]]
speaker = "シズル"
original = "「本当に大丈夫なのに……そんなに怯えられると、私、悲しくなってしまいます」"
translation = "「정말 괜찮은데…… 그렇게 겁내시면 저, 슬퍼져요」"

[[dialogue]]
speaker = "シズル"
original = "「ねえ、魔王さん……」"
translation = "「저기, 마왕님……」"

[[dialogue]]
speaker = "シズル"
original = "（昨日はごめんなさい。ちょっと張り切りすぎちゃいましたね。秘薬には精力回復の効果をつけておきましたので、飲むことをオススメしますよ♪）"
translation = "(어제는 미안해요. 조금 너무 의욕이 넘쳤네요. 비약에는 정력 회복 효과를 넣어두었으니, 마시는 걸 추천할게요♪)"

[[dialogue]]
speaker = "ヴィーナス"
original = "「見た目すっごく健全なのに……なーんか妖しい感じがするのは気のせいかしら？」"
translation = "「겉보기엔 무지 건전해 보이는데…… 왠~지 묘한 느낌이 드는 건 기분 탓일까?」"

[[dialogue]]
speaker = "せつな"
original = "「気のせいではないでござる。せつなの師匠はすごいでござるよ～♪」"
translation = "「기분 탓이 아니외다. 세츠나의 스승님은 정말 대단하시외다~♪」"

[[dialogue]]
speaker = "シズル"
original = "「ふふっ、それほどでもないですよ。ちょっと薬を作るのが上手なだけの、普通の女の子です♪」"
translation = "「후훗, 그 정도까진 아니에요. 그저 약을 좀 잘 만드는 평범한 여자애랍니다♪」"

[[dialogue]]
speaker = "せつな"
original = "「師匠が普通というのは無理があるでござるよ～」"
translation = "「스승님이 평범하다는 건 무리가 있소이다~」"

[[dialogue]]
speaker = "unk"
original = "（激しく同意！）"
translation = "(격하게 동의!)"

[[dialogue]]
speaker = "シズル"
original = "「そんな事より、用件を先に済ませましょう……魔王さん、数日でしたがいろいろお世話になりました」"
translation = "「그것보다, 볼일을 먼저 끝내죠…… 마왕님, 며칠 동안 신세 많이 졌습니다」"

[[dialogue]]
speaker = "シズル"
original = "「せつなの様子も見ることができましたし、久々の大都会を満喫することもできました」"
translation = "「세츠나의 모습도 볼 수 있었고, 오랜만에 대도시를 만끽할 수도 있었어요」"

[[dialogue]]
speaker = "シズル"
original = "「なので本日、紫桜の里に帰ろうと思います」"
translation = "「그래서 오늘, 자앵마을로 돌아가려고 합니다」"

[[dialogue]]
speaker = "unk"
original = "え…………"
translation = "어…………"

[[dialogue]]
speaker = "シズル"
original = "「突然で申し訳ありません。魔王さんには帰る前に挨拶をしておきたかったので」"
translation = "「갑작스러워 죄송합니다. 마왕님께는 가기 전에 인사를 드리고 싶어서요」"

[[dialogue]]
speaker = "せつな"
original = "「あまり長く里を不在にしていると、残されたものが不安に思うでござる」"
translation = "「너무 오래 마을을 비우면, 남겨진 이들이 불안해할 것이외다」"

[[dialogue]]
speaker = "シズル"
original = "「たくましく育ちつつも、まだまだ未熟な子供たちですから」"
translation = "「듬직하게 자라고는 있지만, 아직 미숙한 아이들이니까요」"

[[dialogue]]
speaker = "シズル"
original = "「それでは魔王さん。それから皆さんもありがとうございました」"
translation = "「그럼 마왕님, 그리고 여러분도 감사했습니다」"

[[dialogue]]
speaker = "マトイ"
original = "「いえいえ、ご丁寧にありがとうございます」"
translation = "「아뇨아뇨, 정중히 인사해 주셔서 감사해요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……どうしたのよ。なんかすごくショックを受けてない？」"
translation = "「……왜 그래. 왠지 굉장히 충격받은 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "あ、いや、それは……"
translation = "아, 아니, 그건……"

[[dialogue]]
speaker = "せつな"
original = "「師匠とお別れするのが惜しいのでござろうか？\u3000主様と師匠、すっかり仲良くなったでござるからな～」"
translation = "「스승님과 헤어지는 게 아쉬운 모양이구려? 주인님과 스승님, 완전히 친해졌으니까 말이오~」"

[[dialogue]]
speaker = "シズル"
original = "「そうですね。私も後ろ髪を引かれる思いです」"
translation = "「그러게요. 저도 뒤가 당기는 기분이에요」"

[[dialogue]]
speaker = "シズル"
original = "「けれど今生の別れではありませんので。魔王さん、そんなに気を落とさずに」"
translation = "「하지만 영영 이별은 아니니까요. 마왕님, 그렇게 낙심하지 마세요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほー、ふーん、そういう感じなんだ～」"
translation = "「호오, 흐응, 그런 느낌이구나~」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ？\u3000えっ？\u3000どういうこと？\u3000そういうことなの？」"
translation = "「엣? 엣? 무슨 소리야? 그런 거야?」"

[[dialogue]]
speaker = "シズル"
original = "「ふふっ……さて、どうでしょうか？」"
translation = "「후훗…… 글쎄요, 어떨까요?」"

[[dialogue]]
speaker = "マトイ"
original = "「き、気になりますっ！！」"
translation = "「구, 궁금해요!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まあまあ、野暮な詮索は不要よ、マトイ」"
translation = "「자자, 쓸데없는 참견은 하지 마, 마토이」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね、ひとつだけ言えることがあるとしたら……ヘレナちゃんにお願いすれば、いつでも紫桜の里に繋いでもらえるということね！」"
translation = "「그래, 딱 하나 말할 수 있는 게 있다면…… 헬레나에게 부탁하면 언제든 자앵마을과 연결해 줄 수 있다는 거야!」"

[[dialogue]]
speaker = "unk"
original = "その笑顔が腹立つ……"
translation = "그 미소가 짜증 나……"

[[dialogue]]
speaker = "シズル"
original = "「空間転移装置のおかげで行き来も楽になりましたから、会いたいと思った時には会いに来てください。また一緒に遊べる日を楽しみにしていますよ」"
translation = "「공간 전이 장치 덕분에 오가기도 편해졌으니, 보고 싶을 땐 보러 오세요. 다시 함께 놀 날을 기대하고 있을게요」"

[[dialogue]]
speaker = "シズル"
original = "「それでは失礼します。最後に魔王さん……」"
translation = "「그럼 실례하겠습니다. 마지막으로 마왕님……」"

[[dialogue]]
speaker = "シズル"
original = "（せつなのことも、よろしく頼みましたよ……♪）"
translation = "(세츠나도 잘 부탁할게요……♪)"

[[dialogue]]
speaker = "unk"
original = "こうしてシズルさんは、様々なものを残して帰って行った。"
translation = "이렇게 시즈루 씨는 여러 가지를 남기고 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "次に来る時は、どんな爆弾が飛び出すのかわからないけど、楽しみであることに違いはなかった。"
translation = "다음에 올 때는 어떤 폭탄이 튀어나올지 모르겠지만, 기대된다는 것만은 분명했다."

