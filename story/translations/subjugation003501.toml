[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーっゆっゆっゆっ♪」"
translation = "「유~유유유유♪」"

[[dialogue]]
speaker = "unk"
original = "深き闇夜に木霊する笑い声、その主はジャクリーヌ・オー・ランタン。"
translation = "깊은 밤의 어둠 속에 메아리치는 웃음소리, 그 주인은 자클린 오 란탄."

[[dialogue]]
speaker = "unk"
original = "ジャック・オー・ランタンの娘で、ひょんなことから新星学園の生徒になった幽霊の女の子だ。"
translation = "잭 오 란탄의 딸로, 어쩌다 보니 신성 학원의 학생이 된 유령 여자아이다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「『冥界道士』面白かったゆ～♪\u3000ヒトリにはいい映画を教えてもらったゆ～♪」"
translation = "「『명계도사』 재미있었유~♪ 히토리에게 좋은 영화를 추천받았유~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゾンビはあんまり好きじゃなかったゆ。でも、あの映画に出てきた幽霊ゾンビはカッコ良かったゆ～♪」"
translation = "「좀비는 별로 좋아하지 않았유. 하지만, 그 영화에 나온 유령 좀비는 멋있었유~♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「うーっ、余も幽霊ゾンビ軍団が欲しいゆ！\u3000そいつらを引き連れて悪の幽霊ゾンビと戦いたいゆ～！」"
translation = "「우으, 여도 유령 좀비 군단이 갖고 싶유! 그 녀석들을 이끌고 악의 유령 좀비와 싸우고 싶유~!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆっ！\u3000いいこと思いついたゆ♪」"
translation = "「유유! 좋은 게 떠올랐유♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆーっゆっゆっゆーーっ♪」"
translation = "「유~유유유유~~♪」"

[[dialogue]]
speaker = "unk"
original = "翌日──"
translation = "다음 날──"

[[dialogue]]
speaker = "舞亜"
original = "「えっと……ジャクリーヌちゃん、何かあったのかな？」"
translation = "「저기…… 자클린짱, 무슨 일 있었어?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ？」"
translation = "「유?」"

[[dialogue]]
speaker = "ソフィア"
original = "「大好物のドーナツを目の前にして、今日はどうしてそんなに大人しいんです？」"
translation = "「제일 좋아하는 도넛을 눈앞에 두고, 오늘은 어째서 그렇게 얌전한 건가요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そーそー、いつもだったらもっとテンション高いっしょ？\u3000どうしたの？\u3000具合でも悪いん？」"
translation = "「맞아 맞아, 평소라면 좀 더 텐션 높잖아? 왜 그래? 어디 아파?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「し、心配ないゆ！\u3000余は健康そのものだゆ！」"
translation = "「거, 걱정 말유! 여는 건강 그 자체유!」"

[[dialogue]]
speaker = "ソフィア"
original = "「そもそもジャクリーヌさんは幽霊なんですよね？\u3000体調を悪くすることとかあるんですか？」"
translation = "「애초에 자클린 씨는 유령이잖아요? 컨디션이 나빠지거나 하는 일도 있나요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「偏見はよくないし～。幽霊でもあるでしょ、風邪引いたりとか、お腹を壊しちゃったりとか」"
translation = "「편견은 좋지 않다구~. 유령이라도 있겠지, 감기 걸리거나 배탈이 나거나 하는 거 말이야.」"

[[dialogue]]
speaker = "舞亜"
original = "「でも、今は体調が悪いってわけじゃなさそうだし……何か悩み事がある、とか？」"
translation = "「하지만, 지금은 컨디션이 나쁜 것 같지는 않고…… 뭔가 고민거리라도 있는 거야?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆっ！？」"
translation = "「유유!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「え～、そうなん？\u3000だったら遠慮せずに相談するし！\u3000あたしら友達でしょ♪」"
translation = "「에~ 진짜? 그렇다면 사양 말고 상담하라구! 우리 친구잖아♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ……」"
translation = "「유……」"

[[dialogue]]
speaker = "ソフィア"
original = "「悩み事というと……そうですね、故郷の魔界が恋しくて憂鬱になっているとか？」"
translation = "「고민거리라고 하면…… 그렇네요, 고향인 마계가 그리워서 우울해하고 있다거나?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「いわゆるホームシックってやつ？」"
translation = "「이른바 향수병이라는 거?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「そ、そういうのじゃないゆ」"
translation = "「그, 그런 거 아니유.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「じゃあ恋の悩みとか！\u3000うわー、だったらあたし超おーえんするんだけど！」"
translation = "「그럼 사랑 고민이라든가! 우와, 그렇다면 나 완전 응원할 텐데!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆゆっ！\u3000ち、違うゆ！\u3000恋とかよくわからないゆ～！」"
translation = "「유유유! 아, 아니유! 사랑 같은 건 잘 모르겠유~!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「え～、残念だし……」"
translation = "「에~ 아쉽네……」"

[[dialogue]]
speaker = "舞亜"
original = "「えっと、じゃあ……いたずら成分が不足してるとか？」"
translation = "「저기, 그럼…… 장난 성분이 부족하다든가?」"

[[dialogue]]
speaker = "ソフィア"
original = "「いたずら成分？\u3000何ですか、それは……」"
translation = "「장난 성분? 뭔가요, 그건……」"

[[dialogue]]
speaker = "舞亜"
original = "「最近あんまりいたずら出来てなくて、それで元気がない、みたいな……何となくだけど」"
translation = "「최근에 장난을 별로 못 쳐서, 그래서 기운이 없다든가…… 왠지 그런 느낌인데.」"

[[dialogue]]
speaker = "ソフィア"
original = "「それで元気が無くなるなんてことありますかね？」"
translation = "「그런 걸로 기운이 없어지는 일도 있을까요?」"

[[dialogue]]
speaker = "ソフィア"
original = "「それにジャクリーヌさんは改心していい幽霊になったんです。ですから、いたずら出来なくて元気がないなんてこと……」"
translation = "「게다가 자클린 씨는 개심해서 착한 유령이 되었잖아요. 그러니까 장난을 못 쳐서 기운이 없다는 건……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ソフィア"
original = "「……この反応、まさか図星ですか？」"
translation = "「……이 반응, 설마 정곡인가요?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ち、違うゆ……そんな怖い顔で迫らないで欲しいゆ……」"
translation = "「아, 아니유…… 그런 무서운 얼굴로 다가오지 않았으면 좋겠유……」"

[[dialogue]]
speaker = "ソフィア"
original = "「悩み事というより、何か隠し事をしているようですね。ジャクリーヌさん、正直に言ってください！」"
translation = "「고민이라기보다, 뭔가 숨기는 게 있는 것 같네요. 자클린 씨, 솔직하게 말해주세요!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆ～……じ、実は……」"
translation = "「유유~…… 사실은……」"

[[dialogue]]
speaker = "女生徒"
original = "「きゃあああぁーーーっ！！」"
translation = "「꺄아아아악──!!」"

[[dialogue]]
speaker = "舞亜"
original = "「何事！？」"
translation = "「무슨 일이야!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「見てくださいっ！\u3000あそこっ、謎の生命体が……いや、生命体じゃない？」"
translation = "「보세요! 저기, 수수께끼의 생명체가…… 아니, 생명체가 아닌가요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おばけだね～」"
translation = "「귀신이네~」"

[[dialogue]]
speaker = "舞亜"
original = "「ゾンビっぽい感じもするよ？」"
translation = "「좀비 같은 느낌도 들어.」"

[[dialogue]]
speaker = "ソフィア"
original = "「どっちでもいいです！\u3000はやく何とかしましょう！」"
translation = "「어느 쪽이든 상관없어요! 빨리 어떻게든 하죠!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「りょーかいっ！\u3000こら～、逃げるな～！」"
translation = "「라져! 이봐~ 도망치지 마~!」"

[[dialogue]]
speaker = "舞亜"
original = "「任せて！\u3000挟み撃ちにして……って、すり抜けた！？」"
translation = "「맡겨줘! 협공해서…… 어라, 통과했어!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ほら、やっぱりおばけだった！」"
translation = "「봐, 역시 귀신이었어!」"

[[dialogue]]
speaker = "ソフィア"
original = "「霊体……？\u3000幽霊の性質を備えているようですね」"
translation = "「영체……? 유령의 성질을 갖추고 있는 것 같네요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「捕まえようにも、これじゃどうしようもなくない？」"
translation = "「잡으려 해도, 이래서야 어쩔 도리가 없지 않아?」"

[[dialogue]]
speaker = "ソフィア"
original = "「むむむ……一体どうすれば……」"
translation = "「으으음…… 도대체 어떻게 하면……」"

[[dialogue]]
speaker = "舞亜"
original = "「相手が幽霊なら簡単でしょ。こっちには幽霊のお姫様がいるんだから。ねっ、ジャクリーヌちゃん」"
translation = "「상대가 유령이라면 간단하잖아. 우리에겐 유령 공주님이 있으니까. 그치, 자클린짱?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「や、ヤバいゆ……大変なことになったゆ……」"
translation = "「야, 얄짤없유…… 큰일 났유……」"

[[dialogue]]
speaker = "舞亜"
original = "「えーと……ジャクリーヌちゃん？」"
translation = "「저기…… 자클린짱?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「なな、何でもないゆ！\u3000あんなの余とは何の関係もないゆ！」"
translation = "「아아, 아무것도 아니유! 저런 거 여와는 아무 관계도 없유!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「この反応って間違いなく関係あるやつだし！」"
translation = "「이 반응은 틀림없이 관계있는 거라구!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ジャクリーヌさん、ちょっとオハナシしましょうか……！」"
translation = "「자클린 씨, 잠깐 이야기 좀 할까요……!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆゆ～～～～っ！！」"
translation = "「유유~~~~!!」"

