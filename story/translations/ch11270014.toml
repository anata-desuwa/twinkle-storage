[[dialogue]]
speaker = "unk"
original = "第４話,好きと嫌いを見つけていこう,P"
translation = "제4화, 좋아하는 것과 싫어하는 것을 찾아가자"

[[dialogue]]
speaker = "unk"
original = "とある日の休日──俺はレティシアを自宅に招待していた。"
translation = "어느 휴일── 나는 레티시아를 집으로 초대했다."

[[dialogue]]
speaker = "レティシア"
original = "「まさか魔王の自宅に呼ばれるだなんてね。どういう風の吹き回し？」"
translation = "「설마 마왕의 집으로 불려갈 줄이야. 무슨 바람이 분 거야?」"

[[dialogue]]
speaker = "unk"
original = "もっと仲良くなりたいと思って"
translation = "좀 더 친해지고 싶어서"

[[dialogue]]
speaker = "レティシア"
original = "「何度も言っているけれど、あなたってやっぱり変わってるのね」"
translation = "「몇 번이나 말하지만, 당신은 역시 특이해」"

[[dialogue]]
speaker = "レティシア"
original = "「私みたいな女といてもつまらないでしょう？\u3000暇をつぶすにしても、相手は選ぶべきだわ」"
translation = "「나 같은 여자와 있어도 재미없잖아? 시간을 때우더라도 상대는 골라야지」"

[[dialogue]]
speaker = "レティシア"
original = "「ベアトやグレイス、チナが相手の方が退屈しないと思うけれど」"
translation = "「베아트나 그레이스, 치나를 상대하는 편이 지루하지 않을 텐데」"

[[dialogue]]
speaker = "unk"
original = "レティシアと暇をつぶしたい"
translation = "레티시아와 시간을 때우고 싶어"

[[dialogue]]
speaker = "レティシア"
original = "「……そう。そこまで言うなら、もう何も言わないわ」"
translation = "「……그래. 그렇게까지 말한다면 이제 아무 말 안 할게」"

[[dialogue]]
speaker = "unk"
original = "アルタイルで過ごしてみて、どうだ？"
translation = "알타이르에서 지내보니 어때?"

[[dialogue]]
speaker = "レティシア"
original = "「漠然とした問いかけね……でも、そうね──」"
translation = "「막연한 질문이네…… 하지만, 그래──」"

[[dialogue]]
speaker = "レティシア"
original = "「以前の私と、今の私は違うと思う……折に触れて自問自答することが増えたの」"
translation = "「예전의 나와 지금의 나는 다르다고 생각해…… 틈날 때마다 자문자답하는 일이 늘었거든」"

[[dialogue]]
speaker = "レティシア"
original = "「ルヴィの『命令』に頼って、縋って生きてきた私だけど……今は自分の意思、というか……心？\u3000みたいなものを探ろうとしてる最中ね」"
translation = "「루비의 『명령』에 의지하고 매달려 살아온 나지만…… 지금은 자신의 의지라고 할까…… 마음? 같은 것을 탐색하려 하는 중이야」"

[[dialogue]]
speaker = "レティシア"
original = "「見えるようで、見えない感覚がもどかしい。前進できているのかもよくわからないの」"
translation = "「보일 듯하면서도 보이지 않는 감각이 답답해. 전진하고 있는 건지도 잘 모르겠고」"

[[dialogue]]
speaker = "unk"
original = "だったら声に出して分類してみたら？"
translation = "그럼 입 밖으로 내서 분류해 보면 어때?"

[[dialogue]]
speaker = "レティシア"
original = "「『好き』か『嫌い』かを、仕分けする……そんなことして、意味があるのかしら？」"
translation = "「『좋아함』인지 『싫어함』인지 분류한다…… 그런 짓을 해서 의미가 있을까?」"

[[dialogue]]
speaker = "レティシア"
original = "「いいわ。じゃあ、質問してみてくれる？」"
translation = "「좋아. 그럼 질문해 줄래?」"

[[dialogue]]
speaker = "unk"
original = "勉強は好きと嫌い、どっち？"
translation = "공부는 좋아함과 싫어함 중 어느 쪽?"

[[dialogue]]
speaker = "unk"
original = "極星のみんなと過ごすのは？"
translation = "극성 멤버들과 지내는 건?"

[[dialogue]]
speaker = "レティシア"
original = "「極星のみんなと過ごすのは──もちろん『好き』よ。勉強は──そうね……『嫌い』、かしら？」"
translation = "「극성 멤버들과 지내는 건── 당연히 『좋아함』이야. 공부는── 글쎄…… 『싫어함』일까?」"

[[dialogue]]
speaker = "unk"
original = "意外な『好き』や『嫌い』が見つかるかも"
translation = "의외의 『좋아함』이나 『싫어함』을 발견할지도 몰라"

[[dialogue]]
speaker = "unk"
original = "こうやって分類していったら……"
translation = "이렇게 분류해 나간다면……"

[[dialogue]]
speaker = "レティシア"
original = "「……なるほどね。確かに勉強について『嫌い』という感覚を持ったことはなかったかも」"
translation = "「……과연 그렇네. 확실히 공부에 대해 『싫다』는 감각을 가져본 적은 없었을지도」"

[[dialogue]]
speaker = "レティシア"
original = "「『できない』という事実は認めていたけれど、それより以前の自分の感情は自覚していなかった……」"
translation = "「『못한다』는 사실은 인정하고 있었지만, 그보다 앞선 자신의 감정은 자각하지 못했어……」"

[[dialogue]]
speaker = "レティシア"
original = "「──ふふ。私、本当にヒトとして見ると半人前ね。よちよち歩きもいいところだわ」"
translation = "「──후후. 나, 정말 인간으로서 보면 반쪽짜리네. 아장아장 걷는 수준이야」"

[[dialogue]]
speaker = "レティシア"
original = "「探すのを手伝ってくれる？\u3000私の好きなものと、嫌いなものを……」"
translation = "「찾는 걸 도와줄래? 내가 좋아하는 것과 싫어하는 것을……」"

[[dialogue]]
speaker = "unk"
original = "その後、レティシアに様々なものを問いかけて『好き』と『嫌い』を分類していくことになった。"
translation = "그 후, 레티시아에게 다양한 것들을 물어보며 『좋아함』과 『싫어함』을 분류하게 되었다."

[[dialogue]]
speaker = "unk"
original = "好きなものは──戦闘訓練や、あまいお菓子や、ハンバーグにオムライス（意外だ）。"
translation = "좋아하는 것은── 전투 훈련, 달콤한 과자, 햄버그와 오므라이스 (의외다)."

[[dialogue]]
speaker = "unk"
original = "嫌いなものは──勉強に読書、コーヒー。そして、１人の時間（こっちも意外だ）。"
translation = "싫어하는 것은── 공부와 독서, 커피. 그리고 혼자 있는 시간 (이쪽도 의외다)."

[[dialogue]]
speaker = "unk"
original = "レティシアとそんな会話を続けながら、ちょうどお昼時ということもあって、俺は彼女に昼食を作ることにした。"
translation = "레티시아와 그런 대화를 이어가며, 마침 점심때이기도 해서 나는 그녀에게 점심을 만들어 주기로 했다."

[[dialogue]]
speaker = "レティシア"
original = "「……あなた、料理ができるのね。ふうん、アルバイトで飲食店の経験があるの」"
translation = "「……당신, 요리를 할 줄 아는구나. 흐음, 아르바이트로 음식점 경험이 있다고」"

[[dialogue]]
speaker = "レティシア"
original = "「ハンバーグに、シンプルな野菜炒めの付け合わせ……」"
translation = "「햄버그에 심플한 야채 볶음 곁들임……」"

[[dialogue]]
speaker = "unk"
original = "どう？\u3000ピーマンは好き？"
translation = "어때? 피망은 좋아해?"

[[dialogue]]
speaker = "レティシア"
original = "「…………驚いた。いつもグレイスのぶんを食べてあげてたのに、知らなかった」"
translation = "「…………놀랐어. 항상 그레이스 몫을 대신 먹어줬는데, 몰랐어」"

[[dialogue]]
speaker = "レティシア"
original = "「私、<ruby>ピーマン<rt>こいつ</rt></ruby>のこと、『嫌い』だわ」"
translation = "「나, 피망, 『싫어』해」"

[[dialogue]]
speaker = "unk"
original = "前に嫌そうな顔をしてたから"
translation = "전에 싫어하는 표정을 지었으니까"

[[dialogue]]
speaker = "unk"
original = "そうだと思った"
translation = "그럴 줄 알았어"

[[dialogue]]
speaker = "レティシア"
original = "「……そう、よく見ているのね？」"
translation = "「……그래, 잘 지켜보고 있었구나?」"

[[dialogue]]
speaker = "レティシア"
original = "「……わざと嫌いな食べ物をどっさり入れるだなんて、ひどくない？」"
translation = "「……일부러 싫어하는 음식을 듬뿍 넣다니 너무하지 않아?」"

[[dialogue]]
speaker = "unk"
original = "食べてあげるよ。こっちの皿にどうぞ"
translation = "내가 먹어줄게. 이쪽 접시로 줘"

[[dialogue]]
speaker = "レティシア"
original = "「……ええ、お願い。ふうん……これが、グレイスの気持ち……嫌いなものを食べずにすむと、ホッとするのね」"
translation = "「……응, 부탁해. 흐음…… 이것이 그레이스의 기분…… 싫어하는 걸 먹지 않아도 된다니 안심되네」"

[[dialogue]]
speaker = "レティシア"
original = "「この時間までずっと分類してたけれど……もしかして私、かなり子供っぽいのかしら」"
translation = "「이 시간까지 계속 분류해 봤는데…… 혹시 나, 상당히 어린애 같은 걸까」"

[[dialogue]]
speaker = "レティシア"
original = "「甘いものが『好き』で、味のハッキリしたハンバーグとかオムライスとかが『好き』で……」"
translation = "「단것을 『좋아하고』, 맛이 뚜렷한 햄버그나 오므라이스 같은 걸 『좋아하고』……」"

[[dialogue]]
speaker = "レティシア"
original = "「コーヒーとかピーマンみたいな、苦いものが『嫌い』。読書や勉強も『嫌い』……」"
translation = "「커피나 피망 같은 쓴 것을 『싫어해』. 독서나 공부도 『싫어하고』……」"

[[dialogue]]
speaker = "レティシア"
original = "「…………何だか、少し情けなくなってきたかもしれないわ」"
translation = "「…………어쩐지 조금 한심해진 것 같을지도 몰라」"

[[dialogue]]
speaker = "unk"
original = "今の方が、以前よりも魅力的だ"
translation = "지금이 예전보다 더 매력적이야"

[[dialogue]]
speaker = "unk"
original = "等身大の自分を知ることが大事"
translation = "있는 그대로의 자신을 아는 게 중요해"

[[dialogue]]
speaker = "レティシア"
original = "「そんなものなの？\u3000じゃあ、逆に聞いてもいい？」"
translation = "「그런 거야? 그럼 반대로 물어봐도 될까?」"

[[dialogue]]
speaker = "レティシア"
original = "「あなたって、私のこと……『好き』なの？」"
translation = "「당신은 나를…… 『좋아해』?」"

[[dialogue]]
speaker = "unk"
original = "ぶっ──！？"
translation = "푸흡──!? 과, 갑자기?"

[[dialogue]]
speaker = "レティシア"
original = "「どうしてそんなに驚くの？\u3000当然の疑問じゃない。学園には他に、可愛い子や楽しい子がたくさんいるのに」"
translation = "「왜 그렇게 놀라? 당연한 의문이잖아. 학원에는 다른 귀엽고 즐거운 아이들이 잔뜩 있는데」"

[[dialogue]]
speaker = "レティシア"
original = "「私にばかり時間を使うのだもの。それで、お返事は？」"
translation = "「나한테만 시간을 쓰고 있잖아. 그래서, 대답은?」"

[[dialogue]]
speaker = "unk"
original = "……好きだよ"
translation = "……좋아해"

[[dialogue]]
speaker = "レティシア"
original = "「…………そう。変わり者も、ここに極まれり、ね？」"
translation = "「…………그래. 별난 사람도 여기까지 오면 극치네」"

[[dialogue]]
speaker = "レティシア"
original = "「……私？\u3000魔王のことを、どう思うのか？」"
translation = "「……나? 마왕을 어떻게 생각하느냐고?」"

[[dialogue]]
speaker = "レティシア"
original = "「そうね──」"
translation = "「글쎄──」"

[[dialogue]]
speaker = "レティシア"
original = "「…………『好き』よ、あなたのこと」"
translation = "「…………『좋아해』, 당신을」"

[[dialogue]]
speaker = "unk"
original = "しっかりと考えたレティシアからその一言が聞けて、俺の心は浮ついた。"
translation = "진지하게 생각한 레티시아로부터 그 한마디를 듣고, 내 마음은 들떠 올랐다."

[[dialogue]]
speaker = "レティシア"
original = "「……極星のみんなの次くらいにはね？\u3000だから──５番目くらいの『好き』かしら？」"
translation = "「……극성 멤버들 다음 정도로는 말이야? 그러니까── 5번째 정도의 『좋아함』일까?」"

[[dialogue]]
speaker = "unk"
original = "レティシアらしい独特の返事に、俺はぷっと吹き出してしまって……"
translation = "레티시아다운 독특한 대답에 나는 풋하고 웃음을 터뜨렸고……"

[[dialogue]]
speaker = "unk"
original = "「ピーマンには勝てたようで何よりだよ」と返答をするのだった──"
translation = "「피망은 이긴 것 같아 다행이야」라고 대답하는 것이었다──"

