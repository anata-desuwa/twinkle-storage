[[dialogue]]
speaker = "unk"
original = "バレンタイン翌日の朝。"
translation = "발렌타인 다음 날 아침."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「トワちゃん先生、おはようございま～す♪」"
translation = "「토와짱 선생님, 안녕하세요~♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、ルルカちゃん。おはよう♪」"
translation = "「앗, 루루카 양. 안녕♪」"

[[dialogue]]
speaker = "unk"
original = "２人が談笑していると――"
translation = "두 사람이 담소를 나누고 있자――"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「トワ先生、ルルカさん。おはようございます♪」"
translation = "「토와 선생님, 루루카 씨. 안녕하세요♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「イクシリオンちゃん♪\u3000おはよう！」"
translation = "「익실리온 양♪ 안녕!」"

[[dialogue]]
speaker = "unk"
original = "そこへイクシリオンもやって来て、３人は挨拶を交わした。ふとルルカは、イクシリオンの様子に気づく。"
translation = "거기에 익실리온도 찾아와 세 사람은 인사를 나누었다. 문득 루루카는 익실리온의 상태를 알아챈다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――あれ？\u3000イクシリオンちゃん、なんだか肌がすごくツヤツヤしてない？」"
translation = "「――어라? 익실리온 양, 왠지 피부가 엄청 반질반질하지 않아?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ……おかげさまで昨晩は、その……とてもスッキリ眠れまして……<emoji=heart04>」"
translation = "「아…… 덕분에 어젯밤은, 그…… 아주 개운하게 잠들어서요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、そっか。健康的でいいね、あははは……！」"
translation = "「그, 그렇구나. 건강해서 좋네, 아하하하……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「？\u3000とりあえず、無事にバレンタインも終わったし、ひと段落ってとこかな♪」"
translation = "「? 일단 무사히 발렌타인도 끝났고, 한숨 돌린 셈인가♪」"

[[dialogue]]
speaker = "unk"
original = "少し頬を赤らめたトワを見て、ルルカは首をかしげながらも、楽しそうに笑った。"
translation = "조금 뺨을 붉힌 토와를 보고 루루카는 고개를 갸웃거리면서도 즐겁게 웃었다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「それで……今日会ったら、お２人に渡したいと思っていたものがありまして――」"
translation = "「그래서…… 오늘 만나면 두 분께 드리고 싶었던 것이 있어서요――」"

[[dialogue]]
speaker = "unk"
original = "そう言ってイクシリオンが取り出したのは、小さなチョコの入った袋だった。"
translation = "그렇게 말하며 익실리온이 꺼낸 것은 작은 초콜릿이 든 봉지였다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「こちらをどうぞ。今回のお礼の気持ちを込めて、昨晩改めて作ってきました」"
translation = "「이걸 받으세요. 이번 보답의 마음을 담아 어젯밤에 다시 만들어 왔어요」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「わぁっ♪\u3000あたしにも？\u3000イクシリオンちゃん、ありがと～♪」"
translation = "「와아♪ 나한테도? 익실리온 양, 고마워~♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ありがとう♪\u3000――チョコを作れたってことは、もうバレンタインフォームも大丈夫なの？」"
translation = "「고마워♪ ――초콜릿을 만들 수 있었다는 건, 이제 발렌타인 폼도 괜찮은 거니?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。トワ先生の仰っていた通り、チョコを無事に渡せたことで、他のフォームにも変身できるようになりました」"
translation = "「네. 토와 선생님이 말씀하신 대로, 초콜릿을 무사히 전달한 덕분에 다른 폼으로도 변신할 수 있게 되었어요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そっか♪\u3000本当に、よかった！」"
translation = "「그렇구나♪ 정말 다행이야!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あの……それで、もしよろしければ……」"
translation = "「저기…… 그래서, 혹시 괜찮으시다면……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「今後は、私のことを『イクシー』と呼んでいただけませんか？」"
translation = "「앞으로는 저를 『이쿠시』라고 불러주시지 않겠어요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「その、勘違いでしたらお恥ずかしい限りなのですが……今回の件で、少しはトワ先生とも親しくなれたのではないかと……個人的には、そう思っておりまして……」"
translation = "「그게, 착각이라면 정말 부끄러운 일입니다만…… 이번 일로 조금은 토와 선생님과도 친해진 게 아닐까…… 개인적으로는 그렇게 생각하고 있어서요……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「――先生としては、いかがでしょうか？」"
translation = "「――선생님으로서는 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "もじもじと照れながら尋ねるイクシリオンに、トワはふっと微笑んで頷いた。"
translation = "머뭇머뭇 수줍게 묻는 익실리온에게 토와는 훗 미소 지으며 고개를 끄덕였다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――うん♪\u3000わかった。それじゃあ、これからは先生も『イクシーちゃん』って呼ぶね♪」"
translation = "「――응♪ 알았어. 그럼 이제부터 선생님도 『이쿠시짱』이라고 부를게♪」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……！\u3000はいっ♪\u3000これからもご指導、よろしくお願いします、先生！」"
translation = "「……! 네♪ 앞으로도 지도 잘 부탁드립니다, 선생님!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ねぇねぇ、それならあたしも、イクシーちゃんって呼んでもいい？」"
translation = "「있잖아 있잖아, 그럼 나도 이쿠시짱이라고 불러도 돼?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「もちろんです！\u3000実はルルカさんにも、そのお願いをしようと思っていたところでした」"
translation = "「물론이죠! 사실 루루카 씨에게도 그 부탁을 드리려던 참이었어요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「今回こうして仲良くなれたので、ぜひ今後も友達として仲良くしていただければと……」"
translation = "「이번에 이렇게 친해졌으니, 부디 앞으로도 친구로서 사이좋게 지내주셨으면 해서……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あははっ♪\u3000イクシーちゃん、同じ１年生同士なんだから、そんなにかしこまらなくてもいいよ～」"
translation = "「아하핫♪ 이쿠시짱, 같은 1학년끼리니까 그렇게 격식 차리지 않아도 돼~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしも友達が増えるのは大歓迎☆\u3000だから、今日からもっと仲良くしよ♪」"
translation = "「나도 친구가 느는 건 대환영☆ 그러니까 오늘부터 더 친하게 지내자♪」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ありがとうございます！\u3000私も新しい友達ができて、すごく嬉しいです♪」"
translation = "「감사합니다! 저도 새로운 친구가 생겨서 정말 기뻐요♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それじゃあ改めて――よろしくね、イクシーちゃん♪」"
translation = "「그럼 다시 한번―― 잘 부탁해, 이쿠시짱♪」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。こちらこそ、よろしくお願いします、ルルカさん！」"
translation = "「네. 저야말로 잘 부탁드립니다, 루루카 씨!」"

[[dialogue]]
speaker = "unk"
original = "２人が笑い合うと、イクシリオンはふと思い出したようにトワへと向き直った。"
translation = "두 사람이 서로 웃자, 익실리온은 문득 생각난 듯 토와를 향해 돌아섰다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そうでした、トワ先生。――アドバイスしていただいた通り、妄想癖を集中力に変える訓練を始めようと思っていまして……」"
translation = "「맞다, 토와 선생님. ――조언해 주신 대로, 망상벽을 집중력으로 바꾸는 훈련을 시작하려고 생각하고 있어서요……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「できれば後ほど、バレンタインフォームの使い方について、ご指導いただけないでしょうか……？」"
translation = "「가능하시다면 나중에 발렌타인 폼 사용법에 대해 지도해 주실 수 있을까요……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もちろんいいよ！\u3000私もバレンタインフォームを使いこなせるように訓練するつもりだったし、放課後に一緒にやろっか♪」"
translation = "「물론 좋지! 나도 발렌타인 폼을 능숙하게 다룰 수 있도록 훈련할 생각이었고, 방과 후에 같이 할까♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、それならあたしもやりた～い♪\u3000イクシーちゃん、いい？」"
translation = "「앗, 그럼 나도 하고 싶어~♪ 이쿠시짱, 괜찮아?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい、もちろんです！\u3000同じ星騎士の仲間で――それに、友達ですから♪」"
translation = "「네, 물론이죠! 같은 성기사 동료이고―― 게다가 친구니까요♪」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンは少し照れたようにそう言って、微笑むのだった。"
translation = "익실리온은 조금 수줍은 듯 그렇게 말하며 미소 짓는 것이었다."

