[[dialogue]]
speaker = "unk"
original = "メテオラを引きつけ、俺は校舎の中へと入る。"
translation = "메테오라를 유인하며 나는 교사 안으로 들어간다."

[[dialogue]]
speaker = "メテオラ"
original = "「ぼんぼんグレネードッ！」"
translation = "「봉봉 그레네이드!」"

[[dialogue]]
speaker = "unk"
original = "爆風を伴う遠距離武器は屋内では使いづらいのではと踏んだが、メテオラは自分が巻き込まれるのもいとわず爆撃してきた。"
translation = "폭풍을 동반하는 원거리 무기는 실내에서 쓰기 힘들 것이라 짐작했지만, 메테오라는 자신이 휘말리는 것도 아랑곳하지 않고 폭격을 가해 왔다."

[[dialogue]]
speaker = "メテオラ"
original = "「あはは、どーした、どーしたー！\u3000逃げてばっかじゃ、あたしは参ったしてやんないぞー！」"
translation = "「아하하, 어떠냐 어떠냐ー! 도망만 다니면 나(아타시)는 항복 안 해 줄 거라구ー!」"

[[dialogue]]
speaker = "メテオラ"
original = "「さっきからちっとも攻撃してこないし、やる気あるのかー？」"
translation = "「아까부터 조금도 공격해 오지 않고, 할 마음은 있는 거냐구ー?」"

[[dialogue]]
speaker = "unk"
original = "できればメテオラとは戦いたくない"
translation = "가능하면 메테오라와는 싸우고 싶지 않아."

[[dialogue]]
speaker = "メテオラ"
original = "「そーなのか。でも、あたしは星騎士たちと戦いたいぞ！\u3000悪いやつはやっつけなきゃだからな！」"
translation = "「그ー런 거냐구. 하지만 나(아타시)는 성기사들과 싸우고 싶다구! 나쁜 녀석들은 해치워야 하니까 말야!」"

[[dialogue]]
speaker = "unk"
original = "星騎士は悪いやつじゃない"
translation = "성기사는 나쁜 녀석이 아니야."

[[dialogue]]
speaker = "メテオラ"
original = "「ウソだ！\u3000星騎士は悪いやつってエンジュが言ってたぞ！\u3000エンジュはウソなんてつかないからな！」"
translation = "「거짓말이다구! 성기사는 나쁜 녀석이라고 엔쥬가 말했다구! 엔쥬는 거짓말 같은 건 안 하니까 말야!」"

[[dialogue]]
speaker = "メテオラ"
original = "「コラプサーの方が悪いやつ……？\u3000デタラメをゆーな！\u3000コラプサーはいいやつだ！\u3000エンジュだって、あたしと仲良くしてくれるぞ！」"
translation = "「콜랩서 쪽이 나쁜 녀석이라고……? 엉터리 같은 소리 마라구! 콜랩서는 좋은 녀석들이다구! 엔쥬도 나랑 사이좋게 지내 준다구!」"

[[dialogue]]
speaker = "unk"
original = "素直なメテオラを騙してるんだ！"
translation = "순진한 메테오라를 속이고 있는 거야!"

[[dialogue]]
speaker = "メテオラ"
original = "「違う、違う、違う！\u3000だって、あたしは楽しく遊んでるだけなのに、みんなみんな壊れちゃうんだぞ！」"
translation = "「아니야, 아니야, 아니야! 그치만 나(아타시)는 즐겁게 놀고 있을 뿐인데 다들 다들 망가져 버린다구!」"

[[dialogue]]
speaker = "メテオラ"
original = "「あたしが軽く握っただけで折れちゃうし、ちょっと押しただけで吹っ飛んじゃうし、割れちゃうんだ！」"
translation = "「나(아타시)가 살짝 쥐기만 해도 꺾여버리고, 조금 밀기만 해도 날아가 버리고, 깨져버린다구!」"

[[dialogue]]
speaker = "メテオラ"
original = "「でも、コラプサーのみんなはぶっ壊すことしかできないあたしを助けてくれた！\u3000受け入れてくれた！」"
translation = "「하지만 콜랩서 친구들은 때려 부수는 것밖에 못 하는 나(아타시)를 도와줬어! 받아줬다구!」"

[[dialogue]]
speaker = "メテオラ"
original = "「あんなにいいやつが！\u3000悪いやつなわけ！\u3000あるもんかーっ！！」"
translation = "「그렇게 좋은 녀석들이! 나쁜 녀석일 리! 있을까보냐ー!!」"

[[dialogue]]
speaker = "unk"
original = "メテオラの周囲に、大量のミサイルが現れる。"
translation = "메테오라의 주변에 대량의 미사일이 나타난다."

[[dialogue]]
speaker = "unk"
original = "全てを星術で撃ち落とそうにも、ミサイルの数は多く、さらにはコラプサーの能力が俺の星術を阻害する。"
translation = "전부를 성술로 격추하려 해도 미사일의 숫자가 많고, 심지어 콜랩서의 능력이 나의 성술을 저해한다."

[[dialogue]]
speaker = "unk"
original = "これは──！？"
translation = "이것은──!?"

[[dialogue]]
speaker = "？？？"
original = "「ピースフルピンクッ！」"
translation = "「피스풀 핑크!」"

[[dialogue]]
speaker = "リーリア"
original = "「お助けマジカル☆\u3000センパイの大ピンチに、カワイイ後輩が参上です☆」"
translation = "「도움의 마법☆ 선배의 대위기에 귀여운 후배가 등장입니다☆」"

[[dialogue]]
speaker = "リーリア"
original = "「もうセンパイってば女の子に優しいのもほどほどにしてくださいね。後輩として妬いちゃいますよ」"
translation = "「정말이지 선배도 여자애한테 상냥한 건 적당히 좀 하세요. 후배로서 질투 난다니까요.」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、リーリア"
translation = "고마워, 리리아."

[[dialogue]]
speaker = "リーリア"
original = "「どういたしまして。ここは私に任せてくださいっ」"
translation = "「천만에요. 여기는 저에게 맡겨주세요.」"

[[dialogue]]
speaker = "メテオラ"
original = "「んー？\u3000おまえがあたしの相手をするのか？\u3000魔王より弱っちそうだぞ」"
translation = "「으응? 네가 내 상대인 거냐구? 마왕보다 약해 보인다구.」"

[[dialogue]]
speaker = "リーリア"
original = "「そうですね。センパイには敵いませんけど、戦いと恋愛には相性ってものがあるんですよ」"
translation = "「그렇네요. 선배에게는 비할 바 못 되지만, 싸움과 연애에는 상성이라는 게 있는 법이거든요.」"

[[dialogue]]
speaker = "メテオラ"
original = "「なんだ？\u3000そんなへなちょこ玉、避けるまでもないぞっ！\u3000あたしたちに星騎士の攻撃は効かないんだからな！」"
translation = "「뭐냐구? 그런 비실비실한 구슬, 피할 필요도 없다구! 우리한테 성기사의 공격은 통하지 않으니까 말야!」"

[[dialogue]]
speaker = "リーリア"
original = "「ふふん、それはどうでしょう？\u3000私の魔弾はどこまでも届いて、あなたの胸を撃ち抜きますよ」"
translation = "「후흥, 그건 어떨까요? 제 마탄은 어디까지고 닿아서 당신의 가슴을 꿰뚫을 거거든요.」"

[[dialogue]]
speaker = "メテオラ"
original = "「んぅぐっ！？\u3000この攻撃、消えないぞっ！？」"
translation = "「으윽!? 이 공격, 사라지지 않는다구!?」"

[[dialogue]]
speaker = "リーリア"
original = "「マジカルヒット☆\u3000続けていっちゃうよ～☆\u3000<ruby>ＢＡＮＧ<rt>バァン</rt></ruby>、<ruby>ＢＡＮＧ<rt>バァン</rt></ruby>☆」"
translation = "「매지컬 히트☆ 계속 가볼게요~☆ <ruby>BANG<rt>바앙</rt></ruby>, <ruby>BANG<rt>바앙</rt></ruby>☆」"

[[dialogue]]
speaker = "メテオラ"
original = "「ぐっ！？\u3000んぅ、痛ぁ！？\u3000な、なんでだぞ！？」"
translation = "「윽!? 으으, 아파!? 웨, 왜 이러냐구!?」"

[[dialogue]]
speaker = "リーリア"
original = "「コラプサーが吸収できるのは星力だけですからね。魔女の攻撃の源である魔力は、ブラックホールにも吸い込まれません」"
translation = "「콜랩서가 흡수할 수 있는 건 성력뿐이니까요. 마녀의 공격 근원인 마력은 블랙홀에도 빨려 들어가지 않아요.」"

[[dialogue]]
speaker = "メテオラ"
original = "「まりょく～？\u3000それ何なんだ！？\u3000わけわかんないぞ！？」"
translation = "「마려억~? 그게 대체 뭐냐구!? 뭔 소린지 모르겠다구!」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、２人がかりでちょっぴりズルですけど、このままやっつけちゃいましょう。たっぷりと話を聞き出すのは捕縛した後で──」"
translation = "「선배, 둘이서 덤벼서 조금 비겁하긴 하지만, 이대로 해치워 버리죠. 자세한 이야기는 붙잡은 뒤에 듬뿍──」"

[[dialogue]]
speaker = "メテオラ"
original = "「うわ～ん！\u3000エンジュ～っ！！」"
translation = "「으아앙! 엔쥬~~!!」"

[[dialogue]]
speaker = "エンジュ"
original = "「やけに騒がしいと思えば……やはり、あたしたちに立ちはだかるのはお前か、魔王っ……！」"
translation = "「묘하게 소란스럽다 했더니…… 역시 우리 앞을 가로막는 건 너냐, 마왕……!」"

[[dialogue]]
speaker = "リーリア"
original = "「──！\u3000２人目のコラプサー！」"
translation = "「──! 두 번째 콜랩서!」"

[[dialogue]]
speaker = "メテオラ"
original = "「エンジュー！\u3000こいつら２対１でズルいんだぞ！\u3000やっぱり悪いやつだー！」"
translation = "「에엔쥬ー! 이 녀석들 2대 1로 비겁하다구! 역시 나쁜 녀석들이다구!」"

[[dialogue]]
speaker = "エンジュ"
original = "「メテオラ、お前の体ならあんな豆鉄砲、何発喰らったところで大したダメージにもならないだろ」"
translation = "「메테오라, 네 몸이라면 저런 콩알탄 같은 거 몇 발 맞았다고 해서 별로 대미지도 입지 않잖아.」"

[[dialogue]]
speaker = "メテオラ"
original = "「……うん？\u3000ホントだ！\u3000ちょっと痛かったけど、大したことないぞ。消せなくても問題ないな！」"
translation = "「……어? 정말이다구! 좀 아프긴 했지만 별거 아니라구. 없애지 못해도 상관없겠네!」"

[[dialogue]]
speaker = "リーリア"
original = "「え～っ、けっこう本気で魔力込めてるんですけど～！？\u3000ナチュラルに頑丈すぎじゃないですか！？」"
translation = "「에~, 나름대로 진심으로 마력을 담았는데요~!? 내츄럴하게 너무 튼튼한 거 아니에요!?」"

[[dialogue]]
speaker = "メテオラ"
original = "「エンジュ、ターゲットは見つかったのかー？」"
translation = "「엔쥬, 타겟은 찾은 거냐구ー?」"

[[dialogue]]
speaker = "エンジュ"
original = "「ああ、居場所の目星はついた。問題ない」"
translation = "「아아, 위치는 짐작이 갔다. 문제없어.」"

[[dialogue]]
speaker = "unk"
original = "狙いは新星学園の破壊じゃないのか？"
translation = "노리는 건 신성학원의 파괴가 아닌 건가?"

[[dialogue]]
speaker = "unk"
original = "ターゲット？"
translation = "타겟?"

[[dialogue]]
speaker = "エンジュ"
original = "「何を言っている。お門違いもいいところだ」"
translation = "「무슨 소릴 하는 거냐. 번지수 한참 잘못 짚었군.」"

[[dialogue]]
speaker = "エンジュ"
original = "「だが、余計なお喋りをするつもりも、情報を与えるつもりもない。これで２対２だ。お互い、相手にとって不足はないだろ？」"
translation = "「하지만 쓸데없이 수다를 떨 생각도, 정보를 줄 생각도 없다. 이걸로 2대 2다. 서로 상대하기에 부족함은 없겠지?」"

[[dialogue]]
speaker = "エンジュ"
original = "「情報を引き出したいなら、あたしらをとっ捕まえて拷問にでもかけるんだな！」"
translation = "「정보를 캐내고 싶다면 우리를 붙잡아서 고문이라도 해보라고!」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、私と共同作業する準備はＯＫですか？」"
translation = "「선배, 저랑 공동 작업할 준비는 OK인가요?」"

[[dialogue]]
speaker = "unk"
original = "俺とリーリアの相性を２人に見せつけてやろう"
translation = "나와 리리아의 찰떡궁합을 보여주자."

[[dialogue]]
speaker = "リーリア"
original = "「もう、センパイってば私を乗せるの上手ですね。そんな風に言われちゃったら、頑張らないわけにはいきません！」"
translation = "「정말, 선배도 참 저를 띄워주는 게 능숙하시다니까요. 그렇게 말씀하신다면 힘을 안 낼 수가 없잖아요!」"

[[dialogue]]
speaker = "エンジュ"
original = "「行くぞ、メテオラっ！」"
translation = "「간다, 메테오라!」"

[[dialogue]]
speaker = "メテオラ"
original = "「ぶっぱなすぞ、エンジュっ！」"
translation = "「갈겨버리자구, 엔쥬!」"

[[dialogue]]
speaker = "リーリア"
original = "「来ますよ、センパイっ！」"
translation = "「와요, 선배!」"

