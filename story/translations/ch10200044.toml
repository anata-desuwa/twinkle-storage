[[dialogue]]
speaker = "unk"
original = "第４話,妹天国・ルルカワールド,P"
translation = "제4화, 여동생 천국·루루카 월드, P"

[[dialogue]]
speaker = "unk"
original = "年が明けて少し経った、とある休日。ルルカが俺の家に遊びに来ていた。"
translation = "해가 바뀌고 조금 지난 어느 휴일. 루루카가 우리 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あのね、今日はお兄ちゃんに見せたいものがあって～」"
translation = "「있잖아, 오늘은 오빠한테 보여주고 싶은 게 있어서~」"

[[dialogue]]
speaker = "unk"
original = "見せたいもの？"
translation = "보여주고 싶은 거?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん♪\u3000行っくよ～、見ててね～。――えいっ♪」"
translation = "「응♪ 간다~, 잘 봐~. ――에잇♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「バーチャル領域、展開！」"
translation = "「버추얼 영역, 전개!」"

[[dialogue]]
speaker = "unk"
original = "……？\u3000特に何も変わってないような？"
translation = "……? 딱히 아무것도 변하지 않은 것 같은데?"

[[dialogue]]
speaker = "unk"
original = "前にルルカが歌を披露してくれたように、周囲の空間が変化するような様子は見られない。"
translation = "전에 루루카가 노래를 선보여줬을 때처럼 주변 공간이 변화하는 모습은 보이지 않는다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふっふっふ、今回は周りの空間はそのままにしたの。でも、見せたいのはここからだよ」"
translation = "「훗훗훗, 이번에는 주변 공간은 그대로 뒀어. 하지만 보여주고 싶은 건 지금부터야」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「入って来ていいよ～♪」"
translation = "「들어와도 좋아~♪」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「じゃ～ん♪\u3000ルルカちゃんがもう１体増えました～っ♪」"
translation = "「짜잔♪ 루루카짱이 한 명 더 늘어났습니다~♪」"

[[dialogue]]
speaker = "unk"
original = "なっ、なにぃーーーっ！！？"
translation = "뭐, 뭐라고ーーー!!? "

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしのクリスマスフォームの能力は『仮想の空間を作り出すこと』なんだけど、だったら自分のアバターも作って増やせるのでは？\u3000って思い付いたんだよね♪」"
translation = "「내 크리스마스 폼의 능력은 『가상 공간을 만들어내는 것』인데, 그렇다면 자신의 아바타도 만들어서 늘릴 수 있지 않을까? 하고 생각했거든♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そして、その数も別に決まってるわけじゃない。というわけで――」"
translation = "「그리고 그 수도 딱히 정해진 게 아니야. 그런 고로――」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「おはドルフィン☆\u3000妹、もう１体追加で～す♪」"
translation = "「오하 돌핀☆ 여동생 한 명 더 추가요~♪」"

[[dialogue]]
speaker = "unk"
original = "お、おかわりだと……！？"
translation = "리, 리필이라니……!? "

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ、すっごいでしょ～♪\u3000名づけて、『妹天国・ルルカワールド』！」"
translation = "「에헤헤, 굉장하지~♪ 이름하여 『여동생 천국·루루카 월드』!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「さっきみたいに会話させることも可能で、基本的に喋らせてるのはあたしなんだけど、ＡＩに自動で任せることもできるんだよ♪」"
translation = "「아까처럼 대화시키는 것도 가능하고, 기본적으로 말하게 하는 건 나지만 AI에게 자동으로 맡길 수도 있다구♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まだやったことないから、ここで試してみようかな。ルルカＡＩ起動～！」"
translation = "「아직 해본 적 없으니까 여기서 시험해 볼까. 루루카 AI 기동~!」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「って、あれ……？\u3000失敗かな？」"
translation = "「어라……? 실패인가?」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「……お兄ちゃん」"
translation = "「……오빠」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おっ、動き出したみたい♪」"
translation = "「오, 움직이기 시작한 것 같네♪」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「――好き<emoji=heart04>\u3000お兄ちゃん、ルルカにキスして<emoji=heart04>」"
translation = "「――좋아해<emoji=heart04> 오빠, 루루카한테 키스해 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「って、ちょっと！？\u3000初っ端からなに言い出してるのぉ！？」"
translation = "「잠깐!? 첫마디부터 무슨 소리를 하는 거야!?」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「だってお兄ちゃんはルルカの恋人で～、大好きだもん<emoji=heart04>\u3000お兄ちゃん、あたしとキスしよ<emoji=heart04>\u3000いっぱいキスしたい<emoji=heart04>\u3000我慢できないから、キスしちゃうね<emoji=heart04>」"
translation = "「그치만 오빠는 루루카의 연인이고~, 정말 좋아하는걸<emoji=heart04> 오빠, 나랑 키스하자<emoji=heart04> 키스 잔뜩 하고 싶어<emoji=heart04> 참을 수 없으니까 키스해 버릴게<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「待て待て待てぇーーーい！\u3000あたしはこんな万年発情キャラじゃないよ！？\u3000どこから引っ張ってきたの、このデータはぁ！？」"
translation = "「기다려 기다려 기다려어어어업! 나는 이런 만년 발정 캐릭터가 아니거든!? 어디서 긁어온 거야, 이 데이터는!?」"

[[dialogue]]
speaker = "unk"
original = "いや、２人きりの時は割と……"
translation = "아니, 둘만 있을 때는 제법……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん！？」"
translation = "「오빠!?」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「心の中のルルカは、本当はいつでもキスＯＫだよ、お兄ちゃん<emoji=heart04>」"
translation = "「마음속의 루루카는 사실 언제든 키스 OK야, 오빠<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いやいやいやいや！\u3000そ、そこまであたしはエッチじゃないよ！！」"
translation = "「아니 아니 아니 아니! 그, 그 정도로 나는 야하지 않다구!!」"

[[dialogue]]
speaker = "unk"
original = "でも、これもルルカなんだよね？"
translation = "하지만 이것도 루루카인 거지?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「断じて違～うっ！！」"
translation = "「단연코 아냐!!」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「お兄ちゃん、ルルカもキスしたいな～<emoji=heart04>\u3000本物なんて放っておいて、ルルカとキスしよ<emoji=heart04>」"
translation = "「오빠, 루루카도 키스하고 싶어~<emoji=heart04> 진짜 같은 건 내버려 두고 루루카랑 키스하자<emoji=heart04>」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「ううん、今日はこの前と違って、お兄ちゃんの方からキスして欲しいかも<emoji=heart04>\u3000ねぇねぇ、お願い<emoji=heart04>\u3000キスして<emoji=heart04>\u3000ん～っ<emoji=heart04>」"
translation = "「으응, 오늘은 저번이랑 다르게 오빠가 먼저 키스해 줬으면 좋겠을지도<emoji=heart04> 네? 제발<emoji=heart04> 키스해 줘<emoji=heart04> 응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お前もかぁーーーーっ！！」"
translation = "「너도냐아아아아!!」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「えへへ、隙あり～っ<emoji=heart04>\u3000ん～っ、ちゅっ<emoji=heart04>」"
translation = "「에헤헤, 빈틈 발견~ 으음~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ルルカＡＩは俺にキスをする。"
translation = "그렇게 말하며, 루루카 AI는 나에게 키스를 한다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ちょっ！？\u3000なに勝手に、人の彼氏にキスしてるのぉーーーっ！！」"
translation = "「잠깐!? 왜 마음대로 남의 남자친구한테 키스하는 거야아아아!!」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「え？\u3000お兄ちゃんはルルカの彼氏だよ？\u3000もっとキスしよ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000全然足りない、もっともっとぉ<emoji=heart04>\u3000ん～っ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「에? 오빠는 루루카의 남자친구라구? 키스 더 하자<emoji=heart04> 쪽<emoji=heart04> 전혀 부족해, 좀 더 좀 더어<emoji=heart04> 응~<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いい加減にしろぉ～～！！」"
translation = "「적당히 좀 해라아~~!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんもっ！\u3000勝手にキスされてないで拒んでよぉ～っ！！」"
translation = "「오빠도! 가만히 키스당하고 있지 말고 거부하란 말이야아~!」"

[[dialogue]]
speaker = "unk"
original = "俺にとっての天国すぎて、つい……"
translation = "나에게는 너무 천국이라서, 그만……"

[[dialogue]]
speaker = "unk"
original = "ご、ごめん。ルルカに囲まれたハーレム"
translation = "미, 미안. 루루카에게 둘러싸인 하렘"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そうかもだけどっ、あたし的には嫉妬しちゃうからっ！」"
translation = "「그럴지도 모르지만, 내 입장에서는 질투 나니까!」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「もう、そっちとばっかりしててズルい～。お兄ちゃん、こっちのルルカともキスしよ<emoji=heart04>\u3000ん～っ……ちゅっ<emoji=heart04>\u3000ちゅっ、ちゅっ<emoji=heart04>」"
translation = "「정말, 그쪽이랑만 하고 치사해~. 오빠, 이쪽 루루카랑도 키스하자<emoji=heart04> 응~……쪽<emoji=heart04> 쪽, 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ～っ！\u3000またあたしのお兄ちゃんにキスしたぁーーーっ！！」"
translation = "「아~! 또 내 오빠한테 키스했다아아아!!」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「ルルカももっとお兄ちゃんとキスしたーい。ちゅ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「루루카도 오빠랑 키스 더 하고 싶어어. 쪽~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「長い長い！\u3000キスが長いって！！」"
translation = "「길어 길어! 키스가 너무 길다고!!」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 쪽<emoji=heart04> 쪽<emoji=heart04> 쪽<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「こっちは雨みたいな連続キス！？\u3000もうっ！\u3000お兄ちゃんの唇がおかしくなったらどうするの～～っ！！」"
translation = "「이쪽은 비처럼 쏟아지는 연속 키스!? 정말! 오빠 입술이 이상해지면 어떡할 거야~~!!」"

[[dialogue]]
speaker = "unk"
original = "キスは慣れてるから大丈夫だ！"
translation = "키스는 익숙하니까 괜찮아!"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そ、そうだよねぇ～、うん。時間を忘れちゃうくらい、ずっとキスを繰り返してしたことあるけど、全然平気だったし……<emoji=heart04>」"
translation = "「그, 그렇긴 하네~, 응. 시간을 잊어버릴 정도로 계속 키스를 반복했던 적도 있지만, 전혀 멀쩡했었고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「そうそう、だからお兄ちゃんの唇は全あたしの共有財産ってことで♪」"
translation = "「그래그래, 그러니까 오빠 입술은 모든 나의 공유 재산이라는 걸로♪」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「どのルルカにもキスする権利はあるよね～ってことで。ん～っ、ちゅっ<emoji=heart04>」"
translation = "「어떤 루루카에게든 키스할 권리는 있는 거지~라면서. 응~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「お兄ちゃん、好き<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「오빠, 좋아해<emoji=heart04> 쪽<emoji=heart04> 쪽<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ～っ、もう！\u3000どっちのあたしもいい加減にしなさぁーーーいっ！！\u3000お兄ちゃんにキスしていいのはあたしだけなんだからっ！！！」"
translation = "「아~ 진짜! 어느 쪽의 나든 적당히 좀 해ーーー!! 오빠한테 키스해도 되는 건 나뿐이란 말이야!!!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、ルルカもキスしよう"
translation = "그럼, 루루카도 키스하자"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、お兄ちゃん……<emoji=heart04>」"
translation = "「앗, 오빠……<emoji=heart04>」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「うん、わかった<emoji=heart04>\u3000ちゅ～～っ<emoji=heart04>」"
translation = "「응, 알았어<emoji=heart04> 쭈~~욱<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「って、今のはあたしに言った台詞でしょ！？\u3000水着のあたし！」"
translation = "「잠깐, 방금 건 나한테 한 대사잖아!? 수영복 차림의 나!」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「今日のあたしはちょっと怒りすぎじゃないかな？\u3000そんな怒りんぼじゃ、お兄ちゃんに嫌われちゃうよ～？」"
translation = "「오늘의 나는 너무 화만 내는 거 아닐까? 그렇게 화쟁이이면, 오빠한테 미움받을 거야~?」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「きっとキスが足りてないんだよ。ルルカはお兄ちゃんとちゅっちゅしてれば、大体ご機嫌なんだから♪」"
translation = "「분명 키스가 부족해서 그럴 거야. 루루카는 오빠랑 쪽쪽거리고 있으면, 대체로 기분이 좋으니까♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うっ……そんなことは……なくもない、けどぉ……」"
translation = "「윽…… 그런 건…… 없지도, 않지만……」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「クリスマスのルルカはお兄ちゃんとキスすべき。これは治療だよ♪\u3000だから何も問題な～し♪」"
translation = "「크리스마스의 루루카는 오빠랑 키스해야 해. 이건 치료야♪ 그러니까 아무런 문제 없~음♪」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「そうそう。お兄ちゃんとキスすれば、細かいことなんて全然気にならなくなるんだから♪」"
translation = "「그래그래. 오빠랑 키스하면, 자잘한 것 따윈 전혀 신경 쓰이지 않게 될 테니까♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うぅっ……」"
translation = "「으윽……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「わ、わかりましたぁ！\u3000キスしますっ！\u3000あたしだけお兄ちゃんとキスできないなんて嫌だし！」"
translation = "「아, 알겠습니다아! 키스할게요! 나만 오빠랑 키스 못 하는 건 싫단 말이야!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「さぁ、お兄ちゃん！\u3000本物のあたしとキスしよっ！！」"
translation = "「자, 오빠! 진짜 나랑 키스하자!!」"

[[dialogue]]
speaker = "unk"
original = "キスしたくなるような雰囲気が足りない……"
translation = "키스하고 싶어지는 분위기가 부족하다……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「どういうことぉ！？\u3000キスが飽和状態で、ハードルが上がっちゃってる！？」"
translation = "「그게 무슨 소리야!? 키스가 포화 상태라, 허들이 높아져 버린 거야!?」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「なら、お兄ちゃんを誘惑しちゃえ～」"
translation = "「그럼, 오빠를 유혹해 버려~」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「いつもの甘～いＡＳＭＲなボイスで、メロメロにしちゃえばいいんだよ♪」"
translation = "「평소의 달콤~한 ASMR 보이스로, 쏙 빠지게 만들면 되는 거야♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「わ、わかった……いつも通り……いつも通りで……」"
translation = "「아, 알았어…… 평소대로…… 평소대로……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はぁ～……ふぅ～……」"
translation = "「하아~…… 후우~……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん――」"
translation = "「오빠――」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「好き……<emoji=heart04>\u3000大好き<emoji=heart04>\u3000愛してるよっ<emoji=heart04>」"
translation = "「좋아해……<emoji=heart04> 정말 좋아해<emoji=heart04> 사랑해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だから――あたしにもキスして<emoji=heart04>\u3000お兄ちゃんのキス……欲しいの<emoji=heart04>」"
translation = "「그러니까―― 나한테도 키스해 줘<emoji=heart04> 오빠의 키스…… 갖고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もルルカを世界一愛してるよ"
translation = "나도 루루카를 세계에서 제일 사랑해"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん……<emoji=heart04>」"
translation = "「오빠……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ<emoji=heart04>\u3000やっぱり好きだなぁ……<emoji=heart04>\u3000好きで好きで、あたしも世界一、愛してる<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 역시 좋네……<emoji=heart04> 너무너무 좋아서, 나도 세계에서 제일, 사랑해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もう他のあたしが何人いようと関係ない。あたしがいちばんお兄ちゃんとキス、しちゃうんだから<emoji=heart04>」"
translation = "「이제 다른 내가 몇 명이나 있든 상관없어. 내가 제일 먼저 오빠랑 키스, 해버릴 거니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、大好き……<emoji=heart04>\u3000ん～っ<emoji=heart04>」"
translation = "「오빠, 정말 좋아해……<emoji=heart04> 응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ん……はあぁっ<emoji=heart04>」"
translation = "「응…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……えへへ、やっぱりいいね、キスって<emoji=heart04>\u3000１回したら、細かいことなんてどうでもよくなっちゃった<emoji=heart04>」"
translation = "「……에헤헤, 역시 좋네, 키스라는 건<emoji=heart04> 한 번 하니까, 세세한 건 아무래도 상관없어지게 됐어<emoji=heart04>」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「じゃあ、そろそろルルカもいいよね？」"
translation = "「자, 슬슬 루루카도 괜찮지?」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「本物ルルカの可愛いキスを見たら、もっとキスしたくなっちゃった♪」"
translation = "「진짜 루루카의 귀여운 키스를 보니까, 더 키스하고 싶어졌어♪」"

[[dialogue]]
speaker = "unk"
original = "ルルカはどうする？"
translation = "루루카는 어떻게 할 거야?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしもキスする～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ん～～～っ、ちゅっ<emoji=heart04>」"
translation = "「나도 키스할래~~~~~<emoji=heart04><emoji=heart04><emoji=heart04> 응~~~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "通常ルルカ"
speaker_translation = "통상 루루카"
original = "「お兄ちゃん……ちゅっ<emoji=heart04>」"
translation = "「오빠…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "水着ルルカ"
speaker_translation = "수영복 루루카"
original = "「ん～っ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응~<emoji=heart04> 쪽……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺は３人のルルカと、時間を忘れてキスに没頭してしまうのだった――"
translation = "이렇게 나는 세 명의 루루카와, 시간 가는 줄 모르고 키스에 몰두해 버리는 것이었다――"

