[[dialogue]]
speaker = "トリシャ"
original = "「それにしてもここは、不思議な場所ですね……まるで本物の太陽に照らされているみたいです……」"
translation = "「그나저나 여기는 신기한 곳이네요…… 마치 진짜 태양에 비춰지는 것 같아요……」"

[[dialogue]]
speaker = "リップル"
original = "「それがリゾート結界なのデース！\u3000申し遅れましたがワタシ、リップルデース！」"
translation = "「그것이 리조트 결계데-스! 인사가 늦었지만 저, 리플데-스!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぇ、ぁっ、は、はじめま……」"
translation = "「에, 앗, 처, 처음 뵙겠……」"

[[dialogue]]
speaker = "トリシャ"
original = "「おっと……いけませんね……。これが陽のオーラ……思わず<ruby>気圧<rt>けお</rt></ruby>されてしまいました」"
translation = "「앗…… 안 되겠군요……. 이것이 양의 오라…… 나도 모르게 기세에 눌려 버렸습니다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「改めまして……私は魔界の占星術師、トリシャ＝アポテレスマティカ。以後よろしく……」"
translation = "「다시 인사드리지요…… 저는 마계의 점성술사, 트리샤 아포테레스마티카. 앞으로 잘 부탁해…….」"

[[dialogue]]
speaker = "トリシャ"
original = "「これはお近づきの印に……お土産の氷結ヨーグルトです」"
translation = "「이건 친해진 기념으로…… 선물인 빙결 요구르트입니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「う。出ましたね<ruby>故郷<rt>レゾフ</rt></ruby>名物」"
translation = "「우. 나왔네요 고향 명물.」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ！\u3000この常夏でもひんやりクールなヨーグルト──大変珍しいデース！」"
translation = "「와오! 이 한여름에도 시원하고 쿨한 요구르트── 대단히 희귀하데-스!」"

[[dialogue]]
speaker = "リップル"
original = "「ン～、火照った体に染み渡りマース！\u3000かき氷と並べて海の家に置いたら、人気が出そうデース！」"
translation = "「음~ 뜨거워진 몸에 스며들어마-스! 빙수랑 같이 바다의 집에 두면 인기가 많을 것 같데-스!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「フフフ。さっそく友人も増えたようではないか」"
translation = "「후후후. 금방 친구도 늘어난 모양이지 않나.」"

[[dialogue]]
speaker = "トリシャ"
original = "「確かに……来て良かった……旅は道連れ、世は情け……」"
translation = "「확실히…… 오길 잘했어…… 여행은 길동무, 세상은 인정이라더니……」"

[[dialogue]]
speaker = "アナ"
original = "「水着コンテストにはトリシャさんも参加──と。これは確かに思わぬ伏兵です」"
translation = "「수영복 콘테스트에는 트리샤 씨도 참가──라. 이건 확실히 뜻밖의 복병이군요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら。確かに色気があるのに抱きしめたくなる可愛さもあって……強敵ね～」"
translation = "「어머나. 확실히 요염하면서도 안아주고 싶어지는 귀여움이 있어서…… 강적이네~」"

[[dialogue]]
speaker = "トリシャ"
original = "「強敵……そうなのですか？\u3000私、水着が初めてなもので、コンテストなるものの審査基準もわからず……」"
translation = "「강적…… 그런가요? 저는 수영복이 처음이라 콘테스트라는 것의 심사 기준도 몰라서……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「自分のポテンシャルに無自覚なのね、トリシャ……！」"
translation = "「자기 잠재력에 무자각하구나, 트리샤……!」"

[[dialogue]]
speaker = "unk"
original = "似合ってるから"
translation = "잘 어울리니까."

[[dialogue]]
speaker = "unk"
original = "魅力的だから"
translation = "매력적이니까."

[[dialogue]]
speaker = "トリシャ"
original = "「なるほど……ヘレナさんのコーディネートが良かった……ということでしょう」"
translation = "「과연…… 헬레나 씨의 코디가 좋았다……는 거겠죠.」"

[[dialogue]]
speaker = "トリシャ"
original = "「しかし……他の皆さんもたいへん魅力的なご様子。アポロさんも、マトイさんも……」"
translation = "「하지만…… 다른 분들도 대단히 매력적이신 모양이에요. 아폴로 씨도, 마토이 씨도……」"

[[dialogue]]
speaker = "アポロ"
original = "「お！？\u3000わかるか！？」"
translation = "「오!? 알아보겠냐!?」"

[[dialogue]]
speaker = "マトイ"
original = "「褒められると、悪い気はしないかも……」"
translation = "「칭찬받으니 나쁜 기분은 아닐지도……」"

[[dialogue]]
speaker = "トリシャ"
original = "「占ってみましょう……この度のコンテスト、果たして誰が優勝するのか……」"
translation = "「점쳐보죠…… 이번 콘테스트, 과연 누가 우승할지……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは<ruby>占星盤<rt>ホロスコープ</rt></ruby>を取り出して、星の配置を見ようとした。"
translation = "트리샤 씨는 점성반을 꺼내 들어 별의 배치를 보려 했다."

[[dialogue]]
speaker = "unk"
original = "結果は？"
translation = "결과는?"

[[dialogue]]
speaker = "unk"
original = "どうだった？"
translation = "어땠어?"

[[dialogue]]
speaker = "トリシャ"
original = "「……星が見えませんでした。こんなのは初めてです」"
translation = "「……별이 보이지 않았습니다. 이런 적은 처음이에요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「感じる星の波動も、三界のどれとも異なるものになっています……なんなのでしょう、この空間は……？」"
translation = "「느껴지는 별의 파동도 삼계 중 그 어느 것과도 다른 것으로 되어 있습니다…… 무엇일까요, 이 공간은……?」"

[[dialogue]]
speaker = "リップル"
original = "「皆サンのハッピーを願うサマーリゾート結界デース！\u3000細かいコトは気にしないのが吉デース♪」"
translation = "「여러분들의 행복을 바라는 서머 리조트 결계데-스! 세세한 건 신경 쓰지 않는 게 길데-스♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「フ……星占いができずとも、こんなところに水晶玉が２つあるではないか。それそれ」"
translation = "「후…… 점성술을 할 수 없더라도 이런 곳에 수정구슬이 두 개나 있지 않은가. 자, 자.」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぁっ……」"
translation = "「응앗……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マジでやめてくれない？」"
translation = "「진심으로 좀 그만해 줄래?」"

[[dialogue]]
speaker = "unk"
original = "親父っぽい絡み方だ"
translation = "아저씨 같은 수법이다."

[[dialogue]]
speaker = "unk"
original = "お気に入りみたいだ"
translation = "마음에 든 모양이네."

[[dialogue]]
speaker = "ヘレナ"
original = "「ま、そういうわけで。水着コンテストに向けての準備は着々と進められている」"
translation = "「뭐, 그런 고로. 수영복 콘테스트를 위한 준비는 착착 진행되고 있다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「開催は１週間後だ。飛び入りも可能だが、なるべく事前エントリーを頼むぞ。ではな」"
translation = "「개최는 1주일 뒤다. 당일 참가도 가능하지만 가급적 사전 엔트리를 부탁한다. 그럼 이만.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、２人は海の家に消えていってしまった……。"
translation = "그렇게 말하고 두 사람은 바다의 집으로 사라져 버렸다……."

[[dialogue]]
speaker = "マトイ"
original = "「うーん……ちょっと気にはなったけど、純粋にリゾートを盛り上げようとしてくれてるみたい？」"
translation = "「으음…… 조금 신경 쓰이긴 하지만 순수하게 리조트를 활성화시키려고 노력하는 것 같지?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ええ。しかも参加賞に景品まで、太っ腹です！」"
translation = "「네. 게다가 참가상에 경품까지, 통이 크십니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "気になる？"
translation = "신경 쓰여?"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス？"
translation = "비너스?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。怪しいわ……ヘレナちゃんのことだもの、何か企んでるに決まってるんだから！」"
translation = "「응. 수상해…… 헬레나 짱인걸, 분명 뭔가 꾸미고 있는 게 분명해!」"

[[dialogue]]
speaker = "unk"
original = "結局、その日はそのままお開きとなった……。"
translation = "결국 그날은 그대로 헤어지게 되었다……."

