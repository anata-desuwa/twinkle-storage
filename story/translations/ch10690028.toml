[[dialogue]]
speaker = "unk"
original = "セシアと恋人関係になってからの期間も長くなって来た、とある休日の夜。"
translation = "세시아와 연인 관계가 되고 나서 기간도 꽤 길어진 어느 휴일 밤."

[[dialogue]]
speaker = "セシア"
original = "「会長、メリークリスマス♪」"
translation = "「회장님, 메리 크리스마스♪」"

[[dialogue]]
speaker = "クロト"
original = "「セシア、なんでクリスマス衣装に……？」"
translation = "「세시아, 왜 크리스마스 의상을……?」"

[[dialogue]]
speaker = "unk"
original = "ちなみに今日は、クリスマス当日というわけではない。"
translation = "참고로 오늘은 크리스마스 당일인 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "まだ肌寒い冬の時期ではあるが、学園のクリスマスパーティーは、もう大分前に終わってしまっていた。"
translation = "아직 쌀쌀한 겨울 시기이긴 하지만 학원의 크리스마스 파티는 이미 한참 전에 끝나버린 상태였다."

[[dialogue]]
speaker = "セシア"
original = "「ふふっ、クリスマスはもう過ぎちゃったけど、今日はわたくしがプレゼントよ<emoji=heart04>\u3000――なんちゃって♪」"
translation = "「후후, 크리스마스는 이미 지났지만 오늘은 제가 선물이에요<emoji=heart04> ──랄까나♪」"

[[dialogue]]
speaker = "セシア"
original = "「紅明ママが、こうしたら会長は喜ぶはずだって、また教えてくれたの♪」"
translation = "「코우메이 마마가 이렇게 하면 회장님이 분명 기뻐할 거라고 또 가르쳐줬어요♪」"

[[dialogue]]
speaker = "クロト"
original = "「うーむ、紅明なぁ……」"
translation = "「으음, 코우메이 녀석……」"

[[dialogue]]
speaker = "unk"
original = "またセシアに変なことを教えたりして……と思う一方で、確かに男としては喜んでしまう自分もいる。"
translation = "또 세시아에게 이상한 걸 가르치고는…… 하고 생각하는 한편, 확실히 남자로서 기뻐하고 마는 자신도 있다."

[[dialogue]]
speaker = "セシア"
original = "「それで……会長、どうかしら？\u3000今日は約束していた日でしょ？」"
translation = "「그래서…… 회장님, 어떤가요? 오늘은 약속했던 날이잖아요?」"

[[dialogue]]
speaker = "セシア"
original = "「――わたくしと最後まで初体験をする、って」"
translation = "「──저랑 마지막까지 첫 체험을 하기로」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしからのプレゼント……わたくしの初めて、貰ってくれるかしら？」"
translation = "「저의 선물…… 저의 처음을 받아주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "俺はごくりと唾を飲み込む。"
translation = "나는 꿀꺽 침을 삼킨다."

[[dialogue]]
speaker = "unk"
original = "そう……俺はセシアからの強い押しに陥落して、ついに今日、『最後までエッチをする』という約束を交わしていたのだった。"
translation = "그렇다…… 나는 세시아의 강력한 공세에 함락되어 드디어 오늘, 『마지막까지 섹스를 한다』는 약속을 나눴던 것이다."

[[dialogue]]
speaker = "クロト"
original = "「本当に、いいんだな……？」"
translation = "「정말로 괜찮은 거냐……?」"

[[dialogue]]
speaker = "セシア"
original = "「ええ。わたくしは――」"
translation = "「네. 저는──」"

[[dialogue]]
speaker = "セシア"
original = "「最初から、会長としたいって、ずっと思っていたわよ？\u3000ふふっ<emoji=heart04>」"
translation = "「처음부터 회장님이랑 하고 싶다고 계속 생각했는걸요? 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セシアはいつもする時みたいに、霊力を使ってふわっと体を浮き上がらせる。目線が同じ高さになって――"
translation = "세시아는 항상 할 때처럼 영력을 사용해 둥실 몸을 띄운다. 시선이 같은 높이가 되고──"

[[dialogue]]
speaker = "セシア"
original = "「会長……<emoji=heart04>\u3000ん……<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女を抱き寄せて、そっとキスをする。"
translation = "나는 그녀를 끌어당겨 살며시 키스한다."

[[dialogue]]
speaker = "セシア"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「んっ……ちゅっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「응…… 쪽……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「会長、いつもみたいに舌を絡める、エッチなキスもしたいわ<emoji=heart04>\u3000はい、あ～ん<emoji=heart04>」"
translation = "「회장님, 평소처럼 혀를 섞는 야한 키스도 하고 싶어요<emoji=heart04> 자, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セシアに促されて口を開けると、今度は彼女の方からキスをして、小さな舌が入り込んで来る。"
translation = "세시아의 재촉에 입을 열자 이번에는 그녀 쪽에서 키스를 하며 작은 혀가 안으로 들어온다."

[[dialogue]]
speaker = "セシア"
original = "「んむっ……<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「음무윽……<emoji=heart04> 응츄<emoji=heart04> 츄파<emoji=heart04> 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ……<emoji=heart04>\u3000会長の舌も、わたくしの口の中に入ってきた……<emoji=heart04>\u3000んっ……ちゅうっ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 회장님의 혀도 내 입안으로 들어왔어……<emoji=heart04> 응…… 츄우……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「ちゅぱっ……<emoji=heart04>\u3000わたくしが、ママみたいに優しく受け止めて、いいこいいこしてあげるわ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000ちゅぷっ……ちゅむるっ……れろちゅっ<emoji=heart04>」"
translation = "「츄파……<emoji=heart04> 내가 마마처럼 상냥하게 받아들여서 착하다 착하다 해줄게<emoji=heart04> 츄……<emoji=heart04> 츄푸…… 츄무룻…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はあぁ……<emoji=heart04>\u3000んむっ、ちゅぷっ<emoji=heart04>\u3000ちゅぷぷっ……<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅるるっ……ちゅむっ<emoji=heart04>\u3000ちゅぱっ……れるれるっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 응무윽, 츄푸<emoji=heart04> 츄푸푸……<emoji=heart04> 레로츄<emoji=heart04> 츄루룻…… 츄뭇<emoji=heart04> 츄파…… 레를레를<emoji=heart04> 츄레를<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「んっ<emoji=heart04>\u3000やっぱり、エッチなキス……気持ちいいわ<emoji=heart04>\u3000ちゅぷっ……ちゅぷぷっ<emoji=heart04>\u3000ちゅっ、ちゅぅっ<emoji=heart04>\u3000ちゅれるっ……れるれるっ<emoji=heart04>\u3000ちゅるるっ……れろちゅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 역시 야한 키스…… 기분 좋아<emoji=heart04> 츄푸…… 츄푸푸<emoji=heart04> 츄, 츄우<emoji=heart04> 츄레를…… 레를레를<emoji=heart04> 츄루룻…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「ちゅっ……ちゅむむっ<emoji=heart04>\u3000ちゅむるっ……れろちゅっ<emoji=heart04>\u3000ちゅぱっ……ぷはっ――はあぁ……<emoji=heart04>\u3000わたくし興奮して、おま○こ濡れてきちゃった……<emoji=heart04>」"
translation = "「츄…… 츄무무<emoji=heart04> 츄무룻…… 레로츄<emoji=heart04> 츄파…… 푸하──하아아……<emoji=heart04> 나 흥분해서 보지 젖어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ<emoji=heart04>\u3000それに会長も、ズボンが破れちゃいそうなくらい、大きくなってるわよ？\u3000ズボン越しでも、固くて熱いのが伝わってくるわ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 게다가 회장님도 바지가 터져버릴 정도로 커져 있다구? 바지 너머로도 딱딱하고 뜨거운 게 전해져 와<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「ねぇ、そろそろ……お部屋に行きましょうか<emoji=heart04>」"
translation = "「있지, 슬슬…… 방으로 갈까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちはそれから、寝室へと移動して――"
translation = "우리들은 그 뒤 침실로 이동해서──"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ……はい、会長<emoji=heart04>\u3000これが今日、あなただけのものになる、わたくしの処女おま○こよ<emoji=heart04>」"
translation = "「후훗…… 자, 회장님<emoji=heart04> 이게 오늘 당신만의 것이 될 내 처녀 보지야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セシアはベッドに仰向けになると、両足を抱えて広げ、自ら腰を上げて濡れたおま○この穴を見せつけてくる。"
translation = "세시아는 침대에 천장을 보고 누워 양다리를 끌어안아 벌리고는, 스스로 허리를 들어 젖은 보지 구멍을 과시해 온다."

[[dialogue]]
speaker = "クロト"
original = "「っ……そ、それも紅明に教わった誘い方なのか？」"
translation = "「윽…… 그, 그것도 코우메이에게 배운 유혹 방식이야?」"

[[dialogue]]
speaker = "unk"
original = "セシアの幼い容姿から繰り出されるエッチな言い回しのギャップに、俺のペニスはますますギンギンに勃起してしまう。"
translation = "세시아의 어린 용모에서 나오는 야한 말투의 갭에 내 페니스는 점점 꼿꼿하게 발기해 버린다."

[[dialogue]]
speaker = "セシア"
original = "「ええ<emoji=heart04>\u3000どうやら、効果はあったみたいね<emoji=heart04>」"
translation = "「네<emoji=heart04> 아무래도 효과는 있었나 보네<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「会長のおち○ちん、わたくしの中に早く入りたい<emoji=heart04>\u3000って期待して、大きくなってるわ。ふふっ<emoji=heart04>」"
translation = "「회장님의 자지, 내 안으로 빨리 들어가고 싶어<emoji=heart04> 라고 기대하면서 커져 있어. 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「――あんっ<emoji=heart04>\u3000会長のがおま○こに擦れて……<emoji=heart04>\u3000あっ、んっ<emoji=heart04>\u3000はあぁ……ふうぅ<emoji=heart04>」"
translation = "「──앙<emoji=heart04> 회장님 게 보지에 스쳐서……<emoji=heart04> 앗, 응<emoji=heart04> 하아아…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はあぁ<emoji=heart04>\u3000すごい……<emoji=heart04>\u3000熱くて、固くて<emoji=heart04>\u3000んんっ……逞しいわ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……んうぅ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 대단해……<emoji=heart04> 뜨겁고 딱딱해서<emoji=heart04> 응응…… 늠름해<emoji=heart04> 앗<emoji=heart04> 하아앗…… 응우우<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「ふあぁっ<emoji=heart04>\u3000わたくしのクリ、会長のおち○ちんに当たって……んあぁっ<emoji=heart04>\u3000擦れて感じちゃう……んっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000はあぁ……ふうぅ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 내 클리, 회장님 자지에 닿아서…… 응아앗<emoji=heart04> 스쳐서 느껴버려…… 응<emoji=heart04> 앗……<emoji=heart04> 하아아…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あんっ<emoji=heart04>\u3000会長……お尻を揉む手がエッチよ……<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 회장님…… 엉덩이를 주무르는 손이 야해……<emoji=heart04> 하아앗…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ<emoji=heart04>\u3000太ももを撫でられて……<emoji=heart04>\u3000ふうぅ……んんっ<emoji=heart04>\u3000あっ……んっ<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 허벅지를 쓰다듬어져서……<emoji=heart04> 후우우…… 응응<emoji=heart04> 앗…… 응<emoji=heart04> 하아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「セシアのおま○こ、愛液がどんどん溢れて来てる」"
translation = "「세시아의 보지, 애액이 계속 흘러나오고 있어.」"

[[dialogue]]
speaker = "セシア"
original = "「だってぇ……んんっ<emoji=heart04>\u3000今日までおち○ちんを挿れない代わりに、会長の手でいっぱい、エッチな経験を蓄積してきたから……<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>」"
translation = "「그치만…… 응응<emoji=heart04> 오늘까지 자지를 넣지 않는 대신에 회장님 손으로 잔뜩 야한 경험을 축적해 왔으니까……<emoji=heart04> 앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「触られるだけで……はあぁ<emoji=heart04>\u3000気持ちいいのを思い出して、体が反応しちゃうの……<emoji=heart04>」"
translation = "「만져지는 것만으로도…… 하아아<emoji=heart04> 기분 좋은 게 떠올라서 몸이 반응해버려……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……その反応は、すごくエッチだ」"
translation = "「윽…… 그 반응, 엄청 야해.」"

[[dialogue]]
speaker = "セシア"
original = "「んっ<emoji=heart04>\u3000会長、わたくし、期待で頭がいっぱいになって……おま○こ、ウズウズしちゃってるの<emoji=heart04>\u3000だから――」"
translation = "「응<emoji=heart04> 회장님, 나 기대 때문에 머릿속이 꽉 차서…… 보지가 근질근질거려<emoji=heart04> 그러니까──」"

[[dialogue]]
speaker = "セシア"
original = "「もう、挿れて……<emoji=heart04>」"
translation = "「이제, 넣어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は再び、ごくりと唾を飲む。"
translation = "나는 다시 한번 마른침을 삼킨다."

[[dialogue]]
speaker = "unk"
original = "――いよいよだ。セシアの体がエッチをするにはまだ小さいから、という理由で今日まで本番を避けてきた。"
translation = "──드디어다. 세시아의 몸이 섹스를 하기에는 아직 작다는 이유로 오늘까지 본선을 피해 왔다."

[[dialogue]]
speaker = "セシア"
original = "「あんっ……<emoji=heart04>\u3000会長<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "正式な恋人になって、素股や手マン手コキといった相互愛撫は何度も続けていた。"
translation = "정식 연인이 되어 가랑이 비비기나 손가락질, 핸드잡 같은 상호 애무는 몇 번이고 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "そうするうちに、だんだんセシアの体がほぐれていって、より大きなものを受け入れられるようになってきた。"
translation = "그러는 사이 점점 세시아의 몸이 풀려가며 더 큰 것을 받아들일 수 있게 되었다."

[[dialogue]]
speaker = "セシア"
original = "「ふあぁっ……<emoji=heart04>\u3000ヌルヌルのおち○ちん、当たってる……<emoji=heart04>」"
translation = "「후아앗……<emoji=heart04> 미끈거리는 자지, 닿고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして今日、ようやく本番をしよう、ということになったのだった。"
translation = "그렇게 오늘, 드디어 본선을 치르기로 한 것이었다."

[[dialogue]]
speaker = "セシア"
original = "「大丈夫よ、会長、落ち着いて。んっ……<emoji=heart04>\u3000おま○この穴は……ほら、ここよ<emoji=heart04>」"
translation = "「괜찮아요, 회장님, 진정하세요. 응……<emoji=heart04> 보지 구멍은…… 자, 여기예요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "セシアの小さな手が伸び、そっとペニスに触れて、先端をおま○この穴の前まで誘導してくれる。"
translation = "세시아의 작은 손이 뻗어와 살며시 페니스를 만지고 끝부분을 보지 구멍 앞까지 유도한다."

[[dialogue]]
speaker = "unk"
original = "そして、いよいよ――"
translation = "그리고 드디어──"

[[dialogue]]
speaker = "クロト"
original = "「セシア、挿れるぞ？」"
translation = "「세시아, 넣는다?」"

[[dialogue]]
speaker = "セシア"
original = "「ええ、会長――」"
translation = "「네, 회장님──」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしの初めてのおま○こ……どうぞ召し上がれ<emoji=heart04>」"
translation = "「내 첫 보지…… 부디 맛있게 드세요<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ……<emoji=heart04>\u3000おち○ちん、入って――っ<emoji=heart04><emoji=heart04>」"
translation = "「앗……<emoji=heart04> 자지, 들어──왔<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の中にペニスの先っぽをゆっくりと入れて、処女膜のところに行き当たると――"
translation = "나는 그녀의 안에 페니스 끝부분을 천천히 밀어 넣어 처녀막이 있는 곳에 다다르자──"

[[dialogue]]
speaker = "セシア"
original = "「うん、来て……<emoji=heart04>」"
translation = "「응, 와줘……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「っ……！\u3000――あっ<emoji=heart04>\u3000ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽……! ──앗<emoji=heart04> 후아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぐっと押し破って、俺はついにセシアのおま○この中に初挿入を果たした。"
translation = "꾹 밀어 파열시키며 나는 마침내 세시아의 보지 속에 첫 삽입을 완수했다."

[[dialogue]]
speaker = "セシア"
original = "「はああぁ～っ……<emoji=heart04>\u3000会長のおち○ちんが、わたくしの中にっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「하아아~앗……<emoji=heart04> 회장님의 자지가 내 안에……<emoji=heart04> 하아앗…… 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「セシア、大丈夫か？\u3000痛くないか？」"
translation = "「세시아, 괜찮아? 아프지 않아?」"

[[dialogue]]
speaker = "セシア"
original = "「んっ<emoji=heart04>\u3000ええ……これまで挿れなくても……会長とエッチな体験をいっぱい、蓄積してきたせいかしら……<emoji=heart04>」"
translation = "「응<emoji=heart04> 네…… 지금까지 넣지 않았어도…… 회장님이랑 야한 체험을 잔뜩 축적해 온 덕분일까요……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はあぁっ<emoji=heart04>\u3000わたくしの体、自分で思っている以上に、おち○ちんを欲しがってたみたい<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 내 몸, 내가 생각하는 것 이상으로 자지를 원하고 있었나 봐<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「挿れた瞬間は痛かったけど……んっ<emoji=heart04>\u3000おま○この中、どんどん気持ちいい感覚が、溢れて来るの……<emoji=heart04>」"
translation = "「넣은 순간은 아팠지만…… 응<emoji=heart04> 보지 안에서 점점 기분 좋은 감각이 넘쳐흘러 와……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「だから……動いて大丈夫よ、会長<emoji=heart04>」"
translation = "「그러니까…… 움직여도 괜찮아요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「わかった……行くぞ？」"
translation = "「알았어…… 간다?」"

[[dialogue]]
speaker = "セシア"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああぁ～～っ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000んうぅっ……ふあぁっ<emoji=heart04>」"
translation = "「앗──<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아~~앗<emoji=heart04><emoji=heart04> 응<emoji=heart04> 하아앗, 후우웃<emoji=heart04> 앗, 앙<emoji=heart04> 응우웃…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、あんっ<emoji=heart04>\u3000おち○ちん、すごいっ……<emoji=heart04>\u3000おま○この中、行ったり来たりする度に擦れて、頭の中、バチバチって……<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 자지, 대단해……<emoji=heart04> 보지 안을 왔다 갔다 할 때마다 쓸려서 머릿속이 찌릿찌릿 거려……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、んっ<emoji=heart04>\u3000はあぁっ、んうぅっ<emoji=heart04>\u3000おま○こ、気持ちいいわ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000んっ……ふあぁっ。あんっ<emoji=heart04>」"
translation = "「앗, 응<emoji=heart04> 하아앗, 응우웃<emoji=heart04> 보지 기분 좋아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앗…… 후우웃<emoji=heart04> 응…… 후아앗. 앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「セシア……俺も、気持ちいい！」"
translation = "「세시아…… 나도 기분 좋아!」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしのおま○こも、会長のおち○ちんとやっと会えて、喜んでるわ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000あっ……んうぅっ<emoji=heart04>\u3000はあぁっ……ふあぁんっ<emoji=heart04>」"
translation = "「내 보지도 회장님 자지랑 드디어 만나서 기뻐하고 있어요<emoji=heart04> 응…… 하아앗<emoji=heart04> 앗…… 응우웃<emoji=heart04> 하아앗…… 후아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はおま○この中を探るように、ペニスの角度を変えて動かして行く。"
translation = "나는 보지 안을 탐색하듯 페니스의 각도를 바꿔가며 움직여 나간다."

[[dialogue]]
speaker = "セシア"
original = "「ふあぁっ<emoji=heart04>\u3000そこ、気持ちいい……！\u3000あっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000んうぅっ、ふあぁっ<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>\u3000んうぅっ……んああぁっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 거기 기분 좋아……! 앗<emoji=heart04> 응…… 하아앗<emoji=heart04> 응우웃, 후아앗<emoji=heart04> 응…… 앗<emoji=heart04> 하아앗…… 응응<emoji=heart04> 응우웃…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「んっ<emoji=heart04>\u3000おま○この上のところ、ズリズリって<emoji=heart04>\u3000あっ……んうぅっ<emoji=heart04>\u3000すごく気持ちいいっ<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 보지 위쪽이 질척질척하게<emoji=heart04> 앗…… 응우웃<emoji=heart04> 너무 기분 좋아<emoji=heart04> 하아앗…… 후우우……<emoji=heart04> 앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「これが本当のエッチ……んっ<emoji=heart04>\u3000セックスなのねっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ、はあぁっ……んうぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「이게 진짜 야한…… 응<emoji=heart04> 섹스구나<emoji=heart04> 앗<emoji=heart04> 응응, 하아앗…… 응우웃<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「今までセシアに我慢させて、ごめん。今日はいっぱい気持ち良くするからっ」"
translation = "「지금까지 세시아를 참게 해서 미안해. 오늘은 잔뜩 기분 좋게 해줄 테니까」"

[[dialogue]]
speaker = "unk"
original = "片手をクリに伸ばして弄る。"
translation = "한 손을 클리로 뻗어 만지작거린다."

[[dialogue]]
speaker = "セシア"
original = "「あっ！？\u3000やっ……んっ<emoji=heart04>\u3000あっ……ふああぁっ<emoji=heart04>\u3000会長っ<emoji=heart04>\u3000同時にクリを触ると、気持ち良くなり過ぎちゃうわ<emoji=heart04>」"
translation = "「앗!? 싫…… 응<emoji=heart04> 앗…… 후아아앗<emoji=heart04> 회장님<emoji=heart04> 동시에 클리를 만지면 너무 기분 좋아져 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、あっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000んうぅっ……んあぁっ<emoji=heart04>\u3000ふうぅっ……あっ<emoji=heart04>\u3000はあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 응…… 하아앗<emoji=heart04> 응우웃…… 응아앗<emoji=heart04> 후우웃…… 앗<emoji=heart04> 하아앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「子宮がキュンキュンしちゃう<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ、はあぁっ……ふうぅっ<emoji=heart04>\u3000あっ、んんんっ<emoji=heart04>\u3000はあぁっ……ふああぁっ<emoji=heart04>\u3000んっ……んああぁっ<emoji=heart04>」"
translation = "「자궁이 큥큥거려<emoji=heart04> 앗<emoji=heart04> 응우웃, 하아앗…… 후우웃<emoji=heart04> 앗, 응응응<emoji=heart04> 하아앗…… 후아아앗<emoji=heart04> 응…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「子宮……」"
translation = "「자궁……」"

[[dialogue]]
speaker = "unk"
original = "なんとなくセシアの言葉に誘われて、クリを弄っていた指を、おま○この奥辺りの位置、お腹の上から撫でる。"
translation = "왠지 세시아의 말에 이끌려 클리를 만지던 손가락을 보지 깊숙한 곳 부근, 배 위쪽에서 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "すると――"
translation = "그러자──"

[[dialogue]]
speaker = "セシア"
original = "「あっ！？\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「そこ、撫でると感じちゃうわ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>\u3000子宮の上のところ<emoji=heart04>\u3000あっ……んっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>」"
translation = "「거기 쓰다듬으면 느껴버려요<emoji=heart04> 하아앗…… 응응<emoji=heart04> 자궁 위쪽<emoji=heart04> 앗…… 응<emoji=heart04> 하아앗…… 후우웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は続いて、軽くぐっと押してみる。"
translation = "나는 이어서 가볍게 꾹 눌러 본다."

[[dialogue]]
speaker = "セシア"
original = "「はあぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「それ、すごいわ<emoji=heart04>\u3000あっ、ふああぁっ<emoji=heart04>\u3000おま○こキュンキュンって反応して、愛液がいっぱい溢れてきちゃう<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000はあぁっ、ふうぅっ……ふああぁっ<emoji=heart04>」"
translation = "「그거 대단해요<emoji=heart04> 앗, 후아아앗<emoji=heart04> 보지가 큥큥하며 반응해서 애액이 잔뜩 넘쳐흘러 와요<emoji=heart04> 응…… 앗<emoji=heart04> 하아앗, 후우웃…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「会長<emoji=heart04>\u3000これが子作り、なのねっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……んああぁんっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 이게 아기 만들기인 거네요<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗…… 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "セシアの口から出た『子作り』という単語に、俺のペニスは反応して、更に大きくなってしまう。"
translation = "세시아의 입에서 나온 『아기 만들기』라는 단어에 내 페니스는 반응해 더욱 커져 버린다."

[[dialogue]]
speaker = "セシア"
original = "「んっ<emoji=heart04>\u3000ふふっ……会長、ひょっとしてわたくしが妊娠して、ママになるのを想像しちゃったのかしら？\u3000あっ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후훗…… 회장님, 혹시 내가 임신해서 마마가 되는 걸 상상해 버린 걸까? 앗<emoji=heart04> 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「会長が望むなら、わたくしのこと、本当に孕ませちゃってもいいのよ？\u3000はあぁっ……<emoji=heart04>」"
translation = "「회장님이 원한다면 나를 정말로 임신시켜버려도 괜찮아요? 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あんっ<emoji=heart04>\u3000わたくしが……はぁぁっ、あなたの本当のママに、なってあげるわ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 내가…… 하아아앗, 당신의 진짜 마마가 되어줄게<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……セシア！」"
translation = "「윽…… 세시아!」"

[[dialogue]]
speaker = "unk"
original = "好きな女の子にそんな風に言われてしまっては、今更我慢できるはずもなく――"
translation = "좋아하는 여자아이에게 그런 말을 들어버리면 이제 와서 참을 수 있을 리도 없고──"

[[dialogue]]
speaker = "セシア"
original = "「あっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗─────<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しいのきたぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 격한 게 왔어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000んんんっ、あっ、あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000……はあぁっ、あああっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앙<emoji=heart04> 응응응, 앗, 앗<emoji=heart04> 후아아앗<emoji=heart04> ……하아앗, 아아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はああぁっ<emoji=heart04>\u3000おち○ちん、すごい<emoji=heart04>\u3000激しいの、感じるぅ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000んうぅっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 자지 대단해<emoji=heart04> 격렬한 거 느껴져어<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04> 응우웃, 앗, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「おま○こ気持ちいいっ<emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000気持ちいいのぉ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「보지 기분 좋아아<emoji=heart04> 앙, 앙, 앙<emoji=heart04> 기분 좋아아<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「これが、本気セックスっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000んんんっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「이게 진짜 섹스<emoji=heart04> 하아앗<emoji=heart04> 대단해<emoji=heart04> 응응응, 앗, 앗, 앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「会長と繋がるの、すごく気持ちいいっ<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>」"
translation = "「회장님이랑 연결되는 거 너무 기분 좋아<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「心の奥から、愛が溢れてきちゃうっ<emoji=heart04>\u3000あっ、あっ、あっ、んうぅっ<emoji=heart04>\u3000あっ、あっ、はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「마음 깊은 곳에서 사랑이 넘쳐흘러 와요<emoji=heart04> 앗, 앗, 앗, 응우웃<emoji=heart04> 앗, 앗, 하아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「会長、もっと<emoji=heart04>\u3000もっといっぱいしてぇ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000んんっ、ああっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「회장님, 더<emoji=heart04> 더 많이 해줘어<emoji=heart04> 앗, 앗, 앙<emoji=heart04> 하아아앗<emoji=heart04> 응응, 아앗, 앙<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はセシアのもっとエッチな反応が見たくて、再びお腹の上から子宮──ポルチオを刺激する。"
translation = "나는 세시아의 더 야한 반응을 보고 싶어서 다시 배 위쪽에서 자궁──포르치오를 자극한다."

[[dialogue]]
speaker = "セシア"
original = "「ふあああぁぁぁっ！？\u3000それすごいぃっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000んはぁっ、あっ、あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>」"
translation = "「후아아아아아앗!? 그거 대단해에<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04> 응하앗, 앗, 앗<emoji=heart04> 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000気持ち良すぎて、変になっちゃう<emoji=heart04>\u3000はぁっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 너무 기분 좋아서 이상해질 것 같아<emoji=heart04> 하앗, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「本番エッチ好きっ<emoji=heart04>\u3000セックス好きぃっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「본선 섹스 좋아<emoji=heart04> 섹스 좋아아<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「会長っ……会長、大好きっ<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>」"
translation = "「회장님…… 회장님, 너무 좋아<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も好きだ、セシアっ！」"
translation = "「나도 좋아해, 세시아!」"

[[dialogue]]
speaker = "セシア"
original = "「んっ、あっ、あっ、あんっ<emoji=heart04>\u3000愛しているわ、会長っ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「응, 앗, 앗, 앙<emoji=heart04> 사랑하고 있어요, 회장님<emoji=heart04> 하아앗<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もうイキそうだっ……！」"
translation = "「이제 갈 것 같아……!」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしも、もうすぐっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ、んうぅっ<emoji=heart04>\u3000あっ、あっ、あん<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ、あっ、はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「나도 이제 곧<emoji=heart04> 응<emoji=heart04> 하아앗, 응우웃<emoji=heart04> 앗, 앗, 앙<emoji=heart04> 하아앗<emoji=heart04> 응, 앗, 하아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000んんんっ、あっ、あっ、あっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 하아아앗<emoji=heart04> 응응응, 앗, 앗, 앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はあぁっ、来た<emoji=heart04>\u3000すごいの来るっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>\u3000本当にイっちゃう<emoji=heart04>」"
translation = "「하아앗, 왔다<emoji=heart04> 엄청난 거 와<emoji=heart04> 아아앗<emoji=heart04> 하아아앙<emoji=heart04> 정말로 가버려<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あああっ……はああんっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000んあああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 아아앗…… 하아앙<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 응아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……もう出る！」"
translation = "「윽…… 이제 나온다!」"

[[dialogue]]
speaker = "セシア"
original = "「いっぱい出してっ<emoji=heart04>\u3000わたくしのこと、孕ませてぇっ<emoji=heart04>」"
translation = "「잔뜩 내보내 줘<emoji=heart04> 나를 임신시켜줘어<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、来るっ<emoji=heart04>\u3000イク、イクイクイクイクっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 와아<emoji=heart04> 가, 가가가가가앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はあああぁぁっ<emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아앗<emoji=heart04><emoji=heart04> 가──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「イっクうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간드아아아아아아─────────앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「んあああぁぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長の精子、中に入って来るぅ～～～っ<emoji=heart04>」"
translation = "「응아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 회장님 정액, 안으로 들어와아~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はああぁ～～～～っ<emoji=heart04>\u3000お腹の中、熱いぃ～<emoji=heart04>\u3000おま○こ、キュンキュンするぅ<emoji=heart04>」"
translation = "「하아아아~~~~앗<emoji=heart04> 배 안이 뜨거워어~<emoji=heart04> 보지 큥큥거려어<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はあぁ……ふうぅ……<emoji=heart04>\u3000ん……<emoji=heart04>\u3000射精、ようやく止まったわ……<emoji=heart04>\u3000はあぁぁ<emoji=heart04>」"
translation = "「하아아…… 후우우……<emoji=heart04> 응……<emoji=heart04> 사정, 드디어 멈췄네……<emoji=heart04> 하아아아<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「あんっ……<emoji=heart04>\u3000おち○ちん抜けちゃう……<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 자지 빠져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
original = "「はあぁ……<emoji=heart04>\u3000セックス、すごく気持ちよかったわ<emoji=heart04>\u3000想像したより、ずっと……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 섹스, 정말 기분 좋았어요<emoji=heart04> 상상했던 것보다 훨씬……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ついに……最後までしてしまった……」"
translation = "「마침내…… 끝까지 해버렸네……」"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ……会長、後悔してるのかしら？」"
translation = "「후훗…… 회장님, 후회하고 있는 건가요?」"

[[dialogue]]
speaker = "クロト"
original = "「いや……そんなことない。セシアのこと、これからもっと愛して、大切にする」"
translation = "「아니…… 그럴 리 없어. 세시아를 앞으로 더 사랑하고 소중히 여길게.」"

[[dialogue]]
speaker = "クロト"
original = "「――俺は本気で、セシアのことが好きだから」"
translation = "「──나는 진심으로 세시아를 좋아하니까.」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしも……体を重ねたことで、会長のことがもっと愛おしくなったわ。今は――」"
translation = "「저도…… 몸을 겹친 덕분에 회장님이 더 사랑스러워졌어요. 지금은──」"

[[dialogue]]
speaker = "セシア"
original = "「どんなママよりも好きよ、会長<emoji=heart04>」"
translation = "「어떤 마마보다도 좋아해요, 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちは見つめ合い、微笑み合う。"
translation = "우리들은 서로 마주 보며 미소 짓는다."

[[dialogue]]
speaker = "セシア"
original = "「ふぅ……少し、落ち着いてきたところで――」"
translation = "「후우…… 조금 진정된 참에──」"

[[dialogue]]
speaker = "セシア"
original = "「次は違う体位も、試してみたいわ<emoji=heart04>」"
translation = "「다음은 다른 체위도 시도해 보고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「も、もうするのか？」"
translation = "「또, 벌써 하는 거야?」"

[[dialogue]]
speaker = "セシア"
original = "「ええ。体は小さくても、わたくしは守護天使だもの♪\u3000まだまだ元気よ<emoji=heart04>\u3000それに……」"
translation = "「네. 몸은 작아도 저는 수호천사인걸요♪ 아직 팔팔해요<emoji=heart04> 게다가……」"

[[dialogue]]
speaker = "セシア"
original = "「会長だって、１回だけじゃ物足りないんじゃないかしら？」"
translation = "「회장님도 한 번으로는 부족하지 않나요?」"

[[dialogue]]
speaker = "クロト"
original = "「う……それは……」"
translation = "「우…… 그건……」"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ……おち○ちんの方は素直に、またムクムクって大きくなっているわよ？」"
translation = "「후훗…… 자지 쪽은 솔직하게 다시 꼼지락꼼지락하며 커지고 있다구요?」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしがママになってあげるって言ったら、会長のおち○ちん、もっと大きくなっていたし……今度はわたくしが動いて、気持ち良くしてあげるわね<emoji=heart04>」"
translation = "「내가 마마가 되어주겠다고 했더니 회장님 자지 더 커졌었고…… 이번에는 내가 움직여서 기분 좋게 해줄게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、互いの性欲が収まるまで、１日で色々な体位を初体験してしまうのだった――"
translation = "그 뒤 우리들은 서로의 성욕이 가라앉을 때까지 하루 동안 여러 가지 체위를 처음 경험하게 되는 것이었다──"

