[[dialogue]]
speaker = "unk"
original = "第１１話,マントは受け継がれる,B"
translation = "제11화, 망토는 계승된다"

[[dialogue]]
speaker = "マトイ"
original = "「──とまぁ、紆余曲折ありながら、新星星徒会は今に至ったの」"
translation = "「──뭐 그렇게 우여곡절 끝에, 신성 성도회는 지금에 이른 거야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「つまり、クロトがつけてるマントは、サーシャさんが作り、私から受け継がれた由緒正しい会長の証なのよ！」"
translation = "「즉, 쿠로토가 하고 있는 망토는 사샤 씨가 만들고, 나로부터 계승된 유서 깊은 회장의 증표라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どう？\u3000重みを感じるでしょう？\u3000もーっとありたがりなさい！\u3000えっへん」"
translation = "「어때? 무게감이 느껴지지? 좀 더 고마워하라고! 에헴」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんからヴィーナスへ、ヴィーナスから俺へ。"
translation = "사샤 씨에게서 비너스로, 비너스에게서 나에게로."

[[dialogue]]
speaker = "unk"
original = "そう思うと身が引き締まる。俺も誰かにこのマントを渡す日が来るのだろうか。"
translation = "그렇게 생각하니 마음이 다잡힌다. 나도 누군가에게 이 망토를 건네줄 날이 올까."

[[dialogue]]
speaker = "アナ"
original = "「つまり、きなこクッキーは星徒会の結束の証なのです。会長も食べてください」"
translation = "「즉, 인절미 쿠키는 성도회 결속의 증표인 것입니다. 회장님도 드셔보세요」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは、良かったら食べて。緋宮くんの口に合うと良いんだけど」"
translation = "「아하하, 괜찮다면 먹어봐. 히노미야 군 입맛에 맞으면 좋겠는데」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん、いただくよ」"
translation = "「물론, 잘 먹을게」"

[[dialogue]]
speaker = "unk"
original = "シンプルで飾り気のないキツネ色のクッキーを１枚手に取り、口に運ぶ。"
translation = "심플하고 꾸밈없는 노르스름한 쿠키를 한 장 집어 입으로 가져간다."

[[dialogue]]
speaker = "unk"
original = "一口かじると、口の中でホロホロと崩れて、きな粉の自然な甘みと香ばしさが広がった。"
translation = "한 입 베어 물자 입안에서 사르르 부서지며 인절미 가루의 자연스러운 단맛과 고소함이 퍼졌다."

[[dialogue]]
speaker = "マトイ"
original = "「どう……かな？」"
translation = "「어때……?」"

[[dialogue]]
speaker = "クロト"
original = "「うん、美味しいよ。しつこくないから、毎日でも食べられそうだ」"
translation = "「응, 맛있어. 질리지 않아서 매일이라도 먹을 수 있을 것 같아」"

[[dialogue]]
speaker = "unk"
original = "サクサクと軽い口当たりで、あっという間に１枚を食べきる。すぐさま２枚目に手を伸ばしたくなる気持ちがよくわかった。"
translation = "바삭하고 가벼운 식감에 순식간에 한 장을 다 먹었다. 곧바로 두 장째에 손을 뻗고 싶어지는 기분을 잘 알 것 같았다."

[[dialogue]]
speaker = "サーシャ"
original = "「『俺のために毎日、作ってくれ』？\u3000あらあら、それってプロポーズ～？」"
translation = "「『나를 위해 매일 만들어 줘』? 어머어머, 그거 프로포즈~?」"

[[dialogue]]
speaker = "マトイ"
original = "「お味噌汁じゃないんだから！\u3000緋宮くんだってそんな意味で言ったわけじゃないよね？\u3000ね？」"
translation = "「된장국도 아니고! 히노미야 군도 그런 의미로 말한 건 아니지? 그치?」"

[[dialogue]]
speaker = "アナ"
original = "「ふふ、やはり星徒会は笑いの絶えない楽しい職場です」"
translation = "「후후, 역시 성도회는 웃음이 끊이지 않는 즐거운 직장입니다」"

[[dialogue]]
speaker = "マトイ"
original = "「求人情報誌に載ってそうなフレーズだ！？」"
translation = "「구인 정보지에 실려 있을 법한 문구잖아!?」"

[[dialogue]]
speaker = "アナ"
original = "「そんなわけで皆さん、お茶が入りました」"
translation = "「그런 의미에서 여러분, 차가 다 우려졌습니다」"

[[dialogue]]
speaker = "クロト"
original = "「うん、アナの入れてくれたお茶美味しいよ。ほのかな渋みが、きなこクッキーとぴったりだ」"
translation = "「응, 아나가 타준 차 맛있어. 은은한 떫은맛이 인절미 쿠키랑 딱 맞네」"

[[dialogue]]
speaker = "アナ"
original = "「オフコースです。私とマトイ先輩はベストマッチングですから」"
translation = "「오프코스입니다. 저와 마토이 선배는 베스트 매칭이니까요」"

[[dialogue]]
speaker = "マトイ"
original = "「アナ……！」"
translation = "「아나……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はー……お菓子とお茶が美味しいってだけで幸せよねー。今日はのんびり、何もしたくないわー」"
translation = "「하아─…… 과자랑 차가 맛있다는 것만으로도 행복하네─. 오늘은 느긋하게 아무것도 안 하고 싶어─」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナスはいつものんびりしてるでしょ……」"
translation = "「비너스는 항상 느긋하게 있잖아……」"

[[dialogue]]
speaker = "サーシャ"
original = "「そんなこと言ってると、急に忙しくなっちゃうのよね～」"
translation = "「그런 말을 하면 갑자기 바빠지곤 하지요~」"

[[dialogue]]
speaker = "アナ"
original = "「モンスターアラームです。即フラグ回収ですね」"
translation = "「몬스터 알람입니다. 즉시 플래그 회수네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んもう！\u3000お茶のおかわりが欲しかったのにー！」"
translation = "「정말! 차 한 잔 더 마시고 싶었는데─!」"

[[dialogue]]
speaker = "マトイ"
original = "「お茶会の続きは、アステラを片づけたらね」"
translation = "「다과회 뒷이야기는 아스테라를 정리하고 나서 하자」"

[[dialogue]]
speaker = "アナ"
original = "「なるはやで終わらせましょう」"
translation = "「최대한 빨리 끝내죠」"

[[dialogue]]
speaker = "サーシャ"
original = "「みんなとの絆を深めたところで、会長くん、格好よく決めてね～」"
translation = "「모두와의 유대를 다진 참이니, 회장님, 멋지게 결정해줘~」"

[[dialogue]]
speaker = "unk"
original = "俺は食べかけのきなこクッキーを口に放り込み、会長の証であるマントを翻す。"
translation = "나는 먹다 남은 인절미 쿠키를 입에 털어 넣고, 회장의 증표인 망토를 휘날린다."

[[dialogue]]
speaker = "クロト"
original = "「新星星徒会、行くぞ！」"
translation = "「신성 성도회, 간다!」"

[[dialogue]]
speaker = "みんな"
original = "「了解っ！」"
translation = "「라져!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たち新星学園星徒会は、今日も平和の守護者としての使命を果たすのだった。"
translation = "이렇게 우리 신성학원 성도회는 오늘도 평화의 수호자로서 사명을 다하는 것이었다."

