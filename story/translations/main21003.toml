[[dialogue]]
speaker = "unk"
original = "第３話,神殿での再会,B"
translation = "제3화, 신전에서의 재회"

[[dialogue]]
speaker = "unk"
original = "俺たちは女神の神殿目指し、全速力で空を駆け抜けた。"
translation = "우리들은 여신의 신전을 목표로 전속력으로 하늘을 가로질렀다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ここが女神様の神殿……すごく荘厳な雰囲気……」"
translation = "「여기가 여신님의 신전…… 굉장히 장엄한 분위기네요……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「確かにこんな状況でなければ見入っていたところだが、今は極星星徒会を止める方が先だ」"
translation = "「확실히 이런 상황이 아니었다면 넋을 잃고 보았겠지만, 지금은 극성성도회를 막는 것이 우선이다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「天使のためにも、世界のためにも、女神の神殿を守るぞ！」"
translation = "「천사를 위해서도, 세계를 위해서도 여신의 신전을 지키자!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん！\u3000私たちはそのために来たんだから！」"
translation = "「응! 우리는 그러기 위해 온 거니까!」"

[[dialogue]]
speaker = "unk"
original = "俺たちが神殿に到着すると、２人の星騎士の姿があった。"
translation = "우리들이 신전에 도착하자 두 명의 성기사 모습이 보였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あの２人が極星星徒会の？」"
translation = "「저 두 사람이 극성성도회인가?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はい、グレイスちゃんとレティシアちゃんです！\u3000グレイスちゃんは妖精の魔族で、レティシアちゃんは天使なんです」"
translation = "「네, 그레이스짱이랑 레티시아짱이에요! 그레이스짱은 요정 마족이고, 레티시아짱은 천사예요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えーっと、ルヴィネとベアトリスとチナと……グレイスとレティシア、ね。これで５人だわ！」"
translation = "「어디 보자, 루비네랑 베아트리스랑 치나랑…… 그레이스랑 레티시아, 네. 이걸로 5명이야!」"

[[dialogue]]
speaker = "unk"
original = "会長のルヴィネ。"
translation = "회장인 루비네."

[[dialogue]]
speaker = "unk"
original = "副会長のベアトリス。"
translation = "부회장인 베아트리스."

[[dialogue]]
speaker = "unk"
original = "そしてチナ。グレイス。レティシア。"
translation = "그리고 치나. 그레이스. 레티시아."

[[dialogue]]
speaker = "unk"
original = "ベアトリスによると、この５人が極星星徒会の全員だ。"
translation = "베아트리스에 따르면 이 5명이 극성성도회의 전원이다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「グレイスちゃん！\u3000レティシアちゃん！\u3000私の話を聞いて！」"
translation = "「그레이스짱! 레티시아짱! 내 말 좀 들어줘!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「な、なんでベアトがここにいるんですっ？\u3000アルタイルの星騎士が妨害に来ることはあり得ると思ってましたが……」"
translation = "「어, 어째서 베아토가 여기 있는 거예요? 알타이르의 성기사가 방해하러 올 가능성은 있다고 생각했지만……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「チナちゃんが教えてくれたの！\u3000天界が襲撃されてるなら、きっと女神の神殿が本命だって」"
translation = "「치나짱이 알려줬어! 천계가 습격당하고 있다면 분명 여신의 신전이 본거지일 거라고」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「チナが……！？」"
translation = "「치나가……!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「妙ね。拷問で口を割るような子じゃないはずだけど」"
translation = "「묘하네. 고문으로 입을 열 아이가 아닐 텐데」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そんなひどいことしてないよ！？\u3000私がお願いしたの！\u3000このままじゃデネブもアルタイルも大変なことになるから……！」"
translation = "「그런 심한 짓 안 했어! 내가 부탁한 거야! 이대로라면 데네브도 알타이르도 큰일이 날 거니까……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「２人とも聞いて！\u3000平行世界が滅ぼし合わないといけないのは嘘で、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』っていう存在がリクリエを起こそうとしているの！」"
translation = "「둘 다 들어줘! 평행세계가 서로 멸망시켜야 한다는 건 거짓말이고, 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』라는 존재가 리크리에를 일으키려 하고 있어!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ぜろす……？」"
translation = "「제로스……?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は女神テルル様を生み出した創造神で、テルル様はリクリエを起こそうとする『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』にずっと抵抗してて……！」"
translation = "「『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』는 여신 테루루 님을 낳은 창조신이고, 테루루 님은 리크리에를 일으키려는 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』에게 계속 저항해 왔어……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それでルヴィは、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がリクリエを実現させるために生み出した、新しい女神だったの……！」"
translation = "「그래서 루비는 『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』가 리크리에를 실현하기 위해 낳은 새로운 여신이었던 거야……!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……はい？」"
translation = "「……네?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィがリクリエの側、と言いたいの？\u3000……おかしな話。それならどうして、ルヴィは私たちを──デネブを救ってくれたのかしら」"
translation = "「루비가 리크리에 편이라고 말하고 싶은 거니? ……이상한 이야기네. 그렇다면 어째서 루비는 우리를── 데네브를 구해준 걸까」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それは、デネブとアルタイルを争わせるためで──」"
translation = "「그건 데네브와 알타이르를 싸우게 하기 위해서──」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「いやいや、さっきから何を言ってるんですかベアト！？\u3000あのルヴィがデネブを滅ぼすだなんて、そんなことあり得ません」"
translation = "「아니 아니, 아까부터 무슨 소리를 하는 거예요 베아토!? 그 루비가 데네브를 멸망시키다니, 그럴 리가 없잖아요」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「誰よりもデネブを守ろうとしているのがルヴィじゃないですか。ベアトだってよく知ってるはずですよ！」"
translation = "「누구보다 데네브를 지키려 하는 게 루비잖아요. 베아토도 잘 알고 있을 텐데요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……っ」"
translation = "「……윽」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「可哀想に。アルタイルの星騎士から、何か誤った情報を吹き込まれているのね」"
translation = "「가엾게도. 알타이르의 성기사로부터 뭔가 잘못된 정보를 주입받았나 보네」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「その可能性は大いにあり得ますね……ベアトは何でもホイホイ信じちゃう子ですし」"
translation = "「그럴 가능성이 매우 높겠네요…… 베아토는 뭐든 곧이곧대로 믿어버리는 아이니까요」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「違うの、私はこの目でちゃんと……！」"
translation = "「아니야, 난 이 눈으로 똑똑히……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ごめんなさいね？\u3000今のベアトの言葉は信用できないわ。アルタイルの星騎士と行動を共にしている、こんな状況ではね」"
translation = "「미안하지만 지금 베아토의 말은 신용할 수 없어. 알타이르의 성기사와 행동을 함께하고 있는 이런 상황에서는 말이야」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ベアトを連れ戻すようにと、ルヴィからも指令を受けてます！\u3000一緒に私たちの世界に……デネブに帰りましょう！\u3000話はその時にできますよ！」"
translation = "「베아토를 데려오라고 루비에게 지령도 받았어요! 함께 우리 세계로…… 데네브로 돌아가요! 이야기는 그때 할 수 있어요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「っ……やっぱり簡単には信じてもらえないよね」"
translation = "「윽…… 역시 쉽게 믿어주지 않네」"

[[dialogue]]
speaker = "unk"
original = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在やルヴィネの正体には、俺たちも驚かされた。極星星徒会の２人がベアトリスの話を信じないのも無理はない。"
translation = "『<ruby>ＸＥＬＯＳ<rt>제로스</rt></ruby>』의 존재나 루비네의 정체에는 우리들도 놀랐었다. 극성성도회의 두 사람이 베아트리스의 말을 믿지 않는 것도 무리는 아니다."

[[dialogue]]
speaker = "unk"
original = "今はアルタイルを敵と認識しているのだから、なおさらだ──そう感じていた時。"
translation = "지금은 알타이르를 적이라고 인식하고 있으니 더더욱── 그렇게 느끼고 있었을 때."

[[dialogue]]
speaker = "unk"
original = "グレイスという少女が俺へ鋭い視線を向けてきた。"
translation = "그레이스라는 소녀가 나에게 날카로운 시선을 보내왔다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……魔王もご一緒でしたか。ベアトにずいぶん巧みな嘘を吹き込んだようですね。流石は私たちを見捨てた裏切り者です」"
translation = "「……마왕도 함께였나요. 베아토에게 꽤나 교묘한 거짓말을 주입한 모양이군요. 과연 우리를 저버린 배신자답네요」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「次はどんな卑怯な手を打つんですか！？\u3000言っておきますが、チナを人質にしても無駄ですよ」"
translation = "「다음은 어떤 비겁한 수를 쓸 건가요!? 말해두겠는데, 치나를 인질로 삼아도 소용없어요」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「自分の身を盾にされるのは、誰よりチナが望まないはず……<ruby>悪辣<rt>あくらつ</rt></ruby>な脅しは無意味です。私たちはひるんだりしません！」"
translation = "「자신의 몸이 방패가 되는 건 누구보다 치나가 원치 않을 터…… 악랄한 협박은 무의미합니다. 우리는 굴하지 않아요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなことはしない！\u3000俺たちアルタイルは、デネブと戦うのではなく、共にリクリエと戦いたいと思っている」"
translation = "「그런 짓은 안 해! 우리 알타이르는 데네브와 싸우는 게 아니라, 함께 리크리에와 싸우고 싶다고 생각하고 있다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルタイルもデネブもリクリエに脅かされている。ならアルタイルとデネブの星騎士の力を合わせて、一緒にリクリエに立ち向かわないか！？」"
translation = "「알타이르도 데네브도 리크리에에게 위협받고 있어. 그렇다면 알타이르와 데네브의 성기사의 힘을 합쳐서 같이 리크리에에 맞서지 않겠나!?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──どの口でそんな綺麗ごとを！\u3000そんなこと言って、また裏切るつもりなんでしょう！」"
translation = "「──어느 입으로 그런 허울 좋은 소리를! 그렇게 말하고 또 배신할 셈이죠!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトは裏切ってなんかいないわ！\u3000ルヴィネの嘘よ！」"
translation = "「쿠로토는 배신 같은 거 안 했어! 루비네의 거짓말이야!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「口では何とでも言えます！」"
translation = "「말로는 무슨 말이든 못 하겠어요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「魔王クロトは世界を守ると言いました。ですが魔王はデネブを去り、滅びかけた世界を守ったのはルヴィでした！」"
translation = "「마왕 쿠로토는 세계를 지키겠다고 했습니다. 하지만 마왕은 데네브를 떠났고, 멸망해 가던 세계를 지킨 건 루비였습니다!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「魔王は私たちを……デネブを裏切ったんです！」"
translation = "「마왕은 우리를…… 데네브를 배신한 거예요!」"

[[dialogue]]
speaker = "unk"
original = "『魔王クロトはデネブを裏切ってアルタイルに逃げた』──平行世界デネブでは、ルヴィネからそう伝えられている。"
translation = "『마왕 쿠로토는 데네브를 배신하고 알타이르로 도망쳤다』── 평행세계 데네브에서는 루비네로부터 그렇게 전해지고 있다."

[[dialogue]]
speaker = "unk"
original = "何せ救世の英雄ルヴィネの言葉だ。信じている人が大半だろう。"
translation = "무엇보다 구세의 영웅 루비네의 말이다. 믿고 있는 사람이 대다수일 것이다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ここでのんびりと問答をするつもりはないの。グレイス、まずは一番の指令を果たしましょう。神殿内部へ向かうわ」"
translation = "「여기서 한가하게 문답을 나눌 생각은 없어. 그레이스, 우선은 첫 번째 지령을 완수하자. 신전 내부로 향하겠어」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はいっ──行きなさい、極星従騎！」"
translation = "「네── 가라, 극성종기!」"

[[dialogue]]
speaker = "unk"
original = "グレイスが転送装置を取り出して号令を下すと、虚空に穴が開き、剣を携えたガーディアンが現れる。"
translation = "그레이스가 전송 장치를 꺼내 호령을 내리자 허공에 구멍이 뚫리고, 검을 든 가디언이 나타난다."

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ヒィィン！！」"
translation = "「히이잉!!」"

[[dialogue]]
speaker = "unk"
original = "そして極星従騎が<ruby>嘶<rt>いなな</rt></ruby>き、宙を駆けて突進する。"
translation = "그리고 극성종기가 울부짖으며 공중을 달려 돌진한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「話を聞くつもりがないなら、力ずくで止めるまでよ！」"
translation = "「이야기를 들을 생각이 없다면 힘으로라도 막을 수밖에!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん！\u3000天使も天界も、絶対に守るんだから！」"
translation = "「응! 천사도 천계도 절대로 지킬 거니까!」"

