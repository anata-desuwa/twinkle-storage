[[dialogue]]
speaker = "unk"
original = "第４話,匂いが好きな人,P"
translation = "제4화, 냄새를 좋아하는 사람"

[[dialogue]]
speaker = "unk"
original = "休日に買い物へ出掛けていた俺は、ゲリラ豪雨に遭遇した。"
translation = "휴일에 쇼핑하러 나갔던 나는 게릴라성 호우를 만났다."

[[dialogue]]
speaker = "unk"
original = "バッグに折り畳み傘を持っていたので事なきを得て、雨はすぐに止んだのだが──"
translation = "가방에 접이식 우산이 있어서 큰일은 면했고 비는 곧 그쳤지만──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あっ、会長。こんにちはです……」"
translation = "「앗, 회장님. 안녕하세요……」"

[[dialogue]]
speaker = "unk"
original = "って、服びっしゃびしゃだけど！？"
translation = "옷이 흠뻑 젖었는데!?"

[[dialogue]]
speaker = "unk"
original = "こんにちはヨミヨミ……"
translation = "안녕 요미요미……"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「買い出しに出ていたんですが、傘を持ってなくて……」"
translation = "「장을 보러 나왔는데 우산이 없어서……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ありがとうございます、会長。タオルだけじゃなく、着替えまで貸して頂いて……」"
translation = "「감사합니다, 회장님. 수건뿐만 아니라 옷까지 빌려주셔서……」"

[[dialogue]]
speaker = "unk"
original = "乾燥機でメイド服を乾かし終わり、今はインナーを乾かしている最中だった。ヨミが現在、メイド服の下に何を着ているかというと──"
translation = "건조기로 메이드복을 다 말리고 지금은 속옷을 말리는 중이었다. 요미가 현재 메이드복 아래에 무엇을 입고 있느냐 하면──"

[[dialogue]]
speaker = "unk"
original = "俺のＴシャツなんかで申し訳ない……"
translation = "내 티셔츠 같은 거라 미안해……"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「いえ、気になさらないで下さい。お母様の服を勝手に使うわけにも行きませんし」"
translation = "「아니요, 신경 쓰지 마세요. 어머니 옷을 마음대로 쓸 수도 없으니까요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……あっ、お茶ですか？\u3000いえ、ほんとにお構いなく」"
translation = "「……앗, 차인가요? 아니요, 정말 괜찮아요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい、わざわざありがとうございます。…………ん～、くんくん」"
translation = "「네, 일부러 감사합니다. …………음~, 킁킁.」"

[[dialogue]]
speaker = "unk"
original = "熱い緑茶でも淹れようとキッチンに行っている間に、メイド服の襟部分を引っ張って、中の匂いを嗅いでいるヨミの姿が目に入った。"
translation = "뜨거운 녹차라도 내오려고 주방에 가 있는 동안 메이드복 깃 부분을 잡아당겨 안의 냄새를 맡고 있는 요미의 모습이 눈에 들어왔다."

[[dialogue]]
speaker = "unk"
original = "ごめん、やっぱり男臭いかな？"
translation = "미안, 역시 남자 냄새나나?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000い、いえっ、違うんです！」"
translation = "「코얏!? 아, 아니요! 아니에요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「これは、その……」"
translation = "「이건 그……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「──Ｔシャツから会長の良い匂いがするので気になっちゃうだけです！」"
translation = "「──티셔츠에서 회장님의 좋은 냄새가 나서 신경 쓰였을 뿐이에요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……あ。……こ、こやあぁぁぁっ！？」"
translation = "「……아. ……코, 코야아아앗!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「し、失言でした……今のはえっと……その……うぅ……！」"
translation = "「시, 실언이었어요…… 방금 건 그러니까…… 그…… 으으……!」"

[[dialogue]]
speaker = "unk"
original = "匂いフェチ……ってやつ？"
translation = "냄새 페티시……라는 거?"

[[dialogue]]
speaker = "unk"
original = "ヨミヨミって前から思ってたけど、"
translation = "요미요미는 전부터 생각했지만,"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ……そうです、その通りですよ！\u3000悪いですか！？」"
translation = "「그…… 그래요, 맞아요! 그게 나쁜가요!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「鼻が敏感なので、自分とは違う匂いだと意識しちゃうんですっ」"
translation = "「코가 예민해서 자신과는 다른 냄새라면 의식하게 된다고요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ふ、服が乾いたみたいなので、着替えて来ます！！」"
translation = "「오, 옷이 다 마른 것 같으니 갈아입고 올게요!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、それでは会長、ありがとうございました。服も乾いたので、これでお暇させて頂きますね！」"
translation = "「그, 그럼 회장님, 감사했습니다. 옷도 말랐으니 이만 실례할게요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「Ｔシャツの方は洗ってから後日、お返しさせて頂きます」"
translation = "「티셔츠는 빨아서 나중에 돌려드릴게요.」"

[[dialogue]]
speaker = "unk"
original = "別にそのまま、洗濯機に放り込んでくれれば大丈夫だよ？"
translation = "그냥 그대로 세탁기에 넣어버려도 괜찮은데?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そういうわけにはいきません。一応その……女子が着たものですから」"
translation = "「그럴 수는 없죠. 일단 그…… 여자가 입었던 거니까요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あっ！\u3000言っておきますけど、変なことに使ったりとかしませんから！」"
translation = "「앗! 말해두겠는데 이상한 데 쓰거나 하지 않을 거니까요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「本当に本当ですよ！？\u3000変な風に誤解しないで下さいね？」"
translation = "「정말 정말이에요!? 이상하게 오해하지 말아 주세요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そんなわけで、本日はお世話になりましたっ」"
translation = "「그럼 오늘 신세 졌습니다!」"

[[dialogue]]
speaker = "unk"
original = "匂いフェチがバレたのが未だ恥ずかしいのか、ヨミは足早に帰って行くのだった。"
translation = "냄새 페티시가 들통난 게 아직 부끄러운지 요미는 서둘러 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "後日──"
translation = "며칠 후──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、先日はありがとうございました。Ｔシャツを洗って来ましたので、お返し致しますね」"
translation = "「회장님, 지난번엔 감사했습니다. 티셔츠를 빨아왔으니 돌려드릴게요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お詫びの菓子折りも持って来たので、後で召し上がって下さい」"
translation = "「사죄의 뜻으로 과자 상자도 가져왔으니 나중에 드세요.」"

[[dialogue]]
speaker = "unk"
original = "……あれ？\u3000このＴシャツ、新品っぽくない？"
translation = "……어라? 이 티셔츠 새것 같은데?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、そんなわけないじゃないですか。アイロンで整えたからですよ」"
translation = "「그, 그럴 리가 없잖아요. 다리미로 잘 펴서 그런 거예요.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「九浄メイド隊のクリーニング術を舐めてはいけません。洗濯は得意なのです！」"
translation = "「쿠죠 메이드대의 세탁 기술을 얕보지 마세요. 세탁은 특기라고요!」"

[[dialogue]]
speaker = "unk"
original = "でも、値札付いてるけど……"
translation = "근데 가격표 붙어있는데……"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……ち、違うんです。それはですね、実は家に帰ってからちょっとした事故があって、Ｔシャツを破いてしまい……」"
translation = "「……아, 아니에요. 그건 말이죠, 사실 집에 가서 좀 사고가 있어서 티셔츠를 찢어버리는 바람에……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それで……新品でお詫びしようとしたわけで。偽ったのは、あくまで変な誤解を避ける為というか……だからその……」"
translation = "「그래서…… 새것으로 사죄하려고 한 거예요. 속인 건 어디까지나 이상한 오해를 피하기 위해서랄까…… 그러니까 그……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「──こ、これは決して、会長の匂いがするＴシャツが惜しかったとかそんなんじゃありませんからっ！！！」"
translation = "「──이, 이건 결코 회장님 냄새가 나는 티셔츠가 아까웠다거나 그런 게 아니니까요!!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「……あ」"
translation = "「……아.」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こ……こやあああああぁぁぁ──っ！！！」"
translation = "「코…… 코야아아아아아──!!!」"

[[dialogue]]
speaker = "unk"
original = "その場に１人残された俺は──"
translation = "그 자리에 혼자 남겨진 나는──"

[[dialogue]]
speaker = "unk"
original = "今度からヨミと、どんな顔して会えばいいんだ……"
translation = "이제부터 요미를 어떤 얼굴로 봐야 하나……"

[[dialogue]]
speaker = "unk"
original = "こんなことで急にヨミの異性を感じてしまい、熱くなった頬を両手で押さえるのだった。"
translation = "이런 일로 갑자기 요미의 이성을 느껴버려 뜨거워진 뺨을 양손으로 누르는 것이었다."

