[[dialogue]]
speaker = "イレーナ"
original = "「っしゃあ！\u3000やったわね、シャロン！」"
translation = "「쌰아! 해냈네, 샤론!」"

[[dialogue]]
speaker = "シャロン"
original = "「はい！\u3000イレーナさまのご助力のおかげです！」"
translation = "「네! 이레이나 님의 도움 덕분입니다!」"

[[dialogue]]
speaker = "unk"
original = "これで一件落着だな"
translation = "이걸로 일단락됐군"

[[dialogue]]
speaker = "シャロン"
original = "「いいえ、まだですっ！\u3000本番は聖誕祭なのですからっ！\u3000準備の続きをいたしましょう、イレーナさま！」"
translation = "「아니요, 아직입니다! 본방은 성탄제니까요! 준비를 계속하죠, 이레이나 님!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あー……それはもうシャロンに任せたわ」"
translation = "「아~…… 그건 이제 샤론한테 맡길게.」"

[[dialogue]]
speaker = "シャロン"
original = "「え？\u3000どういう意味でしょう……？」"
translation = "「에? 무슨 의미인가요……?」"

[[dialogue]]
speaker = "イレーナ"
original = "「今回のでちょっと懲りたっていうか……あたしは信仰心の欠片もないエセ聖女だもの。女神様の聖誕祭にそんなヤツが混じってても困るでしょ？」"
translation = "「이번 일로 좀 질렸다고나 할까…… 나는 신앙심이라고는 눈곱만큼도 없는 가짜 성녀인걸. 여신님의 성탄제에 그런 녀석이 섞여 있어도 곤란하잖아?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしの仕事はさっきのモンスター退治で終わり。このまま教皇庁にでも行って、神官を引退してくるわ」"
translation = "「내 일은 아까 몬스터 퇴치로 끝. 이대로 교황청에라도 가서 신관을 그만두고 올게.」"

[[dialogue]]
speaker = "シャロン"
original = "「な、なぜですっ。たとえ女神様を信じておられなくとも、イレーナさまは真の聖女様であらせられるではありませんかっ」"
translation = "「어, 어째서인가요. 설령 여신님을 믿지 않으셔도 이레이나 님은 진정한 성녀님이시지 않습니까.」"

[[dialogue]]
speaker = "イレーナ"
original = "「いやそれは聖女としてダメでしょ普通に」"
translation = "「아니, 그건 성녀로서 안 되는 거지, 보통.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしなりのけじめよ、けじめ。ついカっとなってシャロンに酷いこと言っちゃったし……」"
translation = "「나름대로의 매듭이야, 매듭. 홧김에 샤론에게 심한 말도 해버렸고……」"

[[dialogue]]
speaker = "シャロン"
original = "「え……？\u3000今、なんと……」"
translation = "「에……? 지금, 뭐라고……」"

[[dialogue]]
speaker = "イレーナ"
original = "「とにかく決めたの！\u3000あたしは神官をやめて普通の女の子に戻る！\u3000じゃあね！」"
translation = "「어쨌든 결정했어! 나는 신관 그만두고 평범한 여자아이로 돌아갈 거야! 그럼 안녕!」"

[[dialogue]]
speaker = "シャロン"
original = "「あ……イレーナさま……」"
translation = "「아…… 이레이나 님……」"

[[dialogue]]
speaker = "unk"
original = "クリスマスパーティー当日──"
translation = "크리스마스 파티 당일──"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ～……クリスマス前だから忙しいって、教皇庁のやつら、どいつもこいつも取り合ってくれなかったわ……」"
translation = "「하아~…… 크리스마스 전이라 바쁘다면서, 교황청 녀석들, 하나같이 상대도 안 해주더라고……」"

[[dialogue]]
speaker = "イレーナ"
original = "「結局まだ神官やめられてない……ブラック企業を抜け出せない社会人ってこんな感じなのかしら……」"
translation = "「결국 아직 신관 못 그만뒀어…… 블랙 기업을 빠져나오지 못하는 사회인이 이런 느낌인 걸까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ていうか、あたしも律儀に大聖堂なんて来なきゃいいのに……組織人の習性が抜けないわ」"
translation = "「그보다, 나도 참 성실하게 대성당까지 올 필요는 없는데…… 조직인의 습성이 안 빠지네.」"

[[dialogue]]
speaker = "イレーナ"
original = "「でもこれだけはシャロンに渡さなきゃ……」"
translation = "「그래도 이것만은 샤론에게 전해줘야 하니까……」"

[[dialogue]]
speaker = "unk"
original = "イレーナ！\u3000モンスターが出た！"
translation = "이레이나! 몬스터가 나타났어!"

[[dialogue]]
speaker = "イレーナ"
original = "「は！？\u3000何よいきなり……はいはい、行けばいいんでしょっ」"
translation = "「하!? 뭐야 갑자기…… 알았어 알았어, 가면 되잖아.」"

[[dialogue]]
speaker = "イレーナ"
original = "「こんなところにモンスターが……？\u3000ＤＩＳＣにも反応がないし何かの間違いじゃ──」"
translation = "「이런 곳에 몬스터가……? DISC에도 반응이 없고 뭔가 착각한 거 아니──」"

[[dialogue]]
speaker = "シャロン"
original = "「メリークリスマス！」"
translation = "「메리 크리스마스!」"

[[dialogue]]
speaker = "イレーナ"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker = "サラン"
original = "「メリ～クリスマ～ス♪」"
translation = "「메리~ 크리스마스~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「メリークリスマス、です」"
translation = "「메리 크리스마스, 입니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「え……？\u3000これ、は……？」"
translation = "「에……? 이건, 뭐야……?」"

[[dialogue]]
speaker = "子どもＡ"
original = "「わーいっ、サプライズ大成功～！」"
translation = "「와아, 서프라이즈 대성공~!」"

[[dialogue]]
speaker = "子どもＢ"
original = "「えへへ、聖女さまの驚いた顔はじめて見た～！」"
translation = "「에헤헤, 성녀님이 놀란 얼굴 처음 봤어~!」"

[[dialogue]]
speaker = "蛍火"
original = "「先日は面目ありません。大事の際に留守にしてしまって……」"
translation = "「요전엔 면목 없습니다. 중요한 때에 자리를 비워버려서……」"

[[dialogue]]
speaker = "サラン"
original = "「でもでも、その分みんなでいろいろがんばったんだ～♪」"
translation = "「그래도 그래도, 그만큼 다 같이 열심히 노력했다구~♪」"

[[dialogue]]
speaker = "イレーナ"
original = "「どういうこと……？」"
translation = "「무슨 소리야……?」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ、こうでもしないときっとイレーナさまは来ないと、会長さまが仰ったのです。うまくいったようですね」"
translation = "「후후, 이렇게라도 하지 않으면 분명 이레이나 님은 오지 않을 거라고 회장님이 말씀하셨거든요. 잘된 모양이네요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「何よ……。やっぱりモンスター騒ぎはウソってこと？\u3000一体どうしてこんなことを……」"
translation = "「뭐야……. 역시 몬스터 소동은 거짓말이란 거야? 도대체 왜 이런 짓을……」"

[[dialogue]]
speaker = "シャロン"
original = "「そんなの──決まっているではありませんか」"
translation = "「그거야── 정해져 있지 않습니까.」"

[[dialogue]]
speaker = "子どもＡ"
original = "「ありがとう、聖女さま！\u3000わたしたちのこと、たすけてくれて！」"
translation = "「고마워요, 성녀님! 우리를 구해주셔서!」"

[[dialogue]]
speaker = "子どもＢ"
original = "「蛍火さんやサランさんに教わりながらね、みんなでお料理やお菓子たくさんつくったの～！」"
translation = "「케이카 씨랑 사란 씨에게 배우면서, 다 같이 요리랑 과자 많이 만들었어~!」"

[[dialogue]]
speaker = "子どもＣ"
original = "「はやくたべてたべて～！\u3000こころをこめてつくったから～！」"
translation = "「빨리 먹어봐 먹어봐~! 정성을 담아서 만들었으니까~!」"

[[dialogue]]
speaker = "イレーナ"
original = "「この前助けた子たち……？\u3000わわっ、押さないでくださいっ。どうして私ばっかり……！」"
translation = "「저번에 구했던 애들이……? 와와, 밀지 마세요. 왜 나한테만 그래……!」"

[[dialogue]]
speaker = "シャロン"
original = "「皆イレーナさまと聖誕祭を楽しみたいのです。イレーナさまに感謝しているのですよ」"
translation = "「모두 이레이나 님과 성탄제를 즐기고 싶은 거예요. 이레이나 님께 감사하고 있답니다.」"

[[dialogue]]
speaker = "シャロン"
original = "「たとえイレーナさまがご自身のことを偽りの聖女だと思われていても……こうして皆に愛と感謝を捧げられるだけのことを、イレーナさまは日々なされておられるのです」"
translation = "「설령 이레이나 님이 스스로를 가짜 성녀라고 생각하셔도…… 이렇게 모두에게 사랑과 감사를 받을 만한 일을 이레이나 님은 매일 하고 계신 거예요.」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまの善き行いが、今こうしてイレーナさまに返ってきているのです」"
translation = "「이레이나 님의 선한 행동이 지금 이렇게 이레이나 님에게 돌아오고 있는 거예요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ……ったくもう。だからそれが面倒だって言ってんでしょうに……。そういうのが積み重なって聖女にさせられたんだから……」"
translation = "「하아…… 진짜. 그러니까 그런 게 귀찮다고 말했잖아……. 그런 게 쌓이고 쌓여서 성녀가 된 거니까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「でも……まぁ。悪い気はしないけど」"
translation = "「그래도…… 뭐. 나쁜 기분은 아니지만.」"

[[dialogue]]
speaker = "unk"
original = "相変わらず素直じゃないな……"
translation = "여전히 솔직하지 못하네……"

[[dialogue]]
speaker = "イレーナ"
original = "「……あぁん？\u3000何か言ったかしら？」"
translation = "「……아앙? 뭐라고 했어?」"

[[dialogue]]
speaker = "unk"
original = "なんでもありません！"
translation = "아무것도 아닙니다!"

[[dialogue]]
speaker = "子どもＡ"
original = "「こそこそお話してないで早くお料理たべよ～！\u3000お腹すいたよ～」"
translation = "「쑥덕쑥덕 얘기하지 말고 빨리 요리 먹자~! 배고파요~」"

[[dialogue]]
speaker = "子どもＢ"
original = "「聖女さま～、わたし、ケーキたべたーい。はやく切り分けて～」"
translation = "「성녀님~, 나, 케이크 먹고 싶어. 빨리 잘라줘~」"

[[dialogue]]
speaker = "イレーナ"
original = "「はいはい。その前に皆さん、手を洗いましょうね。それと先程のような悪戯はほどほどにしないとブラックサンタにお仕置きされてしまいますよ」"
translation = "「네 네. 그전에 여러분, 손을 씻고 오세요. 그리고 아까 같은 장난은 적당히 하지 않으면 블랙 산타에게 벌을 받을 거예요.」"

[[dialogue]]
speaker = "子どもＣ"
original = "「は～い！」"
translation = "「네~!!」"

[[dialogue]]
speaker = "イレーナ"
original = "「では私も、パーティーにふさわしい装いに着替えましょうか」"
translation = "「그럼 나도 파티에 어울리는 차림으로 갈아입어 볼까.」"

[[dialogue]]
speaker = "イレーナ"
original = "「クリスマスといえばサンタクロースですからね。今日のために用意した装いなんですから披露しませんと」"
translation = "「크리스마스라고 하면 산타클로스니까. 오늘을 위해 준비한 차림이니까 보여줘야지.」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ。私たちはプレゼントを取りに行きましょうか。お手伝いいただけますよね、会長さま？」"
translation = "「후후. 저희는 선물을 가지러 갈까요. 도와주실 거죠, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "もちろん！"
translation = "물론이지!"

