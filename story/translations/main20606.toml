[[dialogue]]
speaker = "unk"
original = "第６話,ヒーロー見参,B"
translation = "제6화, 히어로 등장, B"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ノヴァセイクリッドアロー！」"
translation = "「노바 세이클리드 애로우!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが光球を放つと同時、ヴィーナスも光の矢を撃ち出した。"
translation = "루비네가 광구를 쏘는 것과 동시에, 비너스도 빛의 화살을 쏘아 올렸다."

[[dialogue]]
speaker = "unk"
original = "三度ぶつかる光と光。"
translation = "세 번째로 부딪히는 빛과 빛."

[[dialogue]]
speaker = "unk"
original = "だが今度は──"
translation = "하지만 이번에는──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ッ──！？」"
translation = "「윽──!?」"

[[dialogue]]
speaker = "unk"
original = "光の矢が光球を貫き、ルヴィネの顔を掠めた。"
translation = "빛의 화살이 광구를 꿰뚫고, 루비네의 얼굴을 스쳤다."

[[dialogue]]
speaker = "unk"
original = "横を通り過ぎた光条はそのまま勢いよく彼方へと飛んでいく。"
translation = "옆을 지나간 광조는 그대로 기세 좋게 저편으로 날아간다."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「これがノヴァフォームよ！\u3000いつまでもやられっぱなしじゃないんだから！」"
translation = "「이것이 노바 폼이야! 언제까지고 당하고만 있지는 않을 거니까!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……なるほど、星力の爆発的な上昇を感じるわ。見掛け倒しではないようね」"
translation = "「……과연, 성력의 폭발적인 상승이 느껴지네요. 허세는 아닌 모양이야.」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「当然よ、クロトがくれた力なんだもの！\u3000それに強力なのはママのお墨付きよ！」"
translation = "「당연하지, 쿠로토가 준 힘인걸! 게다가 강력한 건 엄마가 보증했다고!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でもそれだけで逆転したつもり？」"
translation = "「하지만 그것만으로 역전했다고 생각하나요?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが光弾を撃とうと、ヴィーナスに掌を向ける。"
translation = "루비네가 광탄을 쏘려고 비너스에게 손바닥을 향한다."

[[dialogue]]
speaker = "unk"
original = "しかしヴィーナスの姿はもう消えていた。"
translation = "하지만 비너스의 모습은 이미 사라져 있었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「わ──っととと。ちょっと勢い付けすぎたわね」"
translation = "「와── 앗차차. 조금 너무 기세를 올렸나 보네.」"

[[dialogue]]
speaker = "unk"
original = "そして次の瞬間、ルヴィネの背後に現れる。"
translation = "그리고 다음 순간, 루비네의 등 뒤에 나타난다."

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームはスピードも通常フォームの比ではなく、瞬間移動のごとき速度でルヴィネを圧倒していた。"
translation = "노바 폼은 스피드도 통상 폼과는 비교도 되지 않아, 순간이동과 같은 속도로 루비네를 압도하고 있었다."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ふふんっ、絶好調♪\u3000今までで一番調子がいいわ♪\u3000ドンドンいくわよー！」"
translation = "「후훗, 절호조♪ 지금까지 중 가장 상태가 좋아♪ 팍팍 가겠어─!」"

[[dialogue]]
speaker = "unk"
original = "光が嵐のようにルヴィネを襲う。"
translation = "빛이 폭풍처럼 루비네를 덮친다."

[[dialogue]]
speaker = "unk"
original = "さっきの連射がマシンガンなら、今のはさながら大砲。一撃一撃が今までの最高出力を上回っている。"
translation = "방금 전의 연사가 머신건이라면, 지금은 마치 대포. 한 발 한 발이 지금까지의 최고 출력을 상회하고 있다."

[[dialogue]]
speaker = "unk"
original = "それどころか連射速度まで上昇し、閃光の砲撃が怒涛のように押し寄せる。"
translation = "그뿐만 아니라 연사 속도까지 상승하여, 섬광의 포격이 노도와 같이 밀려온다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「ッ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ようやく澄まし顔が崩れたわね。でもまだまだこんなもんじゃないわよ！」"
translation = "「드디어 평온한 얼굴이 무너졌네. 하지만 아직 이 정도가 아니라고!」"

[[dialogue]]
speaker = "unk"
original = "アステラを一撃で吹き飛ばすような砲撃の嵐。"
translation = "아스테라를 일격에 날려버릴 듯한 포격의 폭풍."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは鬱憤を晴らすように猛攻を仕掛け、一撃ごとにルヴィネが押され、ジリジリと後ろに下がっていく。"
translation = "비너스는 울분을 풀듯이 맹공을 퍼붓고, 일격마다 루비네가 밀려나며 야금야금 뒤로 물러간다."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「私がどうしてノヴァフォームに覚醒できなかったのか、ようやく理由がわかったわ」"
translation = "「내가 왜 노바 폼으로 각성하지 못했었는지, 드디어 이유를 알았어.」"

[[dialogue]]
speaker = "クロト"
original = "「理由……？」"
translation = "「이유……?」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「マトイたちを見てて、私に足りないものがあるんじゃないかと思ってたけど、そうじゃなかった」"
translation = "「마토이 일행을 보면서, 나에게 부족한 게 있는 게 아닐까 생각했지만, 그게 아니었어.」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「力を出し過ぎると私自身が危ないから、ママがセーブしてくれてたってわけ。でもそのリミッターは今外してもらったわ！」"
translation = "「힘을 너무 내면 나 자신이 위험하니까, 엄마가 세이브해주고 있었던 거야. 하지만 그 리미터는 지금 풀어달라고 했어!」"

[[dialogue]]
speaker = "unk"
original = "なるほど、ヴィーナスにアルケインコードが使えないと感じていた理由はそれか。"
translation = "과연, 비너스에게 아르케인 코드를 사용할 수 없다고 느꼈던 이유는 그것인가."

[[dialogue]]
speaker = "unk"
original = "女神からの封印となれば、魔王の秘術を拒絶するのも無理はない。"
translation = "여신으로부터의 봉인이라면, 마왕의 비술을 거절하는 것도 무리는 아니다."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「それじゃフルパワーいくわよ！\u3000ノヴァゴッデス──」"
translation = "「그럼 풀 파워로 간다! 노바 가디스──」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ビィーーーーームッ！！！」"
translation = "「비이이이이이임!!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "巨大な光の塊がルヴィネを襲う。"
translation = "거대한 빛의 덩어리가 루비네를 덮친다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは不可視の障壁を張るが、ヴィーナスの一撃はそれすら打ち砕き、初めて攻撃を届かせた。"
translation = "루비네는 불가시의 장벽을 치지만, 비너스의 일격은 그것조차 박살 내며 처음으로 공격을 도달시켰다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「くぅぅっ……！」"
translation = "「크으윽……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「はぁ、はぁ……想像以上の破壊力ね……」"
translation = "「하아, 하아…… 상상 이상의 파괴력이네요……」"

[[dialogue]]
speaker = "unk"
original = "顔を歪めて光の向こうから現れるルヴィネ。"
translation = "얼굴을 찡그리며 빛 너머에서 나타나는 루비네."

[[dialogue]]
speaker = "unk"
original = "先ほどまで汚れひとつなかったマントは、ところどころが焼け焦げていた。"
translation = "조금 전까지 먼지 하나 없던 망토는 여기저기가 타버려 있었다."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「今のでよくそれで済んだわね。私たちを見下ろすのをやめて、いい加減変身したらどうなの？」"
translation = "「방금 걸로 잘도 그 정도로 끝났네. 우리를 내려다보는 건 그만두고, 이제 슬슬 변신하는 게 어때?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そうね。これ以上戦闘を続けるなら、その必要がありそうだわ」"
translation = "「그렇네요. 이 이상 전투를 계속한다면, 그럴 필요가 있겠어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でもそれは今じゃないわ。万全を期すとしましょう」"
translation = "「하지만 그건 지금이 아니에요. 만전을 기하기로 하죠.」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「あれだけ大口叩いてたのに逃げるの？」"
translation = "「그렇게 큰소리쳐놓고 도망치는 거야?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。ここは退くわ」"
translation = "「네. 여기서는 물러가겠어요.」"

[[dialogue]]
speaker = "クロト"
original = "「その前にもう一度聞かせてくれ。アルタイルと共にリクリエと戦う道は本当にあり得ないのか」"
translation = "「그전에 다시 한번 묻게 해줘. 알타이르와 함께 리크리에와 싸울 길은 정말로 없는 건가.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「くどいわ。平行世界は滅ぼし合う運命にある」"
translation = "「끈질기네요. 평행세계는 서로 멸망시켜야 할 운명에 있어.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「次はあなたたちを消す。覚悟しておいて」"
translation = "「다음엔 당신들을 지우겠어. 각오해둬요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──次があればの話だけど」"
translation = "「──다음이 있다면의 이야기지만.」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「え──」"
translation = "「에──」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルル……！」"
translation = "「부르르……!」"

[[dialogue]]
speaker = "クロト"
original = "「極星従騎……！」"
translation = "「극성종기……!」"

[[dialogue]]
speaker = "unk"
original = "いつの間にか極星従騎が俺たちを取り囲んでいた。"
translation = "어느샌가 극성종기가 우리를 포위하고 있었다."

[[dialogue]]
speaker = "unk"
original = "おそらくヴィーナスと戦っている間にルヴィネが呼び寄せたのだろう。"
translation = "아마 비너스와 싸우는 동안 루비네가 불러들인 것이리라."

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ふん、そんなの私が全部ぶっ飛ばして──」"
translation = "「흥, 그런 건 내가 전부 날려버ㄹ──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「きゃぁっ！？」"
translation = "「꺄앗!?」"

[[dialogue]]
speaker = "unk"
original = "突如ノヴァフォームが解除され、空を飛ぶ力を失って落下するヴィーナス。"
translation = "갑자기 노바 폼이 해제되어, 하늘을 나는 힘을 잃고 낙하하는 비너스."

[[dialogue]]
speaker = "unk"
original = "痛む体に鞭打って、ヴィーナスを受け止める──"
translation = "아픈 몸에 채찍질하며, 비너스를 받아낸다──"

[[dialogue]]
speaker = "クロト"
original = "「ぐ……っ」"
translation = "「구…… 윽」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト、大丈夫！？」"
translation = "「쿠로토, 괜찮아!?」"

[[dialogue]]
speaker = "クロト"
original = "「あ、ああ、大丈夫だ……」"
translation = "「아, 아아, 괜찮아……」"

[[dialogue]]
speaker = "unk"
original = "受け止めようと思ったが体が動かず、下敷きになってしまった。"
translation = "받아내려 했지만 몸이 움직이지 않아, 깔리고 말았다."

[[dialogue]]
speaker = "unk"
original = "でもヴィーナスが地面と激突しなかったから、まぁいいだろう……"
translation = "하지만 비너스가 지면과 격돌하지 않았으니, 뭐 됐겠지……"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスこそ大丈夫か？」"
translation = "「비너스야말로 괜찮아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うん、大丈夫だけど……ごめん。星力がもう……ちょっと飛ばし過ぎたかも……」"
translation = "「응, 괜찮지만…… 미안. 성력이 벌써…… 조금 너무 쏟아부었나 봐……」"

[[dialogue]]
speaker = "unk"
original = "星力を消耗しただけでなく、先ほどと打って変わって覇気がない。見るからに顔色も青くなっていた。"
translation = "성력을 소모했을 뿐만 아니라, 조금 전과는 딴판으로 패기가 없다. 보기에 안색도 파랗게 질려 있었다."

[[dialogue]]
speaker = "クロト"
original = "（もしかして、これがノヴァフォームの反動か……？）"
translation = "（혹시 이게 노바 폼의 반동인가……?）"

[[dialogue]]
speaker = "unk"
original = "おそらくヴィーナスのノヴァフォームは、マトイたちとは違う。"
translation = "아마 비너스의 노바 폼은 마토이 일행과는 다르다."

[[dialogue]]
speaker = "unk"
original = "より強力であるがゆえに、その代償があるようだ。"
translation = "더욱 강력한 만큼, 그 대가가 있는 모양이다."

[[dialogue]]
speaker = "ホルン"
original = "「クルルルッ」"
translation = "「쿠르르르」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ヒヒィン……！」"
translation = "「히히잉……!」"

[[dialogue]]
speaker = "unk"
original = "極星従騎が１体、また１体と飛来してくる。"
translation = "극성종기가 한 마리, 또 한 마리 날아온다."

[[dialogue]]
speaker = "unk"
original = "俺は情けないことにリクリエの力を使った反動で動けず、ヴィーナスは星力をほぼ使い果たしてしまった。"
translation = "나는 한심하게도 리크리에의 힘을 쓴 반동으로 움직이지 못하고, 비너스는 성력을 거의 다 써버렸다."

[[dialogue]]
speaker = "クロト"
original = "（今度こそ、万事休すか──）"
translation = "（이번에야말로 진퇴양난인가──）"

[[dialogue]]
speaker = "？？？"
original = "「あたしの出番だな！」"
translation = "「내 차례로군!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "声が届くと同時、星のように閃く刃が極星従騎を切り裂いた。"
translation = "목소리가 닿음과 동시에, 별처럼 번뜩이는 칼날이 극성종기를 베어 넘겼다."

[[dialogue]]
speaker = "unk"
original = "絶体絶命の俺たちの前に現れたのは──"
translation = "절체절명의 우리 앞에 나타난 것은──"

[[dialogue]]
speaker = "？？？"
original = "「ヒーローはピンチにやってくる──ってな！」"
translation = "「히어로는 위기일 때 나타나는 법이지──라고!」"

[[dialogue]]
speaker = "unk"
original = "二本一対の剣を携えた、黒いスーツの女性。"
translation = "두 자루 한 쌍의 검을 든, 검은 슈트의 여성."

[[dialogue]]
speaker = "unk"
original = "極星従騎から助けてくれたみたいで、どうやら彼女は俺たちの味方らしい。"
translation = "극성종기로부터 구해준 것 같으니, 아무래도 그녀는 우리의 아군인 듯하다."

[[dialogue]]
speaker = "unk"
original = "だけどその面影には見覚えがある気がして……"
translation = "하지만 그 모습에는 낯이 익은 기분이 들어서……"

[[dialogue]]
speaker = "？？？"
original = "「よう、久しぶりだな。そっちは前に見た時とそんなに変わらないみたいだが」"
translation = "「여어, 오랜만이네. 그쪽은 전에 봤을 때랑 그렇게 변하지 않은 것 같다만」"

[[dialogue]]
speaker = "クロト"
original = "「あなたは……？」"
translation = "「당신은……?」"

[[dialogue]]
speaker = "？？？"
original = "「ん？\u3000わからないか。まぁ随分成長したから無理もない」"
translation = "「음? 모르겠나. 뭐, 상당히 성장했으니 무리도 아니지」"

[[dialogue]]
speaker = "？？？"
original = "「こう言えばわかるだろう？\u3000闇夜に紛れ彗星のごとく敵を討つ！\u3000──ってな」"
translation = "「이렇게 말하면 알겠지? 밤안개에 섞여 혜성처럼 적을 친다! ──라고 말이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まさか──」"
translation = "「설마──」"

[[dialogue]]
speaker = "クロト"
original = "「アポロ！？」"
translation = "「아폴로!?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ああ！\u3000流星ライダーアポロ、ここに見参だ！！」"
translation = "「그래! 유성 라이더 아폴로, 여기 등장이다!!」"

[[dialogue]]
speaker = "unk"
original = "アポロと名乗った女性の姿に、俺もヴィーナスも目を丸くする。"
translation = "아폴로라고 자칭한 여성의 모습에, 나도 비너스도 눈을 동그랗게 뜬다."

[[dialogue]]
speaker = "unk"
original = "そうだ、デネブに帰還したアポロはこの世界にいるはずだ。"
translation = "맞다, 데네브로 귀환한 아폴로는 이 세계에 있을 터다."

[[dialogue]]
speaker = "unk"
original = "だけどこうして成長した姿を見ることになるとは思っていなかった。"
translation = "하지만 이렇게 성장한 모습을 보게 될 줄은 생각지도 못했다."

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ここでルヴィネと雌雄を決するつもりはない。一旦退くぞ」"
translation = "「여기서 루비네와 승부를 낼 생각은 없다. 일단 물러나자」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「またあなたなの。そう簡単に逃がすと思う？」"
translation = "「또 당신인가요. 그렇게 쉽게 놓쳐줄 것 같아?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ああ、通させてもらう！」"
translation = "「아아, 지나가도록 하마!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「スターダスト──ストーム！！」"
translation = "「스타더스트── 스톰!!」"

[[dialogue]]
speaker = "unk"
original = "十字に振るった剣の軌跡から、無数の流星が降り注ぐ。"
translation = "십자로 휘두른 검의 궤적에서 무수한 유성이 쏟아진다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「く──！」"
translation = "「큭──!」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長、ヴィーナスさん、今のうちに」"
translation = "「히노미야 회장님, 비너스 씨, 지금이에요」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナ！？\u3000無事だったのか！？」"
translation = "「피오나!? 무사했던 거야!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私もいるよー」"
translation = "「나도 있다구─」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ナターシャも！？」"
translation = "「나타샤도!?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「よし、行くぞ！」"
translation = "「좋아, 가자!」"

[[dialogue]]
speaker = "unk"
original = "フィオナが俺を、ナターシャがヴィーナスを抱える。"
translation = "피오나가 나를, 나타샤가 비너스를 부축한다."

[[dialogue]]
speaker = "unk"
original = "流星の雨がルヴィネの目を<ruby>晦<rt>くら</rt></ruby>ませている間に、俺たちは戦場を後にした。"
translation = "유성의 비가 루비네의 눈을 어지럽히는 사이에, 우리들은 전장을 뒤로했다."

