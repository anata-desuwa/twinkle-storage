[[dialogue]]
speaker = "unk"
original = "第９話,和やかホリデー,B"
translation = "제9화, 화기애애한 휴일, B"

[[dialogue]]
speaker = "unk"
original = "──と、いうわけで……。"
translation = "── 그리하여…….」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス、釣り堀に行こう」"
translation = "「비너스, 낚시터에 가자」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………何よ、藪からステッキに」"
translation = "「…………뭐야, 갑자기」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いい穴場を知ってるんだ。郊外まで出る必要があるんだけど──イワナとかヤマメもわんさか釣れるんだ。楽しいぞ」"
translation = "「좋은 명당을 알고 있어. 교외까지 나갈 필요가 있지만── 곤들매기나 산천어도 잔뜩 낚을 수 있어. 재미있을 거다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んー、今はそんな気分じゃないっていうか……なんで釣り？」"
translation = "「음ー, 지금은 그런 기분이 아니랄까…… 왜 낚시?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「たまには息抜きもいいかと思ってさ。ダメか？」"
translation = "「가끔은 바람 쐬는 것도 좋을까 해서. 안 돼?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ダメじゃないけど……まだ、アポロの件が解決してないじゃない。遊ぶ気分になんてなれないわ！」"
translation = "「안 되는 건 아니지만…… 아직, 아폴로 건이 해결되지 않았잖아. 놀 기분 따위 들지 않아!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それについては同感──だけど。平和な日々ってやつは、ちゃんと享受しないと意味がない。あと藪からステッキって何？」"
translation = "「그것에 대해서는 동감── 하지만. 평화로운 나날이라는 건, 제대로 누리지 않으면 의미가 없어. 그리고 갑자기는 뭐야?」"

[[dialogue]]
speaker = "unk"
original = "俺は、みんなからも諭されたように適度な息抜きの重要さを説いた。"
translation = "나는, 모두에게서도 타이름을 받은 것처럼 적절한 휴식의 중요성을 설파했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「釣り堀の気分じゃないならサバゲーでもいいぞ。後は家電屋巡りとか……」"
translation = "「낚시터 기분이 아니라면 서바이벌 게임도 괜찮아. 다음은 가전제품 가게 순회라든가……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あのねえ。私はレディよ！\u3000こういう時はフツー、もっとお洒落なとこに誘うもんでしょ」"
translation = "「저기 말이야. 나는 레이디야! 이럴 때는 보통, 좀 더 세련된 곳에 데이트 신청하는 거잖아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「む……そうなのか。難しいな」"
translation = "「음…… 그런가. 어렵네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよ。別に、釣り堀も楽しそーではあるけど」"
translation = "「맞아. 딱히, 낚시터도 재미있을 것 같긴 하지만」"

[[dialogue]]
speaker = "unk"
original = "今日、用意していた俺のレパートリーにそんなスポットはなかった。"
translation = "오늘, 준비했던 나의 레퍼토리에 그런 장소는 없었다."

[[dialogue]]
speaker = "unk"
original = "お洒落な釣り堀か……次に誘う時は探しておこう。"
translation = "세련된 낚시터인가…… 다음에 데이트 신청할 때는 찾아봐야겠다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はあ……まあいいわ。クロトが私のことを考えてくれてるのはわかったし」"
translation = "「하아…… 뭐 됐어. 쿠로토가 나를 생각해 주고 있다는 건 알았고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「最近、張り詰めてたのも確かだから──今日は私に付き合いなさい♪」"
translation = "「최근, 긴장하고 있었던 것도 확실하니까── 오늘은 나에게 맞춰♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。それでもいい」"
translation = "「아아. 그래도 괜찮아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──あ。つ、付き合うって、そっちの意味じゃないからね！？」"
translation = "「──아. 사, 사귄다는 거, 그쪽 의미 아니니까?!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫。男女の恋愛関係のことを指しているわけじゃないって言うんだな」"
translation = "「괜찮아. 남녀의 연애 관계를 말하는 것이 아니라고 말하는 거네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きっちり説明するなーーー！！」"
translation = "「제대로 설명하지 마ーーー!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふっふーん♪\u3000ショッピングなんて久しぶりね──最近は毎日出動だったし♪」"
translation = "「훗후웅♪ 쇼핑이라니 오랜만이네── 최근에는 매일 출동이었고♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺も今日くらいは羽を伸ばすかな」"
translation = "「아아. 나도 오늘 정도는 긴장을 풀까」"

[[dialogue]]
speaker = "unk"
original = "街にまでやってきた俺たち。"
translation = "거리에까지 찾아온 우리."

[[dialogue]]
speaker = "unk"
original = "俺の考えてきたプランは早くも崩れてしまったが、適当に２人でぶらつくことにした。"
translation = "내가 생각했던 계획은 벌써 무너져 버렸지만, 적당히 둘이서 돌아다니기로 했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ！\u3000あれ！\u3000あのバッグ欲しい！」"
translation = "「아! 저거! 저 가방 갖고 싶어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あのバケツみたいなやつか？\u3000欲しかったのか？」"
translation = "「저 양동이 같은 건가? 갖고 싶었어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううんビビッときただけ！\u3000いーいクロト、こういうのはフィーリングが肝心なのよ！」"
translation = "「아니 필이 왔을 뿐! 이ー이 쿠로토, 이런 건 느낌이 중요한 거야!」"

[[dialogue]]
speaker = "unk"
original = "次々とお店を巡っては服や小物をチェックしていくヴィーナス。"
translation = "연달아 가게를 돌며 옷이나 소품을 체크하는 비너스."

[[dialogue]]
speaker = "unk"
original = "その判断は異様に早く、本人の言う通り直感でアイテムを選び取っていた。"
translation = "그 판단은 이상할 정도로 빨랐고, 본인이 말한 대로 직감으로 아이템을 골라내고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さ、次はどっちへ行こうかしらね！\u3000クロトも気になるお店があったら突撃するのよ」"
translation = "「자, 다음은 어디로 갈까! 쿠로토도 신경 쓰이는 가게가 있으면 돌격하는 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。母さんに何か買っていこうかな」"
translation = "「아아. 엄마에게 뭐라도 사다 줄까」"

[[dialogue]]
speaker = "unk"
original = "計画性なんてなんのその──"
translation = "계획성 따위는 아무래도 좋아──"

[[dialogue]]
speaker = "unk"
original = "２人で自由に散策するこの時間には、久しく味わっていない開放感があった。"
translation = "둘이서 자유롭게 산책하는 이 시간에는, 오랫동안 맛보지 못했던 해방감이 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あむ……ん～、おいひい！\u3000やっぱり買い食いってなんか楽しくなるわよね！」"
translation = "「냠…… 음~, 마시써! 역시 길거리 음식은 왠지 즐거워진다니까!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うまいな。でも──肉まんでよかったのか？」"
translation = "「맛있네. 근데── 고기만두로 괜찮았어?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろん！\u3000そういう気分だったし、前から気になってたのよ」"
translation = "「물론이지! 그런 기분이었고, 전부터 신경 쓰였거든」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「レディならお洒落なところに──なんていうから、てっきりイタリアンとかの方がいいのかと」"
translation = "「레이디라면 세련된 곳에──라고 하길래, 당연히 이탈리안 같은 쪽이 좋을 줄 알았지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「気にしない気にしない♪\u3000もう忘れたわ、そんなこと♪」"
translation = "「신경 안 써 신경 안 써♪ 벌써 잊었어, 그런 거♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「自由だなあ……」"
translation = "「자유롭네……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（でも……こういうのは楽しいな。なんか）"
translation = "「(근데…… 이런 건 재미있네. 왠지)」"

[[dialogue]]
speaker = "unk"
original = "グイグイ彼女に引っ張られているだけの俺。"
translation = "힘껏 그녀에게 끌려다니기만 하는 나."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスを元気づけるつもりが、いつの間にかこちらが元気を与えられていることに気づいた。"
translation = "비너스를 기운 나게 해 줄 생각이었는데, 어느새 이쪽이 기운을 받고 있다는 것을 깨달았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（それに、ヴィーナスも今のほうが生き生きしてるし…………ん？）"
translation = "「(게다가, 비너스도 지금이 더 생기 있어 보이고………… 응?)」"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「うわあーーーーーん……！\u3000うえええぇぇぇぇーーーーーん…………！！」"
translation = "「으아아아아아앙……! 으에에에에에에엥…………!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら？\u3000何かしら、今の」"
translation = "「어머? 뭐지, 방금 건」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「向こうからみたいだな」"
translation = "「저쪽에서 나는 것 같네」"

[[dialogue]]
speaker = "unk"
original = "俺たちが繁華街をほっつき歩いていると、どこからか、泣きわめく子どもの声が聞こえた。"
translation = "우리가 번화가를 어슬렁거리고 있는데, 어디선가, 울부짖는 아이의 목소리가 들렸다."

[[dialogue]]
speaker = "unk"
original = "声のした方向に駆け寄っていくヴィーナスを追う。"
translation = "소리가 난 방향으로 달려가는 비너스를 쫓는다."

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「うええええぇぇぇん……風船なぐなっちゃった……うわあああああああん…………！！」"
translation = "「으에에에에에엥…… 풍선 잃어버려써…… 으아아아아아아앙…………!!」"

[[dialogue]]
speaker_original = "子の母親"
speaker_translation = "아이의 엄마"
original = "「もう──しっかり持っておかないから。こっちの黄色いので我慢しなさい」"
translation = "「정말── 제대로 잡고 있지 않으니까. 이쪽 노란 걸로 참아」"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「やだあ……！\u3000青いのじゃなきゃヤなんだあ～～！！」"
translation = "「싫어어……! 파란 거 아니면 싫단 마리야～～!!」"

[[dialogue]]
speaker = "unk"
original = "そこには泣いている子どもと母親らしき女性がいた。"
translation = "그곳에는 울고 있는 아이와 어머니로 보이는 여성이 있었다."

[[dialogue]]
speaker = "unk"
original = "母親のほうは、黄色い風船のひもを手に握っている。"
translation = "어머니 쪽은, 노란 풍선의 끈을 손에 쥐고 있다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お困りのようね。どーしたの？」"
translation = "「곤란한 것 같네. 무슨 일이야?」"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「風船……僕の、青い風船がぁ。風で、びゅーんって……飛んでっちゃったあ……！」"
translation = "「풍선…… 내, 파란 풍선이. 바람에, 슝 하고…… 날아가 버려써어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「風船を手放しちゃったのか」"
translation = "「풍선을 놓쳐 버렸구나」"

[[dialogue]]
speaker = "unk"
original = "どうやら持っていた風船をなくしてしまったらしい。"
translation = "아무래도 가지고 있던 풍선을 잃어버린 것 같다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よし、お兄さんに任せろ。取ってきてあげるよ」"
translation = "「좋아, 형아에게 맡겨. 가져다줄게」"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「ほんと？」"
translation = "「정말?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。こう見えて木登りは得意だからな──どこに引っかかってるんだ？」"
translation = "「아아. 이렇게 보여도 나무 타기는 특기니까── 어디에 걸려 있는데?」"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「木じゃないよ！\u3000お空に飛んでっちゃったんだよ！」"
translation = "「나무 아니야! 하늘로 날아가 버려써!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なに……？」"
translation = "「뭐라고……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ていうか、この付近に木なんてないわよ」"
translation = "「랄까, 이 근처에 나무 같은 건 없잖아」"

[[dialogue]]
speaker = "unk"
original = "高いところに引っかかってしまって取れない──というよくあるヤツかと思ったが、現実は過酷だった。"
translation = "높은 곳에 걸려버려서 꺼낼 수 없다──는 흔한 패턴이라고 생각했지만, 현실은 가혹했다."

[[dialogue]]
speaker = "unk"
original = "空を見上げてもそれらしき物体はどこにも視認できない。"
translation = "하늘을 올려다봐도 그럴싸한 물체는 어디에서도 확인할 수 없다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どっちに飛んでったの？\u3000あっち？\u3000こっち？」"
translation = "「어느 쪽으로 날아갔어? 저쪽? 이쪽?」"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「あっち！\u3000うんと向こう！」"
translation = "「저쪽! 저어어 멀리!」"

[[dialogue]]
speaker_original = "子の母親"
speaker_translation = "아이의 엄마"
original = "「もう──諦めなさい。お空に手が届くはずないんだから……」"
translation = "「이제── 포기하렴. 하늘에 손이 닿을 리 없잖아……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ＯＫ、あっちね。じゃ、そこでいい子にしてるのよ」"
translation = "「──오케이, 저쪽이네. 그럼, 거기서 얌전히 기다리고 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？\u3000ヴィーナス──」"
translation = "「!? 비너스──」"

[[dialogue]]
speaker = "unk"
original = "気づけばヴィーナスは変身していた。"
translation = "정신을 차려보니 비너스는 변신해 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、口を挟むまでもなく彼女は大空へと飛び立っていく！"
translation = "그리고, 끼어들 틈도 없이 그녀는 하늘로 날아오른다!"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「え──うわあ！\u3000お姉さんがお空に消えちゃった！」"
translation = "「에── 우와아! 누나가 하늘로 사라져 버려써!」"

[[dialogue]]
speaker_original = "子の母親"
speaker_translation = "아이의 엄마"
original = "「ま、まあ……！\u3000<ruby>星騎士<rt>スターナイト</rt></ruby>さんだったのね──」"
translation = "「어, 어머나……! 성기사셨군요──」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはそのまま少年が指さした方角へとぐいぐい伸びていった。"
translation = "비너스는 그대로 소년이 손가락으로 가리킨 방향으로 쭉쭉 뻗어나갔다."

[[dialogue]]
speaker = "unk"
original = "──そうして。"
translation = "──그렇게 해서."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はい♪\u3000今度はなくさないようにね！」"
translation = "「자아♪ 이번엔 잃어버리지 않도록 해!」"

[[dialogue]]
speaker_original = "泣いている子ども"
speaker_translation = "울고 있는 아이"
original = "「わあい！\u3000お姉さんありがとう！」"
translation = "「와아! 누나 고마워요!」"

[[dialogue]]
speaker_original = "子の母親"
speaker_translation = "아이의 엄마"
original = "「本当に取ってきていただけるなんて……なんとお礼を言っていいか」"
translation = "「정말로 가져다주실 줄이야…… 뭐라고 감사를 드려야 할지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふふ。これくらいで変身できるのも、平和の証よね♪」"
translation = "「후후후. 이 정도로 변신할 수 있는 것도, 평화의 증거지♪」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは本当に少年の飛ばした風船を捕まえて、この地上まで戻ってきた。"
translation = "비너스는 정말로 소년이 날려 보낸 풍선을 붙잡아, 이 지상까지 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "母親の方からさんざんお礼を言われてから、少年とも手を振って別れる。"
translation = "어머니 쪽으로부터 한참 동안 감사를 받은 후, 소년과도 손을 흔들며 헤어진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……驚いたよ。どうやって見つけたんだ？」"
translation = "「……놀랐어. 어떻게 찾은 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んー、勘かしら？\u3000あと風？\u3000これもフィーリングよ、フィーリング！」"
translation = "「음ー, 감일까? 그리고 바람? 이것도 필링이야, 필링!」"

[[dialogue]]
speaker = "unk"
original = "実にアバウトな回答だった。"
translation = "지극히 대략적인 답변이었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もう少しで雲に紛れちゃうとこだったから、危なかったわね！\u3000なんとか見つかって良かったわ」"
translation = "「조금만 더 늦었으면 구름에 섞여 버릴 뻔했으니, 위험했네! 어떻게든 찾아서 다행이야」"

[[dialogue]]
speaker = "unk"
original = "お兄さんに任せろと言っておきながら、役に立てなかった自分を悔いる。"
translation = "형아에게 맡기라고 말해 놓고, 도움이 되지 못한 자신을 후회한다."

[[dialogue]]
speaker = "unk"
original = "実際、変身する選択肢も頭には浮かんでいたが──有事というほどでもないので躊躇してしまった。"
translation = "실제로, 변신할 선택지도 머릿속에 떠올랐지만── 비상사태라고 할 정도는 아니었기에 주저하고 말았다."

[[dialogue]]
speaker = "unk"
original = "それに何より、風船の影も見えない大空に飛び出す勇気がなかったのかもしれない。"
translation = "게다가 무엇보다, 풍선의 그림자도 보이지 않는 하늘로 날아오를 용기가 없었을지도 모른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ヴィーナスはすごいな」"
translation = "「……비너스는 대단하네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000何が？」"
translation = "「? 뭐가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺なら間に合ってなかったかもしれない。あんなに早く決断できなかった」"
translation = "「나라면 늦었을지도 몰라. 그렇게 빨리 결단하지 못했을 거야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふうん？\u3000ま、褒めてくれるんならいいけど。そろそろ甘いものでも食べたいわね～？」"
translation = "「흐음? 뭐, 칭찬해 준다면 좋지만. 슬슬 단 거라도 먹고 싶네~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかったわかった。今の頑張りに免じて何か買ってあげるよ」"
translation = "「알았어 알았어. 지금의 노력에 면죄부를 줘서 뭐라도 사줄게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へへっ、そうこなくちゃね♪」"
translation = "「헤헷, 그렇게 나와야지♪」"

