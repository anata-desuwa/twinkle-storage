[[dialogue]]
speaker = "unk"
original = "第２話,キミの横顔を見ながら,P"
translation = "제2화, 너의 옆얼굴을 보면서, P"

[[dialogue]]
speaker = "unk"
original = "とある休日、ジュエリーが俺の家に遊びに来ていた。"
translation = "어느 휴일, 쥬얼리가 나의 집에 놀러 와 있었다."

[[dialogue]]
speaker = "unk"
original = "隣り合ってソファーに座り、家庭用ゲーム機のステージ攻略型アクションゲームを交互にプレイしていたのだが――"
translation = "나란히 소파에 앉아, 가정용 게임기의 스테이지 공략형 액션 게임을 교대로 플레이하고 있었는데――"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふむふむ……このステージはおそらく……こうすればギミックが解除できて……よし、次は――」"
translation = "「흠흠…… 이 스테이지는 아마도…… 이렇게 하면 기믹을 해제할 수 있고…… 좋아, 다음은――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「っと、おや？\u3000どうしたんだい、助手？\u3000私の顔をじっと見たりして」"
translation = "「앗, 이런? 왜 그러나, 조수? 내 얼굴을 빤히 쳐다보기도 하고」"

[[dialogue]]
speaker = "unk"
original = "日傘を持ったまま器用だなと思って"
translation = "양산을 든 채로 용케도 잘한다고 생각해서"

[[dialogue]]
speaker = "unk"
original = "ジュエリーは日傘を持ったままの手で、ゲームのコントローラーも同時に持ってプレイしていた。"
translation = "쥬얼리는 양산을 든 채인 손으로, 게임 컨트롤러도 동시에 잡고 플레이하고 있었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「なるほど、そういうことか」"
translation = "「과연, 그런 건가」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふふっ、常に日傘を差しているからね、これはもはや体の一部のようなものなんだ」"
translation = "「후훗, 항상 양산을 쓰고 있으니까 말이야, 이건 이제 신체의 일부 같은 것이야」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「逆に日傘を差してないと、プレイ感覚がおかしくなるくらいだよ」"
translation = "「오히려 양산을 쓰고 있지 않으면, 플레이 감각이 이상해질 정도라고」"

[[dialogue]]
speaker = "unk"
original = "その衣装も最近はよく着てるよね"
translation = "그 의상도 요즘 자주 입네"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ああ、この『エクリプスフォーム』は、助手との『愛の証』だからね」"
translation = "「아아, 이 『이클립스 폼』은, 조수와의 『사랑의 증표』니까 말이야」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「通常の戦闘服よりも星力の消耗は激しいが、それも慣れれば星力総量が上昇して、変身の持続時間が伸びて行くことがわかっている」"
translation = "「통상적인 전투복보다 성력의 소모는 격렬하지만, 그것도 익숙해지면 성력 총량이 상승해서, 변신의 지속 시간이 늘어난다는 것을 알고 있다」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「なればこそ、時間があれば着ていた方が一石二鳥というものだろう？\u3000それに――」"
translation = "「그렇기에, 시간이 있다면 입고 있는 편이 일석이조 아니겠나? 게다가――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「キミも可愛いと言ってくれるしね。ふふっ<emoji=heart04>」"
translation = "「키미도 귀엽다고 말해 주니까 말이야. 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから交代して、今度は俺がゲームをプレイしていたのだが――"
translation = "그러고 나서 교대하여, 이번에는 내가 게임을 플레이하고 있었는데――"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「じ～っ……」"
translation = "「지이~……」"

[[dialogue]]
speaker = "unk"
original = "今度は彼女が俺の横顔を見つめていることに気づく。"
translation = "이번에는 그녀가 나의 옆얼굴을 바라보고 있다는 것을 깨달았다."

[[dialogue]]
speaker = "unk"
original = "なんだろうと思いつつ、ゲームオーバーにならないようにプレイしていると……"
translation = "뭘까 생각하면서, 게임 오버가 되지 않도록 플레이하고 있자니……"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頬っぺたにキスされて、ドキッとした。"
translation = "뺨에 키스받고서, 두근거렸다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――あっ、しまった。ゲームオーバーになってしまったか」"
translation = "「――앗, 이런. 게임 오버가 되어 버렸나」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「すまない……キミの横顔を見ていたら、つい。その……愛おしい気持ちが湧いてきてしまってね……<emoji=heart04>」"
translation = "「미안하다…… 키미의 옆얼굴을 보고 있으니, 그만. 그…… 사랑스러운 마음이 솟구쳐 버려서 말이지……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゲーム……交代する？"
translation = "게임…… 교대할래?"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「いや、今の失敗は私のせいだろう。キミがそのまま続けてくれ」"
translation = "「아니, 방금 실패는 내 탓이겠지. 키미가 그대로 계속해 주게」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――といっても、すぐにゲームという気分でもなくなってしまったか……」"
translation = "「――라고 해도, 금방 게임을 할 기분도 아니게 되어 버렸나……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふふっ<emoji=heart04>\u3000恋人になってから、２人でいるとなかなかゲームに集中できなくなってしまったね」"
translation = "「후훗<emoji=heart04> 연인이 되고 나서, 둘이서 있으면 좀처럼 게임에 집중할 수 없게 되어 버렸네」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「うん？\u3000――ゲーム中はキス禁止にするかって？」"
translation = "「응? ――게임 중에는 키스 금지로 할까라고?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「そんな風に言われると……むしろ、したくなってきてしまうよ<emoji=heart04>」"
translation = "「그런 식으로 말하면…… 오히려, 하고 싶어져 버린다고<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「助手……<emoji=heart04>」"
translation = "「조수……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ん……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「음……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度は唇にキスをされる。"
translation = "이번에는 입술에 키스를 받는다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 쪽……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「んっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふぅ……<emoji=heart04>\u3000キスとはやはり、不思議だ……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 키스란 역시, 신기하군……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「唇を触れ合わせているだけでも、胸から一気に愛おしさが溢れてくる……<emoji=heart04>」"
translation = "「입술을 맞대고 있는 것만으로도, 가슴에서 단번에 사랑스러움이 넘쳐흘러……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めてキスした時も、こんな感じだったよね"
translation = "처음 키스했을 때도, 이런 느낌이었지"

[[dialogue]]
speaker = "unk"
original = "その時は、ジュエリーの部屋だった。"
translation = "그때는, 쥬얼리의 방이었다."

[[dialogue]]
speaker = "unk"
original = "今日みたいに２人でゲームをしていたら、彼女の方から唇を寄せてきて、キスをされたのだった。"
translation = "오늘처럼 둘이서 게임을 하고 있었더니, 그녀 쪽에서 입술을 가까이 대고, 키스를 해 온 것이었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「それは、助手のことが――」"
translation = "「그건, 조수를――」"

[[dialogue]]
speaker = "unk"
original = "彼女は顔を赤くして、１度呼吸をしてから……"
translation = "그녀는 얼굴을 붉히고서, 한 번 호흡을 하고 나서……"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「その……キミのことが好き過ぎるから、２人きりになると、抑えが効かなくなってしまうんだ……<emoji=heart04>」"
translation = "「그…… 키미를 너무 좋아하니까, 둘만 있게 되면, 억제가 되지 않게 되어 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「というか、今気づいたのだけれど……」"
translation = "「그보다, 지금 깨달은 것인데……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「キミの方からキスを迫られたことがないね……？」"
translation = "「키미 쪽에서 키스를 재촉받은 적이 없네……?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「もしかして、私ばっかり、その……発情していて、迷惑をかけているだろうか……？\u3000だとしたら……」"
translation = "「설마, 나만, 그…… 발정하고 있어서, 폐를 끼치고 있는 걸까……? 그렇다면……」"

[[dialogue]]
speaker = "unk"
original = "俺は慌てて首を横に振って否定した。"
translation = "나는 서둘러 고개를 가로저으며 부정했다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――甘えてくる私の姿が可愛いから、何度も見たくなって、つい受け身に回ってしまっている……？」"
translation = "「――어리광 부리는 나의 모습이 귀여우니까, 몇 번이고 보고 싶어져서, 그만 수동적으로 돌아가 버리고 있다……?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「そうだったのか……ふふふっ<emoji=heart04>\u3000そういえば、この間も私の素の反応が見たくてと言っていたね」"
translation = "「그랬던 건가…… 후후훗<emoji=heart04> 그러고 보니, 얼마 전에도 나의 본연의 반응이 보고 싶어서라고 말했었지」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「我ながら、付き合い始めても相変わらず、恋愛感情の機微には疎いな……」"
translation = "「나 원 참, 사귀기 시작해도 여전히, 연애 감정의 기미에는 어둡군……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「なら、せっかく気持ちがわかったのだし……もっと甘えてもいいかい？\u3000助手――」"
translation = "「그럼, 기껏 진심을 알게 되었으니…… 좀 더 어리광 부려도 될까? 조수――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「このまま……ハグ……してもいいだろうか……？」"
translation = "「이대로…… 허그…… 해도 괜찮을까……?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――じゃあ、失礼して……。ん……<emoji=heart04>」"
translation = "「――그럼, 실례해서……. 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふぅ……<emoji=heart04>\u3000キミの温もりと……心臓の鼓動が伝わってくる……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 키미의 온기와…… 심장의 고동이 전해져 와……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の方からも彼女の小さな体を抱き寄せて、耳元で告げる。"
translation = "나도 그녀의 작은 몸을 끌어안고서, 귓가에 속삭인다."

[[dialogue]]
speaker = "unk"
original = "愛しているよ、ジュエリー"
translation = "사랑해, 쥬얼리"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ん……<emoji=heart04>\u3000私も――」"
translation = "「응……<emoji=heart04> 나도――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「キミを……愛している。助手<emoji=heart04>」"
translation = "「키미를…… 사랑한다. 조수<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく抱き合ったままでいると――"
translation = "그러고 나서 한동안 끌어안은 채로 있자니――"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「助手……」"
translation = "「조수……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「すまない。抱き合っている内に、また……」"
translation = "「미안하다. 끌어안고 있는 사이에, 또……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「キスがしたくなってきてしまった……<emoji=heart04>\u3000いいだろうか……？」"
translation = "「키스가 하고 싶어져 버렸어……<emoji=heart04> 괜찮을까……?」"

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、彼女は顔を赤くしながらも嬉しそうに笑ってくれた。"
translation = "내가 고개를 끄덕이자, 그녀는 얼굴을 붉히면서도 기쁜 듯이 웃어 주었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「じゃあ……」"
translation = "「그럼……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ん……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからも俺たちは、甘いキスを繰り返し堪能するのだった――"
translation = "그 후로도 우리들은, 달콤한 키스를 반복하며 만끽하는 것이었다――"

