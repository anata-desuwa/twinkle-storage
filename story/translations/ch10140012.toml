[[dialogue]]
speaker = "unk"
original = "第２話,酒酔いトワイライト・前編,P"
translation = "제2화, 술 취한 트와일라잇·전편"

[[dialogue]]
speaker = "unk"
original = "ある日の夜、トレーニングでランニングに出掛けていた俺は、途中でトワ先生と遭遇した。"
translation = "어느 날 밤, 트레이닝으로 러닝을 나갔던 나는 도중에 토와 선생님과 조우했다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、会長くんらぁ～。こら～！\u3000こんな夜遅くに学生が出歩いていちゃいけないんだぞ～？」"
translation = "「앗, 회장군이다아~. 이놈~! 이런 밤늦게 학생이 돌아다니면 안 된다고~?」"

[[dialogue]]
speaker = "トワ先生"
original = "「先生怒っちゃうんだからぁ。ぷんぷん！」"
translation = "「선생님 화낼 거니까아. 뿡뿡!」"

[[dialogue]]
speaker = "unk"
original = "先生、ひょっとして酔ってます？"
translation = "선생님, 혹시 취하셨어요?"

[[dialogue]]
speaker = "トワ先生"
original = "「ん～？\u3000そうそう。今日、同級生の結婚式でね～。３次会まで行ったんだけど、先生ちょ～っと飲み過ぎちゃって」"
translation = "「응~? 그래그래. 오늘 동창 결혼식이라서 말이야~. 3차까지 갔는데 선생님 조~금 과음해버려서」"

[[dialogue]]
speaker = "トワ先生"
original = "「あー、大丈夫大丈夫、しばらく放っておけば治るから。へーきへーき♪」"
translation = "「아- 괜찮아 괜찮아, 잠시 내버려 두면 나으니까. 괜차나 괜차나♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「先生、アルコールに強い特異体質だから」"
translation = "「선생님, 알코올에 강한 특이체질이니까」"

[[dialogue]]
speaker = "トワ先生"
original = "「別に気持ち悪くもないし、むしろ気分が良いくらい♪\u3000だ～か～ら～、酔いが覚めるまで、会長くん遊んれぇ～♪」"
translation = "「딱히 기분 나쁘지도 않고 오히려 기분이 좋을 정도♪ 그~러~니~까~ 취기가 깰 때까지 회장군 놀아줘어~♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「──な～んてね♪\u3000って……え？\u3000いいの？」"
translation = "「──농담이야♪ 어…… 에? 괜찮아?」"

[[dialogue]]
speaker = "トワ先生"
original = "「へ、へぇ～……って、おーっとっとっと！？」"
translation = "「헤, 헤에~…… 어, 어이쿠쿠쿠!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「いったぁ～い。先生転んじゃったぁ……」"
translation = "「아파아~. 선생님 넘어져 버렸어……」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、うん。ちょっと尻もちついちゃったらけだから、ケガとかは大丈夫だよ～」"
translation = "「앗, 응. 그냥 엉덩방아 좀 찧은 것뿐이니까 부상은 괜찮아~」"

[[dialogue]]
speaker = "トワ先生"
original = "（会長くん、優しいな～♪\u3000こんな酔っ払いの相手までしてくれるなんてぇ～……会長くんならぁ、ちょっとだらしないところ見せちゃってもぉ、大丈夫かも？\u3000なんちゃって♪）"
translation = "（회장군, 상냥하네~♪ 이런 취객 상대까지 해주다니이~…… 회장군이라면 말이야아, 좀 칠칠치 못한 모습 보여줘도오, 괜찮을지도? 농담이야♪）"

[[dialogue]]
speaker = "トワ先生"
original = "「あ～ん、でも先生ちょっと、足元ふらふらして歩くのは難しいかもぉ～」"
translation = "「아~앙, 하지만 선생님 좀 발밑이 비틀비틀해서 걷는 건 어려울지도오~」"

[[dialogue]]
speaker = "unk"
original = "そうだ。俺の家、この近所なんで──"
translation = "그렇네요. 제 집이 이 근처니까──"

[[dialogue]]
speaker = "トワ先生"
original = "「ふぇ！？\u3000酔いが覚めるまで休ませてくれるの？」"
translation = "「후에!? 취기가 깰 때까지 쉬게 해주는 거야?」"

[[dialogue]]
speaker = "トワ先生"
original = "「それはさすがに……い、いや、やっぱりお言葉に甘えちゃおうかな♪」"
translation = "「그건 역시…… 아, 아니, 역시 호의를 받아들여 버릴까나♪」"

[[dialogue]]
speaker = "トワ先生"
original = "（だったら……これはどうだ！）"
translation = "（그렇다면…… 이건 어떠냐!）"

[[dialogue]]
speaker = "トワ先生"
original = "「……んっ！」"
translation = "「……응!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ん～？\u3000この両手を広げたポーズは何らってぇ？」"
translation = "「응~? 이 양팔을 벌린 포즈가 뭐냐고오?」"

[[dialogue]]
speaker = "トワ先生"
original = "「こ・れ・はぁ～、お姫様抱っこして、家まで運んで欲しいってこと♪\u3000ん～っ♪」"
translation = "「이·것·은~ 공주님 안기 해서 집까지 옮겨달라는 뜻♪ 응~♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「おやおや～？\u3000どうしたのかな、緋宮くん」"
translation = "「오호라~? 왜 그러니, 히노미야 군」"

[[dialogue]]
speaker = "トワ先生"
original = "「あはは、冗談冗談！\u3000さすがに自分で歩くよ～って、ひゃん！？」"
translation = "「아하하, 농담 농담! 역시 스스로 걸을게~ 라니, 히양!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「あんっ、キミの体、鍛えられてて凄く逞し……って、そうじゃなくて！\u3000ええぇぇぇっ！？」"
translation = "「안, 너의 몸, 단련되어 있어서 엄청 늠름…… 이 아니라! 에에에에엑!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「なになに、何で持ち上げてるの！？\u3000まさか本当にお姫様抱っこで運んでくれるの！？」"
translation = "「뭐야 뭐야, 왜 들어 올리는 거야!? 설마 진짜로 공주님 안기로 옮겨주는 거야!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「か、顔赤いのは酔ってるせいらから！\u3000生徒相手なのに、照れたりなんかするわけないし！」"
translation = "「어, 얼굴 빨간 건 취한 탓이니까아! 학생 상대인데 설렐 리가 없잖아!」"

[[dialogue]]
speaker = "トワ先生"
original = "「いやいやいや、汗臭いとか全然気にしないでいいから！\u3000トレーニング中らったんでしょ！？」"
translation = "「아니 아니 아니, 땀 냄새 같은 거 전혀 신경 안 써도 되니까! 트레이닝 중이었잖아!?」"

[[dialogue]]
speaker = "トワ先生"
original = "（ていうか、むしろ男の子のフェロモンって感じで、なんかくらくらする……！）"
translation = "（그보다 오히려 남자아이의 페로몬 같은 느낌이라 왠지 어질어질해……!）"

[[dialogue]]
speaker = "トワ先生"
original = "（何なのキミ、女性にいくら何でも甘過ぎじゃない！？\u3000こ、こうなったら……！）"
translation = "（뭐야 너, 여자한테 너무 무른 거 아니야!? 이, 이렇게 되면……!）"

[[dialogue]]
speaker = "トワ先生"
original = "「お、お姫様抱っこも良いけどぉ、実は先生、もっとして欲しい抱っこの仕方があって～」"
translation = "「고, 공주님 안기도 좋지만 사실 선생님, 더 해줬으면 하는 안기 방식이 있어서~」"

[[dialogue]]
speaker = "トワ先生"
original = "「そ、それはぁ～、先生がして欲しいのはねぇ……赤ちゃん抱っこ♪」"
translation = "「그, 그것은~ 선생님이 해줬으면 하는 건 말이야…… 아기 안기♪」"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？"
translation = "에엑!?"

[[dialogue]]
speaker = "トワ先生"
original = "（そうそう、そうやって動揺してくれないと。あとは今度こそ冗談だよ～♪\u3000と流して、地面に降ろして貰えば……って、あれ？\u3000嘘うそウソ、まさかまさかまさか！？）"
translation = "（그래그래, 그렇게 당황해줘야지. 나머지는 이번에야말로 농담이야~♪ 하고 넘기고 바닥에 내려달라고 하면…… 어라? 거짓말 거짓말 거짓말, 설마 설마 설마!?）"

[[dialogue]]
speaker = "トワ先生"
original = "「ほ、本当にしてくれ……ひゃあっ！？」"
translation = "「지, 진짜로 해줄…… 히앗!?」"

[[dialogue]]
speaker = "トワ先生"
original = "（あ゛ああああ、あああああ──！？）"
translation = "（아아아아아, 아아아아아──!?）"

[[dialogue]]
speaker = "トワ先生"
original = "「あ、赤ちゃん抱っこ、凄く密着するぅ……な、何でもない！\u3000何にも言ってないから！」"
translation = "「아, 아기 안기, 엄청 밀착돼…… 아, 아무것도 아니야! 아무 말도 안 했으니까!」"

[[dialogue]]
speaker = "トワ先生"
original = "（ごめんなさい！\u3000処女どころか、この年まで彼氏居たことないアラサー女子が調子に乗ってすみませんでしたぁぁぁっ！）"
translation = "（죄송합니다! 처녀는커녕 이 나이까지 남자친구 사귀어 본 적 없는 아라서 여자가 까불어서 죄송합니다아아앗!）"

[[dialogue]]
speaker = "トワ先生"
original = "（ひぃぃ、さっきよりも顔が近いぃぃぃ！\u3000それと男の子フェロモンに全身包まれてる感じがぁぁぁ！？）"
translation = "（히익, 아까보다 얼굴이 가까워어어어! 게다가 남자아이 페로몬에 온몸이 감싸인 느낌이이이이!?）"

[[dialogue]]
speaker = "トワ先生"
original = "（あと体温！\u3000体温なにこれ！？\u3000めっちゃ温かくて気持ち良いんですけどぉ！？\u3000何も考えられなくなる……！）"
translation = "（그리고 체온! 체온 뭐야 이거!? 엄청 따뜻하고 기분 좋은데에!? 아무 생각도 할 수 없게 돼……!）"

[[dialogue]]
speaker = "トワ先生"
original = "（し、心臓の音の伝わり方も凄い……！\u3000これ絶対わたしがドキドキしてるのバレちゃうよぉ……で、でも、それと同じくらい──）"
translation = "（시, 심장 소리 전해지는 것도 엄청나……! 이거 분명 내가 두근거리는 거 들킬 거야아…… 하, 하지만 그것만큼──）"

[[dialogue]]
speaker = "トワ先生"
original = "「……もしかして、キミもドキドキしてたり、する？」"
translation = "「……혹시 너도 두근거리거나 하니?」"

[[dialogue]]
speaker = "トワ先生"
original = "「そ、そうなんだ。……えへへ♪」"
translation = "「그, 그렇구나. ……에헤헤♪」"

[[dialogue]]
speaker = "トワ先生"
original = "（それってつまり……わたしのこと、ちゃんと女の子って意識してくれてるってこと、だよね♪）"
translation = "（그건 즉…… 나를 제대로 여자애로 의식해주고 있다는 거지♪）"

[[dialogue]]
speaker = "トワ先生"
original = "「……会長くんの、えっち♥」"
translation = "「……회장군, 야해♥」"

[[dialogue]]
speaker = "unk"
original = "い、いいからさっさと酔いを覚まして下さい！"
translation = "드, 됐으니까 어서 취기나 깨세요!"

[[dialogue]]
speaker = "トワ先生"
original = "「は～い♪」"
translation = "「네~에♪」"

[[dialogue]]
speaker = "unk"
original = "心臓が高鳴るのを誤魔化しながら、俺は自宅への道を急ぐのだった。"
translation = "심장이 고동치는 것을 속이며 나는 집으로 가는 길을 서둘렀다."

