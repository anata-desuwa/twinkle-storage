[[dialogue]]
speaker = "unk"
original = "巫女修行の後日――"
translation = "무녀 수행 후일――"

[[dialogue]]
speaker = "unk"
original = "ルリエルがミヤハルと共に、星徒会室へと遊びにやって来た。"
translation = "루리엘이 미야하르와 함께 성도회실에 놀러 왔다."

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、フィオナ会長に言われていた書類をお届けなのです～！」"
translation = "「회장님, 피오나 회장님이 말씀하신 서류를 전달하러 온 것입니다~!」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、ルリエル"
translation = "고마워, 루리엘"

[[dialogue]]
speaker = "ミヤハル"
original = "「会長はん、ごきげんようどす<emoji=heart04>\u3000またはんなりと遊びに来てしもうたわぁ<emoji=heart04>」"
translation = "「회장 한, 평안하십니데이<emoji=heart04> 또 나긋하게 놀러 와 버렸네예<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「こっちに来る途中でミヤハルさんと会って、一緒に来たのです♪」"
translation = "「여기에 오는 길에 미야하르 씨를 만나서 같이 온 것입니다♪」"

[[dialogue]]
speaker = "unk"
original = "えっと、それは別にいいんだけど……"
translation = "어, 그건 상관없는데……"

[[dialogue]]
speaker = "ミヤハル"
original = "「――ん～？\u3000なんで毎回、腕に抱き着いて来るのかって？」"
translation = "「――음~? 왜 매번 팔에 달라붙느냐고예?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>\u3000それはやね～、単純接触効果ってやつやよ<emoji=heart04>\u3000会長はんの周りには可愛い女の子が多いから、こうして積極的にアピールしていかんとなぁ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 그건 말이제~, 단순 접촉 효과라는 기라<emoji=heart04> 회장 한 주변에는 귀여운 가시나들이 많으니까 이렇게 적극적으로 어필해야 안 되겠나<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「はいはい、そこまで～！」"
translation = "「자자, 거기까지~!」"

[[dialogue]]
speaker = "unk"
original = "一緒に仕事していたマトイがこっちに来て、ミヤハルの首根っこを掴み、俺から引き剥がす。"
translation = "같이 일하던 마토이가 이쪽으로 와서 미야하르의 뒷덜미를 잡고 나에게서 떼어놓는다."

[[dialogue]]
speaker = "ミヤハル"
original = "「あんっ<emoji=heart04>\u3000マトイもおったん？\u3000気付かんかったわぁ～」"
translation = "「앙<emoji=heart04> 마토이도 있었나? 몰랐네예~」"

[[dialogue]]
speaker = "マトイ"
original = "「いや、居たの分かっててやってたでしょ！？」"
translation = "「아니, 있는 거 알고 했으면서!?」"

[[dialogue]]
speaker = "マトイ"
original = "「というか、ミヤハル！\u3000巫女修行の件で、クレームがあるんだけど！？」"
translation = "「그보다 미야하르! 무녀 수행 건으로 클레임이 있는데!?」"

[[dialogue]]
speaker = "マトイ"
original = "「ヨミちゃんから聞いたんだけど、巫女って本来、『煩悩を捨て去る』修業をするのが一般的らしいじゃない！」"
translation = "「요미짱한테 들었는데 무녀는 원래 『번뇌를 버리는』 수행을 하는 게 일반적이라잖아!」"

[[dialogue]]
speaker = "マトイ"
original = "「ミヤハルの『煩悩を解放する』って修行法、聞いたことないって言ってたんだけど！？」"
translation = "「미야하르의 『번뇌를 해방하는』 수행법 같은 건 들어본 적 없다고 하던데!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちのオリジナルだから、当然やねぇ」"
translation = "「내 오리지널이니까 당연한 기라」"

[[dialogue]]
speaker = "マトイ"
original = "「修行法がオリジナルなんてこと、あり得る！？」"
translation = "「수행법이 오리지널이라니 그럴 수가 있어!?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そういえば九浄家メイド隊のヨミはんも、巫女の力を使える子やったねぇ」"
translation = "「카고 보니 쿠죠 가문 메이드대의 요미 한도 무녀의 힘을 쓰는 애였제」"

[[dialogue]]
speaker = "ミヤハル"
original = "「まあ、あれや。こないだ教えた修行は、うちなりの経験則に基づく、分かりやすいアレンジバージョンってことで<emoji=heart04>」"
translation = "「뭐, 글타. 요전에 가르친 수행은 내 나름의 경험칙에 근거한 알기 쉬운 어레인지 버전이라 보면 된데이<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「最初に説明して欲しかったんですけど！？」"
translation = "「미리 설명을 해주셨어야죠!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でも、ルリエルは煩悩を解放するの、すごく楽しかったのですよ♪」"
translation = "「하지만 루리엘은 번뇌를 해방하는 거 정말 즐거웠던 것입니다♪」"

[[dialogue]]
speaker = "unk"
original = "煩悩を、解放……？"
translation = "번뇌를, 해방……?"

[[dialogue]]
speaker = "ミヤハル"
original = "「そうなんよ～<emoji=heart04>\u3000どういう修行だったのかっていうとな～？」"
translation = "「글타니까~<emoji=heart04> 어떤 수행이었냐 하면 말이제~?」"

[[dialogue]]
speaker = "マトイ"
original = "「わあああぁ～～っ！\u3000会長には説明しなくていいからっ！！」"
translation = "「우아아아아아~~! 회장한테는 설명 안 해도 되니까!!」"

[[dialogue]]
speaker = "unk"
original = "と、その時、室内に警報が鳴り響く。"
translation = "그때 실내에 경보가 울려 퍼진다."

[[dialogue]]
speaker = "ルリエル"
original = "「モンスターの出現アラートなのです！」"
translation = "「몬스터 출현 알람인 것입니다!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あらぁ、ええところやったのに～」"
translation = "「어라라, 좋은 타이밍이었는데~」"

[[dialogue]]
speaker = "unk"
original = "すぐに出撃だ！"
translation = "즉시 출격이다!"

[[dialogue]]
speaker = "マトイ"
original = "「うん！\u3000ミヤハル、ちょっと行って来るね！」"
translation = "「응! 미야하르, 잠깐 다녀올게!」"

[[dialogue]]
speaker = "unk"
original = "それから現場に急行し、モンスターとの戦闘を開始した俺たち。"
translation = "그러고 나서 현장으로 급행해 몬스터와 전투를 시작한 우리들."

[[dialogue]]
speaker = "マトイ"
original = "「二刀流、水纏の太刀！」"
translation = "「이도류, 물을 두른 태도!」"

[[dialogue]]
speaker = "ルリエル"
original = "「でんでん♪\u3000ウェザードラムなのです！」"
translation = "「둥둥♪ 웨더 드럼인 것입니다!」"

[[dialogue]]
speaker = "モンスター"
original = "「ギーーーッ！？」"
translation = "「기이이익!?」"

[[dialogue]]
speaker = "unk"
original = "２人共、強い……！"
translation = "둘 다 강해……!"

[[dialogue]]
speaker = "unk"
original = "巫女修行を経てから、２人の巫女フォームは目覚ましい活躍を見せるようになっていた。"
translation = "무녀 수행을 거친 뒤로 두 사람의 무녀 폼은 눈부신 활약을 보여주게 되었다."

[[dialogue]]
speaker = "ミヤハル"
original = "「ほんまにな～。コツを掴んでからそう経ってないのに、もう使いこなして。すっかり立派な巫女さんやねぇ<emoji=heart04>」"
translation = "「진짜네~. 요령을 잡은 지 얼마 안 됐는데 벌써 능숙하게 쓰고. 아주 어엿한 무녀님이네예<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「って、ミヤハル？」"
translation = "「어라, 미야하르?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちも来てしもうたわぁ<emoji=heart04>\u3000――陰陽術！」"
translation = "「내도 와 버렸데이<emoji=heart04> ――음양술!」"

[[dialogue]]
speaker = "モンスター"
original = "「ギアーーーズッ！？」"
translation = "「기아아아아즈!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ミヤハルさん、手伝いに来てくれたんですか！？\u3000嬉しいのです！」"
translation = "「미야하르 씨, 도와주러 오신 건가요!? 기쁜 것입니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「……でも、どうして？」"
translation = "「……하지만 어째서?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ん～、なんとなく？\u3000ほら、あれや――」"
translation = "「음~, 왠지 모르게? 봐라, 그거 아이가――」"

[[dialogue]]
speaker = "ミヤハル"
original = "「女の子同士でよく一緒にお花摘みに行きますやろ？\u3000あれと同じノリやね<emoji=heart04>」"
translation = "「가시나들끼리 자주 같이 꽃 따러 가제? 그거랑 같은 기라<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あっ、一緒にお花摘みに行くってわかる？\u3000本当にお散歩するんじゃないんよ？\u3000男の子的に言うたら連れションやろか<emoji=heart04>」"
translation = "「앗, 같이 꽃 따러 간다는 거 아나? 진짜로 산책하는 게 아인기라. 남자애들 식으로 말하면 동반 방뇨 같은 거 아이겠나<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「言い方っ！！」"
translation = "「말뽄새 좀!!」"

[[dialogue]]
speaker = "マトイ"
original = "「……だけど、うん――ありがとね、ミヤハル」"
translation = "「……그래도, 응―― 고마워, 미야하르」"

[[dialogue]]
speaker = "ミヤハル"
original = "「まあ、お役目のこともあるし、これまでは自分のことは自分で守らなあかん思うてたけど……」"
translation = "「뭐, 소임도 있고 해서 지금까지는 자기 몸은 자기가 지켜야 한다고 생각했지만……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「これからはマトイがうちのこと、助けてくれはるんやろ？\u3000うち、ちょっとは甘えてもええんよね？」"
translation = "「이제부터는 마토이가 내를 도와줄 거 아이가? 내 좀 응석 부려도 되는 거제?」"

[[dialogue]]
speaker = "マトイ"
original = "「もちろん！\u3000任せてよ。これでも誰かを攻撃から守るのは、得意なんだから！」"
translation = "「물론이지! 맡겨둬. 이래봬도 누군가를 공격으로부터 지키는 건 자신 있으니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「よし、このままみんなで頑張って、４人でお疲れ様会でも開こっか！」"
translation = "「좋아, 이대로 다 같이 힘내서 넷이서 뒤풀이라도 할까!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>」"
translation = "「후훗<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そうと決まれば、はよ片付けて、帰りに会長はんと４Ｐしに行きまひょ<emoji=heart04>」"
translation = "「카기로 정했으면 얼른 정리하고 돌아가는 길에 회장 한이랑 4P 하러 갑시데이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なんて！？"
translation = "뭐라고!?"

[[dialogue]]
speaker = "マトイ"
original = "「やっぱ訂正！\u3000先に１人で帰って！\u3000このドスケベ陰陽師っ！！」"
translation = "「역시 취소! 먼저 혼자 돌아가! 이 변태 음양사!!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あ～ん<emoji=heart04>\u3000マトイってば、うちだけ仲間ハズレなんていけずやわぁ～<emoji=heart04>\u3000ルリはんはみんな一緒の方が嬉しいやろ～？」"
translation = "「아앙<emoji=heart04> 마토이도 참, 내만 쏙 빼놓다니 너무한데이~<emoji=heart04> 루리 한은 다 같이 하는 게 더 좋제~?」"

[[dialogue]]
speaker = "ルリエル"
original = "「はいなのです♪」"
translation = "「네, 인 것입니다♪」"

[[dialogue]]
speaker = "unk"
original = "３人はそんなやり取りをしつつも、息の合ったコンビネーションでモンスターをあっという間に殲滅して行く。"
translation = "세 사람은 그런 대화를 나누면서도 호흡이 척척 맞는 콤비네이션으로 몬스터를 순식간에 섬멸해 나간다."

[[dialogue]]
speaker = "unk"
original = "その日以降、ミヤハルは俺たちが戦っていると、よく助太刀に来てくれるようになるのだった――"
translation = "그날 이후 미야하르는 우리가 싸우고 있으면 자주 지원하러 와주게 되었다――"

