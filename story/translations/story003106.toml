[[dialogue]]
speaker = "unk"
original = "シズハがソフィアと組む一方で、リーリアはウズメイアと組んで羽根突きの練習を行うことになった。"
translation = "시즈하가 소피아와 조를 짜는 한편, 리리아는 우즈메와 조를 짜서 하네츠키 연습을 하게 되었다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「今日の出会いに感謝、まさに<ruby>一期一会<rt>いちごいちえ</rt></ruby>ってね♪\u3000というわけでリーリアちゃん、よろしく～♪」"
translation = "「오늘의 만남에 감사, 그야말로 일기일회네♪ 그런 의미에서 리리아짱 잘 부탁해~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はい♪\u3000改めて、渋谷リーリアで～す。よろしくね、ウズメイアちゃん☆」"
translation = "「네♪ 다시 한번, 시부야 리리아입니다. 잘 부탁해, 우즈메짱☆」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしたち、同じ１年生なのにこれまで接点があまりなかったから、こうして新年の最初から縁ができて、ウズウズしてるし♪」"
translation = "「우리 같은 1학년인데 지금까지 접점이 별로 없었으니까 이렇게 신년 초부터 인연이 생겨서 근질근질하다구♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私も私も☆\u3000今年はなんだか、縁がありそうだよね～♪」"
translation = "「나도 나도☆ 올해는 왠지 인연이 있을 것 같네~♪」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アナさん、よろしく～」"
translation = "「아나 씨, 잘 부탁해요~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい、舞亜さん。よろしくお願いします」"
translation = "「네, 마이아 씨. 잘 부탁드립니다」"

[[dialogue]]
speaker = "unk"
original = "その横で、アナは舞亜と組んで練習を開始する。"
translation = "그 옆에서 아나는 마이아와 조를 짜서 연습을 시작한다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それじゃあ、リーリアちゃん、行っくよ～♪\u3000ていっ！」"
translation = "「그럼 리리아짱, 간다~♪ 테잇!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「マジカルバッチコイです☆\u3000はいっ！」"
translation = "「매지컬하게 와라입니다☆ 하잇!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――そういえば、気になってたんだけど、ウズメイアちゃんたちは晴れ着フォームの力はもう使えてるよね？」"
translation = "「――그러고 보니 궁금했는데 우즈메짱들은 설빔 폼의 힘은 이미 쓰고 있잖아?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「だったら、無理に獅子舞さんに羽根突きで勝とうとしなくても、大丈夫なんじゃ……」"
translation = "「그렇다면 굳이 사자탈 씨한테 하네츠키로 이기려고 하지 않아도 괜찮은 거 아냐……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「え？\u3000ああ、それね～。確かにあたし達は、必ずしも参加する必要はないかもだけど――」"
translation = "「에? 아아, 그거 말이지~. 확실히 우리들은 반드시 참가할 필요는 없을지도 모르지만――」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「リーリアちゃんたちが獅子舞さんとバトルしてるのに、直接関係ないからって『頑張ってね～』って出てっちゃうのは、なんか違うじゃん？」"
translation = "「리리아짱들이 사자탈 씨랑 배틀하고 있는데 직접 상관없다고 『힘내~』 하고 나가버리는 건 좀 아니잖아?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたし達は学園が違っていても一緒にリクリエと戦う仲間なんだし、こういうのはお互い様、助け合いっしょ♪」"
translation = "「우리는 학원이 달라도 같이 리크리에랑 싸우는 동료니까 이런 건 상부상조, 돕고 살아야지♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ウズメイアちゃん……！\u3000めっちゃいい子！」"
translation = "「우즈메짱……! 진짜 착한 애!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あははっ、大げさだし♪\u3000ソフィと舞亜も一緒に参加してるんだから、別にあたしだけの考えってわけじゃないよ～」"
translation = "「아하핫, 과장이라구♪ 소피랑 마이아도 같이 참가하고 있으니까 딱히 나만의 생각인 건 아니야~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「それに個人的な趣味もあってさ～。あたし、純粋に日本文化が大好きなんだよね！」"
translation = "「게다가 개인적인 취미도 있어서 말이야~. 나 순수하게 일본 문화를 정말 좋아하거든!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だからみんなと一緒に、こうやって羽根突きをするの、楽しそうだな～って♪」"
translation = "「그래서 다 같이 이렇게 하네츠키 하는 거 재밌을 것 같아서♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、ウズメイアちゃんも日本文化、好きなんだ！？\u3000実は私もなんだ♪」"
translation = "「앗, 우즈메짱도 일본 문화 좋아해!? 사실 나도야♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えっ、そうなの！？\u3000だったらあたしたち、めっちゃ気が合うじゃん！」"
translation = "「엣, 정말!? 그렇다면 우리 진짜 마음 잘 맞잖아!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「バトルフェスタの時に宣言してたから、ウズメイアちゃんたちも知ってるとは思うんだけど……私、魔女なんだよね」"
translation = "「배틀 페스타 때 선언했으니까 우즈메짱들도 알고는 있을 텐데…… 나 마녀거든」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「だから、人間界に来たのは、学園に入学する時が初めてだったんだ……」"
translation = "「그래서 인간계에 온 건 학원에 입학할 때가 처음이었어……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「生まれてからずっと、魔女の森に引きこもらされてたから……私にとって、人間界は何もかも新鮮な色で溢れてて、すごくワクワクしたんだ♪」"
translation = "「태어날 때부터 계속 마녀의 숲에 틀어박혀 있었으니까…… 나한테 인간계는 모든 게 신선한 색으로 가득해서 정말 두근거렸어♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「わかる～！\u3000あたしも昔、天界で人間界の本を読んで、すっごくワクワクしたもん！\u3000いつか絶対人間界に行きたいって、ずっと憧れてたんだよね～」"
translation = "「알지~! 나도 옛날에 천계에서 인간계 책을 읽고 정말 두근거렸거든! 언젠가 꼭 인간계에 가고 싶다고 계속 동경했었어~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ねぇねぇ、リーリアちゃんは、人間界で何が１番好きなの？」"
translation = "「있지 있지, 리리아짱은 인간계에서 뭐가 제일 좋아?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「う～ん、実はそれがなかなか決められないんだよね～。色んなものを知るたびに、どんどん好きが増えてっちゃう感じで～」"
translation = "「으~음, 사실 그게 좀처럼 안 정해지네~. 여러 가지를 알 때마다 점점 좋아하는 게 늘어나는 느낌이라~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「人間界の衣装は可愛いものが色々あるし～、美味しくてカラフルなスイーツとかも沢山あって～」"
translation = "「인간계 의상은 귀여운 게 여러 가지 있고~ 맛있고 컬러풀한 디저트 같은 것도 잔뜩 있고~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも……特に好きなのは、やっぱり『学園』かな」"
translation = "「하지만…… 특히 좋아하는 건 역시 『학원』일까」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「素敵な『自分の色』を持っている友達と、学園に通って楽しむ、絶えず鮮やかに色が移り変わっていく青春――私はそれが、すごく大好きで大切なものなんだ☆」"
translation = "「멋진 『자신의 색』을 가진 친구들과 학원에 다니며 즐기는, 끊임없이 선명하게 색이 변해가는 청춘―― 난 그게 정말 좋고 소중한 거야☆」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「～～～っ！\u3000それ、すっごくいいよ、<b>リーリア</b>ちゃん！\u3000ううん、<b>リーリア</b>！」"
translation = "「~~~! 그거 진짜 좋다, <b>리리아</b>짱! 아니, <b>리리아</b>!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「って、わわっ！？\u3000なになに？\u3000ウズメイアちゃん！？」"
translation = "「앗, 와와!? 뭐야 뭐야? 우즈메짱!?」"

[[dialogue]]
speaker = "unk"
original = "羽根突きの羽根を返すのも忘れ、リーリアに歩み寄ってその両手を取るウズメイア。"
translation = "하네츠키 깃털을 돌려주는 것도 잊고 리리아에게 다가가 그 양손을 잡는 우즈메."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会った瞬間からそんな気がしてたし、さっきも言ったけど……あたしたち、絶対に気が合うよ！\u3000だから、今日から改めて友達になろう、リーリア！」"
translation = "「만난 순간부터 그런 느낌이 들었고 아까도 말했지만…… 우리 분명히 마음이 잘 맞아! 그러니까 오늘부터 다시 친구 하자, 리리아!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「い、いきなりどうしたんですか！？\u3000急に距離詰めて来るから、ビックリしちゃうんですけど！？」"
translation = "「가, 갑자기 왜 그러세요!? 갑자기 거리를 좁혀오니까 깜짝 놀랐잖아요!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「敬語なんてめんどいっしょ！\u3000ギャル同士、バイブスあげてかなきゃなんだから！」"
translation = "「존댓말 같은 거 귀찮잖아! 갸루끼리 바이브 좀 올려야지!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私ってギャル認定なの！？\u3000まあそっち系のファッション好きだけど！！」"
translation = "「나 갸루 판정이야!? 뭐 그쪽 패션 좋아하긴 하지만!!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしの周り、みんなノリがいいんだけど、それでもギャル同士じゃないと合わないバイブスもあるっしょ！」"
translation = "「내 주변 애들 다 텐션 좋긴 하지만 그래도 갸루끼리가 아니면 안 맞는 바이브도 있잖아!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ほらほら、リーリアもあたしのことも<b>ウズメ</b>って呼ぶし！\u3000ねっ、ねっ！？」"
translation = "「자자, 리리아도 나를 <b>우즈메</b>라고 부르기! 응? 응!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ～、えっとぉ～……うん。じゃあ……ウズメ」"
translation = "「아~ 저기이~…… 응. 그럼…… 우즈메」"

[[dialogue]]
speaker = "unk"
original = "リーリアはちょっと照れ臭そうにしながらも、頬を緩めながらウズメイアを愛称で呼ぶ。"
translation = "리리아는 조금 쑥스러운 듯하면서도 입가에 미소를 띠며 우즈메를 애칭으로 부른다."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うんっ♪\u3000リーリア、よろしくね♪」"
translation = "「응♪ 리리아, 잘 부탁해♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ん……えへへへっ♪\u3000いや～、友達の輪がまたカラフルになっちゃったな～」"
translation = "「음…… 에헤헤헤♪ 야~ 친구의 고리가 또 컬러풀해져 버렸네~」"

[[dialogue]]
speaker = "unk"
original = "未だ照れた色を含みながらも、嬉しそうな笑顔を浮かべるリーリア。"
translation = "아직 쑥스러움이 남아있으면서도 기쁜 듯한 미소를 짓는 리리아."

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そうだ！\u3000今度一緒に遊びに出かけようよ♪\u3000舞亜とソフィに、アナちゃんも誘って～、１年生組で！」"
translation = "「맞다! 다음에 같이 놀러 가자♪ 마이아랑 소피에 아나짱도 불러서~ 1학년끼리!」"

[[dialogue]]
speaker = "unk"
original = "テンションの上がりまくったウズメイアが、ばっと勢いよく舞亜とアナの方を振り向く。"
translation = "텐션이 잔뜩 오른 우즈메가 확 기세 좋게 마이아와 아나 쪽을 돌아본다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「すぅ……すぅ……」"
translation = "「새근…… 새근……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「すや……すや……」"
translation = "「쿨…… 쿨……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「って、なんかあの２人、立ったまま寝てる！？」"
translation = "「아니, 저 둘 서서 자고 있어!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ん……？\u3000あ……どうかした、ウズメ？」"
translation = "「음……? 아…… 왜 그래, 우즈메?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ふぅ。舞亜さん、いま起きました。きっかり５分で起きられたと思うのですが、いかがだったでしょう？」"
translation = "「……후우. 마이아 씨, 방금 깼습니다. 정확히 5분 만에 일어난 것 같은데 어떠셨나요?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ごめん、アナさんが気持ち良さそうに寝てるの見てたら、私もいつの間にかうとうとしちゃってたみたいで……」"
translation = "「미안, 아나 씨가 기분 좋게 자는 걸 보고 있었더니 나도 어느새 꾸벅꾸벅 졸아버린 것 같아서……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えっと……なんでアナちゃんたちは立って寝てたわけ？」"
translation = "「저기…… 왜 아나짱들은 서서 자고 있었던 거야?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実は舞亜さんとお互いのことについて話をしていたら、『どこでも寝られる』という共通の特技があることがわかりまして」"
translation = "「사실 마이아 씨와 서로에 대해 이야기를 나누다 보니 『어디서든 잘 수 있다』는 공통된 특기가 있다는 걸 알게 되어서요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アナさんにはキッチリ５分だけ仮眠して起きられる技があるらしくて、実演してもらってたんだ」"
translation = "「아나 씨에겐 정확히 5분만 가면하고 일어날 수 있는 기술이 있다고 해서 시연해 보고 있었어」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「立ったまま仮眠してたの！？\u3000２人で寄りかかり合って！？」"
translation = "「서서 가면을 했다고!? 둘이서 서로 기대고서!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「『どこでも寝られる』とはつまり、立ったままでも可能ということです」"
translation = "「『어디서든 잘 수 있다』는 건 즉 서 있는 상태로도 가능하다는 뜻입니다」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私も寝ることについては自信があったんだけど、アナさんみたいに目覚ましなしで、短時間でパッと起きられるのはすごいね。試合前とかに使えたら便利そう」"
translation = "「나도 잠에 대해서는 자신이 있었는데 아나 씨처럼 알람 없이 단시간에 팍 일어날 수 있는 건 대단하네. 경기 전 같은 때 쓰면 편리할 것 같아」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「反復練習で体に覚えさせる感じなので、アスリートである舞亜さんなら、私よりも早く習得できますよ」"
translation = "「반복 연습으로 몸에 익히는 느낌이라 운동선수인 마이아 씨라면 저보다 빨리 습득할 수 있을 거예요」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「本当？\u3000じゃあ、後で練習に付き合ってもらってもいい、アナさん？」"
translation = "「정말? 그럼 나중에 연습 좀 도와줄 수 있어, 아나 씨?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。睡眠について語れる同士は、貴重ですから」"
translation = "「노 프러블럼. 수면에 대해 이야기할 수 있는 동지는 귀중하니까요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「意外なところで通じ合ってるし……」"
translation = "「의외인 부분에서 통하고 있네……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふっ、確かにあんまり居ないよね。アナさんは、他には好きなものとかある？」"
translation = "「후훗, 확실히 별로 없지. 아나 씨는 다른 좋아하는 거 있어?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「和菓子、でしょうか。あれはまさに、女神様が人間界で最初に作ったものに違いありません」"
translation = "「화과자, 일까요. 그건 분명 여신님이 인간계에서 가장 먼저 만든 것이 틀림없습니다」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ、そうなんだ。私も甘い物は好きだよ」"
translation = "「아, 그렇구나. 나도 단 거 좋아해」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ただ、カロリー制限しないと体重増えてスケートに支障が出ちゃうから、低カロリーの和菓子を自分で作ったりするかな」"
translation = "「다만 칼로리 제한을 안 하면 체중이 늘어서 스케이트에 지장이 생기니까 저칼로리 화과자를 직접 만들기도 해」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「！\u3000なんと、自作ですか。ちなみにどういったものを……？」"
translation = "「! 무려 자작입니까. 참고로 어떤 것들을……?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「う～んとね～。私がよく作るのだと、寒天ゼリーかな。あとは水ようかん、わらび餅、大福、おはぎとか？」"
translation = "「으음~ 내가 자주 만드는 건 한천 젤리일까. 그다음엔 미즈요캉, 와라비모치, 다이후쿠, 오하기 같은 거?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「個人的に、満足感があって気に入ってるのは、フルーツ大福かな。あんを少なめにして、代わりに果物を包むの。美味しくて、カロリー調節もしやすいんだ」"
translation = "「개인적으로 만족감이 커서 마음에 드는 건 과일 다이후쿠일까. 팥소를 적게 넣는 대신 과일을 감싸는 거야. 맛있고 칼로리 조절도 하기 쉽거든」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「フルーツ大福……じゅるり。そ、それは確かに美味しそうですね……」"
translation = "「과일 다이후쿠…… 꿀꺽. 그, 그건 확실히 맛있겠네요……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふふっ♪\u3000アナさん、すごく食べたそうな顔してる。本当に和菓子が好きなんだね。今度作ってきてあげよっか？」"
translation = "「후후후♪ 아나 씨, 엄청 먹고 싶은 얼굴 하고 있어. 정말 화과자를 좋아하는구나. 다음에 만들어다 줄까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あなたが神か……！\u3000一生ついていきます」"
translation = "「당신이 신인가……! 평생 따르겠습니다」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「わかった。じゃあ、それも今度。約束だね」"
translation = "「알았어. 그럼 그것도 다음에. 약속이야」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい！\u3000美味しい和菓子があれば何でもするので、いつでも呼んでください、舞亜さん」"
translation = "「네! 맛있는 화과자만 있다면 뭐든 할 테니 언제든 불러주세요, 마이아 씨」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「どうやらアナちゃんと舞亜も気が合ったみたいだし☆」"
translation = "「아무래도 아나짱이랑 마이아도 마음이 맞은 것 같네☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「アナちゃん、舞亜ちゃんにものすごく綺麗な敬礼してるけど、本当にこれでよかったの？」"
translation = "「아나짱, 마이아짱한테 엄청나게 멋진 경례를 하고 있는데 정말 이걸로 괜찮은 거야?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あっ。ウズメとリーリアさんも、和菓子の試食会、くる？」"
translation = "「앗. 우즈메랑 리리아 씨도 화과자 시식회 올래?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いいのっ！？\u3000それもすっごく楽しそう～♪」"
translation = "「그래도 돼!? 그것도 정말 재밌겠다~♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あとね、さっきリーリアとも話してたんだけど、１年生組で――ううん、というか今日初詣に集まったみんなで、後で一緒に遊びに行こうよ！」"
translation = "「그리고 아까 리리아랑도 이야기했는데 1학년끼리―― 아니, 그보다 오늘 첫 참배에 모인 다 같이 나중에 같이 놀러 가자!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「賛成～！\u3000どうせなら初詣の後に、みんなで浅草巡りに繰り出しちゃいますか☆」"
translation = "「찬성~! 이왕이면 첫 참배 후에 다 같이 아사쿠사 구경하러 나설까요☆」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、もちろんいいよ。私もまだまだアナさんと話したいことがあるし」"
translation = "「응, 물론 좋아. 나도 아직 아나 씨랑 하고 싶은 이야기가 많고」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「では、そうと決まったら、なるべく早く獅子舞さんに勝たないとですね」"
translation = "「그럼 그렇게 정해졌으면 가급적 빨리 사자탈 씨에게 이겨야겠네요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「うん☆\u3000私もそろそろ、マジカル本気を出しちゃいますよ～！」"
translation = "「응☆ 나도 이제 슬슬 매지컬하게 본때를 보여주겠어~!」"

[[dialogue]]
speaker = "unk"
original = "それからしばらくして──"
translation = "그로부터 잠시 후──"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「どういうつもりだ？\u3000まさかもう、吾輩に挑むつもりか？」"
translation = "「무슨 생각이냐? 설마 벌써 이 몸에게 도전할 셈이냐?」"

[[dialogue]]
speaker = "unk"
original = "全員が集合して見守る中、１人の星騎士が獅子舞と対峙する。"
translation = "전원이 모여 지켜보는 가운데 한 명의 성기사가 사자탈과 대치한다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はい。獅子舞さん……私が、あなたに改めて勝負を挑みます！」"
translation = "「네. 사자탈 씨…… 제가 당신에게 다시 승부를 걸겠어요!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「渋谷リーリア……威勢はいいが、吾輩が見る限り、お前はまだまだ練習が足りていない。それでも挑む気か？」"
translation = "「시부야 리리아…… 기세는 좋다만 이 몸이 보기엔 넌 아직 연습이 부족하다. 그런데도 도전할 셈이냐?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「策があります。あと――名指しで『認めん』って言われっぱなしのままなのは、めちゃ悔しいんで！」"
translation = "「책략이 있어요. 그리고―― 대놓고 『인정 못 한다』는 소리를 들은 채로 있는 건 엄청 분하니까요!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん……そうか。ならば、見せてもらうとしよう」"
translation = "「흥…… 그러냐. 그렇다면 보여주도록 해라」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「吾輩にどうやって認めさせるつもりなのか――来るがいい！」"
translation = "「이 몸에게 어떻게 인정받을 셈인지―― 오너라!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いざ、マジカルにレディーゴーです！」"
translation = "「자, 매지컬하게 레디 고입니다!」"

[[dialogue]]
speaker = "unk"
original = "こうして、リーリアと獅子舞の羽根突き勝負が幕を開けるのだった。"
translation = "그렇게 리리아와 사자탈의 하네츠키 승부가 막을 올리는 것이었다."

