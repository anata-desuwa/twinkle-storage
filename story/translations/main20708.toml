[[dialogue]]
speaker = "unk"
original = "第８話,デネブの朝,B"
translation = "제8화, 데네브의 아침, B"

[[dialogue]]
speaker = "unk"
original = "俺たちがデネブに来てから一夜が明けた。"
translation = "우리들이 데네브에 온 지도 하룻밤이 지났다."

[[dialogue]]
speaker = "unk"
original = "昨日食事を摂っていた共用スペースに行くと──"
translation = "어제 식사를 했던 공용 공간으로 가니──"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お、魔王も起きてきたか」"
translation = "「오, 마왕도 일어났나.」"

[[dialogue]]
speaker = "フィオナ"
original = "「おはようございます。朝食、先に頂いていますよ」"
translation = "「좋은 아침이에요. 아침 식사, 먼저 하고 있었답니다.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、おはよう。さすがフィオナ、こんな時でも早起きなんだな」"
translation = "「아아, 안녕. 역시 피오나, 이런 상황에서도 일찍 일어나는구나.」"

[[dialogue]]
speaker = "フィオナ"
original = "「柔らかいベッドで休んだおかげで、目覚めが良かったので。リノさんのおかげで快適な夜でした」"
translation = "「푹신한 침대에서 쉰 덕분에 개운하게 일어났거든요. 리노 씨 덕분에 쾌적한 밤이었어요.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「魔王も食べるか？\u3000朝食ならあたしが作るけど、簡単にトーストとベーコンエッグでいいよな？」"
translation = "「마왕도 먹을래? 아침이라면 내가 만들 건데, 간단하게 토스트랑 베이컨 에그면 되지?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、お願いするよ」"
translation = "「아아, 부탁할게.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おはよー！\u3000たっぷり食べて、たっぷり寝て、すっかり体力回復したわ♪」"
translation = "「안녕~! 듬뿍 먹고 듬뿍 자서 체력 완전 회복했어♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おはよ。おや、もう朝ごはん食べてる人いるね」"
translation = "「안녕. 어라, 벌써 아침 먹고 있는 사람이 있네.」"

[[dialogue]]
speaker = "unk"
original = "俺に続いて、ヴィーナスとナターシャが起きてくる。"
translation = "나에 이어 비너스와 나타샤가 일어난다."

[[dialogue]]
speaker = "unk"
original = "そこにアポロが戻ってきた。"
translation = "거기에 아폴로가 돌아왔다."

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お待たせー。みんな起きてくると思って、人数分作ってきたぞ」"
translation = "「기다렸지~ 다들 일어날 것 같아서 인원수 맞춰서 만들어 왔어.」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう。それじゃ……いただきます」"
translation = "「고마워. 그럼…… 잘 먹겠습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000美味しい……！」"
translation = "「! 맛있다……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん～♪\u3000目玉焼きはトロリと半熟、ベーコンはカリカリ……完璧な焼き加減だわ！」"
translation = "「음~♪ 계란 프라이는 노른자가 톡 터지는 반숙, 베이컨은 바삭바삭…… 완벽한 굽기 정도야!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「そうだろうそうだろう。やっぱりベーコンはカリカリじゃないとな」"
translation = "「그렇지 그렇지? 역시 베이컨은 바삭바삭해야 제맛이지.」"

[[dialogue]]
speaker = "梨緒"
original = "「……おはよう」"
translation = "「……안녕.」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ふわぁ……おはよー……まだ眠いや」"
translation = "「후아암…… 안녕~…… 아직 졸려.」"

[[dialogue]]
speaker = "リノ"
original = "「おはよー！\u3000私が朝ご飯作ろうかと思ったけど、アポロちゃんに先を越されちゃったわね」"
translation = "「안녕~! 내가 아침 만들까 했는데 아폴로 짱이 선수 쳤네.」"

[[dialogue]]
speaker = "unk"
original = "そこにみんな起きてきて、今秘密基地にいるメンバーが全員集合する。"
translation = "거기에 모두가 일어나면서 현재 비밀기지에 있는 멤버가 전원 집합한다."

[[dialogue]]
speaker = "リノ"
original = "「じゃあちょうどいいし、朝ご飯を食べながら今後の方針を話し合いましょうか」"
translation = "「그럼 마침 잘 됐으니 아침 먹으면서 향후 방침을 논의해 볼까요.」"

[[dialogue]]
speaker = "クロト"
original = "「うん、それじゃまず俺から」"
translation = "「응, 그럼 우선 나부터.」"

[[dialogue]]
speaker = "クロト"
original = "「デネブを説得して共にリクリエと戦う……それがアルタイルの方針だ。だけどそのためにはルヴィネを説得しないといけない」"
translation = "「데네브를 설득해서 함께 리크리에와 싸운다…… 그것이 알타이르의 방침이야. 하지만 그러기 위해서는 루비네를 설득해야 해.」"

[[dialogue]]
speaker = "クロト"
original = "「でもルヴィネについては怪しい点も多い。彼女がリクリエの側なのか、調べる必要があるだろう」"
translation = "「하지만 루비네에 대해서는 의심스러운 점도 많아. 그녀가 리크리에 쪽인지 조사할 필요가 있겠지.」"

[[dialogue]]
speaker = "unk"
original = "デネブとアルタイルの違いを掘り下げていくと、結局ルヴィネの存在に行きつく。"
translation = "데네브와 알타이르의 차이점을 파헤쳐 가다 보면 결국 루비네라는 존재에 도달한다."

[[dialogue]]
speaker = "unk"
original = "彼女が何者であれ、謎を解く鍵を握っているのは間違いないだろう。"
translation = "그녀가 누구든 수수께끼를 풀 열쇠를 쥐고 있는 것은 틀림없을 것이다."

[[dialogue]]
speaker = "クロト"
original = "「それにアルタイルに帰る方法を見つけないといけない。このままデネブに滞在し続けるわけにはいかないし」"
translation = "「그리고 알타이르로 돌아갈 방법을 찾아야 해. 이대로 데네브에 계속 머무를 수는 없으니까.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「空間の魔女の力でどうにかできないのか？」"
translation = "「공간의 마녀의 힘으로 어떻게 안 되는 거야?」"

[[dialogue]]
speaker = "リノ"
original = "「残念ながら、私だけではそこまでの力はないわね。魔王ラクシスの力でなければ平行世界の移動は不可能よ」"
translation = "「아쉽지만 나 혼자서는 그 정도의 힘은 없네. 마왕 락시스의 힘이 아니면 평행세계 이동은 불가능해.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「チナがアルタイルに来るのに転送装置を使っていたけど、その装置は壊しちゃったからねー」"
translation = "「치나가 알타이르에 올 때 전송 장치를 썼었지만, 그 장치는 부서졌으니까 말이야~」"

[[dialogue]]
speaker = "リノ"
original = "「でも心当たりがなくはないわ。ちょっと調整してみるから、目途が立ったらまた知らせるわね」"
translation = "「하지만 짐작 가는 곳이 없는 건 아니야. 조금 조정해 볼 테니까 가닥이 잡히면 다시 알려줄게.」"

[[dialogue]]
speaker = "クロト"
original = "「うん、わかった」"
translation = "「응, 알았어.」"

[[dialogue]]
speaker = "梨緒"
original = "「それと、行方の分からないベアトを探したい。彼女がスパイであるなら、こちらで捕縛しなければいけない」"
translation = "「그리고 행방을 알 수 없는 베아토를 찾고 싶어. 그녀가 스파이라면 여기서 포획해야만 해.」"

[[dialogue]]
speaker = "梨緒"
original = "「それに……もう一度彼女と話がしたい」"
translation = "「그리고…… 다시 한번 그녀와 이야기하고 싶어.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「確かにそれも必要だ。──だが我々レジスタンスには、至急解決しなければいけない問題がある！」"
translation = "「확실히 그것도 필요해. ──하지만 우리 레지스탕스에게는 시급히 해결해야 할 문제가 있다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「至急の問題！？\u3000何ですか姉さん！？」"
translation = "「시급한 문제!? 뭔데요, 언니!?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「食料だ。今まで２人だったところに、一気に人が増えたもんだから、備蓄をかなり使ってしまった」"
translation = "「식량이다. 지금까지 둘뿐이었던 곳에 갑자기 사람이 늘어나는 바람에 비축분을 꽤 써버렸어.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「バックアップメンバーからの補給までまだしばらくあるし、調達が必要だ」"
translation = "「백업 멤버로부터의 보급까지는 아직 시간이 좀 걸리니까 조달이 필요해.」"

[[dialogue]]
speaker = "フィオナ"
original = "「あぁ、なるほど……それは確かに至急解決が必要ですね……ごめんなさい」"
translation = "「아, 그렇군요…… 그건 확실히 시급히 해결해야겠네요…… 죄송해요.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふむふむ……急を要しそうなのは、ベアトの捜索と、物資の買い出しかな。じゃあ分担だね」"
translation = "「흠흠…… 급해 보이는 건 베아토 수색이랑 물자 장보기인가. 그럼 분담하자.」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアトを探すのは選管が担当する。私たちにはその責任がある」"
translation = "「베아토를 찾는 건 선관위가 담당하겠어. 우리에게는 그럴 책임이 있다.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「それならあたしもついていく。戦闘になる可能性もあるし、いざという時逃げるにも、土地勘のあるあたしがいた方がいい」"
translation = "「그럼 나도 따라가지. 전투가 벌어질 가능성도 있고, 만약의 경우 도망치기 위해서라도 지리에 밝은 내가 있는 게 나아.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「というわけで、買い出しは誰かに頼みたいんだが……」"
translation = "「그런 이유로 장보기는 누군가에게 부탁하고 싶은데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はいはーい！\u3000私行きたーい！\u3000昨日はそれどころじゃなかったし、デネブの街を見てみたいわ！」"
translation = "「네, 네~! 저 갈래요! 어제는 그럴 경황이 없었지만 데네브 거리를 구경해 보고 싶어!」"

[[dialogue]]
speaker = "クロト"
original = "「でもいいのか？\u3000俺たちが街に出たらまた見つかるかもしれない」"
translation = "「하지만 괜찮을까? 우리가 거리에 나가면 또 들킬지도 몰라.」"

[[dialogue]]
speaker = "リノ"
original = "「そこは擬装用の魔法があるから大丈夫よ。よほどのことがないとバレないわ」"
translation = "「그건 위장용 마법이 있으니까 괜찮아. 웬만한 일이 아니고서야 들키지 않을 거야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さすがおばあちゃん、抜かりないわね！」"
translation = "「역시 할머니, 빈틈없네!」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ俺もヴィーナスと一緒に行くよ。俺もデネブが今どうなってるか見たい」"
translation = "「그럼 나도 비너스랑 같이 갈게. 나도 데네브가 지금 어떻게 됐는지 보고 싶어.」"

[[dialogue]]
speaker = "クロト"
original = "「それにヴィーナスだけだと心配だし……」"
translation = "「게다가 비너스 혼자 보내면 걱정되기도 하고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっと！\u3000私迷子になったりなんかしないわよ！」"
translation = "「잠깐! 나 길 잃거나 하지 않는다고!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「はは、違いない。娘の面倒はパパに見てもらわないとな」"
translation = "「하하, 틀림없군. 딸내미 보살피는 건 파파가 맡아줘야지.」"

[[dialogue]]
speaker = "リノ"
original = "「じゃあこれを渡しておくわね。決済用のＤＩＳＣ。買い物の時はこれで会計してね」"
translation = "「그럼 이걸 건네줄게. 결제용 DISC. 쇼핑할 때는 이걸로 계산해.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ありがとう、使わせてもらうわね。でも今更だけど、レジスタンスの活動資金ってどうなってるの？」"
translation = "「고마워, 잘 쓸게. 근데 이제 와서 묻는 거지만 레지스탕스의 활동 자금은 어떻게 되는 거야?」"

[[dialogue]]
speaker = "リノ"
original = "「バックアップメンバーが用意してくれた仮想通貨を換金して使っているの。無駄遣いはできないけど、あんまりケチケチする必要はないわ」"
translation = "「백업 멤버가 준비해 준 가상 화폐를 환전해서 쓰고 있어. 낭비할 수는 없지만 너무 아낄 필요도 없단다.」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ちなみに支払用のＤＩＳＣにも特殊な処理がしてあるから、足が付くことはない。安心して使ってくれ」"
translation = "「참고로 결제용 DISC에도 특수 처리가 되어 있어서 꼬리가 밟힐 일은 없어. 안심하고 써 줘.」"

[[dialogue]]
speaker = "unk"
original = "おそらく、よほど高度なハッキング技術を持つ者がバックアップにいるんだろう。"
translation = "아마도 꽤 고도의 해킹 기술을 가진 자가 백업에 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "星騎士の関係者で、そんなことができるのは……"
translation = "성기사 관계자 중에서 그런 일을 할 수 있는 사람은……"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「まぁ、だいたい想像の通りだ。だけど名前は言うなよ？」"
translation = "「뭐, 대충 짐작하는 대로다. 하지만 이름은 말하지 마라?」"

[[dialogue]]
speaker = "unk"
original = "俺の表情を読んだのか、アポロがニヤリと笑いながら釘を刺す。"
translation = "내 표정을 읽었는지 아폴로가 씩 웃으며 못을 박는다."

[[dialogue]]
speaker = "unk"
original = "<ruby>あの人<rt>ジャスティスウィザード</rt></ruby>が生きていて、俺たちの味方をしてくれるのなら、本当に心強い。"
translation = "그 사람이 살아있고 우리 편을 들어준다면 정말 든든하다."

[[dialogue]]
speaker = "リノ"
original = "「ついていきたいのはやまやまだけど、秘密基地を空けるわけにはいかないのよね……。チャカパラ神の資料も探さないといけないし、私はお留守番するわ」"
translation = "「따라가고 싶은 마음은 굴뚝같지만 비밀기지를 비울 수는 없으니까……. 차카파라 신의 자료도 찾아야 하고 난 집을 지킬게.」"

[[dialogue]]
speaker = "フィオナ"
original = "「すみません、私も残らせてください。アルケインコードの反動でまだ魔王因子が機能していないので、一旦回復を優先させたいです」"
translation = "「죄송해요, 저도 남게 해주세요. 아르케인 코드의 반동으로 아직 마왕 인자가 기능하지 않아서 일단 회복을 우선하고 싶어요.」"

[[dialogue]]
speaker = "ラクシャ"
original = "「んじゃボクも。デネブに帰ってくるときに無茶しちゃったから、本調子に程遠くてね～」"
translation = "「그럼 나도. 데네브로 돌아올 때 무리해 버려서 컨디션이 영 아니거든~」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「よし、決まりだな」"
translation = "「좋아, 결정됐군.」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスの捜索が、梨緒、ナターシャ、アポロ。"
translation = "베아트리스 수색은 리오, 나타샤, 아폴로."

[[dialogue]]
speaker = "unk"
original = "買い出しの担当が、俺とヴィーナス。"
translation = "장보기 담당은 나와 비너스."

[[dialogue]]
speaker = "unk"
original = "秘密基地に残るのが、母さん、フィオナ、ラクシャ。"
translation = "비밀기지에 남는 것은 엄마, 피오나, 락샤."

[[dialogue]]
speaker = "unk"
original = "それぞれに分かれて、行動することになったのだった。"
translation = "각자 나뉘어 행동하게 되었다."

