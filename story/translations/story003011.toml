[[dialogue]]
speaker = "unk"
original = "クリスマスパーティーも終盤にさしかかり、ビンゴ大会が賑やかに行われていた。"
translation = "크리스마스 파티도 종반에 접어들어, 빙고 대회가 떠들썩하게 열리고 있었다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「つ、次の番号は３７ですっ。ビンゴの方、いませんかー？」"
translation = "「다, 다음 번호는 37입니다. 빙고이신 분, 안 계신가요ー?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「…………っっ！？」"
translation = "「…………윽!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「アニュラス？\u3000もしかしてビンゴだったの？」"
translation = "「아뉴라스? 혹시 빙고야?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「いや……」"
translation = "「아니……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちょっと貸して。あ、やっぱりビンゴだ！」"
translation = "「잠깐 빌려줘 봐. 아, 역시 빙고잖아!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「おーい、こっちビンゴ！\u3000アニュラスがビンゴだからーっ！」"
translation = "「이봐요, 여기 빙고! 아뉴라스가 빙고예요ー!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わぁ、初ビンゴですね！\u3000お、おめでとうございますっ。ビンゴの方はこちらに来て下さい」"
translation = "「와아, 첫 빙고네요! 추, 축하드립니다. 빙고이신 분은 이쪽으로 와 주세요.」"

[[dialogue]]
speaker = "unk"
original = "早く景品もらいに行かないと"
translation = "얼른 경품 받으러 가야지."

[[dialogue]]
speaker = "unk"
original = "行かないの？"
translation = "안 가?"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「いや、私はいい。今回は主催側だからな。ゲストを前にして私がプレゼントをもらうわけにはいかないだろう」"
translation = "「아니, 나는 됐다. 이번에는 주최 측이니까. 게스트를 앞에 두고 내가 선물을 받을 수는 없지 않겠나.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「言いたいことはわかるよ。でも貰いに行って」"
translation = "「무슨 말인지 알아. 하지만 받으러 가.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私が辞退すれば、もらえる人が増える。その方がみんな幸せになるはずだ」"
translation = "「내가 사퇴하면 받을 수 있는 사람이 늘어난다. 그편이 모두에게 행복할 터다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それは違うよ」"
translation = "「그건 아니야.」"

[[dialogue]]
speaker = "unk"
original = "俺も舞亜と同じ意見だよ"
translation = "나도 마이아랑 같은 의견이야."

[[dialogue]]
speaker = "unk"
original = "うん、違うね"
translation = "응, 아니지."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「みんなの中に、アニュラスも入ってるんだから。そんなムスッとした顔で終わらせるなんて私が嫌なの」"
translation = "「'모두' 안에는 아뉴라스도 들어있으니까. 그런 뾰로통한 얼굴로 끝내게 두는 건 내가 싫어.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「舞亜……」"
translation = "「마이아……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「いいから行って。ほら、行かないなら無理矢理背中を押すよ？」"
translation = "「됐으니까 가. 자, 안 가면 억지로 등을 떠밀 거다?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「わ、わかった！\u3000行く！\u3000行くからグリグリするなっ」"
translation = "「아, 알았다! 갈게! 갈 테니까 밀지 마라!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ビンゴおめでとうございます！\u3000えっと、プレゼントをこちらから選べますが、どれにしますか？」"
translation = "「빙고 축하드려요! 음, 선물을 여기서 고를 수 있는데, 어떤 걸로 하시겠어요?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「む……うむむ……そ、そうだな……最も金銭的な価値がないものを頼む……」"
translation = "「음…… 으으음…… 그, 그렇군…… 가장 금전적인 가치가 없는 것으로 부탁하마……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ここまで来て遠慮しなくても、とは思うのですが……」"
translation = "「여기까지 와서 사양하지 않으셔도, 라는 생각은 듭니다만……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「金銭的な価値がないものであれば、これはもしかすると全てのプレゼントの中で最も価値があるものかもしれないですよ？」"
translation = "「금전적인 가치가 없는 것이라면, 어쩌면 이건 모든 선물 중에서 가장 가치 있는 것일지도 몰라요?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「なに……？」"
translation = "「무엇이……?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ということで、アニュラスさんには新星学園の星徒会長さんから、お姫さまだっこの権利を進呈します」"
translation = "「그런 고로, 아뉴라스 씨에게는 신성 학원의 성도회장님으로부터, 공주님 안기를 받을 권리를 증정하겠습니다.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「……は？\u3000なんだそれは？\u3000いや、聞いてないぞ！」"
translation = "「……하? 그게 무슨 소리냐? 아니, 듣지 못했다고!」"

[[dialogue]]
speaker = "unk"
original = "誰の仕業だ？"
translation = "누구 짓이지?"

[[dialogue]]
speaker = "unk"
original = "俺も聞いてないんだけど"
translation = "나도 못 들은 이야기인데."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「匿名希望、となってますね……ちなみにキャンセルはＮＧだそうです」"
translation = "「익명 희망으로 되어 있네요…… 참고로 취소는 불가능하다고 합니다.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「では会長さん、おねがいしてもいいですか？」"
translation = "「그럼 회장님, 부탁드려도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "それじゃ行くよ、アニュラス"
translation = "그럼 간다, 아뉴라스."

[[dialogue]]
speaker = "unk"
original = "仕方ないか"
translation = "어쩔 수 없지."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ま、待ってくれ。あらかじめ警告しておくが、私は重いぞ？」"
translation = "「기, 기다려 줘. 미리 경고해 두겠는데, 나는 무겁다고?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「いや、あくまで比較の話だ。そこまで重いわけではないんだが……おい、会長！\u3000ちょっと待って！\u3000早まるんじゃない！」"
translation = "「아니, 어디까지나 비교 대상이 있을 때의 이야기다. 그렇게까지 무거운 건 아니지만…… 야, 회장! 잠깐 기다려! 서두르지 마!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うわぁぁ～～～～っ！\u3000なんだこれはっ！\u3000屈辱すぎるぞ～～～っ！！」"
translation = "「우와아아아아~~! 이게 무슨 짓이냐! 너무 굴욕적이다아아~~!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あー、楽しかった！\u3000こんなに楽しかったのは久し振りかもな！」"
translation = "「아ー, 즐거웠다! 이렇게 즐거웠던 건 오랜만일지도 몰라!」"

[[dialogue]]
speaker = "unk"
original = "やがてクリスマスパーティーも幕を下ろし、実行委員のみんなで外の空気を吸いに出た。"
translation = "이윽고 크리스마스 파티도 막을 내리고, 실행 위원 멤버들과 함께 바깥 공기를 쐬러 나왔다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「さすがに疲れたね。今夜はぐっすり眠れそう」"
translation = "「과연 지치네. 오늘 밤은 푹 잘 수 있겠어.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは逆に興奮して眠れないぞ！」"
translation = "「난 반대로 흥분돼서 잠이 안 온다구!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「って言いながら、横になったら一瞬で寝ちゃうんだろうね」"
translation = "「그렇게 말하면서, 눕자마자 순식간에 잠들어 버리겠지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うっ、なんでわかるんだ？」"
translation = "「윽, 그걸 어떻게 알았지?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「なんとなくね。そんな感じするし」"
translation = "「그냥 왠지. 그런 느낌이 들어서.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ううっ、夜になるとすぐ眠たくなってしまうこの体が憎いぞ……」"
translation = "「으으, 밤이 되면 금방 졸음이 쏟아지는 이 몸이 밉구나……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「健康な証拠だ。心に不調を来たしていると、なかなか快眠は難しいものだからな」"
translation = "「건강하다는 증거다. 마음에 불調가 생기면 좀처럼 숙면하기 어려운 법이니까.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それってアニュラスのことを言ってるのか？」"
translation = "「그거 아뉴라스 본인 얘기를 하는 거야?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「え……アポロちゃん？」"
translation = "「에…… 아폴로짱?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「いや、いいんだ。今更隠すことでもないしな。それに２人のことは大切な仲間だと思っている。だから何でも話したい」"
translation = "「아니, 괜찮다. 이제 와서 숨길 것도 아니고. 게다가 두 사람은 소중한 동료라고 생각한다. 그래서 뭐든 이야기하고 싶어.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「確かに私は、心に傷を受けていた。眠れぬ夜も幾度となくあった。でも、それは決して恥じることではないと、今なら言える」"
translation = "「확실히 나는 마음에 상처를 입었었다. 잠들지 못하는 밤도 수없이 많았지. 하지만 그것은 결코 부끄러운 일이 아니라고, 지금이라면 말할 수 있다.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「すべてはアニュラス・セイファートを形作っているものだから。それをなかったことにしてしまったら、私は私でなくなってしまう」"
translation = "「모든 것은 아뉴라스 세이퍼트를 형성하고 있는 요소들이니까. 그것을 없었던 일로 해버린다면, 나는 내가 아니게 되어버려.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「それを嫌だ、と思う程度には……今の自分を気に入っているみたいだしな」"
translation = "「그게 싫다고 생각할 정도로…… 지금의 내가 마음에 드는 모양이니까.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……そっか。なら、アニュラスは健康だな。怪人に堕ちることもないぞ！\u3000このあたしが保証する！」"
translation = "「……그렇구나. 그럼 아뉴라스는 건강하네. 괴인으로 타락할 일도 없어! 이 내가 보증하지!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うむ！」"
translation = "「음!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それと……今までずっと言えなかったけど……」"
translation = "「그리고…… 지금까지 줄곧 말하지 못했지만……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ずっとありがとう、アニュラス。あたしを楽しませようと、いっぱいいっぱい頑張ってくれたんだろ？」"
translation = "「늘 고마워, 아뉴라스. 나를 즐겁게 해주려고 엄청나게 노력해 준 거지?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そ、そんなことない！\u3000頑張ったのは私より舞亜の方で……」"
translation = "「그, 그렇지 않아! 노력한 건 나보다 마이아 쪽이고……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「え？\u3000ここでこっちに振るの！？」"
translation = "「에? 여기서 나한테 넘기기야!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「舞亜もだ。２人とも、本当にありがとう」"
translation = "「마이아도 마찬가지야. 둘 다 정말 고마워.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「今日は最高のクリスマスだったぞ！」"
translation = "「오늘은 최고의 크리스마스였다!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……もうっ、こんな笑顔を見せられたら、なにも言えなくなっちゃうでしょ」"
translation = "「……정말이지, 이런 미소를 보여주면 아무 말도 못 하게 되잖아.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そうだな、最後にとびきりのプレゼントをもらった」"
translation = "「그렇군, 마지막에 아주 특별한 선물을 받았다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ええっ？\u3000こんなのでいいのか？\u3000いや、もっといいものあるだろ」"
translation = "「에엣? 이런 걸로 괜찮은 거야? 아니, 더 좋은 게 있을 텐데.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そうかもしれないな。でも今はこれでいいんだ」"
translation = "「그럴지도 모르지. 하지만 지금은 이걸로 충분하다.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うんうん！」"
translation = "「응응!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ほんっと２人とも欲がないなぁ！\u3000でも、すごくいいぞ！\u3000大好きだ！」"
translation = "「정말 둘 다 욕심이 없네! 하지만 아주 좋아! 정말 좋아해!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あはははっ、私も大好き！」"
translation = "「아하하, 나도 정말 좋아해!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「私もっ……だ、だだだ……」"
translation = "「나도…… 조, 조조조……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「だいすき……だぞっ」"
translation = "「좋아한다……구.」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「もうっ、何を言わせるんだっ！\u3000こんな恥ずかしいこと、二度と言わないからなっ！」"
translation = "「정말이지, 무슨 말을 시키는 거냐! 이런 창피한 소리, 두 번 다시 안 할 거니까!」"

