[[dialogue]]
speaker = "unk"
original = "第１４話,創造神の消滅,B"
translation = "제14화, 창조신의 소멸, B"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「『だめだ──だめだ──だめだ──』」"
translation = "「『안 된다── 안 된다── 안 된다──』」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「『わたしをけしてはならない──せいちょうする、せかいの、ゆくすえを──』」"
translation = "「『나를 없애서는 안 된다── 성장하는 세계의 앞날을──』」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「『かんりしなければ──わたしが、わたしが────』」"
translation = "「『관리해야 한다── 내가, 내가────』」"

[[dialogue]]
speaker = "unk"
original = "俺たちを苦しめ続けたホロウ・ルヴィネ。その最後の１体が消滅する。そして──"
translation = "우리를 계속해서 괴롭혀온 홀로우 루비네. 그 마지막 개체가 소멸한다. 그리고──"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ────────ィィィィ────────！？」"
translation = "「기────────이이이이────────!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おぉおぉぉおぉぉおぉぉおおお────ッ！！！」"
translation = "「오오오오오오오오오오오오────앗!!!」"

[[dialogue]]
speaker = "unk"
original = "イメージするのは、強大な創造神を掴める掌。"
translation = "이미지하는 것은 거대한 창조신을 움켜쥘 수 있는 손바닥."

[[dialogue]]
speaker = "unk"
original = "握り、搾り、潰すことのできる巨大な暴力。"
translation = "쥐고, 짜내고, 으스러뜨릴 수 있는 거대한 폭력."

[[dialogue]]
speaker = "unk"
original = "俺が知りうる、最も強力な力を具現化させる──！！"
translation = "내가 아는 가장 강력한 힘을 구현시킨다──!!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「インフィニット・ディザスター────！！！！」"
translation = "「인피니트 디저스터────!!!!」"

[[dialogue]]
speaker = "unk"
original = "厄災の右腕の力を解放し、顕現させたディザスターハンドで『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を拘束する──"
translation = "재액의 오른팔의 힘을 해방해 현현시킨 디저스터 핸드로 『<ruby>XELOS<rt>제로스</rt></ruby>』를 구속한다──"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ガ────ギャ──────ギギギギイィィィィ！？」"
translation = "「가──── 갸────── 기기기기이이이이!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「砕けろぉぉぉおぉぉおおおおッ────！！！！」"
translation = "「부서져라아아아아아아아아앗────!!!!」"

[[dialogue]]
speaker = "unk"
original = "この世界の全てを創りし神──創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は。"
translation = "이 세계의 모든 것을 만든 신── 창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』는."

[[dialogue]]
speaker = "unk"
original = "跡形もなく……消滅した。"
translation = "흔적도 없이…… 소멸했다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………終わったな」"
translation = "「…………끝났네」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい。これでもう……」"
translation = "「네. 이걸로 이제……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「リクリエが起こらない世界が、来るのね」"
translation = "「리크리에가 일어나지 않는 세계가 오는 거네」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「よかった……デネブも、アルタイルも……全部守れたんだね、私たち……！」"
translation = "「다행이야…… 데네브도, 알타이르도…… 전부 지켜낸 거네, 우리……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……ええ。これからはみんな、ずっと一緒よ。ベアト」"
translation = "「……응. 이제부터는 모두 계속 함께야. 베아트」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「────っ！」"
translation = "「────윽!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……魔王、どうかした？」"
translation = "「……마왕, 왜 그래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「感覚でしかないんだけど……冥界の視座にいるベガの『俺』が……消えていってるみたいだ……」"
translation = "「감각일 뿐이지만…… 명계의 시좌에 있는 베가의 『나』가…… 사라져가고 있는 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "厄災の右腕を、２つのアルケインカオスクエーサーで制御してから──うっすらと感じ続けていた『彼』の存在。"
translation = "재액의 오른팔을 두 개의 아르케인 카오스 퀘이서로 제어한 뒤부터 희미하게 계속 느끼고 있었던 『그』의 존재."

[[dialogue]]
speaker = "unk"
original = "それが薄れている──どんどん『彼』の存在がかき消えていくのが、分かった。"
translation = "그것이 옅어지고 있다── 점점 『그』의 존재가 지워져 가는 것을 알 수 있었다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……安心してくれたのかしら。全てを守ることができたから」"
translation = "「……안심해 준 걸까. 모든 것을 지킬 수 있었으니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……そうだと思う。俺に魂を渡してくれた後も、ずっとあの暗闇に佇んで、見守ってくれていたみたいだ──」"
translation = "「아아…… 그럴 거야. 내게 영혼을 넘겨준 뒤에도 계속 그 어둠 속에 서서 지켜봐 주고 있었던 것 같아──」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "（…………さて、と）"
translation = "（…………자, 그럼）"

[[dialogue]]
speaker = "unk"
original = "俺は、遠い暗黒の世界にいる『彼』に向かって、黙祷をささげた。"
translation = "나는 먼 암흑의 세계에 있는 『그』를 향해 묵념을 올렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう──ベガの『俺』。君のおかげで、世界を守ることができた……」"
translation = "「고마워── 베가의 『나』. 너 덕분에 세계를 지킬 수 있었어……」"

[[dialogue]]
speaker = "unk"
original = "こうして森羅歴──３度目のリクリエ防衛は成功した。"
translation = "이렇게 신라력── 세 번째 리크리에 방위는 성공했다."

[[dialogue]]
speaker = "unk"
original = "俺たちは“神”による保険を失ったが──必ず、世界を良い方向へ動かしていくと誓おう。"
translation = "우리는 “신”에 의한 보험을 잃었지만── 반드시 세계를 좋은 방향으로 움직여 나가겠다고 맹세하자."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな、帰ろう」"
translation = "「모두, 돌아가자」"

[[dialogue]]
speaker = "unk"
original = "上手くいく保証はない。だけど、『ＸＥＬＯＳ』を憎しみから滅ぼすのではなく……"
translation = "잘 될 거라는 보장은 없다. 하지만 『XELOS』를 증오로 멸망시키는 것이 아니라……"

[[dialogue]]
speaker = "unk"
original = "「お父様が成し得なかったことを引き継ぐ」と宣言して見せたルヴィネと一緒なら、きっと上手く行くと確信していた。"
translation = "「아버님이 이루지 못한 것을 이어받겠다」고 선언해 보인 루비네와 함께라면 분명 잘 될 것이라 확신했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちが守った世界に……！」"
translation = "「우리가 지켜낸 세계로……!」"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（…………ありがとう、アルタイルの『俺』）"
translation = "（…………고마워, 알타이르의 『나』）"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を倒すって約束、果たしてくれて──）"
translation = "（『<ruby>XELOS<rt>제로스</rt></ruby>』를 쓰러뜨리겠다는 약속, 지켜줘서──）"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（今度こそ、守ることができた……）"
translation = "（이번에야말로 지켜낼 수 있었어……）"

[[dialogue]]
speaker = "unk"
original = "……手遅れではあったけれど。"
translation = "……이미 늦어버리긴 했지만."

[[dialogue]]
speaker = "unk"
original = "……もう何も取り返しなんてつかないけれど。"
translation = "……이제 아무것도 되돌릴 수 없지만."

[[dialogue]]
speaker = "unk"
original = "それでも世界を守ることができた──そして、アルタイルとデネブで暮らす、愛しい家族のみんなのことも。"
translation = "그래도 세계를 지킬 수 있었다── 그리고 알타이르와 데네브에서 살아가는 사랑하는 가족 모두도."

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（……だから、思い残すことはもう、何もない）"
translation = "（……그러니 미련은 이제 아무것도 없어）"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（…………俺も、逝こう）"
translation = "（…………나도 가야겠지）"

[[dialogue]]
speaker = "unk"
original = "闇の世界を掻いて、前へ進む。"
translation = "어둠의 세계를 헤치며 앞으로 나아간다."

[[dialogue]]
speaker = "unk"
original = "奥の奥、底の底──<ruby>咎人<rt>とがにん</rt></ruby>が向かうべき、地獄と呼べる場所を目指して。"
translation = "깊고 깊은 곳, 바닥 중의 바닥── 죄인이 향해야 할 지옥이라 부를 수 있는 장소를 목표로."

[[dialogue]]
speaker = "unk"
original = "進む──進む──進む──"
translation = "나아간다── 나아간다── 나아간다──"

[[dialogue]]
speaker = "unk"
original = "恐怖で竦む足を叱咤して、さらに深淵を目指して──"
translation = "공포로 움츠러드는 발을 다그치며 더욱 심연을 목표로──"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "「──そっちじゃないですよ、魔王様？」"
translation = "「──그쪽이 아니에요, 마왕님?」"

[[dialogue]]
speaker = "unk"
original = "不意に誰かが──俺の右手を掴んだ。"
translation = "느닷없이 누군가가── 내 오른손을 붙잡았다."

[[dialogue]]
speaker = "unk"
original = "呪いと血にまみれていた俺の右手を。慈しむように、そっと優しく、包んでくれた──"
translation = "저주와 피로 얼룩져 있던 내 오른손을. 아끼는 듯이 살며시, 상냥하게 감싸주었다──"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（……………………リノ？）"
translation = "（……………………리노?）"

[[dialogue]]
speaker = "unk"
original = "振り向いた先にいたのは、愛しい恋人の姿──それだけじゃない。"
translation = "돌아본 끝에 있던 것은 사랑하는 연인의 모습── 그뿐만이 아니다."

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（……母さんに、リーリアも？）"
translation = "（……어머니에 리리아도?）"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「兄さんはおっちょこちょいですね～。手間がかかる兄を導くのも、妹の務めですけど♪」"
translation = "「오빠는 덜렁이라니까요~. 손이 많이 가는 오빠를 이끄는 것도 여동생의 임무지만요♪」"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（──なんで）"
translation = "（──어째서）"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「昔を思い出すな。お前はすぐにふらっとどこかへ行ってしまうから、手を焼いたものだ」"
translation = "「옛날 생각이 나는군. 너는 금방 불쑥 어딘가로 가버리곤 해서 애를 먹였었지」"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（────どう、して）"
translation = "（────어떻게）"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「頑張ったではないか、お兄！\u3000その頑張り、余が褒めてやろう！！」"
translation = "「힘내지 않았느냐, 오라버니! 그 노력, 짐이 칭찬해주마!!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「魔王様。永きに渡るお勤め、ご苦労様でした」"
translation = "「마왕님. 오랜 시간에 걸친 노고, 고생 많으셨습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「私たちの仇討ち、ありがとうございます！\u3000お兄さん♪」"
translation = "「우리 복수, 고마워요! 오빠♪」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「ん。おにぃ、がんばった」"
translation = "「응. 오빠, 힘냈어」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「手を貸すことができず、歯がゆい思いでしたが──ずっと見ていましたよ！」"
translation = "「힘을 빌려드리지 못해 안타까웠지만── 계속 지켜보고 있었어요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「魔王ちゃん、お疲れ様～♪」"
translation = "「마왕짱, 수고했어~♪」"

[[dialogue]]
speaker_original = "ベガのクロト"
speaker_translation = "베가의 클로토"
original = "（ネビュラの、みんな────）"
translation = "（네뷸라의 모두들────）"

[[dialogue]]
speaker = "unk"
original = "俺自身が手にかけてしまった、最愛の家族たち。"
translation = "나 자신이 손을 대고 말았던 가장 사랑하는 가족들."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いきましょう──魔王様。今度こそ、私たちと一緒に」"
translation = "「가요── 마왕님. 이번에야말로 우리와 함께」"

[[dialogue]]
speaker = "unk"
original = "──これは夢なのか。幻なのか。"
translation = "──이것은 꿈인가. 환상인가."

[[dialogue]]
speaker = "unk"
original = "罪と向き合いきれない俺自身が生み出した、<ruby>泡沫<rt>うたかた</rt></ruby>の……？"
translation = "죄와 마주하지 못한 나 자신이 만들어낸 물거품 같은……?"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「──違うよ。これは夢でも幻でもない。キミの大切な恋人と、母親と、家族さ」"
translation = "「──아니야. 이건 꿈도 환상도 아니야. 너의 소중한 연인과, 어머니와, 가족이지」"

[[dialogue]]
speaker = "unk"
original = "…………ラクシャ？"
translation = "…………락샤?"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「守護天使の目から見て、キミには温情を与えるべきと判断した。犯してしまった罪は消えないけれど……それでもキミは、救われるべきだ」"
translation = "「수호천사의 눈으로 보기에, 너에게는 온정을 베풀어야 한다고 판단했어. 저질러 버린 죄는 사라지지 않지만…… 그래도 너는, 구원받아야 해」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……あんまりこういう特別扱いはよくないから、内緒だよ。パテルに知られたら、ボクが怒られちゃうからね？」"
translation = "「……너무 이런 특별대우를 하는 건 좋지 않으니까, 비밀이야. 파텔이 알게 되면, 내가 혼나버릴 테니까 말이야?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「さぁ、魔王様っ」"
translation = "「자, 마왕님」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「兄さんっ」"
translation = "「오빠」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ぼうっとするな。早く来い」"
translation = "「멍하니 있지 마. 빨리 와」"

[[dialogue]]
speaker = "unk"
original = "──守護天使ラクシャ。"
translation = "──수호천사 락샤."

[[dialogue]]
speaker = "unk"
original = "────本当に、ありがとう。"
translation = "────정말로, 고마워."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「どういたしまして、ベガのラクシス──ううん」"
translation = "「천만에요, 베가의 락시스── 아니」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「──緋宮クロト」"
translation = "「──히노미야 쿠로토」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「来世では、愛しい人たちに囲まれて、幸せに満ち満ちた……『普通』の人生が送れるように願ってるよ」"
translation = "「내세에서는, 사랑하는 사람들에게 둘러싸여서, 행복이 가득한…… 『평범한』 인생을 보낼 수 있기를 빌게」"

[[dialogue]]
speaker = "unk"
original = "こうしてベガの世界で戦い続け、リクリエによって堕とされた──１人の少年の物語にも、幕は下りたのだった。"
translation = "이렇게 베가의 세계에서 계속 싸워왔고, 리크리에에 의해 타락했던── 한 소년의 이야기에도, 막이 내린 것이었다."

