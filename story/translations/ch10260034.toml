[[dialogue]]
speaker = "unk"
original = "第４話,後輩とマジカルドリーム,P"
translation = "제4화, 후배와 매지컬 드림, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺はリーリアと共にネビュラの基地へと足を運んでいた。"
translation = "그날, 나는 리리아와 함께 네뷸라 기지로 발걸음을 옮기고 있었다."

[[dialogue]]
speaker = "リーリア"
original = "「ふぅ、これでセドナ長官への報告終わりで～す♪」"
translation = "「후우, 이걸로 세도나 장관님께 보고 끝이에~요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「これで私、ネビュラの魔女であると同時に、『正式に』星騎士にもなったわけですね☆」"
translation = "「이걸로 저, 네뷸라의 마녀인 동시에 『정식으로』 성기사도 된 셈이네요☆」"

[[dialogue]]
speaker = "unk"
original = "リーリアはアルカンシェルフォームに覚醒したことで、俺を通じて星力が供給されるようになり、魔力と合わせて戦うことができるようになった。"
translation = "리리아는 아르캉시엘 폼으로 각성함으로써, 나를 통해 성력이 공급되게 되어 마력과 합쳐서 싸울 수 있게 되었다."

[[dialogue]]
speaker = "unk"
original = "それによって、彼女は『魔女の星騎士』として学園から正式に認められたのである。今日はそのことをセドナさんに伝えに来たというわけだった。"
translation = "그로 인해 그녀는 『마녀 성기사』로서 학원으로부터 정식으로 인정받은 것이다. 오늘은 그 사실을 세도나 씨에게 전하러 온 것이었다."

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、それじゃあ、学園に帰りましょうか♪」"
translation = "「선배, 그럼 학원으로 돌아갈까요♪」"

[[dialogue]]
speaker = "unk"
original = "俺とリーリアは手を恋人繋ぎにして、基地を後にする。"
translation = "나와 리리아는 손을 깍지 끼고 기지를 뒤로한다."

[[dialogue]]
speaker = "リーリア"
original = "「えへへ♪」"
translation = "「에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "学園に戻った後、俺は星徒会の仕事がまだ残っており、リーリアが手伝ってくれることになった――のだが。"
translation = "학원으로 돌아온 뒤, 나는 성도회 업무가 아직 남아 있어 리리아가 도와주기로 했다――만."

[[dialogue]]
speaker = "リーリア"
original = "「ねぇ、センパ～イ<emoji=heart04>\u3000今日はもう、お疲れじゃないですか～？」"
translation = "「저기요, 선배~<emoji=heart04> 오늘은 이제 피곤하지 않으세요~?」"

[[dialogue]]
speaker = "unk"
original = "日も暮れてしまったところで、彼女は俺の膝の上に乗って来て、囁く。"
translation = "해도 저물어버린 때에, 그녀는 내 무릎 위에 올라타 속삭인다."

[[dialogue]]
speaker = "unk"
original = "リーリア、これだと集中が……"
translation = "리리아, 이러면 집중이……"

[[dialogue]]
speaker = "リーリア"
original = "「え～？\u3000もう夜遅いですし、仕事はまた明日にしましょうよ～」"
translation = "「에~? 벌써 밤도 늦었으니, 일은 내일 다시 하자고요~」"

[[dialogue]]
speaker = "リーリア"
original = "「今日はネビュラ基地にも出向いたわけですし、十分仕事したと思いますよ～？」"
translation = "「오늘은 네뷸라 기지까지 다녀왔으니, 충분히 일했다고 생각한다고요~?」"

[[dialogue]]
speaker = "リーリア"
original = "「そ・れ・に☆\u3000可愛い後輩を構うのも、彼氏としての仕事のうち……じゃないですか？」"
translation = "「그·리·고☆ 귀여운 후배를 돌보는 것도 남자친구로서의 일 중 하나…… 아닌가요?」"

[[dialogue]]
speaker = "unk"
original = "そこまで言われてしまっては、従うしかない。"
translation = "거기까지 말을 들으니 따를 수밖에 없다."

[[dialogue]]
speaker = "unk"
original = "俺はボールペンを机の上に置く。"
translation = "나는 볼펜을 책상 위에 내려놓는다."

[[dialogue]]
speaker = "リーリア"
original = "「あっ……えへへ♪\u3000さすがセンパイ、可愛い後輩の優先順位がわかってますね～☆」"
translation = "「앗…… 에헤헤♪ 역시 선배, 귀여운 후배의 우선순위를 알고 계시네요~☆」"

[[dialogue]]
speaker = "リーリア"
original = "「は～い、それじゃあ今日は、マジカルお疲れ様でした～♪\u3000センパイ、よく頑張りましたね～。よしよし<emoji=heart04>」"
translation = "「네~에, 그럼 오늘은 매지컬 수고하셨습니다~♪ 선배, 정말 고생 많으셨어요. 착하다 착해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアが俺の髪を優しく撫でる。"
translation = "리리아가 내 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker = "リーリア"
original = "「ねぇ、センパイ？\u3000今日、ネビュラに行った時のことなんですけど……」"
translation = "「저기, 선배? 오늘 네뷸라에 갔을 때 말인데요……」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、もしかして私が学園を離れたりするかもしれないとか、ちょっと不安に思ってたりしました？」"
translation = "「선배, 혹시 제가 학원을 떠나게 될지도 모른다거나 해서 조금 불안해하고 있었나요?」"

[[dialogue]]
speaker = "unk"
original = "俺は驚いて彼女の顔を見やる。"
translation = "나는 놀라서 그녀의 얼굴을 바라본다."

[[dialogue]]
speaker = "リーリア"
original = "「ふふっ、わかるに決まっているじゃないですか～。私、センパイの彼女なんですから♪」"
translation = "「후훗, 당연히 알죠~. 저, 선배의 여자친구니까요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「それで、ちゃんと伝えておきたいんですけど……私はセンパイのそばから離れたりしませんから、安心して下さい」"
translation = "「그래서 제대로 전해두고 싶은데…… 저는 선배 곁에서 떠나지 않을 거니까 안심하세요.」"

[[dialogue]]
speaker = "リーリア"
original = "「もし、星騎士になることをセドナ長官から反対されて、戻って来いとか言われてたら、大喧嘩になってましたよ」"
translation = "「만약 성기사가 되는 걸 세도나 장관님이 반대해서 돌아오라고 했다면, 대판 싸웠을 거예요.」"

[[dialogue]]
speaker = "リーリア"
original = "「だって……私はもう、とっくの昔に、新星学園の星騎士、渋谷リーリアになっちゃってたんですから」"
translation = "「그게…… 저는 이미 아주 오래전에 신성학원의 성기사, 시부야 리리아가 되어버렸으니까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイに恋する１人の乙女にも、ね？\u3000ふふっ<emoji=heart04>」"
translation = "「선배를 사랑하는 한 명의 소녀이기도 하고요, 그쵸? 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って笑ってみせるリーリアを、俺は思わず抱き締める。"
translation = "그렇게 말하며 웃어 보이는 리리아를 나는 나도 모르게 껴안는다."

[[dialogue]]
speaker = "リーリア"
original = "「んっ……<emoji=heart04>\u3000もう、センパイってば、私のことがそんなに可愛くて仕方なくなっちゃいました？\u3000しょうがないですね～<emoji=heart04>」"
translation = "「응……<emoji=heart04> 정말, 선배는 제가 그렇게나 귀여워서 어쩔 줄 모르게 되어버렸나요? 어쩔 수 없네요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアも俺の背中に手を回して来て、お互いに抱き合う。"
translation = "리리아도 내 등에 손을 돌려와 서로를 껴안는다."

[[dialogue]]
speaker = "unk"
original = "そのまま、彼女は続ける。"
translation = "그대로 그녀는 말을 잇는다."

[[dialogue]]
speaker = "リーリア"
original = "「私、この学園に来てから、星騎士として戦う以外にも、やりたいことができたんです」"
translation = "「저, 이 학원에 오고 나서 성기사로서 싸우는 것 말고도 하고 싶은 일이 생겼어요.」"

[[dialogue]]
speaker = "unk"
original = "やりたいこと？"
translation = "하고 싶은 일?"

[[dialogue]]
speaker = "リーリア"
original = "「はい。現状、私はあくまでも特殊な例――『星力を使える魔女』として、特別に星騎士として認められた状態です」"
translation = "「네. 현재 저는 어디까지나 특수한 사례―― 『성력을 사용할 수 있는 마녀』로서 특별히 성기사로 인정받은 상태예요.」"

[[dialogue]]
speaker = "リーリア"
original = "「なので、私以外の魔女が新星学園に入学したいと言っても、簡単には許可されないと思うんですよね」"
translation = "「그래서 저 이외의 마녀가 신성학원에 입학하고 싶다고 해도 쉽게 허가되지는 않을 거라고 생각하거든요.」"

[[dialogue]]
speaker = "リーリア"
original = "「ですが、私という前例が出来たんですから……これからは少しずつ『魔女の星騎士』も増えて行って欲しいと思っています」"
translation = "「하지만 저라는 전례가 생겼으니까…… 앞으로는 조금씩 『마녀 성기사』도 늘어갔으면 좋겠어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「私、魔女と人間界の橋渡しができる『魔女の友好大使』になりたいんです」"
translation = "「저, 마녀와 인간계의 가교가 될 수 있는 『마녀 우호 대사』가 되고 싶어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「今後、未来に生まれて来る魔女が望むなら……自由に人間界へ来て、見聞を広めて行けるように」"
translation = "「앞으로 미래에 태어날 마녀가 원한다면…… 자유롭게 인간계로 와서 견문을 넓혀갈 수 있도록요.」"

[[dialogue]]
speaker = "リーリア"
original = "「私は人間界に来て、自分のやりたいことや、大切なものを見つけられましたから」"
translation = "「저는 인간계에 와서 제가 하고 싶은 일이나 소중한 것들을 찾을 수 있었으니까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「今はまだ、セドナ長官も首を縦には振らないでしょうけど、私がこれからメリットを示し続けることで、いつか必ず説得してみせます」"
translation = "「지금은 아직 세도나 장관님도 고개를 끄덕이지 않겠지만, 제가 앞으로 메리트를 계속 보여줌으로써 언젠가 반드시 설득해 보이겠어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「魔女と人間界が真にウィンウィンな関係を築くこと……それが、私の目指すところですから♪」"
translation = "「마녀와 인간계가 진정으로 윈윈하는 관계를 구축하는 것…… 그것이 제가 목표로 하는 바니까요♪」"

[[dialogue]]
speaker = "unk"
original = "素敵な夢だな"
translation = "멋진 꿈이네"

[[dialogue]]
speaker = "リーリア"
original = "「ふふっ、そうでしょ？\u3000まさにマジカルドリームです♪」"
translation = "「후훗, 그렇죠? 그야말로 매지컬 드림이에요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「なのでセンパイ、人間界側の友好大使として、これからも私と末永く仲良くして下さいね♪」"
translation = "「그러니까 선배, 인간계 측의 우호 대사로서 앞으로도 저와 오래오래 사이좋게 지내주세요♪」"

[[dialogue]]
speaker = "unk"
original = "リーリアと一緒にいる"
translation = "리리아와 함께 있는다"

[[dialogue]]
speaker = "unk"
original = "ああ、何があってもずっと"
translation = "아아, 무슨 일이 있어도 계속"

[[dialogue]]
speaker = "リーリア"
original = "「えへへ♪\u3000約束ですよ？」"
translation = "「에헤헤♪ 약속이에요?」"

[[dialogue]]
speaker = "リーリア"
original = "「ん～……<emoji=heart04>」"
translation = "「으음~……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、仲良く甘い夜の時間を過ごすのだった――"
translation = "그러고 나서 우리들은 오붓하고 달콤한 밤의 시간을 보내는 것이었다――"

