[[dialogue]]
speaker = "unk"
original = "第１話,祓魔師と名探偵,P"
translation = "제1화, 엑소시스트와 명탐정, P"

[[dialogue]]
speaker = "unk"
original = "ある日の昼休み、昼食をしにカフェテリアへ向かうと、見知った２人から声をかけられた。"
translation = "어느 날 점심시간, 점심을 먹으러 카페테리아로 향하자 아는 사이인 두 사람으로부터 목소리가 들려왔다."

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、会長くんだ！\u3000こんにちは～♪」"
translation = "「앗, 회장군이다! 안녕~♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「やあ、助手。どうやらキミも昼食をしにきたようだね」"
translation = "「여어, 조수. 아무래도 너도 점심을 먹으러 온 모양이네」"

[[dialogue]]
speaker = "フェリシー"
original = "「それならせっかくだし、一緒に食べようよ！\u3000私の隣が空いてるから、どうぞ♪」"
translation = "「그럼 이왕 이렇게 된 거 같이 먹자! 내 옆자리 비어있으니까 이쪽으로 와♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は流星学園２年生の、恵原フェリシー。この前解決した、保健室の事件で知り合った星騎士だ。"
translation = "그녀는 유성학원 2학년인 에바라 펠리시. 얼마 전 해결한 보건실 사건에서 알게 된 성기사다."

[[dialogue]]
speaker = "unk"
original = "イタリア出身で日本人とイタリア人のハーフ。家業を継ぎ、『異変』の依頼を受けて解決する『祓魔師』でもある。"
translation = "이탈리아 출신으로 일본인과 이탈리아인의 혼혈. 가업을 이어받아 『이변』 의뢰를 받고 해결하는 『엑소시스트』이기도 하다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ここ最近、事件の調査続きで、キミとはなかなか会えずにいたから、久しぶりに話せて嬉しいよ」"
translation = "「최근 사건 조사 때문에 너랑은 좀처럼 만날 수 없었는데, 오랜만에 대화할 수 있어서 기뻐」"

[[dialogue]]
speaker = "unk"
original = "一方の彼女は、流星市国で有名な『日傘探偵』こと、流星学園１年生、ジュエリー・ブラウン。"
translation = "한편 그녀는 유성시국에서 유명한 『양산 탐정』이자 유성학원 1학년, 주얼리 브라운."

[[dialogue]]
speaker = "unk"
original = "１度彼女の部屋を掃除したことがきっかけで仲よくなり、俺はたまに助手（仮）として、探偵の仕事を手伝っていたりする。"
translation = "한 번 그녀의 방을 청소해 준 것을 계기로 친해져서 나는 가끔 조수(가칭)로서 탐정 일을 돕기도 한다."

[[dialogue]]
speaker = "unk"
original = "そういえば、２人は友達なんだっけ"
translation = "그러고 보니 둘이 친구였지"

[[dialogue]]
speaker = "フェリシー"
original = "「うん！\u3000『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』繋がりでね」"
translation = "「응! 『선성자』 인연으로 말이야」"

[[dialogue]]
speaker = "unk"
original = "選星者とは、女神から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のこと。天からの啓示で、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられるという。"
translation = "선성자란 여신으로부터 『역직』을 부여받은 자를 말한다. 하늘의 계시로 태어나면서부터 그 사실을 자각하고 역직에 따른 특수한 능력을 부여받는다고 한다."

[[dialogue]]
speaker = "フェリシー"
original = "「役職は私が『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』で、ジュエリーは『名探偵』」"
translation = "「역직은 내가 『엑소시스트』고 주얼리가 『명탐정』」"

[[dialogue]]
speaker = "フェリシー"
original = "「出会ったきっかけは、まだ学園に入学する前、エクソシストとして依頼を受けて、異変の正体を追っていた時のことで――」"
translation = "「만나게 된 계기는 아직 학원에 입학하기 전, 엑소시스트로서 의뢰를 받고 이변의 정체를 쫓고 있었을 때인데――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「偶然、フェリシーと出会ったんだよ。私も別の依頼主から受けた事件を追っていた最中にね」"
translation = "「우연히 펠리시와 만났어. 나도 다른 의뢰인으로부터 받은 사건을 쫓고 있던 도중에 말이지」"

[[dialogue]]
speaker = "ジュエリー"
original = "「つまりは、事件の行き着く先……『謎』の正体が同じだったというわけさ。あの時はまさに運命の出会いだったね」"
translation = "「즉 사건의 종착지…… 『수수께끼』의 정체가 같았다는 소리야. 그때는 정말 운명적인 만남이었지」"

[[dialogue]]
speaker = "フェリシー"
original = "「そこで２人で協力して、事件を解決したんだ！」"
translation = "「그래서 둘이 협력해서 사건을 해결했어!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それ以来、連絡先を交換して、友人として交流したり、お互いの依頼で協力し合ったりする仲になったというわけさ」"
translation = "「그 이후로 연락처를 교환하고 친구로서 교류하거나 서로의 의뢰를 돕는 사이가 된 거야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、そうだ。ところで――実はキミにまた、助手として協力をお願いしたいと思っていたんだよ」"
translation = "「아아, 맞다. 그런데―― 사실 너에게 또 조수로서 협력을 부탁하고 싶다고 생각했거든」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そう、このところ私が追っていた事件の調査協力をね。よければ、後で相談してもいいかな？」"
translation = "「그래, 최근 내가 쫓고 있던 사건의 조사 협력이야. 괜찮다면 나중에 상담해도 될까?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「――ありがとう。愛しているよ、我が助手」"
translation = "「――고마워. 사랑해, 나의 조수」"

[[dialogue]]
speaker = "フェリシー"
original = "「は、話には聞いてたけど、ジュエリーのその『愛してる』っていうの、本当に言ってるんだね……」"
translation = "「이, 이야기는 들었지만 주얼리의 그 『사랑해』라는 거 정말로 하는 말이구나……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、もちろんだとも。助手は我が『運命の君』であるという、『予言者』のお墨付きだからね」"
translation = "「아아, 물론이지. 조수는 나의 『운명의 그대』라는 『예언자』의 보증이 있으니까」"

[[dialogue]]
speaker = "フェリシー"
original = "「でも、会長くんが助手として手伝ってくれるのか～。なんかちょっと羨ましいな～」"
translation = "「하지만 회장군이 조수로 도와주는구나~ 왠지 조금 부럽네~」"

[[dialogue]]
speaker = "フェリシー"
original = "「ねぇ、今度、私も依頼が来たら、会長くんに助手役をお願いしちゃダメかな？」"
translation = "「있잖아, 나중에 나도 의뢰가 들어오면 회장군한테 조수 역할을 부탁하면 안 될까?」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんが手伝ってくれたら、頼もしいかもって思ったんだけど……」"
translation = "「회장군이 도와주면 든든할 것 같아서……」"

[[dialogue]]
speaker = "フェリシー"
original = "「――いいの？\u3000グラッチェ♪\u3000ありがとう、会長くん！」"
translation = "「――정말? 그라체♪ 고마워, 회장군!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ……さらっと助手の手を取り、顔を近づけてお願いするとは、相変わらず大胆だね、フェリシー」"
translation = "「흠…… 자연스럽게 조수의 손을 잡고 얼굴을 가까이 대며 부탁하다니, 여전히 대담하네 펠리시」"

[[dialogue]]
speaker = "フェリシー"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「しかも、本人に自覚のない、天然の技ときた。これはなかなか手強いライバルになりそうだよ」"
translation = "「게다가 본인은 자각이 없는 천연 기술이라니. 이건 꽤나 만만치 않은 라이벌이 되겠어」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ……！\u3000ついまた手を握っちゃってた！\u3000ごめんごめん。てへへ」"
translation = "「앗……! 나도 모르게 또 손을 잡고 있었네! 미안 미안. 테헤헤」"

[[dialogue]]
speaker = "ジュエリー"
original = "「フェリシーの距離感が近過ぎることを除いても、助手とはもうすっかり仲良くなっているようだね」"
translation = "「펠리시의 거리감이 너무 가까운 걸 제외하더라도 조수와는 이미 꽤 친해진 모양이네」"

[[dialogue]]
speaker = "フェリシー"
original = "「うん！\u3000実際に話してみて、会長くんとは気が合いそうだなって思ったよ」"
translation = "「응! 실제로 대화해 보니까 회장군이랑은 마음이 잘 맞을 것 같다고 생각했거든」"

[[dialogue]]
speaker = "フェリシー"
original = "「この前もお互いの趣味の話になって、私がキャンプ好きだって教えたんだけど――」"
translation = "「저번에도 서로 취미 이야기를 하다가 내가 캠핑을 좋아한다고 알려줬는데――」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんも実はバイトでサバイバル経験があることが分かって、盛り上がったんだよね～」"
translation = "「회장군도 사실 알바 때문에 서바이벌 경험이 있다는 걸 알게 돼서 분위기가 달아올랐지 뭐야~」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そういえば、フェリシーも学園に来る前、エクソシストの修行でサバイバル経験をしたことがあると言っていたね」"
translation = "「그러고 보니 펠리시도 학원에 오기 전 엑소시스트 수행으로 서바이벌 경험을 한 적이 있다고 했었지」"

[[dialogue]]
speaker = "フェリシー"
original = "「うん、当時は何もわからなくて大変だったけど、今では１人でもキャンプに行くくらい好きになっちゃったよ」"
translation = "「응, 당시에는 아무것도 몰라서 힘들었지만 지금은 혼자서도 캠핑을 갈 정도로 좋아하게 됐어」"

[[dialogue]]
speaker = "フェリシー"
original = "「それで、今度の長期休暇の時は、会長くんと一緒にキャンプでも行こうかって話してたんだよね～」"
translation = "「그래서 이번 장기 휴가 때는 회장군이랑 같이 캠핑이라도 갈까 이야기하고 있었거든~」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんから、夏のリゾート結界でのサバイバル合宿したって話を聞いたら、羨ましくなっちゃってさ～」"
translation = "「회장군한테 여름에 리조트 결계에서 서바이벌 합숙을 했다는 이야기를 들으니까 부러워져서 말이야~」"

[[dialogue]]
speaker = "ジュエリー"
original = "「まさか、２人でかい？」"
translation = "「설마 둘이서 가는 건가?」"

[[dialogue]]
speaker = "フェリシー"
original = "「え？\u3000まだ具体的な予定を決めたわけじゃないから、人数は特に考えてなかったけど、ソフレは誘っても来ない気がするしな～」"
translation = "「에? 아직 구체적인 예정은 정한 게 아니라서 인원수는 딱히 생각 안 해봤는데, 소프레는 불러도 안 올 것 같고~」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、もしかして、ジュエリーも参加したかった？\u3000それなら大歓迎だよ！」"
translation = "「앗, 혹시 주얼리도 참가하고 싶어? 그렇다면 대환영이야!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いや、そういうことではなく……まあ、いいか」"
translation = "「아니, 그런 뜻이 아니라…… 뭐, 됐어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「肌が弱くて日傘を手離せないという問題はあるが、愛する助手とキャンプに行くのは楽しそうではある」"
translation = "「피부가 약해서 양산을 뗄 수 없다는 문제는 있지만 사랑하는 조수와 캠핑을 가는 건 즐거울 것 같네」"

[[dialogue]]
speaker = "フェリシー"
original = "「決まりだね！\u3000大丈夫、太陽光が苦手ってことなら、大きな屋根付きのテントを用意すればいいし！」"
translation = "「결정됐네! 괜찮아, 태양광이 질색이라면 커다란 지붕이 달린 텐트를 준비하면 되니까!」"

[[dialogue]]
speaker = "unk"
original = "あと、リゾート結界なら紫外線カットできる"
translation = "그리고 리조트 결계라면 자외선 차단도 가능해"

[[dialogue]]
speaker = "フェリシー"
original = "「え！？\u3000なにそれ、どういうこと？」"
translation = "「에!? 뭐야 그게, 무슨 소리야?」"

[[dialogue]]
speaker = "フェリシー"
original = "「――リゾート結界は、リップルさんの能力で作られたものだから、日焼けしないモードがある？\u3000そんなこともできるの！？\u3000すごくない！？」"
translation = "「――리조트 결계는 리플 씨의 능력으로 만들어진 거라 자외선 차단 모드가 있다고? 그런 것도 가능해!? 대단하잖아!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ほう、それは実に興味深い」"
translation = "「호오, 그건 실로 흥미롭군」"

[[dialogue]]
speaker = "unk"
original = "その後も俺たちは、リゾート結界の話で盛り上がるのだった――"
translation = "그 후로도 우리들은 리조트 결계 이야기로 꽃을 피웠다――"

