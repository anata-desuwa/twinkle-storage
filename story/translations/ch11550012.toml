[[dialogue]]
speaker = "unk"
original = "第２話,猪突猛進、フルスロットル娘,P"
translation = "제2화, 저돌맹진, 풀 스로틀 소녀"

[[dialogue]]
speaker = "unk"
original = "いろはに『カラオケに連れて行って！』と頼み込まれて、サチは渋谷の街に出かけていた。"
translation = "이로하에게 『노래방에 데려가 줘!』라고 간청받아, 사치는 시부야 거리로 나섰다."

[[dialogue]]
speaker = "unk"
original = "そこには同じく異世界からやってきた花織の姿もあった。"
translation = "그곳에는 마찬가지로 이세계에서 온 카오리의 모습도 있었다."

[[dialogue]]
speaker = "いろは"
original = "「ん～、いっぱい歌ったね～。サチちゃん、付き合ってくれてありがと～♪」"
translation = "「음~, 잔뜩 불렀네~. 사치짱, 같이 와줘서 고마워~♪」"

[[dialogue]]
speaker = "サチ"
original = "「いえいえ、誘ってもらった時は少し不安でしたが、何も問題なくて逆にビックリしました……」"
translation = "「아뇨아뇨, 권유받았을 때는 조금 불안했습니다만, 아무 문제 없어서 오히려 깜짝 놀랐어요……」"

[[dialogue]]
speaker = "いろは"
original = "「え？\u3000なになに、どういうこと？」"
translation = "「어? 뭐야 뭐야, 무슨 소리야?」"

[[dialogue]]
speaker = "サチ"
original = "「だって、おふたりはこちらの世界に来たばかりじゃないですか。なのに曲の入力が途切れなくて……」"
translation = "「그야 두 분은 이쪽 세계에 막 오신 참이잖아요. 그런데 곡 입력이 끊이지 않아서……」"

[[dialogue]]
speaker = "サチ"
original = "「いろはさんはわかるんです。トレジアンナさんに魔法少女アニメを見せてもらっていたみたいですから」"
translation = "「이로하 씨는 이해해요. 트레지아나 씨에게 마법소녀 애니메이션을 배운 모양이니까요」"

[[dialogue]]
speaker = "いろは"
original = "「そうそう♪\u3000歌いたかった曲はぜ～んぶ歌えたよ♪」"
translation = "「맞아 맞아♪ 부르고 싶었던 노래는 저언부 불렀어♪」"

[[dialogue]]
speaker = "サチ"
original = "「……ですよね」"
translation = "「……그렇죠」"

[[dialogue]]
speaker = "サチ"
original = "「不思議なのは花織さんです。どうして花織さんも、こっちの世界の曲を普通に歌えちゃってたんですか？」"
translation = "「신기한 건 카오리 씨예요. 어째서 카오리 씨도 이쪽 세계 노래를 평범하게 부를 수 있었던 건가요?」"

[[dialogue]]
speaker = "花織"
original = "「いろはがそのうち『カラオケ行こー』って騒ぎだすのは目に見えてたから」"
translation = "「이로하가 조만간 『노래방 가자ー』라며 소란 피울 건 눈에 보였으니까」"

[[dialogue]]
speaker = "花織"
original = "「いつ連れていかれてもいいように、こっちの世界の流行ってる曲を押さえといたの」"
translation = "「언제 끌려가도 괜찮도록 이쪽 세계에서 유행하는 곡을 파악해 뒀어」"

[[dialogue]]
speaker = "いろは"
original = "「さっすがカオリン！\u3000あたしのことわかってるっ♪」"
translation = "「역쉬 카오린! 나에 대해 잘 알고 있네♪」"

[[dialogue]]
speaker = "花織"
original = "「ま、長い付き合いだからね。いろはの行動パターンはある程度読めるようになっちゃったよ」"
translation = "「뭐, 오래 알고 지냈으니까. 이로하의 행동 패턴은 어느 정도 읽을 수 있게 됐어」"

[[dialogue]]
speaker = "サチ"
original = "「長いお付き合い……ということは幼なじみとかですか？」"
translation = "「오래 알고 지낸 사이…… 그렇다면 소꿉친구라거나 그런 건가요?」"

[[dialogue]]
speaker = "いろは"
original = "「うん、小さい頃からのね」"
translation = "「응, 어릴 때부터 말이야」"

[[dialogue]]
speaker = "花織"
original = "「腐れ縁。っていうか、いろはは危なっかしくて放っておけないから」"
translation = "「악연. 그보다 이로하는 위태로워서 가만히 내버려 둘 수가 없거든」"

[[dialogue]]
speaker = "いろは"
original = "「えー、そっかな？\u3000どっちかというとカオリンの方が心配な子だと思うんだけど」"
translation = "「에이, 그럴까? 어느 쪽이냐 하면 카오린 쪽이 걱정되는 애라고 생각하는데」"

[[dialogue]]
speaker = "サチ"
original = "「そうですか？\u3000花織さん、とてもしっかりされている方のように思いますけど」"
translation = "「그런가요? 카오리 씨, 매우 똑 부러지는 분처럼 보입니다만」"

[[dialogue]]
speaker = "いろは"
original = "「でもカオリン、ちょっと繊細だからな～」"
translation = "「하지만 카오린, 조금 섬세하니까~」"

[[dialogue]]
speaker = "花織"
original = "「うっ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "いろは"
original = "「すぐ落ち込んだり、あわあわ～ってなっちゃうんだよね。そしたらカオリン、すーぐ自分の殻に引きこもっちゃうから」"
translation = "「금방 낙담하거나 아와와~ 하고 당황해버린단 말이지. 그러면 카오린, 바아로 자기 껍질 속에 틀어박혀 버리니까」"

[[dialogue]]
speaker = "いろは"
original = "「そういう時はあたしがその殻を叩き割って引っ張り出してあげるの。出てこーい、パッカーン、ずるずるずる～って♪」"
translation = "「그럴 때는 내가 그 껍질을 때려 부수고 끌어내 주는 거야. 나오너라, 팍, 질질질~ 하고♪」"

[[dialogue]]
speaker = "花織"
original = "「まあ……そういう事が無かったかといえば……無くもなかったけど……」"
translation = "「뭐…… 그런 일이 없지는 않았지만…… 없지도 않았지만……」"

[[dialogue]]
speaker = "花織"
original = "「あーっ、もう！\u3000いろは～！\u3000なんでそういう事、新しく仲良くなった子に全部ばらしちゃうかな！」"
translation = "「아ー, 정말! 이로하~! 왜 그런 걸 새로 사귄 애한테 전부 까발리는 거야!」"

[[dialogue]]
speaker = "いろは"
original = "「あ～、カオリンが怒った～！！」"
translation = "「아~, 카오린 화났다~!!」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ、ずっとこんな調子なんですか？」"
translation = "「후훗, 계속 이런 분위기인가요?」"

[[dialogue]]
speaker = "花織"
original = "「そ。この子、空気を読むってことを知らないから」"
translation = "「응. 이 애, 눈치 챙기는 법을 모르거든」"

[[dialogue]]
speaker = "花織"
original = "「失礼をやらかさないように、ウチがしっかり監視しておかないとダメなの」"
translation = "「실례를 저지르지 않도록 내가 확실히 감시해 두지 않으면 안 돼」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ。おふたりのこと、よくわかった気がします。本当に仲のいい幼なじみなんですね」"
translation = "「후훗. 두 분에 대해 잘 알게 된 것 같아요. 정말 사이좋은 소꿉친구시네요」"

[[dialogue]]
speaker = "いろは"
original = "「幼なじみ兼親友だもんね♪」"
translation = "「소꿉친구 겸 절친인걸♪」"

[[dialogue]]
speaker = "花織"
original = "「はぁ、調子いいんだから、まったく……」"
translation = "「하아, 말은 잘해요, 정말……」"

[[dialogue]]
speaker = "サチ"
original = "「っ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker = "いろは"
original = "「ん、この音は？\u3000デュナミスフィア、じゃないよね」"
translation = "「음, 이 소리는? 듀나미스피어는 아니지」"

[[dialogue]]
speaker = "サチ"
original = "「この近くにモンスターが現れたようです！\u3000すみません、私はそちらに向かいます」"
translation = "「이 근처에 몬스터가 나타난 모양입니다! 죄송해요, 저는 그쪽으로 가볼게요」"

[[dialogue]]
speaker = "花織"
original = "「モンスター！？」"
translation = "「몬스터!?」"

[[dialogue]]
speaker = "サチ"
original = "「おふたりは安全な場所に避難していてください。後で迎えに行きます！」"
translation = "「두 분은 안전한 곳으로 피난해 주세요. 나중에 데리러 갈게요!」"

[[dialogue]]
speaker = "いろは"
original = "「あっ……！」"
translation = "「앗……!」"

[[dialogue]]
speaker = "花織"
original = "「行っちゃった……けど、どうするいろは？」"
translation = "「가버렸네…… 근데 어쩔 거야 이로하?」"

[[dialogue]]
speaker = "いろは"
original = "「そんなの決まってるじゃん！」"
translation = "「그거야 당연하잖아!」"

[[dialogue]]
speaker = "花織"
original = "「だよね……」"
translation = "「그렇겠지……」"

[[dialogue]]
speaker = "サチ"
original = "（数はそれほど多くなさそうだけど、死角にもまだ居そう。それに引き換えこっちは１人。単騎深追いは学園で禁止されてる……）"
translation = "(수는 그렇게 많지 않아 보이지만, 사각지대에도 아직 있을 것 같아. 그에 비하면 이쪽은 혼자. 단독 추격은 학원에서 금지되어 있는데……)"

[[dialogue]]
speaker = "サチ"
original = "（応援が来るのを待つ？\u3000でも、モンスターが暴れているのを黙って見ているのは……）"
translation = "(응원이 오기를 기다려? 하지만 몬스터가 날뛰는 걸 가만히 보고만 있는 건……)"

[[dialogue]]
speaker = "いろは"
original = "「サチちゃん！」"
translation = "「사치짱!」"

[[dialogue]]
speaker = "サチ"
original = "「えっ！\u3000いろはさん、どうしてここに！」"
translation = "「엣! 이로하 씨, 어째서 여기에!」"

[[dialogue]]
speaker = "いろは"
original = "「あいつがモンスターだね？\u3000あたしも一緒に戦うよ！」"
translation = "「저놈이 몬스터지? 나도 같이 싸울게!」"

[[dialogue]]
speaker = "サチ"
original = "「ダメです！\u3000危険ですから、いろはさんたちは大人しく避難してください！」"
translation = "「안 돼요! 위험하니까 이로하 씨 일행은 얌전히 피난해 주세요!」"

[[dialogue]]
speaker = "いろは"
original = "「黙って見過ごすなんて出来ないよ！」"
translation = "「가만히 보고만 있을 수는 없어!」"

[[dialogue]]
speaker = "いろは"
original = "「いくよモンスター、世界の平和はあたしが守るっ！\u3000魔法少女いろはが相手だっ！」"
translation = "「간다 몬스터, 세계의 평화는 내가 지킨다! 마법소녀 이로하가 상대다!」"

[[dialogue]]
speaker = "いろは"
original = "「やぁあああああああっ！！！！」"
translation = "「야아아아아아아앗!!!!」"

[[dialogue]]
speaker = "サチ"
original = "「ちょっ！？\u3000いろはさんっ！」"
translation = "「잠깐!? 이로하 씨!」"

[[dialogue]]
speaker = "花織"
original = "「ごめん、サチちゃん。いろは、ああなっちゃったら止められないんだ」"
translation = "「미안, 사치짱. 이로하, 저렇게 돼버리면 못 말려」"

[[dialogue]]
speaker = "サチ"
original = "「ああ、もうっ！\u3000こうなったら仕方ありません！\u3000花織さん、手を貸してくださいっ」"
translation = "「아아, 정말! 이렇게 된 이상 어쩔 수 없네요! 카오리 씨, 힘을 빌려주세요」"

[[dialogue]]
speaker = "花織"
original = "「うん、わかった！」"
translation = "「응, 알았어!」"

[[dialogue]]
speaker = "花織"
original = "「もう、いろはは全力で突っ込んでいくことしか頭に無いんだから。少しはリスクとかバックアップのことも考えて欲しいんだけど……」"
translation = "「정말, 이로하는 전력으로 돌진하는 것밖에 머릿속에 없다니까. 조금은 리스크나 백업 생각도 해줬으면 좋겠는데……」"

[[dialogue]]
speaker = "unk"
original = "花織とサチは顔を見合わせてため息を吐くと気を取り直して、モンスターと戦っているいろはの方へと駆けていくのだった。"
translation = "카오리와 사치는 서로 얼굴을 마주하며 한숨을 내쉬고는 마음을 가다듬고, 몬스터와 싸우고 있는 이로하 쪽으로 달려가는 것이었다."

