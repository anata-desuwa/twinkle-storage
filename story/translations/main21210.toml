[[dialogue]]
speaker = "unk"
original = "第１０話,極星学園、開校,B"
translation = "제10화, 극성학원, 개교, B"

[[dialogue]]
speaker = "unk"
original = "女神テルルの遣いであるルヴィネの存在は、すぐにデネブ中に広まることとなった。"
translation = "여신 테루루의 사자인 루비네의 존재는 금방 데네브 전역에 퍼지게 되었다."

[[dialogue]]
speaker = "unk"
original = "『仮面の女』の撃破、そして緋宮クロト裏切りの報は、すぐに三界を駆け巡った。"
translation = "『가면의 여인』의 격파, 그리고 히노미야 쿠로토 배신의 소식은 즉시 삼계를 휩쓸었다."

[[dialogue]]
speaker = "unk"
original = "アルタイル、ベガなどの平行世界の情報はそれに遅れ、時間をかけてゆっくりと人々に浸透することになる。"
translation = "알타이르, 베가 등의 평행세계 정보는 그보다 늦게, 시간을 들여 천천히 사람들에게 침투하게 된다."

[[dialogue]]
speaker = "unk"
original = "──近づきつつあったリクリエの<ruby>本波<rt>ほんぱ</rt></ruby>は、いったん跳ねのけることに成功した。"
translation = "──다가오고 있던 리크리에의 본파는 일단 물리치는 데 성공했다."

[[dialogue]]
speaker = "unk"
original = "しかしアステラもモンスターも未だにその出現は止まらない。"
translation = "하지만 아스테라도 몬스터도 여전히 그 출현은 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>は『仮面の女』に破壊されたままであり、何より人類防衛のかなめであった２つの学園が機能不全に陥っている。"
translation = "<ruby>경계의 호수<rt>라고 시에로</rt></ruby>는 『가면의 여인』에게 파괴된 채 그대로이며, 무엇보다 인류 방위의 핵심이었던 두 학원이 기능 부전에 빠져 있다."

[[dialogue]]
speaker = "unk"
original = "星騎士のほとんどは死亡。施設も壊滅状態──ゆえにデネブは、大掛かりな復興政策をとる必要に迫られていた。"
translation = "성기사의 대부분은 사망. 시설도 괴멸 상태── 그리하여 데네브는 대대적인 복구 정책을 취해야 할 상황에 처해 있었다."

[[dialogue]]
speaker = "unk"
original = "デネブの復興に際しても、ルヴィネは身を粉にして尽力した。"
translation = "데네브의 복구에 있어서도 루비네는 몸을 아끼지 않고 진력했다."

[[dialogue]]
speaker = "unk"
original = "流星市国外への援助要請、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の再開通による三界の協力体制の確立。緋宮クロトを未だ信奉するレジスタンスの撃退──時は瞬く間に過ぎた。"
translation = "유성시국 외로의 원조 요청, <ruby>경계의 호수<rt>라고 시에로</rt></ruby>의 재개통을 통한 삼계 협력 체제의 확립. 히노미야 쿠로토를 여전히 신봉하는 레지스탕스의 격퇴── 시간은 눈 깜짝할 사이에 흘렀다."

[[dialogue]]
speaker = "unk"
original = "そして流星群から数年後に打ち出されたのが、新しい星騎士養成機関の創設。"
translation = "그리고 유성우로부터 수년 후에 내놓은 것이 새로운 성기사 양성 기관의 창설."

[[dialogue]]
speaker = "unk"
original = "第３の学園──極星学園の誕生である。"
translation = "제3의 학원── 극성학원의 탄생이다."

[[dialogue]]
speaker = "unk"
original = "本来、チナは１つ下、レティシアは１つ上の年齢だったが、新しい学園の開校に合わせて『ポラリス』の５人は同時に入学──同級生となった。"
translation = "본래 치나는 한 살 아래, 레티시아는 한 살 위였으나 새로운 학원의 개교에 맞춰 『폴라리스』 다섯 명은 동시에 입학── 동급생이 되었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「祝！\u3000極星学園、開校前日！」"
translation = "「축! 극성학원, 개교 전날!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「すごいね～っ……どこもかしこもピカピカだよチナちゃん！\u3000ここが明日から、私たちが通う学園かぁ……！」"
translation = "「대단하네~…… 어디를 봐도 반짝반짝해 치나 짱! 여기가 내일부터 우리가 다닐 학원이구나……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「長かったなあ……とうとうアタシたちにも城ができるってわけだ！\u3000く～っ……あの日、泥水をすすってでも生き延びた甲斐があったぜ」"
translation = "「길었지…… 드디어 우리에게도 성이 생긴다는 거네! 크으~…… 그날 진흙물을 마시면서라도 살아남은 보람이 있어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「星騎士としての活動はずっと続けてきたけど、それでもやっぱり学園があるのは嬉しいよ～♪」"
translation = "「성기사로서의 활동은 계속해왔지만, 그래도 역시 학원이 있는 건 기뻐~♪」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「授業に、部活動に、委員会……楽しみだなあ。たくさんお友達できたらいいな～♪」"
translation = "「수업에, 동아리 활동에, 위원회…… 기대된다. 친구들 많이 생기면 좋겠어~♪」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「あれ……そういえばグレイスはどこだ？」"
translation = "「어라…… 그러고 보니 그레이스는 어디 있지?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「購買部を見に行くって言ってたわね──ああ、ちょうど戻って来たわ」"
translation = "「매점을 보러 간다고 했어── 아, 마침 돌아왔네」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「しょぼーん。店員さん、だーれもいませんでした……」"
translation = "「시무룩. 점원분들이 아무도 없었어요……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「そりゃそうだろ。明日から開校だって何度も言ったじゃねーか。はしゃぎすぎなんだよ、グレイスは」"
translation = "「그야 당연하잖아. 내일부터 개교라고 몇 번이나 말했냐. 너무 들떴어, 그레이스는」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それを言うならチナもでしょう？\u3000制服に着替えてる時から、ずいぶんとウキウキしていたように見えたわ」"
translation = "「그렇게 말하는 치나도 마찬가지 아니야? 교복으로 갈아입을 때부터 꽤 들떠 보였는데」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あはは、そうだね～。ネクタイ３回も結び直してたし」"
translation = "「아하하, 맞아~. 넥타이를 세 번이나 다시 맸는걸」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「う……ウキウキなんてしてねえって！\u3000あれはそう、武者震いってやつだよ。極星の星徒会役員として、当然持つべき心構えっていうか……」"
translation = "「으…… 들뜬 거 아니라고! 그건 그래, 무사태평한 떨림 같은 거야. 극성의 성도회 임원으로서 당연히 가져야 할 마음가짐이랄까……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「ぷぷ。チナは子供ですねえ」"
translation = "「푸푸. 치나는 어린애네요」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お前にだけは言われたかねえよ！」"
translation = "「너한테만은 듣고 싶지 않거든!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ん……学園の設備はすべて問題なしね」"
translation = "「음…… 학원 시설은 모두 문제없어」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あっ、お帰りなさいルヴィ──じゃなかった。お疲れ様です、ルヴィネ星徒会長！」"
translation = "「앗, 다녀오셨어요 루비── 가 아니라. 수고하셨습니다, 루비네 성도회장님!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ふふ、気が早いわね──お疲れ様。グレイス会計」"
translation = "「후후, 성급하네── 수고했어. 그레이스 회계」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「おぉお……会計。いい響きです、役職があると偉い人になった気がします！」"
translation = "「오오오…… 회계. 좋은 울림이에요, 직책이 있으니까 높은 사람이 된 기분이에요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「今さらだけどルヴィ、本当にグレイスが会計で大丈夫か……？\u3000アタシ、マジで心配なんだけど」"
translation = "「이제 와서 하는 말이지만 루비, 정말 그레이스가 회계라도 괜찮은 거냐……? 나, 진짜 걱정되는데」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「どういう意味ですか！\u3000私はしっかり者です！」"
translation = "「무슨 뜻인가요! 저는 야무진 사람이라고요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「しっかりしてるやつはそんなこと言わねえんだよ」"
translation = "「야무진 녀석은 그런 소리 안 하거든」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それを言うなら、私が副会長っていうのもおかしい気が～……」"
translation = "「그렇게 따지면, 제가 부회장이라는 것도 이상한 기분이~……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いや、それはない」"
translation = "「아니, 그건 아니야」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それはないわね」"
translation = "「그건 아니네」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「なんで！？\u3000実力ならレティシアちゃんだよ！？\u3000それに一番お姉さんだし……！」"
translation = "「왜!? 실력이라면 레티시아 짱이잖아!? 게다가 가장 언니고……!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「戦闘力も年功も、役職とは無関係よ。私は誰かの上に立てる器ではないもの」"
translation = "「전투력도 연공서열도 직책과는 무관해. 나는 누군가 위에 설 그릇이 아니니까」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「フフフ、ベアト？\u3000不安なら私が、今から代わってあげてもいいですよ？」"
translation = "「후후후, 베아토? 불안하면 제가 지금부터 바꿔줄 수도 있다고요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「グレイスに副会長やらすくらいならアタシがやるっての」"
translation = "「그레이스에게 부회장 시킬 바엔 내가 하겠다」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「なにおう～っ！？」"
translation = "「뭐라고요~!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「うちのメンバーは戦闘力こそあれ……少し個性的だから。私がいない時のまとめ役は、ベアトが適任よ」"
translation = "「우리 멤버는 전투력은 있지만…… 조금 개성적이니까. 내가 없을 때의 정리역은 베아토가 적임이야」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィまで……不安だなぁ。魔界や天界の留学生さんから『はぁ？\u3000あのザコが副会長？』とか言われたらどうしよう……」"
translation = "「루비까지…… 불안하네. 마계나 천계의 유학생들이 『하아? 저 약골이 부회장?』 같은 소릴 하면 어쩌지……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「安心しろベアト。いざとなったらアタシに相談すりゃいい。うちの副会長を小馬鹿にするやつはぶちのめしてやる！」"
translation = "「안심해 베아토. 만약 그렇게 되면 나한테 상담해. 우리 부회장을 얕보는 녀석은 때려눕혀 줄 테니까!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「安心してベアト。役員の指名はルヴィの判断。ルヴィは何も間違わないわ」"
translation = "「안심해 베아토. 임원 지명은 루비의 판단. 루비는 아무것도 틀리지 않아」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「まあ、安心してくださいベアト。いざとなったら私が副会長を継ぎますので！\u3000大船が控えていますよ！」"
translation = "「뭐, 안심하세요 베아토. 만약의 경우에는 제가 부회장을 승계할 테니까요! 든든한 지원군이 대기하고 있어요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「う、うん……みんななりに励ましてくれてるってことは分かるよ……！\u3000私、副会長がんばってみる！！」"
translation = "「으, 응…… 다들 나름대로 격려해주고 있다는 건 알겠어……! 나, 부회장 열심히 해볼게!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それはそうとあなたたち、学園の下見は終わった？」"
translation = "「그건 그렇고 당신들, 학원 견학은 끝났어?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん。建設途中にも何度も見周りしてたし、地理はばっちりだよ！」"
translation = "「응. 건설 도중에도 몇 번이나 둘러봤고, 지리는 완벽해!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「魔界や天界から留学生もたくさんやってきますからね。案内はお任せください！」"
translation = "「마계나 천계에서 유학생들도 많이 올 테니까요. 안내는 맡겨주세요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「んじゃあ、用事はこんなもんか。どーする、昼時だしルヴィのバイト先でも行くか？」"
translation = "「그럼 볼일은 이 정도인가. 어쩔래, 점심때인데 루비의 아르바이트 장소라도 갈까?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それはまた今度ね。学園見学が終わっているのならちょうどいいわ。……あなたたちに伝えておきたいことがあるのだけど、時間をくれる？」"
translation = "「그건 다음에. 학원 견학이 끝났다면 마침 잘됐어. ……당신들에게 전하고 싶은 말이 있는데, 시간을 내줄래?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「もちろんですよ。このあと、何も予定はありませんし」"
translation = "「물론이죠. 이 뒤로 아무 예정도 없고요」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ルヴィからのお願いを拒否するわけがないわ。どんなお話？」"
translation = "「루비의 부탁을 거절할 리가 없잖아. 어떤 이야기야?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「……外でする話ではないわね。星徒会室へ来てくれるかしら」"
translation = "「……밖에서 할 이야기는 아니네. 성도회실로 와줄래?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はーい。極星星徒会、最初のミーティングだね！」"
translation = "「네~. 극성 성도회, 첫 미팅이네!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
