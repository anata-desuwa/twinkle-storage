[[dialogue]]
speaker = "unk"
original = "ヴィーナス発案のサンタ大作戦に、元気よく名乗りを上げた紅明。"
translation = "비너스가 발안한 산타 대작전에 씩씩하게 출사표를 던진 코우메이."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシもクリスマスプレゼントを配るの、手伝うぜ！」"
translation = "「나도 크리스마스 선물 나눠주는 거 도와주겠다구!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「紅明も手を貸してくれるの？\u3000それなら、牛に翼を得たる如しね！」"
translation = "「코우메이도 도와주는 거야? 그렇다면 소에 날개를 단 격이네!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「実はさ、偶然にもアタシも今度のクリスマスパーティーでサンタをやりたいって思って、ダーリンに許可を貰いにきたところだったんだよね☆」"
translation = "「실은 말이야, 우연히 나도 이번 크리스마스 파티 때 산타를 하고 싶다고 생각해서 달링한테 허락받으러 오던 참이었거든☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そこでみんなにクリスマスプレゼントを配ったら、笑顔になるじゃん？\u3000アタシ、みんなの笑顔を見るのが好きだからさ！」"
translation = "「거기서 모두에게 크리스마스 선물을 나눠주면 웃음꽃이 피잖아? 난 모두의 웃는 얼굴을 보는 게 좋으니까 말이야!」"

[[dialogue]]
speaker = "unk"
original = "紅明らしいな"
translation = "「코우메이답네」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「うしし♪\u3000世の為人の為、がアタシのモットーだかんね♪\u3000というわけで、ついでにセッシーの為にもなるなら、喜んで協力するぜ☆」"
translation = "「우시시♪ 세상을 위해 남을 위해, 가 내 모토니까 말이야♪ 그런 고로 겸사겸사 세시를 위해서도 된다면 기꺼이 협력하겠다구☆」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じ～っ……」"
translation = "「지~익……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「って、アタシの顔をじっと見つめて、どうかしたかい、セッシー？\u3000もしかして、呼び方が不満だったかな？」"
translation = "「어라, 내 얼굴을 빤히 쳐다보고 왜 그러냐구, 세시? 혹시 부르는 방식이 불만이었나?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシ、その場のノリで名づけちゃうから、たまに怒られちゃうんだよね～。もし嫌だったら、遠慮なく言ってくれな。アタシはセッシーと仲良くなりたいからさ♪」"
translation = "「난 그 자리 기분으로 이름을 지어버리니까 가끔 혼나곤 하거든~. 만약 싫으면 사양 말고 말해줘. 난 세시랑 친해지고 싶으니까 말이야♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……見つけたわ。――あなたがわたくしのママね♪」"
translation = "「……찾았어. ――당신이 나의 마마네♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「え？\u3000なんて？」"
translation = "「에? 뭐라고?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わ～い、紅明ママ～♪\u3000セシアのことは、セッシーと呼んでくれていいわ♪\u3000その代わり、わたくしも紅明ママと呼ぶわねっ」"
translation = "「와아, 코우메이 마마~♪ 세시아는 세시라고 불러줘도 좋아♪ 그 대신 나도 코우메이 마마라고 부를게」"

[[dialogue]]
speaker = "unk"
original = "急にどうした！？"
translation = "「갑자기 왜 이래!?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「えっと、セッシー？\u3000アタシがママってどういう……？」"
translation = "「저기, 세시? 내가 마마라니 그게 무슨……?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「紅明ママからは内なる母性を感じるの！\u3000まるで本当のママであったかのような、心に響くバブみが溢れてくるわ♪」"
translation = "「코우메이 마마에게서는 내면의 모성이 느껴져! 마치 진짜 마마였던 것 같은, 가슴에 와닿는 바부미가 넘쳐흐른다구♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「出たわね！\u3000セシアの『ママ判定』！」"
translation = "「나왔네! 세시아의 『마마 판정』!」"

[[dialogue]]
speaker = "unk"
original = "ママ判定ってなに！？"
translation = "「마마 판정이 뭐야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「セシアは、初めて会った相手をじ～っと観察して、自分のママに相応しい人物か判定する、面白い癖があるのよ！」"
translation = "「세시아는 처음 만난 상대를 지~익 관찰해서 자기 마마에 어울리는 인물인지 판정하는 재미있는 버릇이 있어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうして見事『ママ認定』した相手に対しては、普段の落ち着いた態度から一変、無邪気な子供のように甘えちゃうの！」"
translation = "「그렇게 해서 멋지게 『마마 인정』을 한 상대에게는 평소의 차분한 태도에서 급변해서 천진난만한 아이처럼 응석 부린다니까!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――人はみな、自分のママになってくれる人を求めているのよ。わたくしはただ、人よりもその欲求に素直なだけだわ」"
translation = "「――사람은 누구나 자기 마마가 되어줄 사람을 갈구하고 있어. 나는 그저 남들보다 그 욕구에 솔직할 뿐이야」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ねぇ、紅明ママ～♪\u3000セシア、ママに抱っこして欲しいの～♪\u3000ダメ～？」"
translation = "「있지, 코우메이 마마~♪ 세시아, 마마가 안아줬으면 좋겠어~♪ 안 돼~?」"

[[dialogue]]
speaker = "unk"
original = "テンションの差っ！！"
translation = "「텐션 차이 봐!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちなみに私は、ママではないらしいわ！」"
translation = "「참고로 나는 마마가 아니라는 것 같아!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――ちなみに、会長。あなたも残念ながら、ママではないわ」"
translation = "「――참고로 회장. 당신도 유감스럽지만 마마는 아니야」"

[[dialogue]]
speaker = "unk"
original = "いや俺、男なんだけどっ！！？"
translation = "「아니 나, 남자인데!!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「甘いわね、会長。真のママに性別は関係ないわ。大事なのは、そこに<b>オギャれるバブみ</b>があるかどうかなのよ」"
translation = "「무르네, 회장. 진정한 마마에게 성별은 관계없어. 중요한 건 거기에 <b>응애할</b> <b>수</b> <b>있는</b> <b>바부미</b>가 있느냐 없느냐라고」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あははははっ♪\u3000んモー、セッシーってば、ウケる～☆」"
translation = "「아하하하핫♪ 음메~ 세시도 참, 웃긴다구☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「そっかそっか、アタシに母性を感じるか～。うんうん、いいぜ？\u3000アタシでよければ、セッシーのママ役、引き受けようじゃん♪」"
translation = "「그렇구나 그렇구나, 나한테 모성을 느끼는구나~. 응응, 좋아? 나라도 괜찮다면 세시의 마마 역할 맡아주지 뭐♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「本当っ！？\u3000わ～い、紅明ママ～♪\u3000ありがと～♪」"
translation = "「정말!? 와아, 코우메이 마마~♪ 고마워~♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「よしよし、いいこいいこ♪\u3000記憶を取り戻して、本当のママが見つかるまでの間、好きに甘えていいかんね～♪\u3000ほ～ら、抱っこしちゃうぞ～☆」"
translation = "「착하다 착해♪ 기억을 되찾고 진짜 마마를 찾을 때까지 마음껏 응석 부려도 된다구~♪ 자, 안아줄게~☆」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「えへへ～♪\u3000紅明ママのおっぱい、大きくて柔らか～い<emoji=heart04>\u3000それに温かくて、落ち着くわ♪」"
translation = "「에헤헤~♪ 코우메이 마마 가슴, 크고 말랑말랑해<emoji=heart04> 게다가 따뜻해서 안심돼♪」"

[[dialogue]]
speaker = "unk"
original = "ママ判定の基準って、もしかして……"
translation = "「마마 판정 기준이 혹시……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――いいえ。それは違うわ、会長」"
translation = "「――아니. 그건 틀려, 회장」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「母性とはもっと深淵なるものよ。必ずしもおっぱいの大きさで決まるわけではないわ。勘違いしないで頂戴。だけど――」"
translation = "「모성이란 좀 더 심오한 것이야. 반드시 가슴 크기로 결정되는 건 아니야. 오해하지 말아 줘. 하지만――」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それはそれとして、大きなおっぱいはいいものよ。プラス１ポイントね」"
translation = "「그건 그거대로 큰 가슴은 좋은 것이지. 플러스 1포인트야」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「こうしていると、私もママだった頃を思い出すな～。よしよし♪」"
translation = "「이러고 있으니까 나도 마마였던 시절이 생각나네~. 착하지 착해♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ママだった頃？」"
translation = "「마마였던 시절?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「いや、なんでもないっしょ☆」"
translation = "「아니, 아무것도 아니라구☆」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「とにかく、セッシー。アタシも手伝うから、クリスマスプレゼントを配るの、一緒に頑張ろうぜ♪」"
translation = "「아무튼 세시. 나도 도울 테니까 크리스마스 선물 나눠주는 거 같이 힘내자구♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「うんっ。これからよろしくね、紅明ママ♪」"
translation = "「응. 앞으로 잘 부탁해, 코우메이 마마♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、紅明もサンタ大作戦の仲間に加わるのだった。"
translation = "그렇게 코우메이도 산타 대작전의 동료로 합류하게 되었다."

