[[dialogue]]
speaker = "unk"
original = "第２話,無自覚サンタの憂鬱,P"
translation = "제2화, 무자각 산타의 우울, P"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「メリークリスマス！\u3000さぁプレゼントをどうぞ」"
translation = "「메리 크리스마스! 자 선물을 받으세요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あっ……。また……」"
translation = "「앗……. 또……」"

[[dialogue]]
speaker = "unk"
original = "どうかしたの？"
translation = "무슨 일이야?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ああ、会長さま。実は先日作った靴下とプレゼントを子どもたちに配っていたのですが……」"
translation = "「아아, 회장님. 실은 요전에 만든 양말과 선물을 아이들에게 나눠주고 있었습니다만……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「なぜか男の子に限って受け取っていただけないのです。渡そうとして近づくと、一目散に走り去ってしまわれて……」"
translation = "「어째서인지 남자아이들에 한해서 받아주질 않아요. 주려고 다가가면 일직선으로 도망가 버려서……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「一体何がいけないのでしょうか……。男の子が喜びそうなおもちゃやお菓子を見繕ったつもりなのですが……」"
translation = "「도대체 무엇이 잘못된 걸까요……. 남자아이들이 좋아할 만한 장난감이나 과자를 골랐다고 생각합니다만……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうだ、会長さま。良ければ私の立ち振る舞いにおかしなところがないか見ていただいても構わないでしょうか」"
translation = "「그렇다, 회장님. 괜찮으시다면 제 태도에 이상한 점이 없는지 봐주실 수 있을까요?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「きっと私に何か問題があると思うんです。他の方からはプレゼントを受け取っているみたいですし……」"
translation = "「분명 저에게 무슨 문제가 있다고 생각해요. 다른 분들에게서는 선물을 받는 것 같고요……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「このままでは女神様にも、靴下作りを手伝ってくださったイレーナさまにも顔向けができません」"
translation = "「이대로는 여신님께도, 양말 만들기를 도와주신 이레나 님께도 면목이 없어요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「何より子どもたちにプレゼントのひとつも受け取ってもらえないシスターなんて、女神様の愛を広める者として失格ですから……！」"
translation = "「무엇보다 아이들에게 선물 하나 받아들여지지 못하는 시스터라니, 여신님의 사랑을 전파하는 자로서 실격이니까요……!」"

[[dialogue]]
speaker = "unk"
original = "俺でよければ力になるよ"
translation = "나라도 괜찮다면 힘이 되어줄게"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ありがとうございます！\u3000では、しゃがんでいただいてもよろしいですか？\u3000子どもたちの視点からの助言をいただければと思いまして」"
translation = "「감사합니다! 그럼, 앉아주실 수 있을까요? 아이들의 시점에서의 조언을 얻고 싶어서요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いかがでしょうか……。こうしてお傍に立っているだけでも逃げだしてしまう子もいるんです」"
translation = "「어떠신가요……. 이렇게 곁에 서 있는 것만으로도 도망가 버리는 아이도 있어요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私……子どもたちに嫌われてしまったのでしょうか。知らず知らずの間に子どもたちの心を傷つけてしまったのかもしれません……」"
translation = "「저…… 아이들에게 미움받게 된 걸까요. 모르는 사이에 아이들의 마음을 상처 입혔을지도 몰라요……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「どうでしょう……。会長さまから見て、何かお気づきになられる点はありませんか？」"
translation = "「어떤가요……. 회장님이 보시기에 뭔가 눈에 띄는 점은 없나요?」"

[[dialogue]]
speaker = "unk"
original = "絶景が広がっています"
translation = "절경이 펼쳐져 있습니다"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「絶景、ですか？\u3000確かにカフェテリアのクリスマス用の装飾は素晴らしいものですけれど……」"
translation = "「절경, 인가요? 확실히 카페테리아의 크리스마스용 장식은 훌륭합니다만……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですが、それとこれとは話が別です。今は子どもたちになぜ避けられてしまうのかのご相談をしているのです」"
translation = "「하지만 그것과 이것은 별개의 이야기예요. 지금은 아이들에게 왜 외면받는지 상담을 드리는 거예요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私もできる限り威圧感を与えないようにと心がけてはいるのですが。声をかける時も子どもたちと目線を合わせるようにしておりますし……」"
translation = "「저도 가능한 한 위압감을 주지 않도록 유의하고는 있습니다. 말을 걸 때도 아이들과 눈높이를 맞추려고 하고 있고요……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですが、こうしてしゃがみ込むと、さらに逃げだしてしまう子が多くて……」"
translation = "「하지만 이렇게 쭈그려 앉으면 더욱 도망가 버리는 아이들이 많아서……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「一体何故なのでしょう……。いつもはこんなこと一切ありませんのに……」"
translation = "「도대체 왜일까요……. 평소에는 이런 일이 전혀 없었는데……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「目も合わせていただけないんです。皆さま、ずっと<ruby>俯<rt>うつむ</rt></ruby>かれてばかりで……」"
translation = "「눈도 마주쳐주지 않아요. 여러분, 계속 고개만 숙이고 계셔서……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あ、会長さまもずっと俯かれていますよね？\u3000なぜ、私にお顔を向けていただけないのですっ？」"
translation = "「아, 회장님도 계속 고개를 숙이고 계시네요? 왜 저에게 얼굴을 보여주지 않으시는 건가요앗?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「答えてください、会長さま……！\u3000子どもたちは答えてくださらないんです……！」"
translation = "「대답해 주세요, 회장님……! 아이들은 대답해 주지 않는단 말이에요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「どうしてそんなに俯かれているのかと尋ねると、それこそ弾かれたように走り去ってしまって……！」"
translation = "「어째서 그렇게 고개를 숙이고 있냐고 물으면, 그야말로 튕겨 나가듯 달려가 버려서……!」"

[[dialogue]]
speaker = "unk"
original = "そりゃ恥ずかしくなって逃げだすというか……"
translation = "그야 부끄러워져서 도망친달까……"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そう仰るということは──つまり会長さまはわかっておられるのですねっ？\u3000なぜ私が男の子たちから避けられてしまうのかをっ」"
translation = "「그렇게 말씀하신다는 건── 즉 회장님은 알고 계시는 거군요앗? 왜 제가 남자아이들에게 외면받는지 말이에요앗」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「どうかお教えください、会長さま……！\u3000一体私の何がいけないのでしょうか……！」"
translation = "「부디 가르쳐 주세요, 회장님……! 도대체 저의 무엇이 잘못된 걸까요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「どうすればプレゼントを受け取ってもらえるのでしょうっ。どうすれば男の子たちに逃げられずに済むのでしょうか……！」"
translation = "「어떻게 해야 선물을 받아줄까요앗. 어떻게 해야 남자아이들에게 도망치지 않게 할 수 있을까요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私に原因があるのなら直しますから……！\u3000何卒……！\u3000何卒ご教授を会長さまっ……！」"
translation = "「저에게 원인이 있다면 고칠 테니까요……! 제발……! 제발 가르침을 주세요, 회장님……!」"

[[dialogue]]
speaker = "unk"
original = "そ、その格好で密着されると……！"
translation = "그, 그 복장으로 밀착하면……!"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ああ、会長さまがどんどん前屈みに……！\u3000そうです、そうなんです、男の子たちも皆そうして身を丸めていくばかりで……！」"
translation = "「아아, 회장님이 점점 몸을 앞으로 숙이시고……! 맞아요, 그거예요, 남자아이들도 모두 그렇게 몸을 웅크리기만 해서……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「なぜなのでしょう……！\u3000皆、私が近づくとお腹を壊してしまうんです……！」"
translation = "「왜 그런 걸까요……! 모두 제가 다가가면 배탈이 나버려요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「もしかして私は無意識のうちに何か呪詛のようなものを振りまいてしまっているのでしょうかっ？」"
translation = "「설마 제가 무의식중에 무슨 저주 같은 걸 뿌리고 있는 걸까요앗?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「どうか教えてくださいっ……！\u3000私のっ、私の何がいけないのでしょうっ……！」"
translation = "「부디 가르쳐 주세요앗……! 저의, 저의 무엇이 잘못된 거죠앗……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長、さま？」"
translation = "「회장, 님?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ああっ、会長さまっ！？\u3000どうして会長さままで逃げてしまわれるのですかぁ～！？」"
translation = "「아앗, 회장님!? 어째서 회장님까지 도망가 버리시는 건가요~!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん……？\u3000どうしたのよ、シャロン。この世の終わりみたいな顔しちゃって」"
translation = "「음……? 무슨 일이야, 샤론. 세상이 끝난 것 같은 표정을 짓고」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま……！\u3000私は、私はシスター失格です……！」"
translation = "「이레나 님……! 저는, 저는 시스터 실격이에요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「男の子が皆、私の前から逃げだしてしまうんです……！\u3000誰も私の愛を受け取ってくださらないのです……！」"
translation = "「남자아이들이 모두 제 앞에서 도망가 버려요……! 아무도 저의 사랑을 받아주지 않아요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「せっかく女神様から素晴らしいサンタの衣装を賜ったというのに……！ \u3000子どもたちへプレゼントを贈る務めを授けていただいたというのに……！」"
translation = "「모처럼 여신님으로부터 훌륭한 산타 의상을 하사받았는데……! 아이들에게 선물을 전하는 임무를 부여받았는데……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ううう、シスターとしてサンタとして、これ以上の絶望はありません……！」"
translation = "「우우우, 시스터로서 산타로서, 이 이상의 절망은 없어요……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「一体、なぜ……！\u3000なぜなのでしょう……！\u3000私の何がいけないのでしょうか……！」"
translation = "「도대체, 왜……! 왜인 걸까요……! 저의 무엇이 잘못된 걸까요……!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そりゃあ……」"
translation = "「그거야……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……その格好がエロすぎるからでしょ」"
translation = "「……그 복장이 너무 야해서 그렇겠지」"

