[[dialogue]]
speaker = "unk"
original = "第６話,謎めく塞ぎ手,B"
translation = "제6화, 수수께끼의 방해꾼, B"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ッ、これは……」"
translation = "「크읏, 이것은……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「凄まじい冷気──さすがにユウリ抜きだと、堪えるな……！」"
translation = "「엄청난 냉기── 역시 유우리 없이는, 견디기 힘들군……!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ふ、震えるニャアン……！？」"
translation = "「후, 떨린다냥……!?」"

[[dialogue]]
speaker = "unk"
original = "街を出てすぐの原野はすでに大半が凍てついていた。即死級の猛吹雪が一帯を覆い尽くしている。"
translation = "마을을 나서자마자 펼쳐진 황야는 이미 태반이 얼어붙어 있었다. 즉사급의 맹렬한 눈보라가 일대를 뒤덮고 있다."

[[dialogue]]
speaker_original = "狼型の魔獣"
speaker_translation = "늑대형 마수"
original = "『ガルル……グラアアアアアアアッ！！』"
translation = "『크르르…… 그르아아아아아아앗!!』"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「見かけない魔獣もひっきりなしに湧いているわ──街へ向かっているみたい」"
translation = "「못 보던 마수도 끊임없이 솟아나고 있어── 마을로 향하는 것 같아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラティエさん達に任せていれば大丈夫なはずです。進行を阻む個体のみ掃討していきましょう」"
translation = "「라티에 씨 일행에게 맡겼다면 괜찮을 겁니다. 진행을 방해하는 개체만 소탕해 나갑시다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「りょーかい──！」"
translation = "「알았어──!」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは全速力で原野を駆け抜けた。"
translation = "그렇게 우리들은 전속력으로 황야를 달려 나갔다."

[[dialogue]]
speaker = "unk"
original = "<ruby>熾烈<rt>しれつ</rt></ruby>な向かい風に身を凍えさせられながらも、闘志を燃やしながら突き進む──"
translation = "치열한 맞바람에 몸이 얼어붙으면서도, 투지를 불태우며 돌진한다──"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ふぅ、ふぅ──ネメシスまではまだなのニャン！？\u3000もう体が限界ニャン──！」"
translation = "「후우, 후우── 네메시스까지는 아직인 거냐냥!? 이제 몸이 한계다냥──!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「た、確かに……耐氷の装衣があっても、眠くなってきたような……」"
translation = "「타, 확실히…… 내빙의 장의가 있어도, 졸려오는 것 같은……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気をしっかり持て、マトイ。気絶したら一巻の終わりだ」"
translation = "「정신 똑바로 차려, 마토이. 기절하면 그걸로 끝이야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あと少しよ──ここを真っ直ぐに行けば、ネメシス盆地のあった場所へ着くはずだわ！」"
translation = "「조금만 더야── 여기를 곧장 가면, 네메시스 분지가 있던 장소에 도착할 거야!」"

[[dialogue]]
speaker = "unk"
original = "とうに人間界なら小国を渡るくらいの距離は飛行してきた。"
translation = "이미 인간계라면 소국을 건널 정도의 거리는 비행해 왔다."

[[dialogue]]
speaker = "unk"
original = "ここにきてようやく、目的地への兆しが見えてくる──だが。"
translation = "이제야 비로소, 목적지로의 징조가 보이기 시작한다── 하지만."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──っ！？」"
translation = "「──크읏!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「新手ですか──」"
translation = "「새로운 적입니까──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや──今の攻撃は──」"
translation = "「아니── 방금 공격은──」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「や～、今のを防いじゃうかー。さすが星徒会、なかなかやるね！」"
translation = "「야아, 방금 걸 막아내네. 역시 성도회, 꽤 하는데!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「い……市倉さん！？」"
translation = "「이…… 이치쿠라 씨!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「たま──き……？」"
translation = "「타마──키……?」"

[[dialogue]]
speaker = "unk"
original = "俺たちを待ち伏せした人物──"
translation = "우리들을 기다리고 있던 인물──"

[[dialogue]]
speaker = "unk"
original = "それは、俺のよく知る友人、環その人だった。"
translation = "그것은, 내가 잘 아는 친구, 타마키 본인이었다."

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「うんうん。そんなに驚いてくれると、寒さに耐えてた甲斐もあるってもんかな」"
translation = "「응응. 그렇게 놀라주니, 추위를 견디고 있던 보람도 있는 법이지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「蜃気楼──なんかじゃ、なさそうだな。ここは魔界だぞ」"
translation = "「신기루── 같은 건, 아닌 것 같군. 여기는 마계라고.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「知ってるよ。めちゃくちゃ割のいいバイトがあるって聞いて飛んできちゃった♪」"
translation = "「알고 있어. 엄청나게 좋은 조건의 아르바이트가 있다고 듣고 날아와 버렸지♪」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「──なんて、さすがに無理があるか。あははっ」"
translation = "「──라니, 역시 무리가 있나. 아하핫.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（あの子は確か、うちの学園の……）"
translation = "（저 아이는 분명, 우리 학원의……）"

[[dialogue]]
speaker = "unk"
original = "環は俺が新星学園に転入する前、一緒に働いていたバイト仲間だった。"
translation = "타마키는 내가 신성 학원에 전입하기 전, 함께 일했던 아르바이트 동료였다."

[[dialogue]]
speaker = "unk"
original = "何者かが成りすましているのかとさえ思ったが──言葉を交わしてみても、怪しい雰囲気はない。"
translation = "누군가가 사칭하고 있는 것은 아닌가 하고 생각했지만── 말을 섞어봐도, 수상한 분위기는 없다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうして市倉さんがここにいるの……？\u3000もしかして援軍……？\u3000でも、さっきの攻撃は……？」"
translation = "「어째서 이치쿠라 씨가 여기에 있는 거야……? 혹시 원군……? 하지만, 방금 공격은……?」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「ふふふ。さーて、なんででしょう？」"
translation = "「후후후. 자아, 왜일까요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なぜおまえがここにいるのか──聞きたいところだが今はいい。俺たちは急いでいる。通してくれ」"
translation = "「왜 네가 여기에 있는 건지── 묻고 싶지만 지금은 됐어. 우리들은 서두르고 있다. 지나가게 해 줘.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「それはできない相談なんだよねえ。これだけの猛吹雪なんだしさ、家で暖かくしてた方がよほどラクだと思わない？」"
translation = "「그건 들어줄 수 없는 부탁이네. 이렇게나 맹렬한 눈보라인데 말이야, 집에서 따뜻하게 지내는 게 훨씬 편하다고 생각하지 않아?」"

[[dialogue]]
speaker = "unk"
original = "友人との再会を喜べない理由は環の態度にあった。"
translation = "친구와의 재회를 기뻐할 수 없는 이유는 타마키의 태도에 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女は明らかに……俺たちの進行を阻むようにして、立ちはだかっている。"
translation = "그녀는 분명히…… 우리들의 진행을 막아서듯이, 가로막고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なぜ俺たちを阻む？」"
translation = "「왜 우리를 막는 거지?」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「キミに進んでもらっちゃ困るんだよ。それだけさ」"
translation = "「네가 나아가는 건 곤란하거든. 그뿐이야.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「この先には『彼』が待ってるからね」"
translation = "「이 앞에는 『그』가 기다리고 있으니까.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「黒騎士──知っているのね……？」"
translation = "「검은 기사── 알고 있는 거네……?」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「うん。そしてキミたちじゃ……『彼』に勝てない。だから無駄死にさせるわけにはいかない」"
translation = "「응. 그리고 너희들로는…… 『그』를 이길 수 없어. 그러니 헛되이 죽게 할 수는 없지.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「クロト。もしキミまで彼の手に堕ちてしまえば……この世界はどうしようもなくなるからね」"
translation = "「쿠로토. 만약 너마저 그의 손에 타락해 버린다면…… 이 세계는 어떻게 할 수 없게 될 테니까.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「リクリエから世界を守るのにクロトの力は不可欠だ──こんなところで、その戦力を欠かすわけにはいかないのさ」"
translation = "「리크리에로부터 세계를 지키는 데 쿠로토의 힘은 필수불가결해── 이런 곳에서, 그 전력을 잃을 수는 없어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……俺をそこまで評価してくれてるのはありがたいが」"
translation = "「……나를 그렇게까지 평가해 주는 건 고맙지만.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら、なぜ──黒騎士には勝てないっていうんだ？」"
translation = "「그렇다면, 왜── 검은 기사에게는 이길 수 없다고 하는 거지?」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「あれはキミにとって、越えられない壁だからさ」"
translation = "「그것은 너에게 있어, 넘을 수 없는 벽이니까.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「キミもあの『手』を見たはずだ。道を踏み外して、闇に堕ちたくはないだろう？」"
translation = "「너도 그 『손』을 봤을 거야. 길을 잘못 들어, 어둠에 타락하고 싶지는 않겠지?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「手──って、もしかして……」"
translation = "「손──이라니, 혹시……」"

[[dialogue]]
speaker = "unk"
original = "かつて、アポロを救うようにさらっていった巨大な手──"
translation = "예전에, 아폴로를 구하듯이 데려갔던 거대한 손──"

[[dialogue]]
speaker = "unk"
original = "俺が失敗しようものなら、アレが……死神よろしく迎えに来るとでも言うのだろうか。"
translation = "내가 실패라도 한다면, 저것이…… 사신처럼 마중 나오기라도 한다는 걸까."

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「ボクだってクロトのことは大事な友達だと思ってるんだよ？\u3000だから死んでほしくない。至って普通の感情さ」"
translation = "「나도 쿠로토는 소중한 친구라고 생각하고 있어. 그러니 죽게 하고 싶지 않아. 지극히 평범한 감정이지.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたのお気持ちは理解しました。しかし、こちらにも譲れぬ事情があります」"
translation = "「당신의 마음은 이해했습니다. 하지만, 이쪽에도 양보할 수 없는 사정이 있습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ……そうだよ市倉さん！\u3000私たちだって、ヴィーナスっていう大事な仲間のために──」"
translation = "「그…… 그렇다구요 이치쿠라 씨! 우리들도, 비너스라는 소중한 동료를 위해서──」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「知ってる。ま、ボクも不本意だけど仕方がない。彼女は元々──<b>この世界にいるはずのない</b>異物なんだから」"
translation = "「알고 있어. 뭐, 나도 본의는 아니지만 어쩔 수 없지. 그녀는 원래── <ruby>이 세계에 있을 리 없는<rt>・ ・・・ ・・ ・ ・・</rt></ruby> 이물질이니까.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「そんな彼女に引っ張られてキミを失えば……このアルタイルまで不可逆な破滅へ向かうことになる。ボクという存在はそれを認められない」"
translation = "「그런 그녀에게 이끌려 너를 잃으면…… 이 알타이르마저 비가역적인 파멸로 향하게 돼. 나라는 존재는 그것을 인정할 수 없어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「またアルタイル──それに異物って……？\u3000市倉さん、何を言ってるの……？」"
translation = "「또 알타이르── 게다가 이물질이라니……? 이치쿠라 씨, 무슨 말을 하는 거야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "環の言っていることを、俺たちは十分に理解できない。"
translation = "타마키가 하는 말을, 우리들은 충분히 이해할 수 없다."

[[dialogue]]
speaker = "unk"
original = "ひとつだけわかるのは──どうやら環は──俺と黒騎士が戦うことを良しとしない、らしい。"
translation = "하나만 알 수 있는 것은── 아무래도 타마키는── 나와 검은 기사가 싸우는 것을 좋게 여기지 않는, 것 같다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ご忠告──そして友人としての心配には感謝する。だが、仲間のためにもここは退けない」"
translation = "「충고── 그리고 친구로서의 걱정에는 감사한다. 하지만, 동료를 위해서라도 여기서는 물러설 수 없다.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「……あーあ。ま、だよねえ。キミの性格ならそう言うってわかってたのにさ」"
translation = "「……아아. 뭐, 그렇겠지. 네 성격이라면 그렇게 말할 줄 알고 있었는데 말이야.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「でもボクにも事情があるからね。譲れないんだ」"
translation = "「하지만 나에게도 사정이 있으니. 양보할 수 없어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……私たち全員と戦う気？」"
translation = "「……우리들 모두와 싸울 생각이야?」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「確かに、ボクの星力ではキミたちに遠く及ばない」"
translation = "「확실히, 나의 성력으로는 너희들에게 한참 미치지 못해.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「でもキミたちは知っているはずだよ？\u3000星力でも魔力でもない力を使う──大いなる存在を」"
translation = "「하지만 너희들은 알고 있을 거야? 성력도 마력도 아닌 힘을 사용하는── 위대한 존재를.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大いなる存在って、まさか──！？」"
translation = "「위대한 존재라니, 설마──!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「守護天使……！」"
translation = "「수호 천사……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「堕天使──ってわけでも、なさそうね……！」"
translation = "「타락천사──라는 것도, 아닌 것 같네……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……なるほどな。環──おまえは最初から、マグダレナさん達と同じ存在だったわけだ」"
translation = "「……과연 그렇군. 타마키── 너는 처음부터, 막달레나 씨들과 같은 존재였던 거군.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「まぁそういうこと。考えてもみてよ。どうしてボクがキミと一緒にバイトしていたのか」"
translation = "「뭐, 그런 거지. 생각해 보라고. 왜 내가 너와 함께 아르바이트를 하고 있었는지.」"

[[dialogue]]
speaker_original = "環？"
speaker_translation = "타마키?"
original = "「ずっとキミを監視してたんだよ。──<ruby>緋宮<rt>ひのみや</rt></ruby>クロト」"
translation = "「줄곧 너를 감시하고 있었어. ──히노미야</ruby> 쿠로토.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「守護天使が<ruby>一柱<rt>いっちゅう</rt></ruby>・《円環》のラクシャ──一身上の都合により、友人の邪魔をさせてもらうよ」"
translation = "「수호 천사 일주・《원환》의 라크샤── 개인적인 사정으로, 친구의 방해를 하도록 하겠어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「市倉さん──じょ、冗談……だよね……？」"
translation = "「이치쿠라 씨── 농, 농담……이지……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういうわけでもなさそうだ。伊達に長い付き合いじゃない」"
translation = "「그렇지도 않은 것 같다. 헛되이 오래 사귄 게 아니지.」"

[[dialogue]]
speaker = "unk"
original = "堕天しているわけでもない。"
translation = "타락한 것도 아니다."

[[dialogue]]
speaker = "unk"
original = "だが……そのいつになく真剣な眼光から、これが決して避けられない運命なのだと理解した。"
translation = "하지만…… 그 어느 때보다 진지한 눈빛에서, 이것이 결코 피할 수 없는 운명이라는 것을 이해했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「新星星徒会会長・緋宮クロト──こちらも退けない都合により、少し手荒な真似をさせてもらう」"
translation = "「신성 성도회 회장・히노미야 쿠로토── 이쪽도 물러설 수 없는 사정으로, 조금 거친 짓을 하도록 하겠다.」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「そうこなくっちゃ。かかってきなよ、星徒会のエリート達」"
translation = "「그렇게 나와야지. 덤벼봐, 성도회의 엘리트들.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「言われずとも──」"
translation = "「말하지 않아도──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「警戒最大──速やかに突破します！」"
translation = "「경계 최대── 신속히 돌파하겠습니다!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ！\u3000守護天使が相手でも──怯むわけにはいかないニャン！」"
translation = "「냥! 수호 천사가 상대라도── 움츠러들 수는 없는 냥!」"

