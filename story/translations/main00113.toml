[[dialogue]]
speaker = "unk"
original = "第１７話,誰かを救うために,B"
translation = "제17화, 누군가를 구하기 위해, B"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「ィィィ！」"
translation = "「이이이!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「ウィイイイイイ！！」"
translation = "「위이이이이이!!」"

[[dialogue]]
speaker = "unk"
original = "俺が姿を現すと、モンスターたちはエサに群がるようにこちらへ視線を向けてくる。"
translation = "내가 모습을 드러내자, 몬스터들은 먹이에 떼 지어 모이듯이 이쪽으로 시선을 향해 온다."

[[dialogue]]
speaker = "unk"
original = "こんな真似はもう何度も経験したが、ここまで絶望的な大群を相手にするのは初めてだった。そして最後になるかもしれない。"
translation = "이런 짓은 이미 몇 번이나 경험했지만, 이렇게까지 절망적인 대군을 상대하는 것은 처음이었다. 그리고 마지막이 될지도 모른다."

[[dialogue]]
speaker = "クロト"
original = "「おおおお────！！」"
translation = "「오오오오────!!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイイ──ッ！」"
translation = "「이이이이──읏!」"

[[dialogue]]
speaker = "unk"
original = "押し寄せるモンスターの波へ拳の乱れ打ちを浴びせていく。"
translation = "밀려드는 몬스터의 파도에 주먹을 마구 퍼붓는다."

[[dialogue]]
speaker = "unk"
original = "その手ごたえは今までに類を見ないほど硬く、もしかするとＳランクをも上回る強度かもしれなかった。"
translation = "그 타격감은 지금까지 유례를 찾아볼 수 없을 정도로 단단했고, 어쩌면 S랭크를 능가하는 강도일지도 몰랐다."

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイィィィ……！！」"
translation = "「이이이이이이……!!」"

[[dialogue]]
speaker = "クロト"
original = "「──まだまだッ！」"
translation = "「──아직 멀었다!」"

[[dialogue]]
speaker = "unk"
original = "これが積み重ねてきた特訓の成果というものか。"
translation = "이것이 쌓아 올린 특훈의 성과라는 것인가."

[[dialogue]]
speaker = "unk"
original = "入学前ならとうに地を舐めていただろう戦闘を経ても、俺の身体は限界を越えて稼働していた。"
translation = "입학 전이라면 벌써 땅바닥을 핥았을 전투를 겪고도, 내 몸은 한계를 넘어 가동하고 있었다."

[[dialogue]]
speaker = "unk"
original = "脳裏によみがえるのは、かつて連れ去られたモンスターの巣窟の記憶。あるいはこれが、走馬灯というやつだろうか。"
translation = "뇌리에 되살아나는 것은, 예전에 끌려갔던 몬스터 소굴의 기억. 혹은 이것이, 주마등이라는 것일까."

[[dialogue]]
speaker = "unk"
original = "あの時も死を覚悟した。でも今は、自らそんな死地に飛び込んでいる。"
translation = "그때도 죽음을 각오했다. 하지만 지금은, 스스로 그런 사지에 뛰어들고 있다."

[[dialogue]]
speaker = "unk"
original = "あの時の俺とは、もう違う。違うはずだ。"
translation = "그때의 나와는, 이미 다르다. 다를 것이다."

[[dialogue]]
speaker = "unk"
original = "……だけど、本当にそうなのだろうか。"
translation = "……하지만, 정말로 그런 것일까."

[[dialogue]]
speaker = "クロト"
original = "「（いくら強くなったって、敵と戦うのは怖い。死ぬのだって、怖い……）」"
translation = "「(아무리 강해졌다고 해도, 적과 싸우는 건 무섭다. 죽는 것도, 무섭다……)」"

[[dialogue]]
speaker = "unk"
original = "気が付くと、俺は戦いながら泣いていた。"
translation = "정신을 차려보니, 나는 싸우면서 울고 있었다."

[[dialogue]]
speaker = "？？？"
original = "『──怪我はないか、少年』"
translation = "『──다친 곳은 없나, 소년』"

[[dialogue]]
speaker = "unk"
original = "モンスターと対峙して、怖くなかったことなんてない。学園に入る前も、星騎士になってからも、本当はずっと怖かった。"
translation = "몬스터와 마주하고, 무섭지 않았던 적은 없다. 학원에 들어가기 전에도, 성기사가 되고 나서도, 사실은 계속 무서웠다."

[[dialogue]]
speaker = "unk"
original = "奴らは当たり前のように俺を見つけた。はぐれモンスターは数も少ないし、弱い個体ばかりだったが、奴らを倒した後はいつも足が震えていた。"
translation = "녀석들은 당연하다는 듯이 나를 발견했다. 길 잃은 몬스터는 수도 적고, 약한 개체뿐이었지만, 녀석들을 쓰러뜨린 후에는 언제나 다리가 떨렸다."

[[dialogue]]
speaker = "？？？"
original = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"
translation = "『강해져라. 세계를 집어삼키려는 힘에, 결코 먹히는 일이 없도록』"

[[dialogue]]
speaker = "unk"
original = "だけど、俺は「強くあれ」と言われた。"
translation = "하지만, 나는 「강해져라」라는 말을 들었다."

[[dialogue]]
speaker = "unk"
original = "俺の体質も、治るようなものでないことは気が付いていた。だから俺は、強くなろうと思った。"
translation = "내 체질도, 나을 수 있는 것이 아니라는 것을 깨닫고 있었다. 그래서 나는, 강해지려고 생각했다."

[[dialogue]]
speaker = "？？？"
original = "『君の両手には……他者を救う温かさが宿っている』"
translation = "『너의 양손에는…… 타인을 구하는 따뜻함이 깃들어 있다』"

[[dialogue]]
speaker = "unk"
original = "戦うのは怖い。生き残るのは苦しい。残る傷跡は痛い。"
translation = "싸우는 것은 무섭다. 살아남는 것은 괴롭다. 남는 상처는 아프다."

[[dialogue]]
speaker = "unk"
original = "だけどそんなの、あの人だってきっと同じだったはずだ。"
translation = "하지만 그런 것은, 그 사람도 분명 마찬가지였을 것이다."

[[dialogue]]
speaker = "unk"
original = "俺は──強くなればきっと、いつか恐怖は消えるのだと思っていた。"
translation = "나는── 강해지면 분명, 언젠가 공포는 사라질 것이라고 생각했다."

[[dialogue]]
speaker = "unk"
original = "けれど今、死を前にして気づいた。"
translation = "하지만 지금, 죽음을 앞에 두고 깨달았다."

[[dialogue]]
speaker = "unk"
original = "たとえどんなに修行を積もうと、心根に刻まれた恐怖心は消えない。"
translation = "설령 아무리 수행을 쌓아도, 마음속에 새겨진 공포심은 사라지지 않는다."

[[dialogue]]
speaker = "unk"
original = "でも……それでいいんだ。"
translation = "하지만…… 그걸로 괜찮다."

[[dialogue]]
speaker = "unk"
original = "俺を助けてくれたあの人だって、より強大な力を知りつつも立ち向かってくれたはずだから。"
translation = "나를 도와준 그 사람도, 더욱 강대한 힘을 알면서도 맞서 주었을 테니까."

[[dialogue]]
speaker = "unk"
original = "そう思うと、いつしか涙は消えていた。"
translation = "그렇게 생각하자, 어느새 눈물은 사라져 있었다."

[[dialogue]]
speaker = "クロト"
original = "「はは……吹っ切れはしたけど。なかなか、厳しいな」"
translation = "「하하…… 털어내긴 했지만. 꽤나, 힘들군」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイイイィィ……！！」"
translation = "「이이이이이이……!!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイイ～～～ッ！！」"
translation = "「이이이이~~~읏!!」"

[[dialogue]]
speaker = "unk"
original = "限界が来て膝をつく。見上げれば、まだまだわんさか残る敵の大群。"
translation = "한계가 와서 무릎을 꿇는다. 올려다보면, 아직도 잔뜩 남아있는 적의 대군."

[[dialogue]]
speaker = "unk"
original = "既に４、５体は討伐したはずだが──この量はどう見ても尋常じゃない。"
translation = "이미 넷, 다섯 마리는 토벌했을 텐데── 이 양은 아무리 봐도 심상치 않다."

[[dialogue]]
speaker = "クロト"
original = "「でも……最低限の時間は、稼いだぞ」"
translation = "「하지만…… 최소한의 시간은, 벌었다」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイイイィィ……！！」"
translation = "「이이이이이이……!!」"

[[dialogue]]
speaker = "unk"
original = "ひたすら攻撃を引きつけることで被害も最小限に抑えた。"
translation = "오로지 공격을 끌어당김으로써 피해도 최소한으로 억제했다."

[[dialogue]]
speaker = "unk"
original = "たとえ俺が力尽きても、きっともうすぐ、星徒会のみんなならこの事態に駆けつけてくれる。"
translation = "설령 내가 힘이 다하더라도, 분명 곧, 성도회 모두가 이 사태에 달려와 줄 것이다."

[[dialogue]]
speaker = "unk"
original = "だから──"
translation = "그러니까──"

[[dialogue]]
speaker = "クロト"
original = "「これで、最後だ──オオオオオォォォォォッッッ！」"
translation = "「이것으로, 마지막이다── 오오오오오오오오오옷!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイイイィィ……！！」"
translation = "「이이이이이이……!!」"

[[dialogue]]
speaker = "クロト"
original = "「（ごめん、ヴィーナス──約束、果たせなくて──）」"
translation = "「(미안, 비너스── 약속, 지키지 못해서──)」"

[[dialogue]]
speaker = "unk"
original = "最後の力をふり絞っての突撃──御前試合を行うことすらできないことを、俺は心の中でヴィーナスに詫びた。"
translation = "마지막 힘을 쥐어짜낸 돌격── 어전 시합을 치르는 것조차 할 수 없다는 것을, 나는 마음속으로 비너스에게 사과했다."

[[dialogue]]
speaker = "unk"
original = "その、刹那──"
translation = "그, 찰나──"

[[dialogue]]
speaker = "unk"
original = "<size=30>バカね、あんたは──そんなことだから目が離せないって言われるのよ</size>"
translation = "<size=30>바보네, 너는── 그러니까 눈을 뗄 수 없다고 하는 거야</size>"

[[dialogue]]
speaker = "クロト"
original = "「えっ────」"
translation = "「엣────」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイィィィ～～～ッ！！」"
translation = "「이이이이이~~~읏!!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イイイィィィ～～～ッ！！」"
translation = "「이이이이이~~~읏!!」"

[[dialogue]]
speaker = "クロト"
original = "「っはぁ、はぁ、はぁ……生き残った──のか……？」"
translation = "「하아, 하아, 하아…… 살아남은── 건가……?」"

[[dialogue]]
speaker = "unk"
original = "信じられない光景だった。なにかを察知して一斉に牙を剥いたモンスター達が、俺の振り抜いた拳ひとつにまとめて打ちのめされていた。"
translation = "믿을 수 없는 광경이었다. 무언가를 감지하고 일제히 이빨을 드러낸 몬스터들이, 내가 휘두른 주먹 하나에 모조리 때려눕혀져 있었다."

[[dialogue]]
speaker = "unk"
original = "暴虐の限りを尽くしていた大群が消滅していく……。"
translation = "포학을 일삼던 대군이 소멸해 간다……."

[[dialogue]]
speaker = "クロト"
original = "「今のは……」"
translation = "「방금 그건……」"

[[dialogue]]
speaker = "unk"
original = "特訓の成果──いや、それだけでは説明もつかないあの煌めきはなんだ。"
translation = "특훈의 성과── 아니, 그것만으로는 설명할 수 없는 그 반짝임은 뭐지."

[[dialogue]]
speaker = "unk"
original = "それに、胸の奥から感じたあの疼き……"
translation = "게다가, 가슴 깊은 곳에서 느껴진 그 욱신거림……"

[[dialogue]]
speaker = "クロト"
original = "「おかしくないか、俺──今の力……」"
translation = "「이상하지 않나, 나── 방금 그 힘……」"

[[dialogue]]
speaker = "unk"
original = "まだ２０体以上残っていたＳランク相当のモンスターを、一撃で消滅させる威力。"
translation = "아직 20마리 이상 남아있던 S랭크 상당의 몬스터를, 일격에 소멸시키는 위력."

[[dialogue]]
speaker = "unk"
original = "それだけではない。あれだけ傷ついていたはずの体も、星力も、気が付いたら全快していた。"
translation = "그것만이 아니다. 그렇게 상처 입었을 터인 몸도, 성력도, 정신을 차려보니 완전히 회복되어 있었다."

[[dialogue]]
speaker = "unk"
original = "服だけはボロボロで、自分の血で汚れているのに、当の体には傷一つない。まるで戦闘前の状態に戻ったかのような万全状態だ。"
translation = "옷만은 너덜너덜하고, 자신의 피로 더러워져 있는데, 정작 몸에는 상처 하나 없다. 마치 전투 전의 상태로 돌아간 듯한 완벽한 상태다."

[[dialogue]]
speaker = "クロト"
original = "「（窮地に陥ると助けてくれる力……とか？\u3000そんな都合のいい力はないよな……）」"
translation = "「(궁지에 몰리면 도와주는 힘…… 같은 건가? 그런 편리한 힘은 없겠지……)」"

[[dialogue]]
speaker = "unk"
original = "いや──それとも、逆に考えて。"
translation = "아니── 아니면, 반대로 생각해."

[[dialogue]]
speaker = "unk"
original = "この湧き上がった力こそ、ヴィーナスが俺のことを求める根拠なのか……？"
translation = "이 솟아난 힘이야말로, 비너스가 나를 원하는 근거인 것인가……?"

[[dialogue]]
speaker = "unk"
original = "──そんなことを考えていた時だった。"
translation = "──그런 것을 생각하고 있을 때였다."

[[dialogue]]
speaker = "？？？"
original = "「おにーさん、やるね！」"
translation = "「오빠, 제법인데!」"

[[dialogue]]
speaker = "クロト"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "どこからか響いた軽快な声。"
translation = "어디선가 울려 퍼진 경쾌한 목소리."

[[dialogue]]
speaker = "unk"
original = "その正体は、たちまち俺の前に現れた。"
translation = "그 정체는, 순식간에 내 앞에 나타났다."

