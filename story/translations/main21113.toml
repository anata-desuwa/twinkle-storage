[[dialogue]]
speaker = "unk"
original = "第１３話,終息,B"
translation = "제13화, 종식, B"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトが女神の神殿を止めたのと同時刻。"
translation = "히노미야 쿠로토가 여신의 신전을 멈춘 것과 같은 시각."

[[dialogue]]
speaker = "unk"
original = "衛兵隊長であるケイティは聖庭園の破壊のために残ったが、住民は他の空中島に繋がる道に避難していた。"
translation = "위병대장인 케이티는 성정원의 파괴를 위해 남았지만, 주민들은 다른 공중섬으로 이어지는 길로 피난해 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「神殿が止まった……！？」"
translation = "「신전이 멈췄어!?」"

[[dialogue]]
speaker = "チナ"
original = "「みたいだな……。なんか巨大な陽炎みたいなのが現れたと思ったら、急に神殿が止まったように見えたが」"
translation = "「그런 것 같네……. 뭔가 거대한 아지랑이 같은 게 나타났다 싶더니, 갑자기 신전이 멈춘 것처럼 보였는데.」"

[[dialogue]]
speaker = "アポロ"
original = "「あれが新しいアルケインコードの力ってことなのか！？\u3000後で魔王に詳しい話を聞かなくちゃな！」"
translation = "「저게 새로운 아르케인 코드의 힘이라는 건가!? 나중에 마왕에게 자세한 이야기를 들어봐야겠어!」"

[[dialogue]]
speaker = "unk"
original = "遠目にも、神殿が停止しているのは明らかだった。"
translation = "멀리서 봐도 신전이 정지해 있는 것은 명백했다."

[[dialogue]]
speaker = "unk"
original = "聖庭園の市民も不安が緩み、安心の表情が浮かんでいる。"
translation = "성정원 시민들도 불안이 가시고 안도의 표정을 짓고 있다."

[[dialogue]]
speaker = "アポロ"
original = "「ジグの方も気になるが……いや、きっとそっちも上手くやっただろ。選管はあたしの仲間だからな」"
translation = "「지그 쪽도 걱정되지만…… 아니, 분명 그쪽도 잘 해냈겠지. 선관은 내 동료니까!」"

[[dialogue]]
speaker = "シノ"
original = "『守護天使の神殿も防衛に成功しました。これで天界を守り切れましたね』"
translation = "『수호천사의 신전도 방어에 성공했습니다. 이걸로 천계를 완전히 지켜냈군요』"

[[dialogue]]
speaker = "チナ"
original = "「この声は……新星の学園長か」"
translation = "「이 목소리는…… 신성의 학원장인가.」"

[[dialogue]]
speaker = "アポロ"
original = "「てことは、あたしたちの勝ちだな！」"
translation = "「그렇다는 건 우리들의 승리네!」"

[[dialogue]]
speaker = "チナ"
original = "「別にアタシの勝ちじゃあないけどな……」"
translation = "「딱히 내 승리는 아니지만 말이야……」"

[[dialogue]]
speaker = "チナ"
original = "「でも……グレイスとレティシアはどうなるんだ？」"
translation = "「하지만…… 그레이스와 레티시아는 어떻게 되는 거지?」"

[[dialogue]]
speaker = "シノ"
original = "『おふたりの身柄は新星学園が預かります。処遇も各所と協議済みですし、身の安全は保障しますよ』"
translation = "『두 분의 신변은 신성학원에서 맡겠습니다. 처우도 각처와 협의를 마쳤고, 신변의 안전은 보장할게요』"

[[dialogue]]
speaker = "チナ"
original = "「ほっ……」"
translation = "「휴우……」"

[[dialogue]]
speaker = "シノ"
original = "『彼女たちは確かに天使たちの命を脅かしましたが、デネブとともにリクリエと戦うというアルタイルの方針は変わりません。もちろん丁重に扱います』"
translation = "『그녀들이 천사들의 생명을 위협한 것은 사실이지만, 데네브와 함께 리크리에와 싸운다는 알타이르의 방침은 변하지 않습니다. 물론 정중히 대접할 겁니다』"

[[dialogue]]
speaker = "シノ"
original = "『それに彼女たちにもお話を聞かないといけませんから。私たちが正しい選択をするためには、多くの情報が必要です』"
translation = "『게다가 그녀들에게도 이야기를 들어야 하니까요. 우리가 올바른 선택을 하기 위해서는 많은 정보가 필요합니다』"

[[dialogue]]
speaker = "アポロ"
original = "（情報……ルヴィネのこともきっと……）"
translation = "(정보…… 루비네에 대한 것도 분명……)"

[[dialogue]]
speaker = "unk"
original = "極星学園の星徒会長・ルヴィネ。"
translation = "극성학원의 성도회장 루비네."

[[dialogue]]
speaker = "unk"
original = "彼女は創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によって生み出された、新たな女神だという。"
translation = "그녀는 창조신 『<ruby>제로스<rt>XELOS</rt></ruby>』에 의해 태어난 새로운 여신이라고 한다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネと対峙するためにも、デネブや極星学園、極星星徒会のことを知る必要があると、アポロも思うのだった。"
translation = "루비네와 대치하기 위해서라도 데네브나 극성학원, 극성성도회에 대해 알 필요가 있다고 아폴로도 생각하는 것이었다."

[[dialogue]]
speaker = "unk"
original = "……アルタイルの天界襲撃から３日。"
translation = "……알타이르의 천계 습격으로부터 3일."

[[dialogue]]
speaker = "unk"
original = "遠く離れた、平行世界のデネブでは──"
translation = "멀리 떨어진 평행세계의 데네브에서는──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（──アルタイルの天界襲撃を指示してから、もう３日）"
translation = "(──알타이르의 천계 습격을 지시한 지 벌써 3일)"

[[dialogue]]
speaker = "ルヴィネ"
original = "（観測していない以上、断言はできない。けれど……）"
translation = "(관측하지 않은 이상 단언할 수는 없어. 하지만……)"

[[dialogue]]
speaker = "unk"
original = "グレイスもレティシアも未だ、デネブに帰還してこない。"
translation = "그레이스도 레티시아도 아직 데네브로 귀환하지 않았다."

[[dialogue]]
speaker = "unk"
original = "つまり──アルタイルの破壊に失敗した。その可能性が極めて高い。"
translation = "즉── 알타이르의 파괴에 실패했다. 그 가능성이 극히 높다."

[[dialogue]]
speaker = "ルヴィネ"
original = "（……私の失態ね。見誤ったわ）"
translation = "(……나의 실책이네. 잘못 보았어)"

[[dialogue]]
speaker = "unk"
original = "新しく製造した転送装置を再び失った。そして『極星学園星徒会』という、ルヴィネ自身が所有する最大の戦力すらも自由に扱えない状況となってしまった。"
translation = "새로 제조한 전송 장치를 다시 잃었다. 그리고 『극성학원 성도회』라는 루비네 자신이 소유한 최대의 전력조차 자유롭게 다룰 수 없는 상황이 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "そうとなれば──"
translation = "그렇게 된다면──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……報告に、いかなくてはね」"
translation = "「……보고하러 가야겠네.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネは極星学園の星徒会室を出て、フィーニスの塔へと向かう。"
translation = "루비네는 극성학원의 성도회실을 나와 피니스의 탑으로 향한다."

[[dialogue]]
speaker = "unk"
original = "失態の報告に、今後の計画の修正方針。そして未だ帰ってこない、友人の安否への不安。様々な要素が、ルヴィネの足取りを重くしていた。"
translation = "실책에 대한 보고와 향후 계획의 수정 방침. 그리고 아직 돌아오지 않는 친구의 안위에 대한 불안. 다양한 요소가 루비네의 발걸음을 무겁게 하고 있었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "その日はよく晴れた夜だった。うるさいほどに、星々が頭上に瞬いている。"
translation = "그날은 맑게 갠 밤이었다. 시끄러울 정도로 별들이 머리 위에서 반짝이고 있다."

[[dialogue]]
speaker = "unk"
original = "星の輝きを見ると、どうしても女神テルルを連想せずにはいられない。"
translation = "별의 반짝임을 보면 아무래도 여신 테루루를 연상하지 않을 수 없다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「……忌々しい」"
translation = "「……가증스러워.」"

[[dialogue]]
speaker = "unk"
original = "満天の星空を不愉快に感じる存在など、この世にはそういない。だからこれは、極星学園の友人たちにも見せられない姿だった。"
translation = "밤하늘 가득한 별들을 불쾌하게 느끼는 존재 따위 이 세상에 그리 많지 않을 것이다. 그러니 이것은 극성학원의 친구들에게도 보여줄 수 없는 모습이었다."

[[dialogue]]
speaker = "unk"
original = "そのまま通い慣れた道をたどり、ルヴィネはフィーニスの塔の頂上へとやってきた──"
translation = "그대로 익숙한 길을 따라 루비네는 피니스의 탑 정상에 도착했다──"

[[dialogue]]
speaker = "ルヴィネ"
original = "（……大丈夫。計画に支障はないわ）"
translation = "(……괜찮아. 계획에 지장은 없어)"

[[dialogue]]
speaker = "ルヴィネ"
original = "（世界はまもなく刷新される。他ならぬ私──女神ルヴィネの手によって）"
translation = "(세계는 머지않아 쇄신될 거야. 다른 누구도 아닌 나── 여신 루비네의 손에 의해서)"

[[dialogue]]
speaker = "unk"
original = "──無礼があってはならない。"
translation = "──무례가 있어서는 안 된다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは極限の集中力を発揮して、慎重に言葉を選ぶ。"
translation = "루비네는 극한의 집중력을 발휘하여 신중하게 말을 고른다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「──私です。お姿を、お見せいただけますか」"
translation = "「──저입니다. 모습을 보여주시겠습니까?」"

[[dialogue]]
speaker = "unk"
original = "虚空に消えるルヴィネの言葉。"
translation = "허공으로 사라지는 루비네의 말."

[[dialogue]]
speaker = "unk"
original = "しかし、確かに『届いている』。その実感がルヴィネにはある。"
translation = "하지만 분명히 『닿아 있다』. 그 실감이 루비네에게는 있다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "やがてルヴィネの頭上に『それ』は現れた。"
translation = "이윽고 루비네의 머리 위에 『그것』이 나타났다."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトたちが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と呼称する存在。"
translation = "히노미야 쿠로토 일행이 『<ruby>제로스<rt>XELOS</rt></ruby>』라고 호칭하는 존재."

[[dialogue]]
speaker = "unk"
original = "女神テルルすらも創造した、この世界の真なる神。すべてのはじまり。"
translation = "여신 테루루조차 창조한 이 세계의 진정한 신. 모든 것의 시작."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは恭しく頭を下げて『それ』に語りかける。"
translation = "루비네는 공손히 고개를 숙여 『그것』에게 말을 건다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「……お会いできて光栄です」"
translation = "「……뵙게 되어 영광입니다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──<b>お父様</b>」"
translation = "「──<b>아버님</b>」"

