[[dialogue]]
speaker = "unk"
original = "そうして始まったおなか部への特別試験だったが──"
translation = "그렇게 시작된 오나카부의 특별 시험이었지만──"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ぜぇぜぇ、もう限界よ……。や、休ませて……」"
translation = "「헉헉, 이제 한계야……. 쉬, 쉬게 해줘……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「だらしないですね。まだ始めたばかりじゃないですか」"
translation = "「한심하네요. 이제 막 시작했을 뿐이잖아요.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへへ、お掃除、お掃除、ピッカピカ～……♪」"
translation = "「에헤헤, 청소하자, 청소, 반짝반짝~……♪」"

[[dialogue]]
speaker = "unk"
original = "次はカフェテリアの手伝いだね"
translation = "다음은 카페테리아 돕기네."

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「その後は倉庫の整理に、資料の仕分け、壊れた器具の修理ですか」"
translation = "「그다음은 창고 정리랑 서류 분류, 부서진 기구 수리인가요.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「なんだか拍子抜けですね。特別試験と言うからにはもっと大変なことを頼まれると思ってましたのに」"
translation = "「왠지 김빠지네요. 특별 시험이라고 하길래 더 힘든 일을 시킬 줄 알았는데요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「十分大変よぉ……。うぅ、こんなはずじゃなかったのにぃ……」"
translation = "「충분히 힘들어어……. 으으, 이럴 계획이 아니었는데에……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへへ、でもなんだかやり甲斐があるね……？」"
translation = "「에헤헤, 그래도 왠지 보람차네……?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ええ。こういうモンスターが関わらない仕事こそ、おなか部の本分ですから」"
translation = "「네. 이런 몬스터와 상관없는 일이야말로 오나카부의 본분이니까요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「こんなのただ雑用を押しつけられてるだけじゃな～い。私が宿題押しつけるのとどう違うのよぉ～」"
translation = "「이건 그냥 잡일을 떠맡은 것뿐이잖아~. 내가 숙제 떠넘기는 거랑 뭐가 다르냐고오~」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「だけど、こんなことで本当にプリマステラになれるのかな……？\u3000普通にお掃除してるだけだけど……」"
translation = "「하지만 이런 걸로 정말 프리마스텔라가 될 수 있을까……? 그냥 평범하게 청소만 하고 있는데……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そうですね……何か秘密の意図があるのでしょうか？」"
translation = "「그러게요…… 무슨 비밀스러운 의도가 있는 걸까요?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ、わかったわ。星力を使って依頼をこなせってことじゃない？\u3000そのためにダーリンが付いてくれてるんでしょ？」"
translation = "「아, 알았다. 성력을 써서 의뢰를 해결하라는 거 아니야? 그러라고 달링이 붙어있는 거잖아?」"

[[dialogue]]
speaker = "unk"
original = "ああ、ヴィーナスからも許可は出てるよ"
translation = "아아, 비너스한테 허가도 받았어."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ほらやっぱり！\u3000だと思ったのよ～。この子たち、いつも星力の制御に失敗して試験に落ちてばかりだから」"
translation = "「거봐 역시! 그럴 줄 알았어~. 이 아이들, 맨날 성력 제어에 실패해서 시험에 떨어지기만 하니까.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「な、なるほど。つまりそういう試験だったわけですね。今日一日、星力を使って依頼を解決して回って、その結果を見る。と……」"
translation = "「나, 과연. 그러니까 그런 시험이었던 거군요. 오늘 하루 성력을 사용해 의뢰를 해결하며 돌아다니고, 그 결과를 본다. 인 거죠……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そこに気付くところから試験だったってこと……？\u3000あぅ、だったら出遅れちゃったかも……」"
translation = "「그걸 눈치채는 것부터 시험이었다는 거야……? 아우, 그럼 늦어버렸을지도……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「今からでも全然遅くないわ。ほらみんな変身変身♪」"
translation = "「지금이라도 전혀 늦지 않았어. 자 다들 변신 변신♪」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「う、うん」"
translation = "「으, 응.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「あまり戦闘服姿は好きではないんですが……」"
translation = "「별로 전투복 차림은 좋아하지 않습니다만……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ～、これで楽ができるわ～。水精ちゃんたち～。後は任せたわよ～」"
translation = "「아~ 이제 편해지겠네~. 물의 정령들아~ 나머지는 맡길게~」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「わぁ、水精さんたちが箒を持ってお掃除してくれてる……。流石はパルちゃんだね……。すごいなぁ……」"
translation = "「와아, 물의 정령분들이 빗자루를 들고 청소해 주고 있어……. 역시 팔짱이네……. 대단하다……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「パルミエはホント器用に星力を扱いますよね。普段もお菓子の買い出しからマッサージまで水精にさせていますし」"
translation = "「팔미에는 정말 성력을 교묘하게 다루네요. 평소에도 과자 심부름부터 마사지까지 물의 정령에게 시키고 있고.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふん、それほどでもないわよ♪\u3000常日頃からいかに星力を上手く使って楽をできるか考えてるだ～け♪」"
translation = "「후흥, 그 정도까지는 아니야♪ 평소에 어떻게 하면 성력을 잘 써서 편하게 지낼 수 있을지 고민할 뿐이라구♪」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ、あはは、どや顔で言うことなのかなぁ……」"
translation = "「아, 아하하, 당당하게 할 소린가 싶기도 하고……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ま、これで頭数も増えましたし、ちゃっちゃと終わらせちゃいましょう。ほらパルミエもサボってないで箒を持ってください」"
translation = "「뭐, 이걸로 일손도 늘었으니 후딱 끝내버리죠. 자 팔미에도 빈둥거리지 말고 빗자루 드세요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「それじゃ意味ないじゃなーい。私が何もしなくて済むように水精ちゃんを出したんだから～」"
translation = "「그러면 의미가 없잖아~. 내가 아무것도 안 해도 되게 하려고 정령들을 부른 건데~」"

[[dialogue]]
speaker = "unk"
original = "３人とも仲が良いよね"
translation = "세 사람 다 정말 사이가 좋네."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへへ、モナカたち、小さい頃からずっと一緒だから……」"
translation = "「에헤헤, 모나카 일행은 어릴 때부터 계속 함께였으니까……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「幼馴染みというヤツですよ。私たち、同じ田舎町出身でして」"
translation = "「소꿉친구라는 거죠. 저희, 같은 시골 마을 출신이라서요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「２人とも私が大好きすぎて学園まで追いかけてきたくらいだものね～♪\u3000ホント私って罪な女だわ～♪」"
translation = "「둘 다 나를 너무 좋아해서 학원까지 쫓아왔을 정도니까 말야~♪ 정말 나란 여잔 죄 많은 여자야~♪」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「寂しいから２人とも早く来て～。とか毎日毎日電話かけてきたのはどこの誰ですか、まったく……」"
translation = "「외로우니까 둘 다 빨리 와~라면서 매일매일 전화했던 게 누구였죠, 참 나……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも良かったね……。ちゃんと３人揃って入学できて……。モナカ、落ちこぼれだから……。１人だけ入学できないかもって不安だったの……」"
translation = "「그래도 다행이야……. 제대로 셋이 다 같이 입학해서……. 모나카, 낙오자니까……. 혼자만 입학 못 할지도 모른다고 불안했었거든……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ふふ、あとは揃ってプリマステラになるだけです！\u3000気合いを入れ直して試験に取り組みましょう！」"
translation = "「후후, 남은 건 다 같이 프리마스텔라가 되는 것뿐입니다! 기운을 가다듬고 시험에 전념하죠!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あんまり張り切りすぎないようにね～。シフォンはやる気を出せば出すほど周りが見えなくなる脳筋アホの子なんだから～」"
translation = "「너무 의욕 부리지는 마~. 시폰은 의욕을 내면 낼수록 주변을 못 보게 되는 근육 바보 멍청이니까~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「だ、誰が脳筋アホの子ですか！\u3000万年グータラ娘に言われたくありません！」"
translation = "「누, 누가 근육 바보 멍청이예요! 만년 게으름뱅이 아가씨한테 듣고 싶지 않습니다!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あわわ、２人とも今は試験に集中しないとだから……」"
translation = "「아와와, 둘 다 지금은 시험에 집중해야 하니까……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「ふぅ。これで頼まれていた仕事は大体片付きましたかね」"
translation = "「후우. 이걸로 부탁받은 일은 대충 다 끝났나요.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「シフォンのせいで倍の時間がかかったけれどね～。鍋の中に香辛料を一瓶丸々ぶちこんだり、修理を頼まれてた品を叩いてぶっ壊そうとしちゃうんだもの～」"
translation = "「시폰 때문에 시간이 배로 걸렸지만 말야~. 냄비 속에 향신료를 통째로 쏟아붓거나, 수리를 맡은 물건을 두드려서 부수려고 하질 않나~」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「う、うるさいですね。カフェテリアの料理なんて大味でいいんです！\u3000電化製品もとりあえず叩いておけば直るんですから！」"
translation = "「시, 시끄러워요. 카페테리아 요리 같은 건 대충 만들어도 돼요! 가전제품도 일단 두드리면 고쳐지는 법이니까요!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ、あはは……。料理も修理もモナカがちゃんとしておいたから……」"
translation = "「아, 아하하……. 요리도 수리도 모나카가 제대로 해뒀으니까……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「モナカはしっかりしてるわね～。偉いわよ～」"
translation = "「모나카는 야무지네~. 기특해라~」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへへ、モナカ、部長さんだから。パルちゃんにはもう少し真面目になってもらいたいけど……」"
translation = "「에헤헤, 모나카, 부장님이니까. 팔짱도 조금만 더 진지해졌으면 좋겠는데……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あら、言われちゃってるわよ、シフォン」"
translation = "「어머, 한 소리 듣고 있네, 시폰.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「あなたに言ってるんですよ！？」"
translation = "「당신한테 하는 말이거든요!?」"

[[dialogue]]
speaker = "unk"
original = "次の依頼で最後だっけ？"
translation = "다음 의뢰가 마지막이었나?"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そうですね。この手紙だけはヴィーナスさんから最後に開くようにと言われてまして」"
translation = "「그렇네요. 이 편지만은 비너스 씨가 마지막에 열어보라고 하셔서요.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「これが本番ってことかな……？\u3000どんなお悩み相談なの……？」"
translation = "「이게 본편이라는 걸까……? 어떤 고민 상담이지……?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「どうやら最近、寮の冷蔵庫やお菓子棚から物がなくなってるみたいです。複数人の生徒たちから同じ相談が届いてるみたいですね」"
translation = "「아무래도 최근, 기숙사 냉장고나 과자 선반에서 물건이 없어지고 있나 봐요. 여러 학생에게서 같은 상담이 온 모양이네요.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「お、お菓子泥棒ってこと……？\u3000そんな人がこの学園にいるなんて……」"
translation = "「과, 과자 도둑이라는 거야……? 그런 사람이 이 학원에 있다니……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「まだ学園の生徒とは決まってませんよ。外部犯かもしれません」"
translation = "「아직 학원 학생이라고 정해진 건 아니에요. 외부인 소행일지도 모릅니다.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「面倒くさそうな相談ね～。そうだ、星徒会に任せちゃったらいいんじゃないかしら♪」"
translation = "「귀찮아 보이는 상담이네~. 맞다, 성도회에 맡겨버리면 되지 않을까♪」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そ、その星徒会さんから頼まれてるんだよね……？」"
translation = "「그, 그 성도회 분들에게 부탁받은 거잖아……?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「とにかく早速張り込んでみましょう！\u3000善は急げです！」"
translation = "「어쨌든 바로 잠복해 보죠! 쇠뿔도 단김에 빼야죠!」"

