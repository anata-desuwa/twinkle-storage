[[dialogue]]
speaker = "unk"
original = "第４話,フィーニスの塔・第三階層,B"
translation = "제4화, 피니스의 탑・제3계층, B"

[[dialogue]]
speaker = "ヴィーナス"
original = "「着いたわね……ここが」"
translation = "「도착했네…… 여기가」"

[[dialogue]]
speaker = "クロト"
original = "「フィーニス──」"
translation = "「피니스──」"

[[dialogue]]
speaker = "フィオナ"
original = "「第三階層……」"
translation = "「제3계층……」"

[[dialogue]]
speaker = "unk"
original = "一階層と二階層の例からして、恐らく再び毛色は変わるのだろうと踏んでいたが──"
translation = "1계층과 2계층의 예로 미루어 보아, 아마도 다시 분위기가 바뀔 것이라고 예상했지만──"

[[dialogue]]
speaker = "unk"
original = "目の前に広がっていた景観は、予想を上回るものだった。"
translation = "눈앞에 펼쳐진 경관은, 예상을 뛰어넘는 것이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「何なの……ここ。超、陰気臭いんですけど……」"
translation = "「뭐야…… 여기. 엄청, 음침하잖아……」"

[[dialogue]]
speaker = "ルリエル"
original = "「そ、想像していた景色と全然違うであります……！\u3000あの豪華な塔はどこへいってしまわれたのですか……！？」"
translation = "「서, 상상했던 풍경과 완전히 다르옵니다……! 그 호화로운 탑은 어디로 가버린 것이옵니까……!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「というか、こんなに中が広いのもおかしい──ような……」"
translation = "「랄까, 이렇게 안이 넓은 것도 이상한── 듯한……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ま、前に入った時とも全然違うニャン……！？」"
translation = "「저, 전에 들어갔을 때와도 완전히 다르냥……!?」"

[[dialogue]]
speaker = "セーラ"
original = "「んー。異界、ってカンジなのかなー」"
translation = "「음ー. 이계, 같은 느낌인 걸까ー」"

[[dialogue]]
speaker = "クロト"
original = "「確かに今までも異界が広がってはいましたが──ここまで広大な内部は初めてです」"
translation = "「확실히 지금까지도 이계가 펼쳐지긴 했지만── 이렇게 광대한 내부는 처음입니다」"

[[dialogue]]
speaker = "アナ"
original = "「ＤＩＳＣの通信も不可能──これは、会長や前会長からもうかがっていた情報通りです」"
translation = "「DISC의 통신도 불가능── 이것은, 회장이나 전 회장에게서도 들었던 정보대로입니다」"

[[dialogue]]
speaker = "マトイ"
original = "「なんていうか……映画の中みたい」"
translation = "「뭐랄까…… 영화 속 같아」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね……これでは、まるで……」"
translation = "「그렇네요…… 이것은, 마치……」"

[[dialogue]]
speaker = "unk"
original = "みな、心のどこかで同じような感想を抱いていたはずだ。"
translation = "모두, 마음속 어딘가에서 비슷한 감상을 품고 있었을 것이다."

[[dialogue]]
speaker = "unk"
original = "この景観をひと言で表すとするなら、そう──"
translation = "이 경관을 한마디로 표현하자면, 바로──"

[[dialogue]]
speaker = "クロト"
original = "「滅亡した、世界……」"
translation = "「멸망한, 세계……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……ぴったりの表現ですね。それも、滅んでしばらく経ったかのような」"
translation = "「……딱 맞는 표현이네요. 그것도, 멸망하고 한참 지난 듯한」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひえ……！\u3000い、一体何が起こったのでしょうか……！？」"
translation = "「히익……! 이, 대체 무슨 일이 일어난 것일까요……!?」"

[[dialogue]]
speaker = "アナ"
original = "「建造物の残骸が各所に見られます。文明のあった名残──とは思いますが、私たちの世界と同一かはわかりません」"
translation = "「건조물의 잔해가 곳곳에서 보입니다. 문명이 있었다는 흔적──이라고는 생각하지만, 우리 세계와 동일한지는 알 수 없습니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「人間界に近いかしら？\u3000でも、ただのセットかもしれないわよね」"
translation = "「인간계에 가까울까? 하지만, 단순한 세트일 수도 있잖아」"

[[dialogue]]
speaker = "クロト"
original = "「そうですね。ただ、いずれにせよ──不吉なのは確かです」"
translation = "「그렇습니다. 다만, 어느 쪽이든── 불길한 것은 확실합니다」"

[[dialogue]]
speaker = "unk"
original = "それでも──ここがフィーニスの塔の上層である以上、俺たちのすべきことはひとつだ。"
translation = "그럼에도── 여기가 피니스의 탑 상층인 이상, 우리들이 해야 할 일은 하나다."

[[dialogue]]
speaker = "クロト"
original = "「──進もう。いくら広大に見えても、塔の中には変わりない。必ず終点があるはずだ」"
translation = "「──나아가자. 아무리 광대해 보여도, 탑 안인 것은 변함없다. 반드시 종착점이 있을 것이다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね！\u3000初めてのみんなも、私たちについてきて！」"
translation = "「그렇지! 처음인 모두도, 우리를 따라와!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「奥には毎回ボスがいて──そいつを倒せば、何かしら手がかりが手に入るのよ！\u3000簡単でしょ♪」"
translation = "「안쪽에는 매번 보스가 있고── 그 녀석을 쓰러뜨리면, 뭔가 단서를 얻을 수 있어! 간단하지♪」"

[[dialogue]]
speaker = "アナ"
original = "「ゲームみたいですね」"
translation = "「게임 같네요」"

[[dialogue]]
speaker = "ユウリ"
original = "「そのボスっつーのが例のドラゴンってわけだな」"
translation = "「그 보스라는 게 그 드래곤이란 말이군」"

[[dialogue]]
speaker = "マトイ"
original = "「ラ、ラジャ。ちょっと怖いけど……みんながいれば！」"
translation = "「라, 라져. 조금 무섭지만…… 모두가 있다면!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ。こんな暗い場所は早く脱したいものね」"
translation = "「후후. 이런 어두운 장소는 빨리 벗어나고 싶네」"

[[dialogue]]
speaker = "フィオナ"
original = "「前例通りなら──守護天使の方がいるかもしれません。行きましょう」"
translation = "「전례대로라면── 수호 천사 분이 계실지도 모릅니다. 가시죠」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。今の俺たちなら──星徒会同士の連携も取れるはずだ」"
translation = "「아아. 지금의 우리들이라면── 성도회끼리의 연계도 가능할 것이다」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちは廃れた階層を進んでいった。"
translation = "그렇게, 우리들은 황폐해진 계층을 나아갔다."

[[dialogue]]
speaker = "unk"
original = "この層の広大さは見掛け倒しではなく、どこまでも果てしなく続いているように思えた。"
translation = "이 층의 광대함은 겉보기와 다르지 않았고, 끝없이 계속 이어지는 것처럼 느껴졌다."

[[dialogue]]
speaker = "unk"
original = "すると……"
translation = "그러자……"

[[dialogue]]
speaker = "ガーディアン"
original = "「ウィーン──ウィーン──侵入者発見。ピピ、ガガ、排除スル」"
translation = "「위잉── 위잉── 침입자 발견. 삐삐, 가가, 제거한다」"

[[dialogue]]
speaker = "マトイ"
original = "「！？\u3000な、何これ！？」"
translation = "「!? 뭐, 뭐야 이거!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「出たわねガラクタ兵器──みんな、構えて！」"
translation = "「나왔네 고물 병기── 모두, 자세 잡아!」"

[[dialogue]]
speaker = "ソフィア"
original = "「見たこともないモンスターです──」"
translation = "「본 적 없는 몬스터입니다──」"

[[dialogue]]
speaker = "ニャリオン"
original = "「正確にはモンスターではないニャン！\u3000ガーディアンという、本来は塔を守る存在なのニャン！」"
translation = "「정확히는 몬스터가 아니냥! 가디언이라는, 본래는 탑을 지키는 존재인 거냥!」"

[[dialogue]]
speaker = "セーラ"
original = "「なんかの事情で暴走してる、ってコトかなー？」"
translation = "「무슨 사정으로 폭주하고 있는, 건가ー?」"

[[dialogue]]
speaker = "アナ"
original = "「混沌の瘴気をまとっています──各員、長時間触れないように注意してください！」"
translation = "「혼돈의 장기를 두르고 있습니다── 각자, 장시간 접촉하지 않도록 주의해 주세요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「了解でありまぁーす！」"
translation = "「알겠사옵니다ー스!」"

[[dialogue]]
speaker = "クロト"
original = "「全方位から集まってきてる──各個撃破するぞ！」"
translation = "「전방위에서 모여들고 있어── 각개 격파한다!」"

[[dialogue]]
speaker = "ガーディアン"
original = "「ピピ……ガガ──ピガ────ッ！！」"
translation = "「삐삐…… 가가── 삐가────앗!!」"

