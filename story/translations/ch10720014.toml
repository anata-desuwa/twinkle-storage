[[dialogue]]
speaker = "unk"
original = "第４話,はじめての寄り道,P"
translation = "제4화, 첫 딴 길로 새기, P"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「はぁあああっっ！！\u3000たぁっ！！\u3000てやぁあっっ！！」"
translation = "「하아아압!! 타앗!! 테야아압!!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ふぅ……今日はありがとう、会長さん。わざわざ休日に呼び出しちゃってごめんね？」"
translation = "「후우…… 오늘은 고마워요, 회장님. 일부러 휴일에 불러내서 미안해요?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「今更だけど迷惑じゃなかったかしら……？\u3000一応、今日は予定がないとは聞いていたけど……」"
translation = "「이제 와서 하는 말이지만 민폐는 아니었을까……? 일단 오늘은 예정이 없다고 듣긴 했지만……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「その……どうしても会長さんに特訓の成果を見てもらいたくって。他の人だと、私に変な気を遣ってすごいねすごいねって褒めてきたりするし……」"
translation = "「그게…… 어떻게든 회장님께 특훈 성과를 보여드리고 싶어서. 다른 사람이면 나한테 괜히 신경 써서 대단해 대단해 하고 칭찬만 해대니까……」"

[[dialogue]]
speaker = "unk"
original = "むしろ頼ってくれて嬉しかったよ"
translation = "오히려 의지해 줘서 기뻤어"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「そ、そう？\u3000ならこれからも頼らせてもらおうかしら……」"
translation = "「그, 그래? 그럼 앞으로도 의지해볼까나……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「会長さんはあんまり私のこと子ども扱いしないし。……まぁたまにされてるような気もするけど」"
translation = "「회장님은 별로 나를 어린애 취급 안 하니까. ……뭐 가끔 당하고 있는 기분도 들지만」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「でも、なんだかんだ対等に見てくれてるんだって一緒に過ごしてきてわかってきたから。私もなんだか頼りやすいの」"
translation = "「하지만 이런저런 일들을 겪으며 대등하게 봐주고 있다는 걸 같이 지내오면서 알게 됐어. 나도 왠지 의지하기가 편해」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「私、誰かを頼るのってちょっぴり苦手で。だから会長さんがいてくれて本当に助かっちゃう」"
translation = "「나, 누군가에게 의지하는 건 조금 서툴러서. 그래서 회장님이 있어 줘서 정말 큰 도움이 돼」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「まるでお兄ちゃんみたいで──って、な、なんだか私、恥ずかしいこと言っちゃってる気が……！\u3000今のは忘れてっ。なしだからね、なしっ……！」"
translation = "「마치 오빠 같아서── 가 아니라, 나, 왠지 부끄러운 말을 하고 있는 것 같은……! 방금 건 잊어줘. 없었던 일이야, 알았지……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「あっ、もうっ、何をニヤニヤしてるのっ。その顔、絶対忘れる気ないじゃないっ。よしよしじゃないからっ、やっぱり私のこと子ども扱いしてるっ。絶対してるもんっ」"
translation = "「앗, 정말, 뭘 싱글벙글 웃고 있는 거야. 그 표정, 절대 잊을 생각이 없잖아. 장하다 장하다 하지 마, 역시 나를 어린애 취급하고 있어. 절대 그러고 있다고」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「んもう、せっかく会長さんのこと認めてきたところだったのに。ふんだ、また嫌いになっちゃったもん」"
translation = "「정말이지, 겨우 회장님을 인정하려던 참이었는데. 흥이다, 다시 싫어질 거야」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「そうだ。休日とはいえ寄り道せずに真っ直ぐお家に帰るのよ？\u3000帰るまでがトレーニングなんだからね？」"
translation = "「맞다. 휴일이긴 하지만 딴 데로 새지 말고 곧장 집으로 돌아가야 해? 돌아가는 것까지가 트레이닝이니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "せっかくだし送っていくよ"
translation = "기왕 이렇게 된 거 데려다줄게"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「むむっ、言った傍から私のこと子ども扱いして。一人で帰れるもんっ。私のこと見くびらないでっ」"
translation = "「으으, 말하자마자 나를 어린애 취급하고. 혼자 돌아갈 수 있다고. 나를 얕보지 마」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「むしろ私が会長さんを送っていってあげるわ。会長さんのことだもん。これだけ言っても途中で寄り道するかもしれないし」"
translation = "「오히려 내가 회장님을 데려다줄게. 회장님이라면 이렇게 말해도 도중에 딴 길로 샐지도 모르니까」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ふふ、そうよ。私が責任を持ってお家まで送り届けてあげる♪\u3000私の目が黒いうちは不良行為なんてさせないんだから♪」"
translation = "「후후, 그래. 내가 책임지고 집까지 데려다줄게♪ 내 눈이 시퍼렇게 살아있는 한 불량 행위 따위는 못 하게 할 거니까♪」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ええと。次の角を左に曲がればいいのよね？\u3000えっ？\u3000右だった？\u3000あう、この辺りあんまり来ないから……」"
translation = "「음. 다음 모퉁이를 왼쪽으로 꺾으면 되는 거지? 엣? 오른쪽이었어? 아우, 이 근처는 잘 안 와봐서……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「当たり前だけど知らないお店ばっかりね。……わぁ、こんなところにクレープ屋さんあったんだっ。美味しそうっ……」"
translation = "「당연한 거지만 모르는 가게들뿐이네. ……와아, 이런 곳에 크레이프 가게가 있었구나. 맛있겠다……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「って、ダメダメっ。今は会長さんをお家に送ってる最中なんだから。ここで誘惑に負けたら風紀委員の名折れよ……！」"
translation = "「앗, 안 돼 안 돼. 지금은 회장님을 집에 데려다주는 중이니까. 여기서 유혹에 지면 풍기위원의 수치야……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「でも知らない場所を会長さんと２人で歩いてると、その……。なんだか２人で寄り道してるような気分になってきちゃう……」"
translation = "「하지만 모르는 장소를 회장님과 둘이서 걷고 있으면, 그게. 왠지 둘이서 딴 길로 새고 있는 기분이 들어버려……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「う、ううん、違うわっ。これは断じて寄り道じゃない……！\u3000会長さんをお家に送ってるだけだもんっ！」"
translation = "「아, 아니야, 틀려. 이건 결코 딴 길로 새는 게 아니야……! 회장님을 집에 데려다주고 있을 뿐인걸!」"

[[dialogue]]
speaker = "unk"
original = "休日なんだし気にしすぎだよ"
translation = "휴일인데 너무 신경 쓰는 거 아냐"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「だとしてもよ。普段あれだけうるさく言ってる私が会長さんと仲良く寄り道なんかしてたら、みんなに申し訳が立たないというか……！」"
translation = "「그렇다 해도 말이야. 평소 그렇게나 잔소리를 하던 내가 회장님과 사이좋게 딴 길로 새고 있으면 모두에게 면목이 없달까……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「本当は、その。私がうるさく言い過ぎだってこともわかってるから。私だって寄り道したい日がないと言えば嘘になるし……」"
translation = "「사실은, 그게. 내가 너무 심하게 말하고 있다는 것도 알고 있으니까. 나도 딴 길로 새고 싶은 날이 없다고 하면 거짓말이고……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「でも風紀委員として、みんなが羽目を外しすぎないように注意はしなきゃとは思ってて。人に注意してるんだから私は絶対に寄り道なんかしちゃいけなくて」"
translation = "「하지만 풍기위원으로서 모두가 너무 도를 넘지 않도록 주의는 줘야 한다고 생각해서. 남에게 주의를 주고 있는 거니까 나는 절대로 딴 길로 새면 안 돼서」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「と、とにかく、私は寄り道をしちゃいけない人間なのっ。風紀委員になった時に自分でそう決めたんだからっ」"
translation = "「아무튼, 나는 딴 길로 새면 안 되는 사람이야. 풍기위원이 됐을 때 스스로 그렇게 정했으니까」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「買い食いもしないっ。放課後お友達と遊びに行ったりもしないっ。そ、そもそも寄り道に興味がないものっ……！」"
translation = "「길거리 음식도 안 먹어. 방과 후에 친구들과 놀러 가지도 않아. 애, 애초에 딴 길로 새는 것 따위에 관심 없는걸……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「きゃっ！？\u3000ななな、何っ！？\u3000どうして急に私の手を掴むのっ……！？」"
translation = "「꺄악!? 머머머, 뭐야!? 왜 갑자기 내 손을 잡는 거야……!?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「わわっ、引っ張らないで……！\u3000もしかして寄り道させようとしてるっ？\u3000してるわよねっ？」"
translation = "「와와, 끌어당기지 마……! 설마 딴 길로 새게 하려는 거야? 그러려는 거지?」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「だからダメだってば……！\u3000私は寄り道をしちゃいけない人間でっ……！」"
translation = "「그러니까 안 된다니까……! 나는 딴 길로 새면 안 되는 사람이라서……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「とにかく離してっ、恥ずかしっ……！\u3000パパ以外の男の人と手を繋ぐなんて、は、初めてでっ……！」"
translation = "「아무튼 놔줘, 창피해……! 아빠 이외의 남자랑 손을 잡는 건, 처, 처음이라서……!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ一緒に寄り道してくれる？"
translation = "그럼 같이 딴 길로 새줄래?"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「あ、あう……。相変わらず変なところでお節介なんだから……。私、本当に寄り道なんか興味ないのに……」"
translation = "「아, 아우……. 여전히 뜬금없는 데서 참견이라니까……. 나, 정말로 딴 길로 새는 거 관심 없는데……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「でも……会長さんのこういうところが私は……」"
translation = "「하지만…… 회장님의 이런 점이 나는……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「っっ。な、なんでもない。なんでもないもんっ。それより手を離してってば。恥ずかしいって言ってるでしょっ」"
translation = "「윽. 아, 아무것도 아니야. 아무것도 아니라고. 그것보다 손 좀 놔달라니까. 창피하다고 했잖아」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「だから、その。会長さんと寄り道したらいいんでしょ……？\u3000わかったから……」"
translation = "「그러니까, 그게. 회장님이랑 딴 길로 새면 되는 거잖아……? 알았으니까……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「か、勘違いしないでね？\u3000別に私は寄り道したいわけじゃないわ。ただこれ以上イヤイヤしてたら、それこそ子どもっぽいなって思っただけっ」"
translation = "「오, 오해하지 마? 딱히 내가 딴 길로 새고 싶은 건 아니야. 그냥 여기서 계속 싫다고 떼쓰면 그게 더 어린애 같다는 생각이 들었을 뿐이야」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「だから特別に……会長さんと寄り道してあげる。会長さんの言うとおり、今日は休日なわけだし……」"
translation = "「그러니까 특별히…… 회장님이랑 딴 길로 새줄게. 회장님 말대로 오늘은 휴일이기도 하고……」"

[[dialogue]]
speaker = "unk"
original = "休みの日はめいっぱい遊ばなくちゃね"
translation = "쉬는 날엔 실컷 놀아야지"

[[dialogue]]
speaker = "unk"
original = "風紀委員もたまには羽根を伸ばさなくちゃ"
translation = "풍기위원도 가끔은 기분 전환이 필요해"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「う、うん。ありがとう、会長さん……」"
translation = "「으, 응. 고마워, 회장님……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「なら、その。その、ね？\u3000私、カラオケ行ってみたい……」"
translation = "「그럼, 저기. 저기 말이야? 나, 노래방 가보고 싶어……」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「あ、あとボーリングも……！\u3000ゲームセンターで会長さんと対戦したりもしてみたい……！」"
translation = "「아, 그리고 볼링도……! 게임 센터에서 회장님이랑 대전하거나 해보고 싶어……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「そうだ、さっきのクレープ屋さんも気になってて──って、～～っっ！\u3000だ、だからニヤニヤしないでっ。また子ども扱いしてるわね……！」"
translation = "「맞다, 아까 크레이프 가게도 신경 쓰이고── 가 아니라, ~~윽! 저, 적당히 좀 싱글벙글하라고. 또 어린애 취급하고 있지……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「やっぱり寄り道するのやめる……！\u3000会長さんが子ども扱いしてくるならやめるもんっ……！」"
translation = "「역시 딴 길로 새는 거 관둘래……! 회장님이 어린애 취급하면 관둘 거야……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「ふ、ふんだ。謝ったって許さないもん」"
translation = "「흥이다. 사과해도 안 봐줄 거야」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「わわっ、頭なでなでするなら、もっと許さないっ……！」"
translation = "「와와, 머리 쓰다듬으면 더 안 봐줄 거야……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「とにかく一旦、手を離してっ。離してってばっ。に、逃げないからっ。連絡するだけ……！」"
translation = "「아무튼 일단 손 놔. 놔달라니까. 도, 도망 안 가. 연락만 할 뿐이야……!」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「誰にって。だから、その……ママによ」"
translation = "「누구한테냐니. 그러니까, 그…… 엄마한테야」"

[[dialogue]]
speaker_original = "ミア"
speaker_translation = "미아"
original = "「今日は晩ご飯いらないって、えへへ……。ちゃんと伝えておかなくっちゃ……」"
translation = "「오늘 저녁밥 필요 없다고, 에헤헤……. 제대로 전해둬야 하니까……」"

