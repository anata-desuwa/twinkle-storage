[[dialogue]]
speaker = "unk"
original = "第４話,リップルクリスマス,P"
translation = "제4화, 리플 크리스마스, P"

[[dialogue]]
speaker = "unk"
original = "今日はリップルとのクリスマスデート。待ち合わせ場所に行くと──"
translation = "오늘은 리플과의 크리스마스 데이트. 약속 장소에 가자──"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー！\u3000メリークリスマース！」"
translation = "「회장! 메리 크리스마스-!」"

[[dialogue]]
speaker = "unk"
original = "勢いよく抱きついてくるリップルを受け止め、ぎゅっと抱き返す。"
translation = "기운차게 매달려 오는 리플을 받아내며, 꽉 껴안아 준다."

[[dialogue]]
speaker = "unk"
original = "メリークリスマス、リップル"
translation = "메리 크리스마스, 리플"

[[dialogue]]
speaker = "リップル"
original = "「エヘヘ♪\u3000カイチョー、ダイスキですー<emoji=heart04>」"
translation = "「에헤헤♪ 회장, 정말 좋아해요-<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「そんなカイチョーに……クリスマスプレゼント♪\u3000あったかテブクロでーす♪\u3000ワタシのテブクロもお揃いです」"
translation = "「그런 회장에게…… 크리스마스 선물♪ 따뜻한 장갑이에-요♪ 제 장갑도 세트예요」"

[[dialogue]]
speaker = "unk"
original = "ありがとう。じゃあ俺もプレゼントを……"
translation = "고마워. 그럼 나도 선물을……"

[[dialogue]]
speaker = "リップル"
original = "「！\u3000コレは……マフラーですね！\u3000コレなら水着でも使えます！」"
translation = "「! 이건…… 목도리네요! 이거라면 수영복에서도 쓸 수 있어요!」"

[[dialogue]]
speaker = "リップル"
original = "「サンタみたいに赤いマフラー、カワイイです♪\u3000でもとってもナガーいですね？」"
translation = "「산타처럼 빨간 목도리, 귀여워요♪ 하지만 엄청 기-네요?」"

[[dialogue]]
speaker = "リップル"
original = "「２人でイッショに巻く……？\u3000ワオ！\u3000それはＢＩＧステキです♪\u3000じゃあ……」"
translation = "「둘이서 같이 감는다……? 와오! 그건 BIG 멋져요♪ 그럼……」"

[[dialogue]]
speaker = "リップル"
original = "「２人でイッショのマフラー……ドキドキしちゃいます……<emoji=heart04>\u3000恋人のアカシですね……<emoji=heart04>」"
translation = "「둘이서 같이 하는 목도리…… 두근두근거려요……<emoji=heart04> 연인의 증표네요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー……ちゅっ<emoji=heart04>」"
translation = "「회장…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ホッペタじゃなくて、唇に……恋人のキスです<emoji=heart04>\u3000ん……ちゅっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぷっ、んちゅっ<emoji=heart04>」"
translation = "「볼이 아니라 입술에…… 연인의 키스예요<emoji=heart04> 응…… 쪽<emoji=heart04> 응쪽<emoji=heart04> 츕, 응쪽<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーがダイスキで、ついキスしちゃいマシた……<emoji=heart04>」"
translation = "「회장이 너무 좋아서, 그만 키스해 버렸어-요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「このままじゃキスでクリスマスが終わってシマイますね。デート、行きましょー♪」"
translation = "「이대로라면 키스로 크리스마스가 끝나 버리겠-네요. 데이트, 가요-♪」"

[[dialogue]]
speaker = "unk"
original = "お揃いの手袋を付けた手を繋いで、クリスマスの繁華街を歩く。"
translation = "세트로 맞춘 장갑을 낀 손을 잡고, 크리스마스의 번화가를 걷는다."

[[dialogue]]
speaker = "リップル"
original = "「ワタシたちみたいに手を繋いでいる人たちがタクサンいます。みんなカップルなんでしょうか？\u3000みんなハッピーな顔しています♪」"
translation = "「우리처럼 손을 잡고 있는 사람들이 많이 있어요. 모두 커플인 걸까요? 다들 해피한 얼굴을 하고 있어요♪」"

[[dialogue]]
speaker = "リップル"
original = "「みんなハッピーなら、ワタシもハッピーです♪\u3000ＢＩＧウレシイです♪」"
translation = "「모두 해피하다면 저도 해피해요♪ BIG 기뻐요♪」"

[[dialogue]]
speaker = "リップル"
original = "「ハッ──！\u3000カップルのラブラブな気持ちを取り入れられれば、エンドレスサマーをもっとオオキクできるのでは……！？」"
translation = "「핫──! 커플의 러브러브한 마음을 받아들일 수 있다면, 엔들리스 서머를 좀 더 크게 만들 수 있는 게……!?」"

[[dialogue]]
speaker = "unk"
original = "まさかの発想……！？"
translation = "설마 했던 발상……!?平衡"

[[dialogue]]
speaker = "リップル"
original = "「なんて、ジョーダンです♪\u3000リゾート結界に活かせるホド、ワタシ、恋のコト知りません」"
translation = "「농담이에요♪ 리조트 결계에 활용할 정도로 전 사랑에 대해 잘 모르거든요」"

[[dialogue]]
speaker = "リップル"
original = "「だからカイチョーがオシエテください<emoji=heart04>」"
translation = "「그러니까 회장이 가르쳐 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ああ、これから一緒に学んでいこう"
translation = "그래, 이제부터 함께 배워나가자"

[[dialogue]]
speaker = "リップル"
original = "「ハイ<emoji=heart04>\u3000ヤクソクです<emoji=heart04>」"
translation = "「네<emoji=heart04> 약속이에요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ！\u3000あそこ、チキンが売ってます！\u3000クリスマスといえばチキンですよね♪\u3000一緒に食べましょー♪」"
translation = "「앗! 저기 치킨을 팔고 있어요! 크리스마스 하면 역시 치킨이죠♪ 같이 먹어요-♪」"

[[dialogue]]
speaker = "リップル"
original = "「オジさーん！\u3000チキンくださーい！」"
translation = "「아저씨-! 치킨 주세요-!」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ、カイチョー、あーん<emoji=heart04>\u3000……オイシイですか？」"
translation = "「자, 회장, 아~앙<emoji=heart04> ……맛있나요?」"

[[dialogue]]
speaker = "unk"
original = "とっても美味しい！"
translation = "정말 맛있어!"

[[dialogue]]
speaker = "リップル"
original = "「ワタシにも食べさせてください。あ～んっ」"
translation = "「저도 먹여주세요. 아~앙」"

[[dialogue]]
speaker = "リップル"
original = "「ん～っ、チキン美味しいです♪」"
translation = "「음~, 치킨 맛있어요♪」"

[[dialogue]]
speaker = "リップル"
original = "「チキンが美味しくて、デートもできて、クリスマスはイイコトばっかりデスね♪」"
translation = "「치킨도 맛있고 데이트도 하고, 크리스마스는 좋은 일뿐이-네요♪」"

[[dialogue]]
speaker = "unk"
original = "街を見て回っていると、時間はあっという間に過ぎて、最後はリップルのリゾート結界へ。"
translation = "거리를 둘러보고 있으니 시간은 순식간에 지나가고, 마지막은 리플의 리조트 결계로."

[[dialogue]]
speaker = "リップル"
original = "「では……ヘンシーン！」"
translation = "「그럼…… 변-신!」"

[[dialogue]]
speaker = "リップル"
original = "「リップル・クリスマスフォーム！\u3000エヘヘ<emoji=heart04>\u3000ワタシをカイチョーにプレゼント……です<emoji=heart04>」"
translation = "「리플 크리스마스 폼! 에헤헤<emoji=heart04> 저를 회장에게 주는 선물……이에요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ニギヤカなリゾートもスキですが……静かな海もイイですね。星がキレイです」"
translation = "「시끌벅적한 리조트도 좋지만…… 조용한 바다도 좋네요. 별이 아름다워요」"

[[dialogue]]
speaker = "リップル"
original = "「モネとクリスマスのこと調べてオモイました。まだまだワタシの知らないコト、たくさんアリます」"
translation = "「모네와 크리스마스에 대해 조사하고 생각했어요. 아직 제가 모르는 것들, 잔뜩 있어요」"

[[dialogue]]
speaker = "リップル"
original = "「セカイのコト、恋のコト……そしてアナタのこと」"
translation = "「세상 일, 사랑 이야기…… 그리고 당신에 대한 것」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーのこと、もっと知りたいです」"
translation = "「회장님에 대해, 더 알고 싶어요」"

[[dialogue]]
speaker = "unk"
original = "俺もリップルのこと、全部知りたい"
translation = "나도 리플에 대해, 전부 알고 싶어"

[[dialogue]]
speaker = "リップル"
original = "「エヘヘ<emoji=heart04>\u3000じゃあ同じキモチですね……<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 그럼 같은 마음이네요……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシが結界の外に出たトキ、カイチョーたちが学園に誘ってくれナカッたら、ワタシは今どこにいたんでしょうか」"
translation = "「제가 결계 밖으로 나갔을 때, 회장님 일행이 학원에 권유해 주지 않았다면, 저는 지금 어디에 있었을까요」"

[[dialogue]]
speaker = "リップル"
original = "「きっと学園に来ることはなくて、寮のミンナとも出会わなかったとオモイます。そしてカイチョーの隣にいるコトもありませんでした」"
translation = "「분명 학원에 올 일은 없었을 테고, 기숙사의 모두와도 만나지 못했을 거라 생각해요. 그리고 회장님 곁에 있는 일도 없었겠죠」"

[[dialogue]]
speaker = "リップル"
original = "「だからアリガトございます、カイチョー。楽しい学園生活を送れてるのは、アナタのおかげです」"
translation = "「그러니까 고마워요, 회장님. 즐거운 학원 생활을 보낼 수 있는 건, 당신 덕분이에요」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー、ＢＩＧＢＩＧダイスキです<emoji=heart04>\u3000……ちゅっ<emoji=heart04>」"
translation = "「회장님, BIG BIG 너무 좋아해요<emoji=heart04> ……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紺碧の空と海に見守られながら、もう一度キスを交わした。"
translation = "남빛 하늘과 바다가 지켜보는 가운데, 다시 한번 키스를 나누었다."

