[[dialogue]]
speaker = "unk"
original = "第１話,極星星徒会のお姉さん,P"
translation = "제1화, 극성성도회의 언니"

[[dialogue]]
speaker = "unk"
original = "極星学園生による天界襲撃からしばらくの月日が経った。"
translation = "극성 학원생들에 의한 천계 습격으로부터 어느 정도의 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "当初こそアルタイルに敵意を隠さないレティシアだったが、俺たちの説得の甲斐もあり、一時的な協力関係を了承してくれるまでになっていた──"
translation = "처음에는 알타이르에 적의를 숨기지 않던 레티시아였으나, 우리의 설득 덕분에 일시적인 협력 관계를 승낙해 주기에 이르렀다──"

[[dialogue]]
speaker = "グレイス"
original = "「……レティシア。このカードはババじゃありませんよ。さぁ、私を信じて引いてください！」"
translation = "「……레티시아. 이 카드는 조커가 아니에요. 자, 저를 믿고 뽑아주세요!」"

[[dialogue]]
speaker = "レティシア"
original = "「あら、そうなのね。助かるわ」"
translation = "「어머, 그렇구나. 고마워」"

[[dialogue]]
speaker = "チナ"
original = "「いや、ぜってー嘘だぞ。ゲームなんだから真剣に──」"
translation = "「야, 저거 분명히 거짓말이라고. 게임이니까 진지하게──」"

[[dialogue]]
speaker = "レティシア"
original = "「あ……グレイスったら。これ、ババじゃないの」"
translation = "「아…… 그레이스도 참. 이거 조커잖아」"

[[dialogue]]
speaker = "グレイス"
original = "「ふっふっふ……引っ掛かりましたね！\u3000これで私が優勢になりました！」"
translation = "「훗훗훗…… 걸려들었군요! 이걸로 제가 우세해졌습니다!」"

[[dialogue]]
speaker = "レティシア"
original = "「困ったわ。このままじゃ負けちゃいそうね」"
translation = "「곤란하네. 이대로라면 져버릴 것 같아」"

[[dialogue]]
speaker = "チナ"
original = "「だから言ったじゃねーか。つーかレティシアはグレイスに甘すぎるぞ……引く前からわかってただろ、絶対」"
translation = "「그러니까 말했잖아. 그나저나 레티시아는 그레이스한테 너무 무르다고…… 뽑기 전부터 알고 있었지, 분명」"

[[dialogue]]
speaker = "レティシア"
original = "「別にいいじゃない。たかがゲームなんだし」"
translation = "「별로 상관없잖아. 고작 게임인데」"

[[dialogue]]
speaker = "チナ"
original = "「ばっかやろー。たかがゲーム、されどゲームなんだよ！\u3000真剣にやらないと面白くないだろ！？」"
translation = "「바보 같은 녀석. 고작 게임이지만 게임이라고! 진지하게 안 하면 재미없잖아!?」"

[[dialogue]]
speaker = "unk"
original = "いつもこんな感じなのか？"
translation = "항상 이런 느낌인 걸까?"

[[dialogue]]
speaker = "unk"
original = "昼食のデザートを賭けてババ抜き……"
translation = "점심 디저트를 걸고 도둑잡기……"

[[dialogue]]
speaker = "ベアトリス"
original = "「そう、ですね。チナちゃんは勝負事が好きで、グレイスちゃんは食いしんぼうなので……」"
translation = "「그렇네요. 치나짱은 승부욕이 강하고, 그레이스짱은 먹보라서……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「『勝者がデザートを独り占め』みたいなゲームはよくやってますね……あはは」"
translation = "「『승자가 디저트를 독차지』 같은 게임은 자주 하곤 해요…… 아하하」"

[[dialogue]]
speaker = "ベアトリス"
original = "「だいたい今みたいに、レティシアちゃんがグレイスちゃんを甘やかして泥仕合になるんですけれど……」"
translation = "「대체로 지금처럼, 레티시아짱이 그레이스짱을 응석받이로 만들어서 진흙탕 싸움이 되곤 하지만요……」"

[[dialogue]]
speaker = "レティシア"
original = "「チナ。こっちがババよ。引いたら危ないから注意してね？」"
translation = "「치나. 이쪽이 조커야. 뽑으면 위험하니까 주의해?」"

[[dialogue]]
speaker = "チナ"
original = "「ま～た余計なヒントが出ちまった。レティシアは嘘とか吐かないからなぁ……ほら、やっぱりだ」"
translation = "「또 쓸데없는 힌트가 나와 버렸네. 레티시아는 거짓말 같은 거 안 하니까 말이야…… 봐, 역시나네」"

[[dialogue]]
speaker = "レティシア"
original = "「ふふふ。ババじゃない方を引いてくれたわね。信じてくれてありがとう、チナ」"
translation = "「후후후. 조커가 아닌 쪽을 뽑아줬구나. 믿어줘서 고마워, 치나」"

[[dialogue]]
speaker = "チナ"
original = "「なんで追い詰められてるヤツに感謝されてるんだ、アタシは？」"
translation = "「왜 몰리고 있는 녀석한테 감사를 받는 거야, 나는?」"

[[dialogue]]
speaker = "グレイス"
original = "「レティシアはこのまま最下位確定ですね。チナ、私と一騎打ちですよ！\u3000プリンは譲りませんから！」"
translation = "「레티시아는 이대로 꼴찌 확정이네요. 치나, 저랑 일대일이에요! 푸딩은 양보 못 하니까요!」"

[[dialogue]]
speaker = "チナ"
original = "「アタシだって負けねーっての！\u3000いくぞグレイス！」"
translation = "「나도 안 진다고! 간다, 그레이스!」"

[[dialogue]]
speaker = "グレイス"
original = "「ううぅぅぅ～……！\u3000私のプリンが……サランさんお手製の極旨プリンがぁ……」"
translation = "「으으으으~……! 제 푸딩이…… 사란 씨 수제 극상 푸딩이……」"

[[dialogue]]
speaker = "チナ"
original = "「やった！\u3000デザート３人分ゲットだ！\u3000今日はついてるな！」"
translation = "「나이스! 디저트 3인분 겟이다! 오늘은 운이 좋네!」"

[[dialogue]]
speaker = "グレイス"
original = "「レ、レティシア～っ……！！」"
translation = "「레, 레티시아~~!!」"

[[dialogue]]
speaker = "レティシア"
original = "「可哀想に。あとでカフェテリアに行きましょう？\u3000パフェをごちそうしてあげるから、元気を出して」"
translation = "「가여워라. 나중에 카페테리아에 갈까? 파페를 사 줄 테니까 기운 내」"

[[dialogue]]
speaker = "グレイス"
original = "「本当ですか！？\u3000嬉しいです～！！」"
translation = "「정말인가요!? 기뻐요~~!!」"

[[dialogue]]
speaker = "チナ"
original = "「いや、そんなことしたら賭けの意味ないだろ……」"
translation = "「아니, 그러면 내기한 의미가 없잖아……」"

[[dialogue]]
speaker = "レティシア"
original = "「チナも欲しいの？\u3000いいわよ、ごちそうしてあげるわね」"
translation = "「치나도 먹고 싶어? 괜찮아, 사 줄게」"

[[dialogue]]
speaker = "チナ"
original = "「やめろ！\u3000アタシのプリンの価値が下がることを言うな……！」"
translation = "「하지 마! 내 푸딩의 가치가 떨어지는 소리 하지 말라고……!」"

[[dialogue]]
speaker = "unk"
original = "レティシアは、特殊な生い立ちのせいで、自我の欲求というものが希薄な天使だ。"
translation = "레티시아는 특수한 성장 배경 탓에, 자아의 욕구라는 것이 희박한 천사다."

[[dialogue]]
speaker = "unk"
original = "『何をすればいいかわからない時は、みんなのお世話をしなさい』──そうルヴィネから命じられており、それに従って動いているのだと聞いている。"
translation = "『무엇을 해야 할지 모를 때는 모두를 돌보아라』── 루비네로부터 그렇게 명받았으며, 그에 따라 움직이고 있는 것이라고 들었다."

[[dialogue]]
speaker = "グレイス"
original = "「──うぅっ！？\u3000ピ、ピーマンがありますっ……！？」"
translation = "「──으윽!? 피, 피망이 있어요……!?」"

[[dialogue]]
speaker = "グレイス"
original = "「その～……レティシア～……？」"
translation = "「그게~…… 레티시아~……?」"

[[dialogue]]
speaker = "レティシア"
original = "「ええ。ピーマン、食べてあげるわね。貰ってばかりだと悪いし……私のお肉と交換しましょうか」"
translation = "「응. 피망, 내가 먹어줄게. 받기만 하면 미안하니까…… 내 고기랑 바꿀까?」"

[[dialogue]]
speaker = "グレイス"
original = "「いいんですか～っ！\u3000レティシア大好きです！！」"
translation = "「그래도 되나요~! 레티시아 너무 좋아요!!」"

[[dialogue]]
speaker = "チナ"
original = "「待て待て待て。交換レートがおかしい！」"
translation = "「기다려 기다려 기다려. 교환 비율이 이상하잖아!」"

[[dialogue]]
speaker = "レティシア"
original = "「チナも茄子が苦手でしょう？\u3000食べてあげましょうか」"
translation = "「치나도 가지 싫어하지? 먹어줄까」"

[[dialogue]]
speaker = "チナ"
original = "「子ども扱いすんなっての……！」"
translation = "「애 취급하지 말라니까……!」"

[[dialogue]]
speaker = "unk"
original = "仲良しなんだな、みんな"
translation = "다들 사이가 좋구나"

[[dialogue]]
speaker = "ベアトリス"
original = "「はい！\u3000もうずっと一緒の５人ですから！」"
translation = "「네! 벌써 계속 함께인 5명이니까요!」"

[[dialogue]]
speaker = "グレイス"
original = "「人生の半分以上、一緒にいますしね」"
translation = "「인생의 절반 이상을 함께 지냈으니까요」"

[[dialogue]]
speaker = "チナ"
original = "「でもアタシはいい加減、グレイスを厳しくしつける必要があると思うんだ……」"
translation = "「하지만 난 이제 슬슬 그레이스를 엄하게 가르칠 필요가 있다고 보는데……」"

[[dialogue]]
speaker = "レティシア"
original = "「いいじゃない。グレイスにはのびのびしていて欲しいもの」"
translation = "「괜찮잖아. 그레이스는 구김살 없이 지냈으면 좋겠는걸」"

[[dialogue]]
speaker = "グレイス"
original = "「あっ……ピーマン、まだお皿に残ってました……！？\u3000レティシア、これも──」"
translation = "「앗…… 피망, 아직 접시에 남아있었어요……!? 레티시아, 이것도──」"

[[dialogue]]
speaker = "レティシア"
original = "「ごめんなさいね。今日はもう、だめなの」"
translation = "「미안하지만, 오늘은 이제 안 돼」"

[[dialogue]]
speaker = "グレイス"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "レティシア"
original = "「ルヴィから言われてるの。グレイスを甘やかすのは１日３回までって」"
translation = "「루비한테 들었거든. 그레이스를 어리광 받아주는 건 하루에 3번까지라고」"

[[dialogue]]
speaker = "レティシア"
original = "「ババ抜きで１回。パフェの約束で１回。最初のピーマンで１回。使い切っちゃったから──ごめんなさいね？」"
translation = "「도둑잡기에서 한 번. 파페 약속으로 한 번. 첫 피망에서 한 번. 다 써버렸으니까── 미안해?」"

[[dialogue]]
speaker = "グレイス"
original = "「そんなぁ！？\u3000あとちょっとです、ほら、ぱくってすればすぐ終わりますよ！？」"
translation = "「그럴 수가!? 조금밖에 안 남았어요, 자, 아앙 하면 금방 끝난다고요!?」"

[[dialogue]]
speaker = "レティシア"
original = "「すぐ終わるのなら、なおのこと、がんばって自分で食べてね。ふふふ」"
translation = "「금방 끝난다면 더더욱 힘내서 스스로 먹으렴. 후후후」"

[[dialogue]]
speaker = "unk"
original = "愛情深いようで機械的──自身のことを『空っぽだ』と称したレティシアの日常は、自然なようでいて、少しだけ歪にも見える。"
translation = "애정 어린 듯하면서도 기계적인── 스스로를 『텅 비어있다』고 칭한 레티시아의 일상은 자연스러워 보이면서도 조금은 뒤틀려 보이기도 한다."

[[dialogue]]
speaker = "unk"
original = "このアルタイルで過ごす日々が、彼女にいい影響を与えてくれればいいのだけれど……"
translation = "이 알타이르에서 보내는 나날이 그녀에게 좋은 영향을 주면 좋으련만……"

[[dialogue]]
speaker = "レティシア"
original = "「…………はむ」"
translation = "「…………냠」"

[[dialogue]]
speaker = "unk"
original = "（…………あれ？）"
translation = "（…………어라?）"

[[dialogue]]
speaker = "unk"
original = "グレイスと交換したピーマンを食べる時、レティシアの顔が一瞬、曇ったような気がした。"
translation = "그레이스와 바꾼 피망을 먹을 때, 레티시아의 얼굴이 아주 잠깐 어두워진 듯한 기분이 들었다."

[[dialogue]]
speaker = "unk"
original = "…………俺はもう少し、彼女のことをしっかりと見る必要があるのかもしれない。"
translation = "…………나는 좀 더 그녀를 제대로 지켜볼 필요가 있을지도 모르겠다."

