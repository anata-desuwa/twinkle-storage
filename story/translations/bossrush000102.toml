[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「次に起きたのが、プリマステラ襲撃事件」"
translation = "「다음에 일어난 것이, 프리마스텔라 습격 사건.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「その犯人はコラプサーの１人──イングリット」"
translation = "「그 범인은 콜랩서 중 한 명── 잉그리드.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「プリマステラになれるのは星騎士の中でも優秀な者だけ──のはずなんだけど、イングリットはそのプリマステラを容易く蹴散らしてしまった」"
translation = "「프리마스텔라가 될 수 있는 건 성기사 중에서도 우수한 자뿐──일 터였는데, 잉그리드는 그 프리마스텔라를 손쉽게 걷어차 버렸어.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「この時イングリットは星力を奪って回っていたんだけど、ついでに倒したプリマステラのセレスティアも取っていったんだよね……」"
translation = "「이때 잉그리드는 성력을 빼앗고 다녔는데, 덤으로 쓰러뜨린 프리마스텔라인 셀레스티아도 데려가 버렸지……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「カティアさんが調査に協力してくれたけど、イングリットとともにアステラに囚われてしまった」"
translation = "「카티아 씨가 조사에 협력해 주었지만, 잉그리드와 함께 아스테라에 갇혀버렸어.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「一方、単独で動いていたマリーベルさんは、別行動していたジュリエッテを拘束した」"
translation = "「한편, 단독으로 움직이던 마리벨 씨는 별동대로 움직이던 줄리엣타를 구속했지.」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "『コラプサーの目的は救世。あなた方と同じく世界を守ることでございます』"
translation = "『콜랩서의 목적은 구세. 당신들과 마찬가지로 세계를 지키는 것입니다.』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「そのおかげで、ジュリエッテからコラプサーの目的の一端を知ることができた。それと……」"
translation = "「그 덕분에 줄리엣타로부터 콜랩서의 목적의 일단을 알 수 있었어. 그리고……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "『そうだ。私たちコラプサーは皆ブラックホールを守護星に持っている。だがそれがわかったところで何になる』"
translation = "『그래. 우리 콜랩서는 모두 블랙홀을 수호성으로 가지고 있다. 하지만 그걸 안다고 해서 뭐가 되지.』"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「コラプサーはブラックホールを守護星に持っていること、星力吸収能力は守護星に由来していることが判明したね」"
translation = "「콜랩서는 블랙홀을 수호성으로 가지고 있다는 것, 성력 흡수 능력은 수호성에서 유래했다는 것이 판명됐어.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「最終的には会長さん、マリーベルさん、カティアさんのユニゾンアタックでイングリットを撃破。セレスティアの奪還に成功した」"
translation = "「최종적으로는 회장님, 마리벨 씨, 카티아 씨의 유니존 어택으로 잉그리드를 격파. 셀레스티아 탈환에 성공했지.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「だけどキサナの介入で、イングリットとジュリエッテには逃げられちゃった」"
translation = "「하지만 키사나의 개입으로, 잉그리드와 줄리엣타는 놓쳐버렸어.」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「イングリットとジュリエッテのデータも再現してみたから、体験してみてね」"
translation = "「잉그리드와 줄리엣타의 데이터도 재현해 봤으니까, 체험해 봐.」"

