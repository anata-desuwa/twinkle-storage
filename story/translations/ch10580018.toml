[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんとデートに出かけていた、ある日のこと。"
translation = "헤레나짱과 데이트를 나갔던 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "帰り際に彼女から提案を受けた。"
translation = "돌아가는 길에 그녀로부터 제안을 받았다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「魔王よ。このあと――」"
translation = "「마왕이여. 이다음에――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私の家へ泊まりにこないか？」"
translation = "「우리 집에 자러 오지 않겠나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なに、こうして夜遅くなってしまったであろう？\u3000それに明日は祝日だ」"
translation = "「뭐, 이렇게 밤이 늦어버리지 않았나? 게다가 내일은 공휴일이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――ふふっ、確かに、別に帰ろうと思えば帰れるであろう……しかし、そこは魔王よ、あれだ」"
translation = "「――후훗, 확실히 굳이 돌아가려 마음먹으면 돌아갈 수 있겠지만…… 하지만 거기선 마왕이여, 그거다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私のワガママ、といえば察してくれるか？」"
translation = "「내 어리광, 이라고 하면 알아주겠나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ちなみに、そのことは事前に、リノにも伝えてあるのだ。だから、気兼ねなくデートの続きをすることができる」"
translation = "「참고로 그 점은 사전에 리노에게도 전해 두었다. 그러니 사양 말고 데이트의 연장을 즐길 수 있지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――続きとはなにか？\u3000ふふっ、それは……」"
translation = "「――연장이란 무엇인가? 후훗, 그것은……」"

[[dialogue]]
speaker = "unk"
original = "お香の甘い匂いを漂わせて、彼女は耳元でそっと囁く。"
translation = "달콤한 향기 냄새를 풍기며 그녀는 귓가에서 살며시 속삭인다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「<ruby>夜伽<rt>よとぎ</rt></ruby><emoji=heart04>\u3000……といえば、伝わるか？」"
translation = "「밤시중<emoji=heart04> ……라고 하면 전해질까?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……どうだ？\u3000私と、してみないか？」"
translation = "「……어떠냐? 나와 해보지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺は九浄家に行き、ヘレナちゃんの寝室へ招かれることとなった――"
translation = "그렇게 나는 쿠죠가에 가서 헤레나짱의 침실로 초대받게 되었다――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ……<emoji=heart04>\u3000ようこそ、私の部屋へ」"
translation = "「후훗……<emoji=heart04> 어서 와라, 내 방에」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……どうだ？\u3000これが、ヘレナちゃんのおっぱいであるぞ<emoji=heart04>」"
translation = "「……어떠냐? 이것이 헤레나짱의 가슴이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――綺麗とな？\u3000ふふふっ<emoji=heart04>\u3000貴殿にそう言われると、嬉しくなってしまうな<emoji=heart04>」"
translation = "「――예쁘다고? 후후훗<emoji=heart04> 귀하에게 그런 말을 들으니 기뻐지는구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「触ってみるか？\u3000――なに、ダメな相手なら、わざわざ素肌を晒したりせぬ。ほら、貴殿の好きにしてよいのだぞ<emoji=heart04>」"
translation = "「만져보겠나? ――뭐, 싫은 상대라면 굳이 맨살을 드러내지도 않는다. 자, 귀하 마음대로 해도 좋다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はヘレナちゃんに誘われるまま、その大きな胸に触れた。"
translation = "나는 헤레나짱이 이끄는 대로 그 커다란 가슴을 만졌다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んっ……<emoji=heart04>\u3000そうだ、そのまま揉んでみるがよい<emoji=heart04>」"
translation = "「응……<emoji=heart04> 그래, 그대로 주물러 보거라<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んふっ……<emoji=heart04>\u3000可愛い揉み方であるな<emoji=heart04>\u3000もっと強くてもよいのだぞ？\u3000んっ……<emoji=heart04>」"
translation = "「응훗……<emoji=heart04> 귀여운 손놀림이구나<emoji=heart04> 좀 더 강해도 좋다구? 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「よいぞ、それでこそ男というものだ……<emoji=heart04>\u3000ふぅ……<emoji=heart04>」"
translation = "「좋구나, 그래야 남자답지……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、おっぱいで興奮したのか？\u3000おち○ぽがもう、ガチガチになっているぞ<emoji=heart04>」"
translation = "「후훗, 가슴으로 흥분했나? 자지가 벌써 빳빳해져 있구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――私の乳首も固くなってきている？\u3000んっ……<emoji=heart04>\u3000ふふっ、余裕ぶろうとしたが、バレてしまったか……」"
translation = "「――내 유두도 딱딱해지고 있다고? 응……<emoji=heart04> 후훗, 여유로운 척하려 했으나 들켜버렸나……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それにしても、顔は可愛いのに、おち○ぽはまさに魔王というべき大きさをしているな……<emoji=heart04>」"
translation = "「그건 그렇고, 얼굴은 귀여운데 자지는 그야말로 마왕이라 불릴 만한 크기를 하고 있구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「男とはこんな風になるのだな。実に面白い……<emoji=heart04>」"
translation = "「남자란 이런 식으로 변하는 것이로군. 실로 흥미로워……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さて、準備をしていかねばな……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「자, 준비를 해나가야겠지……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はぁ……<emoji=heart04>\u3000熱くて固いぞ……<emoji=heart04>\u3000擦れるだけで、おま○こが濡れてきてしまう……<emoji=heart04>\u3000人体とは不思議なものであるな……」"
translation = "「하아……<emoji=heart04> 뜨겁고 단단해……<emoji=heart04> 스치기만 해도 보지가 젖어버리는구나……<emoji=heart04> 인체란 신비한 것이로군……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「貴殿も同じか。おち○ぽの先っぽから、先走りが溢れてきているぞ<emoji=heart04>\u3000スマタで感じているのか？」"
translation = "「귀하도 마찬가지인가. 자지 끝에서 쿠퍼액이 흘러넘치고 있구나<emoji=heart04> 가랑이 비비기로 느끼고 있는 게냐?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふぅ……<emoji=heart04>\u3000お互いのアソコ、すっかりヌルヌルになってしまったな……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 서로의 거기가 완전히 미끈미끈해져 버렸군……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、これは果たして、どちらが多く溢れさせてしまっているのか……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「후훗, 이건 과연 어느 쪽이 더 많이 흘려버리고 있는 것일는지……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そろそろ、頃合いか？\u3000潤滑液はもう十分であろうし……」"
translation = "「슬슬 때가 된 건가? 윤활액은 이제 충분한 듯하고……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「おま○こ、挿れてみるか？」"
translation = "「보지에 삽입해 보겠나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――ふふっ、ならば、ここは私に任せるがよい<emoji=heart04>\u3000大人として、少しはリードしてみせねばな」"
translation = "「――후훗, 그렇다면 여기는 나에게 맡기거라<emoji=heart04> 어른으로서 조금은 리드해 보여야지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「では、ゆくぞ……貴殿の先っぽに、おま○こを当てて……」"
translation = "「그럼 간다…… 귀하의 끝부분에 보지를 맞추고……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んんっ……<emoji=heart04>\u3000はあぁっ――<emoji=heart04>」"
translation = "「으음……<emoji=heart04> 하아앗――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んああぁっ……<emoji=heart04><emoji=heart04>\u3000入った……<emoji=heart04>」"
translation = "「응아아앗……<emoji=heart04><emoji=heart04> 들어갔다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んっ……<emoji=heart04>\u3000童貞卒業おめでとうだ、魔王よ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 동정 졸업 축하한다, 마왕이여……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これが九浄ヘレナの、念願のおま○こであるぞ<emoji=heart04>」"
translation = "「이것이 쿠죠 헤레나의 염원하던 보지다<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ん？\u3000――ああ、そうだとも。私も、これが初めてだ」"
translation = "「응? ――아아, 그렇다. 나도 이게 처음이야」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「前にも言ったであろう？\u3000これまでなかなか、よいと思える男と出会えなかったのだ」"
translation = "「전에도 말하지 않았나? 지금까지 좀처럼 좋다고 생각되는 남자를 만나지 못했다고」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「故に、ヘレナちゃんの初めてのおま○こを味わえること、光栄に思うがよいぞ<emoji=heart04>\u3000ふふっ<emoji=heart04>」"
translation = "「고로 헤레나짱의 첫 보지를 맛볼 수 있는 것, 영광으로 생각하도록 해<emoji=heart04> 후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それでは、動くぞ。んんっ――<emoji=heart04>」"
translation = "「그럼 움직이마. 으음――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000はぁっ……んっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 후우웃……<emoji=heart04> 앗……<emoji=heart04> 하앗……응……<emoji=heart04> 후우웃……<emoji=heart04> 하아앗……<emoji=heart04> 으음……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「これが男女のまぐわい、というものか……<emoji=heart04>\u3000なるほど、これはすごいな……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「이것이 남녀의 정교라는 것인가……<emoji=heart04> 과연, 이건 대단하군……<emoji=heart04> 응……<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「貴殿の、大きいものが……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000自分では触ったことのない、おま○この奥に、届いているぞ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「귀하의 커다란 것이……<emoji=heart04> 하아앗<emoji=heart04> 스스로는 만져본 적 없는 보지 깊은 곳까지 닿고 있어……<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んっ<emoji=heart04>\u3000ふふっ……<emoji=heart04>\u3000可愛い喘ぎ声がこぼれているぞ。私のおま○こが、そんなに気持ちよいのか？」"
translation = "「응<emoji=heart04> 후훗……<emoji=heart04> 귀여운 신음이 새어 나오고 있구나. 내 보지가 그렇게 기분 좋은 것이냐?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私も、んっ……<emoji=heart04>\u3000おち○ぽ、よい感じだぞ……<emoji=heart04>\u3000んっ……ふぅっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「나도, 응……<emoji=heart04> 자지, 느낌이 아주 좋아……<emoji=heart04> 응……후웃……<emoji=heart04> 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「だんだん馴染んできて、貴殿にもっとよくしてやれそうだ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「점점 익숙해져서 귀하를 더 기분 좋게 해 줄 수 있을 것 같구나……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こんなのは、どうだ……？\u3000おま○この中を抱き締めるように、ぎゅ～っと――<emoji=heart04>」"
translation = "「이런 건 어떠냐……? 보지 안쪽을 껴안듯이 꽉~ 하고――<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヘレナちゃんの膣内が、きゅっと締まって、俺のペニスに絡みついてくる。"
translation = "헤레나짱의 질 내부가 움찔 조여지며 내 페니스를 휘감아 온다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――すごく気持ちいい、とな？\u3000ふふっ、そんなとろけたような可愛い顔をしおって<emoji=heart04>\u3000もっとしてあげたくなってしまうではないか<emoji=heart04>」"
translation = "「――정말 기분 좋다고? 후훗, 그런 황홀해진 귀여운 얼굴을 하고서<emoji=heart04> 더 해주고 싶어지게 만들지 말거라<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ほら、腰を振るのと合わせて――にゅっぽにゅっぽ<emoji=heart04>\u3000きゅっきゅ<emoji=heart04>\u3000……ちゅっぷちゅっぷ\u3000きゅっきゅ<emoji=heart04>」"
translation = "「자, 허리를 흔드는 것에 맞춰서――늅늅<emoji=heart04> 꽉꽉<emoji=heart04> ……츕츕 꽉꽉<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はあぁっ……<emoji=heart04>\u3000貴殿の可愛く感じる姿を見ていると、私も興奮してくるぞ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 귀하가 느끼는 귀여운 모습을 보고 있으니 나도 흥분되는구나……<emoji=heart04> 응……<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「もっといっぱい、見せるがよい<emoji=heart04>\u3000ほら、おま○こ、ぎゅ～っ<emoji=heart04>\u3000にゅっぷにゅっぷ<emoji=heart04>\u3000しっこしっこ<emoji=heart04>\u3000ぎゅっぷぎゅっぷ<emoji=heart04>\u3000にゅっぽにゅっぽ<emoji=heart04>」"
translation = "「더 잔뜩 보여주거라<emoji=heart04> 자, 보지 꽉~<emoji=heart04> 늅늅<emoji=heart04> 찍찍<emoji=heart04> 규륫규륫<emoji=heart04> 늅늅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、この角度で、腰を振るのがよいのか？\u3000ならば集中的にっ<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>\u3000パンパンッ<emoji=heart04>\u3000じゅっぷじゅっぷ\u3000パンパンッ<emoji=heart04>」"
translation = "「후훗, 이 각도로 허리를 흔드는 게 좋으냐? 그렇다면 집중적으로! <emoji=heart04> 쥬븝쥬븝<emoji=heart04> 팍팍<emoji=heart04> 쥬븝쥬븝 팍팍<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んふぅぅっ<emoji=heart04>\u3000おち○ぽ、私の中でビクビクと、喜んでいるのがわかるぞ<emoji=heart04>\u3000じゅっぷじゅっぷ<emoji=heart04>\u3000パンパンッ<emoji=heart04>\u3000ぎゅっぷぎゅっぷ<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>」"
translation = "「응후우웃<emoji=heart04> 자지가 내 안에서 움찔움찔하며 기뻐하는 게 느껴지는구나<emoji=heart04> 쥬븝쥬븝<emoji=heart04> 팍팍<emoji=heart04> 규륫규륫<emoji=heart04> 쥬븝쥬븝<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「あとは、男はこういうのもいいと聞いたぞ。片手を後ろに回して――」"
translation = "「그리고 남자는 이런 것도 좋아한다고 들었다. 한쪽 손을 뒤로 돌려서――」"

[[dialogue]]
speaker = "unk"
original = "そう言ってヘレナちゃんが触れた先は、俺の睾丸だった。"
translation = "그렇게 말하며 헤레나짱이 만진 곳은 내 고환이었다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ<emoji=heart04>\u3000貴殿はここも大きくて、立派であるな<emoji=heart04>\u3000しかし、無防備で柔らかい<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000ほら、ふにふに<emoji=heart04>\u3000さわさわ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 귀하는 여기도 크고 훌륭하구나<emoji=heart04> 하지만 무방비하고 부드러워<emoji=heart04> 하아아<emoji=heart04> 자, 조물조물<emoji=heart04> 부들부들<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んふっ<emoji=heart04>\u3000漏れる喘ぎ声が、一段と可愛くなったな<emoji=heart04>\u3000おち○ぽとタマタマの同時責め、はぁぁ<emoji=heart04>\u3000興奮するのか？\u3000もみもみ<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>」"
translation = "「응훗<emoji=heart04> 흘러나오는 신음이 한층 더 귀여워졌구나<emoji=heart04> 자지와 불알의 동시 공략, 하아아<emoji=heart04> 흥분되느냐? 조물조물<emoji=heart04> 쥬븝쥬븝<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なら、あぁぁん<emoji=heart04>\u3000おま○こでぎゅっとするのも、一緒にしてやろう<emoji=heart04>\u3000ふぅっ――<emoji=heart04>」"
translation = "「그럼, 아아앙<emoji=heart04> 보지로 꽉 조이는 것도 같이 해주마<emoji=heart04> 후웃――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ぎゅっぷぎゅっぷ<emoji=heart04>\u3000ふにふに<emoji=heart04>\u3000パンパンッ<emoji=heart04>\u3000さわさわ<emoji=heart04>\u3000……はぁぁぁん<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>\u3000もみもみ<emoji=heart04>\u3000パンパンッ<emoji=heart04>\u3000パンパンッ<emoji=heart04>」"
translation = "「규륫규륫<emoji=heart04> 조물조물<emoji=heart04> 팍팍<emoji=heart04> 부들부들<emoji=heart04> ……하아아앙<emoji=heart04> 쥬븝쥬븝<emoji=heart04> 조물조물<emoji=heart04> 팍팍<emoji=heart04> 팍팍<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気持ちよくて興奮が高まるあまり、俺は思わず、ヘレナちゃんの名前を呼んでしまう。"
translation = "기분 좋고 흥분이 고조된 나머지, 나는 나도 모르게 헤레나짱의 이름을 불러버린다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――んっ<emoji=heart04>\u3000どうした？\u3000魔王よ、はぁぁん<emoji=heart04>\u3000なにか他に、して欲しいことがあるのか？」"
translation = "「――응<emoji=heart04> 왜 그러나? 마왕이여, 하아앙<emoji=heart04> 뭔가 더 해줬으면 하는 게 있나?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「可愛い貴殿の為なら、このヘレナちゃん、なんでもしてやるぞ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000なんでもおねだり、するがよい<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「귀여운 귀하를 위해서라면 이 헤레나짱, 뭐든지 해줄 수 있다구<emoji=heart04> 응……<emoji=heart04> 뭐든지 졸라 보거라<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なんでもしてくれる、と言われて、俺は気づけば……"
translation = "뭐든지 해준다는 말에 나는 어느덧……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「――ヘレナちゃん、好きだ。俺と付き合って欲しい」"
translation = "「――헤레나짱, 좋아해. 나랑 사귀어 줘」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んっ……<emoji=heart04>\u3000まったく、なんでもしてやると言ったが、はぁぁ<emoji=heart04>\u3000まさか、そんなお願いとは……。はあぁぁっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 정말이지, 뭐든지 해준다고는 했지만, 하아아<emoji=heart04> 설마 그런 부탁이라니……. 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「しかし、それならば……ふうぅ<emoji=heart04>\u3000可愛いだけじゃなくて、男らしいところを見せて、もらわねばな……<emoji=heart04>」"
translation = "「하지만 그렇다면…… 후우<emoji=heart04> 귀엽기만 한 게 아니라 남자다운 면도 보여줘야겠지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「故に、私のことが好きだというのなら――」"
translation = "「고로 나를 좋아한다고 한다면――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んんっ<emoji=heart04>\u3000その思いの丈、たっぷりと子宮の奥まで吐き出して、証明してみせよ<emoji=heart04>」"
translation = "「으음<emoji=heart04> 그 진심을 듬뿍 자궁 깊숙한 곳까지 쏟아내어 증명해 보이거라<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ゆくぞ……<emoji=heart04>\u3000んんっ――<emoji=heart04><emoji=heart04>」"
translation = "「간다……<emoji=heart04> 으음――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「じゅぽじゅぽ、パンパンッ<emoji=heart04>\u3000どちゅどちゅ、パンパンッ<emoji=heart04>\u3000……はぁぁん<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ぬちゅぬちゅ、ずっぽずっぽ<emoji=heart04>\u3000どちゅどちゅ、じゅっぽじゅっぽ<emoji=heart04>」"
translation = "「쥬븝쥬븝, 팍팍<emoji=heart04> 도츗도츗, 팍팍<emoji=heart04> ……하아앙<emoji=heart04> 흥흥<emoji=heart04> 누츗누츗, 즈븝즈븝<emoji=heart04> 도츗도츗, 쥬븝쥬븝<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「あぁぁん<emoji=heart04>\u3000おま○こで、ぎゅっとするのも、全力でゆくぞっ？\u3000それっ<emoji=heart04>\u3000ふんんっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 보지로 꽉 조이는 것도 전력을 다하겠다구? 기합이다<emoji=heart04> 으음――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ぎゅぷぎゅぷ、ふんっふんっ<emoji=heart04>\u3000じゅぶじゅぶ、ふんっふんっ<emoji=heart04>\u3000どちゅどちゅ、ずっぽずっぽ<emoji=heart04>\u3000じゅぶじゅぶ、ぎゅっぽぎゅっぽ<emoji=heart04>」"
translation = "「규륫규륫, 흥흥<emoji=heart04> 쥬븝쥬븝, 흥흥<emoji=heart04> 도츗도츗, 즈븝즈븝<emoji=heart04> 쥬븝쥬븝, 규륫규륫<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はあぁっ<emoji=heart04>\u3000よいぞ、魔王よ<emoji=heart04>\u3000その快楽に乱れた顔、実にプリティーで興奮するっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ふあぁぁぁん<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 좋구나, 마왕이여<emoji=heart04> 그 쾌락에 흐트러진 얼굴, 실로 프리티해서 흥분되는군! <emoji=heart04> 흥흥<emoji=heart04> 흥흥<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「激しい喘ぎ声も、ラブリーだ<emoji=heart04>\u3000もっと私に聞かせてくれ<emoji=heart04>\u3000ほら、ほらっ<emoji=heart04>\u3000ぎゅぷぎゅぷ、パンパンッ<emoji=heart04>\u3000じゅぽじゅぽ、パンパンッ<emoji=heart04>」"
translation = "「격렬한 신음도 러블리하다구. 더 나에게 들려주거라<emoji=heart04> 자, 자아! <emoji=heart04> 규륫규륫, 팍팍<emoji=heart04> 쥬븝쥬븝, 팍팍<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はぁぁぁん<emoji=heart04>\u3000そら、がんばれ、がんばれ<emoji=heart04>\u3000ぬちゅぬちゅ、ずっぽずっぽ<emoji=heart04>\u3000どちゅどちゅ、じゅっぽじゅっぽ<emoji=heart04>\u3000ぎゅぷぎゅぷ、パンパンッ<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 자, 힘내라, 힘내<emoji=heart04> 누츗누츗, 즈븝즈븝<emoji=heart04> 도츗도츗, 쥬븝쥬븝<emoji=heart04> 규륫규륫, 팍팍<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「激しくされて、もう出ちゃいそう？\u3000あぁんっ<emoji=heart04>\u3000もう少し我慢するのだ。私も、もうそろそろ……<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>」"
translation = "「격렬하게 몰아붙여서 벌써 나올 것 같으냐? 아앙! <emoji=heart04> 조금만 더 참거라. 나도 이제 슬슬……<emoji=heart04> 흥흥<emoji=heart04> 흥흥<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「あぁぁぁんっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000よいぞ<emoji=heart04>\u3000きた、きたきたきたっ<emoji=heart04>」"
translation = "「아아아앙! <emoji=heart04> 으으음! <emoji=heart04> 좋구나<emoji=heart04> 온다, 온다온다온다! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ラストスパートだ、ゆくぞっ<emoji=heart04>」"
translation = "「라스트 스퍼트다, 간다! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ぎゅぷぎゅぷ、パンパンッ<emoji=heart04>\u3000じゅぽじゅぽ、パンパンッ<emoji=heart04>\u3000ああっ、ふあぁぁぁん<emoji=heart04>\u3000……どちゅどちゅ、ずっぽずっぽ<emoji=heart04>\u3000じゅぶじゅぶ、ぎゅっぽぎゅっぽ<emoji=heart04>」"
translation = "「규륫규륫, 팍팍<emoji=heart04> 쥬븝쥬븝, 팍팍<emoji=heart04> 아앗, 후아아아앙<emoji=heart04> ……도츗도츗, 즈븝즈븝<emoji=heart04> 쥬븝쥬븝, 규륫규륫<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んんんっ<emoji=heart04>\u3000おち○ぽ膨らんでる<emoji=heart04>\u3000まだだ、ギリギリまで我慢するのだ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>\u3000ふんっふんっ<emoji=heart04>」"
translation = "「으으음! <emoji=heart04> 자지가 부풀고 있어<emoji=heart04> 아직이다, 한계까지 참는 거다<emoji=heart04> 흥흥<emoji=heart04> 흥흥<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はああぁっ<emoji=heart04>\u3000くるっ<emoji=heart04>\u3000私も昇ってきたっ<emoji=heart04>\u3000パンパンッ<emoji=heart04>\u3000パンパンッ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 온다! <emoji=heart04> 나도 올라갔어! <emoji=heart04> 팍팍<emoji=heart04> 팍팍<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「よいぞっ<emoji=heart04>\u3000出せ、出せ出せ出せ<emoji=heart04>」"
translation = "「좋다! <emoji=heart04> 싸라, 싸라싸라싸라! <emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふあああぁぁぁっ<emoji=heart04>\u3000イク、イクイクイクっ<emoji=heart04><emoji=heart04>\u3000イっ――――」"
translation = "「후아아아아아앗<emoji=heart04> 간다, 가가각가! <emoji=heart04><emoji=heart04> 가앗――――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「イックぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어어어어어어어억! <emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아~~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はああぁっ……<emoji=heart04>\u3000私の子宮に、貴殿の熱い精液が入ってくるぅ……<emoji=heart04>」"
translation = "「하아아앗……<emoji=heart04> 내 자궁에 귀하의 뜨거운 정액이 들어와아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んっ……<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000まだ出るのか……<emoji=heart04>\u3000あぁぁ、ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 대단해! <emoji=heart04> 아직 더 나오는 거냐……<emoji=heart04> 아아, 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「１回の射精で、子宮をいっぱいにしてしまう気か？\u3000ふふっ<emoji=heart04>」"
translation = "「한 번의 사정으로 자궁을 가득 채울 셈이냐? 후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――んっ<emoji=heart04>\u3000ようやく出し切ったみたいだな……<emoji=heart04>」"
translation = "「――응<emoji=heart04> 드디어 다 쏟아낸 모양이군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それじゃあ、抜くぞ……<emoji=heart04>」"
translation = "「그럼, 뺀다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「はあぁ……<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000見てみよ、貴殿のが溢れてきてしまっているぞ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후훗<emoji=heart04> 보아라, 귀하의 것이 흘러넘치고 있다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……それで、どうであったか？\u3000初めてのセックスは」"
translation = "「……그래서, 어땠나? 첫 섹스는」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「正直、私も興奮して、やり過ぎてしまったかもしれぬが……」"
translation = "「솔직히 나도 흥분해서 너무 몰아붙였을지도 모르겠지만……」"

[[dialogue]]
speaker = "unk"
original = "俺は、最高の筆おろしだったとヘレナちゃんに伝える。"
translation = "나는 최고의 첫 경험이었다고 헤레나짱에게 전한다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そうか……ふふっ、気持ちよくなってくれたのなら、それでよい」"
translation = "「그렇구나…… 후훗, 기분 좋았다면 그걸로 됐다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「――私はどうだったのか？\u3000そんなこと、皆まで言うでない」"
translation = "「――나는 어땠느냐고? 그런 걸 굳이 다 말하게 하지 말거라」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺に顔を寄せてきて、耳元で囁く。"
translation = "그녀는 나에게 얼굴을 가까이하고 귓가에서 속삭인다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「気持ちよかったに決まっているであろう？」"
translation = "「기분 좋았을 게 뻔하지 않나?」"

[[dialogue]]
speaker = "unk"
original = "そして、唇同士が触れて――"
translation = "그리고 입술끼리 맞닿으며――"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄웁<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「いま気づいたが……貴殿とキスをするのは、これが初めてだな」"
translation = "「이제야 깨달았는데…… 귀하와 키스하는 건 이번이 처음이구나」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふっ、順番が逆転してしまったな。私も緊張していたということか……」"
translation = "「후훗, 순서가 역전되어 버렸군. 나도 긴장하고 있었다는 건가……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「魔王よ――」"
translation = "「마왕이여――」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「愛しているぞ……<emoji=heart04>」"
translation = "「사랑한다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ちゅっ……<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「츄웁……<emoji=heart04> 응무웁<emoji=heart04> 츄파앗<emoji=heart04> 레로츄웁……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからヘレナちゃんにディープキスをされて、俺の思考は彼女一色で染まってしまうほど、甘く溶かされてしまうのだった――"
translation = "그러고는 헬레나짱에게 딥 키스를 당해, 내 사고는 그녀의 색으로 물들어 버릴 정도로 달콤하게 녹아내려 버리는 것이었다――"

