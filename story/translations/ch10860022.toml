[[dialogue]]
speaker = "unk"
original = "第２話,ダブルアルモたんはデートがしたい,P"
translation = "제2화, 더블 알모땅은 데이트가 하고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "その日は、俺はアルモと街へ食べ歩きデートに出かけていた。"
translation = "그날, 나는 알모와 거리로 먹거리 데이트를 나갔다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長との『食べ歩きデート』、楽しみにしていたのだ～♪」"
translation = "「회장님과의 『먹거리 데이트』, 기대하고 있었던 것이다~♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「でも……どうして<b>大きい</b>アルモたんも一緒なのだ！？」"
translation = "「하지만…… 어째서 <b>커다란</b> 알모땅도 함께인 것이다!?」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「当然だ。抜け駆けは許さんぞ、小さき我よ。デートをするなら『大人の食事』の方が、男女の雰囲気が出てよかろう？」"
translation = "「당연하다. 새치기는 용납 못 한다, 작은 나여. 데이트를 한다면 『어른의 식사』 쪽이 남녀 사이의 분위기가 나서 좋지 않겠나?」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「――なぁ、我が愛しき人の子よ<emoji=heart04>」"
translation = "「――자, 나의 사랑스러운 인간의 아이여<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、アルモが俺の腕に抱き着いてくる。大人ボディのボリュームある肉感が押し付けられ、思わずドキッとしてしまう。"
translation = "그렇게 말하며, 알모가 내 팔에 매달려 온다. 성인 몸의 볼륨감 있는 육감이 눌려와, 나도 모르게 가슴이 두근거린다."

[[dialogue]]
speaker = "unk"
original = "そ、そもそも２人は同一人物なのでは……？"
translation = "애, 애초에 두 사람은 동일 인물이 아닌가……?"

[[dialogue]]
speaker = "unk"
original = "アルモはアニマ先輩の作った『魂分裂薬』で魂を２つに分け、大小の義体を同時に運用している。その為、薬の効果時間が切れれば、元の１人に戻るわけで。"
translation = "알모는 아니마 선배가 만든 『혼 분열약』으로 영혼을 둘로 나누어, 크고 작은 의체를 동시에 운용하고 있다. 그 때문에 약의 효과 시간이 끝나면, 원래의 한 명으로 돌아가는 것이고."

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「その通りではあるが……察せよ。女心というのは複雑なものなのだ」"
translation = "「그 말대로이긴 하다만…… 눈치껏 행동해라. 여심이라는 건 복잡한 법이다」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「そうだぞ、会長！\u3000大きいアルモたんと小さいアルモたんは、牛肉と豚肉くらい別物なのだ！」"
translation = "「그렇다구, 회장님! 큰 알모땅이랑 작은 알모땅은 소고기와 돼지고기만큼이나 다른 것이다!」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「うむ。マグダレナの方はどうか知らぬが、我にとっては目の前に双子の姉妹がいるような感覚だな」"
translation = "「음. 막달레나 쪽은 어떨지 모르겠으나, 나에게 있어서는 눈앞에 쌍둥이 자매가 있는 듯한 감각이군」"

[[dialogue]]
speaker = "unk"
original = "よくわからないが……とりあえず今日は、ダブルアルモとデートということらしかった。"
translation = "잘은 모르겠지만…… 일단 오늘은 더블 알모와 데이트를 하는 모양이었다."

[[dialogue]]
speaker = "unk"
original = "それからデートが始まると、さっそく２人は俺の腕を巡って言い合いを始めた。"
translation = "그렇게 데이트가 시작되자, 곧바로 두 사람은 내 팔을 두고 말다툼을 시작했다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「大きいアルモたん、会長にくっ付き過ぎなのだ！」"
translation = "「큰 알모땅, 회장님한테 너무 달라붙는 것이다!」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「何を言う。肉感ある大人ボディを持つ我の方が、こうして腕に抱き着いて喜ばせるのは、必然の流れであろう」"
translation = "「무슨 소리냐. 육감적인 성인 몸을 가진 내가 이렇게 팔에 매달려 기쁘게 하는 것은 필연적인 흐름일 터」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長はアルモたんの『ぴちぴちなお肉』も好きなのだ！\u3000この小さい体でも、普段いっぱいイチャイチャしているのだからな♪」"
translation = "「회장님은 알모땅의 『탱글탱글한 살결』도 좋아하는 것이다! 이 작은 몸으로도 평소에 잔뜩 꽁냥거리고 있으니까 말이야♪」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「だが『肉』というものは、ボリュームがある方がよかろう？」"
translation = "「하지만 『고기』라는 것은 볼륨이 있는 편이 좋지 않겠나?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「量があっても、味が美味じゃなかったら意味ないのだ！」"
translation = "「양이 많아도 맛이 없으면 의미 없는 것이다!」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「誰が美味でないと！？\u3000我の大人ボディは熟成肉のように味わい深いぞ！」"
translation = "「누가 맛이 없다는 거냐!? 나의 성인 몸은 숙성된 고기처럼 깊은 맛이 난다고!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「むぅ～っ！\u3000会長はどっちのアルモたんが好きなのだ！？」"
translation = "「무우~! 회장님은 어느 쪽 알모땅이 좋은 것이다!?」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「当然、大きい方の我であろう？\u3000なにせ最初に恋人になったのは我の方なのだからな♪」"
translation = "「당연히 큰 쪽의 나겠지? 애초에 먼저 연인이 된 것은 나니까 말이야♪」"

[[dialogue]]
speaker = "unk"
original = "こ、答えづらい……！"
translation = "대, 대답하기 어려워……!"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「なっ！？\u3000即答できんとはどういうことだ！？」"
translation = "「뭐!? 즉답하지 못하다니 어떻게 된 거냐!?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ふふ～ん♪\u3000つまり今は『小さいアルモたん』の方にメロメロということだな♪」"
translation = "「후후~ㄴ♪ 즉 지금은 『작은 알모땅』 쪽에게 헤롱헤롱하다는 거네♪」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「まさか……浮気か！？\u3000そうなのか！」"
translation = "「설마…… 바람인가!? 그런 건가!」"

[[dialogue]]
speaker = "unk"
original = "――いや、俺はずっとアルモが一途に好きなんだけど！？"
translation = "――아니, 난 계속 알모를 일편단심으로 좋아하고 있는데!?"

[[dialogue]]
speaker = "unk"
original = "それからしばらく歩いて、アクセサリー店を見つけて立ち寄ると、２人はどれを買ってもらうかで再び言い合い始めた。"
translation = "그 뒤 한참을 걷다가 액세서리 가게를 발견해 들르자, 두 사람은 어떤 것을 선물 받을지를 두고 다시 말다툼을 시작했다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんは、この可愛いヘアピンの方がいいのだ！」"
translation = "「알모땅은 이 귀여운 머리핀이 더 좋은 것이다!」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「ならば大人の我に似合うこちらのデザインにすべきであろう」"
translation = "「그렇다면 어른인 나에게 어울리는 이쪽 디자인으로 해야 할 것이다」"

[[dialogue]]
speaker = "unk"
original = "見かねた俺は、２人の間に割って入る。"
translation = "보다 못한 나는 두 사람 사이에 끼어들었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えっ……？\u3000会長、両方とも買ってくれるのか？」"
translation = "「엣……? 회장님, 양쪽 다 사주는 거야?」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「それは嬉しいが……。すまない、気を遣わせてしまったな。つい熱くなってしまった……」"
translation = "「그건 기쁘지만……. 미안하다, 신경 쓰게 만들었군. 나도 모르게 열이 오르고 말았어……」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんも反省するのだ……ごめんなのだ……」"
translation = "「알모땅도 반성하는 것이다…… 미안한 것이다……」"

[[dialogue]]
speaker = "unk"
original = "シュンとする２人に俺は笑ってみせて、双方の頭を撫でる。"
translation = "풀 죽은 두 사람에게 나는 웃어 보이며, 양쪽의 머리를 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "正直、２人に挟まれるのは嬉しい"
translation = "솔직히, 두 사람 사이에 끼어 있는 건 기쁘다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――好きな子が２人に増えるのは、男としては夢があるシチュエーション……？」"
translation = "「――좋아하는 아이가 둘로 늘어나는 건, 남자로서 꿈이 있는 시츄에이션……?」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「ふふっ、そうか。この状況は役得ということか」"
translation = "「후훗, 그런가. 이 상황은 역득(役得)이라는 것이군」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「なら、アルモたんたちは休戦して、会長を喜ばせてあげるのだ♪」"
translation = "「그럼, 알모땅들은 휴전하고, 회장을 기쁘게 해주는 것이다♪」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「うむ。迷惑をかけた詫びに、また『アルモたんハーレム』を堪能させてやろう<emoji=heart04>」"
translation = "「음. 폐를 끼친 사죄로, 다시 『알모땅 하렘』을 만끽하게 해주마<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「お肉も種類が多いけど、どれも美味しくて、１番が選べないのと同じなのだ♪」"
translation = "「고기도 종류가 많지만, 어느 것이든 맛있어서 1등을 고를 수 없는 것과 마찬가지인 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あっ！\u3000でも、アルモたんが男として好きなのは、会長だけだぞ<emoji=heart04>」"
translation = "「앗! 하지만, 알모땅이 남자로서 좋아하는 건, 회장뿐이라구<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「然り。我がツガイになりたいと思う男は、お前だけだ」"
translation = "「그렇다. 나의 반려가 되고 싶다고 생각하는 남자는, 너뿐이다」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長、大好きなのだ<emoji=heart04>\u3000ん～っ、ちゅっ<emoji=heart04>」"
translation = "「회장, 너무 좋은 것이다<emoji=heart04> 응~, 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「我からも……ちゅっ<emoji=heart04>」"
translation = "「나도…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "左右の頬に同時キスされて、ドキッとしてしまう。"
translation = "좌우 뺨에 동시에 키스당해, 두근거리고 만다."

[[dialogue]]
speaker = "unk"
original = "ふ、２人共、こんなところで……！"
translation = "두, 두 사람 다, 이런 곳에서……!"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへ～<emoji=heart04>\u3000好きって気持ちが溢れて、ついキスしたくなっちゃったのだ<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 좋아한다는 마음이 넘쳐서, 그만 키스하고 싶어지고 만 것이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「ふふっ<emoji=heart04>\u3000なに、堂々としていれば、意外と注目されぬものだ<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 뭐 어떤가, 당당하게 있으면 의외로 주목받지 않는 법이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「……そうだ！\u3000大きいアルモたん、耳を貸すのだ！」"
translation = "「……그렇다! 커다란 알모땅, 귀 좀 빌려주는 것이다!」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「うん？\u3000……ほう、それは良い案だ。さすが小さくても我だな」"
translation = "「음? ……호오, 그건 좋은 안이군. 역시 작아도 나로군」"

[[dialogue]]
speaker = "unk"
original = "２人はこそこそと相談した後、俺の両腕に抱き着いてくる。"
translation = "두 사람은 소곤소곤 상담한 뒤, 내 양팔에 매달려 온다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長、このあとは食べ歩きデートから、『食べ放題』に予定を変更なのだ♪」"
translation = "「회장, 이 다음은 먹거리 데이트에서, 『무한 리필』로 예정을 변경하는 것이다♪」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「我ら２人に挟まれるのは嬉しいのだろう？\u3000ならば――」"
translation = "「우리 둘 사이에 끼는 게 기쁘지? 그렇다면――」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「リゾート結界で、ダブルアルモたんが会長にお肉をいっぱい食べさせてあげるのだ♪」"
translation = "「리조트 결계에서, 더블 알모땅이 회장에게 고기를 잔뜩 먹여주는 것이다♪」"

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「ふふっ、つまりはバーベキューをして、我ら２人であ～んをしてやるということだ。どうだ？」"
translation = "「후훗, 즉 바비큐를 하며 우리 둘이서 아~앙을 해주겠다는 소리다. 어떤가?」"

[[dialogue]]
speaker = "unk"
original = "俺は期待を膨らませながら、こくりと頷く。"
translation = "나는 기대를 부풀리며, 끄덕하고 고개를 끄덕인다."

[[dialogue]]
speaker_original = "大人アルモ"
speaker_translation = "성인 알모"
original = "「ふふっ、決まりだな<emoji=heart04>\u3000もちろん、食後のデザートも予定しているぞ<emoji=heart04>」"
translation = "「후훗, 결정됐군<emoji=heart04> 물론, 식후 디저트도 예정하고 있다구<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ダブルアルモたんとのイチャイチャを、お腹いっぱい味わうといいのだ<emoji=heart04>」"
translation = "「더블 알모땅과의 꽁냥꽁냥을, 배불리 맛보면 되는 것이다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺は、大好きな２人に挟まれながら、お腹も心も満たされる幸せな休日を過ごすのだった。"
translation = "이렇게 나는, 좋아하는 두 사람 사이에 끼어, 배도 마음도 채워지는 행복한 휴일을 보내는 것이었다."

