[[dialogue]]
speaker = "フィオナ"
original = "「ふふ♪\u3000最近海で遊んでばかりで、リップルさんのお世話になりっぱなしですね」"
translation = "「후후♪ 최근 바다에서만 놀아서, 리플 씨에게 계속 신세 지고 있네요.」"

[[dialogue]]
speaker = "unk"
original = "より多くの生徒たちを招くことで、さらに大きな結界を展開できるようになったリップル。"
translation = "더 많은 학생들을 초대함으로써, 더욱 큰 결계를 펼칠 수 있게 된 리플."

[[dialogue]]
speaker = "unk"
original = "その試験とお披露目を兼ねて、俺とフィオナも招待されたのだった。"
translation = "그 시험과 공개를 겸해서, 나와 피오나도 초대받은 것이었다."

[[dialogue]]
speaker = "フィオナ"
original = "「今回の結界は本当に広いですね。星徒会全員や他の生徒たちが来ても十分な大きさがあります」"
translation = "「이번 결계는 정말 넓네요. 성도회 전원이나 다른 학생들이 와도 충분한 크기가 있습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「みんな楽しんでいますし、リップルさんの野望が叶う日も来るかもしれませんね」"
translation = "「모두 즐거워하고 있고, 리플 씨의 야망이 이루어질 날도 올지 모르겠네요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「あれ？\u3000緋宮会長、どうして前かがみに……」"
translation = "「어라? 히노미야 회장, 왜 앞으로 숙이고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「まさか」"
translation = "「설마」"

[[dialogue]]
speaker = "unk"
original = "フィオナの咎めるような視線が、俺の股間に向けられる。"
translation = "피오나의 나무라는 듯한 시선이, 나의 가랑이로 향한다."

[[dialogue]]
speaker = "unk"
original = "するとフィオナの予想通り、水着越しでもわかるくらい俺のペニスは勃起していた。"
translation = "그러자 피오나의 예상대로, 수영복 너머로도 알 수 있을 정도로 나의 페니스는 발기해 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「もうっ……生理現象ですから仕方ないですけど、はしたないですよ」"
translation = "「정말…… 생리 현상이니까 어쩔 수 없지만, 방정맞아요.」"

[[dialogue]]
speaker = "クロト"
original = "「フィオナの水着で……つい」"
translation = "「피오나의 수영복 때문에…… 그만」"

[[dialogue]]
speaker = "フィオナ"
original = "「そういう言い方……ずるいです」"
translation = "「그런 말투…… 치사해요.」"

[[dialogue]]
speaker = "unk"
original = "俺は前かがみのまま、人気のない岩場に連れていかれて……"
translation = "나는 앞으로 숙인 채, 인기척 없는 바위로 이끌려 가서……"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "フィオナ"
original = "「こ、ここでするんですか？」"
translation = "「여, 여기서 하는 건가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「しかもこんな体勢……もし誰かが来たら丸見えになってしまいます」"
translation = "「게다가 이런 자세…… 혹시 누가 오면 훤히 보이게 됩니다.」"

[[dialogue]]
speaker = "unk"
original = "岩に手を突き、足を大きく上げるフィオナ。"
translation = "바위에 손을 짚고, 다리를 크게 올리는 피오나."

[[dialogue]]
speaker = "unk"
original = "ずれた水着からは秘裂がむき出しになり、こぼれた胸がぷるんと揺れる。"
translation = "흘러내린 수영복에서는 은밀한 틈이 드러나고, 넘치는 가슴이 출렁하고 흔들린다."

[[dialogue]]
speaker = "フィオナ"
original = "「すっきりさせてあげないとつらそうだったから、手か口でしてあげようと思ったのに……」"
translation = "「시원하게 해 주지 않으면 괴로울 것 같아서, 손이나 입으로 해 주려고 했는데……」"

[[dialogue]]
speaker = "unk"
original = "フィオナの気持ちはありがたいが、もう止まれない。"
translation = "피오나의 마음은 고맙지만, 이제 멈출 수 없다."

[[dialogue]]
speaker = "unk"
original = "フィオナとつながるのを今か今かと待ちわびるように、ペニスがドクドクと脈打っていた。"
translation = "피오나와 연결되기를 이제나저제나 기다리는 것처럼, 페니스가 두근두근 맥동하고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「あ……おち○ちん、あそこに当たって……熱い……」"
translation = "「아…… 자지, 거기에 닿아서…… 뜨거워……」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうしても……したいんですか？」"
translation = "「꼭…… 하고 싶은가요?」"

[[dialogue]]
speaker = "クロト"
original = "「したい」"
translation = "「하고 싶다」"

[[dialogue]]
speaker = "フィオナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "俺の即答に少し沈黙するフィオナ。"
translation = "나의 즉답에 잠시 침묵하는 피오나."

[[dialogue]]
speaker = "unk"
original = "そして顔を赤らめながら、羞恥のこもった声で言う。"
translation = "그리고 얼굴을 붉히며, 수치심이 담긴 목소리로 말한다."

[[dialogue]]
speaker = "フィオナ"
original = "「仕方ないですから、できるだけ早く済ませてくださいね……？」"
translation = "「어쩔 수 없으니, 가능한 한 빨리 끝내 주세요……?」"

[[dialogue]]
speaker = "unk"
original = "渋々ながらもわがままを許してくれるフィオナに興奮して、今にも暴発しそうなペニスを突き出す。"
translation = "마지못해 떼를 쓰는 것을 허락해 주는 피오나에게 흥분하여, 당장이라도 폭발할 듯한 페니스를 들이민다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふぁああっ<emoji=heart04>\u3000ああっ<emoji=heart04>」"
translation = "「흐아아앗<emoji=heart04> 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭がフィオナの中に入った途端、膣がぎゅっと締まった。"
translation = "귀두가 피오나 안에 들어간 순간, 질이 꽉 조였다."

[[dialogue]]
speaker = "フィオナ"
original = "「んん～っ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000おち○ちん、入ってくるぅ……<emoji=heart04>」"
translation = "「응응~읏<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 자지, 들어온다아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが奥に進んでいく度、フィオナの体が震える。"
translation = "페니스가 안으로 들어갈 때마다, 피오나의 몸이 떨린다."

[[dialogue]]
speaker = "unk"
original = "熱い日差しと潮風を浴びながら、フィオナとつながる感触を味わう。"
translation = "뜨거운 햇살과 갯바람을 맞으며, 피오나와 연결되는 감촉을 맛본다."

[[dialogue]]
speaker = "フィオナ"
original = "「んんっ<emoji=heart04>\u3000おち○ちん、いつもより大きいっ<emoji=heart04>」"
translation = "「응응읏<emoji=heart04> 자지, 평소보다 커읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ……はあぁ……私の中、あなたのでいっぱいになってます……<emoji=heart04>\u3000ふ、はぁ……もしかして、外でエッチして興奮してるんですか……？」"
translation = "「하아…… 하아아…… 제 안, 당신 것으로 가득 찼어요……<emoji=heart04> 후, 하아…… 혹시, 밖에서 섹스해서 흥분한 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "そうかもしれない。"
translation = "그럴지도 모른다."

[[dialogue]]
speaker = "unk"
original = "だけどフィオナの中も濡れていて、興奮しているのは俺だけではない気がした。"
translation = "하지만 피오나의 안도 젖어 있어서, 흥분하고 있는 것은 나만이 아닌 것 같았다."

[[dialogue]]
speaker = "フィオナ"
original = "「ひあぁああっ<emoji=heart04>\u3000あっ……んっ……あなたのが、動いて……んんっ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04> 앗…… 응읏…… 당신 것이, 움직여서…… 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁ……あっ、あんっ<emoji=heart04>\u3000外で、エッチしちゃってます……っ<emoji=heart04>\u3000んぁ……はっ……ん～っ<emoji=heart04>」"
translation = "「하아아…… 앗, 앙읏<emoji=heart04> 밖에서, 섹스해 버리고 있어요……읏<emoji=heart04> 응아…… 핫…… 음~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "厳密にはリップルの結界の中だが、感じる空気は本物の海と何ら変わりない。"
translation = "엄밀히는 리플의 결계 안이지만, 느껴지는 공기는 진짜 바다와 전혀 다를 바 없다."

[[dialogue]]
speaker = "unk"
original = "少し向こうには人がいて、見つかる危険とスリルも同じだ。"
translation = "조금 너머에는 사람이 있어서, 들킬 위험과 스릴도 똑같다."

[[dialogue]]
speaker = "フィオナ"
original = "「んんっ……はぁ……ああっ<emoji=heart04>\u3000お腹の中で、擦れて……んぁああっ<emoji=heart04>」"
translation = "「응응읏…… 하아…… 아앗<emoji=heart04> 배 속에서, 문질러져서…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ……はっ……あっ……あぁんっ<emoji=heart04>\u3000おち○ちん大きくて、形、わかっちゃうっ<emoji=heart04>\u3000んっ……あんっ<emoji=heart04>」"
translation = "「하아…… 핫…… 앗…… 아앙읏<emoji=heart04> 자지 커서, 모양, 알겠어읏<emoji=heart04> 응읏…… 앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「私の中、広がっちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んん──ふぁああっ<emoji=heart04>」"
translation = "「제 안, 넓어져 버려읏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응── 흐아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "岩場に打ち寄せる潮騒に、フィオナの嬌声が混じって響く。"
translation = "바위에 부딪히는 파도 소리에, 피오나의 교성이 섞여 울린다."

[[dialogue]]
speaker = "フィオナ"
original = "「外でエッチしてると、見られてる、みたい……ですっ<emoji=heart04>\u3000あっ……はぁ……<emoji=heart04>」"
translation = "「밖에서 섹스하고 있으니, 보여지는, 것 같아……요읏<emoji=heart04> 앗…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひぁっ、あっ、あんっ<emoji=heart04>\u3000恥ずかしくて、変になりそう……んっ……ん～～っ<emoji=heart04>」"
translation = "「히얏, 앗, 앙읏<emoji=heart04> 부끄러워서, 이상해질 것 같아…… 응읏…… 음~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「だけどフィオナの中、締め付けてくる」"
translation = "「하지만 피오나의 안, 조여 온다」"

[[dialogue]]
speaker = "フィオナ"
original = "「あっ、あんっ<emoji=heart04>\u3000それはあなたが、おち○ちんで突くから、ぁっ──んぁああっ<emoji=heart04>」"
translation = "「앗, 앙읏<emoji=heart04> 그건 당신이, 자지로 찌르니까, 앗── 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んぁっ……あっ……ああっ<emoji=heart04>\u3000外でエッチするの、気持ちいいわけじゃ……ぅぁ……ひあぁっ<emoji=heart04>」"
translation = "「응앗…… 앗…… 아앗<emoji=heart04> 밖에서 섹스하는 거, 기분 좋은 건 아니…… 으아…… 히아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "誰も見ていないはずなのに、そこかしこから視線が突き刺さるよう。"
translation = "아무도 보고 있지 않을 텐데, 사방에서 시선이 꽂히는 듯하다."

[[dialogue]]
speaker = "unk"
original = "得も言われぬ背徳感、そしてスリルにゾクゾクするものを感じながら、フィオナを突き続ける。"
translation = "형언할 수 없는 배덕감, 그리고 스릴에 오싹함을 느끼면서, 피오나를 계속 찌른다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふぁっ、あっ、あっ……んんっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はっ、はっ、あ、はぁんっ<emoji=heart04>」"
translation = "「홧, 앗, 앗…… 응응읏<emoji=heart04> 앗, 앙읏<emoji=heart04> 핫, 핫, 아, 하앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いつもより声が出てる」"
translation = "「평소보다 목소리가 크다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そんなことない、です……ぁ<emoji=heart04>\u3000ふぁ、あ──ひああぁあっ<emoji=heart04>」"
translation = "「그렇지 않아, 요…… 아<emoji=heart04> 화, 아── 히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んああぁっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000中で大きく動いて……ああぁんっ<emoji=heart04>\u3000たくさん、擦れてる……ん～～っ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04><emoji=heart04> 하아아읏<emoji=heart04> 안에서 크게 움직여서…… 아아앙읏<emoji=heart04> 잔뜩, 문질러지고 있어…… 음~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ、あぁ……お腹の中で、おち○ちんがビクンって……ぁ<emoji=heart04>\u3000あっ……んっ……おち○ちん硬くて大きい……っ<emoji=heart04>\u3000あ、あ──ひやああぁっ<emoji=heart04>」"
translation = "「하아, 아아…… 배 속에서, 자지가 움찔하고…… 아<emoji=heart04> 앗…… 응읏…… 자지 단단하고 커……읏<emoji=heart04> 아, 아── 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふぁっ、はっ、あんっ<emoji=heart04>\u3000おち○ちん出たり、入ったりして……おま○こ熱いぃ……ふぁ……ん～っ<emoji=heart04>」"
translation = "「홧, 핫, 앙읏<emoji=heart04> 자지 나왔다, 들어갔다 해서…… 보지 뜨거워어…… 흐아…… 음~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "岩場で喘ぐフィオナに興奮が高まるのを感じながら、力を込めて奥まで突く。"
translation = "바위에서 신음하는 피오나에게 흥분이 고조되는 것을 느끼면서, 힘을 실어 안쪽까지 찌른다."

[[dialogue]]
speaker = "フィオナ"
original = "「ひあああああっ<emoji=heart04><emoji=heart04>\u3000ふああぁっ、あぁんっ<emoji=heart04>\u3000おち○ちん、強いですぅっ<emoji=heart04>」"
translation = "「히아아아아앗<emoji=heart04><emoji=heart04> 흐아아앗, 아앙읏<emoji=heart04> 자지, 강해요읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んん～～～っ<emoji=heart04>\u3000おち○ちん奥まで来て……深いぃっ<emoji=heart04>\u3000んはぁ、はぁっ……あっ……あっ──ひああぁっ<emoji=heart04>」"
translation = "「응응~~~읏<emoji=heart04> 자지 안쪽까지 와서…… 깊어어읏<emoji=heart04> 응하, 핫…… 앗…… 앗── 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスをフィオナの深くまで突き入れると、柔らかい肉が包み込んでくれる。"
translation = "페니스를 피오나의 깊숙한 곳까지 찔러 넣자, 부드러운 살이 감싸 안아준다."

[[dialogue]]
speaker = "unk"
original = "さらにぎゅっと締め付けてきて、強烈な快感が押し寄せてきた。"
translation = "게다가 꽉 조여 와서, 강렬한 쾌감이 밀려왔다."

[[dialogue]]
speaker = "フィオナ"
original = "「あっ、あっ、んんっ<emoji=heart04>\u3000ジュプジュプって、エッチな音が、ぁっ──んあぁああっ<emoji=heart04>」"
translation = "「앗, 앗, 응응읏<emoji=heart04> 쥽쥽하고, 야한 소리가, 앗── 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふはぁっ、あっ……あぁんっ<emoji=heart04>\u3000海なのに……外でエッチするなんて、おかしいのに……ふあぁんっ<emoji=heart04>」"
translation = "「흐핫, 앗…… 아앙읏<emoji=heart04> 바다인데…… 밖에서 섹스하다니, 이상한데…… 흐아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうして、こんなに……ひやぁっ<emoji=heart04>\u3000はっ、あっ、あっ、ぁんっ<emoji=heart04>\u3000気持ち、いいのっ<emoji=heart04>」"
translation = "「어째서, 이렇게…… 히야앗<emoji=heart04> 핫, 앗, 앗, 앙읏<emoji=heart04> 기분, 좋은 거읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「声を出すと人が来るかもしれないぞ」"
translation = "「소리를 내면 사람이 올지도 모른다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そんなのダメですぅっ<emoji=heart04>」"
translation = "「그런 거 안 돼요읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今のフィオナは足を高く上げて、まるでつながっているところを見せつけるような格好だ。"
translation = "지금의 피오나는 다리를 높이 들어, 마치 연결된 곳을 과시하는 듯한 모습이다."

[[dialogue]]
speaker = "フィオナ"
original = "「見られるのダメっ<emoji=heart04>\u3000ダメですからぁっ<emoji=heart04>\u3000んぁっ、あっ、あぁっ──ひああっ<emoji=heart04>」"
translation = "「보이는 거 안 돼읏<emoji=heart04> 안 되니까아읏<emoji=heart04> 응앗, 앗, 아앗── 히아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁっ、あっ、あっ……あんっ<emoji=heart04>\u3000はあぁっ……あっ<emoji=heart04>\u3000おま○こ、切なくて……んん～～～っ<emoji=heart04>」"
translation = "「하앗, 앗, 앗…… 앙읏<emoji=heart04> 하아아읏…… 앗<emoji=heart04> 보지, 애틋해서…… 응응~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけど嬌声は止まらず、フィオナの表情は性の快感に染まっていた。"
translation = "하지만 교성은 멈추지 않고, 피오나의 표정은 성적 쾌감으로 물들어 있었다."

[[dialogue]]
speaker = "unk"
original = "途中でやめるという選択肢はもはやなく、ひたすらに快楽を貪る。"
translation = "도중에 그만둔다는 선택지는 이미 없고, 오로지 쾌락을 탐한다."

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁっ、あっ、んんっ<emoji=heart04>\u3000おち○ちんで、おま○こズボズボされて……ひあっ、ああぁっ<emoji=heart04>」"
translation = "「하아아읏, 앗, 응응읏<emoji=heart04> 자지로, 보지 푹푹 당해서…… 히앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ、はぁ……はっ……ん～っ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000おち○ちん大きくてっ……気持ちいいところに、当たってますっ……ひああっ<emoji=heart04>」"
translation = "「하아, 하아…… 핫…… 음~읏<emoji=heart04> 응응응읏<emoji=heart04> 자지 커서읏…… 기분 좋은 곳에, 닿고 있어요읏…… 히아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んあぁっ<emoji=heart04>\u3000はっ、あんっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000おま○こ、溶けちゃいそうですぅっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 핫, 앙읏<emoji=heart04> 앗, 앗<emoji=heart04> 보지, 녹아 버릴 것 같아요읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひやぁっ！？\u3000おっぱいも、触られて……ふぁああっ<emoji=heart04>\u3000あっ、はっ、あっ……はぁんっ<emoji=heart04>」"
translation = "「히야앗!? 가슴도, 만져져서…… 흐아아앗<emoji=heart04> 앗, 핫, 앗…… 하앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「あぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000おっぱい揉まれながら、おち○ちんで突かれて……んんっ<emoji=heart04>\u3000あっ、はっ……ひあぁっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 흐아앗<emoji=heart04> 가슴 주물러지면서, 자지로 찔려서…… 응응읏<emoji=heart04> 앗, 핫…… 히아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はあぁっ、あっ、あん<emoji=heart04>\u3000おっぱい、気持ちいい<emoji=heart04>\u3000あっ……乳首、まで……んんぅ～～っ<emoji=heart04>」"
translation = "「하아아읏, 앗, 앙<emoji=heart04> 가슴, 기분 좋아<emoji=heart04> 앗…… 젖꼭지, 까지…… 응응으~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を刺激してやると、面白いように膣が反応してきゅうきゅうと締め付けてくる。"
translation = "젖꼭지를 자극해 주자, 재미있게도 질이 반응하여 꽉꽉 조여 온다."

[[dialogue]]
speaker = "フィオナ"
original = "「あん<emoji=heart04>\u3000あん<emoji=heart04>\u3000おち○ちんビクビクしてますっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000おち○ちん、激しくなって──」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 자지 움찔움찔하고 있어요읏<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 자지, 격렬해져서──」"

[[dialogue]]
speaker = "フィオナ"
original = "「あぁ～～～っ<emoji=heart04><emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000おち○ちんズンズン来てますっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「아아～～～읏<emoji=heart04><emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 자지 쿵쿵 오고 있어요읏<emoji=heart04> 응앗<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000いっぱい<emoji=heart04>\u3000突かれて<emoji=heart04>\u3000変になるぅっ<emoji=heart04>」"
translation = "「홧<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙읏<emoji=heart04> 잔뜩<emoji=heart04> 찔려서<emoji=heart04> 이상해져어읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本能に従い、欲望に衝き動かされるまま、射精に向かってフィオナを突き続ける。"
translation = "본능에 따르고, 욕망에 이끌리는 대로, 사정을 향해 피오나를 계속 찌른다."

[[dialogue]]
speaker = "フィオナ"
original = "「んんっ<emoji=heart04>\u3000それ激しい<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000強いですっ<emoji=heart04>\u3000おかしく<emoji=heart04>\u3000なっちゃいますっ<emoji=heart04>」"
translation = "「응응읏<emoji=heart04> 그거 격렬해<emoji=heart04> 안 돼읏<emoji=heart04> 강해요읏<emoji=heart04> 이상하게<emoji=heart04> 되어 버려요읏<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「早く済ませろって言ったのはフィオナだろ」"
translation = "「빨리 끝내라고 말한 건 피오나잖아」"

[[dialogue]]
speaker = "フィオナ"
original = "「そういう、意味じゃ──ふああぁっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「그런, 의미가── 흐아아앗<emoji=heart04><emoji=heart04> 하아아읏<emoji=heart04> 앗<emoji=heart04> 핫<emoji=heart04> 아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ダメっ、ダメですってば<emoji=heart04>\u3000んはぁっ、はっ、あんっ<emoji=heart04>\u3000あ──ひああ～～っ<emoji=heart04>」"
translation = "「안 돼읏, 안 된다니까요<emoji=heart04> 응하앗, 핫, 앙읏<emoji=heart04> 아── 히아아~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "夏の海に当てられたのか、普段より激しく乱れるフィオナ。"
translation = "여름 바다에 홀린 건지, 평소보다 격렬하게 흐트러지는 피오나."

[[dialogue]]
speaker = "unk"
original = "ダメという言葉も、もっと欲しいとねだっているようにしか聞こえなかった。"
translation = "안 된다는 말도, 더 원한다고 조르는 것처럼밖에 들리지 않았다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふああぁっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おち○ちんダメぇっ<emoji=heart04>\u3000ダメですぅっ<emoji=heart04>」"
translation = "「흐아아앗<emoji=heart04> 히앗<emoji=heart04> 아앙읏<emoji=heart04> 자지 안 돼애읏<emoji=heart04> 안 돼요읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000おま○こかき回されて、気持ちいいっ<emoji=heart04>\u3000お腹、熱いっ<emoji=heart04>\u3000んぁ、あっ、あぁ～～っ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 보지 휘저어져서, 기분 좋아읏<emoji=heart04> 배, 뜨거워읏<emoji=heart04> 응아, 앗, 아아~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひああっ、あっ、あっ──ふあぁああっ<emoji=heart04>\u3000声出したら、いけないのに<emoji=heart04>\u3000見つかったら、ダメなのに<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000エッチな声出ちゃうぅっ<emoji=heart04>」"
translation = "「히아앗, 앗, 앗── 흐아아아앗<emoji=heart04> 소리 내면, 안 되는데<emoji=heart04> 들키면, 안 되는데<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안 돼읏<emoji=heart04> 야한 목소리 나와 버려어읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "教皇の娘。流星学園の星徒会長。"
translation = "교황의 딸. 유성 학원의 성도회장."

[[dialogue]]
speaker = "unk"
original = "高貴を形にしたような女の子が、こんなところではしたなく喘いでいるのがたまらない。"
translation = "고귀함을 형상화한 듯한 여자아이가, 이런 곳에서 방정맞게 신음하고 있는 것이 참을 수 없다."

[[dialogue]]
speaker = "クロト"
original = "「外でエッチするの、くせになるかもな」"
translation = "「밖에서 섹스하는 거, 버릇이 될지도 모르겠군」"

[[dialogue]]
speaker = "フィオナ"
original = "「ダメぇっ<emoji=heart04>\u3000はっ、あぁっ、あんっ<emoji=heart04>\u3000そんなのダメですぅっ<emoji=heart04>\u3000ああっ、はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ダメダメダメぇっ<emoji=heart04>」"
translation = "「안 돼애읏<emoji=heart04> 핫, 아앗, 앙읏<emoji=heart04> 그런 건 안 돼요읏<emoji=heart04> 아앗, 하앗<emoji=heart04> 앙읏<emoji=heart04> 안 돼 안 돼 안 돼애읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いながらも、膣が震えながら収縮してペニスを絞ってくる。"
translation = "그렇게 말하면서도, 질이 떨리며 수축하여 페니스를 조여 온다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふわぁっ、あっ、あんっ<emoji=heart04>\u3000はぁっ、あっ、はっ──んぁああっ<emoji=heart04>\u3000外でエッチするなんて、変態みたいなのに……はっ、ぁっ<emoji=heart04>」"
translation = "「흐와앗, 앗, 앙읏<emoji=heart04> 하앗, 앗, 핫── 응아아앗<emoji=heart04> 밖에서 섹스하다니, 변태 같은데…… 핫, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「こんなの、おかしいのに……お腹、キュンキュンするっ<emoji=heart04>\u3000ふはっ、はっ、あっ<emoji=heart04>\u3000体、熱いっ<emoji=heart04>\u3000はっ、はっ、はぁっ──んん～～～っ<emoji=heart04>」"
translation = "「이런 거, 이상한데…… 배, 큥큥거려읏<emoji=heart04> 흐핫, 핫, 앗<emoji=heart04> 몸, 뜨거워읏<emoji=heart04> 핫, 핫, 하앗── 응응~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精欲がこみ上げ、ペニスがドクドクと脈打つのを感じながら、亀頭で奥を叩く。"
translation = "사정욕이 치밀어 오르고, 페니스가 두근두근 맥동하는 것을 느끼면서, 귀두로 안쪽을 때린다."

[[dialogue]]
speaker = "フィオナ"
original = "「ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000子宮、突かれてますっ<emoji=heart04>\u3000おち○ちん、奥、当たって<emoji=heart04>\u3000ふあっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「흐아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 자궁, 찔리고 있어요읏<emoji=heart04> 자지, 안쪽, 닿아서<emoji=heart04> 흐앗<emoji=heart04> 핫<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んんんっ<emoji=heart04>\u3000あっ、はっ、はっ──んああぁっ<emoji=heart04>\u3000硬いおち○ちんで、ズンズンされてっ<emoji=heart04>\u3000んぁっ、あっ……あっ、はあぁんっ<emoji=heart04>」"
translation = "「응응응읏<emoji=heart04> 앗, 핫, 핫── 응아아앗<emoji=heart04> 단단한 자지로, 쿵쿵 당해서읏<emoji=heart04> 응앗, 앗…… 앗, 하아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁはっ、あっ──んんーーっ<emoji=heart04>\u3000おま○こ熱いっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000あ──あ──あ──ひぁあ～～～～っ<emoji=heart04>」"
translation = "「하아핫, 앗── 응응--읏<emoji=heart04> 보지 뜨거워읏<emoji=heart04> 흐아앗<emoji=heart04> 아── 아── 아── 히아아~~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "燦々と輝く日差しを浴びながら、肉欲のまま交わる俺とフィオナ。"
translation = "찬란하게 빛나는 햇살을 받으며, 육욕대로 교접하는 나와 피오나."

[[dialogue]]
speaker = "unk"
original = "激しく、荒々しく、獣のようにペニスで突きまくる。"
translation = "격렬하게, 거칠게, 짐승처럼 페니스로 마구 찌른다."

[[dialogue]]
speaker = "フィオナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ──あぁんっ<emoji=heart04>\u3000見つかったらダメなのに……恥ずかしいのに……んんっ<emoji=heart04>\u3000はぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아── 아앙읏<emoji=heart04> 들키면 안 되는데…… 부끄러운데…… 응응읏<emoji=heart04> 하앗<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「恥ずかしいのに……んはぁ、あっ、あっ──ふああぁっ<emoji=heart04>\u3000外で、エッチして……ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅ～～っ<emoji=heart04>」"
translation = "「부끄러운데…… 응하, 앗, 앗── 흐아아앗<emoji=heart04> 밖에서, 섹스해서…… 홧<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응으~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000おち○ちんが、私の子宮に届いて……ああっ<emoji=heart04>\u3000んっ、んんっ<emoji=heart04>\u3000おち○ちんビクビクしてますっ<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 앗<emoji=heart04> 하아앙읏<emoji=heart04> 자지가, 제 자궁에 닿아서…… 아앗<emoji=heart04> 응읏, 응응읏<emoji=heart04> 자지 벌렁거리고 있어요읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んん～～っ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イッちゃいますっ<emoji=heart04>\u3000あなたのおち○ちんで、おま○こイクっ<emoji=heart04>」"
translation = "「응응~~읏<emoji=heart04> 가읏<emoji=heart04> 가버려요읏<emoji=heart04> 당신의 자지로, 보지 가읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んぁっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000ああ～～っ<emoji=heart04>\u3000イクぅ<emoji=heart04>\u3000イクイクイクイクぅ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아아~~읏<emoji=heart04> 가읏<emoji=heart04> 가가가가읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「は──あ──あ──うああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイク<emoji=heart04>\u3000イッくぅぅ～～～～～っ<emoji=heart04>」"
translation = "「하── 아── 아── 우아아앗<emoji=heart04> 앗<emoji=heart04> 보지 가<emoji=heart04> 가읏으으~~~~~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひぁああああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아~~~~~~~~~~~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ……あ……あんっ<emoji=heart04>\u3000おち○ちんが、中で、跳ねて……んんっ<emoji=heart04>\u3000お腹、熱いぃっ<emoji=heart04>」"
translation = "「아…… 아…… 앙읏<emoji=heart04> 자지가, 안에서, 튀어서…… 응응읏<emoji=heart04> 배, 뜨거워읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「奥に、熱いの、たくさん出てますっ<emoji=heart04>\u3000ふわぁっ、はぁっ……<emoji=heart04>\u3000子宮に、びゅーって、熱いの広がってますぅ……<emoji=heart04>」"
translation = "「안쪽에, 뜨거운 거, 잔뜩 나오고 있어요읏<emoji=heart04> 흐와앗, 하앗……<emoji=heart04> 자궁에, 뷰 하고, 뜨거운 거 퍼지고 있어요오……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「んんっ、おち○ちんドクドクって脈打って、まだ、出てる……<emoji=heart04>\u3000私のおま○こ、精液でいっぱいになっちゃうぅ……ん……んん～～っ<emoji=heart04>」"
translation = "「응응읏, 자지 두근두근 맥동하고, 아직, 나오고 있어……<emoji=heart04> 제 보지, 정액으로 가득 차버려요오…… 응…… 응응~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「はーっ……はーっ……あなたの精液が、こんなに……」"
translation = "「하ー앗…… 하ー앗…… 당신의 정액이, 이렇게나……」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けた秘裂から、フィオナの中に注いだ精液がどろりと垂れてきた。"
translation = "페니스가 빠져나간 은밀한 틈에서, 피오나 안에 쏟아 넣은 정액이 끈적하게 흘러내렸다."

[[dialogue]]
speaker = "unk"
original = "それは俺がフィオナに種付けした証で、オスの本能を刺激されてゾクリとくる。"
translation = "그것은 내가 피오나에게 씨를 뿌린 증거로, 수컷의 본능을 자극받아 오싹해진다."

[[dialogue]]
speaker = "フィオナ"
original = "「本当に外でエッチしてしまいました……こんなつもりじゃ、なかったのに……」"
translation = "「정말로 밖에서 섹스해버렸어요…… 이럴 생각은, 아니었는데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「どうです……？\u3000エッチしてすっきりしましたか？」"
translation = "「어떠세요……? 섹스하고 개운해지셨나요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、ありがとう」"
translation = "「아아, 고맙다」"

[[dialogue]]
speaker = "フィオナ"
original = "「なら……いいですけど」"
translation = "「그렇다면…… 됐어요」"

[[dialogue]]
speaker = "unk"
original = "岩にもたれかかって脱力するフィオナ。"
translation = "바위에 기대어 탈력하는 피오나."

[[dialogue]]
speaker = "unk"
original = "劣情は発散できたけど、もっとつながりが欲しくてフィオナにキスをする。"
translation = "열정은 발산했지만, 더 연결되고 싶어서 피오나에게 키스를 한다."

[[dialogue]]
speaker = "フィオナ"
original = "「んちゅ……ちゅるっ……ちゅぱっ……んんむ、はぁ……ちゅぷ、ちゅるる……ぷぁっ」"
translation = "「응츄…… 츄릅…… 츄팟…… 응음, 하아…… 츕, 츄르르…… 프앗」"

[[dialogue]]
speaker = "クロト"
original = "「気に入ったなら、また外でエッチする？」"
translation = "「마음에 들었다면, 또 밖에서 섹스할까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「な……！？\u3000別に、私は……そういうのじゃないですから」"
translation = "「네……!? 별로, 저는…… 그런 거 아니니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「でもまぁ……見つからないなら、考えなくもないですよ」"
translation = "「하지만 뭐…… 들키지 않는다면, 생각 안 하는 것도 아니에요」"

