[[dialogue]]
speaker = "unk"
original = "第３話,ウェンディ式記憶術,P"
translation = "제3화, 웬디식 기억술, P"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ご迷惑をおかけして、申し訳ありませんでしたわ」"
translation = "「폐를 끼쳐서 정말 죄송해요」"

[[dialogue]]
speaker = "unk"
original = "虹を生み出す魔法に挑戦したノルトハウゼンだったが、それは失敗に終わってしまった。"
translation = "무지개를 만드는 마법에 도전했던 노르트하우젠이었지만, 그것은 실패로 끝나고 말았다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「着替えまで用意して頂いて、ありがとうございました」"
translation = "「갈아입을 옷까지 준비해 주셔서 감사합니다」"

[[dialogue]]
speaker = "リーリア"
original = "「いえいえ、気にしなくても大丈夫ですよ。服のサイズ的にはどうですか～？\u3000特に胸の辺りとかきつかったりしないですか？」"
translation = "「아뇨 아뇨, 신경 쓰지 않아도 괜찮아요. 옷 사이즈는 어때요~? 특히 가슴 쪽이라든가 끼거나 하지 않나요?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ありがとうございます、丁度良いサイズですわ」"
translation = "「감사합니다, 딱 맞는 사이즈예요」"

[[dialogue]]
speaker = "リーリア"
original = "「その制服、私が新星学園に潜入するときに着てるものなんですけど～。そっかぁ～、私とぴったり同じくらいのサイズなんですね～☆」"
translation = "「그 교복, 제가 신성 학원에 잠입할 때 입는 거거든요~. 그렇구나~, 저랑 딱 비슷한 사이즈네요~☆」"

[[dialogue]]
speaker = "ウェンディ"
original = "「同じくらいのサイズ……？」"
translation = "「비슷한 사이즈……?」"

[[dialogue]]
speaker = "アイリーン"
original = "「ノルトハウゼンさんとリーリアさんが……？」"
translation = "「노르트하우젠 씨랑 리리아 씨가……?」"

[[dialogue]]
speaker = "リーリア"
original = "「ど、どうしてそんなに見比べてるんですかね～？\u3000ほらほら、おかしなことなんてなーんにも無いですよ～？」"
translation = "「어, 어째서 그렇게 쳐다보시는 건가요~? 자자, 이상한 건 아무것도 없다구요~?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ノルトハウゼンさんに代わりの服を、となった時に、どうしてリーリアが真っ先に名乗りを上げたのか不思議でしたが……」"
translation = "「노르트하우젠 씨에게 대신할 옷을 줄 때, 왜 리리아가 제일 먼저 나섰는지 의아했습니다만……」"

[[dialogue]]
speaker = "アイリーン"
original = "「もしかして、そういうアピールをしたかったから？」"
translation = "「혹시 그런 어필을 하고 싶었던 거야?」"

[[dialogue]]
speaker = "リーリア"
original = "「あ、あはは～。２人が何を言ってるのか、私には何にも分かりませ～ん」"
translation = "「아, 아하하~. 두 분이 무슨 말씀을 하시는지 저는 전혀 모르겠네용~」"

[[dialogue]]
speaker = "ウェンディ"
original = "「まあ、いいです……わざわざ藪をつつく必要はありませんし、深くは突っ込まないでおきます」"
translation = "「뭐, 됐습니다…… 굳이 긁어 부스럼 만들 필요는 없으니 깊게 파고들지는 않겠습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「うんうん、リーリアさんかわいそう～♪」"
translation = "「응응, 리리아 씨 불쌍해~♪」"

[[dialogue]]
speaker = "リーリア"
original = "「かわいそうとか言うなっ！」"
translation = "「불쌍하다고 하지 마!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「胸のサイズはともかく、ずっと制服のままでいるのは居心地が悪いでしょう。服が乾き次第持ってきますので」"
translation = "「가슴 사이즈는 어쨌든, 계속 교복 차림으로 있는 건 불편하시겠죠. 옷이 마르는 대로 가져올 테니까요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ありがとうございます。ですが、わたくしは制服姿でも問題ありませんわ」"
translation = "「감사합니다. 하지만 저는 교복 차림이어도 문제없어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「魔法アカデミーを卒業したのもそれほど昔のことではありませんし、特鉄隊に入隊した今でも学校には通っておりますから」"
translation = "「마법 아카데미를 졸업한 지도 그리 오래되지 않았고, 특철대에 입대한 지금도 학교에 다니고 있으니까요」"

[[dialogue]]
speaker = "リーリア"
original = "「魔法アカデミー？\u3000って何？」"
translation = "「마법 아카데미? 그게 뭐야?」"

[[dialogue]]
speaker = "アイリーン"
original = "「ノルトハウゼンさんの通ってた魔法を教えてくれる学校だよ」"
translation = "「노르트하우젠 씨가 다녔던 마법을 가르쳐주는 학교야」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ハルツ魔法アカデミー、ですわ」"
translation = "「하르츠 마법 아카데미, 랍니다」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「けれど、正直に申し上げますと、わたくし勉強はあまり得意ではないんです」"
translation = "「하지만 솔직히 말씀드리면, 저는 공부를 그리 잘하지 못해요」"

[[dialogue]]
speaker = "リーリア"
original = "「えっ、そうなんですか？\u3000すごく賢そうに見えるんですけど……」"
translation = "「엣, 그런가요? 되게 똑똑해 보이시는데……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「毎日遅くまで補習授業を受けているのですが、フィンチリー教官からは、それでは到底間に合わない、と言われておりますわ」"
translation = "「매일 늦게까지 보충 수업을 받고 있지만, 핀칠리 교관님께서는 그걸로는 도저히 따라갈 수 없다고 말씀하시거든요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「魔法に関することだけでなく、語学、数学、社会学、あらゆる科目において壊滅的な成績ですの」"
translation = "「마법에 관한 것뿐만 아니라 어학, 수학, 사회학, 모든 과목에서 괴멸적인 성적이에요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「壊滅的って……穏やかな口調で言われても」"
translation = "「괴멸적이라니…… 온화한 말투로 말씀하셔도」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「昔からどうにも物覚えがよくないのですわ。一生懸命覚えても、すぐに忘れてしまいますの」"
translation = "「예전부터 유독 암기력이 좋지 않았어요. 열심히 외워도 금방 잊어버리거든요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「一度、パディントンさんにアドバイスを頂いたこともあるのですけど……」"
translation = "「한번은 패딩턴 씨에게 조언을 구한 적도 있었지만……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「パディントンさんというのは？」"
translation = "「패딩턴 씨라는 분은?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「特鉄隊の副官を務めている方ですわ。一度目で見たものはすべて記憶してしまうそうでして」"
translation = "「특철대의 부관을 맡고 계신 분이에요. 한번 눈으로 본 것은 전부 기억해 버린다고 하시더라고요」"

[[dialogue]]
speaker = "アイリーン"
original = "「へぇ～、それはすごいね……そのヒトからはどんなアドバイスをもらったの？」"
translation = "「헤에~, 그거 대단하네…… 그 사람한테는 어떤 조언을 들었어?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ええと……とにかく余計なものを目に入れないこと、だそうです」"
translation = "「그게…… 일단 불필요한 것을 눈에 담지 말 것, 이라고 하셨어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「記憶力を高めるために邪魔なものは排除して、きれいな心で物事と向き合うと『スーパーみこみこゾーン』に突入し最強になれるのだとか……」"
translation = "「기억력을 높이기 위해 방해되는 것은 배제하고, 깨끗한 마음으로 사물을 마주하면 『슈퍼 미코미코 존』에 돌입해서 최강이 될 수 있다나 뭐라나……」"

[[dialogue]]
speaker = "アイリーン"
original = "「余計なものに気を取られないようにする、ってところまでは分かるんだけど……」"
translation = "「불필요한 것에 정신 팔리지 않게 한다는 것까지는 알겠는데……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「『スーパーみこみこゾーン』の辺りから、一気に胡散臭くなりましたね……」"
translation = "「『슈퍼 미코미코 존』 부분부터 갑자기 수상쩍어지네요……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「実はその辺りは、わたくしにもよく分かりませんでした。ですがパディントンさんがおっしゃることなのですから、きっとそういった領域があるのでしょう」"
translation = "「사실 그 부분은 저도 잘 이해하지 못했어요. 하지만 패딩턴 씨가 하시는 말씀이니 분명 그런 영역이 있겠죠」"

[[dialogue]]
speaker = "リーリア"
original = "「ちなみにウェンディさんも記憶力いいですけど、何かコツとかあるんですか？」"
translation = "「그나저나 웬디 씨도 기억력 좋으신데, 뭔가 비결이라도 있나요?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「えっ？\u3000意識していることは特にありませんが、そうですね……」"
translation = "「엣? 딱히 의식하는 건 없습니다만, 글쎄요……」"

[[dialogue]]
speaker = "アイリーン"
original = "「コツ、あるんだ！\u3000どんな方法？\u3000聞かせて聞かせて♪」"
translation = "「비결 있구나! 어떤 방법이야? 들려줘 들려줘♪」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「是非、ご教授頂きたいですわ」"
translation = "「부디 가르침을 받고 싶어요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「物事を記号的に扱うのではなく、現実感のあるものに置き換えて考えてみるんです」"
translation = "「사물을 기호적으로 다루는 게 아니라, 현실감 있는 것으로 치환해서 생각해 보는 겁니다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「例えば何か数字を覚えなくてはならない時、私ならその数字の後に貨幣の単位をつけますね」"
translation = "「예를 들어 어떤 숫자를 외워야 할 때, 저라면 그 숫자 뒤에 화폐 단위를 붙이겠어요」"

[[dialogue]]
speaker = "ウェンディ"
original = "「５３８４５ではなく、５３８４５テルス……ほら、これだけでもう絶対に忘れなくなったでしょう？」"
translation = "「53845가 아니라 53845 텔스…… 보세요, 이것만으로 이제 절대로 잊어버리지 않게 됐죠?」"

[[dialogue]]
speaker = "アイリーン"
original = "「うわぁ……ウェンディさんの悪いトコ出てる……」"
translation = "「우와아…… 웬디 씨의 나쁜 점이 나왔어……」"

[[dialogue]]
speaker = "リーリア"
original = "「それで記憶力が跳ね上がるのは、お金にがめつ……厳しいウェンディさんだけですって～」"
translation = "「그걸로 기억력이 뛰어오르는 건 돈에 밝…… 엄격한 웬디 씨뿐이라구용~」"

[[dialogue]]
speaker = "ウェンディ"
original = "「何とでも言ってください。もし記憶違いをしたせいで１テルスでも損したら大変なことじゃありませんか……そう考えると必死になりませんか？」"
translation = "「뭐라고 하든 상관없습니다. 만약 기억을 잘못한 탓에 1텔스라도 손해를 본다면 큰일 아니겠습니까…… 그렇게 생각하면 필사적이 되지 않나요?」"

[[dialogue]]
speaker = "アイリーン"
original = "「スーパーみこみこゾーンに負けないくらい超謎理論だね～」"
translation = "「슈퍼 미코미코 존에 지지 않을 만큼 엄청난 수수께끼 이론이네~」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ふふっ、とても参考になりましたわ」"
translation = "「후후, 아주 참고가 되었어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ただ単純に単語や数字を覚えようとするのではなく、何か具体的なものを思い浮かべながら覚える……確かにその方が覚えやすいかもしれません」"
translation = "「그저 단순히 단어나 숫자를 외우려 하는 게 아니라, 뭔가 구체적인 것을 떠올리며 외운다…… 확실히 그편이 외우기 쉬울지도 모르겠네요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ありがとうございます、ウェンディさん。わたくし、今なら何でも覚えられそうな気がしてきましたわ♪」"
translation = "「감사합니다, 웬디 씨. 저, 지금이라면 뭐든 외울 수 있을 것 같은 기분이 들어요♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「お力になれたのなら幸いです」"
translation = "「도움이 되었다면 다행입니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「よーし、それじゃ本当にノルトハウゼンさんの記憶力が上がったのか、確かめてみよう！」"
translation = "「좋아, 그럼 정말로 노르트하우젠 씨의 기억력이 좋아졌는지 확인해 보자!」"

[[dialogue]]
speaker = "unk"
original = "それから４人でしばらく記憶力のテストをしてみたのだが、そんなことで簡単に解決するような話ではなく……"
translation = "그 후로 넷이서 한동안 기억력 테스트를 해보았지만, 그런 걸로 간단히 해결될 문제가 아니었고……"

[[dialogue]]
speaker = "unk"
original = "結局、ノルトハウゼンの記憶力は向上しないままに終わったのだった。"
translation = "결국 노르트하우젠의 기억력은 향상되지 않은 채 끝나고 말았다."

