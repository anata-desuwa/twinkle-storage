[[dialogue]]
speaker = "unk"
original = "第３話,あなたの人生,P"
translation = "제3화, 당신의 인생, P"

[[dialogue]]
speaker = "シノ"
original = "「会長さんもお買い物ですか？」"
translation = "「회장님도 쇼핑하러 오셨나요?」"

[[dialogue]]
speaker = "unk"
original = "購買に顔を出すとばったりシノさんと遭遇した。"
translation = "매점에 들르자 딱 시노 씨와 조우했다."

[[dialogue]]
speaker = "シノ"
original = "「ふふ。完全栄養食、在庫を全部買い占めてしまいました」"
translation = "「후후. 완전 영양식, 재고를 전부 사버렸어요」"

[[dialogue]]
speaker = "シノ"
original = "「これを買っている人は私だけのようなので、いっそ全部持っていってくださいと言われたので……」"
translation = "「이걸 사는 사람은 저뿐인 것 같아서, 차라리 전부 가져가 달라고 하길래……」"

[[dialogue]]
speaker = "シノ"
original = "「それより、ここで会長さんに会ったのも何かの縁です。少し付き合ってもらえませんか？」"
translation = "「그보다, 여기서 회장님을 만난 것도 인연인데. 잠시 같이 있어 주시겠어요?」"

[[dialogue]]
speaker = "シノ"
original = "「ん……？\u3000どうしたんですか、私の顔をそんなに見つめて」"
translation = "「응……? 왜 그러세요, 제 얼굴을 그렇게 빤히 쳐다보고」"

[[dialogue]]
speaker = "unk"
original = "凄腕の実業家なんですよね"
translation = "「수완 좋은 사업가였죠?」"

[[dialogue]]
speaker = "unk"
original = "シノさんって……"
translation = "「시노 씨 말이에요……」"

[[dialogue]]
speaker = "シノ"
original = "「ふふ、購買で大人買いしてるところを見てしまったらとてもそうは思えない、でしょうか？」"
translation = "「후후, 매점에서 대량 구매하는 모습을 봐버리면 도저히 그렇게 생각되지 않으려나요?」"

[[dialogue]]
speaker = "シノ"
original = "「自分では凄腕、なんて思ってないんですけど……歳の割には色々な経験をさせてもらっていると思いますよ」"
translation = "「스스로는 수완가라고 생각하지 않지만…… 나이에 비해서는 다양한 경험을 해왔다고 생각해요.」"

[[dialogue]]
speaker = "シノ"
original = "「以前もお話ししましたが、最初は父の会社でした。急逝した父に代わって、ただの学生だった私が経営を引き継ぐことになって……」"
translation = "「이전에도 말씀드렸듯이, 처음에는 아버지의 회사였어요. 갑작스럽게 돌아가신 아버지를 대신해, 그저 학생이었던 제가 경영을 이어받게 되어서……」"

[[dialogue]]
speaker = "シノ"
original = "「大勢の人に助けてもらいながら、なんとか倒産を免れることが出来ました」"
translation = "「많은 분의 도움을 받으면서, 어떻게든 파산은 면할 수 있었답니다.」"

[[dialogue]]
speaker = "unk"
original = "大変だったんですね……"
translation = "고생 많으셨겠네요……"

[[dialogue]]
speaker = "シノ"
original = "「ええ……でも、私は運が良かったんだと思います。出会いに恵まれ、その人たちから沢山の大切な言葉を貰いましたから」"
translation = "「네…… 하지만, 저는 운이 좋았다고 생각해요. 인복이 많아서, 그분들에게서 수많은 소중한 말들을 얻었으니까요.」"

[[dialogue]]
speaker = "シノ"
original = "「そんな大切なものの数々が、今も私の中に、夢への懸け橋として息づいています」"
translation = "「그런 소중한 것들이 지금도 제 안에서 꿈을 향한 가교로서 살아 숨 쉬고 있어요.」"

[[dialogue]]
speaker = "シノ"
original = "「目指していること、やりたいこと、自分の生き方、人生をどう作り上げていくのか……」"
translation = "「지향하는 점, 하고 싶은 일, 자신의 삶의 방식, 인생을 어떻게 만들어 나갈 것인가……」"

[[dialogue]]
speaker = "シノ"
original = "「今ではなく、これからもっと先、自分がどこに向かいたいのか──」"
translation = "「지금이 아니라, 앞으로 더 먼 미래에 자신이 어디로 향하고 싶은가──」"

[[dialogue]]
speaker = "シノ"
original = "「それらと向き合うことの大切さを、これまでの経験から学ばせてもらいました」"
translation = "「그것들과 마주하는 일의 중요성을 지금까지의 경험을 통해 배울 수 있었어요.」"

[[dialogue]]
speaker = "unk"
original = "その経験を活かして学園長に？"
translation = "그 경험을 살려서 학원장이 된 건가요?"

[[dialogue]]
speaker = "シノ"
original = "「……ヘレナさんから新星学園の学園長にという話をいただいたとき、私はとても驚きました」"
translation = "「……헬레나 씨에게 신성학원의 학원장직 제의를 받았을 때, 저는 무척 놀랐어요.」"

[[dialogue]]
speaker = "シノ"
original = "「経験もまだまだ足りない、前学園長のような名声も力も持ち合わせていない、皆を導くような強いカリスマ性も指導力もあるわけでもない」"
translation = "「경험도 한참 부족하고, 전 학원장님 같은 명성이나 힘도 갖추지 못했고, 모두를 이끌 만한 강력한 카리스마나 지도력이 있는 것도 아니니까요.」"

[[dialogue]]
speaker = "シノ"
original = "「ヘレナさんはなぜ、こんな私を学園長に推薦したのか──」"
translation = "「헬레나 씨는 왜 이런 저를 학원장으로 추천했을까──」"

[[dialogue]]
speaker = "シノ"
original = "「それは……もしかしたら私が大切にしている、この夢と向き合う姿勢を評価して下さったのかもしれません」"
translation = "「그건…… 어쩌면 제가 소중히 여기는, 이 꿈과 마주하는 자세를 높게 평가해 주신 걸지도 몰라요.」"

[[dialogue]]
speaker = "シノ"
original = "「そしてそれが、新星学園の学園長として必要なものだとお考えなのかも……」"
translation = "「그리고 그것이 신성학원의 학원장으로서 필요한 것이라고 생각하신 걸지도……」"

[[dialogue]]
speaker = "シノ"
original = "「だから私は、リクリエという脅威にさらされ続ける星騎士のみなさんが、今を精一杯生きるだけでなく、未来に夢を抱けるように──そう思っています」"
translation = "「그래서 저는, 리크리에라는 위협에 계속 노출되어 있는 성기사 여러분이 지금을 최선을 다해 살 뿐만 아니라, 미래에 꿈을 품을 수 있도록── 그렇게 생각하고 있어요.」"

[[dialogue]]
speaker = "シノ"
original = "「それが新星学園の学園長として私がどうしても成し遂げたい『夢』です」"
translation = "「그것이 신성학원의 학원장으로서 제가 꼭 이루고 싶은 『꿈』이에요.」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます"
translation = "고마워요."

[[dialogue]]
speaker = "unk"
original = "俺たちのことをそんな風に……"
translation = "우리들을 그런 식으로 생각해 주다니……"

[[dialogue]]
speaker = "シノ"
original = "「いえいえ！\u3000これは私が勝手に思っていることですから！\u3000むしろお節介過ぎるかな、とも……」"
translation = "「아뇨아뇨! 이건 제가 멋대로 생각하는 거니까요! 오히려 참견이 너무 심한 건가 싶기도……」"

[[dialogue]]
speaker = "シノ"
original = "「けれど、私が命がけで戦う星騎士に出来る、１番の手助けだと思っています」"
translation = "「하지만 제가 목숨 걸고 싸우는 성기사분들에게 해줄 수 있는 가장 큰 도움이라고 생각해요.」"

[[dialogue]]
speaker = "シノ"
original = "「追い詰められ、窮地に立たされた時、支えになってくれるのはきっとそういうものなんです」"
translation = "「한계에 몰리고 궁지에 처했을 때, 지탱해 주는 건 분명 그런 것들이거든요.」"

[[dialogue]]
speaker = "シノ"
original = "「以前に会長さんからは理想を伺いましたね？」"
translation = "「예전에 회장님께 이상에 대해 들었었죠?」"

[[dialogue]]
speaker = "シノ"
original = "「その時会長さんは──世界を守りたい。たとえ手の届かないところに居る人でも、精一杯手を伸ばして──と答えてくださいました」"
translation = "「그때 회장님은── 세계를 지키고 싶다. 설령 손이 닿지 않는 곳에 있는 사람이라도, 온 힘을 다해 손을 뻗어서── 라고 대답해 주셨어요.」"

[[dialogue]]
speaker = "シノ"
original = "「その決意と覚悟、素晴らしいものだと思います」"
translation = "「그 결의와 각오, 정말 훌륭하다고 생각해요.」"

[[dialogue]]
speaker = "シノ"
original = "「ではその先は？\u3000その先に何がしたい、という夢はお持ちですか？」"
translation = "「그럼 그 이후는요? 그 이후에 무엇을 하고 싶다는 꿈을 가지고 계시나요?」"

[[dialogue]]
speaker = "シノ"
original = "「将来こうなりたいな、とか、こんな人間になりたいな、とかそんなあやふやなものでも構いません。そんな夢を会長さんは持っていますか？」"
translation = "「장래에 이렇게 되고 싶다거나, 이런 사람이 되고 싶다거나 하는 막연한 것이라도 상관없어요. 그런 꿈을 회장님은 가지고 계시나요?」"

[[dialogue]]
speaker = "unk"
original = "具体的には、特に……"
translation = "구체적으로는 딱히……"

[[dialogue]]
speaker = "シノ"
original = "「会長さんは背負うものが沢山あって精一杯ですから、特に難しいのかもしれませんね……」"
translation = "「회장님은 짊어진 것이 많아서 여유가 없으시니, 특히 더 어려울지도 모르겠네요……」"

[[dialogue]]
speaker = "シノ"
original = "「でも、守るべきものの大きさに圧し潰されて、自分の夢を抱くことを忘れてしまう、そんな人生を送って欲しくないんです」"
translation = "「하지만 지켜야 할 것들의 크기에 짓눌려서, 자신의 꿈을 품는 것을 잊어버리는 그런 인생을 보내지 않으셨으면 해요.」"

[[dialogue]]
speaker = "シノ"
original = "「もしかしたらこれは、あなたに余計な重荷を背負わせてしまうことなのかもしれません……」"
translation = "「어쩌면 이건 당신에게 불필요한 짐을 지워버리는 일일지도 모르겠네요……」"

[[dialogue]]
speaker = "シノ"
original = "「今が精一杯だと、そんなことを考えている余裕すらなくなってしまいますから」"
translation = "「지금을 사는 것만으로도 벅차면 그런 걸 생각할 여유조차 없어져 버리니까요.」"

[[dialogue]]
speaker = "シノ"
original = "「会長さんの抱えるものの大きさとは比べられないかもしれませんが、私も同じような状態になってしまったことがあります」"
translation = "「회장님이 짊어지신 크기와는 비교할 수 없을지도 모르지만, 저도 비슷한 상태가 된 적이 있어요.」"

[[dialogue]]
speaker = "シノ"
original = "「その頃の私は、父の会社を守るために必死でした。それこそ夢を抱いている余裕すらないほどに」"
translation = "「그 당시의 저는 아버지의 회사를 지키기 위해 필사적이었죠. 그야말로 꿈을 품을 여유조차 없을 정도로요.」"

[[dialogue]]
speaker = "シノ"
original = "「何度も重圧に潰されそうになりました。けれど、そんな私を心配した方々が揃って声をかけてくれたんです」"
translation = "「몇 번이나 중압감에 무너질 뻔했어요. 하지만 그런 저를 걱정해 주시던 분들이 다 같이 말을 걸어주셨어요.」"

[[dialogue]]
speaker = "シノ"
original = "「自分の人生を生きなさい、と」"
translation = "「자신의 인생을 살라고요.」"

[[dialogue]]
speaker = "シノ"
original = "「その言葉をかけてくださったのは、私が必死で守ろうとしていた従業員の皆さんでした」"
translation = "「그 말을 해주신 분들은 제가 필사적으로 지키려 했던 종업원 여러분이었어요.」"

[[dialogue]]
speaker = "シノ"
original = "「私はなぜ、私が守ろうとしている人たちからこんなにも心配されてしまっているんだろう。とても不思議な気持ちになりました」"
translation = "「나는 왜 내가 지키려 하는 사람들에게 이렇게까지 걱정을 사고 있는 걸까. 정말 신기한 기분이 들었죠.」"

[[dialogue]]
speaker = "シノ"
original = "「そして私は、自分のことを顧みて……今にも折れてしまいそうな弱々しい小枝のような心を見つけました」"
translation = "「그리고 저는 제 자신을 돌아보았고…… 금방이라도 꺾여버릴 듯한 가냘픈 나뭇가지 같은 마음을 발견했어요.」"

[[dialogue]]
speaker = "シノ"
original = "「それからです。どんなに苦しくても、余裕がない時でも、自分の夢とは何か……それと常に向き合うようになったのは」"
translation = "「그때부터예요. 아무리 괴로워도, 여유가 없을 때라도 나의 꿈이란 무엇인가…… 그것과 항상 마주하게 된 것은.」"

[[dialogue]]
speaker = "unk"
original = "そうすることで強くなれたんですね？"
translation = "그렇게 함으로써 강해질 수 있었던 거군요?"

[[dialogue]]
speaker = "シノ"
original = "「はい。気が付けば、抱えていた重荷を、重荷と感じなくなっていました」"
translation = "「네. 어느샌가 짊어지고 있던 짐을 더 이상 짐으로 느끼지 않게 되었어요.」"

[[dialogue]]
speaker = "シノ"
original = "「それだけ心が、強く育ってくれたのだと思っています」"
translation = "「그만큼 마음이 강하게 자라준 것이라고 생각해요.」"

[[dialogue]]
speaker = "シノ"
original = "「だからみなさんにも──会長さん、あなたにも自身を支えてくれる強い夢を抱いて欲しいと思っているんです」"
translation = "「그러니 여러분에게도── 회장님, 당신에게도 자신을 지탱해 줄 강한 꿈을 품으셨으면 해요.」"

[[dialogue]]
speaker = "シノ"
original = "「あなたが守り切った先にある、あなただけの未来を……描いた未来は、きっとあなたを支えてくれるはずですから」"
translation = "「당신이 끝까지 지켜낸 뒤에 있을 당신만의 미래를…… 그려낸 미래는 분명 당신을 지탱해 줄 테니까요.」"

[[dialogue]]
speaker = "シノ"
original = "「すみません、いきなりこんな事を語られても困ってしまいますよね」"
translation = "「죄송해요, 갑자기 이런 이야기를 해서 당황스러우시죠.」"

[[dialogue]]
speaker = "シノ"
original = "「でも、私の想いは会長さんに伝えておきたくて……話を聞いてくださってありがとうございました」"
translation = "「하지만 제 마음을 회장님께 전해두고 싶어서…… 이야기를 들어주셔서 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "すごく貴重なお話でした"
translation = "정말 귀중한 이야기였어요."

[[dialogue]]
speaker = "unk"
original = "とんでもないです"
translation = "천만예요."

[[dialogue]]
speaker = "シノ"
original = "「な、何だか恥ずかしくなってきてしまいました……やはりお節介が過ぎますね」"
translation = "「와, 왠지 부끄러워지기 시작했어요…… 역시 참견이 과했네요.」"

[[dialogue]]
speaker = "シノ"
original = "「こういった話になるとつい熱が入ってしまうのは悪い癖です……」"
translation = "「이런 이야기가 나오면 나도 모르게 열을 올리는 건 나쁜 버릇이에요……」"

[[dialogue]]
speaker = "unk"
original = "それは、それだけシノさんが学園のみんなのことを真剣に考えてくれているからだろう。"
translation = "그건 그만큼 시노 씨가 학원 모두를 진심으로 생각해주고 있기 때문이겠지."

[[dialogue]]
speaker = "unk"
original = "照れ臭そうに頬をかく姿を見つめながら、理事長の人選が間違いのないものだったことを感じるのだった。"
translation = "수줍은 듯 뺨을 긁는 모습을 지켜보며, 이사장의 인선이 틀림없었음을 느끼는 것이었다."

