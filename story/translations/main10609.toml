[[dialogue]]
speaker = "unk"
original = "第９話,第９話『寂しかったのだ』,B"
translation = "제9화 『외로웠느니라』"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──あっはっは、余を捕らえられるものなら捕らえてみるがよい！」"
translation = "「──앗하하, 짐을 붙잡을 수 있다면 붙잡아 보거라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余の浮遊魔法にかかれば……ふっ！\u3000このスピードで空を翔けるなど、容易いものよ──！」"
translation = "「짐의 부유 마법에 걸리면…… 훗! 이 스피드로 하늘을 나는 것쯤은, 쉬운 일이니라──!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──待つのです！」"
translation = "「──기다리세요!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「嫌だ！\u3000まだまだ世間はクリスマスムード──余はこれが気に食わんのだー！」"
translation = "「싫도다! 아직 세상은 크리스마스 분위기── 짐은 이것이 마음에 들지 않는단 말이노라!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「速い……！\u3000見失わないだけで精一杯です──」"
translation = "「빨라……! 놓치지 않는 것만으로도 벅차요──」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「それにクラウディア様の飛んだ跡──飛行機雲みたいにキラキラ光って、すごい綺麗です……」"
translation = "「게다가 클라우디아 님이 날아간 흔적── 비행기 구름처럼 반짝반짝 빛나서, 정말 예뻐요……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──ふっふーん！\u3000クラウディア様のお通りだ！\u3000余が街中にイルミネーションを振りまいてやるぞ～！」"
translation = "「──훗후운! 클라우디아 님 지나가신다! 짐이 거리 곳곳에 일루미네이션을 뿌려주겠노라~!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「くっ──こんな街中で、光の魔法を使うなど……！」"
translation = "「큭── 이런 거리 한복판에서, 빛의 마법을 쓰다니……!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「やっぱりクラウディア様を自由にさせておくと危険です──」"
translation = "「역시 클라우디아 님을 자유롭게 놔두면 위험해요──」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ちょっとツェツィーリエ！\u3000黙って見てないで手伝いなさい！\u3000こうなったのもあなたのせいなんですよ！」"
translation = "「잠깐 체칠리에! 가만히 보고만 있지 말고 도와줘요! 이렇게 된 것도 당신 탓이라니까요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「いやー、アタシはただクラウディア様のことを想ってやっただけだからさぁ。ねえ？」"
translation = "「이런~, 저는 그저 클라우디아 님을 생각해서 한 일이니까 말이에요. 그쵸?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あなたというヒトはーーーっ！！！」"
translation = "「당신이라는 사람은──!!!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──よし、追い詰めたぞ」"
translation = "「──좋아, 막다른 곳으로 몰았다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「これで観念してくれますね」"
translation = "「이제 단념해 주시겠죠」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「く……！」"
translation = "「큭……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫様。帰りましょう」"
translation = "「공주님. 돌아갑시다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ま、まあ──そうぷりぷりするでない。お主らの欲しいものも余がプレゼントしてやるぞ」"
translation = "「뭐, 뭐── 그렇게 뾰로통해하지 말거라. 네놈들이 원하는 것도 짐이 선물해 주겠노라」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「えっ……？」"
translation = "「엣……?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「欲しいもの……？」"
translation = "「원하는 것……?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「あれがアタシの『ホーリー・ベル』の真価なんだ。相手の欲しいものをなんでも引き出してくれるのさ～」"
translation = "「저게 저의 『홀리 벨』의 진가라구요. 상대가 원하는 것을 뭐든지 끌어내 주는 거지요~」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「なんてものを作ってるんですか……！」"
translation = "「대체 뭘 만든 건가요……!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「これがまた会心の発明でねえ、まだまだ改善の余地が多いとはいえ、試作としちゃ上等なのさ」"
translation = "「이게 또 회심의 발명이라서 말이죠, 아직 개선의 여지가 많긴 하지만 시제품치고는 훌륭하다구요」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「まあ、クラウディア様による光の魔力がないと成り立たないのが難点なんだけどね」"
translation = "「뭐, 클라우디아 님의 빛의 마력이 없으면 성립되지 않는다는 게 난점이지만」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふむ。確かに可能性は感じる発明品だ。後で報告書と、今回の件の始末書を提出してくれ」"
translation = "「흠. 확실히 가능성이 느껴지는 발명품이군. 나중에 보고서와, 이번 건에 대한 시말서를 제출하도록」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「……え、これってアタシの不始末？」"
translation = "「……에, 이거 저의 잘못인 거에요?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そーれっ！\u3000メリークラウディアバースデ～！」"
translation = "「자아~! 메리 클라우디아 버스데이~!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「５００テルス貯金箱……もしかして、節約グッズのつもりでしょうか？」"
translation = "「500테루스 저금통…… 설마, 절약 굿즈라는 생각일까요?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「唐辛子のスナック……まあ、確かに今は激辛の気分だったが。これしきの辛さでは足りんな──ポリポリ」"
translation = "「고추 스낵…… 뭐, 확실히 지금은 매운 게 당기긴 했다만. 이 정도 맵기로는 부족하도다── 오독오독」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「しっかり食べちゃってるし～」"
translation = "「제대로 먹고 있네~」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「っと、今の隙に──ＧＯだっ！」"
translation = "「앗, 지금 틈을 타서── GO로다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「っ、しまった！」"
translation = "「윽, 실수했다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「追いかけます──！」"
translation = "「쫓아가겠습니다──!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふう、ふう……中々しつこい追っ手どもだ」"
translation = "「후우, 후우…… 제법 끈질긴 추격자들이로다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──そうだ。そういえばちぇちゅーりえのやつ、この杖にまだまだ機能があると言っていたな」"
translation = "「──맞다. 그러고 보니 체츄링코 녀석이, 이 지팡이에 아직 기능이 더 있다고 했었지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「確か空飛ぶソリが出せるとかどうとか……えいっ！」"
translation = "「분명 하늘을 나는 썰매를 꺼낼 수 있다든가 뭐라든가…… 에잇!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──おお！\u3000本当に出てきたぞ！\u3000これに乗って──と」"
translation = "「──오오! 정말로 나왔도다! 여기에 올라타고──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そういえば、余は本来のソリも乗ったことがなかったが……まあよい、かっとばせ！」"
translation = "「그러고 보니, 짐은 원래 썰매도 타본 적이 없었지만…… 뭐 좋도다, 달려라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「わはは！\u3000すごい速さで空を滑っていくぞ！\u3000これは面白い！」"
translation = "「와하하! 엄청난 속도로 하늘을 미끄러져 가는구나! 이거 재미있도다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「後は……なんの機能があるのやらわからんな。とりあえずもっと杖を振ってみよう。えい、えいっ──！」"
translation = "「다음은…… 무슨 기능이 있는지 모르겠군. 일단 지팡이를 더 휘둘러 보자. 에잇, 에잇──!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あれは……！？\u3000クラウディア様がソリに乗って、雪を降らしながら空を飛んでる──！」"
translation = "「저건……!? 클라우디아 님이 썰매를 타고, 눈을 뿌리면서 하늘을 날고 있어──!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ホーリー・ベルのギミックをフルに使ってる！\u3000さすがクラウディア様、試用運転もばっちりだね～」"
translation = "「홀리 벨의 기믹을 풀로 쓰고 있어! 역시 클라우디아 님, 시운전도 완벽하네요~」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「しかもなんか地上に七面鳥が大量発生してるんですけど！？」"
translation = "「게다가 왠지 지상에 칠면조가 대량 발생하고 있는데요!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「七面鳥生成の隠し呪文まで……やるね、クラウディア様」"
translation = "「칠면조 생성 숨겨진 주문까지…… 제법인데, 클라우디아 님」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「どうしてそんな余計な機能ばっかりつけたんですかー！」"
translation = "「어째서 그런 쓸데없는 기능만 잔뜩 넣은 건가요!」"

[[dialogue]]
speaker = "unk"
original = "魔女たちは追いかけっこを繰り返したのち、やがて元の場所まで戻ってきた。"
translation = "마녀들은 추격전을 반복한 끝에, 이윽고 원래 장소로 돌아왔다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふぅ……なんとか撒ききったぞ。まさかここに戻ってきているとは思うまい」"
translation = "「후우…… 겨우 따돌렸노라. 설마 이곳으로 돌아왔을 줄은 꿈에도 모르겠지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「しかし、さすがの余も疲れてきたな……」"
translation = "「하지만, 아무리 짐이라도 피곤해지는구나……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──そこまでです。姫様」"
translation = "「──거기까지입니다. 공주님」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「！？\u3000も、もう追いついてきたのか」"
translation = "「!? 버, 벌써 따라잡은 것이냐」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「く──なら、こっちに逃げて──！」"
translation = "「큭── 그렇다면, 이쪽으로 도망쳐서──!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふふ……残念ながら」"
translation = "「후후후…… 안타깝게도」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「な……っ！」"
translation = "「뭐…… 엇!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「お、お主は九浄家の──それだけではない。メイド連中までどうして余の待ち伏せを……！」"
translation = "「네, 네놈은 쿠죠 가문의── 그뿐만이 아니로다. 메이드 녀석들까지 어째서 짐을 기다리고 있는 것이냐……!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「九浄家メイド隊による出迎えだ。こんな機会はそうそうないのだぞ」"
translation = "「쿠죠 가문 메이드 부대의 마중이다. 이런 기회는 흔치 않느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「挟み撃ちだとぉ……ぐう、ずるいぞ！\u3000応援まで呼んでいるとは！」"
translation = "「협공이라니…… 구우, 치사하도다! 응원군까지 부르다니!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ヘレナ殿には今回の事情を話して人手を貸してもらった」"
translation = "「헬레나 공에게 이번 사정을 이야기하고 인력을 빌렸습니다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「なんの、カジノ荒らしを捕らえるためだ。こちらも惜しみなく協力させてもらう」"
translation = "「무슨 소리냐, 카지노 털이를 잡기 위해서다. 이쪽도 아낌없이 협력하도록 하마」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「卑怯な連中だ！」"
translation = "「비겁한 녀석들이로다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「今度こそ逃げられませんよ、姫様」"
translation = "「이번에야말로 도망칠 수 없어요, 공주님」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぐぅぅ……もう杖を振っても何も出てこなくなってしまった。ここが潮時か」"
translation = "「구우우…… 이제 지팡이를 휘둘러도 아무것도 나오지 않게 되었노라. 여기가 끝인가」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ふう……やっと降参する気になってくれましたか」"
translation = "「후우…… 겨우 항복할 마음이 드셨나요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫様──そもそも、なぜ人々にプレゼントを配りたがるのです？」"
translation = "「공주님── 애초에, 왜 사람들에게 선물을 나눠주려 하시는 겁니까?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「サンタを<ruby>凌<rt>しの</rt></ruby>ぐためだ！」"
translation = "「산타를 능가하기 위해서니라!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「サンタを──凌ぐ？」"
translation = "「산타를── 능가한다고?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だって、世の連中はクリスマスに夢中で余のことなどちっとも気にかけておらん」"
translation = "「그게, 세상 녀석들은 크리스마스에 열중해서 짐 따위는 조금도 신경 쓰지 않는단 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「１２月２５日は年に一度しかない余の誕生日だというのに……余も皆にたくさん祝われたいのだ！」"
translation = "「12월 25일은 일 년에 한 번뿐인 짐의 생일인데도…… 짐도 모두에게 잔뜩 축하받고 싶단 말이노라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「それなのに皆クリスマス、クリスマスと……セドナ達とて、余の誕生日など忘れていたではないか！」"
translation = "「그런데도 다들 크리스마스, 크리스마스라고…… 세드나 네놈들조차, 짐의 생일 따위 잊고 있지 않았느냐!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「む……？」"
translation = "「음……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「最近は全然余にかまってくれぬ！\u3000せっかくの誕生日が、クリスマスなんぞに負けるのは嫌なのだ～！」"
translation = "「요즘은 전혀 짐을 상대해 주지 않지 않느냐! 공들인 생일이, 크리스마스 따위에 지는 건 싫단 말이노라~!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「やれやれ……」"
translation = "「이런 이런……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「クラウディア様……そんな思いがあったなんて……」"
translation = "「클라우디아 님…… 그런 마음이 있으셨다니……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「けなげだよねぇ」"
translation = "「기특하네」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫様。クリスマスはあくまで人間界のイベントなのですから、張り合う必要はありません」"
translation = "「공주님. 크리스마스는 어디까지나 인간계의 이벤트니까, 경쟁할 필요는 없습니다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それに我々はみなちゃんと覚えています。姫様の誕生日を忘れるはずがないでしょう」"
translation = "「게다가 저희는 모두 제대로 기억하고 있습니다. 공주님의 생일을 잊을 리가 없지 않습니까」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「本当か……？」"
translation = "「정말이냐……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「でも、最近は余もひとりで過ごすことが多かったぞ……」"
translation = "「하지만, 요즘은 짐도 혼자 보내는 일이 많았노라……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「これは……」"
translation = "「이건……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はあ……仕方ないな。まだ隠しておくつもりだったが」"
translation = "「하아…… 어쩔 수 없군. 아직 숨겨둘 생각이었지만」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ええ。こんなに寂しがらせてしまっていたのなら、しょうがありません」"
translation = "「네. 이렇게나 외롭게 해드렸다면, 어쩔 수 없네요」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──一緒に来てください、姫様」"
translation = "「──함께 가시죠, 공주님」"

