[[dialogue]]
speaker = "unk"
original = "第１話,お姉ちゃんな彼女,P"
translation = "제1화, 누나인 여자친구, P"

[[dialogue]]
speaker = "unk"
original = "サーシャさんと恋人になってから、彼女は前よりも更に世話を焼いてくれるようになっていた――"
translation = "사샤 씨와 연인이 되고 나서, 그녀는 전보다 더욱 살뜰히 보살펴 주게 되었다――"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん、そこの数式は途中まで解いたら、違うやり方……そう、さっきまでとは逆パターンで答えが見えて来るはずよ」"
translation = "「회장군, 그 수식은 중간까지 풀었으면, 다른 방식…… 그래, 아까까지와는 반대 패턴으로 답이 보일 거야」"

[[dialogue]]
speaker = "unk"
original = "ああ、なるほど！"
translation = "아아, 그렇구나!"

[[dialogue]]
speaker = "サーシャ"
original = "「解けそう？\u3000なら、良かったわ～♪」"
translation = "「풀 수 있겠어? 그럼 다행이네~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「――うふふ♪\u3000お礼なんていいのよ。私が好きで勉強を見ているだけだから♪」"
translation = "「――우후후♪ 답례는 됐어. 내가 좋아서 공부를 봐주는 것뿐이니까♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら？\u3000どうしたの、落ち着かない顔をして？」"
translation = "「어라? 왜 그래, 안절부절못하는 얼굴을 하고?」"

[[dialogue]]
speaker = "サーシャ"
original = "「――周りの視線が気になる？\u3000ああ、こうして私が、会長くんとぴったりくっ付いているからかしら？」"
translation = "「――주변의 시선이 신경 쓰여? 아아, 이렇게 내가 회장군이랑 딱 붙어 있어서 그럴까?」"

[[dialogue]]
speaker = "unk"
original = "嬉しいけど、ちょっと恥ずかしいです"
translation = "기쁘지만, 조금 부끄러워요"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ♪\u3000そうなのね～。でも、周りの人って言っても、ちらほらとしかいない感じだし……」"
translation = "「후훗♪ 그렇구나~. 하지만 주변 사람이라고 해도 띄엄띄엄밖에 없는 느낌이고……」"

[[dialogue]]
speaker = "サーシャ"
original = "「何より、恋人ならこれくらい、普通の距離じゃない？」"
translation = "「무엇보다, 연인이라면 이 정도는 보통 거리 아니야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「それに２人きりの時はもっと――」"
translation = "「게다가 둘만 있을 때는 더――」"

[[dialogue]]
speaker = "サーシャ"
original = "「……お姉ちゃんと色々密着して、イチャイチャしてるじゃない？」"
translation = "「……누나랑 이것저것 밀착해서, 꽁냥꽁냥하고 있잖아?」"

[[dialogue]]
speaker = "unk"
original = "こ、ここは学園なので……！"
translation = "여, 여기는 학원이니까……!"

[[dialogue]]
speaker = "サーシャ"
original = "「は～い<emoji=heart04>\u3000公共の場では、あくまで先輩と後輩として、よね？\u3000分かってるわ」"
translation = "「네~에<emoji=heart04> 공공장소에서는 어디까지나 선배와 후배로서, 지? 알고 있어」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、勉強を教えるにあたって、少～しだけ距離が近くなっちゃうのは仕方ないわよね？\u3000うふふっ<emoji=heart04>」"
translation = "「하지만 공부를 가르쳐 주면서, 조~금 거리가 가까워지는 건 어쩔 수 없지 않겠어? 우후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから引き続き勉強を見て貰って、問題を解いて行くのだが――"
translation = "그 뒤로 계속해서 공부를 지도받으며 문제를 풀어 나갔는데――"

[[dialogue]]
speaker = "サーシャ"
original = "「――うん、よく出来ました♪\u3000会長くんにはまた、正解のご褒美をあげないとね～♪」"
translation = "「――응, 잘했어요♪ 회장군에게는 또 정답 포상을 줘야겠네~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃんが頭をナデナデしちゃうわ♪\u3000よしよし、いいこいいこ～♪」"
translation = "「누나가 머리를 쓰다듬어 줄게♪ 착하다 착해~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「――残念、今度は惜しいけど、不正解よ。会長くんには罰として……」"
translation = "「――아쉽네, 이번엔 아깝지만 오답이야. 회장군에게는 벌로서……」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃんの膝枕の刑よ。はい、いらっしゃ～い♪」"
translation = "「누나의 무릎베개 형이야. 자, 이리 오렴~♪」"

[[dialogue]]
speaker = "unk"
original = "えっと……どっちもご褒美では？"
translation = "저기…… 둘 다 포상 아닌가요?"

[[dialogue]]
speaker = "サーシャ"
original = "「そう？\u3000不正解の時は、次は頑張りましょうね～って叱咤激励のつもりなんだけど……」"
translation = "「그래? 오답일 때는 다음엔 힘내자~ 라며 질타 격려할 생각이었는데……」"

[[dialogue]]
speaker = "サーシャ"
original = "「――どっちにしても甘々過ぎて、先輩と後輩の関係を超えちゃってる？」"
translation = "「――어느 쪽이든 너무 달콤해서, 선배와 후배 관계를 넘어버렸나?」"

[[dialogue]]
speaker = "サーシャ"
original = "「う～ん、恋人になってから、会長くんがますます可愛く思えて、ついつい甘えさせたくなっちゃうのよね～」"
translation = "「으~음, 연인이 되고 나서 회장군이 점점 더 귀엽게 느껴져서, 그만 응석 부리게 하고 싶어진단 말이지~」"

[[dialogue]]
speaker = "unk"
original = "恋人というより、姉と弟のような……"
translation = "연인이라기보다, 누나와 남동생 같은……"

[[dialogue]]
speaker = "サーシャ"
original = "「そこは……だって、お姉ちゃんしたくなっちゃうんだもの♪」"
translation = "「그건…… 그치만, 누나 노릇을 하고 싶은걸♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「それに、会長くんの弟君成分を補給しないと、お姉ちゃん生きていけないわ～」"
translation = "「게다가 회장군의 남동생 성분을 보충하지 않으면, 누나는 살아갈 수 없어~」"

[[dialogue]]
speaker = "サーシャ"
original = "「それとも……私がお姉ちゃんみたいな接し方をするの、会長くんは嫌だった……？」"
translation = "「아니면…… 내가 누나처럼 대하는 거, 회장군은 싫었어……?」"

[[dialogue]]
speaker = "unk"
original = "サーシャお姉ちゃんは、好きですよ"
translation = "사샤 누나는, 좋아요"

[[dialogue]]
speaker = "サーシャ"
original = "「～～～<emoji=heart04>\u3000そんなこと言われたら、お姉ちゃん、胸がキュンってなっちゃうわ<emoji=heart04>」"
translation = "「~~~<emoji=heart04> 그런 말을 들으면 누나, 가슴이 큥 하고 뛰어버려<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん、ありがとう。そんな優しい会長くんだから、私、自然体でいられるの」"
translation = "「회장군, 고마워. 그런 다정한 회장군이니까, 나, 자연스럽게 있을 수 있는 거야」"

[[dialogue]]
speaker = "サーシャ"
original = "「凄く感謝してるのよ？\u3000だから会長くんも遠慮せず、お姉ちゃんにいっぱい甘えて頂戴<emoji=heart04>」"
translation = "「정말 감사하고 있어. 그러니까 회장군도 사양 말고 누나한테 잔뜩 응석 부리렴<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「それに――」"
translation = "「그리고――」"

[[dialogue]]
speaker = "サーシャ"
original = "「付き合い始めたばかりの頃は、確かに可愛い弟が出来たようにも感じてたけれど……今はちゃんと、恋人だって実感してるのよ？」"
translation = "「사귀기 시작한 초기에는 확실히 귀여운 남동생이 생긴 것처럼 느끼기도 했지만…… 지금은 제대로 연인이라고 실감하고 있어?」"

[[dialogue]]
speaker = "サーシャ"
original = "「実際に、こうして人前でも気持ちを抑えきれないくらいだもの……<emoji=heart04>」"
translation = "「실제로 이렇게 사람들 앞에서도 마음을 억누를 수 없을 정도인걸……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほら、耳に息吹きかけて……ふぅ～っ……<emoji=heart04>\u3000うふっ……ぴくって反応した……<emoji=heart04>」"
translation = "「자, 귀에 입김을 불어서…… 후우~……<emoji=heart04> 우훗…… 움찔하고 반응했다……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「それからこうして、太ももスリスリしたり……顔も赤くなって……ふふっ、会長くん、ドキドキしてる？\u3000かわいい～♪」"
translation = "「그리고 이렇게 허벅지를 부비부비하거나…… 얼굴도 빨개지고…… 후훗, 회장군, 두근거려? 귀여워~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「うん？\u3000な～に、どうしたの……？\u3000お姉ちゃんに甘えたい気分になって来ちゃった……？\u3000じゃあ――」"
translation = "「응? 뭐~야, 왜 그래……? 누나한테 응석 부리고 싶은 기분이 되어버렸어……? 그럼――」"

[[dialogue]]
speaker = "サーシャ"
original = "「勉強終わったら、そのあと私のお部屋でイチャイチャしちゃう？」"
translation = "「공부 끝나면 그 뒤에 내 방에서 꽁냥꽁냥할까?」"

[[dialogue]]
speaker = "unk"
original = "頑張って勉強終わらせます！"
translation = "열심히 공부 끝내겠습니다!"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、うふふ♪\u3000男の子ね～」"
translation = "「어머어머, 우후후♪ 남자애네~」"

[[dialogue]]
speaker = "サーシャ"
original = "「……いっぱい正解したら、お姉ちゃんもっと凄いご褒美あげちゃうから、頑張って<emoji=heart04>」"
translation = "「……잔뜩 정답 맞히면, 누나가 더 대단한 포상 줄 테니까 힘내<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘々なご褒美につられて、めちゃくちゃ勉強が進んでしまう俺なのだった――"
translation = "달콤한 포상에 이끌려, 엄청나게 공부 진도가 나가버리는 나였다――"

