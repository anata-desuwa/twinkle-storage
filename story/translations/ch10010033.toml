[[dialogue]]
speaker = "unk"
original = "第３話,ウェディングモデル？,P"
translation = "제3화, 웨딩 모델?, P"

[[dialogue]]
speaker = "フィオナ"
original = "「実は、先日お世話になった結婚式場の方に、広告のモデルになってくれないかとお願いされまして……」"
translation = "「실은, 요전에 신세를 졌던 결혼식장 분께, 광고 모델이 되어주지 않겠냐고 부탁을 받아서요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「いろいろとご迷惑をおかけしましたから、私としてはやぶさかではないのですが……緋宮会長がお嫌ならもちろん断っていただいてかまいません。いかがでしょう？」"
translation = "「여러모로 폐를 끼쳤으니까, 저로서는 마다할 이유가 없지만…… 히노미야 회장이 싫으시다면 물론 거절하셔도 괜찮아요. 어떠신가요?」"

[[dialogue]]
speaker = "unk"
original = "やりたい！"
translation = "하고 싶다!"

[[dialogue]]
speaker = "フィオナ"
original = "「即決！？」"
translation = "「즉시 결정!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「そんなに前のめりになっていただけるとは予想外でしたが、緋宮会長がそう仰るなら、承諾の返事をしておきますね」"
translation = "「그렇게 적극적으로 나서 주실 줄은 예상 밖이었지만, 히노미야 회장이 그렇게 말씀하신다면, 승낙의 답장을 해 둘게요」"

[[dialogue]]
speaker = "unk"
original = "数日後、準備が整ったと連絡があり、以前使わせてもらった結婚式場へ向かった。"
translation = "며칠 후, 준비가 되었다는 연락이 와서, 이전에 사용했던 결혼식장으로 향했다."

[[dialogue]]
speaker = "フィオナ"
original = "「これから私たちは、結婚式を挙げる新郎新婦になって、写真を撮ってもらいます」"
translation = "「이제부터 저희는, 결혼식을 올리는 신랑 신부가 되어, 사진을 찍게 됩니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「結婚式のふりは前もしましたけど、やっぱり照れますね……」"
translation = "「결혼식 흉내는 전에도 했지만, 역시 부끄럽네요……」"

[[dialogue]]
speaker = "unk"
original = "ウェディングドレス、何度見ても似合ってるよ"
translation = "웨딩드레스, 몇 번을 봐도 잘 어울려"

[[dialogue]]
speaker = "フィオナ"
original = "「──！\u3000うぅ、ずるいです……あなたはいつもいつも、私が嬉しくなるようなことばかり言って……」"
translation = "「──! 으으, 치사해요…… 당신은 언제나 언제나, 제가 기뻐할 만한 말만 하고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「大人っぽくて綺麗？\u3000白が清楚なフィオナに合っている？\u3000もう、褒め殺しですね……」"
translation = "「어른스러워 보이고 예쁘다고요? 흰색이 청초한 피오나에게 잘 어울린다고요? 정말, 칭찬으로 죽이겠네요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「でもあなただって、タキシード、似合っていますよ。引き締まった色があなたらしくてかっこいいです」"
translation = "「하지만 당신도, 턱시도, 잘 어울려요. 단정한 색이 당신답고 멋있어요」"

[[dialogue]]
speaker = "ナミエル"
original = "「コホン」"
translation = "「커흠」"

[[dialogue]]
speaker = "フィオナ"
original = "「ひやっ──！？\u3000ナミエル、どうしてここに！？」"
translation = "「히얏──!? 나미엘, 왜 여기에!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「緋宮会長が不埒なことをされないよう、監視のために参りました。フィオナお嬢様とおふたりだからって、いかがわしいことをされないようご注意ください」"
translation = "「히노미야 회장이 불미스러운 일을 하지 않도록, 감시를 위해 왔습니다. 피오나 아가씨와 단둘이라고, 수상한 짓을 하지 않도록 주의해 주세요」"

[[dialogue]]
speaker = "ナミエル"
original = "「まずは並んだ写真を撮るそうです。今日はあくまでモデルとしての撮影ですから、あまり近づきすぎないでくださいね、緋宮会長」"
translation = "「우선은 나란히 선 사진을 찍는다고 합니다. 오늘은 어디까지나 모델로서의 촬영이니까, 너무 가까이 다가가지 말아주세요, 히노미야 회장」"

[[dialogue]]
speaker = "フィオナ"
original = "「もう、ナミエルってば心配し過ぎなんだから……」"
translation = "「정말, 나미엘은 걱정이 너무 많다니까……」"

[[dialogue]]
speaker = "フィオナ"
original = "「このくらいの距離ですかね。ちょっと緊張します」"
translation = "「이 정도 거리일까요. 조금 긴장되네요」"

[[dialogue]]
speaker = "ナミエル"
original = "「フィオナお嬢様、表情が硬いとカメラマンの方が仰っています。もう少し自然な笑顔が欲しいそうです」"
translation = "「피오나 아가씨, 표정이 딱딱하다고 카메라맨이 말씀하십니다. 조금 더 자연스러운 미소를 원하신다고 합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「えっ？\u3000そう言われてもどうしたら……」"
translation = "「엣? 그렇게 말씀하셔도 어떻게 해야……」"

[[dialogue]]
speaker = "unk"
original = "（肩をそっと抱き寄せる）"
translation = "(어깨를 살짝 끌어안는다)"

[[dialogue]]
speaker = "フィオナ"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ……こうでしょうか」"
translation = "「후후…… 이럴까요」"

[[dialogue]]
speaker = "ナミエル"
original = "（むぅ……幸せそうな笑顔……本当に緋宮会長のお嫁さんみたいです）"
translation = "(음…… 행복해 보이는 미소…… 정말로 히노미야 회장의 신부 같아요)"

[[dialogue]]
speaker = "ナミエル"
original = "「フィオナお嬢様。次は腕を組んで、もう１枚お願いします」"
translation = "「피오나 아가씨. 다음은 팔짱을 끼고, 한 장 더 부탁드립니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「うん、わかった。緋宮会長、失礼しますね」"
translation = "「네, 알았어요. 히노미야 회장, 실례할게요」"

[[dialogue]]
speaker = "フィオナ"
original = "「んしょ。これでいい？」"
translation = "「영차. 이걸로 됐나요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「はい、少しじっとしていてください。……撮れました」"
translation = "「네, 잠시 가만히 계세요. ……찍었습니다」"

[[dialogue]]
speaker = "ナミエル"
original = "「次は誓いのキスのシーンです。ですが本当にキスをする必要はありません。向き合って顔を近づけるだけでいいですから」"
translation = "「다음은 맹세의 키스 장면입니다. 하지만 정말로 키스를 할 필요는 없습니다. 마주 보고 얼굴을 가까이하는 것만으로 괜찮으니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「わかってるって。緋宮会長、お願いします」"
translation = "「알고 있다니까요. 히노미야 회장, 부탁드려요」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ──」"
translation = "「아──」"

[[dialogue]]
speaker = "フィオナ"
original = "「顔が近くて……こうしてると、つい唇が触れてしまいそうです……」"
translation = "「얼굴이 가까워서…… 이렇게 있으니, 저도 모르게 입술이 닿을 것 같아요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長……」"
translation = "「히노미야 회장……」"

[[dialogue]]
speaker = "ナミエル"
original = "「ひ、緋宮会長、本当にキスしてはいけませんからねっ！\u3000それに見つめすぎですっ、もう写真は撮れましたからっ」"
translation = "「히, 히노미야 회장, 정말로 키스하시면 안 됩니다읏! 게다가 너무 쳐다보십니다읏, 이미 사진은 찍었으니까요읏」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、あはは……ちょっと雰囲気に呑まれちゃったかな……」"
translation = "「아, 아하하…… 조금 분위기에 휩쓸렸나 보네요……」"

[[dialogue]]
speaker = "ナミエル"
original = "「お気を付けください。最後は自由に、おふたりの好きなシチュエーションで写真を撮りたいそうです」"
translation = "「조심해 주세요. 마지막은 자유롭게, 두 분이 좋아하는 시추에이션으로 사진을 찍고 싶다고 합니다」"

[[dialogue]]
speaker = "unk"
original = "それなら──"
translation = "그렇다면──"

[[dialogue]]
speaker = "フィオナ"
original = "「ひゃっ！？\u3000お姫様抱っこ……！？」"
translation = "「햐앗!? 공주님 안기……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "（さっきよりも顔が近くて、ドキドキしちゃう……心臓の音、緋宮会長に聞こえてないかな……？）"
translation = "(아까보다 얼굴이 가까워서, 두근거려…… 심장 소리, 히노미야 회장에게 들리고 있지 않을까……?)"

[[dialogue]]
speaker = "フィオナ"
original = "（でも嫌なドキドキじゃなくて、むしろ気持ち良くて……ずっとこのままでいたいと思っちゃう……）"
translation = "(하지만 싫은 두근거림이 아니라, 오히려 기분 좋아서…… 계속 이대로 있고 싶다고 생각하게 돼……)"

[[dialogue]]
speaker = "フィオナ"
original = "「重いかもしれませんけど、もう少しだけ抱っこしててくださいね。……ちゅっ<emoji=heart04>」"
translation = "「무거울지도 모르겠지만, 조금만 더 안아주고 계세요. ……츄읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "フィオナ"
original = "「えへへ……ほっぺにキスしちゃいました<emoji=heart04>\u3000でも結婚式でお姫様抱っこなんですから、これくらいするのは普通ですよね？」"
translation = "「에헤헤…… 볼에 키스해버렸어요<emoji=heart04> 하지만 결혼식에서 공주님 안기니까, 이 정도는 하는 게 보통이잖아요?」"

[[dialogue]]
speaker = "ナミエル"
original = "「ハ──ハ──ハレンチです～～～～～っ！！？」"
translation = "「하── 하── 파렴치합니다~~~~~~~~읏!!!?」"

[[dialogue]]
speaker = "unk"
original = "それから数日後──"
translation = "그리고 나서 며칠 후──"

[[dialogue]]
speaker = "フィオナ"
original = "「すみません。この前撮った写真ですが、ナミエルからお父様に伝わって、お蔵入りになってしまいました……」"
translation = "「죄송해요. 이전에 찍은 사진이지만, 나미엘을 통해 아버지께 전달되어, 폐기되어 버렸어요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「でも写真は頂けました。ほら、よく撮れてますよね」"
translation = "「하지만 사진은 받았어요. 보세요, 잘 찍혔죠」"

[[dialogue]]
speaker = "フィオナ"
original = "「いい思い出になりました。ふふふ♪」"
translation = "「좋은 추억이 되었어요. 후후후♪」"

