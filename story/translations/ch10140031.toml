[[dialogue]]
speaker = "unk"
original = "第１話,クロトの将来,P"
translation = "제1화, 쿠로토의 장래, P"

[[dialogue]]
speaker = "unk"
original = "トワちゃんとつきあい始めてから、満ち足りた幸せな時間を謳歌していた。"
translation = "토와짱과 사귀기 시작한 뒤로, 충만한 행복의 시간을 만끽하고 있었다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、まったく問題がない訳ではない。"
translation = "그렇다고 해서 전혀 문제가 없는 것은 아니었다."

[[dialogue]]
speaker = "unk"
original = "２人ともそれぞれに多忙で、なかなか恋人同士の時間が取れずにいた。"
translation = "둘 다 각자 바빠서 좀처럼 연인끼리의 시간을 내지 못하고 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、会長くんだ！\u3000おーい、会長くーん♪」"
translation = "「앗, 회장 군이다! 어─이, 회장 구─ㄴ♪」"

[[dialogue]]
speaker = "マトイ"
original = "「……結婚式を挙げてから、ますます仲良しですね～」"
translation = "「……결혼식을 올리고 나서 점점 더 사이가 좋아지셨네요~」"

[[dialogue]]
speaker = "トワ先生"
original = "「わわっ、マトイちゃんもいたんだ！？\u3000ご、ごめんね！\u3000コホン、こんにちは、会長くん」"
translation = "「와왓, 마토이짱도 있었구나!? 미, 미안해! 에헴, 안녕, 회장 군」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは、今更だと思いますけど……」"
translation = "「아하하, 이제 와서 새삼스럽다고 생각합니다만……」"

[[dialogue]]
speaker = "トワ先生"
original = "「ううん、これは先生としてのけじめだからね！\u3000みんなの前ではちゃんとしないと」"
translation = "「으응, 이건 선생으로서의 도리니까! 모두 앞에서는 제대로 해야지」"

[[dialogue]]
speaker = "マトイ"
original = "「でも、他には誰もいませんよ？\u3000私は２人がお付き合いしてること知ってますし」"
translation = "「하지만 지금은 아무도 없는데요? 저는 두 분이 사귀고 있다는 걸 알고 있고요」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっと……じゃあ、今だけだからね」"
translation = "「저기…… 그럼, 지금뿐이니까 말이야」"

[[dialogue]]
speaker = "トワ先生"
original = "「こんにちはっ、会長くん<emoji=heart04>」"
translation = "「안녕, 회장 군<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「わぁ、語尾にハートマークが見えた気が」"
translation = "「와아, 말끝에 하트 마크가 보인 것 같은 기분이」"

[[dialogue]]
speaker = "unk"
original = "俺にも見えた"
translation = "나에게도 보였다"

[[dialogue]]
speaker = "トワ先生"
original = "「からかわないでよ～！」"
translation = "「놀리지 마~!」"

[[dialogue]]
speaker = "トワ先生"
original = "「と、ところで２人は何してたの？\u3000最近忙しいって会長くんから聞いてたから、星徒会室でお仕事中かなって思ってたんだけど」"
translation = "「그, 그런데 두 사람은 뭐 하고 있었어? 최근에 바쁘다고 회장 군한테 들었으니까, 성도회실에서 업무 중일 거라 생각했는데」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょうど片付いたので、解散したところです」"
translation = "「마침 다 끝나서 해산하던 참이에요」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、ていうことはつまり……」"
translation = "「앗, 그렇다는 건 즉……」"

[[dialogue]]
speaker = "マトイ"
original = "「どうぞ、会長は先生にお返しします」"
translation = "「자요, 회장은 선생님께 돌려드릴게요」"

[[dialogue]]
speaker = "トワ先生"
original = "「わぁーい♪\u3000それじゃ遠慮なく……っと、いけないいけない、けじめのない行為はよくないね」"
translation = "「와아─이♪ 그럼 사양 않고…… 앗, 안 되지 안 돼, 절도 없는 행위는 좋지 않아」"

[[dialogue]]
speaker = "unk"
original = "ちょっとくらいなら平気だよ"
translation = "조금 정도라면 괜찮아"

[[dialogue]]
speaker = "トワ先生"
original = "「そ、そうかな？\u3000ちょっと隠れたら大丈夫そう？」"
translation = "「그, 그럴까? 살짝 숨으면 괜찮을 것 가태?」"

[[dialogue]]
speaker = "マトイ"
original = "「私が隠しましょうか？」"
translation = "「제가 가려드릴까요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「いいの！？\u3000うーんと、それじゃあ……って、キスはしないよ？\u3000ぎゅってするのもだめ。いくらマトイちゃんが隠してくれても、学内では節度を守らないと」"
translation = "「정말!? 으음, 그럼…… 앗, 키스는 안 할 거야? 꼬옥 안는 것도 안 돼. 아무리 마토이짱이 가려준다고 해도 교내에서는 절도를 지켜야지」"

[[dialogue]]
speaker = "unk"
original = "どこまでならＯＫなの？"
translation = "어디까지가 OK인 거야?"

[[dialogue]]
speaker = "トワ先生"
original = "「そうだね～、こーして見つめ合って……ううっ、会長くんの顔が近いよぉ」"
translation = "「글쎄~ 이렇게 마주 보고…… 으으, 회장 군 얼굴이 가까워어」"

[[dialogue]]
speaker = "マトイ"
original = "「キスしちゃいます？」"
translation = "「키스해버릴까요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「し、しませんっ！\u3000わたしは先生ですからね。全力で我慢します！」"
translation = "「아, 안 합니다! 저는 선생님이니까요. 전력으로 참겠습니다!」"

[[dialogue]]
speaker = "トワ先生"
original = "「キスは我慢我慢……ハグも……我慢して……えっと、手をギュッて握ってくれるかなぁ？」"
translation = "「키스는 참고 참기…… 허그도…… 참고…… 저기, 손을 꼬옥 잡아줄래?」"

[[dialogue]]
speaker = "unk"
original = "ぎゅ！"
translation = "꼬옥!"

[[dialogue]]
speaker = "トワ先生"
original = "「えへへ～、会長くんに手をギュッてされちゃったぁ♪」"
translation = "「에헤헤~ 회장 군이 손을 꼬옥 잡아줘써어♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ、こっちからも握り返すね。むぎゅむぎゅ～」"
translation = "「아, 이쪽에서도 다시 쥘게. 꼬물꼬물~」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、ちょっとくすぐったそう？」"
translation = "「아, 조금 간지러워 보이는데요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「もー、会長くんは敏感だから、仕方ないなぁ」"
translation = "「정말이지, 회장 군은 민감하니까 어쩔 수 없네에」"

[[dialogue]]
speaker = "マトイ"
original = "「会長って敏感なんですか？」"
translation = "「회장이 민감한가요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「えへへへ、実はそうなの。意外と可愛いとこあるんだよね～」"
translation = "「에헤헤헤, 사실은 그래. 의외로 귀여운 구석이 이따니까~」"

[[dialogue]]
speaker = "トワ先生"
original = "「はい、会長くん成分ほきゅー完了♪\u3000続きはまた後でね」"
translation = "「자, 회장 군 성분 보규 완료♪ 나머지는 나중에 보자」"

[[dialogue]]
speaker = "トワ先生"
original = "「さて、ここからは真面目に先生するよー。まずは２人とも、星徒会のお仕事ご苦労さまでした」"
translation = "「자, 이제부터는 진지하게 선생님 할게─. 우선 두 사람 모두 성도회 일 수고 많았어」"

[[dialogue]]
speaker = "トワ先生"
original = "「でも、頑張るのはいいけど無理しちゃダメ。マトイちゃんも会長くんもすっごく疲れた顔してるよ」"
translation = "「하지만 노력하는 건 좋지만 무리하면 안 돼. 마토이짱도 회장 군도 엄청 피곤한 얼굴 하고 이써」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ、顔に出ちゃってますか？」"
translation = "「엣, 얼굴에 티가 나나요?」"

[[dialogue]]
speaker = "トワ先生"
original = "「出てる出てる。マトイちゃんは女の子なんだから、特に気をつけなきゃねー」"
translation = "「나고 말고. 마토이짱은 여자애니까 특히 조심해야 해─」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁい、反省します。今日は家でのんびり進路のことでも考えようかな……」"
translation = "「네에, 반성할게요. 오늘은 집에서 느긋하게 진로에 대해서나 생각할까 봐요……」"

[[dialogue]]
speaker = "トワ先生"
original = "「進路のこと、もうちゃんと考えてるんだ？」"
translation = "「진로에 대해 벌써 제대로 생각하고 있구나?」"

[[dialogue]]
speaker = "マトイ"
original = "「もちろんです。油断してるとあっという間に卒業ですからね」"
translation = "「물론이죠. 방심하면 눈 깜짝할 사이에 졸업이니까요」"

[[dialogue]]
speaker = "マトイ"
original = "「会長は将来の進路とか考えてる？\u3000いろんなバイトしてたって話だから、候補はいろいろあると思うけど」"
translation = "「회장은 장래 진로 같은 거 생각하고 있어? 여러 알바를 했다는 이야기니까 후보는 다양할 것 같은데」"

[[dialogue]]
speaker = "unk"
original = "今が忙しくて将来のことなんて考えられないよ"
translation = "지금이 바빠서 장래 일 같은 건 생각할 수 없어"

[[dialogue]]
speaker = "トワ先生"
original = "「それはよくないねー。会長くんもマトイちゃんを見習った方がいいよ」"
translation = "「그건 좋지 않아─. 회장 군도 마토이짱을 본받는 게 조아」"

[[dialogue]]
speaker = "トワ先生"
original = "「２人とも未来ある若者なんだから。目の前のことでいっぱいいっぱいになって、将来のことを考えられないなんて絶対よくない」"
translation = "「두 사람 다 미래가 있는 젊은이니까. 눈앞의 일로 벅차서 장래 일을 생각할 수 없다는 건 절대 안 돼」"

[[dialogue]]
speaker = "トワ先生"
original = "「リクリエのこともあるから、そんな余裕がないのはわかってるけど……でも、だからって全部蓋しちゃダメ」"
translation = "「리크리에 일도 있으니까 그럴 여유가 없는 건 알지만…… 하지만 그렇다고 전부 덮어두면 안 돼」"

[[dialogue]]
speaker = "トワ先生"
original = "「でも……ごめんね、本当ならわたしたち大人がなんとかしてあげなきゃいけないんだけど」"
translation = "「하지만…… 미안해, 원래라면 우리 어른들이 어떻게든 해줘야 하는데」"

[[dialogue]]
speaker = "unk"
original = "でも俺たちは、星騎士ですから"
translation = "하지만 저희는 성기사니까요"

[[dialogue]]
speaker = "トワ先生"
original = "「そうだね、ありがとう。今が大変すぎて、将来を考えられないって気持ちもわかるよ」"
translation = "「그렇네, 고마워. 지금이 너무 힘들어서 장래를 생각할 수 없다는 기분도 이해해」"

[[dialogue]]
speaker = "トワ先生"
original = "「だから、わたしが会長くんの未来を考えるお手伝いをしてあげる」"
translation = "「그러니까 내가 회장 군의 미래를 생각하는 걸 도와줄게」"

[[dialogue]]
speaker = "トワ先生"
original = "「一緒に考えてくれる人がいたら、そういう気分にもなるでしょ？」"
translation = "「함께 생각해주고 있는 사람이 있으면 그런 기분이 들 거 아냐?」"

[[dialogue]]
speaker = "マトイ"
original = "「２人が恋人同士だって知ってると、意味深なセリフに聞こえちゃいますね」"
translation = "「두 분이 연인 사이라는 걸 알고 나니 의미심장한 대사로 들리네요」"

[[dialogue]]
speaker = "トワ先生"
original = "「わわっ、そういう意味じゃないってばー！\u3000それもなくはないけど、今のは別の話だから！\u3000勘違いしないで～」"
translation = "「와왓, 그런 의미가 아니라니까─! 그것도 없지는 않지만 방금 건 다른 이야기니까! 오해하지 마~」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くんの将来の話だよね……け、結婚とか、その前の同棲とか、そういう話は置いておくとして」"
translation = "「회장 군의 장래 이야기지…… 겨, 결혼이라든가 그 전의 동거라든가 그런 이야기는 제쳐두고」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くんはバイト経験豊富で、向いてるお仕事は多そうだよね。となると、自分がどういうことをして生きていきたいかってことが大事だね」"
translation = "「회장 군은 알바 경험이 풍부해서 적성에 맞는 일은 많을 것 가태. 그렇게 되면 자신이 어떤 일을 하며 살아가고 싶은지가 중요하겠네」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くんがやってみたいことはないの？」"
translation = "「회장 군이 해보고 싶은 건 없어?」"

[[dialogue]]
speaker = "unk"
original = "今みたいなことを続けられたらって思う"
translation = "지금 같은 일을 계속할 수 있었으면 좋겠어"

[[dialogue]]
speaker = "トワ先生"
original = "「それって星徒会長だよね？\u3000それなら……新星学園の先生になってみる、とか？」"
translation = "「그건 성도회장이네? 그렇다면…… 신성학원의 선생님이 되어본다든가?」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、それは名案かも」"
translation = "「앗, 그건 명안일지도요」"

[[dialogue]]
speaker = "トワ先生"
original = "「星徒会長の延長線上に教師があるとは言わないけど、会長くんに合ってると思うよ」"
translation = "「성도회장의 연장선상에 교사가 있다고는 말 못 하겠지만 회장 군에게 어울릴 것 가태」"

[[dialogue]]
speaker = "トワ先生"
original = "「そ、それにっ、会長くんがわたしの同僚になってくれる未来は……すごくいいな～って思っちゃったから」"
translation = "「그, 그리고! 회장 군이 내 동료가 되어주는 미래는…… 정말 좋겠다~ 하고 생각해버려쓰니까」"

[[dialogue]]
speaker = "トワ先生"
original = "「ごめんね、私情が入っちゃって。でもでもっ、わたしにとっても会長くんにとっても、きっと素敵な未来になると思うな～」"
translation = "「미안해, 사심이 들어가 버려서. 하지만 하지만! 나에게도 회장 군에게도 분명 멋진 미래가 될 거라 생각해~」"

[[dialogue]]
speaker = "トワ先生"
original = "「ということで、よければ候補の１つとして、前向きに考えてくれると嬉しいなっ♪」"
translation = "「그러니까 괜찮다면 후보 중 하나로 긍정적으로 생각해주면 기쁘게써♪」"

