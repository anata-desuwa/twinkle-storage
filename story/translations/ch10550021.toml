[[dialogue]]
speaker = "unk"
original = "第１話,２人の恋の始まり,P"
translation = "제1화, 두 사람의 사랑의 시작, P"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ふふ、ようやくお待ちかねのお昼です。会長様は今日は何にしますの？」"
translation = "「후후, 드디어 기다리던 점심입니다. 회장님은 오늘은 무엇으로 하시겠어요?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私はパスタの気分ですわ。カルボナーラにしようと思いますの♪」"
translation = "「저는 파스타가 먹고 싶습니다. 카르보나라로 하려고 합니다♪」"

[[dialogue]]
speaker = "unk"
original = "そうだな……じゃあ俺は──"
translation = "그러게…… 그럼 나는──"

[[dialogue]]
speaker = "アム"
original = "「見つけた。まーた２人でお昼を食べてるの？」"
translation = "「찾았다. 또 둘이서 점심 먹고 있는 거야?」"

[[dialogue]]
speaker = "アム"
original = "「冷たいじゃん、今までは一緒にお昼ごはんを食べることも多かったのに、最近は会長とばかり一緒で」"
translation = "「너무하잖아, 전에는 같이 점심밥 먹는 일도 많았는데, 요즘은 회장이랑만 같이 있고」"

[[dialogue]]
speaker = "アム"
original = "「お昼ごはんだけじゃないよ。放課後も会長とばっかり過ごしてるでしょ？\u3000どうなってるの！」"
translation = "「점심밥뿐만이 아니야. 방과 후에도 회장이랑만 보내고 있잖아? 어떻게 된 거야!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そ、そんなことはありませんのよ。気のせいじゃありませんか？」"
translation = "「그, 그럴 리가 없습니다. 기분 탓이 아닐까요?」"

[[dialogue]]
speaker = "アム"
original = "「エルゼ……何かあたしに隠してることがあるよね？」"
translation = "「엘제…… 나에게 뭔가 숨기고 있는 거 있지?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「か、隠し事なんて……ありませんわよ……」"
translation = "「수, 숨기는 것 따위…… 없습니다……」"

[[dialogue]]
speaker = "アム"
original = "「伊達にライバルを名乗ってるわけじゃないよ。エルゼの嘘なんてすぐに分かるんだから！」"
translation = "「괜히 라이벌을 자처하는 게 아니야. 엘제의 거짓말 따위 금방 안다니까!」"

[[dialogue]]
speaker = "unk"
original = "エルゼ……"
translation = "엘제……"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「うう、そうですわね……アムに隠し事をし続けるのも胸が苦しいと思っておりましたし」"
translation = "「우우, 그렇습니다……. 아무에게 숨기는 것을 계속하는 것도 가슴이 아프다고 생각하고 있었습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お察しの通りですわ。あなたに黙っていたことがありますの」"
translation = "「짐작하신 대로입니다. 당신에게 말하지 않은 것이 있습니다.」"

[[dialogue]]
speaker = "アム"
original = "「そうだよね。さあ、正直に告白して」"
translation = "「그렇지. 자, 솔직하게 고백해.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私……会長様とお付き合いを始めましたの……」"
translation = "「저…… 회장님과 사귀기 시작했습니다……」"

[[dialogue]]
speaker = "unk"
original = "それはつい先日のことだった。"
translation = "그것은 바로 며칠 전의 일이었다."

[[dialogue]]
speaker = "unk"
original = "寮を抜け出したエルゼと一緒に、地下アイドルのライブに行き、そしてその帰り道──"
translation = "기숙사를 빠져나온 엘제와 함께, 지하 아이돌 라이브에 갔고, 그리고 그 돌아오는 길──"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「──今日も本当に素晴らしいライブでしたわね」"
translation = "「──오늘도 정말 멋진 라이브였습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様も私に付き合っているうちに、すっかり常連になってしまいましたわ」"
translation = "「회장님도 저에게 어울려 주시는 동안, 완전히 단골이 되어 버리셨습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……会長様……会長様は寮を抜け出すのを見つける度、それを見逃してくださいましたわ」"
translation = "「……회장님…… 회장님은 기숙사를 빠져나오는 것을 발견할 때마다, 그것을 눈감아 주셨습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それどころか最近では、私の夜遊びに付き合うようになってくださいまして……」"
translation = "「게다가 최근에는, 저의 밤놀이에 함께 해 주시게 되었고요……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様はどうして……そんなに私に良くしてくださいますの？」"
translation = "「회장님은 어째서…… 그렇게 저에게 잘해 주시는 겁니까?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私が悪いことをする、その手伝いをしていれば一緒に叱られてしまうかもしれませんのに」"
translation = "「제가 나쁜 짓을 하는, 그 일을 돕고 있으면 함께 혼날 수도 있을 텐데.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「なのにどうして、会長様は私と一緒にいてくださいますの？」"
translation = "「그런데도 어째서, 회장님은 저와 함께 있어 주시는 겁니까?」"

[[dialogue]]
speaker = "unk"
original = "エルゼに問われて、言葉に詰まった。"
translation = "엘제에게 질문을 받고, 말문이 막혔다."

[[dialogue]]
speaker = "unk"
original = "そして俺は、それまで漠然と抱えていたエルゼへの好意を言葉にして、はっきりと伝えたのだった。"
translation = "그리고 나는, 그때까지 막연하게 품고 있던 엘제에 대한 호의를 말로 표현하여, 확실하게 전했던 것이다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様のお気持ちを聞いて、嬉しかったですの……ああ、会長様も同じ気持ちだったのだ、と」"
translation = "「회장님의 마음을 듣고, 기뻤습니다……. 아아, 회장님도 같은 마음이었구나, 하고.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そんなことがありまして……私たち、お付き合いをすることになったんですわ。アム、黙っていてごめんなさい」"
translation = "「그런 일이 있어서…… 저희, 사귀게 되었습니다. 아무, 말하지 않아서 미안해.」"

[[dialogue]]
speaker = "アム"
original = "「やっぱり……そういうことだったんだね」"
translation = "「역시…… 그런 거였구나.」"

[[dialogue]]
speaker = "アム"
original = "「本当にゆるせない！\u3000おかげでずーっとおめでとうって言えなくてモヤモヤしてたんだから！」"
translation = "「정말로 용서 못 해! 덕분에 계속 축하한다고 말 못 해서 답답했다구!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「喜んでくれるんですの？」"
translation = "「기뻐해 주시는 겁니까?」"

[[dialogue]]
speaker = "アム"
original = "「当たり前でしょ。親友の幸せを喜ばないわけがないんだから！」"
translation = "「당연하잖아. 제일 친한 친구의 행복을 기뻐하지 않을 리가 없잖아!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ありがとうございます、アム……」"
translation = "「고맙습니다, 아무……」"

[[dialogue]]
speaker = "アム"
original = "「でもエルゼに先を越されちゃったのは、ちょっぴり悔しいかも……」"
translation = "「하지만 엘제에게 선수를 빼앗긴 건, 조금 분할지도……」"

[[dialogue]]
speaker = "アム"
original = "「何といっても箱入りのお嬢様だし、まさかあたしより先に彼氏が出来るなんて思ってなかったもん」"
translation = "「뭐니 뭐니 해도 온실 속 아가씨고, 설마 나보다 먼저 남자친구가 생길 거라고는 생각 못 했거든.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「自分でも不思議な気持ちですわ」"
translation = "「저 스스로도 신기한 기분입니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「でも……ずっと一緒にいたら、いつの間にか好きになってしまっていたんですの」"
translation = "「하지만…… 계속 함께 있다 보니, 어느새 좋아하게 되어 버렸습니다.」"

[[dialogue]]
speaker = "アム"
original = "「そんなに一緒にいたの？」"
translation = "「그렇게나 같이 있었어?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「寮を抜け出してお菓子を買いに行くのに付き合っていただいたり……」"
translation = "「기숙사를 빠져나와 과자를 사러 가는 것에 함께 해 주시거나……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「寮を抜け出してライブに行くのに付き合っていただいたり……」"
translation = "「기숙사를 빠져나와 라이브에 가는 것에 함께 해 주시거나……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「寮を抜け出してプールに泳ぎに行くのに付き合っていただいたり……」"
translation = "「기숙사를 빠져나와 수영장에 수영하러 가는 것에 함께 해 주시거나……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そんな風にして一緒に時間を過ごしているうちに、気が付けば会長様のことばかり考えるようになっていたんですの」"
translation = "「그런 식으로 함께 시간을 보내는 동안, 정신 차려 보니 회장님 생각만 하게 되어 있었습니다.」"

[[dialogue]]
speaker = "アム"
original = "「……思った以上にやりたい放題やってるね、この子」"
translation = "「……생각했던 것보다 마음대로 하고 있네, 이 아이.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「頑張りましたのよ♪\u3000おかげで私の『悪いことリスト』にも、だいぶチェックが付きましたわ」"
translation = "「열심히 했습니다♪ 덕분에 저의 『나쁜 짓 리스트』에도, 꽤 체크가 붙었습니다.」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「この調子なら、卒業までに全部達成できそうです♪」"
translation = "「이대로라면, 졸업 전까지 전부 달성할 수 있을 것 같습니다♪」"

[[dialogue]]
speaker = "アム"
original = "「いい加減、ヒルディオーネ先輩に報告しといた方がいい気がしてきた……」"
translation = "「이쯤 되면, 힐디오네 선배에게 보고해 두는 게 좋을 것 같다는 생각이 들기 시작했어……」"

[[dialogue]]
speaker = "アム"
original = "「っていうか会長！\u3000新星学園の星徒会長という立場でありながら、悪の道に走ろうとするエルゼを止めようとしないのは酷くないっ？」"
translation = "「랄까 회장! 신성 학원의 성도 회장이라는 입장이면서, 악의 길로 가려는 엘제를 막으려고 하지 않는 건 너무하지 않아?」"

[[dialogue]]
speaker = "unk"
original = "エルゼにもっと人生を楽しんで欲しくて"
translation = "엘제에게 더 인생을 즐겨 주었으면 해서"

[[dialogue]]
speaker = "unk"
original = "箱入りだった分を取り返して欲しい"
translation = "온실 속에서 지낸 만큼을 되찾아 주었으면 해서"

[[dialogue]]
speaker = "アム"
original = "「そ、それはあたしも同じ思いだけど、エルゼに万が一のことがあったらどうするの！」"
translation = "「그, 그건 나도 같은 마음이지만, 엘제에게 만에 하나라도 무슨 일이 생기면 어떡할 거야!」"

[[dialogue]]
speaker = "unk"
original = "その為に俺がいるから"
translation = "그를 위해 내가 있으니까"

[[dialogue]]
speaker = "アム"
original = "「むぅ……」"
translation = "「으음……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「大丈夫ですのよ。本当に危険なことは致しませんし、会長様もきちんと止めてくださいます」"
translation = "「괜찮습니다. 정말로 위험한 일은 하지 않을 것이고, 회장님도 제대로 막아 주실 겁니다.」"

[[dialogue]]
speaker = "アム"
original = "「会長が側にいてくれるのはそういう意味でも安心だね……」"
translation = "「회장이 곁에 있어 주는 건 그런 의미에서도 안심이네……」"

[[dialogue]]
speaker = "アム"
original = "「とにかくエルゼのことちゃんと守ってよ、いい？」"
translation = "「어쨌든 엘제를 제대로 지켜 줘야 해, 알겠지?」"

[[dialogue]]
speaker = "unk"
original = "必ず守るって約束するよ"
translation = "반드시 지키겠다고 약속할게"

[[dialogue]]
speaker = "unk"
original = "わかった"
translation = "알았어"

[[dialogue]]
speaker = "unk"
original = "力強く宣言してみせる俺に、アムは幾分か安心したような笑みを浮かべるのだった。"
translation = "힘차게 선언해 보이는 나에게, 아무는 어느 정도 안심한 듯한 미소를 짓는 것이었다."

