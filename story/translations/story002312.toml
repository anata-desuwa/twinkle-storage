[[dialogue]]
speaker = "unk"
original = "秋葉原でのコラプサーとの決戦から数日後。"
translation = "아키하바라에서의 콜랩서와의 결전으로부터 며칠 후."

[[dialogue]]
speaker = "unk"
original = "集まったコラプサーたちの前に、魔女イニシュが立つ。"
translation = "모인 콜랩서들 앞에 마녀 이니슈가 선다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「あなたたちコラプサーは我々ネビュラの管理下に置かれることになりました」"
translation = "「당신들 콜랩서는 우리 네뷸라의 관리하에 놓이게 되었습니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「私は魔女イニシュ。本日付であなたたちの上官となります。よろしくお願いします」"
translation = "「저는 마녀 이니슈. 오늘 자로 당신들의 상관이 됩니다. 잘 부탁합니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「検査の結果、守護星であるブラックホールとのリンクは弱くなっており、あなたたちの戦闘能力は大幅に弱体化しています」"
translation = "「검사 결과, 수호성인 블랙홀과의 링크는 약해져 있으며 당신들의 전투 능력은 대폭 약화되었습니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「とはいえ、敵が味方になったときには、レベル１からやり直しになるもの。レベリングには私も付き合いますので大丈夫です」"
translation = "「그렇다고는 해도 적이 아군이 되었을 때는 레벨 1부터 다시 시작하는 법. 레벨 업에는 저도 함께할 테니 괜찮습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ……あの、よろしいでしょうか」"
translation = "「하아…… 저기, 괜찮을까요」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「はい、どうぞ」"
translation = "「네, 말씀하세요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「コラプサーの首領はあくまで私です。罪を犯した身で厚顔無恥なことを申しますが、コラプサーたちは私が指揮します」"
translation = "「콜랩서의 수령은 어디까지나 저입니다. 죄를 지은 몸으로 후안무치한 말을 꺼냅니다만, 콜랩서들은 제가 지휘하겠습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それがこの子たちを集めた私の責務であり、希望です。コラプサーへの命令は私を通していただけますか」"
translation = "「그것이 이 아이들을 모은 저의 책무이자 희망입니다. 콜랩서에 대한 명령은 저를 거쳐 주시겠습니까」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「いいでしょう。ですが、その責任はあなたが負うことになります。……いいですね？」"
translation = "「좋습니다. 하지만 그 책임은 당신이 지게 됩니다. ……아시겠지요?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（私は道を間違えた。だけどその過程で出会ったものを、全て否定したりはしない。仲間も過ちも背負って未来に進む）"
translation = "(나는 길을 잘못 들었다. 하지만 그 과정에서 만난 것들을 모두 부정하지는 않겠다. 동료도 잘못도 짊어지고 미래로 나아간다)"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "（これから、私たちの新しい戦いが始まる。今度こそ、世界をよりよくするため……コラプサーのみんなとともに！）"
translation = "(이제부터 우리의 새로운 싸움이 시작된다. 이번에야말로 세계를 더 좋게 만들기 위해…… 콜랩서 모두와 함께!)"

[[dialogue]]
speaker = "unk"
original = "マリオンは、赤ん坊になったイザベラを魔女の森に預けに来ていた。"
translation = "마리온은 아기가 된 이자벨라를 마녀의 숲에 맡기러 와 있었다."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「よしよし……泣かないで」"
translation = "「오구오구…… 울지 마렴」"

[[dialogue]]
speaker = "unk"
original = "揺らしてやると泣き止む。赤ん坊は本当に不思議だ。"
translation = "달래주자 울음을 그친다. 아기는 정말 신기하다."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「私にもこんな瞬間があったのでしょうね」"
translation = "「제게도 이런 순간이 있었겠지요」"

[[dialogue]]
speaker = "unk"
original = "腕の中にある小さな命。かつての友の面影がほんの少し。過ぎ去った時間は幾星霜。"
translation = "품 안에 있는 작은 생명. 과거 친구의 모습이 아주 조금. 지나간 시간은 기나긴 세월."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「いつか、私も自分の子を持つことができるでしょうか……」"
translation = "「언젠가 저도 제 아이를 가질 수 있을까요……」"

[[dialogue]]
speaker = "unk"
original = "いつしか抱いた夢に思いを馳せる。自分によく似た、けれど決定的に違う存在。"
translation = "어느덧 품은 꿈에 생각을 떨친다. 자신을 꼭 닮았지만 결정적으로 다른 존재."

[[dialogue]]
speaker = "unk"
original = "もしそんな存在をこの世界に残せるとしたら、どんな気持ちだろう。"
translation = "만약 그런 존재를 이 세계에 남길 수 있다면 어떤 기분일까."

[[dialogue]]
speaker = "unk"
original = "嬉しいのだろうか。誇らしいのだろうか。想像は尽きない。"
translation = "기쁠까. 자랑스러울까. 상상은 끝이 없다."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「名前はどうしましょうか……なんて。ふふっ」"
translation = "「이름은 뭘로 지을까요…… 라니. 후훗」"

[[dialogue]]
speaker = "unk"
original = "放課後、コハルコは保健室に呼び出しを受けていた。"
translation = "방과 후, 코하루코는 보건실로 호출을 받았다."

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「失礼します……え？」"
translation = "「실례합니다…… 에?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「やっほー、直接会うのは初めてかな？\u3000ま、あたし基本レアキャラだからね」"
translation = "「안녕~ 직접 만나는 건 처음인가? 뭐 나 기본적으로 레어 캐릭터니까」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「みんなのぷりちー守護天使、パテルちゃんだよっ♪」"
translation = "「모두의 프리티 수호천사, 파텔 짱이야♪」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「こら、パテル。挨拶はきちんとなさい。コハルコさま、此度の事件、解決お疲れさまでした」"
translation = "「얘, 파텔. 인사는 똑바로 하렴. 코하루코 님, 이번 사건 해결하시느라 수고 많으셨습니다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「コハルコにはいつも世話になっているというのに、助力できなくてすまなかったな」"
translation = "「코하루코에게는 항상 신세를 지고 있는데도 힘이 되어주지 못해 미안하구나」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いえ、守護天使のみなさんが気にされることでは……ところで、今日はどういったご用ですか？」"
translation = "「아니요, 수호천사분들이 신경 쓰실 일은…… 그런데 오늘은 어떤 용무이신가요?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はいはーい、主にあたしー」"
translation = "「네네~ 주로 나 때문에!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしが『淘汰』を司る守護天使……つまり死神なのは知ってるよね？\u3000その死神としては、死ぬはずの人が簡単に生き返ると困っちゃうんだよね」"
translation = "「내가 『도태』를 관장하는 수호천사…… 즉 사신인 건 알고 있지? 그 사신으로서는 죽어야 할 사람이 간단히 살아나면 곤란하거든」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもでも～、死ぬはずの命がぱぱっと蘇生しちゃった！\u3000それも９人！」"
translation = "「그치만 그치만~ 죽어야 할 목숨이 팍팍 소생해 버렸어! 그것도 9명이나!」"

[[dialogue]]
speaker = "unk"
original = "コラプサー８人と、イザベラ。"
translation = "콜랩서 8명과 이자벨라."

[[dialogue]]
speaker = "unk"
original = "イザベラは赤ん坊に戻ってしまったから完全な蘇生とは言えないけれど、死を覆し、生き長らえさせたことは間違いない。"
translation = "이자벨라는 아기로 돌아가 버렸으니 완전한 소생이라 할 수는 없겠지만, 죽음을 뒤엎고 연명시킨 것은 틀림없다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「というわけで、<ruby>封理再誕<rt>レナトゥス</rt></ruby>はこの世界の摂理を乱しうるものだからもう使わないでね！\u3000今日はその警告に来たんだよ」"
translation = "「그런 이유로 봉리재탄은 이 세계의 섭리를 어지럽힐 수 있는 것이니까 이제 쓰지 말아줘! 오늘은 그 경고를 하러 온 거야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「まぁ、残りの寿命……あと数十年くらいでコラプサーみたいなイレギュラーにはもう遭遇しないと思うけど、一応ね」"
translation = "「뭐 남은 수명…… 앞으로 수십 년 정도는 콜랩서 같은 이레귤러를 또 마주치지는 않을 것 같지만 일단은 말이야」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「え、数十年……？\u3000寿命……？」"
translation = "「에, 수십 년……? 수명……?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あれ、言ってなかったっけ？\u3000実はあたし、生き物の寿命はだいたい分かるんだ」"
translation = "「어라, 말 안 했나? 실은 나 생물의 수명은 대충 알거든」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はっきり言って、あなたの魂はボロボロ。不完全な光の魔女が、無茶な魔法の連続行使をしたからだね」"
translation = "「솔직히 말해서 당신 영혼은 너덜너덜해. 불완전한 빛의 마녀가 무리한 마법을 연속으로 썼으니까」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「だから、あなたの寿命は残り数十年。まるで人間みたいだね♪」"
translation = "「그래서 당신 수명은 남은 수십 년. 마치 인간 같네♪」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ぐすっ……」"
translation = "「훌쩍……」"

[[dialogue]]
speaker = "unk"
original = "事件は終息したものの、寿命の問題は残されていた。けれど、こんな形で解決するとは思ってもみなかった。"
translation = "사건은 종결되었지만 수명 문제는 남아 있었다. 하지만 이런 형태로 해결될 줄은 생각지도 못했다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「コハルコさまは私たちでも働くことができると導いてくださいました」"
translation = "「코하루코 님은 저희도 일할 수 있다고 인도해 주셨습니다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「確かにお前は普通の『命脈』からは外れた存在かもしれない。それでも、お前はここにこうして生きている」"
translation = "「분명 너는 보통의 『명맥』에서는 벗어난 존재일지도 모른다. 그래도 너는 여기 이렇게 살아 있다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「守護天使として、お前を贔屓してやることはできない。だが……」"
translation = "「수호천사로서 너를 편애해 줄 수는 없다. 하지만……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あなたに助けられた者として、あなたの幸せを願っていますよ」"
translation = "「당신에게 도움받은 사람으로서 당신의 행복을 빌고 있답니다」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私、独りで生きていかなくてもいいんだ……ぐすっ、よかった、よかったよぉ～」"
translation = "「나, 혼자서 살아가지 않아도 되는구나…… 훌쩍, 다행이야, 정말 다행이야~」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「うわぁぁぁああ～～～～っ」"
translation = "「우와아아아아앙~~~~!」"

[[dialogue]]
speaker = "unk"
original = "心に重くのしかかっていた不安が消え、安堵の涙が溢れる。それはあたかも、再びの産声のようだった。"
translation = "마음을 무겁게 짓누르던 불안이 사라지고 안도의 눈물이 넘쳐흐른다. 그것은 마치 다시 태어난 아이의 울음소리 같았다."

