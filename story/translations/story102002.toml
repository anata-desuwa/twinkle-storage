[[dialogue]]
speaker = "unk"
original = "クマ型ロボットとの戦闘の後、アナとサーシャさんに連絡を取ってみたが、相変わらず通話がつながらない。"
translation = "곰 형태 로봇과의 전투 후, 아나와 사샤 씨에게 연락을 시도해 봤지만 여전히 통화가 연결되지 않는다."

[[dialogue]]
speaker = "unk"
original = "メッセージを送っておいたが、今、俺たちが想像している状況ならば返信はこないだろう。"
translation = "메시지를 보내두었지만, 지금 우리가 상상하는 상황이라면 답장은 오지 않을 것이다."

[[dialogue]]
speaker = "unk"
original = "ひとまず優先すべきはアルテ……ということになり、俺たちは彼女を連れて新星星徒会室にやってきた。"
translation = "일단 우선해야 할 것은 아르테……라는 결론이 났고, 우리들은 그녀를 데리고 신성 성도회실로 왔다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「多分、アルテがこちらの世界に来たのと同じように、２人も別の世界に行っちゃってるってことだと思うわ」"
translation = "「아마 아르테가 이쪽 세계로 온 것처럼 두 사람도 다른 세계로 가버린 것 같아.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「なるほど……私の世界に飛ばされたのであれば、無事に夢幻美術館へ辿り着けているといいのですが」"
translation = "「과연…… 제 세계로 날아간 것이라면 무사히 몽환 미술관에 도착했으면 좋겠네요.」"

[[dialogue]]
speaker = "unk"
original = "夢幻美術館ってどういうところなの？"
translation = "몽환 미술관은 어떤 곳이야?"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「先ほどもお話しした通り、藝術都市アテネスに建つ美術館です」"
translation = "「아까도 말씀드렸다시피 예술도시 아테네스에 세워진 미술관입니다.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「古くからある由緒正しき美術館なのですが、諸々の事情から一時廃れた状態になっていたらしく……」"
translation = "「오래전부터 있던 유서 깊은 미술관입니다만, 여러 사정으로 일시적으로 쇠퇴한 상태였던 모양이라……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「そこで私を筆頭に新進気鋭の藝術家たちが集い、いまいち頼りない館長を支えつつ芸術活動に勤しんでいる、というわけですね」"
translation = "「거기에 저를 필두로 신진기예의 예술가들이 모여, 조금 미덥지 못한 관장님을 지탱하며 예술 활동에 힘쓰고 있는 셈이죠.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へぇ～、なんだか素敵なところじゃない」"
translation = "「헤에～, 왠지 멋진 곳이네.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「まあ、良いところばかりではありません。街では色々と危険なことが起きていますから」"
translation = "「뭐, 좋은 점만 있는 건 아닙니다. 거리에서는 여러 위험한 일들이 일어나고 있으니까요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「特に『死の芸術』と呼ばれるものに出くわしたら大変です」"
translation = "「특히 『죽음의 예술』이라 불리는 것과 마주치면 큰일입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「めちゃくちゃ物騒な名前ね！\u3000アナとサーシャさん、あの２人なら大丈夫だと思うけど……」"
translation = "「엄청나게 험악한 이름이네! 아나랑 사샤 씨, 그 두 사람이라면 괜찮을 거라 생각하지만……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「美術館の館長と上手く会えていれば、きっと保護してくれるはずですよ。根っからのお人よしですから」"
translation = "「미술관 관장님과 잘 만났다면 분명 보호해 줄 거예요. 근본부터가 호인이니까요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「それに館長は置くとしても、その補佐をしているサンソヴィーノや他の藝術家はとても優秀で頼れるので」"
translation = "「게다가 관장님은 제쳐두더라도, 그 보좌를 맡은 산소비노나 다른 예술가들은 매우 우수하고 믿음직하니까요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アナやサーシャさんのことは、無事を祈るしかできなさそうね……」"
translation = "「아나나 사샤 씨는 무사하기를 빌 수밖에 없겠네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それよりも今は、この異変の原因を一刻も早く解明することだわ！」"
translation = "「그보다 지금은 이 이변의 원인을 하루빨리 해명하는 거야!」"

[[dialogue]]
speaker = "unk"
original = "手がかりはあのクマ型ロボットかな？"
translation = "단서는 그 곰 형태 로봇일까?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう！\u3000あのクマロボよ！」"
translation = "「맞아! 그 곰 로봇이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あいつらを送り込んできたのが、世界をぐちゃぐちゃにしている元凶に違いないわ！」"
translation = "「그 녀석들을 보내온 게 세계를 엉망으로 만들고 있는 원흉임이 틀림없어!」"

[[dialogue]]
speaker = "？？？"
original = "『そのとーり……くまっ♪』"
translation = "『그 마알대로다……곰♪』"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「っ！！？\u3000この声は、私がこの世界に飛ばされる時に聞こえてきた──」"
translation = "「!!? 이 목소리는 내가 이 세계로 날려질 때 들려왔던──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この声、どこから！？\u3000姿を現しなさい！！」"
translation = "「이 목소리, 어디서!? 모습을 나타내!!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「じゃじゃーん！」"
translation = "「짜잔!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「まさか本当に現れてくれるとは思いませんでしたが……ぶっ飛ばされる覚悟はできているようですね」"
translation = "「설마 정말로 나타나 줄 줄은 몰랐습니다만…… 얻어맞을 각오는 되어 있는 모양이군요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたは何者？\u3000どうしてこんなことをするの？\u3000アナやサーシャさんは無事なんでしょうね？」"
translation = "「당신은 누구야? 왜 이런 짓을 하는 거지? 아나랑 사샤 씨는 무사하겠지?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「そんなにいっぺんに聞かれても答えられないんだくまっ！」"
translation = "「그렇게 한꺼번에 물어봐도 대답할 수 없다곰!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「わたしは黒ベア子！\u3000異世界に送ったお仲間さんたちも、ちゃんと向こうの人と合流できてるよ」"
translation = "「나는 흑베아코! 이세계로 보낸 동료들도 제대로 저쪽 사람들과 합류해 있어.」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「そしてっ、なぜこんなことをしたか！\u3000それはぁ……お祭りっくま～～♪♪」"
translation = "「그리고오, 왜 이런 짓을 했느냐! 그것은…… 축제다곰～～♪♪」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「……お祭り、ですか？」"
translation = "「……축제, 말입니까?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「普段は一緒に遊べないお仲間さんと、いーーーっぱい盛り上がって欲しいくまっ！」"
translation = "「평소에는 같이 놀 수 없는 동료들과 마아아아아니 즐겨줬으면 좋겠다곰!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わけの分からないことを言ってないで元の世界に帰しなさい！」"
translation = "「알 수 없는 소리 하지 말고 원래 세계로 돌려보내!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「それはもっとみんなが楽しんでからくま♪\u3000よーし、頑張るくまよ～～、じゃーあねぇー♪」"
translation = "「그건 좀 더 모두가 즐긴 다음이다곰♪ 좋아, 힘내라곰～～, 그럼 안녀어엉♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ、ちょっと待ちなさい──！\u3000って、消えたわね」"
translation = "「앗, 잠깐 기다려──! 어라, 사라졌네.」"

[[dialogue]]
speaker = "unk"
original = "でもアナとサーシャさんが無事なのは……"
translation = "그래도 아나와 사샤 씨가 무사하다는 건……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね、ひとまず安心したわ」"
translation = "「그렇네, 일단 안심이야.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「では、その黒クマの『お祭り』とやらに備えるとして……こちらの世界ではあなたたちのお世話になることにしましょう」"
translation = "「그럼 그 검은 곰의 『축제』라는 것에 대비하기로 하고…… 이쪽 세계에서는 당신들의 신세를 지기로 하죠.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「では、よっこらせっと……」"
translation = "「그럼, 영차……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっとちょっと、何でソファで寝ようとしてるのよ！」"
translation = "「잠깐 잠깐, 왜 소파에서 자려고 하는 거야!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「まずは寝床を確保しなければならないと思いまして」"
translation = "「우선 잠자리를 확보해야 한다고 생각해서요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ちょうど寝心地の良さそうなソファがありましたので横になってみましたが、これはなかなか……」"
translation = "「마침 잠자리가 편해 보이는 소파가 있기에 누워봤습니다만, 이거 꽤나……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたは私の家で面倒見てあげるわ。だから応接用のソファを占拠しないの」"
translation = "「당신은 우리 집에서 돌봐줄게. 그러니까 응접용 소파를 점거하지 마.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まったくとんでもない居候が舞い込んできたものね」"
translation = "「정말이지 엄청난 식객이 굴러 들어왔네.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ほう、どこかの誰かみたいなことを言いますね」"
translation = "「호오, 어디의 누구 같은 소리를 하는군요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「では私もいつかのこのセリフをお返しするとしましょう、私が寝るところは私が決めます、と……ふふっ」"
translation = "「그럼 저도 언젠가의 이 대사를 돌려드리도록 하죠. 제가 잘 곳은 제가 정합니다, 라고…… 후훗.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何を得意げな顔をしてるのよ、もっと寝心地のいい寝床を用意してあげるって言ってるんだから素直に聞きなさい」"
translation = "「뭘 득의양양한 얼굴을 하고 있는 거야, 더 잠자리 편한 곳을 마련해 주겠다고 하는 거니까 순순히 들어.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ふむ、折角の好意を無下にはできませんね。ではお言葉に甘えるとしましょうか」"
translation = "「흠, 모처럼의 호의를 무시할 수는 없겠군요. 그럼 말씀대로 신세를 질까요.」"

[[dialogue]]
speaker = "unk"
original = "あれ、お客さんかな？"
translation = "어라, 손님인가?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうぞ、開いてるわよ～」"
translation = "「들어와요, 열려 있어～」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「失礼します……」"
translation = "「실례합니다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いらっしゃい、フィオナ。と──」"
translation = "「어서 와, 피오나. 그리고──」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「こんにちはー、お邪魔しまーす♪」"
translation = "「안녕하세요ー, 실례하겠습니다♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その子は……誰？」"
translation = "「그 아이는…… 누구?」"

