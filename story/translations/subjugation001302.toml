[[dialogue]]
speaker = "unk"
original = "『遠からん者は音に聞け、近くば寄って目にも見よ。余は光の魔女にしてネビュラ総帥──クラウディア・イルゼ・フォン・ゴッドフリートである！』"
translation = "『멀리 있는 자는 소리로 듣고, 가까이 있는 자는 가까이서 보아라. 여는 빛의 마녀이자 네뷸라 총수── 클라우디아 일제 폰 고트프리트이니라!』"

[[dialogue]]
speaker = "unk"
original = "通信が繋がり、空中に生み出されたスクリーンから映像が流れてくる。"
translation = "통신이 연결되고 공중에 생성된 스크린에서 영상이 흘러나온다."

[[dialogue]]
speaker = "unk"
original = "突然の、そして意外な人物からの接触に驚きの声が上がった。"
translation = "갑작스럽고도 의외인 인물과의 접촉에 놀라움 섞인 목소리가 터져 나왔다."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「なんでい！？\u3000ずいぶんと偉そうなのが出てきやがった！？」"
translation = "「뭐여!? 웬 거드름 피우는 녀석이 나타났구만!?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "『偉そうなのではない。余は実際に偉いのだ』"
translation = "『거드름을 피우는 것이 아니다. 여는 실제로 위대하니라.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヘレナちゃん、どういうこと？\u3000どうして魔女が出てくるのよ」"
translation = "「헬레나짱, 어떻게 된 거야? 왜 마녀가 나타나는 건데.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私たちも手をこまねいていたわけではない。こうなることを見越して、先の戦いの後、緋宮リノを通じてネビュラと交渉していたのだ」"
translation = "「우리도 손 놓고 있었던 건 아니다. 이렇게 될 것을 예상하고 지난 전투 이후 히노미야 리노를 통해 네뷸라와 교섭하고 있었다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『ネビュラとしても、守護天使が封印されていることは懸案事項だった。リクリエを食い止めても、世界の機能が停止しては意味がないからな』"
translation = "『네뷸라로서도 수호천사가 봉인되어 있는 것은 현안 사항이었다. 리크리에를 막아내도 세계의 기능이 정지되면 의미가 없으니까.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『本題に入ろう。我々ネビュラには事態を解決する術がある』"
translation = "『본론으로 들어가지. 우리 네뷸라에게는 사태를 해결할 수단이 있다.』"

[[dialogue]]
speaker = "unk"
original = "世界樹を使うのか？"
translation = "세계수를 사용하는 건가?"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『そうだ。魔女の森と三界を繋ぐ世界樹を使えば、魔界の各地に戦力を送り込める』"
translation = "『그렇다. 마녀의 숲과 삼계를 잇는 세계수를 사용하면 마계 각지에 전력을 보낼 수 있지.』"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「信用してもいいのかしら？\u3000前の時は、帰ろうとしたら入口を閉められたけれど」"
translation = "「믿어도 되는 걸까? 지난번엔 돌아가려고 하니까 입구를 닫아버렸잖아.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『あの時は貴様たちが帰ってくると不都合だったからな。理由がなければ素直に返すさ』"
translation = "『그때는 귀공들이 돌아오면 곤란했으니까 말이다. 이유가 없다면 순순히 돌려보내 주지.』"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「とはいえ魔界ではしてやられましたし……。ですが他に手段は……」"
translation = "「그렇긴 해도 마계에서는 당하기도 했고……. 하지만 다른 수단이……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『大丈夫よ、私が見てるから』"
translation = "『괜찮아, 내가 보고 있으니까.』"

[[dialogue]]
speaker = "unk"
original = "母さん！？"
translation = "엄마!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『さっきも言ってたでしょ、私が仲介したって。それに意味もない嫌がらせをするほどネビュラは酔狂じゃないわ』"
translation = "『아까도 말했잖아, 내가 중개했다고. 게다가 아무 의미도 없는 심술을 부릴 정도로 네뷸라는 한가하지 않아.』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「心境としては複雑ですが……私は彼女たちを信じます」"
translation = "「심정적으로는 복잡합니다만…… 저는 그녀들을 믿겠습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「やり方が違うとはいえ、彼女たちの世界を救おうとする意志は本物でした。だからこそ私たちはぶつかったんだと思います」"
translation = "「방식은 다르지만 그녀들의 세계를 구하려는 의지는 진짜였습니다. 그렇기에 저희는 충돌했던 것이라 생각합니다.」"

[[dialogue]]
speaker = "unk"
original = "俺もネビュラを信じる"
translation = "나도 네뷸라를 믿어."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトがそう言うなら仕方ないわね。でも変なことしたら、魔界の空をぶち破って戻ってきちゃうんだから！」"
translation = "「쿠로토가 그렇게 말한다면 어쩔 수 없네. 하지만 딴짓하면 마계 하늘을 뚫어버리고 돌아올 거니까!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『フ──それはそれで見物だが、そうはならないと約束しよう』"
translation = "『후── 그건 그것대로 볼만하겠지만, 그렇게 되지 않겠다고 약속하마.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『話が決まったところで作戦の説明を進めよう。天使の本体は現在、魔界の各地の<ruby>旧<rt>ふる</rt></ruby>い神殿に封印されている』"
translation = "『이야기가 매듭지어졌으니 작전 설명을 계속하지. 천사의 본체는 현재 마계 각지의 옛 신전에 봉인되어 있다.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『魔界にもかつては守護天使への信仰があったのだろう。とはいえ、千年以上放置され、ほとんど廃墟になっているがな』"
translation = "『마계에도 한때는 수호천사에 대한 신앙이 있었겠지. 하지만 천 년 넘게 방치되어 거의 폐허가 되어버렸지만 말이야.』"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「守護天使が封印された場所については、九浄家も情報を集めていた」"
translation = "「수호천사가 봉인된 장소에 대해서는 쿠죠 가문도 정보를 모으고 있었다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「我々とネビュラ、そして匿名の情報提供者の情報を合わせ、特定に至ったのが……」"
translation = "「우리와 네뷸라, 그리고 익명의 정보 제공자의 정보를 합쳐 특정에 이른 것이……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「《境界》のマグダレナ、《命脈》のアルモタヘル、《円環》のラクシャ、《万成》のアウクセシア、《試練》のパテルの五柱だ」"
translation = "「《경계》의 마그달레나, 《명맥》의 아르모타헬, 《원환》의 라크샤, 《만성》의 아우크세시아, 《시련》의 파텔의 다섯 기둥이다.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「匿名の情報提供者？\u3000って、誰なんです？」"
translation = "「익명의 정보 제공자? 그게 누구예요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「わからないから匿名なのだ。だが心当たりがある者もいるだろう」"
translation = "「모르니까 익명인 것이다. 하지만 짚이는 구석이 있는 자도 있겠지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もしかして環がっ？」"
translation = "「설마 타마키가!?」"

[[dialogue]]
speaker = "unk"
original = "俺やヴィーナスと同じ学年の生徒・市倉環の正体は、守護天使《円環》のラクシャだった。"
translation = "나나 비너스와 같은 학년인 학생 이치쿠라 타마키의 정체는 수호천사 《원환》의 라크샤였다."

[[dialogue]]
speaker = "unk"
original = "魔界に囚われていたヴィーナスによると、環はセイファートに協力する代わり、守護天使が封印されていた場所を聞いていたという。"
translation = "마계에 갇혀 있던 비너스에 따르면 타마키는 세이파트에게 협력하는 대신 수호천사가 봉인된 장소를 듣고 있었다고 한다."

[[dialogue]]
speaker = "unk"
original = "環は現在新星学園には戻っておらず、姿を消したままだ。"
translation = "타마키는 현재 신성학원으로 돌아오지 않았으며 행방이 묘연한 상태다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「正体がわからないものに助けられるのはいささか釈然としないが、ネビュラによって情報の裏取りは済んでいる」"
translation = "「정체를 알 수 없는 자에게 도움을 받는 것이 다소 찜찜하긴 하지만, 네뷸라를 통해 정보 교차 확인은 끝난 상태다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「残る一柱の所在は不明ですが、我々五柱を復活させることができれば、当面の間は世界の維持が可能でしょう」"
translation = "「남은 한 기둥의 소재는 불분명합니다만, 우리 다섯 기둥을 부활시킬 수 있다면 당분간 세계 유지는 가능하겠지요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『作戦はいたって単純だ。流星市国から魔界にある神殿に戦力を送り込み、堕天使となった守護天使を撃破する』"
translation = "『작전은 지극히 단순하다. 유성시국에서 마계에 있는 신전으로 전력을 보내 타락천사가 된 수호천사를 격파한다.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『ただし世界樹で送れる戦力には限りがある。一ヵ所につき十数名が限界だろう』"
translation = "『다만 세계수로 보낼 수 있는 전력에는 한계가 있다. 한 곳당 십수 명이 한계겠지.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『そしておそらく、堕天使は今までに戦ったものより格段に強い。何せ女神に近い高等存在の本体。死闘になるのは必至だ』"
translation = "『그리고 아마도 타락천사는 지금까지 상대했던 것보다 훨씬 강할 것이다. 명색이 여신에 가까운 고등 존재의 본체니까. 사투가 벌어지는 건 필연이다.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『また、案内として各チームにはネビュラの魔女が同行する。世界樹の中で迷子になっては敵わないからな』"
translation = "『또한 안내역으로서 각 팀에는 네뷸라의 마녀가 동행한다. 세계수 안에서 길을 잃으면 안 되니까.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『しかし魔界への道を開くのに膨大な魔力を消費する。世界樹にかかる負担も大きい。チャンスは一度きりだ』"
translation = "『그러나 마계로 가는 길을 여는 데 막대한 마력을 소비한다. 세계수에 가해지는 부담도 크지. 찬스는 단 한 번뿐이다.』"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「つまり敗北は許されない。<ruby>乾坤一擲<rt>けんこんいってき</rt></ruby>の戦いだ。心してくれ」"
translation = "「즉 패배는 허용되지 않는다. 건곤일척의 싸움이다. 각오해라.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「この前世界を守ったと思ったのに、また世界の危機なんて……しかも失敗したら終わりとか、心臓がバクバクしちゃうよ」"
translation = "「요전에 세계를 지켰다고 생각했는데 또 세계의 위기라니…… 게다가 실패하면 끝이라니 심장이 두근거려.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひょえ～……息つく間もありませんよぉ～」"
translation = "「횅~…… 숨 돌릴 틈도 없네요~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「しかし、以前魔界に行く時は渋々でしたのに、今回はすんなりと世界樹を使わせていただけるんですね」"
translation = "「하지만 예전에 마계에 갈 때는 그렇게 꺼리시더니 이번에는 순순히 세계수를 쓰게 해주시는군요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『本来なら魔女以外の者を──しかもこれほどの数を、神聖なる世界樹に通したくはない。だがここで見過ごしては祖先に顔向けができないからな』"
translation = "『본래라면 마녀 이외의 자를── 그것도 이 정도의 수를 신성한 세계수에 통과시키고 싶지는 않다. 하지만 여기서 방관했다간 조상님들을 뵐 낯이 없으니까.』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『魔女と星騎士の初めての合同作戦だ。認めたくないが、少人数での多方面制圧ならそちらに分がある。期待させてもらう』"
translation = "『마녀와 성기사의 첫 합동 작전이다. 인정하고 싶지는 않지만 소수 인원의 다방면 제압이라면 그쪽이 유리하지. 기대하마.』"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "『ふっふっふ……余の力、存分に見せてやろう！\u3000ついでに魔界を物見遊山といこうではないか♪』"
translation = "『훗훗훗…… 여의 힘을 마음껏 보여주마! 겸사겸사 마계 유람이나 해볼까나♪』"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "『姫はお留守番です。私とともに世界樹に魔力を注ぐ者が必要ですので』"
translation = "『공주님은 남으셔야 합니다. 저와 함께 세계수에 마력을 불어넣을 사람이 필요하니까요.』"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "『なに～！？』"
translation = "『뭐라느냐~!?』"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「黒いスーツの姉ちゃん、厳しいことばっかり言ってくれるぜ……。まぁ悔しいけど、プリマステラになってそこそこのあたしの実力じゃ、この作戦はついていけねえ──」"
translation = "「검은 수트 누님, 엄한 소리만 골라 하는구먼……. 뭐 분하긴 하지만 프리마스텔라가 되고 나서도 시원찮은 내 실력으론 이 작전에 따라갈 수 없겠지──」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さん？」"
translation = "「누님?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ねぇ、私もこの作戦に参加していい？\u3000マグダレナ様を解放するチームに入りたいんだけど」"
translation = "「저기, 나도 이 작전에 참가해도 될까? 마그달레나 님을 해방하는 팀에 들어가고 싶은데.」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さんも行くのか！？\u3000絶対危険なやつだぜ！？」"
translation = "「누님도 가는 거야!? 백퍼 위험한 일이란 말야!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「当然だよ。私はマグダレナ様に仕える者なんだから」"
translation = "「당연하지. 나는 마그달레나 님을 모시는 자니까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、もちろん。ミルフィーの実力なら大歓迎よ。こっちからお願いしたいくらいだわ！」"
translation = "「그럼, 물론이지. 밀피의 실력이라면 대환영이야. 우리 쪽에서 부탁하고 싶을 정도라구!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ありがとう。──ではマグダレナ様、行って参ります」"
translation = "「고마워. ──그럼 마그달레나 님, 다녀오겠습니다.」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「よろしくお願いします。ですが、決して無理はしないでくださいね」"
translation = "「잘 부탁드려요. 하지만 절대로 무리는 하지 마세요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「敵陣に乗り込んでぶっ潰す！\u3000やることがわかってんなら悩むことはねえな」"
translation = "「적진에 처 들어가서 박살 낸다! 할 일이 정해졌으면 고민할 거 없지.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「すべきことは単純。やると決めたら、後は効率的に動くのみです」"
translation = "「해야 할 일은 단순. 하기로 결정했다면 남은 건 효율적으로 움직이는 것뿐입니다.」"

[[dialogue]]
speaker = "unk"
original = "みんなで世界を守るぞ！"
translation = "다 함께 세계를 지키는 거야!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん。マグダレナ様を祀る一族として、守護天使様を必ず解放するよ！」"
translation = "「응. 마그달레나 님을 모시는 일족으로서 수호천사님을 반드시 해방할게!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「話は聞いたわね。私たち新星学園の星騎士も魔界に向かい、守護天使を解放するわ」"
translation = "「이야기는 들었겠지. 우리 신성학원의 성기사들도 마계로 향해 수호천사를 해방하겠다.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「星徒会ばかりにいい格好はさせない。堕天使だろうと跪かせてやるわ！」"
translation = "「학생회 녀석들에게만 좋은 꼴을 보게 하진 않겠어. 타락천사든 뭐든 무릎 꿇려 주마!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「流星学園からもプリマステラを選抜させていただきました。しかし世界樹によって流星市国と魔界を繋げられる時間はわずか。帰還まで気を抜かないでください」"
translation = "「유성학원에서도 프리마스텔라를 선발했습니다. 하지만 세계수로 유성시국과 마계를 이을 수 있는 시간은 짧습니다. 귀환할 때까지 방심하지 마세요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「さぁ、世界の危機を共に打ち砕きますわよ！」"
translation = "「자, 세계의 위기를 함께 타파합시다!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「プリマステラの数では流星本校や新星学園には及びませんが、附属校も戦います。みんなの力を合わせましょう！」"
translation = "「프리마스텔라 수로는 유성 본교나 신성학원에 미치지 못하지만 부속교도 싸우겠습니다. 모두의 힘을 합쳐요!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "『では魔界へ送り出すぞ。星騎士たちよ、存分に暴れるがいい！』"
translation = "『그럼 마계로 보내주마. 성기사들이여, 마음껏 날뛰어라!』"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "『オペレーション・ペンタグラム──スタートだ！』"
translation = "『오퍼레이션 펜타그램── 스타트다!』"

