[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「ねぇ、ちょっと会長さんとやってみたいことがあるんだけど」"
translation = "「있지, 잠깐 회장님이랑 해보고 싶은 게 있는데」"

[[dialogue]]
speaker = "クロト"
original = "「また新しいゲーム買った？」"
translation = "「또 새로운 게임 샀어?」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「まだ何も言ってないよ！？」"
translation = "「아직 아무 말도 안 했거든!?」"

[[dialogue]]
speaker = "unk"
original = "コハルコはエッチなゲームを幅広くプレイしており、そこから着想を得ることも多い。"
translation = "코하르코는 야한 게임을 폭넓게 플레이하고 있으며, 거기서 착상을 얻는 경우도 많다."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「いやぁ、こういうシチュもありなんだなって思って。結界魔法の練習にもなるからやってみようよ」"
translation = "「아니, 이런 시츄에이션도 괜찮겠다 싶어서. 결계 마법 연습도 되니까 한번 해보자」"

[[dialogue]]
speaker = "クロト"
original = "「魔法の練習にもなる……？\u3000何する気……？」"
translation = "「마법 연습도 된다고……? 뭘 할 생각인데……?」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「それはね……ゴニョゴニョゴニョ……」"
translation = "「그건 말이지…… 소곤소곤소곤……」"

[[dialogue]]
speaker = "unk"
original = "コハルコに耳打ちされ、想像力を刺激されて興奮が高まる。"
translation = "코하르코가 귓속말을 하자, 상상력이 자극되어 흥분이 고조된다."

[[dialogue]]
speaker = "unk"
original = "そしてコハルコが結界で空間を生み出して──"
translation = "그리고 코하르코가 결계로 공간을 만들어내고──"

[[dialogue]]
speaker = "コハルコ"
original = "「い、いやっ……やめて……」"
translation = "「이, 싫어…… 그만둬……」"

[[dialogue]]
speaker = "unk"
original = "薄暗い牢の中、後ろ手に縛られ、尻を突き出す姿勢にさせられるコハルコ。"
translation = "어둑어둑한 감옥 안, 뒷수갑이 채워진 채 엉덩이를 내미는 자세가 된 코하르코."

[[dialogue]]
speaker = "unk"
original = "服が破られて着やせする大きな胸が露わになり、秘部も剥き出しにされている。"
translation = "옷이 찢겨나가 숨겨져 있던 커다란 가슴이 드러나고, 비부도 노출되어 있다."

[[dialogue]]
speaker = "コハルコ"
original = "『あっ、あっ、あっ──んああぁ～～っ<emoji=heart04>\u3000映像を見ている皆さん<emoji=heart04>\u3000美少女ハッカーが、卵子まで屈服しちゃうところ、見てくださいっ<emoji=heart04>』"
translation = "『앗, 앗, 앗── 응아아아~~앗♥ 영상을 보고 계신 여러분♥ 미소녀 해커가, 난자까지 굴복당하는 모습, 봐주세요♥』"

[[dialogue]]
speaker = "コハルコ"
original = "『正義のハッカーがはしたなくイッて、赤ちゃん孕みますっ<emoji=heart04>\u3000はぁっ、あっ、んんっ<emoji=heart04>\u3000子宮まで、悪い人のものにされちゃいますっ<emoji=heart04>』"
translation = "『정의의 해커가 천박하게 가버려서, 아기 임신할게요♥ 하아, 앗, 응응♥ 자궁까지, 나쁜 사람의 것이 되어버려요♥』"

[[dialogue]]
speaker = "unk"
original = "美少女ハッカー・ジャスティスウィザードは自身が罰した悪に捕まり、快楽漬けにされて、ペニスを咥えるだけのメスに堕ちた。"
translation = "미소녀 해커 저스티스 위저드는 자신이 벌했던 악에게 붙잡혀, 쾌락에 절여진 채 자지를 물기만 하는 암컷으로 타락했다."

[[dialogue]]
speaker = "unk"
original = "一度は救出され、正気を取り戻したが、再び捕えられて調教を受けようとしている──という状況だ。"
translation = "한번은 구출되어 제정신을 차렸지만, 다시 붙잡혀 조교를 받으려 하고 있다──는 상황이다."

[[dialogue]]
speaker = "コハルコ"
original = "「いやっ、やめて……離してっ、離してくださいっ」"
translation = "「싫어, 그만둬…… 놔줘, 놔주세요」"

[[dialogue]]
speaker = "unk"
original = "コハルコは拘束を逃れようと腕をもがかせるが、その程度の抵抗では緩みもしない。"
translation = "코하르코는 구속에서 벗어나려 팔을 허우적거리지만, 그 정도 저항으로는 풀리지도 않는다."

[[dialogue]]
speaker = "unk"
original = "身じろぎするせいでお尻が揺れて、むしろ誘っているようだ。"
translation = "몸부림치는 탓에 엉덩이가 흔들려, 오히려 유혹하는 것 같다."

[[dialogue]]
speaker = "クロト"
original = "「久しぶりじゃないか、ジャスティスウィザード」"
translation = "「오랜만이군, 저스티스 위저드」"

[[dialogue]]
speaker = "コハルコ"
original = "「ひっ……」"
translation = "「히익……」"

[[dialogue]]
speaker = "unk"
original = "俺の顔を見るなり、過去が蘇るのか、コハルコの顔が恐怖に歪む。"
translation = "내 얼굴을 보자마자 과거가 되살아나는지, 코하르코의 얼굴이 공포로 일그러진다."

[[dialogue]]
speaker = "コハルコ"
original = "「いやっ、いやっ……私もう嫌なのっ……おま○こいやっ、おち○ぽいやぁっ」"
translation = "「싫어, 싫어…… 나 이제 싫어…… 보지 싫어, 자지 싫어어」"

[[dialogue]]
speaker = "クロト"
original = "「そんなこと言って、前はあんなに気持ち良さそうに喘いでいたじゃないか」"
translation = "「그런 말을 하면서, 전에는 그렇게 기분 좋다는 듯이 헐떡였잖아」"

[[dialogue]]
speaker = "コハルコ"
original = "「ち、違うのっ……あれは、あなたたちに無理やり犯されて……あんなの私じゃないっ！\u3000私はあんな……」"
translation = "「아, 아니야…… 그건, 당신들에게 억지로 범해져서…… 저건 내가 아니야! 나는 저런……」"

[[dialogue]]
speaker = "クロト"
original = "「嘘をつくな。口とま○こと尻にち○ぽ咥え込んで、カメラの前で孕ませてっておねだりまでして、真正の淫乱じゃなきゃああはならねえよ」"
translation = "「거짓말 마라. 입이랑 보지랑 똥구멍에 자지 물고서, 카메라 앞에서 임신시켜 달라고 조르기까지 했으면서, 진성 음란녀가 아니고서야 그렇게 될 리가 없지」"

[[dialogue]]
speaker = "コハルコ"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "コハルコは必死に淫らな自分を否定しようとするが、過去を突き付けられて恥辱に震える。"
translation = "코하르코는 필사적으로 음란한 자신을 부정하려 하지만, 과거를 마주하게 되자 치욕에 떤다."

[[dialogue]]
speaker = "クロト"
original = "「本当のお前を思い出させてやる」"
translation = "「진짜 너를 기억나게 해주지」"

[[dialogue]]
speaker = "unk"
original = "剥き出しになったコハルコの股間に、いきり立ったペニスを擦りつける。"
translation = "드러난 코하르코의 가랑이에, 발기한 성기를 문지른다."

[[dialogue]]
speaker = "コハルコ"
original = "「ひぃんっ！？」"
translation = "「히잉!?」"

[[dialogue]]
speaker = "unk"
original = "するとくちゅっと濡れた音が鳴り、他ならぬコハルコの口から甲高い嬌声がこぼれた。"
translation = "그러자 쿠츄 하고 젖은 소리가 울리며, 다름 아닌 코하르코의 입에서 날카로운 교성이 흘러나왔다."

[[dialogue]]
speaker = "クロト"
original = "「ほら、犯されるのを期待して濡れてやがる。よく躾けられたメス穴だよ」"
translation = "「봐라, 범해지는 걸 기대하며 젖어 있잖아. 잘 길들여진 암컷 구멍이군」"

[[dialogue]]
speaker = "コハルコ"
original = "「ち、ちがう……私はメス穴じゃ、ない……」"
translation = "「아, 아니야…… 나는 암컷 구멍이, 아니야……」"

[[dialogue]]
speaker = "unk"
original = "あくまでも否定しようとするコハルコを無視し、無言で亀頭を秘裂に押し当てる。"
translation = "끝까지 부정하려는 코하르코를 무시하고, 무언으로 귀두를 비열에 밀어붙인다."

[[dialogue]]
speaker = "コハルコ"
original = "「んんっ……！\u3000いや、やめて……おち○ぽ入れないで、ください……他のことなら何でもするから……」"
translation = "「응으윽……! 싫어, 그만둬…… 자지 넣지 마세요…… 다른 거라면 뭐든 할 테니까……」"

[[dialogue]]
speaker = "コハルコ"
original = "「もう戻りたくないの……あんなの嫌なの……だから、やめて……いやっ、おち○ぽいやぁっ！」"
translation = "「이제 돌아가고 싶지 않아…… 그런 거 싫어…… 그러니까, 그만둬…… 싫어, 자지 싫어어!」"

[[dialogue]]
speaker = "unk"
original = "涙をにじませ、声を震わせて許しを乞うコハルコ。"
translation = "눈물을 글썽이며, 목소리를 떨며 용서를 구하는 코하르코."

[[dialogue]]
speaker = "unk"
original = "当然そんな哀願を聞き入れるわけもなく──"
translation = "당연히 그런 애원을 들어줄 리도 없고──"

[[dialogue]]
speaker = "コハルコ"
original = "「んひぃ～～～～～～～っ！！？」"
translation = "「응히이~~~~~~~~익!!?」"

[[dialogue]]
speaker = "unk"
original = "コハルコの中は愛液で溢れており、ペニスを容易く奥まで呑み込んだ。"
translation = "코하르코의 안은 애액으로 넘쳐나고 있었고, 성기를 손쉽게 안쪽까지 집어삼켰다."

[[dialogue]]
speaker = "unk"
original = "柔らかい膣壁がぎゅっとしがみつきながら、ぶるぶると震えている。"
translation = "부드러운 질벽이 꽉 매달리면서, 부르르 떨고 있다."

[[dialogue]]
speaker = "コハルコ"
original = "「はぁ……はひっ……ひぃっ<emoji=heart04>\u3000おち○ぽいやぁ……」"
translation = "「하아……하히……히익♥ 자지 싫어어……」"

[[dialogue]]
speaker = "クロト"
original = "「入れられただけでよがりやがって。やっぱりお前はメス穴なんだよ」"
translation = "「넣어준 것만으로 가버리다니. 역시 너는 암컷 구멍이야」"

[[dialogue]]
speaker = "コハルコ"
original = "「ちがう、ちがうのぉ……」"
translation = "「아니야, 아니야아……」"

[[dialogue]]
speaker = "unk"
original = "弱々しい声で否定しようとするが、熱い粘膜はきゅっと収縮しながら絡みついてくる。"
translation = "약한 목소리로 부정하려 하지만, 뜨거운 점막은 꽉 수축하며 얽혀온다."

[[dialogue]]
speaker = "unk"
original = "このメスに自分の本性を教えるために、再び快楽を刻むために、腰を動かし始める。"
translation = "이 암컷에게 자신의 본성을 가르쳐주기 위해, 다시금 쾌락을 새기기 위해, 허리를 움직이기 시작한다."

[[dialogue]]
speaker = "コハルコ"
original = "「はぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おち○ぽ、中で動いて……あっ、ひっ……犯されてるぅ……」"
translation = "「하앗♥ 하♥ 안♥ 응♥ 자지, 안에서 움직여서……앗, 히……범해지고 있어어……」"

[[dialogue]]
speaker = "コハルコ"
original = "「いや、いやぁ……あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000お腹、広げられてる……ひっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私のおま○こ、おち○ぽの形にされて……んんっ……<emoji=heart04>」"
translation = "「싫어, 싫어어……앗♥ 응♥ 배, 벌려지고 있어……히♥ 앗♥ 내 보지, 자지 모양이 되어버려서……으응……♥」"

[[dialogue]]
speaker = "unk"
original = "力任せに奥を突くような乱暴な動きだが、コハルコの口からは痛みではなく、甘い声が漏れる。"
translation = "힘껏 안쪽을 찌르는 듯한 난폭한 움직임이지만, 코하르코의 입에서는 고통이 아니라 달콤한 목소리가 샌다."

[[dialogue]]
speaker = "unk"
original = "突かれる度に大きな胸を揺らして、男に媚びているかのようだ。"
translation = "찔릴 때마다 큰 가슴을 흔들며, 남자에게 아양을 떠는 듯하다."

[[dialogue]]
speaker = "コハルコ"
original = "「ひんっ<emoji=heart04>\u3000ひぐっ<emoji=heart04>\u3000やめて……おち○ぽ動かさないでっ……あっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>」"
translation = "「힝♥ 히긋♥ 그만해…… 자지 움직이지 마……앗♥ 히아아앗♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「んっ……んんっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ぃっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000はぁ、はっ……はぁっ、あっ、あんっ……んああっ<emoji=heart04>」"
translation = "「응……으응♥ 히♥ 이♥ 히아아앗♥ 하아, 하……하앗, 앗, 안……으아앗♥」"

[[dialogue]]
speaker = "クロト"
original = "「嫌がってたくせに濡れてるぞ。あんあん気持ち良さそうに喘いで、よくできたメス穴だな」"
translation = "「싫어하던 주제에 젖어 있잖아. 앙앙 기분 좋게 헐떡이면서, 잘 길들여진 암컷 구멍이군」"

[[dialogue]]
speaker = "コハルコ"
original = "「ち、ちがうのぉ……あっ<emoji=heart04>\u3000おち○ぽ大きいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000ズンズン来てっ……んんんっ<emoji=heart04>」"
translation = "「아, 아니야아……앗♥ 자지 커♥ 앗♥ 히잇♥ 즈큥즈큥 들어와서……으으응♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000声、出ちゃうっ……ひやぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ、はっ、はぁ……<emoji=heart04>」"
translation = "「앗♥ 응♥ 목소리, 나와버려……히야앗♥ 앗♥ 하앗, 하, 하아……♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「やっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000おち○ぽいやっ<emoji=heart04>\u3000いやなのにっ──ひぃんっ<emoji=heart04>\u3000あっ、んぁっ、んぁああっ<emoji=heart04>」"
translation = "「싫어♥ 아앗♥ 자지 싫어♥ 싫은데──히잉♥ 앗, 응아, 응아아앗♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「はっ、あっ、あっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000お腹の中で、おち○ぽゴリゴリって、しないでぇっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんん～～っ<emoji=heart04>」"
translation = "「하, 앗, 앗♥ 히아아앗♥ 배 속에서, 자지 고리고리하게, 하지 마아♥ 히앗♥ 앗♥ 으으으~~윽♥」"

[[dialogue]]
speaker = "unk"
original = "鉄格子の牢獄に、コハルコの嬌声が響き渡る。"
translation = "쇠창살 감옥에 코하르코의 교성이 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "メスの本能と快感には抗えず、涙を流しながら喘いでいた。"
translation = "암컷의 본능과 쾌감에는 저항하지 못한 채, 눈물을 흘리며 헐떡이고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「泣きながらメス顔してやがる。ここまでの淫乱は見たことねえよ」"
translation = "「울면서 암컷 얼굴을 하고 있구먼. 이 정도의 음란함은 본 적이 없어」"

[[dialogue]]
speaker = "コハルコ"
original = "「いやっ、見ないでぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000わたし、わたし……んっ<emoji=heart04>\u3000ひぃああっ<emoji=heart04>」"
translation = "「싫어, 보지 마아♥ 앗♥ 히♥ 나, 나……응♥ 히이아앗♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「ち、ちがうのぉ……あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000気持ち良くなんて、なりたくな──ひああっっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>」"
translation = "「아, 아니야아……앗♥ 앗♥ 기분 좋게 같은 건, 되고 싶지 않──히아앗♥ 앗♥ 화아앗♥」"

[[dialogue]]
speaker = "クロト"
original = "「違わねえよ。お前は淫乱メス穴オナホだ」"
translation = "「다르지 않아. 너는 음란 암컷 구멍 오나홀이다」"

[[dialogue]]
speaker = "コハルコ"
original = "「そん、な……んひっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000わたし、メス穴じゃ、な、い……んんっ<emoji=heart04>」"
translation = "「그럴, 수가……응히♥ 응앗♥ 앗♥ 나, 암컷 구멍, 아, 니야……으응♥」"

[[dialogue]]
speaker = "unk"
original = "コハルコの必死の否定も虚しく、俺を昂らせるだけだ。"
translation = "코하르코의 필사적인 부정도 허무하게, 나를 흥분시킬 뿐이다."

[[dialogue]]
speaker = "unk"
original = "泣きながら喘ぐコハルコをもっと見たくて、勢いよくペニスを突き立てた。"
translation = "울면서 헐떡이는 코하르코를 좀 더 보고 싶어서, 기세 좋게 페니스를 찔러 넣었다."

[[dialogue]]
speaker = "コハルコ"
original = "「ひぃあああああっ<emoji=heart04><emoji=heart04>」"
translation = "「히이아아아앗♥♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「んひぃっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぁあっ<emoji=heart04>\u3000ち、ちが──んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000わた、わたし、メス穴じゃな──」"
translation = "「응히잇♥ 히♥ 히아앗♥ 아, 아니──응아♥ 앗♥ 나, 나, 암컷 구멍 아니──」"

[[dialogue]]
speaker = "クロト"
original = "「うるさいメス穴だ」"
translation = "「시끄러운 암컷 구멍이군」"

[[dialogue]]
speaker = "コハルコ"
original = "「ひぃっ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker = "クロト"
original = "「尻を叩いてもらった時は何て言うんだった？\u3000教えただろ？」"
translation = "「엉덩이를 맞았을 때는 뭐라고 말해야 했지? 가르쳐줬잖아?」"

[[dialogue]]
speaker = "コハルコ"
original = "「コ、コハルコのお尻を叩いていただいて、ありがとうございます……」"
translation = "「코, 코하르코의 엉덩이를 때려주셔서, 감사합니다……」"

[[dialogue]]
speaker = "クロト"
original = "「そうだ、ちゃんと覚えてるじゃないか」"
translation = "「그래, 제대로 기억하고 있잖아」"

[[dialogue]]
speaker = "コハルコ"
original = "「きひぃっ！？」"
translation = "「키히익!?」"

[[dialogue]]
speaker = "クロト"
original = "「だが尻を叩かれてますます濡れてるぞ。いい加減認めろよ。お前は変態のマゾメス穴だ」"
translation = "「하지만 엉덩이를 맞고 더욱 젖어 있군. 슬슬 인정해라. 너는 변태 마조 암컷 구멍이다」"

[[dialogue]]
speaker = "コハルコ"
original = "「変態……マゾメス穴……はっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000わたし、変態……ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はひぃんっ<emoji=heart04>」"
translation = "「변태……마조 암컷 구멍……하♥ 히♥ 나, 변태……히앗♥ 앗♥ 하♥ 하히잉♥」"

[[dialogue]]
speaker = "unk"
original = "腰を叩きつけるように動かし、より激しく責め立てる。"
translation = "허리를 때려박듯이 움직이며, 더욱 격렬하게 몰아붙인다."

[[dialogue]]
speaker = "コハルコ"
original = "「ひぁあああっ<emoji=heart04>\u3000んぁああっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんん～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히아아앗♥ 응아아앗♥ 아앗♥ 으으으~~윽♥♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「もう気持ちいいの嫌ぁっ！\u3000嫌なのぉっ！\u3000おち○ぽやめてっ！\u3000やめてよぉっ！\u3000おま○こズボズボしないでよぉっ！」"
translation = "「이제 기분 좋은 거 싫어어! 싫어어! 자지 그만해! 그만해애! 보지 즈보즈보 하지 마아!」"

[[dialogue]]
speaker = "コハルコ"
original = "「やだっ、やだやだやだぁっ！\u3000おま○こやだっ！\u3000おち○ぽやだぁっ！」"
translation = "「싫어, 싫어싫어싫어어! 보지 싫어! 자지 싫어어!」"

[[dialogue]]
speaker = "コハルコ"
original = "「メス穴になるの、もう嫌なのぉっ！\u3000いや、やだっ！\u3000戻りたくないっ！\u3000メス穴いやぁあっ！」"
translation = "「암컷 구멍이 되는 거, 이제 싫어어! 싫어, 싫어! 돌아가고 싶지 않아! 암컷 구멍 싫어어앗!」"

[[dialogue]]
speaker = "unk"
original = "半狂乱になって拒絶しようとするコハルコを無視して、ひたすら奥めがけて突き込む。"
translation = "반광란이 되어 거부하려는 코하르코를 무시하고, 오로지 안쪽을 향해 찔러 넣는다."

[[dialogue]]
speaker = "コハルコ"
original = "「ひぎぃいいいっ<emoji=heart04><emoji=heart04>\u3000んぎっ<emoji=heart04>\u3000奥らめっ<emoji=heart04>\u3000らめらめっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぎぃぃっ<emoji=heart04>」"
translation = "「히기이이잇♥♥ 응기♥ 안쪽 안 돼♥ 안 돼안 돼♥ 히♥ 히기이잇♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「はひっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000激しいっ<emoji=heart04>\u3000おま○こ壊れちゃぅっ<emoji=heart04>\u3000はっ、あ、あ、あ、んんん～～～っ<emoji=heart04>」"
translation = "「하히♥ 히♥ 히잉♥ 격렬해♥ 보지 망가져버려♥ 하, 아, 아, 아, 으으으~~~윽♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「いや、いやなのに、おま○こ熱くなっちゃうっ<emoji=heart04>\u3000子宮切なくなって、わたしが、わたしじゃなくなっちゃうぅっ<emoji=heart04>」"
translation = "「싫어, 싫은데, 보지 뜨거워져버려♥ 자궁이 애달파져서, 내가, 내가 아니게 되어버려어♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「ひぃあああっ<emoji=heart04>\u3000おく、おくらめぇっ<emoji=heart04>\u3000おち○ぽで、子宮ぐりぐりされてぇっ<emoji=heart04>\u3000あたま、真っ白になるっ<emoji=heart04>」"
translation = "「히이아앗♥ 안쪽, 안쪽 안 돼애♥ 자지로, 자궁 구리구리 당해서♥ 머릿속, 새하얘져♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「らめっ<emoji=heart04>\u3000おくゴリゴリしちゃらめぇっ<emoji=heart04>\u3000気持ち良すぎるのっ<emoji=heart04>\u3000んぎっ<emoji=heart04>\u3000んひぃいいっ<emoji=heart04>」"
translation = "「안 돼♥ 안쪽 고리고리하면 안 돼애♥ 너무 기분 좋아♥ 응기♥ 응히이잇♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「ひぃいいっ<emoji=heart04>\u3000んひっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000気持ちいいのやだっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000気持ちいいの嫌いなのぉおっ<emoji=heart04>」"
translation = "「히이잇♥ 응히♥ 히♥ 히잉♥ 기분 좋은 거 싫어♥ 싫어♥ 기분 좋은 거 싫어어엇♥」"

[[dialogue]]
speaker = "クロト"
original = "「抵抗するから苦しいんだ。認めろ。そうすれば楽になるぞ」"
translation = "「저항하니까 괴로운 거다. 인정해라. 그러면 편해질 거다」"

[[dialogue]]
speaker = "コハルコ"
original = "「いや、やだ……あっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000わたし、ちがう、から……んぁっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>」"
translation = "「싫어, 싫어……앗♥ 히♥ 나, 아니, 니까……응앗♥ 화아앗♥」"

[[dialogue]]
speaker = "クロト"
original = "「自分でも理解してるだろ？\u3000ま○こが疼いて、メス穴になりたがってるって」"
translation = "「너도 이해하고 있잖아? 보지가 욱신거려서, 암컷 구멍이 되고 싶어 한다는 걸」"

[[dialogue]]
speaker = "コハルコ"
original = "「あ──あ──」"
translation = "「아──아──」"

[[dialogue]]
speaker = "クロト"
original = "「わかったら口答えしたことを謝罪しろ」"
translation = "「알았으면 말대꾸한 것을 사죄해라」"

[[dialogue]]
speaker = "コハルコ"
original = "「はっ、はひぃっ<emoji=heart04>」"
translation = "「하, 하히잇♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「あっ<emoji=heart04>\u3000あひっ<emoji=heart04>\u3000メス穴のくせに、生意気言って、すみませんでした<emoji=heart04>\u3000んひっ<emoji=heart04>\u3000皆様の元を離れて、ご迷惑おかけして、申し訳ありませんでしたっ<emoji=heart04>」"
translation = "「앗♥ 아히♥ 암컷 구멍 주제에, 건방진 소리 해서, 죄송했습니다♥ 응히♥ 여러분의 곁을 떠나서, 폐를 끼쳐드려, 죄송했습니다♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「はぁっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000私は、コハルコは、皆様に種付けしていただくための、孕みオナホですっ<emoji=heart04>」"
translation = "「하앗♥ 히잇♥ 아앗♥ 저는, 코하르코는, 여러분께 씨내리 받기 위한, 임신 오나홀입니다♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「私はおち○ぽ様がないと生きていけない、変態の、マゾメス穴です<emoji=heart04>\u3000おち○ぽ様を恵んでいただくためなら、何でもしますっ<emoji=heart04>」"
translation = "「저는 자지님 없이는 살 수 없는, 변태, 마조 암컷 구멍입니다♥ 자지님을 하사받기 위해서라면, 무엇이든 하겠습니다♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「おち○ぽ様に、気持ち良くなっていただくために、生きています<emoji=heart04>\u3000おち○ぽ様に尽くすのが生きがいですっ<emoji=heart04>」"
translation = "「자지님을, 기분 좋게 해드리기 위해, 살고 있습니다♥ 자지님께 진력하는 것이 삶의 보람입니다♥」"

[[dialogue]]
speaker = "unk"
original = "刻み込まれたメス穴の本能が、コハルコに服従を宣言させる。"
translation = "새겨진 암컷 구멍의 본능이, 코하르코에게 복종을 선언하게 한다."

[[dialogue]]
speaker = "unk"
original = "コハルコの顔は涙でぐしゃぐしゃになっていて、表情とはちぐはぐの従順な言葉にゾクゾクきた。"
translation = "코하르코의 얼굴은 눈물로 엉망이 되어 있고, 표정과는 딴판인 순종적인 말에 전율이 일었다."

[[dialogue]]
speaker = "クロト"
original = "「お前には絶頂すると排卵する薬を飲ませてある。つまり中出しされてイッたら妊娠確実だ。嬉しいか？」"
translation = "「너에게는 절정하면 배란하는 약을 먹여두었다. 즉 질내사정 당해서 가버리면 임신 확실이다. 기쁘냐?」"

[[dialogue]]
speaker = "コハルコ"
original = "「はい、嬉しいですっ<emoji=heart04>\u3000孕ませていただいて幸せですっ<emoji=heart04>\u3000おま○こイッて、あなた様の子どもを妊娠させていただきますっ<emoji=heart04>」"
translation = "「네, 기뻐요♥ 임신하게 해주셔서 행복해요♥ 보지로 가버려서, 당신의 아이를 임신하겠습니다♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「あなた様のために排卵します<emoji=heart04>\u3000あなた様の精子で受精します<emoji=heart04>\u3000着床します<emoji=heart04>\u3000あなた様の子どもを孕みます<emoji=heart04>」"
translation = "「당신을 위해 배란할게요♥ 당신의 정자로 수정할게요♥ 착상할게요♥ 당신의 아이를 밸게요♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「お腹大きくなっても、ボテ腹でおち○ぽ様にご奉仕します<emoji=heart04>\u3000それが、メスの、幸せですからぁっ<emoji=heart04>」"
translation = "「배가 불러와도, 볼록한 배로 자지님께 봉사하겠습니다♥ 그것이, 암컷의, 행복이니까요오♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「はひっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃあああっ<emoji=heart04>\u3000あ──あ──あ──んんっ<emoji=heart04>\u3000ふはっ、あっ、んんん～～～～～っ<emoji=heart04>」"
translation = "「하히♥ 히♥ 히이아앗♥ 아──아──아──으응♥ 후하, 앗, 으으으~~~~~윽♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「おま○こイキますっ<emoji=heart04>\u3000んひっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃぃっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イク<emoji=heart04>\u3000排卵しちゃうっ<emoji=heart04>」"
translation = "「보지 가요♥ 응히♥ 히♥ 히이잇♥ 응아♥ 가♥ 가♥ 배란해버려♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「ひんっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイッて、受精しますっ<emoji=heart04>\u3000孕みましゅっ<emoji=heart04>\u3000孕ませてくだしゃいっ<emoji=heart04>」"
translation = "「힝♥ 히♥ 앗♥ 앗♥ 보지로 가버려서, 수정할게요♥ 임신할게여♥ 임신시켜주세여♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「んひぃっ<emoji=heart04>\u3000あ──あ──あ──ああぁっ<emoji=heart04>\u3000イクイクイク<emoji=heart04>\u3000イッくぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응히잇♥ 아──아──아──아아앗♥ 가가 가♥ 가버려어~~엇♥♥」"

[[dialogue]]
speaker = "unk"
original = "そしてペニスを子宮に叩きつけて──"
translation = "그리고 페니스를 자궁에 때려박으며──"

[[dialogue]]
speaker = "コハルコ"
original = "「ひぃあああ～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히이아아아~~~~~~~~~~앗♥♥♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000熱いの入ってきて、イクっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ビュクビュクって、射精されて、子宮イッてるぅっ<emoji=heart04>」"
translation = "「앗♥ 앗♥ 뜨거운 게 들어와서, 가♥ 으으응♥ 뷰릇뷰릇하고, 사정당해서, 자궁 가버리고 있어어♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「ひぃあっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000イッてるっ<emoji=heart04>\u3000排卵するっ<emoji=heart04>\u3000受精しちゃうぅ～っ<emoji=heart04>」"
translation = "「히이앗♥ 아아앗♥ 가고 있어♥ 배란해♥ 수정해버려어~♥」"

[[dialogue]]
speaker = "unk"
original = "子宮口に亀頭を密着させて、奥の奥に精をぶちまける。"
translation = "자궁구에 귀두를 밀착시켜, 깊숙한 안쪽에 정을 쏟아붓는다."

[[dialogue]]
speaker = "unk"
original = "女の腹に子種を注ぎ、孕ませるための、本能と欲望だけの射精。"
translation = "여자의 배에 씨앗을 붓고, 임신시키기 위한, 본능과 욕망뿐인 사정."

[[dialogue]]
speaker = "コハルコ"
original = "「んんんっ<emoji=heart04>\u3000子宮に、びゅーって、入ってくる……んっ……ぁっ<emoji=heart04>\u3000私の卵子、たっくさんの精子に犯されてるのぉ……<emoji=heart04>」"
translation = "「으으응♥ 자궁에, 뷰우 하고, 들어와……응……앗♥ 내 난자, 수많은 정자에게 범해지고 있어……♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「はぁ、あっ……<emoji=heart04>\u3000絶対、受精しちゃう……赤ちゃん、孕みますぅ……んっ、ん～～～っ<emoji=heart04>」"
translation = "「하아, 앗……♥ 절대, 수정해버려……아기, 밸게요……응, 으으음♥」"

[[dialogue]]
speaker = "コハルコ"
original = "「んっ……はぁ、はぁ……おち○ぽ様、抜けちゃったぁ……」"
translation = "「응……하아, 하아……자지님, 빠져버렸어……」"

[[dialogue]]
speaker = "unk"
original = "乱暴にペニスを引き抜くと、膣内に大量に出された精液が、ごぼっと音を立てて溢れ出た。"
translation = "난폭하게 페니스를 뽑아내자, 질 내에 대량으로 사정된 정액이, 꿀렁 소리를 내며 넘쳐흘렀다."

[[dialogue]]
speaker = "unk"
original = "コハルコは縛られて動けないまま、小刻みに身を震わせている。"
translation = "코하르코는 묶여서 움직이지 못한 채, 미세하게 몸을 떨고 있다."

[[dialogue]]
speaker = "コハルコ"
original = "「コハルコは……おち○ぽ様にご奉仕する変態マゾメス穴です……」"
translation = "「코하르코는……자지님께 봉사하는 변태 마조 암컷 구멍입니다……」"

[[dialogue]]
speaker = "コハルコ"
original = "「だから……メス穴のコハルコを……もっともっと、使ってください……」"
translation = "「그러니까……암컷 구멍인 코하르코를……좀 더 좀 더, 사용해주세요……」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「あ～、思ったことができて満足♪」"
translation = "「아~, 하고 싶은 걸 할 수 있어서 만족♪」"

[[dialogue]]
speaker = "unk"
original = "プレイが終わると、コハルコはいつもけろっとしている。当然お芝居なので、絶頂すると排卵する薬も嘘だ。"
translation = "플레이가 끝나면, 코하르코는 언제나 아무렇지도 않다. 당연히 연기이므로, 절정하면 배란하는 약도 거짓말이다."

[[dialogue]]
speaker = "unk"
original = "……男としては、コハルコに俺の子どもを産んで欲しいとは思うのだけど、それはもっと未来の話になるだろう。"
translation = "……남자로서는, 코하르코가 내 아이를 낳아줬으면 좋겠다고 생각하지만, 그것은 좀 더 미래의 이야기가 될 것이다."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「会長さん、実は引いてない？\u3000大丈夫？」"
translation = "「회장님, 사실 정떨어진 거 아냐? 괜찮아?」"

[[dialogue]]
speaker = "クロト"
original = "「もう慣れたよ。恋人だから」"
translation = "「이제 익숙해졌어. 연인이니까」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「なら良かった。こんなこと会長さん相手じゃないとできないし、もちろん会長さんが好きじゃないとしないからね」"
translation = "「그럼 다행이다. 이런 거 회장님 상대가 아니면 못 하고, 물론 회장님을 좋아하지 않으면 안 하니까 말이야」"

[[dialogue]]
speaker = "クロト"
original = "「わかってるよ。でも次はもっとイチャイチャできるエッチがしたいな」"
translation = "「알고 있어. 하지만 다음에는 좀 더 꽁냥꽁냥할 수 있는 섹스가 하고 싶네」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「そ、それは……まぁ、うん……また今度ね……」"
translation = "「그, 그건…… 뭐, 응…… 다음에 말이야……」"

[[dialogue]]
speaker = "unk"
original = "大胆なプレイは自分から提案してくるのに、普通のエッチは照れてしまうコハルコを見て、<b>今度</b>が楽しみになるのであった。"
translation = "대담한 플레이는 자신이 먼저 제안하면서, 평범한 섹스는 부끄러워하는 코하르코를 보며, **다음**이 기대되는 것이었다."

