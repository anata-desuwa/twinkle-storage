[[dialogue]]
speaker = "unk"
original = "第６話,帰路,B"
translation = "제6화, 귀로, B"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちはトリシャさんに別れを告げ、レゾフの町を飛び出した。"
translation = "그렇게 우리들은 트리샤 씨에게 작별을 고하고, 레조프 마을을 뛰쳐나왔다."

[[dialogue]]
speaker = "unk"
original = "まだ吹雪も収まっていない荒野を大急ぎで翔け抜けていく……。"
translation = "아직 눈보라도 잦아들지 않은 황야를 서둘러 날아간다……."

[[dialogue]]
speaker = "unk"
original = "しかし。"
translation = "하지만."

[[dialogue]]
speaker = "マトイ"
original = "「あ、あれ……！？\u3000私達、このへんから出てきたはずだよね……！？」"
translation = "「아, 저, 저거……!? 우리, 이 근처에서 나왔을 텐데……!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。見失わないよう──そこの樹に星術で印をつけていたはずよ」"
translation = "「응. 놓치지 않도록── 저 나무에 성술로 표시를 해뒀을 거야」"

[[dialogue]]
speaker = "ソフィア"
original = "「星術で残した印は……しっかり残っています。ここで間違いありません」"
translation = "「성술로 남긴 표시는…… 확실히 남아 있습니다. 이곳이 틀림없습니다」"

[[dialogue]]
speaker = "クロト"
original = "「……妙だな」"
translation = "「……이상하군」"

[[dialogue]]
speaker = "unk"
original = "俺たちが魔界へ降りた地には到着した。"
translation = "우리가 마계로 내려온 지점에는 도착했다."

[[dialogue]]
speaker = "unk"
original = "だが……俺たちが出てきたはずの『うろ』のホールが見当たらない。"
translation = "하지만…… 우리가 나왔을 터인 『우로』의 홀이 보이지 않는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういえば……聞くの忘れてたけど、みんなはどうやって魔界まで来たの？」"
translation = "「그러고 보니…… 묻는 걸 잊었는데, 모두는 어떻게 마계까지 온 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「世界樹のうろ──ってトンネルを通じて、ネビュラの基地から飛んできたんだ」"
translation = "「세계수의 빈 구멍──이라는 터널을 통해, 네뷸라의 기지에서 날아왔어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ネビュラって──あの魔女たちの！？」"
translation = "「네뷸라라고── 그 마녀들의!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「かくかくしかじかなのです」"
translation = "「이러이러저러저러한 것입니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「それじゃ伝わらないニャ……」"
translation = "「그렇게 말하면 안 통한다냥……」"

[[dialogue]]
speaker = "unk"
original = "改めて、ヴィーナスにも事のいきさつをあらかた説明した……。"
translation = "다시 한번, 비너스에게도 자초지종을 대충 설명했다……."

[[dialogue]]
speaker = "ヴィーナス"
original = "「なるほどね～！\u3000あの森にたどり着くまでに、そんな経緯があったなんて！」"
translation = "「과연 그렇구나～! 그 숲에 도착하기까지, 그런 경위가 있었다니!」"

[[dialogue]]
speaker = "ユウリ"
original = "「そういや、来るときは急展開すぎて、帰り道についちゃ聞いてなかったな……」"
translation = "「그러고 보니, 올 때는 급전개라서, 돌아가는 길에 대해서는 듣지 못했었지……」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、ここに降りてからもホールは残ってたはずよね？」"
translation = "「하지만, 여기에 내려서도 홀은 남아 있었을 텐데?」"

[[dialogue]]
speaker = "クロト"
original = "「そうですね。確かこのへんに──」"
translation = "「그렇습니다. 분명 이 근처에──」"

[[dialogue]]
speaker = "unk"
original = "──と、宙をまさぐっていると……"
translation = "──하고, 허공을 더듬고 있는데……"

[[dialogue]]
speaker = "リスの使い魔"
original = "「──キィ」"
translation = "「──키이」"

[[dialogue]]
speaker = "クロト"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「なんニャ。急に鳴き真似ニャんかして」"
translation = "「뭐냐냥. 갑자기 울음소리 흉내냐냥」"

[[dialogue]]
speaker = "クロト"
original = "「いや……俺じゃない。そこに何かいる」"
translation = "「아니…… 내가 아니야. 저기에 뭔가 있어」"

[[dialogue]]
speaker = "ソフィア"
original = "「リスですね。雪の下に隠れていたようですが……」"
translation = "「다람쥐네요. 눈 아래에 숨어 있었던 것 같습니다만……」"

[[dialogue]]
speaker = "リスの使い魔"
original = "「キィ。キィ」"
translation = "「키이. 키이」"

[[dialogue]]
speaker = "unk"
original = "子猫くらいのサイズがあるリスだった。"
translation = "새끼 고양이 정도 크기의 다람쥐였다."

[[dialogue]]
speaker = "unk"
original = "見た目は可愛いが俺たちの知るリスではなく、背中にコウモリのような羽根が生えていた。"
translation = "겉모습은 귀엽지만 우리가 아는 다람쥐가 아니라, 등에 박쥐 같은 날개가 돋아 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「魔界の固有種でしょうか？」"
translation = "「마계의 고유종일까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ううん、こんなの見たことないわ。ただのリスじゃないと思うんだけど……」"
translation = "「아니, 이런 건 본 적 없어. 그냥 다람쥐는 아닌 것 같은데……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「うーむ……ニャんだかワガハイに似た気配を感じるニャンね」"
translation = "「으ー음…… 왠지 모르게 이 몸과 비슷한 기운을 느낀다냥」"

[[dialogue]]
speaker = "クロト"
original = "「……魔力を感じる。恐らく、魔女たちの使い魔だろう」"
translation = "「……마력을 느껴. 아마도, 마녀들의 사역마일 것이다」"

[[dialogue]]
speaker = "フィオナ"
original = "「確かに。微力な魔力をまとっていますね」"
translation = "「확실히. 미약한 마력을 두르고 있네요」"

[[dialogue]]
speaker = "リスの使い魔"
original = "「キィ。キィ」"
translation = "「키이. 키이」"

[[dialogue]]
speaker = "unk"
original = "リスの使い魔はパタパタと滞空しながらクルミをかじっている。"
translation = "다람쥐의 사역마는 퍼덕퍼덕 공중에 떠서 호두를 갉아먹고 있다."

[[dialogue]]
speaker = "unk"
original = "かよわいながら、ネビュラの一員ということになるのだろうか……？"
translation = "가냘프지만, 네뷸라의 일원이라는 것이 될까……?"

[[dialogue]]
speaker = "リスの使い魔"
original = "「キィ、キィ……キィ。キィ、キィ」"
translation = "「키이, 키이…… 키이. 키이, 키이」"

[[dialogue]]
speaker = "ソフィア"
original = "「……えっと…………？」"
translation = "「……에또…………?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何か言いたげね」"
translation = "「뭔가 말하고 싶어 하는 것 같네」"

[[dialogue]]
speaker = "リスの使い魔"
original = "「キィ」"
translation = "「키이」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ消えちゃった……」"
translation = "「앗 사라져 버렸어……」"

[[dialogue]]
speaker = "ユウリ"
original = "「なんだったんだ？」"
translation = "「뭐였던 거지?」"

[[dialogue]]
speaker = "フィオナ"
original = "「待ってください。何か落ちてきました」"
translation = "「기다려 주세요. 뭔가 떨어졌습니다」"

[[dialogue]]
speaker = "unk"
original = "使い魔のリスは去り際、何かを残していった。"
translation = "사역마 다람쥐는 떠나면서, 무언가를 남기고 갔다."

[[dialogue]]
speaker = "unk"
original = "俺ははらりと舞い落ちたそれを拾い上げる。"
translation = "나는 팔랑거리며 떨어진 그것을 주워 올린다."

[[dialogue]]
speaker = "クロト"
original = "「これは……手紙？」"
translation = "「이것은…… 편지?」"

[[dialogue]]
speaker = "unk"
original = "それは一枚の手紙だった。もしかしてあのリスは、これを届けにきたのだろうか？"
translation = "그것은 한 장의 편지였다. 혹시 저 다람쥐는, 이것을 전해주러 온 것일까?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあこれ……魔女たちからの手紙ってこと？」"
translation = "「그럼 이거…… 마녀들에게서 온 편지라는 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「かもしれない。なら、あのリスはさしずめメッセンジャー──ってところか」"
translation = "「그럴지도. 그렇다면, 저 다람쥐는 이를테면 메신저──라는 건가」"

[[dialogue]]
speaker = "フィオナ"
original = "「読んでみましょう。連絡事項かもしれません」"
translation = "「읽어 봅시다. 연락 사항일지도 모릅니다」"

[[dialogue]]
speaker = "セドナ"
original = "『流星学園ならびに新星学園の諸君』"
translation = "『유성 학원 및 신성 학원의 제군들』"

[[dialogue]]
speaker = "セドナ"
original = "『魔界での目的は果たせたかね？\u3000ここに戻ってきたということは、なんらかのケリはつけられたわけだ』"
translation = "『마계에서의 목적은 달성했는가? 이곳으로 돌아왔다는 것은, 어떤 식으로든 결말을 지었다는 뜻이다』"

[[dialogue]]
speaker = "セドナ"
original = "『ところでひとつ残念なお知らせだ。君たちを送ったこの世界樹のうろだが、都合によりしばらく封鎖させてもらう』"
translation = "『그런데 하나 유감스러운 소식이다. 너희들을 보냈던 이 세계수의 빈 구멍은, 사정상 당분간 폐쇄하도록 하겠다』"

[[dialogue]]
speaker = "セドナ"
original = "『なお、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>も我々が抑えさせてもらった。大交流の船も動かせないゆえ、無駄足は控えるのが賢明だ』"
translation = "『덧붙여, <ruby>경계의 호수<rt>라고 시에로</rt></ruby>도 우리가 확보했다. 대교류의 배도 움직일 수 없으니, 헛걸음은 삼가는 것이 현명하다』"

[[dialogue]]
speaker = "セドナ"
original = "『リクリエについてはこちらで何とかする。それまでは魔界でのひと時をゆるりと過ごしていてくれたまえ。では、<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>』"
translation = "『리크리에에 대해서는 이쪽에서 어떻게든 하겠다. 그때까지는 마계에서의 한때를 느긋하게 보내고 있으렴. 그럼, 좋은 여행을』"

[[dialogue]]
speaker = "unk"
original = "わずかなメッセージを読み終えた俺たちは……しばらくその場で凍ったように固まっていた。"
translation = "짧은 메시지를 다 읽은 우리들은…… 잠시 그 자리에서 얼어붙은 듯 굳어 있었다."

[[dialogue]]
speaker = "ユウリ"
original = "「んなっ……！？」"
translation = "「뭐엇……!?」"

[[dialogue]]
speaker = "マトイ"
original = "「つ──都合により封鎖ってなに！？」"
translation = "「사── 사정상 폐쇄라니 뭐야!?」"

[[dialogue]]
speaker = "クロト"
original = "「世界樹のうろは開かない──唯一の帰り道が、なくなった」"
translation = "「세계수의 빈 구멍은 열리지 않는다── 유일한 돌아갈 길이, 사라졌다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たち……ここに置いてけぼりってこと？」"
translation = "「우리…… 여기에 버려진 거야?」"

[[dialogue]]
speaker = "unk"
original = "全員が顔を見合わせる。"
translation = "모두가 서로 얼굴을 마주 본다."

[[dialogue]]
speaker = "unk"
original = "魔界の片隅にある極寒の荒野で、俺たちは立ち往生を余儀なくされてしまった。"
translation = "마계 한구석에 있는 극한의 황야에서, 우리들은 오도 가도 못 하는 신세가 되어버렸다."

[[dialogue]]
speaker = "ニャリオン"
original = "「さ、最悪ニャン……！\u3000よりにもよって人間界が危ない時にニャン──！？」"
translation = "「마, 최악이냥……! 하필이면 인간계가 위험할 때냥──!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしかすると……それこそがネビュラの計算だったのかもしれません」"
translation = "「어쩌면…… 그것이야말로 네뷸라의 계산이었을지도 모릅니다.」"

[[dialogue]]
speaker = "クロト"
original = "「……セドナさんは抜け目のないヒトに見えた。その可能性は高そうだ」"
translation = "「……세드나 씨는 빈틈없는 사람으로 보였다. 그 가능성은 높을 것 같다.」"

[[dialogue]]
speaker = "マトイ"
original = "「ど、どういうこと？」"
translation = "「무, 무슨 뜻이야?」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちは無理を言って『うろ』を使わせてもらった。あの時、当然だけどアイリーンさんはかなり渋っていた」"
translation = "「우리는 무리하게 부탁해서 『빈 구멍』을 사용하게 해달라고 했다. 그때, 당연하지만 아이린 씨는 꽤 망설였었다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「魔女が人間に『うろ』を許可した過去はない──とのことでしたね」"
translation = "「마녀가 인간에게 『빈 구멍』을 허락한 과거는 없다──고 했었죠.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。だけど……思えばセドナさんにはそこまで拒絶されなかった。あのクラウディアって娘にしても」"
translation = "「아아. 하지만…… 생각해 보면 세드나 씨에게는 그렇게까지 거절당하지 않았다. 그 클라우디아라는 아가씨도 마찬가지고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「セドナって……あのいかつい感じの女の人よね？\u3000いかにも厳しそうじゃない？」"
translation = "「세드나 말이야…… 그 험악하게 생긴 여자 말이지? 딱 봐도 엄격해 보이지 않아?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「確かに、やけに気前はよかったニャンね」"
translation = "「확실히, 묘하게 인심은 좋았냥네.」"

[[dialogue]]
speaker = "unk"
original = "もちろん、俺たちの必死の願いが通じたという見方もできる。"
translation = "물론, 우리들의 필사적인 바람이 통했다는 시각으로 볼 수도 있다."

[[dialogue]]
speaker = "クロト"
original = "「だけど、もし、<b>こうなる</b>ことまで見越していたのなら──彼女たちの態度にも納得がいくと思ってな」"
translation = "「하지만, 만약, <ruby>이렇게 될<rt>・・・ ・</rt></ruby> 것까지 내다보고 있었다면── 그녀들의 태도에도 납득이 간다고 생각해서 말이야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「私たちを魔界へ一方的に送る──」"
translation = "「우리를 마계로 일방적으로 보내놓고──」"

[[dialogue]]
speaker = "ユウリ"
original = "「やられた……ってことか」"
translation = "「당했다……는 건가.」"

[[dialogue]]
speaker = "unk"
original = "ネビュラにはネビュラの思惑があって当然。"
translation = "네뷸라에게는 네뷸라의 속셈이 있는 것이 당연하다."

[[dialogue]]
speaker = "unk"
original = "俺たち星騎士の勢力を分断させたかった──そんな意図があったのなら、これまでの行動にも理解はできる。"
translation = "우리 성기사의 세력을 분단시키고 싶었다── 그런 의도가 있었다면, 지금까지의 행동에도 이해는 된다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふうん……どんな取引があったか知らないけど、してやられたってわけね」"
translation = "「흐음…… 무슨 거래가 있었는지는 모르겠지만, 당했다는 거네.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。だけど、文句を言える筋合いはない。頼みを聞いてくれたのは確かなわけだから」"
translation = "「아아. 하지만, 불평할 자격은 없다. 부탁을 들어준 것은 확실하니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「なあんか、大人のやり口って感じで嫌ねえ」"
translation = "「뭔가, 어른들의 수법 같아서 싫네.」"

[[dialogue]]
speaker = "ソフィア"
original = "「しかも『リクリエについてはこちらで何とかする』──って、まるで私たちを除け者にするみたいな」"
translation = "「게다가 『리크리에에 대해서는 이쪽에서 어떻게든 하겠다』──라니, 마치 우리를 따돌리는 것처럼요.」"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさんの占星術の結果と合わせて考えると……アポロの出現か、リクリエの本波の到来か。最悪、その両方ってところかもしれないな」"
translation = "「트리샤 씨의 점성술 결과와 함께 생각하면…… 아폴로의 출현이거나, 리크리에 본파의 도래이거나. 최악의 경우, 그 둘 다일지도 모르겠군.」"

[[dialogue]]
speaker = "ユウリ"
original = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>までジャックしてやがるってなると……かなり前から準備してた行動に見えるな」"
translation = "「<ruby>경계의 호수<rt>라고 시에로</rt></ruby>까지 장악하고 있다는 건…… 꽤 오래전부터 준비했던 행동으로 보이는데.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。ますます見逃せなくなってきた」"
translation = "「아아. 더욱더 간과할 수 없게 되었다.」"

[[dialogue]]
speaker = "マトイ"
original = "「で、でも──今からじゃ戻れっこないよ！\u3000頑張って見つけた唯一のルートだったのに──！」"
translation = "「그, 그렇지만── 지금부터는 돌아갈 수 없잖아! 열심히 찾아낸 유일한 루트였는데──!」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですね……大交流の船まで使えないとなると、もう本当に隔絶されています」"
translation = "「그렇네요…… 대교류의 배까지 사용할 수 없게 된다면, 이제 정말로 고립된 거예요.」"

[[dialogue]]
speaker = "unk"
original = "みんなに絶望の気色が浮かぶ。"
translation = "모두에게 절망의 기색이 떠오른다."

[[dialogue]]
speaker = "unk"
original = "その折、沈思黙考にふけっていたフィオナが面を上げた。"
translation = "그때, 침사묵고에 잠겨 있던 피오나가 고개를 들었다."

[[dialogue]]
speaker = "フィオナ"
original = "「……いえ」"
translation = "「……아닙니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「たったひとつだけ──残されています。魔界と人間界を繋ぐ、一筋の道が」"
translation = "「단 하나만이── 남아 있습니다. 마계와 인간계를 잇는, 한 줄기의 길이.」"

[[dialogue]]
speaker = "マトイ"
original = "「えぇっ！？\u3000そ、そんな裏ワザみたいなルートがあるの……？」"
translation = "「에엣!? 그, 그런 비장의 수단 같은 루트가 있는 거야……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「本当？\u3000フィオナちゃん──私たちも聞いたことがないけど」"
translation = "「정말? 피오나짱── 우리도 들어본 적 없는데.」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。確実に存在はしています。ただ……あまりにも険しい道です。そのルートを辿れたヒトは、歴史上一人も記録されていません」"
translation = "「네. 확실히 존재는 합니다. 다만…… 너무나도 험난한 길입니다. 그 루트를 따라간 사람은, 역사상 단 한 명도 기록되어 있지 않습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「そんなルートが……いや。待て。もしかして……」"
translation = "「그런 루트가…… 아니. 잠깐. 혹시……」"

[[dialogue]]
speaker = "unk"
original = "フィオナが言わんとしていることを察する。"
translation = "피오나가 말하려는 것을 짐작한다."

[[dialogue]]
speaker = "unk"
original = "誰も通ったことのない道筋──けれど確実に存在しているもの──それは。"
translation = "아무도 지나간 적 없는 길── 하지만 확실히 존재하는 것── 그것은."

[[dialogue]]
speaker = "フィオナ"
original = "「フィーニスの塔──あれを通れば魔界から人間界、いえ……天界にすら至ることができるでしょう」"
translation = "「피니스의 탑── 저곳을 통하면 마계에서 인간계, 아니…… 천계에조차 도달할 수 있을 것입니다.」"

[[dialogue]]
speaker = "ユウリ"
original = "「！\u3000あの塔か──」"
translation = "「! 그 탑인가──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちにはおなじみね。でも、入るには結局、学園に戻らなくちゃじゃない？」"
translation = "「우리에게는 익숙하지. 하지만, 들어가려면 결국, 학원으로 돌아가야 하는 거 아니야?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そうではないニャ。きっと、魔界からも入れるってことニャ」"
translation = "「그렇지 않냥. 분명, 마계에서도 들어갈 수 있다는 거냥.」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。フィーニスの塔で森羅歴以前の歴史を知った後……私は、改めて星見家の古文書を読み漁りました」"
translation = "「네. 피니스의 탑에서 신라력 이전의 역사를 알게 된 후…… 저는, 다시 한번 호시미 가문의 고문서를 샅샅이 읽었습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そして、ある古文書にはこう記されていました──」"
translation = "「그리고, 어떤 고문서에는 이렇게 기록되어 있었습니다──」"

[[dialogue]]
speaker = "フィオナ"
original = "「この世界で唯一、三界にまたがって存在する建造物──それが女神のましますフィーニスの塔なのだと。この記述を信じるなら……」"
translation = "「이 세계에서 유일하게, 삼계에 걸쳐 존재하는 건축물── 그것이 여신이 계시는 피니스의 탑이라고. 이 기록을 믿는다면……」"

[[dialogue]]
speaker = "クロト"
original = "「魔界にも、俺たちの知る塔が通じている──」"
translation = "「마계에도, 우리가 아는 탑이 통하고 있다──」"

[[dialogue]]
speaker = "マトイ"
original = "「すごい！\u3000星見家の古文書なら信憑性もあるし、行けそうだよ！」"
translation = "「대단해! 호시미 가문의 고문서라면 신빙성도 있고, 갈 수 있을 것 같아!」"

[[dialogue]]
speaker = "unk"
original = "俺たちに希望の光が差し込んだ。"
translation = "우리들에게 희망의 빛이 비쳤다."

[[dialogue]]
speaker = "フィオナ"
original = "「セイファート学園長は人間界の第一層から、天界の頂までを昇りつめて『制覇者』となりました」"
translation = "「세이퍼트 학원장은 인간계의 제1계층부터, 천계의 정상까지 올라서 『제패자』가 되었습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「対して魔界の塔は、私たちの知るそれよりもさらに深みに根ざしています」"
translation = "「반면에 마계의 탑은, 우리가 아는 그것보다 더욱 깊은 곳에 뿌리를 내리고 있습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「第零層──古文書によれば、そう記されていました」"
translation = "「제영층── 고문서에 따르면, 그렇게 기록되어 있었습니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「第零層……」"
translation = "「제영층……」"

[[dialogue]]
speaker = "unk"
original = "異質なその響きに、全員が息を呑んだ。"
translation = "이질적인 그 울림에, 전원이 숨을 삼켰다."

[[dialogue]]
speaker = "ユウリ"
original = "「つっても……どこにあるんだ？\u3000そんなの」"
translation = "「그렇다고 해도…… 어디에 있는 건데? 그런 게.」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは……」"
translation = "「그것은……」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さん。もしかして」"
translation = "「언니. 혹시」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。あそこしか聞いたことないわね」"
translation = "「응. 거기밖에 들어본 적 없네.」"

[[dialogue]]
speaker = "unk"
original = "魔族の二人が、思い当たったように言った。"
translation = "마족인 두 사람이, 짐작 가는 듯 말했다."

[[dialogue]]
speaker = "サーシャ"
original = "「確かに魔界にも──フィーニスの塔はあるわ。語られる伝説も人間界とおおよそ変わらない」"
translation = "「확실히 마계에도── 피니스의 탑은 있어. 전해지는 전설도 인간계와 대체로 다르지 않아.」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも……あれはレゾフの住人からすれば、あまりに縁遠いものなの。もちろん直接見たこともないわ」"
translation = "「하지만…… 그건 레조프의 주민들로서는, 너무나도 인연이 먼 것이야. 물론 직접 본 적도 없어.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャんでニャ？」"
translation = "「왜냥?」"

[[dialogue]]
speaker = "ソフィア"
original = "「遠いからです。途方もなく」"
translation = "「멀기 때문이에요. 엄청나게.」"

[[dialogue]]
speaker = "ソフィア"
original = "「魔界のフィーニスの塔は──シャリオン地方にあります。ここズヴィエダからすると、完全に別世界のお話です」"
translation = "「마계의 피니스의 탑은── 샤리온 지방에 있어요. 여기 즈비에다에서 보면, 완전히 다른 세상 이야기예요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「魔界の住人にとっての『遠い』って……ヤな予感がするな」"
translation = "「마계 주민에게 있어서의 『멀다』는 건…… 안 좋은 예감이 드는데.」"

[[dialogue]]
speaker = "ソフィア"
original = "「……ご想像の通りかと」"
translation = "「……짐작하시는 바와 같을 거예요.」"

[[dialogue]]
speaker = "unk"
original = "ここからレゾフに向かうのさえ、人間界でいう州境をいくつも超えるほど距離があった。"
translation = "여기서부터 레조프로 향하는 것조차, 인간계로 치면 주 경계를 몇 개나 넘을 정도의 거리였다."

[[dialogue]]
speaker = "unk"
original = "別の地方へ赴くとなるとその数倍か、数十倍か。"
translation = "다른 지방으로 향하게 된다면 그 몇 배나, 수십 배나 될 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「──大丈夫。私が連れていくわ」"
translation = "「──괜찮아. 내가 데려갈게.」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナス……？」"
translation = "「비너스……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「みんなは……私を助けるために魔界まで来てくれたのよね」"
translation = "「모두는…… 나를 돕기 위해 마계까지 와줬잖아.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、そのせいで今度は人間界のアナ達がピンチになってる。だったら次は──私が駆けつけてあげなきゃダメでしょ！」"
translation = "「하지만, 그 때문에 이번에는 인간계의 아나들이 위험에 처했어. 그렇다면 다음은── 내가 달려가 줘야 하잖아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナスさん……」"
translation = "「비너스 씨……」"

[[dialogue]]
speaker = "unk"
original = "それからヴィーナスは、俺たち全員に金星のブーストをかけた。"
translation = "그리고 나서 비너스는, 우리들 전원에게 금성의 부스트를 걸었다."

[[dialogue]]
speaker = "ユウリ"
original = "「おいおい、無茶すんなよ」"
translation = "「어이어이, 무리하지 마.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「平気よ！\u3000一晩ぐっすり寝たし、ようやく自由に動けるんだから。むしろ暴れたくてウズウズしてるの！」"
translation = "「괜찮아! 하룻밤 푹 잤고, 드디어 자유롭게 움직일 수 있으니까. 오히려 날뛰고 싶어서 근질거려!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私がみんなに加護をかけたから──これなら、音速レベルでぶっ飛ばしても平気なはずよ！」"
translation = "「내가 모두에게 가호를 걸었으니까── 이 정도라면, 음속 레벨로 날아가도 괜찮을 거야!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そこまで元気が有り余ってるのかニャン……？」"
translation = "「그렇게까지 기운이 남아도는 거냥……?」"

[[dialogue]]
speaker = "クロト"
original = "「……俺も一緒にやる。実を言うと、俺も元気が有り余ってるんだ」"
translation = "「……나도 함께 할게. 사실대로 말하자면, 나도 기운이 남아돌고 있어.」"

[[dialogue]]
speaker = "unk"
original = "力を解放し──今度は俺の霊力をみんなに付与した。"
translation = "힘을 해방하고── 이번에는 나의 영력을 모두에게 부여했다."

[[dialogue]]
speaker = "unk"
original = "魔王の覚醒を引き出せるようになってからというもの……"
translation = "마왕의 각성을 끌어낼 수 있게 된 이후부터……"

[[dialogue]]
speaker = "unk"
original = "体の奥底からみなぎるエネルギーを抑えるのも大変で、少しくらい発散していないと窮屈なくらいだったのだ。"
translation = "몸속 깊은 곳에서 솟아나는 에너지를 억누르는 것도 힘들어서, 조금이라도 발산하지 않으면 답답할 정도였다."

[[dialogue]]
speaker = "クロト"
original = "「一刻も早く人間界へ駆けつける。たとえ、どんなに長い道のりでも」"
translation = "「한시라도 빨리 인간계로 달려간다. 설령, 아무리 긴 여정이라도.」"

[[dialogue]]
speaker = "サーシャ"
original = "「……そうね。今さら、無茶がどうとか言ってられないわ」"
translation = "「……그렇네. 이제 와서, 무리가 어떻다고 말할 때가 아니지.」"

[[dialogue]]
speaker = "ソフィア"
original = "「お二人とも、感謝します。私たちも初めての場所ですが──ある程度の案内ならできます」"
translation = "「두 분 모두, 감사합니다. 저희도 처음 가는 장소이지만── 어느 정도의 안내는 할 수 있어요.」"

[[dialogue]]
speaker = "unk"
original = "みんな腹はくくったようだった。"
translation = "모두 각오를 단단히 한 듯했다."

[[dialogue]]
speaker = "unk"
original = "すでに長い旅路だった魔界の行軍を締めくくるのは、さらに遠路はるばるの人間界への道のり。"
translation = "이미 긴 여정이었던 마계의 행군을 마무리하는 것은, 더욱 멀고 먼 인간계로의 길이었다."

[[dialogue]]
speaker = "フィオナ"
original = "「参りましょう──誰ひとり欠かさず、人間界へ！」"
translation = "「가시죠── 단 한 명도 빠짐없이, 인간계로!」"

