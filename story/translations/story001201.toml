[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今まで尽くしてくれてありがとう。感謝しています」"
translation = "「지금까지 진력해 줘서 고마워요. 감사하고 있어요.」"

[[dialogue]]
speaker_original = "ナオミ"
speaker_translation = "나오미"
original = "「いえ、もったいないお言葉です、フィオナお嬢様……」"
translation = "「아니요, 과분한 말씀입니다, 피오나 아가씨……」"

[[dialogue]]
speaker = "unk"
original = "彼女はナオミ。メイド隊として１０年星見家に仕えてくれた女性で、今日が最後の勤務日だ。"
translation = "그녀는 나오미. 메이드대로서 10년 동안 호시미 가문을 섬겨준 여성으로, 오늘이 마지막 근무일이다."

[[dialogue]]
speaker = "unk"
original = "彼女は星見家メイド隊を辞め、故郷に帰って幼なじみの男性と結婚する。"
translation = "그녀는 호시미 가문 메이드대를 그만두고 고향으로 돌아가 소꿉친구인 남성과 결혼한다."

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「今日までお疲れ様でした。メイド隊で培った技術と経験を活かし、夫を支えられる妻となって、良き家族を築いてください」"
translation = "「오늘까지 수고 많았습니다. 메이드대에서 기른 기술과 경험을 살려, 남편을 내조하는 아내가 되어 좋은 가정을 꾸리길 바랍니다.」"

[[dialogue]]
speaker_original = "ナオミ"
speaker_translation = "나오미"
original = "「ぐす……先代メイド長のマリオンさんと、現在のメイド長のキリカさんには、厳しくも温かい指導を頂きました。おふたりに教わったことは忘れません」"
translation = "「흑…… 전대 메이드장이신 마리온 씨와 현재 메이드장이신 키리카 씨께 엄하면서도 따뜻한 지도를 받았습니다. 두 분께 배운 것은 잊지 않겠습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ちょうどジューンブライドの時期だね。狙ったの？」"
translation = "「마침 준 브라이드 시즌이네. 노린 거야?」"

[[dialogue]]
speaker_original = "ナオミ"
speaker_translation = "나오미"
original = "「えへへ……ちょっと。運よく式場の予約が取れました」"
translation = "「에헤헤…… 조금요. 운 좋게 식장 예약이 잡혔거든요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ。競争率高いって聞くもんね。きっといい式になるよ」"
translation = "「후후. 경쟁률 높다고 들었는데 말이야. 분명 좋은 결혼식이 될 거야.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お幸せにね、ナオミ」"
translation = "「행복해야 해, 나오미.」"

[[dialogue]]
speaker_original = "ナオミ"
speaker_translation = "나오미"
original = "「はい。今まで本当に……ありがとうございました」"
translation = "「네. 지금까지 정말…… 감사했습니다.」"

[[dialogue]]
speaker = "unk"
original = "涙で顔をくしゃくしゃにしながら、幸せそうに笑うナオミを、晴れやかな気持ちで送り出した──"
translation = "눈물로 얼굴이 엉망이 된 채 행복하게 웃는 나오미를 홀가분한 마음으로 배웅했다──"

[[dialogue]]
speaker = "unk"
original = "ナオミが星見家を出た、その夜。"
translation = "나오미가 호시미 가문을 떠난 그날 밤."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「真剣な顔してどうしたの、ナミエル？」"
translation = "「진지한 얼굴로 무슨 일이야, 나미엘?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「──！\u3000申し訳ありません、つい考え込んでしまいました。すぐに業務に戻ります」"
translation = "「──! 죄송합니다, 잠시 생각에 잠겨 있었습니다. 바로 업무로 복귀하겠습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ううん、別に責めてるわけじゃないよ。何か気になることがあるのかなと思って」"
translation = "「아니, 딱히 나무라는 게 아니야. 뭔가 신경 쓰이는 일이라도 있나 싶어서.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それは……その……」"
translation = "「그건…… 그……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ナオミのこと？」"
translation = "「나오미 일이야?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……はい。ナオミさんと……その家族について考えていました」"
translation = "「……네. 나오미 씨와…… 그 가족에 대해 생각하고 있었습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お嬢様もご存じの通り、私は幼い頃に家族を事故で亡くしました。ですから両親のことはよく覚えておりません」"
translation = "「아가씨도 아시다시피 전 어릴 적에 가족을 사고로 잃었습니다. 그래서 부모님에 대한 기억이 잘 나지 않습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「だから想像できないのです。ナオミさんがどのような家族を築くのか……良い家族とはどのようなものなのか……」"
translation = "「그래서 상상이 가질 않습니다. 나오미 씨가 어떤 가정을 꾸릴지…… 좋은 가족이란 어떤 것인지……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ナミエル……」"
translation = "「나미엘……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「すみません。このようなめでたい日に、こんなお話を……」"
translation = "「죄송합니다. 이런 경사스러운 날에 이런 이야기를……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ううん。いつかナミエルも、いい家族を持てるといいね」"
translation = "「아니야. 언젠가 나미엘도 좋은 가족을 가질 수 있으면 좋겠네.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私が……家族を……」"
translation = "「제가…… 가족을……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そうですね。ありがとうございます、お嬢様。ではおやすみなさいませ」"
translation = "「그렇군요. 감사합니다, 아가씨. 그럼 안녕히 주무십시오.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うん、ナミエルもおやすみ」"
translation = "「응, 나미엘도 잘 자.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お嬢様。寝間着のお着替えをお持ちしました」"
translation = "「아가씨. 잠옷으로 갈아입으실 옷을 가져왔습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うん、ありがと。……ところで、キリカは結婚したいって思うことある？」"
translation = "「응, 고마워. ……그런데 키리카는 결혼하고 싶다고 생각할 때 있어?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「当然です。代々星見家に仕えてきた上月家の者として、次の世代も育んでいかないといけませんから」"
translation = "「당연합니다. 대대로 호시미 가문을 섬겨온 코즈키 가문의 일원으로서, 다음 세대도 길러내야 하니까요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うーん、それは結婚願望とは違う気がするけど……」"
translation = "「으음, 그건 결혼 소망이랑은 다른 느낌인데……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（でもキリカが結婚について考えてたのはちょっと意外かも……）"
translation = "(하지만 키리카가 결혼에 대해 생각하고 있었다는 건 좀 의외일지도……)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「キリカもそろそろ今日の仕事おしまいだよね。おやすみ」"
translation = "「키리카도 슬슬 오늘 일 끝이지. 잘 자.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はい、おやすみなさいませ。良い夜を」"
translation = "「네, 안녕히 주무십시오. 좋은 밤 되시길.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ジューンブライドかぁ……」"
translation = "「준 브라이드라……」"

[[dialogue]]
speaker = "unk"
original = "結婚について、考えたことがない──というとウソになる。"
translation = "결혼에 대해 생각해 본 적이 없다──고 하면 거짓말이 된다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、ちゃんとした考えがあるわけでもない。"
translation = "그렇다고 해서 제대로 된 생각이 있는 것도 아니다."

[[dialogue]]
speaker = "unk"
original = "好きな人が隣にいて、綺麗な式場で、純白のドレスを着て式を挙げる──小さな女の子の憧れのような、そんな漠然とした想像だ。"
translation = "좋아하는 사람이 옆에 있고, 예쁜 식장에서 순백의 드레스를 입고 예식을 올리는── 어린 소녀의 동경 같은 그런 막연한 상상이다."

[[dialogue]]
speaker = "unk"
original = "でも──"
translation = "하지만──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「結婚……いいなぁ……」"
translation = "「결혼…… 좋겠다……」"

[[dialogue]]
speaker = "unk"
original = "その夜。"
translation = "그날 밤."

[[dialogue]]
speaker = "unk"
original = "数年に一度の規模の、強烈な太陽フレアが発生した。"
translation = "수년에 한 번 있을 법한 규모의 강력한 태양 플레어가 발생했다."

[[dialogue]]
speaker = "unk"
original = "太陽フレアは強い電磁波を生じさせるものの、現行の電子機器は対策されており、影響が起きることはない。"
translation = "태양 플레어는 강한 전자파를 발생시키지만, 현행 전자 기기는 대책이 마련되어 있어 영향이 생기는 일은 없다."

[[dialogue]]
speaker = "unk"
original = "ないのだが……"
translation = "없을 텐데……"

[[dialogue]]
speaker = "unk"
original = "繁華街にアステラが出現。流星星徒会のメンバーで討伐に当たる。"
translation = "번화가에 아스텔라가 출현. 유성 성도회 멤버들이 토벌에 나선다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「行くよ、みんな！」"
translation = "「가자, 모두들!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「おわっ！？\u3000フィオナ、なんだその格好は！？」"
translation = "「어왁!? 피오나, 뭐야 그 차림은!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「お～、フィオナちゃん大胆♪」"
translation = "「오~, 피오나짱 대담한걸♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほぇ～、とってもお綺麗なのです♪」"
translation = "「호에~, 무척이나 아름다우신 거예요♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え？\u3000私、変な格好してる……？\u3000大胆？\u3000綺麗？」"
translation = "「어? 나 이상한 차림 하고 있어……? 대담해? 아름다워?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もしかして気付いておられないんですか？\u3000その、ご自分で確認された方が……」"
translation = "「혹시 모르고 계시는 건가요? 그, 직접 확인해 보시는 게……」"

[[dialogue]]
speaker = "unk"
original = "星徒会のみんなの反応を不思議に思って、自分の姿をＤＩＳＣのカメラで映すと──"
translation = "성도회 모두의 반응을 의아하게 생각하며 자신의 모습을 DISC의 카메라로 비추자──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「えええ～～～っ！！？」"
translation = "「에에에~~~!!?」"

