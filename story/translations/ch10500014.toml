[[dialogue]]
speaker = "unk"
original = "第４話,フロレンシアとスミカ,P"
translation = "제4화, 플로렌시아와 스미카, P"

[[dialogue]]
speaker = "フロレンシア"
original = "「弱点克服作戦パート２、です！」"
translation = "「약점 극복 작전 파트 2, 예요!」"

[[dialogue]]
speaker = "unk"
original = "どんな作戦……？"
translation = "어떤 작전이야……?"

[[dialogue]]
speaker = "フロレンシア"
original = "「さすがに会長さんに何度も攻撃するのは申し訳ないですから、こうして会長さんと一緒にいようかと。そのうち血を見る機会もあるでしょうから」"
translation = "「아무래도 회장님께 몇 번이나 공격하는 건 죄송하니까, 이렇게 회장님과 함께 있어 볼까 해서요. 그러다 보면 피를 볼 기회도 생길 테니까요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「私のことはお構いなく。いないものだと思ってください」"
translation = "「제 일은 신경 쓰지 마세요. 없는 사람이라고 생각하시고요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「じー……」"
translation = "「지이……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あ」"
translation = "「아」"

[[dialogue]]
speaker = "unk"
original = "何か食べる？"
translation = "뭐 좀 먹을래?"

[[dialogue]]
speaker = "フロレンシア"
original = "「……はい、いただきます」"
translation = "「……네, 잘 먹겠습니다」"

[[dialogue]]
speaker = "フロレンシア"
original = "「これは……人形焼き！\u3000わわ、出来たてで熱いです」"
translation = "「이건…… 인형 굽기! 와와, 갓 구워져서 뜨거워요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「存在は知ってはいましたが、実物を見るのは初めてです。人形焼きという名前なのに、提灯とか塔とかいろんな形があるんですね。どれどれ……あむ」"
translation = "「존재는 알고 있었지만, 실물을 보는 건 처음이에요. 인형 굽기라는 이름인데도, 제등이나 탑 같은 여러 가지 모양이 있네요. 어디 어디…… 냠」"

[[dialogue]]
speaker = "フロレンシア"
original = "「ん～～っ！\u3000おいしいです！」"
translation = "「음~~! 맛있어요!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「甘さ控えめなあんこと、さくっとした生地が絶妙なバランスで、これはたまりません♪」"
translation = "「단맛을 줄인 팥소와, 바삭한 반죽이 절묘한 밸런스라, 이건 정말 참을 수 없네요♪」"

[[dialogue]]
speaker = "フロレンシア"
original = "「……なるほど、焼きたてだからこんなにさくっとしてるんですね。時間が経つとしっとり……そちらも食べてみたいです」"
translation = "「……과연, 갓 구워내서 이렇게 바삭한 거군요. 시간이 지나면 촉촉해지는…… 그쪽도 먹어보고 싶어요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「でも他のお店も気になる……甘いものばっかり食べてたら太っちゃう……」"
translation = "「하지만 다른 가게도 신경 쓰이고…… 단것만 잔뜩 먹으면 살쪄버릴 텐데……」"

[[dialogue]]
speaker = "unk"
original = "食べちゃえ食べちゃえ"
translation = "먹어버려 먹어버려"

[[dialogue]]
speaker = "フロレンシア"
original = "「うぅ～っ、もし太ったら会長さんを恨みますからねっ」"
translation = "「우으~, 만약 살찌면 회장님을 원망할 거니까요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「──あ」"
translation = "「──아」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あのー……ご気分大丈夫ですか？」"
translation = "「저기…… 기분은 좀 괜찮으세요?」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアは隅でうずくまっているおばあさんに気付くと、優しく声をかけた。"
translation = "플로렌시아는 구석에 웅크리고 있는 할머니를 발견하자, 상냥하게 말을 걸었다."

[[dialogue]]
speaker = "unk"
original = "おばあさんは観光で浅草を訪れたが、人が多くて気分が悪くなってしまったという。"
translation = "할머니는 관광차 아사쿠사를 방문했지만, 사람이 많아서 기분이 나빠졌다고 한다."

[[dialogue]]
speaker = "フロレンシア"
original = "「なるほど、そういうことありますよね。それじゃ休めるところに行きましょうか」"
translation = "「과연, 그럴 때가 있죠. 그럼 쉴 수 있는 곳으로 갈까요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「実は私たち、新星学園の星騎士で──」"
translation = "「사실 저희는, 신성학원의 성기사라서──」"

[[dialogue]]
speaker = "フロレンシア"
original = "「いわゆる人酔いですね。少しお休みしたら顔色も良くなりましたし、安心しました」"
translation = "「이른바 사람 멀미네요. 조금 쉬었더니 안색도 좋아지셨고, 안심했어요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「……私はモンスターと戦う星騎士です。でも人を脅かすのはモンスターだけではありません」"
translation = "「……저는 몬스터와 싸우는 성기사예요. 하지만 사람을 위협하는 건 몬스터뿐만이 아니에요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「怪我とか病気とかいろんな理由で、思うように生きられない人はたくさんいます」"
translation = "「부상이나 병 같은 여러 가지 이유로, 마음대로 살지 못하는 사람은 아주 많아요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「リクリエとかモンスター関係なく、誰もが健やかに生きられるようにしたいと私は思っているんです」"
translation = "「리크리에나 몬스터와 상관없이, 누구나 건강하게 살 수 있게 하고 싶다고 저는 생각하고 있어요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「って、つい真面目になっちゃいました。休日なんですからそういうのは忘れましょう」"
translation = "「앗, 그만 진지해져 버렸네요. 휴일이니까 그런 건 잊어버리죠」"

[[dialogue]]
speaker = "フロレンシア"
original = "「さぁ、浅草散策の続きですっ」"
translation = "「자, 아사쿠사 산책 재개예요!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あれ……？\u3000当初の目的を忘れているような……ま、たまにはいいですよね！」"
translation = "「어라……? 당초의 목적을 잊어버린 것 같은…… 뭐, 가끔은 괜찮겠죠!」"

[[dialogue]]
speaker = "スミカ"
original = "「よう。フロレンシアなら疲れて寝ちまったよ」"
translation = "「여어. 플로렌시아라면 지쳐서 잠들어버렸어」"

[[dialogue]]
speaker = "スミカ"
original = "「会長サンとのデートがずいぶん楽しかったみたいだな。……デートじゃないとか言うなよ。フロレンシアがかわいそうだろ」"
translation = "「회장님과의 데이트가 꽤 즐거웠나 보네. ……데이트가 아니라는 말은 하지 마라. 플로렌시아가 불쌍하잖아」"

[[dialogue]]
speaker = "スミカ"
original = "「で、念押ししとくが、アタシのことは他のヤツには言ってないだろうな。うっかりでも喋ったら注射だぞテメェ」"
translation = "「그리고, 다짐해두겠는데, 내 정체는 다른 녀석들한테 말 안 했겠지. 실수로라도 지껄였다간 주사 놓을 거다 이 새끼야」"

[[dialogue]]
speaker = "スミカ"
original = "「……なんだその顔は？\u3000正直に言えば、フロレンシアがアタシを認めてくれるとでも思ってんのか？」"
translation = "「……뭐야 그 표정은? 솔직히 말하면, 플로렌시아가 나를 인정해 줄 거라고 생각하는 거냐?」"

[[dialogue]]
speaker = "スミカ"
original = "「確かにあいつはお人好しだが、自分の中に別の存在がいるってのは、相当不愉快だと思うがねぇ」"
translation = "「확실히 그 녀석은 사람 좋지만, 자기 안에 다른 존재가 있다는 건, 상당히 불쾌할 거라고 보는데 말이야」"

[[dialogue]]
speaker = "スミカ"
original = "「ていうか、そうなった方がイヤだねアタシは」"
translation = "「그보다, 그렇게 되는 건 내가 싫어」"

[[dialogue]]
speaker = "スミカ"
original = "「言ったはずだ、アタシは星力によって生まれた人格だって」"
translation = "「말했을 텐데, 나는 성력에 의해 태어난 인격이라고」"

[[dialogue]]
speaker = "スミカ"
original = "「星騎士はいずれ星力を使えなくなる。つまり……いずれアタシは消える」"
translation = "「성기사는 언젠가 성력을 쓸 수 없게 돼. 즉…… 언젠가 나는 사라져」"

[[dialogue]]
speaker = "unk"
original = "──！"
translation = "──!"

[[dialogue]]
speaker = "スミカ"
original = "「なんだ、わかってなかったのか、会長サン。察しが悪いじゃねえか」"
translation = "「뭐야, 모르고 있었던 거냐, 회장님. 눈치가 없구만」"

[[dialogue]]
speaker = "スミカ"
original = "「想像してみろ。アイツが泣きそうな顔で『消えないで～』とか言ってきたら気持ち悪くてたまらねえ」"
translation = "「상상해 봐라. 그 녀석이 울 것 같은 얼굴로 『사라지지 마~』 같은 소릴 해대면 기분 나빠서 못 견딜걸」"

[[dialogue]]
speaker = "スミカ"
original = "「アタシが消えたら会長サンもせいせいするだろ。つっても、会長さんの方があがりは早いか？\u3000魔王とやらはその辺どうなってんのか知らねえが」"
translation = "「내가 사라지면 회장님도 시원섭섭하겠지. 그나저나, 회장님 쪽이 은퇴는 빠르려나? 마왕이라는 건 그쪽이 어떻게 돌아가는지 모르겠지만」"

[[dialogue]]
speaker = "スミカ"
original = "「……何残念そうな顔してやがる。当然のことだろうが」"
translation = "「……뭘 아쉬운 표정을 짓고 있어. 당연한 일이잖아」"

[[dialogue]]
speaker = "スミカ"
original = "「フロレンシアが完全に星力を使えなくなるより、アタシが消える方がはえーかもしれねえな」"
translation = "「플로렌시아가 완전히 성력을 못 쓰게 되는 것보다, 내가 사라지는 게 더 빠를지도 모르겠네」"

[[dialogue]]
speaker = "スミカ"
original = "「ん？\u3000待てよ？\u3000そうするとフロレンシアが自分で治療するハメになるわけで……ヒャハハハッ、そいつはこえーな！\u3000会長サンがビビるわけだ！」"
translation = "「응? 잠깐만? 그렇게 되면 플로렌시아가 직접 치료를 해야 한다는 소린데…… 히하하하핫, 그거 무섭겠네! 회장님이 겁먹을 만해!」"

[[dialogue]]
speaker = "スミカ"
original = "「でももし会長サンがアタシのことを惜しんでくれるなら……そうだな、想い出にキスでもしてくれよ」"
translation = "「하지만 만약 회장님이 나를 아쉬워해 준다면…… 그래, 추억 삼아 키스라도 해줘」"

[[dialogue]]
speaker = "スミカ"
original = "「消えるんだからそれくらいいいだろ。これでも会長サンのことは気に入ってるんだぜ？」"
translation = "「사라질 거니까 그 정도는 괜찮잖아. 이래 봬도 회장님은 꽤 마음에 든다고?」"

[[dialogue]]
speaker = "スミカ"
original = "「じっとしててくれよ──」"
translation = "「가만히 있어 봐──」"

[[dialogue]]
speaker = "フロレンシア"
original = "「！？\u3000かか、会長さん！？」"
translation = "「!? 카, 카카, 회장님!?」"

[[dialogue]]
speaker = "unk"
original = "（急に戻った！？）"
translation = "(갑자기 돌아왔어!?)"

[[dialogue]]
speaker = "フロレンシア"
original = "「な、なんでこんな近いんですか……？」"
translation = "「왜, 왜 이렇게 가까운 건가요……?」"

[[dialogue]]
speaker = "フロレンシア"
original = "「でも、それなら……」"
translation = "「하지만, 그렇다면……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「ちゅっ」"
translation = "「쪽」"

[[dialogue]]
speaker = "フロレンシア"
original = "「えへへ、ほっぺにチュウしちゃいました」"
translation = "「에헤헤, 볼에 뽀뽀해버렸어요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「それじゃ……えっと、その……おやすみなさ～いっ」"
translation = "「그럼…… 저기, 그…… 안녕히 주무세~요」"

