[[dialogue]]
speaker = "ミア"
original = "「今日こそ会長さんを私の愛の奴隷にしてみせるわ！」"
translation = "「오늘이야말로 회장님을 나의 사랑의 노예로 만들고 말겠어!」"

[[dialogue]]
speaker = "クロト"
original = "「はぁ？」"
translation = "「하아?」"

[[dialogue]]
speaker = "unk"
original = "とある日の夕方。俺の部屋にやってくるなりミアはそんなことを宣言してきた。"
translation = "어느 날 저녁. 내 방에 오자마자 미아는 그런 선언을 해왔다."

[[dialogue]]
speaker = "ミア"
original = "「だから愛の奴隷よ、愛の奴隷！\u3000いつまで経っても私を子ども扱いしてくる会長さんに目にもの見せてあげるって言ってるの！」"
translation = "「그러니까 사랑의 노예야, 사랑의 노예! 언제까지고 나를 어린애 취급하는 회장님에게 본때를 보여주겠다고 말하는 거야!」"

[[dialogue]]
speaker = "クロト"
original = "「待ってくれ。俺は子ども扱いなんかしてないって」"
translation = "「잠깐만. 나는 어린애 취급 같은 거 안 한다니까」"

[[dialogue]]
speaker = "ミア"
original = "「う、嘘よ。以前にも増して子ども扱いしてきてるじゃない」"
translation = "「고, 거짓말. 이전보다 더 어린애 취급하고 있잖아」"

[[dialogue]]
speaker = "ミア"
original = "「せっかく、その……晴れて恋人同士になったのに。会長さんったら、いつも私に気を遣ってばっかりだもんっ」"
translation = "「기껏, 그…… 당당히 연인 사이가 됐는데. 회장님은 맨날 나한테 조심스럽기만 하단 말이야」"

[[dialogue]]
speaker = "ミア"
original = "「<b>そういうこと</b>する時も、最初から最後まで優しいし。ちょっぴり私が痛がったり、苦しそうにしたら、すぐにやめるし」"
translation = "「<b>그런</b> <b>짓</b>을 할 때도 처음부터 끝까지 다정하기만 하고. 조금이라도 내가 아파하거나 괴로워 보이면 바로 멈추고」"

[[dialogue]]
speaker = "ミア"
original = "「大切にしてくれてるのはわかるけど、でも大切にしすぎよっ。他の女の子と喋ってる時はもっとガサツだったりするじゃない」"
translation = "「소중히 여겨주는 건 알겠지만, 너무 소중히 대한다고! 다른 여자애들이랑 얘기할 때는 더 거칠기도 하잖아」"

[[dialogue]]
speaker = "ミア"
original = "「つまり会長さんは私と恋人になったことで、より私を幼く見るようになったのっ。遠慮しなくていいのに、変な遠慮ばっかりしちゃってるのっ」"
translation = "「즉 회장님은 나랑 연인이 됨으로써 나를 더 어리게 보게 된 거야. 사양할 필요 없는데 이상한 사양만 하고 있어」"

[[dialogue]]
speaker = "unk"
original = "それは確かにミアの言う通りかもしれない。この幼さの残る小さな体を見て、必要以上に優しくしすぎてしまっていたのかも……。"
translation = "그건 확실히 미아의 말대로일지도 모른다. 이 앳됨이 남은 작은 몸을 보고 필요 이상으로 너무 다정하게 대했던 것일지도……."

[[dialogue]]
speaker = "ミア"
original = "「だから私、考えたの！\u3000会長さんが私を子ども扱いしてくるなら、それ以上に私が大人らしいところを見せて、子どもじゃないってわからせてあげようって！」"
translation = "「그래서 나, 생각했어! 회장님이 나를 어린애 취급한다면, 그 이상으로 내가 어른스러운 모습을 보여서 어린애가 아니라는 걸 참교육해주겠다고!」"

[[dialogue]]
speaker = "ミア"
original = "「つまり愛の奴隷化よ。ヘタレな会長さんに代わって私がトコトン責め立ててあげる！」"
translation = "「즉 사랑의 노예화야. 우유부단한 회장님을 대신해 내가 철저하게 몰아붙여 줄게!」"

[[dialogue]]
speaker = "ミア"
original = "「ちょうど昨日読んだ本にね？\u3000良さそうなシチュエーションがあったのっ！\u3000恋人を拘束して、奴隷宣言するまで快楽責めにするっていうすごく燃えちゃうシチュが！」"
translation = "「마침 어제 읽은 책에 말이야? 괜찮은 시추에이션이 있었어! 연인을 구속해서 노예 선언을 할 때까지 쾌락으로 몰아붙인다는 아주 불타오르는 시추가!」"

[[dialogue]]
speaker = "クロト"
original = "「ミアは普段一体どんな本を読んでるんだ……」"
translation = "「미아는 대체 평소에 어떤 책을 읽는 거야……」"

[[dialogue]]
speaker = "ミア"
original = "「そ、それは今どうだっていいでしょっ。とにかく大人しくお縄に付きなさいっ」"
translation = "「그, 그건 지금 아무래도 좋잖아. 아무튼 얌전히 포박당해!」"

[[dialogue]]
speaker = "ミア"
original = "「もう二度と私に変な遠慮しないように、会長さんのこと調教してやるんだから！」"
translation = "「다시는 나한테 이상한 사양 안 하도록 회장님을 조교해 줄 거니까!」"

[[dialogue]]
speaker = "ミア"
original = "「で──……」"
translation = "「그런데──……」"

[[dialogue]]
speaker = "ミア"
original = "「どうして私が縛られちゃってるのっ！？」"
translation = "「왜 내가 묶여있는 거야!?」"

[[dialogue]]
speaker = "ミア"
original = "「逆よ逆っ！\u3000私が責めるって言ったじゃないっ！\u3000今日は私が会長さんのお尻をたくさん責めるつもりだったのにっ」"
translation = "「반대야 반대! 내가 몰아붙인다고 했잖아! 오늘은 내가 회장님 엉덩이를 실컷 괴롭혀 줄 생각이었는데!」"

[[dialogue]]
speaker = "クロト"
original = "「ミアが遠慮するなって言うから。ミアも縛られたそうにしてたし」"
translation = "「미아가 사양하지 말라고 했으니까. 미아도 묶이고 싶어 하는 것 같았고」"

[[dialogue]]
speaker = "ミア"
original = "「ふぇっ！？\u3000確かに本で見る分には、はぁはぁ、こ、こういうの好きだけど……。ちょっぴり憧れてた、けど……」"
translation = "「후에!? 확실히 책으로 볼 때는, 하아하아, 이, 이런 거 좋아하지만……. 조금 동경하긴 했지만……」"

[[dialogue]]
speaker = "unk"
original = "手足を拘束されたミアの小さな割れ目から、つうっと卑猥な汁が垂れていく。"
translation = "손발이 구속된 미아의 작은 갈라진 틈에서, 주르륵 비외한 즙이 늘어져 간다."

[[dialogue]]
speaker = "クロト"
original = "「知らなかったよ。ミアってこんなにマゾだったんだな」"
translation = "「몰랐는걸. 미아가 이렇게 마조였을 줄이야」"

[[dialogue]]
speaker = "ミア"
original = "「は、はう……。それはだって、そっちがずっと遠慮してくるから……。子ども扱いして、ちっとも手を出してこないから……」"
translation = "「하, 하우……. 그건 그게, 그쪽이 계속 사양하니까……. 어린애 취급하고, 조금도 손을 대지 않으니까……」"

[[dialogue]]
speaker = "ミア"
original = "「仕方ないとはわかってる、けど……。私の体、こんなに貧相だし……。エッチしたくなるような体じゃないし……」"
translation = "「어쩔 수 없다는 건 알고 있지만……. 내 몸, 이렇게 빈약하고……. 야하고 싶어지는 몸이 아니니까……」"

[[dialogue]]
speaker = "ミア"
original = "「薄い本の中の会長さんならともかく……現実の会長さんはすごく優しいから。無理やり犯したり、とか……。そういうのしない人だし……」"
translation = "「얇은 책 속의 회장님이라면 모를까…… 현실의 회장님은 엄청 상냥하니까. 억지로 범한다거나……. 그런 거 안 하는 사람이고……」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことないよ。本当は俺だってずっと──」"
translation = "「그렇지 않아. 사실 나도 계속──」"

[[dialogue]]
speaker = "ミア"
original = "「え？\u3000──ひぃあっ、あっ……<emoji=heart04>\u3000くすぐったっ、あぁ、熱くて太いの、擦れてっ……<emoji=heart04>」"
translation = "「에? ──히익, 앗……<emoji=heart04> 간지러워, 아아, 뜨겁고 굵은 게, 스치고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の性欲をくすぐってやまない小さな体を撫で回しながら、産毛も生えていないツルツルの割れ目に肉棒を擦り付けていく。"
translation = "나의 성욕을 끊임없이 자극하는 작은 몸을 여기저기 쓰다듬으면서, 솜털도 나지 않은 매끈매끈한 갈라진 틈에 자지를 문질러 간다."

[[dialogue]]
speaker = "ミア"
original = "「あっ……<emoji=heart04>\u3000待ってっ、んぁっ……<emoji=heart04>\u3000まだ前戯もしてないのに、あっ……はぁっ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 기다려, 응앗……<emoji=heart04> 아직 전희도 안 했는데, 앗…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体をイヤイヤと揺らして逃れようとするミア。いつもならここで優しくしちゃってたけど──"
translation = "몸을 도리도리 흔들며 벗어나려 하는 미아. 평소라면 여기서 상냥하게 해줬겠지만──"

[[dialogue]]
speaker = "ミア"
original = "「ふぁっ<emoji=heart04>\u3000ダ、ダメっ、んぁっ、まだ入らな──」"
translation = "「후아<emoji=heart04> 아, 안 돼, 응앗, 아직 안 들어──」"

[[dialogue]]
speaker = "ミア"
original = "「くはぁあんっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000あっ、はぁっ、あはぁあんっっ<emoji=heart04>」"
translation = "「쿠하앙<emoji=heart04> 아아앙<emoji=heart04> 앗, 하아, 아하앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "問答無用で狭い膣内にペニスを突き入れていく。"
translation = "문답무용으로 좁은 질 내부에 페니스를 찔러 넣는다."

[[dialogue]]
speaker = "unk"
original = "小さすぎる割れ目が俺のモノでミチミチと広がっていくのがわかる。"
translation = "너무나 작은 갈라진 틈이 나의 것으로 꽉꽉 넓어져 가는 것이 느껴진다."

[[dialogue]]
speaker = "ミア"
original = "「会長さんが、あっ、あっ、こんなに無理やり挿れてくる、なんてっ……<emoji=heart04>」"
translation = "「회장님이, 앗, 앗, 이렇게 억지로 집어넣다니……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「いつもは、もっと優しいのにっ……<emoji=heart04>\u3000私が絶対に痛がらないようにって、あっ、はぁっ、あっ、すごく丁寧に愛撫してくれるのにっ……<emoji=heart04>」"
translation = "「평소에는, 훨씬 상냥한데……<emoji=heart04> 내가 절대로 아파하지 않도록, 앗, 하아, 앗, 엄청 정성스럽게 애무해 주는데……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「なのに私を縛り上げてっ、はぁあんっ、好き放題に私の体撫で回してっ、オナホ使うみたいにおち○ちんズボズボしてっ……<emoji=heart04>」"
translation = "「그런데 나를 묶어놓고, 하아앙, 마음껏 내 몸을 쓰다듬고, 오나홀 사용하는 것처럼 자지를 들락날락하고……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「しかも、んはぁぁっ……<emoji=heart04>\u3000いつもよりおっきいっ……<emoji=heart04>\u3000お腹苦しっ……<emoji=heart04>\u3000こんなに興奮して、くれてっ……<emoji=heart04>」"
translation = "「게다가, 응하아아……<emoji=heart04> 평소보다 커……<emoji=heart04> 배가 괴로워……<emoji=heart04> 이렇게 흥분해 줘서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先程よりも大量の愛液を溢れさせながら、ミアが興奮したように狭い膣をギュウギュウと締めてきてくれる。"
translation = "아까보다 대량의 애액을 흘리면서, 미아가 흥분한 듯이 좁은 질을 꽉꽉 조여 온다."

[[dialogue]]
speaker = "unk"
original = "ミアの膣内もいつもより熱い。トロトロに蕩けて、グツグツに火照っている。本当にこういうプレイがお好みだったみたいだ。"
translation = "미아의 질 안도 평소보다 뜨겁다. 말랑말랑하게 녹아내려, 부글부글 달아올라 있다. 정말로 이런 플레이가 취향이었던 모양이다."

[[dialogue]]
speaker = "unk"
original = "彼女のそんな変態な一面を知って、さらに昂ぶってしまう。"
translation = "그녀의 그런 변태적인 일면을 알고 나니, 더욱 고양되어 버린다."

[[dialogue]]
speaker = "ミア"
original = "「くあっ、あっ、んああああっっ<emoji=heart04>\u3000赤ちゃんの部屋無理やり押し潰しながらっ、くはぁ、おち○ちんが根元の根元までっ……<emoji=heart04>」"
translation = "「쿠앗, 앗, 응아아아앗<emoji=heart04> 아기 방을 억지로 짓누르면서, 쿠하아, 자지가 뿌리 끝까지……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「普段は半分くらいしか挿れない、のにっ<emoji=heart04>\u3000私のおま○こ小さくって、んひぁ、あはぁ、入りきらないとか言ってたのにっ<emoji=heart04>」"
translation = "「평소에는 절반 정도밖에 안 넣으면서<emoji=heart04> 내 보지가 작아서, 응히아, 아하아, 다 안 들어간다고 했으면서<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「無理やりねじ込めば、くあぁぁっ、はいっ、入るじゃないっ……<emoji=heart04>\u3000最初からこうしてくれれば、くふっ、良かったのにっ……<emoji=heart04>」"
translation = "「억지로 밀어 넣으면, 쿠아아앗, 드, 들어가잖아……<emoji=heart04> 처음부터 이렇게 해줬으면, 쿠훗, 좋았을 텐데……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "苦しげなミアの声を聞いて、つい抽挿を止めてしまいそうになる。"
translation = "괴로운 듯한 미아의 목소리를 듣고, 그만 추삽질을 멈춰버릴 뻔한다."

[[dialogue]]
speaker = "unk"
original = "本来は俺のペニスの半分ほどしか入らない膣内に無理くり丸ごと突き入れているんだ。強がっているみたいだけど相当つらいはずだ。"
translation = "본래는 내 페니스의 절반 정도밖에 들어가지 않는 질 내부에 억지로 통째로 찔러 넣고 있는 것이다. 강한 척하고 있지만 상당히 힘들 게 분명하다."

[[dialogue]]
speaker = "ミア"
original = "「ダメっ、やめっ、やめないでっ……<emoji=heart04>\u3000遠慮せずに続けてぇっ……<emoji=heart04>」"
translation = "「안 돼, 그만, 그만두지 마……<emoji=heart04> 사양 말고 계속해 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「よーやく、くぁあっ、大好きな人のおち○ちんっ、全部挿れてもらえたんだからっ……<emoji=heart04>\u3000よーやくぴったり、ひとつになれたんだからっ……<emoji=heart04>」"
translation = "「드디어, 쿠아앗, 좋아하는 사람의 자지, 전부 넣어줬으니까……<emoji=heart04> 드디어 딱 맞게, 하나가 됐으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「私のおま〇こなんて、んぁっ、あぁっ<emoji=heart04>\u3000あなたのおち○ちんで広げてくれたらいいのっ……<emoji=heart04>」"
translation = "「내 보지 같은 건, 응앗, 아앗<emoji=heart04> 당신의 자지로 넓혀주면 되는 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「狭くて小さくて、くはぁあっ、おち○ちん入りきらないなら、あっ、あっ、入るように調教してくれればいいんだからっ……<emoji=heart04>」"
translation = "「좁고 작아서, 쿠하아앗, 자지가 다 안 들어간다면, 앗, 앗, 들어가도록 조교해 주면 되는 거니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「もう子ども扱いしないでっ<emoji=heart04>\u3000優しくしようとしないでっ<emoji=heart04>」"
translation = "「이제 어린애 취급하지 마<emoji=heart04> 상냥하게 대하려 하지 마<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「私にあなたの愛をっ、おち○ちんを、丸ごと受け止めさせてっ<emoji=heart04>」"
translation = "「나에게 당신의 사랑을, 자지를, 통째로 받아내게 해줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "縛られて動けないはずなのに、腰を揺らして奥へ奥へと肉棒を挿入させようとしてくる。"
translation = "묶여서 움직이지 못할 텐데도, 허리를 흔들며 안쪽으로, 안쪽으로 육봉을 삽입시키려 한다."

[[dialogue]]
speaker = "unk"
original = "絶対に抜かせないとばかりにおま○こを必死に締めて、俺のペニスを熱烈に咥え込んでくれる。"
translation = "절대로 빼지 못하게 하겠다는 듯 보지를 필사적으로 조이며, 나의 페니스를 열렬하게 물어준다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の気持ちが嬉しくて、キツキツおま○こにペニスを丸ごと咥え込ませる感触が最高に快感で、どんどん突き込んでしまう。"
translation = "그런 그녀의 마음이 기쁘고, 꽉 끼는 보지에 페니스를 통째로 머금게 하는 감촉이 최고로 쾌감이라, 점점 더 찔러 넣게 된다."

[[dialogue]]
speaker = "ミア"
original = "「あっ、はぁっ、あっ、ああああっっ<emoji=heart04>」"
translation = "「앗, 하아, 앗, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「それでっ、くあぁっ、それでいいのっ<emoji=heart04>\u3000遠慮せずに、あっ、あっ、おま○こ突いてぇっ<emoji=heart04>」"
translation = "「그걸로, 쿠아앗, 그걸로 된 거야<emoji=heart04> 사양 말고, 앗, 앗, 보지를 찔러줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「どんなに広がっちゃってもいいんだからっ<emoji=heart04>\u3000どうせ、あっ、はぁあんっ、あなたのおち○ちんしか挿れないんだからっ<emoji=heart04>」"
translation = "「아무리 넓어져 버려도 상관없으니까<emoji=heart04> 어차피, 앗, 하아앙, 당신 자지밖에 안 넣을 거니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「私のおま○こっ、あなたのおち○ちん用に拡張してっ……<emoji=heart04>\u3000私もされたいっ……<emoji=heart04>\u3000開発されたいっ……<emoji=heart04>」"
translation = "「내 보지, 당신 자지용으로 확장해 줘……<emoji=heart04> 나도 당하고 싶어……<emoji=heart04> 개발되고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「私はろくに身動きも取れないんだからっ……<emoji=heart04>\u3000会長さんの好きにっ、あっ、あっ、好きに犯してっ……<emoji=heart04>」"
translation = "「나는 제대로 움직이지도 못하니까……<emoji=heart04> 회장님 마음대로, 앗, 앗, 마음껏 범해줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「ただひたすら、あはぁんっ、欲望をぶつけてくれたらいいのっ……<emoji=heart04>」"
translation = "「그저 오로지, 아하앙, 욕망을 부딪쳐 주면 되는 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "インモラルなミアの訴えに欲望の枷が取り払われていく。"
translation = "부도덕한 미아의 호소에 욕망의 굴레가 벗겨져 간다."

[[dialogue]]
speaker = "unk"
original = "その小さく瑞々しいスベスベな肢体を、好き放題に撫で回しながら、その興奮を窮屈でドロドロな膣内にぶつけていく。"
translation = "그 작고 싱그러운 매끄러운 지체를 마음껏 쓰다듬으면서, 그 흥분을 비좁고 걸쭉한 질 내부에 쏟아붓는다."

[[dialogue]]
speaker = "ミア"
original = "「ひぃあっ、ああっっ<emoji=heart04>\u3000手が蛇みたいに全身を這い回ってっ……<emoji=heart04>」"
translation = "「히익, 아앗<emoji=heart04> 손이 뱀처럼 전신을 기어 다니고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「やらしっ、あはぁあんっ……<emoji=heart04>\u3000きゃっ、お尻っ、あぁんっ、モミモミしちゃ、ふあぁぁんっ……<emoji=heart04>」"
translation = "「야해, 아하아앙……<emoji=heart04> 꺄앗, 엉덩이, 아앙, 조물조물하면, 후아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小ぶりでプニプニのお尻を揉み回しているだけでも最高に気持ちいい。"
translation = "아담하고 탱글탱글한 엉덩이를 주무르는 것만으로도 최고로 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "このぷるんぷるんに張った柔肉をどれだけ触りたかったことか。"
translation = "이 탱글탱글하게 부푼 부드러운 살점을 얼마나 만지고 싶어 했던가."

[[dialogue]]
speaker = "ミア"
original = "「きゃふぅんっ、んふっ、はぁぁっ、脇腹恥ずかしっ……<emoji=heart04>\u3000ひぃあああんっ、そんなナデナデされたら、あっ、あぁっ……<emoji=heart04>」"
translation = "「꺄훈, 응훗, 하아아, 옆구리 부끄러워……<emoji=heart04> 히아아앙, 그렇게 쓰담쓰담 당하면, 앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「くすぐったっ、きゃふっ、くひぃんっ……<emoji=heart04>\u3000恥ずかしいっ……<emoji=heart04>\u3000ぬいぐるみに、あっ、あっ、なった気分っ……<emoji=heart04>」"
translation = "「간지러워, 꺄훗, 쿠히잉……<emoji=heart04> 부끄러워……<emoji=heart04> 인형이, 앗, 앗, 된 기분이야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こそばゆさに悶えるミアの反応がエロくてたまらない。"
translation = "간지러움에 몸부림치는 미아의 반응이 야해서 참을 수가 없다."

[[dialogue]]
speaker = "unk"
original = "まだ性感帯にすらなっていない幼い体へ好きに触れている背徳感が興奮を押し上げてくる。"
translation = "아직 성감대조차 되지 않은 어린 몸을 마음껏 탐닉하고 있다는 배덕감이 흥분을 고조시킨다."

[[dialogue]]
speaker = "unk"
original = "窮屈すぎる膣内がじゅわわと濡れそぼりながらビクつく感触があまりにも快感で──"
translation = "지나치게 비좁은 질내가 쥬르륵 젖어 들며 파르르 떨리는 감촉이 너무나 쾌감이라──"

[[dialogue]]
speaker = "ミア"
original = "「んあっ<emoji=heart04>\u3000あはぁんっ<emoji=heart04>\u3000あっ、あっ、あっ、ああああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아하앙<emoji=heart04> 앗, 앗, 앗, 아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「だめっ、はげしっ<emoji=heart04>\u3000んあああああっっ<emoji=heart04>\u3000はげしすぎっ<emoji=heart04>」"
translation = "「안 돼, 격해<emoji=heart04> 응아아아아앗<emoji=heart04> 너무 격해<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「待ってっ、ああっ、おま○こ壊れちゃっ<emoji=heart04>\u3000あっ、はっ、あぁあっ<emoji=heart04>\u3000もう少しゆっくりっ、ああぁっ、ゆっくりぃっ<emoji=heart04>」"
translation = "「기다려, 아앗, 보지 망가져버렷<emoji=heart04> 앗, 하앗, 아아앗<emoji=heart04> 조금만 더 천천히, 아아앗, 천천히이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "焦った様子でミアが訴えてくるけれど、もう止められない。"
translation = "당황한 기색으로 미아가 호소해 오지만, 이제 멈출 수 없다."

[[dialogue]]
speaker = "unk"
original = "この小さなおま○こを無理やり広げていく感触が気持ち良すぎて、一心不乱に突きまくってしまう。"
translation = "이 작은 보지를 억지로 넓혀가는 감촉이 너무 기분 좋아서, 정신없이 쳐올리게 된다."

[[dialogue]]
speaker = "ミア"
original = "「あっ、あっ、あっ、あっ、すごっ、すごいっ<emoji=heart04>\u3000あの優しい会長さんがっ、あはぁんっ、こんなに夢中で腰を振ってっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗, 굉장해, 굉장해엣<emoji=heart04> 그 다정하던 회장님이, 아하앙, 이렇게나 필사적으로 허리를 흔들고<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「犯されっ、あああっ、欲望のままに犯されちゃってるっ<emoji=heart04>\u3000今私っ、会長さんに本気で犯されちゃってるっ<emoji=heart04>」"
translation = "「범해져, 아아앗, 욕망이 가는 대로 범해지고 있어<emoji=heart04> 지금 나, 회장님한테 진심으로 범해지고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「あひぃんっ<emoji=heart04>\u3000あぁっ、それっ、んぁああっ、それダメぇっ<emoji=heart04>\u3000ズドンズドンするのダメぇっ……<emoji=heart04>」"
translation = "「아히잉<emoji=heart04> 아앗, 그거, 응아아앗, 그거 안 돼에<emoji=heart04> 쿵쾅쿵쾅 하는 거 안 돼애……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやら先っぽまで引き抜いて一気に根元まで沈められるのが好きみたいで、感じすぎてしまうのかミアがヤダヤダと悶える。"
translation = "아무래도 끝까지 빼냈다가 단숨에 뿌리까지 박히는 게 좋은 모양인지, 너무 느껴버린 탓에 미아가 싫다며 몸을 비튼다."

[[dialogue]]
speaker = "unk"
original = "けれど縛られた状態では抵抗も空しい。むしろ俺のペニスを猛らせることしかできない。"
translation = "하지만 묶인 상태로는 저항도 헛수고다. 오히려 내 페니스를 더욱 화나게 할 뿐이다."

[[dialogue]]
speaker = "ミア"
original = "「んひぃいいっ<emoji=heart04>\u3000私、動けないのにっ<emoji=heart04>\u3000おっきなおち○ちんで、めちゃくちゃに突かれて、生オナホにされちゃってるぅっ<emoji=heart04>」"
translation = "「응히이이익<emoji=heart04> 나, 움직이지도 못하는데에<emoji=heart04> 커다란 자지로, 엉망진창으로 찔려서, 생 오나홀이 되어버렷<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「くはぁあんっ<emoji=heart04>\u3000はひぃんっ<emoji=heart04>\u3000ホントダメぇっ、イっちゃっ、あああっ、イっちゃうっ<emoji=heart04>」"
translation = "「쿠하앙<emoji=heart04> 하히잉<emoji=heart04> 정말 안 돼에, 가버렷, 아아앗, 가버려어<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「ん゛っ──ん゛んんんんんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あはぁっ、はぁーっ、あーっ、あはぁぁーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으──응으으으으으으으으읏~~<emoji=heart04><emoji=heart04><emoji=heart04> 아하앗, 하아, 아아, 아하아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "過呼吸になりそうなほどミアが息を荒くしてよがる。"
translation = "과호흡이 올 정도로 미아가 거칠게 숨을 몰아쉬며 느낀다."

[[dialogue]]
speaker = "unk"
original = "普段はここで一旦止めてしまいそうなものだけど、今日はとてもじゃないけど止められない。"
translation = "평소라면 여기서 일단 멈췄겠지만, 오늘은 도저히 멈출 수가 없다."

[[dialogue]]
speaker = "unk"
original = "ミアの腰をがっしりと掴んで、欲望のまま腰を打ち付けてしまう。"
translation = "미아의 허리를 꽉 붙잡고, 욕망이 이끄는 대로 허리를 처박는다."

[[dialogue]]
speaker = "ミア"
original = "「はふぁああっっ<emoji=heart04>\u3000もうイってるのにっ、ああああっ、イってるのにぃっ<emoji=heart04>」"
translation = "「하후아아앗<emoji=heart04> 벌써 가고 있는데, 아아아앗, 가고 있는데에<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「こんな乱暴な会長さん初めてっ……<emoji=heart04>\u3000またイクっ、イクっ、イクイクイクぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이런 난폭한 회장님 처음이야……<emoji=heart04> 또 가, 가, 가버려어어어~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「あはぁーっ、はぁ―っ、あぁあああっっーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000気持ちいいのっ、終わらないっ……<emoji=heart04>\u3000体とけっ、とけるぅっ……<emoji=heart04>」"
translation = "「아하아아, 하아, 아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04> 기분 좋아, 끝나지 않아……<emoji=heart04> 몸이 녹아, 녹아버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「会長さんの性欲って、あぁっ、こんなにすごかったんだっ……<emoji=heart04>\u3000今まで、あっ、あっ、どれだけ遠慮されてっ……<emoji=heart04>」"
translation = "「회장님의 성욕이, 아앗, 이렇게나 대단했다니……<emoji=heart04> 지금까지, 앗, 앗, 얼마나 사양해 왔던 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「でも、あひぃんっ、しあわせっ<emoji=heart04>\u3000乱暴にされるのもっ<emoji=heart04>\u3000あっ、はぁっ、あぁっ、ダメって言ってるのに突かれるのもぉっ<emoji=heart04>」"
translation = "「하지만, 아히잉, 행복해<emoji=heart04> 난폭하게 다뤄지는 것도<emoji=heart04> 앗, 하앗, 아아앗, 안 된다고 말하는데 찔리는 것도오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あれだけ狭かったミアのおま○こが俺のペニスに馴染んできているのがわかる。"
translation = "그렇게나 좁았던 미아의 보지가 내 페니스에 길들여지고 있다는 게 느껴진다."

[[dialogue]]
speaker = "unk"
original = "根元まで沈めても痛がるどころか愛液を溢れさせ、ミアの体が俺専用に変わってきていた。"
translation = "뿌리까지 박아도 아파하기는커녕 애액을 쏟아내며, 미아의 몸은 나 전용으로 변해가고 있었다."

[[dialogue]]
speaker = "ミア"
original = "「あっはぁんっ<emoji=heart04>\u3000イクっ、きもちっ、きもちいいっっ<emoji=heart04>」"
translation = "「앗하앙<emoji=heart04> 가버려, 기분, 기분 좋아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「頭の中フワフワしちゃっ、あふぁぁあっ、おち○ちん気持ちいいっ、気持ちいいよぉっ<emoji=heart04>」"
translation = "「머릿속이 둥실둥실거려, 아후아아앗, 자지 기분 좋아, 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「バカにっ<emoji=heart04>\u3000ホントにバカになっちゃうっ<emoji=heart04>\u3000気持ち良すぎて頭の中茹だっちゃうっ<emoji=heart04>」"
translation = "「바보가, <emoji=heart04> 정말로 바보가 되어버려어<emoji=heart04> 너무 기분 좋아서 머릿속이 삶아져버려어<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「エッチな漫画に書いてあること、あっ、あっ、ホントだったんだっ<emoji=heart04>\u3000こんなに気持ちいいコトずっとされると、されるとぉっ……<emoji=heart04>」"
translation = "「야한 만화에 써 있던 거, 앗, 앗, 진짜였어어<emoji=heart04> 이렇게 기분 좋은 짓 계속 당하면, 당하면어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「あはぁーっ、はぁーっ、ん゛あああああっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ど、奴隷になっちゃうっ……<emoji=heart04>\u3000おち○ちんの奴隷にっ……<emoji=heart04>」"
translation = "「아하아, 하아, 응아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 노, 노예가 되어버려어……<emoji=heart04> 자지의 노예로……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体ごと膣を痙攣させながら、ミアが幼顔を快感に蕩けさせる。"
translation = "온몸과 함께 질을 경련시키며, 미아가 어린 얼굴을 쾌감에 녹여내린다."

[[dialogue]]
speaker = "unk"
original = "イケナイ快感を幼子に覚え込ませているような背徳感が、俺の血流をドクドクと滾らせてきて──"
translation = "해서는 안 될 쾌감을 아이에게 각인시키고 있다는 배덕감이, 내 혈류를 요동치게 만들고──"

[[dialogue]]
speaker = "ミア"
original = "「んああああっっ<emoji=heart04>\u3000ふくらっ、あああっ、膣内でおち○ちん膨らんでっ<emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 부풀어, 아아앗, 질 안에서 자지가 부풀어서어<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「ああっ、ダメぇっ<emoji=heart04>\u3000中は絶対ダメぇっ<emoji=heart04>\u3000ママになっちゃうっ<emoji=heart04>\u3000風紀委員として、それだけは絶対ダメぇっ<emoji=heart04>」"
translation = "「아앗, 안 돼에<emoji=heart04> 안에는 절대 안 돼에<emoji=heart04> 엄마가 되어버려어<emoji=heart04> 풍기위원으로서, 그것만은 절대 안 돼에<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「いつもみたいに外に出してっ<emoji=heart04>\u3000優しい会長さんならっ、あっ、あっ、わかってくれるでしょっ<emoji=heart04>」"
translation = "「평소처럼 밖에다 해줘어<emoji=heart04> 상냥한 회장님이라면, 앗, 앗, 알아줄 거잖아아<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「絶対私のことママにしちゃダメっ、妊娠させようとしちゃダメなんだからぁっ……<emoji=heart04>」"
translation = "「절대 나 엄마로 만들면 안 돼, 임신시키려고 하면 안 된단 말이야아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉とは裏腹にミアのおま○こが今まで以上にキツく俺のペニスを締め付けてくる。"
translation = "말과는 반대로 미아의 보지는 그 어느 때보다 강하게 내 페니스를 조여온다."

[[dialogue]]
speaker = "unk"
original = "そのまるで子どもが必死に袖を掴んでくるような締め付けに、肉棒が一段と膨れあがる。"
translation = "마치 아이가 필사적으로 소매를 붙잡는 듯한 조임에, 육봉이 한층 더 팽창한다."

[[dialogue]]
speaker = "ミア"
original = "「くあああっ<emoji=heart04>\u3000ダメってっ、ダメって言ってるのにっ<emoji=heart04>\u3000ああああっ、ずっぽり根元まで入ってきてぇっ<emoji=heart04>」"
translation = "「쿠아아앗<emoji=heart04> 안 된다고, 안 된다고 말하는데에<emoji=heart04> 아아아앗, 푹 뿌리까지 들어와서어<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「あふぁああっ、きてるっ<emoji=heart04>\u3000ものすごくドクンドクンしてるぅっ<emoji=heart04>\u3000会長さんの精子っ、すぐそこにまでのぼってきてるっ<emoji=heart04>」"
translation = "「아후아아앗, 오고 있어<emoji=heart04> 엄청나게 두근두근거려어<emoji=heart04> 회장님의 정액, 바로 거기까지 올라오고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「ダメぇっ、え、えへへっ、無理やり種付けしちゃダメぇっ<emoji=heart04>\u3000絶対イっちゃっ、イっちゃうからっ<emoji=heart04>\u3000今までにないくらいイっちゃうからぁっっ<emoji=heart04>」"
translation = "「안 돼에, 에, 에헤헤, 억지로 씨내리기 하면 안 돼에<emoji=heart04> 절대 가버, 가버릴 테니까아<emoji=heart04> 지금까지 없었을 정도로 가버릴 테니까아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人揃って背徳感に燃えながら、絶頂への階段を駆け上がっていく。"
translation = "둘이 나란히 배덕감에 타오르며, 절정의 계단을 뛰어 올라간다."

[[dialogue]]
speaker = "unk"
original = "そして溜めに溜めた性欲を解放しようと──"
translation = "그리고 쌓이고 쌓인 성욕을 해방하고자──"

[[dialogue]]
speaker = "ミア"
original = "「あぁっ、イクぅっ<emoji=heart04>\u3000イクイクイクぅぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イキながら、受精して、孕ませられちゃうぅっ<emoji=heart04>」"
translation = "「아아앗, 가버려어<emoji=heart04> 가버려 가버려 가버려어어어<emoji=heart04><emoji=heart04><emoji=heart04> 가면서, 수정해서, 임신당해버려어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「今出されたら絶対私っ、会長さんの奴隷にっ<emoji=heart04>\u3000愛の奴隷にっ<emoji=heart04>」"
translation = "「지금 싸버리면 절대 나, 회장님의 노예로<emoji=heart04> 사랑의 노예로<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「おち○ぽの奴隷にっ、なっちゃうううううううっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지의 노예가, 되어버려어어어어어어어~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「んああああああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふぁっ、くはああっっ、あああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04> 후아, 쿠하아아앗, 아아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "繋がった場所からボタボタと白濁がこぼれ落ちてしまうほど、ミアの子宮へありったけの精子を注ぎ込む。"
translation = "이어진 곳에서 백탁이 뚝뚝 흘러넘칠 정도로, 미아의 자궁에 있는 대로 정액을 쏟아붓는다."

[[dialogue]]
speaker = "ミア"
original = "「はふぁあああっっ、あはぁーっっ<emoji=heart04>\u3000焼けっ、焼けちゃっ<emoji=heart04>\u3000熱いのビュービューお腹の中にきてっっ……<emoji=heart04>」"
translation = "「하후아아아앗, 아하아앗<emoji=heart04> 타버려, 타버려어<emoji=heart04> 뜨거운 게 뷰븃 배 속으로 들어와서어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「逃げられないっ……<emoji=heart04>\u3000無理やり注がれてっ……<emoji=heart04>\u3000中出しなんて絶対ダメなのにっ……<emoji=heart04>\u3000あぁ、まだくるっ、ドピュドピュくるぅっ……<emoji=heart04>」"
translation = "「도망칠 수 없어……<emoji=heart04> 억지로 부어져서……<emoji=heart04> 질내사정 같은 거 절대 안 되는데……<emoji=heart04> 아아, 아직 나와, 뿌득뿌득 나오고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「きもち、あふぁ、きもちいいっっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こキュンキュンとまんないっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「기분, 아후아, 기분 좋아아……<emoji=heart04><emoji=heart04><emoji=heart04> 보지가 큥큥거리는 게 멈추질 않아아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手足を拘束されたままミアがガクンガクンと痙攣する。一切抵抗できない彼女にありったけの精を注ぎ続ける。"
translation = "손발이 구속된 채 미아가 덜덜 떨며 경련한다. 전혀 저항할 수 없는 그녀에게 있는 힘껏 정을 계속 쏟는다."

[[dialogue]]
speaker = "unk"
original = "そうして満足したところでゆっくりとペニスを抜いて──"
translation = "그렇게 만족한 시점에서 천천히 페니스를 뽑아내고──"

[[dialogue]]
speaker = "ミア"
original = "「はぁ、はぁ、はぁっ……<emoji=heart04>\u3000え、えへへ、すごかった……<emoji=heart04>\u3000本当の意味で会長さんとエッチできた気がする……<emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04> 에, 에헤헤, 굉장했어……<emoji=heart04> 진정한 의미로 회장님과 섹스했다는 기분이 들어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「私も、はぁはぁ、変な扉開いちゃったかも……<emoji=heart04>\u3000縛られるのも、無理やりされるのも、ホント気持ち良かった……<emoji=heart04>」"
translation = "「나도, 하아하아, 이상한 문이 열려버렸을지도……<emoji=heart04> 묶이는 것도, 억지로 당하는 것도, 정말 기분 좋았어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「へ、変態でごめんね……？\u3000引いちゃうかしら……」"
translation = "「벼, 변태라서 미안해……? 정떨어지려나……」"

[[dialogue]]
speaker = "unk"
original = "まだ縛られたミアが不安そうに見つめてくる。でも変態というなら俺も──"
translation = "여전히 묶인 미아가 불안한 듯 바라본다. 하지만 변태라고 한다면 나 또한──"

[[dialogue]]
speaker = "ミア"
original = "「ふぁ……<emoji=heart04>\u3000ふふ、また固くなってる……<emoji=heart04>\u3000やっぱり思った通り、会長さんってＳっ気が強かったのね……<emoji=heart04>」"
translation = "「후아……<emoji=heart04> 후후, 다시 딱딱해졌어……<emoji=heart04> 역시 생각했던 대로, 회장님은 S 기질이 강했네……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「なら、その……<emoji=heart04>\u3000も、もっと私のこと調教してくれる……？\u3000今まで我慢してきたこと、全部してくれていいから……<emoji=heart04>」"
translation = "「그럼, 저기……<emoji=heart04> 더, 더 나를 조교해 줄래……? 지금까지 참아왔던 거, 전부 다 해줘도 좋으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
original = "「私を会長さんの、えへへ、愛の奴隷にして……？」"
translation = "「나를 회장님의, 에헤헤, 사랑의 노예로 만들어줘……?」"

