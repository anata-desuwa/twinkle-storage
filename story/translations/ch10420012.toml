[[dialogue]]
speaker = "unk"
original = "第２話,転入生と暗殺者,P"
translation = "제2화, 전입생과 암살자, P"

[[dialogue]]
speaker = "unk"
original = "戦闘報告書をフィオナに渡す為、流星学園の星徒会室に出向いた時のこと――"
translation = "전투 보고서를 피오나에게 전달하기 위해 유성학원의 성도회실에 들렀을 때의 일──"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はいっ、ようこそいらっしゃいました……あっ！\u3000会長さん、ごきげんよう！」"
translation = "「네! 어서 오세요…… 앗! 회장님, 평안하신가요!」"

[[dialogue]]
speaker = "unk"
original = "フニがどうしてここに？"
translation = "후니가 어째서 여기에?"

[[dialogue]]
speaker = "unk"
original = "ごきげんよう……って、あれ？"
translation = "평안하신가요…… 어라?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「実は私、星見家メイド隊でバイトを始めたんですっ。何か服と雰囲気がメイドっぽいからって、熱烈なスカウトを受けまして……」"
translation = "「사실 저, 호시미 가문 메이드대에서 아르바이트를 시작했어요! 왠지 옷이랑 분위기가 메이드 같다고 열렬한 스카우트를 받아서……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長、ごきげんよう。フィオナお嬢様に何かご用件でしょうか？」"
translation = "「히노미야 회장님, 평안하신가요. 피오나 아가씨께 무슨 용건이신지요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……なるほど。フィオナお嬢様は、小一時間程で戻って来ると仰っていました。報告書をお預かりしておくことも出来ますが……」"
translation = "「……그렇군요. 피오나 아가씨께서는 한 시간 정도 후에 돌아오신다고 하셨습니다. 보고서를 맡아둘 수도 있습니다만……」"

[[dialogue]]
speaker = "unk"
original = "待たせてもらいたいけど、仕事の邪魔になる？"
translation = "기다리고 싶은데 업무에 방해가 될까?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お気になさらず。星徒会室の掃除はちょうど終わりましたし、接客もメイドの仕事ですので」"
translation = "「개의치 마십시오. 성도회실 청소는 마침 끝났고, 접객도 메이드의 업무니까요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さん、どうぞこちらのソファーに！\u3000ただいま、紅茶をお出ししますのでっ」"
translation = "「회장님, 부디 이쪽 소파에! 지금 바로 홍차를 내올 테니까요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「こちらです。火傷しないようお気を付け下さい」"
translation = "「여기 있습니다. 데이지 않도록 조심하세요.」"

[[dialogue]]
speaker = "unk"
original = "速い！？"
translation = "빨라!?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「フニさまの作業スピードはメイド隊の中でも屈指です。バイトでなく、本採用の推薦をしたいくらいに」"
translation = "「후니 님의 작업 속도는 메이드대 중에서도 굴지입니다. 아르바이트가 아니라 정식 채용 추천을 하고 싶을 정도로요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ……ナミエルちゃんに褒められると照れちゃいますね♪\u3000地元にいた時、村の皆さんの家事をお手伝いしていたら、自然と出来るようになっただけなんですけど」"
translation = "「에헤헤…… 나미엘짱한테 칭찬받으니까 쑥스럽네요♪ 고향에 있을 때 마을 분들 집안일을 도와드렸더니 자연스럽게 할 수 있게 된 것뿐이지만요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あっ、そうだ！\u3000これもまだ会長さんに言ってなかったですけど、私、ナミエルちゃんとお友達になったんですよ！」"
translation = "「앗, 맞다! 이것도 아직 회장님께 말씀 안 드렸는데, 저 나미엘짱이랑 친구가 되었어요!」"

[[dialogue]]
speaker = "unk"
original = "え！？"
translation = "에!?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……何ですか緋宮会長、その意外そうな目は？\u3000何か問題でも？」"
translation = "「……뭡니까 히노미야 회장님, 그 의외라는 듯한 눈은? 무슨 문제라도?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「最近、ナミエルちゃんにＳＮＳのやり方を教えてもらったりもして。おかげで<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>の扱いも大分慣れて来ましたっ」"
translation = "「최근 나미엘짱에게 SNS 하는 법을 배우기도 해서요. 덕분에 <ruby>DISC<rt>디스크</rt></ruby> 다루는 법도 꽤 익숙해졌어요!」"

[[dialogue]]
speaker = "unk"
original = "学園の生活にも慣れて来たみたいで良かった"
translation = "학원 생활에도 익숙해진 것 같아서 다행이야."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい。これまで普通の人間のように暮らして来たので、星力に目覚めた時は凄く不安でしたけど……えへへ♪\u3000みなさんのお陰です」"
translation = "「네. 지금까지 평범한 인간처럼 살아와서 성력에 눈을 떴을 때는 굉장히 불안했지만…… 에헤헤♪ 여러분 덕분이에요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そういえば、まったくのゼロから星力が覚醒したと言っていましたが、とても珍しいケースです。いったい、どのように……？」"
translation = "「그러고 보니 완전히 제로에서 성력이 각성했다고 하셨는데, 매우 드문 케이스입니다. 대체 어떻게……?」"

[[dialogue]]
speaker = "unk"
original = "事故で目覚めたって、聞いたような……？"
translation = "사고로 눈을 떴다고 들은 것 같은데……?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「２ヶ月くらい前、北海道の街でモンスターの襲撃事件があったんです」"
translation = "「두 달 전쯤 홋카이도 시내에서 몬스터 습격 사건이 있었어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「！\u3000ひょっとして、全国ニュースにもなった……」"
translation = "「! 설마 전국 뉴스에도 나왔던……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい、その事件です。私はその日、たまたま街へ買い物に出掛けていて、事件に遭遇しました。そこでモンスターの攻撃を受けて――」"
translation = "「네, 그 사건이에요. 저는 그날 우연히 시내로 쇼핑을 나갔다가 사건을 조우했어요. 거기서 몬스터의 공격을 받고──」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「瀕死の重傷を負い、片目を失明しました」"
translation = "「빈사 상태의 중상을 입고, 한쪽 눈을 실명했어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「失明？\u3000ですが……」"
translation = "「실명? 하지만……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「みなさんよく、綺麗なオッドアイだって言ってくれるんですけど、金色の瞳は目覚めた力の影響によるもの……『生命の星眼』という異能の目なんです」"
translation = "「다들 자주, 예쁜 오드아이라고 말해주시지만, 금색 눈동자는 깨어난 힘의 영향에 의한 것…… 『생명의 성안』이라는 이능의 눈이에요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「物理的な視力がない代わりに、星力を流すことで『ものを生かしている部分』を見ることが出来ます。相手の急所がわかる、って言うと分かりやすいでしょうか」"
translation = "「물리적인 시력이 없는 대신, 성력을 흘려보냄으로써 『무언가를 살아가게 하는 부분』을 볼 수 있어요. 상대의 급소를 알 수 있다, 라고 하면 이해하기 쉬울까요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ともかく、事件で１度、臨死体験をしたことで……私は力に目覚めました」"
translation = "「어쨌든, 사건으로 한 번 임사 체험을 함으로써…… 저는 힘에 눈을 떴어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「物理的に片目が見えなくなったことで、私はそれまで思い描いていた未来も、見えなくなった気がしていました」"
translation = "「물리적으로 한쪽 눈이 보이지 않게 되면서, 저는 그때까지 그려왔던 미래도 보이지 않게 된 기분이 들었어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「村の皆と離れて１人、これから自分がどうなって行くのかも分からず、凄く不安で……」"
translation = "「마을 사람들과 떨어져 혼자, 앞으로 자신이 어떻게 될지도 모른 채 무척 불안해서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「でも今は！\u3000会長さんやトワ先生、流星寮の皆さん、それにナミエルちゃんたちメイド隊の皆さんに出会えたおかげで、前向きな気持ちになれましたから」"
translation = "「하지만 지금은! 회장님이나 토와 선생님, 유성 기숙사의 여러분, 그리고 나미엘짱 일행인 메이드대 여러분을 만난 덕분에 긍정적인 마음이 되었으니까요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「この場所で、星騎士として、みなさんのお役に立てるように、頑張って行きたいって思っているんですっ」"
translation = "「이곳에서 성기사로서 여러분께 도움이 될 수 있도록 노력해 나가고 싶다고 생각하고 있어요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……って、何かすみません、無駄に張り切っちゃって……」"
translation = "「……라니, 뭔가 죄송해요, 쓸데없이 의욕이 넘쳐버려서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ちょっと恥ずかしいです……」"
translation = "「조금 부끄럽네요……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「かわいい……」"
translation = "「귀여워……」"

[[dialogue]]
speaker = "unk"
original = "えっ"
translation = "엣"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はっ……！」"
translation = "「핫……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……緋宮会長、それ以上何か言ったら掃除しますよ」"
translation = "「……히노미야 회장님, 거기서 더 뭔가 말씀하시면 청소하겠어요.」"

[[dialogue]]
speaker = "unk"
original = "掃除って何を！？"
translation = "청소라니 뭘!?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お２人とも、何かあったんですか？」"
translation = "「두 분 다 무슨 일 있었나요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ、フ二さまはお気になさらず」"
translation = "「아니요, 후니 님은 신경 쓰지 마시길.」"

[[dialogue]]
speaker = "unk"
original = "（……わかった気がするな）"
translation = "(……알 것 같은 기분이 드네.)"

[[dialogue]]
speaker = "unk"
original = "（ナミエルとフ二が仲良くなった理由）"
translation = "(나미엘과 후니가 친해진 이유.)"

[[dialogue]]
speaker = "unk"
original = "ナミエルがぬいぐるみなどの可愛いもの好きであったことを思い出し、１人納得するのであった。"
translation = "나미엘이 인형 같은 귀여운 것을 좋아했다는 사실을 떠올리며, 혼자 납득하는 것이었다."

