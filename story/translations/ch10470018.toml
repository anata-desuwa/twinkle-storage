[[dialogue]]
speaker = "unk"
original = "メルエルと恋人になってから初めて迎えた、彼女の誕生日。"
translation = "메르엘과 연인이 되고 나서 처음 맞이한 그녀의 생일."

[[dialogue]]
speaker = "unk"
original = "俺は彼女を家に招いていた──"
translation = "나는 그녀를 집으로 초대했다──"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへっ。今年はキミに誕生日をお祝いして貰えて、凄く幸せだよぉ。しかも、幼なじみとしてじゃなくて、恋人として、だもんねっ♪」"
translation = "「에헤헤. 올해는 너에게 생일 축하를 받을 수 있어서 정말 행복해. 게다가 소꿉친구가 아니라 연인으로서니까 말이야♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエル、誕生日プレゼントがあるんだ」"
translation = "「메르엘, 생일 선물이 있어.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「わぁっ、ありがとう♪\u3000この箱……開けてもいいの？」"
translation = "「와아, 고마워♪ 이 상자…… 열어봐도 돼?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「何だろう…………えっ！？\u3000指、輪？\u3000これって、どういう……？」"
translation = "「뭘까………… 엣!? 반, 지? 이건 어떻게 된……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その……結婚するって、約束だっただろ？」"
translation = "「그…… 결혼하기로 약속했었잖아?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「受け取って、もらえますか……？」"
translation = "「받아 주시겠습니까……?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「は、はいっ。あっ……グスッ……えへへ。嬉しくって、涙出て来ちゃった……♪」"
translation = "「네, 네! 앗…… 흑…… 에헤헤. 너무 기뻐서 눈물이 나와버렸어……♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん──」"
translation = "「회장군──」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私を、キミのお嫁さんに……して下さいっ」"
translation = "「저를 네 신부로…… 삼아주세요.」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、ただひたすらに甘い時間を過ごして──そうして、気が付くとベッドの上でお互いの体をぴったりをくっつけ合っていた。"
translation = "그 후 우리는 그저 달콤한 시간을 보냈고── 그러다 정신을 차려보니 침대 위에서 서로의 몸을 딱 밀착시키고 있었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ねぇ、もう１つだけ誕生日プレゼント……お願いしちゃっても、いいかな？\u3000その……ね？\u3000私、今、すっごく……キミに抱いてもらいたいって、思っちゃってるの……っ」"
translation = "「있지, 딱 하나만 더 생일 선물…… 부탁해도 될까? 그…… 있지? 나 지금 정말로…… 네가 안아줬으면 좋겠다고 생각하고 있어…….」"

[[dialogue]]
speaker = "unk"
original = "お互いに服を脱がし合いっこをして──俺たちは再び、ベッドの上で素肌と素肌を重ね合っていた。"
translation = "서로 옷을 벗겨주고── 우리는 다시 침대 위에서 맨살과 맨살을 겹치고 있었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあぁ……<emoji=heart04>\u3000なんだか今日は、いつもよりドキドキしちゃってる、かもっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 왠지 오늘은 평소보다 더 두근거리는 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「こ、これって、私たちが婚約しちゃったから、なのかな……？」"
translation = "「이, 이건 우리가 약혼해버려서 그런 걸까……?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ……待って、会長くん……！\u3000今キスしちゃ……んっ<emoji=heart04>\u3000……ちゅっ、んちゅっ……んむっ<emoji=heart04>\u3000ちゅぷっ、ちゅぱっ、ちゅむむっ……ちゅっ、ちゅうっ、ちゅぷぷっ<emoji=heart04>」"
translation = "「앗…… 기다려, 회장군……! 지금 키스하면…… 응<emoji=heart04> ……쪽, 쪽…… 음뭇<emoji=heart04> 츄릅, 츄파, 츕…… 쪽, 쪼옥, 츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅっ、ちゅぷっ……んっ<emoji=heart04>\u3000はぁっ……んふぅ、舌絡めるキス、気持ち良い……<emoji=heart04>\u3000んちゅうっ、んちゅっ……あっ、ダメ……ちゅっ、ちゅぱっ、んぅぅっ<emoji=heart04>！」"
translation = "「쪽, 츄릅…… 응<emoji=heart04> 하앗…… 음후, 혀 섞는 키스 기분 좋아……<emoji=heart04> 음쪼옥, 쪽…… 앗, 안 돼…… 쪽, 츄파, 응으읏<emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んむっ、ちゅぷっ、ちゅっ<emoji=heart04>\u3000んちゅっ、ちゅぱっ<emoji=heart04>\u3000んはぁ、はぁ……んくちゅ、んっ、んんぅ──<emoji=heart04>！」"
translation = "「음뭇, 츄릅, 쪽<emoji=heart04> 음쪽, 츄파<emoji=heart04> 은하아, 하아…… 응쿠츄, 응, 응으──<emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んっ、んうぅぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>！\u3000……はぁっ、んああああっ<emoji=heart04><emoji=heart04>」"
translation = "「응, 응으으으으으~~~윽<emoji=heart04><emoji=heart04><emoji=heart04>! ……하앗, 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁ、はぁ……んっ、んぅ<emoji=heart04>\u3000ちゅぱっ、ぷはぁっ……<emoji=heart04>！\u3000はぁ、はぁ……はあぁ……んうぅ<emoji=heart04>\u3000はふぅぅ……会長、くぅんっ<emoji=heart04>」"
translation = "「하아, 하아…… 응, 응으<emoji=heart04> 츄파, 푸하앗……<emoji=heart04>! 하아, 하아…… 하아아…… 응으으<emoji=heart04> 하후우우…… 회장구운<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もしかしてメルエル……キスだけで、イっちゃった？」"
translation = "「혹시 메르엘…… 키스만으로 가버렸어?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う、うん……<emoji=heart04>\u3000キミのことが好きって気持ちでいっぱいになって……はぁぁ<emoji=heart04>\u3000こうやって触れあってるだけでも、体が気持ち良く、なっちゃうみたいっ<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04> 너를 좋아한다는 마음으로 가득 차서…… 하아아<emoji=heart04> 이렇게 닿아있는 것만으로도 몸이 기분 좋아져 버리는 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でも、キスだけでイっちゃうなんて、淫乱みたい、だよね……？\u3000はうぅぅ、恥ずかしいよぉ……っ」"
translation = "「하지만 키스만으로 가버리다니 음란한 것 같지……? 하우우우, 부끄러워어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなことない……俺のことを想って気持ち良くなってくれたなら、こんなに嬉しいことはないよ」"
translation = "「그렇지 않아…… 나를 생각하며 기분 좋아졌다면 이보다 기쁜 일은 없어.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、ほんとうだぁ<emoji=heart04>\u3000キミのお、おち○ちん<emoji=heart04>\u3000すごく固くなってるっ。えへへ、嬉しいっ<emoji=heart04>\u3000私で興奮、してくれたってことだよね……？」"
translation = "「앗, 정말이다아<emoji=heart04> 네 자지<emoji=heart04> 정말 딱딱해졌어. 에헤헤, 기뻐<emoji=heart04> 나 때문에 흥분해줬다는 거지……?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあぁぁっ<emoji=heart04>\u3000キミが興奮してるの見たら、私もエッチな気持ちになっちゃうよぉ……あっ、はぁぁん……<emoji=heart04>\u3000んふぅぅ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 네가 흥분한 걸 보니까 나도 야한 기분이 들어버려어…… 앗, 하아앙……<emoji=heart04> 음후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「え、えっとぉ……お、おま○こ……だよねっ。私の……女の子の、恥ずかしい、ところっ。はぁぁぁっ、はふぅぅ……っ<emoji=heart04>」"
translation = "「저, 저기이…… 보지……지. 나의…… 여자아이의, 부끄러운, 곳. 하아아앗, 하후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う、うんっ。とっても恥ずかしいけど……私が恥ずかしい言葉、沢山言う方が、キミが興奮してくれるって、わかったから<emoji=heart04>\u3000これからも恥ずかしいこと、たくさん言うねっ<emoji=heart04>」"
translation = "「으, 응. 정말 부끄럽지만…… 내가 부끄러운 말을 많이 하는 게 네가 더 흥분한다는 걸 알았으니까<emoji=heart04> 앞으로도 부끄러운 거 많이 말할게<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ……<emoji=heart04>\u3000おち○ちん、ぴくぴくって反応してぇ……はぁぁ<emoji=heart04>\u3000私のおま○こにぃ、あぁぁぁん……おま○こに、当たってるよぉっ<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 자지, 움찔움찔 반응해서…… 하아아<emoji=heart04> 내 보지에에, 아아아앙…… 보지에 닿고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、んうぅっ……あぁんっ<emoji=heart04>\u3000おち○ちんの先っぽ、おま○こに、擦れてぇ……はぁぁぁん……気持ちいいっ。んっ、はあぁっ<emoji=heart04>\u3000あんっ、ふあぁ……っ<emoji=heart04>」"
translation = "「앗, 응우읏…… 아앙<emoji=heart04> 자지 끝부분이 보지에 비벼져서…… 하아아앙…… 기분 좋아. 응, 하아앗<emoji=heart04> 앙, 후아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う、うん、キスで、その……イっちゃったから……んっ、んあぁっ<emoji=heart04>\u3000おま○こ、もうトロトロに、なっちゃってるっ。だから、そのぉ……ふうぅぅっ<emoji=heart04>」"
translation = "「으, 응, 키스로 그…… 가버렸으니까…… 응, 응아앗<emoji=heart04> 보지, 벌써 축축하게 젖어버렸어. 그러니까 그으…… 후우우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「キミのおち○ちん、挿れて、くださぁいっ<emoji=heart04>\u3000ふうぅ、んっ……あんっ<emoji=heart04>\u3000おち○ちん、中に欲しいの……んあぁっ<emoji=heart04>！」"
translation = "「네 자지, 넣어주세요오<emoji=heart04> 후우, 응…… 앙<emoji=heart04> 자지, 안에 갖고 싶어…… 응아앗<emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000先っぽがおま○この入り口、押し広げてぇ……んふああっ<emoji=heart04><emoji=heart04>！」"
translation = "「앗, 앗, 앗<emoji=heart04> 끝부분이 보지 입구를 밀어 넓혀서…… 음후아앗<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「挿入って来るっ……はぁぁぁっ<emoji=heart04>\u3000大きいおち○ちん<emoji=heart04>\u3000あっ、んうぅっ……はあぁぁっ……<emoji=heart04>！」"
translation = "「들어와…… 하아아앗<emoji=heart04> 커다란 자지<emoji=heart04> 앗, 응우읏…… 하아아앗……<emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ──ふあああぁぁぁあああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>！\u3000は、ああああぁぁぁぁぁっっ！」"
translation = "「앗── 후아아아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>! 하, 아아아아아아앗!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んあぁっ、はぁんっ……ふあぁっ<emoji=heart04>\u3000おち○ちん、気持ちいい……っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ……はぁんっ……んうぅっ、はぁっ……んっ……あぁんっ<emoji=heart04>」"
translation = "「응아앗, 하앙…… 후아앗<emoji=heart04> 자지, 기분 좋아……<emoji=heart04> 앙<emoji=heart04> 앗…… 하앙…… 응우읏, 하앗…… 응…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んふぁ、はあ、はあん……っ<emoji=heart04>\u3000はあぁっ、気持ち良いのぉ……！\u3000あっ、んあぁっ……はあぁんっ……<emoji=heart04>」"
translation = "「음화, 하아, 하앙……<emoji=heart04> 하아앗, 기분 좋아아……! 앗, 응아앗…… 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ど、どうしてぇ……<emoji=heart04>\u3000まだゆっくり、なのにぃ<emoji=heart04>\u3000はぁぁぁっ……お腹の奥ぅ、熱いよぉぉっ。うずうずしてっ<emoji=heart04>\u3000ずっとキュンキュン、しっぱなしなのぉ<emoji=heart04>\u3000あっ、はぁぁん<emoji=heart04>」"
translation = "「어, 어째서어……<emoji=heart04> 아직 천천히인데에<emoji=heart04> 하아아앗…… 배 안쪽이 뜨거워어어. 근질근질해서<emoji=heart04> 계속 큥큥거리고 있어어<emoji=heart04> 앗, 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「もしかしてっ……ふわぁぁっ<emoji=heart04>\u3000あっ、あっ、あぁぁっ……これって、子宮？<emoji=heart04>\u3000はふぅぅん……私の子宮がっ、はぁぁ……降りてきちゃってる、のぉ？<emoji=heart04>\u3000くぅぅぅん<emoji=heart04>」"
translation = "「혹시잇…… 후와앗<emoji=heart04> 앗, 앗, 아앗…… 이거 자궁이야?<emoji=heart04> 하후우웅…… 내 자궁이이, 하아아…… 내려와 버린 거야아?<emoji=heart04> 쿠우우웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「婚約したから……かな。メルエルの体も……これからはただのエッチじゃなくて、子作りになっちゃうって、わかってるのかも……っ」"
translation = "「약혼했으니까…… 그럴지도. 메르엘의 몸도…… 이제부터는 그냥 섹스가 아니라 애 만들기가 된다는 걸 알고 있는 걸지도 몰라.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁぁっ、子作りっ<emoji=heart04><emoji=heart04>\u3000そ、そっかぁ<emoji=heart04>\u3000会長くんのお嫁さんになったら<emoji=heart04>\u3000私、会長くんの赤ちゃんっ<emoji=heart04>\u3000作っちゃっても、いいんだぁ<emoji=heart04>\u3000ふぁっ、ふわぁぁぁっ<emoji=heart04>」"
translation = "「하아앗, 애 만들기이<emoji=heart04><emoji=heart04> 그, 그렇구나아<emoji=heart04> 회장군의 신부가 되면<emoji=heart04> 나, 회장군의 아기이<emoji=heart04> 만들어버려도 되는구나아<emoji=heart04> 후앗, 후와아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000……はぁぁん<emoji=heart04>\u3000私の体、会長くんとの赤ちゃん、作ろうとしてるんだぁ<emoji=heart04>\u3000あぁぁぁぁっ、嬉しいっ。嬉しいよぉ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아앗<emoji=heart04> ……하아앙<emoji=heart04> 내 몸, 회장군과의 아기 만들려고 하고 있어어<emoji=heart04> 아아아아앗, 기뻐. 기뻐어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000んんっ、ふうぅぅ<emoji=heart04>\u3000あっ、はあっ、これ、気持ちいい……<emoji=heart04>\u3000会長くんが、私のことを孕ませようと、してるんだって思うとぉ……<emoji=heart04>\u3000んはぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응, 후우우우<emoji=heart04> 앗, 하앗, 이거 기분 좋아……<emoji=heart04> 회장군이 나를 임신시키려고 한다고 생각하니까아……<emoji=heart04> 은하앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04><emoji=heart04>\u3000んんっ、あはぁっ<emoji=heart04>\u3000気持ちいいの、きちゃう──っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04><emoji=heart04> 응응, 아하앗<emoji=heart04> 기분 좋은 거 와──앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「これまたっ、イッちゃっ……ふぁ、ああああああぁぁぁぁぁぁぁぁっ～～～っ<emoji=heart04><emoji=heart04>！」"
translation = "「이거 또 가버려…… 후아아아아아아아아아아아아앗~~~<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあぁぁっ……<emoji=heart04>\u3000んっ……はぁっ、ふぅっ……あぁん……っ<emoji=heart04>」"
translation = "「하아아앗……<emoji=heart04> 응…… 하앗, 후우…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエル、もしかして……」"
translation = "「메르엘, 혹시……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ち、違うのぉ……<emoji=heart04>\u3000あっ、はぁっ……んっ、ふあぁっ<emoji=heart04>\u3000これはそのぉ……<emoji=heart04>」"
translation = "「아, 아니야아……<emoji=heart04> 앗, 하앗…… 응, 후아앗<emoji=heart04> 이건 그으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「子作りセックス……って言葉、そんなに興奮した？」"
translation = "「애 만들기 섹스……라는 말에 그렇게 흥분했어?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁぁぁ<emoji=heart04>\u3000……ダメぇ<emoji=heart04>\u3000ダメだよぉ<emoji=heart04>\u3000そんなこと耳元で、囁いたらぁ<emoji=heart04>\u3000あはぁぁぁっ……んんんっ。ふっ、あぁぁぁぁぁっ。……ふわぁぁぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아아아아<emoji=heart04> ……안 돼애<emoji=heart04> 안 된다고오<emoji=heart04> 그런 걸 귓가에서 속삭이면어어<emoji=heart04> 아하아아앗…… 응응응. 훗, 아아아아아앗. ……후와아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「子作りっ<emoji=heart04>\u3000妊娠っ<emoji=heart04>\u3000孕ませえっちぃ……<emoji=heart04>\u3000ふあぁっ、想像しちゃう<emoji=heart04>\u3000会長くんの精子<emoji=heart04>\u3000私の卵子に……ぷちゅんっ<emoji=heart04>\u3000って、着床しちゃう、ところぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「애 만들기잇<emoji=heart04> 임신잇<emoji=heart04> 임신시키기 섹스으……<emoji=heart04> 후아앗, 상상해버려<emoji=heart04> 회장군의 정자<emoji=heart04> 내 난자에…… 푸쥰<emoji=heart04> 하고 착상해버리는 거어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、はあっ<emoji=heart04>\u3000はああっ<emoji=heart04>\u3000したい、よぉ<emoji=heart04>\u3000……会長くんと子作りえっち、したいのぉっ<emoji=heart04>\u3000お腹の中に、沢山精液、注いでもらいたいっ<emoji=heart04>\u3000んふぅぅぅっ<emoji=heart04>」"
translation = "「앗, 하앗<emoji=heart04> 하아앗<emoji=heart04> 하고 싶어어<emoji=heart04> ……회장군이랑 애 만들기 섹스 하고 싶어어엇<emoji=heart04> 배 안에 정액 잔뜩 부어줬으면 좋겠어어<emoji=heart04> 음후우우우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「キミの子供、授かれるんだって想像したら……おま○こ喜んじゃってるぅ<emoji=heart04>\u3000ふあぁっ、ずっとキュンキュン、しっぱなしなのぉっ<emoji=heart04>\u3000あっ、んんっ、んあぁぁっ<emoji=heart04>」"
translation = "「네 아이 가질 수 있다고 상상하니까…… 보지가 기뻐하고 있어어<emoji=heart04> 후아앗, 계속 큥큥거리고 있어어엇<emoji=heart04> 앗, 응응, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ……またキス……！\u3000んっ、ちゅっ、はあぁっ<emoji=heart04>\u3000ちゅっ、ちゅぷっ、ちゅうっ<emoji=heart04>\u3000ちゅむるっ、ちゅっ、んちゅうっ……<emoji=heart04>」"
translation = "「앗…… 또 키스……! 응, 쪽, 하아앗<emoji=heart04> 쪽, 츄릅, 쪼옥<emoji=heart04> 츄무르, 쪽, 음쪼옥……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んっ……舌を絡ませるキス、えっちで好きぃ<emoji=heart04>\u3000ちゅむっ、ちゅれろっ、ちゅぱっ……んちゅっ、ちゅぷぷっ、ちゅむるっ<emoji=heart04>」"
translation = "「응…… 혀 섞는 키스 야해서 좋아아<emoji=heart04> 츄뭇, 츄레로, 츄파…… 음쪽, 츄릅, 츄무르<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅっ……会長くん、好き<emoji=heart04>\u3000大好きっ<emoji=heart04>\u3000ちゅっ、ちゅぷっ、ちゅぱっ……<emoji=heart04>」"
translation = "「쪽…… 회장군, 좋아해<emoji=heart04> 정말 좋아해<emoji=heart04> 쪽, 츄릅, 츄파……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っメルエル、俺も好きだ……！」"
translation = "「윽 메르엘, 나도 좋아해……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふあぁっ、あっ、んあぁぁっ<emoji=heart04>\u3000おち○ちん、奥まで来たぁっ<emoji=heart04>\u3000ふああっ、奥っ、子宮口にも、キスされてちゃってるのぉ<emoji=heart04>\u3000あっ、んあっ、んうぅっ……はあぁぁんっ<emoji=heart04>」"
translation = "「후아앗, 앗, 응아아앗<emoji=heart04> 자지, 안쪽까지 왔어어앗<emoji=heart04> 후아앗, 안쪽, 자궁구에도 키스당하고 있어어어<emoji=heart04> 앗, 응앗, 응우읏…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁんっ、奥、奥に当たるの、気持ちいいよぉ<emoji=heart04>！\u3000ふぅっ、あっ、はあぁんっ！\u3000んあぁっ、はぁっ……ふああぁんっ<emoji=heart04>！」"
translation = "「아앙, 안쪽, 안쪽에 닿는 거 기분 좋아아<emoji=heart04>! 후우, 앗, 하아아앙! 응아앗, 하앗…… 후아아앙<emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁっ、凄いのぉっ、旦那様おち○ちん<emoji=heart04>\u3000はあぁんっ、好きっ、おち○ちん好きぃ<emoji=heart04>\u3000はあぁっ、ふあぁぁっ、気持ちいいっ<emoji=heart04>\u3000あっ、あんっ、んああぁんっ<emoji=heart04>」"
translation = "「아앙, 굉장해애, 서방님 자지이<emoji=heart04> 하아아앙, 좋아, 자지 좋아아<emoji=heart04> 하아앗, 후아아아앗, 기분 좋아아<emoji=heart04> 앗, 앙, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんっ<emoji=heart04>\u3000会長くぅぅん<emoji=heart04>\u3000孕ませてぇ<emoji=heart04>\u3000あぁぁぁっ<emoji=heart04>\u3000生ませてほしい、のぉ<emoji=heart04>\u3000キミの赤ちゃんっ<emoji=heart04>\u3000私に作らせてぇ<emoji=heart04>\u3000んふぅぅぅっ<emoji=heart04>」"
translation = "「회장군<emoji=heart04> 회장구우운<emoji=heart04> 임신시켜줘어<emoji=heart04> 아아아앗<emoji=heart04> 낳게 해줬으면 좋겠어어어<emoji=heart04> 네 아기이<emoji=heart04> 내가 만들게 해줘어어<emoji=heart04> 음후우우우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああっ。メルエル……俺の子供、生んで欲しい！」"
translation = "「아앗. 메르엘…… 내 아이 낳아줬으면 좋겠어!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあああぁぁぁっ、またイク、いくいくいくっ。おま○こ、イっっくぅぅぅぅう──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아앗, 또 가, 가가가가앗. 보지, 가버려어어어어어──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「っ……ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「윽…… 후아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、はあぁぁっ……<emoji=heart04>\u3000ん、はぁ<emoji=heart04>\u3000また、イッちゃったぁ……<emoji=heart04>\u3000あっ、はぁんっ……ふあぁぁっ！\u3000んうぅっ、んあっ……はあぁんっ<emoji=heart04>」"
translation = "「앗, 하아아앗……<emoji=heart04> 응, 하아<emoji=heart04> 또 가버렸어어……<emoji=heart04> 앗, 하아앙…… 후아아아앗! 응우읏, 응앗…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……メルエル、今日は本当に妊娠させるぞ！」"
translation = "「윽…… 메르엘, 오늘은 정말로 임신시킬 거야!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うんっ、うんっ、うんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000私にキミの赤ちゃん、孕ませてぇっ<emoji=heart04>」"
translation = "「응, 응, 응<emoji=heart04><emoji=heart04><emoji=heart04> 나한테 네 아기 임신시켜줘어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000本気ピストン、来たぁぁぁ<emoji=heart04>」"
translation = "「후아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 본격 피스톤 왔다아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、あっ、んあぁぁんっ！\u3000おち○ちん、どちゅどちゅって凄いのぉっ<emoji=heart04>\u3000はっ、はっ、ふああぁぁんっ！\u3000奥、奥気持ちいいっ<emoji=heart04>\u3000はあぁぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 응아아앙! 자지, 퍽퍽 소리가 굉장해애앗<emoji=heart04> 핫, 핫, 후아아아앙! 안쪽, 안쪽 기분 좋아아<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んあぁぁっ、おち○ちん、おち○ちん好きっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000大好きぃぃ<emoji=heart04>\u3000あっ、あんっ、ふあぁぁんっ！\u3000気持ちいいっ<emoji=heart04>\u3000あぁんっ、もっと、もっとぉ<emoji=heart04>」"
translation = "「응아아앗, 자지, 자지 좋아아<emoji=heart04> 좋아아<emoji=heart04> 정말 좋아해애애<emoji=heart04> 앗, 앙, 후아아아앙! 기분 좋아아<emoji=heart04> 아앙, 더, 더어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふあぁぁっ、好きな人とのセックス、気持ちいいのぉ<emoji=heart04>\u3000キスっ、キスもぉ<emoji=heart04>\u3000んっ、っちゅっ、ちゅぱっ……ちゅうっ、ちゅむっ、ちゅぷぷっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아앗, 좋아하는 사람이랑 하는 섹스 기분 좋아아<emoji=heart04> 키스, 키스도오<emoji=heart04> 응, 쪽, 츄파…… 쪼옥, 츄뭇, 츄릅<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んちゅっ、ちゅぷっ、んむっ……ぷはぁっ<emoji=heart04>！\u3000はっ、はあぁっ、中、ぐりぐりってぇ、しゅごいぃ<emoji=heart04>\u3000あっ、あっ、あんっ、ふあぁぁぁんっ！」"
translation = "「음쪽, 츄릅, 음뭇…… 푸하앗<emoji=heart04>! 핫, 하아앗, 안쪽, 꾸욱꾸욱 하는 거어 굉장해애<emoji=heart04> 앗, 앗, 앙, 후아아아아앙!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあぁぁっ、しゅきっ<emoji=heart04>\u3000しゅきなのぉ<emoji=heart04>\u3000大しゅきぃぃぃ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000そこ、そこ奥、もっと突いてぇ！\u3000ふぅっ、ふぅっ、はぁっ、んあぁぁんっ<emoji=heart04>」"
translation = "「하아아앗, 조아아<emoji=heart04> 조아아아<emoji=heart04> 대조아아아아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 거기, 거기 안쪽 더 찔러줘! 후우, 후우, 하앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「好き、あぁんっ、大好きぃ<emoji=heart04>\u3000はっ、はっ、ふぅっ、はあぁぁんっ！\u3000おま○こもキミのこと、大好きって言ってるぅぅぅ<emoji=heart04>\u3000あぁぁぁぁ……っ<emoji=heart04>」"
translation = "「좋아, 아앙, 정말 좋아아<emoji=heart04> 핫, 핫, 후우, 하아아앙! 보지도 너를 정말 좋아한다고 말하고 있어어어어<emoji=heart04> 아아아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「赤ちゃん欲しくてっ<emoji=heart04>\u3000子宮降りっぱなしなのぉ<emoji=heart04>\u3000あっ、あっ、んあぁぁっ<emoji=heart04>\u3000子作りえっち、気持ちいいよぉぉ……っ<emoji=heart04>」"
translation = "「아기 갖고 싶어서어엇<emoji=heart04> 자궁 계속 내려와 있어어어<emoji=heart04> 앗, 앗, 응아아앗<emoji=heart04> 애 만들기 섹스 기분 좋아아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエル……俺、もう……！」"
translation = "「메르엘…… 나, 이제……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、あっ、んあぁっ<emoji=heart04>\u3000おち○ちん、膨らんでるっ<emoji=heart04><emoji=heart04>\u3000射精っ<emoji=heart04>\u3000精液っ<emoji=heart04>\u3000出してもらえるんだねっ<emoji=heart04>\u3000あぁぁぁぁぁっ、嬉しい<emoji=heart04>\u3000嬉しいっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 응아앗<emoji=heart04> 자지, 부풀어 오르고 있어어<emoji=heart04><emoji=heart04> 사정잇<emoji=heart04> 정액잇<emoji=heart04> 내보내 주는 거구나앗<emoji=heart04> 아아아아아앗, 기뻐. 기뻐어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「出してっ<emoji=heart04>\u3000出してくださいっ<emoji=heart04>\u3000キミの精子ほしくてっ、ふあああんっ……キュンキュンしっぱなしのおま○こにっ<emoji=heart04>\u3000精液恵んでほしいの……っ<emoji=heart04>\u3000ああぁぁぁぁぁっ<emoji=heart04>」"
translation = "「내보내 줘어<emoji=heart04> 내보내 주세요오<emoji=heart04> 네 정자 갖고 싶어서어, 후아아앙…… 큥큥거리고 있는 보지에에<emoji=heart04> 정액 베풀어줬으면 좋겠어어……<emoji=heart04> 아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000……イッちゃうっ<emoji=heart04>\u3000またいくっ。いくいくいくぅ……んあぁぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> ……가버려엇<emoji=heart04> 또 가. 가가가가아…… 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う、うん、一緒にぃ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000一緒にイキたいっ<emoji=heart04>\u3000んあぁぁっ、キミの精子、中にいっぱい出してぇっ<emoji=heart04>\u3000ふあぁぁんっ！」"
translation = "「으, 응, 같이이<emoji=heart04> 앗, 앙<emoji=heart04> 같이 가고 싶어어<emoji=heart04> 응아아앗, 네 정자 안에 듬뿍 내보내 줘어엇<emoji=heart04> 후아아앙!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふあああぁぁっ<emoji=heart04>\u3000イクイク、イっちゃうっ<emoji=heart04>\u3000イっちゃうっ<emoji=heart04>\u3000イっちゃうぅぅぅ<emoji=heart04>\u3000あっ、あっあっあっ<emoji=heart04>\u3000はあああああんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 아아앗<emoji=heart04> 후아아아앗<emoji=heart04> 가가가, 가버려엇<emoji=heart04> 가버려엇<emoji=heart04> 가버려어어어어<emoji=heart04> 앗, 앗앗앗<emoji=heart04> 하아아아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……孕め、メルエルッ！！！」"
translation = "「윽…… 임신해라, 메르엘!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ああぁっ…………ふぁああああぁぁぁぁぁぁぁぁぁああああぁぁぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>！！」"
translation = "「아아앗………… 후아아아아아아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「イックうぅぅぅ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああああっ、あっあっあっ！」"
translation = "「가버려어어어어어어──────엇<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아아아앗, 앗앗앗!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ、凄い……<emoji=heart04>\u3000まだおち○ちん、ドクドクって跳ねてるぅ……<emoji=heart04>」"
translation = "「앙, 굉장해……<emoji=heart04> 아직 자지, 울컥울컥 뛰고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はああぁぁぁ……<emoji=heart04>\u3000はぁぁぁぁ……<emoji=heart04>\u3000キミの赤ちゃんのもと、沢山注いでもらえて、幸せぇ……<emoji=heart04>\u3000はふぅぅ……<emoji=heart04>」"
translation = "「하아아아아……<emoji=heart04> 하아아아아……<emoji=heart04> 네 아기의 씨앗, 잔뜩 부어줘서 행복해에……<emoji=heart04> 하후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁんっ<emoji=heart04>\u3000すごい勢い……んっ<emoji=heart04>\u3000はぁぁ……おま○こから精液、垂れてきちゃう……<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 엄청난 기세…… 응<emoji=heart04> 하아아…… 보지에서 정액, 흘러나와 버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁ……はぁ……すごく、気持ち良かったぁ……<emoji=heart04>」"
translation = "「하아…… 하아…… 정말 기분 좋았어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「キミも、気持ち良かった……？\u3000えへへ<emoji=heart04>\u3000……私で気持ち良くなってくれて、嬉しいっ<emoji=heart04>」"
translation = "「너도 기분 좋았어? 에헤헤<emoji=heart04> ……나 때문에 기분 좋아져 줘서 기뻐<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ね、ねぇ、子供の話なんだけど……」"
translation = "「저, 저기, 아이 이야기인데……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「もし、その、本気で言ってくれてたら、なんだけど……」"
translation = "「만약, 그, 진심으로 말해준 거라면 말인데……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「わ、私……ねっ？\u3000キミの子供は１人だけじゃなくって……出来れば沢山産みたいなぁ……なんてっ……えへへ、な、なんちゃって～～♪」"
translation = "「나, 나 말이야? 네 아이는 한 명뿐만이 아니라…… 가능하다면 잔뜩 낳고 싶어어…… 싶어서어…… 에헤헤, 농, 농담이야~~♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「って、あんっ<emoji=heart04>\u3000キミのおち○ちん、中でまた大きくなって……<emoji=heart04>」"
translation = "「그치만, 앙<emoji=heart04> 네 자지, 안에서 다시 커져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「わ、私の言葉で興奮したって……ま、待ってぇ<emoji=heart04>\u3000さっきいっぱい出されたばっかりなのにぃ……<emoji=heart04>」"
translation = "「내, 내 말에 흥분했다니…… 기, 기다려어<emoji=heart04> 방금 잔뜩 내보낸 참인데에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「これ以上出されたら、んっ、はぁ……<emoji=heart04>\u3000本当に、出来ちゃうよぉ<emoji=heart04>」"
translation = "「이 이상 내보내면, 응, 하아……<emoji=heart04> 정말로 생겨버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁんっ、ダメぇ……<emoji=heart04>」"
translation = "「아앙, 안 돼애……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ダメと言いつつも嬉しそうなメルエルに、俺はまた興奮してしまい……再び腰を揺すり始めてしまうのだった。"
translation = "안 된다고 말하면서도 기뻐 보이는 메르엘에게 나는 다시 흥분해버려…… 다시 허리를 흔들기 시작했다."

