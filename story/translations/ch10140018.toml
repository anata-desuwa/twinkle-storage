[[dialogue]]
speaker = "unk"
original = "トワちゃんと俺が教師と生徒の壁を越え、恋人同士になってから数ヵ月ほど経ったある日のこと──"
translation = "토와짱과 내가 교사와 학생의 벽을 넘어, 연인 사이가 된 지 수개월 정도 지난 어느 날의 일──"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは最近トレーニングルームの管制室にこもることが多く、さすがに様子が変だと思い、中に踏み込んだのだが……"
translation = "토와짱은 최근 트레이닝 룸의 관제실에 틀어박히는 일이 많아, 역시 상태가 이상하다고 생각하여 안으로 발을 들였는데……"

[[dialogue]]
speaker = "トワ先生"
original = "「キミにもっと、先生のオナニー見て欲しいのぉ……<emoji=heart04>\u3000はぁぁん。あぁっ、先生のおま○こ、くちゅくちゅ言っちゃってるよぉ」"
translation = "「너에게 좀 더, 선생님의 자위 보여주고 싶어어……<emoji=heart04> 하아앙. 아앗, 선생님의 보지, 쿠츄쿠츄 소리 나고 있어어」"

[[dialogue]]
speaker = "トワ先生"
original = "「先生のちっちゃいおま○こ、ローターでひくひくしちゃうところ見て……<emoji=heart04>\u3000って？\u3000あ、あれ？\u3000そこにいるのは、まさか……ほ、本物！？」"
translation = "「선생님의 조그만 보지, 로터로 파들파들 떨리는 거 봐줘……<emoji=heart04> 라고? 어, 어라? 거기 있는 건, 설마…… 히, 진짜!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ち、違うの！\u3000これは違くて！\u3000えっと、あのあの！\u3000あぁぁぁぁっ、んひゃぁぁぁっ<emoji=heart04>！？」"
translation = "「아, 아니야! 이건 그게 아니라! 저기, 저기저기! 아아아아앗, 응히야아아앗<emoji=heart04>!?」"

[[dialogue]]
speaker = "unk"
original = "先生はあろうことか、恋人の俺にも内緒で、ひとりでお楽しみの真っ最中だったのである。"
translation = "선생님은 아니나 다를까, 연인인 나에게도 비밀로 하고, 혼자서 즐거움에 빠져 있는 한창이었던 것이다."

[[dialogue]]
speaker = "トワ先生"
original = "「う、うぅ……キミに本当に見られながらオナニーするなんて、先生恥ずかしいよぉ……。お願いだから、ローターのリモコン返してぇ……」"
translation = "「우, 우으…… 너에게 정말로 보여지면서 자위하다니, 선생님 부끄러워어……. 부탁이니까, 로터 리모컨 돌려줘어……」"

[[dialogue]]
speaker = "クロト"
original = "「隠れてオナニーしていた先生が悪いと思います」"
translation = "「몰래 자위하고 있던 선생님이 나쁘다고 생각합니다」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぁあああっ<emoji=heart04>！？\u3000いきなり強くするのダメぇっ！\u3000刺激強いぃ！\u3000クリと乳首、おかしくなっちゃうからぁ！」"
translation = "「아아아아앗<emoji=heart04>!? 갑자기 세게 하는 건 안 돼애! 자극 강해에! 클리와 젖꼭지, 이상해져 버리니까아!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふあぁっ、み、見られてるのにぃ……！\u3000クリと乳首が勃起して感じちゃ……あぁんっ！」"
translation = "「후아앗, 보, 보여지고 있는데에……! 클리와 젖꼭지가 발기해서 느껴버려…… 아앙!」"

[[dialogue]]
speaker = "クロト"
original = "「俺に黙ってた理由を話さないと、ローター止めてあげないよ」"
translation = "「나한테 입 다물고 있던 이유를 말하지 않으면, 로터 안 멈춰줄 거야」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふうぅ……そんなぁ。意地悪しないでぇ……うぅんっ。はっ、あぁぁぁ……っ」"
translation = "「후우우…… 너무해에. 심술부리지 마아…… 으응. 핫, 아아아……앗」"

[[dialogue]]
speaker = "unk"
original = "話してくれないなら、仕方がない。"
translation = "말해주지 않는다면, 어쩔 수 없다."

[[dialogue]]
speaker = "トワ先生"
original = "「ひやぁあああっ！？\u3000ダメダメダメダメダメぇ<emoji=heart04>！\u3000振動最大は刺激強過ぎて頭おかしくなっちゃうのぉ！\u3000あぁぁんっ」"
translation = "「히야아아아앗!? 안돼안돼안돼안돼안돼애<emoji=heart04>! 진동 최대는 자극이 너무 강해서 머리 이상해져 버려어! 아아앙」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふあぁあああっ！\u3000クリと乳首のブルブル凄いぃ！\u3000あああっ、んんっ、ふああっ<emoji=heart04>！」"
translation = "「후아아아아앗! 클리와 젖꼭지의 부르르 대단해애! 아아앗, 응응, 후아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぁんっ！\u3000見られながらイっちゃうっ<emoji=heart04>！\u3000……あっ、あっ、あっ、あっ、あああああっ！\u3000来る、来る来る来る来る来るぅ！」"
translation = "「아앙! 보여지면서 가버려어<emoji=heart04>! ……앗, 앗, 앗, 앗, 아아아아앗! 온다, 온다온다온다온다온다아!」"

[[dialogue]]
speaker = "トワ先生"
original = "「キミに見られながらイクっ！\u3000……イクイクイクイクイク、イっ──ああっ！？\u3000嘘ぉ、あと少しでぇ……！」"
translation = "「너에게 보여지면서 가앗! ……가버려가버려가버려가버려, 가── 아앗!? 거짓말이야아, 조금만 더 있으면어……!」"

[[dialogue]]
speaker = "unk"
original = "俺はトワちゃんがイキそうになったところで、ローターを停止させた。"
translation = "나는 토와짱이 가버릴 것 같을 때, 로터를 정지시켰다."

[[dialogue]]
speaker = "クロト"
original = "「トワちゃん、気持ちよくイキたかったら、理由教えて？」"
translation = "「토와짱, 기분 좋게 가고 싶으면, 이유 알려줄래?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふぇぇ……さっきと言ってることが逆だよぉ。はぅぅ……」"
translation = "「후에에…… 아까랑 말하는 게 반대야아. 하으으……」"

[[dialogue]]
speaker = "unk"
original = "俺は服を脱ぎ、勃起したペニスを見せつける。"
translation = "나는 옷을 벗고, 발기한 자지를 보여준다."

[[dialogue]]
speaker = "トワ先生"
original = "「あぁ……キミのチ○ポ、凄いぃ……<emoji=heart04>！\u3000そり返って、太くて逞しい……！\u3000はふぅぅ……」"
translation = "「아아…… 너의 자지, 대단해에……<emoji=heart04>! 뒤로 젖혀져서, 굵고 늠름해……! 하후우우……」"

[[dialogue]]
speaker = "トワ先生"
original = "「んっ……ふぅぅ。はぁぁ……ね、ねぇ？\u3000先生のおま○こ、もうトロトロになってるよぉ？\u3000キミのチ○ポだって、そんなに大きくなってるしぃ……」"
translation = "「응…… 후우우. 하아아…… 저, 저기? 선생님의 보지, 벌써 걸쭉해져 버렸어어? 너의 자지도, 그렇게 커져 버렸고오……」"

[[dialogue]]
speaker = "トワ先生"
original = "「ね、ねぇってばぁ……このままお預けなのぉ？\u3000今チ○ポ挿れたら絶対に気持ちいいよぉ……？\u3000おま○こ切ないよぉ……うぅ……」"
translation = "「저, 저기라니까아…… 이대로 애태우기만 할 거야아? 지금 자지 삽입하면 분명 기분 좋을 거야아……? 보지가 애달파아…… 으으……」"

[[dialogue]]
speaker = "トワ先生"
original = "「わ、わかったよぉ。話すからぁ……ふぅぅ。せ、先生の体質、前に話したでしょ？\u3000星力でいつも回復してるっていう。そのせい、だと思うんだけど──」"
translation = "「아, 알았어어. 말할 테니까아…… 후우우. 서, 선생님의 체질, 전에 말했었지? 성력으로 언제나 회복하고 있다는 거. 그 탓, 이라고 생각하는데──」"

[[dialogue]]
speaker = "トワ先生"
original = "「学園でもキミを見るとね……その、セックスした時の感覚を思い出して、ムラムラ、するようになっちゃったの……<emoji=heart04>\u3000はぁぁぁっ」"
translation = "「학원에서도 너를 보면 말이야…… 그, 섹스했을 때의 감각이 떠올라서, 안달복달, 하게 되어버렸어……<emoji=heart04> 하아아아」"

[[dialogue]]
speaker = "トワ先生"
original = "「こんなこと……ふぁぁっ。キミとセックスするまで、知らなかったのぉ<emoji=heart04>\u3000キミのチ○ポで、先生、女にされちゃった、からぁ……ふぅぅっ」"
translation = "「이런 거…… 화아아. 너랑 섹스하기 전까지는, 몰랐었어어<emoji=heart04> 너의 자지로, 선생님, 여자가 되어버렸, 으니까아…… 후우우」"

[[dialogue]]
speaker = "トワ先生"
original = "「それから、ま、毎日……んんんっ。ムラムラ、我慢できなくてぇ……うぅぅぅ～<emoji=heart04>\u3000こんなの恥ずかしすぎるよぉ～」"
translation = "「그 뒤로, 매, 매일…… 응응응. 안달 나서, 참을 수가 없어서어…… 으으으으~<emoji=heart04> 이런 거 너무 부끄러워어~」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ、ああっ、更にチ○ポ大きくなって……ふぅぅぅっ、そんなの見せられたら、わたしもう<emoji=heart04>\u3000──あっ！？」"
translation = "「아, 아앗, 자지가 더 커져서…… 후우우우, 그런 걸 보여주면, 나 이제<emoji=heart04> ──앗!?」"

[[dialogue]]
speaker = "unk"
original = "それ以上我慢出来ず、俺は邪魔なローターを剥がすと、トワちゃんの膣口にペニスをあてがった。"
translation = "더 이상 참지 못하고, 나는 방해되는 로터를 떼어내고는, 토와짱의 질 입구에 페니스를 갖다 대었다."

[[dialogue]]
speaker = "トワ先生"
original = "「ふあぁぁぁっ<emoji=heart04>\u3000チ○ポきたぁぁぁ～～っ！\u3000これがずっと欲しかったのぉぉぉ～～っ！\u3000んんんんっ！」"
translation = "「후아아아<emoji=heart04> 자지 왔다아아아~~! 이게 계속 갖고 싶었어어어어~~! 응응응응!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、あっ、ふあぁっ！\u3000キミのチ○ポっ、ジュプジュプってっ……！\u3000はぁぁっ、おま○こに入ってくるぅぅ！\u3000あぁぁぁっ、気持ちいいっ！\u3000チ○ポ気持ちいいのぉ！」"
translation = "「앗, 앗, 후아앗! 너의 자지, 쥬릅쥬릅하면서……! 하아앗, 보지로 들어와아아! 아아아앗, 기분 좋아! 자지 기분 좋아아!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……それじゃあ、どうして俺に相談しなかったのかも教えてくれる？」"
translation = "「……그럼, 어째서 나한테 상담하지 않았는지도 알려줄래?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うぇぇ！？\u3000はぅぅんっ<emoji=heart04>！\u3000あああっ、そんなっ、おま○この入り口……んんぅっ、浅くぬぽぬぽしたらダメぇ！\u3000……はぁぁぁんっ！」"
translation = "「우에에!? 하으응<emoji=heart04>! 아아앗, 그런 거, 보지 입구…… 응으윽, 얕게 눞포눞포하면 안 돼애! ……하아아앙!」"

[[dialogue]]
speaker = "クロト"
original = "「このまま奥もいっぱい突いて、気持ちよくしてあげるから教えて。トワちゃん」"
translation = "「이대로 안쪽도 잔뜩 찔러서, 기분 좋게 해 줄 테니까 알려줘. 토와짱」"

[[dialogue]]
speaker = "トワ先生"
original = "「やぁぁんっ、ダメ、ダメだよぉ……！\u3000はぁぁっ、チ○ポで奥を突くのはダメなのぉ……っ<emoji=heart04>！\u3000おま○こ蕩けて、ダメになっちゃうからぁ……ふぁぁぁっ！」"
translation = "「야아앙, 안 돼, 안 된다고오……! 하아앗, 자지로 안쪽을 찌르는 건 안 돼애……<emoji=heart04> 보지가 녹아내려서, 망가져 버리니까아…… 화아아앗!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぁぁぁぁっ……あぁんっ！\u3000ダメぇ……まだ浅いところ、なのにぃ……<emoji=heart04>\u3000んんんっ、気持ちよすぎるよぉ。先生なのに……わたし、先生なのにぃ……ふわぁぁっ」"
translation = "「아아아아앗…… 아앙! 안 돼애…… 아직 얕은 곳, 인데에……<emoji=heart04> 응응응, 너무 기분 좋아아. 선생님인데…… 나, 선생님인데에…… 후와아앗」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、あっ、あっ！\u3000乳首のローター、触っちゃダメぇ<emoji=heart04>！\u3000ブルブルして欲しくなっちゃう！\u3000うぅぅぅっ、ローターも欲しくなっちゃうのぉ……はふぅぅ」"
translation = "「앗, 앗, 앗! 젖꼭지의 로터, 만지면 안 돼애<emoji=heart04>! 부르르 떨려서 원하게 돼버려! 으으으윽, 로터도 원하게 되어버려어…… 하후우」"

[[dialogue]]
speaker = "クロト"
original = "「理由教えてくれたら、ローターのスイッチも、入れてあげる……っ」"
translation = "「이유를 알려주면, 로터의 스위치도, 켜 줄게……」"

[[dialogue]]
speaker = "トワ先生"
original = "「はぁぁぁ……<emoji=heart04>\u3000はぁぁぁぁっ……<emoji=heart04>\u3000そんなの、そんなのぉ……！\u3000うぅぅぅ～っ」"
translation = "「하아아……<emoji=heart04> 하아아아아……<emoji=heart04> 그런 거, 그런 거어……! 으으으으~윽」"

[[dialogue]]
speaker = "トワ先生"
original = "「はぅんっ！\u3000わ、わたし……恥ずかしかったのぉ<emoji=heart04>！」"
translation = "「하으응! 나, 나…… 부끄러웠어어<emoji=heart04>!」"

[[dialogue]]
speaker = "トワ先生"
original = "「はぁぁっ。先生、だからぁ……生徒のキミに、甘えるのが……ああっ、恥ずかしく、てぇ……！\u3000あぁんっ<emoji=heart04>！」"
translation = "「하아앗. 선생님, 이니까아…… 제자인 너에게, 어리광 부리는 게…… 아앗, 부끄러워, 서어……! 아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "トワ先生"
original = "「本当は毎日彼氏に発情してて、毎日でもセックスしたいとか……<emoji=heart04>\u3000ふぁぁっ、年下のキミには、言えなかったのぉ！」"
translation = "「사실은 매일 남자친구한테 발정해서, 매일이라도 섹스하고 싶다던가……<emoji=heart04> 하아앗, 연하인 너한테는, 말할 수 없었어어!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぁぁぁんっ！\u3000い、言っちゃったぁ……<emoji=heart04>\u3000ふぁぁぁぁぁっ、んんんぅっ！」"
translation = "「아아아앙! 마, 말해버렸어어……<emoji=heart04> 하아아아앗, 응응응읏!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……！\u3000そんなのっ、俺だって同じ気持ちだっ」"
translation = "「윽……! 그런 거, 나도 같은 마음이야!」"

[[dialogue]]
speaker = "unk"
original = "俺は乳首のローターのスイッチを入れながら、膣の一番奥へとペニスを突き入れた。"
translation = "나는 젖꼭지의 로터 스위치를 켜면서, 질 가장 깊숙한 곳까지 페니스를 찔러 넣었다."

[[dialogue]]
speaker = "トワ先生"
original = "「あぁあああっ、チ○ポ奥に来たぁぁぁ<emoji=heart04>！\u3000乳首のブルブルもしゅごぃい！\u3000んんんっ<emoji=heart04>！」"
translation = "「아아아아앗, 자지 깊숙이 왔어어어<emoji=heart04>! 젖꼭지 부르르도 너어무 좋아! 응응읏<emoji=heart04>!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、あっ、あぁぁっ！\u3000気持ちいいっ<emoji=heart04>\u3000同時に気持ちいいのダメぇっ！\u3000凄い勢いで、気持ちいいの登って来ちゃってるからぁ！\u3000はぁぁぁぁっ」"
translation = "「앗, 앗, 아아앗! 기분 좋아<emoji=heart04> 동시에 기분 좋은 거 안 돼애! 엄청난 기세로, 기분 좋은 게 올라와 버리니까아! 하아아아앗」"

[[dialogue]]
speaker = "クロト"
original = "「トワちゃんみたいなっ、ちっちゃくて可愛いのにっ、凄くエッチな先生と付き合っててっ！\u3000若い男子が、毎日ムラムラしないわけないだろ！」"
translation = "「토와짱처럼, 작고 귀여우면서도, 엄청 야한 선생님이랑 사귀고 있는데! 젊은 남자가, 매일 성욕이 안 생길 리가 없잖아!」"

[[dialogue]]
speaker = "トワ先生"
original = "「はあぁぁぁんっ！\u3000ほ、ほんと<emoji=heart04>！？\u3000あんっ<emoji=heart04>！\u3000わたし先生で年上なのにぃっ、ふぁぁっ！\u3000ムラムラ、あぁぁっ！\u3000……してくれるのぉ？\u3000んんんっ！」"
translation = "「하아아아앙! 저, 정말<emoji=heart04>!? 앙<emoji=heart04>! 나 선생님이고 연상인데에, 하아앗! 성욕, 아아앗! ……느껴주는 거야아? 응응읏!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぁんっ、はぁぁんっ！\u3000うれしいっ、あんっ、うれしいのぉっ……<emoji=heart04>！\u3000わたしだけじゃ、なくてぇっ。キミも、キミも一緒でぇっ。ふあぁぁっ！」"
translation = "「아앙, 하아앙! 기뻐, 앙, 기뻐어……<emoji=heart04>! 나뿐만이, 아니라아. 너도, 너도 똑같아서어. 하아아앗!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、あっ、あっ、ああっ！\u3000お、おく気持ちいいっ<emoji=heart04>！\u3000子宮口チ○ポキスされてりゅっ！\u3000んぅぅぅんっ」"
translation = "「앗, 앗, 앗, 아앗! 기, 깊은 곳 기분 좋아<emoji=heart04>! 자궁구 자지 키스 당하고 이써어! 응으으응읏」"

[[dialogue]]
speaker = "トワ先生"
original = "「ロ、ローターもぉ<emoji=heart04>！\u3000んふぅぅっ。乳首もブルブル気持ちいいっ！\u3000キミとのセックス好きぃっ、あぁぁんっ！」"
translation = "「로, 로터도오<emoji=heart04>! 응후으으윽. 젖꼭지도 부르르 기분 좋아! 너랑 하는 섹스 좋아아, 아아아앙!」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、気持ちいいっ！\u3000こんなの、我慢出来るわけない……っ！\u3000だからトワちゃん、これからはちゃんと言って！\u3000っ……毎日だって付き合うからっ！」"
translation = "「나도, 기분 좋아! 이런 거, 참을 수 있을 리가 없잖아……! 그러니까 토와짱, 이제부터는 제대로 말해줘! 윽…… 매일이라도 함께할 테니까!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ま、毎日……<emoji=heart04>！？\u3000はあぁぁぁっ、そ、それって……ふぁぁぁっ、これからは毎日っ……キミとセックスしていいってこと！？\u3000はあぁぁんっ！」"
translation = "「매, 매일……<emoji=heart04>!? 하아아아앗, 그, 그건…… 하아아앗, 이제부터는 매일…… 너랑 섹스해도 된다는 거야!? 하아아앙!」"

[[dialogue]]
speaker = "クロト"
original = "「そんなこと言われたら……俺の方が我慢できないっ。トワちゃんが誘わなかったら、俺のほうから襲うからっ！」"
translation = "「그런 소릴 들으면…… 내가 더 못 참아. 토와짱이 유혹하지 않으면, 내가 먼저 덮칠 거니까!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ……あああああ……ま、毎日セックス<emoji=heart04>！\u3000キミと、これから毎日っ……あぁぁぁんっ！\u3000ふぅっ、ふぅっ、ふぅぅっ！\u3000そ、そんなの、言われたら……はあぁぁんっ！」"
translation = "「아…… 아아아아아…… 매, 매일 섹스<emoji=heart04>! 너랑, 이제부터 매일…… 아아아앙! 후우, 후우, 후으으윽! 그, 그런 소릴, 들으면…… 하아아앙!」"

[[dialogue]]
speaker = "トワ先生"
original = "「お、おま○こ嬉しくてチ○ポにしゃぶり付いちゃう<emoji=heart04>\u3000ふぅぅぅんっ！\u3000子宮も降りて来て、はぁんっ！\u3000彼氏チ○ポにディープキスしちゃうぅっ<emoji=heart04>」"
translation = "「보, 보지 기뻐서 자지를 덥석 물어버려어<emoji=heart04> 후으으으응! 자궁도 내려와서, 하앙! 남자친구 자지에 딥키스 해버려어어<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、あっ、しゅごいっ！\u3000はぅんっ、まだチ○ポ大きくなるぅ<emoji=heart04>！\u3000極太カリで、先生おま○こ、ごりごりされちゃってるのぉぉ……！\u3000ふひぃぃぃっ<emoji=heart04>」"
translation = "「앗, 앗, 대단해! 하응, 아직 자지 더 커져어<emoji=heart04>! 왕자지 귀두로, 선생님 보지, 고리고리 비벼지고 있어어어……! 후히이이잇<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「ま、待って……あふぅんっ<emoji=heart04>！ \u3000ち、チ○ポ大きくなり過ぎなのっ、はぁぁんっ！\u3000こ、これで激しくされたらわたし、わたしぃ……あ゛ああああっ！」"
translation = "「기, 기다려…… 아후응<emoji=heart04>! 자, 자지 너무 커지는 거야, 하아아앙! 이, 이걸로 격하게 당하면 나, 나는으으…… 아아아아앗!」"

[[dialogue]]
speaker = "トワ先生"
original = "「おほぉぉっ<emoji=heart04>\u3000は、激しっ！\u3000おほっ、おっ、おぉんっ！\u3000チ○ポ大きしゅぎてしゅごいぃっ！\u3000これ気持ちよしゅぎるっ！\u3000おくっ、おくおくおくっ、気持ちいいのぉっ！」"
translation = "「오호오옷<emoji=heart04> 겨, 격해! 오홋, 오, 오오옹! 자지 너무 커서 대단해애! 이거 너무 기분 좋아! 깊숙이, 깊숙이 깊숙이, 기분 좋아아!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぁぁぁぁっ、しゅきっ、彼氏チ○ポしゅきぃっ<emoji=heart04>！\u3000あぁんっ、でっかくて気持ちよくってぇっ、最高なのぉっ<emoji=heart04>！\u3000はぁんっ、もっと、もっともっとぉ！\u3000奥突いてぇ！」"
translation = "「아아아아앗, 좋아, 남자친구 자지 좋아아<emoji=heart04>! 아앙, 크고 기분 좋아서, 최고야아<emoji=heart04>! 하앙, 좀 더, 좀 더 좀 더어! 깊숙이 찔러줘!」"

[[dialogue]]
speaker = "トワ先生"
original = "「おぉんっ、当たってりゅっ！\u3000おおっ<emoji=heart04>\u3000子宮口にチ○ポでキスぅ！\u3000あ゛ぁぁぁ、ぎもぢいい！\u3000チ○ポキス好きぃっ<emoji=heart04>！\u3000突いて突いて突いてぇ！\u3000はぁぁんっ！」"
translation = "「오오옷, 닿고 이써어! 오오옷<emoji=heart04> 자궁구에 자지로 키스으! 아아아아, 기모찌이해! 자지 키스 좋아아앗<emoji=heart04>! 찔러줘 찔러줘 찔러줘어! 하아아앙!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ、あっ、あっ！\u3000凄いのきてりゅ<emoji=heart04>！\u3000んあぁっ、ずっと気持ちいいのに、もっと気持ちいいのくりゅぅ！\u3000おっ、おっ、おっ、おっ──ほぉぉっ<emoji=heart04>！？」"
translation = "「앗, 앗, 앗! 굉장한 게 오고 이써어<emoji=heart04>! 응아앗, 계속 기분 좋은데, 더 기분 좋은 게 오오오옷! 오, 오, 오, 오──호오오옷<emoji=heart04>!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ま、まだチ○ポ大きくなってりゅ！？\u3000あぁんっ、で、でももうすぐ<emoji=heart04>\u3000もうすぐだよねっ<emoji=heart04>\u3000おおっ<emoji=heart04>\u3000射精<emoji=heart04>\u3000射精の合図<emoji=heart04>\u3000チ○ポが種付け準備してるのぉ、はぅぅんっ！」"
translation = "「아, 아직 자지 커지고 이써!? 아앙, 그, 그래도 이제 곧<emoji=heart04> 이제 곧이지<emoji=heart04> 오오옷<emoji=heart04> 사정<emoji=heart04> 사정 신호<emoji=heart04> 자지가 씨뿌리기 준비하고 있어어, 하으으응!」"

[[dialogue]]
speaker = "トワ先生"
original = "「お゛っ！？\u3000ほぉおぉぉぉ<emoji=heart04>！？\u3000ローター最大来たぁぁぁっ！\u3000の、登ってくりゅ<emoji=heart04>！\u3000んあ゛ぁぁぁっ、凄いアクメ登ってくりゅうぅぅぅ！」"
translation = "「오옷!? 호오오오오오<emoji=heart04>!? 로터 최대 출력 왔다아아앗! 오, 올라오고 이써어<emoji=heart04>! 응아아아앗, 엄청난 아크메 올라오고 이써어어어어!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ゛っ、わかりゅっ！\u3000チ○ポ震えてぇっ、おぉんっ！\u3000精子が登って来てりゅっ、はぁぁんっ<emoji=heart04>！\u3000あ゛ぁぁぁっ、早くきてきてきて！\u3000一緒に、一緒に、いっしょにぃ……<emoji=heart04>」"
translation = "「아앗, 알 것 가태! 자지 떨리고 이써어, 오오옷! 정자가 올라오고 이써어, 하아아앙<emoji=heart04>! 아아아앗, 빨리 와줘 와줘 와줘! 같이, 같이, 가치이이……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……膣内に出すぞ、トワッ！」"
translation = "「윽…… 질 내에 사정한다, 토와!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふあぁぁんっ！？\u3000不意打ちっ<emoji=heart04>\u3000名前呼び捨てダメぇっ！\u3000一気にくりゅっ<emoji=heart04>\u3000くりゅ<emoji=heart04>\u3000くりゅぅぅ<emoji=heart04>\u3000あ、ああ、あ゛ああああ──」"
translation = "「후아아앙!? 기습 공격<emoji=heart04> 이름 요비스테는 안 돼애! 단번에 구류웃<emoji=heart04> 구류<emoji=heart04> 구류우우<emoji=heart04> 아, 아아, 아으아아아아──」"

[[dialogue]]
speaker = "トワ先生"
original = "「しゅき<emoji=heart04>\u3000しゅき<emoji=heart04>\u3000しゅきぃ<emoji=heart04>\u3000はぁぁっ、しゅきなのぉぉぉっ！<emoji=heart04>\u3000ああぁぁぁぁぁっ、イクっ、イクイクイクイクイクぅ<emoji=heart04>\u3000アクメしゅりゅうううぅぅぅ<emoji=heart04><emoji=heart04>」"
translation = "「슈키<emoji=heart04> 슈키<emoji=heart04> 슈키이<emoji=heart04> 하아아, 슈키나노오오오! <emoji=heart04> 아아아아아아앗, 이크, 이쿠이쿠이쿠이쿠이쿠우<emoji=heart04> 아크메 슈류우우우우우<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はぴったりとトワちゃんの子宮口にペニスを押し付けて、思いっきり精液を吐き出した。"
translation = "나는 딱 붙어서 토와짱의 자궁구에 자지를 밀어붙이고, 힘껏 정액을 쏟아냈다."

[[dialogue]]
speaker = "トワ先生"
original = "「ふあああぁぁぁっ<emoji=heart04>！\u3000イクイクイクイクイク、またイク！\u3000本気の種付け射精でイッグゥウウウウウ──<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗<emoji=heart04>! 이쿠이쿠이쿠이쿠이쿠, 또 이쿠! 진심 씨뿌리기 사정으로 이그으으으으으으──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ゛ぁぁぁ……しゅごぃぃぃ……<emoji=heart04>\u3000チ○ポディープキスぅ<emoji=heart04>\u3000子宮に精液、流し込まれてりゅ<emoji=heart04>\u3000い、イクの止まらにゃい<emoji=heart04>\u3000ぎもぢぃぃ……<emoji=heart04>」"
translation = "「아으으으…… 슈고이이이……<emoji=heart04> 자지 딥키스으<emoji=heart04> 자궁에 정액, 흘러 들어오고 이류<emoji=heart04> 이, 이쿠게 멈추지 아냐아<emoji=heart04> 기모지이이……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は長い長い射精を体験した後、ローターのスイッチを切って、膣からペニスを引き抜いた。"
translation = "나는 길고 긴 사정을 마친 뒤, 로터의 스위치를 끄고 질에서 자지를 뽑아냈다."

[[dialogue]]
speaker = "トワ先生"
original = "「んはぁっ……精液多すぎて、せっかく出して貰ったのに、膣から漏れちゃう<emoji=heart04>」"
translation = "「응하앗…… 정액이 너무 많아서, 어렵게 내보내 줬는데 질에서 흘러넘쳐 버려<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぁ……やっぱりセックス最高ぉ……<emoji=heart04>\u3000キミのチ○ポなしじゃ、先生もう生きていけないの……<emoji=heart04>」"
translation = "「아아…… 역시 섹스 최고오……<emoji=heart04> 너의 자지 없이는 선생님 이제 살 수 없어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の余韻に浸るトワちゃんの邪魔をしないように、俺は後片付けを始めようとする。"
translation = "절정의 여운에 잠긴 토와짱을 방해하지 않도록, 나는 뒷정리를 시작하려 한다."

[[dialogue]]
speaker = "unk"
original = "──その時だった。"
translation = "──그때였다."

[[dialogue]]
speaker = "トワ先生"
original = "「ねぇ……」"
translation = "「저기……」"

[[dialogue]]
speaker = "unk"
original = "顔を上げると、誘うように腰を振るトワちゃんの姿があった。"
translation = "고개를 들자, 유혹하듯 허리를 흔드는 토와짱의 모습이 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「先生、まだトレーニングし足りないかもぉ……ダメぇ？」"
translation = "「선생님, 아직 트레이닝이 부족할지도 몰라아…… 안 돼?」"

[[dialogue]]
speaker = "unk"
original = "恋人のエロ過ぎるおねだりに、射精したばかりのペニスは瞬く間に復活してしまう。"
translation = "연인의 너무나 에로틱한 조르기에, 방금 사정한 자지는 순식간에 부활하고 만다."

[[dialogue]]
speaker = "unk"
original = "俺とトワちゃんはここが学園なのも忘れて、そのまま２回戦へと突入して行くのだった。"
translation = "나와 토와짱은 이곳이 학원이라는 것도 잊고, 그대로 2회전으로 돌입하는 것이었다."

