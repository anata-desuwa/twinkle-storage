[[dialogue]]
speaker = "unk"
original = "第２話,ナミエルと思い出の味,P"
translation = "제2화, 나미엘과 추억의 맛, P"

[[dialogue]]
speaker = "unk"
original = "クリスマスの二人三脚生活が終わってから、少し経ったある日のこと。"
translation = "크리스마스의 2인 3각 생활이 끝나고, 조금 지난 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "お泊り会でエルデリーゼと仲良くなったナミエルは、アムも含めて３人で昼食をすることになった。"
translation = "묵는 모임에서 엘데리제와 친해진 나미엘은, 아무를 포함해 세 명이서 점심 식사를 하게 되었다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ナミエル様、無事にクリスマスフォームから変身解除できるようになって、なによりですわ♪」"
translation = "「나미엘 님, 무사히 크리스마스 폼에서 변신 해제할 수 있게 되어, 무엇보다 다행입니다와♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「ええ、アム先輩とも無事に離れることができて、元の生活に戻れてよかったです」"
translation = "「네, 아무 선배와도 무사히 떨어질 수 있게 되어, 원래의 생활로 돌아와서 다행입니다」"

[[dialogue]]
speaker = "アム"
original = "「ちょっとぉ～！？\u3000それだと、あたしと共同生活するのが嫌だったみたいじゃんかぁ～」"
translation = "「좀 봐줘요~! 그러면, 저랑 공동생활 하는 게 싫었던 것 같잖아요~」"

[[dialogue]]
speaker = "ナミエル"
original = "「冗談です。最初はずっと一緒にいるのが落ち着きませんでしたが、さすがにもう、慣れましたので」"
translation = "「농담입니다. 처음에는 계속 함께 있는 것이 안정되지 않았지만, 역시 이제는, 익숙해졌으니까요」"

[[dialogue]]
speaker = "ナミエル"
original = "「しばらくは１人で落ち着きたいですが……そのうちまた泊まらせてあげてもいいですよ」"
translation = "「당분간은 혼자서 안정하고 싶지만…… 조만간 다시 묵게 해 줘도 괜찮아요」"

[[dialogue]]
speaker = "アム"
original = "「えっ、いいの？\u3000絶対泊まりに行く！\u3000来週くらいならいい？」"
translation = "「엣, 괜찮아? 절대 묵으러 갈게! 다음 주 정도면 괜찮아?」"

[[dialogue]]
speaker = "ナミエル"
original = "「訂正します。さすがに早いです。しばらく泊まりに来ないで下さい」"
translation = "「정정하겠습니다. 아무래도 이릅니다. 당분간 묵으러 오지 마세요」"

[[dialogue]]
speaker = "アム"
original = "「ちょっとデレたと思ったら、速攻で急冷凍！？\u3000あたし、温度差に風邪引きそうなんだけど！？」"
translation = "「좀 데레하는가 싶더니, 바로 급냉각!? 나, 온도차에 감기 걸릴 것 같은데!?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ふふっ♪\u3000私もまた、ナミエル様とお泊り会がしたいですわ♪」"
translation = "「후훗♪ 저도 다시, 나미엘 님과 묵는 모임을 하고 싶습니다와♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「ええ。来週にでもまた来て下さい。一緒に勉強会をしましょう♪」"
translation = "「네. 다음 주에라도 다시 와 주세요. 함께 공부 모임을 합시다♪」"

[[dialogue]]
speaker = "アム"
original = "「冗談だよね！？\u3000ナミエル、お泊り会するなら、あたしも混ぜてよ～！」"
translation = "「농담이지!? 나미엘, 묵는 모임 할 거면, 나도 섞어 줘~!」"

[[dialogue]]
speaker = "ナミエル"
original = "「仕方ないですね。エルゼ先輩と一緒にくるなら、まあ……ギリギリ許可してあげなくもないですよ？\u3000……ふふっ」"
translation = "「어쩔 수 없네요. 엘제 선배와 함께 온다면, 뭐…… 간신히 허락해 주지 않을 것도 없어요? ……후훗」"

[[dialogue]]
speaker = "unk"
original = "それから、料理を注文して、昼食を開始する３人。"
translation = "그리고, 요리를 주문하고, 점심 식사를 시작하는 세 사람."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ん～<emoji=heart04>\u3000もぐもぐ♪\u3000今日もカフェテリアのランチは美味しいですわ～♪」"
translation = "「음~<emoji=heart04> 냠냠♪ 오늘도 카페테리아의 런치(점심)는 맛있습니다와~♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「エルゼ先輩、お泊り会の時から思っていましたが、体格からは想像もできないくらい、沢山食べますよね……」"
translation = "「엘제 선배, 묵는 모임 때부터 생각했지만, 체격에서는 상상도 할 수 없을 정도로, 많이 드시네요……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ええ♪\u3000私、食事は人一倍好きですの♪」"
translation = "「네♪ 저는, 식사는 남들보다 훨씬 좋아합니다와♪」"

[[dialogue]]
speaker = "アム"
original = "「人一倍どころじゃ済まないくらい、超大食いだけどね……」"
translation = "「남들보다 훨씬 정도로는 안 끝날 정도로, 엄청난 대식가지만 말이야……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ナミエル様は、食べ物はどういったものがお好きですの？」"
translation = "「나미엘 님은, 음식은 어떤 것을 좋아하십니까?」"

[[dialogue]]
speaker = "ナミエル"
original = "「私ですか？\u3000私はＳＮＳをやっているので、投稿映えする可愛いスイーツを見つけるのが、趣味の１つですね」"
translation = "「저 말인가요? 저는 SNS를 하고 있어서, 게시물에 잘 어울리는 귀여운 스위츠를 찾는 것이, 취미 중 하나예요」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「まあ♪\u3000私もスイーツは大好きですわ！\u3000やはりナミエル様とは気が合いますわね♪\u3000今度一緒に是非、美味しいスイーツを食べに参りましょう♪」"
translation = "「어머♪ 저도 스위츠는 정말 좋아합니다와! 역시 나미엘 님과는 마음이 잘 통합니다와♪ 다음에 함께 꼭, 맛있는 스위츠를 먹으러 갑시다♪」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「スイーツ以外ですと、他に何かあったりしますの？」"
translation = "「스위츠 이외에는, 또 다른 것이 있습니까?」"

[[dialogue]]
speaker = "ナミエル"
original = "「そうですね……今もちょうど食べていますが、オムライスは好きですね。昔、母によく作ってもらっていたので……」"
translation = "「그렇네요…… 지금도 마침 먹고 있지만, 오므라이스는 좋아합니다. 옛날에, 어머니가 자주 만들어 주셨기 때문에……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「お母様に……」"
translation = "「어머님께서……」"

[[dialogue]]
speaker = "unk"
original = "この前のお泊り会で、エルデリーゼから部屋に飾っている両親の写真について聞かれた際、ナミエルは自身の両親が既に亡くなっていることについては、既に話していた。"
translation = "이전의 묵는 모임에서, 엘데리제에게 방에 장식된 부모님의 사진에 대해 질문을 받았을 때, 나미엘은 자신의 부모님이 이미 돌아가셨다는 것에 대해서는, 이미 이야기했었다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「……ということは、ナミエル様にとって、オムライスは思い入れのある料理なんですのね」"
translation = "「……그렇다면, 나미엘 님에게, 오므라이스는 추억이 담긴 요리군요」"

[[dialogue]]
speaker = "ナミエル"
original = "「はい。母の得意料理だって、言っていました。それで、私もその味を思い出しながら、今までに何度も作ってみようと挑戦をしているんですが……」"
translation = "「네. 어머니의 특기 요리라고, 말씀하셨어요. 그래서, 저도 그 맛을 떠올리면서, 지금까지 몇 번이나 만들어 보려고 도전을 하고 있습니다만……」"

[[dialogue]]
speaker = "ナミエル"
original = "「お恥ずかしいことに、私は料理が人一倍不得手なので、未だに母の作ってくれたオムライスを、全然再現することができなくて……」"
translation = "「부끄럽게도, 저는 요리를 남들보다 훨씬 서툴러서, 아직도 어머니가 만들어 주신 오므라이스를, 전혀 재현할 수가 없어서……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そうなんですの……」"
translation = "「그러시군요……」"

[[dialogue]]
speaker = "unk"
original = "エルデリーゼは少し考えるような顔をしてから、言う。"
translation = "엘데리제는 잠시 생각하는 듯한 얼굴을 하고 나서, 말한다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「でしたら私、いいことを思いつきましたわ！」"
translation = "「그렇다면 저는, 좋은 생각이 났습니다와!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「桜十路の伝手を使って――お母様のオムライスの味探しをしてみるのはどうしょう？」"
translation = "「사쿠라코우지의 연줄을 사용해서――어머님의 오므라이스 맛 찾기를 해 보는 건 어떻습니까?」"

[[dialogue]]
speaker = "ナミエル"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「美味しいオムライスのお店を巡って、天才美食家と言われるサランお姉様の舌にも頼れば、きっとレシピが特定できますわ！」"
translation = "「맛있는 오므라이스 가게를 돌고, 천재 미식가라고 불리는 사란 언니님의 혀에도 의지하면, 분명 레시피를 특정할 수 있을 겁니다와!」"

[[dialogue]]
speaker = "ナミエル"
original = "「オムライスのレシピを？\u3000本当にそんなことが……？」"
translation = "「오므라이스의 레시피를요? 정말로 그런 일이……?」"

[[dialogue]]
speaker = "アム"
original = "「エルゼ、めっちゃいいこと思いつくじゃん！\u3000あたしもオムライスの味探し、できることがあれば協力するよ♪」"
translation = "「엘제, 엄청 좋은 생각 떠올리잖아! 나도 오므라이스 맛 찾기, 할 수 있는 일이 있다면 협력할게♪」"

[[dialogue]]
speaker = "ナミエル"
original = "「お２人共……ありがとうございます。私、本当にお母さんの味が見つけられる可能性があるなら……探すのに挑戦してみたいです」"
translation = "「두 분 다…… 감사합니다. 저, 정말로 엄마의 맛을 찾을 가능성이 있다면…… 찾는 것에 도전해 보고 싶어요」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ふふっ……では、今度一緒にお出かけしましょう♪\u3000デザートとして、可愛くて美味しいスイーツがあるお店もピックアップして♪」"
translation = "「후훗…… 그럼, 다음에 함께 외출합시다♪ 디저트로, 귀엽고 맛있는 스위츠가 있는 가게도 픽업해서♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、その日以降、３人は定期的に、オムライスの味探しへと出かける仲になるのだった。"
translation = "그렇게 해서, 그날 이후, 세 사람은 정기적으로, 오므라이스 맛 찾기를 하러 나가는 사이가 되는 것이었다."

