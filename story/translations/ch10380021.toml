[[dialogue]]
speaker = "unk"
original = "第１話,恋人は（むっつり）ライフセーバー,P"
translation = "제1화, 연인은 (음흉한) 라이프세이버, P"

[[dialogue]]
speaker = "イクシリオン"
original = "「──というわけで、基本的にはビーチの監視がライフセーバーの業務になります」"
translation = "「──그런 이유로, 기본적으로는 해변 감시가 라이프세이버의 업무가 됩니다」"

[[dialogue]]
speaker = "イクシリオン"
original = "「浜辺をパトロールしながら、溺れた人の救助や迷子の保護、事故を未然に防ぐための注意などをして回るわけですね」"
translation = "「해변을 순찰하면서, 물에 빠진 사람 구조나 미아 보호, 사고를 미연에 방지하기 위한 주의 등을 주며 돌아다니는 것이죠」"

[[dialogue]]
speaker = "イクシリオン"
original = "「でも……良かったんですか？\u3000せっかくの休日に私の手伝いなんて」"
translation = "「하지만…… 괜찮으신가요? 귀한 휴일에 제 일을 돕게 해서」"

[[dialogue]]
speaker = "イクシリオン"
original = "「今日は天気も良くて、比較的波も穏やかですし、絶好の海水浴日和ですよ？\u3000私のことは気にせず泳いで来てくださっても……」"
translation = "「오늘은 날씨도 좋고, 비교적 파도도 잔잔하고, 절호의 해수욕 날씨예요? 저는 신경 쓰지 말고 수영하고 오셔도……」"

[[dialogue]]
speaker = "unk"
original = "少しでも彼女と一緒にいたいからね"
translation = "조금이라도 그녀와 함께 있고 싶으니까"

[[dialogue]]
speaker = "イクシリオン"
original = "「かの──～～っっ。あ、ありがとうございます。しかし、いつまで経っても慣れませんね。会長に彼女と呼んでいただくのは……」"
translation = "「그녀──~~읏읏. 가, 감사합니다. 하지만, 시간이 지나도 익숙해지질 않네요. 회장님이 그녀라고 불러주시는 건……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「今でも信じられないと言いますか……。ほ、本当に私なんかで良かったんですか……？」"
translation = "「지금도 믿기지 않는다고 할까……. 정, 정말로 저 같은 걸로 괜찮으셨나요……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「い、いえっ、何も答えないでくださいっ。返事を聞いたら妄想の世界に旅立ちかねません……！」"
translation = "「아, 아니욧, 아무것도 대답하지 말아 주세요옷. 대답을 들으면 망상의 세계로 여행을 떠나버릴지도 몰라요……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「海では一瞬の油断が命取りですからね……。いつも以上に気を引き締めて、ビーチに目を光らせませんと……」"
translation = "「바다에서는 한순간의 방심이 목숨을 앗아가니까요……. 평소보다 더 정신을 바짝 차리고, 해변에 눈을 번뜩여야 해요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「浜辺の監視をしながらこっそりお互いへ手を伸ばしたり……とか。休憩中に海の家のシャワールームでしっぽり……とか。はぁはぁ、妄想しないようにしなければ……」"
translation = "「해변 감시를 하면서 몰래 서로에게 손을 뻗거나…… 라든가. 휴식 중에 바다의 집 샤워실에서 오붓하게…… 라든가. 하아하아, 망상하지 않도록 해야 해……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「──あぁっ、立ち去ろうとしないでくださいっ！\u3000大丈夫です、耐えられますっ……！\u3000どうか一緒にいてください……！」"
translation = "「──아앗, 떠나려고 하지 말아 주세요옷! 괜찮아요, 참을 수 있어요……! 부디 함께 있어 주세요……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私も、その、できる限り会長と……。かかか、彼氏と……。一緒にいたいと思っていますから……」"
translation = "「저도, 그, 가능한 한 회장님이랑……. 가가가, 남자친구랑……. 함께 있고 싶다고 생각하니까요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長の水着姿を見ているだけで……はぁ、はぁ……のぼせてしまいそうですけど……」"
translation = "「회장님의 수영복 모습을 보고 있는 것만으로도…… 하아, 하아…… 현기증이 날 것 같지만요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「って、こ、こういうのがいけないんですよね！\u3000あ、頭をっ、頭を冷やしますっ……！」"
translation = "「아니, 이, 이런 게 안 되는 거겠죠! 머, 머리를, 머리를 식힐게요옷……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「今の私は会長の恋人である前に１人のライフセーバーですからね。のろけている場合ではありません」"
translation = "「지금의 저는 회장님의 연인이기 전에 한 명의 라이프세이버니까요. 닭살 돋는 짓을 할 때가 아니에요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長のご厚意と愛に応えるためにもきっちりと役目を果たさなくては……」"
translation = "「회장님의 호의와 사랑에 보답하기 위해서라도 확실히 역할을 다해야지……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長も私ではなく、海や浜辺に目をやってください。こういう良い日和の時こそ、事故が起きやすいですからね」"
translation = "「회장님도 제가 아니라, 바다나 해변을 봐주세요. 이런 좋은 날씨일수록, 사고가 일어나기 쉬우니까요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「……ま、まぁ少しくらいは私の水着姿に夢中になってくださっても構いませんけど──」"
translation = "「……뭐, 뭐 조금 정도는 제 수영복 모습에 넋을 잃어주셔도 상관없지만요──」"

[[dialogue]]
speaker = "イクシリオン"
original = "「──！\u3000要救助者ですっ！\u3000すみませんっ、失礼しますっ！！」"
translation = "「──! 구조 대상자입니다! 죄송해요, 실례할게요!!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「もう大丈夫ですよ。ゆっくりと呼吸してください」"
translation = "「이제 괜찮아요. 천천히 호흡하세요」"

[[dialogue]]
speaker = "女性客"
original = "「あ、ありがとうございます……。流されたビーチボールを追いかけていたら、いつの間にか岸がすごく遠くにあって……」"
translation = "「가, 감사합니다……. 떠내려간 비치볼을 쫓아가다 보니, 어느새 해안이 엄청 멀어져 있어서……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「海の流れは複雑ですから。そういう時はすぐに私たちを呼んでください。そのためのライフセーバーです」"
translation = "「바다의 흐름은 복잡하니까요. 그럴 때는 즉시 저희를 불러주세요. 그러기 위한 라이프세이버입니다」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぅ、大事に至らなくて幸いでした。って……どうされました会長？\u3000なにやら嬉しそうにしてますけど……」"
translation = "「후우, 큰일로 번지지 않아서 다행이었어요. 그런데…… 왜 그러세요 회장님? 왠지 기뻐 보이시는데……」"

[[dialogue]]
speaker = "unk"
original = "いの一番に飛び出していったイクシーが誇らしくて"
translation = "가장 먼저 뛰어 나간 익시가 자랑스러워서"

[[dialogue]]
speaker = "イクシリオン"
original = "「えっ！？\u3000べ、別に特別なことをしたわけでは。水難救助は一分一秒を争いますからね。迅速に駆けつけるのは当然のことですよ」"
translation = "「엣!? 벼, 별로 특별한 일을 한 건 아니에요. 수난 구조는 일분일초를 다투니까요. 신속하게 달려가는 건 당연한 일이에요」"

[[dialogue]]
speaker = "unk"
original = "ちょっと心配だったけど、これなら安心だ"
translation = "조금 걱정됐는데, 이 정도면 안심이야"

[[dialogue]]
speaker = "イクシリオン"
original = "「安心って……あ、危ないところでした。あのままのろけ続けていたら、会長に幻滅されてしまうところだったんですね……」"
translation = "「안심이라니…… 아, 위험할 뻔했어요. 이대로 계속 닭살 돋는 짓만 했다면, 회장님께 환멸을 사버렸을 뻔했네요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「きっと私への愛も完全に冷めてしまって、物を見るような視線を向けられてしまう羽目に……」"
translation = "「분명 저에 대한 사랑도 완전히 식어버려서, 물건을 보는 듯한 시선을 받게 될 처지에……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私はそんな会長に不安を覚えて、過激なアプローチをするようになって……。だけど気持ちが冷め切ってる会長は、私を都合の良い女として扱うように──」"
translation = "「저는 그런 회장님께 불안을 느껴서, 과격한 어프로치를 하게 되고…… 하지만 마음이 다 식어버린 회장님은, 저를 형편 좋은 여자로 취급하게──」"

[[dialogue]]
speaker = "イクシリオン"
original = "「って……！\u3000じょ、冗談です！\u3000そんな目で見ないでくださいっ……！\u3000少し想像してしまっただけですから……！」"
translation = "「아니……! 농, 농담이에요! 그런 눈으로 보지 말아 주세요옷……! 조금 상상해버렸을 뿐이니까요……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私も会長とは、そのっ、ラブラブな関係でいたいと思っていますし……！\u3000た、たまには冷たく接してもらっても構いませんけど……」"
translation = "「저도 회장님이랑은, 그, 러브러브한 관계로 있고 싶다고 생각하고요……! 가, 가끔은 차갑게 대해주셔도 상관없지만요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「って、ああああっ！\u3000これがいけないんですよね……！\u3000ともかく今は、先ほど溺れていた方の無事を喜びましょう……！」"
translation = "「아니, 아아아앗! 이게 안 되는 거겠죠……! 아무튼 지금은, 방금 물에 빠지셨던 분의 무사함을 기뻐해요……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「本当に大事がなくて良かったです。場合によっては人工呼吸も必要になるところだったのですが……」"
translation = "「정말 큰일이 없어서 다행이었어요. 경우에 따라서는 인공호흡도 필요하게 될 뻔했는데……」"

[[dialogue]]
speaker = "unk"
original = "人工呼吸……それってやっぱり男性にも？"
translation = "인공호흡…… 그거 역시 남자한테도?"

[[dialogue]]
speaker = "イクシリオン"
original = "「え？\u3000そうですね。性別を気にしている場合ではありませんから」"
translation = "「에? 그렇네요. 성별을 따지고 있을 때가 아니니까요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「……もしかして、ふふ。私が他の男性と唇を重ねてしまうことに妬いてくださっているのですか？」"
translation = "「……설마, 후후. 제가 다른 남자와 입술을 겹치는 것에 질투해주시는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "救助活動だとはわかってるんだけど"
translation = "구조 활동이라는 건 알고 있지만"

[[dialogue]]
speaker = "イクシリオン"
original = "「いいえ、嬉しいですよ。でも安心してください。基本的に人工呼吸は同性が担当するよう言われているんですよ」"
translation = "「아니요, 기뻐요. 하지만 안심하세요. 기본적으로 인공호흡은 동성이 담당하도록 되어 있거든요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「救助活動とはいえ、後でクレームが来ることもあるようですからね。男性相手に人工呼吸が必要な際は、男性のライフセーバーの方にお任せしています」"
translation = "「구조 활동이라 해도, 나중에 클레임이 들어오는 경우도 있는 모양이라서요. 남자 상대로 인공호흡이 필요한 때는, 남자 라이프세이버 분께 맡기고 있어요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「……その顔。ふふ、まだ不安に思っておられるのですか？」"
translation = "「……그 표정. 후후, 아직 불안하신 건가요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「本当に大丈夫ですよ。だって私の唇は──」"
translation = "「정말 괜찮아요. 왜냐하면 제 입술은──」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ん……ちゅっ……<emoji=heart04>\u3000えへへ、会長だけのものですから……<emoji=heart04>\u3000私も、他の男性には重ねたくありません……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04> 에헤헤, 회장님만의 것이니까요……<emoji=heart04> 저도, 다른 남자에게는 겹치고 싶지 않아요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「でも、良かったです。会長も、その、ちゃんと私を彼女として見てくれていて……」"
translation = "「하지만, 다행이에요. 회장님도, 그, 제대로 저를 여자친구로 봐주고 계셔서……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私１人だけ浮かれてしまっているのではないかと、ちょっぴり不安だったものですから。えへへ、恋人関係にのろけてしまっていたのは私だけではなかったんですね……<emoji=heart04>」"
translation = "「저 혼자만 들떠 있는 게 아닐까, 조금 불안했었거든요. 에헤헤, 연인 관계에 들떠 있었던 건 저뿐만이 아니었네요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「好き……ん、ちゅっ、大好きですよ……<emoji=heart04>\u3000はあぁ……仕事が終わったあとは、お部屋でゆっくりイチャイチャしたいです……<emoji=heart04>」"
translation = "「좋아해…… 응, 츄, 정말 좋아해요……<emoji=heart04> 하아아…… 일이 끝난 뒤에는, 방에서 천천히 꽁냥꽁냥하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「な……なんなら、その……<emoji=heart04>\u3000はぁはぁ……<emoji=heart04>\u3000し、仕事中ではありますが、こっそりお互いのお股に手を伸ばす程度なら──」"
translation = "「그…… 정 그러면, 그……<emoji=heart04> 하아하아……<emoji=heart04> 이, 일 중이긴 하지만, 몰래 서로의 가랑이에 손을 뻗는 정도라면──」"

[[dialogue]]
speaker = "イクシリオン"
original = "「！\u3000また要救助者が……！\u3000や、やはり、のろけている場合ではありませんね……！」"
translation = "「! 또 구조 대상자가……! 여, 역시, 들떠 있을 때가 아니네요……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「行きましょう、会長っ！\u3000水難救助は時間との勝負ですっ！」"
translation = "「가요, 회장님! 수난 구조는 시간과의 싸움이에요!」"

