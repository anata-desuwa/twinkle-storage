[[dialogue]]
speaker = "unk"
original = "トリシャさんと日々を過ごすうちに、俺たちはお互い惹かれていった。"
translation = "트리샤 씨와 나날을 보내는 동안, 우리들은 서로에게 끌려갔다."

[[dialogue]]
speaker = "unk"
original = "ある日、とうとう俺は意を決して想いを伝え──トリシャさんはそれに応えてくれた。"
translation = "어느 날, 드디어 나는 마음을 먹고 마음을 전했고── 트리샤 씨는 그것에 응해 주었다."

[[dialogue]]
speaker = "unk"
original = "晴れて恋人同士となったその日の夜……"
translation = "정식으로 연인이 된 그날 밤……"

[[dialogue]]
speaker = "トリシャ"
original = "「んちゅ……ちゅ、んちゅ、ちゅう……好き……<emoji=heart04>」"
translation = "「응츄…… 츄, 응츄, 츄우…… 좋아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レゾフの宿屋で休んでいた俺の部屋に、トリシャさんがやってきて、いきなり唇を奪われて、さらに数分後には──"
translation = "레조프의 여관에서 쉬고 있던 내 방으로, 트리샤 씨가 찾아와, 갑자기 입술을 빼앗겼고, 다시 몇 분 후에는──"

[[dialogue]]
speaker = "unk"
original = "──こうなっていた。"
translation = "──이렇게 되어 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「フ、フフ……あなたの顔……占いで視えた時よりも、ドキドキした顔、してる……」"
translation = "「후, 후후…… 당신의 얼굴…… 점으로 보였을 때보다, 두근거리는 얼굴, 하고 있어……」"

[[dialogue]]
speaker = "クロト"
original = "「あ、あの……！\u3000展開が、早くないですか……！？」"
translation = "「저, 저기……! 전개가, 빠르지 않나요……!?」"

[[dialogue]]
speaker = "unk"
original = "占い師のローブの下に隠れていた、トリシャさんのスタイル抜群の体が目の前にある。"
translation = "점술사의 로브 아래 숨겨져 있던, 트리샤 씨의 스타일 발군인 몸이 눈앞에 있다."

[[dialogue]]
speaker = "unk"
original = "正直に言って驚いていた。"
translation = "솔직히 말해서 놀라고 있었다."

[[dialogue]]
speaker = "unk"
original = "今日の午後に告白をしたばかりだというのに、もうエッチなことをすることになるだなんて……！"
translation = "오늘 오후에 고백을 한 참인데, 벌써 야한 짓을 하게 되다니……!"

[[dialogue]]
speaker = "トリシャ"
original = "「今日、あなたと別れてから……早速占いをした……」"
translation = "「오늘, 당신과 헤어지고 나서…… 곧바로 점을 쳤어……」"

[[dialogue]]
speaker = "クロト"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あなたの守護星である地球とのリンクが、とても美しい輝きを放っていた……あれはさらなる吉兆だと、思った」"
translation = "「당신의 수호성인 지구와의 링크가, 너무나 아름다운 광채를 내뿜고 있었어…… 저것은 한층 더한 길조라고, 생각했어」"

[[dialogue]]
speaker = "トリシャ"
original = "「告白よりも素敵なこと……それすなわち？」"
translation = "「고백보다 멋진 일…… 그것은 즉?」"

[[dialogue]]
speaker = "クロト"
original = "「えっと……その……」"
translation = "「저기…… 그……」"

[[dialogue]]
speaker = "トリシャ"
original = "「はじめてのセックスしか……ない……でしょう……！」"
translation = "「첫 섹스밖에…… 없을…… 거잖아……!」"

[[dialogue]]
speaker = "unk"
original = "強く言い切るトリシャさんに、俺も「そうですね……！」と頷くしかなかった。"
translation = "강하게 단언하는 트리샤 씨에게, 나도 「그렇네요……!」라고 고개를 끄덕일 수밖에 없었다."

[[dialogue]]
speaker = "トリシャ"
original = "「別に展開が早い、ということもないはずです……仲の良い男女は夜になるとこういうことをするものですし……」"
translation = "「딱히 전개가 빠르다는 것도 아닐 거예요…… 사이좋은 남녀는 밤이 되면 이런 짓을 하는 법이고……」"

[[dialogue]]
speaker = "クロト"
original = "「ほ、本当に……！？」"
translation = "「정, 정말로……!?」"

[[dialogue]]
speaker = "トリシャ"
original = "「師匠からもレディの作法を、少しですが学びました……出来た女性は、ええと……そう。自分から股を開いて男性をリードすると……」"
translation = "「스승님께도 숙녀의 예절을, 조금이지만 배웠습니다…… 된 여성은, 에 그러니까…… 그래요. 스스로 가랑이를 벌리고 남성을 리드한다고……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんの言うことは相変わらず、ちょっとずつズレているような気もしたけれど……それでも。"
translation = "트리샤 씨가 하는 말은 여전히, 조금씩 어긋나 있는 듯한 기분도 들었지만…… 그래도."

[[dialogue]]
speaker = "unk"
original = "こんなにもまっすぐに俺と繋がりたいと思ってくれたことは、素直に嬉しかったから。"
translation = "이렇게나 일직선으로 나와 이어지고 싶어 해 준 것은, 솔직하게 기뻤으니까."

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、その……レディのトリシャさんに、お任せします」"
translation = "「그럼, 저기…… 숙녀인 트리샤 씨에게, 맡길게요」"

[[dialogue]]
speaker = "クロト"
original = "「恋人のあなたになら、何をされても俺、嬉しいですから」"
translation = "「연인인 당신이라면, 무엇을 당해도 나, 기쁘니까요」"

[[dialogue]]
speaker = "トリシャ"
original = "「……に、へへ<emoji=heart04>\u3000うん……ありがとう……<emoji=heart04>」"
translation = "「……헤, 헤헤 <emoji=heart04> 응…… 고마워…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「もっとキス、したい……好き、だから……いっぱい……<emoji=heart04>」"
translation = "「더 키스, 하고 싶어…… 좋아하니까…… 잔뜩…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぅ、ちゅっ……ちゅ、ちゅぅ、んちゅる、ちゅ<emoji=heart04>\u3000セックス前の準備……男性は興奮するとおち○ちんが大きくなる、と……」"
translation = "「응으, 츄…… 츄, 츄우, 응츄루, 츄 <emoji=heart04> 섹스 전의 준비…… 남성은 흥분하면 자지가 커진다고……」"

[[dialogue]]
speaker = "トリシャ"
original = "「はぷ、れる、んちゅる、ちゅ、ちゅぱっ……んぅ……でも、もうこれ以上、大きくならない、みたい……」"
translation = "「하푸, 레루, 응츄루, 츄, 츄파…… 응으…… 하지만, 이제 더 이상, 커지지 않는, 모양이야……」"

[[dialogue]]
speaker = "トリシャ"
original = "「おち○ちん、準備完了。私も、準備できてる……入れる、ね……？」"
translation = "「자지, 준비 완료. 나도, 준비됐어…… 넣을게……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「あ、ぅ、うっ……んあ、ぁー……っ<emoji=heart04>\u3000挿入った、あ……<emoji=heart04>」"
translation = "「아, 으, 윽…… 응아, 아──…… <emoji=heart04> 삽입됐어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びっくりするほど熱く、狭く、柔らかい膣内の感触に、ペニスが震える。"
translation = "깜짝 놀랄 정도로 뜨겁고, 좁고, 부드러운 질 안의 감촉에, 페니스가 떨린다."

[[dialogue]]
speaker = "トリシャ"
original = "「ぁ、あ、ぁー……<emoji=heart04>\u3000これ、すごい……好きな男の子の、おち○ちん……こんな、感触、なん、だ……ん、ふ、うぅ<emoji=heart04>」"
translation = "「아, 아, 아── <emoji=heart04> 이거, 굉장해…… 좋아하는 남자애의, 자지…… 이런, 감촉, 이었구, 나…… 응, 후, 우으 <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「あなたのお顔、普段はかっこいいのに……今は、とろとろって、してる……<emoji=heart04>」"
translation = "「당신의 얼굴, 평소에는 멋있는데…… 지금은, 흐물흐물하게, 되어 있어…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「私のおま○こ、どう、でしょう……人より、体温が、高いので……きっと中も……ん、ふ、ぅ……<emoji=heart04>」"
translation = "「내 보지, 어때요…… 남보다, 체온이, 높으니까…… 분명 안도…… 응, 후, 으…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "動いていないのに、きゅ、きゅっ──と締まるトリシャさんのおま○こ。"
translation = "움직이지 않는데도, 꽉, 꽉── 하고 조여오는 트리샤 씨의 보지."

[[dialogue]]
speaker = "unk"
original = "勃起したペニスよりもさらに熱いうねうねに包まれて、気を許すとそれだけで出てしまいそうになる。"
translation = "발기한 페니스보다 더욱 뜨거운 꿈틀거림에 감싸여, 방심하면 그것만으로 나와버릴 것 같아진다."

[[dialogue]]
speaker = "トリシャ"
original = "「満足してくれてる、お顔……嬉しい……たくさん動くから、いっぱい感じて、欲しい……ん、あっ……<emoji=heart04>」"
translation = "「만족해 주는, 얼굴…… 기뻐…… 잔뜩 움직일 테니까, 많이 느끼길, 바라…… 응, 앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「はぁ、ぁ、ぁっ……ぅ、んん、んっ<emoji=heart04>\u3000ん、ふう、んん、んぅっ……ぁ、あっ……<emoji=heart04>」"
translation = "「하아, 아, 앗…… 으, 응응, 응 <emoji=heart04> 응, 후우, 응응, 응으…… 아, 앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「い──いきなり動いて、だ、大丈夫、なんですか……？」"
translation = "「가── 갑자기 움직여서, 개, 괜찮은 건가요……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「んっ……平気……<emoji=heart04>\u3000あなたと一つになれたことが嬉しくて……痛みとか、ぜんぜん……ない……<emoji=heart04>」"
translation = "「응…… 괜찮아…… <emoji=heart04> 당신과 하나가 될 수 있어서 기뻐서…… 아픔 같은 건, 전혀…… 없어…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「気遣いは、無用……だから……あなたは気持ち良くなることだけ、考えて……」"
translation = "「배려는, 불필요…… 하니까…… 당신은 기분 좋아지는 것만, 생각해……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あ、はぁ、ん、う、ふっ……<emoji=heart04>\u3000ねー……ここ、見て。おっぱい見て……揺れてるところ、見て……<emoji=heart04>」"
translation = "「아, 하아, 응, 우, 훗…… <emoji=heart04> 저기…… 여기 봐. 가슴 봐…… 흔들리고 있는 곳, 봐…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁ、ぁ、あ──フ、フフ、フ<emoji=heart04>\u3000おち○ちん、か、硬くなった……大きいおっぱい、たぷ、たぷ、してるとこ……好き……？」"
translation = "「아, 아, 아── 후, 후후, 후 <emoji=heart04> 자지, 따, 딱딱해졌어…… 큰 가슴, 출렁, 출렁, 거리는 거…… 좋아해……?」"

[[dialogue]]
speaker = "unk"
original = "嫌いな男がいるわけがないし、それに……"
translation = "싫어할 남자가 있을 리 없고, 게다가……"

[[dialogue]]
speaker = "クロト"
original = "「トリシャさんの胸、本当に大きいです」"
translation = "「트리샤 씨의 가슴, 정말로 커요」"

[[dialogue]]
speaker = "トリシャ"
original = "「う、ん……邪魔だなって、肩がこるなって、思ってたけれど……フ、フ。今日で、認識を、改めないと、いけない……<emoji=heart04>」"
translation = "「응, 응…… 방해된다고, 어깨가 결린다고, 생각했었지만…… 후, 후. 오늘로, 인식을, 고쳐야, 하겠네…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「あなたのおち○ちん、喜んでるから……嬉しい……<emoji=heart04>\u3000いっぱい、揺らす……<emoji=heart04>\u3000ゆさ、ゆさ、する……<emoji=heart04>」"
translation = "「당신의 자지, 기뻐하고 있으니까…… 기뻐…… <emoji=heart04> 잔뜩, 흔들게…… <emoji=heart04> 출렁, 출렁, 할게…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「恥ずかしいけど、いっぱい見て欲しい……<emoji=heart04>\u3000あなただけに、見せる、私の、おっぱい……だから……ぁ、ぅ、んんっ<emoji=heart04>」"
translation = "「부끄럽지만, 잔뜩 봐줬으면 좋겠어…… <emoji=heart04> 당신에게만, 보여주는, 나의, 가슴…… 이니까…… 아, 으, 응응 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "視線が揺れるおっぱいに釘付けになる。本当に綺麗で、ものすごく、大きくて……これ以上ないほどの『オカズ』だった。"
translation = "시선이 흔들리는 가슴에 못 박힌다. 정말로 예쁘고, 엄청나게, 커서…… 더할 나위 없는 『반찬』이었다."

[[dialogue]]
speaker = "トリシャ"
original = "「あ、ぁ、はぁ、ぁ、あー……<emoji=heart04>\u3000好きな人が、私のおっぱいで、おち○ちん硬くしてくれてる……嬉しい……好き……好き……<emoji=heart04>」"
translation = "「아, 아, 하아, 아, 아── <emoji=heart04> 좋아하는 사람이, 내 가슴으로, 자지 딱딱하게 해주고 있어…… 기뻐…… 좋아해…… 좋아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁ、は、ぁ、ぅ、んっ……<emoji=heart04>\u3000好きって、言うとっ……おち○ちん硬くなる……これは面白い、発見……ぁ、は、ぅ、んん<emoji=heart04>」"
translation = "「아, 하, 아, 으, 응…… <emoji=heart04> 좋아한다고, 하면…… 자지 딱딱해져…… 이건 재미있는, 발견…… 아, 하, 으, 응응 <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「好き……好き……好きー……<emoji=heart04>\u3000あなたが好き……好き……<emoji=heart04>\u3000ん、ふ、ぅうう、んっ<emoji=heart04>」"
translation = "「좋아해…… 좋아해…… 좋아해──…… <emoji=heart04> 당신이 좋아…… 좋아해…… <emoji=heart04> 응, 후, 으으으, 응 <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、トリシャさんが、好きです……！」"
translation = "「나도, 트리샤 씨가, 좋아요……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「に、へへっ……<emoji=heart04>\u3000嬉しい……いっぱい使って……私の、おま○こ<emoji=heart04>\u3000使って……ばんばん、使って……<emoji=heart04>」"
translation = "「헤, 헤헤 <emoji=heart04> 기뻐…… 잔뜩 써줘…… 나의, 보지 <emoji=heart04> 써줘…… 팍팍, 써줘…… <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「つ、使うって、そんな──」"
translation = "「쓴, 쓴다니, 그런──」"

[[dialogue]]
speaker = "トリシャ"
original = "「いい、構わない……私も、普段、オナニーする時、あなたのおち○ちん想像して……。……ぁ」"
translation = "「괜찮아, 상관없어…… 나도, 평소에, 자위할 때, 당신의 자지 상상하며…… ……아」"

[[dialogue]]
speaker = "クロト"
original = "「……えっと」"
translation = "「……저기」"

[[dialogue]]
speaker = "トリシャ"
original = "「ちょっと、勇み足。こ、これも、星の、導き……！」"
translation = "「조금, 앞서나갔네. 이, 이것도, 별의, 인도……!」"

[[dialogue]]
speaker = "クロト"
original = "「都合が悪くなった時に星のせいにするの、やめましょう……！」"
translation = "「상황이 안 좋아졌을 때 별 탓으로 돌리는 거, 그만둡시다……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ん、ぅっ……ふっ……す、好き……<emoji=heart04>」"
translation = "「응, 으…… 훗…… 조, 좋아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「また誤魔化しましたよね……？」"
translation = "「또 얼버무렸죠……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……でも、嘘じゃ、ない……よ……？\u3000好き……ん、ぁっ、ふぅ、んっ……大、好きっ……<emoji=heart04>」"
translation = "「후후후…… 하지만, 거짓말, 아니…… 야……? 좋아해…… 응, 앗, 후우, 응…… 정, 말 좋아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつも大人しくて、落ち着いていて。"
translation = "언제나 얌전하고, 차분하고."

[[dialogue]]
speaker = "unk"
original = "『フフフ……』なんて怪しげなことばかり言うトリシャさんの口から──"
translation = "『후후후……』라며 수상쩍은 말만 하는 트리샤 씨의 입에서──"

[[dialogue]]
speaker = "トリシャ"
original = "「好き……ん、ふっ……好き、好きっ……ぁ、ぅ、ふっ……好きぃっ……<emoji=heart04>」"
translation = "「좋아해…… 응, 훗…… 좋아해, 좋아해…… 아, 으, 훗…… 좋아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度も『好き』と伝えられたら、愛おしくてたまらなくなるのも当然だろう。たまらず俺は彼女の唇を奪った。"
translation = "몇 번이고 『좋아해』라는 말을 들으니, 사랑스러워서 견딜 수 없게 되는 것도 당연할 것이다. 참지 못하고 나는 그녀의 입술을 빼앗았다."

[[dialogue]]
speaker = "トリシャ"
original = "「んちゅるうぅ、れぇえっ、んちゅる、ちゅぅ、ちゅぱぁ、れぇえっ……んじゅる、ちゅるれりゅ、んぢゅ、じゅるぅ<emoji=heart04>」"
translation = "「응츄루우우, 레에에, 응츄루, 츄우, 츄파아, 레에에…… 응쥬루, 츄루레류, 응쥬, 쥬루우 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "寒い寒いレゾフの街の夜だというのに、今は汗を流すほどに蒸し暑い。"
translation = "춥고 추운 레조프 거리의 밤인데도, 지금은 땀을 흘릴 정도로 후끈거린다."

[[dialogue]]
speaker = "トリシャ"
original = "「キス、気持ちいいっ……んんぅっ、ちゅる、んちゅる、ちゅる、じゅるう、ちゅぱ、れぇ、れるっ……<emoji=heart04>」"
translation = "「키스, 기분 좋아…… 응응으, 츄루, 응츄루, 츄루, 쥬루우, 츄파, 레에, 레루…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "好きな人と性器でつながり、キスでも繋がることが……こんなにも心地いいだなんて。"
translation = "좋아하는 사람과 성기로 이어지고, 키스로도 이어지는 것이…… 이렇게나 기분 좋은 일이라니."

[[dialogue]]
speaker = "トリシャ"
original = "「んんぢゅ、ぢゅるっ、ぢゅる……おち○ちん、もっと勃起、させて……<emoji=heart04>\u3000気持ち良くなって、欲しい……<emoji=heart04>」"
translation = "「응응쥬, 쥬루, 쥬루…… 자지, 좀 더 발기, 시켜줘…… <emoji=heart04> 기분 좋아지길, 바라…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んんっ<emoji=heart04>\u3000んんむちゅ、ちゅぅ、ちゅぱ、ちゅる、れぇ、れりゅ、んちゅる、ちゅぅ……<emoji=heart04>」"
translation = "「응응 <emoji=heart04> 응응무츄, 츄우, 츄파, 츄루, 레에, 레류, 응츄루, 츄우…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ほじくるみたいにキスをしてくるトリシャさんが愛しくて、さらに奥までペニスを進めてしまいたくなって──"
translation = "파헤치듯이 키스를 해오는 트리샤 씨가 사랑스러워서, 더욱 깊숙이 페니스를 밀어 넣고 싶어져서──"

[[dialogue]]
speaker = "トリシャ"
original = "「ふぇあっ──！？\u3000あ、ぁ、ぁあ～っ<emoji=heart04>\u3000おち○ちん、がっ……奥のところ、ぐりぐり、って……うあ、ぁっ……<emoji=heart04>」"
translation = "「훼앗──!? 아, 아, 아아~ <emoji=heart04> 자지가…… 안쪽 부분을, 그리그리, 하고…… 으아, 앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ど、どうですか、これ……？」"
translation = "「어, 어떤가요, 이거……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「ん、んん、んーっ<emoji=heart04>\u3000あ、ぁ、はぁあ、ぅ、んん、ん<emoji=heart04>\u3000すごい……気持ちいい……<emoji=heart04>」"
translation = "「응, 응응, 응── <emoji=heart04> 아, 아, 하아아, 으, 응응, 응 <emoji=heart04> 굉장해…… 기분 좋아…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「お腹、あなたのおち○ちんで、いっぱいになって……ぁ、あ<emoji=heart04>\u3000幸せっ……幸せっ……<emoji=heart04>」"
translation = "「배 안이, 당신의 자지로, 가득 차서…… 아, 아 <emoji=heart04> 행복해…… 행복해…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぁ、あ、あっ<emoji=heart04>\u3000う、んん、ん<emoji=heart04>\u3000ふぅ、ぅっ、好き、好き、好きっ……好きだから、もっと、あ、ぁっ……し、シゴいてあげるっ……<emoji=heart04>」"
translation = "「아, 아, 앗 <emoji=heart04> 으, 응응, 응 <emoji=heart04> 후우, 으, 좋아해, 좋아해, 좋아해…… 좋아하니까, 더, 아, 앗…… 허, 허리 흔들어 줄게…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「お尻、いっぱい動かして、おち○ちん、ぱんぱんって、して、あげるっ……<emoji=heart04>」"
translation = "「엉덩이, 잔뜩 움직여서, 자지, 팡팡, 하게, 해줄게…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「感じて欲しい、のっ……いっぱい勃起して、いっぱい、おち○ちん気持ち良くなってからっ……イって、ほしいっ……のっ……<emoji=heart04>」"
translation = "「느꼈으면 좋겠어…… 잔뜩 발기해서, 잔뜩, 자지 기분 좋아진 다음에…… 가, 줬으면…… 좋겠어…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んんぁっ、ぁ、あぁっ<emoji=heart04>\u3000……好き、好きっ……ぁ、あ、あっ<emoji=heart04>\u3000ふあ、ぁ、あっ<emoji=heart04>」"
translation = "「응응앗, 아, 아앗 <emoji=heart04> ……좋아해, 좋아해…… 아, 아, 앗 <emoji=heart04> 후아, 아, 앗 <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「はぁ、はぁっ……う、ぅ、ぁっ……！」"
translation = "「하아, 하아…… 으, 으, 아……!」"

[[dialogue]]
speaker = "unk"
original = "目の前で迫力たっぷりに、たぷんたぷんと揺れるおっぱいが──すごい。何度つばを飲み込んでも、口の中が渇いて……"
translation = "눈앞에서 박력 넘치게, 출렁출렁 흔들리는 가슴이── 굉장하다. 몇 번을 침을 삼켜도, 입안이 말라가고……"

[[dialogue]]
speaker = "トリシャ"
original = "「おっぱい、見るだけじゃなくて、触って……あ、あなたの、おっぱい、だからっ……あ、ぅ、んん、ふぅ、うあ、あっ<emoji=heart04>」"
translation = "「가슴, 보기만 하지 말고, 만져줘…… 아, 당신의, 가슴이니까…… 아, 으, 응응, 후우, 우아, 앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すくい上げるようにしておっぱいを持ち上げると、男の俺からは想像もできないほどの、たっぷりとした重量感。"
translation = "떠받치듯이 가슴을 들어 올리자, 남자인 나로서는 상상도 할 수 없는, 묵직한 중량감."

[[dialogue]]
speaker = "トリシャ"
original = "「ひぅっ……ん、んっ……<emoji=heart04>\u3000嬉しい……おっぱい、あなたが、触って、るっ……ぁ、んん、ふぅ、ん、んっ<emoji=heart04>」"
translation = "「히윽…… 응, 응…… <emoji=heart04> 기뻐…… 가슴, 당신이, 만지고, 있어…… 아, 응응, 후우, 응, 응 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっちりと手のひらに吸い付くトリシャさんのおっぱいに、ペニスが際限なく興奮し、ガチガチになってしまう。"
translation = "쫄깃하게 손바닥에 달라붙는 트리샤 씨의 가슴에, 페니스가 끝도 없이 흥분하여, 딱딱하게 굳어버린다."

[[dialogue]]
speaker = "トリシャ"
original = "「ん、ふぅ、んん、んっ<emoji=heart04>\u3000せ、セックス、ど、う……？\u3000普段、自分でするのと比べて、どう……？」"
translation = "「응, 후우, 응응, 응 <emoji=heart04> 세, 섹스, 어, 때……? 평소에, 혼자 하는 거랑 비교해서, 어때……?」"

[[dialogue]]
speaker = "クロト"
original = "「比べ物に、う、ぅあ──ならないくらい、いいですっ……！」"
translation = "「비교도, 으, 으아── 안 될 정도로, 좋아요……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ん、ん<emoji=heart04>\u3000私もっ……自分でするより、ずっと、ずっと気持ちいいっ……好き、ぅあ、あ、好き、ぃっ……<emoji=heart04>」"
translation = "「응, 응 <emoji=heart04> 나도…… 혼자 하는 것보다, 훨씬, 훨씬 기분 좋아…… 좋아해, 으아, 아, 좋아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「もっと奥、来て、来てっ……好きだから、奥、突いてっ……<emoji=heart04>」"
translation = "「좀 더 안쪽으로, 와줘, 와줘…… 좋아하니까, 안쪽, 찔러줘…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言われるがままに、俺は腰を突き上げ、トリシャさんの中を穿った。"
translation = "말하는 대로, 나는 허리를 쳐올려, 트리샤 씨의 안을 꿰뚫었다."

[[dialogue]]
speaker = "トリシャ"
original = "「んふぅう、ぅ、あ、あ、ああっ……！<emoji=heart04>」"
translation = "「응후우우, 으, 아, 아, 아앗……! <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「おち○ちん、すっごく、奥までっ……ぁ、ああ、ぁっ<emoji=heart04>\u3000んんぅ、ふぅっ、んんっ、ぁ、ぁあ、あ、あ～っ！<emoji=heart04>」"
translation = "「자지가, 엄청나게, 안쪽까지…… 아, 아아, 앗 <emoji=heart04> 응응으, 후우, 응응, 아, 아아, 아, 아~!! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんのものとは思えない大きな声。俺しか聴けない、彼女の喘ぎ声。そう思うと腰の動きが止まらない。"
translation = "트리샤 씨의 것이라고는 생각되지 않는 커다란 목소리. 나만이 들을 수 있는, 그녀의 신음 소리. 그렇게 생각하니 허리 움직임이 멈추지 않는다."

[[dialogue]]
speaker = "トリシャ"
original = "「あ、あぁ、あっ<emoji=heart04>\u3000うぅうん、んん<emoji=heart04>\u3000乳首<emoji=heart04>\u3000いじりながらしてっ、それ気持ち良いっ<emoji=heart04>\u3000ぇあっ<emoji=heart04>\u3000あっ、そこ好き、好きっ<emoji=heart04>」"
translation = "「아, 아아, 앗 <emoji=heart04> 으으응, 응응 <emoji=heart04> 유두 <emoji=heart04> 만지면서 해줘, 그거 기분 좋아 <emoji=heart04> 에앗 <emoji=heart04> 앗, 거기 좋아, 좋아 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥のところをぐりぐりするとトリシャさんの声が一際、気持ちよさそうに震えてくれる。"
translation = "안쪽 깊은 곳을 비비자 트리샤 씨의 목소리가 한층 더, 기분 좋은 듯 떨려온다."

[[dialogue]]
speaker = "トリシャ"
original = "「キスもっ……んんちゅるぅ<emoji=heart04>\u3000んんちゅるぅ<emoji=heart04>\u3000れぇれろ、れろれろ、んちゅる、ちゅぅ、れぇ、ちゅぱっ<emoji=heart04>」"
translation = "「키스도…… 응응츄루 <emoji=heart04> 응응츄루 <emoji=heart04> 레에레로, 레로레로, 응츄루, 츄우, 레에, 츄파 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "夢中で唇をすり合わせ、よだれを交換して、汗だくになって──"
translation = "정신없이 입술을 맞대고, 침을 교환하고, 땀범벅이 되어서──"

[[dialogue]]
speaker = "トリシャ"
original = "「んんんぅっ、ふぅっ、うっ、あっ、あっあ、あぁあ、あっ<emoji=heart04>\u3000好き、あ、はぁ、あ、ぁっ、あっ<emoji=heart04>」"
translation = "「응응응으, 후우, 윽, 앗, 앗아, 아아아, 앗 <emoji=heart04> 좋아해, 아, 하아, 아, 앗, 앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスの合間に息継ぎに、喘いで、喘いで──"
translation = "키스 사이사이에 숨을 몰아쉬며, 신음하고, 신음하며──"

[[dialogue]]
speaker = "トリシャ"
original = "「ふうぁ、あ、あっ……や、ぁっ……イ、ク、ぅっ……も、もうっ……私、げんか、いっ……<emoji=heart04>」"
translation = "「후우아, 아, 앗…… 야, 앗…… 가, 가, 아…… 이, 이제…… 나, 한계, 야…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も、もう限界が近づいていた。"
translation = "나도, 이제 한계가 다가오고 있었다."

[[dialogue]]
speaker = "unk"
original = "こんなに綺麗で、優しくて、魅力的な女の子とセックスをして──長くもつわけがない。"
translation = "이렇게 예쁘고, 상냥하고, 매력적인 여자애와 섹스를 하는데── 오래 버틸 수 있을 리가 없다."

[[dialogue]]
speaker = "クロト"
original = "「トリシャさん……俺、もう……！」"
translation = "「트리샤 씨…… 나, 이제……!」"

[[dialogue]]
speaker = "トリシャ"
original = "「出してっ……中にっ……中に、出してっ……！」"
translation = "「내보내 줘…… 안에…… 안에, 내보내 줘……!」"

[[dialogue]]
speaker = "unk"
original = "一瞬、中に出しちゃっていいのかって、思ったけど──"
translation = "일순, 안에 싸도 괜찮을까 생각했지만──"

[[dialogue]]
speaker = "トリシャ"
original = "「あなたが……好き！\u3000あなたが、好きなのっ……！<emoji=heart04>」"
translation = "「당신이…… 좋아! 당신이, 좋은걸……! <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「出してっ、私の中に、いっぱい出して、くだ、さいっ！<emoji=heart04>」"
translation = "「내보내 줘, 내 안에, 잔뜩 내보내, 주세요! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大丈夫な日だから、なんて言われるよりよっぽど嬉しい言葉に、耐えられず──"
translation = "안전한 날이니까, 같은 말보다 훨씬 기쁜 말에, 견디지 못하고──"

[[dialogue]]
speaker = "クロト"
original = "「うぁ、あ──！！」"
translation = "「으아, 아──!!」"

[[dialogue]]
speaker = "トリシャ"
original = "「んんぁ、あぁ、ああ、あぁ～っ！<emoji=heart04>\u3000出てる、ぅ、ぅ、ぅっ……うぅうっ……！<emoji=heart04>」"
translation = "「응응아, 아아, 아아, 아아~!! <emoji=heart04> 나오고 있어, 으, 으, 윽…… 으으윽……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんのお腹の奥に、思いきり──射精した。"
translation = "트리샤 씨의 배 속 깊은 곳에, 마음껏── 사정했다."

[[dialogue]]
speaker = "トリシャ"
original = "「ふうぅあ、あ、あぁあっ……あ、ぁあぁあ、あっ<emoji=heart04>\u3000出てますっ……すごい、たく、さんっ……<emoji=heart04>」"
translation = "「후우아, 아, 아아앗…… 아, 아아아아, 앗 <emoji=heart04> 나오고 있어요…… 엄청, 많이…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「ふうぁ、あ、あぁ、あぁああっ……私も、イっ、くっ……あ、イくっ、イく、イくっ──ぅっ<emoji=heart04>」"
translation = "「후우아, 아, 아아, 아아아앗…… 나도, 가, 버려…… 아, 가버려, 가버려, 가버려──윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最奥に注がれる精液の着弾で、釣られるようにして絶頂するトリシャさん。"
translation = "가장 깊은 곳에 쏟아지는 정액의 착탄에, 이끌리듯 절정에 달하는 트리샤 씨."

[[dialogue]]
speaker = "トリシャ"
original = "「んんぅっ、ふぅうっ、ぁああ～っ……<emoji=heart04>\u3000あっ、あぁ、あぁっ……<emoji=heart04>」"
translation = "「응응으, 후우우, 아아아~…… <emoji=heart04> 앗, 아아, 아아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互い、がくがくと震えながら、気がすむまで絶頂を味わって──"
translation = "서로, 덜덜 떨면서, 기분이 풀릴 때까지 절정을 맛보고──"

[[dialogue]]
speaker = "unk"
original = "ぬるん──と。トリシャさんの女性器から、ペニスがこぼれ出た。"
translation = "미끈── 하고. 트리샤 씨의 성기에서, 페니스가 빠져나왔다."

[[dialogue]]
speaker = "トリシャ"
original = "「はぁあぁっ、はぁああーっ……ふぅうっ……ふぅうう～っ……<emoji=heart04>」"
translation = "「하아아앗, 하아아아──…… 후우우, 후우우우~…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「すごかった……あなたとの、セックス……」"
translation = "「대단했어…… 당신과의, 섹스……」"

[[dialogue]]
speaker = "クロト"
original = "「俺も……最後の方、わけがわからないくらい、気持ち良かったです……」"
translation = "「나도…… 마지막 즈음엔, 정신이 나갈 정도로, 기분 좋았어요……」"

[[dialogue]]
speaker = "unk"
original = "荒くなった呼吸を整えつつ、トリシャさんと目を合わせる。"
translation = "거칠어진 호흡을 가다듬으며, 트리샤 씨와 눈을 맞춘다."

[[dialogue]]
speaker = "トリシャ"
original = "「ふぅ……ふぅう……<emoji=heart04>\u3000だけど、あなたの恋人は、きっとまだ、満足していない、ことでしょう……<emoji=heart04>」"
translation = "「후우…… 후우우…… <emoji=heart04> 하지만, 당신의 연인은, 분명 아직, 만족하지 못했을, 거예요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "艶めかしい表情のまま俺を見つめながら、トリシャさんは占い師の口調でいたずらっぽく笑って。"
translation = "요염한 표정 그대로 나를 바라보며, 트리샤 씨는 점술사 말투로 장난스럽게 웃었다."

[[dialogue]]
speaker = "トリシャ"
original = "「大好きな恋人に、もっともっと……中出しして欲しいと、思っている、はずです……」"
translation = "「사랑하는 연인에게, 좀 더 좀 더…… 질내사정 받고 싶다고, 생각하고, 있을 겁니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「だ、だからー、その……に、２回戦、とか……ど、どう、でしょう……？」"
translation = "「그, 그러니까── 저기…… 2회전, 이라든가…… 어, 어떤, 가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「──付き合います。こんな可愛い恋人を前にして、１回なんかですむわけないですから」"
translation = "「──어울려 드릴게요. 이런 귀여운 연인을 앞에 두고, 한 번으로 끝날 리가 없으니까요」"

[[dialogue]]
speaker = "トリシャ"
original = "「…………にへ、へへ<emoji=heart04>」"
translation = "「…………헤헤, 헤헤 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛らしく笑うトリシャさんと再び繋がり──俺たちはお互い、体力が尽きるまでセックスを続けるのだった。"
translation = "사랑스럽게 웃는 트리샤 씨와 다시 연결되어── 우리들은 서로, 체력이 다할 때까지 섹스를 계속했다."

[[dialogue]]
speaker = "トリシャ"
original = "「んぅっ……はぁっ、ふぅっ……んんっ……んっ……ふっ……んっ……はぁ……んんぅ……ぁっ……んっ……んっ……ふぁ、あぁ、あっ……」"
translation = "「응으…… 하아, 후우…… 응응…… 응…… 훗…… 응…… 하아…… 응응으…… 아…… 응…… 응…… 화, 아아, 앗……」"

[[dialogue]]
speaker = "トリシャ"
original = "「んん<emoji=heart04>\u3000んっ……んぅ<emoji=heart04>\u3000んん……ふぅっ……あっ<emoji=heart04>\u3000んんっ、ふぅっ<emoji=heart04>\u3000あぁ、ぁっ……あんっ……んんっ……ふぅっ……んっ……ん、ぅっ……あ、ぁっ……んんっ……<emoji=heart04>」"
translation = "「응응 <emoji=heart04> 응…… 응으 <emoji=heart04> 응응…… 후우…… 앗 <emoji=heart04> 응응, 후우 <emoji=heart04> 아아, 아…… 안…… 응응…… 후우…… 응…… 응, 으…… 아, 아…… 응응…… <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んぁ<emoji=heart04>\u3000あっあっ<emoji=heart04>\u3000ふぅっ、あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000あっあっ<emoji=heart04>\u3000んんぅ、ぅっ<emoji=heart04>\u3000あっあっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふぅあ、あっ<emoji=heart04>」"
translation = "「응아 <emoji=heart04> 앗앗 <emoji=heart04> 후우, 앗 <emoji=heart04> 응응응 <emoji=heart04> 응으 <emoji=heart04> 앗 <emoji=heart04> 화아앗 <emoji=heart04> 응응응 <emoji=heart04> 후우 <emoji=heart04> 앗앗 <emoji=heart04> 응응으, 으 <emoji=heart04> 앗앗 <emoji=heart04> 응응 <emoji=heart04> 후우아, 앗 <emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
original = "「んむちゅるっ<emoji=heart04>\u3000んれぇ<emoji=heart04>\u3000れぇえ<emoji=heart04>\u3000れちゅる、れちゅれちゅ<emoji=heart04>\u3000んれちゅるる<emoji=heart04>\u3000んむぅ、ちゅぅ、ちゅるれる、ちゅぅ、ちゅぅぱ<emoji=heart04>\u3000んちゅぱ<emoji=heart04>\u3000ちゅっ、ちゅる、じゅるぅ、ちゅぱっ、れぇ、れろ、ちゅぱ<emoji=heart04>"
translation = "「응무츄루 <emoji=heart04> 응레에 <emoji=heart04> 레에에 <emoji=heart04> 레츄루, 레츄레츄 <emoji=heart04> 응레츄루루 <emoji=heart04> 응무우, 츄우, 츄루레루, 츄우, 츄우파 <emoji=heart04> 응츄파 <emoji=heart04> 츄, 츄루, 쥬루우, 츄파, 레에, 레로, 츄파 <emoji=heart04>」"

