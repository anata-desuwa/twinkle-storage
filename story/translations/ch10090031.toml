[[dialogue]]
speaker = "unk"
original = "第１話,サマー・マイ・ハニー,P"
translation = "제1화, 서머 마이 허니, P"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん～っ！\u3000海～っ！」"
translation = "「음~! 바다다~!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「冬に海これるとかまじ最高！\u3000季節感バグっちゃいそーだけど、それもまたヨシ！」"
translation = "「겨울에 바다에 올 수 있다니 진짜 최고! 계절감 버그 날 것 같지만, 그것도 또한 좋아!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「って……どしたん？\u3000会長さん、そんなもじもじして」"
translation = "「근데…… 왜 그래? 회장님, 왜 그렇게 머뭇거려」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さん……もしかして、未だにうちの水着に照れてたりする？」"
translation = "「회장님…… 설마, 아직도 내 수영복 보고 수줍어하는 거야?」"

[[dialogue]]
speaker = "unk"
original = "少しだけだ"
translation = "조금 그렇네"

[[dialogue]]
speaker = "unk"
original = "そんなことは……"
translation = "그런 건……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、うける。今さらそんなこと言う？」"
translation = "「아하하, 웃겨. 이제 와서 그런 말을 해?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "（もうあんなところまで見せちゃった仲なのに……さ）"
translation = "（이미 그런 곳까지 다 보여준 사이인데 말이야……）"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「なーんてね。えっちい話にはちょっとまだ早いか♪」"
translation = "「농담이야. 야한 얘기 하기엔 좀 아직 이른가♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ビーチに来たんだから、ここじゃないとできない遊びがしたいよね～」"
translation = "「비치에 왔으니까, 여기가 아니면 할 수 없는 놀이를 하고 싶네~」"

[[dialogue]]
speaker = "unk"
original = "ビーチバレー？"
translation = "비치발리볼?"

[[dialogue]]
speaker = "unk"
original = "スイカ割り？"
translation = "수박 깨기?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん～……それもいいんだけど……そーゆーのはみんなとやった方が楽しそうな気がする」"
translation = "「음~…… 그것도 좋지만…… 그런 건 다 같이 하는 게 더 즐거울 것 같은 기분이 들어」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「今日はせっかく２人だけなんだからー……あ、そうだ！」"
translation = "「오늘은 어렵게 둘만 있는 거니까── 아, 맞다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「リップルちゃーん！\u3000リクエストいーいー？」"
translation = "「리플아~! 리퀘스트 해도 돼~?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハーイ、セーラ♪\u3000どんなゴヨウケンですか～？」"
translation = "「하이, 세라♪ 어떤 용건인가요~?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「雑誌で読んだアクティビティ──フライボードとかパラセーリングとかってのやってみたいんだけど、そういうのある？」"
translation = "「잡지에서 본 액티비티── 플라이보드나 패러세일링 같은 거 해보고 싶은데, 그런 거 있어?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワオ！\u3000マリンスポーツですネー！」"
translation = "「와오! 마린 스포츠로군요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ノープロブレムデース！\u3000リゾート結界にはあらゆる夏のレジャーが揃っておりマースから──お任せアレ～！」"
translation = "「노 프라블럼임다! 리조트 결계에는 온갖 여름 레저가 갖춰져 있으니까요── 맡겨만 주십쇼~!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「デスが道具の準備にお時間かかりマース。少々お待ちくださいデース～♪」"
translation = "「하지만 도구 준비에 시간이 좀 걸림다. 잠시만 기다려주세요~♪」"

[[dialogue]]
speaker = "unk"
original = "パラセーリングって？"
translation = "패러세일링이란 게?"

[[dialogue]]
speaker = "unk"
original = "フライボードって？"
translation = "플라이보드란 게?"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「フライボードはほら、足元から水流ブシャーッて噴射して歩くやつ！\u3000動画とかで見たことない？」"
translation = "「플라이보드는 봐봐, 발밑에서 수류를 푸샤아아 하고 분사해서 걷는 거! 영상 같은 데서 본 적 없어?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「んでパラセーリングは、海の上をでっかいパラシュートで飛ぶやつ！\u3000ボートに引っ張ってもらうのかな？」"
translation = "「그리고 패러세일링은, 바다 위를 커다란 낙하산으로 나는 거! 보트가 끌어주는 건가?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「実はさー、夏のトキに気になってたやつあったんだよね」"
translation = "「사실은 말이야~, 여름 때 궁금했던 게 있었거든」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「雑誌でちょろっと見ただけなんだけど……『海のアクティビティ大特集』ってのに色々載ってたんだ！」"
translation = "「잡지에서 살짝 본 것뿐인데…… 『바다 액티비티 대특집』이라는 거에 여러 가지 실려 있었어!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「どっちも体験したことなくてさ～。ちゃんと設備のあるビーチに行かなきゃなって思ってたんだけど……」"
translation = "「둘 다 체험해본 적 없어서 말이야~. 제대로 설비가 된 비치에 가야겠다고 생각했었는데……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ここならリップルちゃんに頼めばできそうかなって♪\u3000さすがって感じ♪」"
translation = "「여기라면 리플이한테 부탁하면 할 수 있을 것 같아서♪ 역시 대단해♪」"

[[dialogue]]
speaker = "unk"
original = "自分も初めて"
translation = "나도 처음이야"

[[dialogue]]
speaker = "unk"
original = "楽しみだ"
translation = "기대되네"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さんも初めて？\u3000ふふ、なら一緒だね」"
translation = "「회장님도 처음이야? 후후, 그럼 똑같네」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でも、リップルちゃんちょっと時間かかるって言ってたね。んー……」"
translation = "「근데 리플이가 시간이 좀 걸린다고 했지. 음~……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……ねえ、会長さん」"
translation = "「……있지, 회장님」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちにオイル、塗ってくんない？」"
translation = "「나한테 오일 좀 발라줄래?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふっ……うんうん。大丈夫大丈夫。そのまま塗って伸ばしてもらえればいいから」"
translation = "「후후…… 응응. 괜찮아 괜찮아. 그대로 발라서 펴주기만 하면 되니까」"

[[dialogue]]
speaker = "unk"
original = "水着のトップを外して寝そべるセーラさんの背中に、じっくりとサンオイルを塗り込んでいく。"
translation = "수영복 상의를 벗고 엎드린 세라 씨의 등에, 꼼꼼하게 선오일을 발라 나간다."

[[dialogue]]
speaker = "unk"
original = "しばらくして作業が完了すると、彼女はトップを着用して立ち上がった。"
translation = "잠시 후 작업이 완료되자, 그녀는 상의를 착용하고 일어났다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「──はーい、あんがと」"
translation = "「──자, 고마워」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「にしても……まだそんな照れる？\u3000うちまで恥ずかしくなってきちゃうじゃん」"
translation = "「그건 그렇고…… 아직도 그렇게 수줍어해? 나까지 부끄러워지잖아」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「さっきも言ったけど──あーんなこととかこーんなこともしちゃった仲なのにさ……？」"
translation = "「아까도 말했지만── 저어런 일이나 이이런 일도 다 한 사이인데 말이야……?」"

[[dialogue]]
speaker = "unk"
original = "色っぽくて……"
translation = "섹시해서……"

[[dialogue]]
speaker = "unk"
original = "それとこれとは"
translation = "그건 그거고 이건 이거지"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……そっか」"
translation = "「……그렇구나」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふっ──でも……うれしーよ。いつまでもうちのこと、新鮮なまま見てくれてるってことだもんね」"
translation = "「후후── 하지만…… 기뻐. 언제까지나 나를 신선하게 봐주고 있다는 뜻이니까」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さんの彼女として──いつまでもドキドキさせたげるね？」"
translation = "「회장님의 여자친구로서── 언제까지나 두근거리게 해줄게?」"

[[dialogue]]
speaker = "unk"
original = "小悪魔チックに微笑むセーラさん。"
translation = "소악마처럼 미소 짓는 세라 씨."

[[dialogue]]
speaker = "unk"
original = "惚れた時の気持ちが、色褪せぬままよみがえってくるようだった……。"
translation = "반했을 때의 감정이, 바래지 않은 채 되살아나는 것 같았다……."

