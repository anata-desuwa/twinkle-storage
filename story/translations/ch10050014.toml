[[dialogue]]
speaker = "unk"
original = "第４話,姉妹とクロト,P"
translation = "제4화, 자매와 쿠로토, P"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……会長さんもなかなか諦めが悪いですね。これだけ空振り続きなのに私のパトロールに付き合ってくれるなんて」"
translation = "「……회장님도 참 포기가 안 좋으시네요. 이렇게나 헛수고의 연속인데 제 파트롤에 어울려 주시다니.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まぁ、何も起きないなら起きないでいいことなのですが……」"
translation = "「뭐, 아무 일도 일어나지 않는다면 않는 대로 좋은 일입니다만……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「モンスター！\u3000言ったそばから出てくるなんて、まるで聞こえていたみたいです」"
translation = "「몬스터! 말하기가 무섭게 나오다니, 마치 듣고 있었던 것 같네요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「！\u3000アステラの反応があったと連絡が来ました。近いです」"
translation = "「! 아스테라 반응이 있다고 연락이 왔습니다. 가까워요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「近くにいる星騎士が応援に来ます。合流してからアステラに突入しましょう」"
translation = "「근처에 있는 성기사가 응원을 올 거예요. 합류한 뒤에 아스테라로 돌입하죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──ふっ！」"
translation = "「──훗!」"

[[dialogue]]
speaker = "unk"
original = "綺麗な戦い方だ"
translation = "아름다운 싸움 방식이야"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「スケートの動きを取り入れてますので。このぐらいこなせなくてはフィギュアスケート部の名折れです」"
translation = "「스케이트의 움직임을 도입하고 있으니까요. 이 정도는 해내지 못하면 피겨 스케이팅부의 이름에 먹칠을 하는 거죠.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お待たせ～。あら、先行していた２人ってソフィと会長くんだったのね～」"
translation = "「기다렸지~. 어라, 먼저 와 있던 두 사람이 소피랑 회장군이었구나~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さん！？」"
translation = "「언니!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁい、お姉ちゃんです～♪」"
translation = "「네에, 언니랍니다~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……まぁ、心強いことには変わりないです。アステラ内へ突入しましょう」"
translation = "「……뭐, 든든하다는 사실은 변함없네요. 아스테라 내부로 돌입하죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「やぁっ！」"
translation = "「얏!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「スケート、ずいぶん上手になったわね」"
translation = "「스케이트, 제법 능숙해졌네.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんが新星学園に行ってからも練習してましたから。──！」"
translation = "「언니가 신성 학원에 가고 나서도 연습했으니까요. ──!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「後ろからモンスター来てましたよ」"
translation = "「뒤에서 몬스터가 오고 있었어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、ありがとう～。さすがソフィね～」"
translation = "「후훗, 고마워~. 역시 소피네~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……本当にそう思ってます？\u3000まぁいいですけど」"
translation = "「……정말로 그렇게 생각하세요? 뭐 됐지만요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「攻撃対象を補足。あのモンスターを倒せばアステラが消滅すると推測します」"
translation = "「공격 대상을 포착. 저 몬스터를 쓰러뜨리면 아스테라가 소멸할 것으로 추측합니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「確かにちょっと強そうね。それじゃ同時に攻撃しましょうか。私とソフィ、会長くんならやれるわ」"
translation = "「확실히 좀 강해 보이네. 그럼 동시에 공격할까. 나랑 소피, 회장군이라면 할 수 있어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いきますよ。――コキュートススピナー！」"
translation = "「갑니다. ――코큐토스 스피너!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「アステラの消滅を確認。学園に連絡してきます」"
translation = "「아스테라의 소멸을 확인. 학원에 연락하고 오겠습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お疲れ様～、会長くん」"
translation = "「수고했어~, 회장군.」"

[[dialogue]]
speaker = "unk"
original = "ソフィアは頼りになる"
translation = "소피아는 의지가 돼"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね、昔と違うからちょっと驚いちゃった。……でも昔と変わらないところもあるわ」"
translation = "「그렇네, 예전이랑 달라서 조금 놀라버렸어. ……하지만 예전이랑 변하지 않은 점도 있어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「人間界でソフィと再会した時、少しビックリしたの。だって私が作った外套をまだ着てくれてるもの」"
translation = "「인간계에서 소피랑 재회했을 때, 조금 깜짝 놀랐거든. 그게, 내가 만들어준 외투를 아직도 입어주고 있는걸.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それにスケートもね。ソフィが小さかった頃、一緒にスケートに行ったんだけど、ソフィったら少し教えただけですぐに私より上手になってね」"
translation = "「게다가 스케이트도 말이야. 소피가 어렸을 때 같이 스케이트장에 갔었는데, 소피는 글쎄 조금 가르쳐줬더니 금방 나보다 잘하게 되어서 말이야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それから本格的にスケートを習い始めて、三界一のスケート選手になるんだってすごく頑張ってたのよ」"
translation = "「그때부터 본격적으로 스케이트를 배우기 시작해서, 삼계 제일의 스케이트 선수가 되겠다고 정말 열심히 했었어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「報告終わりました。……何の話をしてたんですか？」"
translation = "「보고 끝났습니다. ……무슨 이야기를 하고 있었나요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんは頑張ってるね～、って話」"
translation = "「회장군은 열심히 하네~, 라는 이야기.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「むー……」"
translation = "「으음……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ウソウソ。本当はソフィの話をしてたの。すごく成長したなって」"
translation = "「거짓말 거짓말. 사실은 소피 이야기를 하고 있었어. 정말 많이 성장했구나 싶어서.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「当然です。世界を守るために、フィオナ会長に近づくためにも、モンスターとの戦いで後れを取るわけにはいきません。もう子どもじゃないんです」"
translation = "「당연합니다. 세계를 지키기 위해, 피오나 회장님께 다가가기 위해서라도, 몬스터와의 싸움에서 뒤처질 수는 없으니까요. 이제 어린애가 아니에요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それはどうかしら～？\u3000大人は大変よ～？」"
translation = "「그건 어떨까나~? 어른은 힘들다구~?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「うー……」"
translation = "「으으……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふっ」"
translation = "「후후후.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「うかうかしてると、あっという間に姉さんより強くなっちゃいますからね」"
translation = "「방심하고 있으면 눈 깜짝할 사이에 언니보다 강해져 버릴 테니까요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それは楽しみね～。ねぇねぇ、頑張ったご褒美にぎゅ～ってしていい？」"
translation = "「그거 기대되네~. 저기 저기, 열심히 한 보상으로 꼬옥~ 해줘도 돼?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ダメです。そんなご褒美いりません」"
translation = "「안 됩니다. 그런 보상 필요 없어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィじゃなくて、お姉ちゃんへのご褒美～♪\u3000ホントにダメ？」"
translation = "「소피 말고, 언니한테 주는 보상~♪ 정말 안 돼?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……姉さんがしたいのならさせてあげます。私は大人ですから。今日だけ特別ですよ」"
translation = "「……언니가 하고 싶다면 하게 해드릴게요. 저는 어른이니까요. 오늘만 특별히예요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ぎゅ～っ♪」"
translation = "「꼬옥~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「むぅ……」"
translation = "「으으……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ついでにナデナデ♪」"
translation = "「덤으로 쓰담쓰담♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そこまでしていいとは言ってません。むー」"
translation = "「거기까지 해도 된다고는 안 했습니다. 으음.」"

[[dialogue]]
speaker = "unk"
original = "（仲良し姉妹だ）"
translation = "(사이좋은 자매다)"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「何笑ってるんですか。変な笑い方しないでください」"
translation = "「뭘 웃고 계신가요. 이상한 식으로 웃지 마세요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、仲良くしなくちゃダメよ～？」"
translation = "「어라어라, 사이좋게 지내야지~?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「見ないでくださいってば、もうっ」"
translation = "「보지 말라니까요 정말, 참!」"

