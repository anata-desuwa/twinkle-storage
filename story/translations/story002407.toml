[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なっ……なな、なんということですか！\u3000新郎がさらわれてしまうなんて！」"
translation = "「나……나나, 이게 무슨 일인가요! 신랑이 납치당하다니!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いや、正直なところざまあみろと思わなくはないけど……フィオナ会長だけじゃなくて、他の子とも結婚式をしようなんて、むかっ腹が立ってたし」"
translation = "「아니, 솔직히 꼴 좋다는 생각이 안 드는 건 아니지만…… 피오나 회장뿐만 아니라 다른 아이랑도 결혼식을 하려 하다니, 울화통이 터졌거든요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あのー、イレーナさん？」"
translation = "「저기─, 이레이나 씨?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「こほん、何でもありません。お気になさらず。それよりも、この後どうなさるおつもりですか？」"
translation = "「크흠, 아무것도 아닙니다. 신경 쓰지 마세요. 그보다, 이다음엔 어쩌실 생각인가요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そうですね、いきなりすぎて、正直頭が追いついてなくて……」"
translation = "「그, 그러게요, 너무 갑작스러워서 솔직히 머리가 따라가질 못해서……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くん、さらわれちゃったよ……ようやく誓いの言葉をする決意が出来たとこだったのに」"
translation = "「회장군, 납치당해 버렸어…… 겨우 맹세의 말을 할 결심이 섰을 참이었는데」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「トワちゃん先生、しっかりしてください！」"
translation = "「토와짱 선생님, 정신 차리세요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「う、うん……」"
translation = "「으, 응……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「も～！\u3000乙女の晴れ舞台を台無しにするなんてひどすぎるよ！\u3000絶対許せない！」"
translation = "「정말~! 소녀의 화려한 무대를 망치다니 너무해! 절대 용서 못 해!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「マトイちゃんお願い、力を貸して！\u3000一緒に会長くんを取り戻すよ！」"
translation = "「마토이짱 부탁해, 힘을 보태줘! 같이 회장군을 되찾으러 가자!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「了解です！\u3000急ぎましょう、トワちゃん先生！」"
translation = "「알겠습니다! 서두르죠, 토와짱 선생님!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんと結婚するのはわたしなんだから～～っ！！！」"
translation = "「회장군이랑 결혼하는 건 나란 말이야~~!!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（あれ？\u3000トワちゃん先生……いつの間にか本気になっちゃってる……？）"
translation = "(어라? 토와짱 선생님…… 어느샌가 진심이 되어 버렸어……?)"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さてと……ここまで来れば大丈夫かしらね」"
translation = "「자…… 이쯤 오면 괜찮으려나」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「でも本当に良かったんでしょうか？\u3000式場は今頃、大混乱だと思いますよ」"
translation = "「하지만 정말 괜찮을까요? 식장은 지금쯤 대혼란일 거예요」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「緊急事態だから仕方ないわ。それともヨミヨミ、あのまま会長が取られてしまってもよかったの？」"
translation = "「긴급 사태니까 어쩔 수 없지. 아니면 요미요미, 그대로 회장을 뺏겨도 좋았던 거야?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それは嫌ですけど…………って、あれ？\u3000でも本当に結婚するわけじゃないんだし、取られるもなにもなかったのでは？」"
translation = "「그건 싫지만………… 어라? 근데 정말로 결혼하는 것도 아니니까, 뺏기고 말고 할 것도 없지 않았나요?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「たとえ偽物の結婚式であったとしても、九浄家メイド隊たる私たちが遅れを取るわけにはいかないわ？」"
translation = "「설령 가짜 결혼식이라 해도, 쿠죠 가문 메이드대인 우리가 뒤처질 수는 없잖아?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それにこういう劇的な展開があった方が、恋心も燃え上がるというものよ。……そう思うでしょう、会長？」"
translation = "「게다가 이런 극적인 전개가 있어야 연심도 불타오르는 법이지. ……그렇게 생각하지, 회장?」"

[[dialogue]]
speaker = "unk"
original = "トワ先生を本気にさせるのが狙いか"
translation = "토와 선생님을 진심으로 만드는 게 목적인가"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あら、もちろんそれだけじゃないわよ」"
translation = "「어머, 물론 그것뿐만이 아니야」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「せっかくウェディングフォームを頂いたのだから、私たちだって結婚式を挙げたいじゃない」"
translation = "「어렵게 웨딩 폼을 받았으니, 우리도 결혼식을 올리고 싶잖아」"

[[dialogue]]
speaker = "unk"
original = "だからって略奪しなくても……"
translation = "그렇다고 약탈까지는……"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「愛は与えられるものではないわ、奪うものよ！」"
translation = "「사랑은 주어지는 게 아니야, 쟁취하는 거지!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それに私は人間界に来てメイドとして働く条件として、未来の旦那様を見つけて連れ帰るように言いつかっているの」"
translation = "「게다가 난 인간계에 와서 메이드로 일하는 조건으로, 미래의 서방님을 찾아 데려오라는 분부를 받았거든」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「花嫁修業を通じて思ったのだけど、会長の旦那様っぷりはなかなかのものだったわ」"
translation = "「신부 수업을 통해 생각했는데, 회장의 서방님다움은 제법이었어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「よって貴方を私の花婿候補に加えてあげる！\u3000ふふっ、光栄でしょう？\u3000大いに喜びなさいっ！」"
translation = "「따라서 당신을 내 신랑 후보에 넣어줄게! 후훗, 영광이지? 마음껏 기뻐하도록 해!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さあ、ヨミヨミ！\u3000突っ立っていないで貴方も会長にアピールしたらどうなの？」"
translation = "「자, 요미요미! 멍하니 서 있지 말고 너도 회장에게 어필해 보는 게 어때?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えっ？\u3000アピールですか？\u3000え、ええと……」"
translation = "「엣? 어필인가요? 에, 에토……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「教えたでしょう！\u3000ほら、早く！」"
translation = "「가르쳐줬잖아! 자, 어서!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わ、わかりましたぁ……」"
translation = "「아, 알겠습니다아……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こんこん、こぉん<emoji=heart04>\u3000狐の嫁入りですよ～♪」"
translation = "「콩콩, 코오옹<emoji=heart04> 여우 시집가기예요~♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長さんに、私のこともらって欲しいです……こんこん、こぉん<emoji=heart04>」"
translation = "「회장님이 절 데려가 주셨으면 해요…… 콩콩, 코오옹<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「くっ……さすがの可愛さね！\u3000もしかしたらとんでもない強敵を生み出してしまったのかしら？\u3000でも、私だって負けないわ！」"
translation = "「큭…… 역시나 귀엽네! 어쩌면 엄청난 강적을 만들어 버린 걸까? 하지만 나도 지지 않아!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ぴょんぴょん、あそーれぴょんぴょん<emoji=heart04>\u3000こちらはかわいいうさぎの嫁入りよ<emoji=heart04>」"
translation = "「깡충깡충, 어기영차 깡충깡충<emoji=heart04> 이쪽은 귀여운 토끼 시집가기야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "でも可愛すぎるっ！"
translation = "그치만 너무 귀엽다!"

[[dialogue]]
speaker = "unk"
original = "あ、あざといっ！"
translation = "아, 영악해!"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ほーら、もっと密着してあげるわ♪\u3000……ふふふ、いい反応ね♪\u3000頑張った甲斐があったわ」"
translation = "「자─아, 좀 더 밀착해 줄게♪ ……후후후, 좋은 반응이네♪ 공들인 보람이 있어」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁん♪\u3000メイド長ばっかりずるいです。私も会長にくっつきます～」"
translation = "「코야아앙♪ 메이드장님만 치사해요. 저도 회장님한테 달라붙을래요~」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「やるわね。ヨミヨミもだんだん本気を出してきたってところかしら？」"
translation = "「제법인데. 요미요미도 슬슬 본 실력을 내기 시작한 걸까?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、それは……中途半端にやると余計に恥ずかしいって気が付いたので……」"
translation = "「그, 그건…… 어설프게 하면 오히려 더 부끄럽다는 걸 깨달아서……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それに私も結婚したら旦那さまに喜んでもらいたいです。だから、いつかその日が来た時のためにいっぱい練習しておきたいんです」"
translation = "「게다가 저도 결혼하면 서방님이 기뻐해 주셨으면 해요. 그래서 언젠가 그날이 왔을 때를 위해 잔뜩 연습해 두고 싶어요」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「その意気よ。私とヨミヨミの２人がかりで、貴方をとことん甘やかし抜いてあげるから覚悟しなさい<emoji=heart04>」"
translation = "「그 기세야. 나와 요미요미 둘이서 당신을 아주 쏙 빠지게 만들어 줄 테니 각오해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「いっぱいいっぱい、ご奉仕しちゃいますからね～<emoji=heart04>」"
translation = "「가득가득, 봉사해 드릴 테니까요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんなのもう我慢できないよ！"
translation = "이런 건 이제 못 참겠어!"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「我慢しなくていいのよ。だって私たちは貴方のお嫁さんなんだから」"
translation = "「참지 않아도 돼. 우린 당신의 신부니까」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ほらほらぁ、もっと優しくぴょんぴょん言ってあ・げ・る<emoji=heart04>」"
translation = "「자자아, 좀 더 부드럽게 깡충깡충 속삭여 줄·게<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「わ、私だってっ。会長さんのお嫁さんになるんですから、メイド長にだって負けられませんっ」"
translation = "「저, 저도요. 회장님의 신부가 될 거니까, 메이드장님한테도 질 수 없어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こぉん、こん♪\u3000もっとリラックスして……ふふっ、私の尻尾が気になりますか？」"
translation = "「코옹, 콩♪ 좀 더 릴랙스하고…… 후훗, 제 꼬리가 신경 쓰이나요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「いいですよ……触っても。旦那さまにだけ、特別です<emoji=heart04>」"
translation = "「괜찮아요…… 만져도. 서방님한테만 특별히 드리는 거예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「っ……！\u3000な、なかなか大胆なことをするわね！\u3000貴方がそう来るなら私だって……！」"
translation = "「윽……! 제, 제법 대담한 짓을 하네! 네가 그렇게 나온다면 나도……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長っ、ヨミヨミの狐尻尾も素敵だけど、私のうさみみだってふわふわしててあったかくて……触るととっても気持ちいいのよ」"
translation = "「회장, 요미요미의 여우 꼬리도 멋지지만, 내 토끼 귀도 폭신폭신하고 따뜻해서…… 만지면 정말 기분 좋다구」"

[[dialogue]]
speaker = "unk"
original = "お、お触りしてもいいの？"
translation = "어, 어루만져도 돼?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ホントはダメだけど……今日は特別です<emoji=heart04>」"
translation = "「원래는 안 되지만…… 오늘은 특별해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「その代わり、優しく触るのよ……くすぐったくしたら承知しないんだから……」"
translation = "「그 대신 살살 만져야 해…… 간지럽게 하면 가만 안 둘 거니까……」"

[[dialogue]]
speaker = "unk"
original = "ゴクリ、と息を呑む。"
translation = "꿀꺽, 하고 침을 삼킨다."

[[dialogue]]
speaker = "unk"
original = "触り心地の良さそうな２人のフワフワに手を伸ばそうとした──その瞬間だった。"
translation = "만지면 기분 좋을 것 같은 두 사람의 폭신폭신한 곳으로 손을 뻗으려던── 그 순간이었다."

[[dialogue]]
speaker = "？？？"
original = "「まぁああああああああてぇええええええええええっ！！！！！！！」"
translation = "「거기 기이이이이이이이이다려어어어어어어어어어엇!!!!!!!!」"

