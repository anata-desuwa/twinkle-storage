[[dialogue]]
speaker = "unk"
original = "第４話,特別な女の子,P"
translation = "제4화, 특별한 여자아이, P"

[[dialogue]]
speaker = "マトイ"
original = "「……ふう、全部片付いたかな？\u3000１体１体はあんまり強くないモンスターだったけど、数が凄かったね」"
translation = "「……후우, 전부 정리됐나? 한 마리 한 마리는 별로 강하지 않은 몬스터였지만, 수가 엄청났네」"

[[dialogue]]
speaker = "マトイ"
original = "「あんまり強力なモンスターだと、私のガードも破られちゃったりするんだけど……こういう大群が相手なら、力になれるのかも……」"
translation = "「너무 강력한 몬스터라면 내 가드도 뚫려버리곤 하지만…… 이런 대군이 상대라면 힘이 될 수 있을지도……」"

[[dialogue]]
speaker = "マトイ"
original = "「星徒会に入ってから誰かの背中を守ることが多くなって、私でもやれることがあるんじゃないかって、努力し続けてきたけど……」"
translation = "「성도회에 들어오고 나서 누군가의 등을 지키는 일이 많아져서, 나라도 할 수 있는 일이 있지 않을까 하고 계속 노력해왔지만……」"

[[dialogue]]
speaker = "マトイ"
original = "「なんだか、最近はその実感がようやく湧いてきた気がする」"
translation = "「왠지 요즘은 그 실감이 드디어 나는 것 같아」"

[[dialogue]]
speaker = "unk"
original = "戦闘でも仕事でも、マトイは頼りになるよ"
translation = "전투에서도 업무에서도 마토이는 의지가 돼"

[[dialogue]]
speaker = "マトイ"
original = "「う、うんっ。私も、会長に頼りにされると、いつもよりも力が湧いてくる気がするっ」"
translation = "「으, 응. 나도 회장님이 의지해주면 평소보다 더 힘이 솟아나는 기분이 들어」"

[[dialogue]]
speaker = "マトイ"
original = "「……ねえ、会長。モンスターももう片付いたし、ちょっとだけ聞いて欲しいことがあるんだけど、いいかな？」"
translation = "「……저기, 회장님. 몬스터도 이제 정리됐고, 조금만 들어줬으면 하는 게 있는데 괜찮을까?」"

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론이지"

[[dialogue]]
speaker = "マトイ"
original = "「──私、星徒会のみんなみたいに特別な才能があるわけじゃないってこと、少し気にしてたんだ」"
translation = "「──나, 성도회 모두처럼 특별한 재능이 있는 게 아니라는 거, 조금 신경 쓰고 있었어」"

[[dialogue]]
speaker = "マトイ"
original = "「それでも私なりに、私にしかできないことを考えて頑張ってきたつもりだったんだけど……やっぱり、自分なんて、って思うことが多かった」"
translation = "「그래도 나름대로 나만이 할 수 있는 일을 생각하며 노력해왔다고 생각했지만…… 역시 나 같은 건, 하고 생각할 때가 많았어」"

[[dialogue]]
speaker = "マトイ"
original = "「……でもね、最近は会長の力になれることが凄く嬉しいのっ」"
translation = "「……하지만 말이야, 요즘은 회장님에게 힘이 될 수 있는 게 정말 기뻐」"

[[dialogue]]
speaker = "マトイ"
original = "「『マトイは頼りになる』とか『盾役はチームの要だ』って、この頃はよく言ってくれるでしょ？\u3000会長にそう言ってもらえると、自分にも自信が持てるようになってくるの……」"
translation = "「『마토이는 의지가 돼』라든가 『방패 역할은 팀의 핵심이다』라고 요즘 자주 말해주잖아? 회장님이 그렇게 말해주면 나도 자신감을 가질 수 있게 돼……」"

[[dialogue]]
speaker = "マトイ"
original = "「私も、あなたの傍にいてもいい人間なんだって……。自信を持ってもいいんだって、思えるようになったの」"
translation = "「나도 당신의 곁에 있어도 되는 인간이구나 하고…… 자신을 가져도 된다고 생각하게 됐어」"

[[dialogue]]
speaker = "マトイ"
original = "「特別な才能を持った人間じゃなくても、自分にはできることがあるって、思えるようになった」"
translation = "「특별한 재능을 가진 인간이 아니더라도 나에게는 할 수 있는 일이 있다고 생각하게 됐어」"

[[dialogue]]
speaker = "マトイ"
original = "「……と、思うんだけど……えへへ、自意識過剰かも。でも、悪いことじゃないよね、これって」"
translation = "「……라고 생각하는데…… 에헤헤, 자의식 과잉일지도. 하지만 나쁜 건 아니지, 이런 거」"

[[dialogue]]
speaker = "unk"
original = "マトイは皆の期待に応えるために頑張ってる"
translation = "마토이는 모두의 기대에 부응하기 위해 노력하고 있어"

[[dialogue]]
speaker = "マトイ"
original = "「ん……ありがとう。でも、そんなに沢山頑張ったわけじゃないよ？\u3000普通くらいだよ。これくらい努力している人、いっぱいいるし」"
translation = "「음…… 고마워. 하지만 그렇게 많이 노력한 건 아니야. 평범한 수준이야. 이 정도 노력하는 사람 잔뜩 있고」"

[[dialogue]]
speaker = "マトイ"
original = "「な、なんか変な話しちゃった。ごめんね。任務も終わったし、そろそろ帰ろっか」"
translation = "「왠지 이상한 이야기를 해버렸네. 미안해. 임무도 끝났으니 슬슬 돌아가자」"

[[dialogue]]
speaker = "unk"
original = "学園へ戻り、２人で星徒会室に向かう途中、クラスメイトの女子と会った。"
translation = "학원으로 돌아와 둘이서 성도회실로 향하던 중, 반 친구인 여학생과 만났다."

[[dialogue]]
speaker = "女子生徒Ｃ"
original = "「マトイ、お疲れ～。今日の任務、結構ヤバかったって聞いたけど、大丈夫だったん？」"
translation = "「마토이, 수고했어~. 오늘 임무 꽤 위험했다고 들었는데 괜찮았어?」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、うん。会長もいてくれてたし、普通に大丈夫だったよ」"
translation = "「아, 응. 회장님도 같이 있어 줬고, 평범하게 괜찮았어」"

[[dialogue]]
speaker = "女子生徒Ｃ"
original = "「マジ？\u3000やるじゃん会長～～♪\u3000うちも出動できるようになったら、会長に守ってもらおっかな～～♪」"
translation = "「진짜? 제법인데 회장님~~♪ 나도 출동할 수 있게 되면 회장님이 지켜주려나~~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "女子生徒Ｃ"
original = "「ま、大丈夫ならよかった。それじゃあまた後でね～♪」"
translation = "「뭐, 괜찮다면 다행이네. 그럼 나중에 봐~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「は～……私も、あんな風に積極的になれたらなぁ。やっぱり私って普通だなぁ……」"
translation = "「하~…… 나도 저렇게 적극적이 될 수 있다면 좋을 텐데. 역시 난 평범하구나……」"

[[dialogue]]
speaker = "マトイ"
original = "「まあ、ないものねだりしてもしょうがないか……」"
translation = "「뭐, 없는 걸 바라도 어쩔 수 없나……」"

[[dialogue]]
speaker = "unk"
original = "マトイはよく普通って言うけど、十分魅力的だと思うけどな"
translation = "마토이는 자주 평범하다고 말하지만, 충분히 매력적이라고 생각하는데"

[[dialogue]]
speaker = "マトイ"
original = "「へっ！？\u3000そ、それってどういう……」"
translation = "「헤!? 그, 그건 무슨……」"

[[dialogue]]
speaker = "マトイ"
original = "「え、えっと、十分魅力的っていうのは、えっと、その……！」"
translation = "「어, 그러니까, 충분히 매력적이라는 건, 어, 그게……!」"

[[dialogue]]
speaker = "unk"
original = "マトイが普通じゃないと、落ち着かない"
translation = "마토이가 평범하지 않으면 진정이 안 돼"

[[dialogue]]
speaker = "マトイ"
original = "「あっ──そ、そういうことね……」"
translation = "「앗── 그, 그런 거구나……」"

[[dialogue]]
speaker = "マトイ"
original = "「ん……でもありがとう。えへへ……なんか会長にそう言ってもらえると、嬉しいな……」"
translation = "「음…… 그래도 고마워. 에헤헤…… 왠지 회장님이 그렇게 말해주니까 기쁘네……」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。普通、普通でもいいんだよね。私は私なんだから」"
translation = "「응. 평범, 평범해도 괜찮은 거네. 나는 나니까」"

[[dialogue]]
speaker = "マトイ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マトイ"
original = "「でも、でもね……私は、できれば……会長にとっては、特別な女の子でいたいなぁ……な、なんて……」"
translation = "「하지만, 하지만 말이야…… 나는 가급적이면…… 회장님에게는 특별한 여자아이이고 싶어……라니……」"

[[dialogue]]
speaker = "マトイ"
original = "「ちなみになんだけど……か、会長はどんな女の子が、好みのタイプなの？」"
translation = "「참고로 묻는 건데…… 회, 회장님은 어떤 여자아이가 취향이야?」"

[[dialogue]]
speaker = "マトイ"
original = "「例えばなんだけど……お菓子を作るのが趣味の、普通の女の子とかは、ど、どうかな……？」"
translation = "「예를 들면 말인데…… 과자 만드는 게 취미인 평범한 여자아이 같은 건 어, 어때……?」"

[[dialogue]]
speaker = "マトイ"
original = "（わ、私何いきなり告白とかしちゃってるの！？\u3000どどど、どうしよう……こんなこと突然言われたら困るに決まってるのに……！）"
translation = "（나, 나 갑자기 무슨 고백 같은 걸 하는 거야!? 어어어, 어쩌지…… 이런 소리 갑자기 들으면 곤란할 게 뻔한데……!）"

[[dialogue]]
speaker = "マトイ"
original = "（で、でも、今さら撤回するのもなんか変だしっ、えっとえっとえっと……あぁ～～もうどうにでもなれっ……！）"
translation = "（하, 하지만 이제 와서 철회하는 것도 왠지 이상하고, 어쩌지 어쩌지 어쩌지…… 아아~~ 이제 어떻게든 돼라……!）"

[[dialogue]]
speaker = "unk"
original = "お菓子を作るのが趣味の……普通の女の子"
translation = "과자 만드는 게 취미인…… 평범한 여자아이"

[[dialogue]]
speaker = "unk"
original = "お、俺は好きだよ。"
translation = "나, 나는 좋아해."

[[dialogue]]
speaker = "マトイ"
original = "「あっ──」"
translation = "「앗──」"

[[dialogue]]
speaker = "マトイ"
original = "「そ──そっか。そっかぁ……えへへ、よかったぁ……」"
translation = "「그렇──구나. 그렇구나…… 에헤헤, 다행이다……」"

[[dialogue]]
speaker = "マトイ"
original = "「そうだ、会長。その……昨日、家でマフィンを作ってみたんだけど、また食べて感想聞かせてくれないかな……？」"
translation = "「맞다, 회장님. 그…… 어제 집에서 머핀을 만들어 봤는데, 또 먹고 감상 들려주지 않을래……?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マトイは制服のポケットから、綺麗な包み紙に入ったマフィンを取り出す。"
translation = "그렇게 말하며 마토이는 교복 주머니에서 예쁜 포장지에 싸인 머핀을 꺼낸다."

[[dialogue]]
speaker = "マトイ"
original = "「はい、これ。じ、実は朝からずっと渡そうとタイミング伺ってたんだけど……ポケットに入りっぱなしになっちゃってて……えへへ」"
translation = "「자, 이거. 시, 사실 아침부터 계속 주려고 타이밍을 엿보고 있었는데…… 주머니에 계속 들어있게 돼서…… 에헤헤」"

[[dialogue]]
speaker = "マトイ"
original = "「後で星徒会のみんなにも作るつもりだけど……会長からは、先に感想もらえたらなって」"
translation = "「나중에 성도회 모두에게도 만들어 줄 생각이지만…… 회장님한테 먼저 감상 받고 싶어서」"

[[dialogue]]
speaker = "マトイ"
original = "「今回は──会長に食べてもらうために作った、特別製だからっ」"
translation = "「이번에는── 회장님이 먹어주길 바라며 만든 특별제니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「じゃ、じゃあねっ、後で感想聞かせてねっ、絶対だよっ」"
translation = "「그, 그럼 나중에 감상 들려줘, 꼭이야!」"

[[dialogue]]
speaker = "unk"
original = "マトイは恥ずかしくなったのか、先に星徒会室へ行ってしまう。"
translation = "마토이는 부끄러워졌는지 먼저 성도회실로 가버린다."

[[dialogue]]
speaker = "unk"
original = "俺は早く感想を伝えたくて、壁際に寄り、包みを開く。そうして、食べたマフィンからは──"
translation = "나는 빨리 감상을 전하고 싶어서 벽에 기대어 포장을 연다. 그렇게 먹은 머핀에서는──"

[[dialogue]]
speaker = "unk"
original = "甘くて幸せな気持ちになる、特別な味がしたのだった。"
translation = "달콤하고 행복한 기분이 드는 특별한 맛이 났다."

