[[dialogue]]
speaker = "unk"
original = "第２話,突撃赤ずきん,P"
translation = "제2화, 돌격 빨간 망토, P"

[[dialogue]]
speaker = "unk"
original = "ある週末。その日は特に予定もなく、家で過ごしていたのだが――"
translation = "어느 주말. 그날은 딱히 예정도 없이 집에서 지내고 있었는데――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「トリックオアトリート～♪\u3000お菓子をくれないと、悪戯しちゃうぞ～？」"
translation = "「트릭 오어 트릿~♪ 과자를 안 주면 장난칠 거라구~?」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンはもう終わったのでは！？"
translation = "할로윈은 이미 끝났잖아!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「何を言ってるのさ、会長。ハロウィンパーティーで衣装が戦闘服に変化したでしょ？\u3000それはつまり、いつでもハロウィンの悪戯が楽しめるということ」"
translation = "「무슨 소리야 회장님. 할로윈 파티에서 의상이 전투복으로 변했잖아? 그건 즉 언제든지 할로윈 장난을 즐길 수 있다는 뜻」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「となれば、使わない手はないよね？\u3000にひひ♪」"
translation = "「그렇다면 안 쓸 수 없지? 니히히♪」"

[[dialogue]]
speaker = "unk"
original = "仕方ない、秘蔵の辛口せんべいを出すか……"
translation = "어쩔 수 없지, 비장의 매운 전병이라도 내올까……"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おやおや？\u3000今日は恋人としての悪戯は、しなくてもいいのかな～？」"
translation = "「어라어라? 오늘은 연인으로서의 장난은 안 해도 되는 걸까나~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――放っておいてもしてくるでしょ、って？\u3000にひひ♪\u3000さてさて、どうかな～？」"
translation = "「――가만히 둬도 할 거잖아, 라고? 니히히♪ 글쎄, 어떠려나~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それにしても、私の影響で、会長もすっかり辛い物好きになっちゃったよね～」"
translation = "「그나저나 내 영향으로 회장님도 완전히 매운맛 마니아가 돼버렸네~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まぁ、一緒に辛い物食べて楽しめるのは、悪い気分じゃないけどね～。もぐもぐ……うん♪\u3000この辛口せんべい、思ってたよりずっと辛くていいね♪」"
translation = "「뭐, 같이 매운 거 먹으면서 즐기는 건 나쁜 기분이 아니지만 말이야~. 우물우물…… 응♪ 이 매운 전병 생각보다 훨씬 매워서 좋네♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長の入れてくれた緑茶との相性もイイ感じ……って、どうしたの会長？\u3000なんか聞きたそうな顔をしてるけど？」"
translation = "「회장님이 타준 녹차랑 궁합도 좋은 느낌…… 인데, 왜 그래 회장님? 뭔가 묻고 싶은 얼굴인데?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――どうして私が会長を踏んでるのかって？」"
translation = "「――왜 내가 회장님을 밟고 있냐고?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000それはあれだよ～、そこに会長の踏みやすそうな背中があるから☆」"
translation = "「니히히♪ 그건 그거야~, 거기에 회장님의 밟기 좋아 보이는 등이 있으니까☆」"

[[dialogue]]
speaker = "unk"
original = "粘着罠で無理矢理うつ伏せにされたけど！？"
translation = "점착 트랩으로 억지로 엎드리게 됐는데!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え？\u3000恋人同士なら、普通のコミュニケーションじゃない？」"
translation = "「에? 연인 사이라면 평범한 커뮤니케이션 아니야?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「こうやってじゃれ合って、家でゴロゴロしながら、一緒にテレビニュースを観たりとかさ～」"
translation = "「이렇게 장난치고 집에서 뒹굴거리면서 같이 TV 뉴스를 보거나 하는 거 말이야~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ！\u3000ほら、テレビ観て会長！\u3000あの有名俳優が不倫だってさ！\u3000きゃははっ♪\u3000マジか～！\u3000優しそうな顔して悪だね～♪」"
translation = "「아! 봐봐 TV 봐 회장님! 저 유명 배우가 불륜이래! 꺄하핫♪ 실화냐~! 상냥한 얼굴을 하고선 악당이네~♪」"

[[dialogue]]
speaker = "unk"
original = "なにこのシュールな状況！？"
translation = "뭐야 이 슈ール한 상황은!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え～？\u3000そんなこと言いつつ、会長も満更でもない癖に～。ほれほれ～♪」"
translation = "「에~? 그런 말을 하면서도 회장님도 싫지 않은 주제에~. 자자~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000私も踏み慣れてきたから、会長のやらしい声が出ちゃう場所とか、わかっちゃってるんだよ～？\u3000この辺りとか～、えいっ<emoji=heart04>」"
translation = "「니히히♪ 나도 밟는 거 익숙해져서 회장님의 야한 소리가 나오는 곳 정도는 다 알고 있다구~? 이쯤이라든가~, 에잇♥」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃははっ♪\u3000感じちゃった～？\u3000会長のへ・ん・た・い<emoji=heart04>」"
translation = "「꺄하핫♪ 느껴버렸어~? 회장님은 변·태♥」"

[[dialogue]]
speaker = "unk"
original = "そんな感じで楽しそうなマインに踏み踏みされながら過ごしていて、ふと思ったことを聞いてみる。"
translation = "그런 느낌으로 즐거워 보이는 마인에게 꾹꾹 밟히며 지내다가 문득 든 생각을 물어본다."

[[dialogue]]
speaker = "unk"
original = "マインって、意外と家で過ごすの好きだよね"
translation = "마인은 의외로 집에서 지내는 거 좋아하네"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん～？\u3000なんで？\u3000――外でデートするよりも、家デートの頻度が多いから？」"
translation = "「음~? 왜? ――밖에서 데이트하는 것보다 집 데이트 빈도가 많아서?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まあ、外だと人の目があるから、良い子を取り繕わないといけないしね～。やっぱり家の中にいた方が気が楽かな～」"
translation = "「뭐, 밖이면 남의 눈이 있으니까 착한 아이인 척해야 하잖아~. 역시 집 안에 있는 게 마음이 편하네~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、会長が外でデートしたいっていうなら、話に乗るよ～？\u3000今日この後、どっか出かける？」"
translation = "「하지만 회장님이 밖에서 데이트하고 싶다면 응해 줄게~? 오늘 이따가 어디 나갈래?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――私が家デートで満足してるなら、別にいい？\u3000会長ってば、優しいね～」"
translation = "「――내가 집 데이트로 만족한다면 상관없다고? 회장님도 참, 다정하네~」"

[[dialogue]]
speaker = "unk"
original = "今日はストレス解消できた？"
translation = "오늘은 스트레스 해소 됐어?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん？\u3000どうして？\u3000――私が悪戯をしにきたって言ったから？\u3000あ～、そうか……」"
translation = "「응? 왜? ――내가 장난치러 왔다고 했으니까? 아~, 그렇구나……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（そこまで深く考えてなかったけど、言われてみると、ストレス解消をしにきたわけじゃなかったかも……）"
translation = "(거기까지 깊게 생각 안 했는데 듣고 보니 스트레스 해소를 하러 온 건 아니었을지도……)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（じゃあ、何しにきたのかって話になると……たまたま今日は暇だったし、なんとなく会長に会いにきただけっていうか……）"
translation = "(그럼 뭐 하러 온 거냐고 하면…… 마침 오늘은 한가했고 왠지 모르게 회장님을 보고 싶어서 왔을 뿐이랄까……)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（いやでもそれって、冷静に考えるとなんだか――）"
translation = "(아니 근데 그거 냉정하게 생각하면 왠지――)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（……うん、今日は悪戯をしにきたことにしよう）"
translation = "(……응, 오늘은 장난치러 온 걸로 하자)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「こちょこちょこちょ～♪」"
translation = "「간질간질간질~♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000足で脇腹くすぐるのやめて！"
translation = "잠깐!? 발로 옆구리 간질이는 거 그만둬!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「なんか悔しいから、ダメで～す」"
translation = "「왠지 억울하니까 안~돼요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「悪い反撃をしてくる彼氏には、お仕置きしないとね～」"
translation = "「나쁜 반격을 해오는 남자친구한테는 벌을 줘야지~」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？\u3000なんか悪いことした！？"
translation = "무슨 소리야!? 내가 무슨 나쁜 짓을 했다고!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふ～んだ、教えてあげないよ～」"
translation = "「흥이다, 안 알려줄 거야~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「許して欲しかったら、会長の方から悪戯して欲しいって、正直に言ってくれないとね～♪」"
translation = "「용서받고 싶으면 회장님 쪽에서 장난쳐 달라고 솔직하게 말해야 할걸~♪」"

[[dialogue]]
speaker = "unk"
original = "結局、お仕置きの理由は教えてくれず、降参するまでくすぐられてしまうのだった。"
translation = "결국 벌을 주는 이유는 알려주지 않고 항복할 때까지 간지럽힘을 당하는 것이었다."

