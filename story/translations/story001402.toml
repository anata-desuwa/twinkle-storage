[[dialogue]]
speaker = "unk"
original = "そして――約束の日、当日。"
translation = "그리고── 약속한 날, 당일."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「こうして直接まみえるのはリクリエ以来か？\u3000久しいな緋宮クロト」"
translation = "「이렇게 직접 마주하는 건 리크리에 이후인가? 오랜만이군, 히노미야 쿠로토.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「今日はこのような場を設けていただき、ネビュラを代表して感謝を述べさせてもらおう」"
translation = "「오늘은 이런 자리를 마련해 줘서 네뷸라를 대표해 감사를 표하마.」"

[[dialogue]]
speaker = "unk"
original = "ようこそお越しくださいました"
translation = "잘 오셨습니다"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お世話になりま～す♪」"
translation = "「신세 좀 지겠습니다~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はえ～。何だかんだ、星徒会室までお邪魔するのは久々かも～」"
translation = "「하에~ 어찌저찌 성도회실까지 실례하는 건 오랜만일지도~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え～と、ネビュラからの参加者は３人ってことでいいのかしら？」"
translation = "「에~ 그러니까 네뷸라에서의 참가자는 세 명인 거네?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ、我々も何かと忙しくてな。リーリアと私、それからアイリーンの３名の参加になる」"
translation = "「그래, 우리도 나름대로 바빠서 말이지. 리리아와 나, 그리고 아이린 세 명의 참가가 된다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ネビュラも大変なのね～」"
translation = "「네뷸라도 고생이네~」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「リクリエを退けたことで平穏が訪れてくれていれば、余裕もあっただろうがな」"
translation = "「리크리에를 물리쳐서 평온이 찾아와 주었다면 여유도 있었겠지만 말이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まあまあ、今日くらいはそういう事も忘れてリフレッシュしていきなさい♪」"
translation = "「자자, 오늘 정도는 그런 건 잊고 리프레시하고 가렴♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ、そうさせてもらうつもりだ」"
translation = "「그래, 그럴 생각이다.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "元気がないみたいだけど"
translation = "기운이 없어 보이는데"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000どうしたの、リーリア？"
translation = "어라? 왜 그래, 리리아?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あはは、そ、そんなことないですよ～……」"
translation = "「아하하, 그, 그렇지 않아요~……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「…………えっと、実はですね……」"
translation = "「…………저기 실은 말이죠……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――というわけで、新星の星徒会長からお誘いを頂いたんですけど、セドナ長官的にはどうですか？」"
translation = "「──라는 고로 신성의 성도회장님으로부터 권유를 받았습니다만, 세드나 장관님 생각은 어떠신가요?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふむ、ありがたい申し出だが、こちらも色々と忙しい状態だからな……全員でという訳にもいかないだろう」"
translation = "「흠, 고마운 제안이다만 이쪽도 여러모로 바쁜 상태니까 말이지…… 전원이서라는 건 무리일 거다.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（うんうん、長官がこんな話に乗り気になるわけないもんね。ここまでは読み通り）"
translation = "(응응, 장관님이 이런 이야기에 솔깃해질 리가 없지. 여기까지는 예상대로야)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えーと……それじゃ仕方ありませんね！」"
translation = "「저기…… 그럼 어쩔 수 없네요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「学園側の心遣いを無下にするわけにもいきませんし、ここは代表して私が行ってきます！」"
translation = "「학원 측의 배려를 무시할 수도 없으니 여기선 대표로 제가 다녀오겠습니다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ、お前なら先方とのコミュニケーションも円滑に進められるだろう。リーリアにはもちろん行ってもらう」"
translation = "「그래, 너라면 상대방과의 커뮤니케이션도 원활하게 진행할 수 있겠지. 리리아는 물론 가도록 해라.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はーい、お任せください♪」"
translation = "「네~ 맡겨주세요♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「後は……私も参加しよう」"
translation = "「그다음은…… 나도 참가하도록 하지.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「へっ！？」"
translation = "「헷!?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「今しがた報告を受けたばかりなのだが、私の水着形体の戦闘服も完成したのだ」"
translation = "「방금 보고를 받은 참인데 나의 수영복 형태의 전투복도 완성되었다더군.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そ、それは……おめでとうございます……」"
translation = "「그, 그건…… 축하드립니다……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「この戦闘服に用いられている技術は同盟の証として学園側より提供されたもの」"
translation = "「이 전투복에 쓰인 기술은 동맹의 증표로서 학원 측에서 제공받은 것.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それを元に作られたこの戦闘服の性能テストに、新星の星徒会が協力してくれるというのは願ってもない話だ」"
translation = "「그걸 토대로 만들어진 이 전투복의 성능 테스트에 신성의 성도회가 협력해 준다는 건 바라 마지않던 일이지.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あの～……セドナ長官？\u3000これは水着戦闘服の戦闘テストではなく、あくまで『オペレーション・ペンダグラム』の打ち上げで……」"
translation = "「저기~…… 세드나 장관님? 이건 수영복 전투복의 전투 테스트가 아니라 어디까지나 『오퍼레이션 펜타그램』의 뒤풀이라서……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「分かっている。あくまで今回の目的は親睦だ」"
translation = "「알고 있다. 어디까지나 이번 목적은 친목이다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが新しい戦闘服の能力を確かめる絶好の機会であることも間違いないだろう……違うか？」"
translation = "「하지만 새로운 전투복의 능력을 확인하기에 절호의 기회인 것도 틀림없지 않나…… 아닌가?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「まあ、そういう側面も無きにしもあらず、かもしれませんが……」"
translation = "「뭐, 그런 측면도 없지 않아 있을지도 모르겠습니다만……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ならばこの機会を活用することに何の不都合もあるまい」"
translation = "「그렇다면 이 기회를 활용하는 데 아무런 지장도 없겠군.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「その招待にはお前と私で応じるとしよう」"
translation = "「그 초대에는 너와 내가 응하기로 하자.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そうと決まれば早速、先方と段取りをつけた方が良いだろう。それはお前に一任するが問題ないか？」"
translation = "「그렇게 정해졌으면 당장 상대방과 일정을 맞추는 게 좋겠지. 그건 네게 일임하마, 문제없나?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「イ、イエス、マム……」"
translation = "「이, 이스 마무……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「よし、では頼んだぞ」"
translation = "「좋아, 그럼 부탁한다.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（ちょっと待ってよ！\u3000な、何でこんな事になっちゃったのーーーーっ！！！）"
translation = "(잠깐만요! 어, 어째서 이렇게 되어버린 거야아아아아아앗!!!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「とまあそんなわけで、『親睦』とは程遠いところにいるヒトが来ちゃったんです……」"
translation = "「뭐 그런 고로 『친목』과는 거리가 먼 분이 오시게 된 거예요……」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「あはは～♪\u3000ちなみに私は『長官と２人きりだけは勘弁して』と泣きつかれて参加することになりました」"
translation = "「아하하~♪ 참고로 저는 『장관님이랑 단둘이는 제발 봐달라』고 울며 매달려서 참가하게 됐습니다.」"

[[dialogue]]
speaker = "unk"
original = "そ、それはご苦労さま"
translation = "그, 그거 참 고생했네"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「他人事みたいに言ってる場合じゃありませんよ、センパイ」"
translation = "「남 일처럼 말하실 때가 아니에요, 선배.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「セドナ長官が参加したら、絶対ただの親睦会で収まるはずがないんですから」"
translation = "「세드나 장관님이 참가하시면 절대 그냥 친목회로 끝나지 않을 게 뻔하니까요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ほら、見てください。案の定、向こうではどんどんそういう流れになっちゃってますし」"
translation = "「자 봐요. 아니나 다를까 저쪽에서는 점점 그런 흐름으로 가고 있잖아요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「我らネビュラの研究所でも水着戦闘服の能力試験を行ったが、期待以上の性能を見せてくれていた」"
translation = "「우리 네뷸라 연구소에서도 수영복 전투복 성능 시험을 거쳤다만 기대 이상의 성능을 보여주더군.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが、やはり数値だけでは測れない部分もある。今回は先達の胸を借りて戦闘服の性能を引き出せるよう学びたい」"
translation = "「하지만 역시 수치만으로는 잴 수 없는 부분도 있다. 이번엔 선구자들의 도움을 받아 전투복의 성능을 끌어낼 수 있도록 배우고 싶군.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよねー、私たちも最初は制御が難しかったし」"
translation = "「그렇지~ 우리도 처음에는 제어가 힘들었거든.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ちょっと独特のコツみたいなものがあるのよね～」"
translation = "「조금 독특한 요령 같은 게 있단다~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうそう、コツと言えばね！\u3000私、水着フォームをさらにパワーアップさせることに成功したのよ！」"
translation = "「맞아 맞아, 요령 하니까 말인데! 나, 수영복 폼을 더욱 파워업시키는 데 성공했어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「は？\u3000……あの前会長、それは初耳なんですが……？」"
translation = "「하? ……전 회장님, 그건 처음 듣는 이야기입니다만……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「みんなを驚かせようと思って！\u3000デザインも性能も一新した、スーパーフォームなんだから！」"
translation = "「모두를 놀라게 해주려고! 디자인도 성능도 일신한 슈퍼 폼이니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナ……水着フォームのパワーアップって、できるものなの……？」"
translation = "「아나…… 수영복 폼의 파워업이란 게 가능한 거야……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ……本来であれば、ありえないことです。原理上、そういうことができるようにはなっていないはずですが……」"
translation = "「아니요…… 본래라면 있을 수 없는 일입니다. 원리상 그런 것이 가능하도록 되어 있지는 않을 터입니다만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあそこは、ヴィーナスちゃんだからね～」"
translation = "「뭐 거기야 비너스짱이니까~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長は、本当に研究者泣かせです……」"
translation = "「전 회장님은 정말 연구자들을 울리시는군요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「何れにしても、前会長の新フォームも、ネビュラの方々の新フォームも、引き続きデータ分析していきましょう。用意はしていますので、色々任せてください」"
translation = "「어쨌든 전 회장님의 새 폼도, 네뷸라 분들의 새 폼도 계속해서 데이터 분석을 해나가죠. 준비는 해뒀으니 여러 가지 맡겨주세요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「感謝する」"
translation = "「감사하마.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あのー、長官……そういうのもいいんですけど、今回の一番の目的は親睦ですからね、親睦」"
translation = "「저기 장관님…… 그런 것도 좋지만 이번 가장 큰 목적은 친목이니까요, 친목.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「もちろんだとも。この機会を通じてより確固たる新星学園との協力体制を築いてゆきたいものだ」"
translation = "「물론이다. 이 기회를 통해 더욱 확고한 신성학원과의 협력 체제를 구축해 나가고 싶군.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うんうん。それじゃ出発するわよ！\u3000常夏のビーチにレッツゴー！！」"
translation = "「응응. 그럼 출발하자! 상하의 비치로 레츠 고!!」"

