[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「写真からすると、あの女だな。あたしらの尾行に気づいている気配はねえ。この分なら尻尾を掴むのも時間の問題だ」"
translation = "「사진으로 보아하니 저 여자군. 우리 미행을 눈치챈 기색은 없어. 이 정도면 꼬리를 잡는 것도 시간문제야」"

[[dialogue]]
speaker = "unk"
original = "俺とシアンは公安委員会の任務で、ターゲットを追跡していた。"
translation = "나와 시안은 공안위원회 임무로 타깃을 추적하고 있었다."

[[dialogue]]
speaker = "unk"
original = "若い女性だ。俺たちとそんなに年が離れてるようにも見えない。"
translation = "젊은 여성이다. 우리와 나이 차이가 얼마 나지 않아 보인다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「かわいい顔に騙されんなよ。信じられないのも無理ねえが、悪人は見かけによらねえってのが、この仕事の常でな」"
translation = "「예쁜 얼굴에 속지 마. 믿기지 않겠지만 악인은 겉모습으로 판단할 수 없다는 게 이 일의 상식이라서 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あっちはホテル街か……ん？\u3000何をしてる、とっとと行くぞ」"
translation = "「저쪽은 호텔가군…… 응? 뭐 해, 얼른 가자고」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、でも……」"
translation = "「아니, 하지만……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ラブホテルはカムフラージュだ。合法的に、人目を避けて、ふたりきりになれる場所だからな。密会にはバッチリってわけだ」"
translation = "「러브호텔은 위장이야. 합법적으로 남의 눈을 피해 단둘이 있을 수 있는 장소니까 말이지. 밀회에는 딱이라는 말씀」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「それとも、チェリーくんにラブホは刺激が強すぎるか？\u3000ははっ」"
translation = "「아니면 체리 군에게 러브호텔은 자극이 너무 강한가? 하하」"

[[dialogue]]
speaker = "unk"
original = "ターゲットの女性は中年の男と連れ立って、エレベーターに乗り込んでいった。"
translation = "타깃인 여성은 중년 남성과 동행하여 엘리베이터에 올라탔다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「部屋番号は３０３、だな。あたしらも恋人を装って入る。こういう時、男女のバディってのは便利だな」"
translation = "「방 번호는 303호로군. 우리도 연인 행세를 하며 들어간다. 이럴 땐 남녀 버디가 편리하구만」"

[[dialogue]]
speaker = "unk"
original = "やむを得ず、俺たちもラブホテルに潜入し、対象の隣の部屋に陣取った。"
translation = "할 수 없이 우리도 러브호텔에 잠입하여 대상의 옆방에 자리를 잡았다."

[[dialogue]]
speaker = "unk"
original = "防音はしっかりしているが、聞き耳を立てると微かに男女の混じり合う嬌声が漏れ聞こえてくる。"
translation = "방음은 잘 되어 있지만, 귀를 기울이자 희미하게 남녀가 섞이는 교성이 들려왔다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ったく、あたしたちに聞かれてるとも知らずにいい気なもんだぜ。にしてもすげえ喘ぎ声だな……可愛い顔して、エグすぎるだろ……」"
translation = "「나 원 참, 우리가 듣고 있는 줄도 모르고 좋은 세상이군. 그나저나 엄청난 신음이네…… 귀여운 얼굴 해놓고 너무 노골적이잖아……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はぁ、はぁっ……あー……くっそ……長ぇこと盛ってんじゃねえよ……。は、はは……ったく、いつまでヤッてんだよ。いい加減にしろよなー……はぁっ……<emoji=heart04>」"
translation = "「하아, 하아…… 아ー…… 젠장…… 오랫동안 달아올라 있긴…… 하, 하하…… 나 원 참, 언제까지 하는 거야. 적당히 좀 하라고…… 하아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シアンは不器用に愛想笑いを浮かべるも、その顔は明らかに紅潮していて、漏れる吐息も微かに熱を帯びていた。"
translation = "시안은 서툴게 억지 미소를 지었지만, 그 얼굴은 분명히 붉게 상기되어 있었고 새어 나오는 숨결도 희미하게 열기를 띠고 있었다."

[[dialogue]]
speaker = "unk"
original = "初めて入ったラブホテル。カップルがセックスするためにある部屋。薄暗い照明に、枕元にこれ見よがしに置いてあるコンドーム。"
translation = "처음 들어온 러브호텔. 커플이 섹스를 하기 위해 있는 방. 어둑어둑한 조명에 머리맡에 보란 듯이 놓여있는 콘돔."

[[dialogue]]
speaker = "unk"
original = "彼女が言ってたように、童貞の俺にはラブホ独特のいやらしい雰囲気は刺激が強すぎた。"
translation = "그녀가 말했듯이 동정인 나에게 러브호텔 특유의 야릇한 분위기는 자극이 너무 강했다."

[[dialogue]]
speaker = "unk"
original = "しかも、一緒にいる相手が、好意を抱いている相手となれば。"
translation = "게다가 함께 있는 상대가 호감을 품고 있는 상대라면 더더욱."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シアン先輩、すみませんっ……！」"
translation = "「시안 선배, 죄송합니다……!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ちょ、な、何してんだ、任務中だぞ……！\u3000んぁ、バカっ、服、脱がすなぁっ……なに、考えてっ……！」"
translation = "「잠깐, 너, 뭐 하는 거야 임무 중이라고……! 응아, 바보야, 옷 벗기지 마아…… 무슨 생각을……!」"

[[dialogue]]
speaker = "unk"
original = "衝動を抑えきれず、彼女を背後から抱きしめ、衣服に手をかける。"
translation = "충동을 억제하지 못하고 그녀를 뒤에서 껴안으며 옷에 손을 댄다."

[[dialogue]]
speaker = "unk"
original = "口では拒んでいるわりに、抵抗する力は弱かった。"
translation = "입으로는 거절하고 있는 것치고는 저항하는 힘이 약했다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はぁ～……信じらんねえ……」"
translation = "「하아…… 믿을 수가 없군……」"

[[dialogue]]
speaker = "unk"
original = "観念したように自ら衣服を脱ぎ捨てたシアン先輩が、俺にお尻を向ける。"
translation = "체념한 듯 스스로 옷을 벗어 던진 시안 선배가 나에게 엉덩이를 향한다."

[[dialogue]]
speaker = "unk"
original = "お尻とおま○こ、シアン先輩の恥ずかしい穴が２つとも丸見えだ。"
translation = "엉덩이와 보지, 시안 선배의 부끄러운 구멍이 두 개 다 훤히 보인다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ああ、男女でバディ組むと、こういうことになっちまうから、組ませてもらえなかったんだな……」"
translation = "「아아, 남녀로 버디를 짜면 이런 일이 벌어지니까 안 끼워줬던 거구나……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「今はこんなことしてる場合じゃねえのに……！\u3000いくらラブホだからって、盛るんじゃねえって……手早く済ませてくれよ……？」"
translation = "「지금 이런 거 하고 있을 때가 아닌데……! 아무리 러브호텔이라지만 발정하지 말라고…… 빨리 끝내줘……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういうシアン先輩だって、いやらしい顔になってましたよ」"
translation = "「정작 시안 선배야말로 야한 표정이 되어있었다고요」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「し、仕方ねえだろ……女の生理現象だよ。セックスの生音声なんて聞いてたら、想像しちまうんだよ……」"
translation = "「어, 어쩔 수 없잖아…… 여자의 생리 현상이라고. 섹스 생중계 같은 걸 들으면 상상하게 된단 말이야……」"

[[dialogue]]
speaker = "unk"
original = "割れ目から溢れた愛液が、シアンの股間から太ももにかけて伝っている。おま○こは今にも挿入れてほしそうに、ひくひくとうごめいていた。"
translation = "갈라진 틈에서 흘러나온 애액이 시안의 가랑이에서 허벅지까지 타고 흐르고 있다. 보지는 당장이라도 삽입해 주길 바라는 듯 움찔움찔 꿈틀거렸다."

[[dialogue]]
speaker = "unk"
original = "それは俺も同じだ。はちきれんばかりに勃起していて、今すぐにでもシアンのおま○こをこじ開けたいと疼いている。"
translation = "그건 나도 마찬가지다. 터질 듯이 발기해 있어서 당장에라도 시안의 보지를 비집어 열고 싶어 쑤시고 있었다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ちょ、あんまりじっくり見んな！\u3000やるんなら、とっとと入れろよ……準備、できてっからさ」"
translation = "「잠깐, 너무 빤히 보지 마! 할 거면 얼른 넣어…… 준비됐으니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「初めては、後ろからの方が痛くないって聞いたことあるし……」"
translation = "「처음은 뒤에서 하는 게 덜 아프다고 들은 적 있고……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シアン先輩、初めてなんですか……！？」"
translation = "「시안 선배, 처음이신가요……!?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「そ、そうだよ！\u3000初めてで悪かったな！\u3000任務で恋人作る余裕なんてなかったし……好きでもないヤツに体を許すほどガードも甘くねえし……」"
translation = "「그, 그래! 처음이라서 미안하게 됐네! 임무 때문에 애인 만들 여유 따윈 없었고…… 좋아하지도 않는 녀석에게 몸을 허락할 정도로 가드가 낮지도 않으니까……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「つーか、勘違いしないでほしいんだけどさ……ラブホのエロい雰囲気にあてられたから、なしくずしにあんたとセックスするわけじゃねえんだ」"
translation = "「아니, 착각하지 않았으면 좋겠는데 말이야…… 러브호텔의 에로한 분위기에 휩쓸려서 얼렁뚱땅 너랑 섹스하는 게 아니라고」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え……それってつまり……」"
translation = "「에…… 그 말은 즉……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「他ならぬあんただから、あたしの初めてをあげてもいいって思ったんだぜ……？」"
translation = "「다른 누구도 아닌 너니까 내 처음을 줘도 좋다고 생각한 거라고……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「まさか、あたしの初めてが今晩で、しかも、ラブホの中で……さらには任務中になっちまうだなんて、想像もしてなかったけどさ……」"
translation = "「설마 내 처음이 오늘 밤이고, 그것도 러브호텔 안에서…… 심지어 임무 중에 하게 될 줄은 상상도 못 했지만 말이야……」"

[[dialogue]]
speaker = "unk"
original = "収まりのつかないペニスをシアンの膣口に宛がうと、ちゅくりと湿っぽい音を鳴らした。"
translation = "주체할 수 없는 페니스를 시안의 질구에 갖다 대자 츄르륵 하며 젖은 소리가 울렸다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「お、おい、あんたのち○ぽ、さっきから更に固くなってないか……？\u3000本当にこんなデカいのが入るのか……」"
translation = "「어, 어이, 네 자지 아까보다 더 딱딱해진 거 아냐……? 진짜로 이런 거대한 게 들어가는 거야……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「入るはずだけど……上手くできなかったらすみません」"
translation = "「들어갈 텐데…… 잘 못 하면 죄송해요」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あんまり心配そうに言うなって。あたしならちょっとの痛みは我慢できるからさ」"
translation = "「그렇게 걱정스럽게 말하지 말라고. 나라면 이 정도 통증은 참을 수 있으니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「シようじゃねえか、あたしと初めて同士のセックス」"
translation = "「한번 해보자고, 나랑 처음끼리의 섹스」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んんくぅうぅぅぅぅっ！？」"
translation = "「응윽구우우우우우우욱!?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁはぁあぁぁっ……！\u3000う、うそみてえだっ……あたしのま○こ、すげぇ広がって……めりめり、こじ開けられ……んくっ、んぅふうっ……！」"
translation = "「응아하아아아앗……! 거짓말 같아…… 내 보지, 엄청 벌어져서…… 메리메리 비집어 열리고…… 응윽, 응우우윽……!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あたしの膣内に、あんたが挿入ってくるぅ……くぁっ、あっ、あ、あぅ、ぁ、はぁぁん……！」"
translation = "「내 질 안에 네가 들어와…… 쿠아앗, 앗, 아, 아우, 아, 하아아앙……!」"

[[dialogue]]
speaker = "unk"
original = "ぬるぬるのおま○こに飲み込まれるみたいに、腰を押し進める。想像より浅い膣奥に届くまでは、ほんの数秒だった。"
translation = "미끈미끈한 보지에 집어삼켜지듯 허리를 밀어 넣는다. 상상보다 얕은 질 안쪽에 닿기까지는 불과 몇 초였다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はーっ！\u3000はーっ！\u3000はーっ、はっ、んぁ、はぁあぁっ……あんたのち○ぽ、全部挿入ったんだよな……？\u3000ズウンってお腹が重たくなってる……」"
translation = "「하아ー! 하아ー! 하아ー, 하앗, 응아, 하아아앗…… 네 자지, 전부 들어간 거지……? 즈운 하고 배가 묵직해졌어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すみません、痛かったですか……？」"
translation = "「죄송해요, 아팠나요……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んん……思ってたよか痛くなかった、かな……怪我には慣れっこだから……痛みには強え方だし……」"
translation = "「으응…… 생각했던 것보다는 안 아팠어, 아마도…… 부상은 일상이니까…… 통증엔 강한 편이고……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「それより違和感がすごいよ……自分の中に、他人の体があるのって、ぞくぞく、ぞわぞわする……」"
translation = "「그것보다 위화감이 장난 아냐…… 자신 안에 타인의 몸이 있다는 게, 소름 끼치고, 근질근질해……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あたしの膣内でどくんどくん動いてるんだ……あんたを今までで一番近くに感じてる……この感じは、嫌いじゃないな……」"
translation = "「내 질 안에서 두근두근 움직이고 있어…… 너를 지금까지 중에서 제일 가깝게 느끼고 있어…… 이 느낌, 싫지 않네……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ふふ……息が荒くなってんぞー。ハッハッハッて、あたしよりあんたの方が発情期の犬みたいじゃねえか」"
translation = "「후후…… 숨이 거칠어졌다고ー. 하앗하앗 하며, 나보다 네가 더 발정기 개 같잖아」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「別にイヤじゃねえよ……？\u3000あたしなんかに『女』を感じてくれてるのは、ちょっとだけ嬉しいんだ……ありがとな」"
translation = "「별로 싫지는 않아……? 나 같은 거에게 『여자』를 느껴주는 건 조금 기뻐…… 고마워」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ふぅっ、はぁっ……はっ、はぁっ……！\u3000でもなんか、遠慮してねえか……？」"
translation = "「후우, 하앗…… 하앗, 하아아……! 근데 왠지 사리고 있는 거 아냐……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ちんたらしてたんじゃ気持ちよくなれねえんだろうし……いいよ、好きに動かして。でも、慣れるまではゆっくりだからな……？」"
translation = "「밍기적거려서는 기분 좋아질 수 없을 테고…… 좋아, 마음껏 움직여. 대신 익숙해질 때까지는 천천히다……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぅあっ！？\u3000んっ、んぅ、ひぅ……んっ、んぅぐっ……んっ、んぁ、んっ……んはぁんっ……！」"
translation = "「응우앗!? 응, 응우, 히우…… 응, 응우윽…… 응, 응아, 응…… 응하앙……!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ひぅ、んっ、んぅぐっ……ど、どうだ？\u3000あたしのま○こ、気持ちいいか……？\u3000このまま最後まで……射精できそうか……？」"
translation = "「히우, 응, 응우윽…… 어, 어때? 내 보지, 기분 좋아……? 이대로 마지막까지…… 사정할 수 있을 것 같아……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「いいよ、もっと激しく動いても……思ってたよりは痛くねえから……あたしなら、我慢、できるから……気持ちよくなってくれよ……」"
translation = "「괜찮아, 좀 더 격렬하게 움직여도…… 생각보다는 안 아프니까…… 나니까 참을 수 있으니까…… 기분 좋아져 달라고……」"

[[dialogue]]
speaker = "unk"
original = "どうせなら、俺が射精するまで我慢し続けるのではなく、シアン先輩にも気持ちよくなってほしいんだけど──"
translation = "이왕이면 내가 사정할 때까지 참기만 하는 게 아니라 시안 선배도 기분 좋아졌으면 좋겠는데──"

[[dialogue]]
speaker = "unk"
original = "俺はシアン先輩の膣内を緩やかに突きながら、お尻の上でぱたぱたと羽箒のように動いている尻尾に気づき、指を添えた。"
translation = "나는 시안 선배의 질 안을 완만하게 찌르며 엉덩이 위에서 파닥파닥 깃털 솔처럼 움직이는 꼬리를 발견하고 손가락을 댔다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「きゃふぅんっ！？\u3000おまっ、ちょ、尻尾は、やめろ……！\u3000そこ、すげえ敏感だから、今、触られると──ッ！」"
translation = "「캬퓽!? 너, 잠깐, 꼬리는 하지 마……! 거기 엄청 민감하니까 지금 만져지면── 앗!」"

[[dialogue]]
speaker = "unk"
original = "添えた指を自分のペニスを扱くみたいに上下に動かす。"
translation = "댄 손가락을 자신의 페니스를 훑는 것처럼 상하로 움직인다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んふひぁ！？\u3000尻尾、しごくなぁっ……！\u3000それ、駄目っ……弱いから、付け根、シコシコすんなってぇ……！」"
translation = "「응후히아!? 꼬리 훑지 마아……! 그거 안 돼…… 약하니까 뿌리 부분 시코시코 하지 말라니까아……!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んひぁあぁぁっ！？\u3000ひっ、んぅ、ひぃんっ！\u3000駄目だって、んぁ、あっあぁっ、んひぅいぃぃっ<emoji=heart04>」"
translation = "「응히아아아앗!? 히익, 응우, 히이잉! 안 된대도, 응아, 앗아아앗, 응히우이이잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "猟犬と恐れられているシアン先輩とは思えない、仔犬みたいな可愛い鳴き声。"
translation = "사냥개라고 불리는 시안 선배라고는 생각되지 않는 강아지 같은 귀여운 울음소리."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ま○こと尻尾一緒は、ヤバいって、きも、ぢ、いっ……きもちよく、なっちまう、からぁっ……<emoji=heart04>」"
translation = "「보지랑 꼬리 같이 하는 건 위험해, 기분, 조, 아…… 기분 좋아져버린단 말이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「くそぉ、おまえ、遊んでるだろ……！\u3000あたしのことはいいから、とっととイッちゃえよぉ……！」"
translation = "「젠장, 너 즐기고 있지……! 나는 상관없으니까 얼른 가버리라고오……!」"

[[dialogue]]
speaker = "unk"
original = "込み上げてきた絶頂を逃さないよう、ピストンを加速させる。"
translation = "치밀어 오르는 절정을 놓치지 않도록 피스톤을 가속한다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁっ！？\u3000あっ、あっあっあっああっ！\u3000激しっ、んぁ、すご、頭まで、ち○ぽで貫かれてる、みたいっ……！」"
translation = "「응아앗!? 앗, 앗앗앗아앗! 격해, 응아, 굉장해, 머리까지 자지로 꿰뚫리는 것 같아……!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁ、あっ……ヤバ、これ、マジできもち、いっ……！\u3000スイッチ入っちまうぅ……！」"
translation = "「응아, 앗…… 위험해, 이거 진짜 기분 조, 아……! 스위치 켜져버려어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シーナのおま○こ、すごく気持ちいいよ」"
translation = "「시나의 보지, 정말 기분 좋아」"

[[dialogue]]
speaker = "unk"
original = "その名前を口にした途端、シアン先輩の体がビクンと痙攣した。"
translation = "그 이름을 입에 담은 순간 시안 선배의 몸이 비쿠분 하고 경련했다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「バッ……！？\u3000こういう時に本名呼ぶとか反則だろっ……呼ぶなって言ったろぉ……！？」"
translation = "「바……!? 이럴 때 본명을 부르는 건 반칙이잖아…… 부르지 말라고 했잖아아……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「人前ではね。二人きりならいいでしょ？」"
translation = "「남들 앞에서는요. 둘뿐이라면 괜찮죠?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「～～～ッ！\u3000ホントおまえ、そういうとこだぞっ……！」"
translation = "「~~~앗! 진짜 너, 꼭 그런 식이지……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「シーナの可愛い姿を独占できてすごく嬉しいよ」"
translation = "「시나의 귀여운 모습을 독점할 수 있어서 정말 기뻐요」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ふぁ……あっ、あっ、だから、名前呼ぶなってぇ……<emoji=heart04>\u3000可愛くなんかねえってばぁ……<emoji=heart04>」"
translation = "「화아…… 앗, 앗, 그러니까 이름 부르지 말라니까아……<emoji=heart04> 귀엽지 않다니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はっ、んぁっ！\u3000ああ、もう、年上相手に、調子乗んなよ……くそっ、これでどうだっ……<emoji=heart04>」"
translation = "「하앗, 응아앗! 아아 정말 연상 상대로 까불지 말라고…… 젠장, 이건 어떠냐아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣肉の締めつけが、ギュウっと強まる。まるで搾り取られるような快感にペニスが追い込まれる。"
translation = "질 고기의 조임이 꽈악 하고 강해진다. 마치 짜내지는 듯한 쾌감에 페니스가 몰린다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「くぁっ、ヤバッ……はぁ、んぁあぁぁ……締めるとち○ぽの形、わかりすぎてっ……これ、あたしも感じすぎちまうぅぅっ……<emoji=heart04>」"
translation = "「쿠아앗, 위험해…… 하아, 응아아아…… 조이니까 자지 모양 너무 잘 느껴져서…… 이거 나도 너무 느끼게 돼버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ふぁぁ……んぁっ、きもち、いっ……<emoji=heart04>\u3000ぴったりくっついて……あんたとひとつになってるみたいっ……<emoji=heart04>」"
translation = "「화아아…… 응아앗, 기분 조, 아……<emoji=heart04> 딱 달라붙어서…… 너랑 하나가 된 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁっ！\u3000あっ、あっあっあっああっ！\u3000それきもち、いっ！\u3000好きっ、好きぃっ……！\u3000膣奥っ、ごんごん突かれるのしゅきぃっ<emoji=heart04>」"
translation = "「응아앗! 앗, 앗앗앗아앗! 그거 기분 조, 아! 좋아, 좋아아……! 질 안쪽 곤곤 찔리는 거 죠아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁっ、あんっ！\u3000セックスがこんなに気持ちいいなんて、思ってもなかったっ……んぅ、くっ、んふぅん<emoji=heart04>」"
translation = "「응아앗, 하앙! 섹스가 이렇게 기분 좋은 줄은 몰랐어…… 응으, 윽, 응후운<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁ、あっ、気持ちよすぎて、駄目になっちまう……こんなの覚えちまったら、あんたから離れらんなくなっちまうだろぉ……んもぉ……<emoji=heart04>」"
translation = "「응아, 앗, 기분 좋아서 망가져 버리겠어…… 이런 거 배워버리면 너한테서 못 떨어지게 되어버리잖아…… 정말이지……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺同様、シアン先輩も絶頂が差し迫っているんだろう。ベッドのシーツを掴む手にも力が入り、喘ぎにも今まで聞いたことのない甘さが混ざってきた。"
translation = "나와 마찬가지로 시안 선배도 절정이 임박했겠지. 침대 시트를 움켜쥔 손에도 힘이 들어가고, 신음에도 지금까지 들어본 적 없는 달콤함이 섞여 왔다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ひぃあっ！？\u3000ひぅぐっ！\u3000んぅふっ……だめだって、尻尾シコシコぉ――んぁっ！\u3000ぅんうぅぅんっっ……<emoji=heart04>」"
translation = "「히이앗!? 히우윽! 응으후…… 안 된대도 꼬리 시코시코는── 응아앗! 으응으으응윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ふぁ、あっ、んぁ……イキたい……あんたのち○ぽでイキたい……このままイカせて、くれる……？」"
translation = "「화아, 앗, 응아…… 가고 싶어…… 네 자지로 가고 싶어…… 이대로 가게 해 줄래……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぐぅ！？\u3000ち○ぽ膨らんだっ、も、もしかして、イキそうなのか？\u3000んぁっ、射精、する、のかっ……？」"
translation = "「응구우!? 자지 부풀었어, 호, 혹시 가려는 거야? 응아앗, 사정하는 거야……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「勢いっ全然止まんねえしっ……！\u3000中に出す気満々なのな……んなことしちゃ本当は駄目なんだからなっ……？」"
translation = "「기세가 전혀 안 멈추는데……! 안에 낼 생각 만만이구나…… 이런 짓 하면 원래는 안 되는 건데 말이야……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「仕方ねえから、許してやるけどっ……んぁっ！\u3000あっ、あっ、あっ、あぁあぁぁんっ<emoji=heart04>」"
translation = "「어쩔 수 없으니까 허락해 줄게…… 응아앗! 앗, 앗, 앗, 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ち○ぽっ、このまま、イッて……あたしの膣内でいいっ……精子っ、中に出していいからぁ……<emoji=heart04>」"
translation = "「자지, 이대로 가버려…… 내 질 안이어도 괜찮아…… 정자, 안에 내보내도 좋으니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はぁっ、あたしの膣内が、あんたの精子っ……欲しがっちゃってる……あんただけの特別っ……んぁ、はぁんっ<emoji=heart04>」"
translation = "「하앗, 내 질 안이 네 정자를…… 원하고 있어…… 너만의 특별한…… 응아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぅうぅんっ<emoji=heart04>\u3000はぁ、はっ、きもちいっ、セックスきもぢ、いいっ！\u3000ふぁっ、んぁはあぁああっ<emoji=heart04>」"
translation = "「응으으응<emoji=heart04> 하아, 하앗, 기분 좋아, 섹스 기분 조, 아! 화앗, 응아하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あっ、きゃふぅんっ<emoji=heart04>\u3000出してっ、出してっ……んぅうぅうぅっ！\u3000んはぁああああんっ<emoji=heart04>」"
translation = "「앗, 캬퓽<emoji=heart04> 내보내 줘, 내보내 줘…… 응으으으윽! 응하아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぅぐっ！\u3000ふぁ、あ、あっあっあっあぁっ！\u3000激しっ、んぁああぁっ、イクっ、イっちゃっ、あっ、あぁあぁーっ<emoji=heart04>」"
translation = "「응으윽! 화아, 아, 앗앗앗아앗! 격해, 응아아앗, 가, 가버려, 앗, 아아아아악<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁっ<emoji=heart04>\u3000あ゛っ、んぁはぁあ゛あぁぁっ<emoji=heart04>\u3000イッッックぅうぅうぅうぅぅぅっっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 아으, 응아하아아아아아아아앗<emoji=heart04> 가버어어어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぁあぁっ！？\u3000ふぁっ<emoji=heart04>\u3000あっ、んぁはあぁあぁぁぁぁぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아앗!? 후앗<emoji=heart04> 앗, 응아하아아아아아아아아앙~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口に押し付けた尖端から、勢いよく精液が噴き出す。今までに体験したことのない強烈な絶頂で視界が白に染まる。"
translation = "자궁구에 밀착한 끝부분에서, 기세 좋게 정액이 뿜어져 나온다. 지금까지 체험한 적 없는 강렬한 절정으로 시야가 하얗게 물든다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んぃひっ、イッ、イッてる、イッてるぅうぅっ<emoji=heart04>\u3000はぁっ、んぁっ<emoji=heart04>\u3000知らない、こんなっ、ぁはぁぁんっ<emoji=heart04>」"
translation = "「응이힛, 가, 가고 있어, 가고 있어어어엇<emoji=heart04> 하앗, 응앗<emoji=heart04> 몰라, 이런 거, 아하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「中出ひっ……びゅくっびゅくっって、アッツぅいの……注がれ、はっ、はぁ、きもちいぃっ、ふひぁあぁぁ……<emoji=heart04>」"
translation = "「안에 싸고 히윽…… 뷰큿뷰큿하고, 뜨거어운 게…… 부어지는 거, 하앗, 하아, 기분 좋아아, 후히아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はーっ、はーっ、はーっ<emoji=heart04>\u3000セックスって、こんなすげえのかよぉ……こんなイキ方覚えちまったら、クセになっちまうっへぇ……<emoji=heart04>」"
translation = "「하아—, 하아—, 하아—<emoji=heart04> 섹스라는 거, 이렇게 굉장한 거냐고오…… 이런 가버리는 법을 배워버리면, 버릇이 되어버리겠어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "突っ伏してしまいそうな彼女を両手で掴んで支えながら、とめどなくこみ上げてくる精を子宮へと注ぎ続けた。"
translation = "쓰러져 버릴 듯한 그녀를 양손으로 잡아 지탱하면서, 끝없이 치밀어 오르는 정액을 자궁으로 계속 쏟아부었다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はぁっ、はぁ……はぁーっ、はっ、はぁーっ、ヤバぁ……頭が真っ白だ……気持ちよかったぁ……<emoji=heart04>」"
translation = "「하아, 하아…… 하아—, 하앗, 하아—, 장난 아냐…… 머릿속이 하얘…… 기분 좋았어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「乱れてるシーナ、すごく可愛かったよ」"
translation = "「흐트러진 시나, 정말 귀여웠어.」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「はぁーっ、はぁーっ……だからっ……！\u3000調子に乗んなっての、バカ……次言ったら、怒るからな……？」"
translation = "「하아—, 하아—…… 그러니까……! 우쭐대지 말라니까, 바보…… 다음에 또 말하면, 화낼 거니까……?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「でも……まあ……その、セックス、悪くなかったよ……こんなご褒美がもらえるんなら、あんたと一緒の任務も、悪くな──ッん？」"
translation = "「하지만…… 뭐…… 그, 섹스, 나쁘지 않았어…… 이런 포상을 받을 수 있다면, 너랑 같이 하는 임무도 나쁘지 않──앗?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうしたの？」"
translation = "「왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "絶頂で蕩けていたシアン先輩の視線が鋭さを増した。"
translation = "절정으로 풀려있던 시안 선배의 시선이 날카로움을 더했다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「──悪ぃな、イチャつく時間はここまでだ」"
translation = "「──미안하지만, 꽁냥거리는 시간은 여기까지다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ……？」"
translation = "「엣……?」"

[[dialogue]]
speaker = "unk"
original = "シロップのように甘かったシアンの声色は、突如ブラックコーヒーのような苦みを含んだものへと切り替わる。"
translation = "시럽처럼 달콤했던 시안의 목소리는, 갑자기 블랙커피 같은 쓴맛을 머금은 목소리로 바뀐다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「奴さんらも、ようやく終わったらしい。捕らえるぞ」"
translation = "「그놈들도, 드디어 끝난 모양이군. 붙잡겠다.」"

[[dialogue]]
speaker = "unk"
original = "数瞬前まで脱力して突っ伏していたシアンは、速やかにベッドから跳ね起きる。"
translation = "방금 전까지 기운이 빠져 엎드려 있던 시안은, 신속하게 침대에서 뛰어 일어난다."

[[dialogue]]
speaker = "unk"
original = "まばたきするよりも早く着替えると、開け放った窓伝いに隣の部屋へと侵入。あっという間の逮捕劇だった。"
translation = "눈을 깜빡이는 것보다 빠르게 옷을 갈아입더니, 열어젖힌 창문을 통해 옆방으로 침입. 순식간에 벌어진 체포극이었다."

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「簡単な任務だったのに、とんでもねえことになっちまった……忘れらんねえ一夜だったよ、ったく……」"
translation = "「간단한 임무였는데, 엄청난 일이 되어버렸군…… 잊을 수 없는 하룻밤이었어, 정말이지……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ま、次も一緒になれるのを楽しみにしておくよ<emoji=heart04>」"
translation = "「뭐, 다음에도 같이 할 수 있기를 기대하고 있을게<emoji=heart04>」"

