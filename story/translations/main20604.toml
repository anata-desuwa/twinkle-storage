[[dialogue]]
speaker = "unk"
original = "第４話,力の代償,B"
translation = "제4화, 힘의 대가, B"

[[dialogue]]
speaker = "ヴィーナス"
original = "「外さないわよ！」"
translation = "「놓치지 않아!」"

[[dialogue]]
speaker = "unk"
original = "巨大モンスターすら呑み込む極大の光条がルヴィネを襲う。"
translation = "거대 몬스터조차 집어삼키는 극대의 광조가 루비네를 덮친다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「その程度？」"
translation = "「그 정도야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んなっ……！」"
translation = "「뭐랏……!」"

[[dialogue]]
speaker = "unk"
original = "けれどルヴィネにはダメージがなく、極星の制服も汚れひとつない。"
translation = "하지만 루비네에게는 대미지가 없고, 극성의 제복도 먼지 하나 묻지 않았다."

[[dialogue]]
speaker = "unk"
original = "さっきから俺たちの攻撃がまるっきり通用していなかった。"
translation = "방금 전부터 우리의 공격이 전혀 통하지 않고 있었다."

[[dialogue]]
speaker = "unk"
original = "それでも今は間髪入れず攻撃を叩き込む……！"
translation = "그래도 지금은 쉴 새 없이 공격을 퍼붓는다……!"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス！」"
translation = "「비너스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、頼んだわよ、クロト！」"
translation = "「응, 부탁해, 쿠로토!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスから受け取った光を拳に宿し、ルヴィネに突進する──！"
translation = "비너스에게서 받은 빛을 주먹에 싣고, 루비네에게 돌진한다──!"

[[dialogue]]
speaker = "クロト"
original = "「カオステンペスト──！！」"
translation = "「카오스 템페스트──!!」"

[[dialogue]]
speaker = "unk"
original = "拳に乗せた星力を至近距離で炸裂させ、嵐のような爆発が巻き起こる。"
translation = "주먹에 실린 성력을 지근거리에서 작렬시켜, 폭풍 같은 폭발이 일어난다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「消えなさい」"
translation = "「사라지렴.」"

[[dialogue]]
speaker = "クロト"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの掌から鮮烈な光が放たれ、肉薄していた俺を吹き飛ばす。"
translation = "루비네의 손바닥에서 강렬한 빛이 뿜어져 나와, 육박하던 나를 날려버린다."

[[dialogue]]
speaker = "クロト"
original = "「がっ……！？」"
translation = "「커헉……!?」"

[[dialogue]]
speaker = "unk"
original = "拳が届く距離まで接近していた俺が回避できるわけもなく、閃光を浴びて地面に打ち付けられた。"
translation = "주먹이 닿는 거리까지 접근했던 내가 회피할 수 있을 리 없었고, 섬광을 뒤집어쓰며 지면에 내동댕이쳐졌다."

[[dialogue]]
speaker = "unk"
original = "さらにルヴィネのマントが白い光を宿して──"
translation = "게다가 루비네의 망토가 하얀 빛을 띠며──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「裁きを下すわ」"
translation = "「심판을 내리겠어.」"

[[dialogue]]
speaker = "クロト"
original = "「ぐあああぁああっ！！？」"
translation = "「끄아아아아악!!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「きゃあああぁあっ！？」"
translation = "「꺄아아아악!?」"

[[dialogue]]
speaker = "unk"
original = "神々しさすら覚える光の爆撃が、俺たちを容赦なく打ちのめす。"
translation = "신성함마저 느껴지는 빛의 폭격이 우리를 가차 없이 몰아붙인다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ……はぁはぁ……今の、なんなの……」"
translation = "「윽…… 하아 하아…… 방금 그건 뭐야……」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……はぁ……」"
translation = "「큭…… 하아……」"

[[dialogue]]
speaker = "unk"
original = "魔王の力が万全に使えないとはいえ、ルヴィネの力がここまでとは思わなかった。"
translation = "마왕의 힘을 온전히 쓸 수 없다고는 해도, 루비네의 힘이 이 정도일 줄은 몰랐다."

[[dialogue]]
speaker = "unk"
original = "チナも強敵ではあったが、会長であるルヴィネとは比較にもならない。"
translation = "치나도 강적이었지만, 회장인 루비네와는 비교조차 되지 않는다."

[[dialogue]]
speaker = "クロト"
original = "（だけどルヴィネは何者なんだ……？）"
translation = "(하지만 루비네는 정체가 뭐지……?)"

[[dialogue]]
speaker = "クロト"
original = "（世界を救った英雄と呼ばれ、魔王でもなく、リクリエの使徒でもなく、単身でここまでの力を持つ……）"
translation = "(세계를 구한 영웅이라 불리며, 마왕도 아니고, 리크리에의 사도도 아니면서 단신으로 이 정도의 힘을 가지다니……)"

[[dialogue]]
speaker = "クロト"
original = "（しかも彼女は変身すらしていない。ルヴィネは本当に星騎士なのか……？）"
translation = "(게다가 그녀는 변신조차 하지 않았어. 루비네는 정말 성기사인 건가……?)"

[[dialogue]]
speaker = "ルヴィネ"
original = "「緋宮クロトは魔王の力を十全に使えない……チナが言っていた通りね。やはりあの子は優秀だわ」"
translation = "「히노미야 쿠로토는 마왕의 힘을 온전히 쓰지 못해…… 치나가 말한 대로네. 역시 그 아이는 우수해.」"

[[dialogue]]
speaker = "クロト"
original = "「それでも──！」"
translation = "「그래도──!」"

[[dialogue]]
speaker = "unk"
original = "チナとの戦いと同じように、己の中で暴れる<ruby>破滅<rt>リクリエ</rt></ruby>の力を解き放つ。"
translation = "치나와의 싸움 때와 마찬가지로, 자신 안에서 날뛰는 <ruby>파멸<rt>리크리에</rt></ruby>의 힘을 해방한다."

[[dialogue]]
speaker = "unk"
original = "俺を食い破らんと内側から牙を突き立てる毒蛇を、拳に宿す──！"
translation = "나를 집어삼키려 안쪽에서 송곳니를 박아넣는 독사를 주먹에 깃들인다──!"

[[dialogue]]
speaker = "クロト"
original = "「デッドリー……クラスターーーッ！！！」"
translation = "「데들리…… 클러스터어어어!!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネにようやく攻撃が届いた──"
translation = "루비네에게 드디어 공격이 닿았다──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「まだ動けたとは驚きね。しぶとさも魔王の才能なのかしら」"
translation = "「아직 움직일 수 있다니 놀랍네. 끈질긴 것도 마왕의 재능인 걸까.」"

[[dialogue]]
speaker = "unk"
original = "そう思ったのも束の間、ルヴィネは冷静な表情を取り戻し、マントを盾にして拳を受け止めていた。"
translation = "그렇게 생각한 것도 잠시, 루비네는 냉정한 표정을 되찾고 망토를 방패 삼아 주먹을 받아내고 있었다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「肉体の中に封じたリクリエを、自分の力にして技を繰り出す。……無茶をしたものね。チナにもそれで勝ったのかしら」"
translation = "「육체 안에 봉인한 리크리에를 자신의 힘으로 삼아 기술을 내보내다니. ……무모한 짓을 했네. 치나에게도 그걸로 이긴 걸까.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でも苦しみたくないなら、あまりやらない方がいいわ」"
translation = "「하지만 고통받고 싶지 않다면, 너무 하지 않는 게 좋아.」"

[[dialogue]]
speaker = "クロト"
original = "「何……？」"
translation = "「뭐……?」"

[[dialogue]]
speaker = "unk"
original = "戦場に場違いな、俺を気遣う言葉。"
translation = "전장에는 어울리지 않는, 나를 걱정하는 말."

[[dialogue]]
speaker = "unk"
original = "次の瞬間──"
translation = "다음 순간──"

[[dialogue]]
speaker = "クロト"
original = "「……ッ！？」"
translation = "「……윽!?」"

[[dialogue]]
speaker = "unk"
original = "痛い。痛い。痛い。"
translation = "아프다. 아프다. 아프다."

[[dialogue]]
speaker = "unk"
original = "体を巡る血が焼けるように熱い。"
translation = "몸을 도는 피가 타는 듯이 뜨겁다."

[[dialogue]]
speaker = "unk"
original = "全身の神経に針を突き立てられたように、気の触れそうな痛みが絶え間なく襲ってくる。"
translation = "전신의 신경에 바늘을 찔러넣은 것처럼, 미쳐버릴 것 같은 통증이 끊임없이 습격해 온다."

[[dialogue]]
speaker = "クロト"
original = "「アッ……ガッ……アアアアッ！」"
translation = "「아윽…… 컥…… 아아아아악!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト！？\u3000大丈夫！？\u3000しっかりして！？」"
translation = "「쿠로토!? 괜찮아!? 정신 차려!?」"

[[dialogue]]
speaker = "unk"
original = "あまりの激痛に、獣じみた叫びを上げてのたうち回る。"
translation = "엄청난 격통에 짐승 같은 비명을 지르며 몸부림친다."

[[dialogue]]
speaker = "unk"
original = "敵の前で情けない──なんて考える余裕もなく、ただ悶えることしかできない。"
translation = "적 앞에서 한심하게── 같은 걸 생각할 여유도 없이, 그저 괴로워할 수밖에 없다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「リクリエなんかに頼って、何の代償もないと思った？\u3000魔王とはいえ、世界を滅ぼす力を自分の中で飼おうとすれば、それくらい当然よ」"
translation = "「리크리에 따위에 의지하고서 아무런 대가도 없을 줄 알았어? 마왕이라 해도 세계를 멸망시킬 힘을 자신 안에서 기르려 한다면 그 정도는 당연해.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが憐れむような視線で、這いつくばる俺を見下ろす。"
translation = "루비네가 가엾게 여기는 듯한 시선으로 기어 다니는 나를 내려다본다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「もう苦しまなくていいわ。楽になりなさい」"
translation = "「이제 고통받지 않아도 돼. 편해지렴.」"

[[dialogue]]
speaker = "unk"
original = "そして慈悲の光が俺を包み込んで──"
translation = "그리고 자비의 빛이 나를 감싸 안으며──"

[[dialogue]]
speaker = "unk"
original = "クロトたちがルヴィネと戦っている間、デネブの広場でも戦闘が起きていた。"
translation = "쿠로토 일행이 루비네와 싸우는 동안, 데네브의 광장에서도 전투가 벌어지고 있었다."

[[dialogue]]
speaker = "unk"
original = "極星従騎が蹄で宙を蹴り、フィオナに襲いかかる。"
translation = "극성종기가 발굽으로 허공을 차며 피오나에게 달려든다."

[[dialogue]]
speaker = "スレイプニル"
original = "「ヒィン……！」"
translation = "「히잉……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「目を覚ましたら見知らぬ場所にいましたが、ここはおそらくデネブの流星市国……つまり敵地」"
translation = "「눈을 뜨니 낯선 곳에 있었습니다만, 여기는 아마 데네브의 유성시국…… 즉 적지.」"

[[dialogue]]
speaker = "フィオナ"
original = "「迷い込んだアルタイルの星騎士は抹殺する……というわけですね」"
translation = "「길을 잃고 들어온 알타이르의 성기사는 말살한다……는 거군요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが、ここで倒れるわけにはいきません。──アストラルエッジ！」"
translation = "「하지만 여기서 쓰러질 수는 없습니다. ──아스트랄 에지!」"

[[dialogue]]
speaker = "unk"
original = "フィオナが召喚した剣の雨が降り注ぎ、四方八方から貫かれた極星従騎が消滅した。"
translation = "피오나가 소환한 검의 비가 쏟아지고, 사방팔방에서 꿰뚫린 극성종기가 소멸했다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "unk"
original = "極星従騎の数は増え続け、フィオナを圧殺せんと包囲する。"
translation = "극성종기의 수는 계속 늘어나, 피오나를 압살하려는 듯 포위한다."

[[dialogue]]
speaker = "フィオナ"
original = "「くっ……！\u3000魔王の力が使えれば……」"
translation = "「큭……! 마왕의 힘을 쓸 수 있다면……」"

[[dialogue]]
speaker = "unk"
original = "フィオナが手に入れたアルケインコード──アルケインソーラーブレイズは魔王因子を強く活性化させる。"
translation = "피오나가 손에 넣은 아르케인 코드── 아르케인 솔라 블레이즈는 마왕 인자를 강하게 활성화시킨다."

[[dialogue]]
speaker = "unk"
original = "魔王化によって強力無比な力を発揮できる反面、使用後は一時的に魔王因子が機能しなくなる欠点を持っていた。"
translation = "마왕화를 통해 강력무비한 힘을 발휘할 수 있는 반면, 사용 후에는 일시적으로 마왕 인자가 기능하지 않게 되는 단점을 가지고 있었다."

[[dialogue]]
speaker = "unk"
original = "つまり今のフィオナは魔王ではなく、ただの１人の星騎士に過ぎない。"
translation = "즉 지금의 피오나는 마왕이 아니라, 그저 한 명의 성기사에 불과하다."

[[dialogue]]
speaker = "unk"
original = "星徒会長は学園最強の星騎士とはいえ、戦力で圧倒されているのは明らかだった。"
translation = "성도회장은 학원 최강의 성기사라고는 하지만, 전력에서 압도당하고 있는 것은 분명했다."

[[dialogue]]
speaker = "フィオナ"
original = "「それでも……私は負けません！\u3000プロミネンスフォース！」"
translation = "「그래도…… 저는 지지 않습니다! 프로미넌스 포스!」"

[[dialogue]]
speaker = "unk"
original = "フィオナが星術を唱えると、虚空から光でできた剣や槍、矢が無数に呼び出される。"
translation = "피오나가 성술을 외우자, 허공에서 빛으로 된 검과 창, 화살이 무수히 소환된다."

[[dialogue]]
speaker = "unk"
original = "元よりフィオナの得意とする星術は召喚。劣勢といえど、多数を相手にするには適した星術だ。"
translation = "본래 피오나가 특기로 하는 성술은 소환. 열세라고는 해도 다수를 상대하기에는 적합한 성술이다."

[[dialogue]]
speaker = "フィオナ"
original = "（必ず戻りますから……姉さん！）"
translation = "(반드시 돌아갈 테니까요…… 언니!)"

[[dialogue]]
speaker = "unk"
original = "デネブに飛ばされる前に再会した姉の顔が思い浮かぶ。魔界から帰ってからまだろくに話せていない。"
translation = "데네브로 날려지기 전에 재회한 언니의 얼굴이 떠오른다. 마계에서 돌아온 뒤로 아직 제대로 대화도 나누지 못했다."

[[dialogue]]
speaker = "unk"
original = "それに自分たちが憧れるヒーローなら、最後の最後まで諦めはしない……そう思って自分を奮い立たせる。"
translation = "게다가 자신들이 동경하는 히어로라면 마지막까지 포기하지 않을 것…… 그렇게 생각하며 자신을 북돋운다."

[[dialogue]]
speaker = "ホルン"
original = "「クルルルーーッ！」"
translation = "「쿠루루루!」"

[[dialogue]]
speaker = "フィオナ"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "しかし剣と槍の防壁の隙間を突き破り、背後から極星従騎が突進する──！"
translation = "하지만 검과 창의 방벽 틈새를 뚫고, 뒤편에서 극성종기가 돌진한다──!"

[[dialogue]]
speaker = "ナターシャ"
original = "「や、こんにちは。あなた、流星学園のフィオナ会長だよね？」"
translation = "「야, 안녕. 당신, 유성학원의 피오나 회장이지?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私は散乃ナターシャ。新星学園の選挙管理員員会で、魔王を監視する聖庭園のエージェントだよ」"
translation = "「나는 치루노 나타샤. 신성학원의 선거관리위원회에서 마왕을 감시하는 성정원의 에이전트야.」"

[[dialogue]]
speaker = "フィオナ"
original = "「助けていただいてありがとうございます。あなたは味方……なんですよね？」"
translation = "「구해주셔서 감사합니다. 당신은 아군……인 거죠?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「まぁね。同じアルタイルの星騎士同士、頑張って生き残ろうよ」"
translation = "「뭐, 그렇지. 같은 알타이르의 성기사끼리 열심히 살아남아 보자고.」"

[[dialogue]]
speaker = "unk"
original = "背中合わせに極星従騎と対峙するフィオナとナターシャ。"
translation = "등을 맞대고 극성종기와 대치하는 피오나와 나타샤."

[[dialogue]]
speaker = "unk"
original = "だが包囲網はさらに狭まっており、今まさに極星従騎が殺到しようとしている。"
translation = "하지만 포위망은 더욱 좁혀지고 있으며, 지금 막 극성종기가 쇄도하려 하고 있다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、こっちが２人になっても不利なのは変わらないんだけどね。魔王の力でドカーンってやっつけられないの？」"
translation = "「뭐, 이쪽이 두 명이 돼도 불리한 건 변함없지만 말이야. 마왕의 힘으로 콰광─ 하고 해치울 수 없어?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ごめんなさい。アルケインコードの反動で、今は魔王の力が使えないんです……」"
translation = "「죄송합니다. 아르케인 코드의 반동으로 지금은 마왕의 힘을 쓸 수 없어요……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あらら。マジでピンチじゃん」"
translation = "「어라라. 진짜 위기잖아.」"

[[dialogue]]
speaker = "ホルン"
original = "「クルルーッ！」"
translation = "「쿠루루!」"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルルル……！」"
translation = "「부르르르……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「えーっと……敵の数が１……１０……ダメだ、数えられないね。絶体絶命かも？」"
translation = "「어디 보자…… 적의 숫자가 1…… 10…… 안 되겠다, 셀 수가 없네. 절체절명일지도?」"

[[dialogue]]
speaker = "unk"
original = "周囲を取り囲む極星従騎の数は、ゆうに１００体を超える。"
translation = "주위를 둘러싼 극성종기의 수는 족히 100마리를 넘는다."

[[dialogue]]
speaker = "unk"
original = "そして極星従騎が一斉に攻撃態勢に入り──"
translation = "그리고 극성종기가 일제히 공격 태세에 들어가고──"

[[dialogue]]
speaker = "フィオナ"
original = "「ッ──！？」"
translation = "「윽──!?」"

[[dialogue]]
speaker = "unk"
original = "フィオナたちに攻撃が届く寸前、何者かの斬撃が極星従騎の群れを切り裂く。"
translation = "피오나 일행에게 공격이 닿기 직전, 누군가의 참격이 극성종기의 무리를 베어 가른다."

[[dialogue]]
speaker = "unk"
original = "閃光が晴れると、敵の影はひとつ残らず消えていた。"
translation = "섬광이 걷히자 적의 그림자는 하나도 남김없이 사라져 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「おやまた増援？」"
translation = "「어라, 또 증원?」"

[[dialogue]]
speaker = "フィオナ"
original = "「──！？\u3000あなたは──」"
translation = "「──!? 당신은──」"

