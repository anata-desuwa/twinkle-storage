[[dialogue]]
speaker = "unk"
original = "翌日。その日も、空き教室でブレスレット作りを進めていたのだが――"
translation = "다음 날. 그날도 빈 교실에서 팔찌 만들기를 진행하고 있었는데――"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――クリスマスソング？」"
translation = "「――크리스마스 송?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん、そうなんだ。実は悩んでて……」"
translation = "「응, 맞아. 실은 고민이라서……」"

[[dialogue]]
speaker = "unk"
original = "作業中の雑談で、ルルカが最近悩んでいることを口にした。"
translation = "작업 중 잡담에서 루루카가 최근 고민하고 있는 것을 입에 담았다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「Ｖチューバ―として、クリスマスに新曲を配信する予定があるんだけど、今回は自分で作詞に挑戦しようと思ってるんだ」"
translation = "「VTuber로서 크리스마스에 신곡을 방송할 예정인데, 이번에는 직접 작사에 도전해 보려고 하거든.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「自分で作詞を？\u3000それはすごいですねっ」"
translation = "「직접 작사를요? 그거 대단하네요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あはは、上手く行けばねぇ～……」"
translation = "「아하하, 잘 되면 말이지~……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「曲の方はもうプロの作曲家さんに作って貰ってて、既に完成してるんだ。でも、作詞の方は上手く行ってなくて……」"
translation = "「곡 쪽은 이미 프로 작곡가분이 만들어 주셔서 벌써 완성됐어. 하지만 작사 쪽이 잘 안 풀려서……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「クリスマスまで時間も近づいて来てるし、どうしたもんかなって……」"
translation = "「크리스마스까지 시간도 다가오고 있는데 어쩌면 좋을지……」"

[[dialogue]]
speaker = "unk"
original = "どんな曲なんだ？"
translation = "어떤 곡인데?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっとね、クリスマスといえばってことで、恋人とのラブソングにしてみたんだ！」"
translation = "「그게 말이야, 크리스마스 하면 떠오르는 연인과의 러브송으로 해봤어!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ら、ラブソングですか？」"
translation = "「러, 러브송인가요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん。あたしのお母さんが昔、アイドルをしてた頃の有名な曲で、クリスマスのラブソングがあるの。それを目指して、作ろうとしてるんだけど……」"
translation = "「응. 우리 엄마가 예전에 아이돌을 하던 시절의 유명한 곡 중에 크리스마스 러브송이 있거든. 그걸 목표로 만들려고 하는데……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「え？\u3000ルルカちゃんのお母さんって、アイドルをやっていたんですか……！？」"
translation = "「에? 루루카 짱의 어머님이 아이돌을 하셨던 건가요……!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん、そうなの！\u3000あたしのお母さん、昔、『<ruby>汐凪<rt>しおなぎ</rt></ruby>シャルル』って芸名で活動してたんだ。魔界出身のアイドルってことで注目を浴びて、当時は結構有名な――」"
translation = "「응, 맞아! 우리 엄마 예전에 『시오나기 샤를』이라는 예명으로 활동했었어. 마계 출신 아이돌로 주목을 받아서 당시엔 꽤 유명한――」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「汐凪シャルル！？\u3000それって、歴代ヒットチャートの話では必ず名前が上がる、とっても有名なアイドルじゃないですか……！」"
translation = "「시오나기 샤를!? 그거 역대 히트 차트 이야기에서는 반드시 이름이 오르는 엄청 유명한 아이돌 아니에요……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え、えへへ♪\u3000友達の口から、お母さんがそんな風に言われてるのを聞くと、やっぱ照れ臭くなっちゃうね……♪」"
translation = "「에, 에헤헤♪ 친구 입에서 엄마가 그런 식으로 불리는 걸 들으니 역시 쑥스럽네……♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ルルカのママ、そんなに有名なヒトだったのね。わたくし、興味が湧いてきたわ。今度是非、会ってみたいわ」"
translation = "「루루카의 마마, 그렇게 유명한 사람이었군요. 저, 흥미가 생겼어요. 다음에 꼭 한번 만나보고 싶네요.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん、全然いいよ～♪\u3000あたし、流星市国の実家暮らしだから、なんなら今日の帰りとか寄ってく？\u3000お母さんにも、お兄ちゃんや２人の話はしてるから、喜ぶと思うし」"
translation = "「응, 당연히 괜찮지~♪ 나, 유성시국 본가에서 사니까 정 그러면 오늘 돌아가는 길에 들를래? 엄마한테도 오빠나 두 사람 이야기는 해뒀으니까 기뻐하실 거야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「今日の帰りにも、新しいママに会える！？」"
translation = "「오늘 돌아가는 길에 새로운 마마를 만날 수 있다고요!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「そういうことなら、居ても立ってもいられないわ！\u3000今すぐ行きましょう！\u3000そうしましょう！」"
translation = "「그렇게 된 거라면 가만히 있을 수 없죠! 당장 가요! 그렇게 해요!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、早い早い！\n作業が終わるまで我慢して！"
translation = "잠깐, 너무 빨라! 작업이 끝날 때까지 참아!"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「何を言ってるの、会長！\u3000そんな魅惑のママの話を聞いて、別のことに集中するなんて失礼はできないわ！」"
translation = "「무슨 소리를 하는 거예요, 회장님! 그런 매혹적인 마마의 이야기를 듣고 다른 일에 집중하다니 실례라고요!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「手作りプレゼントも、ちゃんとメリークリスマスの気持ちを込めなければいけないの。煩悩を貯め込んだままではいけないわ」"
translation = "「수제 선물도 제대로 메리 크리스마스의 마음을 담아야 해요. 번뇌를 쌓아둔 채로는 안 된다고요.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だったら、新しいママに会って思う存分甘えた後、翌日集中する方が効率的というものよ！」"
translation = "「그렇다면 새로운 마마를 만나 마음껏 어리광을 부린 뒤, 다음 날 집중하는 편이 효율적이라는 거죠!」"

[[dialogue]]
speaker = "unk"
original = "相変わらず、清々しいほどに煩悩が駄々洩れだ……！"
translation = "여전하네, 상쾌할 정도로 번뇌가 줄줄 새고 있어……!"

[[dialogue]]
speaker = "unk"
original = "その後、結局作業を早めに切り上げることとなり、俺たちはルルカの自宅へお邪魔することになった。"
translation = "그 후 결국 작업을 일찍 정리하게 되었고, 우리들은 루루카의 자택에 방문하게 되었다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そう言えば、ご実家は流星市国なんですね。シャルルさんは引退する時、魔界の地元に帰ったと報道されてましたが……」"
translation = "「그러고 보니 본가가 유성시국이시군요. 샤를 씨는 은퇴할 때 마계의 고향으로 돌아갔다고 보도되었는데……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あはは……。あたしもお母さんと同じ地元の生まれなんだけど、留学が決まった時に『だったら家族みんなで人間界に行こう！』って話になっちゃって」"
translation = "「아하하……. 나도 엄마랑 같은 고향 출생이긴 한데, 유학이 결정됐을 때 『그럼 가족 다 같이 인간계로 가자!』라는 이야기가 되어버려서.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ふふっ♪\u3000家族仲がいいんですね。素敵なことだと思います」"
translation = "「후훗♪ 가족 사이가 좋으시네요. 멋진 일이라고 생각해요.」"

[[dialogue]]
speaker = "unk"
original = "そんな海野辺家の事情を聞かせてもらっているうちに、ルルカの家に到着するのだった。"
translation = "그런 우미노베 가의 사정을 듣고 있는 사이에 루루카의 집에 도착했다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お母さん、ただいま～！\u3000ＤＩＳＣのチャットで送った通り、３人を連れて来たよ～」"
translation = "「엄마, 다녀왔어~! DISC 채팅으로 보낸 대로 세 사람 데려왔어~」"

[[dialogue]]
speaker_original = "ルルカ母"
speaker_translation = "루루카 엄마"
original = "「は～い♪\u3000会長くん、セッシーちゃん、フニちゃん、いらっしゃ～い♪」"
translation = "「왔니~♪ 회장군, 세시 짱, 후니 짱, 어서 오렴~♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「な、なまらすごい……！\u3000本物の、汐凪シャルルさんです！\u3000昔と全然容姿が変わってなくて、すごく綺麗……！」"
translation = "「정, 정말 엄청나……! 진짜 시오나기 샤를 씨예요! 예전이랑 전혀 외모가 변하지 않으셔서 무척 아름다우세요……!」"

[[dialogue]]
speaker_original = "ルルカ母"
speaker_translation = "루루카 엄마"
original = "「ふふっ、あなたがフニちゃんね？\u3000ありがと～♪\u3000噂の元アイドルなルルカちゃんのママ、『海野辺シャルル』で～す♪\u3000ぶいぶいっ☆」"
translation = "「후훗, 네가 후니 짱이니? 고마워~♪ 소문의 전직 아이돌인 루루카 짱의 엄마, 『우미노베 샤를』이에요~♪ 브이 브이☆」"

[[dialogue]]
speaker_original = "ルルカ母"
speaker_translation = "루루카 엄마"
original = "「それで、あなたがセッシーちゃんかしら？」"
translation = "「그리고 네가 세시 짱이니?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……マ」"
translation = "「……마.」"

[[dialogue]]
speaker_original = "ルルカ母"
speaker_translation = "루루카 엄마"
original = "「うん？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ママぁぁぁーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「마마아아아아아ーーーーーーーーー앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ母"
speaker_translation = "루루카 엄마"
original = "「あらあら♪\u3000は～い<emoji=heart04>\u3000ママですよ～♪」"
translation = "「어머 어머♪ 그래~<emoji=heart04> 마마란다~♪」"

[[dialogue]]
speaker = "unk"
original = "どうやら見事にクリティカルヒットしたらしいセシアは、その後、思う存分ルルカのお母さんに甘えるのであった――"
translation = "아무래도 훌륭하게 크리티컬 히트한 모양인 세시아는 그 후 마음껏 루루카의 어머니에게 어리광을 부리는 것이었다――"

