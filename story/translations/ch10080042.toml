[[dialogue]]
speaker = "unk"
original = "第２話,和菓子は１日にして成らず,P"
translation = "제2화, 화과자는 하루아침에 이루어지지 않는다, P"

[[dialogue]]
speaker = "unk"
original = "最近、アナが何やら俺に秘密で怪しい研究に取り組んでいると聞いて、俺はこっそり調査を行っていた。"
translation = "최근, 아나가 무언가 나에게 비밀로 수상한 연구에 몰두하고 있다는 소문을 듣고, 나는 몰래 조사를 하고 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふっふっふ、ついに完成しました……！」"
translation = "「훗훗훗, 드디어 완성했습니다……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おぉ～。この短期間でよくぞここまで……やはりアナさんは、研究者としても抜きん出た才能がありますね～」"
translation = "「오오~. 이 단기간에 여기까지 해내다니…… 역시 아나 씨는 연구자로서도 뛰어난 재능이 있네요~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ。トレジアンナさんやアニマ先輩に比べれば、まだまだです」"
translation = "「아니요. 트레지아나 씨나 아니마 선배에 비하면 아직 멀었습니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そんなことありませんよ～。アナさんはまだ１年生で、入学するまではずっと天界に居たんでしょう？\u3000それでこの技術力……末恐ろしい天才と言わざるを得ませんね！」"
translation = "「그렇지 않아요~. 아나 씨는 아직 1학년이고, 입학하기 전까지는 계속 천계에 있었잖아요? 그런데 이 기술력이라니…… 정말 무서운 천재라고 하지 않을 수 없네요!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ありがとうございます。とりあえずこれで、私が手がけた『マジックアイテム』１号の完成です」"
translation = "「감사합니다. 일단 이것으로, 제가 직접 만든 『매직 아이템』 1호의 완성입니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おめでとうございます～♪\u3000それとどうやら、いいタイミングで来てくれたみたいですね」"
translation = "「축하드려요~♪ 그리고 아무래도, 좋은 타이밍에 와준 것 같네요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さ～ん、別に隠れてなくても大丈夫ですよ～？」"
translation = "「회장님~, 굳이 숨어 있지 않아도 괜찮아요~?」"

[[dialogue]]
speaker = "unk"
original = "やっぱり、バレてたか……"
translation = "역시 들켰나……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふっ、私には探知魔法がありますので♪\u3000恋人のアナさんが何をしているのか、気になって様子を伺っていた、ってところですかね？」"
translation = "「후훗, 저에게는 탐지 마법이 있으니까요♪ 연인인 아나 씨가 무엇을 하고 있는지 궁금해서 상황을 살피고 있었다, 라는 걸까요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど。会長には完成してから見せて驚かせようと思っていたのですが、余計な心配をおかけしてしまったようですね」"
translation = "「그렇군요. 회장님께는 완성된 후에 보여드려 놀라게 해드리려 했습니다만, 괜한 걱정을 끼쳐드린 모양이네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、ノープロブレムです。私は星徒会では副会長として、私生活では恋人として会長を支えるパートナー」"
translation = "「하지만 노 프로블럼입니다. 저는 성도회에서는 부회장으로서, 사생활에서는 연인으로서 회장님을 지탱하는 파트너」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長の信頼を裏切るような浮気など絶対にしません。ＤＩＳＣのＧＰＳ機能を使ってもらっても構いませんよ」"
translation = "「회장님의 신뢰를 저버리는 바람기 같은 건 절대로 부리지 않습니다. DISC의 GPS 기능을 사용하셔도 상관없어요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むしろ常に会長に監視されていることで、私は恋人として安心できます。せっかくですから、今回の失敗を踏まえて、アプリを入れておきましょうか」"
translation = "「오히려 항상 회장님께 감시당함으로써, 저는 연인으로서 안심할 수 있습니다. 이왕 이렇게 된 거, 이번 실수를 교훈 삼아 앱을 깔아둘까요」"

[[dialogue]]
speaker = "unk"
original = "いやいや、そこまでは大丈夫だから！"
translation = "아니 아니, 그 정도까지는 괜찮으니까!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですか？\u3000私としては、より私のことを知ってもらえるなら、一向にノープロブレムなのですが……」"
translation = "「그렇습니까? 저로서는 저에 대해 더 많이 알아주신다면 전혀 노 프로블럼입니다만……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いや～、アナさん、意外と恋人にはゾッコンタイプだったんですね～♪」"
translation = "「이야~, 아나 씨, 의외로 연인에게는 푹 빠지는 타입이었네요~♪」"

[[dialogue]]
speaker = "unk"
original = "俺だってアナにゾッコンですよ！"
translation = "나도 아나에게 푹 빠져 있다고요!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「コホン。そ、そういう恥ずかしいことで張り合わないでいいです……」"
translation = "「코흠. 그, 그런 부끄러운 일로 경쟁하지 않아도 됩니다……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それよりも会長、見て下さい。これがトレジアンナさんから魔法技術を学んで作り上げた試作マジックアイテム――その名も『和菓子プリンター』です」"
translation = "「그보다 회장님, 봐주세요. 이것이 트레지아나 씨로부터 마법 기술을 배워서 만들어낸 시제 매직 아이템―― 그 이름도 『화과자 프린터』입니다」"

[[dialogue]]
speaker = "unk"
original = "アナが見せてきたそれは、いわゆる『３Ｄプリンター』と言われる機械によく似ていた。"
translation = "아나가 보여준 그것은, 이른바 『3D 프린터』라고 불리는 기계와 매우 닮아 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この和菓子プリンターは、私の思考をサンプリングして作ったＡＩが組み込まれており、材料を入れることで、それをＡＩが分析、自動的に和菓子として出力します」"
translation = "「이 화과자 프린터는 제 사고를 샘플링해서 만든 AI가 내장되어 있어, 재료를 넣으면 AI가 그것을 분석, 자동으로 화과자로 출력합니다」"

[[dialogue]]
speaker = "unk"
original = "テンションが上がっているのか、早口で説明するアナ。"
translation = "텐션이 올라갔는지, 빠른 말투로 설명하는 아나."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「例えば、洋菓子のショートケーキを材料として入れると、それを和菓子にアレンジした和風ショートケーキとして生成してくれるといった具合です」"
translation = "「예를 들어, 양과자인 쇼트케이크를 재료로 넣으면, 그것을 화과자로 어레인지한 화풍 쇼트케이크로 생성해 주는 식입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「つまりは、これまでになかった材料の組み合わせから、未知の和菓子を生み出す可能性を秘めた、新世界を作る『自動和菓子生成器』なのです。むふ～♪」"
translation = "「즉, 지금까지 없었던 재료의 조합으로부터 미지의 화과자를 만들어낼 가능성을 간직한, 신세계를 만드는 『자동 화과자 생성기』인 것입니다. 무후~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「では早速、実験してみましょう。先程言った、ショートケーキが分かりやすいですね。抹茶と組み合わせれば、抹茶ケーキができあがるはずです」"
translation = "「그럼 바로 실험해 보죠. 아까 말한 쇼트케이크가 알기 쉽겠네요. 말차와 조합하면 말차 케이크가 완성될 겁니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「材料は事前に用意済み。これをセットして、スイッチオン。れでぃ～ご～！」"
translation = "「재료는 미리 준비 완료. 이것을 세팅하고, 스위치 온. 레디~ 고!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「計算によれば、でき上がるまで、およそ１５分……」"
translation = "「계산에 따르면, 완성될 때까지 약 15분……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………ふ、ふふふっ……」"
translation = "「…………후, 후후후……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……だ、ダメです。まだドヤるのは早い……こらえなければ……し、しかし……」"
translation = "「……아, 안 됩니다. 아직 거만해지긴 일러요…… 참아야 해…… 하, 하지만……」"

[[dialogue]]
speaker = "unk"
original = "ちらちらと横目で和菓子プリンターを眺めながら、口元のニヤけが止められないアナ。"
translation = "힐끗힐끗 곁눈질로 화과자 프린터를 바라보며 입가의 미소를 멈추지 못하는 아나."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "（会長さん、会長さん♪\u3000アナさんって和菓子のことになると、テンションがハイになって面白いですよね～☆）"
translation = "（회장님, 회장님♪ 아나 씨는 화과자 이야기만 나오면 텐션이 하이해져서 재밌네요~☆）"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんがアナに聞こえないくらいの小声で耳打ちしてくる。"
translation = "트레지아나 씨가 아나에게 들리지 않을 정도의 작은 목소리로 귓속말을 해온다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "（普段は知的な感じのに、和菓子のことになった途端、子供みたいにはしゃいじゃうのがすごく可愛いです♪）"
translation = "（평소에는 지적인 느낌인데, 화과자 이야기만 나오면 어린애처럼 들뜨는 게 정말 귀여워요♪）"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんの感想に、首がもげるほどうなずく俺なのであった。"
translation = "트레지아나 씨의 감상에 고개가 떨어질 정도로 끄덕이는 나였다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「わくわく……そわそわ……♪」"
translation = "「두근두근…… 안절부절……♪」"

[[dialogue]]
speaker = "unk"
original = "それから１５分後。和菓子プリンターから、綺麗な抹茶ケーキが出力されてきて――"
translation = "그로부터 15분 후. 화과자 프린터에서 예쁜 말차 케이크가 출력되어 나오고──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふふふ、計算通りです……！」"
translation = "「후후후, 계산대로입니다……!」"

[[dialogue]]
speaker = "unk"
original = "渾身のドヤ顔を決めるアナ。それから、ソワソワしながらケーキを切り分ける。"
translation = "회심의 거만한 표정을 짓는 아나. 그러고는 안절부절못하며 케이크를 자른다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「では、３人で試食しましょう♪\u3000いただきます――はむっ。もぐもぐもぐ……！」"
translation = "「그럼 셋이서 시식해 보죠♪ 잘 먹겠습니다―― 냠. 우물우물우물……!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「もぐもぐ……こ、これは……！」"
translation = "「우물우물…… 이, 이것은……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「すん」"
translation = "「정색」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「うわぁ！？\u3000アナさんが急に冷静な顔に！？」"
translation = "「우와아!? 아나 씨가 갑자기 냉정한 얼굴로!?」"

[[dialogue]]
speaker = "unk"
original = "えっと……確かにマズくはないんだけど……"
translation = "저기…… 확실히 맛이 없는 건 아닌데……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そ、そうですね……美味しいかと言われると……」"
translation = "「그, 그러게요…… 맛있냐고 물으신다면……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「トレジアンナさん、会長……私は今回、大切なことを学びました。それは――」"
translation = "「트레지아나 씨, 회장님…… 저는 이번에 소중한 것을 배웠습니다. 그것은――」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「日々、美味しい和菓子を作ってくださる職人さんたちへの『リスペクトの心』……です……」"
translation = "「매일 맛있는 화과자를 만들어 주시는 장인분들에 대한 『리스펙트의 마음』……입니다……」"

[[dialogue]]
speaker = "unk"
original = "ちょっと遠い目をしながら、微妙そうに抹茶ケーキをもっちゃもっちゃ咀嚼するアナなのであった。"
translation = "약간 먼 산을 바라보며, 미묘한 표정으로 말차 케이크를 쩝쩝 씹어 먹는 아나였다."

