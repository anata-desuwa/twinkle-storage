[[dialogue]]
speaker = "unk"
original = "第４話,エスメラルダの演奏,P"
translation = "제4화, 에스메랄다의 연주"

[[dialogue]]
speaker = "unk"
original = "数学の課題を教えてもらったり、分析官の視点から戦闘のアドバイスを貰ったり。"
translation = "수학 과제를 배우기도 하고, 분석관의 관점에서 전투 조언을 받기도 하며."

[[dialogue]]
speaker = "unk"
original = "逆に俺が先生の無茶な徹夜を咎めたり、ちょっぴり抜けたドジに振り回されたり。"
translation = "반대로 내가 선생님의 무리한 밤샘을 꾸짖거나, 조금 나사 빠진 실수에 휘둘리기도 하고."

[[dialogue]]
speaker = "unk"
original = "そんな日々を過ごす内、俺とエスメラルダ先生の仲はどんどん親密になっていった。"
translation = "그런 나날을 보내는 사이, 나와 에스메랄다 선생님의 사이는 점점 친밀해졌다."

[[dialogue]]
speaker = "unk"
original = "そして今日。先生は俺だけのために、ハープを奏でてくれることになったのだった──"
translation = "그리고 오늘. 선생님은 오직 나만을 위해 하프를 연주해 주기로 했다──"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「──はい、おしまい」"
translation = "「──자, 끝.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「どうだったかしら、会長さん？」"
translation = "「어땠어, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "素敵な音色でした、エスメラルダ先生"
translation = "멋진 음색이었어요, 에스메랄다 선생님."

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ふふ。そう言ってくれると嬉しいわね」"
translation = "「후후. 그렇게 말해 주니 기쁘네.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「私も誰かのためにハープを弾いたのは久しぶりよ」"
translation = "「나도 누군가를 위해 하프를 켠 건 오랜만이야.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「学生だった頃は、キリカやウィステリアによくオーディエンスになってもらったものだけど……」"
translation = "「학생이었을 때는 키리카나 위스테리아가 자주 청중이 되어 주곤 했지만……」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「卒業してからは研究の方にばかり時間を割いていたからね。いい気分転換になったわ」"
translation = "「졸업하고 나서는 연구 쪽에만 시간을 쏟았으니까. 좋은 기분 전환이 됐어.」"

[[dialogue]]
speaker = "unk"
original = "それが先生の武器なんですよね"
translation = "그게 선생님의 무기인 거죠?"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ええ。プリマステラとして活動していた時から、このハープは相棒よ」"
translation = "「응. 프리마스텔라로 활동하던 시절부터 이 하프는 파트너야.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「最近弾けてなかったから、なまった腕だとハープに叱られちゃうかと思ったけれど……ちゃんと手に馴染んでくれたわね」"
translation = "「최근에 켜지 못해서 실력이 녹슬었다고 하프한테 혼나지 않을까 생각했는데…… 다행히 손에 잘 익어 주었네.」"

[[dialogue]]
speaker = "unk"
original = "今でも十分に星力はあるんでしょう？"
translation = "지금도 충분히 성력은 있으시죠?"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ある程度はね。でも現役の会長さんたちに比べたらやっぱり見劣りしちゃうの」"
translation = "「어느 정도는 말이야. 하지만 현역인 회장님들에 비하면 역시 뒤떨어지고 말아.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「数値から客観的に判断して、前線に出ても現役の子たちに負けないくらいではあるけど」"
translation = "「수치로 객관적으로 판단해서, 전선에 나가도 현역 아이들에게 지지 않을 정도긴 하지만.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「今の私の仕事は、会長さんみたいな星騎士たちを後方から支援することだから」"
translation = "「지금 내 일은 회장님 같은 별의 기사들을 후방에서 지원하는 거니까.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ね……会長さん？」"
translation = "「저기…… 회장님?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「私のハープ、本当に素敵だった？」"
translation = "「내 하프, 정말 멋졌어?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「もう一度……ううん。何度でも聴きたいなって、そう思ってくれたかしら？」"
translation = "「다시 한번…… 아니. 몇 번이라도 듣고 싶다고, 그렇게 생각해 주었을까?」"

[[dialogue]]
speaker = "unk"
original = "はい。とても素敵でした！"
translation = "네. 정말 멋졌어요!"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「だったら良かったわ」"
translation = "「그랬다면 다행이야.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「これからも会長さんが望むなら、いつでもあなただけのために、最高の演奏をしてあげる」"
translation = "「앞으로도 회장님이 원한다면 언제든 당신만을 위해 최고의 연주를 해 줄게.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「だから……どんなに厳しい戦いがあったとしても、絶対に無事に帰ってきてね？」"
translation = "「그러니까…… 아무리 힘든 싸움이 있더라도, 반드시 무사히 돌아와 줘?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「あなたは星徒会長であり、魔王だとも言われている。あらゆる戦闘で、常に最前線に立つことになると思う」"
translation = "「당신은 성도회장이자 마왕이라고도 불리고 있어. 모든 전투에서 항상 최전선에 서게 될 거라 생각해.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「それはきっと、辛く険しい道になるわ」"
translation = "「그건 분명 괴롭고 험난한 길이 되겠지.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「とてつもなく強い敵。心が折れてしまうほどの最悪な状況……そこからあなたは逃れられない」"
translation = "「엄청나게 강한 적. 마음이 꺾여 버릴 정도의 최악의 상황…… 거기서 당신은 벗어날 수 없어.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「だけど……決して諦めないで欲しいの」"
translation = "「하지만…… 결코 포기하지 않았으면 좋겠어.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「毎日数字とにらめっこして、あらゆるデータを分析して、必死であなたを支えている人がいるってことを、忘れないで」"
translation = "「매일 숫자와 씨름하며 모든 데이터를 분석하고, 필사적으로 당신을 지지하는 사람이 있다는 걸 잊지 마.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「教師として、教え子を戦地に向かわせることは悔しいし……」"
translation = "「교사로서 제자를 전쟁터로 보내는 건 분하고……」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「会長さんっていう男の子と離ればなれになるのは、もっと悲しいと思うから……」"
translation = "「회장님이라는 남자아이와 떨어지게 되는 건 더 슬플 것 같으니까……」"

[[dialogue]]
speaker = "unk"
original = "約束します。どんな状況でも諦めません"
translation = "약속할게요. 어떤 상황에서도 포기하지 않겠습니다."

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ありがとう、会長さん」"
translation = "「고마워, 회장님.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「私も一生懸命、支えるわ。教師として、分析官として」"
translation = "「나도 온 힘을 다해 지탱할게. 교사로서, 분석관으로서.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「そして星騎士のエスメラルダ・シーメインとして」"
translation = "「그리고 별의 기사 에스메랄다 시메인으로서.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「私の力が必要な時は言ってね。全力でサポートするから」"
translation = "「내 힘이 필요할 때는 말해 줘. 전력으로 서포트할 테니까.」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「……え？\u3000もう１曲、弾いて欲しいの？」"
translation = "「……에? 한 곡 더 켜 줬으면 좋겠어?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「ふふ♪\u3000しょうがないわね～……特別なんだからね？」"
translation = "「후후♪ 어쩔 수 없네～…… 특별히 해 주는 거니까?」"

[[dialogue]]
speaker = "unk"
original = "これから先、どんなに厳しい戦いが待っていたとしても俺はくじけない。"
translation = "앞으로 어떤 험난한 싸움이 기다리고 있다 해도 나는 굴하지 않는다."

[[dialogue]]
speaker = "unk"
original = "どんな困難も跳ねのけて、仲間と共に学園へ戻ってきて……"
translation = "어떤 곤란도 떨쳐내고 동료와 함께 학원으로 돌아와서……"

[[dialogue]]
speaker = "unk"
original = "そして何度でも、先生のハープの音色を聴かせてもらおう──そう思った。"
translation = "그리고 몇 번이고 선생님의 하프 음색을 들려달라고 하자── 그렇게 생각했다."

