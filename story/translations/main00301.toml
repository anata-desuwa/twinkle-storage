[[dialogue]]
speaker = "unk"
original = "第１話,予期された運命,B"
translation = "제1화, 예기된 운명, B"

[[dialogue]]
speaker = "unk"
original = "荒鷹ノ月・十四日──"
translation = "아라타카의 달・14일──"

[[dialogue]]
speaker = "unk"
original = "新星学園星徒会はその新たなる出発から、ひと月が経過していた。"
translation = "신성 학원 성도회는 그 새로운 출발로부터 한 달이 경과했다."

[[dialogue]]
speaker = "アナ"
original = "「<ruby>黄雀<rt>こうじゃく</rt></ruby>ノ月十二日。《魔王》は始まりの階層を踏破し、塔の頂へ至る道を歩み始めた」"
translation = "「황작의 달 12일. 《마왕》은 시작의 계층을 답파하고, 탑의 정상을 향한 길을 걷기 시작했다」"

[[dialogue]]
speaker = "アナ"
original = "「彼の背中は日に日に大きくなっていく。真の力が目覚める日も、そう遠くないのかもしれない……」"
translation = "「그의 등은 나날이 커져 간다. 진정한 힘이 눈을 뜨는 날도, 그리 멀지 않았을지도 모른다……」"

[[dialogue]]
speaker = "アナ"
original = "「──確かに、先月、前会長たちが『フィーニスの塔』に踏み込んだ出来事を指しているように思えます」"
translation = "「──확실히, 지난달 전 회장님들이 『피니스의 탑』에 발을 들인 사건을 가리키는 것처럼 보입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でしょう？\u3000この日誌に間違いはないんだから！」"
translation = "「그렇지? 이 일지에 틀림은 없으니까!」"

[[dialogue]]
speaker = "アナ"
original = "「相変わらず不思議さ満点のアイテムですね……」"
translation = "「여전히 불가사의함이 가득한 아이템이네요……」"

[[dialogue]]
speaker = "unk"
original = "ペラペラと『未来の日誌』をめくるアナ。"
translation = "펄럭펄럭 『미래의 일지』를 넘기는 아나."

[[dialogue]]
speaker = "unk"
original = "彼女たちの座る机には、それ以外の書物も大量に散乱していた。"
translation = "그녀들이 앉은 책상에는 그 외의 서적도 대량으로 흩어져 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「にしても、ふう……ここの図書館なら見つかると思ったんだけど」"
translation = "「그렇다고 해도, 휴…… 여기 도서관이라면 찾을 수 있을 거라고 생각했는데」"

[[dialogue]]
speaker = "アナ"
original = "「<ruby>芳<rt>かんば</rt></ruby>しくありませんね」"
translation = "「좋지 않네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん～、もう頭いたーい！\u3000私、文字ばかり読んでると身体が参ってきちゃうのよね」"
translation = "「음~, 벌써 머리 아파! 나는 글자만 읽으면 몸이 축나 버린단 말이지」"

[[dialogue]]
speaker = "アナ"
original = "「こちらにも『予言の書』なるものが収蔵されていましたが……中身はデタラメ。この手の本はインチキばっかりですね」"
translation = "「이쪽에도 『예언의 서』라는 것이 소장되어 있었지만…… 내용은 엉터리. 이런 종류의 책은 가짜뿐이네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「星術関連もゼンメツよ！\u3000未来予知の能力なんて、どこにも前例がないわ」"
translation = "「성술 관련도 전멸이야! 미래 예지 능력 같은 건 어디에도 전례가 없어」"

[[dialogue]]
speaker = "unk"
original = "２人はヴィーナスの持つ『未来の日誌』について何か手がかりがないか調査していた。"
translation = "두 사람은 비너스가 가진 『미래의 일지』에 대해 뭔가 단서가 없는지 조사하고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかしながら２時間経ってもそれらしい情報は得られず、ヴィーナスもいよいよ脚をばたつかせ始めている。"
translation = "하지만 두 시간이 지나도 그럴듯한 정보는 얻지 못했고, 비너스도 드디어 발을 동동 구르기 시작했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「うちのメイドに似たような『眼』を持つ子がいたから、ヒントくらいはあるかと思ったんだけど」"
translation = "「우리 메이드 중에 비슷한 『눈』을 가진 애가 있었으니까, 힌트 정도는 있을 거라고 생각했는데」"

[[dialogue]]
speaker = "アナ"
original = "「眼……？\u3000未来予知の、ですか？」"
translation = "「눈……? 미래 예지의, 말인가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「予知っていうか……予測？\u3000んでも、見えるのは一瞬先までみたいなのよね」"
translation = "「예지라기보다는…… 예측? 그래도, 보이는 건 한순간 앞까지인 것 같단 말이지」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。それはまた──別種の能力である可能性が高そうですね」"
translation = "「과연. 그것은 또── 다른 종류의 능력일 가능성이 높겠네요」"

[[dialogue]]
speaker = "unk"
original = "２人はさらに調査を進めるも、やはり<ruby>芳<rt>かんば</rt></ruby>しい成果は得られなかった。"
translation = "두 사람은 더욱 조사를 진행했지만, 역시 좋은 성과는 얻지 못했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねーアナ、もういいんじゃない？\u3000日誌が間違ってたってわけでもないんだし～」"
translation = "「야~ 아나, 이제 됐잖아? 일지가 틀렸다는 것도 아닌데~」"

[[dialogue]]
speaker = "アナ"
original = "「正体もわからず頼り続けるのは危険です。人智を超えたアイテム──追究するに越したことはありません」"
translation = "「정체도 모르고 계속 의지하는 것은 위험합니다. 인지를 초월한 아이템── 추구하는 것이 당연합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うへぇ～」"
translation = "「우헤에~」"

[[dialogue]]
speaker = "unk"
original = "アナに言われ、またしばらく書物とにらめっこを続ける２人。"
translation = "아나의 말에 또 한동안 서적과 씨름을 계속하는 두 사람."

[[dialogue]]
speaker = "unk"
original = "そこへ……"
translation = "그때……"

[[dialogue]]
speaker = "ウィステリア"
original = "「どうかしら、２人とも。ちゃんと探してたものは調べられた？」"
translation = "「어떠니, 두 사람 다. 제대로 찾던 것은 조사할 수 있었니?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ウィステリアさん──ううん、全然ダメ！」"
translation = "「위스테리아 씨── 아뇨, 전혀 안 돼요!」"

[[dialogue]]
speaker = "アナ"
original = "「釣りで言うとボウズ」"
translation = "「낚시로 말하자면 꽝」"

[[dialogue]]
speaker = "ウィステリア"
original = "「釣りで言う必要はよくわからないけれど……学生が自分から調べて学習するのは良いことだわ」"
translation = "「낚시로 말할 필요는 잘 모르겠지만…… 학생이 스스로 조사하고 학습하는 것은 좋은 일이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それに、九浄さんが図書館を利用する日が来るなんてね。アナさんは常連だけれど」"
translation = "「게다가, 쿠죠 씨가 도서관을 이용하는 날이 올 줄이야. 아나 씨는 단골이지만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わ、私だって本くらい読めるんだから！」"
translation = "「나, 나도 책 정도는 읽을 수 있으니까!」"

[[dialogue]]
speaker = "アナ"
original = "「さっき初めて利用者登録してた。元星徒会長なのに」"
translation = "「방금 처음으로 이용자 등록을 했어요. 전 성도 회장인데도」"

[[dialogue]]
speaker = "ウィステリア"
original = "「うふふ。ところで、何の本を探していたの？\u3000ここにある書籍……随分と昔のものみたいだけど」"
translation = "「우후후. 그런데, 무슨 책을 찾고 있었니? 여기에 있는 서적…… 꽤나 옛날 것 같은데」"

[[dialogue]]
speaker = "アナ"
original = "「前会長の不思議アイテムについて調べてました。６００年前の書まで遡ってみましたが……それらしい記述は見当たらず」"
translation = "「전 회장님의 불가사의 아이템에 대해 조사하고 있었습니다. 600년 전의 서적까지 거슬러 올라가 봤지만…… 그럴듯한 기술은 보이지 않았습니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そ、そんなに昔のまで？」"
translation = "「그, 그렇게 옛날 것까지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもアナ、この図鑑にある『相手の心を見通すメガネ』ってやつ欲しくない！？」"
translation = "「하지만 아나, 이 도감에 있는 『상대방의 마음을 꿰뚫어 보는 안경』이라는 거 갖고 싶지 않아!?」"

[[dialogue]]
speaker = "アナ"
original = "「それは一人で探しに行ってください」"
translation = "「그것은 혼자서 찾으러 가세요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「アナさんがここの蔵書を漁っても見つからない、となると……確かに不思議ねぇ」"
translation = "「아나 씨가 여기 장서를 뒤져도 찾을 수 없다니…… 확실히 신기하네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やっぱり、記録にはない未知のアイテムなのよ」"
translation = "「역시, 기록에는 없는 미지의 아이템인 거야」"

[[dialogue]]
speaker = "アナ"
original = "「それでも……似たような例がないかは調べるべきです」"
translation = "「그렇더라도…… 비슷한 예가 없는지는 조사해야 합니다」"

[[dialogue]]
speaker = "ウィステリア"
original = "「人間界じゃなくて、他の世界にあるとかかしら？\u3000そういえば天界にも立派な図書館があるみたいよ」"
translation = "「인간계가 아니라, 다른 세계에 있다거나 하는 걸까? 그러고 보니 천계에도 훌륭한 도서관이 있는 것 같아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「気軽に行ける場所じゃないわね……」"
translation = "「쉽게 갈 수 있는 장소는 아니네……」"

[[dialogue]]
speaker = "unk"
original = "流星／新星学園には天使・魔族の留学生が多くいる。"
translation = "유성/신성 학원에는 천사・마족 유학생이 많이 있다."

[[dialogue]]
speaker = "unk"
original = "しかし、彼らがこうして人間界にやってくるのも決して簡単な道のりではなかった。"
translation = "하지만, 그들이 이렇게 인간계에 오는 것도 결코 간단한 여정은 아니었다."

[[dialogue]]
speaker = "アナ"
original = "「天界の立派な図書館──となると、恐らくウル大図書館。私の地元ですね」"
translation = "「천계의 훌륭한 도서관──이라고 하면, 아마도 울 대도서관. 제 고향이죠」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あら、そうなの？」"
translation = "「어머, 그래?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあアナが里帰りしたら──と思ったけど、ムリなんだっけ」"
translation = "「그럼 아나가 고향에 돌아가면──이라고 생각했지만, 무리였지」"

[[dialogue]]
speaker = "アナ"
original = "「そうですね。私が次に帰れるのは、卒業時の『大交流』と決まっています」"
translation = "「그렇습니다. 제가 다음에 돌아갈 수 있는 것은 졸업 시의 『대교류』로 정해져 있습니다」"

[[dialogue]]
speaker = "unk"
original = "通常、三界の行き来には大幅な制限が伴う。"
translation = "통상, 삼계의 왕래에는 대폭적인 제한이 따른다."

[[dialogue]]
speaker = "unk"
original = "それは人間が出ていく場合も、天使が里帰りをする場合も例外ではない。"
translation = "그것은 인간이 나가는 경우도, 천사가 고향에 돌아가는 경우도 예외는 아니다."

[[dialogue]]
speaker = "unk"
original = "本来は分かたれている天界──人間界──魔界──の狭間に、限定的な<ruby>穴<rt>ホール</rt></ruby>を構築する必要があるためだ。"
translation = "본래는 나뉘어 있는 천계──인간계──마계──의 틈새에, 한정적인 구멍을 구축할 필요가 있기 때문이다."

[[dialogue]]
speaker = "unk"
original = "これは極めて大掛かりな作業であるほか、狭く一時的なものしか開けることができない。"
translation = "이것은 극히 대규모 작업일 뿐만 아니라, 좁고 일시적인 것밖에 열 수 없다."

[[dialogue]]
speaker = "unk"
original = "唯一、定期的に三界の物資をやり取りできる機会こそが『大交流』だった。"
translation = "유일하게, 정기적으로 삼계의 물자를 주고받을 수 있는 기회야말로 『대교류』였다."

[[dialogue]]
speaker = "unk"
original = "およそ四半期に一度、三界が同時に穴を構築することで──前もって決められた物資・人員をその機に転送し合うというものだ。"
translation = "대략 분기에 한 번, 삼계가 동시에 구멍을 구축함으로써── 미리 정해진 물자・인원을 그 기회에 서로 전송하는 것이다."

[[dialogue]]
speaker = "unk"
original = "例えるならば船を<ruby>一隻<rt>いっせき</rt></ruby>だけ運航できるといったところか。"
translation = "비유하자면 배를 한 척만 운항할 수 있다는 정도일까."

[[dialogue]]
speaker = "unk"
original = "この船に乗れる人員は決して多くなく、また選ばれるには『送るべき要人』として認められる必要もあった。"
translation = "이 배에 탈 수 있는 인원은 결코 많지 않으며, 또한 선택받기 위해서는 『보내야 할 요인』으로 인정받을 필요도 있었다."

[[dialogue]]
speaker = "unk"
original = "アナのような流星／新星学園の留学生たちはそんな希少な人材として人間界へやってきている。"
translation = "아나와 같은 유성/신성 학원의 유학생들은 그런 희귀한 인재로서 인간계에 오고 있다."

[[dialogue]]
speaker = "アナ"
original = "「とはいえ、本一冊の取り寄せ程度なら可能なはずです。次の『大交流』までに要請しておきましょう」"
translation = "「그렇다고는 해도, 책 한 권 정도의 주문이라면 가능할 것입니다. 다음 『대교류』까지 요청해 두죠」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そんな先まで待てるかしら。日誌はどんどん先に進んじゃうわよ！」"
translation = "「그렇게 앞날까지 기다릴 수 있을까. 일지는 점점 앞으로 나아가 버릴 거라고!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「本当に不思議なアイテムなのねぇ」"
translation = "「정말 신기한 아이템이네」"

[[dialogue]]
speaker = "unk"
original = "と、彼女たちが会話を続けていると……"
translation = "하고, 그녀들이 대화를 계속하고 있을 때……"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさーん！\u3000今度の読書週間について相談が～！」"
translation = "「위스테리아 씨~! 이번 독서주일에 대해 상담할 게 있어서요~!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はーい。それじゃ、また困ったらいつでも声かけてね～」"
translation = "「네~. 그럼, 또 곤란하면 언제든지 말 걸어줘~」"

[[dialogue]]
speaker = "unk"
original = "図書委員の学生に呼ばれ、ウィステリアはその場を去っていった。"
translation = "도서위원 학생에게 불려, 위스테리아는 그 자리를 떠났다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「にしても──司書さんって魔族の先生がやってたのね。知らなかったわ」"
translation = "「그렇다고 해도── 사서 씨가 마족 선생님이 하고 있었네. 몰랐어」"

[[dialogue]]
speaker = "アナ"
original = "「他にも何名かいらっしゃるようですが、基本は彼女ですね」"
translation = "「다른 몇 분도 계신 것 같지만, 기본은 그녀입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに、大人の色気を感じる女性だったわね……あれは。えろいわ！」"
translation = "「게다가, 어른의 섹시함을 느끼게 하는 여성이었네…… 저건. 야해!」"

[[dialogue]]
speaker = "アナ"
original = "「私たちも頑張りましょう」"
translation = "「우리도 노력합시다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……アナよりは私のほうがオトナよね？」"
translation = "「……아나보다는 내가 더 어른이지?」"

[[dialogue]]
speaker = "アナ"
original = "「いえ。身体面と精神面を差し引きして、どっこいどっこいかと」"
translation = "「아뇨. 신체면과 정신면을 상쇄하면, 막상막하일까 합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんかフクザツだわ……」"
translation = "「뭔가 복잡하네……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは年下のアナからの仲間意識にもやもやしつつ、手元にあった日誌から今日のページを開いた。"
translation = "비너스는 연하인 아나의 동료 의식에 찜찜해하면서, 손에 있던 일지에서 오늘의 페이지를 펼쳤다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「そだ。今のこともそれっぽく書かれてたわね。ほらここ」"
translation = "「맞다. 지금 일도 그럴듯하게 쓰여 있었지. 자 여기」"

[[dialogue]]
speaker = "アナ"
original = "「えと……<ruby>荒鷹<rt>あらたか</rt></ruby>ノ月十四日。知の殿堂を司りし魔族と初の邂逅を果たす──」"
translation = "「에또…… 아라타카의 달 14일. 지의 전당을 관장하는 마족과 첫 해후를 이룬다──」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。確かに司書──ウィステリア女史のことを指しているように取れます」"
translation = "「과연. 확실히 사서── 위스테리아 여사를 가리키는 것으로 해석됩니다」"

[[dialogue]]
speaker = "アナ"
original = "「こんなことまで記されているなんて……改めてとんでもない道具ですね」"
translation = "「이런 것까지 기록되어 있다니…… 새삼 대단한 도구네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん。ざっと来週くらいまでは書かれてるわね──大した事件もなさそうだけど」"
translation = "「후훗. 대충 다음 주 정도까지는 쓰여 있네── 큰 사건은 없을 것 같지만」"

[[dialogue]]
speaker = "アナ"
original = "「とはいえ仕組みが気になります。いくらでも悪用のできるものですから」"
translation = "「그렇다고는 해도 구조가 궁금합니다. 얼마든지 악용할 수 있는 것이니까요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「仕組み……って言っても。前にも言った通りよ、未来のことが書かれてるの♪」"
translation = "「구조……라고 해도. 전에도 말했듯이, 미래의 일이 쓰여 있는 거야♪」"

[[dialogue]]
speaker = "アナ"
original = "「でも、前会長が書いているわけではないのですよね」"
translation = "「하지만, 전 회장님이 쓰고 있는 것은 아니죠」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね。今みたいのが先々まで既に書かれてて……私はそれに従って動くって感じ！」"
translation = "「그렇지. 지금 같은 게 미리미리 쓰여 있어서…… 나는 그것에 따라서 움직이는 느낌!」"

[[dialogue]]
speaker = "アナ"
original = "「どこで拾ったのです？\u3000いつから所有しているのです？\u3000筆跡に心当たりはないのです？」"
translation = "「어디서 주웠나요? 언제부터 소유하고 있나요? 필적에 짐작 가는 데는 없나요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フフフ──全部わからないわ！！」"
translation = "「후후후── 전부 모르겠어!!」"

[[dialogue]]
speaker = "アナ"
original = "「相変わらず頼もしくない自信です……」"
translation = "「여전히 믿음직스럽지 못한 자신감이네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから……私にもうまく説明できないのよね。<b>そういうもの</b>、としか」"
translation = "「그러니까…… 나도 잘 설명할 수가 없단 말이지. <ruby>그런 것<rt>・・ ・</rt></ruby>, 이라고밖에」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「物心ついた時から……私はこれを持ってたの。<b>なぜか</b>」"
translation = "「철들었을 때부터…… 나는 이걸 가지고 있었어. <b>왠지</b>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でもって、この日誌の最後に書かれていたのが──『魔王』との出会いだった。だから、私はそれを待つのが自然なことだと思ってた」"
translation = "「게다가, 이 일지 마지막에 쓰여 있던 것이── 『마왕』과의 만남이었어. 그래서, 나는 그것을 기다리는 것이 자연스러운 일이라고 생각했지」"

[[dialogue]]
speaker = "アナ"
original = "「前会長はそんな昔から、現会長のことを……」"
translation = "「전 회장님은 그렇게 옛날부터, 현 회장님을……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今、クロトと出会って。この先どうなるんだろうって思ったら──まさかページが増えるなんてね。びっくりだわ」"
translation = "「지금, 쿠로토와 만나고. 이 앞으로 어떻게 될까 생각했더니── 설마 페이지가 늘어날 줄이야. 깜짝 놀랐어」"

[[dialogue]]
speaker = "unk"
original = "──未来の日誌。"
translation = "──미래의 일지."

[[dialogue]]
speaker = "unk"
original = "彼女はこれをそう呼んでいたが、もちろん正式な名称ではない。"
translation = "그녀는 이것을 그렇게 불렀지만, 물론 정식 명칭은 아니다."

[[dialogue]]
speaker = "unk"
original = "なにせ表紙に何も書かれていなければ、筆者の正体もわかっていないのだ。"
translation = "무엇보다 표지에 아무것도 쓰여 있지 않고, 필자의 정체도 알 수 없기 때문이다."

[[dialogue]]
speaker = "アナ"
original = "「その日誌の通りにいかなかったイレギュラーですとか……これまでにはなかったのでしょうか？」"
translation = "「그 일지대로 되지 않은 예외라든가…… 지금까지는 없었습니까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なかったわね。ただの一度も！」"
translation = "「없었지. 단 한 번도!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アナだって──この日誌の通り『魔王が来たる』のを目の当たりにしたでしょ？」"
translation = "「아나도── 이 일지대로 『마왕이 오다』를 눈앞에서 봤잖아?」"

[[dialogue]]
speaker = "アナ"
original = "「ええ……それは確かに、そうなのですが」"
translation = "「네…… 그것은 확실히, 그렇습니다만」"

[[dialogue]]
speaker = "unk"
original = "それは、緋宮クロトが入学する以前のこと──"
translation = "그것은, 히노미야 쿠로토가 입학하기 이전의 일──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねえアナ。今度、転入試験に来る子の資料ってまとめた？」"
translation = "「야 아나. 이번에 전입 시험에 오는 애 자료 정리했어?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。問題がなければ、職員室へ提出するつもりですが……」"
translation = "「네. 문제가 없으면, 교무실에 제출할 생각입니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「その男の子、魔王だから。いずれ私たちの仲間になるわよ」"
translation = "「그 남자애, 마왕이니까. 머지않아 우리 동료가 될 거야」"

[[dialogue]]
speaker = "アナ"
original = "「……。はい……？」"
translation = "「……. 네……?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの突飛な言動にアナは目を丸くした。"
translation = "비너스의 엉뚱한 언동에 아나는 눈을 동그랗게 떴다."

[[dialogue]]
speaker = "unk"
original = "副会長のアナは当時、会長であった彼女のわがままに大層振り回されていたが、中でも理解を越えていたのがこの時だった。"
translation = "부회장인 아나는 당시, 회장이었던 그녀의 제멋대로에 크게 휘둘렸지만, 그중에서도 이해를 넘어섰던 것이 이때였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから心の準備をしといてねって話。あと、もし彼が入学して困ったことがあったらサポートしてあげて」"
translation = "「그러니까 마음의 준비를 해 두라는 이야기. 그리고, 만약 그가 입학해서 곤란한 일이 있으면 서포트해 줘」"

[[dialogue]]
speaker = "アナ"
original = "「あの……会長？\u3000そもそも転入は通常の試験より狭い門ですし、この方が合格できるかどうかはまだ……」"
translation = "「저…… 회장님? 애초에 전입은 통상 시험보다 좁은 문이고, 이분이 합격할 수 있을지는 아직……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「するわよ。だって、私たちはこの学園で出会うんだもの」"
translation = "「할 거야. 왜냐하면, 우리는 이 학원에서 만날 거니까」"

[[dialogue]]
speaker = "unk"
original = "窓の外を見るヴィーナス。その語調はいつも以上の確信に満ちていた──"
translation = "창밖을 보는 비너스. 그 어조는 평소 이상의 확신에 차 있었다──"

[[dialogue]]
speaker = "unk"
original = "そうして入学してきた緋宮クロトはヴィーナスの予言通り、彼女をも凌ぐ潜在能力を全校生徒の前で見せつけてみせた。"
translation = "그렇게 입학해 온 히노미야 쿠로토는 비너스의 예언대로, 그녀마저 능가하는 잠재 능력을 전교생 앞에서 보여주었다."

[[dialogue]]
speaker = "unk"
original = "アナにとっても件の日誌が無視できなくなった瞬間である。"
translation = "아나에게도 해당 일지가 무시할 수 없게 된 순간이다."

[[dialogue]]
speaker = "アナ"
original = "「だからこそというものです。超常の力というのは否定しませんが、何もかも頭から信じ込むのは危険かと」"
translation = "「그렇기 때문에 하는 말입니다. 초자연적인 힘이라는 것은 부정하지 않겠지만, 모든 것을 머리부터 믿어 버리는 것은 위험하다고 생각합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「も～。アナは心配性ねえ～。こーんな便利な道具なんだから、素直に従っておけばいいのに～」"
translation = "「모~. 아나는 걱정이 많네~. 이~렇게 편리한 도구인데, 순순히 따르면 될 것을~」"

[[dialogue]]
speaker = "アナ"
original = "（必然的な運命の記述……しかし、これまでの記述がいくら<ruby>無謬<rt>むびゅう</rt></ruby>であったとて今後も正しいという証明にはならない）"
translation = "（필연적인 운명의 기술…… 하지만, 지금까지의 기술이 아무리 틀림없었다고 해도 앞으로도 옳다는 증명은 되지 않는다）"

[[dialogue]]
speaker = "アナ"
original = "（この日誌に従うことが、私たちにとってメリットのあることなのかどうかも、今はまだ……」）"
translation = "（이 일지를 따르는 것이, 우리에게 이득이 되는 일인지 아닌지도, 지금은 아직……」）"

[[dialogue]]
speaker = "アナ"
original = "（でも、前会長を説得するのは厳しそうなので……少なくとも私は警戒しておくとしましょう）"
translation = "（하지만, 전 회장님을 설득하는 것은 어려울 것 같으니…… 적어도 저는 경계해 두도록 하죠）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ホントはどこで買ったかとか、誰にもらったかとか、わかればいーんだけど」"
translation = "「사실은 어디서 샀다거나, 누구에게 받았다거나, 알면 좋을 텐데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ごめんね。私、<b>５年以上前の記憶がない</b>から」"
translation = "「미안해. 나, <ruby>5년 이상 전의 기억이 없<rt>・・ ・・ ・・ ・・・ ・</rt></ruby>으니까」"

[[dialogue]]
speaker = "アナ"
original = "「……そうでしたね。でも、それなら……」"
translation = "「……그랬었죠. 하지만, 그렇다면……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それなら……？」"
translation = "「그렇다면……?」"

[[dialogue]]
speaker = "アナ"
original = "「もし本当に前会長が、気づかないうちからその日誌を持っていたとするなら……」"
translation = "「만약 정말로 전 회장님이, 깨닫지 못하는 동안부터 그 일지를 가지고 있었다고 한다면……」"

[[dialogue]]
speaker = "アナ"
original = "「あるいはその日誌も前会長と共に<b>生まれた</b>……と考えることも、できるのではないかと思いまして」"
translation = "「어쩌면 그 일지도 전 회장님과 함께 <b>태어났</b>다고 생각할 수도, 있는 것이 아닐까 해서요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほえー……でも確かに、この日誌に書かれているのは私の運命だとしたら……」"
translation = "「호에~…… 하지만 확실히, 이 일지에 쓰여 있는 것이 나의 운명이라고 한다면……」"

[[dialogue]]
speaker = "アナ"
original = "「いえ……忘れてください。非論理的な考えでした」"
translation = "「아뇨…… 잊어주세요. 비논리적인 생각이었습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう？\u3000面白い発想と思ったのに～」"
translation = "「그래? 재미있는 발상이라고 생각했는데~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、そういえば。後ろのほうに『魔王』についてのページも追加されてたのよね。こっちは日付もなかったんだけど」"
translation = "「아, 그러고 보니. 뒤쪽에 『마왕』에 대한 페이지도 추가되어 있었지. 이쪽은 날짜도 없었는데」"

[[dialogue]]
speaker = "アナ"
original = "「ほう。それはどんな内容でしたか」"
translation = "「오. 그것은 어떤 내용이었습니까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それがね～難しくてよくわかんなかったの。アナ読んで？」"
translation = "「그게 말이지~ 어려워서 잘 모르겠더라고. 아나 읽어 줘?」"

[[dialogue]]
speaker = "アナ"
original = "「仕方ありませんね……」"
translation = "「어쩔 수 없네요……」"

[[dialogue]]
speaker = "unk"
original = "アナはヴィーナスから日誌を借り受け、新たに増えたというページに目を通した。"
translation = "아나는 비너스로부터 일지를 빌려, 새로 늘어났다는 페이지에 눈을 통과했다."

[[dialogue]]
speaker = "アナ"
original = "「『終焉を打ち砕きし魔王の真実は未だ偽りの悪に虚飾されている。この世界に根を張る日輪の図が、過去の因果を捻じ曲げているのだ』」"
translation = "「『종언을 부수고 온 마왕의 진실은 아직 거짓된 악에 허식되어 있다. 이 세계에 뿌리를 내린 일륜의 그림이, 과거의 인과를 비틀고 있는 것이다』」"

[[dialogue]]
speaker = "アナ"
original = "「『真実を描いた月輪の図はどこかに隠されているという。私は、その在り処を求めるべく友の力を借りた』」"
translation = "「『진실을 그린 월륜의 그림은 어딘가에 숨겨져 있다고 한다. 나는, 그 소재를 찾기 위해 친구의 힘을 빌렸다』」"

[[dialogue]]
speaker = "アナ"
original = "「これは……」"
translation = "「이것은……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ね、よくわかんないでしょ？\u3000この日誌、もうちょい私にもわかりやすく書いてくれたら完璧なんだけどな～」"
translation = "「봐, 잘 모르겠지? 이 일지, 좀 더 나에게도 알기 쉽게 써 줬으면 완벽할 텐데~」"

[[dialogue]]
speaker = "unk"
original = "肩をすくめるヴィーナスに対し、今回はアナのほうが目を大きくした。"
translation = "어깨를 으쓱하는 비너스에 대해, 이번에는 아나 쪽이 눈을 크게 떴다."

[[dialogue]]
speaker = "アナ"
original = "「……あの、前会長。これって、もしかして──」"
translation = "「……저, 전 회장님. 이거 혹시──」"

