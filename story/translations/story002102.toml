[[dialogue]]
speaker = "リップル"
original = "「──ハ～～～イ！\u3000エンドレスサマーへようこそデ～～～～ス！」"
translation = "「──하~~~이! 엔들리스 서머에 오신 걸 환영합니다~~~~에요!」"

[[dialogue]]
speaker = "リップル"
original = "「今回は両星徒会の皆サマをご招待……なのですが、ワオ！\u3000初めて見るカオもいますね！」"
translation = "「이번에는 양쪽 성도회 여러분을 초대……인 것입니다만, 와오! 처음 보는 얼굴도 있네요!」"

[[dialogue]]
speaker = "アポロ"
original = "「おう！\u3000あたしはアポロだ、よろしくな！」"
translation = "「오우! 나는 아폴로다, 잘 부탁해!」"

[[dialogue]]
speaker = "セーラ"
original = "「セーラだよ～。いつかの夏合宿じゃ、フィオナちゃんがお世話になったみたいで」"
translation = "「세라야~. 지난 여름 합숙 때는 피오나 짱이 신세를 진 것 같네」"

[[dialogue]]
speaker = "リップル"
original = "「流星星徒会の方々とお会いするのはタイヘン珍しいで～す！\u3000ワタシのリゾート結界へお越しいただき光栄で～す！」"
translation = "「유성 성도회 분들과 만나는 건 무척 드문 일이예요! 제 리조트 결계에 오신 걸 영광으로 생각하는 거예요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「こっちも噂には聞いてたぜ。けど、ここまでの空間が丸ごと展開されてるっつーのは……とんでもねーな！」"
translation = "「이쪽도 소문은 들었다구. 하지만 이렇게 공간이 통째로 전개되어 있다니…… 장난 아니네!」"

[[dialogue]]
speaker = "アナ"
original = "「リップルさんは色々規格外なので」"
translation = "「리플 씨는 여러모로 규격 외라서요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ。でも、そのおかげで優雅なバカンスが過ごせるというものよ！」"
translation = "「후후. 하지만 그 덕분에 우아한 바캉스를 보낼 수 있는 거니까!」"

[[dialogue]]
speaker = "リップル"
original = "「そうそう、細かいことは気にせず常夏を楽しむが吉デース！」"
translation = "「맞아요 맞아요, 세세한 건 신경 쓰지 말고 상하를 즐기는 게 상책인 거예요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「リップルさん、冬はすっかりその格好なんですね」"
translation = "「리플 씨, 겨울에도 완전히 그 복장이시네요」"

[[dialogue]]
speaker = "リップル"
original = "「ハーイ！\u3000クリスマスへ向けて気合いバッチリです！\u3000クリスマスのナンタルカについては、モネから教わりマシタから！」"
translation = "「하이! 크리스마스를 향해 기합 팍팍 들어갔습니닷! 크리스마스의 거시기한 부분에 대해서는 모네에게 배웠으니까욧!」"

[[dialogue]]
speaker = "リップル"
original = "「夏パワーはチョット落ち込んでおりマスが……現在、冬デモ楽しめるリゾート結界をバリバリ開発中でーす！\u3000新しいレジャーもイロイロ考えてマース♪」"
translation = "「여름 파워는 조~금 떨어져 있습니닷만…… 현재, 겨울에도 즐길 수 있는 리조트 결계를 팍팍 개발 중인 것에요! 새로운 레저도 여러 가지 생각하고 있습니다♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「冬休みにもぜひ合宿を──と、夏に約束しましたもんね」"
translation = "「겨울 방학에도 꼭 합숙을──이라고, 여름에 약속했었으니까요」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ！\u3000覚えててくれてリップル、とってもハッピーです！」"
translation = "「하이! 기억해 줘서 리플, 너무 해피해욧!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「こっちこそニャ！\u3000猫がこたつで丸くなる時代は古いニャ、これからはサマーリゾートに逃げ込むニャ！」"
translation = "「이쪽이야말로냐! 고양이가 코타츠에서 웅크리는 시대는 구식이다냐, 이제부터는 서머 리조트로 도망치는 거다냐!」"

[[dialogue]]
speaker = "フィオナ"
original = "「特にうちのソフィアときたら、もうずっと浮足立ってしまって──」"
translation = "「특히 우리 소피아는 벌써부터 들떠버려서──」"

[[dialogue]]
speaker = "ソフィア"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "ソフィア"
original = "「青い空……白い雲……潮の香り……まぶしい日差し……そして、温暖な気候──」"
translation = "「푸른 하늘…… 하얀 구름…… 바다 내음…… 눈부신 햇살…… 그리고 온난한 기후──」"

[[dialogue]]
speaker = "ソフィア"
original = "「ここが……エデン…………！！」"
translation = "「여기가…… 에덴…………!!」"

[[dialogue]]
speaker = "unk"
original = "すごい感動ぶりだ……"
translation = "엄청나게 감동하고 있다……"

[[dialogue]]
speaker = "unk"
original = "よほど寒かったんだな"
translation = "상당히 추웠던 모양이네"

[[dialogue]]
speaker = "ソフィア"
original = "「──当然です！\u3000あの永久凍土から逃れてこれほど温暖な楽園に来られるなんて！」"
translation = "「──당연하죠! 그 영구동토에서 벗어나 이토록 따뜻한 낙원에 올 수 있다니!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ここはまさに学園──いえ、三界のオアシス！！」"
translation = "「여기는 그야말로 학원── 아니, 삼계의 오아시스!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ソフィの寒がりときたら困ったものよね～」"
translation = "「소피의 추위 타는 점은 정말 못 말린다니까~」"

[[dialogue]]
speaker = "アポロ"
original = "「ん？\u3000それじゃ、ここなら年中夏休みってことか？」"
translation = "「음? 그렇다면 여기는 일 년 내내 여름 방학이라는 건가?」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうかもしれません♪」"
translation = "「그럴지도 몰라요♪」"

[[dialogue]]
speaker = "アポロ"
original = "「おお、サイコーじゃんかよ！」"
translation = "「오오, 최고잖아!」"

[[dialogue]]
speaker = "アポロ"
original = "「にしても──やっぱ学園ってのはすごいんだな。こんな設備まで作っちまうなんてよ……！」"
translation = "「그나저나── 역시 학원이라는 건 대단하구나. 이런 설비까지 만들어 버리다니……!」"

[[dialogue]]
speaker = "アナ"
original = "「いえ、ここはリップルさんが勝手に開いてるだけです」"
translation = "「아뇨, 여기는 리플 씨가 제멋대로 열고 있을 뿐이에요」"

[[dialogue]]
speaker = "アポロ"
original = "「どういうことだ！？」"
translation = "「무슨 소리야!?」"

[[dialogue]]
speaker = "リップル"
original = "「フフフ……まあまあ、コマかいコトは気にしない！\u3000夏をご満足いただけて何ヨリで～す！」"
translation = "「후후후…… 자자, 세세한 건 신경 쓰지 말기! 여름을 만족해 주시니 무엇보다 기쁩니다~!」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーも、来てくれて感謝感激デ～ス！」"
translation = "「회장님도 와주셔서 감사 감격인 거예요!!」"

[[dialogue]]
speaker = "unk"
original = "こちらこそありがとう"
translation = "나야말로 고마워"

[[dialogue]]
speaker = "unk"
original = "外が寒すぎて"
translation = "밖이 너무 추워서 말이야"

[[dialogue]]
speaker = "マトイ"
original = "「実際、冬でもこんなに暖かいなんてすごいよ！\u3000パブリックビーチのほうもすごい盛況だって聞くし……」"
translation = "「실제로 겨울인데도 이렇게 따뜻하다니 대단해! 퍼블릭 비치 쪽도 엄청 성황이라고 들었고……」"

[[dialogue]]
speaker = "サーシャ"
original = "「リップルちゃんも大変そうね」"
translation = "「리플 짱도 힘들겠네」"

[[dialogue]]
speaker = "リップル"
original = "「全然平気デース！\u3000パブリックビーチのほうでは、シショーとオクサンも手伝ってくれてマース！」"
translation = "「전혀 괜찮아요! 퍼블릭 비치 쪽에서는 스승님과 사모님도 도와주고 있어요!」"

[[dialogue]]
speaker = "リップル"
original = "「夏の素晴らしさをわかってもらえれば、このリップルは何よりナノデス」"
translation = "「여름의 훌륭함을 알아주신다면, 이 리플은 무엇보다도 행복한 것입니다」"

[[dialogue]]
speaker = "リップル"
original = "「サ、サ。海の家もゼッサン営業中ですよ？」"
translation = "「자, 자. 바다의 집도 절찬 영업 중이라구요?」"

[[dialogue]]
speaker = "アポロ"
original = "「おおっ！？\u3000ラムネに焼きそば──サザエまであるぞ！」"
translation = "「오옷!? 라무네에 야키소바── 소라구이까지 있어!」"

[[dialogue]]
speaker = "ユウリ"
original = "「すげえな。季節外れ──って気がしないよな、ここにいると」"
translation = "「대단하구만. 계절에 안 맞다는── 느낌이 안 들어, 여기 있으면」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「浮き輪やボートだって借り放題なのよ！\u3000ほら！」"
translation = "「튜브나 보트도 마음껏 빌릴 수 있다고! 자!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「……ニャ？\u3000このパラソル、ちょっと錆びてるニャンね──潮風のせいニャか？」"
translation = "「……냐? 이 파라솔, 좀 녹슬어 있다냥── 바닷바람 때문이냐카?」"

[[dialogue]]
speaker = "リップル"
original = "「！\u3000──え……えっと……ソレは……」"
translation = "「! ──저…… 저기…… 그건……」"

[[dialogue]]
speaker = "unk"
original = "リップル？"
translation = "리플?"

[[dialogue]]
speaker = "unk"
original = "どうかした？"
translation = "무슨 일이야?"

[[dialogue]]
speaker = "リップル"
original = "「い、イエ、なんでも！\u3000シツレイしましたデース！」"
translation = "「아, 아뇨, 아무것도 아니에요! 실례했습니다!」"

[[dialogue]]
speaker = "リップル"
original = "「代わりのパラソルがコチラ！\u3000水上バイクなんかの貸し出しも自由デース、なんでもワタシに申し付けるとよいデース！」"
translation = "「대신할 파라솔은 이쪽! 수상 오토바이 같은 대여도 자유인 거예요, 뭐든 저에게 말씀하시면 되요!」"

[[dialogue]]
speaker = "アポロ"
original = "「おお！\u3000１度やってみたかったんだよな！」"
translation = "「오오! 한 번 해보고 싶었어!」"

[[dialogue]]
speaker = "リップル"
original = "「ささ、皆さんだけのエンドレスサマーを満喫シマショ～！」"
translation = "「자자, 여러분만의 엔들리스 서머를 만끽하세욧~!」"

[[dialogue]]
speaker = "unk"
original = "それから、星徒会の面々は各自で行動することになった。"
translation = "그러고 나서, 성도회 면면들은 각자 행동하게 되었다."

[[dialogue]]
speaker = "フィオナ"
original = "「いい波がきましたね──よっ……と……！」"
translation = "「좋은 파도가 왔네요── 영차……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「！\u3000フィオナ会長、サーフィンができるのですね……！\u3000さすがです──ますます尊敬してしまいます」"
translation = "「! 피오나 회장님, 서핑을 할 수 있으시군요……! 과연 대단하십니다── 더욱더 존경하게 돼요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ……最初はてんでダメでしたけど」"
translation = "「후후…… 처음에는 전혀 못 했지만요」"

[[dialogue]]
speaker = "フィオナ"
original = "「以前、リップルさんに教わってなんとか習得したんです。ソフィアなら重心を取るのも得意そうですし、きっとできますよ」"
translation = "「이전에 리플 씨에게 배워서 어떻게든 습득했답니다. 소피아라면 중심 잡는 것도 잘할 것 같으니 분명 할 수 있을 거예요」"

[[dialogue]]
speaker = "ソフィア"
original = "「まずは海面を凍らせてからですね」"
translation = "「우선 수면을 얼린 다음부터군요」"

[[dialogue]]
speaker = "アポロ"
original = "「──おい魔王！\u3000よそ見するなよ！\u3000くらえ、水でっぽーー！」"
translation = "「──어이 마왕! 한눈팔지 마! 먹어라, 물총 공격──!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あはは！\u3000狙撃作戦大成功ですね、アポロさん！」"
translation = "「아하하! 저격 작전 대성공이네요, 아폴로 씨!」"

[[dialogue]]
speaker = "unk"
original = "やったな？"
translation = "해냈겠다?"

[[dialogue]]
speaker = "unk"
original = "反撃開始だ！"
translation = "반격 개시다!"

[[dialogue]]
speaker = "アポロ"
original = "「あっはっはっ！\u3000油断してるほうが悪いんだ。悪いがこっからはステルスモードといくぜ」"
translation = "「앗하하! 방심하고 있는 쪽이 나쁜 거야. 미안하지만 여기서부터는 스텔스 모드로 가겠음」"

[[dialogue]]
speaker = "アポロ"
original = "「悔しかったらあたしに追いついてみろ！\u3000へへ、星見のシュモクザメと呼ばれたあたしの犬かきに追いつけるかな──！？」"
translation = "「분하면 나를 따라잡아 보라고! 헤헤, 호시미의 청상아리라 불린 내 개헤엄을 따라잡을 수 있을까──!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「へへ、やっぱこういう場所で食う焼きそばはサイコーだな！\u3000なあセーラさん」"
translation = "「헤헤, 역시 이런 장소에서 먹는 야키소바는 최고구만! 그렇지 세라 씨」"

[[dialogue]]
speaker = "セーラ"
original = "「わかる♪\u3000こっちのマンゴージュースも飲んでみ、飲んでみ」"
translation = "「알지♪ 이쪽 망고 주스도 마셔봐, 마셔봐」"

[[dialogue]]
speaker = "ユウリ"
original = "「ちゅーっ……うま！\u3000なんか、全部タダってのが申し訳なくなってくるな」"
translation = "「쭈욱…… 맛있다! 뭔가 전부 공짜라는 게 미안해질 정도네」"

[[dialogue]]
speaker = "セーラ"
original = "「ね！\u3000でも、肝心のリップルちゃんがそう言うから──」"
translation = "「그치! 하지만 정작 리플 짱이 그렇게 말하니까──」"

[[dialogue]]
speaker = "リップル"
original = "「……ハァ……」"
translation = "「……하아……」"

[[dialogue]]
speaker = "リップル"
original = "「…………フゥ…………」"
translation = "「…………후우…………」"

[[dialogue]]
speaker = "セーラ"
original = "（ん～……？）"
translation = "（음~……？）"

[[dialogue]]
speaker = "セーラ"
original = "（ねね、会長さん。リップルちゃんっていつもあんな感じ？）"
translation = "（있지 있지, 회장님. 리플 짱 평소에도 저런 느낌이야?）"

[[dialogue]]
speaker = "unk"
original = "いつも元気だけど……"
translation = "항상 활기차긴 한데……"

[[dialogue]]
speaker = "unk"
original = "今日はため息が多い"
translation = "오늘은 한숨이 많네"

[[dialogue]]
speaker = "セーラ"
original = "（やっぱり？\u3000なんからしくない風に見えるなーって思って。心当たりもない感じだ？）"
translation = "（역시? 왠지 리플답지 않아 보인다고 생각했거든. 짐작 가는 것도 없는 느낌이지?）"

[[dialogue]]
speaker = "セーラ"
original = "（何か悩みがあるのかも。うちらで気を配っててあげよっか）"
translation = "（무슨 고민이라도 있는 걸지도. 우리가 좀 신경 써주자）"

