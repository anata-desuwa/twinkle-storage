[[dialogue]]
speaker = "unk"
original = "第３話,気持ちよくしてあげますね♪,P"
translation = "제3화, 기분 좋게 해줄게요♪, P"

[[dialogue]]
speaker = "unk"
original = "今日もまた、シャルレーヌの呼び出しに応じてしまった。いい加減、断らなければいけないと思うのだが──。"
translation = "오늘도 또 샤를렌의 호출에 응하고 말았다. 이제 그만 거절해야 한다고 생각하지만──."

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふふ～、会長さん。いらっしゃ～い♪」"
translation = "「후후~ 회장군. 어서 와요~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それじゃあ、さっそく始めましょうか。と～っても気持ちいい、ア・レ♪」"
translation = "「그럼 바로 시작할까요. 어~엄청 기분 좋은, 그・것♪」"

[[dialogue]]
speaker = "unk"
original = "…………頼む"
translation = "…………부탁해"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふっ──くふふふっ♪」"
translation = "「쿠후── 쿠후후후♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「初めてシた時は『恥ずかしいから嫌だ』って抵抗してたのに。もう意見を変えちゃったんですかぁ？\u3000意思、よわよわ～♪」"
translation = "「처음 했을 때는 『부끄러우니까 싫어』라며 저항하더니. 벌써 마음을 바꾼 건가요~? 의지, 허접허접~♪」"

[[dialogue]]
speaker = "unk"
original = "だって、シャルレーヌが上手だから……"
translation = "그치만 샤를렌이 잘하니까……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「う～わ♪\u3000今の台詞めっちゃダサ～い♪\u3000自分が弱いだけのくせにぃ、人のせいにするとかありえな～い♪」"
translation = "「우와~♪ 방금 대사 진짜 촌스러워~♪ 자기가 약할 뿐이면서 남 탓을 하다니 말도 안 돼~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「そんなかっこ悪い会長さんには罰を与えましょうか。何をして欲しいのか、そのお口でしっかりおねだりしてください？」"
translation = "「그렇게 꼴사나운 회장군에게는 벌을 줄까요. 뭘 해줬으면 좋겠는지 그 입으로 똑바로 조르세요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……ほらぁ。恥ずかしがってないで、言え♪\u3000シャルレーヌに何して欲しいの～？」"
translation = "「……자아. 부끄러워하지 말고 말해♪ 샤를렌이 뭘 해줬으면 좋겠어~?」"

[[dialogue]]
speaker = "unk"
original = "どうか俺に……み、耳かきをしてください……！"
translation = "부디 내게…… 귀, 귀를 파줘……! "

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「よく言えましたぁ♪\u3000ふふん、だいぶ調教が進んできましたね～♪\u3000ほ～ら、私のお膝にその中身空っぽな頭を乗せてください♪」"
translation = "「잘 말했어요~♪ 후훗, 조교가 꽤 진행됐네요~♪ 자~ 제 무릎에 그 속이 텅 빈 머리를 올리세요♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふん、ふん、ふ～ん♪\u3000かき、かき、かきっ♪」"
translation = "「흥, 흥, 흐응~♪ 쓱싹, 쓱싹, 쓱싹♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ほぉら、お耳の少し奥……ここが弱いの、わかってるんですよ？\u3000かりかりかりかりかりっ♪」"
translation = "「자아, 귓구멍 살짝 안쪽…… 여기가 약한 거 다 알고 있거든요? 바스락바스락바스락♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「──くすくす♪\u3000もじもじしちゃって……釣りたてのお魚さんの真似ですかぁ？\u3000お上手ですよ～♪」"
translation = "「──쿠스쿠스♪ 꼼지락거리기는…… 갓 낚인 물고기 흉내인가요? 아주 잘하시네요~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ん～、耳かきって本当に面白い……」"
translation = "「음~ 귀 파주기는 정말 재밌어……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「最初は、話題作りの為にちょっとかじっておこうって思っただけなのになぁ。私もハマっちゃいそう♪」"
translation = "「처음에는 화젯거리를 위해 조금 해보려고 했을 뿐인데. 저도 빠져버릴 것 같아요♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「言ってませんでした？\u3000うちの香水をバーチャルＲｙｕＴｕｂｅｒに宣伝してもらおうかと思ってるんですよ」"
translation = "「말 안 했나요? 저희 향수를 버추얼 류튜버(RyuTuber)에게 홍보해달라고 할까 생각 중이거든요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ディアーブルの香水を人間界で売り出すときのために、アピールの手段は考えておかないといけませんから」"
translation = "「디아블의 향수를 인간계에 출시할 때를 위해 어필 수단은 생각해둬야 하니까요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「依頼しようと思ってる子、耳かき配信とかよくやってるんです。だから、話題作り」"
translation = "「의뢰하려고 생각 중인 아이가 귀 파주기 방송 같은 걸 자주 하거든요. 그래서 화젯거리 만들기」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「相手に親近感を覚えてもらったら、ビジネスは有利ですからね～……かきかき、かき……♪」"
translation = "「상대에게 친근감을 느끼게 하면 비즈니스는 유리하니까요~…… 쓱싹쓱싹, 쓱싹……♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ぅう～……配信用のメモ、教室に忘れちゃった……！\u3000誰にもバレてないよねっ──」"
translation = "「으으~…… 방송용 메모, 교실에 두고 왔다……! 아무한테도 안 들켰겠지──」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「かき、かき、かき……♪」"
translation = "「쓱싹, 쓱싹, 쓱싹……♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──なんかエッチなことしてる～～～～！？」"
translation = "「──왠지 야한 짓 하고 있어~~~~!?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「えっ──？」"
translation = "「엣──?」"

[[dialogue]]
speaker = "unk"
original = "耳が！？\u3000耳がぁああ！？"
translation = "귀가!? 귀가아아아!? "

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ～、びっくりした。膝枕してただけだったんだ……なんかこう、抱き合ってるみたいに見えたから……。かき、かき、かき」"
translation = "「아~ 깜짝이야. 무릎베개 해주고 있었을 뿐이구나…… 왠지 이렇게 껴안고 있는 것처럼 보여서……. 쓱싹, 쓱싹, 쓱싹」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふふ。すみません。公共の場でするのは、ちょっぴりはしたなかったかもしれませんね。かき、かき、かき」"
translation = "「후후. 죄송해요. 공공장소에서 하는 건 조금 조신하지 못했을지도 모르겠네요. 쓱싹, 쓱싹, 쓱싹」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、お兄ちゃんはジッとして座ってなきゃダメ！\u3000２人で耳かきしやすいように背筋も伸ばして！」"
translation = "「아, 오빠는 가만히 앉아 있어야 해! 둘이서 귀 파기 편하게 등도 쭉 펴고!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「そうですよ？\u3000鼓膜にまた、ぶすっといっちゃったら嫌でしょう？」"
translation = "「맞아요? 고막을 또 푹 찔러버리면 싫잖아요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……でも驚いたよ。ビジネスって色んなことするんだね」"
translation = "「……그치만 놀랐어. 비즈니스란 건 여러 가지를 하는구나」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「何事も勉強ですから……ルルカ先輩も、ずいぶんと手馴れてますね」"
translation = "「뭐든 공부니까요…… 루루카 선배도 꽤나 손에 익었네요」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まぁね！\u3000お兄ちゃんには、たまに耳かきやってあげてるから」"
translation = "「그야 그렇지! 오빠한테는 가끔 귀 파주니까」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「──ふぅん？\u3000そうだったんですか。へぇ」"
translation = "「──흐응? 그랬나요. 헤에」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "（海野辺ルルカ。一見すると普通の子だけど、何かヒミツを隠している気がするのよね……勘でしかないのだけど）"
translation = "（우미노베 루루카. 언뜻 보면 평범한 아이 같지만 뭔가 비밀을 숨기고 있는 기분이 들어…… 감일 뿐이지만）"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "（というか、会長さんに耳かきをするほどの仲だなんて……気に食わないわね。ペットの横取りは許さないわよ）"
translation = "（그나저나 회장군에게 귀를 파줄 정도의 사이라니…… 마음에 안 드네. 펫을 가로채는 건 용납 못 해）"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "（会長さんを支配するのは私だけで十分よ。全力で耳かきしちゃうんだから）"
translation = "（회장군을 지배하는 건 나 하나로 충분해. 전력으로 귀를 파줄 테니까）"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（シャルレーヌちゃん……良い子だとは思うんだけど、な～んか裏表がある気がするんだよね。いや、全然根拠はないんだけど……）"
translation = "（샤를렌 짱…… 착한 아이 같긴 한데 왠~지 겉과 속이 다른 기분이 든단 말이지. 아니, 전혀 근거는 없지만……）"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（ていうかお兄ちゃんとこんなに仲良しだなんて初耳だよ！\u3000負けてられない……！）"
translation = "（그보다 오빠랑 이렇게 사이좋다니 처음 듣는 이야기야! 질 수 없지……!）"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（ここはシャルレーヌちゃんより上手な耳かきを披露しないとね。Ｖチューバー、汐ルカルカのテクを今こそ……！）"
translation = "（여기서 샤를렌 짱보다 잘하는 귀 파주기를 선보여야겠어. 버추얼 유튜버 시오 루카루카의 테크닉을 지금이야말로……!）"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、そうだ。そのコラボしようと思ってるＶチューバーって誰なの？\u3000有名な人？」"
translation = "「아, 맞다. 그 콜라보하려고 하는 버추얼 유튜버가 누구야? 유명한 사람?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「汐ルカルカって人ですね。なかなか面白い方で──」"
translation = "「시오 루카루카라는 분이에요. 꽤 재미있는 분이라──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ええぇっ！？\u3000あ、手が滑って──」"
translation = "「에에엣!? 아, 손이 미끄러져서──」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「きゃっ！？\u3000あ、つい耳の奥まで──」"
translation = "「꺄악!? 아, 그만 귀 안쪽까지──」"

[[dialogue]]
speaker = "unk"
original = "両耳がぁあああ！？"
translation = "양쪽 귀가아아아!? "

[[dialogue]]
speaker = "unk"
original = "ハマりかけていた耳かきだったが、強烈な挟み撃ちを食らい、しばらくの間トラウマになるのだった……。"
translation = "빠져들 뻔했던 귀 파주기였으나 강렬한 협공을 당해 한동안 트라우마가 되고 말았다……."

