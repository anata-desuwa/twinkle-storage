[[dialogue]]
speaker = "unk"
original = "俺とヒマワリが付き合い出して、半月ほどが経ったある日。"
translation = "나와 히마와리가 사귀기 시작하고 보름 정도가 지난 어느 날."

[[dialogue]]
speaker = "unk"
original = "下校の途中、ヒマワリは耳を疑うようなことを言い出した。"
translation = "하굣길 도중에 히마와리는 귀를 의심할 만한 소리를 꺼냈다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「ねーねー、会長さん。えっちって、すごーく気持ちいいんだよね？」"
translation = "「저기 저기, 회장님. 에치는 엄청나게 기분 좋은 거지?」"

[[dialogue]]
speaker = "クロト"
original = "「……はい？」"
translation = "「……네?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えっちだよ、えっち。セックス～とか子作り～って言った方がわかりやすい？」"
translation = "「에치 말이야, 에치. 섹스나 아기 만들기라고 말하는 게 더 이해하기 쉬워?」"

[[dialogue]]
speaker = "クロト"
original = "「だ、大丈夫、わかるよ。ヒマワリの口からいきなりすごい言葉が出たから驚いただけで」"
translation = "「아, 아니 괜찮아, 알아들어. 히마와리 입에서 갑자기 엄청난 말이 나와서 놀랐을 뿐이야.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えー？\u3000あたしだって年頃の女の子だもん。そのくらい知ってるし、興味津々だよー」"
translation = "「에이? 나도 사춘기 여자애라고. 그 정도는 알고 있고 관심도 폭발이야─」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「気持ちよすぎるから、悪いってわかってても不倫とかいけないことしちゃうんだろうしなー……」"
translation = "「너무 기분 좋으니까 나쁜 줄 알면서도 불륜이나 못된 짓을 저지르는 걸 테니까 말이야─……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「うーん、一度シてみないことにはわかんないよね。会長さんはえっち、シたことある？」"
translation = "「으음, 한 번 해보지 않고서는 모르겠단 말이지. 회장님은 에치 해본 적 있어?」"

[[dialogue]]
speaker = "クロト"
original = "「いや、ないけど……」"
translation = "「아니, 없는데……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「良かったー♪\u3000会長さんに先越されてたら、ちょっとショックだったからさー」"
translation = "「다행이다♪ 회장님이 선수 쳤으면 조금 쇼크였을 거거든─」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「彼氏以外の人とはシたくないから、ね、お願い♪\u3000あたしとえっち、シてみない？」"
translation = "「남친 말고 다른 사람이랑은 하고 싶지 않으니까. 자, 부탁이야♪ 나랑 에치 해보지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "その翌日、俺は好奇心旺盛で自由奔放なヒマワリと男女の一線を越えた。"
translation = "그다음 날, 나는 호기심 왕성하고 자유분방한 히마와리와 남녀의 선을 넘었다."

[[dialogue]]
speaker = "unk"
original = "気持ちいいことに貪欲な年頃だ。恋人同士のセックスなんて最高の快感を知ってしまったら、もう歯止めが利かない。"
translation = "기분 좋은 것에 굶주린 나이다. 연인 사이의 섹스라는 최고의 쾌감을 알아버리면 이제 제동이 걸리지 않는다."

[[dialogue]]
speaker = "unk"
original = "週末に一度、お互いの部屋でしていたのが自然と回数が増えていき、週に２回、３回、やがて毎日に。"
translation = "주말에 한 번 서로의 방에서 하던 것이 자연스레 횟수가 늘어났고 주 2회, 3회, 이윽고 매일이 되었다."

[[dialogue]]
speaker = "unk"
original = "下校後にしていたのも、どうしても我慢できなくなり、ついには昼休みにトイレでして以来。"
translation = "방과 후에 하던 것도 도저히 참을 수 없게 되어 결국 점심시간에 화장실에서 한 이후로."

[[dialogue]]
speaker = "unk"
original = "屋上や体育倉庫と人目を忍びながらもスリルを求めてしまい、校内でするのが、すっかり癖になってしまった。"
translation = "옥상이나 체육 창고 등 남의 눈을 피해 가며 스릴을 찾게 되었고 학교 안에서 하는 것이 완전히 버릇이 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "付き合って数ヶ月が経った今となっては──"
translation = "사귄 지 수개월이 지난 지금에 와서는──"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えへへ、会長さんの教室に入るの初めてー。これが会長さんの机なんだねー」"
translation = "「에헤헤, 회장님 교실에 들어온 건 처음이야─ 이게 회장님 책상이구나─」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いつも、この席でマジメに勉強してるんだよね？\u3000あたしが会長さんと同い年だったら、同じ教室で授業を受けてたのかな」"
translation = "「항상 이 자리에서 진지하게 공부하고 있는 거지? 내가 회장님이랑 동갑이었다면 같은 교실에서 수업을 들었으려나.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「隣の席になってー、授業中にちらちら顔を覗いたりしてー、消しゴム借りるのもドキドキしちゃってたりしてー。そんな思い出作りしてみたかったなー」"
translation = "「옆자리가 돼서 수업 중에 힐끔힐끔 얼굴을 훔쳐보기도 하고─ 지우개 빌리는 것도 두근거려 하기도 하고─ 그런 추억 만들기 해보고 싶었네─」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ね、会長さん。今日は、ここでえっちしよ？」"
translation = "「저기, 회장님. 오늘은 여기서 에치 하자?」"

[[dialogue]]
speaker = "クロト"
original = "「ここで！？\u3000それはさすがにマズいって！」"
translation = "「여기서!? 그건 역시 위험하다고!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えー、なんでー？\u3000附属の女の子、連れ込んでるから？\u3000将来有望な子を案内してるだけって言えば大丈夫だよ」"
translation = "「에—, 왜애—? 부속 여자아이를 데려와서? 장래가 유망한 아이를 안내하고 있을 뿐이라고 말하면 괜찮아.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あー、でも、あたしと会長さんがえっちした匂い、残っちゃう？」"
translation = "「아—, 하지만, 나랑 회장님이 섹스한 냄새, 남아버릴까?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「マジメに授業受けてても、あたしとここでえっちしたこと、思い出しちゃうねー♪」"
translation = "「성실하게 수업을 듣고 있어도, 나랑 여기서 섹스한 거, 떠올려 버리겠네—♪」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「みんなはマジメに授業受けてるのにー、会長さんだけ、あたしとのえっちを思い出して、ち○ちんおっきしちゃうんだろうねー<emoji=heart04>」"
translation = "「다들 성실하게 수업을 듣고 있는데—, 회장님만 나랑 한 섹스를 떠올려서, 자지 커져버리겠지—<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「──あ♪\u3000想像しちゃった？\u3000会長さんのち○ちんの辺り、むくむく膨らんでるー」"
translation = "「──아♪ 상상해버렸어? 회장님 자지 주변이 뭉클뭉클 부풀어 오르고 있어—」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さんって煽られると、すぐにえっちなスイッチ入っちゃうよね。あたしより大人なのに、辛抱足りないぞー。そんな会長さんだから、大好きなんだけど。ちゅっ<emoji=heart04>」"
translation = "「회장님은 도발당하면 금방 야한 스위치가 켜져 버리네. 나보다 어른인데 참을성이 부족하다니까—. 그런 회장님이라서 정말 좋아하지만. 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ね、想い出作り、シよ♪」"
translation = "「있지, 추억 만들기, 하쟝♪」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あはは……あたしのおま○こ、とろ～ってお汁垂れちゃってるや……イジらなくても、準備オッケーみたい」"
translation = "「아하하…… 내 보지, 걸쭉~하게 애액이 흘러나오고 있어…… 만지지 않아도 준비 완료인 것 같네.」"

[[dialogue]]
speaker = "unk"
original = "ヒマワリは俺を誘うように女の子の恥ずかしい部分を全て曝け出し、俺の机に手をかけた。"
translation = "히마와리는 나를 유혹하듯이 여자아이의 부끄러운 부분을 전부 드러내고, 내 책상에 손을 얹었다."

[[dialogue]]
speaker = "クロト"
original = "「本当にここでしちゃうつもりなんだね」"
translation = "「정말로 여기서 할 생각인가 보구나.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしだって、さすがに恥ずかしいんだよー？\u3000こんなに広げたら、おま○こ丸見えになっちゃうし……でも、もう我慢できないんだもん」"
translation = "「나라도 역시 부끄럽다구—? 이렇게 벌리면 보지가 다 보여버리고…… 하지만 이제 참을 수 없는걸.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さんのち○ちん欲しくて、ひくひくしちゃってる……ミウにだって、こんな恥ずかしいカッコ、見せたことないよ……会長さんだけの特別なんだから」"
translation = "「회장님 자지가 갖고 싶어서 벌름거리고 있어…… 미우한테도 이런 부끄러운 모습 보여준 적 없어…… 회장님만의 특별한 거니까.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さんのこと、好きすぎて……彼女がここまで求めてるんだから、恥かかさないで欲しいな……」"
translation = "「회장님을 너무 좋아해서…… 여자친구가 이렇게까지 원하고 있으니까, 창피 주지 않았으면 좋겠는데……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「でも会長さんだって、する気まんまんじゃん。いつもよりおっきくなってるー<emoji=heart04>」"
translation = "「그치만 회장님도 하고 싶은 마음 가득하잖아. 평소보다 커져 있어—<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「先っちょからとろとろがあふれて……ぶっとい血管も浮き出て……すっごくえっちなち○ちんだね」"
translation = "「끝부분에서 진득한 게 넘쳐흐르고…… 굵은 혈관도 불끈 솟아있고…… 엄청 야한 자지네.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「くんくん……あたしのとこまで臭いが漂ってくるよ……明日まで残っちゃったら大変だぁ」"
translation = "「킁킁…… 나 있는 곳까지 냄새가 풍겨와…… 내일까지 남아버리면 큰일 나겠다.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さぁん……早くぅ、早く挿入れてよぉ……誰か来ちゃったら大変だし、早めに終わらせちゃお？」"
translation = "「회장님아…… 빨리이, 빨리 넣어줘어…… 누가 오면 큰일이니까, 일찍 끝내버리자?」"

[[dialogue]]
speaker = "unk"
original = "ここまで来たら『やめる』という選択肢はなかった。俺はヒマワリの濡れた膣穴へとペニスを近づける。"
translation = "여기까지 오면 『그만둔다』라는 선택지는 없었다. 나는 히마와리의 젖은 질 구멍으로 페니스를 가져간다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「あぅん……<emoji=heart04>\u3000会長さんの上向きすぎだよぅ……ん、んん……あたしのおま○こ、もうちょっと下だってばぁ」"
translation = "「아웅……<emoji=heart04> 회장님 거 너무 위를 향하고 있어어…… 음, 으음…… 내 보지는 좀 더 아래라니까아.」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん。もうちょっとお尻上げられる？」"
translation = "「미안. 엉덩이 좀 더 들어줄 수 있어?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「しょーがないなぁ……んー……あっ<emoji=heart04>\u3000今、ち○ちん当たった……会長さん、そこだよ……」"
translation = "「어쩔 수 없네에…… 음—…… 앗<emoji=heart04> 지금 자지 닿았어…… 회장님, 거기야…….」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んっ<emoji=heart04>\u3000もう、焦らさないでよぉ……そのまま、あっ……ちょっと挿入った……挿入って、きたぁっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 정말, 애태우지 마아…… 그대로, 앗…… 조금 들어갔어…… 들어가고, 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ひんっ――ひぁ、あっ、んぁあぁっ……！？」"
translation = "「히잉──히아, 앗, 응아아아앗……!?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁっ、はぁ、はぁっ……<emoji=heart04>\u3000あははっ、おま○こぬるぬるだから、簡単に、入っちゃったね……<emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04> 아하핫, 보지가 미끌미끌하니까 쉽게 들어가 버렸네……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んぅくっ……<emoji=heart04>\u3000はっ、あ……やっぱし、会長さんのち○ちん、いつもよりカタくて、重いね……お腹にズゥンって感じる……<emoji=heart04>」"
translation = "「응윽……<emoji=heart04> 하, 아…… 역시 회장님 자지, 평소보다 딱딱하고 묵직하네…… 배 속으로 즈웅하고 느껴져……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さん、ゆっくり動いて……あたしのおま○こ、ち○ちんでほじほじして<emoji=heart04>」"
translation = "「회장님, 천천히 움직여줘…… 내 보지를 자지로 구석구석 파헤쳐줘<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んぁ、あっ……はぁ、あっ……これ、これぇ……これ欲しかったのぉ……<emoji=heart04>\u3000んぁ、きもち、いっ……<emoji=heart04>」"
translation = "「응아, 앗…… 하아, 앗…… 이거, 이거어…… 이거 원했어어……<emoji=heart04> 응아, 기분, 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あ、はぁ、はーっ……！\u3000ヒマワリの膣内、狭くて、熱くて、めちゃくちゃ、きもち、いいっ……はぁぁ……！」"
translation = "「아, 하아, 하아……! 히마와리의 질 안, 좁고 뜨거워서 엄청나게 기분 좋아…… 하아아……!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あははっ……会長さん、めっちゃ息荒いし、すっごくコーフンしてるじゃん……はっ、はぁ……教室で、こんなことしちゃダメなのにね……<emoji=heart04>」"
translation = "「아하핫…… 회장님, 숨 엄청 거칠고 완전 흥분했잖아…… 하아, 하아…… 교실에서 이런 짓 하면 안 되는데 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「やっちゃダメなことって、コーフンしちゃうよねぇ……<emoji=heart04>\u3000ごめんね、会長さん、ワルぅい彼女で<emoji=heart04>」"
translation = "「하면 안 되는 짓이라 더 흥분되는 거겠지이……<emoji=heart04> 미안해 회장님, 나쁜 여자친구라서<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んぁ、はぁ……あたしも、すっごくきもちいーよ……<emoji=heart04>\u3000会長さんとあたしがぴったりくっついちゃってるみたい。ち○ちんのカタチ、覚えちゃった」"
translation = "「응아, 하아…… 나도 엄청 기분 좋아……<emoji=heart04> 회장님이랑 내가 딱 달라붙어 있는 것 같아. 자지 모양, 기억해버렸어.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「前から入れるのと後ろから入れるのって、ち○ちんの当たるとこ、全然違うよね……会長さんは、どっちが好き……？」"
translation = "「앞으로 넣는 거랑 뒤로 넣는 거, 자지가 닿는 곳이 전혀 다르네…… 회장님은 어느 쪽이 좋아……?」"

[[dialogue]]
speaker = "クロト"
original = "「どっちも好きだよ。ヒマワリとするセックスは全部好きだ……！」"
translation = "「둘 다 좋아해. 히마와리랑 하는 섹스는 전부 좋다……!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んひゃぁん……<emoji=heart04>\u3000会長さん、それはズルだよぉ。そんな嬉しいこと言われたら、あたしのおま○こキュゥンってしちゃうじゃん……<emoji=heart04>」"
translation = "「응햐앙……<emoji=heart04> 회장님, 그건 반칙이야아. 그런 기쁜 말을 들으면 내 보지가 큥— 하고 울려버리잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んぅいひっ……<emoji=heart04>\u3000すっごぉ……<emoji=heart04>\u3000おま○こ、広げられるぅ……あ、あぅ、あっ……はぁ、はっ……あ、動いてる……ち○ちんが、お腹引っ掻いてるぅ……<emoji=heart04>」"
translation = "「응으이힛……<emoji=heart04> 굉장해……<emoji=heart04> 보지가 벌려지고 있어…… 아, 아우, 앗…… 하아, 하앗…… 아, 움직이고 있어…… 자지가 배 안을 긁고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁ、はっ……会長さん、あたしもね、あたしも……好きだよ、だぁい好き……<emoji=heart04>」"
translation = "「하아, 하앗…… 회장님, 나도, 나도…… 좋아해, 정말 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いつもは優しいのに……えっちに夢中になると、余裕なくなっちゃうとこも、だぁい好きっ……<emoji=heart04>」"
translation = "「평소엔 다정한데…… 섹스에 열중해서 여유 없어지는 점도 정말 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしの体が、会長さんをケダモノにしちゃってるのって、すっごくえっちだよねぇ……<emoji=heart04>」"
translation = "「내 몸이 회장님을 짐승으로 만들고 있다는 거, 엄청 야하네에……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「大好きなあたしのおま○こ、いっぱい使っていいからね<emoji=heart04>\u3000気持ちよくしてあげるから、会長さんもあたしのこと、いっぱい気持ちよくして<emoji=heart04>」"
translation = "「정말 좋아하는 내 보지, 잔뜩 써도 되니까<emoji=heart04> 기분 좋게 해줄 테니까, 회장님도 나 잔뜩 기분 좋게 해줘<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あ、あ、あぁぁ……<emoji=heart04>\u3000はっ、はぁっ、はっ、はぁん……会長さんきもちい……ち○ちんきもちいいよぉ<emoji=heart04>」"
translation = "「아, 아, 아아아……<emoji=heart04> 하앗, 하아, 하아, 하앙…… 회장님 기분 좋아…… 자지 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はひっ、おま○この深ぁいとこ、ち○ちんでぐちゅぐちゅほじられるの、きもひ、いいっ<emoji=heart04>\u3000きもちいいことしか、考えられらんなくなっちゃうよぉぉ……<emoji=heart04>」"
translation = "「하히잇, 보지 깊은 곳을 자지로 꾸덕꾸덕 파헤쳐지는 거 기부운 조항<emoji=heart04> 기분 좋은 생각밖에 안 들게 돼버려어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あは……ち○ちんもおま○こもおっぱいも丸出しでさ、もし、ここで誰か来ちゃったら、言い訳できないよね」"
translation = "「아하…… 자지도 보지도 가슴도 다 드러내놓고 말이야, 만약 여기서 누가 오면 변명 못 하겠지.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「新星の会長さんが、附属の学生連れ込んで、自分の教室で淫行なんて、誰かに見つかっちゃったら大問題──」"
translation = "「신성의 회장님이 부속생을 데려와서 자기 교실에서 음행이라니, 누군가에게 들키기라도 하면 대문제──」"

[[dialogue]]
speaker = "女生徒Ａ"
original = "「明日提出って、なんでそういう大事な課題を教室に忘れるかなー」"
translation = "「내일 제출이라니, 왜 그런 중요한 과제를 교실에 두고 오는 거야.」"

[[dialogue]]
speaker = "女生徒Ｂ"
original = "「ごめんって。あー、このままだと今晩は徹夜だよー」"
translation = "「미안하다니까. 아—, 이대로라면 오늘 밤은 밤샘이야—」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ッ……！？\u3000廊下に誰かいるっ……！？」"
translation = "「윽……!? 복도에 누가 있어……!?」"

[[dialogue]]
speaker = "unk"
original = "ヒマワリとのセックスに夢中になりすぎてて、廊下の気配にも足音にもまったく気づいていなかった。"
translation = "히마와리와의 섹스에 너무 열중한 나머지, 복도의 기척이나 발소리도 전혀 눈치채지 못하고 있었다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「この声って……会長さんのクラスの子？」"
translation = "「이 목소리는…… 회장님 반 아이들?」"

[[dialogue]]
speaker = "クロト"
original = "「ち、違うと思うけど……」"
translation = "「아, 아니라고 생각하는데……」"

[[dialogue]]
speaker = "女生徒Ａ"
original = "「しょうがないな。私もちょっとは手伝ってあげるから」"
translation = "「어쩔 수 없네. 나도 조금은 도와줄 테니까.」"

[[dialogue]]
speaker = "女生徒Ｂ"
original = "「マジ！\u3000恩に着るー!\u3000今度カフェでランチ奢るからさ！」"
translation = "「정말! 고마워—! 다음에 카페에서 점심 쏠게!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えっちしてるとこ見つかったらヤバヤバだよね──んっ？\u3000ちょ、待って、会長さん……ち○ちんムクムク膨らんでない……？」"
translation = "「섹스하는 거 들키면 위험위험하지──응? 잠깐, 기다려봐 회장님…… 자지 뭉클뭉클 부풀고 있지 않아……?」"

[[dialogue]]
speaker = "unk"
original = "息を殺して、教室の前を通る２人の足音に耳を澄ましているその間も、ヒマワリの膣壁は強くペニスを締めつけてくる。"
translation = "숨을 죽이고 교실 앞을 지나가는 두 사람의 발소리에 귀를 기울이는 동안에도, 히마와리의 질벽은 강하게 페니스를 조여온다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「ひぁ……あ、やっ、だめだってば……今、ち○ちん動かしちゃ──きゃぅんッ！？」"
translation = "「히아…… 아, 안 돼, 안 된다니까…… 지금 자지 움직이묜── 캬운앗!?」"

[[dialogue]]
speaker = "女生徒Ａ"
original = "「んー？\u3000なんか仔犬の鳴き声みたいの聞こえなかった？」"
translation = "「응—? 뭔가 강아지 짖는 소리 같은 거 안 들렸어?」"

[[dialogue]]
speaker = "女生徒Ｂ"
original = "「気のせいじゃん？\u3000校舎に犬がいるわけないでしょ」"
translation = "「기분 탓 아니야? 교사에 개가 있을 리 없잖아.」"

[[dialogue]]
speaker = "女生徒Ａ"
original = "「それもそっか。さーて、何奢ってもらおっかな」"
translation = "「그것도 그렇네. 자— 뭐 얻어먹을까나.」"

[[dialogue]]
speaker = "unk"
original = "そして、足音は遠ざかっていった。"
translation = "그리고 발소리는 멀어져 갔다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「あっ……あんっ……<emoji=heart04>\u3000見つかっちゃうかと思って、ドッキドキしたぁ……！\u3000会長さんのクラスの子だったら大ピンチだったよ……」"
translation = "「앗…… 안앗……<emoji=heart04> 들킬까 봐 두근두근했어……! 회장님 반 아이들이었으면 대핀치였다구……」"

[[dialogue]]
speaker = "クロト"
original = "「生きた心地がしなかった」"
translation = "「살얼음판을 걷는 기분이었어.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そんなら動いちゃダメでしょ！？\u3000会長さんのち○ちん、ずーっとあたしの中でどくんどくんしてたし……もっと大きな声出ちゃうとこ、だったんだからっ……<emoji=heart04>」"
translation = "「그럼 움직이면 안 되잖아!? 회장님 자지, 계속 내 안에서 두근두근거렸고…… 더 큰 소리가 나올 뻔했다니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「見つかんなかったから、結果オーライだけど……はー……<emoji=heart04>\u3000でも、緊張とスリルって紙一重だよね……ゾクゾクしすぎて、おま○こ、キュンキュンしちゃった<emoji=heart04>」"
translation = "「안 들켰으니까 결과적으로는 다행이지만…… 하—……<emoji=heart04> 하지만 긴장과 스릴은 종이 한 끗 차이네…… 너무 짜릿해서 보지가 큥큥해버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁ……ゆっくりラブラブしてたら、また戻ってきちゃうかもだし、早めに終わらせよ……？」"
translation = "「하아…… 천천히 꽁냥대다가는 다시 돌아올지도 모르니까, 빨리 끝내자……?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ここでやめるのは、なしだから、ね……？\u3000あたしのおま○こ、もうできあがっちゃってるもん……<emoji=heart04>」"
translation = "「여기서 그만두는 건 없는 거다, 응……? 내 보지는 이미 달아오를 대로 달아올랐는걸……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁっ……んっ……最後までシてくれなきゃ、満足できないし……会長さんだって、せーしぴゅっぴゅしなきゃ、収まんないでしょ……？」"
translation = "「하아…… 응…… 끝까지 해주지 않으면 만족 못 하고…… 회장님도 정액 찍찍 싸지 않으면 안 풀리잖아……?」"

[[dialogue]]
speaker = "unk"
original = "何度もしているおかげか、男の体の仕組みをよく理解ってる。ここまで刺激されていたら、最後までしなきゃ収まりがつかない。"
translation = "몇 번이나 해본 덕분인지 남자의 몸 구조를 잘 알고 있다. 여기까지 자극받았다면 끝까지 하지 않고서는 수습이 되지 않는다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「でも、えっちな声は控えめにしなきゃね。んっ、はあぁ……おっきな声出したら、今度こそ聞かれちゃうかもだし──」"
translation = "「그치만 야한 소리는 참아야겠지. 응, 하아…… 큰 소리 내면 이번에야말로 들릴지도 모르고──」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「──んぅうぅぅぅぅん～～～っ<emoji=heart04>」"
translation = "「──응으으으으으으음~~~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一刻も早く射精に至りたくて、俺は一気にピストンを加速させた。"
translation = "한시라도 빨리 사정에 이르고 싶어서, 나는 단숨에 피스톤을 가속시켰다."

[[dialogue]]
speaker = "ヒマワリ"
original = "「ひぅ、あっ、んぁんっ<emoji=heart04>\u3000あははっ、えっちな声、全然、我慢できないやぁ……聞かれてないよねぇ……？」"
translation = "「히우, 앗, 응앙앗<emoji=heart04> 아하핫, 야한 소리 전혀 참을 수가 없어어…… 안 들렸겠지……?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ふぅんっ……はぁ、はひぃん……き、きもひ、いっ<emoji=heart04>\u3000そこ、んぁっ、はぁ、あっ……奥ぅ……子宮のとこ、コリコリされるの、好き、好きぃっ……<emoji=heart04>」"
translation = "「후웅…… 하아, 하히인…… 기, 기부운 조항<emoji=heart04> 거기, 응앗, 하아, 앗…… 깊은 곳…… 자궁 있는 데 꼬들꼬들하게 만져지는 거 좋아, 좋아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁっ、はぅぅん……！\u3000もっとぉ……もっと、ぐりぐりしてっ……<emoji=heart04>\u3000はぁ、はぅんっ、会長さんとあたしの体、溶け合って、くっついちゃってるねっ……<emoji=heart04>」"
translation = "「하아, 하우운……! 더…… 더 짓눌러줘……<emoji=heart04> 하아, 하운앗, 회장님이랑 내 몸, 녹아들어서 하나가 된 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁ、はぁん……<emoji=heart04>\u3000だめ、勝手に、えっちな声っ、出ちゃう……抑えらんなくってぇ……ふぅっ、ん、んぅ……くふぅぅんっ<emoji=heart04>」"
translation = "「하아, 하아앙……<emoji=heart04> 안 돼, 멋대로 야한 소리가 나와버려…… 억제가 안 돼서어…… 후으, 음, 음으…… 쿠후우운<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁ、あっ……きもち、いっ……はぅん……好きぃっ……！\u3000会長さん、会長さぁん、好きっ、しゅきだよぉっ……<emoji=heart04>」"
translation = "「하아, 앗…… 기분 좋아…… 하운…… 좋아해……! 회장님, 회장님아, 좋아, 죠아해애……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んんんんぅっ！？\u3000ち、ち○ちん、膨れてぅ……<emoji=heart04>\u3000はぁ、出そ？\u3000射精、しちゃいそうなのかなぁ<emoji=heart04>」"
translation = "「으으으읏!? 자, 자지 부풀고 이써……<emoji=heart04> 하아, 내보내줄까? 사정해버릴 것 같은 걸까아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、ヒマワリ、あんまり我慢できそうにない……！」"
translation = "「미안, 히마와리, 더는 못 참을 것 같아……!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いいよ、我慢しないでっ……<emoji=heart04>\u3000早めに終わらせなきゃだし、あ、あたしも……ぞわぞわぁってきもちいいの、キテるからぁ……<emoji=heart04>」"
translation = "「괜찮아, 참지 마……<emoji=heart04> 빨리 끝내야 하기도 하고, 나, 나도…… 오싹오싹하게 기분 좋은 거 오고 있으니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしもイッ、イキそ、だからっ……<emoji=heart04>\u3000会長さんのせーし、中に出されたら、絶対イッちゃうから……ね<emoji=heart04>」"
translation = "「나도 가, 갈 것 같으니까……<emoji=heart04> 회장님 정액 안에 싸지면 절대 가버릴 테니까…… 응?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「膣内で、いいいのか……？」"
translation = "「질 안에 해도 괜찮은 거야……?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んぁ、はぁっ、はーっ、いいよ、このままっ……あたしなら、だいじょうぶだからっ……中に出しちゃって、平気だよ……<emoji=heart04>」"
translation = "「응아, 하앗, 하아—, 괜찮아 이대로…… 나라면 괜찮으니까…… 안에 싸버려도 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「制服とか机にかけちゃダメじゃんっ……？\u3000会長さんのえっちな匂い、染みついちゃうしぃっ<emoji=heart04>」"
translation = "「교복이나 책상에 묻으면 안 되잖아—? 회장님의 야한 냄새 배어버릴 테고오<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしの子宮がねっ、せーしごくごくしたいって、キュンキュンしちゃってるのぉ……だから、このまま、中っ、中に出してぇ……<emoji=heart04>」"
translation = "「내 자궁이 말이야, 정액 꿀꺽꿀꺽하고 싶다고 큥큥거리고 있어어…… 그러니까 이대로 안에, 안에 싸줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「このままっ、中に出しちゃっていいからっ……会長さんと一緒にきもちよくなりたいの、会長さんのあったかぁいの、ちょうらぁい……ねっ、ねっ<emoji=heart04>」"
translation = "「이대로 안에 싸버려도 되니까…… 회장님이랑 같이 기분 좋아지고 싶어, 회장님의 따뜻한 거 주우세용…… 응? 응?<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ふぁあぁぁ！？\u3000あっ、ぁあっ、あ、あっあっ、あぁ<emoji=heart04>\u3000それっ、きもちよすぎちゃう……きもちいいの、癖に、なっちゃうってばぁ……<emoji=heart04>」"
translation = "「후아아아!? 앗, 아앗, 아, 앗앗, 아아<emoji=heart04> 그거 너무 기분 좋아져버려…… 기분 좋은 거 버릇 돼버린다니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あ、あっ<emoji=heart04>\u3000あ、あっ、キテる……すごいのキテるっ……<emoji=heart04>\u3000やだ、あたしの方が先に、イッちゃう、イッちゃう、イッちゃぅうぅぅぅっ……<emoji=heart04>」"
translation = "「아, 앗<emoji=heart04> 아, 앗, 오고 있어…… 대단한 게 오고 있어…… 싫어, 내가 먼저 가, 가버려, 가버려, 가버려어어어어어읏……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もう少しだけ、我慢してくれ……！」"
translation = "「조금만 더 참아줘……!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「だ、だめっ……<emoji=heart04>\u3000我慢、できなっ、イッちゃう、おま○こ、おま○こイッちゃう、イッぢゃうってぇっ……<emoji=heart04>\u3000あんっ！？\u3000あーっ、あぁーっ<emoji=heart04>」"
translation = "「안, 안 돼……<emoji=heart04> 참을 수 없어, 가버려, 보지, 보지 가버려, 가버린다구우……<emoji=heart04> 응앗!? 아—앗, 아아—앗<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ひぎゅっ！？\u3000パンパン激しっ、はぁ、はぁんっ<emoji=heart04>\u3000ち○ちん、ち○ちんっ、おっきぃのっ、好きっしゅきっだぁいしゅきぃっ<emoji=heart04>」"
translation = "「히규웃!? 팍팍 격렬해, 하아, 하앙앗<emoji=heart04> 자지, 자지이, 큰 거 좋아 죠아 정말 죠아아<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁ、あんっ<emoji=heart04>\u3000あっ、出そぉ？\u3000ちょうだいっ、せぇしっ……<emoji=heart04>\u3000びゅびゅぅぅぅって、アッツぅいの、出して、出してっ、出してぇえぇっ<emoji=heart04>」"
translation = "「하아, 아앙<emoji=heart04> 앗, 나올 것 같아? 줘, 정액……<emoji=heart04> 뷰뷰뷰우우욱 하고 뜨거운 거 내줘, 내줘, 내줘어어어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んっ、ん、んんーっ<emoji=heart04>\u3000イッ、イッちゃう、イッちゃぅ……お、お、おま○こイッ、イッちゃ――<emoji=heart04>」"
translation = "「응, 응, 으으윽<emoji=heart04> 가, 가버려, 가버려…… 보, 보지 가, 가버──<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んんぅうぅぅっ！？\u3000イクッ、イクイク、イクッ、イッ──くぅぅぅぅうぅぅんっっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「으으으으으읏!? 간다, 간다간다, 간다, 가버려어어어어어어억<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んぁあぁああぁぁぁあぁぁ～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아아~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁーっ！\u3000はぁ、はぁ、はぁーっ！\u3000はぁっ、あ、はぁっ……んぅく、はっ、はぁっ、はぁーっ……<emoji=heart04>」"
translation = "「하아—! 하아, 하아, 하아—! 하앗, 아, 하앗…… 응욱, 하, 하아, 하아—……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁ、はぁっ、あぁぁ、すごぉい……いっぱい出てるよぉっ……<emoji=heart04>\u3000びゅくっびゅくぅって、ち○ちん脈打って……お腹、いっぱいになってくよぅ……<emoji=heart04>」"
translation = "「하아, 하앗, 아아아, 굉장해…… 잔뜩 나오고 있어어……<emoji=heart04> 뷰윽뷰으윽 하고 자지가 맥동하면서…… 배 속이 가득 차올라가……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁっ、はーっ、はーっ……会長さんの教室で……会長さんの机で……会長さんに愛されながら……イッちゃったぁ……<emoji=heart04>\u3000今までで一番すごいえっちだったかも……<emoji=heart04>」"
translation = "「하아, 하아, 하아…… 회장님 교실에서…… 회장님 책상에서…… 회장님한테 사랑받으면서…… 가버렸어어……<emoji=heart04> 지금까지 중 제일 대단한 섹스였을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁっ、はーっ、はーっ……<emoji=heart04>\u3000すっごく、きもちよかったよぉー……ありがと、会長さん<emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04> 엄청 기분 좋았어어—…… 고마워 회장님<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はぁ、んぁ……ち○ちん入ったままなの、きもひいい……あっ、抜いちゃうの？\u3000あぁんっ……<emoji=heart04>」"
translation = "「하아, 응아…… 자지 들어있는 채인 거 기분 조항…… 앗, 빼버리는 거야? 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ち○ちん抜けちゃった……わっ、奥からせーしあふれてるよ……た～っぷり出たんだね<emoji=heart04>\u3000興奮しちゃった？」"
translation = "「자지 빠져버렸다…… 와, 안쪽에서 정액이 흘러넘치고 있어…… 가~득 나왔네<emoji=heart04> 흥분해버렸어?」"

[[dialogue]]
speaker = "クロト"
original = "「過去イチ興奮した……」"
translation = "「역대급으로 흥분했어……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えへへ、会長さんなのに、いっけないんだぁ<emoji=heart04>」"
translation = "「에헤헤, 회장님인데 그러면 못써어<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あ、はぁ、はっ……ヤバいね……こんなきもちいいえっち知っちゃったら、またここでしたくなっちゃうなー<emoji=heart04>」"
translation = "「아, 하아, 하앗…… 위험하네…… 이런 기분 좋은 섹스 알아버리면, 또 여기서 하고 싶어지겠어—<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でも見つかりそうになったからなぁ……」"
translation = "「하지만 들킬 뻔했으니까 말이지……」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えー？\u3000おっきなリスクを背負うから、リターンがおっきいんだよー？」"
translation = "「에—? 커다란 리스크를 짊어지니까 리턴이 큰 거라구—?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ま、いっか♪\u3000最高の想い出、ありがとね」"
translation = "「뭐, 상관없나♪ 최고의 추억 고마워」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さん、だぁい好き<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「회장님, 정말 좋아해<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "面白いこと＆楽しいことが大好きで、好奇心が旺盛すぎるヒマワリ。"
translation = "재미있는 것과 즐거운 것을 정말 좋아하고 호기심이 너무 왕성한 히마와리."

[[dialogue]]
speaker = "ヒマワリ"
original = "「でも、会長さんがまたここでシたくなっちゃったら、あたしはいつでもオッケーだからね<emoji=heart04>」"
translation = "「하지만 회장님이 또 여기서 하고 싶어지면, 난 언제든지 오케이니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな彼女が性の悦びを覚えたら、こうなるのは必然だったわけで──もしかすると俺は、とんでもない過ちを犯してしまったのかもしれないし。"
translation = "그런 그녀가 성의 쾌락을 알게 된다면 이렇게 되는 것은 필연이었다── 어쩌면 나는 엄청난 잘못을 저질러 버린 것일지도 모르겠다."

[[dialogue]]
speaker = "unk"
original = "この教室で再びシてしまうのも、そう遠くないのかもしれない。"
translation = "이 교실에서 다시 하게 되는 것도 그리 머지않은 일일지도 모른다."

