[[dialogue]]
speaker = "unk"
original = "第１話,海で遊ぶぞ！,P"
translation = "제1화, 바다에서 놀자!, P"

[[dialogue]]
speaker = "unk"
original = "新星・流星の星徒会メンバーで、リゾート合宿をしていた頃──"
translation = "신성·유성의 성도회 멤버들과 리조트 합숙을 하던 시절──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うおお～！\u3000夏だ～！\u3000おい魔王、こっちだこっち！\u3000もたもたしてたら夏が逃げちゃうぞ！」"
translation = "「우오오~! 여름이다~! 어이 마왕, 여기다 여기! 머뭇거리다간 여름이 도망가버린다고!」"

[[dialogue]]
speaker = "unk"
original = "外は冬だ"
translation = "밖은 겨울이다"

[[dialogue]]
speaker = "unk"
original = "ここだけはね"
translation = "여기만 말이지"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「細かいことを気にするな！\u3000この中にいる限り、あたしらの夏は終わらないのさ」"
translation = "「세세한 건 신경 쓰지 마! 이 안에 있는 한 우리의 여름은 끝나지 않는 거야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「しかし……リップルってすごいやつなんだな！\u3000ここまでの結界領域を展開できるなんて……星騎士的にもすげー戦力なんじゃないか！？」"
translation = "「그나저나…… 리플이란 녀석 대단하구나! 이 정도의 결계 영역을 전개할 수 있다니…… 성기사적으로도 엄청난 전력이 아니겠어!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「さて、と。まーなんかたまに寒い風が吹くっつってたけど、海に潜ればやり過ごせるよな！」"
translation = "「자, 그럼. 뭐 가끔 찬바람이 분다고는 했지만, 바다에 잠기면 넘길 수 있겠지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000泳げるのかって？\u3000ふっ、愚問だな。流星ライダーアポロには水中フォームもあるんだ──水中戦だってお手の物だぜ！」"
translation = "「응? 수영할 수 있냐고? 훗, 우문이군. 유성 라이더 아폴로에게는 수중 폼도 있다고── 수중전도 식은 죽 먹기지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「さーて、何して遊ぼっかなあ……ん？」"
translation = "「자~ 그럼 뭐 하고 놀까나…… 응?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──おい魔王、こっちに変なゴーグルが置いてあったぞ。こりゃなんだ？」"
translation = "「──어이 마왕, 여기에 이상한 고글이 놓여 있었어. 이건 뭐야?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「シュノーケル？\u3000ほー……なるほど、こいつを着けたまま海ん中を観察するのか……それも面白そうだな！」"
translation = "「스노클? 호오…… 과연, 이걸 쓴 채로 바닷속을 관찰하는 건가…… 그것도 재미있겠네!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おーい！\u3000フィーオナー！」"
translation = "「어─이! 피오나─!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あら、姉さん──会長さんも」"
translation = "「어머, 언니── 회장님도」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000これからスケジューリングするんだ。一緒に向こうのサンゴ礁でも見に行こうぜ！」"
translation = "「오우! 이제부터 스케줄 짤 거야. 같이 저쪽 산호초라도 보러 가자고!」"

[[dialogue]]
speaker = "unk"
original = "真面目か？"
translation = "진지한가?"

[[dialogue]]
speaker = "unk"
original = "シュノーケリングね"
translation = "스노클링이네"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ、いいですよ。ここは水も透き通っていて綺麗ですし……楽しみですね」"
translation = "「후후, 좋아요. 여기는 물도 투명해서 아름답고…… 기대되네요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ。海の生き物がたくさん見れるぞ！」"
translation = "「아아. 바다 생물을 잔뜩 볼 수 있을 거야!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ソレが終わったらユウリ達も入れて、砂浜でビーチバレー決勝戦だ！\u3000水鉄砲の撃ち合いもやりたいし──」"
translation = "「그게 끝나면 유우리 일행도 넣어서 백사장에서 비치발리볼 결승전이다! 물총 싸움도 하고 싶고──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう。姉さんったら、はしゃぎすぎて怪我しないでくださいね──」"
translation = "「정말. 언니도 참, 너무 들떠서 다치지 마세요──」"

[[dialogue]]
speaker = "unk"
original = "それからもアポロはみんなを誘い、さまざまな海のレジャーを堪能した……。"
translation = "그 후로도 아폴로는 모두를 권유하며 다양한 바다 레저를 만끽했다……."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふーっ……あー、くたびれた」"
translation = "「후─…… 아, 고단하다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしはお姉さんなのに、ついつい子どもみたいに遊んじまった……やれやれだぜ」"
translation = "「나는 언니인데도 그만 아이처럼 놀아버렸네…… 참 내다」"

[[dialogue]]
speaker = "unk"
original = "十分子どもだ"
translation = "충분히 아이다"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ま、姉としてのイゲンを見せるのは次からだな」"
translation = "「뭐, 언니로서의 위엄을 보여주는 건 다음부터지」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「にしても、だ。海の家──って、なんで海の家なんだ？\u3000海の持ち物なのか？」"
translation = "「그건 그렇고 말이야. 바다의 집──은 왜 바다의 집인 거야? 바다 소유물인가?」"

[[dialogue]]
speaker = "unk"
original = "そういうものだから"
translation = "그런 거니까"

[[dialogue]]
speaker = "unk"
original = "そういう側面もある"
translation = "그런 측면도 있지"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ほーん……ま、覚えやすくていいけどな」"
translation = "「호오…… 뭐, 외우기 쉬워서 좋네」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000ああ──海に来るのは、あたしがまだ<b>起きてた</b>頃以来だ」"
translation = "「응? 아아── 바다에 오는 건 내가 아직 <b>깨어있었을</b> 무렵 이후 처음이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「だから……フィオナと一緒にああして遊べる日がまた来るなんて、思ってもみなかった。ホントに……嬉しいんだ」"
translation = "「그래서…… 피오나와 함께 저렇게 놀 수 있는 날이 다시 올 줄은 생각지도 못했어. 정말로…… 기뻐」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「でもよ。時々いいのかって考えちまう」"
translation = "「하지만 말이야. 가끔 괜찮은 걸까 생각하게 돼」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あんな風に暴れたあたしが、こんな幸せを受け取ってていいのかって……」"
translation = "「그렇게 날뛰었던 내가 이런 행복을 받아도 되는 걸까 하고……」"

[[dialogue]]
speaker = "unk"
original = "アポロ……"
translation = "아폴로……"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あーっよくない！\u3000よくないぞあたし！\u3000ダメ！\u3000これ以上はすとっぷだ！」"
translation = "「아─ 안 돼! 안 된다고 나! 안 돼! 더 이상은 스톱이다!」"

[[dialogue]]
speaker = "unk"
original = "急にどうした"
translation = "갑자기 왜 그래"

[[dialogue]]
speaker = "unk"
original = "なんで？"
translation = "왜?"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フィオナに言われてたんだ。１人でいる時に思い詰めるなって。悩むなら自分がいる時にしろ、って」"
translation = "「피오나가 말했었어. 혼자 있을 때 너무 깊이 생각하지 말라고. 고민할 거면 자기가 있을 때 하라고 말이야」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王が隣にいるとはいえ──あたしとしたことが、約束を破るところだった。やっぱアポロ様はいつだって天衣無縫じゃないとな！」"
translation = "「마왕이 옆에 있다고는 하지만── 나답지 않게 약속을 어길 뻔했네. 역시 아폴로 님은 언제나 천의무봉해야지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──よおし、元気回復！」"
translation = "「──좋아, 활력 회복!」"

[[dialogue]]
speaker = "unk"
original = "アポロは勢いよく立ち上がり、そのまま砂浜を駆け出してしまった。"
translation = "아폴로는 기세 좋게 일어서서 그대로 백사장을 달려 나가 버렸다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おーい、こっちだ魔王！\u3000今度はビーチフラッグ対決だ！\u3000早く来ないと不戦敗にするからな～！」"
translation = "「어이, 여기다 마왕! 이번엔 비치 플래그 대결이다! 빨리 안 오면 부전패로 처리할 거니까~!」"

[[dialogue]]
speaker = "unk"
original = "いつまでも遊び足りないアポロに、気力の限り付き合うこととなった……。"
translation = "언제까지고 놀아도 부족한 아폴로에게, 기력이 다할 때까지 상대해 주게 되었다……."

