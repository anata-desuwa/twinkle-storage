[[dialogue]]
speaker = "unk"
original = "第４話,いつか変わる呼び方,P"
translation = "제4화, 언젠가 바뀔 호칭, P"

[[dialogue]]
speaker = "unk"
original = "とある休日──アナがいつものように俺の家へ遊びに来た。"
translation = "어느 휴일── 아나가 평소처럼 내 집으로 놀러 왔다."

[[dialogue]]
speaker = "unk"
original = "一緒に食事をとったり、最近読んだ本の内容を語ったりと、まったりとした午後を過ごしていたのだけれど……"
translation = "함께 식사를 하거나, 최근 읽은 책의 내용을 이야기하거나 하며, 느긋한 오후를 보내고 있었는데……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「すぅ……すぅ……」"
translation = "「새근…… 새근……」"

[[dialogue]]
speaker = "unk"
original = "膝の上で寝ちゃったな"
translation = "무릎 위에서 잠들어 버렸네"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んん……お父さん、ダメ、ですよー……甘やかしたら……」"
translation = "「으응…… 아빠, 안 돼요…… 버릇 나빠지면……」"

[[dialogue]]
speaker = "unk"
original = "アナが寝言をこぼすなんて珍しい。"
translation = "아나가 잠꼬대를 하는 건 드문 일이다."

[[dialogue]]
speaker = "unk"
original = "『お父さん』と言うからには、天界にいるご両親のことを夢に見ているのだろうか？"
translation = "『아빠』라고 하는 걸 보니, 천계에 있는 부모님 꿈을 꾸고 있는 걸까?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むにゃ……まったく……あなたは……いつも、そうなんですから……すぅ……すぅう……」"
translation = "「우냐…… 정말이지…… 당신은…… 항상, 그러니까요…… 새근…… 새그으운……」"

[[dialogue]]
speaker = "unk"
original = "……どんな夢を見てるんだろう？"
translation = "……어떤 꿈을 꾸고 있는 걸까?"

[[dialogue]]
speaker = "unk"
original = "──あなた？"
translation = "──당신?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ぁっ。ン、ンン……あれ、夢……？」"
translation = "「……앗. 으, 으음…… 어라, 꿈……?」"

[[dialogue]]
speaker = "unk"
original = "おはよう、アナ"
translation = "안녕, 아나"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んー……ふぁあっ……。すみません、うたた寝しちゃってたみたいです……」"
translation = "「음~…… 하아암……. 죄송해요, 깜빡 잠들었나 봐요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長のお膝、ベストプレイス賞だけでなく、寝具としてもグッドデザイン賞、受賞ですね。ついついリラックスしてしまって……」"
translation = "「회장님의 무릎, 베스트 플레이스 상뿐만 아니라, 침구로서도 굿 디자인 상, 수상감이네요. 그만 긴장이 풀려버려서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん……？\u3000どうかしましたか、会長。じっと私の顔を見て……何か付いてます？」"
translation = "「음……? 왜 그러세요, 회장님. 빤히 제 얼굴을 보고…… 뭐 묻었나요?」"

[[dialogue]]
speaker = "unk"
original = "夢でも見てた？"
translation = "꿈이라도 꿨어?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「夢……？\u3000見ていたような、いなかったような……」"
translation = "「꿈……? 꾸었던 것 같기도 하고, 아닌 것 같기도 하고……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私が『お父さん』って呟いていたんですか？\u3000はて……天界の両親の夢なんて、見ていたでしょうか……」"
translation = "「제가 『아빠』라고 중얼거렸나요? 어라…… 천계의 부모님 꿈이라도, 꾸고 있었던 걸까요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「『あなた』という呼び名もあった？\u3000んー……？\u3000あなた、なんて呼ぶ相手は、天界にいないのですが」"
translation = "「『당신』이라는 호칭도 있었다고요? 음~……? 당신, 이라고 부를 상대는, 천계에 없는데요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「待ってください、気になるので思い出します……えっと……んー……？」"
translation = "「잠깐만요, 신경 쓰이니까 기억해낼게요…… 에또…… 음~……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──そうです。人間界でしたね、桜の花がたくさんありましたから……あれは……公園？\u3000そう、公園ですね」"
translation = "「──맞아요. 인간계였네요, 벚꽃이 많이 있었으니까…… 저건…… 공원? 네, 공원이네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私は学園を卒業していたと思います。制服を着ていませんでした。それで隣に、お父さんが──ぁぁあっ！？」"
translation = "「저는 학원을 졸업했던 것 같아요. 교복을 입고 있지 않았거든요. 그래서 옆에, 아빠가── 아아앗!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お、思い出し、ました……あ、あわわ……私、なんという夢を……！？」"
translation = "「기, 기억났, 어요…… 아, 아와와…… 저, 무슨 꿈을……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「か、会長。えっと、その……夢の内容、本当に、聞きたいですか……？」"
translation = "「회, 회장님. 에또, 그…… 꿈 내용, 정말로, 듣고 싶으세요……?」"

[[dialogue]]
speaker = "unk"
original = "気になるなぁ"
translation = "신경 쓰이네"

[[dialogue]]
speaker = "unk"
original = "アナのお父さんの夢なんでしょ？"
translation = "아나의 아빠 꿈이었지?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ、違うんです。その……お父さんって言うのは……私の父のことじゃありません」"
translation = "「아니요, 달라요. 그…… 아빠라는 건…… 제 아버지를 말하는 게 아니에요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「えっと……お父さんイコール……会長です」"
translation = "「에또…… 아빠 이퀄…… 회장님이에요」"

[[dialogue]]
speaker = "unk"
original = "……俺っ！？"
translation = "……나!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「その……会長が『お父さん』になっていたので……。子供の前だから、お父さん、と……」"
translation = "「그…… 회장님이 『아빠』가 되어 있어서…… 아이 앞이니까, 아빠, 라고……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「『あなた』というのは……子供が私たちの傍から離れたので。２人きりの時は、そうやって呼んでいるみたい……でした」"
translation = "「『당신』이라는 건…… 아이가 우리 곁에서 떨어졌을 때. 둘만 있을 때는, 그렇게 부르고 있는 모양……이었어요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「な、何だか尋常じゃないくらい恥ずかしいのですが……！？\u3000夢を見るにしたって、ああまでリアルに見なくても……！！」"
translation = "「저, 저기 왠지 비정상적일 정도로 부끄러운데요……!? 꿈을 꾼다 해도, 그렇게까지 리얼하게 꾸지 않아도……!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──っ！？\u3000も、もうっ、何ですか、その顔は……！\u3000に、にやにやと笑って。あんまり私の顔、見ないでください……！」"
translation = "「──윽!? 저, 정말, 뭐예요 그 표정은……! 시, 싱글벙글 웃고. 너무 제 얼굴, 보지 말아 주세요……!」"

[[dialogue]]
speaker = "unk"
original = "将来、本当にそうなったらいいな"
translation = "장래에, 정말로 그렇게 된다면 좋겠네"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ま、また会長は、そうやってストレートに……」"
translation = "「또, 또 회장님은 그렇게 스트레이트로……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でも……はい。私も、そうなったら……素敵だなって、思います」"
translation = "「하지만…… 네. 저도 그렇게 된다면…… 멋질 거라고 생각해요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「夢の世界は、１０年後くらい、だったと思います。モンスターが出ない平和になった世界で……会長と結婚していました」"
translation = "「꿈속 세계는 10년 뒤쯤이었던 것 같아요. 몬스터가 나오지 않는 평화로운 세상에서…… 회장님과 결혼해 있었죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「公園の近くに家があって。以前に、子供がたくさん欲しいって話したこと、ありましたよね」"
translation = "「공원 근처에 집이 있고. 이전에 아이를 많이 갖고 싶다고 이야기했던 적, 있었죠?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「大家族が住めるような、大きな家でした。あの日、砂浜で一緒に作った大きな家みたいな……」"
translation = "「대가족이 살 수 있을 법한 커다란 집이었어요. 그날, 백사장에서 함께 만들었던 커다란 집 같은……」"

[[dialogue]]
speaker = "unk"
original = "世界を平和にして、実現させたい"
translation = "세상을 평화롭게 해서 실현시키고 싶다"

[[dialogue]]
speaker = "unk"
original = "頑張ろう"
translation = "힘내자"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね。今はまだ学生ですし、リクリエのことも決着がついていませんが……」"
translation = "「그렇네요. 지금은 아직 학생이고, 리크리에 일도 매듭지어지지 않았지만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さっきの夢を、本当のことにできたら私も嬉しいです」"
translation = "「방금 전의 꿈을 현실로 만들 수 있다면 저도 기쁠 거예요」"

[[dialogue]]
speaker = "unk"
original = "アナが見た夢を現実にできるよう、俺はこれからも懸命に戦い抜こう。そう誓うのだった──"
translation = "아나가 꾼 꿈을 현실로 만들 수 있도록, 나는 앞으로도 필사적으로 싸워나가자. 그렇게 맹세하는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "と、ここで終わればいい話。どんな話にもオチはあるのだ。"
translation = "라고, 여기서 끝나면 좋은 이야기. 어떤 이야기든 뒷이야기(오치)는 있는 법이다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ちなみに会長。確かに私、子供が大勢欲しいとは言いましたが……まさかサッカーチームができるくらい産ませるとは驚きでした」"
translation = "「그나저나 회장님. 확실히 제가 아이를 많이 갖고 싶다고는 했습니다만…… 설마 축구팀을 만들 수 있을 정도로 낳게 하실 줄은 놀랐어요」"

[[dialogue]]
speaker = "unk"
original = "えぇえ！？"
translation = "에에에!? 코"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「軽く両手を超えていましたよ。でも大丈夫。私は子供が大好きです。愛する人との子なら、いくらでもバッチコイ」"
translation = "「가볍게 양손을 넘기고 있었답니다. 하지만 괜찮아요. 저는 아이를 정말 좋아하거든요. 사랑하는 사람과의 아이라면 얼마든지 밧치코이(덤벼라)예요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふふっ♪\u3000どこまでを正夢にしていただけるのでしょうか？\u3000楽しみですね……『あなた』<emoji=heart04>」"
translation = "「후훗♪ 어디까지를 태몽으로 만들어 주실 건가요? 기대되네요…… 『당신』<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──リクリエだけじゃなく、俺は本当に色々と頑張らなければいけないらしかった。"
translation = "──리크리에뿐만 아니라, 나는 정말로 여러모로 힘내야만 할 것 같았다."

[[dialogue]]
speaker = "unk"
original = "うん……頑張るぞ……頑張ろう……！"
translation = "응…… 힘내자…… 힘내는 거야……!"

