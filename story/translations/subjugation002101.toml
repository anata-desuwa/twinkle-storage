[[dialogue]]
speaker = "リーリア"
original = "「センパイ、こんにちマジカル～☆\u3000それじゃヒミツの会議、始めましょうか♪」"
translation = "「선배, 안녕 매지컬~☆ 그럼 비밀 회의, 시작해 볼까요♪」"

[[dialogue]]
speaker = "unk"
original = "ネビュラとコラプサー事件について情報共有するために、リーリアが代表としてやってきた。"
translation = "네뷸라와 콜랩서 사건에 대해 정보를 공유하기 위해, 리리아가 대표로서 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "のだが──"
translation = "그런데──"

[[dialogue]]
speaker = "リーリア"
original = "「はぁ……」"
translation = "「하아……」"

[[dialogue]]
speaker = "unk"
original = "リーリア、どうかした？"
translation = "리리아, 무슨 일 있어?"

[[dialogue]]
speaker = "リーリア"
original = "「ああ、いえ、すみません。ちょっと個人的な考え事が……」"
translation = "「아아, 아니요, 죄송합니다. 조금 개인적인 고민이 있어서……」"

[[dialogue]]
speaker = "リーリア"
original = "（まさかあの人を監視していたのが、あんな理由だったなんて……バレないといいけど……）"
translation = "（설마 그 사람을 감시하고 있었던 게, 그런 이유였다니…… 들키지 않으면 좋겠는데……）"

[[dialogue]]
speaker = "リーリア"
original = "（いやでも、いずれわかることだし、早い方がいいのかも……。だけど絶対ショックだろうしなぁ……ううん、今考えても仕方ないし、一旦忘れよう）"
translation = "（아니 그래도, 언젠가 알게 될 일이고, 빠른 편이 나으려나……. 하지만 분명 충격받을 테고…… 으응, 지금 고민해 봤자 별수 없지, 일단 잊자.）"

[[dialogue]]
speaker = "リーリア"
original = "「……コホン。失礼しました、本題に入りましょう。コラプサー事件のことですよね」"
translation = "「……코흠. 실례했습니다, 본론으로 들어가죠. 콜랩서 사건 말인데요.」"

[[dialogue]]
speaker = "リーリア"
original = "「コラプサーの存在が明るみになったのは、キサナの一件でした。彼女の星騎士襲撃に始まり、続いてリーナ、ヴァレリーとの邂逅」"
translation = "「콜랩서의 존재가 밝혀진 것은 키사나의 건이었습니다. 그녀의 성기사 습격으로 시작해, 이어서 리나, 발레리와의 조우.」"

[[dialogue]]
speaker = "リーリア"
original = "「さらにイングリット、ジュリエッテとも遭遇しました。今までに判明した構成メンバーは５人です」"
translation = "「거기에 잉그리드, 줄레엣타와도 마주쳤죠. 지금까지 판명된 구성 멤버는 5명입니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「そして、ジュリエッテが語った目的は──」"
translation = "「그리고, 줄레엣타가 말한 목적은──」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「コラプサーの目的は救世。あなた方と同じく世界を守ることでございます」"
translation = "「콜랩서의 목적은 구세. 당신들과 마찬가지로 세계를 지키는 것입니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「──な～んて言ってましたけど、それなら星騎士の襲撃も、世界を救うためなんですかね？\u3000言ってることとやってることがちぐはぐですよ」"
translation = "「──라면서 말하긴 했지만, 그렇다면 성기사 습격도 세계를 구하기 위해서라는 걸까요? 하는 말이랑 행동이 앞뒤가 안 맞아요.」"

[[dialogue]]
speaker = "リーリア"
original = "「あと、彼女たちの目的だけじゃなくて、その力についても判明したことがありました」"
translation = "「그리고, 그녀들의 목적뿐만 아니라 그 힘에 대해서도 판명된 것이 있었어요.」"

[[dialogue]]
speaker = "unk"
original = "彼女たちの守護星はブラックホールだった"
translation = "그녀들의 수호성은 블랙홀이었다"

[[dialogue]]
speaker = "リーリア"
original = "「はい。でもブラックホールを守護星に持つ星騎士なんて、今まで流星学園にも新星学園にもいませんでした。ネビュラの記録にもありません」"
translation = "「네. 하지만 블랙홀을 수호성으로 가진 성기사 같은 건, 지금까지 유성학원에도 신성학원에도 없었어요. 네뷸라의 기록에도 없구요.」"

[[dialogue]]
speaker = "リーリア"
original = "「そんな稀少な存在が、少なくとも５人も集まっているとなると、力が発現する特別な条件とかがありそうです」"
translation = "「그런 희귀한 존재가 적어도 5명이나 모여 있다는 건, 힘이 발현되는 특별한 조건 같은 게 있을 것 같아요.」"

[[dialogue]]
speaker = "リーリア"
original = "「そしてネビュラからも報告です。以前イングリットおよびジュリエッテと遭遇した特殊なアステラから、わずかですが魔力が感じられました」"
translation = "「그리고 네뷸라에서도 보고입니다. 이전에 잉그리드 및 줄레엣타와 조우했던 특수한 아스텔라에서, 미미하게나마 마력이 느껴졌어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「つまり──魔女が関わっている可能性があります」"
translation = "「즉── 마녀가 관여되어 있을 가능성이 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "魔女がコラプサー事件に？"
translation = "마녀가 콜랩서 사건에?"

[[dialogue]]
speaker = "リーリア"
original = "「はい。それもネビュラに属していない、<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>だと考えられます」"
translation = "「네. 그것도 네뷸라에 속해 있지 않은 <ruby>낙오 마녀<rt>야가</rt></ruby>라고 생각돼요.」"

[[dialogue]]
speaker = "リーリア"
original = "「もちろん、センパイのお母様のことじゃないですよ？\u3000あの人がコラプサーに関わる理由がありませんし」"
translation = "「물론, 선배의 어머님 말씀이 아니에요. 그분이 콜랩서에 관여할 이유가 없으니까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>の行方はネビュラでも追っているところです。魔女がご迷惑をかけてすみませんが、続報を待っていただければと」"
translation = "「<ruby>낙오 마녀<rt>야가</rt></ruby>의 행방은 네뷸라에서도 쫓고 있는 중이에요. 마녀가 폐를 끼쳐서 죄송하지만, 속보를 기다려 주시면 해요.」"

[[dialogue]]
speaker = "unk"
original = "わかった。よろしく頼むよ"
translation = "알겠어. 잘 부탁해"

[[dialogue]]
speaker = "リーリア"
original = "「はい、おまかせマジカルです☆」"
translation = "「네, 맡겨만 달라구 매지컬이에요☆」"

[[dialogue]]
speaker = "リーリア"
original = "「それにしても、星力を吸収しちゃうなんて、コラプサーの能力はほんとチートですよね」"
translation = "「그나저나, 성력을 흡수해 버리다니, 콜랩서의 능력은 정말 치트네요.」"

[[dialogue]]
speaker = "リーリア"
original = "「光だって吸い込んじゃうブラックホールなら、納得といえば納得ですけど。星騎士の天敵とはよく言ったものです」"
translation = "「빛조차 빨아들여 버리는 블랙홀이라면, 납득이 가긴 하지만요. 성기사의 천적이라는 말이 딱 어울려요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ブラックホールがどうとか聞こえましたけど……何かありましたの？」"
translation = "「블랙홀이 어쩌구 하는 소리가 들렸습니다만…… 무슨 일 있었나요?」"

[[dialogue]]
speaker = "リーリア"
original = "「あ、ヒルディオーネ先輩、こんにちマジカル～☆」"
translation = "「아, 힐디오네 선배, 안녕 매지컬~☆」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「失礼。聞き耳を立てるつもりはなかったのですけど、気にかかるワードが耳に入ってきたものですから」"
translation = "「실례. 엿들을 생각은 없었습니다만, 신경 쓰이는 단어가 귀에 들어온지라.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「光すら吸い込むブラックホール……どのように誕生するのかはご存じ？」"
translation = "「빛조차 빨아들이는 블랙홀…… 어떻게 탄생하는지는 알고 계시는지?」"

[[dialogue]]
speaker = "unk"
original = "すみません、あまり詳しくないです"
translation = "미안, 별로 자세히는 몰라"

[[dialogue]]
speaker = "リーリア"
original = "「星が死んじゃうとなんやかんやでブラックホールになっちゃう……くらいの認識でした」"
translation = "「별이 죽으면 어찌어찌해서 블랙홀이 된다…… 정도의 인식이었어요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ、死した星の成れの果てという認識で合っていますわ」"
translation = "「네, 죽은 별의 최후라는 인식으로 맞습니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「恒星は核融合を繰り返してエネルギーを生み出しますが、その過程でより重い物質が生成されます」"
translation = "「항성은 핵융합을 반복해서 에너지를 만들어내지만, 그 과정에서 더 무거운 물질이 생성됩니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「この核融合が止まるにつれ、恒星はその自重で収縮していきます。すると引力が強くなり、耐えきれなくなった星が爆発する。これが超新星爆発ですわ」"
translation = "「이 핵융합이 멈춤에 따라, 항성은 그 자중으로 수축해 갑니다. 그러면 인력이 강해져서, 견디지 못한 별이 폭발한다. 이것이 초신성 폭발입니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「しかし、その中でも格別巨大な質量を持つ星は、さらに収縮を続けます」"
translation = "「하지만 그중에서도 각별히 거대한 질량을 가진 별은 더욱 수축을 계속합니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「そして密度が大きくなり続け……超強力な引力を持つに至ったのがブラックホールですわ」"
translation = "「그리고 밀도가 계속 커져서…… 초강력한 인력을 갖게 된 것이 블랙홀입니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「なんとなくわかりますけど、想像はできないですね……宇宙の話はスケールが大きすぎてピンとこないです」"
translation = "「어느 정도 이해는 가지만 상상은 안 되네요…… 우주 이야기는 스케일이 너무 커서 감이 안 와요.」"

[[dialogue]]
speaker = "リーリア"
original = "「でも勉強になりました。さすがヒルディオーネ先輩、天体にマジカル詳しいんですね～☆」"
translation = "「그래도 공부가 됐어요. 역시 힐디오네 선배, 천체에 대해 매지컬하게 자세하시네요~☆」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私の千園寺家の事業のひとつとして、宇宙開発がありますから、自然と学びますのよ」"
translation = "「저희 센온지 가문의 사업 중 하나로 우주 개발이 있으니까요, 자연스럽게 배운답니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「『千園寺ギャラクティック』ですね。つい先日も無人探査衛星の打ち上げに成功したとか」"
translation = "「『센온지 갤럭틱』이군요. 바로 요 전에도 무인 탐사 위성 발사에 성공했다던가.」"

[[dialogue]]
speaker = "unk"
original = "先輩も五名門の一角だったね"
translation = "선배도 오명문의 일원이었지"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ、『人材』を司るヴィーナスさんの『九浄家』、食品を含めた『流通』を得意とするサランさんの『桜十路家』もそうですわ」"
translation = "「네, 『인재』를 관장하는 비너스 님의 『쿠죠 가문』, 식품을 포함한 『유통』을 장기로 하는 사란 씨의 『사쿠라코지 가문』도 그렇습니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「『半導体』産業をメインにしていた『<ruby>百目騎<rt>どうめき</rt></ruby>家』は、数年前に本家が没落したそうですけど……」"
translation = "「『반도체』 산업을 메인으로 하던 『도메키 가문』은 몇 년 전에 본가가 몰락했다고 들었습니다만……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「当家の宇宙開発でも半導体は欠かせない物ですから、当時は衝撃でしたわね」"
translation = "「저희 가문의 우주 개발에서도 반도체는 빠질 수 없는 물건이니까요, 당시엔 충격이었죠.」"

[[dialogue]]
speaker = "リーリア"
original = "「みんな気さくなのでふっつう～に接しちゃってますけど、本当ならお近づきになるのも恐れ多い人たちばかりなんですよね～……」"
translation = "「다들 싹싹해서 평범하게 대하고 있긴 하지만, 사실대로라면 가까이 다가가기도 황송한 분들뿐이라니까요~……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっ、それ程でもありま──あら？\u3000連絡が入っていましたわ」"
translation = "「오~홋홋홋, 그 정도까지는 아니── 어라? 연락이 들어왔어요.」"

[[dialogue]]
speaker = "リーリア"
original = "「どちらさまからです～？」"
translation = "「누구한테 온 거예요~?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「実家からの呼び出しでしたわ。過保護なのも困りものですわね」"
translation = "「본가에서 호출이었습니다. 과보호인 것도 곤란하네요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「次の機会には美味しい紅茶とお茶菓子で優雅なティータイムにいたしましょう。では、失礼いたしますわ」"
translation = "「다음 기회에는 맛있는 홍차와 티 푸드로 우아한 티타임을 가지도록 하지요. 그럼, 실례하겠어요」"

[[dialogue]]
speaker = "リーリア"
original = "「は～い、さよならマジカル～☆」"
translation = "「네~, 안녕 매지컬~☆」"

[[dialogue]]
speaker = "リーリア"
original = "「それじゃ伝えるべきことは伝えましたし、私たちもここでお開きにしましょうか」"
translation = "「그럼 전해야 할 건 전했으니, 우리도 여기서 해산할까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、私がコラプサーに襲われたら、白馬の王子様みたいに助けに来てくださいね♪」"
translation = "「선배, 제가 콜랩서에게 습격당하면 백마 탄 왕자님처럼 구하러 와주셔야 해요♪」"

[[dialogue]]
speaker = "unk"
original = "馬の被り物でも探しておこうかな"
translation = "말 머리 탈이라도 찾아둬야겠네"

[[dialogue]]
speaker = "unk"
original = "白馬の王子……ユーリスかな"
translation = "백마 탄 왕자…… 유리인가"

[[dialogue]]
speaker = "リーリア"
original = "「も～、そこはかっこいいセリフを返してくださいよ～っ」"
translation = "「증말~, 거기선 멋있는 대사로 받아쳐 줘야죠~」"

[[dialogue]]
speaker = "unk"
original = "最後は軽口を叩き合いつつ、この場はお開きとなったのだった。"
translation = "마지막은 농담을 주고받으며, 이 자리는 마무리된 것이었다."

