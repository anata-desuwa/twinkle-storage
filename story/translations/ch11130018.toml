[[dialogue]]
speaker = "unk"
original = "完全下校時刻が迫る黄昏時。俺が１人で執務をしているところにやってきたのは──"
translation = "완전 하교 시간이 임박한 황혼 무렵. 내가 혼자 집무를 보고 있을 때 찾아온 건──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やぁ、まだ星徒会の仕事をしているのかい？」"
translation = "「야, 아직 성도회의 일을 하고 있는 건가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、<b>レナーテ</b>か。今日の分はもう終わるところ。そっちは何してたんだ？」"
translation = "「아아, <b>레나테</b>인가. 오늘 할 일은 이제 막 끝날 참이야. 너는 뭘 하고 있었어?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサと模擬戦をしてきたところさ。私の勝ちだったけどね」"
translation = "「아가사와 모의전을 하고 온 참이야. 내가 이겼지만 말이지」"

[[dialogue]]
speaker = "unk"
original = "今も梨緒に何度も勝負を挑まれているそうだけど、レナーテも少し楽しそうだ。"
translation = "지금도 리오에게 몇 번이고 승부를 걸리고 있는 듯하지만, 레나테도 조금 즐거워 보인다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おや？\u3000熱い視線を感じるね？」"
translation = "「어라? 뜨거운 시선을 느끼는데?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う……」"
translation = "「으……」"

[[dialogue]]
speaker = "unk"
original = "戦闘服の露出が大きい星騎士は他にもいるが、レナーテは一際肌が出ている。"
translation = "전투복의 노출이 큰 성기사는 다른 이들도 있지만, 레나테는 유난히 피부가 많이 드러나 있다."

[[dialogue]]
speaker = "unk"
original = "形のいい胸や、引き締まったお腹、際どい股間に、張りのある太もも……どこをとっても魅力的で、つい視線が吸い寄せられる。"
translation = "모양이 좋은 가슴과, 탄탄하게 조여진 배, 아슬아슬한 사타구니에, 탱탱한 허벅지……어디를 보아도 매력적이어서, 무심코 시선이 빨려 들어간다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「別にごまかさなくていいよ。君なら近くでじっくり見てもいいからね」"
translation = "「굳이 얼버무리지 않아도 돼. 너라면 가까이서 실컷 봐도 괜찮으니까」"

[[dialogue]]
speaker = "unk"
original = "そんなこと言われると、余計に目が離せなくなってしまう。"
translation = "그런 말을 들으니, 더욱 눈을 뗄 수 없게 되어 버린다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「む。可能性が見えた。劣情を催した君が、私を無理やり押し倒してしまう可能性が──なんてね」"
translation = "「음. 가능성이 보였어. 열등감을 느낀 네가, 나를 억지로 밀어 넘어뜨릴 가능성이──농담이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺はそんなことしないよ」"
translation = "「나는 그런 짓 안 해」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「本当にそうかな？\u3000全くありえないとは言えない気がするけど」"
translation = "「정말로 그럴까? 전혀 불가능하다고는 말할 수 없을 것 같은데」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど……たまにはそういうのもいいかもしれないね？」"
translation = "「하지만……가끔은 그런 것도 괜찮을지도 모르겠네?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「あっ……私にこんな格好をさせるなんて、君は随分といい趣味を持っているようだ」"
translation = "「앗……나에게 이런 복장을 시키다니, 너는 꽤나 좋은 취미를 가지고 있는 것 같아」"

[[dialogue]]
speaker = "unk"
original = "星徒会室の窓に手を突かせると、自然とお尻を突き出す体勢になった。"
translation = "성도회실 창문에 손을 짚게 하자, 자연스레 엉덩이를 내미는 자세가 되었다."

[[dialogue]]
speaker = "unk"
original = "戦闘服から鎧だけを脱いだ姿は裸よりも煽情的で、細い腰から肉感的なお尻へのラインに男の本能を刺激される。"
translation = "전투복에서 갑옷만 벗은 모습은 나체보다 더 선정적이며, 가는 허리에서 육감적인 엉덩이로 이어지는 라인에 남자의 본능이 자극된다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「レナーテがこうしようって言ったくせに」"
translation = "「레나테가 이렇게 하자고 했으면서」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふふ。それはそうだけどね」"
translation = "「후후. 그건 그렇지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "俺たちは正式に恋人という関係になったわけではない。"
translation = "우리는 정식으로 연인 관계가 된 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "それでもある日レナーテに誘われて、それ以来、しばしば肌を重ねるようになっていた。"
translation = "그럼에도 어느 날 레나테에게 유혹당했고, 그 이후로 종종 살을 섞게 되었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「今日は手籠めにするつもりで、思いっきり犯してくれていいからね？」"
translation = "「오늘은 내 것으로 만들 작정으로, 마음껏 범해 줘도 괜찮으니까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいんだな？\u3000途中でやめられないぞ」"
translation = "「괜찮겠어? 도중에 멈추지 못한다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、大丈夫。思い切り羽目を外したい気分なんだ」"
translation = "「아아, 괜찮아. 마음껏 막 나가고 싶은 기분이야」"

[[dialogue]]
speaker = "unk"
original = "期待しているのか、レナーテの秘部が淡く濡れてきた。"
translation = "기대하고 있는 것인지, 레나테의 은밀한 부위가 희미하게 젖어 왔다."

[[dialogue]]
speaker = "unk"
original = "愛液を塗り付けるようにペニスを摩擦させる。"
translation = "애액을 바르듯이 페니스를 마찰시킨다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ぁんっ……<emoji=heart04>\u3000君のここ、大きく、熱くなってる<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 너의 여기, 커지고, 뜨거워지고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「もっと元気になるように、媚びた方がいいかい？\u3000君のおっきくて、硬いおち○ぽ、私のおま○こにちょうだい──って」"
translation = "「더욱 힘이 나도록, 아양을 떨어야 할까? 너의 크고, 단단한 자지, 나의 보지에 줘──라고」"

[[dialogue]]
speaker = "unk"
original = "あえてはしたない言葉を使いながら、細い腰をくねらせ、ふりふりとお尻を振るレナーテ。"
translation = "굳이 상스러운 말을 사용하면서, 가는 허리를 비틀고, 살랑살랑 엉덩이를 흔드는 레나테."

[[dialogue]]
speaker = "unk"
original = "その煽情的な姿に矢も楯もたまらず、怒張したペニスを突き立てた。"
translation = "그 선정적인 모습에 애가 타서, 노출된 페니스를 꽂아 넣었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふぁああああっ……<emoji=heart04>\u3000私の中、広げられてっ……はああぁっ<emoji=heart04>」"
translation = "「화아아아앗……<emoji=heart04> 내 안, 넓혀지고……하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが蜜で濡れた粘膜に呑み込まれ、心地良い圧迫感に包まれる。"
translation = "페니스가 꿀로 젖은 점막에 삼켜지며, 기분 좋은 압박감에 휩싸인다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はぁ……はぁ……おち○ぽ、熱くて、大きくて、君が私の中にいるのを感じるよ……<emoji=heart04>」"
translation = "「하아……하아……자지, 뜨겁고, 커서, 네가 내 안에 있는 걸 느껴……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んんっ……<emoji=heart04>\u3000君のおち○ぽ、私の中でビクビクしてる……<emoji=heart04>\u3000嬉しそうに脈打ってるね……<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 너의 자지, 내 안에서 움찔거리고 있어……<emoji=heart04> 기쁜 듯이 맥동하고 있네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛液のトロトロの感触と、膣の肉の弾力、熱い体温が相まって極上の快感をもたらしてくれる。"
translation = "애액의 끈적끈적한 감촉과, 질의 살의 탄력, 뜨거운 체온이 어우러져 최고의 쾌감을 가져다준다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はぁ、ふぅ……早く……動いてくれ……<emoji=heart04>」"
translation = "「하아, 후우……빨리……움직여 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私のおま○こ、いっぱい突いて、おち○ぽ気持ち良くなってくれ……<emoji=heart04>\u3000私のこと、無茶苦茶にして……<emoji=heart04>」"
translation = "「나의 보지, 잔뜩 찔러서, 자지 기분 좋아져 줘……<emoji=heart04> 나를, 엉망진창으로 만들어 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "催促するように、自分から小さく腰を揺らすレナーテ。"
translation = "재촉하듯이, 스스로 작게 허리를 흔드는 레나테."

[[dialogue]]
speaker = "unk"
original = "強く求められて俺も昂り、レナーテの腰を掴んでペニスを突き出した。"
translation = "강하게 요구받아 나도 흥분하여, 레나테의 허리를 잡고 페니스를 들이밀었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひぁああっ……<emoji=heart04>\u3000はぁっ……はっ……あっ……んんっ……<emoji=heart04>\u3000私の中で、君が、動いてるっ……<emoji=heart04>」"
translation = "「히야앗……<emoji=heart04> 하앗……핫……앗……응응……<emoji=heart04> 내 안에서, 네가, 움직이고 있어앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んっ、はあぁっ……中で、擦れて……ふあぁっ……ああっ……<emoji=heart04>\u3000はあぁ、はっ、あっ……んんっ……<emoji=heart04>」"
translation = "「응, 하아앗……안에서, 비벼지고……후아앗……아앗……<emoji=heart04> 하아아, 핫, 앗……응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そう、いいよ……んっ……ふぁ……ああぁっ<emoji=heart04>\u3000私のおま○こ、君のおち○ぽの、形になってる……<emoji=heart04>」"
translation = "「그래, 좋아……응……화……아아앗<emoji=heart04> 나의 보지, 너의 자지의, 모양이 되고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを突き入れる度、窓に押し付けられた大きな胸が柔らかそうに形を変える。"
translation = "페니스를 들이밀 때마다, 창문에 밀착된 큰 가슴이 부드러운 모양으로 변한다."

[[dialogue]]
speaker = "unk"
original = "亀頭が深いところまで届くと、膣内が嬉しそうにきゅっと締まって反応した。"
translation = "귀두가 깊은 곳까지 닿자, 질 내부가 기쁜 듯이 꽉 조여 반응했다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んはっ、はぁっ……はっ、はぁっ……<emoji=heart04>\u3000あっ、はぁ……私の中、君のでズボズボってされて……ふはぁ、はぁ、あっ、んんっ……<emoji=heart04>」"
translation = "「응핫, 하앗……핫, 하앗……<emoji=heart04> 앗, 하아……내 안, 너의 것으로 쑤컹쑤컹 당하고……후하아, 하아, 앗, 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おち○ぽで突かれて……あっ……お腹の奥、熱くなる……<emoji=heart04>\u3000はぁ、ふぅっ……んっ、ああっ……<emoji=heart04>」"
translation = "「자지로 찔려서……앗……배 속 깊은 곳, 뜨거워져……<emoji=heart04> 하아, 후웃……응, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "平行世界ベガでは、レナーテは誰よりも強く、誰からも尊敬される星騎士だったという。"
translation = "평행 세계 베가에서는, 레나테는 누구보다 강하고, 누구에게나 존경받는 성기사였다고 한다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女が星徒会室であられもない姿になり、俺のペニスでよがっていた。"
translation = "그런 그녀가 성도회실에서 벌거벗은 모습이 되어, 나의 페니스로 절정을 맞고 있었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「あっ、はぁ……んぁ……はぁんっ<emoji=heart04>\u3000ここでしていると、星徒会のみんなの前で、エッチしているみたいだ……」"
translation = "「앗, 하아……응아……하앙<emoji=heart04> 여기서 하고 있으니, 성도회 모두 앞에서, 야한 짓을 하는 것 같아……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はぁっ、ふっ、んんっ……おち○ぽで貫かれて、おま○こがきゅうってなる……<emoji=heart04>」"
translation = "「하앗, 훗, 응응……자지로 관통당해서, 보지가 꽉 조여져……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んぁっ、はぁっ、はっ、あぁんっ<emoji=heart04>\u3000おま○こ、気持ち良くて、もっとして欲しくなる……<emoji=heart04>\u3000はぁっ、はっ……あっ……ひあぁっ<emoji=heart04>」"
translation = "「응앗, 하앗, 핫, 아앙<emoji=heart04> 보지, 기분 좋아서, 더 해줬으면 좋겠어……<emoji=heart04> 하앗, 핫……앗……히야앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レナーテは艶めかしい嬌声を上げ、俺とのエッチに夢中になっている。"
translation = "레나테는 요염한 교성을 지르며, 나와의 섹스에 몰두하고 있다."

[[dialogue]]
speaker = "unk"
original = "だけど窓の向こうで、下校中の女子生徒がこちらを振り返ったような気がした。"
translation = "하지만 창문 너머로, 하교 중인 여학생이 이쪽을 돌아본 것 같은 기분이 들었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──ッ！？」"
translation = "「──읏!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、ぎゅっと膣が収縮し、ペニスを強く締め付けた。"
translation = "그 순간, 질이 꽉 수축하며, 페니스를 강하게 조여 왔다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今、おま○こが締まったよ。見られて興奮するなんて変態なんだな」"
translation = "「지금, 보지가 조여졌어. 보여서 흥분하다니 변태구나」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んっ……<emoji=heart04>\u3000そんなことは……」"
translation = "「응……<emoji=heart04> 그런 건……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ほら、あの生徒、こっちを見てる。エッチしてるところ見られてるよ」"
translation = "「봐, 저 학생, 이쪽을 보고 있어. 야한 짓 하는 거 들키고 있다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んんんっ……<emoji=heart04>\u3000見ないで、くれ……んっ……<emoji=heart04>\u3000ひあぁっ、あっ、ああぁっ……知らない生徒の前で、こんな……ふああぁっ<emoji=heart04>」"
translation = "「응응응……<emoji=heart04> 보지, 마……응……<emoji=heart04> 히야앗, 앗, 아아앗……모르는 학생 앞에서, 이런……후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "実際にはあの生徒はたまたまこっちを振り返っただけで、俺たちには気付いていないだろう。"
translation = "실제로는 저 학생은 우연히 이쪽을 돌아본 것뿐이고, 우리를 눈치채지 못했을 것이다."

[[dialogue]]
speaker = "unk"
original = "だけど興奮を盛り上げるスパイスとしては十分だ。"
translation = "하지만 흥분을 돋우는 향신료로서는 충분하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「見られて余計濡れてるぞ。裸でも戦えるって言ってたし、見られるのが好きな淫乱なんじゃないか？」"
translation = "「보여서 더 젖고 있잖아. 벌거벗고도 싸울 수 있다고 했으니, 보이는 걸 좋아하는 음란한 여자가 아닌가?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ち、違う……ぁっ、はぁっ……<emoji=heart04>\u3000私は、淫乱じゃ……ない……んんっ<emoji=heart04>」"
translation = "「츠, 틀려……앗, 하앗……<emoji=heart04> 나는, 음란한 여자가……아니야……응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「違わないだろ。この変態騎士」"
translation = "「틀리지 않잖아. 이 변태 기사」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ──ああぁっ<emoji=heart04>\u3000言わないで、くれ……はあぁ、あっ……ふぁああっ<emoji=heart04>」"
translation = "「아아──아아앗<emoji=heart04> 말하지, 마……하아아, 앗……화아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺に詰られてゾクゾクと体を震わせるレナーテ。"
translation = "나에게 비난당하며 오싹하고 몸을 떨게 하는 레나테."

[[dialogue]]
speaker = "unk"
original = "羞恥が快感になっているようで、蜜を溢れさせながら、きゅっと膣壁が締め付けてきた。"
translation = "수치가 쾌감이 된 듯, 애액을 흘려보내면서, 꽉 질벽이 조여왔다."

[[dialogue]]
speaker = "unk"
original = "それなら──"
translation = "그렇다면──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなに見られるのが好きなら、レナーテのいやらしいところを全部見せつけてやろうじゃないか」"
translation = "「그렇게 보이는 걸 좋아한다면, 레나테의 음란한 부분을 전부 보여주도록 하자고」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「～～～っ！」"
translation = "「～～～!」"

[[dialogue]]
speaker = "unk"
original = "みんなに見られるのを想像したのか、膣が強く締まり、痛いほどにペニスを絞る。"
translation = "모두에게 보이는 것을 상상한 것인지, 질이 강하게 조여와, 아플 정도로 페니스를 쥐어짠다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、そうだ……はぁっ、あっ……<emoji=heart04>\u3000私は犯されているところを見られて悦ぶ、浅ましい女なんだ……<emoji=heart04>」"
translation = "「아아, 그렇다…… 하읏, 앗……<emoji=heart04> 나는 범해지는 것을 보여지며 기뻐하는, 천박한 여자다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「今の私は、淫乱なメスだ……<emoji=heart04>\u3000あっ、はあぁっ<emoji=heart04>\u3000だから君の欲望のまま、思う存分、犯してくれ……<emoji=heart04>」"
translation = "「지금의 나는, 음란한 암컷이다……<emoji=heart04> 앗, 하아읏<emoji=heart04> 그러니 너의 욕망대로, 마음껏, 범해줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はあぁっ、はっ、ああぁっ<emoji=heart04>\u3000壊れるくらい、強く……！\u3000私を、快楽で塗り潰してくれ……！」"
translation = "「하아읏, 핫, 아아앗<emoji=heart04> 부서질 정도로, 강하게……! 나를, 쾌락으로 덧칠해줘……!」"

[[dialogue]]
speaker = "unk"
original = "レナーテはリクリエの使徒から解放されたけど、その心はまだ壊れたままなのかもしれない。"
translation = "레나테는 리크리에의 사도에게서 해방되었지만, 그 마음은 아직 망가진 채일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "心の欠けた部分を快楽で埋めるように、あえて淫らなメスに堕ちている。"
translation = "마음의 결여된 부분을 쾌락으로 채우듯이, 일부러 음란한 암컷으로 타락하고 있다."

[[dialogue]]
speaker = "unk"
original = "それなら俺は──"
translation = "그렇다면 나는──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひやぁああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ズン、ズンって、激しいっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「히야아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응응<emoji=heart04> 쥰, 쥰 하고, 격렬해<emoji=heart04> 아앗<emoji=heart04> 핫<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ、ああぁんっ<emoji=heart04>\u3000私の中、おち○ぽでぐちゃぐちゃにされてるっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 핫<emoji=heart04> 앗, 아아앙<emoji=heart04> 내 안, 자지로 엉망진창이 되고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000乱暴に突かれて、感じてるっ<emoji=heart04>\u3000気持ち、いいっ<emoji=heart04>\u3000はぁっ、あぁああっ<emoji=heart04>」"
translation = "「하읏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> 난폭하게 박혀서, 느끼고 있어<emoji=heart04> 기분, 좋아<emoji=heart04> 하읏, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レナーテの腰を捕まえ、窓に押し付けながら思い切り突きまくる。"
translation = "레나테의 허리를 붙잡고, 창문에 밀어붙이면서 힘껏 쑤셔 박는다."

[[dialogue]]
speaker = "unk"
original = "するとレナーテのお尻に俺の下半身が当たり、肌がぶつかる音が響いた。"
translation = "그러자 레나테의 엉덩이에 나의 하반신이 닿아, 살이 부딪치는 소리가 울려 퍼졌다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「いい、いいよっ<emoji=heart04>\u3000おち○ぽ、気持ちいいっ<emoji=heart04>\u3000はぁっ、はあぁっ<emoji=heart04>\u3000ふぁ──ああぁああっ<emoji=heart04>」"
translation = "「좋아, 좋아<emoji=heart04> 자지, 기분 좋아<emoji=heart04> 하읏, 하아읏<emoji=heart04> 파──아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ひやぁああっ<emoji=heart04>\u3000んぁ──あ──あ──んん～～～っ<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응읏<emoji=heart04> 히야아앗<emoji=heart04> 응아──아──아──응응~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "光る銀髪を振り乱しながら喘ぐレナーテ。"
translation = "빛나는 은발을 흐트러뜨리며 신음하는 레나테."

[[dialogue]]
speaker = "unk"
original = "その眩いばかりの美しさとは対照的に、お尻の肉が弾み、愛液がぐちゅぐちゅと音を立てる。"
translation = "그 눈부신 아름다움과는 대조적으로, 엉덩이 살이 튀고 애액이 질척질척 소리를 낸다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はっ、あっ<emoji=heart04>\u3000もっと、もっと……<emoji=heart04>\u3000もっと深く、もっと強く……突き立ててくれっ<emoji=heart04>」"
translation = "「핫, 앗<emoji=heart04> 더, 더……<emoji=heart04> 더 깊숙이, 더 강하게…… 꽂아 넣어 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "麗しい女騎士を犯す征服感を味わいながら、ペニスで一番奥を突く。"
translation = "아름다운 여 기사를 범하는 정복감을 맛보며, 페니스로 가장 안쪽을 찌른다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひやぁあああっ<emoji=heart04>\u3000奥におち○ぽ来て、おま○こ、壊れそうっ<emoji=heart04>\u3000ひあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぁああっ<emoji=heart04>」"
translation = "「히야아아앗<emoji=heart04> 안쪽에 자지 와서, 보지, 부서질 것 같아<emoji=heart04> 히아앗<emoji=heart04> 앗<emoji=heart04> 응응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でもいい<emoji=heart04>\u3000壊していい<emoji=heart04>\u3000壊れしてくれ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000今は、気持ちいいのだけ、感じたいんだ<emoji=heart04>」"
translation = "「그래도 좋아<emoji=heart04> 부숴도 돼<emoji=heart04> 부숴 줘<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 지금은, 기분 좋은 것만, 느끼고 싶어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んぁあっ<emoji=heart04>\u3000私が私でなくなるくらい、めちゃくちゃにしてくれ<emoji=heart04>」"
translation = "「푸아아앗<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 내가 내가 아니게 될 정도로, 엉망진창으로 만들어 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が子宮に届く度、レナーテの体がビクビクと小さく跳ね、嬌声が星徒会室に響く。"
translation = "귀두가 자궁에 닿을 때마다, 레나테의 몸이 움찔움찔 작게 튀어 오르고, 교성이 성도회실에 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "そんなレナーテを窓の外に見せつけるように、しゃにむに奥を突き続ける。"
translation = "그런 레나테를 창문 밖에 과시하듯이, 맹렬히 안쪽을 계속 찌른다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んん～～～～っ<emoji=heart04>\u3000子宮に、おち○ぽ当たってっ<emoji=heart04>\u3000すごいぃっ<emoji=heart04>\u3000ひああっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「응응~~~~~읏<emoji=heart04> 자궁에, 자지 맞아서<emoji=heart04> 굉장해읏<emoji=heart04> 히아앗<emoji=heart04> 응앗<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私のおま○こ、太いおち○ぽでいっぱいになってるっ<emoji=heart04>\u3000あっ、はぁっ<emoji=heart04>\u3000これ、いいっ<emoji=heart04>」"
translation = "「내 보지, 굵은 자지로 가득 차 있어<emoji=heart04> 앗, 하앗<emoji=heart04> 이거, 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふはぁ、はっ、あぁんっ<emoji=heart04>\u3000おま○この奥、キュンキュンして、切なくなるっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000くるっ<emoji=heart04>\u3000おま○こ、イッちゃいそうだっ<emoji=heart04>」"
translation = "「푸하아, 핫, 아앙읏<emoji=heart04> 보지 안쪽, 큥큥거려서, 애틋해져<emoji=heart04> 아앗<emoji=heart04> 온다<emoji=heart04> 보지, 가버릴 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レナーテが絶頂に近づくにつれ、俺も限界が迫り、体の奥から熱がせり上がってくる。"
translation = "레나테가 절정에 가까워질수록, 나도 한계가 다가와, 몸속 깊은 곳에서 열이 솟아오른다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んんっ<emoji=heart04>\u3000私の中で、おち○ぽビクビクしてっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000君も、イキそうなんだね<emoji=heart04>」"
translation = "「응응읏<emoji=heart04> 내 안에서, 자지 움찔움찔거려서<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 너도, 갈 것 같구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んぁっ、はぁっ<emoji=heart04>\u3000いいよっ<emoji=heart04>\u3000中に出してくれっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私も、子宮、切なくて、君の子種が欲しいんだっ<emoji=heart04>」"
translation = "「응앗, 하앗<emoji=heart04> 좋아<emoji=heart04> 안에 내보내 줘<emoji=heart04> 앗<emoji=heart04> 나도, 자궁, 애틋해서, 네 씨앗이 갖고 싶어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「本能が、欲しがってる<emoji=heart04>\u3000あっ、んんんっ<emoji=heart04>\u3000孕ませるつもりでっ<emoji=heart04>\u3000君の全部、私の子宮に注ぎ込んでくれっ<emoji=heart04>」"
translation = "「본능이, 원하고 있어<emoji=heart04> 앗, 응응응읏<emoji=heart04> 임신시킬 생각으로<emoji=heart04> 네 전부, 내 자궁에 쏟아부어 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メスを孕ませる──それはオスの最大の悦びだ。"
translation = "암컷을 임신시키는 것──그것은 수컷의 최대의 기쁨이다."

[[dialogue]]
speaker = "unk"
original = "レナーテに誘われ、本能に衝き動かされながら、ペニスを力任せに叩きつける。"
translation = "레나테에게 유혹당해, 본능에 충동질당하면서, 페니스를 힘껏 때려 박는다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふぁああぁ～～～っ<emoji=heart04>\u3000あ──あ──あ──んんんっ<emoji=heart04>\u3000おち○ぽ、種付けしようとしてるっ<emoji=heart04>」"
translation = "「푸아아아~~~읏<emoji=heart04> 아──아──아──응응응읏<emoji=heart04> 자지, 씨앗 뿌리려고 하고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひやぁああっ<emoji=heart04>\u3000んぁあっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000思いっきり、熱いの、注いでっ<emoji=heart04>\u3000子宮いっぱいにして、私の奥まで、君のものにしてっ<emoji=heart04>」"
translation = "「히야아앗<emoji=heart04> 응아앗<emoji=heart04> 응응응읏<emoji=heart04> 내보내 줘<emoji=heart04> 마음껏, 뜨거운 거, 부어 줘<emoji=heart04> 자궁 가득 채워서, 내 안쪽까지, 네 것으로 만들어 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "生半可な射精ではもう満足できない。"
translation = "어설픈 사정으로는 이제 만족할 수 없다."

[[dialogue]]
speaker = "unk"
original = "今にも爆発しそうなのを堪え、最大限に高まったところをレナーテの奥に吐き出す……！"
translation = "당장이라도 폭발할 것 같은 것을 참고, 최대한으로 고조된 순간을 레나테의 안쪽에 토해낸다……!"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふぁあっ<emoji=heart04>\u3000ああぁっ<emoji=heart04> おち○ぽドクンドクンって、爆発しそうっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「푸앗<emoji=heart04> 아아앗<emoji=heart04> 자지 두근두근하고, 폭발할 것 같아<emoji=heart04> 아앗<emoji=heart04> 응응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私も、イキそうっ<emoji=heart04>\u3000イクッ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁはっ<emoji=heart04>\u3000あっ──ん──んん──ふぁああ～～っ<emoji=heart04>」"
translation = "「나도, 갈 것 같아<emoji=heart04> 간다<emoji=heart04> 하앗<emoji=heart04> 하아핫<emoji=heart04> 앗──응──응응──푸아아~~읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000おま○こイクッ<emoji=heart04>\u3000種付けされて、イッちゃうっ<emoji=heart04>\u3000ふぁっ──ぁっ──イッ、イクぅっ──」"
translation = "「히앗<emoji=heart04> 앗<emoji=heart04> 아앗<emoji=heart04> 보지 간다<emoji=heart04> 씨앗 뿌려져서, 가버려<emoji=heart04> 팟──앗──가, 간다으읏──」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふぁああぁあああ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「푸아아아아아~~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レナーテの奥で欲望を解き放ち、亀頭を子宮口に密着させながら精を吐き出す。"
translation = "레나테의 안쪽에서 욕망을 해방하고, 귀두를 자궁구에 밀착시키면서 정액을 토해낸다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んんんっ……んっ……<emoji=heart04>\u3000あっ……熱いっ<emoji=heart04>\u3000はあぁっ……はっ……んんっ……<emoji=heart04>」"
translation = "「응응응읏……응읏……<emoji=heart04> 앗…… 뜨거워<emoji=heart04> 하아앗……핫……응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ドクドクって、おち○ぽ跳ねて……ぁっ……はっ……<emoji=heart04>\u3000おま○この奥に、精液、注がれてる……ふあぁ……はぁ……っ<emoji=heart04>」"
translation = "「두근두근하고, 자지 튀어 오르고……앗……핫……<emoji=heart04> 보지 안쪽에, 정액, 쏟아지고 있어…… 푸아아…… 하아……읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全身を震わせながら、子宮で射精を受け止めるレナーテ。"
translation = "전신을 떨면서, 자궁으로 사정을 받아들이는 레나테."

[[dialogue]]
speaker = "unk"
original = "同時に強く膣壁が収縮して、少しでも多く精を絞ろうと締め付けてくる。"
translation = "동시에 강하게 질벽이 수축하여, 조금이라도 더 많은 정액을 짜내려고 조여온다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はぁ……あっ……まだ出てるっ<emoji=heart04>\u3000私の子宮……君の精液で、いっぱいになってる……ん……はあぁ……<emoji=heart04>」"
translation = "「하아…… 앗…… 아직 나오고 있어<emoji=heart04> 내 자궁…… 네 정액으로, 가득 차 있어…… 응…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身に力を込め、一滴も出なくなるまでレナーテの中に注ぎ込んだ。"
translation = "하반신에 힘을 주어, 한 방울도 나오지 않을 때까지 레나테 안에 쏟아부었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はぁ、はぁ……ふはぁ……はあぁ……<emoji=heart04>」"
translation = "「하아, 하아…… 푸하아…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レナーテは荒い息を吐き、窓にもたれかかりながら脱力する。"
translation = "레나테는 거친 숨을 내쉬고, 창문에 기대면서 탈력한다."

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けた膣口からは、中に注いだ精液がドロリと溢れてきた。"
translation = "페니스가 빠져나간 질구에서는, 안에 쏟아부은 정액이 끈적하게 흘러넘쳤다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「あ……君が出してくれたのが、こぼれてしまっている……<emoji=heart04>」"
translation = "「아…… 네가 내보내 준 것이, 흘러넘치고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んん……たくさん、出したね……<emoji=heart04>\u3000お腹が熱いよ……<emoji=heart04>」"
translation = "「응응…… 많이, 냈네……<emoji=heart04> 배가 뜨거워……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「レナーテ、今日のは……」"
translation = "「레나테, 오늘 건……」"

[[dialogue]]
speaker = "unk"
original = "結局最後まで付き合ったけど、レナーテの様子には危うさを感じた。"
translation = "결국 끝까지 함께했지만, 레나테의 모습에서는 위태로움을 느꼈다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「言っておくけど、別に自棄になっているわけではないよ。今日は本当に羽目を外したかっただけさ」"
translation = "「말해두지만, 딱히 자포자기한 건 아니야. 오늘은 정말로 도를 넘고 싶었을 뿐이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ならいいんだけど……」"
translation = "「그렇다면야 괜찮지만……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そんなに心配しなくても大丈夫だよ。せっかくアガサが助けてくれたんだし、自分を粗末に扱うつもりはない」"
translation = "「그렇게 걱정하지 않아도 괜찮아. 모처럼 아가사가 도와줬으니까, 나 자신을 함부로 대할 생각은 없어」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それに私を名前で呼んでくれる相手もいることだし」"
translation = "「게다가 나를 이름으로 불러주는 상대도 있는걸」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う……」"
translation = "「으……」"

[[dialogue]]
speaker = "unk"
original = "婉曲な、けれどストレートに伝わる言い方に、思わず照れてしまう。"
translation = "완곡하지만, 곧바로 전해지는 말에, 무심코 부끄러워진다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「さて、もう下校時間だ。星徒会長といえど、平時なら帰らないといけないね」"
translation = "「자, 이제 하교 시간이야. 성도 회장이라고 해도, 평시라면 돌아가야지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でもその前に……ちゅっ<emoji=heart04>」"
translation = "「하지만 그전에…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「んむぅ……ちゅる……ちゅるちゅるっ<emoji=heart04>\u3000んふっ、んっ……んれろっ、じゅるるるっ<emoji=heart04>」"
translation = "「음무…… 츄릅…… 츄릅츄릅<emoji=heart04> 응훗, 응읏…… 응 혀, 즈르르륵<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "時間ギリギリまで濃密なキスを交わし、下校時刻ちょうどに校門を出たのだった。"
translation = "시간ぎりぎり까지 농밀한 키스를 나누고, 하교 시각 정각에 교문을 나섰다."

