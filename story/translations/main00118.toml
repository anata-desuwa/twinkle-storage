[[dialogue]]
speaker = "unk"
original = "第２３話,エピローグ1,B"
translation = "제23화, 에필로그 1, B"

[[dialogue]]
speaker = "unk"
original = "翌日──"
translation = "다음 날──"

[[dialogue]]
speaker = "unk"
original = "強烈な疲労の反動をなんとかやり過ごした俺は、ゲストでなく正式なメンバーとして星徒会室にやって来ていた。"
translation = "강렬한 피로의 반동을 간신히 넘긴 나는, 게스트가 아닌 정식 멤버로서 성도회실에 와 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──さあ！\u3000今日から<b>新生</b>星徒会のハッソクよ！\u3000みんな準備はいいわね！？」"
translation = "「──자! 오늘부터 <b>신생</b> 성도회의 핫소쿠야! 모두 준비는 됐지!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あれ？\u3000でも、新生星徒会だと新星星徒会と被るわね。新生新星星徒会？\u3000新星新生星徒会？\u3000それとも……」"
translation = "「어라? 그런데, 신생 성도회라고 하면 신성 성도회랑 겹치네. 신생 신성 성도회? 신성 신생 성도회? 아니면……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、そのあたりで」"
translation = "「회장, 그쯤에서」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あと、ハッソクじゃなくて、発足」"
translation = "「그리고, 핫소쿠가 아니라, 발족」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「この部屋も賑やかになっていいわね～」"
translation = "「이 방도 시끌벅적해져서 좋네~」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはアホの子だった。"
translation = "비너스는 바보였다."

[[dialogue]]
speaker = "unk"
original = "俺が加わり、この部屋に集うメンバーは５人となる。"
translation = "내가 합류하여, 이 방에 모이는 멤버는 5명이 된다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さて。それじゃあこの腕章をあなたに預けるわ──クロト」"
translation = "「자. 그럼 이 완장을 너에게 맡길게── 쿠로토」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ」"
translation = "「아아」"

[[dialogue]]
speaker = "unk"
original = "出会ったあの日以来初めて、ようやく正式に腕章が俺へ贈られる。"
translation = "만났던 그날 이후 처음으로, 드디어 정식으로 완장이 나에게 주어진다."

[[dialogue]]
speaker = "unk"
original = "全星騎士の頂点にある証──"
translation = "모든 성기사의 정점에 있다는 증거──"

[[dialogue]]
speaker = "unk"
original = "無論、今の俺にとっては過ぎた代物だから、これからも邁進していく必要があるだろう。"
translation = "물론, 지금의 나에게는 과분한 물건이니, 앞으로도 매진해 나갈 필요가 있을 것이다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふう……どうなることかと思ったけど。結局ヴィーナスの我がままにさんざん振り回されちゃった」"
translation = "「휴…… 어떻게 될까 싶었는데. 결국 비너스의 제멋대로에 실컷 휘둘려 버렸네」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わ、我がままなんかじゃないわよ。クロトのことはしっかり書かれてたんだから」"
translation = "「나, 내멋대로가 아니거든. 쿠로토에 대해서는 제대로 쓰여 있었다구」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──そのことなんだが……」"
translation = "「아아── 그것 말인데……」"

[[dialogue]]
speaker = "unk"
original = "こうして約束を果たせた以上、ちゃんと訊いてみたいと思っていた。"
translation = "이렇게 약속을 지킬 수 있게 된 이상, 제대로 물어보고 싶었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナスはどうして俺のことを知って、待ち受けてたんだ？」"
translation = "「비너스는 어떻게 나를 알고, 기다리고 있었던 거지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「？\u3000前にも言った通りよ、これのおかげ」"
translation = "「? 전에도 말했듯이, 이거 덕분이야」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、ヴィーナスは以前と同じく一冊の書物を取り出した。"
translation = "그렇게 말하며, 비너스는 이전과 마찬가지로 한 권의 서적을 꺼냈다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この『未来日誌』にしかと記されていたの。魔王クロト──あなたがあの日、新星学園を訪れるってことはね！」"
translation = "「이 『미래 일지』에 확실히 기록되어 있었거든. 마왕 쿠로토── 네가 그날, 신성 학원을 찾아올 거라는 게 말이야!」"

[[dialogue]]
speaker = "unk"
original = "ででん。胸を張るヴィーナス。待ってもそれ以上の理由は出てこなかった。"
translation = "짠. 가슴을 펴는 비너스. 기다려도 그 이상의 이유는 나오지 않았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……君が書いたものだろ？」"
translation = "「그건…… 네가 쓴 거잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「違うわ。けれど、昔からずっとあの日の出来事はここにはっきり書かれていたわ」"
translation = "「아니거든. 하지만, 옛날부터 줄곧 그날의 일은 여기에 분명히 쓰여 있었다구」"

[[dialogue]]
speaker = "unk"
original = "また、前と同じく占い師のようなことを言われる。"
translation = "또, 전과 마찬가지로 점쟁이 같은 말을 듣는다."

[[dialogue]]
speaker = "unk"
original = "前回はてっきり煙に巻かれたのだと思っていたが……"
translation = "지난번에는 당연히 연막에 속은 것이라고 생각했지만……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「彼女は本気なのか？」"
translation = "「그녀는 진심인 건가?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うん」"
translation = "「응」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どういう意味よ！」"
translation = "「무슨 뜻이야!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「トンデモオカルトアイテムですが、あれが新会長の到来を言い当てていたことは事実です。私も春ごろに確認していました」"
translation = "「터무니없는 오컬트 아이템이지만, 그것이 새 회장의 도래를 예언했다는 것은 사실입니다. 저도 봄쯤에 확인했었습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え、そうなの？」"
translation = "「에, 그래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺が転入試験を受ける前から……？\u3000どういう理屈なんだ」"
translation = "「내가 전입 시험을 보기 전부터……? 무슨 이치지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まあまあ、いいじゃない。赤坂レコードみたいなものよ」"
translation = "「뭐어 뭐어, 괜찮잖아. 아카사카 레코드 같은 거야」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「アカシックレコードです」"
translation = "「아카식 레코드입니다」"

[[dialogue]]
speaker = "unk"
original = "なんでも、彼女すら<ruby>与<rt>あずか</rt></ruby>り知らない誰かによって書かれた謎の日誌──"
translation = "뭐든지, 그녀조차 관여하지 않은 누군가에 의해 쓰인 수수께끼의 일지──"

[[dialogue]]
speaker = "unk"
original = "未来の出来事を日誌という形で予言するため、そう称しているらしい。"
translation = "미래의 일을 일지라는 형태로 예언하기 때문에, 그렇게 칭하고 있는 듯하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（まったく理解はできないが……これ以上の説明は出てこなそうだし、一旦考えるのはやめよう）」"
translation = "「(전혀 이해는 안 되지만…… 이 이상의 설명은 나오지 않을 것 같으니, 일단 생각하는 건 그만두자)」"

[[dialogue]]
speaker = "unk"
original = "今はとりあえず、この新生星徒会で俺がどうしていくかだ。"
translation = "지금은 일단, 이 신생 성도회에서 내가 어떻게 해나갈지다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ちなみに～。これからヴィーナスちゃんはどういう立場になるの？」"
translation = "「참고로~. 이제부터 비너스짱은 어떤 입장이 되는 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んーと……なんだろ？\u3000顧問専務理事？」"
translation = "「음ー 그러니까…… 뭘까? 고문 전무 이사?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「天下りじゃないですか」"
translation = "「낙하산이잖아요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんでそういうことは知ってるんだ」"
translation = "「왜 그런 건 알고 있는 거지」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ＯＧ、ではダメなのでしょうか」"
translation = "「OG, 는 안 되는 걸까요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「別に卒業生ってワケでもないし、盛り上がらないわよね。私に合うビューティな役職を考えておくわ！」"
translation = "「딱히 졸업생이라는 것도 아니고, 분위기가 살지 않잖아. 나에게 어울리는 뷰티한 직책을 생각해 둘게!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは星徒会に残りつつ、新たなポジションに生まれ変わると張り切っていた。"
translation = "비너스는 성도회에 남으면서, 새로운 포지션으로 다시 태어날 것이라 의욕을 보였다."

[[dialogue]]
speaker = "unk"
original = "他のみんなについては、これまで通りの役職に就くようだ。"
translation = "다른 모두에 대해서는, 지금까지대로의 직책에 머무는 듯하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで……星徒会長と言っても、何をすればいいんだ」"
translation = "「그래서…… 성도 회장이라고 해도, 뭘 해야 하는 거지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ドーンと構えて座ってればいいの！\u3000威厳を見せるのが会長のお仕事！」"
translation = "「당당하게 버티고 앉아 있으면 돼! 위엄을 보이는 게 회장의 일이야!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「本当は事務仕事も会長の責務なんだけど～……」"
translation = "「사실은 사무 일도 회장의 책무인데~……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長に任せてると日が暮れても終わらないから私がやってた。だけ」"
translation = "「전 회장에게 맡겨두면 해가 져도 끝나지 않으니까 제가 했었습니다. 뿐」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうでした！\u3000アナありがと！」"
translation = "「그랬었지! 아나 고마워!」"

[[dialogue]]
speaker = "unk"
original = "アナはすごく優秀だった。"
translation = "아나는 굉장히 우수했다."

[[dialogue]]
speaker = "unk"
original = "しかし、となるとその仕事も俺が引き継ぐことに……？"
translation = "하지만, 그렇게 되면 그 일도 내가 이어받게 되는 건가……?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、緋宮くんはまだ学園のこともよくわからないだろうし……」"
translation = "「하지만, 히노미야 군은 아직 학원 일도 잘 모를 거고……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うん。基本的には今まで通り、机仕事は私がやる」"
translation = "「네. 기본적으로는 지금까지대로, 책상 일은 제가 할게요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当か。助かるよ、アナ」"
translation = "「정말인가. 살았어, 아나」"

[[dialogue]]
speaker = "unk"
original = "この小さい一年生には、ずっと世話になりっぱなしだな。"
translation = "이 작은 1학년에게는, 계속 신세를 지고 있네."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でも、新会長は前会長より考えてくれそうなので、少しは仕事を戻そうかと」"
translation = "「하지만, 새 회장님은 전 회장님보다 생각은 해줄 것 같으니, 조금은 일을 돌려드릴까 합니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……お手柔らかに」"
translation = "「하하…… 살살 부탁해」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんか、私がすごくバカにされてるような」"
translation = "「왠지, 내가 엄청 바보 취급당하는 것 같은데」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そんなことないよ。会長にはカリスマがあったから！」"
translation = "「아, 아냐. 회장에게는 카리스마가 있었으니까!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃん～。会長はもう会長じゃないのよ～」"
translation = "「마토이짱~. 회장은 이제 회장이 아닌걸~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……そうでした」"
translation = "「아…… 그랬었지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「慣れないだろうが、よろしく頼む。マトイのことも頼りにしてるよ」"
translation = "「익숙하지 않겠지만, 잘 부탁해. 마토이도 믿고 있어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わ、わかったわ……会長。なんか照れるけど」"
translation = "「아, 알았어…… 회장. 왠지 부끄럽지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは、基本的には今まで通りでいてくれ」"
translation = "「하하, 기본적으로는 지금까지대로 있어 줘」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、皆に星徒会の役目について聞いた。"
translation = "그리고 나는, 모두에게 성도회의 역할에 대해 물었다."

[[dialogue]]
speaker = "unk"
original = "イベントの執行だったり、予算の編成だったり……大きすぎる権限に改めて戸惑いもしたけれど。"
translation = "이벤트의 집행이라든지, 예산의 편성이라든지…… 너무 큰 권한에 새삼 당황하기도 했지만."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それと……何より大事なのは、リクリエの予兆が起こった時の出動ね」"
translation = "「그리고…… 무엇보다 중요한 건, 리크리에의 예조가 일어났을 때의 출동이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000前みたいな──だな」"
translation = "「! 전과 같은── 거네」"

[[dialogue]]
speaker = "unk"
original = "世界中で混乱を起こしている目下の大事──リクリエ。"
translation = "전 세계에서 혼란을 일으키고 있는 당면한 큰일── 리크리에."

[[dialogue]]
speaker = "unk"
original = "その到来が近づくにつれ起きる予兆は、各地にモンスター出現などのトラブルを引き起こす。"
translation = "그 도래가 가까워질수록 일어나는 예조는, 각지에 몬스터 출현 등의 문제를 일으킨다."

[[dialogue]]
speaker = "unk"
original = "そもそも<ruby>星騎士<rt>おれたち</rt></ruby>の存在意義が街や人の防衛である以上、星徒会がその先頭に立つのは自然なことだった。"
translation = "애초에 성기사의 존재 의의가 마을과 사람들의 방위인 이상, 성도회가 그 선두에 서는 것은 자연스러운 일이었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私たち星徒会は全星騎士たちの代表。だから、どんなトラブルでも即座に駆けつける必要がある」"
translation = "「우리 성도회는 모든 성기사들의 대표. 그러니까, 어떤 문제라도 즉시 달려갈 필요가 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、知ってるさ。そのために頑張ってきたんだからな」"
translation = "「아아, 알고 있어. 그걸 위해 노력해 왔으니까」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「授業中であっても基本的には出動優先。街中に被害が出るのは避けなきゃならないので」"
translation = "「수업 중이라도 기본적으로는 출동 우선입니다. 시가지에 피해가 나는 것은 피해야 하므로」"

[[dialogue]]
speaker = "unk"
original = "俺がみんなに助けてもらったように。"
translation = "내가 모두에게 도움을 받았듯이."

[[dialogue]]
speaker = "unk"
original = "今後は、俺が街の人たちを助ける役割を担うわけだ。"
translation = "앞으로는, 내가 마을 사람들을 돕는 역할을 맡는 것이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも！\u3000これからはあのクロトが戦力に加わるんだから、どんなモンスターが来ても余裕よね！」"
translation = "「하지만! 이제부터는 그 쿠로토가 전력에 합류하는 거니까, 어떤 몬스터가 와도 여유롭겠지!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あー……それなんだけど」"
translation = "「아ー…… 그거 말인데」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスにまだ説明できていなかったので、改めてみんなに伝えた。"
translation = "비너스에게 아직 설명하지 못했었기에, 다시 한번 모두에게 전했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へ──もうあの状態になれないの！？」"
translation = "「헤── 이제 그 상태가 될 수 없다고!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わからない。けど、少なくとも自由にはなれない」"
translation = "「모르겠어. 하지만, 적어도 자유롭게는 될 수 없어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あの時のクロトくん、つよつよだったのにね～」"
translation = "「그때의 쿠로토 군, 엄청 강했는데~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「暴走してたってこと……？」"
translation = "「폭주했다는 거야……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「コントロールはできてたから、どちらかというとスイッチが入らないと言うべき。何か条件があるのかも」"
translation = "「컨트롤은 할 수 있었으니까, 어느 쪽이냐면 스위치가 켜지지 않는다고 말해야 합니다. 뭔가 조건이 있을지도 모릅니다」"

[[dialogue]]
speaker = "unk"
original = "やはり、またピンチにならないとダメなのだろうか？"
translation = "역시, 또다시 위기에 처해야만 하는 걸까?"

[[dialogue]]
speaker = "unk"
original = "だが、個人的な感覚としてはそれもちょっと違う気がしていた。"
translation = "하지만, 개인적인 감각으로는 그것도 조금 다른 기분이 들었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトの魔王スイッチ！\u3000ここね！」"
translation = "「쿠로토의 마왕 스위치! 여기네!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「違うわヴィーナスちゃん、ここよ～」"
translation = "「아니야 비너스짱, 여기야~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょ──お尻を触るのはやめてください！」"
translation = "「저── 엉덩이를 만지는 건 그만두세요!」"

[[dialogue]]
speaker = "unk"
original = "などと、益体もないやり取りを続けていると……"
translation = "등, 시답잖은 대화를 계속하고 있자니……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「学園長……」"
translation = "「학원장……」"

