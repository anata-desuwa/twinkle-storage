[[dialogue]]
speaker = "unk"
original = "恋人関係になった俺とレミカ。"
translation = "연인 관계가 된 나와 레미카."

[[dialogue]]
speaker = "unk"
original = "しかし、そのすぐ後にレミカのデビュー周年ライブが控えており、忙しない日々が続いていたが――"
translation = "하지만 그 직후에 레미카의 데뷔 주년 라이브가 기다리고 있어 분주한 나날이 이어졌지만――"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長、ライブ大成功だったよ……！」"
translation = "「회장, 라이브 대성공이었어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ネット配信で見てた！\u3000まさに、パーフェクトなライブだったぞ！\u3000……って、衣装のままで来たのか！？」"
translation = "「인터넷 방송으로 봤어! 그야말로 완벽한 라이브였어! ……근데, 의상 그대로 온 거야!?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会場からそのまま全速力で飛んできた。会長に１番に報告したかったから……」"
translation = "「회장에서 그대로 전속력으로 날아왔어. 회장한테 제일 먼저 보고하고 싶었으니까……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――私、頑張ったよ。でも、頑張れたのは、会長がいつも私の相談に乗ってくれて、心を支えてくれたおかげ」"
translation = "「――나, 열심히 했어. 하지만 힘낼 수 있었던 건 회장이 항상 내 상담을 들어주고 마음을 지탱해 준 덕분이야.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「だから、ありがと。会長……んっ<emoji=heart04>」"
translation = "「그러니까 고마워. 회장…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レミカを抱き寄せて、キスをする。彼女も俺の背中にそっと手を回してくる。頑張ったねという気持ちで、頭を撫でて――"
translation = "레미카를 끌어안고 키스를 한다. 그녀도 내 등 뒤로 살며시 손을 돌려온다. 고생했다는 마음으로 머리를 쓰다듬어주자――"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「え？\u3000――頑張ったから、何でもしてあげる？\u3000ご褒美をくれるの……？\u3000じ、じゃあ、その――」"
translation = "「에? ――열심히 했으니까 뭐든 해준다고? 보상을 주는 거야……? 그, 그럼 그게――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私を貰って欲しいって言ったら……ダメ、かな？」"
translation = "「나를 가져줬으면 좋겠다고 한다면…… 안 될, 까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当にしちゃって、いいのか……？」"
translation = "「정말로 해도 괜찮은 거야……?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「う、うん……今回のライブが成功したら、会長とも恋人としてステップアップしたいって、思ってたから……」"
translation = "「으, 응…… 이번 라이브가 성공하면, 회장하고도 연인으로서 스텝 업 하고 싶다고 생각했으니까……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「それに今の盛り上がった雰囲気じゃないと……普段じゃ、なかなか言い出せないし……」"
translation = "「게다가 지금처럼 달아오른 분위기가 아니면…… 평소에는 좀처럼 말을 꺼낼 수 없고……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ん……ふぅ……<emoji=heart04>\u3000これが会長の……おち○ちん……」"
translation = "「음…… 후우……<emoji=heart04> 이게 회장의…… 자지……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「お、思ってたのよりずっと大きい……さ、触っても大丈夫……？」"
translation = "「생, 생각했던 것보다 훨씬 커…… 만, 만져봐도 괜찮아……?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うん……じゃあ、触るね？\u3000ん……<emoji=heart04>」"
translation = "「응…… 그럼, 만질게? 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「凄い……熱くて、ドクンドクンって言ってる……あ、ムクムクって大きくなって……<emoji=heart04>\u3000こ、これ、勃起……だよね？」"
translation = "「대단해…… 뜨겁고, 두근두근거리고 있어…… 아, 불끈불끈하고 커져서……<emoji=heart04> 이, 이거, 발기…… 맞지?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――私に触られて、興奮するから？\u3000そ、そうなんだ……」"
translation = "「――나한테 만져져서, 흥분하니까? 그, 그렇구나……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「わ、私で勃起してくれてるんだって思ったら……嬉しい、かも……<emoji=heart04>」"
translation = "「나, 나 때문에 발기해 준 거라고 생각하니까…… 기쁠, 지도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「で、でも、どうしよう……あの、ね……恥ずかしいんだけど――」"
translation = "「하, 하지만, 어쩌지…… 저기, 있잖아…… 부끄럽지만――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私、実は処女どころか……その……今まで自分で――お、オナニーもしたこと、なくて……」"
translation = "「나, 사실 처녀는커녕…… 그…… 지금까지 스스로―― 자, 자위도 해본 적이, 없어서……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「だ、だから……おま○こ、どうやったら上手く濡れるのか、分からなくて……」"
translation = "「그, 그러니까…… 보지, 어떻게 하면 잘 젖는지 몰라서……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――それならキスをして欲しい？\u3000う、うん……分かった」"
translation = "「――그러면 키스를 해줬으면 좋겠어? 으, 응…… 알았어」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ん……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000んむっ……ふぅ……<emoji=heart04>\u3000あっ……舌が入ってくりゅ……ちゅぱっ<emoji=heart04>\u3000んちゅっ……ちゅぷっ……んんっ……れろちゅっ……ちゅるるっ<emoji=heart04>」"
translation = "「음……<emoji=heart04> 츄……<emoji=heart04> 음뭇…… 후우……<emoji=heart04> 앗…… 혀가 들어와아…… 츄파<emoji=heart04> 음츄…… 츄푸…… 음음…… 레로츄…… 츄르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はあぁ……<emoji=heart04>\u3000ちゅっ……ちゅぷぷっ……ちゅれるっ……いつもよりキス、激し……<emoji=heart04>\u3000んむっ……ちゅぱっ……ちゅむむっ……んっ……ちゅぶっ……れろちゅっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 츄…… 츄푸푸…… 츄레루…… 평소보다 키스, 격렬해……<emoji=heart04> 음뭇…… 츄파…… 츄무무…… 응…… 츄부…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ちゅっ……ちゅむっ……ちゅぱっ……ぷはぁ<emoji=heart04>\u3000んっ……はあぁ……会長ぉ……<emoji=heart04>\u3000キスに夢中に過ぎて、もう頭の中、わけわかんなくなっちゃってる……<emoji=heart04>」"
translation = "「츄…… 츄무…… 츄파…… 푸하<emoji=heart04> 응…… 하아아…… 회장……<emoji=heart04> 키스에 너무 집중해서, 벌써 머릿속이 어떻게 된 건지 모르게 되어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気付けば俺達はもう３０分以上もキスを続けていたようで、レミカのおま○こもすっかり濡れて、愛液がとめどなく滴り落ちていた――"
translation = "어느덧 우리들은 벌써 30분 이상이나 키스를 계속하고 있었던 모양이라, 레미카의 보지도 완전히 젖어 애액이 끝없이 뚝뚝 떨어지고 있었다――"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「え？\u3000あ、本当だ……私のおま○こ、濡れちゃってる……<emoji=heart04>\u3000それに何か、熱くて……ムズムズして……んんっ……<emoji=heart04>」"
translation = "「에? 아, 진짜다…… 내 보지, 젖어버렸어……<emoji=heart04> 게다가 뭔가, 뜨겁고…… 근질근질해서…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ね、ねぇ、会長。これって……もう挿れちゃっても、大丈夫ってことなのかな……？」"
translation = "「저, 저기, 회장님. 이건…… 이제 삽입해도, 괜찮다는 뜻일까……?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「う、うん……じゃあ、会長の大きなおち○ちん、私のおま○こに、挿れちゃうね……<emoji=heart04>」"
translation = "「으, 응…… 그럼, 회장님의 커다란 자지, 내 보지에, 넣을게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ……おち○ちん、凄く固くて、熱くなってる……<emoji=heart04>\u3000こ、これがおま○こに、入っちゃうんだ……んっ、先っぽ擦れて……ふあぁっ<emoji=heart04>」"
translation = "「앗…… 자지, 엄청 딱딱하고, 뜨거워졌어……<emoji=heart04> 이, 이게 보지에, 들어오는구나…… 응, 끝부분이 스쳐서…… 후아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「こ、腰が震えちゃう……はぁんっ……んあぁっ<emoji=heart04>\u3000あ、あれ……？\u3000この辺りのはずなのに、上手く入らない……あんっ<emoji=heart04>」"
translation = "「허, 허리가 떨려버려…… 하앙…… 응아아<emoji=heart04> 어, 어라……? 이쯤일 텐데, 잘 안 들어가…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んっ……おま○この穴、ここで合ってる？\u3000自分で弄ったことないから、よく分からなくて……」"
translation = "「응…… 보지 구멍, 여기가 맞아? 스스로 만져본 적이 없어서, 잘 모르겠어……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――会長も手伝ってくれるの？\u3000う、うん、ごめんね……ここ？\u3000分かった……じゃあ、挿れるね……」"
translation = "「――회장님도 도와주는 거야? 으, 응, 미안해…… 여기? 알았어…… 그럼, 넣을게……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んっ……<emoji=heart04>\u3000あっ……お、おま○この穴……おち○ちんで押し広げられて……入っ――」"
translation = "「응……<emoji=heart04> 앗…… 보, 보지 구멍…… 자지로 벌려지면서…… 들어와――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「～～～っ<emoji=heart04>\u3000ふあぁあああっ………………<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「～～～っ<emoji=heart04> 후아아아앗………………<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「おち○ちん……入って、来たぁ……<emoji=heart04>\u3000はっ、あぁぁぁ……<emoji=heart04>」"
translation = "「자지…… 들어, 왔어……<emoji=heart04> 하앗, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長に私の初めて、もらわれちゃった……<emoji=heart04>\u3000はあぁ……おち○ちん大きくて、存在感凄い<emoji=heart04>」"
translation = "「회장님한테 내 처음, 따먹혀버렸어……<emoji=heart04> 하아…… 자지 커서, 존재감 엄청나<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――え？\u3000ううん、大丈夫。痛かったのは一瞬だけで、今はその……むしろ、じわじわって気持ち良く、なってきてるから……だから、私が動かすね？」"
translation = "「――에? 아니, 괜찮아. 아픈 건 아주 잠깐뿐이었고, 지금은 그…… 오히려, 지와지와하고 기분 좋게, 변하고 있으니까…… 그러니까, 내가 움직일게?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はぁ<emoji=heart04>\u3000もともと私がしたいって、言い出したんだし。さっきから助けられてばっかりだから、今度は私が会長を、気持ち良くしないと……んっ<emoji=heart04>」"
translation = "「하아<emoji=heart04> 원래 내가 하고 싶다고, 꺼낸 말인걸. 아까부터 도움만 받았으니까, 이번에는 내가 회장님을, 기분 좋게 해줘야…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ、あれ……？\u3000こ、腰に力が入らなくて、持ち上がらない……」"
translation = "「어, 어라……? 허, 허리에 힘이 안 들어가서, 안 들려……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「う、嘘……私、ひょっとして腰が抜けちゃってる……？」"
translation = "「거, 거짓말…… 나, 설마 허리가 빠져버린 거야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫、俺が動くよ。優しくするから……」"
translation = "「괜찮아, 내가 움직일게. 부드럽게 할 테니까……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「えっ、そ、そんな……会長ばっかりにやらせて――あっ<emoji=heart04>」"
translation = "「엣, 그, 그런…… 회장님한테만 시키다니――앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふあぁああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、動いてるっ……あっ<emoji=heart04>\u3000んあぁっ……あんっ<emoji=heart04>\u3000はぁっ……あっ……あんっ<emoji=heart04>\u3000はぁっ……んっ……ふあぁあんっ<emoji=heart04>」"
translation = "「후아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지, 움직이고 있어…… 앗<emoji=heart04> 응아앗…… 앙<emoji=heart04> 하앗…… 앗…… 앙<emoji=heart04> 하앗…… 응…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「は、初めてなのに、おま○こ凄く、気持ちいい……<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ふあぁっ……はあぁあんっ<emoji=heart04>\u3000あっ、おち○ちんで中を擦られるの凄いぃ……ふああぁんっ<emoji=heart04>」"
translation = "「처, 처음인데, 보지 엄청, 기분 좋아……<emoji=heart04> 앗, 앙<emoji=heart04> 후아앗…… 하아아앙<emoji=heart04> 앗, 자지로 안쪽을 긁히는 거 대단해…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「う、うん……大丈夫、全然、痛くない<emoji=heart04>\u3000んっ、ふあぁっ<emoji=heart04>\u3000どんどん気持ち良くなって……あんっ<emoji=heart04>\u3000んあぁっ、頭ふわふわしてきちゃう……あっ……はあぁんっ<emoji=heart04>」"
translation = "「으, 응…… 괜찮아, 전혀, 안 아파<emoji=heart04> 응, 후아앗<emoji=heart04> 점점 기분 좋아져서…… 앙<emoji=heart04> 응아앗, 머릿속이 둥실둥실해져 버려…… 앗…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んっ……そこ、気持ちいいの……んんっ<emoji=heart04>\u3000あんっ、はあぁ……おち○ちん感じる……あぁんっ<emoji=heart04>\u3000奥感じるぅ……ふあぁあんっ<emoji=heart04>」"
translation = "「응…… 거기, 기분 좋아…… 으응<emoji=heart04> 앙, 하아…… 자지 느껴져…… 아앙<emoji=heart04> 깊은 곳이 느껴져어…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んうぅ<emoji=heart04>\u3000セックスってこんなに、気持ちいいなんてぇ……<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>\u3000き、キスより凄くて……好きになっちゃう……んあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「응으<emoji=heart04> 섹스가 이렇게, 기분 좋은 거였다니……<emoji=heart04> 앗, 하앙<emoji=heart04> 키, 키스보다 대단해서…… 좋아하게 돼버려…… 응아앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「これ、絶対に好きになって、エッチになっちゃう……はぁっ、んあぁっ<emoji=heart04>\u3000アイドルなのにセックス、好きになっちゃうよぉ<emoji=heart04>\u3000……あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「이거, 절대로 좋아하게 돼서, 에로하게 돼버려…… 하앗, 응아앗<emoji=heart04> 아이돌인데 섹스, 좋아하게 돼버려어<emoji=heart04> ……앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――胸も触る？\u3000う、うん、いいよ<emoji=heart04>\u3000……あんっ<emoji=heart04>\u3000会長の手で、優しく揉まれて……はあぁっ……あっ――ふああぁっ<emoji=heart04>」"
translation = "「――가슴도 만질래? 으, 응, 좋아<emoji=heart04> ……앙<emoji=heart04> 회장님의 손으로, 부드럽게 주물려져서…… 하아앗…… 앗――후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「か、会長におっぱい、触られちゃってる……う、嘘……優しく揉まれるだけで、感じちゃ……ふああぁぁっ<emoji=heart04>\u3000お、おっぱい気持ち良く、なっちゃうぅ……<emoji=heart04>」"
translation = "「회, 회장님한테 가슴, 만져지고 있어…… 거, 거짓말…… 부드럽게 주물러지는 것만으로, 느껴버려…… 후아아아앗<emoji=heart04> 가, 가슴 기분 좋게, 돼버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ、あっ、そこ乳首……ああぁんっ<emoji=heart04>\u3000乳首、指でコリコリするのしゅごいっ<emoji=heart04>\u3000それ、気持ちいい……あっ、はあぁんっ<emoji=heart04>\u3000乳首気持ちいいぃ……ふあぁぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 거기 유두…… 아아앙<emoji=heart04> 유두, 손가락으로 굴리는 거 대단해! 그고, 기분 좋아…… 앗, 하아앙<emoji=heart04> 유두 기분 좋아아…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んっ、はあぁっ<emoji=heart04>\u3000おま○こ一緒に擦られるの、しゅごいっ<emoji=heart04>\u3000あっ、あっ……ふああぁんっ<emoji=heart04>\u3000気持ち良くて、おかしくなっちゃうっ……あっ、あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「응, 하아앗<emoji=heart04> 보지랑 같이 비벼지는 거, 대단해! 앗, 앗…… 후아아앙<emoji=heart04> 기분 좋아서, 이상해져 버려…… 앗, 앙<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――え？\u3000会長、どうして謝るの？\u3000んっ……<emoji=heart04>\u3000――興奮して激しく、し過ぎたかも……？\u3000だ、大丈夫だよ。あんっ……<emoji=heart04>\u3000会長だってエッチ、初めてなんだから……」"
translation = "「――에? 회장님, 왜 사과해? 응……<emoji=heart04> ――흥분해서 너무 격하게 한 것 같다구……? 괘, 괜찮아. 앙……<emoji=heart04> 회장님도 에치, 처음이니까……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「むしろ、私がごめんね……あんっ<emoji=heart04>\u3000会長にしてもらって、私ばっかり気持ち良くなっちゃって……私がするって言ったのに……んっ<emoji=heart04>」"
translation = "「오히려, 내가 미안해…… 앙<emoji=heart04> 회장님이 해줘서, 나만 기분 좋아져 버리고…… 내가 한다고 말했는데…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気にすることじゃない。俺も、レミカのおま○こ、凄く気持ちいいし……それに――」"
translation = "「신경 쓸 거 없어. 나도, 레미카의 보지, 엄청 기분 좋으니까…… 게다가――」"

[[dialogue]]
speaker = "unk"
original = "俺はレミカの頬を愛しい気持ちで撫でながら、言った。"
translation = "나는 레미카의 뺨을 사랑스러운 기분으로 쓰다듬으며 말했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「恋人にくらい、甘えて欲しい」"
translation = "「연인에게 정도는, 어리광 부려줬으면 좋겠어」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「～～～っ<emoji=heart04>\u3000あっ……ふあああっ<emoji=heart04>」"
translation = "「～～～っ<emoji=heart04> 앗…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んんっ……会長の言葉でおま○こ喜んで<emoji=heart04>\u3000キュンキュンしちゃってる……<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁ……んっ……ふああぁっ<emoji=heart04>」"
translation = "「으응…… 회장님의 말에 보지가 기뻐서<emoji=heart04> 큥큥거리고 있어……<emoji=heart04> 앗, 앙<emoji=heart04> 하아…… 응…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「愛液いっぱい溢れてきて……はぁっ、あっ……んあぁっ<emoji=heart04>\u3000おち○ちん勝手に、締め付けちゃうの……あっ、はっ……ふあぁあんっ<emoji=heart04>\u3000んっ、あっ……はあぁっ<emoji=heart04>」"
translation = "「애액이 잔뜩 넘쳐흘러서…… 하앗, 앗…… 응아앗<emoji=heart04> 자지가 멋대로, 조여버려…… 앗, 핫…… 후아아앙<emoji=heart04> 응, 앗…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「か、会長……その……んっ<emoji=heart04>\u3000お願い、してもいい……？\u3000あんっ<emoji=heart04>」"
translation = "「회, 회장님…… 그…… 응<emoji=heart04> 부탁, 해도 될까……? 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あのね……<emoji=heart04>\u3000私のおま○こ、興奮しすぎて、はあぁ……<emoji=heart04>\u3000堪らなく、なっちゃってるの……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000だから――」"
translation = "「있잖아……<emoji=heart04> 내 보지, 너무 흥분해서, 하아……<emoji=heart04> 참을 수 없게, 돼버렸어……<emoji=heart04> 으응<emoji=heart04> 그러니까――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長のおち○ちんで、もっといっぱい<emoji=heart04>\u3000激しくして欲しい……<emoji=heart04>\u3000ダメ……？」"
translation = "「회장님의 자지로, 좀 더 잔뜩<emoji=heart04> 격하게 해줬으면 좋겠어……<emoji=heart04> 안 돼……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……レミカ！」"
translation = "「윽…… 레미카!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あんっ、会長っ<emoji=heart04>\u3000あっ――」"
translation = "「앙, 회장님<emoji=heart04> 앗――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ふああぁあああ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000激しいピストン、来たぁ～～～っ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000おち○ちんしゅごいっ<emoji=heart04>」"
translation = "「후아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 격한 피스톤, 왔다아～～～앗<emoji=heart04> 앗 앗 앗<emoji=heart04> 자지 대단해!」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ、あっ、ふあぁあっ<emoji=heart04>\u3000奥、奥当たってる<emoji=heart04>\u3000あんっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000これ、しゅごいっ<emoji=heart04>\u3000あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 후아아앗<emoji=heart04> 깊은 곳, 깊은 곳이 닿고 있어<emoji=heart04> 앙, 앗, 앗, 하아앗<emoji=heart04> 기분 좋아! 이거, 대단해! 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちいいよぉっ<emoji=heart04>\u3000あっ、あっ、そこ、そこそこ<emoji=heart04>\u3000もっと突いてぇっ<emoji=heart04>\u3000はっ、んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「기분 좋아! 보지 기분 좋아아! 앗, 앗, 거기, 거기 거기<emoji=heart04> 좀 더 찔러줘어! 핫, 응아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ、あっ、頭痺れりゅっ<emoji=heart04>\u3000おま○こ突かれる度に、頭バチバチってしちゃうっ<emoji=heart04>\u3000はっ、はっ、気持ち良くて、何も考えられなくなりゅっ<emoji=heart04>」"
translation = "「앗, 앗, 머리가 저릿해져어<emoji=heart04> 보지 찔릴 때마다, 머릿속이 파치파치해져 버려! 핫, 핫, 기분 좋아서, 아무것도 생각할 수 없게 돼버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はあぁっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000これ好きっ<emoji=heart04>\u3000あっ、あっ、会長とのセックスしゅきっ<emoji=heart04>\u3000おち○ちん気持ち良すぎるのぉっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 좋아! 이거 좋아! 앗, 앗, 회장님이랑 하는 섹스 좋아! 자지 너무 기분 좋아아아! 앗, 앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「気持ち良くしてくれる会長好きっ<emoji=heart04>\u3000愛してくれるのしゅきなのっ<emoji=heart04>\u3000はぁぁ……<emoji=heart04>\u3000会長しゅきっ<emoji=heart04>\u3000しゅきしゅきしゅきぃっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000はあぁああんっ<emoji=heart04>」"
translation = "「기분 좋게 해주는 회장님이 좋아! 사랑해주는 게 좋은 거야아! 하아아……<emoji=heart04> 회장님 좋아! 좋아 좋아 좋아아아! 앗, 앗, 앙<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――会長もしゅき？\u3000あっ、あぁぁぁっ<emoji=heart04>\u3000嬉しい……っ<emoji=heart04>\u3000はっ、はっ、んっ<emoji=heart04>\u3000またおま○こ気持ち良く、なっちゃうっ<emoji=heart04>\u3000あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「――회장님도 좋아해? 앗, 아아아앗<emoji=heart04> 기뻐……<emoji=heart04> 핫, 핫, 응<emoji=heart04> 또 보지 기분 좋아져 버려! 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あんっ<emoji=heart04>\u3000な、何か来る<emoji=heart04>\u3000気持ちいい感覚、登ってきてる<emoji=heart04>\u3000あっ、あっ、知らない<emoji=heart04>\u3000これなにぃ？\u3000はっ、はっ、ふぅっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 머, 뭔가 와<emoji=heart04> 기분 좋은 감각이, 올라오고 있어<emoji=heart04> 앗, 앗, 몰라<emoji=heart04> 이거 뭐야아? 핫, 핫, 후으<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「こ、これがイクってことなの？\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000初めてイキそうに、なってる？\u3000んんっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「이, 이게 간다는 거야? 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 처음으로 갈 것 같아지고 있어? 으응, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長もそろそろ、イキそう？\u3000あっ、あっ、凄いっ<emoji=heart04>\u3000腰が更に激しくっ<emoji=heart04>\u3000あんっ、はぁんっ<emoji=heart04>\u3000おち○ちん、気持ちいいっ<emoji=heart04>\u3000はっ、んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「회장님도 이제 곧, 갈 것 같아? 앗, 앗, 대단해! 허리가 더 격하게! 앙, 하앙<emoji=heart04> 자지, 기분 좋아! 핫, 응아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ、あっ<emoji=heart04>\u3000嘘、ウソ嘘っ、会長のおち○ちん、まだ膨らんでりゅ<emoji=heart04>\u3000こ、これ凄いぃ……おま○こ気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>」"
translation = "「앗, 아앗<emoji=heart04> 거짓말, 거-짓말 거짓말, 회장님의 자지, 아직 부풀어 있어<emoji=heart04> 이, 이거 굉장해ぇ…… 보지 기분 좋아앗<emoji=heart04> 앗, 앗, 안<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――もう出そう？\u3000あっ、あっ<emoji=heart04>\u3000会長、射精しそうなの？\u3000んっ、あっ、あんっ<emoji=heart04>\u3000はっ、あぁぁんっ、はあぁああんっ<emoji=heart04>」"
translation = "「――벌써 나올 것 같아? 앗, 앗<emoji=heart04> 회장님, 사정할 것 같아? 응, 앗, 안<emoji=heart04> 핫, 아아앙, 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「うんっ<emoji=heart04>\u3000来て、来てきて<emoji=heart04>\u3000会長の精子、私の中にいっぱい出してぇっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 와줘, 와줘와줘<emoji=heart04> 회장님의 정액, 내 안에 잔뜩 내보내 줘엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000私もイク、イクイクイクッ<emoji=heart04>\u3000……あぁぁぁあああぁぁぁぁぁ～～～～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 간다<emoji=heart04> 나도 가, 가가앗<emoji=heart04> ……아아아아아아아아아아아～～～～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「っ……イッッくぅぅぅっっ～～～～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああっ<emoji=heart04>\u3000ふあぁぁぁぁあああああぁぁぁぁぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 가아앗구우우욱～～～～～～～～<emoji=heart04><emoji=heart04><emoji=heart04> 아앗<emoji=heart04> 후아아아아아아아아아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000……あはぁぁ<emoji=heart04>\u3000んんっ、ふああぁあああ～～～っ<emoji=heart04>\u3000中にいっぱい、熱いの出てるぅ～～っ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> ……아하아<emoji=heart04> 응윽, 후아아아아아아～～～앗<emoji=heart04> 안에 잔뜩, 뜨거운 게 나오고 있어어～～앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んんっ……あっ、ふあぁあっ……<emoji=heart04>\u3000おち○ちん、どくっどくって脈打って……おま○この奥に会長の精子、感じるぅ<emoji=heart04>」"
translation = "「응윽…… 앗, 후아아앗……<emoji=heart04> 자지가, 두근두근거리며 맥동하고…… 보지 깊은 곳에서 회장님의 정액, 느껴져어<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「んふぅぅ<emoji=heart04>\u3000お腹の奥……子宮が、会長のでいっぱいになっちゃう……<emoji=heart04>」"
translation = "「응후우우<emoji=heart04> 배 속 깊은 곳…… 자궁이, 회장님 걸로 가득 차 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あ……おち○ちん、抜けちゃ……あんっ<emoji=heart04>」"
translation = "「아…… 자지, 빠져버려…… 안<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「はあぁ……<emoji=heart04>\u3000凄い量<emoji=heart04>\u3000精子、入り切らなくて、おま○こから溢れて来ちゃう……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 엄청난 양<emoji=heart04> 정액, 다 들어가지 않아서, 보지에서 넘쳐흘러 나와버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長にしてもらうの、凄く気持ち良かった<emoji=heart04>\u3000愛してもらうのって、こんなに幸せな気分になるんだね<emoji=heart04>」"
translation = "「회장님이 해준 거, 정말 기분 좋았어<emoji=heart04> 사랑받는다는 건, 이렇게나 행복한 기분이 되는 거구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長はちゃんと、私で気持ち良くなれた……？」"
translation = "「회장님은 제대로, 나로 기분 좋아졌어……?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そうなんだ……ふふっ、よかった<emoji=heart04>」"
translation = "「그렇구나…… 후훗, 다행이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……あ、あのね、会長？\u3000その……もし大丈夫だったら、なんだけど……もうちょっとだけ、甘えても、いい？」"
translation = "「……저, 저기 있지, 회장님? 그…… 혹시 괜찮다면 말인데…… 조금만 더, 어리광 부려도, 될까?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「少し休んでからでいいんだけど……もう１回エッチしちゃダメ、かな？」"
translation = "「조금 쉬었다가 해도 괜찮은데…… 한 번 더 섹스하면 안, 될까?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「は、初めてのエッチ……凄く気持ち良かったから、おま○こ、まだウズウズしてて……はぁぁ<emoji=heart04>\u3000か、会長がまだイケそうならで、いいんだけど……きゃっ！？」"
translation = "「처, 첫 섹스…… 너무 기분 좋았어서, 보지가, 아직 욱신거리고 있어…… 하아아<emoji=heart04> 회, 회장님이 아직 가능하시다면, 괜찮지만…… 꺄악!?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長のおち○んちん、すぐに大きくなって……<emoji=heart04>\u3000はぁぁ……<emoji=heart04>\u3000す、凄い<emoji=heart04>」"
translation = "「회장님의 자지, 금방 커져버려서……<emoji=heart04> 하아아……<emoji=heart04> 그, 굉장해<emoji=heart04>」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――私がエッチなことを言うから回復しちゃった……？\u3000そ、そうなんだ……」"
translation = "「――내가 야한 말을 해서 회복해버린 거야……? 그, 그렇구나……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「じゃあ、その……もうしちゃう？」"
translation = "「그럼, 그…… 벌써 해버릴까?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「あっ……<emoji=heart04>\u3000会長……んっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 회장님…… 응윽<emoji=heart04> 안<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、お互い満足するまで、繰り返し初セックスの味を確かめ合ってしまう、俺たちなのだった――"
translation = "그 후, 서로 만족할 때까지 반복해서 첫 섹스의 맛을 확인하고 마는, 우리들이었다――"

