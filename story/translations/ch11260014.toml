[[dialogue]]
speaker = "unk"
original = "第４話,俺と魔法少女の恋愛事情,P"
translation = "제4화, 나와 마법소녀의 연애 사정, P"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんから好意を伝えられた上で、速攻フラれた一件から、少し経ったある日のこと。"
translation = "트레지안나 씨에게 호감을 전달받은 뒤 속공으로 차인 사건으로부터 조금 시간이 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺が彼女と一緒に、何気なく過ごしていると――"
translation = "내가 그녀와 함께 아무렇지 않게 시간을 보내고 있자니──"

[[dialogue]]
speaker = "トレジアンナ"
original = "「会長さん、ちょっとご相談なんですけど～」"
translation = "「회장님, 드릴 말씀이 좀 있는데요~」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「今度の週末の休み、私と――デートに出かけませんか？」"
translation = "「이번 주말 휴일에 저랑── 데이트하러 나가지 않을래요?」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?"

[[dialogue]]
speaker = "unk"
original = "というわけで――"
translation = "그리하여──"

[[dialogue]]
speaker = "unk"
original = "週末のデート当日。俺は彼女に誘われて、秋葉原にやって来たのだが……"
translation = "주말 데이트 당일. 나는 그녀의 권유로 아키하바라에 오게 되었는데……"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふっふっふっ、手に入れちゃいましたよ～！\u3000新発売の魔法少女フィギュアの店舗限定版♪\u3000お一人様１点限りのところを、会長さんに手伝ってもらって２体☆」"
translation = "「훗훗훗, 손에 넣어버렸어요~! 신발매 마법소녀 피규어 매장 한정판♪ 1인당 1개 한정인 걸 회장님이 도와주셔서 2체☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「これ、店舗限定のパーツ換装で、シャドウ魔法少女に変えられるんですけど、劇中だともう１人の別キャラなんですよね～。だから、２体並べて飾りたかったんです♪」"
translation = "「이거 매장 한정 파츠 교체로 섀도 마법소녀로 바꿀 수 있는데, 극 중에서는 다른 캐릭터거든요~. 그래서 2체를 나란히 장식하고 싶었답니다♪」"

[[dialogue]]
speaker = "unk"
original = "うん、そんなことだろうと思った"
translation = "응, 그럴 줄 알았어"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや～、私たちすっかり以心伝心ですね☆」"
translation = "「이야~ 우리 정말 이심전심이네요☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「でも、付き合ってくれてありがとうございます、会長さん。どうしても２体欲しかったので、ゲットできて嬉しいです～。えへへ♪」"
translation = "「그래도 같이 와줘서 고마워요, 회장님. 꼭 2체 갖고 싶었기에 득템해서 기뻐요~. 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "そんな風に嬉しそうなトレジアンナさんの笑顔を見ると、俺は早起きして開店前に並んだことも、つい許せてしまう。"
translation = "저렇게 기뻐 보이는 트레지안나 씨의 미소를 보니, 나는 일찍 일어나서 개점 전부터 줄을 선 것도 그만 용서하게 된다."

[[dialogue]]
speaker = "unk"
original = "好意を伝えられて以来、俺は逆に、彼女を異性として強く<b>意識する</b>ようになってしまっていた。"
translation = "호감을 전달받은 이래, 나는 반대로 그녀를 이성으로서 강하게 <b>의식</b>하게 되어버리고 말았다."

[[dialogue]]
speaker = "unk"
original = "ところで、今日はどうして魔法少女衣装を？"
translation = "그런데 오늘은 왜 마법소녀 의상을?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「それはほら、秋葉原といえば、コスプレじゃないですか～」"
translation = "「그건 보세요, 아키하바라 하면 코스프레잖아요~」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「せっかく来るなら、こっちの方が楽しいデートになりそうかな～と思いまして～☆」"
translation = "「모처럼 오는 거라면 이쪽이 더 즐거운 데이트가 될 것 같아서요~☆」"

[[dialogue]]
speaker = "unk"
original = "さらっと口にした『デート』という単語に、俺はまた、こそばゆい気持ちになってしまう。"
translation = "태연하게 입에 담은 『데이트』라는 단어에 나는 다시 근질근질한 기분이 된다."

[[dialogue]]
speaker = "unk"
original = "――それから２人で、近くのスイーツ店に入って、休憩することになった。"
translation = "──그러고 나서 둘이서 근처 디저트 가게에 들어가 휴식을 취하게 되었다."

[[dialogue]]
speaker = "unk"
original = "注文を終えて、席に着いたところで、トレジアンナさんが目をキラキラさせながら言う。"
translation = "주문을 마치고 자리에 앉았을 때, 트레지안나 씨가 눈을 반짝이며 말한다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「会長さん！\u3000会計のレシート、貰ってもいいですか？\u3000是非、コレクションしたいです！」"
translation = "「회장님! 계산 영수증, 제가 가져도 될까요? 꼭 수집하고 싶어요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「――いいんですか？\u3000やったぁ～☆\u3000ありがとうございます～♪」"
translation = "「──괜찮나요? 야호~☆ 감사합니다~♪」"

[[dialogue]]
speaker = "unk"
original = "俺とのレシート、そんなに嬉しいんですか？"
translation = "나와의 영수증이 그렇게 기쁜가요?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい♪\u3000好きな男のヒトとデートに来た、思い出の品になりますから♪」"
translation = "「네♪ 좋아하는 남자분과 데이트하러 온 추억의 물건이 되니까요♪」"

[[dialogue]]
speaker = "unk"
original = "なんの臆面もなく、またさらっとそんなことを言う彼女。"
translation = "아무런 부끄러움도 없이 다시 태연하게 그런 소리를 하는 그녀."

[[dialogue]]
speaker = "unk"
original = "ピンと来ないって言ってましたよね？"
translation = "감이 안 잡힌다고 하셨었죠?"

[[dialogue]]
speaker = "unk"
original = "この前……恋愛について"
translation = "저번에…… 연애에 대해서"

[[dialogue]]
speaker = "トレジアンナ"
original = "「？\u3000ええ、そうですね。私、真剣な交際とかは全然考えてなくて――」"
translation = "「? 네, 그렇죠. 저 진지한 교제 같은 건 전혀 생각 안 하고 있어서──」"

[[dialogue]]
speaker = "unk"
original = "――なら俺がもし、真剣に恋人になって欲しいって言ったら……どうしますか？"
translation = "──그럼 내가 만약 진지하게 연인이 되어달라고 한다면…… 어떻게 할 건가요?"

[[dialogue]]
speaker = "unk"
original = "俺がそう尋ねると──"
translation = "내가 그렇게 묻자──"

[[dialogue]]
speaker = "トレジアンナ"
original = "「だが断る！！！」"
translation = "「하지만 거절한다!!!」"

[[dialogue]]
speaker = "unk"
original = "そんなに強く！？"
translation = "그렇게 단호하게!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい♪\u3000別に私じゃなくとも、会長さんの周りには、可愛い女の子が沢山いると思いますから☆」"
translation = "「네♪ 굳이 제가 아니더라도 회장님 주변에는 귀여운 여자아이가 많이 있을 테니까요☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私は、会長さんとは程よい距離感で、異性の程よく甘い関係を、気楽に楽しめたらいいな～って考えてます」"
translation = "「저는 회장님과 적당한 거리감으로 이성으로서 적당히 달콤한 관계를 가볍게 즐길 수 있으면 좋겠다고 생각해요」"

[[dialogue]]
speaker = "unk"
original = "なら……まずは友達からならいいですか？"
translation = "그럼…… 일단 친구부터라면 괜찮나요?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんはきょとんとした顔をして、目をぱちくりさせる。"
translation = "트레지안나 씨는 멍한 표정을 지으며 눈을 깜빡인다."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女に、告げた。"
translation = "나는 그런 그녀에게 고했다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「――えっ！？\u3000私と……『友達以上恋人未満』でお付き合いしたい！？」"
translation = "「──엣!? 저랑…… 『친구 이상 연인 미만』으로 사귀고 싶다고요!?」"

[[dialogue]]
speaker = "unk"
original = "そして、その代わりに交換条件として――"
translation = "그리고 그 대신 교환 조건으로──"

[[dialogue]]
speaker = "unk"
original = "『ＴＳ魔法少女』になってもいいです"
translation = "『TS 마법소녀』가 되어도 좋습니다"

[[dialogue]]
speaker = "unk"
original = "もし付き合ってくれたら、俺"
translation = "만약 사귀어준다면 저"

[[dialogue]]
speaker = "トレジアンナ"
original = "「なっ！？」"
translation = "「앗!?」"

[[dialogue]]
speaker = "unk"
original = "――俺が魔法少女に変身した姿の写真、コレクションに加えたくないですか？"
translation = "──내가 마법소녀로 변신한 모습의 사진, 컬렉션에 추가하고 싶지 않나요?"

[[dialogue]]
speaker = "unk"
original = "俺が更にもうひと押し、そう付け加えると……"
translation = "내가 한 번 더 밀어붙이듯 덧붙이자……"

[[dialogue]]
speaker = "トレジアンナ"
original = "「――友達以上恋人未満でお願いします！！！」"
translation = "「──친구 이상 연인 미만으로 부탁드려요!!!」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで果たして、俺はトレジアンナさんとの契約に成功したのだった。"
translation = "그리하여 결국 나는 트레지안나 씨와의 계약에 성공한 것이었다."

[[dialogue]]
speaker = "unk"
original = "それから、注文したケーキと飲み物が来て、俺はひと息つこうと紅茶を飲んでいると――"
translation = "그러고 나서 주문한 케이크와 음료가 나왔고, 내가 한숨 돌리려고 홍차를 마시고 있자니──"

[[dialogue]]
speaker = "トレジアンナ"
original = "「会長さん、さっきのことでふと思ったんですけど、質問いいですか～？」"
translation = "「회장님, 방금 일로 문득 생각난 건데 질문 하나 해도 될까요~?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「友達以上恋人未満っていうのは――<b>キス</b>なんかはありなんでしょうか！？」"
translation = "「친구 이상 연인 미만이라는 건── <b>키스</b> 같은 건 가능한 걸까요!?」"

[[dialogue]]
speaker = "unk"
original = "不意打ちの発言に、俺は思わずむせる。"
translation = "기습적인 발언에 나는 나도 모르게 사레들린다."

[[dialogue]]
speaker = "unk"
original = "いきなり聞きますか、それ！？"
translation = "갑자기 그런 걸 묻나요!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「え～？\u3000だって、気になるじゃないですか～！\u3000私だって女の子なんですよ～！？」"
translation = "「에~? 그치만 궁금하잖아요~! 저도 여자애라고요!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「恋愛はピンと来ませんが……エッチなことには興味津々です！」"
translation = "「연애는 감이 안 잡히지만…… 야한 것에는 흥미진진하답니다!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000大声でなに言ってんですか！？"
translation = "잠깐!? 큰 소리로 무슨 소리를 하는 거예요!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あっ！\u3000その反応は～！\u3000えへへへぇ～、どうやら会長さんも、興味あるみたいですね～<emoji=heart04>」"
translation = "「앗! 그 반응은~! 에헤헤헤, 아무래도 회장님도 흥미가 있는 모양이네요~<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「なら、どうします～？\u3000どこまでがセーフで、どこまでがアウトか、この後じっくり吟味しちゃいます？」"
translation = "「그럼 어떻게 할까요~? 어디까지가 세이프고 어디까지가 아웃인지, 이따가 천천히 음미해볼래요?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「うふふっ<emoji=heart04>」"
translation = "「우후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょっと大人な笑顔でからかう魔法少女に、俺はこれからを期待してドキドキさせられてしまうのであった――"
translation = "약간 어른스러운 미소로 놀리는 마법소녀에게, 나는 앞으로를 기대하며 가슴 설레게 되는 것이었다──"

