[[dialogue]]
speaker = "unk"
original = "学園の夏季休暇も終わりに近付きつつある、ある日のこと。"
translation = "학원의 하계 휴가도 끝에 가까워지던 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺は、サーシャさん、アナと共に再び、リップルのリゾート結界へとやって来ていた。"
translation = "나는 사샤 씨, 아나와 함께 다시 한번, 리플의 리조트 결계로 찾아와 있었다."

[[dialogue]]
speaker = "アナ"
original = "「……さて、サーシャ先輩、会長。準備はよろしいですか？」"
translation = "「……자, 사샤 선배, 회장님. 준비는 되셨나요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「は～い♪\u3000大丈夫よ～」"
translation = "「네~♪ 괜찮아요~」"

[[dialogue]]
speaker = "unk"
original = "こっちもＯＫだ！"
translation = "이쪽도 OK야!"

[[dialogue]]
speaker = "アナ"
original = "「では――」"
translation = "「그럼──」"

[[dialogue]]
speaker = "アナ"
original = "「サバイバル合宿を開始しましょう」"
translation = "「서바이벌 합숙을 시작하죠.」"

[[dialogue]]
speaker = "サーシャ"
original = "「お～♪」"
translation = "「오~♪」"

[[dialogue]]
speaker = "unk"
original = "なぜ俺達３人が再び合宿をすることになったのかというと、時間は前日まで遡る――"
translation = "왜 우리 세 사람이 다시 합숙을 하게 되었는가 하면, 시간은 전날까지 거슬러 올라간다──"

[[dialogue]]
speaker = "アナ"
original = "「会長、こちらの書類も終わりました」"
translation = "「회장님, 이 서류도 끝났습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「私の方も終わったわ～。これで溜まっていた書類は、全部片付いたわね～」"
translation = "「내 쪽도 끝났어~. 이걸로 밀려있던 서류는 전부 정리됐네~」"

[[dialogue]]
speaker = "unk"
original = "２人共、ありがとう"
translation = "둘 다 고마워."

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレム。会長を補佐するのが、副会長の務めですので」"
translation = "「노 프로블럼. 회장님을 보좌하는 것이 부회장의 임무니까요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ♪\u3000アナちゃん、副会長として、もうすっかりベテランね～」"
translation = "「후훗♪ 아나 쨩, 부회장으로서 이제 완전히 베테랑이네~」"

[[dialogue]]
speaker = "アナ"
original = "「前会長は親戚同士の集まりで遠出中、マトイ先輩がお母様のご実家に帰省中で、不在の間、お２人の留守を頼まれていますから」"
translation = "「전 회장님은 친척 모임으로 멀리 나가셨고, 마토이 선배가 어머님 친가로 귀성 중이라 부재중인 동안, 두 분의 빈자리를 부탁받았으니까요.」"

[[dialogue]]
speaker = "unk"
original = "２人はいつ頃帰って来るんだっけ？"
translation = "두 사람은 언제쯤 돌아온다고 했지?"

[[dialogue]]
speaker = "アナ"
original = "「お２人共、今週末には帰って来るそうですよ。留守番の報酬として、ご当地の和菓子を買ってきて貰う約束になってます……わくわく」"
translation = "「두 분 다 이번 주말에는 돌아오신다고 해요. 집 지킨 보답으로 현지의 화과자를 사다 주기로 약속했거든요…… 두근두근.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら♪\u3000いつもより張り切って仕事してると思ったら、そのせいだったのね～」"
translation = "「어라어라♪ 평소보다 의욕적으로 일한다 했더니 그것 때문이었구나~」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ、そうだわ。話は変わるけど、会長くんとアナちゃんは、リップルちゃんのこと聞いた？」"
translation = "「아, 맞다. 이야기는 다르지만, 회장 군이랑 아나 쨩은 리플 쨩 이야기 들었어?」"

[[dialogue]]
speaker = "アナ"
original = "「無人島での夏合宿の後、リップルさんが転入して来て、学園の生徒達に向けてリゾート結界を開放したんですよね」"
translation = "「무인도 여름 합숙 후에 리플 씨가 전입해 와서, 학원 학생들에게 리조트 결계를 개방했었죠.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうそう。それでリゾート結界とリップルちゃんの海の家……たちまち人気になって、凄く繁盛しているんですって♪」"
translation = "「맞아 맞아. 그래서 리조트 결계랑 리플 쨩의 바다의 집…… 순식간에 인기가 많아져서 엄청 번창하고 있대♪」"

[[dialogue]]
speaker = "アナ"
original = "「リゾート結界は、リップルさんの夢が詰まった、まさに常夏の楽園と言っていい場所。人気が出るのも頷けます」"
translation = "「리조트 결계는 리플 씨의 꿈이 담긴, 그야말로 상하의 낙원이라고 할 만한 장소. 인기가 있는 것도 납득이 가요.」"

[[dialogue]]
speaker = "unk"
original = "リゾート結界での合宿、楽しかったよね"
translation = "리조트 결계에서의 합숙, 즐거웠지."

[[dialogue]]
speaker = "アナ"
original = "「最初、結界に閉じ込められてしまった時は、どうなることかと思いましたが……」"
translation = "「처음 결계에 갇혀버렸을 때는 어떻게 되나 싶었지만……」"

[[dialogue]]
speaker = "アナ"
original = "「蓋を開けてみれば、美味しい食事に、快適な寝床や温泉もありで、サバイバルとは無縁の１週間でした」"
translation = "「뚜껑을 열어보니 맛있는 식사에 쾌적한 잠자리와 온천까지 있어서, 서바이벌과는 거리가 먼 1주일이었죠.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～。でも――」"
translation = "「그렇지~. 하지만──」"

[[dialogue]]
speaker = "サーシャ"
original = "「私は、当初の予定だった、無人島での自給自足の合宿も体験してみたかったかも～」"
translation = "「나는 당초 예정이었던 무인도에서의 자급자족 합숙도 체험해 보고 싶었을지도~」"

[[dialogue]]
speaker = "アナ"
original = "「おや？\u3000サーシャ先輩、サバイバルに興味が……？」"
translation = "「어라? 사샤 선배, 서바이벌에 관심이……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「未知の体験ってワクワクするでしょ？\u3000サバイバル経験は無いから、１度やってみたかったのよね～」"
translation = "「미지의 체험이란 건 설레잖아? 서바이벌 경험은 없으니까 한 번 해보고 싶었거든~」"

[[dialogue]]
speaker = "アナ"
original = "「……ふむ」"
translation = "「……흠.」"

[[dialogue]]
speaker = "アナ"
original = "「なら、改めてサバイバル合宿をしてみますか？」"
translation = "「그럼 다시 한번 서바이벌 합숙을 해보시겠어요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "アナ"
original = "「人間界のことわざで、思い立ったが吉日とも言います。せっかくだから、やってみてもいいんじゃないでしょうか？」"
translation = "「인간계의 속담에 시작이 반이라는 말도 있고, 마음먹었을 때가 적기라고도 하죠. 이왕 이렇게 된 거 해봐도 좋지 않을까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも……もうすぐ夏休みも終わりよ？\u3000さすがに今から旅行計画を立ててる時間は……」"
translation = "「하지만…… 이제 곧 여름방학도 끝나가잖아? 지금부터 여행 계획을 세울 시간은 아무래도……」"

[[dialogue]]
speaker = "アナ"
original = "「無人島のサバイバル合宿を想定するなら、そこを再現したリゾート結界を借りれば、遠出せずともノープロブレムです」"
translation = "「무인도 서바이벌 합숙을 상정한다면, 그곳을 재현한 리조트 결계를 빌리면 멀리 나가지 않아도 노 프로블럼이에요.」"

[[dialogue]]
speaker = "アナ"
original = "「合宿プログラムは私が考えますから、後は各自の予定ですね。明日から今週末にかけて、サーシャ先輩は何か用事がありますか？」"
translation = "「합숙 프로그램은 제가 짤 테니까, 나머지는 각자의 예정이죠. 내일부터 이번 주말에 걸쳐서 사샤 선배는 뭐 볼일 있으신가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「え～と、予定は空いてるけど……」"
translation = "「에~ 그러니까, 예정은 비어있지만……」"

[[dialogue]]
speaker = "アナ"
original = "「ならやりましょう。私もサバイバルには興味がありましたし、ちょうどいい機会です」"
translation = "「그럼 하죠. 저도 서바이벌에는 관심이 있었고, 마침 좋은 기회예요.」"

[[dialogue]]
speaker = "アナ"
original = "「会長はサバイバル経験があると仰ってましたよね？\u3000もしよろしければ、サバイバルのこと教えて頂けませんか？」"
translation = "「회장님은 서바이벌 경험이 있다고 하셨죠? 혹시 괜찮으시다면 서바이벌에 대해 가르쳐 주실 수 있나요?」"

[[dialogue]]
speaker = "unk"
original = "分かった。予定は空いているから大丈夫だよ"
translation = "알았어. 예정은 비어있으니까 괜찮아."

[[dialogue]]
speaker = "アナ"
original = "「ありがとうございます。後はサーシャ先輩の気持ち次第ですが、いかがでしょう？」"
translation = "「감사합니다. 남은 건 사샤 선배의 마음가짐인데, 어떠신가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「……そうね。分かったわ、アナちゃん。こんなにも積極的にやろうって言ってくれてるんだもの」"
translation = "「……그래. 알았어, 아나 쨩. 이렇게나 적극적으로 하자고 말해주는걸.」"

[[dialogue]]
speaker = "サーシャ"
original = "「せっかく合宿するなら、楽しまないとね♪」"
translation = "「기왕 합숙하는 거 즐겨야겠지♪」"

[[dialogue]]
speaker = "アナ"
original = "「決まりですね」"
translation = "「결정됐네요.」"

[[dialogue]]
speaker = "アナ"
original = "「それでは明日から、この３人でサバイバル合宿を開催しましょう」"
translation = "「그러면 내일부터 우리 셋이서 서바이벌 합숙을 개최하죠.」"

[[dialogue]]
speaker = "unk"
original = "こうして俺達は再び、合宿をすることになったのだった。"
translation = "이렇게 해서 우리들은 다시 합숙을 하게 된 것이었다."

