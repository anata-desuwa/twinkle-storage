[[dialogue]]
speaker = "unk"
original = "第３話,プリムラに告白,P"
translation = "제3화, 프리뮬러에게 고백, P"

[[dialogue]]
speaker = "unk"
original = "数日後──俺とプリムラは繁華街までお出かけをすることにした。"
translation = "며칠 후── 나와 프리뮬러는 번화가까지 외출을 하기로 했다."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「眷族よ、今日は世話になったのじゃ！\u3000貴様のおかげで見事、眷族２号と３号のオモチャとおやつが買えたのじゃ♪」"
translation = "「권속이여, 오늘은 신세를 졌느니라! 네놈 덕분에 훌륭하게 권속 2호와 3호의 장난감과 간식을 살 수 있었느니라♪」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「それにしても貴様、猫のことに随分と詳しかったのう？」"
translation = "「그나저나 네놈, 고양이에 대해 꽤나 자세히 알고 있더구나?」"

[[dialogue]]
speaker = "unk"
original = "ペットショップでアルバイトしてたから"
translation = "펫 숍에서 아르바이트를 했었으니까."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ほう、なるほど。昔取った杵柄というやつじゃな！」"
translation = "「호오, 과연. 옛날 실력 발휘라는 것이구나!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「我も宝石磨きのアルバイトはしておるが、それ以外はからっきしじゃからの。様々な知恵を出してもらえて助かったのじゃ！」"
translation = "「짐도 보석 닦기 아르바이트는 하고 있다만, 그 외에는 전혀 젬병이라서 말이다. 여러 지혜를 빌려주어 도움이 되었느니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「やはり我と眷族はよいコンビになれそうじゃ。貴様はその『賢』によって我を支え、我はこの『暴』によって他を圧倒する……無敵なのじゃ！」"
translation = "「역시 짐과 권속은 좋은 콤비가 될 수 있을 것 같구나. 네놈은 그 『현(賢)』으로써 짐을 보좌하고, 짐은 이 『폭(暴)』으로써 타를 압도한다…… 무적이니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「眷族さえ首を縦に振れば、世界を征服するのもたやすいのじゃが～……ちらっ？」"
translation = "「권속만 고개를 끄덕인다면 세계를 정복하는 것도 식은 죽 먹기이니라만～…… 힐끗?」"

[[dialogue]]
speaker = "unk"
original = "みんなとは仲良くしようね"
translation = "모두와는 사이좋게 지내자."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ムムム。我は兵器じゃぞ、仲良しこよしをする存在ではないと言うておるじゃろうに！」"
translation = "「무무무. 짐은 병기이니라, 오순도순 사이좋게 지내는 존재가 아니라고 말하지 않았느냐!」"

[[dialogue]]
speaker = "unk"
original = "子猫のオモチャを持ってたら説得力が……"
translation = "아기 고양이 장난감을 들고 있으면 설득력이……."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「フフン、我がただ甘やかすために散財したと思ったか？\u3000これは恐るべき作戦なのじゃ！」"
translation = "「후흥, 짐이 그저 응석을 받아주기 위해 돈을 썼다고 생각했느냐? 이것은 가공할 작전이니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「眷族２号と３号には、今後もたっぷりと美味いものや楽しいオモチャを買い与えて、我への永遠の忠誠を誓わせてやるのじゃ！」"
translation = "「권속 2호와 3호에게는 앞으로도 듬뿍 맛있는 것과 즐거운 장난감을 사주어, 짐을 향한 영원한 충성을 맹세하게 만들 것이니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「フフフ、なんと悪どい策略なのじゃ……我ながら恐ろしくなってくるのう♪」"
translation = "「후후후, 얼마나 악랄한 책략이냐…… 짐이 생각해도 무서워지는구나♪」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──ところで眷族よ。買い物が終わった後に、我へ話があると言っておったよな？」"
translation = "「──그런데 권속이여. 쇼핑이 끝난 후에 짐에게 할 말이 있다고 했었지?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「……何？\u3000人のいないところがよいのか？\u3000フム、では眷族の家へ行くとするか！」"
translation = "「……뭐냐? 사람이 없는 곳이 좋으냐? 흠, 그럼 권속의 집으로 가도록 하지!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「で、眷族よ。茶もしばいたし、ケーキも食った。肝心の話はいつするんじゃ？」"
translation = "「자, 권속이여. 차도 마셨고 케이크도 먹었느니라. 정작 중요한 이야기는 언제 할 것이냐?」"

[[dialogue]]
speaker = "unk"
original = "（緊張してきたな）"
translation = "(긴장되기 시작하네)"

[[dialogue]]
speaker = "unk"
original = "（いざ告白するとなると……）"
translation = "(막상 고백하려고 하니……)"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「……なぁんて、の。我は眷族の主人じゃぞ。貴様の考えることなんぞお見通しじゃ！」"
translation = "「……라니, 말이다. 짐은 권속의 주인이니라. 네놈이 생각하는 것쯤은 훤히 들여다보이느니라!」"

[[dialogue]]
speaker = "unk"
original = "もしかしてバレてた……？"
translation = "혹시 들켰어……?"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「たわけめ、当然であろう！\u3000配下の考えることがわからんで主人が務まるか！」"
translation = "「이 바보 녀석, 당연하지 않겠느냐! 부하가 생각하는 것을 모르면 주인을 할 수 있겠느냐!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「じゃが切り出したのは貴様じゃ。ちゃーんと口に出さんか」"
translation = "「하지만 말을 꺼낸 건 네놈이니라. 똑바로 입 밖으로 내지 못하겠느냐.」"

[[dialogue]]
speaker = "unk"
original = "俺と付き合って欲しい！"
translation = "나랑 사귀어 줬으면 좋겠어!"

[[dialogue]]
speaker = "unk"
original = "……好きなんだ、プリムラのこと"
translation = "……좋아해, 프리뮬러를."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ほ～れ、見たことか。やっぱり我の思ったとおり──」"
translation = "「보아라, 내 이럴 줄 알았느니라. 역시 짐이 생각한 대로──」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──ではないではないか！？」"
translation = "「──가 아니지 않느냐!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「えっ？\u3000我、告白されたのじゃ？\u3000あ、あわわわ……！？」"
translation = "「엣? 짐, 고백받은 것이냐? 아, 아와와와……!?」"

[[dialogue]]
speaker = "unk"
original = "何だと思ってたの……？"
translation = "뭐라고 생각했던 거야……?"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「て、てっきり世界征服をした後、領土の分け前のことかな～、とばかり……ぜ、全然違ったではないか……！」"
translation = "「더, 당연히 세계 정복을 한 후 영토 배분에 관한 것일까～ 하고만…… 저, 전혀 다르지 않느냐……!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「……貴様、本気で言っておるのか？\u3000その、我のこと……あれであろう、女子として好き、と……？」"
translation = "「……네놈, 진심으로 말하는 것이냐? 그, 짐을…… 그거지 않느냐, 여자로서 좋아한다고……?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ムム、真剣な瞳なのじゃ……そ、それなら我も、きちんと答えねばなるまいっ！」"
translation = "「무무, 진지한 눈빛이구나…… 그, 그렇다면 짐도 제대로 대답해야만 하겠지!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「う、うん……我も、その～……け、眷族のことは、憎からず思って、おるぞ……？」"
translation = "「으, 응…… 짐도, 그～…… 궈, 권속은 싫지 않게 생각하고 있느니라……?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「世界を滅ぼすために目覚めてからというもの、本来の姿には戻れず、兵器としての本懐も果たせぬままではあったが……」"
translation = "「세계를 멸망시키기 위해 깨어난 이후로, 본래의 모습으로는 돌아가지 못하고 병기로서의 숙원도 이루지 못한 채였지만……」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「眷族と過ごす日々はとても楽しいし、うまいチョコもくれるし……それに……」"
translation = "「권속과 보내는 나날은 무척 즐겁고, 맛있는 초코도 주고…… 그리고……」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「──我の頭、撫でるのじゃ」"
translation = "「──짐의 머리, 쓰다듬거라.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「……うむ<emoji=heart04>\u3000今だけは素直になってやるのじゃ。我、眷族にこうやって触れられるのが、嫌いではない」"
translation = "「……음<emoji=heart04> 지금만큼은 솔직해져 주마. 짐, 권속에게 이렇게 닿는 것이 싫지 않느니라.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「いいや……好き、じゃな<emoji=heart04>」"
translation = "「아니…… 좋아하느니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「他の男ではこんな温かな気持ちにはならんのじゃ……返事は、これでよいか？」"
translation = "「다른 사내에게서는 이런 따스한 기분이 들지 않느니라…… 대답은 이것으로 되었느냐?」"

[[dialogue]]
speaker = "unk"
original = "受け入れてくれてありがとう"
translation = "받아줘서 고마워."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ふ、ふふんっ<emoji=heart04>\u3000配下から想いを伝えられれば、それを飲み込んでやるのも主人の役目じゃ！」"
translation = "「후, 후흥<emoji=heart04> 부하에게서 마음을 전해 들으면 그것을 받아들이는 것도 주인의 역할이니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ほれ、眷族よ。ちょっとだけかがめ。契約をするぞ」"
translation = "「자, 권속이여. 조금만 숙이거라. 계약을 하겠노라.」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「んっ……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「これは主従の契約ではないからの。ただの口付けじゃ<emoji=heart04>」"
translation = "「이건 주종 계약이 아니니라. 그냥 입맞춤이니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「うむ！\u3000これからもよろしく頼むぞ、眷族っ！」"
translation = "「음! 앞으로도 잘 부탁하마, 권속!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とプリムラは、恋人同士になったのだった──"
translation = "이렇게 나와 프리뮬러는 연인 사이가 되었다──"

