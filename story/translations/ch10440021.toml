[[dialogue]]
speaker = "unk"
original = "第１話,もう１度契約してみるのじゃ！,P"
translation = "제1화, 다시 한번 계약해 보는 것이니라!, P"

[[dialogue]]
speaker = "unk"
original = "『解放』のロストアイテムにより、封印されていた能力の一部を取り戻したプリムラ。"
translation = "『해방』의 로스트 아이템에 의해, 봉인되어 있던 능력의 일부를 되찾은 프리무라."

[[dialogue]]
speaker = "unk"
original = "プリムラの強大な力は、管理者である俺かサチの許可がなくては起動できない。そのため、戦闘訓練も必然的に一緒に行う必要があって……"
translation = "프리무라의 강대한 힘은, 관리자인 나나 사치의 허가가 없으면 기동할 수 없다. 그 때문에, 전투 훈련도 필연적으로 함께 할 필요가 있어서……"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「モンスターよ、これでジ・エンドじゃ！\u3000プリズム・ブラスター！！」"
translation = "「몬스터여, 이걸로 디 엔드니라! 프리즘 블래스터!!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「フハハハハ！\u3000どうじゃ眷族よ、我の新しい戦闘形態は！」"
translation = "「후하하하하! 어떠냐 권속이여, 짐의 새로운 전투 형태는!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「先日のロストアイテム騒動の時にも披露してやったが、凄まじい火力じゃろう！」"
translation = "「지난번 로스트 아이템 소동 때도 보여주었지만, 엄청난 화력이지 않느냐!」"

[[dialogue]]
speaker = "unk"
original = "本当にすごいパワーだ……！"
translation = "정말로 대단한 파워다……!"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「当然じゃ。今でこそあの忌々しい『星の鎖』によって封じられておるが、我はそもそもこの世界を滅ぼすために設計された終末兵器なのじゃからな♪」"
translation = "「당연하니라. 지금이야말로 저 가증스러운 『별의 사슬』에 의해 봉인되어 있지만, 짐은 원래 이 세계를 멸망시키기 위해 설계된 종말 병기이니까 말이다♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ククク、老婆心ながら忠告してやろう。今のうちにしっかり我のご機嫌を取っておくのが賢明じゃぞ？」"
translation = "「크크크, 노파심에 충고해 주마. 지금부터 미리 짐의 기분을 잘 맞춰두는 것이 현명할 것이니라?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「我は日々の訓練と実戦で、着実にレベルアップしておるのじゃ！\u3000それに加えて、封印されておる全ての力を取り戻してみろ……」"
translation = "「짐은 매일의 훈련과 실전으로, 착실하게 레벨 업 하고 있느니라! 거기에 더해, 봉인되어 있는 모든 힘을 되찾았다고 생각해 보거라……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「最終的には、学園の星騎士が束になっても敵わん強さになることは必定！\u3000世界は我が力の前にひれ伏すことになるのじゃ！」"
translation = "「최종적으로는, 학원의 성기사가 떼거지로 덤벼도 당해낼 수 없는 강함이 될 것이 자명하다! 세계는 짐의 힘 앞에 무릎 꿇게 될 것이니라!」"

[[dialogue]]
speaker = "unk"
original = "ご褒美をあげなきゃね"
translation = "포상을 줘야겠네"

[[dialogue]]
speaker = "unk"
original = "訓練の成果もばっちりだし"
translation = "훈련 성과도 확실하고"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「おおっ！\u3000桜十路のチョコレートか！\u3000フヘヘ、我の好物なのじゃっ！\u3000もぐもぐもぐ……！」"
translation = "「오옷! 사쿠라지로의 초콜릿인가! 후헤헤, 짐이 좋아하는 것이니라! 우물우물우물……!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「──って！\u3000我はペットではない！\u3000餌付けのようにチョコを渡すのはやめろと言っておるじゃろうが！\u3000もぐもぐもぐ……！」"
translation = "「──앗! 짐은 애완동물이 아니다! 먹이를 주듯 초코를 건네는 건 그만두라고 말하지 않았느냐! 우물우물우물……!」"

[[dialogue]]
speaker = "unk"
original = "（それでも食べるんだ……）"
translation = "（그러면서도 먹는구나……）"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「──ふぅっ。眷族はいつもこうじゃ。我と相対した時に、こう……何と言えばよいのじゃ？」"
translation = "「──후우. 권속은 언제나 이렇구나. 짐과 마주했을 때, 그…… 뭐라고 말하면 좋겠느냐?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「子犬を愛でる飼い主のような塩梅で接してきよる。貴様、我が普通の<ruby>女子<rt>おなご</rt></ruby>と変わらんと思ってはおらんか？」"
translation = "「강아지를 귀여워하는 주인 같은 태도로 접해온단 말이다. 네놈, 짐이 평범한 여자와 다를 바 없다고 생각하는 건 아니냐?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「我は賢者の石より製造されし『メルクリウス』！\u3000リクリエを人為的に引き起こすために作られた、悪の終末兵器なのじゃぞ！」"
translation = "「짐은 현자의 돌로부터 제조된 『메르쿠리우스』! 리크리에를 인위적으로 일으키기 위해 만들어진, 악의 종말 병기이니라!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「周りのエネルギーを吸い取り自らの力と変え、拳による接近戦から射撃までこなす……そう、一片の隙もない怪物なのじゃっ！」"
translation = "「주변의 에너지를 흡수해 자신의 힘으로 바꾸고, 권법을 통한 근접전부터 사격까지 해내는…… 그래, 한 점의 빈틈도 없는 괴물이란 말이다!」"

[[dialogue]]
speaker = "unk"
original = "チョコのおかわり、いる？"
translation = "초코 더 줄까?"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「いるのじゃ！\u3000もぐもぐもぐっ……！」"
translation = "「필요하니라! 우물우물우물……!」"

[[dialogue]]
speaker = "unk"
original = "代わりにほっぺ触っていい？"
translation = "대신 볼 만져봐도 돼?"

[[dialogue]]
speaker = "unk"
original = "限定販売のチョコも用意してあるよ"
translation = "한정 판매 초코도 준비해 뒀어"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「フハハ、しょうがないのう～♪\u3000限定の捧げものとあらば、我のぷにもちほっぺを触ることも許可してやらんでも……」"
translation = "「후하하, 어쩔 수 없구먼～♪ 한정판 공물이라 한다면, 짐의 말랑말랑한 볼을 만지는 것 정도는 허락해 줄 수도……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「──って！？\u3000なぜこうなるのじゃあ～～～っ！？」"
translation = "「──앗!? 어째서 이렇게 되는 것이냐아～～～앗!?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「おのれ～っ。せっかくデストロイフォームを取り戻し、我の威厳も復活すると思っていたのに……計算と違うのじゃ！」"
translation = "「이놈～. 모처럼 디스트로이 폼을 되찾아서, 짐의 위엄도 부활할 거라 생각했는데…… 계산과 다르니라!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「やはりこのちんちくりんな姿がいかんのかのう……サチの封印が忌々しいのじゃ」"
translation = "「역시 이 꼬맹이 같은 모습이 문제인 것인가…… 사치의 봉인이 가증스럽구나」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「何度も言っておるが、我は本当はナイスバディーな大人のレディなのじゃぞ！」"
translation = "「몇 번이나 말하지만, 짐은 사실 나이스 바디인 어른 레이디란 말이다!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「それはもうすごいダイナマイトな感じなのじゃ！\u3000守護天使の乳のでかい女がおるじゃろう、あやつくらい凄いのじゃからなっ！」"
translation = "「그건 정말 엄청난 다이너마이트 같은 느낌이니라! 수호천사 중에 가슴 큰 여자가 있지 않느냐, 그 녀석만큼이나 대단하단 말이다!」"

[[dialogue]]
speaker = "unk"
original = "なるほど～"
translation = "그렇구나～"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「……くそ～、疑いの眼差しを向けおって！」"
translation = "「……젠장～, 의심의 눈초리를 보내다니!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「拳から砲撃へ、武器は変えられるようになったのに。見た目だけは一時的に変えても、定着しないのじゃ……くやしいったらないのじゃ」"
translation = "「권법에서 포격으로, 무기는 바꿀 수 있게 되었는데. 겉모습만은 일시적으로 바꿔도, 정착되지 않느니라…… 분해서 견딜 수가 없구나」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「いや、でも待てよ？\u3000変化があったことは確かじゃし……ということは……」"
translation = "「아니, 하지만 기다려 보거라? 변화가 있었다는 건 확실하고…… 그렇다는 것은……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「おい、眷族よ。ちょいと近う寄るのじゃ」"
translation = "「어이, 권속이여. 잠시 가까이 오거라」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「うむ、それでよい！\u3000では──んちゅっ<emoji=heart04>」"
translation = "「음, 그거면 됐다! 그럼── 음쮸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "い、今キスしたのは……！！"
translation = "지, 지금 키스한 건……!!"

[[dialogue]]
speaker = "unk"
original = "──っ！？"
translation = "──윽!?"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「フハハハ！\u3000その通り、以前にもした『契約の儀式』なのじゃ！\u3000我の体の一部を取り込ませ、眷族を強制的に我の支配下に置いてくれる！」"
translation = "「후하하하! 그렇다, 이전에도 했던 『계약의 의식』이니라! 짐의 몸의 일부를 받아들이게 해서, 권속을 강제적으로 짐의 지배하에 두는 것이다!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「前回は貴様の素質に敗北したが、力を一部取り戻した今の我ならば……今度こそ眷族を我のモノにできるかもしれん！」"
translation = "「지난번에는 네놈의 소질에 패배했지만, 힘을 일부 되찾은 지금의 짐이라면…… 이번에야말로 권속을 짐의 것으로 만들 수 있을지도 모른다!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ククク……眷族の体に、我が馴染んでゆくのを感じるぞ～……？」"
translation = "「크크크…… 권속의 몸에, 짐이 스며드는 것이 느껴지는구나～……?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「さぁ──手始めに、その場でピョンと飛び跳ねてワンと言ってみるのじゃ！」"
translation = "「자── 우선 시작으로, 그 자리에서 깡충 뛰어오르며 멍이라고 말해 보거라!」"

[[dialogue]]
speaker = "unk"
original = "飛び跳ねてワンって言って"
translation = "뛰어오르며 멍이라고 해봐"

[[dialogue]]
speaker = "unk"
original = "──プリムラ"
translation = "──프리무라"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「わんっ！\u3000わんわんっ！」"
translation = "「멍! 멍멍!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「何でじゃあ～～～っ！？\u3000やっぱりうまくいかないのじゃあっ！？」"
translation = "「어째서냐아～～～앗!? 역시 잘 안 되는 것이냐앗!?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「くそ～っ。また失敗したということか……残念無念なのじゃ」"
translation = "「젠장～. 또 실패했다는 것인가…… 유감천만이로구나」"

[[dialogue]]
speaker = "サチ"
original = "「何が残念なの？」"
translation = "「뭐가 유감이라는 거야?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「それはもちろん、契約の儀式が成功すれば眷族は我が手中。サチの幸運を封じる特異点を手に入れたことになるのじゃ！」"
translation = "「그건 당연히, 계약의 의식이 성공하면 권속은 짐의 손아귀 안. 사치의 행운을 봉인할 특이점을 손에 넣게 되는 것이니라!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「そうなればいずれ来るサチとの最終決戦の際には、眷属が切り札となりあやつをギャフンと言わせることも可能となるじゃろう！」"
translation = "「그렇게 되면 언젠가 올 사치와의 최종 결전 때, 권속이 히든카드가 되어 그 녀석을 납작하게 해주는 것도 가능해지겠지!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「コテンパンにした後は、１ヶ月くらいおやつ抜きの刑にしてやるのじゃ！\u3000この前だって罰掃除をさせおって……我の恨みは深いのじゃっ！」"
translation = "「묵사발을 만든 뒤에는, 한 달 정도 간식 금지 형에 처해줄 것이니라! 저번에도 벌로 청소를 시키고…… 짐의 원한은 깊단 말이다!」"

[[dialogue]]
speaker = "サチ"
original = "「でもあれは、プリムラが生徒会のお仕事をサボったのが悪いんでしょ？」"
translation = "「하지만 그건, 프리무라가 학생회 일을 땡땡이친 게 잘못이잖아?」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「何を言っておる！\u3000我は悪の終末兵器じゃぞ！\u3000仕事をサボらずして何が悪か！」"
translation = "「무슨 소릴 하느냐! 짐은 악의 종말 병기이니라! 일을 땡땡이치지 않고 무엇이 악이란 말이냐!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「──って、サチぃ！？\u3000いいいっ、いつからそこにいたのじゃあっ！？」"
translation = "「──앗, 사치이!? 어어어, 언제부터 거기에 있었느냐앗!?」"

[[dialogue]]
speaker = "サチ"
original = "「拘束ーーーーーっ！！」"
translation = "「구속ーーーーー!!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ぎにゃーーー！\u3000なのじゃあぁ！」"
translation = "「기냐아아아! 인 것이니라아아!」"

[[dialogue]]
speaker = "サチ"
original = "「まったくもう！\u3000最近は少し丸くなったと思ってたのに……！\u3000本当に油断も隙も無いんだから！」"
translation = "「정말이지 정말! 요즘은 조금 유해졌다고 생각했는데……! 정말 방심할 틈도 없다니까!」"

[[dialogue]]
speaker = "unk"
original = "附属校生徒会長のサチは、プリムラが悪いことをしないよう監視するお役目を担っている。"
translation = "부속 학교 학생회장인 사치는, 프리무라가 나쁜 짓을 하지 않도록 감시하는 임무를 맡고 있다."

[[dialogue]]
speaker = "unk"
original = "今、プリムラの全身をぐるぐる巻きにしている鎖も、サチの所有するロストアイテムの力だ。"
translation = "지금, 프리무라의 전신을 꽁꽁 묶고 있는 사슬도, 사치가 소유한 로스트 아이템의 힘이다."

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「むぎゅぅうう……簀巻きは嫌なのじゃあ～……」"
translation = "「으규우우우…… 멍석말이는 싫으니라아～……」"

[[dialogue]]
speaker = "unk"
original = "相変わらず何度懲らしめられても、悪いことをしようとしてしまうプリムラなのだった──"
translation = "여전히 몇 번을 혼나도, 나쁜 짓을 하려고 하는 프리무라였다──"

