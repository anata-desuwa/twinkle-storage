[[dialogue]]
speaker = "unk"
original = "第１話,バレンタインモンスター誕生秘話,P"
translation = "제1화, 발렌타인 몬스터 탄생 비화, P"

[[dialogue]]
speaker = "unk"
original = "ウルスラが起こしたバレンタインの騒動が落ち着いて数日後──"
translation = "우르술라가 일으킨 발렌타인 소동이 진정되고 며칠 후──"

[[dialogue]]
speaker = "シャロン"
original = "「今年は大変なバレンタインでしたね」"
translation = "「올해는 힘든 발렌타인이었네요」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ……バレンタインはしばらく懲り懲り～って感じ。ま、ウルスラも次のバレンタインまではおとなしくしてるでしょ。今頃どこにいるのかも知らないけど──」"
translation = "「하아…… 발렌타인은 당분간 지긋지긋하다는 느낌. 뭐, 우르술라도 다음 발렌타인까지는 얌전히 있겠지. 지금 어디 있는지도 모르겠지만──」"

[[dialogue]]
speaker = "ウルスラ"
original = "「あら、もしかして私の話をされていました？」"
translation = "「어머, 혹시 제 이야기를 하고 계셨나요?」"

[[dialogue]]
speaker = "シャロン"
original = "「ウルスラさま！？」"
translation = "「우르술라 님!?」"

[[dialogue]]
speaker = "unk"
original = "噂をすればなんとやら！"
translation = "호랑이도 제 말 하면 온다더니!"

[[dialogue]]
speaker = "ウルスラ"
original = "「こんにちは、たまたま通りすがったら見知った皆さんがいらしたので、ご挨拶を──と思ったのですけど……」"
translation = "「안녕하세요, 마침 지나가다가 아는 분들이 계시길래, 인사를── 드리려고 했습니다만……」"

[[dialogue]]
speaker = "ウルスラ"
original = "「イレーナさん、そんなに身構えないでください」"
translation = "「이레나 씨, 그렇게 경계하지 말아 주세요」"

[[dialogue]]
speaker = "イレーナ"
original = "「身構えもするわよ。よくもまぁ、のうのうと顔を出せたものね」"
translation = "「경계도 하지. 잘도 뭐, 뻔뻔하게 얼굴을 내밀었네」"

[[dialogue]]
speaker = "ウルスラ"
original = "「ええ、まあ、イレーナさんたちと敵対しているわけではありませんし……していませんよね？」"
translation = "「에이, 뭐, 이레나 씨 일행과 적대하는 것도 아니고요…… 아니죠?」"

[[dialogue]]
speaker = "イレーナ"
original = "「敵か味方かで言ったらギリギリ敵のラインよ」"
translation = "「적인지 아군인지 따지자면 아슬아슬하게 적의 라인이야」"

[[dialogue]]
speaker = "シャロン"
original = "「まあまあ、イレーナさま。ウルスラさまも悪気があったわけではないでしょうし」"
translation = "「자자, 이레나 님. 우르술라 님도 악의가 있었던 건 아닐 테고요」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんなの悪意でやった方がまだ救いようがあるわよ」"
translation = "「저런 건 악의로 한 쪽이 그나마 구제할 길이라도 있어」"

[[dialogue]]
speaker = "シャロン"
original = "「まあまあまあ、イレーナさま。ウルスラさまにもきっと深～い事情がおありなんですよ」"
translation = "「자자자, 이레나 님. 우르술라 님에게도 분명 기~픈 사정이 있으실 거예요」"

[[dialogue]]
speaker = "イレーナ"
original = "「随分とウルスラの肩を持つじゃない。……ま、相手の事情も知らずに頭ごなしに否定するのもよくないわね。一応神官だし、懺悔する気があるなら聞いてあげる」"
translation = "「상당히 우르술라 편을 드네. ……뭐, 상대의 사정도 모르고 무턱대고 부정하는 것도 좋지 않겠지. 일단 신관이고, 참회할 마음이 있다면 들어줄게」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんたがそこまでバレンタインに固執する理由、話してくれない？\u3000納得できたら、警戒を解く……かもしれないわ」"
translation = "「네가 그렇게까지 발렌타인에 집착하는 이유, 말해주지 않을래? 납득한다면, 경계를 풀……지도 몰라」"

[[dialogue]]
speaker = "ウルスラ"
original = "「本当ですか？\u3000しかしそんなに深い話でも、面白い話でもないので恐縮なのですけど」"
translation = "「정말인가요? 하지만 그렇게 깊은 이야기도, 재미있는 이야기도 아니라서 송구스럽습니다만」"

[[dialogue]]
speaker = "unk"
original = "バレンタインに惚れこんだのはいつから？"
translation = "발렌타인에 반하게 된 건 언제부터?"

[[dialogue]]
speaker = "ウルスラ"
original = "「天界にいた頃から人間界にバレンタインというイベントがあると噂では聞いていましたが、本格的に知ったのは流星市国に来てからです」"
translation = "「천계에 있을 때부터 인간계에 발렌타인이라는 이벤트가 있다는 소문은 들었습니다만, 본격적으로 알게 된 건 유성시국에 오고 나서부터입니다」"

[[dialogue]]
speaker = "シャロン"
original = "「人間界にいらっしゃったのは、星騎士になるため……ですか？」"
translation = "「인간계에 오신 건, 성기사가 되기 위해……인가요?」"

[[dialogue]]
speaker = "ウルスラ"
original = "「はい、人間界に足を踏み入れて初めて、最前線のモンスターやアステラを目の当たりにしまして、恐るべき脅威を肌で感じたんです」"
translation = "「네, 인간계에 발을 들여놓고 처음으로 최전선의 몬스터나 아스테라를 목격하고, 무시무시한 위협을 피부로 느꼈습니다」"

[[dialogue]]
speaker = "ウルスラ"
original = "「人命や社会というのは、大いなる力の気まぐれで簡単に壊され、風が吹けば飛んでしまうような、とても儚いものだと……」"
translation = "「인명이나 사회라는 건, 거대한 힘의 변덕으로 간단히 부서지고, 바람이 불면 날아가 버릴 듯한, 아주 덧없는 것이라고……」"

[[dialogue]]
speaker = "シャロン"
original = "「それは……確かにそうですね」"
translation = "「그건…… 확실히 그렇네요」"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ウルスラ"
original = "「立っている地面が脆く崩れてしまうような不安に、軽い絶望を覚えていた矢先──私は１年に一度の大イベントに遭遇したのです！」"
translation = "「서 있는 지면이 힘없이 무너져 내리는 듯한 불안에, 가벼운 절망을 느끼고 있던 찰나── 저는 1년에 한 번뿐인 대이벤트를 조우한 것입니다!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「甘いお菓子に想いを乗せて、意中の相手に秘めた想いを告げる一大イベント──バレンタインデー！」"
translation = "「달콤한 과자에 마음을 담아, 마음에 둔 상대에게 숨겨둔 마음을 전하는 일생일대의 이벤트── 발렌타인 데이!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「まさか国を挙げてのイベントだとは思っていなくて！\u3000その熱狂ぶりにすっかり魅せられてしまったんです！」"
translation = "「설마 나라 전체가 들썩이는 이벤트일 줄은 몰랐거든요! 그 열광적인 모습에 완전히 매료되어 버렸습니다!」"

[[dialogue]]
speaker = "イレーナ"
original = "「別に国は挙げちゃいなくない？」"
translation = "「딱히 나라 전체가 들썩이지는 않지 않아?」"

[[dialogue]]
speaker = "シャロン"
original = "「２月に入ると町中やメディアもバレンタインムードになりますし、そう思われるのも無理ないと思いますよ」"
translation = "「2월에 들어서면 거리나 미디어도 발렌타인 분위기가 되니까, 그렇게 생각하시는 것도 무리는 아니라고 봐요」"

[[dialogue]]
speaker = "ウルスラ"
original = "「『愛は素晴らしい。だけど熱中しすぎれば周囲を傷つけ、大切なものを失ってしまう』……それが両親の教えでした」"
translation = "「『사랑은 아름답다. 하지만 너무 열중하면 주위를 상처 입히고, 소중한 것을 잃고 만다』…… 그것이 부모님의 가르침이었습니다」"

[[dialogue]]
speaker = "ウルスラ"
original = "「ですが！\u3000恋愛は小さな胸に秘めて育むものと考えていた私にとって──それは天啓でした！」"
translation = "「하지만! 연애는 작은 가슴에 비축하며 키워가는 것이라 생각했던 저에게── 그것은 천계의 계시였습니다!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「皆が恋に積極的になるバレンタインデーは、雷に打たれたかのようなカルチャーショックだったのですよ！」"
translation = "「모두가 사랑에 적극적이게 되는 발렌타인 데이는, 벼락을 맞은 것 같은 문화 충격이었던 거예요!」"

[[dialogue]]
speaker = "unk"
original = "そんなに"
translation = "그 정도로"

[[dialogue]]
speaker = "ウルスラ"
original = "「そんなにです！\u3000明日訪れるかもしれない世界の崩壊を恐れるよりも、乙女は熱い恋に胸を焦がす……！」"
translation = "「그 정도로입니다! 내일 찾아올지도 모르는 세계의 붕괴를 두려워하기보다, 소녀는 뜨거운 사랑에 가슴을 태운다……!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「チョコレートに想いを託す乙女の勇気に感銘を受け、私の中で劇的な変化が起きました」"
translation = "「초콜릿에 마음을 기탁하는 소녀의 용기에 감명을 받아, 제 안에서 극적인 변화가 일어났습니다」"

[[dialogue]]
speaker = "ウルスラ"
original = "「『人生は短い』『恋は必ずしも美しく実るものではない』──ならばどうすればいいでしょう？」"
translation = "「『인생은 짧다』 『사랑은 반드시 아름답게 결실을 맺는 것은 아니다』── 그렇다면 어떻게 해야 할까요?」"

[[dialogue]]
speaker = "シャロン"
original = "「ど、どうすればいいんでしょう……？」"
translation = "「어, 어떻게 해야 하는 걸까요……?」"

[[dialogue]]
speaker = "ウルスラ"
original = "「よくぞ聞いてくださいました！\u3000私の行きついた答えは──」"
translation = "「잘 물어봐 주셨습니다! 제가 도달한 답은──」"

[[dialogue]]
speaker = "ウルスラ"
original = "「行動あるのみ！\u3000前進あるのみ！\u3000告白あるのみ！\u3000です！！」"
translation = "「행동뿐! 전진뿐! 고백뿐! 입니다!!」"

[[dialogue]]
speaker = "シャロン"
original = "「パワフルですっ！\u3000とても良いと思いますっ！」"
translation = "「파워풀해요! 아주 좋다고 생각합니다!」"

[[dialogue]]
speaker = "イレーナ"
original = "「ああ……そこ、シャロンは同調しちゃうとこよね……」"
translation = "「아아…… 거기서 샤론은 동조해 버리는구나……」"

[[dialogue]]
speaker = "ウルスラ"
original = "「『命短し恋せよ乙女』！\u3000勇気を持って、一途に邁進することこそが、乙女の為すべき恋愛！」"
translation = "「『인생은 짧으니 사랑하라 소녀여』! 용기를 가지고, 한결같이 매진하는 것이야말로, 소녀가 해야 할 연애!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「恋を全うするのに、命はあまりにも儚く短い。故に性急さと大胆さが必要なのです」"
translation = "「사랑을 다하기에, 생명은 너무나도 덧없고 짧습니다. 고로 성급함과 대담함이 필요한 것입니다」"

[[dialogue]]
speaker = "ウルスラ"
original = "「一度目がつまづいても二度目があります、二度目で転んでも次の恋があります！\u3000七転び八起き！\u3000恋の可能性とは出会った人の数だけあるのですから！\u3000ふんす！」"
translation = "「한 번 실패해도 두 번째가 있고, 두 번째에서 넘어져도 다음 사랑이 있습니다! 칠전팔기! 사랑의 가능성이란 만난 사람의 수만큼 있는 것이니까요! 흠흠!」"

[[dialogue]]
speaker = "ウルスラ"
original = "「そうして、青春を恋で燃やす乙女たちの背中を押したいと願うようになった結果──」"
translation = "「그렇게 해서, 청춘을 사랑으로 불태우는 소녀들의 등을 밀어주고 싶다고 바라게 된 결과──」"

[[dialogue]]
speaker = "イレーナ"
original = "「自分の姓そのものに『バレンタイン』を冠する怪人が誕生しちゃった……ってわけね」"
translation = "「자신의 성 자체에 『발렌타인』을 붙인 괴인이 탄생해 버렸다……는 거네」"

[[dialogue]]
speaker = "ウルスラ"
original = "「しかも私の星力は、地球から守護星が見えるバレンタイン付近が最も強くなります」"
translation = "「게다가 제 성력은, 지구에서 수호성이 보이는 발렌타인 부근이 가장 강해집니다」"

[[dialogue]]
speaker = "ウルスラ"
original = "「つまり私、バレンタインだけは無敵なのです<emoji=heart04>\u3000私とバレンタインは相思相愛……<emoji=heart04>」"
translation = "「즉 저, 발렌타인만큼은 무적입니다<emoji=heart04> 저와 발렌타인은 서로 사랑하는 사이……<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
original = "「シーズンオフは戦力として心許ないかもしれませんが、恋愛相談でしたら、いつでも気軽に声をかけてください」"
translation = "「비시즌에는 전력으로서 미덥지 못할지도 모르지만, 연애 상담이라면 언제든 편하게 말씀해 주세요」"

[[dialogue]]
speaker = "unk"
original = "守護星の影響を受ける星騎士は、季節によって星力量が多少上下することがある。"
translation = "수호성의 영향을 받는 성기사는 계절에 따라 성력량이 다소 상하로 변동하는 경우가 있다."

[[dialogue]]
speaker = "unk"
original = "だがウルスラほど極端な例は聞いたことがない。"
translation = "하지만 우르술라만큼 극단적인 예는 들어본 적이 없다."

[[dialogue]]
speaker = "シャロン"
original = "「ウルスラさま、やっぱり悪い人ではありませんねっ」"
translation = "「우르술라 님, 역시 나쁜 분은 아니시네요」"

[[dialogue]]
speaker = "イレーナ"
original = "「シャロンとは息が合いそうね……。ま、バレンタインを過ぎたら悪さはできなくなるみたいだし、当分は大丈夫……なのかしら？」"
translation = "「샤론이랑은 호흡이 잘 맞네……. 뭐, 발렌타인이 지나면 나쁜 짓은 못 하게 되는 것 같고, 당분간은 괜찮은…… 걸까?」"

[[dialogue]]
speaker = "ウルスラ"
original = "「購買部にいる時もありますので、いつでもいらしてくださいね。では<emoji=heart04>」"
translation = "「매점에 있을 때도 있으니 언제든 들러주세요. 그럼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウルスラは小さく会釈し、大聖堂を去っていった。"
translation = "우르술라는 가볍게 목례하고, 대성당을 떠나갔다."

[[dialogue]]
speaker = "unk"
original = "それからウルスラは、ちょくちょく大聖堂に顔を覗かせては、シャロンと（時々イレーナと）談話に花を咲かせるようになったのである。"
translation = "그 뒤로 우르술라는 자주 대성당에 얼굴을 비추며, 샤론과 (가끔은 이레나와) 담소의 꽃을 피우게 된 것이었다."

