[[dialogue]]
speaker = "unk"
original = "冬のある夜のこと。新星学園の学生寮『ラルーナ』の寮長、<ruby>妃竜院<rt>きりゅういん</rt></ruby>マハムートは、日課である消灯後の巡回を行っていた。"
translation = "겨울 어느 밤의 일. 신성학원의 학생 기숙사 『라루나』의 사감, 키류인 마하무트는 일과인 소등 후 순찰을 돌고 있었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん……？」"
translation = "「음……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……どうやら、気のせいみたいね」"
translation = "「……아무래도 기분 탓인가 보네」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ふぃ～」"
translation = "「휴~」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「危なかったっしょ……バレたかと思って、背筋がヒヤッとしたぜ……」"
translation = "「위험했다구…… 들킨 줄 알고 등골이 오싹했다구……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「床板が軋むのは、気を付けないといけないわね」"
translation = "「바닥판이 삐걱거리는 건 조심해야겠네」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「というかマム、戦闘服なんですけどっ？\u3000不審者見つけたら、あの鉄球で制裁する気満々じゃないですかっ」"
translation = "「그보다 마무, 전투복 차림인데요? 불심검문이라도 걸리면 그 철구로 제재할 기세가 만만치 않잖아요」"

[[dialogue]]
speaker = "unk"
original = "鎖の音が怖い……"
translation = "사슬 소리가 무서워……"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「気を取り直して、サンタ大作戦を続行するぜ☆」"
translation = "「기운 차리고 산타 대작전을 속행하자구☆」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「この人は退く気ゼロだしっ」"
translation = "「이 사람은 물러날 생각이 제로라니까」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ヨミヨミ、しーっ」"
translation = "「요미요미, 쉬잇」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あ、はい。ごめんなさい……」"
translation = "「아, 네. 죄송해요……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うぅ……どうしてこんなことに……」"
translation = "「으으…… 어째서 이렇게 된 거지……」"

[[dialogue]]
speaker = "unk"
original = "俺たちがなぜ、新星寮に潜入することになったのか。話は１週間前まで遡る――"
translation = "우리들이 왜 신성료에 잠입하게 되었는가. 이야기는 일주일 전으로 거슬러 올라간다――"

