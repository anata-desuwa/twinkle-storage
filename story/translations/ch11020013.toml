[[dialogue]]
speaker = "unk"
original = "第３話,限定版ギガンドムをゲットせよ,P"
translation = "제3화, 한정판 기간돔을 겟하라, P"

[[dialogue]]
speaker = "unk"
original = "シュティレの大好きなロボットアニメ・超機動武神ギガンドムの限定版プラモデルが発売されるらしい。"
translation = "슈틸레가 정말 좋아하는 로봇 애니메이션 『초기동무신 기간돔』의 한정판 프라모델이 출시된다는 모양이다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女に誘われて、模型屋の列に並ぶことになった──"
translation = "나는 그녀의 권유로 모형점 줄에 서게 되었다──"

[[dialogue]]
speaker = "シュティレ"
original = "「予想を超える長蛇の列です。流石は国民的アニメ……この人気は誇らしいですが、ゲットできるか少々不安ですね」"
translation = "「예상을 뛰어넘는 장사익렬입니다. 과연 국민 애니메이션…… 이 인기는 자랑스럽지만, 구할 수 있을지 조금 불안하네요」"

[[dialogue]]
speaker = "シュティレ"
original = "「会長、今日はお休みの日にご足労ありがとうございます」"
translation = "「회장, 오늘 쉬는 날인데 발걸음 해주셔서 감사합니다」"

[[dialogue]]
speaker = "シュティレ"
original = "「本日発売されるのは、数年前のイベントで限定<ruby>頒布<rt>はんぷ</rt></ruby>された決戦仕様ギガンドム……その奇蹟の再販なのです」"
translation = "「오늘 출시되는 것은 몇 년 전 이벤트에서 한정 반포되었던 결전 사양 기간돔…… 그 기적의 재판매입니다」"

[[dialogue]]
speaker = "シュティレ"
original = "「どうしても２セット入手したいため、会長をお呼びする形になってしまいました。どうぞよろしくお願いします」"
translation = "「어떻게든 2세트를 입수하고 싶어서 회장을 부르는 형태가 되고 말았습니다. 부디 잘 부탁드립니다」"

[[dialogue]]
speaker = "unk"
original = "でも、２つも買ってどうするの？"
translation = "근데, 2개나 사서 뭐 하려고?"

[[dialogue]]
speaker = "unk"
original = "全然気にしなくていいよ"
translation = "전혀 신경 쓰지 않아도 돼"

[[dialogue]]
speaker = "シュティレ"
original = "「愚問です。１つは制作および鑑賞用。そしてもう１つは、抱いて寝る用です」"
translation = "「우문입니다. 하나는 제작 및 감상용. 그리고 다른 하나는, 안고 잘 용도입니다」"

[[dialogue]]
speaker = "unk"
original = "愛が深いね……！？"
translation = "사랑이 깊네……!?"

[[dialogue]]
speaker = "シュティレ"
original = "「はい、シュティレのギガンドムへの愛は無限大です──まあ、抱いて寝る用は冗談ですが」"
translation = "「네, 슈틸레의 기간돔을 향한 사랑은 무한대입니다── 뭐, 안고 잘 용도는 농담이지만요」"

[[dialogue]]
speaker = "シュティレ"
original = "「もう１つは改造用です。敢えて腕を破損させたり、オリジナルのカラーで塗装をしたり……」"
translation = "「다른 하나는 개조용입니다. 일부러 팔을 파손시키거나, 오리지널 컬러로 도색을 하거나……」"

[[dialogue]]
speaker = "シュティレ"
original = "「夕陽の差す戦場で佇む、壊れかけのギガンドムをジオラマで再現したいのです。そのためプレーンとは別にもう１体、どうしても欲しくて……」"
translation = "「석양이 비치는 전장에 우두커니 서 있는, 부서져 가는 기간돔을 디오라마로 재현하고 싶습니다. 그래서 플레인과는 별도로 한 체 더, 간절히 갖고 싶어서……」"

[[dialogue]]
speaker = "シュティレ"
original = "「先日のモンスター化したギガンドムの一件でバタバタしていた、ちょうどその時に予約サイトがオープンしていたこと。本当に悲しいです」"
translation = "「지난번 몬스터화된 기간돔 건으로 정신없던 바로 그때 예약 사이트가 오픈했다는 것. 정말 슬픈 일입니다」"

[[dialogue]]
speaker = "シュティレ"
original = "「当日販売に望みを託すなど、ロボットオタクとして恥ずかしい限りですが……」"
translation = "「당일 판매에 희망을 걸다니, 로봇 오타쿠로서 부끄럽기 짝이 없습니다만……」"

[[dialogue]]
speaker = "unk"
original = "今日は絶対にゲットしよう！"
translation = "오늘은 반드시 구하자!"

[[dialogue]]
speaker = "シュティレ"
original = "「はい。女神様に祈ります。どうかどうか、限定版ギガンドムをシュティレの手に……！」"
translation = "「네. 여신님께 기도합니다. 제발 제발, 한정판 기간돔을 슈틸레의 손에……!」"

[[dialogue]]
speaker = "シュティレ"
original = "「いよいよ、あと数人ですね。ワクワクしてきました。あと少しでギガンドムが──」"
translation = "「드디어 앞으로 몇 명 안 남았네요. 두근거리기 시작했습니다. 조금만 더 있으면 기간돔이──」"

[[dialogue]]
speaker = "店員"
original = "「申し訳ございません！\u3000限定版ギガンドム、在庫なくなりましたー！」"
translation = "「죄송합니다! 한정판 기간돔, 재고 소진되었습니다!」"

[[dialogue]]
speaker = "シュティレ"
original = "「そんな……ギガンドム……」"
translation = "「그런…… 기간돔……」"

[[dialogue]]
speaker = "シュティレ"
original = "「──いえ。諦めません、勝つまでは。会長、すみませんが別の店舗へ参ります」"
translation = "「──아뇨. 포기하지 않습니다, 이길 때까지는. 회장, 죄송하지만 다른 점포로 가겠습니다」"

[[dialogue]]
speaker = "シュティレ"
original = "「ここはかなり大きな模型店です。在庫もふんだんにあることでしょう」"
translation = "「이곳은 꽤 큰 모형점입니다. 재고도 넉넉히 있겠죠」"

[[dialogue]]
speaker = "シュティレ"
original = "「順調……順調です……列が終わるまであと少し……！」"
translation = "「순조…… 순조롭습니다…… 줄이 끝나기까지 조금만 더……!」"

[[dialogue]]
speaker = "店員"
original = "「ただ今を持ちまして、限定版ギガンドム、売り切れました！」"
translation = "「방금부로 한정판 기간돔, 매진되었습니다!」"

[[dialogue]]
speaker = "シュティレ"
original = "「つ、次っ……！」"
translation = "「다, 다음……!」"

[[dialogue]]
speaker = "シュティレ"
original = "「私の父に教えてもらった穴場の模型店です。ふふ、数えるほどしか人がいないでしょう。初めからここに来るべきでした」"
translation = "「저희 아버지께 들은 숨겨진 모형점입니다. 후후, 손꼽을 정도의 인원밖에 없군요. 처음부터 여기로 왔어야 했습니다」"

[[dialogue]]
speaker = "シュティレ"
original = "「列の先頭まで来ました、さあギガンドム、シュティレの元へ飛び込んできてください。準備は万端──」"
translation = "「줄 맨 앞까지 왔습니다, 자 기간돔, 슈틸레의 품으로 뛰어들어 오세요. 준비는 만반──」"

[[dialogue]]
speaker = "おじさん"
original = "「あちゃあ、シュティレちゃんか。ごめんな、今ので売り切れちゃったんだ……」"
translation = "「아차, 슈틸레구나. 미안하다, 방금 걸로 다 팔려버렸어……」"

[[dialogue]]
speaker = "シュティレ"
original = "「くっ……も、もう一度、街を変えます……次がラストチャンス……！」"
translation = "「큭…… 한, 한 번 더, 마을을 바꾸겠습니다…… 다음이 라스트 찬스……!」"

[[dialogue]]
speaker = "シュティレ"
original = "「テルル様テルル様テルル様──どうかシュティレに女神の御慈悲を──」"
translation = "「텔루르 님 텔루르 님 텔루르 님── 부디 슈틸레에게 여신의 자비를──」"

[[dialogue]]
speaker = "unk"
original = "でも俺たちが先頭だよ！"
translation = "그래도 우리가 맨 앞이야!"

[[dialogue]]
speaker = "unk"
original = "お祈りを始めてる……！"
translation = "기도를 시작했어……!"

[[dialogue]]
speaker = "シュティレ"
original = "「はい、祈ります祈ります祈ります──」"
translation = "「네, 기도합니다 기도합니다 기도합니다──」"

[[dialogue]]
speaker = "店員"
original = "「お次の方！\u3000おめでとうございます、限定版ギガンドム、最後の１つですよ！\u3000どうぞ！」"
translation = "「다음 분! 축하드립니다, 한정판 기간돔, 마지막 남은 하나예요! 여기요!」"

[[dialogue]]
speaker = "シュティレ"
original = "「──やりました、会長！\u3000ぶいっ……！」"
translation = "「──해냈어요, 회장! V!」"

[[dialogue]]
speaker = "シュティレ"
original = "「目的とした２セットは無理でしたが、ここは１セットだけでも十分な戦果と言えます！」"
translation = "「목표로 한 2세트는 무리였지만, 이건 1세트만으로도 충분한 전과라고 할 수 있습니다!」"

[[dialogue]]
speaker = "シュティレ"
original = "「会長、すみませんでした。１日中、連れ回してしまって……」"
translation = "「회장, 죄송했습니다. 하루 종일 끌고 다녀서……」"

[[dialogue]]
speaker = "シュティレ"
original = "「気にしなくていい、ですか？\u3000お気遣いありがとうございます。では、清算してきま──」"
translation = "「신경 쓰지 않아도 된다, 고요? 배려 감사합니다. 그럼, 계산하고 오겠──」"

[[dialogue]]
speaker = "男の子"
original = "「うわああああん！\u3000やだあ！\u3000ギガンドム、欲しいー！！」"
translation = "「우와아아앙! 싫어어! 기간돔, 갖고 싶어!!」"

[[dialogue]]
speaker = "男の子の父"
original = "「ごめんなー、お父さんが予約を忘れちゃったから……ほ、他のお店に行こうか。きっとまだ……」"
translation = "「미안하다~, 아빠가 예약을 깜빡해서…… 다, 다른 가게에 가볼까. 분명 아직……」"

[[dialogue]]
speaker = "男の子"
original = "「もうどこにもないよー！\u3000いっぱい歩いたもん！\u3000欲しい欲しい欲しいー！！\u3000わああああん！！」"
translation = "「이제 아무 데도 없단 말이야! 엄청 걸었단 말이야! 갖고 싶어 갖고 싶어 갖고 싶어!! 우와아아앙!!」"

[[dialogue]]
speaker = "シュティレ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "シュティレ"
original = "「しょぼーん……なんで譲っちゃったんでしょう……」"
translation = "「시무룩…… 왜 양보해 버린 걸까요……」"

[[dialogue]]
speaker = "シュティレ"
original = "「ギガンドムの主人公なら絶対に譲る、そう思ったらつい……ううぅう……限定版ギガンドム……組み立てたかったです……」"
translation = "「기간돔의 주인공이라면 반드시 양보한다, 그렇게 생각했더니 그만…… 으으으…… 한정판 기간돔…… 조립하고 싶었습니다……」"

[[dialogue]]
speaker = "unk"
original = "立派だったよ、シュティレ"
translation = "훌륭했어, 슈틸레"

[[dialogue]]
speaker = "シュティレ"
original = "「……別に褒められるようなことじゃありません。それよりも、会長の貴重な休日を無駄にしてしまってすみませんでした」"
translation = "「……딱히 칭찬받을 만한 일은 아닙니다. 그보다 회장의 귀중한 휴일을 낭비하게 해서 죄송했습니다」"

[[dialogue]]
speaker = "シュティレ"
original = "「ところで、あの、ここでしばらく待機ってどういうことですか？」"
translation = "「그런데, 저기, 여기서 잠시 대기라니 무슨 뜻인가요?」"

[[dialogue]]
speaker = "unk"
original = "あ──ようやく来た。おーい！"
translation = "아── 드디어 왔다. 어이!"

[[dialogue]]
speaker = "若い男"
original = "「まったくキミも無茶なことを言うね～。限定版ギガンドムを譲ってくれ～、だなんてさ」"
translation = "「정말이지 너도 무리한 말을 하는구나~. 한정판 기간돔을 양보해달라니 말이야」"

[[dialogue]]
speaker = "シュティレ"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "若い男"
original = "「まあ俺は２個買うよ？\u3000制作用と改造用でさ。他の奴なら絶対に無理だけど……キミには昔、ずいぶん助けてもらったしな。はいよ、どーぞ」"
translation = "「뭐 나는 2개 살 거거든? 제작용이랑 개조용으로. 다른 녀석 같으면 절대 무리겠지만…… 너한테는 옛날에 꽤 도움을 받았으니까. 자, 여기」"

[[dialogue]]
speaker = "若い男"
original = "「──ん？\u3000キミじゃない？\u3000こっちの女の子が欲しいのかい！？\u3000へぇ～！\u3000お嬢ちゃん、いい趣味してるね！」"
translation = "「──응? 네가 아니야? 이 여자아이가 갖고 싶은 거야!? 헤에~! 아가씨, 취미 좋은걸!」"

[[dialogue]]
speaker = "シュティレ"
original = "「え、あ、あのっ……も、模型屋の店長さん……ですか？」"
translation = "「에, 아, 저기…… 모, 모형점 점장님……이신가요?」"

[[dialogue]]
speaker = "若い男"
original = "「いいや？\u3000俺はただの倉庫バイトだよ。プラモデル作るのは趣味だけど。彼とはバイト友達。今でもたまに遊んだりするんだ」"
translation = "「아니? 난 그냥 창고 알바야. 프라모델 만드는 건 취미지만. 얘랑은 알바 친구. 지금도 가끔 놀거나 해」"

[[dialogue]]
speaker = "シュティレ"
original = "「……驚きました。まさか模型作りが趣味のご友人に、交渉をしていただけただなんて」"
translation = "「……놀랐습니다. 설마 모형 제작이 취미인 친구분에게 협상을 해주셨을 줄이야」"

[[dialogue]]
speaker = "シュティレ"
original = "「会長。どうしてそこまで……」"
translation = "「회장. 어째서 그렇게까지……」"

[[dialogue]]
speaker = "unk"
original = "かっこいいなって思ったから"
translation = "멋있다고 생각했으니까"

[[dialogue]]
speaker = "unk"
original = "男の子に譲ったところを見て"
translation = "남자아이에게 양보하는 모습을 보고"

[[dialogue]]
speaker = "シュティレ"
original = "「シュティレが……かっこいい？」"
translation = "「슈틸레가…… 멋있다?」"

[[dialogue]]
speaker = "シュティレ"
original = "「……初めて言われました、そんなこと」"
translation = "「……처음 들어봤어요, 그런 말」"

[[dialogue]]
speaker = "unk"
original = "シュティレという女の子は、マイペースで独特の雰囲気を持っていて、多くの人が『変わった子』だと評すると思う。"
translation = "슈틸레라는 여자아이는 마이페이스에 독특한 분위기를 가지고 있어서, 많은 사람이 『특이한 아이』라고 평할 것이라 생각한다."

[[dialogue]]
speaker = "unk"
original = "だけど無表情なのは、その表層だけだ。"
translation = "하지만 무표정한 것은 그 겉모습뿐이다."

[[dialogue]]
speaker = "unk"
original = "自分の大切なものを手放してまで、他人の幸せを願える──簡単なようでとても難しいことだと思う。彼女の深いところにあるのは、純粋さと優しさだ。"
translation = "자신의 소중한 것을 포기하면서까지 타인의 행복을 바랄 수 있다── 쉬운 듯하면서도 매우 어려운 일이라고 생각한다. 그녀의 깊은 곳에 있는 것은 순수함과 다정함이다."

[[dialogue]]
speaker = "unk"
original = "俺はこの日から、シュティレのことを魅力的な女の子として意識するようになったのだった──"
translation = "나는 이날부터 슈틸레를 매력적인 여자아이로 의식하게 된 것이었다──"

