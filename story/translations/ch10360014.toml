[[dialogue]]
speaker = "unk"
original = "第４話,恋愛初黒星,P"
translation = "제4화, 연애 첫 패배, P"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あの、お姉様！\u3000私、聞きたいことがありまして！」"
translation = "「저기, 언니분! 저, 묻고 싶은 게 있어서요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あら、どうしましたのフニ？\u3000何だかそわそわして……」"
translation = "「어머, 왜 그러니 후니? 왠지 안절부절못하고……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「もしかしてお姉様は、その……会長さんとお付き合いされているんですか！？」"
translation = "「혹시 언니분은, 그…… 회장님과 사귀고 계신 건가요!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ですわ！？\u3000ななな、何をいきなり言い出しますの！？」"
translation = "「인가요!? 머머머, 뭘 갑자기 꺼내는 건가요!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「誤解だったらごめんなさい……。でも、何だか最近、いつも一緒に居らっしゃいますし」"
translation = "「오해라면 죄송해요……. 하지만 왠지 요즘 항상 같이 계시고」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「２人の時はお姉様、とても楽しそうな笑顔を浮かべているので、もしかしたらそうなのかなって……」"
translation = "「둘이 있을 때 언니분, 아주 즐거운 듯한 미소를 짓고 계셔서, 혹시 그런가 싶어서요……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そ、そんな事実はありませんわ！\u3000ええ、全く！\u3000これっぽっちも！」"
translation = "「그, 그런 사실은 없답니다! 네, 전혀! 요만큼도!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（と言いつつ、緋宮会長のことを思い浮かべたら、胸が急にドキドキし始めて……これは一体、どういうことですの～～～っ！？）"
translation = "(라고 말하면서도 히노미야 회장님을 떠올리니 가슴이 갑자기 두근거리기 시작해서…… 이건 대체 어떻게 된 건가요~~~옷!?)"

[[dialogue]]
speaker = "unk"
original = "トレーニング仲間になって以来、俺はヒルディー先輩と一緒に、毎朝ランニングもするようになっていた――"
translation = "트레이닝 동료가 된 이후로, 나는 힐디 선배와 함께 매일 아침 러닝도 하게 되었다──"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ひ、緋宮会長。おはようございますわ」"
translation = "「히, 히노미야 회장님. 좋은 아침이에요」"

[[dialogue]]
speaker = "unk"
original = "おはようございます、ヒルディー先輩"
translation = "좋은 아침이에요, 힐디 선배"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（ですわっ！？\u3000ひひひ、緋宮会長の爽やかな笑顔を見ただけで、意識してドキドキしてしまいますわ！？）"
translation = "(인가요!? 히히히, 히노미야 회장님의 상쾌한 미소를 본 것만으로도 의식해서 두근거려 버린답니다!?)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（昨日の朝までは普通に接しておりましたのに！\u3000これではまるで、私が本当に緋宮会長のことをす、す、す……）"
translation = "(어제 아침까지는 평범하게 대했었는데! 이래서는 마치 제가 정말로 히노미야 회장님을 조, 조, 조……)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「って、そんなわけありませんわっ！\u3000こんなことで早朝トレーニングをサボっていたら、負けですのよ！？」"
translation = "「아니, 그럴 리 없답니다! 이런 일로 이른 아침 트레이닝을 빼먹으면 지는 거라고요!?」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000何が！？"
translation = "에? 뭐가요?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「緋宮会長！\u3000さっさとランニングに行きますわよ……！」"
translation = "「히노미야 회장님! 어서 러닝하러 가요……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「この千園寺ヒルディオーネ、自身の誇りに懸けて、この状況に打ち勝ってみせますわ！」"
translation = "「이 센온지 힐디요네, 자신의 긍지를 걸고 이 상황을 이겨내 보이겠어요!」"

[[dialogue]]
speaker = "unk"
original = "（何かまた先輩が面白いことになってる！？）"
translation = "(또 선배가 재밌는 상태가 됐어!?)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（……と、気合いを入れてランニングを始めたものの）"
translation = "(……라고 기합을 넣고 러닝을 시작했지만)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（緋宮会長に意識が向いて、全然集中できませんわ！？\u3000いやむしろ、緋宮会長に意識が集中してしまってますわ！）"
translation = "(히노미야 회장님에게 의식이 쏠려서 전혀 집중할 수가 없답니다!? 아니 오히려 히노미야 회장님에게 의식이 집중되어 버리고 있어요!)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（……前々から思ってましたけれど、緋宮会長は細く見えて、実は筋肉で引き締まった体付きをしておりますのよね。私の好みな、いわゆる細マッチョというやつですわ！）"
translation = "(……전부터 생각했습니다만, 히노미야 회장님은 말라 보여도 사실은 근육으로 다져진 몸매를 하고 있네요. 제 취향인 이른바 슬림 근육질이라는 거네요!)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（それに特別、殿方の顔にこだわりはありませんでしたけど……緋宮会長はよく見ると、整った顔立ちをしておりますわよね）"
translation = "(게다가 딱히 남자의 얼굴에 구애받지는 않았습니다만…… 히노미야 회장님은 자세히 보니 이목구비가 뚜렷한 얼굴을 하고 있네요)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（派手で目立つわけではないですけれど、その分親しみやすくて、見ていて安心出来ますのよね）"
translation = "(화려하고 눈에 띄는 건 아니지만, 그만큼 친근감이 느껴져서 보고 있으면 안심이 된답니다)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（それでいて、戦闘時には驚くくらい凛々しい表情を浮かべたりもして……男らしさに不足はありませんわ）"
translation = "(그러면서도 전투 시에는 놀랄 정도로 늠름한 표정을 짓기도 하고…… 남자다움에 부족함이 없네요)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「って、私は先程から何を考えてますの！？\u3000思考が変な方向にランニングしてますわよ！？」"
translation = "「아니, 저는 아까부터 무슨 생각을 하는 건가요!? 사고가 이상한 방향으로 러닝하고 있답니다!?」"

[[dialogue]]
speaker = "unk"
original = "だ、大丈夫ですか、先輩……？"
translation = "개, 괜찮으세요, 선배……?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「え！？\u3000お、おーっほっほっほ！\u3000全然、これっぽっちも大したことじゃありませんのよ、緋宮会長！」"
translation = "「에!? 오, 오─홋홋홋! 전혀, 요만큼도 큰일 아니랍니다, 히노미야 회장님!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（相手を心から気遣おうとする……こういう優しいところも、緋宮会長の美点ですわ）"
translation = "(상대를 진심으로 걱정하려 하는…… 이런 다정한 점도 히노미야 회장님의 미점이에요)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（マナーをどこかで学んだわけではないのでしょうが、さり気なく紳士的で、純粋に女性をエスコートしようとする心持ち……悪くないですわ）"
translation = "(매너를 어디선가 배운 건 아니겠지만, 은근히 신사적이고 순수하게 여성을 에스코트하려는 마음가짐…… 나쁘지 않네요)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（というか……あれ？\u3000男性として、緋宮会長のことが、全然嫌ではありませんわ。むしろ十分に好感の持てる……）"
translation = "(그보다…… 어라? 남성으로서 히노미야 회장님이 전혀 싫지 않답니다. 오히려 충분히 호감을 가질 수 있는……)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（それこそ、両親に紹介したくなるくらい……って）"
translation = "(그야말로 부모님께 소개해 드리고 싶어질 정도로…… 아니)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ひ、否定要素が、全然見当たりませんわ～～～っ！？」"
translation = "「부, 부정적인 요소가 전혀 보이지 않는답니다~~~옷!?」"

[[dialogue]]
speaker = "unk"
original = "顔、なんか赤くなってますよ！？"
translation = "얼굴, 왠지 빨개졌는데요!?"

[[dialogue]]
speaker = "unk"
original = "いや、本当に大丈夫ですか先輩！？"
translation = "아니, 정말 괜찮으세요 선배!?"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「へ！？\u3000か、顔ですの！？\u3000そんな、そんなことは……！」"
translation = "「헤!? 어, 얼굴인가요!? 그런, 그런 일은……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あっ！？\u3000た、確かに、顔がとても熱くなってますわっ！？」"
translation = "「앗!? 저, 정말로 얼굴이 아주 뜨거워져 있답니다!?」"

[[dialogue]]
speaker = "unk"
original = "ランニングは中止です。熱があるのかも！"
translation = "러닝은 중지예요. 열이 있는 걸지도!"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ひゃあっ！？\u3000お、お待ちになって！\u3000今近付かれるのは、むしろ色々とマズいですわ！」"
translation = "「히얏!? 기, 기다려 주세요! 지금 다가오는 건 오히려 여러모로 곤란하답니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私なら、だだだ大丈夫ですわ！\u3000<ruby>白昼の極星<rt>エトワール・イルソーレ</rt></ruby>がこれしきのことでトレーニングを中止にするなんて、恥ですもの」"
translation = "「저라면 개개개괜찮답니다! 진일의 극성<rt>에투알 일소레</rt></ruby>이 이 정도 일로 트레이닝을 중지하다니 수치니까요」"

[[dialogue]]
speaker = "unk"
original = "俺は、先輩のことが心配なんです！"
translation = "저는 선배가 걱정된다고요!"

[[dialogue]]
speaker = "unk"
original = "恥とかどうでもいい！"
translation = "수치 같은 건 아무래도 좋아!"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「～～～～～～～～～っ！」"
translation = "「~~~~~~~~~~~~~~~~~앗!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「わ、私……」"
translation = "「저, 저……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私、緋宮会長のことを、本当に好きになってしまいましたわぁぁぁ～～～～～～～～～っ！！！」"
translation = "「저, 히노미야 회장님을 정말로 좋아하게 되어버렸답니다아아아아~~~~~~~~~~~~~~~~~앗!!!」"

[[dialogue]]
speaker = "unk"
original = "え……？"
translation = "에……?"

[[dialogue]]
speaker = "unk"
original = "ちょっ、ヒルディー先輩ぃぃぃ！？"
translation = "잠깐, 힐디 선배에에에에!?"

[[dialogue]]
speaker = "unk"
original = "えええぇぇぇ～～～～っ！！？"
translation = "에에에에에에에~~~~옷!!?"

[[dialogue]]
speaker = "unk"
original = "突然の告白に顔が熱くなるのを感じながら、俺は先輩を追い駆け──ランニングを再開するのだった。"
translation = "갑작스러운 고백에 얼굴이 뜨거워지는 것을 느끼며, 나는 선배를 뒤쫓아── 러닝을 재개했다."

