[[dialogue]]
speaker = "unk"
original = "第２話,憑依型女優の真骨頂（後編）,P"
translation = "제2화, 빙의형 여배우의 진면목 (후편), P"

[[dialogue]]
speaker = "レミカ"
original = "「うーん……ちょっとヤバいかも……？\u3000ぶっちゃけ、藍の役ってストーリーに密接に関わるわけじゃないから、いなくてもあまり問題ないし……」"
translation = "「으음…… 조금 위험할지도……? 솔직히 아이 역할은 스토리와 밀접하게 연관된 게 아니라서 없어도 큰 문제는 없거든……」"

[[dialogue]]
speaker = "レミカ"
original = "「撮影時間も限られてるから、監督さんもいっそ外しちゃおうかなんて話も出てる。藍にはどうにか本領を発揮してもらいたいんだけど……」"
translation = "「촬영 시간도 한정되어 있어서 감독님도 아예 빼버릴까 하는 얘기도 나오고 있어. 아이가 어떻게든 본실력을 발휘해 줬으면 좋겠는데……」"

[[dialogue]]
speaker = "藍"
original = "「その方が、いいですよね……私１人のために、皆さんに迷惑をかけちゃいますし……」"
translation = "「그게 낫겠죠…… 저 한 사람 때문에 여러분께 폐를 끼치고 있으니까요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もうっ、何をやってるのよ、藍！\u3000いっそ私が出てやろうかしら！」"
translation = "「정말이지, 뭘 하는 거야, 아이! 차라리 내가 나갈까 봐!」"

[[dialogue]]
speaker = "レミカ"
original = "「あはは……ヴィ―ナス、メンタル強すぎでしょ。ヴィーナスの心臓に生えてる毛を、藍に分けてあげられたらいいのにね」"
translation = "「아하하…… 비너스, 멘탈 너무 강한 거 아냐. 비너스 심장에 난 털을 아이한테 나눠줄 수 있으면 좋을 텐데.」"

[[dialogue]]
speaker = "unk"
original = "それだ！"
translation = "그거다!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私の毛を、藍に植えるの？」"
translation = "「내 털을 아이한테 심는다고?」"

[[dialogue]]
speaker = "unk"
original = "そうじゃなくて！\u3000藍！"
translation = "그게 아니라! 아이!"

[[dialogue]]
speaker = "藍"
original = "「は、はいっ！\u3000な、なんでしょう？」"
translation = "「네, 네! 머, 뭔가요?」"

[[dialogue]]
speaker = "unk"
original = "その上でドラマの役になるんだ！"
translation = "그 상태로 드라마 배역을 맡는 거야!"

[[dialogue]]
speaker = "unk"
original = "豪胆なヴィーナスになりきれ！"
translation = "대담한 비너스가 되어버려!"

[[dialogue]]
speaker = "藍"
original = "「ヴィーナス先輩にですか！？\u3000そ、そそ、そんな、恐れ多いです……！」"
translation = "「비너스 선배님으로요!? 거, 거거, 그런 건 너무 송구스러워요……!」"

[[dialogue]]
speaker = "レミカ"
original = "「無茶言うね、会長。ヴィーナスに扮した上にドラマの役まで演じる二重演技なんて──」"
translation = "「무리한 요구네, 회장. 비너스로 분한 상태에서 드라마 배역까지 연기하는 이중 연기라니──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ナイスアイデアじゃない！\u3000全然構わないわ！\u3000むしろ、私のモノマネなんて是非見てみたいわね！」"
translation = "「나이스 아이디어 아냐! 난 전혀 상관없어! 오히려 내 흉내 내는 걸 꼭 보고 싶은걸!」"

[[dialogue]]
speaker = "藍"
original = "「そうですか……？\u3000ヴィーナス先輩さえ構わないのでしたら、あの……少しお話を伺っても……？」"
translation = "「그럴까요……? 비너스 선배님께서 괜찮으시다면 저기…… 조금 이야기를 여쭤봐도……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、スリーサイズからお風呂ではどこから洗うかまで、なんでも教えてあげるわ！」"
translation = "「응, 쓰리 사이즈부터 샤워할 때 어디부터 씻는지까지 전부 다 가르쳐 줄게!」"

[[dialogue]]
speaker = "レミカ"
original = "「……藍、できるの？」"
translation = "「……아이, 할 수 있겠어?」"

[[dialogue]]
speaker = "藍"
original = "「えっ？\u3000はい、少し時間はかかってしまうと思いますけど、やってやれないことはないと思います……」"
translation = "「엣? 네, 조금 시간은 걸리겠지만 못 할 건 없다고 생각해요……」"

[[dialogue]]
speaker = "レミカ"
original = "「そっか……そうなんだ。藍って期待してた通り、凄い子なんだね。藍の準備できるまで、ちょっとだけ時間稼いであげる」"
translation = "「그렇구나…… 그랬던 거네. 아이는 기대했던 대로 대단한 아이구나. 아이가 준비될 때까지 내가 시간을 좀 벌어줄게.」"

[[dialogue]]
speaker = "unk"
original = "レミカが稼いでくれている出番待ちの間に、藍は開けっぴろげなヴィーナスに聞き取りをした。"
translation = "레미카가 벌어준 대기 시간 동안 아이는 거침없는 비너스에게 이것저것 캐물었다."

[[dialogue]]
speaker = "unk"
original = "２人の間でどんな話がされていたのかはわからないけど──"
translation = "둘 사이에 어떤 이야기가 오갔는지는 알 수 없지만──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふぅ……すごい質問責めだったわ！」"
translation = "「후우…… 엄청난 질문 공세였어!」"

[[dialogue]]
speaker = "藍"
original = "「私はヴィーナス先輩……私はヴィーナス……九浄ヴィーナス……！」"
translation = "「나는 비너스 선배님…… 나는 비너스…… 쿠죠 비너스……!」"

[[dialogue]]
speaker = "レミカ"
original = "「藍、そろそろ出番だけど大丈夫？」"
translation = "「아이, 이제 네 차례인데 괜찮아?」"

[[dialogue]]
speaker = "藍"
original = "「──ええ、大丈夫よ、レミカ！」"
translation = "「──응, 괜찮아, 레미카!」"

[[dialogue]]
speaker = "レミカ"
original = "「えっ……！？\u3000藍だよね！？」"
translation = "「엣……!? 아이 맞지!?」"

[[dialogue]]
speaker = "藍"
original = "「あはは、おかしなこと言うのね！\u3000さ、行きましょ！」"
translation = "「아하하, 이상한 소릴 하네! 자, 가자!」"

[[dialogue]]
speaker = "unk"
original = "そして、藍とレミカのシーンが再開された。"
translation = "그리고 아이와 레미카의 장면이 재개되었다."

[[dialogue]]
speaker = "レミカ"
original = "「──ごめんなさい。いきなりアイドルグループになんて勧誘されても困るよね」"
translation = "「──미안해. 갑자기 아이돌 그룹에 권유받아도 곤란하겠지.」"

[[dialogue]]
speaker = "藍"
original = "「そんなことないわ！\u3000でも、私にはグループなんて絶対に無理よ！」"
translation = "「그런 거 아냐! 하지만 나한테 그룹 같은 건 절대 무리라고!」"

[[dialogue]]
speaker = "藍"
original = "「だって──私が目指すのは、夜空に燦然と輝く一番星！\u3000そのためにもアイドル活動はソロでやらなきゃ、でしょ？」"
translation = "「왜냐하면── 내가 목표로 하는 건 밤하늘에 찬연히 빛나는 일등성! 그러기 위해서라도 아이돌 활동은 솔로로 해야 하잖아?」"

[[dialogue]]
speaker = "レミカ"
original = "「ちょっ、めちゃくちゃアドリブ──ぷっ、ふふ、あは、あはは、あははははははっ！」"
translation = "「잠깐, 엄청난 애드리브── 풉, 푸후, 아하, 아하하, 아하하하하하하!」"

[[dialogue]]
speaker = "レミカ"
original = "「つまり、私とあなたは宇宙最高のアイドルを競うライバルということだね！\u3000面白いじゃない！」"
translation = "「즉, 나와 너는 우주 최고의 아이돌 자리를 다투는 라이벌이라는 거네! 재밌잖아!」"

[[dialogue]]
speaker = "藍"
original = "「そうよ！\u3000宇宙最高のアイドルの座は、絶対に譲ってあげないんだから！\u3000覚悟しなさい！」"
translation = "「그래! 우주 최고의 아이돌 자리는 절대 양보하지 않을 거니까! 각오해!」"

[[dialogue]]
speaker = "監督"
original = "「おいおい、あの子、本当にさっきと同じ子？\u3000あんなイカした演技できるんなら最初からやってよぉ！」"
translation = "「어이어이, 저 학생 정말 아까랑 같은 학생이야? 저런 멋진 연기를 할 수 있다면 처음부터 하라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あははっ！\u3000全然違う話になってるけど、こっちの方が断然面白いわね！」"
translation = "「아하하! 완전히 다른 이야기가 됐지만 이쪽이 단연코 훨씬 재밌네!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、なんかしたの？"
translation = "비너스, 무슨 짓 했어?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「特に何もしてないわ。１０分くらい、藍とお話しただけよ」"
translation = "「딱히 아무것도 안 했어. 10분 정도 아이랑 대화했을 뿐인걸.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私のプロフィールや口調を教えただけで、性格をトレースしたみたいね。あの子、面白いわ！\u3000ますます気に入っちゃった！」"
translation = "「내 프로필이랑 말투를 가르쳐줬을 뿐인데 성격까지 트레이싱한 모양이네. 저 아이 재밌어! 점점 더 마음에 들어!」"

[[dialogue]]
speaker = "unk"
original = "物怖じしないヴィーナスのメンタルを宿し、アドリブまみれな改変をやらかしながらも、藍は現場を乗り切ったのである。"
translation = "겁 없는 비너스의 멘탈을 깃들여 애드리브 섞인 개변을 저지르면서도 아이는 현장을 훌륭히 소화해 낸 것이었다."

[[dialogue]]
speaker = "藍"
original = "「あっ、会長さん、おはようございます。ドラマ、観てくれてますか？」"
translation = "「앗, 회장님, 좋은 아침이에요. 드라마, 봐주고 계신가요?」"

[[dialogue]]
speaker = "unk"
original = "毎週、楽しみにしてるよ"
translation = "매주 즐겁게 보고 있어."

[[dialogue]]
speaker = "藍"
original = "「あの撮影のおかげで、チョイ役だったはずが、準レギュラーに昇格したんです」"
translation = "「그 촬영 덕분에 단역이었을 텐데 조연급으로 승격됐어요.」"

[[dialogue]]
speaker = "藍"
original = "「私が目立ったせいで、ドラマの脚本は大幅変更になっちゃったみたいですけど、大好評だから結果オーライだそうで」"
translation = "「제가 너무 튀어버린 탓에 드라마 각본은 대폭 수정된 것 같지만, 반응이 너무 좋아서 결과적으로는 다행이라더군요.」"

[[dialogue]]
speaker = "藍"
original = "「次の収録はレミカ先輩と直接対決なんです。実際に本気で戦って、結果次第で結末が変わるかもしれないんです。頑張ってきますね！」"
translation = "「다음 수록은 레미카 선배님과 직접 대결하는 거예요. 실제로 진검승부를 벌여서 결과에 따라 결말이 달라질지도 모른대요. 열심히 하고 올게요!」"

[[dialogue]]
speaker = "unk"
original = "陰ながら応援してるね！"
translation = "멀리서 응원하고 있을게!"

[[dialogue]]
speaker = "藍"
original = "「ありがとうございます。でも、陰ながらじゃなくて、大っぴらに応援してくれていいんですよ？」"
translation = "「감사합니다. 하지만 멀리서가 아니라 대놓고 응원해 주셔도 된다고요?」"

[[dialogue]]
speaker = "unk"
original = "藍とレミカの出演したドラマは高視聴率をマークした。"
translation = "아이와 레미카가 출연한 드라마는 높은 시청률을 기록했다."

[[dialogue]]
speaker = "unk"
original = "主役のレミカと並ぶ存在感を見せつけた藍の名は瞬く間に広がり、所属事務所『ポラリスプロダクション』の名はまた大きく広まったのだった。"
translation = "주연인 레미카와 어깨를 나란히 하는 존재감을 보여준 아이의 이름은 순식간에 퍼졌고, 소속사 『폴라리스 프로덕션』의 이름 또한 널리 알려졌다."

