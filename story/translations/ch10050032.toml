[[dialogue]]
speaker = "unk"
original = "第２話,ソフィア流サーフィン,P"
translation = "제2화, 소피아류 서핑, P"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──サーフィン、ですか？」"
translation = "「──서핑, 말인가요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なるほど……私もやってみてはどうか、と。確かにフィオナ会長もさっそうと波に乗っていましたね」"
translation = "「과연…… 저도 한번 해보는 게 어떠냐고요. 확실히 피오나 회장님도 늠름하게 파도를 타고 계셨죠.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それに、サーフィンといえば大人らしい趣味のイメージがあります」"
translation = "「게다가, 서핑이라고 하면 어른스러운 취미라는 이미지가 있어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いずれ私もフィオナ会長と同じビッグウェーブに乗れれば、きっと違った目で見てくれるはずです」"
translation = "「언젠가 저도 피오나 회장님과 같은 빅 웨이브를 탈 수 있게 되면, 분명 다른 눈으로 봐주실 거예요.」"

[[dialogue]]
speaker = "unk"
original = "かもしれない"
translation = "그럴지도 모르지"

[[dialogue]]
speaker = "unk"
original = "冬だけどね"
translation = "겨울이지만 말이야"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい！\u3000ふふ、会長さんはサーフィンもお手のものなんですよね？\u3000そうお聞きしましたよ」"
translation = "「네! 후후, 회장님은 서핑도 능숙하시죠? 그렇게 들었답니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぜひ私にも教えてください。これもひと夏の体験というものです！」"
translation = "「부디 저에게도 가르쳐 주세요. 이것도 어느 여름날의 체험이라는 것이니까요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──むぅ…………」"
translation = "「──으으…………」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なんなんですか、これは。まるで安定しません……！\u3000波に乗るどころか、ボードの上に立つことすらままならないじゃないですか」"
translation = "「뭐예요, 이건. 도무지 안정이 안 돼요……! 파도를 타기는커녕, 보드 위에 서 있는 것조차 마음대로 안 되잖아요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んっ、しょ……よっ……ほっ……このまま……重心を崩さずに………………あっ！？」"
translation = "「영, 차…… 얍…… 훗…… 이대로…… 중심을 잃지 않고……………… 앗!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ごぼごぼごぼごぼ……！！！」"
translation = "「꼬르륵 꼬르륵 꼬르륵……!!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぷはぁあああっ！！」"
translation = "「푸하아아앗!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「むむむぅ……楽しくありません……人のを見ていたら、簡単そうに見えたのに……」"
translation = "「으으으…… 즐겁지 않아요…… 남이 하는 걸 봤을 때는, 쉬워 보였는데……」"

[[dialogue]]
speaker = "unk"
original = "最初は皆そう"
translation = "처음엔 다 그래"

[[dialogue]]
speaker = "unk"
original = "何事も練習だ"
translation = "뭐든 연습이지"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「確かに……一朝一夕でどうこうなるものではありませんか……」"
translation = "「확실히…… 하루아침에 어떻게 되는 건 아닌가 보네요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私のスケートもそうですが、ただ見ているのと、実際にやってみるのとでは、大きな違いがありますからね」"
translation = "「제 스케이트도 그렇지만, 그저 보고 있는 것과, 실제로 해보는 것 사이에는, 큰 차이가 있으니까요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それに、ちょうどいい波を待つのも大変です。ただでさえ難儀なのに、タイミングまで要求されるとは──」"
translation = "「게다가, 적당한 파도를 기다리는 것도 힘들어요. 가뜩이나 어려운데, 타이밍까지 요구되다니──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……って……いつまで私のことを抱きかかえてるんです？」"
translation = "「……근데…… 언제까지 저를 껴안고 계실 건가요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「全くもう、会長さんまで私のことを子ども扱いして。まぁ……お姫様抱っこの心地は、悪くありませんでしたけど」"
translation = "「정말이지, 회장님까지 저를 어린애 취급하시고. 뭐…… 공주님 안기의 기분은, 나쁘지 않았지만요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「しかし、どうしましょう。このままでは格好よくサーフィンなんて夢のまた夢……」"
translation = "「하지만, 어쩌죠. 이대로라면 멋지게 서핑하는 건 꿈속의 꿈……」"

[[dialogue]]
speaker = "unk"
original = "フィギュアの要領で"
translation = "피겨의 요령으로"

[[dialogue]]
speaker = "unk"
original = "海をリンクだと思って"
translation = "바다를 링크라고 생각하고"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ん？\u3000確かに──そうだ、思いついたことがあったんです」"
translation = "「응? 확실히── 맞다, 생각난 게 있어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……………………よし」"
translation = "「……………………좋아.」"

[[dialogue]]
speaker = "unk"
original = "何をする気だ？"
translation = "뭘 할 생각이야?"

[[dialogue]]
speaker = "unk"
original = "よし、って？"
translation = "좋아, 라니?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まあまあ。お気になさらずです、会長さん」"
translation = "「자자. 신경 쓰지 마세요, 회장님.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「波？\u3000いえ、波は待っていません。むしろ──波のない瞬間を待っているんです」"
translation = "「파도요? 아뇨, 파도는 기다리지 않아요. 오히려── 파도가 없는 순간을 기다리는 거예요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「この一瞬の凪……今ですっ！\u3000コキュートスダイブ！」"
translation = "「이 일순간의 잔잔함…… 지금이에요! 코큐토스 다이브!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──よし！\u3000凍結完了です」"
translation = "「──좋아! 동결 완료입니다.」"

[[dialogue]]
speaker = "unk"
original = "海が凍って……"
translation = "바다가 얼어서……"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい！\u3000これで天然のスケートリンク完成です！」"
translation = "「네! 이걸로 천연 스케이트 링크 완성이에요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まさか？\u3000ええ、もちろん。そのまさかです。この上を直接滑れば──海に乗るという意味では同じ！\u3000実質サーフィンみたいなものです！」"
translation = "「설마? 네, 물론이죠. 그 설마입니다. 이 위를 직접 미끄러지면── 바다를 탄다는 의미에서는 똑같죠! 실질적으로 서핑 같은 거예요!」"

[[dialogue]]
speaker = "unk"
original = "でこぼこだらけだ"
translation = "울퉁불퉁하잖아"

[[dialogue]]
speaker = "unk"
original = "危ないよ"
translation = "위험해"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「確かに、凪の一瞬を狙ったとはいえさざなみは立っていました。整氷の必要がありますね」"
translation = "「확실히, 잔잔한 순간을 노렸다고는 해도 잔물결은 일고 있었네요. 빙질 관리가 필요하겠어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「フィギュアにおいてリンク上の穴は大敵です。下手にハマってしまうと大怪我の危険もありますからね。丁寧に、こう、<ruby>均<rt>なら</rt></ruby>してっと……」"
translation = "「피겨에서 링크 위의 구멍은 대적이에요. 서투르게 빠져버리면 큰 부상의 위험도 있으니까요. 정성스럽게, 이렇게, 골라서……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──ふふふん♪\u3000どうですか、私の華麗なるサーフィンは♪\u3000２回転だってお手の物です♪」"
translation = "「──후후훈♪ 어때요, 저의 화려한 서핑은♪ 2회전도 식은 죽 먹기예요♪」"

[[dialogue]]
speaker = "unk"
original = "サーフィンじゃない"
translation = "서핑이 아니야"

[[dialogue]]
speaker = "unk"
original = "そっちのほうが難しい"
translation = "그쪽이 더 어려워"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「むぅ……細かいことはいいじゃないですか。一応、波には乗ったんですから──って。あ」"
translation = "「으으…… 세세한 건 상관없잖아요. 일단, 파도에는 탔으니까── 앗.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「しまった。このやり方だと、フィオナ会長と一緒に波に乗ることができません……！」"
translation = "「이런. 이 방식으로는, 피오나 회장님과 함께 파도를 탈 수 없어요……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「やはり地道な積み重ねしかありませんか。やれやれ……何事も楽はできませんね」"
translation = "「역시 꾸준히 쌓아가는 수밖에 없나요. 참 내…… 뭐든 쉽게 되는 건 없네요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「きっと、何度も落ちてしまうでしょうから……その度に私を助けてくださいね？\u3000会長さん<emoji=heart04>」"
translation = "「분명, 몇 번이고 떨어져 버릴 테니까…… 그때마다 저를 도와주셔야 해요? 회장님<emoji=heart04>」"

