[[dialogue]]
speaker = "unk"
original = "第２話,ジュリエッテの特技,P"
translation = "제2화, 줄리엣테의 특기, P"

[[dialogue]]
speaker = "unk"
original = "──ジュリエッテから突然の告白を受けてから数日。"
translation = "──줄리엣테에게서 갑작스러운 고백을 받은 지 며칠."

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ささっ……ささささ……」"
translation = "「사사삭…… 사사사사……」"

[[dialogue]]
speaker = "unk"
original = "最近外出すると、ジュリエッテにストーキングされる。"
translation = "요즘 외출하면, 줄리엣테에게 스토킹을 당한다."

[[dialogue]]
speaker = "unk"
original = "……かと言って、何かしらアプローチをかけてくるわけでもなく、ただ後ろを付いてくるだけ。正直不気味だ。"
translation = "……그렇다고 해서, 뭔가 접근을 해 오는 것도 아니고, 그저 뒤를 따라올 뿐. 솔직히 섬뜩하다."

[[dialogue]]
speaker = "ジュリエッテ"
original = "「むむむ……魔王様にアピールしないといけないのですが……妙に照れくさいでございますわ」"
translation = "「무무무…… 마왕님께 어필해야 하옵니다만…… 묘하게 쑥스럽사옵니다」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「しかし魔王様をわたくしの虜に出来れば、野望に大きく近づきますわ……！」"
translation = "「하지만 마왕님을 와타쿠시의 포로로 만들 수 있다면, 야망에 크게 가까워질 것이옵니다……!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「がんばれわたくし……！\u3000勇気を出すでございますわ……！」"
translation = "「힘내라 와타쿠시……! 용기를 내는 것이옵니다……!」"

[[dialogue]]
speaker = "unk"
original = "ジュリエッテ？"
translation = "줄리엣테?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ひゃあん！？\u3000ま、魔王様！？」"
translation = "「햐앙!? 마, 마왕님!?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（声をかけるつもりが、逆に声をかけられてしまいましたわっ）"
translation = "（말을 걸려 했는데, 오히려 말을 걸려 버렸사옵니다앗）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「こ、こんなところで奇遇でございますわね……おほほほ」"
translation = "「그, 이런 곳에서 우연이옵니다요…… 오호호호」"

[[dialogue]]
speaker = "unk"
original = "最近ずっと付いてきてたよね"
translation = "요즘 계속 따라다녔잖아"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そ、それは、その……！\u3000好きな人を追いかけて何が悪いんでございますの……！」"
translation = "「그, 그것은, 그……! 좋아하는 사람을 쫓아다니는 것이 뭐가 나쁜 것이옵니까……!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ずっとチャンスをうかがっていたのでございますのよ！\u3000好きな人にアピールするために！」"
translation = "「계속 기회를 엿보고 있었던 것이옵니다요! 좋아하는 사람에게 어필하기 위해서!」"

[[dialogue]]
speaker = "unk"
original = "無理してない……？"
translation = "무리하는 거 아니야……?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「無理なんてしてないでございますよっ。わたくし、愛に生きる女でございますから！」"
translation = "「무리 같은 건 하지 않사옵니다요. 와타쿠시, 사랑에 사는 여자이옵니다!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「それよりも魔王様、せっかくの機会ですしご一緒してもよろしくて？」"
translation = "「그것보다 마왕님, 모처럼의 기회이니 함께해도 괜찮으시옵니까?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくし、大大大好きな魔王様と同じ時を過ごしたいでございますの♪」"
translation = "「와타쿠시, 너~무나 좋아하는 마왕님과 같은 시간을 보내고 싶사옵니다요♪」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「……ふふ、一緒に楽しい時間を過ごしましょう魔王様♪」"
translation = "「……후후, 함께 즐거운 시간을 보내시옵소서 마왕님♪」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ところで魔王様はどこかへお出かけですか？\u3000この時間ですとランチでございますか？」"
translation = "「그런데 마왕님은 어디로 외출하십니까? 이 시간이면 점심 식사이옵니까?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そうでございますわ魔王様！\u3000せっかくでしたら、わたくしがランチをお作りして差し上げますわ！」"
translation = "「그렇사옵니다 마왕님! 모처럼이니, 와타쿠시가 점심 식사를 만들어 드릴 것이옵니다!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくし、想い人に手料理を振る舞うのが小さい頃からの夢でしたの。ですから、お願いしてもよろしくて？」"
translation = "「와타쿠시, 사모하는 분께 직접 만든 요리를 대접하는 것이 어릴 적부터의 꿈이었사옵니다. 그러니, 부탁드려도 괜찮으시옵니까?」"

[[dialogue]]
speaker = "unk"
original = "……じゃあ、うちに来る？"
translation = "……그럼, 우리 집에 올래?"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「魔王様のお家でございますか！？」"
translation = "「마왕님의 댁이옵니까!?」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（まだお付き合いもしてないのに、殿方のお部屋にお邪魔するだなんてハレンチですわ！\u3000不潔ですわ！）"
translation = "（아직 사귀지도 않는데, 남자분의 방에 실례하다니 음란하옵니다! 불결하옵니다!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（で、ですが……魔王様のお家にお邪魔する機会なんて滅多にないはず……！\u3000これはチャンスでございますわ！）"
translation = "（하, 하지만…… 마왕님의 댁에 실례할 기회는 흔치 않을 것이옵니다……! 이것은 기회이옵니다!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ぜ、是非お願いしたいでございますわっ、とびっきりの手料理を振る舞いますわ！」"
translation = "「꼭, 꼭 부탁드리고 싶사옵니다앗, 최고의 손수 만든 요리를 대접할 것이옵니다!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（遂にきてしまいましたわ！\u3000殿方のお家に！\u3000しかしここで怖気づくわけにはいきませんわ……これも野望のため！）"
translation = "（드디어 와 버렸사옵니다! 남자분의 댁에! 하지만 여기서 겁먹을 수는 없사옵니다…… 이것도 야망을 위해서!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「……さて、早速ですがキッチンを拝見させていただきますわね」"
translation = "「……자, 바로 키친을 살펴보겠사옵니다요」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ふむふむ……余っていそうな材料は卵と牛乳と食パンと……」"
translation = "「흠흠…… 남아 있을 것 같은 재료는 달걀과 우유와 식빵과……」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「これなら、アレが作れますわね♪\u3000ジュリエッテ・ハルヴィーノやってやるでございますわ～！」"
translation = "「이것이라면, 그것을 만들 수 있겠사옵니다요♪ 줄리엣테 하르비노, 해낼 것이옵니다아~!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「～～～～♪」"
translation = "「~~~~♪」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（ハッ！？\u3000わたくしとしたことがノリノリで料理をしてしまっていますわ！？）"
translation = "（핫!? 와타쿠시가 신나서 요리를 하고 있다니!?）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（冷静になりますと、どうしてこのわたくしが他人のために手料理など……）"
translation = "（냉정하게 생각해 보면, 어째서 이 와타쿠시가 타인을 위해 손수 만든 요리 따위를……）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（ですが、魔王様に取り入ることは、後々利益になるはずでございますわ……ここは耐えるのでございます！\u3000ジュリエッテ！）"
translation = "（하지만, 마왕님에게 환심을 사는 것은, 나중에 이익이 될 것이옵니다…… 여기는 참는 것이옵니다! 줄리엣테!）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「あとは卵液に浸したパンをフライパンで焼いて……フレンチトーストの完成でございますわ～！\u3000魔王様、早速召し上がってくださいませ！」"
translation = "「이제 달걀물에 담근 빵을 프라이팬에 굽고…… 프렌치토스트 완성입니다아~! 마왕님, 바로 드시옵소서!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「お味はどうです？\u3000甘さは丁度いいでございましょうか？」"
translation = "「맛은 어떠하옵니까? 단맛은 적당하옵니까?」"

[[dialogue]]
speaker = "unk"
original = "すごく美味しい！"
translation = "엄청 맛있어!"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「そうでございますか！\u3000気に入っていただき嬉しゅうございます！」"
translation = "「그렇사옵니까! 마음에 들어 해 주셔서 기쁘옵니다!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（ハッ……！？\u3000わたくしってば、何をはしゃいで……）"
translation = "（핫……!? 와타쿠시가, 뭘 신나서……）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（でも、褒められるのは悪くない気分でございますわね……他人のために料理をするのは面倒ですが……）"
translation = "（하지만, 칭찬받는 것은 나쁘지 않은 기분이옵니다요…… 타인을 위해 요리하는 것은 귀찮지만……）"

[[dialogue]]
speaker = "unk"
original = "意外と料理が上手なんだね"
translation = "의외로 요리를 잘하네"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「意外とってなんでございますの、意外とって……！」"
translation = "「의외로라니 무엇이옵니까, 의외로라니……!」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「わたくし、こう見えても家事と料理は得意でございましてよ。まあ、自分からやりたくない類のものでございますが」"
translation = "「와타쿠시, 겉보기와 달리 가사와 요리는 특기이옵니다요. 뭐, 스스로 하고 싶지 않은 종류의 것이옵니다만」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「ところで、魔王様は飢えて死にかけたことはございまして？\u3000ふふ、他愛のない質問でございましてよ」"
translation = "「그런데, 마왕님은 굶어 죽을 뻔한 적이 있으시옵니까? 후후, 별것 아닌 질문이옵니다요」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「暖かい料理をいつでも食べられるというのは、それだけで幸せなことでございますの」"
translation = "「따뜻한 요리를 언제든지 먹을 수 있다는 것은, 그것만으로도 행복한 것이옵니다요」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "（家を出て野をさまよっていた頃に身に付けた料理でしたが、今日は役に立ったでございますね……）"
translation = "（집을 나와 들판을 헤매던 시절에 익힌 요리였지만, 오늘은 도움이 되었사옵니다요……）"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「さて、魔王様に手料理を振る舞えたことでございますし、そろそろわたくしはお暇させていただきますわ」"
translation = "「자, 마왕님께 손수 만든 요리를 대접했으니, 슬슬 와타쿠시는 이만 물러가겠사옵니다」"

[[dialogue]]
speaker = "ジュリエッテ"
original = "「……ふふ、案外悪くない時間でございましたわ。またお会いしましょう魔王様」"
translation = "「……후후, 의외로 나쁘지 않은 시간이었사옵니다. 또 뵙겠사옵니다 마왕님」"

