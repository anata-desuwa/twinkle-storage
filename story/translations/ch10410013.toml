[[dialogue]]
speaker = "unk"
original = "第３話,悪の解消方法,P"
translation = "제3화, 악의 해소 방법, P"

[[dialogue]]
speaker = "unk"
original = "星徒会で他に誰も居ないのに急ぎの仕事が山程舞い込んで来たある日。遊びに来たネーゼマインに手伝って貰っていたのだが――"
translation = "성도회에 다른 사람은 아무도 없는데 급한 업무가 산더미처럼 밀려온 어느 날. 놀러 온 네제마인에게 도움을 받고 있었는데――"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ほい、こっちの書類も出来上がりっと。これで全部終わったかな？」"
translation = "「자, 이쪽 서류도 완성. 이걸로 다 끝났나?」"

[[dialogue]]
speaker = "unk"
original = "凄い！\u3000残業コースだと思ってたのに"
translation = "대단해! 야근 확정이라고 생각했는데"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「お父さんの事務仕事、暇な時は手伝ったりしてるからね～。慣れてるってだけだよ」"
translation = "「아빠의 사무 업무를 한가할 때 돕기도 하니까~. 익숙할 뿐이야」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「お父さんの引き受ける裁判は、何でかいつも逆転に次ぐ逆転が起きて面白いからさ。ついつい首を突っ込んじゃうんだよね～」"
translation = "「아빠가 맡는 재판은 왠지 항상 역전에 역전이 일어나서 재미있거든. 나도 모르게 참견하게 된다니까~」"

[[dialogue]]
speaker = "unk"
original = "俺が出来ることなら何でもするから"
translation = "내가 할 수 있는 일이라면 뭐든 할 테니까"

[[dialogue]]
speaker = "unk"
original = "ありがとう、マイン。お礼に今度"
translation = "고마워, 마인. 답례로 다음에"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……今、何でもするって言った？」"
translation = "「……지금 뭐든 한다고 했어?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000じゃあ会長、ソファーに俯せになって……そうそう♪」"
translation = "「니히히♪ 그럼 회장님, 소파에 엎드려 봐…… 그래그래♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ靴を脱いで……お背中失礼しま～す♪\u3000よいしょっと☆」"
translation = "「그럼 신발을 벗고…… 등 실례하겠습니다~♪ 영차☆」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「何をしているのかって？\u3000背中と腰のマッサージだよ～♪\u3000ほら、ずっと椅子に座って事務作業してたから、凝ってるんじゃないかっと思って♪」"
translation = "「뭘 하고 있냐고? 등이랑 허리 마사지야~♪ 봐봐, 계속 의자에 앉아서 사무 작업만 했으니까 뭉쳤을 것 같아서♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それに、何でもするって言ったでしょ？\u3000だったら今は、私が女王様で、会長は下僕ってことで♪\u3000逆らっちゃダメだよ～？」"
translation = "「게다가 뭐든 한다고 했지? 그렇다면 지금은 내가 여왕님이고 회장님은 하인인 걸로♪ 거역하면 안 돼~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ早速……この辺りとかどうかな～？」"
translation = "「그럼 당장…… 이쯤은 어때~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「大丈夫、前にもお父さん相手にやったことあるから。あ、でも、親の前だと恥ずかしいから、女王様ごっこは流石にやってないよ？」"
translation = "「괜찮아, 전에도 아빠 상대로 해본 적 있으니까. 아, 그래도 부모님 앞에서는 부끄러우니까 여왕님 놀이는 역시 안 했어?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長がいけないんだよ～？\u3000この前みたいに、ストレス解消に付き合うとか、今回みたいに、何でもするとか私の前で言っちゃうから～♪」"
translation = "「회장님이 나쁜 거야~? 요 전처럼 스트레스 해소를 도와준다느니, 이번처럼 뭐든 한다느니 내 앞에서 말해버리니까~♪」"

[[dialogue]]
speaker = "unk"
original = "マイン、結構Ｓだよね！？"
translation = "마인, 꽤 S구나!?"

[[dialogue]]
speaker = "unk"
original = "前の時から思ってたけど"
translation = "전부터 생각하긴 했지만"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ、言ったでしょ？\u3000私は悪寄りだって。ほらほら、今度はこっちを踏むよ～？」"
translation = "「니히히, 말했잖아? 나는 악에 가깝다고. 자자, 이번에는 이쪽을 밟을게~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはっ☆\u3000いい声が出たね～。ひょっとして、気持ち良くなっちゃったのかな～？」"
translation = "「꺄핫☆ 좋은 소리가 났네~. 설마 기분이 좋아져 버린 걸까나~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、素直に認めないんだ～？\u3000じゃあ、もっと踏み踏みされても問題ないよね～？\u3000にひひ♪\u3000そ～れ！」"
translation = "「아~, 순순히 인정 안 하네~? 그럼 더 꾹꾹 밟혀도 문제없겠지~? 니히히♪ 자~!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あはっ、ほらほら、いっぱい声出てる～<emoji=heart04>\u3000ねぇねぇ、本当は私に踏まれて、気持ち良くなってるんじゃないの～？」"
translation = "「아핫, 봐봐, 소리 엄청 나오고 있어~♥ 있잖아 있잖아, 사실은 나한테 밟혀서 기분 좋아진 거 아니야~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「今は私が女王様だよ？\u3000会長、何でもするって言ったよね～？\u3000ほら～、下僕なんだから正直に答えろ<emoji=heart04>」"
translation = "「지금은 내가 여왕님이야? 회장님, 뭐든 한다고 했지~? 자~, 하인이니까 솔직하게 대답해♥」"

[[dialogue]]
speaker = "unk"
original = "正直、気持ち良いです……！"
translation = "솔직히, 기분 좋습니다……!"

[[dialogue]]
speaker = "unk"
original = "その……足が柔らかくて"
translation = "그…… 발이 부드러워서"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふ……ふふ……会長、本当に認めちゃうんだ……♪」"
translation = "「후…… 후후…… 회장님, 정말로 인정해 버리네……♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「真面目だと思ってたのに、会長の……へ・ん・た・い・さん<emoji=heart04>」"
translation = "「성실하다고 생각했는데, 회장님은…… 변·태·님♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まさか、自分より小さい女の子に踏まれて、気持ちよくなっちゃう変態さんだなんて……！\u3000他の女の子が見たら、どう思うかな～？」"
translation = "「설마 자기보다 작은 여자애한테 밟혀서 기분 좋아지는 변태님이라니……! 다른 여자애들이 보면 어떻게 생각할까~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうだ、せっかくだから星徒会メンバーをここに呼んじゃう？\u3000反応が見てみたいな～」"
translation = "「맞다, 기왕 이렇게 된 거 성도회 멤버들을 여기로 부를까? 반응이 보고 싶은데~」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000それはやめて！"
translation = "잠깐!? 그건 그만둬!"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははは！\u3000慌ててる慌ててる♪\u3000でも、女王様に対する言葉遣いがそれじゃな～。下僕として、もっと頼み方ってものがあるんじゃない？」"
translation = "「꺄하하하! 당황한다 당황해♪ 하지만 여왕님에 대한 말투가 그게 뭐야~. 하인으로서 좀 더 부탁하는 법이라는 게 있잖아?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～？\u3000声が小さくて、聞こえないな～？\u3000ほら、恥ずかしがらずにちゃんと言って？」"
translation = "「음~? 목소리가 작아서 안 들리는데~? 자, 부끄러워하지 말고 제대로 말해봐?」"

[[dialogue]]
speaker = "unk"
original = "このことはどうか、ご内密に……！"
translation = "이 일은 제발, 비밀로 해주세요……!"

[[dialogue]]
speaker = "unk"
original = "女王様、お願いします"
translation = "여왕님, 부탁드립니다"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「はあぁ……<emoji=heart04>\u3000屈服した会長の言葉、ゾクゾクしちゃう……<emoji=heart04>」"
translation = "「하아아……♥ 굴복한 회장님의 말투, 전율이 돋아……♥」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「私の足でこうして気持ち良くなっている声も、録音して保存したいくらい<emoji=heart04>\u3000これは癖になっちゃうかも……<emoji=heart04>」"
translation = "「내 발로 이렇게 기분 좋아하고 있는 목소리도 녹음해서 보존하고 싶을 정도♥ 이건 버릇이 될지도 모르겠네……♥」"

[[dialogue]]
speaker = "unk"
original = "ろ、録音！？\u3000勘弁してくれ！"
translation = "녹, 녹음!? 봐달라고!"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え～、どうしよっかな～？\u3000……にひひ♪」"
translation = "「에~, 어쩔까나~? ……니히히♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～♪\u3000スッキリした～！」"
translation = "「음~♪ 개운해졌다~!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あはは、会長は疲れた顔してる～。ごめ～ん、ちょっと調子に乗って、やり過ぎちゃったかな？」"
translation = "「아하하, 회장님은 지친 얼굴이네~. 미안~, 좀 우쭐해서 너무 심하게 했나?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも、今日は助かったよ。私の遊びに付き合ってくれて、ありがとう、会長」"
translation = "「그래도 오늘은 도움이 됐어. 내 놀이에 어울려줘서 고마워, 회장님」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「バカみたいに思われるかもしれないけど、私、定期的に欲求不満を発散しないと、『悪いこと』をしたいっていう発作が起きちゃうんだ」"
translation = "「바보같이 생각할지도 모르지만, 나 정기적으로 욕구불만을 발산하지 않으면 『나쁜 짓』을 하고 싶다는 발작이 일어나거든」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「普段は戦闘で、敵にぶつけてストレス解消してるんだけどね」"
translation = "「평소에는 전투에서 적에게 쏟아부으며 스트레스를 해소하지만 말이야」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうやって自分を管理しておかないと、いつか悪に流されて堕ちてしまうかもしれない――」"
translation = "「그렇게 스스로를 관리해 두지 않으면 언젠가 악에 휩쓸려 타락해 버릴지도 몰라――」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あはっ、な～んてね☆\u3000冗談だよ♪」"
translation = "「아핫, 농담이야☆」"

[[dialogue]]
speaker = "unk"
original = "これからもストレス解消、手伝うよ"
translation = "앞으로도 스트레스 해소, 도와줄게"

[[dialogue]]
speaker = "unk"
original = "でも、約束したからな"
translation = "그래도 약속했으니까 말이야"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……！\u3000もう……会長ってば、そんなこと言うと……」"
translation = "「……! 정말…… 회장님도 참, 그런 말을 하면……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「次はも～っと、過激なことをお願いしちゃうかもよ？」"
translation = "「다음에는 더~욱 과격한 걸 부탁해 버릴지도 몰라?」"

[[dialogue]]
speaker = "unk"
original = "耳元で悪戯っぽく囁くマインの声に、思わずドキッとしてしまう俺なのだった。"
translation = "귓가에서 장난스럽게 속삭이는 마인의 목소리에 나도 모르게 가슴이 두근거리고 마는 나였다."

