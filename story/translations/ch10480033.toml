[[dialogue]]
speaker = "unk"
original = "第３話,竜の甘やかしデー,P"
translation = "제3화, 용의 응석받이 데이"

[[dialogue]]
speaker = "unk"
original = "今日は休日。俺の家にマムが遊びに来ていた。"
translation = "오늘은 휴일. 나의 집에 마무가 놀러 왔다."

[[dialogue]]
speaker = "unk"
original = "そこで俺は、事前に考えていたことを提案する。"
translation = "그곳에서 나는 미리 생각해 두었던 제안을 한다."

[[dialogue]]
speaker = "unk"
original = "今日は『マムを甘やかす』日です！"
translation = "오늘은 『마무를 응석 부리게 하는』 날입니다!"

[[dialogue]]
speaker = "マハムート"
original = "「は？\u3000なによ、いきなり……」"
translation = "「하? 뭐야, 갑자기……」"

[[dialogue]]
speaker = "unk"
original = "――マムはいつも寮長として頑張っている。俺は恋人として、それを労いたい。"
translation = "――마무는 항상 기숙사장으로서 노력하고 있어. 나는 연인으로서 그 노고를 치하하고 싶어."

[[dialogue]]
speaker = "unk"
original = "なので、時々でいいから、気を許して甘えて欲しい……と俺はマムに伝えた。"
translation = "그러니 가끔이라도 좋으니까 마음을 놓고 응석을 부려줬으면 좋겠어…… 라고 나는 마무에게 전했다."

[[dialogue]]
speaker = "マハムート"
original = "「それは、貴方が私とイチャイチャしたいってだけじゃないのかしら？」"
translation = "「그건 당신이 나와 꽁냥거리고 싶을 뿐인 게 아닐까?」"

[[dialogue]]
speaker = "マハムート"
original = "「はぁ……やれやれ、仕方ないわね」"
translation = "「하아…… 이런이런, 어쩔 수 없네.」"

[[dialogue]]
speaker = "マハムート"
original = "「なら――膝枕をお願いしようかしら」"
translation = "「그럼―― 무릎베개를 부탁해 볼까.」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺がマムに膝枕をする――と思っていたのだが。"
translation = "그렇게 내가 마무에게 무릎베개를 해주는―― 것이라고 생각했는데."

[[dialogue]]
speaker = "マハムート"
original = "「～～♪\u3000～～～♪」"
translation = "「～～♪ ～～～♪」"

[[dialogue]]
speaker = "unk"
original = "あの……マム？"
translation = "저기…… 마무?"

[[dialogue]]
speaker = "マハムート"
original = "「なによ、変な顔して」"
translation = "「왜, 이상한 표정을 짓고.」"

[[dialogue]]
speaker = "マハムート"
original = "「――どうして会長が膝枕をするのではなく、<b>される</b>側になっているのかって？」"
translation = "「――어째서 회장이 무릎베개를 해주는 게 아니라, <b>받는</b> 쪽이 되어 있느냐고?」"

[[dialogue]]
speaker = "マハムート"
original = "「だって、この私を甘えさせてくれるんでしょう？\u3000それってつまり、私のお願いを聞いてくれるってことよね？」"
translation = "「그야 이 나를 응석 부리게 해준다고 했잖아? 그건 즉 내 부탁을 들어준다는 뜻이지?」"

[[dialogue]]
speaker = "マハムート"
original = "「だからこうして、私がしたいことをお願いしているのよ」"
translation = "「그러니까 이렇게 내가 하고 싶은 일을 부탁하고 있는 거야.」"

[[dialogue]]
speaker = "マハムート"
original = "「わかったのなら、大人しく畏怖をもって私に膝枕されてなさい」"
translation = "「알았으면 얌전히 경외심을 갖고 내 무릎베개를 받고 있으렴.」"

[[dialogue]]
speaker = "unk"
original = "なんか思っていたのと違ってしまったが、マムがそう望むならと、俺は頷く。"
translation = "왠지 생각했던 것과는 달라졌지만, 마무가 그것을 원한다면 하며 나는 고개를 끄덕인다."

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ……いい子ね。よしよし」"
translation = "「후후…… 착한 아이네. 착하다 착해.」"

[[dialogue]]
speaker = "unk"
original = "マムはそう言って、俺の頭を優しく撫でる。"
translation = "마무는 그렇게 말하며 나의 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker = "マハムート"
original = "「そんな子供みたいな顔して……受け入れて、甘えモードになっちゃったみたいね。大きな子供だこと」"
translation = "「그런 어린아이 같은 얼굴을 하고…… 받아들이고 응석 모드가 되어버린 모양이네. 커다란 애라니까.」"

[[dialogue]]
speaker = "マハムート"
original = "「ほら、なでなで……♪」"
translation = "「자, 쓰담쓰담……♪」"

[[dialogue]]
speaker = "マハムート"
original = "「――そうだ、貴方の好きな『耳かき』をしてあげましょうか」"
translation = "「――맞다, 당신이 좋아하는 『귀 파주기』를 해줄까.」"

[[dialogue]]
speaker = "unk"
original = "鞄の中から、耳かき棒を取り出すマム。"
translation = "가방 안에서 귀이개를 꺼내는 마무."

[[dialogue]]
speaker = "マハムート"
original = "「通販で良いやつを買っておいたのよ。恋人になってから、してあげることが増えたしね」"
translation = "「통신판매로 좋은 걸 사두었거든. 연인이 된 후로 해줄 일이 늘었으니까 말이야.」"

[[dialogue]]
speaker = "マハムート"
original = "「それじゃあ、ゆっくりカキカキするわよ――」"
translation = "「그럼 천천히 파줄 테니까――」"

[[dialogue]]
speaker = "マハムート"
original = "「はい、じっとして～？\u3000……んっ、ふふっ」"
translation = "「자, 가만히 있어~? ……응, 후후.」"

[[dialogue]]
speaker = "マハムート"
original = "「いい顔ね。耳ほじほじされて、気持ちいいのかしら？」"
translation = "「좋은 표정이네. 귀를 파주니까 기분이 좋은 걸까?」"

[[dialogue]]
speaker = "マハムート"
original = "「――上手いのは当たり前よ。この私を誰だと思っているのかしら？」"
translation = "「――잘하는 건 당연하지. 이 내가 누구라고 생각하는 거야?」"

[[dialogue]]
speaker = "マハムート"
original = "（会長の為に、動画でやり方を勉強しておいたお陰だけど、わざわざ教えてあげたりしないわ。ふふっ♪）"
translation = "(회장을 위해서 영상으로 하는 법을 공부해 둔 덕분이지만, 굳이 가르쳐 주지는 않을 거야. 후후♪)"

[[dialogue]]
speaker = "マハムート"
original = "「はい、片方の耳はおしまい。次は反対側よ」"
translation = "「자, 한쪽 귀는 끝. 다음은 반대쪽이야.」"

[[dialogue]]
speaker = "マハムート"
original = "「――ん？\u3000寮生たちにはしてあげないのかって？\u3000ダメよ。そんなことしたら、寮長としての威厳がなくなるじゃない」"
translation = "「――응? 기숙사생들에게는 안 해주냐고? 안 돼. 그런 짓을 하면 기숙사장으로서의 위엄이 없어지잖아.」"

[[dialogue]]
speaker = "マハムート"
original = "「それに、してあげるって言ったところで、貴方以外に喜ぶ子なんていないでしょう？」"
translation = "「게다가 해준다고 한들 당신 말고 기뻐할 애가 있겠어?」"

[[dialogue]]
speaker = "マハムート"
original = "「――むしろ行列ができそう？\u3000ふふっ、何を言ってるんだか」"
translation = "「――오히려 줄을 설 것 같다고? 후후, 무슨 말을 하는 건지.」"

[[dialogue]]
speaker = "マハムート"
original = "「ともかく、私が耳かきしてあげるのは、貴方だけってこと。畏怖をもって感謝なさい」"
translation = "「어쨌든 내가 귀를 파주는 건 당신뿐이라는 것. 경외심을 갖고 감사하렴.」"

[[dialogue]]
speaker = "マハムート"
original = "「よし、耳かきはこれでおしまいよ。それじゃあ、今度は――」"
translation = "「좋아, 귀 파기는 이걸로 끝이야. 그럼 이번에는――」"

[[dialogue]]
speaker = "マハムート"
original = "「貴方のリクエストを聞いてあげるわ。他に、私にして欲しいことはあるかしら？」"
translation = "「당신의 리퀘스트를 들어줄게. 그 밖에 나에게 바라는 게 있니?」"

[[dialogue]]
speaker = "マハムート"
original = "「――ノヴァフォームの衣装でイチャイチャしたい？\u3000やれやれ、贅沢者ね」"
translation = "「――노바 폼 의상으로 꽁냥거리고 싶다고? 이런이런, 욕심쟁이네.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ほら、これでいい？\u3000ふふっ、もう、そんなインコみたいにぶんぶん首を縦に振ったりして……」"
translation = "「자, 이걸로 됐어? 후후, 정말이지 그런 잉꼬처럼 고개를 붕붕 끄덕이기는……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「全く、スケベな子ね……つんつん」"
translation = "「정말이지, 야한 아이네…… 쿡쿡.」"

[[dialogue]]
speaker = "unk"
original = "言いつつも楽しげな表情で、頬っぺたをつんつんして来るマム。"
translation = "말하면서도 즐거운 표정으로 볼을 쿡쿡 찌르는 마무."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「なぁに？\u3000まだして欲しいことがあるの？\u3000言ってごらんなさい」"
translation = "「왜? 아직 하고 싶은 게 더 있어? 말해보렴.」"

[[dialogue]]
speaker = "unk"
original = "マムは俺のどんなところが好きですか？"
translation = "마무는 나의 어떤 점이 좋나요?"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「そんなこと、わざわざ言わせる気？」"
translation = "「그런 걸 굳이 말하게 할 셈이야?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「普段なら言わないけど……今日だけは特別よ」"
translation = "「평소라면 안 하겠지만…… 오늘만은 특별이야.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「……頑張り屋なところ」"
translation = "「……노력가인 점.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「男として強いところ」"
translation = "「남자로서 강한 점.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「あとはそうね……可愛げのあるところ、かしら？」"
translation = "「그리고 그렇네…… 귀여운 구석이 있는 점, 일까?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「貴方が私に甘えてる時の顔……可愛くて好きよ<emoji=heart04>」"
translation = "「당신이 나에게 응석 부릴 때의 얼굴…… 귀여워서 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言われたら、俺は愛おしい気持ちが抑えられなくなってしまって――"
translation = "그런 말을 들으니 나는 사랑스러운 마음을 억누를 수 없게 되어버려서――"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「キスをして欲しいの？\u3000ふふっ、やれやれ、私が許してるからって調子に乗って。仕方ないわね――」"
translation = "「키스를 해줬으면 좋겠어? 후후, 이런이런, 내가 허락한다고 해서 우쭐해지기는. 어쩔 수 없네――」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「畏怖をもって、目を閉じなさい」"
translation = "「경외심을 갖고 눈을 감으렴.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も俺はマムと、たっぷり甘い休日を過ごすのだった――"
translation = "그 후로도 나는 마무와 듬뿍 달콤한 휴일을 보내는 것이었다――"

