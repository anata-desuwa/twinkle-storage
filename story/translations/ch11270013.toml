[[dialogue]]
speaker = "unk"
original = "第３話,ギャンブラー・レティシア,P"
translation = "제3화, 갬블러 레티시아"

[[dialogue]]
speaker = "レティシア"
original = "「……私の趣味？」"
translation = "「……내 취미?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。レティシアちゃんって、休日は何をして過ごしているのか気になって～」"
translation = "「네. 레티시아짱은 휴일에 무엇을 하며 지내는지 궁금해서요~」"

[[dialogue]]
speaker = "レティシア"
original = "「特に何も。戦闘訓練をするか、極星のみんなと過ごすか……何も予定がない時は寝るだけね」"
translation = "「딱히 아무것도. 전투 훈련을 하거나 극성 멤버들과 지내거나…… 아무 예정이 없을 때는 그냥 자는 것뿐이야」"

[[dialogue]]
speaker = "サーシャ"
original = "「やっぱりそうなのね～。だったら今はちょうどいいんじゃないかしら？」"
translation = "「역시 그렇군요~. 그렇다면 지금이 딱 좋지 않을까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「アルタイルにいる間に探してみましょう。レティシアちゃんが夢中になれる趣味♪」"
translation = "「알타이르에 있는 동안 찾아봐요. 레티시아짱이 빠져들 수 있는 취미♪」"

[[dialogue]]
speaker = "レティシア"
original = "「必要ないわ──なんて。以前の私ならそう言っていたけれど……」"
translation = "「필요 없어── 라고. 예전의 나라면 그렇게 말했겠지만……」"

[[dialogue]]
speaker = "レティシア"
original = "「次にルヴィと出会った時。私の言葉次第で、あの子の未来も変わるかも、だなんて言われたら。切り捨てるわけにもいかないわね」"
translation = "「다음에 루비를 만났을 때, 내 말 한마디에 그 아이의 미래도 바뀔지도 모른다는 소리를 들으면 무시할 수도 없겠네」"

[[dialogue]]
speaker = "チナ"
original = "「す、すげえ……ついこの前まで敵対関係だったアルタイル相手に、こんな素直に……レティシア、お前マジで変わったな……！？」"
translation = "「우, 우와…… 얼마 전까지 적대 관계였던 알타이르를 상대로 이렇게 솔직하게…… 레티시아, 너 진짜 변했구나……!?」"

[[dialogue]]
speaker = "グレイス"
original = "「そ、そうですねっ……夢でも見てるみたいです！\u3000サーシャさん、いったいどんな手を……？」"
translation = "「그, 그러게요…… 꿈이라도 꾸는 것 같아요! 사샤 씨, 대체 어떤 수를 쓰신 건가요……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000お姉ちゃんパワーで説得したの～♪」"
translation = "「우후후♪ 언니 파워로 설득했단다~♪」"

[[dialogue]]
speaker = "アナ"
original = "「こうしてお茶の誘いに応じてくれるだけでも、ずいぶんな進歩かと思います。戦いの日々から離れることで、何かが見えてくるかもしれません」"
translation = "「이렇게 차 마시는 권유에 응해주는 것만으로도 장족의 발전이라고 생각해요. 싸움의 나날에서 벗어남으로써 무언가가 보일지도 모릅니다」"

[[dialogue]]
speaker = "レティシア"
original = "「そうは言うけれど、困ったわね」"
translation = "「그렇게 말해도 곤란하네」"

[[dialogue]]
speaker = "レティシア"
original = "「私。趣味どころか、何かへの好奇心もないし……」"
translation = "「나. 취미는커녕 무언가에 대한 호기심도 없고……」"

[[dialogue]]
speaker = "チナ"
original = "「ま。何でもやってみるといいんじゃないか？\u3000物は試しって言うしさ」"
translation = "「뭐. 뭐든 해보면 되는 거 아냐? 밑져야 본전이라고 하잖아」"

[[dialogue]]
speaker = "グレイス"
original = "「う～ん。だったらデネブにはないような場所に遊びに行きますか？\u3000新鮮なところには、新しい発見があるものです！」"
translation = "「으음. 그렇다면 데네브에는 없는 장소에 놀러 가볼까요? 신선한 곳에는 새로운 발견이 있는 법이에요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「面白そうね！\u3000レティシアが絶対行かないような所──そうだ、あそこはどうかしら！？」"
translation = "「재밌겠네! 레티시아가 절대 안 갈 만한 곳── 그래, 거기는 어떨까!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「というわけで、<ruby>九浄家<rt>くじょうけ</rt></ruby>のカジノに来たわよー！」"
translation = "「그리하여, 쿠죠 가문의 카지노에 왔답니다~!」"

[[dialogue]]
speaker = "チナ"
original = "「いや急展開だな！？\u3000てゆーかアタシらって学生だぞ。賭け事なんてしたらダメなんじゃ……」"
translation = "「아니 전개가 너무 급한 거 아냐!? 그보다 우린 학생이라고. 도박 같은 거 하면 안 되는 거 아냐……」"

[[dialogue]]
speaker = "サーシャ"
original = "「そこは大丈夫。ヴィーナスちゃんに口利きしてもらって、今は私たちの貸し切りだから～♪」"
translation = "「그 부분은 괜찮아. 비너스짱이 힘을 써줘서 지금은 우리 전용 대관 상태니까~♪」"

[[dialogue]]
speaker = "アナ"
original = "「レクリエーション用のチップも用意してもらいました。お金を賭けずとも、カジノの雰囲気は楽しめるはずです」"
translation = "「레크리에이션용 칩도 준비했습니다. 돈을 걸지 않아도 카지노 분위기는 즐길 수 있을 거예요」"

[[dialogue]]
speaker = "レティシア"
original = "「せっかくのお膳立てだし、何かやってみようかしら。種目は何でもいいわ」"
translation = "「모처럼 판을 깔아줬으니 뭐라도 해볼까. 종목은 뭐든 상관없어」"

[[dialogue]]
speaker = "unk"
original = "こうしてレティシアは、人生初めてのカジノを楽しむことになったのだが──"
translation = "이렇게 레티시아는 인생 처음으로 카지노를 즐기게 되었는데──"

[[dialogue]]
speaker = "レティシア"
original = "「ふふふ、ちょうど２１。また私の勝ちね？」"
translation = "「후후후, 딱 21. 또 내가 이겼네?」"

[[dialogue]]
speaker = "unk"
original = "チップが山と積み上がってる……！？"
translation = "칩이 산더미처럼 쌓여있어……!?"

[[dialogue]]
speaker = "サーシャ"
original = "「すごいわねえ。押し引きの判断が絶妙だわ……これは隠れた才能なのかも……！」"
translation = "「대단하네. 밀고 당기는 판단이 절묘해…… 이건 숨겨진 재능일지도 몰라……!」"

[[dialogue]]
speaker = "レティシア"
original = "「命のやり取りと構造は一緒ね。流れがあるみたい。それを見つけて掴んだら、あとは離さなければいいだけね」"
translation = "「목숨을 주고받는 구조와 똑같네. 흐름이라는 게 있는 모양이야. 그걸 발견해서 붙잡으면, 그다음엔 놓지 않기만 하면 될 뿐이야」"

[[dialogue]]
speaker = "チナ"
original = "「歴戦のばくち打ちみたいなこと言ってるぞコイツ……！」"
translation = "「역전의 도박사 같은 소리를 하고 있다고 이 녀석……!」"

[[dialogue]]
speaker = "ディーラー"
original = "「お嬢さん、なかなかの腕前ですね。いかがです、ネクストゲーム？」"
translation = "「아가씨, 솜씨가 상당하시군요. 어떻습니까, 다음 게임은?」"

[[dialogue]]
speaker = "レティシア"
original = "「もちろんいくわ。カードをちょうだい？」"
translation = "「물론 계속할게. 카드를 줘」"

[[dialogue]]
speaker = "unk"
original = "何度目かのブラックジャック勝負──またレティシアは絶妙な駆け引きで勝利をものにした。"
translation = "몇 번째인지 모를 블랙잭 승부── 다시 레티시아는 절묘한 수 싸움으로 승리를 거머쥐었다."

[[dialogue]]
speaker = "unk"
original = "負ける時は最小に、勝ち目のある時は厚く張ってしっかりとリターンを得る──お手本のようなゲーム運びで、どんどんチップを得ていく。"
translation = "질 때는 최소한으로, 승산이 있을 때는 두껍게 걸어 확실하게 리턴을 얻는── 교본 같은 게임 운영으로 계속해서 칩을 따낸다."

[[dialogue]]
speaker = "チナ"
original = "「す、すげぇ……！\u3000これ、本当に賭けてたらとんでもない儲けだったんじゃないか！？」"
translation = "「어, 엄청나……! 이거 진짜로 돈을 걸었다면 엄청난 수익 아니었을까!?」"

[[dialogue]]
speaker = "グレイス"
original = "「……ぐすん。貰ったチップ、全部なくなっちゃいました～……」"
translation = "「……훌쩍. 받은 칩, 전부 없어져 버렸어요~……」"

[[dialogue]]
speaker = "チナ"
original = "「んで、こっちは予想通りと。グレイス、お前は学園を卒業しても絶対カジノは行くなよ？」"
translation = "「그리고 이쪽은 예상대로네. 그레이스, 넌 학원 졸업해도 절대 카지노 가지 마라?」"

[[dialogue]]
speaker = "グレイス"
original = "「恐ろしい場所です……でもレティシアは凄いですね！\u3000こんなに勝てるだなんて！」"
translation = "「무서운 곳이에요…… 하지만 레티시아는 대단하네요! 이렇게나 이길 수 있다니!」"

[[dialogue]]
speaker = "グレイス"
original = "「もしも実際に換金出来たら──って、そう考えるだけでも夢が広がりますねっ。レティシア、何でも買い放題ですよ！」"
translation = "「만약 실제로 환전할 수 있다면── 하고 생각만 해도 꿈이 부푸네요. 레티시아, 뭐든 마음껏 살 수 있다고요!」"

[[dialogue]]
speaker = "レティシア"
original = "「そう言われても……特に欲しいもの、ないのよね」"
translation = "「그렇게 말해도…… 딱히 갖고 싶은 게 없는걸」"

[[dialogue]]
speaker = "レティシア"
original = "「参考までに聞かせてくれる？\u3000グレイスだったら何に使うかしら」"
translation = "「참고 삼아 물어봐도 될까? 그레이스라면 어디에 쓸 거야?」"

[[dialogue]]
speaker = "グレイス"
original = "「おいしいものを食べるのに使いますね！\u3000厚切り高級ステーキに、背脂マシマシ豚骨ラーメンっ……毎日食べ放題です！！」"
translation = "「맛있는 걸 먹는 데 쓰겠어요! 두툼한 고급 스테이크에, 돼지비계 듬뿍 넣은 돈코츠 라멘…… 매일 무한 리필이에요!!」"

[[dialogue]]
speaker = "チナ"
original = "「メシ代で使い切れる稼ぎじゃねえんだよな……」"
translation = "「밥값으로 다 쓰기에는 너무 큰 벌이라고 보는데……」"

[[dialogue]]
speaker = "レティシア"
original = "「そういうチナは？」"
translation = "「그런 치나는?」"

[[dialogue]]
speaker = "チナ"
original = "「アタシはゲーム機だな！\u3000スターステーション６！」"
translation = "「난 게임기지! 스타 스테이션 6!」"

[[dialogue]]
speaker = "マトイ"
original = "「──っ！？\u3000アルタイルのスタステは５が最新機っ……どんなゲーム機なのか、気になる……！」"
translation = "「──!? 알타이르의 스타스테는 5가 최신 기종인데…… 어떤 게임기일지 궁금해……!」"

[[dialogue]]
speaker = "チナ"
original = "「ついでにテレビもでっかいやつに新調して、理想的なゲームライフを送るんだ！」"
translation = "「덤으로 TV도 커다란 녀석으로 새로 장만해서 이상적인 게임 라이프를 보내는 거야!」"

[[dialogue]]
speaker = "マトイ"
original = "「でもゲーム機だって、１００台買ってもおつりが来ちゃうような……？」"
translation = "「하지만 게임기라 해도 100대를 사도 거스름돈이 남을 것 같은데……?」"

[[dialogue]]
speaker = "チナ"
original = "「そうなんだよな～……難しいな。大金がどかんと当たっても、どう使うかのイメージ、湧かないかもだ」"
translation = "「그렇긴 하네~…… 어렵네. 거금이 덜컥 당첨돼도 어떻게 쓸지 이미지가 안 떠오를지도」"

[[dialogue]]
speaker = "レティシア"
original = "「みんなでも持て余す額なのね──そうだ。ベアトにも聞いてみましょうか」"
translation = "「다들 감당하기 힘든 액수구나── 그래. 베아트한테도 물어볼까」"

[[dialogue]]
speaker = "ベアトリス"
original = "『レティシアちゃんから通話なんて珍しいね！\u3000どうかしたの？』"
translation = "『레티시아짱이 전화를 다 하다니 별일이네! 무슨 일이야?』"

[[dialogue]]
speaker = "レティシア"
original = "「ベアト。もしも１２００万テルスくらい手元にあったら、何に使いたいかしら？」"
translation = "「베아트. 만약 1200만 텔스 정도 수중에 있다면 어디에 쓰고 싶어?」"

[[dialogue]]
speaker = "ベアトリス"
original = "『いきなりどういうこと！？！？！？』"
translation = "『갑자기 그게 무슨 소리야!?!?!?』"

[[dialogue]]
speaker = "レティシア"
original = "「あ……今、２０００万テルスに増えたわ。困ったわね。欲しいものが思いつかないのに稼ぎばかり大きくなる……」"
translation = "「아…… 지금 2000만 텔스로 늘어났어. 곤란하네. 갖고 싶은 게 생각나지 않는데 수익만 계속 커져서……」"

[[dialogue]]
speaker = "ベアトリス"
original = "『待って待って！？\u3000何だか怖いよ！\u3000銀行強盗でもしてるの！？』"
translation = "『잠깐 잠깐!? 왠지 무서워! 은행 강도라도 하는 거야!?』"

[[dialogue]]
speaker = "アナ"
original = "「失礼します──実は、かくかくしかじか、でして」"
translation = "「실례합니다── 사실은 이러저러한 사정이 있어서요」"

[[dialogue]]
speaker = "ベアトリス"
original = "『あ……そ、そういうこと。レクリエーションなんだね……びっくりしたぁ……』"
translation = "『아…… 그, 그런 거였구나. 레크리에이션이네…… 깜짝 놀랐어……』"

[[dialogue]]
speaker = "ベアトリス"
original = "『私は……旅行、とか？\u3000極星のみんなで、豪華クルーズで世界一周とか、面白そうかも！』"
translation = "『나는…… 여행, 같은 거? 극성 멤버 다 같이 호화 크루즈로 세계 일주 같은 거 재밌을 것 같아!』"

[[dialogue]]
speaker = "レティシア"
original = "「あら──それ、いいわね。とても楽しそう」"
translation = "「어머── 그거 좋네. 아주 즐거울 것 같아」"

[[dialogue]]
speaker = "レティシア"
original = "「となると……５人分の長期の旅費が必要ね。もう少し稼いでおこうかしら？」"
translation = "「그렇게 되면…… 5인분의 장기 여행비가 필요하겠네. 좀 더 벌어둘까?」"

[[dialogue]]
speaker = "ディーラー"
original = "「ネクストゲームですね、お嬢さん？」"
translation = "「다음 게임인가요, 아가씨?」"

[[dialogue]]
speaker = "レティシア"
original = "「ええ。目標が持てると、ゲームも案外楽しいものね」"
translation = "「응. 목표가 생기니 게임도 의외로 즐겁네」"

[[dialogue]]
speaker = "unk"
original = "その後もレティシアは勝ち続け、日も傾いたことでお開きとなった。"
translation = "그 후로도 레티시아는 계속해서 이겼고, 해도 저물어 자리가 마무리되었다."

[[dialogue]]
speaker = "unk"
original = "チナやグレイスと違って、レティシアに分かりやすい物欲はなかったものの──知見が広がる１日となったみたいだ。"
translation = "치나나 그레이스와 달리 레티시아에게 뚜렷한 물욕은 없었지만── 견문이 넓어지는 하루가 된 모양이다."

[[dialogue]]
speaker = "unk"
original = "……しかし。"
translation = "……그러나."

[[dialogue]]
speaker = "ディーラー"
original = "「……実際に客として来られたら、大変だったな。当主様に連絡して、要注意人物リストに入れておくか……」"
translation = "「……실제로 손님으로 오셨다면 큰일 날 뻔했군. 당주님께 연락해서 요주의 인물 리스트에 올려둬야겠어……」"

[[dialogue]]
speaker = "unk"
original = "九浄家のカジノが傾きかけるくらいに勝ちを重ねたレティシアの博才に、カードディーラーは戦慄していたのだった。"
translation = "쿠죠 가문의 카지노가 기우뚱할 정도로 승리를 거듭한 레티시아의 도박운에, 카드 딜러는 전율하고 있었다."

