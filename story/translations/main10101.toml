[[dialogue]]
speaker = "unk"
original = "第１話,想い出のきなこクッキー,B"
translation = "제1화, 추억의 인절미 쿠키, B"

[[dialogue]]
speaker = "unk"
original = "とある日の放課後。"
translation = "어느 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "新星学園星徒会役員の面々は、各々に与えられた事務作業に勤しんでいた。"
translation = "신성학원 성도회 임원들은 각자에게 주어진 사무 작업에 힘쓰고 있었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふぅ……んーっ……！\u3000議事録のまとめ、終わったー……！」"
translation = "「후우…… 으응ー……! 의사록 정리, 끝났다ー……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もこの判子で終わりかな」"
translation = "「나도 이 도장만 찍으면 끝이려나.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、こちらの書類もコンプリートです」"
translation = "「회장님, 이쪽 서류도 컴플리트예요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「こっちの会計処理も終わったわ～。どうしてみんなギリギリになって領収書を出すのかしら～？」"
translation = "「이쪽 회계 처리도 끝났어~. 어째서 다들 아슬아슬해져서야 영수증을 내는 걸까~?」"

[[dialogue]]
speaker = "unk"
original = "一番乗りのマトイを皮切りに、示し合わせたかのように続々と終わらせていく。"
translation = "가장 먼저 끝낸 마토이를 시작으로, 마치 입이라도 맞춘 듯 차례차례 일을 끝마쳐 간다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょうどみんな、ひと段落したみたいね！\u3000お疲れさま！」"
translation = "「마침 다들 한 단락 매듭지은 모양이네! 수고했어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ヴィーナスは何もしてないような」"
translation = "「……비너스는 아무것도 안 한 것 같은데.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなことないわ！\u3000みんなのこと応援してたもの！」"
translation = "「그렇지 않아! 모두를 응원하고 있었는걸!」"

[[dialogue]]
speaker = "unk"
original = "得意顔で胸を張るヴィーナス。"
translation = "득의양양한 얼굴로 가슴을 펴는 비너스."

[[dialogue]]
speaker = "unk"
original = "確かにヴィーナスの応援のおかげで仕事が捗った……かもしれない。"
translation = "확실히 비너스의 응원 덕분에 일이 진척되었을……지도 모른다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「モンスターの出現報告もないし～」"
translation = "「몬스터 출현 보고도 없고~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「奇天烈な部活からの直談判もないですし」"
translation = "「기천대열한 동아리의 직접 협상도 없고요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今日はいつになく平和な１日だね。ちょっと気味が悪いくらい」"
translation = "「오늘은 여느 때 없이 평화로운 하루네. 조금 기분이 이상할 정도로.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、それフラグっぽいよ」"
translation = "「마토이, 그거 플래그 같아.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ、私、やっちゃった？\u3000……大丈夫だよね？」"
translation = "「엣, 나, 저질러 버렸어? ……괜찮겠지?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレムだといいですね」"
translation = "「노 프로블럼이면 좋겠네요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「休憩用のお茶菓子は～っと……あらら？\u3000お菓子のストック、切れてるわね～？」"
translation = "「휴식용 다과는~ 어디 보자…… 어라라? 과자 재고가 다 떨어졌네~?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おかしいですね。人数分のチョコビスケットが残っていたと記憶していますが」"
translation = "「이상하네요. 인원수만큼의 초코 비스킷이 남아 있었다고 기억합니다만.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ、私が食べた後、補充するの忘れてたわ！\u3000ごめーん！」"
translation = "「앗, 내가 먹은 뒤에 보충하는 걸 깜빡했어! 미안!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まったく、ヴィーナスってば……。でも、そんなこともあろうかと──」"
translation = "「정말이지, 비너스도 참……. 하지만, 그럴 줄 알고──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今日は久しぶりにきなこクッキー焼いてきたんだ！」"
translation = "「오늘은 오랜만에 인절미 쿠키 구워 왔어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おぉ……」"
translation = "「오오……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイのきなこクッキー、久しぶりじゃない！」"
translation = "「마토이의 인절미 쿠키, 오랜만이잖아!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「久しぶり？\u3000きなこクッキー？」"
translation = "「오랜만? 인절미 쿠키?」"

[[dialogue]]
speaker = "unk"
original = "俺以外の星徒会メンバーには周知のお菓子らしい。"
translation = "나 이외의 성도회 멤버들에게는 주지의 과자인 모양이다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そういえば、会長は知らないのですね」"
translation = "「그러고 보니 회장님은 모르시는군요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃんの星徒会が発足してすぐ後だったかしら～。マトイちゃんが作ってきてくれたのよ～」"
translation = "「비너스짱의 성도회가 발족하고 바로 뒤였을까~. 마토이짱이 만들어다 주었단다~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「星徒会のみんなにとって、大切な思い出のお菓子なの～」"
translation = "「성도회 모두에게 있어서 소중한 추억의 과자야~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、あの時は……その、ごめんなさい。まだ慣れてなくて、空回りしっぱなしで……」"
translation = "「아, 그때는…… 그, 미안해. 아직 익숙하지 않아서 계속 헛돌기만 해서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレムです。マトイ先輩のおかげで、私たち星徒会の結束は強くなったんですから」"
translation = "「노 프로블럼이에요. 마토이 선배 덕분에 저희 성도회의 결속이 강해진 거니까요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「想い出補正も込みで、マトイ先輩印のきなこクッキー、私は大好きです」"
translation = "「추억 보정도 포함해서, 마토이 선배표 인절미 쿠키, 저는 정말 좋아해요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アナより私の方が好きよ！\u3000そこは譲れないわね！」"
translation = "「아나보다 내가 더 좋아해! 그건 양보 못 하지!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私も大好きよ～。素朴なんだけど、とても美味しいの～」"
translation = "「나도 정말 좋아해~. 소박하지만 무척 맛있단다~」"

[[dialogue]]
speaker = "unk"
original = "満場一致の支持率１００％だ。"
translation = "만장일치의 지지율 100%다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だって、美味しすぎるんだもの！\u3000クロトだって、一口食べたら最後、きなこクッキーの虜よ！」"
translation = "「그야 너무 맛있는걸! 쿠로토도 한 입 먹으면 끝이야, 인절미 쿠키의 포로가 될걸!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ユー・キャント・ストップです」"
translation = "「유 캔트 스톱이에요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「へぇ、そんなに美味しいなら俺も期待しちゃうな」"
translation = "「헤에, 그렇게 맛있다니 나도 기대되는데.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっと、みんな！\u3000あんまりハードル上げないでー！」"
translation = "「잠깐, 얘들아! 너무 하드들 높이지 마ー!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そういえば、クロトが着けてるマントが生まれたのも同じ頃だったわね！」"
translation = "「그러고 보니 쿠로토가 두르고 있는 망토가 태어난 것도 그 무렵이었지!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このマントが？」"
translation = "「이 망토가?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「前にも言ったことあったかしら～？\u3000そのマント、私の手作りなの～」"
translation = "「전에도 말한 적 있었을까~? 그 망토, 내가 직접 만든 거야~」"

[[dialogue]]
speaker = "unk"
original = "素人目でもわかるくらいに高級な生地を使っているし、縫製もしっかりしている。その道のプロかと思うような仕事ぶりだ。"
translation = "비전문가가 봐도 알 수 있을 정도로 고급스러운 원단을 사용했고, 봉제도 튼튼하다. 그 분야의 프로인가 싶을 정도의 솜씨다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「サーシャさん、なんでもできてすごいよね」"
translation = "「사샤 씨, 뭐든 잘해서 대단하네.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩はとてもマルチです。ちなみに、私が和菓子の美味しさに目覚めたのもその頃です」"
translation = "「사샤 선배는 무척 멀티예요. 참고로 제가 화과자의 맛에 눈을 뜬 것도 그 무렵입니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今でこそ副会長はアナだけど、もともとはサーシャさんだったのよ！」"
translation = "「지금이야 부회장은 아나지만, 원래는 사샤 씨였어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうだったわ～。副会長と会計を兼任していた時期もあったわね～」"
translation = "「그랬었지~. 부회장과 회계를 겸임하던 시기도 있었단다~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういえば、俺が会長になる前の新星学園星徒会って、どんな感じだったんだ？」"
translation = "「그러고 보니 내가 회장이 되기 전의 신성학원 성도회는 어떤 느낌이었어?」"

[[dialogue]]
speaker = "unk"
original = "ふと思えば、今に至るまであまり詳しい話を聞いたことがない。きなこクッキーの話も初耳だ。"
translation = "문득 생각해보니, 지금까지 그리 자세한 이야기를 들어본 적이 없다. 인절미 쿠키 이야기도 처음 듣는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それはもう、いろいろあったわ。聞くも涙、語るも涙よ。ヨヨヨ」"
translation = "「그건 이제, 여러 가지 일이 있었지. 들으면 눈물, 말해도 눈물이야. 흑흑흑.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「泣くような話ではないでしょ」"
translation = "「울 정도의 이야기는 아니잖아.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なによー、マトイは顔べしゃべしゃにして泣いてたじゃなーい！」"
translation = "「뭐야ー, 마토이는 얼굴 엉망으로 만들면서 울었으면서ー!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「わー！\u3000わー！\u3000わー！\u3000それは言わないでー！」"
translation = "「와ー! 와ー! 와ー! 그건 말하지 마ー!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんが知らない頃にも、いろんな出来事があったわね～。それが積み重なって、今の星徒会になったのよ～」"
translation = "「회장군이 모르던 시절에도 여러 사건이 있었지~. 그것들이 쌓여서 지금의 성도회가 된 거야~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いい機会だし私たちの昔語り、しちゃいましょっか！」"
translation = "「좋은 기회니까 우리 옛날이야기 좀 해볼까!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お願いするよ。面白いエピソードが飛び出てきそうだ」"
translation = "「부탁할게. 재미있는 에피소드가 튀어나올 것 같네.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「面白い話かはわからないけどね……」"
translation = "「재미있는 이야기일지는 모르겠지만 말이야……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「マトイ先輩、ノープロブレムです。星徒会の皆さんと出会ってからの毎日は、とても愉快で退屈知らずです」"
translation = "「마토이 선배, 노 프로블럼이에요. 성도회 여러분과 만난 뒤로 매일매일이 무척 유쾌하고 지루할 틈이 없으니까요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの、あまり余計なことは言わないで……。思い返すと、結構恥ずかしいことしちゃってるから……」"
translation = "「저기, 너무 쓸데없는 소리는 하지 마……. 다시 생각하면 꽤 부끄러운 짓들을 했으니까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というわけで、新星星徒会むかし話、はじまりはじまりー！」"
translation = "「그런 고로, 신성 성도회 옛날이야기, 시작합니다ー!」"

