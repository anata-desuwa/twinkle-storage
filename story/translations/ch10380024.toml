[[dialogue]]
speaker = "unk"
original = "第４話,親しき仲にも禁欲あり？,P"
translation = "제4화, 친한 사이에도 금욕은 있다?, P"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「よ、夜のビーチも静かでいいですね……？\u3000お散歩するには打ってつけと言いますか……」"
translation = "「바, 밤의 해변도 조용해서 좋네요……? 산책하기에는 딱 좋다고나 할까……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「波打ち際を歩くと少し肌寒いくらいです。制服で来て正解だったかもしれません」"
translation = "「파도가 치는 곳을 걸으면 조금 한기가 느껴질 정도예요. 교복을 입고 오길 잘했을지도 모르겠네요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「でも驚きました……。まさか会長がこんな時間に連絡をくれるなんて……。い、一体どうされたんですか……？」"
translation = "「그렇지만 놀랐어요……. 설마 회장님이 이런 시간에 연락을 주실 줄이야……. 도, 도대체 무슨 일이신가요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いえいえっ、決して迷惑なことは……！\u3000特に何をしていたわけでもありませんので。誘っていただいて嬉しかったですよ？」"
translation = "「아니아니요, 결코 폐가 된다거나 하지는……! 딱히 뭘 하고 있던 것도 아니었으니까요. 불러주셔서 기뻤는걸요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ですが緊張してしまいます……。夜のビーチで２人きり……。て、手まで繋いでくださって……）"
translation = "（하지만 긴장돼요……. 밤의 해변에서 단둘이……. 소, 손까지 잡아주시고……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（これは音に聞く、夜デートというやつなのでは……？\u3000キ、キスとかハグとか色々されちゃったりするやつなのではっ……？）"
translation = "（이것이 말로만 듣던 밤 데이트라는 건가요……? 키, 키스라든가 허그라든가 이것저것 당해버리거나 하는 그런 건가요……?）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（いえいえ会長に限ってそんなこと……！\u3000私から誘うならともかく、会長はそんな即物的な感情で夜中に呼び出すような人じゃありませんよねっ……）"
translation = "（아니아니 회장님이 설마 그런 일을……! 제가 먼저 유혹한다면 모를까, 회장님은 그런 즉물적인 감정으로 한밤중에 불러낼 분이 아니시잖아요……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（……そう思うと、私ってやっぱりいやらしい女の子です。深夜に呼び出されただけでドキドキして……。キスやハグを期待してしまって……）"
translation = "（……그렇게 생각하니, 저 역시 야한 여자애예요. 심야에 불려 나온 것만으로 두근거려서……. 키스나 허그를 기대해버리고……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（エッチなことしか考えられない自分が恥ずかしい……。連絡が来た時も、会長のことを考えて……）"
translation = "（엣지한 생각밖에 못 하는 제 자신이 부끄러워요……. 연락이 왔을 때도, 회장님 생각을 하며……）"

[[dialogue]]
speaker = "unk"
original = "イクシー？"
translation = "익시?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「へっ！？\u3000あっ、えと……！\u3000す、すみません、ボーッとしていて……」"
translation = "「헷!? 앗, 에토……! 죄, 죄송해요, 멍하니 있느라……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「水着戦闘服の使い心地、ですよね……？\u3000お陰様で普段の戦闘服と変わらない程度には扱えるようになりましたよ……？」"
translation = "「수영복 전투복의 사용감, 말이죠……? 덕분에 평소의 전투복과 다름없는 정도로 다룰 수 있게 되었어요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（失敗しました失敗しました失敗しました……！\u3000せっかく会長が話しかけてくださってるのに、私ったらてんで上の空で……！）"
translation = "（실수했어요 실수했어요 실수했어요……! 모처럼 회장님이 말을 걸어주셨는데, 저란 애는 완전히 딴생각이나 하고……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（とにかく気持ちを鎮めなければ……。エッチなことばかり考えていると幻滅されてしまうかもしれません……）"
translation = "（어쨌든 마음을 가라앉혀야 해요……. 엣지한 생각만 하고 있으면 환멸을 느끼실지도 몰라요……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（はぁ……でも会長の横顔、格好いい……唇美味しそう……。この適度に蒸し暑い夜が情欲を掻き立ててきて……）"
translation = "（하아…… 하지만 회장님의 옆모습, 멋있어…… 입술 맛있어 보여……. 이 적당히 후끈한 밤이 정욕을 불러일으켜서……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（って──ダメですダメっ。気を抜いたらすぐにそういうことばかり考えてしまうんですから……！）"
translation = "（아니── 안 돼요 안 돼. 방심하면 금방 그런 생각만 해버리니까……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（うぅ、不思議なものです……。恋人になる前はもっと赤裸々にエッチな自分を曝け出していましたのに、恋人になってからは曝け出すのが恥ずかしくなってしまって……）"
translation = "（우으, 신기한 일이에요……. 연인이 되기 전에는 좀 더 적나라하게 엣지한 제 모습을 드러냈었는데, 연인이 되고 나서는 드러내는 게 부끄러워져서……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（でも我慢しないと……。とにかく今は、会長の声と、繋いだ手のぬくもりと、ふわりと香ってくる匂いと、この夜の雰囲気を脳の海馬に刻みつけて帰って──）"
translation = "（하지만 참아야 해……. 어쨌든 지금은, 회장님의 목소리와, 맞잡은 손의 온기와, 살며시 풍겨오는 냄새와, 이 밤의 분위기를 뇌의 해마에 새기고 돌아가서──）"

[[dialogue]]
speaker = "unk"
original = "そういえば……最近エッチなおねだりしてこないね？"
translation = "그러고 보니…… 요즘은 엣지한 조르기를 안 하네?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「えっ！？\u3000そ、そうですね。私も会長の彼女になって多少の慎みを覚えましたといいますか」"
translation = "「엣!? 그, 그러게요. 저도 회장님의 여자친구가 되어 어느 정도 조신함을 배웠다고나 할까요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「こうして手を繋いで夜のビーチをお散歩しているだけでも幸せです。そういうことをしなくても、とっても満たされちゃってます」"
translation = "「이렇게 손을 잡고 밤의 해변을 산책하는 것만으로도 행복해요. 그런 짓을 하지 않아도, 충분히 채워져 버렸거든요」"

[[dialogue]]
speaker = "unk"
original = "……ならこれは俺のワガママだな"
translation = "……그럼 이건 내 이기심이겠네"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「へ…………？\u3000──ひゃっ！？」"
translation = "「헤…………? ──히얏!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「かかか、会長っ……！？\u3000急にどうし──あっ、んふっ……！\u3000ん゛んんんんっっ～～……！！？」"
translation = "「회회회, 회장님……!? 갑자기 어쩌── 앗, 응훗……! 응으으으으으윽～～……!!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ぷ、ぷはぁ……！\u3000はぁはぁ……こ、こんな強引なキス……」"
translation = "「푸, 푸하아……! 하아 하아…… 이, 이런 강압적인 키스……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「も、もしかして私とイチャイチャしたくて呼び出してくれたんですか……？\u3000こんな夜更けに、あ、明日も会う約束をしていましたのに……」"
translation = "「호, 혹시 저랑 꽁냥거리고 싶어서 불러주신 건가요……? 이런 늦은 밤에, 내, 내일도 만나기로 약속했었는데……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私とキスしたり、抱き締めたりしたくて……？\u3000か、会長が……？」"
translation = "「저랑 키스하거나, 껴안고 싶어서……? 회, 회장님이……?」"

[[dialogue]]
speaker = "unk"
original = "幻滅されちゃったかな……"
translation = "환멸해버렸으려나……"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「い、いえっ、いえいえいえっ！\u3000すごくっ、すごく嬉しいですっ……！」"
translation = "「아, 아니요, 아니아니아니요! 너무나도, 너무나도 기뻐요……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「本当はその、私も、えと、会長とイチャイチャしたくて……。濃厚なキスとか、密着してハグとか、いっぱいして欲しくて……」"
translation = "「사실은 그, 저도, 에토, 회장님이랑 꽁냥거리고 싶어서……. 농후한 키스라든가, 밀착해서 허그라든가, 잔뜩 받고 싶어서……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ふぁ──……んっ<emoji=heart04>\u3000んちゅぁ、れ……れるぅん<emoji=heart04>\u3000んふぅん、んっ……ちゅっ……んんっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아──…… 응<emoji=heart04> 응츄아, 레…… 레루운<emoji=heart04> 응후운, 응…… 츄…… 응으윽……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ぷはぁ……はぁはぁ<emoji=heart04>\u3000し、幸せです……<emoji=heart04>\u3000のぼせてしまいます……<emoji=heart04>」"
translation = "「푸하아…… 하아 하아<emoji=heart04> 해, 행복해요……<emoji=heart04> 정신이 아득해져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "水着になればいいんじゃない？"
translation = "수영복 차림이 되면 되잖아?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「っっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000さっきのお話もそういうことだったんですね……？\u3000私の水着姿が見たくて、唐突に水着戦闘服の使い心地を尋ねてきて……<emoji=heart04>」"
translation = "「윽<emoji=heart04><emoji=heart04><emoji=heart04> 아까 하신 말씀도 그런 뜻이었군요……? 제 수영복 모습이 보고 싶어서, 갑자기 수영복 전투복의 사용감을 물어보시고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そんな遠回しなことしなくても──んっ<emoji=heart04>」"
translation = "「그렇게 빙 돌려서 말하지 않아도── 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ひと言命令してくだされば従いますのに……<emoji=heart04>」"
translation = "「한마디 명령만 하시면 따랐을 텐데……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「えへへ、会長も私に負けないくらいエッチだったんですね。水着になった途端、体温がぐんぐん上がってます」"
translation = "「에헤헤, 회장님도 저 못지않게 엣지하셨네요. 수영복이 되자마자 체온이 쑥쑥 올라가고 있어요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「でも嬉しい……。んっ、ちゅ……<emoji=heart04>\u3000会長が私をエッチな目で見てくださるの、何よりも嬉しいです……<emoji=heart04>」"
translation = "「하지만 기뻐요……. 응, 츄……<emoji=heart04> 회장님이 저를 엣지한 눈으로 봐주시는 거, 무엇보다 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「遠慮なんてしないでください。したいことがあれば、どんなことでもしてくださって構いませんから……」"
translation = "「사양 같은 건 하지 마세요. 하고 싶은 게 있다면, 어떤 것이든 하셔도 상관없으니까요……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「彼氏彼女なんですし……気遣いは無用ですよ？」"
translation = "「남자친구 여자친구 사이잖아요…… 배려는 필요 없어요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「って、あはは……。かくいう私も幻滅されるのが怖くて控えちゃってたんですけど……」"
translation = "「랄까, 아하하……. 정작 저도 환멸당하는 게 무서워서 자제하고 있었지만요……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「でも、今はっきりとわかりました。何も我慢する必要なんてなかったんですね……？」"
translation = "「하지만, 이제 확실히 알았어요. 아무것도 참을 필요 없었던 거네요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「だって、こんなにも幸せなのですから。大好きな恋人に……求められることが」"
translation = "「그야, 이렇게나 행복한걸요. 사랑하는 연인에게…… 원해진다는 것이」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「好き……好きですよ、大好きです<emoji=heart04>\u3000もう私、何も遠慮しません。今まで以上に、えへへ、エッチな自分を曝け出していっちゃいます<emoji=heart04>」"
translation = "「좋아해요…… 좋아해요, 정말 좋아해요<emoji=heart04> 이제 저, 아무것도 사양하지 않겠어요. 지금까지 이상으로, 에헤헤, 엣지한 제 모습을 드러내 갈게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ですから会長もどんどん曝け出しちゃってください。ご存じの通り、私、とってもエッチでいやらしい女の子ですから……」"
translation = "「그러니까 회장님도 마음껏 드러내 주세요. 아시다시피, 저, 아주 엣지하고 야한 여자애니까요……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「他の女の子じゃ引いちゃうようなプレイも……えへへ。喜んで引き受けちゃいますよ<emoji=heart04>」"
translation = "「다른 여자애라면 질려버릴 법한 플레이도…… 에헤헤. 기꺼이 받아들여 버릴게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「では、参りましょうか……<emoji=heart04>\u3000実は、その、ビーチのパトロールをしている時に、人目に付かない一角を見つけたんです……<emoji=heart04>」"
translation = "「그럼, 가실까요……<emoji=heart04> 사실은, 그, 해변 순찰을 할 때, 사람 눈에 띄지 않는 구석진 곳을 찾아냈거든요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そこでならゆっくりイチャイチャできますから……<emoji=heart04>\u3000溜まっていたもの、お互いにぶちまけちゃいましょう……？」"
translation = "「거기서라면 천천히 꽁냥거릴 수 있으니까……<emoji=heart04> 쌓여있던 것들, 서로 쏟아내 버려요……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「時間は、ん……ちゅっ……<emoji=heart04>\u3000たっぷりありますし、ね？」"
translation = "「시간은, 응…… 츄……<emoji=heart04> 듬뿍 있으니까요, 네?」"

