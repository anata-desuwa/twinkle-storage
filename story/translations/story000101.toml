[[dialogue]]
speaker = "unk"
original = "ある日の放課後、俺は新星寮『ラルーナ』の寮長である<ruby>妃竜院<rt>きりゅういん</rt></ruby>マハムート先輩──マムから、『学園対抗杯』の月次報告書の書き方を教わっていた。"
translation = "어느 날 방과 후, 나는 신성료 『라 루나』의 기숙사장인 키류인 마하무트 선배── 마무에게서 『학원 대항배』의 월간 보고서 작성법을 배우고 있었다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……そう、そこに任務管轄係から受け取った、プリマステラの出撃記録を記入して頂戴。モンスターの撃墜スコアは……そう、そっちよ。わかってきたじゃない」"
translation = "「……그래, 거기에 임무 관할계로부터 받은 프리마스텔라의 출격 기록을 기입해 주렴. 몬스터 격추 스코어는…… 그래, 그쪽이야. 이제 좀 알겠나 보네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふぅ……この調子なら、あなたに私の仕事を任せられるようになるのも近いかしら。……あら？」"
translation = "「후우…… 이 기세라면 네게 내 일을 맡길 수 있게 될 날도 머지않겠어. ……어라?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000フニ、ここが流星学園の誇る食事処、大聖堂カフェテリアですわ！」"
translation = "「오ー홋홋홋! 후니, 여기가 유성학원이 자랑하는 식당, 대성당 카페테리아예요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わぁぁ……っ。凄いです、お姉様。学園の施設に、こんなところがあるなんて。都会は本当に、驚くようなことばかりです」"
translation = "「와아아……. 굉장해요, 언니분. 학원 시설에 이런 곳이 있다니. 도시는 정말 놀라운 일들뿐이에요.」"

[[dialogue]]
speaker = "unk"
original = "流星学園の方からやってきたのは、流星寮『イルソーレ』の寮長である<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネ先輩。"
translation = "유성학원 쪽에서 찾아온 사람은 유성 기숙사 『일 소레』의 기숙사장인 센온지 힐디오네 선배."

[[dialogue]]
speaker = "unk"
original = "そして、彼女に連れられているのはつい先日流星学園に転入してきたばかりの１年生、フェニエルことフニだった。"
translation = "그리고 그녀에게 이끌려 온 사람은 얼마 전 유성학원에 갓 전입해 온 1학년, 페니엘 즉 후니였다."

[[dialogue]]
speaker = "unk"
original = "どうやら、イルソーレに入寮したフニは、寮長自ら学園内の施設を案内してもらっているらしい。"
translation = "아무래도 일 소레에 입사한 후니는 기숙사장이 직접 학원 내 시설을 안내받고 있는 모양이다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「大聖堂周辺は流星学園だけではなく、新星学園の生徒も利用するため、一段と広く設計されていますのよ。……あら？」"
translation = "「대성당 주변은 유성학원뿐만 아니라 신성학원 학생들도 이용하기 때문에 한층 더 넓게 설계되어 있답니다. ……어라?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そちらにいらっしゃるのは新星の会長と、それに私の宿命のライバル――妃竜院マハムートではありませんか！」"
translation = "「그곳에 계신 분은 신성의 회장과, 그리고 제 숙명의 라이벌── 키류인 마하무트가 아니신가요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000ごきげんようですわ♪」"
translation = "「오ー홋홋홋! 평안하신가요♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「こんにちは、ヒルディオーネ。相変わらずご機嫌な挨拶ね」"
translation = "「안녕, 힐디오네. 여전히 기운 넘치는 인사네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それと、そちらのお嬢さんは初めましてかしらね？」"
translation = "「그리고 그쪽 아가씨는 처음 보는 얼굴인가?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はひっ！\u3000ご、ごきげんようで、ございますっ。フェ、フェ、フェ、フェニエルと申しますです！」"
translation = "「하, 하힛! 프, 평안하시기를, 빌겠지 말입니다아. 페, 페, 페, 페니엘이라고 하는 것이외다!」"

[[dialogue]]
speaker = "unk"
original = "マムは見た目が怖いけど、見た目だけだから"
translation = "마무는 겉모습이 무서워 보이지만 겉모습뿐이니까"

[[dialogue]]
speaker = "unk"
original = "フニ、落ち着いて"
translation = "후니, 진정해"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちょっと会長？\u3000どういう意味かしら……？」"
translation = "「잠깐 회장? 그게 무슨 의미니……?」"

[[dialogue]]
speaker = "unk"
original = "マムの冷たい視線に震えながらも、この尊敬すべき先輩が誤解されないよう、フニを落ち着けるのだった。"
translation = "마무의 차가운 시선에 떨면서도, 이 존경스러운 선배가 오해받지 않도록 후니를 진정시켰다."

