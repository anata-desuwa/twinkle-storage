[[dialogue]]
speaker = "unk"
original = "その後――"
translation = "그 후──"

[[dialogue]]
speaker = "unk"
original = "新たなフォームに覚醒したトワ先生の活躍により、アステラの攻略に成功。"
translation = "새로운 폼으로 각성한 토와 선생님의 활약으로 아스텔라 공략에 성공."

[[dialogue]]
speaker = "unk"
original = "後にＳランクを超えた脅威として、ＳＳランク認定される新種モンスターの討伐をもって、事態は終息を迎えた――"
translation = "훗날 S랭크를 넘어서는 위협으로서 SS랭크로 인정받는 신종 몬스터의 토벌을 끝으로 사태는 종결을 맞이했다──"

[[dialogue]]
speaker = "メイプル"
original = "「――トワ先生、怪我はもう大丈夫……？」"
translation = "「──토와 선생님, 부상은 이제 괜찮아……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん！\u3000調べてもらったけど、どこも異常ないみたいだよ」"
translation = "「응! 검사해 봤는데 어디도 이상 없는 것 같아」"

[[dialogue]]
speaker = "トワ先生"
original = "「新しいフォームに変身した時のライズ・オーバーブーストで、全快しちゃったみたい。２人の方はどう？」"
translation = "「새로운 폼으로 변신했을 때의 라이즈 오버부스트로 완치된 것 같아. 두 사람은 어때?」"

[[dialogue]]
speaker = "unk"
original = "反動とかは全然ないです"
translation = "반동 같은 건 전혀 없어요"

[[dialogue]]
speaker = "メイプル"
original = "「あたしも！\u3000怪我してた足も治って、ピンピンしてるよ！」"
translation = "「나도! 다쳤던 다리도 나아서 팔팔하다구!」"

[[dialogue]]
speaker = "トワ先生"
original = "「それならよかった。行けるって感覚があって２人に付与したけど、万が一不備があったら問題だしね」"
translation = "「그거 다행이네. 할 수 있다는 느낌이 들어서 두 사람에게 부여했지만, 만약 미비한 점이라도 있으면 문제니까」"

[[dialogue]]
speaker = "メイプル"
original = "「……先生、改めてなんだけど、今回のこと、迷惑をかけてごめんなさい」"
translation = "「……선생님, 새삼스럽지만 이번 일로 폐를 끼쳐서 미안해」"

[[dialogue]]
speaker = "トワ先生"
original = "「ん？\u3000ああ、無事に帰って来れた安心感で忘れちゃってた。そうだったね……でも」"
translation = "「응? 아아, 무사히 돌아왔다는 안도감에 잊고 있었네. 그랬지…… 하지만」"

[[dialogue]]
speaker = "トワ先生"
original = "「メイプルちゃんは、自分の問題点を認めて、反省することができた。だからきっと、これからは大丈夫。そうでしょ？」"
translation = "「메이플짱은 자신의 문제점을 인정하고 반성할 수 있었어. 그러니까 분명 이제부터는 괜찮을 거야. 그렇지?」"

[[dialogue]]
speaker = "メイプル"
original = "「うん。意地になって１人で突っ走るのは、もう止める。だけど、先生……」"
translation = "「응. 고집부리며 혼자 앞서 나가는 건 이제 그만둘래. 하지만 선생님……」"

[[dialogue]]
speaker = "メイプル"
original = "「あたしはその上で、やっぱり魔王を目指したい」"
translation = "「나는 그럼에도 역시 마왕을 목표로 하고 싶어」"

[[dialogue]]
speaker = "unk"
original = "メイプルは俺の方に視線を向けながら、言う。"
translation = "메이플은 나를 향해 시선을 던지며 말한다."

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんみたいな、仲間を信じて一緒に戦う魔王に！」"
translation = "「오빠처럼 동료를 믿고 함께 싸우는 마왕이!」"

[[dialogue]]
speaker = "トワ先生"
original = "「そっか。なら先生も、メイプルちゃんに謝らせて欲しい」"
translation = "「그렇구나. 그럼 선생님도 메이플짱에게 사과하고 싶어」"

[[dialogue]]
speaker = "メイプル"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「――ごめんなさい、メイプルちゃん。先生は、あなたの家庭事情を詳しく知っているわけじゃないのに、家出はよくないと勝手に決めつけてた」"
translation = "「──미안해, 메이플짱. 선생님은 너의 가정 사정을 자세히 아는 것도 아닌데, 가출은 좋지 않다고 멋대로 단정 지었어」"

[[dialogue]]
speaker = "トワ先生"
original = "「あなたがどれだけ本気でここに来たのかを考えずに、大人の責任感だけで諭そうとした」"
translation = "「네가 얼마나 진심으로 여기에 왔는지 생각하지도 않고, 어른의 책임감만으로 타이르려 했어」"

[[dialogue]]
speaker = "トワ先生"
original = "「メイプルちゃんの気持ちと、本気で向き合えていなかった。ごめんなさい」"
translation = "「메이플짱의 마음과 진심으로 마주하지 못했어. 미안해」"

[[dialogue]]
speaker = "トワ先生"
original = "「だから、改めて言わせて欲しい。私は、メイプルちゃんが本気なら、その夢を応援したい」"
translation = "「그러니까 다시 한번 말하게 해줘. 나는 메이플짱이 진심이라면 그 꿈을 응원하고 싶어」"

[[dialogue]]
speaker = "トワ先生"
original = "「今回の新種モンスターの強さからもわかる通り、リクリエがそこまで迫ってきていることはもはや明白」"
translation = "「이번 신종 몬스터의 강함으로도 알 수 있듯이, 리크리에가 코앞까지 다가왔다는 건 이제 명백해」"

[[dialogue]]
speaker = "トワ先生"
original = "「そのことも考えて、次の大交流ではメイプルちゃんのご両親に手紙を送ろうと思う」"
translation = "「그 점도 고려해서 다음 대교류 때는 메이플짱의 부모님께 편지를 보내려고 해」"

[[dialogue]]
speaker = "トワ先生"
original = "「メイプルちゃん本人の希望もあり、学園の星騎士として迎え、共にリクリエと戦うことになりました。そして――」"
translation = "「메이플짱 본인의 희망도 있어 학원의 성기사로 맞이하여 함께 리크리에와 싸우게 되었습니다. 그리고──」"

[[dialogue]]
speaker = "トワ先生"
original = "「彼女の保護者代理として、新星学園教師・有明トワが責任を持って面倒を見ます……ってね♪」"
translation = "「그녀의 보호자 대리로서 신성학원 교사 아리아케 토와가 책임지고 돌보겠습니다…… 라고 말이야♪」"

[[dialogue]]
speaker = "メイプル"
original = "「……！\u3000先生……！」"
translation = "「……! 선생님……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「って感じでどうかな？\u3000会長くん」"
translation = "「이런 느낌인데 어때? 회장군」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら、大歓迎です"
translation = "그렇게 해주신다면 대환영입니다"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃん！\u3000ありがとう！」"
translation = "「오빠! 고마워!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふふっ、じゃあ、メイプルちゃんが学園に転入できるよう、上に掛け合ってみますか♪」"
translation = "「후훗, 그럼 메이플짱이 학원에 편입할 수 있도록 윗선에 교섭해 볼까♪」"

[[dialogue]]
speaker = "メイプル"
original = "「……あ、あの！\u3000先生！」"
translation = "「……저, 저기! 선생님!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker = "メイプル"
original = "「学園に通うようになったら、住む場所が必要だよね……？」"
translation = "「학원에 다니게 되면 살 곳이 필요하겠지……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ああ、そっか！\u3000確かにね。まだ案内してなかったけど、新星学園には寮があって――」"
translation = "「아아, 그렇네! 확실히 그래. 아직 안내는 안 했지만, 신성학원에는 기숙사가 있어서──」"

[[dialogue]]
speaker = "メイプル"
original = "「あたし！\u3000その……！」"
translation = "「나! 그게……!」"

[[dialogue]]
speaker = "メイプル"
original = "「トワ先生が嫌じゃなければなんだけど……今のまま、先生と一緒に住んじゃダメ、かな……？」"
translation = "「토와 선생님이 싫지 않다면 말인데…… 지금처럼 선생님이랑 같이 살면 안 될, 까……?」"

[[dialogue]]
speaker = "メイプル"
original = "「先生と一緒の暮らし……お姉ちゃんができたみたいで、楽しかったから……！」"
translation = "「선생님과의 생활…… 언니가 생긴 것 같아서 즐거웠으니까……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "トワ先生は驚いたように目を丸くして、それから――"
translation = "토와 선생님은 놀란 듯 눈을 동그랗게 뜨더니, 이내──"

[[dialogue]]
speaker = "トワ先生"
original = "「いいよ。メイプルちゃんが気に入ってくれたなら、これからも一緒に住もっか♪」"
translation = "「좋아. 메이플짱이 마음에 들어 했다면 앞으로도 같이 살자♪」"

[[dialogue]]
speaker = "unk"
original = "微笑んで、メイプルの頭をそっと撫でた。"
translation = "미소 지으며 메이플의 머리를 살며시 쓰다듬었다."

[[dialogue]]
speaker = "メイプル"
original = "「うん！\u3000にへへ……♪」"
translation = "「응! 니헤헤……♪」"

[[dialogue]]
speaker = "メイプル"
original = "「改めて、これからもよろしくね。先生！」"
translation = "「새삼스럽지만 앞으로도 잘 부탁해, 선생님!」"

[[dialogue]]
speaker = "unk"
original = "メイプルは心から嬉しそうな笑顔を浮かべるのだった――"
translation = "메이플은 진심으로 기쁜 듯한 미소를 짓는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "後日。"
translation = "며칠 후."

[[dialogue]]
speaker = "unk"
original = "俺が星徒会室で仕事をしていると――"
translation = "내가 성도회실에서 업무를 보고 있자──"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃん♪」"
translation = "「오빠♪」"

[[dialogue]]
speaker = "メイプル"
original = "「じゃ～ん！\u3000おはよう♪」"
translation = "「짜잔! 안녕♪」"

[[dialogue]]
speaker = "unk"
original = "おおっ、制服！\u3000似合ってるな"
translation = "오오, 교복! 잘 어울리네"

[[dialogue]]
speaker = "メイプル"
original = "「にへへ♪\u3000ありがとう♪」"
translation = "「니헤헤♪ 고마워♪」"

[[dialogue]]
speaker = "メイプル"
original = "「実は正式に新星学園への転入が決まって、制服が完成したから、見せたくなっちゃって♪」"
translation = "「사실 정식으로 신성학원 편입이 결정돼서 교복이 완성됐길래 보여주고 싶었거든♪」"

[[dialogue]]
speaker = "メイプル"
original = "「あとは、お兄ちゃんに伝えたいこともあってね」"
translation = "「그리고 오빠한테 전하고 싶은 말도 있고 말이야」"

[[dialogue]]
speaker = "unk"
original = "伝えたいこと……？"
translation = "전하고 싶은 말……?"

[[dialogue]]
speaker = "unk"
original = "すると、メイプルは眼帯を付けて――"
translation = "그러자 메이플은 안대를 착용하고──"

[[dialogue]]
speaker = "メイプル"
original = "「我からお兄ちゃんに、改めて宣言する！」"
translation = "「짐이 오빠에게 다시 한번 선언하노라!」"

[[dialogue]]
speaker = "メイプル"
original = "「先日の戦闘……アルケインコードの発動、実に見事であった！」"
translation = "「지난 전투…… 아르케인 코드의 발동, 참으로 훌륭하였다!」"

[[dialogue]]
speaker = "メイプル"
original = "「故に我、メイプル・モノクラウンは、お兄ちゃんを今代の魔王として認める！」"
translation = "「고로 짐, 메이플 모노크라운은 오빠를 당대의 마왕으로 인정하노라!」"

[[dialogue]]
speaker = "メイプル"
original = "「だが、我が信じる魔王とは、血を引くか否かではなく、その在り方を示し、世界を救う者！」"
translation = "「허나 짐이 믿는 마왕이란 혈통의 유무가 아니라, 그 존재 방식을 보이고 세계를 구하는 자!」"

[[dialogue]]
speaker = "メイプル"
original = "「故に、魔王は必ずしも１人である必要はない！」"
translation = "「고로 마왕은 반드시 한 명일 필요는 없다!」"

[[dialogue]]
speaker = "メイプル"
original = "「我は魔王になる夢を諦めたりしない！\u3000すなわち――」"
translation = "「짐은 마왕이 되는 꿈을 포기하지 않을 것이다! 즉──」"

[[dialogue]]
speaker = "メイプル"
original = "「我は今日より『魔王の妹』となることを、ここに宣言する！」"
translation = "「짐은 오늘부터 『마왕의 여동생』이 될 것을 여기서 선언하노라!」"

[[dialogue]]
speaker = "unk"
original = "え、えっと……つまり……？"
translation = "에, 그러니까…… 즉……?"

[[dialogue]]
speaker = "メイプル"
original = "「ふっふっふ……すなわち『兄妹魔王』の契りを結び、共に魔王道を歩むということだ！」"
translation = "「훗훗훗…… 즉 『남매 마왕』의 계약을 맺고 함께 마왕도를 걷겠다는 뜻이다!」"

[[dialogue]]
speaker = "メイプル"
original = "「というわけで――」"
translation = "「그런 고로──」"

[[dialogue]]
speaker = "メイプル"
original = "「一緒に頑張って行こうね、お兄ちゃん♪」"
translation = "「함께 힘내서 나아가자, 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "自称・魔王の妹は、そう言って元気に笑ってみせるのだった――"
translation = "자칭 마왕의 여동생은 그렇게 말하며 활기차게 웃어 보였다──"

