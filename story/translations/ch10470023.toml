[[dialogue]]
speaker = "unk"
original = "第３話,裏オークションの目玉商品,P"
translation = "제3화, 암시장 경매의 핵심 상품, P"

[[dialogue]]
speaker = "unk"
original = "深夜の繁華街──俺はセナリィが運営する秘密結社『ゴールデングース』から依頼を受け、違法オークション会場の摘発を手伝うことになった。"
translation = "심야의 번화가── 나는 세나리가 운영하는 비밀 결사 『골든 구스』로부터 의뢰를 받아, 불법 경매장 적발을 돕게 되었다."

[[dialogue]]
speaker = "セナリィ"
original = "「会長様、今夜はサポート感謝いたしますわ。腕利きの星騎士がどうしても必要でしたの」"
translation = "「회장님, 오늘 밤은 서포트 감사합니다. 실력 있는 성기사가 꼭 필요했습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「なんでも今回のオークション、相当珍しいブツが出品されるらしく。裏世界のコレクターたちが勢ぞろいしているようですわ」"
translation = "「듣기로 이번 경매에 상당히 희귀한 물건이 출품된다고 하여, 뒷세계의 컬렉터들이 총집합한 모양입니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「隠密でのミッションですから、少数精鋭が基本──腕の立つ星騎士をもう１人お願いしていたのですが……」"
translation = "「은밀 미션인 만큼 소수 정예가 기본── 실력 있는 성기사를 한 명 더 부탁했습니다만……」"

[[dialogue]]
speaker = "メルエル"
original = "「はいっ！\u3000姫咲メルエル、準備ＯＫだよ！」"
translation = "「네! 히메사키 멜레르, 준비 OK야!」"

[[dialogue]]
speaker = "セナリィ"
original = "「まさかボランティア部の姫咲さんを連れてくるとは思いませんでしたわ！？\u3000ハイキングと勘違いしていまして！？」"
translation = "「설마 자원봉사부의 히메사키 씨를 데려오실 줄은 몰랐습니다!? 하이킹이라도 가는 걸로 착각하신 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "でもメルエルは優秀なプリマステラだよ"
translation = "하지만 멜레르는 우수한 프리마스텔라야"

[[dialogue]]
speaker = "unk"
original = "どうしても他の人の都合がつかなくて……"
translation = "아무래도 다른 사람들과 시간이 안 맞아서……"

[[dialogue]]
speaker = "セナリィ"
original = "「確かに姫咲さんの戦闘力は、<ruby>私<rt>わたくし</rt></ruby>も認めるところではありますが……ゴールデングースの人員補充、真剣に考えなくてはなりませんわね……」"
translation = "「확실히 히메사키 씨의 전투력은 저도 인정하는 바입니다만…… 골든 구스의 인원 보충, 진지하게 고민해봐야겠군요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「──こほん。それではそこの小窓から、オークション会場をのぞき見しますわよ。覚悟はよろしくて？」"
translation = "「──코흠. 그럼 저기 작은 창문으로 경매장을 엿보도록 하죠. 각오는 되셨나요?」"

[[dialogue]]
speaker = "メルエル"
original = "「う、うんっ……大丈夫……！」"
translation = "「으, 응…… 괜찮아……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふ。あなたのような表の世界で過ごすお方には、ショッキングな光景かもしれませんが……」"
translation = "「후후. 당신 같은 양지의 세계에서 지내시는 분께는 충격적인 광경일지도 모르겠습니다만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「魔王である会長様のフィアンセを名乗るならば、アンダーグラウンドな世界を経験することも重要でしょう。気を引き締めてくださいまし？」"
translation = "「마왕인 회장님의 약혼녀를 자처한다면 언더그라운드 세계를 경험하는 것도 중요하겠죠. 정신 바짝 차리시겠어요?」"

[[dialogue]]
speaker = "メルエル"
original = "「はいっ！\u3000会長くんのお手伝いだもん、全力で取り組むよ……！」"
translation = "「응! 회장군을 돕는 일인걸, 전력을 다할게……!」"

[[dialogue]]
speaker = "unk"
original = "こうして俺たち３人は違法オークション会場を観察し、隙を探すことになった。"
translation = "이렇게 우리 세 사람은 불법 경매장을 관찰하며 틈을 엿보기로 했다."

[[dialogue]]
speaker = "unk"
original = "異様な熱気の中、魔界からの盗品や天界の貴重な書物など、そうそうたる物品が競り落とされていく。"
translation = "이상한 열기 속에서 마계의 장물이나 천계의 귀중한 서적 등 쟁쟁한 물품들이 낙찰되어 간다."

[[dialogue]]
speaker = "メルエル"
original = "「セナリィさん、いつ取り押さえに行くの？」"
translation = "「세나리 씨, 언제 잡으러 가?」"

[[dialogue]]
speaker = "セナリィ"
original = "「お待ちなさいな。まだ警備の数と装備を把握しきれていませんの。万全を期すのがプロフェッショナルでしてよ？」"
translation = "「기다리세요. 아직 경비의 수와 장비를 다 파악하지 못했습니다. 만전을 기하는 것이 프로페셔널이니까요.」"

[[dialogue]]
speaker = "メルエル"
original = "「でも、明らかにどこかから盗んだ美術品なんかもあるし。見すごしてるみたいで落ち着かなくって……」"
translation = "「하지만 분명 어디선가 훔친 미술품 같은 것도 있고. 못 본 척하고 있는 것 같아서 마음이 안 놓여서……」"

[[dialogue]]
speaker = "セナリィ"
original = "「競り落とした人物の顔は確認しています。万が一取り逃しても、後で捕まえれば問題ありませんわ」"
translation = "「낙찰받은 인물의 얼굴은 확인했습니다. 만에 하나 놓치더라도 나중에 잡으면 문제없습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「あ──会場の熱気が高まっていますわ。今夜の目玉が登場のようですわね」"
translation = "「아── 회장의 열기가 고조되고 있군요. 오늘 밤의 핵심 상품이 등장할 모양입니다.」"

[[dialogue]]
speaker = "司会"
original = "「さぁお待ちかね。次なる品物は、１枚の写真にございます」"
translation = "「자, 오래 기다리셨습니다. 다음 물건은 사진 한 장입니다.」"

[[dialogue]]
speaker = "司会"
original = "「複製はなし。競り落とされた方にはデータも進呈いたしますので、紛うことなく世界でたった１枚のブロマイド」"
translation = "「복제는 없습니다. 낙찰받으신 분께는 데이터도 증정하므로, 틀림없는 세계에 단 한 장뿐인 브로마이드.」"

[[dialogue]]
speaker = "司会"
original = "「電撃のように登場し、即日に引退した伝説のユニットアイドル──アーネスト、姫咲メルエル嬢の写真です！」"
translation = "「번개처럼 등장하여 당일에 은퇴한 전설의 유닛 아이돌── 어니스트, 히메사키 멜레르 양의 사진입니다!」"

[[dialogue]]
speaker = "unk"
original = "なんだって！？"
translation = "뭐라고!?"

[[dialogue]]
speaker = "メルエル"
original = "「えぇええぇっ！？\u3000なななっ、なんで私の写真が！？」"
translation = "「에에에에엑!? 머머머, 왜 내 사진이!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「新星学園内でのライブでしたし、開催も突発でしたから。所属事務所も映像データは持っておりません」"
translation = "「신성학원 내에서의 라이브였고 개최도 돌발적이었으니까요. 소속사도 영상 데이터는 가지고 있지 않습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「それに今をときめくトップアイドル、愛戸レミカが見出した逸材──そんな理由から注目されているのでしょう」"
translation = "「게다가 지금 잘나가는 톱 아이돌, 아이도 레미카가 찾아낸 일재── 그런 이유로 주목받고 있는 거겠죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「しかし警戒の厳重な学園内でこっそりと撮影したものが出回るとは……やはり裏オークション。後ろ暗いツテを持っているようですわね！」"
translation = "「하지만 경계가 삼엄한 학원 내에서 몰래 촬영한 것이 돌아다니다니…… 역시 암시장 경매. 구린 인맥을 가지고 있는 모양이군요!」"

[[dialogue]]
speaker = "司会"
original = "「さぁさぁ、ご入札を──！」"
translation = "「자자, 입찰을──!」"

[[dialogue]]
speaker = "参加者１"
original = "「１千万テルス！」"
translation = "「1천만 테루스!」"

[[dialogue]]
speaker = "参加者２"
original = "「１千５百万テルスだ！」"
translation = "「1천5백만 테루스다!」"

[[dialogue]]
speaker = "メルエル"
original = "「どどど、どうなってるの！？\u3000理解が追い付かないよっ……どうして私なんかの写真にそんな値段を！？\u3000お金は粗末にしちゃダメなんだよ……！」"
translation = "「어어어, 어떻게 된 거야!? 이해가 안 가…… 왜 나 같은 애 사진에 그런 가격을!? 돈은 아껴 써야 하는 거라고……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「即決価格は１億テルス……確かに入手難易度の高いものではありますが、そんな金額を払うなど正気の沙汰では──」"
translation = "「즉시 구매가는 1억 테루스…… 확실히 입수 난이도가 높은 물건이긴 합니다만, 그런 금액을 지불하다니 제정신이──」"

[[dialogue]]
speaker = "unk"
original = "１億テルス──即決だ！！"
translation = "1억 테루스── 즉시 구매다!!"

[[dialogue]]
speaker = "unk"
original = "メルエルは誰にも渡さない！！"
translation = "멜레르는 아무에게도 안 줘!!"

[[dialogue]]
speaker = "セナリィ"
original = "「どうして参加していますのーーー！？」"
translation = "「왜 참가하고 계신 건가요───!?」"

[[dialogue]]
speaker = "参加者１"
original = "「な、なんだっ！？\u3000男が窓から飛び込んできたぞ！！」"
translation = "「뭐, 뭐야!? 남자가 창문으로 뛰어 들어왔다!!」"

[[dialogue]]
speaker = "参加者２"
original = "「１億だと！？\u3000いくら貴重だからって写真１枚にめちゃくちゃやりやがる……！」"
translation = "「1억이라고!? 아무리 귀하다지만 사진 한 장에 무지막지하게 구는구먼……!」"

[[dialogue]]
speaker = "参加者１"
original = "「アイドルオタクか！？\u3000クレイジーな野郎だぜ！！」"
translation = "「아이돌 오타쿠인가!? 미친 녀석이군!!」"

[[dialogue]]
speaker = "参加者２"
original = "「──って、あいつ見たことあるぞ！？\u3000たしか新星学園の会長──くそっ、ガサ入れか！！」"
translation = "「──랄까, 저 녀석 본 적 있어!? 분명 신성학원의 회장── 젠장, 현장 급습인가!!」"

[[dialogue]]
speaker = "unk"
original = "しまった、体が勝手に……！"
translation = "아차, 몸이 멋대로……!"

[[dialogue]]
speaker = "セナリィ"
original = "「ばれちまってはしょうがありませんわね！\u3000作戦変更、制圧しますわよ！\u3000姫咲さん、サポートを──」"
translation = "「들켜버렸으니 어쩔 수 없군요! 작전 변경, 제압합니다! 히메사키 씨, 서포트를──」"

[[dialogue]]
speaker = "メルエル"
original = "「会長くんが……だ、誰にも渡さないって……え、えへへへぇ～っ<emoji=heart04>」"
translation = "「회장군이…… 아, 아무에게도 안 준다고…… 에, 에헤헤헤헤~<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ぼけっとしないでくださいましーっ！！」"
translation = "「멍하니 있지 마세요──!!」"

[[dialogue]]
speaker = "unk"
original = "なんとか裏オークションを摘発した翌日──"
translation = "어떻게든 암시장 경매를 적발한 다음 날──"

[[dialogue]]
speaker = "メルエル"
original = "「──でねでね！\u3000会長くんがね！\u3000『メルエルは誰にも渡さない！』って飛び出して行ってね……！」"
translation = "「──그래서 말이야! 회장군이! 『멜레르는 아무에게도 안 줘!』라면서 뛰어 나가서……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねぇレミカ。今朝からこの話、何度目かしら……？」"
translation = "「저기 레미카. 오늘 아침부터 이 이야기, 몇 번째니……?」"

[[dialogue]]
speaker = "レミカ"
original = "「よっぽど嬉しかったんでしょ。浸らせてあげなよ」"
translation = "「엄청 기뻤나 보지. 푹 빠져 있게 둬.」"

[[dialogue]]
speaker = "メルエル"
original = "「もうあの時のこと思い出すだけでっ……はうぅうっ<emoji=heart04>\u3000メルトしちゃうよぉ～っ……！」"
translation = "「정말 그때 생각만 해도…… 하으으으<emoji=heart04> 멜트 되어버려어~……!」"

[[dialogue]]
speaker = "unk"
original = "俺がセナリィにこってりと絞られた今回の件は、のちに『新星星徒会長１億テルス事件』として有名になってしまうのだが……"
translation = "내가 세나리에게 호되게 혼난 이번 건은 훗날 『신성 성도회장 1억 테루스 사건』으로 유명해지게 되지만……"

[[dialogue]]
speaker = "unk"
original = "メルエルのアイドル写真とデータを無事に押収できたため、彼氏としては胸をなでおろすことができたのだった──"
translation = "멜레르의 아이돌 사진과 데이터를 무사히 압수할 수 있었기에, 남자친구로서는 가슴을 쓸어내릴 수 있었다──"

