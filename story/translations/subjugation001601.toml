[[dialogue]]
speaker = "unk"
original = "ハロウィンを前日に控えたある日のこと。"
translation = "할로윈을 하루 앞둔 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "いつも通り星徒会室で仕事をしていると、サランがヒトリを連れてやってきた。"
translation = "여느 때처럼 성도회실에서 일을 하고 있자니, 사란이 히토리를 데리고 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "あれ、この組み合わせは珍しいね？"
translation = "어라, 이 조합은 드문데?"

[[dialogue]]
speaker = "サラン"
original = "「最近仲良くなったばっかりだから、会長ちゃんがそう思うのも無理ないかも～」"
translation = "「최근에 막 친해졌으니까, 회장짱이 그렇게 생각하는 것도 무리는 아닐지도~」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はい……少し前にヘレナさんに呼ばれて、九浄家のお屋敷に行った時にお会いしまして……」"
translation = "「네, 네…… 조금 전에 헬레나 씨가 부르셔서, 쿠죠 가문의 저택에 갔을 때 뵈어서……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker = "サラン"
original = "「ヒトリちゃんとはずっとお話ししてみたかったから、とってもいい機会だったんだ～♪」"
translation = "「히토리짱이랑은 계속 이야기해보고 싶었으니까, 정말 좋은 기회였어~♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「す、すみません……わたしが人見知りなばっかりにご迷惑を……」"
translation = "「죄, 죄송해요…… 제가 낯을 가리는 바람에 폐를……」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000全然謝るようなことじゃないよ……？\u3000お話できて、サランも嬉しかったから♪」"
translation = "「뽀요? 전혀 사과할 일이 아닌걸……? 이야기할 수 있어서 사란도 기뻤으니까♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わ、わたしも嬉しいんですけど……やっぱりまだ緊張してしまって……」"
translation = "「저, 저도 기쁘긴 합니다만…… 역시 아직 긴장이 돼서……」"

[[dialogue]]
speaker = "サラン"
original = "「これが『奥ゆかしい』ってことなのかな？\u3000そういうところも、ヒトリちゃんの魅力だよ～！\u3000ね、会長ちゃん？」"
translation = "「이게 『조신하다』는 걸까나? 그런 점도 히토리짱의 매력이야~! 그치, 회장짱?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そうだなって……か、会長さんまで……」"
translation = "「그렇구나 하고…… 힉, 회장님까지……」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんまで……は、恥ずかしいですぅ」"
translation = "「유짱까지…… 부, 부끄러워요오」"

[[dialogue]]
speaker = "unk"
original = "今のやり取りだけでも仲の良さは伝わったよ"
translation = "방금 대화만으로도 사이좋은 건 전해졌어"

[[dialogue]]
speaker = "サラン"
original = "「でしょでしょ～！」"
translation = "「그치그치~!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「……えっと、その前に……サランさん、今日来たのは……」"
translation = "「……저기, 그 전에…… 사란 씨, 오늘 온 건……」"

[[dialogue]]
speaker = "サラン"
original = "「そうだった～！\u3000今日はサランたちが仲良くなったことを伝えるのも目的だったんだけど～、実は見せたいものがあるの～♪」"
translation = "「맞다 맞다~! 오늘은 사란들이 친해진 걸 전하는 것도 목적이었지만~, 사실 보여주고 싶은 게 있어~♪」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃん、もうそろそろ『例のあの日』がやってくるでしょう？」"
translation = "「회장짱, 이제 슬슬 『그날』이 다가오잖아?」"

[[dialogue]]
speaker = "サラン"
original = "「大正解～！\u3000もうすぐハロウィンだよね～♪」"
translation = "「정답~! 곧 할로윈이지~♪」"

[[dialogue]]
speaker = "サラン"
original = "「ヘレナちゃんがそれに合わせて新しい戦闘服を完成させたって聞いて、サランもつい見てみたくなっちゃって～」"
translation = "「헬레나짱이 그에 맞춰서 새로운 전투복을 완성했다고 들어서, 사란도 그만 보고 싶어지는 바람에~」"

[[dialogue]]
speaker = "ヒトリ"
original = "「その新しいハロウィンフォームの使い手として選ばれたのが、わたしでして……」"
translation = "「그 새로운 할로윈 폼의 사용자로서 선택받은 게, 저라서……」"

[[dialogue]]
speaker = "サラン"
original = "「すっごい可愛いかったよ～？\u3000会長ちゃんも見てみたいよねっ」"
translation = "「엄청 귀여웠다구~? 회장짱도 보고 싶지」"

[[dialogue]]
speaker = "ヒトリ"
original = "「さ、さささ、サランさん！？\u3000ハードルを上げないでくださぁい……！」"
translation = "「사, 사사사, 사란 씨!? 기대치를 높이지 말아 주세요오……!」"

[[dialogue]]
speaker = "サラン"
original = "「どうどう、会長ちゃん？\u3000興味あるでしょう？」"
translation = "「어때 어때, 회장짱? 관심 있지?」"

[[dialogue]]
speaker = "unk"
original = "そりゃ興味あるけど"
translation = "그야 관심 있지만"

[[dialogue]]
speaker = "サラン"
original = "「ほら、会長ちゃんも見たいって言ってるから！」"
translation = "「봐봐, 회장짱도 보고 싶대!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わ、わかりましたぁ。変でも、笑わないでくださいね……？」"
translation = "「아, 알겠습니다아. 이상해도 웃지 말아 주세요……?」"

[[dialogue]]
speaker = "サラン"
original = "「絶対変じゃないから、安心してほしいな～」"
translation = "「절대 안 이상하니까, 안심했으면 좋겠어~」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ヘレナさんやサランさんの時は女の子だったので……男の人に見せるとなると、やっぱり恥ずかしくって……」"
translation = "「헬레나 씨나 사란 씨 때는 여자들이라 괜찮았는데…… 남자분께 보여드리려니 역시 부끄러워서……」"

[[dialogue]]
speaker = "サラン"
original = "「とっても似合ってるから。自信持っていっちゃお～♪」"
translation = "「정말 잘 어울리니까. 자신 있게 가보자구~♪」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、ははは、はい……！\u3000じゃあ、いきますね？」"
translation = "「네, 네네네, 네……! 그럼, 갑니다?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「へ、へんしーん……！」"
translation = "「버, 변시인……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ど、どうでしょうか？」"
translation = "「어, 어떤가요?」"

[[dialogue]]
speaker = "unk"
original = "すごく似合っていて可愛い！"
translation = "정말 잘 어울리고 귀여워!"

[[dialogue]]
speaker = "ヒトリ"
original = "「え、えへへ……嬉しいです♪\u3000着こなせるように頑張りました……」"
translation = "「에, 에헤헤…… 기뻐요♪ 잘 어울릴 수 있도록 노력했어요……」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～♪\u3000サランもついでに変身しちゃった<emoji=heart04>\u3000デザインも可愛くて気に入ってるんだ～<emoji=heart04>」"
translation = "「에헤헤~♪ 사란도 덤으로 변신해버렸어<emoji=heart04> 디자인도 귀여워서 마음에 들어~<emoji=heart04>」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんも褒めてくれるの？\u3000そんなぁ、みなさん褒めすぎですよぉ……えへへ、えへへへ♪」"
translation = "「유짱도 칭찬해주는 거야? 아이 참, 다들 너무 칭찬하시네요오…… 에헤헤, 에헤헤헤♪」"

[[dialogue]]
speaker = "サラン"
original = "「サランも相変わらず似合ってるって？\u3000んも～、会長ちゃん、褒めるの上手～<emoji=heart04>」"
translation = "「사란도 여전히 잘 어울린다고? 정말~, 회장짱 칭찬도 잘해~<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ま、また話がずれちゃいましたね……今日の本題は、また別にあるんです」"
translation = "「또, 또 이야기가 샜네요…… 오늘 본론은 따로 있어요」"

[[dialogue]]
speaker = "サラン"
original = "「そうそう、衣装以外にも見せたいものがあってね～？」"
translation = "「그래그래, 의상 말고도 보여주고 싶은 게 있거든~?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ヘレナさんが言うには、わたしが変身したことでハロウィンパワーが高まったらしく……１日早くハロウィンゲートが開いちゃったとかで……」"
translation = "「헬레나 씨 말씀으로는, 제가 변신하면서 할로윈 파워가 높아졌다고 해서…… 하루 일찍 할로윈 게이트가 열려버렸다나 봐요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「こんなこと初めてだから、その原因を探るために、ジャックさんを召喚したわたしが調査メンバーに抜擢されまして……あの、会長さんに伝わってますか？」"
translation = "「이런 일은 처음이라, 원인을 찾기 위해 잭 씨를 소환했던 제가 조사 멤버로 발탁되었는데…… 저기, 회장님께 전달이 됐나요?」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000会長ちゃんの頭の上にクエスチョンマークがいっぱいだ～……」"
translation = "「뽀요? 회장짱 머리 위에 물음표가 가득해~……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「す、すすす、すみません……わたしの説明が下手だったから……」"
translation = "「죄, 죄죄죄죄, 죄송해요…… 제 설명이 서툴러서……」"

[[dialogue]]
speaker = "サラン"
original = "「大丈夫～。サランもヘレナちゃんから聞いた時は、最初はよくわからなかったもん」"
translation = "「괜찮아~. 사란도 헬레나짱한테 들었을 땐 처음엔 잘 몰랐는걸」"

[[dialogue]]
speaker = "ヒトリ"
original = "「説明するよりもこの棺桶を見てもらった方が早いかもしれません……ちょっと待っててくださいね……」"
translation = "「설명하는 것보다 이 관을 보시는 게 빠를지도 모르겠네요…… 잠시만 기다려 주세요……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「んしょっと……この棺桶、カボチャ色になってますよね？\u3000これがハロウィンパワーが高まってる証拠で……」"
translation = "「영차…… 이 관, 호박색으로 변해 있죠? 이게 할로윈 파워가 높아지고 있다는 증거라서……」"

[[dialogue]]
speaker = "サラン"
original = "「ヒトリちゃんが変身してからずっとこのまま……というより、日に日に色が濃くなってるみたいで、星騎士の武器の色が変わるなんて変でしょ～？」"
translation = "「히토리짱이 변신하고 나서 계속 이 상태……라기보다 날마다 색이 짙어지는 것 같아서, 성기사의 무기 색이 변하다니 이상하지~?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「は、はい……前回のハロウィンでジャックさんを召喚した時とはちょっと違ってたから……最初に開けた時は、驚いてしまって……」"
translation = "「네, 네…… 지난 할로윈에 잭 씨를 소환했을 때와는 조금 달라서…… 처음 열었을 때는 깜짝 놀라고 말았어요……」"

[[dialogue]]
speaker = "サラン"
original = "「ホントにいきなり出てくるから、会長ちゃんも気をつけてね～」"
translation = "「정말 갑자기 튀어나오니까, 회장짱도 조심해~」"

[[dialogue]]
speaker = "ヒトリ"
original = "「それじゃあ、開けちゃいますね？\u3000ゆーちゃん、お願い！」"
translation = "「그럼, 열어볼게요? 유짱, 부탁해!」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ほら、出てきて、ジャクリーヌさん！」"
translation = "「자, 나와주세요, 자클린 씨!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ひゃんっ！？」"
translation = "「햔!?」"

[[dialogue]]
speaker = "？？？"
original = "「トリックオアトリート♪\u3000お菓子よこすゆ♪」"
translation = "「트릭 오어 트릿♪ 과자 내놓으라는유♪」"

[[dialogue]]
speaker = "unk"
original = "棺桶を開けた瞬間、いきなりそんなことを言いながら、中から女の子が飛び出してきたのだった。"
translation = "관을 여는 순간, 갑자기 그런 말을 하며 안에서 여자아이가 튀어나온 것이었다."

