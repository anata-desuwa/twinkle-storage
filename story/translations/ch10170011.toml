[[dialogue]]
speaker = "unk"
original = "第１話,鬼料理人はギャップ少女,P"
translation = "제1화, 귀신 요리사는 갭 소녀, P"

[[dialogue]]
speaker = "unk"
original = "ある日。サーシャさんから元星徒会メンバーで紹介したい子がいると言われ、昼休みに大聖堂カフェテリアへ呼び出されたのだが──"
translation = "어느 날. 사샤 씨로부터 전 성도회 멤버로 소개하고 싶은 아이가 있다는 말을 듣고, 점심시간에 대성당 카페테리아로 호출되었는데──"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「じーっ……」"
translation = "「지이이……」"

[[dialogue]]
speaker = "unk"
original = "（な、なんか凄く見られてる……！）"
translation = "(왠, 왠지 엄청나게 쳐다보고 있어……!)"

[[dialogue]]
speaker = "unk"
original = "先程から物影に半身を隠している彼女だが、視線と背中の大剣の圧が凄くて、全然隠れられていない。"
translation = "조금 전부터 물건 뒤에 반신을 숨기고 있는 그녀지만, 시선과 등에 멘 대검의 압박이 대단해서, 전혀 숨겨지지 않고 있다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長く～ん、おまたせ～」"
translation = "「회장구~운, 오래 기다렸지~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……って、あら？\u3000どうかした？」"
translation = "「……어라? 무슨 일이야?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ああ、なるほど～。会長くんのことが気になって、ずっと様子をうかがってたのね～」"
translation = "「아아, 그렇구나~. 회장군이 신경 쓰여서, 계속 기회를 엿보고 있었네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「蛍火ちゃん～？\u3000ちゃんと紹介するから、こちらにいらっしゃい」"
translation = "「호타루비짱~? 제대로 소개할 테니까, 이쪽으로 오렴.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「……はい。サーシャ先輩」"
translation = "「……네. 사샤 선배.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くん、こちらが紹介したかった子で、２年生の蛍火ちゃん。去年まで星徒会で書記を務めていたの～」"
translation = "「회장군, 이쪽이 소개하고 싶었던 아이로, 2학년인 호타루비짱. 작년까지 성도회에서 서기를 맡았었어~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「……ご紹介にあずかりました、東雲蛍火と申します。今は給食委員会に所属しています」"
translation = "「……소개받은, 시노노메 호타루비라고 합니다. 지금은 급식위원회에 소속되어 있습니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「昨年度末、サーシャ先輩から推薦を頂きまして、それからはカフェテリアで料理人を務めさせて頂いております……」"
translation = "「지난 학년말, 사샤 선배로부터 추천을 받아, 그때부터 카페테리아에서 요리사를 맡고 있습니다……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「蛍火ちゃんは料理も凄いけど、星騎士としても強いのよ～。実力は私より上♪\u3000ヴィーナスちゃんにも匹敵する、学園最強クラスといっても過言じゃないわ」"
translation = "「호타루비짱은 요리도 대단하지만, 성기사로서도 강하단다~. 실력은 나보다 위♪ 비너스짱에게도 필적하는, 학원 최강 클래스라고 해도 과언이 아니야.」"

[[dialogue]]
speaker = "unk"
original = "それって滅茶苦茶強くないですか！？"
translation = "그거 엄청나게 강한 거 아닌가요!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから、会長くんには是非紹介しておきたかったの～。星徒会メンバーだけで対処出来ない事態が発生した時に頼れる、強力な助っ人としてね」"
translation = "「그래서, 회장군에게는 꼭 소개해 두고 싶었어~. 성도회 멤버들만으로는 대처할 수 없는 사태가 발생했을 때 의지할 수 있는, 강력한 조력자로서 말이야.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「そこまで期待されても困りますが……私は料理人です。まあ、以後お見知りおきを……」"
translation = "「그렇게까지 기대하셔도 곤란합니다만…… 저는 요리사입니다. 뭐, 앞으로 잘 부탁드립니다……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ♪\u3000……会長くん、ここまでで蛍火ちゃんのこと、ちょっと怖そうな子だなって思ったでしょ？」"
translation = "「후훗♪ ……회장군, 여기까지 보고 호타루비짱이 조금 무서운 아이구나라고 생각했지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、これが実は違ったりするのよね～。は～い、蛍火ちゃん、こちょこちょこちょ～」"
translation = "「하지만, 이게 사실은 다르단다~. 자아, 호타루비짱, 간질간질~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「あっ……サーシャ先輩なにを！？\u3000……ふふっ……あはっ……あはははっ！\u3000や、やめっ……脇腹は苦手なので！\u3000あははははっ！\u3000許し、許して下さいぃ！」"
translation = "「앗…… 사샤 선배 무엇을!? ……후훗…… 아핫…… 아하하하핫! 그, 그만…… 옆구리는 약하니까! 아하하하하핫! 용서, 용서해 주세요오!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どう？\u3000少しリラックスできた？」"
translation = "「어때? 조금 릴랙스 됐니?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「は、はい……多分……。ええと、その……申し訳ありませんでした、会長。私、昔から凄く緊張しいで……会長とお話しするのが、初めてでしたので」"
translation = "「네, 네…… 아마도요. 저기, 그…… 죄송했습니다, 회장. 저, 예전부터 엄청나게 긴장을 잘해서…… 회장과 이야기하는 것이, 처음이었기에.」"

[[dialogue]]
speaker = "unk"
original = "（ふ、雰囲気が変わった……！？）"
translation = "(부, 분위기가 바뀌었어……!?)"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「それで、よろしければなのですが……お近付きの印に、私が作った料理を食べて頂きたいなと思っておりましてっ」"
translation = "「그래서, 괜찮으시다면 말입니다만…… 친해진 증표로, 제가 만든 요리를 드셔보셨으면 해서요옷.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「事前に昼食はカフェテリアで召し上がると伺っていましたので、会長がいらっしゃる前から準備していたんです。えっと……お持ちしますので是非っ」"
translation = "「사전에 점심은 카페테리아에서 드신다고 들었기에, 회장이 오시기 전부터 준비하고 있었습니다. 저기…… 가져올 테니 부디잇.」"

[[dialogue]]
speaker = "unk"
original = "蛍火が作ってくれたという唐揚げ定食を頂くことになった。しばらく無言の食事が続いていたのだが──"
translation = "호타루비가 만들어 주었다는 가라아게 정식을 먹게 되었다. 한동안 무언의 식사가 이어졌는데──"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「その……いかがでしょう？\u3000会長のお口に合いますでしょうか？」"
translation = "「그…… 어떠신가요? 회장의 입맛에 맞으실까요?」"

[[dialogue]]
speaker = "unk"
original = "……めっっっっっちゃくちゃ美味いっ！！！"
translation = "……어어어어엄청나게 맛있어!!!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でしょ～！\u3000蛍火ちゃんの料理は、食べると星力が回復すると言われているくらい絶品なの♪\u3000だからこそ、両学園の食を支えるカフェテリアの料理人に推薦したのよ」"
translation = "「그렇지~! 호타루비짱의 요리는, 먹으면 성력이 회복된다고 할 정도로 일품이야♪ 그래서 양 학원의 식사를 책임지는 카페테리아의 요리사로 추천한 거란다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「たかだか料理が美味しいくらいで、そんな騒がないで下さい。大げさな……」"
translation = "「고작 요리가 맛있는 정도로, 그렇게 소란 피우지 마세요. 과장되게……」"

[[dialogue]]
speaker = "unk"
original = "あれ！？\u3000褒めちゃまずかった！？"
translation = "어라!? 칭찬하면 안 됐나!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ。違うのよ、会長くん。これは照れてまた緊張モードになっちゃっただけだから。翻訳すると、そんな美味しいと騒がれると恥ずかしくなっちゃいます、ってこと♪」"
translation = "「후훗. 아니야, 회장군. 이건 수줍어서 다시 긴장 모드가 되어버린 것뿐이니까. 번역하자면, 그렇게 맛있다고 소란을 피우니 부끄러워져 버려요, 라는 뜻♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「……どうやら、勘違いをさせるようなことを言ってしまったようですね。我ながら不甲斐ない……」"
translation = "「……아무래도, 오해를 살 만한 말을 해버린 모양이군요. 나 자신이 한심하다……」"

[[dialogue]]
speaker = "unk"
original = "これはもう、二重人格なのでは……？"
translation = "이건 뭐, 이중인격 아닌가……?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、二重人格ではないのよ～」"
translation = "「후훗, 이중인격은 아니란다~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ええ、二重人格ではありません。ただちょっと、顔が強張ってしまうだけです」"
translation = "「네, 이중인격은 아닙니다. 그냥 좀, 얼굴이 굳어버릴 뿐입니다.」"

[[dialogue]]
speaker = "unk"
original = "いや、そもそも性格違くない！？"
translation = "아니, 애초에 성격이 다르잖아!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……まあまあ、そんな些細なことはともかく。実は、会長くんに蛍火ちゃんを紹介したのは、もう一つ理由があってね」"
translation = "「……뭐뭐, 그런 사소한 건 제쳐두고. 사실, 회장군에게 호타루비짱을 소개한 건, 또 다른 이유가 있어서야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんはほら、物怖じしない性格でしょう？\u3000だから、蛍火ちゃんのことも、誤解しないで接してくれるって思ったの」"
translation = "「회장군은 봐봐, 주눅 들지 않는 성격이잖아? 그래서, 호타루비짱에 대해서도, 오해하지 않고 대해줄 거라고 생각했어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「一度仲良くなれば、緊張しなくなっていくはずだから、よければ友達になってあげてくれないかしら？」"
translation = "「한번 친해지면, 긴장하지 않게 될 테니까, 괜찮다면 친구가 되어주지 않겠니?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「……会長。嫌なら別に、断って下さって構わな──」"
translation = "「……회장. 싫다면 별로, 거절하셔도 상관없――」"

[[dialogue]]
speaker = "unk"
original = "なんだ、そんなことか。もちろんＯＫだよ"
translation = "뭐야, 그런 거였나. 물론 OK야."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ふぅぅ……そうですよね。私と友達になど……えっ？」"
translation = "「후우…… 그렇겠죠. 저와 친구 같은 건…… 엣?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ～♪\u3000会長くんならそう言ってくれると思ってたわ～」"
translation = "「우후후~♪ 회장군이라면 그렇게 말해줄 줄 알았어~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「いいのですか？\u3000私と……本当に？」"
translation = "「괜찮은 건가요? 저와…… 정말로?」"

[[dialogue]]
speaker = "unk"
original = "今日からよろしく頼むよ、蛍火"
translation = "오늘부터 잘 부탁해, 호타루비."

[[dialogue]]
speaker = "unk"
original = "ああ、友達になろう。"
translation = "아아, 친구가 되자."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「下の名前で、しかも呼び捨て？\u3000いくらなんでも、いきなり馴れ馴れし過ぎでは……」"
translation = "「이름으로, 그것도 말을 놓고? 아무리 그래도, 갑자기 너무 스스럼없는 것 아닌지……」"

[[dialogue]]
speaker = "unk"
original = "素っ気ない言葉でも構わず、握手を求めて、手を差し出す。"
translation = "무뚝뚝한 말에도 아랑곳하지 않고, 악수를 청하며 손을 내민다."

[[dialogue]]
speaker = "unk"
original = "蛍火はしばらく視線を泳がせていたが──"
translation = "호타루비는 한동안 시선을 헤매고 있었지만──"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「そ、その……よろしくお願いします……！」"
translation = "「그, 그…… 잘 부탁드립니다……!」"

[[dialogue]]
speaker = "unk"
original = "震える手で握手に応じると、初めて嬉しそうな笑顔を見せるのだった。"
translation = "떨리는 손으로 악수에 응하며, 처음으로 기쁜 듯한 미소를 보여주는 것이었다."

