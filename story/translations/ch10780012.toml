[[dialogue]]
speaker = "unk"
original = "第２話,義体を作ってもらおう,P"
translation = "제2화, 의체를 만들어 받자"

[[dialogue]]
speaker = "アナ"
original = "「霊体となって再誕した、先代光の魔女様……！」"
translation = "「영체가 되어 재탄한 선대 빛의 마녀님……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「最初は何を言ってるのかと思ったけれど、会長くんに紹介されて『ここにいるからよく見て』って言われたら見えるようになったわ～」"
translation = "「처음엔 무슨 말을 하는 건가 싶었지만, 회장 군이 소개하며 '여기 있으니까 잘 봐'라고 하니까 보이게 됐네~」"

[[dialogue]]
speaker = "アナ"
original = "「不思議なこともあるものですが、光栄です。３０００年前のリクリエ撃退の際、魔王ラクシスとまみえた伝説の存在とお話ができるだなんて」"
translation = "「신기한 일도 다 있네요. 하지만 영광입니다. 3000년 전 리크리에 격퇴 당시, 마왕 라크시스와 만났던 전설적인 존재와 대화할 수 있다니.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「そう畏まらないでください。私がラクシス様とお会いしたのはリクリエ終息後です。彼の仲間……クルセイダースとして戦ったことはありません」"
translation = "「그렇게 어려워하지 마세요. 제가 라크시스 님과 만난 건 리크리에 종식 후입니다. 그의 동료…… 크루세이더즈로서 싸운 적은 없어요.」"

[[dialogue]]
speaker = "アナ"
original = "「それでもトリュファイナ様は、表立ってはいませんがご活躍をされていたと記録されています」"
translation = "「그래도 트리파이나 님은 겉으로 드러나진 않았지만 활약하셨다고 기록되어 있습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「名こそ残されていませんが、再生の奇蹟を用いる魔女様に救われた……という神話のような話は各所に残っていますよ」"
translation = "「이름은 남겨져 있지 않지만, 재생의 기적을 부리는 마녀님께 구원받았다……는 신화 같은 이야기가 곳곳에 남아 있어요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「魔界も同じね。魔女様のおとぎ話は、レゾフにも伝わっているわ～」"
translation = "「마계도 마찬가지야. 마녀님의 동화는 레조프에도 전해지고 있어~」"

[[dialogue]]
speaker = "アナ"
original = "「この場を借りてお礼を申し上げます。かつて学術都市ウルの前身となった国。そこを襲ったリクリエ災害を救っていただけたのもあなた様だと……」"
translation = "「이 자리를 빌려 감사의 말씀을 드립니다. 과거 학술도시 울의 전신이 된 나라. 그곳을 덮친 리크리에 재해를 구해주신 것도 당신이라고……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ああ、懐かしいですね。身元を隠して来訪したことがあります。その時のお話でしょうか？」"
translation = "「아아, 그립네요. 신분을 숨기고 방문한 적이 있습니다. 그때의 이야기일까요?」"

[[dialogue]]
speaker = "アナ"
original = "「人命だけでなく、崩落した建物全てを再生し、砕かれた古文書も直していただけたと。お陰でウルは文化的衰退を免れました」"
translation = "「인명뿐만 아니라 붕괴된 건물 전부를 재생하고, 부서진 고문서도 고쳐주셨다고. 덕분에 울은 문화적 쇠퇴를 면했습니다.」"

[[dialogue]]
speaker = "unk"
original = "すごいね、トリュファイナさん"
translation = "대단하네, 트리파이나 씨."

[[dialogue]]
speaker = "トリュファイナ"
original = "「待ってください！\u3000私、そんなことはしておりませんが……！？」"
translation = "「잠깐만요! 저 그런 일은 하지 않았는데요……!?」"

[[dialogue]]
speaker = "アナ"
original = "「まさか。ウルで育った者ならば子供でも知っています」"
translation = "「설마요. 울에서 자란 사람이라면 어린아이라도 알고 있습니다.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「私の力は命ある者の再生です、無機物まではとても……！\u3000ほ、他の魔女の御業ではないでしょうか？」"
translation = "「제 힘은 생명이 있는 자의 재생입니다, 무기물까지는 도저히……! 저, 다른 마녀의 소행 아닐까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「レゾフにも言い伝えがあるわよ？\u3000大いなる冬の折、産気づいた母親の出産に立ちあって今際の際の赤ちゃんの命を救った……」"
translation = "「레조프에도 전해 내려오는 이야기가 있어. 위대한 겨울 때 산기가 있는 어머니의 출산에 입회해서 임종 직전인 아기의 생명을 구했다는……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ああ、レゾフ。また懐かしい名前です。そちらにも一度赴いたことが──」"
translation = "「아아, 레조프. 또 그리운 이름이네요. 그쪽에도 한 번 간 적이──」"

[[dialogue]]
speaker = "サーシャ"
original = "「その後、襲い来る魔獣を手懐けて使役して、暴れ狂う黒龍を素手で一撃のもとに粉砕したとか～♪」"
translation = "「그 후 습격해오는 마수를 길들여 사역하고, 날뛰는 흑룡을 맨손으로 일격에 분쇄했다던가~♪」"

[[dialogue]]
speaker = "unk"
original = "すごいね、トリュファイナさん"
translation = "대단하네, 트리파이나 씨."

[[dialogue]]
speaker = "トリュファイナ"
original = "「待ってください！！\u3000どこまで尾ひれが広がっているのですか！？」"
translation = "「잠깐만요!! 도대체 어디까지 소문이 부풀려진 건가요!?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「私は再生！\u3000治癒の魔法使いです……！\u3000龍を屠るなど、それこそラクシス様の功績でしょう！\u3000どうしてこんなことに……！？」"
translation = "「저는 재생! 치유 마법사라고요……! 용을 잡다니, 그야말로 라크시스 님의 공적이겠죠! 어째서 이렇게 된 건가요……!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「尾ひれがたくさんついちゃうくらい、すごい人ってことね～。ふふふ」"
translation = "「소문이 잔뜩 붙을 만큼 대단한 사람이라는 거네~. 후후후.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……お話ができるのは嬉しいですが、不安になってまいりました、私……」"
translation = "「……대화할 수 있는 건 기쁘지만, 불안해지기 시작했어요, 저……」"

[[dialogue]]
speaker = "アナ"
original = "「ぜひお茶を飲んで一服してほしいですが、トリュファイナ様は……」"
translation = "「부디 차를 마시며 쉬었으면 좋겠지만, 트리파이나 님은……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「はい。この身は今、霊体です。魔王様にだけは限定的に触れられるようなのですが……ほら」"
translation = "「네. 이 몸은 지금 영체입니다. 마왕님께만은 한정적으로 닿을 수 있는 것 같습니다만…… 보세요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ……カップを指が透けちゃうのね……」"
translation = "「아…… 컵을 손가락이 통과해 버리네……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「お気持ちだけ頂戴しておきます。みなさんとお茶をできないのは寂しいですが……」"
translation = "「마음만 감사히 받겠습니다. 여러분과 차를 함께할 수 없는 건 외롭지만……」"

[[dialogue]]
speaker = "アナ"
original = "「いえ、大丈夫です。体がないなら作ればいいだけ。会長のことですし、もう助っ人は呼んでありますよね？」"
translation = "「아뇨, 괜찮습니다. 몸이 없다면 만들면 될 뿐. 회장답게 벌써 도우미는 불러두셨죠?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「助っ人……？」"
translation = "「도우미……?」"

[[dialogue]]
speaker = "アニマ"
original = "「フフ。話は聞かせてもらっタ！\u3000何だか面白い事態になってるみたいじゃないカ？」"
translation = "「후후. 이야기는 들었따! 왠지 재미있는 상황이 된 것 같지 안나?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「こ、この御方は……？」"
translation = "「이, 이분은……?」"

[[dialogue]]
speaker = "unk"
original = "学園きっての錬金術師です"
translation = "학원 최고의 연금술사예요."

[[dialogue]]
speaker = "アニマ"
original = "「ふぅ～ム……お、見えるようになってきたゾ。星徒会長に触れると視認が可能になる霊体の魔女……実に興味深イ！」"
translation = "「흐으~음…… 오, 보이기 시작했따. 성도회장에게 닿으면 시인 가능해지는 영체 마녀…… 실로 흥미롭군!」"

[[dialogue]]
speaker = "アニマ"
original = "「任せロ。守護天使と理屈は同じダ。霊体が依り代となれる義体を用意してやろウ！」"
translation = "「맡겨둬라. 수호천사와 이치는 같따. 영체가 매개체가 될 수 있는 의체를 준비해주지!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「え……そのようなことが可能なのですか！？」"
translation = "「엣…… 그런 것이 가능한가요!?」"

[[dialogue]]
speaker = "アニマ"
original = "「錬金術師に不可能はなイ。それに他ならぬ会長の頼みダ、最優先で事にあたらせてもらうヨ？」"
translation = "「연금술사에게 불가능은 없따. 게다가 다른 누구도 아닌 회장의 부탁이니 최우선으로 처리해주지.」"

[[dialogue]]
speaker = "アニマ"
original = "「しかし再生と浄化の魔女……懸念点もあるガ……ま、何事も実験だナ。しばらく時間をくれたまえヨ？」"
translation = "「하지만 재생과 정화의 마녀…… 우려되는 점도 있찌만…… 뭐, 모든 건 실험이따. 잠시 시간을 주게나.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あ……行ってしまいました。けれどそんな、霊体の依り代となる義体なんて、そうそう簡単には──」"
translation = "「아…… 가버리셨네요. 하지만 그런 영체의 매개체가 될 의체라니 그렇게 쉽게는──」"

[[dialogue]]
speaker = "unk"
original = "──翌日。"
translation = "──다음 날."

[[dialogue]]
speaker = "アニマ"
original = "「出来たゾ！」"
translation = "「됐따!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「早すぎませんか！？」"
translation = "「너무 빠르지 않나요!?」"

[[dialogue]]
speaker = "アニマ"
original = "「なーニ、義体を用意するまでは簡単なコト。問題はこの後……ここに入れるかナ、魔女のキミ？」"
translation = "「뭐어, 의체를 준비하는 것까지는 간단한 일. 문제는 이 다음…… 여기에 들어올 수 있겠나, 마녀 양?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「義体に身体を重ねるようにして……ん、んんっ……？\u3000うぅ……、上手く、入ることがっ、できません……！？」"
translation = "「의체에 몸을 겹치듯이…… 응, 응응……? 으으…… 잘 들어가는 것이 안 돼요……!?」"

[[dialogue]]
speaker = "アニマ"
original = "「ふぅム、やはりナ。彼女の持つ再生の魔力の影響かナ？\u3000義体を異物として弾いているのかもしれなイ。これは厄介だゾ……改良が必要ダ」"
translation = "「흐음, 역시군. 그녀가 가진 재생 마력의 영향인가? 의체를 이물질로 튕겨내고 있는 걸지도 모르겠군. 이건 까다롭겠따…… 개량이 필요해.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ありがとうございます。私のために……」"
translation = "「감사합니다. 저를 위해서……」"

[[dialogue]]
speaker = "アニマ"
original = "「困難は新たな閃きの元だ！\u3000フヒヒ、ますますキミに興味がわいてきたヨ？」"
translation = "「곤란함은 새로운 번뜩임의 원천이다! 후히히, 점점 너에게 흥미가 생기는군!」"

[[dialogue]]
speaker = "unk"
original = "それからというもの……"
translation = "그로부터……"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふぅむむむぅ～っ……！\u3000んぅむむむぅ～っ！\u3000だ、だめです、弾かれてしまい、ますーっ……！」"
translation = "「후으으으으~읏……! 응으으으으~읏! 안, 안 돼요, 튕겨 나가버려요오~읏……!」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナさんはアニマ先輩の実験室で、義体に入ることを試みるのが日課となった。"
translation = "트리파이나 씨는 아니마 선배의 실험실에서 의체에 들어가는 것을 시도하는 것이 일과가 되었다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「うぅうう～っ、入れませ～んっ……！！」"
translation = "「으으으으~읏, 못 들어가요오~옷……!!」"

[[dialogue]]
speaker = "unk"
original = "義体完成までの道のりは、まだまだ遠そうなのだった──"
translation = "의체 완성까지의 길은 아직 멀어 보이는 것이었다──"

