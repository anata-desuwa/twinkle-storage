[[dialogue]]
speaker = "unk"
original = "第４話,ポラリスの再会,B"
translation = "제4화, 폴라리스의 재회"

[[dialogue]]
speaker = "ルヴィネ"
original = "「みんな。久しぶりね」"
translation = "「모두들. 오랜만이네요.」"

[[dialogue]]
speaker = "unk"
original = "戦闘服に変身すらせずに、ルヴィネは友人たちに語りかける。"
translation = "전투복으로 변신조차 하지 않은 채 루비네는 친구들에게 말을 건다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「チナ。よく無事でいてくれたわね。あなたではなく、緋宮クロトたちがデネブに来た時は驚いたわ」"
translation = "「치나. 무사해서 다행이에요. 당신이 아니라 히노미야 쿠로토 일행이 데네브에 왔을 때는 놀랐답니다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「『チナは無事だ』と聞いていたけれど……やっぱりこの目で見るまでは不安だったから。元気そうで何より」"
translation = "「『치나는 무사하다』고 듣긴 했지만…… 역시 이 눈으로 보기 전까지는 불안했으니까요. 건강해 보여서 다행이에요.」"

[[dialogue]]
speaker = "チナ"
original = "「…………何、言ってんだよ。ルヴィ」"
translation = "「…………무슨 소릴 하는 거야, 루비.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「グレイス、レティシア。天界襲撃は失敗したみたいね」"
translation = "「그레이스, 레티시아. 천계 습격은 실패한 모양이네요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「転送装置を使って戻ってこないから……あの日から今日まで、ずっと眠りが浅かった」"
translation = "「전송 장치를 써서 돌아오지 않으니까…… 그날부터 오늘까지 계속 잠을 설쳤어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あなたたちがただ捕まっているだけなのか、それとも命を落としてしまったのか、わからなかったから……」"
translation = "「당신들이 그저 잡혀 있는 것뿐인지, 아니면 목숨을 잃어버린 건지 알 수 없었으니까요……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「安心したわ。２人とも、元気そうね」"
translation = "「안심했어요. 둘 다 건강해 보이네요.」"

[[dialogue]]
speaker = "レティシア"
original = "「…………ルヴィ」"
translation = "「…………루비.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ベアトとは、デネブで一度会って以来ね……」"
translation = "「베아토와는 데네브에서 한 번 만난 이후로군요……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「もう５人で集まれることはないと思ってた。だからこうして会えて……本当に嬉しいわ」"
translation = "「이제 다섯 명이서 모일 일은 없을 거라 생각했어요. 그래서 이렇게 만나서…… 정말 기뻐요.」"

[[dialogue]]
speaker = "グレイス"
original = "「──やめてくださいルヴィ！\u3000私たちは……真実を確かめに来たんです！」"
translation = "「──그만하세요, 루비! 저희는…… 진실을 확인하러 온 거예요!」"

[[dialogue]]
speaker = "グレイス"
original = "「天界襲撃の日から今日まで……いろんなことがあって！\u3000いろんな話を聞いて……混乱してるんです！！」"
translation = "「천계 습격 날부터 오늘까지…… 여러 일이 있었고! 여러 이야기를 들어서…… 혼란스럽단 말이에요!!」"

[[dialogue]]
speaker = "グレイス"
original = "「リクリエモンスターと極星従騎が今、一緒になって地上を攻撃しています……どうしてですか！？」"
translation = "「리크리에 몬스터와 극성종기가 지금 함께 지상을 공격하고 있어요…… 어째서인가요!?」"

[[dialogue]]
speaker = "グレイス"
original = "「ルヴィの口から聞きたいんです、真実を！\u3000あなたはいったい──」"
translation = "「루비의 입으로 듣고 싶어요, 진실을! 당신은 대체──」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──<b>そうよ</b>」"
translation = "「──**맞아요**」"

[[dialogue]]
speaker = "レティシア"
original = "「……そうよ、って。どういう意味なの、ルヴィ？」"
translation = "「……맞다니. 그게 무슨 의미야, 루비?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私は女神テルルの遣いの天使ではない。そしてデネブを守る救世主でもない──という意味よ。レティシア」"
translation = "「저는 여신 테루루의 사자인 천사가 아니에요. 그리고 데네브를 지키는 구세주도 아니라는── 의미예요, 레티시아.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私は、あなたたちが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と呼ぶ神によって創り出された、新時代の女神……その幼体」"
translation = "「저는 당신들이 『<ruby>XELOS<rt>제로스</rt></ruby>』라고 부르는 신에 의해 창조된 신시대의 여신…… 그 유체예요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブとアルタイルも、ベガと同じ末路を辿るよう……リクリエを起こすことを目的に、地上へ遣わされた」"
translation = "「데네브와 알타이르도 베가와 같은 말로를 걷도록…… 리크리에를 일으키는 것을 목적으로 지상에 보내졌어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「出来損ないの女神テルルに代わる、新たな女神。世界と人類に、成長と進化をもたらす者よ」"
translation = "「모자란 여신 테루루를 대신할 새로운 여신. 세계와 인류에게 성장과 진화를 가져다줄 존재랍니다.」"

[[dialogue]]
speaker = "unk"
original = "あまりに簡単に認めるルヴィネの態度に、チナの心がざわつく。"
translation = "너무나도 쉽게 인정하는 루비네의 태도에 치나의 마음이 술렁인다."

[[dialogue]]
speaker = "チナ"
original = "「……なんでだ。どうして……どうして言い訳の一つもしないんだよ、ルヴィ！？」"
translation = "「……어째서야. 왜…… 왜 변명 한마디도 안 하는 거냐고, 루비!?」"

[[dialogue]]
speaker = "チナ"
original = "「アルタイルの奴らに出まかせを吹き込まれてるんだって……幼なじみの私を信じてくれって……下手くそでもいいから言い訳してくれよ！！」"
translation = "「알타이르 녀석들에게 헛소리를 주워들었다고…… 소꿉친구인 나를 믿어 달라고…… 서툴러도 좋으니까 변명이라도 해 보란 말이야!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「無駄だわ、そんなこと」"
translation = "「무의미해요, 그런 건.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブの塔の頂上で……ベアトにディザスターハンドと共にいるところを見られている」"
translation = "「데네브의 탑 정상에서…… 베아토에게 디재스터 핸드와 함께 있는 모습을 들켰으니까요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「それにチナ。あなたもアルタイルに留まっている間に、たくさんのことを見聞きしてきたのでしょう？」"
translation = "「게다가 치나. 당신도 알타이르에 머무는 동안 많은 것을 보고 들었겠죠?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「だったら……隠したりごまかしたりしても意味がない」"
translation = "「그렇다면…… 숨기거나 얼버무려도 의미가 없어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私たち、ずっと長いこと一緒にいたんだもの。嘘を吐いたところですぐにばれる──何事も合理的に運ばないといけないわ」"
translation = "「우리, 아주 오랫동안 함께 있었잖아요. 거짓말을 해 봤자 금방 들통날 텐데── 모든 일은 합리적으로 진행해야 하니까요.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……ルヴィ。そんな言い方、ひどいよ……」"
translation = "「……루비. 그런 말투, 너무해……」"

[[dialogue]]
speaker = "チナ"
original = "「だったら聞かせろ！！\u3000１０年前、お前はアタシたちを救ってくれたじゃないか！？」"
translation = "「그럼 말해 봐!! 10년 전, 너는 우리를 구해 줬잖아!?」"

[[dialogue]]
speaker = "チナ"
original = "「リクリエを起こすのが目的なら……なんであんなことしたんだ！！\u3000それこそ無駄じゃないか！！」"
translation = "「리크리에를 일으키는 게 목적이라면…… 왜 그런 짓을 한 거야!! 그것이야말로 무의미하잖아!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そういう『命令』だったからよ」"
translation = "「그런 『명령』이었으니까요.」"

[[dialogue]]
speaker = "レティシア"
original = "「……命令？」"
translation = "「……명령?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そう。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』…………お父様からの、命令」"
translation = "「네. 『<ruby>XELOS<rt>제로스</rt></ruby>』………… 아버님으로부터의 명령.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私は『デネブの緋宮クロト』が死んだ、その日に創造された」"
translation = "「저는 『데네브의 히노미야 쿠로토』가 죽은 그날 창조되었어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「最初にかけられた言葉は『世界をリセットしろ』。その目的のためだけに、私は造られたわ」"
translation = "「처음 들은 말은 『세계를 리셋하라』. 그 목적만을 위해 저는 만들어졌답니다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「３０００年前──魔王ラクシスはリクリエを跳ねのけた。そして光の魔女の禁術によって『生まれ直し』まで行った……」"
translation = "「3000년 전── 마왕 락시스는 리크리에를 물리쳤어요. 그리고 빛의 마녀의 금술에 의해 『다시 태어나기』까지 행했죠……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブ、アルタイル、ベガ──それらの発生は、魔王ラクシスが、緋宮クロトとして再誕したことによって生まれたもの」"
translation = "「데네브, 알타이르, 베가── 이것들의 발생은 마왕 락시스가 히노미야 쿠로토로서 재탄생함으로 인해 생겨난 것.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「お父様は危惧された。世界が３つに分かれたことで……よりリクリエの達成が困難になってしまったから」"
translation = "「아버님께서는 우려하셨어요. 세계가 셋으로 나뉘면서…… 리크리에 달성이 더욱 어려워졌으니까요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ベガは、リクリエによって堕ちた緋宮クロト……ディザスターハンドが滅ぼした。けれどデネブとアルタイルは違った」"
translation = "「베가는 리크리에에 의해 타락한 히노미야 쿠로토…… 디재스터 핸드가 멸망시켰어요. 하지만 데네브와 알타이르는 달랐죠.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブの緋宮クロトは、自らの力の脅威に気づいていたの。平行世界に干渉することができる──お父様でさえ容易ではないその権能」"
translation = "「데네브의 히노미야 쿠로토는 자신의 힘의 위협을 깨닫고 있었어요. 평행세계에 간섭할 수 있는── 아버님조차 용이하지 않은 그 권능.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「その力を再利用されることを恐れたデネブの緋宮クロトは、自らの力を暴走させ──跡形もなく爆散することで神の支配を逃れたのよ」"
translation = "「그 힘이 재이용되는 것을 두려워한 데네브의 히노미야 쿠로토는 자신의 힘을 폭주시켜── 흔적도 없이 폭사함으로써 신의 지배를 벗어난 거예요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「おまけに女神との間に作った、御子だなんていう異物まで平行世界に飛ばす始末……」"
translation = "「게다가 여신과의 사이에서 만든 아이라고 하는 이물질까지 평행세계로 날려 버리는 실수를 저질렀죠……」"

[[dialogue]]
speaker = "グレイス"
original = "「……九浄、ヴィーナスさん。デネブの魔王さんが、死の間際に、アルタイルに送ったと……」"
translation = "「……쿠죠 비너스 씨. 데네브의 마왕님이 죽기 직전에 알타이르로 보냈다고……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そうよ。平行世界の中で、最も時の流れが遅れていたのがアルタイル。そこへ御子という異物が紛れてしまった」"
translation = "「맞아요. 평행세계 중에서 가장 시간의 흐름이 늦었던 곳이 알타이르. 그곳으로 아이라는 이물질이 섞여 들어갔죠.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「お父様は強い脅威を感じられた。アルタイルで覚醒する魔王は、九浄ヴィーナスの影響で、デネブよりも厄介な存在に成長するだろうと」"
translation = "「아버님께서는 강한 위협을 느끼셨어요. 알타이르에서 각성할 마왕은 쿠죠 비너스의 영향으로 데네브보다 더 까다로운 존재로 성장할 것이라고.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「だから私に命じられた……強大に成長するアルタイルの力を削ぐために、滅びかかったデネブを利用しろ、とね」"
translation = "「그래서 제게 명하셨죠…… 강대하게 성장할 알타이르의 힘을 깎기 위해, 멸망해 가던 데네브를 이용하라고 말이에요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「使徒マルキアとの戦いで滅びの一歩手前までいったデネブ。けれどまだ搾れる。利用価値がある。だから復興させよ、と」"
translation = "「사도 마르키아와의 싸움으로 멸망 직전까지 갔던 데네브. 하지만 아직 짜낼 수 있어요. 이용 가치가 있죠. 그러니 부흥시키라고.」"

[[dialogue]]
speaker = "チナ"
original = "「……だから？\u3000『命令』されたから……１０年前、アタシたちを助けたって？」"
translation = "「……그래서? 『명령』받았으니까…… 10년 전 우리를 구했다는 거야?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。お父様から、ヒトを懐柔するための情報はたくさんもらっていたわ」"
translation = "「네. 아버님으로부터 인간을 회유하기 위한 정보를 많이 받았거든요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「親切にされると、ヒトは喜ぶ。自己犠牲を見せつけると、ヒトは心を許す──」"
translation = "「친절을 베풀면 인간은 기뻐해요. 자기희생을 보여 주면 인간은 마음을 열죠──」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブの緋宮クロトの自爆の影響で、時空がねじれて……陸の孤島となった流星市国は都合がよかった」"
translation = "「데네브의 히노미야 쿠로토의 자폭 영향으로 시공이 뒤틀려…… 육지의 고도가 된 유성시국은 안성맞춤이었어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……あまりに過酷で、何度か死にかけもしたけれど。結果として私は、流星市国の住人のほとんどを懐柔できた」"
translation = "「……너무나 가혹해서 몇 번인가 죽을 뻔하기도 했지만. 결과적으로 저는 유성시국 주민 대부분을 회유할 수 있었죠.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「１０年間……本当に長かったわ」"
translation = "「10년 동안…… 정말 길었네요.」"

[[dialogue]]
speaker = "グレイス"
original = "「……やっぱり、嘘だったんですね。魔王さんは逃げ出してなんかいない……ルヴィは、全てを知っていた！」"
translation = "「……역시 거짓말이었군요. 마왕님은 도망치거나 한 게 아니야…… 루비는 모든 걸 알고 있었어!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブの魔王の最期は、生まれた時にお父様から全て聞いていたわ」"
translation = "「데네브 마왕의 최후는 태어났을 때 아버님께 전부 들었어요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「捨て身の自爆で、最強の使徒だったマルキアとも刺し違えて、デネブを滅びから救った。ヒトの目から見たら、疑いようのない英雄でしょう」"
translation = "「목숨을 건 자폭으로 최강의 사도였던 마르키아와 동귀어진하여 데네브를 멸망에서 구했죠. 인간의 눈으로 보면 의심할 여지 없는 영웅이겠죠.」"

[[dialogue]]
speaker = "グレイス"
original = "「──ふざけないでください！！\u3000ずっと、ずっと騙していたんですね！？\u3000私があれだけ否定していたのに……！！」"
translation = "「──웃기지 마세요!! 계속, 계속 속이고 있었던 거군요!? 제가 그렇게나 부정했는데도……!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「グレイスはあの避難地で一番強情だったわね。なかなか認めてくれないから、苦労したわ」"
translation = "「그레이스는 그 피난처에서 가장 고집이 셌죠. 좀처럼 인정해 주지 않아서 고생했답니다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でもあの嘘は、吐いた方が得だった。だって緋宮クロトの人気は便利だもの」"
translation = "「하지만 그 거짓말은 하는 편이 이득이었어요. 히노미야 쿠로토의 인기는 편리하니까요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「彼に向いていた信頼と尊敬を、そっくりそのまま私に移すことができれば……デネブを懐柔する上で大幅なショートカットになる」"
translation = "「그에게 향해 있던 신뢰와 존경을 그대로 제게 옮겨올 수 있다면…… 데네브를 회유하는 데 있어서 대폭적인 지름길이 되거든요.」"

[[dialogue]]
speaker = "グレイス"
original = "「許せません！\u3000私たちを騙していた以上に、許せない！！\u3000魔王さんへの侮辱、愚弄ッ……よくもあんな優しい人を……！！」"
translation = "「용서 못 해요! 저희를 속인 것 이상으로 용서할 수 없어요!! 마왕님에 대한 모욕, 우롱…… 잘도 그런 다정한 분을……!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。その怒りと嫌悪は、妥当なものだと思うわ」"
translation = "「네. 그 분노와 혐오는 타당하다고 생각해요.」"

[[dialogue]]
speaker = "グレイス"
original = "「ルヴィ──！！」"
translation = "「루비──!!」"

[[dialogue]]
speaker = "unk"
original = "今にもルヴィネにつかみかかろうとするグレイス──しかし、その動きを止めたのは、他ならぬグレイス自身だった。"
translation = "당장이라도 루비네에게 달려들 것 같은 그레이스── 하지만 그 움직임을 멈춘 것은 다름 아닌 그레이스 자신이었다."

[[dialogue]]
speaker = "グレイス"
original = "「どうしてっ……なんで！\u3000よりによってルヴィが……魔王さんを……」"
translation = "「어째서야…… 왜! 하필이면 루비가…… 마왕님을……」"

[[dialogue]]
speaker = "グレイス"
original = "「私の大切な友達が……私の好きだった人を……貶めるんですか…………！？」"
translation = "「내 소중한 친구가…… 내가 좋아했던 사람을…… 깎아내리는 건가요…………!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "レティシア"
original = "「──ルヴィ。どうして最初から、全てを言ってくれなかったの？」"
translation = "「──루비. 왜 처음부터 전부 말해 주지 않았어?」"

[[dialogue]]
speaker = "レティシア"
original = "「ルヴィが女神で、その目的がリクリエを起こすことでも。昔の私ならきっと受け入れたのに……」"
translation = "「루비가 여신이고 그 목적이 리크리에를 일으키는 것이라고 해도. 예전의 나라면 분명 받아들였을 텐데……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……そうかしら？\u3000私はそうは思わないわ」"
translation = "「……글쎄요? 저는 그렇게 생각하지 않아요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「レティシア。あなたは私の指示に忠実だった。私が命令したら、命だって捨ててくれたでしょう」"
translation = "「레티시아. 당신은 제 지시에 충실했죠. 제가 명령했다면 목숨이라도 버려 줬을 거예요.」"

[[dialogue]]
speaker = "レティシア"
original = "「ええ。私にとってルヴィの命令は絶対……『空っぽ』の私なら、きっと言うことを聞いて──」"
translation = "「응. 나에게 루비의 명령은 절대적…… 『텅 빈』 나라면 분명 말을 듣고──」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でもあなたは──『空っぽ』なんかじゃないわ」"
translation = "「하지만 당신은── 『텅 빈』 것 따위가 아니에요.」"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトや奏サーシャに言われたのと同じ言葉を投げかけられ、レティシアが口を<ruby>噤<rt>つぐ</rt></ruby>む。"
translation = "히노미야 쿠로토나 카나데 사샤에게 들었던 것과 같은 말을 듣자 레티시아가 입을 다문다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「自我が希薄で、命令は何でも聞く……でもあなたの心の底には、人一倍の優しさがある。私はずっとそう思っていた」"
translation = "「자아가 희박해서 명령은 뭐든 듣는다…… 하지만 당신의 마음 깊은 곳에는 남들보다 배는 더한 다정함이 있어요. 저는 계속 그렇게 생각했답니다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「デネブを守るためにアルタイルを滅ぼす──そこまでは聞いてくれたでしょう」"
translation = "「데네브를 지키기 위해 알타이르를 멸망시킨다── 거기까지는 들어 줬겠죠.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「でもリクリエを起こして、デネブをも滅ぼす。ベアトもチナもグレイスも、みんないなくなる……その手伝いをしろと言ったら？」"
translation = "「하지만 리크리에를 일으켜서 데네브마저 멸망시킨다. 베아토도 치나도 그레이스도 모두 없어진다…… 그 도움을 주라고 했다면?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「きっとあなたは『嫌だ』と言ったはずよ」"
translation = "「분명 당신은 『싫어』라고 말했을 거예요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「誰よりも傷つくことの痛みを、独りぼっちの怖さを知っている。そんなとても優しい子だもの」"
translation = "「누구보다 상처받는 것의 아픔을, 외톨이의 무서움을 알고 있죠. 그런 아주 다정한 아이니까요.」"

[[dialogue]]
speaker = "レティシア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "チナ"
original = "「……ルヴィ。こっちの世界でアタシ、死んだ父さんたちに会ったんだ」"
translation = "「……루비. 이쪽 세계에서 나, 죽은 아빠랑 엄마를 만났어.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そう。よかったわね」"
translation = "「그래요. 잘됐네요.」"

[[dialogue]]
speaker = "チナ"
original = "「母さんのお腹には、子供もいるって……」"
translation = "「엄마 배 속에는 아기도 있다고……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………そう」"
translation = "「…………그래요.」"

[[dialogue]]
speaker = "チナ"
original = "「ルヴィがリクリエを起こそうとしてるなら──ルヴィはアタシの敵だ。星騎士として、絶対に止めなきゃならない」"
translation = "「루비가 리크리에를 일으키려 한다면── 루비는 나의 적이야. 성기사로서 절대로 막아야만 해.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「チナは本当に強い子ね。５人の中で一番歳下だけど、あなたは本当にしっかり者だわ」"
translation = "「치나는 정말 강한 아이군요. 다섯 명 중에서 가장 어리지만 당신은 정말 듬직해요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「チナのまっすぐで、ひたむきなところ。昔からすごく好きだった」"
translation = "「치나의 곧고 한결같은 면. 예전부터 무척 좋아했답니다.」"

[[dialogue]]
speaker = "チナ"
original = "「……それも女神サマの、人心掌握のセリフか？」"
translation = "「……그것도 여신님의 인심 장악용 대사냐?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ええ。いつもこうやって、あなたが喜びそうな言葉を選んで……信頼を稼いでいたわ。とても効果があったでしょう？」"
translation = "「네. 언제나 이렇게 당신이 기뻐할 만한 말을 골라서…… 신뢰를 쌓았죠. 아주 효과적이었죠?」"

[[dialogue]]
speaker = "チナ"
original = "「ああ、そうかよ！\u3000くそったれ……！」"
translation = "「아아, 그러셔! 빌어먹을……!」"

[[dialogue]]
speaker = "チナ"
original = "「アタシの家族に手出しはさせない。ルヴィ、お前は、敵だ……！」"
translation = "「내 가족에게 손대게 두지 않아. 루비, 너는 적이다……!」"

[[dialogue]]
speaker = "unk"
original = "チナが奥歯を噛んで槍を構える──が、ベアトリスが一歩前に出た。"
translation = "치나가 어금니를 깨물며 창을 겨눈다── 하지만 베아트리스가 한 발 앞으로 나섰다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ねえ、ルヴィ？\u3000聞かせて欲しいの……」"
translation = "「있지, 루비? 들려줬으면 좋겠어……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「本当は……リクリエなんて起こしたくないって、思ってない……？」"
translation = "「사실은…… 리크리에 같은 거 일으키고 싶지 않다고 생각하고 있지 않아……?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ベアトリス"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に脅されて、無理やり従わされて、ないかな……？」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』에게 협박당해서 억지로 따르고 있는 거 아닐까……?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「もういいよ……１０年間騙してたことは、もういい……それはもういいから、本当のこと、教えてほしいの……」"
translation = "「이제 됐어…… 10년 동안 속인 건 이제 됐어…… 그건 이제 됐으니까 진실을 가르쳐 줬으면 좋겠어……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「私はルヴィの本心が知りたいよ……！」"
translation = "「나는 루비의 본심을 알고 싶어……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……こんな時でも、ベアトは変わらないのね」"
translation = "「……이런 때에도 베아토는 변함이 없네요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あなたは本当に不思議。誰よりも操りやすそうなのに、実際はものすごく頑固」"
translation = "「당신은 정말 신기해요. 누구보다 조종하기 쉬워 보이는데 실제로는 엄청나게 완고하죠.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「人の感情を計算するのは得意なはずなのだけれど……ベアトはいつも私の予想を裏切る」"
translation = "「사람의 감정을 계산하는 건 특기일 텐데…… 베아토는 항상 제 예상을 빗나가게 해요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「こういう時は『よくも騙してくれたな』って。『許さない』って言わなくちゃダメでしょう？」"
translation = "「이럴 때는 『잘도 속였구나』라고. 『용서 못 해』라고 말해야 하잖아요?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「──そんなことできない！！\u3000ルヴィは私の大切な友達だもん！！\u3000自分の命よりも大事な……大好きな友達なの！！！」"
translation = "「──그럴 수 없어!! 루비는 내 소중한 친구인걸!! 내 목숨보다 소중한…… 너무 좋아하는 친구란 말이야!!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「一族にも、家族にも見捨てられた私にできた……一番最初にできた……かけがえのないっ……！！」"
translation = "「일족에게도, 가족에게도 버림받은 나에게 생긴…… 가장 처음에 생긴…… 무엇과도 바꿀 수 없는……!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「演技だと言ったでしょう。アルタイルを滅ぼすために、便利だから利用したにすぎないと」"
translation = "「연기라고 말했잖아요. 알타이르를 멸망시키기 위해 편리하니까 이용했을 뿐이라고.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「１０年前……出会った時からベアトは星力が使えた。あの荒廃した流星市国で……とても便利だったわ、あなた」"
translation = "「10년 전…… 만났을 때부터 베아토는 성력을 쓸 수 있었죠. 그 황폐한 유성시국에서…… 아주 편리했답니다, 당신은.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そんな……！？」"
translation = "「그럴 수가……!?」"

[[dialogue]]
speaker = "チナ"
original = "「……変身しろよルヴィ。こうなったら力づくでもお前を止める」"
translation = "「……변신해, 루비. 이렇게 된 이상 힘으로라도 너를 막겠어.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「無駄よ。女神に勝てると本気で思っているの？\u3000今すぐ投降しなさい──命だけは助けてあげる」"
translation = "「무의미해요. 여신을 이길 수 있다고 진심으로 생각하나요? 지금 당장 투항하세요── 목숨만은 살려 줄게요.」"

[[dialogue]]
speaker = "チナ"
original = "「長い付き合いだ、わかるだろ。そんなことを聞くアタシたちだと思うか？」"
translation = "「오래 알고 지냈잖아, 알 거 아냐. 그런 말을 들을 우리라고 생각하냐?」"

[[dialogue]]
speaker = "グレイス"
original = "「これだけひどいことを言われても……ルヴィのことを嫌いきれない、自分がイヤです……全力でいきますから！」"
translation = "「이렇게 심한 말을 들어도…… 루비를 다 미워하지 못하는 제 자신이 싫어요…… 전력으로 갈 테니까요!」"

[[dialogue]]
speaker = "レティシア"
original = "「みんなが離ればなれになるのは、私もイヤだわ──ルヴィ」"
translation = "「모두가 뿔뿔이 흩어지는 건 나도 싫어── 루비.」"

[[dialogue]]
speaker = "レティシア"
original = "「初めて自分の意思を自覚できたのに。それでルヴィと争うことになるだなんて……」"
translation = "「처음으로 자신의 의지를 자각했는데. 그걸로 루비와 다투게 되다니……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「やらせない……アルタイルとデネブを滅ぼすだなんて。そんなひどいこと、ルヴィにやらせない！！」"
translation = "「하게 두지 않아…… 알타이르와 데네브를 멸망시키다니. 그런 끔찍한 일, 루비에게 하게 두지 않겠어!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……仕方ないわね」"
translation = "「……어쩔 수 없네요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「１０年間も騙していたんだもの。納得するまで付き合ってあげるのが、せめてものお詫びかしら」"
translation = "「10년이나 속였으니까요. 납득할 때까지 상대해 주는 것이 최소한의 사죄일까요.」"

[[dialogue]]
speaker = "チナ"
original = "「舐めるな、このぉっ──！！！」"
translation = "「얕보지 마, 이 자식이──!!!」"

