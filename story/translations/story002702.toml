[[dialogue]]
speaker = "unk"
original = "『選星者』とは――"
translation = "『선성자』란──"

[[dialogue]]
speaker = "unk"
original = "女神から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指し、海外では『ロールスター』とも呼ばれている存在である。"
translation = "여신으로부터 『역직』을 부여받은 자를 가리키며, 해외에서는 『롤 스타』라고도 불리는 존재다."

[[dialogue]]
speaker = "unk"
original = "彼らは天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"
translation = "그들은 하늘의 계시로 인해 태어날 때부터 그 사실을 자각하고, 역직에 따른 특수한 능력을 부여받는다."

[[dialogue]]
speaker = "unk"
original = "俺が今までに出会ったのは――『名探偵』のジュエリー・ブラウン。"
translation = "내가 지금까지 만난 것은── 『명탐정』 주얼리 브라운."

[[dialogue]]
speaker = "unk"
original = "『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』の恵原フェリシー。"
translation = "『엑소시스트』 에바라 펠리시."

[[dialogue]]
speaker = "unk"
original = "『大怪盗』のミネコ・フランボワーズ。"
translation = "『대괴도』 미네코 플랑보아즈."

[[dialogue]]
speaker = "unk"
original = "そして、今回の『陰陽師』――安倍野ミヤハルで４人目となる。"
translation = "그리고 이번의 『음양사』── 아베노 미야하르로 네 번째가 된다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「それじゃあ改めて、はんなりと自己紹介させてもらいます<emoji=heart04>」"
translation = "「그럼 다시 한번 사뿐하게 자기소개 하겠습니데이<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「うちは、陰陽師・安倍晴明はんの血を引く一族――現『安倍野』家、本家の長女をやっとります」"
translation = "「내는 음양사 아베노 세이메이 한의 피를 이어받은 일족── 현 『아베노』 가문 본가의 장녀를 맡고 있습니데이.」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ほんで、安倍野家は代々、選星者『陰陽師』のお役目を引き継いできたんよ」"
translation = "「글카고 아베노 가문은 대대로 선성자 『음양사』의 소임을 이어받아 왔는기라.」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ただ、よく勘違いされるんやけど、『陰陽術』は選星者の能力であって、安倍野家が<ruby>生業<rt>なりわい</rt></ruby>としてきたのは『巫女』の方なんよ」"
translation = "「다만 자주 오해받곤 하는데, 『음양술』은 선성자의 능력이고, 아베노 가문이 생업으로 삼아온 건 『무녀』 쪽인 기라.」"

[[dialogue]]
speaker = "unk"
original = "だから、ミヤハルが指導役に呼ばれたのか"
translation = "그래서 미야하르가 지도역으로 불린 거구나."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「そういうことどす<emoji=heart04>\u3000適正がある星騎士に、巫女の力──『<ruby>巫術<rt>ふじゅつ</rt></ruby>』を教えるのが、安倍野家のもう１つのお役目、というわけやね」"
translation = "「그렇게 된 거라예<emoji=heart04> 적성이 있는 성기사에게 무녀의 힘── 『무술』을 가르치는 게 아베노 가문의 또 다른 소임이라는 기지.」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「まぁ、正直、指導するのはちょ～っと<ruby>億劫<rt>おっくう</rt></ruby>なんやけど……」"
translation = "「뭐 솔직히 지도하는 건 쪼~금 귀찮기는 한데……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「その代わり、こうしてやっと会長はんに会うことができて、うち、えろう嬉しいわぁ<emoji=heart04>」"
translation = "「그 대신 이렇게 드디어 회장 한을 만날 수 있어서 내는 억수로 기쁘다예<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言って突然、俺の腕に抱きついて来た。"
translation = "그녀는 그렇게 말하며 갑자기 내 팔에 매달려 왔다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「はんなりとごめんやす<emoji=heart04>」"
translation = "「갑작시리 실례합니데이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミ、ミヤハルさん！？"
translation = "미, 미야하르 씨!?"

[[dialogue]]
speaker = "unk"
original = "彼女のやたら大きく開けた胸元が腕に押し付けられて、その感触に思わずドキッとしてしまう。"
translation = "그녀의 유난히 크게 파인 가슴팍이 팔에 밀착되어 그 감촉에 나도 모르게 가슴이 두근거리고 만다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いきなりボディータッチ！？」"
translation = "「갑자기 바디 터치!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「大胆なのです！」"
translation = "「대담한 거예요!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふふっ<emoji=heart04>\u3000会長はん、近くで見ると、やっぱりえろうイケメンやねぇ<emoji=heart04>」"
translation = "「후후<emoji=heart04> 회장 한, 가까이서 보니까 역시 억수로 미남이네예<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「それにこうして制服越しに体を触っても、しっかりと鍛えてはるのが伝わって来るわぁ<emoji=heart04>」"
translation = "「거기다 요로코롬 교복 너머로 몸을 만져봐도 탄탄하게 단련된 게 전해져 오는구마<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そ、そんなやたら触られると……"
translation = "그, 그렇게 마구 만지면……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやいやいや！\u3000いくらなんでも、変なとこ触り過ぎだから！」"
translation = "「아니아니아니! 아무리 그래도 이상한 데 너무 만지잖아요!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あんっ<emoji=heart04>\u3000ようやっと会長はんにお会いできたゆうのに、マトイはん、そんな引き剥がしたりして、いけずやわぁ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 겨우 회장 한을 만났는데 마토이 한, 그렇게 떼어놓다니 심술궂구마<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「頬とか太もも撫でるのは普通じゃないよ！？」"
translation = "「뺨이나 허벅지를 쓰다듬는 건 보통이 아니라고요!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちょっとセクシーな感じだったのです！」"
translation = "「조금 섹시한 느낌이었던 거예요!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「――うち、ほんまはず～っと前から、会長はんに会いたかったんよ。でも、選星者っていうのは、どうも星の巡りに左右されやすいらしくてな？」"
translation = "「──내, 실은 아~주 전부터 회장 한을 만나고 싶었습니데이. 근데 선성자라는 기 아무래도 별의 운행에 좌우되기 쉬운 모양이라 안 글나?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会おうとすると、必ずお邪魔イベントみたいな出来事が起こったり、ニアミスばかりで上手く行かなかったんよ」"
translation = "「만나려고 하면 꼭 방해 이벤트 같은 일이 일어나거나, 계속 엇갈리기만 해서 잘 안 됐거든예.」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「おかげで、えろう長いこと待ったわぁ。そのせいで、うち――」"
translation = "「덕분에 억수로 오래 기다렸구마. 그 때문에 내──」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「もう辛抱たまらんくらい、すっごく溜まっとるんよ<emoji=heart04>」"
translation = "「이제 참기 힘들 정도로 억수로 쌓여 있습니데이<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「溜まっ……！？」"
translation = "「쌓여……!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「溜まっているっていうのは、具体的には何がどう溜まっているんですか？」"
translation = "「쌓여 있다는 건 구체적으로 무엇이 어떻게 쌓여 있는 건가요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ルリエルちゃん！？」"
translation = "「루리엘짱!?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふふっ、今まで欲求不満やった反動でな<emoji=heart04>\u3000こうして会長はんにくっ付いとると、うち――」"
translation = "「후후, 지금까지 욕구불만이었던 반동으로 안 글나<emoji=heart04> 요로코롬 회장 한에게 붙어 있으면 내──」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「えろう<b>濡れて</b>しまうんよ<emoji=heart04>」"
translation = "「억수로 <b>젖어</b> 버린데이<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なに言っちゃってんの、この人！？」"
translation = "「무슨 소릴 하는 거예요, 이 사람!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「？\u3000濡れているというのは、どこがなのです……？」"
translation = "「? 젖어 있다는 건 어디가 말인가요……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ルリエルちゃんっ！\u3000それ以上深堀りしなくていいから！！」"
translation = "「루리엘짱! 그 이상 깊게 파고들지 않아도 되니까!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえ？」"
translation = "「호에?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「というか、今思い出した！\u3000ミヤハルさんって確か、流星学園で、陰陽師って以外にも……」"
translation = "「그보다 이제 생각났다! 미야하르 씨는 분명 유성학원에서 음양사 말고도……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その……ちょっと言いづらい通称で呼ばれている……」"
translation = "「그…… 좀 말하기 거북한 통칭으로 불리고 있는……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいはいはい！\u3000ルリエル、知っているのです！」"
translation = "「네네네! 루리엘, 알고 있는 거예요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ズバリ――『歩く１８禁』なのです！」"
translation = "「정답은── 『걸어 다니는 19금』인 거예요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あえて濁したのに言っちゃった！！」"
translation = "「일부러 돌려 말했는데 그냥 말해버렸어!!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あんっ<emoji=heart04>\u3000そんなスケベぇな呼び方されたらうち、体が熱くなってまうわぁ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 그런 변태 같은 이름으로 불러주면 내 몸이 뜨거워져 버린데이<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんか嬉しそう！？」"
translation = "「왠지 기뻐 보여!?」"

[[dialogue]]
speaker = "unk"
original = "ま、また、個性的な選星者が現れたな……"
translation = "또다시 개성적인 선성자가 나타났군……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「み、巫女の修行、大丈夫なのかな……」"
translation = "「무, 무녀 수행 괜찮을까……」"

[[dialogue]]
speaker = "unk"
original = "マトイとルリエルの２人は明日から、ミヤハルの元で巫女の力を制御する修行に入るという。"
translation = "마토이와 루리엘 두 사람은 내일부터 미야하르의 곁에서 무녀의 힘을 제어하는 수행에 들어간다고 한다."

[[dialogue]]
speaker = "unk"
original = "個性的な師匠の登場に、ちょっと不安そうな顔を浮かべるマトイなのだった――"
translation = "개성 넘치는 스승의 등장에 조금 불안한 기색을 띄우는 마토이였다──"

[[dialogue]]
speaker = "unk"
original = "ミヤハルと顔合わせをした翌日の放課後。"
translation = "미야하르와 대면한 다음 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "マトイとルリエルたちは、巫女修行をする為、流星市国から東京の浅草へとやって来ていた――"
translation = "마토이와 루리엘 일행은 무녀 수행을 하기 위해 유성시국에서 도쿄의 아사쿠사로 찾아왔다──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「この辺りはお正月とかでも来たことあるから、知っているけど……」"
translation = "「이 근처는 정월 같은 때도 와본 적이 있어서 알지만……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ミヤハルさん、神社ってどの辺りにあるのですか？」"
translation = "「미야하르 씨, 신사는 어느 쪽에 있는 건가요?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「もうちょっとで着くから待ってておくれやす。近くに小さな鳥居があって、そこの<b>結界</b>を潜った先がうちの住んどる神社やから」"
translation = "「조금만 더 가면 되니까 기다려 주이소. 근처에 작은 토리이가 있는데 거기 <b>결계</b>를 지나간 끝이 내 사는 신사니까예.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「結界？」"
translation = "「결계?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「そう、ちょっと特殊な場所でな。星力を持っている人しか通り抜けられないようになってる結界の中にあるんよ」"
translation = "「그래예, 좀 특수한 장소라서 안 글나. 성력을 가진 사람만 지나갈 수 있게 된 결계 안에 있습니데이.」"

[[dialogue]]
speaker = "unk"
original = "そうして、ミヤハルに連れられ、小さな路地を曲がった先にある、あまり目立たない鳥居を潜ると――"
translation = "그렇게 미야하르의 안내를 받아 작은 골목을 꺾어 들어간 곳에 있는 별로 눈에 띄지 않는 토리이를 지나자──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ここが『浅草安倍野神社』……！」"
translation = "「여기가 『아사쿠사 아베노 신사』……!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わぁ～♪\u3000なんだかすごく、神聖な雰囲気の場所なのです！」"
translation = "「와아~♪ 왠지 굉장히 신성한 분위기의 장소인 거예요!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「本当は会長はんも一緒に来てくれたら嬉しかったんやけどなぁ。まあ、それはまた今度、じっくり２人きりでということにして――」"
translation = "「원래는 회장 한도 같이 오면 좋았을 텐데예. 뭐 그건 나중에 단둘이서 느긋하게 하기로 하고──」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「<b>３人共</b>、うちの神社へようこそおいでやす<emoji=heart04>」"
translation = "「<b>세</b> <b>사람</b> <b>다</b>, 내 신사에 온 걸 환영한데이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今回、巫女修行をするのは、マトイと、ルリエルと、もう１人――"
translation = "이번에 무녀 수행을 하는 것은 마토이와 루리엘, 그리고 한 명 더──"

[[dialogue]]
speaker = "？？？"
original = "「――はい」"
translation = "「──네.」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「マトイ姉さま共々、また巫女の力のご指導、よろしくお願い致します。ミヤハルさま」"
translation = "「마토이 누님과 함께 다시 무녀의 힘 지도를 잘 부탁드립니다. 미야하르 님.」"

[[dialogue]]
speaker = "unk"
original = "女の子にしか見えないマトイの<b>弟</b>・詠野トマルは、清楚な微笑みを浮かべるのだった――"
translation = "여자아이로밖에 보이지 않는 마토이의 <b>남동생</b> 에이노 토마루는 청초한 미소를 지었다──"

