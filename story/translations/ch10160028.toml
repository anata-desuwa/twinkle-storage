[[dialogue]]
speaker = "unk"
original = "この１週間、星徒会が忙しくて、恋人のヒトリとなかなか会えていなかった。"
translation = "이번 일주일 동안 성도회가 바빠서 연인인 히토리와 좀처럼 만나지 못했다."

[[dialogue]]
speaker = "unk"
original = "そうして仕事が一段落して、久しぶりに２人きりで過ごせることになった週末。"
translation = "그렇게 일이 일단락되고 오랜만에 둘이서 보낼 수 있게 된 주말."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ん……<emoji=heart04>\u3000ご主人様……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女を家に迎え入れてすぐ、抱き締めて、キスをする。"
translation = "그녀를 집으로 맞이하자마자 껴안고 키스를 한다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ちゅっ……ちゅっ……んむっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「쪽…… 쪽…… 음무……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「久しぶりのキス……すごく甘いです……<emoji=heart04>」"
translation = "「오랜만의 키스…… 정말 달콤해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今日もヒトリは、ハロウィンフォーム――チシャ猫衣装に着替えていた。"
translation = "오늘도 히토리는 할로윈 폼―― 체셔 고양이 의상으로 갈아입고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼女がこの姿になっている時は、『飼い猫のように甘えたい』というサインだと俺は知っている。"
translation = "그녀가 이 모습이 되었을 때는 『집고양이처럼 어리광 부리고 싶다』는 사인이라는 것을 나는 알고 있다."

[[dialogue]]
speaker = "unk"
original = "だから俺も、今日は『ご主人様』として振る舞うことにする。"
translation = "그래서 나도 오늘은 『주인님』으로서 행동하기로 한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう発情モードになっちゃって、エッチな猫さんだな」"
translation = "「벌써 발정 모드가 되어버리다니, 야한 고양이네.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご、ごめんなさい。ご主人様とずっとできなかったので……だから――」"
translation = "「죄, 죄송해요. 주인님이랑 계속 못 해서…… 그래서――」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「き、今日は、我慢できないはしたないメス猫に……いっぱいお仕置きして欲しいです、にゃん……<emoji=heart04>」"
translation = "「오, 오늘은 참지 못하는 천박한 암고양이에게…… 잔뜩 벌을 주셨으면 좋겠어요, 냥……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、ダメって言っても――」"
translation = "「아아, 안 된다고 해도――」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひゃっ！？\u3000ご、ご主人様？」"
translation = "「히얏!? 주, 주인님?」"

[[dialogue]]
speaker = "unk"
original = "俺はヒトリの体を持ち上げて、お姫様抱っこすると、耳元で囁く。"
translation = "나는 히토리의 몸을 들어 올려 공주님 안기를 하고는 귓가에 속삭인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日はいっぱい、エッチなことしちゃうからな？」"
translation = "「오늘은 잔뜩 야한 짓 할 거니까 말이야?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「～～～っ<emoji=heart04>」"
translation = "「~~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ……ご主人様っ……んっ……<emoji=heart04>」"
translation = "「앗…… 주인님…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は再び、彼女の唇を奪う。"
translation = "나는 다시 그녀의 입술을 빼앗는다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ちゅっ……<emoji=heart04>\u3000んむっ……ちゅぷぷっ……れろちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 음무…… 츄푸푸…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ちゅぷっ……ちゅるるっ……れろちゅっ……<emoji=heart04>\u3000ちゅっ……ちゅぷぷっ……ちゅれるっ……<emoji=heart04>\u3000れろちゅっ……ちゅぶぶっ……ちゅるるっ……んむっ<emoji=heart04>」"
translation = "「츄푸…… 츄루루…… 레로쪽……<emoji=heart04> 쪽…… 츄푸푸…… 츄레루……<emoji=heart04> 레로쪽…… 츄부부…… 츄루루…… 음무<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ちゅぱぁっ……<emoji=heart04>\u3000――はあぁっ……<emoji=heart04>\u3000舌を絡めてのキス、気持ちよくてクラクラしちゃいます……<emoji=heart04>」"
translation = "「츄파앗……<emoji=heart04> ――하아앗……<emoji=heart04> 혀를 섞는 키스, 기분 좋아서 아찔해져요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「――ベッドに行くぞ、ヒトリ」"
translation = "「――침대로 가자, 히토리.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい……<emoji=heart04>\u3000よろしくお願いします……<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04> 잘 부탁드려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちはそのまま寝室へと移動して――"
translation = "우리들은 그대로 침실로 이동해서――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ん……<emoji=heart04>\u3000ご、ご主人様……この体勢でするんですか……？\u3000これだと、その……キスがしづらいっていうか……」"
translation = "「응……<emoji=heart04> 주, 주인님…… 이 자세로 하는 건가요……? 이러면 그게, 키스하기가 힘들다고 할까……」"

[[dialogue]]
speaker = "unk"
original = "ヒトリは初エッチの時以来、すっかりキスが大好きな『キス魔』になってしまい、エッチ中も頻繁にキスをしたがるようになっていた。"
translation = "히토리는 첫 섹스 이후 완전히 키스를 좋아하는 『키스광』이 되어 버려, 섹스 중에도 빈번하게 키스를 하고 싶어 하게 되었다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――え？\u3000それじゃお仕置きにならないから、一旦お預け……？」"
translation = "「――에? 그러면 벌이 안 되니까 일단 보류라고요……?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、そんなぁ……うぅ……」"
translation = "「그, 그럴 수가…… 으으……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――頑張ってご主人様のを気持ちよくできたら、次は正面から向き合う体勢で、ずっとキスしながらエッチを……？」"
translation = "「――힘내서 주인님 것을 기분 좋게 만들면 다음은 정면으로 마주 보는 자세로 계속 키스하면서 섹스를……?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい……<emoji=heart04>\u3000わかりました……頑張ります、にゃん……<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04> 알겠습니다…… 힘낼게요, 냥……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よし、いい子だ」"
translation = "「좋아, 착한 아이네.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ……えへへぇ<emoji=heart04>」"
translation = "「아…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が彼女の秘部に指で触れると、くちゅっと淫らな水音が鳴る。"
translation = "내가 그녀의 비부에 손가락으로 닿자 쿠츄하고 음란한 물소리가 난다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ……あんっ……<emoji=heart04>」"
translation = "「앗…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリのおま○こ、愛液でもうすごい濡れてる」"
translation = "「히토리의 보지, 애액으로 벌써 엄청 젖었어.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、それは……久しぶりのキスが……気持ちよくてぇ……<emoji=heart04>」"
translation = "「그, 그건…… 오랜만의 키스가…… 기분 좋아서어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "既に愛液はベッドも濡らす程の量で溢れて来ており、しかも指を離すと、ねっとりと絡み付いて糸を引く程に濃い。"
translation = "이미 애액은 침대를 적실 정도의 양으로 넘쳐흐르고 있었으며, 게다가 손가락을 떼자 끈적하게 달라붙어 실을 끌 정도로 진하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「キスしただけでこんなびしょびしょになっちゃうなんて……すっかりスケベになっちゃったな、ヒトリは」"
translation = "「키스한 것만으로 이렇게 축축하게 젖어 버리다니…… 완전히 변태가 되어 버렸네, 히토리는.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はぅ……エッチな飼い猫でごめんなさい……<emoji=heart04>」"
translation = "「하, 하으…… 야한 집고양이라서 죄송해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに顔を赤くしつつも、吐息は興奮の色を帯びているのを、俺は聞き逃さない。"
translation = "부끄러운 듯 얼굴을 붉히면서도 숨결은 흥분의 빛을 띠고 있는 것을 나는 놓치지 않는다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃあっ<emoji=heart04>\u3000ご主人様のおち○ちんが、当たって……ふあぁっ<emoji=heart04>」"
translation = "「냐앗<emoji=heart04> 주인님의 자지가 닿아서…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「んっ……はあぁっ<emoji=heart04>\u3000おま○こに擦れてぇ……あっ、あっ……<emoji=heart04>\u3000クリ、感じちゃいますぅ……<emoji=heart04>」"
translation = "「응…… 하아앗<emoji=heart04> 보지에 스쳐서어…… 앗, 앗……<emoji=heart04> 클리, 느껴져요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリ、<b>呼び方</b>を忘れてるぞ？\u3000猫になってる時は、なんて呼ぶんだっけ？」"
translation = "「히토리, <b>부르는</b> <b>법</b>을 잊었잖아? 고양이가 됐을 때는 뭐라고 부르기로 했지?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ……ご、ごめんなさい<emoji=heart04>\u3000おち○ぽ様<emoji=heart04>\u3000おち○ぽ様、です……<emoji=heart04>」"
translation = "「앗…… 죄, 죄송해요<emoji=heart04> 자지님<emoji=heart04> 자지님, 이에요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000ご主人様のおち○ぽ様に、外からズリズリされてるだけで、おま○こ気持ちいい、です……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후아앗……<emoji=heart04> 주인님의 자지님에게 밖에서 문질문질 당하는 것만으로 보지 기분 좋아요, 요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあぁ……んうぅ<emoji=heart04>\u3000んっ……ふうぅ<emoji=heart04>\u3000にゃっ……んん<emoji=heart04>\u3000クリに擦れて……あっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000はあぁ……ふうぅ<emoji=heart04>」"
translation = "「하아아…… 응으<emoji=heart04> 응…… 후우우<emoji=heart04> 냐앗…… 응응<emoji=heart04> 클리에 스쳐서…… 앗<emoji=heart04> 후아앗……<emoji=heart04> 하아아…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご、ご主人様……あの……そろそろ……」"
translation = "「주, 주인님…… 저기…… 이제 슬슬……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう我慢できなくなっちゃった？\u3000じゃあ……いつもみたいに、おねだりしてみて？」"
translation = "「이제 못 참겠어? 그럼…… 평소처럼 조르기 해봐.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい……<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すると、ヒトリは俺のペニスに片手で触れながら──"
translation = "그러자 히토리는 내 페니스를 한 손으로 만지면서──"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様の大きくて逞しいおち○ぽ様で、ヒトリのスケベな飼い猫おま○こに、どうかをお情けを下さいにゃん<emoji=heart04>」"
translation = "「주인님의 크고 늠름한 자지님으로, 히토리의 음란한 집고양이 보지에, 부디 자비를 베풀어 주세요 냥<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「냐앗――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ふにゃあああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ様、来ましたぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はあぁっ……ふうぅっ……！\u3000んんっ……<emoji=heart04>」"
translation = "「후냐아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지님, 들어왔어요오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04> 하아앗…… 후우웃……! 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……ヒトリのおま○こ、締め付けがすごい……！\u3000絡み付いて来る……！」"
translation = "「큭…… 히토리의 보지, 조임이 엄청나……! 휘감겨 오고 있어……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご、ごめんなさい……はあぁっ<emoji=heart04>\u3000ご主人様の、ずっと欲しかったから……んあぁっ<emoji=heart04>\u3000入れられただけでおま○こ喜んじゃってますぅ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>」"
translation = "「죄, 죄송해요…… 하아앗<emoji=heart04> 주인님 거, 계속 갖고 싶었으니까…… 응아앗<emoji=heart04> 넣어지는 것만으로 보지가 기뻐하고 있어요오<emoji=heart04> 응…… 후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「動くぞ……！」"
translation = "「움직인다……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ！？\u3000ふあああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000おち○ぽ様、奥まで来たぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000はあぁっ……んうぅっ……<emoji=heart04>\u3000ふうぅっ……んあぁっ……！」"
translation = "「앗!? 후아아아아아앗<emoji=heart04><emoji=heart04> 자지님, 안쪽까지 왔어어<emoji=heart04> 응<emoji=heart04> 후아앗……<emoji=heart04> 하아앗…… 응으읏……<emoji=heart04> 후우웃…… 응아앗……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ……あんっ<emoji=heart04>\u3000おち○ぽ様、気持ちいいですぅっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000にゃあっ……んんっ<emoji=heart04>\u3000あっ、んうぅっ……<emoji=heart04>\u3000はあぁっ……んあぁんっ<emoji=heart04>」"
translation = "「앗…… 안앗<emoji=heart04> 자지님, 기분 좋아요오옷<emoji=heart04> 응…… 하아앗<emoji=heart04> 냐앗…… 응응<emoji=heart04> 앗, 응으읏……<emoji=heart04> 하아앗…… 응아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「んっ……ふあぁっ<emoji=heart04>\u3000おち○ぽ様、熱くてぇ……はあぁっ<emoji=heart04>\u3000固くて大きくてぇ……ふうぅっ<emoji=heart04>\u3000すごいですぅっ<emoji=heart04>\u3000んうぅっ……ふああぁっつ<emoji=heart04>」"
translation = "「응…… 후아앗<emoji=heart04> 자지님, 뜨거워서어…… 하아앗<emoji=heart04> 딱딱하고 커서어…… 후우웃<emoji=heart04> 굉장해요오옷<emoji=heart04> 응으읏…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「おち○ぽ様で、おま○このいちばん奥に、ちゅっちゅってキスされてるの……あっ、ふあぁっ<emoji=heart04>\u3000感じますぅっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……んあぁっ！」"
translation = "「자지님으로, 보지의 가장 안쪽에, 쪽쪽 하고 키스당하는 거…… 앗, 후아앗<emoji=heart04> 느껴져요오옷<emoji=heart04> 앗, 안앗<emoji=heart04> 하아앗…… 응아앗!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いちばん奥って？」"
translation = "「가장 안쪽이라니?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「子宮口<emoji=heart04>\u3000子宮口ですぅ<emoji=heart04>\u3000あっ……あっ<emoji=heart04>\u3000そこ<emoji=heart04>\u3000おち○ぽ様でキスされた後に、カリで内側擦られるの、気持ちいいですっ<emoji=heart04>\u3000はあぁっ……ふああぁっ<emoji=heart04>」"
translation = "「자궁구<emoji=heart04> 자궁구예요오<emoji=heart04> 앗…… 앗<emoji=heart04> 거기<emoji=heart04> 자지님으로 키스당한 뒤에, 귀두로 안쪽이 문질러지는 거, 기분 좋아요옷<emoji=heart04> 하아앗…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「逞しいカリでゾリゾリってされてぇっ<emoji=heart04>\u3000あっ……ふあぁんっ<emoji=heart04>\u3000おま○こ、感じちゃいますぅっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000んうぅっ……ふああぁっ」"
translation = "「늠름한 귀두로 드득드득 문질러져서어<emoji=heart04> 앗…… 후아앙<emoji=heart04> 보지, 느껴버려요오옷<emoji=heart04> 응…… 하아앗<emoji=heart04> 응으읏…… 후아아앗」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おま○こに集中するのも悪くないだろ？」"
translation = "「보지에 집중하는 것도 나쁘지 않지?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はいぃ<emoji=heart04>\u3000おち○ぽ様でキスされるのも、気持ちいいですぅっ……！」"
translation = "「네, 네에<emoji=heart04> 자지님으로 키스당하는 것도, 기분 좋아요오옷……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリ、ところで約束って覚えてる？」"
translation = "「히토리, 그런데 약속은 기억하고 있어?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「えっ？\u3000あっ、あんっ<emoji=heart04>\u3000や、約束……？」"
translation = "「엣? 앗, 안앗<emoji=heart04> 야, 약속……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「次にエッチする時まで、オナニー禁止だって言ってただろ？」"
translation = "「다음에 섹스할 때까지, 자위 금지라고 했었잖아?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ……は、はい……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ……！」"
translation = "「앗…… 네, 네에……<emoji=heart04> 응<emoji=heart04> 후아앗……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで……結果はどうだった？\u3000ちゃんと我慢できた？」"
translation = "「그래서…… 결과는 어땠어? 제대로 참았어?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、それはぁ……<emoji=heart04>\u3000あっ……んうぅっ……！」"
translation = "「그, 그건……<emoji=heart04> 앗…… 응으읏……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご、ごめんなさい<emoji=heart04>\u3000本当は我慢できなくて……あっ、はぁんっ<emoji=heart04>\u3000何度かオナニーしちゃってましたぁっ……！」"
translation = "「죄, 죄송해요<emoji=heart04> 사실은 참지 못해서…… 앗, 하아앙<emoji=heart04> 몇 번인가 자위해버렸어요오옷……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どんな妄想をしたの？」"
translation = "「어떤 망상을 했어?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「こ、こんな風に、ご主人様に攻められて……あっ、あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000何度もイかされちゃう妄想ですぅ<emoji=heart04>」"
translation = "「이, 이런 식으로, 주인님에게 공격당해서…… 앗, 앗<emoji=heart04> 응아앗<emoji=heart04> 몇 번이나 가버리는 망상이에요오」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうか……じゃあ――期待に応えないとなっ……！」"
translation = "「그래…… 그럼―― 기대에 부응해줘야겠네……!」"

[[dialogue]]
speaker = "unk"
original = "俺は慣れて来たおま○こを、本格的に攻め始める。"
translation = "나는 익숙해진 보지를, 본격적으로 공격하기 시작한다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃっ！？\u3000ふああぁっ<emoji=heart04>\u3000おち○ぽ様、わたしの弱いところにゴリゴリってぇ<emoji=heart04>\u3000あっ、あっ、そこダメぇっ<emoji=heart04>\u3000んっ、はあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「냐앗!? 후아아앗<emoji=heart04> 자지님, 제 약한 곳을 고득고득 문질러서어<emoji=heart04> 앗, 앗, 거기 안 돼앳<emoji=heart04> 응, 하아앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でもヒトリは、ここを強くされるのが好きだろ？」"
translation = "「하지만 히토리는, 여기를 강하게 당하는 걸 좋아하잖아?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、んっ、はあぁんっ<emoji=heart04>\u3000そ、それはぁっ<emoji=heart04>」"
translation = "「앗, 응, 하아앙<emoji=heart04> 그, 그건……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、止めちゃう？」"
translation = "「그럼, 멈출까?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あぁっ、やぁぁっ<emoji=heart04>\u3000言いますっ<emoji=heart04>\u3000ご主人様の言う通りです<emoji=heart04>\u3000好きですぅっ<emoji=heart04>\u3000そこ強く擦られるの、気持ちいいのぉぉっ<emoji=heart04>」"
translation = "「아앗, 싫어어엇<emoji=heart04> 말할게요옷<emoji=heart04> 주인님 말씀대로예요<emoji=heart04> 좋아해요오옷<emoji=heart04> 거기 강하게 문질러지는 거, 기분 좋아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、あっ、ふあぁんっ<emoji=heart04>\u3000にゃあぁっ<emoji=heart04>\u3000はあぁっ、んっ<emoji=heart04>\u3000んうぅっ……ふああぁっ<emoji=heart04>\u3000あっ、んっ、はあぁっ……ふうぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 후아앙<emoji=heart04> 냐아아앗<emoji=heart04> 하아앗, 응<emoji=heart04> 응으읏…… 후아아앗<emoji=heart04> 앗, 응, 하아앗…… 후우웃<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「んっ、ふうぅっ……ご、ごめんなさい、ご主人様……はあぁっ……ふあぁっ<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>\u3000ふうぅっ……わ、わたしっ――」"
translation = "「응, 후우웃…… 죄, 죄송해요, 주인님…… 하아앗…… 후아앗<emoji=heart04> 앗, 하아앙<emoji=heart04> 후우웃…… 저, 저는――」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひ、久しぶりのおち○ぽ様が気持ちよくて……あっ、あんっ<emoji=heart04>\u3000もう、イクっ<emoji=heart04>\u3000んあぁぁっ……イっちゃいますぅっ<emoji=heart04>」"
translation = "「오, 오랜만의 자지님이 기분 좋아서…… 앗, 안앗<emoji=heart04> 이제, 가아<emoji=heart04> 응아아앗…… 가버려요오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ、もう？」"
translation = "「엣, 벌써?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ごめっ……ごめんなさいぃっ<emoji=heart04>\u3000すぐにイっちゃう、よわよわおま○こで……！\u3000でももうっ！\u3000ああっ、イクっ――<emoji=heart04>」"
translation = "「죄송…… 죄송해요오옷<emoji=heart04> 금방 가버리는, 허접 보지라서……! 하지만 이제! 아앗, 가아――<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「イク、イクイクイクっ<emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다, 간다간다간다앗<emoji=heart04><emoji=heart04> 가앗――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっくうぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「냐아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어~~~엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プシッと潮を吹きながら、ヒトリは背中を仰け反らせ、ビクビクと果ててしまう。"
translation = "푸쉿 하고 애액을 뿜으며, 히토리는 등을 뒤로 젖히고, 파르르 떨며 가버린다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――はああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふうぅっ……！\u3000はあぁっ……んうぅっ……<emoji=heart04>」"
translation = "「――하아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 후우웃……! 하아앗…… 응으읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリは相変わらず、すぐにイっちゃうくらい敏感な体で……やっぱりスケベだな」"
translation = "「히토리는 여전히, 금방 가버릴 정도로 민감한 몸이라서…… 역시 음란하네.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ふぇっ！？\u3000――にゃああぁっ！？\u3000あっ、あっ、ひいぃっ<emoji=heart04>\u3000ご主人様、ダメっ<emoji=heart04>\u3000イったばかりなのに、すぐ動くのダメぇっ<emoji=heart04>」"
translation = "「훼!? ――냐아아앗!? 앗, 앗, 히이잇<emoji=heart04> 주인님, 안 돼<emoji=heart04> 방금 갔는데, 바로 움직이는 거 안 돼앳<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、はあぁっ、んあぁっ<emoji=heart04>\u3000あっ、あっ、にゃあんっ<emoji=heart04>\u3000あっ、ダメダメ、はひぃんっ<emoji=heart04>\u3000にゃっ、にゃあぁっ<emoji=heart04>\u3000ふにゃああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 하아앗, 응아앗<emoji=heart04> 앗, 앗, 냐앙<emoji=heart04> 앗, 안 돼 안 돼, 하히잉<emoji=heart04> 냐앗, 냐아아앗<emoji=heart04> 후냐아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ご主人様より先に、ヒトリだけでイっちゃったお仕置きだ……っ」"
translation = "「주인님보다 먼저, 히토리 혼자 가버린 벌이다……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃあぁっ<emoji=heart04>\u3000ご、ごめんなさいぃっ<emoji=heart04>\u3000ひっ、ひっ、ひぃんっ<emoji=heart04>\u3000許して下さいぃっ<emoji=heart04>」"
translation = "「냐아아앗<emoji=heart04> 죄, 죄송해요오옷<emoji=heart04> 히잇, 히잇, 히잉<emoji=heart04> 용서해 주세요오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、あっ、あひぃっ<emoji=heart04>\u3000んっ、はっ、ひあぁっ<emoji=heart04>\u3000はひぃんっ<emoji=heart04>\u3000そこ、そこ気持ちいぃっ<emoji=heart04>\u3000あっ、あっ、ひあぁっ<emoji=heart04>\u3000はぁっ、はぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 아히잇<emoji=heart04> 응, 핫, 히아앗<emoji=heart04> 하히잉<emoji=heart04> 거기, 거기 기분 좋아앗<emoji=heart04> 앗, 앗, 히아앗<emoji=heart04> 하아, 하아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "泣きそうな声を出しつつも、おま○こは俺のペニスに再び強く絡み付いて来る。"
translation = "울 것 같은 목소리를 내면서도, 보지는 내 페니스에 다시금 강하게 휘감겨 온다."

[[dialogue]]
speaker = "unk"
original = "ヒトリはＭっ気がかなり強いことを俺は知っている。それと同時にＳっ気も煽って来るような魔性の魅力があり、俺もついつい興奮を覚えてしまう。"
translation = "히토리는 M 기질이 꽤 강하다는 것을 나는 알고 있다. 그와 동시에 S 기질도 자극하는 마성의 매력이 있어, 나도 모르게 흥분을 느끼고 만다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、あっ、あひっ<emoji=heart04>\u3000敏感なおま○こ、おち○ぽ様で掻き回されてぇっ<emoji=heart04>\u3000はあぁっ、あっ、あっ、はひぃっ<emoji=heart04>\u3000おかしくなっちゃいますぅっ<emoji=heart04>」"
translation = "「앗, 앗, 아히<emoji=heart04> 민감한 보지, 자지님으로 휘저어져서어앗<emoji=heart04> 하아앗, 앗, 앗, 하히잇<emoji=heart04> 이상해져 버려요오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあぁっ<emoji=heart04>\u3000はっ、はっ、んひぃっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000感じ過ぎちゃうっ<emoji=heart04>\u3000おま○こイったばかりなのに、また気持ちいいの登って来ちゃうぅっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 핫, 핫, 응히잇<emoji=heart04> 안 돼<emoji=heart04> 응아앗<emoji=heart04> 너무 느껴버려어<emoji=heart04> 보지 방금 갔는데, 또 기분 좋은 게 올라와 버려어어옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、あっ、あひぃっ<emoji=heart04>\u3000おま○こ、しゅごいぃっ<emoji=heart04>\u3000あっ、あっ、んああぁっ<emoji=heart04>\u3000気持ちいぃっ<emoji=heart04>\u3000んっ、あっ、あっ<emoji=heart04>\u3000んにゃあぁっ<emoji=heart04>\u3000ご主人様ぁっ<emoji=heart04>」"
translation = "「앗, 앗, 아히잇<emoji=heart04> 보지, 굉장해애애잇<emoji=heart04> 앗, 앗, 응아아앗<emoji=heart04> 기분 좋아앗<emoji=heart04> 응, 앗, 앗<emoji=heart04> 응냐아아앗<emoji=heart04> 주인님아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、ま、またイクっ<emoji=heart04>\u3000イキますぅっ<emoji=heart04>\u3000あっ、あっ、あひっ<emoji=heart04>\u3000ひあああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 또, 또 가아<emoji=heart04> 가버려요오옷<emoji=heart04> 앗, 앗, 아히<emoji=heart04> 히아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、イクっ、イクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 간다, 간다간다간다간다앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「イっ――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가앗――앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「イックぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふにゃあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000……はあああぁぁぁ～～～っ<emoji=heart04>\u3000ふうぅ～っ……<emoji=heart04>」"
translation = "「가버려어어어어~~~엇<emoji=heart04><emoji=heart04><emoji=heart04> 후냐아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> ……하아아아아아~~~앗<emoji=heart04> 후우우~웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "再びイってしまい、潮をプシーッと吹きながら、ビクビクと体を震わせるヒトリ。"
translation = "다시 가버리며, 애액을 푸쉬익 뿜으며 파르르 몸을 떠는 히토리."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の呼吸が少し落ち着くまで待ってから、ピストンを再開する。"
translation = "나는 그녀의 호흡이 조금 진정될 때까지 기다렸다가, 피스톤질을 재개한다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ！？\u3000ひっ、ひいぃっ<emoji=heart04>\u3000おち○ぽ様、待って下さいぃ<emoji=heart04>\u3000おま○こ<emoji=heart04>\u3000おま○こおかしくなっちゃうっ<emoji=heart04>\u3000本当におかしくなっちゃいますからぁっ<emoji=heart04>」"
translation = "「앗!? 히, 히이잇<emoji=heart04> 자지님, 기다려 주세요오오<emoji=heart04> 보지<emoji=heart04> 보지 이상해져 버려어<emoji=heart04> 정말로 이상해져 버리니까요오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「このままじゃ、イクの止まらなく、なっちゃいますぅっ<emoji=heart04>\u3000あっ、あっ、あひっ<emoji=heart04>\u3000ひあああぁっ<emoji=heart04>」"
translation = "「이대로라면, 가는 게 멈추지 않게, 되어버려요오옷<emoji=heart04> 앗, 앗, 아히<emoji=heart04> 히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はっ、あっ、ふああぁっ<emoji=heart04>\u3000はひぃっ<emoji=heart04>\u3000あっ、んっ……にゃあぁっ<emoji=heart04>\u3000あっ、あっ、あひっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04>」"
translation = "「핫, 앗, 후아아앗<emoji=heart04> 하히잇<emoji=heart04> 앗, 응…… 냐아아앗<emoji=heart04> 앗, 앗, 아히<emoji=heart04> 히아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリだけ何度もイっちゃってずるいぞ。ご主人様を置いて、自分だけ気持ち良くなってちゃダメだろ？」"
translation = "「히토리만 몇 번이나 가버리다니 치사한걸. 주인님을 두고 자기만 기분 좋아지면 안 되잖아?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ごめっ<emoji=heart04>\u3000ごめんなさいぃっ<emoji=heart04>\u3000あっ、あっ……んひぃ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「죄송…… 죄송해요오옷<emoji=heart04> 앗, 앗…… 응히이<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、待って<emoji=heart04>\u3000待って下さい<emoji=heart04>\u3000ご主人様、わたし、出ちゃいそうです<emoji=heart04>」"
translation = "「앗, 기다려<emoji=heart04> 기다려 주세요<emoji=heart04> 주인님, 저, 나올 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「またイって、お潮が出ちゃいそうのか？」"
translation = "「또 가서, 애액이 나올 것 같아?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ち、違うんです<emoji=heart04>\u3000お潮じゃなくて、その――」"
translation = "「아, 아니에요<emoji=heart04> 애액이 아니라, 그――」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ほ、本当のおしっこが出ちゃいそうで……！」"
translation = "「저, 정말로 오줌이 나올 것 같아서……!」"

[[dialogue]]
speaker = "unk"
original = "一瞬、思考が止まる。"
translation = "순간, 사고가 정지한다."

[[dialogue]]
speaker = "unk"
original = "エッチを中断しようかとも考えたが――"
translation = "섹스를 중단할까도 생각했지만――"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……いいよ。出しちゃっても」"
translation = "「……괜찮아. 싸버려도.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「えっ！？\u3000ご、ご主人様……！？」"
translation = "「엣!? 주, 주인님……!?」"

[[dialogue]]
speaker = "unk"
original = "俺の中で欲望の方が勝って、彼女の耳元で囁く。"
translation = "내 안에서 욕망이 승리하여, 그녀의 귓가에 속삭인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリが漏らしながらイっちゃうところ、見てみたい」"
translation = "「히토리가 지리면서 가버리는 모습, 보고 싶어.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、そんなぁっ<emoji=heart04>」"
translation = "「그, 그런어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もそろそろ出したくなって来たから、本気で動くぞ？」"
translation = "「나도 슬슬 싸고 싶어졌으니까, 본격적으로 움직인다?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、ご主人様、待っ――」"
translation = "「앗, 주인님, 기다――」"

[[dialogue]]
speaker = "unk"
original = "俺はそのまま腰の動きを激しくする。"
translation = "나는 그대로 허리 움직임을 격렬하게 한다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ！？\u3000ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000本気ピストン、ダメぇぇぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、ひっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04>\u3000はっ、はっ、はぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗!? 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 본격 피스톤, 안 돼애애애앳<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앗, 히잇<emoji=heart04> 히아아앙<emoji=heart04> 핫, 핫, 하앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000激しいぃっ<emoji=heart04>\u3000ダメダメっ<emoji=heart04>\u3000ダメですぅっ<emoji=heart04>\u3000あっ、あっ、ひいぃっ<emoji=heart04>\u3000はっ、はっ、はっ<emoji=heart04>\u3000はひいぃんっ<emoji=heart04>」"
translation = "「냐앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04> 격렬해애잇<emoji=heart04> 안 돼 안 돼앗<emoji=heart04> 안 돼요오옷<emoji=heart04> 앗, 앗, 히이잇<emoji=heart04> 핫, 핫, 핫<emoji=heart04> 하히이이잉<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「おち○ぽ様、気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000あひぃんっ<emoji=heart04>\u3000奥までジュボジュボ気持ちいいのぉっ<emoji=heart04>\u3000ひっ、ひっ、ひあぁっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04>」"
translation = "「자지님, 기분 좋아앗<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 아히이잉<emoji=heart04> 안쪽까지 쥬보쥬보 기분 좋아아앗<emoji=heart04> 히잇, 히잇, 히아앗<emoji=heart04> 히아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「こんなのすぐイっちゃうっ<emoji=heart04>\u3000あっ、あっ、あひぃんっ<emoji=heart04>\u3000我慢、我慢できなくなっちゃいますぅっ<emoji=heart04>\u3000ひっ、ひっ、ひいぃっ<emoji=heart04>\u3000ふひいぃんっ<emoji=heart04>」"
translation = "「이런 거 금방 가버려어엇<emoji=heart04> 앗, 앗, 아히이잉<emoji=heart04> 참는 거, 참을 수 없게 되어버려요오옷<emoji=heart04> 히잇, 히잇, 히이잇<emoji=heart04> 후히이이잉<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「イったら絶対おしっこ出ちゃいますぅっ<emoji=heart04>\u3000あっ、あっ、ひあぁっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「가버리면 분명 오줌 나와버려요오옷<emoji=heart04> 앗, 앗, 히아앗<emoji=heart04> 앗, 앗, 안앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで片手を伸ばして、彼女のピンッと固くなったクリを指で弄る。"
translation = "나는 거기서 한쪽 손을 뻗어, 그녀의 꼿꼿하게 굳은 클리를 손가락으로 만진다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「っ！？\u3000んにゃああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ご、ご主人様、このタイミングでクリを弄るのダメぇっ<emoji=heart04>」"
translation = "「!? 응냐아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 주, 주인님, 이 타이밍에 클리를 만지는 건 안 돼앳」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、あっ、ひあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>\u3000コリコリするのダメなのぉっ<emoji=heart04>\u3000ひっ、ひっ、ひっ<emoji=heart04>\u3000ふひいぃんっ<emoji=heart04>」"
translation = "「앗, 앗, 히아앗<emoji=heart04> 후아아앙<emoji=heart04> 고리고리 하는 거 안 되는 거어엇<emoji=heart04> 히잇, 히잇, 히잇<emoji=heart04> 후히이이잉<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「おしっこ我慢してるのにぃ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04><emoji=heart04>\u3000ひっ、出ちゃっ、本当に出ちゃうっ<emoji=heart04>」"
translation = "「오줌 참고 있는데에<emoji=heart04> 앗, 앗, 앗<emoji=heart04><emoji=heart04> 히잇, 나와버려, 정말로 나와버려어앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「おしっこ、本当に漏れちゃいますぅっ！\u3000んっ、んっ、んうぅっ<emoji=heart04>\u3000んっ、あっ、あっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「오줌, 정말로 지려버려요오옷! 응, 응, 응으읏<emoji=heart04> 응, 앗, 앗<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいよ、イっちゃえっ。お漏らししてるところも俺に見せて」"
translation = "「괜찮아, 가버려. 오줌 지리는 모습도 나한테 보여줘.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、あっ、ダメっ<emoji=heart04>\u3000来ちゃうっ<emoji=heart04>\u3000今までよりも大きいの来ちゃいますぅっ<emoji=heart04>」"
translation = "「앗, 앗, 안 돼앗<emoji=heart04> 와버려어앗<emoji=heart04> 지금까지보다 더 큰 게 와버려요오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、あっ、あっ<emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イク、イクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04><emoji=heart04> 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 간다, 간다간다간다간다앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様っ<emoji=heart04>\u3000あっ、あっあっあっあっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「주인님아앗<emoji=heart04> 앗, 앗앗앗앗앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아앗――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「イっクうううぅぅぅ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んああああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어~~~~~~~~엇<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ご主人様の精液、中にいっぱい入って来てますぅ～～～っ<emoji=heart04>」"
translation = "「하아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 주인님의 정액, 안에 가득 들어오고 있어요오오~~~옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ――ああああああっ！\u3000もうダメっ<emoji=heart04><emoji=heart04>\u3000おしっこ、出ちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――아아아아아앗! 이제 안 돼앗<emoji=heart04><emoji=heart04> 오줌, 나와버려어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「닛――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「냐아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おしっこ出ちゃってますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 오줌 나오고 있어요오오~~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あぁ～っ<emoji=heart04>\u3000こんな……ダメ、なのにぃ………！\u3000恥ずかしい、のにぃっ……<emoji=heart04>」"
translation = "「아아~앗<emoji=heart04> 이런 거…… 안 돼, 는데에………! 부끄러워, 운데에잇……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあぁ～っ……<emoji=heart04>\u3000でも、開放感がすごくて、気持ちいぃっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「하아아~앗……<emoji=heart04> 하지만, 해방감이 엄청나서, 기분 좋아앗……<emoji=heart04> 하아앗…… 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、彼女はしばらく放心したように、ぼーっとしていて。"
translation = "그러고 나서, 그녀는 한동안 넋이 나간 듯이 멍하니 있었고."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女のうなじに、そっとキスをする。"
translation = "나는 그런 그녀의 뒷덜미에, 살며시 키스를 한다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「んっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリ。意地悪してごめん。興奮して、調子に乗り過ぎたかも」"
translation = "「히토리. 심술궂게 굴어서 미안. 흥분해서, 너무 들떴던 것 같아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「とりあえず、落ち着いたら、汚れた体を洗いにお風呂に行こう」"
translation = "「일단, 진정되면 더러워진 몸을 씻으러 욕실에 가자.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……あの、ご主人様……」"
translation = "「……저기, 주인님……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様は……気持ちよかったですか？」"
translation = "「주인님은…… 기분 좋으셨나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。ヒトリのおかげで、一週間できなくて溜まってた分をこれでもかってくらい気持ち良く射精できた」"
translation = "「아아. 히토리 덕분에, 일주일 동안 못 해서 쌓였던 만큼을 질릴 정도로 기분 좋게 사정할 수 있었어.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「でしたら、その……わたし、ご褒美が欲しいです……<emoji=heart04>」"
translation = "「그렇다면, 그…… 저, 포상을 받고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒトリはそう言って、抜け出た俺のペニスを撫でながら――"
translation = "히토리는 그렇게 말하며, 빠져나온 내 페니스를 쓰다듬으면서――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「キスしながら、スケベな飼い猫おま○こにいっぱい種付けして欲しいです……にゃん<emoji=heart04>」"
translation = "「키스하면서, 음란한 집고양이 보지에 가득 씨뿌리기 해주셨으면 해요…… 냥<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "一旦、シャワーを浴びて休憩にしようと思っていた俺は、そのおねだりにみるみる復活してしまい――"
translation = "일단 샤워를 하고 휴식하려고 생각했던 나는, 그 조르기에 금세 부활해버렸고――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ……すごい<emoji=heart04>\u3000すぐに大きくなって――」"
translation = "「앗…… 굉장해<emoji=heart04> 금방 커져서――」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヒトリ……！」"
translation = "「히토리……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃんっ<emoji=heart04>\u3000ご主人様……<emoji=heart04>」"
translation = "「냥앗<emoji=heart04> 주인님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きだ、ヒトリ」"
translation = "「사랑해, 히토리.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ん……<emoji=heart04>\u3000わたしもです……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 저도예요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ちゅっ……<emoji=heart04>\u3000ちゅぷっ……ちゅぱっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 쮸웁…… 쮸왑……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺は彼女とキスをしながらの甘々な交尾で、１週間分の精液を吐き出すのだった――"
translation = "그 후, 나는 그녀와 키스를 하며 달콤한 교미로, 1주일 분의 정액을 쏟아내는 것이었다――"

