[[dialogue]]
speaker = "unk"
original = "第４話,『あれ』をせい！,P"
translation = "제4화, 『그것』을 해라!, P"

[[dialogue]]
speaker = "unk"
original = "今日も今日とて、俺の家へ遊びに来たクラウディア。"
translation = "오늘도 평소처럼, 내 집으로 놀러 온 클라우디아."

[[dialogue]]
speaker = "unk"
original = "彼女は魔女のお姫様という立場のせいか、会話を『あれ』や『それ』ですませることがよくある。例えば……"
translation = "그녀는 마녀의 공주님이라는 입장 때문인지, 대화를 『그것』이나 『저것』으로 때우는 경우가 자주 있다. 예를 들면……"

[[dialogue]]
speaker = "クラウディア"
original = "「お～い、まおー。あれだ、あれをせい～」"
translation = "「어~이, 마왕. 그것이다, 그것을 하느니라~」"

[[dialogue]]
speaker = "unk"
original = "お茶を淹れる"
translation = "차를 내온다"

[[dialogue]]
speaker = "unk"
original = "（……喉が渇いたのかな？）"
translation = "(……목이 마른 걸까?)"

[[dialogue]]
speaker = "クラウディア"
original = "「お、紅茶か。砂糖とミルクはたっぷり……うむ、入っておるな♪\u3000苦しゅうないぞ」"
translation = "「오, 홍차인가. 설탕과 우유는 듬뿍…… 음, 들어 있구나♪ 나쁘지 않느니라」"

[[dialogue]]
speaker = "クラウディア"
original = "「──って、そうではない！\u3000茶はありがたいが、余が求めたのはこれではないのだっ」"
translation = "「──랄까, 그게 아니니라! 차는 고맙다만, 여가 원한 것은 이것이 아니란 말이다!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほれ、いつものあれを忘れとるだろうが。わからんのか？」"
translation = "「보아라, 평소의 그것을 잊고 있지 않느냐. 모르겠느냐?」"

[[dialogue]]
speaker = "unk"
original = "ケーキをどうぞ"
translation = "케이크를 권한다"

[[dialogue]]
speaker = "unk"
original = "（あっ、お茶請けか）"
translation = "(앗, 곁들임 과자인가)"

[[dialogue]]
speaker = "クラウディア"
original = "「おぉ！\u3000けーきか！\u3000ほう、リノが余のために準備してくれていただと？\u3000では今度、礼を言っておかねばな」"
translation = "「오오! 케이크인가! 호오, 리노가 여를 위해 준비해 준 것이라고? 그럼 다음에 감사를 표해야겠구나」"

[[dialogue]]
speaker = "クラウディア"
original = "「基地では宿題を終わらせねば甘味は食えんのだ。いただくぞ！」"
translation = "「기지에서는 숙제를 끝내지 않으면 단것을 먹을 수 없느니라. 잘 먹으마!」"

[[dialogue]]
speaker = "クラウディア"
original = "「う～ん、うまいっ<emoji=heart04>\u3000大切に食べねばな。よし、苺は最後に食うとして……」"
translation = "「으~음, 맛있구나<emoji=heart04> 소중히 먹어야겠어. 좋아, 딸기는 마지막에 먹기로 하고……」"

[[dialogue]]
speaker = "クラウディア"
original = "「なに？\u3000まだあまっているから持って帰ってよい！？\u3000それはありがたい……！」"
translation = "「뭐냐? 아직 남아 있으니 가지고 돌아가도 좋다고!? 그것참 고맙구나……!」"

[[dialogue]]
speaker = "クラウディア"
original = "「──って、そうではな～～い！\u3000ケーキは大好物だが、余が求めたものと違う！\u3000あれと言ったら、あれだっ！」"
translation = "「──랄까, 그게 아니니라~~! 케이크는 아주 좋아하지만, 여가 원한 것과는 다르다! 그것이라고 하면, 그것이란 말이다!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアを膝に乗せて抱っこする"
translation = "클라우디아를 무릎에 앉히고 안아준다"

[[dialogue]]
speaker = "unk"
original = "（背もたれになればいいのかな……？）"
translation = "(등받이가 되어주면 되려나……?)"

[[dialogue]]
speaker = "クラウディア"
original = "「うむうむ♪\u3000余はソファに座るより、お前の膝上の方が落ち着くのだ」"
translation = "「음음♪ 여는 소파에 앉는 것보다, 네 무릎 위가 더 마음이 놓이느니라」"

[[dialogue]]
speaker = "クラウディア"
original = "「お、何だ？\u3000頭を撫でたいのか。よかろう、ナデナデするがよい！」"
translation = "「오, 무엇이냐? 머리를 쓰다듬고 싶은 게냐. 좋다, 쓰담쓰담 하거라!」"

[[dialogue]]
speaker = "クラウディア"
original = "「うむ……うむうむ……心地よいぞ、まおー<emoji=heart04>」"
translation = "「음…… 음음…… 기분 좋구나, 마왕<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「お前、撫でるのがうまいな。よし、角も触ってよいぞ、特別に許そう！」"
translation = "「너, 쓰다듬는 솜씨가 좋구나. 좋아, 뿔도 만져도 좋느니라, 특별히 허락하마!」"

[[dialogue]]
speaker = "クラウディア"
original = "「って、そうではないのだ～～～……！！\u3000この朴念仁め、なぜわからんのだ……！」"
translation = "「랄까, 그게 아니란 말이다~~~……!! 이 무뚝뚝한 녀석 같으니, 어찌하여 모르는 게냐……!」"

[[dialogue]]
speaker = "クラウディア"
original = "「余は……お、お前にキスをせいと言ったのだ。あれをしろと言ったらすぐに察さぬか、馬鹿者……」"
translation = "「여는…… 너, 너에게 키스를 하라고 한 것이니라. 그것을 하라고 하면 바로 알아채지 못하겠느냐, 바보 녀석……」"

[[dialogue]]
speaker = "unk"
original = "抱き寄せてキスをする"
translation = "끌어안고 키스를 한다"

[[dialogue]]
speaker = "unk"
original = "鈍感でごめん……"
translation = "둔해서 미안해……"

[[dialogue]]
speaker = "クラウディア"
original = "「んぅ、ちゅっ……ちゅ、ちゅぅっ……んちゅ……<emoji=heart04>」"
translation = "「응으, 츄…… 츄, 츄우…… 응츄……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「ぷぁ……うん、これだ。これをせいと言ったのだ。よいか、次からはちゃんとすぐに察して、キスをするのだぞ？」"
translation = "「푸하…… 응, 이것이니라. 이것을 하라고 한 것이니라. 알겠느냐, 다음부터는 제대로 바로 알아채고 키스를 하거라?」"

[[dialogue]]
speaker = "クラウディア"
original = "「──待て。まだだ。無駄にオアズケされたからな、余は満足しとらん。よいと言うまでキスをせんか」"
translation = "「──기다려라. 아직이니라. 헛되이 기다리게 했으니, 여는 만족하지 못했느니라. 좋다고 할 때까지 키스를 하지 않겠느냐」"

[[dialogue]]
speaker = "クラウディア"
original = "「んちゅっ、ちゅぅーっ……ん、ちゅっ<emoji=heart04>\u3000ちゅぅ<emoji=heart04>\u3000まおー……好きだぞ……ちゅ、んちゅぅ……ちゅっ<emoji=heart04>」"
translation = "「응츄, 츄우…… 응, 츄<emoji=heart04> 츄우<emoji=heart04> 마왕…… 좋아하느니라…… 츄, 응츄…… 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膝上に乗せたクラウディアを優しく抱きしめながら、俺はキスを続けた──"
translation = "무릎 위에 앉힌 클라우디아를 부드럽게 껴안으며, 나는 키스를 계속했다──"

[[dialogue]]
speaker = "unk"
original = "そうして、クラウディアが帰宅する時間になった。"
translation = "그렇게 해서, 클라우디아가 귀가할 시간이 되었다."

[[dialogue]]
speaker = "ウェンディ"
original = "「クラウディア様。お迎えに上がりました」"
translation = "「클라우디아 님. 모시러 왔습니다」"

[[dialogue]]
speaker = "クラウディア"
original = "「うむ。ご苦労だな、ウェンディ」"
translation = "「음. 수고가 많구나, 웬디」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ほっ……よかった。今日は普通の格好ですね。これなら無事に報告書を上げられそうです」"
translation = "「휴우…… 다행이다. 오늘은 평범한 차림이시네요. 이 정도라면 무사히 보고서를 올릴 수 있겠어요」"

[[dialogue]]
speaker = "クラウディア"
original = "「余だっていつもいつもお前を困らせたりせんわ。ではな、魔王」"
translation = "「여라고 해서 언제나 너를 곤란하게 하지는 않느니라. 그럼 이만, 마왕」"

[[dialogue]]
speaker = "クラウディア"
original = "「おっと、そうだ。あれを忘れておったわ。魔王よ、あれを頼む」"
translation = "「앗, 그렇구나. 그것을 잊고 있었구나. 마왕이여, 그것을 부탁하마」"

[[dialogue]]
speaker = "unk"
original = "今ここで……！？"
translation = "지금 여기서……!?"

[[dialogue]]
speaker = "unk"
original = "え……あれをやるの！？"
translation = "에…… 그걸 한다고!?"

[[dialogue]]
speaker = "ウェンディ"
original = "「……どうしたんですか、会長さん。そんなに慌てて」"
translation = "「……왜 그러세요, 회장님. 그렇게 당황해서」"

[[dialogue]]
speaker = "クラウディア"
original = "「同じことを二度言わせるでない。あれがなければ帰れんだろうが。ほれ、早う！」"
translation = "「같은 말을 두 번 하게 하지 마라. 그것이 없으면 돌아가지 못할 것 아니냐. 자, 어서!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアにキスをする"
translation = "클라우디아에게 키스를 한다"

[[dialogue]]
speaker = "unk"
original = "（ウェンディがいるけど……）"
translation = "(웬디가 있지만……)"

[[dialogue]]
speaker = "クラウディア"
original = "「んちゅっ……！？」"
translation = "「응츄……!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「いきなり何をしているんですかーーー！？」"
translation = "「갑자기 뭐 하시는 거예요ーーー!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「ばばば、馬鹿者っ！\u3000人前でキスするやつがあるか！\u3000ていうかさっきまで散々したではないかっ！\u3000まだし足りんのか！？」"
translation = "「바, 바바, 바보 녀석! 사람들 앞에서 키스하는 녀석이 어디 있느냐! 그보다 조금 전까지 실컷 하지 않았느냐! 아직도 부족한 게냐!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「散々していたんですか！？\u3000やめてください、聞きたくないです！！」"
translation = "「실컷 하셨다고요!? 그만두세요, 듣고 싶지 않아요!!」"

[[dialogue]]
speaker = "クラウディア"
original = "「余が言ったのはけーきだ、あまったものを持って帰ってよいと言っていたではないか！？」"
translation = "「여가 말한 것은 케이크니라, 남은 것을 가져가도 좋다고 하지 않았느냐!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「なにぃ、お別れのキスを命じられたと思っただと……！？\u3000む──？\u3000そう言われてみると、確かにアリかもしれんな……」"
translation = "「뭐라, 작별의 키스를 명받았다고 생각했다고……!? 음──? 그렇게 듣고 보니, 확실히 그럴싸할지도 모르겠구나……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「無しですよ！？\u3000また報告書に書けないことが増えるじゃないですか！？」"
translation = "「안 된다고요!? 또 보고서에 쓸 수 없는 일이 늘어나잖아요!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「よし、魔王。けーきを持ってこい。その後、もう一度お別れのキスをするのだ。さっきは不意打ちで楽しめなんだからな<emoji=heart04>」"
translation = "「좋다, 마왕. 케이크를 가져오너라. 그 후에 다시 한번 작별의 키스를 하는 것이니라. 방금은 기습이라 즐기지 못했으니까 말이다<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
original = "「却下ですーーー！！」"
translation = "「기각입니다ーーー!!」"

[[dialogue]]
speaker = "unk"
original = "ネビュラの姫であるクラウディアとの交際は、大変なことも多いけれど、今のところ順調だと思う。"
translation = "네뷸라의 공주인 클라우디아와의 교제는, 힘든 일도 많지만 지금으로서는 순조롭다고 생각한다."

[[dialogue]]
speaker = "unk"
original = "鈍感な俺なりに、これからも彼女に尽くしていこうと思うのだった。"
translation = "둔감한 나 나름대로, 앞으로도 그녀에게 헌신해 나가고자 생각하는 것이었다."

[[dialogue]]
speaker = "unk"
original = "それと、ウェンディ。いつも苦労をかけて本当にごめんなさい──"
translation = "그리고, 웬디. 언제나 고생시켜서 정말 미안해──"

