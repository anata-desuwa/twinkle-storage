[[dialogue]]
speaker = "unk"
original = "第８話,星の死,B"
translation = "제8화, 별의 죽음, B"

[[dialogue]]
speaker = "魔神ギエル"
original = "「魔王デモ、女神デモ、何人デモ連レテクルガイイ。今ノ私ニハ及バナイ」"
translation = "「마왕이든, 여신이든, 몇 명이든 데려올지어다. 지금의 나에게는 미치지 못한다」"

[[dialogue]]
speaker = "クロト"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "──全員が、地を這う。"
translation = "──전원이, 땅을 기어 다닌다."

[[dialogue]]
speaker = "unk"
original = "策はない。"
translation = "책략은 없다."

[[dialogue]]
speaker = "unk"
original = "燃料も尽きた。"
translation = "연료도 바닥났다."

[[dialogue]]
speaker = "unk"
original = "魔王の総力は投入済み。"
translation = "마왕의 총력은 이미 투입 완료."

[[dialogue]]
speaker = "クロト"
original = "（新たに打つ手は──もう、ない──）"
translation = "（새롭게 쓸 수 있는 수는── 이제, 없어──）"

[[dialogue]]
speaker = "unk"
original = "だからって終わっていいのか？\u3000このままで？\u3000負けるのか？"
translation = "그렇다고 해서 끝나도 되는 건가? 이대로? 지는 건가?"

[[dialogue]]
speaker = "unk"
original = "違う──そんなことあってはならない！"
translation = "아니── 그런 일은 있어서는 안 돼!"

[[dialogue]]
speaker = "クロト"
original = "「まだだ──俺たちは、まだ──ッ…………！」"
translation = "「아직이야── 우리들은, 아직──읏…………!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト……っ……！」"
translation = "「쿠로토……읏……!」"

[[dialogue]]
speaker = "unk"
original = "満身創痍のまま、立ち上がる。"
translation = "만신창이인 채로, 일어선다."

[[dialogue]]
speaker = "unk"
original = "たとえ矢が尽き、精神が枯れても──！"
translation = "설령 화살이 다하고, 정신이 메마르더라도──!"

[[dialogue]]
speaker = "魔神ギエル"
original = "「愚カナ。貴様ハ負ケタノダ。認メルガイイ、魔王──今度ハ貴様コソガ敗残者ダト！」"
translation = "「어리석군. 네놈은 패배한 것이다. 인정할지어다, 마왕── 이번에야말로 네놈이야말로 패잔자라고!」"

[[dialogue]]
speaker = "クロト"
original = "「違う──俺たちは、まだ、負けてなんか──ぐ──ッ……！！」"
translation = "「아니── 우리들은, 아직, 지지 않았어── 크──읏……!!」"

[[dialogue]]
speaker = "アポロ"
original = "「っ、ああ……！\u3000あたしは、あたしが擦り切れてなくなるまで戦ってやる──！」"
translation = "「읏, 아아……! 나는, 내가 닳아 없어질 때까지 싸워주겠어──!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ここに、力を──結集しましょう」"
translation = "「여기에, 힘을── 결집합시다」"

[[dialogue]]
speaker = "クロト＆フィオナ"
original = "「<ruby>最終審判の時<rt>エーテル</rt></ruby>・<ruby>光の制裁<rt>パニッシュメント</rt></ruby>──！！」"
translation = "「최종 심판의 때・빛의 제재──!!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「──マダ判ラヌトイウノカ」"
translation = "「──아직도 모른다는 것인가」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「──呑メ」"
translation = "「──삼켜라」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "──あまりにも儚い結末だった。"
translation = "──너무나도 덧없는 결말이었다."

[[dialogue]]
speaker = "unk"
original = "最後の力を振り絞って繰り出した『光の制裁』さえ──奴のひと呼吸で生まれたブラックホールに吸い込まれて、消える。"
translation = "마지막 힘을 쥐어짜내서 내보낸 『빛의 제재』조차── 그 녀석의 한 호흡으로 태어난 블랙홀에 빨려 들어가, 사라진다."

[[dialogue]]
speaker = "マトイ"
original = "「そん……な……指先、ひとつで……」"
translation = "「이럴…… 수가…… 손가락, 하나로……」"

[[dialogue]]
speaker = "unk"
original = "ギエルはもはや、俺たちを圧倒しようとも、喜びすらしなくなっていた。"
translation = "기엘은 더 이상, 우리들을 압도하더라도, 기쁨조차 느끼지 않게 되었다."

[[dialogue]]
speaker = "魔神ギエル"
original = "「──跪ケ」"
translation = "「──무릎 꿇어라」"

[[dialogue]]
speaker = "クロト"
original = "「ガッ──！」"
translation = "「컥──!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト──ッ！」"
translation = "「쿠로토──읏!」"

[[dialogue]]
speaker = "unk"
original = "倒れた俺の頭を強烈に踏みにじられる。"
translation = "쓰러진 나의 머리를 강렬하게 짓밟는다."

[[dialogue]]
speaker = "unk"
original = "そんな、恐るべき屈辱を受けてなお……立てない。"
translation = "그런, 두려운 굴욕을 당하고도…… 일어설 수 없다."

[[dialogue]]
speaker = "魔神ギエル"
original = "「哀レナモノダ。魔王ダ英雄ダト云エドモ、コンナニモ矮小ナ存在デシカナイ」"
translation = "「가련한 것이다. 마왕이다 영웅이다 말하더라도, 이렇게나 왜소한 존재에 불과하다」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「所詮ハラクシスノ紛イ物カ。己ガ無力サヲ噛ミ締メテ朽チロ」"
translation = "「결국 라크시스의 짝퉁인가. 자신의 무력함을 곱씹으며 썩어 문드러져라」"

[[dialogue]]
speaker = "クロト"
original = "「──ぁ……が、ッ──っ……！！」"
translation = "「──아…… 컥, 읏──읏……!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──やっ……やめて……！\u3000クロトが……クロトが死んじゃう──っ……！」"
translation = "「──흐윽…… 그만해……! 쿠로토가…… 쿠로토가 죽어버려──읏……!」"

[[dialogue]]
speaker = "unk"
original = "何度も。何度も。"
translation = "몇 번이고. 몇 번이고."

[[dialogue]]
speaker = "unk"
original = "超大質量の踏みつけを頭上に落とされ、意識も痛覚もぐちゃぐちゃにされていく。"
translation = "초대질량의 짓밟힘이 머리 위로 떨어지고, 의식도 통각도 엉망진창이 되어 간다."

[[dialogue]]
speaker = "魔神ギエル"
original = "「サラバダ。オマエ達ヲ滅シタ後、残ル三界ヲ始末スルトシヨウ」"
translation = "「잘 가라. 너희들을 멸한 후, 남은 삼계를 처분하도록 하지」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「本物ノ──『星ノ死』トイウモノヲ教エテヤル。マクロ・ノヴァ・ブラスト──」"
translation = "「진정한── 『별의 죽음』이라는 것을 가르쳐 주마. 매크로 노바 블래스트──」"

[[dialogue]]
speaker = "クロト"
original = "「ギエ──ル……」"
translation = "「기엘──을……」"

[[dialogue]]
speaker = "unk"
original = "炸裂する星の終わり──超新星爆発。"
translation = "작렬하는 별의 종말── 초신성 폭발."

[[dialogue]]
speaker = "unk"
original = "目の前が真っ暗になる。"
translation = "눈앞이 캄캄해진다."

[[dialogue]]
speaker = "unk"
original = "絶望だった。"
translation = "절망이었다."

[[dialogue]]
speaker = "unk"
original = "俺たちは紛れもなく負けていた。"
translation = "우리들은 틀림없이 지고 있었다."

[[dialogue]]
speaker = "クロト"
original = "（終わり──なのか──）"
translation = "（끝──인 건가──）"

[[dialogue]]
speaker = "unk"
original = "俺たちは頑張った。"
translation = "우리들은 노력했다."

[[dialogue]]
speaker = "unk"
original = "何度だって奇跡を起こしてきた。"
translation = "몇 번이고 기적을 일으켜 왔다."

[[dialogue]]
speaker = "unk"
original = "だけど、それも、いずれは限界を迎えるものだったんだ。"
translation = "하지만, 그것도, 언젠가는 한계를 맞이하는 것이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（結局──運命は変えられなかった──世界を、渡っても──）"
translation = "（결국── 운명은 바꿀 수 없었어── 세계를, 건너왔어도──）"

[[dialogue]]
speaker = "アポロ"
original = "（あたしのせいだ──あたしの心の弱さが、全部──）"
translation = "（내 탓이야── 내 마음의 나약함이, 전부──）"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "（遅かった──最初から私が、もっと、姉さんを助けることができていたら──）"
translation = "（늦었어── 처음부터 내가, 좀 더, 언니를 도울 수 있었더라면──）"

[[dialogue]]
speaker = "unk"
original = "俺たちが運命の歯車を奇跡的に噛み合わせて出会ったのと同様に。"
translation = "우리들이 운명의 톱니바퀴를 기적적으로 맞물려 만나게 된 것처럼."

[[dialogue]]
speaker = "unk"
original = "絡み合った運命の糸は、こんな化け物をも生んでしまった。"
translation = "얽히고설킨 운명의 실타래는, 이런 괴물마저도 낳아 버렸다."

[[dialogue]]
speaker = "unk"
original = "それも総ては──宇宙の意志の、掌の上なのかもしれなくて。"
translation = "그 모든 것 또한── 우주의 의지, 손바닥 위일지도 몰라서."

[[dialogue]]
speaker = "クロト"
original = "（デネブも──ベガも──そして、アルタイルも……同じ結末を辿るんだ、な……）"
translation = "（데네브도── 베가도── 그리고, 알타이르도…… 같은 결말을 밟는 거구나, 하고……）"

[[dialogue]]
speaker = "unk"
original = "脳裏にふと、かつての暦の末路が浮かんだ。"
translation = "뇌리에 문득, 옛 역사의 말로가 떠올랐다."

[[dialogue]]
speaker = "unk"
original = "どんな世界もいつかは、ああやって終わりを迎えるのだ。"
translation = "어떤 세계도 언젠가는, 저렇게 끝을 맞이하는 것이다."

[[dialogue]]
speaker = "unk"
original = "今の俺たちと同じように、散っていった戦士なんか、星の数ほどいたのだろう。"
translation = "지금의 우리들과 마찬가지로, 스러져 간 전사 따위, 별의 수만큼 있었겠지."

[[dialogue]]
speaker = "unk"
original = "だから──もう、諦めたって、仕方が……"
translation = "그러니── 이제, 포기한다고 해도, 어쩔 수……"

