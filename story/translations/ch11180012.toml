[[dialogue]]
speaker = "unk"
original = "第２話,ナターシャのランチ,P"
translation = "제2화, 나타샤의 런치, P"

[[dialogue]]
speaker = "unk"
original = "昼食を軽く済ませようと思って購買に行くと、珍しい面々がいた。"
translation = "점심을 가볍게 때우려고 매점에 가니, 보기 드문 면면들이 있었다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ん～、お昼どうしよっかなー……と言いつつ、いつものにしちゃうんだけどね」"
translation = "「음~, 점심 어떡할까나─……라고 말하면서, 늘 먹던 걸로 하겠지만 말이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「またゼリー飲料か？\u3000手早く飲めるのはいいが、そればかりでは栄養が足りないぞ」"
translation = "「또 젤리 음료냐? 간편하게 마실 수 있는 건 좋다만, 그것만으로는 영양이 부족하다고.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「というか、ゼリーだけだと味気なくない？\u3000せっかく流星市国に来たんだから、美味しいもの食べないと人生損だよ」"
translation = "「그보다, 젤리만 먹으면 무미건조하지 않아? 어렵사리 유성시국에 왔으니까, 맛있는 걸 먹지 않으면 인생 손해야.」"

[[dialogue]]
speaker = "unk"
original = "俺もしっかり食べた方がいいと思う"
translation = "나도 든든히 먹는 게 좋다고 생각해."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おや、会長さん、奇遇だね──って、でもないか。学生がお昼時に購買で会うのは普通のことだし」"
translation = "「오야, 회장님, 기우네── 가 아니라, 그렇지도 않나. 학생이 점심시간에 매점에서 만나는 건 보통 일이니까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だけど、そう言われても何食べていいかわからないんだよ。元々食べ物に興味ない方だから」"
translation = "「하지만, 그렇게 말해도 뭘 먹어야 좋을지 모르겠단 말이지. 원래 음식에 흥미가 없는 편이라서.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それは難儀だな……。よし！\u3000じゃあそんなナターシャのために、あたしたちが<ruby>昼飯<rt>ひるめし</rt></ruby>を考えてやろうじゃないか！」"
translation = "「그건 난처하군……. 좋아! 그럼 그런 나타샤를 위해서, 우리들이 점심을 생각해 주지 않겠어!」"

[[dialogue]]
speaker = "unk"
original = "というわけで、選挙管理委員会のメンバーが、おすすめのメニューをナターシャにプレゼンすることになった。"
translation = "그리하여, 선거관리위원회 멤버들이 추천 메뉴를 나타샤에게 프레젠테이션하게 되었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「まずはあたしだ！\u3000一発でナターシャのフェイバリットメニューを決めてやるぜ！」"
translation = "「우선 나다! 한 방에 나타샤의 페이보릿 메뉴를 정해 주겠어!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「へぇ、そこまで言うなら期待させてもらおうかな」"
translation = "「헤에, 그렇게까지 말한다면 기대해 볼까나.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしのおすすめメニューは……鯖の味噌煮定食だ！」"
translation = "「내 추천 메뉴는…… 고등어 된장 조림 정식이다!」"

[[dialogue]]
speaker = "unk"
original = "いぶし銀なチョイスだ……！"
translation = "중후한 선택이다……!"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それじゃいただきまーす。あ～ん」"
translation = "「그럼 잘 먹겠습니다─. 아~앙.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「見た目は地味かもしれないが、美味いんだぜ！\u3000鯖味噌は奥が深いんだ！」"
translation = "「겉보기엔 수수할지 몰라도, 맛있다고! 고등어 된장은 깊이가 있어!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふーん、こんな感じなんだ」"
translation = "「흐응, 이런 느낌이구나.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「反応薄っ！？」"
translation = "「반응이 미적지근해!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「確かに複雑な味をしてるけど、それ以上は何も思わないかな。感動がなくてごめん」"
translation = "「확실히 복잡한 맛이 나긴 하지만, 그 이상은 아무 생각도 안 드네. 감동이 없어서 미안.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「じゃあ私はこのニンニクたっぷり餃子を──」"
translation = "「그럼 나는 이 마늘 듬뿍 만두를──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ、私、匂いの強いものは食べないようにしてるから。暗殺者的に。ごめんね」"
translation = "「아, 나, 냄새가 강한 건 안 먹으려고 하거든. 암살자적으로. 미안해.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え～～っ！？」"
translation = "「에에~~!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ていうかベアト、すでにニンニクくさい」"
translation = "「그보다 베아트, 벌써 마늘 냄새나.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ウソっ！？\u3000さっき餃子食べたから！？」"
translation = "「거짓말!? 아까 만두 먹어서 그런가!?」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアのメニューとしていいのかな……？"
translation = "카페테리아 메뉴로서 괜찮은 걸까……?"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトは実食の前に失格か。では私が最後だな」"
translation = "「베아트는 시식 전부터 실격인가. 그럼 내가 마지막이군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私のおすすめメニューは……イギリス料理の定番、フィッシュ＆チップスだ。カフェテリアのものはレベルが高いぞ」"
translation = "「내 추천 메뉴는…… 영국 요리의 대명사, 피쉬 앤 칩스다. 카페테리아의 것은 수준이 높다고.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「どれどれ……はむ。……うん、魚と芋だね」"
translation = "「어디 보자…… 냠. ……응, 생선이랑 감자네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くっ……負けた」"
translation = "「큭…… 졌다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いや勝負じゃないだろ」"
translation = "「아니 승부가 아니잖아.」"

[[dialogue]]
speaker = "unk"
original = "３人とも撃沈。万事休すかと思われたが──"
translation = "세 명 모두 격침. 속수무책이라 생각되던 찰나──"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ん？\u3000梨緒、何か持ってる？」"
translation = "「응? 리오, 뭐 들고 있어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、自分で作ったサンドイッチだ。星見家で世話になりっぱなしだから、食費を浮かせようと思ってな。学食よりは安上がりだ」"
translation = "「아아, 직접 만든 샌드위치다. 호시미가에서 신세만 지고 있으니, 식비를 아껴 볼까 해서 말이지. 학식보다는 저렴하게 치인다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「へー、梨緒って意外と料理できるんだ」"
translation = "「헤─, 리오는 의외로 요리할 줄 아네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、サンドイッチくらい誰でも作れるだろう。基本挟むだけだし、シンプルな具なら作るのも簡単だ」"
translation = "「아니, 샌드위치 정도는 누구나 만들 수 있잖아. 기본적으로 끼워 넣기만 하면 되고, 심플한 재료라면 만드는 것도 간단하다.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「世の中にはその『くらい』ができない人もいるんだよ！」"
translation = "「세상에는 그 『정도』를 못 하는 사람도 있다고!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ベアト、サンドイッチ作れないのか……」"
translation = "「베아트, 샌드위치 못 만드는 거냐……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だって私が挟むと崩れちゃうんだも～んっ」"
translation = "「그치만 내가 끼우면 다 무너진단 말야아~」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「コツならあとで教える……。で、このサンドイッチがどうした？」"
translation = "「요령이라면 나중에 알려 주지……. 그래서, 이 샌드위치가 왜?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それもらっていい？」"
translation = "「그거 받아도 돼?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「別に構わないが……何の変哲もない、ハムとチーズのサンドイッチだぞ？」"
translation = "「별로 상관은 없다만…… 아무런 특징도 없는, 햄과 치즈 샌드위치라고?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、それがいいの。ちょうだい？」"
translation = "「응, 그게 좋아. 줄래?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そこまで言うならいいが……口に合わなくても知らないからな」"
translation = "「그렇게까지 말한다면야 상관없지만…… 입에 안 맞아도 난 모른다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ありがと。……あ～ん。あむあむ」"
translation = "「고마워. ……아~앙. 냠냠.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、悪くないね」"
translation = "「응, 나쁘지 않네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうか？\u3000特にナターシャが気に入る要素はなかったと思うんだが……」"
translation = "「그러냐? 딱히 나타샤가 맘에 들어 할 요소는 없었다고 생각한다만……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「味は普通なんだけど、梨緒のサンドイッチだと思うと、なんかいいなって」"
translation = "「맛은 평범한데, 리오의 샌드위치라고 생각하니까 왠지 좋네 싶어서.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ナターシャ……」"
translation = "「나타샤……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒が朝早く起きて作るの想像したら、苦労の味がするよね」"
translation = "「리오가 아침 일찍 일어나서 만드는 걸 상상하니까, 고생의 맛이 나네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ナターシャ！」"
translation = "「나타샤!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「梨緒のサンドイッチか、あたしも気になるな。ちょっとくれ」"
translation = "「리오의 샌드위치인가, 나도 궁금한걸. 좀 줘 봐.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ、私も欲しいなー」"
translation = "「아, 나도 먹고 싶어─」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そもそも私の昼食なんだが……まぁいいか。普通のサンドイッチでよければ食べてくれ」"
translation = "「애초에 내 점심이다만…… 뭐 됐나. 평범한 샌드위치라도 괜찮다면 먹어라.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「じゃあ私ももうひとつ」"
translation = "「그럼 나도 하나 더.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ナターシャは食べすぎだ。私の分がなくなるだろ」"
translation = "「나타샤는 너무 많이 먹어. 내 몫이 없어지잖아.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ちぇっ。梨緒のケチー」"
translation = "「치잇. 리오 구두쇠─」"

[[dialogue]]
speaker = "unk"
original = "梨緒のサンドイッチを分け合う選挙管理委員会の４人。"
translation = "리오의 샌드위치를 나눠 먹는 선거관리위원회의 네 사람."

[[dialogue]]
speaker = "unk"
original = "味は普通と言いつつも、ナターシャの笑みはまんざらでもなさそうだった。"
translation = "맛은 평범하다고 말하면서도, 나타샤의 미소는 싫지 않은 기색이었다."

