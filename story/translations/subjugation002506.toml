[[dialogue]]
speaker = "unk"
original = "シャドウマハムートに挑んだヒルディオーネたち。そして――"
translation = "섀도 마하무트에 도전한 힐디오네 일행. 그리고――"

[[dialogue]]
speaker = "シャドウマハムート"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「はぁ……はぁ……。なんとか勝ちましたわね」"
translation = "「하아…… 하아……. 어떻게든 이겼네요」"

[[dialogue]]
speaker = "フェニエル"
original = "「お姉様、すごいです！\u3000あのマムのノヴァフォームを倒しちゃいました！」"
translation = "「언니분, 대단해요! 그 마무의 노바 폼을 쓰러뜨렸어요!」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ヒルディーちゃん、すごいわ～！\u3000お姉ちゃん、思わずハグして頭なでなでしたくなっちゃう♪」"
translation = "「힐디 짱, 대단해~! 언니, 나도 모르게 껴안고 머리 쓰다듬어주고 싶어져♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "「サーシャさん、ヒルディオーネ先輩は同級生ですよ……」"
translation = "「사샤 씨, 힐디오네 선배는 동급생이에요……」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「しかし驚いたヨ。まさか、<b>あんな新技</b>を編み出していたとはネ。いやはや、『努力の天才』とはよく言ったものダ」"
translation = "「하지만 놀랐다다. 설마 그런 신기술을 고안해냈을 줄은네. 아니나 다를까, 『노력의 천재』라는 말이 딱 맞다다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。次の星霊祭で、マムに勝つ為の切り札ですわ」"
translation = "「네. 다음 성령제에서 마무에게 이기기 위한 카드니까요」"

[[dialogue]]
speaker = "シュティレ"
original = "「やはり、ドリルこそが最強なのです。ぶい」"
translation = "「역시 드릴이야말로 최강인 것입니다. 브이」"

[[dialogue]]
speaker = "シュティレ"
original = "「ヒルディオーネ先輩、いえ、ヒルディーお姉様。後で是非ドリルについて熱く語り合わせて下さい！」"
translation = "「힐디오네 선배, 아니, 힐디 언니분. 나중에 꼭 드릴에 대해 뜨겁게 이야기하게 해주세요!」"

[[dialogue]]
speaker = "unk"
original = "そう言ってキラキラした瞳でヒルディオーネを見上げ、握手を求めて来るシュティレ。"
translation = "그렇게 말하며 반짝이는 눈으로 힐디오네를 올려다보며 악수를 청해오는 슈틸레."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「え、ええ。そうですわね、おほほほ♪」"
translation = "「어, 에에. 그렇죠, 오호호호♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（期待の眼差しがすごくて、断りづらいですわ……！\u3000先にドリルについて、色々学んでおきませんと）"
translation = "(기대 어린 시선이 너무해서 거절하기 힘들어요……! 먼저 드릴에 대해 여러 가지 배워두지 않으면)"

[[dialogue]]
speaker = "シュティレ"
original = "「フニ先輩もすごかったです。シュティレは飛行能力に自信があったのですが、先輩のキレッキレな飛び方にはロマンを感じました」"
translation = "「후니 선배도 대단했습니다. 슈틸레는 비행 능력에 자신이 있었습니다만 선배의 절도 있는 비행 방식에는 로망을 느꼈습니다」"

[[dialogue]]
speaker = "フェニエル"
original = "「わ、私ですかっ？\u3000ありがとうございます、シュティレちゃん」"
translation = "「저, 저 말인가요? 감사합니다, 슈틸레 짱」"

[[dialogue]]
speaker = "フェニエル"
original = "「私の中に宿っている不死鳥、ホウちゃんから教わったんです。よかったら今度、一緒に訓練してみますか？」"
translation = "「제 안에 깃든 불사조, 호우 짱에게 배웠어요. 괜찮다면 다음에 같이 훈련해 볼래요?」"

[[dialogue]]
speaker = "シュティレ"
original = "「いいのですか？\u3000今日はシュティレの友好の輪が一気に広がり、実に素晴らしき日です。ぶいぶいっ」"
translation = "「그래도 되나요? 오늘은 슈틸레의 우호의 고리가 단숨에 넓어져 실로 멋진 날입니다. 브이브이」"

[[dialogue]]
speaker = "セシア"
original = "「フニ、先輩として慕われる母性を身に付けて、また１つママとしての階段を登ったわね♪\u3000ふふふっ」"
translation = "「후니, 선배로서 경외받는 모성을 몸에 익혀 또 하나 마마로서의 계단을 올랐구나♪ 후후후♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「セッシー、人工戦闘服のクリスマスフォーム、上手く使いこなしているようだナ」"
translation = "「세시, 인공 전투복의 크리스마스 폼을 잘 다루고 있는 모양이다다」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「いや、それどころか、元の想定を超えて独自に成長しつつある。さすがは蓄積を司る守護天使ダ」"
translation = "「아니, 그뿐만 아니라 원래 상정을 넘어 독자적으로 성장하고 있다다. 과연 축적을 관장하는 수호천사다다」"

[[dialogue]]
speaker = "セシア"
original = "「アニマ、あなたが私用にこまめにメンテナンスしてくれているおかげよ」"
translation = "「아니마, 네가 나를 위해 꼼꼼하게 유지보수 해준 덕분이야」"

[[dialogue]]
speaker = "セシア"
original = "「あなたもママではないけれど、その研究成果を蓄積し続ける姿勢はプラス５ポイント以上あるわ。いつもありがとう♪」"
translation = "「너도 마마는 아니지만 그 연구 성과를 계속 축적하는 자세는 플러스 5포인트 이상이야. 항상 고마워♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「フヒ、こちらこそダ♪\u3000セッシーの蓄積データは人工ノヴァフォームのアップデートに大いに役立っていル。これからもよろしく頼むヨ」"
translation = "「후히, 나야말로다다♪ 세시의 축적 데이터는 인공 노바 폼 업데이트에 큰 도움이 되고 있다다. 앞으로도 잘 부탁한다다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「……ノヴァフォーム、それにしても大した代物ですわね」"
translation = "「……노바 폼, 그건 그렇고 대단한 물건이군요」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ム？\u3000なんだ、ヒルディー、ノヴァフォームに興味があるのカ？」"
translation = "「음? 뭐야, 힐디, 노바 폼에 관심이 있는 거다다?」"

[[dialogue]]
speaker = "アニマ（覚醒）"
original = "「ならば、アニマが力を貸すゾ？\u3000会長にも言えば、快く相談に乗ってくれるだろウ」"
translation = "「그렇다면 아니마가 힘을 빌려주겠다다? 회장에게도 말하면 흔쾌히 상담에 응해주겠지다다」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。考えておきますわ」"
translation = "「네. 생각해 보겠어요」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（確かに今日、私は新技でマムのノヴァフォームを倒すことができましたわ。ですが……）"
translation = "(분명 오늘 나는 신기술로 마무의 노바 폼을 쓰러뜨릴 수 있었습니다. 하지만……)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（それはこの場にノヴァフォームの星騎士たちが、サーシャ、アニマ、マトイと３人揃っていたからこそできたこと）"
translation = "(그건 이 자리에 노바 폼 성기사들이 사샤, 아니마, 마토이까지 세 명이나 모여 있었기에 가능했던 일)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（私１人だったらおそらく、倒すことはできなかったでしょう）"
translation = "(나 혼자였다면 아마 쓰러뜨릴 수 없었겠죠)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（やはり、私も目指すしかありませんわ――）"
translation = "(역시 저도 목표로 할 수밖에 없겠군요――)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（自身の限界を超えた――<b>覚醒</b>の<ruby>頂<rt>いただき</rt></ruby>を）"
translation = "(자신의 한계를 넘은――<b>각성</b>의 정점을)"

[[dialogue]]
speaker = "unk"
original = "千園寺ヒルディオーネは、そうして決意を新たにするのだった――"
translation = "센도지 힐디오네는 그렇게 결의를 새로이 하는 것이었다――"

