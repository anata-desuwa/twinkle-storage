[[dialogue]]
speaker = "unk"
original = "とある休日、アニマ先輩がまた家に遊びに来ていた。"
translation = "어느 휴일, 아니마 선배가 또 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「フヒ♪\u3000会長、今日はまた新しい薬を開発してきたゾ♪」"
translation = "「후히♪ 회장, 오늘은 또 새로운 약을 개발해 왔어♪」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩はノヴァフォームに変身してから、能力で薬を錬成して見せてくる。"
translation = "아니마 선배는 노바 폼으로 변신한 뒤, 능력으로 약을 연성해서 보여준다."

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「――何の薬かって？\u3000それはもちろん、キミとのエッチを楽しむ為の媚薬ダ<emoji=heart04>」"
translation = "「――무슨 약이냐고? 그건 물론, 너와의 섹스를 즐기기 위한 최음제야<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ（覚醒）"
speaker_translation = "아니마(각성)"
original = "「詳しい効果は、使ってみてのお楽しみだゾ♪\u3000フヒヒ<emoji=heart04>」"
translation = "「자세한 효과는, 써보고 나서의 즐거움이야♪ 후히히<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからお互いに媚薬を飲み、俺の部屋へと移動して――"
translation = "그 후 서로 최음제를 마시고, 내 방으로 이동해서――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「はあぁー……<emoji=heart04>\u3000ふうぅー……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――ん？\u3000アニマの顔がもう赤くなってイルって……？」"
translation = "「――응? 아니마의 얼굴이 벌써 빨개져 있다니……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000そういうキミのチ○ポも、もう大きく勃起しているゾ<emoji=heart04>\u3000媚薬はどうやら、ちゃんと効果が出ているようだナ<emoji=heart04>」"
translation = "「후히♪ 그런 너의 자지도, 벌써 크게 발기했어<emoji=heart04> 최음제는 아무래도, 제대로 효과가 나타나고 있는 모양이네<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「さて、会長も気にしていた詳しい効果だが……これはな、名づけて『快楽共鳴媚薬』ダァ<emoji=heart04>」"
translation = "「자, 회장도 신경 쓰였던 자세한 효과지만…… 이건 말이지, 이름하여 『쾌락 공명 최음제』야<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「媚薬として興奮を高め、感覚が敏感になるのはもちろん、飲んだもの同士の性的快楽を共有して、感じ取ることができる……<emoji=heart04>」"
translation = "「최음제로서 흥분을 높이고 감각이 민감해지는 건 물론, 마신 사람끼리 성적 쾌락을 공유해서 서로 느낄 수 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それってつまり――」"
translation = "「그건 즉――」"

[[dialogue]]
speaker = "unk"
original = "俺は試しに、目の前にあるたわわなアニマ先輩のおっぱいを触る。"
translation = "나는 시험 삼아, 눈앞에 있는 탐스러운 아니마 선배의 가슴을 만진다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04>\u3000후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、俺自身にも背筋がゾクゾクするような快楽が伝わって来る。"
translation = "그 순간, 나 자신에게도 등줄기가 짜릿해질 정도의 쾌락이 전해져 온다."

[[dialogue]]
speaker = "unk"
original = "それは自分の敏感な場所――性感体を触られたかのような感覚だった。"
translation = "그건 마치 내 자신의 민감한 곳――성감대를 만져진 것 같은 감각이었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……<emoji=heart04>\u3000会長におっぱい揉まれて……あんっ<emoji=heart04>」"
translation = "「응앗……<emoji=heart04>\u3000회장님한테 가슴 주물러져서……앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ……ふうぅっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000媚薬で感覚が鋭敏になって……<emoji=heart04>\u3000おっぱい揉まれるだけで、感じてしまうゾ……んんっ<emoji=heart04>」"
translation = "「앗……후우웃<emoji=heart04>\u3000하아앗……응우웃<emoji=heart04>\u3000최음제 때문에 감각이 예민해져서……<emoji=heart04>\u3000가슴 만져지는 것만으로도, 느껴버려……응응앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ<emoji=heart04>\u3000乳首触られて……ふあぁっ<emoji=heart04>\u3000はあぁっ……んんっ……勃起乳首コリコリされるの気持ちイイっ<emoji=heart04>\u3000やっ……んうぅっ……ふうぅっ……んああぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04>\u3000유두 만져져서……후아앗<emoji=heart04>\u3000하아앗……응응앗……발기한 유두 오돌오돌 만져지는 거 기분 좋아<emoji=heart04>\u3000앗……응우웃……후우웃……응아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ<emoji=heart04>\u3000会長のチ○ポも、どんどんギンギンにナって…<emoji=heart04>\u3000キミも気持ちイイか？\u3000あっ、あんっ<emoji=heart04>\u3000おっぱい揉むの激しイっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04>\u3000회장님의 자지도, 점점 꼿꼿해져서……<emoji=heart04>\u3000너도 기분 좋아? 앗, 앙앗<emoji=heart04>\u3000가슴 주무르는 거 격렬해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こちらにまで伝わって来る快楽に夢中になっていると、ふと気づく。"
translation = "이쪽까지 전해져 오는 쾌락에 정신이 팔려 있다가, 문득 깨닫는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ん？\u3000アニマ先輩のおっぱい、ひょっとして……前より大きくなりました？」"
translation = "「응? 아니마 선배 가슴, 혹시…… 전보다 커졌나요?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……<emoji=heart04>\u3000ああ、実はそうなんダ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 아아, 사실은 그렇단다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「どうやら、キミの中にある『魔王因子』の影響らしい……<emoji=heart04>」"
translation = "「아무래도, 네 안에 있는 『마왕 인자』의 영향인 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔王の……？」"
translation = "「마왕의……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミとエッチするようになってから、体に変化が起きている気がして、調べてみたんダ。そうしたら……んんっ<emoji=heart04>」"
translation = "「너랑 떡치게 된 이후로, 몸에 변화가 일어나는 것 같아서 조사해 봤단다. 그랬더니…… 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミの中にある『魔王因子』が精液にも含まれていて、それを接種した影響だとわかったんダ……<emoji=heart04>」"
translation = "「네 안에 있는 『마왕 인자』가 정액에도 포함되어 있어서, 그걸 섭취한 영향이라는 걸 알았단다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「魔王としてより強い子孫を残す為に、相手の女性的な魅力を成長<emoji=heart04>\u3000はふぅ、させようとしているのではないか、というのがアニマの推測ダ……<emoji=heart04>」"
translation = "「마왕으로서 더 강한 자손을 남기기 위해, 상대의 여성적인 매력을 성장<emoji=heart04> 하으, 시키려는 게 아닐까 하는 게 아니마의 추측이란다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そう考えると、キミの性欲が強かったり、チ○ポの大きさや射精量がすごかったりすることとも、辻褄が合う……<emoji=heart04>\u3000んっ……ふうぅ<emoji=heart04>」"
translation = "「그렇게 생각하면, 네 성욕이 강하다거나, 자지의 크기나 사정량이 엄청난 것과도 앞뒤가 맞지……<emoji=heart04> 응…… 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ<emoji=heart04>\u3000アニマのおま○こに、チ○ポが擦れて……んあぁぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아니마의 보지에, 자지가 비벼져서…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……はあぁっ、あんっ<emoji=heart04>\u3000こ、これが、キミが感じていた快楽の共鳴カ……<emoji=heart04>」"
translation = "「응…… 하아앗, 앙<emoji=heart04> 이, 이게 네가 느끼고 있던 쾌락의 공명인가……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ……んあぁぁっ<emoji=heart04>\u3000外から擦り合わせている、だけなのに……すごイぃ<emoji=heart04>\u3000んうぅっ……あっ……はああぁんっ<emoji=heart04>」"
translation = "「앗…… 응아아앗<emoji=heart04> 밖에서 비비고 있을 뿐인데…… 굉장해<emoji=heart04> 응우웃…… 앗…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ふうぅっ……んああぁっ<emoji=heart04>\u3000チ○ポとおま○この、境界が分からなくなるくらい……はぁぁ<emoji=heart04>\u3000お互いの感覚が溶け合っていて、気持ちイイ<emoji=heart04>\u3000愛液が溢れて止まらなイ<emoji=heart04>」"
translation = "「후우읏…… 응아아앗<emoji=heart04> 자지와 보지의 경계를 모를 정도로…… 하아<emoji=heart04> 서로의 감각이 녹아들어서, 기분 좋아<emoji=heart04> 애액이 넘쳐서 멈추질 않아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アニマ先輩……俺、もう……！」"
translation = "「아니마 선배…… 저, 이제……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ん……<emoji=heart04>\u3000いいゾ<emoji=heart04>\u3000アニマも――」"
translation = "「응……<emoji=heart04> 좋아<emoji=heart04> 아니마도――」"

[[dialogue]]
speaker = "unk"
original = "先輩はそう言って、両手をおま○こに添えると……"
translation = "선배는 그렇게 말하며 양손을 보지에 갖다 대자……"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「キミのチ○ポ、アニマのおま○こに挿れて欲しイ……<emoji=heart04>」"
translation = "「네 자지, 아니마의 보지에 넣어줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "くぱぁ<emoji=heart04>\u3000と指で広げて見せて、上目遣いで囁く。"
translation = "쿠파<emoji=heart04> 하고 손가락으로 벌려 보이더니, 치켜뜬 눈으로 속삭인다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――きて<emoji=heart04>\u3000会長……<emoji=heart04>」"
translation = "「――해줘<emoji=heart04> 회장……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000アニマ先輩ッ！」"
translation = "「윽……! 아니마 선배!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ<emoji=heart04>」"
translation = "「앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "焦る気持ちを何とか抑えながら、ペニスの先端を彼女の膣穴にあてがう。"
translation = "초조한 마음을 어떻게든 억누르며, 페니스의 끝을 그녀의 질구에 갖다 댄다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ<emoji=heart04>\u3000あぁっ<emoji=heart04><emoji=heart04>\u3000会長のチ○ポ、アニマの穴を、押し広げてっ……<emoji=heart04>」"
translation = "「읏<emoji=heart04> 아앗<emoji=heart04><emoji=heart04> 회장의 자지가, 아니마의 구멍을 밀어 넓혀……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「中に入って……あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안으로 들어와…… 앗――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000チ○ポ、おま○こに来たぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아～～～<emoji=heart04><emoji=heart04><emoji=heart04> 자지, 보지에 들어왔어～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ、はあぁっ、んうぅっ……<emoji=heart04>\u3000んっ、はぁっ……ふあぁっ<emoji=heart04>\u3000んうぅっ、あっ、はあぁっ……<emoji=heart04>\u3000あっ、ふうぅっ……はぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 읏<emoji=heart04> 앗, 하아앗, 응우읏……<emoji=heart04> 읏, 하앗…… 후앗<emoji=heart04> 응웃, 앗, 하아앗……<emoji=heart04> 앗, 후우우…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ<emoji=heart04>\u3000ふうぅっ……会長の魔王チ○ポ、太くてすごイっ<emoji=heart04>\u3000おま○この中、全部擦れて気持イイっ<emoji=heart04>\u3000あんっ……んうぅっ<emoji=heart04>\u3000はあぁっ……あぁんっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 후우우앗…… 회장님의 마왕 자지, 굵고 굉장해<emoji=heart04> 보지 안쪽이 전부 쓸려서 기분 좋아<emoji=heart04> 앙…… 응우앗<emoji=heart04> 하아앗…… 아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んあぁっ<emoji=heart04>\u3000極太カリ、すごイィっ<emoji=heart04>\u3000アニマの気持ちイイところ、分かって擦られて……あっ、んあっ<emoji=heart04>\u3000あっ、はあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 극태 귀두, 굉장해애<emoji=heart04> 아니마의 기분 좋은 곳을 알고 비벼대서…… 앗, 응앗<emoji=heart04> 앗, 하아앗…… 푸아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺も、先輩の中、すごく気持ちいいっ……！」"
translation = "「윽…… 나도, 선배 안쪽, 엄청 기분 좋아……!」"

[[dialogue]]
speaker = "unk"
original = "お互いの快楽が伝わって来ることによって、快感は２倍。それによって、いつも以上に膣の中はぐっしょりと濡れていて、それが更なる快感を呼び起こしていた。"
translation = "서로의 쾌락이 전해짐으로써, 쾌감은 2배가 된다. 그로 인해 평소보다 질 안쪽은 흠뻑 젖어 있었고, 그것이 한층 더한 쾌감을 불러일으키고 있었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あんっ<emoji=heart04>\u3000ピストンの度に、気持ちイイっ<emoji=heart04>\u3000はあぁっ、んあぁっ<emoji=heart04>\u3000これ好きダっ<emoji=heart04>\u3000これがチ○ポの快感っ<emoji=heart04>\u3000このセックスしゅきぃっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>」"
translation = "「앗, 앙앗<emoji=heart04> 피스톤질 할 때마다, 기분 좋아<emoji=heart04> 하아앗, 응아앗<emoji=heart04> 이거 좋아<emoji=heart04> 이게 자지의 쾌감이야<emoji=heart04> 이 섹스 너무 좋아<emoji=heart04> 푸아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「はああぁぁっ<emoji=heart04>\u3000気持ちイイが擦れ合って、溶けりゅっ<emoji=heart04>\u3000快楽で理性がゴリゴリ溶けりゅぅっ<emoji=heart04>\u3000んっ、ふうぅっ、はあぁっ……<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 기분 좋은 게 서로 쓸려서, 녹아버려<emoji=heart04> 쾌락에 이성이 마구 녹아내려어엇<emoji=heart04> 응, 후우웃, 하아앗……<emoji=heart04> 앗, 앗<emoji=heart04> 푸아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「先輩、舌出して」"
translation = "「선배, 혀 내밀어 봐」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ！？\u3000――んむっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응앗!? ――음뭇<emoji=heart04><emoji=heart04><emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちゅっ……ちゅぷっ、ちゅぷぷ<emoji=heart04>\u3000れろちゅっ……れるれるっ<emoji=heart04>\u3000んむっ……ちゅぱっ……ちゅむむっ<emoji=heart04>\u3000ちゅっ……ちゅるるっ<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「츄…… 츄릅, 츄릅푸<emoji=heart04> 렐로츄…… 렐렐룻<emoji=heart04> 응뭇…… 츄파…… 츄무뭇<emoji=heart04> 츄…… 츄르룻<emoji=heart04> 렐로츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちゅぱっ……<emoji=heart04>\u3000んぶっ……ちゅぶっ……ちゅぶぶっ<emoji=heart04>\u3000れろちゅっ……ちゅむっ<emoji=heart04>\u3000ちゅれるっ……れるれるっ……じゅるるるっ<emoji=heart04>\u3000――んはぁっ……<emoji=heart04>」"
translation = "「츄파……<emoji=heart04> 응붓…… 츄붓…… 츄부붓<emoji=heart04> 렐로츄…… 츄무웃<emoji=heart04> 츄렐룻…… 렐렐룻…… 쥬르르륵<emoji=heart04> ――응하앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「はぁっ、はぁっ……<emoji=heart04>\u3000快楽を共有してのキスも、しゅごイ……<emoji=heart04>\u3000頭の中、甘々にとろけりゅ……<emoji=heart04>」"
translation = "「하앗, 하앗……<emoji=heart04> 쾌락을 공유하면서 하는 키스도, 굉장해……<emoji=heart04> 머릿속이 달콤하게 녹아내려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んむっ……ちゅっ……ちゅむっ<emoji=heart04>\u3000ちゅるっ……じゅるるっ<emoji=heart04>\u3000れろちゅっ……ちゅぶっ……ちゅぶぶっ<emoji=heart04>\u3000んむっ……ちゅれるっ<emoji=heart04>\u3000じゅぷっ……じゅぷぷっ<emoji=heart04>」"
translation = "「응뭇…… 츄…… 츄무웃<emoji=heart04> 츄르룻…… 쥬르르룻<emoji=heart04> 렐로츄…… 츄붓…… 츄부붓<emoji=heart04> 응뭇…… 츄렐룻<emoji=heart04> 쥬푸…… 쥬푸푸웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ぷはぁっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふぅっ……はぁぁ<emoji=heart04>」"
translation = "「푸하앗……<emoji=heart04> 하아앗……<emoji=heart04> 후우웃…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺とアニマ先輩の唇の間に唾液が糸を引く。"
translation = "나와 아니마 선배의 입술 사이에 타액이 실처럼 길게 늘어진다."

[[dialogue]]
speaker = "unk"
original = "そうして俺は、続いて彼女のおっぱいの方に顔を寄せて──"
translation = "그렇게 나는, 이어서 그녀의 가슴 쪽으로 얼굴을 가져다 대고──"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ！？\u3000会長におっぱい吸われてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000――ふああぁっ<emoji=heart04>」"
translation = "「앗!? 회장님한테 가슴 빨려서…… 앗<emoji=heart04> ――푸아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ<emoji=heart04>\u3000あっ……んうぅ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>\u3000乳首、舌で転がされるの感じルぅ<emoji=heart04>\u3000はあぁっ……んうぅっ……んあぁっ……<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「응, 앗…… 응우우, 후아앙, 젖꼭지, 혀로 굴려지는 거 느껴져. 하아앗…… 응우웃…… 응아앗…… 하아앙.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ！？\u3000ちょっと待て……な、何か、体おかしイっ<emoji=heart04>\u3000気持ちイイだけじゃなくて、なんだか――ふああぁっ<emoji=heart04>」"
translation = "「앗!? 잠깐 기다려…… 무, 뭔가, 몸이 이상해. 기분 좋은 것뿐만이 아니라, 왠지―― 후아아앗.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ<emoji=heart04>\u3000会長、待って<emoji=heart04>\u3000ち、乳首感じて……おっぱいに気持ちイイの登ってきて……！\u3000んあぁああっ<emoji=heart04>」"
translation = "「앗, 회장, 기다려. 젖, 젖꼭지 느껴져서…… 가슴으로 기분 좋은 게 차올라……! 응아아앗.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「こ、これ、イっちゃう<emoji=heart04>\u3000乳首とおっぱいだけで、イっちゃう……あっ<emoji=heart04>\u3000はぁっ、んっ……あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「이, 이거, 가버려. 젖꼭지랑 가슴만으로, 가버려…… 앗. 하앗, 응…… 앗…… 후아아앗.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ<emoji=heart04>\u3000来ちゃう<emoji=heart04>\u3000本当にイクっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗. 와버려. 정말로 가버려――.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あああ、ふあああぁぁぁ――――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아, 후아아아아――――.」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、アニマ先輩が体をビクビクと震わせて、仰け反らせる。"
translation = "다음 순간, 아니마 선배가 몸을 움찔거리며 떨더니, 뒤로 젖힌다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ――はああぁぁっ……<emoji=heart04>\u3000アニマ、おっぱいでイっちゃったぁ……<emoji=heart04>」"
translation = "「응―― 하아아앗…… 아니마, 가슴으로 가버렸어…….」"

[[dialogue]]
speaker = "unk"
original = "ふと、俺は気づく。"
translation = "문득, 나는 깨닫는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「せ、先輩のおっぱいから出てるこれって……」"
translation = "「서, 선배 가슴에서 나오고 있는 이거……」"

[[dialogue]]
speaker = "unk"
original = "見ると、アニマ先輩の乳首から、うっすらと白い液体が汗のように染み出て、乳房を伝っていた。"
translation = "보니, 아니마 선배의 젖꼭지에서 옅은 흰색 액체가 땀처럼 배어 나와, 유방을 타고 흐르고 있었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ん……<emoji=heart04>\u3000これは……もしかして、アニマの『母乳』……なのカ……？」"
translation = "「응…… 이건…… 혹시, 아니마의 『모유』……인 걸까……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「もしかすると……媚薬の副作用なのかもしれナイ。興奮したことで、分泌されるようにになってしまっタ、のかも……<emoji=heart04>\u3000んんぅ<emoji=heart04>」"
translation = "「어쩌면…… 최음제의 부작용일지도 몰라. 흥분한 탓에, 분비되게 되어버린 걸지도…… 응으.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……先輩の、母乳……！」"
translation = "「윽…… 선배의, 모유……!」"

[[dialogue]]
speaker = "unk"
original = "俺は思わず、ごくりと唾を飲む。そして、欲望が抑え切れずに――"
translation = "나는 무심코, 꿀꺽하고 침을 삼킨다. 그리고, 욕망을 억누르지 못하고――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――あっ！？\u3000ふあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長、そんないきなりおっぱいにむしゃぶり付いちゃっ……！\u3000んっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>\u3000あっ、んっ……はぁんっ<emoji=heart04>」"
translation = "「――앗!? 후아아아앗. 회장, 그렇게 갑자기 가슴에 달려들면……! 응. 하아앗…… 후우웃…… 앗, 응…… 하앙.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ<emoji=heart04>\u3000乳首吸い付くの強くて、感じちゃっ……んあぁっ<emoji=heart04>\u3000んっ……はあぁっ……ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ……んっ<emoji=heart04>\u3000あっ……ふああぁんっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 젖꼭지 빠는 힘이 강해서, 느껴버릴…… 응아앗<emoji=heart04> 응…… 하아앗…… 후으으앗<emoji=heart04> 앗<emoji=heart04> 하아앗…… 응앗<emoji=heart04> 앗…… 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んあぁっ<emoji=heart04>\u3000ピストンも激しっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あぁっ、んうぅっ……<emoji=heart04>\u3000はあぁっ……んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぅっ……あっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 피스톤도 격렬해애<emoji=heart04> 앗<emoji=heart04> 응앗<emoji=heart04> 아앗, 응우으앗……<emoji=heart04> 하아앗…… 응앗<emoji=heart04> 앗<emoji=heart04> 후으앗…… 앗<emoji=heart04> 응아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「はあぁっ<emoji=heart04>\u3000そんな一生懸命飲もうとして……んんっ<emoji=heart04>\u3000アニマの母乳、そんなに飲んでみたかったのカ……？\u3000あっ、あんっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 그렇게 필사적으로 마시려고…… 응응앗<emoji=heart04> 아니마의 모유, 그렇게 마셔보고 싶었어……? 앗, 앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――フヒ、フヒヒ<emoji=heart04>\u3000そんなに気に入ったなら……アニマのこと、本当に孕ませてみるカ……？」"
translation = "「――후히, 후히히<emoji=heart04> 그렇게 마음에 들었다면…… 아니마를, 정말로 임신시켜 볼래……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……そんなこと言うと、本気にしちゃいますよ？」"
translation = "「윽…… 그런 말 하면, 진심으로 받아들일 거예요?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「前にも、言ったダロウ？\u3000んっ<emoji=heart04>\u3000キミとなら――アニマは構わないゾ<emoji=heart04>」"
translation = "「전에도, 말했잖아? 응앗<emoji=heart04> 너라면―― 아니마는 상관없어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……アニマ先輩っ！」"
translation = "「윽…… 아니마 선배!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ……会長っ<emoji=heart04>\u3000んひっ――！？」"
translation = "「앗…… 회장님<emoji=heart04> 응히잇――!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒいいいィィィっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000本気のチ○ポピストンきたあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후히이이이이잇<emoji=heart04><emoji=heart04><emoji=heart04> 진심 어린 자지 피스톤 왔다아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>\u3000はぁっ、んっ、あっ、あっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>\u3000んっ、はぁっ、ふぅっ……<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 후아아앙앗<emoji=heart04><emoji=heart04> 하아앗, 응앗, 앗, 앗<emoji=heart04> 응아아앙앗<emoji=heart04><emoji=heart04> 응앗, 하아앗, 후으앗……<emoji=heart04> 앗, 앗, 앗, 앙앗<emoji=heart04> 하아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ、すごっ<emoji=heart04>\u3000すごイィっ<emoji=heart04>\u3000気持ちイイっ<emoji=heart04>\u3000おま○ことチ○ポ、どっちも気持ちイイぃ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 굉장해<emoji=heart04> 굉장해애<emoji=heart04> 기분 좋아<emoji=heart04> 보지랑 자지, 둘 다 기분 좋아아아～～앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ<emoji=heart04>\u3000会長、もっと<emoji=heart04>\u3000チ○ポもっとぉ<emoji=heart04>\u3000奥いっぱい突いてぇ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 회장님, 더<emoji=heart04> 자지 더어<emoji=heart04> 안쪽까지 잔뜩 찔러줘<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 응아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「そこっ<emoji=heart04>\u3000そこ気持ちイイっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000フヒィっ<emoji=heart04>\u3000感じるっ<emoji=heart04>\u3000おま○ことチ○ポ感じるぅっ<emoji=heart04>\u3000んあっ、あっ、あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「거기잇<emoji=heart04> 거기 기분 좋아앗<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 후히잇<emoji=heart04> 느껴져<emoji=heart04> 보지랑 자지 느껴져어엇<emoji=heart04> 응앗, 앗, 앙앗<emoji=heart04> 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はまた、彼女の乳首にむしゃぶり付き、母乳を吸う。"
translation = "나는 다시 그녀의 젖꼭지를 물고, 모유를 빤다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んああぁっ<emoji=heart04>\u3000またおっぱい吸われてっ<emoji=heart04>\u3000あっ、あっ、ふあぁっ<emoji=heart04>\u3000乳首強く吸い付かれるの、気持ちイイっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 또 젖가슴 빨려서어<emoji=heart04> 앗, 앗, 후아앗<emoji=heart04> 젖꼭지 세게 빨리는 거, 기분 좋아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ、ダメっ<emoji=heart04>\u3000もう片方の手で、おっぱい揉みしだくの、反則ぅ<emoji=heart04>\u3000感じちゃう<emoji=heart04>\u3000おっぱい感じちゃうからぁっ<emoji=heart04>\u3000んっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>」"
translation = "「앗, 앗, 안 돼<emoji=heart04> 다른 한 손으로, 젖가슴을 주무르는 건, 반칙이야<emoji=heart04> 느껴버려<emoji=heart04> 젖가슴 느껴버리니까앗<emoji=heart04> 응앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ<emoji=heart04>\u3000気持ちイイっ<emoji=heart04>\u3000おま○ことおっぱい同時責めで、すごく気持ちイイのぉっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 기분 좋아앗<emoji=heart04> 보지랑 젖가슴을 동시에 괴롭히니까, 엄청 기분 좋아아앗<emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04> 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は乳首から口を離すと、指で乳首を弄るのを継続しつつ、彼女の唇を奪う。"
translation = "나는 젖꼭지에서 입을 떼고, 손가락으로 젖꼭지를 애무하는 것을 계속하며 그녀의 입술을 빼앗는다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――んむっ！？\u3000今キスまでされたらぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ちゅっ、ちゅっ<emoji=heart04>\u3000ちゅぶぶっ、れろちゅっ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000じゅぷっ、じゅぷぷっ、じゅるるるっ<emoji=heart04>」"
translation = "「――응무앗!? 지금 키스까지 하면어어앗<emoji=heart04> 응앗<emoji=heart04> 츄, 츄<emoji=heart04> 츄부부앗<emoji=heart04> 레로츄앗<emoji=heart04> 응부앗<emoji=heart04> 쥬푸앗, 쥬푸푸앗, 쥬르르릇<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んはぁっ<emoji=heart04>\u3000舌、激しっ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000ちゅぶっ、ちゅぶぶぶっ<emoji=heart04>\u3000じゅぷるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅばっ、じゅるるるっ<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「응하앗<emoji=heart04> 혀, 격렬해애<emoji=heart04> 응부앗<emoji=heart04> 츄부앗, 츄부부부앗<emoji=heart04> 쥬푸르앗<emoji=heart04> 레로레로앗<emoji=heart04> 츄바앗, 쥬르르릇<emoji=heart04> 레로츄앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――ぷはぁっ<emoji=heart04>\u3000はぁっ、はぁっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000本気ピストンと乳首コリコリとベロチューでおかしくナルっ<emoji=heart04>」"
translation = "「――푸하앗<emoji=heart04> 하아앗, 하아앗<emoji=heart04> 이제 안 돼<emoji=heart04> 응앗, 앗, 앗, 앗<emoji=heart04> 진심 피스톤이랑 젖꼭지 비비기랑 혀 키스로 이상해질 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んむっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000頭の中、気持ちイイのでバチバチしておかしくなりゅぅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んあっ！？」"
translation = "「응무앗<emoji=heart04> 츄앗<emoji=heart04> 츄앗<emoji=heart04> 응아앗<emoji=heart04> 머릿속이, 기분 좋아서 찌릿찌릿해서 이상해질 것 같아아앗<emoji=heart04> 츄앗<emoji=heart04> 츄앗<emoji=heart04> 응앗!?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04>\u3000く、くるぅ<emoji=heart04>\u3000大きなアクメ登ってくるっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04> 으, 올 것 같아<emoji=heart04> 커다란 절정이 올라오고 있어<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04> 후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺ももうイキそう……！」"
translation = "「나도 이제 갈 것 같아……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あああああ<emoji=heart04>\u3000チ○ポも気持ちイイ……<emoji=heart04>\u3000チ○ポとおま○こ、両方気持ちよくて、頭パチパチしてりゅぅぅ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「아아아아아<emoji=heart04> 자지도 기분 좋아……<emoji=heart04> 자지랑 보지, 둘 다 기분 좋아서, 머리가 찌릿찌릿해애애<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は射精感の高まりと共に、腰の動きを更に激しくする。"
translation = "나는 사정감의 고조와 함께, 허리의 움직임을 더욱 격렬하게 한다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ！？\u3000ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ピストン、ヤバっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000気持ちっ<emoji=heart04>\u3000チ○ポ、気持ちイイっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 피스톤, 위험해<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 기분 좋아<emoji=heart04> 자지, 기분 좋아앗<emoji=heart04> 앗, 앗, 앗, 앙앗<emoji=heart04> 응아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あっ、あっ、あっ<emoji=heart04><emoji=heart04>\u3000来るっ<emoji=heart04>\u3000アニマ射精すりゅ<emoji=heart04>\u3000おま○この中に、アニマも中出ししちゃうぅぅぅ<emoji=heart04>\u3000ふあぁぁぁん<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04><emoji=heart04><emoji=heart04> 온다<emoji=heart04> 아니마 사정할래<emoji=heart04> 보지 안에, 아니마도 노콘 질내사정 해버릴 거야아아아<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっあっあっあっあっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000――イクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000本当にイっちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04><emoji=heart04><emoji=heart04> ――간다<emoji=heart04><emoji=heart04><emoji=heart04> 정말로 가버려엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アニマ先輩っ！\u3000もうっ！」"
translation = "「아니마 선배! 정말!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んんんっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000一緒に出そう<emoji=heart04><emoji=heart04>\u3000アニマのおま○こに、一緒に種付けすりゅぅぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응응앗<emoji=heart04> 하아아앙<emoji=heart04> 같이 쌀 것 같아<emoji=heart04><emoji=heart04> 아니마의 보지에, 같이 씨 뿌려줘어어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000んあああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 응아아아아앗<emoji=heart04><emoji=heart04> 간다<emoji=heart04><emoji=heart04> 가 가 가 가앗――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「イックうぅぅぅーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああああああああぁぁぁ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아앗～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は限界まで高まった欲望の猛りを、彼女の中に全部ぶちまけた。"
translation = "나는 한계까지 고조된 욕망의 맹렬함을, 그녀의 안에 전부 쏟아부었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000アニマの子宮にいっぱい、キミの精液入って来るぅぅぅっ<emoji=heart04>\u3000はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 아니마의 자궁에 잔뜩, 너의 정액이 들어오고 있어어어앗<emoji=heart04> 하아아아아아～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ<emoji=heart04>\u3000あああぁぁぁ～～～っ<emoji=heart04>\u3000すごイ……<emoji=heart04>\u3000射精止まらナイ<emoji=heart04>\u3000さすが魔王だナ……<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아아아아아～～～앗<emoji=heart04> 굉장해……<emoji=heart04> 사정이 멈추질 않아<emoji=heart04> 역시 마왕이네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、長かった射精が終わって――"
translation = "이윽고, 길었던 사정이 끝나고――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「はぁ……<emoji=heart04>\u3000はぁ……<emoji=heart04>\u3000やっと止まっタ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000チ○ポ抜けて……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 하아……<emoji=heart04> 드디어 멈췄어……<emoji=heart04> 앙앗<emoji=heart04> 자지 빼줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「はあぁ……ふうぅ……<emoji=heart04>\u3000フヒ<emoji=heart04>\u3000今日もいっぱい、元気に出たナ……<emoji=heart04>\u3000アニマの中に入り切らなくて、おま○こから溢れて来てるゾ……<emoji=heart04>」"
translation = "「하아아…… 후으으……<emoji=heart04> 후히<emoji=heart04> 오늘도 잔뜩, 활기차게 나왔네……<emoji=heart04> 아니마 안에 다 들어가지 못해서, 보지에서 넘쳐흐르고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ん……<emoji=heart04>\u3000今回の媚薬はすごく良かっタ<emoji=heart04>\u3000快楽を共有したエッチ、またいけない『性の扉』を開いてしまった感じダ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 이번 최음제는 정말 좋았어<emoji=heart04> 쾌락을 공유한 섹스, 또 가면 안 되는 『성의 문』을 열어버린 기분이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「何より、キミがアニマで気持ちよくなってくれているのが、よくわかるのがイイ。すごく嬉しかったゾ……<emoji=heart04>」"
translation = "「무엇보다, 네가 아니마로 기분 좋아해주고 있는 게, 잘 느껴져서 좋아. 정말 기뻤어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ……アニマのおっぱいからまた、母乳が汗みたい染み出て、垂れて来てしまってイル……<emoji=heart04>」"
translation = "「앗…… 아니마의 젖가슴에서 또, 모유가 땀처럼 배어 나와서, 흘러내리고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそれを見て、乳首に再び吸い付いて味わう。"
translation = "나는 그것을 보고, 젖꼭지에 다시 입을 대고 맛본다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あんっ<emoji=heart04>\u3000会長……またおっぱいに吸い付いて……<emoji=heart04>」"
translation = "「앙앗<emoji=heart04> 회장님…… 또 젖가슴을 빨고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ<emoji=heart04>\u3000本当に母乳――『アニマミルク』が気に入ったみたいだナ<emoji=heart04>\u3000そんなに夢中になって吸われると、どんな味がするのか、アニマ自身でも気になるところダ」"
translation = "「후히<emoji=heart04> 정말 모유―― 『아니마 밀크』가 마음에 든 모양이네<emoji=heart04> 그렇게 꿈에 빠져서 빨리면, 어떤 맛이 나는지, 아니마 자신도 궁금한걸」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「どれどれ、会長、失礼するヨ――」"
translation = "「자아 자아, 회장님, 실례할게――」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩はそう言うと、俺の頬に両手を添えて、顔を上げて――"
translation = "아니마 선배는 그렇게 말하고, 내 뺨에 양손을 대고, 얼굴을 들어――"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "不意打ちのキスをする。"
translation = "기습적인 키스를 한다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「――んっ……<emoji=heart04>\u3000なるほど……<emoji=heart04>\u3000これは、ほんのりエッチなミルク味だナ<emoji=heart04>\u3000フヒ<emoji=heart04>」"
translation = "「――응……<emoji=heart04> 과연……<emoji=heart04> 이건, 은근히 야한 우유 맛이네<emoji=heart04> 흐히<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ペロリと舌なめずりして笑うアニマ先輩は、堪らなくエッチで。"
translation = "그렇게 말하며 혀를 날름거리며 웃는 아니마 선배는, 참을 수 없을 정도로 야했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「先輩……！」"
translation = "「선배……!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「あっ、あんっ<emoji=heart04>\u3000会長、まだ媚薬の効果が続いてるのか？\u3000チ○ポがまたムクムクと大きくなってるゾ<emoji=heart04>」"
translation = "「앗, 아앙<emoji=heart04> 회장, 아직 최음제 효과가 계속되는 거야? 자지가 또 묵직하게 커지고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ<emoji=heart04>\u3000なら、仕方ない。薬を飲ませた責任を取って、アニマがちゃんと鎮めないとナ<emoji=heart04>」"
translation = "「흐히<emoji=heart04> 그럼, 할 수 없지. 약을 먹인 책임을 져야 하니까, 아니마가 제대로 가라앉혀 줘야겠네<emoji=heart04>」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「んっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言いつつ、再びキスをして。"
translation = "그렇게 말하며 다시 키스를 했다."

[[dialogue]]
speaker = "unk"
original = "それから媚薬の効果が収まるまで、俺と先輩は甘い快楽を求めて、気持ちいいところを擦り合わせ続けるのだった――"
translation = "그 뒤로 최음제 효과가 가라앉을 때까지, 나와 선배는 달콤한 쾌락을 좇아 기분 좋은 곳을 계속 비벼대고 있었다――"

