[[dialogue]]
speaker = "unk"
original = "エステルと恋人関係になってから、夜は毎日、大聖堂で祈りを捧げるようになっていた。"
translation = "에스텔과 연인 관계가 된 후로, 밤에는 매일 대성당에서 기도를 드리게 되었다."

[[dialogue]]
speaker = "エステル"
original = "「こうして魔王様と一緒に祈りを捧げることが出来て幸せです」"
translation = "「이렇게 마왕님과 함께 기도를 드릴 수 있어 행복합니다.」"

[[dialogue]]
speaker = "クロト"
original = "「そうだね。とても気持ちが落ち着く」"
translation = "「그러게. 마음이 아주 차분해져.」"

[[dialogue]]
speaker = "エステル"
original = "「…………あ」"
translation = "「…………아」"

[[dialogue]]
speaker = "unk"
original = "祈りを終えたあと、エステルの手が俺の手に重なった。"
translation = "기도를 마친 뒤, 에스텔의 손이 내 손 위에 겹쳐졌다."

[[dialogue]]
speaker = "unk"
original = "ハッとした表情を浮かべて手を引くエステル。"
translation = "깜짝 놀란 표정을 지으며 손을 떼는 에스텔."

[[dialogue]]
speaker = "エステル"
original = "「ごめんなさい。幸せな気持ちでいると、つい手を握りたくなってしまって……」"
translation = "「미안해요. 행복한 기분으로 있다 보니 그만 손을 잡고 싶어져서……」"

[[dialogue]]
speaker = "クロト"
original = "「それくらいいいのに。俺たちは恋人同士なんだから……」"
translation = "「그 정도는 괜찮은데. 우린 연인 사이니까……」"

[[dialogue]]
speaker = "エステル"
original = "「いくら恋人といっても、こんな大胆なこと……恥ずかしいです」"
translation = "「아무리 연인이라 해도 이런 대담한 짓은…… 부끄러워요.」"

[[dialogue]]
speaker = "unk"
original = "顔を赤らめるエステル。"
translation = "얼굴을 붉히는 에스텔."

[[dialogue]]
speaker = "unk"
original = "そんなエステルの可愛い様子を見ていると、もっと大胆なことを教えたくなってしまう。"
translation = "그런 에스텔의 귀여운 모습을 보니 좀 더 대담한 것을 가르쳐주고 싶어진다."

[[dialogue]]
speaker = "クロト"
original = "「エステル、俺の上に乗ってみて」"
translation = "「에스텔, 내 위에 올라타 봐.」"

[[dialogue]]
speaker = "エステル"
original = "「は、はい……こうですか？」"
translation = "「네, 네…… 이렇게인가요?」"

[[dialogue]]
speaker = "エステル"
original = "「魔王様……この格好、何だかとても恥ずかしいです……」"
translation = "「마왕님…… 이 자세, 왠지 너무 부끄러워요……」"

[[dialogue]]
speaker = "エステル"
original = "「この体勢では、足が大きく開かれて……私の、あそこが……」"
translation = "「이 체세로는 다리가 크게 벌려져서…… 저의 거기가……」"

[[dialogue]]
speaker = "クロト"
original = "「俺からは見えていないよ」"
translation = "「나한테선 보이지 않아.」"

[[dialogue]]
speaker = "エステル"
original = "「でも、こんなに大胆な格好……」"
translation = "「그래도 이런 대담한 차림……」"

[[dialogue]]
speaker = "エステル"
original = "「それに魔王様、私のあそこに何か硬いものが当たっていて……」"
translation = "「게다가 마왕님, 제 거기에 뭔가 딱딱한 게 닿아있어서……」"

[[dialogue]]
speaker = "クロト"
original = "「エステルはこれが何か知らないよね」"
translation = "「에스텔은 이게 뭔지 모르지?」"

[[dialogue]]
speaker = "エステル"
original = "「それは……知らないというわけではないのです……知識としてなら、少しは持っていますので……」"
translation = "「그건…… 모르는 건 아니에요…… 지식으로서라면 조금은 가지고 있으니까요……」"

[[dialogue]]
speaker = "エステル"
original = "「ですが私には、まだ早いものだとずっと思っていました……」"
translation = "「하지만 저에게는 아직 이른 것이라고 계속 생각했었습니다……」"

[[dialogue]]
speaker = "エステル"
original = "「魔王様……私もついにそれを知る時が来た、ということなのでしょうか？」"
translation = "「마왕님…… 저도 드디어 그것을 알 때가 온 것이군요?」"

[[dialogue]]
speaker = "クロト"
original = "「そうだね……俺はエステルに、教えてあげたい……」"
translation = "「그래…… 난 에스텔에게 가르쳐주고 싶어……」"

[[dialogue]]
speaker = "エステル"
original = "「女神様のおわします、この神聖な祭壇の前で……私は、魔王様だけのものになるのですね……」"
translation = "「여신님이 계시는 이 신성한 제단 앞에서…… 저는 마왕님만의 것이 되는 거군요……」"

[[dialogue]]
speaker = "エステル"
original = "「わかりました。私も勇気を出して踏み出してみます……魔王様が私にそれを教えて下さるのですから……」"
translation = "「알겠습니다. 저도 용기를 내어 발을 내디뎌 볼게요…… 마왕님이 저에게 그것을 가르쳐 주시는 것이니까요……」"

[[dialogue]]
speaker = "エステル"
original = "「んくぅ……んんんっ……！！\u3000あぁあ、あぅんんっ……！」"
translation = "「응쿠…… 응응읏……!! 아아아, 아웅응……!」"

[[dialogue]]
speaker = "unk"
original = "局部にこすりつけていたペニスの先端を、エステルの入り口へとあてがう。"
translation = "국부에 비벼대던 자지의 끝을 에스텔의 입구에 갖다 댄다."

[[dialogue]]
speaker = "unk"
original = "それからゆっくりと、エステルの中にペニスを埋めていった。"
translation = "그리고 천천히 에스텔의 안으로 자지를 묻어갔다."

[[dialogue]]
speaker = "エステル"
original = "「んぅうう……はぁ……これが、セックス……なのですね……はふぅぅ……<emoji=heart04>」"
translation = "「응우우…… 하아…… 이것이 섹스……인 것이군요…… 하후우……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「痛みはない？」"
translation = "「아프진 않아?」"

[[dialogue]]
speaker = "エステル"
original = "「大丈夫です……んんっ……魔王様のものが、私を内側から圧迫していて……」"
translation = "「괜찮아요…… 응읏…… 마왕님의 것이 저를 안쪽에서 압박하고 있어서……」"

[[dialogue]]
speaker = "エステル"
original = "「何だか不思議な感覚です……はぁう……んんん……<emoji=heart04>」"
translation = "「왠지 신기한 감각이에요…… 하아우…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「今、エステルの中に入ってるこれ……名前は何か知ってる？」"
translation = "「지금 에스텔 안에 들어와 있는 이거…… 이름이 뭔지 알아?」"

[[dialogue]]
speaker = "エステル"
original = "「えっ……？\u3000ペニス、でしょうか……？」"
translation = "「엣……? 페니스, 일까요……?」"

[[dialogue]]
speaker = "エステル"
original = "「ごめんなさい……わざわざ訊ねた、ということは、私の口で言わなければならない、ということですね？」"
translation = "「죄송해요…… 일부러 물으셨다는 건 제 입으로 말해야 한다는 뜻이군요?」"

[[dialogue]]
speaker = "エステル"
original = "「おち○ちん……です……」"
translation = "「자지…… 예요……」"

[[dialogue]]
speaker = "エステル"
original = "「魔王様……。私のおま○こには……魔王様のおち○ちんが挿入っています……」"
translation = "「마왕님……. 제 보지에는…… 마왕님의 자지가 삽입되어 있어요……」"

[[dialogue]]
speaker = "クロト"
original = "「よく言えたね……」"
translation = "「잘 말했어……」"

[[dialogue]]
speaker = "エステル"
original = "「うう……恥ずかしさで……どうにかなってしまいそうです……」"
translation = "「으으…… 부끄러움에…… 어떻게 되어버릴 것 같아요……」"

[[dialogue]]
speaker = "クロト"
original = "「まだまだ、これからだよ……」"
translation = "「아직 이제부터야……」"

[[dialogue]]
speaker = "エステル"
original = "「あ……んんぅうううっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아…… 응응으으읏……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「んぁ、ああっ……ふぅ、あ、はぁ……魔王様のものが……私のに擦れてます……」"
translation = "「응아, 아앗…… 후우, 아, 하아…… 마왕님의 것이…… 제 것에 스치고 있어요……」"

[[dialogue]]
speaker = "クロト"
original = "「こうやってピストンして、エステルの中を気持ちよくするんだ」"
translation = "「이렇게 피스톤해서 에스텔의 안을 기분 좋게 만드는 거야.」"

[[dialogue]]
speaker = "エステル"
original = "「魔王様の言う通りです……んんっ、あっ……おち○ちんがおま○この中をズポズポして……とても気持ちいいです<emoji=heart04>」"
translation = "「마왕님 말씀대로예요…… 응읏, 앗…… 자지가 보지 안을 들락날락해서…… 너무 기분 좋아요<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「何と言えばいいのでしょう……恥ずかしいのに……嬉しい、です……<emoji=heart04>」"
translation = "「뭐라고 해야 할까요…… 부끄러운데…… 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エステルの可愛い反応に、俺はピストンしながらエステルの胸を両手で包み込む。"
translation = "에스텔의 귀여운 반응에 나는 피스톤하며 에스텔의 가슴을 양손으로 감싸 쥔다."

[[dialogue]]
speaker = "エステル"
original = "「ああっ……<emoji=heart04>\u3000あぁ……む、胸も……<emoji=heart04>」"
translation = "「아앗……<emoji=heart04> 아아…… 가, 가슴도……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「ああう、そんな、撫でるように……優しくモミモミされたら……<emoji=heart04>」"
translation = "「아아우, 그렇게 쓰다듬듯이…… 부드럽게 주물러주시면……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「先っちょのところ……んんっ……硬くなってしまいます……<emoji=heart04>」"
translation = "「끝부분이…… 응읏…… 딱딱해져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「すごく可愛いよ……」"
translation = "「정말 귀여워……」"

[[dialogue]]
speaker = "エステル"
original = "「ああうっ、先のとこ……指でくりくりされて……んっ、は、ああっ……その間もずっとズポズポされてます……<emoji=heart04>」"
translation = "「아아웃, 끝부분을…… 손가락으로 만지작거려져서…… 응, 하, 아앗…… 그사이에도 계속 들락날락하고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「頭の中が痺れたみたいになって……ああっ……何にも考えられなくなってしまいますっ……<emoji=heart04>」"
translation = "「머릿속이 저릿한 것처럼 돼서…… 아앗…… 아무것도 생각할 수 없게 되어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「どんどん、気持ちよくなってるんだな……ほら……」"
translation = "「점점 기분 좋아지고 있구나…… 자……」"

[[dialogue]]
speaker = "エステル"
original = "「んううっ……魔王様の指……濡れて糸を引いてます……あああっ……<emoji=heart04>」"
translation = "「응우웃…… 마왕님의 손가락…… 젖어서 실을 끌고 있어요…… 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「はぁ、あっ……それは一体……何なのでしょう……？」"
translation = "「하아, 앗…… 그것은 대체…… 무엇인가요……?」"

[[dialogue]]
speaker = "クロト"
original = "「これはエステルの中から、溢れてきたものだよ……」"
translation = "「이건 에스텔의 안에서 넘쳐흘러 나온 거야……」"

[[dialogue]]
speaker = "エステル"
original = "「愛液、ですね……私が魔王様に気持ちよくしてもらって……それに反応してあふれ出してきた……」"
translation = "「애액, 이군요…… 제가 마왕님께 기분 좋게 대접받아서…… 거기에 반응해 쏟아져 나온……」"

[[dialogue]]
speaker = "エステル"
original = "「こんなに、濡れてるんですね……？\u3000私、魔王様のおち○ちんにズポズポされて……こんなになってしまっているのですね……？」"
translation = "「이렇게나 젖어있는 거군요……? 저, 마왕님의 자지 때문에…… 이렇게 되어버리고 만 거군요……?」"

[[dialogue]]
speaker = "エステル"
original = "「はぁあ……意識したら……ますますお腹が熱く……んぅ、あぁあ……ジンジンって、疼いてしまってます……<emoji=heart04>」"
translation = "「하아아…… 의식하니까…… 점점 배 안이 뜨겁게…… 응우, 아아아…… 징징하고 욱신거려버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「それを……魔王様のおち○ちんが……はぁう、んんっ……あ……んん……ゴリゴリなぞって、気持ちよくしてくれるんですっ……<emoji=heart04>」"
translation = "「그것을…… 마왕님의 자지가…… 하아우, 응읏…… 아…… 응…… 고리고리 훑으며 기분 좋게 해주고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「ああっ、動きが激しくなって……んんっ、あっ、あああっ……！」"
translation = "「아앗, 움직임이 격해져서…… 응읏, 앗, 아아앗……!」"

[[dialogue]]
speaker = "エステル"
original = "「はぁ、あ……んぅ、ん……あぁあ……魔王様のが……気持ちいいところ、こすってますっ……あ、ああっ……！」"
translation = "「하아, 아…… 응우, 응…… 아아아…… 마왕님의 것이…… 기분 좋은 곳을 문지르고 있어요…… 아, 아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「何が気持ちよくしてるんだ？」"
translation = "「뭐가 기분 좋게 하고 있지?」"

[[dialogue]]
speaker = "エステル"
original = "「おち○ちんですっ……んんっ……おち○ちんが、私の気持ちいいところを擦って……あああっ……！」"
translation = "「자지예요…… 응읏…… 자지가 제 기분 좋은 곳을 문질러서…… 아아앗……!」"

[[dialogue]]
speaker = "エステル"
original = "「ああっ、あっ、やっ、あっ、あああっ……<emoji=heart04>\u3000ん、あっ、あああっ……あ、ああっ……はあっ……<emoji=heart04>」"
translation = "「아앗, 앗, 얏, 앗, 아아앗……<emoji=heart04> 응, 앗, 아아앗…… 아, 아앗…… 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「声が、抑えられません……はぁ、う……こんな、神聖な場所なのに……はしたない声をいっぱいあげて……<emoji=heart04>」"
translation = "「목소리가 억눌러지지 않아요…… 하아, 우…… 이런 신성한 곳인데…… 천박한 목소리를 가득 내서……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「ああうっ、んんっ、あっ、あ……おち○ちんに……気持ちよくさせられちゃってますっ……<emoji=heart04>」"
translation = "「아아웃, 응읏, 앗, 아…… 자지 때문에…… 기분 좋아져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンを激しくしながら、エステルの気持ちいい場所を攻め立てる。"
translation = "피스톤을 격렬하게 하며 에스텔의 성감대를 몰아붙인다."

[[dialogue]]
speaker = "エステル"
original = "「あぁあ、あっ……愛液が、だらだらって……出てしまってますっ……んんっ、あっ……ああ、あっ……あああっ……<emoji=heart04>」"
translation = "「아아아, 앗…… 애액이 줄줄…… 나오고 있어요…… 응읏, 앗…… 아아, 앗…… 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「こんなに私っ……んんっ……気持ちよく、させられてるんですね……あああっ……<emoji=heart04>」"
translation = "「이렇게나 저…… 응읏…… 기분 좋게 되어버리는 거군요…… 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「おち○ちんが……あ、ああっ……出たり入ったりするたび……いやらしい音を立ててっ……<emoji=heart04>」"
translation = "「자지가…… 아, 아앗…… 들락날락할 때마다…… 야한 소리를 내서……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「おま○こがよろこんで……お汁がいっぱい流れて……あああっ……んんっ、あっ、あああっ……！」"
translation = "「보지가 기뻐하고…… 즙이 가득 흘러서…… 아아앗…… 응읏, 앗, 아아앗……!」"

[[dialogue]]
speaker = "エステル"
original = "「また、気持ちいい場所を……はぁ、うっ……ズンズンって、突いてきて……すごいですっ、んんんっ……おち○ちん、すごいっ……！」"
translation = "「또 기분 좋은 곳을…… 하아, 읏…… 즈음즈음 찔러와서…… 굉장해요, 응응읏…… 자지, 굉장해……!」"

[[dialogue]]
speaker = "エステル"
original = "「はあっ、はあっ、あっ、ああっ、はああっ<emoji=heart04>\u3000や、あ、あああっ<emoji=heart04>\u3000あっ、あっ、あああっ、あっ、あ、あああっ……<emoji=heart04>」"
translation = "「하앗, 하앗, 앗, 아앗, 하아앗<emoji=heart04> 야, 아, 아아앗<emoji=heart04> 앗, 앗, 아아앗, 앗, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下から突き上げるたびに、エステルの身体が歓びに震えている。"
translation = "밑에서 치올릴 때마다 에스텔의 몸이 환희로 떨리고 있다."

[[dialogue]]
speaker = "エステル"
original = "「あっ、あっ、ああっ……んんっ、あっ、あっ……はっ、あっ、あああっ！！」"
translation = "「앗, 앗, 아앗…… 응읏, 앗, 앗…… 핫, 앗, 아아앗!!」"

[[dialogue]]
speaker = "エステル"
original = "「気持ちいい、ですっ！\u3000おち○ちんっ、気持ちいいですっ！\u3000あああっ、や、あああっ！！！」"
translation = "「기분 좋아요! 자지, 기분 좋습니다! 아아앗, 야, 아아앗!!!」"

[[dialogue]]
speaker = "エステル"
original = "「は、ああっ……魔王様っ、変、ですっ……ああっ……なんだか、変な感じっ……！」"
translation = "「하, 아앗…… 마왕님, 이상해요…… 아앗…… 왠지 이상한 기분……!」"

[[dialogue]]
speaker = "エステル"
original = "「魔王様っ、何なんですかっ……！\u3000これっ、あっ、あああっ！\u3000私の、知らないことですっ！\u3000んんっ、あっ、あああっ……！」"
translation = "「마왕님, 뭐인 건가요……! 이거, 앗, 아아앗! 저의 모르는 거예요! 응읏, 앗, 아아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「これから、教えるよ……エステルに……」"
translation = "「이제부터 가르쳐 줄게…… 에스텔에게……」"

[[dialogue]]
speaker = "エステル"
original = "「はあっ、あっ、ありがとう、ございますっ！\u3000魔王様っ！\u3000教えて、くださいっ！\u3000あっ、あっ、あああっ！！！」"
translation = "「하앗, 앗, 감사합니다! 마왕님! 가르쳐주세요! 앗, 앗, 아아앗!!!」"

[[dialogue]]
speaker = "クロト"
original = "「我慢しないで、そのまま受け入れて……」"
translation = "「참지 말고 그대로 받아들여……」"

[[dialogue]]
speaker = "エステル"
original = "「はぁ、うっ……わかり、ましたっ……んんっ、あ、ああっ……！\u3000抗い、ませんっ……！\u3000受け入れますっ！」"
translation = "「하아, 읏…… 알겠, 습니다…… 응읏, 아, 아앗……! 거스르지 않겠어요……! 받아들일게요!」"

[[dialogue]]
speaker = "エステル"
original = "「魔王様に抗うなんて、できませんしっ……ああっ……こんな、気持ちいいことっ……！\u3000むりっ、無理ですっ……！！」"
translation = "「마왕님을 거스르다니 할 수 없고요…… 아앗…… 이런 기분 좋은 것……! 무리, 무리예요……!!」"

[[dialogue]]
speaker = "エステル"
original = "「あああっ、あっ、や、んんっ、あっ、あ、あ、あ、ああああっ……！！\u3000ああっ、あっ、あっ、あ、ああ、あああっ……！！！」"
translation = "「아아앗, 앗, 야, 응읏, 앗, 아, 아, 아, 아아아앗……!! 아앗, 앗, 앗, 아, 아아, 아아앗……!!!」"

[[dialogue]]
speaker = "unk"
original = "切迫した声が大聖堂に響き渡る。"
translation = "절박한 목소리가 대성당에 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "何かに耐えられなくなったように、エステルの細い身体が大きく暴れた。"
translation = "무언가 견딜 수 없게 된 듯 에스텔의 가녀린 몸이 크게 요동쳤다."

[[dialogue]]
speaker = "unk"
original = "それを後ろからしっかりと抱きしめながら、俺も絶頂に向かって激しく突き上げる。"
translation = "그것을 뒤에서 꽉 껴안으며 나도 절정을 향해 격렬하게 치올린다."

[[dialogue]]
speaker = "エステル"
original = "「はあっ、あっ、何か、来ますっ、魔王、さまっ！\u3000や、ああっ、く、イクっ、んんっ、んっ、う、あぁ、あ、あああっ……！」"
translation = "「하앗, 앗, 무언가 와요, 마왕님! 야, 아앗, 가, 가버려, 응읏, 응, 으, 아아, 아, 아아앗……!」"

[[dialogue]]
speaker = "エステル"
original = "「あっ、あああっ、や、んんっ<emoji=heart04>\u3000ああっ、あっ、あっ、あ、あ、ああっ<emoji=heart04>\u3000は、ああっ、あっ、や……んっ、んくぅ……っ、んんっ、ん、ぁ……」"
translation = "「앗, 아아앗, 야, 응읏<emoji=heart04> 아앗, 앗, 앗, 아, 아, 아앗<emoji=heart04> 하, 아앗, 앗, 야…… 응, 응쿠……읏, 응읏, 응, 아……」"

[[dialogue]]
speaker = "エステル"
original = "「あっ、あ……ぁああああああああああああっっっ！！！！」"
translation = "「앗, 아…… 아아아아아아아아아아앗!!!!」"

[[dialogue]]
speaker = "unk"
original = "高らかな叫びと共に、エステルが絶頂を迎える。"
translation = "높은 외침과 함께 에스텔이 절정을 맞이한다."

[[dialogue]]
speaker = "unk"
original = "彼女の戸惑いを示すように、俺の脚の上でその細い体を波打たせた。"
translation = "그녀의 당혹감을 나타내듯 내 허벅지 위에서 그 가느다란 몸을 물결치게 했다."

[[dialogue]]
speaker = "エステル"
original = "「ああっ……あっ……んんっ……あっ……あ……<emoji=heart04>\u3000あっ、あっ……あああっ……<emoji=heart04>」"
translation = "「아앗…… 앗…… 응읏…… 앗…… 아……<emoji=heart04> 앗, 앗…… 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「魔王様、の、熱いの……出てますっ……んんっ……ぅ……あぁあ……<emoji=heart04>」"
translation = "「마왕님의 뜨거운 거…… 나오고 있어요…… 응읏…… 우…… 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
original = "「私っ、知って、ますっ……精液っ……ザーメンっ……子どもを作るための……魔王様のっ……精子っ……んんっ……<emoji=heart04>」"
translation = "「저 알고 있어요…… 정액…… 제멘…… 아이를 만들기 위한…… 마왕님의 정자…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のペニスはエステルの一番深いところに突き当たったまま、先端から熱い液体を脈動と共に吐き出す。"
translation = "내 자지는 에스텔의 가장 깊은 곳에 닿은 채 끝에서 뜨거운 액체를 맥동과 함께 쏟아낸다."

[[dialogue]]
speaker = "unk"
original = "それを唇を噛み、受け止めながら、エステルは快感の余韻に身を震わせている。"
translation = "그것을 입술을 깨물며 받아내면서 에스텔은 쾌락의 여운에 몸을 떨고 있다."

[[dialogue]]
speaker = "エステル"
original = "「ああっ、あっ、ふぁ……んんっ、あっ……ふぁ、ああっ……や、んんっ……あっ、ああああっ……<emoji=heart04>」"
translation = "「아앗, 앗, 화아…… 응읏, 앗…… 화아, 아앗…… 야, 응읏…… 앗, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少しずつ絶頂の余韻が引き、エステルの身体から力が抜けていく。"
translation = "조금씩 절정의 여운이 가시며 에스텔의 몸에서 힘이 빠져나간다."

[[dialogue]]
speaker = "unk"
original = "それを後ろから抱えるようにして支えた。"
translation = "그것을 뒤에서 안 듯이 지탱해주었다."

[[dialogue]]
speaker = "エステル"
original = "「……こんな場所で男女の営みを交わすなんて…………恥ずかしくてたまらなかったのですが……」"
translation = "「……이런 장소에서 남녀의 정사를 나누다니………… 부끄러워 견딜 수 없었습니다만…………」"

[[dialogue]]
speaker = "エステル"
original = "「でも……それは……違ったかも、しれません……」"
translation = "「하지만…… 그것은…… 틀렸을지도 모르겠네요……」"

[[dialogue]]
speaker = "エステル"
original = "「私たちは……女神様の前で……結ばれたんですよね……」"
translation = "「우리는…… 여신님 앞에서…… 맺어진 거군요……」"

[[dialogue]]
speaker = "エステル"
original = "「それは……もしかしたら……何よりも神聖な行いなのかもしれないって……魔王様、そういうことですよね？」"
translation = "「그것은…… 어쩌면…… 무엇보다 신성한 행위일지도 모른다고…… 마왕님, 그런 거죠?」"

[[dialogue]]
speaker = "クロト"
original = "「そうかもしれないな……」"
translation = "「그럴지도 모르겠네……」"

[[dialogue]]
speaker = "unk"
original = "神聖な行為というには欲望に突き動かされてしまった。"
translation = "신성한 행위라기엔 욕망에 휘둘리고 말았다."

[[dialogue]]
speaker = "unk"
original = "だが、体を重ねたことによってエステルとのつながりが深くなったことは実感している。"
translation = "하지만 몸을 섞음으로써 에스텔과의 유대감이 깊어진 것은 실감하고 있다."

[[dialogue]]
speaker = "unk"
original = "それを思うと、エステルには満足してもらえる初めての経験をあげられたのではないかと思った。"
translation = "그것을 생각하니 에스텔에게는 만족스러운 첫 경험을 안겨준 것이 아닐까 생각했다."

