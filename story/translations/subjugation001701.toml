[[dialogue]]
speaker = "unk"
original = "文化祭が近づき、学園内も<ruby>俄<rt>にわ</rt></ruby>かに活気づいてきた頃。"
translation = "문화제가 다가오고 학원 내도 순식간에 활기를 띠기 시작했을 무렵."

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃ～ん、助けて～っ！」"
translation = "「오빠~, 도와줘~!」"

[[dialogue]]
speaker = "unk"
original = "俺をお兄ちゃんと呼ぶ妹の１人・メイプルが星徒会室に駆け込んできた。"
translation = "나를 오빠라고 부르는 여동생 중 한 명인 메이플이 성도회실로 뛰어 들어왔다."

[[dialogue]]
speaker = "アナ"
original = "「メイプルさん、血相を変えてどうされました？」"
translation = "「메이플 씨, 얼굴색이 변해서 어찌 된 일이신가요?」"

[[dialogue]]
speaker = "メイプル"
original = "「アナ！\u3000ウチの部長に『会長を呼んでこい』って脅さ──頼まれたの」"
translation = "「아나! 우리 부장님한테 『회장을 불러와라』라고 협박── 부탁받았어」"

[[dialogue]]
speaker = "unk"
original = "不穏な言葉が聞こえたけど……ウチの部長？"
translation = "불온한 단어가 들린 것 같은데…… 우리 부장님?"

[[dialogue]]
speaker = "メイプル"
original = "「前に言わなかったっけ？\u3000あたし、演劇部に入ってるんだ！」"
translation = "「전에 말 안 했었나? 나, 연극부에 들어갔거든!」"

[[dialogue]]
speaker = "アナ"
original = "「眼帯の着用で豹変するメイプルさんにはベストマッチ＆ベストチョイスですね」"
translation = "「안대 착용으로 표변하는 메이플 씨에게는 베스트 매치 & 베스트 초이스네요」"

[[dialogue]]
speaker = "メイプル"
original = "「でしょ！\u3000楽しくやってる……じゃなくって！\u3000この話は後！\u3000今すぐ演劇部に来て！\u3000じゃないと、全身くすぐりの刑に処されちゃうの！」"
translation = "「그치! 즐겁게 하고 있…… 그게 아니고! 이 이야기는 나중에! 지금 당장 연극부로 와줘! 안 그러면 전신 간지럽히기 형에 처해질 거야!」"

[[dialogue]]
speaker = "アナ"
original = "「ごくり……それはなんと恐ろしい。演劇部の部長というと……ロクサーナさんですか」"
translation = "「꿀꺽…… 그건 정말 무시무시하군요. 연극부 부장이라고 하면…… 록사나 씨인가요」"

[[dialogue]]
speaker = "unk"
original = "ロクサーナさん？"
translation = "록사나 씨?"

[[dialogue]]
speaker = "アナ"
original = "「３年生のロクサーナ・ハイドランジアさんです。演劇部部長にして脚本家、兼演出家。演劇部の舞台の全ては彼女によって作られているといっても過言ではないです」"
translation = "「3학년인 록사나 하이드란지아 씨입니다. 연극부 부장이자 각본가, 겸 연출가. 연극부 무대의 모든 것은 그녀에 의해 만들어진다고 해도 과언이 아닙니다」"

[[dialogue]]
speaker = "アナ"
original = "「天才にして、唯我独尊にして、気分屋。彼女の機嫌を損ねると厄介なことになるそうです」"
translation = "「천재이면서 유아독존, 그리고 변덕쟁이. 그녀의 기분을 상하게 하면 골치 아픈 일이 생긴다고 합니다」"

[[dialogue]]
speaker = "アナ"
original = "「会長、業務は引き継いでおきますので、演劇部に向かってあげてください」"
translation = "「회장, 업무는 제가 인계받을 테니 연극부로 가주세요」"

[[dialogue]]
speaker = "メイプル"
original = "「アナ、ありがと！」"
translation = "「아나, 고마워!」"

[[dialogue]]
speaker = "unk"
original = "迷惑かけるね、アナ"
translation = "민폐를 끼치네, 아나"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです。会長は会長にしかできない仕事を成し遂げてください」"
translation = "「노 프로블럼입니다. 회장은 회장만이 할 수 있는 업무를 완수해 주세요」"

[[dialogue]]
speaker = "unk"
original = "残っていた業務はアナにお任せして、俺はメイプルとともに演劇部室へと向かった。"
translation = "남아있던 업무는 아나에게 맡기고, 나는 메이플과 함께 연극부실로 향했다."

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃん、くれぐれも気をつけてね」"
translation = "「오빠, 부디 조심해」"

[[dialogue]]
speaker = "メイプル"
original = "「アナが言ってた通り、部長は天才肌で気分屋。機嫌を損ねると、雷が落ちたり、無理難題を押し付けられたりするから！」"
translation = "「아나가 말한 대로 부장님은 천재 스타일에 변덕쟁이야. 기분을 상하게 하면 벼락이 떨어지거나 억지스러운 요구를 강요받으니까!」"

[[dialogue]]
speaker = "unk"
original = "真剣みを帯びたメイプルの警告の意味は、わずか数分後に理解することになる。"
translation = "진지함이 묻어나는 메이플의 경고의 의미는 불과 몇 분 후에 이해하게 된다."

[[dialogue]]
speaker = "メイプル"
original = "「部長～、お兄ちゃ──じゃない、星徒会長を連れてきました～」"
translation = "「부장님~, 오빠──가 아니라 성도회장을 데려왔어요~」"

[[dialogue]]
speaker = "部長？"
original = "「メイプルさん、お疲れさまです。すごいですね、本当に会長さんを連れてこられるなんて……」"
translation = "「메이플 씨, 수고하셨어요. 대단하네요, 정말로 회장님을 데려오시다니……」"

[[dialogue]]
speaker = "unk"
original = "あなたが部長のロクサーナさん？\nはじめまして、会長のクロトです"
translation = "당신이 부장인 록사나 씨?\\n처음 뵙겠습니다, 회장 쿠로토입니다"

[[dialogue]]
speaker = "メイプル"
original = "「あ……ヤバッ……！」"
translation = "「아…… 위험해……!」"

[[dialogue]]
speaker = "藍"
original = "「い、いえっ、私は、その……私は部長ではなく……ただの部員です。<ruby>泉原藍<rt>いずはらあい</rt></ruby>、１年生です」"
translation = "「아, 아니요, 저는 그게…… 저는 부장이 아니라…… 그냥 부원이에요. 이즈하라 아이, 1학년입니다」"

[[dialogue]]
speaker = "unk"
original = "１年生！？\u3000ということは──"
translation = "1학년!? 그렇다는 건──"

[[dialogue]]
speaker = "？？？"
original = "「ほほう？\u3000星徒会長様は木っ端演劇部の部長の顔などご存じないようだな」"
translation = "「호오? 성도회장님께서는 보잘것없는 연극부 부장의 얼굴 따위는 모르시는 모양이군」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「演劇部の部長は、この私、ロクサーナ・ハイドランジアだ！\u3000いずれ世界に刻まれるこの名、覚えておいて損はさせん」"
translation = "「연극부 부장은 이 나, 록사나 하이드란지아다! 조만간 세계에 새겨질 이 이름, 기억해 둬서 손해 볼 건 없지」"

[[dialogue]]
speaker = "unk"
original = "小さいから、てっきり──もがっ"
translation = "작으니까 당연히── 웁"

[[dialogue]]
speaker = "メイプル"
original = "「わーっ！\u3000お兄ちゃん、黙って！」"
translation = "「와아! 오빠, 조용히 해!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「……まあ、いい。私への非礼は、頼みを聞くことでチャラにしてやる」"
translation = "「……뭐, 됐다. 나에 대한 결례는 부탁을 들어주는 것으로 퉁쳐 주지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「メイプルを使って、ここに呼びつけたのは他でもない。折り入って、会長に頼みがある」"
translation = "「메이플을 써서 이곳으로 불러낸 건 다름이 아니다. 긴히 회장에게 부탁이 있다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「我が演劇部は毎年、文化祭の出し物として舞台を披露しているのだが、少々困ったことになっていてな。そいつを高名な会長様の体で解決してもらいたい」"
translation = "「우리 연극부는 매년 문화제 행사로 무대를 선보이고 있는데, 조금 곤란한 일이 생겨서 말이지. 그것을 고명하신 회장님의 몸으로 해결해 줬으면 한다」"

[[dialogue]]
speaker = "藍"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃん、あたしからもお願いっ！\u3000このままだと演劇部の危機なのっ！」"
translation = "「오빠, 나도 부탁할게! 이대로라면 연극부의 위기야!」"

[[dialogue]]
speaker = "unk"
original = "ひとまず、具体的な困りごとの内容と、受けるか否かはともかくとして──"
translation = "일단 구체적으로 어떤 곤란한 일인지와, 수락 여부는 제쳐두고──"

[[dialogue]]
speaker = "unk"
original = "ちなみに今年の演目は？"
translation = "참고로 올해의 공연 종목은?"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ん？\u3000星徒会には事前に演目予定を提出していたはずだが、目を通していないのか？」"
translation = "「음? 성도회에는 사전에 공연 예정 목록을 제출했을 텐데, 훑어보지도 않은 건가?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「まぁさしたる手間でもない、問われれば答えよう。呆れかえるほどに定番もド定番」"
translation = "「뭐, 그리 수고로운 일도 아니니 물어보면 답해주지. 질릴 정도로 전형적이고도 아주 전형적인」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「言わずと知れたウィリアム・シェイクスピアの戯曲を原作とした悲恋物語の教科書──『ロミオとジュリエット』だ」"
translation = "「누구나 다 아는 윌리엄 셰익스피어의 희곡을 원작으로 한 비련 이야기의 교과서── 『로미오와 줄리엣』이다」"

