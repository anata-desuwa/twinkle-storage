[[dialogue]]
speaker = "unk"
original = "「モナカ・膣内射精版」を読む"
translation = "「모나카·질내 사정 판」을 읽는다"

[[dialogue]]
speaker = "unk"
original = "「モナカ・膣外射精版」を読む"
translation = "「모나카·질외 사정 판」을 읽는다"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えいっ、やぁっ、たぁーっ！」"
translation = "「에잇, 야앗, 타앗-!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいぞ、その調子だ！」"
translation = "「좋아, 그 기세다!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「うんっ。にぃ様、もう一本お願いっ」"
translation = "「응. 오라버니, 한 번 더 부탁해」"

[[dialogue]]
speaker = "unk"
original = "静かな森にモナカの溌剌とした声が響く。"
translation = "고요한 숲에 모나카의 활기찬 목소리가 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "いつからだっただろうか。街から遠く離れた森の湖畔が俺とモナカの秘密の特訓場所になっていた。"
translation = "언제부터였을까. 마을에서 멀리 떨어진 숲의 호숫가가 나와 모나카의 비밀 특훈 장소가 되어 있었다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「はぁ、はぁ、えへへ……。いつもありがとね、にぃ様。モナカのトレーニングに付き合ってもらっちゃって……」"
translation = "「하아, 하아, 에헤헤……. 항상 고마워, 오라버니. 모나카의 트레이닝을 도와줘서……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺がモナカと一緒にいたいだけだよ。ちょっとしたデートみたいな気分だし」"
translation = "「내가 모나카랑 같이 있고 싶을 뿐이야. 짧은 데이트 같은 기분이고.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「デー──～～っっ。恥ずかしいよぉ……。未だに、その……。にぃ様とお付き合いさせてもらってるなんて信じられなくて……」"
translation = "「데──～～읏. 부끄러워요……. 아직도, 그게……. 오라버니랑 사귀고 있다니 믿기지 않아서……」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに赤面するモナカを見て心臓がどくんと跳ねる。"
translation = "수줍어하며 얼굴을 붉히는 모나카를 보고 심장이 쿵 하고 뛴다."

[[dialogue]]
speaker = "unk"
original = "正直……今すぐにでも抱き締めたい。だけどモナカは手をつなぐのもやっとなくらい照れ屋な女の子だ。"
translation = "솔직히…… 지금 당장이라도 껴안고 싶다. 하지만 모나카는 손을 잡는 것도 겨우 할 정도로 부끄러움을 타는 여자아이다."

[[dialogue]]
speaker = "unk"
original = "彼氏として、性急なことをしてあまり彼女を困らせるようなことはしたくない。"
translation = "남자친구로서, 성급한 짓을 해서 그녀를 너무 곤란하게 만들고 싶지는 않다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よ、よし、もう一本いこう！」"
translation = "「조, 좋아, 한 번 더 가자!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「うんっ……！\u3000いくよ、にぃ様……！」"
translation = "「응……! 간다, 오라버니……!」"

[[dialogue]]
speaker = "unk"
original = "邪な気持ちを振り払うようにモナカと軽く打ち合おうとする。"
translation = "사악한 마음을 떨쳐내려는 듯 모나카와 가볍게 대련하려 한다."

[[dialogue]]
speaker = "unk"
original = "しかし駆け出したところで草に足を取られてしまって──"
translation = "그러나 달려나가던 중 풀에 발이 걸리고 말아서──"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ひゃっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker = "unk"
original = "モナカを巻き込んで草の上に倒れてしまう。"
translation = "모나카를 휘말리게 하며 풀밭 위로 쓰러지고 만다."

[[dialogue]]
speaker = "unk"
original = "重なり合った体から、彼女のぬくもりがはっきり伝わってきて──"
translation = "겹쳐진 몸에서 그녀의 온기가 선명하게 전해져 와서──"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「に、にぃ様……」"
translation = "「오, 오라버니……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っっ。ごめん、すぐにどくから……！」"
translation = "「윽. 미안, 금방 비킬게……!」"

[[dialogue]]
speaker = "unk"
original = "今までにないほどモナカの顔が間近にあって慌てて離れようとする。"
translation = "여태껏 없었을 정도로 모나카의 얼굴이 가까이 있어 당황하며 떨어지려 한다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ま、待ってっ！\u3000もう少し、はぁはぁ、このまま……」"
translation = "「기, 기다려 줘! 조금만 더, 하아 하아, 이대로……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このままって……」"
translation = "「이대로라니……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「だって……。にぃ様が初めて押し倒してくれた、から……」"
translation = "「그게……. 오라버니가 처음으로 덮쳐줬으니까……」"

[[dialogue]]
speaker = "unk"
original = "倒れた拍子に乱れた服も直そうとせず、モナカが上目遣いに見つめてきてくれる。"
translation = "넘어지면서 흐트러진 옷도 고치려 하지 않고, 모나카가 치켜뜬 눈으로 나를 바라봐 준다."

[[dialogue]]
speaker = "unk"
original = "汗ばんだモナカの体が色っぽい。"
translation = "땀에 젖은 모나카의 몸이 색기 넘친다."

[[dialogue]]
speaker = "unk"
original = "その小さな胸に、先程よりも赤くなった顔に、俺の全身が瞬く間に火照っていく。"
translation = "그 작은 가슴에, 조금 전보다 붉어진 얼굴에, 내 전신이 순식간에 달아오른다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「さ……触っていいんだよ……？」"
translation = "「마…… 만져도 괜찮아……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様、ずっと我慢してくれてたんだよ……ね？\u3000モナカが、その、手をつなぐだけでも大慌てしちゃうから……」"
translation = "「오라버니, 계속 참아줬던 거……지? 모나카가, 그게, 손을 잡는 것만으로도 엄청 당황해 버리니까……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも、その……。大丈夫、だから……。モナカは、にぃ様にどんなことされても嫌じゃないから……」"
translation = "「하지만, 그게……. 괜찮으니까……. 모나카는 오라버니에게 어떤 짓을 당해도 싫지 않으니까……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「う、ううん……。本当は、その、ずっと……。にぃ様に、こういうこと、してもらいたかったから……」"
translation = "「으, 으응……. 사실은, 그게, 계속……. 오라버니가 이런 거, 해주길 바랐으니까……」"

[[dialogue]]
speaker = "unk"
original = "言いながらモナカがそっと俺のズボンを下ろしてくる。"
translation = "말하면서 모나카가 살며시 내 바지를 내린다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「え、えへへ……。やっと下ろしてあげられた……」"
translation = "「에, 에헤헤……. 겨우 내려줬다……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「いつもね……？\u3000気になってたの。モナカが近づくと、その……。にぃ様のここ、ムクムク膨らんでたから……」"
translation = "「항상 말이야……? 신경 쓰였어. 모나카가 다가가면, 그게……. 오라버니의 여기, 불끈불끈 부풀어 있었으니까……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「挿れて欲しい……な？\u3000にぃ様とひとつになりたい……」"
translation = "「박아줬으면 좋겠……어? 오라버니와 하나가 되고 싶어……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ちゃんとにぃ様の恋人さんになりたいから……。大好きなにぃ様ともっとイチャイチャしたいから……」"
translation = "「제대로 오라버니의 연인이 되고 싶으니까……. 사랑하는 오라버니랑 좀 더 꽁냥꽁냥하고 싶으니까……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカと、はぁ、はぁ……。エッチ、してくれる……？」"
translation = "「모나카랑, 하아, 하아……. 섹스, 해줄 거야……?」"

[[dialogue]]
speaker = "unk"
original = "精一杯の勇気を振り絞るようにモナカが問いかけてくれる。"
translation = "있는 힘껏 용기를 쥐어짜는 듯 모나카가 물어온다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女に応えないわけにはいかなかった。"
translation = "그런 그녀에게 응답하지 않을 수 없었다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ふぁぁぁっ……！\u3000あっ、んくっ……！\u3000んぁんっ……！」"
translation = "「후아아앗……! 앗, 응큿……! 응아앙……!」"

[[dialogue]]
speaker = "unk"
original = "明らかに俺のモノよりも小さく狭い割れ目を広げながら、できるだけゆっくりとペニスを沈めていく。"
translation = "분명 내 물건보다 작고 좁은 갈라진 틈을 벌리며, 가능한 한 천천히 자지를 가라앉혀 간다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「はぁ、はぁ、えへへっ……。にぃ様と、んぁ、ついに繋がれた……」"
translation = "「하아, 하아, 에헤헷……. 오라버니랑, 응아, 드디어 이어졌어……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「感じる、よっ……？\u3000にぃ様がモナカの中に、入ってきてくれてる、ことっ……」"
translation = "「느껴져……? 오라버니가 모나카 안으로 들어오고 있다는 거……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「すごく、あぁん……。あったかい……。モナカの膣内で、あっ、はぁ……。ビクンビクンしてくれて……」"
translation = "「너무, 아앙……. 따뜻해……. 모나카의 질 안에서, 앗, 하아……. 움찔움찔해주고……」"

[[dialogue]]
speaker = "unk"
original = "感触を確かめるように、モナカがぎゅっ……ぎゅっ……と控えめにペニスを抱き締めてくれる。"
translation = "감촉을 확인하듯, 모나카가 꼬옥…… 꼬옥…… 하며 조심스럽게 자지를 껴안아 준다."

[[dialogue]]
speaker = "unk"
original = "その遠慮がちな動きが実に彼女らしくて、モナカと繋がっていることをこれ以上なく実感した。"
translation = "그 사양하는 듯한 움직임이 참으로 그녀다워서, 모나카와 이어져 있다는 것을 더할 나위 없이 실감했다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あっ……あっ……あぁんっ……。ズンズン動いてくれるの、はぁぁん、嬉しい……」"
translation = "「앗…… 앗…… 아앙……! 푹푹 움직여 주는 거, 하아아앙, 기뻐……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「いつものにぃ様なら、あっ、はぁ……。モナカが痛がらないようにって、じっとしてそうなもの、なのに……」"
translation = "「평소의 오라버니라면, 앗, 하아……. 모나카가 아프지 않게 하려고 가만히 있었을 텐데……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「それだけ、えへへ……。にぃ様も興奮、してくれてるんだ……？\u3000モナカとのエッチに、あぁん、ドキドキしてくれてるんだ……？」"
translation = "「그만큼, 에헤헤……. 오라버니도 흥분해 준 거야……? 모나카와의 섹스에, 아앙, 두근두근해 주고 있는 거야……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカの膣内でズンズンして、ふぁっ……はぁんっ……。気持ち良く、なってくれてるんだっ……？」"
translation = "「모나카의 질 안에서 푹푹 박아서, 화앗…… 하앙……! 기분 좋아지고 있는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "モナカの言う通りだった。挿れてすぐに動くつもりなんかなかったのに抽挿をとめることができない。"
translation = "모나카의 말대로였다. 삽입하자마자 움직일 생각 따위 없었는데 추삽질을 멈출 수가 없다."

[[dialogue]]
speaker = "unk"
original = "甘い吐息を漏らして喘ぐモナカの姿が、ひと突きごとにぬらぬらと湿り気を増していく秘部が、俺の興奮と快感を加速させる。"
translation = "달콤한 숨결을 내뱉으며 신음하는 모나카의 모습이, 한 번 찌를 때마다 번들번들하게 습기를 더해가는 비부가 내 흥분과 쾌감을 가속시킨다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あふっ……あっ……はぁんっ……<emoji=heart04>\u3000い、いいよ、にぃ様……<emoji=heart04>\u3000好きなだけ、あぁん、モナカで気持ち良くなって……？」"
translation = "「아흣…… 앗…… 하앙……<emoji=heart04> 이, 좋아, 오라버니……<emoji=heart04> 마음껏, 아앙, 모나카로 기분 좋아져 줘……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカも、あっ……あっ……<emoji=heart04>\u3000気持ちいい、から……<emoji=heart04>\u3000にぃ様の硬いのが、あぁん……<emoji=heart04>\u3000たくさん擦れて……<emoji=heart04>」"
translation = "「모나카도, 앗…… 앗……<emoji=heart04> 기분 좋으니까……<emoji=heart04> 오라버니의 딱딱한 게, 아앙……<emoji=heart04> 잔뜩 쓸려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ちょっぴりズキズキするけど、あっ、んっ……<emoji=heart04>\u3000それ以上に、ふぁあっ、幸せで、気持ち良くて……<emoji=heart04>」"
translation = "「조금 욱신거리지만, 앗, 응……<emoji=heart04> 그 이상으로, 후아앗, 행복하고 기분 좋아서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「お股、ふぁっ、あぁ、ビショビショになってきちゃう……<emoji=heart04>\u3000体、はぁはぁっ、溶けちゃいそうなくらい熱い……<emoji=heart04>」"
translation = "「가랑이, 후앗, 아아, 비실비실 젖어버려……<emoji=heart04> 몸이, 하아하앗, 녹아버릴 정도로 뜨거워……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モナカがうっとりと目を細めて、俺のペニスに喘いでくれて、声も艶を増していく。"
translation = "모나카가 황홀하게 눈을 가늘게 뜨고, 내 자지에 신음해 주며 목소리도 요염함을 더해간다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「もっと、あっ、はぁっ……<emoji=heart04>\u3000奥まで挿れて、いいよっ……<emoji=heart04>\u3000ううん、にぃ様のもっと挿れて欲しいっ……<emoji=heart04>」"
translation = "「좀 더, 앗, 하앗……<emoji=heart04> 깊숙이 박아도 괜찮아……<emoji=heart04> 아니, 오라버니의 그거 좀 더 박아줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「感じたいのっ……<emoji=heart04>\u3000にぃ様のこと、もっとっ……<emoji=heart04>\u3000本当はずっと、はぁはぁっ、ずっとっ、にぃ様とエッチなことしたかったからっ……<emoji=heart04>」"
translation = "「느끼고 싶어……<emoji=heart04> 오라버니를, 좀 더……<emoji=heart04> 사실은 계속, 하아하앗, 계속, 오라버니랑 야한 짓 하고 싶었으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モナカも興奮してくれているのか、少しずつ行動が大胆になってくる。"
translation = "모나카도 흥분한 것인지 조금씩 행동이 대담해진다."

[[dialogue]]
speaker = "unk"
original = "俺が抽挿しやすいように股を大きく広げてくれて、先程よりも強くペニスを締め付けてきてくれて。"
translation = "내가 추삽질하기 편하도록 다리를 크게 벌려주고, 아까보다 강하게 자지를 조여온다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカ、はぁっ、はぁっ、ダメな子なのっ……<emoji=heart04>\u3000にぃ様とお付き合いさせてもらってから、実は……あっ、あっ、そういうことばかり考えちゃってっ……<emoji=heart04>」"
translation = "「모나카, 하앗, 하앗, 나쁜 아이야……<emoji=heart04> 오라버니랑 사귀고 나서부터, 사실은…… 앗, 앗, 그런 생각만 해버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様のお膝の上に乗ってる時も、付き合う前まではただ嬉しかっただけなのに、はぁっ、あぁっ、付き合ってからは、そのっ……<emoji=heart04>」"
translation = "「오라버니의 무릎 위에 앉아 있을 때도, 사귀기 전까지는 그냥 기쁘기만 했는데, 하앗, 아앗, 사귀고 나서부터는, 그게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様のっ……、にぃ様のおち○ぽのことばっかり気になっちゃってっ……<emoji=heart04>」"
translation = "「오라버니의……, 오라버니의 자지 생각만 자꾸 나버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「いつかこうして、あっ、あっ、にぃ様のおち○ぽ挿れて欲しいって、繋がりたいってっ、にぃ様のお膝の上でおパンツ濡らしちゃったりしてっ……<emoji=heart04>」"
translation = "「언젠가 이렇게, 앗, 앗, 오라버니의 자지 박아줬으면 좋겠다고, 이어지고 싶다고, 오라버니의 무릎 위에서 팬티 적셔버리기도 하고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ごめん、ねっ……<emoji=heart04>\u3000ごめんね、にぃ様っ……<emoji=heart04>\u3000にぃ様は、ずっとモナカのために我慢してくれてたのにっ……<emoji=heart04>」"
translation = "「미안, 해……<emoji=heart04> 미안해, 오라버니……<emoji=heart04> 오라버니는 계속 모나카를 위해서 참아줬는데……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカっ……、モナカねっ……<emoji=heart04>\u3000にぃ様のお膝の上で、はぁっ、はぁっ、お股スリスリしちゃったりしてたっ……<emoji=heart04>」"
translation = "「모나카, 모나카는 말이야……<emoji=heart04> 오라버니의 무릎 위에서, 하앗, 하앗, 가랑이 부비부비하기도 했어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様がお昼寝してる時も、はぁっ、はぁっ、こっそりキスしちゃったりもしてっ……<emoji=heart04>」"
translation = "「오라버니가 낮잠 자고 있을 때도, 하앗, 하앗, 몰래 키스하기도 하고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「手を繋いでくれた時もっ、帰ってからその手で、んぁ、はぁ、にぃ様が握ってくれた手でっ、しちゃったりしてっ……<emoji=heart04>」"
translation = "「손을 잡아줬을 때도, 집에 돌아와서 그 손으로, 응아, 하아, 오라버니가 잡아준 손으로 해버리기도 하고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「軽蔑、しちゃうよねっ……<emoji=heart04>\u3000ごめんねっ、はぁはぁっ、本当にごめんねっ、にぃ様っ……<emoji=heart04>\u3000こんなイケナイ子でごめんねっ……<emoji=heart04>」"
translation = "「경멸하겠지……<emoji=heart04> 미안해, 하아하앗, 정말 미안해, 오라버니……<emoji=heart04> 이런 못된 아이라 미안해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感で頭が朦朧としているのだろうか、モナカが赤裸々な告白をしてくれる。"
translation = "쾌감으로 머리가 몽롱해진 것일까, 모나카가 적나라한 고백을 한다."

[[dialogue]]
speaker = "unk"
original = "だけど、そんなことを言えば俺だって──"
translation = "하지만 그런 말을 한다면 나 역시──"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ひぃあっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、あっ<emoji=heart04><emoji=heart04>\u3000なん、でっ<emoji=heart04>\u3000にぃ様っ、あぁあんっっ、急にっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아앗<emoji=heart04> 앗, 앗, 앗, 앗, 앗<emoji=heart04><emoji=heart04> 왜, 어째서<emoji=heart04> 오라버니, 아아앙, 갑자기……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「喜んでっ、あぁんっ、くれてるのっ？\u3000こんなにモナカっ、あぁあんっ、イケナイ子なのにっ、エッチな子なのにっ……<emoji=heart04>」"
translation = "「기뻐해 주고, 아앙, 있는 거야? 이렇게 모나카, 아아앙, 못된 아이인데, 야한 아이인데……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頷く代わりに、狭い膣内へ思いっきり腰を打ち付ける。モナカの子宮を押し上げながら、ペニスを丸ごと小さな膣内へ挿入していく。"
translation = "고개를 끄덕이는 대신, 좁은 질 안으로 힘껏 허리를 부딪친다. 모나카의 자궁을 밀어 올리며, 자지를 통째로 작은 질 안으로 삽입해 간다."

[[dialogue]]
speaker = "unk"
original = "俺だって、ずっとモナカとエッチしたかったんだ。膝の上に乗ってくれている時もズボンに染みができるほど勃起させてしまっていた。"
translation = "나도 계속 모나카랑 섹스하고 싶었다. 무릎 위에 앉아 있을 때도 바지에 얼룩이 생길 정도로 발기해 버렸었다."

[[dialogue]]
speaker = "unk"
original = "それこそ毎晩のようにこうしてモナカとセックスする妄想だって──"
translation = "그야말로 매일 밤처럼 이렇게 모나카와 섹스하는 망상도──"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あっ、はっ、んぁっ、あぁんっ……<emoji=heart04>\u3000えへっ、えへへっ、そうなんだっ……<emoji=heart04>\u3000にぃ様もっ、モナカと同じことしてくれててっ……<emoji=heart04>」"
translation = "「앗, 핫, 응앗, 아앙……<emoji=heart04> 에헷, 에헤헷, 그랬구나……<emoji=heart04> 오라버니도, 모나카랑 같은 짓 해주고 있어서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「嬉しいよぉ、にぃ様っ……<emoji=heart04>\u3000本当に嬉しいっ……<emoji=heart04>」"
translation = "「기뻐, 오라버니……<emoji=heart04> 정말 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「これからは、あっ、はぁっ、たくさんイチャイチャ、しよっ……<emoji=heart04>」"
translation = "「이제부터는, 앗, 하앗, 잔뜩 꽁냥꽁냥, 하자……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカ、ふぁ、あぁっ、にぃ様といっぱいイチャイチャしたいっ……<emoji=heart04>」"
translation = "「모나카, 후아, 아앗, 오라버니랑 잔뜩 꽁냥꽁냥하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様とキスしたいっ……<emoji=heart04>\u3000にぃ様におっぱい触って欲しいっ……<emoji=heart04>\u3000にぃ様のおち○ぽでっ、あっ、あっ、モナカのおま○こ、たくさんたくさん突いて欲しいっ……<emoji=heart04>」"
translation = "「오라버니랑 키스하고 싶어……<emoji=heart04> 오라버니가 가슴 만져줬으면 좋겠어……<emoji=heart04> 오라버니의 자지로, 앗, 앗, 모나카의 보지, 잔뜩잔뜩 찔러줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "じっと俺の顔を見つめながら、モナカが俺のペニスをギュウギュウに抱き締めてくれる。"
translation = "지그시 내 얼굴을 바라보며, 모나카가 내 자지를 꽉 껴안아 준다."

[[dialogue]]
speaker = "unk"
original = "嬉しそうに体をビクビクと痙攣させながら、唇を突き出してきてくれる。"
translation = "기쁜 듯이 몸을 파르르 떨며 입술을 내밀어 준다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「んちゅぅっ……<emoji=heart04>\u3000んふっ、んっ、ちゅぅっ、れろっ……れろろぉっ……<emoji=heart04>」"
translation = "「음츄웃……<emoji=heart04> 응훗, 응, 츄웃, 레로…… 레로로옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ぷはぁっ……あぁんっ、あっ、あっ、あっ、あはぁあんっ……<emoji=heart04>」"
translation = "「푸핫…… 아앙, 앗, 앗, 앗, 아하아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たまらずモナカの唇を奪いながら、プニプニの小さなおっぱいを揉みしだき、欲望のままモナカを求めていく。"
translation = "참지 못하고 모나카의 입술을 빼앗으며, 말랑말랑한 작은 가슴을 주무르고, 욕망대로 모나카를 갈구해 간다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「幸せっ……<emoji=heart04>\u3000にぃ様がっ、あっ、はぁっ、にぃ様がこんなにモナカを愛してくれてっ……<emoji=heart04>」"
translation = "「행복해……<emoji=heart04> 오라버니가, 앗, 하앗, 오라버니가 이렇게나 모나카를 사랑해 줘서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「好きっ……<emoji=heart04>\u3000好きだよ、にぃ様っ……<emoji=heart04>\u3000大好きっ……<emoji=heart04>\u3000好きっ……<emoji=heart04>」"
translation = "「좋아해……<emoji=heart04> 좋아해, 오라버니……<emoji=heart04> 정말 좋아해……<emoji=heart04> 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「もうそれしか、あっ、あっ、考えられないっ……<emoji=heart04>\u3000にぃ様っ……<emoji=heart04>\u3000あぁあんっ、にぃ様ぁっ……<emoji=heart04>」"
translation = "「이제 그것밖에, 앗, 앗, 생각할 수 없어……<emoji=heart04> 오라버니……<emoji=heart04> 아아앙, 오라버니이……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口下手なモナカなりに必死に想いを伝えようとしてくれているのがわかる。"
translation = "말주변 없는 모나카 나름대로 필사적으로 마음을 전하려 하고 있다는 것을 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "とろとろに濡れそぼった秘部から、火照りきった体から、モナカが今にもイキそうなほど欲情してくれていることが伝わってくる。"
translation = "걸쭉하게 젖어버린 비부에서, 달아오른 몸에서, 모나카가 당장이라도 가버릴 정도로 욕정하고 있다는 것이 전해져 온다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000気持ちいいっ……<emoji=heart04>\u3000にぃ様のおち○ぽ、どんどんモナカの膣内で大きくなってくれてっ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 기분 좋아……<emoji=heart04> 오빠의 자지, 점점 모나카의 질 내에서 커지고 있어서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様がいるっ、モナカの中にいるっ……<emoji=heart04>\u3000ひとつにっ、あっ、あっ、大好きなにぃ様と、こんなにもひとつになれてっ……<emoji=heart04>」"
translation = "「오빠가 있어, 모나카 안에 있어……<emoji=heart04> 하나가, 앗, 앗, 제일 좋아하는 오빠랑 이렇게나 하나가 될 수 있어서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その幸せな一体感が本能を刺激してくる。"
translation = "그 행복한 일체감이 본능을 자극해 온다."

[[dialogue]]
speaker = "unk"
original = "ペニスが脈打って、それに呼応するようにモナカの膣内も締まって──"
translation = "페니스가 맥동하고, 그에 호응하듯 모나카의 질 내부도 조여지며──"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あふあっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000気持ちいいよぉ、にぃ様っ<emoji=heart04>」"
translation = "「아후앗<emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋아, 오빠<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様のおち○ぽでズンズンしてもらうの、本当に気持ちいいっ……<emoji=heart04>\u3000おま○このズキズキがっ、あはぁっ、どんどんキュンキュンに変わってっ……<emoji=heart04>」"
translation = "「오빠의 자지로 쿵쾅쿵쾅 해주는 거, 정말 기분 좋아……<emoji=heart04> 보지의 욱신욱신함이, 아하앗, 점점 큥큥거림으로 변해서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「イっちゃいそっ……<emoji=heart04>\u3000もうイっちゃっ……<emoji=heart04>\u3000にぃ様と、ふぁああっ、にぃ様と一緒にイキたいのにっ……<emoji=heart04>」"
translation = "「가버릴 것 같아……<emoji=heart04> 벌써 가버렷……<emoji=heart04> 오빠랑, 화아앗, 오빠랑 같이 가고 싶은데……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも我慢っ、あふぁあっ、我慢できなっ……<emoji=heart04>\u3000頭の中フワフワしすぎてっ、おま○こっ、キュンキュンしすぎてっ……<emoji=heart04>」"
translation = "「하지만 참아야, 아하앗, 참을 수 없……<emoji=heart04> 머릿속이 너무 폭신폭신해서, 보지가, 너무 큥큥거려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ダメっ、んぁあああっ、イっちゃっ、イクっ、イクイクっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「안 돼, 응아아앗, 가버렷, 가, 가버렷어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ごめんなさいっ……<emoji=heart04>\u3000こんな時までダメな子でごめんなさいっ……<emoji=heart04>\u3000イクのも我慢できない子でごめんなさいっ……<emoji=heart04>」"
translation = "「죄송해요……<emoji=heart04> 이럴 때까지 나쁜 아이라서 죄송해요……<emoji=heart04> 가는 것도 참지 못하는 아이라서 죄송해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも気持ち良すぎてっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000にぃ様の気持ち良すぎてっ<emoji=heart04>」"
translation = "「하지만 너무 기분 좋아서<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 오빠 거 너무 기분 좋아서<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「もうダメっ<emoji=heart04>\u3000あっ、あああっ<emoji=heart04>\u3000耐えられなっ、ああああっ、ああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 안 돼<emoji=heart04> 앗, 아아앗<emoji=heart04> 견딜 수 없, 아아아앗, 아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ごめんなさっ、ごめんなさいっ、ごめんなさいっっ<emoji=heart04>\u3000エッチな子でっ、ごめんなさ～いっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「죄송해욧, 죄송해요, 죄송해욧<emoji=heart04> 야한 아이라서, 죄송해요~~옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ふあっっ──あっ、はぁあああああああんんんんんっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후앗──앗, 하아아아아아아아앙응으으으으읏~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モナカが達した瞬間、彼女の体を力いっぱい抱きしめて、その小さな子宮の中にありったけの精を注ぎ込む。"
translation = "모나카가 절정에 달한 순간, 그녀의 몸을 힘껏 껴안고 그 작은 자궁 속에 있는 대로 정액을 쏟아붓는다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あふぁっ……<emoji=heart04>\u3000ああああっっ……<emoji=heart04>\u3000これっ、はふぁっ……<emoji=heart04>\u3000にぃ様のっ……<emoji=heart04>\u3000あったかいのが、あぁっ、いっぱいっ……<emoji=heart04>」"
translation = "「아하앗……<emoji=heart04> 아아아앗……<emoji=heart04> 이거, 하후앗……<emoji=heart04> 오빠의……<emoji=heart04> 따뜻한 게, 아앗, 가득……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへっ、えへへっ……<emoji=heart04>\u3000ありがとう、にぃ様……<emoji=heart04>\u3000一緒に、んあぁぁんっ、モナカと一緒にイってくれてっ……<emoji=heart04>」"
translation = "「에헷, 에헤헷……<emoji=heart04> 고마워요, 오빠……<emoji=heart04> 같이, 응아아앙, 모나카랑 같이 가줘서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「どぴゅどぴゅきてるっ……<emoji=heart04>\u3000にぃ様のが、あぁんっ、モナカの赤ちゃんのお部屋にっ……<emoji=heart04>」"
translation = "「푸슉푸슉 나오고 있어……<emoji=heart04> 오빠 거가, 아앙, 모나카의 아기방에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「本当に嬉しいっ……<emoji=heart04>\u3000にぃ様がモナカの中にいるっ……<emoji=heart04>\u3000モナカの体っ、にぃ様で満たされていってっ……<emoji=heart04>」"
translation = "「정말 기뻐요……<emoji=heart04> 오빠가 모나카 안에 있어……<emoji=heart04> 모나카의 몸, 오빠로 채워져 가고 있어서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「えへっ、えへへっ……<emoji=heart04>\u3000幸せっ……<emoji=heart04>\u3000にぃ様、大好きっ……<emoji=heart04>\u3000好きっ……<emoji=heart04>\u3000ぜんぶ受け止めたいっ……<emoji=heart04>」"
translation = "「에헷, 에헤헷……<emoji=heart04> 행복해……<emoji=heart04> 오빠, 너무 좋아……<emoji=heart04> 좋아해……<emoji=heart04> 전부 받아내고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の方こそ幸せでたまらない。嬉しそうに痙攣してくれるモナカが愛しくてたまらない。"
translation = "나야말로 행복해서 견딜 수 없다. 기쁜 듯이 경련하는 모나카가 사랑스러워 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "上目遣いに見つめてくれる彼女を見ているだけで、いつまでも射精してしまうくらいだ。"
translation = "치켜뜬 눈으로 바라보는 그녀를 보고 있는 것만으로도, 언제까지고 사정해 버릴 것만 같다."

[[dialogue]]
