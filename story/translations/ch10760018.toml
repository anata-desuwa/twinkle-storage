translation = "치켜뜬 눈으로 바라보는 그녀를 보고 있는 것만으로도, 언제까지고 사정해 버릴 것만 같다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「はふぁっ……<emoji=heart04>\u3000はぁーっ……はぁーっ……<emoji=heart04>\u3000え、えへへ……<emoji=heart04>\u3000まだビュルビュルしてくれてる……<emoji=heart04>」"
translation = "「하후앗……<emoji=heart04> 하아ー…… 하아ー……<emoji=heart04> 에, 에헤헤……<emoji=heart04> 아직 울컥울컥 나오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「気持ち良く、なってもらえたんだ……<emoji=heart04>\u3000モナカなんかで、にぃ様にも……<emoji=heart04>」"
translation = "「기분 좋게, 되신 거구나……<emoji=heart04> 모나카 같은 걸로, 오빠도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「モナカだからこそ気持ち良くなれたんだよ。誰でもない、大好きなモナカだからこそ」"
translation = "「모나카니까 기분 좋아질 수 있었던 거야. 다른 누구도 아닌, 내가 사랑하는 모나카니까.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「～～っっ<emoji=heart04>\u3000ダ、ダメだよ、にぃ様……<emoji=heart04>\u3000モナカ、エッチな子だから、その言葉だけでもイっちゃうよぉ……<emoji=heart04>」"
translation = "「~~이잇<emoji=heart04> 아, 안 돼요, 오빠……<emoji=heart04> 모나카, 야한 아이니까 그 말만으로도 가버릴 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「でも、えへへ……<emoji=heart04>\u3000すごく嬉しい……<emoji=heart04>\u3000やっと本当の意味でにぃ様の恋人さんになれた気がする……<emoji=heart04>」"
translation = "「하지만, 에헤헤……<emoji=heart04> 너무 기뻐요……<emoji=heart04> 드디어 진정한 의미로 오빠의 연인이 된 것 같은 기분이 들어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言いながら、モナカがぎゅっと俺の背中に手を回して抱き締めてくれる。"
translation = "말하면서 모나카가 꽉 내 등에 팔을 돌려 끌어안아 준다."

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ね、にぃ様……。あと少しだけワガママ言ってもいい……？」"
translation = "「저기, 오빠……. 조금만 더 어리광 부려도 될까……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「このまましばらく、その……。にぃ様と繋がっていたいな……。にぃ様と離れたくないの……。でも、迷惑だったら、その……」"
translation = "「이대로 잠시 동안, 그……. 오빠랑 연결되어 있고 싶어……. 오빠랑 떨어지기 싫은걸……. 하지만 방해가 된다면, 그……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「迷惑なわけないさ。むしろ、もっとイチャイチャしたいくらいだよ」"
translation = "「방해될 리 없잖아. 오히려 더 꽁냥거리고 싶을 정도야.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「にぃ様……えへへ。じゃあ……しよ？\u3000イチャイチャ、しよ……？」"
translation = "「오빠…… 에헤헤. 그럼…… 할까? 꽁냥꽁냥, 할까……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「モナカも、もっともっとにぃ様とイチャイチャしたい……な？」"
translation = "「모나카도, 좀 더 좀 더 오빠랑 꽁냥거리고 싶어…… 그치?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ、ふぁ、はああぁぁ……はっ、はぁ、えへへ……ん、んふ……はぁっ、はぁ……ふぅ……あ、ん、えへへ……はぁ……あぁ……」"
translation = "「아, 후아, 하아아아…… 하앗, 하아, 에헤헤…… 응, 응후…… 하앗, 하아…… 후우…… 아, 응, 에헤헤…… 하아…… 아아……」"

