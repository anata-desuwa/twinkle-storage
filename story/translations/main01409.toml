[[dialogue]]
speaker = "unk"
original = "第１２話,使徒のさだめ,B"
translation = "제12화, 사도의 운명, B"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "──天空の<ruby>頂<rt>いただき</rt></ruby>で、少女は破滅を眺めていた。"
translation = "── 천공의 정상에서, 소녀는 파멸을 바라보고 있었다."

[[dialogue]]
speaker = "unk"
original = "無尽蔵に生まれゆくアステライト、絶え間なく降り注ぐ流星群……。"
translation = "무진장으로 생겨나는 아스테라이트, 끊임없이 쏟아지는 유성군……."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……これでいいはずだ。なあ、ギエル」"
translation = "「……이걸로 됐을 거다. 이봐, 기엘」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──ええ。もちろんですとも」"
translation = "「──예. 물론입니다요」"

[[dialogue]]
speaker = "unk"
original = "その傍らには従者ギエル。"
translation = "그 곁에는 종자 기엘."

[[dialogue]]
speaker = "unk"
original = "彼女が<ruby>この世界線<rt>アルタイル</rt></ruby>に生まれ落ちて初めて、その資質を見出した人間だった。"
translation = "그녀가 <ruby>이 세계선<rt>알타이르</rt></ruby>에 태어나 처음으로, 그 자질을 발견한 인간이었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「最近、よく夢を見る」"
translation = "「요즘, 자주 꿈을 꾼다」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「夢……でございますか？」"
translation = "「꿈……이십니까?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだ。私に似た女と、庭でかけっこしたり、変な映像を見たりする夢だ」"
translation = "「그래. 나를 닮은 여자와, 정원에서 달리기 시합을 하거나, 이상한 영상을 보거나 하는 꿈이다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「これは──オマエがいつか言っていた……デネブ、とかいうセカイに関わりがあるのか？」"
translation = "「이것은── 네가 언젠가 말했던…… 데네브, 같은 세계와 관련이 있는 건가?」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「……かもしれませんね」"
translation = "「……그럴지도 모르겠습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは……その夢を見ると、なんだか虚しくなる」"
translation = "「나는…… 그 꿈을 꾸면, 왠지 허무해진다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「その夢は何なのか。今のあたしは何なのか。あたしは、このままでいいのかって……」"
translation = "「그 꿈은 무엇인가. 지금의 나는 무엇인가. 나는, 이대로 괜찮은 걸까 하고……」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「──アポロ様。僭越ながら、そのような些事を気にされる必要はないかと」"
translation = "「──아폴로 님. 외람되오나, 그러한 사소한 일에 신경 쓰실 필요는 없을 듯합니다」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「あなた様はこの世界を創り変えし真の英雄──ささやかな夢ごときに惑わされる道理はありません」"
translation = "「당신께서는 이 세계를 새로 창조하실 진정한 영웅── 사소한 꿈 따위에 현혹될 리가 없습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フ……それもそうか」"
translation = "「후…… 그것도 그렇군」"

[[dialogue]]
speaker = "unk"
original = "ギエルの説得を受け、アポロはふっと笑った。"
translation = "기엘의 설득을 받아, 아폴로는 픽 웃었다."

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「私はあなた様と出会い、救われました。あの日……無為に散らそうとしていたこの命が未だ永らえているのも、あなた様のおかげです」"
translation = "「저는 당신을 만나, 구원받았습니다. 그날…… 헛되이 흩어지게 하려 했던 이 목숨이 아직 이어지고 있는 것도, 당신 덕분입니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そう──そう……だったか。悪い。なんだか、昔のことはあまりうまく思い出せない」"
translation = "「그래── 그래…… 그랬었나. 미안. 왠지, 옛날 일은 잘 기억나지 않아」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「思い出せぬのなら何度でも語ってしんぜましょう。あなた様との出会いは、私にとって忘れがたき運命の始点でありました」"
translation = "「기억나지 않으신다면 몇 번이라도 말씀드리겠습니다. 당신과의 만남은, 저에게 있어 잊을 수 없는 운명의 시작점이었습니다」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「このギエルという名も、立ち場も！\u3000総てはアポロ様──あなたに授かったものなのですから」"
translation = "「이 기엘이라는 이름도, 입장도! 모든 것은 아폴로 님── 당신에게 받은 것이니까요」"

[[dialogue]]
speaker = "unk"
original = "ギエルの陶酔に偽りはない。"
translation = "기엘의 도취에는 거짓이 없다."

[[dialogue]]
speaker = "unk"
original = "執事として、従者として──彼女がリクリエという野望を完遂させるまで尽力すると誓っていた。"
translation = "집사로서, 종자로서── 그녀가 리크리에라는 야망을 완수할 때까지 진력하겠다고 맹세했다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうか……うむ……そうだな。初心わするべからず、だ」"
translation = "「그런가…… 음…… 그렇군. 초심을 잃지 말아야지, 다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王を倒す。なぜならあたしはヒーローだからだ。そして、世界はリクリエによって生まれ変わるのだ！」"
translation = "「마왕을 쓰러뜨린다. 왜냐하면 나는 히어로니까. 그리고, 세계는 리크리에에 의해 다시 태어나는 거다!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ええ……その通り。それでこそアポロ様」"
translation = "「예…… 그 말씀대로. 그것이야말로 아폴로 님」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「人も、魔女も、星騎士も──何もかも呑み込めばよいのです。それが、宇宙のあるべき姿なのですから」"
translation = "「사람도, 마녀도, 성기사도── 무엇이든 모조리 집어삼키면 되는 것입니다. 그것이, 우주의 본래 모습이니까요」"

[[dialogue]]
speaker = "unk"
original = "──最後の決戦へ向けて。"
translation = "── 마지막 결전을 향해."

[[dialogue]]
speaker = "unk"
original = "星見る夜は、混沌と深まっていく……。"
translation = "별을 보는 밤은, 혼돈과 함께 깊어져 간다……."

