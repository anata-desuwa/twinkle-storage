[[dialogue]]
speaker = "unk"
original = "第３話,ご褒美はキス,P"
translation = "제3화, 포상은 키스, P"

[[dialogue]]
speaker = "unk"
original = "霊力を用いて戦闘能力を飛躍的に伸ばすことに成功したアニュラス。"
translation = "영력을 이용하여 전투 능력을 비약적으로 향상시키는 데 성공한 아뉴라스."

[[dialogue]]
speaker = "unk"
original = "だが残念なことに、この世には女神から賜った霊力でも解決できない問題がある──そう、例えば数学のテストとか。"
translation = "하지만 유감스럽게도, 이 세상에는 여신에게 하사받은 영력으로도 해결할 수 없는 문제가 있다── 그래, 예를 들면 수학 테스트 같은 것."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ぜ、全部解き終わったぞ会長。どうだ……模擬テスト、採点の結果は……！？」"
translation = "「다, 전부 다 풀었다 회장. 어떠냐…… 모의 테스트, 채점 결과는……!?」"

[[dialogue]]
speaker = "unk"
original = "数学が……赤点ですね……"
translation = "수학이…… 낙제점이네요……"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「なにぃ！？\u3000こ、今回のは割と自信があったんだぞ！？」"
translation = "「뭐랏!? 이, 이번 건 나름대로 자신 있었다고!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「くっ……もしや数字の見間違いか？\u3000３と８は似ているからな……！」"
translation = "「큭…… 혹시 숫자를 잘못 본 건가? 3과 8은 닮았으니까 말이다……!」"

[[dialogue]]
speaker = "unk"
original = "そもそも使う公式が違いますね……"
translation = "애초에 사용하는 공식이 다르네요……"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「くうぅ、そっちか……！\u3000どうして数学の公式はあんなにも複雑なんだ！？\u3000覚えられるわけないだろう！」"
translation = "「쿠우우, 그쪽인가……! 어째서 수학 공식은 저렇게나 복잡한 거지!? 외울 수 있을 리가 없잖나!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「そもそも、このうねうね動くグラフはなんだ！\u3000日常生活で見た試しがないぞ！！」"
translation = "「애초에, 이 구불구불 움직이는 그래프는 뭐냐! 일상생활에서 본 적이 없다고!!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「このままではまずい……流星の騎士というお父様の二つ名を継いだ身であるのに……！」"
translation = "「이대로는 좋지 않아…… 유성의 기사라는 아버님의 이명을 이은 몸인데……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「定期試験で赤点などを取ってしまっては、セイファートの名に泥を塗ってしまう……！\u3000私は一族の面汚しだ……！！」"
translation = "「정기 시험에서 낙제점 따위를 받아버리면, 세이파트의 이름에 먹칠을 하게 돼……! 나는 일족의 수치다……!!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「──そんなに大げさに考えなくてもいいだと！？\u3000大問題だっ！\u3000会長、どうすればいい……！？\u3000テストまであと１週間しかない！」"
translation = "「──그렇게 거창하게 생각하지 않아도 된다고!? 대문제다! 회장, 어쩌면 좋지……!? 테스트까지 이제 1주일밖에 안 남았어!」"

[[dialogue]]
speaker = "unk"
original = "ここはご褒美作戦で乗り切ろうか"
translation = "여기는 포상 작전으로 헤쳐 나가 볼까"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「し、しかし……今もチョコレートをあ～んしてもらうことと、頭のナデナデをご褒美に設定しているじゃないか？\u3000それなのに結果が出ていない……」"
translation = "「하, 하지만…… 지금도 초콜릿을 아~앙 받는 것과, 머리 쓰담쓰담을 포상으로 설정해 두지 않았나? 그런데도 결과가 나오지 않고 있어……」"

[[dialogue]]
speaker = "unk"
original = "赤点脱出までお預けにしてみる？"
translation = "낙제점 탈출 전까지 보류해 볼래?"

[[dialogue]]
speaker = "unk"
original = "じゃあキスをご褒美にして……"
translation = "그럼 키스를 포상으로 해서……"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「何！？\u3000わ、私の大好きな、お前とのキスを……お預けだと！？」"
translation = "「뭐!? 내, 내가 제일 좋아하는, 너와의 키스를…… 보류한다고!?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「おはようのキスも……？\u3000え、行ってきますのキスも？\u3000ただいまのキスもダメ……！？」"
translation = "「좋은 아침 키스도……? 에, 다녀오겠습니다 키스도? 다녀왔습니다 키스도 안 돼……!?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「た、確かに効果がありそうだ……うん。お前とキスができないのは辛い……今よりもっと危機感を持って勉強に当たれそうな気がする……」"
translation = "「확, 확실히 효과가 있을 것 같군…… 음. 너와 키스를 못 하는 건 괴로워…… 지금보다 더 위기감을 가지고 공부에 임할 수 있을 것 같은 기분이 든다……」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「よ、よし。やるぞ！\u3000私はアニュラス・セイファート……流星の騎士の名を継ぐ者だ！！」"
translation = "「조, 좋아. 하겠다! 나는 아뉴라스 세이파트…… 유성의 기사의 이름을 잇는 자다!!」"

[[dialogue]]
speaker = "unk"
original = "こうしてアニュラスのテスト勉強が始まった。模擬テストの赤点脱出まで、キスをお預けした状態で尻に火を点ける作戦である。"
translation = "이렇게 아뉴라스의 테스트 공부가 시작되었다. 모의 테스트 낙제점 탈출까지, 키스를 보류한 상태로 벼랑 끝으로 내모는 작전이다."

[[dialogue]]
speaker = "unk"
original = "１日目──１６点。キスはお預け。"
translation = "1일째── 16점. 키스는 보류."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「くぅっ……！！」"
translation = "「쿠우읏……!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お２人とも、お勉強お疲れ様です！\u3000ご注文を取りに来ました～、何にしましょう！」"
translation = "「두 분 다, 공부하시느라 수고 많으세요! 주문받으러 왔어요~, 뭘로 하실래요!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「キスがしたい……」"
translation = "「키스가 하고 싶다……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？」"
translation = "「코얏!?」"

[[dialogue]]
speaker = "unk"
original = "２日目──１９点（ちなみに赤点脱出は３０点から）。今日もキスはお預け。"
translation = "2일째── 19점 (참고로 낙제점 탈출은 30점부터). 오늘도 키스는 보류."

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「うっぐぅうっ……！！」"
translation = "「윽구우웃……!!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「お勉強、はかどってる～？\u3000そうだアニュラスちゃん、紅茶とコーヒー、どっちがいいかしら？」"
translation = "「공부, 잘돼가~? 맞다 아뉴라스 짱, 홍차랑 커피 중에 어느 쪽이 좋을까?」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「キスがしたい……！！」"
translation = "「키스가 하고 싶다……!!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──えぇっ！？」"
translation = "「──에엣!?」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで３日目は２２点。４日目は２７点……アニュラスは連敗を続けて──"
translation = "이러쿵저러쿵해서 3일째는 22점. 4일째는 27점…… 아뉴라스는 연패를 거듭하며──"

[[dialogue]]
speaker = "unk"
original = "そして５日目──！"
translation = "그리고 5일째──!"

[[dialogue]]
speaker = "unk"
original = "やったな、アニュラ──"
translation = "해냈구나, 아뉴라──"

[[dialogue]]
speaker = "unk"
original = "３５点取れてる……！！"
translation = "35점 받았어……!!"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んぅちゅっ……ちゅ、ちゅぅっ……んちゅっ……ちゅぅ<emoji=heart04>」"
translation = "「음츄…… 츄, 츄우…… 음츄…… 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "んむむむむ！？"
translation = "음무무무무!?"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「会長、動かないでくれっ。もう限界だ……ここ数日、すっごく辛かったんだ……！\u3000ご褒美が欲しい、キスっ、もっと……！」"
translation = "「회장, 움직이지 마라. 이제 한계다…… 요 며칠, 정말 괴로웠단 말이다……! 포상을 줘, 키스, 더 많이……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ちゅぅ、んちゅちゅ、ちゅぅっ……ちゅぱ、ちゅぅっ<emoji=heart04>」"
translation = "「츄우, 음츄츄, 츄우…… 츄파, 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょ、ちょっと落ち着いて……！"
translation = "자, 잠깐 진정해……!"

[[dialogue]]
speaker = "unk"
original = "──ぷはっ！"
translation = "──푸하!"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「こらぁ、逃げるなぁっ……４日ぶんのキス、今から取り戻すんだからっ……！」"
translation = "「이봐, 도망가지 마…… 4일 치 키스, 지금부터 되찾을 거니까……!」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「んちゅ、ちゅる、んちゅ、好きだぞ会長っ、んちゅっ、ちゅぅ～っ……<emoji=heart04>」"
translation = "「음츄, 츄르, 음츄, 좋아한다 회장, 음츄, 츄우~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はその後、キス魔と化したアニュラスと日が暮れるまでイチャイチャを続けることになった……"
translation = "나는 그 후, 키스마로 돌변한 아뉴라스와 해가 저물 때까지 꽁냥거림을 이어가게 되었다……"

[[dialogue]]
speaker = "unk"
original = "後日のテスト本番も無事に乗り切れたのはいいが、キスをお預けするのは危険だ。反動がすさまじいので、今回限りにしようと俺は強く思うのだった──"
translation = "훗날 테스트 본방도 무사히 넘긴 건 좋지만, 키스를 보류하는 건 위험하다. 반동이 어마어마하므로, 이번 한 번만 하기로 나는 강하게 생각하는 것이었다──"

