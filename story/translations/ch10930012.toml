[[dialogue]]
speaker = "unk"
original = "第２話,ミルフィーの乙女力？,P"
translation = "제2화, 밀피의 소녀력?, P"

[[dialogue]]
speaker = "unk"
original = "──とある休日。"
translation = "──어느 휴일."

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いやぁ～、今日は散歩にぴったりなお天気日和でさぁ」"
translation = "「이야~, 오늘은 산책하기에 딱 좋은 날씨구만요」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん、こんなに晴れてると気持ちいいよね～」"
translation = "「응, 이렇게 맑으면 기분 좋지~」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「全くでさぁ……これで２人きりだったら最高だったんだが……」"
translation = "「말 그대로구만요…… 이걸로 둘뿐이었다면 최고였겠지만……」"

[[dialogue]]
speaker = "unk"
original = "やっぱりお邪魔だった？"
translation = "역시 방해됐어?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなことないよ！\u3000会長くんがいてくれた方が楽しいし！」"
translation = "「그렇지 않아! 회장군이 있어 주는 게 더 즐거운걸!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしは姐さんと２人きりの方が楽しいぜっ」"
translation = "「난 누님과 둘이 있는 게 더 즐겁다구!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ヒヨちゃん、そんないじわる言っちゃダメ」"
translation = "「히요짱, 그런 심술궂은 말 하면 안 돼」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「だってなぁ～、会長サンがいたら、姐さんとの濃密な時間を過ごせないじゃないか」"
translation = "「그치만 말야~, 회장 나리가 있으면 누님과의 농밀한 시간을 보낼 수 없잖아」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「濃密な時間って……いつも普通に遊んでるだけでしょ？」"
translation = "「농밀한 시간이라니…… 평소처럼 그냥 노는 것뿐이잖아?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「あたしにとっては、かけがえのない時間なんでいっ」"
translation = "「나한테는 무엇과도 바꿀 수 없는 시간이라구욧」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もう～、そんなに不貞腐れないでよ」"
translation = "「정말~, 그렇게 삐져 있지 마」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「別に不貞腐れてなんてないやい」"
translation = "「딱히 삐진 거 아니래두」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ほら、たい焼き買ってあげるから機嫌直して？」"
translation = "「자, 붕어빵 사줄 테니까 기분 풀어?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「たい焼き……！\u3000そいつはたまんねぇなぁ！\u3000姐さん、会長サン、そうと決まれば早く行こうぜぇ！」"
translation = "「붕어빵……! 그건 못 참지! 누님, 회장 나리, 그렇게 정했으면 빨리 가자구!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もうヒヨちゃん、そんなに慌てないで」"
translation = "「정말 히요짱, 그렇게 서두르지 마」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いやぁ～、やっぱり姐さんと食べるたい焼きは極上だぜぇ」"
translation = "「이야~, 역시 누님과 먹는 붕어빵은 극상이구만」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ヒヨちゃんってば、すっかりたい焼きに夢中になって……」"
translation = "「히요짱도 참, 완전히 붕어빵에 정신이 팔려서는……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんもたい焼き美味しい？\u3000ふふ、よかった。実は私、たい焼きが大好物なんだ」"
translation = "「회장군도 붕어빵 맛있어? 후후, 다행이다. 사실 나, 붕어빵을 정말 좋아하거든」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「特にね、カスタードクリームのたい焼きが好きで、陸上部の帰りによく買い食いしちゃってるんだ」"
translation = "「특히 말야, 커스터드 크림 붕어빵을 좋아해서, 육상부 끝나고 자주 사 먹곤 해」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「おかげで、ちょっとダイエットとか──……って、会長くんどうしたの？\u3000さっきから私の顔を見つめて」"
translation = "「덕분에, 조금 다이어트라든가──…… 어라, 회장군 왜 그래? 아까부터 내 얼굴을 빤히 쳐다보고」"

[[dialogue]]
speaker = "unk"
original = "いや、ほっぺにクリームが付いてるから"
translation = "아니, 뺨에 크림이 묻어 있어서"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「え、嘘……！？」"
translation = "「에, 거짓말……!?」"

[[dialogue]]
speaker = "unk"
original = "ほら、取ったよ"
translation = "자, 뗐어"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あ、あわわわわわわっ！」"
translation = "「아, 아와와와와와와앗!」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーも意外と抜けてるところあるんだ"
translation = "밀피도 의외로 덜렁대는 구석이 있네"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「～～～～～～～～～っっ！！」"
translation = "「～～～～～～～～～윽!!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「なんでい！\u3000完璧な姐さんがそんなミスをするわけねえ！\u3000きっと姐さんはわざとクリームを付けたんだぜい！」"
translation = "「뭐라구! 완벽한 누님이 그런 실수를 할 리가 없어! 분명 누님은 일부러 크림을 묻힌 거라구!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「わ、わざとじゃないから！\u3000ホントだからね！」"
translation = "「일, 일부러 그런 거 아니거든! 진짜라니까!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いやぁ、姐さんの乙女アピールは流石でい！\u3000あたしが男だったら、完全に惚れてるな！」"
translation = "「이야, 누님의 소녀 어필은 역시 대단하구만! 내가 남자였으면 완전히 반했겠어!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「乙女アピールとかじゃないからぁ～！」"
translation = "「소녀 어필 같은 거 아니라니까아~!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「会長サンも、姐さんの乙女力にドキっとしただろ？」"
translation = "「회장 나리도 누님의 소녀력에 두근거렸지?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えっ！？\u3000会長くんドキドキしたの！？」"
translation = "「엣!? 회장군 두근거렸어!?」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「って、なぁに姐さんにいやらしい目を向けてんでい！\u3000姐さんに近づこうたってそうはいかないぞ！\u3000姐さんの貞操はあたしが守る！」"
translation = "「그나저나, 어딜 누님한테 야한 눈길을 보내는 거야! 누님한테 접근하려고 해도 어림없다구! 누님의 정조는 내가 지킨다!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「か、会長くんはそんな人じゃないから……！」"
translation = "「회, 회장군은 그런 사람 아니니까……!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんは優しくて頼りになって……みんなの憧れの星徒会長なんだからっ」"
translation = "「회장군은 상냥하고 의지가 되고…… 모두가 동경하는 성도회장이란 말이야」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「いいや、こういう大人しそうな男ほど、頭の中はドスケベなんでい」"
translation = "「아니지, 이런 얌전해 보이는 남자일수록 머릿속은 음란마귀가 가득하다구」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「姐さんのことも脳内では、あーんなことや、こーんなことをしてるに決まってらぁ！」"
translation = "「누님을 상대로도 뇌내에서는 이런 짓이나 저런 짓을 하고 있을 게 뻔해!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そんなことないよね？\u3000会長くん……」"
translation = "「그, 그럴 리 없지? 회장군……」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「なんでい、姐さんでいやらしい妄想すらしないなんて、それでも男かい！\u3000男なら一発くらいかましてやれい！」"
translation = "「뭐야, 누님을 보고 야한 망상조차 안 한다니, 그러고도 남자냐! 남자라면 한 방 정도는 먹여주라구!」"

[[dialogue]]
speaker = "unk"
original = "……いいの？"
translation = "……괜찮아?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「い、いいいわけないでしょ！」"
translation = "「괘, 괘괘괜찮을 리 없잖아!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もう！\u3000ヒヨちゃんもエッチな話は禁止！」"
translation = "「정말! 히요짱도 야한 이야기는 금지!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「へぇーい」"
translation = "「예이 예이」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（でも、会長くんにエッチな目で見られてるって想像しても……イヤじゃなかった……）"
translation = "(하지만, 회장군에게 야한 눈으로 보여지고 있다고 상상해도…… 싫지 않았어……)"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（それどころか、むしろ嬉しいって──）"
translation = "(그것보다, 오히려 기쁘다고──)"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（って、何考えちゃってるの私！\u3000私はクラス委員なんだから、エッチなこと考えちゃダメなのにっ！！）"
translation = "(아니, 무슨 생각을 하는 거야 나! 나는 학급위원인데, 야한 생각 하면 안 되는데!! )"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「な、なんでもない！\u3000なんでもないから、会長くんは私のこと見ないでっっ」"
translation = "「아, 아무것도 아냐! 아무것도 아니니까, 회장군은 나 보지 마!!」"

[[dialogue]]
speaker_original = "ヒヨ"
speaker_translation = "히요"
original = "「……変態」"
translation = "「……변태」"

[[dialogue]]
speaker = "unk"
original = "なんで！？"
translation = "왜!?"

[[dialogue]]
speaker = "unk"
original = "その日はずっとヒヨにジト目で見られ続け、ミルフィーは顔を赤くしていたのだった。"
translation = "그날은 내내 히요에게 가자미눈으로 계속 감시당했고, 밀피는 얼굴을 붉히고 있었다."

