[[dialogue]]
speaker = "unk"
original = "第２話,悪の味方,P"
translation = "제2화, 악의 편, P"

[[dialogue]]
speaker = "unk"
original = "ネーゼマインと知り合ってから少し経ったある日のこと。彼女から呼び出しを受け、カフェテリアに行くと、何やら騒がしい様子で――"
translation = "네제마인과 알고 지낸 지 조금 지난 어느 날. 그녀의 호출을 받고 카페테리아에 가니 왠지 소란스러운 모습이라――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おっ、会長。こっちこっち～」"
translation = "「오, 회장님. 여기 여기~」"

[[dialogue]]
speaker = "unk"
original = "マイン、一体何があったんだ？"
translation = "마인, 도대체 무슨 일이 있었던 거야?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや、それがさ～、セナリィが仕事の依頼人と揉めちゃって。会長に仲裁を手伝って貰いたいんだよね」"
translation = "「아니, 그게 말이야~, 세나리가 의뢰인과 다투게 돼서. 회장님이 중재를 도와줬으면 좋겠거든」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ああでも、会長は無言で立ってるだけでいいから♪\u3000どういうことかは、見ていれば分かるよ♪」"
translation = "「아, 그래도 회장님은 아무 말 없이 서 있기만 하면 되니까♪ 어떻게 된 건지는 보고 있으면 알 거야♪」"

[[dialogue]]
speaker = "軽薄な男子生徒"
original = "「だから、今手持ちがあんまりなくてさぁ。学生料金ってことで、少しくらいサービスしてくれても良くない？」"
translation = "「그러니까, 지금 수중에 돈이 별로 없어서 말이야. 학생 요금이니까 조금 정도는 서비스해 줘도 괜찮지 않아?」"

[[dialogue]]
speaker = "セナリィ"
original = "「最初の契約と話が違いますわ。それに、ちゃんと契約書にあなた自身がサインをしたはずですわよね？」"
translation = "「처음 계약과 이야기가 다릅니다. 게다가 계약서에 당신 자신이 직접 서명했을 텐데요?」"

[[dialogue]]
speaker = "unk"
original = "――彼女はバンデット・セナリィ。海外で有名な傭兵であり、現在は学園に通いつつ、お金を稼ぐ為に秘密結社ゴールデングースを立ち上げた起業家でもある。"
translation = "――그녀는 밴디트 세나리. 해외에서 유명한 용병이며, 현재는 학원에 다니면서 돈을 벌기 위해 비밀 결사 골든 구스를 설립한 기업가이기도 하다."

[[dialogue]]
speaker = "軽薄な男子生徒"
original = "「傭兵ってのはケチ臭いなぁ。凄く美人なのに、お金にがめついとモテないよ？」"
translation = "「용병이라는 건 참 짜구나. 엄청 미인인데 돈에 밝으면 인기 없다고?」"

[[dialogue]]
speaker = "セナリィ"
original = "「その言葉、そっくりお返ししますわ。約束も守れない、後出しで値切るようなケチ臭い男はモテませんわよ？」"
translation = "「그 말, 그대로 돌려드리죠. 약속도 못 지키고 나중에 가서 깎으려고 하는 짠돌이 남자는 인기 없답니다?」"

[[dialogue]]
speaker = "軽薄な男子生徒"
original = "「んだと！？\u3000俺は３年生で、上級生だぞ！？\u3000バンデット・セナリィだか何だか知らないが、調子に乗りやがって……！」"
translation = "「뭐라고!? 난 3학년이고 상급생이라고! 밴디트 세나리인지 뭔지 모르겠지만 적당히 기어올라야지……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はいはい、一旦そこまで～。調子に乗るなと今、仰いましたけど、先輩は周りをよく見た方がいいと思いますよ～？」"
translation = "「네네, 일단 거기까지~. 기어오르지 말라고 방금 말씀하셨는데, 선배님은 주변을 좀 잘 살피는 게 좋을 것 같은데요~?」"

[[dialogue]]
speaker = "軽薄な男子生徒"
original = "「はぁ？\u3000話の邪魔すんじゃねぇ……って、げっ！？\u3000星徒会長！？」"
translation = "「하아? 이야기 방해하지 마…… 헉!? 성도회장!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「先輩も知ってると思いますけど、この学園においては星徒会長が、大きな権力を持ってるんですよね～？」"
translation = "「선배님도 알고 계시겠지만, 이 학원에서는 성도회장이 큰 권력을 가지고 있거든요~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「例えば……学内で横暴な振る舞いをしている人を罰せられるくらいには。にひひ♪」"
translation = "「예를 들어…… 학내에서 횡포를 부리는 사람을 처벌할 수 있을 정도로 말이죠. 니히히♪」"

[[dialogue]]
speaker = "軽薄な男子生徒"
original = "「ぐっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「で、何でしたっけ？\u3000契約書をちゃ～んと交わしてたと思いますけど、お金の支払いを渋っているんでしたっけ？\u3000何が不満なのか、もう１度お聞かせ願えます？」"
translation = "「그래서, 뭐라고 하셨죠? 계약서를 처~언천히 주고받았다고 생각하는데, 대금 지불을 꺼리고 계신다고요? 뭐가 불만인지 다시 한번 들려주실래요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん～、交渉終わり～♪\u3000お金は無事に支払って貰ったし、これにて一見落着ってね☆」"
translation = "「음~, 교섭 끝~♪ 돈은 무사히 받았고, 이걸로 사건 해결이네☆」"

[[dialogue]]
speaker = "セナリィ"
original = "「助かりましたわ、マイン。さすがは我が社の顧問弁護士ですわね！」"
translation = "「도움이 됐어요, 마인. 역시 우리 회사의 고문 변호사답네요!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「弁護士じゃなくて、交渉人ね」"
translation = "「변호사가 아니라 교섭인이라니까」"

[[dialogue]]
speaker = "unk"
original = "凄い手際だった"
translation = "굉장한 솜씨였어"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「実は、私のお父さんが弁護士でね。その背中を見て育った影響かな～」"
translation = "「사실 우리 아빠가 변호사거든. 그 뒷모습을 보고 자란 영향일까나~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え？\u3000将来は弁護士を目指しているのかって？\u3000それは無理じゃないかな～。気質が致命的に合ってないっていうかね～」"
translation = "「에? 장래에 변호사를 목표로 하냐고? 그건 무리 아닐까~. 기질이 치명적으로 안 맞는다고나 할까~」"

[[dialogue]]
speaker = "セナリィ"
original = "「私は合っていると思いますけれど、そこはやたら拘りますわよね」"
translation = "「저는 어울린다고 생각합니다만, 그 부분은 굉장히 고집 피우시네요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「弁護士ってのは、正義の人が相応しい職業なんだよ。例えば、うちのお父さんや、会長みたいなね。残念ながら、私はそっち寄りじゃないから」"
translation = "「변호사라는 건 정의로운 사람이 어울리는 직업이야. 예를 들어 우리 아빠나 회장님 같은 사람 말이지. 안타깝게도 나는 그쪽 취향이 아니거든」"

[[dialogue]]
speaker = "セナリィ"
original = "「あら、悪を弁護してくれる人が居てもいいと思いますけれど？」"
translation = "「어머, 악을 변호해 주는 사람이 있어도 괜찮다고 생각합니다만?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だからこうして、『悪の味方』として交渉人をやっているってわけ。公安委員会所属の、ね」"
translation = "「그래서 이렇게 『악의 편』으로서 교섭인을 하고 있는 거야. 공안위원회 소속으로 말이지」"

[[dialogue]]
speaker = "unk"
original = "セナリィは公安委員会に協力してるんだっけ"
translation = "세나리는 공안위원회에 협력하고 있었던가"

[[dialogue]]
speaker = "セナリィ"
original = "「秘密結社ゴールデングースとして、公安委員会から仕事の依頼を受けて、任務に参加しておりますわ」"
translation = "「비밀 결사 골든 구스로서 공안위원회로부터 업무 의뢰를 받아 임무에 참여하고 있습니다」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いわゆる下請けってやつだね。私は公安委員会所属の交渉人として、ゴールデングースとの窓口担当。ついでにセナリィのバディを務めるように、上から指示を受けてるってわけ」"
translation = "「이른바 하청 같은 거지. 나는 공안위원회 소속 교섭인으로서 골든 구스와의 창구 담당. 덤으로 세나리의 버디를 맡으라고 윗선에서 지시를 받았다는 말씀」"

[[dialogue]]
speaker = "セナリィ"
original = "「先程の交渉もそうですが、頭脳の優秀さは折り紙付きですわ。ですから、ゴールデングースの正社員として、絶賛引き抜き勧誘中なんですの！」"
translation = "「방금 전의 교섭도 그렇지만, 두뇌의 우수함은 보증되어 있습니다. 그러니까 골든 구스의 정사원으로 절찬 스카우트 중이랍니다!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それね～。誘ってくれるのはありがたいけど、自分からわざわざ悪の道に行くのはね～」"
translation = "「그거 말이지~. 권유해 주는 건 고맙지만, 스스로 굳이 악의 길로 가는 건 좀 그렇지~」"

[[dialogue]]
speaker = "セナリィ"
original = "「自分は『悪の味方』だと、よく言っているのに？」"
translation = "「자신은 『악의 편』이라고 자주 말하면서요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私は確かに悪寄りだけど、あくまで『味方』、お手伝いさんで居たいってこと。だから私としては、簡単には頷けないんだよ」"
translation = "「나는 확실히 악에 가깝지만 어디까지나 『편』, 도우미로 남고 싶다는 거야. 그래서 나로서는 쉽게 고개를 끄덕일 수 없네」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それにどうしても私を引き抜きたいっていうなら、思わず頷いちゃうくらい心に響く誘い文句くらい言ってくれないとね～」"
translation = "「게다가 정말로 나를 영입하고 싶다면, 나도 모르게 고개를 끄덕일 정도로 마음에 와닿는 유혹 멘트 정도는 해줘야지~」"

[[dialogue]]
speaker = "セナリィ"
original = "「笑える面白い台詞募集中って顔に書いてありますわよ」"
translation = "「웃기고 재미있는 대사 모집 중이라고 얼굴에 써 있네요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000セナリィ渾身の誘い文句は面白かったな～。まるでプロポーズみたいに熱烈な……」"
translation = "「니히히♪ 세나리의 회심의 유혹 멘트는 재미있었지~. 마치 프로포즈처럼 열렬해서……」"

[[dialogue]]
speaker = "セナリィ"
original = "「ちょっ、それ以上口にしたら、ぶっ殺しますわよ！？」"
translation = "「잠깐, 그 이상 입 밖으로 내면 죽여버리겠어요!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃははは♪\u3000冗談だって～☆」"
translation = "「꺄하하하♪ 농담이라니까~☆」"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺も、お願いしようかな"
translation = "그럼 나도 부탁해 볼까"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん？\u3000それって、星徒会のってこと？\u3000でも、私は星徒会メンバーと違って、正義寄りじゃないしな～」"
translation = "「응? 그거 성도회 일 말이야? 하지만 나는 성도회 멤버들과 달라서 정의로운 편이 아닌데~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「違う？\u3000会長の顧問交渉人？\u3000ふ～ん、面白いけど、私がそれを引き受ける必然性はなくない？」"
translation = "「아니라고? 회장님의 고문 교섭인? 흐음~, 재미있지만 내가 그걸 맡아야 할 필연성은 없지 않아?」"

[[dialogue]]
speaker = "unk"
original = "マインは俺が困った時に手を貸して欲しい"
translation = "마인은 내가 곤란할 때 힘을 빌려줬으면 좋겠어"

[[dialogue]]
speaker = "unk"
original = "俺が公安委員会の仕事に手を貸す代わりに"
translation = "내가 공안위원회 일을 돕는 대신에"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000なるほど、交換条件ってわけだ。でも、それだけじゃ弱いな～。だって仮に私が断っても、会長は公安委員会に協力するもん」"
translation = "「니히히♪ 과연, 교환 조건이라는 거네. 하지만 그것만으론 약해~. 왜냐면 가령 내가 거절해도 회장님은 공안위원회에 협력할 거잖아」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だから、どうしてもって言うなら、私が納得するような言葉じゃないと――」"
translation = "「그러니까 정말로 원한다면 내가 납득할 만한 말이어야――」"

[[dialogue]]
speaker = "unk"
original = "マインのストレス解消に付き合うよ"
translation = "마인의 스트레스 해소를 도와줄게"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ぷっ……きゃははははは！\u3000それ、覚えてたんだ？\u3000うん、分かった。いいよ！\u3000会長の顧問交渉人、引き受けてあげる♪」"
translation = "「풉…… 꺄하하하하하! 그거 기억하고 있었어? 응, 알았어. 좋아! 회장님의 고문 교섭인, 맡아줄게♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「え！？\u3000マイン！？」"
translation = "「에!? 마인!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「その代わり、言ったことにはちゃ～んと責任持って貰うからね？\u3000にひひ♪」"
translation = "「그 대신에 한 말에는 처~언천히 책임져야 할 거야? 니히히♪」"

[[dialogue]]
speaker = "unk"
original = "小悪魔のように、しかしどこか嬉しそうに笑うマインと、俺は握手を交わすのだった。"
translation = "소악마처럼, 하지만 어딘가 기쁜 듯이 웃는 마인과 나는 악수를 나누었다."

