[[dialogue]]
speaker = "unk"
original = "マトイに気を失った生徒たちの保護を任せた後、プリムラは１人、ロストアイテムと対峙していた。"
translation = "마토이에게 정신을 잃은 학생들의 보호를 맡긴 뒤, 프리뮬러는 혼자 로스트 아이템과 대치하고 있었다."

[[dialogue]]
speaker = "ロストアイテム"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "プリムラ"
original = "「貴様……いよいよ本格的に人を襲いはじめたかと思えば……なんのつもりじゃ、その姿は……！」"
translation = "「네놈…… 드디어 본격적으로 사람을 습격하기 시작했다 생각했더니…… 무슨 속셈이냐, 그 모습은……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「奪い取ったサチの記憶から再現したということか？\u3000ふざけた真似をしおって……」"
translation = "「빼앗은 사치의 기억으로부터 재현했다는 것이냐? 장난질을 치고 있구나……」"

[[dialogue]]
speaker = "プリムラ"
original = "「まさか、サチが我を１度倒した存在だからか……？\u3000ククク――」"
translation = "「설마 사치가 짐을 한 번 쓰러뜨린 존재이기 때문인가……? 크크크――」"

[[dialogue]]
speaker = "プリムラ"
original = "「１０万年早いのじゃ、このコピー風情がっ！！！」"
translation = "「10만 년은 이르느니라, 이 카피 쪼가리가!!!」"

[[dialogue]]
speaker = "プリムラ"
original = "（こうして戦っていると、１年前に出会った時のことを思い出す）"
translation = "(이렇게 싸우고 있으니 1년 전 처음 만났을 때가 생각나는구나)"

[[dialogue]]
speaker = "プリムラ"
original = "（その日、終末兵器として目覚めた我は、人のひしめき合う街のど真ん中に投入されたはず……じゃったが）"
translation = "(그날, 종말 병기로서 깨어난 짐은 사람들이 북적이는 거리 한복판에 투입되었을 터……였지만)"

[[dialogue]]
speaker = "プリムラ"
original = "「なぜじゃ……？\u3000なぜ誰も人がいない？」"
translation = "「어째서냐……? 왜 아무도 없지?」"

[[dialogue]]
speaker = "プリムラ"
original = "（これでは我にインプットされた、破壊活動が開始できないではないか！\u3000そう思った時じゃった――）"
translation = "(이래서는 짐에게 입력된 파괴 활동을 시작할 수 없지 않으냐! 그렇게 생각했을 때였지――)"

[[dialogue]]
speaker = "プリムラ"
original = "（そいつが――幸運の化け物が目の前に現れたのは）"
translation = "(그 녀석이―― 행운의 괴물이 눈앞에 나타난 것은)"

[[dialogue]]
speaker = "サチ"
original = "「あなたが創造のロストアイテム……賢者の石？」"
translation = "「당신이 창조의 로스트 아이템…… 현자의 돌?」"

[[dialogue]]
speaker = "プリムラ"
original = "「誰じゃお前は？」"
translation = "「누구냐 너는?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「人呼んで、幸運の魔法少女トレジャー☆サチ！\u3000人事天命、ここからはハズレなしですよ～♪」"
translation = "「사람들이 부르길, 행운의 마법 소녀 트레저☆사치! 인사천명, 이제부터는 꽝 없음이라구요~♪」"

[[dialogue]]
speaker = "サチ"
original = "「いえ、人違いです」"
translation = "「아니요, 사람 잘못 보셨어요」"

[[dialogue]]
speaker = "プリムラ"
original = "「……ふざけておるのか？」"
translation = "「……장난하는 것이냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "（後から知ったが、誰も人がいなかったのは、トレジアンナの使う人払いの星術によるものじゃった）"
translation = "(나중에 알았지만, 사람이 아무도 없었던 것은 트레지안나가 사용하는 인척 차단 성술 때문이었느니라)"

[[dialogue]]
speaker = "プリムラ"
original = "「我を誰だと思っとるのじゃ。我はリクリエを引き起こす為に作られた終末兵器メルクリウス――」"
translation = "「짐을 누구라 생각하는 것이냐. 짐은 리크리에를 일으키기 위해 만들어진 종말 병기 메르쿠리우스――」"

[[dialogue]]
speaker = "プリムラ"
original = "「舐めてると貴様……殺すぞ？」"
translation = "「얕보고 있다면 네놈…… 죽이겠다?」"

[[dialogue]]
speaker = "サチ"
original = "「……！\u3000と、とてつもない力を感じます……！\u3000これは……！」"
translation = "「……! 어, 엄청난 힘이 느껴져요……! 이것은……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「終末術式……起動。インフィニットドレイン！」"
translation = "「종말 술식…… 기동. 인피니트 드레인!」"

[[dialogue]]
speaker = "プリムラ"
original = "（そうして、我と化け物の死闘は始まった。この時、ビルが１つ消し飛んで、幸運なことに被害者ゼロだった爆発事故、として記録が残されておる）"
translation = "(그렇게 짐과 괴물의 사투가 시작되었지. 이때 빌딩 하나가 날아갔지만, 다행히 피해자 제로였던 폭발 사고로 기록이 남아 있느니라)"

[[dialogue]]
speaker = "プリムラ"
original = "「なんなんじゃ……なんで攻撃が当たらん！？\u3000なぜそんなロストアイテムを持っている！？\u3000そもそもなぜ、貴様がここにいる！？」"
translation = "「뭐냐고…… 왜 공격이 맞지 않지!? 왜 그런 로스트 아이템을 가지고 있느냐!? 애초에 왜 네놈이 여기 있는 것이냐!?」"

[[dialogue]]
speaker = "プリムラ"
original = "（そして悲しいかな、不運なことに我は、終末兵器としてそのビル１つしか成果を残せず、幸運の化け物には掠り傷１つも負わせられず）"
translation = "(그리고 슬프게도, 불운하게도 짐은 종말 병기로서 그 빌딩 하나밖에 성과를 내지 못했고, 행운의 괴물에게는 스치지도 못했느니라)"

[[dialogue]]
speaker = "プリムラ"
original = "「貴様は一体、なんなのじゃあぁぁぁーーーーーーっ！！？」"
translation = "「네놈은 도대체 정체가 무엇이냐아아아아아아아아악!!?」"

[[dialogue]]
speaker = "プリムラ"
original = "（根本的な力の総量において、圧倒的に上であるはずの我は、幸運というイレギュラーの前には手も足も出ずに、敗北を喫したのじゃった――）"
translation = "(근본적인 힘의 총량에서 압도적으로 우위였을 터인 짐은 행운이라는 이레귤러 앞에서는 손도 발도 쓰지 못한 채 패배를 맛보았지――)"

[[dialogue]]
speaker = "プリムラ"
original = "「おのれ……貴様に出会いさえしなければ……！\u3000こんな不運な出会いさえなければ、我は……！」"
translation = "「이놈…… 네놈과 만나지만 않았어도……! 이런 불운한 만남만 없었어도 짐은……!」"

[[dialogue]]
speaker = "プリムラ"
original = "（じゃが……我は死ななかった）"
translation = "(하지만…… 짐은 죽지 않았느니라)"

[[dialogue]]
speaker = "プリムラ"
original = "（幸運の化け物はその後、なぜか学園の上層部にかけあって、我を保護観察処分として味方につける選択をした）"
translation = "(행운의 괴물은 그 후 왠지 학원 상층부와 교섭하여 짐을 보호 관찰 처분으로 아군으로 삼는 선택을 했지)"

[[dialogue]]
speaker = "プリムラ"
original = "（サチの持つペンダント――封印のロストアイテム『星の鎖』で、力の大半を封じられてるとはいえ、精神は未だ悪の終末兵器のままである我を）"
translation = "(사치가 가진 펜던트―― 봉인의 로스트 아이템 『별의 사슬』로 힘의 태반이 봉인되어 있다고는 하나, 정신은 여전히 악의 종말 병기 그대로인 짐을 말이니라)"

[[dialogue]]
speaker = "プリムラ"
original = "「何故じゃ……なぜ我を生かしておく？\u3000わからぬ……貴様は一体、なにを考えている！？」"
translation = "「어째서냐…… 왜 짐을 살려두는 것이냐? 모르겠구나…… 네놈은 도대체 무슨 생각을 하는 것이냐!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「我は悪の終末兵器なのじゃぞ！？\u3000我は貴様が憎い！\u3000不運にも貴様が現れたから、我はこんな無様な姿になって、生き恥を晒しておる！」"
translation = "「짐은 악의 종말 병기란 말이다!? 짐은 네놈이 밉다! 불운하게도 네놈이 나타났기에 짐은 이런 꼴사나운 모습이 되어 살아있는 치욕을 겪고 있느니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「まさか、我が貴様に手も足も出なかったから舐めておるのか！？\u3000言っておくが我は、そのペンダントさえ無ければ、今すぐにでも貴様を殺すぞ！？」"
translation = "「설마 짐이 네놈에게 손도 발도 못 썼다고 얕보는 것이냐!? 말해두겠는데 짐은 그 펜던트만 없다면 지금 당장이라도 네놈을 죽이겠다!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「このまま生かしておれば、いずれそのペンダントを奪って、必ず貴様を殺す！\u3000我は生まれながらの悪！\u3000世界を滅ぼす終末兵器じゃ！」"
translation = "「이대로 살려두면 언젠가 그 펜던트를 빼앗아 반드시 네놈을 죽이겠다! 짐은 태어날 때부터 악! 세계를 멸망시킬 종말 병기니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「それでも貴様は、我を生かすというのか！？」"
translation = "「그런데도 네놈은 짐을 살리겠다는 것이냐!?」"

[[dialogue]]
speaker = "サチ"
original = "「あなた……私と出会ったのが不運だって、戦いの最後にも言ってたでしょ？\u3000私にとって、それは違うって思ったから」"
translation = "「당신…… 나랑 만난 게 불운이라고 전투 마지막에도 말했었지? 나한테는 그게 틀린 것 같다고 생각했거든」"

[[dialogue]]
speaker = "サチ"
original = "「私、特殊な体質で生まれてきたから……感覚的なものだけど、この世に『幸運』があるっていうことを、確かに知ってるの」"
translation = "「나, 특수한 체질로 태어났으니까…… 감각적인 거지만, 이 세상에 『행운』이 있다는 걸 확실히 알고 있어」"

[[dialogue]]
speaker = "サチ"
original = "「あなたが誰も殺さずに済んだことは、私は幸運なことだと思う。それに今の状態なら、あなたは悪さができない。それも幸運」"
translation = "「당신이 아무도 죽이지 않고 끝난 건 나는 행운이라고 생각해. 게다가 지금 상태라면 당신은 나쁜 짓을 할 수 없어. 그것도 행운이고」"

[[dialogue]]
speaker = "プリムラ"
original = "「それは貴様にとっての幸運で！\u3000我からしたら、不運！\u3000ただのエゴじゃ！」"
translation = "「그건 네놈에게나 행운이지! 짐에게는 불운이다! 그저 에고일 뿐이니라!」"

[[dialogue]]
speaker = "サチ"
original = "「そうなのかもしれない。でも、生まれたばかりだっていうあなたの命を奪ったら、私は自分の信じている幸運を、わかっていながら握り潰すことになる」"
translation = "「그럴지도 몰라. 하지만 이제 막 태어났다는 당신의 목숨을 빼앗으면, 나는 내가 믿는 행운을 알면서도 짓밟는 게 돼」"

[[dialogue]]
speaker = "サチ"
original = "「それはできない。少なくともプリムラ……あなたはまだ、違う生き方ができるんだから」"
translation = "「그건 할 수 없어. 적어도 프리뮬러…… 당신은 아직 다른 방식으로 살 수 있으니까」"

[[dialogue]]
speaker = "プリムラ"
original = "「……何じゃその、プリムラという名前は」"
translation = "「……뭐냐 그 프리뮬러라는 이름은」"

[[dialogue]]
speaker = "サチ"
original = "「昔見た魔法少女のアニメで、スライムの妖精が出てきたのを覚えてたんだよね」"
translation = "「예전에 본 마법 소녀 애니메이션에서 슬라임 요정이 나왔던 게 기억났거든」"

[[dialogue]]
speaker = "サチ"
original = "「ラッキースライムのプリムラ。メルクリウスよりは女の子っぽくて、可愛い名前かなって思うんだけど、どうかな？」"
translation = "「럭키 슬라임 프리뮬러. 메르쿠리우스보다는 여자아이 같고 귀여운 이름이라고 생각하는데, 어때?」"

[[dialogue]]
speaker = "プリムラ"
original = "「か、可愛いじゃと……！？\u3000ああもう……！」"
translation = "「귀, 귀엽다니……!? 아아 정말……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「本当になんなのじゃ貴様は……！\u3000なにが幸運じゃ……！\u3000我は認めぬ……絶対にこんなのは認めぬのだ！」"
translation = "「정말로 네놈은 정체가 무엇이냐……! 무엇이 행운이냐……! 짐은 인정 못 한다…… 절대로 이런 건 인정 못 하느니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「――よく聞け、<ruby>白詰<rt>しろつめ</rt></ruby>サチ！」"
translation = "「――잘 들어라, 시로츠메 사치!」"

[[dialogue]]
speaker = "プリムラ"
original = "「こうなれば、我は恥を飲み込んで、生きてやる！\u3000だが、必ず生きて、貴様に奪われた終末兵器としての力を取り戻してやるのじゃ！」"
translation = "「이렇게 된 이상 짐은 치욕을 삼키고 살아주마! 하지만 반드시 살아서 네놈에게 빼앗긴 종말 병기로서의 힘을 되찾고 말 것이니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「そして、その時こそ貴様を倒して、後悔させてやる！」"
translation = "「그리고 그때야말로 네놈을 쓰러뜨려 후회하게 해주마!」"

[[dialogue]]
speaker = "プリムラ"
original = "「我を生かしたことは、幸運ではなく、不運な勘違いであったと！」"
translation = "「짐을 살려둔 것은 행운이 아니라 불운한 착각이었다는 것을!」"

[[dialogue]]
speaker = "サチ"
original = "「……まあ、今はそれでいっか」"
translation = "「……뭐, 지금은 그걸로 됐어」"

[[dialogue]]
speaker = "サチ"
original = "「私も１度あなたを助けた以上、必ず更生させて、いいスライムにさせるから」"
translation = "「나도 한 번 당신을 구한 이상, 반드시 갱생시켜서 착한 슬라임으로 만들 테니까」"

[[dialogue]]
speaker = "サチ"
original = "「そして、生きてて幸運だったって、いつか言わせてみせる」"
translation = "「그리고 살아서 행운이었다고 언젠가 말하게 해줄게」"

[[dialogue]]
speaker = "プリムラ"
original = "「というか、そもそも我はスライムではないのじゃ！」"
translation = "「그보다 애초에 짐은 슬라임이 아니니라!」"

[[dialogue]]
speaker = "unk"
original = "――何度目のぶつかり合いになるのか。プリムラはロストアイテムが再現したサチの幸運によって攻撃が当たらず、逆に放たれた水球によって吹っ飛ばされた。"
translation = "――몇 번째 충돌일까. 프리뮬러는 로스트 아이템이 재현한 사치의 행운 때문에 공격이 맞지 않았고, 반대로 날아온 수구에 의해 튕겨 나갔다."

[[dialogue]]
speaker = "プリムラ"
original = "「カハッ……！\u3000くっ……ククク――」"
translation = "「커헉……! 큭…… 크크크――」"

[[dialogue]]
speaker = "プリムラ"
original = "「ハハハハハハッ！\u3000ぬるいわっ！！\u3000この程度、あの時戦った本物の化け物に比べればっ！！！」"
translation = "「하하하하하하! 무르구나!! 이 정도는 그때 싸웠던 진짜 괴물에 비하면!!!」"

[[dialogue]]
speaker = "ロストアイテム"
original = "「…………！」"
translation = "「…………!」"

[[dialogue]]
speaker = "プリムラ"
original = "「いいか？\u3000あの化け物は、馬鹿みたいに甘い幸運を信じておるのじゃ。故に、どうやっても悪側に回ることはない」"
translation = "「알겠느냐? 그 괴물은 바보같이 달콤한 행운을 믿고 있느니라. 고로 어떻게 해도 악의 편으로 돌아설 일은 없지」"

[[dialogue]]
speaker = "プリムラ"
original = "「わかるか？\u3000他人の記憶を奪うことしかできない脳なしよ！」"
translation = "「알겠느냐? 타인의 기억을 빼앗는 것밖에 못 하는 무능한 놈아!」"

[[dialogue]]
speaker = "プリムラ"
original = "「貴様のやっていることは、チョコレートに混ぜる砂糖と塩を間違えたようなもの！\u3000そんな化け物の劣化コピーなんぞにっ！！」"
translation = "「네놈이 하는 짓은 초콜릿에 넣을 설탕과 소금을 착각한 것과 같느니라! 그런 괴물의 열화 카피 따위에게!!」"

[[dialogue]]
speaker = "プリムラ"
original = "「真の終末兵器たる我が負けるかぁぁぁーーーーーーっ！！！」"
translation = "「진정한 종말 병기인 짐이 질 것 같으냐아아아아아아아아악!!!」"

[[dialogue]]
speaker = "unk"
original = "プリムラは巨大な拳を振りかぶり、ロストアイテムの懐に飛び込む。"
translation = "프리뮬러는 거대한 주먹을 치켜들고 로스트 아이템의 품으로 뛰어든다."

[[dialogue]]
speaker = "unk"
original = "ロストアイテムはサチの幸運を再現して、それをまた避けようとするが――"
translation = "로스트 아이템은 사치의 행운을 재현하여 그것을 다시 피하려 하지만――"

[[dialogue]]
speaker = "プリムラ"
original = "「そんな生温い幸運なんぞ、握り潰してくれるわぁぁぁっ！」"
translation = "「그런 미지근한 행운 따위 짓눌러주마아아아앗!」"

[[dialogue]]
speaker = "ロストアイテム"
original = "「…………！？」"
translation = "「…………!?」"

[[dialogue]]
speaker = "unk"
original = ""
translation = ""

[[dialogue]]
speaker = "unk"
original = "プリムラの拳が、幸運の壁を打ち砕く！"
translation = "프리뮬러의 주먹이 행운의 벽을 부순다!"

[[dialogue]]
speaker = "プリムラ"
original = "「ぶち抜け！\u3000ドレインハンドクラッシャーッ！！！」"
translation = "「뚫어버려라! 드레인 핸드 크러셔!!!」"

[[dialogue]]
speaker = "ロストアイテム"
original = "「…………っ」"
translation = "「…………윽」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふん……相手が悪かったな、偽物よ」"
translation = "「흥…… 상대를 잘못 골랐구나, 가짜 놈」"

[[dialogue]]
speaker = "プリムラ"
original = "「――あいにく我は、いずれ本物の幸運に勝つと決めておるのじゃ」"
translation = "「――안타깝게도 짐은 언젠가 진짜 행운에게 이기기로 정했느니라」"

[[dialogue]]
speaker = "サチ"
original = "「プリムラ！」"
translation = "「프리뮬러!」"

[[dialogue]]
speaker = "unk"
original = "無事か！？"
translation = "무사해!?"

[[dialogue]]
speaker = "プリムラ"
original = "「遅かったな、貴様達……ロストアイテムなら、そこに倒れておるぞ」"
translation = "「늦었구나 네놈들…… 로스트 아이템이라면 저기 쓰러져 있느니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「トレジアンナ、あとは貴様の回収術式で――なに……！？」"
translation = "「트레지안나, 나머지는 네놈의 회수 술식으로―― 뭐냐……!?」"

[[dialogue]]
speaker = "マトイ"
original = "「な、何これ……！？\u3000周りが急に、夜みたいに暗くなって……！？」"
translation = "「뭐, 뭐야 이거……!? 주변이 갑자기 밤처럼 어두워져서……!?」"

[[dialogue]]
speaker = "トマル"
original = "「プリムラさま、後ろです！」"
translation = "「프리뮬러 님, 뒤쪽입니다!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ロストアイテム……！\u3000まだ動くのか……！」"
translation = "「로스트 아이템……! 아직 움직이는 것이냐……!」"

[[dialogue]]
speaker = "サチ"
original = "「ロストアイテムの姿が変わって……！」"
translation = "「로스트 아이템의 모습이 변해서……!」"

[[dialogue]]
speaker = "プリムラ"
original = "「この姿は、まさか……！\u3000我が勝ったから、切り換えたのか……！？」"
translation = "「이 모습은 설마……! 짐이 이겼기에 전환한 것이냐……!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「終末兵器メルクリウス……！」"
translation = "「종말 병기 메르쿠리우스……!」"

