[[dialogue]]
speaker = "unk"
original = "とある休日、俺は恋人になったリップルと、リゾート結界のプライベートビーチへ遊びに来ていた――"
translation = "어느 휴일, 나는 연인이 된 리플과 리조트 결계의 프라이빗 비치에 놀러 왔다──"

[[dialogue]]
speaker = "リップル"
original = "「アハハ！\u3000カイチョー、行きマスよ～。それ～♪」"
translation = "「아하하! 회장님, 갑니다~. 받아라♪」"

[[dialogue]]
speaker = "リップル"
original = "「ふふっ、反撃の水かけデスか？\u3000ニゲルが勝ちで～す♪」"
translation = "「후후, 반격의 물 뿌리기임까? 도망치는 게 이기는 거임다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「って、わわっ！？\u3000足がモツれて、バランスが……！」"
translation = "「앗, 와왓!? 발이 꼬여서 밸런스가……!」"

[[dialogue]]
speaker = "リップル"
original = "「――あ、カイチョー！\u3000支えてくれてアリガトございます♪」"
translation = "「──아, 회장님! 받쳐주셔서 감사함다♪」"

[[dialogue]]
speaker = "クロト"
original = "「間に合って良かった……って、踏んづけた海草で足が滑って――！？」"
translation = "「늦지 않아서 다행이다…… 어라, 밟은 해초 때문에 발이 미끄러져서──!?」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ！？」"
translation = "「와오!?」"

[[dialogue]]
speaker = "リップル"
original = "「アハハ♪\u3000結局カイチョーと２人で転んじゃいマシた～。でも、カイチョーが下になってくれたおかげで、ちっとも痛くナイです！」"
translation = "「아하하♪ 결국 회장님과 둘이서 넘어졌슴다~. 하지만 회장님이 아래가 되어주신 덕분에 하나도 안 아픔다!」"

[[dialogue]]
speaker = "リップル"
original = "「あっ……ふふっ<emoji=heart04>\u3000ワタシがおっぱい押し付けたせいで、カイチョーのアソコ、大きくなっちゃってマスね……<emoji=heart04>」"
translation = "「앗…… 후후<emoji=heart04> 제가 가슴을 밀착시킨 탓에 회장님의 그곳, 커져 버렸슴다네……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「これはちゃんと恋人として、責任取って静めなきゃイケませんね<emoji=heart04>」"
translation = "「이건 제대로 연인으로서 책임지고 진정시켜 드려야겠슴다네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リップルが作ったリゾート結界──そのコピーであり、俺たち２人しか入ることができないプライベートビーチ。"
translation = "리플이 만든 리조트 결계── 그 카피이며 우리 둘밖에 들어올 수 없는 프라이빗 비치."

[[dialogue]]
speaker = "unk"
original = "絶対に人目に触れることのない安心感から、リップルは見晴らしのいいビーチのど真ん中で、堂々と俺のペニスを水着から取り出した──"
translation = "절대로 남의 눈에 띌 리 없다는 안심감 때문인지, 리플은 탁 트인 해변 한복판에서 당당하게 내 페니스를 수영복에서 꺼냈다──"

[[dialogue]]
speaker = "リップル"
original = "「ふふっ、カイチョーも興奮してるんデスね♪\u3000……謝らなくてもダイジョーブです<emoji=heart04>\u3000ワタシで興奮してくれてるんだって思うと、嬉しいデスし」"
translation = "「후후, 회장님도 흥분하고 계시네요♪ ……사과하지 않아도 괜찮슴다<emoji=heart04> 저 때문에 흥분해주고 있다고 생각하면 기쁘기도 하고」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシも、カイチョーのオチ○チン意識すると、気持ちイイの思い出して……ムラムラしちゃってマスから<emoji=heart04>」"
translation = "「저도 회장님의 자지를 의식하면 기분 좋았던 게 생각나서…… 몸이 달아오르고 있슴다니까<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はあぁ<emoji=heart04>\u3000それにしてもカイチョーのオチ○チン、ＢＩＧスゴいです……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 그나저나 회장님의 자지, BIG 대단함다……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「いつ見ても、大きくて逞しくて……はぁぁ<emoji=heart04>\u3000ワタシ、見ているだけでおま○こ、キュンキュンしちゃいマス……<emoji=heart04>」"
translation = "「언제 봐도 크고 늠름해서…… 하아아<emoji=heart04> 저, 보기만 해도 보지가 큥큥거림다……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシがスマタでオチ○チン、ぬるぬるにしちゃいます<emoji=heart04>\u3000カイチョーはそのまま、楽にしててクダさいね。……んっ<emoji=heart04>」"
translation = "「제가 스마타로 자지를 미끌미끌하게 해드리겠슴다<emoji=heart04> 회장님은 그대로 편하게 계세요. ……응<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000オチ○チン熱くて、カタいです……ふうぅ……あぁ<emoji=heart04>\u3000んっ……んあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응……<emoji=heart04> 자지가 뜨겁고 딱딱함다…… 후우…… 아아<emoji=heart04> 응…… 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「クリトリスが擦れて、気持ちイイです……あぁん<emoji=heart04>\u3000んうぅ……<emoji=heart04>\u3000はぁ……んんっ……ふあぁっ……<emoji=heart04>」"
translation = "「클리토리스가 쓸려서 기분 좋슴다…… 아앙<emoji=heart04> 응우우……<emoji=heart04> 하아…… 응응…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーの立派なオチ○チン、スマタしてるダケで、おま○こ疼いて愛液溢れて来ちゃいマス<emoji=heart04>\u3000……ふうぅ、んあぁっ<emoji=heart04>\u3000はあぁ……ふあぁ……んうぅっ<emoji=heart04>」"
translation = "「회장님의 훌륭한 자지, 스마타를 하는 것만으로도 보지가 욱신거리고 애액이 흘러나옴다<emoji=heart04> ……후우, 응아앗<emoji=heart04> 하아아…… 후아아…… 응우웃<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ふうぅ……カイチョー<emoji=heart04>\u3000キス、キスしたいです<emoji=heart04>\u3000恋人のラブラブちゅっちゅ、してクダさい<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっ……ちゅぱっ<emoji=heart04>\u3000ちゅむる……ちゅぷぷっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>」"
translation = "「후우…… 회장님<emoji=heart04> 키스, 키스하고 싶슴다<emoji=heart04> 연인의 러브러브 츄츄, 해주세요<emoji=heart04> 응뭇<emoji=heart04> 쪽…… 츄파앗<emoji=heart04> 츄무루…… 츄푸풋<emoji=heart04> 츄파앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はい、キスしゅきれす<emoji=heart04>\u3000気持ち良くて、頭の中がハッピーでいっぱいにナルので……<emoji=heart04>\u3000ちゅっ……ちゅぷっ<emoji=heart04>\u3000ちゅるっ……ちゅれるっ<emoji=heart04>\u3000ちゅむっ……ちゅぱっ<emoji=heart04>」"
translation = "「네, 키스 좋아함다<emoji=heart04> 기분 좋아서 머릿속이 해피로 가득 차버리니까……<emoji=heart04> 쪽…… 츄풋<emoji=heart04> 츄룻…… 츄렛<emoji=heart04> 츄뭇…… 츄파앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーもワタシとのキス、好きれしゅか<emoji=heart04>\u3000んむっ……嬉しいれしゅ<emoji=heart04>\u3000ちゅっ……ちゅぱっ<emoji=heart04>\u3000ちゅぷっ……んちゅっ<emoji=heart04>\u3000ちゅむるっ……れろちゅっ<emoji=heart04>」"
translation = "「회장님도 저와의 키스, 좋아하심까<emoji=heart04> 응뭇…… 기쁨다<emoji=heart04> 쪽…… 츄파앗<emoji=heart04> 츄풋…… 응츄<emoji=heart04> 츄무룻…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ちゅぱっ……んはぁ<emoji=heart04>\u3000んっ、はあぁぁ<emoji=heart04>\u3000ワタシ、もう我慢デキません<emoji=heart04>\u3000おま○こ、オチ○チン欲しくてグチュグチュに、なっちゃってますっ<emoji=heart04>」"
translation = "「츄파앗…… 은하아<emoji=heart04> 응, 하아아아<emoji=heart04> 저 이제 못 참겠슴다<emoji=heart04> 보지가 자지를 원해서 구축구축해져 버렸슴다아<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「オチ○チンもぬるぬるになってマスから、いいデスよね？\u3000はぁっ……んんっ……おま○こに、ウェルカムしちゃいます<emoji=heart04>\u3000んんっ……あんっ<emoji=heart04>」"
translation = "「자지도 미끌미끌해졌으니까 괜찮죠? 하앗…… 응응…… 보지에 웰컴해버리겠슴다<emoji=heart04> 응응…… 안앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ふうぅ……<emoji=heart04>\u3000もう、挿れちゃいマスね<emoji=heart04>\u3000はあぁぁ……オチ○チン、いただきます……あぁぁっ<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 이제 삽입하겠슴다네<emoji=heart04> 하아아아…… 자지, 잘 먹겠슴다…… 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「キテます<emoji=heart04>\u3000あんっ、カイチョーのおっきいオチ○チン、おま○こ押し広げて……はあぁ……んあぁっ<emoji=heart04>\u3000ふぁぁぁあっ――！」"
translation = "「오고 있슴다<emoji=heart04> 안앗, 회장님의 커다란 자지가 보지를 비집고 들어와서…… 하아아…… 응아앗<emoji=heart04> 후아아아앗──!」"

[[dialogue]]
speaker = "リップル"
original = "「入っ……んあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「들어갔…… 응아아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はあぁ<emoji=heart04>\u3000んっ、あぁっ<emoji=heart04>\u3000ふぅっ、んふぅ……<emoji=heart04>\u3000オチ○チン、奥までキマしたぁ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 응, 아앗<emoji=heart04> 후우, 응후우……<emoji=heart04> 자지, 끝까지 왔슴다아……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はぁっ……んんっ！\u3000あっ……ふあぁっ……あぁんっ<emoji=heart04>\u3000気持ちイイです……はぁっ……んあぁっ<emoji=heart04>\u3000んふぅっ……あんっ……ふあぁっ<emoji=heart04>」"
translation = "「하앗…… 응응! 앗…… 후아앗…… 아앙앗<emoji=heart04> 기분 좋슴다…… 하앗…… 응아앗<emoji=heart04> 응후웃…… 안앗…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「オチ○チンでおま○こ擦るの、タマリません<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ……はぁんっ<emoji=heart04>\u3000ふあぁっ……あっ、んんっ<emoji=heart04>\u3000ああっ……んあぁっ……ふあぁんっ<emoji=heart04>」"
translation = "「자지로 보지를 문지르는 거, 못 참겠슴다<emoji=heart04> 하아아앗<emoji=heart04> 응우웃…… 하앙앗<emoji=heart04> 후아앗…… 앗, 응응<emoji=heart04> 아앗…… 응아앗…… 후아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「気持ちヨクて、腰がいっぱい、動いちゃいます<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000カイチョーとセックス、好きですっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ……ソコっ……あぁっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>」"
translation = "「기분 좋아서 허리가 잔뜩 움직임다<emoji=heart04> 하아아앗……<emoji=heart04> 회장님과 섹스하는 거 좋아함다! 앗<emoji=heart04> 응아앗…… 거기…… 아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……最初はセックスのこと全然知らなかったのに、今ではすっかりエッチに、なっちゃったな」"
translation = "「윽…… 처음엔 섹스에 대해 전혀 몰랐는데, 이제는 완전히 음란해져 버렸네」"

[[dialogue]]
speaker = "リップル"
original = "「だ、だってぇ……あんっ<emoji=heart04>\u3000あっ、ふあぁっ<emoji=heart04>\u3000カイチョーにおま○こジュポジュポされると、キスよりＢＩＧハッピーに、なっちゃうんですっ<emoji=heart04>」"
translation = "「그, 그치만…… 안앗<emoji=heart04> 앗, 후아앗<emoji=heart04> 회장님한테 보지가 쥬포쥬포당하면 키스보다 BIG 해피해져 버리는걸요!」"

[[dialogue]]
speaker = "リップル"
original = "「んっ、はあぁんっ<emoji=heart04>\u3000こんなの好きになっちゃうに、キマってます<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ふあぁっ……んっ、んあぁんっ<emoji=heart04>」"
translation = "「응, 하아앙앗<emoji=heart04> 이런 거 좋아하게 될 수밖에 없슴다<emoji=heart04> 앗, 안앗<emoji=heart04> 후아앗…… 응, 응아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はあぁっ……ふうぅっ<emoji=heart04>\u3000だからもっと、おま○こにオチ○チンください<emoji=heart04>\u3000あっ、はあぁっ……ふあぁんっ<emoji=heart04>\u3000奥、気持ちイイです<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「하아아앗…… 후우웃<emoji=heart04> 그러니까 좀 더 보지에 자지 주세요<emoji=heart04> 앗, 하아아앗…… 후아앙앗<emoji=heart04> 깊숙한 곳 기분 좋슴다<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーとセックス<emoji=heart04>\u3000好き、スキです<emoji=heart04>\u3000気持ちイイのスキぃ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000ここっ……ここキモチイイです<emoji=heart04>\u3000んっ、はあぁっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>」"
translation = "「회장님과 섹스<emoji=heart04> 좋아, 좋아함다<emoji=heart04> 기분 좋은 거 좋아아<emoji=heart04> 후아앗<emoji=heart04> 여기…… 여기 기분 좋슴다<emoji=heart04> 응, 하아아앗<emoji=heart04> 응아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「か、カイチョー<emoji=heart04>\u3000おっぱい<emoji=heart04>\u3000おっぱい触ってホシイです<emoji=heart04>\u3000ンうぅ<emoji=heart04>\u3000たくさん腰振りマスから、乳首イジってクダさい……んっ<emoji=heart04>\u3000はあぁっ……ンあぁっ<emoji=heart04>」"
translation = "「회, 회장님<emoji=heart04> 가슴<emoji=heart04> 가슴 만져주셨으면 좋겠슴다<emoji=heart04> 응우우<emoji=heart04> 허리 많이 흔들 테니까 유두 만져주세요…… 응<emoji=heart04> 하아아앗…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「コリコリって、来ましたぁ……<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000気持ちイイ<emoji=heart04>\u3000乳首、クリクリされるの、好きぃ<emoji=heart04>\u3000はあぁっ……んあぁんっ<emoji=heart04>」"
translation = "「오돌토돌하게 느낌 왔슴다아……<emoji=heart04> 하아앙앗<emoji=heart04> 후아앗<emoji=heart04> 기분 좋아<emoji=heart04> 유두 굴려지는 거 좋아아<emoji=heart04> 하아아앗…… 응아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ<emoji=heart04>\u3000ンあぁっ<emoji=heart04>\u3000乳首優しく撫でるのと、激しくコリコリするの、交互にされるの好きですっ<emoji=heart04>\u3000あっ、ふあぁっ<emoji=heart04>\u3000カイチョー……もっとぉ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아앗<emoji=heart04> 유두를 부드럽게 쓰다듬는 거랑 격렬하게 비비는 걸 번갈아 당하는 거 좋아함다아! 앗, 후아앗<emoji=heart04> 회장님…… 더어<emoji=heart04> 응아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ふあぁっ<emoji=heart04>\u3000好きっ、カイチョー好きです<emoji=heart04>\u3000オチ○チンも、指も、気持ちいいですっ<emoji=heart04>\u3000あっ、あんっ、乳首気持ちイイ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 좋아, 회장님 좋아함다<emoji=heart04> 자지도 손가락도 기분 좋슴다! 앗, 안앗, 유두 기분 좋아<emoji=heart04> 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はっ……んあぁっ……カイチョー<emoji=heart04>\u3000実はワタシ、今日は危険日なんですヨ<emoji=heart04>\u3000ふうぅぅ……<emoji=heart04>」"
translation = "「하…… 응아앗…… 회장님<emoji=heart04> 사실 저 오늘은 위험일임다요<emoji=heart04> 후우우우……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「――そう、ナカに出されたら、赤ちゃんデキちゃうかもな日です<emoji=heart04>\u3000はあぁ……んふぅ……<emoji=heart04>」"
translation = "「──그래요, 안에 싸면 아기 생겨버릴지도 모르는 날임다<emoji=heart04> 하아아…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あんっ<emoji=heart04>\u3000やぁんっ<emoji=heart04>\u3000気持ちイイのに、オチ○チン抜いちゃやぁです<emoji=heart04>\u3000おま○こ切なくなっちゃいマスから<emoji=heart04>\u3000あっ……ふあぁっ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 야앙앗<emoji=heart04> 기분 좋은데 자지 빼면 싫슴다아<emoji=heart04> 보지가 허전해져 버리니까<emoji=heart04> 앗…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「それに、ただのセックスじゃナクて……んっ……はあぁんっ<emoji=heart04>\u3000赤ちゃん作る、種付け交尾の方がコーフンしませんか？<emoji=heart04>」"
translation = "「게다가 그냥 섹스가 아니라…… 응…… 하아앙앗<emoji=heart04> 아기 만드는 씨내리기 교미가 더 흥분되지 않슴까?<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あぁぁん<emoji=heart04>\u3000ワタシはしますっ<emoji=heart04>\u3000はぁぁ……<emoji=heart04>\u3000カイチョーに子作り交尾、してもらってると思うと<emoji=heart04>\u3000とってもコーフンしてます<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「아아아앙<emoji=heart04> 저는 그럼다! 하아아……<emoji=heart04> 회장님한테 애 만들기 교미를 당하고 있다고 생각하면<emoji=heart04> 엄청 흥분됨다<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシの子宮にシャセイして、カイチョーとワタシの赤ちゃん、ツクリましょう<emoji=heart04>\u3000はあぁぁぁっ……あぁんっ<emoji=heart04>」"
translation = "「제 자궁에 사정해서 회장님과 저의 아기, 만들어요<emoji=heart04> 하아아아앗…… 아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「想像したら、んふぅ……<emoji=heart04>\u3000子宮がキュンキュンして、おま○こビクビクって、しちゃいます<emoji=heart04>\u3000はふぅぅぅん<emoji=heart04>」"
translation = "「상상했더니 응후……<emoji=heart04> 자궁이 큥큥거리고 보지가 벌렁벌렁해버림다<emoji=heart04> 하후우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あぁっ<emoji=heart04>\u3000オチ○チン、大きくなってマスよ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000カイチョーも興奮、しちゃいマシタか？\u3000あんっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 자지 커졌슴다네<emoji=heart04> 후우……<emoji=heart04> 회장님도 흥분해버리신 검까? 안앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー、ワタシと赤ちゃん作るの嫌デスか？<emoji=heart04>\u3000あっ……あぁんっ<emoji=heart04>\u3000ワタシはカイチョーの赤ちゃん、ホシイです<emoji=heart04>」"
translation = "「회장님, 저랑 아기 만드는 거 싫슴까?<emoji=heart04> 앗…… 아앙앗<emoji=heart04> 저는 회장님 아기 갖고 싶슴다<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ふふっ……はぁぁ<emoji=heart04>\u3000気持ちイイのに、ガマンしてる顔ですっ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000そんなカイチョーに、イイことオシえちゃいます<emoji=heart04>」"
translation = "「후후…… 하아아<emoji=heart04> 기분 좋은데 참는 얼굴임다! 응……<emoji=heart04> 그런 회장님께 좋은 거 알려드리겠슴다<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はぁぁ……<emoji=heart04>\u3000受精しちゃっても、ワタシの結界で守っておくことがデキちゃいます<emoji=heart04>\u3000んんんぅ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 수정되어버려도 제 결계로 지켜두는 게 가능함다<emoji=heart04> 응응응우<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシの子宮で……カイチョーとの愛の結晶をヨヤクです<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000カイチョーの精子で子宮をイッパイにして、『孕ませ予約』シテください<emoji=heart04>」"
translation = "「제 자궁에서…… 회장님과의 사랑의 결실을 예약하는 검다<emoji=heart04> 아앙앗<emoji=heart04> 회장님의 정액으로 자궁을 가득 채워서, 『임신 예약』 해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はぁぁん……<emoji=heart04>\u3000だから、ガマンしないで<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ワタシの中に気持ち良くビューって<emoji=heart04>\u3000いっぱい出して、孕ませてください<emoji=heart04>」"
translation = "「하아아앙……<emoji=heart04> 그러니까 참지 말고<emoji=heart04> 안앗<emoji=heart04> 제 안에 기분 좋게 뷰우우 하고<emoji=heart04> 잔뜩 내보내서 임신시켜 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……リップルは、本当に俺でいいのか？」"
translation = "「윽…… 리플은 정말 나로 괜찮은 거야?」"

[[dialogue]]
speaker = "リップル"
original = "「イイに決まってます！\u3000はぁんっ……ふぅぅ<emoji=heart04>\u3000むしろダイスキなカイチョーじゃなきゃヤぁです<emoji=heart04>\u3000だから――」"
translation = "「괜찮고말고요! 하앙앗…… 후우우<emoji=heart04> 오히려 정말 좋아하는 회장님이 아니면 싫슴다<emoji=heart04> 그러니까──」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーの精子で、ワタシの子宮に赤ちゃん予約してクダさい<emoji=heart04>」"
translation = "「회장님의 정액으로 제 자궁에 아기 예약해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あんっ<emoji=heart04>\u3000オチ○チン、また大きく……！\u3000あっ……ふあぁっ<emoji=heart04>\u3000ＢＩＧ凄い<emoji=heart04>\u3000はあぁ、ふあぁぁぁぁっ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 자지가 또 커졌……! 앗…… 후아앗<emoji=heart04> BIG 대단함다<emoji=heart04> 하아아, 후아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「んんんっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000嬉しいです、カイチョー<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000腰の動き、止まりませんっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>\u3000あっ、あっ、あっ、気持ちイイ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>」"
translation = "「응응응앗<emoji=heart04> 하아아앙<emoji=heart04> 기쁨다, 회장님<emoji=heart04> 안앗<emoji=heart04> 허리 움직임이 멈추지 않슴다! 응아앙앗<emoji=heart04> 앗, 앗, 앗, 기분 좋아<emoji=heart04> 후아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーのオチ○チン気持ちイイっ<emoji=heart04>\u3000はぁっ、どんどん腰、激しくなっちゃいます<emoji=heart04>\u3000あっ、あっ、あっ、ふあぁっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「회장님의 자지 기분 좋아아<emoji=heart04> 하앗, 점점 허리가 격렬해짐다<emoji=heart04> 앗, 앗, 앗, 후아앗<emoji=heart04> 후우웃<emoji=heart04> 후아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「おま○こで、オチ○チンの竿<emoji=heart04>\u3000ゴシゴシしちゃいますっ<emoji=heart04>\u3000あっ、これスキぃ<emoji=heart04>\u3000あっ、あっ、あっ、イイ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000奥気持ちイイです<emoji=heart04>\u3000んっ、ふあぁぁっ<emoji=heart04>」"
translation = "「보지로 자지의 기둥을<emoji=heart04> 비비적비비적해버림다! 앗, 이거 좋아아<emoji=heart04> 앗, 앗, 앗, 좋아<emoji=heart04> 하아아앗<emoji=heart04> 깊숙한 곳 기분 좋슴다<emoji=heart04> 응, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ、はあぁっ<emoji=heart04>\u3000オチ○チンが子宮口にドチュドチュって当たってぇっ、んあぁっ<emoji=heart04>\u3000腰止まらナイ<emoji=heart04>\u3000あっ、あっ、あっ、ふあぁんっ<emoji=heart04>」"
translation = "「앗, 하아아앗<emoji=heart04> 자지가 자궁구에 도츄도츄하고 닿아서어, 응아앗<emoji=heart04> 허리가 안 멈춰요<emoji=heart04> 앗, 앗, 앗, 후아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「んっ、んっ、はあぁっ<emoji=heart04>\u3000カイチョー好き、しゅき<emoji=heart04>\u3000もっと、もっとぉ<emoji=heart04>\u3000あっ、あっ、あっ、ふあぁっ<emoji=heart04>\u3000んあぁぁんっ<emoji=heart04>」"
translation = "「응, 응, 하아아앗<emoji=heart04> 회장님 좋아, 좋아해<emoji=heart04> 좀 더, 좀 더어<emoji=heart04> 앗, 앗, 앗, 후아앗<emoji=heart04> 응아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「子作りの交尾っ<emoji=heart04>\u3000いつもよりおま○こ気持ちイイですっ<emoji=heart04>\u3000はっ、あぁぁっ、凄い<emoji=heart04>\u3000んんんっ、はあぁっ<emoji=heart04>\u3000あっ、あっ、あっ、ふあぁぁんっ<emoji=heart04>」"
translation = "「아기 만들기 교미<emoji=heart04> 평소보다 보지가 기분 좋슴다아! 하앗, 아아앗, 굉장해<emoji=heart04> 응응응, 하아아앗<emoji=heart04> 앗, 앗, 앗, 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「子宮降りてキテます<emoji=heart04>\u3000ふっ、んあぁっ<emoji=heart04>\u3000精子欲しくて、準備しちゃってます<emoji=heart04>\u3000あっ、あんっ、はあぁっ<emoji=heart04>」"
translation = "「자궁이 내려오고 있슴다<emoji=heart04> 훗, 응아앗<emoji=heart04> 정액을 원해서 준비하고 있슴다네<emoji=heart04> 앗, 안앗, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000子作りセックス気持ちイイ<emoji=heart04>\u3000もっと、もっとホシイです<emoji=heart04>\u3000あんっ、あんっ、あんっ、気持ちイイの、もっとぉ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 애 만들기 섹스 기분 좋아<emoji=heart04> 좀 더, 좀 더 갖고 싶슴다<emoji=heart04> 안앗, 안앗, 안앗, 기분 좋은 거 좀 더어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リップル、俺もう……！」"
translation = "「리플, 나 이제……!」"

[[dialogue]]
speaker = "リップル"
original = "「来て、来てクダさい、カイチョー<emoji=heart04>\u3000あっ、あっ、あっ、ふあぁっ<emoji=heart04>\u3000熱くて気持ちイイ精子、ワタシの中にいっぱいっ<emoji=heart04>\u3000はっ、んあぁっ<emoji=heart04>」"
translation = "「오세요, 와주세요 회장님<emoji=heart04> 앗, 앗, 앗, 후아앗<emoji=heart04> 뜨겁고 기분 좋은 정액, 제 안에 가득<emoji=heart04> 하앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシも、もう……イキそうデスからぁ<emoji=heart04>\u3000あんっ、あんっ、あんっ……はあぁっ<emoji=heart04>\u3000一緒に、一緒にぃ<emoji=heart04>」"
translation = "「저도 이제…… 갈 것 같으니까아<emoji=heart04> 안앗, 안앗, 안앗…… 하아아앗<emoji=heart04> 같이, 같이이<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はっ、あっ、あっ<emoji=heart04>\u3000精子来て<emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000ワタシの中にいっぱい、射精してぇ<emoji=heart04>」"
translation = "「하앗, 앗, 앗<emoji=heart04> 정액 줘요<emoji=heart04> 안앗, 안앗, 안앗<emoji=heart04> 제 안에 가득 사정해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000イク、イキます<emoji=heart04>\u3000イクッ、イクイクイクイク――」"
translation = "「앗앗앗앗앗<emoji=heart04> 가요, 갑니다<emoji=heart04> 가, 간다간다간다──」"

[[dialogue]]
speaker = "リップル"
original = "「っ……ふあぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックゥゥゥ～～～～～～～～―――――――――ッ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 후아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어~~~~~~~~~~~~~~~~~엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっあっあっ、んあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000カイチョーの熱い精子、キテますぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗, 응아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 회장님의 뜨거운 정액, 오고 있슴다아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「あっ……はあぁっ<emoji=heart04>\u3000んうぅ<emoji=heart04>\u3000お腹の中にいっぱい射精サレて、頭の中もハッピーでイッパイになっちゃってます……<emoji=heart04>」"
translation = "「앗…… 하아아앗<emoji=heart04> 응우우<emoji=heart04> 배 속에 가득 사정당해서 머릿속도 해피로 가득 차버렸슴다……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はあぁっ……<emoji=heart04>\u3000カイチョーのオチ○チン、ＢＩＧ凄いです……<emoji=heart04>\u3000はふぅぅ……まだ射精、トマリません<emoji=heart04>」"
translation = "「하아아앗……<emoji=heart04> 회장님의 자지, BIG 대단함다……<emoji=heart04> 하후우…… 아직 사정이 안 멈춤다<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ふうぅ……<emoji=heart04>\u3000やっと止まりました<emoji=heart04>\u3000お腹の中、カイチョーの精子でイッパイです……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 이제야 멈췄슴다<emoji=heart04> 배 속이 회장님의 정액으로 가득함다……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「……あんっ<emoji=heart04>\u3000オチ○チン、抜けちゃいます……<emoji=heart04>」"
translation = "「……안앗<emoji=heart04> 자지 빠짐다……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「はあぁ……<emoji=heart04>\u3000精子入りきらなくて……おま○こから溢れて、キちゃってます……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 정액이 다 안 들어가서…… 보지에서 넘쳐흐르고 있슴다……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「んふぅ<emoji=heart04>\u3000本気の種付け交尾、凄く気持ちヨカッタです……<emoji=heart04>」"
translation = "「응후<emoji=heart04> 진심 어린 씨내리기 교미, 정말 기분 좋았슴다……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も……気持ち良かった。あのさ、リップル――」"
translation = "「나도…… 기분 좋았어. 저기 리플──」"

[[dialogue]]
speaker = "クロト"
original = "「本当に好きだ。責任、ちゃんと取るから」"
translation = "「정말 좋아해. 책임, 꼭 질 테니까」"

[[dialogue]]
speaker = "リップル"
original = "「んっ……カイチョー、嬉しいです。ワタシも好きです。スキ、大好き……<emoji=heart04>」"
translation = "「응…… 회장님, 기쁨다. 저도 좋아함다. 좋아해, 정말 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「キスしたいです……んっ……ちゅっ<emoji=heart04>\u3000ちゅぱっ……ちゅれるっ<emoji=heart04>\u3000ちゅむっ……んちゅっ……<emoji=heart04>」"
translation = "「키스하고 싶슴다…… 응…… 쪽<emoji=heart04> 츄파앗…… 츄렛<emoji=heart04> 츄뭇…… 응츄……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
original = "「ちゅぱっ……ぷはぁ……<emoji=heart04>\u3000でも……カイチョー、真剣に言ってくれたのにゴメンナサイ」"
translation = "「츄파앗…… 푸하아……<emoji=heart04> 하지만…… 회장님, 진지하게 말씀해주셨는데 죄송함다」"

[[dialogue]]
speaker = "リップル"
original = "「実は――今日が危険日だってイウの、ウソなんです……」"
translation = "「사실── 오늘이 위험일이라는 거, 거짓말임다……」"

[[dialogue]]
speaker = "クロト"
original = "「えぇっ！？\u3000冗談だったの！？」"
translation = "「에엣!? 농담이었어!?」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョーに種付けセックスしてもらいたくって、ツイ……」"
translation = "「회장님한테 씨내리기 섹스를 당하고 싶어서 그만……」"

[[dialogue]]
speaker = "リップル"
original = "「あ、でも――」"
translation = "「아, 하지만──」"

[[dialogue]]
speaker = "リップル"
original = "「『孕ませ予約』、しておけるのは本当デスよ……？」"
translation = "「『임신 예약』 해둘 수 있다는 건 진짜임다요……?」"

[[dialogue]]
speaker = "リップル"
original = "「もう少ししたら……ホントーにしちゃいマスか？」"
translation = "「조금 더 있으면…… 정말로 해버릴까요?」"

[[dialogue]]
speaker = "リップル"
original = "「……ワタシは、カイチョーならいつでもＯＫですっ<emoji=heart04>」"
translation = "「……저는 회장님이라면 언제든 OK임다!」"

