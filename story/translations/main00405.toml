[[dialogue]]
speaker = "unk"
original = "第５話,プラネット大作戦,B"
translation = "제5화, 플래닛 대작전, B"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「その特殊コタイ？\u3000ってやつは何が違うんだっけ？」"
translation = "「그 특수 개체? 라는 건 뭐가 다르다는 거였지?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「従来のモンスターとは見た目が明らかに違うそうです。また、強さもこれまで以上だと報告されています」"
translation = "「기존의 몬스터와는 겉모습이 확연히 다르다고 합니다. 또한, 강함도 이전보다 더하다고 보고되었습니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「んで、それが出てきたのが……」"
translation = "「근데, 그게 나온 게……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アポロ──あの女の子が生み出したせい……」"
translation = "「아폴로── 그 여자아이가 만들어낸 탓……」"

[[dialogue]]
speaker = "unk"
original = "アポロの振るった大剣から、それら特殊個体が湧き出ていたのを新星星徒会は思い出す。"
translation = "아폴로가 휘두른 대검에서, 그 특수 개체들이 솟아나오고 있었던 것을 신성 성도회는 떠올린다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「確かにあの時見たモンスターは、これまでの敵より強力だったわね」"
translation = "「확실히 그때 본 몬스터는, 이전의 적보다 강력했었지」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「残党がいるなら、<ruby>ボス<rt>アポロ</rt></ruby>が出てくる前に叩く」"
translation = "「잔당이 있다면, 보스가 나오기 전에 때려잡는다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「モンスターを従える女の子……でありますか！？\u3000末恐ろしいであります……！」"
translation = "「몬스터를 거느리는 여자아이……인 것입니까!? 장래가 두려운 것입니다……!」"

[[dialogue]]
speaker = "unk"
original = "アポロが産み落としていった特殊個体のモンスターは、あれ以来世界の各地で目撃されるようになった。"
translation = "아폴로가 낳고 간 특수 개체의 몬스터는, 그 이후로 세계 각지에서 목격되기 시작했다."

[[dialogue]]
speaker = "unk"
original = "ただしそれらは強力な力を持ちつつも、どこか<ruby>朦朧<rt>もうろう</rt></ruby>としているのが特徴とされていた。"
translation = "다만 그것들은 강력한 힘을 지니고 있으면서도, 어딘가 몽롱한 것이 특징으로 여겨졌다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──あ！\u3000あそこにいます！\u3000ルリエルが見つけました、大手柄です！」"
translation = "「──아! 저기에 있습니다! 루리엘가 발견했습니다, 큰 공로인 것입니다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ほんとだ。へー、見た目はなんかカワイイけど」"
translation = "「정말이네. 헤에, 겉모습은 뭔가 귀엽지만」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「中身はあんまり可愛くないのよねえ～」"
translation = "「속은 별로 귀엽지 않은 거 있지~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──あ、あっちにもいます。こうして見ると……色んなところに点在しているというか……」"
translation = "「──아, 저쪽에도 있습니다. 이렇게 보니…… 여러 곳에 점재하고 있다고 할까……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ま、各個撃破できるならその方がいいかもな」"
translation = "「뭐, 각개 격파할 수 있다면 그 편이 좋을지도」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「では、各星徒会ごとに分かれて駆除していきましょう。少なくとも市国内は掃討した方がよいと思います」"
translation = "「그럼, 각 성도회별로 나뉘어 구제해 나갑시다. 적어도 시국 내는 소탕하는 편이 좋다고 생각합니다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん～……」"
translation = "「음~……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「セーラさん？」"
translation = "「세라 씨?」"

[[dialogue]]
speaker = "unk"
original = "<ruby>顎<rt>おとがい</rt></ruby>に指をあて小考するセーラ。"
translation = "턱에 손가락을 대고 잠시 생각하는 세라."

[[dialogue]]
speaker = "unk"
original = "さっそく出動しようとしていた両星徒会の生徒たちに、彼女は異なる提案をぶつける。"
translation = "당장 출동하려던 양 성도회의 학생들에게, 그녀는 다른 제안을 던진다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「今回は流星新星ミックスでやってみない？\u3000せっかくなんだし、敵もバラバラだしさ」"
translation = "「이번엔 유성 신성 믹스로 해보지 않을래? 모처럼이고, 적도 제각각이고 말이야」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ミックスというと……別け隔てなくチームを組むということでしょうか」"
translation = "「믹스라고 하면…… 차별 없이 팀을 짠다는 것일까요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「は……反対です！\u3000どうしてですかセーラ先輩、私たちじゃダメなんですか」"
translation = "「하…… 반대입니다! 왜 그런가요 세라 선배, 저희로는 안 되는 건가요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ダメってことはないけど～。今後のためになると思わない？」"
translation = "「안 된다는 건 아니지만~. 앞으로를 위해 도움이 된다고 생각하지 않아?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「今後の……？」"
translation = "「앞으로의……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だって、もしもっと強い敵が出てきたら両学園で連携しなくちゃダメっしょ？\u3000<b>姉妹校</b>なんだし」"
translation = "「왜냐면, 만약 더 강한 적이 나온다면 양 학원에서 연계해야 하잖아? <ruby>자매 학교<rt>・・ ・・</rt></ruby>인 거고」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そ──それは、その通りですが……！」"
translation = "「그── 그건, 말씀하신 대로입니다만……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かによい機会と言えます。新たな連携も試せるかと」"
translation = "「확실히 좋은 기회라고 말할 수 있습니다. 새로운 연계도 시도해 볼 수 있을 것입니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あたしも賛成だ。たまには共闘っつーのも、燃えるだろ」"
translation = "「나도 찬성이다. 가끔은 공동 투쟁이라는 것도, 불타오르잖아」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私も……足を引っ張ってしまうかもしれませんが、精一杯頑張ります！」"
translation = "「저도…… 폐를 끼치게 될지도 모르겠지만, 힘껏 노력하겠습니다!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「う、うぅ……」"
translation = "「으, 으윽……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「じゃ、そゆことで♪\u3000各自、流星市国に散らばるモンスター特殊個体を撃破すること」"
translation = "「자, 그런 걸로♪ 각자, 유성 시국에 흩어진 몬스터 특수 개체를 격파할 것」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えいえいおーなのです！」"
translation = "「에이 에이 오ー인 것입니다!」"

