[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「図書館を利用する人と、利用しない人との違いってなんなんでしょうか」"
translation = "「도서관을 이용하는 사람과 이용하지 않는 사람의 차이는 무엇일까요.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「学生時代図書館を利用していなかった側として、ウィステリアさんはどう思いますか？」"
translation = "「학생 시절 도서관을 이용하지 않았던 쪽으로서 위스테리아 씨는 어떻게 생각하시나요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いつもは引っ込み思案なのに、そこで私に振るところに紙屋敷さんの胆力を感じるわ。そういうところ、私は好きよ」"
translation = "「평소엔 낯을 가리면서 그럴 때 나한테 떠넘기는 점에선 카미야시키 씨의 배짱이 느껴지는걸. 그런 점, 난 좋아해.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「え？\u3000はい、ありがとうございます」"
translation = "「네? 네, 감사합니다.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そうねえ……遊びや部活で時間がなかったり、単純に字を読むのがめんどくさいってのが多いんじゃないかしら。実際私もそうだったわ」"
translation = "「글쎄…… 놀이나 동아리 활동으로 시간이 없거나, 단순히 글자를 읽는 게 귀찮은 경우가 많지 않을까. 사실 나도 그랬고.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「紙屋敷さんみたいな、息をするみたいに本を読む人には理解できないでしょうけど」"
translation = "「카미야시키 씨처럼 숨 쉬는 것처럼 책을 읽는 사람은 이해할 수 없겠지만.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ですね。本を読むのはこんなに楽しいのに、めんどくさいなんて言う人がいるのが信じられません」"
translation = "「그렇군요. 책을 읽는 게 이렇게 즐거운데 귀찮다고 말하는 사람이 있다는 게 믿기지 않아요.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「今だって推理小説の続きが読みたくてうずうずしてるくらいですから」"
translation = "「지금도 추리 소설 다음 내용이 읽고 싶어서 몸이 근질거릴 정도니까요.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら、そろそろ犯人がわかるところ？」"
translation = "「어라, 슬슬 범인을 알 수 있는 부분이니?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「探偵事務所に依頼をしに来るはずの依頼人が行方不明になったところですね」"
translation = "「탐정 사무소에 의뢰하러 오기로 한 의뢰인이 행방불명된 부분이에요.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いきなり物騒ね。確かに続きが気になるわ」"
translation = "「갑자기 살벌하네. 확실히 다음 내용이 궁금하겠어.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あと魔族──というか魔界出身者は二極化しやすい印象があるわね」"
translation = "「그리고 마족── 그러니까 마계 출신자는 양극화되기 쉬운 인상이 있어.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「二極化？\u3000よく利用する人と、利用しない人にですか？」"
translation = "「양극화요? 자주 이용하는 사람과 이용하지 않는 사람으로요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そう。魔界って、人間界に比べて文明が進んでいないところが多いから、図書館なんてなかったり、本そのものが貴重な地域もあるの」"
translation = "「맞아. 마계는 인간계에 비해 문명이 발달하지 않은 곳이 많아서 도서관 같은 게 없거나, 책 자체가 귀한 지역도 있거든.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「だから魔界出身者は図書館に馴染みがなかったり、全然本を読まない子もいるのよ。知的好奇心を刺激されて読書に夢中になる子もいるけどね」"
translation = "「그래서 마계 출신자는 도서관이 낯설거나 전혀 책을 읽지 않는 아이들도 있는 거야. 지적 호기심이 자극되어 독서에 빠지는 아이도 있지만 말이야.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「なるほど……魔界の環境について触れた本もありましたけど、私が読んだ以上に差が大きいんですね」"
translation = "「과연…… 마계의 환경에 대해 언급한 책도 있었습니다만, 제가 읽은 것 이상으로 차이가 크군요.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ウィステリアさんも魔界出身だから、本に馴染みがない方だったんですか？」"
translation = "「위스테리아 씨도 마계 출신이라 책이 낯선 편이셨나요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あー……私の場合は、実家に本がたくさんあったんだけどね。それこそ小さな図書館くらいの量が。小さい頃から読まされてたから本には飽き飽きしてたの」"
translation = "「아―…… 내 경우는 본가에 책이 아주 많았거든. 그야말로 작은 도서관 정도의 양이. 어릴 때부터 억지로 읽게 해서 책이라면 진저리가 났었지.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「小さな図書館くらい……！？\u3000しかもウィステリアさんのご実家ということは、魔界の本なんですよね？\u3000どんな本なんでしょう、気になります」"
translation = "「작은 도서관 정도……!? 게다가 위스테리아 씨의 본가라면 마계의 책이겠네요? 어떤 책일지 궁금해요.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ええっと……小難しい学問の本とかよ。そんなに面白いものじゃないわ」"
translation = "「그게…… 고리타분한 학문 서적 같은 거야. 그렇게 재밌는 건 아니란다.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いいえ、面白い本は小説だけではありませんよ。実用書は思考方法を学べますし、専門書の凝縮された情報量はくせになります」"
translation = "「아니요, 재밌는 책은 소설뿐만이 아니에요. 실용서는 사고방식을 배울 수 있고 전문서의 응축된 정보량은 중독성이 있죠.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「だからウィステリアさんのご実家の本も読んでみたいです！」"
translation = "「그러니까 위스테리아 씨의 본가 책들도 읽어보고 싶어요!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そ、そう……さすが紙屋敷さんね」"
translation = "「그, 그래…… 역시 카미야시키 씨답네.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（うちのは読んだら呪われる本なんだけど……黙っておきましょう）"
translation = "(우리 집 책은 읽으면 저주받는 책이지만…… 입다물고 있자)"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「まぁ、実家で蔵書を扱ってた経験もあって司書になれたのよ。数少ない実家に感謝できる点かしら」"
translation = "「뭐, 본가에서 장서를 다뤘던 경험 덕분에 사서가 될 수 있었던 거지. 몇 안 되는 본가에 감사할 수 있는 점일까나.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「さて、本を読まない人の意見が出たところで、読む人の意見も欲しいわね」"
translation = "「자, 책을 읽지 않는 사람의 의견이 나왔으니 읽는 사람의 의견도 필요하겠네.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい！\u3000本の魅力はですね、まず紙とインクが混ざった匂いを肺いっぱいに吸い込んで──」"
translation = "「네! 책의 매력은 말이죠, 우선 종이와 잉크가 섞인 냄새를 폐 가득 들이마시고──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「紙屋敷さんはレベルが高すぎて参考になりそうにないから、誰か別の人にしましょ」"
translation = "「카미야시키 씨는 레벨이 너무 높아서 참고가 안 될 것 같으니 다른 사람으로 하자.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「うぅ、ウィステリアさん手厳しいです……。ちなみに私のマイブームは竹波書店の文庫本の匂いです」"
translation = "「으으, 위스테리아 씨 너무해요……. 참고로 제가 요즘 빠져있는 건 타케나미 서점 문고본의 냄새입니다.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「上級者すぎて返しに困るわ。誰か話を聞けそうな人は──」"
translation = "「상급자라 대꾸하기 곤란하네. 누구 이야기를 들을 만한 사람은──」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「むむ……むむむむ……」"
translation = "「음…… 으음으음……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「隆々とした筋肉。惜しげもなく披露される肉体美」"
translation = "「울퉁불퉁한 근육. 아낌없이 선보여지는 육체미.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そして股間の──」"
translation = "「그리고 가랑이 사이의──」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「イクシーさん」"
translation = "「익실 씨.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ひゃいっ！？」"
translation = "「힉!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「すみません、独り言が声に出ていましたよ。図書館ですのでご協力お願いします」"
translation = "「죄송합니다, 혼잣말이 밖으로 나오고 있어요. 도서관이니 협조 부탁드립니다.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ……申し訳ありません。つい……」"
translation = "「아…… 죄송합니다. 저도 모르게…….」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そんなに夢中になって、何の本を読まれてたんですか？」"
translation = "「그렇게 열중해서 무슨 책을 읽고 계셨나요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え、えーと……」"
translation = "「에, 그게……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「なるほど、ギリシャ彫刻の本ですね。長い時を経ても色褪せない芸術には目を奪われます。美術、お好きなんですか？」"
translation = "「과연, 그리스 조각 책이군요. 오랜 시간이 흘러도 퇴색되지 않는 예술에는 눈을 떼지 못하죠. 미술을 좋아하시나요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そ、そうなんです。古代の人間界の美術は興味深いですね」"
translation = "「그, 그렇습니다. 고대 인간계의 미술은 흥미롭네요.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でしたらイクシーさんにおすすめの本がありますよ。クラシック期の彫刻について、とても詳しく解説されているんです」"
translation = "「그렇다면 익실 씨에게 추천하고 싶은 책이 있어요. 클래식기 조각에 대해 아주 자세히 해설되어 있거든요.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「！\u3000大変気になります」"
translation = "「! 무척 흥미롭군요.」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あと、図書館によく来られているイクシーさんにお願いがありまして……少しお時間いいでしょうか？」"
translation = "「그리고 도서관에 자주 오시는 익실 씨에게 부탁이 있는데…… 잠시 시간 괜찮으실까요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「もちろんです。このイクシリオン、お役に立てるなら喜んで協力させていただきますっ」"
translation = "「물론입니다. 이 익실리온, 도움이 된다면 기쁘게 협력하겠습니다.」"

