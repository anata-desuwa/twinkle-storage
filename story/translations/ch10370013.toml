[[dialogue]]
speaker = "unk"
original = "第３話,ふわふわフードジーニアス,P"
translation = "제3화, 폭신폭신 푸드 지니어스, P"

[[dialogue]]
speaker = "unk"
original = "とある休日、街へ出かけていると、オープンカフェに座っている珍しい２人組を見かけた。"
translation = "어느 휴일, 거리에 나갔다가 오픈 카페에 앉아 있는 보기 드문 2인조를 발견했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「さすがサランね。ここのズコットケーキ、凄く美味しいわ！」"
translation = "「역시 사란이네. 여기 주코토 케이크, 정말 맛있어!」"

[[dialogue]]
speaker = "サラン"
original = "「でしょ～？\u3000ヴィーちゃん、きっと好きだろうな～って思って。最近見つけた中で１番のおすすめスイーツなんだ～」"
translation = "「그치~? 비짱, 분명 좋아할 거라고 생각해서. 최근에 찾은 것 중에서 제일 추천하는 디저트야~」"

[[dialogue]]
speaker = "unk"
original = "珍しい組み合わせだな"
translation = "특이한 조합이네"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら、クロトじゃない。１人で買い物に来たの？」"
translation = "「어라, 쿠로토잖아. 혼자 쇼핑하러 온 거야?」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんだ～。やっほ～♪\u3000会長ちゃんも、一緒にスイーツ食べる～？」"
translation = "「회장짱이다~. 야호~♪ 회장짱도 같이 디저트 먹을래~?」"

[[dialogue]]
speaker = "unk"
original = "まさか２人が仲良いだなんて知らなかったよ"
translation = "설마 둘이 사이가 좋을 줄은 몰랐어"

[[dialogue]]
speaker = "サラン"
original = "「サランとヴィ―ちゃんはね、学園に入学する前からの友達なんだよ～」"
translation = "「사란이랑 비짱은 말이야, 학원에 입학하기 전부터 친구였어~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「九浄も桜十路も流星市国の『五名門』だから。家同士の繋がりがあるのよ」"
translation = "「쿠죠도 사쿠라코지도 유성시국의 『오명문』이니까. 집안끼리의 교류가 있어」"

[[dialogue]]
speaker = "unk"
original = "五名門？"
translation = "오명문?"

[[dialogue]]
speaker = "サラン"
original = "「流星市国には『五名門』っていう５つの大きな家があってね、サランの桜十路家や、ヴィーちゃんの九浄家がその１つなんだよ～」"
translation = "「유성시국에는 『오명문』이라는 다섯 개의 커다란 가문이 있는데, 사란의 사쿠라코지 가문이나 비짱의 쿠죠 가문이 그중 하나야~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「各家には流星市国内における重要な役割があるわ。九浄家は『人材』――」"
translation = "「각 가문에는 유성시국 내에서의 중요한 역할이 있어. 쿠죠 가문은 『인재』――」"

[[dialogue]]
speaker = "サラン"
original = "「桜十路家は、『食品』の分野で色々経営しているんだよ～♪」"
translation = "「사쿠라코지 가문은 『식품』 분야에서 여러 가지를 경영하고 있어~♪」"

[[dialogue]]
speaker = "unk"
original = "そこまで話していると、パティシエの格好をした男性がケーキを持ってやって来る。"
translation = "거기까지 이야기하고 있자, 파티시에 복장을 한 남성이 케이크를 들고 다가온다."

[[dialogue]]
speaker = "カフェの店長"
original = "「サランお嬢様、ようこそいらっしゃいました」"
translation = "「사란 아가씨, 어서 오십시오」"

[[dialogue]]
speaker = "サラン"
original = "「店長さん、こんにちは～。今日は友達とズコットケーキを食べに来ました～」"
translation = "「점장님, 안녕하세요~. 오늘은 친구랑 주코토 케이크를 먹으러 왔어요~」"

[[dialogue]]
speaker = "unk"
original = "お嬢様？"
translation = "아가씨?"

[[dialogue]]
speaker = "サラン"
original = "「えっとね、ここの店長さんは前に桜十路系列の洋菓子店で働いてたことがあって～。独立して、ここのお店を開く時に、桜十路が一部出資したの～」"
translation = "「그게 말이야, 여기 점장님은 예전에 사쿠라코지 계열의 양과자점에서 일한 적이 있어서~. 독립해서 이 가게를 차릴 때, 사쿠라코지에서 일부 출자했어~」"

[[dialogue]]
speaker = "カフェの店長"
original = "「左様でございます。しかし、それを抜きにしても、お嬢様のことはいちパティシエとして深く尊敬しております」"
translation = "「그렇습니다. 하지만 그것을 제외하더라도, 아가씨를 한 명의 파티시에로서 깊이 존경하고 있습니다」"

[[dialogue]]
speaker = "サラン"
original = "「ところで店長さん、その凄く美味しそうなズコットケーキは何ですか～？\u3000サラン、このお店のケーキは全部食べたけど、見たことないような～？」"
translation = "「그런데 점장님, 그 정말 맛있어 보이는 주코토 케이크는 뭔가요~? 사란, 이 가게 케이크는 전부 먹어봤는데, 본 적 없는 것 같아서~」"

[[dialogue]]
speaker = "カフェの店長"
original = "「一目で見抜くとは流石です。実は今度新しくメニューに加えようと思っている新作のケーキでして」"
translation = "「한눈에 알아보시다니 역시 대단하십니다. 사실 이번에 새로 메뉴에 추가하려고 생각 중인 신작 케이크입니다」"

[[dialogue]]
speaker = "カフェの店長"
original = "「サランお嬢様がいらっしゃっているとスタッフから聞いて、是非試食して頂ければと思いまして。もちろん、お代は要りません！」"
translation = "「사란 아가씨께서 오셨다는 말을 스태프에게 듣고, 부디 시식해 주셨으면 해서요. 물론, 값은 받지 않겠습니다!」"

[[dialogue]]
speaker = "サラン"
original = "「えっ、食べていいんですか～？\u3000やった～♪」"
translation = "「엣, 먹어도 되나요~? 앗싸~♪」"

[[dialogue]]
speaker = "サラン"
original = "「それじゃあ、いただきま～す♪\u3000あむっ……もぐもぐ……んんっ！？」"
translation = "「그럼, 잘 먹겠습니다~♪ 냠…… 우물우물…… 으음!?」"

[[dialogue]]
speaker = "サラン"
original = "「ふわ～、美味しい～！\u3000店長さん、これ凄く美味しいです～♪\u3000ふわふわする～♪」"
translation = "「후와~, 맛있어~! 점장님, 이거 정말 맛있어요~♪ 둥실둥실해~♪」"

[[dialogue]]
speaker = "カフェの店長"
original = "「本当ですか！？\u3000ありがとうございます！」"
translation = "「정말입니까!? 감사합니다!」"

[[dialogue]]
speaker = "サラン"
original = "「見た目も、とっても可愛いし～♪\u3000女の子中心にＳＮＳとかで広がって、大人気メニューになるかも～♪」"
translation = "「겉모양도 너무 귀엽고~♪ 여자애들 중심으로 SNS 같은 데서 퍼져서, 대인기 메뉴가 될지도~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サランが言うなら、これはもう間違いないわね」"
translation = "「사란이 말한다면 이건 이제 틀림없겠네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サランは凄いのよ。小さい時からサランが味を認めた料理や新商品は必ず大成功を収めているの！」"
translation = "「사란은 대단하다구. 어릴 때부터 사란이 맛을 인정한 요리나 신상품은 반드시 대성공을 거두었으니까!」"

[[dialogue]]
speaker = "unk"
original = "この前のケーキも凄く美味しかった"
translation = "요전번 케이크도 정말 맛있었어"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう、サランはお菓子作りの腕も含めて『甘味の天才』と呼ばれている、有名な美食家なのよ！」"
translation = "「그래, 사란은 과자 만드는 솜씨를 포함해서 『단맛의 천재』라고 불리는 유명한 미식가야!」"

[[dialogue]]
speaker = "サラン"
original = "「いえ～い♪\u3000会長ちゃんも新作ケーキ食べて、サランと一緒にふわふわしよ～♪」"
translation = "「이예~이♪ 회장짱도 신작 케이크 먹고, 사란이랑 같이 둥실둥실하자~♪」"

[[dialogue]]
speaker = "サラン"
original = "「そうだ～、サランがフォークで食べさせたげる～♪\u3000ほら、あ～ん♪」"
translation = "「맞다~, 사란이 포크로 먹여줄게~♪ 자, 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "って、サランまた酔っ払ってる！？"
translation = "어라, 사란 또 취했어!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サランの『美食酔い』ね。本当に美味しいものを食べると、サランは気分がふわふわと高揚して、酔っ払ったみたいになってしまうのよ！」"
translation = "「사란의 『미식 취기』야. 정말 맛있는 걸 먹으면 사란은 기분이 둥실둥실하게 고양되어서, 취한 것처럼 되어버리거든!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫なのか、その特異体質……！？"
translation = "괜찮은 거야, 그 특이체질……!?"

[[dialogue]]
speaker = "unk"
original = "普通に解説してるけど！"
translation = "평범하게 해설하고 있지만!"

[[dialogue]]
speaker = "カフェの店長"
original = "「おお……！\u3000まさか、ふわ神様まで降臨なされるとは、ありがたや……！」"
translation = "「오오……! 설마, 후와 신령님까지 강림하실 줄이야, 감사해라……!」"

[[dialogue]]
speaker = "unk"
original = "ふわ神様って何！？"
translation = "후와 신령님이 뭐야!?"

[[dialogue]]
speaker = "サラン"
original = "「ねぇってば～、会長ちゃ～ん、フォークのケーキ食べて～。あ～んして、あ～ん♪」"
translation = "「있잖아~, 회장짱~, 포크로 케이크 먹어줘~. 아~ 해봐, 아~♪」"

[[dialogue]]
speaker = "サラン"
original = "「あ～、ひょっとして、あ～んされるの恥ずかしがってる？\u3000会長ちゃん、可愛い～♪」"
translation = "「아~, 혹시 아~ 받는 거 부끄러워해? 회장짱, 귀여워~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……クロト、随分とサランに懐かれてるのね」"
translation = "「……쿠로토, 사샤한테 꽤나 정이 들었나 보네」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスなんか怒ってない！？"
translation = "비너스 왠지 화난 거 아냐!?"

[[dialogue]]
speaker = "unk"
original = "――後日、サランが褒めた新作ケーキは本当にＳＮＳで話題となり、お店は大繁盛するのだった。"
translation = "――며칠 뒤, 사란이 칭찬한 신작 케이크는 정말로 SNS에서 화제가 되었고, 가게는 대번창하게 되었다."

