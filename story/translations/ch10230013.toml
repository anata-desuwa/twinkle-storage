[[dialogue]]
speaker = "unk"
original = "第３話,ボランティア活動,P"
translation = "제3화, 자원봉사 활동, P"

[[dialogue]]
speaker = "シャロン"
original = "「今日は子ども会ボランティアへのご参加ありがとうございます！\u3000よろしくお願いします！」"
translation = "「오늘은 어린이회 자원봉사에 참가해 주셔서 감사합니다! 잘 부탁드립니다!」"

[[dialogue]]
speaker = "蛍火"
original = "「……よろしくお願いいたします」"
translation = "「……잘 부탁드립니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「よろしくお願いします。会長さんも私と同じく初参加でしたね」"
translation = "「잘 부탁드립니다. 회장님도 저와 마찬가지로 첫 참가였죠」"

[[dialogue]]
speaker = "シャロン"
original = "「では私たちの活動について改めて説明をいたしましょう」"
translation = "「그럼 저희 활동에 대해 다시 한번 설명을 드릴게요」"

[[dialogue]]
speaker = "シャロン"
original = "「私がお世話になっている修道院では、流星市国内の子ども会のお手伝いをさせていただいております」"
translation = "「제가 신세를 지고 있는 수도원에서는 유성 시국 내의 어린이회를 돕고 있습니다」"

[[dialogue]]
speaker = "シャロン"
original = "「本日のお食事会もその一環で、蛍火さまには今までも何度かお力をお借りしているのです。いつもありがとうございます！」"
translation = "「오늘 식사 모임도 그 일환으로, 호타루비 님께는 지금까지도 몇 번이나 도움을 받았답니다. 항상 감사합니다!」"

[[dialogue]]
speaker = "シャロン"
original = "「そして今日はイレーナさまにもご協力いただけることになりました。まさか聖女様にご参加いただけるなんて感激です！」"
translation = "「그리고 오늘은 이레나 님께서도 협력해 주시게 되었습니다. 설마 성녀님께서 참가해 주시다니 감격이에요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「いえいえ、聖女と謳われようと私はいち神官に過ぎませんから。力になれるのなら光栄です」"
translation = "「아니요 아니요, 성녀라고 칭송받더라도 저는 일개 신관에 불과하니까요. 도움이 될 수 있다면 영광입니다」"

[[dialogue]]
speaker = "シャロン"
original = "「今回はカフェテリアのスペースをお貸しいただけたので、いつもより賑やかになりそうですね」"
translation = "「이번에는 카페테리아 공간을 빌릴 수 있어서 평소보다 북적거릴 것 같네요」"

[[dialogue]]
speaker = "蛍火"
original = "「ですがすみません。昨日の営業が盛況で、カフェテリアの食材が切れているようです」"
translation = "「하지만 죄송합니다. 어제 영업이 성황이라 카페테리아 식재료가 떨어진 모양이에요」"

[[dialogue]]
speaker = "シャロン"
original = "「では、手分けしていきましょう。私と会長さまは買い出しを。蛍火さまとイレーナさまはお子様たちの遊び相手や勉強をお願いします！」"
translation = "「그럼 역할을 나눕시다. 저와 회장님은 장을 보러 가죠. 호타루비 님과 이레나 님은 아이들의 놀이 상대나 공부를 부탁드립니다!」"

[[dialogue]]
speaker = "蛍火"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "シャロン"
original = "「ニンジン、玉ねぎ、ジャガイモ、お肉……うん、ちゃんとありますね。荷物を持っていただいてありがとうございます、会長さま」"
translation = "「당근, 양파, 감자, 고기…… 응, 제대로 있네요. 짐을 들어주셔서 감사합니다, 회장님」"

[[dialogue]]
speaker = "シャロン"
original = "「さすが殿方、頼もしいです。今日はたくさん子どもたちが来られるので、材料もたくさん必要なのですよ」"
translation = "「역시 남성분이라 든든하네요. 오늘은 많은 아이들이 올 테니까 재료도 많이 필요하거든요」"

[[dialogue]]
speaker = "unk"
original = "でもあっちは大丈夫かな"
translation = "하지만 저쪽은 괜찮을까"

[[dialogue]]
speaker = "シャロン"
original = "「蛍火さまのことですか？\u3000大丈夫ですよ、カフェテリアの場所を提供するようお話を通してくださったのが彼女ですから。きっと子ども好きに違いありません！」"
translation = "「호타루비 님 말씀인가요? 괜찮아요, 카페테리아 장소를 제공하도록 이야기를 맞춰주신 게 그녀니까요. 분명 아이들을 좋아하는 게 틀림없어요!」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまも母国ではボランティアの経験が豊富と聞きましたので、大丈夫だと思います！」"
translation = "「이레나 님도 고국에서 자원봉사 경험이 풍부하다고 들었으니 괜찮을 거라 생각합니다!」"

[[dialogue]]
speaker = "unk"
original = "（ちょっと心配だなー……）"
translation = "(조금 걱정되는데……)"

[[dialogue]]
speaker = "シャロン"
original = "「地域の子どもやご家族の交流になればと始まった会でしたが、今では評判が広がって、たくさんの子どもたちに来ていただけるようになりました」"
translation = "「지역 아이들과 가족들의 교류가 되었으면 해서 시작한 모임이었지만, 지금은 평판이 퍼져서 많은 아이들이 찾아오게 되었답니다」"

[[dialogue]]
speaker = "シャロン"
original = "「参加する子どもたちはいつも楽しそうで、生きるには食べ物の栄養だけでなく心の栄養も必要なのだと、子どもたちには気付かされます」"
translation = "「참가하는 아이들은 항상 즐거워 보여서, 살아가기 위해서는 음식의 영양뿐만 아니라 마음의 영양도 필요하다는 것을 아이들을 통해 깨닫게 돼요」"

[[dialogue]]
speaker = "シャロン"
original = "「子どもたちが笑顔になってくれてとても嬉しいです！\u3000やりがいがあります！」"
translation = "「아이들이 웃어줘서 정말 기뻐요! 보람이 있습니다!」"

[[dialogue]]
speaker = "シャロン"
original = "「では一刻も早く学園に戻り――」"
translation = "「그럼 한시라도 빨리 학원으로 돌아가──」"

[[dialogue]]
speaker = "シャロン"
original = "「！\u3000モンスター……行きましょう、会長さま」"
translation = "「! 몬스터…… 가요, 회장님」"

[[dialogue]]
speaker = "シャロン"
original = "「みなさん、お怪我はありませんか？\u3000落ち着いて避難してください！」"
translation = "「여러분, 다친 곳은 없나요? 침착하게 대피하세요!」"

[[dialogue]]
speaker = "女の子"
original = "「お姉ちゃん、助けてー！」"
translation = "「언니, 도와줘요!」"

[[dialogue]]
speaker = "シャロン"
original = "「！？\u3000モンスターが子どもに──」"
translation = "「!? 몬스터가 아이를──」"

[[dialogue]]
speaker = "シャロン"
original = "「セラフィックレイン！」"
translation = "「세라픽 레인!」"

[[dialogue]]
speaker = "unk"
original = "お見事！"
translation = "훌륭해!"

[[dialogue]]
speaker = "シャロン"
original = "「ふぅ、これで大丈夫ですね……あ──」"
translation = "「후우, 이제 괜찮네요…… 아──」"

[[dialogue]]
speaker = "unk"
original = "ふらついて倒れるシャロンを、咄嗟に受け止める。"
translation = "휘청거리며 쓰러지는 샤론을 순간적으로 받아낸다."

[[dialogue]]
speaker = "シャロン"
original = "「ありがとうございます……会長さまはお優しいですね……」"
translation = "「감사합니다…… 회장님은 상냥하시네요……」"

[[dialogue]]
speaker = "シャロン"
original = "「実は私、もともと貧血気味でして……普段は支障はないのですが、星力を使い過ぎると倒れてしまうのです」"
translation = "「사실 저, 원래 빈혈 기운이 있어서요…… 평소에는 지장이 없지만, 성력을 너무 많이 쓰면 쓰러지곤 한답니다」"

[[dialogue]]
speaker = "シャロン"
original = "「ですがシスターとして、星騎士として、見過ごすわけにはいきません……」"
translation = "「하지만 시스터로서, 성기사로서, 간과할 수는 없으니까요……」"

[[dialogue]]
speaker = "unk"
original = "どうしてシャロンはシスターに？"
translation = "샤론은 어째서 시스터가 된 거야?"

[[dialogue]]
speaker = "シャロン"
original = "「そうですね……天使は元から人より神に近い存在ですから、天界生まれのシスターはいささか珍しいかもしれません」"
translation = "「그렇네요…… 천사는 원래 인간보다 신에 가까운 존재니까, 천계 태생 시스터는 다소 드물지도 모르겠네요」"

[[dialogue]]
speaker = "シャロン"
original = "「幼い頃、まだ天界にいた時のことです。私は原因不明の病に侵され、生死の境をさまよっていました」"
translation = "「어릴 적, 아직 천계에 있었을 때의 일입니다. 저는 원인 불명의 병에 걸려 생사의 갈림길을 헤매고 있었어요」"

[[dialogue]]
speaker = "シャロン"
original = "「高熱にうなされ、全身の痛みに呻きながら、朦朧とした意識で私はもう死ぬのだと思いました」"
translation = "「고열에 시달리며 전신의 통증에 신음하면서, 몽롱한 의식 속에서 저는 이제 죽는구나 생각했죠」"

[[dialogue]]
speaker = "シャロン"
original = "「ですが私は病に伏せながら、縋る気持ちで女神様に祈りました。『助けてください、死にたくありません』――と」"
translation = "「하지만 저는 병상에 누워 매달리는 심정으로 여신님께 기도했습니다. 『살려주세요, 죽고 싶지 않아요』──라고요」"

[[dialogue]]
speaker = "シャロン"
original = "「もちろん病に倒れるまで女神様を信じていなかったわけではありません。ですがあれほど真摯に祈ったのもあの時が初めてでしょう」"
translation = "「물론 병에 걸리기 전까지 여신님을 믿지 않았던 건 아닙니다. 하지만 그토록 진지하게 기도했던 건 그때가 처음이었을 거예요」"

[[dialogue]]
speaker = "シャロン"
original = "「程なくして、病は原因不明のまま快方に向かい、私は一命をとりとめました。きっと女神様が祈りを聞き届けて、私を救ってくださったのだと思います」"
translation = "「얼마 지나지 않아 병은 원인 불명인 채로 차도가 생겼고, 저는 목숨을 건졌습니다. 분명 여신님께서 기도를 들어주시고 저를 구해주신 거라 생각해요」"

[[dialogue]]
speaker = "シャロン"
original = "「そして私は女神様に救われたご恩に報いるために、神に仕えるシスターとなりました」"
translation = "「그리고 저는 여신님께 구원받은 은혜에 보답하기 위해 신을 섬기는 시스터가 되었습니다」"

[[dialogue]]
speaker = "シャロン"
original = "「貧血気味になったのも病気をしてからです。ですがこの体質も、神の恩寵を忘れぬためのものと思っております」"
translation = "「빈혈 기운이 생긴 것도 병을 앓고 난 뒤부터예요. 하지만 이 체질도 신의 은총을 잊지 않기 위한 것이라 생각하고 있습니다」"

[[dialogue]]
speaker = "女の子"
original = "「お姉ちゃん……ごめんなさい、わたしのせいで……」"
translation = "「언니…… 미안해요, 나 때문에……」"

[[dialogue]]
speaker = "シャロン"
original = "「いいえ、気にしないでください。ちょっと休めば良くなりますから」"
translation = "「아니요, 신경 쓰지 마세요. 잠깐 쉬면 나아질 테니까요」"

[[dialogue]]
speaker = "シャロン"
original = "「それより……もしかして、これから子ども会にいくところですか？」"
translation = "「그보다…… 혹시 지금 어린이회에 가려던 참인가요?」"

[[dialogue]]
speaker = "女の子"
original = "「え？\u3000うん、そうだけど……」"
translation = "「에? 응, 그렇긴 한데……」"

[[dialogue]]
speaker = "シャロン"
original = "「ならちょうど良かったです。今買い出しに行ってたところなんですよ」"
translation = "「그럼 잘됐네요. 지금 장을 보고 오던 길이었거든요」"

[[dialogue]]
speaker = "シャロン"
original = "「美味しいお料理たくさん作りますから、楽しみにしていてください！」"
translation = "「맛있는 요리 많이 만들어 줄 테니까 기대하고 있으세요!」"

[[dialogue]]
speaker = "女の子"
original = "「……うん！」"
translation = "「……응!」"

[[dialogue]]
speaker = "シャロン"
original = "「良いお返事です。ふふふ、腕の振るいがいがありますね！」"
translation = "「대답 잘하네요. 후후후, 솜씨 발휘할 보람이 있겠어요!」"

