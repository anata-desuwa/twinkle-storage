[[dialogue]]
speaker = "unk"
original = "ある日、俺が星徒会室で仕事をしていると、勢いよく扉を開けてやって来たのは――"
translation = "어느 날, 내가 성도회실에서 일을 하고 있자 기운차게 문을 열고 나타난 것은──"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さ～ん！\u3000ごきげんようなのです♪」"
translation = "「회장님~! 평안하신가요♪」"

[[dialogue]]
speaker = "unk"
original = "ルリエル、今日は一体どうしたんだ？"
translation = "루리엘, 오늘은 무슨 일이야?"

[[dialogue]]
speaker = "unk"
original = "ルリエルに続いて、用事があるので遅れて来ると言っていたマトイも現れる。"
translation = "루리엘의 뒤를 이어 볼일이 있어 늦게 오겠다던 마토이도 나타난다."

[[dialogue]]
speaker = "マトイ"
original = "「お疲れ様、会長。実は、ヘレナさんが私とルリエルちゃんに新しい人工戦闘服を作ってくれたんだ」"
translation = "「수고했어, 회장. 사실 헬레나 씨가 나랑 루리엘짱에게 새로운 인공 전투복을 만들어 주셨거든.」"

[[dialogue]]
speaker = "ルリエル"
original = "「それをさっき受け取って来たので、会長さんに披露しに来たのですよ♪」"
translation = "「그걸 아까 받아왔기에 회장님께 선보이러 온 거예요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「行きますよ～。いざ、フォームチェンジなのです！」"
translation = "「갑니다~. 자, 폼 체인지인 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「じゃ～ん♪\u3000これがわたしたちの新しい戦闘服、『巫女フォーム』なのですよ～！」"
translation = "「짠♪ 이것이 저희의 새로운 전투복, 『무녀 폼』인 거예요~!」"

[[dialogue]]
speaker = "マトイ"
original = "「ど、どうかな、会長？」"
translation = "「어, 어때, 회장?」"

[[dialogue]]
speaker = "unk"
original = "かわいい！！"
translation = "귀여워!!"

[[dialogue]]
speaker = "unk"
original = "２人共すごく似合ってるよ！"
translation = "둘 다 정말 잘 어울려!"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへぇ♪\u3000会長さんに褒められると嬉しくなっちゃいます♪」"
translation = "「에헤헤♪ 회장님께 칭찬받으니 기뻐져 버려요♪」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、ありがと……えへへ」"
translation = "「고, 고마워…… 에헤헤.」"

[[dialogue]]
speaker = "マトイ"
original = "「ただ……この巫女フォームなんだけど、これまでとはまた違う特殊な力を扱う戦闘服らしいんだよね」"
translation = "「다만…… 이 무녀 폼 말인데, 지금까지와는 또 다른 특수한 힘을 다루는 전투복인 것 같아.」"

[[dialogue]]
speaker = "マトイ"
original = "「普通の星力から性質を変化させた『巫女の力』っていうもので戦うらしくて、それは訓練しないと、上手く使えないみたい」"
translation = "「평범한 성력에서 성질을 변화시킨 『무녀의 힘』이라는 것으로 싸운다고 하는데, 그건 훈련하지 않으면 제대로 쓸 수 없는 모양이야.」"

[[dialogue]]
speaker = "ルリエル"
original = "「なので、ヘレナさんから修業先を教えてもらったのです！」"
translation = "「그래서 헬레나 씨에게 수행처를 전수받은 거예요!」"

[[dialogue]]
speaker = "unk"
original = "マトイが明日から数日間、新星星徒会の業務を離れる話は、ヘレナちゃんと通じて事前に聞いていた。"
translation = "마토이가 내일부터 며칠간 신성학생회 업무를 비운다는 이야기는 헬레나짱을 통해 사전에 들었다."

[[dialogue]]
speaker = "unk"
original = "『星力から性質を変化させた巫女の力』というものへの興味は尽きないが、今回の俺はお留守番ということになる。"
translation = "『성력에서 성질을 변화시킨 무녀의 힘』이라는 것에 대한 흥미는 끝이 없지만, 이번에 나는 집을 지키게 되었다."

[[dialogue]]
speaker = "マトイ"
original = "「それで、修業を見てくれるっていう星騎士の子と、ここで会う約束をしてるんだけど……」"
translation = "「그래서 수행을 봐주기로 한 성기사 아이와 여기서 만나기로 약속했는데……」"

[[dialogue]]
speaker = "？？？"
original = "「ごめんやす～」"
translation = "「실례합니데이~」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、ちょうど来たみたいなのです！」"
translation = "「앗, 마침 온 모양인 거예요!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「お初にお目にかかります～。九浄ヘレナはんに呼ばれて来た者どす<emoji=heart04>」"
translation = "「처음 뵙겠습니데이~. 쿠죠 헬레나 님께 불려 온 사람이라예<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "星徒会室の扉が開き、中に入って来たのは、俺がまだ１度も顔を合わせたことのない女生徒だった。"
translation = "성도회실 문이 열리고 안으로 들어온 것은 내가 아직 한 번도 마주친 적 없는 여학생이었다."

[[dialogue]]
speaker = "ミヤハル"
original = "「うち、流星学園２年生の<ruby>安倍野<rt>あべの</rt></ruby>ミヤハルと申します<emoji=heart04>」"
translation = "「내, 유성학원 2학년 아베노 미야하르라고 합니데이<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ミヤハル先輩、ごきげんようなのです！」"
translation = "「미야하르 선배, 평안하신가요!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あら～、ルリエルはん、ごきげんようどす<emoji=heart04>\u3000巫女の戦闘服、よう似合っとるねぇ～。可愛いらしいわぁ<emoji=heart04>」"
translation = "「어머~ 루리엘 한, 평안하십니껴<emoji=heart04> 무녀 전투복, 참말로 잘 어울린데이~. 귀엽구마<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「それに、新星星徒会の詠野マトイはんも、トマルはんによう似て、べっぴんさんやねぇ。よろしゅうなぁ<emoji=heart04>」"
translation = "「거기다 신성학생회의 에이노 마토이 한도 토마루 한을 꼭 닮아서 참말로 미인이네예. 잘 부탁한데이<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「はい。姉の私も、これからお世話になります。よろしくお願いします」"
translation = "「네. 언니인 저도 앞으로 신세 지겠습니다. 잘 부탁드려요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、ミヤハルさんはすごいんですよ！」"
translation = "「회장님, 미야하르 씨는 대단하다고요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「なんと、日本で有名なあの伝説の陰陽師、『<ruby>安倍晴明<rt>あべのせいめい</rt></ruby>』さんのご子孫なのです！」"
translation = "「무려 일본에서 유명한 그 전설의 음양사, 『아베노 세이메이』 님의 후손인 거예요!」"

[[dialogue]]
speaker = "unk"
original = "安倍晴明といえば、今から１１００年前の時代に当時の京都で活躍していたことで有名な星騎士である。"
translation = "아베노 세이메이라 하면 지금으로부터 1100년 전 시대에 당시의 교토에서 활약했던 것으로 유명한 성기사다."

[[dialogue]]
speaker = "ミヤハル"
original = "「実はそうなんよ～。あとはそうやねぇ、会長はんにはもう１つの肩書きを説明しておくと――」"
translation = "「실은 그렇습니데이~. 그리고 그렇네예, 회장 한에게는 또 하나의 직함을 설명해 두자면──」"

[[dialogue]]
speaker = "ミヤハル"
original = "「安倍晴明はんって、実は『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』だったんよ」"
translation = "「아베노 세이메이 한은 사실 『선성자』였던 기라.」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000それじゃあ、まさか……！？"
translation = "엣!? 그럼 설마……!?"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>\u3000そう――」"
translation = "「후후<emoji=heart04> 맞다──」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちは、それを受け継ぐ選星者の１人『陰陽師』なんよ<emoji=heart04>」"
translation = "「내는 그걸 이어받은 선성자 중 한 명인 『음양사』인 기라<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そういうわけで、はんなりとよろしゅうなぁ<emoji=heart04>」"
translation = "「그런 고로 사뿐하게 잘 부탁한데이~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "現代の陰陽師は、そう言って、にこっと雅な笑みを浮かべてみせるのだった――"
translation = "현대의 음양사는 그렇게 말하며 생긋 우아한 미소를 지어 보였다──"

