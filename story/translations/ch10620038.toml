[[dialogue]]
speaker = "unk"
original = "ジュエリーの『未来予想手帳』を見せてもらってから、しばらく経ったある日のこと。"
translation = "주얼리의 『미래 예상 수첩』을 보여준 뒤로 얼마간 시간이 흐른 어느 날의 일."

[[dialogue]]
speaker = "ジュエリー"
original = "「助手。実はね、キミに相談したいことがあったんだ……」"
translation = "「조수. 사실은 말이야, 너에게 상담하고 싶은 게 있었어……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いずれ私たちは結婚するだろう？\u3000そうすれば必然、我が子を授かるわけだ」"
translation = "「조만간 우리는 결혼하겠지? 그렇게 되면 필연적으로 아이를 갖게 될 거야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だが、妊娠したらその間、エッチができなくなってしまう。どうにも悩ましい問題だ……」"
translation = "「하지만 임신하면 그동안 섹스를 할 수 없게 되어버려. 아무래도 고민스러운 문제야……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「もし妊娠中にキミのことが欲しくなってしまったら、どうすればいいだろう？」"
translation = "「만약 임신 중에 네가 갖고 싶어지면 어떻게 하면 좋을까?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それにキミが私を欲したとしても応えることができないなんて……こんなに辛いことはない」"
translation = "「게다가 네가 나를 원한다 해도 응해줄 수 없다니…… 이보다 괴로운 일은 없어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そこで私は考えたんだ。愛する我が助手……私の<b>お尻</b>を開発してもらえないだろうか？」"
translation = "「그래서 내가 생각해 봤어. 사랑하는 나의 조수…… 내 <b>뒷보지</b>를 개발해 주지 않겠니?」"

[[dialogue]]
speaker = "クロト"
original = "「えっ、お尻……！？」"
translation = "「엣, 뒷보지……!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そう……『アナル』だ。今のうちにそちらでも愛し合えるようにしておけば、妊娠中でもキミを満足させることができると思うんだ」"
translation = "「그래…… 『애널』이야. 지금 미리 그쪽으로도 서로 사랑할 수 있게 해두면 임신 중에도 너를 만족시킬 수 있을 거라고 생각해」"

[[dialogue]]
speaker = "unk"
original = "唐突な提案に戸惑いつつも、俺は思わずごくりと唾を飲み込んでしまう。"
translation = "갑작스러운 제안에 당황하면서도 나는 무심코 꿀꺽 침을 삼키고 만다."

[[dialogue]]
speaker = "unk"
original = "そうして、俺とジュエリーはアナルセックスに挑戦してみることになった。"
translation = "그렇게 나와 주얼리는 애널 섹스에 도전해 보게 되었다."

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はジュエリーのアナルにローションをたっぷり塗って、指でしっかりと揉みほぐす。"
translation = "나는 주얼리의 애널에 로션을 듬뿍 바르고 손가락으로 정성껏 풀어준다."

[[dialogue]]
speaker = "unk"
original = "そこは本来、男性を受け入れるための場所ではないのだから、準備は出来るだけ入念に行っていた。"
translation = "그곳은 본래 남성을 받아들이기 위한 장소가 아니기에 준비는 가능한 한 입성하게 진행했다."

[[dialogue]]
speaker = "ジュエリー"
original = "「んぁっ……<emoji=heart04>\u3000すまない……出来るだけ力を抜くよう努めているのだが……入りそうにないだろうか……？」"
translation = "「응아……<emoji=heart04> 미안해…… 가능한 한 힘을 빼려고 노력 중인데…… 들어갈 것 같지 않니……?」"

[[dialogue]]
speaker = "unk"
original = "ペニスの先端を小さな窪みに触れさせると、ジュエリーのそこは侵入を拒むようにキュッとすぼまる。"
translation = "자지의 끝을 작은 오목함에 닿게 하자 주얼리의 그곳은 침입을 거부하듯 꽉 오므라든다."

[[dialogue]]
speaker = "クロト"
original = "「大丈夫だよ。安心して……」"
translation = "「괜찮아. 안심해……」"

[[dialogue]]
speaker = "unk"
original = "首筋を<ruby>食<rt>は</rt></ruby>むように優しくキスを繰り返しながら、ジュエリーの下半身に手を伸ばす。"
translation = "목덜미를 갉아먹듯 부드럽게 키스를 반복하며 주얼리의 하반신으로 손을 뻗는다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ……ぁ……<emoji=heart04>\u3000んん……<emoji=heart04>\u3000おま○こを触って……気持ちをほぐしてくれるんだな……？」"
translation = "「앗…… 아……<emoji=heart04> 음……<emoji=heart04> 보지를 만져서…… 긴장을 풀어주는 거구나……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんっ……あっ、あ……ん……くぅ……<emoji=heart04>\u3000助手の指……気持ちいい……<emoji=heart04>\u3000んん……はぁ……んんっ……<emoji=heart04>」"
translation = "「음응…… 앗, 아…… 음…… 윽……<emoji=heart04> 조수의 손가락…… 기분 좋아……<emoji=heart04> 음…… 하아…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「感じてるジュエリー、可愛いよ……」"
translation = "「느끼고 있는 주얼리, 귀여워……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そんな、甘い言葉……かけられたら……恥ずかしいじゃないか……あぁあ……<emoji=heart04>」"
translation = "「그런 달콤한 말…… 들으면…… 부끄럽잖아…… 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クリトリスに指を当て、ゆっくり円を描くように転がす。"
translation = "클리토리스에 손가락을 대고 천천히 원을 그리듯 굴린다."

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁ、あ……んんっ……そんな、エッチな触り方されたら……どんどん感じてしまって……あぁあ……んんんっ……<emoji=heart04>」"
translation = "「하아, 아…… 음응…… 그런 야한 손놀림을 당하면…… 자꾸 느껴버려서…… 아아아…… 음응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そのまま感じて、ジュエリー……」"
translation = "「그대로 느껴줘, 주얼리……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ぁ……んんっ……<emoji=heart04>\u3000おち○ちんで……私のお尻の穴をなぞってる……んんっ……<emoji=heart04>」"
translation = "「아…… 음응……<emoji=heart04> 자지로…… 내 엉덩이 구멍을 덧그리고 있어…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ、ん、ぁ……先っぽで……くすぐられてるみたいで……変な感じだ……はぁ、あ……んんっ……<emoji=heart04>」"
translation = "「응, 응, 아…… 끝부분으로…… 간질여지는 것 같아서…… 이상한 기분이야…… 하아, 아…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの先端でお尻の穴を優しく刺激すると、ジュエリーがもどかしげな声を上げる。"
translation = "자지 끝으로 엉덩이 구멍을 부드럽게 자극하자 주얼리가 감질나는 목소리를 낸다."

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁ、んんっ……<emoji=heart04>\u3000んぅ……ふふっ……<emoji=heart04>\u3000初めての時を、思い出してしまうな……」"
translation = "「하아, 응……<emoji=heart04> 음…… 후후……<emoji=heart04> 첫 섹스 때가 떠올라버리네……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あの時もキミは……私の全身を愛撫して……少しでも緊張を解こうとしてくれたね……<emoji=heart04>」"
translation = "「그때도 너는…… 내 전신을 애무하며…… 조금이라도 긴장을 풀어주려 했었지……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私はキミの愛撫の<ruby>虜<rt>とりこ</rt></ruby>なんだ……<emoji=heart04>\u3000キミの優しさが快感になって、そのまま全身に沁み込んでくる……<emoji=heart04>\u3000それがたまらなく気持ちいいんだ……<emoji=heart04>」"
translation = "「나는 너의 애무의 포로야……<emoji=heart04> 너의 다정함이 쾌감이 되어 그대로 온몸에 스며들어 와…… 그게 참을 수 없을 정도로 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身も心も緊張が和らいできたのか、頑なに閉じていた窪みから力が抜けていく。"
translation = "몸도 마음도 긴장이 완화되었는지 굳게 닫혀있던 오목함에서 힘이 빠져나간다."

[[dialogue]]
speaker = "クロト"
original = "「ジュエリー、ゆっくりと挿れるよ……」"
translation = "「주얼리, 천천히 삽입할게……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ、来てくれ……ちゃんと受け入れてみせるから……<emoji=heart04>」"
translation = "「아아, 와줘…… 제대로 받아들여 보일 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少しずつ、かき分けるようにしてペニスを挿入していく。"
translation = "조금씩 헤치듯이 자지를 삽입해 나간다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ……んんっ……！\u3000ぁ……はぁ……んぅぅっ……！」"
translation = "「앗…… 응응……! 아…… 하아…… 응으윽……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁ……ぁ……<emoji=heart04>\u3000奥まで……ちゃんと、受け入れることができたみたいだね……<emoji=heart04>」"
translation = "「하아…… 아……<emoji=heart04> 깊은 곳까지…… 제대로 받아들일 수 있었던 모양이네……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「嬉しいよ……これで、私が妊娠している最中でも……エッチができるというわけだ……んっ……ふうぅ……<emoji=heart04>」"
translation = "「기뻐…… 이걸로 내가 임신 중인 동안에도…… 섹스를 할 수 있다는 거구나…… 응…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「苦しそうだけど、大丈夫……？」"
translation = "「괴로워 보이는데 괜찮아……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミの大きなおち○ちんを受け入れて、まだ間もないから……慣れるにはもう少し時間が必要そうだ……<emoji=heart04>」"
translation = "「너의 커다란 자지를 받아들인 지 얼마 안 됐으니까…… 익숙해지는 데는 좀 더 시간이 필요할 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「けれど、問題ないよ……キミが私のことをたっぷり愛して、すぐに<ruby>お尻<rt>こっち</rt></ruby>でも気持ちいいと思えるようにしてくれるだろうからね……<emoji=heart04>」"
translation = "「하지만 문제없어…… 네가 나를 듬뿍 사랑해서 금방 뒷보지로도 기분 좋다고 생각할 수 있게 해줄 테니까 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「責任重大だな……信頼してくれて嬉しいけど……」"
translation = "「책임이 막중하네…… 믿어줘서 기쁘지만……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ……愛する<b>旦那様</b>を信じるのは当然だろう？\u3000私の見る目に狂いはないよ……<emoji=heart04>」"
translation = "「후후…… 사랑하는 <b>남편님</b>을 믿는 건 당연하잖아? 내 눈은 틀리지 않아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だから、助手……構わない<emoji=heart04>\u3000動いてくれ……<emoji=heart04>」"
translation = "「그러니까 조수…… 상관없어<emoji=heart04> 움직여줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私に気を遣って、動かずにいてくれたんだろう……？\u3000けれど、私たちは未来の夫婦なのだから、遠慮はしないで欲しい――」"
translation = "「나를 배려해서 움직이지 않고 있어 준 거겠지……? 하지만 우리는 미래의 부부니까 사양하지 말아줬으면 해――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私のお尻で、キミも気持ちよくなってくれ……<emoji=heart04>」"
translation = "「내 엉덩이로 너도 기분 좋아져 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「わかった。それじゃあ、ジュエリー……ゆっくり動かすよ……」"
translation = "「알았어. 그럼 주얼리…… 천천히 움직일게……」"

[[dialogue]]
speaker = "unk"
original = "俺はそう囁いて、緩やかにピストンをし始めた。"
translation = "나는 그렇게 속삭이며 완만하게 피스톤질을 시작했다."

[[dialogue]]
speaker = "ジュエリー"
original = "「んんっ<emoji=heart04>\u3000あっ……はぁっ、あ……んんぅっ……<emoji=heart04>\u3000はぁ……あっ……はぁあっ……<emoji=heart04>」"
translation = "「응응<emoji=heart04> 앗…… 하앗, 아…… 음응윽……<emoji=heart04> 하아…… 앗…… 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "繋がり合った入り口の締め付けは強烈だったが、ローションの助けを借りて動かすことができた。"
translation = "연결된 입구의 조임은 강렬했지만 로션의 도움을 받아 움직일 수 있었다."

[[dialogue]]
speaker = "ジュエリー"
original = "「おち○ちん……おなかの奥の方まで……んっ<emoji=heart04>\u3000は、ああ……届いてる……んんっ……！<emoji=heart04>」"
translation = "「자지가…… 배 속 깊은 곳까지…… 응<emoji=heart04> 하, 아아…… 닿고 있어…… 응……!<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁっ……あっ……<emoji=heart04>\u3000はぁっ……はぁっ……<emoji=heart04>\u3000んっ……あぁあっ……<emoji=heart04>」"
translation = "「하앗…… 앗……<emoji=heart04> 하앗…… 하앗……<emoji=heart04> 응…… 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "短いストロークで、腸内の浅い部分を少しずつ刺激していく。"
translation = "짧은 스트로크로 장내의 얕은 부분을 조금씩 자극해 나간다."

[[dialogue]]
speaker = "unk"
original = "それと同時にクリトリスへの愛撫も再開する。"
translation = "그와 동시에 클리토리스 애무도 재개한다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000あぁあっ……<emoji=heart04>\u3000はぁっ……んぅ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000あっ……あぁあ……<emoji=heart04>\u3000はぁっ……んふぅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응…… 앗<emoji=heart04> 아아앗……<emoji=heart04> 하앗…… 응……<emoji=heart04> 응응……<emoji=heart04> 앗…… 아아아……<emoji=heart04> 하앗…… 응후윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ツンと固く尖った敏感なクリを転がしていると、ジュエリーの喘ぎに快感の色が混じり始める。"
translation = "쫑긋하게 굳어 뾰족해진 민감한 클리를 굴리자 주얼리의 신음 소리에 쾌감의 색이 섞이기 시작한다."

[[dialogue]]
speaker = "unk"
original = "花びらの内側から溢れ出たトロリとした愛の蜜が、指に絡んで滑り始めた。"
translation = "꽃잎 안쪽에서 넘쳐흐른 걸쭉한 사랑의 꿀이 손가락에 얽히며 미끄러지기 시작했다."

[[dialogue]]
speaker = "クロト"
original = "「ジュエリーのおま○こ、すごく濡れてきてる……」"
translation = "「주얼리의 보지, 엄청 젖어있어……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「変な……感じなんだっ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あ……あぁあ……あっ……<emoji=heart04>」"
translation = "「이상한…… 기분이야……<emoji=heart04> 응응<emoji=heart04> 아…… 아아아…… 앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「お尻を突かれながら……おま○こを弄られて……あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000ふあっ……あぁっ……<emoji=heart04>」"
translation = "「엉덩이를 찔리면서…… 보지를 유린당해서…… 앗<emoji=heart04> 안……<emoji=heart04> 후아…… 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おま○この気持ちよさが……んんっ……<emoji=heart04>\u3000お尻の方に伝わっていってるみたいで……あ、あ、んんっ……<emoji=heart04>」"
translation = "「보지의 기분 좋음이…… 응……<emoji=heart04> 엉덩이 쪽으로 전해져 가고 있는 것 같아서…… 아, 아, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「今、自分が……どっちで気持ちよくなってるのか分からない……<emoji=heart04>\u3000そんな不思議な感じなんだ……あっ<emoji=heart04>\u3000んっ……んうぅうっ……<emoji=heart04>」"
translation = "「지금 내가…… 어느 쪽으로 기분 좋아지고 있는지 모르겠어……<emoji=heart04> 그런 신기한 기분이야…… 앗<emoji=heart04> 응…… 응으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーは戸惑いに似た喘ぎをこぼす。"
translation = "주얼리는 당혹감 섞인 신음을 흘린다."

[[dialogue]]
speaker = "unk"
original = "最初は違和感だけだったが、次第に気持ちよくなっているのかもしれない。"
translation = "처음에는 위화감뿐이었지만 점차 기분 좋아지고 있는 것일지도 모른다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あ、んんっ……<emoji=heart04>\u3000はぁ、う……んんんっ……<emoji=heart04>\u3000ぁ……ああ……んんっ、あっ、あっ、あ、はぁああっ……<emoji=heart04>」"
translation = "「아, 응……<emoji=heart04> 하아, 으…… 응응응……<emoji=heart04> 아…… 아아…… 응, 앗, 앗, 아, 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーがもっとお尻で感じられるように、膣内のジュエリーの性感帯を押し揉む。"
translation = "주얼리가 더 뒷보지로 느낄 수 있도록 질 내의 주얼리의 성감대를 짓누르며 문지른다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ぁ……んんっ……はぁっ……<emoji=heart04>\u3000ああ、あっ……んんっ、あっ……<emoji=heart04>\u3000あぁ、あ、あ、ああ……んぅうう……<emoji=heart04>」"
translation = "「아…… 응응…… 하앗……<emoji=heart04> 아아, 앗…… 응, 앗……<emoji=heart04> 아아, 아, 아, 아아…… 응으으으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーが反応するリズムに合わせるように、ペニスを動かす。"
translation = "주얼리가 반응하는 리듬에 맞추듯 자지를 움직인다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ！\u3000んんんっ……<emoji=heart04><emoji=heart04>」"
translation = "「앗! 응응응……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その刺激に反応して、ジュエリーの身体がビクンと跳ねる。"
translation = "그 자극에 반응하여 주얼리의 몸이 비틀하며 튄다."

[[dialogue]]
speaker = "クロト"
original = "「ここ……感じるの……？」"
translation = "「여기…… 느껴져……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そう……みたいだ……んんっ……<emoji=heart04>\u3000はぁ、あっ……<emoji=heart04>\u3000今、おち○ちん……こすってるとこ……あっ、あぁあ……<emoji=heart04>」"
translation = "「그런…… 모양이야…… 응응……<emoji=heart04> 하아, 앗……<emoji=heart04> 지금 자지…… 비비고 있는 곳…… 앗, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉を裏付けるように、漏れ出る喘ぎには艶めいたものが混じり始めていた。"
translation = "그 말을 뒷받침하듯 새어 나오는 신음에는 요염한 것이 섞이기 시작하고 있었다."

[[dialogue]]
speaker = "ジュエリー"
original = "「んんっ<emoji=heart04>\u3000ふぅ、う……んぅ……<emoji=heart04>\u3000キミが優しくしてくれたおかげだ……んんっ、あっ、ん、く……んぅうう……<emoji=heart04>」"
translation = "「응응<emoji=heart04> 후우, 으…… 응……<emoji=heart04> 네가 상냥하게 해 준 덕분이야…… 응, 앗, 응, 윽…… 응으으으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結合部の締め付けもかすかに緩み、スムーズに動かせるようになっていた。"
translation = "결합부의 조임도 희미하게 느슨해져 매끄럽게 움직일 수 있게 되어 있었다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ちょっとずつ……アナルも、気持ちよく……なってきてる……んんっ……あっ、あ、あああ……<emoji=heart04>」"
translation = "「조금씩…… 애널도 기분 좋게…… 되어가고 있어…… 응응…… 앗, 아, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なら――」"
translation = "「그렇다면――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅ～っ……<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아앗<emoji=heart04> 응…… 후우윽<emoji=heart04> 응응<emoji=heart04> 응후으~윽……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "純粋にアナルで感じ始めたジュエリーを見て、俺は腰の動きを少しずつ大きくし始めた。"
translation = "순수하게 애널로 느끼기 시작한 주얼리를 보고 나는 허리 움직임을 조금씩 크게 하기 시작했다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000さっきより、深いところまで入ってきてるっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んんっ……<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 안<emoji=heart04> 응응……<emoji=heart04> 아까보다 깊은 곳까지 들어오고 있어<emoji=heart04> 앗<emoji=heart04> 응으윽<emoji=heart04> 응응……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「おち○ちん……こんな深くまでっ……あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000届いてしまうんだなっ……<emoji=heart04>\u3000あ……んうぅっ<emoji=heart04>\u3000はあぁあっ、あっ<emoji=heart04>\u3000んんぅっ……<emoji=heart04><emoji=heart04>」"
translation = "「자지…… 이렇게 깊숙이까지…… 앗<emoji=heart04> 안<emoji=heart04> 닿아버리는구나……<emoji=heart04> 아…… 응으윽<emoji=heart04> 하아아앗, 앗<emoji=heart04> 응응윽……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ジュエリー、嬉しそうな声だねっ……」"
translation = "「주얼리, 기쁜 듯한 목소리네……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んっ<emoji=heart04>\u3000愛する旦那さまの、おち○ちん……こんなに深くまで受け入れることが出来るなんてっ<emoji=heart04>\u3000あっ、んんっ……<emoji=heart04>\u3000んっ……んくぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 사랑하는 남편분의 자지…… 이렇게 깊은 곳까지 받아들일 수 있다니<emoji=heart04> 앗, 응응……<emoji=heart04> 응…… 응쿠읏<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「とても嬉しい事だよ……<emoji=heart04>\u3000あっ、あぁあっ<emoji=heart04>\u3000んっ……はぁあっ<emoji=heart04>\u3000あっ、はぁんっ……<emoji=heart04><emoji=heart04>」"
translation = "「정말 기쁜 일이야……<emoji=heart04> 앗, 아아앗<emoji=heart04> 응…… 하아앗<emoji=heart04> 앗, 하앙……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「奥の方も……いっぱいまさぐってっ……<emoji=heart04>\u3000あっ、はあぁっ……<emoji=heart04>\u3000全部に触れてくれっ……<emoji=heart04>」"
translation = "「안쪽도…… 잔뜩 휘저어줘……<emoji=heart04> 앗, 하아앗……<emoji=heart04> 전부 만져줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんっ<emoji=heart04>\u3000ん、はぁっ……あぁっ<emoji=heart04>\u3000あっ、んっ<emoji=heart04>\u3000はああぁっ……<emoji=heart04><emoji=heart04>」"
translation = "「응응<emoji=heart04> 응, 하앗…… 아앗<emoji=heart04> 앗, 응<emoji=heart04> 하아아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だんだんと快楽の色を帯びていく喘ぎ声に、俺も興奮が高まってくる。"
translation = "점점 쾌락의 빛을 띠어가는 신음 소리에 나도 흥분이 고조된다."

[[dialogue]]
speaker = "ジュエリー"
original = "「私は、キミに触れられるのが……大好きだからっ……<emoji=heart04>\u3000身体のすみずみまで、触れてもらいたいんだっ……<emoji=heart04>」"
translation = "「나는 네가 만져주는 게…… 정말 좋으니까……<emoji=heart04> 몸 구석구석까지 만져줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それこそ、キミの触れていない場所が無くなるくらいっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000深くまで突っ込んで……かき回して欲しいっ……<emoji=heart04>\u3000はぁっ、あっ、んんっ<emoji=heart04><emoji=heart04>」"
translation = "「그야말로 네가 닿지 않은 곳이 없어질 정도로……<emoji=heart04> 응<emoji=heart04> 깊숙이 찔러 넣어서…… 헤집어줬으면 좋겠어……<emoji=heart04> 하앗, 앗, 응응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ジュエリーの奥の奥までっ……！\u3000俺の愛情で埋め尽くすよ……！」"
translation = "「주얼리의 깊숙한 안쪽까지……! 내 애정으로 가득 채워줄게……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんっ<emoji=heart04>\u3000本当にキミというやつは……私を喜ばせるのが上手だねっ……<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000んあぁっ……<emoji=heart04><emoji=heart04>」"
translation = "「응응<emoji=heart04> 정말 너라는 녀석은…… 나를 기쁘게 하는 데 선수라니까……<emoji=heart04> 앗, 안<emoji=heart04> 응아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「こんなに深く交わり合っている最中にっ……<emoji=heart04>\u3000あっ……はぁんっ<emoji=heart04>\u3000そんな言葉、かけられたら……あっ、んあぁっ<emoji=heart04>\u3000ふああぁんっ……<emoji=heart04><emoji=heart04>」"
translation = "「이렇게 깊게 맺어져 있는 도중에……<emoji=heart04> 앗…… 하앙<emoji=heart04> 그런 말을 들으면…… 앗, 응아앗<emoji=heart04> 후아아앙……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁ、あっ<emoji=heart04>\u3000キミへの愛が抑えられなくなってしまう……ますますのめり込んでしまうっ……<emoji=heart04>\u3000んんんっ……<emoji=heart04><emoji=heart04>」"
translation = "「하아, 앗<emoji=heart04> 너를 향한 사랑을 억누를 수 없게 돼 버려…… 점점 더 빠져들어 버려……<emoji=heart04> 응응응……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「抑えなくていいし、もっとのめり込んで欲しいっ……！\u3000もっと好きな気持ちをぶつけ合いたい……！」"
translation = "「억누르지 않아도 되고, 더 빠져들었으면 좋겠어……! 좀 더 좋아하는 마음을 서로 부딪히고 싶어……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手……<emoji=heart04>\u3000愛してるよっ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あっ……はぁ、あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んくぅっ……<emoji=heart04>\u3000んっ、あっ、ふあぁっ<emoji=heart04>」"
translation = "「조수……<emoji=heart04> 사랑해……<emoji=heart04> 응응<emoji=heart04> 앗…… 하아, 앗<emoji=heart04> 응응<emoji=heart04> 응쿠읏……<emoji=heart04> 응, 앗, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000くすぐったいよ……首筋……ペロペロされたらっ……あっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000はあっ<emoji=heart04>\u3000あぁんっ……<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응……<emoji=heart04> 간지러워…… 목덜미…… 낼름낼름 당하면…… 앗<emoji=heart04> 아아앗<emoji=heart04> 하앗<emoji=heart04> 아앙……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーの全てを愛したくて、どこもかしこも欲張ってしまう。"
translation = "주얼리의 모든 것을 사랑하고 싶어서 여기저기 욕심을 부리게 된다."

[[dialogue]]
speaker = "ジュエリー"
original = "「おま○こも……ずっと弄られてっ……<emoji=heart04>\u3000愛液でふやけ切ってしまっているよっ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ん、はぁっ……<emoji=heart04>\u3000ぁ、ああっ……<emoji=heart04><emoji=heart04>」"
translation = "「보지도…… 계속 괴롭혀져서……<emoji=heart04> 애액으로 퉁퉁 불어버렸어……<emoji=heart04> 응응<emoji=heart04> 응, 하앗……<emoji=heart04> 아, 아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はジュエリーの白い首筋や背中に舌を這わせながら、おま○こを指でかき回す。"
translation = "나는 주얼리의 하얀 목덜미와 등으로 혀를 핥아 올리면서 보지를 손가락으로 헤집는다."

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁ、あっ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000気持ちいいっ……助手……<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はぁっ、あっ、ああっ<emoji=heart04>\u3000んくぅ、んっ<emoji=heart04>\u3000んぅうっ<emoji=heart04><emoji=heart04>」"
translation = "「하아, 앗……<emoji=heart04> 응응……<emoji=heart04> 기분 좋아…… 조수……<emoji=heart04> 응으으읏<emoji=heart04> 응<emoji=heart04> 하앗, 앗, 아앗<emoji=heart04> 응쿠으, 응<emoji=heart04> 응으읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスには確実に快感が募り、俺は興奮でだんだんと腰の動きが速くなってしまう。"
translation = "페니스에는 확실히 쾌감이 쌓이고, 나는 흥분으로 점점 허리 놀림이 빨라진다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000あっ、んっ<emoji=heart04>\u3000はぁっ、んんっ<emoji=heart04>\u3000先ほどから……お尻の中のものが……ビクビクしてる<emoji=heart04>\u3000んうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 아아앗<emoji=heart04> 앗, 응<emoji=heart04> 하앗, 응응<emoji=heart04> 아까부터…… 엉덩이 안의 것이…… 파르르 떨리고 있어<emoji=heart04> 응으윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の中で甘やかな疼きが込み上げてきていて、気付けばすぐにでも弾けそうな水位にまで高まってきていた。"
translation = "내 안에서 달콤한 욱신거림이 치밀어 오르고 있었고, 어느덧 금방이라도 터져 나올 듯한 수위까지 높아져 있었다."

[[dialogue]]
speaker = "ジュエリー"
original = "「助手、も……私のアナルで、気持ちよくなってくれているんだなっ……<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あっ、はっ、んんっ<emoji=heart04>\u3000ぁ、ああっ、あっ、はぁあっ<emoji=heart04><emoji=heart04>」"
translation = "「조수도…… 내 애널로 기분 좋아져 있는 거구나……<emoji=heart04> 아앗<emoji=heart04> 앗, 하, 응응<emoji=heart04> 아, 아앗, 앗, 하아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんっ<emoji=heart04>\u3000もしイきたくなったらっ……<emoji=heart04>\u3000いつでも……イってくれていいから……んんんっ<emoji=heart04><emoji=heart04>\u3000ぁ、あっ、はあぁっ、ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응응<emoji=heart04> 만약 가고 싶어지면……<emoji=heart04> 언제든지…… 가버려도 좋으니까…… 응응응<emoji=heart04><emoji=heart04> 아, 앗, 하아앗, 후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「キミの熱い、精液で……私のアナル――いっぱいに満たしてくれっ<emoji=heart04><emoji=heart04>\u3000あっ、あぁ、あっ、はああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「네 뜨거운 정액으로…… 내 애널을―― 가득 채워줘<emoji=heart04><emoji=heart04> 앗, 아아, 앗, 하아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「わかった……！\u3000思いっきり、出すから……！」"
translation = "「알았어……! 마음껏 내보낼 테니까……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁっ<emoji=heart04>\u3000あっ、ああっ<emoji=heart04>\u3000あっ、んっ、あっ、んんぅっ<emoji=heart04>\u3000くっ、んうぅっ<emoji=heart04>\u3000あっ、んうぅっ、はぁっ、あっ<emoji=heart04>\u3000ふあああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앗, 아앗<emoji=heart04> 앗, 응, 앗, 응응윽<emoji=heart04> 윽, 응으윽<emoji=heart04> 앗, 응으윽, 하앗, 앗<emoji=heart04> 후아아아앗~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「大好き、だぞ……助手っ<emoji=heart04>\u3000んんっ……好き<emoji=heart04>\u3000好きだっ<emoji=heart04>\u3000どうしようもなく、好きっ<emoji=heart04><emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あっ、ああっ<emoji=heart04>\u3000あっ、あっ、あっ、はああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「정말 좋아해…… 조수<emoji=heart04> 응응…… 좋아해<emoji=heart04> 좋아한다구<emoji=heart04> 어쩔 수 없을 정도로 좋아<emoji=heart04><emoji=heart04> 응응<emoji=heart04> 앗, 아앗<emoji=heart04> 앗, 앗, 앗, 하아아아앗~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……俺も、好きだっ！\u3000大好きだ、ジュエリーっ……！」"
translation = "「윽…… 나도 좋아해! 정말 좋아해, 주얼리……!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁあっ<emoji=heart04>\u3000もっと、囁いてくれっ<emoji=heart04>\u3000お腹の奥を突きながら……んっ<emoji=heart04>\u3000私への愛を伝えながら……私の中でイッてくれっ<emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 좀 더 속삭여줘<emoji=heart04> 배 속을 찌르면서…… 응<emoji=heart04> 나를 향한 사랑을 전하면서…… 내 안에서 가버려줘<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「気持ち、いいっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000私も、気持ちよくて……あぁあっ<emoji=heart04>\u3000あっ、んんっ<emoji=heart04>\u3000はっ、あぁあっ、あっ、んああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 응응<emoji=heart04> 나도 기분 좋아서…… 아아앗<emoji=heart04> 앗, 응응<emoji=heart04> 핫, 아아앗, 앗, 응아아앗~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを押し込むたびに、ジュエリーは真っ白な下腹部を震わせた。"
translation = "페니스를 밀어 넣을 때마다 주얼리는 새하얀 하복부를 떨었다."

[[dialogue]]
speaker = "unk"
original = "それが、ジュエリーの絶頂も近づいてきていることを教える。"
translation = "그것이 주얼리의 절정도 가까워지고 있음을 알려준다."

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁっ、あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000このまま……お尻でっ<emoji=heart04>\u3000私も……イけそうだっ<emoji=heart04>\u3000んんっ、あっ、あっ、はあぁあ～っ<emoji=heart04><emoji=heart04>」"
translation = "「하앗, 앗<emoji=heart04> 기분 좋아<emoji=heart04> 응<emoji=heart04> 이대로…… 엉덩이로<emoji=heart04> 나도…… 갈 것 같아<emoji=heart04> 응응, 앗, 앗, 하아아아앗~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ、あっ、あっ、んっ<emoji=heart04>\u3000んん、あっ、あぁっ、あっ<emoji=heart04>\u3000助手……い、イクっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000んあああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 응<emoji=heart04> 응응, 앗, 아앗, 앗<emoji=heart04> 조수…… 가, 가앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 응아아아앗~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「お尻で、アナルでっ……私も気持ちよくイっちゃうっ<emoji=heart04><emoji=heart04>\u3000んっ、ああっ、あっ、あっ<emoji=heart04>\u3000ふああああっ<emoji=heart04><emoji=heart04>」"
translation = "「엉덩이로, 애널로…… 나도 기분 좋게 가버릴게<emoji=heart04><emoji=heart04> 응, 아앗, 앗, 앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、もう出そうだ……ジュエリーっ……！」"
translation = "「나도 이제 나올 것 같아…… 주얼리……!」"

[[dialogue]]
speaker = "unk"
original = "抑えていた衝動が一気に滲み出してくる。"
translation = "억누르고 있던 충동이 단숨에 배어 나온다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ああぁっ<emoji=heart04>\u3000助手っ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000お尻を愛されて、気持ちいいよっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 조수<emoji=heart04> 기분 좋아<emoji=heart04> 엉덩이를 사랑받아서 기분 좋다구<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界まで欲望に抗いながら、一緒にイけるように愛を込めたピストンを続ける。"
translation = "한계까지 욕망에 항거하며 함께 갈 수 있도록 사랑을 담은 피스톤을 계속한다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000イっ、クぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あっ、あっ、あっ、んあぁっ<emoji=heart04>\u3000んんっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、はあああっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 가, 가앗<emoji=heart04> 응응<emoji=heart04> 앗, 앗, 앗, 응아앗<emoji=heart04> 응응, 앗, 앗, 안<emoji=heart04> 앗, 앗, 하아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ<emoji=heart04>\u3000やっ、んんっ、あっ、はぁあっ<emoji=heart04>\u3000んんっ、くっ、イクっ<emoji=heart04><emoji=heart04>\u3000もう、イクっ、イクイクっ<emoji=heart04><emoji=heart04>\u3000お尻、で、イクっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 싫어, 응응, 앗, 하아앗<emoji=heart04> 응응, 윽, 가앗<emoji=heart04><emoji=heart04> 이제, 가, 가앗가앗<emoji=heart04><emoji=heart04> 엉덩이로 가버려<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「んんっ<emoji=heart04>\u3000あっ、あああっ<emoji=heart04>\u3000はああああっ<emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04>」"
translation = "「응응<emoji=heart04> 앗, 아아앗<emoji=heart04> 하아아아앗<emoji=heart04><emoji=heart04> 가앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ――出るっ！！！」"
translation = "「큭―― 나온다!!!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ――ふぁああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあぁああああああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗―― 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーのアナルの奥で、ペニスが激しく脈打った。"
translation = "주얼리의 애널 안쪽에서 페니스가 격렬하게 맥동했다."

[[dialogue]]
speaker = "unk"
original = "堪えきれなくなって噴き出した精液が、どくどくと奥へ注ぎ込まれていく。"
translation = "참지 못하고 뿜어져 나온 정액이 울컥울컥 안쪽으로 쏟아져 들어간다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁああ、あっ……あぁあ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んんっ……潮噴き……<emoji=heart04><emoji=heart04>\u3000んんっ……潮、噴いちゃってるっ……<emoji=heart04><emoji=heart04>\u3000んんっ……<emoji=heart04><emoji=heart04>」"
translation = "「아아아아, 앗…… 아아아……<emoji=heart04><emoji=heart04><emoji=heart04> 응응…… 수풍……<emoji=heart04><emoji=heart04> 응응…… 수풍, 하고 있어……<emoji=heart04><emoji=heart04> 응응……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しい絶頂に呑まれて、ジュエリーの身体がびくびくと震える。"
translation = "격렬한 절정에 삼켜져 주얼리의 몸이 파르르 떨린다."

[[dialogue]]
speaker = "unk"
original = "おま○こから透明な愛液が弾けるように噴き出した。"
translation = "보지에서 투명한 애액이 튀어 오르듯 뿜어져 나왔다."

[[dialogue]]
speaker = "ジュエリー"
original = "「アナルで……気持ちよくなって……<emoji=heart04>\u3000んんっ……こんな、はしたなく……<emoji=heart04>\u3000あ、あぁああっ……<emoji=heart04>」"
translation = "「애널로…… 기분 좋아져서……<emoji=heart04> 응응…… 이렇게 상스럽게……<emoji=heart04> 아, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めてのアナルセックスで、ここまで感じてくれている――その事実に喜びと興奮が重なり、ペニスはさらに強く脈動する。"
translation = "첫 애널 섹스에서 이 정도로 느껴주고 있다―― 그 사실에 기쁨과 흥분이 겹쳐 페니스는 더욱 강하게 맥동한다."

[[dialogue]]
speaker = "ジュエリー"
original = "「あぁあ……んんっ…<emoji=heart04>\u3000お腹の、なかぁ……まだビュクビュクしてる……<emoji=heart04>\u3000んんっ、あ、あああ……<emoji=heart04>」"
translation = "「아아아…… 응응…<emoji=heart04> 배 속이…… 아직 뷰쿳뷰쿳 하고 있어……<emoji=heart04> 응응, 아, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「精液、熱い……<emoji=heart04>\u3000いっぱい、出してくれてるっ……<emoji=heart04>」"
translation = "「정액, 뜨거워……<emoji=heart04> 잔뜩 내보내 주고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「嬉しい……<emoji=heart04>\u3000助手、愛しているよ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「기뻐…… 조수, 사랑해……<emoji=heart04> 응……<emoji=heart04> 하아앗…… 후우욱……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから射精が終わるまで、互いの体温を感じながら、甘い余韻に浸り続けた後。"
translation = "그러고 나서 사정이 끝날 때까지 서로의 체온을 느끼며 달콤한 여운에 젖어 있은 뒤."

[[dialogue]]
speaker = "ジュエリー"
original = "「はぁ……はぁ……ぁあ……ぁ……んんっ……<emoji=heart04>」"
translation = "「하아…… 하아…… 아아…… 아…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゆっくりとペニスを引き抜くと、少し開いたままのジュエリーのアナルから、愛の白濁がたっぷりと溢れ出した。"
translation = "천천히 페니스를 뽑아내자 조금 열린 채인 주얼리의 애널에서 사랑의 백탁액이 듬뿍 흘러넘쳤다."

[[dialogue]]
speaker = "ジュエリー"
original = "「ありがとう、助手……<emoji=heart04>」"
translation = "「고마워, 조수……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手が愛をもって……してくれたおかげで……お尻で……こんなに気持ちよくなることができたよ……<emoji=heart04>」"
translation = "「조수가 사랑을 담아…… 해준 덕분에…… 엉덩이로…… 이렇게 기분 좋아질 수 있었어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もアナルエッチ……気持ちよかった……」"
translation = "「나도 애널 섹스…… 기분 좋았어……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そうか……ふふっ……<emoji=heart04>\u3000なら……これで将来、私が妊娠した時も安心だね……<emoji=heart04>」"
translation = "「그래…… 후훗……<emoji=heart04> 그럼…… 이걸로 장래에 내가 임신했을 때도 안심이겠네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "息を乱しながらも、ジュエリーは微笑んでくれる。"
translation = "숨을 몰아쉬면서도 주얼리는 미소 지어준다."

[[dialogue]]
speaker = "ジュエリー"
original = "「最初は少し、不安だったけど……こんなに気持ちよくなれるとは思わなかったよ……」"
translation = "「처음에는 조금 불안했지만…… 이렇게 기분 좋아질 수 있을 줄은 몰랐어……」"

[[dialogue]]
speaker = "クロト"
original = "「花嫁さんを満足させることが出来たみたいで、安心した」"
translation = "「신부님을 만족시킨 것 같아서 안심이야」"

[[dialogue]]
speaker = "ジュエリー"
original = "「それはもう、大満足さ……<emoji=heart04>\u3000だけど、繰り返していけば……もっと気持ちよくなれるかもしれないね……」"
translation = "「그건 뭐, 대만족이지……<emoji=heart04> 하지만 반복해 나간다면…… 더 기분 좋아질 수 있을지도 모르겠네……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いつか私たちが結婚して、子どもを作って……その時まで、ちゃんと訓練を欠かさないようにしなければね……<emoji=heart04>」"
translation = "「언젠가 우리가 결혼해서 아이를 만들고…… 그때까지 제대로 훈련을 거르지 않도록 해야겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "純粋に気持ちよかったから、俺もまたしたい気持ちがある――と伝えると。"
translation = "순수하게 기분 좋았기에 나도 다시 하고 싶은 마음이 있다고 전하자."

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふっ、私も同じだ……<emoji=heart04>\u3000せっかく新しいキミとの愛し方を知ったんだから――」"
translation = "「후훗, 나도 마찬가지야……<emoji=heart04> 어렵사리 너와 사랑하는 새로운 방법을 알게 됐으니까――」"

[[dialogue]]
speaker = "ジュエリー"
original = "「これからは、<ruby>お尻<rt>こっち</rt></ruby>の穴でもいっぱい愛してくれ、旦那様……<emoji=heart04>」"
translation = "「이제부터는 엉덩이 구멍으로도 잔뜩 사랑해줘, 남편님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あまりの可愛さに胸が熱くなり、俺はジュエリーの身体を強く抱きしめる。"
translation = "너무나도 사랑스러운 모습에 가슴이 뜨거워져 나는 주얼리의 몸을 강하게 껴안는다."

[[dialogue]]
speaker = "クロト"
original = "「ジュエリー、愛してるよ。これからも、ずっと大事にする……」"
translation = "「주얼리, 사랑해. 앞으로도 계속 소중히 할게……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ……助手……私もキミのことを心から愛している……<emoji=heart04>\u3000私もキミのことをずっと大事にするよ……<emoji=heart04>」"
translation = "「아아…… 조수…… 나도 너를 진심으로 사랑해……<emoji=heart04> 나도 너를 계속 소중히 할게……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇を重ね、互いの温もりを確かめ合う。"
translation = "입술을 겹치고 서로의 온기를 확인한다."

[[dialogue]]
speaker = "unk"
original = "触れ合った体はまだ熱を帯びていて――俺たちそのまま、またゆっくりと肌を擦り合わせ始めるのだった。"
translation = "맞닿은 몸은 아직 열기를 띠고 있어서―― 우리는 그대로 다시 천천히 살결을 맞비비기 시작했다."

