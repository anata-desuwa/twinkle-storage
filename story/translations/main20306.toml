[[dialogue]]
speaker = "unk"
original = "第６話,アガサとジグ,B"
translation = "제6화, 아가사와 지그, B"

[[dialogue]]
speaker = "unk"
original = "梨緒が保健室で目を覚ましたのは、ジグとの戦闘から丸１日ほど経った頃だった。"
translation = "리오가 보건실에서 눈을 뜬 것은 지그와의 전투로부터 꼬박 하루 정도가 지났을 무렵이었다."

[[dialogue]]
speaker = "unk"
original = "幸い怪我は軽く、入院するほどではないと診断されたのだが……"
translation = "다행히 부상은 가벼워 입원할 정도는 아니라는 진단을 받았지만……"

[[dialogue]]
speaker = "unk"
original = "「気絶は恐らく心因性のもの」「心の傷は医療機器では測れない」と医者に言われ、ここで安静にしているように言い含められてしまった。"
translation = "「기절은 아마 심인성인 것」 「마음의 상처는 의료 기기로는 측정할 수 없다」라는 의사의 말을 듣고 이곳에서 안정을 취하도록 타이름을 당하고 말았다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「夢……じゃないんだな」"
translation = "「꿈……이 아니었구나.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の脳裏に浮かぶのは、仮面を付けたジグの姿。"
translation = "리오의 뇌리에 떠오르는 것은 가면을 쓴 지그의 모습."

[[dialogue]]
speaker = "unk"
original = "夢であってほしいと願っても、胸に突き刺さる戦慄は、あの光景が幻でないと克明に示していた。"
translation = "꿈이기를 바라도 가슴을 찌르는 전율은 그 광경이 환상이 아니라고 명확히 나타내고 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「悪夢であれば、どんなに良かったか……」"
translation = "「악몽이었다면 얼마나 좋았을까……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……」"
translation = "「지그……」"

[[dialogue]]
speaker = "unk"
original = "レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。"
translation = "레나테 <ruby>Z<rt>지그</rt></ruby> 자이프리트."

[[dialogue]]
speaker = "unk"
original = "かつて新星星徒会の星徒会長だった、梨緒の<ruby>宿敵<rt>ライバル</rt></ruby>。"
translation = "과거 신성 성도회의 성도회장이었던 리오의 숙적."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……あいつは仮面を纏い、リクリエのモンスターを従えていた」"
translation = "「지그…… 그 녀석은 가면을 쓰고 리크리에의 몬스터를 거느리고 있었어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「先日、緋宮クロトが話していた『リクリエの使徒』の特徴と完全に一致する……」"
translation = "「얼마 전 히노미야 쿠로토가 말했던 『리크리에의 사도』의 특징과 완전히 일치해……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あのジグが……世界の再創生を願い、モンスターをけしかける、リクリエの使徒だって……？」"
translation = "「그 지그가…… 세계의 재창생을 바라며 몬스터를 부추기는 리크리에의 사도라고……?」"

[[dialogue]]
speaker = "unk"
original = "理解できない。"
translation = "이해할 수 없다."

[[dialogue]]
speaker = "unk"
original = "ジグはいつも飄々としていて、掴みどころのないやつだった。"
translation = "지그는 언제나 표표해서 도무지 종잡을 수 없는 녀석이었다."

[[dialogue]]
speaker = "unk"
original = "どんなピンチを前にしても、まるで忘れていた宿題を片付けるように、「まあ何とかするよ」と軽く笑う……そんな彼女があの新星学園の希望でもあった。"
translation = "어떤 위기 앞에서도 마치 잊고 있던 숙제를 해치우듯 「뭐 어떻게든 될 거야」라며 가볍게 웃는…… 그런 그녀가 그 신성학원의 희망이기도 했다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「また、救えなかった……！\u3000私は、弱い……っ」"
translation = "「또 구하지 못했어……! 나는 약해……윽.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やぁ、アガサ。コーヒー飲むかい？」"
translation = "「여어, 아가사. 커피 마실래?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──！\u3000見るな……」"
translation = "「──! 보지 마……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君が泣き虫なのはとっくに知ってるよ。今さらじゃないか」"
translation = "「네가 울보인 건 진작에 알고 있어. 새삼스럽지 않잖아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「うる……さい……」"
translation = "「시끄러……워……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だいたい、君は今……」"
translation = "「애초에 너는 지금……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「出撃中のはずだって？\u3000今日は想定よりモンスターが少なくてね、さくっと終わらせて帰ってきたよ」"
translation = "「출격 중이어야 하는 거 아니냐고? 오늘은 예상보다 몬스터가 적어서 말이야, 후딱 끝내고 돌아왔어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「いやぁ、最近出撃ばかりだったから、ようやく少し休めるね」"
translation = "「이야, 최근 계속 출격뿐이었으니까 겨우 좀 쉴 수 있겠네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」"
translation = "「……유성시국 외에도 몬스터가 나타나는 게 당연해졌고 각지에서 큰 피해가 나오고 있어. 관동만 해도 여러 도시가 궤멸당했지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」"
translation = "「인류의 생존권은 시시각각 좁아지고 지금도 어딘가에서 희생이 나오고 있어……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、そうだね。その通りだ」"
translation = "「아아, 그렇네. 네 말이 맞아.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でも、勝つよ」"
translation = "「하지만 이길 거야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だけど……！\u3000このままでは世界は……！」"
translation = "「하지만……! 이대로라면 세계는……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「大丈夫、何とかなるさ」"
translation = "「괜찮아, 어떻게든 될 거야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「根拠もなく気休めを言っているわけじゃないよ」"
translation = "「근거도 없이 위로하려고 하는 말이 아니야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「３０００年前、以前のリクリエの時だって世界は滅亡の間際まで追い詰められた」"
translation = "「3000년 전, 이전의 리크리에 때도 세계는 멸망 직전까지 몰렸었지.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど世界は破滅に打ち勝った。だから今がある」"
translation = "「하지만 세계는 파멸을 이겨냈어. 그래서 지금이 있는 거야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「可能性は残されている。私はそう思うよ」"
translation = "「가능성은 남아 있어. 나는 그렇게 생각해.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……」"
translation = "「지그……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「犠牲が出たことは真摯に受け止めよう。だけど嘆いてばかりではいけない。私たちにはまだ守るものがあるんだから」"
translation = "「희생이 나온 것은 진지하게 받아들이자. 하지만 한탄만 해서는 안 돼. 우리에겐 아직 지킬 것이 있으니까.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「<ruby>喪<rt>うしな</rt></ruby>ったもののためにも、前を向いて戦おう。それが星騎士だ」"
translation = "「잃은 것들을 위해서라도 앞을 향해 싸우자. 그것이 성기사다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ああ。わかっている。君に言われなくても」"
translation = "「……아아. 알고 있어. 네가 말하지 않아도.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そうか。じゃあ余計なお世話だったね」"
translation = "「그래? 그럼 쓸데없는 참견이었네.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「で、コーヒー飲む？」"
translation = "「그래서, 커피 마실래?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は紅茶派だ」"
translation = "「나는 홍차파다.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「はは、アガサはそうでなくちゃ」"
translation = "「하하, 아가사는 그래야지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（あのジグが、リクリエの側についた……？）"
translation = "（그 지그가, 리크리에의 편에 섰다고……?）"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（そんなの、あってはならないことだ。あれだけ人々を救ってきたジグが、世界を破滅に導くなんて）"
translation = "（그런 건, 있을 수 없는 일이야. 그만큼 사람들을 구해왔던 지그가, 세계를 파멸로 이끌다니.）"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（それとも君は……本当は世界の破滅を望んでいたのか？）"
translation = "（아니면 너는…… 사실은 세계의 파멸을 바라고 있었던 건가?）"

[[dialogue]]
speaker = "unk"
original = "星徒会長と副会長だったあの時は、ジグのことを理解していたつもりだった。"
translation = "성도회장과 부회장이었던 그 시절에는, 지그를 이해하고 있다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "だが今となっては、思い上がっていただけなのかもしれない。"
translation = "하지만 지금에 와서는, 자만하고 있었던 것뿐일지도 모른다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「うぅ……ぐすっ……ひぐ……」"
translation = "「우으…… 흑…… 히윽……」"

[[dialogue]]
speaker = "unk"
original = "情けない。"
translation = "한심하다."

[[dialogue]]
speaker = "unk"
original = "ジグを止められなかった。"
translation = "지그를 막지 못했다."

[[dialogue]]
speaker = "unk"
original = "軽くあしらわれ、引き留めることもできなかった。"
translation = "가볍게 제압당해, 붙잡는 것조차 할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "ずっと近くにいながら、その本心を知ることすらできなかった。"
translation = "줄곧 곁에 있으면서, 그 본심을 아는 것조차 하지 못했다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くっ……頭が……」"
translation = "「큭…… 머리가……」"

[[dialogue]]
speaker = "unk"
original = "頭が痛い。ズキズキと頭が割れるように痛む。"
translation = "머리가 아프다. 욱신욱신 머리가 깨질 듯이 아프다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は……私は……」"
translation = "「나는…… 나는……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は……なんて……無力なんだろう……」"
translation = "「나는…… 얼마나…… 무력한 걸까……」"

[[dialogue]]
speaker = "？？？"
original = "「梨緒ちゃん……あの、これ……」"
translation = "「리오 짱…… 저기, 이거……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "梨緒が声の方を振り向くと、そこにはハンカチを手にしたベアトリスの姿があった。"
translation = "리오가 목소리가 들린 쪽을 돌아보자, 그곳에는 손수건을 든 베아트리스의 모습이 있었다."

