[[dialogue]]
speaker = "unk"
original = "第２話,可愛い後輩と絵馬に願いごと,P"
translation = "제2화, 귀여운 후배와 에마에 소원 빌기"

[[dialogue]]
speaker = "unk"
original = "冬休みの最後日、リーリアは俺の家へ遊びにきていた。"
translation = "겨울방학 마지막 날, 리리아는 우리 집에 놀러 와 있었다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパ～イ、はいっ♪\u3000口開けて下さい☆\u3000あ～ん<emoji=heart04>」"
translation = "「선~배, 자♪ 입 벌려 주세요☆ 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "肩をぴったりとくっ付け合っているリーリアが、剥いてあるミカンの１房を手に取って、俺の口へと運んでくれる。"
translation = "어깨를 딱 붙이고 있는 리리아가, 까놓은 귤 한 조각을 집어 내 입으로 가져다준다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ、どうです、センパイ？\u3000可愛い後輩に食べさせてもらうミカンは甘いですか？\u3000それとも甘酸っぱいですか～？」"
translation = "「후훗, 어때요, 선배? 귀여운 후배가 먹여주는 귤은 단가요? 아니면 새콤달콤한가요~?」"

[[dialogue]]
speaker = "unk"
original = "う～ん、台詞の甘さが少し足りない"
translation = "음~, 대사의 달콤함이 조금 부족해."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え～？\u3000だったらセンパイ、見本を見せて下さいよ～」"
translation = "「에~? 그렇다면 선배, 본보기를 보여주세요~」"

[[dialogue]]
speaker = "unk"
original = "俺は『愛を込めて、甘くな～れ♪』と言いながらミカンを１房持ち、リーリアの口へ運ぶ。"
translation = "나는 『사랑을 담아서, 달콤해져라~♪』라고 말하며 귤 한 조각을 들고 리리아의 입으로 가져간다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ぷっ……あははっ☆\u3000なんの魔法ですか、それ～♪\u3000あ～ん<emoji=heart04>\u3000あむっ……もぐもぐ……」"
translation = "「풉…… 아하핫☆ 그건 무슨 마법이에요~♪ 아~앙<emoji=heart04> 냠…… 우물우물……」"

[[dialogue]]
speaker = "unk"
original = "甘くなってなかった？"
translation = "안 달콤해졌어?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「マジカル甘いに決まってるじゃないですか<emoji=heart04>\u3000センパイに食べさせてもらってるんですから～♪\u3000えへへへぇ<emoji=heart04>」"
translation = "「매지컬 달콤한 게 당연하잖아요<emoji=heart04> 선배가 먹여주시는 거니까요~♪ 에헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、そうだ！\u3000イチャイチャに夢中で忘れちゃってましたけど、お正月が終わる前に、センパイとしておきたかったことがあるんですよ～」"
translation = "「앗, 맞다! 꽁냥거리는 데 정신 팔려서 잊고 있었는데, 설날이 끝나기 전에 선배랑 하고 싶었던 게 있었어요~」"

[[dialogue]]
speaker = "unk"
original = "そう言って、リーリアが取り出してみせたのは『絵馬』と『カラフルなペン』だった。"
translation = "그렇게 말하며 리리아가 꺼내 보인 것은 『에마』와 『컬러풀한 펜』이었다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「じゃ～ん☆\u3000せっかくお正月なんですから、センパイと絵馬に『恋人としての願いごと』を書いてみたいな～って♪」"
translation = "「짠☆ 기왕 설날이니까, 선배랑 에마에 『연인으로서의 소원』을 써보고 싶어서요~♪」"

[[dialogue]]
speaker = "unk"
original = "リーリアの晴れ着フォームの能力は、『絵馬を召喚し、そこに描いた願いを具現化すること』だと聞かされていた。"
translation = "리리아의 나들이옷 폼의 능력은, 『에마를 소환하여 그곳에 그린 소원을 구현화하는 것』이라고 들은 적이 있다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「まあ、絵馬の具現化能力は、ある程度具体的なものでないと上手く行かなかったり、条件も色々厳しかったりして、まだまだ試行錯誤中なんですけどね～」"
translation = "「뭐, 에마의 구현화 능력은 어느 정도 구체적이지 않으면 잘 안 되기도 하고, 조건도 여러모로 까다로워서 아직 시행착오 중이지만요~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「なので今回、『恋人としての願いごと』を書くのはただの願掛けになるんですけど、こういうのは願うことで『自分の気持ちを目標に向ける』ことが重要だと思うので♪」"
translation = "「그래서 이번에 『연인으로서의 소원』을 쓰는 건 그냥 기원이 되겠지만, 이런 건 바라는 것으로써 『자신의 마음을 목표로 향하게 하는 것』이 중요하다고 생각하니까요♪」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで、俺たちはそれぞれ絵馬に願いを書き、発表し合うことになった。"
translation = "그런 이유로, 우리들은 각자 에마에 소원을 쓰고 서로 발표하기로 했다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「では、私からですね～。私が書いたのは、ズバリこれです♪\u3000じゃじゃ～ん、『センパイとのラブラブな結婚生活』☆」"
translation = "「그럼, 저부터네요~. 제가 쓴 건 바로 이겁니다♪ 짜자~잔, 『선배와의 러브러브한 결혼 생활』☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あ～、今ちょっとバカにしましたね！\u3000ステップ飛ばしすぎとか、全然そんなことないですから！」"
translation = "「아~, 지금 살짝 바보 취급했죠! 단계를 너무 건너뛰었다느니, 전혀 그렇지 않거든요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「本当はこれ、初夢で見る予定だったのに、全然見れなくてショックだったんですから……！」"
translation = "「사실 이거, 첫 꿈에서 볼 예정이었는데 전혀 못 봐서 쇼크였다구요……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイとの関係がもっと進んだ『未来の夢』が見てみたいな～って、センパイの写真を枕元に置いて眠ったのに、その日何も夢を見なかったんです」"
translation = "「선배와의 관계가 더 진전된 『미래의 꿈』을 보고 싶어서, 선배 사진을 머리맡에 두고 잤는데 그날 아무 꿈도 안 꿨거든요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「──夢なんかに頼らなくても、そのうち叶うから安心していい……って、えへへ<emoji=heart04>\u3000それ、ほぼプロポーズですよ、センパイ<emoji=heart04>」"
translation = "「──꿈 같은 거에 의지하지 않아도 조만간 이루어질 테니까 안심해도 된다니…… 에헤헤<emoji=heart04> 그거 거의 프로포즈예요, 선배<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ええっと、それで……センパイはどんな願いごとを書いたんですか？」"
translation = "「에, 그러니까, 그래서…… 선배는 어떤 소원을 썼나요?」"

[[dialogue]]
speaker = "unk"
original = "俺は『リーリアの夢を手伝いたい』"
translation = "나는 『리리아의 꿈을 돕고 싶다』."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――私が目標にしてる『若い魔女が人間界にもっと来やすくなれるようにしたい』という夢を、一緒に手伝いたい……？」"
translation = "「――제가 목표로 하는 『젊은 마녀가 인간계에 더 오기 편하게 만들고 싶다』는 꿈을 같이 돕고 싶다구요……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「～～～っ<emoji=heart04><emoji=heart04>\u3000もう、相変わらずセンパイは、キュンキュンしちゃうことを平気で言っちゃうんですから～<emoji=heart04>」"
translation = "「~~~~윽<emoji=heart04><emoji=heart04> 정말, 선배는 여전하시네요, 심쿵할 만한 소리를 아무렇지도 않게 하신다니까요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは感激したように抱きついてきて、その勢いで俺たちはベッドに仰向けに倒れ込んでしまう。"
translation = "리리아는 감격한 듯이 안겨 왔고, 그 기세에 우리들은 침대에 뒤로 벌러덩 넘어져 버린다."

[[dialogue]]
speaker = "unk"
original = "リーリアはそのまま、胸元に顔を擦り寄せ、甘えるようにスリスリしてきた。"
translation = "리리아는 그대로 내 가슴팍에 얼굴을 비비며, 어리광 부리듯 부비부비해 왔다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んふ～<emoji=heart04>\u3000センパイは今日も、いい匂いがします……<emoji=heart04>」"
translation = "「음후~<emoji=heart04> 선배는 오늘도 좋은 냄새가 나요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは俺の匂いをよく褒めてくれるよな"
translation = "리리아는 내 냄새를 자주 칭찬해 주네."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイが私のこと、可愛いって言ってくれるのと同じですよ。褒められると自己肯定感が上がるでしょう？」"
translation = "「선배가 저한테 귀엽다고 해주는 거랑 똑같아요. 칭찬받으면 자기 긍정감이 올라가잖아요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あと、別に嘘を言っているわけじゃなくて、私はセンパイの匂い、本当に好きですから♪\u3000こうしていると安心します<emoji=heart04>」"
translation = "「그리고 딱히 거짓말을 하는 게 아니라, 전 선배 냄새 정말 좋아하니까요♪ 이러고 있으면 안심돼요<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイも私の匂い、好きなんですか？\u3000ふふっ、どんな感じの匂いがします？」"
translation = "「선배도 제 냄새 좋아하세요? 후훗, 어떤 느낌의 냄새가 나요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――可愛いフェロモンがいっぱい出ててキュンキュンする？\u3000もう、センパイってば～、エッチなんですから～<emoji=heart04>」"
translation = "「――귀여운 페로몬이 잔뜩 나와서 가슴이 두근거린다구요? 정말, 선배도 참~ 변태라니까요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「このままセンパイとうとうとしながら眠ったら、いい夢が見られそうって思ってたのに……ドキドキしたら眠れなくなっちゃうじゃないですか～<emoji=heart04>\u3000えへへぇ<emoji=heart04>」"
translation = "「이대로 선배랑 꾸벅꾸벅 졸면서 잠들면 좋은 꿈을 꿀 수 있을 것 같다고 생각했는데…… 두근거려서 잠이 안 오게 생겼잖아요~<emoji=heart04> 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "添い寝のような態勢になったまま、ちょっと眠くなってきたのか、言葉をとろんとさせるリーリア。"
translation = "곁잠을 자는 듯한 자세가 된 채로, 조금 졸음이 오는지 말투가 몽롱해지는 리리아."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それで、どうしますかぁ、センパイ？\u3000このまま、２人で眠っちゃいますか？\u3000ふふふ……<emoji=heart04>」"
translation = "「그래서, 어떻게 할까요, 선배? 이대로 둘이서 잠들어 버릴까요? 후후후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――センパイ……セ～ンパイ」"
translation = "「――선배…… 선~배.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、起きましたか～？\u3000ふふふっ<emoji=heart04>」"
translation = "「앗, 일어났어요~? 후후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目を覚ますと、俺はリビングのソファーで眠っていて、リーリアから頬を人差し指でつんつんされていた。"
translation = "눈을 뜨니 나는 거실 소파에서 잠들어 있었고, 리리아가 검지 손가락으로 내 뺨을 콕콕 찌르고 있었다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「眠っちゃってたんですね～♪\u3000おはようございます、あ・な・た<emoji=heart04>」"
translation = "「잠들어 버렸었네요~♪ 좋은 아침이에요, 여·보<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「って、驚いたような顔して、どうしました？\u3000あっ、もしかして、寝ぼけちゃってます？」"
translation = "「어라, 놀란 표정을 짓고 왜 그래요? 앗, 혹시 잠이 덜 깼어요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「もう、今日の予定を忘れちゃうなんて酷いですよ～。私たち、新婚なのに～♪」"
translation = "「정말, 오늘 예정도 잊어버리다니 너무해요~. 우리, 신혼인데~♪」"

[[dialogue]]
speaker = "unk"
original = "新婚！？！？"
translation = "신혼!?!?"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えへへへぇ<emoji=heart04>」"
translation = "「에헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "幸せそうな照れ笑いを浮かべるリーリアに、俺は驚いて目をぱちくりさせてしまうのだった。"
translation = "행복한 듯 수줍은 미소를 짓는 리리아를 보며, 나는 놀라서 눈을 깜빡거리고 말았다."

