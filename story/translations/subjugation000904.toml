[[dialogue]]
speaker = "unk"
original = "俺とフェリシーは今回の調査について改めて、カフェテリアで話し合うことになった。"
translation = "나와 펠리시는 이번 조사에 대해 다시 한번 카페테리아에서 이야기하기로 했다."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「――そっか、会長くんは今回の件、保健室で詳しい話を聞くようにって言われてたんだね？」"
translation = "「──그렇구나, 회장군은 이번 건에 대해 보건실에서 자세한 이야기를 듣기로 되어 있었구나?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「じゃあ、説明していくと……」"
translation = "「그럼 설명해 줄게……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「最近、夜になると、学園を徘徊する不審者が現れる、っていう報告が幾つも上がってきてるみたいなの」"
translation = "「최근 밤이 되면 학원을 배회하는 불심검문자가 나타난다는 보고가 몇 건이나 올라오고 있는 것 같아」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「その報告の中で、不審者が出入りしてる場所っていうのが――」"
translation = "「그 보고 중에 불심검문자가 드나드는 장소라는 게──」"

[[dialogue]]
speaker = "unk"
original = "新星学園の保健室？"
translation = "신성학원 보건실?"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「そう。誰もいなかったはずの保健室から人影が出て来るのを見た……とか。保健室に戻って行ったと思ったら、姿が消えていた……とか。そんな感じみたい」"
translation = "「응. 아무도 없었을 보건실에서 사람 그림자가 나오는 걸 봤다든가, 보건실로 돌아갔나 싶더니 모습이 사라졌다든가. 그런 느낌인가 봐」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「報告を受けた学園側が先に調査をしたらしいんだけど、それらしい侵入者や学園生の痕跡は確認できなかったんだって」"
translation = "「보고를 받은 학원 측이 먼저 조사를 한 모양인데 그럴싸한 침입자나 학생의 흔적은 확인되지 않았대」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「にもかかわらず、目撃情報は上がり続けてる。生徒達の間では、悪霊か悪魔の仕業じゃないかっていう噂も広がってるの」"
translation = "「그럼에도 불구하고 목격 정보는 계속 올라오고 있어. 학생들 사이에서는 악령이나 악마의 짓이 아니냐는 소문도 퍼지고 있지」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「そこで、『ロールスター』である私の元に依頼が来たっていうわけ」"
translation = "「그래서 『롤 스타』인 나에게 의뢰가 온 거라는 말씀」"

[[dialogue]]
speaker = "unk"
original = "ロールスター？\u3000それって――"
translation = "롤 스타? 그건──"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「あっ、そっか。ごめん、日本では『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』って呼び方のほうがよかったかな？」"
translation = "「앗, 그렇구나. 미안, 일본에서는 『선성자』라는 명칭이 더 나으려나?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ひょっとしたらもう知ってるかもしれないけど……ジュエリーと同じで、私も実は、選星者の内の１人なんだ！」"
translation = "「혹시 이미 알고 있을지도 모르겠지만…… 주얼리랑 똑같이 나도 사실 선성자 중 한 명이야!」"

[[dialogue]]
speaker = "unk"
original = "選星者――それは、日傘探偵のジュエリー曰く、女神様から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指すという。"
translation = "선성자── 그것은 양산 탐정 주얼리에 따르면 여신님으로부터 『역직』을 부여받은 자를 지칭한다고 한다."

[[dialogue]]
speaker = "unk"
original = "選星者は天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"
translation = "선성자는 하늘의 계시를 통해 태어날 때부터 그 사실을 자각하며 역직에 따른 특수한 능력을 부여받는다."

[[dialogue]]
speaker = "unk"
original = "ジュエリーの役職は『名探偵』。他には『大怪盗』『予言者』などが存在しているらしい。"
translation = "주얼리의 역직은 『명탐정』. 그 외에는 『대괴도』 『예언자』 등이 존재한다고 한다."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「――で、私の役職は『祓魔師』」"
translation = "「──그래서 내 역직은 『엑소시스트』」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「改めて、エクソシストの仕事についてしっかりと説明しておくと……個人的にあまり好きな言い方じゃないんだけど、『悪魔祓い』のことなんだ」"
translation = "「다시 한번 엑소시스트의 일에 대해 확실히 설명하자면 개인적으로 별로 좋아하지 않는 표현이지만 『악마 제거』라고 할 수 있어」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「この世界には、星力以外にもまだ解明されていない不思議な力が幾つもある。たとえば、幽霊とかもその１つ」"
translation = "「이 세상에는 성력 이외에도 아직 해명되지 않은 신비한 힘이 몇 가지 더 있어. 예를 들어 유령도 그중 하나지」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「幽霊はちゃんと実在していて……ほら、確か新星学園にも幽霊を連れている子がいたでしょ？」"
translation = "「유령은 엄연히 실재하고 있고…… 봐봐, 분명 신성학원에도 유령을 데리고 다니는 애가 있었지?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「人と同じで、あの子が連れているみたいな良い幽霊もいれば、他者に害を為そうとする悪霊も存在する」"
translation = "「사람과 마찬가지로 그 애가 데리고 다니는 것 같은 착한 유령도 있고, 타인에게 해를 끼치려는 악령도 존재해」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「エクソシストはそういった悪霊を、お祈りによって鎮めるのが、仕事の１つなんだ」"
translation = "「엑소시스트는 그런 악령을 기도를 통해 진정시키는 게 일 중 하나야」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「他には、リクリエの瘴気で異変が起きた土地や建物を元に戻したり、悪魔憑き――異形化してしまった人の体の一部を治したりとかね」"
translation = "「그 밖에는 리크리에의 장기로 이변이 생긴 토지나 건물을 원래대로 되돌리거나, 악마 들림── 이형화된 사람의 몸 일부를 고치거나 하는 거지」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「それで、今回の保健室の件に話を戻すけど……」"
translation = "「그래서 이번 보건실 건으로 이야기를 돌리자면……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「目撃されている不審者について、星力やリクリエの気配は検知されてないらしいんだ。だから、悪霊の仕業なんじゃないかって噂になっているんだと思う」"
translation = "「목격되고 있는 불심검문자에 대해 성력이나 리크리에의 기척은 감지되지 않았나 봐. 그래서 악령의 짓이 아닐까 하는 소문이 난 거라고 생각해」"

[[dialogue]]
speaker = "unk"
original = "フェリシーの専門分野ってことか"
translation = "펠리시의 전문 분야라는 거네"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「そういうこと！\u3000それに――」"
translation = "「바로 그거야! 게다가──」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「依頼とは別に私個人としても、噂の正体をちゃんと確かめたいんだ」"
translation = "「의뢰와는 별개로 나 개인으로서도 소문의 정체를 제대로 확인하고 싶어」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「あのね、実は……今回の件、不審者の正体はソフレなんじゃないかって疑われてるの」"
translation = "「저기 말이야, 사실은…… 이번 건, 불심검문자의 정체가 소프레가 아닐까 의심받고 있거든」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「『暴虐の吸血鬼』が、何やらよからぬことを企んでいるんじゃないかって……」"
translation = "「『폭학의 흡혈귀』가 뭔가 좋지 않은 일을 꾸미고 있는 게 아니냐면서……」"

[[dialogue]]
speaker = "unk"
original = "暴虐の吸血鬼？"
translation = "폭학의 흡혈귀?"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「うん。ソフレは今からちょうど１００年前――」"
translation = "「응. 소프레는 지금으로부터 정확히 100년 전──」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「流星市国で暴れて、人々に恐れられた、伝説の吸血鬼なんだ」"
translation = "「유성시국에서 난폭하게 굴어 사람들에게 공포의 대상이었던 전설적인 흡혈귀야」"

