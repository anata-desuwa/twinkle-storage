[[dialogue]]
speaker = "unk"
original = "第３話,アイドルの可能性,P"
translation = "제3화, 아이돌의 가능성, P"

[[dialogue]]
speaker = "unk"
original = "とある放課後、ルルカが所属する聖歌隊の練習を見学しに、俺は大聖堂を訪れていた。"
translation = "어느 방과 후, 루루카가 소속된 성가대의 연습을 견학하러 나는 대성당을 방문했다."

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、お兄ちゃん！\u3000見に来てくれたんだ～♪」"
translation = "「앗, 오빠! 보러 와줬구나~♪」"

[[dialogue]]
speaker = "unk"
original = "綺麗な歌声だったよ"
translation = "아름다운 노랫소리였어"

[[dialogue]]
speaker = "ルルカ"
original = "「褒めてくれてありがとう♪\u3000でも、コーラスだし、なかなか目立つのは難しいよね」"
translation = "「칭찬해 줘서 고마워♪ 하지만 합창이라 좀처럼 눈에 띄기는 어렵네」"

[[dialogue]]
speaker = "ルルカ"
original = "「単独で歌わせてもらえたら話は別なんだけど、先輩たちくらい上手にならなきゃ、逆に悪目立ちしちゃうし」"
translation = "「단독으로 노래하게 해준다면 이야기가 다르겠지만, 선배들만큼 잘하게 되지 않으면 오히려 나쁜 쪽으로 눈에 띌 테고」"

[[dialogue]]
speaker = "ルルカ"
original = "「ほんっと、うちの聖歌隊って上手い人多すぎだよ。歌には自信があったあたしも、プライドをバキバキに折られちゃうレベルだもん」"
translation = "「정말 우리 성가대에는 노래 잘하는 사람이 너무 많아. 노래에는 자신 있었던 나도 프라이드가 산산조각 날 수준인걸」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんはいつもあたしの歌を褒めてくれるし、Ｖチューバーとして人気が出てきた後は、歌が上手いって言われることも増えたんだけどね～」"
translation = "「오빠는 항상 내 노래를 칭찬해 주고, VTuber로서 인기가 생긴 뒤에는 노래 잘한다는 소리를 듣는 일도 늘었지만 말이야~」"

[[dialogue]]
speaker = "ルルカ"
original = "「でも実際、突き抜けて歌が上手い人がすぐ近くにいると、圧倒されちゃう」"
translation = "「하지만 실제로 압도적으로 노래 잘하는 사람이 바로 근처에 있으면 기가 죽어버려」"

[[dialogue]]
speaker = "unk"
original = "ルルカがちらっと視線を向ける。"
translation = "루루카가 살짝 시선을 돌린다."

[[dialogue]]
speaker = "unk"
original = "その先には――"
translation = "그 끝에는──"

[[dialogue]]
speaker = "ルルカ"
original = "「世界的に有名な歌姫――レミカ先輩とかね」"
translation = "「세계적으로 유명한 가희── 레미카 선배라든가 말이야」"

[[dialogue]]
speaker = "ルルカ"
original = "「ほんっとにすごいんだよ、レミカ先輩。あたしのお母さん――<ruby>汐凪<rt>しおなぎ</rt></ruby>シャルルと同じくらい、天性の歌声を持ってる」"
translation = "「정말로 대단해, 레미카 선배. 우리 엄마── 시오나기 샤를만큼이나 천부적인 노랫소리를 가지고 있어」"

[[dialogue]]
speaker = "unk"
original = "そういえば、ルルカはアイドルに興味ないのか？"
translation = "그러고 보니 루루카는 아이돌에 관심 없어?"

[[dialogue]]
speaker = "ルルカ"
original = "「ん？\u3000あ～、もちろんお母さんが昔活躍してた時の映像とか沢山見てきたから、興味がないわけじゃないよ」"
translation = "「응? 아~ 물론 엄마가 옛날에 활약하던 영상 같은 거 많이 봐왔으니까 관심이 없는 건 아니야」"

[[dialogue]]
speaker = "ルルカ"
original = "「その影響でＶチューバーを始めたって部分もあるし。でも、あたしの場合は『歌を唄うこと』への興味の方が、もっと強いって感じかな」"
translation = "「그 영향으로 VTuber를 시작한 부분도 있고. 하지만 내 경우에는 『노래를 부르는 것』에 대한 관심이 훨씬 더 강하다는 느낌이려나」"

[[dialogue]]
speaker = "ルルカ"
original = "「な～に、お兄ちゃん？\u3000もしかしてあたしが、アイドルになる未来を想像しちゃった？」"
translation = "「뭐야, 오빠? 혹시 내가 아이돌이 되는 미래를 상상해 버렸어?」"

[[dialogue]]
speaker = "unk"
original = "ちょっとだけ"
translation = "조금만"

[[dialogue]]
speaker = "ルルカ"
original = "「ふふっ。でも顔出しで『ルルカ』としてアイドルになっちゃったら、お兄ちゃんだけの『妹』じゃなくなっちゃうよ？」"
translation = "「후훗. 하지만 얼굴을 까고 『루루카』로서 아이돌이 되어버리면, 오빠만의 『여동생』이 아니게 되어버린다구?」"

[[dialogue]]
speaker = "ルルカ"
original = "「大丈夫♪\u3000あたしはず～っと、お兄ちゃんだけのアイドルで、妹カノジョだからね<emoji=heart04>」"
translation = "「괜찮아♪ 나는 어~언제나 오빠만의 아이돌이자, 여동생 여자친구니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふふっ、でも妹で彼女か～。属性盛りすぎ<emoji=heart04>\u3000ちょっと贅沢だよね♪」"
translation = "「후훗, 그래도 여동생이면서 여자친구라니~. 속성이 너무 과해<emoji=heart04> 조금 사치스럽네♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「そうそう、アイドルと言えばこの前、芸能事務所の人が見学しに来たんだよ。レミカ先輩のいるポラリスプロダクションの人らしくて」"
translation = "「맞다 맞다, 아이돌이라고 하니 저번에 연예 기획사 사람이 견학하러 왔었어. 레미카 선배가 있는 폴라리스 프로덕션 사람인 것 같더라」"

[[dialogue]]
speaker = "ルルカ"
original = "「聖歌隊の中にめぼしい子がいたら、スカウトするつもりだったみたい」"
translation = "「성가대 중에 눈에 띄는 애가 있으면 스카우트할 생각이었나 봐」"

[[dialogue]]
speaker = "unk"
original = "まさかルルカもスカウトを？"
translation = "설마 루루카도 스카우트를?"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、うん。一応、名刺はもらったけど……」"
translation = "「아, 응. 일단 명함은 받았지만……」"

[[dialogue]]
speaker = "unk"
original = "ルルカがアイドルになったら困る！"
translation = "루루카가 아이돌이 되면 곤란해!"

[[dialogue]]
speaker = "ルルカ"
original = "「えっ！？\u3000そこまでなの？\u3000お兄ちゃん的には、てっきりアイドル活動してるあたしも見てみたい～って感じだと思ってたんだけど……」"
translation = "「엣!? 그 정도야? 오빠 입장에서는 분명 아이돌 활동을 하는 나도 보고 싶어~ 하는 느낌일 줄 알았는데……」"

[[dialogue]]
speaker = "ルルカ"
original = "「でも、安心して。スカウトされたけど、ちゃんと断っておいたから」"
translation = "「하지만 안심해. 스카우트 제의를 받았지만 제대로 거절해 뒀으니까」"

[[dialogue]]
speaker = "ルルカ"
original = "「――あたしにはもう『ルカルカ』の活動があるからね。いつも見に来てくれる『お兄ちゃん』『お姉ちゃん』を大事にしたいから」"
translation = "「――나한테는 이미 『루카루카』 활동이 있으니까 말이야. 항상 보러 와주는 『오빠』 『언니』들을 소중히 여기고 싶거든」"

[[dialogue]]
speaker = "ルルカ"
original = "「今のルカルカがあるのは、リスナーさん達のおかげだもん」"
translation = "「지금의 루카루카가 있는 건 리스너분들 덕분인걸」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、もちろんお兄ちゃんのおかげでもあるんだよ？\u3000感謝してもしきれないほど、たくさん協力してもらってるしね」"
translation = "「아, 물론 오빠 덕분이기도 해? 감사해도 모자랄 정도로 잔뜩 도움받고 있기도 하고」"

[[dialogue]]
speaker = "ルルカ"
original = "「それに彼氏としても……いつもあたしに頑張る力をくれてありがとうね、お兄ちゃん<emoji=heart04>」"
translation = "「게다가 남자친구로서도…… 항상 나에게 힘낼 수 있는 에너지를 줘서 고마워, 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「って、そんな話してたら、なんだかちょっと……」"
translation = "「앗, 그런 이야기를 했더니 왠지 조금……」"

[[dialogue]]
speaker = "ルルカ"
original = "「キス、したくなってきちゃった<emoji=heart04>\u3000でも、ダメだよね……周りに聖歌隊のみんながいるし……」"
translation = "「키스, 하고 싶어져 버렸어<emoji=heart04> 하지만 안 되겠지…… 주변에 성가대 모두가 있고……」"

[[dialogue]]
speaker = "ルルカ"
original = "「ん～、だけどお兄ちゃん成分もちょっと充電したいし……ここでしても大丈夫そうなイチャイチャというと――」"
translation = "「으음~, 하지만 오빠 성분도 조금 충전하고 싶고…… 여기서 해도 괜찮을 법한 꽁냥질이라고 하면――」"

[[dialogue]]
speaker = "unk"
original = "ルルカは俺の手を取って、そっと繋いできた。"
translation = "루루카는 내 손을 잡고 살며시 깍지를 껴왔다."

[[dialogue]]
speaker = "ルルカ"
original = "「えへへ<emoji=heart04>\u3000これくらいならセーフ……だよね？」"
translation = "「에헤헤<emoji=heart04> 이 정도라면 세이프……지?」"

[[dialogue]]
speaker = "unk"
original = "どっちにしても注目されちゃうぞ？"
translation = "어느 쪽이든 주목받을 텐데?"

[[dialogue]]
speaker = "ルルカ"
original = "「え？\u3000あ、あれ？\u3000あたし達は恋人同士だって知られてるし、手を繋いでるだけなのに……」"
translation = "「에? 아, 어라? 우리는 연인 사이라고 알려져 있고, 손을 잡고 있을 뿐인데……」"

[[dialogue]]
speaker = "ルルカ"
original = "「指を絡める『恋人繋ぎ』って、そ、そんなに恥ずかしいことだったかな……？」"
translation = "「손가락을 얽는 『연인 잡기』가 그, 그렇게 부끄러운 일이었나……?」"

[[dialogue]]
speaker = "ルルカ"
original = "「うぅ～……な、なんか、急に顔が熱くなってきちゃった……」"
translation = "「으으~…… 왠, 왠지 갑자기 얼굴이 뜨거워지기 시작했어……」"

[[dialogue]]
speaker = "ルルカ"
original = "「と、とりあえず、そろそろ休憩終わるから、あたし行くねっ」"
translation = "「어, 어쨌든 슬슬 휴식 끝나니까 나 갈게!」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、そうだ――」"
translation = "「아, 맞다――」"

[[dialogue]]
speaker = "unk"
original = "ルルカは俺の耳元に顔を近づけて、囁く。"
translation = "루루카는 내 귓가에 얼굴을 가까이 대고 속삭인다."

[[dialogue]]
speaker = "ルルカ"
original = "「練習が終わったら、一緒に帰ろ？\u3000それで……」"
translation = "「연습 끝나면 같이 돌아가자? 그리고……」"

[[dialogue]]
speaker = "ルルカ"
original = "「２人きりになったら、いっぱいキスしようね、お兄ちゃん<emoji=heart04>」"
translation = "「둘만 있게 되면 키스 잔뜩 하자, 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、手を振りながら、ルルカは練習へと戻って行く。"
translation = "그렇게 말하며 손을 흔들며 루루카는 연습하러 돌아간다."

[[dialogue]]
speaker = "unk"
original = "俺は耳元に甘い囁きの余韻を残したまま、彼女の練習が終わるのが待ち遠しくなってしまうのだった――"
translation = "나는 귓가에 달콤한 속삭임의 여운을 남긴 채, 그녀의 연습이 끝나기만을 애타게 기다리게 되는 것이었다――"

