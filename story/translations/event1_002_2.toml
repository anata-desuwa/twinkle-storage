[[dialogue]]
speaker = "unk"
original = "リゾート結界に閉じ込められてしまった俺達は、リップルから改めて話を聞くことにした。"
translation = "리조트 결계에 갇혀버린 우리들은 리플로부터 다시 이야기를 듣기로 했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあ、結界から脱出できるようにする為にも、リップルのことを詳しく教えて貰えないかしら？」"
translation = "「그럼 결계에서 탈출할 수 있도록 하기 위해서라도, 리플에 대해 자세히 알려주지 않겠니?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「星力や星術のことも今まで知らなかったようですし……リップルさんは、結界について、目覚めた時から使えた力だって仰っていましたよね？」"
translation = "「성력이나 성술에 대해서도 지금까지 몰랐던 것 같고…… 리플 씨는 결계에 대해 깨어났을 때부터 쓸 수 있었던 힘이라고 하셨죠?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そういえば、確かに。『目覚めた』っていうのは、一体どういう意味なの？」"
translation = "「그러고 보니 확실히. 『깨어났다』는 건 대체 무슨 뜻이야?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「う～ん、あのデスね。実はワタシが目覚めたのは、人間界で、１年ちょっと前くらいのハナシなんです。それまではずっと、結界の中でネムっていました」"
translation = "「으음, 그게 말임다. 사실 와타시가 깨어난 건 인간계에서 1년 좀 전쯤의 이야기임다. 그전까지는 계속 결계 속에서 자고 이썼슴다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「眠っていた……とは？」"
translation = "「자고 있었다니……?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「え～と、上手く伝わるか分からないデスけど、結界の中で封印サレていた、というカンジです」"
translation = "「에또, 잘 전달될지 모르겠지만 결계 속에 봉인되어 이썼다, 는 느낌임다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「一緒に眠っていたお母さんが、夢の中で、大昔に自分の体ごと結界で包んで、封印したんだって言っていたのをオボえてます」"
translation = "「같이 자고 이떤 엄마가 꿈속에서, 아주 옛날에 자기 몸을 결계로 감싸서 봉인했다고 말했던 걸 기억함다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「お母さんは結界の中で先に寿命を迎えてシマいましたが、それと同時にワタシは封印がトケて、目覚めたというワケです」"
translation = "「엄마는 결계 속에서 먼저 수명을 다해버렸지만, 그와 동시에 와타시는 봉인이 풀려서 깨어났다는 검다」"

[[dialogue]]
speaker = "unk"
original = "そうか……お母さんが……"
translation = "그렇구나…… 어머니가……"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「あっ、その時は悲しかったけど、今はもうダイジョウブですよ？\u3000シショ―やオクサンと出会って、家族みたいに優しくしてモラいましたから！」"
translation = "「앗, 그때는 슬펐지만 지금은 이제 괜찮슴다! 스승님과 사모님을 만나서 가족처럼 다정하게 대해주셨으니까여!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「シショ―とオクサンの夫婦は、夏に海の家を経営してて、去年はそこでお世話にナリました。そこで、ワタシは夏の海のミリョクを知ったのです！」"
translation = "「스승님과 사모님 부부는 여름에 바다의 집을 경영하고 이써서, 작년에는 거기서 신세를 졌슴다. 거기서 와타시는 여름 바다의 매력을 알게 된 검다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「夏の海はＢＩＧスバラしいです！\u3000ひとりぼっちで悲しい気持ちだったワタシを、楽しくて明るい気持ちでイッパイにシテくれました！」"
translation = "「여름 바다는 BIG 굉장함다! 외톨이라서 슬픈 마음이었던 와타시를 즐겁고 밝은 마음으로 가득 채워주었슴다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「しかし、日本には季節の移り変わりというものがアリます。夏はあっという間に終わってしまい、ワタシは残念な気持ちにナリました」"
translation = "「하지만 일본에는 계절의 변화라는 게 이씀다. 여름은 순식간에 끝나버려서 와타시는 아쉬운 마음이 들었슴다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そこでワタシは、オモい付いたのです。ワタシの結界なら、いつでもトコナツの海を楽しめる空間が作れるのではナイかと！」"
translation = "「그래서 와타시는 생각했슴다. 와타시의 결계라면 언제든 상하의 바다를 즐길 수 있는 공간을 만들 수 있지 않을까 하고!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それでこのリゾート結界を作ったのね～」"
translation = "「그래서 이 리조트 결계를 만든 거구나~」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000１ヶ月ほど前にワタシは、お世話になっていたシショ―達のところをハナれ、リゾート結界のベースとなる素敵な場所をサガす為、タビに出たのです！」"
translation = "「네! 한 달 전쯤에 와타시는 신세 지던 스승님들 곁을 떠나 리조트 결계의 베이스가 될 멋진 장소를 찾기 위해 여행을 떠났슴다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウして見つけたのが、カイチョー達がやって来た無人島だったというワケです。ここは小さいながら、夏の魅力を詰め込んだ島だと感じマシタので！」"
translation = "「그렇게 해서 찾은 게 카이쵸 일행이 찾아온 무인도였다는 검다. 여기는 작지만 여름의 매력을 가득 담은 섬이라고 느꼈으니까여!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「分かるかも～。この無人島、無性に探検してみたくてワクワクするもの♪」"
translation = "「이해할 것 같아~. 이 무인도, 왠지 모르게 탐험해보고 싶어서 두근두근거리는걸♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「でも、この島が誰かの所有物ダッタなんて、全然気付きマセンでした……」"
translation = "「하지만 이 섬이 누군가의 소유물이었다니 전혀 몰랐슴다……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「勝手に居座ってしまって、そのせいで結界の中に巻き込んでしまって、ゴメンナサイです、ヴィーナス」"
translation = "「멋대로 눌러앉아 버려서, 그 바람에 결계 속에 휘말리게 해서 죄송함다, 비너스」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ああ、いいのいいの。リップルに悪気があったわけじゃないんだし、九浄家の看板を立ててたわけじゃないしね」"
translation = "「아냐, 괜찮아. 리플이 나쁜 뜻이 있었던 것도 아니고, 쿠죠 가문의 간판을 세워둔 것도 아니었으니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こうしてリップルと出会ったのも何かの縁だと思うわ。元々ここに来ている全員、１週間合宿に出かけて来ると伝えてあるし――」"
translation = "「이렇게 리플과 만난 것도 무슨 인연이라고 생각해. 원래 여기 온 사람들 모두 1주일 합숙 다녀오겠다고 말해뒀고──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「せっかくだから、この結界の中でサバイバル強化合宿をすればいいわね！\u3000その間にリップルのスランプ解決も出来れば……」"
translation = "「이왕 이렇게 된 거, 이 결계 속에서 서바이벌 강화 합숙을 하면 되겠네! 그사이에 리플의 슬럼프 해결도 할 수 있다면……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム」"
translation = "「노 프로블럼」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そういうことよ！」"
translation = "「바로 그거야!」"

[[dialogue]]
speaker = "unk"
original = "むしろサバイバルが楽になったかな？"
translation = "오히려 서바이벌이 편해졌으려나?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「言われてみればそうですね。リップルさん、この海の家に食料はあるのでしょうか？」"
translation = "「듣고 보니 그렇네요. 리플 씨, 이 바다의 집에 식량은 있을까요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「いっぱいアリますよ～♪\u3000ワタシの結界は、食べ物もツクれますので！」"
translation = "「가득 이씀다~♪ 와타시의 결계는 음식도 만들 수 있으니까여!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ、本当に！？\u3000内心不安だったけど、ここが楽園に思えて来たかも……！」"
translation = "「엣, 정말!? 내심 불안했는데 여기가 낙원처럼 느껴지기 시작했을지도……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふっ♪\u3000海も綺麗だし、こんなところを独占できるなんて、まさにリゾートね～♪」"
translation = "「우후후♪ 바다도 예쁘고 이런 곳을 독점할 수 있다니 그야말로 리조트네~♪」"

[[dialogue]]
speaker = "unk"
original = "そういうわけで、皆でスランプ解決を手伝うよ"
translation = "그런 고로 다 같이 슬럼프 해결을 도와줄게"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アリガトございます！\u3000ＢＩＧ感謝です！」"
translation = "「감사함다! BIG 감사임다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あの、ところで皆さん。私から１つ確認したいことがあるのですが……」"
translation = "「저기, 그런데 여러분. 제가 한 가지 확인하고 싶은 게 있습니다만……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうしたの、アナ？」"
translation = "「왜 그래, 아나?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さっきから違和感があって気付いたんですが、この結界内、星力が使えなくないですか？」"
translation = "「아까부터 위화감이 들어서 깨달은 건데, 이 결계 안에서는 성력을 쓸 수 없지 않나요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え……？\u3000あっ！？\u3000本当だ……変身出来ない！？」"
translation = "「에……? 앗!? 정말이다…… 변신할 수 없어!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000それどころか、守護星との繋がりが感じられません。もしかして、この結界って……」"
translation = "「! 그뿐만 아니라, 수호성과의 연결이 느껴지지 않아요. 설마 이 결계는……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「考えられるのは、結界で守護星とのリンクが遮断されている、とか……」"
translation = "「생각할 수 있는 건, 결계 때문에 수호성과의 링크가 차단되어 있다거나……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～。それはちょっと不便かもしれないわね……」"
translation = "「어머~. 그건 좀 불편할지도 모르겠네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんてことなの……！\u3000これじゃあ……強化合宿なのに、訓練が出来ないじゃない！」"
translation = "「이럴 수가……! 이래선…… 강화 합숙인데 훈련을 할 수 없잖아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「心配するとこ、そこ？」"
translation = "「걱정하는 포인트가 거기야?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「シュゴセイ？\u3000それって何です？」"
translation = "「슈고세이? 그게 뭐임까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうでした。リップルさんは星力自体知らなかったんですよね」"
translation = "「그랬었죠. 리플 씨는 성력 자체를 모르고 계셨네요」"

[[dialogue]]
speaker = "unk"
original = "説明すると、守護星っていうのは――"
translation = "설명하자면, 수호성이라는 건――"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「――ふむふむ、なるほど！\u3000結界を使う時に力を貸してくれている星があるのはカンジていましたが、それがワタシのシュゴセイだったのデスね！」"
translation = "「――흐음흐음, 그렇군여! 결계를 쓸 때 힘을 빌려주는 별이 있다는 건 느끼고 이씀다만, 그게 와타시의 슈고세이였던 거네여!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そういうことなら、ワタシ思い付きました！\u3000結界の空にも同じ名前の星を作ればイイのです！」"
translation = "「그렇다면 와타시, 좋은 생각이 났슴다! 결계의 하늘에도 같은 이름의 별을 만들면 되는 거임다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ、そんなこと出来るの！？」"
translation = "「엣, 그런 게 가능해!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「デキます！\u3000星の名前は皆さんからそれぞれ聞きましたから、後はそれを現実世界からコピーして、ペーストするダケです！」"
translation = "「가능함다! 별 이름은 여러분께 각각 들었으니까여, 남은 건 그걸 현실 세계에서 복사해서 붙여넣기만 하면 됨다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「行きマスよ～。星空は後回しにしてましたケド、この機会にツクリま～す！」"
translation = "「갑니다아~. 별하늘은 나중으로 미뤄뒀었지만, 이 기회에 만들게씀다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オイデマセ、シュゴセイ！\u3000ぬぅ～ん……ソォイッ！」"
translation = "「오이데마세, 슈고세이! 느으으~읍…… 소잇!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「きゃっ、何！？\u3000何が起こってるの！？」"
translation = "「꺄악, 뭐야!? 무슨 일이 일어나고 있는 거야!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪」"
translation = "「어머나~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「またしても、何も見えないわ！」"
translation = "「또다시 아무것도 안 보여!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「し、視界が晴れたと思ったら……周りの景色がいつの間にか夜に！？」"
translation = "「시, 시야가 갰나 싶더니…… 주변 풍경이 어느새 밤으로!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ふぅ……星を作るのはカンリョウしました！\u3000これでセイリョク、使うことがデキますか？」"
translation = "「후우…… 별을 만드는 건 완료해씀다! 이걸로 성력, 사용하는 게 가능함까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「やってみます。守護星との接続……行けます！\u3000でも、何でしょう？\u3000普段と少し違う感じが……」"
translation = "「해보겠습니다. 수호성과의 접속…… 가능해요! 하지만 뭘까요? 평소와 조금 다른 느낌이……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「とりあえず皆、変身よ！\u3000え～いっ！」"
translation = "「일단 다들 변신이야! 에잇!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……よし、星力が使えるわ！\u3000って皆、姿変わってなくない？」"
translation = "「……좋아, 성력을 쓸 수 있어! 근데 얘들아, 모습이 안 변하지 않았어?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ、違います。これは……！」"
translation = "「아니요, 다릅니다. 이것은……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「驚くべきことですが、どうやら私達、水着が戦闘服に変化しているみたいです……！」"
translation = "「놀라운 일이지만, 아무래도 저희, 수영복이 전투복으로 변화한 것 같아요……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もしかして、本来の守護星じゃなくて、リップルちゃんが作ったリゾート結界の星で変身したからかしら～？」"
translation = "「혹시 본래의 수호성이 아니라, 리플짱이 만든 리조트 결계의 별로 변신해서 그런 걸까나~?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「守護星との関係性の変化によって、星力の性質は変化することがあると、論文で見かけたことがあります。おそらくこの水着フォームは、そういうことかと」"
translation = "「수호성과의 관계성 변화에 따라 성력의 성질이 변화할 수 있다는 논문을 본 적이 있습니다. 아마 이 수영복 폼은 그런 것이 아닐까 하고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「凄いわ！\u3000パワーアップする為に強化合宿に来たわけだけど、こんな形で新しい力を得ることになるなんて！」"
translation = "「대단해! 파워업하기 위해 강화 합숙에 온 거지만, 이런 형태로 새로운 힘을 얻게 될 줄이야!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワオ♪\u3000これが皆さんのセイリョクなんですね！」"
translation = "「와오♪ 이것이 여러분의 성력이군여!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシも真似してやってみま～す♪\u3000ソォイッ！」"
translation = "「와타시도 흉내 내서 해보게씀다~♪ 소잇!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オウ♪\u3000見てクダさ～い！\u3000この姿、どうデスか？」"
translation = "「오우♪ 봐주세여! 이 모습, 어떻슴까?」"

[[dialogue]]
speaker = "unk"
original = "リップルも水着に変身した！"
translation = "리플도 수영복으로 변신했다!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「リップルちゃん、凄く似合っていて可愛いと思うわ～♪\u3000妹に欲しいくらい♪」"
translation = "「리플짱, 정말 잘 어울리고 귀엽다고 생각해~♪ 여동생 삼고 싶을 정도네♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「エヘヘ、照れま～す♪」"
translation = "「에헤헤, 쑥스럽슴다♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「サーシャさん、ソフィアが聞いたら嫉妬しちゃいますよ」"
translation = "「사샤 씨, 소피아가 들으면 질투하겠어요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～ん、それは困るわ～。フィオナちゃん、今のは秘密にしててね～？」"
translation = "「아앙, 그건 곤란하네~. 피오나짱, 방금 건 비밀로 해줘~?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふっ、考えときます」"
translation = "「후훗, 생각해보죠」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さて、これで星力も使えるようになったし、強化合宿も問題なく出来るわね！」"
translation = "「자, 이걸로 성력도 쓸 수 있게 됐고, 강화 합숙도 문제없이 할 수 있겠네!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあ改めて、リップルも加えて、結界から脱出する為の強化合宿、スタートよ！」"
translation = "「그럼 다시 한번, 리플도 포함해서 결계에서 탈출하기 위한 강화 합숙, 스타트야!」"

[[dialogue]]
speaker_original = "みんな"
speaker_translation = "모두"
original = "「おー！」"
translation = "「오ー!」"

[[dialogue]]
speaker = "unk"
original = "こうして、合宿がスタートするのだった――"
translation = "이렇게 해서 합숙이 시작되는 것이었다――"

