[[dialogue]]
speaker = "unk"
original = "第４話,マムとのこれから,P"
translation = "제4화, 마무와의 앞으로"

[[dialogue]]
speaker = "unk"
original = "マムとの付き合いもそこそこ長くなって来た、ある日のこと。"
translation = "마무와 알고 지낸 지도 꽤 시간이 흐른 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "星徒会の残業を彼女が手伝ってくれていたのだが──"
translation = "성도회의 잔업을 그녀가 도와주고 있었는데──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長。仕事の手、一旦止めなさい」"
translation = "「회장. 업무 손 멈춰」"

[[dialogue]]
speaker = "unk"
original = "マム、どうかした？"
translation = "마무, 왜 그래?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どうかした、じゃないわよ。アナタ、顔色がちょっと悪いわよ」"
translation = "「왜 그래, 가 아니야. 당신, 안색이 좀 안 좋잖아」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「今日、日中は戦闘出動があったでしょ。無理してるんじゃない？」"
translation = "「오늘 낮에는 전투 출동이 있었지. 무리하고 있는 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "まあ、実は疲れがちょっと……"
translation = "뭐, 사실 피로가 좀……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「やっぱり……まったく、馬鹿らしい。こんな書類仕事ごときで体調崩してどうするの」"
translation = "「역시…… 정말이지, 한심해. 이런 서류 작업 따위로 컨디션 무너지면 어떡하자는 거야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「決めたわ。今日の仕事はこれにて打ち切りよ」"
translation = "「결정했어. 오늘 업무는 이걸로 끝이야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それから会長、こっちのソファーに来て、座りなさい」"
translation = "「그리고 회장, 이쪽 소파로 와서 앉아」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「拒否権は認めないわ、これは<b>寮長命令</b>よ」"
translation = "「거부권은 인정하지 않아, 이건 <b>기숙사장</b> <b>명령</b>이야」"

[[dialogue]]
speaker = "unk"
original = "マムと並んでソファーに座ると、彼女は引力操作を使い、強引に俺の頭を自分の膝の上に乗せた。"
translation = "마무와 나란히 소파에 앉자, 그녀는 인력 조작을 사용해 강제로 내 머리를 자신의 무릎 위에 올렸다."

[[dialogue]]
speaker = "unk"
original = "わっ、これって……"
translation = "왓, 이건……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「いわゆる膝枕というやつね。畏怖をもって感謝なさい、寮生でも滅多にしてあげることないんだから」"
translation = "「이른바 무릎 베개라는 거야. 경외심을 가지고 감사하도록 해, 기숙사생에게도 좀처럼 해주지 않는 거니까」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、顔が赤いわよ？\u3000ひょっとして熱があるんじゃない？」"
translation = "「어머, 얼굴이 붉네? 혹시 열이 있는 거 아니야?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なに、違う？\u3000膝枕が照れくさい？」"
translation = "「뭐, 아니라고? 무릎 베개가 쑥스러워?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「最初の頃に比べて、先輩の私に随分と気安く接するようになった癖に、今更そんなことを気にするわけ？」"
translation = "「처음엔 안 그러더니, 선배인 나한테 꽤나 스스럼없이 대하게 된 주제에 이제 와서 그런 걸 신경 쓰는 거야?」"

[[dialogue]]
speaker = "unk"
original = "いや、今だからこそ、むしろ気になるというか……"
translation = "아니, 지금이니까 오히려 신경 쓰인다고 할까……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「とにかく、起き上がるのは却下よ。このまま横になってなさい」"
translation = "「어쨌든, 일어나는 건 기각이야. 이대로 누워 있어.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「しばらく安静にしていれば、少しは気分も良くなるでしょ」"
translation = "「잠시 안정을 취하고 있으면 기분도 좀 나아지겠지.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「まったく、それにしても……」"
translation = "「정말이지, 그나저나……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「最近少しは会長らしくなって来たと思っていたけど、まだまだね」"
translation = "「최근엔 조금은 회장다워졌다고 생각했는데, 아직 멀었네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「リクリエはこっちの都合なんて待ってはくれないわ。体調を万全に整えるのも、会長としての大事な仕事よ」"
translation = "「리크리에는 우리 사정 따윈 기다려주지 않아. 컨디션을 만전으로 조절하는 것도 회장으로서 중요한 일이야.」"

[[dialogue]]
speaker = "unk"
original = "ごめん、マムの言う通りだ……"
translation = "미안, 마무의 말이 맞아……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「十分に反省なさい。ただ、今は余計なことを考えず、ゆっくりと休むこと」"
translation = "「충분히 반성하도록 해. 다만, 지금은 쓸데없는 생각 하지 말고 푹 쉴 것.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「疲れているなら、少し眠っててもいいわよ」"
translation = "「피곤하면 조금 자도 괜찮아.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私はここから動かなくとも、引力操作で物を動かせるし」"
translation = "「난 여기서 움직이지 않아도 인력 조작으로 물건을 움직일 수 있으니까.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ……アナタの髪、初めて触ったけど、なかなか触り心地が良いわね」"
translation = "「후훗…… 네 머리카락, 처음 만져보는데 제법 감촉이 좋네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「少し梳いてあげましょうか。……ふっ、何だか大きな子供を相手にしてるような気分ね」"
translation = "「조금 빗겨줄까. ……훗, 왠지 커다란 어린애를 상대하는 기분이네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん？\u3000どうかしたかしら？」"
translation = "「응? 왜 그러니?」"

[[dialogue]]
speaker = "unk"
original = "どうしてマムは優しくしてくれるの？"
translation = "어째서 마무는 상냥하게 대해주는 거야?"

[[dialogue]]
speaker = "unk"
original = "……俺は寮生じゃないのに、"
translation = "……난 기숙사생도 아닌데,"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「何を言い出すかと思えば……そんなことを気にしてたわけ？」"
translation = "「무슨 말을 하나 했더니…… 그런 걸 신경 쓰고 있었어?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「別に優しくしたつもりはないけれど……でも、そうね」"
translation = "「딱히 상냥하게 대할 생각은 없었지만…… 그래도, 그러네.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どうして、アナタに構うのかと問われれば──」"
translation = "「어째서 너를 챙겨주는 거냐고 묻는다면──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「アナタが私の後輩で、放っておけないからかしら」"
translation = "「네가 내 후배고, 내버려 둘 수 없어서일까.」"

[[dialogue]]
speaker = "unk"
original = "マムに心配させないような男になるよ"
translation = "마무에게 걱정 끼치지 않는 남자가 될게"

[[dialogue]]
speaker = "unk"
original = "だったらこれからは、"
translation = "그렇다면 앞으론,"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら……面白いことを言うじゃない？」"
translation = "「어머…… 재미있는 소리를 하네?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうして頂戴、と言いたいところだけど……」"
translation = "「그렇게 해주렴, 이라고 말하고 싶지만……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「立派になったらなったで、からかい甲斐がないわね。……ふふっ」"
translation = "「훌륭해지면 훌륭해진 대로 놀리는 보람이 없겠는걸. ……후훗.」"

[[dialogue]]
speaker = "unk"
original = "えぇ……"
translation = "에이……"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「冗談よ。せいぜい私に心配させないような男になってみせなさい」"
translation = "「농담이야. 기껏해야 나한테 걱정 끼치지 않는 남자가 되어 보렴.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「でも……ああ、そうね──」"
translation = "「하지만…… 아아, 그래──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長、アナタはとても強い。それなのに、どこか放っておけないからこそ、面白いのね。きっと」"
translation = "「회장, 너는 무척 강해. 그런데도 어딘가 내버려 둘 수 없으니까 재미있는 거겠지. 분명.」"

[[dialogue]]
speaker = "unk"
original = "マムはそう言うと、俺の頭を撫でながら微笑む。その眼差しはとても優しいもので──"
translation = "마무는 그렇게 말하며 내 머리를 쓰다듬으며 미소 짓는다. 그 눈빛은 무척이나 다정한 것이어서──"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、顔が赤いわよ？\u3000やっぱり熱でもあるんじゃない？」"
translation = "「어머, 얼굴이 빨개? 역시 열이라도 있는 거 아냐?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……違う？\u3000じゃあ、照れてるってこと？」"
translation = "「……아니야? 그럼, 부끄러워하고 있다는 뜻?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふふっ、変な子ね……」"
translation = "「후훗, 이상한 아이네……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、優しげな微笑みを浮かべながら人差し指で頬っぺたを突っついて来るマムに、俺はまたドキッとしてしまうのだった。"
translation = "그렇게 말하며 다정한 미소를 띄운 채 검지 손가락으로 볼을 쿡쿡 찌르는 마무에게, 나는 또 가슴이 두근거리고 마는 것이었다."

