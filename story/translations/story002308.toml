[[dialogue]]
speaker = "unk"
original = "レイラが倒れた直後、秋葉原が一瞬光に包まれ、俺の行く手を阻むように結界が発生した。"
translation = "레이라가 쓰러진 직후, 아키하바라가 한순간 빛에 휩싸이더니 내 앞길을 가로막듯 결계가 발생했다."

[[dialogue]]
speaker = "unk"
original = "ディマイズブレイカー！"
translation = "디마이즈 브레이커!"

[[dialogue]]
speaker = "unk"
original = "コラプサーの力か、純粋な防御力か、いくら攻撃してもビクともしない。"
translation = "콜랩서의 힘인지, 순수한 방어력인지 아무리 공격해도 꿈쩍도 하지 않는다."

[[dialogue]]
speaker = "unk"
original = "しかも結界周辺にはアステラまで発生しているようだ。応援は望めない。"
translation = "게다가 결계 주변에는 아스텔라까지 발생하고 있는 모양이다. 응원은 기대할 수 없다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ぐっ……はぁ、はぁ、はぁ……そっか、私、負けたんだ……」"
translation = "「윽…… 하아, 하아, 하아…… 그렇구나, 나, 졌구나……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さん。私はもう戦うつもりはありません……あなたの言葉で自分の過ちに気が付きました」"
translation = "「마왕님. 저는 이제 싸울 생각이 없습니다…… 당신의 말로 제 잘못을 깨달았어요.」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私もあの人を止め……くっ」"
translation = "「저도 그 사람을 멈추…… 윽.」"

[[dialogue]]
speaker = "unk"
original = "無理に立ち上がらないで"
translation = "무리해서 일어나지 마"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ありがとう、ございます……」"
translation = "「고맙, 습니다……」"

[[dialogue]]
speaker = "unk"
original = "ふらつくレイラに手を貸してやる。戦闘のダメージか、力の消耗が激しいのか、かなり苦しそうだ。"
translation = "비틀거리는 레이라를 부축해 준다. 전투의 데미지인지, 힘의 소모가 심한 건지 상당히 괴로워 보인다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ……魔王さんの手、血まみれで……何度も結界を攻撃して、こんなに……」"
translation = "「아…… 마왕님의 손이 피투성이라서…… 몇 번이나 결계에 공격을 가해서 이렇게나……」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「申し訳ありません、コハルコ様の救出に失敗しました。魔女イザベラも怪物へと姿を変え、暴走状態にあります」"
translation = "「면목 없습니다, 코하루코 님의 구출에 실패했습니다. 마녀 이자벨라도 괴물로 모습을 바꾸어 폭주 상태에 있습니다」"

[[dialogue]]
speaker = "unk"
original = "いつの間にか、マリオンさんが戻ってきていた。姿が変わっているが、今は気にしている場合ではない。"
translation = "어느샌가 마리온 씨가 돌아와 있었다. 모습이 바뀌어 있었지만, 지금은 신경 쓰고 있을 상황이 아니다."

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「拠点に侵入したまではよいのですが、返り討ちに遭いました。ですが、いくつか分かったことがあります」"
translation = "「거점에 침입한 것까지는 좋았습니다만, 역습을 당했습니다. 하지만 몇 가지 알아낸 것이 있습니다」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「まず、コラプサーはみな、一度死を経験している。守護星であるブラックホールの力で蘇った……違いますか、レイラ様？」"
translation = "「우선 콜랩서는 모두 한 번 죽음을 경험했습니다. 수호성인 블랙홀의 힘으로 되살아난 것이지요…… 맞습니까, 레이라 님?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「お気付きに、なられたのですね……そう、私たちコラプサーは本来は死人であり、ブラックホールと契約することでなんとか生き長らえています」"
translation = "「눈치채셨군요…… 네, 우리 콜랩서는 본래 죽은 자이며, 블랙홀과 계약함으로써 간신히 연명하고 있습니다」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「この結界は、コラプサーたちとブラックホールのリンクに干渉し、星力を奪うことで、維持されているものと思われます」"
translation = "「이 결계는 콜랩서들과 블랙홀의 링크에 간섭하여 성력을 빼앗음으로써 유지되는 것으로 보입니다」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「あなたが今、苦しんでいるのは、ブラックホールとのリンクが不安定になっているからでしょう。ネビュラで拘束しているコラプサーたちにも同様の症状が出ているはず」"
translation = "「당신이 지금 괴로워하는 것은 블랙홀과의 링크가 불안정해졌기 때문이겠지요. 네뷸라에 구속된 콜랩서들에게도 비슷한 증상이 나타나고 있을 것입니다」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「そしてもう１つ。この結界は、秋葉原を切り離し、魔女の森のように異空間とするものです。けして世界を救うものではありません。あなたたちコラプサーは騙されていたのです」"
translation = "「그리고 한 가지 더. 이 결계는 아키하바라를 격리하여 마녀의 숲처럼 이공간으로 만드는 것입니다. 결코 세계를 구하는 것이 아닙니다. 당신들 콜랩서는 속고 있었던 것입니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「そう……ですか」"
translation = "「그렇…… 습니까」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……だけど、なんとなくそんな気はしていました。それでも、私はあの人を信じようとしてしまった……」"
translation = "「……하지만, 왠지 모르게 그런 기분은 들었습니다. 그런데도 저는 그 사람을 믿으려 하고 말았어요……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「でも、どうしてこんなことを……」"
translation = "「하지만, 어째서 이런 짓을……」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「イザベラにはウェールという娘がいたのです。その魔女はネビュラに所属していましたが、任務中に消息を絶ちました……彼女の遺体は今も見つかっていません」"
translation = "「이자벨라에게는 웨일이라는 딸이 있었습니다. 그 마녀는 네뷸라 소속이었지만 임무 중에 소식이 끊겼지요…… 그녀의 시신은 지금도 발견되지 않았습니다」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「イザベラは絶望してしまった。世界を救うという使命に。娘のいないこの世界に」"
translation = "「이자벨라는 절망하고 말았습니다. 세계를 구한다는 사명에. 딸이 없는 이 세계에」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「だから、イザベラは自分だけの世界を作ろうとした。娘が帰ってくるという希望を抱きながら、それ以外のすべてを拒絶する世界を……」"
translation = "「그래서 이자벨라는 자신만의 세계를 만들려 했습니다. 딸이 돌아올 것이라는 희망을 품은 채, 그 이외의 모든 것을 거부하는 세계를……」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「差し詰め、リジェクションウォール、といったところでしょうか」"
translation = "「말하자면, 리젝션 월(거절의 벽)이라 할 수 있겠지요」"

[[dialogue]]
speaker = "unk"
original = "早くコハルコさんを助けないと……！"
translation = "빨리 코하루코 씨를 구해야 해……!"

[[dialogue]]
speaker = "unk"
original = "とうに感覚のない拳を握る。イザベラに起きたことは悲しいことだけれど、だからってコハルコさんを犠牲にしていいわけがない。"
translation = "벌써 감각이 없는 주먹을 꽉 쥔다. 이자벨라에게 일어난 일은 슬픈 일이지만, 그렇다고 코하루코 씨를 희생시켜도 된다는 법은 없다."

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「この結界は星力を吸収します。会長様では結界を破壊することは不可能……申し訳ありませんが、私の魔力も限界です。応援を待つしか……」"
translation = "「이 결계는 성력을 흡수합니다. 회장님께서는 결계를 파괴하는 것이 불가능…… 죄송합니다만 제 마력도 한계입니다. 원군을 기다릴 수밖에……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……私にお任せください。私ならこの結界を突破できます」"
translation = "「……제게 맡겨 주십시오. 저라면 이 결계를 돌파할 수 있습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「信じていただけるとは思いません。ですが、私もあの人を止めたいのです。どうか……」"
translation = "「믿어 주실 거라 생각지는 않습니다. 하지만 저도 그 사람을 멈추고 싶습니다. 제발……」"

[[dialogue]]
speaker = "unk"
original = "君を信じる。頼む！"
translation = "너를 믿을게. 부탁해!"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……はい！」"
translation = "「……네!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ、はぁ……全てを無に帰す闇よ、我が道を拓け！」"
translation = "「하아, 하아…… 모든 것을 무로 돌리는 어둠이여, 나의 길을 열어라!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「デッドエンド・コラプサァーッ！！」"
translation = "「데드 엔드 콜랩서!!」"

[[dialogue]]
speaker = "unk"
original = "巨大なブラックホールが結界に激突し、ぽっかりと大穴が開いた。"
translation = "거대한 블랙홀이 결계에 격돌하고, 뻥 뚫린 구멍이 생겼다."

[[dialogue]]
speaker = "unk"
original = "行くぞ！"
translation = "가자!"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「かしこまりました」"
translation = "「알겠습니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はいっ」"
translation = "「네!」"

