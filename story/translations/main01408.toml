[[dialogue]]
speaker = "unk"
original = "第１１話,まぶたに浮かぶは,B"
translation = "제11화, 눈꺼풀에 떠오르는 것은, B"

[[dialogue]]
speaker = "フィオナ"
original = "『──姉さん……姉さんっ……！』"
translation = "『──언니…… 언니이……!』"

[[dialogue]]
speaker = "unk"
original = "５年前、姉さんは原因不明の昏睡状態に陥った。"
translation = "5년 전, 언니는 원인 불명의 혼수 상태에 빠졌다."

[[dialogue]]
speaker = "unk"
original = "世界を救う<ruby>魔王<rt>えいゆう</rt></ruby>となるべく、星術の修行をこなしてきた、真っ只中の出来事だった。"
translation = "세계를 구할 영웅이 되고자, 성술 수련을 해오던, 한창때의 일이었다."

[[dialogue]]
speaker = "unk"
original = "その時から私は──姉に代わってフィオナという号を授かった。"
translation = "그때부터 나는── 언니를 대신해 피오나라는 호를 받았다."

[[dialogue]]
speaker = "unk"
original = "エリシアという個人の心は殺して、星見の長女という立ち場を演じるようになった。"
translation = "엘리시아라는 개인의 마음은 죽이고, 별을 보는 장녀라는 입장을 연기하게 되었다."

[[dialogue]]
speaker = "unk"
original = "姉さんはいつか目覚めてくれるのだろうか？"
translation = "언니는 언젠가 눈을 떠줄까?"

[[dialogue]]
speaker = "unk"
original = "姉さんを奪ったのは未知の病か、それともモンスター種の呪いか何かではないかと思っていた。"
translation = "언니를 빼앗은 것은 미지의 병인지, 아니면 몬스터 종의 저주 같은 것이 아닌가 생각했었다."

[[dialogue]]
speaker = "unk"
original = "だけど……"
translation = "하지만……"

[[dialogue]]
speaker = "アポロ"
original = "『出てこい、サイキョーの魔王！\u3000さもなくばこの人間界はぜ～んぶまっさらにしてアポロ様のおもちゃ箱にしちゃうぞ！』"
translation = "『나와라, 최강의 마왕! 그렇지 않으면 이 인간계는 모~두 깨끗하게 없애서 아폴로 님의 장난감 상자로 만들어 버릴 거다!』"

[[dialogue]]
speaker = "unk"
original = "あの時。"
translation = "그때."

[[dialogue]]
speaker = "unk"
original = "変わり果てた姉の姿を見て──私は、自分がとんだ思い違いをしていたと知った。"
translation = "변해버린 언니의 모습을 보고── 나는, 자신이 엄청난 착각을 하고 있었다는 것을 알았다."

[[dialogue]]
speaker = "unk"
original = "そして、その背景は……後により鮮明になって。"
translation = "그리고, 그 배경은…… 나중에 더욱 선명해져서."

[[dialogue]]
speaker = "セイファート"
original = "「だが。それでも。<ruby>妻<rt>マルキア</rt></ruby>と会う機がリクリエにしかないというならば……私は喜んで終末を望もう！」"
translation = "「하지만. 그럼에도. <ruby>아내<rt>마르키아</rt></ruby>와 만날 기회가 리크리에밖에 없다면…… 나는 기꺼이 종말을 바라겠소!」"

[[dialogue]]
speaker = "unk"
original = "私たちは彼の記憶を覗いた。同じだ、と思った。"
translation = "우리는 그의 기억을 엿보았다. 똑같다,고 생각했다."

[[dialogue]]
speaker = "unk"
original = "ジェラルド・セイファート学園長の奥方はここアルタイルから<ruby>攫<rt>さら</rt></ruby>われ、渡った先のデネブで『使徒』と化した。化された。"
translation = "제럴드 세이퍼트 학원장의 아내는 이곳 알타이르에서 납치당해, 건너간 데네브에서 『사도』로 변했다. 변하게 되었다."

[[dialogue]]
speaker = "unk"
original = "そして彼の奥様は……仮面に操られながら、デネブの世界を<ruby>蹂躙<rt>じゅうりん</rt></ruby>していた。"
translation = "그리고 그의 부인은…… 가면에게 조종당하면서, 데네브의 세계를 유린하고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "（だから……姉さんは、その逆で）"
translation = "（그러니까…… 언니는, 그 반대로）"

[[dialogue]]
speaker = "unk"
original = "私たちの前に現れた『アポロ』の素体となったのは──デネブ世界にいたはずの姉さんなのだろう。"
translation = "우리 앞에 나타난 『아폴로』의 소체가 된 것은── 데네브 세계에 있었을 언니일 것이다."

[[dialogue]]
speaker = "unk"
original = "仮面によって『リクリエの使徒』と化した姉さんは、こちらアルタイルへと乗り込んできた。"
translation = "가면에 의해 『리크리에의 사도』로 변한 언니는, 이곳 알타이르로 넘어왔다."

[[dialogue]]
speaker = "unk"
original = "だから恐らく……デネブの世界じゃ、あのマルキアさんのように、姉さんが神隠しに遭っていたに違いない。"
translation = "그러니까 아마도…… 데네브의 세계에서는, 저 마르키아 씨처럼, 언니가 신 감추기를 당했을 것이 틀림없다."

[[dialogue]]
speaker = "unk"
original = "さらにその影響によって、本来アルタイルにいたはずの姉さんまでも意識を失ってしまった……。"
translation = "게다가 그 영향으로, 본래 알타이르에 있었을 언니마저 의식을 잃어버렸다……."

[[dialogue]]
speaker = "unk"
original = "リクリエは私から、どちらの姉さんも奪っていったことになる。"
translation = "리크리에는 나에게서, 두 언니 모두를 빼앗아 간 것이 된다."

[[dialogue]]
speaker = "フィオナ"
original = "（でも──そこに、私の責任は、なかったと言えるのでしょうか）"
translation = "（하지만── 거기에, 내 책임은, 없다고 말할 수 있을까요）"

[[dialogue]]
speaker = "unk"
original = "一緒に流星ライダーごっこをして遊んでいた姉さん。"
translation = "함께 유성 라이더 놀이를 하며 놀았던 언니."

[[dialogue]]
speaker = "unk"
original = "けれど、星見の長女として、いつしか鍛錬にばかり精を出すようになっていた姉さん。"
translation = "하지만, 별을 보는 장녀로서, 어느새 수련에만 힘을 쏟게 되었던 언니."

[[dialogue]]
speaker = "unk"
original = "アポロと化した今の姿は……そんな、無邪気だった頃の自分を求めているようにしか思えなくて。"
translation = "아폴로로 변한 지금의 모습은…… 그런, 순진했던 시절의 자신을 찾고 있는 것처럼밖에 보이지 않아서."

[[dialogue]]
speaker = "フィオナ"
original = "（姉さんは──疲れていたのかもしれません。私が……妹として、もっと支えられていれば──）"
translation = "（언니는── 지쳐 있었을지도 모릅니다. 내가…… 동생으로서, 좀 더 지탱해 줄 수 있었다면──）"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なーにくよくよしてんのよ、フィオナ！」"
translation = "「뭐가 그리 침울해 있는 거야, 피오나!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヴィーナスさん──」"
translation = "「비너스 씨──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「また意固地になりかけてたんじゃない？\u3000いいのよ、過去のことなんか気にしなくて」"
translation = "「또 고집을 부리려던 거 아니야? 괜찮아, 과거 일 같은 건 신경 쓰지 않아도 돼」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アポロを救いにいくわよ！\u3000今の私たちは私たち史上最高に強いんだから、悩む必要なんてないじゃない！」"
translation = "「아폴로를 구하러 가자고! 지금의 우리는 우리 역사상 최고로 강하니까, 고민할 필요 없잖아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そーそー。ヴィーナスちゃんなんか、自分が助けられたばかりなのに」"
translation = "「맞아 맞아. 비너스짱은, 자신이 구출된 지 얼마 안 됐는데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今度は私が助ける番ってことなんだから！」"
translation = "「이번엔 내가 도울 차례라는 거니까!」"

[[dialogue]]
speaker = "クロト"
original = "「頼ってくれ、フィオナ。どんなに我がままだっていい」"
translation = "「의지해 줘, 피오나. 아무리 제멋대로라도 괜찮아」"

[[dialogue]]
speaker = "クロト"
original = "「俺もずっと迷ってた。ヴィーナスがいなくなった時は、何度も己を見失いそうになった」"
translation = "「나도 계속 망설였어. 비너스가 사라졌을 때는, 몇 번이나 나 자신을 잃을 뻔했지」"

[[dialogue]]
speaker = "クロト"
original = "「でも、フィオナと一緒に修行して。乗り越えたからこそ──ヴィーナスだって助け出せたんだ」"
translation = "「하지만, 피오나와 함께 수련하고. 극복했기에── 비너스도 구해낼 수 있었던 거야」"

[[dialogue]]
speaker = "クロト"
original = "「お姉さんも同じだ。今度はフィオナの家族のために……俺も戦わせてほしい」"
translation = "「언니도 마찬가지다. 이번에는 피오나의 가족을 위해…… 나도 싸우게 해 줘」"

[[dialogue]]
speaker = "ソフィア"
original = "「世界の命運も大事ですが……それと同じくらい、お姉さんのことも大事です」"
translation = "「세계의 명운도 중요하지만…… 그만큼, 언니의 일도 중요합니다」"

[[dialogue]]
speaker = "マトイ"
original = "「そだね。もう、フィオナさんだけの話じゃないよっ」"
translation = "「그렇지. 이제, 피오나 씨만의 이야기가 아니야!」"

[[dialogue]]
speaker = "セーラ"
original = "「ヴィーナスちゃん救出作戦には噛めなかったし──うちも参加させてもらいたいかな」"
translation = "「비너스짱 구출 작전에는 끼지 못했고── 나도 참가하고 싶을까나」"

[[dialogue]]
speaker = "フィオナ"
original = "「皆さん……ありがとうございます」"
translation = "「여러분…… 감사합니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナはうつむいていた顔を上げ、凛々しい眼差しで語った。"
translation = "피오나는 숙이고 있던 얼굴을 들고, 늠름한 눈빛으로 말했다."

[[dialogue]]
speaker = "フィオナ"
original = "「姉さんの姿かたちは……あの頃と変わっていません。姉妹２人でごっこ遊びをしていた、あの日から」"
translation = "「언니의 모습은…… 그때와 변하지 않았습니다. 자매 둘이서 소꿉놀이를 하던, 그날부터」"

[[dialogue]]
speaker = "フィオナ"
original = "「けれど──私は違います。流星の仲間がいて、新星の皆さんもいる。これらの絆はすべて……星見フィオナになってから得たものです」"
translation = "「하지만── 저는 다릅니다. 유성의 동료가 있고, 신성의 여러분도 있습니다. 이 모든 인연은…… 호시미 피오나가 되고 나서 얻은 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そして、私自身も。素直になって、人を信じることを教えてもらいました。魔王の血統なんて関係なく」"
translation = "「그리고, 저 자신도. 솔직해지고, 사람을 믿는 것을 배웠습니다. 마왕의 혈통 따위와는 상관없이」"

[[dialogue]]
speaker = "フィオナ"
original = "「この流星学園で得たもの。知ったもの。姉さんの立ち場なら、手に入れられるはずだったもの。その総てを、姉さんにぶつけます」"
translation = "「이 유성 학원에서 얻은 것. 알게 된 것. 언니의 입장이라면, 손에 넣을 수 있었을 것. 그 모든 것을, 언니에게 부딪치겠습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「そして、叶うなら──姉さんを取り返したい」"
translation = "「그리고, 가능하다면── 언니를 되찾고 싶습니다」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。きっとできる」"
translation = "「아아. 분명 할 수 있을 거다」"

[[dialogue]]
speaker = "アナ"
original = "「私たち<ruby>星騎士<rt>スターナイト</rt></ruby>は──リクリエを打倒するために組織されています。なら、敵はお姉さんではなく『使徒』でしょうね」"
translation = "「우리 <ruby>성기사<rt>스타 나이트</rt></ruby>는── 리크리에를 타도하기 위해 조직되었습니다. 그렇다면, 적은 언니가 아니라 『사도』겠지요」"

[[dialogue]]
speaker = "ユウリ"
original = "「あの仮面から、今度こそ解き放ってやりゃいいってわけだ」"
translation = "「저 가면으로부터, 이번에야말로 해방시켜 주면 된다는 거네」"

[[dialogue]]
speaker = "unk"
original = "そうだ。今までのことからして、俺たちの目指すべき理想は決まっている。"
translation = "그렇다. 지금까지의 일로 미루어 보아, 우리가 목표로 해야 할 이상은 정해져 있다."

[[dialogue]]
speaker = "クロト"
original = "「アポロをリクリエから解放する。それから３０００年前と同じように──リクリエを撃退してやればいい」"
translation = "「아폴로를 리크리에로부터 해방한다. 그리고 3000년 전과 마찬가지로── 리크리에를 격퇴해 주면 된다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんだ、一石二鳥じゃない！」"
translation = "「뭐야, 일석이조잖아!」"

[[dialogue]]
speaker = "unk"
original = "それは──セイファート学園長が最後まで叶えられなかった願い。"
translation = "그것은── 세이퍼트 학원장이 끝까지 이루지 못했던 소원."

[[dialogue]]
speaker = "unk"
original = "俺たちの求める結末はそんな、何もかも手に入れるハッピーエンドだ。"
translation = "우리가 바라는 결말은 그런, 모든 것을 손에 넣는 해피 엔딩이다."

[[dialogue]]
speaker = "フィオナ"
original = "「向かいましょう──空の上へ。姉さんが待っています」"
translation = "「향합시다── 하늘 위로. 언니가 기다리고 있습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「この夜で……すべてを終わらせます」"
translation = "「이 밤에…… 모든 것을 끝내겠습니다」"

[[dialogue]]
speaker = "unk"
original = "必勝の誓いを胸に期す。"
translation = "필승의 맹세를 가슴에 다짐한다."

[[dialogue]]
speaker = "unk"
original = "そうして俺たちは、最後の敵のもとまで駆け上がっていった──"
translation = "그렇게 우리는, 마지막 적이 있는 곳까지 달려 올라갔다──"

