[[dialogue]]
speaker = "unk"
original = "魔法少女たちと悪魔たちの戦闘は続いていた。"
translation = "마법 소녀들과 악마들의 전투는 계속되고 있었다."

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「はああぁっ！」"
translation = "「하아아앗!」"

[[dialogue]]
speaker_original = "アラクネ"
speaker_translation = "아라크네"
original = "「――っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「よしっ、１体倒したよ！\u3000次！」"
translation = "「좋아, 한 마리 쓰러뜨렸어! 다음!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「いろはす、ナイス～！」"
translation = "「이로하스, 나이스~!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "（悪魔は確かに倒せている。だが……）"
translation = "（악마는 확실히 쓰러뜨리고 있어. 하지만……）"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "（敵の数が多すぎる……！\u3000このままでは、いろはたちの体力の方が先に……）"
translation = "（적의 수가 너무 많아……! 이대로라면 이로하들의 체력이 먼저……）"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「はぁ……はぁ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「いろは、後ろ！\u3000危ないっ！！」"
translation = "「이로하, 뒤야! 위험해!!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「！\u3000しまっ――」"
translation = "「! 아차──」"

[[dialogue]]
speaker = "unk"
original = "疲労から集中力が途切れたことで生まれた、一瞬の油断。アラクネが足をいろはに向けて、振り下ろす。"
translation = "피로 때문에 집중력이 끊기며 생긴 찰나의 방심. 아라크네가 다리를 이로하를 향해 내리친다."

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「止まれ！」"
translation = "「멈춰라!」"

[[dialogue]]
speaker_original = "アラクネ"
speaker_translation = "아라크네"
original = "「っ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「悪魔の動きが止まった……！？\u3000これって――」"
translation = "「악마의 움직임이 멈췄어……!? 이건──」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ふぅ……間一髪、間に合ったな」"
translation = "「후우…… 간발의 차로 늦지 않았군」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「陽彩ちゃん！\u3000その姿……悪魔のロストアイテムの力はもう体から抜けたんじゃ！？」"
translation = "「아키사짱! 그 모습…… 악마의 로스트 아이템의 힘은 이제 몸에서 빠져나간 게 아니었어!?」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ああ。変身できるかどうかは、試してみるまで分からなかったが……どうやらぼくの中にまだ、力の一部が残っていたみたいだ」"
translation = "「아아. 변신할 수 있을지는 시도해 보기 전까지 몰랐지만…… 아무래도 내 안에 아직 힘의 일부가 남아있었던 모양이야」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「これなら新しいドレス――今度はみんなを守る為の力として、運用することができる」"
translation = "「이거라면 새로운 드레스── 이번에는 모두를 지키기 위한 힘으로서 운용할 수 있어」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「すごい！\u3000陽彩ちゃん、闇落ちからの光覚醒展開だ！！\u3000激アツぅ～～！！！」"
translation = "「대단해! 아키사짱, 타락했다가 빛으로 각성하는 전개다!! 완전 뜨거워~~!!!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「目を輝かせてないで、気を引き締め直せ！\u3000ぼくもまだどこまで力をコントロールできるのかは未知数なんだ。油断はできないぞ！」"
translation = "「눈을 빛내고 있지 말고 정신 바짝 차려! 나도 아직 어디까지 힘을 제어할 수 있을지는 미지수다. 방심할 순 없어!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「うん！\u3000わかった。ここからは４人で力を合わせて戦おう！」"
translation = "「응! 알았어. 이제부터는 넷이서 힘을 합쳐 싸우자!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ああ。いろは、背中は預ける！」"
translation = "「아아. 이로하, 등은 맡기마!」"

[[dialogue]]
speaker = "unk"
original = "陽彩が加わり、魔法少女４人揃っての戦闘が、改めて始まるのだった。"
translation = "아키사가 가세하여 마법 소녀 4명이 모두 모인 전투가 다시 시작되는 것이었다."

