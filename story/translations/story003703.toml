[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……ここはどこ、私はレイラ……はっ、みんなは！？」"
translation = "「……여기는 어디, 나는 레이라…… 핫, 모두는!?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「……さっきのではぐれちゃったみたい。見たことないモンスターだったけど……というかなんで『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を倒したのにモンスターが？」"
translation = "「……방금 전의 일로 흩어져 버린 모양이야. 본 적 없는 몬스터였지만…… 그나저나 왜 『<ruby>XELOS<rt>제로스</rt></ruby>』를 쓰러뜨렸는데 몬스터가?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ううん、今は早くみんなと合流しなくちゃ。キサナー！\u3000リーナー！\u3000イングリットー！\u3000いたら返事してー！」"
translation = "「아니, 지금은 빨리 모두와 합류해야 해. 키사나ー! 리나ー! 잉그리드ー! 있으면 대답해줘ー!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うるせぇ、ここにいるっての」"
translation = "「시끄러워, 여기 있다고」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うわいた！？」"
translation = "「우와 깜짝이야!?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「呼んどいて自分で驚いてんじゃねえ。近くからオマエの匂いがすると思って来たんだよ」"
translation = "「불러놓고 본인이 놀라면 어쩌자는 거야. 근처에서 네 냄새가 나길래 온 거라고」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「さすが獣人系魔族……すごい嗅覚だね。でも私の匂いってどんなのだろ？\u3000花のような爽やかな匂いだったりする？」"
translation = "「역시 수인계 마족…… 대단한 후각이네. 그런데 내 냄새는 어떤 거야? 꽃처럼 상쾌한 냄새라거나?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハンバーガーの匂いだよ。自分のこと美化してんじゃねえ」"
translation = "「햄버거 냄새다. 자기 자신을 미화하지 말라고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あー、オマエのせいで腹減ってきた……なんか食うもんねえか？」"
translation = "「아ー 너 때문에 배고파졌잖아…… 뭐 먹을 거 없냐?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うーん、バーベキューセットはモンスターに吹き飛ばされちゃったし……あ、チョコバーならあるよ。キサナ、これ好きだと思って持ってきてたの」"
translation = "「으음, 바비큐 세트는 몬스터한테 날아가 버렸고…… 아, 초코바라면 있어. 키사나, 이거 좋아할 것 같아서 챙겨왔거든」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「別に好物じゃねえけど……まあいい、よこせ。……って、溶けてドロドロじゃねえか」"
translation = "「딱히 좋아하는 건 아니다만…… 뭐 됐어, 내놔. ……야, 녹아서 흐물흐물하잖아」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「要らないなら私が食べるけど？」"
translation = "「필요 없으면 내가 먹을 건데?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「食うに決まってんだろ！」"
translation = "「먹을 게 당연하잖아!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふふっ、なんか懐かしいね」"
translation = "「후훗, 왠지 그립네」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふん、言ってろ」"
translation = "「흥, 말은 잘해요」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（アタシが生まれたのは魔界、セントリア西部。マフィア同士が血で血を洗う、とにかくクソみてぇなとこだった）"
translation = "（내가 태어난 곳은 마계, 센트리아 서부. 마피아끼리 피로 피를 씻는, 아무튼 쓰레기 같은 곳이었지）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（弱いやつは、死ぬ。優しいやつも、死ぬ。馬鹿もついでに死ぬ。生き残るのは強いやつ、誰も信じねえやつ、騙すやつだ）"
translation = "（약한 놈은 죽는다. 착한 놈도 죽는다. 바보도 덤으로 죽는다. 살아남는 건 강한 놈, 아무도 안 믿는 놈, 속이는 놈뿐이다）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（気が付けば、アタシも一人前の悪党になってた。それがメシを食うってことだと思ってた。生き残れば、それが正しいんだ）"
translation = "（정신을 차려보니 나도 어엿한 악당이 되어있었지. 그게 밥을 벌어먹는 거라 생각했어. 살아남으면 그게 정답인 거야）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（星騎士ってのを知るまでは）"
translation = "（성기사라는 걸 알기 전까지는）"

[[dialogue]]
speaker_original = "アネゴ"
speaker_translation = "누님"
original = "「知ってるか、キサナ。モンスターとか、星騎士とか、世の中にはそういうのがいるらしい」"
translation = "「알고 있냐, 키사나. 몬스터라거나 성기사라거나 세상엔 그런 게 있다더군」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ……なんすか、いきなり」"
translation = "「하아…… 뭐예요, 갑자기」"

[[dialogue]]
speaker_original = "アネゴ"
speaker_translation = "누님"
original = "「モンスターは世界を滅ぼすバケモノで、星騎士はモンスターから人々を守る英雄なんだとよ。この前死んだ司祭が言ってた」"
translation = "「몬스터는 세계를 멸망시키는 괴물이고, 성기사는 몬스터로부터 사람들을 지키는 영웅이라나 봐. 얼마 전 죽은 사제가 말하더군」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あのアル中の？\u3000じゃあウソッパチじゃないっすか」"
translation = "「그 알코올 중독자가요? 그럼 뻥이잖아요」"

[[dialogue]]
speaker_original = "アネゴ"
speaker_translation = "누님"
original = "「だよな。アタシもそう思う」"
translation = "「그렇지. 나도 그렇게 생각한다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（アネゴも、それからすぐに死んだ。アタシを庇って死んだ。そんなのは弱いやつのすることだって教えてくれたのはアネゴだったのに）"
translation = "（누님도 그러고 나서 곧 죽었어. 나를 감싸다 죽었지. 그런 건 약한 놈들이나 하는 짓이라고 가르쳐준 건 누님이었으면서）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（それから、アネゴから聞いた星騎士の話が頭を離れなかった）"
translation = "（그 후로 누님에게 들은 성기사 이야기가 머릿속을 떠나지 않았어）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（見ず知らずの連中のために戦う正義の味方。世界を救う英雄。そんなのがいてたまるか）"
translation = "（생판 남들을 위해 싸우는 정의의 사자. 세계를 구하는 영웅. 그딴 게 있을 턱이 없지）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（そんなのが本当にいるなら、アタシは何だ？\u3000騙して、傷付けて、奪って……）"
translation = "（그런 게 정말로 있다면 나는 뭐지? 속이고, 상처 입히고, 빼앗고……）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（アタシは、何なんだよ……）"
translation = "（나는 대체 뭐냐고……）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（そんな時だった。<ruby>星騎士<rt>そいつ</rt></ruby>は突然、降ってきた）"
translation = ""

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（デカいドンパチが起きて、うちのファミリーはほとんど死んで、アタシもヘマして腹にタマもらっちまった）"
translation = "（커다란 총격전이 벌어지고 우리 패밀리는 거의 다 죽었지. 나도 실수해서 배에 구멍이 뚫렸었고）"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（今でも忘れやしねぇ。腹がすーすーする感覚。死にかけの……いや、本当に死んでんだっけか……まぁいいや）"
translation = "（지금도 잊지 못해. 배가 서늘해지는 그 감각. 죽어가는…… 아니, 정말로 죽었던 거였나…… 뭐 상관없지）"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "「そ、双方、武器を捨てなさい……っ！\u3000言うことを聞かないなら……ブラックホール・ディバウアー！」"
translation = "「양, 양쪽 다 무기를 버리세요……! 말을 듣지 않는다면…… 블랙홀 디바우어!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（あれは愉快だった。荒野に大穴を開けられて、どいつもこいつもビビりちらかして……いつもあんなに威張り散らしてたくせによ）"
translation = "（그건 참 유쾌했지. 황야에 커다란 구멍이 뚫리고 어느 놈 할 것 없이 겁에 질려 나자빠지는 게…… 평소엔 그렇게 거들먹거렸던 주제에 말이야）"

[[dialogue]]
speaker_original = "？？？"
speaker_translation = "？？？"
original = "「赤毛でネコっぽい魔族……あ、いたいた。あなたがキサナさんですね？」"
translation = "「붉은 머리에 고양이 같은 마족…… 아, 찾았다. 당신이 키사나 씨군요?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「テメエ……何モンだ」"
translation = "「네년…… 누구냐」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私は百目騎レイラ……いえ、こう言いましょう」"
translation = "「나는 도우메키 레이라…… 아니, 이렇게 말하죠」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私たちはコラプサー……星の光を喰らう者です」"
translation = "「우리는 콜랩서…… 별의 빛을 먹는 자들입니다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「星の、光を……？」"
translation = "「별의 빛을……?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「具体的にはブラックホールを守護星とする星騎士なのですが……」"
translation = "「구체적으로는 블랙홀을 수호성으로 하는 성기사입니다만……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「星騎士？\u3000テメエ、星騎士なのかよ？」"
translation = "「성기사? 네년, 성기사인 거냐?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あなたも、です。あなたもすでに力に目覚めているはずです。だから見付けることができた」"
translation = "「당신도 마찬가지입니다. 당신도 이미 힘에 눈을 떴을 겁니다. 그러니까 찾아낼 수 있었던 거죠」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あなたもコラプサーになりませんか？\u3000私たちコラプサーの目的は世界を救うこと。それが叶えば、私たちは『英雄』になります」"
translation = "「당신도 콜랩서가 되지 않겠어요? 우리 콜랩서의 목적은 세계를 구하는 것. 그것이 이루어지면 우리는 『영웅』이 됩니다」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「英雄だと？\u3000……そんなもんに興味はねえ。アタシはメシが食えればそれでいい」"
translation = "「영웅이라고? ……그딴 거엔 관심 없어. 난 밥만 먹을 수 있으면 그걸로 족해」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「では約束します。世界を救い、英雄になれば食いっぱぐれたりしないと」"
translation = "「그럼 약속하죠. 세계를 구하고 영웅이 되면 밥 굶는 일은 없게 하겠다고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ならいい。嘘だったら、どてっ腹ぶち抜くからな」"
translation = "「그럼 됐다. 거짓말이면 배때지에 구멍을 내줄 테니까」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……あー、それにしても腹へったな」"
translation = "「……아ー 그나저나 배고프구먼」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え、チョコバーならあるけど……」"
translation = "「에, 초코바라면 있는데……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「よこせ。……なんだこりゃ、ドロドロじゃねえか。まあいい、味は……うめぇ！\u3000もっとよこせ！」"
translation = "「내놔. ……이게 뭐야, 흐물흐물하잖아. 뭐 됐어, 맛은…… 맛있어! 더 내놔!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うぅ……私のチョコバーがぁ……」"
translation = "「으으…… 내 초코바가……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んなこともあったな……」"
translation = "「그런 일도 있었지……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「マフィアが血みどろの抗争してて、めちゃくちゃ怖かった思い出。人探すってレベルじゃねーぞって感じ」"
translation = "「마피아가 피비린내 나는 항쟁을 벌이고 있어서 엄청 무서웠던 기억. 사람 찾을 수준이 아니었다니까」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「つうかついでに思い出したけどよ、流星市国でメシ抜き現場待機させられたこと、アタシは忘れてねえからな」"
translation = "「그보다 덤으로 생각난 건데, 유성시국에서 밥도 안 주고 현장 대기 시킨 거, 난 잊지 않았다고」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え、連絡用に渡してたＤＩＳＣでお買い物できたよ？\u3000足がつかないように対策もしてたし」"
translation = "「에, 연락용으로 줬던 DISC로 쇼핑할 수 있었잖아? 들키지 않게 대책도 다 세워뒀었고」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なら使い方もちゃんと説明しとけっつーの！\u3000<ruby>ヴァレリー<rt>あの変態</rt></ruby>が来るまで廃棄弁当漁ってたんだぞこっちは！」"
translation = ""

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いだだだ、こめかみグリグリしないで～！\u3000ごめんってば～！」"
translation = "「아다다다, 관자놀이 누르지 마~! 미안하다니까~!」"

