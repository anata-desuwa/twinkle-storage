[[dialogue]]
speaker = "unk"
original = "ソフィアの本心を聞いたサーシャさんは、見たことがない程に落ち込んでいる様子だった――"
translation = "소피아의 본심을 들은 사샤 씨는 본 적이 없을 정도로 낙담한 모습이었다――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私、これまでずっと気づけなかったけれど……ソフィに対して間違ったことをしてしまっていたみたいだわ……」"
translation = "「나, 지금까지 계속 눈치채지 못했지만…… 소피에게 잘못된 짓을 하고 있었던 모양이야……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「信じられないって言われちゃったけど……私ね、ソフィのことは本当に大切に思っているのよ」"
translation = "「믿을 수 없다는 말을 들었지만…… 나 말이야, 소피를 정말 소중하게 생각하고 있단다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「心から愛しているわ。でも……伝わっていなかった、ってことなのよね？」"
translation = "「진심으로 사랑해. 하지만…… 전해지지 않았다는 거겠지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「家族だから、姉妹だから――心で繋がっているから、離れていても大丈夫だって、そう思っていたの……」"
translation = "「가족이니까, 자매니까―― 마음으로 연결되어 있으니까 떨어져 있어도 괜찮을 거라고 그렇게 생각했어……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「３年前のあの時、私はどうすればよかったのかしら……」"
translation = "「3년 전 그때, 나는 어떻게 했어야 했을까……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私は……自分の冒険心を抑えることができない」"
translation = "「나는…… 내 모험심을 억누를 수가 없어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「人間界へどうしても来てみたくて、学園へ入学することを選んだわ。学園を卒業したら、今度は天界にも行ってみたい」"
translation = "「인간계에 꼭 와보고 싶어서 학원에 입학하는 걸 선택했지. 학원을 졸업하면 이번엔 천계에도 가보고 싶어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「たとえ過去に戻ってやり直せたとしても、結局、私は人間界へ来ることを選ぶと思うわ」"
translation = "「설령 과거로 돌아가 다시 시작할 수 있다 해도, 결국 나는 인간계로 오는 걸 선택할 거야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「１つのところに留まれない自分を、簡単には変えられない……」"
translation = "「한곳에 머물지 못하는 나 자신을 쉽게 바꿀 수는 없어……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うん。……変えられないのよ」"
translation = "「응. ……바꿀 수 없는 거야.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「サーシャ先輩……」"
translation = "「사샤 선배님……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あのっ……あたしも、同じです」"
translation = "「저기…… 저도 똑같아요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ウズメちゃんも……？」"
translation = "「우즈메짱도……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はい。あたしの場合、日本の歴史、文化が好きだという気持ちを抑えることができずに、人間界へやってきました」"
translation = "「네. 제 경우 일본의 역사, 문화를 좋아한다는 마음을 억누르지 못하고 인간계로 왔거든요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「好きっていう気持ちは、なかなか抑えられないですよね」"
translation = "「좋아한다는 마음은 좀처럼 억누를 수 없는 거잖아요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だからこそ、ソフィアも悲しくなっちゃうんだと思います」"
translation = "「그렇기에 소피아도 슬퍼지는 거라고 생각해요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィも……？」"
translation = "「소피도……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「はい」"
translation = "「네.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「自分がどうやっても、サーシャ先輩の１番になれないってことが」"
translation = "「자신이 아무리 노력해도 사샤 선배님의 1순위가 될 수 없다는 사실이요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「好きだからこそ、わかっちゃうんだと思います」"
translation = "「좋아하니까 더 잘 알게 되는 거라고 생각해요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……ウズメちゃん、１つ相談してもいい？」"
translation = "「……우즈메짱, 하나 상담해도 될까?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なんでしょうか？」"
translation = "「뭔가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「教えて欲しいことがあるの。……天界では、愛を伝える時って、どんな風にするのかしら？」"
translation = "「가르쳐 줬으면 하는 게 있어. ……천계에서는 사랑을 전할 때 어떻게 하니?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「愛が伝わる方法……」"
translation = "「사랑이 전해지는 방법……」"

[[dialogue]]
speaker = "unk"
original = "ウズメは少し考えた後──"
translation = "우즈메는 잠시 생각한 뒤──"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そうですね……天界の風習というよりは、あたしの家族の話なんですけど――」"
translation = "「글쎄요…… 천계의 풍습이라기보다는 제 가족 이야기인데요――」"

[[dialogue]]
speaker = "unk"
original = "一方、サーシャのところから逃げ出したソフィアのことは、ヴィーナスが追いかけていた。"
translation = "한편 사샤가 있는 곳에서 뛰쳐나온 소피아는 비너스가 뒤쫓고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ、はぁ、はぁ……」"
translation = "「하아, 하아, 하아……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（結局、姉さんの前から逃げ出してしまいました……）"
translation = "(결국 언니 앞에서 도망쳐 버렸어요……)"

[[dialogue]]
speaker = "unk"
original = "ふと、ポツリと頭に冷たい水滴が当たる。"
translation = "문득 머리에 차가운 물방울이 툭 떨어진다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「雨……？\u3000晴れてるのに……」"
translation = "「비……? 맑은데……」"

[[dialogue]]
speaker = "unk"
original = "太陽は見えている一方で、上空にある雲から雨粒が降ってくる。そう、『天気雨』だった――"
translation = "태양은 보이고 있는 반면, 상공에 있는 구름에서 빗방울이 떨어진다. 그래, 『여우비』였다――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィア！」"
translation = "「소피아!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ……ヴィーナスさん……」"
translation = "「아…… 비너스 씨……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ごめんなさい……私……」"
translation = "「죄송해요…… 저……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんの答えを聞くのが怖くなって……」"
translation = "「언니의 대답을 듣는 게 무서워져서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「戦略的撤退、ってところかしら！\u3000頑張ったと思うわよ！」"
translation = "「전략적 후퇴, 라고나 할까! 힘냈다고 생각해!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「とりあえず、門の下に移動して、雨宿りしましょ」"
translation = "「일단 문 아래로 이동해서 비를 피하자.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィア、天気雨で濡れてるわ。ハンカチで拭くから、じっとしてなさい」"
translation = "「소피아, 여우비 때문에 젖었어. 손수건으로 닦아줄 테니까 가만히 있어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ……はい。ありがとうございます……」"
translation = "「아…… 네. 감사합니다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ねぇ、ソフィア。サーシャさんって、変わってる人よね」"
translation = "「……있지, 소피아. 사샤 씨는 참 특이한 사람이지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私ね、新星学園に入学したばかりの頃、未来の日誌で、星徒会に入る未来がわかっていたわ」"
translation = "「나 말이야, 신성학원에 입학한 지 얼마 안 됐을 때 미래의 일지로 성도회에 들어가는 미래를 알고 있었어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だからすぐに、当時の星徒会長をしていたサーシャさんのところへ会いに行ったの。星徒会メンバーにしてもらう為にね」"
translation = "「그래서 곧장 당시 성도회장을 하던 사샤 씨를 만나러 갔지. 성도회 멤버로 들어가기 위해서 말이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それで、星徒会に入りたい理由を聞かれて、未来の日誌について話したわ」"
translation = "「그래서 성도회에 들어가고 싶은 이유를 묻길래 미래의 일지에 대해 이야기했어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさん、その時、私の話を全く疑わなかったのよ。ニコニコしながら、じゃあ一緒に星徒会をやりましょうかって言ってくれたの」"
translation = "「사샤 씨, 그때 내 이야기를 전혀 의심하지 않았어. 생글생글 웃으면서 그럼 같이 성도회를 해볼까요, 라고 말해줬지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私は気になって、どうして私の話を信じてくれたのかって聞いたわ」"
translation = "「나는 궁금해서 왜 내 말을 믿어줬느냐고 물었어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そしたら、サーシャさん、なんて言ったと思う？」"
translation = "「그랬더니 사샤 씨가 뭐라고 했는지 알아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「未来の日誌に書かれていることが本当に起こるなら、ワクワクするじゃない？\u3000――そう言ったのよ」"
translation = "「미래의 일지에 적힌 일이 정말로 일어난다면 두근거리잖아? ――그렇게 말하더라구.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……姉さんらしいですね」"
translation = "「……언니답네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でしょう？\u3000私も、面白い人だなって思ったわ」"
translation = "「그렇지? 나도 참 재미있는 사람이라고 생각했어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――サーシャさんって、自分の好きなことにバカ正直な人なのよ」"
translation = "「――사샤 씨는 자기가 좋아하는 일에 바보 같을 정도로 정직한 사람이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「で、サーシャさんといえば、『あらあらうふふ♪』じゃない？」"
translation = "「그리고 사샤 씨 하면 『어머어머 우후후♪』잖아?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あらあらうふふ？」"
translation = "「어머어머 우후후?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう。サーシャさんって相手の気持ちがよくわかってなくても、『あらあらうふふ』って言うのよ！」"
translation = "「그래. 사샤 씨는 상대방의 기분을 잘 몰라도 『어머어머 우후후』라고 말해!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィア相手にわざわざ言うことじゃないかもしれないけれど、サーシャさんが適当に喋ってるって意味じゃないわ」"
translation = "「소피아에게 굳이 할 말은 아닐지도 모르지만, 사샤 씨가 적당히 말한다는 뜻은 아니야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う～ん、なんて言えばいいのかわかんないけど……そうね、サーシャさんは、相手のこともバカ正直に信じようとするのね」"
translation = "「음~ 뭐라고 말해야 할지 모르겠지만…… 그래, 사샤 씨는 상대방도 바보 같을 정도로 믿으려고 해.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だからソフィアの言葉も、信じて疑わないんだわ」"
translation = "「그래서 소피아의 말도 의심 없이 믿는 거야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「たぶん、サーシャさんがあまり自分から会いに行かなかったのは、ソフィアの『姉離れ』って言葉をそのまま信じたからじゃないかしら？」"
translation = "「아마 사샤 씨가 별로 먼저 만나러 가지 않았던 건 소피아의 『언니에게서 독립』이라는 말을 그대로 믿었기 때문 아닐까?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私が……姉さんから距離を置こうとしていたから……？」"
translation = "「제가…… 언니와 거리를 두려고 했으니까……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「もちろん、人寂しさをあまり感じないサーシャさん個人の問題も十分あるわ！\u3000そこは別に、ソフィアのためを思って、みたいな話じゃないのよ」"
translation = "「물론 외로움을 별로 느끼지 않는 사샤 씨 개인의 문제도 충분히 있어! 그건 딱히 소피아를 생각해서, 같은 이야기는 아니야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、私よりもずっと長くサーシャさんと過ごしてきたソフィアなら、もう気づいているんじゃないかしら？」"
translation = "「하지만 나보다 훨씬 오랫동안 사샤 씨와 지내온 소피아라면 이미 깨닫고 있지 않니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさんの『好き』に、嘘はないのよ」"
translation = "「사샤 씨의 『좋아함』에는 거짓이 없어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィアの『不安だ』っていう気持ちは伝えたんだから、サーシャさんならきっとなんとかしてくれるはずよ。だって――」"
translation = "「소피아의 『불안하다』는 마음은 전했으니까 사샤 씨라면 분명 어떻게든 해줄 거야. 왜냐하면――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさんは、私たちの頼れる先輩で……」"
translation = "「사샤 씨는 우리의 믿음직한 선배이고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィアの愛する、お姉ちゃんなんだから！」"
translation = "「소피아가 사랑하는 언니니까!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……ヴィーナスさん、ありがとうございます」"
translation = "「……비너스 씨, 감사합니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私、もう１度姉さんと話してこようと思います」"
translation = "「저, 다시 한번 언니와 이야기하고 올게요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、頑張って、ソフィア！」"
translation = "「그래, 힘내, 소피아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……って、あら？」"
translation = "「……어라, 어라?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ～！」"
translation = "「소피~!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「よかった。ここで雨宿りしてたのね」"
translation = "「다행이다. 여기서 비를 피하고 있었구나.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さん……！」"
translation = "「언니……!」"

[[dialogue]]
speaker = "unk"
original = "天気雨が降り続ける中、奏姉妹は再び向き合うのだった――"
translation = "여우비가 계속 내리는 가운데, 카나데 자매는 다시 마주하게 된 것이었다――"

