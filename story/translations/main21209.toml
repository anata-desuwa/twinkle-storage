[[dialogue]]
speaker = "unk"
original = "第９話,ポラリス,B"
translation = "제9화, 폴라리스, B"

[[dialogue]]
speaker = "unk"
original = "魔王クロトに代わって現れた、女神テルルの遣い・ルヴィネ。"
translation = "마왕 쿠로토를 대신해 나타난, 여신 테루루의 사자 루비네."

[[dialogue]]
speaker = "unk"
original = "ルヴィネは見た目こそ華奢で小さいが、とても聡明な少女だった。常に避難民たちが生き残れるよう、的確な指示を出し続けた。"
translation = "루비네는 겉모습은 가냘프고 작지만, 무척 총명한 소녀였다. 항상 피난민들이 살아남을 수 있도록, 적절한 지시를 계속 내렸다."

[[dialogue]]
speaker = "unk"
original = "流星市国内から手に入れたわずかな物資を厳密に、そして公平に管理して皆に分け与えて。"
translation = "유성시국 내에서 손에 넣은 근소한 물자를 엄격하게, 그리고 공평하게 관리하여 모두에게 나누어 주고."

[[dialogue]]
speaker = "unk"
original = "モンスターが出現すると誰よりも早く急行し、誰よりも早く起きて、誰よりも遅く眠った。"
translation = "몬스터가 출현하면 누구보다 빠르게 급행하고, 누구보다 일찍 일어나서, 누구보다 늦게 잠들었다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネへの信頼と尊敬は、日を追うごとに強くなっていく──それはチナも例外ではなかった。"
translation = "루비네에 대한 신뢰와 존경은, 날이 갈수록 강해져 간다── 그것은 치나도 예외가 아니었다."

[[dialogue]]
speaker = "unk"
original = "戦闘でサポートできないぶん、チナは街中を駆け回った。半壊した学園の図書館でサバイバルの知識を得たり、民家の中に残った防災グッズから食料を集めたり──"
translation = "전투에서 서포트할 수 없는 만큼, 치나는 거리 곳곳을 뛰어다녔다. 반파된 학원의 도서관에서 서바이벌 지식을 얻거나, 민가 안에 남은 방재 용품에서 식료품을 모으거나──"

[[dialogue]]
speaker = "unk"
original = "ルヴィネのサポートは上手くいっていたが、当時のチナはグレイスとぎくしゃくしていた。"
translation = "루비네의 서포트는 잘 이루어지고 있었지만, 당시의 치나는 그레이스와 서먹서먹한 상태였다."

[[dialogue]]
speaker = "グレイス"
original = "「…………ふんっ」"
translation = "「…………흥.」"

[[dialogue]]
speaker = "チナ"
original = "「おいグレイス。お前なあ、その態度……」"
translation = "「어이 그레이스. 너 말이야, 그 태도……」"

[[dialogue]]
speaker = "グレイス"
original = "「魔王さんを卑怯者呼ばわりする人は、み、みんな嫌いです……！」"
translation = "「마왕님을 비겁자라고 부르는 사람은, 저, 정말 싫어요……!」"

[[dialogue]]
speaker = "チナ"
original = "「またその話かよ。いい加減しつこいぞ、お前……！」"
translation = "「또 그 얘기냐. 적당히 좀 해라, 너……!」"

[[dialogue]]
speaker = "unk"
original = "グレイスは直接、魔王クロトと会ったことがあるらしい。"
translation = "그레이스는 직접, 마왕 쿠로토와 만난 적이 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "出会った頃から明るかったグレイスが、いつからか焚き火を囲むこともなくなってしまって。"
translation = "만났을 무렵부터 밝았던 그레이스가, 언제부턴가 모닥불을 둘러싸는 일도 없어지게 되어서."

[[dialogue]]
speaker = "unk"
original = "チナもどうすればいいかわからず、よくケンカをした。"
translation = "치나도 어떻게 해야 할지 몰라, 자주 싸움을 했다."

[[dialogue]]
speaker = "unk"
original = "だがある日、転機が訪れる。"
translation = "하지만 어느 날, 전기가 찾아온다."

[[dialogue]]
speaker = "グレイス"
original = "「ひぐっ……ぐすっ……うぅぅう……」"
translation = "「히윽…… 흑…… 으으으으……」"

[[dialogue]]
speaker = "チナ"
original = "「もう泣くなよグレイス……喉渇いて、腹減るだけだぞ……？」"
translation = "「이제 그만 울어 그레이스…… 목마르고, 배만 고파질 뿐이라고……?」"

[[dialogue]]
speaker = "unk"
original = "ある日、がれきの下からグレイスの両親の亡骸が見つかった。チナは埋葬を手伝った。"
translation = "어느 날, 잔해 아래에서 그레이스 부모님의 유해가 발견되었다. 치나는 매장을 도왔다."

[[dialogue]]
speaker = "チナ"
original = "「そうだ……これ。お前の母さんの、セレスティア。ルヴィネが見つけてきてくれたって」"
translation = "「자…… 이거. 네 어머니의, 셀레스티아. 루비네가 찾아다 줬대.」"

[[dialogue]]
speaker = "グレイス"
original = "「…………はい」"
translation = "「…………네.」"

[[dialogue]]
speaker = "グレイス"
original = "「帰ったら、ルヴィネさんに、ちゃんとお礼を、言います……」"
translation = "「돌아가면, 루비네 씨에게, 제대로 감사를, 드릴게요……」"

[[dialogue]]
speaker = "チナ"
original = "「そうしろ。ほら、帰ろうぜ……？」"
translation = "「그렇게 해. 자, 돌아가자……?」"

[[dialogue]]
speaker = "グレイス"
original = "「……チナさんも、ありがとう、ございます」"
translation = "「……치나 씨도, 감사, 합니다.」"

[[dialogue]]
speaker = "グレイス"
original = "「お父さんとお母さんの……お墓。手伝ってくれて……手も、合わせてくれて……」"
translation = "「아빠랑 엄마의…… 무덤. 도와주셔서…… 손도, 모아주셔서……」"

[[dialogue]]
speaker = "チナ"
original = "「……お前だって一昨日、アタシに同じことしてくれただろ」"
translation = "「……너도 그저께, 나한테 똑같은 거 해줬잖아.」"

[[dialogue]]
speaker = "unk"
original = "チナはポケットに入れていた、父親のセレスティアに触れた。これもルヴィネが渡してくれたものだった。"
translation = "치나는 주머니에 넣어두었던, 아버지의 셀레스티아를 만졌다. 이것도 루비네가 건네준 것이었다."

[[dialogue]]
speaker = "グレイス"
original = "「私、強くなりたいです……」"
translation = "「저, 강해지고 싶어요……」"

[[dialogue]]
speaker = "チナ"
original = "「ああ。なりたいな……」"
translation = "「어아. 되고 싶네……」"

[[dialogue]]
speaker = "グレイス"
original = "「ルヴィネさんや、ベアトリスさん……レティシアさんみたいに……」"
translation = "「루비네 씨나, 베아트리스 씨…… 레티시아 씨처럼……」"

[[dialogue]]
speaker = "チナ"
original = "「あいつらがおかしいんだよ。普通、アタシらの年齢じゃ星騎士になんて──」"
translation = "「그 녀석들이 이상한 거야. 보통, 우리 나이에 성기사 같은 건──」"

[[dialogue]]
speaker = "グレイス"
original = "「…………あれ？」"
translation = "「…………어라?」"

[[dialogue]]
speaker = "チナ"
original = "「……うそだろ、お前」"
translation = "「……거짓말이지, 너.」"

[[dialogue]]
speaker = "unk"
original = "チナとグレイスのわだかまりが溶けたその日、グレイスもまた星騎士として覚醒を果たした。"
translation = "치나와 그레이스의 앙금이 풀린 그날, 그레이스 또한 성기사로서 각성을 완수했다."

[[dialogue]]
speaker = "チナ"
original = "「どうやったら星力って目覚めるんだ……アタシだけまだなんだけど……コツとかあるのかな……」"
translation = "「어떻게 해야 성력이 깨어나는 거야…… 나만 아직인데…… 요령 같은 게 있는 걸까……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「わ、わからないなあ……私はある日いきなりだったから」"
translation = "「모, 모르겠네…… 나는 어느 날 갑자기였으니까.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私も啓示を受けた身だから……グレイスさんに詳しく聞いてみたら？」"
translation = "「저도 계시를 받은 몸이라…… 그레이스 씨에게 자세히 물어보는 건 어때요?」"

[[dialogue]]
speaker = "チナ"
original = "「聞いたよ。でも、よくわかんないって……」"
translation = "「물어봤어. 근데, 잘 모르겠대……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「レティシアちゃんは？」"
translation = "「레티시아 짱은?」"

[[dialogue]]
speaker = "チナ"
original = "「なーんも。てか話しかけても反応してくれねーんだけど……」"
translation = "「전혀. 그보다 말을 걸어도 반응을 안 해주는데……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「照れてるのね」"
translation = "「부끄러워하는 거겠지.」"

[[dialogue]]
speaker = "ベアトリス"
original = "「照れてるんだよ、きっと」"
translation = "「부끄러워하는 거야, 분명.」"

[[dialogue]]
speaker = "チナ"
original = "「そうかぁ……？」"
translation = "「그럴까나……?」"

[[dialogue]]
speaker = "unk"
original = "そうして補給もままならない状況のまま、１ヵ月が過ぎた。"
translation = "그렇게 보급도 제대로 되지 않는 상황 속에서, 1개월이 지났다."

[[dialogue]]
speaker = "unk"
original = "自分だけ星騎士として、役に立つことができないもどかしさ。"
translation = "자신만 성기사로서 도움이 되지 못한다는 답답함."

[[dialogue]]
speaker = "unk"
original = "年齢も境遇もほとんど変わらないのに、自分だけが足を引っ張っている──そのうしろめたさから、共に焚き火を囲むことにチナが抵抗を感じ始めた頃……"
translation = "나이도 처지도 거의 다르지 않은데, 자신만이 발목을 잡고 있다── 그 죄책감에 함께 모닥불을 둘러싸는 것에 치나가 거부감을 느끼기 시작했을 무렵……"

[[dialogue]]
speaker = "ルヴィネ"
original = "「げほっ……ごほっ……！」"
translation = "「게흑…… 고학……!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが高熱を出した──無理がたたったのだ。"
translation = "루비네가 고열을 냈다── 무리가 쌓였던 것이다."

[[dialogue]]
speaker = "unk"
original = "この時の避難地は、デネブの住人たちの絶望は、すさまじかった。"
translation = "이 당시의 피난지에서 데네브 주민들이 느낀 절망은 대단했다."

[[dialogue]]
speaker = "ベアトリス"
original = "「ルヴィネちゃん、しっかり……しっかりして……！」"
translation = "「루비네 짱, 정신 차려…… 정신 차려봐……!」"

[[dialogue]]
speaker = "グレイス"
original = "「どどど、どうしましょうっ……お薬、もうありません……」"
translation = "「어어어, 어쩌죠…… 약이 이제 없어요……」"

[[dialogue]]
speaker = "流星市国民"
original = "「大変ですっ！\u3000モンスターが暴れてます……ルヴィネ様！」"
translation = "「큰일입니다! 몬스터가 날뛰고 있어요…… 루비네 님!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「わ、わかった……すぐに……」"
translation = "「아, 알았어…… 금방……」"

[[dialogue]]
speaker = "チナ"
original = "「バカ、寝てろ！！\u3000マジで死ぬぞお前！！」"
translation = "「바보야, 누워 있어!! 진짜 죽는다고 너!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「モンスターは私たちで何とかするから、休んでて！」"
translation = "「몬스터는 우리가 어떻게든 할 테니까, 쉬고 있어!」"

[[dialogue]]
speaker = "グレイス"
original = "「はい！\u3000レティシアさん、行きましょう！」"
translation = "「네! 레티시아 씨, 가요!」"

[[dialogue]]
speaker = "レティシア"
original = "「…………ルヴィネ。行って、いい？」"
translation = "「…………루비네. 가도, 돼?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………ええ。おねがい。２人を、守ってあげて……」"
translation = "「…………응. 부탁해. 두 사람을, 지켜줘……」"

[[dialogue]]
speaker = "レティシア"
original = "「……ん。守る……」"
translation = "「……응. 지킬게……」"

[[dialogue]]
speaker = "unk"
original = "その日から、ルヴィネが戦えなくなった。"
translation = "그날부터 루비네가 싸울 수 없게 되었다."

[[dialogue]]
speaker = "unk"
original = "額を触ると、ぞっとするほどに熱い。滋養を取らせて休ませようにも、そもそもの食料自体が不足していた。"
translation = "이마를 만지면 소름 끼칠 정도로 뜨겁다. 영양을 섭취하게 하고 쉬게 하려 해도, 애초에 식량 자체가 부족했다."

[[dialogue]]
speaker = "unk"
original = "流星市国内の薬局にある薬は、すでに避難民たちが消費しており、ルヴィネ自身の回復力にすがるしかない。"
translation = "유성시국 내 약국에 있던 약은 이미 피난민들이 다 소비해버려, 루비네 자신의 회복력에 매달릴 수밖에 없었다."

[[dialogue]]
speaker = "unk"
original = "チナは三日三晩、寝ずに看病した。指先が内出血を起こし、爪が割れても冷水のタオルをしぼり、ルヴィネの額の汗をぬぐい続けた。"
translation = "치나는 사흘 밤낮을 자지 않고 간호했다. 손끝에 피멍이 들고 손톱이 깨져도 찬물에 수건을 짜서 루비네의 이마에 맺힌 땀을 계속 닦아냈다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………ぁ。う……？」"
translation = "「…………아. 으……?」"

[[dialogue]]
speaker = "チナ"
original = "「あ──ルヴィネ……！\u3000目ぇ、さめたか……調子はどうだ？」"
translation = "「아── 루비네……! 정신이, 들었냐…… 몸은 좀 어때?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………だいぶ、楽になった、と思う」"
translation = "「…………훨씬, 편해진 것 같아」"

[[dialogue]]
speaker = "チナ"
original = "「無茶しすぎなんだよ……お前、全然寝ないし、食べないし……お前は機械か？\u3000実はヒトじゃない生き物か？\u3000違うだろ……？」"
translation = "「너무 무리했단 말이야…… 너, 전혀 자지도 않고 먹지도 않고…… 너 기계냐? 사실은 인간이 아닌 생물이야? 아니잖아……?」"

[[dialogue]]
speaker = "チナ"
original = "「ちゃんと食べて寝なきゃ、体壊すって……もう、ぜったいに無茶しないでくれ……」"
translation = "「제대로 먹고 자야 몸이 안 망가지지…… 이제, 절대로 무리하지 말아줘……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……チナさん。泣きそうなのに、怒ってる……不思議な顔……」"
translation = "「……치나 씨. 울 것 같은데 화내고 있어…… 신기한 얼굴……」"

[[dialogue]]
speaker = "チナ"
original = "「そりゃそうだろ……友達が病気で苦しそうにしてたら……つらいよ……」"
translation = "「그야 당연하잖아…… 친구가 아파서 괴로워하고 있으면…… 괴롭다고……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……友達。私とチナさんは……友達？」"
translation = "「……친구. 나와 치나 씨는…… 친구?」"

[[dialogue]]
speaker = "チナ"
original = "「アタシはそう思ってるよ……ルヴィネはめちゃくちゃすごいやつだよ。テルル様に選ばれるだなんて、すげーよ……特別な天使だ……」"
translation = "「난 그렇게 생각하고 있어…… 루비네는 엄청나게 대단한 녀석이야. 테루루 님에게 선택받다니, 굉장해…… 특별한 천사야……」"

[[dialogue]]
speaker = "チナ"
original = "「でも、友達だろ……友達はな。対等でないとダメなんだ……」"
translation = "「하지만, 친구잖아…… 친구는 말이야. 대등하지 않으면 안 된다고……」"

[[dialogue]]
speaker = "チナ"
original = "「ちくしょう……アタシも変身できたら。ルヴィネにこんな無茶、させずにすむのに……」"
translation = "「제기랄…… 나도 변신할 수 있다면. 루비네에게 이런 무리, 시키지 않아도 됐을 텐데……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……その気持ちだけで嬉しいわ」"
translation = "「……그 마음만으로도 기뻐」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「それにチナさんの存在に、私、救われてる……だってあなたは私のこと、『様』をつけて呼ばないから……」"
translation = "「게다가 치나 씨의 존재에 나, 구원받고 있어…… 왜냐면 당신은 나를 『님』을 붙여서 부르지 않으니까……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ここだけの話……『ルヴィネ様』って呼ばれるの、ちょっとだけイヤなの……ふふ。内緒よ……？」"
translation = "「우리끼리 얘긴데…… 『루비네 님』이라고 불리는 거, 조금은 싫어해…… 후후. 비밀이야……?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あの人たちも辛いだろうから。すがる対象がいて楽になるのなら、と判断したけれど……本当はイヤ……」"
translation = "「그 사람들도 힘들 테니까. 의지할 대상이 있어서 편해진다면, 하고 판단했지만…… 사실은 싫어……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「別に崇めて欲しいわけじゃない……だからチナさんとお喋りするのは、友達って呼んでもらえるのは……」"
translation = "「딱히 숭배받고 싶은 게 아니야…… 그러니까 치나 씨와 이야기하는 건, 친구라고 불러주는 건……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「すごく──嬉しい」"
translation = "「무척── 기뻐」"

[[dialogue]]
speaker = "チナ"
original = "「……へへ、そっか」"
translation = "「……헤헤, 그렇구나」"

[[dialogue]]
speaker = "チナ"
original = "「あ……じゃあ、呼び方！\u3000友達だっていうんなら『チナさん』はやめろよ、<b>ルヴィ</b>！」"
translation = "「아…… 그럼, 호칭! 친구라고 할 거면 『치나 씨』는 그만둬, <b>루비</b>!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ルヴィ……？\u3000ああ、それって、あれね？\u3000愛称って、やつね。ヒト同士が、友好の証を証明する際に用いる、呼び名ね……」"
translation = "「루비……? 아아, 그거 말이지? 애칭이라는 거네. 인간끼리 우호의 증표를 증명할 때 사용하는 이름……」"

[[dialogue]]
speaker = "チナ"
original = "「合ってるけど……お前たまに変なこと言うよなあ。ま、いいや。好きに呼んでくれよ」"
translation = "「맞긴 한데…… 너 가끔 이상한 소릴 한단 말이지. 뭐, 됐어. 마음대로 불러줘」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……じゃあ、<b>チナ</b>。今日からそう呼ぶわ」"
translation = "「……그럼, <b>치나</b>. 오늘부터 그렇게 부를게」"

[[dialogue]]
speaker = "チナ"
original = "「おう！\u3000そうだ、明日あいつらにもさ、好きな呼び方、聞いてみようぜ？」"
translation = "「오냐! 그렇지, 내일 저 녀석들에게도 말이야, 부르고 싶은 호칭 물어보자고!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「…………うん」"
translation = "「…………응」"

[[dialogue]]
speaker = "unk"
original = "微笑むルヴィネを見て、チナは思う──この子は女神の遣いではあるが、それを除けば自分とまったく変わらない、１人の少女なのだと。"
translation = "미소 짓는 루비네를 보며 치나는 생각한다── 이 아이는 여신의 사자이긴 하지만, 그것을 제외하면 자신과 전혀 다를 바 없는 한 명의 소녀라고."

[[dialogue]]
speaker = "チナ"
original = "（ああ──アタシも戦いたい。いや、違うな……ルヴィに無理、させたくないんだ……）"
translation = "(아아── 나도 싸우고 싶어. 아니, 아니지…… 루비에게 무리하게 하고 싶지 않은 거야……)"

[[dialogue]]
speaker = "チナ"
original = "（お父さんとお母さんみたいな星騎士に、誰かを助けられる星騎士に、アタシも──）"
translation = "(아빠랑 엄마 같은 성기사가, 누군가를 도울 수 있는 성기사가, 나도──)"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……チナ？\u3000あなた、ポケットが光ってるわ……？」"
translation = "「……치나? 너, 주머니가 빛나고 있어……?」"

[[dialogue]]
speaker = "チナ"
original = "「え？\u3000あっ──」"
translation = "「에? 앗──」"

[[dialogue]]
speaker = "チナ"
original = "「…………マジか」"
translation = "「…………진짜냐」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「おめでとう、チナ。これで５人目ね……」"
translation = "「축하해, 치나. 이걸로 다섯 명째네……」"

[[dialogue]]
speaker = "unk"
original = "香堂チナは守護星を得た。流星群以降、失ってばかりの彼女にとって、それはようやく手に入れた確かな希望だった──"
translation = "코도 치나는 수호성을 얻었다. 유성우 이후 잃기만 했던 그녀에게 그것은 마침내 손에 넣은 확실한 희망이었다──"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトに見捨てられ、陸の孤島となったデネブの流星市国には、何もなかった。"
translation = "히노미야 쿠로토에게 버림받아 육지의 고립된 섬이 된 데네브의 유성시국에는 아무것도 없었다."

[[dialogue]]
speaker = "unk"
original = "まともな食糧はすでになく。『ひずみ』のほんの小さな隙間から降り注ぐわずかな雨水を、布と砂利で<ruby>濾<rt>こ</rt></ruby>して、沸騰させてから飲むような暮らし。"
translation = "제대로 된 식량은 이미 없었고. 『왜곡』의 아주 작은 틈새로 쏟아지는 적은 빗물을 천과 자갈로 여과해서 끓여 마시는 생활."

[[dialogue]]
speaker = "unk"
original = "おしゃれもできない、遊ぶものもない、学園もないし、家族もいない。"
translation = "멋도 부릴 수 없고, 놀 거리도 없고, 학원도 없고, 가족도 없다."

[[dialogue]]
speaker = "unk"
original = "けれど、そんな状況でも彼女たちは懸命に生き続けた。"
translation = "하지만 그런 상황에서도 그녀들은 필사적으로 계속 살아갔다."

[[dialogue]]
speaker = "チナ"
original = "（魔王クロトがいなくなった今、アタシたちがデネブを守るんだ……！）"
translation = "(마왕 쿠로토가 없어진 지금, 우리가 데네브를 지키는 거야……!)"

[[dialogue]]
speaker = "unk"
original = "極限状況で星力を身に着けた５人の間には、いつしか深い絆が芽生えていた。"
translation = "극한 상황에서 성력을 몸에 익힌 다섯 명 사이에는 어느덧 깊은 유대감이 싹트고 있었다."

[[dialogue]]
speaker = "unk"
original = "全員が北極星にまつわる守護星をもつ彼女たちは、避難民にとって心の支えであり……"
translation = "전원이 북극성에 얽힌 수호성을 가진 그녀들은 피난민들에게 마음의 버팀목이었으며……"

[[dialogue]]
speaker = "unk"
original = "ルヴィネをリーダーとしたこの５人は、避難民たちから『ポラリス』と呼ばれるようになるのだった。"
translation = "루비네를 리더로 한 이 다섯 명은 피난민들로부터 『폴라리스』라고 불리게 되는 것이었다."

[[dialogue]]
speaker = "unk"
original = "そうして流星群から、ちょうど４ヵ月が経過した頃──流星市国を取り囲む空間のひずみは消失し、救助のヘリがやってきた。"
translation = "그렇게 유성우로부터 정확히 4개월이 경과했을 무렵── 유성시국을 둘러싼 공간의 왜곡은 소멸하고 구조 헬기가 찾아왔다."

[[dialogue]]
speaker = "unk"
original = "５人の少女たちが守りぬいた、流星市国民の総数は３９７人。"
translation = "다섯 명의 소녀들이 지켜낸 유성시국민의 총수는 397명."

[[dialogue]]
speaker = "unk"
original = "多数の負傷者に病人、全員が栄養失調状態でこそあったが、全住民が死亡したと噂されていた諸外国にとって、それはまさに不幸の中に輝く快挙。"
translation = "다수의 부상자와 환자, 전원이 영양실조 상태이긴 했으나, 모든 주민이 사망했다고 소문났던 타국들에게 그것은 그야말로 불행 속에서 빛나는 쾌거였다."

[[dialogue]]
speaker = "unk"
original = "その日から流星市国を救った奇跡の天使と、その友人である少女たちの名前は、デネブの人々に強く強く記憶されることになる──"
translation = "그날부터 유성시국을 구한 기적의 천사와 그 친구들인 소녀들의 이름은 데네브 사람들에게 강하게, 아주 강하게 기억되게 된다──"

