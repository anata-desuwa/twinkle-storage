[[dialogue]]
speaker = "ミルフィー"
original = "「ふぅ……今日のモンスターはちょっと手強かったね……会長くんがいてくれて本当によかったよ。おかげで早く学園に戻ることができたし……」"
translation = "「후우…… 오늘 몬스터는 좀 까다로웠네…… 회장군이 있어 줘서 정말 다행이었어. 덕분에 빨리 학원으로 돌아올 수 있었고……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いや部活はないんだけど……ただ、早く終わらせた方が、あなたと恋人としての時間を過ごせるかなぁって……」"
translation = "「아니 부활동은 없지만…… 다만, 빨리 끝내는 편이 당신과 연인으로서의 시간을 보낼 수 있을까 해서……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ほら、最近忙しくてあんまり一緒にいられなかったでしょ？\u3000だから今日はいっぱいイチャイチャしたいなって……」"
translation = "「봐, 요즘 바빠서 별로 같이 있지 못했잖아? 그래서 오늘은 잔뜩 꽁냥거리고 싶어서……」"

[[dialogue]]
speaker = "クロト"
original = "「俺もミルフィーと同じ気持ちだよ」"
translation = "「나도 밀피와 같은 마음이야」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んっ……優しく抱きしめられるの好き……<emoji=heart04>」"
translation = "「응…… 상냥하게 안아주는 거 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あなたに抱きしめられると、幸せな気持ちになってくる……<emoji=heart04>」"
translation = "「당신에게 안겨 있으면 행복한 기분이 들어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でもそれだけじゃないんだ……あなたを感じてると、同時にエッチな気持ちになっちゃって……<emoji=heart04>」"
translation = "「하지만 그것뿐만이 아냐…… 당신을 느끼고 있으면, 동시에 야한 기분이 되어버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ねぇ、お願いしてもいいかな……？\u3000私を……ここで抱いて……<emoji=heart04>」"
translation = "「저기, 부탁해도 될까……? 나를…… 여기서 안아줘……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「誰かが入ってくるかもしれないぞ？」"
translation = "「누군가 들어올지도 모른다고?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でも、もう我慢出来ないの……<emoji=heart04>\u3000あなたと繋がりたくて、濡れちゃってる……<emoji=heart04>」"
translation = "「하지만, 이제 참을 수 없는걸……<emoji=heart04> 당신과 이어지고 싶어서 젖어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うぅ……エッチなクラス委員長でごめんなさい……<emoji=heart04>」"
translation = "「으으…… 야한 학급위원이라서 미안해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんぅっ……<emoji=heart04>\u3000いつでも、おち○ちん入れていいよ……<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 언제든지 자지 넣어줘도 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きなおっぱいを露出させながら、甘い声で誘惑してくる。"
translation = "커다란 가슴을 노출하며 달콤한 목소리로 유혹해 온다."

[[dialogue]]
speaker = "unk"
original = "今すぐミルフィーのおま○こに挿入したい気持ちに駆られるが、グッと我慢した。"
translation = "당장 밀피의 보지에 삽입하고 싶은 충동에 휩싸였지만, 꾹 참았다."

[[dialogue]]
speaker = "ミルフィー"
original = "「？\u3000どうしたの？\u3000エッチしないの？」"
translation = "「? 왜 그래? 섹스 안 해?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「もしかして、おねだりしてほしいの……？\u3000私に、エッチなおねだりを……<emoji=heart04>」"
translation = "「혹시, 조르길 바라는 거야……? 나한테 야하게 졸라보라고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はミルフィーを更に強く抱きしめ、同意の意思を示した。"
translation = "나는 밀피를 더욱 강하게 끌어안으며 동의의 뜻을 나타냈다."

[[dialogue]]
speaker = "ミルフィー"
original = "「もう、あなたってば本当にいじわるなんだから……<emoji=heart04>」"
translation = "「정말, 당신도 참 정말 심술궂다니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーは頬を膨らませるが、怒ってなどいない。"
translation = "밀피는 볼을 부풀리지만, 화난 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "むしろ興奮したのか、更に頬を上気させ──"
translation = "오히려 흥분했는지 더욱 뺨을 붉히며──"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁはぁ……<emoji=heart04>\u3000お願い……おち○ちん、ちょうだい……<emoji=heart04>」"
translation = "「하아 하아……<emoji=heart04> 부탁이야…… 자지, 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あなたの硬くて太いおち○ちんを、私の肉厚なおま○こに突っ込んで……<emoji=heart04>」"
translation = "「당신의 딱딱하고 굵은 자지를, 내 두툼한 보지에 쑤셔 넣어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おま○こ、ぐちゃぐちゃにかき回して、い～っぱい、中出しして……<emoji=heart04>」"
translation = "「보지, 엉망진창으로 휘저어서, 가~득 질 내 사정해 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふあああああんっ……<emoji=heart04>\u3000おち○ちん、きたぁぁ……はぁぁんっ……<emoji=heart04>\u3000んんんんっ……<emoji=heart04>」"
translation = "「후아아아앙……<emoji=heart04> 자지, 들어왔다아…… 하앙……<emoji=heart04> 응응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの膣内は火傷しそうなくらい熱く蕩けつつ、俺のペニスを優しく包み込んでくれた。"
translation = "밀피의 질 안은 델 것같이 뜨겁게 녹아내리면서, 내 페니스를 상냥하게 감싸주었다."

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ……はぁああん……<emoji=heart04>\u3000おち○ちん、感じるよぉ……<emoji=heart04>\u3000熱くて、硬い……<emoji=heart04>\u3000あ、ああんっ……<emoji=heart04>」"
translation = "「하아…… 하아앙……<emoji=heart04> 자지, 느껴져어……<emoji=heart04> 뜨겁고, 딱딱해……<emoji=heart04> 아, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内でミルフィーを感じながら、ゆっくりと腰を動かしていく。"
translation = "질 안에서 밀피를 느끼며 천천히 허리를 움직여 간다."

[[dialogue]]
speaker = "ミルフィー"
original = "「ふぁ……ああああんっ……<emoji=heart04>\u3000ぐちゅ、ぐちゅって……おま○こかき回されてる……<emoji=heart04>」"
translation = "「화…… 아아아앙……<emoji=heart04> 구츄, 구츄하고…… 보지 휘저어지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんんっ<emoji=heart04>\u3000はぁ……あ、ああんっ<emoji=heart04>\u3000おち○ちん、気持ちいいっ……<emoji=heart04>\u3000んんんっ、んんんんぅぅ……<emoji=heart04>」"
translation = "「응응응응<emoji=heart04> 하아…… 아, 아앙<emoji=heart04> 자지, 기분 좋아……<emoji=heart04> 응응응, 응응응으으……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁはぁ……<emoji=heart04>\u3000実は……戦闘中も、ずっと期待してたんだ……<emoji=heart04>\u3000あなたのおち○ちんを、私のおま○こに、入れて欲しいって……<emoji=heart04>」"
translation = "「하아 하아……<emoji=heart04> 사실은…… 전투 중에도 계속 기대했었어……<emoji=heart04> 당신의 자지를 내 보지에 넣어주길 바란다고……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんっ<emoji=heart04>\u3000我慢できなくてっ……<emoji=heart04>\u3000戦いながら、エッチのこと考えてたのっ……<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 참을 수 없어서……<emoji=heart04> 싸우면서 섹스 생각만 했어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いやらしい子だなミルフィーは。そんなんじゃ星騎士失格だぞ？」"
translation = "「음란한 아이네 밀피는. 그래선 성기사 실격이라고?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「だってもう、あなたのおち○ちんを知っちゃったから……<emoji=heart04>\u3000はあぁ……大好き人とのエッチを知ったら、もう我慢なんて出来ないよぉ……<emoji=heart04>」"
translation = "「그치만 이제 당신의 자지를 알아버렸는걸……<emoji=heart04> 하아…… 사랑하는 사람과의 섹스를 알아버리면 이제 참는 건 무리야아……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あっ、あああっ、んんんんんぅ……<emoji=heart04>\u3000エッチ、好きっ……<emoji=heart04>\u3000大好きっ……<emoji=heart04>\u3000あああああぁっ……<emoji=heart04>」"
translation = "「아, 앗, 아앗, 응응응응으……<emoji=heart04> 섹스, 좋아……<emoji=heart04> 너무 좋아……<emoji=heart04> 아아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あなたとする度に、エッチが好きになってるぅっ……<emoji=heart04>\u3000はぁはぁ……あなたと付き合う前の私だったら、絶対にありえなかったのに……<emoji=heart04>」"
translation = "「당신이랑 할 때마다 섹스가 좋아지고 있어어……<emoji=heart04> 하아 하아…… 당신이랑 사귀기 전의 나였다면 절대 있을 수 없는 일인데……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ああああっ……<emoji=heart04>\u3000本当はっ……こんなこと、ダメなのにっ……<emoji=heart04>\u3000でも、気持ちいいのっ……<emoji=heart04>\u3000あ、あああっ、あああんっ……<emoji=heart04>」"
translation = "「아아아앗……<emoji=heart04> 사실은…… 이런 거 안 되는데……<emoji=heart04> 하지만 기분 좋은걸……<emoji=heart04> 아, 아아앗, 아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ひゃううぅぅっ<emoji=heart04>\u3000おち○ちんでっ、気持ちよくなっちゃってるっ<emoji=heart04>\u3000マトイさんや、みんなと過ごしてる教室で、私のおま○こっ……いっぱい気持ちよくなっちゃってる……<emoji=heart04>」"
translation = "「히야우우웃<emoji=heart04> 자지로 기분 좋아져 버리고 있어<emoji=heart04> 마토이 씨나 모두와 지내는 교실에서 내 보지가…… 잔뜩 기분 좋아져 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こんな所をマトイに見られたら、なんて言われるだろうな」"
translation = "「이런 모습을 마토이에게 들키면 뭐라고 할까」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ああんっ<emoji=heart04>\u3000そんなのっ、絶対にダメぇ……<emoji=heart04>\u3000私、変態って思われちゃうっ<emoji=heart04>\u3000あ、ああんっ……んんんぅ<emoji=heart04>\u3000んんんんぅっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 그런 건 절대 안 돼에……<emoji=heart04> 나, 변태라고 생각될 거야<emoji=heart04> 아, 아앙…… 응응으<emoji=heart04> 응응응으읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイに見られる事を想像したのか、おま○こがキュンと強く締まった。"
translation = "마토이에게 들키는 것을 상상했는지, 보지가 큥 하고 강하게 조여졌다."

[[dialogue]]
speaker = "ミルフィー"
original = "「あああんっ<emoji=heart04>\u3000ごめんっ、ごめんなさいっ……<emoji=heart04>\u3000クラス委員長なのに、プリマステラなのにっ……<emoji=heart04>\u3000エッチな女の子でぇ、ごめんなさいっ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 미안, 미안해요……<emoji=heart04> 학급위원장인데, 프리마스텔라인데……<emoji=heart04> 야한 여자애라서 미안해요<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふああっ……ああああぁぁっ<emoji=heart04>\u3000モンスターと戦いながら、ずっとセックスのこと考えててごめんなさいっ……<emoji=heart04>」"
translation = "「후아앗…… 아아아아앙<emoji=heart04> 몬스터와 싸우면서 계속 섹스 생각만 해서 미안해요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……変態だな、ミルフィーは」"
translation = "「……변태구나, 밀피는」"

[[dialogue]]
speaker = "ミルフィー"
original = "「言わないでぇ<emoji=heart04>\u3000あなたにそんなこと、言われるとっ……んんっ、んんんんんぅ～～<emoji=heart04>」"
translation = "「말하지 마아<emoji=heart04> 당신에게 그런 말을 들으면…… 응, 응응응응으~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ますます感じてきているのか、おま○こから愛液がどんどん溢れてくる。"
translation = "점점 더 느끼고 있는지 보지에서 애액이 계속 흘러넘친다."

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あああああんっ<emoji=heart04>\u3000変態でごめんなさいっ……<emoji=heart04>\u3000は、あぁっ、エッチな女の子でごめんなさいっ<emoji=heart04>\u3000はぁっ、ああああんっ<emoji=heart04>」"
translation = "「아, 아아아아앙<emoji=heart04> 변태라서 미안해요……<emoji=heart04> 하, 아아, 야한 여자애라서 미안해요<emoji=heart04> 하아, 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんんんんぅっ……<emoji=heart04>\u3000あなたにいじわるされるのっ、好きっ<emoji=heart04>\u3000たまらないのぉっ<emoji=heart04>」"
translation = "「응응응응응으읏……<emoji=heart04> 당신이 심술부리는 거 좋아……<emoji=heart04> 못 참겠어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ……あああうっ<emoji=heart04>\u3000こんなのっ、本当にっ、星騎士失格になっちゃうっ<emoji=heart04>\u3000んんっ、んんんんんっ……<emoji=heart04>」"
translation = "「하아…… 아아아우<emoji=heart04> 이런 거 정말 성기사 실격되어버려……<emoji=heart04> 응, 응응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あああああぅうっ<emoji=heart04>\u3000でもむりっ……<emoji=heart04>\u3000気持ちいいの我慢するの……むりぃ……<emoji=heart04>」"
translation = "「아아아아아우우웃<emoji=heart04> 하지만 무리야……<emoji=heart04> 기분 좋은 거 참는 거…… 무리이……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「お、お願い……<emoji=heart04>\u3000もっと、もっとおま○こ突いてぇっ……<emoji=heart04>\u3000頭がおかしくなるくらい、気持ちよくしてぇっ……<emoji=heart04>」"
translation = "「부, 부탁이야……<emoji=heart04> 더, 더 보지 찔러줘어……<emoji=heart04> 머리가 이상해질 정도로 기분 좋게 해줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふああああぁぁんっ<emoji=heart04>\u3000パンパンっ、激しいのぉっ<emoji=heart04>\u3000あ、あああっ、あああああんんっ<emoji=heart04>」"
translation = "「후아아아아앙<emoji=heart04> 퍽퍽, 격렬해애<emoji=heart04> 아, 아아앗, 아아아아앙앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おち○ちんっ、こんなパンパンされたらっ<emoji=heart04>\u3000感じるっ<emoji=heart04>\u3000いっぱい、気持ちよくなっちゃうぅ<emoji=heart04>」"
translation = "「자지, 이렇게 퍽퍽 박히면<emoji=heart04> 느껴져어<emoji=heart04> 잔뜩 기분 좋아져 버려어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁっ、はぁんっ──あっ、ふあああああぁぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おち○ちんっ、気持ちいいのぉっ<emoji=heart04>」"
translation = "「하아, 하앙── 앗, 후아아아아아앗<emoji=heart04> 기분 좋아<emoji=heart04> 자지, 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こんなに激しくされてるのに、感じまくってるな」"
translation = "「이렇게 격렬하게 당하는데도 엄청 느끼고 있네」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んあああああぁぁっ<emoji=heart04>\u3000だってぇっ<emoji=heart04>\u3000ふはぁっ、はぁっ……もう何回もあなたとエッチしてるんだもんっ<emoji=heart04>」"
translation = "「응아아아아아앗<emoji=heart04> 그치만<emoji=heart04> 후하아, 하아…… 벌써 몇 번이나 당신이랑 섹스했는걸<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「もうおま○こっ、調教されきってるからぁ<emoji=heart04>\u3000おま○こパンパンされるのっ、好きなのぉっ<emoji=heart04>」"
translation = "「이미 보지, 완전히 조교되어버렸으니까아<emoji=heart04> 보지 퍽퍽 박히는 거 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んはぁっ、あああうっ──はっ、はぁああんっ<emoji=heart04>\u3000もっと、おま○こパンパンしてぇ<emoji=heart04>\u3000んんんんんぅっ<emoji=heart04>」"
translation = "「음하아, 아아아우── 하아, 하아앙<emoji=heart04> 더 보지 퍽퍽해줘어<emoji=heart04> 응응응응응으읏<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おま○こっ、壊れちゃうくらい<emoji=heart04>\u3000いっぱいパンパンしてぇ<emoji=heart04>\u3000あ、あああっ、ああああぁぁっ<emoji=heart04>」"
translation = "「보지, 망가질 정도로<emoji=heart04> 잔뜩 퍽퍽해줘어<emoji=heart04> 아, 아아앗, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "丸く肉付きのいいお尻を、形が変わるくらい力強く腰で突く。"
translation = "동그랗고 살집 좋은 엉덩이를 모양이 변할 정도로 힘차게 허리로 찌른다."

[[dialogue]]
speaker = "unk"
original = "その度に白く濁った愛液が床に零れ落ち、おま○こは卑猥な音を教室中に響かせる。"
translation = "그때마다 하얗게 탁한 애액이 바닥으로 쏟아지고, 보지는 비루한 소리를 교실 안에 울려 퍼뜨린다."

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんっ、んんんんんぅぅぅっ……<emoji=heart04>\u3000あっ、ああああっ<emoji=heart04>\u3000おち○ちんっ、おち○ちんいいのぉっ<emoji=heart04>」"
translation = "「응응응, 응응응으으으읏……<emoji=heart04> 앗, 아아아앗<emoji=heart04> 자지, 자지 너무 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おち○ちんでっ、私のおま○こかき回されちゃってるぅ<emoji=heart04>\u3000おま○こっ、ぐちゃぐちゃになっちゃうぅ<emoji=heart04>」"
translation = "「자지로 내 보지 휘저어지고 있어어<emoji=heart04> 보지, 엉망진창이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーが愛しくて、もっと気持ちよくさせたくて、更に腰の動きを早める。"
translation = "밀피가 사랑스러워서, 더 기분 좋게 해주고 싶어서 더욱 허리 움직임을 빠르게 한다."

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あああっ、ああぁぁぁ<emoji=heart04>\u3000おま○この奥っ<emoji=heart04>\u3000いっぱい突かれてるぅ<emoji=heart04>」"
translation = "「아, 아아앗, 아아아아<emoji=heart04> 보지 깊숙한 곳<emoji=heart04> 잔뜩 찔리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んあああああああっ<emoji=heart04>\u3000子宮もっ、中出ししてほしいって<emoji=heart04>\u3000降りてきちゃってるぅ<emoji=heart04>」"
translation = "「응아아아아아아앗<emoji=heart04> 자궁도 질 내 사정해달라고 내려와 버리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、ああああんっ<emoji=heart04>\u3000んんっ、はぁっ<emoji=heart04>\u3000いっぱい、子宮もパンパンしてぇ<emoji=heart04>\u3000せーし、出すんだぞって、教えてあげてぇ<emoji=heart04>」"
translation = "「아, 아아아앙<emoji=heart04> 응, 하아<emoji=heart04> 잔뜩 자궁도 퍽퍽해줘어<emoji=heart04> 정액 내보내는 곳이라고 가르쳐줘어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あああああああぁあぁあぁっ<emoji=heart04>\u3000子宮パンパンされてるぅっ<emoji=heart04>」"
translation = "「아, 아아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아아아아아아아아앗<emoji=heart04> 자궁 퍽퍽 당하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんんんぅっ<emoji=heart04>\u3000いいっ<emoji=heart04>\u3000いいのぉっ<emoji=heart04>\u3000おち○ちんっ、気持ちいいっ<emoji=heart04>\u3000気持ちいいのぉっ<emoji=heart04>」"
translation = "「응응응응응으읏<emoji=heart04> 좋아<emoji=heart04> 좋은걸어<emoji=heart04> 자지, 기분 좋아<emoji=heart04> 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁっ──はぁっ、はぁっ──あああああああああぁああぁっ<emoji=heart04>\u3000子宮っ、ノックされる度、頭が真っ白になるぅ<emoji=heart04>」"
translation = "「하아── 하아, 하아── 아아아아아아아아아아아앗<emoji=heart04> 자궁 노크당할 때마다 머릿속이 하얘져어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ああっ、あああああんっ<emoji=heart04>\u3000こんなのっ、耐えられないっ<emoji=heart04>\u3000子宮もっ、おち○ちんで壊れちゃうぅ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「아앗, 아아아아앙<emoji=heart04> 이런 거 못 견뎌어<emoji=heart04> 자궁도 자지로 망가져 버려어<emoji=heart04> 하아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はあああんっ……<emoji=heart04>\u3000あああっ、あああんっ……<emoji=heart04>\u3000おち○ちん、もっと大きくなってる<emoji=heart04>\u3000はぁっ……あああああんっ<emoji=heart04>」"
translation = "「하아앙……<emoji=heart04> 아앗, 아아앙……<emoji=heart04> 자지, 더 커졌어<emoji=heart04> 하아…… 아아아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「大きいおち○ちんで突かれるのっ、好きぃ<emoji=heart04>\u3000いっぱい、いっぱいっ、パンパンしてぇ<emoji=heart04>\u3000あ、あああっ、あああう<emoji=heart04>」"
translation = "「커다란 자지로 찔리는 거 좋아아<emoji=heart04> 잔뜩, 잔뜩 퍽퍽해줘어<emoji=heart04> 아, 아아앗, 아아아우<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あああんっ<emoji=heart04>\u3000あ、あああ──ああああああっ<emoji=heart04>\u3000おま○こっ、キュンキュン、しちゃうぅ<emoji=heart04>\u3000んんんんんんんぅ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 아, 아아아── 아아아아아앗<emoji=heart04> 보지 큥큥거려어<emoji=heart04> 응응응응응응응으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘く淫靡な嬌声を上げながら、大きなお尻を振るミルフィー。"
translation = "달콤하고 음탕한 교성을 지르며 커다란 엉덩이를 흔드는 밀피."

[[dialogue]]
speaker = "unk"
original = "そのあまりにもいやらしい光景に、オスの欲望がかき立てられる。"
translation = "그 너무나도 야한 광경에 수컷의 욕망이 불타오른다."

[[dialogue]]
speaker = "ミルフィー"
original = "「ひやっ、あああうっ……<emoji=heart04>\u3000んんんんんんぅっ<emoji=heart04>\u3000おち○ちんっ、ビクビクしてるぅっ<emoji=heart04>\u3000ビクビクしちゃってるぅっ<emoji=heart04>」"
translation = "「히얏, 아아아우……<emoji=heart04> 응응응응응응응으읏<emoji=heart04> 자지, 파르르 떨리고 있어어<emoji=heart04> 파르르 떨리고 있다구우<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんっ、んんんんぅっ<emoji=heart04>\u3000せーえきっ、出そうに、なってるんだよねっ<emoji=heart04>\u3000あ、あああっ、ああああああああっ<emoji=heart04>」"
translation = "「응응응, 응응응으읏<emoji=heart04> 정액 나올 것 같아진 거지이<emoji=heart04> 아, 아아앗, 아아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いいよ<emoji=heart04>\u3000最後までっ、いっぱい気持ちよくなってぇ……<emoji=heart04>\u3000ふあっ、ああああうっ<emoji=heart04>\u3000あああああぁぁ<emoji=heart04>」"
translation = "「괜찮아<emoji=heart04> 마지막까지 잔뜩 기분 좋아져 줘……<emoji=heart04> 후앗, 아아아아우<emoji=heart04> 아아아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふあ、あああっ、ああああんっ！\u3000子宮っ、ぐりぐりされてるぅっ<emoji=heart04>\u3000ああああっ、あああああんっ<emoji=heart04>」"
translation = "「후아, 아아앗, 아아아앙! 자궁, 꾸욱꾸욱 당하고 있어어<emoji=heart04> 아아아앗, 아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「子宮口っ、開いちゃうよぉっ<emoji=heart04>\u3000このままじゃ、子宮でイカされちゃうっ<emoji=heart04>\u3000んんんっ、んんんんぅぅぅ<emoji=heart04>」"
translation = "「자궁구 열려버려어<emoji=heart04> 이대로는 자궁으로 가버려어<emoji=heart04> 응응응, 응응응으으으<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ああああっ──はぁっ、はぁんっ<emoji=heart04>\u3000ふああああぁあぁぁっ<emoji=heart04>\u3000イクっ、イッちゃう～<emoji=heart04>」"
translation = "「아아아앗── 하아, 하앙<emoji=heart04> 후아아아아아아아앗<emoji=heart04> 가, 가버려어~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ミルフィー、俺もそろそろ……！！」"
translation = "「밀피, 나도 이제……!!」"

[[dialogue]]
speaker = "unk"
original = "ラストスパートをかけて、腰の動きをより激しいものにしていく。"
translation = "라스트 스퍼트를 올리며 허리 움직임을 더욱 격렬하게 한다."

[[dialogue]]
speaker = "ミルフィー"
original = "「ああ、あああっ──ふあああぁああぁぁ<emoji=heart04>\u3000出してぇ<emoji=heart04>\u3000せーしっ、いっぱい出してぇ<emoji=heart04>」"
translation = "「아아, 아아앗── 후아아아아아아<emoji=heart04> 내보내 줘<emoji=heart04> 정액, 잔뜩 내보내 줘어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんっ、んんんんんぅっ<emoji=heart04>\u3000子宮の中っ、いっぱいにしてぇ<emoji=heart04>\u3000あなたのっ、せーしでいっぱいにぃ<emoji=heart04>」"
translation = "「응응응, 응응응응으읏<emoji=heart04> 자궁 안 가득 채워줘어<emoji=heart04> 당신의 정액으로 가득히이<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はあぁあんっ<emoji=heart04>\u3000あんっ、んんんんんんんんぅっ<emoji=heart04>\u3000イクっ、イクイクイクぅ～<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 앙, 응응응응응응응응으읏<emoji=heart04> 가, 가가가가버려어~<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あああああああああああぁぁぁっ<emoji=heart04>\u3000イッちゃうぅぅ<emoji=heart04>\u3000イッちゃうぅぅぅっ<emoji=heart04>」"
translation = "「아아아아아아아아아아아아앗<emoji=heart04> 가버려어어<emoji=heart04> 가버려어어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ああああっ──あああああああああああああぁぁぁぁ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앗── 아아아아아아아아아아아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「せーしっ<emoji=heart04>\u3000熱いせーしっ、出てるぅぅっ<emoji=heart04>\u3000あああっ、ああああぁぁぁ<emoji=heart04>\u3000ああああああぁぁぁぁ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「정액<emoji=heart04> 뜨거운 정액 나오고 있어어어<emoji=heart04> 아아앗, 아아아아아아<emoji=heart04> 아아아아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんんんんぅ～～～っ<emoji=heart04>\u3000イクのっ、止まらないぃぃ<emoji=heart04>\u3000ずっとイッちゃってるぅ<emoji=heart04>」"
translation = "「응응응응응으~~~읏<emoji=heart04> 가는 거 안 멈춰어어<emoji=heart04> 계속 가버리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あっ、あああっ、ああああんっ<emoji=heart04>\u3000ああああああああああああぁあぁぁあぁ～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 아아앗, 아아아앙<emoji=heart04> 아아아아아아아아아아아아아아아아아아~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁっ、はぁっ……<emoji=heart04>\u3000あああぁ……<emoji=heart04>\u3000おち○ちん、ビクビクって……<emoji=heart04>」"
translation = "「하아, 하아……<emoji=heart04> 아아아……<emoji=heart04> 자지, 파르르하고……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「子宮の中っ……せーしで、いっぱいになってるの、分かる……<emoji=heart04>」"
translation = "「자궁 안…… 정액으로 가득 찬 거 알아……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁはぁ……<emoji=heart04>\u3000おち○ちん、抜かないで……<emoji=heart04>\u3000まだ、あなたを感じていたいの……<emoji=heart04>」"
translation = "「하아 하아……<emoji=heart04> 자지 빼지 마……<emoji=heart04> 아직 당신을 느끼고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あったかい……<emoji=heart04>\u3000お腹の奥から、幸せな気持ちが溢れてくる……<emoji=heart04>」"
translation = "「따뜻해……<emoji=heart04> 배 속 깊은 곳에서 행복한 기분이 넘쳐흘러……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんっ……<emoji=heart04>\u3000はぁ……はぁ……<emoji=heart04>\u3000やっぱり、あなたに愛されるエッチ、大好き……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아…… 하아……<emoji=heart04> 역시 당신에게 사랑받는 섹스, 너무 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「満足できた？」"
translation = "「만족했어?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うん……あなたのおち○ちんにいっぱい気持ちよくしてもらったから……<emoji=heart04>」"
translation = "「응…… 당신의 자지로 잔뜩 기분 좋게 해줬으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でも、すぐにまたシたくなっちゃうと思う……<emoji=heart04>」"
translation = "「하지만 금방 또 하고 싶어질 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「それだけあなたのこと……好きだから。ずっと繋がっていたいって、そう思っちゃう……<emoji=heart04>」"
translation = "「그만큼 당신을…… 좋아하니까. 계속 이어져 있고 싶다고 그렇게 생각하게 돼……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もミルフィーとずっと繋がっていたいよ」"
translation = "「나도 밀피와 계속 이어져 있고 싶어」"

[[dialogue]]
speaker = "ミルフィー"
original = "「えへへ……相思相愛だね<emoji=heart04>」"
translation = "「에헤헤…… 상사상애네<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「当たり前だろ。俺たち、愛し合ってるんだから」"
translation = "「당연하잖아. 우리 사랑하고 있으니까」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふふ<emoji=heart04>\u3000私たち、ラブラブのカップルだもんね<emoji=heart04>」"
translation = "「후후<emoji=heart04> 우리 러브러브한 커플인걸<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぅ<emoji=heart04>\u3000あなたと一緒にいられるの……なんだかとっても幸せ……<emoji=heart04>」"
translation = "「하우<emoji=heart04> 당신과 함께 있을 수 있는 거…… 왠지 무척 행복해……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「こうやって、いつまでもずっとずっと……いっぱいエッチしようね<emoji=heart04>」"
translation = "「이렇게 언제까지나 계속 계속…… 잔뜩 섹스하자<emoji=heart04>」"

