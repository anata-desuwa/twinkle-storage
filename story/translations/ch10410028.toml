[[dialogue]]
speaker = "unk"
original = "ハロウィン当日、正式な恋人になったネーゼマインと、デートをしていた時のこと。"
translation = "네제마인은 드디어 평소 같은 미소를 보여주는 것이었다."

[[dialogue]]
speaker = "unk"
original = "急に忙しない様子になった彼女に手を引っ張られて、俺たちは人ごみを避けるように移動していた。"
translation = "할로윈 당일, 정식 연인이 된 네제마인과 데이트를 하던 중의 일이었다."

[[dialogue]]
speaker = "クロト"
original = "「マイン、そんなに急いで、どこに行こうとしてるんだ？」"
translation = "갑자기 다급해진 그녀에게 손을 이끌려, 우리는 인파를 피해 이동하고 있었다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ごめん、会長。今は余裕ないから、着いたら話す」"
translation = "「마인, 그렇게 서둘러서 어디로 가려는 거야?」"

[[dialogue]]
speaker = "unk"
original = "ひょっとして、公安委員会の関係でなにかあったのだろうか？\u3000と、気を引き締めていると――"
translation = "「미안, 회장. 지금은 여유가 없으니까 도착하면 말할게」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふぅ……やっと着いた……<emoji=heart04>」"
translation = "혹시 공안위원회 관계로 무슨 일이 생긴 걸까? 하고 긴장하고 있자――"

[[dialogue]]
speaker = "クロト"
original = "「って……ラブホテル！？」"
translation = "「후우…… 겨우 도착했다……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁ……<emoji=heart04>\u3000もう限界<emoji=heart04>\u3000悪いけど会長、私の性欲解消に付き合ってね……<emoji=heart04>」"
translation = "「그게…… 러브호텔!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――どういうことなのかって？\u3000さっきさ、ハロウィンの人ごみに紛れて、エッチな悪戯し合ってるカップルを見つけちゃったんだよね～……」"
translation = "「하아아……❤️ 이제 한계❤️ 미안하지만 회장, 내 성욕 해소 좀 도와줘……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え～、そんな大胆なことしちゃうんだって思いつつも、つい見入っちゃってさ……」"
translation = "「――어떻게 된 거냐구? 아까 말야, 할로윈 인파에 섞여서 야한 장난 치고 있는 커플을 발견해버렸거든~……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それで私たち、最近忙しくて、こういうことできてなかったじゃん？」"
translation = "「에~ 저런 대담한 짓을 하다니 싶으면서도 나도 모르게 빤히 봐버려서 말야……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だから、溜まってたムラムラが、ど～しても抑えられなくなっちゃって……」"
translation = "「그래서 우리, 최근에 바빠서 이런 거 못 했잖아?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ハロウィンデート、ちょっと中途半端だったけど……ごめんね<emoji=heart04>」"
translation = "「그래서 쌓여있던 욕구불능이 도저히 억눌러지지 않게 돼버려서……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長にエッチな悪戯、させて欲しいな……<emoji=heart04>」"
translation = "「할로윈 데이트, 조금 어중간해졌지만…… 미안해❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「というわけで……はあぁっ<emoji=heart04>\u3000この前は、乳首開発の途中、だったよね？\u3000――えいっ<emoji=heart04>」"
translation = "「회장에게 야한 장난, 하게 해줬으면 좋겠어……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ<emoji=heart04>\u3000会長ってば、乳首ちょっと触っただけで、可愛い声出しちゃって～」"
translation = "「그런 고로…… 하아앗❤️ 저번에는 유두 개발 도중이었지? ――에잇❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅ……<emoji=heart04>\u3000どんどんＭになっちゃってるね<emoji=heart04>\u3000まぁ、私がそうさせちゃってるんだけど……<emoji=heart04>」"
translation = "「니히히❤️ 회장도 참, 유두 좀 만졌다고 귀여운 소리를 내고~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「じゃあ、どんどん乳首弄ってくよ～<emoji=heart04>\u3000ほ～ら、クリクリ～<emoji=heart04>\u3000指の腹でピンピン、って弾いちゃったりもして～<emoji=heart04>」"
translation = "「후우우……❤️ 점점 M이 되어가고 있네❤️ 뭐, 내가 그렇게 만들고 있는 거지만……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁ……<emoji=heart04>\u3000会長の乳首、だんだん固くなってきたよ～？」"
translation = "「자, 그럼 계속 유두 괴롭힐게~❤️ 자아, 굴리고 굴리고~❤️ 손가락 끝으로 팅 팅, 하고 튕겨버리기도 하고~❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「クリクリ～<emoji=heart04>\u3000ピンピン<emoji=heart04>\u3000シコシコ<emoji=heart04>\u3000キュッキュ<emoji=heart04>\u3000……クリクリ、シコシコ<emoji=heart04>\u3000ピンピン<emoji=heart04>\u3000キュッキュ<emoji=heart04>」"
translation = "「하아아……❤️ 회장 유두, 점점 딱딱해지고 있어~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んっ……<emoji=heart04>\u3000会長のおち○ぽも、大きくなってきた……<emoji=heart04>」"
translation = "「데굴데굴~❤️ 팅팅❤️ 비비적비비적❤️ 꾹꾹❤️ ……데굴데굴, 비비적비비적❤️ 팅팅❤️ 꾹꾹❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁ……<emoji=heart04>\u3000私のおま○こ、もう愛液で濡れてきちゃってるから、スマタでおち○ぽも濡らしてくね……<emoji=heart04>」"
translation = "「응……❤️ 회장 자지도 커졌어……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅ……<emoji=heart04>\u3000おま○こ、ぬりぬり<emoji=heart04>\u3000ぬちゅぬちゅ<emoji=heart04>\u3000乳首も一緒に、クリクリ<emoji=heart04>\u3000シコシコ<emoji=heart04>」"
translation = "「하아아……❤️ 내 보지, 벌써 애액으로 젖어버렸으니까 스마타로 자지도 적셔줄게……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――おま○こ、すごいぐちゅぐちゅになってるって……？\u3000うん……<emoji=heart04>\u3000今日は本当にムラムラしてるから……私もおち○ぽ、早く欲しい<emoji=heart04>」"
translation = "「후우우……❤️ 보지 비비적비비적❤️ 찌릿찌릿❤️ 유두도 같이 데굴데굴❤️ 비비적비비적❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁ……<emoji=heart04>\u3000もうガチガチに固くなってるから、挿れてもいいよね？」"
translation = "「――보지, 엄청 질척질척해졌냐구……? 응……❤️ 오늘은 정말로 하고 싶으니까…… 나도 자지, 빨리 갖고 싶어❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ん……<emoji=heart04>\u3000おち○ぽ、入口に当たってる<emoji=heart04>\u3000会長、挿れちゃうよ……<emoji=heart04>」"
translation = "「하아아……❤️ 이제 빳빳하게 굳었으니까 넣어도 되지?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅ……<emoji=heart04>\u3000おま○この中に入ってくるぅ……あっ――<emoji=heart04>」"
translation = "「응……❤️ 자지, 입구에 닿았어❤️ 회장, 넣어버릴게……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁっ……<emoji=heart04>\u3000会長のおち○ぽ入ってきたぁっ……<emoji=heart04>」"
translation = "「후우우……❤️ 보지 속으로 들어온다아…… 앗――❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅっ……んっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>\u3000あっ……んんっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「하아앗……❤️ 회장 자지 들어왔어어……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ～、ヤバい……<emoji=heart04>\u3000おち○ぽ気持ちいい……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「후우우읏…… 응……❤️ 하아앗…… 후우우읏……❤️ 앗…… 으응……❤️ 하아앗…… 후우우읏……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そうそう、これこれぇ<emoji=heart04>\u3000この大きくて、固くて、熱いので……中が押し広げられる感じぃ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000背筋がゾクゾクするぅ<emoji=heart04>」"
translation = "「아~ 위험해……❤️ 자지 기분 좋아……❤️ 하아앗……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁっ……ふうぅっ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000ふうぅっ……んんっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>」"
translation = "「그래 그래, 이거야 이거어❤️ 이 크고, 딱딱하고, 뜨거운 걸로…… 안이 벌려지는 느낌이이❤️ 후우우읏……❤️ 등줄기가 오싹오싹해❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――ん～？\u3000私のおま○こが絡みついてきて、いつもよりすごいって？\u3000はあぁ……<emoji=heart04>」"
translation = "「하아앗…… 후우우읏❤️ 응…… 하아앗❤️ 후우우읏…… 응응❤️ 하아앗…… 후우우읏❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ<emoji=heart04>\u3000私がおち○ぽ堪能するだけじゃなくて、ふうぅっ……<emoji=heart04>\u3000ちゃんと会長のことも、気持ちよくしてあげないとね<emoji=heart04>」"
translation = "「――응~? 내 보지가 달라붙어 와서 평소보다 엄청나다구? 하아아……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んっ……<emoji=heart04>\u3000じゃあ、おま○こパコパコしながら、乳首も弄ってくよ～？」"
translation = "「니히히❤️ 나만 자지 만끽하는 게 아니라, 후우우읏……❤️ 제대로 회장도 기분 좋게 해줘야지❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅっ……<emoji=heart04>\u3000ほら、こうやって乳首の神経を刺激して、少しずつ増やして～……気持ちいい場所なんだって、今日も教え込んじゃうから<emoji=heart04>」"
translation = "「응……❤️ 자, 그럼 보지 팍팍 하면서 유두도 괴롭힐게~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「乳首クリクリ<emoji=heart04>\u3000シコシコ<emoji=heart04>\u3000ピンピン<emoji=heart04>\u3000キュッキュ<emoji=heart04>」"
translation = "「후우우읏……❤️ 자, 이렇게 유두 신경을 자극해서 조금씩 늘려가며~…… 기분 좋은 곳이라는 걸 오늘도 가르쳐줄 테니까❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁっ……<emoji=heart04>\u3000乳首、おち○ぽみたいに固くなってきたよ～？\u3000コリコリ<emoji=heart04>\u3000ピンピン<emoji=heart04>\u3000シコシコ<emoji=heart04>\u3000キュッキュ<emoji=heart04>」"
translation = "「유두 데굴데굴❤️ 비비적비비적❤️ 팅팅❤️ 꾹꾹❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃはっ<emoji=heart04>\u3000おち○ぽ、中でビクビクって反応してる～<emoji=heart04>」"
translation = "「하아앗……❤️ 유두, 자지처럼 딱딱해졌어~? 데굴데굴❤️ 팅팅❤️ 비비적비비적❤️ 꾹꾹❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「乳首で感じちゃってるんだ～？\u3000女の子みた～い<emoji=heart04>」"
translation = "「캬핫❤️ 자지, 안에서 파들파들하고 반응해~❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長ってばスケベ<emoji=heart04>\u3000変態<emoji=heart04>\u3000ザコ乳首<emoji=heart04>」"
translation = "「유두로 느껴버리고 있는 거야~? 여자애 가타아~❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「女の子に開発されちゃって、情けな～い<emoji=heart04>\u3000雑魚<emoji=heart04>\u3000ざこ<emoji=heart04>\u3000ザ～コ<emoji=heart04>」"
translation = "「회장도 참 변태❤️ 호색한❤️ 잡코 유두❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅっ……<emoji=heart04>\u3000ほら、もっと感じちゃえ<emoji=heart04>\u3000乳首コリコリ<emoji=heart04>\u3000シコシコ<emoji=heart04>\u3000キュッキュ<emoji=heart04>\u3000……コリコリ<emoji=heart04>\u3000ピンピン<emoji=heart04>\u3000キュッキュッキュ<emoji=heart04>」"
translation = "「여자애한테 개발당해버리고, 한심해라아~❤️ 잡코❤️ 잡코❤️ 자~코❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おま○こも忘れずにぃ……にゅぷにゅぷ、パンパン<emoji=heart04>\u3000にゅぽにゅぽ、パンパン<emoji=heart04>」"
translation = "「후우우읏……❤️ 자, 더 느껴버려❤️ 유두 데굴데굴❤️ 비비적비비적❤️ 꾹꾹❤️ ……데굴데굴❤️ 팅팅❤️ 꾹꾹꾹❤️」"

[[dialogue]]
speaker = "クロト"
original = "「あっ、マイン待って！\u3000なんかきそう……！」"
translation = "「보지도 잊지 말고오…… 쭈욱쭈욱, 팡팡❤️ 쭈욱쭈욱, 팡팡❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひっ<emoji=heart04>\u3000もうイっちゃうんだ～？\u3000いいよ、射精しちゃえ<emoji=heart04>」"
translation = "「앗, 마인 잠깐! 뭔가 올 것 같아……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「女の子に乳首もてあそばれながら、ザコち○ぽ、情けなくイっちゃえっ<emoji=heart04>\u3000ほらほら、乳首コリコリ<emoji=heart04>\u3000おま○こパコパコ<emoji=heart04>\u3000乳首シコシコ<emoji=heart04>\u3000おま○こパンパン<emoji=heart04>」"
translation = "「니히히❤️ 벌써 가버리는 거야~? 좋아, 사정해버려❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「コリコリ、パコパコ<emoji=heart04>\u3000シコシコ、パンパン<emoji=heart04>\u3000ほら、イけ<emoji=heart04>\u3000おち○ぽ、さっさとイけっ<emoji=heart04>」"
translation = "「여자애한테 유두 농락당하면서 잡코 자지, 한심하게 가버려❤️ 자아 자아, 유두 데굴데굴❤️ 보지 팍팍❤️ 유두 비비적비비적❤️ 보지 팡팡❤️」"

[[dialogue]]
speaker = "クロト"
original = "「っあぁ、ヤバい！\u3000本当にイクっ――！！！」"
translation = "「데굴데굴, 팍팍❤️ 비비적비비적, 팡팡❤️ 자아, 가❤️ 자지, 얼른 가버리라구❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃははっ<emoji=heart04>\u3000本当にイっちゃった～<emoji=heart04>\u3000って、あれ……？」"
translation = "「으아아, 위험해! 진짜 가――!!!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長、射精してなくない……？\u3000もしかして――」"
translation = "「캬하하❤️ 진짜로 가버렸어~❤️ 어라, 그런데……?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あはっ……きゃはははっ<emoji=heart04>\u3000会長、おち○ぽの方じゃなくて、乳首でドライオーガズムしちゃったの～！？\u3000やったぁ～っ♪」"
translation = "「회장, 사정 안 했잖아……? 설마――」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁ～っ<emoji=heart04>\u3000ついに乳首イキ――脳イキしちゃったんだ～？\u3000ふうぅっ……<emoji=heart04>」"
translation = "「아하❤️ 캬하하하❤️ 회장, 자지 쪽이 아니라 유두로 드라이 오르가슴 해버린 거야~!? 해냈다~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃはっ<emoji=heart04>\u3000会長、天国見たみたいな、とろけた顔しちゃって～<emoji=heart04>\u3000そんなに気持ちよかったの～？」"
translation = "「하아아~❤️ 드디어 유두 가기―― 뇌 가기 해버린 거야~? 후우우읏……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅっ……<emoji=heart04>\u3000でもぉ<emoji=heart04>\u3000会長だけ気持ちよくなっちゃうなんて、ずるいよね～？\u3000私はまだイってないし～<emoji=heart04>\u3000だ・か・ら<emoji=heart04>」"
translation = "「캬핫❤️ 회장, 천국 본 것 같은 황홀한 표정 짓고 있고~❤️ 그렇게 기분 좋았어~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――このまま一気におち○ぽでもイっちゃえ<emoji=heart04>\u3000えいっ<emoji=heart04>」"
translation = "「후우우읏……❤️ 하지만❤️ 회장만 기분 좋아지다니 치사하지 않아~? 난 아직 안 갔는데~❤️ 그・러・니・까❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁっ<emoji=heart04>\u3000ほら、おま○こ激しく<emoji=heart04>\u3000ジュポジュポ、パンパンッ<emoji=heart04>\u3000ジュプジュプ、パンパンッ<emoji=heart04>」"
translation = "「――이대로 단번에 자지로도 가버려❤️ 에잇❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「こうやって、おま○こギュっと締めちゃうの、好きでしょ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000パンッ、パンッ、パンッ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>」"
translation = "「하아앗❤️ 자, 보지 격렬하게❤️ 쭈욱쭈욱, 팡팡!❤️ 쭈욱쭈욱, 팡팡!❤️」"

[[dialogue]]
speaker = "クロト"
original = "「マイン、待って！\u3000乳首でイったのがまだ落ち着いてないから、今そんなに激しくされたら……！」"
translation = "「이렇게 보지 꽉 조여버리는 거 좋아하지❤️ 훙, 훙, 훙❤️ 팡, 팡, 팡❤️ 훙, 훙, 훙❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅっ<emoji=heart04>\u3000ふんっ、ふんっ<emoji=heart04>\u3000あっ、ふぅっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000んんっ、はあぁっ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>」"
translation = "「마인, 잠깐만! 유두로 간 게 아직 안 가라앉았으니까 지금 그렇게 격렬하게 하면……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふうぅっ<emoji=heart04>\u3000会長、もっと<emoji=heart04>\u3000もっと気持ちよさそうな顔見せて<emoji=heart04>\u3000ほら、パンッ、パンッ、パンッ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>」"
translation = "「후우우읏❤️ 훙, 훙❤️ 앗, 후우❤️ 하아앗, 후우우읏❤️ 훙, 훙, 훙❤️ 응응, 하아앗❤️ 훙, 훙, 훙❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長<emoji=heart04>\u3000その泣きそうな顔ヤバい<emoji=heart04>\u3000おま○こに効くぅ～<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>」"
translation = "「후우우읏❤️ 회장, 더❤️ 더 기분 좋은 것 같은 얼굴 보여줘❤️ 자아, 팡, 팡, 팡❤️ 훙, 훙, 훙❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「また、さっきみたいなイキ顔見せて<emoji=heart04>\u3000ほら、乳首も一緒に<emoji=heart04>」"
translation = "「회장❤️ 그 울 것 같은 얼굴 대박❤️ 보지에 직방이야~❤️ 하아앗, 후우우읏❤️ 훙, 훙, 훙❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「コリコリ、ギュッギュ<emoji=heart04>\u3000シコシコ、ギュッギュ<emoji=heart04>\u3000おま○こパンパンッ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000パンッ、パンッ、パンッ<emoji=heart04>」"
translation = "「또 아까 같은 절정 표정 보여줘❤️ 자아, 유두도 같이❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――同時責めされたら、もうイっちゃいそう？\u3000いいよ、イっちゃえ<emoji=heart04>\u3000私ももうイキそうだから、一緒にっ<emoji=heart04>」"
translation = "「데굴데굴, 꾹꾹❤️ 비비적비비적, 꾹꾹❤️ 보지 팡팡!❤️ 훙, 훙, 훙❤️ 팡, 팡, 팡❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000パンッ、パンッ、パンッ<emoji=heart04>\u3000シコシコ、ギュッギュ<emoji=heart04>\u3000コリコリ、ギュッギュ<emoji=heart04>」"
translation = "「――동시 공격 당하면 벌써 가버릴 것 같아? 좋아, 가버려❤️ 나도 곧 갈 것 같으니까 같이❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ～、きたっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イキそう……っ。はあぁっ、ふうぅっ<emoji=heart04>」"
translation = "「훙, 훙, 훙❤️ 팡, 팡, 팡❤️ 비비적비비적, 꾹꾹❤️ 데굴데굴, 꾹꾹❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――会長もイキそう？\u3000イケイケっ<emoji=heart04>\u3000イっちゃえ<emoji=heart04>\u3000おち○ぽに溜まった精液、全部出せ<emoji=heart04>\u3000あんっ、あんっ、あぁんっ<emoji=heart04>」"
translation = "「아~ 온다❤️ 보지 간다❤️ 갈 것 같아……. 하아앗, 후우우읏❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あっ、あっ、あっ、ああっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>\u3000気持ちよく出しちゃえっ！\u3000１番いいところで、乳首思い切りつねってあげるからっ」"
translation = "「――회장도 갈 것 같아? 가라 가❤️ 가버려❤️ 자지에 쌓인 정액 전부 내보내❤️ 응, 응, 으응❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほらっ、ほらっ、ほらっ、せ～のっ――！」"
translation = "「앗, 앗, 앗, 아앗❤️ 가가가❤️ 기분 좋게 싸버려! 제일 좋은 타이밍에 유두 확 꼬집어줄 테니까」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はいっ<emoji=heart04><emoji=heart04>\u3000どっぴゅんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자, 자, 자, 하나 둘――!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「っ……はああぁぁぁぁああんっ<emoji=heart04>\u3000ああああっ<emoji=heart04>\u3000精液きたぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하잇❤️ ❤️ 퓨슉❤️ ❤️ ❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あぁ～～～っ<emoji=heart04>\u3000久しぶりの中出し射精、効っくぅ～～～っ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「윽…… 하아아아아아아앙❤️ 아아아앗❤️ 정액 왔다아아아~~~~~~❤️ ❤️ ❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んっ<emoji=heart04>\u3000ふぅっ……<emoji=heart04>\u3000腰に力が入らないよぉ<emoji=heart04>\u3000おち○ぽ、抜けるかな……？\u3000あんっ……<emoji=heart04>」"
translation = "「아아~~~❤️ 오랜만의 질내 사정, 제대로 오네~~~❤️ 하아앗……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はあぁ……<emoji=heart04>\u3000抜けたぁ<emoji=heart04>\u3000にひひ<emoji=heart04>\u3000会長ってば、いつにも増して、今日は射精量すっごい……<emoji=heart04>」"
translation = "「응❤️ 후우……❤️ 허리에 힘이 안 들어가아❤️ 자지 빠지려나……? 응……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おま○こに入り切らなくて、溢れちゃう……<emoji=heart04>\u3000そんなに気持ちよかった？」"
translation = "「하아아……❤️ 빠졌다아❤️ 니히히❤️ 회장도 참, 평소보다 오늘 사정량 엄청나……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私も、今までで１番興奮して、気持ちよかったよ……<emoji=heart04>」"
translation = "「보지에 다 안 들어가서 넘쳐흘러……❤️ 그렇게 기분 좋았어?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――初めて乳首でイクのもヤバかったって？\u3000ふ～ん、癖になっちゃいそうなくらい、気持ちよかったんだ～？」"
translation = "「나도 지금까지 중에서 제일 흥분했고 기분 좋았어……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも見たところ、さっきは乳首とおち○ぽの同時イキは、できてなかった感じだよね～？」"
translation = "「――처음으로 유두로 가는 것도 대박이었다구? 흐~음, 버릇될 정도로 기분 좋았구나~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私、会長が同時イキするところ見てみたいな～<emoji=heart04>\u3000思わずアへ顔とかしちゃうくらい、気持ちいいかもよ～？」"
translation = "「하지만 보아하니 아까는 유두랑 자지 동시 절정은 못 한 느낌이지~?」"

[[dialogue]]
speaker = "クロト"
original = "「ちょっ、マイン……！\u3000乳首イジりながら言わないで……！」"
translation = "「나, 회장이 동시 절정 하는 거 보고 싶어~❤️ 나도 모르게 아헤가오 해버릴 정도로 기분 좋을지도 몰라~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ<emoji=heart04>\u3000１発で孕ませるくらい射精したばっかりなのに、また会長、おち○ぽ勃ってきてるよ～？」"
translation = "「잠깐, 마인……! 유두 만지면서 말하지 마……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「本当、サイズも、射精量も、回復力もエグい絶倫凶悪ち○ぽだよね～<emoji=heart04>\u3000彼女の私が、責任を持って性欲管理しないと……<emoji=heart04>」"
translation = "「니히히❤️ 한 방에 임신시킬 정도로 사정한 직후인데 또 회장 자지 서고 있어~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「というわけで～<emoji=heart04>\u3000乳首イキに慣らして、おち○ぽと同時イキ目指しちゃうから、もう１回、ね<emoji=heart04>」"
translation = "「정말 사이즈도, 사정량도, 회복력도 무시무시한 절륜 흉악 자지라니까~❤️ 여자친구인 내가 책임지고 성욕 관리 해줘야겠네……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ……<emoji=heart04>」"
translation = "「그런 고로~❤️ 유두 가기에 익숙해져서 자지랑 동시 절정 노려볼 테니까, 한 번 더❤️」"

[[dialogue]]
speaker = "unk"
original = "それからラブホテルを時間延長して、俺は朝になるまで何度も彼女にイカされてしまうのだった――"
translation = "「니히히……❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「はぁ…………<emoji=heart04>\u3000ふぅ…………<emoji=heart04>\u3000ん…………<emoji=heart04>\u3000はぁ……ふぅ……<emoji=heart04>\u3000あ～…………んん…………<emoji=heart04>\u3000はあぁ…………<emoji=heart04>\u3000んうぅ…………<emoji=heart04>\u3000あっ…………ふうぅ…………<emoji=heart04>」"
translation = "그 후 러브호텔 시간을 연장하고, 나는 아침이 될 때까지 몇 번이나 그녀에게 보내져버리는 것이었다――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「んっ<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>\u3000んっ……あっ……<emoji=heart04>\u3000ふうぅっ……はあぁっ……<emoji=heart04>\u3000んうぅっ……はあぁっ……<emoji=heart04>」"
translation = "「하아…………❤️ 후우…………❤️ 응…………❤️ 하아…… 후우……❤️ 아~………… 응응…………❤️ 하아아…………❤️ 응으으…………❤️ 앗………… 후우우…………❤️」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ふぅっ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000んんっ、ふうぅっ<emoji=heart04>\u3000はあぁっ、ふうぅっ<emoji=heart04>\u3000ふんっ、ふんっ<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「응❤️ 하아앗…… 후우우읏……❤️ 응응……❤️ 하아앗…… 후우우읏……❤️ 응…… 앗……❤️ 후우우읏…… 하아앗……❤️ 응으읏…… 하아앗……❤️」"

