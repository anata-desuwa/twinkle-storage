[[dialogue]]
speaker = "unk"
original = "第１話,海と水着と暗殺者,P"
translation = "제1화, 바다와 수영복과 암살자, P"

[[dialogue]]
speaker = "unk"
original = "ある日。ナターシャから連絡が来て、ビーチに向かうと……"
translation = "어느 날. 나타샤에게 연락이 와서, 해변으로 향했더니……"

[[dialogue]]
speaker = "若い男"
original = "「君、かわいいね。俺と一緒にひと泳ぎしない？」"
translation = "「너, 귀엽네. 나랑 같이 한 번 헤엄치지 않을래?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ん～、今は泳ぎたい気分じゃないかな～」"
translation = "「음~, 지금은 헤엄치고 싶은 기분이 아닌걸~」"

[[dialogue]]
speaker = "若い男"
original = "「なら美味しい物でも食べようよ。奢るからさ」"
translation = "「그럼 맛있는 거라도 먹으러 가자. 내가 쏠 테니까」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それはちょっと魅力的だけど。でもこれから人と約束があるから遠慮しとくね」"
translation = "「그건 좀 매력적이지만. 하지만 이제부터 사람이랑 약속이 있어서 사양할게」"

[[dialogue]]
speaker = "若い男"
original = "「そうつれないこと言わないで。楽しい時間を約束するからさ～」"
translation = "「그렇게 무정하게 말하지 말고. 즐거운 시간을 약속할 테니까~」"

[[dialogue]]
speaker = "unk"
original = "デジャブを感じる光景だ……"
translation = "데자뷔가 느껴지는 광경이다……"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、来た来た。おーい遅いよ、彼氏～」"
translation = "「아, 왔다 왔다. 어이~ 늦었어, 자기야~」"

[[dialogue]]
speaker = "若い男"
original = "「あ、彼氏？\u3000なんだよ、彼氏いんなら最初からそう言えよ」"
translation = "「아, 남자친구? 뭐야, 남자친구 있으면 처음부터 그렇게 말하라고」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふー、ようやく行った。わざわざ呼びつけちゃってごめんね、会長さん。ナイスタイミングだったよ」"
translation = "「후우, 드디어 갔네. 일부러 불러내서 미안해, 회장님. 나이스 타이밍이었어」"

[[dialogue]]
speaker = "unk"
original = "それは構わないけど……彼氏？"
translation = "그건 상관없지만…… 남자친구?"

[[dialogue]]
speaker = "ナターシャ"
original = "「前の一件で私は学んだんだ。ああいう、しつこいナンパ男を撃退するには、男と一緒にいるのが一番だってね」"
translation = "「지난번 일로 배웠거든. 저런 끈질긴 헌팅남을 격퇴하려면, 남자랑 같이 있는 게 제일이라는걸」"

[[dialogue]]
speaker = "ナターシャ"
original = "「所謂ナンパ避けってやつ？\u3000今日は会長さんにその役をお願いしたくて呼んだわけ」"
translation = "「이른바 헌팅 방지용이랄까? 오늘은 회장님한테 그 역할을 부탁하고 싶어서 부른 거야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「実はすっごく困っててさ。ビーチに来てからナンパの量が半端なくて。１人でいると、すーぐ誰かしら声かけてくるの」"
translation = "「사실 엄청 곤란했거든. 해변에 오고 나서 헌팅당하는 양이 장난이 아니라서. 혼자 있으면 금방 누군가가 말을 걸어와」"

[[dialogue]]
speaker = "ナターシャ"
original = "「のんびりする暇もないっていうか。おちおち食事も取れなくて。海の家の列に並んでるだけでも喋りかけられるし」"
translation = "「느긋하게 쉴 틈도 없달까. 마음 놓고 식사도 못 하겠어. 바다의 집 줄에 서 있기만 해도 말을 걸어오고」"

[[dialogue]]
speaker = "ナターシャ"
original = "「他にいくらでも女性客がいるのにね。あんまり目立つ行動も取らないようにしてるつもりなんだけどなぁ」"
translation = "「다른 여성 손님들도 얼마든지 있는데 말이야. 딱히 눈에 띄는 행동도 안 하려고 주의하고 있는데 말이지」"

[[dialogue]]
speaker = "unk"
original = "その格好で１人佇んでたらまぁ……"
translation = "그 차림으로 혼자 서 있으면 뭐……"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふふ、なになに？\u3000なんか会長さん、ナンパ男たちと同じような顔しちゃってるけど」"
translation = "「후후후, 뭐야 뭐야? 왠지 회장님, 헌팅남들이랑 비슷한 표정을 짓고 있는데」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ナンパ避けが、ナンパ男にならないでね？\u3000そういう視線はメルエルにでも──」"
translation = "「헌팅 방지 역할이, 헌팅남이 되면 안 된다고? 그런 시선은 메르엘한테나──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いや、ううん……なんでもない。とにかくビーチを満喫するためにも、彼氏役としてちょっと付き合ってよ♪」"
translation = "「아니, 아냐…… 아무것도 아냐. 어쨌든 해변을 만끽하기 위해서라도, 남자친구 역할로 좀 어울려줘♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「いつか恋人ができた時の練習だと思って接してくれていいからさ♪\u3000私も会長さんの監視ができるしＷｉｎ－Ｗｉｎでしょ？」"
translation = "「언젠가 연인이 생겼을 때의 연습이라고 생각하고 대해줘도 되니까♪ 나도 회장님을 감시할 수 있고 윈윈이잖아?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「さっきから鼻の下伸ばして眺めてる私の水着姿も……ふふふ。好きなだけ目に焼きつけちゃってくれていいし♪」"
translation = "「아까부터 넋을 잃고 바라보는 내 수영복 모습도…… 후후후. 마음껏 눈에 새겨둬도 좋으니까♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あはは、今更目を逸らしたって遅いよ♪\u3000会長さんも男の子だね～♪」"
translation = "「아하하, 이제 와서 눈을 돌려도 늦었어♪ 회장님도 남자애네~♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ま、いくらでも見てくれていいよ？\u3000元々そういう目的で、この水着フォームもカスタマイズしたつもりだし♪」"
translation = "「뭐, 얼마든지 봐도 좋아? 원래 그런 목적으로, 이 수영복 폼도 커스터마이즈한 거니까♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「監視対象をいつでも色仕掛けで堕とせるようにってね♪\u3000そういう意味の機能性も重視してるってわけ♪」"
translation = "「감시 대상을 언제든 미인계로 타락시킬 수 있도록 말이야♪ 그런 의미의 기능성도 중시했다는 거지♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「どうでも良いナンパ男たちまで寄ってたかって来るのは想定外だったけどね。珍しく遊びたい気分なのに、邪魔されてばっかでさー」"
translation = "「상관도 없는 헌팅남들까지 떼거지로 몰려오는 건 예상 밖이었지만. 드물게 놀고 싶은 기분인데, 방해만 잔뜩 받아서 말이야─」"

[[dialogue]]
speaker = "ナターシャ"
original = "「というわけで、行こ行こ♪\u3000お腹ぺっこぺこなんだ♪」"
translation = "「그런 고로, 가자 가자♪ 배가 엄청 고파♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふ～、ようやく買えた。やっぱり男の人と一緒だと、ナンパも寄ってこないね～」"
translation = "「후우, 드디어 샀네. 역시 남자랑 같이 있으니까 헌팅도 안 꼬이네~」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ここのたこ焼き、すごく美味しいって評判らしいからさ。ほら、会長さんも食べて」"
translation = "「여기 타코야키, 아주 맛있다고 소문난 모양이니까. 자, 회장님도 먹어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「そうだ、恋人っぽくあーんでもしてあげよっか？\u3000あはは、遠慮しなくていいから。ナンパ避けに使わせてもらってるお礼だよ♪」"
translation = "「맞다, 연인처럼 아~앙이라도 해줄까? 아하하, 사양하지 않아도 돼. 헌팅 방지에 이용한 보답이야♪」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ほらほら早く口開けて。急がないとメルエルに食べられちゃう──」"
translation = "「자자 얼른 입 벌려. 서두르지 않으면 메르엘이 먹어버릴──」"

[[dialogue]]
speaker = "ナターシャ"
original = "「っと……メルエルはいないんだった。習慣っていうのは怖いね、まったく……」"
translation = "「앗…… 메르엘은 없었지. 습관이라는 건 무섭네, 정말……」"

[[dialogue]]
speaker = "unk"
original = "まだ仲直りはしてないんだ？"
translation = "아직 화해는 안 한 거야?"

[[dialogue]]
speaker = "ナターシャ"
original = "「仲直りっていうか……ま、隠してたこと全部バラしちゃったしね。面と向かって、嫌いとも言ったし」"
translation = "「화해라기보다…… 뭐, 숨기고 있던 거 전부 까발려버렸으니까. 대놓고 싫다고도 말했고」"

[[dialogue]]
speaker = "ナターシャ"
original = "「むしろ今は清々してるくらいだよ。溜まってたもの、あの子にぶちまけられてさ」"
translation = "「오히려 지금은 후련할 정도야. 쌓여있던 걸 그 애한테 다 쏟아부어서 말이야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「こうして前より自分の時間も取れるようになったしね。ま、もちろんメルエルの護衛と監視は今も続けてるけど」"
translation = "「이렇게 전보다 내 시간도 가질 수 있게 됐고. 뭐, 물론 메르엘의 호위와 감시는 지금도 계속하고 있지만」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おかげでいい気分だよ。美味しいもの好きに食べられるし、ビーチでのんびり過ごせるし、すごく心が晴れやかで……」"
translation = "「덕분에 기분 좋아. 맛있는 거 마음껏 먹을 수 있고, 해변에서 느긋하게 보낼 수 있고, 아주 마음이 상쾌해서……」"

[[dialogue]]
speaker = "unk"
original = "らしくないことばかりしてるように見えるけど"
translation = "답지 않은 일들만 하고 있는 것처럼 보이는데"

[[dialogue]]
speaker = "ナターシャ"
original = "「はぁ……会長さんの目からもそう見えちゃうか」"
translation = "「하아…… 회장님 눈에도 그렇게 보여버리나」"

[[dialogue]]
speaker = "ナターシャ"
original = "「なんだろうね。自分でもよくわかんないや。すっきりしたはずなのに、どこかモヤモヤしてる」"
translation = "「뭘까. 나도 잘 모르겠어. 후련해졌을 텐데, 어딘가 답답해」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だから人気のたこ焼きを並んで買うとか、ビーチでのんびり過ごすとか、普段しないことしちゃってるのかな……」"
translation = "「그래서 인기 있는 타코야키를 줄 서서 산다거나, 해변에서 느긋하게 보낸다거나, 평소에 안 하던 짓을 하는 걸까……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ホントは食べものにもリゾートにも興味ないのにね。会長さんにはバレバレだったか。これじゃ暗殺者失格だね」"
translation = "「사실은 음식에도 리조트에도 관심 없는데 말이야. 회장님한테는 다 들켜버렸나. 이래서야 암살자 실격이네」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……でもなんだか嬉しいな。会長さんが私のこと、わかっててくれて」"
translation = "「……하지만 왠지 기쁘네. 회장님이 나를 알아줘서」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おかげで、ちょっぴり心のモヤモヤが晴れた気がする。ふふ、会長さんを呼びつけて正解だったかも」"
translation = "「덕분에 조금 마음의 답답함이 풀린 기분이야. 후후, 회장님을 불러내길 잘했을지도」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ね、会長さん。２人でパーッとひと泳ぎしに行かない？\u3000そのたこ焼き、全部食べちゃっていいからさ」"
translation = "「저기, 회장님. 둘이서 시원하게 한 번 헤엄치러 가지 않을래? 그 타코야키, 전부 먹어버려도 되니까」"

[[dialogue]]
speaker = "ナターシャ"
original = "「なんでもいいから体を動かしたい気分なんだ。私をわかってくれてる人と一緒に」"
translation = "「뭐든 좋으니까 몸을 움직이고 싶은 기분이야. 나를 알아주는 사람이랑 같이」"

[[dialogue]]
speaker = "ナターシャ"
original = "「もしかしたら一日中付き合わせちゃうかもしれないけど……」"
translation = "「어쩌면 하루 종일 어울리게 할지도 모르겠지만……」"

[[dialogue]]
speaker = "ナターシャ"
original = "「その分、ふふふ、サービスもしてあげるつもりだから♪」"
translation = "「그만큼, 후후후, 서비스도 해줄 생각이니까♪」"

