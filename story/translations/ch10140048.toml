[[dialogue]]
speaker = "unk"
original = "バレンタインの後日。俺は恋人のトワちゃん先生とリゾート結界でデートを楽しんだ後、夜の食事会をしていた。"
translation = "발렌타인 후일. 나는 연인인 토와짱 선생님과 리조트 결계에서 데이트를 즐긴 뒤, 저녁 식사 모임을 하고 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「は～い、会長く～ん♪\u3000あ～ん<emoji=heart04>」"
translation = "「자~아, 회장구~운♪ 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんはキッチンを借りて、俺に手料理を作って食べさせてくれる。ただ、楽しそうにお酒を飲んでいた彼女は、食事が終わる頃にはすっかり酔っぱらってしまっていて――"
translation = "토와짱은 주방을 빌려, 나에게 손요리를 만들어 먹여 준다. 다만, 즐거운 듯 술을 마시던 그녀는, 식사가 끝날 무렵에는 완전히 취해버려서――"

[[dialogue]]
speaker = "トワ先生"
original = "「ねぇ、会長く～ん<emoji=heart04>\u3000この後はトワ先生と～」"
translation = "「있지, 회장구~운<emoji=heart04> 이 다음은 토와 선생님이랑~」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんが密着するように横に寄り添い、耳元で甘く囁く。"
translation = "토와짱이 밀착하듯 옆으로 다가와, 귓가에 달콤하게 속삭인다."

[[dialogue]]
speaker = "トワ先生"
original = "「今日こそ、水上コテージでイチャハメ……しよ<emoji=heart04>」"
translation = "「오늘이야말로, 수상 코티지에서 으쌰박기…… 하자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は思わず唾を飲み込み、頷いてしまう。"
translation = "나는 나도 모르게 마른침을 삼키며, 고개를 끄덕이고 만다."

[[dialogue]]
speaker = "トワ先生"
original = "「――ふふっ<emoji=heart04>\u3000じゃあ～、先生のこと、お姫様抱っこで運んれ～<emoji=heart04>」"
translation = "「――후훗<emoji=heart04> 자아~, 선생님을, 공주님 안기로 옮겨줘~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "水上コテージのベッドに移ると、トワちゃんに手を取られ、そのまま俺は押し倒されてしまった。"
translation = "수상 코티지의 침대로 옮겨가자, 토와짱에게 손을 붙잡혔고, 그대로 나는 밀쳐져 넘어지고 말았다."

[[dialogue]]
speaker = "トワ先生"
original = "「よいしょっと……んふふ～<emoji=heart04>」"
translation = "「영차…… 응후후~<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「今日はトワ先生が～、年上彼女として、会長くんをリードしちゃうんらから～<emoji=heart04>」"
translation = "「오늘은 토와 선생님이~, 연상 여자친구로서, 회장군을 리드해버릴 거니까~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "酔いのせいで微妙に呂律が回らないながらも、トワちゃんは俺の上に乗ってそう宣言する。"
translation = "취기 때문에 미묘하게 발음이 꼬이면서도, 토와짱은 내 위에 올라타 그렇게 선언한다."

[[dialogue]]
speaker = "クロト"
original = "「それはいいんだけど……なんでそっち向きなの？」"
translation = "「그건 좋은데…… 왜 그쪽 방향이야?」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんはなぜか背面騎乗位で、顔ではなくお尻をこちらに向けていた。振り返りつつ、彼女は悪戯っぽい笑顔で答える。"
translation = "토와짱은 왠지 배면 기승위로, 얼굴이 아니라 엉덩이를 이쪽으로 향하고 있었다. 뒤돌아보며, 그녀는 장난스러운 미소로 대답한다."

[[dialogue]]
speaker = "トワ先生"
original = "「んふっ<emoji=heart04>\u3000それはね～。先生、ちょっと勉強してきたことがあるから～、今日は会長くんに試してあげようと思って～♪」"
translation = "「응훗<emoji=heart04> 그건 말이지~. 선생님, 조금 공부하고 온 게 있으니까~, 오늘은 회장군에게 시험해 봐 주려고~♪」"

[[dialogue]]
speaker = "クロト"
original = "「試したいこと？」"
translation = "「시험하고 싶은 거?」"

[[dialogue]]
speaker = "トワ先生"
original = "「えへへ<emoji=heart04>\u3000それは後でのお楽しみ～<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 그건 나중의 즐거움~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、トワちゃんは腰を前後にグラインドさせるように動かし、お尻と秘部を俺のペニスに押し付けるように擦り始めた。"
translation = "그렇게 말하자, 토와짱은 허리를 전후로 그라인드하듯 움직이며, 엉덩이와 비부를 내 자지에 밀어붙이듯 문지르기 시작했다."

[[dialogue]]
speaker = "トワ先生"
original = "「んふぅ～<emoji=heart04>\u3000ほらほら、回復星術れ～、先生と一緒に元気になっちゃえ～<emoji=heart04>」"
translation = "「응후우~<emoji=heart04> 자아 자아, 회복성술이야~, 선생님이랑 같이 기운차려버리자~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんの星力は回復に特化しており、長年の鍛錬でその扱いにも熟達している。"
translation = "토와짱의 성력은 회복에 특화되어 있으며, 오랜 단련으로 그 다루기에도 숙달되어 있다."

[[dialogue]]
speaker = "unk"
original = "彼女はそれを自分のおま○こや、肌との接触を通じて俺のペニスに流し込むことで、急速に<b>元気</b>にさせてしまうことができる。"
translation = "그녀는 그것을 자신의 보지나, 피부와의 접촉을 통해 내 자지에 흘려보냄으로써, 급속도로 <b>기운차게</b> 만들어버릴 수 있다."

[[dialogue]]
speaker = "トワ先生"
original = "「あはっ<emoji=heart04>\u3000会長くんのチ○ポ、もうギンギンに勃起してるぅ～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……ふうぅ～っ……<emoji=heart04>」"
translation = "「아핫<emoji=heart04> 회장군의 자지, 벌써 빳빳하게 발기해 있어~<emoji=heart04> 응<emoji=heart04> 하아아…… 후우우~……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「トワちゃんのおま○こも、もう愛液でぐちょぐちょに濡れてるよ」"
translation = "「토와짱의 보지도, 벌써 애액으로 축축하게 젖어 있어」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん<emoji=heart04>\u3000もうぬるぬるに準備れきたから～<emoji=heart04>\u3000チ○ポ、入れちゃうね～<emoji=heart04>」"
translation = "「응<emoji=heart04> 이제 미끈미끈하게 준비됐으니까~<emoji=heart04> 자지, 넣어버릴게~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、トワちゃんは１度腰を浮かせて、ペニスを膣穴に押し当てる。"
translation = "그렇게 말하며, 토와짱은 한 번 허리를 띄우고, 자지를 질 구멍에 밀어 넣는다."

[[dialogue]]
speaker = "トワ先生"
original = "「んぅ～っ<emoji=heart04>\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「응으~<emoji=heart04> 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「んあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くんの大きなチ○ポ、奥までズッポリ入ったぁ<emoji=heart04><emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「회장군의 커다란 자지, 안쪽까지 푹 들어왔어아<emoji=heart04><emoji=heart04> 응우으윽<emoji=heart04> 앗<emoji=heart04> 하아아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは俺のペニスをしっかりと味わうように、膣内のひだを絡ませるような動きで腰を前後に振り始めた。"
translation = "토와짱은 내 페니스를 확실히 맛보듯이, 질 내벽의 주름을 휘감는 듯한 움직임으로 허리를 앞뒤로 흔들기 시작했다."

[[dialogue]]
speaker = "トワ先生"
original = "「先生の小さい膣穴の気持ちいいところぉ～<emoji=heart04>\u3000全部当たっれ気持ちいいのぉ～<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「선생님의 좁은 질 구멍의 기분 좋은 곳에에~<emoji=heart04> 전부 닿아서 기분 좋아아~<emoji=heart04> 앗<emoji=heart04> 안앗<emoji=heart04> 후아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もトワちゃんのおま○こ、すごく気持ちいいっ……！」"
translation = "「나도 토와짱의 보지, 엄청 기분 좋아……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「はああぁっ<emoji=heart04>\u3000気持ちいぃっ<emoji=heart04>\u3000会長くんの大きなチ○ポ、気持ちいいよぉ～っ<emoji=heart04>\u3000しゅきっ<emoji=heart04>\u3000しゅきしゅきしゅきぃ～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁ～っ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 기분 좋아아<emoji=heart04> 회장군의 커다란 자지, 기분 좋아아~앗<emoji=heart04> 죠아앗<emoji=heart04> 죠아죠아죠아아~앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아아앗<emoji=heart04> 후아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「彼氏チ○ポ、大きくて最高なのぉ～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>\u3000何回ハメても、気持ち良くて堪らないよぉ～っ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「남친 자지, 커서 최고야아~앗<emoji=heart04> 앗<emoji=heart04> 안앗<emoji=heart04> 후아앙<emoji=heart04> 몇 번을 박아도, 기분 좋아서 견딜 수 없어어~앗<emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 안앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これまで何度も愛し合ったトワちゃんの蜜壺は、すっかり俺の形に馴染んでおり、擦れ合うたび甘く痺れるような快楽が押し寄せてくる。"
translation = "지금까지 몇 번이나 사랑을 나눈 토와짱의 밀궁은, 완전히 내 형태에 길들여져 있어, 서로 비벼질 때마다 달콤하게 저리는 듯한 쾌락이 밀려온다."

[[dialogue]]
speaker = "トワ先生"
original = "「んううぅっ<emoji=heart04>\u3000でもぉ<emoji=heart04>\u3000今日は先生が、会長くんのことをいっぱい気持ちよくしちゃうんらから～<emoji=heart04>\u3000んふぅ～っ<emoji=heart04>」"
translation = "「응우우읏<emoji=heart04> 하지만~<emoji=heart04> 오늘은 선생님이, 회장 군을 잔뜩 기분 좋게 해줄 거니까아~<emoji=heart04> 응후우~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、不意にトワちゃんの両手が触れてきたのは、なんと俺の<ruby>睾丸<rt>こうがん</rt></ruby>――玉袋だった。"
translation = "그렇게 말하자, 불시에 토와짱의 양손이 닿은 곳은, 무려 내 고환――불알주머니였다."

[[dialogue]]
speaker = "クロト"
original = "「と、トワちゃん、一体何を……？」"
translation = "「토, 토와짱, 대체 뭘……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ほら～、両手で優し～く、タマタマをふにふに～<emoji=heart04>」"
translation = "「자아~, 양손으로 부드러~럽게, 불알을 조물조물~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは両手の平で俺の玉袋を包み込み、左右交互にふにふにと、まるで愛撫するかのように優しく揉み上げていく。"
translation = "토와짱은 양 손바닥으로 내 불알주머니를 감싸고, 좌우 교대로 조물조물, 마치 애무하듯이 부드럽게 주물러 올린다."

[[dialogue]]
speaker = "トワ先生"
original = "「さわさわ<emoji=heart04>\u3000ふにふに<emoji=heart04>」"
translation = "「쓰담쓰담<emoji=heart04> 조물조물<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それまでに感じたことのない、じんわりとろけるような快感が広がって、俺は思わず熱く甘い吐息を漏らしてしまう。"
translation = "지금까지 느껴본 적 없는, 서서히 녹아내리는 듯한 쾌감이 퍼져나가, 나는 나도 모르게 뜨겁고 달콤한 한숨을 내뱉고 만다."

[[dialogue]]
speaker = "クロト"
original = "「こ、これ、今までと違う感覚だけど、気持ちいいっ……！」"
translation = "「이, 이거, 지금까지와는 다른 감각인데, 기분 좋아……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「んふふ～っ<emoji=heart04>\u3000『睾丸マッサージ』って言ってね～？\u3000男の人を気持ちよくれきる方法、勉強してきたんらよ～<emoji=heart04>」"
translation = "「응후후~<emoji=heart04> 『고환 마사지』라고 하거든~? 남자를 기분 좋게 해줄 수 있는 방법, 공부하고 왔단다아~<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふうぅっ……<emoji=heart04>\u3000それに、私の自動回復の星力も手の平から流してるから、痛くなくて気持ちいいでしょ～？\u3000ほら、さわさわ<emoji=heart04>\u3000ふにふに～<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 게다가, 내 자동 회복 성력도 손바닥에서 흘려보내고 있으니까, 아프지 않고 기분 좋지~? 자아, 쓰담쓰담<emoji=heart04> 조물조물~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "睾丸を丁寧にマッサージされ、回復星術が流れ込むたび、中で精液がドクドクと作られていくような感覚が体中に広がり、理性を溶かすような興奮が湧き上がってくる。"
translation = "고환을 정성스럽게 마사지 받고, 회복 성술이 흘러 들어올 때마다, 안에서 정액이 울컥울컥 만들어지는 듯한 감각이 온몸으로 퍼지며, 이성을 녹이는 듯한 흥분이 솟구쳐 오른다."

[[dialogue]]
speaker = "トワ先生"
original = "「それから～、睾丸の下には、『<ruby>会陰<rt>かいいん</rt></ruby>』って性感帯があってね～？\u3000男の人はそこのツボを押すと、気持ちいいらしいんらけど～<emoji=heart04>」"
translation = "「그리고~, 고환 아래에는, 『회음』이라는 성감대가 있어서 말이야~? 남자는 그곳의 혈 자리를 누르면, 기분 좋대~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんはそう言うと、俺の反応を確かめるように、睾丸から肛門までの間を指でゆっくり撫でるように動かしていく。"
translation = "토와짱은 그렇게 말하며, 내 반응을 확인하듯이 고환에서 항문 사이를 손가락으로 천천히 쓰다듬듯 움직여 간다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000指で星力を流しながら探してたら、ピクッって反応したぁ～<emoji=heart04>\u3000<b>ツボ</b>はここかな～？\u3000――えいっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후훗<emoji=heart04> 손가락으로 성력을 흘리면서 찾았더니, 움찔하고 반응했다아~<emoji=heart04> <b>혈</b> <b>자리</b>는 여기일까나~? ――에잇<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くぅっ……！？」"
translation = "「쿠우윽……!?」"

[[dialogue]]
speaker = "unk"
original = "強い快感が一気に駆け巡ってきて、俺は思わず声を漏らしてしまう。"
translation = "강한 쾌감이 단숨에 몰려와서, 나는 나도 모르게 소리를 내뱉고 만다."

[[dialogue]]
speaker = "トワ先生"
original = "「あんっ<emoji=heart04>\u3000チ○ポが中でビクビク反応したぁっ<emoji=heart04>\u3000会長くん、ここが気持ちいいの～？\u3000んっ<emoji=heart04>\u3000え～いっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 자지가 안에서 파르르 반응했다아<emoji=heart04> 회장 군, 여기가 기분 좋아~? 응<emoji=heart04> 에~잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんの指先が敏感な箇所を刺激するたび、脳に熱い波が押し寄せ、俺は思わず声を震わせて喘いでしまう。"
translation = "토와짱의 손가락 끝이 민감한 곳을 자극할 때마다, 뇌에 뜨거운 파도가 밀려와, 나는 나도 모르게 목소리를 떨며 신음하고 만다."

[[dialogue]]
speaker = "トワ先生"
original = "「はああぁ～っ<emoji=heart04>\u3000んふぅ～っ<emoji=heart04>\u3000私をたくさん気持ちよくしてくれる会長くんも、こんな気持ちだったんらね～<emoji=heart04>\u3000んうぅっ……えいっ<emoji=heart04>」"
translation = "「하아아아~<emoji=heart04> 응후우~<emoji=heart04> 나를 잔뜩 기분 좋게 해주는 회장 군도, 이런 기분이었구나아~<emoji=heart04> 응우웃…… 에잇<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くんの気持ち良くなってくれてるの見てると、なんか私も気持ちよくなっちゃう<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……んふぅっ<emoji=heart04>」"
translation = "「회장군이 기분 좋아지는 걸 보고 있으면, 왠지 나도 기분 좋아져 버려<emoji=heart04> 응읏<emoji=heart04> 하아앗…… 응후웃<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くん、もっとしてあげるからぁ、いっぱい気持ち良くなって<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んううぅ～っ<emoji=heart04>」"
translation = "「회장군, 더 해줄 테니까아, 잔뜩 기분 좋아져줘<emoji=heart04> 응읏<emoji=heart04> 후우웃<emoji=heart04> 응응읏<emoji=heart04> 하아앗<emoji=heart04> 응으으읏~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰の動きに力が乗るたび、睾丸マッサージと会陰のツボ押しが絡み合い、俺の体中を震わせるように射精感がみるみる込み上げてくる。"
translation = "허리의 움직임에 힘이 실릴 때마다, 고환 마사지와 회음 혈자리 압박이 어우러져, 내 온몸을 떨리게 하듯 사정감이 순식간에 치밀어 오른다."

[[dialogue]]
speaker = "クロト"
original = "「っ……ダメだ！\u3000トワちゃん、俺もうイっちゃう！」"
translation = "「윽…… 안 돼! 토와짱, 나 이제 가버려!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あんっ<emoji=heart04>\u3000会長くん、いいよぉ～っ<emoji=heart04>\u3000そのまま気持ち良くなっれぇっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000ふんっ、ふんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「안 <emoji=heart04> 회장군, 괜찮아아~<emoji=heart04> 그대로 기분 좋아져어어<emoji=heart04> 응읏<emoji=heart04> 흥, 흥<emoji=heart04> 응후응<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ――<emoji=heart04><emoji=heart04>\u3000うああぁっ！？」"
translation = "「큭――<emoji=heart04><emoji=heart04> 우아아앗!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ――はああぁんっ<emoji=heart04><emoji=heart04>\u3000会長くんのチ○ポ、中でビクビク跳ねてるぅ～～っ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗――하아아앙<emoji=heart04><emoji=heart04> 회장군의 자지, 안에서 파르르 뛰고 있어어~~<emoji=heart04><emoji=heart04> 응읏<emoji=heart04> 하아앗<emoji=heart04> 후아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「はあぁっ<emoji=heart04>\u3000んっ……ふああぁ～っ<emoji=heart04>\u3000先生も興奮して、軽くイっちゃっらぁ……っ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 응…… 후아아~<emoji=heart04> 선생님도 흥분해서, 살짝 가버렸나 봐……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「んっ……あれ？\u3000今、イったと思ったのに……！？」"
translation = "「응…… 어라? 지금, 간 줄 알았는데……!?」"

[[dialogue]]
speaker = "unk"
original = "射精感がもう限界かと思われたが、射精はまだ起きず、ペニスはなおも昂る熱と、甘く痺れるような快楽を保持し続けていた。"
translation = "사정감이 이미 한계라고 생각되었지만, 사정은 아직 일어나지 않았고, 페니스는 여전히 고조되는 열기와 달콤하게 저리는 듯한 쾌락을 유지하고 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「えへへ～<emoji=heart04>\u3000驚いた？\u3000実はマリオンから、射精止めのやり方を教わって、それも今日の為に勉強してたんら～<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 놀랐어? 사실 마리온한테 사정 참는 법을 배워서, 그것도 오늘을 위해 공부했단다~<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「どう？\u3000気持ちいいのが更に溜まっていく感覚、すごいれしょ～<emoji=heart04>\u3000もっと気持ちいいのを溜めれから、最後にいっぱい射精させてあげるね<emoji=heart04>」"
translation = "「어때? 기분 좋은 게 점점 더 쌓여가는 감각, 굉장하지~<emoji=heart04> 더 기분 좋은 걸 쌓을 수 있으니까, 마지막에 잔뜩 사정하게 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「それじゃあ、もっと腰も動かしちゃうよ～<emoji=heart04>\u3000んんぅっ――<emoji=heart04><emoji=heart04>」"
translation = "「그러면, 허리도 더 움직여버릴게~<emoji=heart04> 응응읏――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ――ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――후아아아아아~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「んふぅっ<emoji=heart04>\u3000ふんっ、ふんっ、んああぁんっ<emoji=heart04><emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>\u3000んっ、ふぅっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응후웃<emoji=heart04> 흥, 흥, 응아아앙<emoji=heart04><emoji=heart04> 응, 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04> 응, 후우, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは腰を大きく浮かせると、その勢いのまま奥へと打ちつけるように動かし始めた。"
translation = "토와짱은 허리를 크게 띄우더니, 그 기세 그대로 안쪽을 쳐올리듯 움직이기 시작했다."

[[dialogue]]
speaker = "トワ先生"
original = "「んうぅっ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000チ○ポ、奥当たって気持ちいいっ<emoji=heart04>\u3000おっ、おっ、おっ、おんっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000おま○こ効くぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응우읏<emoji=heart04> 흥, 흥, 흥<emoji=heart04> 자지, 안쪽에 닿아서 기분 좋아<emoji=heart04> 오, 오, 오, 오옹<emoji=heart04> 응아아앗<emoji=heart04> 보지 자극 대단해~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「んああぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000チ○ポっ<emoji=heart04>\u3000好きっ、好き、好きっ<emoji=heart04>\u3000気持ち良くて好きぃ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おんっ、おんっ、おんっ<emoji=heart04>\u3000気持ちいぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 기분 좋아<emoji=heart04> 자지<emoji=heart04> 좋아, 좋아, 좋아<emoji=heart04> 기분 좋아서 좋아아~~<emoji=heart04><emoji=heart04> 오, 오옹, 오옹, 오옹<emoji=heart04> 기분 좋아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "貪るように腰を打ちつけるトワちゃんの熱に煽られ、俺は衝動のままにその尻を掴み、腰を動かし始めた。"
translation = "탐하듯 허리를 쳐올리는 토와짱의 열기에 부추겨져, 나는 충동적으로 그 엉덩이를 붙잡고 허리를 움직이기 시작했다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ！？\u3000おっ<emoji=heart04>\u3000んおおおぉ～っ<emoji=heart04><emoji=heart04>\u3000会長くんのチ○ポ、下から突き上げて来るぅ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おっ、おっ、おっ<emoji=heart04>\u3000んおおぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗!? 오<emoji=heart04> 응오오오~<emoji=heart04><emoji=heart04> 회장군의 자지, 밑에서부터 찔러 올라와아~~<emoji=heart04><emoji=heart04> 오, 오, 오, 오<emoji=heart04> 응오오옹<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「トワちゃん！\u3000俺、また……！」"
translation = "「토와짱! 나, 또……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くん、イっちゃうっ？\u3000イキたいのっ？\u3000いいよっ、もっと気持ちよくなってぇ<emoji=heart04>\u3000ふんっ、ふんっ、ふんっ、ふんっ<emoji=heart04>\u3000んふうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「회장군, 가버려? 가고 싶어? 좋아, 좀 더 기분 좋아져라<emoji=heart04> 흣, 흣, 흣, 흣<emoji=heart04> 응후우웅<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "再び射精の波が押し寄せ、ペニスが堪えきれずにビクビクと震え跳ねる。"
translation = "다시 사정의 파도가 밀려오고, 페니스가 견디지 못하고 파르르 떨며 튀어 오른다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ――んあああぁんっ<emoji=heart04><emoji=heart04>\u3000また会長くんのチ○ポ、おま○この中で暴れてるぅ～～っ<emoji=heart04><emoji=heart04>\u3000ふあああぁぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗――응아아아앙<emoji=heart04><emoji=heart04> 또 회장군의 자지, 보지 안에서 날뛰고 있어어~~<emoji=heart04><emoji=heart04> 후아아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんもまた絶頂に達したのか、おま○こがきゅうぅっと強く絡みつき、全身が震え上がる。"
translation = "토와짱도 다시 절정에 달했는지, 보지가 꽉 조이며 강하게 얽혀들고, 전신이 떨려온다."

[[dialogue]]
speaker = "unk"
original = "そして、やはり封じられているのか、俺はまたしても射精できないままだった。"
translation = "그리고, 역시 봉인되어 있는 것인지, 나는 또다시 사정하지 못한 채였다."

[[dialogue]]
speaker = "クロト"
original = "「トワちゃん、もう限界だ……！\u3000俺も気持ちよくイきたい……！」"
translation = "「토와짱, 이제 한계야……! 나도 기분 좋게 가고 싶어……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「んっ――はああぁっ<emoji=heart04>\u3000いいよ、もうすぐイカせてあげるっ<emoji=heart04>\u3000でも、あとちょっとだけ我慢しよっ？\u3000もうちょっとの我慢で、何倍も気持ちいい射精ができるからぁっ<emoji=heart04>」"
translation = "「응――하아아아<emoji=heart04> 좋아, 이제 곧 가게 해줄게<emoji=heart04> 하지만, 조금만 더 참자? 조금만 더 참으면, 몇 배나 기분 좋은 사정을 할 수 있으니까아<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「それじゃあ、ラストスパート行くよぉっ――んふうぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「그러면, 라스트 스퍼트 간다아――응후우웅<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふんっふんっふんっ、んふうぅんっ<emoji=heart04><emoji=heart04>\u3000んっふぅっ、ふんっふんっ<emoji=heart04>\u3000んんうぅ～っ<emoji=heart04><emoji=heart04>\u3000んっふぅっ、ふんっふんっ<emoji=heart04>\u3000んううぅんっ<emoji=heart04><emoji=heart04>」"
translation = "「흣흣흣, 응후우웅<emoji=heart04><emoji=heart04> 응후우, 흣흣<emoji=heart04> 응응우우~<emoji=heart04><emoji=heart04> 응후우, 흣흣<emoji=heart04> 응우우웅<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんが更に激しく腰を打ち付け、ペニスが強烈な快楽に飲まれる。"
translation = "토와짱이 더욱 격렬하게 허리를 내리치고, 페니스가 강렬한 쾌락에 집어삼켜진다."

[[dialogue]]
speaker = "unk"
original = "俺も気持ち良く射精したい一心で、トワちゃんのお尻を鷲掴みにし、腰を突き上げた。"
translation = "나도 기분 좋게 사정하고 싶은 일념으로, 토와짱의 엉덩이를 움켜쥐고 허리를 쳐올렸다."

[[dialogue]]
speaker = "トワ先生"
original = "「おっ！？\u3000――んおおおぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長くん、奥っ<emoji=heart04>\u3000奥すごいぃっ<emoji=heart04>\u3000おっおっおっおっ、おほぉっ<emoji=heart04>\u3000おっおっ、おんっおんっ<emoji=heart04>\u3000んおおおぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「오옷!? ――응오오오오~~~<emoji=heart04><emoji=heart04><emoji=heart04> 회장군, 안쪽<emoji=heart04> 안쪽 굉장해<emoji=heart04> 오오오오, 오호<emoji=heart04> 오오, 응응<emoji=heart04> 응오오오옹<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「トワちゃん！\u3000トワちゃんっ！！」"
translation = "「토와짱! 토와짱!!」"

[[dialogue]]
speaker = "トワ先生"
original = "「んあああぁっ<emoji=heart04>\u3000会長くんっ<emoji=heart04>\u3000会長くぅんっ<emoji=heart04><emoji=heart04>\u3000んおおぉっ<emoji=heart04>\u3000おっおっおっおっ<emoji=heart04>\u3000ふおおぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 회장군<emoji=heart04> 회장구운<emoji=heart04><emoji=heart04> 응오오오<emoji=heart04> 오오오오<emoji=heart04> 후오오옹<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「チ○ポ気持ちいぃっ<emoji=heart04>\u3000おま○こ気持ちいぃ～～っ<emoji=heart04><emoji=heart04>\u3000おんっおんっおんっおんっ<emoji=heart04>\u3000んおおおぉんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「자지 기분 좋아<emoji=heart04> 보지 기분 좋아아~~<emoji=heart04><emoji=heart04> 응응응응<emoji=heart04> 응오오오옹<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺、もうイキそうだっ……！」"
translation = "「나, 이제 갈 것 같아……!」"

[[dialogue]]
speaker = "トワ先生"
original = "「うんっ<emoji=heart04>\u3000来てぇっ<emoji=heart04>\u3000私の中に気持ち良くいっぱい出してぇっ<emoji=heart04>\u3000んうぅっ、ふんっふんっふんっ<emoji=heart04>\u3000んううぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 와줘<emoji=heart04> 내 안에 기분 좋게 가득 내보내줘어<emoji=heart04> 응우우, 흣흣흣<emoji=heart04> 응우우우~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは、射精に誘うかのように手で睾丸と会陰に触れ、星力を流し込む。"
translation = "토와짱은 사정을 유도하려는 듯 손으로 고환과 회음을 만지며, 성력을 불어넣는다."

[[dialogue]]
speaker = "トワ先生"
original = "「会長くんっ、もう射精止めないから、思いっきりどっぴゅんしてぇ～～っ<emoji=heart04><emoji=heart04>\u3000おっおっおっおっ<emoji=heart04>\u3000んおおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「회장군, 이제 사정 안 멈출 테니까, 마음껏 돗퓨하고 싸줘어~~<emoji=heart04><emoji=heart04> 오오오오<emoji=heart04> 응오오오오~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もう出るっ！！\u3000中に出すよ、トワ！！！」"
translation = "「이제 나온다!! 안에 쌀게, 토와!!!」"

[[dialogue]]
speaker = "トワ先生"
original = "「いいよっ<emoji=heart04>\u3000出して<emoji=heart04>\u3000出して出して出してっ<emoji=heart04><emoji=heart04>\u3000んお゛おおおぉぉぉ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「좋아<emoji=heart04> 싸줘<emoji=heart04> 싸줘 싸줘 싸줘어<emoji=heart04><emoji=heart04> 응오오오오오오～～～～옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「イクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000先生もイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イグうううぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려<emoji=heart04><emoji=heart04><emoji=heart04> 선생님도 가버려 가버려 가버려어<emoji=heart04><emoji=heart04><emoji=heart04> 가버렷어어어어어어～～～～～～어<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ゛っ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあ゛ああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아으――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아아아아～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はペニスを奥まで押し込み、溜め込んできた欲望を爆発させるように、思いっきり快感を解き放った。"
translation = "나는 페니스를 안쪽까지 밀어 넣고, 쌓아온 욕망을 폭발시키듯 마음껏 쾌감을 해방했다."

[[dialogue]]
speaker = "トワ先生"
original = "「んっ――ふあああ゛ぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長くんの熱い精液、どぴゅどぴゅすごい勢いで、子宮の奥に当たってるぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응――후아아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 회장군의 뜨거운 정액, 도퓨도퓨 엄청난 기세로 자궁 안쪽에 닿고 있어어～～～어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「はあぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000射精の勢いすごいぃっ<emoji=heart04>\u3000全然止まらなくて、子宮１回でいっぱいになっちゃうぅっ……<emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아～～앗<emoji=heart04><emoji=heart04> 사정 기세가 엄청나아<emoji=heart04> 전혀 멈추지 않아서, 자궁이 한 번에 가득 차버려어……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精を止められていた影響か、睾丸マッサージの効果か――信じられないほど大量の精液が出続ける。"
translation = "사정을 억제당했던 영향인지, 고환 마사지의 효과인지――믿기지 않을 정도로 대량의 정액이 계속 쏟아져 나온다."

[[dialogue]]
speaker = "トワ先生"
original = "「あっ<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>\u3000会長くんので、お腹の中が熱く満たされて……<emoji=heart04>\u3000幸せ感じちゃう……<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아앙……<emoji=heart04> 회장군 걸로 배 안이 뜨겁게 채워져서……<emoji=heart04> 행복이 느껴져……<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつもより長い絶頂の多幸感に浸りきった後、トワちゃんはゆっくりと腰を上げて、俺のペニスを引き抜く。"
translation = "평소보다 긴 절정의 다행감에 푹 잠긴 뒤, 토와짱은 천천히 허리를 들어 내 페니스를 뽑아낸다."

[[dialogue]]
speaker = "トワ先生"
original = "「んっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000会長くんの、いっぱい出たぁ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아앗……<emoji=heart04> 회장군 거, 잔뜩 나왔어……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「どうだった……？\u3000先生、ちゃんと気持ちよくできてたかな……？」"
translation = "「어땠어……? 선생님, 제대로 기분 좋게 해줬을까……?」"

[[dialogue]]
speaker = "クロト"
original = "「うん、すごく気持ちよくて、信じられないくらい沢山出た……」"
translation = "「응, 정말 기분 좋아서 믿기지 않을 정도로 많이 나왔어……」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふふっ<emoji=heart04>\u3000なら、よかった……<emoji=heart04>」"
translation = "「후훗<emoji=heart04> 그렇다면 다행이야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "トワちゃんは、自動回復で酔いが抜けたようで、呂律はすっかり元に戻っていた。"
translation = "토와짱은 자동 회복으로 취기가 깬 듯, 발음은 완전히 원래대로 돌아와 있었다."

[[dialogue]]
speaker = "トワ先生"
original = "「あのね……先生、普段は会長くんにリードしてもらっちゃうことが多いでしょ？」"
translation = "「저기 말야…… 선생님, 평소에는 회장군이 리드해 주는 경우가 많잖아?」"

[[dialogue]]
speaker = "トワ先生"
original = "「だから、たまには年上の彼女として、私の方からしてあげたかったんだ<emoji=heart04>」"
translation = "「그러니까 가끔은 연상의 여자친구로서, 내가 먼저 해주고 싶었어<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「それで、素面では難しくても、酔った勢いがあれば、そういうことができるかもって思って……<emoji=heart04>」"
translation = "「그래서 맨정신으로는 어려워도, 취한 기운을 빌리면 그런 걸 할 수 있을지도 모른다고 생각해서……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なら、すごくよかったから、これからは酔ってなくてもして欲しいな」"
translation = "「그렇다면 정말 좋았으니까, 앞으로는 취하지 않았을 때도 해줬으면 좋겠어」"

[[dialogue]]
speaker = "unk"
original = "俺がそう言うと、トワちゃんは少し顔を赤らめ、照れくさそうに口を開く。"
translation = "내가 그렇게 말하자 토와짱은 살짝 얼굴을 붉히며 수줍은 듯 입을 연다."

[[dialogue]]
speaker = "トワ先生"
original = "「じ、じゃあ……」"
translation = "「그, 그럼……」"

[[dialogue]]
speaker = "トワ先生"
original = "「今度は、正面からしてもいい……？」"
translation = "「이번에는 정면에서 해도 될까……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「先生がいっぱいキスしながら……ラブラブエッチしてあげる<emoji=heart04>」"
translation = "「선생님이 잔뜩 키스하면서…… 러브러브 섹스해 줄게<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くん……<emoji=heart04>\u3000ん～っ……ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「회장군……<emoji=heart04> 음～…… 츄…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "正面に向き直ったトワちゃんが、体のあちこちに熱いキスを落としてくる。"
translation = "정면으로 마주 본 토와짱이 몸 여기저기에 뜨거운 키스를 퍼붓는다."

[[dialogue]]
speaker = "unk"
original = "俺たちは互いの体に触れ合いながら、再びベッドを軋ませ始めるのだった。"
translation = "우리들은 서로의 몸을 어루만지며 다시 침대를 삐걱거리기 시작했다."

