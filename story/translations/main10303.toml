[[dialogue]]
speaker = "unk"
original = "第３話,あの頃の私たち,B"
translation = "제3화, 그 시절의 우리들, B"

[[dialogue]]
speaker = "unk"
original = "後日、シルヴィはサーシャに連れられて星徒会室を訪れていた。"
translation = "며칠 뒤, 실비는 사샤의 손에 이끌려 성도회실을 방문했다."

[[dialogue]]
speaker = "シルヴィ"
original = "「やっほー！\u3000遊びに来たよ！」"
translation = "「야호! 놀러 왔어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いらっしゃーい！」"
translation = "「어서 와~!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたし、シルヴィ・グリムランド！\u3000シルヴィって呼んでね！\u3000よろしく！」"
translation = "「난 실비 그림랜드! 실비라고 불러줘! 잘 부탁해!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ私から自己紹介するわね！\u3000私は九浄ヴィーナス！\u3000星徒会を陰から操るフィクサーとは私のことよ！」"
translation = "「그럼 나부터 자기소개할게! 나는 쿠죠 비너스! 성도회를 뒤에서 조종하는 픽서란 바로 나를 말하는 거지!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「なにそれおもしろー！\u3000何やるのフィクサーって！」"
translation = "「뭐야 그거 재밌어! 뭐 하는 거야 흑막이란 건!」"

[[dialogue]]
speaker = "アナ"
original = "「副会長のアナです。天界はウル出身、好き食べ物は和菓子です」"
translation = "「부회장인 아나입니다. 천계는 우르 출신, 좋아하는 음식은 화과자예요」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ウルって都会っ子じゃん！\u3000確か１年なんだよね？\u3000すご、あたしより仕事できそう！」"
translation = "「우르라니 도시 애잖아! 분명 1학년이었지? 대단해, 나보다 일 잘할 것 같아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「実際、私よりもシルヴィよりもお仕事できるわ～。お姉ちゃん大助かり♪」"
translation = "「실제로, 나보다도 실비보다도 일을 잘한단다~. 언니는 정말 큰 도움이 돼♪」"

[[dialogue]]
speaker = "マトイ"
original = "「詠野マトイ、書記です。普通で覚えづらいかもしれないですけど、よろしくお願いします」"
translation = "「에노 마토이, 서기입니다. 평범해서 기억하기 힘들지도 모르겠지만, 잘 부탁드려요」"

[[dialogue]]
speaker = "シルヴィ"
original = "「？\u3000覚えづらくなんかないよ。マトイちゃんでしょ、ちゃんと覚えたよ！」"
translation = "「? 기억하기 힘들지 않아. 마토이짱이지, 제대로 기억했어!」"

[[dialogue]]
speaker = "マトイ"
original = "「っ！\u3000サーシャさん！\u3000シルヴィさん、すっごくいい人です！」"
translation = "「앗! 사샤 씨! 실비 씨, 정말 좋은 사람이에요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「シルヴィは後輩キラーだから気を付けるのよ～」"
translation = "「실비는 후배 킬러니까 조심해야 해~」"

[[dialogue]]
speaker = "サーシャ"
original = "「で、私が会計のサーシャで～す」"
translation = "「그리고, 내가 회계인 사샤예요~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「いや、それは知ってるから！」"
translation = "「아니, 그건 알고 있으니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふっ♪」"
translation = "「우후훗♪」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたしたちの代も楽しかったけど、今もすっごく楽しそう！」"
translation = "「우리 세대도 즐거웠지만, 지금도 엄청 즐거워 보여!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あれ？\u3000ところで会長は？」"
translation = "「어라? 그런데 회장님은?」"

[[dialogue]]
speaker = "アナ"
original = "「会長は購買へ行ったきり、帰ってきていません。また何かトラブルに巻き込まれたと思われます」"
translation = "「회장님은 매점에 가신 채로 돌아오지 않고 계십니다. 또 뭔가 트러블에 휘말린 것으로 보입니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「購買ってことはアニマっちか～。じゃあ仕方ないね！\u3000まだ見ぬ会長くん、会える日までどうか元気でね～！」"
translation = "「매점이라면 아니마치인가~. 그럼 어쩔 수 없네! 아직 보지 못한 회장군, 만날 날까지 부디 건강하길~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「シルヴィさんたちの星徒会ってどんな感じだったの？\u3000気になるわ！」"
translation = "「실비 씨네 성도회는 어떤 느낌이었어? 궁금해!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「どんな感じって……まず会長がサーシャでしょ」"
translation = "「어떤 느낌이냐면…… 우선 회장이 사샤였지」"

[[dialogue]]
speaker = "サーシャ"
original = "「は～い」"
translation = "「네~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「んで、副会長があたしで」"
translation = "「그리고, 부회장이 나였고」"

[[dialogue]]
speaker = "サーシャ"
original = "「書記が蛍火ちゃんね」"
translation = "「서기가 케이카짱이었지」"

[[dialogue]]
speaker = "マトイ"
original = "（息ぴったりっ！）"
translation = "（호흡이 척척 맞아!）"

[[dialogue]]
speaker = "アナ"
original = "（阿吽の呼吸というやつですね）"
translation = "（이심전심이라는 거군요）"

[[dialogue]]
speaker = "マトイ"
original = "「おふたりが会長副会長だったら、トラブルも起きなさそうですよね」"
translation = "「두 분이 회장 부회장이었다면, 트러블도 안 일어났을 것 같네요」"

[[dialogue]]
speaker = "シルヴィ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うん？」"
translation = "「응?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「そんなことないよー。サーシャ、割と考えなしだし」"
translation = "「그렇지 않아. 사샤, 의외로 생각이 없거든」"

[[dialogue]]
speaker = "サーシャ"
original = "「それを言ったら、シルヴィだって計画性が全くないし～」"
translation = "「그렇게 말하면, 실비도 계획성이 전혀 없잖아~」"

[[dialogue]]
speaker = "アナ"
original = "「おや……？」"
translation = "「오야……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふむふむ、具体的には？」"
translation = "「흠흠, 구체적으로는?」"

[[dialogue]]
speaker = "マトイ"
original = "（そこ掘り下げちゃうんだ！？）"
translation = "（그걸 파고드는 거야!?）"

[[dialogue]]
speaker = "サーシャ"
original = "「サッカー部とソフトボール部が運動場の使用範囲でモメたことがあって～」"
translation = "「축구부랑 소프트볼부가 운동장 사용 범위로 다툰 적이 있어서~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あらかじめ年間計画で決めてあったんだけど、アニメだかなんだかの影響で新入部員に偏りが出ちゃって」"
translation = "「미리 연간 계획으로 정해뒀었는데, 애니메이션인가 뭔가의 영향으로 신입 부원이 한쪽으로 쏠려버려서」"

[[dialogue]]
speaker = "サーシャ"
original = "「改めて使用範囲を決めなおしたいって言われたのよ～」"
translation = "「새로 사용 범위를 정하고 싶다는 말을 들었어~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「そしたら、サーシャが全運動部を招集して収拾がつかなくなって」"
translation = "「그랬더니, 사샤가 전 운동부를 소집해서 수습이 안 되게 됐지」"

[[dialogue]]
speaker = "サーシャ"
original = "「だって新入部員の問題はふたつの部だけじゃないし、不公平だと思って～。話し合えば解決すると思ったのよ～」"
translation = "「그치만 신입 부원 문제는 두 부서만의 일이 아니니까 불공평하다고 생각해서~. 대화하면 해결될 줄 알았단다~」"

[[dialogue]]
speaker = "サーシャ"
original = "「それにシルヴィだって、とんでもないこと言ったのよ～」"
translation = "「게다가 실비도, 터무니없는 소리를 했어~」"

[[dialogue]]
speaker = "マトイ"
original = "（サーシャさんが子どもみたいに頬を膨らませてる……）"
translation = "（사샤 씨가 아이처럼 볼을 부풀리고 있어……）"

[[dialogue]]
speaker = "アナ"
original = "「シルヴィ先輩はなんと？」"
translation = "「실비 선배는 뭐라고 하셨나요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「みんな星騎士なんだし、戦って決めようって～」"
translation = "「다들 성기사니까, 싸워서 정하자고~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「だってそれが一番公平かなって思ったんだもん」"
translation = "「그게 제일 공평할 것 같았는걸」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「で、で？\u3000結局どうなったの？」"
translation = "「그래서, 그래서? 결국 어떻게 됐어?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「というわけで開催したよ、運動部スーパーバトルロワイヤル！」"
translation = "「그런 이유로 개최했지, 운동부 슈퍼 배틀 로열!」"

[[dialogue]]
speaker = "サーシャ"
original = "「審判は蛍火ちゃんで、実況はコハルコちゃん♪」"
translation = "「심판은 케이카짱이고, 실황은 코하루코짱♪」"

[[dialogue]]
speaker = "マトイ"
original = "「あああああっ！」"
translation = "「아아아앗!」"

[[dialogue]]
speaker = "アナ"
original = "「どうしました急に」"
translation = "「갑자기 왜 그러세요」"

[[dialogue]]
speaker = "マトイ"
original = "「そういえば去年、見たことある！\u3000人がいっぱい！\u3000吹き飛ばされてたやつ！」"
translation = "「그러고 보니 작년에 본 적 있어! 사람이 잔뜩! 날아가던 그거!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ああ、あれね！\u3000人形焼きの出店も出てたわ！」"
translation = "「아아, 그거구나! 인형 빵 노점도 나와 있었지!」"

[[dialogue]]
speaker = "アナ"
original = "「……一年生であることが悔やまれます。私もそこにいたかった」"
translation = "「……1학년인 것이 후회됩니다. 저도 그곳에 있고 싶었어요」"

[[dialogue]]
speaker = "マトイ"
original = "「そんなトラブルがあったんだ……てっきりそういう行事があるんだと思ってた……」"
translation = "「그런 트러블이 있었구나…… 당연히 그런 행사가 있는 줄 알았어……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちもやるしかないわね！\u3000ぜったい盛り上がるわよ！」"
translation = "「우리도 할 수밖에 없겠네! 분명 엄청 분위기 살 거야!」"

[[dialogue]]
speaker = "マトイ"
original = "「やーりーまーせーん！！」"
translation = "「안ー해ー요ー!!」"

[[dialogue]]
speaker = "アナ"
original = "「ちなみに、勝敗は……？」"
translation = "「참고로, 승패는……?」"

[[dialogue]]
speaker = "サーシャ"
original = "「私たちが勝ったわ～」"
translation = "「우리가 이겼어~」"

[[dialogue]]
speaker = "マトイ"
original = "「……え？」"
translation = "「……에?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「事故がないようにあたしたちも変身して待機してたんだけど、血の気の多い子があたしたちも参加者だと思ったみたいで、戦いを挑まれちゃったんだよね～」"
translation = "「사고가 없도록 우리도 변신해서 대기하고 있었는데, 혈기 왕성한 애가 우리도 참가자인 줄 알았나 봐. 싸움을 걸어오더라고~」"

[[dialogue]]
speaker = "サーシャ"
original = "「応戦してるうちに、気が付いたら全運動部ＶＳ星徒会になっちゃって～」"
translation = "「응전하다 보니, 정신을 차려보니 전 운동부 VS 성도회가 되어버려서~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「最後に立ってたのは、あたしたちふたりだけだったんだよね～あははっ！」"
translation = "「마지막에 서 있었던 건 우리 둘뿐이었지~ 아하핫!」"

[[dialogue]]
speaker = "サーシャ"
original = "「おかげで最終的に割り振りは星徒会で決められたけど、あれはしんどかったわ～」"
translation = "「덕분에 최종적으로 배분은 성도회에서 정하게 됐지만, 그건 힘들었어~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「楽しかったけどね！」"
translation = "「즐거웠지만 말이야!」"

[[dialogue]]
speaker = "アナ"
original = "「おー、ワイルド……」"
translation = "「오ー, 와일드하네요……」"

[[dialogue]]
speaker = "マトイ"
original = "「ヴィーナスってやんちゃな星徒会長だと思ってたけど、そうでもなかったんだね……」"
translation = "「비너스가 장난꾸러기 성도회장이라고 생각했는데, 그렇지도 않았네……」"

