[[dialogue]]
speaker = "unk"
original = "第３話,２人の寮長,P"
translation = "제3화, 두 명의 기숙사장, P"

[[dialogue]]
speaker = "unk"
original = "１ヶ月に１度開かれているという、新星寮と流星寮の寮長同士による定例会。俺は何故かその場に呼ばれていた――"
translation = "한 달에 한 번 열린다는 신성 기숙사와 유성 기숙사의 기숙사장끼리의 정례회. 나는 왠지 그 자리에 불려 가 있었다──"

[[dialogue]]
speaker = "unk"
original = "お邪魔します、千園寺先輩"
translation = "실례하겠습니다, 센온지 선배"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「まあ、緋宮会長。我が流星寮へようこそですわ♪」"
translation = "「어머, 히노미야 회장님. 우리 유성 기숙사에 오신 걸 환영해요♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、会長。わざわざ流星寮まで何しに来たのかしら？」"
translation = "「어라, 회장. 일부러 유성 기숙사까지 무슨 일로 온 걸까?」"

[[dialogue]]
speaker = "unk"
original = "いや、マムが来いって言ったんですよね！？"
translation = "아니, 마무가 오라고 했잖아요!?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふっ……冗談よ。貴方も星徒会長になったのだから、定例会の内容くらいは知っておくべきだと思ってね」"
translation = "「훗…… 농담이야. 너도 성도회장이 되었으니, 정례회 내용 정도는 알아두어야 한다고 생각해서 말이지」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000そういうことでしたら、この私が教えて差し上げますわ！\u3000この『定例寮議会』は学園の規則によって、月一の開催が義務付けられておりますの」"
translation = "「오─홋홋홋! 그런 거라면 이 몸이 가르쳐드리겠어요! 이 『정례 기숙사 의회』는 학원 규칙에 따라 월 1회 개최가 의무화되어 있답니다」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「議題は主に、互いの寮内で起こったトラブル事例や、有益なアイデアの情報交換、学園対抗杯の経過報告等ですわね」"
translation = "「의제는 주로 서로의 기숙사 내에서 일어난 트러블 사례나 유익한 아이디어 정보 교환, 학원 대항배 경과 보고 등이지요」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「はいこれ、あなたの分の資料。会長としての意見も聞きたいから、見ているだけじゃなく、ちゃんと話し合いに参加なさい」"
translation = "「자 여기, 네 몫의 자료. 회장으로서의 의견도 듣고 싶으니까, 보고만 있지 말고 제대로 논의에 참가하도록 해」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「今回の話し合いはこんなところかしら。緋宮会長のご意見、参考になりましたわ。流石は私の同志ですわね」"
translation = "「이번 논의는 이 정도일까요. 히노미야 회장님의 의견, 참고가 되었답니다. 과연 제 동지답네요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「流星学園に思わずスカウトしたくなってしまいますわ。緋宮会長がその気なら、千園寺家の力で本当に移籍させることも可能でしてよ？」"
translation = "「유성학원으로 무심코 스카우트하고 싶어질 정도예요. 히노미야 회장님이 그럴 마음이라면, 센온지 가문의 힘으로 정말 이적시키는 것도 가능하답니다?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私の前で堂々と引き抜きしてんじゃないわよ、ツインドリル」"
translation = "「내 앞에서 당당하게 빼가려고 하지 마, 트윈 드릴」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あら、嫉妬ですの、リトルマム？\u3000ごめんあそばせ、いつの間にか貴方よりも私の方が緋宮会長と仲良くなってしまって……おほほほ！」"
translation = "「어머, 질투인가요, 리틀 마무? 실례할게요, 어느새 당신보다 제가 히노미야 회장님과 더 친해져 버려서…… 오호호호!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「せめてものお詫びに、この自慢の流星寮ロビーで、常備している高級なお紅茶とお菓子を食べて、好きなだけくつろいで行って下さいましね、マム♪」"
translation = "「적게나마 사죄의 뜻으로, 이 자랑스러운 유성 기숙사 로비에서 상비하고 있는 고급 홍차와 과자를 드시며 마음껏 쉬다 가시길 바라요, 마무♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ふ、ふふっ……設備格差に物を言わせて煽るとは、いい度胸してるじゃないヒルディオーネ……！\u3000最近、少し調子に乗ってるんじゃないかしら？」"
translation = "「후, 후후…… 설비 격차를 내세워 도발하다니 배짱 한번 좋네 힐디요네……! 요즘 좀 우쭐해진 거 아니야?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ええ、そうですの！\u3000このところ私、絶好調ですのよ♪\u3000やはりトレーニング……いえ、趣味仲間が出来るのは、良いものですわね～。ねぇ、そうでしょう、緋宮会長？」"
translation = "「네, 그래요! 요즘 저, 아주 절호조랍니다♪ 역시 트레이닝…… 아니, 취미 동료가 생기는 건 좋은 일이네요~. 그렇죠, 히노미야 회장님?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「趣味仲間ぁ……？\u3000どういうことかしら、会長？\u3000私、そんな話聞いてないんだけど？」"
translation = "「취미 동료오……? 무슨 소리야, 회장? 난 그런 이야기 못 들었는데?」"

[[dialogue]]
speaker = "unk"
original = "いや、それには話せない事情があって……"
translation = "아니, 그건 말 못 할 사정이 있어서……"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「し～、ですわよ？\u3000約束ですものね♪」"
translation = "「쉬─, 랍니다? 약속했으니까요♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「これは会長……後でじっくり聞き出す必要がありそうね」"
translation = "「이거 회장…… 나중에 차분히 캐물어 볼 필요가 있겠는걸」"

[[dialogue]]
speaker = "unk"
original = "（状況が詰んでる……！）"
translation = "(상황이 막혔어……!)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ふふん、設備が悔しかったら、今年こそ学園対抗杯で勝ってみせることですわね、マム」"
translation = "「후훗, 설비가 분하다면 올해야말로 학원 대항배에서 이겨보도록 하세요, 마무」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「個人戦で私に１度でも勝ったことがない癖に、よくそこまで意気揚々と吠えられるものだわ」"
translation = "「개인전에서 나에게 한 번도 이겨본 적 없는 주제에, 참 당당하게도 짖어대네」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はぁ？\u3000それは貴方がなかなか私との対戦に応じないからで、今やれば勝てますけれど？」"
translation = "「하아? 그건 당신이 좀처럼 나와의 대전에 응해주지 않아서 그런 거고, 지금 하면 이길 수 있거든요?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あら、いいのかしら？\u3000仲のよろしい会長の前で、負け姿を晒すことになっても」"
translation = "「어라, 괜찮을까? 사이좋으신 회장님 앞에서 패배하는 모습을 보이게 되어도」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「おーっほっほっほ！\u3000別に、一向に構いませんわよ！」"
translation = "「오─홋홋홋! 별로, 전혀 상관없답니다!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「なんですって……？」"
translation = "「뭐라고……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あいにく、その程度のことを遠慮するような仲ではございませんの♪」"
translation = "「안타깝게도 그 정도 일을 사양할 사이는 아니거든요♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……そういえば、さっきから気になっていたんだけど、仲が良いと言ってる割に貴方――」"
translation = "「……그러고 보니 아까부터 신경 쓰였는데, 사이가 좋다고 말하는 것치고 너──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「会長から、愛称で呼ばれてないわね？」"
translation = "「회장한테 애칭으로 불리지 않고 있네?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「仲がいいならそれくらいは普通でしょう？\u3000例えば私は『マム』と呼ばれているわ」"
translation = "「사이가 좋다면 그 정도는 보통이잖아? 예를 들어 나는 『마무』라고 불리고 있어」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そ、それは別に、こだわるところでは……」"
translation = "「그, 그건 딱히 고집할 부분은……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ヒルディオーネはひょっとして、知らないのかしら？\u3000上流階級と違って、庶民の学生間では――」"
translation = "「힐디요네는 혹시 모르는 걸까? 상류층과는 다르게 서민 학생들 사이에서는──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「親愛を示す証として、愛称で呼び合う暗黙のルールが存在するのよ？」"
translation = "「친애를 나타내는 증표로 애칭으로 서로 부르는 암묵적인 규칙이 존재한다고?」"

[[dialogue]]
speaker = "unk"
original = "（それは大げさというより嘘の類では！？）"
translation = "(그건 과장이라기보다 거짓말 종류 아냐!?)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ですわっ！？\u3000そんな……ああいえ、もちろん知ってましたわよ！？」"
translation = "「인가요!? 그런…… 아, 아니요, 물론 알고 있었답니다!?」"

[[dialogue]]
speaker = "unk"
original = "先輩！？\u3000あっけなく騙されないで……！"
translation = "선배!? 너무 쉽게 속지 마세요……!"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「さあ、緋宮会長……じゃなくて貴方！\u3000親愛の証として、私をヒルディーという愛称で呼ぶことを許しますわ！」"
translation = "「자, 히노미야 회장님…… 아니 당신! 친애의 증표로서 저를 힐디라는 애칭으로 부르는 것을 허락하겠어요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そ、それとも、私と仲良くすることが嫌だとでも？」"
translation = "「그, 그렇지 않으면 저와 사이좋게 지내는 게 싫기라도 한 건가요?」"

[[dialogue]]
speaker = "unk"
original = "ええと、じゃあ……ヒルディー先輩"
translation = "음, 그럼…… 힐디 선배"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あ……ふ、ふふ……下の名前呼び、良いですわね……！\u3000貴方との絆を確かに感じますわ！」"
translation = "「아…… 후, 후후…… 이름으로 부르기, 좋네요……! 당신과의 유대를 확실히 느낀답니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「どうですの、マム。これで私も――」"
translation = "「어때요, 마무. 이걸로 저도──」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「まあ、嘘なんだけど」"
translation = "「뭐, 거짓말이지만」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「面白いものが見れたから、今日のところは許してあげるわヒルディー」"
translation = "「재밌는 걸 봤으니까 오늘은 이만 용서해줄게, 힐디」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あ……貴方って人は……！」"
translation = "「아…… 당신이란 사람은……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「また私を騙しましたわね、マムぅぅぅ――――――っ！！！」"
translation = "「또 저를 속였군요, 마무우우우우우우우우우우우우웃!!!」"

[[dialogue]]
speaker = "unk"
original = "つい吹き出してしまいながら、この２人は何だかんだ仲がいいよな、と改めて思うのだった。"
translation = "나도 모르게 웃음을 터뜨리며, 이 두 사람은 이래저래 사이가 좋구나 하고 새삼 생각했다."

