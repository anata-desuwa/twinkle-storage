[[dialogue]]
speaker = "unk"
original = "第１話,ネビュラの姫,P"
translation = "제1화, 네뷸라의 공주, P"

[[dialogue]]
speaker = "クラウディア"
original = "「──よく来た、魔王。余はお主を歓迎するぞ」"
translation = "「──잘 왔다, 마왕. 짐은 그대를 환영하노라」"

[[dialogue]]
speaker = "クラウディア"
original = "「なんだ。しばらく会わぬうちに、もう余の顔を忘れたのか？」"
translation = "「무엇이냐. 잠시 못 본 사이에 벌써 짐의 얼굴을 잊은 것이냐?」"

[[dialogue]]
speaker = "クラウディア"
original = "「クラウディア・イルゼ・フォン・ゴットフリート──『ネビュラ』の総帥たる偉くてすご～～～い魔女なのだ。どうだ、思い出したか？」"
translation = "「클라우디아 일제 폰 고트프리트── 『네뷸라』의 총수이자 위대하고 대~단한 마녀이니라. 어떠냐, 기억났느냐?」"

[[dialogue]]
speaker = "クラウディア"
original = "「うむ。ならばよい。余はお主のことをよーく知っておるぞ」"
translation = "「음. 그렇다면 되었도다. 짐은 그대에 대해 아~주 잘 알고 있느니라」"

[[dialogue]]
speaker = "クラウディア"
original = "「なにせ人間界における『魔王』だからな。余ほどではないが、特別な相手だ。徹底的にまーくしておるのだ」"
translation = "「그도 그럴 것이 인간계의 『마왕』이니까 말이다. 짐 정도는 아니지만, 특별한 상대이니라. 철저하게 마크하고 있느니라」"

[[dialogue]]
speaker = "クラウディア"
original = "「余の目は誤魔化せんぞ。お主は見かけからしてへんちくりんだ」"
translation = "「짐의 눈은 속일 수 없느니라. 그대는 겉모습부터가 희한하구나」"

[[dialogue]]
speaker = "クラウディア"
original = "「肩幅は広いし、胸も飛び出ていないし、声も低い。これが魔王の特質というものか」"
translation = "「어깨는 넓고, 가슴도 튀어나오지 않았으며, 목소리도 낮도다. 이것이 마왕의 특질이라는 것인가」"

[[dialogue]]
speaker = "unk"
original = "それは男だから"
translation = "그건 남자니까"

[[dialogue]]
speaker = "クラウディア"
original = "「む……男？\u3000男だとそうなのか？」"
translation = "「음…… 남자? 남자라면 그러한 것이냐?」"

[[dialogue]]
speaker = "クラウディア"
original = "「ふうむ……なるほど。知らなんだぞ。魔王の特徴というわけではないのだな」"
translation = "「흐음…… 과연. 몰랐도다. 마왕의 특징이라는 것은 아니었구나」"

[[dialogue]]
speaker = "クラウディア"
original = "「何？\u3000男が珍しいのか……と？」"
translation = "「무엇이냐? 남자가 희귀한 것이냐고……?」"

[[dialogue]]
speaker = "クラウディア"
original = "「当たり前だ。余らは魔女の一族──森には女しかおらんからのう」"
translation = "「당연하지 않느냐. 짐들은 마녀의 일족── 숲에는 여자밖에 없느니라」"

[[dialogue]]
speaker = "クラウディア"
original = "「と言っても……男の存在くらい知っているぞ。バカにするな。ただ、まじまじと見る機会がなかっただけだ！」"
translation = "「그렇다고는 해도…… 남자의 존재 정도는 알고 있느니라. 바보 취급 하지 마라. 그저 빤히 쳐다볼 기회가 없었을 뿐이니라!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ふむ……この機に観察させてもらおう。腕も、腰も、脚のあたりも……なんだか全体的にがっちりしているな」"
translation = "「흠…… 이 기회에 관찰하도록 하마. 팔도, 허리도, 다리 쪽도…… 왠지 전체적으로 다부지구나」"

[[dialogue]]
speaker = "unk"
original = "あんまりペタペタ触られると……"
translation = "그렇게 자꾸 만져대면……"

[[dialogue]]
speaker = "クラウディア"
original = "「む？\u3000これしきで応えるのか？\u3000はっはっは、男というのは軟弱だのう」"
translation = "「음? 고작 이 정도로 반응하는 것이냐? 하하하, 남자라는 것은 연약하구나」"

[[dialogue]]
speaker = "クラウディア"
original = "「まあよい。それより普段、お主はいかようにして過ごしておるのか？」"
translation = "「뭐 되었도다. 그보다 평소에 그대는 어떻게 지내고 있느냐?」"

[[dialogue]]
speaker = "クラウディア"
original = "「星徒かいちょー……ふむふむ。学園とやらの一員なのか」"
translation = "「성도회장…… 흠흠. 학원이라는 곳의 일원인 것이냐」"

[[dialogue]]
speaker = "クラウディア"
original = "「して、その星徒かいちょーというのは、偉いのか？」"
translation = "「그리하여 그 성도회장이라는 것은 높은 것이냐?」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほほう──余には及ばんまでも、なかなかの『けんりょくしゃ』のようだな」"
translation = "「호오── 짐에게는 미치지 못하더라도, 제법 대단한 『권력자』인 모양이구나」"

[[dialogue]]
speaker = "クラウディア"
original = "「よい機会だ。その学園とやらをひと目見たいぞ！\u3000連れて行ってくれ」"
translation = "「좋은 기회로다. 그 학원이라는 곳을 한번 보고 싶구나! 데려가 다오」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ──ク、クラウディア様！？\u3000こちらは指令室ですが──どういったご要件でしょうか？」"
translation = "「아── 클, 클라우디아 님!? 여기는 지령실입니다만── 어떤 용건이신가요?」"

[[dialogue]]
speaker = "クラウディア"
original = "「なに。少々散歩がてら、外にでも出てみようかと思ってな」"
translation = "「무엇이냐. 잠시 산책 겸 밖으로라도 나가볼까 해서 말이다」"

[[dialogue]]
speaker = "アイリーン"
original = "「外に……ですか？\u3000お言葉ですが、セドナ長官の許可なく出歩かれるのはまずいのではないかと」"
translation = "「밖으로…… 말씀이신가요? 외람된 말씀입니다만, 세드나 장관의 허가 없이 돌아다니시는 건 곤란하지 않을까 합니다만」"

[[dialogue]]
speaker = "クラウディア"
original = "「お堅いやつよのう。余が一番エライのだから、誰にも止められる筋合いはないのだ。そーれ！」"
translation = "「융통성 없는 녀석이로군. 짐이 가장 높으니, 누구도 막을 권리는 없느니라. 자!」"

[[dialogue]]
speaker = "アイリーン"
original = "「え──わああっ！？」"
translation = "「에── 와아앗!?」"

[[dialogue]]
speaker = "アイリーン"
original = "「……あ、あれ。私は誰と話していたのでしょうか。まだ仕事が残ってるのに──持ち場へ戻らないとっ」"
translation = "「……어, 어라. 저는 누구와 이야기하고 있었던 걸까요. 아직 일이 남았는데── 제자리로 돌아가야겠어요」"

[[dialogue]]
speaker = "クラウディア"
original = "「ん？\u3000認識変異の魔法だ。アイリーンの意識をいじって、余を路傍の小石と区別のつかぬようにした」"
translation = "「음? 인식 변이 마법이니라. 아이린의 의식을 건드려 짐을 길가의 돌멩이와 구별할 수 없게 만들었느니라」"

[[dialogue]]
speaker = "クラウディア"
original = "「もっとも、６０秒程度しか持続せぬ、まじないもどきだがな！」"
translation = "「물론 60초 정도밖에 지속되지 않는 주술 같은 것이지만 말이다!」"

[[dialogue]]
speaker = "unk"
original = "外には出ちゃいけないの？"
translation = "밖으로 나가면 안 되는 거야?"

[[dialogue]]
speaker = "クラウディア"
original = "「うむ。大人はどいつもこいつもケチンボゆえ、すぐお小言を言われるのだ。全くもって嘆かわしい」"
translation = "「음. 어른들은 하나같이 구두쇠라 금방 잔소리를 해대느니라. 참으로 개탄스러운 일이로다」"

[[dialogue]]
speaker = "クラウディア"
original = "「どうもこの人間界において、魔女というのは表立ってはならぬそうでな……大体はこの基地で過ごしておる」"
translation = "「아무래도 이 인간계에서 마녀라는 것은 겉으로 드러나서는 안 된다는 모양이라…… 대개는 이 기지에서 지내고 있느니라」"

[[dialogue]]
speaker = "unk"
original = "でも、偉いんだよね"
translation = "그래도 높다며"

[[dialogue]]
speaker = "クラウディア"
original = "「当然だ！\u3000ネビュラは今、世界を救う偉大な計画を抱えておる。余はそのために欠かせぬ存在なのだ！」"
translation = "「당연하지 않느냐! 네뷸라는 지금 세계를 구하는 위대한 계획을 품고 있느니라. 짐은 그를 위해 빠질 수 없는 존재이니라!」"

[[dialogue]]
speaker = "クラウディア"
original = "「つまり余は偉大にして無敵！\u3000よくよく考えれば、規則に縛られる道理などない！」"
translation = "「즉 짐은 위대하고 무적! 곰곰이 생각해보면 규칙에 얽매일 이유 따위 없느니라!」"

[[dialogue]]
speaker = "クラウディア"
original = "「わーっはっはっは！\u3000よし、さっそく学園とやらに行くぞ！」"
translation = "「와하하하하! 좋아, 당장 학원이라는 곳으로 가자!」"

[[dialogue]]
speaker = "unk"
original = "向こうから人影が……"
translation = "저쪽에서 사람 그림자가……"

[[dialogue]]
speaker = "unk"
original = "あ……"
translation = "아……"

[[dialogue]]
speaker = "セドナ"
original = "「──姫」"
translation = "「──공주님」"

[[dialogue]]
speaker = "クラウディア"
original = "「──ぎく！？」"
translation = "「──힉!?」"

[[dialogue]]
speaker = "セドナ"
original = "「無断で外出とはよいご身分ですね。宿題を課していたはずですが、こんなに早く済まされたのでしょうか」"
translation = "「무단 외출이라니 팔자도 좋으시군요. 숙제를 내드렸을 텐데, 벌써 다 끝내신 건가요?」"

[[dialogue]]
speaker = "クラウディア"
original = "「い、いや……まだというかだな。まずは気分転換も大事と思ってだな」"
translation = "「아, 아니…… 아직이라기보다 말이다. 우선은 기분 전환도 중요하다고 생각해서 말이다」"

[[dialogue]]
speaker = "セドナ"
original = "「ネビュラとのおやくそく第五条『勝手にお外でちゃダメ』第二十二条『お外で魔法は使わない』」"
translation = "「네뷸라와의 약속 제5조 『멋대로 밖에 나가지 말 것』 제22조 『밖에서 마법을 쓰지 말 것』」"

[[dialogue]]
speaker = "セドナ"
original = "「姫はどちらも理解不足のようですので、追加の課題が必要ですね。それから今夜は新鮮な野菜が届いておりますので、残さず召し上がっていただきます」"
translation = "「공주님은 둘 다 이해가 부족하신 듯하니 추가 과제가 필요하겠군요. 그리고 오늘 밤에는 신선한 채소가 도착했으니 남기지 말고 다 드셔야 합니다」"

[[dialogue]]
speaker = "クラウディア"
original = "「い、嫌だ！\u3000余は草っ葉など食いとうない！\u3000ひぇっ……見てないで助けろおい！\u3000まお～～！！」"
translation = "「시, 싫다! 짐은 풀때기 따위 먹고 싶지 않느니라! 히익…… 보고만 있지 말고 도와다오 어이! 마왕~~!!」"

