[[dialogue]]
speaker = "unk"
original = "第２話,ふわふわスイートスマイル,P"
translation = "제2화, 폭신폭신 스위트 스마일, P"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後、俺は蛍火と他愛のない雑談をしていた。"
translation = "어느 날 방과 후, 나는 호타루비와 시시한 잡담을 나누고 있었다."

[[dialogue]]
speaker = "蛍火"
original = "「師匠、そういえば最近、サランさんとお知り合いになったんですか？」"
translation = "「스승님, 그러고 보니 최근에 사란 씨와 아는 사이가 되셨나요?」"

[[dialogue]]
speaker = "unk"
original = "蛍火は学園生でありながら、カフェテリアの料理長とも言える立場にある、凄腕の料理人だ。"
translation = "호타루비는 학원생이면서도, 카페테리아의 요리장이라고도 할 수 있는 입장에 있는, 실력파 요리사다."

[[dialogue]]
speaker = "unk"
original = "サラン？\u3000うん、この前カフェテリアで――"
translation = "사란? 응, 요전에 카페테리아에서――"

[[dialogue]]
speaker = "蛍火"
original = "「やはり友達になられたのですね。初対面でもすぐ仲良くなってしまうとは、さすが師匠です」"
translation = "「역시 친구가 되셨군요. 첫 대면인데도 금방 사이가 좋아지시다니, 역시 스승님입니다」"

[[dialogue]]
speaker = "サラン"
original = "「あっ、見つけた～。会長ちゃ～ん♪」"
translation = "「앗, 찾았다~. 회장짱~♪」"

[[dialogue]]
speaker = "サラン"
original = "「それに、蛍火ちゃんも～。そういえば、２人は友達だって言ってたね～」"
translation = "「게다가, 호타루비짱도~. 그러고 보니, 둘이 친구라고 했었지~」"

[[dialogue]]
speaker = "蛍火"
original = "「ええ。まぁ……」"
translation = "「네. 뭐……」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、蛍火は緊張すると二重人格ばりに対応が素っ気なくなるが、あくまで緊張しているだけ。彼女と付き合いのある人間にとっては見慣れた反応である。"
translation = "참고로, 호타루비는 긴장하면 이중인격 수준으로 대응이 무뚝뚝해지지만, 어디까지나 긴장하고 있을 뿐. 그녀와 안면이 있는 사람에게는 익숙한 반응이다."

[[dialogue]]
speaker = "unk"
original = "蛍火とサランも友達なのか？"
translation = "호타루비와 사란도 친구야?"

[[dialogue]]
speaker = "蛍火"
original = "「いえ、サランさんはクラスメイトです。友達ではありません」"
translation = "「아니요, 사란 씨는 클래스메이트입니다. 친구가 아닙니다」"

[[dialogue]]
speaker = "サラン"
original = "「そうだよ～、蛍火ちゃんは友達じゃないよ～」"
translation = "「맞아~, 호타루비짱은 친구가 아니야~」"

[[dialogue]]
speaker = "蛍火"
original = "「ええ、そうですよね……」"
translation = "「네, 그렇죠……」"

[[dialogue]]
speaker = "サラン"
original = "「蛍火ちゃんは、サランの親友だよ～♪」"
translation = "「호타루비짱은, 사란의 절친이야~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「え……」"
translation = "「에……」"

[[dialogue]]
speaker = "サラン"
original = "「ね～♪\u3000そうだよね～、蛍火ちゃん♪」"
translation = "「그치~♪ 그렇지, 호타루비짱♪」"

[[dialogue]]
speaker = "蛍火"
original = "「は……はいぃ～<emoji=heart04>\u3000親友ですぅ～<emoji=heart04>」"
translation = "「네…… 네에~<emoji=heart04> 절친이에요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "緊張モードの蛍火が一瞬でメロメロに！？"
translation = "긴장 모드의 호타루비가 순식간에 헤롱헤롱하게!?"

[[dialogue]]
speaker = "蛍火"
original = "「その……サランさんのふわふわな笑顔を見てると、癒されてリラックスしてしまうんです……」"
translation = "「그게…… 사란 씨의 폭신폭신한 미소를 보고 있으면, 치유되어서 긴장이 풀려버려요……」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～、そうなんだ～。そういうの初めて聞けて、嬉しいかも～♪」"
translation = "「에헤헤~, 그렇구나~. 그런 거 처음 들어서, 기쁠지도~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「あ……す、すみません……面と向かってだと、恥ずかしくて……」"
translation = "「아…… 죄, 죄송합니다…… 정면으로 마주 보면, 부끄러워서……」"

[[dialogue]]
speaker = "サラン"
original = "「そうだ、せっかくだから蛍火ちゃんも、お菓子食べる～？\u3000ちょっといっぱい作り過ぎちゃったんだ～」"
translation = "「맞다, 기왕 이렇게 된 거 호타루비짱도, 과자 먹을래~? 좀 너무 많이 만들어 버렸거든~」"

[[dialogue]]
speaker = "unk"
original = "お菓子？"
translation = "과자?"

[[dialogue]]
speaker = "サラン"
original = "「サランね、お菓子作りが趣味なんだ～。それでね、この間助けてくれたお礼も兼ねて、会長ちゃんにお菓子渡そうと思って～」"
translation = "「사란 말이야, 과자 만들기가 취미거든~. 그래서 말인데, 요전에 도와준 답례도 겸해서, 회장짱에게 과자를 주려고 생각해서~」"

[[dialogue]]
speaker = "サラン"
original = "「マシュマロチーズケーキ作ってみたの～。テーブルの上に置いて～……はい、どうぞ～♪」"
translation = "「마시멜로 치즈 케이크 만들어 봤어~. 테이블 위에 두고~…… 자, 여기 있어~♪」"

[[dialogue]]
speaker = "unk"
original = "凄い本格的なケーキだ……！"
translation = "굉장히 본격적인 케이크다……!"

[[dialogue]]
speaker = "蛍火"
original = "「本格的なんてものじゃありませんよ、師匠。サランさんは……いえ、百聞は一見に如かずですね。いただきましょう」"
translation = "「본격적인 수준이 아니에요, 스승님. 사란 씨는…… 아니요, 백문이 불여일견이네요. 먹어보죠」"

[[dialogue]]
speaker = "サラン"
original = "「は～い、召し上がれ～♪」"
translation = "「네~이, 맛있게 드세요~♪」"

[[dialogue]]
speaker = "unk"
original = "気付けば、大きなマシュマロチーズケーキは、消えるように全て食べ終わっていた。"
translation = "정신을 차려보니, 커다란 마시멜로 치즈 케이크는 마법처럼 전부 사라져 있었다."

[[dialogue]]
speaker = "unk"
original = "滅茶苦茶美味しかった……！"
translation = "무지하게 맛있었어……!"

[[dialogue]]
speaker = "サラン"
original = "「わ～い、会長ちゃんが笑顔になってくれて嬉しい～♪\u3000サランも幸せでふわふわ～♪」"
translation = "「와~이, 회장짱이 웃어줘서 기뻐~♪ 사란도 행복해서 둥실둥실해~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「サランさん、ごちそうさまでした。また腕を上げましたね。これはきっと……師匠の為に作ったからでしょうか。今までで一番美味しかったです。思わず嫉妬する程に……」"
translation = "「사란 씨, 잘 먹었습니다. 또 솜씨가 늘었네요. 이건 분명…… 스승님을 위해 만들었기 때문일까요. 지금까지 중에서 가장 맛있었습니다. 나도 모르게 질투가 날 정도로……」"

[[dialogue]]
speaker = "サラン"
original = "「ありがと～♪\u3000サランも今回はよく出来たかもって思ってたんだ～」"
translation = "「고마워~♪ 사란도 이번에는 잘 만들어졌다고 생각했어~」"

[[dialogue]]
speaker = "蛍火"
original = "「師匠、実は料理人界隈では、サランさんはお菓子作りの天才と呼ばれているんです。その腕前は、名だたるパティシエや、美食家達が唸る程で……」"
translation = "「스승님, 사실 요리사 업계에서는 사란 씨를 과자 만들기의 천재라고 부르고 있어요. 그 솜씨는 이름난 파티시에나 미식가들이 감탄할 정도라……」"

[[dialogue]]
speaker = "蛍火"
original = "「私もお菓子は作りますが、未だサランさんに勝てたことはありません。将来はきっと、名を残すパティシエになるでしょうね」"
translation = "「저도 과자는 만들지만, 아직 사란 씨에게 이긴 적은 없습니다. 장래에는 분명 이름을 남길 파티시에가 되겠죠」"

[[dialogue]]
speaker = "unk"
original = "料理人の蛍火が、そこまで言うなんて……！"
translation = "요리사인 호타루비가 그렇게까지 말하다니……!"

[[dialogue]]
speaker = "サラン"
original = "「パティシエか～、何となくなれたらいいな～って思ってるけど……」"
translation = "「파티시에인가~, 왠지 모르게 될 수 있으면 좋겠다고 생각하지만……」"

[[dialogue]]
speaker = "サラン"
original = "「将来のことはともかく、サラン、皆が美味しいって言って笑ってくれるの好きなんだ～♪」"
translation = "「장래의 일은 어찌 됐든, 사란, 모두가 맛있다고 말하며 웃어주는 게 좋아~♪」"

[[dialogue]]
speaker = "サラン"
original = "「サラン、昔からドジだから、皆に迷惑かけてて～」"
translation = "「사란, 옛날부터 덜렁이라서 모두에게 폐를 끼쳐왔거든~」"

[[dialogue]]
speaker = "サラン"
original = "「でも、得意な食のことなら役に立てて、皆が喜んでくれるんだ～」"
translation = "「하지만 자신 있는 음식에 관한 거라면 도움이 되어서, 모두가 기뻐해 줘~」"

[[dialogue]]
speaker = "サラン"
original = "「サランもそれを見てると、ふわふわ～って幸せな気持ちになれるの～♪」"
translation = "「사란도 그걸 보고 있으면, 폭신폭신~ 하게 행복한 기분이 들어~♪」"

[[dialogue]]
speaker = "unk"
original = "サランなら、良いパティシエになれそうだな"
translation = "사란이라면 좋은 파티시에가 될 수 있을 것 같네"

[[dialogue]]
speaker = "蛍火"
original = "「ええ、私もそう思います」"
translation = "「네, 저도 그렇게 생각해요」"

[[dialogue]]
speaker = "サラン"
original = "「そうかな～？\u3000えへへ……♪」"
translation = "「그럴까~? 에헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "そう言ってふわふわな笑顔を浮かべる彼女を見ていると、こちらも自然と笑顔になってしまうのだった。"
translation = "그렇게 말하며 폭신폭신한 미소를 짓는 그녀를 보고 있으면, 이쪽도 자연스럽게 미소가 지어지는 것이었다."

