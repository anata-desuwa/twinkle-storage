[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「い、いらっしゃいませ。こちらウェルカムドリンクっす……」"
translation = "「어, 어서 오세요. 여기 웰컴 드링크임……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「え？\u3000あ、はい。バカラコーナーはあっちに行けば……。ああ、手荷物は入り口にクロークがあるのでそちらに……」"
translation = "「예? 아, 네. 바카라 코너는 저쪽으로 가시면……. 아아, 짐은 입구에 보관소가 있으니까 그쪽에……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うぅ……もう帰りてぇ……。女の子らしい格好してみたいとは思ってたけど、こういうのじゃねえし……」"
translation = "「으으…… 진짜 집에 가고 싶어……. 여자애 같은 옷을 입어보고 싶긴 했지만, 이런 게 아니라고……」"

[[dialogue]]
speaker = "unk"
original = "笑顔を忘れてるよ"
translation = "미소를 잊고 있어"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うわっ、急になんだっ！？\u3000つか人の仕事ぶりコソコソ観察してんじゃねえ！\u3000過保護なお兄ちゃんか！」"
translation = "「우와, 갑자기 뭐임!? 그보다 남 일하는 거 훔쳐보지 말라고! 과보호하는 오빠냐!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「てかやっぱあたしにはバニーガールなんて無理だって……！\u3000ぜってーなんだコイツって目で見られてっから……！」"
translation = "「그보다 역시 나한테 바니걸은 무리라니까……! 분명히 뭐야 이 녀석 하는 눈으로 쳐다보고 있을 거임……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「会長さんだって思ってんだろっ？\u3000似合わねえ格好してんなって！」"
translation = "「회장님도 그렇게 생각하지? 안 어울리는 옷 입고 있다고!」"

[[dialogue]]
speaker = "unk"
original = "よく似合っててかわいいと思うけど"
translation = "잘 어울리고 귀엽다고 생각하는데"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「かわい──～～っっ！\u3000またあんたはそういうナンパなセリフを……！\u3000褒めときゃ女が喜ぶと思ったら大間違いだってのっ！」"
translation = "「귀여── ~~!! 또 너는 그런 작업 멘트를……! 칭찬해주면 여자애들이 좋아할 거라 생각하면 큰 오산이라고!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あっれー、ユウリちゃん、なんかいいことあったー？\u3000なんかすっごいにやけてるケド」"
translation = "「어레~, 유우리짱, 뭐 좋은 일 있어~? 엄청 실글벙글하고 있는데.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ににに、にやけてねえっすよ！\u3000つかどこ行ってたんすかっ！」"
translation = "「시, 싱글벙글 안 했음! 그보다 어디 갔다 온 거임!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「給仕しながら店内の見回りをしてたんだよ～。ほらモンスターが隠れ潜んでるかもって話だったじゃん？」"
translation = "「서빙하면서 매장 순찰 돌고 왔지~. 봐봐, 몬스터가 숨어 있을지도 모른다는 얘기였잖아?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「めっちゃ真面目に仕事してた！」"
translation = "「엄청 성실하게 일했네!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ついでに聞き込みしてたら、なんかいっぱいチップ貰っちった♪」"
translation = "「덤으로 정보 수집했더니 팁을 잔뜩 받아버렸지 뭐야♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「副収入まで！？」"
translation = "「부수입까지!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふ、このバイト相当儲かるよ♪\u3000ユウリちゃんもお客さんに聞き込みして回ったら？」"
translation = "「후후, 이 알바 상당히 짭짤한걸♪ 유우리짱도 손님들한테 말 걸고 다녀보지 그래?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あ、あたしはセーラさんほど節操なしじゃないんすよ！」"
translation = "「나, 나는 세라 씨만큼 넉살 좋지 못하단 말임!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「人を尻軽みたいにゆーなし。ま、九浄家のカジノだけあって、鼻の下伸ばしたおじさまなんてそうそういないけどね」"
translation = "「사람을 헤픈 여자 취급하지 말라구. 뭐, 쿠죠 가문의 카지노인 만큼, 음큼하게 구는 아저씨는 어지간해서는 없지만 말이야.」"

[[dialogue]]
speaker = "unk"
original = "良かった……"
translation = "다행이다……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ん～？\u3000もしかして会長さんも心配しちゃってた感じ？\u3000ふふ、うちのバニーガール姿、独り占めにしておきたいんだ？」"
translation = "「음~? 혹시 회장님도 걱정해 버린 느낌? 후후, 나의 바니걸 모습을 독점해두고 싶어?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「え……今すぐ出てけ、同じ空気吸いたくねえ」"
translation = "「엑…… 당장 나가, 같은 공기 마시고 싶지 않아.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「辛辣すぎだってー。女の子としては嬉しいじゃん♪」"
translation = "「너무 신랄하다니까~. 여자애로서는 기쁜 일이잖아♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でもでも、ユウリちゃんに目移りしてる間は独り占めはさせてあげないよ♪\u3000うちだけを見てくんなきゃ……ね？（谷間チラチラっ<emoji=heart04>）」"
translation = "「그치만 그치만, 유우리짱에게 눈을 돌리고 있는 동안에는 독점하게 해주지 않을 거야♪ 나만 봐주지 않으면…… 응? (가슴골을 힐끗힐끗<emoji=heart04>)」"

[[dialogue]]
speaker = "unk"
original = "チップをどうぞ！"
translation = "팁을 드립니다!"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あれれ、もらっちゃっていいの～？\u3000ありがと～♪」"
translation = "「어라라, 받아도 되는 거야~? 고마워~♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「はぁ、男ってホントアホだな……」"
translation = "「하아, 남자란 정말 바보구나……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「コ、コホン。ユウリさんの言うとおりだよ会長。そんな風にベタベタしてくる女性が好みだったのかい？\u3000チップまであげて……」"
translation = "「코, 흠. 유우리 씨 말대로예요, 회장. 그런 식으로 살갑게 구는 여성이 취향이었나요? 팁까지 주고……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふふ、その言い方だとまるで会長さんがうちに誘惑されちって、ヤキモチ焼いてるように聞こえるけど～」"
translation = "「후후, 그 말투는 마치 회장님이 나한테 유혹당해버려서, 질투하고 있는 것처럼 들리는데~」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「っっ！？\u3000ちち、違います！\u3000どうして男の私がヤキモチなんて……！」"
translation = "「!? 아, 아뇨, 아닙니다! 어째서 남자인 제가 질투 같은 걸……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「……あれ？\u3000冗談で言ったつもりだったのにこの反応……。王子って、そっちの人だったり？」"
translation = "「……어라? 농담으로 한 말이었는데 이 반응……. 왕자님, 그쪽 사람이야?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ですから違いますってば！」"
translation = "「그러니까 아니라니까요!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「つかあんた、テーブルの方は大丈夫なのかよ？」"
translation = "「그보다 너, 테이블 쪽은 괜찮은 거냐?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「交代時間になりましたから。モンスターのことも気になりますし、店内を<ruby>警邏<rt>けいら</rt></ruby>していたんです」"
translation = "「교대 시간이 되었으니까요. 몬스터 일도 신경 쓰이고, 점내를 순찰하고 있었습니다.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「……まぁ会長は？\u3000己が使命も忘れて女性と楽しく談笑していたようだけど？」"
translation = "「……그나저나 회장은? 자신의 사명도 잊고 여성과 즐겁게 담소하고 있었던 모양입니다만?」"

[[dialogue]]
speaker = "unk"
original = "こ、これから見回りに行こうかと"
translation = "이, 이제부터 순찰하러 가려던 참이야"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ね、ユウリちゃん。あれやっぱ妬いてない？」"
translation = "「있지, 유우리짱. 저거 역시 질투하는 거 아냐?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「よくわかんねーっすね……。さっきは堂々と女子トイレ覗きに行こうとしてたってのに……」"
translation = "「잘 모르겠음……. 아까는 당당하게 여자 화장실 엿보러 가려고 했으면서……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「コ、コホン！\u3000見たところ店内に異変はありませんでした。皆さんはどうですか？\u3000何か不審な影を見かけたりとか」"
translation = "「코, 흠! 보아하니 점내에 이변은 없었습니다. 여러분은 어떤가요? 뭔가 수상한 그림자를 보진 못했습니까?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ううん全く。うちもけっこー見回ったつもりなんだけどねー」"
translation = "「응, 전혀. 나도 꽤 둘러봤는데 말이야~」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「やっぱ野良モンスターが紛れ込んでただけじゃねえのか？\u3000それならそれで良いけどよ」"
translation = "「역시 야생 몬스터가 섞여 들어왔을 뿐인 거 아냐? 그렇다면 다행이겠지만.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「念のため警戒は続けましょう。店内のみならずバックヤードももう一度調査しておいた方がいいかもしれません」"
translation = "「만약을 위해 경계는 계속하죠. 점내뿐만 아니라 백야드도 다시 한번 조사해 두는 편이 좋을지도 모릅니다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だね。手分けして調べてみよっか」"
translation = "「그러게. 분담해서 조사해 볼까?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「んじゃまずは男女に分かれて更衣室から調べてみっか。モンスターが出たら洒落になんねえ場所だし」"
translation = "「그럼 우선 남녀로 나뉘어서 탈의실부터 조사해 보자구. 몬스터가 나오면 장난 아닐 장소니까.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ええ。行きましょう」"
translation = "「예. 가도록 하죠.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「──って、あんたはあっちだろうが！？」"
translation = "「──잠깐, 너는 저쪽이잖아!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ひゃっ！？\u3000すみません、つい！」"
translation = "「히익!? 죄송합니다, 그만!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ついじゃねえよ、ついじゃ！？\u3000調査って言やどこにでも入れると思ってねえだろうな！？\u3000この覗き魔エロ王子！」"
translation = "「그만은 무슨, 그만은!? 조사라고 하면 어디든 들어갈 수 있다고 생각하는 거 아니겠지!? 이 관음증 변태 왕자!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「お、思ってません！\u3000今のは本当に間違えただけで……！」"
translation = "「새, 생각 안 했습니다! 방금 건 정말로 착각한 것뿐이라……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ふつー間違えるかなー……？\u3000でも嘘ゆってる感じしないし……」"
translation = "「보통 착각을 하나……? 하지만 거짓말하는 것 같지는 않고……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ね。もしかして王子って──」"
translation = "「있지. 혹시 왕자님은──」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「モンスターかっ！？\u3000あっちのテーブルの方から聞こえたぞっ！」"
translation = "「몬스터인가!? 저쪽 테이블 쪽에서 들렸어!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うっそっ、さっき見回りした時はなんの気配もなかったのにっ！？」"
translation = "「거짓말, 아까 순찰했을 때는 아무 기척도 없었는데!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「とにかく行きましょうっ！\u3000被害が出る前に退治しなくては……！」"
translation = "「어쨌든 갑시다! 피해가 나오기 전에 퇴치해야 해요……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「いました……！\u3000しかし、あの姿は……」"
translation = "「있었습니다……! 하지만, 저 모습은……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「今まで見たことがねえモンスターだな。カジノに隠れ潜むにはもってこいのフォルムじゃねえか」"
translation = "「지금까지 본 적 없는 몬스터군. 카지노에 숨어들기에는 안성맞춤인 형태잖아.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「皆さん、落ち着いて避難してください。ここはうちらに任せて！」"
translation = "「여러분, 진정하고 피난해 주세요. 여기는 저희에게 맡기고!」"

[[dialogue]]
speaker = "unk"
original = "マズい、逃げようとしてる！"
translation = "안 돼, 도망치려 하고 있어!"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「させっか！」"
translation = "「보낼 것 같냐!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「させませんっ！」"
translation = "「보내지 않습니다!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うおっ！？」"
translation = "「우와!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「しまった目眩ましっ……！\u3000取り逃がしちゃった……！」"
translation = "「당했다, 눈속임……! 놓쳐버렸어……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っっ。どこ見てんだこのエロ王子っ！？」"
translation = "「윽. 어딜 보고 있는 거야, 이 변태 왕자!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「す、すみま──ひゃんっ！？」"
translation = "「죄, 죄송── 히양!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「……ん？\u3000なんだ？\u3000やたら柔らかいもんが手の平に……」"
translation = "「……응? 뭐지? 유난히 부드러운 게 손바닥에……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「んひゃっ、あっ、んっ……！\u3000ユウリさっ、やめっ、あっ……！」"
translation = "「응햐, 앗, 응……! 유우리 씨, 그만, 앗……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「こ、この柔らかさ……っっ！？\u3000ま、まさか──！？」"
