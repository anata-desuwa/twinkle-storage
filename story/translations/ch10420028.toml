speaker = "フェニエル"
original = "「ふぁ<emoji=heart04>\u3000はぁん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000今、イっちゃうところでした<emoji=heart04>\u3000まだまだ頑張りますっ<emoji=heart04>」"
translation = "「후아<emoji=heart04> 하앙<emoji=heart04> 아아앗<emoji=heart04> 지금 가버릴 뻔했어요. 아직 더 힘낼게요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「ああぁぁっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000そんなぁっ<emoji=heart04>\u3000おち○ちんしながらおっぱいなんてっ<emoji=heart04>\u3000やぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000気持ちよすぎます<emoji=heart04>\u3000こんなのっ<emoji=heart04>\u3000ああぁぁあぁんっ<emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 응앗<emoji=heart04> 말도 안 돼! 자지 하면서 가슴까지! 야앗<emoji=heart04> 아앗<emoji=heart04> 앗<emoji=heart04> 너무 기분 좋아요. 이런 거! 아아아아아앙!<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「おま○この奥っ、ぐじゅぐじゅしながらっ<emoji=heart04>\u3000おっぱいの先、いじめてっ<emoji=heart04>\u3000こんなのされたら私っ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000一気に来ちゃうっ<emoji=heart04>」"
translation = "「보지 안쪽 구쥬구쥬 하면서 가슴 끝 괴롭히고! 이런 거 당하면 저! 안 돼! 한꺼번에 와버려!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あぁぁっ<emoji=heart04>\u3000い、イきそうですっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イク<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000先にイっちゃう<emoji=heart04>\u3000ご主人様と一緒がいいっ<emoji=heart04>」"
translation = "「아아앗! 가, 갈 것 같아요! 가요! 가요! 싫어! 먼저 가버려! 주인님과 함께가 좋아!」"

[[dialogue]]
speaker = "フェニエル"
original = "「もう無理っ<emoji=heart04>\u3000我慢できませんっ<emoji=heart04>\u3000イクイク<emoji=heart04>\u3000ご主人様も出してっ<emoji=heart04>\u3000おま○こに精液出してぇ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 무리! 참을 수 없어요! 가요 가요! 주인님도 내보내줘! 보지에 정액 내보내줘어어어어!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んあぁぁぁっ<emoji=heart04>\u3000ご主人様、おち○ちん膨らんでっ<emoji=heart04>\u3000ああぁぁっ<emoji=heart04>\u3000来るっ<emoji=heart04>\u3000来る来る来るぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04> 주인님, 자지 부풀어서! 아아아아앗<emoji=heart04> 온다! 와요 와요 와요오옷!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふあぁぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イきます<emoji=heart04>\u3000おち○ちんでイっちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 가요! 갑니다! 자지로 가버려요!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「もう無理っ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイク<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああああああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000イクイクイっクぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 무리! 가요! 가요 가요! 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아아아아아앗!<emoji=heart04><emoji=heart04> 가요 가요 가버려어어어어!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふあああああああああぁぁぁ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아아아아아아아아아아아앙~~~~~~~~~~~~~~~~~!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「うぁっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000ご主人様の……出てます<emoji=heart04>\u3000えへへぇ、やりましたぁ<emoji=heart04>\u3000一緒にイケたのは、初めてかも<emoji=heart04>」"
translation = "「우앗<emoji=heart04> 하아<emoji=heart04> 하아<emoji=heart04> 하아아<emoji=heart04> 주인님 거…… 나오고 있어요. 에헤헤에, 해냈어요. 같이 간 건 처음일지도<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はぁぁ……んふぅぅ<emoji=heart04>\u3000ちょっぴり先にイっちゃいましたけど<emoji=heart04>\u3000くたっとならずに、最後まで一緒に出来ました<emoji=heart04>\u3000嬉しいです<emoji=heart04>」"
translation = "「하아아…… 응후우우<emoji=heart04> 조금 먼저 가버렸지만<emoji=heart04> 축 늘어지지 않고 끝까지 함께 할 수 있었어요. 기뻐요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んんっ<emoji=heart04>\u3000ご主人様の、まだびゅ<emoji=heart04>\u3000びゅ<emoji=heart04>\u3000ってしてます……元気ですね<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 주인님 거, 아직 뷰 뷰 하고 있어요…… 팔팔하네요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご主人様の精液で、おなかが熱いです<emoji=heart04>\u3000濃いのが注がれてる感じがして……ドキドキしちゃいます<emoji=heart04>」"
translation = "「주인님의 정액 때문에 배가 뜨거워요<emoji=heart04> 진한 게 쏟아지는 느낌이 들어서…… 두근거려 버려요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふわぁぁ、ご主人様ぁ<emoji=heart04>\u3000んふふ<emoji=heart04>\u3000だぁいすきです<emoji=heart04>\u3000おま○ことおち○ちんで繋がったまま、余韻を感じるって気持ちいいですね……<emoji=heart04>」"
translation = "「후아아, 주인님아<emoji=heart04> 응후후<emoji=heart04> 정말 좋아해요. 보지와 자지로 이어진 채 여운을 느끼는 거 기분 좋네요……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「こんな幸せなら、次からもこんな風に……出来たらいいな<emoji=heart04>」"
translation = "「이런 행복이라면 다음부터도 이런 식으로…… 할 수 있으면 좋겠다<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「やぁん<emoji=heart04>\u3000抜けちゃう<emoji=heart04>\u3000ふぁぁぁっ<emoji=heart04>\u3000せっかく繋がってたのに、寂しいです……<emoji=heart04>」"
translation = "「야앙<emoji=heart04> 빠져버려요. 후아아아앗<emoji=heart04> 모처럼 이어져 있었는데 외로워요……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふふっ、ご主人様のおち○ちん、ぬるぬる<emoji=heart04>\u3000えっちなおしるがべっとりですね<emoji=heart04>\u3000これが、私のおま○この中に……<emoji=heart04>」"
translation = "「후후, 주인님 자지 미끈미끈<emoji=heart04> 야한 즙이 듬뿍 묻었네요. 이게 제 보지 안에……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「たっぷり出したのに、おち○ちんちっとも小さくなってません<emoji=heart04>\u3000ぱんぱんに膨らんだまま、ビクンビクンしてます<emoji=heart04>」"
translation = "「잔뜩 내보냈는데 자지가 조금도 작아지지 않았어요<emoji=heart04> 팽팽하게 부푼 채로 비쿤비쿤 하고 있어요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「そうですよね……まだ最初のお射精ですし<emoji=heart04>\u3000ご主人様、せっくすする時は何度も私に出してくれますから<emoji=heart04>\u3000たった１回だけじゃ、満足できるはずありません<emoji=heart04>」"
translation = "「그렇죠…… 아직 첫 사정이니까요<emoji=heart04> 주인님, 섹스할 때는 몇 번이나 저한테 내보내 주시니까. 단 한 번만으로는 만족하실 리가 없죠.」"

[[dialogue]]
speaker = "フェニエル"
original = "「はいっ<emoji=heart04>\u3000ご主人様にはこれまでも沢山愛してもらってますから、わかります<emoji=heart04>」"
translation = "「네! 주인님께는 지금까지도 잔뜩 사랑받았으니까 알아요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「まだまだ夜は長いですし<emoji=heart04>\u3000おま○こ奉仕、もっとさせて下さい<emoji=heart04>\u3000ご主人様<emoji=heart04>」"
translation = "「아직 밤은 기니까요<emoji=heart04> 보지 봉사, 좀 더 하게 해주세요. 주인님<emoji=heart04>」"

