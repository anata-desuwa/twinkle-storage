[[dialogue]]
speaker = "unk"
original = "フニが自分からキスをするようになって、ただでさえ多かったキスの回数が倍増した。"
translation = "후니가 먼저 키스를 하게 되면서, 안 그래도 많았던 키스 횟수가 배로 늘었다."

[[dialogue]]
speaker = "unk"
original = "その結果、自然とキスが出来る場所を求めてしまうわけで、今日もフニが俺の家を訪れていた。"
translation = "그 결과 자연스럽게 키스할 수 있는 장소를 찾게 되었고, 오늘도 후니가 내 집을 방문했다."

[[dialogue]]
speaker = "フェニエル"
original = "「会長さんの家にお泊まり、嬉しいです。お母様が急に帰れなくなるなんて、本当は喜んじゃいけないこと、なんですけど……」"
translation = "「회장님 댁에서 자고 가는 거, 기뻐요. 어머님이 갑자기 못 돌아오시게 된 건 사실 기뻐하면 안 되는 일이지만……」"

[[dialogue]]
speaker = "フェニエル"
original = "「えへへ♪\u3000今日は朝までずぅ～～っと、会長さんと２人きりですね<emoji=heart04>」"
translation = "「에헤헤♪ 오늘은 아침까지 계에에속 회장님과 둘뿐이네요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めてフニの方からキスをしてくれたあの日から、フニは『スイッチ』が入るとかなり積極的になってくれるようになった。"
translation = "처음으로 후니가 먼저 키스를 해준 그날 이후, 후니는 『스위치』가 켜지면 꽤 적극적으로 변하게 되었다."

[[dialogue]]
speaker = "unk"
original = "その『スイッチ』とは……おでこへのキス。それをすると、恥ずかしがり屋なフニが、普段では考えられないほど大胆になる。"
translation = "그 『스위치』란…… 이마에 하는 키스. 그것을 하면 부끄럼쟁이인 후니가 평소라면 생각할 수 없을 정도로 대담해진다."

[[dialogue]]
speaker = "unk"
original = "勇気の出るおまじないというか、自分への言い訳というか……ともあれ、２人きりでイチャイチャする時は、最初におでこにキスをするのが、俺たちの間での決まりとなっていた。"
translation = "용기가 나는 주문이랄까, 자신에 대한 핑계랄까…… 아무튼 둘이서 꽁냥거릴 때는 처음에 이마에 키스를 하는 것이 우리 사이의 규칙이 되었다."

[[dialogue]]
speaker = "フェニエル"
original = "「今日も頑張って、いっぱいキスしますね<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000もっと私に、ドキドキして下さい……<emoji=heart04>」"
translation = "「오늘도 힘내서 키스 잔뜩 할게요<emoji=heart04> 쪽<emoji=heart04> 응츄<emoji=heart04> 좀 더 저 때문에 두근거려 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んむっ<emoji=heart04>\u3000会長さん、好き……<emoji=heart04>\u3000大好きですっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ぷちゅ<emoji=heart04>\u3000ちゅう～～っ<emoji=heart04>」"
translation = "「음뭇<emoji=heart04> 회장님, 좋아……<emoji=heart04> 정말 좋아해요!<emoji=heart04> 츄파<emoji=heart04> 푸츄<emoji=heart04> 츄우우웃<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「えへへ、ちょっぴり恥ずかしいですっ。最後、いっぱいちゅ～～って、吸い付いちゃいました<emoji=heart04>\u3000こういうキスすると、やっぱり照れちゃいます<emoji=heart04>」"
translation = "「에헤헤, 조금 부끄럽네요. 마지막에 잔뜩 츄우~ 하고 빨아버렸어요<emoji=heart04> 이런 키스를 하면 역시 쑥스러워져요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「照れてるところも、その格好も、凄く可愛いよ。フニ」"
translation = "「쑥스러워하는 모습도, 그 복장도 정말 귀여워, 후니.」"

[[dialogue]]
speaker = "フェニエル"
original = "「えへへ♪\u3000普通の日なのにクリスマスフォームなんておかしくないか不安でしたけど、喜んでもらえるなら……着替えて良かったです<emoji=heart04>」"
translation = "「에헤헤♪ 평범한 날인데 크리스마스 폼이라니 이상하지 않을까 불안했지만, 기뻐해 주신다면…… 갈아입길 잘했어요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「クリスマスシーズンは色々あって、イチャイチャする時間も、取れませんでしたから……<emoji=heart04>\u3000こうやってやり直せるのは、嬉しいです♪」"
translation = "「크리스마스 시즌에는 여러 일이 있어서 꽁냥거릴 시간도 내지 못했으니까……<emoji=heart04> 이렇게 다시 할 수 있어서 기뻐요♪」"

[[dialogue]]
speaker = "クロト"
original = "「フニがクリスマスフォームを着てくれるって聞いて、部屋もできる範囲でクリスマスの飾りつけしてみたんだ。ちょっと張り切りすぎちゃったかもだけど」"
translation = "「후니가 크리스마스 폼을 입어준다고 해서, 방도 할 수 있는 범위 내에서 크리스마스 장식을 해봤어. 좀 너무 의욕이 앞섰을지도 모르지만.」"

[[dialogue]]
speaker = "フェニエル"
original = "「私たち２人だけの聖夜ってことですよね<emoji=heart04>\u3000すっごく、ドキドキしちゃいます<emoji=heart04>」"
translation = "「우리 둘만의 성야라는 거네요<emoji=heart04> 정말로 두근거려요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「私にとっては、今日がクリスマスです。特別な衣装にお着換えして、お泊まり<emoji=heart04>\u3000いつもなら出来ないことも、今日なら出来そうな気がして……」"
translation = "「저에게는 오늘이 크리스마스예요. 특별한 의상으로 갈아입고, 외박<emoji=heart04> 평소라면 못 할 일도 오늘이라면 할 수 있을 것 같은 기분이 들어서……」"

[[dialogue]]
speaker = "フェニエル"
original = "「あのっ、朝までゆっくり出来るのに、焦りすぎって思われちゃうかも、知れませんけど……ベッドのところ、行きませんか<emoji=heart04>」"
translation = "「저기, 아침까지 천천히 있을 수 있는데 너무 서두른다고 생각하실지도 모르겠지만…… 침대 쪽으로 가지 않을래요?<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「今日こそは会長さんを、最後まで受け止めたくて<emoji=heart04>\u3000頑張りますので、よろしくお願いします……<emoji=heart04>」"
translation = "「오늘이야말로 회장님을 끝까지 받아들이고 싶어서<emoji=heart04> 힘낼 테니까, 잘 부탁드려요……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ど、どうでしょうか……？\u3000いつもみたいに私のここ、しっかり確認して下さい<emoji=heart04>」"
translation = "「어, 어떤가요……? 평소처럼 저의 여기, 확실히 확인해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はじめの頃は、こんな格好恥ずかしくて無理～って、なっちゃいましたけど、今では……あぅぅ、い、今も凄く恥ずかしいですね、やっぱりっ」"
translation = "「처음에는 이런 차림 부끄러워서 무리~ 라고 생각했지만, 지금은…… 아으으, 지, 지금도 역시 너무 부끄럽네요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「でもでもっ、大好きな会長さんのためなら私、いくらでも頑張れちゃいます。見て下さい、私のおま○こ<emoji=heart04>\u3000会長さんだけのものなんですよ<emoji=heart04>」"
translation = "「하지만 하지만! 정말 좋아하는 회장님을 위해서라면 저, 얼마든지 힘낼 수 있어요. 보세요, 제 보지<emoji=heart04> 회장님만의 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はぅ、会長さんに見られてると、ドキドキして……えっちなおつゆが出ちゃいます<emoji=heart04>\u3000はぁぁんっ」"
translation = "「하우, 회장님이 보고 계시니까 두근거려서…… 야한 국물이 나와버려요<emoji=heart04> 하아앙」"

[[dialogue]]
speaker = "フェニエル"
original = "「は、恥ずかしいですぅ<emoji=heart04>\u3000最初は、こんなのじゃなかったのに……はぁぁ、期待するとすぐ濡れるように、なっちゃいました<emoji=heart04>」"
translation = "「부, 부끄러워요<emoji=heart04> 처음엔 이렇지 않았는데…… 하아아, 기대하면 금방 젖어버리게 됐어요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「会長さんが私のこと、いっぱいいっぱい可愛がってくれた、おかげです<emoji=heart04>\u3000ほら、ぬるっとしたのが、こんなに……<emoji=heart04>\u3000あぁぁん」"
translation = "「회장님이 저를 아주 많이 예뻐해 주신 덕분이에요<emoji=heart04> 보세요, 미끈거리는 게 이렇게나……<emoji=heart04> 아아앙」"

[[dialogue]]
speaker = "フェニエル"
original = "「もう、いつでも大丈夫……みたいです<emoji=heart04>\u3000会長さんのそれ……お、おっきくなってる、おち○ちん<emoji=heart04>\u3000私のおま○こに、入れてください<emoji=heart04>」"
translation = "「이제 언제든 괜찮은 것…… 같아요<emoji=heart04> 회장님의 그거…… 커, 커다래진 자지<emoji=heart04> 제 보지에 넣어주세요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000か、会長さんのが……入っちゃい、ました<emoji=heart04>\u3000う、嬉しいです<emoji=heart04>\u3000こんなに奥まで……ありがとうございますっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 하앙<emoji=heart04> 회, 회장님 게…… 들어와 버렸, 어요<emoji=heart04> 기, 기뻐요<emoji=heart04> 이렇게 안쪽까지…… 감사합니다!<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「やっぱり凄く……おっきいです<emoji=heart04>\u3000内側からぐうっと、押し広げられてる感じが、します<emoji=heart04>\u3000えへへっ。会長さんの興奮が、おま○こでも感じられちゃいます<emoji=heart04>」"
translation = "「역시 정말…… 커요<emoji=heart04> 안쪽에서 꾹 하고 넓혀지는 느낌이 들어요<emoji=heart04> 에헤헤. 회장님의 흥분이 보지에서도 느껴져요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はい、もう大丈夫ですので……いっぱい、動いて下さい<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000何度も抱いて頂いたおかげで、私のおま○こ、会長さんのおち○ちんの形に、なっちゃいましたからぁ<emoji=heart04>」"
translation = "「네, 이제 괜찮으니까…… 마음껏 움직여 주세요<emoji=heart04> 응앗<emoji=heart04> 몇 번이나 안아주신 덕분에 제 보지, 회장님 자지 모양이 되어버렸으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「痛みなんて、まったくありません<emoji=heart04>\u3000強くずんずんしても……もう気持ちいいだけ、なんです<emoji=heart04>\u3000はぁぁっ」"
translation = "「아픔 같은 건 전혀 없어요<emoji=heart04> 강하게 푹푹 해도…… 이제 기분 좋기만 해요<emoji=heart04> 하아아」"

[[dialogue]]
speaker = "フェニエル"
original = "「だから遠慮しないで、いっぱい動いてっ<emoji=heart04>\u3000会長さんのおち○ちん……私のおま○こで気持ち良く、させてくださいっ<emoji=heart04>」"
translation = "「그러니까 사양 말고 마음껏 움직여줘!<emoji=heart04> 회장님 자지…… 제 보지로 기분 좋게 해드릴게요!<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「ふあっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000す、凄いですっ<emoji=heart04>\u3000会長さんのっ、お、おち○ちんっ<emoji=heart04>\u3000私のにっ、ずぶっ<emoji=heart04>\u3000ずぶっ<emoji=heart04>\u3000って、いっぱい出し入れ、してますっ<emoji=heart04>」"
translation = "「후앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 저, 정말 대단해요!<emoji=heart04> 회장님의, 자, 자지!<emoji=heart04> 제 거에, 즈븍, 즈븍, 하고 잔뜩 넣었다 뺐다 하고 있어요!<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「んんんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000そこ<emoji=heart04>\u3000そこダメですっ<emoji=heart04>\u3000私っ、そこ弱いんですっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000やだぁ<emoji=heart04>\u3000入れてもらってすぐなのにっ、私っ<emoji=heart04>\u3000私っ<emoji=heart04>」"
translation = "「응응읏<emoji=heart04> 앗<emoji=heart04> 거기, 거기 안 돼요!<emoji=heart04> 저, 거기 약하단 말이에요! 앙<emoji=heart04> 앙<emoji=heart04> 싫어<emoji=heart04> 싫어어<emoji=heart04> 넣어주신 지 얼마 안 됐는데, 저<emoji=heart04> 저<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「会長さんずるいですっ<emoji=heart04>\u3000弱点なのにっ、そこばかり何度もっ<emoji=heart04>\u3000ダメですっっ<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000声出ちゃいますっ<emoji=heart04>\u3000我慢出来ませんっっ<emoji=heart04><emoji=heart04>」"
translation = "「회장님 치사해요! 약점인데 거기만 몇 번이나! 안 돼요오!<emoji=heart04> 후아아아앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 목소리 나와버려요! 참을 수 없어요!!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「おま○この弱点、ダメぇ<emoji=heart04><emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000はぁぁ……んんんっ。もっとおち○ちんを、私で気持ち良くさせて、くださいっ<emoji=heart04>」"
translation = "「보지의 약점, 안 돼애<emoji=heart04><emoji=heart04> 아아앙<emoji=heart04> 하아아…… 응응읏. 좀 더 자지를 저로 기분 좋게 해주세요!<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あはぁぁっ<emoji=heart04>\u3000んんっ。激しいのは、大丈夫ですからっ<emoji=heart04>\u3000おま○こじゃなくて、おち○ちんっ<emoji=heart04>\u3000おち○ちんが気持ち良くなるように、ゴシゴシしてくださいっ<emoji=heart04>」"
translation = "「아하아아앗<emoji=heart04> 응읏. 격한 건 괜찮으니까요! 보지가 아니라 자지! 자지가 기분 좋아지도록 고시고시 해주세요!<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「あんっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000そこダメぇ<emoji=heart04>\u3000弱点ダメですっ、そこはもっとゆっくりっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000気持ちいい、ですっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하아아앙<emoji=heart04> 거기 안 돼애<emoji=heart04> 약점 안 돼요, 거기는 좀 더 천천히<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 응<emoji=heart04> 기분 좋아, 요<emoji=heart04> 앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
original = "「はぅぅぅん<emoji=heart04>\u3000あぁぁっ、まだ会長さんを感じていたいからぁ……はぅぅん<emoji=heart04>\u3000そのくらいでぇっ<emoji=heart04>」"
translation = "「하으으으응<emoji=heart04> 아아앗, 아직 회장님을 느끼고 싶으니까…… 하으으응<emoji=heart04> 그 정도로오!」"

[[dialogue]]
speaker = "フェニエル"
original = "「んくっ<emoji=heart04>\u3000ごめんなさい、激しく動いてくださいって言ったのに、気持ちよくなり過ぎちゃって<emoji=heart04>\u3000あれを続けられたら私、すぐびくんっておっきいのが、来ちゃうのでっ<emoji=heart04>」"
translation = "「응긋<emoji=heart04> 죄송해요, 격하게 움직여 달라고 했는데 너무 기분 좋아져 버려서<emoji=heart04> 그걸 계속하시면 저, 금방 비쿤 하고 커다란 게 와버리니까요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長さん、優しいですから<emoji=heart04>\u3000私がイクと、無理させないように……んんっ、休ませてくれますよね。はぁぁ……おち○ちんはちっとも、満足してないのに」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 회장님은 다정하시니까<emoji=heart04> 제가 가면 무리하지 않게…… 응읏, 쉬게 해주시죠. 하아아…… 자지는 조금도 만족하지 못했는데.」"

[[dialogue]]
speaker = "フェニエル"
original = "「だから私っ……んくぅっ<emoji=heart04>\u3000もっとせっくすが上手になって、会長さんの性欲を……おち○ちんを、最後まで満足させてあげたいんですっ。それが彼女のつとめですから<emoji=heart04>」"
