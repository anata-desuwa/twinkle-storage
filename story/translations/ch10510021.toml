[[dialogue]]
speaker = "unk"
original = "第１話,これが真の姿だ！,P"
translation = "제1화, 이것이 진정한 모습이다!, P"

[[dialogue]]
speaker = "unk"
original = "人間界にお忍び旅行をするクラウディアと接するうち、俺と彼女はどんどん仲を深めていった。"
translation = "인간계로 몰래 여행을 온 클라우디아와 접하는 사이, 나와 그녀는 점점 사이가 깊어졌다."

[[dialogue]]
speaker = "unk"
original = "そしてとうとう俺はクラウディアに想いを打ち明け、彼女も応えてくれることになり──"
translation = "그리고 마침내 나는 클라우디아에게 마음을 고백했고, 그녀도 응해주게 되어──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「よし。動くなよ魔王、初めての口付けだ。余がりーどするからの……？」"
translation = "「좋아. 움직이지 마라 마왕, 첫 입맞춤이다. 여가 리드할 테니까……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んぅっ……ちゅっ<emoji=heart04>」"
translation = "「응으…… 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふ、ふふん♪\u3000<ruby>面映<rt>おもは</rt></ruby>ゆいが、高鳴る鼓動も心地よい……お前も同じ気持ちか？\u3000そうか、そうか<emoji=heart04>」"
translation = "「후, 후훙♪ 면구스럽지만, 높게 뛰는 고동도 기분 좋구나…… 너도 같은 기분이냐? 그런가, 그런가<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「よいか。光栄に思うのだぞ？\u3000光の魔女のふぁーすときっすを受けられるなど、人の身に余る幸福なのだからな！」"
translation = "「알겠느냐. 영광으로 생각하거라. 빛의 마녀의 퍼스트 키스를 받을 수 있다니, 인간의 몸에 과분한 행복이니까 말이다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「して魔王よ、お前は余のしもべ兼、恋人となったわけだが……恋人というのはどのように仲を深めるものなのだ？」"
translation = "「그래서 마왕이여, 너는 여의 종자 겸 연인이 된 셈인데…… 연인이란 것은 어떻게 사이를 깊게 만드는 것이냐?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふむ、秘密の共有……？\u3000なるほどな。確かに秘密を打ち明ければ、より深い仲になれそうだのう」"
translation = "「흠, 비밀의 공유……? 과연 그렇군. 확실히 비밀을 털어놓으면 더 깊은 사이가 될 수 있을 것 같구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「となれば……うむ。余の<b>あれ</b>を見せてやるか」"
translation = "「그렇게 된다면…… 음. 여의 <b>그것</b>을 보여주도록 할까」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「いや、今日は無理だ。迎えにセドナが来るのでな、感づかれてしまう」"
translation = "「아니, 오늘은 무리다. 데리러 세드나가 올 테니 말이다, 눈치채버릴 게야」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「次に会う時までに準備しておく。期待しておれよ！」"
translation = "「다음에 만날 때까지 준비해두마. 기대하고 있거라!」"

[[dialogue]]
speaker = "unk"
original = "と、ここまでが先週の話。クラウディアは一体何を見せてくれるのだろうと首をかしげていたら、彼女はいつもどおり予告もなく訪問してきて──"
translation = "라고, 여기까지가 지난주의 이야기. 클라우디아가 대체 무엇을 보여주려는 걸까 고개를 갸웃거리고 있었더니, 그녀는 평소처럼 예고도 없이 방문해서──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「では約束通り、お前に余の秘密を見せてやる。刮目するのだぞっ！」"
translation = "「그럼 약속대로, 네놈에게 여의 비밀을 보여주마. 괄목하거라!」"

[[dialogue]]
speaker = "unk"
original = "神聖な魔力のオーラが迸ってる！？"
translation = "신성한 마력의 오라가 뿜어져 나오고 있어!?"

[[dialogue]]
speaker = "unk"
original = "す、すごい……！"
translation = "와, 대단해……!"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「ふふふ、驚いておるようだな♪\u3000これこそが余の真の姿。体の<ruby>裡<rt>うち</rt></ruby>に眠った魔力をすべて開放すると、こうなるのだ！」"
translation = "「후후후, 놀란 모양이구나♪ 이것이야말로 여의 진정한 모습. 몸 속에 잠든 마력을 전부 개방하면 이렇게 되는 것이다!」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「お前に読ませてもらったしょーねん漫画に例えると、フルパワーモードというやつだな！\u3000ほれ、感想を述べてみよ！」"
translation = "「네놈에게 읽게 한 소년 만화에 비유하자면, 풀 파워 모드라는 것이지! 자, 감상을 말해보거라!」"

[[dialogue]]
speaker = "unk"
original = "すごく綺麗だ"
translation = "정말 아름다워"

[[dialogue]]
speaker = "unk"
original = "すごく可愛い"
translation = "정말 귀여워"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「そうであろう！\u3000余は普段から偉くて凄い！\u3000が、この姿になるとも～～～っと偉くて凄くなるのだ！」"
translation = "「그렇겠지! 여는 평소에도 위대하고 대단하다! 하지만 이 모습이 되면 어어어엄청나게 더 위대하고 대단해지는 것이다!」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「だがちょいと言葉が足りん気がするな？\u3000ほれ、もっと褒めんか♪」"
translation = "「하지만 조금 말이 부족한 기분이 드는구나? 자, 더 칭찬하지 못할까♪」"

[[dialogue]]
speaker = "unk"
original = "とても素敵なレディだ"
translation = "정말 멋진 숙녀야"

[[dialogue]]
speaker = "unk"
original = "見惚れてしまう"
translation = "넋을 잃고 보게 돼"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「そうであろう、そうであろう！\u3000ふははっ！\u3000苦しゅうないぞ、語彙が尽きるまで褒めるのだっ！」"
translation = "「그렇겠지, 그렇겠지! 후하하! 괴롭지 않다, 어휘가 다할 때까지 칭찬하거라!」"

[[dialogue]]
speaker = "unk"
original = "花嫁の衣装みたいだね"
translation = "신부 의상 같네"

[[dialogue]]
speaker = "unk"
original = "えーっと……"
translation = "어, 그러니까……"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「ハナヨメ？\u3000なんだそれは。人間界の言葉か？」"
translation = "「신부? 그게 무엇이냐. 인간계의 말이냐?」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「──む。なんだ、また魔王の連絡機が鳴っておるぞ」"
translation = "「──음. 뭐냐, 또 마왕의 연락기가 울리고 있구나」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "『もしもし会長！？\u3000大変、アステラが同時に３つも出ちゃったの！\u3000場所は──！』"
translation = "『여보세요 회장님!? 큰일이야, 아스텔라가 동시에 3개나 나타났어! 장소는──!』"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「フン、無粋だな──余が消してやる。ちょちょい、っとな」"
translation = "「흥, 무미건조하군── 여가 없애주마. 슥삭, 하고 말이지」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "『あ、あれ？\u3000いきなり消えちゃった！？\u3000前にもこんなことあったよね……なんでだろ。せっかくの休日にごめんね、出動はなしで！』"
translation = "『어, 어라? 갑자기 사라졌어!? 전에도 이런 적 있었지…… 왜 그럴까. 기껏 휴일인데 미안해, 출동은 없는 걸로!』"

[[dialogue]]
speaker = "unk"
original = "普段の時よりもずっと強いんだな"
translation = "평소보다 훨씬 강하구나"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「うむ。この姿になると魔力が跳ね上がるのだ。ただ強すぎるせいかの、セドナから決して変身するなときつ～く言われておる」"
translation = "「음. 이 모습이 되면 마력이 급증하거든. 다만 너무 강한 탓인지, 세드나로부터 절대 변신하지 말라고 어어엄하게 주의를 듣고 있다」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「ネビュラとのおやくそく第……何条だったかの？\u3000『必要な時以外、ぜったい本気モードになっちゃダメ』というのがあってのう」"
translation = "「네뷸라와의 약속 제…… 몇 조였더라? 『필요할 때 이외에는 절대 진심 모드가 되면 안 됨』이라는 게 있어서 말이다」"

[[dialogue]]
speaker = "unk"
original = "バレたらマジでまずいやつでは！？"
translation = "들키면 진짜 큰일 나는 거 아냐!?"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「うむ！\u3000バレたらマジでまずいやつだ！\u3000どうだ、これが余の秘密だぞ。ふふん、共有できて光栄であろう？」"
translation = "「음! 들키면 진짜 큰일 나는 거다! 어떠냐, 이것이 여의 비밀이다. 후훙, 공유할 수 있어서 영광이지?」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「それよりも魔王、あれだ！\u3000てれびげーむをしようではないか。基地にこもって鬱憤がたまっておるのだ、付き合え！」"
translation = "「그것보다 마왕, 그거다! 비디오 게임을 하지 않겠느냐. 기지에 틀어박혀 있어서 울분이 쌓였단 말이다, 같이 해다오!」"

[[dialogue]]
speaker = "unk"
original = "そうしてフルパワーモードの白衣装をまとったクラウディアを膝に乗せ、レースゲームを楽しんだ。"
translation = "그렇게 풀 파워 모드의 하얀 의상을 입은 클라우디아를 무릎에 앉히고 레이싱 게임을 즐겼다."

[[dialogue]]
speaker = "unk"
original = "とっぷりと日が暮れた頃、ネビュラからお迎えがやってきて……"
translation = "날이 저물 무렵, 네뷸라에서 데리러 왔고……"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「失礼します。クラウディア様、僭越ながらご帰宅の時間で──」"
translation = "「실례합니다. 클라우디아 님, 외람되오나 귀가하실 시간이라──」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「おお、ウェンディ。もうそんな時間か。楽しい時間はあっという間だのう」"
translation = "「오, 웬디. 벌써 그런 시간이냐. 즐거운 시간은 순식간이구나」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「──その恰好～ッ！！？？」"
translation = "「──그 차림은~~!!??」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「クラウディア様！\u3000そのお姿はみだりに見せてはなりませんとあれほど……！\u3000セ、セドナ長官にどう報告をすれば！？」"
translation = "「클라우디아 님! 그 모습은 함부로 보여서는 안 된다고 그렇게나……! 세, 세드나 장관님께 어떻게 보고를 드려야!?」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「何を異なことを。報告書に書かなければよいだろう？\u3000書類の改竄やミスの隠蔽は、お前のお得意ではないか♪」"
translation = "「무슨 이상한 소리를. 보고서에 쓰지 않으면 될 것 아니냐? 서류 조작이나 실수 은폐는 네놈의 특기 아니더냐♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ひどい！\u3000隠蔽しようとしたのはモンスター捕獲作戦の時だけです！\u3000人聞きの悪い言い方はやめてください！！」"
translation = "「너무해요! 은폐하려고 했던 건 몬스터 포획 작전 때뿐이라구요! 남 듣기 안 좋은 말은 하지 말아주세요!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ていうか、そのために私をお迎え係に指名したんですか！？\u3000普段はアイリーンに頼むからおかしいと思ったんですよ！」"
translation = "「그나저나, 그러려고 저를 마중 담당으로 지명하신 건가요!? 평소에는 아이린에게 부탁하니까 이상하다 생각했다구요!」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「ふふん。適材適所というやつだ。優れた指導者は部下の特性を把握せねばならん」"
translation = "「후훙. 적재적소라는 것이지. 뛰어난 지도자는 부하의 특성을 파악해야 하는 법이다」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「嬉しくないです、その評価は全然嬉しくないです……！！」"
translation = "「안 기뻐요, 그 평가는 전혀 안 기쁘다구요……!!」"

[[dialogue]]
speaker_original = "クラウディア（黄昏）"
speaker_translation = "클라우디아(황혼)"
original = "「さて、魔王よ──お別れだな」"
translation = "「자, 마왕이여── 작별이구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふふ、久しぶりに力を解放したからすっきりしたぞ。また来るからの～♪」"
translation = "「후후, 오랜만에 힘을 개방했더니 개운하구나. 또 올 테니까~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……会長さん、お願いがあります」"
translation = "「……회장님, 부탁이 있어요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「セドナ長官には内緒にしてください！！\u3000この通りですから！！」"
translation = "「세드나 장관님께는 비밀로 해주세요!! 이렇게 빌게요!!」"

