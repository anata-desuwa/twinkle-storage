[[dialogue]]
speaker = "unk"
original = "第１８話,仮面の少女？,B"
translation = "제18화, 가면의 소녀?, B"

[[dialogue]]
speaker = "？？？"
original = "「やっほー！\u3000見てたよ、今の戦い！\u3000あの大群を一人で倒しちゃうなんてすごいじゃん！」"
translation = "「야호ー! 봤어, 방금 싸움! 그 대군을 혼자서 쓰러뜨리다니 대단하잖아!」"

[[dialogue]]
speaker = "クロト"
original = "「君は……？\u3000というか危ないぞ、今の今まで危険なモンスター達が……」"
translation = "「너는……? 그보다 위험해, 방금 전까지 위험한 몬스터들이……」"

[[dialogue]]
speaker = "？？？"
original = "「あはは。気にしない気にしない！」"
translation = "「아하하. 신경 쓰지 마, 신경 쓰지 마!」"

[[dialogue]]
speaker = "unk"
original = "あっけらかんと笑う仮面の少女。見覚えはなかった。"
translation = "태평하게 웃는 가면의 소녀. 본 적은 없었다."

[[dialogue]]
speaker = "クロト"
original = "「（というか今この子、どこから……？）」"
translation = "「(그보다 이 아이는 지금, 어디서……?)」"

[[dialogue]]
speaker = "？？？"
original = "「お兄さんかっこいいなあって思っただけ！\u3000もっと強い敵も倒せる？」"
translation = "「오빠 멋지다고 생각했을 뿐! 더 강한 적도 쓰러뜨릴 수 있어?」"

[[dialogue]]
speaker = "クロト"
original = "「どうだろう……でも必要なら、きっと戦うと思う」"
translation = "「글쎄…… 하지만 필요하다면, 분명 싸울 거라고 생각해」"

[[dialogue]]
speaker = "？？？"
original = "「ふーん」"
translation = "「흐음」"

[[dialogue]]
speaker = "unk"
original = "少女は、にやついた笑みを浮かべてこちらを見てくる。"
translation = "소녀는, 히죽거리는 웃음을 띠고 이쪽을 바라본다."

[[dialogue]]
speaker = "unk"
original = "変な子だ。"
translation = "이상한 아이다."

[[dialogue]]
speaker = "クロト"
original = "「お父さんとお母さんは？\u3000いないなら俺が付き添って──」"
translation = "「아빠랑 엄마는? 없다면 내가 데려다줄게──」"

[[dialogue]]
speaker = "？？？"
original = "「あはは、大丈夫大丈夫！\u3000もう帰るから！」"
translation = "「아하하, 괜찮아 괜찮아! 이제 돌아갈 거니까!」"

[[dialogue]]
speaker = "？？？"
original = "「んじゃおにーさんも頑張ってね！\u3000今の力なら、どんな強い相手だってへっちゃらだよ！」"
translation = "「그럼 오빠도 힘내! 지금 힘이라면, 아무리 강한 상대라도 아무렇지도 않을 거야!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……」"
translation = "「아아……」"

[[dialogue]]
speaker = "クロト"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker = "unk"
original = "君の名前は──と、訊ねるまでもなく。少女は、ぴょんぴょんと辺りの屋根を飛び渡って夜闇に消えてしまった。"
translation = "네 이름은── 하고 물어볼 새도 없이. 소녀는, 깡총깡총 주변의 지붕을 뛰어넘어 밤의 어둠 속으로 사라져 버렸다."

[[dialogue]]
speaker = "unk"
original = "なんという身のこなし。"
translation = "이 얼마나 민첩한 몸놀림인가."

[[dialogue]]
speaker = "unk"
original = "一瞬、自分が見ていた夢じゃないかと思ってしまった。"
translation = "순간, 자신이 보고 있던 꿈이 아닌가 하고 생각했다."

[[dialogue]]
speaker = "クロト"
original = "「どんな強い相手でも……か」"
translation = "「아무리 강한 상대라도……인가」"

[[dialogue]]
speaker = "unk"
original = "俺は、少女の言葉に感じ入るものを覚えながら……"
translation = "나는, 소녀의 말에 무언가 느끼는 바를 기억하며……"

[[dialogue]]
speaker = "unk"
original = "明日に備えて、家に帰って体を休めることにした。"
translation = "내일을 대비해, 집에 돌아가 몸을 쉬게 하기로 했다."

[[dialogue]]
speaker = "アナ"
original = "「これはまた、凄いですね……」"
translation = "「이건 또, 대단하네요……」"

[[dialogue]]
speaker = "unk"
original = "近隣住民の通報を受けて寮からアナとサーシャが現場に急行すると、そこではすべてが終わっていた。"
translation = "인근 주민의 신고를 받고 기숙사에서 아나와 사샤가 현장으로 급행했을 때, 그곳에서는 모든 것이 끝나 있었다."

[[dialogue]]
speaker = "サーシャ"
original = "「あら～、これ全部、クロトくんがやったの？」"
translation = "「어머~, 이거 전부, 쿠로토 군이 한 거야?」"

[[dialogue]]
speaker = "アナ"
original = "「状況から推察するに、恐らく」"
translation = "「상황으로 미루어 짐작하건대, 아마도」"

[[dialogue]]
speaker = "サーシャ"
original = "「戦いの痕跡から考えると、３０体近くいたんじゃないかしら」"
translation = "「싸움의 흔적으로 생각하면, 30마리 가까이 있었던 거 아닐까」"

[[dialogue]]
speaker = "サーシャ"
original = "「アナちゃんはこれ、一人でできる？」"
translation = "「아나짱은 이거, 혼자서 할 수 있어?」"

[[dialogue]]
speaker = "アナ"
original = "「まず不可能かと」"
translation = "「우선 불가능할 것 같습니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよねぇ～。私も無理だと思うわ」"
translation = "「그렇겠지~. 나도 무리라고 생각해」"

[[dialogue]]
speaker = "アナ"
original = "「これが、現会長の言う、魔王の力……」"
translation = "「이것이, 현 회장이 말하는, 마왕의 힘……」"

[[dialogue]]
speaker = "サーシャ"
original = "「本音を言えば、今すぐクロトくんから話を聞きたいところだけれど……」"
translation = "「솔직히 말하면, 당장 쿠로토 군에게 이야기를 듣고 싶은 참이지만……」"

[[dialogue]]
speaker = "アナ"
original = "「明日は御前試合本番」"
translation = "「내일은 어전 시합 본선」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうなのよねぇ～」"
translation = "「그렇지이~」"

[[dialogue]]
speaker = "アナ"
original = "「……次期会長は無事」"
translation = "「……차기 회장은 무사」"

[[dialogue]]
speaker = "unk"
original = "アナの元へ先日連絡先を交換したリノから、クロトが無事帰宅したという連絡が届いていた。"
translation = "아나에게 며칠 전 연락처를 교환한 리노로부터, 쿠로토가 무사히 귀가했다는 연락이 도착해 있었다."

[[dialogue]]
speaker = "サーシャ"
original = "「そっかそっか～。お疲れみたいだったし、やっぱり今日は休んでほしいわよねぇ」"
translation = "「그렇구나 그렇구나~. 피곤해 보였고, 역시 오늘은 쉬게 해줘야겠지이」"

[[dialogue]]
speaker = "アナ"
original = "「詳しいことは、明日全部わかる」"
translation = "「자세한 것은, 내일 전부 알게 될 겁니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～。ヴィーナスちゃんも説明不足なところあるし、明日が終わったら私たちも色々聞かせてもらおうかしら」"
translation = "「그렇지~. 비너스짱도 설명이 부족한 부분이 있으니, 내일이 끝나면 우리도 여러 가지 물어보자」"

[[dialogue]]
speaker = "アナ"
original = "「そうしましょう」"
translation = "「그렇게 합시다」"

[[dialogue]]
speaker = "unk"
original = "アナはこくりとうなずきつつ、現場を学園職員に引き渡すため、各所に連絡を飛ばし始めるのだった。"
translation = "아나는 고개를 끄덕이며, 현장을 학원 직원에게 인계하기 위해, 각처에 연락을 보내기 시작하는 것이었다."

