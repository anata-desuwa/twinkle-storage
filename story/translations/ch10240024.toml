[[dialogue]]
speaker = "unk"
original = "第４話,真面目な匂いフェチ,P"
translation = "제4화, 성실한 냄새 페티시, P"

[[dialogue]]
speaker = "unk"
original = "このところ星徒会の仕事が忙しくて、ヨミと恋人同士の時間を取れていない日々が続いていた――"
translation = "요즘 성도회 업무가 바빠서 요미와 연인끼리의 시간을 갖지 못하는 나날이 이어지고 있었다──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はぁ……今日でもう１週間……」"
translation = "「하아…… 오늘로 벌써 일주일……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（同じ学園に通っているのに、まさかこんなにも会えないだなんて……。今は、会長と毎日会っているお嬢様たちを、羨ましく感じてしまいます……）"
translation = "(같은 학원에 다니는데 설마 이렇게까지 못 만날 줄이야……. 지금은 회장님과 매일 만나는 아가씨들이 부럽게 느껴져요……)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（いっそのこと、お嬢様に頼んで、会長専属のメイドということで配置換えを頼んでみるのもいいのかも……。そうすればいつも会長のそばにいれますし……）"
translation = "(차라리 아가씨께 부탁해서 회장님 전속 메이드로 배치 전환을 부탁해 보는 것도 좋을지도 몰라……. 그러면 항상 회장님 곁에 있을 수 있고……)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（って、なに考えてるんだろう、私……！\u3000せっかく任務管轄係の仕事を任せてもらっているのに、それを投げ出すのは無責任ですよね。変な考えは止めないと……でも――）"
translation = "(랄까, 무슨 생각을 하는 거야 나……! 어렵게 임무 관할계 일을 맡겨주셨는데 그걸 내팽개치는 건 무책임하죠. 이상한 생각은 그만둬야지…… 하지만──)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（わかっているんですけど、会長の<b>匂い成分</b>が爆裂足りない……！）"
translation = "(알고는 있는데 회장님의 <b>냄새</b> <b>성분</b>이 폭렬 부족해……!)"

[[dialogue]]
speaker = "unk"
original = "ヨミ！\u3000１週間ぶりにやっと会えた"
translation = "요미! 일주일 만에 드디어 만났네."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000会長！？」"
translation = "「코얏!? 회장님!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もしかして、忙しかった仕事がひと段落したんですか！？（尻尾ぶんぶん）」"
translation = "「혹시 바빴던 일이 일단락된 건가요!? (꼬리 붕붕)」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――仕事で移動中に、偶然通りかかっただけ？\u3000そ、そうでしたか……（尻尾しなしな）」"
translation = "「──업무 이동 중에 우연히 지나가던 길이라고요? 그, 그랬군요…… (꼬리 축)」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（あぁ～、１週間ぶりの会長の匂い……！\u3000くんくん……体と心に染み渡ります……<emoji=heart04>\u3000やっぱり好き……<emoji=heart04>\u3000ウットリしちゃいます……<emoji=heart04>）"
translation = "(아아~ 일주일 만의 회장님 냄새……! 킁킁…… 몸과 마음에 스며들어요……<emoji=heart04> 역시 좋아……<emoji=heart04> 황홀해져버려요……<emoji=heart04>)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（今すぐ抱き着いて、いっぱいくんくんしたい……！\u3000うぅ～、でも、忙しい会長の邪魔をするわけには……！）"
translation = "(당장 안겨서 잔뜩 킁킁대고 싶어……! 으으~ 하지만 바쁜 회장님을 방해할 수는……!)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――えっ？\u3000あっ、なんでもないですよ！？\u3000ひ、久しぶりに会長と会えたので、なにを話そうか迷ってしまって……あは、あははっ！」"
translation = "「──엣? 앗, 아무것도 아니에요!? 오, 오랜만에 회장님을 봬서 무슨 말을 할지 망설여져서…… 아하, 아하하!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、そうですか。もうそろそろ戻らないといけないんですね……。星徒会のお仕事、頑張って下さいっ。私も任務管轄係の仕事を頑張りますので！」"
translation = "「그, 그렇군요. 이제 곧 돌아가셔야 하는군요. 성도회 업무 힘내세요. 저도 임무 관할계 업무 열심히 할 테니까요!」"

[[dialogue]]
speaker = "unk"
original = "その日の夜、ヨミは任務管轄係の書類を星徒会に届けにきたのだが――"
translation = "그날 밤, 요미는 임무 관할계 서류를 성도회에 전달하러 왔는데──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――こういう仕事で会えるタイミングに限って、会長は不在なんですね……。はぁ……」"
translation = "「──이런 업무로 만날 수 있는 타이밍에만 회장님이 안 계시네요……. 하아……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（こうなって初めて、自分がどれだけ会長のことを好きになってるのか、実感します……）"
translation = "(이렇게 되고 나서야 제가 얼마나 회장님을 좋아하게 됐는지 실감 나요……)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（ん？\u3000あ……会長の匂いがすると思ったら、会長席の椅子に制服の上着が……。今日はちょっと、暑い日だったから……）"
translation = "(응? 아…… 회장님 냄새가 난다 했더니 회장석 의자에 제복 상의가……. 오늘은 좀 더운 날이었으니까……)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "（…………恋人なんだし、これくらいは、いいですよね？）"
translation = "(…………연인이니까 이 정도는 괜찮겠죠?)"

[[dialogue]]
speaker = "unk"
original = "ヨミは俺の制服を手に取ると、顔を埋めるようにして――"
translation = "요미는 내 제복을 집어 들더니 얼굴을 파묻듯이──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「くんくん……<emoji=heart04>\u3000――はあぁ……<emoji=heart04>」"
translation = "「킁킁……<emoji=heart04> ──하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "えっと……ヨミヨミ？"
translation = "저기…… 요미요미?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えっ……こ、こやあぁぁぁーーーっ！！？」"
translation = "「엣…… 코, 코야아아아──!!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「か、会長！？\u3000戻ってきてたんですか！？\u3000いつの間に！？」"
translation = "「회, 회장님!? 돌아오셨던 건가요!? 언제 사이에!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――制服を手に取ったところから？\u3000爆裂最悪なタイミングーーーっ！！」"
translation = "「──제복을 집어 든 순간부터요? 폭렬 최악의 타이밍──!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「恥ずかしくて、今すぐ穴を掘って埋まりたい……」"
translation = "「부끄러워서 당장 구멍이라도 파고 들어가고 싶어……」"

[[dialogue]]
speaker = "unk"
original = "匂いフェチなのは今更だから、大丈夫だよ"
translation = "냄새 페티시인 건 이제 와서니까 괜찮아."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやっ！？\u3000か、会長……！\u3000いきなり抱き締めちゃ……<emoji=heart04>\u3000だ、ダメです！\u3000仕事が忙しいのに、邪魔するわけには……！」"
translation = "「코얏!? 회, 회장님……! 갑자기 안으시면……<emoji=heart04> 아, 안 돼요! 업무가 바쁘신데 방해할 수는……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――仕事が全部終わったから、私を探しに行ってた？\u3000と、ということは、今日はもうゆっくりできるってこと、ですか？」"
translation = "「──업무가 다 끝나서 나를 찾으러 왔었다고요? 그, 그렇다는 건 오늘은 이제 푹 쉴 수 있다는 건가요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「か、会長とゆっくり……<emoji=heart04>\u3000恋人のスキンシップ……！\u3000好きなだけ……！\u3000か――」"
translation = "「회, 회장님과 오붓하게……<emoji=heart04> 연인의 스킨십……! 마음껏……! 회──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長っ！\u3000こやあぁっ<emoji=heart04><emoji=heart04>」"
translation = "「회장님! 코야앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、ヨミ！？\u3000うおぉっ！？"
translation = "잠깐, 요미!? 우와앗!?"

[[dialogue]]
speaker = "unk"
original = "なんと、ヨミは俺をいきなり床に押し倒すと、匂いを嗅ぐだけでなく、首筋やら顔やらを舐め始めた！"
translation = "무려 요미는 나를 갑자기 바닥에 밀어트리더니 냄새를 맡는 것뿐만 아니라 목덜미며 얼굴이며 핥기 시작했다!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「くんくん<emoji=heart04>\u3000ぺろぺろ<emoji=heart04>\u3000会長っ<emoji=heart04>\u3000会長ぉっ<emoji=heart04>\u3000ふーっ<emoji=heart04>\u3000ふーっ……！」"
translation = "「킁킁<emoji=heart04> 낼름낼름<emoji=heart04> 회장님<emoji=heart04> 회장님아앗<emoji=heart04> 후우<emoji=heart04> 후우……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「好きっ<emoji=heart04>\u3000はぁっ……はぁっ……くんくん<emoji=heart04>\u3000ぺろぺろ<emoji=heart04>\u3000会長の匂い、ずっとくんくん恋しかったんですぅ……<emoji=heart04>\u3000ふうぅ……すうぅ……はあぁっ……<emoji=heart04><emoji=heart04>」"
translation = "「좋아<emoji=heart04> 하앗…… 하앗…… 킁킁<emoji=heart04> 낼름낼름<emoji=heart04> 회장님 냄새, 계속 킁킁 그리웠어요……<emoji=heart04> 후우…… 스으…… 하아앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しばらくして、興奮が落ち着いてきたらしいヨミは、はっと我に返った顔をして――"
translation = "잠시 후 흥분이 가라앉은 듯한 요미는 퍼뜩 정신이 든 얼굴로──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えっ……こ、こやあぁぁぁーーーっ！？\u3000なんか会長の服が乱れて、すごくエッチな有様にぃーーー！？」"
translation = "「엣…… 코, 코야아아아──!? 왠지 회장님 옷이 흐트러져서 굉장히 야한 꼴이──!?」"

[[dialogue]]
speaker = "unk"
original = "やったのヨミヨミだからね！？"
translation = "그거 요미요미가 한 거거든!?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうでした！\u3000ご、ごめんなさいぃ……！」"
translation = "「그랬죠! 죄, 죄송해요……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うぅ……欲望に勝てず、種族の本能が出てしまいました……！」"
translation = "「으으…… 욕망을 이기지 못하고 종족의 본능이 나와버렸어요……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――実はずっと、会長の匂いが嗅げてなくて、その……欲求不満でムラムラしてしまっていて……」"
translation = "「──사실 계속 회장님 냄새를 못 맡아서 그…… 욕구불만으로 몸이 달아올라 있어서……」"

[[dialogue]]
speaker = "unk"
original = "それから、ヨミはこの１週間、悩んでいたことを打ち明けてくれた。"
translation = "그러고 나서 요미는 지난 일주일 동안 고민했던 것을 털어놓았다."

[[dialogue]]
speaker = "unk"
original = "――真面目なのは、ヨミの良いところだ。そして、同時に悪いところでもある。だから、これからは我慢せずに相談して欲しい。俺は彼女に、そう伝えた。"
translation = "──성실한 건 요미의 장점이야. 그리고 동시에 단점이기도 하고. 그러니까 앞으로는 참지 말고 상담해 줘. 나는 그녀에게 그렇게 전했다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――その代わり、会長もスキンシップしたい時はちゃんと伝えるから、ですか？」"
translation = "「──그 대신 회장님도 스킨십하고 싶을 때는 제대로 말할 테니까, 인가요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「は、はい……<emoji=heart04>\u3000わかりました……<emoji=heart04>」"
translation = "「네……<emoji=heart04> 알겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「じゃあ、その……会長にお願いしてもいいですか……？\u3000私――」"
translation = "「그럼 그…… 회장님께 부탁드려도 될까요……? 저──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「今日はまだ、会長とスキンシップしたいです……<emoji=heart04>」"
translation = "「오늘은 아직 회장님과 스킨십하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "うん。俺もだ"
translation = "응. 나도야."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ん……<emoji=heart04>\u3000えへへ……<emoji=heart04>\u3000１週間ぶりの会長、温かくて、いい匂いがして……落ち着きます<emoji=heart04>\u3000くんくん<emoji=heart04>\u3000すりすり……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 에헤헤……<emoji=heart04> 일주일 만의 회장님, 따뜻하고 좋은 냄새가 나서…… 안심돼요<emoji=heart04> 킁킁<emoji=heart04> 부비부비……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その日は彼女が満足するまで、目一杯甘えさせてあげるのだった――"
translation = "그날은 그녀가 만족할 때까지 마음껏 응석을 받아주는 것이었다──"

