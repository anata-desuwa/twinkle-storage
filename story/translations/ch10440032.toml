[[dialogue]]
speaker = "unk"
original = "第２話,反転・暴走・ベイビー,P"
translation = "제2화, 반전·폭주·베이비, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺たちは仮想結界システムを使い、運動場を模した空間で戦闘訓練を行っていた。"
translation = "그날, 우리들은 가상 결계 시스템을 사용하여, 운동장을 본뜬 공간에서 전투 훈련을 하고 있었다."

[[dialogue]]
speaker = "プリムラ"
original = "「どうじゃ、アルモタヘル、マグダレナ！\u3000これが我の新しい力じゃ！」"
translation = "「어떠냐, 아르모타헬, 막달레나! 이것이 나의 새로운 힘이니라!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「すごいのだ！\u3000守護天使のアルモたん達に合わせて霊力へ変換、最適化してエネルギー供給がされているのだ！」"
translation = "「대단한 거다! 수호천사인 아르모땅들에게 맞춰 영력으로 변환, 최적화해서 에너지 공급이 되고 있는 거다!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「相手を選ばずエネルギー供給ができるなんて、他の方にはない能力ですね～♪」"
translation = "「상대를 가리지 않고 에너지 공급을 할 수 있다니, 다른 분들에게는 없는 능력이네요~♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「そうじゃろう、そうじゃろう！\u3000フハハハ♪」"
translation = "「그렇지, 그렇지! 후하하하♪」"

[[dialogue]]
speaker = "unk"
original = "本来は俺とプリムラだけで訓練する予定だったのだが、そこへたまたま守護天使の２人がやってきて、そのまま一緒に訓練する流れになっていた。"
translation = "본래는 나와 프리뮬라 둘이서만 훈련할 예정이었으나, 마침 수호천사 두 사람이 찾아와서, 그대로 함께 훈련하게 되었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「強いのはもちろんですが、その戦闘服……とても可愛くてお似合いですよ～♪」"
translation = "「강한 것은 물론이지만, 그 전투복…… 너무 귀엽고 잘 어울려요~♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「はぁ！？\u3000可愛いじゃと？」"
translation = "「하아!? 귀엽다니?」"

[[dialogue]]
speaker = "プリムラ"
original = "「我は悪の終末兵器なのじゃぞ！\u3000可愛いなどと、そんな言葉で喜ぶとでも思っているのか？\u3000――フヘへへぇ<emoji=heart04>」"
translation = "「나는 악의 종말병기이니라! 귀엽다니, 그런 말로 기뻐할 줄 알고 있느냐? ――후헤헤헤에<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「めちゃくちゃ嬉しそうなのだ！」"
translation = "「엄청 기뻐 보이는 거다!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「プリムラは、一人称が『我』で、衣装も白。なんだかアルモたんと似ているな♪」"
translation = "「프리뮬라는, 1인칭이 『나(我)』이고, 의상도 하양. 왠지 아르모땅이랑 닮았구나♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふん、まあ、我ほどではないが、貴様の白い水着も悪くないのではないか？」"
translation = "「흥, 뭐, 나만큼은 아니지만, 네놈의 하얀 수영복도 나쁘지 않지 않느냐?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「ありがとうなのだ♪\u3000同じ附属生として、これからも仲良くしてくれると嬉しいぞ♪」"
translation = "「고마운 거다♪ 같은 부속생으로서, 앞으로도 사이좋게 지내주면 기쁜 거다♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私のこともよろしくお願いしますね～♪\u3000前から１度、プリムラさんとはゆっくりお話してみたかったんです♪」"
translation = "「저도 잘 부탁드릴게요~♪ 전부터 한 번, 프리뮬라 씨와는 느긋하게 이야기해 보고 싶었거든요♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「よかろう。いずれ世界を統べる我としては、守護天使と絆を結んでおいて損はないのじゃ♪」"
translation = "「좋다. 언젠가 세계를 다스릴 나로서는, 수호천사와 유대를 맺어두어서 손해 볼 것은 없느니라♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「さあ、訓練を続けるぞ！\u3000我の力、もっと思い知るがよい！」"
translation = "「자, 훈련을 계속하마! 나의 힘, 좀 더 뼈저리게 느끼거라!」"

[[dialogue]]
speaker = "unk"
original = "プリムラ、あまり張り切り過ぎない方が……"
translation = "프리뮬라, 너무 무리하지 않는 게……"

[[dialogue]]
speaker = "プリムラ"
original = "「問題ない！\u3000さあ、眷族よ。我の力でパワーアップした守護天使たちを相手に戦うのじゃ！」"
translation = "「문제없다! 자, 권속이여. 나의 힘으로 파워업한 수호천사들을 상대로 싸우거라!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「似た者コンビネーションなのだ♪」"
translation = "「닮은꼴 콤비네이션인 거다♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私も混ざっちゃいますよ～♪」"
translation = "「저도 섞일게요~♪」"

[[dialogue]]
speaker = "unk"
original = "数分後。"
translation = "몇 분 후."

[[dialogue]]
speaker = "unk"
original = "プリムラがリバースフォームの能力を全開で発動していると、異変が起こる。"
translation = "프리뮬라가 리버스 폼의 능력을 전개하여 발동하고 있자, 이변이 일어난다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あれ？\u3000プリムラ、なんか体が光ってるぞ？」"
translation = "「어라? 프리뮬라, 왠지 몸이 빛나고 있는 거다?」"

[[dialogue]]
speaker = "プリムラ"
original = "「なっ……！？\u3000しまった……！\u3000これは――」"
translation = "「나앗……!? 이런……! 이것은――」"

[[dialogue]]
speaker = "プリムラ"
original = "「反転した力の『暴走』なのじゃ！\u3000ぬわあああぁ～～～っ！？」"
translation = "「반전된 힘의 『폭주』이니라! 느와아아아아아~~~~앗!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ぷ、プリムラさん、大丈夫ですか？」"
translation = "「프, 프리뮬라 씨, 괜찮으세요?」"

[[dialogue]]
speaker = "プリムラ"
original = "「……ばぶぅ～♪」"
translation = "「……바부~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "unk"
original = "心配そうに近づいたマグダレナを見た瞬間――"
translation = "걱정스럽게 다가온 막달레나를 본 순간――"

[[dialogue]]
speaker = "プリムラ"
original = "「ママぁ～～っ♪\u3000はああぁっ、ああぅ～♪」"
translation = "「엄마아~~앗♪ 하아아앗, 아아웃~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えぇぇぇっ！？\u3000わ、私がママですかぁ～～っ！？」"
translation = "「에에에엣!? 저, 제가 엄마인가요오~~앗!?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「プリムラが赤ちゃんみたいになっちゃったのだ！？」"
translation = "「프리뮬라가 아기처럼 되어버린 거다!?」"

[[dialogue]]
speaker = "unk"
original = "実は、リバースフォームのデメリットで……"
translation = "실은, 리버스 폼의 패널티로……"

[[dialogue]]
speaker = "unk"
original = "反転の力は制御が難しく、精神面まで反転してしまうことがある。"
translation = "반전의 힘은 제어가 어려워, 정신면까지 반전되어 버리는 경우가 있다."

[[dialogue]]
speaker = "unk"
original = "『甘えたがりなのに甘えられない』プリムラの本質が裏返り――結果、『赤ちゃんモード』になってしまったのだ。"
translation = "『어리광 부리고 싶지만 부리지 못하는』 프리뮬라의 본질이 뒤집혀―― 결과적으로, 『아기 모드』가 되어버린 것이다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「なるほど！\u3000プリムラは暴走すると、赤ちゃんみたいに甘えたい気持ちが全開になってしまうのだな！」"
translation = "「과연! 프리뮬라는 폭주하면, 아기처럼 어리광 부리고 싶은 마음이 전개되어 버리는 거구나!」"

[[dialogue]]
speaker = "プリムラ"
original = "「あぁ～い<emoji=heart04>\u3000ママぁ～<emoji=heart04>」"
translation = "「아앙~이<emoji=heart04> 엄마아~<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「はああぁっ！？<emoji=heart04><emoji=heart04>\u3000私をママと呼んでくれるなんて、嬉しいですぅ～！\u3000は～い、ママダレナですよぉ～っ<emoji=heart04>」"
translation = "「하아아앗!?<emoji=heart04><emoji=heart04> 저를 엄마라고 불러주다니, 기뻐요오~! 네~, 마마다레나예요오~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘えてくるプリムラを抱き締めて、頭を撫でるマグダレナ。"
translation = "어리광 부려오는 프리뮬라를 껴안으며, 머리를 쓰다듬는 막달레나."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ぎゅ～っ♪\u3000よしよし～<emoji=heart04>」"
translation = "「꼬옥~♪ 착하지 착해~<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふわあぁ～い<emoji=heart04>\u3000きゃっきゃ♪」"
translation = "「후아아~이<emoji=heart04> 꺄꺄♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「プリムラ、本当の赤ちゃんみたいで可愛いのだ♪\u3000アルモたんも遊んであげるぞ！」"
translation = "「프리뮬라, 진짜 아기 같아서 귀여운 거다♪ 아르모땅도 놀아줄 거다!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、アルモもプリムラの頭を撫でる――すると。"
translation = "그렇게 말하며, 아르모도 프리뮬라의 머리를 쓰다듬자―― 그러자."

[[dialogue]]
speaker = "プリムラ"
original = "「あっ！\u3000ママ<emoji=heart04>\u3000アルモママ～っ<emoji=heart04>」"
translation = "「앗! 엄마<emoji=heart04> 아르모 엄마~앗<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「えっ！？\u3000ちょっ……！？」"
translation = "「엣!? 잠깐……!?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「おおっ、アルモたんもママ認定してくれるのか？\u3000よしよし～♪」"
translation = "「오오앗, 아르모땅도 엄마로 인정해 주는 거냐? 착하지 착해~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「待ってください！\u3000プリムラさん、もっとママダレナに甘えてくださ～い！」"
translation = "「기다려 주세요! 프리뮬라 씨, 좀 더 마마다레나에게 어리광 부려주세요~!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ん～？\u3000……ぷいむら、アルモママのほうがしゅき<emoji=heart04>」"
translation = "「응~? ……푸이무라, 아르모 엄마가 더 죠아<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あ、アルモにママ<ruby>力<rt>りょく</rt></ruby>で負けたぁぁぁっ！？」"
translation = "「아, 아르모에게 엄마력에서 졌다아아아앗!?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そんなああぁぁぁっ！\u3000うわああああああ～～んっ！！」"
translation = "「그럴 수가아아아아앗! 으와아아아아아아아아~~앙!!」"

[[dialogue]]
speaker = "unk"
original = "その後、しばらくして暴走が収まり、プリムラは正気に戻るが……。"
translation = "그 후, 잠시 뒤에 폭주가 가라앉고, 프리뮬라는 제정신으로 돌아왔지만……."

[[dialogue]]
speaker = "プリムラ"
original = "「ハ……ハハ……暴走して赤ちゃん化しているところを見られたのじゃ……最悪じゃ……」"
translation = "「하…… 하하…… 폭주해서 아기화되어 있는 모습을 들켜버렸느니라…… 최악이니라……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「アルモにママとして負けるなんて……ショックです……」"
translation = "「아르모에게 엄마로서 지다니…… 쇼크예요……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「２人共、精神ダメージが深刻なのだ」"
translation = "「둘 다 정신적 데미지가 심각한 거다」"

[[dialogue]]
speaker = "unk"
original = "プリムラ、大丈夫だ。可愛かったぞ"
translation = "프리뮬라, 괜찮아. 귀여웠어"

[[dialogue]]
speaker = "プリムラ"
original = "「はぁっ！？\u3000バカモノ！\u3000慰めにもならんわ！\u3000――フヘへへ<emoji=heart04>」"
translation = "「하아앗!? 바보 녀석! 위로도 안 되느니라! ――후헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「即回復したのだ！？\u3000めちゃくちゃチョロいメンタルなのだ！」"
translation = "「즉시 회복한 거다!? 엄청나게 쉬운 멘탈인 거다!」"

[[dialogue]]
speaker = "unk"
original = "俺はプリムラの恋人だからな"
translation = "나는 프리뮬라의 연인이니까 말이야"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「うぅ～、私も誰か慰めてくださ～い」"
translation = "「으으~, 저도 누가 위로해 주세요~」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「お～、よしよし。いつものことだから気にするななのだ～」"
translation = "「오~, 착하지 착해. 평소 있는 일이니까 신경 쓰지 마라 인 거다~」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「いつものこと！？\u3000酷いです！\u3000うわああぁ～ん！」"
translation = "「평소 있는 일!? 너무해요! 으와아아~앙!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あ～あ～、泣くななのだ！\u3000こういう時はお肉なのだ！\u3000美味しいお肉を食べれば元気が出るぞ♪」"
translation = "「아~아~, 울지 마라 인 거다! 이럴 때는 고기인 거다! 맛있는 고기를 먹으면 기운이 날 거다♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「……我も気晴らししたい気分じゃ。ハンバーグでも食べに行くか？」"
translation = "「……나도 기분 전환하고 싶은 기분이니라. 함바그라도 먹으러 갈까?」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「えっ、プリムラ、ハンバーグが好きなのか？」"
translation = "「엣, 프리뮬라, 함바그를 좋아하는 거냐?」"

[[dialogue]]
speaker = "プリムラ"
original = "「うむ。よく行く美味い店があってな。名前は――」"
translation = "「음. 자주 가는 맛있는 가게가 있어서 말이다. 이름은――」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あっ！\u3000そこ、アルモたんもよく行くお店なのだ～♪」"
translation = "「앗! 거기, 아르모땅도 자주 가는 가게인 거다~♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「本当か！？\u3000貴様、気が合うではないか！\u3000よし、ならば気晴らしに、一緒に食べに行くのじゃ！」"
translation = "「정말이냐!? 네놈, 마음이 잘 맞지 않느냐! 좋아, 그렇다면 기분 전환 겸, 같이 먹으러 가자꾸나!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「お肉で元気を補給するのだ♪\u3000善は急げなのだ～！」"
translation = "「고기로 기운을 보급하는 거다♪ 쇠뿔도 단김에 빼는 거다~!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「って、私だけ仲間ハズレにして盛り上がらないでくださいよ～！\u3000うわ～ん！」"
translation = "「저기, 저만 따돌리고 분위기 타지 말아 주세요~! 으와앙!」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たちはみんなでハンバーグを食べに行き、プリムラは守護天使の２人と、すっかり打ち解けるのだった。"
translation = "그 후, 우리들은 다 함께 함바그를 먹으러 갔고, 프리뮬라는 수호천사 두 사람과 완전히 허물없게 되었다."

