[[dialogue]]
speaker = "unk"
original = "第１話,マムには逆らえない,P"
translation = "제1화, 마무에게는 거스를 수 없어"

[[dialogue]]
speaker = "unk"
original = "ハロウィン騒動があった翌日。"
translation = "할로윈 소동이 있은 다음 날."

[[dialogue]]
speaker = "unk"
original = "正式に新星学園の生徒になったジャクリーヌを、新星寮『ラルーナ』の寮長を務めるマハムートに紹介しに行くことにした。"
translation = "정식으로 신성학원 학생이 된 자클린을 신성 기숙사 『라루나』의 사감을 맡고 있는 마하무트에게 소개하러 가기로 했다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「？？？\u3000余はどうしてここに連れてこられたゆ？」"
translation = "「??? 짐은 왜 여기에 끌려온 거냐유?」"

[[dialogue]]
speaker = "unk"
original = "住むところが必要になるんだ"
translation = "살 곳이 필요하니까."

[[dialogue]]
speaker = "unk"
original = "人間界で生活するには、"
translation = "인간계에서 생활하려면,"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「でも今は、ヒトリにお世話になってるから大丈夫だゆ？」"
translation = "「하지만 지금은 히토리 신세를 지고 있으니까 괜찮다유?」"

[[dialogue]]
speaker = "unk"
original = "ヒトリのお家が大変でしょ？"
translation = "히토리 집도 힘들 거 아냐?"

[[dialogue]]
speaker = "unk"
original = "ずっとそのままだと"
translation = "계속 그 상태면,"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「それもそうなの……じゃあこれから、どうするゆ？」"
translation = "「그것도 그렇긴 하네…… 그럼 이제부터 어떻게 하냐유?」"

[[dialogue]]
speaker = "unk"
original = "そこで生活してもらう予定だよ"
translation = "거기서 생활하게 할 예정이야."

[[dialogue]]
speaker = "unk"
original = "この学園には寮があるから、"
translation = "이 학원에는 기숙사가 있으니까,"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「なるほどなの。それでこの人は誰なの？」"
translation = "「그렇구나유. 그래서 이 사람은 누구냐유?」"

[[dialogue]]
speaker = "unk"
original = "ちゃんと挨拶してね"
translation = "제대로 인사해."

[[dialogue]]
speaker = "unk"
original = "マムはその新星寮のボス。"
translation = "마무는 그 신성 기숙사의 보스야."

[[dialogue]]
speaker = "unk"
original = "挨拶する前に耳元で「マムは厳しくて怖い人だから、粗相をしないように」と言伝する。"
translation = "인사하기 전에 귓속말로 「마무는 엄격하고 무서운 사람이니까, 실수하지 않도록 해」라고 일러둔다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余はジャクリーヌ・オー・ランタン。『ジャック・オー・ランタン』の娘なの！\u3000好きなものはお菓子とオシャレだゆ！」"
translation = "「짐은 자클린 오 랜턴. 『잭 오 랜턴』의 딸이라유! 좋아하는 건 과자와 꾸미기다유!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「人間界のことはよくわからないけど、会長の力にはなりたいと思ってるゆ！」"
translation = "「인간계 일은 잘 모르지만, 회장에게 힘이 되고 싶다고 생각하고 있다유!」"

[[dialogue]]
speaker = "マハムート"
original = "「殊勝な心掛けね。……私は新星学園３年生、妃竜院マハムート。これからは『マム』と呼ぶように」"
translation = "「가상한 마음가짐이네. ……나는 신성학원 3학년, 히류인 마하무트. 앞으로는 『마무』라고 부르도록」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「よろしくなの！」"
translation = "「잘 부탁한다유!」"

[[dialogue]]
speaker = "マハムート"
original = "「ハロウィンの事件の顛末は、そこにいる星徒会長から聞いてるわ」"
translation = "「할로윈 사건의 전말은 거기 있는 성도회장에게 들었어」"

[[dialogue]]
speaker = "マハムート"
original = "「だいぶ派手にやらかしたようだけど、強い子が新星寮に加わるなら大歓迎よ」"
translation = "「꽤 화려하게 사고를 친 모양이지만, 강한 아이가 신성 기숙사에 합류한다면 대환영이야」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「トリックオアトリート♪\u3000そのお菓子よこすゆ♪」"
translation = "「트릭 오어 트릿♪ 그 과자 내놓으라유♪」"

[[dialogue]]
speaker = "マハムート"
original = "「おっと……この私にイタズラを仕掛けようなんて、いい度胸ね？」"
translation = "「호오…… 이 나에게 장난을 걸려고 하다니, 배짱이 좋네?」"

[[dialogue]]
speaker = "マハムート"
original = "「しかも、私の大好物であるわたあめを盗もうとは……」"
translation = "「게다가 내가 제일 좋아하는 솜사탕을 훔치려 들다니……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「は、放せなの～～……っ！」"
translation = "「노, 놓으라유～～……윽!」"

[[dialogue]]
speaker = "マハムート"
original = "「最近はこういう骨のある子も減ってきていたから……ふふふっ、これからが楽しみだわ」"
translation = "「요즘은 이런 줏대 있는 애들도 줄어들고 있었는데…… 후후후, 앞으론 즐거울 것 같네」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ゆ、ゆゆゆっ！？\u3000この人怖いの……二度とイタズラはしないゆ……！」"
translation = "「유, 유유유!? 이 사람 무섭다유…… 다시는 장난 안 치겠다유……!」"

[[dialogue]]
speaker = "マハムート"
original = "「これからは、私に逆らわないと誓えるかしら？」"
translation = "「앞으로는 나에게 거스르지 않겠다고 맹세할 수 있겠니?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「は、はい……なの！」"
translation = "「네, 네…… 유!」"

[[dialogue]]
speaker = "マハムート"
original = "「違うでしょう？\u3000私に対する返事は、『イエス・マム』よ！」"
translation = "「틀렸잖아? 나에 대한 대답은 『예스, 마무』야!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「イエス・マムなの！」"
translation = "「예스, 마무다유!」"

[[dialogue]]
speaker = "マハムート"
original = "「よろしい。……あ、会長。ちょっといいかしら？」"
translation = "「좋아. ……아, 회장. 잠깐 시간 좀 될까?」"

[[dialogue]]
speaker = "unk"
original = "は、はい。なんでしょうか……"
translation = "네, 네. 무슨 일이신가요……"

[[dialogue]]
speaker = "unk"
original = "あれだけ注意してもイタズラ三昧のジャクリーヌが、気を付けの姿勢で制止している。どうやらマムを格上と認識したらしい。"
translation = "그렇게 주의를 줘도 장난만 치던 자클린이 차렷 자세로 정지해 있다. 아무래도 마무를 윗길로 인식한 모양이다."

[[dialogue]]
speaker = "マハムート"
original = "「連れてくる後輩の躾がなってないんじゃないかしら？」"
translation = "「데려온 후배의 교육이 덜 된 거 아니니?」"

[[dialogue]]
speaker = "マハムート"
original = "「私はね、会長。舐められるのが大嫌いなのよ。知らなかったかしら？」"
translation = "「나는 말이야, 회장. 얕보이는 걸 정말 싫어하거든. 몰랐니?」"

[[dialogue]]
speaker = "unk"
original = "いえ、存じております……"
translation = "아니요, 알고 있습니다……"

[[dialogue]]
speaker = "マハムート"
original = "「ふふっ。面白いことを言うわね？\u3000私が舐められるのが嫌いだと知っていて、躾のなっていない後輩をそのまま連れてくる……」"
translation = "「후훗. 재미있는 말을 하네? 내가 얕보이는 걸 싫어한다는 걸 알면서, 교육이 안 된 후배를 그대로 데려오다니……」"

[[dialogue]]
speaker = "マハムート"
original = "「つまり、私はあなたに舐められたということかしら？」"
translation = "「즉, 나는 너에게 얕보였다는 뜻일까?」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「ひぇっ……」"
translation = "「히익……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「か、会長……余が怒られてるわけじゃないのに、怖くて泣きそうなの。もう二度としないから、許してほしいの」"
translation = "「회, 회장…… 짐이 혼나는 게 아닌데도 무서워서 눈물이 날 것 같다유. 이제 다시는 안 그럴 테니까 용서해 달라유」"

[[dialogue]]
speaker = "マハムート"
original = "「ジャクリーヌ、覚えておきなさい。社会では、部下の失敗は上司が贖うものなの。あなたの判断ミスは、会長の死によってしか清算されないわ」"
translation = "「자클린, 기억해 두렴. 사회에서는 부하의 실수는 상사가 속죄하는 법이야. 너의 판단 미스는 회장의 죽음으로밖에 청산되지 않아」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「会長、死んじゃダメゆ～～～……っ！」"
translation = "「회장, 죽으면 안 된다유～～～……윽!」"

[[dialogue]]
speaker = "unk"
original = "相変わらず不敬罪の罪が重い！"
translation = "여전히 불경죄의 죄목이 무거워!"

[[dialogue]]
speaker = "マハムート"
original = "「あなたも相変わらず軽口が止まらないようだし、これはお仕置きが必要のようね」"
translation = "「너도 여전히 입이 가벼운 것 같으니, 이건 벌이 필요하겠네」"

[[dialogue]]
speaker = "マハムート"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「会長がマムの鉄球を受け止めてるゆーーー！？\u3000むしろ会長はなんで死んでないゆ！？！？！」"
translation = "「회장이 마무의 철구를 받아내고 있다유ーー!? 애초에 회장은 왜 안 죽는 거냐유!?!?!」"

[[dialogue]]
speaker = "マハムート"
original = "「あら、避けるんじゃなくてしっかり受け取るとは、ちょっとは成長したみたいじゃない」"
translation = "「어머, 피하지 않고 제대로 받아내다니, 조금은 성장한 모양이네」"

[[dialogue]]
speaker = "unk"
original = "マムに鍛えてもらってますから！"
translation = "마무에게 단련받고 있으니까요!"

[[dialogue]]
speaker = "マハムート"
original = "「そうね。それじゃあそのまま、あと９９回耐えてもらおうかしら」"
translation = "「그래. 그럼 그대로 앞으로 99번 더 버텨볼까」"

[[dialogue]]
speaker = "unk"
original = "流石にこれをあと９８回は死んだかなぁ……と思いながら、俺は後輩の指導はちゃんとやろう、と心に誓うのだった。"
translation = "과연 이걸 앞으로 98번 더 하면 죽겠구나…… 생각하며, 나는 후배 지도는 제대로 하자고 마음속으로 맹세했다."

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「会長ーーー！？\u3000後で余のお菓子分けてあげるから、死んじゃダメゆ～～～！！」"
translation = "「회장ーーー!? 나중에 짐의 과자 나눠줄 테니까 죽으면 안 된다유～～!!」"

