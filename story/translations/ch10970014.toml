[[dialogue]]
speaker = "unk"
original = "第４話,ジュリエッテとデート,P"
translation = "제4화, 줄리엣테와 데이트, P"

[[dialogue]]
speaker = "unk"
original = "──ジュリエッテとのデート当日。"
translation = "──줄리엣테와의 데이트 당일."

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ま、魔王様っ、お時間ピッタリでございますねっ！」"
translation = "「마, 마왕님! 시간 딱 맞추셨사옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ええと、本日はお日柄もよく……じゃなくてそのっ！\u3000いい天気でございますわね！」"
translation = "「에에또, 오늘은 날씨도 좋고……가 아니라 그! 좋은 날씨이옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（ど、ど、どうしましょう！\u3000この前は謎のテンションでおデートに誘ってしまいましたが、冷静に考えるとヤバいですわ激ヤバでございますわ！）"
translation = "（도, 도, 어떻게 해야 하옵니까! 저번에는 알 수 없는 텐션으로 데이트를 신청해 버렸지만, 냉정하게 생각하니 위험하옵니다 격하게 위험하옵니다!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（殿方とおデートなんて……わたくし人生初体験でございますわ！）"
translation = "（사내분과 데이트라니…… 와타쿠시 인생 첫 경험이옵니다!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（そもそもおデートって、一体なんなんですの～！\u3000何をすればいいか、まるで分からないでございますわ！）"
translation = "（애초에 데이트란, 대체 무엇이옵니까~! 무엇을 해야 할지, 전혀 모르겠사옵니다!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（こういう時は少女漫画を思い出すでございますわ……！\u3000確かおデートの時、ヒロインは……）"
translation = "（이럴 때는 순정만화를 떠올리는 것이옵니다……! 분명 데이트할 때, 히로인은……）"

[[dialogue]]
speaker = "unk"
original = "顔色悪いけど大丈夫？"
translation = "안색이 안 좋은데 괜찮아?"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「だ、大丈夫でございますわ！\u3000パーフェクトジュリエッテでございますわ！」"
translation = "「괘, 괜찮사옵니다! 퍼펙트 줄리엣테이옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「わたくし、全然緊張なんてしてませんでしてよ！\u3000比較的フラットなジュリエッテをお送りいたしておりますわよ」"
translation = "「와타쿠시, 전혀 긴장 같은 건 하지 않았사옵니다! 비교적 플랫한 줄리엣테를 보내 드리고 있사옵니다」"

[[dialogue]]
speaker = "unk"
original = "緊張してるんだね"
translation = "긴장했네"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「き、き緊張なんてしてないでございます！\u3000わたくしレベルのレディならおデートくらい余裕でございますわ！」"
translation = "「기, 긴장 같은 건 안 했사옵니다! 와타쿠시 수준의 레이디라면 데이트 정도는 여유이옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（嘘でございますわ～～！\u3000ガチガチに震えてますわ～！\u3000もうお家に帰りたいでございます！）"
translation = "（거짓말이옵니다아~~! 잔뜩 굳어서 떨고 있사옵니다~! 이제 집에 돌아가고 싶사옵니다!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（しかしここでめげてはいけませんわ。シャルレーヌ様にぎゃふんと言わせるためにも、魔王様をメロメロにしなければっ）"
translation = "（하지만 여기서 기가 죽으면 안 되옵니다. 샤를렌님에게 꼼짝 못 하게 하기 위해서라도, 마왕님을 홀딱 반하게 만들어야 하옵니다!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「さて魔王様、本日のおデートですが…………まずはおててを繋ぎましょう！」"
translation = "「자 마왕님, 오늘의 데이트이옵니다만………… 우선 손을 잡읍시다!」"

[[dialogue]]
speaker = "unk"
original = "おてて？"
translation = "손을?"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「そう、おててでございます。世のカップルはおててを繋ぐものだと認識してございますわ」"
translation = "「그렇사옵니다, 손이옵니다. 세상의 커플은 손을 잡는 것이라고 인식하고 있사옵니다」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「さあおててを繋ぎますわよ……！」"
translation = "「자아 손을 잡겠사옵니다……!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「～～～～～～～～～～っ！！」"
translation = "「～～～～～～～～～～앗!!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（きゃ～～～～！！\u3000こ、これ……意外と恥ずかしいでございますわ～！）"
translation = "（꺄아아아~~!! 이, 이것…… 의외로 부끄럽사옵니다~!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（手のひらから直に魔王様の温もりが伝わってきて……めちゃ恥ずかしいでございます！）"
translation = "（손바닥에서 직접 마왕님의 온기가 전해져 와서…… 엄청 부끄럽사옵니다!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（ですが、この程度で動じてしまっては魔王様をメロメロにできないでございますわ……！）"
translation = "（하지만, 이 정도로 동요해서는 마왕님을 홀딱 반하게 만들 수 없사옵니다……!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「どどどうでございましょう魔王様っ……！\u3000これがわたくしのおデートでございますわ……！」"
translation = "「어어어떻사옵니까 마왕님! 이것이 와타쿠시의 데이트이옵니다!」"

[[dialogue]]
speaker = "unk"
original = "ドキドキしてる"
translation = "두근거리고 있어"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「！？\u3000そうでございますかっ、それは大変嬉しゅうございます！」"
translation = "「!? 그렇사옵니까, 그것은 매우 기쁘옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（やりましたわ……！\u3000やってやりましたわ！\u3000これで魔王様もメロメロでございますわ！）"
translation = "（해냈사옵니다……! 해내고야 말았사옵니다! 이걸로 마왕님도 홀딱 반했사옵니다!）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「うふふ♪\u3000それでは本格的におデートを始めましょうでございますわ！」"
translation = "「우후후♪ 그럼 본격적으로 데이트를 시작하도록 하겠사옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（始めはドキドキして仕方なかったのでございますが、段々と慣れてきましたわ）"
translation = "（처음에는 두근거려서 어쩔 줄 몰랐사옵니다만, 점점 익숙해졌사옵니다）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（魔王様……ちゃんと歩幅をわたくしに合わせてくださいますし、手もずっと優しく握ってくださりますわ）"
translation = "（마왕님…… 제대로 보폭을 와타쿠시에게 맞춰 주시옵고, 손도 계속 부드럽게 잡아 주시옵니다）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（なんだか、思ったよりもずっと紳士な方でございますわね……）"
translation = "（왠지, 생각했던 것보다 훨씬 신사적인 분이시옵니다……）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（わたくしなんて、ただの敵に過ぎないのに……惚れているなんて、嘘を吐いて騙しているのに……）"
translation = "（와타쿠시 따위, 단순한 적에 불과한데…… 반했다는 거짓말을 해서 속이고 있는데……）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「魔王様、そろそろお昼にいたしませんこと？\u3000実はわたくし、お弁当を作ってきたんでございますの♪」"
translation = "「마왕님, 슬슬 점심 식사를 하지 않겠사옵니까? 실은 와타쿠시, 도시락을 만들어 왔사옵니다♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ふふ、特別でしてよ♪\u3000このわたくしが二度も人に手料理を振る舞うなんて、よっぽどのことなんでございますから♪」"
translation = "「후후, 특별하옵니다♪ 이 와타쿠시가 두 번이나 남에게 손수 만든 요리를 대접하다니, 웬만한 일이 아니옵니다♪」"

[[dialogue]]
speaker = "unk"
original = "近場の公園のベンチに座り、ジュリエッテのお弁当を楽しんだ。"
translation = "가까운 공원 벤치에 앉아, 줄리엣테의 도시락을 즐겼다."

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「お弁当はお気に召しましたでございましょうか？」"
translation = "「도시락은 마음에 드셨사옵니까?」"

[[dialogue]]
speaker = "unk"
original = "とても美味しかった"
translation = "정말 맛있었어"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「うふふ♪\u3000それはよかったでございますわ♪\u3000まあ、このわたくしが作って美味しくない料理などございませんけれど♪」"
translation = "「우후후♪ 그것은 다행이옵니다♪ 뭐, 이 와타쿠시가 만들어서 맛없는 요리란 없사옵니다만♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（やはり魔王様に褒めていただくのは悪い気はしませんわね）"
translation = "（역시 마왕님께 칭찬받는 것은 기분이 나쁘지 않사옵니다）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（ですが、モヤモヤしますわ……魔王様をこのまま騙し続けるのは、わたくし……）"
translation = "（하지만, 답답하옵니다…… 마왕님을 이대로 계속 속이는 것은, 와타쿠시……）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「魔王様……実はわたくし、一つ隠し事をしていましてよ」"
translation = "「마왕님…… 실은 와타쿠시, 한 가지 숨기는 것이 있사옵니다」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「わたくし、魔王様に一目惚れなんてしていませんでしたわ」"
translation = "「와타쿠시, 마왕님께 첫눈에 반하지 않았사옵니다」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「全て嘘でございましたの。ただわたくしは魔王様を利用──」"
translation = "「모두 거짓말이었사옵니다. 단지 와타쿠시는 마왕님을 이용──」"

[[dialogue]]
speaker = "unk"
original = "知ってたよ。でも楽しかったから"
translation = "알고 있었어. 하지만 즐거웠으니까"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「へ！？\u3000知っててわたくしと一緒にいたのでございますか！？」"
translation = "「헤!? 알고 계시면서 와타쿠시와 함께 계셨사옵니까!?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「本当に魔王様は、変わり者といいますか……」"
translation = "「정말로 마왕님은, 별난 분이시라고 할까……」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（はぁ……でもそんなお方だから、わたくしも──）"
translation = "（하아…… 하지만 그런 분이시기에, 와타쿠시도──）"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「……わたくしと魔王様はあくまでも敵同士でございますから、そのことをゆめゆめお忘れなく」"
translation = "「……와타쿠시와 마왕님은 어디까지나 적대 관계이옵니다, 그 사실을 꿈에도 잊지 마시옵소서」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「わたくし達は所詮相容れない存在……決して、魔王様を騙し続けて罪悪感が湧いたとか、魔王様のことをちょっぴり気に入りかけたとか」"
translation = "「와타쿠시들은 결국 서로 어울릴 수 없는 존재…… 결코, 마왕님을 계속 속여서 죄책감이 들었다거나, 마왕님을 살짝 마음에 들어 하기 시작했다거나」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「そーんな甘いことは一切ござませんから！\u3000本当でございますからね！」"
translation = "「그으런 달콤한 일은 일절 없사옵니다! 정말이옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「……コホン。ということで、これからも敵同士仲良くしていきましょう……魔王様♪」"
translation = "「……코흠. 그런고로, 앞으로도 적대 관계로서 사이좋게 지내도록 하십시다…… 마왕님♪」"

