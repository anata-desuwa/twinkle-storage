[[dialogue]]
speaker = "unk"
original = "初めて顔を合わせた紅明とクーシェン。"
translation = "처음 얼굴을 마주한 코우메이와 쿠셴."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「まさか、悟空……！？\u3000『孫悟空』なのか！？」"
translation = "「설마, 오공……!? 『손오공』인 거야!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そんごくう……？\u3000いや、ボクの名前は、クーシェンだけど？」"
translation = "「손오공……? 아니, 내 이름은 쿠셴인데?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「えぇっ！？\u3000まさかの他人の空似っ！？\u3000……いやでも、その格好はどう見ても、前世の悟空と瓜二つだし！」"
translation = "「에엣!? 설마 닮은 사람뿐!? ……아니 하지만 그 모습은 아무리 봐도 전생의 오공과 판박이라구!」"

[[dialogue]]
speaker = "unk"
original = "芭蕉扇を見てから何となく予感があった俺は、クーシェンに尋ねてみる。"
translation = "파초선을 보고 나서 왠지 예감이 들었던 나는 쿠셴에게 물어본다."

[[dialogue]]
speaker = "unk"
original = "クーシェンの生い立ちとか、聞いてもいい？"
translation = "쿠셴의 태생 같은 거, 물어봐도 될까?"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボクの？\u3000仕方ないな～、そんなに知りたいなら、特別に教えてあげる♪」"
translation = "「나의? 어쩔 수 없네~, 그렇게 알고 싶다면 특별히 알려줄게♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「といっても、ボクも昔の記憶がないというか、実は目覚めたのは割と最近のことなんだけどね～」"
translation = "「그렇다고 해도 나도 옛날 기억이 없다고 할까, 사실 깨어난 건 비교적 최근의 일이지만 말이야~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「魔界に『<ruby>花果山<rt>かかざん</rt></ruby>』っていうところがあるんだけど、ボクはそこにある大きな岩の中で目覚めたんだ！」"
translation = "「마계에 『화과산』이라는 곳이 있는데, 나는 거기 있는 커다란 바위 안에서 깨어났어!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「！\u3000それ、悟空が生まれた場所と同じっしょ！」"
translation = "「! 거기 오공이 태어난 장소랑 똑같다구!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そうなの？\u3000ていうか、さっきから言ってる、その『ごくう』って誰？」"
translation = "「그래? 그나저나 아까부터 말하는 그 『오공』이 누구야?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「えっと、人間界で有名な『西遊記』って伝説があってな？\u3000と言っても、魔界生まれだとわからないか……」"
translation = "「그게 인간계에서 유명한 『서유기』라는 전설이 있는데 말야? 뭐 마계 태생이면 모르려나…….」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「簡単に言うと、『孫悟空』は今から２０００年前、魔王を名乗って人間界に侵攻した悪い魔族を倒し、人間界を救った英雄なのさ」"
translation = "「간단히 말하면 『손오공』은 지금으로부터 2000년 전, 마왕을 자처하며 인간계에 침공한 나쁜 마족을 쓰러뜨리고 인간계를 구한 영웅이야.」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「英雄……！\u3000ん？\u3000でも、おかしくない？\u3000２０００年前の英雄なのに、どうしてボクと瓜二つだなんてわかるの？」"
translation = "「영웅……! 음? 근데 이상하지 않아? 2000년 전 영웅인데 어떻게 나랑 판박이라는 걸 아는 거야?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「それは――アタシが昔、実際に会ったことがあるからさ」"
translation = "「그건── 내가 옛날에 실제로 만난 적이 있기 때문이지.」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「？\u3000どういうこと……？」"
translation = "「? 그게 무슨 소리야……?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「嘘を言ってないって信じてもらう為にも、まずは見てもらった方がいいかな。ダーリン、芭蕉扇をこっちにもらってもいいかい？」"
translation = "「거짓말이 아니라는 걸 믿어주기 위해서라도 우선은 보여주는 게 좋겠네. 달링, 파초선을 이쪽으로 줘도 될까?」"

[[dialogue]]
speaker = "unk"
original = "クーシェン、いいか？"
translation = "쿠셴, 괜찮아?"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うん。マリオンからも、本来の持ち主がいるから返してあげて欲しいって聞いてたし、それは別に構わないけど……」"
translation = "「응. 마리온에게서도 원래 주인이 있으니 돌려줬으면 좋겠다고 들었고, 그건 별로 상관없지만……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「こいつはアタシにとって、思い入れのある物なんだ――あんがとね！」"
translation = "「이건 나한테도 추억이 깃든 물건이라구── 고맙다구!」"

[[dialogue]]
speaker = "unk"
original = "紅明は、俺が差し出した芭蕉扇を手に取ると――"
translation = "코우메이는 내가 내민 파초선을 손에 쥐더니──"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「羅刹再臨！」"
translation = "「나찰 재림!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「わっ……！？」"
translation = "「와아……!?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「威風堂々――元気羅刹、ここに再臨！\u3000今こそ羅刹のごとく、勝利の風を吹かすぜ！」"
translation = "「위풍당당── 활기 나찰, 여기에 재림! 지금이야말로 나찰처럼 승리의 바람을 일으키겠다구!」"

[[dialogue]]
speaker = "unk"
original = "紅明の戦闘服が覚醒した……！"
translation = "코우메이의 전투복이 각성했다……!"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「す、すごいっ！\u3000とんでもない星力……！\u3000キミは一体、何者なの！？」"
translation = "「우와, 대단해! 엄청난 성력……! 너는 대체 정체가 뭐야!?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「うっし☆\u3000改めて名乗らせてもらうぜ！\u3000我こそは、前世にて<ruby>鉄扇公主<rt>てっせんこうしゅ</rt></ruby>が娘、<ruby>善哉童子<rt>ぜんざいどうじ</rt></ruby>『<ruby>紅孩児<rt>こうがいじ</rt></ruby>』！」"
translation = "「좋아☆ 다시 한번 이름을 밝히지! 나는 바로 전생에서 철선공주의 딸, 선재동자 『홍해아』!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「そして現世に転生し、今に名乗るは『<ruby>牛紅明<rt>ぎゅうこうめい</rt></ruby>』！\u3000ってなわけで、アタシのことは気軽に紅明ちゃんって呼んでくれよな、クーちん♪」"
translation = "「그리고 현세에 전생하여 지금 자칭하는 이름은 『규우 코우메이』! 그런 고로 나를 편하게 코우메이 짱이라고 불러줘, 쿠셴!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「クーちん！？\u3000それってボクのこと……！？」"
translation = "「쿠셴!? 그건 나를 말하는 거……!?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「おうよ☆\u3000アタシ、友達はあだ名で呼ぶ派だからさ♪\u3000クーシェンって名前なら、クーちんって呼ぶのが可愛いって思ったんだけど、どうよ？」"
translation = "「그렇다구☆ 난 친구를 별명으로 부르는 파거든♪ 쿠셴이라는 이름이면 쿠셴이라고 부르는 게 귀엽다고 생각했는데 어때?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～？\u3000ボクは魔界で助けたおじいちゃんに付けてもらった、このクーシェンって名前がカッコよくて気に入ってるんだけど……」"
translation = "「에~? 나는 마계에서 도와준 할아버지가 지어주신 이 쿠셴이라는 이름이 멋있어서 마음에 드는데……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「なんか、空飛ぶ神様と書いて、『<ruby>空神<rt>クーシェン</rt></ruby>』って読むんだって！」"
translation = "「뭐랄까, 하늘을 나는 신이라고 쓰고 『공신』이라고 읽는대!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「なるほど、わかるマン。でも、カッコいい本名と、友達からのあだ名は別物っしょ☆\u3000あだ名は可愛い方が親しみを持てるじゃん？」"
translation = "「과연, 알겠다구. 하지만 멋진 본명이랑 친구가 지어준 별명은 별개라구☆ 별명은 귀여운 편이 친근감이 생기잖아?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そ、そう？\u3000まぁ、なら仕方ないな～。そこまでボクのカッコ可愛さを称えたいって言うなら、クーちんって呼ばせてあげてもいいけど～？」"
translation = "「그, 그래? 뭐 그러면 어쩔 수 없네~. 그렇게까지 내 멋지고 귀여움을 찬양하고 싶다면 쿠셴이라고 부르게 해 줄 수도 있지만~?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「うっし♪\u3000それじゃあクーちんのことは、たった今からクーちんで！\u3000ウェ～イ☆」"
translation = "「좋아♪ 그럼 쿠셴은 지금 이 순간부터 쿠셴으로! 웨이~☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「って、そんなことより、紅明が『芭蕉扇』で変身したことだよ！\u3000そのすごい力は一体何なの！？」"
translation = "「아니, 그것보다 코우메이가 『파초선』으로 변신한 거 말이야! 그 대단한 힘은 대체 뭐야!?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「――この『芭蕉扇』は、アタシの前世のお袋殿……『羅刹女』の持ち物でね」"
translation = "「──이 『파초선』은 내 전생의 어머니…… 『나찰녀』의 소지품이라서 말야.」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「２０００年前、当時のアタシは、お袋殿からこれを譲り受けて、それはもう必死に修業した果てに、この姿に変身できるようになったってわけよ」"
translation = "「2000년 전 당시의 나는 어머니로부터 이걸 물려받아 정말 필사적으로 수행한 끝에 이 모습으로 변신할 수 있게 됐다는 거지.」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「こうして実際に変身してみせた後なら、信じてもらえると思うんだけど――」"
translation = "「이렇게 실제로 변신해 보인 뒤라면 믿어줄 거라 생각하는데──」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「アタシは、前世で『孫悟空』が戦った悪の親玉……『牛魔王』の娘で、後に悟空と友達になって、一緒に旅をした仲間だったんだ。つまり――」"
translation = "「나는 전생에서 『손오공』이 싸웠던 악의 우두머리…… 『우마왕』의 딸이자, 나중에 오공과 친구가 되어 함께 여행을 했던 동료였어. 즉──」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「今ここにいるアタシは、２０００年前に存在した『紅孩児』って魔族が、生まれ変わった存在ってわけさ☆」"
translation = "「지금 여기 있는 나는 2000년 전에 존재했던 『홍해아』라는 마족이 다시 태어난 존재라는 거지☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そんなことが本当に……！？\u3000あっ！\u3000じゃあ、もしかして……？」"
translation = "「그런 일이 정말로……!? 앗! 그럼 설마……?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「そう。アタシと同じく、クーちんも孫悟空の生まれ変わりなんじゃないかって、アタシは思ってるんだ」"
translation = "「그래. 나랑 마찬가지로 쿠셴도 손오공의 환생이 아닐까 하고 나는 생각하고 있어.」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボクが、英雄の生まれ変わり……！」"
translation = "「내가 영웅의 환생……!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「アタシと違って、どうして前世の記憶を持っていないのかはわからないけど……」"
translation = "「나와는 달리 왜 전생의 기억을 가지고 있지 않은지는 모르겠지만……」"

[[dialogue]]
speaker = "unk"
original = "いや、本来は逆じゃないか？"
translation = "아니, 원래는 반대 아닌가?"

[[dialogue]]
speaker = "unk"
original = "大変今更ではあるのだが、本来は前世の記憶を持っている方がおかしい。紅明とは付き合いも長くなってきて、すっかり違和感がなくなってきてしまったけれども。"
translation = "새삼스럽지만 원래는 전생의 기억을 가지고 있는 쪽이 이상하다. 코우메이와는 알고 지낸 지도 오래되어 완전히 위화감이 없어졌지만 말이다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「おぉ～、言われてみれば確かに！\u3000ダーリン、ナイスツッコミ☆」"
translation = "「오오~ 듣고 보니 확실히! 달링, 나이스 츳코미☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「前世のボクは……紅明の仲間……一緒に旅をした、仲間……？」"
translation = "「전생의 나는…… 코우메이의 동료…… 함께 여행을 한 동료……?」"

[[dialogue]]
speaker = "unk"
original = "クーシェンは何故か紅明の豊かな胸元をチラチラを盗み見ながら、そんなことをブツブツとつぶやき始める。"
translation = "쿠셴은 왠지 코우메이의 풍만한 가슴가를 힐끗힐끗 훔쳐보며 그런 말을 중얼거리기 시작한다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うっ、頭が……！」"
translation = "「윽, 머리가……!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「およ？\u3000どした、クーちん？」"
translation = "「어라? 왜 그래, 쿠셴?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「はっ！？\u3000思い……出した！」"
translation = "「핫!? 기억…… 났다!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「紅明！\u3000紅明じゃないか！\u3000いや～、久しぶりだなー、紅明！！」"
translation = "「코우메이! 코우메이 아니야! 이야~ 오랜만이네, 코우메이!!」"

[[dialogue]]
speaker = "unk"
original = "そう言ってクーシェンは紅明に駆け寄り――胸元に飛び込んだ。"
translation = "그렇게 말하며 쿠셴은 코우메이에게 달려가── 가슴으로 뛰어들었다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「おおぅっ！？\u3000おっぱいの間に思いっきり顔面ツッコミが入ったけど、どした！？」"
translation = "「오옷!? 가슴 사이에 아주 제대로 안면 박치기를 했는데, 왜 그래!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うっ――おおおおおおおおっ！！！\u3000これが大人おっぱい！\u3000もっちりしてて、柔らかくって、ウキウキしてきたぁ～～～っ！！！！」"
translation = "「윽── 오오오오오오옷!!! 이것이 어른 가슴! 쫀득쫀득하고 부드러워서 우키키♪ 하게 된다구우우우우!!!!」"

[[dialogue]]
speaker = "unk"
original = "紅明のおっぱいに顔を埋めながら、テンション高く言うクーシェン。"
translation = "코우메이의 가슴에 얼굴을 묻은 채 텐션 높게 말하는 쿠셴."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「……もしかしてクーちん、おっぱい好きなん？」"
translation = "「……혹시 쿠셴, 가슴 좋아해?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うん！！！\u3000あっ、いや違う！\u3000これは再会を喜んでるだけだよ！」"
translation = "「응!!! 앗, 아니 아니야! 이건 재회를 기뻐하는 것뿐이야!」"

[[dialogue]]
speaker = "unk"
original = "思いっきり欲望が口から出てたけど……"
translation = "대놓고 욕망이 입 밖으로 나왔는데……"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「はっ！？\u3000しまった！？」"
translation = "「핫!? 실수했다!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「記憶が戻ったと言って自然な流れで抱き着いたら、おっきいおっぱいに触れるかなと思って……！」"
translation = "「기억이 돌아왔다고 하고 자연스럽게 껴안으면 큰 가슴을 만질 수 있을까 싶어서……!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「別にそんなことせんでも、おっぱいくらい好きに触っていいぜ？」"
translation = "「별로 그런 짓 안 해도 가슴 정도는 마음껏 만져도 된다구?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「アタシは自分の立派なおっぱいに自負と自信を持ってるからね！\u3000女の子同士の戯れなら、別に触られても気にしないっしょ☆」"
translation = "「나는 내 훌륭한 가슴에 자부심과 자신을 가지고 있으니까 말야! 여자끼리의 장난이라면 딱히 만져져도 상관없다구☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「いいの！？\u3000わ～い！！！\u3000ボク、おっぱいに限らず、エッチなもの大好き♪」"
translation = "「정말!? 와아!!! 나 가슴뿐만 아니라 야한 거 엄청 좋아해♪」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「うん、これは確かに悟空だわ。記憶は戻ってないけど、このエッチなお猿さんな感じは、間違いなく孫悟空です」"
translation = "「응, 이건 확실히 오공이네. 기억은 안 돌아왔지만 이 음란한 원숭이 같은 느낌은 틀림없이 손오공입니다.」"

[[dialogue]]
speaker = "unk"
original = "え、英雄のイメージが……"
translation = "영, 영웅의 이미지가……"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「伝説ってのは美化されるものだからね～」"
translation = "「전설이라는 건 미화되는 법이니까 말야~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あぁ～っ♪\u3000このぱふぱふという、おっぱいの音ぉ～♪」"
translation = "「아아~♪ 이 폭신폭신한 가슴의 소리이~♪」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あ、そうだ♪\u3000ついでだし――ダーリンもおっぱい揉む？」"
translation = "「아, 맞다♪ 하는 김에── 달링도 가슴 주무를래?」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、何言ってんの！？"
translation = "잠깐, 무슨 말을 하는 거야!?"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あははっ☆\u3000そんな慌てなくてもいいじゃ～ん♪\u3000男の子でも、ダーリンだったら、アタシは全然構わないっしょ♪」"
translation = "「아하하☆ 그렇게 당황하지 않아도 되잖아♪ 남자애라도 달링이라면 난 전혀 상관없다구♪」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「だって、ダーリンは、アタシのダーリンだし<emoji=heart04>\u3000うしし☆」"
translation = "「왜냐면 달링은 내 달링이니까♥ 우히히☆」"

[[dialogue]]
speaker = "unk"
original = "紅明は時々、こうやってさらっと好意をぶつけて来るので、正直照れてしまう……。"
translation = "코우메이는 가끔 이렇게 불쑥 호의를 부딪쳐 오기에 솔직히 쑥스럽다……."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ！\u3000おっぱいと言えばさ、ねぇねぇ知ってる！？」"
translation = "「앗! 가슴 하니까 말인데, 저기 저기 알고 있어!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「おっぱいの先っぽにある乳首って、強く擦ると痛いんだけど、さらさらっと優しく撫でると、気持ち良くなるんだよ！」"
translation = "「가슴 끝에 있는 젖꼭지는 세게 문지르면 아프지만, 살랑살랑 부드럽게 어루만지면 기분 좋아진다구!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ、紅明と違って魔王はまだ子供だし、男の子だから知らなかったかな～♪」"
translation = "「앗, 코우메이랑 다르게 마왕은 아직 어린애고 남자애니까 몰랐으려나~♪」"

[[dialogue]]
speaker = "unk"
original = "マジで何言ってんの！？"
translation = "진짜로 무슨 소릴 하는 거야!?"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「こら、クーちん。そういうエッチな話題を大声でするのははしたないぞ？\u3000めっ☆」"
translation = "「이놈, 쿠셴. 그런 야한 화제를 큰 소리로 하는 건 점잖지 못하다구? 안 돼☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ウキキ♪\u3000こんなことで恥ずかしがっちゃうなんて、魔王はこっども～♪」"
translation = "「우키키♪ 이런 걸로 부끄러워하다니 마왕은 어린애라니까~♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「その反応を見るに、どーせ女の子の裸を見たり、一緒にお風呂入ったことなんてないんでしょ～？」"
translation = "「그 반응을 보아하니 어차피 여자애 알몸을 보거나 같이 목욕한 적 같은 건 없지~?」"

[[dialogue]]
speaker = "unk"
original = "………………。"
translation = "………………."

[[dialogue]]
speaker = "unk"
original = "ノーコメントで"
translation = "노코멘트로"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「えぇえぇぇえ～～～っ！？」"
translation = "「에에에에에에에엑!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「今の間はなに！？\u3000もしかして、魔王ってお風呂でエッチしたことある大人なのぉ！？」"
translation = "「방금 그 침묵은 뭐야!? 설마 마왕은 욕실에서 야한 짓 한 적 있는 어른인 거야!?」"

[[dialogue]]
speaker = "unk"
original = "お風呂でエッチしたことはない！！"
translation = "욕실에서 야한 짓 한 적 없어!!"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「でも女の子の裸は見たんだぁ……！\u3000交尾したんだぁ！？」"
translation = "「하지만 여자애 알몸은 봤구나……! 교미한 거야!?」"

[[dialogue]]
speaker = "unk"
original = "待て待て！\u3000交尾はしてない！"
translation = "기다려 기다려! 교미는 안 했어!"

[[dialogue]]
speaker = "unk"
original = "どうしてそこが繋がるんだ！！"
translation = "왜 이야기가 거기로 연결되는 건데!!"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え？\u3000だって好き合ってる男女が裸でお風呂に入ると、すっごく気持ち良くなって、妊娠するんでしょ？」"
translation = "「에? 그치만 서로 좋아하는 남녀가 알몸으로 목욕하면 엄청 기분 좋아져서 임신하는 거잖아?」"

[[dialogue]]
speaker = "unk"
original = "性知識が間違ってる！！"
translation = "성지식이 틀렸어!!"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「流石のボクも、まだ男の子とお風呂に入ったことはないからね～」"
translation = "「나도 아직 남자애랑 목욕한 적은 없으니까 말이야~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「もちろん興味津々だし、『これは』という相手がいれば、今すぐにでも全裸になって一緒に気持ち良くなる覚悟はあるよ！」"
translation = "「물론 흥미진진하고 『이 사람이다』 싶은 상대가 있다면 지금 당장이라도 전라가 되어 같이 기분 좋아질 각오는 되어 있어!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「でもねぇ～。今までボクと釣り合う男の子って、出会ったことがなくってさ！」"
translation = "「하지만 말이야~. 지금까지 나랑 어울리는 남자애를 만나본 적이 없어서 말이야!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「クーちんよ。大事なことを教えるんだけど──男と女は一緒にお風呂に入っても妊娠はしないんだ。……まあ、気持ちいいとは思うんだけど」"
translation = "「쿠셴아. 중요한 걸 가르쳐주겠는데── 남자랑 여자는 같이 목욕해도 임신은 안 해. ……뭐 기분 좋기는 하겠지만.」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ふふん！\u3000大人はそうやって、すぐエッチなことを隠そうとするのはとっくに学習済みだよ！\u3000ボクの好奇心と性欲を舐めないでよね！」"
translation = "「후훙! 어른들은 그렇게 바로 야한 걸 숨기려 한다는 건 진작에 학습 완료했다구! 내 호기심과 성욕을 얕보지 말아줘!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あ～～、ボクも早くエッチなことしてみたいな～。大人がやみつきになるくらい気持ちいいんでしょ？」"
translation = "「아~~ 나도 빨리 야한 거 해보고 싶다~. 어른들이 중독될 정도로 기분 좋은 거지?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「なんで男の子とお風呂に入ると、そこまで気持ち良くなっちゃうのかはよくわかんないけど、そんなのは試してみた方が早いもんね！」"
translation = "「왜 남자애랑 목욕하면 그렇게까지 기분 좋아지는지는 잘 모르겠지만, 그런 건 시험해 보는 게 빠르니까 말이야!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そだ！\u3000経験者なら魔王、ボクとお風呂入ってよ！\u3000一応強いって話だし、見た目も好みだから、魔王とだったらお風呂入ってあげてもいいよ？」"
translation = "「그렇지! 경험자라면 마왕, 나랑 목욕하자! 일단 강하다는 모양이고 외모도 취향이니까 마왕이라면 목욕 같이 해 줄 수도 있어?」"

[[dialogue]]
speaker = "unk"
original = "ダメー！！"
translation = "안 돼!!"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「も～～、魔王は本当にドスケベなんだから。いいよ、それならもうちょっとだけ奮発してあげる！」"
translation = "「정말~~ 마왕은 진짜 변태라니까. 좋아, 그럼 조금 더 써비스 해주지!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「お風呂に入るだけじゃなくって、ボクのおっぱいと乳首も、ちょっとだけ触らせてあげるよ！\u3000こんなサービス、２度とないんだから感謝してよね～？」"
translation = "「목욕하는 것뿐만 아니라 내 가슴이랑 젖꼭지도 조금만 만지게 해줄게! 이런 서비스 다신 없으니까 감사하라구~?」"

[[dialogue]]
speaker = "unk"
original = "なんでこの子は性知識めちゃくちゃなのに"
translation = "어째서 이 애는 성지식은 엉망이면서"

[[dialogue]]
speaker = "unk"
original = "こんなに性欲旺盛なんだ……！？"
translation = "이렇게나 성욕 왕성한 거야……!?"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「う～～ん。どうやらクーちんには、長期目線で性教育カリキュラムを組まなきゃいけないみたいだぜ☆」"
translation = "「으음~. 아무래도 쿠셴에게는 장기적인 안목으로 성교육 커리큘럼을 짜야 할 것 같다구☆」"

[[dialogue]]
speaker = "unk"
original = "これまた強烈なキャラの登場に、頭を抱える俺なのであった――"
translation = "이 또한 강렬한 캐릭터의 등장에 머리를 감싸 쥐는 나였다──"

