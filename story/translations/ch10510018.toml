[[dialogue]]
speaker = "unk"
original = "クラウディア・イルゼ・フォン・ゴットフリート。"
translation = "클라우디아 일제 폰 고트프리트."

[[dialogue]]
speaker = "unk"
original = "ネビュラと名乗る謎多き組織の総帥だ。"
translation = "네뷸라라고 자칭하는 수수께끼 많은 조직의 총수다."

[[dialogue]]
speaker = "unk"
original = "ネビュラは俺たち新星星徒会と、味方とも敵とも言えない微妙な関係にあったのだが……"
translation = "네뷸라는 우리 신성 성도회와, 아군이라고도 적이라고도 할 수 없는 미묘한 관계에 있었지만……"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふ、ふんっ。高貴な余を辱めるような格好をさせるとは……んんっ、今日はいったい、どういう趣向なのだ？\u3000……はぁぁっ」"
translation = "「후, 훈. 고귀한 여를 능욕하는 듯한 복장을 하게 하다니…… 으음, 오늘은 대체, 어떤 취향인 것이냐? ……하아아.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そんな風に余を持ち上げて……はふぅっ。そそり立ったイチモツを見せつけたところで、余は決してち○ぽに屈したりせぬぞ！\u3000……ふぅぅっ」"
translation = "「그런 식으로 여를 띄워주고…… 하후우. 우뚝 솟은 물건을 보여준다고 해서, 여는 결코 자지에 굴복하지 않을 것이다! ……후으으.」"

[[dialogue]]
speaker = "unk"
original = "いつの間にか、みんなに内緒でエッチなことをする関係になってしまっていた。"
translation = "어느새인가, 모두에게 비밀로 야한 짓을 하는 관계가 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "『子作り』はどうするのかと熱心に聞いてきたクラウディア。あれに大真面目に答えてしまったのがよくなかった。"
translation = "『애 만들기』는 어떻게 하냐고 열성적으로 물어왔던 클라우디아. 그때 너무 진지하게 대답해버린 게 화근이었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む──何？\u3000どこでそんな言葉を覚えたかと？\u3000ふふ……乙女の教典に決まっておる」"
translation = "「음── 뭐냐? 어디서 그런 말을 배웠냐고? 후후…… 소녀의 교전인 게 당연하지 않느냐.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふふん？\u3000勢いづいて始めたはいいが……はぁぁっ。さすがの貴様も、余をこれ以上辱めるのは、躊躇いがあると見える……んんっ」"
translation = "「후훈? 기세 좋게 시작한 건 좋지만…… 하아아. 역시 귀공도, 여를 이 이상 능욕하는 것은, 망설임이 있는 모양이군…… 으음.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「よいぞ。今なら今日の無礼はすべて許そう。……余の体をベッドに下ろし、余の足に忠誠のキスをするなら、無様にそそり立った貴様のち○ぽを余のおま○こで慰めてやろうっ」"
translation = "「좋다. 지금이라면 오늘의 무례는 모두 용서하마. ……여의 몸을 침대에 내려놓고, 여의 발에 충성의 키스를 한다면, 꼴사납게 우뚝 솟은 귀공의 자지를 여의 보지로 위로해 주마.」"

[[dialogue]]
speaker = "unk"
original = "「慰めてやる」なんて上から目線で言うクラウディアだったが、その女性器は羞恥心と興奮ですっかり濡れそぼっていた。"
translation = "「위로해 주마」라며 위에서 내려다보는 말투로 말하는 클라우디아였지만, 그 성기는 수치심과 흥분으로 흠뻑 젖어 있었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぁぁ……ほれ、早くしろ。余の気が変わらんうちにな。……今日の余は機嫌がいい。今なららぶらぶな雰囲気で可愛がってやるぞ？」"
translation = "「하아아…… 자, 빨리 하거라. 여의 마음이 바뀌기 전에 말이다. ……오늘의 여는 기분이 좋다. 지금이라면 러브러브한 분위기로 귀여워해 주마.」"

[[dialogue]]
speaker = "unk"
original = "まるで俺がそれを望んでるかのような口調で、自分のしてほしいエッチをおねだりするクラウディア。"
translation = "마치 내가 그것을 바라고 있다는 듯한 말투로, 자신이 하고 싶은 섹스를 조르는 클라우디아."

[[dialogue]]
speaker = "unk"
original = "だけど、未挿入のペニスに伝う愛液の量で、彼女の我慢の方が限界なのは丸わかりだった。"
translation = "하지만, 아직 삽입하지 않은 페니스에 타고 흐르는 애액의 양으로, 그녀의 인내심이 한계라는 것은 뻔히 보였다."

[[dialogue]]
speaker = "unk"
original = "俺は愛液で濡れ濡れの膣口をペニスで焦らすようにこすって、すっかり可愛い顔になってしまったクラウディアに意地悪を言う。"
translation = "나는 애액으로 축축하게 젖은 질 입구를 페니스로 애태우듯 문지르며, 완전히 귀여운 얼굴이 되어버린 클라우디아에게 심술궂은 말을 던진다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「我慢できなくなってるのは余のほう──だと？\u3000んんっ……そんなわけがなかろうっ」"
translation = "「참을 수 없게 된 건 여 쪽이라고──? 으음…… 그럴 리가 없지 않느냐.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぁ……貴様、最近余が目をかけてやっているから、調子に乗っているな？\u3000……んんぅ」"
translation = "「하아…… 귀공, 요즘 여가 눈여겨봐 주고 있다고 해서, 기어오르는구나? ……으으음.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぁ、はぁっ……なんだ……？\u3000貴様のそれを、そんな風にこすりつけてきて」"
translation = "「하아, 하아…… 뭐냐……? 귀공의 그것을, 그런 식으로 문질러대고.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「まさか、貴様のち○ぽ程度で、余を屈服させるつもりか？\u3000ははっ、無理に決まっておろう。ザコめ<emoji=heart04>」"
translation = "「설마, 귀공의 자지 따위로, 여를 굴복시킬 셈이냐? 하하, 무리인 게 당연하지 않느냐. 허접<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んくぅぅ……！\u3000はっ、あああああっ……！」"
translation = "「응쿠우우……! 핫, 아아아아앗……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そ、そんなっ！\u3000ば、馬鹿者──あんっ……きゅ、急に入れたり、しゅりゅなぁ……っ。んんんっ」"
translation = "「그, 그런! 바, 바보 녀석── 안…… 가, 갑자기 넣거나, 하지 마아…… 으으음.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あふぅ……ゆっくり、余の体を持ち上げて……んんっ。勃起したち○ぽに、串刺しにする、などぉ……くふぅっ」"
translation = "「아후우…… 천천히, 여의 몸을 들어 올려서…… 으음. 발기한 자지에, 꼬챙이로 만들다니…… 쿠후우.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「これではまるで……はぁぁっ。貴様が余の体を、おなほーるにしているようでは、んんっ……ないかぁっ。はふぅぅっ」"
translation = "「이래서는 마치…… 하아아. 귀공이 여의 몸을, 오나홀로 삼고 있는 것 같지, 으음…… 않느냐. 하후우우.」"

[[dialogue]]
speaker = "unk"
original = "本当に、どこでそんな言葉を覚えたのか──"
translation = "정말로, 어디서 그런 말을 배워온 건지──"

[[dialogue]]
speaker = "unk"
original = "彼女の体を上下に揺すって性器を擦り合わせるたび、じゅぷじゅぷと愛液があふれてくる。"
translation = "그녀의 몸을 위아래로 흔들며 성기를 비빌 때마다, 쥬릅쥬릅 애액이 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "この一見気の強そうなお姫様は、羞恥心や屈辱感で気持ちよくなってしまう性癖の持ち主だった。"
translation = "이 겉보기엔 기가 세 보이는 공주님은, 수치심이나 굴욕감으로 기분이 좋아져 버리는 성벽의 소유자였다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「屈辱的、だぞ……んんっ。はぁんっ。か、感じてなどおらん！\u3000ふぅっ、これは性感帯を弄られた……せ、生理現象だっ！」"
translation = "「굴욕적, 이다…… 으음. 하앙. 느, 느끼고 있지 않다! 후우, 이것은 성감대를 농락당한…… 생, 생리 현상이다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぁぁ……っ。余は自分の体を、おもちゃのように弄ばれて、んふぅ……悦ぶ、変態ではないっ」"
translation = "「하아아…… 여는 자신의 몸을, 장난감처럼 농락당하며, 응후…… 기뻐하는, 변태가 아니다!」"

[[dialogue]]
speaker = "unk"
original = "普段なら凛々しく感じるクラウディアの口調も、エッチの最中では嗜虐心をくすぐるスパイスでしかない。"
translation = "평소라면 늠름하게 느껴질 클라우디아의 말투도, 섹스 도중에는 가학심을 자극하는 향신료일 뿐이다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む……何？\u3000こっ……このままの格好で、ネビュラの基地を歩く──だと……？」"
translation = "「음…… 뭐냐? 이…… 이대로의 모습으로, 네뷸라의 기지를 걷는다고──?」"

[[dialogue]]
speaker = "unk"
original = "そんな意地悪な言葉も、ついつい口にしてしまう。"
translation = "그런 짓궂은 말도, 그만 입 밖으로 내버린다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ひぅぅ……っ。はぁぁっ、んんんっ。余のおま○こが、ち○ぽに串刺しにされたまま……はふぅ……皆の前を歩く、なんてぇ……んふぅぅぅっ」"
translation = "「히으으…… 핫, 하아아, 으으음. 여의 보지가, 자지에 꿰뚫린 채로…… 하후우…… 모두의 앞을 걷다니…… 응후우우.」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの膣は廊下に飛び出す瞬間を妄想しているのか、キュンキュンとわなないていた。"
translation = "클라우디아의 질은 복도로 뛰쳐나가는 순간을 망상하고 있는 것인지, 큥큥거리며 떨리고 있었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「くくくっ……んんっ。はぁ……貴様は口ばかり、達者だの。そんなリスキーなこと……ふぅ、貴様にはできまい。……よわよわだのう<emoji=heart04>\u3000ざぁ～こ<emoji=heart04>」"
translation = "「쿠쿠쿠…… 으음. 하아…… 귀공은 입만 살았구나. 그런 리스키한 짓…… 후우, 귀공에게는 못 하겠지. ……허약하구나<emoji=heart04> 허~접<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぁ、あぁんっ……ほれ、どうした？\u3000んんっ……廊下に出ないのか？\u3000はぁぁっ……情けないのぅ～<emoji=heart04>\u3000根性なし<emoji=heart04>\u3000かっこわるすぎ～<emoji=heart04>\u3000……んくぅぅ」"
translation = "「하아, 아앙…… 자, 왜 그러느냐? 으음…… 복도로 나가지 않는 것이냐? 하아아…… 한심하구나~<emoji=heart04> 근성 없는 녀석<emoji=heart04> 너무 꼴사나워~<emoji=heart04> ……응쿠우우.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「やはり貴様が余を屈服させるなど、１０００年早かったのぅ～。んふぅ……よいぞ、このまま余がざこち○ぽから、搾り取ってやる<emoji=heart04>\u3000……はぁぁん」"
translation = "「역시 귀공이 여를 굴복시키는 건, 1000년은 일렀구나~. 응후…… 좋다, 이대로 여가 허접 자지로부터, 짜내 주마<emoji=heart04> ……하아앙.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んんぅっ……体を拘束して、マウント取ったつもりだったのだろうが……はぁぁ……所詮貴様は、その程度<emoji=heart04>」"
translation = "「으으음…… 몸을 구속하고, 마운트를 땄다고 생각했겠지만…… 하아아…… 결국 귀공은, 그 정도<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「負けてしまえ<emoji=heart04>\u3000余のおま○こに情けなく精液を出せばよいのだ<emoji=heart04>\u3000あぁっんうっ、軟弱な魔王め……<emoji=heart04>」"
translation = "「져버려라<emoji=heart04> 여의 보지에 한심하게 정액을 내보내면 되는 것이다<emoji=heart04> 아앗응으, 연약한 마왕 같으니……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの煽りを聞くたびにペニスがイライラして大きくなる。"
translation = "클라우디아의 도발을 들을 때마다 페니스가 울컥하며 커진다."

[[dialogue]]
speaker = "unk"
original = "クラウディアのおま○こは、まるでそれを喜ぶように一層締め付けを強くしていた。"
translation = "클라우디아의 보지는, 마치 그것을 기뻐하듯 한층 더 조임을 강하게 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "だから、俺は彼女の期待に応えるように、じゅぷじゅぷと本気汁で泡立つおま○こ目がけて、ペニスを深くねじ込んだ。"
translation = "그래서, 나는 그녀의 기대에 부응하듯, 쥬릅쥬릅 애액으로 거품 이는 보지를 향해, 페니스를 깊숙이 박아 넣었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んぐぅぅぅ……っ！\u3000はっ、ああぁぁぁんっ。ち○ぽ、おま○こに深くっ……あぁんっ。刺さってりゅうぅぅ……っ」"
translation = "「응구우우우……! 핫, 아아아아앙. 자지, 보지에 깊숙이…… 아앙. 박히고 있어어……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はっ、あぁぁんっ。んんっ……お、怒ったのか？\u3000あぁんっ。図星だったのだろう<emoji=heart04>\u3000あんっ……ざこち○ぽ<emoji=heart04>\u3000雑魚め<emoji=heart04>\u3000ば～か<emoji=heart04>\u3000んふぅぅぅ」"
translation = "「핫, 아아앙. 으음…… 화, 화난 것이냐? 아앙. 정곡을 찔린 모양이구나<emoji=heart04> 아앙…… 허접 자지<emoji=heart04> 허접 녀석<emoji=heart04> 바~보<emoji=heart04> 응후우우.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「所詮人間のオスなど……んふぅぅ……っ。余がおま○こで可愛がってやれば……はぁんっ。情けなく精液びゅるびゅるするしか……できないのだ<emoji=heart04>\u3000んんんっ」"
translation = "「결국 인간 수컷 따위…… 응후우우…… 여가 보지로 귀여워해 주면…… 하앙. 한심하게 정액 뷰루뷰루하는 것밖에…… 못 하는 것이니라<emoji=heart04> 으으음.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ちょろいのぉ<emoji=heart04>\u3000あふぅ……っ。ほれ、出せ、出せ<emoji=heart04>\u3000ざこち○ぽからざこ精子出せ<emoji=heart04>\u3000出せ、出せ、出せっ<emoji=heart04>」"
translation = "「만만하구나<emoji=heart04> 아후우…… 자, 내보내라, 내보내<emoji=heart04> 허접 자지에서 허접 정자 내보내라<emoji=heart04> 내보내, 내보내, 내보내라고!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クラウディアももう余裕がないのか、射精をうながすように口でもおま○こでも激しくペニスを責め立てる。"
translation = "클라우디아도 이제 여유가 없는지, 사정을 재촉하듯 입으로도 보지로도 격렬하게 페니스를 몰아붙인다."

[[dialogue]]
speaker = "unk"
original = "だから俺は──"
translation = "그래서 나는──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「は？\u3000……え？\u3000な、なんで？\u3000なぜ止まるのだ。あと少しで……っ……」"
translation = "「하? ……에? 왜, 왜? 어째서 멈추는 것이냐. 조금만 더 있으면……! ……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「～～～～っ。くぅぅぅ、な、何も言っておらん！\u3000とにかく、ち○ぽを止めるでない……っ」"
translation = "「~~~~~~~~! 쿠우우, 아, 아무 말도 안 했다! 어쨌든, 자지를 멈추지 마라……!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアは俺におしっこのポーズを取らされたまま、少しでもおま○こで快感を得ようと情けなく腰をヘコヘコさせる。"
translation = "클라우디아는 나에게 오줌 싸는 포즈를 강요당한 채, 조금이라도 보지로 쾌감을 얻으려고 한심하게 허리를 옴찔옴찔 흔든다."

[[dialogue]]
speaker = "unk"
original = "しかし、がっちりとももを掴まれているため大して動くこともできず、おま○こは切なそうにひくひくと震えるばかりだった。"
translation = "하지만 허벅지를 꽉 붙잡힌 탓에 크게 움직일 수도 없었고, 보지는 애처롭게 움찔움찔 떨릴 뿐이었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「な、何のつもりだ……んんんっ……貴様だって、射精が近かったはず……ふぅぅっ。余にはわかっているのだぞっ」"
translation = "「무, 무슨 속셈이냐…… 으으으…… 네놈도 사정이 가까웠을 텐데…… 후우우. 여는 다 알고 있다니까」"

[[dialogue]]
speaker = "unk"
original = "そうかもしれないが、生意気ばかり言うメスガキおま○こに、このままご褒美をあげるわけにはいかない。"
translation = "그럴지도 모르지만, 건방진 소리만 해대는 메스가키 보지에 이대로 포상을 줄 수는 없다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふーーっ、ふーーっ……うぅぅ。どうして動かないのだ。ほら、素直になれっ、ざこち○ぽに正直になるのだっ」"
translation = "「후우, 후우…… 으으. 어째서 움직이지 않는 것이냐. 자, 솔직해져라, 잡어 자지에게 솔직해지란 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「素直になるのは余のほう──だと？\u3000うっ、くぅぅっ……ぁっ、はぁんっ<emoji=heart04>」"
translation = "「솔직해져야 하는 건 여 쪽──이라고? 윽, 끄으으…… 아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「くぅぅぅっ。……ふぅぅぅぅっ」"
translation = "「끄으으으. ……후우우우우」"

[[dialogue]]
speaker = "unk"
original = "クラウディアのおま○こが、きゅうきゅうとペニスを締めつけてくる。"
translation = "클라우디아의 보지가 꽉꽉 페니스를 조여 온다."

[[dialogue]]
speaker = "unk"
original = "俺はその気持ちよさに耐えながら、クラウディアの屈服の瞬間を待った――"
translation = "나는 그 기분 좋음을 견디며, 클라우디아가 굴복하는 순간을 기다렸다──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「わ、わかった……！\u3000余の負けだ。負けでいい……っ！\u3000本当に雑魚なのは、余のおま○この方だった……んぐぅ、ふぁぁあああぁぁぁっ<emoji=heart04>」"
translation = "「아, 알았다……! 여의 패배다. 패배로 좋다……! 정말로 잡어인 건, 여의 보지 쪽이었다…… 응구, 화아아아아아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んんんんんぅ！\u3000はぁぁっ、あんっ、あんっ、あん……っ。はげしいっ。おち○ぽ<emoji=heart04>\u3000おち○ぽ来てる<emoji=heart04>\u3000余のざこま○こ、気持ちよくされてりゅ……<emoji=heart04>\u3000あああぁぁっ」"
translation = "「으으으으응! 하아아, 앙, 앙, 앙…… 하아. 격렬해. 자지<emoji=heart04> 자지가 오고 있어<emoji=heart04> 여의 잡어 보지, 기분 좋게 되어버렷……<emoji=heart04> 아아아아」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んああっ……深いっ、激しいぃ……っ。じゅぶじゅぶ、ざこま○こに逞しいおち○ぽっ……あああっ。ちゅきさされてりゅぅ……っ。ふあぁあぁぁっ」"
translation = "「응아아…… 깊어, 격렬해…… 쥬부쥬부, 잡어 보지에 늠름한 자지가…… 아아아. 꿰뚫리고 있어어…… 후아아아아」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「きもちいい<emoji=heart04>\u3000きもちいいっ<emoji=heart04>\u3000きもちいい……っ<emoji=heart04>\u3000ああああっ、おち○ぽに負けるのきもちいい<emoji=heart04>\u3000ふぁぁぁっ」"
translation = "「기분 좋아<emoji=heart04> 기분 좋아<emoji=heart04> 기분 좋아……<emoji=heart04> 아아아아, 자지에게 지는 거 기분 좋아<emoji=heart04> 화아아아」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「こんなことされたら、んんんっ……二度とっ、貴様のおち○ぽに、勝てなくなる<emoji=heart04>\u3000はぁぁぁんっ、ざこメスになりゅぅぅぅ<emoji=heart04>」"
translation = "「이런 짓을 당하면, 으으으…… 두 번 다시, 네놈의 자지에게 이길 수 없게 되어버려<emoji=heart04> 하아아앙, 잡어 암컷이 되어버렷<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あっ、あっ、あっ。おち○ぽふくらんできたっ……はぁぁ。わかる、わかる、ぞっ。でる、でるんだな<emoji=heart04>\u3000あぁぁぁあっ」"
translation = "「앗, 앗, 앗. 자지가 부풀어 올랐어…… 하아아. 안다, 알고 있다구. 나온다, 나오는구나<emoji=heart04> 아아아아아」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふわぁぁっ。出して、ざこま○こにザーメン<emoji=heart04>\u3000おち○ぽのつよつよザーメン、中出ししてぇ<emoji=heart04>\u3000……んくぅぅぅっ」"
translation = "「후와아아. 내보내줘, 잡어 보지에 정액<emoji=heart04> 자지의 강한 정액, 질내사정 해줘어<emoji=heart04> ……응쿠우우우」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの完全に蕩けてしまったエロ可愛い声に、ペニスはすぐに限界を迎えそうになる。"
translation = "클라우디아의 완전히 녹아버린 에로하고 귀여운 목소리에, 페니스는 금방이라도 한계에 다다를 것 같았다."

[[dialogue]]
speaker = "unk"
original = "俺はこの快感を１秒でも長く共有したくて、ペニスの根元に力を込めてクラウディアの膣を擦り上げる。"
translation = "나는 이 쾌감을 1초라도 더 길게 공유하고 싶어서, 페니스 뿌리에 힘을 주어 클라우디아의 질을 문지르며 밀어 올린다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んっはぁぁぁ……！\u3000子宮、子宮に当たってりゅっ。ああぁああぁっ！\u3000おま○こ気持ちいいっ。もっと、もっとおま○こしてっ。あっ、あっ、あっ！\u3000おま○こ来てりゅっ」"
translation = "「응하아아……! 자궁, 자궁에 닿고 있어. 아아아아아아! 보지 기분 좋아. 더, 더 보지 해줘. 앗, 앗, 앗! 보지 오고 있어」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「おち○ぽ<emoji=heart04>\u3000んんんっ、つよつよおち○ぽくる<emoji=heart04>\u3000きて、きて、きてぇ<emoji=heart04>\u3000はぁっ、はっ、はっ、はぁぁぁぁぁんっ。ふぁあぁぁぁ～～っ！」"
translation = "「자지<emoji=heart04> 응으으, 강한 자지 온다<emoji=heart04> 와줘, 와줘, 와줘어<emoji=heart04> 하아, 하, 하, 하아아아아앙. 화아아아아~~!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「もうダメっ、げんかいっ、イクっ……イク、イク、イク！\u3000イっちゃう！\u3000あっ、あっ、あっ、あ──」"
translation = "「이제 안 돼, 한계야, 가…… 가, 가, 가! 가버려! 앗, 앗, 앗, 아──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「イっ……クぅぅぅううぅぅぅううううぅぅぅぅ～～～～～っ！！」"
translation = "「가…… 버렷어어어어어어어어어어어어어어어어어어~~~~~!!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あああっ！\u3000あぁんっ……しゅごぃ。おち○ちん……ふぁぁ、まだびくびくして……んんんぅ」"
translation = "「아아아! 아앙…… 굉장해. 자지…… 화아, 아직도 움찔거리고…… 응으으으」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぁ……んんんっ、ふぅ。あああっ。……最後の一滴まで、余のおま○この中に、出し切るのだぞ<emoji=heart04>\u3000……んふぅぅ」"
translation = "「하아…… 응으으, 후우. 아아아. ……마지막 한 방울까지, 여의 보지 안에 다 쏟아내는 거다<emoji=heart04> ……응후우」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あぁんっ……はふぅ。もう、抜いてしまうのか？\u3000余のおま○こは貴様に敗北したのだから……好きにしてよいのだぞ？」"
translation = "「아앙…… 하후우. 벌써 빼버리는 것이냐? 여의 보지는 네놈에게 패배했으니까…… 마음대로 해도 좋다구?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「くっくっ──こういった趣向も……なかなか面白いのう。ふう、ふう……危うく心まで屈服してしまいそうだ」"
translation = "「큭큭── 이런 취향도…… 꽤 재미있구나. 후우, 후우…… 하마터면 마음까지 굴복해버릴 뻔했다」"

[[dialogue]]
speaker = "unk"
original = "結局、最後までノリノリだったクラウディア──"
translation = "결국, 마지막까지 신이 나 있었던 클라우디아──"

[[dialogue]]
speaker = "unk"
original = "『わからせエッチ』は相当お気に召したみたいだ。"
translation = "『참교육 섹스』는 상당히 마음에 든 모양이다."

[[dialogue]]
speaker = "unk"
original = "いつになくトロンと蕩けた声でクラウディアは甘えてくる。"
translation = "평소와 다르게 멍하니 녹아버린 목소리로 클라우디아는 어리광을 부려 온다."

[[dialogue]]
speaker = "unk"
original = "その様子を見て、またペニスが固さを取り戻してきた。"
translation = "그 모습을 보고, 다시 페니스가 딱딱함을 되찾기 시작했다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んっ、はぁぁ……。全然余裕そうじゃな<emoji=heart04>\u3000ほれ、そのつよつよわからせおち○ぽで、もっと余のざこま○こをを犯すのだ<emoji=heart04>」"
translation = "「응, 하아아……. 전혀 여유로운 모양이구나<emoji=heart04> 자, 그 강한 참교육 자지로 더 여의 잡어 보지를 범하는 거다<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「貴様のち○ぽのイライラが収まるまで、思う存分『ざあめん』を吐き出すのだぞ<emoji=heart04>」"
translation = "「네놈 자지의 짜증이 풀릴 때까지, 마음껏 『정액』을 쏟아내는 거다<emoji=heart04>」"

