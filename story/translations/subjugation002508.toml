[[dialogue]]
speaker = "unk"
original = "シャドウマリオンとの戦いを繰り広げるトワとリーリア達。"
translation = "섀도 마리온과의 싸움을 펼치는 토와와 리리아 일행."

[[dialogue]]
speaker = "unk"
original = "マリオンの能力である人形縫製によって、倒しても倒してもシャドウの数は増え続けるが――"
translation = "마리온의 능력인 인형 봉제에 의해 쓰러뜨려도 쓰러뜨려도 섀도의 수는 계속 늘어났지만――"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「リーリアちゃん、本当にすごい……！」"
translation = "「리리아 짱, 정말 대단해……!」"

[[dialogue]]
speaker = "unk"
original = "トワが味方全員の星力をブーストさせているとはいえ、それ以上にリーリアの戦闘能力の伸びは凄まじかった。"
translation = "토와가 아군 전원의 성력을 부스트시키고 있다고는 해도 그 이상으로 리리아의 전투 능력 성장은 엄청났다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「仮想空間ですから、出し惜しみ無しでぶっ放しちゃいますよ！\u3000福音の魔弾、８連！\u3000ハピネスイエロー！！」"
translation = "「가상 공간이니까 아낌없이 쏴버릴게요! 복음의 마탄, 8연사! 해피니스 옐로!!」"

[[dialogue]]
speaker = "unk"
original = "１発１発が凄まじい威力を誇る魔弾の早撃ちによって、シャドウが次々と倒されて行く。"
translation = "한 발 한 발이 엄청난 위력을 자랑하는 마탄의 속사에 의해 섀도가 차례차례 쓰러져 간다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「すごい連射と火力……！\u3000これ相手がマリオンさんじゃなかったら、一瞬で決着しちゃうレベルだよ！？」"
translation = "「엄청난 연사와 화력……! 이거 상대가 마리온 씨가 아니었다면 순식간에 결판났을 레벨이야!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ですが、その火力をもってしても、シャドウが増えるスピードとは互角です」"
translation = "「하지만 그 화력을 가지고도 섀도가 늘어나는 속도와는 호각입니다」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「そうだね。だけど――」"
translation = "「그렇네. 하지만――」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「想いに名付ける色は、もう決まった！」"
translation = "「마음에 이름 붙일 색은 이미 정했어!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、リーリアは片手に魔弾を生成し始める――！"
translation = "그렇게 말하며 리리아는 한 손에 마탄을 생성하기 시작했다――!"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「始まりは大いなる漆黒！\u3000原点の魔弾、ジェネシスブラック！」"
translation = "「시작은 거대한 칠흑! 원점의 마탄, 제네시스 블랙!」"

[[dialogue]]
speaker = "unk"
original = "指で魔弾を弾き、それは新たなる武器である巨大ライフルへと装填されていく。"
translation = "손가락으로 마탄을 튕기자 그것은 새로운 무기인 거대 라이플로 장전되어 갔다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「絆を繋ぐ新たなる純白！\u3000新星の魔弾、スーパーノヴァホワイト！」"
translation = "「유대를 잇는 새로운 순백! 신성의 마탄, 슈퍼노바 화이트!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「そして――最後の１発を彩るは、我が愛しき友たちとの青春！\u3000アオハルレインボー！」"
translation = "「그리고―― 마지막 한 발을 장식할 색은 나의 사랑스러운 친구들과의 청춘! 아오하루 레인보우!」"

[[dialogue]]
speaker = "unk"
original = "３発の弾倉に全て魔弾が収まり、リーリアはシャドウたちから大きく距離を取りながら、ライフルの砲口を向けた。"
translation = "세 발의 탄창에 모든 마탄이 담기고 리리아는 섀도들로부터 크게 거리를 두며 라이플의 포구를 겨눴다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「撃ち抜け！\u3000愛と絆の<b>融合</b>魔弾！！」"
translation = "「꿰뚫어라! 사랑과 유대의 <b>융합</b> 마탄!!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ディアレストレインボー！！！」"
translation = "「디어리스트 레인보우!!!」"

[[dialogue]]
speaker = "unk"
original = "ライフルから虹色に輝く魔法が撃ち放たれる。"
translation = "라이플에서 무지갯빛으로 빛나는 마법이 발사된다."

[[dialogue]]
speaker = "unk"
original = "そして、それは無数の色へと分かれ、全てのシャドウを追尾する閃光となる！"
translation = "그리고 그것은 무수한 색으로 나뉘어 모든 섀도를 추적하는 섬광이 된다!"

[[dialogue]]
speaker_original = "シャドウマリオン"
speaker_translation = "섀도우 마리온"
original = "「っ――――！」"
translation = "「윽――――!」"

[[dialogue]]
speaker = "unk"
original = "――果たして。"
translation = "――결과는."

[[dialogue]]
speaker = "unk"
original = "虹色の輝きが収まった後、マリオンのシャドウは仮想空間から一体残らず消え去っていた。"
translation = "무지갯빛 광채가 가라앉은 후 마리온의 섀도는 가상 공간에서 단 한 마리도 남지 않고 사라져 있었다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ふぅ……マジカルフィニッシュ☆\u3000ってね」"
translation = "「후우…… 매지컬 피니시☆ 라고나 할까」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「や、やった……！」"
translation = "「해, 해냈다……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「リーリアが、マリオンさんに勝った！」"
translation = "「리리아가 마리온 씨를 이겼어!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「これがリーリアさんの本気……！\u3000爆裂すごいです！」"
translation = "「이것이 리리아 씨의 진심……! 폭렬 대단해요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うわぁ～！\u3000リーリアちゃん、カッコいいぃ～～～っ！\u3000あたし、感動しちゃったよ～！」"
translation = "「우와아~! 리리아 짱, 멋있어어어~~~! 나 감동해버렸어~!」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「ふふっ、でしょ～？\u3000このアルカンシェルフォームに覚醒するの、マジカル苦労したんだから～」"
translation = "「후훗, 그럴 만하지~? 이 아르캉시엘 폼으로 각성하는 거 매지컬 고생했으니까~」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「マムに無人島へ放り込まれたとか言ってましたね」"
translation = "「마무에게 무인도로 내팽겨쳐졌다고 했었죠」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「そう！\u3000すごいスパルタでしんどくてさ～」"
translation = "「맞아! 엄청 스파르타라 힘들었다고~」"

[[dialogue]]
speaker = "unk"
original = "今回のバトルフェスタで魔女代表として選出された際、自身では力不足だと感じていたリーリアは、クロトにアルケインコードを試してもらおうと星徒会室を訪ねていた。"
translation = "이번 배틀 페스타에서 마녀 대표로 선출되었을 때 스스로 힘이 부족하다고 느꼈던 리리아는 쿠로토에게 아르케인 코드를 시도해달라고 성도회실을 찾아갔었다."

[[dialogue]]
speaker = "unk"
original = "その際、マハムートが偶然その場に居合わせており、「仕方ないから覚醒するまで鍛えてあげる」と何故か無人島で命がけのマンツーマンレッスンをすることになったのだった。"
translation = "그때 마하무트가 우연히 그 자리에 있었고 「어쩔 수 없으니 각성할 때까지 단련시켜 주마」라며 왠지 무인도에서 목숨을 건 맨투맨 레슨을 하게 된 것이었다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「――それで、なんか私のついでにアルケインコードを使ってもらって、さらっと自分だけ先にノヴァフォームに覚醒してるし～」"
translation = "「――그래서 왠지 내 하는 김에 아르케인 코드를 써달라더니 슬쩍 자기만 먼저 노바 폼으로 각성하고 말이야~」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「でもまぁ、おかげで私もこのフォームに覚醒することができたんで、マムには感謝してるけど……」"
translation = "「하지만 뭐, 덕분에 나도 이 폼으로 각성할 수 있었으니까 마무에겐 감사하고 있지만……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「とりあえず、勝ったからみんなで胴上げしよ、胴上げ！」"
translation = "「일단 이겼으니까 다 같이 헹가래 하자, 헹가래!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「おっ、いいね～！\u3000ふふふっ、渋谷リーリア。この妹魔王がそなたを今日の勇者と認めてしんぜよう♪」"
translation = "「오, 좋은데~! 후후후, 시부야 리리아. 이 여동생 마왕이 그대를 오늘의 용사로 인정해 주겠노라♪」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「えっ、ちょっ……本当にやるの！？」"
translation = "「엣, 잠깐…… 진짜 하는 거야!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「肯定。自分でもチヤホヤして欲しいと言ってましたしね」"
translation = "「긍정. 본인도 떠받들어지고 싶다고 했었으니까요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そういうことなら、私も爆裂お祝いしちゃいます！」"
translation = "「그런 거라면 저도 폭렬 축하해 드릴게요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「よ～し、満場一致だね！\u3000それじゃあ、せ～のっ♪」"
translation = "「좋아, 만장일치네! 그럼 하나~ 둘♪」"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「待って待って！\u3000胴上げってされるの、私生まれて初めてで……きゃあっ！？」"
translation = "「잠깐 잠깐! 헹가래 같은 거 받아보는 거 나 태어나서 처음이라…… 꺄악!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「いぇ～い。わっしょいわっしょい」"
translation = "「예~이. 영차 영차」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「わ～っしょい♪\u3000わ～っしょい♪」"
translation = "「영~차♪ 영~차♪」"

[[dialogue]]
speaker = "unk"
original = "そんな新星学園１年生組の胴上げを見つめるトワ。"
translation = "그런 신성학원 1학년 팀의 헹가래를 지켜보는 토와."

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「ふふっ、リーリアちゃん、よかった」"
translation = "「후훗, 리리아 짱, 잘됐다」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「トワ、なんだか自分のことのように嬉しそうですね」"
translation = "「토와, 왠지 자기 일처럼 기뻐 보이네요」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「あ、マリオン！\u3000うん、まあね♪」"
translation = "「아, 마리온! 응, 뭐 그렇지♪」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「もしかして最初から、リーリアさんの為に私のシャドウと戦いに来たんですか？」"
translation = "「혹시 처음부터 리리아 씨를 위해서 제 섀도와 싸우러 온 건가요?」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「星騎士として、わたしがマリオンに挑戦したかったのは、嘘じゃないよ」"
translation = "「성기사로서 내가 마리온에게 도전하고 싶었던 건 거짓말이 아니야」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「ただ……せっかく強くなったのに、リーリアちゃんが自信なさそうにしてるのは、もったいないなぁって」"
translation = "「다만…… 기껏 강해졌는데 리리아 짱이 자신 없어 하는 건 아깝다고 생각해서」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「リーリアちゃん自身が一番強さを理解してるマリオンに勝てれば、いいきっかけになるでしょ？」"
translation = "「리리아 짱 스스로가 가장 강함을 잘 아는 마리온을 이길 수 있다면 좋은 계기가 될 거 아냐?」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「だから共通のライバルであるマリオンのところまで、リーリアちゃんを引っ張ってきたんだぁ♪」"
translation = "「그래서 공통의 라이벌인 마리온이 있는 곳까지 리리아 짱을 끌고 온 거야♪」"

[[dialogue]]
speaker_original = "マリオン（覚醒）"
speaker_translation = "마리온(각성)"
original = "「ふふっ、いい大人になりましたね、トワ」"
translation = "「후훗, 좋은 어른이 되었네요, 토와」"

[[dialogue]]
speaker_original = "トワ先生（覚醒）"
speaker_translation = "토와 선생님(각성)"
original = "「いやいや、まだ全然若いけどね！？\u3000私は！」"
translation = "「아니 아니, 아직 한참 젊거든!? 나는!」"

[[dialogue]]
speaker = "unk"
original = "そう言って、リーリア達を見ながら笑い合うＯＧ組の２人なのだった――"
translation = "그렇게 말하며 리리아 일행을 보며 함께 웃는 OG 그룹 두 사람이었다――"

