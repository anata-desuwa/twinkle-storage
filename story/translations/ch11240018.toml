[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「久しぶりのデート、楽しかったぁ。ビリヤードで会長にも勝てたし、いい気分♪」"
translation = "「오랜만의 데이트, 즐거웠어. 당구로 회장에게도 이겼고, 기분 최고♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あそこで突き方を間違えなかったら……くそ。次は負けないからな」"
translation = "「거기서 큐를 내미는 법을 틀리지 않았더라면…… 젠장. 다음번엔 안 질 거니까」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ふふっ、再戦はいつでも受けて立つよ？\u3000敗者にはリベンジの機会をあげないとね～♪」"
translation = "「후훗, 재대결은 언제든 받아줄게? 패자에게는 복수의 기회를 줘야 하니까~♪」"

[[dialogue]]
speaker = "unk"
original = "環とはアルバイトをしていた時から、よく一緒に遊んでいた。"
translation = "타마키와는 아르바이트를 하던 시절부터 자주 함께 놀곤 했다."

[[dialogue]]
speaker = "unk"
original = "今日は久しぶりのビリヤードだったのだけど、俺は惜しいところで勝利を掻っ攫われてしまった。"
translation = "오늘은 오랜만의 당구였는데, 나는 아슬아슬한 차이로 승리를 가로채이고 말았다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「たくさん遊んだし……ねぇ会長。次は静かなところに行こうよ」"
translation = "「잔뜩 놀았으니까…… 저기 회장. 다음은 조용한 곳으로 가자」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「２人きりになりたいな。いいでしょ？」"
translation = "「둘이서만 있고 싶어. 괜찮지?」"

[[dialogue]]
speaker = "unk"
original = "環の声のトーンで『そういうことをする』のだとすぐにわかった。"
translation = "타마키의 목소리 톤으로 『그런 일을 하려는 것』임을 금방 알 수 있었다."

[[dialogue]]
speaker = "unk"
original = "俺は期待に胸を膨らませて、頷いたのだが──"
translation = "나는 기대로 가슴을 부풀리며 고개를 끄덕였는데──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かに静かで、２人きりになれる場所だけど……環、お前なあ」"
translation = "「확실히 조용하고 둘이서만 있을 수 있는 장소긴 하지만…… 타마키, 너 말이야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「いいじゃん。ここなら邪魔は入らないよ。ホテル代も浮くし、一石二鳥ってやつ？」"
translation = "「좋잖아. 여기라면 방해받을 일도 없어. 호텔비도 굳고, 일석이조랄까?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ずーっと離ればなれで、エッチなことをするのはご無沙汰じゃん？」"
translation = "「계속 떨어져 지내느라, 야한 짓 하는 건 오랜만이잖아?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「お互い溜まってるだろうし……スッキリしていこ<emoji=heart04>」"
translation = "「서로 쌓여있을 테니까…… 시원하게 풀고 가자<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「えへへー……会長のこと、押し倒しちゃった……<emoji=heart04>」"
translation = "「에헤헤ー…… 회장을 덮쳐버렸다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「おち○ちんの勃起、すごくない？\u3000フィーニスの塔は禁域だから～、とか言ってた割にヤる気満々じゃん……<emoji=heart04>」"
translation = "「자지 발기한 거, 엄청나지 않아? 피니스의 탑은 금역이니까~ 라든가 말했던 것치고는 할 마음 가득이잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "無茶を言わないでほしい……こんな絶景を前にして、反応するなという方が無理だ。"
translation = "억지 부리지 않았으면 좋겠다…… 이런 절경을 눈앞에 두고 반응하지 말라는 건 무리다."

[[dialogue]]
speaker = "unk"
original = "たわわという表現がぴったりのおっぱいに、快活な環らしい張りのあるお尻。うっとり上気した頬に、楽しそうな眼差し──"
translation = "탐스럽다는 표현이 딱 맞는 가슴에, 쾌활한 타마키다운 탄력 있는 엉덩이. 황홀하게 상기된 뺨에 즐거워 보이는 눈빛──"

[[dialogue]]
speaker = "unk"
original = "環とまた繋がれることに期待が高まり、ペニスに血が集まって仕方がない。"
translation = "타마키와 다시 이어질 수 있다는 기대감이 높아져, 페니스에 피가 몰려 어찌할 방도가 없다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「繋がる前からだらだらおつゆこぼして……これは相当溜まってるね？」"
translation = "「이어지기도 전부터 주르륵 국물을 흘리고…… 이거 상당히 쌓여 있네?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボク以外の女の子とエッチなこと、しなかったんだ？」"
translation = "「나 이외의 여자애랑 야한 짓, 안 했어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……するわけないだろ。俺の彼女は、環だけだ」"
translation = "「……할 리가 없잖아. 내 여자친구는 타마키뿐이야」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……正体をバラして行方をくらませた後に、会長が新しい彼女を作っても怒る権利はないなって思ってたんだけど」"
translation = "「……정체를 밝히고 자취를 감춘 뒤에, 회장이 새로운 여자친구를 만들어도 화낼 권리는 없겠지 싶었는데」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「えへ……すごく嬉しいや……<emoji=heart04>\u3000じゃあボクのこと、ずーっと一途に想ってくれてたこのおち○ちんに、たくさんお礼してあげないとね」"
translation = "「에헤…… 정말 기뻐……<emoji=heart04> 그럼 나를 줄곧 한결같이 생각해주었던 이 자지한테, 잔뜩 보답해줘야겠네」"

[[dialogue]]
speaker = "unk"
original = "反り返ったペニスの裏筋を、環が女性器で磨くようにこすりつけてくる。"
translation = "휘어지듯 발기한 페니스의 뒷줄기를, 타마키가 성기로 닦아내듯 비벼온다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あは♪\u3000またトロトロって、おち○ちんのおつゆ出てきた……<emoji=heart04>」"
translation = "「아하♪ 또 걸쭉하게, 자지 국물 나왔어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「会長とは今まで、色んなところでエッチしてきたよね？\u3000星徒会室とか、学園のトイレとか……<emoji=heart04>」"
translation = "「회장이랑은 지금까지 여러 곳에서 야한 짓 해왔지? 성도회실이라든가, 학원 화장실이라든가……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まだ彼女が『市倉環』を名乗っていた時に、俺たちはセックスを覚えた。両想い同士、性器で繋がる気持ちよさに思いきりハマって、盛っていた。"
translation = "아직 그녀가 『이치쿠라 타마키』를 자칭하고 있었을 때, 우리들은 섹스를 배웠다. 서로 사랑하는 사이끼리, 성기로 이어지는 기분 좋음에 푹 빠져서 발정해 있었다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「今までしてきたどのエッチよりも、気持ちいいセックスしようね<emoji=heart04>」"
translation = "「지금까지 했던 그 어떤 야한 짓보다도, 기분 좋은 섹스 하자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環の女性器の入口が、ペニスの先端にぬちりと絡みついて──"
translation = "타마키의 성기 입구가 페니스 끝에 눅진하게 얽혀들며──"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「会長、大好き──<emoji=heart04>」"
translation = "「회장, 너무 좋아──<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「んんぁああっ──あぁ、ああぁぁぁあー……っ<emoji=heart04>」"
translation = "「응으아아앗──아아, 아아아아아아ー……읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "狭い膣内を掻き分けていく、凄まじい快感にクラクラする。"
translation = "좁은 질 내부를 헤치고 들어가는 엄청난 쾌감에 아찔해진다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あ、あぁああっ……<emoji=heart04>\u3000うぁー……<emoji=heart04>\u3000久しぶりだと、きょ、強烈、かもっ……<emoji=heart04>\u3000太くて、長くてっ……<emoji=heart04>」"
translation = "「아, 아아아앗……<emoji=heart04> 우아ー……<emoji=heart04> 오랜만이라 그런지, 겨, 강력할지도……<emoji=heart04> 굵고, 길어서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「おち○ちん、<ruby>挿入<rt>い</rt></ruby>れただけでビクビクすっごい……あ、あぁっ<emoji=heart04>\u3000ホント、気持ちいいっ……<emoji=heart04>」"
translation = ""

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「会長は、どう……？\u3000久しぶりの、ボクのおま○こ……<emoji=heart04>」"
translation = "「회장은 어때……? 오랜만인, 내 보지……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気を抜いたら漏れ出てしまいそうなくらい、気持ちがいい──歯を食いしばりながら、何とか環に伝える。"
translation = "정신을 놓으면 새어 나가버릴 정도로 기분이 좋다── 이를 악물며 어떻게든 타마키에게 전한다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ふふ<emoji=heart04>\u3000素直でカワイイ反応……おかしいなあ、ボクのスパッツ破いてお猿さんになってたキミはどこに行っちゃったのかなー<emoji=heart04>」"
translation = "「후후<emoji=heart04> 솔직하고 귀여운 반응…… 이상하네, 내 스패츠를 찢고 원숭이가 됐던 너는 어디로 가버린 걸까나ー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなこともあったな。興奮して思わず破いちゃって、ノーパンで環を帰宅させちゃったんだっけ。"
translation = "그런 일도 있었지. 흥분해서 그만 찢어버려서, 노팬티로 타마키를 귀가시켰었나."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「今日はあの日の仕返しもさせてもらおっかな～……<emoji=heart04>\u3000ボクが思いっきり動いて、ひぃひぃ言わせてあげるっ<emoji=heart04>\u3000んぅっ<emoji=heart04>」"
translation = "「오늘은 그날의 복수도 하게 해줄까나~……<emoji=heart04> 내가 마음껏 움직여서, 히이히이 소리 나게 해줄게<emoji=heart04> 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「んんぁっ……あっ、あぁあっ……<emoji=heart04>\u3000はぁあ、んんぅっ……<emoji=heart04>\u3000あ、あぁっ……あぁぁあっ……<emoji=heart04>」"
translation = "「응으앗…… 앗, 아아앗……<emoji=heart04> 하아아, 응으읏……<emoji=heart04> 아, 아앗…… 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「おち○ちんっ……すっごく、硬い、ねっ<emoji=heart04>\u3000あ、あぁっ……<emoji=heart04>\u3000ボクのおま○こ、広げられてっ──ぁ、あぁっ……<emoji=heart04>」"
translation = "「자짓…… 엄청나게 딱딱하네<emoji=heart04> 아, 아앗……<emoji=heart04> 내 보지가 벌려져서──아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「会長は、今日はっ……そのままね？\u3000ボクがずーっと、上に乗って……責めて、あげる、からっ<emoji=heart04>\u3000はぁあ、んんんぅっ……<emoji=heart04>」"
translation = "「회장은 오늘은…… 그대로 있어? 내가 계속 위에 올라타서…… 괴롭혀 줄 테니까<emoji=heart04> 하아아, 응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「目を逸らすの、禁止だよー……？\u3000ほら、じぃ～って<emoji=heart04>\u3000見なきゃ、だー、めっ<emoji=heart04>\u3000彼女のおっぱい、揺れてる、よっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「시선 피하는 거 금지야ー……? 자, 뚫어져라~ 하구<emoji=heart04> 안 보면, 안ー돼<emoji=heart04> 여자친구 가슴이 흔들리고 있어<emoji=heart04> 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環に視線を誘導されて、大きく弾むおっぱいを注視してしまう。"
translation = "타마키에게 시선을 유도당해, 크게 출렁이는 가슴을 주시하게 된다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「──んんんっ<emoji=heart04>\u3000あっは♪\u3000わかりやすい、なぁっ……おち○ちんビクビク動いてっ……<emoji=heart04>」"
translation = "「──응응읏<emoji=heart04> 앗하♪ 알기 쉽네…… 자지가 움찔움찔 움직이고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「キミ、大きなおっぱい好きじゃん？\u3000たぶん、離れてる間に、おっきくなったんだよねっ……んんんっ<emoji=heart04>\u3000あ、あぁっ<emoji=heart04>」"
translation = "「너, 큰 가슴 좋아하잖아? 아마 떨어져 있는 동안에 커진 것 같거든…… 응응읏<emoji=heart04> 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「よりキミ好みの女の子になれたと思うん、だけどっ……嬉しい？\u3000あ、あぁっ<emoji=heart04>\u3000嬉しかったら、もっと感じてるところ、見せて──んんっ<emoji=heart04>」"
translation = "「보다 네 취향인 여자애가 되었다고 생각하는데…… 기뻐? 아, 아앗<emoji=heart04> 기쁘다면 더 느끼고 있는 모습 보여줘── 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「あ、ああぁっ<emoji=heart04>\u3000はぁあ、んんんぅっ……<emoji=heart04>\u3000気持ち、ぃっ……やっぱりボク、奥のところ、好きかもっ……んぁ、ああぁっ<emoji=heart04>」"
translation = "「아, 아아앗<emoji=heart04> 하아아, 응응읏……<emoji=heart04> 기분, 조아…… 역시 나, 깊숙한 곳이 좋을지도…… 응아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「キミにいっぱい、突きまくられてっ……おま○この奥、すっごく敏感になっちゃったんだよねっ……ぁ、あぁあっ<emoji=heart04>」"
translation = "「너한테 잔뜩 찔려대서…… 보지 안쪽이 엄청 민감해져 버렸나 봐…… 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「エッチなこと、ご無沙汰でもっ……弱いところは変わんないね……あ、ぁっ<emoji=heart04>\u3000ふあぁ、あ、あぁっ<emoji=heart04>」"
translation = "「야한 짓, 오랜만이라도…… 약한 곳은 변함없네…… 아, 앗<emoji=heart04> 후아아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環がお尻を上下させるたび、おっぱいがたぷんたぷんと揺れている。"
translation = "타마키가 엉덩이를 상하로 흔들 때마다 가슴이 타푼타푼 흔들리고 있다."

[[dialogue]]
speaker = "unk"
original = "しっとり汗ばんで、フィーニスの塔の光でキラキラと輝く恋人の胸──今さらだけど本当にいけないことをしている気がしてきた……"
translation = "촉촉하게 땀이 배어 피니스의 탑 빛에 반짝반짝 빛나는 연인의 가슴── 새삼스럽지만 정말 해서는 안 될 일을 하고 있다는 느낌이 들기 시작했다……"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「興奮する、ねっ……しちゃいけないところで、えっちなこと、するのっ……んんぅ、はぁあっ<emoji=heart04>\u3000あっ、ぁあ、んんっ<emoji=heart04>」"
translation = "「흥분되네…… 해서는 안 될 곳에서 야한 짓 하는 거…… 응으, 하아앗<emoji=heart04> 앗, 아아, 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボクのおっぱい、好きなのはわかるけど、こっちは、どうかなっ<emoji=heart04>\u3000お尻っ<emoji=heart04>\u3000ぱんぱんって、打ち付けてっ──んんんっ<emoji=heart04>」"
translation = "「내 가슴 좋아하는 건 알겠는데, 이쪽은 어떨까나<emoji=heart04> 엉덩이! 팡팡 하고 부딪히며── 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アクティブに駆け回って、運動部のヘルプも頼まれていた環。"
translation = "활기차게 뛰어다니며 운동부의 헬프도 부탁받던 타마키."

[[dialogue]]
speaker = "unk"
original = "スポーツ少女と言えばいいのか、太ももからお尻のラインは、むっちり肉付きがいい。"
translation = "스포츠 소녀라고 해야 할까, 허벅지에서 엉덩이로 이어지는 라인은 살집이 통통하게 올라 있다."

[[dialogue]]
speaker = "unk"
original = "ペニスに打ち付けられるたび、柔らかくてハリのあるお尻の感触がダイレクトに伝わってきて──"
translation = "페니스에 부딪힐 때마다 부드럽고 탄력 있는 엉덩이의 감촉이 다이렉트로 전해져와서──"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ぁ、あ、ぁ──っ<emoji=heart04>\u3000おち○ちん、もっとガチガチにっ……あは♪\u3000ボクのピストン、たまらないんだっ<emoji=heart04>」"
translation = "「아, 아, 아──앗<emoji=heart04> 자지, 좀 더 꽉딱딱하게…… 아하♪ 내 피스톤, 못 참겠지?」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「じゃあもっと、んんっ<emoji=heart04>\u3000してあげるっ<emoji=heart04>\u3000ほーらっ<emoji=heart04>\u3000ぱん、ぱんっ<emoji=heart04>\u3000ぱんっ……ぱんっ<emoji=heart04>\u3000あ、あ──やばっ<emoji=heart04>\u3000気持ち、ぃっ<emoji=heart04>」"
translation = "「그럼 더, 응읏<emoji=heart04> 해줄게! 자아! 팡, 팡! 팡…… 팡…… 아, 아── 위험해<emoji=heart04> 기분, 조아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「キミのおち○ちん、気持ちいいっ……ふぁあ、あぁっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ふぅう、あっぁあっ<emoji=heart04>」"
translation = "「너의 자지, 기분 좋아…… 후아아, 아앗<emoji=heart04> 응응읏<emoji=heart04> 후우우, 앗아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "開けた塔の中で、セックスに耽る背徳感がスパイスになっていた。"
translation = "탁 트인 탑 안에서 섹스에 몰두하는 배덕감이 향신료가 되고 있었다."

[[dialogue]]
speaker = "unk"
original = "おまけに、あまりに久しぶりな恋人同士のまぐわい──もう、ゆっくりした動きでは物足りない。"
translation = "게다가 너무나도 오랜만인 연인끼리의 정사── 이제 느린 움직임으로는 만족할 수 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「環っ……」"
translation = "「타마키……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……も～♪\u3000しょうがない、なぁっ<emoji=heart04>」"
translation = "「……정말♪ 어쩔 수 없네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "付き合いが長いから、たったこれだけのやり取りで、全てが伝わる。"
translation = "사귄 지 오래되었기에, 단지 이 정도의 대화만으로도 모든 것이 전해진다."

[[dialogue]]
speaker = "unk"
original = "環は俺の胸元についた両腕に力を込めて、お尻をぐいっと持ち上げて──"
translation = "타마키는 내 가슴팍에 댄 양팔에 힘을 주고 엉덩이를 쑥 들어 올려──"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「んあぁあっ！\u3000あっあっ、あっあっあっ、あぁぁっ──！\u3000んんんぅっ<emoji=heart04>\u3000んぁあっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「응아아앗! 앗앗, 앗앗앗, 아아아앗──! 응응응읏<emoji=heart04> 응아앗<emoji=heart04> 하아앗<emoji=heart04> 하아앗<emoji=heart04> 하아앗<emoji=heart04> 응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「これ、して欲しかったん、でしょっ<emoji=heart04>\u3000速～い、ぱんぱんっ<emoji=heart04>\u3000キミの大好きなお尻、いっぱい、乱暴に、ぶつけてっ──んんんぅっ<emoji=heart04>」"
translation = "「이거, 하고 싶었지? 빠르게, 팡팡! 네가 제일 좋아하는 엉덩이, 잔뜩, 난폭하게 부딪혀서── 응응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "隙間なくぴっちりと狭まる膣内。"
translation = "빈틈없이 꽉 조여오는 질 내부."

[[dialogue]]
speaker = "unk"
original = "環のおへその裏までペニスの先端が導かれ、同時にぎゅうぎゅうと搾られて──眩暈がするくらいに心地いい。"
translation = "타마키의 배꼽 근처까지 페니스 끝이 이끌리고, 동시에 꽉꽉 짜여져── 현기증이 날 정도로 기분이 좋다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「んあぁ、あ、あぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はっ、ぁあ、んんっ<emoji=heart04>\u3000んっんっんっんっんっ<emoji=heart04>\u3000会長、興奮、しすぎ、だってば──ぁあっ<emoji=heart04>」"
translation = "「응아아, 아, 아앗<emoji=heart04> 하아앗<emoji=heart04> 하앗, 아아, 응읏<emoji=heart04> 응응응응응<emoji=heart04> 회장, 너무 흥분했다니까── 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「おち○ちん、ヤバいくらい、ガッチガチっ──ん、んんんうっ<emoji=heart04>\u3000ああ、はぁあっ<emoji=heart04>\u3000奥っ<emoji=heart04>\u3000おま○この奥、ズンズン、当たるっ<emoji=heart04>」"
translation = "「자지, 위험할 정도로 꽉딱딱해── 응, 응응응웃<emoji=heart04> 아아, 하아앗<emoji=heart04> 안쪽! 보지 안쪽이 즈음즈음 닿아!」"

[[dialogue]]
speaker = "unk"
original = "環の甘くとろけた声が、耳に届くたびに興奮が高まっていく。"
translation = "타마키의 달콤하게 녹아내린 목소리가 귀에 닿을 때마다 흥분이 고조된다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ずっと、キミとえっち……したかったからっ<emoji=heart04>\u3000腰、止まんないっ<emoji=heart04>\u3000んぁ、あぁっ<emoji=heart04>\u3000ふぅう、んぁ、あぁあっ<emoji=heart04>」"
translation = "「계속 너랑 야한 짓…… 하고 싶었으니까! 허리가 안 멈춰! 응아, 아아앗<emoji=heart04> 후우우, 응아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「おち○ちんとおま○こで繋がって、気持ちいいこと、ずっとしたかった……１人でシても、寂しい、ばっかりでっ──あっ……」"
translation = "「자지랑 보지로 이어져서 기분 좋은 일, 계속하고 싶었어…… 혼자서 자위해도 외롭기만 해서── 앗……」"

[[dialogue]]
speaker = "unk"
original = "１人で、していた？\u3000環が？"
translation = "혼자서 하고 있었다고? 타마키가?"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「な、なんだよぉっ……その目っ<emoji=heart04>\u3000あ、ちょっと──」"
translation = "「머, 뭐야…… 그 눈은<emoji=heart04> 아, 잠시──」"

[[dialogue]]
speaker = "unk"
original = "環の肩を引き寄せて、唇を奪った。"
translation = "타마키의 어깨를 끌어당겨 입술을 빼앗았다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ふぅむむむっ！？\u3000んんぅうっ<emoji=heart04>\u3000んぅちゅ、んちゅっ、れぇ、んちゅる、んちゅぅ、んちゅる、れるれるっ<emoji=heart04>」"
translation = "「후으믐믐뭇!? 응응우웃<emoji=heart04> 응우츄, 응츄, 레에, 응츄르, 응츄우, 응츄르, 레를레를<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「いきなりキス、んぅう<emoji=heart04>\u3000れぇ、りゅるっ<emoji=heart04>\u3000んぅちゅるっ、じゅるぅ、んれぇ、れりゅ、んちゅぅうっ……んんんぅ<emoji=heart04>」"
translation = "「갑자기 키스, 응으으<emoji=heart04> 레에, 류릇<emoji=heart04> 응우츄르, 쥬르으, 응레에, 레류, 응츄우우읏…… 응응응으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を深く絡めると、環からもお返しのように舌が返ってくる。"
translation = "혀를 깊게 섞자 타마키로부터도 보답하듯 혀가 돌아온다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「会長っ……んぅ<emoji=heart04>\u3000れえ、んちゅるっ<emoji=heart04>\u3000好き……んちゅ<emoji=heart04>\u3000好き、好きっ……んちゅぅ<emoji=heart04>\u3000れぇ、れるれる、れぇえ<emoji=heart04>」"
translation = "「회장…… 응우<emoji=heart04> 레에, 응츄르<emoji=heart04> 좋아해…… 응츄<emoji=heart04> 좋아해, 좋아해…… 응츄우<emoji=heart04> 레에, 레를레를, 레에에<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「キミと、んぅ<emoji=heart04>\u3000繋がるの……んちゅる、れぇれろ<emoji=heart04>\u3000幸せっ……好き、好き<emoji=heart04>\u3000好きっ……<emoji=heart04>\u3000ちゅぅ、ちゅぱ<emoji=heart04>」"
translation = "「너랑, 응우<emoji=heart04> 이어지는 거…… 응츄르, 레에레로<emoji=heart04> 행복해…… 좋아해, 좋아해, 좋아해……<emoji=heart04> 츄우, 츄파<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「れぇ、れろれろ<emoji=heart04>\u3000ボクのこと、もっと好きって……んちゅる<emoji=heart04>\u3000言って<emoji=heart04>\u3000れぇ、れろ<emoji=heart04>\u3000聞かせて、キミの、気持ち……れりゅちゅるっ<emoji=heart04>」"
translation = "「레에, 레로레로<emoji=heart04> 나를 더 좋아한다고…… 응츄르<emoji=heart04> 말해줘<emoji=heart04> 레에, 레로<emoji=heart04> 들려줘, 너의 마음…… 레류츄르앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あのさっぱりした環とは思えないくらい、甘くとろけた声でおねだりをしてこられて、頭の芯が痺れる。"
translation = "그 담백하던 타마키라고는 생각되지 않을 만큼 달콤하게 녹아내린 목소리로 보채는 통에 머릿속이 저릿하다."

[[dialogue]]
speaker = "unk"
original = "愛しい彼女の名前をたくさん呼ぶ。"
translation = "사랑스러운 그녀의 이름을 잔뜩 부른다."

[[dialogue]]
speaker = "unk"
original = "環、環、環──好きだ、好きだ、好きだ──呼びながら、夢中で舌を絡めたおす。"
translation = "타마키, 타마키, 타마키── 좋아해, 좋아해, 좋아해── 부르며 정신없이 혀를 섞는다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「んぅじゅるっ<emoji=heart04>\u3000れるれるれるっ……ボクも<emoji=heart04>\u3000ボクも好き<emoji=heart04>\u3000大好きっ……んちゅぅ、じゅるる、んれぇ、れりゅれるっ──<emoji=heart04>」"
translation = "「응우쥬릇<emoji=heart04> 레를레를레를…… 나도<emoji=heart04> 나도 좋아해, 정말 좋아해…… 응츄우, 쥬르르, 응레에, 레류레를──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスの最中、環がまた、何か言いたげに俺を見た──それだけで俺は全て察した。"
translation = "키스 도중 타마키가 다시 무언가 말하고 싶은 듯 나를 보았다── 그것만으로 나는 모든 것을 알아챘다."

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、環はぷはっとキスをやめて──今日一番強いピストンを、ペニスにぶつけてきた。ラストスパートだ。"
translation = "내가 고개를 끄덕이자 타마키는 푸하 하고 키스를 멈추고── 오늘 중 가장 강한 피스톤을 페니스에 부딪쳐 왔다. 라스트 스퍼트다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「──ひぅう、んんんっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっあっあっあっあっあっあっ<emoji=heart04>\u3000ふぁあ、あっあっあっあっ──ん、んんぅっ<emoji=heart04>」"
translation = "「──히우우, 응응응<emoji=heart04> 응아앗<emoji=heart04> 앗앗앗앗앗앗앗<emoji=heart04> 후아아, 앗앗앗앗── 응, 응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「一緒にっ<emoji=heart04>\u3000ボクと、一緒に、イこっ？\u3000会長、一緒にっ<emoji=heart04>\u3000一緒にイこう、ねっ<emoji=heart04>\u3000んっんっんっんっんっんっんっ<emoji=heart04>」"
translation = "「함께! 나랑 함께 가자? 회장, 같이! 같이 가자, 응? 응응응응응응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗だくのお尻を力強くぶつけて、そのたびにペニスがぐちゅぐちゅと磨かれ、どんどん精液がせり上がってくる。"
translation = "땀범벅인 엉덩이를 힘차게 부딪치고, 그때마다 페니스가 구축구축 닦여지며 정액이 점점 밀려 올라온다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「キミの精液、いっぱいちょうだいっ<emoji=heart04>\u3000ボクのお腹に、赤ちゃんのお部屋にっ<emoji=heart04>\u3000入りきらないくらいっ<emoji=heart04>\u3000びゅーってしてっ<emoji=heart04>」"
translation = "「너의 정액, 잔뜩 줘! 내 배 속에, 아기 방에! 다 안 들어갈 정도로! 뷰우우 하고 해줘!」"

[[dialogue]]
speaker = "unk"
original = "もう我慢も、限界だ──"
translation = "이제 참는 것도 한계다──"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「会長、好きっ<emoji=heart04>\u3000大好きっ──射精してっ<emoji=heart04>\u3000して、して、してしてしてっ──<emoji=heart04>」"
translation = "「회장, 좋아해! 정말 좋아해── 사정해줘! 해줘, 해줘, 해줘해줘해줘──<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ボク、も、ぅっ──イクっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イっちゃう──ぁ、あぁぁああっ<emoji=heart04>」"
translation = "「나도 이제── 간다! 가! 가버려── 아, 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「イク<emoji=heart04>\u3000イク、イク、イク、イク──あ、あぁぁぁぁあぁあああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「간다, 가, 가, 가, 가── 아, 아아아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「んんぅぅうぅうぅうううう～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あ、あぁ、あぁああ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응응으으으으으으으으으으으~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04> 아, 아아, 아아아아──────앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環の太ももをがっちりと掴んで、逃げ場のない子宮にゼロ距離で精液を叩きこむ。"
translation = "타마키의 허벅지를 단단히 붙잡고, 도망갈 곳 없는 자궁에 제로 거리로 정액을 쏟아붓는다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「ふわぁ、あぁ、あぁあぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あひっ<emoji=heart04>\u3000んぅ、ふぁああぁっ<emoji=heart04>\u3000イっ、クっ<emoji=heart04>\u3000あ、あぁっ<emoji=heart04>」"
translation = "「후와아, 아아, 아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 아힉<emoji=heart04> 응, 후아아아앗<emoji=heart04> 가, 가버렷<emoji=heart04> 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「精液、びゅうびゅう、出されてっ──はふぅっ<emoji=heart04>\u3000また──イ、くぅうっ<emoji=heart04>\u3000ふぇあぁぁぁああっ──ああ、ぁぁぁっ──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「정액, 뷰룻뷰룻, 나와버려서──하아앗<emoji=heart04> 또──가, 가버려어엇<emoji=heart04> 후아아아아아앗──아아, 아아앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスから精液を撃ち放つたびに──環が全身をびくん、びくんと痙攣させる。"
translation = "페니스에서 정액을 쏘아 보낼 때마다──타마키가 전신을 부르르, 부르르 하며 경련시킨다."

[[dialogue]]
speaker = "unk"
original = "こんなにも敏感になって、反応してくれることが嬉しかった。"
translation = "이렇게나 민감해져서, 반응해 주는 것이 기뻤다."

[[dialogue]]
speaker = "unk"
original = "そうして撃ち放てるだけの精液を全て、環のお腹に注ぎ切って──"
translation = "그렇게 쏟아낼 수 있는 만큼의 정액을 전부, 타마키의 배 안에 쏟아붓고──"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「んはぁっ……あっ……はぁぁっ……ふぅう～っ……<emoji=heart04>」"
translation = "「응하아…… 앗…… 하아아…… 후우우~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "環の女性器からペニスが引き抜かれ、たっぷりの精液がこぼれ出てくるのを見た。"
translation = "타마키의 여성기에서 페니스가 뽑혀 나오고, 듬뿍 담긴 정액이 흘러넘쳐 나오는 것을 보았다."

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「……ちょっと、自分でも信じられないくらい……イった気がする……<emoji=heart04>」"
translation = "「……저기, 나 자신도 믿기지 않을 정도로…… 가버린 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……俺も。久しぶりだからかな……ありえないくらい、気持ちよかった……」"
translation = "「……나도. 오랜만이라 그런가…… 말도 안 될 정도로 기분 좋았어……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「うん……遠距離恋愛してる恋人同士って、こんな気分なのかなぁ……ヤバいなぁ……まだ、シたいかも……<emoji=heart04>」"
translation = "「응…… 장거리 연애하는 연인들은 이런 기분일까나…… 위험하네…… 아직, 더 하고 싶을지도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……何回でも付き合うよ」"
translation = "「……몇 번이라도 같이 해줄게」"

[[dialogue]]
speaker = "unk"
original = "一時は敵として対立もした俺たち。あの時はもう二度と会えないんじゃないかとすら思った。"
translation = "한때는 적으로서 대립하기도 했던 우리들. 그때는 다시는 만나지 못할지도 모른다고까지 생각했다."

[[dialogue]]
speaker = "unk"
original = "だから環とまたこうして日々を過ごせることが──嬉しくて仕方がない。"
translation = "그래서 타마키와 다시 이렇게 나날을 보낼 수 있다는 것이── 기뻐서 어쩔 줄 모르겠다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただ……場所は変えないか？\u3000流石に不敬すぎるっていうか……」"
translation = "「다만…… 장소는 바꾸지 않을래? 역시 너무 불경하다고 해야 할까……」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「えー？\u3000いいじゃん。一度も二度も変わんないよ。それにテルルなら許してくれるって。これは愛の営みだからね♪」"
translation = "「에이? 괜찮잖아. 한 번이나 두 번이나 똑같아. 게다가 테룰이라면 용서해 줄 거야. 이건 사랑의 행위니까♪」"

[[dialogue]]
speaker_original = "ラクシャ"
speaker_translation = "락샤"
original = "「というわけでもう１回～……<emoji=heart04>」"
translation = "「그런 고로 한 번 더~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奔放な彼女におねだりされて、そのまま何度も何度も、禁域の塔内で俺たちは交わり続けるのだった……"
translation = "분방한 그녀의 조름에, 그대로 몇 번이고 몇 번이고, 금역의 탑 안에서 우리들은 계속해서 교미했다……"

