[[dialogue]]
speaker = "unk"
original = "放課後、俺が教室でメルエルと雑談していると、レミカがやって来た――"
translation = "방과 후, 내가 교실에서 메르엘과 잡담하고 있자 레미카가 찾아왔다――"

[[dialogue]]
speaker = "メルエル"
original = "「あれ？\u3000アイドルのレミカちゃん？\u3000別のクラスなのに、どうして会長くんの教室に……」"
translation = "「어라? 아이돌 레미카 짱? 다른 반인데 어떻게 회장군 교실에……」"

[[dialogue]]
speaker = "unk"
original = "――ちなみに、<ruby>姫咲<rt>ひめさき</rt></ruby>メルエルは俺やレミカと同じく新星学園２年生。俺は思い出せずにいるが、１０年前に会って一緒に遊んだことがあるという、いわゆる幼なじみの関係だ。"
translation = "――참고로 히메사키 메르엘은 나나 레미카와 같은 신성 학원 2학년. 나는 기억하지 못하고 있지만, 10년 전에 만나서 같이 논 적이 있다는 이른바 소꿉친구 관계다."

[[dialogue]]
speaker = "レミカ"
original = "「あ、見つけた。姫咲メルエルさん……って、会長？\u3000どうしてここに？」"
translation = "「아, 찾았다. 히메사키 메르엘 씨…… 어, 회장? 왜 여기 있어?」"

[[dialogue]]
speaker = "レミカ"
original = "「――そっか、会長と友達なんだ。えっ……再会した幼なじみ？\u3000へぇ、そんなことってあるんだ」"
translation = "「――그렇구나, 회장과 친구구나. 엣…… 다시 만난 소꿉친구? 헤에, 그런 일도 있구나」"

[[dialogue]]
speaker = "レミカ"
original = "「私、実は姫咲さんに話があって、探してたんだ」"
translation = "「나, 사실 히메사키 씨한테 볼일이 있어서 찾고 있었어」"

[[dialogue]]
speaker = "メルエル"
original = "「レミカちゃ――じゃなかった。愛戸さんが、私に？\u3000話って一体……」"
translation = "「레미카 짱――이 아니라. 아이도 씨가 나한테? 볼일이라니 도대체……」"

[[dialogue]]
speaker = "レミカ"
original = "「ん。突然で驚くと思うんだけど……姫咲さん、アイドルに興味ある？」"
translation = "「음. 갑작스러워서 놀라겠지만…… 히메사키 씨, 아이돌에 관심 있어?」"

[[dialogue]]
speaker = "メルエル"
original = "「え？\u3000うん、昔からアイドルは好きだよ♪\u3000可愛くて憧れちゃう……私、歌も好きだし」"
translation = "「에? 응, 옛날부터 아이돌은 좋아해♪ 귀여워서 동경하게 돼버려…… 나, 노래도 좋아하고」"

[[dialogue]]
speaker = "メルエル"
original = "「実は愛戸さんのことも前から応援してて……歌がとっても上手で素敵だなぁって♪」"
translation = "「사실 아이도 씨도 전부터 응원하고 있었어…… 노래를 정말 잘해서 멋지다고 생각했거든♪」"

[[dialogue]]
speaker = "レミカ"
original = "「そっか、やっぱり。何か惹きつけられるものを感じたんだ。ねぇ、姫咲さん――」"
translation = "「그렇구나, 역시. 뭔가 끌리는 걸 느꼈어. 저기, 히메사키 씨――」"

[[dialogue]]
speaker = "レミカ"
original = "「私と一緒にアイドルになって、ユニットを組まない？」"
translation = "「나랑 같이 아이돌이 되어서 유닛을 짜지 않을래?」"

[[dialogue]]
speaker = "メルエル"
original = "「へぇ、私が愛戸さんと一緒に。それは楽しそう――って、え……？」"
translation = "「헤에, 내가 아이도 씨랑 같이. 그거 즐거워 보인―― 어, 에……?」"

[[dialogue]]
speaker = "メルエル"
original = "「ええぇぇぇ―――っ！？\u3000わ、私がアイドルに！？\u3000しかも、愛戸さんとユニットを組む！？\u3000いやいやいやいやいや！\u3000それって何の冗談！？」"
translation = "「에에에에엑――!? 내, 내가 아이돌이!? 게다가 아이도 씨랑 유닛을 짜!? 아니아니아니아니! 그거 무슨 농담이야!?」"

[[dialogue]]
speaker = "レミカ"
original = "「冗談じゃなくて、本気。姫咲さんって、たまに鼻歌を唄ってることあるでしょ」"
translation = "「농담이 아니라 진심이야. 히메사키 씨, 가끔 콧노래를 흥얼거릴 때가 있지?」"

[[dialogue]]
speaker = "メルエル"
original = "「うっ、聞かれちゃってた……？\u3000その……気分が良いと、つい癖で……」"
translation = "「윽, 들켰었나요……? 그게…… 기분이 좋으면 나도 모르게 버릇이라서……」"

[[dialogue]]
speaker = "レミカ"
original = "「私、その鼻歌に才能を感じたんだよね」"
translation = "「나, 그 콧노래에서 재능을 느꼈거든.」"

[[dialogue]]
speaker = "メルエル"
original = "「鼻歌だけで！？」"
translation = "「콧노래만으로요!?」"

[[dialogue]]
speaker = "レミカ"
original = "「あとは直感、かな」"
translation = "「나머지는 직감, 이랄까.」"

[[dialogue]]
speaker = "unk"
original = "でも、何でユニットを結成したいんだ？"
translation = "하지만, 왜 유닛을 결성하고 싶은 거지?"

[[dialogue]]
speaker = "メルエル"
original = "「うんうんっ。だって愛戸さんは、もうワールドクラスの超有名アイドルなのに」"
translation = "「으응, 으응. 그치만 아이도 씨는 이미 월드 클래스의 초유명 아이돌인데.」"

[[dialogue]]
speaker = "レミカ"
original = "「真面目に勧誘をするんだから、それはちゃんと話さなきゃだよね。……私、最近悩んでることがあって――」"
translation = "「진지하게 권유하는 거니까, 그건 제대로 이야기해야겠지. ……나, 최근 고민하고 있는 게 있어서――」"

[[dialogue]]
speaker = "レミカ"
original = "「今の私には、『アイドルらしさ』が足りてないと思うんだ」"
translation = "「지금의 나에게는, 『아이돌다움』이 부족하다고 생각해.」"

[[dialogue]]
speaker = "メルエル"
original = "「え？\u3000愛戸さんは間違いなく、今の時代を代表するトップアイドルなのに……」"
translation = "「에? 아이도 씨는 틀림없이 지금 시대를 대표하는 톱 아이돌인데……」"

[[dialogue]]
speaker = "レミカ"
original = "「ありがと。でも、私の世間的評価って『アイドルらしいアイドル』っていう風には、なってないでしょ？」"
translation = "「고마워. 하지만 나의 세상적인 평가는 『아이돌다운 아이돌』이라는 식으로는 되어있지 않잖아?」"

[[dialogue]]
speaker = "メルエル"
original = "「あ……確か『アイドルの枠を越えた、アーティスティックでクールな歌姫』だって、前に雑誌で……」"
translation = "「아…… 확실히 『아이돌의 틀을 넘어선, 아티스틱하고 쿨한 가희』라고 전에 잡지에서……」"

[[dialogue]]
speaker = "レミカ"
original = "「そう、大体どこもそんな感じ。アーティスティック、クール、どっちかっていうとカッコいい系。私が男のアイドルなら、それもアリだったんだろうけど……」"
translation = "「그래, 대체로 어디든 그런 느낌이야. 아티스틱, 쿨, 어느 쪽인가 하면 멋진 계열. 내가 남자 아이돌이었다면 그것도 괜찮았겠지만……」"

[[dialogue]]
speaker = "レミカ"
original = "「私が子供の頃に憧れたアイドルってさ、もっとこう……『カッコよくも可愛い』アイドルだったんだよね。可愛さを突き詰めた結果の、カッコよさっていうのかな」"
translation = "「내가 어릴 적에 동경했던 아이돌은 말이야, 좀 더 이렇게…… 『멋지면서도 귀여운』 아이돌이었거든. 귀여움을 끝까지 파고든 결과로 나오는 멋짐이라고 해야 할까.」"

[[dialogue]]
speaker = "レミカ"
original = "「私は今の自分が、その理想通りのアイドルになれているとは……思えない」"
translation = "「나는 지금의 내가 그 이상대로의 아이돌이 되어 있다고는…… 생각되지 않아.」"

[[dialogue]]
speaker = "レミカ"
original = "「トップアイドルだって周りが言ってくれていても、今のままじゃ納得が出来ないんだ」"
translation = "「톱 아이돌이라고 주변에서 말해줘도, 지금 이대로는 납득할 수 없어.」"

[[dialogue]]
speaker = "レミカ"
original = "「だって私が目指すのは、完全無欠のトップアイドルだから」"
translation = "「왜냐하면 내가 목표로 하는 건, 완전무결한 톱 아이돌이니까.」"

[[dialogue]]
speaker = "レミカ"
original = "「自分が思い描いた夢に手を伸ばさなきゃ、皆にも夢は見せられない」"
translation = "「내가 그려온 꿈에 손을 뻗지 않으면, 모두에게도 꿈을 보여줄 수 없어.」"

[[dialogue]]
speaker = "レミカ"
original = "「それが、アイドルっていうものだと、私は思ってるから」"
translation = "「그게 아이돌이라는 것이라고, 나는 생각하니까.」"

[[dialogue]]
speaker = "メルエル"
original = "「なんか、凄い……これが――」"
translation = "「뭔가, 대단해…… 이것이――」"

[[dialogue]]
speaker = "unk"
original = "プロのトップアイドルってやつか"
translation = "프로 톱 아이돌이라는 건가."

[[dialogue]]
speaker = "メルエル"
original = "「でも、そこまで真剣な事情を聞いちゃうと、誘ってもらえるのは光栄だけど――」"
translation = "「하지만, 그렇게까지 진지한 사정을 듣고 나니 권유받은 건 영광이지만――」"

[[dialogue]]
speaker = "メルエル"
original = "「いきなり私もアイドルになる決心が付くかって言われると、ちょっと……」"
translation = "「갑자기 나도 아이돌이 될 결심이 서느냐고 묻는다면, 조금……」"

[[dialogue]]
speaker = "レミカ"
original = "「う……勧誘するのに、重いことを話し過ぎた、かも」"
translation = "「우…… 권유하면서 너무 무거운 이야기를 해버렸을지도.」"

[[dialogue]]
speaker = "レミカ"
original = "「で、でも、姫咲さんがアイドルに興味はあって、歌が好きなのも本当なんだよね？」"
translation = "「하, 하지만 히메사키 씨가 아이돌에 관심이 있고, 노래를 좋아하는 것도 사실이지?」"

[[dialogue]]
speaker = "レミカ"
original = "「だったらとりあえず、お互いを知るところから始めちゃダメ、かな？」"
translation = "「그렇다면 우선 서로를 알아가는 것부터 시작하면 안 될까?」"

[[dialogue]]
speaker = "メルエル"
original = "「あっ、そういえば雑誌で見たけど、愛戸さんってカラオケ行くのが好きなんだっけ？\u3000実は私もなんだ♪\u3000カラオケ一緒に行くのは、大歓迎だよ！」"
translation = "「앗, 그러고 보니 잡지에서 봤는데 아이도 씨는 노래방 가는 걸 좋아한다면서요? 사실 저도 그렇거든요♪ 노래방 같이 가는 건 대환영이에요!」"

[[dialogue]]
speaker = "レミカ"
original = "「本当……！？\u3000趣味が一緒なのは……嬉しい、かも。じゃあ後で予定決める為に、連絡先とか交換してもいい？」"
translation = "「정말……!? 취미가 같은 건…… 기쁠지도. 그럼 나중에 예정 정하게 연락처 같은 거 교환해도 될까?」"

[[dialogue]]
speaker = "メルエル"
original = "「うん、いいよ♪\u3000あ、私のことはメルエルって呼んで？\u3000同級生なんだし、これから仲良くしてほしいな♪」"
translation = "「응, 좋아♪ 아, 나를 메르엘이라고 불러줄래? 동급생이니까 앞으로 사이좋게 지내고 싶어♪」"

[[dialogue]]
speaker = "レミカ"
original = "「ん、分かった……メルエル。私のことも、レミカって呼んで。これから、よろしく」"
translation = "「음, 알았어…… 메르엘. 나도 레미카라고 불러줘. 앞으로 잘 부탁해.」"

[[dialogue]]
speaker = "メルエル"
original = "「うん♪\u3000これからよろしくね、レミカちゃん！」"
translation = "「응♪ 앞으로 잘 부탁해, 레미카 짱!」"

[[dialogue]]
speaker = "レミカ"
original = "「あっ、そうだ。会長もカラオケ一緒に行く？\u3000私、実は会長の歌にも興味ある」"
translation = "「앗, 맞다. 회장도 노래방 같이 갈래? 나, 사실 회장의 노래에도 관심 있어.」"

[[dialogue]]
speaker = "メルエル"
original = "「確かに！\u3000私もある！\u3000会長くん、ひょっとしてバイトで歌ったことがあったりして……！」"
translation = "「맞아! 나도 있어! 회장군, 혹시 알바에서 노래한 적이 있다거나……!」"

[[dialogue]]
speaker = "レミカ"
original = "「いやそれ、どんなバイト――って、本当にあるの？\u3000な、なにそれ……ぷっ……ふふふ……！」"
translation = "「아니 그거, 무슨 알바―― 어, 진짜로 있어? 뭐, 뭐야 그게…… 풋…… 후후후……!」"

[[dialogue]]
speaker = "unk"
original = "そうして後日、俺は２人と一緒にカラオケをして、前より少しレミカと仲良くなることができたのだった――"
translation = "그렇게 며칠 뒤, 나는 두 사람과 함께 노래방에 가서 전보다 조금 레미카와 사이가 좋아질 수 있었다――"

