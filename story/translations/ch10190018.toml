[[dialogue]]
speaker = "unk"
original = "せつなとの関係が、主従から恋人へと変わってからしばらく経ってのことだった。"
translation = "세츠나와의 관계가 주종에서 연인으로 바뀐 지 얼마간의 시간이 흐른 뒤였다."

[[dialogue]]
speaker = "unk"
original = "日課の早朝ランニング途中。一人で公園を走っていると、なにやら茂みの奥から物音が聞こえてくる。"
translation = "일과인 이른 아침 러닝 도중. 혼자 공원을 달리고 있자니 왠지 수풀 안쪽에서 소리가 들려온다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あーるーじーさーまー！！」"
translation = "「주~ 군~!!」"

[[dialogue]]
speaker = "unk"
original = "聞き覚えのある元気な声が聞こえたかと思ったら、茂みの奥へと強引に連れ込まれてしまうのだった。"
translation = "귀에 익은 활기찬 목소리가 들렸나 싶더니 수풀 안쪽으로 강제로 끌려 들어가 버리고 말았다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様……いや、魔王！\u3000ふっふっふ、ここであったが百年目……！」"
translation = "「주군…… 아니, 마왕! 훗훗훗, 여기서 만난 게 백년하청이오……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……急になにやってるの？」"
translation = "「……갑자기 뭐 하는 거야?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あはは～。昨晩新たに覚えた房中術を、主様に披露したく──って違う違う……」"
translation = "「아하하~. 어젯밤 새로 익힌 방중술을 주군께 선보이고 싶어서── 가 아니라 아니지……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……コホン、魔王！\u3000ここで会ったが百年目！\u3000貴様を倒すために編み出した房中術……受けてみるでござる！！」"
translation = "「……코흠, 마왕! 여기서 만난 게 백년하청! 네놈을 쓰러뜨리기 위해 고안한 방중술…… 받아 보시오!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ほれほれ～、こうすれば、せつなの大きいおっぱいも丸見えでござる～♪\u3000いつも魔王がこっそり見ているおっぱい、遠慮なく揉むでござる」"
translation = "「자자~ 이렇게 하면 세츠나의 커다란 가슴도 통째로 보이오~♪ 평소 마왕이 몰래 훔쳐보는 가슴, 사양 말고 주무르는 것이오.」"

[[dialogue]]
speaker = "unk"
original = "どうやら今日は、敵対関係にある魔王と忍者がセックスバトルをする設定らしい。せつなは度々、こういう突拍子もない『お誘い』をしてくる。正直、アホ可愛い。"
translation = "아무래도 오늘은 적대 관계인 마왕과 닌자가 섹스 배틀을 하는 설정인 모양이다. 세츠나는 종종 이런 엉뚱한 『유혹』을 해오곤 한다. 솔직히 바보 같아서 귀엽다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふっふっふ。せつなのおっぱい、いっつも隠れて見ていることはお見通しでござる……<emoji=heart04>」"
translation = "「훗훗훗. 세츠나의 가슴, 언제나 숨어서 훔쳐보고 있다는 건 다 꿰뚫어 보고 있소……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「触りたそうな目をして、それでいてみんなの前だからって触れずにいて……忍びであるせつなに、バレないと思ってたでござるか～？」"
translation = "「만지고 싶은 눈을 하고선, 그러면서도 다들 앞이라고 만지지 못하고 있고…… 닌자인 세츠나에게 들키지 않을 줄 알았소~?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「近くにこんな柔らかそうなおっぱいがあったら、男子はみんなそうなると、教科書に書いてあったでござる<emoji=heart04>」"
translation = "「근처에 이렇게 말랑해 보이는 가슴이 있으면 남자는 다 그렇게 된다고 교과서에 적혀 있었소<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ<emoji=heart04>\u3000魔王の手が、せつなのおっぱいを遠慮なく揉みしだいて……んっ<emoji=heart04>\u3000大胆なのに、ゆっくり丁寧でっ、はぁぁ……<emoji=heart04>\u3000さ、さすが、魔王でござる<emoji=heart04>」"
translation = "「앗<emoji=heart04> 마왕의 손이 세츠나의 가슴을 사양 없이 주물러대서…… 응<emoji=heart04> 대담한데도 천천히 정성스러워서, 하아아……<emoji=heart04> 과, 과연 마왕이오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んふぅ、はぁぁ<emoji=heart04>\u3000でも、魔王のここ……おち○ちんもっ、せつなのおっぱい触っただけで、大きくなってるでござる♪」"
translation = "「응후, 하아아<emoji=heart04> 하지만 마왕의 여기…… 자지도, 세츠나의 가슴을 만진 것만으로 커졌소♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んっ、あぁぁ<emoji=heart04>\u3000おち○ちん、こんなに……<emoji=heart04>\u3000さすが、魔王でござるな<emoji=heart04>\u3000大きさも、硬さも……一級品でござる……<emoji=heart04>」"
translation = "「응, 아아아<emoji=heart04> 자지가 이렇게나……<emoji=heart04> 과연 마왕이구려<emoji=heart04> 크기도 굳기도…… 일품이오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「これは、魔王退治にも……時間がかかりそうで、ござるな<emoji=heart04>\u3000はぁぁ……おっぱいの揉み方も、んっ<emoji=heart04>\u3000どんどん、いやらしくなってきてるでござる♪」"
translation = "「이건 마왕 퇴치에도…… 시간이 걸릴 것 같구려<emoji=heart04> 하아아…… 가슴을 주무르는 법도, 응<emoji=heart04> 점점 음란해지고 있소♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それでは、魔王もやる気をだしてくれたことでござるし……さっそく、房中術のお披露目で……ござる<emoji=heart04>」"
translation = "「그러면 마왕도 의욕을 내준 모양이니…… 당장 방중술을 선보이겠소……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ん……はぁっ<emoji=heart04>\u3000指より硬くて、熱いものが……はぁぁ<emoji=heart04>\u3000膣の中に入ってくる感覚は、あぁっ<emoji=heart04>\u3000なかなか、慣れないで、ござるな……<emoji=heart04>\u3000んんっ、ふぅぅぅ<emoji=heart04>」"
translation = "「응…… 하앗<emoji=heart04> 손가락보다 딱딱하고 뜨거운 것이…… 하아아<emoji=heart04> 질 안으로 들어오는 감각은, 아앗<emoji=heart04> 좀처럼 익숙해지지 않소……<emoji=heart04> 응응, 후으으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あぁ……<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000入ったで、ござるぅ……<emoji=heart04>\u3000んふぅぅ<emoji=heart04>\u3000ふぇ……？\u3000う、うっとりなんて、してないでござるよ！？\u3000ひゃぅぅんっ<emoji=heart04>」"
translation = "「아아……<emoji=heart04> 아아앙<emoji=heart04> 들어왔소……<emoji=heart04> 응후으으<emoji=heart04> 페……? 으, 황홀해하거나 하지 않았소!? 히야으으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁぁ……んんっ<emoji=heart04>\u3000魔王もなかなか、やるでござるな……<emoji=heart04>\u3000まさか、一挿れでこんなにも、こちらに快楽を与えてくるとはっ<emoji=heart04>\u3000んふぅぅ」"
translation = "「하아아…… 응응<emoji=heart04> 마왕도 제법이구려……<emoji=heart04> 설마 한 번 삽입한 것만으로 이렇게나 이쪽에 쾌락을 줄 줄이야<emoji=heart04> 응후으으」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「それでこそ、せつなが認めたあるじ――あ、魔王で、ござる……っ♪」"
translation = "「그래야 세츠나가 인정한 주―― 아니, 마왕이오……♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でも……どうやら魔王にとっても、刺激は強かった様子……<emoji=heart04>\u3000これでせつなの房中術を受けたら、どんな声が聞こえるのか……今から楽しみでござる<emoji=heart04>\u3000……はっ、あぁぁっ<emoji=heart04>」"
translation = "「하지만…… 아무래도 마왕에게도 자극이 강했던 모양……<emoji=heart04> 이걸로 세츠나의 방중술을 받으면 어떤 목소리가 들릴지…… 벌써부터 기대되오<emoji=heart04> ……핫, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んっ、もしかして……はふぅ<emoji=heart04>\u3000どうせいっぱい動くだけとか、思ってたでござるか？\u3000んんっ<emoji=heart04>」"
translation = "「응, 설마…… 하후<emoji=heart04> 어차피 잔뜩 움직일 뿐이라고 생각했소? 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「どうしてバレたかって……だって、魔王の腰がモゾモゾって……はぁぁ<emoji=heart04>\u3000我慢できないみたいに、動いてるからでござるよ<emoji=heart04>」"
translation = "「어떻게 들켰냐니…… 그야 마왕의 허리가 꼼지락꼼지락…… 하아아<emoji=heart04> 참을 수 없다는 듯이 움직이고 있기 때문이오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んふふ～。たっくさん動いて、おち○ちん、ゴシゴシしたいのはわかりますが～……はぁぁ<emoji=heart04>\u3000今日はちょっと、趣向が違うでござる<emoji=heart04>」"
translation = "「응후후~. 잔뜩 움직여서 자지를 비비고 싶은 건 알겠지만~…… 하아아<emoji=heart04> 오늘은 좀 취향이 다르오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んふぅぅ<emoji=heart04>\u3000今日お見舞いする房中術は……動かずにイかせる、秘儀中の秘儀なのでござる<emoji=heart04>」"
translation = "「응후으으<emoji=heart04> 오늘 선사할 방중술은…… 움직이지 않고 가게 만드는 비기 중의 비기이오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁぁ<emoji=heart04>\u3000んんっ。こう、やってぇ……<emoji=heart04>\u3000ぎゅって、膣内を絞るように……んっ<emoji=heart04>\u3000はぁ……っ、あ……んんっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 응응. 이렇, 게 해서……<emoji=heart04> 꽉 질 내부를 조이듯이…… 응<emoji=heart04> 하아……앗, 아…… 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「どうで、ござるか♪\u3000くふぅっ<emoji=heart04>\u3000おま○こで……はぁっ、ゴシゴシされるのとは、違うの……わかるでござろう……<emoji=heart04>」"
translation = "「어떠하오♪ 쿠후으<emoji=heart04> 보지로…… 하앗, 비벼지는 거랑은 다른 거…… 알겠지 않소……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ん、ふぅ<emoji=heart04>\u3000ふっ……んんっ<emoji=heart04>\u3000ふふ、いつもとは違う快感に、魔王も焦っているようで、ござるな……♪\u3000はぁぁん<emoji=heart04>」"
translation = "「응, 후으<emoji=heart04> 훗…… 응응<emoji=heart04> 후후, 평소와는 다른 쾌감에 마왕도 당황한 모양이구려……♪ 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000きつきつのおま○こが、きゅうきゅうって……<emoji=heart04>\u3000でも、竿はゴシゴシされずに……<emoji=heart04>\u3000あともうちょっと刺激があればって。そんな顔してるでござる<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 꽉 조이는 보지가 뀨뀨 하고……<emoji=heart04> 하지만 기둥은 비벼지지 않고……<emoji=heart04> 조금만 더 자극이 있으면 좋겠다고, 그런 얼굴을 하고 있소<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「……でも、まだダメでござる<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000魔王にはまだまだいーっぱい、我慢してもらうでござる……♪\u3000今日のえっちは、戦いなのでござる<emoji=heart04>」"
translation = "「……하지만 아직 안 되오<emoji=heart04> 하아앙<emoji=heart04> 마왕은 아직도 한~참 참아야 하오……♪ 오늘의 섹스는 전투이오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あんっ<emoji=heart04>\u3000はぁぁ……ゆっくりいっぱい、時間をかけて……せつなのおま○こに出したいよーってお願いするまで……離さないでござるよ<emoji=heart04>\u3000んふぅぅ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 하아아…… 천천히 듬뿍 시간을 들여서…… 세츠나의 보지에 싸고 싶어요~라고 부탁할 때까지…… 놓아주지 않겠소<emoji=heart04> 응후으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「にゃぁん<emoji=heart04>\u3000はふぅぅ……<emoji=heart04>\u3000こんなに震えて……おっぱいを揉む手が、止まってるでござるよ……<emoji=heart04>\u3000はぁぁぁ<emoji=heart04>」"
translation = "「냐앙<emoji=heart04> 하후으으……<emoji=heart04> 이렇게 떨면서…… 가슴을 주무르는 손이 멈춰 있소……<emoji=heart04> 하아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もしかして～？\u3000今日はせつなの、完全勝利でござるか♪\u3000んふぅぅ<emoji=heart04>\u3000……あまりの快感に、動くこともできないでござるか<emoji=heart04>\u3000……にゃんっ！？<emoji=heart04>」"
translation = "「설마~? 오늘은 세츠나의 완전 승리이오♪ 응후으으<emoji=heart04> ……너무나 큰 쾌감에 움직일 수도 없는 것이오? ……냥!?<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んにゃっ<emoji=heart04>\u3000んふぅぅ<emoji=heart04>\u3000はぁぁ……<emoji=heart04>\u3000魔王、勝手に腰、動かして……はぁぁぁん<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000もう、我慢できなくなっちゃったで、ござるか？<emoji=heart04>」"
translation = "「으냐앗<emoji=heart04> 응후으으<emoji=heart04> 하아아……<emoji=heart04> 마왕, 멋대로 허리를 움직여서…… 하아아앙<emoji=heart04> 앗, 앗<emoji=heart04> 이제 참을 수 없게 되어버린 것이오?<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ひゃ……あんっ<emoji=heart04>\u3000ちょ、ちょっと、まだせつなが喋ってるのに……んんっ<emoji=heart04>\u3000マナー違反、でござるよっ……<emoji=heart04>\u3000ひゃぅぅんっ」"
translation = "「히야…… 안앗<emoji=heart04> 자, 잠깐, 아직 세츠나가 말하고 있는데…… 응응<emoji=heart04> 매너 위반이오…… 히야으으응」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「こ、こぉら<emoji=heart04>\u3000……あ、やっ<emoji=heart04>\u3000ふぁっ、あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ずるい<emoji=heart04>\u3000ずるいでござ……ん、ああっ<emoji=heart04>」"
translation = "「이, 이놈<emoji=heart04> ……아, 야앗<emoji=heart04> 파앗, 안앗<emoji=heart04> 하앙<emoji=heart04> 치사하오 치사하오…… 응, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「房中術だって、まだ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ちょっとしか……ひゃ、あっ<emoji=heart04>\u3000きょ、今日はせつなが……<emoji=heart04>\u3000だめ、ダメでござるっ<emoji=heart04>」"
translation = "「방중술도 아직……<emoji=heart04> 안앗<emoji=heart04> 조금밖에…… 히야, 앗<emoji=heart04> 오, 오늘은 세츠나가……<emoji=heart04> 안 돼, 안 되오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あんっ<emoji=heart04>\u3000これじゃ、せつなが、すぐにやられちゃうでござ……！\u3000んふぅぅん<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 이래선 세츠나가 금방 당해버리……! 응후으으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ひぅぅ……<emoji=heart04>\u3000あっ、だめ<emoji=heart04>\u3000胸……カリカリって<emoji=heart04>\u3000乳首……ダメ、でござる……っ<emoji=heart04>\u3000にゃぁぁん<emoji=heart04>\u3000ふにゃぁぁん<emoji=heart04>」"
translation = "「히으으……<emoji=heart04> 앗, 안 돼 가슴…… 귀두로 긁으면…… 유두…… 안 돼, 안 되오…… 냐아아앙<emoji=heart04> 후냐아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ああっ、さっきまで、動いてなかったのは、このため……<emoji=heart04>\u3000せつなの胸を、たっぷり愛撫して……んんっ<emoji=heart04>\u3000おっぱいを快楽責めする、準備をしてたでござるかっ」"
translation = "「아앗, 아까까지 움직이지 않았던 건 이걸 위해서……<emoji=heart04> 세츠나의 가슴을 듬뿍 애무해서…… 응응<emoji=heart04> 가슴을 쾌락으로 몰아붙일 준비를 하고 있었던 것이오!?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁあっ<emoji=heart04>\u3000にゃぁぁんっ<emoji=heart04>\u3000焦らした乳首、カリカリしたらダメでござるぅぅぅ<emoji=heart04>\u3000これ以上はぁ、はぁぁ<emoji=heart04>\u3000気持ちよく、なりすぎてしまうでござるぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아아아앗<emoji=heart04> 냐아아앙<emoji=heart04> 애태운 유두를 긁으면 안 되오오오<emoji=heart04> 이 이상은, 하아아<emoji=heart04> 기분 좋아져 버리오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「さ、さすが……魔王っ<emoji=heart04>\u3000せつなでは、考えつかないことを……んんっ！？<emoji=heart04>」"
translation = "「과, 과연…… 마왕<emoji=heart04> 세츠나로서는 생각지도 못한 일을…… 응응!?<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふにゃぁぁんっ<emoji=heart04>\u3000それ、ずる……っ<emoji=heart04>\u3000んんっ、あぁぁぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000そんなにゴツゴツ、おま○こ突かれたらっ<emoji=heart04>\u3000なにも、考えられなくなっちゃ……<emoji=heart04>」"
translation = "「후냐아아앙<emoji=heart04> 그거 치사…… 응응, 아아아앙<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아아<emoji=heart04> 그렇게 고츠고츠 보지를 찔러대면<emoji=heart04> 아무것도 생각할 수 없게 되어버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あんっ<emoji=heart04>\u3000ふわぁん<emoji=heart04>\u3000おっぱいも<emoji=heart04>\u3000……敏感なとこ、カリカリ<emoji=heart04>\u3000揉み揉みっ<emoji=heart04>\u3000魔王には……全部、お見通しでござる……<emoji=heart04>\u3000あふぅぅ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 후와앙<emoji=heart04> 가슴도<emoji=heart04> ……민감한 곳 귀두로 긁고<emoji=heart04> 조물조물<emoji=heart04> 마왕에게는…… 전부 들통나 있소…… 아후으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「このままじゃ……<emoji=heart04>\u3000せつな、今日も返り討ちに、あって……<emoji=heart04>\u3000ひあぁぁっ<emoji=heart04>\u3000あ<emoji=heart04>……んんんっ<emoji=heart04>」"
translation = "「이대로라면……<emoji=heart04> 세츠나, 오늘도 역습당해서…… 히아아앗<emoji=heart04> 아<emoji=heart04>…… 응응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ひぅぅ……<emoji=heart04>\u3000でも、それでも……っ、気持ちよかったら……もう……<emoji=heart04>\u3000なんでもいいかも……っ<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 안앗<emoji=heart04> 안앗<emoji=heart04> 히으으……<emoji=heart04> 하지만 그래도…… 기분 좋다면…… 이제……<emoji=heart04> 뭐든 좋을지도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あ、主様の手……<emoji=heart04>\u3000きもち、いい……っ<emoji=heart04>\u3000やさしくて……頭のなか、ぼーっとして……っ<emoji=heart04>\u3000ふわぁん<emoji=heart04>」"
translation = "「아, 주군의 손……<emoji=heart04> 기분 좋아……<emoji=heart04> 다정해서…… 머릿속이 멍해져서…… 후와앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おっぱい……いっぱい触って<emoji=heart04>\u3000おち○ちんでおま○こ、いっぱいにして……<emoji=heart04>\u3000んふぅぅ<emoji=heart04>」"
translation = "「가슴…… 잔뜩 만져줘<emoji=heart04> 자지로 보지를 가득 채워줘…… 응후으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「これすき<emoji=heart04>\u3000好きでござるっ<emoji=heart04>\u3000もっと、もっといっぱい……<emoji=heart04>\u3000お願いします、主様っ<emoji=heart04>」"
translation = "「이거 좋아<emoji=heart04> 좋소이다<emoji=heart04> 좀 더, 좀 더 잔뜩…… 부탁하오, 주군<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなも……せつなもいっぱい、主様のために……うごくでござる、からぁ……っ<emoji=heart04>\u3000だからお願いします……<emoji=heart04>\u3000もっと、もっとぉ<emoji=heart04>\u3000はぁぁぁんっ<emoji=heart04>」"
translation = "「세츠나도…… 세츠나도 잔뜩 주군을 위해서…… 움직일 테니까요……<emoji=heart04> 그러니까 부탁하오…… 좀 더, 좀 더어<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……魔王に立ち向かう忍者、えっちに弱すぎじゃない？」"
translation = "「……마왕에게 맞서는 닌자 치고 섹스에 너무 약한 거 아냐?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「だ……だって、主様、だからぁ<emoji=heart04>\u3000魔王だけど、主様だからっ<emoji=heart04>\u3000……あ、はぁん<emoji=heart04>\u3000主様と繋がるの、気持ちよくて……ずっと、ずっと一緒にいたい、からぁ……<emoji=heart04>」"
translation = "「그…… 그야 주군이니까요<emoji=heart04> 마왕이지만 주군이니까<emoji=heart04> ……아, 하앙<emoji=heart04> 주군과 이어지는 거 기분 좋아서…… 계속, 계속 같이 있고 싶으니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「だからこうやって……<emoji=heart04>\u3000房中術、練習してっ<emoji=heart04>\u3000披露する機会、作れば……んんっ、えっちしてもらえるかなって……ひぁん<emoji=heart04>」"
translation = "「그래서 이렇게……<emoji=heart04> 방중술 연습해서<emoji=heart04> 선보일 기회를 만들면…… 응응, 섹스해 주실까 해서…… 히앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなは、いっぱい考えて……あんっ<emoji=heart04>\u3000どうしたらおま○こにっ<emoji=heart04>\u3000主様のおち○ちん、挿れてもらえるかって……はぁ、あぁぁぁんっ<emoji=heart04>」"
translation = "「세츠나는 잔뜩 고민해서…… 안앗<emoji=heart04> 어떻게 하면 보지에<emoji=heart04> 주군의 자지를 넣게 할 수 있을까 하고…… 하아, 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「普通に誘ってくれれば俺だって嬉しいのに、やっぱり恥ずかしかったの？」"
translation = "「평범하게 유혹해 주면 나도 기쁠 텐데, 역시 부끄러웠어?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んくぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000うぅぅぅ……っ。それはわかってても……<emoji=heart04>\u3000言っちゃダメで、ござるよぉ……<emoji=heart04>」"
translation = "「응쿠으<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 으으으으…… 그건 알고 있어도……<emoji=heart04> 말씀하시면 안 되오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「にゃっ、はぅ……<emoji=heart04>\u3000それに、主様に……喜んで、ほしいから……ぁっ<emoji=heart04>」"
translation = "「냐앗, 하우……<emoji=heart04> 게다가 주군이…… 기뻐해 주길 바라니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつな、いっぱい……<emoji=heart04>\u3000おま○こ、特訓してきたんでござ……るからぁっ<emoji=heart04>\u3000はぁぁんっ」"
translation = "「세츠나, 잔뜩……<emoji=heart04> 보지 특훈해 왔소이다…… 하아아앙」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「主様のおち○ちん……ぎゅーって、してあげたくて<emoji=heart04>\u3000せつなのおま○こに、ずっと挿れたくなるように……っ<emoji=heart04>\u3000こうやって<emoji=heart04>\u3000んふぅぅぅっ」"
translation = "「주군의 자지…… 꽉 조여주고 싶어서<emoji=heart04> 세츠나의 보지에 계속 넣고 싶어지도록…… 이렇게<emoji=heart04> 응후으으으」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はっ、あぁぁ<emoji=heart04>\u3000ほらっ……どうで、ござる<emoji=heart04>\u3000おち○ちん、お手てでされてる、みたいに……ゴシゴシ、ギューって……っ<emoji=heart04>」"
translation = "「핫, 아아아<emoji=heart04> 보시오…… 어떠하오<emoji=heart04> 자지, 손으로 해주는 것처럼…… 비비고 꽉 조이고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あぁぁぁぁん……<emoji=heart04>\u3000膣内ですっごく大きくっ<emoji=heart04>\u3000もっと……してほしいでござるか♪\u3000あぁぁんっ<emoji=heart04>」"
translation = "「아아아아앙……<emoji=heart04> 질 안에서 엄청 커져서<emoji=heart04> 좀 더…… 해줬으면 좋겠소? 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「お……<emoji=heart04>\u3000あ、おち○ちんビクンって……喜んでくれたでござるねっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000それなら、よかったでござる……っ<emoji=heart04>」"
translation = "「오……<emoji=heart04> 아, 자지가 움찔하고…… 기뻐해 주었구려<emoji=heart04> 안앗<emoji=heart04> 그렇다면 다행이오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もっと……もっともっと<emoji=heart04>\u3000主様のおち○ちんに、いっぱいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000……ずぽずぽ<emoji=heart04>\u3000ぐちゅぐちゅ……<emoji=heart04>\u3000はぁぁぁんっ<emoji=heart04>」"
translation = "「좀 더…… 좀 더 좀 더<emoji=heart04> 주군의 자지에 잔뜩<emoji=heart04> 안앗<emoji=heart04> ……즈포즈포<emoji=heart04> 구츄구츄…… 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなのおま○こ……可愛がってほしいのでござるっ<emoji=heart04>」"
translation = "「세츠나의 보지…… 예뻐해 주길 바라오<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……せつなのそういうところ、本当に、可愛いぞっ」"
translation = "「윽…… 세츠나의 그런 점, 정말 귀엽다고.」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「か、かわ……！？\u3000にゃ、にゃにを……ふわぁっ！？\u3000……あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んくぅぅぅぅっ<emoji=heart04>」"
translation = "「귀, 귀엽……!? 냐, 냐니를…… 후와앗!? ……앗<emoji=heart04> 아아앗<emoji=heart04> 응쿠으으으으<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000主様、激し……ひぁっ<emoji=heart04>\u3000急にそんなこと、言われたら……っ<emoji=heart04>\u3000ふわぁぁぁぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 주군 격렬…… 히앗<emoji=heart04> 갑자기 그런 말씀을 하시면…… 후와아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「そこ、おま○この裏っ……弱いところ、こすったらっ<emoji=heart04>\u3000すぐイッちゃ……<emoji=heart04>\u3000頭、真っ白になって……<emoji=heart04>\u3000あああぁぁぁぁあっ<emoji=heart04>」"
translation = "「거기, 보지의 안쪽…… 약한 곳 문지르면<emoji=heart04> 금방 가버려…… 머릿속이 새하얘져서…… 아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「声、止まらな……<emoji=heart04>\u3000あるじしゃまに、喜んでもらいたいのに……せつなばっかり……<emoji=heart04>」"
translation = "「목소리가 안 멈춰…… 주군을 기쁘게 해드리고 싶은데 세츠나만……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大好きな彼女とっ……一緒に気持ちよくなりたいんだっ。別にいいだろ？」"
translation = "「사랑하는 여자친구랑 같이 기분 좋아지고 싶은 거야. 별로 상관없잖아?」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「か、彼女……せつなが、彼女ぉ……っ<emoji=heart04>\u3000主様の彼女……そ、そうでござる、けどぉ<emoji=heart04>\u3000恋人であってもぉ<emoji=heart04>\u3000せつなは主様に仕える、忍びだからぁ……<emoji=heart04>」"
translation = "「여, 여자친구…… 세츠나가 여자친구……<emoji=heart04> 주군의 여자친구…… 그, 그렇소이다만<emoji=heart04> 연인이라 해도<emoji=heart04> 세츠나는 주군을 모시는 닌자니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「でもぉ……あ、にゃぁぁぁぁっ<emoji=heart04>\u3000ふぁあああっ<emoji=heart04>\u3000あるじしゃまに、おま○こゴシゴシされると……っ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おち○ちんのことしか……考えられにゃいっ<emoji=heart04>」"
translation = "「하지만…… 아, 냐아아아아앗<emoji=heart04> 파아아앗<emoji=heart04> 주군에게 보지를 비벼지면……<emoji=heart04> 자, 자지 생각밖에…… 할 수 없소냐앗」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おち○ちんジュボジュボしゃれると<emoji=heart04>\u3000あああああっ<emoji=heart04>\u3000ふにゃふにゃしちゃって、あるじしゃまのことしか考えられないのぉ……っ<emoji=heart04>」"
translation = "「자지 쥬보쥬보 당하면<emoji=heart04> 아아아아앗<emoji=heart04> 흐물흐물해져서 주군 생각밖에 할 수 없소오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「んにゃ<emoji=heart04>\u3000……にゃあぁぁぁぁぁんっ<emoji=heart04>\u3000腰っ<emoji=heart04>\u3000腰動いちゃうぅぅっ<emoji=heart04>\u3000どんどん激しくっ、おち○ちん求めちゃうでござるぅぅ<emoji=heart04>」"
translation = "「으냐<emoji=heart04> ……냐아아아아아앙<emoji=heart04> 허리, 허리가 움직여버리오오<emoji=heart04> 점점 격렬하게 자지를 원해버리오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あるじしゃま、あるじしゃまっ<emoji=heart04>\u3000エヘ<emoji=heart04>\u3000お名前呼びながら、おち○ちん入れるの、気持ちいい……っ<emoji=heart04>\u3000ふぁぁっ」"
translation = "「주군, 주군<emoji=heart04> 에헤<emoji=heart04> 이름 부르면서 자지 넣는 거 기분 좋아…… 후아앗」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あるじしゃまとくっつきながら、いっぱいエッチするの、一番しゅき…っ<emoji=heart04>\u3000しゅきっ<emoji=heart04>」"
translation = "「주군이랑 달라붙어서 잔뜩 섹스하는 거 제일 좋아…… 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あぁぁああああっ<emoji=heart04>\u3000しゅきぃ……<emoji=heart04>\u3000しゅきですっ<emoji=heart04>\u3000あるじしゃま、しゅきでござるぅ……っ、あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁあ……っ<emoji=heart04>」"
translation = "「아아아아아아앗<emoji=heart04> 좋아…… 좋아하오<emoji=heart04> 주군, 좋아하오…… 안앗<emoji=heart04> 안앗<emoji=heart04> 아아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「もっと……もっとぉっ<emoji=heart04>\u3000おち○ちん、強く……っ<emoji=heart04>\u3000大好きなあるじしゃまのおち○ちん、いっぱいほしいでござる……っ<emoji=heart04>\u3000ふあぁぁぁぁん<emoji=heart04>」"
translation = "「좀 더…… 좀 더어<emoji=heart04> 자지 강하게……<emoji=heart04> 정말 좋아하는 주군의 자지 잔뜩 갖고 싶소이다…… 후아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「きもちぃ<emoji=heart04>\u3000あぁぁぁっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好きですぅ<emoji=heart04>\u3000あるじしゃまだけ……っ<emoji=heart04>\u3000ずっといっしょ、いっしょでござるぅ……っ<emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 아아아앗<emoji=heart04> 좋아 좋아 좋아하오<emoji=heart04> 주군뿐…… 계속 함께, 함께이오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなのからだ、ぜんぶ<emoji=heart04>\u3000ぜんぶあげりゅ、あげるので……<emoji=heart04>\u3000いっぱい、いっぱい使ってほしいでござるっ<emoji=heart04>\u3000はぅぅぅぅんっ<emoji=heart04>」"
translation = "「세츠나의 몸 전부<emoji=heart04> 전부 줄게, 줄 테니까…… 잔뜩 잔뜩 써주길 바라오<emoji=heart04> 하으으으으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「おち○ちん、おち○ちんっ<emoji=heart04>\u3000しゅご……っ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000あぁぁぁぁぁ……っ<emoji=heart04>」"
translation = "「자지, 자지<emoji=heart04> 대단해…… 안앙 아아아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁぁん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000あぁぁぁぁ……っ<emoji=heart04>\u3000おち○ちん、さっきより、また硬く……っ<emoji=heart04>\u3000あぁぁぁぁっ」"
translation = "「하아앙<emoji=heart04> 앗 안앙 하아아앙 아아아아……<emoji=heart04> 자지 아까보다 또 딱딱해져서…… 아아아아앗」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「で、出る……っ<emoji=heart04>\u3000でちゃうのでござるかっ<emoji=heart04>\u3000はぁぁぁっ。おね、おねがいでござる……<emoji=heart04>」"
translation = "「나, 나온다…… 나오는 것이오!? 하아아앗. 부탁, 부탁하오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あるじしゃまのせーし<emoji=heart04>\u3000いっぱい、いっぱい……っ<emoji=heart04>\u3000せつなのおま○こに中出し<emoji=heart04>\u3000中出してくださいっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「주군의 정액<emoji=heart04> 잔뜩 잔뜩…… 세츠나의 보지에 질내사정, 질내사정 해주시오<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せ、せつなも……っ、もうダメ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000さっきからずっとイってて……<emoji=heart04>\u3000もう、げんかい……っ<emoji=heart04>\u3000あるじしゃまとイきたい<emoji=heart04>\u3000イきたい<emoji=heart04>\u3000イきたいっ<emoji=heart04>」"
translation = "「세, 세츠나도…… 이제 안 돼<emoji=heart04> 아아앙<emoji=heart04> 아까부터 계속 가버리고 있어서…… 이제 한계…… 주군이랑 가고 싶어 가고 싶어 가고 싶어<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ふぁぁぁあ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイクっ、それ気持ちいいっ<emoji=heart04>\u3000あああああああっ、あるじしゃまっ……しゅきっ<emoji=heart04>\u3000しゅきでござるぅぅっ<emoji=heart04>」"
translation = "「파아아아 가 가 가, 그거 기분 좋아 아아아아아아앗, 주군…… 좋아 좋아하오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あるじしゃま<emoji=heart04>\u3000いっしょに、いっしょに……っ<emoji=heart04>\u3000イきたいでござる<emoji=heart04>\u3000イって<emoji=heart04>\u3000イって<emoji=heart04>\u3000イって――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「주군<emoji=heart04> 같이, 같이…… 가고 싶소 가 가 가――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふあああぁぁっ<emoji=heart04>\u3000はあああああんっ<emoji=heart04><emoji=heart04>\u3000あ、あぁぁぁぁぁぁぁぁぁぁぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>！！」"
translation = "「앗<emoji=heart04> 아아앗<emoji=heart04> 후아아아앗<emoji=heart04> 하아아아아앙<emoji=heart04><emoji=heart04> 아, 아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ぁっ…………ふぁああああぁぁぁぁぁぁぁぁぁああああぁぁぁぁっっ<emoji=heart04><emoji=heart04><emoji=heart04>！！」"
translation = "「아앗………… 파아아아아아아아아아아아아아아아아아아앗앗<emoji=heart04><emoji=heart04><emoji=heart04>!!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「イックうぅぅぅ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああああっ、あっあっあっ！」"
translation = "「간다아아아──────앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아아아앗, 앗앗앗!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ぁ……はぁぁ……<emoji=heart04>\u3000あるじさまの、せーし<emoji=heart04><emoji=heart04>\u3000せつなの中にぃ……っ<emoji=heart04>\u3000びゅーって、出てるぅ……っ<emoji=heart04><emoji=heart04>」"
translation = "「아…… 하아……<emoji=heart04> 주군의 정액<emoji=heart04><emoji=heart04> 세츠나의 안에…… 뷰우 하고 나오고 있어……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あたまのなか、ふわふわ～って……あぁ、おち○ちん、ビクンってするたびに……何度も、イっちゃうでござる……<emoji=heart04><emoji=heart04>」"
translation = "「머릿속이 둥실둥실~해서…… 아아, 자지가 움찔움찔할 때마다 몇 번이고 가버리오……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ん……っ、あは、えへへぇ<emoji=heart04>\u3000せーし、入りきらなくて……あふれちゃってるでござるっ<emoji=heart04>」"
translation = "「응…… 앗, 아하 에헤헤<emoji=heart04> 정액, 다 안 들어가서 넘쳐버리고 있소<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「はぁぁっ。……ふぁ、結局、いちゃいちゃセックスが一番……気持ちいいのでござるな……<emoji=heart04>」"
translation = "「하아앗. ……후아, 결국 꽁냥꽁냥 섹스가 제일…… 기분 좋은 것이구려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あんな小芝居なんて、いらなかったでござる……最初から、恥ずかしくても……せつなから、ちゃんとお誘いすることができれば……」"
translation = "「그런 연극 같은 건 필요 없었소…… 처음부터 부끄러워도 세츠나가 제대로 유혹할 수 있었다면……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「せつなは幸せ者でござる。主様にその……愛されて、こんなに気持ちいいことまで……」"
translation = "「세츠나는 행복한 사람이오. 주군에게 그…… 사랑받고, 이렇게 기분 좋은 일까지……」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「って、あれ……主様？\u3000なんだかおち○ちん、また大きくなってきてるような……？」"
translation = "「어라, 주군? 왠지 자지가 다시 커지고 있는 것 같은……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうやらせつなが、いちゃいちゃセックスの良さに気づいてくれたみたいだから、もっといちゃいちゃさせてもらおうかな～、と」"
translation = "「아무래도 세츠나가 꽁냥꽁냥 섹스의 장점을 깨달아준 것 같으니까, 좀 더 꽁냥꽁냥하게 해줄까 싶어서~」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あ……いや、ダメでござる……っ。そんなに顔を近づけたらっ、恥ずかしいでござるっ。せつなのこと、見つめたらダメでござるぅぅぅ～～～っ<emoji=heart04>」"
translation = "「아…… 아니, 안 되오…… 그렇게 얼굴을 가까이하면 부끄럽소. 세츠나를 쳐다보면 안 되오오오~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結局、すぐいつも通りの恥ずかしがり屋に戻ってしまったせつなと、その後も滅茶苦茶いちゃいちゃした。"
translation = "결국 금방 평소대로의 부끄럼쟁이로 돌아가 버린 세츠나와 그 후로도 엄청나게 꽁냥거렸다."

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「ん、はぁ、ぁ……っ、あ、ふぅ……っ、んぁ、あっ、あぁ……っ、あん、んっ、はぁん、ふぅ……っ、はぁっ、はふぅ、あっ……。ふあぁ……んうぅ、はあぁ……んっ……んあぁっ」"
translation = "「응, 하아, 아…… 앗, 아, 후으…… 응아, 앗, 아아…… 안, 응, 하앙, 후으…… 하앗, 하후, 앗……. 후아아…… 응우으, 하아아…… 응…… 응아앗」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あんっ、ひうぅぅ……ふあぁっ、んあぁっ……！\u3000はあぁっ、んうぅっ……！\u3000んあぁっ、あんっ……ふうぅっ……！\u3000あんっ、ふわぁぁっ！\u3000あん……っ！」"
translation = "「안앗, 히우으으…… 후아앗, 응아앗……! 하아앗, 응우으……! 응아앗, 안앗…… 후우으……! 안앗, 후와아아앗! 안……!」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「あっ、あっ、ふぁああ……っ！\u3000しゅきっ。あぁぁぁんっ！\u3000ひうぅぅっ、しゅき……っ！\u3000しゅき……あんっ！\u3000はぅ……っ、しゅきぃぃ<emoji=heart04>\u3000あんっ！\u3000はあぁぁぁんっ！\u3000ふわあぁぁぁっ！」"
translation = "「앗, 앗, 파아아아……! 좋아. 아아아앙! 히우으으, 좋아……! 좋아…… 안앗! 하우…… 좋아아아<emoji=heart04> 안앗! 하아아아앙! 후와아아아앗!」"

