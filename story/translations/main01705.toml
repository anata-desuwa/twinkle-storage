[[dialogue]]
speaker = "unk"
original = "第５話,仲間がいれば,B"
translation = "「제5화, 동료가 있다면, B」"

[[dialogue]]
speaker = "アポロ"
original = "「ぐッッ────！！」"
translation = "「크으으으으────!!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「皆さん、下がって──！」"
translation = "「여러분, 물러서세요──!」"

[[dialogue]]
speaker = "unk"
original = "恐るべき闇黒の暴力が──俺たち全員を軽々と吹き飛ばす！"
translation = "「두려운 암흑의 폭력이── 우리들 전원을 가볍게 날려 버린다!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「だ──大丈夫かニャ、おミャーら！？」"
translation = "「괘── 괜찮은 거냐옹, 너희들!?」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「ふふふ──はははは！\u3000それしきでおしまいですか、星騎士たち？\u3000こうも矮小な存在に苦しめられていたとは、己が恥ずかしくなるほどですねぇ」"
translation = "「후후후── 하하하하! 고작 이 정도로 끝입니까, 성기사들? 이렇게나 왜소한 존재에게 괴롭힘을 당하고 있었다니, 스스로가 부끄러워질 정도군요」"

[[dialogue]]
speaker = "ユウリ"
original = "「なんつうパワーだよ、おい……！」"
translation = "「무슨 파워야, 어이……!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「姉さんの力を借りても、敵わないなんて……！」"
translation = "「언니의 힘을 빌려도, 당해낼 수 없다니……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「つ……強すぎます……！\u3000どうして、アポロさんよりも強力なのですか──！？」"
translation = "「너…… 너무 강합니다……! 어째서, 아폴로 씨보다도 강력한 것입니까──!?」"

[[dialogue]]
speaker = "セーラ"
original = "「話が違う感じするよねえ──いくら３０００年前の血筋っても、先代の魔王に負けたんじゃなかったの……？」"
translation = "「이야기가 다른 느낌이 드네── 아무리 3000년 전의 혈통이라고 해도, 선대 마왕에게 진 거 아니었어……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ……！\u3000それならなおさら、星力まで手に入れた今の<ruby>魔王<rt>クロト</rt></ruby>に敵うはずないのに……！」"
translation = "「네……! 그렇다면 더욱이, 성력까지 손에 넣은 지금의 마왕에게 당해낼 리가 없는데……!」"

[[dialogue]]
speaker = "unk"
original = "天空に君臨する邪悪の化身──"
translation = "「천공에 군림하는 사악의 화신──」"

[[dialogue]]
speaker = "unk"
original = "魔神と化したギエルは、人間であった頃からは考えられないほどの威圧感を有していた。"
translation = "「마신이 된 기엘은, 인간이었을 때에는 생각할 수 없을 정도의 위압감을 가지고 있었다.」"

[[dialogue]]
speaker = "リノ"
original = "「恐らく──適合度合い」"
translation = "「아마도── 적합도」"

[[dialogue]]
speaker = "unk"
original = "その原因を、母さんは冷静に分析した。"
translation = "「그 원인을, 엄마는 냉정하게 분석했다.」"

[[dialogue]]
speaker = "アナ"
original = "「というと……あの『仮面』との相性、ですか」"
translation = "「라고 하면…… 저 『가면』과의 궁합, 입니까」"

[[dialogue]]
speaker = "リノ"
original = "「ええ。アポロちゃんは──深層心理ではやっぱり『使徒』としての破壊衝動を拒絶してた。でも、彼は……」"
translation = "「응. 아폴로짱은── 심층 심리에서는 역시 『사도』로서의 파괴 충동을 거부하고 있었어. 하지만, 그는……」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「くふふ……あっはっはっは！\u3000実に心地よい音色だ──虚ろだった私の胸に、染み渡っていくのを感じる……！」"
translation = "「크흐흐…… 앗하하하하! 실로 기분 좋은 음색이다── 공허했던 저의 가슴에, 스며들어 가는 것을 느낀다……!」"

[[dialogue]]
speaker = "クロト"
original = "「──魂との、<ruby>同調<rt>シンクロ</rt></ruby>……！」"
translation = "「──영혼과의, 동조……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「最悪な適材適所……ってわけね」"
translation = "「최악의 적재적소……라는 거네」"

[[dialogue]]
speaker = "unk"
original = "魔王という血で制限されてなお、アポロはあれほどの脅威を誇っていた。"
translation = "「마왕이라는 피로 제한되고도, 아폴로는 그 정도의 위협을 자랑했다.」"

[[dialogue]]
speaker = "unk"
original = "しかし今回のギエルは──身も心もリクリエの侵蝕を受け入れてしまっている！"
translation = "「하지만 이번의 기엘은── 몸도 마음도 리크리에의 침식을 받아들이고 있다!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "（姉さんは……これほどの暴威を、抑えつけていたのですね……！）"
translation = "（언니는…… 이 정도의 폭위를, 억누르고 있었던 거군요……!）"

[[dialogue]]
speaker = "魔神ギエル"
original = "「この手で魔王<b>たち</b>を<ruby>斃<rt>たお</rt></ruby>し……リクリエを為し……そして、<ruby>終<rt>つい</rt></ruby>には私も消える」"
translation = "「이 손으로 <b>마왕들</b>을 <b>쓰러뜨리고</b>…… 리크리에를 이루고…… 그리고, 마침내 저도 사라진다」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「それこそ我が唯一の野望──今こそ『使徒』としての定めを果たし、パーフェクト・ワールドへ至るとき！」"
translation = "「그것이야말로 저의 유일한 야망── 지금이야말로 『사도』로서의 운명을 다하고, 퍼펙트 월드에 도달할 때!」"

[[dialogue]]
speaker = "ソフィア"
original = "「くぅぅぅっっ────！」"
translation = "「크으으으으────!!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「これは──姉さんのダストストーム──！？」"
translation = "「이것은── 언니의 더스트 스톰──!?」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしのを勝手にアレンジしてる──やりすぎだ！\u3000みんな伏せろ！」"
translation = "「나의 것을 멋대로 어레인지하고 있어── 지나치다! 모두 엎드려!」"

[[dialogue]]
speaker = "サーシャ"
original = "「こんなの食らったら街どころか──地上全部消し飛んじゃうわ！」"
translation = "「이런 거 맞으면 마을은커녕── 지상 전부 날아가 버릴 거야!」"

[[dialogue]]
speaker = "クロト"
original = "「──オオオオオオッッ！！」"
translation = "「──오오오오오오옷!!」"

[[dialogue]]
speaker = "unk"
original = "真昼の彗星たちが小銀河のように渦を巻き、俺たちを襲う。"
translation = "「대낮의 혜성들이 작은 은하처럼 소용돌이치며, 우리들을 덮친다.」"

[[dialogue]]
speaker = "unk"
original = "惑星すら壊滅させる嵐を必死の思いでしのぎ切るも──当のギエルには傷ひとつつけられなくて。"
translation = "「행성조차 괴멸시킬 폭풍을 필사적으로 견뎌냈지만── 정작 기엘에게는 상처 하나 입힐 수 없었다.」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「──地を這いなさい、虫けらども」"
translation = "「──땅을 기어라, 벌레만도 못한 것들아」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「霊力だろうと──魔力だろうと──宇宙の理に従う私には敵わない。所詮は無駄な足掻きだったと認めるのです」"
translation = "「영력일지라도── 마력일지라도── 우주의 이치에 따르는 저를 이길 수 없습니다. 결국은 헛된 발버둥이었다고 인정하세요」"

[[dialogue]]
speaker = "クロト"
original = "「ふざ、けるな……！\u3000誰が、おまえなんかに屈するか……！」"
translation = "「까, 불지 마……! 누가, 너 따위에게 굴복할까……!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ッ、なんでしょう──これは……なぜか力が、入らない、ような……！」"
translation = "「읏, 무엇일까요── 이것은…… 왠지 모르게 힘이, 들어가지, 않는 듯한……!」"

[[dialogue]]
speaker = "unk"
original = "それは最大の誤算だった。"
translation = "「그것은 최대의 오산이었다.」"

[[dialogue]]
speaker = "unk"
original = "ギエルに宿った敗残者の魂。その結晶である『影』は、俺たち魔王への特効能力を有していた。"
translation = "「기엘에게 깃든 패잔자의 영혼. 그 결정체인 『그림자』는, 우리들 마왕에게 특효 능력을 가지고 있었다.」"

[[dialogue]]
speaker = "unk"
original = "一帯に満ちた漆黒の波動を浴びているだけで、力も、希望さえも奪われていく。"
translation = "「일대에 가득 찬 칠흑의 파동을 쬐고 있는 것만으로, 힘도, 희망마저도 빼앗겨 간다.」"

[[dialogue]]
speaker = "マトイ"
original = "（立てない……！\u3000なんなの、この悲しい波動は……！）"
translation = "（설 수 없어……! 뭐야, 이 슬픈 파동은……!）"

[[dialogue]]
speaker = "ソフィア"
original = "（気分、最悪です──絶望しか、抱けない、みたいな……！）"
translation = "（기분, 최악입니다── 절망밖에, 품을 수 없는, 것 같은……!）"

[[dialogue]]
speaker = "ルリエル"
original = "（そんな……！\u3000皆さんでここまで、頑張ったっていうのに……！）"
translation = "（이럴 수가……! 모두 함께 여기까지, 노력했는데……!）"

[[dialogue]]
speaker = "リノ"
original = "（私の準備も──これ以上は、もう……！）"
translation = "（나의 준비도── 더 이상은, 이제……!）"

[[dialogue]]
speaker = "unk"
original = "まさしく絶望的な脅威。"
translation = "「그야말로 절망적인 위협.」"

[[dialogue]]
speaker = "unk"
original = "俺も、みんなも、幾度も成長と覚醒を重ねて至った末で……こんな最後が待っているなんて。心までもがへし折られる。"
translation = "「나도, 모두도, 몇 번이고 성장과 각성을 거듭하여 도달한 끝에…… 이런 최후가 기다리고 있다니. 마음마저 꺾인다.」"

[[dialogue]]
speaker = "unk"
original = "だけど、そんな、苦境の中でも──"
translation = "「하지만, 그런, 고난 속에서도──」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしの……せいだ……」"
translation = "「나의…… 탓이다……」"

[[dialogue]]
speaker = "unk"
original = "ひとり──仮面を脱ぎ去った少女が、立ち上がる。"
translation = "「홀로── 가면을 벗어던진 소녀가, 일어선다.」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしのせいで……オマエは……人としての道を、踏み外した。目を逸らしちゃいけないことだ」"
translation = "「나 때문에…… 너는…… 인간으로서의 길을, 벗어났다. 눈을 돌려서는 안 되는 일이야」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「あなたのせい？\u3000いえいえ、あなたのおかげ──ですとも」"
translation = "「당신의 탓이요? 아닙니다, 당신 덕분──입니다」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「なぜならあの日……アポロ様に出会わなければ、私は自ら死を選んでいたのですから。感謝してもし足りませんとも」"
translation = "「왜냐하면 그날…… 아폴로 님을 만나지 않았다면, 저는 스스로 죽음을 택했을 테니까요. 감사해도 모자랄 지경입니다」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ……そうだな。でも、だから……あたしが最後まで、面倒を見てやらなくちゃ。それがやり残したことなんだ」"
translation = "「아아…… 그렇군. 하지만, 그러니까…… 내가 끝까지, 돌봐줘야 해. 그것이 남겨진 일이야」"

[[dialogue]]
speaker = "アポロ"
original = "「『使徒』だったあたしでも、変われたように。今度こそオマエを……正しい運命に引き戻してみせる！」"
translation = "「『사도』였던 나조차, 변할 수 있었듯이. 이번에야말로 너를…… 올바른 운명으로 되돌려 놓겠어!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「ああ……やれやれ。嘆かわしい。実に空虚なセリフを吐くようになったものです」"
translation = "「아아…… 이럴 수가. 한심하군요. 실로 공허한 대사를 내뱉게 되었군요」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「私は！\u3000私の意志で！\u3000終末を望もうというのですよ！\u3000いつまでも主人ヅラをされるのは不愉快ですねぇ！」"
translation = "「저는! 저의 의지로! 종말을 바라겠다는 것입니다! 언제까지나 주인 행세를 당하는 것은 불쾌하군요!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「もうこれ以上──あなたの顔を拝んでいたくない。<ruby>疾<rt>と</rt></ruby>く消えていただくとしましょう」"
translation = "「더 이상── 당신의 얼굴을 보고 싶지 않습니다. 빨리 사라져 주시도록 하죠」"

[[dialogue]]
speaker = "アポロ"
original = "「──ッ……！」"
translation = "「──읏……!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「姉さんだけじゃ……ありませんよ……やり残したことが、あるのは……！」"
translation = "「언니뿐만이…… 아니에요…… 남겨진 일이, 있는 것은……!」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……俺たち全員……目指す先は一緒だ」"
translation = "「아아…… 우리들 전원…… 목표로 하는 곳은 같아」"

[[dialogue]]
speaker = "unk"
original = "魔王とは──災禍にも英雄にもなりえるもの。"
translation = "「마왕이란── 재앙도 영웅도 될 수 있는 존재.」"

[[dialogue]]
speaker = "unk"
original = "その世界の命運を一身に背負う存在。"
translation = "「그 세계의 명운을 온몸으로 짊어지는 존재.」"

[[dialogue]]
speaker = "unk"
original = "そして先代──ラクシスだって、数奇にも結合した魔王の因子に従って最期の時まで『英雄』であり続けた。"
translation = "「그리고 선대── 라크시스조차, 기구하게도 결합한 마왕의 인자에 따라 최후의 순간까지 『영웅』으로 계속 존재했다.」"

[[dialogue]]
speaker = "unk"
original = "なら俺たちも、奴のような負の遺産に敗れるわけにはいかないだろう。"
translation = "「그렇다면 우리들도, 그 녀석과 같은 부정적인 유산에게 패배할 수는 없을 것이다.」"

[[dialogue]]
speaker = "クロト"
original = "「ギエル──おまえはひとつ間違ってる」"
translation = "「기엘── 너는 하나 잘못 알고 있어」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「……何？」"
translation = "「……무엇을요?」"

[[dialogue]]
speaker = "クロト"
original = "「アポロはもう──おまえのことを従者なんて思っちゃいないよ。だから、主人ヅラなんていうのは、間違ってる」"
translation = "「아폴로는 이제── 너를 종자라고 생각하지 않아. 그러니, 주인 행세 따위는, 틀렸어」"

[[dialogue]]
speaker = "unk"
original = "アポロは、主としての自分がギエルに拒絶されたことを受け入れていた。"
translation = "「아폴로는, 주인으로서의 자신이 기엘에게 거부당했다는 것을 받아들이고 있었다.」"

[[dialogue]]
speaker = "unk"
original = "そして、自分にもうその資格がないってことも。だから。"
translation = "「그리고, 자신에게 더 이상 그 자격이 없다는 것도. 그래서.」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「知ったふうな口を──私が従者でなければ、何だと言うのです──？」"
translation = "「아는 척하는 말을── 제가 종자가 아니라면, 무엇이라고 말하는 겁니까──?」"

[[dialogue]]
speaker = "クロト"
original = "「決まってる──<b>仲間</b>だよ。今までさんざん、俺たちのことも見てきただろ。それと一緒だ」"
translation = "「정해져 있어── <b>동료</b>다. 지금까지 실컷, 우리들의 모습도 봐 왔잖아. 그것과 같아」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker = "unk"
original = "──見返りなく、相手に手を差し伸べられること。"
translation = "「──대가 없이, 상대에게 손을 내밀 수 있다는 것.」"

[[dialogue]]
speaker = "unk"
original = "アポロは今でもギエルとの絆を信じていた。でも……"
translation = "「아폴로는 지금도 기엘과의 인연을 믿고 있었다. 하지만……」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「くく……ははは！\u3000なるほど──仲間。主でも恩人でもなく、ですか。くくく……実に面白い……！」"
translation = "「크크…… 하하하! 과연── 동료. 주인도 은인도 아닌, 말입니까. 크크크…… 실로 재미있군요……!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「ですが……そんなもの私には不要ッ！\u3000虫唾が走りますねぇ！」"
translation = "「하지만…… 그런 것은 저에게 불필요합니다! 혐오감이 드는군요!」"

[[dialogue]]
speaker = "アポロ"
original = "「ギエルっ……！」"
translation = "「기엘읏……!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「く──！」"
translation = "「크──!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「あなたの底は既に知れました──いくら虚勢を張ろうとも無為なことです」"
translation = "「당신의 밑바닥은 이미 드러났습니다── 아무리 허세를 부려도 헛된 일입니다」"

[[dialogue]]
speaker = "クロト"
original = "「底──か。確かに俺ひとりの全力はもう見せたかもしれない。でも……発揮できるのは、それだけじゃない」"
translation = "「밑바닥──인가. 확실히 나 혼자의 전력은 이미 보여줬을지도 몰라. 하지만…… 발휘할 수 있는 건, 그것만이 아니야」"

[[dialogue]]
speaker = "クロト"
original = "「おまえに教えてやるさ──仲間との絆を信じる、ヒトの強さってやつを……！」"
translation = "「너에게 가르쳐 줄게── 동료와의 인연을 믿는, 인간의 강함이라는 것을……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「！\u3000あれって──？」"
translation = "「! 저거──?」"

[[dialogue]]
speaker = "クロト"
original = "「仲間と一緒なら──俺たちはいくらでも強くなれる。俺が学園に入って、さんざん学んだことだ」"
translation = "「동료와 함께라면── 우리들은 얼마든지 강해질 수 있어. 내가 학원에 들어와서, 실컷 배운 것이다」"

[[dialogue]]
speaker = "クロト"
original = "「せっかく新しい面子まで<b>揃った</b>んだ。本番はこれからだってもんだろ──！」"
translation = "「모처럼 새로운 멤버까지 <ruby>갖춰진 거<rt>・・・ ・</rt></ruby>잖아. 본 게임은 지금부터라는 거겠지──!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ……その通りですね、緋宮会長。取り戻した絆は、私たち姉妹だけのものじゃない」"
translation = "「네…… 그 말씀대로입니다, 히노미야 회장. 되찾은 인연은, 저희 자매만의 것이 아닙니다」"

[[dialogue]]
speaker = "アポロ"
original = "「こんなあたしでも、仲間って認めてくれるヤツがいる──はは。恵まれてるな」"
translation = "「이런 나라도, 동료라고 인정해 주는 녀석이 있어── 하하. 복 받았네」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ──フィオナ嬢たちと新星会長が光ってるニャン……！？」"
translation = "「냥── 피오나 아가씨들과 신성 회장이 빛나고 있는 냥……!?」"

[[dialogue]]
speaker = "アナ"
original = "「これは──魔王同士の共鳴──！」"
translation = "「이것은── 마왕끼리의 공명──!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「愚かな……ベガの末路は見たはずです。あなた方が何度立ち上がろうとも、終末の運命は揺るがない！」"
translation = "「어리석은…… 베가의 말로는 봤을 터. 당신들이 몇 번이고 일어서더라도, 종말의 운명은 흔들리지 않습니다!」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことはない──俺たちがここに立ってることが、その証明だ！」"
translation = "「그렇지 않아── 우리들이 여기에 서 있는 것이, 그 증명이다!」"

[[dialogue]]
speaker = "unk"
original = "──３つの力と。"
translation = "──세 가지 힘과."

[[dialogue]]
speaker = "unk"
original = "──３人の魔王を合わせて。"
translation = "──세 명의 마왕을 합쳐서."

[[dialogue]]
speaker = "unk"
original = "──３つの世界を救う。"
translation = "──세 개의 세계를 구한다."

[[dialogue]]
speaker = "unk"
original = "それは──本来交わることなんてなかったはずの、幾多もの運命が絡み合って生まれた奇跡。"
translation = "그것은── 본래는 엮일 일조차 없었을, 수많은 운명이 얽히고설켜 태어난 기적."

[[dialogue]]
speaker = "マトイ"
original = "「すごい……！\u3000魔王の力が──ひとつになってる……！」"
translation = "「대단해……! 마왕의 힘이── 하나가 되고 있어……!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「こんニャのは初めてニャン……！\u3000前の森羅暦でも、ありえなかったはずニャ……！」"
translation = "「이런 건 처음이냥……! 이전 신라력에서도, 있을 수 없었을 거냥……!」"

[[dialogue]]
speaker = "リノ"
original = "（この光──そっか……）"
translation = "（이 빛── 그렇구나……）"

[[dialogue]]
speaker = "リノ"
original = "（なんだか……腑に落ちた気がするわ。ネビュラにもたどり着けなかった、アルタイルを救済する方法）"
translation = "（왠지…… 납득이 가는 기분이야. 네뷸라도 도달하지 못했던, 알타이르를 구제하는 방법）"

[[dialogue]]
speaker = "リノ"
original = "（３人の魔王が結集するなんて──そんなの、考えもしなかったわね……）"
translation = "（세 명의 마왕이 결집하다니── 그런 건, 생각조차 못 했었네……）"

[[dialogue]]
speaker = "unk"
original = "たったひとつの使命を元に集まった俺たち。その総力は何倍にも跳ね上がる！"
translation = "단 하나의 사명을 바탕으로 모인 우리들. 그 총력은 몇 배로 뛰어오른다!"

[[dialogue]]
speaker = "クロト"
original = "「ベガとデネブは確かに手遅れだったのかもしれない。だけど、そのためにヴィーナスは来てくれた」"
translation = "「베가와 데네브는 확실히 때가 늦었을지도 몰라. 하지만, 그러기 위해서 비너스는 와줬어」"

[[dialogue]]
speaker = "クロト"
original = "「不甲斐ない俺を目覚めさせて。女神や守護天使たちの導きも通じて。ここまできた」"
translation = "「못난 나를 깨어나게 해주고. 여신이나 수호 천사들의 인도도 통해서. 여기까지 왔지」"

[[dialogue]]
speaker = "クロト"
original = "「その全部──他の平行世界にはなかった、未知の物語だったはずだ」"
translation = "「그 모든 것── 다른 평행 세계에는 없었던, 미지의 이야기였을 거야」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ。そして、遠回りでしたが姉さんも」"
translation = "「네. 그리고, 멀리 돌아왔지만 언니도요」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「こうして私たちが一丸となった今──きっと、超えられない壁なんてないはずです」"
translation = "「이렇게 저희들이 한마음이 된 지금── 분명, 넘을 수 없는 벽 따위는 없을 것입니다」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「未知の物語……下らない。たとえ道筋が変わろうとも、行き着く末路は同じに決まっている」"
translation = "「미지의 이야기…… 시시하군요. 설령 경로가 바뀐다 하더라도, 도달할 말로는 똑같을 것이 정해져 있습니다」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「その程度で……宇宙の啓示に抗えるなどと、思い上がるな！」"
translation = "「그 정도로…… 우주의 계시에 맞설 수 있다고, 주제넘게 생각하지 마십시오!」"

[[dialogue]]
speaker = "クロト"
original = "「あいにく──星騎士はそういう存在なんでな」"
translation = "「공교롭게도── 성기사는 그런 존재라서 말이지」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちはアルタイルを救う。俺たち全員の生きてきたこの世界だけは、決して終わらせやしない」"
translation = "「우리들은 알타이르를 구할 거야. 우리들 전원이 살아온 이 세계만큼은, 결코 끝나게 두지 않아」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「はい。なぜなら私たちは──世界の命運を担う『魔王』だから」"
translation = "「네. 왜냐하면 저희들은── 세계의 명운을 짊어진 『마왕』이니까요」"

[[dialogue]]
speaker = "アポロ"
original = "「ギエル──オマエにも教えてやる。どんな目に遭ったって、希望は潰えやしないってこと」"
translation = "「기엘── 너에게도 가르쳐 줄게. 어떤 일을 겪더라도, 희망은 꺾이지 않는다는 것을」"

[[dialogue]]
speaker = "マトイ"
original = "「すごい……３人の光が……！」"
translation = "「대단해…… 세 사람의 빛이……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王と魔王と魔王のパワーが合わさって──えぇと、なんかもうとりあえず最強だわ！」"
translation = "「마왕과 마왕과 마왕의 파워가 합쳐져서── 에잇, 아무튼 일단 최강이야!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの『影』にも負けない星と魔と霊の力が巨大な器に渦を巻く。"
translation = "기엘의 『그림자』에도 지지 않는 성과 마와 영의 힘이 거대한 그릇에 소용돌이친다."

[[dialogue]]
speaker = "unk"
original = "魔王と魔王と魔王による三重奏──その総力は、たとえリクリエ相手にも引けを取らない！"
translation = "마왕과 마왕과 마왕에 의한 삼중주── 그 총력은, 설령 리크리에를 상대로도 뒤지지 않는다!"

[[dialogue]]
speaker = "魔神ギエル"
original = "「ああ……小賢シイ……３０００年前のラクシスと……何モ変わってイナイ……イヤ……あれより醜イ……」"
translation = "「아아…… 교활하군…… 3000년 전의 라크시스와…… 아무것도 변하지 않았어…… 아니…… 그보다 추악해……」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「何ガ仲間だ……何が希望ダ……平等な終末は、スグそこに迫っていたとイウノニ。……アア、鬱陶シイ鬱陶シイ鬱陶シイ────！！」"
translation = "「무엇이 동료냐…… 무엇이 희망이냐…… 평등한 종말은, 바로 코앞에 다가와 있었거늘. ……아아, 성가셔 성가셔 성가셔────!!」"

[[dialogue]]
speaker = "マトイ"
original = "「っ……何……！？」"
translation = "「읏…… 뭐……!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ますます人間じゃなくなってくニャン──！？」"
translation = "「점점 인간이 아니게 되고 있냥──!?」"

[[dialogue]]
speaker = "unk"
original = "じゅくじゅくと不気味な音を立て、ギエルの血肉はさらなる変貌を遂げていた。"
translation = "축축하고 불길한 소리를 내며, 기엘의 살점은 더욱 변모를 이루고 있었다."

[[dialogue]]
speaker = "unk"
original = "心臓部に埋もれた覇霊玉が妖しい光を放つ──"
translation = "심장부에 파묻힌 패령옥이 요사스러운 빛을 내뿜는다──"

[[dialogue]]
speaker = "魔神ギエル"
original = "「終ワリにシマショウ。アナタたちサエ潰セバ、もはやアルタイルに邪魔はナイ」"
translation = "「끝을 냅시다. 당신들만 짓밟으면, 더 이상 알타이르에 방해는 없어」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「見ていてクダサイねェ、今ハ亡キ我ガ<ruby>古<rt>イニシエ</rt></ruby>の主……従順ナル<ruby>下僕<rt>シモベ</rt></ruby>ガ、真の終焉ヲもたらす様ヲォ！！」"
translation = "「보고 있으십시오, 지금은 없는 나의 옛 주인…… 고분고분한 하인이, 진정한 종언을 가져오는 모습을!!」"

[[dialogue]]
speaker = "クロト"
original = "「いくぞアポロ、フィオナ──ギエルと覇霊玉を全力で粉砕する！」"
translation = "「간다 아폴로, 피오나── 기엘과 패령옥을 전력으로 분쇄한다!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ──太陽の輝きに懸けて！」"
translation = "「네── 태양의 빛에 걸고!」"

[[dialogue]]
speaker = "アポロ"
original = "「主としてのケジメ、果たしてやる！」"
translation = "「주인으로서의 도리, 다 해줄게!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちも──全力でサポートするわ！」"
translation = "「우리들도── 전력으로 서포트할게!」"

[[dialogue]]
speaker = "ソフィア"
original = "「はいっ──！」"
translation = "「네엣──!」"

[[dialogue]]
speaker = "魔神ギエル"
original = "「来ルガヨイ、魔王ドモ──今コソ宇宙ノ再創生ヲ願ウ時！」"
translation = "「올지어다, 마왕 놈들아── 지금이야말로 우주의 재창생을 바랄 때!」"

