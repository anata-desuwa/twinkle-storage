[[dialogue]]
speaker = "unk"
original = "第１話,体は小さくなっても,P"
translation = "제1화, 몸은 작아져도, P"

[[dialogue]]
speaker = "unk"
original = "アルモが附属校に通うようになってから、しばらく経ったある休日のこと。彼女から遊びに行こうと誘われて、俺は街へとやってきていた。"
translation = "알모가 부속교에 다니게 된 후, 한참이 지난 어느 휴일의 일. 그녀로부터 놀러 가자는 권유를 받고 나는 거리로 나와 있었다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長～！\u3000早く早くなのだ～！」"
translation = "「회장~! 빨리빨리인 것이다~!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――今日はいつにも増して元気？\u3000だって、会長と久しぶりのデートなのだ♪」"
translation = "「――오늘은 평소보다 더 기운차네? 그야, 회장과 오랜만의 데이트인 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あっ、でも、この体で一緒にデートするのは初めてだな！\u3000そう考えると、なんだか新鮮な感じがするのだ！」"
translation = "「앗, 하지만 이 몸으로 같이 데이트하는 건 처음이네! 그렇게 생각하니 왠지 신선한 기분이 드는 것이다!」"

[[dialogue]]
speaker = "unk"
original = "なぜアルモの体が小さくなっているのかといえば、附属校に通う為にスペアボディ『幼アバター』を使用しているからである。"
translation = "왜 알모의 몸이 작아져 있는가 하면, 부속교에 다니기 위해 스페어 바디 『어린 아바타』를 사용하고 있기 때문이다."

[[dialogue]]
speaker = "unk"
original = "元々は以前現れた新種モンスターから受けた攻撃の影響で、一時的に本体アバターが使用不能になり、その代わりとして使い始めたのがきっかけだ。"
translation = "원래는 이전에 나타난 신종 몬스터에게 받은 공격의 영향으로 일시적으로 본체 아바타를 사용할 수 없게 되어, 그 대신으로 쓰기 시작한 것이 계기다."

[[dialogue]]
speaker = "unk"
original = "最近は附属校生活が楽しいようで、こちらの姿でいることの方が多い。"
translation = "최근에는 부속교 생활이 즐거운지 이 모습으로 있는 경우가 더 많다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「さて、今日はまず、レジャー施設で思いっきり遊ぶのだ！」"
translation = "「자, 오늘은 우선 레저 시설에서 마음껏 노는 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ＤＩＳＣで調べたら、ボウリングとかスポーツとか、色々できる場所があるのを見つけたのだ！」"
translation = "「DISC로 찾아봤더니 볼링이나 스포츠라든가, 여러 가지를 할 수 있는 장소를 발견한 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――ん？\u3000食べ歩きはしないのかって？」"
translation = "「――응? 길거리 음식은 안 먹냐고?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ふっふっふ……アルモたんはこの体になって、新たな学びを得たのだ。それは――」"
translation = "「훗훗훗…… 알모땅은 이 몸이 되어서 새로운 배움을 얻은 것이다. 그것은――」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「いっぱい遊んで、お腹が空いてから食べるお肉は、すごく美味ということなのだ！」"
translation = "「잔뜩 놀아서 배가 고파진 뒤에 먹는 고기는 정말 맛있다는 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「だから会長、午前中はアルモたんと思いっきり遊ぶのだ！」"
translation = "「그러니까 회장, 오전에는 알모땅과 마음껏 노는 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「それじゃあ、手を繋いで出発なのだ♪」"
translation = "「그럼 손을 잡고 출발인 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "それからレジャー施設に行って、ボウリングや卓球等で遊び倒した後、午後からは食べ歩きをすることになった。"
translation = "그 후 레저 시설에 가서 볼링이나 탁구 등으로 실컷 논 뒤, 오후부터는 길거리 음식을 먹기로 했다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「もぐもぐ♪\u3000ん～、やっぱりお腹が減るまで遊んだ後に食べるお肉は格別なのだ！」"
translation = "「우물우물♪ 음~ 역시 배가 고플 때까지 논 뒤에 먹는 고기는 각별한 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ほら、会長も１本どうぞなのだ♪\u3000ここのお店の牛串、すごく美味なのだぞ？」"
translation = "「자, 회장도 한 입 먹어보는 것이다♪ 이 가게의 소고기 꼬치, 정말 맛있는 것이라고?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「どうなのだ？\u3000少しは元気が出たか？」"
translation = "「어떠냐? 조금은 기운이 났는가?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――それならよかったのだ！\u3000最近の会長は、ちょっと変だったからな」"
translation = "「――그렇다면 다행인 것이다! 최근의 회장은 좀 이상했으니까 말이야.」"

[[dialogue]]
speaker = "unk"
original = "え？\u3000変って？"
translation = "에? 이상하다니?"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「なんだか……最近は、アルモたんとの間に、少し距離があるような感じがしたのだ。そう――」"
translation = "「왠지…… 최근에는 알모땅과의 사이에 조금 거리가 있는 듯한 느낌이 들었던 것이다. 그래――」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「恋人として付き合う前の感じに、戻ってしまったみたいな」"
translation = "「연인으로서 사귀기 전의 느낌으로 돌아가 버린 것 같은.」"

[[dialogue]]
speaker = "unk"
original = "実は、アルモが幼アバターを使い始める少し前、互いに好意を伝え合って、俺たちは恋人関係になっていた。ただ……"
translation = "사실 알모가 어린 아바타를 사용하기 직전, 서로 호감을 전하고 우리들은 연인 관계가 되어 있었다. 다만……"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――アルモたんが幼アバターを使うようになってから、雰囲気が変わったから、同じように接していいかわからなくなってた……？」"
translation = "「――알모땅이 어린 아바타를 사용하게 된 뒤로 분위기가 바뀌어서 똑같이 대해도 좋을지 모르게 됐다고……?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「う～ん、自分ではそこまで変わったつもりはないのだが……確かに周りからはよく、幼くなっているとツッコまれるのだ」"
translation = "「으음, 스스로는 그렇게까지 변한 생각은 없지만…… 확실히 주변에서는 자주 어려졌다고 한마디씩 듣는 것이다.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「でも、そういう風に思われてるということは、アルモたんの気持ちが、会長にしっかり伝わっていなかったということなのだな」"
translation = "「하지만 그런 식으로 생각된다는 건 알모땅의 마음이 회장에게 제대로 전해지지 않았다는 것이겠네.」"

[[dialogue]]
speaker = "unk"
original = "ごめん……"
translation = "미안……"

[[dialogue]]
speaker = "unk"
original = "幼アバターになったことで、ひょっとしたらアルモの俺に対する好意も変化してしまっているかもしれないと、恋人としての距離感を測りかねてしまったのだ。"
translation = "어린 아바타가 된 것으로 어쩌면 알모의 나에 대한 호감도 변해버렸을지도 모른다고 연인으로서의 거리감을 가늠하지 못했던 것이다."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「う～ん……そうだ！\u3000なら、いいことを思い付いたのだ！」"
translation = "「으음…… 그렇다! 그럼 좋은 게 생각난 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「天使の羽でふわっと浮いて～……えいっ♪」"
translation = "「천사의 날개로 둥실 떠올라서~…… 에잇♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「ん～<emoji=heart04>\u3000……ちゅっ<emoji=heart04>」"
translation = "「음~<emoji=heart04> ……츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!? "

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――えへへ♪\u3000いきなり唇にキスをされて、驚いたのだ？」"
translation = "「――에헤헤♪ 갑자기 입술에 키스를 당해서 놀랐는가?」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「距離感がわからなくなってしまったのなら、『好き』をもう１度ここからやり直せばいいのだ♪」"
translation = "「거리감을 모르게 되어버렸다면 『좋아함』을 다시 한번 여기서부터 시작하면 되는 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長、周りが言うように、アルモたんの精神は少し変化しているのかもしれないのだ。でも――」"
translation = "「회장, 주변에서 말하는 것처럼 알모땅의 정신은 조금 변화했을지도 모르는 것이다. 하지만――」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「会長に対する『好き』という気持ちは、前から変わっていないのだ！\u3000――ああいや、嘘を言ったのだ」"
translation = "「회장에 대한 『좋아함』이라는 마음은 예전부터 변하지 않은 것이다! ――아아 아니, 거짓말을 한 것이다.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんはこの体になって、会長への好きという気持ちは、前より大きくなったのだ！」"
translation = "「알모땅은 이 몸이 되어서 회장에 대한 좋아함이라는 마음은 전보다 커진 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「だから、会長。改めて、言うのだ」"
translation = "「그러니까 회장. 다시 한번 말하는 것이다.」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「アルモたんは会長のことが好きだぞ。だから――この体でも恋人として付き合って欲しいのだ」"
translation = "「알모땅은 회장을 좋아한다구. 그러니까―― 이 몸으로도 연인으로서 사귀어 주길 바라는 것이다.」"

[[dialogue]]
speaker = "unk"
original = "俺も、アルモのことが好きだ"
translation = "나도 알모를 좋아해."

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「えへへ……<emoji=heart04>\u3000これで、２度目の両想いだな♪」"
translation = "「에헤헤……<emoji=heart04> 이걸로 두 번째 서로의 마음이 통한 거네♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――言わせちゃって、ごめんって？\u3000謝らなくていいのだ！」"
translation = "「――말하게 해서 미안하다고? 사과하지 않아도 되는 것이다!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「前は会長の方から告白してもらったし……これでおあいこなのだ♪」"
translation = "「전에는 회장 쪽에서 고백해 줬고…… 이걸로 비긴 것이다♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あ……<emoji=heart04>\u3000ふふっ、頭撫でるの、くすぐったいのだ……♪」"
translation = "「아……<emoji=heart04> 후후, 머리 쓰다듬는 거 간지러운 것이다……♪」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「――それじゃあ、ここから恋人同士のデート、再開だな♪」"
translation = "「――그럼 여기서부터 연인끼리의 데이트 재개인 것이다♪」"

[[dialogue]]
speaker = "unk"
original = "恋人らしく、今度は俺からアルモの手を取って、繋ぐ。すると――"
translation = "연인답게 이번에는 내가 알모의 손을 잡고 이끈다. 그러자――"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「あ……！\u3000恋人繋ぎ……えへへぇ<emoji=heart04>」"
translation = "「아……! 연인 잡기…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は嬉しそうな笑顔を見せて、俺の手を握り返してくれるのだった。"
translation = "그녀는 기쁜 듯한 미소를 지으며 내 손을 맞잡아 주는 것이었다."

