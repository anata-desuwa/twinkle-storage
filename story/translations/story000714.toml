[[dialogue]]
speaker = "unk"
original = "ヴィーナスの提案で、俺たちはおみくじを引くことになった――"
translation = "비너스의 제안으로 우리는 오미쿠지를 뽑게 되었다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあ、みんな引いてきたわね？\u3000さっきジャンケンで決めた順番で開封タイムよ！」"
translation = "「그럼 다들 뽑아 왔지? 아까 가위바위보로 정한 순서대로 개봉 타임이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まずは１番手、サーシャさんから！」"
translation = "「먼저 첫 번째 주자, 사샤 씨부터!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「は～い♪\u3000私のは～」"
translation = "「네~♪ 제 건~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「やったわ～、大吉よ～♪\u3000前回の初詣に続いて、２回目ね～♪」"
translation = "「해냈네~, 대길이야~♪ 지난번 하츠모데에 이어서 두 번째네~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お～。サーシャ先輩はソフィアさんと仲直りしましたし、今年は幸先良さそうですね」"
translation = "「오~. 사샤 선배는 소피아 씨와 화해하기도 하셨고, 올해는 출발이 좋아 보이네요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「次は、私の番です。どれどれ――」"
translation = "「다음은 제 차례입니다. 어디 보자──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふむ、中吉ですね。待ち人きたると書いてあります」"
translation = "「흠, 중길이네요. 기다리는 사람이 온다고 적혀 있습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私的には、浅草周辺の甘味処で美味しい和菓子をご馳走してくれる、気前のよい男性が現れてくれると嬉しいのですが……チラッ」"
translation = "「제 개인적으로는 아사쿠사 주변 찻집에서 맛있는 화과자를 사주는 통 큰 남성이 나타나 주면 좋겠습니다만…… 힐끗.」"

[[dialogue]]
speaker = "unk"
original = "おねだりの強い視線を感じる……！"
translation = "조르는 듯한 강렬한 시선이 느껴진다……!"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「次は私か～。ただ、私の場合、おみくじの内容はもう決まってるのよね～」"
translation = "「다음은 나인가~. 다만 내 경우엔 오미쿠지 내용은 이미 정해져 있거든~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃん、決まってるってどういうこと？」"
translation = "「마토이 짱, 정해져 있다니 무슨 소리야?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「実際にやってみせると――ほら、やっぱり。『吉』です」"
translation = "「직접 보여주자면── 봐봐, 역시나. 『길』이야.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私、おみくじは昔から、吉しか引けないんですよね～」"
translation = "「나, 오미쿠지는 옛날부터 길밖에 안 나오더라고~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし、吉は大吉の次に運が良いという解釈もあります。逆にいつも幸運だと言えるかもしれません」"
translation = "「하지만 길은 대길 다음으로 운이 좋다는 해석도 있습니다. 거꾸로 언제나 행운이라고 할 수 있을지도 몰라요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナ、フォローありがとう。でもね――」"
translation = "「아나, 위로해 줘서 고마워. 하지만 말이야──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「出ないからこそ、１度でいいから大吉を拝んでみたいという気持ちもあるのよ……！」"
translation = "「안 나오니까 더더욱, 한 번이라도 좋으니 대길을 배알해보고 싶은 마음도 있다고……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど」"
translation = "「그렇군요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ♪\u3000でも、マトイちゃんはおみくじの内容を大切にしそうだから、引き直したりはしなさそうね～」"
translation = "「후훗♪ 하지만 마토이 짱은 오미쿠지 내용을 소중히 여기는 편이니까, 다시 뽑거나 하지는 않겠네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは、実はそうなんですよね～。おみくじの示す通りに頑張った方が、結果的に縁起がよくなりそうな気がして」"
translation = "「아하하, 사실 그렇긴 해요~. 오미쿠지가 가리키는 대로 열심히 하는 게 결과적으로 운이 더 좋아질 것 같은 기분이 들어서요.」"

[[dialogue]]
speaker = "unk"
original = "そこがマトイのいいところだな"
translation = "그런 점이 마토이의 좋은 점이지."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え！？\u3000も、もう会長ってば、そんなこと言われると、なんか照れるじゃん……！」"
translation = "「에!? 저, 정말 회장도 참, 그런 소릴 들으면 왠지 쑥스럽잖아……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「マトイ先輩、大吉を引いたかのような笑顔ですね」"
translation = "「마토이 선배, 대길이라도 뽑은 것 같은 미소네요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪」"
translation = "「어머나~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なっ、アナ、そんなんじゃないから！\u3000サーシャさんも！」"
translation = "「앗, 아나, 그런 거 아니거든! 사샤 씨도!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「次はいよいよ、私の番ね！\u3000大吉こい、大吉こい、大吉こ～い！」"
translation = "「드디어 내 차례네! 대길 나와라, 대길 나와라, 대길 나와라~!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「開けゴマよ！\u3000え～いっ！\u3000…………チラッ」"
translation = "「열려라 참깨야! 에잇! …………힐끗.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぬわあああぁぁぁっ！\u3000また大凶～～～っ！！」"
translation = "「으아아아아아악! 또 대흉───!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「オチがつきましたね」"
translation = "「결말이 났네요.」"

[[dialogue]]
speaker = "unk"
original = "そうなりそうな気はしてた"
translation = "그렇게 될 것 같은 기분은 들었어."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ていうか、大凶って本当にあるんだ？\u3000確か前に、凶がいちばん下って聞いたこともあるような……」"
translation = "「그나저나 대흉이라는 게 정말 있는 거였어? 분명 예전에 흉이 제일 아래라고 들은 적도 있는 것 같은데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あるのよ！\u3000ほら！」"
translation = "「있다고! 여기 봐!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、本当だ……実在するんだね……」"
translation = "「응, 정말이네…… 실존하는구나……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……神社のおみくじは、大凶を作っていないところも多い。入れるとしても引く確率は１．２％くらいだとか」"
translation = "「……신사의 오미쿠지는 대흉을 만들지 않는 곳도 많습니다. 넣는다고 해도 뽑을 확률은 1.2% 정도라던가.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ゲームのガチャで最高レアを引くよりも低い確率じゃない！\u3000それを２回連続引くってどういうこと！？」"
translation = "「게임 가챠에서 최고 레어 뽑는 것보다 확률이 낮잖아! 그걸 두 번 연속 뽑는다는 게 말이 돼!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「２枚抜きおめでとうございます」"
translation = "「2연속 당첨 축하드립니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「全然嬉しくないんだけど！？」"
translation = "「하나도 안 기쁘거든!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ちなみに大凶って、内容はどんなことが書いてあるのかしら？」"
translation = "「참고로 대흉은 내용이 어떤 게 적혀 있나요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「控えめに言って……フルボッコよ！」"
translation = "「완곡하게 말해서…… 만신창이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「こことか特に酷いわ！\u3000『生死しすべし』って書いてあるのよ！」"
translation = "「여기 봐, 특히 여긴 너무해! 『생사 죽어야 마땅함』이라고 적혀 있다고!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、さすがにそれは冗談……うわっ！？\u3000本当に書いてある！？\u3000えっ、これ、どういう意味なの！？」"
translation = "「아니, 설마 그건 농담…… 으앗!? 정말 적혀 있어!? 엣, 이거 무슨 뜻이야!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「すご～い！\u3000大凶の内容って面白いのね～♪\u3000写真に撮っておいて、後で調べてみましょうか」"
translation = "「대단해~! 대흉 내용은 재미있네~♪ 사진 찍어뒀다가 나중에 조사해 볼까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あっ、でも、『待ち人きたる』とも書いてあります」"
translation = "「앗, 그래도 『기다리는 사람이 온다』라고도 적혀 있습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そこは当然よ！\u3000私には魔王クロトがついているんだから！」"
translation = "「그건 당연하지! 나한텐 마왕 쿠로토가 붙어 있으니까!」"

[[dialogue]]
speaker = "unk"
original = "責任重大だな"
translation = "책임이 막중하네."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、頼りにしてるわ♪\u3000私がピンチの時は、必ず助けにきて頂戴」"
translation = "「응, 믿고 있을게♪ 내가 위기일 때는 반드시 구하러 와줘.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――さて、最後はクロトの番ね！\u3000魔王の運勢、見せてみなさい！」"
translation = "「──자, 마지막은 쿠로토 차례네! 마왕의 운세, 보여줘 봐!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「開封したわね――どう？」"
translation = "「개봉했네── 어때?」"

[[dialogue]]
speaker = "unk"
original = "大吉だ、やったぜ"
translation = "대길이다, 해냈어."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よし！\u3000リクリエに勝ったわね！\u3000帰りましょう」"
translation = "「좋아! 리크리에한테 이겼네! 돌아가자.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いや、お参りしていこうよ！？」"
translation = "「아니, 참배는 하고 가자고!?」"

[[dialogue]]
speaker = "unk"
original = "おみくじで盛り上がった後、俺たちはみんなで本堂にお参りすることになった――"
translation = "오미쿠지로 달아오른 뒤, 우리는 다 같이 본당에서 참배하게 되었다──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お賽銭を入れて――と」"
translation = "「새전함을 넣고──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それじゃあ、一緒に合掌しましょう」"
translation = "「그럼 다 같이 합장하자.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今年、みんなでリクリエに勝てますように！」"
translation = "「올해 다 같이 리크리에에 이길 수 있기를!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……よし、これで必勝確実ね！」"
translation = "「……좋아, 이걸로 필승 확실하네!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふぅ……この後はどうしよっか？\u3000みんな、何か予定ある？」"
translation = "「후우…… 이다음엔 어떻게 할까? 다들 뭐 예정 있어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「せっかく浅草に来たんだし、街を散策するのも面白そうよね～」"
translation = "「모처럼 아사쿠사에 왔으니 거리를 산책하는 것도 재밌을 것 같네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ズバリ、浅草の甘味処に行きたいです」"
translation = "「정확히는 아사쿠사 찻집에 가고 싶습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いいわね！\u3000みんなでお茶しに行きましょうか♪」"
translation = "「좋네! 다 같이 차 마시러 갈까♪」"

[[dialogue]]
speaker = "unk"
original = "それなら、オススメの店がある"
translation = "그거라면 추천하는 가게가 있어."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え？\u3000――前にバイトしてた甘味処が近くにある？」"
translation = "「에? ──전에 알바했던 찻집이 근처에 있다고?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――抹茶スイーツが絶品？\u3000わぁ～、それはすごく気になるかも♪」"
translation = "「──말차 디저트가 일품이야? 와아~ 그거 엄청 궁금할지도♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「すぐ行きましょう。戦闘服で即飛んでいきましょう。じゅるり……♪」"
translation = "「당장 갑시다. 전투복으로 즉시 날아갑시다. 츄릅……♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあらうふふ♪\u3000アナちゃんたら、もう変身しちゃってる♪」"
translation = "「어머어머 우후후♪ 아나 짱도 참, 벌써 변신해버렸네♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっ、そうだ。危うく忘れるところだったわ！」"
translation = "「앗, 맞다. 하마터면 잊을 뻔했어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どうしたの？」"
translation = "「왜 그래?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「お参りが終わってから、言おうと思ってたことがあるのよ」"
translation = "「참배 끝나고 하려고 생각했던 말이 있어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「改めて――」"
translation = "「다시 한번──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今年もどうぞよろしくね、みんな！」"
translation = "「올해도 부디 잘 부탁해, 모두!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ～、そういうこと」"
translation = "「아~ 그런 거였구나.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。こちらこそ、どうぞよろしくお願いします」"
translation = "「노 프로블럼. 이쪽이야말로 부디 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「みんなで仲良く頑張りましょうね～♪」"
translation = "「다 같이 사이좋게 노력해봐요~♪」"

[[dialogue]]
speaker = "unk"
original = "よし、抹茶スイーツを食べに行くぞ！"
translation = "좋아, 말차 디저트 먹으러 가자!"

[[dialogue]]
speaker_original = "みんな"
speaker_translation = "모두"
original = "「お～！」"
translation = "「오──!」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺たち新星星徒会の新年は晴れやかに、スタートしたのだった――"
translation = "이렇게 우리 신성성도회의 신년은 화창하게 시작되는 것이었다──"

