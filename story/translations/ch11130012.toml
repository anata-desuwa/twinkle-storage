[[dialogue]]
speaker = "unk"
original = "第２話,梨緒ＶＳジグ再び,P"
translation = "제2화, 리오 VS 지그 다시, P"

[[dialogue]]
speaker = "unk"
original = "ある日、カフェテリアに行ってみると、選挙管理委員会の４人──とジグがいた。"
translation = "어느 날, 카페테리아에 가보니, 선거 관리 위원회 4명──과 지그가 있었다."

[[dialogue]]
speaker = "ジグ"
original = "「やぁ、魔王じゃないか。こんにちは」"
translation = "「여어, 마왕이 아니십니까. 안녕하세요」"

[[dialogue]]
speaker = "unk"
original = "ジグは選挙管理委員会に入ったんだ？"
translation = "지그는 선거 관리 위원회에 들어간 거야?"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、そうなんだ。とはいえアガサとの付き合いで入っただけだから、気にしなくていいよ」"
translation = "「아아, 그렇습니다. 그렇다고 해도 아가사와의 교류로 들어간 것뿐이니, 신경 쓰지 않으셔도 됩니다」"

[[dialogue]]
speaker = "梨緒"
original = "「こら、真面目に魔王を監視しろ」"
translation = "「이봐, 진지하게 마왕을 감시해」"

[[dialogue]]
speaker = "ジグ"
original = "「え～、今さら監視しなくてもよくない？\u3000ラクシスの力は一旦封印したんだし、魔王は堕ちたりしないだろう？」"
translation = "「에~, 이제 와서 감시하지 않아도 괜찮지 않나요? 락시스의 힘은 일단 봉인했고, 마왕은 타락하거나 하진 않겠죠?」"

[[dialogue]]
speaker = "梨緒"
original = "「魔王の力は強大だ。油断は禁物だぞ」"
translation = "「마왕의 힘은 강대하다. 방심은 금물이다」"

[[dialogue]]
speaker = "梨緒"
original = "「それに魔王の力に関わらず、星徒会長として品位を損なう行為に及ぶ可能性もある。監視の目は必要だ」"
translation = "「게다가 마왕의 힘과 관계없이, 성도 회장으로서 품위를 손상하는 행위를 할 가능성도 있다. 감시의 눈은 필요하다」"

[[dialogue]]
speaker = "ジグ"
original = "「はいはい、アガサは相変わらず真面目だね」"
translation = "「네 네, 아가사는 변함없이 진지하네」"

[[dialogue]]
speaker = "unk"
original = "今何してるところ？"
translation = "지금 뭐 하고 있는 거야?"

[[dialogue]]
speaker = "ジグ"
original = "「それが、アガサにまた勝負を挑まれてしまってね」"
translation = "「그게, 아가사에게 또 승부를 걸려 버려서 말이죠」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ～あ、これで何回目だろ。どうせ梨緒が負けるんだろうなー」"
translation = "「아아, 이걸로 몇 번째일까. 어차피 리오가 질 거잖아」"

[[dialogue]]
speaker = "アポロ"
original = "「ジグが正気に戻ってから、毎日のように勝負してるな……」"
translation = "「지그가 제정신으로 돌아온 후, 매일같이 승부하고 있군……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あははは……梨緒ちゃん、ほんとに何度負けてもくじけないね……」"
translation = "「아하하하…… 리오짱, 정말 몇 번을 져도 꺾이지 않네……」"

[[dialogue]]
speaker = "unk"
original = "（そんなに何度も勝負してるんだ……）"
translation = "（그렇게나 몇 번이고 승부하고 있는 건가……）"

[[dialogue]]
speaker = "ジグ"
original = "「だいたい、アガサはリクリエの使徒だった私に勝ったんじゃなかったのかい？\u3000今さら私と勝負して意味あるの？」"
translation = "「대체로, 아가사는 리크리에의 사도였던 저에게 이긴 것이 아니었나요? 이제 와서 저와 승부해서 의미가 있나요?」"

[[dialogue]]
speaker = "梨緒"
original = "「天界のあの戦いで、確かに私は君に勝った」"
translation = "「천계에서의 그 싸움에서, 확실히 나는 네게 이겼다」"

[[dialogue]]
speaker = "梨緒"
original = "「だがあの時の君は使徒だった。だから正気の君にも勝ちたいんだ」"
translation = "「하지만 그때의 너는 사도였다. 그러니 제정신인 너에게도 이기고 싶다」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、そういうこと。アガサらしいといえばアガサらしいね」"
translation = "「아아, 그런 것이군요. 아가사답다면 아가사답네요」"

[[dialogue]]
speaker = "ジグ"
original = "「別に勝負をするのはいいけど、いったい何の勝負をするんだい？」"
translation = "「딱히 승부하는 건 괜찮지만, 도대체 무슨 승부를 하는 건가요?」"

[[dialogue]]
speaker = "ジグ"
original = "「今までアガサとは、モンスター討伐からテストの成績、教室の掃除に至るまで、いろいろなもので勝負をしたはずだけど」"
translation = "「지금까지 아가사와는, 몬스터 토벌부터 시험 성적, 교실 청소에 이르기까지, 여러 가지로 승부를 했을 텐데요」"

[[dialogue]]
speaker = "梨緒"
original = "「ここでする勝負なら決まっている……料理で勝負だ！」"
translation = "「여기서 할 승부라면 정해져 있다…… 요리로 승부다!」"

[[dialogue]]
speaker = "ジグ"
original = "「私とアガサが？\u3000構わないけど、君、料理なんてできるのかい？」"
translation = "「저와 아가사가요? 상관없지만, 너, 요리 같은 거 할 수 있니?」"

[[dialogue]]
speaker = "梨緒"
original = "「私を舐めるな。こちらの世界で成長したんだ。審査員は……私とジグ以外の選管の３人、そして魔王だ」"
translation = "「나를 얕보지 마라. 이쪽 세계에서 성장했다. 심사위원은…… 나와 지그 이외의 선관 3명, 그리고 마왕이다」"

[[dialogue]]
speaker = "unk"
original = "え、俺も！？"
translation = "엣, 나도!?"

[[dialogue]]
speaker = "ナターシャ"
original = "「旅は道連れってやつだね。まともなやつが出てくるのを祈ろっか」"
translation = "「여행은 동행이라는 거지. 제대로 된 게 나오기를 빌자」"

[[dialogue]]
speaker = "梨緒"
original = "「ではカフェテリアの厨房を借りて、さっそく調理を行う。私が作るのは、この勝負のためにキリカさんに教わったローストビーフだ」"
translation = "「그럼 카페테리아의 주방을 빌려, 바로 조리를 실시한다. 내가 만들 것은, 이 승부를 위해 키리카 씨에게 배운 로스트 비프다」"

[[dialogue]]
speaker = "アポロ"
original = "「うわ、わざわざキリカに聞いてくるとか大人げないぞ……」"
translation = "「우와, 일부러 키리카에게 물어보다니 어른스럽지 못하군……」"

[[dialogue]]
speaker = "梨緒"
original = "「勝負するからには全力で戦わないと意味がない。それにローストビーフはイギリス料理だし、母国の料理を作っても問題ないだろう」"
translation = "「승부할 바에는 전력으로 싸우지 않으면 의미가 없다. 게다가 로스트 비프는 영국 요리이고, 모국의 요리를 만들어도 문제없을 것이다」"

[[dialogue]]
speaker = "ジグ"
original = "「私は何を作ろうか。せっかくだから、ドイツで食べられている料理がいいかな」"
translation = "「저는 무엇을 만들까요. 모처럼이니, 독일에서 먹는 요리가 좋을까요」"

[[dialogue]]
speaker = "ジグ"
original = "「……うん、決めた。では始めようか」"
translation = "「……음, 정했습니다. 그럼 시작할까요」"

[[dialogue]]
speaker = "梨緒"
original = "「よし、できたぞ。なかなかうまくできたと思う」"
translation = "「좋아, 완성했다. 꽤 잘 만들어졌다고 생각한다」"

[[dialogue]]
speaker = "ジグ"
original = "「こっちもできたよ。私が作ったのはシュニッツェルだ」"
translation = "「이쪽도 완성했습니다. 제가 만든 것은 슈니첼입니다」"

[[dialogue]]
speaker = "アポロ"
original = "「へぇ、これがシュニッツェルか。薄いトンカツみたいだな。んじゃ……いただきまーす！」"
translation = "「헤에, 이게 슈니첼인가. 얇은 돈가스 같네. 그럼…… 잘 먹겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "シュニッツェル美味しい！"
translation = "슈니첼 맛있다!"

[[dialogue]]
speaker = "アポロ"
original = "「だな！\u3000特にキノコのソースがサクサクの肉とよく合ってる！」"
translation = "「그렇지! 특히 버섯 소스가 바삭한 고기와 잘 어울려!」"

[[dialogue]]
speaker = "ジグ"
original = "「シュニッツェルにキノコのソースをかけたものを、イェーガーシュニッツェルというんだ」"
translation = "「슈니첼에 버섯 소스를 뿌린 것을, 예거 슈니첼이라고 합니다」"

[[dialogue]]
speaker = "ジグ"
original = "「イェーガーとは狩人のこと。狩人は山に入ることが多いから、キノコを使うことで、狩人風のシュニッツェルになるというわけだね」"
translation = "「예거란 사냥꾼을 뜻합니다. 사냥꾼은 산에 들어가는 일이 많으니, 버섯을 사용함으로써, 사냥꾼풍의 슈니첼이 된다는 것이죠」"

[[dialogue]]
speaker = "unk"
original = "へぇ、勉強になった"
translation = "헤에, 공부가 됐네"

[[dialogue]]
speaker = "梨緒"
original = "「わ、私のローストビーフはどうだ……？」"
translation = "「나, 나의 로스트 비프는 어떤가……?」"

[[dialogue]]
speaker = "アポロ"
original = "「うまいのはうまいんだけど……キリカのローストビーフの味を知ってると、惜しいところが目立つんだよな……」"
translation = "「맛있는 건 맛있는데…… 키리카의 로스트 비프 맛을 알고 있으니, 아쉬운 점이 눈에 띄는군……」"

[[dialogue]]
speaker = "梨緒"
original = "「なにっ、キリカさんのレシピを使ったのが裏目に出たのか……！？\u3000ベアトとナターシャはどう感じた……？」"
translation = "「뭐라고, 키리카 씨의 레시피를 사용한 것이 역효과를 낸 건가……!? 베아트와 나타샤는 어떻게 느꼈나……?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私は美味しいって思うことほとんどないからなー。でもしいて言うなら、ジグの方が完成度は上な気がする」"
translation = "「나는 맛있다고 생각하는 일은 거의 없으니까. 하지만 굳이 말하자면, 지그 쪽이 완성도는 위인 것 같아」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ごめん、梨緒ちゃん。どっちも美味しいけど、ジグさんのシュニッツェルの方が好きかも……。あとニンニク欲しい」"
translation = "「미안, 리오짱. 둘 다 맛있지만, 지그 씨의 슈니첼이 더 좋을지도……. 그리고 마늘이 필요해」"

[[dialogue]]
speaker = "梨緒"
original = "「くぅぅ～～～～～っ！\u3000ま、負けた……。あとベアトは何にでもニンニクを入れようとするのは直した方がいいと思うぞ」"
translation = "「크으으으~~~~~~~윽! 져, 졌다……. 그리고 베아트는 뭐든지 마늘을 넣으려고 하는 건 고치는 편이 좋다고 생각한다」"

[[dialogue]]
speaker = "梨緒"
original = "「しかしジグの料理はそんなに美味しいのか……？\u3000私もいただこう」"
translation = "「하지만 지그의 요리는 그렇게 맛있는 건가……? 나도 먹어보겠다」"

[[dialogue]]
speaker = "梨緒"
original = "「あむ……──ッ！\u3000くっ……確かに美味しい……私の完敗だ……」"
translation = "「냠……──윽! 크윽…… 확실히 맛있군…… 나의 완패다……」"

[[dialogue]]
speaker = "ジグ"
original = "「ははは、これでまた私の勝ちだね」"
translation = "「하하하, 이걸로 또 저의 승리군요」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ジグがそんなに料理できるようには見えないけど、これも星眼の力？」"
translation = "「지그가 그렇게 요리를 잘할 것처럼 보이진 않는데, 이것도 성안의 힘이야?」"

[[dialogue]]
speaker = "ジグ"
original = "「まぁね。食材をこの眼で見ると、最適な調理法も見えるんだ」"
translation = "「뭐 그렇죠. 식재료를 이 눈으로 보면, 최적의 조리법도 보입니다」"

[[dialogue]]
speaker = "ベアトリス"
original = "「すごい！\u3000その力があれば私も料理上手になれるかも……」"
translation = "「대단해! 그 힘이 있다면 나도 요리 잘하게 될지도……」"

[[dialogue]]
speaker = "ジグ"
original = "「まぁ、この眼がなくてもアガサに負ける気はしないけど。実際、アガサとの勝負で星眼を使ったことはほとんどなかったし」"
translation = "「뭐, 이 눈이 없어도 아가사에게 질 생각은 없지만요. 실제로, 아가사와의 승부에서 성안을 사용한 적은 거의 없었고」"

[[dialogue]]
speaker = "梨緒"
original = "「ぐ……ぐぬぬぬ……次は勝つ！」"
translation = "「크…… 크으으으으…… 다음은 이긴다!」"

[[dialogue]]
speaker = "ジグ"
original = "「ああ、再挑戦を待ってるよ」"
translation = "「아아, 재도전을 기다리고 있겠습니다」"

[[dialogue]]
speaker = "ジグ"
original = "「そうだ。魔王に聞きたいんだけど、美少女２人の手料理を食べた気分はどうだい？」"
translation = "「맞다. 마왕에게 묻고 싶은데요, 미소녀 두 명의 손 요리를 먹은 기분은 어떻습니까?」"

[[dialogue]]
speaker = "unk"
original = "自分で美少女って言った！？"
translation = "스스로 미소녀라고 말했어!?"

[[dialogue]]
speaker = "ジグ"
original = "「事実なんだから問題ないだろう？」"
translation = "「사실이니 문제없지 않습니까?」"

[[dialogue]]
speaker = "ジグ"
original = "「で、どう思ったんだい？\u3000男の子としてはときめくところなのかな？\u3000身近に同年代の異性がいなかったから、そういった機微がよくわからなくてね」"
translation = "「그래서, 어떻게 생각하셨나요? 남자아이로서는 설레는 부분인가요? 가까이에 동년배의 이성이 없었기 때문에, 그런 미묘한 감정을 잘 모르겠어서요」"

[[dialogue]]
speaker = "梨緒"
original = "「こら、からかうな。魔王が困っているだろう」"
translation = "「이봐, 놀리지 마. 마왕이 곤란해하잖아」"

[[dialogue]]
speaker = "ジグ"
original = "「ふふ、失礼。リクリエの使徒から解放されて浮かれていたみたいだ」"
translation = "「후후, 실례했습니다. 리크리에의 사도에게서 해방되어 들떠 있었나 봅니다」"

[[dialogue]]
speaker = "ジグ"
original = "「だけどアガサとまた料理勝負をする時は、魔王も食べに来るといいよ。腕によりをかけて作るからさ」"
translation = "「하지만 아가사와 또 요리 승부를 할 때는, 마왕도 먹으러 오면 좋습니다. 솜씨를 발휘해서 만들 테니까요」"

