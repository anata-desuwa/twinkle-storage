[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「どうでしたか、私のクリスマスの思い出は？\u3000人に語って聞かせるような話でもないですけど、何かの参考になれば……ちょっと恥ずかしいですが」"
translation = "「어땠나요, 제 크리스마스 추억은? 남에게 들려줄 만한 이야기도 아니지만, 무언가 참고가 되었다면…… 조금 부끄럽지만요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「と～ってもステキなお話でした♪\u3000モネのおかげでクリスマスのこと、モット詳しくナリました♪」"
translation = "「정~말로 멋진 이야기마시타♪ 모네 덕분에 크리스마스에 대해 더 자세히 알게 되어마시타♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「それにワタシ、モネのお話でワカリました……エンドレスサマーの目指すべきシンの姿が……！」"
translation = "「게다가 와타시, 모네의 이야기로 깨달아마시타…… 엔들리스 서머가 지향해야 할 진정한 모습이……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシにとってはヨロコビこそ海……タノシサこそが海でした。ですが、モネのお話で感じたヨロコビは、ワタシの知ってる海と夏にはナイものです」"
translation = "「와타시에게는 기쁨이야말로 바다…… 즐거움이야말로 바다였마시타. 하지만 모네의 이야기에서 느낀 기쁨은 와타시가 아는 바다와 여름에는 없는 것이마시타.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシの望みは全ての人を笑顔にするコトです。エンドレスサマーはそのタメの手段であって、目的ではナイのです♪\u3000それをモネが思い出させてクレました♪」"
translation = "「와타시의 소망은 모든 사람을 웃게 만드는 것이마시타. 엔들리스 서머는 그를 위한 수단이지 목적이 아니마시타♪ 그것을 모네가 일깨워주어마시타♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リップルさん！？」"
translation = "「리플 씨!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「モネ、見ててクダさい。今度こそワタシのリゾートでモネを喜ばせてミセます……！」"
translation = "「모네, 지켜봐주세마시타. 이번에야말로 와타시의 리조트에서 모네를 기쁘게 해 보이겠마시타……!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ここは……リップルさんのリゾート結界……？」"
translation = "「여기는…… 리플 씨의 리조트 결계……?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ！\u3000リゾート結界モネバージョンです！」"
translation = "「하이! 리조트 결계 모네 버전마시타!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「モネバージョン！？\u3000わ、私だけの結界ってことですか！？」"
translation = "「모네 버전!? 저, 저만을 위한 결계라는 건가요!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そのトーリです！\u3000ここはモネのためにチョウセイしたリゾート結界です！」"
translation = "「그렇마시타! 여기는 모네를 위해 조정한 리조트 결계마시타!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「紫外線はヨワメで、テキドに明るく、潮風で本がイタムこともナイです！」"
translation = "「자외선은 약하게, 적당히 밝게, 바닷바람에 책이 상하는 일도 없어마시타!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「本当だ……しかも気温もそんなに高くないどころか、程よく涼しいし……波音が心地いい……」"
translation = "「정말이다…… 게다가 기온도 그렇게 높지 않고 오히려 적당히 시원해서…… 파도 소리가 기분 좋아……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「コノ環境ならモネも安心して本を読めるハズです！」"
translation = "「이 환경이라면 모네도 안심하고 책을 읽을 수 있마시타!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい、本も喜んでます……！\u3000ありがとうリップルさん！\u3000でも、どうして私のために結界を？」"
translation = "「네, 책도 기뻐하고 있어요……! 고마워요 리플 씨! 그런데 왜 절 위해 결계를?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシのドリームは、ミンナがハッピーになれるエンドレスサマーの達成です」"
translation = "「와타시의 드림은 모두가 해피해질 수 있는 엔들리스 서머의 달성나리입니다.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ですが、今はワタシのために一緒に悩んでくれたモネにヨロコンデもらいたかったんです♪」"
translation = "「하지만 지금은 와타시를 위해 함께 고민해 준 모네가 기뻐해 주길 바랐마시타♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「これがワタシのクリスマスのコタエであり、モネへのクリスマスプレゼントです♪」"
translation = "「이것이 와타시의 크리스마스에 대한 답이자, 모네를 향한 크리스마스 선물나리입니다♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リップルさん、ありがとう！\u3000リップルさんの気持ち……すっごく嬉しいです！」"
translation = "「리플 씨, 고마워요! 리플 씨의 마음…… 정말 기뻐요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「トモダチの１人も喜ばせられナクテは、エンドレスサマーなんて夢のまた夢デスから♪」"
translation = "「친구 한 사람도 기쁘게 하지 못해마시타면, 엔들리스 서머 같은 건 꿈속의 꿈이니까마시타♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でも本当にすごい結界ですね……とんでもない星力です。でも夏じゃないと結界をいじれないって聞いたことがあるんですけど……」"
translation = "「그치만 정말 대단한 결계네요…… 엄청난 성력이에요. 하지만 여름이 아니면 결계를 건드릴 수 없다고 들었는데……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「いつもならソウなんですが、クリスマスのパワーで少しいじれるようにナリました♪」"
translation = "「평소라면 그렇마시타만, 크리스마스의 파워로 조금 건드릴 수 있게 되어마시타♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「クリスマスのパワー……！？\u3000そんなことあるんですか！？」"
translation = "「크리스마스의 파워……!? 그런 게 가능한가요!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「これも全て、モネがクリスマスを教えてクレタおかげで～す♪」"
translation = "「이것도 전부 모네가 크리스마스를 가르쳐준 덕분나리입니다~♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あはは、私はそんな大したことしたつもりはないんですけど……」"
translation = "「아하하, 전 그렇게 대단한 일을 한 건 아닌데……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「いえ、モネはしっかり力になってクレました。モネがいなかったら、クリスマスともナカヨクなれませんでした」"
translation = "「아뇨, 모네는 확실히 힘이 되어주어마시타. 모네가 없었다면 크리스마스와도 사이좋게 지내지 못해마시타.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「だから、このリゾート結界モネバージョンを存分に楽しんでください♪\u3000そしたら、ワタシもハッピーです♪」"
translation = "「그러니까 이 리조트 결계 모네 버전을 마음껏 즐겨주세마시타♪ 그러면 와타시도 해피나리입니다♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「うん、でもせっかくならリップルさんとも一緒に楽しみたいです」"
translation = "「응, 그래도 기왕이면 리플 씨와도 같이 즐기고 싶어요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシともですか？」"
translation = "「와타시와도 말나리입니까?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「こんな素敵なところを作ってもらいましたし、リップルさんとも楽しい思い出を作りたいなって……ダメですか？」"
translation = "「이렇게 멋진 곳을 만들어주셨으니까, 리플 씨와도 즐거운 추억을 만들고 싶달까…… 안 될까요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「だったら、モネと一緒に本を読みタイです！\u3000モネの本ともトモダチになりま～す♪」"
translation = "「그렇다면 모네와 함께 책을 읽고 싶마시타! 모네의 책과도 친구가 되겠마시타~♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい、本たちもリップルさんと友達になりたいって言ってますよ」"
translation = "「네, 책들도 리플 씨와 친구가 되고 싶다고 하네요.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソーシソーアイですね♪\u3000さっそくお願いしマ～ス♪」"
translation = "「상사상애마시타네♪ 당장 부탁드립마시타~♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それじゃあ、まずはこのクリスマスの恋愛小説から──」"
translation = "「그럼 우선 이 크리스마스 연애 소설부터──」"

