[[dialogue]]
speaker = "unk"
original = "第１話,おなか部のチョロ危うい副部長,P"
translation = "제1화, 오나카부의 금사빠 위험한 부부장, P"

[[dialogue]]
speaker = "unk"
original = "彼女と初めて出会ったのは、とある休日のことだった。"
translation = "그녀와 처음 만난 것은, 어느 휴일의 일이었다."

[[dialogue]]
speaker = "シフォン"
original = "「ええと、この辺りのはずなんですが──……わぷっ！？」"
translation = "「에또, 이 근처일 텐데요──…… 와푸!?」"

[[dialogue]]
speaker = "シフォン"
original = "「す、すみません、不注意でした。……って、あれ？\u3000あなたの顔、どこかで……」"
translation = "「죄, 죄송합니다, 부주의했어요. ……어라? 당신 얼굴, 어디선가……」"

[[dialogue]]
speaker = "シフォン"
original = "「もしかして星徒会長さんですか？\u3000緋宮会長さんですよね？\u3000お近くで見るのは初めてだったので、パっとわかりませんでしたよ」"
translation = "「혹시 성도회장님이신가요? 히노미야 회장님 맞으시죠? 가까이서 보는 건 처음이라, 바로 알아보지 못했네요.」"

[[dialogue]]
speaker = "シフォン"
original = "「あ、馴れ馴れしく話し始めてしまってすみません。実は私も新星学園の生徒でして」"
translation = "「아, 친한 척 말을 걸어서 죄송해요. 사실 저도 신성학원의 학생이라서요.」"

[[dialogue]]
speaker = "シフォン"
original = "「はじめまして。シフォン・デビルズホープです。まぁプリマステラでもない木っ端星騎士なので名乗っても仕方ないかもですが……」"
translation = "「처음 뵙겠습니다. 시퐁 데빌즈호프예요. 뭐 프리마스텔라도 아닌 말단 성기사라 통성명해 봤자 소용없을지도 모르지만요……」"

[[dialogue]]
speaker = "シフォン"
original = "「そうだ、ここで会ったのも何かの縁です。私の名前はともかく、おなか部の名前だけでも覚えていってくださいよ」"
translation = "「그렇지, 여기서 만난 것도 무슨 인연이네요. 제 이름은 몰라도 오나카부라는 이름만이라도 기억해 주세요.」"

[[dialogue]]
speaker = "シフォン"
original = "「私を含めて幼馴染み３人だけの小さな部活なんですけどね？\u3000私たちなりに人助けをして回ってるんです。私は一応、そこの副部長をしていまして」"
translation = "「저를 포함해서 소꿉친구 3명뿐인 작은 동아리지만요? 저희 나름대로 사람들을 돕고 다니고 있어요. 저는 일단 그곳의 부부장을 맡고 있고요.」"

[[dialogue]]
speaker = "シフォン"
original = "「まぁ星徒会さんに比べたら極々小さなお悩み相談に乗ってる程度なんですけど。ゴミ拾いや迷子の猫探しが精々と言いますか」"
translation = "「뭐 성도회분들에 비하면 아주아주 사소한 고민 상담이나 해주는 정도지만요. 쓰레기 줍기나 길 잃은 고양이 찾기가 고작이랄까.」"

[[dialogue]]
speaker = "unk"
original = "立派な活動じゃないか"
translation = "훌륭한 활동이잖아"

[[dialogue]]
speaker = "シフォン"
original = "「ふふ、そう言ってもらえると嬉しいです。一応私たちも星騎士の端くれですからね。誰かのために何かできればと思ってまして」"
translation = "「후후, 그렇게 말씀해 주시니 기쁘네요. 일단 저희도 성기사 말단이니까요. 누군가를 위해 무언가 할 수 있다면 좋겠다고 생각하고 있어요.」"

[[dialogue]]
speaker = "シフォン"
original = "「会長さんも何か困ったことがあれば、どしどし相談してください！\u3000備品の買い出しから、ヴィーナスさんへの代理謝罪までなんでも引き受けますから！」"
translation = "「회장님도 뭔가 곤란한 일이 있으면 마구마구 상담해 주세요! 비품 구매 대행부터, 비너스 씨를 향한 대리 사과까지 뭐든 맡겨만 주세요!」"

[[dialogue]]
speaker = "シフォン"
original = "「今もちょうど相談者さんのところへ向かっているところでして──……って、そうでした！\u3000こうしちゃいられません……！」"
translation = "「지금도 마침 상담자분이 계신 곳으로 향하던 참이라──…… 아, 맞다! 이러고 있을 때가 아니에요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「あのっ、この住所ってどこかわかりますかっ？\u3000この辺りにある建物なんだそうですが……！」"
translation = "「저기, 이 주소가 어딘지 아시나요? 이 근처에 있는 건물이라고 하는데요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「なるほど……！\u3000あの廃ビルですね……！\u3000ありがとうございます！\u3000ちょっと行ってきます……！」"
translation = "「그렇군요……! 저 폐빌딩이네요……! 감사합니다! 얼른 다녀올게요……!」"

[[dialogue]]
speaker = "unk"
original = "ちょっと待った！\u3000何か怪しい！"
translation = "잠깐 기다려! 뭔가 수상해!"

[[dialogue]]
speaker = "シフォン"
original = "「ぶべっ！？\u3000いきなり人の首根っこ掴まないでくださいよ！？\u3000一瞬、息が止まっちゃったじゃないですかっ！」"
translation = "「부벳!? 갑자기 사람 뒷덜미를 잡지 마세요! 순간 숨이 멎을 뻔했잖아요!」"

[[dialogue]]
speaker = "シフォン"
original = "「そもそも怪しいってなんですかっ。相談してくれた人に失礼ですよっ。あのおじさんたち、相当切羽詰まっているみたいなんですから……！」"
translation = "「애초에 수상하다니 무슨 말씀이세요. 상담해 준 분께 실례라구요. 그 아저씨들, 상당히 절박해 보였다니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「街を散歩していた私にまで声をかけてきたくらいですっ。なんでも、撮影する映画の主役が見つからないだとかで……！」"
translation = "「거리를 산책하던 저한테까지 말을 걸어올 정도였다구요. 뭐랬더라, 촬영하는 영화의 주연을 못 찾고 있다나 봐요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「私が映画の主役だなんて分不相応にも程がありますが──しかし、おなか部の一員として困っている人は見過ごせませんからね……！」"
translation = "「제가 영화 주연이라니 분에 넘쳐도 한참 넘치지만── 하지만 오나카부의 일원으로서 곤란해하는 사람은 못 본 척할 수 없으니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「言われたとおり、わざわざ制服に着替えて戻ってきたんです……！\u3000その方が映画の価値もあがるというお話でしたし……！」"
translation = "「들은 대로 일부러 교복으로 갈아입고 돌아온 거라구요……! 그게 영화의 가치도 올라간다는 말씀이셨고……!」"

[[dialogue]]
speaker = "シフォン"
original = "「あ、そうだっ。学生証も忘れずにと言われてましたね。よし、ちゃんとあります……！\u3000では急いでますので私はこれで──」"
translation = "「아, 맞다. 학생증도 잊지 말라고 하셨지. 좋아, 잘 있어요……! 그럼 급하니까 저는 이만──」"

[[dialogue]]
speaker = "シフォン"
original = "「──ぶべっ！？\u3000また人の首根っこ掴んでなんですか！？\u3000随分待たせてしまってるんですっ。一刻も早くおじさんたちのもとへ駆けつけてあげませんと──……」"
translation = "「──부벳!? 또 사람 뒷덜미 잡고 왜 그러세요! 한참 기다리게 하고 있단 말이에요. 한시라도 빨리 아저씨들 곁으로 달려가 드려야──……」"

[[dialogue]]
speaker = "シフォン"
original = "「……へ？\u3000騙されてる？\u3000どういう意味ですか？」"
translation = "「……에? 속고 있다고요? 무슨 뜻이에요?」"

[[dialogue]]
speaker = "シフォン"
original = "「あ、危ないところでした……。映画の撮影って、そういう……。あ、あのおじさんたち、人の善意に付け込んでなんて企みを……！」"
translation = "「아, 위험할 뻔했네요……. 영화 촬영이란 게 그런 거였다니. 그, 그 아저씨들, 사람의 선의를 이용해서 그런 음모를……!」"

[[dialogue]]
speaker = "unk"
original = "知らないおじさんについて行っちゃダメだよ"
translation = "모르는 아저씨 따라가면 안 돼"

[[dialogue]]
speaker = "シフォン"
original = "「ぐふっ！？\u3000し、仕方ないじゃないですか……！\u3000私の目には本当に困ってるように見えたんです……！」"
translation = "「구훗!? 어, 어쩔 수 없잖아요……! 제 눈엔 정말 곤란해 보였다구요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「……でも確かにおじさんたちの言葉を鵜呑みにしすぎていたかもしれませんね。羽根を褒められた時点で騙されていると気付くべきでした……」"
translation = "「……하지만 확실히 아저씨들 말을 너무 곧이곧대로 믿었을지도 모르겠네요. 날개를 칭찬받았을 때 속고 있다고 눈치챘어야 했는데……」"

[[dialogue]]
speaker = "シフォン"
original = "「こんな黒い羽根がチャームポイントになるはずありませんもん。小さい頃から変な目で見られたり、怖がられてばかりでしたから……」"
translation = "「이런 검은 날개가 매력 포인트가 될 리 없잖아요. 어릴 때부터 이상하게 보거나 무서워하는 사람뿐이었으니까……」"

[[dialogue]]
speaker = "シフォン"
original = "「私、その……。天魔と呼ばれる、天使と魔族の混血なんです。一族全員、天使のくせに羽根が黒くって……」"
translation = "「저, 그게……. 천마라고 불리는, 천사와 마족의 혼혈이에요. 일족 전원이 천사 주제에 날개가 검어서……」"

[[dialogue]]
speaker = "シフォン"
original = "「この姿……ちっとも天使らしくありませんよね。だからと言って魔族らしくもないと言いますか……」"
translation = "「이 모습…… 조금도 천사답지 않죠. 그렇다고 해서 마족답지도 않달까……」"

[[dialogue]]
speaker = "シフォン"
original = "「性格だけは天使と魔族の特色を色濃く継いじゃってるんですがね……。一族みんな、人を疑うことを知らない上に大雑把ですし……」"
translation = "「성격만큼은 천사와 마족의 특색을 짙게 이어받아 버렸지만요……. 일족 모두 사람을 의심할 줄 모르는 데다 덜렁거리거든요……」"

[[dialogue]]
speaker = "シフォン"
original = "「子どもの頃はこの容姿のせいで辛い想いもしちゃったものですから、おじさんたちに褒められて浮かれちゃってたのかもしれません……」"
translation = "「어릴 땐 이 외모 때문에 힘든 일도 겪었으니까, 아저씨들한테 칭찬받아서 들떠버렸던 걸지도 몰라요……」"

[[dialogue]]
speaker = "シフォン"
original = "「あはは、我ながらチョロいですね……。幼馴染みから脳筋アホの子って言われちゃうのも当然と言いますか……」"
translation = "「아하하, 나 참 금사빠네요……. 소꿉친구한테 근육뇌 바보라는 소리를 듣는 것도 당연하달까……」"

[[dialogue]]
speaker = "unk"
original = "俺も羽根はすごく格好いいと思うけど"
translation = "나도 날개는 굉장히 멋지다고 생각하는데"

[[dialogue]]
speaker = "シフォン"
original = "「へ……？\u3000ほ、本当ですかっ？\u3000本当にっ……！？」"
translation = "「헤……? 저, 정말인가요? 정말로요……!?」"

[[dialogue]]
speaker = "シフォン"
original = "「って──……もう騙されませんよ！\u3000おじさんたちにもそう言われて舞い上がっちゃったんですから……！」"
translation = "「아니──…… 이제 안 속아요! 아저씨들도 그렇게 말해서 들뜨게 만들었으니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「あんまり私をからかわないでください。会長さんも私を変な場所へ連れて行くつもりじゃないでしょうね……！」"
translation = "「너무 저를 놀리지 마세요. 회장님도 저를 이상한 곳으로 데려가려는 건 아니겠죠……!」"

[[dialogue]]
speaker = "シフォン"
original = "「それで、その……。実際のところどうなんですか？\u3000本当に、その……私の羽根が格好いいと思ってくれてるんですか？」"
translation = "「그래서, 그게……. 실제로는 어떤가요? 정말로, 그…… 제 날개가 멋지다고 생각하시나요?」"

[[dialogue]]
speaker = "unk"
original = "ああ"
translation = "그래"

[[dialogue]]
speaker = "シフォン"
original = "「そ、そうですか、えへへ……」"
translation = "「그, 그렇군요, 에헤헤……」"

[[dialogue]]
speaker = "シフォン"
original = "「って！\u3000なんですか、その顔……！\u3000ホントにチョロいな、とか思ってますよね……！？\u3000全然喜んでなんかいませんからね……！」"
translation = "「아니! 뭐야 그 표정……! 정말로 금사빠구나, 라고 생각하고 있죠!? 전혀 기뻐하거나 하지 않으니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「ともかく、ええと。危ないところを助けてくださってありがとうございました。会長さんが引き止めてくれなかったらどうなっていたことか」"
translation = "「어쨌든, 에또. 위험한 상황에서 도와주셔서 감사합니다. 회장님이 붙잡아주지 않으셨다면 어떻게 됐을지」"

[[dialogue]]
speaker = "シフォン"
original = "「何かお礼をさせてくださいよ。困ってることとかありません？\u3000おなか部の一員としてモンスター退治以外のことならなんでも請け負いますよ？」"
translation = "「뭔가 보답을 하게 해주세요. 곤란한 일이라도 없나요? 오나카부 일원으로서 몬스터 퇴치 이외의 일이라면 뭐든 맡아드릴게요!」"

[[dialogue]]
speaker = "シフォン"
original = "「ふむふむ、ＤＩＳＣの調子が悪いんですか。ふふ幸運でしたね。私、こういうの直すの得意なんですよ！」"
translation = "「흠흠, DISC 상태가 안 좋은 건가요. 후후 행운이네요. 저 이런 거 고치는 거 특기거든요!」"

[[dialogue]]
speaker = "シフォン"
original = "「ちょっと貸してください！\u3000実家のオンボロ洗濯機で培った実力を見せてあげます！\u3000こういうのは角度が大事ですからね……！」"
translation = "「잠시 빌려주세요! 집의 낡아빠진 세탁기로 다져진 실력을 보여드리죠! 이런 건 각도가 생명이니까요……!」"

[[dialogue]]
speaker = "シフォン"
original = "「えいっ、えいっ！\u3000……はい？\u3000叩いて直るものじゃない？\u3000いやいや機械なんて叩けば直るものなんですから。素人は黙っててください！\u3000むしろもっと力を入れて──」"
translation = "「에잇, 에잇! ……네? 두드려서 고쳐지는 게 아니라고요? 아뇨 아뇨, 기계는 두드리면 고쳐지는 법이라구요. 초보자는 가만히 계세요! 오히려 힘을 더 줘서──」"

[[dialogue]]
speaker = "シフォン"
original = "「あっ──！？\u3000あ、あはは～、ＤＩＳＣって脆いですね～……。ちょっと力を入れただけで真っ二つになっちゃうとは～……」"
translation = "「앗──!? 아, 아하하~, DISC란 게 참 약하네요~……. 살짝 힘을 줬을 뿐인데 두 동강이 나버리다니~……」"

[[dialogue]]
speaker = "シフォン"
original = "「す──すみませんでした！\u3000新品を買い直すので許してください！」"
translation = "「죄──죄송했습니다! 새걸로 다시 사 올 테니 용서해 주세요!」"

[[dialogue]]
speaker = "シフォン"
original = "「そ、そうだ、他に何か困ってることはありませんかっ？\u3000今度こそ必ず力になりますから……！\u3000ホ、ホントですってば！」"
translation = "「그, 그렇지, 다른 건 곤란한 일 없나요? 이번에야말로 꼭 힘이 되어드릴게요……! 저, 정말이라니까요!」"

