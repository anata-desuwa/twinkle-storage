[[dialogue]]
speaker = "unk"
original = "第３話,蒐集の魔女,P"
translation = "제3화, 수집의 마녀, P"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。俺はたまたま見かけてしまったのだが――"
translation = "어느 날 방과 후. 나는 우연히 목격하고 말았는데──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おっ、あったあった……むふふふっ♪」"
translation = "「오, 있었다 있었다…… 무후후후♪」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさん、何してるんですか……？"
translation = "트레지안나 씨, 뭐 하시는 건가요……?"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はっ！？\u3000会長さん、いつの間に！？\u3000あ～、これはですね～」"
translation = "「핫!? 회장님, 어느 사이에!? 아~ 이건 말이죠~」"

[[dialogue]]
speaker = "unk"
original = "彼女が手に持っているのは、俺が先程、星徒会室を離れる際にゴミ箱に捨てた１枚の『付箋』だった。"
translation = "그녀가 손에 쥐고 있는 것은, 내가 아까 성도회실을 나설 때 쓰레기통에 버린 한 장의 『포스트잇』이었다."

[[dialogue]]
speaker = "unk"
original = "流星学園の星徒会に書類を届けるという用事を忘れないようにメモをして机に貼っていたもので、いざ届ける段階になったので捨てたのだが……"
translation = "유성학원 성도회에 서류를 전달한다는 용무를 잊지 않도록 메모해서 책상에 붙여두었던 것으로, 정작 전달할 단계가 되어 버린 것이었지만……"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんはゴミ箱からそれを拾って、魔法で取り出したジッパー袋の中に入れようとしているところだった。"
translation = "트레지안나 씨는 쓰레기통에서 그것을 주워 마법으로 꺼낸 지퍼백 속에 넣으려던 참이었다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「――なんでそんなものを回収しようとしているのか、ですか？\u3000フッ……バレてしまったなら仕方ありませんね！」"
translation = "「──어째서 그런 걸 회수하려고 하느냐, 인가요? 훗…… 들켜버렸다면 어쩔 수 없네요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「実は最近、会長さんの物を<ruby>蒐集<rt>コレクション</rt></ruby>しているんですよ☆」"
translation = "「사실 요즘, 회장님의 물건을 수집하고 있거든요☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ほら私、復活してから会長さんと関わる機会が増えたじゃないですか～」"
translation = "「보세요 저, 부활하고 나서 회장님과 엮일 기회가 늘었잖아요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「その結果、前よりも会長さんのことが気になるようになってしまいまして～」"
translation = "「그 결과, 예전보다 회장님이 신경 쓰이게 되어버려서~」"

[[dialogue]]
speaker = "unk"
original = "き、気になるって……"
translation = "시, 신경 쓰인다니……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はい♪\u3000もちろん男のヒトとしてですよ☆」"
translation = "「네♪ 물론 이성으로서 말이에요☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、ちなみに、男のヒトのものが気になって集めるのは、実は生まれて初めてなんですよ～。えへへ♪」"
translation = "「앗, 참고로 이성의 물건이 신경 쓰여서 모으는 건 사실 태어나서 처음이랍니다~. 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "そんなことを可愛い笑顔で言われて、俺は思わずドキッとしてしまう。"
translation = "그런 소리를 귀여운 미소로 하니, 나는 나도 모르게 두근거리고 만다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それで、気になるヒトの物を集めたくなるのは、生物として普通のことですよね？」"
translation = "「그래서 신경 쓰이는 사람의 물건을 모으고 싶어지는 건 생물로서 당연한 일이죠?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「つまりこれは……そう！\u3000最近の人間界で言う『推し活』というやつなんです！」"
translation = "「즉 이것은…… 그래요! 요즘 인간계에서 말하는 『덕질』이라는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "ちょっと違くない！？"
translation = "좀 다르지 않아!?"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「くっ！\u3000やはり押し切れませんでしたか……。しかしコレクションするのは、私のライフワークみたいなものでして～」"
translation = "「큭! 역시 밀어붙일 수 없었나요……. 하지만 컬렉션 하는 건 제 라이프 워크 같은 거라서요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ここは１つ、どうにか見逃して貰えませんかね～？\u3000てへぺろ☆」"
translation = "「여기서 한 번만 어떻게 못 본 척해주시면 안 될까요~? 데헤페로☆」"

[[dialogue]]
speaker = "unk"
original = "復活してから知ったが、トレジアンナさんには『蒐集癖』がある。"
translation = "부활하고 나서 알게 되었지만, 트레지안나 씨에게는 『수집벽』이 있다."

[[dialogue]]
speaker = "unk"
original = "聞いた話では、かつて『蒐集の魔女』という二つ名で呼ばれていたこともあり、『空間魔法』をさらっと使いこなして、様々な物を異空間にコレクションしているらしい。"
translation = "들은 바에 의하면 예전에 『수집의 마녀』라는 이명으로 불린 적도 있으며, 『공간 마법』을 능숙하게 구사해 다양한 물건을 이공간에 수집하고 있는 모양이다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「――ちなみに今までどんなものを、ですか？\u3000そうですね～、例えば……」"
translation = "「──참고로 지금까지 어떤 것들을 모았느냐고요? 그렇네요~ 예를 들면……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「隠し撮りした写真とか～、買い物した際の要らないレシートとか～、あとは……追跡魔法で観測した、会長さんがその日、何歩移動したかの記録とか☆」"
translation = "「몰래 찍은 사진이라든가~ 쇼핑했을 때의 필요 없는 영수증이라든가~ 그리고…… 추적 마법으로 관측한 회장님이 그날 몇 걸음 움직였는지에 대한 기록이라든가☆」"

[[dialogue]]
speaker = "unk"
original = "それもうストーカーでは！？"
translation = "그거 이미 스토커 아냐!?"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あはは、会長さん、大丈夫ですよ～。私、ちゃんと一線はわきまえてますから～」"
translation = "「아하하, 회장님, 괜찮아요~ 저, 제대로 선은 지키고 있으니까요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「本当は愛用のペンとか、普段使っている制服も蒐集したいんですけど～、盗みは決してしない主義なので！\u3000それに、ほら――」"
translation = "「사실은 애용하는 펜이라든가 평소 입는 교복도 수집하고 싶지만~ 도둑질은 결코 하지 않는 주의라서요! 게다가 보세요──」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「バレないよう密かに相手の物をコレクションするのって、むしろ燃えるじゃないですか～♪\u3000むふふ☆」"
translation = "「들키지 않게 몰래 상대의 물건을 수집하는 게 오히려 더 불타오르지 않나요~♪ 무후후☆」"

[[dialogue]]
speaker = "unk"
original = "いや、バレてるんだが！？"
translation = "아니, 들켰는데!?"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「くっ……！\u3000そこは自分の不手際を深く反省しています……」"
translation = "「큭……! 그건 제 불찰을 깊이 반성하고 있습니다……」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「しかし、バレてしまった以上、これまで蒐集したものは全て、潔く処分しようと思います。会長さんにご迷惑をかけるつもりはなかったので……」"
translation = "「하지만 들켜버린 이상, 지금까지 수집한 것은 전부 깨끗이 처분하려고 해요. 회장님께 폐를 끼칠 생각은 없었으니까……」"

[[dialogue]]
speaker = "unk"
original = "いや、わざわざ処分までしなくても……"
translation = "아니, 굳이 처분까지는 안 해도……"

[[dialogue]]
speaker = "unk"
original = "コソコソやられてたら怖いが、こっそりやらないのであれば、処分まではしなくていいと伝える。"
translation = "몰래 하면 무섭지만, 대놓고 한다면 처분까지는 안 해도 된다고 전한다."

[[dialogue]]
speaker = "unk"
original = "すると彼女は、ぱぁっと嬉しそうに笑顔の花を咲かせて──"
translation = "그러자 그녀는 활짝 기쁜 듯이 미소의 꽃을 피우며──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「本当ですか！？」"
translation = "「정말인가요!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「じゃあ、これからはお願いしたら、会長さんの――」"
translation = "「그럼 앞으론 부탁하면 회장님의──」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「<b>使用済みの物</b>も貰えたりしますか！？」"
translation = "「<b>사용한</b> <b>물건</b>도 받을 수 있을까요!?」"

[[dialogue]]
speaker = "unk"
original = "言い方！！"
translation = "말투가 좀!!"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「え？\u3000それはダメ？」"
translation = "「에? 그건 안 돼?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ですよね～。シュン……」"
translation = "「그렇군요~. 시무룩……」"

[[dialogue]]
speaker = "unk"
original = "露骨にガッカリした顔になるトレジアンナさん。"
translation = "노골적으로 실망한 표정이 되는 트레지안나 씨."

[[dialogue]]
speaker = "unk"
original = "へ、変な物じゃなければ、多少は……"
translation = "이, 이상한 게 아니라면 조금은……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「！\u3000いいんですか！？\u3000ありがとうございます！」"
translation = "「! 정말인가요!? 감사합니다!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さんならそう言ってくれるんじゃないかと、実は期待しちゃってました～♪\u3000えへへ☆」"
translation = "「회장님이라면 그렇게 말해줄 거라고 사실 기대하고 있었어요~♪ 에헤헤☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「って、どうしたんですか、会長さん？\u3000何か言いたそうな様子ですけど……？」"
translation = "「어라, 왜 그러세요, 회장님? 뭔가 하고 싶은 말이 있는 듯한 모습인데요……?」"

[[dialogue]]
speaker = "unk"
original = "男として気になるっていうのは、つまり……"
translation = "이성으로서 신경 쓰인다는 건 즉……"

[[dialogue]]
speaker = "unk"
original = "その……俺のこと……"
translation = "그게…… 나를……"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「？\u3000ニュアンスをもっと具体的に知りたい感じですか？」"
translation = "「? 뉘앙스를 좀 더 구체적으로 알고 싶은 느낌인가요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ぶっちゃけると――異性として、会長さんのことを『好き』になってるってことですね☆」"
translation = "「솔직히 말하자면── 이성으로서 회장님을 『좋아하게』 됐다는 뜻이에요☆」"

[[dialogue]]
speaker = "unk"
original = "どストレートな言葉に、俺の心臓は先程よりも大きく跳ねる。"
translation = "직설적인 말에 내 심장은 아까보다 크게 뛴다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あ、でも……ごめんなさい！\u3000告白しといてアレなんですけど、お付き合いとかはちょっと考えてなくて～」"
translation = "「아, 하지만…… 미안해요! 고백해놓고 좀 그렇지만, 사귀는 것까지는 생각 안 하고 있어서~」"

[[dialogue]]
speaker = "unk"
original = "一方的にフラれた……！？"
translation = "일방적으로 차였다……!?"

[[dialogue]]
speaker = "unk"
original = "一方的に告白されて"
translation = "일방적으로 고백받고"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「う～ん、私、ヒトより寿命が長い魔女のせいか、誰かと恋愛関係になるって、いまいちピンと来ないんですよね～」"
translation = "「으음, 제가 사람보다 수명이 긴 마녀인 탓인지 누군가와 연애 관계가 된다는 게 영 감이 안 잡히거든요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「だってほら、どんなに仲がいいヒトでも、みんな私より先に死んじゃうじゃないですか～☆」"
translation = "「그야 보세요, 아무리 사이좋은 사람이라도 다들 저보다 먼저 죽어버리잖아요~☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「なので、会長さんとはこれからも<b>異性の友達</b>として、末永く仲良くしていただけたら幸いです♪」"
translation = "「그러니 회장님과는 앞으로도 <b>이성</b> <b>친구</b>로서 오래도록 사이좋게 지낼 수 있다면 좋겠어요♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「じゃあ、私はこれから、会長さんの使用済みの物について、何なら良くて何だとダメなのか、集中して考えて来ようと思います！」"
translation = "「그럼 저는 이제부터 회장님의 사용한 물건에 대해 어떤 건 괜찮고 어떤 건 안 되는지 집중해서 생각하고 오려고요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「リストが完成したらすぐに連絡しますので、また２人で相談しましょうね～。――それでは☆」"
translation = "「리스트가 완성되면 바로 연락할 테니 다시 둘이서 상담해요~. ──그럼☆」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふんふん、ふふ～ん♪」"
translation = "「훔훔, 후후~ㄴ♪」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに鼻歌を唄いながら去ってゆくトレジアンナさんを、呆然と見送る俺なのであった――"
translation = "기쁜 듯이 콧노래를 부르며 떠나가는 트레지안나 씨를 멍하니 배웅하는 나였다──"

