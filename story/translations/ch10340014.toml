[[dialogue]]
speaker = "unk"
original = "第４話,真のしもべに,P"
translation = "제4화,진정한 하인으로,P"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「大通りにはモンスターがたくさん……今は隠れてるから見つからないけど、私じゃ突破するのは無理そう……」"
translation = "「큰길에는 몬스터가 잔뜩…… 지금은 숨어 있어서 들키지 않지만, 저 혼자 돌파하는 건 무리일 것 같아요……」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「お姉ちゃん……」"
translation = "「언니……」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「怖くない、怖くない～。モンスターに見つかるといけないから、静かにして隠れててね」"
translation = "「무섭지 않아, 무섭지 않아~. 몬스터에게 들키면 안 되니까, 조용히 숨어 있자」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（うぅ……どうしてこんなことに……）"
translation = "「(으윽…… 어쩌다가 이렇게 된 거지……)」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「こんなところに園芸用品店があるとは思わなかった。小さいお店だけど珍しい植物もあったし、今日は収穫が多かったな～♪」"
translation = "「이런 곳에 원예용품점이 있을 줄은 몰랐네. 작은 가게지만 희귀한 식물도 있었고, 오늘은 수확이 많았지~♪」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「お姉ちゃ～ん！」"
translation = "「언니~！」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あ、この前の……もしかしてこの辺に住んでるの？」"
translation = "「아, 저번에 그 아이…… 혹시 이 근처에 사는 거야?」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「うん、この前はありがとう！」"
translation = "「응, 저번엔 고마웠어!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「えへへ、魔王様のしもべとして当然のことをしただけだよ」"
translation = "「에헤헤, 마왕님의 하인으로서 당연한 일을 했을 뿐이야」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「まおうさま……？\u3000魔王って悪い人なんじゃないの？」"
translation = "「마왕님……? 마왕은 나쁜 사람 아니야?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「そうじゃなくて……あ、いや、悪い人のはずなんだけど。魔王様っていうのは、とっても強くて偉くて、そして優しい私のご主人様なんだ」"
translation = "「그렇지 않고…… 아, 아니, 나쁜 사람인 건 맞지만. 마왕님이라는 분은, 엄청 강하고 위대하고, 그리고 상냥한 나의 주인님이셔」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「じゃあ素敵な人なんだね！」"
translation = "「그럼 멋진 사람이네!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ふっふっふ、魔王様の魅力を理解するとは、なかなか見どころのある少女ではないか。さぁ、私と一緒に魔王様の世界征服を実現しよう……ワン！」"
translation = "「훗훗훗, 마왕님의 매력을 이해하다니, 제법 소질 있는 소녀가 아닌가. 자, 나와 함께 마왕님의 세계 정복을 실현하자…… 멍!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「！？\u3000モンスター！？\u3000しかもあんなにたくさん……どうすれば……」"
translation = "「!? 몬스터!? 게다가 저렇게나 많이…… 어떻게 해야……」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「こっち来て！\u3000とりあえず隠れよう！」"
translation = "「이리 와! 일단 숨자!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あんなの私じゃ勝てないよ……そもそもプリマステラじゃないから勝手に戦っちゃいけない決まりだし……」"
translation = "「저런 건 나 혼자선 못 이겨…… 애초에 프리마스텔라가 아니니까 함부로 싸우면 안 되는 규칙도 있고……」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「わたしたち、モンスターにやられちゃうの？」"
translation = "「우리, 몬스터한테 당하는 거야?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「だ、大丈夫、ちゃんとおうちに帰してあげるからね」"
translation = "「괘, 괜찮아, 제대로 집으로 돌려보내 줄 테니까」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（どうしよう……助けてください、魔王様……！）"
translation = "「(어쩌지…… 도와주세요, 마왕님……!)」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（……いや、違う。こんな時、魔王様ならどうする？）"
translation = "「(……아니, 달라. 이럴 때, 마왕님이라면 어떻게 하실까?)」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（魔王様なら絶対この子を助ける。モンスターなんかボコボコにやっつけて、みんなを守るんだ）"
translation = "「(마왕님이라면 분명 이 아이를 도우실 거야. 몬스터 따위는 너덜너덜하게 해치우고, 모두를 지키실 거야)」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "（私は魔王様第一のしもべ……だから魔王様の代わりに頑張らないと）"
translation = "「(나는 마왕님 제일의 하인…… 그러니까 마왕님 대신 열심히 해야 해)」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様に恥ずかしくないしもべになるんだ……！」"
translation = "「마왕님께 부끄럽지 않은 하인이 되는 거야……!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「この子を助けるには……そうだ。くんくん……モンスターの匂いが薄い方は……あっちなら抜けられるかも。行くよ」"
translation = "「이 아이를 돕기 위해서는…… 그래. 킁킁…… 몬스터 냄새가 옅은 쪽은…… 저쪽이라면 빠져나갈 수 있을지도. 가자」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「う、うんっ」"
translation = "「으, 응!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「そーっと……そーっと……見つからないように……」"
translation = "「살금살금…… 살금살금…… 들키지 않도록……」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うわ～っ！？\u3000見つかった！？」"
translation = "「우왓~!? 들켰어!?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「でも私は魔王様のしもべだから……！\u3000諦めずに戦うんだ！」"
translation = "「하지만 나는 마왕님의 하인이니까……! 포기하지 않고 싸우는 거야!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「この子には指一本触れさせないぞ！\u3000うお～っ！\u3000肉球パ～ンチ！」"
translation = "「이 아이에게 손가락 하나 못 대게 할 거다! 우오~옷! 육구 펀치!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「う、思ったより硬い……でも負けない……ガオ！」"
translation = "「우, 생각보다 단단해…… 하지만 지지 않아…… 갸오!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「今度こそ……ひっさ～つ！\u3000ケルベロス百烈けーんっ！」"
translation = "「이번에야말로…… 필살~기! 케르베로스 백렬권!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はぁ、はぁ……やった！\u3000モンスターを倒した！」"
translation = "「하아, 하아…… 해냈다! 몬스터를 쓰러뜨렸어!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あ、ヤバ──」"
translation = "「아, 위험──」"

[[dialogue]]
speaker = "unk"
original = "カティア！"
translation = "카티아!"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様！？」"
translation = "「마왕님!?」"

[[dialogue]]
speaker = "unk"
original = "モンスターを蹴散らすぞ！"
translation = "몬스터를 물리치자!"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はい！\u3000お供します！」"
translation = "「네! 따르겠습니다!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「はぁ……はぁ……なんとかなった……」"
translation = "「하아…… 하아…… 어떻게든 됐네요……」"

[[dialogue]]
speaker = "unk"
original = "よく頑張ったな"
translation = "수고했어"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様ぁ～～～っ！！」"
translation = "「마왕님아~~~앗!!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うぅ……ぐす……怖くて、心細くて……でも頑張って……」"
translation = "「우윽…… 훌쩍…… 무섭고, 불안했지만…… 그래도 열심히……」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様が来てくれて……うぅっ……ありがとうございます……っ」"
translation = "「마왕님이 와주셔서…… 으윽…… 감사합니다……!」"

[[dialogue]]
speaker = "unk"
original = "（頭を撫でる）"
translation = "「(머리를 쓰다듬는다)」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「あ……魔王様に撫でてもらうとポカポカして温かいです……」"
translation = "「아…… 마왕님이 쓰다듬어 주시니 포근하고 따뜻해요……」"

[[dialogue]]
speaker_original = "小さな女の子"
speaker_translation = "작은 여자아이"
original = "「お姉ちゃん！\u3000助けてくれてありがとう。かっこよかったよ！」"
translation = "「언니! 도와줘서 고마워. 멋있었어!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「そ、そう？\u3000そっかー、かっこよかったかー……。えへへ、褒められちゃいました」"
translation = "「흐, 흥? 그랬어? 그렇구나~, 멋있었구나~……. 에헤헤, 칭찬받았네」"

[[dialogue]]
speaker = "unk"
original = "カティアは俺の自慢のしもべだ"
translation = "카티아는 내가 자랑하는 하인이다"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「！\u3000魔王様……！」"
translation = "「! 마왕님……!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ふっふっふ、これで私が魔王様のイチの家来です！\u3000誰にも文句は言わせませんよ！」"
translation = "「훗훗훗, 이걸로 제가 마왕님의 제일가는 하인입니다! 누구에게도 불평은 못 하게 할 거예요!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ずっとかわいがってくださいね、魔王様。ワン♪」"
translation = "「계속 예뻐해 주세요, 마왕님. 멍♪」"

