[[dialogue]]
speaker = "unk"
original = "第３話,乙女チックがとまらない,P"
translation = "제3화, 소녀 감성이 멈추지 않아, P"

[[dialogue]]
speaker = "ユウリ"
original = "「そのまま突っ込め会長さんっ！\u3000防御はあたしに任せろっ！」"
translation = "「그대로 돌격해 회장님! 방어는 내게 맡겨!」"

[[dialogue]]
speaker = "ユウリ"
original = "「そこだ、フォルトゥナダイスっ！！」"
translation = "「거기다, 포르투나 다이스!!」"

[[dialogue]]
speaker = "ユウリ"
original = "「よし、今だっ！\u3000ぶちかませっ！」"
translation = "「좋아, 지금이야! 들이받아!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ふぅ。今回も楽勝だったな」"
translation = "「후우. 이번에도 낙승이었네」"

[[dialogue]]
speaker = "unk"
original = "ユウリのおかげだよ"
translation = "유우리 덕분이야."

[[dialogue]]
speaker = "ユウリ"
original = "「へへ、なんだかんだあの力にも慣れてきたしな。たまには後方から援護っつーのも悪くねえ」"
translation = "「헤헤, 어찌저찌 그 힘에도 익숙해졌으니까 말이야. 가끔은 후방에서 원호하는 것도 나쁘지 않네」"

[[dialogue]]
speaker = "ユウリ"
original = "「それに会長さんとの特訓のおかげで前よりはその……バニースーツ着るのも抵抗なくなってきたというか……」"
translation = "「게다가 회장님과의 특훈 덕분에 전보다는 그…… 바니 수트 입는 것도 거부감이 없어졌달까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「少なくとも会長さんは笑わねえし……。似合ってるって、可愛いって、言ってくれるし……」"
translation = "「적어도 회장님은 비웃지 않고……. 어울린다고, 귀엽다고 말해주니까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ろ、露骨に鼻の下を伸ばしてくるのは嫌だけどな！\u3000でも、いつも見とれてくれるのは嬉しいというか……」"
translation = "「노, 노골적으로 헤벌레하는 건 싫지만 말이야! 그래도, 항상 넋을 잃고 봐주는 건 기쁘달까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あんな反応してくれるなら、えと……。普段からもうちょっと女の子らしい格好してもいいかなとか思っちゃったりもして……」"
translation = "「그런 반응을 해준다면, 저기……. 평소에도 좀 더 여자아이 같은 차림을 해도 괜찮을까 생각하기도 하고……」"

[[dialogue]]
speaker = "unk"
original = "なら今から見に行こうよ"
translation = "그럼 지금 보러 가자."

[[dialogue]]
speaker = "ユウリ"
original = "「へっ！？\u3000み、見に行くって服をか！？\u3000いやいやいや！\u3000行かなくていいって……！」"
translation = "「헤!? 보, 보러 간다니 옷을!? 아니아니아니! 안 가도 된다니까……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あっ、ちょっ、引っ張んなっ……！\u3000街中で手ぇ繋ぐの恥ずかしっ……！」"
translation = "「앗, 잠깐, 잡아당기지 마……! 길거리에서 손잡는 거 부끄럽다구……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「余計なお世話だからっ！\u3000待てっ、待って……！\u3000どこ連れて行くんだよぉ～！」"
translation = "「쓸데없는 참견이라니까! 기다려, 기다려……! 어디로 데려가는 거야아~!」"

[[dialogue]]
speaker = "ユウリ"
original = "「うぅ、なんだよこのガーリーな服屋。あたしの趣味と全然違うって」"
translation = "「으으, 뭐야 이 걸리(Girly)한 옷가게는. 내 취향이랑 전혀 다르잖아」"

[[dialogue]]
speaker = "ユウリ"
original = "「スカートとか超フリフリだし……。ドレスみてぇだし……。こういうのはフィオナとかルリエルとかが着るもんで……」"
translation = "「치마 같은 것도 엄청 팔랑거리고……. 드레스 같고……. 이런 건 피오나나 루리엘 같은 애들이 입는 거지……」"

[[dialogue]]
speaker = "ユウリ"
original = "「こんなの着た日にはアホ猫がからかってくるだろうし……会長さんにだって……」"
translation = "「이런 거 입은 날에는 바보 고양이가 놀려댈 테고…… 회장님한테도……」"

[[dialogue]]
speaker = "unk"
original = "可愛すぎて卒倒しちゃうかもな"
translation = "너무 귀여워서 졸도해버릴지도 모르겠네."

[[dialogue]]
speaker = "ユウリ"
original = "「なっ──アホなこと言うなって！\u3000あたしのこと買いかぶりすぎだって……！」"
translation = "「나앗── 바보 같은 소리 하지 마! 나를 너무 과대평가하는 거라니까……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「嬉しいは嬉しい、けど……。あたしだってずっとその、こういうフリフリな服着てみたいとは思ってたし……」"
translation = "「기쁘긴 기쁘지만……. 나도 계속 그, 이런 팔랑거리는 옷 입어보고 싶다고 생각은 했었지만……」"

[[dialogue]]
speaker = "ユウリ"
original = "「でもやっぱり勇気が──」"
translation = "「하지만 역시 용기가──」"

[[dialogue]]
speaker = "ユウリ"
original = "「──ひゃっ。な、なんだよ、急に顔近づけてっ……」"
translation = "「──히익. 뭐야, 갑자기 얼굴 가까이 대고……」"

[[dialogue]]
speaker = "ユウリ"
original = "「いつものおまじないって……<emoji=heart04>\u3000バカ、店の前だぞ……<emoji=heart04>\u3000あっ、ダメ、ん……ちゅっ……<emoji=heart04>」"
translation = "「평소의 주문이라니……<emoji=heart04> 바보야, 가게 앞이잖아……<emoji=heart04> 앗, 안 돼, 응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「で、出た、んちゅぁ、もう勇気出たから……<emoji=heart04>\u3000恥ずかし、んんっ……<emoji=heart04>\u3000ひ、人に見られちゃうって……<emoji=heart04>」"
translation = "「나, 나왔어, 응츄아, 이제 용기 났으니까……<emoji=heart04> 부끄러워, 으응……<emoji=heart04> 사, 사람들이 보겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「ぷはぁ、はぁはぁ、これじゃバカップルじゃねえか……<emoji=heart04>\u3000っっ、べ、別に嫌とは言ってないけど……<emoji=heart04>」"
translation = "「푸하아, 하아하아, 이러면 바보 커플이잖아……<emoji=heart04> 윽, 딱히 싫다고는 안 했지만……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「こんなことしてまで見たいのか……？\u3000あたしが女の子らしい服着てるところ……」"
translation = "「이렇게까지 해서 보고 싶은 거야……? 내가 여자아이 같은 옷 입고 있는 모습……」"

[[dialogue]]
speaker = "ユウリ"
original = "「でも絶対似合わねえと思うけど……──ひゃっ、キ、キスはもういいからっ！」"
translation = "「그래도 절대 안 어울릴 거라고 생각하는데── 히익, 키, 키스는 이제 됐으니까!」"

[[dialogue]]
speaker = "unk"
original = "絶対似合うよ"
translation = "절대 어울릴 거야."

[[dialogue]]
speaker = "ユウリ"
original = "「あ……ありがと。なら気が向いたら挑戦してみよう、かな」"
translation = "「고…… 고마워. 그럼 마음 내키면 도전해 볼게, 아마도」"

[[dialogue]]
speaker = "ユウリ"
original = "「一番好きな人がそこまで言ってくれるなら……安心、だし」"
translation = "「가장 좋아하는 사람이 그렇게까지 말해준다면…… 안심, 이고」"

[[dialogue]]
speaker = "ユウリ"
original = "「ちなみに、その。会長さんはどういう服が好みなんだ？\u3000あたしがどういう服着てたら嬉しい……？」"
translation = "「그건 그렇고, 저기. 회장님은 어떤 옷이 취향이야? 내가 어떤 옷을 입고 있으면 기쁘겠어……?」"

[[dialogue]]
speaker = "ユウリ"
original = "「へ？\u3000こ、これはフワフワ過ぎるって。そっちはセクシー過ぎだし……！」"
translation = "「헤? 이, 이건 너무 푹신푹신하잖아. 저쪽은 너무 섹시하고……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「でも会長さんが本当に喜んでくれるのならその……。あたしも色んな服着てみたいし……」"
translation = "「하지만 회장님이 정말로 기뻐해 준다면 그…… 나도 여러 가지 옷 입어보고 싶고……」"

[[dialogue]]
speaker = "ユウリ"
original = "「そんで会長さんがあたしをもっと好きになってくれるのなら……こんなに幸せなこともないっていうか」"
translation = "「그래서 회장님이 나를 좀 더 좋아하게 되어준다면…… 이보다 행복한 일도 없달까」"

[[dialogue]]
speaker = "ユウリ"
original = "「って──あたしはなんて恥ずかしいことを！？\u3000今のはなし、なしだからな……！」"
translation = "「앗── 내가 무슨 부끄러운 소리를!? 방금 건 없던 일로, 없던 일로 해줘……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「つかあたしばっかズルいだろっ。会長さんもなんかイメチェンしろよっ。ほら、あれとかどうだ！」"
translation = "「그보다 나만 당하는 건 치사하잖아. 회장님도 뭔가 이미지 체인지 좀 해봐. 봐봐, 저런 거 어때!」"

[[dialogue]]
speaker = "ユウリ"
original = "「お、かっこつけすぎかと思ったが意外と似合いそうじゃねえか。ふふ、格好いいと思うぜ？\u3000うん……ホント格好いいな……」"
translation = "「오, 너무 멋 부린 거 아닌가 싶었는데 의외로 잘 어울리겠는걸. 후후, 멋있다고 생각해. 응…… 진짜 멋있네……」"

[[dialogue]]
speaker = "ユウリ"
original = "「や、やっぱこれはなしだ。いいって買わなくて……！」"
translation = "「아, 역시 이건 취소야. 됐어 사지 마……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「それ以上格好良くなられたら、さらにモテられちまう。ただでさえ彼氏がモテモテで困ってるってのに……」"
translation = "「그 이상 멋있어지면, 더 인기 많아질 거 아냐. 가뜩이나 남자친구가 인기가 너무 많아서 곤란한데……」"

[[dialogue]]
speaker = "ユウリ"
original = "「え……ユウリが一番……？\u3000それはわかってるけど……っっ、は、恥ずかしいからそんなこと囁くな……！」"
translation = "「에…… 유우리가 제일……? 그건 알고 있지만…… 윽, 부끄러우니까 그런 거 속삭이지 마……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしもあんたが世界で一番格好いいと思ってるから。だからこそ、あたしなんかで釣り合ってるのかいつも心配で……」"
translation = "「나도 당신이 세상에서 제일 멋있다고 생각하니까. 그래서 내가 과연 어울리는 걸까 항상 걱정돼서……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あ……んっ<emoji=heart04>\u3000だからこんなところで──んちゅっ<emoji=heart04>\u3000あたしのこと好きなのは、んふ、わかったから……<emoji=heart04>」"
translation = "「아…… 응<emoji=heart04> 그러니까 이런 데서── 응츄<emoji=heart04> 나를 좋아하는 건, 응후, 알았으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「はぁはぁ、んもう……<emoji=heart04>\u3000恥じらいってもんがないのか、あんたは……<emoji=heart04>」"
translation = "「하아하아, 정말이지……<emoji=heart04> 수치심이라는 게 없는 거야, 당신은……<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
original = "「でも、ありがと……。嬉しい……。こんなにもあたしのこと女の子として、彼女として見てくれて……」"
translation = "「하지만, 고마워……. 기뻐……. 이렇게나 나를 여자로서, 여자친구로서 봐줘서……」"

[[dialogue]]
speaker = "ユウリ"
original = "「もしあたしがフリフリな服着たら……見てくれるか？\u3000もっと会長さんに好きになってもらえるかな……？」"
translation = "「만약 내가 팔랑거리는 옷 입으면…… 봐줄 거야? 회장님이 나를 더 좋아해 줄까……?」"

[[dialogue]]
speaker = "unk"
original = "さらに夢中になっちゃうよ"
translation = "더 푹 빠져버릴 거야."

[[dialogue]]
speaker = "ユウリ"
original = "「え、えへへ……。じゃあ前向きに考えてみっかな……」"
translation = "「에, 에헤헤……. 그럼 긍정적으로 생각해 볼까나……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしも、ん……ちゅっ<emoji=heart04>\u3000もっと会長さんを夢中にさせたいからな……<emoji=heart04>」"
translation = "「나도, 응…… 츄<emoji=heart04> 회장님을 더 푹 빠지게 만들고 싶으니까 말이야……<emoji=heart04>」"

