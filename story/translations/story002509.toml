[[dialogue]]
speaker = "サラン"
original = "「お帰りなさい、エルゼ～」"
translation = "「어서 와, 엘제~」"

[[dialogue]]
speaker = "unk"
original = "アステラを消滅させ、戻ってきた俺たちをサランが迎えてくれた。"
translation = "아스텔라를 소멸시키고 돌아온 우리를 사란이 맞이해 주었다."

[[dialogue]]
speaker = "ラティエ"
original = "「見事な一撃だったな、エルデリーゼ嬢」"
translation = "「훌륭한 일격이었다, 엘데리제 양」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そ、そんな！\u3000とんでもありませんわ！」"
translation = "「그, 그런! 당치도 않습니다와!」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それどころか先走って、スピードに任せて突出してしまうなんて……連携の大切さは学んできた筈ですのに」"
translation = "「그건커녕 앞질러 나가서, 속도에만 맡기고 돌출해 버리다니…… 연계의 중요성은 배워왔을 터인데」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様と学園長様に助けて頂きましたわ……逆に申し訳ありませんでしたの……」"
translation = "「회장님과 학원장님께서 도와주셨어요…… 거꾸로 죄송했습니다……」"

[[dialogue]]
speaker = "ラティエ"
original = "「とっさに思ったようには身体は動かないものさ。経験の浅いうちは仕方ない」"
translation = "「순간적으로 생각한 대로 몸이 움직이지 않는 법이지. 경험이 얕을 때는 어쩔 수 없다」"

[[dialogue]]
speaker = "ラティエ"
original = "「それを置いても良く頑張った、エルデリーゼ嬢」"
translation = "「그걸 차치하고서라도 잘 해냈다, 엘데리제 양」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「学園長様……」"
translation = "「학원장님……」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私、考えを改めましたわ……旅に連れて行って欲しいなどと、我がままを言って申し訳ありませんでした」"
translation = "「저, 생각을 고쳤습니다와…… 여행에 데려가 달라는 등, 고집을 부려 죄송했습니다」"

[[dialogue]]
speaker = "ラティエ"
original = "「旅の同行者となるのは諦める、ということか？」"
translation = "「여행의 동행자가 되는 것은 포기한다는 뜻인가?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「学園長様の剣、バラクィエルを振るった一瞬に垣間見えた力だけでも、遥かな隔たりを感じましたわ」"
translation = "「학원장님의 검, 바라키엘을 휘두른 순간 엿보인 힘만으로도, 머나먼 격차를 느꼈습니다와」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「旅に同行するならば、私はもっともっと強くならなければなりませんの」"
translation = "「여행에 동행하려면, 저는 훨씬 더 강해져야만 해요」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そのためにも私、この学園で研鑽を積み、実力を磨きます」"
translation = "「그걸 위해서라도 저, 이 학원에서 연찬을 쌓고, 실력을 갈고닦겠습니다」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それが星騎士としてその責任を果たすために、私が為さねばならないことなのだと思いましたわ」"
translation = "「그것이 성기사로서 그 책임을 다하기 위해, 제가 해야만 하는 일이라고 생각했습니다와」"

[[dialogue]]
speaker = "ラティエ"
original = "「そうか……立派な星騎士になるだろうな、きみは」"
translation = "「그렇군…… 훌륭한 성기사가 되겠구나, 자네는」"

[[dialogue]]
speaker = "ラティエ"
original = "「……正直、少し安心した。いろいろ理由を付けてはいたが、本当のことを言うと私は一人旅に慣れ過ぎてしまっている」"
translation = "「……솔직히, 조금 안심했다. 여러 가지 이유를 대긴 했지만, 사실을 말하자면 나는 혼자 하는 여행에 너무 익숙해져 있어」"

[[dialogue]]
speaker = "ラティエ"
original = "「だから同行者ができてしまうと、私にとっての旅が旅でなくなってしまうのではないかという思いもあったのだ」"
translation = "「그래서 동행자가 생겨버리면, 나에게 있어 여행이 여행이 아니게 되어버리는 건 아닐까 하는 생각도 있었거든」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「ですが途中で出会った人と、共に旅することもあるのでしょう？」"
translation = "「하지만 도중에 만난 사람과, 함께 여행하는 일도 있겠죠?」"

[[dialogue]]
speaker = "ラティエ"
original = "「そうだな。だが、旅人はそれぞれ違った目的を胸に抱いて旅をしているものだ」"
translation = "「그렇지. 하지만, 여행자는 저마다 다른 목적을 가슴에 품고 여행을 하는 법이다」"

[[dialogue]]
speaker = "ラティエ"
original = "「同じ方向を向くことはあれど、全く同じ目的地になることはない。旅とはそういうものだと私は思っている」"
translation = "「같은 방향을 향할 수는 있어도, 완전히 같은 목적지가 되지는 않아. 여행이란 그런 것이라고 나는 생각한다」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私が旅に求めていたのは、狭い自分の世界を広げることであり、知らなかったことを知りたいという好奇心ですわ」"
translation = "「제가 여행에 바랐던 것은, 좁은 자신의 세계를 넓히는 것이며, 몰랐던 것을 알고 싶다는 호기심이었습니다와」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それは、学園長様の目的とはやはり違っていますの」"
translation = "「그것은 역시, 학원장님의 목적과는 다릅니다」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私の目的を果たすためには、誰かの同行者になるのではなく、自分の第一歩で私自身の旅を始めなければならないという事ですわね」"
translation = "「제 목적을 달성하기 위해서는, 누군가의 동행자가 되는 것이 아니라, 자신의 첫걸음으로 저 자신의 여행을 시작해야 한다는 것이군요」"

[[dialogue]]
speaker = "ラティエ"
original = "「そういうことだな」"
translation = "「그렇게 되겠지」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「けれど学園長様……ひとつだけ言わせていただきますの」"
translation = "「그렇지만 학원장님…… 한 가지만 말씀드리겠습니다와」"

[[dialogue]]
speaker = "ラティエ"
original = "「ほう、何かな？」"
translation = "「호오, 뭔가?」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私は今日、学園長様と会えて、いろいろなお話をしていただいて本当に良かったと思っているんですの」"
translation = "「저는 오늘, 학원장님과 만나서, 여러 가지 이야기를 들을 수 있어서 정말 좋았다고 생각해요」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「それは私の中でずっともやもやと抱えていたものに、ひとつの形を与えてくださったからですわ」"
translation = "「그것은 제 안에서 줄곧 답답하게 품고 있던 것에, 하나의 형태를 주셨기 때문입니다와」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「私は桜十路家の娘として生まれ、厳格な家庭環境の中で育ちました」"
translation = "「저는 사쿠라코지 가문의 딸로 태어나, 엄격한 가정환경 속에서 자랐습니다」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「家を恨む気持ちはありません。ですが自由への渇望をずっと抱え続けてきたことも事実ですの」"
translation = "「가문을 원망하는 마음은 없습니다. 하지만 자유에 대한 갈망을 줄곧 품어온 것도 사실이에요」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「そんな私にとって学園長様、あなたは目指すべき理想の姿なのですわ」"
translation = "「그런 제게 있어 학원장님, 당신은 지향해야 할 이상적인 모습입니다와」"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生が聞いたら頭を抱えそうな事を高らかに宣言するエルゼの表情には、清々しさがにじみ出ていた。"
translation = "에스메랄다 선생님이 들으면 머리를 감싸 쥘 법한 일을 드높게 선언하는 엘제의 표정에는, 청량함이 배어 나오고 있었다."

[[dialogue]]
speaker = "unk"
original = "ラティエ学園長は珍しく恥ずかしそうな様子で頭をかいている。"
translation = "라티에 학원장은 드물게 부끄러운 듯 머리를 긁적이고 있다."

[[dialogue]]
speaker = "unk"
original = "そんな２人の様子に、俺とサランは顔を見合わせては温かい気持ちになるのだった。"
translation = "그런 두 사람의 모습에, 나와 사란은 서로 얼굴을 마주 보며 따뜻한 기분이 되는 것이었다."

