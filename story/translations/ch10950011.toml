[[dialogue]]
speaker = "unk"
original = "第１話,３人目の魔法少女,P"
translation = "제1화, 3번째 마법소녀, P"

[[dialogue]]
speaker = "unk"
original = "『解放』のロストアイテムが現れた事件から、少し経って。"
translation = "『해방』의 로스트 아이템이 나타난 사건으로부터, 조금 지나서."

[[dialogue]]
speaker = "unk"
original = "その日は魔法少女の３人――サチ、プリムラ、そして新たに加わったシズハが、改めて戦闘中の連携を確認しようということになり、訓練を行っていた。"
translation = "그날은 마법소녀 3명──사치, 프리뮬러, 그리고 새로 합류한 시즈하가, 다시금 전투 중의 연계를 확인하기로 하여, 훈련을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺はそれを見学していたのだが――"
translation = "나는 그것을 견학하고 있었는데──"

[[dialogue]]
speaker = "シズハ"
original = "「聖杯ちゃん、お願い！\u3000力を貸して！」"
translation = "「성배야, 부탁해! 힘을 빌려줘!」"

[[dialogue]]
speaker = "unk"
original = "分析の結果、シズハの使っている力は星騎士の使う『星力』と異なり、魔女が使う『魔力』であるとモニターに表示されていた。"
translation = "분석 결과, 시즈하가 사용하는 힘은 성기사가 사용하는 『성력』과 달리, 마녀가 사용하는 『마력』이라고 모니터에 표시되어 있었다."

[[dialogue]]
speaker = "シズハ"
original = "「ふぅ～、ちょっと休憩～♪」"
translation = "「후우~, 잠깐 휴식~♪」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様、シズハ"
translation = "수고했어, 시즈하"

[[dialogue]]
speaker = "unk"
original = "俺は彼女にスポーツドリンクの入った水筒を渡す。"
translation = "나는 그녀에게 스포츠 음료가 든 수통을 건넨다."

[[dialogue]]
speaker = "シズハ"
original = "「あっ、会長、ありがとう♪」"
translation = "「앗, 회장, 고마워♪」"

[[dialogue]]
speaker = "シズハ"
original = "「ねぇ、どうだった？\u3000私、サチちゃんやプリムラちゃんと上手く連携できてた？」"
translation = "「저기, 어땠어? 나, 사치 짱이나 프리뮬러 짱이랑 연계 잘 됐어?」"

[[dialogue]]
speaker = "unk"
original = "ああ、すごくいい感じだったぞ"
translation = "아아, 아주 좋은 느낌이었어"

[[dialogue]]
speaker = "シズハ"
original = "「よし♪\u3000ならよかったわ♪」"
translation = "「좋아♪ 그럼 다행이네♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は流星学園附属校３年生の、<ruby>染井<rt>そめい</rt></ruby>シズハ。今から１ヶ月前に学園へやって来た転入生である。"
translation = "그녀는 유성학원 부속교 3학년인, 소메이 시즈하. 지금으로부터 1개월 전에 학원으로 온 전학생이다."

[[dialogue]]
speaker = "unk"
original = "──彼女はサチやプリムラに続く３人目の魔法少女だ。"
translation = "──그녀는 사치나 프리뮬러의 뒤를 잇는 3번째 마법소녀다."

[[dialogue]]
speaker = "unk"
original = "この前のロストアイテム事件の際に、俺は初めて彼女と顔を合わせていた。"
translation = "얼마 전 로스트 아이템 사건 때, 나는 처음으로 그녀와 대면했었다."

[[dialogue]]
speaker = "unk"
original = "そういえば、さっきなんだけど――"
translation = "그러고 보니, 아까 말인데──"

[[dialogue]]
speaker = "シズハ"
original = "「えっ、聖杯ちゃんのカモフラージュが解けてる……？」"
translation = "「앗, 성배의 위장이 풀려 있어……?」"

[[dialogue]]
speaker = "シズハ"
original = "「そうなの！？\u3000いつの間に……！」"
translation = "「정말!? 어느 사이에……!」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「なんじゃシズハ、大きな声を出したりして」"
translation = "「무엇이냐 시즈하, 큰 소리를 내고」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さん、何かあったんですか？」"
translation = "「오빠, 무슨 일 있었나요?」"

[[dialogue]]
speaker = "unk"
original = "気づいてやって来た２人に、シズハが使っている力が『魔力』であることを話すと――"
translation = "눈치채고 다가온 두 사람에게, 시즈하가 사용하는 힘이 『마력』이라는 것을 이야기하자──"

[[dialogue]]
speaker = "unk"
original = "サチの杖に憑依しているロストアイテム――トレジアンナさんが口を開く。"
translation = "사치의 지팡이에 빙의해 있는 로스트 아이템──트레지안나 씨가 입을 연다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「なるほど。だとすれば、おそらくディーラックさんがカモフラージュをしていたんでしょうね」"
translation = "「과연. 그렇다면, 아마 디럭쿠 씨가 위장을 하고 있었던 거겠죠」"

[[dialogue]]
speaker = "シズハ"
original = "「私、てっきり聖杯ちゃんにお願いが届いて、誤魔化せてるものだとばかり……」"
translation = "「난, 당연히 성배에게 부탁이 닿아서, 속이고 있는 줄로만……」"

[[dialogue]]
speaker = "シズハ"
original = "「『魔力は今の時代、一般的な力じゃないから、聖杯ちゃんにお願いして隠してもらいなさい』ってディーちゃんが言ってて」"
translation = "「『마력은 지금 시대에 일반적인 힘이 아니니까, 성배에게 부탁해서 숨겨달라고 하렴』이라고 디 짱이 말해서」"

[[dialogue]]
speaker = "シズハ"
original = "「それからは附属校に転入手続きをする時も、『星力あり』って判定されてたから、ずっと上手く行ってるつもりだったわ」"
translation = "「그 후로는 부속교에 전학 절차를 밟을 때도, 『성력 있음』이라고 판정됐으니까, 계속 잘 되고 있는 줄 알았어」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「実際は聖杯ではなく、ディーラックさんがこっそりやってたってことでしょうね～」"
translation = "「실제로는 성배가 아니라, 디럭쿠 씨가 몰래 하고 있었다는 거겠네요~」"

[[dialogue]]
speaker = "サチ"
original = "「そういえばトレジアンナさん、シズハちゃんと初めて会った時から『凄い濃密な魔力の気配がする』って言ってましたもんね」"
translation = "「그러고 보니 트레지안나 씨, 시즈하 짱이랑 처음 만났을 때부터 『굉장히 농밀한 마력의 기운이 느껴진다』고 하셨었죠」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ええ。サチさんの前では、時々ポロッと魔力って言い方をしちゃってましたが……ロストアイテムはそもそも、古代の魔女が作ったものだと言われてるんです」"
translation = "「네. 사치 씨 앞에서는, 가끔 툭 하고 마력이라는 표현을 써버리곤 했습니다만…… 로스트 아이템은 원래, 고대의 마녀가 만든 것이라고 전해지거든요」"

[[dialogue]]
speaker = "サチ"
original = "「なるほど。だからロストアイテムと融合したシズハちゃんが使うのは『魔力』なんですね」"
translation = "「과연. 그래서 로스트 아이템과 융합한 시즈하 짱이 사용하는 건 『마력』이군요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そういうことです。ちなみに、シズハさんの持つ『願望』のロストアイテム――『願いの聖杯』は、人類史の中でも有名な、それはそれは凄い代物なんですよ～！」"
translation = "「그런 겁니다. 참고로, 시즈하 씨가 가진 『염원』의 로스트 아이템── 『소원의 성배』는, 인류사 중에서도 유명한, 아주아주 대단한 물건이랍니다~!」"

[[dialogue]]
speaker = "unk"
original = "サチたちはいつ、シズハと知り合ったんだ？"
translation = "사치 일행은 언제 시즈하와 알게 된 거야?"

[[dialogue]]
speaker = "unk"
original = "そういえば、気になってたんだけど――"
translation = "그러고 보니, 궁금했었는데──"

[[dialogue]]
speaker = "シズハ"
original = "「ああ、その時のこと、会長にはまだ話したことなかったわね」"
translation = "「아아, 그때 일, 회장에게는 아직 말한 적 없었네」"

[[dialogue]]
speaker = "シズハ"
original = "「１ヶ月前、私が魔法少女になって、ロストアイテムの回収を始めたばかりの頃に、２人とは現場でかち合ったの」"
translation = "「1개월 전, 내가 마법소녀가 되어서, 로스트 아이템 회수를 시작한 지 얼마 안 됐을 무렵에, 두 사람과는 현장에서 맞닥뜨렸어」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「あれは確か、『飛翔』のロストアイテムを追っていた時じゃったな」"
translation = "「그건 분명, 『비상』의 로스트 아이템을 쫓고 있었을 때였지」"

[[dialogue]]
speaker = "シズハ"
original = "「そうそう。なんだかんだあって、どっちが先にロストアイテムを回収するかの競争になったのよね」"
translation = "「맞아 맞아. 이러쿵저러쿵해서, 어느 쪽이 먼저 로스트 아이템을 회수할지 경쟁하게 됐었지」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「こやつ、聖杯の力で出し抜きおって、我らに勝ちおったのじゃ」"
translation = "「이 녀석, 성배의 힘으로 허를 찔러서, 우리를 이겼단 말이다」"

[[dialogue]]
speaker = "シズハ"
original = "「ふっふっふ！\u3000私、格闘技好きだから、戦闘の駆け引きの知識だけは沢山あるのよ♪」"
translation = "「훗훗훗! 나, 격투기 좋아하니까, 전투 수싸움 지식만큼은 잔뜩 있거든♪」"

[[dialogue]]
speaker = "サチ"
original = "「それで、２回目にシズハちゃんとかち合った時のロストアイテムがかなり手強くて、協力して回収する流れになったんだよね」"
translation = "「그래서, 두 번째로 시즈하 짱이랑 맞닥뜨렸을 때의 로스트 아이템이 꽤 까다로워서, 협력해서 회수하는 흐름이 됐었지」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「というか、サチはその時点で既に、シズハと仲良くなってたのじゃ」"
translation = "「그보다, 사치는 그 시점에서 이미 시즈하와 친해져 있었느니라」"

[[dialogue]]
speaker = "シズハ"
original = "「でも、２回目の時は、プリムラちゃんとのコンビネーションでロストアイテム回収に成功したのよね♪\u3000それで打ち解けられたっていうか」"
translation = "「하지만, 두 번째 때는 프리뮬러 짱과의 콤비네이션으로 로스트 아이템 회수에 성공했었지♪ 그래서 마음을 열게 됐달까」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ま、まぁ、そうじゃな。貴様がやたらと人懐っこいから……」"
translation = "「뭐, 뭐어, 그렇지. 네놈이 워낙 싹싹하게 굴어서……」"

[[dialogue]]
speaker = "シズハ"
original = "「ふふっ♪\u3000で、それ以降の回収では、より活躍した方にロストアイテムを譲るようになった、って感じかな」"
translation = "「후훗♪ 그래서 그 이후 회수에서는, 더 활약한 쪽에 로스트 아이템을 양보하게 된, 그런 느낌일까」"

[[dialogue]]
speaker = "unk"
original = "附属校に転入してきたのは？"
translation = "부속교에 전학 온 건?"

[[dialogue]]
speaker = "シズハ"
original = "「初めてサチちゃんたちと出会った、ちょうど翌日ね」"
translation = "「처음 사치 짱 일행과 만난, 바로 다음 날이야」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃんから、学園に入った方が魔法少女として活動しやすいって言われて、転入することにしたんだけど――」"
translation = "「디 짱한테서, 학원에 들어가는 게 마법소녀로서 활동하기 편할 거라는 말을 듣고 전학하기로 했는데──」"

[[dialogue]]
speaker = "シズハ"
original = "「実際に通い始めたら、まさかのサチちゃんと同じクラスでビックリしたわ！」"
translation = "「실제로 다니기 시작했더니, 설마 했던 사치 짱이랑 같은 반이라 깜짝 놀랐어!」"

[[dialogue]]
speaker = "unk"
original = "ちなみに『ディーちゃん』――ディーラックは、今この場にはいないが、シズハを魔法少女にした張本人である。"
translation = "참고로 『디 짱』──디럭쿠는, 지금 이 자리에는 없지만, 시즈하를 마법소녀로 만든 장본인이다."

[[dialogue]]
speaker = "サチ"
original = "「昨日の今日だったからね。最初はちょっと警戒しちゃったけど、シズハちゃんはすごく積極的に話しかけてきて――」"
translation = "「어제의 오늘이었으니까요. 처음에는 조금 경계해 버렸지만, 시즈하 짱은 굉장히 적극적으로 말을 걸어와서──」"

[[dialogue]]
speaker = "シズハ"
original = "「私、なんかもう出会いの嬉しさの方が勝っちゃって。その日のうちに、サチちゃんとＤＩＳＣの連絡先も交換して、友達になったの♪」"
translation = "「난 왠지 벌써 만난 기쁨이 더 커버려서. 그날 바로 사치 짱이랑 DISC 연락처도 교환하고, 친구가 됐어♪」"

[[dialogue]]
speaker = "サチ"
original = "「ふふっ、あまりに積極的過ぎて、その週末には、私の家に泊まりで遊びに来てたもんね」"
translation = "「후훗, 너무 적극적이라서, 그 주 주말에는 저희 집에 자고 가기도 했는걸요」"

[[dialogue]]
speaker = "unk"
original = "どうやら話によると、サチの実家は流星市国にあるらしく、寮生ではないらしい。"
translation = "듣자 하니 사치의 본가는 유성시국에 있는 모양이고, 기숙사생은 아닌 듯하다."

[[dialogue]]
speaker = "シズハ"
original = "「そうそう！\u3000で、プリムラちゃんが嫉妬しちゃって、『我も参加する！』って言い出して～」"
translation = "「맞아 맞아! 그래서 프리뮬러 짱이 질투해서, 『나도 참가하겠다!』라고 말하기 시작해서~」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「ちょっ！？\u3000誰が嫉妬じゃと！？\u3000あれは違うのじゃ！\u3000勝手に勘違いするでない！」"
translation = "「잠깐!? 누가 질투라는 것이냐!? 그건 아니니라! 마음대로 착각하지 말거라!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや～、あの時のプリムラさんは可愛かったですね～♪」"
translation = "「이야~, 그때의 프리뮬러 씨는 귀여웠죠~♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
original = "「はあぁっ！？\u3000誰が可愛いって……フヘへ♪\u3000へ、変なことを言うでないのじゃ！」"
translation = "「하아앗!? 누가 귀엽다고……흐헤헤♪ 벼, 별난 소리 하지 말거라!」"

[[dialogue]]
speaker = "unk"
original = "（そこは照れるんだ……）"
translation = "(거기서는 수줍어하는구나……)"

[[dialogue]]
speaker = "シズハ"
original = "「とまぁ、私たちの馴れ初めはそんな感じかな♪」"
translation = "「뭐, 우리들의 첫 만남은 그런 느낌일까♪」"

[[dialogue]]
speaker = "シズハ"
original = "「――あっ！\u3000ちなみに『魔法少女グレイル☆シズハ』の名乗りは、サチちゃんの『魔法少女トレジャー☆サチ』の名乗りがカッコよかったから、真似したんだ♪」"
translation = "「──앗! 참고로 『마법소녀 그레일☆시즈하』라는 대사는, 사치 짱의 『마법소녀 트레저☆사치』 대사가 멋있어서 따라 한 거야♪」"

[[dialogue]]
speaker = "サチ"
original = "「いや、私は名乗ってませんけどね！？\u3000毎度勝手にその口上を言ってるのは、トレジアンナさんですから！」"
translation = "「아니, 저는 말한 적 없거든요!? 매번 마음대로 그 구상을 말하는 건 트레지안나 씨니까요!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「え～、サチさんもシズハさんみたいに、もっとノリ良く行きましょうよ～！\u3000そろそろ魔法少女活動も長くなって来たことですし～」"
translation = "「에이~, 사치 씨도 시즈하 씨처럼 좀 더 텐션 높게 가자고요~! 슬슬 마법소녀 활동도 길어졌으니까요~」"

[[dialogue]]
speaker = "シズハ"
original = "「そうそう！\u3000サチちゃん、こういうのは行け行けゴーゴーで、慣れだよ、慣れ♪」"
translation = "「맞아 맞아! 사치 짱, 이런 건 기세 좋게 고고, 익숙해지는 거야, 익숙해지는 거♪」"

[[dialogue]]
speaker = "サチ"
original = "「絶対に、イ・ヤ・で・す～～～！！！」"
translation = "「절대로, 싫·어·요~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "シズハはサチたちとすっかり親しそうなやり取りをしながら、楽しそうに笑うのだった――"
translation = "시즈하는 사치 일행과 완전히 친해진 듯한 대화를 나누며, 즐겁게 웃는 것이었다──"

