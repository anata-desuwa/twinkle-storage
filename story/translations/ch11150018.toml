[[dialogue]]
speaker = "unk"
original = "俺と煌嶺は恋人と言える関係には至っていない。少なくとも今はまだ。"
translation = "나와 코우레이는 연인이라고 할 수 있는 관계에는 이르지 못했다. 적어도 지금은 아직."

[[dialogue]]
speaker = "unk"
original = "だが煌嶺が──"
translation = "하지만 코우레이가──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「私エッチしてみたい！」"
translation = "「나 섹스해보고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "と言ってきて、押し倒されてしまった。"
translation = "라고 말하며 덮쳐버리고 말았다."

[[dialogue]]
speaker = "unk"
original = "それからというもの──"
translation = "그 후로──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぅっ……」"
translation = "「큭……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あはは、もう出ちゃった♪\u3000魔王さんってば情けな～いっ」"
translation = "「아하하, 벌써 나와버렸네♪ 마왕 씨도 참 한심해~」"

[[dialogue]]
speaker = "unk"
original = "煌嶺はすっかりセックスにはまってしまい、俺はいいようにされてばかり。"
translation = "코우레이는 완전히 섹스에 빠져버렸고, 나는 휘둘리기만 할 뿐."

[[dialogue]]
speaker = "unk"
original = "搾られて、弄ばれて、煌嶺のおもちゃになっていた。"
translation = "빨리고, 농락당하고, 코우레이의 장난감이 되어 있었다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「でも魔王さんをいじめるのも飽きてきたな～。ちょっと刺激が欲しいかも」"
translation = "「하지만 마왕 씨를 괴롭히는 것도 질려가네~. 좀 자극이 필요할지도」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そうだ、じゃあこういうのはどう？」"
translation = "「맞다, 그럼 이런 건 어때?」"

[[dialogue]]
speaker = "unk"
original = "それから数日後──"
translation = "그로부터 며칠 뒤──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くぁああっ……！」"
translation = "「콰아앗……!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の尻尾を掴んで無理やり立たせ、思い切り尻を叩いた。"
translation = "코우레이의 꼬리를 잡고 억지로 일으켜 세워, 있는 힘껏 엉덩이를 때렸다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「貴様……妾にこのような屈辱を与えるとは……！\u3000命はないものと思え……！」"
translation = "「네놈…… 첩에게 이런 굴욕을 주다니……! 목숨은 없다고 생각하라……!」"

[[dialogue]]
speaker = "unk"
original = "豪奢な装束を切り裂かれ、首枷で自由を奪われながらも、女帝の顔で凄む煌嶺。"
translation = "호화로운 의복이 찢기고, 목칼로 자유를 빼앗기면서도 여제의 얼굴로 위협하는 코우레이."

[[dialogue]]
speaker = "unk"
original = "先ほど叩かれた尻が、うっすらと赤く染まっている。"
translation = "방금 맞은 엉덩이가 발그레하게 물들어 있다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「枷で戒めた程度で、妾を躾けられると思ったか？\u3000愚か者め、身の程をわきまえろ……！」"
translation = "「칼 따위로 가둔 정도로 첩을 길들일 수 있을 거라 생각했느냐? 어리석은 자여, 분수를 알거라……!」"

[[dialogue]]
speaker = "unk"
original = "だけどこれは『女帝・煌嶺が反乱されて下々の男に犯される』というシチュエーションを煌嶺自身が考えて、演じているもの。"
translation = "하지만 이것은 『여제 코우레이가 반란을 당해 하찮은 남자에게 범해진다』는 시츄에이션을 코우레이 스스로가 생각하고 연기하고 있는 것."

[[dialogue]]
speaker = "unk"
original = "牢も枷も煌嶺が金に飽かせて用意したもので、かなりの本気ぶりだ。"
translation = "감옥도 칼도 코우레이가 돈을 아끼지 않고 준비한 것으로, 꽤 진심인 모습이다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「八つ裂きにして……いいや、楽には殺さん。生きたまま魔獣の餌に──」"
translation = "「갈갈이 찢어발겨서…… 아니, 곱게 죽이진 않겠다. 산 채로 마수의 먹이로──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うるさい」"
translation = "「조용히 해」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くぁっ……！」"
translation = "「콰앗……!」"

[[dialogue]]
speaker = "unk"
original = "もう一度尻を叩き、パンッと鋭い音が牢に響いた。"
translation = "다시 한번 엉덩이를 때리자, 팡 하고 날카로운 소리가 감옥에 울려 퍼졌다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「女帝たる妾にこの狼藉……一族郎党根絶やしにしてやる……！」"
translation = "「여제인 첩에게 이런 불경을…… 일족의 씨를 말려주마……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「身の程をわきまえるのはそっちだ。もうお前は女帝じゃない。嬲られるだけの女なんだよ」"
translation = "「분수를 알아야 할 건 그쪽이다. 이제 넌 여제가 아니야. 농락당할 뿐인 여자라고」"

[[dialogue]]
speaker = "unk"
original = "暴君を犯す期待でいきり立ったペニスを、煌嶺の股間に押し当てる。"
translation = "폭군을 범한다는 기대감으로 꼿꼿이 선 페니스를 코우레이의 가랑이에 눌러댄다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くっ……！\u3000汚らわしいもので妾に触れるな……！」"
translation = "「큭……! 불결한 것으로 첩의 몸에 손대지 마라……!」"

[[dialogue]]
speaker = "unk"
original = "女帝の威厳の中に、少しだけ怯えの表情が見えた。"
translation = "여제의 위엄 속에 아주 조금 겁먹은 표정이 보였다."

[[dialogue]]
speaker = "unk"
original = "だけど一瞬、期待するように煌嶺の体がビクッと震えていた。"
translation = "하지만 찰나, 기대하듯 코우레이의 몸이 움찔하고 떨리고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「泣いて許しを請うなら今のうちだぞ？」"
translation = "「울면서 용서를 빌려면 지금뿐이다?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふん、よく言う。何を言おうと妾を犯す気だろうに」"
translation = "「흥, 말은 잘하는군. 무슨 말을 하든 첩을 범할 생각이면서」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「犯したければ犯せ！\u3000だがその万倍、億倍の責め苦で返してやろうぞ！」"
translation = "「범하고 싶으면 범해라! 하지만 그 만 배, 억 배의 고통으로 돌려주마!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうこなくちゃな。高慢ちきな女帝のプライドをへし折って、泣きっ面にさせるのが楽しみだ」"
translation = "「그래야지. 오만한 여제의 자존심을 꺾어놓고 우는 상판대기로 만드는 게 기대되는군」"

[[dialogue]]
speaker = "unk"
original = "こんな状況でも女帝の迫力を見せる煌嶺に内心感心しつつ、俺も芝居に乗っていく。"
translation = "이런 상황에서도 여제의 박력을 보여주는 코우레이에게 내심 감탄하며, 나도 연기에 올라탄다."

[[dialogue]]
speaker = "unk"
original = "そして亀頭を膣口にあてがい、そのまま一気に──"
translation = "그리고 귀두를 질구에 갖다 대고, 그대로 단숨에──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くぅぅぅっ……！」"
translation = "「쿠우우우웃……!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くは……あぁっ……妾の中に、入ってくるぅ……んんんっ……！」"
translation = "「쿠하…… 아윽…… 첩의 안에, 들어온다아…… 으으으읏……!」"

[[dialogue]]
speaker = "unk"
original = "女の大事な部分を力ずくでこじ開け、ペニスを深くまで侵入させる。"
translation = "여자의 소중한 곳을 힘으로 비집고 열어, 자지를 깊숙한 곳까지 침입시킨다."

[[dialogue]]
speaker = "unk"
original = "すると熱く柔らかな肉壁に包み込まれ、極上の快感をもたらしてくれる。"
translation = "그러자 뜨겁고 부드러운 육벽에 감싸여, 극상의 쾌감을 가져다준다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「っ……はぁ、はぁ……中、広げられて……くぁああっ……」"
translation = "「윽…… 하아, 하아…… 안이, 벌어져서…… 쿠아아앗……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さすが煌嶺。具合がいいな。よく締め付けてくる」"
translation = "「역시 코우레이군. 느낌이 좋아. 아주 꽉 조여오는걸」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「<ruby>囀<rt>さえず</rt></ruby>るな……貴様のものなど、このまま咬み千切ってやる……！」"
translation = "「지저귀지 마라…… 네놈의 것 따위, 이대로 물어뜯어 주마……!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の憎々しげな言葉も、今は心地良さが増すばかりだ。"
translation = "코우레이의 가시 돋친 말도, 지금은 기분 좋은 자극이 될 뿐이다."

[[dialogue]]
speaker = "unk"
original = "熱い体温と肉の感触をペニスで感じながら、腰を前後に動かす。"
translation = "뜨거운 체온과 살의 감촉을 자지로 느끼면서, 허리를 앞뒤로 움직인다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くぅぅっ……うっ……ああっ……！\u3000はぁ、はっ……あ……ふぅぅ……っ」"
translation = "「쿠우웃…… 윽…… 아앗……! 하아, 하앗…… 아…… 후우우…… 윽」"

[[dialogue]]
speaker = "unk"
original = "ペニスが煌嶺の中で動く度、苦悶の声が漏れる。"
translation = "자지가 코우레이의 안에서 움직일 때마다, 고통 섞인 목소리가 샌다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「殺す……殺す……！\u3000ふっ、はぁ……産毛の一本まで、業火で焼き尽くしてくれる……！」"
translation = "「죽여버리겠다…… 죽이겠어……! 훗, 하아…… 솜털 한 올까지, 업화로 태워 없애주마……!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふぅ、はぁ、はぁ……この、恨み、忘れん……！\u3000くっ……はあぁ……必ず、後悔させてやる……！」"
translation = "「후우, 하아, 하아…… 이, 원한, 잊지 않겠다……! 윽…… 하아아…… 반드시, 후회하게 만들어주마……!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺が憎悪の言葉を重ねるが、今の彼女は無力で、男に犯されることしかできない。"
translation = "코우레이가 증오의 말을 내뱉지만, 지금의 그녀는 무력하게 남자에게 범해지는 것밖에 할 수 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなこと言って中が濡れているぞ。女帝のくせにとんだ淫売だな」"
translation = "「그런 말을 하면서 안은 흠뻑 젖어 있잖아. 여제 주제에 대단한 화냥년이군」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ぐっ……そんなはず、なかろう……！\u3000ふっ、はっ……くぅぅっ……」"
translation = "「극…… 그럴 리가, 없지 않느냐……! 훗, 핫…… 쿠우우웃……」"

[[dialogue]]
speaker = "unk"
original = "屈辱に震える女帝を、力任せに突く。"
translation = "굴욕에 떠는 여제를 힘껏 찌른다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くああぁっ！」"
translation = "「쿠아아앗!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ううぅっ……ふぅ、あっ……はぁっ……ぐぅっ……！\u3000この、下郎めが……」"
translation = "「우우웃…… 후우, 앗…… 하앗…… 구웃……! 이, 천한 놈이……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「男を喜ばせるいい穴だ。せっかくだから肉便器としてキュリオスの真ん中に設置してやろうか？\u3000街中の男が穴という穴を犯してくれるだろうよ」"
translation = "「남자를 기쁘게 하는 좋은 구멍이다. 이왕 이렇게 된 거 육변기로서 큐리오스 한복판에 설치해 줄까? 거리의 남자들이 구멍이란 구멍은 다 범해줄 테니까」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「貴様ぁ……！！」"
translation = "「이놈이……!!」"

[[dialogue]]
speaker = "unk"
original = "煌嶺が怒りに震え、牢の中が燃えるように温度が一気に上がる。"
translation = "코우레이가 분노로 떨며, 감옥 안이 타오르듯 온도가 단숨에 올라간다."

[[dialogue]]
speaker = "unk"
original = "だが抵抗も無力で──"
translation = "하지만 저항도 무력하게──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひあぁあっ！？」"
translation = "「히아아앗!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「肉穴が喋るな。尻が裂けるまで叩いてやろうか」"
translation = "「육구멍이 떠들지 마라. 엉덩이가 찢어질 때까지 때려줄까?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くあっ……！」"
translation = "「쿠앗……!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ううぅっ……！」"
translation = "「우우웃……!」"

[[dialogue]]
speaker = "unk"
original = "尻を叩かれた瞬間、全身がビクッと強張り、そのせいで膣が締まって気持ちいい。"
translation = "엉덩이를 맞은 순간, 전신이 움찔하며 굳어지고, 그 바람에 질이 조여져 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "あの横暴な煌嶺をただの肉穴として使い、中を味わうようにゆっくりとペニスを動かす。"
translation = "그 횡포하던 코우레이를 고작 육구멍으로 다루며, 안을 음미하듯 천천히 자지를 움직인다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「くぅ……ふぅ、はぁ……ああぁっ……！\u3000妾の、中で……動いて……ぅぅっ……はあぁっ……」"
translation = "「쿠우…… 후우, 하아…… 아아아앗……! 첩의, 안에서…… 움직여서…… 으으윽…… 하아아앗……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「貴様の物など、汚らわしい……くっ、はあぁっ……気持ち、悪いぃ……んあぁっ……」"
translation = "「네놈의 것 따위, 불결하다…… 윽, 하아아앗…… 기분, 나빠아…… 응아앗……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んっ、ふっ、はぁ……妾を慰みものにした罪、必ず償わせてやる……くぅぅっ……！」"
translation = "「응, 훗, 하아…… 첩을 노리갯감으로 삼은 죄, 반드시 치르게 하겠다…… 쿠우우웃……!」"

[[dialogue]]
speaker = "unk"
original = "大きな乳をたぷたぷといやらしく揺らしながら、ペニスで貫かれる煌嶺。"
translation = "커다란 가슴을 출렁출렁 음란하게 흔들며, 자지로 꿰뚫리는 코우레이."

[[dialogue]]
speaker = "unk"
original = "ペニスを膣の肉ひだに擦りつけながら突き入れると──"
translation = "자지를 질의 살주름에 비벼대며 찔러 넣자──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぁあああっ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうした、メスの声が出てるぞ？」"
translation = "「어라, 암컷의 목소리가 나오는데?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ち、ちが──ああぁんっ<emoji=heart04>\u3000妾は、貴様などに屈さぬ……あ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふはぁっ<emoji=heart04>」"
translation = "「아, 아니야── 아아앙앗<emoji=heart04> 첩은, 네놈 따위에게 굴복하지…… 아<emoji=heart04> 응<emoji=heart04> 후하앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「はぁっ、んっ<emoji=heart04>\u3000貴様の、ものが、奥にぃ……んんっ<emoji=heart04>\u3000これは、違う……こんなもので……っ」"
translation = "「하앗, 응<emoji=heart04> 네놈의, 것이, 깊숙이이…… 응응<emoji=heart04> 이건, 아니야…… 이런 걸로…… 윽」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あっ……はっ……んっ<emoji=heart04>\u3000妾は……妾は……ああぁっ<emoji=heart04>\u3000はっ、あっ……ひぃああっ<emoji=heart04>」"
translation = "「앗…… 핫…… 응<emoji=heart04> 첩은…… 첩은…… 아아아앗<emoji=heart04> 핫, 앗…… 히이아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の声に甘い響きが混じり、蜜もすっかり溢れてぐちゅぐちゅと卑猥な音が鳴る。"
translation = "코우레이의 목소리에 달콤한 울림이 섞이고, 애액도 완전히 흘러넘쳐 구축구축 음란한 소리가 난다."

[[dialogue]]
speaker = "unk"
original = "ぎゅっ、ぎゅっと心地良い締め付けが強くなってきて──"
translation = "규규, 하고 기분 좋은 조임이 강해져 오고──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……そろそろ出すぞ」"
translation = "「윽…… 슬슬 싼다」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「なに──！？」"
translation = "「뭐라고──!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「～～～～～～～っ！！？」"
translation = "「~~~~~~~~~~~윽!!?」"

[[dialogue]]
speaker = "unk"
original = "こみ上げてくる射精欲に任せ、そのまま中にぶちまけた。"
translation = "치밀어 오르는 사정욕에 맡겨, 그대로 안에 쏟아부었다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「き、貴様っ……妾の中に……っ！？」"
translation = "「이, 이놈이…… 첩의 안에…… 윽!?」"

[[dialogue]]
speaker = "unk"
original = "妊娠への恐怖からか、女帝の顔が揺らいだ。"
translation = "임신에 대한 공포 때문인지, 여제의 얼굴이 흔들렸다."

[[dialogue]]
speaker = "unk"
original = "煌嶺の心を折るためにさらに責める。"
translation = "코우레이의 마음을 꺾기 위해 더욱 몰아붙인다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぐっ……！」"
translation = "「히긋……!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぁあっ……！」"
translation = "「히아앗……!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「貴様……許さん、許さんぞ……！\u3000ふっ、はぁ、はぁ……必ず、対価を、払わせてやる……！」"
translation = "「네놈…… 용서 못 한다, 용서 못 해……! 훗, 하아, 하아…… 반드시, 대가를, 치르게 해주마……!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「はぁはぁ……殺す、殺すぅ……んぁああっ<emoji=heart04>\u3000殺してやるっ……ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>」"
translation = "「하아하아…… 죽일 거야, 죽일 거야아…… 응아아앗<emoji=heart04> 죽여주마…… 히앗<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あれだけ憎悪に燃えていた声が、次第に弱々しくなり、快楽に塗り替えられていく。"
translation = "그토록 증오에 불타던 목소리가, 점차 나약해지며 쾌락으로 덧칠해져 간다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んぁああっ<emoji=heart04>\u3000硬いものが、奥に、届いて……ああっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000わら、わは、屈さぬ──あんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ひぁあっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 딱딱한 것이, 깊숙이, 닿아서…… 아앗<emoji=heart04> 핫<emoji=heart04> 앗<emoji=heart04> 처, 첩은, 굴복하지── 안앗<emoji=heart04> 응<emoji=heart04> 히아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あっ……んっ……んんんっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000わ、わた、私は……ひぅぅっ<emoji=heart04>」"
translation = "「앗…… 응…… 응응응<emoji=heart04> 하아<emoji=heart04> 나, 나, 나는…… 히우우윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の喘ぎと嗚咽が征服欲を満たし、また尻を叩きながら動きを加速させる。"
translation = "코우레이의 신음과 오열이 정복욕을 채우고, 다시 엉덩이를 때리며 움직임을 가속시킨다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「きひぃっ！？」"
translation = "「키히잇!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あっ──あっ──あっ──んんっ<emoji=heart04>\u3000いや、やめてっ……ひぁああっ<emoji=heart04>」"
translation = "「앗── 앗── 앗── 응응<emoji=heart04> 싫어, 그만둬어…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひっ、ひあっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000こんなので気持ち良くなりたくないっ<emoji=heart04>\u3000こんなのイヤぁああっ<emoji=heart04>」"
translation = "「히익, 히앗<emoji=heart04> 싫어<emoji=heart04> 싫어<emoji=heart04> 이런 걸로 기분 좋아지고 싶지 않아<emoji=heart04> 이런 거 싫어어어앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "女帝の仮面が剥がれ、年相応の女の子の悲鳴が上がる。"
translation = "여제의 가면이 벗겨지고, 제 나이 또래 소녀의 비명이 터져 나온다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んひぃ<emoji=heart04>\u3000おち○ぽでズンズン突かれてぇっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000んぎっ<emoji=heart04>\u3000いぃっ<emoji=heart04>\u3000おま○こ壊れちゃうぅっ<emoji=heart04>」"
translation = "「응히이<emoji=heart04> 자지로 쿡쿡 찔려어엇<emoji=heart04> 히익<emoji=heart04> 응갹<emoji=heart04> 이잇<emoji=heart04> 보지 망가져버려어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「やだっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000こんなのやだようっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000おち○ぽ、奥に、当たってるっ<emoji=heart04>」"
translation = "「싫어<emoji=heart04> 싫어<emoji=heart04> 이런 거 싫단 말이야앗<emoji=heart04> 앗<emoji=heart04> 히잇<emoji=heart04> 자지, 깊숙이, 닿고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んんっ──ん～～～っ<emoji=heart04>\u3000子宮ゴリゴリされて、ああぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000やだぁっ<emoji=heart04>」"
translation = "「응응── 응~~~앗<emoji=heart04> 자궁 고리고리 당해서, 아아아앗<emoji=heart04> 하앗<emoji=heart04> 싫어<emoji=heart04> 싫어어앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "荒々しく突かれ、絶望と快楽が混じった声で喘ぐ煌嶺。"
translation = "거칠게 찔리며, 절망과 쾌락이 섞인 목소리로 신음하는 코우레이."

[[dialogue]]
speaker = "unk"
original = "腕をもがかせて枷を外そうとするが、ガチガチと冷たい音が鳴るばかりで外れる気配はない。"
translation = "팔을 휘저으며 수갑을 벗으려 하지만, 채챙 하며 차가운 소리만 날 뿐 풀릴 기미는 없다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぃぃっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000やだぁっ<emoji=heart04>\u3000おま○こするのやなのぉっ<emoji=heart04>」"
translation = "「핫<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 히이이익<emoji=heart04> 싫어<emoji=heart04> 싫어어앗<emoji=heart04> 보지 하는 거 싫단 말이야아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぁっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000気持ちいいのやだっ<emoji=heart04>\u3000気持ち良く、しないでぇっ<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아앙<emoji=heart04> 기분 좋은 거 싫어<emoji=heart04> 기분 좋게, 하지 말아줘어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "泣きながらよがる悲痛な声が、たまらなく興奮をかき立てて──"
translation = "울면서 느끼는 비통한 목소리가, 참을 수 없이 흥분을 돋구어──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぃぃぃっ！？」"
translation = "「히이이이익!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「出てりゅっ<emoji=heart04>\u3000中に、熱いの出てりゅうっ<emoji=heart04><emoji=heart04>\u3000やだっ<emoji=heart04>\u3000やだっ<emoji=heart04>\u3000中に出すのイヤぁあっ<emoji=heart04>」"
translation = "「나오고 있쪄어<emoji=heart04> 안에, 뜨거운 거 나오고 있쪄어어엇<emoji=heart04><emoji=heart04> 싫어<emoji=heart04> 싫어<emoji=heart04> 안에 싸는 거 싫어어어앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "また中に射精すると、煌嶺は体をガクガクと震わせながら受け止めた。"
translation = "다시 안에 사정하자, 코우레이는 몸을 가쿠가쿠 떨며 받아들였다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んんぅっ<emoji=heart04>\u3000おち○ぽまだビクビクしてっ……まだ出すの……！？」"
translation = "「응응웃<emoji=heart04> 자지가 아직 움찔거려어…… 아직 더 싸는 거야……!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「やめて、もう出さないでっ！\u3000これ以上出されたら、赤ちゃんできちゃうっ！」"
translation = "「그만해, 이제 싸지 마! 이 이상 싸면, 아기 생겨버려!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう散々出されてるんだから一緒だろ。安心しろ、孕んだらちゃんと産ませてやる」"
translation = "「이미 잔뜩 쌌으니까 마찬가지잖아. 안심해, 들어서면 제대로 낳게 해줄 테니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でかい腹のままキュリオスを引き回して、民衆が見ている前で出産させてやるよ」"
translation = "「커다란 배를 한 채로 큐리오스를 끌고 다니며, 민중이 보는 앞에서 출산하게 해주마」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そんなのイヤぁああああっ！！」"
translation = "「그런 거 싫어어어어어엇!!」"

[[dialogue]]
speaker = "unk"
original = "悲鳴をもっと聞きたくて、また手を振り上げる。"
translation = "비명을 더 듣고 싶어서, 다시 손을 치켜든다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んひっ！？」"
translation = "「응힉!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぃぃっ！\u3000痛い、痛いよぉっ！\u3000もうやだっ、お尻叩くのやめてよっ、お尻壊れちゃうっ！」"
translation = "「히이이익! 아파, 아프단 말이야아! 이제 싫어, 엉덩이 때리는 거 그만해줘어, 엉덩이 망가져버려엇!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぎぃっ！？」"
translation = "「히기잇!?」"

[[dialogue]]
speaker = "unk"
original = "罰でも躾でもない、下卑た欲望を満たすためのただの暴力。"
translation = "벌도 훈육도 아닌, 비열한 욕망을 채우기 위한 단순한 폭력."

[[dialogue]]
speaker = "unk"
original = "散々スパンキングされ、見惚れるほど綺麗だった尻はすっかり赤く染まっていた。"
translation = "잔뜩 스팽킹을 당해, 넋을 잃을 정도로 예뻤던 엉덩이는 온통 붉게 물들어 있었다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「あ──あ──ああぁっ<emoji=heart04>\u3000おち○ぽ奥にぃっ<emoji=heart04>\u3000ズンズンって<emoji=heart04>\u3000あっ<emoji=heart04>\u3000これダメっ<emoji=heart04>\u3000ダメっっ<emoji=heart04>」"
translation = "「아── 아── 아아아앗<emoji=heart04> 자지 깊숙이이잇<emoji=heart04> 쿡쿡 하고오<emoji=heart04> 앗<emoji=heart04> 이거 안 돼<emoji=heart04> 안 돼애애액<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「やだやだ、イッちゃうっ<emoji=heart04>\u3000イキたくないっ<emoji=heart04>\u3000イキたくないのぉっ<emoji=heart04>\u3000ひぐっ<emoji=heart04>\u3000うぅっ<emoji=heart04>\u3000犯されてるのに、無理やりイかされちゃうぅっ<emoji=heart04>」"
translation = "「싫어 싫어, 가버려엇<emoji=heart04> 가고 싶지 않아<emoji=heart04> 가고 싶지 않단 말이야아앗<emoji=heart04> 히긋<emoji=heart04> 우웃<emoji=heart04> 범해지고 있는데, 억지로 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んひっ<emoji=heart04>\u3000ひぃぃぃっ<emoji=heart04>\u3000あ──あ──ああぁんっ<emoji=heart04>\u3000おま○こ壊れりゅっ<emoji=heart04>\u3000壊れひゃうぅっ<emoji=heart04>」"
translation = "「응힉<emoji=heart04> 히이이이익<emoji=heart04> 아── 아── 아아아앙앗<emoji=heart04> 보지 망가져어<emoji=heart04> 망가져버려어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このまま種付けしてやるよ。孕みながらイけ！！」"
translation = "「이대로 씨내리 해주마. 임신하면서 가버려!!」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぎぃぃっ<emoji=heart04>\u3000種付けイヤぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000やだ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000おち○ぽで、イかされちゃうぅっ<emoji=heart04>」"
translation = "「히기이이익<emoji=heart04> 씨내리 싫어어어앗<emoji=heart04> 앗<emoji=heart04> 응응응<emoji=heart04> 싫어<emoji=heart04> 안 대애<emoji=heart04> 자지로, 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「やだ、やめてっ<emoji=heart04>\u3000やめてぇっ<emoji=heart04>\u3000あひっ<emoji=heart04>\u3000ひぃぃっ<emoji=heart04>\u3000らめらめっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000おま○こイッちゃうっ<emoji=heart04>」"
translation = "「싫어, 그만둬어<emoji=heart04> 그만둬어어엇<emoji=heart04> 아힉<emoji=heart04> 히이이익<emoji=heart04> 안대 안대애<emoji=heart04> 갈 것 같아<emoji=heart04> 갈 것 같아<emoji=heart04> 보지 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「イヤイヤイヤぁっ<emoji=heart04>\u3000イキたくないのぉ<emoji=heart04>\u3000んひっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000赤ちゃんできちゃうっ<emoji=heart04>\u3000孕まされてイクぅっ<emoji=heart04>」"
translation = "「싫어 싫어 싫어어엇<emoji=heart04> 가고 싶지 않아아<emoji=heart04> 응힉<emoji=heart04> 히익<emoji=heart04> 아기 생겨버려엇<emoji=heart04> 임신당하면서 가버려어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んぁ──あ──あ──あ──あぁああ～～～っ<emoji=heart04>\u3000イきゅっ<emoji=heart04>\u3000はらましゃれるっ<emoji=heart04>\u3000イヤ<emoji=heart04>\u3000イヤ<emoji=heart04>\u3000イヤぁ～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아── 아── 아── 아── 아아아아~~~~앗<emoji=heart04> 가버렷<emoji=heart04> 임신당해버려어<emoji=heart04> 싫어<emoji=heart04> 싫어<emoji=heart04> 싫어어어~~~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして力任せに尻を叩くと同時、子宮口に密着させて射精する──"
translation = "그리고 힘껏 엉덩이를 때림과 동시에, 자궁구에 밀착시켜 사정한다──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んひぁあああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응히아아아아~~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んんんっ<emoji=heart04>\u3000あっ、熱いぃ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000おま○こイッてりゅうっ<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 앗, 뜨거워어<emoji=heart04> 아아아앗<emoji=heart04> 아아앗<emoji=heart04> 보지 가고 있쪄어어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「せーえき、びゅー、びゅーって……あっ<emoji=heart04>\u3000子宮、熱いぃっ<emoji=heart04>\u3000おち○ぽ、ドクドクして、種付けされてりゅっ<emoji=heart04>」"
translation = "「정애액, 뷰우, 뷰우 하고…… 앗<emoji=heart04> 자궁, 뜨거워어엇<emoji=heart04> 자지가, 울컥울컥해서, 씨내리 당하고 있쪄어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「んひぃっ！？」"
translation = "「응히익!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひぎぃっ！？」"
translation = "「히기잇!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ひどいよぅ……お尻叩かれながら、射精、されてる……<emoji=heart04>\u3000はぁっ……はっ……無理やり孕まされてる……っ<emoji=heart04>」"
translation = "「너무해…… 엉덩이 맞으면서, 사정, 당하고 있어……<emoji=heart04> 하아…… 핫…… 억지로 임신당하고 있어…… 윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "三度目の射精でも勢いは衰えず、欲望のまま、本能のまま、力ずくでメスに子種を植え付ける。"
translation = "세 번째 사정임에도 기세는 쇠하지 않고, 욕망대로, 본능대로, 힘으로 암컷에게 씨앗을 심는다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ふあぁっ……<emoji=heart04>\u3000せーえきで、子宮いっぱいになるぅ……<emoji=heart04>\u3000んはあぁ、受精、しちゃう……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000赤ちゃん、できちゃうぅ……<emoji=heart04>」"
translation = "「후아앗……<emoji=heart04> 정애액으로, 자궁 가득 차버려어……<emoji=heart04> 응하아아, 수정, 해버려어……<emoji=heart04> 응응……<emoji=heart04> 아기, 생겨버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「はーっ……はーっ……はーっ」"
translation = "「하아── 하아── 하아──」"

[[dialogue]]
speaker = "unk"
original = "首枷に戒められたまま、荒い息を吐く煌嶺。"
translation = "목칼에 구속된 채로, 거친 숨을 내뱉는 코우레이."

[[dialogue]]
speaker = "unk"
original = "尻を赤く染め上げ、膣口から白濁をこぼす姿は、無惨で、退廃的で、そして美しかった。"
translation = "엉덩이를 붉게 물들이고, 질구에서 백탁액을 흘리는 모습은 무참하고, 퇴폐적이며, 그리고 아름다웠다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「はぁ、はぁ……しゅごかったぁ……」"
translation = "「하아, 하아…… 굉장했어어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫だったか？\u3000いろんな意味で……」"
translation = "「괜찮았어? 여러 가지 의미로……」"

[[dialogue]]
speaker = "unk"
original = "肉体的な負担はもちろん、皇帝への侮辱とか、そっちの方も含めて。"
translation = "육체적인 부담은 물론, 황제에 대한 모욕이라든가, 그런 쪽도 포함해서."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「だいじょ～ぶ……別に気にしないから……私頑丈だし……」"
translation = "「괜차아아안아…… 딱히 신경 안 쓰니까…… 나 튼튼하고……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「はぁ……今までで一番気持ち良かったかも……。私、いじめる方だけじゃなくて、いじめられる方も才能あるのかな」"
translation = "「하아…… 지금까지 중에서 제일 기분 좋았을지도……. 나, 괴롭히는 쪽뿐만 아니라, 괴롭힘당하는 쪽도 재능이 있는 걸까」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「またこういうのやろうって言ったら、付き合ってくれる？」"
translation = "「또 이런 거 하자고 하면, 같이 해줄 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……うん、付き合うよ」"
translation = "「그건…… 응, 같이 할게」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の演技が上手いものだから、俺もとても興奮してしまった。"
translation = "코우레이의 연기가 훌륭해서, 나도 무척이나 흥분해 버렸다."

[[dialogue]]
speaker = "unk"
original = "煌嶺の言う『いじめる方の才能』があるのかもしれない。"
translation = "코우레이의 말대로 ‘괴롭히는 쪽의 재능’이 있을지도 모른다."

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「えへへ……そっか……楽しみだね」"
translation = "「에헤헤…… 그렇구나…… 기대되네」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「これからもあなたのこといっぱいいじめて、いっぱいいじめられたいなぁ……<emoji=heart04>」"
translation = "「앞으로도 너 많이 괴롭히고, 많이 괴롭힘당하고 싶다아……<emoji=heart04>」"

