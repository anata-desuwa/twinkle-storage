[[dialogue]]
speaker = "unk"
original = "第4話,メイド長の前任,B"
translation = "제4화, 전임 메이드장, B"

[[dialogue]]
speaker = "unk"
original = "メイド体験をした日から数日後、大聖堂カフェテリアにて。"
translation = "메이드 체험을 한 지 며칠 뒤 대성당 카페테리아에서."

[[dialogue]]
speaker = "キリカ"
original = "「はぁ……」"
translation = "「하아……」"

[[dialogue]]
speaker = "unk"
original = "テーブルの上にノートを広げて、憂鬱そうな顔をしているキリカ師匠を見かけて、俺は声をかけた。"
translation = "테이블 위에 노트를 펼쳐두고 우울한 표정을 짓고 있는 키리카 스승님을 발견하고 나는 말을 걸었다."

[[dialogue]]
speaker = "キリカ"
original = "「――ああ、緋宮会長。ごきげんよう」"
translation = "「──아아 히노미야 회장님 안녕하세요」"

[[dialogue]]
speaker = "キリカ"
original = "「このノートですか？\u3000あれからまた、次のメイド長候補を誰にするか考えて、メイド隊の子達の情報を書き出したものに目を通していたところです」"
translation = "「이 노트 말인가요? 그때 이후로 다시 다음 메이드장 후보를 누구로 할지 고민하다 메이드대 아이들의 정보를 적어둔 것을 훑어보던 중이었습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「しかし、結局は同じことを何度もループして考えている感じで……なかなか決まらずにいます」"
translation = "「하지만 결국 똑같은 고민을 몇 번이나 루프하는 느낌이라…… 좀처럼 결정을 내리지 못하고 있습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「正直、あの人に……マリオンさんに、メイド長に戻る気があれば、ここまで悩まずに済むのですが……」"
translation = "「솔직히 그분이…… 마리온 씨가 메이드장으로 돌아올 마음이 있다면 이렇게까지 고민하지 않아도 될 텐데……」"

[[dialogue]]
speaker = "unk"
original = "えっ、マリオンさんが……メイド長？"
translation = "에 마리온 씨가…… 메이드장?"

[[dialogue]]
speaker = "キリカ"
original = "「ええ、実は……あの人は私がなる前の、前任のメイド長だった人です」"
translation = "「네 실은…… 그분은 제가 되기 전의 전임 메이드장이었던 분입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「残念ながら、メイド長に戻る気はありませんよ」"
translation = "「유감스럽지만 메이드장으로 돌아갈 생각은 없답니다」"

[[dialogue]]
speaker = "キリカ"
original = "「マリオンさん……」"
translation = "「마리온 씨……」"

[[dialogue]]
speaker = "マリオン"
original = "「私は別に、この間のようにキリカさんが風邪を引いたりした際に、代理として他の子達に指示をするのは構いません」"
translation = "「전 별로 지난번처럼 키리카 씨가 감기에 걸리거나 했을 때 대리로서 다른 아이들에게 지시를 내리는 건 상관없어요」"

[[dialogue]]
speaker = "マリオン"
original = "「ですが、それはあくまで先輩メイドとしてです」"
translation = "「하지만 그건 어디까지나 선배 메이드로서입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「星見家のメイド長としては、私は相応しくありません。キリカさんも仰っていたでしょう？」"
translation = "「호시미 가문의 메이드장으로서는 전 어울리지 않아요. 키리카 씨도 말씀하셨잖아요?」"

[[dialogue]]
speaker = "マリオン"
original = "「私には『清らかさ』が足りていないと」"
translation = "「제게는 『맑음』이 부족하다고」"

[[dialogue]]
speaker = "キリカ"
original = "「それは、あなたがメイドとして、わざと真面目なところを見せていないだけで……！」"
translation = "「그건 당신이 메이드로서 일부러 진지한 모습을 보여주지 않고 있을 뿐이지……!」"

[[dialogue]]
speaker = "マリオン"
original = "「私はいつも真面目ですよ。メイドの仕事が好きですし、それと同じくらいに私は可愛い子達が好きなんです」"
translation = "「전 언제나 진지하다구요. 메이드 일을 좋아하고 그것만큼이나 전 귀여운 아이들을 좋아하거든요」"

[[dialogue]]
speaker = "マリオン"
original = "「その好きを曲げてしまったら、私はメイドでいられなくなってしまいます」"
translation = "「그 좋아하는 마음을 굽혀버린다면 전 메이드로 있을 수 없게 되어버려요」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふ♪\u3000そういうわけですから、頼まれてもメイド長に戻るつもりはありません」"
translation = "「우후후♪ 그런 것이니 부탁받아도 메이드장으로 돌아갈 생각은 없답니다」"

[[dialogue]]
speaker = "マリオン"
original = "「それじゃあ、キリカさん、会長様。私は好きなメイドとしての仕事に戻りますね<emoji=heart04>\u3000カフェテリアのお掃除中でしたので♪」"
translation = "「그럼 키리카 씨 회장님. 전 좋아하는 메이드 업무로 돌아갈게요<emoji=heart04> 카페테리아 청소 중이었으니까요♪」"

[[dialogue]]
speaker = "キリカ"
original = "「……勝手な人です。私に半ば強引に、メイド長の役目を押し付けておいて……」"
translation = "「……제멋대로인 사람입니다. 제게 반강제로 메이드장 역할을 떠넘겨 놓고……」"

[[dialogue]]
speaker = "unk"
original = "師匠は……いつからメイド長に？"
translation = "스승님은…… 언제부터 메이드장을?"

[[dialogue]]
speaker = "キリカ"
original = "「２年前……私が流星学園を卒業した次の日のことでした。メイドの仕事をしていた私のところに、いつものような軽い調子で話しかけてきて――」"
translation = "「2년 전…… 제가 유성학원을 졸업한 다음 날의 일이었습니다. 메이드 일을 하던 제게 평소처럼 가벼운 어조로 말을 걸어오더니──」"

[[dialogue]]
speaker = "キリカ"
original = "「学園も卒業したことだし、そろそろメイド長の座を譲る、私がメイド長にならなくても、メイド長の座は下りると突然言い出したのです」"
translation = "「학원도 졸업했으니 슬슬 메이드장 자리를 넘겨주겠다, 제가 메이드장이 되지 않더라도 메이드장 자리에서 물러나겠다고 갑자기 말을 꺼낸 겁니다」"

[[dialogue]]
speaker = "キリカ"
original = "「正直、なんであんなことを言い出したのか、今でもよくわかりません。あの人は昔からあんな調子ですが、メイドとしてはこの上なく優秀です」"
translation = "「솔직히 왜 그런 소릴 했는지 지금도 잘 모르겠습니다. 그분은 옛날부터 저런 식이지만 메이드로서는 더할 나위 없이 우수합니다」"

[[dialogue]]
speaker = "キリカ"
original = "「ナンパ癖の欠点はありますが、星見家のメイドとして、してはいけない相手には絶対にしません」"
translation = "「작업 거는 버릇이라는 단점은 있지만 호시미 가문의 메이드로서 해서는 안 될 상대에게는 절대 하지 않습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「メイドスキルはどれもトップクラス。中でも裁縫の腕はプロ級を越えて……言い表せない超常の域です」"
translation = "「메이드 스킬은 전부 톱 클래스. 그중에서도 재봉 실력은 프로급을 넘어…… 말로 표현할 수 없는 초상적인 영역입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「メイド長に必要な指導力、カリスマ性も、私では追いつけない隔たりを感じます」"
translation = "「메이드장에게 필요한 지도력, 카리스마도 저로서는 따라잡을 수 없는 격차를 느낍니다」"

[[dialogue]]
speaker = "キリカ"
original = "「本当は今も、メイド長として立つべき人なんです。私はまだ、あの人から学ばなければならないことが、沢山あるというのに……」"
translation = "「사실은 지금도 메이드장으로서 서 있어야 할 분입니다. 전 아직 그분에게 배워야 할 것이 잔뜩 있는데도……」"

[[dialogue]]
speaker = "unk"
original = "なら、その気持ちを伝えるべきじゃないですか？"
translation = "그럼 그 마음을 전해야 하는 거 아닌가요?"

[[dialogue]]
speaker = "キリカ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "キリカ"
original = "「――マリオンさんがメイド長に相応しいとモヤモヤしているから、次のメイド長の候補が決まらない……？」"
translation = "「──마리온 씨가 메이드장에 적임이라고 생각하며 끙끙 앓고 있으니까 다음 메이드장 후보가 정해지지 않는다……?」"

[[dialogue]]
speaker = "キリカ"
original = "「……確かに、仰る通りですね」"
translation = "「……확실히 하신 말씀이 맞군요」"

[[dialogue]]
speaker = "キリカ"
original = "「私は正直、今もマリオンさんがメイド長に相応しいと思っています」"
translation = "「전 솔직히 지금도 마리온 씨가 메이드장에 어울린다고 생각합니다」"

[[dialogue]]
speaker = "キリカ"
original = "「ならば、私がすべきことは――」"
translation = "「그렇다면 제가 해야 할 일은──」"

[[dialogue]]
speaker = "キリカ"
original = "「戦うことです」"
translation = "「싸우는 것입니다」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふっ♪」"
translation = "「자자, 우후훗♪」"

[[dialogue]]
speaker = "unk"
original = "なぜバトル展開に！？"
translation = "왜 배틀 전개로!?"

[[dialogue]]
speaker = "キリカ"
original = "「拳で語る方が早いので」"
translation = "「주먹으로 대화하는 게 빠르니까요」"

[[dialogue]]
speaker = "unk"
original = "師匠って結構、脳筋なところあるよな……。"
translation = "스승님은 꽤 근육뇌 같은 면이 있단 말이지……."

