[[dialogue]]
speaker = "unk"
original = "今日は休日──アナはシュティレを誘って遊びに出かけている。"
translation = "오늘은 휴일── 아나는 슈틸레를 데리고 놀러 나가 있다."

[[dialogue]]
speaker = "unk"
original = "そのため俺は、アニマ先輩のところへ顔を出していた。"
translation = "그 때문에 나는 아니마 선배의 처소에 얼굴을 비추고 있었다."

[[dialogue]]
speaker = "アニマ"
original = "「なるほど、シュティレはアナとお出かけ？\u3000珍しいこともあるものだナ。どうりで静かだと思ったヨ」"
translation = "「과연, 슈틸레는 아나와 외출? 드문 일도 다 있다타. 어쩐지 조용하다 싶었다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ。それならそれで、今日はじっくりと研究に集中できるナ♪」"
translation = "「후히. 그렇다면 그거대로 오늘은 느긋하게 연구에 집중할 수 있다타♪」"

[[dialogue]]
speaker = "unk"
original = "シュティレのことなんですが……"
translation = "슈틸레 말입니다만……"

[[dialogue]]
speaker = "アニマ"
original = "「あぁ、やっぱりカ。わざわざ休日にアニマのところに来るから、きっとそのことだろうと思ってはいたヨ」"
translation = "「아아, 역시나타. 일부러 휴일에 아니마를 찾아왔으니 분명 그 일일 거라고 생각은 했다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「前に伝えた通りダ。アニマの弟子になるには、シュティレはロマンが足りなイ。こればっかりは会長の頼みでもマケられないナ」"
translation = "「전에 말한 대로다타. 아니마의 제자가 되기엔 슈틸레는 로망이 부족하다타. 이것만큼은 회장의 부탁이라도 물러설 수 없다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「それよりキミ、シュティレのことばかりじゃなく、アナの世話をしてやらなくていいのかイ？」"
translation = "「그보다 너, 슈틸레만 신경 쓰지 말고 아나를 좀 돌봐줘야 하는 거 아니냐타?」"

[[dialogue]]
speaker = "アニマ"
original = "「ノヴァフォームを発現できず、焦っているように見えル。あくまでアニマの主観だがナ」"
translation = "「노바 폼을 발현하지 못해 초조해하는 것처럼 보인다다. 어디까지나 아니마의 주관이지만이다타.」"

[[dialogue]]
speaker = "アニマ"
original = "「普段の会長なら、アナにべったりとくっついて相談に乗っていそうなものだガ？」"
translation = "「평소의 회장이라면 아나에게 딱 붙어서 상담에 응해주고 있었을 텐데다타?」"

[[dialogue]]
speaker = "unk"
original = "だけど今は俺の出番じゃない気がします"
translation = "하지만 지금은 제 차례가 아닌 것 같아서요."

[[dialogue]]
speaker = "unk"
original = "気にかけてはいますよ"
translation = "신경은 쓰고 있어요."

[[dialogue]]
speaker = "アニマ"
original = "「フヒッ♪\u3000極限と言えるほどのギリギリの戦闘訓練を繰り返し、それでも覚醒に至らなかっタ……故に別のアプローチが必要、ト？」"
translation = "「후히♪ 극한이라고 할 정도의 아슬아슬한 전투 훈련을 반복하고도 각성에 이르지 못했다다…… 고로 다른 접근 방식이 필요하다, 타?」"

[[dialogue]]
speaker = "アニマ"
original = "「ふ～む。確かにマトイが覚醒した時も、精神的なブレイクスルーが要因だったと聞いているヨ」"
translation = "「흐~음. 확실히 마토이가 각성했을 때도 정신적인 브레이크스루가 요인이었다고 들었다다.」"

[[dialogue]]
speaker = "アニマ"
original = "「おそらくアナに必要なのは、未知の体験による刺激！\u3000そう考えると、シュティレとの繋がりは糸口になるかもしれないナ」"
translation = "「아마 아나에게 필요한 건 미지의 체험을 통한 자극! 그렇게 생각하면 슈틸레와의 유대감은 실마리가 될지도 모르겠다타.」"

[[dialogue]]
speaker = "アニマ"
original = "「星徒会の副会長という立場上、先輩とつるむことが多かっただろうし……後輩の世話を焼く、頼られるというのは、アナにとっても貴重な経験ということカ」"
translation = "「성도회 부회장이라는 입장상 선배들과 어울리는 일이 많았을 테고…… 후배를 돌봐주고 의지 받는다는 건 아나에게도 귀중한 경험이라는 거다타.」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒ♪\u3000なんだかんだでアナのこと、よ～く考えてるみたいだナ♪」"
translation = "「후히히♪ 이래저래 아나에 대해 아주 잘 생각하고 있는 모양이다타♪」"

[[dialogue]]
speaker = "アニマ"
original = "「アナが覚醒した暁には、どんな感情がトリガーになっていたのか……ぜひ教えてくれたまエ。とても興味があるヨ！」"
translation = "「아나가 각성한 새벽에는 어떤 감정이 트리거가 되었는지…… 꼭 가르쳐달라다. 아주 흥미가 있다타!」"

[[dialogue]]
speaker = "unk"
original = "自身のノヴァフォームに興味はないんですか"
translation = "본인의 노바 폼에는 흥미가 없으신 건가요."

[[dialogue]]
speaker = "unk"
original = "そういうアニマ先輩はどうなんです？"
translation = "정작 아니마 선배는 어떠신데요?"

[[dialogue]]
speaker = "アニマ"
original = "「フヒヒヒッ、もちろんあるとモ！」"
translation = "「후히히히, 당연히 있다다!」"

[[dialogue]]
speaker = "アニマ"
original = "「だが会長の目からは、アニマの裡側に覚醒の輝きは見えないのダロウ？」"
translation = "「하지만 회장의 눈에는 아니마의 내면에서 각성의 광채는 보이지 않는 거겠다타?」"

[[dialogue]]
speaker = "アニマ"
original = "「精神的なブレイクスルー……というのは苦手だヨ。心の分析は、アニマの最も苦手とするところダ」"
translation = "「정신적인 브레이크스루……라는 건 서툴다다. 마음의 분석은 아니마가 가장 못 하는 분야다타.」"

[[dialogue]]
speaker = "アニマ"
original = "「好きなものはいっぱいあるし、好奇心も人一倍。もちろん、会長のことも大好きダ♪\u3000では何故、アニマの力は目覚めないんだろうネ？」"
translation = "「좋아하는 건 잔뜩 있고 호기심도 남부럽지 않다다. 물론 회장도 정말 좋아한다다♪ 그런데 왜 아니마의 힘은 깨어나지 않는 걸까다타?」"

[[dialogue]]
speaker = "アニマ"
original = "「──さてと。あてにならない謎の力など置いておいて、弱体化薬の実験の続きでも……」"
translation = "「──자 그럼. 미덥지 못한 수수께끼의 힘 따위 제쳐두고 약화약 실험의 계속이나……」"

[[dialogue]]
speaker = "アニマ"
original = "「ム！\u3000モンスターが現れたようだナ……！」"
translation = "「음! 몬스터가 나타난 모양이다타……!」"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "『会長、大変……市街地に機械型モンスターが出たよ！\u3000数は……とにかくいっぱい！』"
translation = "『회장, 큰일이야…… 시가지에 기계형 몬스터가 나왔어! 수는…… 어쨌든 엄청 많아!』"

[[dialogue]]
speaker = "unk"
original = "わかった、応戦してくれ！"
translation = "알았어, 응전해 줘!"

[[dialogue]]
speaker = "マトイ（覚醒）"
original = "『了解！\u3000応援が来るまで私が食い止めるから！』"
translation = "『라져! 응원이 올 때까지 내가 막아볼 테니까!』"

[[dialogue]]
speaker = "アニマ"
original = "「よし、出撃可能なメンバーを急行させるカ──ムムっ！？」"
translation = "「좋아, 출격 가능한 멤버를 급파시키겠다타── 음음!?」"

[[dialogue]]
speaker = "アニマ"
original = "「連続でアラートだト…！？」"
translation = "「연속으로 경보다타…!?」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "『会長くん、大変よ！\u3000学園の通学路付近、機械型モンスターが現れたわ！』"
translation = "『회장군, 큰일이야! 학원 통학로 근처에 기계형 몬스터가 나타났어!』"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "『えっ……マトイちゃんは別の場所で戦ってる！？\u3000同時に出現だなんて……わかったわ。こっちはお姉ちゃんに任せて！』"
translation = "『엣…… 마토이짱은 다른 장소에서 싸우고 있다고!? 동시에 출현이라니…… 알았어. 여긴 언니에게 맡겨줘!』"

[[dialogue]]
speaker = "アニマ"
original = "「大変ダ、会長。他からも連絡が入ったが……学園周辺や市街地で、機械型モンスターが同時発生しているらしイ……！」"
translation = "「큰일이다타, 회장. 다른 곳에서도 연락이 왔다만…… 학원 주변이나 시가지에서 기계형 몬스터가 동시다발적으로 발생하고 있는 모양이다타……!」"

[[dialogue]]
speaker = "アニマ"
original = "「複数個所を同時に襲撃……妙だナ。リクリエのモンスターに思考能力はないはずダ。偶然なのカ……！？」"
translation = "「복수 개소를 동시에 습격…… 묘하다타. 리크리에의 몬스터에게 사고 능력은 없을 터다다. 우연인 건가다타……!?」"

[[dialogue]]
speaker = "アナ"
original = "『緊急事態です会長！\u3000以前に観に行った立像が……ギガンドムがモンスター化しました！』"
translation = "『비상사태입니다 회장님! 이전에 보러 갔던 입상이…… 기간돔이 몬스터화했습니다!』"

[[dialogue]]
speaker = "unk"
original = "な──なんだって！？"
translation = "뭐── 뭐라고!?"

[[dialogue]]
speaker = "アナ"
original = "『今までの機械型モンスターの比ではない耐久力です……至急、応援を！』"
translation = "『지금까지의 기계형 몬스터와는 비교도 안 되는 내구력입니다…… 지체 없이 응원을!』"

[[dialogue]]
speaker = "unk"
original = "すぐに行く！"
translation = "금방 갈게!"

[[dialogue]]
speaker = "アニマ"
original = "「おや、アニマのＤＩＳＣにもシュティレから通信ダ」"
translation = "「오야, 아니마의 DISC에도 슈틸레에게서 통신이다타.」"

[[dialogue]]
speaker = "シュティレ"
original = "『マスター、緊急事態です。実は……』"
translation = "『마스터, 비상사태입니다. 실은……』"

[[dialogue]]
speaker = "アニマ"
original = "「今、会長と一緒ダ、事態は把握していル！\u3000持ちこたえろ、シュティレ！」"
translation = "「지금 회장과 함께다타, 사태는 파악하고 있다다! 버텨라다, 슈틸레!」"

[[dialogue]]
speaker = "アニマ"
original = "「人命と自身の安全を最優先ダ！\u3000決して無茶はするんじゃないゾ！」"
translation = "「인명과 자신의 안전을 최우선이다타! 결코 무리하지는 마라다!」"

[[dialogue]]
speaker = "シュティレ"
original = "『嬉しいです。やはり弟子が可愛いのですね。ぶい』"
translation = "『기쁩니다. 역시 제자가 귀여우신 거군요. 브이.』"

[[dialogue]]
speaker = "アニマ"
original = "「冗談が言えるなら、まだ余裕はあるナ……！」"
translation = "「농담이 나올 정도면 아직 여유는 있겠다타……!」"

[[dialogue]]
speaker = "アニマ"
original = "「いいカ、この通信は繋いだままにしておくんダ！\u3000アナの指示を良く聞くんだゾ！」"
translation = "「잘 들어라다, 이 통신은 연결한 채로 두는 거다다! 아나의 지시를 잘 들어라다!」"

[[dialogue]]
speaker = "シュティレ"
original = "『イエス、マイマスター……くっ！\u3000手強い……！』"
translation = "『이예스, 마이 마스터…… 큭! 만만치 않아……!』"

[[dialogue]]
speaker = "アニマ"
original = "「会長、出撃ダ！\u3000弱体化薬もたんまり持って行くゾ……！」"
translation = "「회장, 출격이다타! 약화약도 잔뜩 챙겨가겠다다……!」"

[[dialogue]]
speaker = "アニマ"
original = "「ノヴァフォームの星騎士の応援が頼めないとあっては、何とか時間を稼ぐしかなイ……！」"
translation = "「노바 폼 성기사의 응원을 바랄 수 없는 상황이라면 어떻게든 시간을 버는 수밖에 없다다……!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスも、トワ先生も、それぞれが外出先で出現した機械型モンスターの相手に追われているとの連絡があった。"
translation = "비너스도, 토와 선생님도 각자 외출지에서 나타난 기계형 몬스터를 상대하느라 여념이 없다는 연락이 왔다."

[[dialogue]]
speaker = "unk"
original = "アナ、シュティレ──持ちこたえてくれ……！"
translation = "아나, 슈틸레── 버텨다오……!"

