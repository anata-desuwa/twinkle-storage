[[dialogue]]
speaker = "unk"
original = "第７話,英雄の末路,B"
translation = "제7화, 영웅의 말로, B"

[[dialogue]]
speaker = "unk"
original = "初代『魔王』ラクシスはリクリエを退け、世界を破滅の危機から救った。"
translation = "초대 『마왕』 라크시스는 리크리에를 물리치고, 세계를 파멸의 위기에서 구했다."

[[dialogue]]
speaker = "unk"
original = "彼の英雄譚はそこで幕を閉じる──"
translation = "그의 영웅담은 거기서 막을 내린다──"

[[dialogue]]
speaker = "unk"
original = "が、その人生はまだ、否応なく続いていくことになる。"
translation = "하지만, 그 인생은 아직, 싫든 좋든 계속 이어지게 된다."

[[dialogue]]
speaker = "unk"
original = "痛苦と病魔に苛まれた──艱難辛苦の道のりを。"
translation = "통증과 병마에 시달린── 간난신고의 길을."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「う……ぐっ……はっ……！\u3000これが……ッ、力の──代償か……！」"
translation = "「우…… 큭…… 핫……! 이것이……윽, 힘의── 대가인가……!」"

[[dialogue]]
speaker = "unk"
original = "リクリエとの戦いを経て、ラクシスの体は完全に<ruby>蝕<rt>むしば</rt></ruby>まれていた。"
translation = "리크리에와의 싸움을 겪으며, 라크시스의 몸은 완전히 좀먹혀 있었다."

[[dialogue]]
speaker = "unk"
original = "魔獣たちによる強毒性の血を幾度となく浴び、<ruby>甚大<rt>じんだい</rt></ruby>な瘴気に汚染された彼の肉体は深刻な容態に陥る。"
translation = "마수들의 강독성 피를 몇 번이고 뒤집어쓰고, 막대한 장기에 오염된 그의 육체는 심각한 상태에 빠진다."

[[dialogue]]
speaker = "unk"
original = "また、数えきれない亡霊たちが彼の精神にも巣食っていた。"
translation = "또한, 셀 수 없는 망령들이 그의 정신에도 깃들어 있었다."

[[dialogue]]
speaker = "unk"
original = "おびただしい後遺症の数々。英雄の心身は、無事などではなかったのだ。"
translation = "수많은 후유증들. 영웅의 심신은, 무사하지 못했던 것이다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「このまま朽ちるも定め……かも、しれないが──」"
translation = "「이대로 썩어가는 것도 운명……일지도, 모르지만──」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「リクリエは世界のリセット機構……なら、いずれもう一度大きな揺り戻しが来る……！」"
translation = "「리크리에는 세계의 리셋 기구……라면, 언젠가 다시 한번 큰 되돌림이 올 것이다……!」"

[[dialogue]]
speaker = "unk"
original = "彼には地を這ってでも生きねばならない理由があった。"
translation = "그에게는 땅을 기어서라도 살아야 할 이유가 있었다."

[[dialogue]]
speaker = "unk"
original = "そう。いずれ来たる２度目のリクリエがため、英雄としての使命を果たさんとしていたのだ。"
translation = "그렇다. 언젠가 다가올 두 번째 리크리에를 위해, 영웅으로서의 사명을 다하고자 했던 것이다."

[[dialogue]]
speaker = "unk"
original = "しかし……彼は自分の命が長くないことをわかっていた。"
translation = "하지만…… 그는 자신의 목숨이 길지 않다는 것을 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "魔王としての覚醒は確かに彼の生命的寿命を格段に引き上げた──"
translation = "마왕으로서의 각성은 확실히 그의 생명적 수명을 훨씬 늘려주었지만──"

[[dialogue]]
speaker = "unk"
original = "それでも、この病に蝕まれた状態では、次のリクリエまで生き永らえることは不可能だと。"
translation = "그럼에도, 이 병에 침식된 상태로는, 다음 리크리에까지 살아남는 것은 불가능하다고."

[[dialogue]]
speaker = "unk"
original = "どんな治療や霊術を施しても、彼の病状はとても癒やせるものではなかった。"
translation = "어떤 치료나 영술을 시행해도, 그의 병세는 도저히 나을 수 있는 것이 아니었다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「魔王の、因子……せめてこれだけでも──後世に伝えないと……！」"
translation = "「마왕의, 인자…… 하다못해 이것만이라도── 후세에 전해야 한다……!」"

[[dialogue]]
speaker = "unk"
original = "彼に適合した『魔王』は元よりオルタナティブ宇宙からもたらされたもの。"
translation = "그에게 적합했던 『마왕』은 원래 올터너티브 우주로부터 온 것이었다."

[[dialogue]]
speaker = "unk"
original = "もしラクシスが没してしまえば、世界は再びリクリエに抗う術を失うことになる。"
translation = "만약 라크시스가 죽어버린다면, 세계는 다시 리크리에에 저항할 방법을 잃게 될 것이다."

[[dialogue]]
speaker = "unk"
original = "彼にはあまりにも時間がなかった。そんな折だ。"
translation = "그에게는 너무나도 시간이 없었다. 그러던 때였다."

[[dialogue]]
speaker = "unk"
original = "ラクシスと共に最前線を生き抜いた戦友、フェリシアは彼の<ruby>懊悩<rt>おうのう</rt></ruby>を見抜いてこう提案した。"
translation = "라크시스와 함께 최전선을 헤쳐나간 전우, 펠리시아는 그의 고뇌를 간파하고 이렇게 제안했다."

[[dialogue]]
speaker = "unk"
original = "私との間に子を為してはどうか──と。"
translation = "자신과의 사이에 아이를 갖는 것이 어떻겠냐고──."

[[dialogue]]
speaker = "unk"
original = "血脈を通じて魔王の因子が受け継がれるかどうか──それも数千年の時を経て──は不明だったが、ラクシスはその方策に乗った。"
translation = "혈맥을 통해 마왕의 인자가 계승될지 어떨지── 그것도 수천 년의 시간을 거쳐서──는 불분명했지만, 라크시스는 그 방책을 따랐다."

[[dialogue]]
speaker = "unk"
original = "果たして彼らの祈りは通じ、フェリシアは無事に子を宿した。"
translation = "과연 그들의 기도는 통했고, 펠리시아는 무사히 아이를 품었다."

[[dialogue]]
speaker = "unk"
original = "だが……ラクシスはついに、我が子の顔を拝むことはなかった。"
translation = "하지만…… 라크시스는 끝내, 자신의 아이의 얼굴을 보지 못했다."

[[dialogue]]
speaker = "unk"
original = "魔王が人間界にいた頃の記録はそこで途絶えている。"
translation = "마왕이 인간계에 있었을 때의 기록은 거기서 끊겨 있다."

[[dialogue]]
speaker = "unk"
original = "彼はそれからもどうにか自らの命を繋ぐ方法がないかと探し求めていた。"
translation = "그는 그 후로도 어떻게든 자신의 목숨을 잇는 방법이 없을까 찾아 헤매고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、彼に最後の手を差し伸べたのは、当時、クルセイダースの中に紛れ込んでいた一人の魔女だった。"
translation = "그리고, 그에게 마지막 도움의 손길을 내민 것은, 당시, 크루세이더스 속에 섞여 있던 한 명의 마녀였다."

[[dialogue]]
speaker = "unk"
original = "『私たちの故郷に光の魔女さまがいる。その救済の魔法なら、あなたの病も治せるかもしれない』"
translation = "『우리들의 고향에 빛의 마녀님이 계셔요. 그 구제의 마법이라면, 당신의 병도 고칠 수 있을지도 몰라요』"

[[dialogue]]
speaker = "unk"
original = "『だけど、このことは決して口外してはいけない。魔女と三界はまだ交わる準備ができていないから』"
translation = "『하지만, 이 일은 결코 발설해서는 안 돼요. 마녀와 삼계는 아직 교류할 준비가 되어 있지 않으니까요』"

[[dialogue]]
speaker = "unk"
original = "どんな霊術も受けつけなかったラクシスの病。"
translation = "어떤 영술도 받아들이지 않았던 라크시스의 병."

[[dialogue]]
speaker = "unk"
original = "<ruby>一縷<rt>いちる</rt></ruby>の望みがあるのならと、彼はその条件に応じる。"
translation = "<ruby>한 가닥<rt>이치루</rt></ruby>의 희망이라도 있다면, 그는 그 조건에 응한다."

[[dialogue]]
speaker = "unk"
original = "ラクシスは魔女の森へ導かれた。"
translation = "라크시스는 마녀의 숲으로 인도되었다."

[[dialogue]]
speaker = "unk"
original = "人間界の記録にも、魔女たちの文献にも残されていない。秘密の招待だった。"
translation = "인간계의 기록에도, 마녀들의 문헌에도 남아있지 않은. 비밀스러운 초대였다."

[[dialogue]]
speaker = "？？？"
original = "「人間がこの森を訪れるなど……果たして、いつぶりのことでしょうか」"
translation = "「인간이 이 숲을 방문하다니…… 과연, 얼마 만의 일일까요.」"

[[dialogue]]
speaker = "？？？"
original = "「お会いできて光栄です──救世の英雄、ラクシス様」"
translation = "「만나 뵙게 되어 영광입니다── 구세의 영웅, 라크시스 님.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「あなたが……光の、魔女か」"
translation = "「당신이…… 빛의, 마녀인가.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい。真祖ディアナの血を継ぎし……第７代“光の魔女”トリュファイナと申します」"
translation = "「네. 진조 디아나의 피를 이은…… 제7대 “빛의 마녀” 트뤼파이나라고 합니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「っ……これは……！？」"
translation = "「윽…… 이것은……!?」"

[[dialogue]]
speaker = "unk"
original = "ラクシスは驚愕した。"
translation = "라크시스는 경악했다."

[[dialogue]]
speaker = "unk"
original = "トリュファイナの発する光の魔力に触れただけで、長らく苦しめられてきた臓腑の痛みが消え去ったからだ。"
translation = "트뤼파이나가 발산하는 빛의 마력에 닿은 것만으로, 오랫동안 괴롭혀 왔던 장기의 통증이 사라졌기 때문이다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「一時的な対処です。そのままでは、語らうことさえ苦しいでしょう」"
translation = "「일시적인 대처입니다. 이대로는, 대화하는 것조차 괴로우실 테니까요.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「……ありがとう」"
translation = "「……고맙다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "（この波動……覚えがある。一度、クルセイダースが全滅しかけた時、奇跡的に助かったことがあった……）"
translation = "（이 파동…… 기억이 난다. 한 번, 크루세이더스가 전멸할 뻔했을 때, 기적적으로 살아난 적이 있었지……）"

[[dialogue]]
speaker = "unk"
original = "魔女は三界との交流を断ったと伝えられていたが──どうもそうではないらしいとラクシスは察する。"
translation = "마녀는 삼계와의 교류를 끊었다고 전해졌지만── 아무래도 그렇지 않은 것 같다고 라크시스는 짐작한다."

[[dialogue]]
speaker = "unk"
original = "だが、それは言うまいと心に秘めた。"
translation = "하지만, 그것은 말하지 않겠다고 마음속에 간직했다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「あなたの『再生』の魔法……どうか、俺に使ってもらえないか」"
translation = "「당신의 『재생』 마법…… 부디, 나에게 써주지 않겠나.」"

[[dialogue]]
speaker = "unk"
original = "ラクシスは自らの抱える闇と悩みとすべて語った。"
translation = "라크시스는 자신이 안고 있는 어둠과 고민을 모두 털어놓았다."

[[dialogue]]
speaker = "unk"
original = "自身にはオルタナティブ宇宙由来の魔王の因子が眠っていること。"
translation = "자신에게는 올터너티브 우주 유래의 마왕의 인자가 잠들어 있다는 것."

[[dialogue]]
speaker = "unk"
original = "リクリエはさらに大きな波が来るかもしれないこと。そして、汚染されきった自分の体はこのままじゃ持たないこと……。"
translation = "리크리에는 더욱 큰 파도가 올지도 모른다는 것. 그리고, 오염되어 버린 자신의 몸은 이대로는 버티지 못한다는 것……."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「なるほど……事態は把握しました」"
translation = "「과연…… 사태는 파악했습니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ですが……あなたの汚染はあまりにも根深い。私の魔法をもってしても、総ての汚染を取り除くことは不可能です」"
translation = "「하지만…… 당신의 오염은 너무나도 뿌리가 깊습니다. 저의 마법으로도, 모든 오염을 제거하는 것은 불가능합니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「魔王という異界の<ruby>理<rt>ことわり</rt></ruby>に私の『再生』がどこまで通じるかは未知数。それに……たとえ効くことがあっても、得られる寿命は本来の人間のものに留まるでしょう」"
translation = "「마왕이라는 이계의 이치에 저의 『재생』이 얼마나 통할지는 미지수. 게다가…… 설령 효과가 있더라도, 얻을 수 있는 수명은 본래 인간의 것에 머무를 것입니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「そんなに都合のいい方法はない……か」"
translation = "「그렇게나 좋은 방법은 없다는 건가……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「察するに……魔王というのはひとつの巨大な『器』なのでしょう」"
translation = "「짐작하건대…… 마왕이라는 것은 하나의 거대한 『그릇』이겠지요.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「器……」"
translation = "「그릇……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい。人間を、魔族を、天使を──あらゆる種族を率いる統率者として、あなたは大器となった」"
translation = "「네. 인간을, 마족을, 천사를── 모든 종족을 이끄는 통솔자로서, 당신은 대기가 되었습니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「それは……たとえ忌むべき種であっても。どんな清濁をも<ruby>併<rt>あわ</rt></ruby>せ飲んでしまう、危うさも秘めた在り方です」"
translation = "「그것은…… 설령 꺼림칙한 종이라 할지라도. 어떤 맑고 탁한 것도 함께 받아들이는, 위험성도 품은 존재 방식입니다.」"

[[dialogue]]
speaker = "unk"
original = "魔王という器は強大すぎるがゆえに、ラクシスの体には規格外の瘴気が渦巻いている──"
translation = "마왕이라는 그릇은 너무나도 강대하기에, 라크시스의 몸에는 규격 외의 장기가 소용돌이치고 있다──"

[[dialogue]]
speaker = "unk"
original = "一度適合してしまった魔王の因子は、水晶石として取り出すこともできないという。"
translation = "일단 적합해진 마왕의 인자는, 수정석으로 꺼내는 것도 불가능하다고 한다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「打つ手はない……ということか」"
translation = "「손 쓸 방법이 없다는 건가.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナは熟考した。"
translation = "트뤼파이나는 숙고했다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「浄化の手立てが全くない……というわけではありません。最後の手段を除けば」"
translation = "「정화할 방법이 전혀 없는…… 것은 아닙니다. 최후의 수단을 제외하면요.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「……！\u3000最後の手段、だって……？」"
translation = "「……! 최후의 수단이라니……?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>──この森では、そう伝えられている禁術です」"
translation = "「<ruby>봉리재탄<rt>레나투스</rt></ruby>── 이 숲에서는, 그렇게 전해지는 금술입니다.」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナは深刻な面持ちで言った。"
translation = "트뤼파이나는 심각한 표정으로 말했다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「これは……人間どころか、魔女に施すことさえ許されていない禁忌の魔法」"
translation = "「이것은…… 인간은 물론, 마녀에게 시술하는 것조차 허용되지 않은 금기의 마법.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「その名の通り──対象の人物を生まれ変わらせる効果を持ちます」"
translation = "「그 이름대로── 대상 인물을 다시 태어나게 하는 효과를 지닙니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「生まれ変わらせる……そんなことができるのか……？」"
translation = "「다시 태어나게 한다…… 그런 것이 가능한 건가……?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「想像してみてください」"
translation = "「상상해 보세요.」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナの言葉と同時、宙には光の『<ruby>繭<rt>まゆ</rt></ruby>』が出現した。"
translation = "트뤼파이나의 말과 동시에, 허공에는 빛의 『고치』가 출현했다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「蛾は通常、<ruby>繭<rt>まゆ</rt></ruby>の中で<ruby>蛹<rt>さなぎ</rt></ruby>となって成虫への変態を遂げます。<ruby>封理再誕<rt>レナトゥス</rt></ruby>は──この順序を逆転させるようなもの」"
translation = "「나방은 보통, 고치 속에서 번데기가 되어 성충으로 변태를 이룹니다. <ruby>봉리재탄<rt>레나투스</rt></ruby>는── 이 순서를 역전시키는 것과 같습니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「成虫から幼虫に……ってことか」"
translation = "「성충에서 유충으로……라는 건가.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「これには多くの制約が伴います。まず、対象を一度、生命の種にまで若返らせるため、あらゆる記憶を失います」"
translation = "「이것에는 많은 제약이 따릅니다. 우선, 대상을 한 번, 생명의 씨앗으로까지 회춘시키기 때문에, 모든 기억을 잃게 됩니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「いわば擬似的な転生です。これによって今のあなたを侵食する病はすべて浄化されますが、同時に力と経験も消え去ります」"
translation = "「말하자면 의사적인 전생입니다. 이로 인해 지금의 당신을 침식하는 병은 모두 정화되지만, 동시에 힘과 경험도 사라집니다.」"

[[dialogue]]
speaker = "unk"
original = "<ruby>封理再誕<rt>レナトゥス</rt></ruby>にかけられた人物は何もかも幼い状態に巻き戻って封印される。"
translation = "<ruby>봉리재탄<rt>레나투스</rt></ruby>에 걸린 인물은 모든 것이 어린 상태로 되돌아가 봉인된다."

[[dialogue]]
speaker = "unk"
original = "だがそれなら、ラクシスに宿った魔王の因子は失われずに済む可能性があるという。"
translation = "하지만 그렇다면, 라크시스에게 깃든 마왕의 인자는 잃지 않고 남을 가능성이 있다고 한다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「だけど……記憶までなくなってしまうのなら、それはもう俺じゃなくなるんじゃないか？」"
translation = "「하지만…… 기억까지 없어져 버린다면, 그건 더 이상 내가 아니지 않나?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい。魔王という概念は残りますが、あなたはラクシスではなくなります」"
translation = "「네. 마왕이라는 개념은 남겠지만, 당신은 라크시스가 아니게 됩니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「つまりこの法は……実質的には死を下すものと変わりません。ゆえに禁忌とされてきました」"
translation = "「즉 이 방법은…… 실질적으로는 죽음을 내리는 것과 다름없습니다. 그러므로 금기로 여겨져 왔습니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「……なるほどな。納得だ」"
translation = "「……과연. 납득이 가는군.」"

[[dialogue]]
speaker = "unk"
original = "光の魔女が語った禁忌たる所以に、ラクシスは得心した。"
translation = "빛의 마녀가 말한 금기의 이유에, 라크시스는 수긍했다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「その禁術ってやつは、この場でかけられるのか？」"
translation = "「그 금술이라는 것을, 이 자리에서 걸 수 있나?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>は光の魔法。私であれば可能です」"
translation = "「<ruby>봉리재탄<rt>레나투스</rt></ruby>는 빛의 마법. 저라면 가능합니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ただし……封印した相手がいつ目覚めるかは、私にもわかりません」"
translation = "「다만…… 봉인한 상대가 언제 깨어날지는, 저도 알 수 없습니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「長くてどのくらいになる？」"
translation = "「길게는 어느 정도가 되지?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「何百年、いえ、何千年に及ぶかもしれません。特に今のあなたなら」"
translation = "「몇백 년, 아니, 몇천 년에 이를지도 모릅니다. 특히 지금의 당신이라면요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「再誕のためにはまっさらになるまで浄化を促す必要があります。あなたの深刻な汚染を取り除くには、膨大な時間が必要なはずです」"
translation = "「재탄을 위해서는 완전히 깨끗해질 때까지 정화를 촉진해야 합니다. 당신의 심각한 오염을 제거하려면, 방대한 시간이 필요할 것입니다.」"

[[dialogue]]
speaker = "unk"
original = "膨大の時間。それはラクシスにとっても、無視できない問題だった。"
translation = "방대한 시간. 그것은 락시스에게도 무시할 수 없는 문제였다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「次のリクリエに間に合う保証はない──」"
translation = "「다음 리크리에에 맞출 수 있다는 보장은 없겠군――」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「それだけではありません。もし無事に再誕が成功したとしても、今のあなたのように育つとは限らないのですから」"
translation = "「그것만이 아닙니다. 만약 무사히 재탄이 성공한다고 해도, 지금의 당신처럼 성장하리라는 보장은 없으니까요.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「魔王の資質が残っていても、英雄になれるかはわからない──ってことか」"
translation = "「마왕의 자질이 남아있어도, 영웅이 될 수 있을지는 모른다는 건가.」"

[[dialogue]]
speaker = "unk"
original = "多くのデメリットがあることは承知した。その上で、彼は頷いた。"
translation = "많은 단점이 있다는 것을 알고 있었다. 그 위에서, 그는 고개를 끄덕였다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「やってくれ。どうせ朽ち果てるだけの体──あなたに会えて俺は幸運だ」"
translation = "「해 줘. 어차피 썩어 문드러질 몸―― 당신을 만나서 나는 행운이야.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「よいのですか。あなたは……今生に別れを告げることになりますよ」"
translation = "「괜찮으신가요. 당신은…… 현생에 작별을 고하게 됩니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「俺の自我なんて……失われても構わない。魔王の因子が残るのなら」"
translation = "「나의 자아 따위…… 잃어버려도 상관없어. 마왕의 인자가 남는다면.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ラクシス様……いえ、魔王様。なぜ──あなたはそこまで闘いを続けられるのですか？」"
translation = "「락시스 님…… 아니, 마왕님. 어째서―― 당신은 그토록 싸움을 계속할 수 있는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナは、ラクシスが生来の英雄でないことを見抜いていた。"
translation = "트뤼파이나는 락시스가 선천적인 영웅이 아니라는 것을 간파하고 있었다."

[[dialogue]]
speaker = "unk"
original = "対するラクシスもまた、呆気に取られたかのように笑う。"
translation = "이에 락시스 또한, 어이없다는 듯이 웃었다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「さあ……どうしてだろうな。使命感──なんてものは、もう通り過ぎたつもりなんだが。性格かな」"
translation = "「글쎄…… 왜일까. 사명감―― 같은 건, 이미 지나쳤다고 생각했는데. 성격일까.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「だけど──もし、これが、俺の魂に刻まれた想いだっていうなら。生まれ変わった先でも俺は、こうする気がする」"
translation = "「하지만―― 만약, 이것이, 내 영혼에 새겨진 마음이라고 한다면. 다시 태어난 곳에서도 나는, 이렇게 할 것 같아.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「……わかりました。あなたの覚悟を尊重します」"
translation = "「……알겠습니다. 당신의 각오를 존중하겠습니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「これより行うは禁忌の秘術──<ruby>封理再誕<rt>レナトゥス</rt></ruby>。魔王ラクシス、病めるあなたを浄化するため……世界樹の根へと封印します」"
translation = "「지금부터 행하는 것은 금기의 비술―― <ruby>봉리재탄<rt>레나투스</rt></ruby>. 마왕 락시스, 병든 당신을 정화하기 위해…… 세계수의 뿌리로 봉인하겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "魔女の森で彼らはそう決意を固めた。"
translation = "마녀의 숲에서 그들은 그렇게 결의를 다졌다."

[[dialogue]]
speaker = "unk"
original = "この時、２人の間で取り交わされた約束を知る者は、以来数千年現れない。"
translation = "이때, 두 사람 사이에서 주고받은 약속을 아는 자는, 이후 수천 년 동안 나타나지 않았다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「森に宿りし聖なる光のマナよ……再誕の加護を汝に与えん」"
translation = "「숲에 깃든 성스러운 빛의 마나여…… 재탄의 가호를 그대에게 주노라.」"

[[dialogue]]
speaker = "unk"
original = "光の繭がラクシスを包み込んだ。"
translation = "빛의 고치가 락시스를 감쌌다."

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "（これが……浄化……そして、再生──か……）"
translation = "（이것이…… 정화…… 그리고, 재생――인가……）"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "（悪いな、フェリシア……最後まで一緒にいてやれなくて……）"
translation = "（미안하다, 펠리시아…… 마지막까지 함께 있어 주지 못해서……）"

[[dialogue]]
speaker = "unk"
original = "<ruby>茫洋<rt>ぼうよう</rt></ruby>と失われゆく意識の中で、ラクシスは己が人生を回顧した。"
translation = "망망히 사라져 가는 의식 속에서, 락시스는 자신의 인생을 회고했다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ああ……そうでした。ひとつ、忠告しておかなくてはなりません」"
translation = "「아아…… 그랬군요. 하나, 충고해 두어야만 합니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あなたが再び目覚めた暁には──この世界のバランスに、なんらかの揺らぎが生じるはずです」"
translation = "「당신이 다시 눈을 뜬 새벽에는―― 이 세계의 균형에, 무언가의 흔들림이 생길 것입니다.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「揺らぎ──それは……どんな……？」"
translation = "「흔들림―― 그건…… 어떤……?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「わかりません。あなたに眠る聖か、邪か、はたまたどちらでもない<ruby>混沌<rt>カオス</rt></ruby>か……その気質に影響されるのは間違いないでしょう」"
translation = "「모르겠습니다. 당신에게 잠든 성스러움인지, 사악함인지, 아니면 둘 다 아닌 혼돈인지…… 그 기질에 영향을 받는 것은 틀림없을 겁니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ただ、生まれ変わったあなたの魂は、本来その時代にないはずのもの。あなたほどの器であれば……その整合性を保つため、世界のほうを変えてしまうはず」"
translation = "「다만, 다시 태어난 당신의 혼은, 본래 그 시대에 없을 터인 것입니다. 당신 정도의 그릇이라면…… 그 정합성을 유지하기 위해, 세계 쪽을 바꿔 버릴 것입니다.」"

[[dialogue]]
speaker = "unk"
original = "トリュファイナの言葉を、ラクシスは十全には理解できていなかった。"
translation = "트뤼파이나의 말을, 락시스는 온전히 이해하지 못했다."

[[dialogue]]
speaker = "unk"
original = "ただ、自分の再誕と同時に、何かが起きるらしいことだけはわかった。"
translation = "다만, 자신의 재탄과 동시에, 무언가가 일어날 것 같다는 것만은 알았다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「その先の未来ではきっと、私も生きてはいないでしょう。新たに始まったこの森羅暦──その行く末を観測することは叶いません」"
translation = "「그 앞의 미래에서는 분명, 저도 살아있지 않겠지요. 새롭게 시작된 이 신라력―― 그 앞날을 관측하는 것은 이루어지지 않을 겁니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「願わくは……その代にも、新たな光の魔女が誕生せんことを祈っています。もしあなたが出会ったのなら、良くしてあげてくださいね」"
translation = "「바라건대…… 그 시대에도, 새로운 빛의 마녀가 탄생하기를 기도하고 있습니다. 만약 당신이 만난다면, 잘 대해 주세요.」"

[[dialogue]]
speaker_original = "ラクシス"
speaker_translation = "라크시스"
original = "「どうかな……この会話も、どうせ……覚えてはいられないのだから……」"
translation = "「어떨까…… 이 대화도, 어차피…… 기억하지 못할 테니까……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふふ……それもそうでした」"
translation = "「후후…… 그것도 그랬군요.」"

[[dialogue]]
speaker = "unk"
original = "そうして彼は──魔王ラクシスはその生涯に幕を閉じた。"
translation = "그렇게 그는―― 마왕 락시스는 그 생애에 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "誰にも知られず。誰にも打ち明けず。ひっそりと、繭に封じられ、世界樹の根へ封印された。"
translation = "누구에게도 알려지지 않고. 누구에게도 털어놓지 않고. 조용히, 고치에 봉인되어, 세계수의 뿌리로 봉인되었다."

[[dialogue]]
speaker = "unk"
original = "それから彼は悠久の眠りについた。"
translation = "그리고 그는 유구한 잠에 빠졌다."

[[dialogue]]
speaker = "unk"
original = "禁術『封理再誕』は確かに、彼の<ruby>魂魄<rt>こんぱく</rt></ruby>を蝕んでいたリクリエによる汚染を浄化していった。"
translation = "금술 『<ruby>봉리재탄<rt>레나투스</rt></ruby>』은 확실히, 그의 혼백을 갉아먹고 있던 리크리에에 의한 오염을 정화해 나갔다."

[[dialogue]]
speaker = "unk"
original = "しかしその過程で、彼は告げられていた通り、力と経験と記憶とを何もかも失うこととなった。"
translation = "그러나 그 과정에서, 그는 고지받았던 대로, 힘과 경험과 기억을 모조리 잃게 되었다."

[[dialogue]]
speaker = "unk"
original = "すべての浄化が終わったのは、彼が封印されてからおよそ３０００年後──"
translation = "모든 정화가 끝난 것은, 그가 봉인되고 나서 약 3000년 후――"

[[dialogue]]
speaker = "unk"
original = "長き時を経て、三界やリクリエを巡る魔女たちの情勢も移り変わっていった。"
translation = "오랜 시간을 거쳐, 삼계나 리크리에를 둘러싼 마녀들의 정세도 바뀌어 갔다."

[[dialogue]]
speaker = "unk"
original = "そんな時、魔王の伝承を探っていたある魔女が、２人の密約に勘づいた。"
translation = "그럴 때, 마왕의 전승을 찾고 있던 한 마녀가, 두 사람의 밀약을 눈치챘다."

[[dialogue]]
speaker = "unk"
original = "それは奇しくも、彼が繭から羽化した直後のことだった。"
translation = "그것은 기묘하게도, 그가 고치에서 우화한 직후의 일이었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「──目覚めていたのね」"
translation = "「──깨어났구나.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「魔王……あなたには、新たな名前が必要ね。あなたはこのままだと、存在ごと利用されてしまうわ」"
translation = "「마왕…… 너에게는, 새로운 이름이 필요하겠네. 너는 이대로라면, 존재째로 이용당하게 될 거야.」"

[[dialogue]]
speaker = "unk"
original = "彼には名が与えられ、その魔女によって人間界へ連れ帰られることとなる。"
translation = "그는 이름이 주어지고, 그 마녀에 의해 인간계로 돌아가게 된다."

[[dialogue]]
speaker = "unk"
original = "そして彼の誕生は──さらなる世界の変革を生んだ。"
translation = "그리고 그의 탄생은―― 더욱더 세계의 변혁을 낳았다."

[[dialogue]]
speaker = "unk"
original = "デネブ──"
translation = "데네브――"

[[dialogue]]
speaker = "unk"
original = "ベガ──"
translation = "베가――"

[[dialogue]]
speaker = "unk"
original = "アルタイル──"
translation = "알타이르――"

[[dialogue]]
speaker = "unk"
original = "魔王の再誕へ呼応するかのように、宇宙の運命は三つに分かたれた。"
translation = "마왕의 재탄에 호응하듯이, 우주의 운명은 세 개로 나뉘었다."

[[dialogue]]
speaker = "unk"
original = "それは、今は亡き魔女トリュファイナも予言していた、決定的な世界の『揺らぎ』であった。"
translation = "그것은, 지금은 고인이 된 마녀 트뤼파이나도 예언했던, 결정적인 세계의 『흔들림』이었다."

[[dialogue]]
speaker = "unk"
original = "果たしてなぜこのような結果を生んだのか？"
translation = "과연 왜 이러한 결과를 낳았을까?"

[[dialogue]]
speaker = "unk"
original = "答えのない問いではあったが、かつてＳとトリュファイナが彼を称した言葉にすべてが詰まっていた。"
translation = "답이 없는 질문이기는 했지만, 일찍이 S와 트뤼파이나가 그를 칭송했던 말에 모든 것이 담겨 있었다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "『魔王ラクシス──あなたは、一輪の花のようですね』"
translation = "「마왕 락시스―― 당신은, 한 송이의 꽃과 같군요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "『重なり合う可能性の花弁。そんなあなたの種を植えれば、きっと……新たな領域が芽吹くことになるのでしょう』"
translation = "「겹쳐지는 가능성의 꽃잎. 그런 당신의 씨앗을 심으면, 분명…… 새로운 영역이 싹트게 될 것입니다.」"

