[[dialogue]]
speaker = "unk"
original = "第１０話,ＶＳ星喰らいシャドウ・魔神ギエル戦闘後,B"
translation = "제10화, VS 별 먹보 섀도우·마신 기엘 전투 후, B"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「クラウディア、私の魔力をお渡しします──トドメを！！」"
translation = "「클라우디아, 제 마력을 드릴게요── 마무리를!!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「感謝するぞ先代！\u3000全身全霊の──インフィニット・ゴスペルッ！！」"
translation = "「감사하마 선대! 전신전령의── 인피니트 가스펠!!」"

[[dialogue]]
speaker = "unk"
original = "先代と今代、２人の光の魔女の力が束ねられ、解き放たれる──！"
translation = "선대와 현대, 두 명의 빛의 마녀의 힘이 하나로 묶여 해방된다──!"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「グ──ガァ、ァァァァアッ────！？」"
translation = "「그── 가아, 아아아아앗────!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やったかしら！？」"
translation = "「해낸 걸까!?」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「お嬢様、そういうのフラグって言うんで。敵の息の根が止まるまでは黙っときましょ？」"
translation = "「아가씨, 그런 걸 플래그라고 하거든요. 적의 숨통이 끊어질 때까지는 조용히 계시죠?」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「なぜ……だ……なぜ……また……私は、敗れる……？」"
translation = "「어째서……냐…… 어째서…… 또…… 나는, 패배하는 거냐……?」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「超越した者になれた、はず、なのに……お、ぉぉおぉおっ──！！」"
translation = "「초월한 자가 되었을, 터, 인데…… 오, 오오오오오옷──!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「うん、やっぱり倒してるわ！！\u3000ギエルの体、どんどん崩れていってるもの！」"
translation = "「응, 역시 쓰러뜨렸어!! 기엘의 몸이 점점 무너져 내리고 있는걸!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あー、よかった。こっからパワーアップで復活とかしないみたいですねー」"
translation = "「아— 다행이다. 여기서 파워업해서 부활한다거나 하지는 않는 모양이네요—」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「…………グ、グ、ググ……ガ、ァ…………」"
translation = "「…………그, 그, 그그…… 가, 아…………」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が……消えた！？」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』가…… 사라졌어!?」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ふ……ふふ、ふふふ……残る最後の拠点へ、力を集中する……と……」"
translation = "「후…… 후후, 후후후…… 남은 마지막 거점으로 힘을 집중…… 하마……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……黒騎士の、居場所ね」"
translation = "「……흑기사가 있는 곳이군」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「星騎士、たち……ここで勝ったところで、お前たちは、いずれ負ける<ruby>運命<rt>さだめ</rt></ruby>……」"
translation = "「성기사, 들…… 여기서 이겼다고 한들, 너희는 머지않아 패배할 <ruby>운명<rt>숙명</rt></ruby>……」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「真なる神は滅びない……お前たちは、このベガを解放することもできず……厄災の魔王をこの地に呼ぶことも、敵わない……！！」"
translation = "「진정한 신은 멸망하지 않는다…… 너희는 이 베가를 해방하지도 못하고…… 재액의 마왕을 이 땅에 불러들이는 것도 이루지 못할 터……!!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「アハハ……アハハハハ……！！\u3000先にあの世で待っていますよ！？\u3000また会える時が……楽しみですねぇ……！！！」"
translation = "「아하하…… 아하하하하……!! 먼저 저세상에서 기다리고 있겠어요!? 다시 만날 날이…… 기대되는군요……!!!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「グ、ァァ──ァァアァァア────！！！」"
translation = "「그, 아아── 아아아아아────!!!」"

[[dialogue]]
speaker = "unk"
original = "その捨て台詞を最期に、魔神ギエルの影は消滅した──"
translation = "그 유언을 마지막으로 마신 기엘의 그림자는 소멸했다──"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……目標の撃破を確認。これで４つ目ですね」"
translation = "「……목표 격파 확인. 이걸로 네 번째네요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そうですね～。とりあえずみなさん、お疲れマジカルってことで！」"
translation = "「그렇네요~. 일단 여러분, 수고 매지컬~이라는 걸로!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ！\u3000お疲れマジカルだ、リーリア！\u3000先代も最後の助力、助かったぞ！」"
translation = "「음! 수고 매지컬이다, 리리아! 선대도 마지막 도움, 고마웠다!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふふ、お役に立てたようで何よりです。皆様、お疲れ様でした」"
translation = "「후후, 도움이 된 것 같아 다행이네요. 여러분, 수고하셨습니다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「むぅ……違うぞ先代。会話には、流れというものがあるのだ」"
translation = "「무으…… 틀려 선대. 대화에는 흐름이라는 것이 있다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「リーリアも余も『マジカル』をつけたのだ、先代も言わねば締まらんというものだぞ！」"
translation = "「리리아도 짐도 『매지컬』을 붙였다, 선대도 말하지 않으면 끝맺음이 안 된단 말이다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ちょっと、クラウディア様！？」"
translation = "「잠깐, 클라우디아 님!?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ほぇ～……そうなのですね。勉強になりますっ」"
translation = "「호에~…… 그렇군요. 공부가 되네요」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「では改めて……皆様、お疲れマジカルです！」"
translation = "「그럼 다시…… 여러분, 수고 매지컬입니다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「またおかしなことをトリュファイナ様に吹き込んで……セドナ長官にバレたらどうしよう……」"
translation = "「또 이상한 걸 트리파이나 님께 불어넣으시고…… 세도나 장관님께 들키면 어쩌지……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「大変ですねー、ウェンディさんも」"
translation = "「고생하시네요—, 웬디 씨도」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あなたが元凶ですからね！？\u3000だいたい何なんですか、そのマジカルって！」"
translation = "「당신이 원흉이니까요!? 대체 뭐예요, 그 매지컬이란 건!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ん～……ノリですかね☆\u3000ていうか、ウェンディさんは言ってなくないです？」"
translation = "「음~…… 분위기랄까요☆ 그보다 웬디 씨는 안 하시나요?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「えっ」"
translation = "「엣」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「私も聞きたいです。ウェンディ様、お疲れマジカルでした！」"
translation = "「저도 듣고 싶네요. 웬디 님, 수고 매지컬이었습니다!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「おつかれマジカルですーーー！！！」"
translation = "「수고 매지컬입니다—!!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "（バカみたいな挨拶で恥ずかしすぎます！！\u3000でも偉い人がやってるのに無視するなんて、私にはできません！！！）"
translation = "（바보 같은 인사라 너무 창피해요!! 하지만 윗사람들이 하고 있는데 무시하는 건 제겐 불가능합니다!!!）"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そうだ先代よ。このクリスマスフォームは、ちぇちゅーりえが余のために特別に拵えてくれたものなのだ」"
translation = "「그렇다 선대여. 이 크리스마스 폼은 체칠리에가 짐을 위해 특별히 마련해 준 것이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「このホーリー・ベルは、振るえば何でも願いを叶えることができる！」"
translation = "「이 홀리 벨은 휘두르면 무엇이든 소원을 이룰 수 있지!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「そうなのですか？\u3000それは素晴らしい能力ですね！」"
translation = "「그런가요? 그건 정말 훌륭한 능력이네요!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ！\u3000試しに先代の望みを叶えてみようと思うのだが、何かないかのう？」"
translation = "「음! 시험 삼아 선대의 소원을 들어주려 하는데, 뭐 없느냐?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「では──戦いの後ですし、いささか喉が渇きました。皆様にお茶でもいかがでしょう？」"
translation = "「그럼── 전투 뒤이기도 하니, 다소 목이 마르네요. 여러분께 차라도 한잔 어떨까요?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「私、キイチゴのジャムが入った紅茶だと嬉しいのですが……ここまで細かくても大丈夫でしょうか？」"
translation = "「저는 산딸기 잼이 들어간 홍차라면 기쁘겠습니다만…… 이렇게 세세해도 괜찮을까요?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「承知したぞ！\u3000では──メリークラウディアバースデ～♪」"
translation = "「알았다! 그럼── 메리 클라우디아 버스데~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……これは？」"
translation = "「……이건?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「キイチゴの苗木と、茶葉の収穫方法が記された……書籍が１冊？」"
translation = "「산딸기 묘목과 찻잎 수확 방법이 적힌…… 서적 한 권?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「一から作るためのセットってことでしょうか？」"
translation = "「처음부터 만들기 위한 세트라는 걸까요?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「むぅ……！\u3000やっぱり願ったものと少し違ったものが出てくるな。世界が変わっても、これは変わらんのか」"
translation = "「무으……! 역시 바란 것과는 조금 다른 것이 나오는군. 세계가 바뀌어도 이건 변하지 않는 건가」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「けれどこのようなものを生み出せるだなんて……ツェツィーリエ様は凄いのですね」"
translation = "「하지만 이런 것을 만들어낼 수 있다니…… 체칠리에 님은 대단하시네요」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……あれ？\u3000すみませんクラウディア様、その開発、ツェツィーリエが関わっているって……そのお金はどこから！？」"
translation = "「……어라? 잠시만요 클라우디아 님, 그 개발에 체칠리에가 관여했다니…… 그 돈은 어디서 나온 거죠!?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そういえば記憶を受け継いだ時……ウェンディが青い顔をしておったビジョンも見えたのう」"
translation = "「그러고 보니 기억을 이어받았을 때…… 웬디가 파랗게 질린 얼굴을 하고 있던 비전도 보였지」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あの女！\u3000違う世界でも私を苦しめているんですね！？\u3000冗談じゃありません！」"
translation = "「그 여자! 다른 세계에서도 나를 괴롭히고 있는 거군요!? 농담이 아니라고요!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大勝利だったわね！\u3000美鶴もリノさんも、お疲れ様♪」"
translation = "「대승리였어! 미츠루도 리노 씨도 수고했어♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええ。ヴィーナスちゃんも大活躍だったわね～♪」"
translation = "「그래. 비너스짱도 대활약이었어~♪」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「どう考えても戦闘向きじゃないだろーって衣装が出てきましたけど、星力自体はめっちゃ強くなってたんで。お嬢様に怪我がなくてよかったです」"
translation = "「아무리 생각해도 전투용은 아니잖아— 싶은 의상이 나왔지만, 성력 자체는 엄청 강해졌으니까요. 아가씨가 다치지 않아서 다행입니다」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「リノさんもありがとうございました。何度もお嬢様のピンチを救ってくれましたよね。流石は『空間の魔女』」"
translation = "「리노 씨도 감사했습니다. 몇 번이나 아가씨의 위기를 구해주셨죠. 과연 『공간의 마녀』다워요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ヴィーナスちゃんやみんなをを守るためだもの！\u3000お母さん、頑張っちゃったわ～♪」"
translation = "「비너스짱이랑 모두를 지키기 위해서인걸! 엄마가 힘 좀 냈지~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ところで美鶴、その衣装はどうしたの？\u3000今まで見たことのない衣装だったから、びっくりしたわ！」"
translation = "「그나저나 미츠루, 그 의상은 어떻게 된 거야? 지금까지 본 적 없는 의상이라 깜짝 놀랐어!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「星霊祭の応援団用にって作ったヤツみたいで。違う世界にいる自分が作った服を着るだなんて、ちょっと変な感じですけど」"
translation = "「성령제 응원단용으로 만들려던 녀석인가 봐요. 다른 세계에 있는 자신이 만든 옷을 입다니, 조금 묘한 기분이지만요」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも我ながら良いデザインっていうか……気に入りました。今度お嬢様にも、同じやつ作ってあげましょうか」"
translation = "「그래도 나름 좋은 디자인이랄까…… 맘에 들었습니다. 나중에 아가씨께도 똑같은 걸로 만들어 드릴까요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「本当に！？\u3000やったー！\u3000完成したらセンちゃんにも見せてあげないとね！」"
translation = "「정말!? 신난다—! 완성되면 센짱에게도 보여줘야지!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「あー。あの子ならすっごく喜ぶでしょうね、色んな意味で……」"
translation = "「아—. 그 애라면 무척 기뻐하겠네요, 여러 가지 의미로……」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「でも惜しいですね。フロンティアドライブ・オーバーロード──色んな世界の戦闘服が見れる機会なんて滅多にないのに、今だけなんて」"
translation = "「그래도 아깝네요. 프론티어 드라이브 오버로드── 여러 세계의 전투복을 볼 수 있는 기회는 좀처럼 없는데, 지금뿐이라니」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「美鶴ちゃんは服が好きなのかしら？」"
translation = "「미츠루짱은 옷을 좋아하는 거니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「美鶴は九浄家のパタンナーなのよ、リノさん！」"
translation = "「미츠루는 쿠죠 가의 패턴사라고요, 리노 씨!」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「ぶっちゃけリノさんの水着のデザインも興味あるんですよね。近くで見てもいいです？」"
translation = "「솔직히 리노 씨의 수영복 디자인도 흥미가 있거든요. 가까이서 봐도 될까요?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ええ、もちろん！\u3000ヴィーナスちゃんに可愛い衣装を作る参考にしてちょうだいね♪」"
translation = "「응, 물론이지! 비너스짱에게 귀여운 의상을 만들어 줄 참고로 삼아주렴♪」"

[[dialogue]]
speaker_original = "美鶴"
speaker_translation = "미츠루"
original = "「デザインそのまま使ったら、閃のやつ鼻血出してぶっ倒れそー……ま、それはそれで面白いか」"
translation = "「디자인 그대로 쓰면 센 녀석은 코피 쏟으며 쓰러지겠는데— 뭐, 그것도 그것대로 재밌겠나」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「──凄かったね～、メイプルちゃんの戦いっぷり♪\u3000流石は『次の魔王になる者』だね♪」"
translation = "「──대단했네~, 메이플짱의 싸우는 모습♪ 과연 『다음 마왕이 될 자』다워♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ひぃ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「そんなにビクビクしなくてもいいのに～♪\u3000これでも褒めてるんだよー？」"
translation = "「그렇게 벌벌 떨지 않아도 되는데~♪ 이래 봬도 칭찬하는 거라고—?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こらー！\u3000やめなさい、煌嶺ちゃん！\u3000メイプルちゃんが怖がってるでしょー！」"
translation = "「이놈—! 그만하렴, 코우레이짱! 메이플짱이 무서워하잖니!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「と、トワちゃんっ、トワちゃ～～んっ」"
translation = "「토, 토와짱, 토와쨔~~앙」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そうやって嫌がらせばっかりしてると、みんなに嫌われちゃうんだからねっ。先生としていじめは見過ごせ──」"
translation = "「그렇게 괴롭히기만 하면 모두에게 미움받을 거야. 선생님으로서 괴롭힘은 묵과—」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「…………うるさいなあ♪」"
translation = "「…………시끄럽네♪」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾の楽しみに水を差すな、教師」"
translation = "「첩의 즐거움에 찬물을 끼얹지 마라, 교사」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「────はぇえぇ！？」"
translation = "「────하에에에!?」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「道化もまともに演じられんとは──潰すぞ？」"
translation = "「광대 노릇도 제대로 못 하다니── 뭉개버린다?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「アーーウ！！？！？」"
translation = "「아—우!!?!?!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「トワちゃん！？\u3000トワちゃーーーーん！！」"
translation = "「토와짱!? 토와쨔~~~~앙!!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「アッ、アッ……アッ……」"
translation = "「앗, 앗…… 앗……」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「──なーんちゃって♪\u3000うそうそ、冗談だよ～♪」"
translation = "「──라~는 건 농담♪ 거짓말이야 거짓말, 장난이라고~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ほらトワちゃん！\u3000煌嶺様も冗談だって──」"
translation = "「봐 토와짱! 코우레이 님도 장난이라고──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「今のところはねっ♪」"
translation = "「지금까지는 말이지♪」"

[[dialogue]]
speaker_original = "２人"
speaker_translation = "2명"
original = "「「ひぃ！？」」"
translation = "「「히익!?」」"

[[dialogue]]
speaker = "unk"
original = "とうとうアルタイル陣営は、『星喰らい』の拠点を４つ撃破した。"
translation = "드디어 알타이르 진영은 『별 먹보』의 거점을 4개 격파했다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（残すはあと１つ……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は最後の拠点へ力を集中させると、ギエルが言っていたわね……）"
translation = "（남은 건 앞으로 하나…… 『<ruby>XELOS<rt>제로스</rt></ruby>』는 마지막 거점으로 힘을 집중시킬 거라고 기엘이 말했었지……）"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（次の戦いは、過酷なものになりそうだわ。クロトに伝えておかなきゃ──）"
translation = "（다음 전투는 가혹한 싸움이 되겠어. 쿠로토에게 전해둬야겠네──）"

