[[dialogue]]
speaker = "unk"
original = "第２話,ドリームマジック,P"
translation = "제2화, 드림 매직, P"

[[dialogue]]
speaker = "unk"
original = "ネビュラの基地についたアイリーンは、ノルトハウゼンをネビュラの長官であるセドナに引き合わせた。"
translation = "네뷸라 기지에 도착한 아이린은 노르트하우젠을 네뷸라의 장관인 세드나와 만나게 했다."

[[dialogue]]
speaker = "unk"
original = "イリスクラウドや魔法使いについてのより詳しい情報を、セドナはノルトハウゼンから巧みに引き出していく。"
translation = "이리스 클라우드나 마법사에 대한 더 자세한 정보를 세드나는 노르트하우젠으로부터 교묘하게 끌어내 간다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「──イリスクラウドは、大陸全体を謎の霧が覆っているのです」"
translation = "「──이리스 클라우드는 대륙 전체를 수수께끼의 안개가 뒤덮고 있어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「霧の中には凶悪な魔物が棲みついていて、人を襲ったり惑わしたりしますわ」"
translation = "「안개 속에는 흉악한 마물이 서식하고 있어서 사람을 습격하거나 현혹하곤 하죠」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「そんな霧の中を走行できる魔導列車『ミストトレイン』に乗って戦うのが『トレインナイト』なのです」"
translation = "「그런 안개 속을 주행할 수 있는 마도 열차 『미스트 트레인』을 타고 싸우는 것이 『트레인 나이트』랍니다」"

[[dialogue]]
speaker = "セドナ"
original = "「霧の中から現れる魔物、か……広大な魔界の何処かであれば、そのような現象が起きていても不思議ではないが……」"
translation = "「안개 속에서 나타나는 마물이라…… 광대한 마계의 어딘가라면 그런 현상이 일어나도 이상할 건 없지만……」"

[[dialogue]]
speaker = "セドナ"
original = "「しかし貴方の話すイリスクラウドという大陸、アイゼングラートという国家、ハルツという都市にはことごとく聞き覚えがない」"
translation = "「하지만 네가 말하는 이리스 클라우드라는 대륙, 아이젠그라트라는 국가, 하르츠라는 도시에는 전혀 짐작 가는 바가 없다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「人間界、天界、魔界の地名を調べてみましたが、それと思わしき場所の情報を見つけることは出来ませんでした」"
translation = "「인간계, 천계, 마계의 지명을 조사해 보았습니다만, 그럴듯한 장소의 정보는 찾을 수 없었습니다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「もし彼女の言うような大陸を覆いつくす線路や魔導列車、魔物と戦う特別な部隊が存在するのなら、我々ネビュラの情報網にかかっていないことが不自然です」"
translation = "「만약 그녀의 말대로 대륙을 뒤덮는 선로나 마도 열차, 마물과 싸우는 특별한 부대가 존재한다면, 우리 네뷸라의 정보망에 걸리지 않는 것이 부자연스럽습니다」"

[[dialogue]]
speaker = "セドナ"
original = "「……突然現れた黒い穴に呑み込まれ、気が付いたら見知らぬこの地に居た、ということだったな？」"
translation = "「……갑자기 나타난 검은 구멍에 삼켜져 정신을 차려보니 낯선 이곳에 있었다는 거군?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はい、その通りですわ」"
translation = "「네, 맞아요」"

[[dialogue]]
speaker = "セドナ"
original = "「これは推察の域を出ず、可能性のひとつとして捉えて欲しいのだが……ここは貴方のいた世界とは違う世界なのかもしれない」"
translation = "「이건 추측의 영역일 뿐이고, 가능성 중 하나로 받아들여 줬으면 한다만…… 여기는 네가 있던 세계와는 다른 세계일지도 모른다」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「違う世界……そのようなことがあるのでしょうか？」"
translation = "「다른 세계…… 그런 일이 있을 수 있나요?」"

[[dialogue]]
speaker = "セドナ"
original = "「そうそう頻繁に起きては困る話だが……何度かそういった事例は確認されている」"
translation = "「그렇게 자주 일어나서는 곤란한 이야기지만…… 몇 번인가 그런 사례는 확인된 바 있다」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「それは困りましたわ……わたくし、どうすればよいのでしょう」"
translation = "「그건 곤란하네요…… 저, 어쩌면 좋죠」"

[[dialogue]]
speaker = "セドナ"
original = "「さすがに情報が足りないな。ひとまずここに留まり、元の世界へ戻る方法を探すといい」"
translation = "「역시 정보가 부족하군. 일단 여기에 머물며 원래 세계로 돌아갈 방법을 찾아보도록 해」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「何と感謝申し上げてよいやら……ありがとうございます、セドナさん」"
translation = "「뭐라 감사를 드려야 할지…… 감사합니다, 세드나 씨」"

[[dialogue]]
speaker = "セドナ"
original = "「アイリーン、当面はお前が彼女の面倒を見てやれ」"
translation = "「아이린, 당분간은 네가 그녀를 돌봐주도록 해」"

[[dialogue]]
speaker = "アイリーン"
original = "「了解しました、長官！\u3000ノルトハウゼンさん、よろしくねっ♪」"
translation = "「알겠습니다, 장관님! 노르트하우젠 씨, 잘 부탁해♪」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はい、よろしくお願いいたします」"
translation = "「네, 잘 부탁드립니다」"

[[dialogue]]
speaker = "セドナ"
original = "「ところで……貴方は魔法使いという話だったが、どのような魔法を使えるのだろうか？」"
translation = "「그런데…… 너는 마법사라고 했는데, 어떤 마법을 쓸 수 있지?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「お恥ずかしながらわたくし、魔法アカデミーの卒業生の中でもとびきりの劣等生なのですわ」"
translation = "「부끄럽지만 저는 마법 아카데미 졸업생 중에서도 유독 열등생이었답니다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そ、そうなのですか？」"
translation = "「그, 그런가요?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ですがご所望とあれば、お応えしないわけには参りません。ハルツの魔法使いの誇りにかけて、全力で楽しませてみせますわ」"
translation = "「하지만 원하신다면 응하지 않을 수 없죠. 하르츠 마법사의 긍지를 걸고 온 힘을 다해 즐겁게 해드릴게요」"

[[dialogue]]
speaker = "セドナ"
original = "「そうか……貴方の魔法には興味がある。簡単なもので良いから見せてもらいたい」"
translation = "「그래…… 네 마법에는 흥미가 있다. 간단한 것이라도 좋으니 보여줬으면 좋겠군」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わかりましたわ。では、わたくしが最も得意とする魔法をご覧くださいませ」"
translation = "「알겠습니다. 그럼 제가 가장 자신 있는 마법을 봐주세요」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンは呼吸を整えると、宙に手を差し伸べる。"
translation = "노르트하우젠은 호흡을 가다듬고 허공에 손을 내밀었다."

[[dialogue]]
speaker = "unk"
original = "その手のひらから、色とりどりの火の玉が浮かび上がり宙に舞った。"
translation = "그 손바닥에서 형형색색의 불덩어리가 떠올라 허공을 수놓았다."

[[dialogue]]
speaker = "unk"
original = "そして、パチンと指を鳴らすと同時に、それらの火球がいっせいに弾ける。"
translation = "그리고 딱 하고 손가락을 튕기는 것과 동시에 그 화구들이 일제히 터진다."

[[dialogue]]
speaker = "アイリーン"
original = "「花火！\u3000そういえば花火を生み出せるって言ってたね」"
translation = "「불꽃놀이! 그러고 보니 불꽃을 만들어낼 수 있다고 했었지」"

[[dialogue]]
speaker = "セドナ"
original = "「鮮やかな火球を生み出し、それに弾けるような音を組み合わせて、あたかも花火が上がっているように見せている……そういうことだな？」"
translation = "「선명한 화구를 만들어내고, 거기에 터지는 듯한 소리를 조합해서 마치 불꽃이 올라오는 것처럼 보이게 한다…… 그런 거군?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしの腕では実際の花火を打ち上げる魔法は使えませんわ」"
translation = "「제 실력으로는 실제 불꽃을 쏘아 올리는 마법은 쓸 수 없어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ですから、簡単な魔法を組み合わせて花火を生み出しました……これもまたドリームマジックですわ」"
translation = "「그래서 간단한 마법을 조합해서 불꽃을 만들어냈죠…… 이것 또한 드림 매직이랍니다」"

[[dialogue]]
speaker = "セドナ"
original = "「なるほど、人々に希望を与え幸せにする魔法、か……ハルツの魔法がどういうものか、およそのところは理解できたように思う」"
translation = "「과연, 사람들에게 희망을 주고 행복하게 만드는 마법인가…… 하르츠의 마법이 어떤 것인지 대충은 이해한 것 같군」"

[[dialogue]]
speaker = "セドナ"
original = "「しかし魔法については、我々のものとは根本的に違うもののようだな」"
translation = "「하지만 마법에 대해서는 우리와 근본적으로 다른 것 같군」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あら、ではみなさんも魔法使いなのですか？」"
translation = "「어머, 그럼 여러분도 마법사인가요?」"

[[dialogue]]
speaker = "セドナ"
original = "「正確には魔法使いではなく、魔女だ」"
translation = "「정확히는 마법사가 아니라 마녀다」"

[[dialogue]]
speaker = "セドナ"
original = "「それに我々の魔法は戦いに特化したもので、おそらく貴方の期待しているようなものではない」"
translation = "「게다가 우리의 마법은 전투에 특화된 것이라, 아마 네가 기대하는 그런 것은 아닐 거다」"

[[dialogue]]
speaker = "アイリーン"
original = "「ノルトハウゼンさんみたいに花火を作ったり、虹を作ったり、星を降らせたりはできないよ～」"
translation = "「노르트하우젠 씨처럼 불꽃을 만들거나, 무지개를 만들거나, 별을 내리게 하지는 못해~」"

[[dialogue]]
speaker = "ウェンディ"
original = "「虹を作ったり、星を降らせたり……？\u3000そんなことまで出来るのですか？」"
translation = "「무지개를 만들거나, 별을 내리게 하거나……? 그런 것까지 가능한가요?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしは力が足りず、せいぜい小さな星を手の中に生み出す程度ですが、わたくしの姉はそれは見事な『星降らし』を行うことが出来ますわ」"
translation = "「저는 힘이 부족해서 기껏해야 작은 별을 손안에 만들어내는 정도지만, 저희 언니는 아주 멋진 『별 내리기』를 할 수 있어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「いつかわたくしも姉のように『しあわせの流星群』を成功させることが夢ですの」"
translation = "「언젠가 저도 언니처럼 『행복의 유성군』을 성공시키는 것이 꿈이랍니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「それなら虹は！？\u3000虹はどうなのっ？」"
translation = "「그럼 무지개는!? 무지개는 어때?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「虹は……一度も成功させたことがありません」"
translation = "「무지개는…… 한 번도 성공시킨 적이 없어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ですがご所望でしたら……お応えしないわけにはいきませんわ」"
translation = "「하지만 원하신다면…… 응하지 않을 수 없죠」"

[[dialogue]]
speaker = "セドナ"
original = "「では、お願いしよう」"
translation = "「그럼 부탁하지」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わかりました……ではご覧ください、ノルトハウゼンがお送りするドリームマジック──」"
translation = "「알겠습니다…… 그럼 봐주세요, 노르트하우젠이 보내드리는 드림 매직──」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンは大きく息を吸い込むと、再び杖を宙にかざす。"
translation = "노르트하우젠은 크게 숨을 들이마시고 다시 지팡이를 허공에 치켜들었다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ウォーターイリュージョン！」"
translation = "「워터 일루전!」"

[[dialogue]]
speaker = "セドナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アイリーン"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ウェンディ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "セドナ"
original = "「何も起きないようだな……」"
translation = "「아무 일도 일어나지 않는 것 같군……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「失敗してしまったようです。ですが、一度の失敗で諦めたりはしません。もう一度──」"
translation = "「실패해 버린 것 같네요. 하지만 한 번의 실패로 포기하지 않아요. 다시 한번──」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ウォーターイリュージョン！\u3000えいっ！\u3000えいっ！」"
translation = "「워터 일루전! 에잇! 에잇!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あの……難しいようでしたら、無理にとは──」"
translation = "「저기…… 어려우시다면 무리해서 하지는──」"

[[dialogue]]
speaker = "unk"
original = "何度も杖を振って虹を出そうとするノルトハウゼンを見かねて、ウェンディが止めに入った。"
translation = "몇 번이나 지팡이를 휘둘러 무지개를 내려고 하는 노르트하우젠을 보다 못해 웬디가 말리러 들어갔다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "セドナ"
original = "「ほう……」"
translation = "「호오……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「な、何ですか……この空気……！？」"
translation = "「머, 뭐죠…… 이 공기는……!?」"

[[dialogue]]
speaker = "アイリーン"
original = "「これは大成功の予感だよっ！」"
translation = "「이건 대성공의 예감이야!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はい、わたくしも何だか成功しそうな気がしますわ！\u3000いきますよ、ウォーターイリュージョン！！！\u3000えーいっ！！！」"
translation = "「네, 저도 왠지 성공할 것 같은 기분이 들어요! 갑니다, 워터 일루전!!! 에잇!!!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ひぁああああっ！！！！」"
translation = "「히아아아앗!!!!」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンの頭上に大量の水が生まれ、それが降ってくる。"
translation = "노르트하우젠의 머리 위로 대량의 물이 생겨나 쏟아져 내렸다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「……ずぶぬれになってしまいました」"
translation = "「……흠뻑 젖어버렸네요」"

[[dialogue]]
speaker = "アイリーン"
original = "「わわわ、ノルトハウゼンさん！\u3000もういいから！\u3000ナイスファイトだよっ！」"
translation = "「와와와, 노르트하우젠 씨! 이제 됐으니까! 나이스 파이트야!」"

[[dialogue]]
speaker = "セドナ"
original = "「着替えを用意してやってくれ」"
translation = "「갈아입을 옷을 준비해 줘라」"

[[dialogue]]
speaker = "ウェンディ"
original = "「分かりました」"
translation = "「알겠습니다」"

