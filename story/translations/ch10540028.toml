[[dialogue]]
speaker = "ユーリス"
original = "「んっ……はぁ……ふぁ……んっ……」"
translation = "「응…… 하아…… 후아…… 응……」"

[[dialogue]]
speaker = "ユーリス"
original = "「も、もう……。どうして閉店後の店内で、はぁ、んっ、こんなこと……」"
translation = "「정, 정말이지…… 어째서 폐점한 가게 안에서, 하아, 응, 이런 짓을……」"

[[dialogue]]
speaker = "ユーリス"
original = "「後でバレたら、んんっ……。大目玉どころの騒ぎじゃないんだからね……？」"
translation = "「나중에 들키면, 으응…… 불호령 정도로 끝나지 않을 테니까 말이야……?」"

[[dialogue]]
speaker = "unk"
original = "不服そうに唇を尖らせたまま、ユーリスが大きな乳房で肉棒を<ruby>扱<rt>しご</rt></ruby>いてくれる。"
translation = "불만스러운 듯 입술을 삐죽인 채로, 유리스가 커다란 유방으로 자지를 훑어준다."

[[dialogue]]
speaker = "unk"
original = "だけど元はと言えばユーリスのせいだ。"
translation = "하지만 따지고 보면 유리스 탓이다."

[[dialogue]]
speaker = "unk"
original = "閉店作業中にいきなり胸元を緩めたりするものだから。"
translation = "폐점 작업 중에 갑자기 가슴팍을 풀어헤치거나 하니까."

[[dialogue]]
speaker = "ユーリス"
original = "「だってこの服、学園の制服やいつもの戦闘服に比べて胸が苦しいんだもん……」"
translation = "「그치만 이 옷, 학원 교복이나 평소 전투복에 비해서 가슴이 답답하단 말이야……」"

[[dialogue]]
speaker = "ユーリス"
original = "「薄手な分、いつも以上に胸を潰さなくちゃいけないし……。２人きりの時くらい、楽になりたいと思って……」"
translation = "「얇은 만큼, 평소보다 가슴을 더 압박해야 하고……. 둘이서만 있을 때만큼은, 편해지고 싶다고 생각해서……」"

[[dialogue]]
speaker = "ユーリス"
original = "「そしたら会長、胸の谷間をやらしく覗き込んでくるし……。お、おち○ちんまで大きくして……」"
translation = "「그랬더니 회장님, 가슴 골을 야하게 훔쳐보고 말이야……. 자, 자지까지 크게 세우고……」"

[[dialogue]]
speaker = "ユーリス"
original = "「あまつさえ、私を店の隅に引っ張っていって……こんなこと頼んできて……」"
translation = "「심지어, 나를 가게 구석으로 끌고 가서…… 이런 걸 부탁해 오고……」"

[[dialogue]]
speaker = "unk"
original = "「パイズリして欲しい」とお願いした時の、彼女の姿を思い出す。"
translation = "「파이즈리 해줬으면 좋겠어」라고 부탁했을 때의, 그녀의 모습을 떠올린다."

[[dialogue]]
speaker = "unk"
original = "耳まで顔を真っ赤にして一通り慌てたあと、結局はボタンをプツプツと外して俺の前にしゃがみ込んでくれた。"
translation = "귀까지 얼굴을 새빨갛게 물들이며 한바탕 당황한 뒤, 결국은 단추를 툭툭 풀고 내 앞에 주저앉아 주었다."

[[dialogue]]
speaker = "unk"
original = "目の前に広がる乳房の海が美しい。俺のペニスを潜り込ませてあまりある豊満な大海に魅入ってしまう。"
translation = "눈앞에 펼쳐지는 유방의 바다가 아름답다. 내 페니스를 파묻고도 남을 풍만한 대해에 매료되고 만다."

[[dialogue]]
speaker = "ユーリス"
original = "「あまり見つめないでくれよ……。胸を見られるのが一番恥ずかしいんだ……」"
translation = "「너무 빤히 보지 말아줘……. 가슴을 보이는 게 제일 부끄럽단 말이야……」"

[[dialogue]]
speaker = "ユーリス"
original = "「男の振りをしているのに全然男らしく見えないし……。毎朝この胸を潰す度に自分は女だと意識させられてしまうし……」"
translation = "「남자인 척하고 있는데 전혀 남자답게 보이지도 않고……. 매일 아침 이 가슴을 압박할 때마다 스스로가 여자라는 걸 의식하게 되어버리고……」"

[[dialogue]]
speaker = "ユーリス"
original = "「こんな無駄な贅肉、ちっとも要らなかったのに……。頼んでもいないのに、こんなに大きくなってしまって……」"
translation = "「이런 쓸모없는 군살, 조금도 필요 없었는데……. 부탁하지도 않았는데 이렇게나 커져 버려서……」"

[[dialogue]]
speaker = "ユーリス"
original = "「……とはいっても……」"
translation = "「……라고는 해도……」"

[[dialogue]]
speaker = "unk"
original = "不意に尖っていたユーリスの唇が綻ぶ。"
translation = "불현듯 뾰로통해 있던 유리리스의 입술이 풀린다."

[[dialogue]]
speaker = "ユーリス"
original = "「好きな人に興奮してもらえるのは、ん、はぁ……嬉しいけど、ね……<emoji=heart04>」"
translation = "「좋아하는 사람이 흥분해 주는 건, 응, 하아…… 기쁘지만, 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「おっぱいでおち○ちんを扱くなんて、ふぁ、ん、死んでしまいそうなくらい恥ずかしいけど……<emoji=heart04>」"
translation = "「가슴으로 자지를 비비다니, 후아, 응, 죽어버릴 정도로 부끄럽지만……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「でも、はぁ、んぁ、君が私のおっぱいで悦んでくれてる姿を見ると、羞恥心よりも悦ばせたい気持ちが強くなってしまう……<emoji=heart04>」"
translation = "「하지만, 하아, 응아, 네가 내 가슴으로 기뻐하는 모습을 보면, 수치심보다 기쁘게 해주고 싶은 마음이 더 강해져 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "上目遣いで見つめながら、ユーリスが色気たっぷりに乳房を動かしてくれる。"
translation = "치켜뜬 눈으로 바라보며, 유리리스가 색기 넘치게 유방을 움직여 준다."

[[dialogue]]
speaker = "unk"
original = "一日中キツく潰して蒸れてしまっているんだろう。谷間の中は蜜のように甘く温かい汗で濡れていた。"
translation = "하루 종일 꽉 압박해서 땀이 차 있었던 모양이다. 골짜기 안은 꿀처럼 달콤하고 따뜻한 땀으로 젖어 있었다."

[[dialogue]]
speaker = "unk"
original = "乳房を揺らしてもらう度にその蜜が肉棒にトロトロに絡みついてきて気持ちいい。豊満なおっぱいがより肉竿に密着してくる。"
translation = "유방을 흔들어 줄 때마다 그 꿀이 육봉에 걸쭉하게 얽혀와서 기분 좋다. 풍만한 가슴이 더욱 육봉에 밀착되어 온다."

[[dialogue]]
speaker = "ユーリス"
original = "「はぁ、んはぁ、おち○ちん気持ち良さそうに震えてくれて……<emoji=heart04>\u3000やっぱり嬉しい……<emoji=heart04>」"
translation = "「하아, 응하아, 자지가 기분 좋은 듯이 떨려줘서……<emoji=heart04> 역시 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「君と出会うまで、んっ、はぁ、おっぱいなんて本当に邪魔なものでしかないと思っていたんだ……<emoji=heart04>」"
translation = "「너와 만나기 전까지, 응, 하아, 가슴 같은 건 정말 방해물밖에 안 된다고 생각했어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「重いし、潰してるとすぐ蒸れるし、何より、はぁ、んん、女の象徴みたいなものだから……<emoji=heart04>」"
translation = "「무겁고, 압박하고 있으면 금방 땀이 차고, 무엇보다, 하아, 으응, 여자의 상징 같은 거니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「いくら大きくなったところで誰にも見せられないのにって……<emoji=heart04>\u3000本当の私を見てもらえる日なんて来ないのにって……<emoji=heart04>」"
translation = "「아무리 커져 봤자 누구에게도 보여줄 수 없는데라며……<emoji=heart04> 진짜 내 모습을 보여줄 수 있는 날 따위 오지 않을 텐데라며……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「だけど、んっ、はぁ、だから……<emoji=heart04>\u3000私の大きなおっぱいを、君に見てもらえることが嬉しい……<emoji=heart04>」"
translation = "「하지만, 응, 하아, 그러니까……<emoji=heart04> 내 커다란 가슴을, 너에게 보여줄 수 있어서 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「本当の私で興奮してもらえることが嬉しい……<emoji=heart04>\u3000あんなに嫌いだったおっぱいで悦んでくれることが嬉しい……<emoji=heart04>」"
translation = "「진짜 나를 보고 흥분해 주는 게 기뻐……<emoji=heart04> 그렇게나 싫어했던 가슴으로 기뻐해 주는 게 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の興奮を確かめるようにユーリスがぎゅうぎゅうと乳圧を強めてくれる。"
translation = "내 흥분을 확인하려는 듯 유리스가 꼬옥꼬옥 가슴의 압박을 강하게 해온다."

[[dialogue]]
speaker = "unk"
original = "羞恥心で頬を赤らめながらも、谷間の奥の奥まで肉棒を挟み込んで、そのグラマラスな感触を味わわせてくれる。"
translation = "수치심으로 뺨을 붉히면서도, 가슴골 깊숙한 곳까지 자지를 끼워 넣어, 그 글래머러스한 감촉을 맛보게 해준다."

[[dialogue]]
speaker = "ユーリス"
original = "「私のおっぱいで気持ち良くなって……<emoji=heart04>\u3000たくさんたくさん……<emoji=heart04>」"
translation = "「내 가슴으로 기분 좋아져 줘……<emoji=heart04> 많이 많이……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私のおっぱいは、まさに君だけのために存在してるから……<emoji=heart04>」"
translation = "「내 가슴은, 그야말로 너만을 위해서 존재하고 있으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「君だけにしか見せない……<emoji=heart04>\u3000君だけしか知らない……<emoji=heart04>\u3000私自身のためですらない……<emoji=heart04>\u3000君に悦んでもらうためだけのものだから……<emoji=heart04>」"
translation = "「너에게만 보여줄 거야……<emoji=heart04> 너밖에 몰라……<emoji=heart04> 나 자신을 위한 것조차 아니야……<emoji=heart04> 너를 기쁘게 해주기 위한 것뿐이니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんなに可愛い女の子の存在を俺だけが知っているという事実に改めて幸せを感じる。"
translation = "이렇게나 귀여운 여자아이의 존재를 나만이 알고 있다는 사실에 다시금 행복을 느낀다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女から、こんなにも愛されていることに快感以上に幸福を覚える。"
translation = "그런 그녀로부터, 이렇게나 사랑받고 있다는 사실에 쾌감 이상의 행복을 느낀다."

[[dialogue]]
speaker = "ユーリス"
original = "「あぁ、おち○ちんからエッチなおつゆが溢れて……<emoji=heart04>\u3000この匂い好き……<emoji=heart04>\u3000大好きな人が気持ち良くなってくれてる匂い……<emoji=heart04>」"
translation = "「아아, 자지에서 야한 국물이 넘쳐서……<emoji=heart04> 이 냄새 좋아……<emoji=heart04> 정말 좋아하는 사람이 기분 좋아지고 있는 냄새……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「もっと、んふっ……<emoji=heart04>\u3000ぎゅっとしてみるね……<emoji=heart04>\u3000私のおっぱいの感触、ふぁ、堪能して欲しい……<emoji=heart04>」"
translation = "「좀 더, 응훗……<emoji=heart04> 꽉 조여 볼게……<emoji=heart04> 내 가슴의 감촉, 화아, 만끽해 줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私も君のおち○ちんの感触、たっぷり味わいたいんだ……<emoji=heart04>\u3000私の女の部分で、んっ、はぁ、おっぱいで……<emoji=heart04>」"
translation = "「나도 네 자지의 감촉, 듬뿍 맛보고 싶어……<emoji=heart04> 내 여자의 부분으로, 응, 하아, 가슴으로……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "溢れ出した我慢汁をユーリスが胸全体に塗り込んでいく。にゅるんにゅるんと擦れる柔肌が気持ちいい。"
translation = "넘쳐흐른 쿠퍼액을 유리스가 가슴 전체에 문질러 바른다. 미끌미끌 비벼지는 부드러운 살결이 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "まるで乳房の海を両手を広げて泳ぎ回っているような気分だ。フワとろなおっぱいの感触にペニスが蕩けていく。"
translation = "마치 유방의 바다를 양팔 벌려 헤엄치고 있는 듯한 기분이다. 폭신하고 말랑한 가슴의 감촉에 페니스가 녹아내린다."

[[dialogue]]
speaker = "ユーリス"
original = "「ふぁぁ……<emoji=heart04>\u3000おっぱいの中でおち○ちんが跳ね回ってくれて……<emoji=heart04>」"
translation = "「화아아……<emoji=heart04> 가슴 안에서 자지가 펄떡거려 줘서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私まで感じてしまう……<emoji=heart04>\u3000ううん、私の方が、はぁ、あぁん、感じてしまってるかもしれない……<emoji=heart04>」"
translation = "「나까지 느껴버려……<emoji=heart04> 으응, 내가 더, 하아, 아앙, 느껴버리고 있을지도 몰라……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「おっぱいもエッチな汗でビショビショだけど、おま○こもグチョグチョに濡れてしまっているんだ……<emoji=heart04>」"
translation = "「가슴도 야한 땀으로 축축하지만, 보지도 질척질척하게 젖어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「おっぱいでおち○ちん扱いてるだけなのに、あぁん、はぁ……<emoji=heart04> ものすごく気持ち良くて、ふぁぁ、幸せで……<emoji=heart04>」"
translation = "「가슴으로 자지를 비비고 있을 뿐인데, 아앙, 하아……<emoji=heart04> 엄청나게 기분 좋아서, 화아, 행복해서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ずりんずりんと乳房を擦り付ける度にユーリスがお尻を震わせる。"
translation = "주욱주욱 유방을 문지를 때마다 유리스가 엉덩이를 떨었다."

[[dialogue]]
speaker = "unk"
original = "どんどんお尻に食い込んでいくショーツがエロい。"
translation = "점점 엉덩이 사이로 파고드는 팬티가 에로틱하다."

[[dialogue]]
speaker = "unk"
original = "クネクネと悶える度に、ただでさえセクシーなショーツがＴバックに変わっていく。"
translation = "배베 꼬며 몸부림칠 때마다, 안 그래도 섹시한 팬티가 T백으로 변해간다."

[[dialogue]]
speaker = "ユーリス"
original = "「えへへ……<emoji=heart04>\u3000ショーツも、はぁ、んふぁ、気に入ってくれた……？」"
translation = "「에헤헤……<emoji=heart04> 팬티도, 하아, 응후아, 마음에 들어……?」"

[[dialogue]]
speaker = "ユーリス"
original = "「いいよ……？\u3000好きなだけ見て……？\u3000君に見せるために穿いてきたんだ……<emoji=heart04>」"
translation = "「괜찮아……? 마음껏 봐……? 너에게 보여주려고 입고 온 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「万が一こういうことになった時に興奮してもらえるようにって……<emoji=heart04>\u3000君と会う時はいつも色っぽい下着付けるようにしてて……<emoji=heart04>」"
translation = "「만약에 이런 상황이 됐을 때 흥분할 수 있도록……<emoji=heart04> 너랑 만날 때는 언제나 섹시한 속옷을 입으려고 해서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「エッチな気分になって欲しいから……<emoji=heart04>\u3000私も、はぁ、ふぁ、できることならいつでも君とエッチしたいから……<emoji=heart04>」"
translation = "「야한 기분이 됐으면 좋겠으니까……<emoji=heart04> 나도, 하아, 후아, 할 수만 있다면 언제라도 너랑 섹스하고 싶으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっと発情してとばかりに、恥じらいながらもユーリスがお尻をフリフリと振ってくれる。"
translation = "더 발정해달라는 듯이, 부끄러워하면서도 유리스가 엉덩이를 살랑살랑 흔들어준다."

[[dialogue]]
speaker = "unk"
original = "その健気な姿がどうしようもなく可愛い。彼女の胸の中でペニスがはち切れそうなくらい腫れ上がってしまう。"
translation = "그 기특한 모습이 어쩔 수 없이 귀엽다. 그녀의 가슴 안에서 페니스가 터질 것처럼 부풀어 오른다."

[[dialogue]]
speaker = "ユーリス"
original = "「あぁ、幸せ……<emoji=heart04>\u3000おち○ちん、ガッチガチに硬くなって……<emoji=heart04>」"
translation = "「아아, 행복해……<emoji=heart04> 자지, 딱딱하게 굳어서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「このままもっと気持ち良くしてあげるね……<emoji=heart04>\u3000おち○ちんに溜め込んだ精液、ビュービューさせてあげたい……<emoji=heart04>」"
translation = "「이대로 더 기분 좋게 해줄게……<emoji=heart04> 자지에 쌓인 정액, 뷰븃 하고 나오게 해주고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私も今だけは、ふぁ、んふぅん……<emoji=heart04>\u3000一匹のメスになりたいから……<emoji=heart04>」"
translation = "「나도 지금만큼은, 후아, 응후웅……<emoji=heart04> 한 마리의 암컷이 되고 싶으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "発情した吐息を漏らしながら、火照った乳房でペニスをぎゅっと抱き締めてくれる。"
translation = "발정난 숨결을 내뱉으며, 열이 오른 유방으로 페니스를 꽉 껴안아준다."

[[dialogue]]
speaker = "unk"
original = "そして、じゅぶじゃぶ水音が立つほど乳房の海を激しく波打たせてくれて──"
translation = "그리고, 쥬부쟈부 물소리가 날 정도로 유방의 바다를 격렬하게 물결치게 해 주어서──"

[[dialogue]]
speaker = "ユーリス"
original = "「ふぁんっ、あぁっ、あっ、はぁっ、あぁあんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후앙, 아아, 앗, 하아, 아아앙……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「おち○ちんゴシゴシ扱くの気持ちいいっ……<emoji=heart04>\u3000おっぱいの中がおま○こみたいに敏感になっちゃってっ……<emoji=heart04>」"
translation = "「자지 고시고시 문지르는 거 기분 좋아……<emoji=heart04> 가슴 속이 보지처럼 민감해져 버려서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「恥ずかしい声っ、あっ、あっ、あぁっ、出ちゃ……<emoji=heart04>\u3000こんな女の子な声っ、ふぁ、あっ、はぁ、絶対出しちゃいけないのにっ……<emoji=heart04>」"
translation = "「부끄러운 목소리, 앗, 앗, 아아, 나와버려……<emoji=heart04> 이런 여자아이 같은 목소리, 후아, 앗, 하아, 절대 내면 안 되는데……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口ではそう言いながらも、甘い嬌声が響く。"
translation = "입으로는 그렇게 말하면서도, 달콤한 교성이 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "恥じらいながらも女の自分を俺に見せつけてくれる。"
translation = "부끄러워하면서도 여자인 자신을 나에게 과시해 준다."

[[dialogue]]
speaker = "ユーリス"
original = "「先っぽをズリズリ擦られるのが気持ちいいんだよねっ……<emoji=heart04>\u3000私のおっぱいでたっぷりシコシコしてあげるねっ……<emoji=heart04>」"
translation = "「끝부분을 즈리즈리 비벼지는 게 기분 좋네……<emoji=heart04> 내 가슴으로 듬뿍 시코시코 해 줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私のふわふわおっぱいの感触、あぁあんっ、いっぱい味わって欲しいっ……<emoji=heart04>\u3000柔らかさは自信があるんだっ……<emoji=heart04>」"
translation = "「내 폭신폭신한 가슴의 감촉, 아아앙, 잔뜩 맛봤으면 좋겠어……<emoji=heart04> 부드러움에는 자신 있단 말이야……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「自分でも大きくてふにふにのおっぱいだなって思っててっ……<emoji=heart04>\u3000ぬるぬる咥え込むのだけは得意なんだっ……<emoji=heart04>」"
translation = "「나 스스로도 크고 푸니푸니한 가슴이라고 생각해서……<emoji=heart04> 미끌미끌하게 물고 늘어지는 것만큼은 자신 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分の胸の長所をアピールするように、ユーリスが極上の柔肌でペニスを頬張ってくれる。"
translation = "자신의 가슴의 장점을 어필하듯이, 유리스가 극상의 부드러운 살결로 페니스를 머금어 준다."

[[dialogue]]
speaker = "unk"
original = "おっぱいでフェラしてもらってるような気分だ。汗と我慢汁で蒸れ蒸れの乳穴で扱かれるのが最高に気持ちいい。"
translation = "가슴으로 펠라를 받고 있는 듯한 기분이다. 땀과 쿠퍼액으로 쪄버린 가슴 구멍으로 문질러지는 것이 최고로 기분 좋다."

[[dialogue]]
speaker = "ユーリス"
original = "「もっと、んっ<emoji=heart04>\u3000もっと激しく擦るねっ……<emoji=heart04>」"
translation = "「더, 응<emoji=heart04> 더 격렬하게 문지를게……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「弾力ない分、はぁっ、あぁんっ、いっぱいぎゅってするっ……<emoji=heart04>\u3000おっぱいキツキツに締めるっ……<emoji=heart04>」"
translation = "「탄력이 없는 만큼, 하아, 아앙, 잔뜩 꽉 조일게……<emoji=heart04> 가슴을 꽉꽉 조일 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「出したくなったら出してくれていいからっ……<emoji=heart04>\u3000ふぁっ、あっ、あぁんっ……<emoji=heart04>\u3000好きなだけ気持ち良くなって……<emoji=heart04>」"
translation = "「내고 싶어지면 내도 괜찮으니까……<emoji=heart04> 후아, 앗, 아아앙……<emoji=heart04> 마음껏 기분 좋아져……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "めいっぱい乳房を寄せ上げてペニスを扱いてくれるユーリス。"
translation = "있는 힘껏 유방을 끌어모아 페니스를 문질러 주는 유리스."

[[dialogue]]
speaker = "unk"
original = "そのあまりの激しさに、真白い肌が赤みがかっていくのがわかる。気持ちいいけど、このまま続けたら──"
translation = "그 너무나도 격렬함에, 새하얀 피부가 붉게 물들어 가는 것이 보인다. 기분 좋지만, 이대로 계속한다면──"

[[dialogue]]
speaker = "ユーリス"
original = "「いいんだっ……<emoji=heart04>\u3000おち○ちんでおっぱい火傷しちゃってもっ……<emoji=heart04>」"
translation = "「괜찮아……<emoji=heart04> 자지로 가슴이 데어버려도……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「むしろ火傷したいっ……<emoji=heart04>\u3000大好きな人のおち○ちんの痕、はぁっ、あぁっ、おっぱいに焼き付けたいっ……<emoji=heart04>」"
translation = "「오히려 데고 싶어……<emoji=heart04> 사랑하는 사람의 자지 흔적, 하아, 아아, 가슴에 새기고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「そうすれば毎朝おっぱい潰す時も、えへへっ……<emoji=heart04>\u3000幸せな気持ちになれるからっ……<emoji=heart04>」"
translation = "「그러면 매일 아침 가슴을 압박할 때도, 에헤헤……<emoji=heart04> 행복한 기분이 들 수 있으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私のおっぱいで悦んでくれる人がいるんだってっ……<emoji=heart04>\u3000私も大好きな人のためにおっぱい使えるんだってわかるからっ……<emoji=heart04>」"
translation = "「내 가슴으로 기뻐해 주는 사람이 있다고……<emoji=heart04> 나도 사랑하는 사람을 위해 가슴을 쓸 수 있다는 걸 알게 되니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってさらにユーリスが愛撫のスピードを速めてくる。"
translation = "그렇게 말하며 유리스가 애무의 속도를 더욱 높여온다."

[[dialogue]]
speaker = "unk"
original = "乳房を擦り剥かせるくらい、強く激しく扱いてくれる。"
translation = "유방이 쓸릴 정도로, 강하고 격렬하게 훑어준다."

[[dialogue]]
speaker = "ユーリス"
original = "「ふぁっ、あふぁっ、おっぱい熱いっ<emoji=heart04>\u3000おち○ちんで擦り剥けちゃいそうっ<emoji=heart04>」"
translation = "「후아, 아후아, 가슴 뜨거워<emoji=heart04> 자지로 다 쓸려버릴 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「気持ちいいっ……<emoji=heart04>\u3000初めておま○こに挿れてもらった時と同じだっ……<emoji=heart04>\u3000私の女の場所に、君を刻み込んでもらってっ……<emoji=heart04>」"
translation = "「기분 좋아……<emoji=heart04> 처음 보지에 삽입했을 때랑 똑같아……<emoji=heart04> 내 여자의 장소에, 너를 새겨 넣는 것 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「あふぁっ、ダメっ、あっ、あっ<emoji=heart04>\u3000やっぱり私の方がイっちゃっ、あぁああんっ<emoji=heart04>\u3000パイズリでイっちゃっっ<emoji=heart04>」"
translation = "「아후아, 안 돼, 앗, 앗<emoji=heart04> 역시 내가 먼저 가버렷, 아아아앙<emoji=heart04> 파이즈리로 가버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺以上に体をブルブル痙攣させて感じてくれるユーリスがエロい。"
translation = "나 이상으로 몸을 부들부들 경련하며 느껴주는 유리스가 야하다."

[[dialogue]]
speaker = "unk"
original = "蜜のような汗を谷間に溢れさせながら、まるで騎乗位でもするかのように一心不乱に乳房を上下させてくれて──"
translation = "꿀 같은 땀을 가슴골에 흘리면서, 마치 기승위라도 하듯이 일심불란하게 유방을 상하로 움직여 주며──"

[[dialogue]]
speaker = "ユーリス"
original = "「エッチな彼女でごめんっ……<emoji=heart04>\u3000でも、あっ、はぁっ、あぁっ、おっぱいとめられないっ……<emoji=heart04>」"
translation = "「야한 여자친구라 미안해……<emoji=heart04> 하지만, 앗, 하아, 아아, 가슴을 멈출 수 없어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「本当はずっとこうしたかったんだっ……<emoji=heart04>\u3000私のおっぱいで大好きな恋人を気持ち良くしたかったっ……<emoji=heart04>」"
translation = "「사실은 계속 이렇게 하고 싶었어……<emoji=heart04> 내 가슴으로 사랑하는 연인을 기분 좋게 해주고 싶었어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「乱暴に揉んだりしてもらいたいっ……<emoji=heart04>\u3000サラシで潰すんじゃなくてっ、あっ、はぁっ、君の手の平で潰されたいっ……<emoji=heart04>」"
translation = "「난폭하게 주물러지거나 하고 싶어……<emoji=heart04> 압박 붕대로 짓누르는 게 아니라, 앗, 하아, 네 손바닥으로 짓눌리고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「常にずっと、あっ、あっ、こうして君のおち○ちんを挟み込んでおきたいっ……<emoji=heart04>」"
translation = "「항상 계속, 앗, 앗, 이렇게 네 자지를 끼워두고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "発情した女の子の顔でユーリスが見上げる。"
translation = "발정난 여자아이의 얼굴로 유리스가 올려다본다."

[[dialogue]]
speaker = "unk"
original = "目が合うだけでぶるりとお尻を震わせて、淫らに悶えてくれて……"
translation = "눈이 마주치는 것만으로 부르르 엉덩이를 떨며, 음란하게 몸부림쳐 주어서……"

[[dialogue]]
speaker = "ユーリス"
original = "「好きだよっ<emoji=heart04>\u3000好きだっ<emoji=heart04>\u3000大好きだっ……<emoji=heart04>」"
translation = "「좋아해 좋아해 정말 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「パイズリして欲しいって言ってくれて、ほんとは嬉しかったっ……<emoji=heart04>\u3000お部屋で２人きりなわけでもないのに、カジノの店内なのにっ<emoji=heart04>」"
translation = "「파이즈리 해달라고 말해줘서, 사실은 기뻤어……<emoji=heart04> 방에서 둘만 있는 것도 아닌데, 카지노 가게 안인데도<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私のこと、いつも女として見てくれてるのがわかってっ<emoji=heart04>\u3000それが本当に嬉しいっ、それだけでイっちゃうっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「나를 항상 여자로 봐주고 있다는 걸 알 수 있어서<emoji=heart04> 그게 정말 기뻐, 그것만으로 가버려……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "湯気が出そうなくらいユーリスの全身が火照る。"
translation = "김이 모락모락 피어오를 정도로 유리스의 전신이 달아오른다."

[[dialogue]]
speaker = "unk"
original = "激しいパイズリが彼女の愛の大きさを示していて、俺も性欲と愛しさが今にも爆発しそうになる。"
translation = "격렬한 파이즈리가 그녀의 사랑의 크기를 나타내고 있어, 나도 성욕과 애틋함이 금방이라도 폭발할 것 같아진다."

[[dialogue]]
speaker = "ユーリス"
original = "「もっと頼んでっ<emoji=heart04>\u3000私にエッチなこと頼んでいいからねっ<emoji=heart04>」"
translation = "「더 부탁해줘<emoji=heart04> 나한테 야한 거 부탁해도 되니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「おっぱいもいつでも揉んでっ……<emoji=heart04>\u3000他の人にバレなければ、どこでどれだけ揉まれても構わないからっ……<emoji=heart04>」"
translation = "「가슴도 언제든 주물러줘……<emoji=heart04> 다른 사람한테 들키지만 않으면, 어디서 얼마나 주물러지든 상관없으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「むしろ触って欲しいっ<emoji=heart04>\u3000おっぱいもお尻もっ、あっ、はぁっ、おま○こだってっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오히려 만져줬으면 좋겠어<emoji=heart04> 가슴도 엉덩이도, 아, 하아, 보지까지도……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私のこの体はっ、女の体はっ、君だけのためにあるものだからっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「나의 이 몸은, 여자의 몸은, 너만을 위해 있는 거니까……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ユーリスの赤裸々な想いを聞いてペニスが猛る。"
translation = "유리스의 적나라한 마음을 듣고 자지가 사납게 날뛴다."

[[dialogue]]
speaker = "unk"
original = "彼女のおっぱいの中で張り裂けんほどに脈動し、ドクドクと跳ねた。"
translation = "그녀의 가슴 속에서 터질 듯이 맥동하며, 움찔움찔 튀어 올랐다."

[[dialogue]]
speaker = "ユーリス"
original = "「ああっ、出してっ<emoji=heart04>\u3000どぴゅどぴゅびゅーびゅーしてっ<emoji=heart04>」"
translation = "「아앗, 싸줘<emoji=heart04> 퓨퓩 뷰륫뷰륫 해줘<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私もイクっ<emoji=heart04>\u3000パイズリでイクっ<emoji=heart04>\u3000大好きな人のおち○ちんゴシゴシしてるだけでイクぅっ<emoji=heart04>」"
translation = "「나도 가버렷<emoji=heart04> 파이즈리로 가버렷<emoji=heart04> 정말 좋아하는 사람의 자지를 비벼대는 것만으로도 가버려엇<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「あっ、あっ、あっ、あっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクイクぅぅぅっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려 가버려 가버려어어엇~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「ふぁあああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ──あはぁああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04> 앗──아하아아아아아아앗~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "溜まりに溜まった劣情をユーリスのおっぱいに、顔に、ありったけぶちまける。"
translation = "쌓이고 쌓인 열정을 유리스의 가슴에, 얼굴에, 있는 대로 다 쏟아붓는다."

[[dialogue]]
speaker = "ユーリス"
original = "「あったかいっっ……<emoji=heart04>\u3000顔もおっぱいもドロドロになってっ……<emoji=heart04>」"
translation = "「따뜻해……<emoji=heart04> 얼굴도 가슴도 걸쭉하게 돼서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「えへへっ、幸せぇ……<emoji=heart04>\u3000イクっ、イクイクっっ……<emoji=heart04>\u3000君の精子まみれにされるの、あふぁ、この世で一番大好きっ……<emoji=heart04>」"
translation = "「에헤헷, 행복해……<emoji=heart04> 가버려, 가버려엇……<emoji=heart04> 너의 정액투성이가 되는 거, 아후아, 세상에서 제일 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体を汚されているというのに、ユーリスが幸せいっぱいのトロ顔で喘いでくれる。"
translation = "몸이 더러워지고 있는데도, 유리스가 행복 가득한 황홀한 얼굴로 신음해 준다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女が愛しくて、おっぱいの谷間に白濁の水溜まりができるほど俺も射精し続けた。"
translation = "그런 그녀가 사랑스러워서, 가슴 골에 백탁의 웅덩이가 생길 정도로 나도 계속해서 사정했다."

[[dialogue]]
speaker = "ユーリス"
original = "「はぁ、はぁ、はぁ……<emoji=heart04>\u3000君のエッチな匂いがおっぱいから上ってきて……<emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04> 너의 야한 냄새가 가슴에서 올라와서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私、ちゃんと君を気持ち良くしてあげられたんだね……<emoji=heart04>\u3000私のおっぱいで……<emoji=heart04>\u3000ふふ、本当に幸せだ……<emoji=heart04>」"
translation = "「나, 제대로 너를 기분 좋게 해준 거네……<emoji=heart04> 내 가슴으로……<emoji=heart04> 후후, 정말 행복해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "谷間に溜まった精子を乳房に塗り込みながら、ユーリスが上目遣いで見つめてくる。"
translation = "골짜기에 고인 정액을 가슴에 문지르며, 유리스가 치켜뜬 눈으로 바라본다."

[[dialogue]]
speaker = "ユーリス"
original = "「またいつでも頼んでね……<emoji=heart04>\u3000こんなおっぱいでいいなら、いつでも使ってくれていいから……<emoji=heart04>」"
translation = "「또 언제든 부탁해……<emoji=heart04> 이런 가슴이라도 괜찮다면, 언제든 써도 좋으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「私も、んっ……はぁ……<emoji=heart04>\u3000もっと君に尽くしたい……<emoji=heart04>\u3000エッチなことしてあげたい……<emoji=heart04>」"
translation = "「나도, 응…… 하아……<emoji=heart04> 좀 더 너에게 진력하고 싶어……<emoji=heart04> 야한 거 해주고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「君の親友ではなく、彼女として……<emoji=heart04>\u3000ユーリスとしてじゃなく、ユリアーナとして……<emoji=heart04>」"
translation = "「너의 친우가 아니라, 여자친구로서……<emoji=heart04> 유리스로서가 아니라, 율리아나로서……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
original = "「もっとたくさんエッチなことして……ふふ。愛情を深め合いたいから……<emoji=heart04>」"
translation = "「좀 더 많이 야한 거 하자…… 후후. 애정을 더 깊게 나누고 싶으니까……<emoji=heart04>」"

