[[dialogue]]
speaker = "unk"
original = "第４話,ＶＳ星喰らいホロウ・ルヴィネ戦闘後,B"
translation = "제4화, VS 호시쿠라이 홀로우 루비네 전투 후, B"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これで終わりです──ゴッドブレスシャワー！！」"
translation = "「이걸로 끝입니다── 갓 블레스 샤워!!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ガ────ガガ────ギィィイィッ！？」"
translation = "「가────가가────기이이이익!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「お、お父様っ──うあぁあぁあっ！？」"
translation = "「아, 아버님── 으아아아아악!?」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「こ、こんなふざけたやつらに……！」"
translation = "「이, 이런 웃기는 녀석들에게……!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネL"
speaker_translation = "할로우 루비네 L"
original = "「おの、れっ────緋宮──────クロトぉおぉぉ──ッ！？」"
translation = "「이노, 옴──── 히노미야────── 쿠로토오오오오──!!」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「……『星喰らい』の消滅を確認。これで１つ、勝負の振り子が我々の側へと揺れたようだ」"
translation = "「……호시쿠라이의 소멸을 확인. 이걸로 하나, 승부의 추가 우리 쪽으로 기운 모양이군」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうね。手にしたばかりの力を使いこなせるか、少し不安だったけれど……何とかなったみたい」"
translation = "「그래. 손에 넣은 지 얼마 안 된 힘을 잘 다룰 수 있을지 조금 불안했지만…… 어떻게든 된 것 같아」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「戦闘フォームと一緒に、戦闘経験も受け取ることができたおかげかな。運用にはまったく問題がなかったよ。これは各地の戦いも有利に運べそうだ」"
translation = "「전투 폼과 함께 전투 경험도 받을 수 있었던 덕분이겠지. 운용에는 전혀 문제가 없었어. 이건 각지의 전투도 유리하게 이끌 수 있겠어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「つ、強かったぁ～……みんなのおかげで何とか勝てたよ～！！」"
translation = "「강, 강했다아~…… 모두 덕분에 어떻게든 이겼어~!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「何をおっしゃいますか。ルルカさまの歌のサポート、とても心強かったです！」"
translation = "「무슨 말씀을 하시는 건가요. 루루카 님의 노래 서포트, 아주 든든했습니다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そ、そうかなぁ？\u3000えへへ、役に立てたならよかった！」"
translation = "「그, 그럴까? 에헤헤, 도움이 됐다니 다행이야!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それにしても本当に歌がお上手ですね。流石は聖歌隊の御方です……！\u3000しかしその衣装──どこかで見たような……？」"
translation = "「그건 그렇고 정말 노래를 잘하시네요. 역시 성가대 분이십니다……! 그런데 그 의상── 어디선가 본 듯한……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ぎくっ！？」"
translation = "「뜨끔!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「シャロンさん、ご存知ないのですか？\u3000ルルカさんの纏っているのは、Ｖチューバー・汐ルカルカのバレンタイン衣装ですよ♪」"
translation = "「샤론 씨, 모르시나요? 루루카 씨가 입고 계신 건 버츄얼 유튜버 시오 루카루카의 발렌타인 의상이라구요♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ぎくぎくぎくっ！？\u3000ウルスラ先輩、どど、どうして知って──？」"
translation = "「뜨끔뜨끔뜨끔!? 우르술라 선배, 어어, 어떻게 알고 계신──?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「幹内世界から記憶を受け取っています。向こうの私も『バレンタイン』と名の付くものは余さずチェックしているようでして♪」"
translation = "「간내세계로부터 기억을 전수받았습니다. 저쪽의 저도 『발렌타인』이라는 이름이 붙은 건 빠짐없이 체크하고 있는 모양이라서요♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「なるほどです！\u3000私もその方の衣装、バレンタインのコラボ商品で見た覚えがありましたが……これも幹内世界の記憶なのですね」"
translation = "「과연 그렇군요! 저도 그분의 의상, 발렌타인 콜라보 상품에서 본 기억이 있습니다만…… 이것도 간내세계의 기억이겠네요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「不思議な感覚です。見たことも聞いたこともない、ぶいちゅーばー様の衣装に、見覚えがあるだなんて……」"
translation = "「신기한 감각입니다. 본 적도 들은 적도 없는 버츄얼 유튜버님의 의상에 낯이 익다니……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「──でもどうして、ルルカさまが、ルカルカさまと同じ衣装を？」"
translation = "「──그런데 어째서 루루카 님이 루카루카 님과 같은 의상을?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（まずいよぉ、お兄ちゃ～ん！\u3000身バレしちゃう～っ！？）"
translation = "（큰일이야, 오빠~! 정체 들통나겠어~!?）"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、ああ──あたし！\u3000ルカルカちゃんの大ファンだから！！\u3000ファン愛が高じて、ついつい戦闘服が似ちゃうんだよねーっ！！\u3000あはは！」"
translation = "「아, 아아── 나! 루카루카 짱의 광팬이라서!! 팬심이 너무 깊어서 나도 모르게 전투복이 닮아버린 거야!! 아하하!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「まあ<emoji=heart04>\u3000深い愛の御業だったのですね。素敵です！」"
translation = "「머나<emoji=heart04> 깊은 사랑의 조화였군요. 멋집니다!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私もバレンタインを愛し、それに影響を受ける者……ルルカさんのお気持ち、よ～くわかりますよ<emoji=heart04>」"
translation = "「저도 발렌타인을 사랑하고 그에 영향을 받는 사람…… 루루카 씨의 마음 아주 잘 알아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ど、どうも～……」"
translation = "「가, 감사합니다~……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「うふふ<emoji=heart04>\u3000私たち、仲良くなれそうですね<emoji=heart04>\u3000ルカルカさまのこと、これからたくさん教えていただけますか？」"
translation = "「우후후<emoji=heart04> 우리 친하게 지낼 수 있을 것 같네요<emoji=heart04> 루카루카 님에 대해 앞으로 많이 알려주시겠어요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、ハイ……！！！」"
translation = "「앗, 넵……!!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（な、なんか近いうちに身バレしちゃいそうな気がするっ……ウルスラ先輩、察しが良さそうだもん～っ！？）"
translation = "（왠지 조만간 정체 들통날 것 같은 기분이 들어…… 우르술라 선배, 눈치 엄청 빨라 보인단 말이야~!?）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「魔王フォームに変身できなくなってしまった時は動揺しましたが……この状態の花嫁衣装の出力は、すさまじいものがありましたね」"
translation = "「마왕 폼으로 변신할 수 없게 되었을 때는 당황했습니다만…… 이 상태의 신부 의상 출력은 굉장한 것이었네요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はい。無数の可能性から力を借りる、ということを、こんな形で体験するとは思いませんでしたが……」"
translation = "「네. 무수한 가능성으로부터 힘을 빌린다는 것을 이런 형태로 체험하게 될 줄은 몰랐습니다만……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「それにしても壮観やねぇ♪\u3000まさかこんなにウェディングドレスを着た女の子たちがいる可能性も、あるやなんて♪」"
translation = "「그건 그렇고 장관이구마잉♪ 설마 이키 많은 웨딩드레스 입은 가시나들이 있을 가능성도 있다니♪」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ご、ごくり……」"
translation = "「꿀꺽……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「な、何ですか、ミヤハルさん……？」"
translation = "「머, 뭔가요, 미야하루 씨……?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「フィオナ会長はん、その衣装を手に入れたときの花婿はんって、誰だったん？」"
translation = "「피오나 회장 한, 그 의상을 손에 넣었을 때의 신랑 한은 누구였노?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そっ──それは、その……ひ、緋宮会長、ですが……」"
translation = "「그── 그건, 그…… 히, 히노미야 회장님, 입니다만……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「イレーナはんは？」"
translation = "「이레나 한은?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………フィオナ会長と同じ、ですけれど」"
translation = "「…………피오나 회장님과 같습니다만」"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「無論、私もだよ」"
translation = "「물론 나도다」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（花嫁の皆さんのお相手は──緋宮会長！？\u3000そ、そそそ、それってつまり──！）"
translation = "（신부 분들의 상대는── 히노미야 회장님!? 그, 그그그그건 즉──!）"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「魔王はんと花嫁はんたちが、えっちぃことをする枝葉の世界も、あるってことやんねぇ？」"
translation = "「마왕 한이랑 신부 한들이 야시시한 짓을 하는 가지 잎 세계도 있다는 소리 아이가?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ミヤハルさん、なんてストレートなぁっ！！\u3000しかし、それは本当にその通りで、妄想が止まりません！！）"
translation = "（미야하루 씨, 어쩌면 저렇게 스트레이트로!! 하지만 그건 정말로 그 말대로라 망상이 멈추지 않습니다!!）"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「お、おかしな想像をするのはやめてください！\u3000これはあくまで、トラブルから覚醒してしまっただけで……！！」"
translation = "「이, 이상한 상상은 하지 말아 주세요! 이건 어디까지나 트러블로 인해 각성해버렸을 뿐이라서……!!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そそ、そうですよ！\u3000緋宮会長の名誉のためにも、反論しますっ。この衣装にまつわる事件の折、彼にはお手伝いいただいただけで……！」"
translation = "「마, 맞아요! 히노미야 회장님의 명예를 위해서라도 반론하겠습니다. 이 의상에 얽힌 사건 때 그는 도와주셨을 뿐이라서……!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はい！\u3000そもそもの始まりは太陽フレアで！\u3000フィオナ会長が『結婚っていいな』って思ったことが始まりで──」"
translation = "「네! 애초의 시작은 태양 플레어였고! 피오나 회장님이 『결혼이란 좋은 거구나』라고 생각한 게 시작이라서──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「イレーナさん！？\u3000その話はやめてください！\u3000幹内世界でも散々にこすられた気がしてるんですから！！」"
translation = "「이레나 씨!? 그 이야기는 하지 말아 주세요! 간내세계에서도 지겹도록 우려먹힌 기분이 드니까요!!」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「『結婚っていいな』……？」"
translation = "「『결혼이란 좋은 거구나』……?」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「魔王様のお手伝いで、事件が解決されたんですか？\u3000いったいどのような……」"
translation = "「마왕님의 도움으로 사건이 해결된 건가요? 도대체 어떤……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「詳しくはわからんけど、そりゃあ当然──<emoji=heart04>」"
translation = "「자세히는 모르겠지만, 그야 당연히──<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（あああっ！！\u3000こんなに美しいフィオナ会長たちにウェディング姿で迫られたら、あの紳士な緋宮会長だって我慢できるはずもなく──！？）"
translation = "（아아앗!! 이렇게 아름다운 피오나 회장님 일행이 웨딩 차림으로 다가온다면, 그 신사적인 히노미야 회장님이라도 참을 수 있을 리가──!?）"

[[dialogue]]
speaker_original = "ジュエリー"
speaker_translation = "쥬얼리"
original = "「ああ。結婚式場で永遠の愛を誓い、助手の頬にキスをさせてもらったとも。イレーナさんと一緒にね？」"
translation = "「아아. 결혼식장에서 영원한 사랑을 맹세하고, 조수의 뺨에 키스를 해줬지. 이레나 씨와 함께 말이야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっと、ジュエリー！？」"
translation = "「잠깐, 쥬얼리!?」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「──まあ。魔王さん、まさかハーレムだなんて……」"
translation = "「──어머나. 마왕 씨, 설마 하렘이라니……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「た、大変です！\u3000イクシリオンさんが鼻血を出しながら気絶してしまいました！？」"
translation = "「크, 큰일이에요! 익실리온 씨가 코피를 쏟으며 기절해 버렸어요!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こ、この話はもうおしまいです！\u3000もうすぐアルタイルに通信が繋がります！\u3000戦果を報告しましょう！！」"
translation = "「이, 이 이야기는 이제 끝이에요! 곧 알타이르에 통신이 연결됩니다! 전과를 보고하죠!!」"

[[dialogue]]
speaker = "unk"
original = "──フィオナは先刻にくぐった平行世界門に近づき、アルタイルにいるアニマに連絡を取った。"
translation = "──피오나는 방금 통과한 평행세계문에 다가가, 알타이르에 있는 아니마에게 연락을 취했다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──無事に『星喰らいの使徒』を撃破できたようだナ。ご苦労ダ、帰投したまエ！」"
translation = "「──무사히 『별을 먹는 사도』를 격파한 모양이군. 수고했다, 귀환하도록 해!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「しかし……これは傑作ダ、実に面白イ！！\u3000ウェディングフォームにバレンタインフォーム……会長との可能性は多岐に渡るようだナ！」"
translation = "「그나저나…… 이건 걸작이군, 실로 흥미로워!! 웨딩 폼에 발렌타인 폼…… 회장과의 가능성은 다방면에 걸쳐 있는 모양이구나!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「時間に余裕があれば、ぜひ隅々まで調べさせてもらいたいところだガ──敵は待ってくれないようダ」"
translation = "「시간에 여유가 있다면 부디 구석구석 조사하게 해줬으면 하는 참이다만── 적은 기다려주지 않는 모양이군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ええ。『星喰らいの使徒』はまだまだ残っています。他の戦場で戦う仲間の、勝利を祈るとしましょう」"
translation = "「……네. 『별을 먹는 사도』는 아직 남아 있습니다. 다른 전장에서 싸우는 동료들의 승리를 빌기로 하죠.」"

