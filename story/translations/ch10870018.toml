[[dialogue]]
speaker = "クロト"
original = "「う……ここは……？」"
translation = "「으…… 여기는……?」"

[[dialogue]]
speaker = "unk"
original = "俺は、気を失っていたのか……？"
translation = "나, 정신을 잃었던 건가……?"

[[dialogue]]
speaker = "unk"
original = "まだ頭がぼんやりしてるけど、確か──"
translation = "아직 머리가 멍하지만 분명──"

[[dialogue]]
speaker = "ヴァレリー"
original = "「夜分遅く、こんなところまで御足労いただき、ありがとうございます」"
translation = "「밤늦게 이런 곳까지 왕림해 주셔서 감사합니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「これより、めくるめく悦楽の宴、開演です」"
translation = "「이제부터 눈부신 열락의 잔치, 개연입니다」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーに遊園地に呼び出されて、出会って間もなく、急に力が抜けて、意識が遠くなって──"
translation = "발레리가 유원지로 불러내서 만난 지 얼마 지나지 않아 갑자기 힘이 빠지고 의식이 멀어져서──"

[[dialogue]]
speaker = "unk"
original = "ここは地下牢か……？ もしや、ヴァレリーに騙されて幽閉されてしまったのか。"
translation = "여기는 지하 감옥인가……? 설마 발레리에게 속아 유폐되어 버린 건가."

[[dialogue]]
speaker = "unk"
original = "着ていた衣服も、下着まで全て剥ぎ取られている。こんな姿でコラプサーたちに遭遇したら……。"
translation = "입고 있던 옷도 속옷까지 전부 벗겨져 있다. 이런 모습으로 콜랩서들과 마주치기라도 한다면……."

[[dialogue]]
speaker = "ヴァレリー"
original = "「お目覚めですか、会長さん。ようこそ、私の隠れ家へ」"
translation = "「깨어나셨나요, 회장님. 환영합니다, 제 은신처에」"

[[dialogue]]
speaker = "unk"
original = "俺をここに招いた彼女の声が響き、部屋が明るくなる。"
translation = "나를 이곳으로 불러들인 그녀의 목소리가 울려 퍼지고 방이 밝아진다."

[[dialogue]]
speaker = "クロト"
original = "「……えっ？」"
translation = "「……어?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「フフフ、驚かれたことでしょう」"
translation = "「후후후, 놀라셨겠죠」"

[[dialogue]]
speaker = "クロト"
original = "「それは、まあ……」"
translation = "「그건, 뭐……」"

[[dialogue]]
speaker = "unk"
original = "相対する敵が、猥らな姿で縛り付けられていたら驚きもする。"
translation = "마주하는 적이 음란한 모습으로 묶여 있다면 놀라기도 할 것이다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「ここは性行為をしなければ、決して出られない部屋です」"
translation = "「여기는 성행위를 하지 않으면 결코 나갈 수 없는 방입니다」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたが仲間の元へ帰るには、私と交わり、濃厚な雄汁を私の子宮に注ぎ込む以外にありません」"
translation = "「당신이 동료들의 곁으로 돌아가려면 저와 교합하여 농후한 수컷 즙을 제 자궁에 쏟아붓는 수밖에 없어요」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「さあ、縛られて無抵抗の私を犯しなさい！」"
translation = "「자, 묶여서 무저항인 저를 범하세요!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「猛々しい肉棒で、私の純潔を奪い、欲望のままに、私を穢すのです！\u3000さあ！\u3000さあ！」"
translation = "「맹렬한 육봉으로 제 순결을 빼앗고, 욕망이 가는 대로 저를 더럽히는 거예요! 어서요! 어서!」"

[[dialogue]]
speaker = "unk"
original = "……とりあえず、脱出手段を探そう。"
translation = "……일단 탈출 수단을 찾아보자."

[[dialogue]]
speaker = "ヴァレリー"
original = "「待ちなさい。私を無視するのですか？」"
translation = "「기다리세요. 저를 무시하는 건가요?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「なるほど、恥ずかしい格好をさせたまま、放置プレイというわけですか……嫌いではありませんね、フフフ」"
translation = "「과연, 부끄러운 차림을 하게 둔 채로 방치 플레이라는 건가요…… 싫지는 않네요, 후후후.」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーには手を出すことなく、硬く閉じられているドアを叩く。鍵がかかっていて、びくともしない。"
translation = "발레리에게는 손을 대지 않고, 굳게 닫혀 있는 문을 두드린다. 자물쇠가 잠겨 있어 꿈쩍도 하지 않는다."

[[dialogue]]
speaker = "unk"
original = "ならば実力行使だと星術を放とうとするも、得体のしれない力にかき消されてしまった。以前も見たコラプサーの能力だろうか。"
translation = "그렇다면 실력 행사라며 성술을 쏘려 했지만, 정체 모를 힘에 지워지고 말았다. 이전에도 보았던 콜랩서의 능력일까."

[[dialogue]]
speaker = "unk"
original = "この部屋には甘ったるい桃のような匂いが充満している。良い匂いではあるけれど、あまり長い時間嗅いでいたら鼻がバカになってしまいそうだ。"
translation = "이 방에는 달콤한 복숭아 같은 냄새가 가득 차 있다. 좋은 냄새긴 하지만, 너무 오랜 시간 맡고 있으면 코가 마비될 것만 같다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「フフフ、淫猥な私の姿を見ても、理性を保っていられますか……さすがは新星学園の会長ですね」"
translation = "「후후후, 음란한 제 모습을 보고도 이성을 유지할 수 있다니…… 과연 신성학원의 회장님이시군요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「女性に慣れている……さては経験済みですか？\u3000星徒会役員は既に何人かお手付きなのですかね」"
translation = "「여성에게 익숙하시군요…… 설마 이미 경험이 있으신가요? 성도회 임원들은 벌써 몇 명인가 손을 대셨을지도 모르겠네요.」"

[[dialogue]]
speaker = "クロト"
original = "「人聞きが悪いな。よく知りもしない女性とセックスなんてできないだけだよ」"
translation = "「사람 듣기 안 좋은 소리를 하는군. 잘 알지도 못하는 여자와 섹스 같은 건 할 수 없을 뿐이야.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「知りもしないとはつれないですね。剣を交え、互いの命を獲り合った関係、下手な恋人よりも深い仲ではないですか」"
translation = "「알지도 못한다니 무정하시네요. 검을 맞대고 서로의 목숨을 노렸던 관계, 어설픈 연인보다도 깊은 사이 아닌가요?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私の体はこれほどまでに、愛しいあなたを求めているというのに……我ながら、大した効能です」"
translation = "「제 몸은 이토록이나 사랑스러운 당신을 갈구하고 있는데…… 나 원 참, 대단한 효능이네요.」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーの甘く開いた割れ目からは、まるでお漏らしのように愛液が滴っていた。"
translation = "발레리의 달콤하게 벌어진 가랑이 사이에서는 마치 오줌이라도 싸는 것처럼 애액이 뚝뚝 떨어지고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「効能……？\u3000ッ、もしかして──」"
translation = "「효능……? 윽, 설마──」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ええ、室内に充満しているこの匂いは、私が手ずから調合した、老若男女問わず淫獣と化す媚薬の香水です」"
translation = "「네, 실내에 가득 찬 이 냄새는 제가 직접 조합한, 남녀노소 가리지 않고 음수로 타락시키는 미약 향수입니다.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「さすがは新星学園の星徒会長、大した抵抗力ですが、あなたの雄の本能はいつまで耐えられるでしょうか？」"
translation = "「과연 신성학원의 성도회장님, 대단한 저항력이지만 당신의 수컷 본능은 언제까지 버틸 수 있을까요?」"

[[dialogue]]
speaker = "unk"
original = "いくら俺でも息を止めてるわけにはいかない。"
translation = "아무리 나라도 숨을 참고 있을 수는 없다."

[[dialogue]]
speaker = "unk"
original = "部屋に満ちている甘い香気が鼻腔から侵入してきて、じわじわと理性を溶かしていく。時間の問題だ。"
translation = "방 안에 가득한 달콤한 향기가 비강을 통해 침입해와, 서서히 이성을 녹여간다. 시간문제다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「据え膳喰わぬはなんとやら、乙女が股を濡らして、あなたの侵入を待ちわびているのですよ？\u3000焦らしプレイもほどほどに」"
translation = "「차려진 밥상을 마다하는 건 뭐라더라, 처녀가 가랑이를 적시고 당신의 침입을 기다리고 있다고요? 애태우는 플레이도 적당히 하세요.」"

[[dialogue]]
speaker = "クロト"
original = "「どういうつもりだ……？」"
translation = "「무슨 속셈이지……?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ご存じとは思いますがね、私は快楽主義なのですよ。一度堕ちれば何者も抗えない性の快感……如何なるものかを己の身で体験したい」"
translation = "「알고 계시겠지만요, 전 쾌락주의자랍니다. 한번 타락하면 누구도 저항할 수 없는 성적 쾌감…… 어떤 것인지 제 몸으로 직접 체험하고 싶어요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「そして、純潔を散らすならば、愛しいあなたに抱かれたい、ただそれだけなのです。いじらしいとは思いませんか？」"
translation = "「그리고 순결을 잃는다면 사랑스러운 당신에게 안기고 싶다, 단지 그뿐이랍니다. 가련하다고 생각하지 않으시나요?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私を抱いてくだされば、お仲間の元へとお返しいたします。責任を取れだなどと申し上げるつもりはありませんよ。後腐れなく、愉しんでいただければ」"
translation = "「저를 안아주신다면 동료들의 곁으로 돌려보내 드리겠습니다. 책임을 지라느니 하는 말을 할 생각은 없어요. 뒤끝 없이 즐겨주시기만 하면.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私、善人ではありませんが、嘘は申しません。そして、あなたの下半身もまた、大変正直者のようで」"
translation = "「저, 선인은 아니지만 거짓말은 하지 않아요. 그리고 당신의 하반신 또한 무척 정직한 것 같군요.」"

[[dialogue]]
speaker = "unk"
original = "媚薬の香水とやらを吸い過ぎたせいだろう。熱い血が駆け巡り続けているペニスは、いつも以上に肥大していた。"
translation = "미약 향수라는 것을 너무 들이마신 탓일까. 뜨거운 피가 계속해서 요동치는 자지는 평소 이상으로 비대해져 있었다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「ふむ……知識は得ていましたが、本物の肉棒は初めて見ましたね……」"
translation = "「흠…… 지식으로는 알고 있었지만, 진짜 육봉은 처음 보네요……」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「寝ている時は小さく縮こまっていたのに、ほんのわずかな時間でこんなにも膨れ上がった……実に興味深い代物です」"
translation = "「잘 때는 작게 웅크리고 있었는데, 아주 짧은 시간 만에 이렇게나 부풀어 오르다니…… 참으로 흥미로운 물건이에요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「猛々しく勃起し、尖端は先走りの露を零している。私の猥らな姿に興奮してくれているのですね」"
translation = "「맹렬하게 발기해서 끝부분은 쿠퍼액을 흘리고 있네요. 제 음란한 모습에 흥분해주시는 거군요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ああ……愛しい方が、私の体に劣情を抱いてくれるというのは、なかなかに嬉しいものです」"
translation = "「아아…… 사랑스러운 분이 제 몸에 열정을 품어준다는 건 꽤나 기쁜 일이네요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「拘束されて、女性の最も恥ずべき部分をも曝け出している私は、何もできません」"
translation = "「구속되어 여성의 가장 부끄러운 부분마저 드러내고 있는 저는 아무것도 할 수 없어요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたに何をされようとも、ただ黙って受け入れるしかないのです」"
translation = "「당신에게 무슨 짓을 당하더라도 그저 묵묵히 받아들일 수밖에 없는 거예요.」"

[[dialogue]]
speaker = "unk"
original = "物欲しげに俺を見つめ、誘うように舌なめずりするヴァレリーをめちゃくちゃに穢したい──そう思ってしまっているのは、きっと媚薬のせいだ。"
translation = "간절하게 나를 바라보며 유혹하듯 입술을 핥는 발레리를 엉망진창으로 더럽히고 싶다── 그렇게 생각하게 된 것은 분명 미약 때문일 것이다."

[[dialogue]]
speaker = "unk"
original = "でも、彼女は俺たちの天敵だ。憎むべき敵と恋人のように愛し合う行為をするだなんて──"
translation = "하지만 그녀는 우리의 천적이다. 증오해야 할 적과 연인처럼 사랑을 나누는 행위를 하다니──"

[[dialogue]]
speaker = "ヴァレリー"
original = "「いえいえ、物は考えようですよ。あなたは股間の棍棒で、私にお仕置きすればいいんです」"
translation = "「아니요, 아니요, 생각하기 나름이라니까요. 당신은 가랑이 사이의 곤봉으로 저를 벌주면 되는 거예요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私を躾けることで、あなたも快感を得られ、童貞喪失までできるのですから、とても効率が良いのでは？\u3000フフフ<emoji=heart04>」"
translation = "「저를 길들임으로써 당신도 쾌감을 얻고 동정 상실까지 할 수 있으니 아주 효율적이지 않나요? 후후후♥」"

[[dialogue]]
speaker = "unk"
original = "そうか、これはお仕置きなのか。コラプサーの彼女を懲らしめるために、俺はペニスを突き入れるんだ。"
translation = "그래, 이것은 벌인 건가. 콜랩서인 그녀를 응징하기 위해 나는 자지를 찔러넣는 것이다."

[[dialogue]]
speaker = "unk"
original = "浮ついた自分の頭を無理やり納得させつつ、童貞を喪失する期待で先走りを漏らすペニスを、彼女の膣口に添えた。"
translation = "들뜬 자신의 머리를 억지로 납득시키며, 동정을 잃는다는 기대감에 쿠퍼액을 흘리는 자지를 그녀의 질구에 갖다 대었다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「どうぞ……私の純潔、お召し上がりください<emoji=heart04>」"
translation = "「자…… 제 순결을 드셔주세요♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぅっ……！\u3000くぁ、はっ、かはぁっ……！\u3000<ruby>挿入<rt>はい</rt></ruby>って、きっ、ましたっ……！」"
translation = "「음으윽……! 크아, 하윽, 카하앗……! 삽입되어, 와, 왔습니다아……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んっ……はっ……<emoji=heart04>\u3000熱く、固く、勃起したおち○ちんとはこのような感触だったのですね……」"
translation = "「음…… 하아……♥ 뜨겁고 딱딱하게 발기한 자지는 이런 감촉이었군요……」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「どうです、憎たらしい敵を犯す興奮は……一人寂しく擦る自慰よりも格別なのでは……？」"
translation = "「어떠신가요, 얄미운 적을 범하는 흥분은…… 혼자 외롭게 비비는 자위보다 각별하지 않나요……?」"

[[dialogue]]
speaker = "unk"
original = "悔しいけれど、認めざるを得ない。ヴァレリーの熱くて柔らかい膣肉の感触に体が悦んでいる。"
translation = "분하지만 인정할 수밖에 없다. 발레리의 뜨겁고 부드러운 질 고기의 감촉에 몸이 기뻐하고 있다."

[[dialogue]]
speaker = "unk"
original = "緩やかながらも腰が動き出してしまうのを止められなかった。"
translation = "완만하게나마 허리가 움직이기 시작하는 것을 멈출 수 없었다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぅ、あっ……あはぁっ……私の<ruby>膣内<rt>なか</rt></ruby>を前後する度、より硬く、熱く、なってますね……！」"
translation = "「음으, 앗…… 아하아…… 제 질 내부를 오갈 때마다 더욱 딱딱하고 뜨거워지고 있어요……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「抵抗できない私のおま○こに、苛立ったおち○ちんをぶちこみ、好き放題に犯すのは、そんなに興奮しますか……？」"
translation = "「저항할 수 없는 제 보지에 화가 난 자지를 처박고 마음껏 범하는 건 그렇게 흥분되나요……?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「なるほど、無抵抗の私を虐めるのがあなたの性癖ですか……？\u3000あなたも私に負けず劣らずの変態ではないですか……仲間がいて嬉しいですね、フフフフフ<emoji=heart04>」"
translation = "「과연, 무저항인 저를 괴롭히는 게 당신의 성벽인가요……? 당신도 저 못지않은 변태 아닌가요…… 동료가 생겨서 기쁘네요, 후후후후후♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「えぇ、えぇ、もちろん、私もこの上なく、興奮していますよっ……んんっ<emoji=heart04>」"
translation = "「네, 네, 물론 저도 더할 나위 없이 흥분하고 있답니다…… 응으♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「なにぶん初めてですからね、おま○こが裂けるような痛みがありますが……それすらも心地良い……！」"
translation = "「아무래도 처음이니까요, 보지가 찢어지는 듯한 통증이 있습니다만…… 그것조차 기분 좋아……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたが与えてくれる痛みならば、どんな痛みであろうとも快感に置換できるのが私ですからね」"
translation = "「당신이 주는 고통이라면 어떤 고통이라도 쾌감으로 치환할 수 있는 게 저니까요.」"

[[dialogue]]
speaker = "unk"
original = "荒々しく腰を振る度、四肢を拘束され、抵抗できないヴァレリーは、唯一自由な膣肉でもって、俺のペニスを責め立てる。"
translation = "거칠게 허리를 흔들 때마다 사지가 구속되어 저항할 수 없는 발레리는 유일하게 자유로운 질 근육으로 내 자지를 압박해왔다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「んふ、はぁ、おま○こをほじるだけで満足なのですか……？\u3000それだけがセックスではないでしょうに」"
translation = "「음후, 하아, 보지를 쑤시는 것만으로 만족하는 건가요……? 그것만이 섹스는 아닐 텐데 말이죠.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「誰にも許したことのないこの唇も、突き入れる度に揺れる乳房も、あなたがしたいように犯せばいいんです」"
translation = "「누구에게도 허락한 적 없는 이 입술도, 찔러넣을 때마다 흔들리는 유방도 당신이 하고 싶은 대로 범하면 되는 거예요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「さ、どうされます……？」"
translation = "「자, 어떻게 하실 건가요……?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ああ、あなたの顔がこんなにも近くに……<emoji=heart04>\u3000んぅ、んっ、んぅちゅ……んぅむっ……！？」"
translation = "「아아, 당신의 얼굴이 이렇게나 가까이에……♥ 음으, 응, 음으츄…… 음으무윽……!?」"

[[dialogue]]
speaker = "unk"
original = "俺を煽ってくる唇を塞ごうとヴァレリーの顔に近づけ、舌を唇の隙間に差し入れる。"
translation = "나를 부추기는 입술을 막으려 발레리의 얼굴에 다가가 혀를 입술 틈새로 끼워 넣는다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぅぶっ……！\u3000んぢゅっ、ちゅぴ、ちゅぷる……れぇろ、れろっ、れろろぉんっ<emoji=heart04>」"
translation = "「음으부윽……! 응쥬윽, 츄피, 츄푸루…… 레에로, 레로, 레로로오옹♥」"

[[dialogue]]
speaker = "unk"
original = "舌を噛み切られるのではないかという不安すら抱かずに、唾液にまみれたヴァレリーの舌を舐め回す。"
translation = "혀를 깨물리는 것 아니냐는 불안조차 품지 않고 타액에 젖은 발레리의 혀를 핥아 돌린다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「んちゅぴ、私のファーストキスが、ディープキス、になるほわ……ぢゅぱっ、じゅずるっ……じゅるじゅる<emoji=heart04>」"
translation = "「응츄피, 제 첫 키스가 딥 키스가 되다니…… 쥬파앗, 쥬즈루…… 쥬루쥬루♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んちゅばっ、んぅ……こぇが、あなたのツバの味……美味ひぃ、甘露れふ……んぷぁぁん<emoji=heart04>」"
translation = "「응츄바아, 음…… 이헤, 당히늬 침 마앗…… 마히써요, 감로에여…… 음푸아아앙♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ちゅるっ、ちゅりゅれろ、じゅるるるっ<emoji=heart04>\u3000んふっ、はぁ……れろちゅぱっ、ちゅぅっ、じゅる、じゅるるんっ<emoji=heart04>」"
translation = "「츄루, 츄류레로, 쥬루루루♥ 음후, 하아…… 레로츄파, 츄우, 쥬루, 쥬루루운♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んちゅるっ、ちゅば、んふ……キスしていても、おま○こずぽずぽされへまふ……おち○ちんを気持ちよくするのは、止めないんれふね……貪欲な人れす……<emoji=heart04>」"
translation = "「응츄루, 츄바, 음후…… 키스하고 있어도 보지가 벌렁벌렁하게 당하고 이써요…… 자지를 기분 좋게 하는 건 멈추지 않으시네여…… 탐욕스러운 분이에여……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ぢゅるるるっ……れろ、れろ、れろぉ……んぅうぅぅ<emoji=heart04>\u3000もっと……虐めてくらひゃい……！\u3000唇だけでは、なくっ……乳房もぉ……！」"
translation = "「쥬루루루…… 레로, 레로, 레로오…… 음으우우우♥ 더…… 괴롭혀 쥬세여……! 입술뿐만 아니라…… 가슴도오……!」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーの唇に添えていた、唾液をまとわせた舌を、そのまま下へ、下へと。"
translation = "발레리의 입술에 대고 있던 타액이 묻은 혀를 그대로 아래로, 아래로."

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぅひっ……！\u3000あ、あっ、舐められて……んぃひ、ぞくぞくしまひゅっ……！」"
translation = "「음으히익……! 아, 앗, 핥아져서…… 응이히, 소름 돋아여……!」"

[[dialogue]]
speaker = "unk"
original = "細いあごを伝い、噛みつきたくなるような喉を伝い、浮き出た鎖骨を伝い、しっとりと汗ばんだ胸元へ。"
translation = "가느다란 턱을 지나 깨물고 싶어지는 목을 지나 도드라진 쇄골을 지나 촉촉하게 땀방울이 맺힌 가슴팍으로."

[[dialogue]]
speaker = "unk"
original = "ふくよかな乳房の頂点で、乳首は弄ってほしそうにツンと勃起していた。"
translation = "풍만한 유방의 정점에서 유두는 만져달라는 듯 꼿꼿하게 발기해 있었다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「はぁーっ、はぁぁーっ……シて……乳首、イジメて……私の弱点なんです──んぅ！？\u3000んひぃいぃっ！？」"
translation = "「하아─, 하아아─…… 해줘요…… 유두, 괴롭혀줘…… 제 약점이에요── 음으!? 응히이이익!?」"

[[dialogue]]
speaker = "unk"
original = "前歯で甘く噛むと、ヴァレリーの体が電気に撃たれたように大きく跳ね、ペニスを包む膣肉がギュウッと締まった。"
translation = "앞니로 달콤하게 깨물자 발레리의 몸이 전기에 감전된 듯 크게 튀어 올랐고, 자지를 감싸는 질 근육이 꽉 조여졌다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「あぁ……自分で弄るのとは全然違うっ……もっと、おっぱいイジメてくらひゃい……！\u3000もっと強く、吸って……転がして……噛んでっ……！」"
translation = "「아아…… 혼자 만지는 거랑은 전혀 달라…… 더 가슴을 괴롭혀 쥬세여……! 더 강하게 빨고…… 굴리고…… 깨물어줘어……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぅんふぅぅっ……<emoji=heart04>\u3000はっ、はぃ、はひっ……吸われてる……んふぅうんっ！\u3000あっ、はぁぁっ……<emoji=heart04>\u3000きもち、きもぢっ、いいっ、ですっ……！」"
translation = "「음으응후우우……♥ 하아, 하아, 하히…… 빨리고 있어…… 음후으응! 앗, 하아아……♥ 기분, 기부운, 좋아, 요오……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ふぁぁ、はーっ、はひっ……乳首ころころされると、ぞくぞく、しへぇ……はぁーっ……はぁーっ……！」"
translation = "「후아아, 하아, 하히…… 유두가 꼬집히니까 소름이 돋아서어…… 하아─…… 하아─……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「フフ、おち○ちんが<ruby>膣内<rt>なか</rt></ruby>で膨らんでますよ……もっと、動きたいんですよね……容赦なく、媚肉を貪りたいんですよね……？」"
translation = "「후후, 자지가 질 내부에서 부풀어 오르고 있어요…… 더 움직이고 싶은 거죠…… 가차 없이 고기를 탐하고 싶은 거죠……?」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「わかりますよね、私のおま○こが、トロットロに蕩けてしまっているの……<emoji=heart04>」"
translation = "「알고 계시죠, 제 보지가 걸쭉하게 녹아버린 거……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたの執拗な愛撫に……逞しく美しいおち○ちんに負けてしまっているんですよ……<emoji=heart04>」"
translation = "「당신의 집요한 애무에…… 늠름하고 아름다운 자지에게 져버린 거예요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「さぁ、もっと激しく、荒々しい雄の力で、私を屈服させてください……<emoji=heart04>」"
translation = "「자, 더 격렬하고 거친 수컷의 힘으로 저를 굴복시켜주세요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んあぁっ！\u3000あっ、んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁっ、あっ、あっ、あっ、んひぁあぁぁあんっ<emoji=heart04>」"
translation = "「응아앗! 앗, 응앗♥ 앗♥ 하앗, 앗, 앗, 앗, 응히아아아앙♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「おち○ちんっ、<ruby>膣奥<rt>おく</rt></ruby>っ、子宮を、小突いてぇっ……！\u3000何度も、何度も、乱暴にっ……フフ、まるで、理性を失った獣、ですねっ……！」"
translation = "「자지로 질 깊은 곳, 자궁을 찔러줘요……! 몇 번이고, 몇 번이고 난폭하게…… 후후, 마치 이성을 잃은 짐승 같네요!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「いいですよ、とても、いい、はぁっ、あっ、あっあっあっ<emoji=heart04>\u3000気持ち良さそうな顔、されてるじゃないですかっ……<emoji=heart04>」"
translation = "「좋아요, 아주, 좋아, 하앗, 앗, 앗앗앗♥ 기분 좋은 표정을 짓고 계시잖아요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私とのセックスで、あなたをだらしない雄にさせてしまっているのが、最高にたまらないっ……！」"
translation = "「저와의 섹스로 당신을 한심한 수컷으로 만들어버린 게 최고로 짜릿해……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「さぁ、もっと、突いて、突いてっ、お仕置きなんですからっ、おま○こが壊れるまで、貫いてくださいっ<emoji=heart04>」"
translation = "「자, 더 찔러줘요, 찔러줘요, 벌이니까요, 보지가 망가질 때까지 꿰뚫어 주세요♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「くぁはっ！？\u3000あっ、はぁあぁぁんっ<emoji=heart04>\u3000全身で欲望を曝け出してくるあなたは、今まで以上に私好みですっ……！」"
translation = "「크아핫!? 앗, 하아아앙♥ 전신으로 욕망을 드러내는 당신은 그 어느 때보다 제 취향이에요……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あなたも負けちゃってくださいね、セックスの、おま○この快感に堕ちてくださいっ<emoji=heart04>」"
translation = "「당신도 져버리세요, 섹스의, 보지의 쾌감에 타락해버리세요♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぁ、あぁあぁあああぁっ<emoji=heart04><emoji=heart04>\u3000あっ、はぁっ、あぁっ、そうですっ<emoji=heart04>\u3000もっと、もっと叩きつけてっ……本能の赴くまま、私を犯してっ……！」"
translation = "「응아, 아아아아아아앗♥♥ 앗, 하앗, 아앗, 그래요♥ 더, 더 내리쳐줘요…… 본능이 시키는 대로 저를 범해줘요……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あ゛ぁっ、きもぢ、きもぢいいですっ<emoji=heart04>\u3000どうせ、ふたりきりなんです、愉しみましょうっ」"
translation = "「아으윽, 기분, 기분 좋아요♥ 어차피 둘뿐이에요, 즐기자고요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぁあ゛っ！\u3000あっ、んぁんっ！\u3000あっ、はぁっ、ひぃぐっ！？\u3000そこ、そこ、いいっ、いいですっ！」"
translation = "「응아아윽! 앗, 응아앙! 앗, 하앗, 히이익!? 거기, 거기, 좋아, 좋아요!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「痛みよりも、快感が遥かに勝って……なるほど、これは堕ちる……セックスとおち○ちんの虜になってしまいますねっ……<emoji=heart04>」"
translation = "「통증보다 쾌감이 훨씬 앞서서…… 과연, 이건 타락하겠네요…… 섹스와 자지의 포로가 되어버리겠어요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぁ、あっ、あっああぁっ<emoji=heart04>\u3000イク、イッてしまいますっ……目の前が、真っ白にぃ……エクスタシーが、すぐ、そこまでえぇっ……！」"
translation = "「응아, 앗, 앗아아앗♥ 가요, 가버려요…… 눈앞이 하얘져서…… 엑스터시가 바로 앞까지이……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「このまま、遠慮せず、出してください……私の子宮に、中出ししてくださいねっ<emoji=heart04>\u3000絶対に外になんて……抜かせませんからっ……<emoji=heart04>」"
translation = "「이대로 사양 말고 싸주세요…… 제 자궁에 질내사정 해주세요♥ 절대 밖으로는…… 빼지 못하게 할 거니까요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私もイキますからっ、あなたの精を受け止めて……一緒に、一緒にイキますからぁっ……！」"
translation = "「저도 갈 테니까요, 당신의 정액을 받아내며…… 함께, 함께 가요오……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「おま○こで感じてる顔っ、射精する時のイキ顔っ、恥ずかしいところ全て、私に見せてくださいっ<emoji=heart04>」"
translation = "「보지로 느끼는 얼굴, 사정할 때 가는 얼굴, 부끄러운 부분 전부 저에게 보여주세요♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んひゃあんっ！\u3000んぁ、壊れるっ、壊りぇますっ<emoji=heart04>\u3000おち○ちんに、おま○こ壊されっ……！」"
translation = "「응히아앙! 응아, 망가져, 망가져요♥ 자지에 보지가 망가져서……!」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んあ゛ぁっ！？\u3000ビクビクしてっ……イクんですね、<ruby>膣内<rt>なか</rt></ruby>に出してくれるのですねっ<emoji=heart04>\u3000いいですよ、そのまま精液ください、くださぁいっ<emoji=heart04>」"
translation = "「응아아윽!? 파르르 떨면서…… 가시는군요, 질 내부에 싸주시는 거군요♥ 좋아요, 그대로 정액 주세요, 주세용♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んあ゛っ！\u3000あっあ゛はぁあぁぁっ<emoji=heart04>\u3000イクっ、イクっ、イグっ──イッッくぅうぅううぅ～～～ッ<emoji=heart04>」"
translation = "「응아앗! 앗아아하아아앗♥ 가, 간다, 가, 가앗── 가버려어어어어어어~~~엇♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んひぁっ！？\u3000ふぁあぁぁはぁあ～～っ<emoji=heart04>」"
translation = "「응히앗!? 후아아아하아아~~앗♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「くぁあっ！\u3000んぁ、あっ、アッヅぅい……イッてる、んあっ、あ゛っ……おま○こ\u3000イッでうぅぅっ……<emoji=heart04>」"
translation = "「크아앗! 응아, 앗, 뜨거워…… 가고 있어, 응앗, 아앗…… 보지 가버려어어……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「はぁっ、はぁーっ、きもぢいい……っ<emoji=heart04>\u3000おま○こおかしくっ、おち○ちんに壊されてしまいます……<emoji=heart04>」"
translation = "「하앗, 하아─, 기분 좋아……♥ 보지가 이상해져서 자지에게 망가져 버려요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「フ、フフフ……まだ……まだ搾り出せますよね……？\u3000私の一番深いところで……おち○ちん出し足りなそうに震えてますよ……」"
translation = "「후, 후후후…… 아직…… 아직 짜낼 수 있죠……? 제 가장 깊은 곳에서…… 자지가 덜 싼 것처럼 떨고 있어요……」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「ほら、出してっ、出してくださいっ……もっと、もっとぉ……っ<emoji=heart04>\u3000あなたの子種を、私に、注いでっ……隅々まで、愛しなさい……っ<emoji=heart04>」"
translation = "「자, 내보내요, 내보내줘요…… 더, 더어……♥ 당신의 씨앗을 저에게 부어줘요…… 구석구석까지 사랑하세요……♥」"

[[dialogue]]
speaker = "unk"
original = "達しているヴァレリーのおま○こは、キュンキュンと締めつけて、更なる射精をせがんでくる。"
translation = "오르가슴에 도달한 발레리의 보지는 큥큥거리며 조여와서 더욱 사정하라고 보채온다."

[[dialogue]]
speaker = "unk"
original = "まだ射精中のペニスを子宮口に押しつけ、敏感なままの亀頭を擦りつける。"
translation = "아직 사정 중인 자지를 자궁구에 밀어붙여 민감한 상태인 귀두를 문지른다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「あ、あっ、残りの精子、昇ってきてますね……そうです、ヤればデキるじゃ、ないですかっ……<emoji=heart04>」"
translation = "「아, 앗, 남은 정자들도 올라오고 있네요…… 그래요, 하면 되잖아요……♥」"

[[dialogue]]
speaker = "unk"
original = "ぞわぞわと立て続けに込み上げてきた快楽を、もう一度。"
translation = "오싹오싹하게 연달아 치밀어 오르는 쾌락을 다시 한번."

[[dialogue]]
speaker = "ヴァレリー"
original = "「あ、んぁあっ<emoji=heart04>\u3000また、イキますっ、ふぁ、はぁっ、あっ、あっあっあっあっイクっ、イッぐぅうぅっ<emoji=heart04>」"
translation = "「아, 응아앗♥ 또 가요, 후아, 하앗, 앗, 앗앗앗앗 가버려, 가버려어♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぁあはあぁあぁぁぁぁっ<emoji=heart04>\u3000また子宮にっ……どくんっどくんっと、命の脈動を、感じます……んんっ──んぅふぅぅぅんっ～～～……<emoji=heart04><emoji=heart04>」"
translation = "「응아아하아아아아아앗♥ 또 자궁에…… 두근두근하고 생명의 맥동이 느껴져요…… 응윽── 응으후우우우우우~~~……♥♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「んぁ、はぁっ、はぁーっ、はぁーっ……んぁはぁぁーっ……想像以上の快感、でした……<emoji=heart04>」"
translation = "「응아, 하앗, 하아─, 하아─…… 응아하아아─…… 상상 이상의 쾌감이었어요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「これは何物にも喩え難い悦楽……破滅するまで性の快楽に溺れてしまうのも、わかるというものです……」"
translation = "「이것은 그 무엇과도 비할 바 없는 즐거움…… 파멸할 때까지 성적 쾌락에 빠져버리는 것도 이해가 가네요……」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「はぁっ、はぁっ、セックスは、大変醜くも、美しい行為でした……とても、私好みです……<emoji=heart04>」"
translation = "「하앗, 하앗, 섹스는 매우 추하면서도 아름다운 행위였어요…… 무척 제 취향이에요……♥」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「あっ、駄目ですよ……まだ抜かないでください……この密着感を、もうしばらく味わわせてください……」"
translation = "「앗, 안 돼요…… 아직 빼지 마세요…… 이 밀착감을 조금만 더 맛보게 해주세요……」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「せっかくたっぷりと注いでもらった子種を、溢れさせては、もったいないですからね」"
translation = "「기껏 듬뿍 담아준 씨앗을 흘려버리는 건 아까우니까요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私とあなたは憎み合い、殺し合うべき敵同士だというのに……本気で恋に堕ちてしまいそうでしたよ」"
translation = "「저와 당신은 서로 증오하고 죽여야 할 적일 텐데…… 진심으로 사랑에 빠져버릴 것만 같았어요.」"

[[dialogue]]
speaker = "unk"
original = "行為を終えて、俺はドアの方を振り返った。彼女とセックスをしたというのに、未だドアは硬く閉じたままだ。"
translation = "행위를 마치고 나는 문 쪽을 돌아보았다. 그녀와 섹스를 했는데도 여전히 문은 굳게 닫힌 채였다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「女と愛し合った直後に、他のことに気を取られるのはあまり感心しませんよ。私だけを見ていてください」"
translation = "「여자와 사랑을 나눈 직후에 다른 것에 정신이 팔리는 건 별로 감탄스럽지 않네요. 저만 바라봐주세요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「嘘は言いませんが、一度の性行為で開くと言った覚えはありませんね」"
translation = "「거짓말은 안 하지만, 한 번의 성행위로 열어준다고 말한 기억은 없거든요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「私の体に、もっと深い快感を刻み込んでください」"
translation = "「제 몸에 더 깊은 쾌감을 새겨주세요.」"

[[dialogue]]
speaker = "ヴァレリー"
original = "「破壊衝動よりも、もっと、もっと、激しい快感……あなたならば、教えてくれそうです……」"
translation = "「파괴 충동보다도 더, 더욱 격렬한 쾌감…… 당신이라면 가르쳐줄 수 있을 것 같아요……」"

[[dialogue]]
speaker = "unk"
original = "部屋に充満している香気が強まったせいか、それとも、目の前で妖しく微笑むヴァレリーに微かな愛しさを覚えてしまったせいか。"
translation = "방에 가득한 향기가 강해진 탓인지, 아니면 눈앞에서 묘하게 미소 짓는 발레리에게 희미한 애정을 느껴버린 탓인지."

[[dialogue]]
speaker = "unk"
original = "ヴァレリーの膣内に埋まったままのペニスが萎える気配はない。"
translation = "발레리의 질 내부에 묻힌 채인 자지가 시들 기미는 보이지 않는다."

[[dialogue]]
speaker = "ヴァレリー"
original = "「さ、もう一度、いえ、何度でも。めくるめく快楽の宴。お互いの精魂尽き果てるまで、踊り続けましょう……フフ、フフフフフ<emoji=heart04>」"
translation = "「자, 다시 한번, 아니 몇 번이라도. 황홀한 쾌락의 연회. 서로의 정혼이 다할 때까지 계속 춤춰요…… 후후, 후후후후후♥」"

[[dialogue]]
speaker = "unk"
original = "部屋のドアが開くまで一昼夜、俺とヴァレリーはお互いの境目がわからなくなるまで交わり続けた。"
translation = "방문이 열릴 때까지 하루 낮밤 동안, 나와 발레리는 서로의 경계가 무너질 때까지 계속해서 교합했다."

