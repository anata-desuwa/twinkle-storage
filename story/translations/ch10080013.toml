[[dialogue]]
speaker = "unk"
original = "第３話,いつか空の向こうへ,P"
translation = "제3화, 언젠가 하늘 너머로, P"

[[dialogue]]
speaker = "unk"
original = "天界のことについて調べようと、図書館を訪れると──新星学園の司書であるウィステリアさんが声をかけてきてくれた。"
translation = "천계에 대해 조사하려고 도서관을 방문하자──신성학원의 사서인 위스테리아 씨가 말을 걸어 주었다."

[[dialogue]]
speaker = "ウィステリア"
original = "「こんにちは。今日はどうしたの？\u3000なにか調べもの？」"
translation = "「안녕. 오늘은 무슨 일이야? 뭔가 조사할 거라도?」"

[[dialogue]]
speaker = "unk"
original = "天界のことについて、少し"
translation = "천계에 대해서 조금"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふうん。あ、そういえばさっきアナさんも来てたわよ。暇つぶしに勉強しにきたって言ってたから、手伝ってもらったらどう？」"
translation = "「흐음. 아, 그러고 보니 아까 아나 양도 왔었어. 시간 때우러 공부하러 왔다고 했으니까, 도움을 받아보는 건 어때?」"

[[dialogue]]
speaker = "アナ"
original = "「……やっぱり、自重に耐えられない。静止衛星の問題は解決できる。ステーションを中継させれば、いける……？」"
translation = "「……역시, 자중을 견딜 수 없어. 정지 궤도 위성 문제는 해결할 수 있어. 스테이션을 중계시키면, 가능할까……?」"

[[dialogue]]
speaker = "unk"
original = "アナ。勉強の調子はどう？"
translation = "아나. 공부는 잘 돼가?"

[[dialogue]]
speaker = "アナ"
original = "「会長。図書館に来るなんて珍しい。お昼寝しに来たんですか？」"
translation = "「회장. 도서관에 오다니 드문 일이네요. 낮잠 자러 오셨나요?」"

[[dialogue]]
speaker = "アナ"
original = "「……わかります。図書館はお昼寝に最適。静かだし、教室と違って寝てても誰にも注意されない。グッドプレイス」"
translation = "「……이해합니다. 도서관은 낮잠에 최적. 조용하고, 교실과 달라서 자고 있어도 아무도 주의를 주지 않죠. 굿 플레이스」"

[[dialogue]]
speaker = "アナ"
original = "「え、違うんですか。勉強……？」"
translation = "「에, 아닌가요. 공부……?」"

[[dialogue]]
speaker = "アナ"
original = "「勉強でしたら、私が力になれるかもしれません。わからないことがあれば聞いてください。……２年生の範囲もバッチリ予習しています」"
translation = "「공부라면 제가 힘이 되어드릴 수 있을지도 모릅니다. 모르는 게 있으면 물어보세요. ……2학년 범위도 완벽하게 예습하고 있습니다」"

[[dialogue]]
speaker = "unk"
original = "──俺はアナに、天界のことをもっと知りたいと話した。"
translation = "──나는 아나에게, 천계에 대해 더 알고 싶다고 이야기했다."

[[dialogue]]
speaker = "アナ"
original = "「……なるほど。天界についてなら、ちょうどいいです。少し私に付き合ってくれますか？」"
translation = "「……과연. 천계에 대해서라면 마침 잘 됐네요. 잠시 저와 어울려 주시겠습니까?」"

[[dialogue]]
speaker = "アナ"
original = "「今、静止衛星と地表を結ぶ軌道エレベーターを、どうすれば実現可能なのかを考えていたんです」"
translation = "「지금, 정지 궤도 위성과 지표를 잇는 궤도 엘리베이터를 어떻게 하면 실현 가능할지 생각하고 있었거든요」"

[[dialogue]]
speaker = "アナ"
original = "「……はい。会長の想像しているものと同じです。宇宙と地球を結ぶ、長い、長いエレベーターのことです」"
translation = "「……네. 회장님이 상상하시는 것과 같습니다. 우주와 지구를 잇는, 길고 긴 엘리베이터 말입니다」"

[[dialogue]]
speaker = "アナ"
original = "「会長は、天界がどこにあるか知っていますか？」"
translation = "「회장님은 천계가 어디에 있는지 알고 계시나요?」"

[[dialogue]]
speaker = "unk"
original = "……天界って言うくらいだから、空の向こう？"
translation = "……천계라고 할 정도니까, 하늘 너머?"

[[dialogue]]
speaker = "アナ"
original = "「そうですね。概念的にも、位置関係的にも大きく間違っていません。ただ、人間界における宇宙から物理的に繋がっているわけではありません」"
translation = "「그렇네요. 개념적으로도, 위치 관계적으로도 크게 틀리지 않습니다. 다만, 인간계에서의 우주와 물리적으로 연결되어 있는 것은 아닙니다」"

[[dialogue]]
speaker = "unk"
original = "じゃあ軌道エレベーター関係ないんじゃ……"
translation = "그럼 궤도 엘리베이터랑 상관없는 거 아냐……"

[[dialogue]]
speaker = "アナ"
original = "「いえ、そうとも言えないことが、最近の研究でわかってきました」"
translation = "「아니요, 꼭 그렇다고도 할 수 없다는 것이 최근 연구로 밝혀졌습니다」"

[[dialogue]]
speaker = "アナ"
original = "「宇宙の果てを旅すれば、天界にたどり着くわけではありませんが……それでも、宇宙は天界に『近い』」"
translation = "「우주의 끝을 여행한다고 해서 천계에 도달하는 것은 아니지만…… 그래도 우주는 천계에 『가깝습니다』」"

[[dialogue]]
speaker = "アナ"
original = "「宇宙に、天界と繋がるアクセスポイントを作ることができれば、もっと天界と人間界の行き来は楽になるはずなんです」"
translation = "「우주에, 천계와 이어지는 액세스 포인트(Access Point)를 만들 수 있다면, 천계와 인간계의 왕래가 훨씬 편해질 거예요」"

[[dialogue]]
speaker = "アナ"
original = "「会長も知っての通り、現在の確立された三界の移動方法は、『穴』を通じて四半期に１回しかできません」"
translation = "「회장님도 아시다시피, 현재 확립된 삼계의 이동 방법은, 『구멍』을 통해 분기에 한 번밖에 할 수 없어요」"

[[dialogue]]
speaker = "アナ"
original = "「しかし、その『穴』を使わない抜け道は、いくつか存在しているという噂です」"
translation = "「하지만, 그 『구멍』을 쓰지 않는 지름길이 몇 군데 존재한다는 소문이 있어요」"

[[dialogue]]
speaker = "アナ"
original = "「抜け道があるのなら、正規のルートも増やせるのではないか……それこそ、気軽に旅行へ行くような、そんな感覚で三界を渡ることも、いつかは可能になるかもしれません」"
translation = "「지름길이 있다면, 정규 루트도 늘릴 수 있지 않을까…… 그러면, 가볍게 여행을 가는 듯한 그런 감각으로 삼계을 건너는 것도, 언젠가는 가능해질지도 몰라요」"

[[dialogue]]
speaker = "アナ"
original = "「……まあ、天界の方々が人間と交流を持ちたがっているかは、微妙なところですけど。私のようなタイプは多分、天使の中でも珍しいので」"
translation = "「……뭐, 천계 분들이 인간과 교류하고 싶어 할지는 미묘한 부분이지만요. 저 같은 타입은 아마 천사 중에서도 드무니까」"

[[dialogue]]
speaker = "unk"
original = "それが、アナの夢なんだな"
translation = "그게 아나의 꿈이구나."

[[dialogue]]
speaker = "アナ"
original = "「夢……そう考えたことはありませんでしたが、そうかもしれません」"
translation = "「꿈…… 그렇게 생각해 본 적은 없었지만, 그럴지도 모르겠네요」"

[[dialogue]]
speaker = "アナ"
original = "「私は天界の、『ウル』という学術都市が出身。だから人間界に興味を持つことができた」"
translation = "「저는 천계의 『우르』라는 학술 도시 출신이에요. 그래서 인간계에 흥미를 가질 수 있었죠」"

[[dialogue]]
speaker = "アナ"
original = "「でも、ほとんどの天使はそうじゃない。ウルで三界について研究している天使はいても、実際に来たことがある天使はほとんどいない」"
translation = "「하지만 대부분의 천사는 그렇지 않아요. 우르에서 삼계에 대해 연구하는 천사는 있어도, 실제로 와 본 적이 있는 천사는 거의 없거든요」"

[[dialogue]]
speaker = "アナ"
original = "「……人間界はとても特殊。魔族もいて、天使もいるような場所はほかにない。人間界に来れば、色々な刺激を受けられる」"
translation = "「……인간계는 매우 특수해요. 마족도 있고, 천사도 있는 장소는 여기 말고는 없죠. 인간계에 오면 여러 가지 자극을 받을 수 있어요」"

[[dialogue]]
speaker = "アナ"
original = "「いつかお互いの世界を気楽に行き来できるようになれば、文化や文明にいい影響を及ぼすと思うし……」"
translation = "「언젠가 서로의 세계를 편하게 왕래할 수 있게 되면, 문화나 문명에 좋은 영향을 끼칠 거라 생각하고……」"

[[dialogue]]
speaker = "アナ"
original = "「それに……人間界がいいところだって、私はみんなに知ってもらいたい」"
translation = "「그리고…… 인간계가 좋은 곳이라는 걸, 저는 모두가 알아줬으면 좋겠어요」"

[[dialogue]]
speaker = "アナ"
original = "「──ふむ。会長も、天界がどういうところなのか気になっていたと？」"
translation = "「──흠. 회장님도 천계가 어떤 곳인지 궁금하셨나요?」"

[[dialogue]]
speaker = "アナ"
original = "「ですが、天界はそんなに楽しいところではありませんよ」"
translation = "「하지만 천계는 그렇게 즐거운 곳은 아니랍니다」"

[[dialogue]]
speaker = "unk"
original = "……そうなの？"
translation = "……그래?"

[[dialogue]]
speaker = "アナ"
original = "「娯楽があまりありませんから。天界にはゲームセンターもありませんし、お菓子屋さんもありません」"
translation = "「오락이 별로 없거든요. 천계에는 게임 센터도 없고, 과자 가게도 없어요」"

[[dialogue]]
speaker = "アナ"
original = "「……そう考えたら、帰りたくなくなってきました」"
translation = "「……그렇게 생각하니, 돌아가기 싫어지네요」"

[[dialogue]]
speaker = "アナ"
original = "「もしかして、和菓子を天界に持ち帰る方法を考えるほうが先？\u3000でも、和菓子は日持ちしないし、どうすれば……」"
translation = "「혹시 화과자를 천계로 가져갈 방법을 생각하는 게 먼저일까요? 하지만 화과자는 오래 보관할 수 없고, 어쩌면 좋지……」"

[[dialogue]]
speaker = "アナ"
original = "「和菓子屋を天界に作れば……でも、職人さんと原材料を確保するためには、やっぱり人間界との交流は持たないと……」"
translation = "「화과자 가게를 천계에 차리면…… 하지만 장인분과 원재료를 확보하려면, 역시 인간계와의 교류는 있어야 하고……」"

[[dialogue]]
speaker = "アナ"
original = "「──うん。決めた」"
translation = "「──응. 결정했어」"

[[dialogue]]
speaker = "アナ"
original = "「私の夢は、天界に和菓子屋さんを作ること。そのために、三界の行き来をよくする」"
translation = "「제 꿈은 천계에 화과자 가게를 차리는 거예요. 그러기 위해서 삼계의 왕래를 원활하게 하겠어요」"

[[dialogue]]
speaker = "unk"
original = "でも、アナらしくていいんじゃないか？"
translation = "그래도 아나다워서 좋지 않아?"

[[dialogue]]
speaker = "unk"
original = "現金だな！"
translation = "속물적이네!"

[[dialogue]]
speaker = "アナ"
original = "「やはり、世界が良くなるためには和菓子屋が必要。美味しいは正義」"
translation = "「역시 세계가 좋아지기 위해서는 화과자 가게가 필요해요. 맛있는 건 정의니까요」"

[[dialogue]]
speaker = "アナ"
original = "「そうと決まれば、会長。私は軌道エレベーターのことについてもっと調べるから、会長はどんな和菓子をメニューにおくべきか検討しておいて欲しい」"
translation = "「그렇게 정했으면, 회장님. 저는 궤도 엘리베이터에 대해 좀 더 조사할 테니까, 회장님은 어떤 화과자를 메뉴로 둘지 검토해 주셨으면 해요」"

[[dialogue]]
speaker = "アナ"
original = "「できれば、モナカと羊羹、あとは金平糖とカステラは置いておいて欲しい。どうしてもというのならカスタードもあり。私は多様性を否定しない」"
translation = "「가능하면 모나카랑 양갱, 그리고 별사탕이랑 카스텔라는 꼭 놔줬으면 좋겠어요. 정 원하신다면 커스터드도 가능해요. 저는 다양성을 부정하지 않으니까요」"

[[dialogue]]
speaker = "unk"
original = "和菓子屋を開くように聞こえるんだけど"
translation = "화과자 가게를 같이 열자는 소리로 들리는데."

[[dialogue]]
speaker = "unk"
original = "なんか、俺とアナで……"
translation = "왠지 나랑 아나가 같이……"

[[dialogue]]
speaker = "アナ"
original = "「そのつもりですが……嫌でしたか？」"
translation = "「그럴 생각입니다만…… 싫으셨나요?」"

[[dialogue]]
speaker = "アナ"
original = "「私は、会長となら楽しそうだと思ったのですが……」"
translation = "「저는 회장님과 함께라면 즐거울 것 같다고 생각했는데……」"

[[dialogue]]
speaker = "unk"
original = "なら、チョコレート味のモナカとか、どう？"
translation = "그럼, 초콜릿 맛 모나카 같은 건 어때?"

[[dialogue]]
speaker = "unk"
original = "なるほど。"
translation = "과연."

[[dialogue]]
speaker = "unk"
original = "俺は提案しつつ、アナの横の席に座る。"
translation = "나는 제안을 하며 아나의 옆자리에 앉았다."

[[dialogue]]
speaker = "アナ"
original = "「邪道ですが、認めます。ですが……」"
translation = "「사도이긴 하지만 인정하죠. 하지만……」"

[[dialogue]]
speaker = "unk"
original = "すると、アナは席から立ち上がって、当たり前のように俺の膝上に移動しつつ──"
translation = "그러자 아나는 자리에서 일어나 당연하다는 듯 내 무릎 위로 이동하면서──"

[[dialogue]]
speaker = "アナ"
original = "「チョコレートには、緑茶じゃなくて、紅茶を出したいですね」"
translation = "「초콜릿에는 녹차가 아니라 홍차를 내놓고 싶네요」"

[[dialogue]]
speaker = "unk"
original = "ちらりと横目で見上げながら、嬉しそうに笑うのだった。"
translation = "슬쩍 곁눈질로 올려다보며 기쁜 듯이 웃는 것이었다."

