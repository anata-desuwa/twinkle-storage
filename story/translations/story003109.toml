[[dialogue]]
speaker = "unk"
original = "元旦から数日後。"
translation = "원단으로부터 며칠 후."

[[dialogue]]
speaker = "リーリア"
original = "「う～ん、これってどういうことなんだろう……？」"
translation = "「으음, 이건 무슨 뜻일까……?」"

[[dialogue]]
speaker = "シズハ"
original = "「あっ！\u3000リーリア先輩、ごきげんよう♪」"
translation = "「앗! 리리아 선배, 안녕하세요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「シズハちゃん！\u3000こんにちマジカル～☆」"
translation = "「시즈하짱! 안녕 매지컬~☆」"

[[dialogue]]
speaker = "unk"
original = "それぞれ学園の寮住まいの２人は、大聖堂カフェテリアで顔を合わせるとすっかり親しげに挨拶を交わす。"
translation = "각자 학원 기숙사에 사는 두 사람은 대성당 카페테리아에서 마주치자 아주 친근하게 인사를 나눈다."

[[dialogue]]
speaker = "シズハ"
original = "「なんだかずっと、考えるような顔でＤＩＳＣの画面と睨めっこしてましたけど、何かありましたか？」"
translation = "「왠지 계속 고민하는 얼굴로 DISC 화면이랑 씨름하고 계시던데 무슨 일 있었나요?」"

[[dialogue]]
speaker = "リーリア"
original = "「うん、実はね～、獅子舞さんから急にＤＩＳＣにメッセージが送られてきたんだけど、なんかちょっと変で……」"
translation = "「응, 사실은 말이야~ 사자탈 씨한테 갑자기 DISC로 메시지가 왔는데 왠지 좀 이상해서……」"

[[dialogue]]
speaker = "リーリア"
original = "「ほら、見て。件名が『魔弾の魔女様へ』で、内容が――」"
translation = "「자, 봐봐. 제목이 『마탄의 마녀님께』고 내용은――」"

[[dialogue]]
speaker = "リーリア"
original = "「『新年の縁をお祝いしたく、貴方にお会いできたら嬉しく思います。お寺にて改めてお待ちしております。ｂｙ獅子舞』って。なんか妙に違和感あるんだよね～」"
translation = "「『새해의 인연을 축하하고 싶어 귀하를 만날 수 있다면 기쁘겠습니다. 절에서 다시 기다리고 있겠습니다. b.y 사자탈』이라고. 왠지 묘하게 위화감이 있단 말이지~」"

[[dialogue]]
speaker = "シズハ"
original = "「獅子舞さんのイメージとは、あまり合わない文面ですね……」"
translation = "「사자탈 씨의 이미지와는 별로 안 어울리는 문구네요……」"

[[dialogue]]
speaker = "リーリア"
original = "「しかも、この後に書かれてる指定の時間が、今日なんだよね……う～ん」"
translation = "「게다가 이 뒤에 적힌 지정된 시간이 오늘이거든…… 으음.」"

[[dialogue]]
speaker = "unk"
original = "一方、その頃──"
translation = "한편, 그 무렵──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サーシャさん、アナ～！\u3000あけましておめでとーっ♪」"
translation = "「사샤 씨, 아나~! 새해 복 많이 받아~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「今年も普通に過ごせるよう、どうぞよろしくお願いします」"
translation = "「올해도 평범하게 지낼 수 있도록 부디 잘 부탁드립니다.」"

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスやマトイと一緒に、アナとサーシャさんに新年の挨拶をする。"
translation = "나는 비너스나 마토이와 함께 아나와 사샤 씨에게 신년 인사를 한다."

[[dialogue]]
speaker = "unk"
original = "２人共、あけましておめでとうございます"
translation = "두 분 다 새해 복 많이 받으세요."

[[dialogue]]
speaker = "サーシャ"
original = "「みんな～、あけましておめでと～♪\u3000お姉ちゃん、とっても会いたかったわ～」"
translation = "「모두들~ 새해 복 많이 받아~♪ 언니는 너무 보고 싶었단다~」"

[[dialogue]]
speaker = "アナ"
original = "「みなさん、今年も星徒会をノープロブレムで頑張っていきましょう」"
translation = "「여러분, 올해도 성도회를 노 프라블럼으로 열심히 해나갑시다.」"

[[dialogue]]
speaker = "unk"
original = "新星学園星徒会のメンバーで集まって、初詣をしようと約束していた日。それが今日だった。"
translation = "신성 학원 성도회 멤버들이 모여서 하츠모데를 하기로 약속했던 날. 그게 오늘이었다."

[[dialogue]]
speaker = "マトイ"
original = "「――へぇ～、ＤＩＳＣのメッセージで簡単には聞いてましたけど、元旦にそんなことがあったんですね。獅子舞と羽根突きなんて、普通じゃないっ！」"
translation = "「――헤에~ DISC 메시지로 대충 듣긴 했지만 원단에 그런 일이 있었군요. 사자탈과 하네츠키라니, 평범하지 않아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうなの～、リーリアちゃんが大活躍でね～。それで私も、先輩としてもっと頑張らなくちゃって、晴れ着フォームを訓練しているの」"
translation = "「그렇단다~ 리리아짱이 대활약해서 말이야~. 그래서 나도 선배로서 더 열심히 해야겠다고 생각해서 설빔 폼을 훈련하고 있어.」"

[[dialogue]]
speaker = "マトイ"
original = "「私は久しぶりに、親戚の神社でトマルと巫女のバイトをしてきました。改めて巫女の仕事をすると、違った景色が見えてくる感じがしますね」"
translation = "「저는 오랜만에 친척 신사에서 토마루와 무녀 아르바이트를 하고 왔습니다. 새삼 무녀 일을 하니 색다른 풍경이 보이는 느낌이네요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私とクロトは星見家と五名門の会合に行ってきたわよ！\u3000今回はクロトが参加したこともあって、前の時よりすごく楽しかったわ♪」"
translation = "「나랑 쿠로토는 호시미 가문과 오명문의 회합에 다녀왔어! 이번엔 쿠로토가 참가한 덕분에 저번보다 훨씬 즐거웠어♪」"

[[dialogue]]
speaker = "アナ"
original = "「ほう、それは気になりますね。特に五名門はどんな顔ぶれが揃っていたのか……後でじっくり話を聞かせてください」"
translation = "「호오, 그거 신경 쓰이는군요. 특히 오명문은 어떤 면면이 모여 있었는지…… 나중에 자세히 들려주세요.」"

[[dialogue]]
speaker = "unk"
original = "そんな風に、お互いに近況報告をし合っていると。"
translation = "그런 식으로 서로 근황 보고를 주고받고 있자니."

[[dialogue]]
speaker = "？？？"
original = "「おや？\u3000おやおや～？\u3000これはこれはこれは！\u3000新年からなんっと、幸先の良い！」"
translation = "「오야? 오야오야~? 이것 참 이것 참! 신년부터 어쩜 이리 운수가 좋은지!」"

[[dialogue]]
speaker = "マトイ"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "ダッチ"
original = "「まさか、こんなところで再会するとは！\u3000緋宮クロト様、お久しぶりです！」"
translation = "「설마 이런 곳에서 재회할 줄이야! 히노미야 쿠로토 님, 오랜만입니다!」"

[[dialogue]]
speaker = "unk"
original = "お前は……ダッチ！？"
translation = "너는…… 닷지!? "

[[dialogue]]
speaker = "ダッチ"
original = "「フフフ！\u3000皆様、あけましておめでとうございます！」"
translation = "「후후후! 여러분, 새해 복 많이 받으세요!」"

[[dialogue]]
speaker = "unk"
original = "振り向くと、そこに立っていたのは頭にハート型の被り物をしたかのような長身の紳士。俺の記憶の中でも強烈な印象を残す、人型のロストアイテムだった。"
translation = "뒤를 돌아보자 그곳에 서 있는 것은 머리에 하트 모양의 탈을 쓴 듯한 장신의 신사. 내 기억 속에서도 강렬한 인상을 남긴 인간형 로스트 아이템이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなた、誰！？\u3000なんだか変な力を感じるわ！」"
translation = "「당신 누구야!? 왠지 이상한 힘이 느껴져!」"

[[dialogue]]
speaker = "ダッチ"
original = "「新星星徒会の皆様は初めまして。私、『欲望』を司るロストアイテム『ダッチ』と申します。改めて、お見知りおきを！」"
translation = "「신성 성도회 여러분은 처음 뵙겠습니다. 저, 『욕망』을 관장하는 로스트 아이템 『닷지』라고 합니다. 다시 한번 잘 부탁드립니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「ダッチって確か……前に会長が巻き込まれた、アステラカジノ事件の！？」"
translation = "「닷지라면 분명…… 예전에 회장님이 휘말렸던 아스테라 카지노 사건의!?」"

[[dialogue]]
speaker = "アナ"
original = "「獅子舞さんと同じ……自我を持ったロストアイテム！」"
translation = "「사자탈 씨와 같은…… 자아를 가진 로스트 아이템!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ダッチさんは、一体何が目的でここへ来たのかしら？」"
translation = "「닷지 씨는 대체 무슨 목적으로 여기 온 걸까~?」"

[[dialogue]]
speaker = "ダッチ"
original = "「ああ、お会いできて光栄です、サーシャ様！\u3000貴方のその抜群のプロポーションは必ずやバニー衣装が似合うと、以前から思っておりました」"
translation = "「아아, 만나 뵙게 되어 영광입니다, 사샤 님! 당신의 그 발군인 프로포션은 반드시 바니 의상이 어울릴 것이라고 예전부터 생각하고 있었습니다.」"

[[dialogue]]
speaker = "ダッチ"
original = "「お近づきの印に、よろしければ試着でもいかがです？\u3000私の力を使えば、余計な手間は一切不要でこのように――」"
translation = "「친해진 기념으로 괜찮으시다면 시착이라도 어떠신지? 제 힘을 쓰면 번거로운 수고 없이 즉석에서 이렇게――」"

[[dialogue]]
speaker = "unk"
original = "ダッチが指をパチンと鳴らすと、俺の体が突然光に包まれて。"
translation = "닷지가 손가락을 딱 하고 튕기자 내 몸이 갑자기 빛에 휩싸였다."

[[dialogue]]
speaker = "マトイ"
original = "「って、会長が女体化してバニー姿になったーーーっ！？」"
translation = "「아니, 회장님이 여체화해서 바니걸 모습이 됐어ーーー!?」"

[[dialogue]]
speaker = "unk"
original = "きゃああぁっ～～～～～！？"
translation = "꺄아아아악~~~~~!? "

[[dialogue]]
speaker = "ダッチ"
original = "「フオオオォ～！\u3000久しぶりに拝見致しましたが、やはり会長様のバニー衣装はこの上なく素晴らしい……！\u3000女体化爆乳美少女バニー、堪りませんねぇ～」"
translation = "「후오오오~! 오랜만에 뵙습니다만 역시 회장님의 바니 의상은 더할 나위 없이 훌륭하군요……! 여체화 폭유 미소녀 바니, 참을 수 없네요~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わかったわ！\u3000こいつ<b>ヘンタイ</b>ね！」"
translation = "「알았어! 이 녀석 <b>변태</b>네!」"

[[dialogue]]
speaker = "ダッチ"
original = "「ありがとうございます！\u3000それは私にとって最高の褒め言葉！\u3000最も強い『欲望』を持つ存在として、誇るべき称号です！」"
translation = "「감사합니다! 그것은 저에게 최고의 찬사! 가장 강한 『욕망』을 가진 존재로서 자랑스러워해야 할 칭호입니다!」"

[[dialogue]]
speaker = "ダッチ"
original = "「いやしかし、今はお正月。ここは１つ、可愛いウサギの耳を付けて、晴れ着バニーに改造するのも悪くありませんねぇ～」"
translation = "「아니 하지만 지금은 정월. 여기서 귀여운 토끼 귀를 달고 설빔 바니로 개조하는 것도 나쁘지 않겠군요~」"

[[dialogue]]
speaker = "ダッチ"
original = "「ああ、そうです！\u3000皆様の晴れ着も同じくアレンジして差し上げますよ。可愛さも強さも盛り盛りにパワーアップすること間違いなしです！」"
translation = "「아아, 그렇습니다! 여러분의 설빔도 똑같이 어레인지해 드리죠. 귀여움도 강함도 듬뿍 파워업할 것이 틀림없습니다!」"

[[dialogue]]
speaker = "獅子舞"
original = "「そんなことは認めんぞ、この俗物が！」"
translation = "「그런 짓은 인정 못 한다, 이 속물놈이!」"

[[dialogue]]
speaker = "unk"
original = "と、そこへ現れたのは、サーシャさんとアナが言っていた正月のロストアイテム『獅子舞』さんであった。"
translation = "거기에 나타난 것은 사샤 씨와 아나가 말했던 정월의 로스트 아이템 『사자탈』 씨였다."

[[dialogue]]
speaker = "ダッチ"
original = "「おやおや、これはこれは！\u3000改めて、初詣に参りましたよ」"
translation = "「오야오야, 이것 참! 다시 한번 하츠모데를 왔답니다.」"

[[dialogue]]
speaker = "獅子舞"
original = "「何をしに来たかは知らんが、崇高なる晴れ着にバニーを加えるなど愚の骨頂！\u3000崇高な料理に、砂糖壺をひっくり返すかのような愚行だ！！」"
translation = "「무얼 하러 왔는지는 모르겠다만 숭고한 설빔에 바니를 더하다니 어리석음의 극치! 숭고한 요리에 설탕 단지를 뒤엎는 것과 같은 우행이다!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「つまり、唐揚げに無断でレモン汁をかけるみたいな感じね！」"
translation = "「그러니까 가라아게에 멋대로 레몬즙을 뿌리는 것 같은 느낌이네!」"

[[dialogue]]
speaker = "マトイ"
original = "「微妙に違うような……？」"
translation = "「미묘하게 다른 것 같은데……?」"

[[dialogue]]
speaker = "ダッチ"
original = "「つれないことを言いますねぇ、<b>兄上</b>。せっかくこうして、可愛い<b>弟</b>が顔を見せにきたというのに！」"
translation = "「야박한 소리를 하시는군요, <b>형님</b>. 기껏 이렇게 귀여운 <b>동생</b>이 얼굴을 보러 왔는데 말이죠!」"

[[dialogue]]
speaker = "unk"
original = "はっ！？\u3000弟！？"
translation = "핫!? 동생!? "

[[dialogue]]
speaker = "獅子舞"
original = "「……そうだ。吾輩とダッチは同じ魔女によって作られた、自我を持つ７つのロストアイテム」"
translation = "「……그렇다. 이 몸과 닷지는 같은 마녀에 의해 만들어진 자아를 가진 7개의 로스트 아이템.」"

[[dialogue]]
speaker = "獅子舞"
original = "「認めたくないが、こいつは吾輩の<b>愚弟</b>なのだ……！」"
translation = "「인정하고 싶지 않지만 이놈은 이 몸의 <b>못난</b> <b>아우</b>다……!」"

[[dialogue]]
speaker = "アナ"
original = "「衝撃の事実……！」"
translation = "「충격적인 사실……!」"

[[dialogue]]
speaker = "ダッチ"
original = "「ああ、そうです！\u3000せっかくのお正月ですし、ここは我らの<ruby>主<rt>あるじ</rt></ruby>が好きだった羽根突きで勝負いたしませんか？」"
translation = "「아아, 그렇습니다! 기왕 정월이니 여기서 우리 주인께서 좋아하셨던 하네츠키로 승부하지 않겠습니까?」"

[[dialogue]]
speaker = "ダッチ"
original = "「そして、私の欲望の力が勝利した暁には、皆様に晴れ着バニーを着て頂くというルールで！！」"
translation = "「그리고 제 욕망의 힘이 승리했을 때는 여러분이 설빔 바니를 입어주시는 룰로!!」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふざけるな俗物め。崇高な晴れ着に俗なバニーを混ぜるなど、許されざる愚行！\u3000吾輩は絶対に認めん！！」"
translation = "「웃기지 마라 속물놈아. 숭고한 설빔에 속된 바니를 섞다니 용서받지 못할 우행! 이 몸은 절대 인정 못 한다!!」"

[[dialogue]]
speaker = "ダッチ"
original = "「ンン～！\u3000相変わらず兄上は頭が固い。晴れ着にバニーを混ぜることの一体何が悪だと言うのか！」"
translation = "「응응~! 여전히 형님은 머리가 딱딱하시군요. 설빔에 바니를 섞는 게 대체 뭐가 나쁘다는 건지!」"

[[dialogue]]
speaker = "ダッチ"
original = "「多様性のこの時代、晴れ着のみを肯定するその考え方は実に傲慢ですよ、兄上？」"
translation = "「다양성의 이 시대, 설빔만을 긍정하는 그 사고방식은 실로 오만하다고요, 형님?」"

[[dialogue]]
speaker = "獅子舞"
original = "「黙れ、愚弟。欲望のままに好みを他人に押し付けようとするお前とは、決して相容れぬ！」"
translation = "「닥쳐라, 못난 아우야. 욕망대로 취향을 타인에게 강요하려는 너와는 결코 어울릴 수 없다!」"

[[dialogue]]
speaker = "ダッチ"
original = "「ならば、やはり羽根突きで勝負するしかありませんねぇ！\u3000そこまで晴れ着を崇高と仰るのであれば、バニー推しの私に是非、その崇高さを見せてもらいましょう！」"
translation = "「그렇다면 역시 하네츠키로 승부할 수밖에 없겠군요! 그렇게까지 설빔이 숭고하다고 하신다면 바니를 미는 저에게 부디 그 숭고함을 보여주시죠!」"

[[dialogue]]
speaker = "獅子舞"
original = "「望むところだ！\u3000晴れ着の星騎士たちよ、この俗物にお前たちの晴れ着の力を見せつけてやるがいい！」"
translation = "「바라던 바다! 설빔의 성기사들이여, 이 속물놈에게 너희의 설빔의 힘을 보여주도록 해라!」"

[[dialogue]]
speaker = "アナ"
original = "「え、あの……獅子舞さんではなく私たちが戦うんですか？」"
translation = "「에, 저기…… 사자탈 씨가 아니라 저희가 싸우는 건가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、どうやらそういう流れみたいね～」"
translation = "「어머어머, 아무래도 그런 흐름인 것 같네~」"

[[dialogue]]
speaker = "マトイ"
original = "「えっと、私の衣装、正確には晴れ着じゃなくて、巫女なんですけど……」"
translation = "「저기, 제 의상은 정확히는 설빔이 아니라 무녀복인데요……」"

[[dialogue]]
speaker = "獅子舞"
original = "「今だけは晴れ着である！\u3000吾輩がそう認めた！！」"
translation = "「지금만큼은 설빔이다! 이 몸이 그렇게 인정했다!!」"

[[dialogue]]
speaker = "マトイ"
original = "「えぇえええぇっ……！？」"
translation = "「에에에에엑……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よく分からないけど、面白そうね！\u3000その羽根突き勝負、受けて立つわ！」"
translation = "「잘 모르겠지만 재밌어 보이네! 그 하네츠키 승부, 받아주겠어!」"

[[dialogue]]
speaker = "unk"
original = "と、その時、お寺の境内に駆けつける者たちがいた。"
translation = "그때 절 경내로 달려오는 이들이 있었다."

[[dialogue]]
speaker = "リーリア"
original = "「――やけに騒がしいと思ったら、どういう状況ですか、これ！？」"
translation = "「――무지 소란스럽다 했더니 이게 대체 무슨 상황인가요!?」"

[[dialogue]]
speaker = "シズハ"
original = "「会長たちと……なんか変なハート頭の人がいる！？」"
translation = "「회장님들이랑…… 왠지 이상한 하트 머리 사람이 있어!?」"

[[dialogue]]
speaker = "ダッチ"
original = "「フフフ！\u3000来ましたね。お待ちしておりましたよ、<b>魔弾の魔女様</b>」"
translation = "「후후후! 오셨군요. 기다리고 있었습니다, <b>마탄의</b> <b>마녀님</b>.」"

[[dialogue]]
speaker = "unk"
original = "ダッチはリーリアの方へ視線を向けて、嬉しそうに告げるのだった。"
translation = "닷지는 리리아 쪽으로 시선을 돌리며 즐겁게 고했다."

