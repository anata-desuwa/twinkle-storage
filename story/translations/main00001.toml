[[dialogue]]
speaker = "unk"
original = "<size=40>【Vega】</size>"
translation = "<size=40>【Vega】</size>"

[[dialogue]]
speaker = "unk"
original = "滅亡が具現していた。"
translation = "멸망이 구현되어 있었다."

[[dialogue]]
speaker = "unk"
original = "“世界の<emoji=abb><emoji=abb><emoji=abb>”を命じられた<emoji=abb><emoji=abb>は既に魔王の器さえ取り込み、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。"
translation = "“세계의 <emoji=abb><emoji=abb><emoji=abb>”를 명받은 <emoji=abb><emoji=abb>는 이미 마왕의 그릇마저 집어삼키고, 퇴폐한 황야를 여전히 끝나지 않는 폭학에 휘말리게 한다."

[[dialogue]]
speaker = "unk"
original = "創るなら、まず壊す。"
translation = "창조하려면, 먼저 부순다."

[[dialogue]]
speaker = "unk"
original = "単純な道理であっても、それが億万の力で実行されれば世界はひとたまりもない。"
translation = "단순한 도리일지라도, 그것이 억만의 힘으로 실행되면 세계는 순식간에 무너진다."

[[dialogue]]
speaker = "？？？"
original = "「グ……オ……ギ……ギギ……ガ……ゴ……ググ……」"
translation = "「그……오……기……기기……가……고……그그……」"

[[dialogue]]
speaker = "unk"
original = "破壊の化身が唸りを上げる。"
translation = "파괴의 화신이 으르렁거린다."

[[dialogue]]
speaker = "unk"
original = "残された最後の芽を摘むべく、絶望の黒き<ruby>腕<rt>かいな</rt></ruby>が<ruby>颶風<rt>ぐふう</rt></ruby>とともに迸った。"
translation = "남겨진 마지막 싹을 꺾기 위해, 절망의 검은 팔가 구풍과 함께 터져 나왔다."

[[dialogue]]
speaker = "フィオナ"
original = "「（ごめん、エリシア──私のせいで）」"
translation = "「(미안해, 엘리시아──내 탓에)」"

[[dialogue]]
speaker = "unk"
original = "世界を支えていた生命の砦がついに崩れる。"
translation = "세계를 지탱하던 생명의 요새가 마침내 무너진다."

[[dialogue]]
speaker = "unk"
original = "抑えきれないほど膨れ上がった神の残滓は、闇とともにこの宇宙を呑み込んでいった──。"
translation = "억누를 수 없을 만큼 부풀어 오른 신의 잔재는, 어둠과 함께 이 우주를 집어삼켜 나갔다──."

[[dialogue]]
speaker = "unk"
original = "<size=40>【Vega→Altair】</size>"
translation = "<size=40>【Vega→Altair】</size>"

[[dialogue]]
speaker = "ヴィーナス"
original = "「聞きなさい。これは決定事項……この私が命じる限りね」"
translation = "「들으세요. 이건 결정 사항…… 이 내가 명하는 한 말이죠.」"

[[dialogue]]
speaker = "unk"
original = "はつらつな声が凛と響く。"
translation = "활기찬 목소리가 또렷하게 울린다."

[[dialogue]]
speaker = "unk"
original = "たなびく純白のマントが、俺の制服へ装着された。"
translation = "나부끼는 순백의 망토가, 나의 교복에 장착되었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"
translation = "「당신을 오늘부로 이곳, 신성 학원 성도회── 성도 회장으로 임명하겠어요. 그리고」"

[[dialogue]]
speaker = "unk"
original = "憧れていた学園への転入。いくらかのアクシデントくらいは心構えもしていた。"
translation = "동경하던 학원으로의 전입. 약간의 사고 정도는 각오하고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし、こんな展開は予想だにしていなかった。"
translation = "하지만, 이런 전개는 예상조차 하지 못했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"
translation = "「히노미야 쿠로토── 당신은 마왕이 되어, 이 세계를 구하는 거예요!」"

[[dialogue]]
speaker = "クロト"
original = "「…………………………え？」"
translation = "「…………………………에?」"

[[dialogue]]
speaker = "unk"
original = "……一体。"
translation = "……도대체."

[[dialogue]]
speaker = "unk"
original = "どうして、こんなことになったんだっけ──"
translation = "어쩌다가, 이렇게 된 걸까──"

