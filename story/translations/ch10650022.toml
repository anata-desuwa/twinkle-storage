[[dialogue]]
speaker = "unk"
original = "第２話,ブラックサンタのお導き……？,P"
translation = "제2화, 블랙 산타의 인도……? , P"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「聖女さま～！\u3000お祈りしたからプレゼントちょうだ～い」"
translation = "「성녀님~! 기도했으니까 선물 주세요~」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふふ、ちゃんとお祈りできて偉いですね。どうぞお好きなものをおひとつ選んでください」"
translation = "「후후, 기도 잘했네요, 착해요. 자, 좋아하는 걸로 하나 골라보세요」"

[[dialogue]]
speaker_original = "女の子"
speaker_translation = "여자아이"
original = "「は～い。ありがとう、聖女さま～！\u3000またね～！」"
translation = "「네~. 고마워요, 성녀님~! 또 봐요~!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ええ。あなたに女神様の変わらぬご加護が在らんことを。どうか明くる年も心穏やかに過ごせるようお祈りしております」"
translation = "「네. 당신에게 여신님의 변함없는 가호가 있기를. 부디 다가오는 해도 평온하게 보낼 수 있도록 기도할게요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……あ、追加のプレゼント持ってきてくれたの。ありがと、そこ置いといて」"
translation = "「……아, 추가 선물 가져다준 거야. 고마워, 거기 둬」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぅ……それにしたってサンタは大変ね」"
translation = "「후우…… 그건 그렇고 산타는 힘들겠네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしだって子どもの夢の通りのサンタがいるとは本気で思ってないけど、サンタってたった一晩でプレゼントを配って回らなくちゃいけないじゃない？」"
translation = "「나라고 아이들의 꿈속에 나오는 산타가 진짜 있다고 진심으로 믿는 건 아니지만, 산타는 단 하룻밤 만에 선물을 다 돌려야 하잖아?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そりゃ良い子にしか配ろうとしないわけよ。区別なく渡してたらキリがなさすぎるわ」"
translation = "「그러니 착한 아이에게만 주려고 하는 거지. 구분 없이 주다 보면 끝이 없으니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「むしろ極力プレゼントを渡さないようにしてたんじゃないかしら。本人も忘れてるような遠い日の悪戯を槍玉に挙げて、はい君はダメーとか言うのよ」"
translation = "「오히려 가급적 선물을 안 주려고 했던 게 아닐까? 본인도 잊고 있는 먼 옛날의 장난을 꼬투리 잡아서, 자 넌 안 돼~ 같은 소리를 하는 거야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「って……なんて顔してるのよ。冗談よ、冗談。んなことしたら子どもの泣き声でクリスマスが彩られることになっちゃうだろうし」"
translation = "「근데…… 표정이 왜 그래. 농담이야, 농담. 그런 짓을 했다간 아이들의 울음소리로 크리스마스가 물들게 될 테니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、子どものイタズラってどうあっても止められないもんだしね。むしろ道徳心ってのは他愛ないイタズラを経て身につくもんでしょ」"
translation = "「뭐, 아이들의 장난이란 건 어떻게 해도 멈출 수 없는 법이고. 오히려 도덕심이란 건 사소한 장난을 거치며 몸에 익히는 거잖아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「子どものあれこれは大目に見てやんなくちゃ。その上で『あなたは良い子ですよ』ってプレゼント渡してやった方が逆に自省心が働くってものよ」"
translation = "「아이들의 이런저런 일은 눈감아줘야지. 그 위에서 『당신은 착한 아이예요』라며 선물을 주는 편이 오히려 자성심이 생기는 법이야」"

[[dialogue]]
speaker = "unk"
original = "イレーナが大人なことを言ってる……"
translation = "이레나가 어른스러운 말을 하고 있어……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うっさいわね、あたしは元から大人よ！」"
translation = "「시끄러워, 난 원래 어른이야!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたも子どもが来たら適当に褒めてプレゼント渡してやりなさい。どんなことがあっても怒っちゃダメよ？」"
translation = "「당신도 아이가 오면 적당히 칭찬하고 선물을 줘. 어떤 일이 있어도 화내면 안 돼?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「子どもってのはまだまだ善悪の区別が付いてないもんなんだから。多少のイタズラなんて可愛いもんだと思って──」"
translation = "「아이라는 건 아직 선악 구분이 안 되는 법이니까. 어느 정도의 장난은 귀엽다고 생각하고──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ぶふっ！？\u3000ちべたっ！？」"
translation = "「부흣!? 차가워!?」"

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「やったぁ～、顔面に雪玉直撃～！\u3000逃げろ逃げろ～！」"
translation = "「앗싸~, 얼굴에 눈덩이 직격~! 도망쳐 도망쳐~!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………。あんのクソガキぃぃ……」"
translation = "「…………. 저 꼬맹이가 진짜……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「コホン、あなたですね？\u3000いま私に雪玉を放たれたのは」"
translation = "「코흠, 당신이군요? 방금 저에게 눈덩이를 던진 게」"

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「うわっ！？\u3000は、離せ～！\u3000悪の親玉みたいな格好してる聖女さまが悪いんじゃないか～！」"
translation = "「우와!? 노, 놓으라고! 악당 두목 같은 차림을 한 성녀님이 나쁜 거잖아~!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「悪の親玉──！？」"
translation = "「악당 두목──!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふふふ、誰が悪の親玉ですか。この装いはブラックサンタを模しているのですよ。あなたのようなわるーい子どもに罰を与えるブラックサンタを、ね」"
translation = "「후후후, 누가 악당 두목이라는 건가요. 이 복장은 블랙 산타를 본뜬 것이랍니다. 당신 같은 나~쁜 아이에게 벌을 주는 블랙 산타를 말이죠」"

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「ひぃ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「人を見た目で判断するとは言語道断。その上、突然雪玉を投げつけるなんて、とてもじゃありませんがプレゼントを渡せるような『良い子』ではありません」"
translation = "「사람을 겉모습으로 판단하다니 언어도단. 게다가 갑자기 눈덩이를 던지다니, 도저히 선물을 줄 수 있는 『착한 아이』가 아니네요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「心苦しいですが、ふふふ、少々罰を与えねばなりませんね」"
translation = "「마음 아프지만, 후후후, 벌을 조금 줘야겠네요」"

[[dialogue]]
speaker = "unk"
original = "まぁまぁ落ち着いて……"
translation = "자자, 진정해……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何言ってるのよ。ここであっさり許しちゃったらつけあがるだけじゃない。大人を舐め腐った根性叩き直してあげないと」"
translation = "「무슨 소리야. 여기서 순순히 용서해주면 기어오를 뿐이잖아. 어른을 우습게 보는 근성을 고쳐줘야지」"

[[dialogue]]
speaker = "unk"
original = "その格好で罰とか言うと背徳感が……"
translation = "그 차림으로 벌을 준다고 하니 배덕감이……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ～～っ！？\u3000だからブラックサンタだって言ってんでしょうにっ。何言い出してるのよ、このエロ会長！」"
translation = "「하아~~!? 그러니까 블랙 산타라고 했잖아. 무슨 소리를 하는 거야, 이 변태 회장!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……ですが、会長さんがそう仰るならいいでしょう。神官イレーナは彼を許します」"
translation = "「……하지만, 회장님이 그렇게 말씀하신다면 좋겠죠. 신관 이레나는 그를 용서하겠습니다」"

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「ほっ……」"
translation = "「휴우……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もうこんなことをしてはいけませんよ。会長さんに感謝してくださいね。どうぞ、プレゼントです」"
translation = "「이제 이런 짓을 하면 안 돼요. 회장님께 감사하세요. 자, 선물이에요」"

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「ありがとうございます、聖女さま、会長さん。もうしませんから……それじゃ、メリークリスマス！」"
translation = "「고맙습니다, 성녀님, 회장님. 다시는 안 그럴게요…… 그럼, 메리 크리스마스!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ええ、メリークリスマス」"
translation = "「네, 메리 크리스마스」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……行きましたね。それでは会長さん、お尻を出してください」"
translation = "「……갔네요. 그럼 회장님, 엉덩이 내미세요」"

[[dialogue]]
speaker = "unk"
original = "ええっ！？"
translation = "에엣!?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まだ未熟な彼の代わりに会長さんが贖うのでしょう？\u3000まさかその覚悟もなしに、私に許せと、そう仰ったわけではないですよね？」"
translation = "「아직 미숙한 그 아이 대신 회장님이 속죄해야겠죠? 설마 그럴 각오도 없이 저에게 용서하라고 말씀하신 건 아니겠죠?」"

[[dialogue]]
speaker = "unk"
original = "は、はい……"
translation = "네, 네……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「では私にお尻を向けてください。……ええ、そうです。見苦しいお尻を見たくないので、ズボンはそのままで結構ですよ」"
translation = "「그럼 저에게 엉덩이를 향하세요. ……네, 그래요. 보기 흉한 엉덩이는 보고 싶지 않으니 바지는 입은 채로 상관없어요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それでは……」"
translation = "「그럼……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「おやおや、痛そうな顔をして……でもいつもモンスターと戦っておられる会長さんにとっては、この程度序の口でしょう？」"
translation = "「어머나, 아픈 표정을 짓고는…… 하지만 항상 몬스터와 싸우시는 회장님께는 이 정도는 식은 죽 먹기겠죠?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「次はもっと強くしますからね……」"
translation = "「다음은 더 세게 할 테니까요……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新星学園の星徒会長ともあろう方がこの程度で悲鳴を上げて情けない。これしきで音を上げては会長のマントが泣きますよ？」"
translation = "「신성 학원의 성도회장이라는 분이 이 정도로 비명을 지르다니 한심하네요. 이 정도로 엄살을 피우면 회장의 망토가 울겠어요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あの子の分まで悔い改めなさい！」"
translation = "「그 아이 몫까지 회개하세요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あらどうしましたか？\u3000その物欲しそうな目は。まるで餌をねだる浅ましい豚のよう……いえ、それでは豚に失礼ですね」"
translation = "「어라, 왜 그러시나요? 그 애타게 바라는 눈빛은. 마치 먹이를 구걸하는 천박한 돼지 같네요…… 아니, 그러면 돼지에게 실례겠군요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「自分から罰を求めるなんて、よほど後ろめたい気持ちがあったのでしょう。聖女である私があなたの罪を清めて差し上げます」"
translation = "「스스로 벌을 원하다니, 어지간히도 찔리는 구석이 있었나 보군요. 성녀인 제가 당신의 죄를 정화해 드리지요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いい声で懺悔しなさい！\u3000ほら、ほら──ほら！」"
translation = "「좋은 목소리로 참회하세요! 자, 자── 자!」"

[[dialogue]]
speaker = "unk"
original = "くぁあああっ！！"
translation = "끄아아아악!!"

[[dialogue]]
speaker = "unk"
original = "イレーナに罰を受ける俺の姿を見た子どもたちは、決してイタズラをするまいと心に誓ったとか……"
translation = "이레나에게 벌을 받는 내 모습을 본 아이들은, 결코 장난을 치지 않겠다고 마음속으로 맹세했다던가……"

[[dialogue]]
speaker = "unk"
original = "そして俺も、イレーナに叩かれたお尻の痛みが忘れられないのだった……"
translation = "그리고 나 또한, 이레나에게 맞은 엉덩이의 통증을 잊을 수 없었다……"

