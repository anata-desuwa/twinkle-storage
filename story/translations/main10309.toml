[[dialogue]]
speaker = "unk"
original = "第９話,これからの誓い,B"
translation = "제9화, 앞으로의 맹세, B"

[[dialogue]]
speaker = "unk"
original = "サーシャの星徒会長の任期が終わりに近づいてきたある日のこと。"
translation = "사샤의 성도회장 임기가 끝나갈 무렵의 어느 날."

[[dialogue]]
speaker = "unk"
original = "夕暮れが差し込む星徒会室で、シルヴィが泣いていた。"
translation = "노을이 비치는 성도회실에서 실비가 울고 있었다."

[[dialogue]]
speaker = "unk"
original = "くしゃくしゃで、まるで何かに押し潰されたあとだった。"
translation = "엉망진창으로, 마치 무언가에 짓눌린 뒤인 것 같았다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「！？\u3000どうしたの、シルヴィ！？\u3000お腹でも痛いの！？」"
translation = "「!? 무슨 일이야, 실비!? 배라도 아픈 거니!?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「もう。慌てすぎだよ、サーシャ……」"
translation = "「정말. 너무 당황하잖아, 사샤……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ごめんなさい……あなたが泣いてるなんて、初めて見たから」"
translation = "「미안해요…… 네가 울고 있는 건 처음 봐서」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ごめん、たいしたことじゃない……わけじゃないんだけど、何から話そうかな」"
translation = "「미안, 별일 아닌 건…… 아닌데, 뭐부터 이야기할까」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「蛍火ちゃんに似てるお姉さんの話は憶えてるよね？」"
translation = "「케이카짱 닮은 언니 이야기는 기억하지?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「そのお姉さん、実は星騎士で、あたしたちの故郷一帯を守ってくれてたんだ……でも、そのお姉さんがモンスターとの戦いで大怪我したって」"
translation = "「그 언니, 사실 성기사라서 우리 고향 일대를 지켜주고 있었거든…… 근데 그 언니가 몬스터랑 싸우다 크게 다쳤대」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「お姉さん、星力もなくなりかけだったのに、無理してたんだ……笑顔で見送ってくれたのに」"
translation = "「언니, 성력도 다 떨어져 가는데 무리하고 있었던 거야…… 웃으면서 배웅해 줬는데」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……あたしの町、誰も守れる人がいなくなっちゃった」"
translation = "「……우리 마을, 이제 지킬 수 있는 사람이 아무도 없게 됐어」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どうして？\u3000あなたの故郷……天界にも分校はあるでしょう？\u3000星騎士だっているはずだわ」"
translation = "「어째서? 네 고향…… 천계에도 분교는 있잖아? 성기사도 분명 있을 거야」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「うん……でも、星力が目覚めたばかりの子が何人かいるだけなんだよ。そのまま戦ったらきっと死んじゃう……」"
translation = "「응…… 하지만 성력이 막 깨어난 애들이 몇 명 있을 뿐이야. 그대로 싸우면 분명 죽을 거야……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（分校と言っても規模は様々。新星学園や流星学園ほど、星騎士の育成機関として十分に機能しているわけじゃないのね）"
translation = "(분교라고 해도 규모는 제각각. 신성학원이나 유성학원만큼 성기사 육성 기관으로서 충분히 기능하고 있는 건 아니구나)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（経験あるシルヴィのお姉さんが戦えないとなると、モンスターに対処しきれなくなってしまう可能性も高いわ）"
translation = "(경험 있는 실비의 언니가 싸울 수 없게 되면, 몬스터에 대처하지 못하게 될 가능성도 커)"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（――けれど、みんなを率いることができる強い星騎士が、援護に向かうことが出来たなら……）"
translation = "(──하지만, 모두를 이끌 수 있는 강한 성기사가 원호를 갈 수 있다면……)"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……どうしよう、サーシャ」"
translation = "「……어떡하지, 사샤」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「落ち着いて、シルヴィ」"
translation = "「진정해, 실비」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「っ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……どうすべきか、もう分かっているんでしょう？」"
translation = "「……어떻게 해야 할지, 이미 알고 있잖아?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「う、うん……」"
translation = "「으, 응……」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「でも、約束したのに！\u3000リクリエが来たら一緒に戦おうって！」"
translation = "「하지만 약속했는걸! 리크리에가 오면 같이 싸우자고!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だからこそよ。あなたは言ったわ。『みんなを守りたい』って。なら、帰りなさい。あなたがみんなを守るのよ」"
translation = "「그러니까 더더욱이야. 너는 말했지. 『모두를 지키고 싶다』고. 그럼 돌아가렴. 네가 모두를 지키는 거야」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「で、でもっ！」"
translation = "「하, 하지만!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「聞いてちょうだい。……あなたが天界に帰ったら、私たちは友達じゃなくなっちゃう？」"
translation = "「들어주렴. ……네가 천계로 돌아가면, 우리는 친구가 아니게 되는 거니?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ううん、ううん、ずっと友達だよっ！」"
translation = "「아니, 아니야, 계속 친구야!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうよね。だから、大丈夫。あなたが私を想ってくれれば、私があなたを想っていれば、どこにいても繋がっているのよ」"
translation = "「그렇지. 그러니까 괜찮아. 네가 나를 생각해 준다면, 내가 너를 생각하고 있다면, 어디에 있어도 이어져 있는 거야」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……サーシャってどきどき難しいこと言うね」"
translation = "「……사샤는 가끔 어려운 말을 하네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、そうかしら？\u3000でも心からの言葉よ～」"
translation = "「후훗, 그럴까? 하지만 진심으로 하는 말이야~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ありがとう、サーシャ。やっぱり持つべきものは友達だね。でも、絶対リクリエ前に帰ってくるから！」"
translation = "「고마워, 사샤. 역시 친구는 두고 볼 일이야. 하지만, 꼭 리크리에 전에 돌아올 테니까!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「行ってらっしゃい、シルヴィ」"
translation = "「다녀오렴, 실비.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「行ってきます！」"
translation = "「다녀오겠습니다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あなたがいればって思ったときも、もちろんあるわ」"
translation = "「네가 곁에 있었으면 좋겠다고 생각한 적도, 물론 있었어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、あなたが故郷で頑張ってるんだって思ったら、私も頑張れたの」"
translation = "「하지만, 네가 고향에서 노력하고 있다고 생각하면, 나도 힘낼 수 있었단다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「みんなからすれば、いつも通りのお姉ちゃんなんだろうけど、それはシルヴィのおかげなのよ～」"
translation = "「남들이 보기엔 평소와 다름없는 언니겠지만, 그건 실비 덕분이야~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「スタンピードでヴィーナスちゃんとレゾフを天秤にかけそうになったとき、あなたを思い出したわ」"
translation = "「스탬피드 때 비너스짱과 레조프를 저울질하게 될 뻔했을 때, 네가 떠올랐어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「なんて残酷な二択だったんだろうって」"
translation = "「얼마나 잔혹한 이지선다였을까 하고.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私こそごめんなさい。あの時になって、初めてあなたの気持ちをちゃんと理解できたわ」"
translation = "「나야말로 미안해. 그때가 되어서야, 비로소 네 마음을 제대로 이해할 수 있었어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、あなたは故郷を守り切って、この新星学園に帰ってきた」"
translation = "「하지만, 너는 고향을 끝까지 지켜내고, 이 신성학원으로 돌아왔지.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「友達として、星騎士として、あなたを誇りに思う。だから、許すも許さないもないのよ～」"
translation = "「친구로서, 성기사로서, 네가 자랑스러워. 그러니까, 용서하고 말고 할 것도 없단다~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ありがとう、シルヴィ。帰ってきてくれて嬉しいわ」"
translation = "「고마워, 실비. 돌아와 줘서 기뻐.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「サーシャ、サーシャぁぁぁぁっ！」"
translation = "「사샤, 사샤아아아아!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら～、今日はほんとに泣き虫さんね～」"
translation = "「어머어머~, 오늘은 정말 울보구나~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね、せっかくだから、またアレやりましょうか？」"
translation = "「그래, 기왕 이렇게 된 거, 다시 ‘그거’ 해볼까?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「……うん、やろう」"
translation = "「……응, 하자.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「我が守護星エウロパよ。我が願いを聞き届け給え」"
translation = "「나의 수호성 에우로파여. 나의 소원을 들어주소서.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「我が守護星アヴィオールよ。我が願いを聞き届け給え」"
translation = "「나의 수호성 아비올이여. 나의 소원을 들어주소서.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私の願いは、世界を知ることです。三界すべてを、あるいはその先があるというなら、遍く見てみたい」"
translation = "「저의 소원은, 세계를 아는 것입니다. 삼계 모두를, 혹은 그 너머가 있다면, 널리 보고 싶어요.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あたしの願いは、みんなを守ることです。あたしの知る人、知るところ、全てを守らせてください」"
translation = "「저의 소원은, 모두를 지키는 것입니다. 제가 아는 사람, 아는 장소, 모두를 지키게 해주세요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「創造主たる女神よ、我が誓いを見届け給え」"
translation = "「창조주이신 여신이여, 나의 맹세를 지켜봐 주소서.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「創造主たる女神よ、我が誓いを見届け給え」"
translation = "「창조주이신 여신이여, 나의 맹세를 지켜봐 주소서.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「星騎士サーシャ。星騎士シルヴィ・グリムランドとともに、この街を、世界を守ります」"
translation = "「성기사 사샤. 성기사 실비 그림랜드와 함께, 이 도시를, 세계를 지키겠습니다.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「星騎士シルヴィ・グリムランド。星騎士サーシャとともに、人々を、世界を守ります」"
translation = "「성기사 실비 그림랜드. 성기사 사샤와 함께, 사람들을, 세계를 지키겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "ふたりの誓いに頷くかのように、二条の流星が夜空を駆け抜けた。"
translation = "두 사람의 맹세에 고개를 끄덕이듯, 두 줄기 유성이 밤하늘을 가로질러 갔다."

