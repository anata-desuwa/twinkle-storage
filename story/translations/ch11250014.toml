[[dialogue]]
speaker = "unk"
original = "第４話,アポロの未来,P"
translation = "제4화, 아폴로의 미래, P"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ひゃっほーーっ！！」"
translation = "「히야호──!!」"

[[dialogue]]
speaker = "unk"
original = "アポロが運転するバイクの後ろに乗り、風を切って走る。"
translation = "아폴로가 운전하는 바이크 뒷좌석에 타서 바람을 가르며 달린다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「免許？\u3000もちろんあるぞ。レジスタンスで偽造したやつだけどな」"
translation = "「면허? 당연히 있지. 레지스탕스에서 위조한 녀석이지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "完全な違法行為！？"
translation = "완전한 불법 행위!?"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ははっ、権力に刃向かうレジスタンスってのはそういうもんだ！」"
translation = "「하하, 권력에 저항하는 레지스탕스라는 건 그런 법이다!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「なぁに、事故なんてしないさ。あたしのライディングテクニックを見せてやる！」"
translation = "「걱정 마, 사고 같은 건 안 내. 나의 라이딩 테크닉을 보여주지!」"

[[dialogue]]
speaker = "unk"
original = "そのまま高速道路を駆け抜け、流星市国近辺を軽く一周した。"
translation = "그대로 고속도로를 달려 나가 유성 시국 근처를 가볍게 한 바퀴 돌았다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ふぅ……久々に思いっきり走れた。やっぱりバイクで走ると気持ちがいい」"
translation = "「후우…… 오랜만에 마음껏 달렸네. 역시 바이크로 달리면 기분이 좋아」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「急に付き合わせて悪かったな。一度お前を乗せて走ってみたかったんだ」"
translation = "「갑자기 불러내서 미안했다. 한번 너를 태우고 달려보고 싶었거든」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「お前も気に入ったか？\u3000ならリノに隠蔽魔法を頼んでまで、魔王を引っ張り出した甲斐があったってもんだ」"
translation = "「너도 맘에 들었냐? 그렇다면 리노에게 은폐 마법을 부탁하면서까지 마왕을 끌고 나온 보람이 있군」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「魔王たちがデネブに来たのは事故だったが……正直言うと、来てくれてよかったとあたしは思ってる」"
translation = "「마왕 일행이 데네브에 온 건 사고였지만…… 솔직히 말하면, 와줘서 다행이라고 나는 생각하고 있어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「知っての通り、星力は年齢を重ねると使えなくなってしまう。あたしも星騎士としての<b>あがり</b>は近い」"
translation = "「알다시피 성력은 나이를 먹으면 사용할 수 없게 되지. 나도 성기사로서의 <b>끝</b>이 가까워」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「魔王の力も著しく弱体化してしまうだろう。あたしだけじゃルヴィネに勝てないし、いずれ時間切れになっていたはずだ」"
translation = "「마왕의 힘도 현저히 약해져 버리겠지. 나만으로는 루비네에게 이길 수 없고, 결국 시간 초과가 되었을 거야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「その前にお前たちが来てくれて良かった。これで希望を持てる」"
translation = "「그전에 너희가 와줘서 다행이야. 이걸로 희망을 가질 수 있어」"

[[dialogue]]
speaker = "unk"
original = "俺もアポロがいてくれて良かった"
translation = "나도 아폴로가 있어 줘서 다행이야"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ははっ、デネブであたしと再会した時はビックリしたろ？\u3000こんなにナイスバディなお姉さんになってたんだからな」"
translation = "「하하, 데네브에서 나랑 재회했을 땐 깜짝 놀랐지? 이렇게 나이스 바디인 누님이 되어 있었으니까 말이야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……本当にありがとう。あたしがこうして生きてるのは、お前たちがあたしを敵として倒さず、救おうとしてくれたおかげだ」"
translation = "「……정말 고마워. 내가 이렇게 살아있는 건 너희가 나를 적으로서 쓰러뜨리지 않고 구하려고 해준 덕분이다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「おかげで、あたしはちゃんと大人になれた。こんなに大きくなったよ」"
translation = "「덕분에 나는 제대로 어른이 될 수 있었어. 이렇게나 커졌다고」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……うん？\u3000ああ……お前は誰が好きなんだ、ってこの前聞いたな」"
translation = "「……응? 아아…… 너는 누구를 좋아하냐고 저번에 물어봤었지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ま、からかい半分ってやつだ。気にするな。恋を急ぐ必要ない」"
translation = "「뭐, 반은 놀리려던 거다. 신경 쓰지 마. 사랑을 서두를 필요는 없어」"

[[dialogue]]
speaker = "unk"
original = "俺が好きなのはアポロだ"
translation = "내가 좋아하는 건 아폴로야"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「何！？\u3000まさか<ruby>アルタイル<rt>向こう</rt></ruby>のあたしに手を出してたのか……それはさすがに引くぞ……」"
translation = "「뭐!? 설마 저쪽의 나에게 손을 댄 거냐…… 그건 좀 깨는데……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そうじゃない？\u3000好きなのは<ruby>デネブ<rt>こっち</rt></ruby>のアポロ……？」"
translation = "「그렇지 않아? 좋아하는 건 데네브의 아폴로……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「って、あたしぃ～～っ！！？」"
translation = "「그건, 나잖아어어~~!!?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「魔王は年上好きだったのか……？\u3000それとも体か？\u3000やっぱり胸が大きい方がいいのか……？」"
translation = "「마왕은 연상 취향이었던 건가……? 아니면 몸인가? 역시 가슴이 큰 편이 좋은 건가……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……大人として頼りになるところが好き？\u3000バイクに乗るところがかっこよくて好き？\u3000料理が上手いところが好き？」"
translation = "「……어른으로서 의지가 되는 면이 좋아? 바이크를 타는 모습이 멋있어서 좋아? 요리를 잘하는 점이 좋아?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ずっと流星ライダーが好きなところが好き？\u3000レジスタンスとして諦めず戦い続けているところが好き？」"
translation = "「계속 유성 라이더를 좋아하는 점이 좋아? 레지스탕스로서 포기하지 않고 계속 싸워나가는 점이 좋아?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「わ、わかったから、そんなに好きばっかり言うな！\u3000照れるだろうがっ！」"
translation = "「아, 알았으니까 그렇게 좋아한다는 말만 하지 마! 부끄럽잖아!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そりゃ大人の余裕もなくなるさ……レジスタンスとして隠れて活動していたから、恋愛なんてする暇なんてなかったし」"
translation = "「그야 어른의 여유도 없어지지…… 레지스탕스로서 숨어서 활동하느라 연애 같은 걸 할 틈 따윈 없었으니까」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしだって好きだよ、お前のこと……」"
translation = "「나도 좋아해, 너를……」"

[[dialogue]]
speaker = "unk"
original = "──！！"
translation = "──!!"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「嫌いなわけないだろ。あたしを救うために、あんなに頑張ってくれたんだから」"
translation = "「싫어할 리가 없잖아. 나를 구하기 위해서 그렇게나 노력해 줬으니까」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「こっちでもあたしの夢を応援してくれた。お前はあの時から変わらない、いいやつだ」"
translation = "「이쪽 세계에서도 내 꿈을 응원해 줬어. 너는 그때부터 변하지 않는, 좋은 녀석이야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だいたい好きでもない男の前で、胸が大きくなったとか、女らしくなったとか言うもんか。大人のレディなんだから」"
translation = "「애초에 좋아하지도 않는 남자 앞에서 가슴이 커졌다느니, 여자다워졌다느니 말할 것 같냐. 어른스러운 숙녀니까」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……だけどあたしたちは、好きって気持ちを確かめ合って、それでめでたしめでたしにはならない。文字通り住む世界が違うからな」"
translation = "「……하지만 우리들은 서로 좋아하는 마음을 확인했다고 해서, 그걸로 행복하게 잘 살았습니다—가 되지는 않아. 말 그대로 사는 세계가 다르니까」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「魔王はアルタイルに帰るんだろ？」"
translation = "「마왕은 알타이르로 돌아가는 거지?」"

[[dialogue]]
speaker = "unk"
original = "うん、帰らないといけない"
translation = "응, 돌아가야만 해"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……だよな。いつ帰るんだ？」"
translation = "「……그렇겠지. 언제 돌아가는데?」"

[[dialogue]]
speaker = "unk"
original = "まだわからない"
translation = "아직 모르겠어"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そりゃそうか。でもきっと、急に来たように、急に帰るんだろうな」"
translation = "「그렇구나. 하지만 분명, 갑자기 온 것처럼 갑자기 돌아가 버리겠지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ちょっとじっとしてろ」"
translation = "「잠시 가만히 있어 봐」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……ちゅ」"
translation = "「……쪽」"

[[dialogue]]
speaker = "unk"
original = "アポロの顔が近づき、唇同士が触れた。柔らかな感触に体が熱くなる。"
translation = "아폴로의 얼굴이 다가오고, 입술끼리 맞닿았다. 부드러운 감촉에 몸이 뜨거워진다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……どうだ、あたしも大人になっただろ」"
translation = "「……어때, 나도 이제 어른이 됐지」"

[[dialogue]]
speaker = "unk"
original = "アルタイルに帰っても絶対に会いに来るよ"
translation = "알타이르에 돌아가더라도 반드시 만나러 올게"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「言ったな？\u3000来なかったら恨むぞ？」"
translation = "「말했다? 안 오면 원망할 거다?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「約束したからには、不可能だって可能にしてこっちに戻ってこい！\u3000でないとあたしがそっちに乗り込んじゃうからな！」"
translation = "「약속한 이상, 불가능조차 가능케 해서 이쪽으로 돌아와! 안 그러면 내가 그쪽으로 쳐들어갈 테니까!」"

[[dialogue]]
speaker = "unk"
original = "本来出会うはずのなかった俺たちが何度もぶつかり、別れ、再会した。だからきっとまた会える。"
translation = "본래 만날 리 없었던 우리들이 몇 번이고 충돌하고, 헤어지고, 재회했다. 그러니까 분명 다시 만날 수 있다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「流星ライダーアポロにはこういうセリフがあるんだ。『居場所は離れても、心は離れない』──って」"
translation = "「유성 라이더 아폴로에게는 이런 대사가 있어. 『거처는 떨어져 있어도, 마음은 떨어지지 않는다』──라고」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしとお前は、何があってもずっと一緒だ。だから……」"
translation = "「나와 너는 무슨 일이 있어도 평생 함께야. 그러니까……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ん……ちゅっ」"
translation = "「음…… 쪽」"

[[dialogue]]
speaker = "unk"
original = "そしてもう一度キスを交わし、再会を誓い合った。"
translation = "그리고 다시 한번 키스를 나누며 재회를 맹세했다."

