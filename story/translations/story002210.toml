[[dialogue]]
speaker = "unk"
original = "ダッチの支配するアステラカジノから帰還した俺たちは、文字通り空中で投げ出され、九浄家のカジノに尻もちをつく形で帰還した。"
translation = "더치가 지배하는 아스테라 카지노에서 귀환한 우리는, 문자 그대로 공중에서 내동댕이쳐져 쿠죠 가문의 카지노에 엉덩방아를 찧는 형태로 귀환했다."

[[dialogue]]
speaker = "ユーリス"
original = "「みなさん！？\u3000よかった、急にいなくなるから心配してたんですよ──って！？」"
translation = "「여러분!? 다행이다, 갑자기 사라지셔서 걱정했다고요── 앗!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いったぁ～……お尻打った～……！」"
translation = "「아얏…… 엉덩이 찧었어……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「あんちきしょうっ……もっとスマートに送れなかったんですの……！？」"
translation = "「저 빌어먹을 자식…… 좀 더 스마트하게 보내줄 수는 없었던 건가요……!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000突然の状況でも受け身くらい取れなくてはいけませんわ！」"
translation = "「오~홋홋홋! 갑작스러운 상황에서도 낙법 정도는 취할 수 있어야 한다고요!」"

[[dialogue]]
speaker = "ユーリス"
original = "「な、なな、何なんですか、そのハレンチな恰好は──！！？？」"
translation = "「머, 머머, 머예요, 그 파렴치한 차림은──!!??」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あっ、王子様。ただいま～♪\u3000いやー、ちょっと色々あってさ～」"
translation = "「앗, 왕자님. 다녀왔어~♪ 아니 그게, 좀 여러 가지 일이 있어서~」"

[[dialogue]]
speaker = "ユーリス"
original = "「色々あったって……えぇえ……！？」"
translation = "「여러 가지라니…… 에에엑……!?」"

[[dialogue]]
speaker = "unk"
original = "ユーリス、ただいま！"
translation = "유리스, 다녀왔어!"

[[dialogue]]
speaker = "ユーリス"
original = "「あっ、会長！\u3000よかった、キミも無事に──」"
translation = "「앗, 회장! 다행이다, 너도 무사히──」"

[[dialogue]]
speaker = "ユーリス"
original = "「～～～～っ！？」"
translation = "「～～～～!?」"

[[dialogue]]
speaker = "unk"
original = "……ユーリス？"
translation = "……유리스?"

[[dialogue]]
speaker = "ユーリス"
original = "「会長、気は確かか！？\u3000その恰好は一体っ！？」"
translation = "「회장, 정신 나갔어!? 그 차림은 대체 뭐야!?」"

[[dialogue]]
speaker = "unk"
original = "俺の格好……？\u3000うわああああ！？"
translation = "내 차림……? 우와아아아아!?"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ですわっ！？\u3000緋宮会長、女体化は解かれているのに！」"
translation = "「그래요!? 히노미야 회장, 여체화는 풀렸는데!」"

[[dialogue]]
speaker = "セナリィ"
original = "「服装だけバニーのままで、やべぇ絵面ですわ！？」"
translation = "「복장만 바니걸인 채라니, 비주얼이 장난 아니에요거든요!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あははははははっ♪\u3000待って、こんな不意打ち……！」"
translation = "「아하하하하하하♪ 잠깐만, 이런 기습은……!」"

[[dialogue]]
speaker = "ユーリス"
original = "「なんで！？\u3000なんでバニー！？\u3000いきなりどこかに消えちゃうからずっと心配してたのに！」"
translation = "「왜!? 왜 바니걸!? 갑자기 어디론가 사라져버려서 계속 걱정했는데!」"

[[dialogue]]
speaker = "ユーリス"
original = "「戻って来たと思ったら、どうしてそんな気の触れた格好をしてるの！？\u3000意味がわからないんだけど！？」"
translation = "「돌아왔나 싶었더니, 왜 그렇게 정신 나간 차림을 하고 있는 거야!? 의미를 모르겠는데!?」"

[[dialogue]]
speaker = "unk"
original = "これはあの変態の仕業なんだ！！！"
translation = "이건 그 변태가 저지른 짓이야!!!"

[[dialogue]]
speaker = "unk"
original = "違うんだユーリス！"
translation = "아니야 유리스!"

[[dialogue]]
speaker = "ユーリス"
original = "「間違いなく今一番変態なのは会長だよ！？\u3000前！\u3000前を隠して！！\u3000見えちゃいそうだよ～っ！？」"
translation = "「틀림없이 지금 가장 변태인 건 회장이야!? 앞! 앞을 가려!! 보일 것 같단 말이야~!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「というか大変ですわ！\u3000カジノ中が騒がしいと思ったら……失踪者の皆様も、みんなバニー服で帰還してますわ！？」"
translation = "「그보다 큰일이에요! 카지노 안이 소란스럽다 싶었더니…… 실종자분들도 전부 바니걸 복장으로 귀환하고 있어요!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「壮年の紳士の皆様も、全員バニー衣装を着て……でも性別もご年齢も元に戻って……まずいですわ！\u3000カジノ中、阿鼻叫喚でしてよ！？」"
translation = "「장년의 신사분들도 전원 바니 의상을 입고…… 하지만 성별도 나이도 원래대로 돌아와서…… 큰일이에요! 카지노 안이 아비규환이라고요!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あはははははっ♪\u3000無理無理♪\u3000我慢無理っ♪\u3000お腹痛いっ！\u3000あはははっ♪\u3000さいって～なオチ……！」"
translation = "「아하하하하하♪ 무리무리♪ 참는 거 무리♪ 배 아파! 아하하하♪ 최악의 결말이네……!」"

[[dialogue]]
speaker = "unk"
original = "九浄家のカジノで発生する神隠し事件は無事に解決したのだが──その日、カジノは当然のごとく緊急閉店することとなり。"
translation = "쿠죠 가문의 카지노에서 발생한 행방불명 사건은 무사히 해결되었지만── 그날, 카지노는 당연하게도 긴급 폐점하게 되었다."

[[dialogue]]
speaker = "unk"
original = "老若男女を問わず大量のバニーコスプレ客であふれたその日の出来事の一切に、<ruby>緘口令<rt>かんこうれい</rt></ruby>が敷かれることになるのだった──"
translation = "남녀노소를 불문하고 대량의 바니걸 코스프레 손님으로 넘쳐났던 그날의 모든 사건에는 함구령이 내려지게 되는 것이었다──"

