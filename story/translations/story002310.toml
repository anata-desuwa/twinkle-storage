[[dialogue]]
speaker = "unk"
original = "結界内に突入し、その勢いのままコラプサーのアジトになだれ込む。"
translation = "결계 내로 돌입하여 그 기세 그대로 콜랩서의 아지트로 들이닥친다."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「あっ、来てくれたんだ、会長さん！」"
translation = "「앗, 와 줬구나, 회장님!」"

[[dialogue]]
speaker = "unk"
original = "コハルコさん！？\u3000その姿は！？"
translation = "코하루코 씨!? 그 모습은!?"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「先輩からご指導ご鞭撻を頂いてね。マリオンさんと……百目騎さんも来てくれたんだ？」"
translation = "「선배한테 지도 편달을 좀 받았거든. 마리온 씨랑…… 도메키 씨도 와 준 거야?」"

[[dialogue]]
speaker = "レイラ"
original = "「私があなたにしたこと、許されるとは思いません。それでも、一緒に戦わせてください」"
translation = "「제가 당신에게 한 짓, 용서받을 수 있으리라 생각지 않습니다. 그래도 함께 싸우게 해주십시오」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「うん、よろしく。パソコン仲間としてもねっ」"
translation = "「응, 잘 부탁해. 컴퓨터 동료로서도 말이야!」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "（この魔力、まさしく光の魔女のもの。ああ、あの時の赤ん坊が、本当に大きくなりましたね……）"
translation = "(이 마력, 틀림없는 빛의 마녀의 것. 아아, 그때의 아기가 정말 이렇게 컸군요……)"

[[dialogue]]
speaker = "イザベラ"
original = "『どいつもこいつも邪魔をして……！\u3000この役立たず！\u3000力ずくで押さえつけて、今度こそ生贄にしてやる！』"
translation = "『너나 할 것 없이 방해를……! 이 쓸모없는 것! 힘으로 찍어 눌러서 이번에야말로 제물로 삼아주마!』"

[[dialogue]]
speaker = "unk"
original = "！？\u3000あの姿は……！？"
translation = "!? 저 모습은……!?"

[[dialogue]]
speaker = "unk"
original = "かつてフィーニスの塔の中で出会った亡霊と似ている。"
translation = "과거 피니스의 탑 안에서 만났던 망령과 닮았다."

[[dialogue]]
speaker = "unk"
original = "どうして魔女であるイザベラがあの姿に……？"
translation = "어째서 마녀인 이자벨라가 저런 모습으로……?"

[[dialogue]]
speaker = "イザベラ"
original = "『邪魔を……するなぁっ！！』"
translation = "『방해하지…… 마아아!!』"

[[dialogue]]
speaker = "レイラ"
original = "「くっ！？\u3000今の斬撃は、リーナの星術……？\u3000守護星と一緒に星術までくすねるなんて手癖が悪いですよ！」"
translation = "「큭!? 지금 참격은 리나의 성술……? 수호성과 함께 성술까지 훔치다니 손버릇이 나쁘네요!」"

[[dialogue]]
speaker = "イザベラ"
original = "『うるさいうるさいうるさい！\u3000この減らず口がぁっ！』"
translation = "『시끄러워 시끄러워 시끄러워! 이 말대꾸쟁이가!』"

[[dialogue]]
speaker = "レイラ"
original = "「ブラックホール・ディバウアー！」"
translation = "「블랙홀 디바우어!」"

[[dialogue]]
speaker = "イザベラ"
original = "『ブラックホール・ディバウアー！』"
translation = "『블랙홀 디바우어!』"

[[dialogue]]
speaker = "unk"
original = "ブラックホール同士が激突し、衝撃で天井が吹き飛んだ。とてつもない力と力のぶつかり合いだ。"
translation = "블랙홀끼리 격돌하며 충격으로 천장이 날아갔다. 엄청난 힘과 힘의 충돌이다."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「会長さん。イザベラさんは……もう助からないと思う」"
translation = "「회장님. 이자벨라 씨는…… 이제 구할 수 없을 것 같아」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「私、トリュファイナさんの過去を垣間見たの。だから分かる。ラクシスさんみたいに、イザベラさんの魂は汚染されてる」"
translation = "「나, 트류파이나 씨의 과거를 살짝 봤어. 그래서 알아. 라크시스 씨처럼 이자벨라 씨의 영혼은 오염되어 있어」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「イザベラの肉体はとうに死しているはずなのに、コラプサーの力で動いているのです。けれど、死者を殺す術はありません。何か手があればよいのですが……」"
translation = "「이자벨라의 육체는 진즉 죽었을 터인데 콜랩서의 힘으로 움직이고 있는 것입니다. 하지만 죽은 자를 죽일 방법은 없습니다. 무슨 수라도 있으면 좋겠습니다만……」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「私に考えがあります。会長さん、少しだけ時間稼ぎをお願いしていい？\u3000マリオンさんもお願いします」"
translation = "「내게 생각이 있어. 회장님, 잠깐만 시간 좀 벌어줄 수 있어? 마리온 씨도 부탁해」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「かしこまりました。お任せください」"
translation = "「알겠습니다. 맡겨 주십시오」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（問題はリソースだ。本物の光の魔女でも世界樹のバックアップがあってようやく行使できる禁術。私ひとりじゃ発動できない……）"
translation = "(문제는 리소스야. 진짜 빛의 마녀라도 세계수의 백업이 있어야 겨우 행사할 수 있는 금술. 나 혼자서는 발동할 수 없어……)"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（でも、みんなの力を借りられれば……泣いて喚いてでも、助けを求めるんだ）"
translation = "(하지만 모두의 힘을 빌릴 수 있다면…… 울고 불고 해서라도 도움을 요청하는 거야)"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（対アポロ戦のアンテナの応用で、なんとかやれるはず……あのシステム組んだの私だし）"
translation = "(대 아폴로전 안테나의 응용으로 어떻게든 될 거야…… 그 시스템을 짠 건 나니까)"

[[dialogue]]
speaker = "unk"
original = "コハルコさんが、空中に浮かんだコンソールを目にも留まらぬ速度で叩く。"
translation = "코하루코가 공중에 띄워진 콘솔을 눈에 보이지 않는 속도로 두드린다."

[[dialogue]]
speaker = "unk"
original = "同じく空中に投射されたモニターが文字と数字で埋め尽くされていく。"
translation = "마찬가지로 공중에 투사된 모니터가 문자와 숫자로 가득 채워져 간다."

[[dialogue]]
speaker = "レイラ"
original = "「あのソースコードは……！\u3000私も手伝います！」"
translation = "「저 소스 코드는……! 저도 돕겠습니다!」"

[[dialogue]]
speaker = "イザベラ"
original = "『させ……ない……！\u3000ヘヴィアウトレイジ……！！』"
translation = "『하게…… 두지…… 않아……! 헤비 아웃레이지……!!』"

[[dialogue]]
speaker = "unk"
original = "それはこっちの台詞だ！"
translation = "그건 내가 할 대사다!"

[[dialogue]]
speaker = "unk"
original = "闇から生み出された巨大な杭を拳で迎撃する。"
translation = "어둠에서 생겨난 거대한 말뚝을 주먹으로 요격한다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんはやるといえば必ずやる人だ。邪魔はさせない。"
translation = "코하루코 씨는 한다면 반드시 하는 사람이다. 방해하게 두지 않아."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「よし、できた」"
translation = "「좋아, 다 됐다」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「私は新星学園放送委員会委員長、朝比奈コハルコです。みなさん、聞こえますか──」"
translation = "「나는 신성학원 방송위원회 위원장, 아사히나 코하루코입니다. 여러분, 들리시나요──」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "『緊急の連絡です。戦闘中かもしれませんが、どうか聞いてください』"
translation = "『긴급 연락입니다. 전투 중일지도 모르지만 부디 들어주세요』"

[[dialogue]]
speaker = "サーシャ"
original = "「コハルコちゃん、無事だったのね！」"
translation = "「코하루코짱, 무사했구나!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「よかった～！」"
translation = "「다행이야~!」"

[[dialogue]]
speaker = "unk"
original = "コハルコと付き合いの長い２人も救出に動いていたが、アステラとモンスターに阻まれ、合流できずにいたのだ。"
translation = "코하루코와 안 지 오래된 두 사람도 구출을 위해 움직이고 있었지만, 아스텔라와 몬스터에게 가로막혀 합류하지 못하고 있었던 것이다."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "『私は今、先日の学園襲撃を企てたコラプサーの黒幕と対峙しています。ですが、私だけでは力が足りません。みなさんの力を貸してください』"
translation = "『나는 지금 요전의 학원 습격을 꾀한 콜랩서의 흑막과 대치하고 있습니다. 하지만 저만으로는 힘이 부족합니다. 여러분의 힘을 빌려주세요』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "『星騎士アプリにボタンを用意しました。これを押すことで、私に星力を送ることができます』"
translation = "『성기사 앱에 버튼을 준비했습니다. 이걸 누르면 제게 성력을 보낼 수 있습니다』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "『テストしていないもので、想定していないリスクがあります。それでも、ご協力いただけるならボタンを押してください』"
translation = "『테스트하지 않은 거라 상상치 못한 리스크가 있을 수 있습니다. 그래도 협력해 주신다면 버튼을 눌러주세요』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "『どうか、お願いします！』"
translation = "『제발 부탁드립니다!』"

[[dialogue]]
speaker = "シルヴィ"
original = "「これを押せばいいんだね！\u3000よっしゃ！」"
translation = "「이걸 누르면 된다는 거지! 좋아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「我が守護星エウロパよ」"
translation = "「나의 수호성 에우로파여」"

[[dialogue]]
speaker = "シルヴィ"
original = "「我が守護星アヴィオールよ」"
translation = "「나의 수호성 아비오르여」"

[[dialogue]]
speaker = "２人"
original = "「我らの友に力を！！」"
translation = "「우리의 친구에게 힘을!!」"

[[dialogue]]
speaker = "unk"
original = "秋葉原の異常事態に呼応して、流星市国各地でアステラが発生。星騎士たち総出で対応に追われている。"
translation = "아키하바라의 이상 사태에 호응하여 유성시국 곳곳에서 아스텔라가 발생. 성기사들 전체가 대응에 쫓기고 있다."

[[dialogue]]
speaker = "レミカ"
original = "「私たちのライブでは助けてもらったから、今度は私たちの番……！」"
translation = "「우리 라이브 때는 도움을 받았으니까 이번엔 우리 차례……!」"

[[dialogue]]
speaker = "メルエル"
original = "「うん！\u3000届け、私たちの想い！」"
translation = "「응! 닿아라, 우리의 마음!」"

[[dialogue]]
speaker = "ルリエル"
original = "「いつもお世話になってまーす！\u3000ポチッとな！」"
translation = "「항상 신세 지고 있습니다~! 꾹!」"

[[dialogue]]
speaker = "星騎士Ａ"
original = "「この声、聞いたことある……」"
translation = "「이 목소리, 들어본 적 있어……」"

[[dialogue]]
speaker = "星騎士Ｂ"
original = "「当たり前でしょ、いつもオペレートしてくれる人なんだから！」"
translation = "「당연하지, 항상 오퍼레이트 해주는 사람이니까!」"

[[dialogue]]
speaker = "紅明"
original = "「うっしっし。コハルコ委員長を知らないやつがいたらモグリだぜ！\u3000だって委員長はずっとみんなをサポートしてきたんだからな！！」"
translation = "「흐흐흥. 코하루코 위원장을 모르는 녀석이 있다면 가짜지! 위원장은 계속 모두를 서포트해 왔으니까!!」"

[[dialogue]]
speaker = "紅明"
original = "「あたしの星力も送るぜ！\u3000ぶちかませ、コハルコ委員長～！！」"
translation = "「내 성력도 보낸다! 날려 버려, 코하루코 위원장~!!」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「うそ……？\u3000数分で星力がこんなに……みんな、リスクあるってちゃんと聞いてたかな……ちょっと心配になる」"
translation = "「거짓말……? 몇 분 만에 성력이 이렇게나…… 다들 리스크 있다는 말 제대로 들었나…… 조금 걱정되네」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「うん、でも、みんな……大好き」"
translation = "「응, 그래도 모두…… 정말 좋아해」"

[[dialogue]]
speaker = "unk"
original = "コハルコの体が光を帯びた。黄色い光の粒子が降り落ちる。"
translation = "코하루코의 몸이 빛을 띠었다. 노란 빛의 입자가 흩날린다."

[[dialogue]]
speaker = "イザベラ"
original = "『これは……光の魔法！？\u3000やらせない！\u3000やらせない！\u3000私はあの子と……！』"
translation = "『이건…… 빛의 마법!? 안 돼! 안 돼! 나는 그 아이와……!』"

[[dialogue]]
speaker = "レイラ"
original = "「いいえ、これで終わりにしましょう！\u3000魔王さん、人形使いさん、私に続いてください！」"
translation = "「아니요, 이것으로 끝내도록 하죠! 마왕님, 인형술사님, 저를 따라오세요!」"

[[dialogue]]
speaker = "unk"
original = "ああ、行くぞ！"
translation = "아아, 가자!"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「ユニゾン！」"
translation = "「유니존!」"

[[dialogue]]
speaker = "レイラ"
original = "「轟け、星の断末魔！\u3000クライング・クエーサー！！」"
translation = "「울려라, 별의 단말마! 크라잉 퀘이사!!」"

[[dialogue]]
speaker = "イザベラ"
original = "『ぐあああああっ！！』"
translation = "『끄아아아악!!』"

[[dialogue]]
speaker = "レイラ"
original = "「もうやめましょう、イザベラさん。過去にいくら手を伸ばしても、何も掴めはしないんです！\u3000私も、あなたも！」"
translation = "「이제 그만해요, 이자벨라 씨. 과거에 아무리 손을 뻗어도 아무것도 잡을 수 없어요! 저도, 당신도!」"

[[dialogue]]
speaker = "イザベラ"
original = "『邪魔をしないで！\u3000私は、あの子を……！』"
translation = "『방해하지 마! 나는 그 아이를……!』"

[[dialogue]]
speaker = "イザベラ"
original = "『ウェール……っ！！』"
translation = "『웨일……!!』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（正直、イザベラさんの気持ちはちょっと分かっちゃう。私だって家族のいない世界を拒絶しようとしたから……似た者同士なのかも）"
translation = "(솔직히 이자벨라 씨의 기분을 조금은 알 것 같아. 나도 가족 없는 세계를 거부하려 했으니까…… 닮은꼴일지도 몰라)"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（コラプサーの力の代償なのか、リクリエの残滓なのかは分からないけど、もうイザベラさんが汚染から解放されることはないだろう）"
translation = "(콜랩서 힘의 대가인지 리크리에의 잔재인지는 모르겠지만, 이제 이자벨라 씨가 오염에서 해방될 일은 없겠지)"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "（禁じられた魔法を、解き放つのは──今！）"
translation = "(금지된 마법을 해방하는 건── 지금!)"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「光の魔女トリュファイナの名代、朝比奈コハルコが告げる！」"
translation = "「빛의 마녀 트류파이나의 대행, 아사히나 코하루코가 고한다!」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「我らに注ぐ星の光よ……再誕の加護を汝に与えん」"
translation = "「우리에게 쏟아지는 별의 빛이여…… 재탄의 가호를 네게 내리노라」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>」"
translation = "「봉리재탄」"

[[dialogue]]
speaker = "unk"
original = "コハルコから放たれた光が、イザベラを包む。"
translation = "코하루코에게서 뿜어져 나온 빛이 이자벨라를 감싼다."

[[dialogue]]
speaker = "unk"
original = "これは攻撃ではない。もっと残酷で、温かい祝福。命を始まりの姿に戻す、再誕の魔法。"
translation = "이것은 공격이 아니다. 더 잔혹하고 따뜻한 축복. 생명을 시작의 모습으로 되돌리는 재탄의 마법."

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「ずっと前から、生みの親に会えたら、伝えたいことがあったんです」"
translation = "「오래전부터 낳아준 부모님을 만나면 하고 싶은 말이 있었어요」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「温かい家族がいて、面白い友達がいて、たくさんの仲間がいて……生まれてきてよかった。私は幸せですって」"
translation = "「따뜻한 가족이 있고, 재미있는 친구가 있고, 수많은 동료가 있어서…… 태어나길 잘했다고요. 나는 행복하다고요」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「私にはもう家族がいるから、こう呼ぶのは最初で最後です」"
translation = "「내게는 이미 가족이 있으니까 이렇게 부르는 건 처음이자 마지막이에요」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「お母さん……生んでくれて、命をくれて、ありがとう」"
translation = "「엄마…… 낳아줘서, 생명을 줘서 고마워요」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
original = "「さようなら……おやすみなさい」"
translation = "「안녕…… 잘 자요」"

[[dialogue]]
speaker = "イザベラ"
original = "「ここは、どこ……？\u3000って私の家じゃない。ひどい寝ぼけ方ね」"
translation = "「여긴 어디……? 어머 내 집이 아니잖아. 지독하게도 잠이 덜 깼나 보네」"

[[dialogue]]
speaker = "イザベラ"
original = "「それにしても、とんでもない夢を見ていた気がするわ……訳の分かんない小娘たちを操って、世界を滅ぼすような……」"
translation = "「그나저나 터무니없는 꿈을 꾼 것 같아…… 영문 모를 계집애들을 조종해서 세계를 멸망시킨다니……」"

[[dialogue]]
speaker = "イザベラ"
original = "「そして、極めつけはあの子が……いえ、忘れましょう」"
translation = "「그리고 결정적으로 그 아이가…… 아니, 잊어버리자」"

[[dialogue]]
speaker = "unk"
original = "なんといっても、今日は娘が帰ってくる日なのだから。料理は出来ている。好物の果物もある。新しい帽子と杖も用意した。準備は万端だ。"
translation = "뭐니 뭐니 해도 오늘은 딸이 돌아오는 날이니까. 요리는 다 됐다. 좋아하는 과일도 있고, 새 모자와 지팡이도 준비했다. 준비는 완벽하다."

[[dialogue]]
speaker = "イザベラ"
original = "「おかえりなさい……ウェール」"
translation = "「어서 오렴…… 웨일」"

[[dialogue]]
speaker = "unk"
original = "今際に見た、白い夢。愛する娘の笑顔を思い浮かべながら、イザベラは意識を閉じた。"
translation = "죽기 직전에 본 하얀 꿈. 사랑하는 딸의 미소를 떠올리며 이자벨라는 의식을 닫았다."

