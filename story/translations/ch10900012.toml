[[dialogue]]
speaker = "unk"
original = "第２話,妹ライバル,P"
translation = "제2화, 여동생 라이벌, P"

[[dialogue]]
speaker = "unk"
original = "翌日。メイプルはついに、新星学園の転入初日を迎えた。"
translation = "다음 날. 메이플은 드디어 신성학원의 전입 첫날을 맞이했다."

[[dialogue]]
speaker = "unk"
original = "俺は様子が気になって、放課後に足を運ぶと――"
translation = "나는 상황이 궁금해서 방과 후에 발걸음을 옮기자──"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あっ、お兄ちゃん！」"
translation = "「앗, 오빠!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「もしかして様子を見に来てくれたの？\u3000にへへ♪\u3000ありがと～♪」"
translation = "「혹시 보러 와준 거야? 니헤헤♪ 고마워~♪」"

[[dialogue]]
speaker = "unk"
original = "転入初日、どうだった？"
translation = "전입 첫날, 어땠어?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちょっと緊張したけど、楽しかったよ！」"
translation = "「조금 긴장했지만 즐거웠어!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「アナとルルカもいたし、それからリーリアって子とも仲良くなってね、連絡先も交換したんだ♪」"
translation = "「아나와 루루카도 있었고, 그리고 리리아라는 아이랑도 친해져서 연락처도 교환했어♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「じ～っ……」"
translation = "「지긋──」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「むっ、殺気……！」"
translation = "「뭇, 살기……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いや、殺気は出してないよ！？\u3000言いたかっただけでしょ、それ！」"
translation = "「아니, 살기는 내뿜지 않았거든!? 그냥 말해보고 싶었을 뿐이지, 그거!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふふふ、噂をすれば、我が妹ライバルのルルカではないか！\u3000あたしがお兄ちゃんと仲良くしているのが気になる感じかな？」"
translation = "「후후후, 호랑이도 제 말 하면 온다더니, 나의 여동생 라이벌 루루카 아닌가! 내가 오빠랑 사이좋게 지내는 게 신경 쓰이는 모양이지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う……！\u3000それは、教室から出て、たまたま目に入ったから……」"
translation = "「우……! 그건 교실에서 나오다가 우연히 눈에 띄어서……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちょうどいい、ルルカには聞きたいことがあったんだよね。お兄ちゃんも含めて３人で、場所を移して話さない？」"
translation = "「마침 잘 됐어, 루루카한테는 묻고 싶은 게 있었거든. 오빠까지 포함해서 셋이서 자리를 옮겨서 얘기하지 않을래?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「促されるまま、誰もいない空き教室まで来たけど、話って何……？\u3000ていうかメイプルちゃん、また眼帯を付けてるし……」"
translation = "「이끌리는 대로 아무도 없는 빈 교실까지 왔는데, 할 말이란 게 뭐야……? 그보다 메이플짱, 또 안대를 쓰고 있고……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「Ｖチューバ―『ルカルカ』」"
translation = "「버튜버 『루카루카』」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっ……反応したな。昨日言っていたＶチューバーという知らない単語が気になって、ＤＩＳＣで調べてみたのだ」"
translation = "「훗…… 반응했군. 어제 말했던 버튜버라는 모르는 단어가 신경 쓰여서 DISC로 조사해 보았다.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そうして何人かの配信者を見る内に、ルカルカに行き当たった」"
translation = "「그렇게 몇 명의 스트리머를 보는 사이에 루카루카를 발견했지.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「すると、彼女は何故か聞いたことがあるような声をしていて、リスナーを『お兄ちゃん』『お姉ちゃん』と呼んでいるではないか」"
translation = "「그랬더니 그녀는 왠지 들어본 적 있는 듯한 목소리를 하고 있고, 시청자를 『오빠』, 『언니』라고 부르고 있지 않은가.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それでルルカが昨日、似たようなことを言っていたのを思い出したのだ」"
translation = "「그래서 루루카가 어제 비슷한 말을 했던 게 떠오른 것이다.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「い、いや……それはその……」"
translation = "「아, 아니…… 그건 그게……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「Ｖチューバ―、悪くない」"
translation = "「버튜버, 나쁘지 않아.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「何よりもルカルカの歌、あれは素晴らしい」"
translation = "「무엇보다 루카루카의 노래, 그건 훌륭하다.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「我も本気で魔王を目指しているからこそ、伝わってきた。声に魂がこもっていて、本気で歌が好きなのだと」"
translation = "「나도 진심으로 마왕을 목표로 하고 있기에 전해져 왔다. 목소리에 영혼이 담겨 있고, 진심으로 노래를 좋아하는 것이라고.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「故に……ここに宣言する！\u3000我も今日からルカルカのリスナーとなり、応援すると！」"
translation = "「고로…… 여기에 선언한다! 나도 오늘부터 루카루카의 시청자가 되어 응원하겠다고!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あれ……？\u3000えっと……？」"
translation = "「어라……? 어 그러니까……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっふっふ……もうわかっているぞ。ルルカも――ルカルカのリスナーなのだろう？」"
translation = "「훗훗훗…… 이미 다 알고 있다. 루루카도── 루카루카의 시청자지?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だが、そのことを他人には隠していた。それで昨日、お兄ちゃんとの関係も誤魔化したのだ」"
translation = "「하지만 그 사실을 남들에게는 숨기고 있었어. 그래서 어제 오빠와의 관계도 얼버무린 거다.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「つまりは……お兄ちゃんもルカルカのリスナー仲間なのではないか！？」"
translation = "「요컨대…… 오빠도 루카루카의 시청자 동료인 게 아닌가!?」"

[[dialogue]]
speaker = "unk"
original = "ふっ……よくぞ見抜いたな、妹よ"
translation = "훗…… 참으로 잘 간파했구나, 여동생아."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ……！\u3000そ、そう！\u3000実は……あたしはルカルカの熱狂的なファンなの！\u3000お兄ちゃんにはたまたまバレちゃって、それで仲良くなったんだ！」"
translation = "「아……! 마, 맞아! 사실은…… 나는 루카루카의 열광적인 팬이야! 오빠한테는 어쩌다 들켜버려서, 그래서 사이가 좋아진 거야!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いや～、参った。メイプルちゃんにもバレちゃったか～。あは、あはは……！」"
translation = "「이야~ 항복이야. 메이플짱한테도 들켜버렸나~. 아하, 아하하……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「なら、これで妹ライバルとして、憂いはなくなったな」"
translation = "「그렇다면 이걸로 여동생 라이벌로서 근심은 없어졌군.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「これからは同じルカルカを応援する者として、我には隠さず話すがよい」"
translation = "「앞으로는 같이 루카루카를 응원하는 자로서, 나에게는 숨기지 말고 말하도록 해.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ああ、ちなみに、このことを誰かに言いふらしたりする気はないぞ？\u3000魔王はそんな卑怯なことはしない。我が魂に誓って約束しよう」"
translation = "「아아, 참고로 이 일을 누군가에게 떠벌리거나 할 생각은 없다구? 마왕은 그런 비겁한 짓은 안 해. 나의 혼에 맹세코 약속하마」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う、うん……ありがとう。…………えっと」"
translation = "「으, 응…… 고마워. …………저기」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あのさ……！\u3000メイプルちゃん、もしかして……あたしの為に、わかってやってくれてたりする？」"
translation = "「저기 말이야……! 메이플 짱, 혹시…… 나를 위해서, 알고서 해주는 거야?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん？\u3000なんのことだ？\u3000我はただ、ルカルカに敬意を表し、同じファンとして応援しようと思っただけのこと」"
translation = "「음? 무슨 소리지? 나는 그저, 루카루카에게 경의를 표하며, 같은 팬으로서 응원하려고 생각했을 뿐이다」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それに、勘違いをしてもらっては困る。妹ライバルとしては、お兄ちゃん呼びを譲るつもりはないぞ？」"
translation = "「그리고, 착각하면 곤란해. 여동생 라이벌로서는, 오빠라고 부르는 걸 양보할 생각은 없다구?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……そっか。…………ふふっ……♪」"
translation = "「……그렇구나. …………후훗……♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん！\u3000そういうことなら……あたしだって負けないから！\u3000言っておくけど、お兄ちゃんとの付き合いはあたしの方が長いんだからね？」"
translation = "「응! 그렇게 된 거라면…… 나도 지지 않을 거니까! 말해두겠는데, 오빠랑 알고 지낸 건 내가 더 길거든?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっ……お兄ちゃんとは先日、窮地を一緒に切り抜けた仲。魔王を目指す同志の強い絆で、すぐに追い付いてみせよう！」"
translation = "「훗…… 오빠와는 요전번에 곤경을 함께 헤쳐 나온 사이. 마왕을 목표로 하는 동지의 강한 유대로, 금방 따라잡아 보이겠어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なにそれ！？\u3000すごく気になるんだけど……！」"
translation = "「그게 뭐야!? 엄청 신경 쓰이는데……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも、これからはクラスメイトになるわけだし……それは後でゆっくり聞かせてもらおうかなっ」"
translation = "「하지만, 이제부터는 클래스메이트가 되는 거니까…… 그건 나중에 천천히 들려주려나♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「とりあえずまずは……よろしくね！\u3000メイプルちゃん♪」"
translation = "「일단 우선은…… 잘 부탁해! 메이플 짱♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ああ。よろしく、ルルカ。……にへへ♪」"
translation = "「아아. 잘 부탁한다, 루루카. ……니헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "２人は改めて、笑顔で握手を交わす。"
translation = "두 사람은 다시금 웃으며 악수를 나눈다."

[[dialogue]]
speaker = "unk"
original = "それを見て、俺もまた微笑ましい気持ちになるのだった。"
translation = "그것을 보고 나 또한 흐뭇한 기분이 되는 것이었다."

