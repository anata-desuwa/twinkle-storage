[[dialogue]]
speaker = "unk"
original = "第３話,ダイエットだなんて、とんでもない,P"
translation = "제3화, 다이어트라니, 당치도 않다, P"

[[dialogue]]
speaker = "unk"
original = "１００勝メモリアルレース、勝者のカティアの望みは──"
translation = "100승 기념 레이스, 승자인 카티아의 소원은――"

[[dialogue]]
speaker = "カティア"
original = "「ミルフィー先輩のお肌を、むにむにしたいです！」"
translation = "「밀피 선배의 피부를, 말랑말랑 만지고 싶어요!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「えええっ！？」"
translation = "「에에에엣!?」"

[[dialogue]]
speaker = "ヒヨ"
original = "「姐さんに破廉恥なことしようってのかい！？\u3000会長さんじゃあるめえに！」"
translation = "「누님에게 파렴치한 짓을 하겠다는 거냐!? 회장군도 아닐 텐데!」"

[[dialogue]]
speaker = "unk"
original = "破廉恥してないから！"
translation = "파렴치한 짓 안 했거든!"

[[dialogue]]
speaker = "カティア"
original = "「破廉恥じゃないです！\u3000前々からミルフィー先輩のもちもちお肌が気になってて、触ってみたかったんです」"
translation = "「파렴치하지 않아요! 전부터 밀피 선배의 쫀득쫀득한 피부가 신경 쓰여서, 만져보고 싶었어요.」"

[[dialogue]]
speaker = "カティア"
original = "「私だって女の子なんですから……ミルフィー先輩みたいなつやもち肌に憧れちゃいますよー」"
translation = "「저도 여자아이니까요…… 밀피 선배 같은 윤기 있고 쫀득한 피부를 동경하게 돼요.」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、そう？\u3000そう言われると悪い気しないね、えへへへ」"
translation = "「그, 그래? 그렇게 말해주니 기분 나쁘지 않네, 에헤헤헤.」"

[[dialogue]]
speaker = "カティア"
original = "「ヒヨとミルフィー先輩のチームに勝ったんだし、ミルフィー先輩に命令してもＯＫですよね？\u3000もちろん嫌だったら、無理にとは言わないです」"
translation = "「히요와 밀피 선배 팀을 이겼으니, 밀피 선배에게 명령해도 괜찮죠? 물론 싫다면, 억지로 강요하지는 않을 거예요.」"

[[dialogue]]
speaker = "ヒヨ"
original = "「あたしじゃなくって姐さんに手を出そうたぁいい度胸じゃねえか。くっ……これが『ねとられ』ってヤツかい？」"
translation = "「나 말고 누님에게 손을 대려 하다니 배짱 한번 좋네. 큭…… 이게 '빼앗긴다'는 건가?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「う～ん……ちょっと触るくらいなら、いいよ？\u3000負けちゃったんだし、女の子同士だし……」"
translation = "「으음…… 조금 만지는 정도라면, 괜찮아? 져버렸고, 여자아이들끼리니까……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でも、その……あまり変なとこは触らないでね……？\u3000会長くんも見てるし……」"
translation = "「하지만, 그…… 너무 이상한 곳은 만지지 말아 줘……? 회장군도 보고 있고……」"

[[dialogue]]
speaker = "カティア"
original = "「も、もちろんですガオ！\u3000では失礼して、二の腕から……」"
translation = "「므, 물론입니다갸오! 그럼 실례해서, 이두박근부터……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「きゃあんっ<emoji=heart04>」"
translation = "「꺄앙<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
original = "「はふぅ……思ってた通り、ミルフィー先輩のお肌はもちもちで、触り心地抜群だワン……<emoji=heart04>」"
translation = "「하아후…… 생각했던 대로, 밀피 선배의 피부는 쫀득쫀득하고, 촉감이 최고다멍……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「やぁんっ……♪\u3000カティアちゃんの触り方、優しすぎて、くすぐったいよぉ……」"
translation = "「야앙……♪ 카티아짱의 만지는 방식이, 너무 부드러워서, 간지러워어……」"

[[dialogue]]
speaker = "ヒヨ"
original = "「くぅぅ、あたしだってそんなむにむに触ったことないのにワン公め……！\u3000でも、あたしが負けちまったのが悪いんだからなあ……」"
translation = "「크으으, 나도 그렇게 말랑말랑 만져본 적 없는데 멍멍이 녀석……! 하지만, 내가 져버린 게 나쁜 거니까 말이야……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んっ、やんっ<emoji=heart04>\u3000くすぐったいってばぁ……い、いつまで触るのかな……？」"
translation = "「응, 얀<emoji=heart04> 간지럽다고오…… 이, 언제까지 만질 거야……?」"

[[dialogue]]
speaker = "カティア"
original = "「もうちょっと、もうちょっとだけ……どんなケアしてるワン？」"
translation = "「조금만 더, 아주 조금만 더…… 어떤 관리를 하는 거멍?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そんな特別なことはしてないよぉ……お風呂あがりに乳液を塗りこんだり……んっ」"
translation = "「그렇게 특별한 건 안 해애…… 목욕 후에 로션을 발라주거나…… 응!」"

[[dialogue]]
speaker = "カティア"
original = "「はぅ、ちょっとはみ出てる部分が、ぷにぷにの肉球みたいでクセになっちゃう触り心地ですワン……<emoji=heart04>」"
translation = "「하우, 살짝 튀어나온 부분이, 말랑말랑한 고기 방망이 같아서 중독되는 촉감입니다멍……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はみ出てっ……！？」"
translation = "「튀어나왔……!?」"

[[dialogue]]
speaker = "ミルフィー"
original = "（あ、あれ？\u3000もしかして……？\u3000ううん、自分でも、うすうす気づいてたけど……）"
translation = "（아, 어라? 혹시……? 아니, 나도, 어렴풋이 눈치채고 있었지만……）"

[[dialogue]]
speaker = "ミルフィー"
original = "（健康診断の後、しばらく体重計にも乗ってなかったし……私、もしかして、お肉ついちゃってるー！？）"
translation = "（건강검진 후, 한동안 체중계에도 안 올라봤고…… 나, 혹시, 살이 붙어버린 거야!?）"

[[dialogue]]
speaker = "unk"
original = "カティアのお触りはしばらく続いたのだが、その間、ミルフィーはショックを受けたように放心していた。"
translation = "카티아의 스킨십은 한동안 계속되었는데, 그동안 밀피는 충격을 받은 듯 넋을 놓고 있었다."

[[dialogue]]
speaker = "ミルフィー"
original = "「うぅ……やっぱり増えてた……歴代最高だよ……瞬間最大ぷにぷにだよ～……」"
translation = "「으윽…… 역시 늘었어…… 역대 최고야…… 순간 최대 말랑말랑이야～……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「──あっ、会長くん！\u3000な、何かな？」"
translation = "「──앗, 회장군! 뭐, 뭔가요?」"

[[dialogue]]
speaker = "unk"
original = "お昼、まだならランチでもどう？"
translation = "점심, 아직이라면 점심이라도 같이 먹을까?"

[[dialogue]]
speaker = "ミルフィー"
original = "「会長くんからご飯のお誘いっ！？\u3000そんなの嬉しいし、魅力的すぎるけどっ……！」"
translation = "「회장군에게서 밥 먹자는 권유!? 그런 거 기쁘고, 너무 매력적이지만……!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ご、ごめんね！\u3000もうお昼食べちゃったんだ！\u3000もう、お腹いっぱいだからー！」"
translation = "「미, 미안해! 벌써 점심 먹었어! 이미, 배가 부르니까!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あっ、応援団のお手伝いがあるんだった！\u3000そういうわけだから、また今度ね！」"
translation = "「앗, 응원단 돕는 일이 있었지! 그런 이유로, 다음에 보자!」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーが軽く手を振りながら、逃げるように駆けていった。"
translation = "밀피가 가볍게 손을 흔들며, 도망치듯 달려갔다."

[[dialogue]]
speaker = "unk"
original = "それから数日後の放課後。"
translation = "그리고 며칠 후 방과 후."

[[dialogue]]
speaker = "ミルフィー"
original = "「痩せるなら運動！\u3000チアでみんなを元気づけながらカロリー燃焼するなら、一石二鳥だよね！」"
translation = "「살을 빼려면 운동! 치어로 모두를 격려하면서 칼로리를 태운다면, 일석이조잖아!」"

[[dialogue]]
speaker = "フラン"
original = "「おっ、ミルフィー、いいぞ！\u3000今日の応援は、やけに燃えてるな！」"
translation = "「오, 밀피, 좋다! 오늘의 응원은, 유난히 불타오르는군!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はいっ！\u3000Ｖ・Ｉ・Ｃ・Ｔ・Ｏ・Ｒ・Ｙっ！\u3000ここでジャーンプッ──」"
translation = "「네엣! V・I・C・T・O・R・Y! 여기서 점프──」"

[[dialogue]]
speaker = "ミルフィー"
original = "「──あれっ！？\u3000なんか頭がくらくらって……」"
translation = "「──어랏!? 뭔가 머리가 어질어질한데……」"

[[dialogue]]
speaker = "フラン"
original = "「どうした、ミルフィー！？」"
translation = "「무슨 일이야, 밀피!?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「な、なんでもないよ……っ！\u3000だ、大丈夫、大丈夫、ですっ……！」"
translation = "「아, 아무것도 아니야……! 그, 괜찮아, 괜찮아, 요……!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「う、ううん……あれ……？\u3000ベッドの上……？」"
translation = "「으, 으음…… 어라……? 침대 위……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ここって保健室……？\u3000私、アリーナにいたはずなのに……確か、応援の練習してて、目の前がクラクラして──」"
translation = "「여기는 보건실……? 나, 아레나에 있었을 텐데…… 분명, 응원 연습을 하다가, 눈앞이 어질어질해서──」"

[[dialogue]]
speaker = "ミルフィー"
original = "「か、会長くんっ！？\u3000そっか、私、倒れちゃったんだ……もしかして、会長くんがおんぶしてここまで運んでくれたの？」"
translation = "「회, 회장군!? 그렇구나, 나, 쓰러졌구나…… 혹시, 회장군이 업고 여기까지 옮겨준 거야?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「……重かったでしょ」"
translation = "「……무거웠지」"

[[dialogue]]
speaker = "unk"
original = "（背中にやわらかいのが当たってた……）"
translation = "（등에 부드러운 게 닿아 있었지……）"

[[dialogue]]
speaker = "unk"
original = "そんなことないよ"
translation = "그렇지 않아"

[[dialogue]]
speaker = "ミルフィー"
original = "「診断結果は……栄養不足？\u3000うーん……必要最低限の栄養は取ってたつもりなんだけどなぁ……」"
translation = "「진단 결과는…… 영양 부족? 으음…… 필요 최소한의 영양은 섭취했다고 생각했는데 말이지……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ……倒れて、人に迷惑かけちゃうなんて……クラス委員なのにダメダメだね、私」"
translation = "「하아…… 쓰러져서, 남에게 폐를 끼치다니…… 학급 위원인데 엉망진창이네, 나.」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うぅ……迷惑かけたし、会長くんにはちゃんと話しておかないとね」"
translation = "「우으…… 폐를 끼쳤으니, 회장군에게 제대로 이야기해 둬야겠네.」"

[[dialogue]]
speaker = "ミルフィー"
original = "「私ね、今、ダイエット中なんだ。ここ最近、特にお肉がついてきちゃったみたいで……」"
translation = "「나 말이야, 지금, 다이어트 중이야. 최근 들어, 특히 살이 붙은 것 같아서……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「人間界は食べ物も美味しいし、ますますぷくぷくになっちゃって……このままだと私──」"
translation = "「인간계는 음식도 맛있고, 점점 더 포동포동해져서…… 이대로라면 나──」"

[[dialogue]]
speaker = "unk"
original = "ダイエットだなんて、とんでもない！"
translation = "다이어트라니, 당치도 않다!"

[[dialogue]]
speaker = "ミルフィー"
original = "「ええっ！？\u3000私がもっとむちむちになっちゃってもいいの？」"
translation = "「에엣!? 내가 더 통통해져도 괜찮아?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「……嫌いにならない？\u3000本当に？\u3000信じてもいいの……？」"
translation = "「……싫어하지 않을 거야? 정말로? 믿어도 되는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "自然なままのミルフィーが好きなんだから"
translation = "자연스러운 그대로의 밀피가 좋으니까"

[[dialogue]]
speaker = "ミルフィー"
original = "「～～～っ！\u3000会長くんっ……<emoji=heart04>」"
translation = "「～～～윽! 회장군……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あはは、安心したら、お腹鳴っちゃった……」"
translation = "「아하하, 안심했더니, 배에서 꼬르륵 소리가 났어……」"

[[dialogue]]
speaker = "unk"
original = "一緒にご飯食べに行かない？"
translation = "같이 밥 먹으러 가지 않을래?"

[[dialogue]]
speaker = "unk"
original = "ミルフィーさえ良かったら"
translation = "밀피만 괜찮다면"

[[dialogue]]
speaker = "ミルフィー"
original = "「うんっ♪\u3000喜んで！」"
translation = "「응♪ 기꺼이!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「会長くんと一緒に食べるご飯が、世界で一番美味しいもんっ<emoji=heart04>」"
translation = "「회장군과 함께 먹는 밥이, 세상에서 제일 맛있으니까<emoji=heart04>」"

