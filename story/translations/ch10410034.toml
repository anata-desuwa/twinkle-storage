[[dialogue]]
speaker = "unk"
original = "第４話,逆襲の照れさせデート,P"
translation = "제4화, 역습의 부끄럽게 만들기 데이트, P"

[[dialogue]]
speaker = "unk"
original = "ここのところ、マインにはしてやられっぱなしだ。"
translation = "요즘 들어 마인에게 당하기만 한다."

[[dialogue]]
speaker = "unk"
original = "俺はイタズラっ子な彼女に反撃するため、マインを思いきり照れさせるデートプランを考えた──！"
translation = "나는 장난꾸러기인 그녀에게 반격하기 위해 마인을 마음껏 부끄럽게 만들 데이트 플랜을 짰다──!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「遊園地ね～。そういえば会長と遊園地デートはしたことなかったかもね」"
translation = "「놀이공원이네~. 그러고 보니 회장이랑 놀이공원 데이트는 안 해봤던 것 같네」"

[[dialogue]]
speaker = "受付のお姉さん"
original = "「チケット、学生お２人ですね──割引できるものはお持ちですか？」"
translation = "「티켓, 학생 두 분이시네요── 할인받을 수 있는 건 가지고 계신가요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ、学生証ありま──」"
translation = "「아, 학생증 있어──」"

[[dialogue]]
speaker = "unk"
original = "カップル割引でお願いします！"
translation = "커플 할인으로 부탁드려요!"

[[dialogue]]
speaker = "unk"
original = "俺たちカップルなんです！"
translation = "저희 커플이거든요!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ちょぉっ──かか、会長っ！？」"
translation = "「조오금── 회, 회장님!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「お、大きな声で何言ってるのっ？\u3000う、うわー……後ろの子供、めっちゃ笑ってるじゃん……！」"
translation = "「크, 큰 소리로 무슨 소리를 하는 거야? 으, 으와~…… 뒤에 있는 꼬마가 엄청 웃고 있잖아……!」"

[[dialogue]]
speaker = "受付のお姉さん"
original = "「ふふ、カップル割引、かしこまりました。仲がとてもよろしいんですね♪」"
translation = "「후후, 커플 할인 알겠습니다. 사이가 정말 좋으시네요♪」"

[[dialogue]]
speaker = "unk"
original = "（マインのほっぺにキスをする）"
translation = "(마인의 뺨에 키스를 한다)"

[[dialogue]]
speaker = "unk"
original = "ええ、もちろん。ラブラブです"
translation = "네, 물론이죠. 아주 깨가 쏟아집니다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「──んにゃぁぁっ！？」"
translation = "「──냐아아아악!?」"

[[dialogue]]
speaker = "男の子"
original = "「おかーさん！\u3000みてみて！\u3000いま、ちゅーした！！」"
translation = "「엄마! 봐봐! 지금 뽀뽀했어!!」"

[[dialogue]]
speaker = "母親"
original = "「も、もうっ……指さしちゃいけません！」"
translation = "「정, 정말…… 손가락질하면 안 된단다!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ぅ、ぅあ～…………！？」"
translation = "「으, 으아~…………!?」"

[[dialogue]]
speaker = "受付のお姉さん"
original = "「チケットがご用意できました。どうぞデートをお楽しみくださいませ♪」"
translation = "「티켓 준비되었습니다. 즐거운 데이트 되시길 바랍니다♪」"

[[dialogue]]
speaker = "unk"
original = "入り口で計画通りにマインを照れさせた俺は、続いてジェットコースターに彼女を誘った。"
translation = "입구에서 계획대로 마인을 부끄럽게 만든 나는 이어 제트코스터로 그녀를 이끌었다."

[[dialogue]]
speaker = "unk"
original = "見せ場となる最後のループ部分で記念撮影があり、降車後にその写真が受付周りに展示されるポピュラーなジェットコースターなのだが──"
translation = "볼거리가 되는 마지막 루프 부분에서 기념 촬영이 있고 하차 후에 그 사진이 접수처 주변에 전시되는 인기 제트코스터였는데──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「う、うわあぁぁああ──！？\u3000やっぱり！\u3000ばっちり撮られてる……会長ってば何てことをっ……！？」"
translation = "「으, 으와아아아──!? 역시! 제대로 찍혔어…… 회장도 참 무슨 짓을……!?」"

[[dialogue]]
speaker = "若い女性"
original = "「あっ、見てあの２人の写真──ふふ♪\u3000すっごく仲良しなのねー<emoji=heart04>」"
translation = "「앗, 저기 저 두 사람 사진 좀 봐── 후후♪ 엄청 사이좋네❤️」"

[[dialogue]]
speaker = "若い男性"
original = "「あの４回転ループの最中に、ほっぺにキス……！？\u3000あの彼氏、只者じゃないぜ……！？」"
translation = "「저 4회전 루프 와중에 뺨에 키스를……!? 저 남자친구, 보통내기가 아닌데……!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いい、行くよっ！\u3000会長！\u3000アプリに送信とかいらないから！\u3000離れるのー！」"
translation = "「가, 가자! 회장! 앱으로 전송 같은 거 필요 없으니까! 떨어지란 말야ー!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「もう！\u3000チケット買う時も、さっきも！\u3000どうしてあんなことばっかり……！」"
translation = "「정말! 티켓 살 때도 아까도! 왜 저런 짓만 하는 거야……!」"

[[dialogue]]
speaker = "unk"
original = "ごめん。気持ちが抑えきれなかった"
translation = "미안. 마음을 억누를 수가 없었어."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「めっちゃ笑ってるし！\u3000な、なに！？\u3000今日のデートはそういう趣向ってコトなの！？」"
translation = "「엄청 웃고 있고! 머, 뭐야!? 오늘 데이트는 그런 취향이라는 거야!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「確かに最近、からかいすぎたかな～とは思ってたけど……！」"
translation = "「확실히 최근에 너무 놀렸나~ 싶긴 했지만……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私がああやって人前でいじられるの、恥ずかしいから嫌だって分かってて……くぅう～っ……！」"
translation = "「내가 저렇게 사람들 앞에서 놀림당하는 거 부끄러워서 싫어한다는 거 알면서…… 으으으~……!」"

[[dialogue]]
speaker = "unk"
original = "今日は俺の反撃タイムだ！"
translation = "오늘은 나의 반격 타임이야!"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「も、も～照れない！\u3000会長がしてくるのなんて、不意打ちのチューくらいだし！\u3000耐えてみせるから！！」"
translation = "「이, 이제 안 부끄러워해! 회장이 해오는 건 기습 뽀뽀 정도고! 버텨낼 테니까!!」"

[[dialogue]]
speaker = "unk"
original = "その後もマインと一緒に乗ったカボチャの馬車をサプライズでライトアップしてもらったり。"
translation = "그 후로도 마인과 함께 탄 호박 마차를 서프라이즈로 라이트업 받기도 하고."

[[dialogue]]
speaker = "unk"
original = "舞台の観劇は、休憩中にドローンカメラが客席を撮影してくれる。『ラブラブの星騎士のカップルです！\u3000盛大な拍手を！』とお祝いしてもらったり。"
translation = "무대 관극은 휴식 중에 드론 카메라가 객석을 촬영해준다. 『러브러브 성기사 커플입니다! 성대한 박수를!』이라고 축하받기도 하고."

[[dialogue]]
speaker = "unk"
original = "レストランで突如、店内を消灯してサプライズケーキを運んでもらったり。"
translation = "레스토랑에서 갑자기 점내를 소등하고 서프라이즈 케이크를 운반받기도 했다."

[[dialogue]]
speaker = "unk"
original = "遊園地とは本当にいい場所だ。事前に連絡しておけば、様々なことに対応してもらえる──"
translation = "놀이공원이란 정말 좋은 곳이다. 사전에 연락만 해두면 다양한 것들에 대응해주니까──"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「散々な１日だった……真っ白に燃え尽きたよ……」"
translation = "「엉망진창인 하루였어…… 하얗게 불태워버렸어……」"

[[dialogue]]
speaker = "unk"
original = "楽しかったな～"
translation = "즐거웠네~"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「このぉ……ツヤツヤした顔して……！」"
translation = "「이…… 반질반질한 얼굴을 해가지고……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まぁ、でも……会長が色々と準備してくれたのは、素直に嬉しいよ……うん……」"
translation = "「뭐, 그래도…… 회장이 이것저것 준비해준 건 솔직히 기뻐…… 응……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「今日はしてやられたけど……次は私がお返しする番だからね！\u3000覚悟しててよ、会長っ！？」"
translation = "「오늘은 당했지만…… 다음은 내가 되갚아줄 차례니까! 각오하라구, 회장님!?」"

[[dialogue]]
speaker = "unk"
original = "真っ赤に照れながらそう伝えてくるマインに、俺も頷いて返すのだった。"
translation = "새빨갛게 수줍어하며 그렇게 전해오는 마인에게 나도 고개를 끄덕여 답했다."

