[[dialogue]]
speaker = "unk"
original = "第１６話,摂理の再構築,B"
translation = "제16화, 섭리의 재구축, B"

[[dialogue]]
speaker = "ガーディアン・オルサ"
original = "「ピ……ピ……ガガ──ピ──────戦闘不能。戦闘不能。侵入者データヲ上層ヘ送……信……」"
translation = "「삐……삐……가가──삐──────전투 불능. 전투 불능. 침입자 데이터를 상층으로 송……신……」"

[[dialogue]]
speaker = "クロト"
original = "「──終わったか」"
translation = "「──끝났나」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふう……最後だけあって、なかなか手強かったわね！」"
translation = "「휴우…… 마지막답게, 꽤나 만만치 않았네!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャーッニャッニャッ！\u3000それでもワガハイとフィオナ嬢にかかれば容易いことなのニャン！」"
translation = "「냐ー앗 냐앗 냐앗! 그래도 나와 피오나 아가씨에게 걸리면 쉬운 일인 거냥!」"

[[dialogue]]
speaker = "フィオナ"
original = "「（最後の音声は、なかなか不穏に聞こえましたが……）」"
translation = "「(마지막 음성은, 꽤나 불길하게 들렸습니다만……)」"

[[dialogue]]
speaker = "unk"
original = "ボスガーディアンを打倒した俺たち。"
translation = "보스 가디언을 타도한 우리들."

[[dialogue]]
speaker = "unk"
original = "すると、フロアの中心に謎の光が瞬き出した。"
translation = "그러자, 플로어 중심에 의문의 빛이 깜빡이기 시작했다."

[[dialogue]]
speaker = "フィオナ"
original = "「この輝きは……」"
translation = "「이 빛은……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ようこそここまでおいてくださいました……星騎士の者たち。それに、御子よ」"
translation = "「여기까지 와주셔서 감사합니다…… 성기사의 분들. 그리고, 미코여」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ニャ！\u3000あの時の堕天使なのニャン！」"
translation = "「냐! 그때의 타락천사인 거냥!」"

[[dialogue]]
speaker = "クロト"
original = "「ってことは、《境界》の──！」"
translation = "「라는 건, 《경계》의──!」"

[[dialogue]]
speaker = "unk"
original = "聖なる輝きをまとって現れた一人の天使──"
translation = "성스러운 빛을 두르고 나타난 한 명의 천사──"

[[dialogue]]
speaker = "unk"
original = "ニャリオンとフィオナが遭遇した、アステラに囚われていたマグダレナという存在だった。"
translation = "냐리온과 피오나가 조우했던, 아스테라에 갇혀있던 막달레나라는 존재였다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスを呼んでた声って……もしかして？」"
translation = "「비너스를 부르던 목소리가…… 혹시？」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ここはフィーニスの塔の第一階層──その終着点にあたります。塔に生じている異常から、辿り着くのも容易ではなかったでしょう」"
translation = "「여기는 피니스의 탑의 제1계층──그 종착점에 해당합니다. 탑에 생기고 있는 이상 현상으로 인해, 도달하는 것도 쉽지 않았겠지요」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。マグダレナ様、私たちは貴女より授かった栞を手に参じました。これは一体……？」"
translation = "「네. 막달레나 님, 저희는 당신에게 받은 책갈피를 손에 들고 왔습니다. 이것은 대체……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「私は守護天使。元来、フィーニスの塔を守る者。しかし……今、その本体はここから遠く離れた地に縛められています」"
translation = "「저는 수호 천사. 본래, 피니스의 탑을 지키는 자. 하지만…… 지금, 그 본체는 여기서 멀리 떨어진 땅에 묶여 있습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「第一階層……って言ってたけど、守護天使って他にもいるの？」"
translation = "「제1계층……이라고 했지만, 수호 천사는 또 있는 거야?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「恐らく私はこのまま堕天使として呑まれるでしょう。あなた方がここに来られたのであれば心配は要りませんが……」"
translation = "「아마 저는 이대로 타락천사로서 삼켜질 것입니다. 당신들이 여기에 오셨다면 걱정할 필요는 없겠지만……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「さっきからあまり返答になっていないのニャ……？」"
translation = "「아까부터 제대로 대답을 안 하는 거냥……?」"

[[dialogue]]
speaker = "クロト"
original = "「──マグダレナさん。こちらの声が聞こえますか」"
translation = "「──막달레나 씨. 이쪽 목소리가 들립니까」"

[[dialogue]]
speaker = "unk"
original = "返事はない。"
translation = "대답은 없다."

[[dialogue]]
speaker = "unk"
original = "それによくよく聞くと受け答えにズレがあるというか……会話が成立していない？"
translation = "게다가 자세히 들어보면 대답에 엇갈림이 있다고 할까…… 대화가 성립되지 않고 있다?"

[[dialogue]]
speaker = "マグダレナ"
original = "「今の私はこの地に紐付けられただけの思念体──こちらから一方的にお話することをお許しください」"
translation = "「지금의 저는 이 땅에 묶여 있을 뿐인 사념체──이쪽에서 일방적으로 이야기하는 것을 허락해 주십시오」"

[[dialogue]]
speaker = "フィオナ"
original = "「ホログラムみたいなもの……ということでしょうか」"
translation = "「홀로그램 같은 것……이라는 말씀이신가요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほんとだ、実体がない」"
translation = "「정말이네, 실체가 없어」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの伸ばした手が空を切る。"
translation = "비너스가 뻗은 손이 허공을 가른다."

[[dialogue]]
speaker = "unk"
original = "守護天使──マグダレナさんは、ここではないどこかに別の本体があると言った。"
translation = "수호 천사──막달레나 씨는, 여기가 아닌 어딘가에 다른 본체가 있다고 말했다."

[[dialogue]]
speaker = "unk"
original = "質問することはできないので、俺たちはそのまま彼女の言葉を待つ。"
translation = "질문할 수 없으므로, 우리는 그대로 그녀의 말을 기다린다."

[[dialogue]]
speaker = "マグダレナ"
original = "「御子よ。そこにおりますね。これより三界に生じている事象を説明いたします」"
translation = "「미코여. 거기에 계시는군요. 지금부터 삼계에 생기고 있는 사상을 설명하겠습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ミコって……やっぱり私？」"
translation = "「미코라니…… 역시 나?」"

[[dialogue]]
speaker = "キリカ"
original = "「これまでの文脈を踏まえますと、恐らく」"
translation = "「지금까지의 문맥을 고려하면, 아마도요」"

[[dialogue]]
speaker = "unk"
original = "ミコ──"
translation = "미코──"

[[dialogue]]
speaker = "unk"
original = "発音こそ変わらなかったが、マグダレナさんの発したニュアンスは“巫女”ではないように聞こえた。"
translation = "발음은 바뀌지 않았지만, 막달레나 씨가 발한 뉘앙스는 “무녀”가 아닌 것처럼 들렸다."

[[dialogue]]
speaker = "マグダレナ"
original = "「端的に申し上げましょう。リクリエとは主の意思すらも越えた──摂理の再構築によるものです」"
translation = "「단적으로 말씀드리겠습니다. 리크리에는 주인의 의지마저 넘어선──섭리의 재구축에 의한 것입니다」"

[[dialogue]]
speaker = "クロト"
original = "「……！\u3000摂理の、再構築──？」"
translation = "「……! 섭리의, 재구축──?」"

[[dialogue]]
speaker = "フィオナ"
original = "「主の意志すらも……つまり……女神様の意図によるものではない、と？」"
translation = "「주인의 의지마저도…… 즉…… 여신님의 의도에 의한 것이 아니라는, 건가요?」"

[[dialogue]]
speaker = "unk"
original = "訊きたいことは今にも山ほどあった。"
translation = "묻고 싶은 것은 당장이라도 산더미 같았다."

[[dialogue]]
speaker = "unk"
original = "だが、対話はできないのでおとなしく言葉を待つ。"
translation = "하지만, 대화는 할 수 없으므로 얌전히 말을 기다린다."

[[dialogue]]
speaker = "マグダレナ"
original = "「今、世界は未曾有の危機にさらされています。この塔に起きている異常もその一端にすぎません」"
translation = "「지금, 세계는 미증유의 위기에 처해 있습니다. 이 탑에 일어나고 있는 이상 현상도 그 일부에 지나지 않습니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「三界の『徹底的な破滅』。その未来がすぐにでも近づいているのです」"
translation = "「삼계의 『철저한 파멸』. 그 미래가 곧바로 다가오고 있는 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「……穏当な響きではありませんね」"
translation = "「……온당한 울림은 아니군요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「でも、最近の騒がしさを考えるとしっくり来るニャン……」"
translation = "「하지만, 최근의 소란스러움을 생각하면 딱 들어맞는 거냥……」"

[[dialogue]]
speaker = "unk"
original = "三千年前にクルセイダースたちが撃退したという前回のリクリエ。"
translation = "삼천 년 전에 크루세이더스들이 격퇴했다는 지난번의 리크리에."

[[dialogue]]
speaker = "unk"
original = "その揺り戻しは、彼女たち──守護天使にとっても想定外なほど大きいという。"
translation = "그 되돌림은, 그녀들──수호 천사에게 있어서도 상정 외일 정도로 크다고 한다."

[[dialogue]]
speaker = "マグダレナ"
original = "「御子よ。あなたはあなたの使命を果たすのです。あなたは、既にそれを授かっているはず」"
translation = "「미코여. 당신은 당신의 사명을 완수하는 것입니다. 당신은, 이미 그것을 부여받았을 터」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私の……使命……」"
translation = "「나의…… 사명……」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさん──の映像──は、明確にヴィーナスのみに語りかけていた。"
translation = "막달레나 씨──의 영상──은, 명확하게 비너스에게만 말을 걸고 있었다."

[[dialogue]]
speaker = "unk"
original = "その真意は、ヴィーナス本人さえもわかっていないように見える。"
translation = "그 진의는, 비너스 본인조차도 모르고 있는 것처럼 보인다."

[[dialogue]]
speaker = "マグダレナ"
original = "「私が主に託された力の一端を御子に捧げます。どうかお役立てください──」"
translation = "「제가 주인에게 맡겨진 힘의 일단을 미코에게 바치겠습니다. 부디 도움이 되기를──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「────っっ……！！」"
translation = "「────읏……!!」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス──！」"
translation = "「비너스──!」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんの差し出した両掌から、光の球体のようなものがヴィーナスへ吸い込まれていった。"
translation = "막달레나 씨가 내민 양 손바닥에서, 빛의 구체 같은 것이 비너스에게 빨려 들어갔다."

[[dialogue]]
speaker = "unk"
original = "そのまばゆい白き光は、日誌と共鳴したあの栞に宿っていたものと同じで──"
translation = "그 눈부신 하얀 빛은, 일지와 공명했던 그 책갈피에 깃들어 있던 것과 같았으며──"

[[dialogue]]
speaker = "ニャリオン"
original = "「九浄の娘が進化したのニャ！」"
translation = "「쿠죠의 딸이 진화한 거냥!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もっと別の言い方ないの……？」"
translation = "「좀 더 다른 표현 없어……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「御子よ。この塔の頂を目指すのです。そして……」"
translation = "「미코여. 이 탑의 정상을 목표로 하는 것입니다. 그리고……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「──星見フィオナ。緋宮クロト。この２名こそが、あなたの使命を果たす鍵となるでしょう」"
translation = "「──호시미 피오나. 히노미야 쿠로토. 이 두 명이야말로, 당신의 사명을 완수할 열쇠가 될 것입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "クロト"
original = "「俺たちが……？」"
translation = "「우리들이……?」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんはこの場に俺たちが揃っていることまでは想定していなかった。"
translation = "막달레나 씨는 이 자리에 우리들이 모여 있다는 것까지는 상정하지 않았다."

[[dialogue]]
speaker = "unk"
original = "どうやら“御子”とは違った意味で──俺たちを重視しているらしく……"
translation = "아무래도 “미코”와는 다른 의미로──우리들을 중요하게 여기는 듯하며……"

[[dialogue]]
speaker = "マグダレナ"
original = "「できればこのままあなた方を導いて差し上げたいところですが……そうもいかないようですね」"
translation = "「가능하다면 이대로 당신들을 인도해 드리고 싶지만…… 그럴 수 없을 것 같군요」"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000まずい、映像が──」"
translation = "「! 안 돼, 영상이──」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんの存在感が乱れ始める。"
translation = "막달레나 씨의 존재감이 흐트러지기 시작한다."

[[dialogue]]
speaker = "マグダレナ"
original = "「御子よ──この──っ──塔を──昇るのです──さすれば────」"
translation = "「미코여──이──읏──탑을──오르는 것입니다──그리하면────」"

[[dialogue]]
speaker = "unk"
original = "マグダレナさんが全てを言い終えるより早く──"
translation = "막달레나 씨가 모든 것을 다 말하기보다 빨리──"

[[dialogue]]
speaker = "unk"
original = "発生した紫色の瘴気が、彼女ごと包み込んで消してしまった。"
translation = "발생한 보랏빛 장기가, 그녀째로 감싸 안아 지워버렸다."

[[dialogue]]
speaker = "ニャリオン"
original = "「い、今の影は見覚えがあるニャン」"
translation = "「이, 이 그림자는 본 적이 있는 거냥」"

[[dialogue]]
speaker = "フィオナ"
original = "「……アステラで彼女を“堕天使”たらしめていたものと同じですね」"
translation = "「……아스테라에서 그녀를 “타락천사”로 만들었던 것과 같군요」"

[[dialogue]]
speaker = "クロト"
original = "「彼女の本体はこの後、堕天使に堕ちた──ってことか？」"
translation = "「그녀의 본체는 이 다음에, 타락천사로 타락했다──는 건가?」"

[[dialogue]]
speaker = "unk"
original = "だとしても、俺たちにこれ以上追う術はなさそうだった。"
translation = "그렇다고 해도, 우리들에게 더 이상 쫓을 방법은 없어 보였다."

[[dialogue]]
speaker = "キリカ"
original = "「守護天使……こうして塔に配置されていた以上、彼女は恐らく極めて高位の天使であったことが推察されます。それが……」"
translation = "「수호 천사…… 이렇게 탑에 배치되어 있었던 이상, 그녀는 아마도 지극히 고위의 천사였을 것으로 추측됩니다. 그것이……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。堕天使として呑まれ、私たちに希望を託さざるを得なかった状況……ただ事ではありませんね」"
translation = "「네. 타락천사로서 삼켜져, 우리들에게 희망을 맡길 수밖에 없었던 상황…… 예사롭지 않군요」"

[[dialogue]]
speaker = "unk"
original = "そして、これらの事象は全て……あるひとつの原因に端を発している。"
translation = "그리고, 이러한 사상들은 모두…… 어떤 하나의 원인에서 비롯되고 있다."

[[dialogue]]
speaker = "クロト"
original = "「リクリエ……か」"
translation = "「리크리에……인가」"

[[dialogue]]
speaker = "unk"
original = "事態はどうやら──俺たちが考えていたよりも深刻なのかもしれない。"
translation = "사태는 아무래도──우리들이 생각했던 것보다 심각할지도 모른다."

[[dialogue]]
speaker = "フィオナ"
original = "「それに……ヴィーナスさんは大丈夫？\u3000何かを渡されたみたいだけど……頭痛はもうない？」"
translation = "「게다가…… 비너스 씨는 괜찮으세요? 무언가를 받으신 것 같았는데…… 두통은 이제 없으신가요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う、うん。平気というか、むしろパワーアップした感じというか…………バッチリよ！」"
translation = "「으, 응. 괜찮다고 할까, 오히려 파워업한 느낌이라고 할까………… 완벽해!」"

[[dialogue]]
speaker = "unk"
original = "調子はいつものヴィーナスだった。"
translation = "컨디션은 평소의 비너스였다."

[[dialogue]]
speaker = "unk"
original = "どころか、確かに以前より覇気が強まっているのを感じる。"
translation = "아니, 오히려 확실히 이전보다 패기가 강해진 것을 느낀다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに……何でかわからないけど……」"
translation = "「게다가…… 왜인지는 모르겠지만……」"

[[dialogue]]
speaker = "クロト"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはかの日誌を取り出すと、中身をめくってから顔を上げて言った。"
translation = "비너스는 그 일지를 꺼내더니, 내용을 넘겨보고 나서 얼굴을 들고 말했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「また──増えてるの。未来の記述が……もっと、先まで」"
translation = "「또──늘어났어. 미래의 기술이…… 더, 앞까지」"

[[dialogue]]
speaker = "unk"
original = "それは。"
translation = "그것은."

[[dialogue]]
speaker = "unk"
original = "俺たちを混沌へ誘う、ほんの序章にすぎないのかもしれなかった。"
translation = "우리들을 혼돈으로 이끄는, 그저 서장에 불과했을지도 몰랐다."

[[dialogue]]
speaker = "ギエル"
original = "「……守護天使の消滅を確認。ガーディアンは一機残らず再起不能。フィーニスの塔第一階層は事実上の陥落を呈しています」"
translation = "「……수호 천사의 소멸을 확인. 가디언은 한 기 남김없이 재기 불능. 피니스의 탑 제1계층은 사실상의 함락을 나타내고 있습니다」"

[[dialogue]]
speaker = "ギエル"
original = "「いかがいたしましょう、アポロ様」"
translation = "「어떻게 하시겠습니까, 아폴로 님」"

[[dialogue]]
speaker = "アポロ"
original = "「決まってんじゃん。あたしはそろそろ暴れたくてウズウズしてんのさ！」"
translation = "「정해져 있잖아. 나는 슬슬 날뛰고 싶어서 좀이 쑤신다고!」"

[[dialogue]]
speaker = "ギエル"
original = "「は。流石は偉大なる英雄アポロ様──このギエル、感服の至りに存じます」"
translation = "「하. 역시 위대하신 영웅 아폴로 님── 이 기엘, 감복할 따름입니다」"

[[dialogue]]
speaker = "アポロ"
original = "「わっはっは！\u3000そう褒めるなギエル！\u3000褒めるならグミくれ」"
translation = "「와핫핫하! 그렇게 칭찬하지 마라 기엘! 칭찬할 거면 젤리 줘」"

[[dialogue]]
speaker = "ギエル"
original = "「今日の分は既にお渡ししました。なんなら明日の分も」"
translation = "「오늘 드릴 몫은 이미 드렸습니다. 심지어 내일 드릴 몫도」"

[[dialogue]]
speaker = "アポロ"
original = "「ちぇっ」"
translation = "「쳇」"

[[dialogue]]
speaker = "アポロ"
original = "「──まあいい！\u3000これでようやくヒーローの活躍する舞台が整ったってわけだからな！」"
translation = "「──뭐 됐어! 이걸로 드디어 히어로가 활약할 무대가 갖춰졌다는 거니까!」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王だって旧世界だって……このアポロ様がひとつ残らずぐっちゃぐちゃにしてやるぜ！」"
translation = "「마왕이든 구세계든…… 이 아폴로 님이 하나도 남김없이 엉망진창으로 만들어 줄 테다!」"

