[[dialogue]]
speaker = "unk"
original = "第３話,弱点克服作戦！？,P"
translation = "제3화, 약점 극복 작전!?, P"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「重ね重ね、ご迷惑おかけしてすみませんでした……ほんとにごめんなさい……」"
translation = "「거듭해서 폐를 끼쳐 드려 죄송합니다…… 정말 미안해요……」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「でも厚かましいとは思うんですけど、会長さんに折り入ってお願いがあるんです」"
translation = "「하지만 뻔뻔하다고는 생각하지만, 회장님께 꼭 드리고 싶은 부탁이 있어요」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「私の両親は天界で医者をしていて、幼い頃からその仕事ぶりを見て育ちました」"
translation = "「제 부모님은 천계에서 의사를 하시고, 어릴 적부터 그 일하시는 모습을 보고 자랐어요」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「医者は大変な仕事です。忙しいし、理不尽なこともたくさんあるけど、なくてはならない仕事です」"
translation = "「의사는 힘든 직업이에요. 바쁘고 불합리한 일도 많지만 없어서는 안 될 직업이죠」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「両親のように傷ついた誰かを癒やしたい。そう思って星騎士になりました」"
translation = "「부모님처럼 상처 입은 누군가를 치유하고 싶다. 그렇게 생각해서 성기사가 되었어요」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「だけど、せっかく治癒の星術を身に着けたのに、このままでは保健委員失格です」"
translation = "「하지만 모처럼 치유의 성술을 익혔는데 이대로는 보건위원 실격이에요」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「だからその……血を見るのが苦手なのを克服したいんです。手伝ってもらえないでしょうか？」"
translation = "「그래서 저기…… 피를 보는 걸 무서워하는 걸 극복하고 싶어요. 도와주실 수 없을까요?」"

[[dialogue]]
speaker = "unk"
original = "俺で良ければ喜んで"
translation = "나라도 괜찮다면 기꺼이"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「──！\u3000ありがとうございます！\u3000会長さんは優しい人ですね……」"
translation = "「──! 감사합니다! 회장님은 상냥한 분이시네요……」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「でもどうすればいいかわからなくて……苦手を克服するには実際に血を見ないといけませんし……」"
translation = "「하지만 어떻게 해야 할지 몰라서…… 약점을 극복하려면 실제로 피를 봐야 할 텐데……」"

[[dialogue]]
speaker = "unk"
original = "よし！\u3000それなら──"
translation = "좋아! 그렇다면──"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「え……思い切り攻撃しろ……？\u3000いいんですか？\u3000確かに私なら怪我しても治療できますけど……」"
translation = "「에…… 마음껏 공격하라고요……? 괜찮은 건가요? 확실히 저라면 다쳐도 치료할 수 있긴 하지만……」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「ううん、会長さんがここまでしてくれてるんだから、私も本気でやらなくちゃ……！」"
translation = "「아니야, 회장님이 이렇게까지 해주시는 거니까 저도 진심으로 해야 해……!」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「行きます！\u3000ホーネットニードル！」"
translation = "「갑니다! 호넷 니들!」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「だだ、大丈夫ですかっ、会長さん！？\u3000思いっきりお注射しちゃいましたけど……」"
translation = "「괘, 괜찮으세요, 회장님!? 힘껏 주사를 놓아버렸는데……」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「このくらい平気？\u3000良かった～」"
translation = "「이 정도는 아무렇지도 않다고요? 다행이다~」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「でも血が出て……いえ、特訓なんだから我慢しないと。大丈夫、大丈夫……私は血なんて平気──」"
translation = "「하지만 피가 나와서…… 아니, 특훈이니까 참아야 해. 괜찮아, 괜찮아…… 난 피 같은 건 아무렇지도──」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「うぅ、やっぱりダメぇ～っ！」"
translation = "「으으, 역시 안 돼~!」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「で、結局アタシが出てくると。アホか」"
translation = "「그래서 결국 내가 나오게 된다고. 바보냐」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「んじゃさっそく治療させてもらおうか。いやぁ～、自分から苦痛を味わいに来るとはいい度胸だなぁ。ヒッヒッヒッ」"
translation = "「그럼 당장 치료를 시작해 볼까. 이야~ 스스로 고통을 맛보러 오다니 배짱 한번 좋구만. 히히히」"

[[dialogue]]
speaker = "unk"
original = "ぐえ～～～～～っ！！？"
translation = "구엑!!?"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「そうそう、その調子だぜ会長サン」"
translation = "「그래그래, 그 기세라고 회장님」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「だけど痛みに慣れてきたのか、ちょっと新鮮さがなくなってきたな。会長サン用に薬の調合を変えてみるか……」"
translation = "「하지만 통증에 익숙해진 건지 좀 신선함이 떨어지네. 회장님용으로 약의 배합을 바꿔볼까……」"

[[dialogue]]
speaker = "unk"
original = "二重人格は昔から？"
translation = "이중인격은 옛날부터 그랬어?"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「いいや、割と最近。新星学園に入って、星術を使えるようになってからだ」"
translation = "「아니, 비교적 최근이야. 신성학원에 들어와서 성술을 쓸 수 있게 된 이후부터지」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「つまりアタシは本来の二重人格じゃない。星力の影響で生まれたもうひとつの人格ってわけだ」"
translation = "「즉 난 본래의 이중인격이 아니야. 성력의 영향으로 태어난 또 하나의 인격이라는 소리지」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「フロレンシアの守護星はへびつかい座<ruby>λ<rt>ラムダ</rt></ruby>星マルフィク。２つの星が重なって１つの星に見える、連星って天体だ。その影響を受けてるのかもしれねえ」"
translation = "「플로렌시아의 수호성은 뱀주인자리 <ruby>λ<rt>람다</rt></ruby>성 마르피크. 두 개의 별이 겹쳐서 하나의 별로 보이는 연성이라는 천체야. 그 영향을 받았을지도 모르지」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「普通は守護星が星騎士に人格的な影響を与えることはないが……まぁ、何事にも例外はある」"
translation = "「보통은 수호성이 성기사에게 인격적인 영향을 주지는 않지만…… 뭐, 매사에는 예외가 있는 법이지」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「トワちゃんあたりなら他にも似たような例を知ってるかもしれねえな」"
translation = "「토와 씨 정도라면 다른 비슷한 사례를 알고 있을지도 모르겠네」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「だが……アタシだからわかることもある。アタシが存在しているのは、フロレンシアが望んだからだ」"
translation = "「하지만…… 나니까 알 수 있는 것도 있어. 내가 존재하는 건 플로렌시아가 원했기 때문이야」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「血を見たら気絶する不甲斐ない自分に代わって、的確に治療を施す自分じゃない自分──それがアタシだ」"
translation = "「피를 보면 기절하는 한심한 자신을 대신해서 정확하게 치료를 베푸는 자신이 아닌 자신── 그게 나다」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「だからアタシの趣味も、案外フロレンシアのせいなのかもなぁ？」"
translation = "「그러니까 내 취미도 어쩌면 플로렌시아 탓일지도 모르겠는데?」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「だけど克服されたらアタシが困るんだよなー。表に出てこれなくなるし」"
translation = "「하지만 극복해 버리면 내가 곤란하단 말이지. 겉으로 나올 수 없게 되니까」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「……って、言ってるそばからフロレンシアが目を覚まそうとしてやがる。ったく、あいつが起きると体返さないといけないんだよな」"
translation = "「……라고 말하는 도중에 플로렌시아가 눈을 뜨려고 하네. 나 원 참, 이 녀석이 깨어나면 몸을 돌려줘야 한단 말이지」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「克服なんてさせんじゃねえぞ。徹底的に邪魔しろ。いいな」"
translation = "「극복 같은 거 시키지 말라고. 철저하게 방해해라. 알겠냐」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「ん……んん……あ、すみません、また気絶してました……」"
translation = "「응…… 으음…… 아, 죄송해요, 또 기절해 있었네요……」"

[[dialogue]]
speaker = "unk"
original = "めげずに頑張ろう"
translation = "포기하지 말고 힘내자"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「は、はい！\u3000血なんて怖くない……怖くない……平気、大丈夫、なんともない……」"
translation = "「네, 네! 피 같은 건 무섭지 않아…… 무섭지 않아…… 괜찮아, 다행이야, 아무렇지도 않아……」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「ではもう一度──ホーネットニードル！」"
translation = "「그럼 다시 한번── 호넷 니들!」"

[[dialogue]]
speaker_original = "フロレンシア"
speaker_translation = "플로렌시아"
original = "「ぴゃ～～～～～っ！？\u3000がくっ」"
translation = "「퍄아아아아앗!? 털썩」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「つーか、前から思ってたんだけどさぁ……」"
translation = "「그나저나 전부터 생각했던 건데 말이야……」"

[[dialogue]]
speaker_original = "スミカ"
speaker_translation = "스미카"
original = "「邪魔するまでもなく、血が苦手なの悪化してね……？」"
translation = "「방해할 것도 없이 피를 무서워하는 게 악화된 거 아니냐……?」"

