[[dialogue]]
speaker = "unk"
original = "恋人のルリエルが巫女の力を鍛錬をするようになってから、しばらく経って。"
translation = "연인인 루리엘이 무녀의 힘을 단련하게 된 지 꽤 시간이 흐르고."

[[dialogue]]
speaker = "unk"
original = "俺たちには最近、ハマっていることがあった――"
translation = "우리들에게는 최근 빠져 있는 것이 있었다──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへへへぇ♪\u3000今日は会長さんの家に、２人きりでお泊りなのです♪」"
translation = "「에헤헤헤헤헤♪ 오늘은 회장님 집에서 둘이서만 자고 가는 거예요♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だ・か・ら♪」"
translation = "「그·러·니·까♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「今夜も煩悩を解放して、『子作りごっこ』<emoji=heart04>\u3000しちゃいましょうっ<emoji=heart04>」"
translation = "「오늘 밤도 번뇌를 해방해서 『아기 만들기 놀이』<emoji=heart04> 해버려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん<emoji=heart04>\u3000ベッドまでルリエルを、お姫様抱っこして欲しいのです<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 침대까지 루리엘을 공주님 안기로 옮겨줬으면 좋겠어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、ルリエルをお姫様抱っこで寝室まで運んで――"
translation = "그렇게 루리엘을 공주님 안기로 침실까지 옮기고──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はあぁ……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 하아아<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "両手を繋ぎ、ベッドの上で見つめ合う。"
translation = "두 손을 잡고 침대 위에서 서로를 바라본다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……えへへぇ<emoji=heart04>\u3000手だけじゃなくて、足まで絡めちゃいます<emoji=heart04>\u3000んんぅ……<emoji=heart04>\u3000こうすると赤ちゃんを授かりやすいと、聞いたことがあるのです<emoji=heart04>」"
translation = "「응…… 에헤헤<emoji=heart04> 손뿐만 아니라 발까지 꼬아버릴게요. 응응……<emoji=heart04> 이렇게 하면 아기를 갖기 쉽다고 들은 적이 있거든요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "巫女フォームの力を使いこなせるようになる為には、自身の煩悩と向き合うことが重要だという。"
translation = "무녀 폼의 힘을 능숙하게 다루기 위해서는 자신의 번뇌와 마주하는 것이 중요하다고 한다."

[[dialogue]]
speaker = "unk"
original = "まあ、それは建前で……学生身分での『子作り』という背徳感にハマってしまっている、というのが、本当のところなのだけれども。"
translation = "뭐, 그건 겉치레고…… 학생 신분으로 『아기 만들기』를 한다는 배덕감에 빠져버린 것이 사실이지만."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルリエル。今日は俺も、煩悩を解放しちゃってもいいか？」"
translation = "「루리엘. 오늘은 나도 번뇌를 해방해 버려도 될까?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もちろんです<emoji=heart04>\u3000会長さんの煩悩、ルリエルに聞かせて欲しいのです」"
translation = "「물론이죠<emoji=heart04> 회장님의 번뇌, 루리엘에게 들려줬으면 좋겠어요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺……『ごっこ遊び』なんかじゃなくて、本気でルリエルのこと孕ませたい」"
translation = "「나…… 『놀이』 같은 게 아니라, 진심으로 루리엘을 임신시키고 싶어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えっ……本当に赤ちゃん作っちゃう、ってことですか……？」"
translation = "「엣…… 정말로 아기를 만든다는 뜻인가요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。ルリエルは俺との赤ちゃん……嫌か？」"
translation = "「어. 루리엘은 나와의 아기…… 싫어?」"

[[dialogue]]
speaker = "unk"
original = "そんな風に、わざと重い感情を口にしてみると――"
translation = "그런 식으로 일부러 무거운 감정을 입 밖으로 내보자──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わかりました♪\u3000もちろん、いいのですよ<emoji=heart04>」"
translation = "「알겠어요♪ 물론 좋고말고요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は当たり前のように、屈託のない天使の微笑みで受け止めてくれる。"
translation = "그녀는 당연하다는 듯 구김살 없는 천사의 미소로 받아준다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルは会長さんのこと、大好きですから<emoji=heart04>」"
translation = "「루리엘은 회장님을 정말 좋아하니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000ルリエル！」"
translation = "「윽……! 루리엘!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あんっ……<emoji=heart04>\u3000会長さんの熱いおち○ちん、当たってます<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 회장님의 뜨거운 자지가 닿고 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000おま○こに擦れて、気持ちいいのです<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 응<emoji=heart04> 후우우……<emoji=heart04> 보지에 스쳐서 기분 좋아요<emoji=heart04> 하아앗<emoji=heart04> 응……<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はあぁぁっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000早くエッチしたくて、ルリエルのおま○こ、ぬるぬるになっちゃってるのです<emoji=heart04>\u3000なので、もう……<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 후우우……<emoji=heart04> 빨리 섹스하고 싶어서 루리엘의 보지, 미끌미끌해져 버렸어요<emoji=heart04> 그러니까 이제……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんのおち○ちん、ルリエルの中に挿れて欲しいのです<emoji=heart04>」"
translation = "「회장님의 자지, 루리엘 안에 삽입해 줬으면 좋겠어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はペニスの先端をルリエルの膣穴にあてがいながら、告げる。"
translation = "나는 페니스의 끝을 루리엘의 질 구멍에 갖다 대며 고한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本気の子作りセックス、しちゃうからな？」"
translation = "「진심 아기 만들기 섹스, 해버릴 거니까?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はい<emoji=heart04>\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「네<emoji=heart04> 앗──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ<emoji=heart04>\u3000ふあああぁ～っ<emoji=heart04><emoji=heart04>\u3000おち○ちん、入って来ましたぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 후아아아아~<emoji=heart04><emoji=heart04> 자지, 들어왔어요어어~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙<emoji=heart04> 하아아앗<emoji=heart04> 후아앗<emoji=heart04> 응<emoji=heart04> 응후<emoji=heart04> 하아앗<emoji=heart04> 응우우<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おち○ちん<emoji=heart04>\u3000気持ちいいのですぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000気持ち良くて好きぃ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「자지<emoji=heart04> 기분 좋아요오<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 기분 좋아서 좋아아<emoji=heart04> 응<emoji=heart04> 후우우<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もルリエルのおま○こ、気持ちいい……！」"
translation = "「나도 루리엘의 보지, 기분 좋아……!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの蜜壺がぬめる熱でペニスをきつく包み込み、亀頭を擦り上げるたびに痺れるような快感が背筋を駆け上がる。"
translation = "루리엘의 밀궁이 미끈거리는 열기로 페니스를 꽉 감싸 안고, 귀두를 문지를 때마다 저릿한 쾌감이 등줄기를 타고 올라온다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ<emoji=heart04>\u3000えへへぇ<emoji=heart04>\u3000会長さんがルリエルで気持ち良くなってくれて、嬉しいのですぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 에헤헤<emoji=heart04> 회장님이 루리엘로 기분 좋아져서 기뻐요오<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もっといっぱい気持ち良くなって、ルリエルの中にいっぱい精液注いで下さぁい<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「더 잔뜩 기분 좋아져서 루리엘 안에 잔뜩 정액 쏟아주세요오<emoji=heart04> 응<emoji=heart04> 후우우<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛く喘ぎながら天使の微笑みを浮かべるルリエルに、俺の欲望は更に掻き立てられてしまう。"
translation = "귀엽게 신음하며 천사의 미소를 짓는 루리엘에게 나의 욕망은 더욱 부추겨지고 만다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺、ルリエルとの可愛い赤ちゃんが欲しい！」"
translation = "「윽…… 나, 루리엘과의 귀여운 아기를 갖고 싶어!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000赤ちゃんのお部屋、トントンされてますぅ<emoji=heart04>\u3000それ、気持ちいいっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 아기 방, 통통 두드려지고 있어요오<emoji=heart04> 그거 기분 좋아<emoji=heart04> 하아앙<emoji=heart04> 아앗<emoji=heart04> 응아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日孕んでくれっ。ルリエルっ」"
translation = "「오늘 임신해 줘. 루리엘」"

[[dialogue]]
speaker = "unk"
original = "繰り返し欲望の丈を吐き出しながら、子宮口にペニスの先を押し付けるように腰を振る。"
translation = "반복해서 욕망을 쏟아내며 자궁구에 페니스 끝을 밀어붙이듯 허리를 흔든다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルのおま○こ、孕ませてくださぁいっ<emoji=heart04>\u3000んんぅぅん<emoji=heart04>\u3000赤ちゃん欲しくて、お腹の奥、キュンキュンしちゃってるのですぅ<emoji=heart04>\u3000あぁあん<emoji=heart04>」"
translation = "「루리엘의 보지, 임신시켜 주세요옷<emoji=heart04> 응응으응<emoji=heart04> 아기 갖고 싶어서 배 속 깊은 곳이 큥큥거려요오<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んふぅぅん<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000ふあぁっ……！\u3000何度も子宮口にキスっ<emoji=heart04><emoji=heart04>\u3000コンコンされると、とっても気持ちいいのですぅ<emoji=heart04><emoji=heart04>」"
translation = "「응후우웅<emoji=heart04> 하아아앗<emoji=heart04> 후아앗……! 몇 번이나 자궁구에 키슈<emoji=heart04><emoji=heart04> 콩콩거리면 정말 기분 좋아요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000おち○ちんキス、気持ちいいのですぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아아앗<emoji=heart04> 기분 좋아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아앗<emoji=heart04> 자지 키슈, 기분 좋아요오<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000上のお口もキス<emoji=heart04>\u3000ちゅっちゅして欲しいのですぅ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 앗, 앗<emoji=heart04> 위쪽 입도 키슈<emoji=heart04> 츄츄해 줬으면 좋겠어요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ<emoji=heart04>\u3000んんん……っ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅぷぷっ<emoji=heart04>\u3000ちゅむっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응응……<emoji=heart04> 응뭇<emoji=heart04> 츄<emoji=heart04> 츄푸푸<emoji=heart04> 츄뭇<emoji=heart04> 츄파<emoji=heart04> 응츄<emoji=heart04> 츄레루<emoji=heart04> 레루레루<emoji=heart04> 츄루루<emoji=heart04> 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はあぁっ<emoji=heart04>\u3000舌絡めるきしゅ、気持ちいいのれす<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ちゅぷぷっ……れろちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅるるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 혀 섞는 키슈, 기분 좋아레슈<emoji=heart04> 응<emoji=heart04> 츄푸푸…… 레로츄<emoji=heart04> 츄파<emoji=heart04> 응뭇<emoji=heart04> 츄푸푸…… 츄루루<emoji=heart04> 레루레루<emoji=heart04> 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
