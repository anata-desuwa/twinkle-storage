speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「赤ちゃん孕ませてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000産ませてくださぁいっ<emoji=heart04><emoji=heart04>\u3000ふわぁあん<emoji=heart04>」"
translation = "「아기 배게 해줘어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아앙<emoji=heart04> 낳게 해주세여어어<emoji=heart04><emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ<emoji=heart04>\u3000来るっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>\u3000来ちゃいますぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 온다아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아앙<emoji=heart04> 와버려여어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「イクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000イっちゃいますっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아<emoji=heart04> 가버려어<emoji=heart04> 가버려여어<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앗<emoji=heart04> 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んあああぁっ<emoji=heart04><emoji=heart04>\u3000イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000はああああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04><emoji=heart04> 가아<emoji=heart04><emoji=heart04> 가아 가아 가아 가아 가아앗<emoji=heart04><emoji=heart04><emoji=heart04> 하아아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルリエル、孕めっ！！！」"
translation = "「루리엘, 임신해라!!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가앗――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「イックうううぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はルリエルの一番奥にペニスを突き立て、欲望のままに想いの丈をぶちまけた。"
translation = "나는 루리엘의 가장 안쪽에 페니스를 박아 넣고, 욕망이 이끄는 대로 마음의 전부를 쏟아부었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000奥にびゅーって、精液出てますぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아~~앗<emoji=heart04><emoji=heart04> 안쪽에 뷰우우 하고 정액 나오고 있어여어~~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「お腹、熱いのですぅ～～っ<emoji=heart04>\u3000あっ、はぁっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000んんぅ～～っ<emoji=heart04>」"
translation = "「배 안이 뜨거워여어~~어<emoji=heart04> 앗, 하앗<emoji=heart04> 후웃<emoji=heart04> 응응으~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はルリエルを孕ませることを念じながら、子宮に精を吐き出して行く。"
translation = "나는 루리엘을 임신시키기를 염원하며 자궁에 정을 토해내 간다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はあぁんっ<emoji=heart04>\u3000いっぱい精子出されて、受精しちゃうのですぅ～っ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 정자 잔뜩 나와서 수정되어 버려여어~엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んうぅっ……はあぁっ<emoji=heart04>\u3000これ、赤ちゃんできちゃいますぅ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅ……はあぁ～～っ<emoji=heart04>」"
translation = "「응우웃…… 하아앗<emoji=heart04> 이거, 아기 생겨버려여어<emoji=heart04> 응<emoji=heart04> 후우…… 하아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あぁぁっ、すごぉい……<emoji=heart04>\u3000まだ会長さんの、出てるのです<emoji=heart04>\u3000あっ……ふあぁっ<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「아아앗, 대단해……<emoji=heart04> 아직 회장님 거 나오고 있어여<emoji=heart04> 앗…… 후아앗<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000子宮、いっぱいになっちゃいましたぁ<emoji=heart04>\u3000んっ……はあぁっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 후우웃<emoji=heart04> 자궁, 가득 차 버렸어여어<emoji=heart04> 응…… 하아앗<emoji=heart04> 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精が終わって、俺はゆっくりとペニスを引き抜いた。"
translation = "사정이 끝나고 나는 천천히 페니스를 뽑아냈다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……ふうぅ～……<emoji=heart04>\u3000子作りセックス、とっても気持ち良かったのです……<emoji=heart04>」"
translation = "「응…… 후우~……<emoji=heart04> 아기 만들기 섹스, 정말 기분 좋았어여……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん……いつもみたいに、終わった後のキス、して欲しいのです……<emoji=heart04>」"
translation = "「회장님…… 평소처럼 끝난 뒤의 키슈, 해줬으면 좋겠어여……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ……<emoji=heart04>\u3000ん～<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んちゅっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응~<emoji=heart04> 츄<emoji=heart04> 응츄……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はあぁ～～～<emoji=heart04>\u3000エッチの後も気持ち良くて、幸せなのです……<emoji=heart04>\u3000ちゅっ……ちゅっ<emoji=heart04>」"
translation = "「하아아~~<emoji=heart04> 엣찌한 뒤에도 기분 좋아서 행복해여……<emoji=heart04> 츄…… 츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、俺もすごく幸せだ。煩悩に付き合ってくれて、ありがとうな」"
translation = "「아아, 나도 정말 행복해. 번뇌에 어울려줘서 고맙다」"

[[dialogue]]
speaker = "unk"
original = "俺が頭を撫でると――"
translation = "내가 머리를 쓰다듬자――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、もう終わりにしちゃうのですか？」"
translation = "「회장님, 벌써 끝내버리는 건가여?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルは天使の笑顔を浮かべながら言う。"
translation = "루리엘은 천사의 미소를 띄우며 말한다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「今夜はお泊りですし、ルリエルはまだまだ子作りセックス、頑張れますよ？」"
translation = "「오늘 밤은 자고 가는 거구, 루리엘은 아직 더 아기 만들기 섹스 힘낼 수 있어여?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「――あっ<emoji=heart04>\u3000会長さん……<emoji=heart04>」"
translation = "「――앗<emoji=heart04> 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺は彼女と何度も子作りに励んでしまうのだった――"
translation = "그 후, 나는 그녀와 몇 번이고 아기 만들기에 힘쓰고 마는 것이었다――"

