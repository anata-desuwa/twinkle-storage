[[dialogue]]
speaker = "unk"
original = "第１３話,激震,B"
translation = "제13화, 격진, B"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（前もこんなことが──）"
translation = "（전에도 이런 일이──）"

[[dialogue]]
speaker = "unk"
original = "ベガの終局の瞬間、フィオナに手を伸ばそうとして……届かなかった。"
translation = "베가의 종국인 순간, 피오나에게 손을 뻗으려 했지만…… 닿지 않았다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私はベガのフィオナを救えなかった……）"
translation = "（나는 베가의 피오나를 구하지 못했어……）"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（デネブのフィオナも……助けるどころか、助けられてばかりで……）"
translation = "（데네브의 피오나도…… 구하기는커녕 도움만 받고……）"

[[dialogue]]
speaker = "unk"
original = "そして光に包まれて、ベガが消滅する──"
translation = "그리고 빛에 휩싸여 베가가 소멸한다──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……！？」"
translation = "「지그……!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──ッ！！」"
translation = "「──윽!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（今の光景は……？\u3000あの時、ジグに何が起きた……？）"
translation = "（방금 그 광경은……? 그때 지그에게 무슨 일이 일어났던 거지……?）"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よ、起きたか！\u3000行方不明になったかと思ったら、教皇庁の前で倒れてたからビックリしたぞ！」"
translation = "「여, 일어났냐! 행방불명된 줄 알았더니 교황청 앞에서 쓰러져 있어서 깜짝 놀랐다고!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「アポロ！？\u3000小さい方の……じゃあここはアルタイルか……？」"
translation = "「아폴로!? 작은 쪽의…… 그럼 여기는 알타이르인가……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「？\u3000あたしに小さいとか大きいとかあるのか？」"
translation = "「? 나한테 작다거나 크다거나 하는 게 있어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ……後で話す……」"
translation = "「아아…… 나중에 얘기할게……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たち、生きてるんだな……」"
translation = "「우리, 살아있구나……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、ちゃんと足も付いてるわね」"
translation = "「응, 제대로 발도 붙어 있네.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「おかえり！\u3000緋宮くんもヴィーナスも生きてて良かった！」"
translation = "「어서 와! 히노미야 군도 비너스도 살아있어서 다행이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ごめんマトイ、お土産買えなかったわ！」"
translation = "「미안 마토이, 선물 못 샀어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お土産！？\u3000ていうかどこ行ってたの！？」"
translation = "「선물!? 그보다 어디 갔다 온 거야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「デネブに里帰りしてたのよ」"
translation = "「데네브로 귀성했었어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「デネブ！？\u3000里帰り！？\u3000それはよかったけど！」"
translation = "「데네브!? 귀성!? 그건 다행이지만!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でもごめん、いますごくヤバいことになってて！」"
translation = "「하지만 미안, 지금 엄청 큰일 났어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヤバいこと……？」"
translation = "「큰일……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今、天界全土が極星学園に襲撃されてるの！！」"
translation = "「지금 천계 전역이 극성학원에게 습격당하고 있어!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんですってっ！？」"
translation = "「뭐라고요!?」"

