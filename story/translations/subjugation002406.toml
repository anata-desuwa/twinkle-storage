[[dialogue]]
speaker = "unk"
original = "新たな姿へと変貌を遂げたディーラックと、戦闘を開始した俺たち。"
translation = "새로운 모습으로 변모를 이룬 디럭쿠와 전투를 개시한 우리들."

[[dialogue]]
speaker = "unk"
original = "しかし――"
translation = "하지만──"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「くっ……！\u3000まるで砲撃が当たらんのじゃ……！」"
translation = "「큭……! 마치 포격이 맞지 않느느니라……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「サチちゃんの幸運……敵に回すとこんなに圧倒的だなんて……！」"
translation = "「사치짱의 행운…… 적으로 돌리니 이렇게 압도적이라니……!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「そう、いくら攻撃しても無駄サ。キミたちがこれまで勝ち続けてこられたのは、この幸運の力あってのことだからネ！」"
translation = "「그래, 아무리 공격해도 소용없다네. 너희가 지금까지 계속 이겨올 수 있었던 건 이 행운의 힘 덕분이었으니까 말이야!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「だというのに――」"
translation = "「그런데도──」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はああぁっ！\u3000ノックアップスプラッシュ！」"
translation = "「하아아앗! 노크 업 스플래시!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「諦めが悪くてウザいのサ！\u3000サチちゃんっ！」"
translation = "「포기를 몰라서 짜증 난다네! 사치짱!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――きゃあっ！？」"
translation = "「──꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "何度も攻撃に挑戦していたサチは、ディーラックの手の平から放たれた衝撃波に吹き飛ばされる。"
translation = "몇 번이나 공격을 시도하던 사치는 디럭쿠의 손바닥에서 뿜어져 나온 충격파에 날아간다."

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「サチさま！\u3000大丈夫ですか！？」"
translation = "「사치 님! 괜찮으세요!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「うん、大丈夫……！\u3000星術と魔法の二重防御で防いだから……！」"
translation = "「응, 괜찮아……! 성술과 마법의 이중 방어로 막았으니까……!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「どうやら魔法も使えるようになったみたいだけど、所詮焼け石に水サ」"
translation = "「아무래도 마법도 쓸 수 있게 된 모양이다만 결국 언 발에 오줌 누기라네」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だとしても……諦めません！」"
translation = "「그렇다 해도…… 포기하지 않겠어요!」"

[[dialogue]]
speaker = "unk"
original = "サチが再び杖を構え、ディーラックへ向けて術を使おうとする。"
translation = "사치가 다시 지팡이를 겨누고 디럭쿠를 향해 술법을 쓰려 한다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「しつこい！\u3000これで終わりサ！\u3000――ハアァッ！！」"
translation = "「끈질겨! 이걸로 끝이라네! ──하아앗!!」"

[[dialogue]]
speaker = "unk"
original = "それに対して、凄まじいエネルギーを手の平に集中させて放つディーラック。"
translation = "그것에 대항해 무시무시한 에너지를 손바닥에 집중시켜 발사하는 디럭쿠."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いけない！\u3000避けて下さい、サチさん！」"
translation = "「안 돼요! 피하세요, 사치 씨!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「無理サ！\u3000この一撃は、<b>幸運で絶対に当たる</b>！」"
translation = "「무리라네! 이 일격은 <b>행운으로</b> <b>반드시</b> <b>맞는다</b>!」"

[[dialogue]]
speaker = "unk"
original = "サチは攻撃を避けようと飛び回るが、エネルギー弾がジグザグの滅茶苦茶な軌道を描きながらも、確実にホーミングして迫る。"
translation = "사치는 공격을 피하려고 날아다니지만, 에너지탄이 지그재그로 엉망진창인 궤도를 그리면서도 확실하게 호밍하며 육박한다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（っ……ダメ！\u3000避けきれない……！）"
translation = "(윽…… 안 돼! 피할 수 없어……!)"

[[dialogue]]
speaker = "unk"
original = "次の瞬間。"
translation = "다음 순간."

[[dialogue]]
speaker = "unk"
original = "エネルギー弾はホーミングを<b>凍結</b>させられたかのように真っすぐな軌道になり──直後にサチの前に現れた<b>盾</b>によって防がれた。"
translation = "에너지탄은 호밍이 <b>동결</b>된 것처럼 일직선 궤도가 되었고── 직후 사치 앞에 나타난 <b>방패</b>에 의해 막혔다."

[[dialogue]]
speaker = "unk"
original = "それは――"
translation = "그것은──"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「――お待たせ、サチちゃん！」"
translation = "「──오래 기다렸지, 사치짱!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「お姉ちゃんたちが助けにきたわよ～」"
translation = "「언니들이 도와주러 왔다구~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「サーシャ先輩！」"
translation = "「사샤 선배!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「マトイ姉さま！」"
translation = "「마토이 언니!」"

[[dialogue]]
speaker = "unk"
original = "２人共、間に合ったか……！"
translation = "두 사람 다 제시간에 맞춰줬나……!"

[[dialogue]]
speaker = "unk"
original = "ここへ来る前、俺は嫌な予感がして、新星学園の星徒会メンバーに協力要請しておいたのだ。"
translation = "여기 오기 전, 나는 불길한 예감이 들어 신성학원의 성도회 멤버들에게 협력 요청을 해두었던 것이다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「っ……！\u3000他に誰も入って来れないよう、幸運の力で結界を張っていたはずなのにどうやって……！？」"
translation = "「윽……! 다른 누구도 들어올 수 없게 행운의 힘으로 결계를 쳤을 텐데 어떻게……!?」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「確かに小さな穴を開けるのにも苦労したわ。でも、新星学園の星徒会にはすごく頭の良い<ruby>副会長<rt>アナちゃん</rt></ruby>と、規格外の力を持つ<ruby>フィクサー<rt>ヴィーナスちゃん</rt></ruby>がいるから」"
translation = "「확실히 작은 구멍을 뚫는 데도 고생했어. 하지만 신성학원 성도회에는 엄청 똑똑한 <ruby>부회장<rt>아나짱</rt></ruby>이랑 규격 외의 힘을 가진 <ruby>픽서<rt>비너스짱</rt></ruby>이 있으니까」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「ヴィーナスのゴリ押しビームと私たちのノヴァフォームの力を合わせれば、一瞬だけなら２人通れるサイズの穴を開けられるって、アナが計算してくれたの」"
translation = "「비너스의 억지 빔이랑 우리들의 노바 폼 힘을 합치면 아주 잠깐이라면 두 명 통과할 사이즈의 구멍을 뚫을 수 있다고 아나가 계산해 줬어」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ノヴァフォーム、本当に厄介な力なのサ……！\u3000だけど、いくら星騎士が増えたところで、今のボクは止められないのサ！」"
translation = "「노바 폼, 정말 성가신 힘이라네……! 하지만 아무리 성기사가 늘어났어도 지금의 나를 멈출 수는 없다네!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――いいえ、そんなことありません」"
translation = "「──아니요, 그렇지 않아요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「助けが来て、運の流れが変わったとでも？」"
translation = "「도움이 와서 운의 흐름이 바뀌었다기라도?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「ハッ……そんなことあるわけないのサ！\u3000だってサチちゃん、キミの『幸運』は今、ボクに全部奪われているんだから！」"
translation = "「핫…… 그럴 리 없다네! 그야 사치짱, 너의 『행운』은 지금 나에게 전부 빼앗겼으니까!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「わかるかい！？\u3000キミの能力は失われたんだよ！\u3000流れは全部、ボクにあるんだ！」"
translation = "「알겠어!? 너의 능력은 잃어버린 거야! 흐름은 전부 나에게 있다구!」"

[[dialogue]]
speaker = "unk"
original = "しかし、サチは怯まず、真っすぐにディーラックを見つめ返しながら言う。"
translation = "하지만 사치는 굴하지 않고 똑바로 디럭쿠를 마주 보며 말한다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「違います。私の幸運は決して失われてなんかいません」"
translation = "「아니에요. 저의 행운은 결코 잃어버리지 않았어요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「何故なら――私の本当の幸運は、私が困っている時、手を差し伸べて支えてくれる、みんながいてくれることだから」"
translation = "「왜냐하면── 저의 진짜 행운은 제가 곤란할 때 손을 내밀어 지탱해 주는 모두가 있어 주는 것이니까요」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「は……？」"
translation = "「하……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「今回のことで、やっと分かったんです。私に<b>幸せを運んでくれる</b>人たち――その人たちとの出会いと絆こそが、私にとっての『幸運』なんだって」"
translation = "「이번 일로 드디어 깨달았어요. 저에게 <b>행복을</b> <b>실어다</b> <b>주는</b> 사람들── 그 사람들과의 만남과 유대야말로 저에게 있어 『행운』이라는 걸요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だから……そこから生まれたラッキーをちょっと持って行かれた程度で、私は挫けたりしません！」"
translation = "「그러니까…… 거기서 태어난 럭키를 좀 가져갔다고 해서 저는 꺾이지 않아요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だって――」"
translation = "「왜냐하면──」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私の輝く幸運の星たちは、こんなにも沢山輝いているんだから！」"
translation = "「나의 빛나는 행운의 별들은, 이렇게나 많이 반짝이고 있으니까!」"

[[dialogue]]
speaker = "unk"
original = "その時だ。"
translation = "그때였다."

[[dialogue]]
speaker = "unk"
original = "俺の目に、サチの心に輝く<b>星</b>が見えた。"
translation = "내 눈에, 사치의 마음에 빛나는 <b>별</b>이 보였다."

[[dialogue]]
speaker = "unk"
original = "先日、サチの戦闘服がアップデートされた際に――"
translation = "며칠 전, 사치의 전투복이 업데이트되었을 때──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「実は、今はまだ使えませんが、サチさんの戦闘服にはもう１つの機能があります」"
translation = "「실은, 지금은 아직 사용할 수 없지만, 사치 씨의 전투복에는 또 하나의 기능이 있어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「というより、本来はそっちが本命です」"
translation = "「이라기보다, 원래는 그쪽이 진짜 목적이죠」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「魔王の力と同じように、別の力同士――星力と魔力を融合させることで爆発的に出力を引き上げる『融合反応炉心』」"
translation = "「마왕의 힘과 마찬가지로, 서로 다른 힘끼리──성력과 마력을 융합시켜 폭발적으로 출력을 끌어올리는 『융합 반응 노심』」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それを起動させるには、２つの条件を満たす必要があります」"
translation = "「그것을 기동시키려면 두 가지 조건을 만족해야 해요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「１つは、サチさんが幸運の力を取り戻すこと。本来、融合反応は成功確率が非常に低く、それを安定させる為にはサチさんの幸運で成功確率を引き上げる必要があります」"
translation = "「하나는, 사치 씨가 행운의 힘을 되찾는 것. 원래 융합 반응은 성공 확률이 매우 낮아서, 그것을 안정시키기 위해서는 사치 씨의 행운으로 성공 확률을 끌어올릴 필요가 있어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そして、もう１つの条件は――」"
translation = "「그리고, 또 하나의 조건은──」"

[[dialogue]]
speaker = "unk"
original = "――俺は信じていた。"
translation = "──나는 믿고 있었다."

[[dialogue]]
speaker = "unk"
original = "いや、きっと、他のみんなも同じだ。"
translation = "아니, 분명 다른 모두도 마찬가지일 것이다."

[[dialogue]]
speaker = "unk"
original = "サチならきっと、幸運を取り戻せる。"
translation = "사치라면 반드시 행운을 되찾을 수 있을 거라고."

[[dialogue]]
speaker = "unk"
original = "だから、俺は迷わずもう１つの条件――<b>炉心に火を灯す</b>為に、その技を叫ぶ。"
translation = "그래서 나는 망설임 없이 또 하나의 조건──<b>노심에</b> <b>불을</b> <b>붙이기</b> 위해, 그 기술의 이름을 외친다."

[[dialogue]]
speaker = "unk"
original = "アルケインノヴァエクストリーム！！！"
translation = "알케인 노바 익스트림!!!"

[[dialogue]]
speaker = "unk"
original = "――私は、白い光の中にいた。"
translation = "──나는 하얀 빛 속에 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、その中で更に眩く輝く星を見つける。"
translation = "그리고 그 안에서 더욱 눈부시게 빛나는 별을 발견한다."

[[dialogue]]
speaker = "unk"
original = "私はそれを掴もうと、手を伸ばす。"
translation = "나는 그것을 붙잡으려 손을 뻗는다."

[[dialogue]]
speaker = "unk"
original = "しかし、私１人では手が届かない。"
translation = "하지만 나 혼자서는 손이 닿지 않는다."

[[dialogue]]
speaker = "unk"
original = "でも――"
translation = "하지만──"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「サチさん！」"
translation = "「사치 씨!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「サチちゃん！」"
translation = "「사치 짱!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「サチちゃん！」"
translation = "「사치 짱!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「サチちゃん！」"
translation = "「사치 짱!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「サチさま！」"
translation = "「사치 님!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「我がライバルなら、取り戻してみせろ！」"
translation = "「나의 라이벌이라면, 되찾아 보아라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「サチ！！！」"
translation = "「사치!!!」"

[[dialogue]]
speaker = "unk"
original = "みんなが、相棒が――背中を押してくれる。"
translation = "모두가, 파트너가── 등을 밀어준다."

[[dialogue]]
speaker = "unk"
original = "そして――ついに手が届き、掴み取る。"
translation = "그리고── 드디어 손이 닿아, 움켜쥔다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「輝け――私の『<ruby>幸運の星<rt>ラッキースター</rt></ruby>』！！！」"
translation = "「빛나라── 나의 『<ruby>행운의 별<rt>럭키 스타</rt></ruby>』!!!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「――感じます。流星がこちらに流れたのを」"
translation = "「──느껴져요. 유성이 이쪽으로 흘러온 것을」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「な、なんなのサ……その姿は一体！？」"
translation = "「뭐, 뭐야…… 그 모습은 도대체!?」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「これは、みんながくれた幸運の力……だから、今こそ名乗ります」"
translation = "「이것은 모두가 준 행운의 힘…… 그러니 지금이야말로 이름을 대겠어요」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「この手に掴むは、明日を照らす光！」"
translation = "「이 손에 쥐는 것은 내일을 비추는 빛!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「幸運の魔法少女トレジャー☆サチ、フォルトゥーナフォーム！\u3000ここに新生です！」"
translation = "「행운의 마법소녀 트레저☆사치, 포르투나 폼! 여기에 다시 태어났습니다!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「フォルトゥーナフォーム！？」"
translation = "「포르투나 폼!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「――我らも忘れてもらっては困るぞ」"
translation = "「──우리도 잊어버리면 곤란하니라」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「悪の終末兵器にして、トレジャー☆サチの宿命のライバル！\u3000漆黒の魔法少女プリムラ†ノワール！」"
translation = "「악의 종말병기이자, 트레저☆사치의 숙명의 라이벌! 칠흑의 마법소녀 프리뮬라†누아르!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「愛する友へ感謝を込めて、心願成就！\u3000聖杯の魔法少女グレイル☆シズハ！」"
translation = "「사랑하는 친구에게 감사를 담아, 심원성취! 성배의 마법소녀 그레일☆시즈하!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「僭越ながら、助太刀致します――魔法少女の友、詠野トマル！」"
translation = "「넘치는 참견이지만, 돕도록 하겠습니다── 마법소녀의 친구, 에이노 토마루!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そして、華麗に復活を遂げた蒐集の魔法少女――トレジャー☆アンナ！」"
translation = "「그리고 화려하게 부활을 이뤄낸 수집의 마법소녀── 트레저☆안나!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「さあ、サチさん！\u3000素敵にステッキ、決めちゃいましょう！」"
translation = "「자, 사치 씨! 멋지게 스틱, 결정해 버리자고요!」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「はい！\u3000人事天命――」"
translation = "「네! 진인사대천명──」"

[[dialogue]]
speaker_original = "サチ（覚醒）"
speaker_translation = "사치(각성)"
original = "「ここからは、ハズレなしです！」"
translation = "「여기서부터는, 꽝은 없어요!」"

[[dialogue]]
speaker = "unk"
original = "そうして、新たな変身を果たしたサチを中心として、俺たちは再びディーラックへ勝負を挑むのだった――"
translation = "그렇게 새로운 변신을 마친 사치를 중심으로, 우리들은 다시 디럭쿠에게 승부를 도전하는 것이었다──"

