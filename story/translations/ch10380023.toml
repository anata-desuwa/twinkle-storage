[[dialogue]]
speaker = "unk"
original = "第３話,冬は牡蠣小屋も楽しめるらしい,P"
translation = "제3화, 겨울에는 굴 오두막도 즐길 수 있는 모양이다"

[[dialogue]]
speaker = "イクシリオン"
original = "「このまま真っ直ぐでいいんですかっ？\u3000いいんですよねっ？」"
translation = "「이대로 똑바로 가면 되나요? 되는 거죠?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「えっ、もう少し右っ？\u3000今度は左っ？\u3000い、いきすぎって──～～っっ。目隠ししているだけで達するほど、私も上級者では……！」"
translation = "「엣, 조금 더 오른쪽? 이번엔 왼쪽? 너, 너무 갔다고──~~읏읏. 눈 가리고 있는 것만으로 갈 정도라니, 저도 상급자는……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「やりましたっ。見事スイカに的中です！」"
translation = "「해냈어요. 멋지게 수박에 명중이에요!」"

[[dialogue]]
speaker = "unk"
original = "流石はイクシー！"
translation = "역시 익시야!"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長の誘導があってこそですよ。２人でもぎ取った勝利です」"
translation = "「회장님의 유도가 있었기에 가능했어요. 둘이서 따낸 승리에요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ……。も、もぎ取るというのは決していやらしい意味ではありませんよっ？\u3000胸に瑞々しいフルーツが実ってるじゃないか、ぐへへへ──とか思わないでくださいねっ？」"
translation = "「앗……. 따낸다는 건 결코 야한 의미가 아니에요옷? 가슴에 싱싱한 과일이 열려 있잖아, 구헤헤헤── 라든가 생각하지 말아 주세요?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「え、そんなこと思ってない？\u3000そ、そうですか。いえ、別に残念なわけでは」"
translation = "「에, 그런 생각 안 한다고요? 그, 그렇군요. 아니, 딱히 아쉬운 건 아니에요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それより早くスイカを食べましょう！\u3000シャクシャク、んん～♪\u3000甘くて冷たくて美味しいですね♪」"
translation = "「그보다 빨리 수박을 먹어요! 아삭아삭, 응응~♪ 달고 시원해서 맛있네요♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あとで詰め所にも差し入れに行きましょう。お休みをくださった皆さんにお礼もしたいですし」"
translation = "「나중에 대기소에도 가져다드려요. 휴가를 주신 분들께 감사 인사도 하고 싶고요」"

[[dialogue]]
speaker = "unk"
original = "みんな、優しかったね"
translation = "다들 상냥했지"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はい。少し恥ずかしかったですけどね……？\u3000たまには彼氏と遊んできたらと、背中をぐいぐい押されてしまいましたし……」"
translation = "「네, 네. 조금 부끄러웠지만요……? 가끔은 남자친구랑 놀다 오라고, 등을 떠밀려버렸고……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「だけど最高に楽しいです♪\u3000今日は１日めいっぱい楽しんで、明日からまたライフセーバー活動に精を出しましょう！」"
translation = "「하지만 최고로 즐거워요♪ 오늘은 하루 종일 마음껏 즐기고, 내일부터 다시 라이프세이버 활동에 정성을 다해요!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「……あっ。い、今の精を出すというのは決して卑猥な意味で言ったわけではありませんから。と、とにかく遊びましょう！」"
translation = "「……앗. 지, 지금 정성을 다한다는 건 결코 비속한 의미로 말한 게 아니니까요. 어, 어쨌든 놀아요!」"

[[dialogue]]
speaker = "unk"
original = "泳いだり、ビーチバレーをしたり、体を動かすとお腹が空く。"
translation = "수영하거나, 비치발리볼을 하거나, 몸을 움직이면 배가 고파진다."

[[dialogue]]
speaker = "unk"
original = "お昼は浜焼きで魚介類を楽しむことにした。"
translation = "점심은 해변 구이로 해산물을 즐기기로 했다."

[[dialogue]]
speaker = "イクシリオン"
original = "「お～……！\u3000見てください、会長！\u3000焼けた貝から美味しそうなおつゆが溢れて……！\u3000は、早く開きませんかねっ……？」"
translation = "「오~……! 보세요, 회장님! 구워진 조개에서 맛있는 국물이 넘쳐나서……! 빠, 빨리 안 열릴까요……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「こっちのイカも良い感じですよ……！\u3000あっ、アワビがくぱぁしました……！\u3000熱気がすごいっ……！\u3000まだヒクヒク動いてますっ……！」"
translation = "「이쪽 오징어도 느낌 좋아요……! 앗, 전복이 쿠파 했어요……! 열기가 대단해……! 아직 움찔움찔 움직여요……!」"

[[dialogue]]
speaker = "unk"
original = "ツッコミ待ちかな？"
translation = "츳코미 기다리는 거야?"

[[dialogue]]
speaker = "イクシリオン"
original = "「へ……？\u3000～～っっ。ち、違いますよ、今回は本当に違います……！\u3000私はただ浜焼きを楽しみにしていただけで……！」"
translation = "「헤……? ~~읏읏. 아, 아니에요, 이번엔 정말 아니에요……! 저는 그냥 해변 구이를 기대하고 있었을 뿐이고……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ライフセーバーという立場上、海の家で食事を取るのは控えていましたから。あっ、焼けましたよ……！\u3000さぁ、食べましょう！」"
translation = "「라이프세이버라는 입장상, 바다의 집에서 식사하는 건 삼가고 있었으니까요. 앗, 다 구워졌어요……! 자, 먹어요!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あぁ美味しい……。ほっぺが落ちそうです……♪\u3000新鮮な魚介類の美味たるはもう……♪\u3000この塩焼きそばも美味です……♪」"
translation = "「아아 맛있어……. 뺨이 떨어질 것 같아요……♪ 신선한 해산물의 맛이란 정말……♪ 이 소금 야키소바도 별미네요……♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長もどんどん食べてくださいね？\u3000店主さんがバケツ三杯分もサービスしてくれましたから」"
translation = "「회장님도 팍팍 드세요? 주인아저씨가 양동이 세 개 분량이나 서비스해주셨으니까요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「もぐもぐ、んん～……<emoji=heart04>\u3000本当に幸せですぅ……<emoji=heart04>\u3000いくらでも食べられちゃいますね<emoji=heart04>」"
translation = "「우물우물, 응응~……<emoji=heart04> 정말 행복해요오……<emoji=heart04> 얼마든지 먹을 수 있겠어요<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「って、どうしたんですか会長？\u3000じっと私を見つめて……──ハっ！\u3000ま、まさか……」"
translation = "「어라, 왜 그러세요 회장님? 빤히 저를 쳐다보시고……──핫! 서, 설마……」"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000食べないの？"
translation = "어라? 안 먹어?"

[[dialogue]]
speaker = "イクシリオン"
original = "「い、いえ。もうお腹いっぱいになっちゃいましたから。店主さんもサービスしすぎですよね。女の子相手にバケツ三杯分もなんて」"
translation = "「아, 아니요. 벌써 배가 불러버렸거든요. 주인아저씨도 너무 서비스해주셨죠. 여자애 상대로 양동이 세 개 분량이라니」"

[[dialogue]]
speaker = "イクシリオン"
original = "（た、ただでさえ競泳水着ってパツパツですし……。こんなに食べてしまったらお腹が……。いくら私の燃費が良いと言ってもポコっと……！）"
translation = "(그, 그렇지 않아도 경쟁용 수영복은 꽉 끼는데……. 이렇게 먹어버리면 배가……. 아무리 제가 연비가 좋다고 해도 볼록하게……!)"

[[dialogue]]
speaker = "イクシリオン"
original = "（そもそも私、女子のクセに食べ過ぎなのでは……？\u3000か、会長も自分のお箸を止めて、じーっと見てきていましたし……）"
translation = "(애초에 나, 여자인 주제에 너무 많이 먹는 거 아냐……? 회, 회장님도 젓가락을 멈추고, 빤히 보고 계셨고……)"

[[dialogue]]
speaker = "イクシリオン"
original = "（は、恥ずかしい……！\u3000食べっぷりに引いていたのかと思うと、裸を見られるより恥ずかしいですっ……！）"
translation = "(부, 부끄러워……! 먹는 모습에 정떨어진 건가 생각하니, 알몸을 보이는 것보다 부끄러워요옷……!)"

[[dialogue]]
speaker = "イクシリオン"
original = "「えっ！？\u3000いえいえ独り言です、気にしないでください……！\u3000会長こそ、どんどん食べてください。私のことは気にせずに～……」"
translation = "「엣!? 아니아니 혼잣말이에요, 신경 쓰지 마세요……! 회장님이야말로, 팍팍 드세요. 저는 신경 쓰지 마시고~……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あ……。あう……。あぁ……。お……美味しそう……」"
translation = "「아……. 아우……. 아아……. 마…… 맛있겠다……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「へっ！？\u3000いえいえっ、私は本当にお腹いっぱいですから……！\u3000あまり食べると、このあと泳げなくなりますしね……！」"
translation = "「헷!? 아니아니요 저는 정말로 배불러서……! 너무 먹으면, 이 뒤에 수영을 못 하게 되니까요……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「どうぞどうぞお好きに食べてください。私のことは一切気にしなくて構いませんから……」"
translation = "「드세요 드세요 마음껏 드세요. 저는 일절 신경 쓰지 않으셔도 되니까요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "（あっ……！\u3000あれは私がじっくり育てていたバカ貝……！\u3000あぁっ、そっちは楽しみにとっておいたエビっ……！\u3000とっておきのゲソまでっ……！）"
translation = "(앗……! 저건 내가 공들여 키우던 바보조개……! 아앗, 그쪽은 아껴두었던 새우……! 아껴둔 오징어 다리까지……!)"

[[dialogue]]
speaker = "イクシリオン"
original = "「っっ！\u3000ななな、なんでもないですよっ？\u3000会長のお好きに、う、うぅ、お好きに食べてくだされば……！」"
translation = "「읏읏! 아아아무것도 아니에요옷? 회장님 마음대로, 으, 으으, 마음대로 드시면……!」"

[[dialogue]]
speaker = "unk"
original = "俺は幸せ一杯に食べるイクシーが好きなんだけどな"
translation = "난 행복하게 먹는 익시를 좋아하는데"

[[dialogue]]
speaker = "イクシリオン"
original = "「え……？\u3000そ、そうなんですか……？\u3000だからさっきじーっと私を見て……？」"
translation = "「에……? 그, 그런가요……? 그래서 아까 빤히 저를 보고……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「で、でも、あんまりガツガツ食べると女の子らしくないと言いますか……。会長に、その、引かれてしまいそうで……」"
translation = "「하, 하지만, 너무 게걸스럽게 먹으면 여자답지 않다고 할까……. 회장님이, 그, 정떨어지실까 봐……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぇ……！？\u3000お箸をこちらに向けて一体なにを……！\u3000えっ、あーんですか……！？」"
translation = "「페……!? 젓가락을 이쪽으로 향하고 대체 뭘……! 엣, 아~앙 인가요……!?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、恥ずかしいですよ、周りに人もいますし。それにまた食べ始めようものなら、もう歯止めが──」"
translation = "「부, 부끄러워요, 주변에 사람도 있고. 게다가 다시 먹기 시작했다간, 이제 걷잡을 수──」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あぁっ、待ってっ……！\u3000食べないでくださいっ……！\u3000その魚肉ソーセージは……！\u3000一番楽しみにしていたこの海の家の名物の……！」"
translation = "「아앗, 잠깐만요……! 먹지 마세요……! 그 소시지는……! 제일 기대하고 있었던 이 바다의 집 명물인……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「わ、わかりました。私の負けです。お願いします、食べさせて……ください」"
translation = "「아, 알겠습니다. 제 패배예요. 부탁이에요, 먹여…… 주세요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私の口の中に、んあぁ、かいひょーのそーせーじ、いれへくだひゃい……」"
translation = "「제 입안에, 응아아, 회장님의 소시지, 넣어주세효……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あーん……はむぅん。──んんっっ～<emoji=heart04>\u3000お、おいひぃ……<emoji=heart04>」"
translation = "「아앙…… 하무웅. ──응응읏~<emoji=heart04> 마, 맛있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はぁはぁ、もうとめられませんよ……？\u3000こんなの食べさせられちゃったら、もう我慢できません……」"
translation = "「하아하아, 이제 멈출 수 없어요……? 이런 걸 먹여주신다면, 이제 참을 수 없어요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「もっと食べさせてください……。はぁはぁ、おかわり欲しいです……。もっともっと、あーんしてください……」"
translation = "「더 먹여주세요……. 하아하아, 한 그릇 더 원해요……. 좀 더 좀 더, 아앙 해주세요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「えへへ、あーん……。んふぅん、美味しいですぅ……」"
translation = "「에헤헤, 아앙……. 응후웅, 맛있어요오……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長って本当に物好きなお方ですね……？\u3000私を恋人にしてくれたのもそうですけど、食べる姿を見るのが好きなんて……」"
translation = "「회장님은 정말 별나신 분이네요……? 저를 여자친구로 삼아주신 것도 그렇지만, 먹는 모습을 보는 게 좋다니……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そういうことなら私も遠慮しません。本当はまだまだお腹ペコペコだったんです！」"
translation = "「그런 거라면 저도 사양하지 않겠어요. 사실은 아직 배가 아주 고팠거든요!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長には私が幸せ一杯に食べる姿、特等席で見せてあげますよ。というわけで、あ～ん」"
translation = "「회장님께는 제가 행복 가득하게 먹는 모습, 특등석에서 보여드릴게요. 그런 의미에서, 아~앙」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お腹いっぱいになるまで……食べさせてくださいね<emoji=heart04>」"
translation = "「배가 가득 찰 때까지…… 먹여주셔야 해요<emoji=heart04>」"

