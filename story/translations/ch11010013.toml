[[dialogue]]
speaker = "unk"
original = "第３話,轟雷の守護者,P"
translation = "제3화, 굉뢰의 수호자, P"

[[dialogue]]
speaker = "unk"
original = "リクリエ後もモンスターは断続的に現れている。リクリエの残滓か、あるいは別の異変かは分からないが、星騎士のやるべきことは変わらない。"
translation = "리크리에 후에도 몬스터는 단속적으로 나타나고 있다. 리크리에의 잔재인지, 혹은 다른 이변인지는 알 수 없지만 성기사가 해야 할 일은 변하지 않는다."

[[dialogue]]
speaker = "モンスター"
original = "「イ～～ッ！」"
translation = "「이~~잇!」"

[[dialogue]]
speaker = "モンスター"
original = "「イーーーッ！」"
translation = "「이이이~~잇!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「モンスターはあたしが引き付けるから、会長くんは一般人の避難誘導をお願い！」"
translation = "「몬스터는 내가 끌어들일 테니까, 회장군은 일반인 피난 유도를 부탁해!」"

[[dialogue]]
speaker = "モンスター"
original = "「ブルルルル！！」"
translation = "「부르르르르!!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ッ──！」"
translation = "「윽──!」"

[[dialogue]]
speaker = "unk"
original = "モンスターがシルヴィ先輩めがけて突進してくるが、先輩は一歩も引くことなく受け止めた。"
translation = "몬스터가 실비 선배를 향해 돌진해 오지만 선배는 한 발짝도 물러서지 않고 받아냈다."

[[dialogue]]
speaker = "シルヴィ"
original = "「パワーなら負けないよ！\u3000サンダービートスマッシュ！」"
translation = "「파워라면 지지 않아! 썬더 비트 스매시!」"

[[dialogue]]
speaker = "モンスター"
original = "「ブルル……」"
translation = "「부르르……」"

[[dialogue]]
speaker = "モンスター"
original = "「パオ～～ンッ！！」"
translation = "「파오~~옹!!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「おお、こいつはデカい！\u3000あたしがモンスターの正面から突っ込むから、みんなは背後から攻撃して！」"
translation = "「오오, 이 녀석은 크네! 내가 몬스터의 정면에서 돌진할 테니까 모두는 뒤에서 공격해!」"

[[dialogue]]
speaker = "unk"
original = "後日、カフェテリアで食事をとる２人を見つけた。"
translation = "며칠 뒤, 카페테리아에서 식사를 하는 두 사람을 발견했다."

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩っていつもあんな戦い方なんですか？"
translation = "실비 선배는 항상 저런 식의 싸움 방식인가요?"

[[dialogue]]
speaker = "シルヴィ"
original = "「あんなってどんな？\u3000めちゃくちゃカッコイイってこと？」"
translation = "「저런 식이라니 어떤 식? 엄청나게 멋있다는 거야?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あ、もしかしてあたしに惚れちゃった？\u3000じゃあドラムかスティックにサインを──え、違う？」"
translation = "「아, 혹시 나한테 반했어? 그럼 드럼이나 스틱에 사인을── 에, 아냐?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……え？\u3000前に立って敵の攻撃を引き受けてるって？」"
translation = "「……에? 앞에 서서 적의 공격을 대신 받고 있다는 거?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うん、そうだよ。あたしの星術は目立つし、狙われやすいから、みんなを守るにはちょうどいいんだよね」"
translation = "「응, 맞아. 내 성술은 눈에 띄고 타겟이 되기 쉬우니까 모두를 지키기엔 딱 좋거든.」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんからも言ってあげて～。いつか本当に死んじゃいますよって」"
translation = "「회장군도 한마디 해줘요~ 언젠가 정말 죽어버릴 거라고.」"

[[dialogue]]
speaker = "サーシャ"
original = "「私から言っても聞かないから。バカにつける薬はないって本当ね～」"
translation = "「내가 말해도 안 들으니까요. 바보에게 약도 없다는 건 정말이네요~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「えぇっ、そんな風に思ってたんだ！？」"
translation = "「에엣, 그런 식으로 생각했었어!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよ。自分がどれだけ人に心配をかけてるか、たまには考えなさい」"
translation = "「그럼요. 자신이 얼마나 남을 걱정시키고 있는지 가끔은 생각 좀 하세요.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「う～ん。でも、戦い方を変えるつもりはないし、そんな簡単に変えられないからねー」"
translation = "「으음. 하지만 싸움 방식을 바꿀 생각은 없고 그렇게 쉽게 바꿀 수도 없으니까 말이야~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「会長くんも、戦い方を変えた方がいいって思う？」"
translation = "「회장군도 싸움 방식을 바꾸는 게 좋다고 생각해?」"

[[dialogue]]
speaker = "unk"
original = "俺は心配です"
translation = "전 걱정됩니다."

[[dialogue]]
speaker = "シルヴィ"
original = "「別に早死にしたいわけでも痛いのが好きなわけでもないよ。誰かが傷つくより、自分が傷ついた方がいいってだけ」"
translation = "「딱히 일찍 죽고 싶다거나 아픈 걸 좋아하는 건 아니야. 누군가 다치는 것보다 내가 다치는 게 낫다는 것뿐.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「会長くんには話したっけ？\u3000あたしの故郷の町は天界の田舎町なんだけど、モンスターに襲われてめちゃくちゃになっちゃった」"
translation = "「회장군에게 말했던가? 내 고향 마을은 천계의 시골 마을인데 몬스터에게 습격당해서 엉망진창이 됐었어.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「Ｓランクモンスターとかじゃない、普通のモンスターにだよ」"
translation = "「S랭크 몬스터 같은 게 아니라 평범한 몬스터에게 말이야.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「その時、モンスターを倒してくれた星騎士のお姉さんに憧れて、あたしはこの学園に来たんだ」"
translation = "「그때 몬스터를 물리쳐준 성기사 언니를 동경해서 난 이 학원에 온 거야.」"

[[dialogue]]
speaker = "unk"
original = "俺にも憧れの人がいます"
translation = "저에게도 동경하는 사람이 있습니다."

[[dialogue]]
speaker = "unk"
original = "その人は道を違えてしまったけれど、それでも見上げた星の輝きは、今も俺を照らしている。"
translation = "그 사람은 길을 달리하게 되었지만, 그래도 올려다본 별의 반짝임은 지금도 나를 비추고 있다."

[[dialogue]]
speaker = "シルヴィ"
original = "「そうなんだ。あたしたち、実は似てるのかも」"
translation = "「그렇구나. 우리 사실 닮았을지도 모르겠네.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「じゃあ、君なら分かるよね？\u3000あたしの気持ち」"
translation = "「그럼 너라면 알겠지? 내 기분.」"

[[dialogue]]
speaker = "unk"
original = "正直、分かります"
translation = "솔직히 알 것 같습니다."

[[dialogue]]
speaker = "シルヴィ"
original = "「ほら、やっぱり！」"
translation = "「거봐, 역시!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ～あ、会長くんも絆されちゃった」"
translation = "「아~아, 회장군도 넘어가 버렸네.」"

[[dialogue]]
speaker = "サーシャ"
original = "「まぁ、そうなる気はしてたわ。会長くんは優しいから」"
translation = "「뭐, 그렇게 될 줄 알았어요. 회장군은 다정하니까.」"

[[dialogue]]
speaker = "unk"
original = "身を挺してでも誰かを守りたい。そういう気持ちは、星騎士なら誰もが抱いていると思う。"
translation = "몸을 던져서라도 누군가를 지키고 싶다. 그런 마음은 성기사라면 누구나 품고 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "それを否定することはできない。"
translation = "그것을 부정할 수는 없다."

[[dialogue]]
speaker = "unk"
original = "だから、シルヴィ先輩も俺が守ります"
translation = "그러니까 실비 선배도 제가 지키겠습니다."

[[dialogue]]
speaker = "シルヴィ"
original = "「はいぃ！？\u3000話聞いてた！？\u3000あたしがみんなを守るんだって！」"
translation = "「하예!? 내 말 들었어!? 내가 모두를 지키는 거라고!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……みんなを守るあたしを守りたい？\u3000なんかトンチみたいだね……」"
translation = "「……모두를 지키는 나를 지키고 싶다? 무슨 수수께끼 같네……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ぷっ、あはははは！！」"
translation = "「풋, 아하하하하!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「一本とられたわね、シルヴィ。……私からもお願いね。この子が無茶しないか見張っててちょうだい」"
translation = "「한 방 먹었네, 실비. ……나도 부탁할게. 이 아이가 무리하지 않는지 지켜봐 주렴.」"

[[dialogue]]
speaker = "unk"
original = "はい！"
translation = "네!"

[[dialogue]]
speaker = "シルヴィ"
original = "「え～！」"
translation = "「에~!」"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんはあなたに似て、頑固者だから諦めなさいな」"
translation = "「회장군은 너랑 닮아서 고집불통이니까 포기하렴.」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うーん、考えとく……」"
translation = "「으음, 생각해볼게……」"

[[dialogue]]
speaker = "シルヴィ"
original = "「モヤモヤするから、から揚げおかわりしてくる！」"
translation = "「답답하니까 가라아게 추가해 올게!」"

[[dialogue]]
speaker = "サーシャ"
original = "「太るわよ～」"
translation = "「살찐단다~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「太ったら会長くんにダイエット付き合ってもらうもん！」"
translation = "「살찌면 회장군한테 다이어트 같이 해달라고 할 거야!」"

[[dialogue]]
speaker = "unk"
original = "遠ざかる背中に、にっこりと笑うサーシャ先輩だった。"
translation = "멀어지는 뒷모습에 싱긋 웃는 사샤 선배였다."

