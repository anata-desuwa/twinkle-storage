[[dialogue]]
speaker = "キリカ"
original = "「教皇庁の伝手で、開業前の結婚式場をお借りしました。式場の運営は民間とはいえ、神官が式を取り仕切ることもありますし、教皇庁とは密接な関係にありますので」"
translation = "「교황청의 연줄로 개업 전의 예식장을 빌렸습니다. 식장 운영은 민간이라지만 신관이 식을 집전하기도 하고, 교황청과는 밀접한 관계에 있으니까요.」"

[[dialogue]]
speaker = "トワ先生"
original = "「なるほどなるほど……じゃあ後はフィオナちゃんと会長くんが結婚するだけだね！」"
translation = "「과연 과연…… 그럼 남은 건 피오나짱과 회장군이 결혼하는 것뿐이네!」"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほどじゃありません！\u3000私と緋宮会長が結婚って、どういうことですか！？」"
translation = "「과연이 아니에요! 저랑 <u>히노미야</u> 회장이 결혼이라니, 그게 무슨 소리인가요!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「結婚って言ってもふりだよ、<b>ふり</b>。本当に結婚する必要はなくて、フィオナちゃんの『結婚っていいな』欲が満たされればいいんだから」"
translation = "「결혼이라고 해도 흉내야, <b>흉내</b>. 정말로 결혼할 필요는 없고, 피오나짱의 『결혼이란 좋구나』 욕구만 채워지면 되는 거니까.」"

[[dialogue]]
speaker = "フィオナ"
original = "「その言い方もうやめてもらっていいですか！？」"
translation = "「그 말 좀 이제 그만해주시면 안 될까요!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「その……この状態を解決するには、結婚式を挙げる必要があるのはわかりました。だからといって、緋宮会長を連れてこなくても……」"
translation = "「그…… 이 상태를 해결하려면 결혼식을 올릴 필요가 있다는 건 알겠습니다. 그렇다고 해서 <u>히노미야</u> 회장을 데려오지 않아도……」"

[[dialogue]]
speaker = "トワ先生"
original = "「でも会長くん以外に適任がいる？\u3000たとえふりだとしても、フィオナちゃんが結婚式をしてもいい男の人って他にいるかな？」"
translation = "「하지만 회장군 말고 적임자가 있어? 설령 흉내라 하더라도 피오나짱이 결혼식을 올려도 좋을 남자가 달리 있을까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは…………いないですけど」"
translation = "「그건………… 없긴 하지만요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「結婚式をするなら、やっぱり緋宮会長がいい──」"
translation = "「결혼식을 한다면 역시 <u>히노미야</u> 회장이 좋아──」"

[[dialogue]]
speaker = "unk"
original = "（フィオナと目が合う）"
translation = "(피오나와 눈이 마주친다)"

[[dialogue]]
speaker = "フィオナ"
original = "「うぅ～～～っ！？\u3000誰か殺して～～～っ！？」"
translation = "「으으~~~앗!? 누가 나 좀 죽여줘어어~~~앗!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「やめるニャン！\u3000フィオナ嬢のメンタルポイントはもうゼロニャ！」"
translation = "「그만두는 거다냥! 피오나 양의 멘탈 포인트는 이미 제로다냥!」"

[[dialogue]]
speaker = "unk"
original = "（さすがに気まずい……）"
translation = "(과연 멋쩍구만……)"

[[dialogue]]
speaker = "ナミエル"
original = "「偽りの式とはいえ、緋宮会長がフィオナお嬢様と結ばれるなんて、私は反対です。きっとよからぬことを想像しているに違いありません」"
translation = "「거짓된 식이라고는 하나, <u>히노미야</u> 회장이 피오나 아가씨와 맺어지다니 저는 반대입니다. 분명 불순한 상상을 하고 있을 게 틀림없어요.」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ワガハイもフィオナ嬢を嫁に出すのは早いと思うのニャン」"
translation = "「이 몸도 피오나 양을 시집보내는 건 이르다고 생각한다냥.」"

[[dialogue]]
speaker = "フィオナ"
original = "「いやこれは、戦闘服を元に戻すためだから。本当の結婚じゃないから。ね、キリカ？」"
translation = "「아니 이건 전투복을 원래대로 돌리기 위해서니까. 진짜 결혼이 아니니까. 그치, 키리카?」"

[[dialogue]]
speaker = "キリカ"
original = "「私としても、フィオナお嬢様の婚姻を認めるのは本意ではありません。お嬢様にふさわしい殿方かどうか見極めてからにすべきです」"
translation = "「저로서도 피오나 아가씨의 혼인을 인정하는 것은 본의가 아닙니다. 아가씨께 어울리는 분인지 지켜본 뒤에 결정해야 합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカまで！？」"
translation = "「키리카까지!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「皆さま、お待たせしました。私にご用事があると伺ったのですが──」"
translation = "「여러분, 오래 기다리셨습니다. 제게 볼일이 있다고 들었습니다만──」"

[[dialogue]]
speaker = "イレーナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "イレーナ"
original = "「会長さん、少しこちらへ」"
translation = "「회장님, 잠시 이쪽으로.」"

[[dialogue]]
speaker = "イレーナ"
original = "「何この修羅場？\u3000あんた何やらかしたのよ？\u3000……え？\u3000戦闘服がウェディングドレスになって、元に戻すためには結婚式を挙げなきゃいけない？」"
translation = "「뭐야 이 수라장은? 당신 무슨 짓을 저지른 거야? ……에? 전투복이 웨딩드레스가 돼서, 원래대로 돌리려면 결혼식을 올려야 한다구?」"

[[dialogue]]
speaker = "イレーナ"
original = "「何それ、そんなことありえるの……。まぁ、どうしてあたしが呼ばれたかはわかったわ……」"
translation = "「뭐야 그게, 그런 일이 있을 수 있는 거야……. 뭐, 어째서 내가 불렸는지는 알겠네……」"

[[dialogue]]
speaker = "フィオナ"
original = "「お呼び立てしてすみません、イレーナさん。実は神官として式を挙げてほしくて……あ、もちろん本物の式ではないですよ。あくまでふりというか……」"
translation = "「불러내서 죄송해요, 이레이나 씨. 사실은 신관으로서 식을 올려주셨으면 해서…… 아, 물론 진짜 식은 아니에요. 어디까지나 흉내랄까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ご用件は理解しましたが……弱りましたね。若輩の身ではありますが、私は正式な神官です。ご事情がおありとはいえ、偽りの愛の誓いを見届けるのは神官の職務に反します」"
translation = "「용건은 이해했습니다만…… 곤란하군요. 미숙한 몸이긴 하나 저는 정식 신관입니다. 사정이 있으시다 해도 거짓된 사랑의 맹세를 지켜보는 것은 신관의 직무에 위배됩니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ぅ……！？」"
translation = "「으……!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「仰る通りですね……」"
translation = "「말씀하신 대로네요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「あの……イレーナ神官？\u3000私も不誠実な目的で偽りの式を挙げようというわけではないのです。星騎士の使命を果たすべく、やむなくなのです」"
translation = "「저기…… 이레이나 신관님? 저도 불성실한 목적으로 거짓 식을 올리려는 게 아니에요. 성기사의 사명을 다하고자 어쩔 수 없이 하는 거예요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに、式であれば予行演習もするもの。時には形式的な場合もあるのではないでしょうか」"
translation = "「게다가 식이라면 예행연습도 하는 법. 때로는 형식적인 경우도 있지 않을까요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「つまり、将来行われるおふたりの式の予行演習であると？」"
translation = "「즉, 장차 치러질 두 분의 식의 예행연습이라는 건가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「～～～～っ！？\u3000ちち、ちがいますっ、そういう意味ではなくてっ！\u3000その、形だけでも、お願いしたくて……！」"
translation = "「~~~~앗!? 아아, 아니에요, 그런 뜻이 아니라! 그, 형태만이라도 부탁드리고 싶어서……!」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふふ、わかりました。では仕方ありませんね。おふたりが私の式の練習に付き合って下さっている、ということにしておきましょう」"
translation = "「후후, 알겠습니다. 그럼 어쩔 수 없군요. 두 분이 제 식의 연습을 도와주고 계신 걸로 해두죠.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます……」"
translation = "「감사합니다……」"

[[dialogue]]
speaker = "イレーナ"
original = "「新郎緋宮クロト。あなたは星見フィオナを妻とし、健やかなる時も病める時も、富める時も貧しき時も、彼女を愛し、慈しむことを誓いますか？」"
translation = "「신랑 <u>히노미야</u> 쿠로토. 당신은 호시미 피오나를 아내로 맞아, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 그녀를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "unk"
original = "……誓います"
translation = "……맹세합니다"

[[dialogue]]
speaker = "イレーナ"
original = "「新婦星見フィオナ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も、彼を愛し、慈しむことを誓いますか？」"
translation = "「신부 호시미 피오나. 당신은 <u>히노미야</u> 쿠로토를 남편으로 맞아, 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 그를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「は、はい……誓います」"
translation = "「네, 네…… 맹세합니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「神官イレーナはここに２人の誓いを聞き届けました。女神様の名の下に、２人を夫婦として認めます」"
translation = "「신관 이레이나는 여기 두 사람의 맹세를 지켜보았습니다. 여신님의 이름 아래 두 사람을 부부로 인정합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「これで一応誓いは立てましたが……元の戦闘服に変身してみますね」"
translation = "「이걸로 일단 맹세는 했습니다만…… 원래 전투복으로 변신해 볼게요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「……ウェディングドレスのままですね」"
translation = "「……웨딩드레스 그대로네요.」"

[[dialogue]]
speaker = "トワ先生"
original = "「う～ん……結婚式のマネだけじゃダメか。フィオナちゃんが『結婚した』って実感できないといけないみたい」"
translation = "「으음…… 결혼식 흉내만으로는 안 되나 보네. 피오나짱이 『결혼했다』는 실감을 할 수 있어야 하나 봐.」"

[[dialogue]]
speaker = "フィオナ"
original = "「私が結婚を実感……？\u3000うぅ、どうすればいいんでしょうか……」"
translation = "「제가 결혼을 실감……? 으윽, 어떻게 하면 좋을까요……」"

[[dialogue]]
speaker = "イレーナ"
original = "「フィオナ会長。あなたの望む結婚とはどのようなものですか？」"
translation = "「피오나 회장님. 당신이 바라는 결혼이란 어떤 것인가요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「私の望む結婚……ですか？」"
translation = "「제가 바라는 결혼…… 말인가요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「はい。書類だけでも結婚はできますが、フィオナ会長の思い描く結婚はそういったものではないと思います」"
translation = "「네. 서류만으로도 결혼은 할 수 있지만, 피오나 회장님이 그리는 결혼은 그런 것이 아니라고 생각합니다.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ですから、フィオナ会長のイメージに近づき、理想を叶えることが大事なのではないでしょうか」"
translation = "「그러니 피오나 회장님의 이미지에 다가가서 이상을 실현하는 것이 중요하지 않을까요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「……正直、私には結婚なんてまだ早いと思っています。でも結婚とは、口で愛を語るだけではなくて、互いに慈しみ、手を取り、支え合うものだと思うんです」"
translation = "「……솔직히 제게 결혼이란 아직 이르다고 생각해요. 하지만 결혼이란 말로만 사랑을 속삭이는 게 아니라, 서로 아끼고 손을 맞잡으며 지탱해 주는 것이라고 생각해요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「……思えば、口だけで愛を誓っても意味がないのは当然ですね。だって私は、緋宮会長を支えられる妻にまだなれていませんから」"
translation = "「……생각해 보니 말뿐인 사랑의 맹세는 의미가 없는 게 당연하네요. 전 <u>히노미야</u> 회장을 지탱해 줄 수 있는 아내가 아직 되지 못했으니까요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですから──」"
translation = "「그러니까──」"

[[dialogue]]
speaker = "フィオナ"
original = "「星見フィオナ、花嫁修業を始めます！」"
translation = "「호시미 피오나, 신부 수업을 시작하겠습니다!」"

