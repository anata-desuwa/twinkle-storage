[[dialogue]]
speaker = "unk"
original = "第２話,にゃんにゃん猫モード,P"
translation = "제2화, 냥냥 고양이 모드, P"

[[dialogue]]
speaker = "unk"
original = "ヒトリがハロウィンフォームに変身できるようになってから、以前と変わったことがある。"
translation = "히토리가 할로윈 폼으로 변신할 수 있게 된 뒤로 이전과 변한 것이 있다."

[[dialogue]]
speaker = "unk"
original = "その日はヒトリが俺の家に遊びに来ていたのだが――"
translation = "그날은 히토리가 우리 집에 놀러 왔었는데――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ふにゃあ<emoji=heart04>\u3000ごろごろ……<emoji=heart04>」"
translation = "「후냐아<emoji=heart04> 고로고로……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様のお膝の上、落ち着きます、にゃん……♪」"
translation = "「주인님의 무릎 위, 진정돼요, 냥……♪」"

[[dialogue]]
speaker = "unk"
original = "今日は母さんが出かけていて２人きり。ソファーに腰かけている俺の膝の上には、ヒトリが座っていた。"
translation = "오늘은 어머니가 외출하셔서 단둘뿐. 소파에 앉아 있는 내 무릎 위에는 히토리가 앉아 있었다."

[[dialogue]]
speaker = "unk"
original = "今日のヒトリは、猫さんモード？"
translation = "오늘의 히토리는 고양이 모드?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はい、そうですにゃ♪\u3000なので、大好きなご主人様に甘えても恥ずかしくないんですにゃ<emoji=heart04>」"
translation = "「네, 맞아요 냥♪ 그래서 좋아하는 주인님께 어리광 부려도 부끄럽지 않아요 냥<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だから、いっぱい撫でたり……後は――」"
translation = "「그러니까 잔뜩 쓰다듬어 주거나…… 다음은――」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「キスしてくれると、嬉しいです、にゃん……<emoji=heart04>」"
translation = "「키스해 주면 기쁠 거예요, 냥……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ハロウィンフォームが気に入ったのか、最近のヒトリは２人きりになると、こうして猫モードで甘えてくる。"
translation = "할로윈 폼이 마음에 들었는지 최근의 히토리는 단둘이 되면 이렇게 고양이 모드로 어리광을 부려온다."

[[dialogue]]
speaker = "unk"
original = "ヒトリは俺と正面から向き合うように座り直すと、そっと顔を近づけてきて――"
translation = "히토리는 나와 정면으로 마주 보도록 자세를 고쳐 앉더니 살며시 얼굴을 가까이 대고――"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様……好きです<emoji=heart04>\u3000んむっ……ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「주인님…… 좋아해요<emoji=heart04> 음뭇…… 쪽<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒトリが甘いキスの雨を俺に降らせて来る。"
translation = "히토리가 달콤한 키스 세례를 내게 퍼붓는다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあぁ……<emoji=heart04>\u3000ご主人様からも、キスして欲しいです……んっ……ちゅっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 주인님도 키스해 줬으면 좋겠어요…… 응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ……キスしてくれるの、嬉しい、です<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>\u3000ちゅっ……んむっ<emoji=heart04>」"
translation = "「앗…… 키스해 주는 거 기뻐요<emoji=heart04> 응…… 쪽<emoji=heart04> 쪽…… 음뭇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はあぁ……<emoji=heart04>\u3000ご主人様のキス、力強くて、頭の中が痺れちゃいます……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 주인님의 키스, 힘차서 머릿속이 저릿저릿해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒトリはすっかりキス魔になっちゃったな"
translation = "히토리는 완전히 키스광이 되어버렸네"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい……<emoji=heart04>\u3000ご主人様とキスすると、頭の中が幸せな気持ちでいっぱいになって……そ、それに……」"
translation = "「네, 네에……<emoji=heart04> 주인님과 키스하면 머릿속이 행복한 기분으로 가득 차서…… 그, 그리고……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「純粋に、肌が触れ合うのも、気持ちいいっていうか……<emoji=heart04>」"
translation = "「순수하게 살결이 닿는 것도 기분 좋다고 할까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様の方は……どうですか？」"
translation = "「주인님 쪽은…… 어때요?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「えへへ<emoji=heart04>\u3000ドキドキする、ですか……？\u3000はぁぁ<emoji=heart04>\u3000わたしもです♪」"
translation = "「에헤헤<emoji=heart04> 두근두근하시나요……? 하아아<emoji=heart04> 저도 그래요♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――って、あっ<emoji=heart04>\u3000やんっ……<emoji=heart04>\u3000ご主人様、耳と尻尾は触っちゃダメです……<emoji=heart04>」"
translation = "「――앗<emoji=heart04> 얀……<emoji=heart04> 주인님, 귀랑 꼬리는 만지면 안 돼요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、そこは敏感なんですぅ……ふあぁ<emoji=heart04>\u3000ご主人様ぁ……<emoji=heart04>」"
translation = "「거, 거기는 민감하단 말이에요…… 후아아<emoji=heart04> 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヒトリのハロウィンフォームに付いているネコミミと尻尾。それはただの装飾ではなく、『猫っぽいことができる』という能力の一部であり、感覚が通っているという。"
translation = "히토리의 할로윈 폼에 달려 있는 고양이 귀와 꼬리. 그것은 단순한 장식이 아니라 『고양이 같은 것을 할 수 있다』는 능력의 일부이며 감각이 통하고 있다고 한다."

[[dialogue]]
speaker = "unk"
original = "なので、触ると体温の温もりがあり、ピコピコ、フリフリと可愛く反応を返してくれる。"
translation = "그래서 만지면 체온의 온기가 느껴지고 쫑긋쫑긋, 살랑살랑하며 귀엽게 반응을 돌려준다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「やぁっ……だ、ダメぇ<emoji=heart04>\u3000それ以上はぁ……ゆ、許して下さいぃ……<emoji=heart04>」"
translation = "「야앗…… 아, 안 돼<emoji=heart04> 그 이상은…… 요, 용서해 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ごめん、嫌だった？"
translation = "미안, 싫었어?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はぁ……はぁ……。い、いえ、むしろ……気持ちよすぎちゃうから、おかしくなっちゃいそう、というか……」"
translation = "「하아…… 하아……. 아, 아니요, 오히려…… 너무 기분 좋아서 이상해져 버릴 것 같다고 할까……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様の触り方、すごく上手なので……<emoji=heart04>」"
translation = "「주인님의 손길, 정말 능숙하셔서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「――猫カフェでバイトしてたことがある？\u3000……むっ。そ、そうなんですね……」"
translation = "「――고양이 카페에서 알바한 적이 있다고요? ……뭇. 그, 그렇군요……」"

[[dialogue]]
speaker = "unk"
original = "猫に嫉妬してる？"
translation = "고양이한테 질투하는 거야?"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000ヒトリ、もしかして……"
translation = "어라? 히토리, 설마……"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「し、してません……！」"
translation = "「아, 안 해요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そんなことくらいで、別に……」"
translation = "「그런 일 정도로 딱히……」"

[[dialogue]]
speaker = "unk"
original = "俺は思わず、彼女を抱き締めてしまう。"
translation = "나는 나도 모르게 그녀를 껴안고 만다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「にゃっ！？\u3000ご、ご主人様……？」"
translation = "「냐앗!? 주, 주인님……?」"

[[dialogue]]
speaker = "unk"
original = "ヒトリは本当に可愛いな"
translation = "히토리는 정말 귀엽네"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ふあぁ……<emoji=heart04>\u3000頭を優しく撫でられながら、耳元で囁かれるの……ゾクゾクしちゃいます<emoji=heart04>」"
translation = "「후아아……<emoji=heart04> 머리를 부드럽게 쓰다듬어지면서 귓가에 속삭여지는 거…… 소름 돋을 정도로 짜릿해요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はヒトリだけのものだから、大丈夫"
translation = "나는 히토리만의 것이니까 괜찮아"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……！\u3000会長さん……<emoji=heart04>」"
translation = "「……! 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あの……わたし。またキスが、したいです……<emoji=heart04>」"
translation = "「저기…… 저. 다시 키스가, 하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ご主人様……大好きです<emoji=heart04>\u3000ちゅっ……ちゅっ<emoji=heart04>」"
translation = "「주인님…… 너무 좋아요<emoji=heart04> 쪽…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺たちはそれからまた、何度も甘いキスを繰り返すのだった――"
translation = "우리들은 그 뒤로도 다시, 몇 번이고 달콤한 키스를 반복하는 것이었다――"

