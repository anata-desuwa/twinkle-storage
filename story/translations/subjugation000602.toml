[[dialogue]]
speaker = "聖沙"
original = "「キャ～～～～～っ！？」"
translation = "「꺄아아아아악!?」"

[[dialogue]]
speaker = "聖沙"
original = "「どうしてこうなるの！？\u3000ほんとに私が負けて……！？」"
translation = "「어째서 이렇게 되는 거야!? 정말로 내가 지다니……!?」"

[[dialogue]]
speaker = "聖沙"
original = "「でもさっきのはほんのウォーミングアップよ！\u3000私の力はまだまだこんなものじゃないんだから……今度こそ勝負よ！」"
translation = "「하지만 방금 건 그냥 워밍업이었어! 내 실력은 아직 이 정도가 아니니까…… 이번에야말로 승부야!」"

