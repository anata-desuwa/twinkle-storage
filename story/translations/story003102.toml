[[dialogue]]
speaker = "unk"
original = "和気あいあいと話しながら、お寺の本堂前にやってきた晴れ着の４人。"
translation = "화기애애하게 이야기하며 절 본당 앞에 도착한 설빔 차림의 4명."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そういえば、アナちゃんやサーシャさんは、後日改めて新星星徒会で初詣に来る予定なんですよね？」"
translation = "「그러고 보니 아나짱이나 사샤 언니는 나중에 다시 신성 성도회로 첫 참배를 올 예정이죠?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「実は会長くんとヴィーナスちゃんが、星見家と五名門の人たちが集まるお正月の会合にお呼ばれしているの～」"
translation = "「사실 회장 군이랑 비너스짱이 호시미 가문과 오명문 사람들이 모이는 정월 모임에 초대받았거든~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それで、マトイ先輩も両親の実家へ帰省するタイミングを合わせることになり、星徒会メンバーでの初詣は後日改めてという話になっています」"
translation = "「그래서 마토이 선배도 부모님 본가로 귀성하는 타이밍을 맞추게 되어 성도회 멤버들과의 첫 참배는 나중에 다시 하기로 이야기가 됐습니다」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「なるほど～。本当は新年初日から、センパイに可愛い後輩の晴れ着姿を披露してあげたかったんですけど、残念ですね～」"
translation = "「그렇군요~. 원래는 신년 첫날부터 선배한테 귀여운 후배의 설빔 차림을 보여주고 싶었는데 아쉽네요~」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ……！」"
translation = "「앗……!」"

[[dialogue]]
speaker = "unk"
original = "そこでシズハが気づいて足を止める。４人のところへやってきたのは――"
translation = "거기서 시즈하가 깨닫고 발을 멈춘다. 4명에게 다가온 것은――"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さん、お待たせしました」"
translation = "「언니, 오래 기다리셨습니다」"

[[dialogue]]
speaker = "unk"
original = "ソフィアたち流星学園１年生の３人組だった。"
translation = "소피아 일행 유성 학원 1학년 3인조였다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ～♪\u3000待っていたわ～。ウズメちゃん、舞亜ちゃん、あけましておめでと～♪」"
translation = "「소피~♪ 기다리고 있었어~. 우즈메짱, 마이아짱, 새해 복 많이 받아~♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「みなさん、晴れ晴れしく、新年あけましておめでとうございま～す♪」"
translation = "「여러분, 화창하게 새해 복 많이 받으세요~♪」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あけおめです、サーシャさん。３人で一緒に参加しにきました」"
translation = "「아케오메입니다, 사샤 언니. 셋이서 같이 참가하러 왔어요」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あ、あのっ……ソフィア先輩……！」"
translation = "「저, 저기…… 소피아 선배님……!」"

[[dialogue]]
speaker = "unk"
original = "そんな中、シズハは緊張した面持ちで、ソフィアと向かい合う。"
translation = "그런 가운데 시즈하는 긴장된 표정으로 소피아와 마주한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「初めまして、染井シズハです……！\u3000あ、あけましておめでとうございます……！」"
translation = "「처음 뵙겠습니다, 소메이 시즈하입니다……! 새, 새해 복 많이 받으세요……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こちらこそ、初めまして。あけましておめでとうございます、シズハさん」"
translation = "「저야말로 처음 뵙겠습니다. 새해 복 많이 받으세요, 시즈하 씨」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「はい！\u3000えっと……その……」"
translation = "「네! 저기…… 그게……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（頭の中でどういうことを話そうか、昨日から色々考えていたはずなのに、いざとなると言葉がなかなか出てこない……！）"
translation = "(머릿속으로 무슨 이야기를 할지 어제부터 여러 가지 생각했을 텐데 막상 닥치니 말이 잘 안 나와……!)"

[[dialogue]]
speaker = "unk"
original = "シズハが何から話すべきか、目を白黒させていると──"
translation = "시즈하가 무엇부터 말해야 할지 눈을 굴리고 있자──"

[[dialogue]]
speaker_original = "男の子"
speaker_translation = "남자아이"
original = "「あっ、獅子舞だ～！」"
translation = "「앗, 사자탈이다~!」"

[[dialogue]]
speaker_original = "老人"
speaker_translation = "노인"
original = "「おお、獅子舞様じゃ……ありがたやありがたや」"
translation = "「오오, 사자탈님이시구먼…… 감사해라 감사해」"

[[dialogue]]
speaker = "unk"
original = "周りの参拝客の声が聞こえてきて、シズハたちは振り返る。"
translation = "주변 참배객들의 목소리가 들려와 시즈하 일행은 뒤돌아본다."

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、あれはこのお寺で有名な、縁起物の『獅子舞』ね」"
translation = "「어머~ 저건 이 절에서 유명한 행운의 상징인 『사자탈』이네」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「わ～、めっちゃ可愛いし♪\u3000写真撮っとかないと！」"
translation = "「와~ 대박 귀여워♪ 사진 찍어둬야지!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「なんか……こっちに近づいてきてる？」"
translation = "「왠지…… 이쪽으로 다가오고 있어?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「確かに、なんかこっちに強い視線を感じますね～……って」"
translation = "「확실히 왠지 이쪽으로 강한 시선이 느껴지네요~…… 어라」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「……ふん」"
translation = "「……흥」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（な、なんか私の顔見て、鼻を鳴らされたんですけど！？）"
translation = "(어, 어쩐지 내 얼굴을 보고 콧방귀를 뀌었는데요!?)"

[[dialogue]]
speaker = "unk"
original = "獅子舞はリーリアから視線を外すと、シズハの前へと移動し、立ち止まる。"
translation = "사자탈은 리리아에게서 시선을 돌리더니 시즈하 앞으로 이동해 멈춰 섰다."

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「お前が……トレジアンナの言っていた、星騎士の染井シズハか？」"
translation = "「네놈이…… 트레지아나가 말했던 성기사 소메이 시즈하냐?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっ！？\u3000どうしてトレジアンナさんの名前を……？」"
translation = "「엣!? 어떻게 트레지아나 씨의 이름을……?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん……いい機会だ。挨拶してやるとしよう――」"
translation = "「흥…… 좋은 기회군. 인사나 해주도록 하지――」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えっ！？\u3000周囲の参拝客の人たちが消えちゃったし！？」"
translation = "「엣!? 주변 참배객들이 사라졌어!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これは、何かの力による結界……！？」"
translation = "「이것은 무언가의 힘에 의한 결계……!?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「そう。吾輩の力でお前たちを招き入れたのだ。吾輩の住む、この寺の結界内にな」"
translation = "「그렇다. 이 몸의 힘으로 네놈들을 초대했느니라. 이 몸이 거주하는 이 절의 결계 안으로 말이다」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「吾輩の名は、日本一帯で広く知られし『獅子舞』。その正体は――」"
translation = "「이 몸의 이름은 일본 전역에서 널리 알려진 『사자탈』. 그 정체는――」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「『正月のロストアイテム』である！」"
translation = "「『정월의 로스트 아이템』이다!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ロストアイテム！？\u3000あなたが……！？」"
translation = "「로스트 아이템!? 당신이……!?」"

[[dialogue]]
speaker = "unk"
original = "『ロストアイテム』――それは、リクリエを経ても消えずに存在し続け、常識では測れない不思議な力を宿すオーパーツのことである。"
translation = "『로스트 아이템』―― 그것은 리크리에를 거치고도 사라지지 않고 계속 존재하며 상식으로는 가늠할 수 없는 신비한 힘을 깃들인 오파츠를 말한다."

[[dialogue]]
speaker = "unk"
original = "遥か昔の消えた歴史の中で作り出されたそれらは、世界がリクリエで再構築される際も影響を受け付けず、残り続けるほどの存在強度を誇っていた。"
translation = "아주 먼 옛날 사라진 역사 속에서 만들어진 그것들은 세계가 리크리에로 재구축될 때도 영향을 받지 않고 남을 정도의 존재 강도를 자랑했다."

[[dialogue]]
speaker = "unk"
original = "現在、そのロストアイテムは『魔法少女』たちによって秘密裏に回収されている。もし世間に存在が知れ渡れば、その力が悪用される危険性があるからだ。"
translation = "현재 그 로스트 아이템은 『마법 소녀』들에 의해 비밀리에 회수되고 있다. 만약 세상에 존재가 알려지면 그 힘이 악용될 위험이 있기 때문이다."

[[dialogue]]
speaker = "unk"
original = "――そして、その魔法少女の１人こそが、シズハであった。"
translation = "―― 그리고 그 마법 소녀 중 한 명이 바로 시즈하였다."

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「……吾輩は、九浄家の現当主・九浄ヘレナからも公認を得ているロストアイテム。この寺を古くより守護し続けている」"
translation = "「……이 몸은 쿠죠 가문의 현 당주 쿠죠 헬레나로부터도 공인을 받은 로스트 아이템. 이 절을 예로부터 계속 수호해오고 있다」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（あ……そういえば、トレジアンナさんが前に、公認されてるロストアイテムだと自ら名乗ってきたら、それは回収しなくてもいいって……）"
translation = "(아…… 그러고 보니 트레지아나 씨가 전에 공인된 로스트 아이템이라고 스스로 자처해오면 그건 회수하지 않아도 된다고……)"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「吾輩は、ここに祀られ続けてきた最も崇高なる聖遺物。故に、ロストアイテムだからと迂闊に手を出そうとすれば、神罰が当たると心しておけ」"
translation = "「이 몸은 이곳에 계속 모셔져 온 가장 숭고한 성유물. 고로 로스트 아이템이라고 어설프게 손을 대려 했다간 천벌을 받을 줄로 알거라」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「うわぁ、自分で崇高とか言っちゃうなんて、作られた存在の癖に傲慢なのサ」"
translation = "「우와, 스스로 숭고하다고 말하다니 만들어진 존재 주제에 오만하다사」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「って、ディーちゃん！？\u3000みんなの前に姿を現すのは、マズいんじゃ……」"
translation = "「앗, 디짱!? 모두 앞에 모습을 드러내는 건 곤란한 거 아냐……」"

[[dialogue]]
speaker = "unk"
original = "それまでシズハの横で透明になっていた『ディーラック』が姿を現す。"
translation = "그때까지 시즈하 옆에서 투명해져 있던 『디럭쿠』이 모습을 드러낸다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「はっ、この獅子舞がロストアイテムとかぶっちゃけてる時点で、ボクがこそこそ隠れていても仕方ないだろう？」"
translation = "「핫, 이 사자탈이 로스트 아이템이라고 다 까발리는 시점에서 내가 꽁꽁 숨어있어 봤자 어쩔 수 없잖아사?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えっと、シズハちゃん。その檻に入っている子は一体……？\u3000なんか、ニャリオンちゃんみたいに喋っているけど……」"
translation = "「저기, 시즈하짱. 그 감옥에 갇혀있는 애는 도대체……? 왠지 냐리온짱처럼 말하고 있는데……」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「あぁん？\u3000あんなヒトカスに飼われてる猫畜生と、一緒にしないで欲しいのサ！」"
translation = "「아앙? 저런 인간 찌꺼기한테 길러지는 고양이 짐승이랑 같이 취급하지 말아줬으면 한다사!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「口悪ぅ！？」"
translation = "「입 험해!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え、えっとぉ、どう説明したらいいか～……」"
translation = "「어, 저기이, 어떻게 설명해야 좋을지~……」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「檻に入れられてるボクのことはどうでもいいからサ、今は目の前で自由にしているロストアイテムのことを気にしなよ」"
translation = "「감옥에 갇힌 나는 아무래도 좋으니까 지금은 눈앞에서 멋대로 구는 로스트 아이템이나 신경 쓰라사」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「それで？\u3000正月のロストアイテムとやらが一体何の用なのサ。ボクは下らないことに巻き込まれたくないし、この結界からさっさと解放して欲しいんだけど？」"
translation = "「그래서? 정월의 로스트 아이템인지 뭔지가 도대체 무슨 용건인 거사. 나는 하찮은 일에 휘말리고 싶지 않으니 이 결계에서 얼른 풀어줬으면 좋겠는데사?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「お前がトレジアンナの言っていた『ディーラック』とやらか。吾輩は別に、お前たちを結界に閉じ込めたつもりはない」"
translation = "「네놈이 트레지아나가 말했던 『디럭쿠』이라는 녀석이냐. 이 몸은 딱히 네놈들을 결계에 가둘 생각은 없다」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ここにはありがたく招き入れてやっただけだ。出たいというならいつでも外に放り出してやろう。ただしその場合、晴れ着の力はくれてやらんがな」"
translation = "「이곳에는 감사히 초대해줬을 뿐이다. 나가고 싶다면 언제든 밖으로 내던져주마. 단 그 경우 설빔의 힘은 주지 않겠다만」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっ、晴れ着の力って……どういうこと？」"
translation = "「엣, 설빔의 힘이라니…… 그게 무슨 소리야?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん……おい、そこの魔族の姉妹。名前はそう、ソフィアとサーシャだったか」"
translation = "「흥…… 어이, 거기 마족 자매. 이름은 그래, 소피아와 사샤였던가」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……！\u3000どうして私と姉さんの名前を？」"
translation = "「……! 어떻게 저와 언니의 이름을?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「以前の正月にも、ここへ来たことがあったな？\u3000そして、お前たちは姉妹の縁を結び直すことに成功した」"
translation = "「이전 정월에도 이곳에 온 적이 있었지? 그리고 네놈들은 자매의 인연을 다시 맺는 데 성공했다」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「その縁起の良さに免じて、吾輩はお前たちと、縁結びを手伝ったウズメイアという娘にも力をくれてやったのだ」"
translation = "「그 길조에 면하여 이 몸은 네놈들과 인연 맺기를 도와준 우즈메라는 계집에게도 힘을 빌려준 것이니라」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「えっ、もしかしてあの時、あたしたちの晴れ着フォームが起動したのって……！？」"
translation = "「엣, 설마 그때 우리들의 설빔 폼이 기동한 게……!?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「実際にありがたく見せてやろう。これが吾輩の持つ崇高なる正月の力――」"
translation = "「실제로 감사히 보여주도록 하지. 이것이 이 몸이 가진 숭고한 정월의 힘――」"

[[dialogue]]
speaker = "unk"
original = "再び視界が眩い光に包まれる――そして。"
translation = "다시 시야가 눈부신 빛에 휩싸인다―― 그리고."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「これは……！\u3000ロストアイテムである獅子舞さんの力！？」"
translation = "「이것은……! 로스트 아이템인 사자탈님의 힘!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪\u3000すごいわ～」"
translation = "「어머~♪ 대단하네~」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「今までとは違うマジカルな力を感じます！」"
translation = "「지금까지와는 다른 매지컬한 힘이 느껴져요!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「晴れ着フォームの起動を確認。どうやら……獅子舞さんが正月にまつわる特別な力を持っていることは、事実のようです」"
translation = "「설빔 폼의 기동을 확인. 아무래도…… 사자탈님이 정월에 얽힌 특별한 힘을 가지고 있다는 것은 사실인 모양입니다」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふん、わかったか？\u3000お前たち星騎士の晴れ着フォームに、これまで戦う力を与えてやっていたのは、吾輩というわけだ」"
translation = "「흥, 이제 알겠느냐? 네놈들 성기사의 설빔 폼에 지금까지 싸울 힘을 부여해준 것은 이 몸이라는 소리다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうだったのね～♪\u3000獅子舞さん、ありがと～♪」"
translation = "「그랬던 거구나~♪ 사자탈님, 고마워요~♪」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「ふふんっ！\u3000そうだ、感謝し崇め奉るがいい。九浄ヘレナにも隠してきた事実を、今回特別に明かしてやったのだからな」"
translation = "「후훙! 그렇다, 감사히 여기며 숭배하도록 해라. 쿠죠 헬레나에게도 숨겨온 사실을 이번에 특별히 밝혀준 것이니까 말이다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが……どうして？」"
translation = "「하지만…… 어째서죠?」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「気まぐれだ。あと、縁起の悪い噂も色々聞こえてくるものでな……なんでも――」"
translation = "「변덕이다. 그리고 불길한 소문도 여러 가지 들려오기에 말이다…… 들어보니――」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「星騎士にバニー衣装を着せようと企む、けしからんロストアイテムが出没したとか」"
translation = "「성기사에게 바니 의상을 입히려고 획책하는 고얀 로스트 아이템이 출몰했다더군」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……！\u3000会長が報告書に上げていた、アステラカジノ事件の『ダッチ』！」"
translation = "「……! 회장님이 보고서에 올렸던 아스테라 카지노 사건의 『닷지』!」"

[[dialogue]]
speaker = "unk"
original = "以前、クロトたちは『アステラカジノ』の異空間に巻き込まれ、そこで『欲望のロストアイテム』であるダッチと対決した。"
translation = "이전에 쿠로토 일행은 『아스테라 카지노』의 이공간에 휘말려 그곳에서 『욕망의 로스트 아이템』인 닷지와 대결했다."

[[dialogue]]
speaker = "unk"
original = "その事件には<ruby>緘口令<rt>かんこうれい</rt></ruby>が敷かれており、学園上層部や両星徒会、そして当事者のみが知る限られた情報となっている。"
translation = "그 사건에는 입막음령이 내려져 있어 학원 상층부나 양 성도회, 그리고 당사자만이 아는 한정된 정보였다."

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「そう……あの俗物だ！\u3000バニーなどという低俗な衣装を、吾輩は断じて認めん！」"
translation = "「그래…… 그 속물 녀석이다! 바니 따위의 저속한 의상을 이 몸은 단코코 결코 인정 못 한다!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「人間界の衣装ならば、晴れ着こそが崇高にして至高……！\u3000星騎士が纏う戦闘服としてこれ以上なく美しい、完璧なフォームなのだ！」"
translation = "「인간계의 의상이라면 설빔이야말로 숭고하고도 지고한 것……! 성기사가 두르는 전투복으로서 이보다 더 아름다울 수 없는 완벽한 폼이란 말이다!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～♪\u3000うふふっ、獅子舞さんは晴れ着が好きなのね～♪」"
translation = "「어머~♪ 우후후, 사자탈님은 설빔을 좋아하시는군요~♪」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「否！\u3000好きとかそういう低俗なのでは断じてない！\u3000吾輩が数多のリクリエを乗り越えながら辿り着いた、崇高な結論である！」"
translation = "「아니다! 좋아한다거나 그런 저속한 것이 결코 아니란 말이다! 이 몸이 수많은 리크리에를 넘어서며 도달한 숭고한 결론이다!」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「吾輩は、お前たち星騎士の小娘共が晴れ着で戦場を美しく舞えるように、力を与えてやっているのだ……！」"
translation = "「이 몸은 네놈들 성기사 계집들이 설빔으로 전장을 아름답게 수놓을 수 있도록 힘을 빌려주고 있는 것이니라……!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「いや、お前の趣味じゃん……」"
translation = "「아니, 그냥 네 취향이잖아……」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「趣味ではない！\u3000故に、今回新たな晴れ着を纏ってきたそこの４人！\u3000お前たちにただで力をくれてやると思ったら、大間違いである！」"
translation = "「취향이 아니다! 고로 이번에 새로운 설빔을 두르고 온 거기 4명! 네놈들에게 거저 힘을 빌려줄 거라 생각했다면 큰 오산이다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ということは、何か条件があるのでしょうか……？」"
translation = "「그렇다는 것은 무언가 조건이 있는 걸까요……?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「なんか、すごい面倒臭そうな予感がするんだけど……」"
translation = "「왠지 엄청 귀찮을 것 같은 예감이 드는데사……」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「晴れ着の力とはすなわち、正月の力。故に――」"
translation = "「설빔의 힘이란 즉 정월의 힘. 고로――」"

[[dialogue]]
speaker_original = "獅子舞"
speaker_translation = "사자춤"
original = "「正式に晴れ着フォームの力を手に入れたくば、試練として吾輩との『羽根突き』に勝ち、認めさせてみせるがいい！」"
translation = "「정식으로 설빔 폼의 힘을 손에 넣고 싶다면 시련으로서 이 몸과의 『하네츠키』에서 이겨 인정을 받아보거라!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「羽根突き勝負！？」"
translation = "「하네츠키 승부!?」"

[[dialogue]]
speaker = "unk"
original = "呆気に取られるシズハたちに、獅子舞はふんと鼻を鳴らしてみせるのだった。"
translation = "어안이 벙벙해진 시즈하 일행에게 사자탈은 흥 하고 콧방귀를 뀌어 보였다."

