[[dialogue]]
speaker = "unk"
original = "第３話,エルゼとフィオナ,P"
translation = "제3화, 엘제와 피오나, P"

[[dialogue]]
speaker = "unk"
original = "遊園地を拡張して作られたプール施設、『チェリークルーズ』。"
translation = "놀이공원을 확장하여 만들어진 수영장 시설, 『체리 크루즈』."

[[dialogue]]
speaker = "unk"
original = "開園後も好評で、連日、お客さんで賑わっていた。"
translation = "개장 후에도 호평을 받아, 연일 손님들로 붐볐다."

[[dialogue]]
speaker = "unk"
original = "そんなチェリークルーズに招待されて遊びに来ていた。"
translation = "그런 체리 크루즈에 초대받아 놀러 왔다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「色んなプールがあるのね～。ありがとう、エルゼ。今日はたくさん楽しませてもらうわ」"
translation = "「여러 가지 풀이 있네~. 고마워, 엘제. 오늘은 잔뜩 즐기고 갈게.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「フィオナ会長はいつも頑張っていらっしゃいますから」"
translation = "「피오나 회장님은 늘 열심히 하시니까요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私から何か出来ればと思いましたの。ゆっくり羽を伸ばしていってくださいませ」"
translation = "「제가 뭔가 해 드릴 수 있다면 좋겠다고 생각했습니다. 편안하게 쉬고 가십시오.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ、そうさせて貰うわ」"
translation = "「네, 그렇게 할게.」"

[[dialogue]]
speaker = "unk"
original = "エルゼから渡されたチケットは２枚。"
translation = "엘제에게 받은 티켓은 두 장."

[[dialogue]]
speaker = "unk"
original = "１枚は俺用で、もう１枚はフィオナを誘ってきて欲しいとのことだった。"
translation = "한 장은 나를 위한 것이고, 다른 한 장은 피오나를 초대해 달라는 것이었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「エルゼ、メインのプールは豪華客船のプールをモチーフにしているの？」"
translation = "「엘제, 메인 풀은 호화 여객선의 풀을 모티브로 한 거야?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そうなんです。先日世界一周に向けて出港した『チェリークルーズ号』の甲板をイメージして作られていますわ」"
translation = "「그렇습니다. 요전에 세계 일주를 위해 출항한 『체리 크루즈호』의 갑판을 이미지로 만들어졌습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「名前もそこからもらったのね？」"
translation = "「이름도 거기서 따온 거네?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「はい、そうなんですの！」"
translation = "「네, 그렇습니다!」"

[[dialogue]]
speaker = "unk"
original = "一生に一度は乗ってみたいな"
translation = "평생에 한 번은 타 보고 싶다"

[[dialogue]]
speaker = "unk"
original = "豪華客船か……"
translation = "호화 여객선이라……"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「興味がおありですの？\u3000お父様にお願いして、乗せていただけないかしら……」"
translation = "「흥미가 있으신가요? 아버님께 부탁해서, 태워 드릴 수 있지 않을까요……」"

[[dialogue]]
speaker = "unk"
original = "え、遠慮します……！"
translation = "에, 사양하겠습니다……!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふっ♪\u3000緋宮会長、エルゼとお付き合いしているんですよね？」"
translation = "「후훗♪ 히노미야 회장, 엘제와 사귀고 있는 거죠?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そんな程度で気後れしていたら、ご両親に挨拶に行くときに大変じゃありませんか？」"
translation = "「그 정도 일로 기가 죽어 있으면, 부모님께 인사드리러 갈 때 힘들지 않겠어요?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「なっ……フィオナ会長っ！？」"
translation = "「나앗…… 피오나 회장!?」"

[[dialogue]]
speaker = "unk"
original = "か、からかわないでくれよ"
translation = "놀, 놀리지 말아 줘"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ごめんなさい。でもエルゼのお父様は厳格な方だから、覚悟を決めておいた方がいいと思いますよ」"
translation = "「죄송해요. 하지만 엘제의 아버님은 엄격하신 분이니까, 각오를 해 두는 편이 좋을 거예요.」"

[[dialogue]]
speaker = "unk"
original = "フィオナの言葉に、エルゼから聞いた屋敷での生活のことを思い出す。"
translation = "피오나의 말에, 엘제에게 들었던 저택에서의 생활이 떠오른다."

[[dialogue]]
speaker = "unk"
original = "その話からエルゼのご両親を想像すると、ご挨拶にいくのは確かにちょっと恐くなってくる。"
translation = "그 이야기로 엘제의 부모님을 상상하니, 인사를 드리러 가는 것이 확실히 조금 무서워진다."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様。お父様は確かに厳格な方ですけど、決して恐い人ではありませんのよ？」"
translation = "「회장님. 아버님은 확실히 엄격하신 분이지만, 결코 무서운 분은 아니십니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですからご安心ください」"
translation = "「그러니 안심하십시오.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「可愛いお店も多いわね。この外装は……サランさんのイメージかしら」"
translation = "「귀여운 가게도 많네요. 이 외장은…… 사란 씨의 이미지일까요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「はい。外装だけでなく、メニューにもお姉さまが協力していますわ」"
translation = "「네. 외장뿐만 아니라, 메뉴에도 언니가 협력했습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうなんだ。じゃあもう絶対間違いないわね」"
translation = "「그렇구나. 그럼 이제 절대 틀림없겠네.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「何か食べたいものがあったら仰ってくださいませ。すぐに買って参りますわ」"
translation = "「뭔가 먹고 싶은 것이 있으시면 말씀해 주십시오. 바로 사 오겠습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとう。でもそんなに気を遣わなくて大丈夫よ」"
translation = "「고마워요. 하지만 그렇게 신경 쓰지 않아도 괜찮아요.」"

[[dialogue]]
speaker = "unk"
original = "エルゼはフィオナの大ファンだから"
translation = "엘제는 피오나의 대팬이니까"

[[dialogue]]
speaker = "unk"
original = "今日はいつも以上に上機嫌だな"
translation = "오늘은 평소보다 더 기분이 좋네"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「えへへ……フィオナ会長のことは大好きですわ。でも、ファンとは少し違う気がしますの」"
translation = "「에헤헤…… 피오나 회장님은 정말 좋아합니다. 하지만, 팬과는 조금 다른 느낌이 듭니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そうですわね～。これは言葉の捉え方なだけかもしれませんけれど……」"
translation = "「그렇습니다~. 이것은 단어의 해석 차이일 수도 있겠습니다만……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私は地下アイドルのファンをしておりますが、その気持ちとフィオナ会長に対する気持ちは種類が全く別物ですの」"
translation = "「저는 지하 아이돌의 팬을 하고 있습니다만, 그 마음과 피오나 회장님에 대한 마음은 종류가 완전히 별개입니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「何が違うかといいますと……そうですわね、アイドルの皆さんに対しては応援する気持ちが強いですわ」"
translation = "「무엇이 다르냐고 하면…… 그렇습니다, 아이돌 분들에 대해서는 응원하는 마음이 강합니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですがフィオナ会長に対する気持ちは、どちらかと言えば尊敬と憧れ……それから感謝の気持ちが強いのですわ」"
translation = "「하지만 피오나 회장님에 대한 마음은, 어느 쪽이냐 하면 존경과 동경…… 그리고 감사의 마음이 강합니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……２年生になったころ、私は星騎士としての力の伸び悩みを感じておりましたの」"
translation = "「……2학년이 되었을 무렵, 저는 성기사로서의 힘의 정체를 느끼고 있었습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私の星騎士としての強みはスピード。ですが、そのせいで突出してしまうことが多く、周囲との連携に失敗することが多かったのです」"
translation = "「제 성기사로서의 강점은 스피드. 하지만, 그 때문에 너무 튀는 일이 많았고, 주위와의 연계에 실패하는 일이 많았습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですが、当時の私は周りの方々に相談することも出来ませんでした」"
translation = "「하지만, 당시의 저는 주위 분들에게 상담할 수도 없었습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「エルゼは箱入り娘だったから、同年代の子と接する機会が少なかったのよね……」"
translation = "「엘제는 온실 속의 화초였으니까, 또래 아이들과 접할 기회가 적었지……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それでなくても五名門のお嬢様ということで、周りの子たちから距離を置いて接せられることが多かったでしょうね」"
translation = "「그렇지 않더라도 오명문의 아가씨라는 이유로, 주위 아이들에게서 거리를 두고 대접받는 일이 많았겠지.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですが、そんな時に力になってくださったのがフィオナ会長でした！」"
translation = "「하지만, 그럴 때 힘이 되어 주신 분이 피오나 회장님이었습니다!」"

[[dialogue]]
speaker = "unk"
original = "どんな風に力になってもらったの？"
translation = "어떤 식으로 힘이 되어 줬는데?"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「色々ですわ……本当にたくさん……」"
translation = "「여러 가지입니다…… 정말로 많이……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「とエルゼは言ってくれていますが、本当に大したことはしてないんですよ」"
translation = "「라고 엘제는 말해 주고 있지만, 정말 대단한 일은 하지 않았어요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「スピードを活かしたまま、他の子と連携を取るための立ち回りを一緒に考えたりした程度じゃなかったかしら？」"
translation = "「스피드를 살리면서, 다른 아이들과 연계를 취하기 위한 움직임을 함께 생각하거나 한 정도가 아니었을까요?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そんな、まだまだありますわ！」"
translation = "「설마요, 아직도 많이 있습니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「皆の話の輪の中に入るためにどうすればいいのか。それは自分の興味のある話──趣味の話を振ってみるとよい、とか」"
translation = "「모두의 이야기 속에 들어가기 위해서는 어떻게 해야 하는가. 그것은 자신이 흥미 있는 이야기――취미 이야기를 꺼내 보는 것이 좋다, 라든가.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ……！\u3000ええと……確かにそれは言ったかもだけど……」"
translation = "「앗……! 에, 그러니까…… 확실히 그건 말했을지도 모르지만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（私の場合は流星ライダーだし、それでコミュニケーションが上手く取れました、なんて経験は緋宮会長とくらいしかないのよね……）"
translation = "（나의 경우는 유성 라이더이고, 그걸로 커뮤니케이션이 잘 되었다, 같은 경험은 히노미야 회장과 정도밖에 없으니까……）"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「後は同年代の子とより多く接するために、<ruby>流星寮<rt>イルソーレ</rt></ruby>に入ることを提案してくださいましたわ。そしてその口添えもしていただきました」"
translation = "「그리고 또래 아이들과 더 많이 접하기 위해, <ruby>유성 기숙사<rt>일소레</rt></ruby>에 들어가는 것을 제안해 주셨습니다. 그리고 그 추천도 해 주셨습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「おかげで私は両親を説得して入寮することができたんですのよ」"
translation = "「덕분에 저는 부모님을 설득해서 입소할 수 있었습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「フィオナ会長は私にとってまさに恩人、ですからファンというのとは少し違うんですの！」"
translation = "「피오나 회장님은 저에게 있어 그야말로 은인, 그러니 팬이라는 것과는 조금 다릅니다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ともあれ私で力になれていたのだったら良かったわ」"
translation = "「어쨌든 저로 인해 힘이 될 수 있었다면 다행이네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「エルゼほどではないけれど、私も同じような境遇で、同じような悩みを抱えていたことがあったから」"
translation = "「엘제 정도는 아니지만, 저도 비슷한 처지에서, 비슷한 고민을 안고 있었던 적이 있었으니까요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だからエルゼを見ていたら、声をかけずにはいられなかったの」"
translation = "「그래서 엘제를 보고 있으니, 말을 걸지 않을 수 없었어요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「フィオナ会長……本当にありがとうございます……」"
translation = "「피오나 회장님…… 정말로 감사합니다……」"

[[dialogue]]
speaker = "unk"
original = "２人の間にあった歴史を聞き、またひとつエルゼについて知ることが出来た。"
translation = "두 사람 사이에 있었던 역사를 듣고, 또 하나 엘제에 대해 알 수 있었다."

[[dialogue]]
speaker = "unk"
original = "エルゼが苦しんでいる時、フィオナが居てくれて本当に良かったと思う。"
translation = "엘제가 힘들어할 때, 피오나가 곁에 있어 주어서 정말 다행이라고 생각한다."

[[dialogue]]
speaker = "unk"
original = "そして、この先エルゼが何かに躓いてしまうことがあった時、今度は俺が彼女の力になりたいと強く思うのだった。"
translation = "그리고, 앞으로 엘제가 무언가에 좌절하는 일이 있었을 때, 이번에는 내가 그녀의 힘이 되고 싶다고 강하게 생각하는 것이었다."

