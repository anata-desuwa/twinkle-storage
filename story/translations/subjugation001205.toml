[[dialogue]]
speaker = "unk"
original = "メルエルとレミカの初めてのレッスン。その１曲目が終わった……！"
translation = "메르엘과 레미카의 첫 레슨. 그 첫 곡이 끝났다……!"

[[dialogue]]
speaker = "メルエル"
original = "「はぁっ……はぁっ……！\u3000ど、どうだったかな……？\u3000一応、最後まで通せたけれど……！」"
translation = "「하아…… 하아……! 어, 어땠을까……? 일단 끝까지 하긴 했는데……!」"

[[dialogue]]
speaker = "レミカ"
original = "「何でも言ってね。どんな意見でもありがたいから」"
translation = "「뭐든 말해줘. 어떤 의견이라도 감사하니까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあまずは私からね」"
translation = "「그럼 우선 나부터」"

[[dialogue]]
speaker = "メルエル"
original = "「ご、ごくり……！」"
translation = "「꿀꺽……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう教えることはないわね！！」"
translation = "「더 가르칠 게 없네!!」"

[[dialogue]]
speaker = "メルエル"
original = "「ええええ～っ！？\u3000初日なのに！\u3000初めての練習なのに！\u3000もうちょっと何かあるでしょ、ヴィーナスちゃんっ！？」"
translation = "「에에에에~!? 첫날인데! 첫 연습인데! 좀 더 뭔가 있잖아, 비너스짱!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも実際、レミカもメルエルも完璧だったもの。意地悪なツッコミしようと思ってたのに肩透かしだったわ。クロトも同じ感想でしょ？」"
translation = "「하지만 실제로 레미카도 메르엘도 완벽했는걸. 짓궂은 태클이라도 걸어주려 했는데 허탕이었어. 쿠로토도 같은 생각이지?」"

[[dialogue]]
speaker = "unk"
original = "正直、言うことはあまりないかも"
translation = "솔직히 말할 게 별로 없을지도"

[[dialogue]]
speaker = "unk"
original = "そうだね……"
translation = "그렇네……"

[[dialogue]]
speaker = "メルエル"
original = "「そ、そんなあっ！？\u3000逆に不安になっちゃうんだけど……！」"
translation = "「그, 그런 어!? 오히려 불안해지는데……!」"

[[dialogue]]
speaker = "レミカ"
original = "「２人はお世辞で言ってるんじゃないと思うよ。私も同じ気持ちだから」"
translation = "「둘은 빈말로 하는 소리가 아니라고 생각해. 나도 같은 마음이니까」"

[[dialogue]]
speaker = "レミカ"
original = "「メルエルが歌上手なのは知ってたけど……ダンスもすごいね。キレがあって、よどみもなくて」"
translation = "「메르엘이 노래 잘하는 건 알고 있었지만…… 댄스도 대단하네. 절도가 있고 막힘이 없어」"

[[dialogue]]
speaker = "レミカ"
original = "「体力もあるから息切れもしないし。プリマステラ……エリート星騎士の名は伊達じゃないってことなのかな」"
translation = "「체력도 좋아서 숨도 안 차고. 프리마스텔라…… 엘리트 성기사의 이름은 허명이 아니라는 거네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、特に笑顔のキープが素敵だったわ！\u3000ほんの一瞬たりとも『カワイイ』が崩れないなんて……やるじゃないメルエル！」"
translation = "「그래, 특히 미소 유지가 일품이었어! 찰나의 순간조차 『귀여움』이 무너지지 않다니…… 제법이잖아 메르엘!」"

[[dialogue]]
speaker = "メルエル"
original = "「そ、それは……えへへ♪\u3000会長くんが見ててくれたからかな、張り切っちゃって……！」"
translation = "「그, 그건…… 에헤헤♪ 회장군이 보고 있어 줘서 그런가, 힘이 잔뜩 나서……!」"

[[dialogue]]
speaker = "unk"
original = "（俺は何もしてないような……？）"
translation = "(나는 아무것도 안 한 것 같은데……?)"

[[dialogue]]
speaker = "レミカ"
original = "「メルエルの『カワイイ』のオーラ、私も凄く刺激を受けた」"
translation = "「메르엘의 『귀여운』 오라, 나도 굉장히 자극받았어」"

[[dialogue]]
speaker = "レミカ"
original = "「こういうのはただ見てるだけじゃわからなくて、一緒にやってるからこそ、肌で感じられるものだって改めてわかったよ」"
translation = "「이런 건 그냥 보고만 있어서는 알 수 없고, 함께 하기에 비로소 살갗으로 느낄 수 있는 것이라고 새삼 깨달았어」"

[[dialogue]]
speaker = "メルエル"
original = "「もぉぉ～～っ！\u3000そんなに褒めるばっかりじゃ、恥ずかしくてどんな顔すればいいのか、わからないよぉ」"
translation = "「정말이지~~! 그렇게 칭찬만 하시면, 부끄러워서 어떤 표정을 지어야 할지 모르겠단 말이에요오」"

[[dialogue]]
speaker = "レミカ"
original = "「本当のことだから、仕方がないよ。この調子でレッスンと本番を重ねれば、私も間違いなく成長できるって確信してる」"
translation = "「사실이니까 어쩔 수 없지. 이 기세로 레슨과 실전 무대를 거듭하면, 나도 틀림없이 성장할 수 있을 거라 확신해」"

[[dialogue]]
speaker = "レミカ"
original = "「それに、最初からこのレベルなら、パフォーマンスの案も練り直しが必要だね。まだまだクオリティを底上げできるよ」"
translation = "「게다가 처음부터 이 정도 레벨이라면 퍼포먼스 안도 다시 짤 필요가 있겠어. 퀄리티를 한층 더 끌어올릴 수 있겠는걸」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「レミカの目に狂いはなかったわね。やっぱりメルエルはアイドルの素質があったのよ！」"
translation = "「레미카의 눈이 틀리지 않았네. 역시 메르엘은 아이돌 소질이 있었던 거야!」"

[[dialogue]]
speaker = "メルエル"
original = "「素質があるかはわからないけれど……ちょっと自信がついたかも！」"
translation = "「소질이 있는지는 모르겠지만…… 조금 자신감이 생겼을지도!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、この調子でガンガンいくわよ～っ！」"
translation = "「그래, 이 기세로 팍팍 가자구~!」"

[[dialogue]]
speaker = "アナ"
original = "「──失礼します。なるほど、これが理事長の作った、新しい戦闘服ですか」"
translation = "「──실례하겠습니다. 과연, 이것이 이사장님이 만드신 새로운 전투복인가요」"

[[dialogue]]
speaker = "unk"
original = "アナ、どうしたの？"
translation = "아나, 무슨 일이야?"

[[dialogue]]
speaker = "アナ"
original = "「理事長から連絡が入ったんです。アイドルをテーマとした戦闘服を作ったから、模擬戦闘のデータを集めて欲しいと」"
translation = "「이사장님께 연락이 왔습니다. 아이돌을 테마로 한 전투복을 만들었으니, 모의 전투 데이터를 수집해 달라고요」"

[[dialogue]]
speaker = "アナ"
original = "「ついでに大まかな事情も聞きました。会長もなにやら肩書きが増えたご様子で」"
translation = "「겸사겸사 대략적인 사정도 들었습니다. 회장님도 왠지 직함이 늘어난 모양이더군요」"

[[dialogue]]
speaker = "unk"
original = "どうも。プロデューサーです"
translation = "반가워. 프로듀서입니다"

[[dialogue]]
speaker = "アナ"
original = "「それは構いませんが、過労で倒れないように気を付けてください。星徒会長は１人しかいないんですから」"
translation = "「그건 상관없습니다만, 과로로 쓰러지지 않도록 조심해 주세요. 성도회장은 한 명뿐이니까요」"

[[dialogue]]
speaker = "レミカ"
original = "「ごめんね。オープンキャンパスの準備もあるのに、会長を借りちゃって」"
translation = "「미안해. 오픈 캠퍼스 준비도 있는데 회장을 빌려 가 버려서」"

[[dialogue]]
speaker = "アナ"
original = "「いえ。会長が自身の判断で引き受けたことですから、お気になさらず。それよりレミカ先輩もメルエル先輩も、とてもよく似合っています」"
translation = "「아니요. 회장님이 본인의 판단으로 맡은 일이니까 신경 쓰지 마세요. 그보다 레미카 선배도 메르엘 선배도 아주 잘 어울립니다」"

[[dialogue]]
speaker = "メルエル"
original = "「えへへっ、ありがと～、アナちゃん！」"
translation = "「에헤헷, 고마워~, 아나짱!」"

[[dialogue]]
speaker = "アナ"
original = "「ライブ会場は、いつもレミカ先輩が使っているあの大きなドームですよね。本番、楽しみにしています」"
translation = "「라이브 공연장은 평소 레미카 선배가 사용하시는 그 커다란 돔이죠? 본 무대, 기대하고 있겠습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「期待してていいわよ！\u3000レミカもメルエルも……それはもうすっごいアイドル力を持ってるんだから！」"
translation = "「기대해도 좋아! 레미카도 메르엘도…… 그야말로 엄청난 아이돌력을 가지고 있으니까!」"

[[dialogue]]
speaker = "アナ"
original = "「なぜ前会長が偉そうなのかはわかりませんし、会長がプロデューサーならこの場に同席しなくてもいい気がしますが……」"
translation = "「왜 전 회장이 거드름을 피우는지는 모르겠고, 회장님이 프로듀서라면 굳이 이 자리에 동석하지 않아도 될 것 같습니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんでよーっ！？\u3000私とクロトは一蓮托生なんだから！」"
translation = "「왜애─!? 나랑 쿠로토는 일련탁생이니까!」"

[[dialogue]]
speaker = "アナ"
original = "「では練習後、深夜まで居残りをする会長の書類仕事にも一蓮托生でお願いします──と、そうでした」"
translation = "「그럼 연습 후 심야까지 남아서 하는 회장님의 서류 작업에도 일련탁생으로 부탁드립니다── 아, 맞다」"

[[dialogue]]
speaker = "アナ"
original = "「アイドルライブの宣伝、私も及ばずながら協力します。なので、ユニット名を教えてもらっていいですか？」"
translation = "「아이돌 라이브 홍보, 저도 미력하게나마 협력하겠습니다. 그러니 유닛 이름을 알려주실 수 있나요?」"

[[dialogue]]
speaker = "メルエル"
original = "「ユニット名……そういえば聞いてなかったかも。レミカちゃん、何て言うの？」"
translation = "「유닛 이름…… 그러고 보니 못 들었을지도. 레미카짱, 뭐라고 해?」"

[[dialogue]]
speaker = "レミカ"
original = "「…………ぁ」"
translation = "「…………아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………そういえば」"
translation = "「…………그러고 보니」"

[[dialogue]]
speaker = "アナ"
original = "「……？」"
translation = "「……?」"

[[dialogue]]
speaker = "レミカ"
original = "「ごめん、考えてなかったかも」"
translation = "「미안, 생각 안 했을지도」"

[[dialogue]]
speaker = "メルエル"
original = "「えぇぇ～っ……！？」"
translation = "「에에에~……!?」"

[[dialogue]]
speaker = "アナ"
original = "「大丈夫なんですか、このユニット……」"
translation = "「괜찮은 건가요, 이 유닛……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うっかりしてたわね。歌や衣装の準備でバタバタしてて、ユニット名を考えるのをすっかり忘れてたわ！」"
translation = "「깜빡했네. 노래랑 의상 준비로 정신이 없어서 유닛 이름을 생각하는 걸 완전히 잊고 있었어!」"

[[dialogue]]
speaker = "レミカ"
original = "「ぷっ……ぷふっ……！\u3000曲も衣装も会場も決まってるのに、ユニット名決めてなかったっ……ふふっ……！」"
translation = "「푸흡…… 푸후훗……! 곡도 의상도 회장도 정해졌는데, 유닛 이름을 안 정했다니…… 후훗……!」"

[[dialogue]]
speaker = "メルエル"
original = "「ツボに入ってる場合じゃないよ、レミカちゃん！」"
translation = "「웃음보 터질 때가 아니야, 레미카짱!」"

[[dialogue]]
speaker = "unk"
original = "相変わらず笑いの沸点、浅いなあ……"
translation = "여전히 웃음의 역치가 낮구나……"

[[dialogue]]
speaker = "レミカ"
original = "「──いや、別に浅くないし。ていうか、笑ってないから」"
translation = "「──아니, 딱히 낮지 않고. 그보다 안 웃고 있으니까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「肩まで震えてたわね」"
translation = "「어깨까지 떨고 있었어」"

[[dialogue]]
speaker = "メルエル"
original = "「震えてたね……！」"
translation = "「떨고 있었지……!」"

[[dialogue]]
speaker = "レミカ"
original = "「嘘。そんなわけない。完全無欠なアイドルは、げらげら笑ったりしない」"
translation = "「거짓말. 그럴 리가 없어. 완전무결한 아이돌은 낄낄대며 웃지 않아」"

[[dialogue]]
speaker = "unk"
original = "レミカはクールな見た目に反して、笑い上戸なのだった。"
translation = "레미카는 쿨한 겉모습과는 반대로, 웃음이 많은 편이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ともかく、さっそく会議よ！\u3000ユニット名を決めましょう！」"
translation = "「어쨌든 당장 회의야! 유닛 이름을 정하자!」"

[[dialogue]]
speaker = "メルエル"
original = "「う～ん。でも急に言われるとパッと出てこないかも……」"
translation = "「음~. 하지만 갑자기 말하면 바로 떠오르지 않을지도……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「思いついたものを片っ端から喋っていくのはどうかしら。三人寄ったらサブスクストリーミングってやつね！」"
translation = "「생각나는 걸 닥치는 대로 말해보는 건 어때? 세 사람이 모이면 구독 스트리밍이라는 녀석이지!」"

[[dialogue]]
speaker = "レミカ"
original = "「ぷっ……ぷふふっ……！\u3000それを、言うならっ、ブレインストーミング……っ」"
translation = "「푸흡…… 푸후훗……! 그걸 말하려면, 브레인스토밍……」"

[[dialogue]]
speaker = "unk"
original = "そこ、いちいち噴き出さない"
translation = "거기서 일일이 뿜지 마"

[[dialogue]]
speaker = "レミカ"
original = "「笑ってないから、うん……！\u3000ぷふっ……！」"
translation = "「안 웃고 있으니까, 응……! 푸훗……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よし、じゃあまずはメルエルから！」"
translation = "「좋아, 그럼 먼저 메르엘부터!」"

[[dialogue]]
speaker = "メルエル"
original = "「ええっ、私！？\u3000えっと、え～っと……」"
translation = "「에엣, 저요!? 그게, 그러니까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「深く考えなくていいわ。好きなものをそのまま文字に入れちゃうとか！」"
translation = "「깊게 생각하지 마. 좋아하는 걸 그대로 글자에 넣는다든가!」"

[[dialogue]]
speaker = "メルエル"
original = "「好きなもの……う、う～ん。にゃ、にゃんにゃん猫ちゃんズとか……？」"
translation = "「좋아하는 거…… 으, 으음. 야, 냥냥 고양이즈라든가……?」"

[[dialogue]]
speaker = "レミカ"
original = "「──ぶっふうっ！！」"
translation = "「──풉!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「お笑い芸人みたいね。ていうかどうして猫？」"
translation = "「코미디언 같네. 그보다 왜 고양이니?」"

[[dialogue]]
speaker = "メルエル"
original = "「ボランティア部で、猫ちゃんのお世話をすることが多いからで！\u3000レミカちゃんも笑わないでよ～っ！？」"
translation = "「봉사부에서 고양이들을 돌보는 일이 많아서요! 레미카짱도 웃지 마요~!?」"

[[dialogue]]
speaker = "レミカ"
original = "「ご、ごめんなさい。今のは失礼だった」"
translation = "「미, 미안해. 방금 건 무례했어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「次は私ね！\u3000そうね──レミカとゆかいな仲間たち、とかどうかしら！」"
translation = "「다음은 나야! 그러네── 레미카와 유쾌한 친구들, 같은 건 어때!」"

[[dialogue]]
speaker = "レミカ"
original = "「ぷふふぅっ……！\u3000いやっ……ユニットだからっ……『たち』って……ぷぷっ……！」"
translation = "「푸후훗……! 아니…… 유닛이니까…… 『들』이라니…… 푸풋……!」"

[[dialogue]]
speaker = "メルエル"
original = "「ヴィーナスちゃんも人のこと言えなくない！？\u3000十分お笑い芸人っぽいよ！？」"
translation = "「비너스짱도 남 말 할 처지가 아니잖아!? 충분히 코미디언 같아!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おかしいわね、けっこういい線いってると思ったのに。レミカはどうなの？」"
translation = "「이상하네, 꽤 괜찮은 선이라고 생각했는데. 레미카는 어때?」"

[[dialogue]]
speaker = "レミカ"
original = "「うん……そうだね。歌詞はすぐに思いつくんだけど、ユニット名か……」"
translation = "「응…… 그렇네. 가사는 금방 떠오르는데 유닛 이름이라니……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何も案を出さないのはずるいわよ！\u3000ほら、周りの些細なヒントから着想を得るの！」"
translation = "「아무 안도 내지 않는 건 치사하다구! 자, 주변의 사소한 힌트에서 착상을 얻어봐!」"

[[dialogue]]
speaker = "レミカ"
original = "「周りから……？\u3000ぁ、隣のテーブルに──」"
translation = "「주변에서……? 아, 옆 테이블에──」"

[[dialogue]]
speaker = "ヨミ"
original = "「いらっしゃいませ！\u3000ご注文は何にしましょう！」"
translation = "「어서 오세요! 주문은 무엇으로 하시겠습니까!」"

[[dialogue]]
speaker = "レミカ"
original = "「──爆裂スターナイツ、とかどうかな。可愛くない？」"
translation = "「──폭렬 스타 나이츠, 같은 건 어떨까. 귀엽지 않아?」"

[[dialogue]]
speaker = "メルエル"
original = "「発想の元が丸わかりだよ！？\u3000それに、なんか戦隊ヒーローみたい……！」"
translation = "「발상의 근원이 뻔히 보이거든!? 게다가 왠지 전대물 히어로 같아……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ダメよ！\u3000ヨミヨミがメンバーにいないのに爆裂は使えないわ！\u3000真の爆裂使いに失礼でしょ！？」"
translation = "「안 돼! 요미요미가 멤버에 없는데 폭렬은 쓸 수 없어! 진정한 폭렬 사용자에게 실례잖아!?」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやんっ！？」"
translation = "「코양!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私たちじゃ埒が明かない……というよりまずいわよ。たった１日のライブユニットなのに、ヘンテコな名前の方で有名になっちゃうわ！」"
translation = "「우리끼리는 결론이 안 나……라기보다 위험해. 단 하루뿐인 라이브 유닛인데, 이상한 이름으로 유명해지겠어!」"

[[dialogue]]
speaker = "レミカ"
original = "「……そんなにヘンかな、爆裂スターナイツ……」"
translation = "「……그렇게 이상한가, 폭렬 스타 나이츠……」"

[[dialogue]]
speaker = "メルエル"
original = "「か、会長くんに決めてもらうのはどうかな……！」"
translation = "「회, 회장군이 정해주는 건 어떨까……!」"

[[dialogue]]
speaker = "unk"
original = "俺に？"
translation = "나한테?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いい考えかもしれないわね。魔王が名づけの親のユニットなんて素敵かも！」"
translation = "「좋은 생각일지도 모르겠네. 마왕이 지어준 유닛 이름이라니 멋질지도!」"

[[dialogue]]
speaker = "レミカ"
original = "「私からもお願いできるかな──え？\u3000方向性？\u3000……そうだね、格好良さと可愛さが共存してる感じがいいかな」"
translation = "「나도 부탁해도 될까── 에? 방향성? ……그렇네, 멋짐과 귀여움이 공존하는 느낌이면 좋겠어」"

[[dialogue]]
speaker = "メルエル"
original = "「私は一体感のあるやつがいいかな？\u3000レミカちゃんとのチームだし、２人の共通点とかあったら嬉しいかも」"
translation = "「나는 일체감이 있는 게 좋으려나? 레미카짱과의 팀이니까, 두 사람의 공통점 같은 게 있으면 기쁠지도」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「２人の共通点……美少女？\u3000美少女スターナイツ？\u3000う～ん……」"
translation = "「두 사람의 공통점…… 미소녀? 미소녀 스타 나이츠? 으음……」"

[[dialogue]]
speaker = "メルエル"
original = "「じ、自分たちのチーム名に美少女ってつけるのは、ちょっと……」"
translation = "「자, 자기들 팀 이름에 미소녀라고 붙이는 건 좀……」"

[[dialogue]]
speaker = "unk"
original = "情熱とか、ひたむきって意味"
translation = "열정이나 성실하다는 의미다"

[[dialogue]]
speaker = "unk"
original = "じゃあ……『アーネスト』はどうかな"
translation = "그럼…… 『어니스트』는 어때"

[[dialogue]]
speaker = "メルエル"
original = "「アーネスト……」"
translation = "「어니스트……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいじゃない、格好いいような可愛いような感じだわ！」"
translation = "「괜찮네, 멋진 것 같기도 하고 귀여운 것 같기도 한 느낌이야!」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。私とメルエル、両方にマッチする単語だし……」"
translation = "「응. 나랑 메르엘, 양쪽 모두에 매치되는 단어고……」"

[[dialogue]]
speaker = "メルエル"
original = "「いいかもっ……！\u3000私たちのユニット名は、アーネスト！」"
translation = "「좋을지도……! 우리 유닛 이름은, 어니스트!」"

[[dialogue]]
speaker = "unk"
original = "まさかの落とし穴はあったけれど、無事にユニット名も決まった。"
translation = "의외의 함정은 있었지만, 무사히 유닛 이름도 결정되었다."

[[dialogue]]
speaker = "unk"
original = "歌唱やダンスの問題もない。その後も、いたって順調な準備の日々が続くのだった──"
translation = "가창이나 댄스 문제도 없다. 그 후로도 지극히 순조로운 준비의 나날이 이어졌다──"

