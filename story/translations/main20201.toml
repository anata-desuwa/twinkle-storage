[[dialogue]]
speaker = "unk"
original = "第１話,選挙管理委員会,B"
translation = "제1화, 선거관리위원회, B"

[[dialogue]]
speaker = "梨緒"
original = "「ライトニングテンペスト！！」"
translation = "「라이트닝 템페스트!!」"

[[dialogue]]
speaker = "クロト"
original = "「ディマイズブレイカー！！」"
translation = "「디마이즈 브레이커!!」"

[[dialogue]]
speaker = "ラティエ"
original = "「勝者──緋宮クロト！」"
translation = "「승자── 히노미야 쿠로토!」"

[[dialogue]]
speaker = "unk"
original = "季節外れの転入生・梨緒との御前試合に勝利してから数ヶ月。"
translation = "철 지난 전학생 리오와의 어전시합에서 승리하고 나서 수개월."

[[dialogue]]
speaker = "unk"
original = "新種の機械型モンスターは引き続き出現している。"
translation = "신종 기계형 몬스터는 계속해서 출현하고 있다."

[[dialogue]]
speaker = "unk"
original = "確かに強力ではあるものの、星騎士たちの成長や戦闘データの蓄積によって、対処もしやすくなってきた。"
translation = "확실히 강력하긴 하지만, 성기사들의 성장과 전투 데이터 축적으로 대처도 쉬워졌다."

[[dialogue]]
speaker = "unk"
original = "リクリエが完全に収まる様子は見えないが、フィヴォス流星群のような大規模な破滅の兆候もない。今は比較的平和が続いているといえるだろう。"
translation = "리크리에가 완전히 잦아들 기미는 보이지 않지만, 피보스 유성우 같은 대규모 파멸의 징조도 없다. 지금은 비교적 평화가 계속되고 있다고 할 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "そして梨緒はというと──"
translation = "그리고 리오는 어떠냐 하면──"

[[dialogue]]
speaker = "梨緒"
original = "「緋宮会長。選挙管理委員会として、君に勝負を申し込む！」"
translation = "「히노미야 회장. 선거관리위원회로서 너에게 승부를 신청한다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「また性懲りもなく勝負を仕掛けるつもり？」"
translation = "「또 포기도 안 하고 승부를 걸 생각이야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だいたい、新星学園には星徒会選挙なんてないでしょう。星徒会長は前会長の指名で決まるんだから」"
translation = "「애초에 신성학원에는 성도회 선거 같은 건 없잖아. 성도회장은 전 회장의 지명으로 결정되는 거니까.」"

[[dialogue]]
speaker = "梨緒"
original = "「そうだ、この学園に選挙はない。通常の場合はな」"
translation = "「맞다, 이 학원에 선거는 없지. 통상의 경우에는 말이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「だが全校生徒の３分の２の賛成があれば、星徒会長をリコールすることが可能だ。その場合、星徒会長を選挙で決めることになる」"
translation = "「하지만 전교생 3분의 2의 찬성이 있다면 성도회장을 리콜하는 것이 가능하다. 그 경우 성도회장을 선거로 결정하게 되지.」"

[[dialogue]]
speaker = "梨緒"
original = "「もし星徒会長がその職責にふさわしくない行為を行った場合、全校生徒に対してリコールを発議する」"
translation = "「만약 성도회장이 그 직책에 어울리지 않는 행위를 한다면 전교생을 상대로 리콜을 발의하겠다.」"

[[dialogue]]
speaker = "梨緒"
original = "「それが私の立ち上げた選挙管理委員会──選管だ」"
translation = "「그것이 내가 세운 선거관리위원회── 선관이다.」"

[[dialogue]]
speaker = "梨緒"
original = "「よって、私は緋宮クロトが星徒会長に値する人物か、監視する責務がある」"
translation = "「따라서 나는 히노미야 쿠로토가 성도회장에 걸맞은 인물인지 감시할 책무가 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「もし緋宮クロトが驕り、会長にふさわしくない人物となったなら、容赦なく引き摺り下ろさせてもらう」"
translation = "「만약 히노미야 쿠로토가 오만해져서 회장에 어울리지 않는 인물이 된다면 가차 없이 끌어내려 주지.」"

[[dialogue]]
speaker = "unk"
original = "俺が御前試合で勝ってからも、梨緒は俺を会長の座から降ろそうとしていた。"
translation = "내가 어전시합에서 이기고 나서도 리오는 나를 회장 자리에서 내리려 하고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」"
translation = "「너는 머지않아 사악한 마왕으로 타락해 세계를 멸망시킬 거다.」"

[[dialogue]]
speaker = "unk"
original = "もちろん悪の魔王になるつもりはないけど、リクリエの力を内に封じた俺に、異変が起こらないという保証はない。"
translation = "물론 악의 마왕이 될 생각은 없지만, 리크리에의 힘을 내면에 봉인한 나에게 이변이 일어나지 않는다는 보장은 없다."

[[dialogue]]
speaker = "unk"
original = "だから星徒会長としての責務を果たせなくなった時、俺を止めてくれる存在は居てくれた方がいいし、会長として気を抜けないのも悪いことではないと思うのだ。"
translation = "그러니 성도회장으로서의 책무를 다할 수 없게 됐을 때, 나를 멈춰줄 존재가 있는 편이 좋고, 회장으로서 긴장을 늦출 수 없는 것도 나쁜 일은 아니라고 생각하는 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちなみにあなた、今まで何回負けてるんだっけ？」"
translation = "「그나저나 당신, 지금까지 몇 번이나 졌더라?」"

[[dialogue]]
speaker = "梨緒"
original = "「……１２７回だ」"
translation = "「……127번이다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんでそこまでちゃんと数えてるのよ……」"
translation = "「왜 그렇게까지 꼬박꼬박 세고 있는 거야……」"

[[dialogue]]
speaker = "梨緒"
original = "「私は敗北を忘れない。悔しさを糧にするためにな」"
translation = "「나는 패배를 잊지 않는다. 분함을 자양분으로 삼기 위해서지.」"

[[dialogue]]
speaker = "unk"
original = "梨緒とはいろんな勝負をしてきた。"
translation = "리오와는 여러 승부를 겨뤄왔다."

[[dialogue]]
speaker = "unk"
original = "モンスターの討伐はもちろん、書類の整理だったり、ＤＩＳＣの連絡先の数だったり。"
translation = "몬스터 토벌은 물론, 서류 정리라든가, DISC의 연락처 개수라든가."

[[dialogue]]
speaker = "unk"
original = "僅差で危ないことはあったが、梨緒の言った１２７戦、全て俺が勝ってきた。"
translation = "간발의 차로 위험한 적은 있었지만, 리오가 말한 127전 모두 내가 이겨왔다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「心構えは立派だと思うけど、さすがに負けすぎじゃない？」"
translation = "「마음가짐은 훌륭하다고 생각하지만, 아무리 그래도 너무 많이 지는 거 아냐?」"

[[dialogue]]
speaker = "梨緒"
original = "「うっ」"
translation = "「윽.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ、会長くん、ちょっといい？\u3000ベリーダンス部の臨時予算申請なんだけど、根拠が弱い気がするのよね～」"
translation = "「아, 회장 군, 잠깐 괜찮아? 밸리댄스부의 임시 예산 신청인데, 근거가 좀 약한 것 같단 말이지~」"

[[dialogue]]
speaker = "梨緒"
original = "「弱い！？」"
translation = "「약해!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「それと新しく設置を検討しているグラウンドのフェンス、改めて見直すと必要ないかもしれないわ～」"
translation = "「그리고 새로 설치를 검토 중인 운동장 펜스 말인데, 다시 보니까 필요 없을지도 모르겠어~」"

[[dialogue]]
speaker = "梨緒"
original = "「必要ない！？」"
translation = "「필요 없어!?」"

[[dialogue]]
speaker = "梨緒"
original = "「うぅ……私は１２７回勝負して１勝もできない、弱くて、誰からも必要とされない人間なんだ……」"
translation = "「으으…… 나는 127번 승부해서 1승도 못 하는, 약하고, 누구에게도 필요 없는 인간이야……」"

[[dialogue]]
speaker = "クロト"
original = "「梨緒のことじゃないんだけど……」"
translation = "「리오 이야기가 아닌데……」"

[[dialogue]]
speaker = "unk"
original = "梨緒は何度も俺に勝負を挑む反面、些細なことで傷つく一面もあった。"
translation = "리오는 몇 번이고 나에게 승부를 거는 반면, 사소한 일에 상처받는 일면도 있었다."

[[dialogue]]
speaker = "unk"
original = "自信がないのか、自分に向けられた言葉でなくても反応してしまうようだ。"
translation = "자신이 없는 건지, 자신을 향한 말이 아니어도 반응해 버리는 모양이다."

[[dialogue]]
speaker = "梨緒"
original = "「私なんて、コネクタが合わない充電器のように不要で空しい存在なんだ……」"
translation = "「나 같은 건, 커넥터가 맞지 않는 충전기처럼 불필요하고 허무한 존재야……」"

[[dialogue]]
speaker = "クロト"
original = "「それは確かに空しいけど……」"
translation = "「그건 확실히 허무하긴 하겠지만……」"

[[dialogue]]
speaker = "梨緒"
original = "「──いや。私は諦めるわけにはいかない。折れるわけにはいかない。世界を救うその時まで」"
translation = "「──아니. 나는 포기할 수 없어. 꺾일 수는 없다. 세계를 구하는 그 순간까지」"

[[dialogue]]
speaker = "梨緒"
original = "「緋宮会長。さぁ、勝負だ！」"
translation = "「히노미야 회장. 자, 승부다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ここまでくると見上げた根性というか、大したものだわ……」"
translation = "「이쯤 되면 가상한 근성이라고 해야 할지, 대단하네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、委員会なのに他の委員はいないの？\u3000選挙管理委員会はあなた以外見たことないんだけど」"
translation = "「그나저나 위원회인데 다른 위원은 없어? 선거관리위원회는 너 말고 본 적이 없는데」"

[[dialogue]]
speaker = "梨緒"
original = "「……委員は現在募集中だ」"
translation = "「……위원은 현재 모집 중이다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ、ごめん。気にしてたのね」"
translation = "「아, 미안. 신경 쓰고 있었구나」"

[[dialogue]]
speaker = "クロト"
original = "「勝負するのはいいけど、何の勝負にする？\u3000この前はカフェテリアの皿洗いもやったし……」"
translation = "「승부하는 건 좋은데, 무슨 승부로 할래? 저번에는 카페테리아 접시 닦기도 했고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「自信があるって言ってた紅茶の淹れ方対決も負けちゃったしね」"
translation = "「자신 있다고 했던 홍차 우리기 대결도 져버렸고 말이야」"

[[dialogue]]
speaker = "梨緒"
original = "「うっ……！\u3000あれはみんなが緋宮会長の淹れ方に慣れていたからだ！\u3000私の紅茶は負けてない！」"
translation = "「윽……! 그건 다들 히노미야 회장이 우린 맛에 익숙해져 있었기 때문이다! 내 홍차는 지지 않았어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「見た目はクールなのに往生際が悪いわね。会長とか選管とか関係なく、クロトに勝ちたいだけなんじゃないの？」"
translation = "「겉모습은 쿨하면서 미련이 참 많네. 회장이니 선관이니 상관없이, 그냥 쿠로토에게 이기고 싶은 것뿐 아냐?」"

[[dialogue]]
speaker = "梨緒"
original = "「！？\u3000それは……ちが……」"
translation = "「!? 그, 그건…… 아냐……」"

[[dialogue]]
speaker = "unk"
original = "反論しようとして言葉に詰まる梨緒。"
translation = "반박하려다 말고 말문이 막히는 리오."

[[dialogue]]
speaker = "unk"
original = "確かに梨緒との勝負は、星騎士も星徒会長も関係ないものが多くなっている。それでも……"
translation = "확실히 리오와의 승부는 성기사도 성도회장도 상관없는 것들이 많아지고 있다. 그래도……"

[[dialogue]]
speaker = "クロト"
original = "「梨緒はすごいな」"
translation = "「리오는 대단하네」"

[[dialogue]]
speaker = "梨緒"
original = "「は……？\u3000すごい？」"
translation = "「하……? 대단하다고?」"

[[dialogue]]
speaker = "クロト"
original = "「だって、何回負けても勝つのを諦めてないだろ？\u3000普通だったらとっくに諦めてる」"
translation = "「그치만, 몇 번을 져도 이기는 걸 포기하지 않잖아? 보통이라면 벌써 포기했을 거야」"

[[dialogue]]
speaker = "梨緒"
original = "「……皮肉か？」"
translation = "「……비꼬는 건가?」"

[[dialogue]]
speaker = "クロト"
original = "「いいや。本当にすごいと思ってる。梨緒は弱くなんかないよ」"
translation = "「아니. 정말로 대단하다고 생각해. 리오는 약하지 않아」"

[[dialogue]]
speaker = "クロト"
original = "「諦めないって、強くないとできないことだからさ」"
translation = "「포기하지 않는다는 건, 강하지 않으면 할 수 없는 일이니까」"

[[dialogue]]
speaker = "梨緒"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "梨緒"
original = "「私は強くなんか……負けっぱなしの役立たずで……」"
translation = "「나는 강하지…… 패배만 하는 낙오자고……」"

[[dialogue]]
speaker = "梨緒"
original = "「あ……ぅ……今日の勝負は預けるっ。ではまた会おうっ」"
translation = "「아……으…… 오늘의 승부는 맡겨두지. 그럼 다음에 보자!」"

[[dialogue]]
speaker = "unk"
original = "梨緒が捨てゼリフを残し、廊下の向こう側へと消えていく。"
translation = "리오는 지지 않겠다는 말을 남기고 복도 저편으로 사라져 간다."

[[dialogue]]
speaker = "サーシャ"
original = "「行っちゃったわね～。これも梨緒ちゃんの負けに入るのかしら？」"
translation = "「가버렸네~. 이것도 리오짱의 패배에 들어가는 걸까~?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あの子の勝負、別に受けなくていいんじゃないの？\u3000星徒会長関係なくなってるし」"
translation = "「저 아이의 승부, 굳이 받아주지 않아도 되는 거 아냐? 성도회장과는 관계없게 됐고」"

[[dialogue]]
speaker = "クロト"
original = "「負担になってるわけじゃないから大丈夫だよ」"
translation = "「부담이 되는 건 아니니까 괜찮아」"

[[dialogue]]
speaker = "クロト"
original = "「それに、あの諦めない姿勢や気持ちはなんというかこう……シンパシー？\u3000みたいなのを感じるんだ」"
translation = "「게다가, 저 포기하지 않는 자세나 마음은 뭐랄까…… 심파시? 같은 게 느껴지거든」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「シンパシー？\u3000ま、確かにクロトも諦めが悪いものね」"
translation = "「심파시? 뭐, 확실히 쿠로토도 미련이 많으니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "母さんに星騎士になるのを反対された時は、バイトで入学資金を貯めて新星学園に転入した。"
translation = "어머니에게 성기사가 되는 걸 반대당했을 때는, 아르바이트로 입학 자금을 모아 신성학원에 전입했다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとの御前試合では、何度も打ちのめされながら立ち上がった。"
translation = "비너스와의 어전시합에서는, 몇 번이고 얻어맞으면서도 다시 일어섰다."

[[dialogue]]
speaker = "unk"
original = "ギエルとの戦いでも、幾度も地に伏し、その度にしぶとく再起して勝利を掴んだ。"
translation = "기엘과의 싸움에서도, 몇 번이나 땅에 쓰러지고 그때마다 끈질기게 재기해서 승리를 거머쥐었다."

[[dialogue]]
speaker = "unk"
original = "俺だって諦めの悪さは負けてない。"
translation = "나 또한 포기하지 않는 끈질김만큼은 지지 않는다."

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、行こうか」"
translation = "「자, 그럼 가볼까」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ、付き合うわ」"
translation = "「그래, 같이 가줄게」"

[[dialogue]]
speaker = "unk"
original = "これから向かうのは星徒会室──ではなく地下のトレーニング施設だ。"
translation = "이제부터 향할 곳은 성도회실──이 아니라 지하 트레이닝 시설이다."

