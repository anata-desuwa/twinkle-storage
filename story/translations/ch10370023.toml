[[dialogue]]
speaker = "unk"
original = "第３話,ふわふわダイエット,P"
translation = "제3화, 폭신폭신 다이어트, P"

[[dialogue]]
speaker = "unk"
original = "最近、サランがいつもハロウィンフォームのまま過ごしている。……そのことが気になって、尋ねてみると――"
translation = "최근 사란이 항상 할로윈 폼인 채로 지내고 있다. ……그 점이 신경 쓰여서 물어보자――"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよっ！？\u3000そ、それは……ジャックちゃんが帰った後も、新しい戦闘服として残してくれた力だから……！」"
translation = "「포요!? 그, 그건…… 잭짱이 돌아간 후에도 새로운 전투복으로서 남겨준 힘이니까……!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ハロウィンの時期は過ぎちゃったけど、使わなくちゃ損かな～って……えへへ」"
translation = "「할로윈 시기는 지났지만, 안 쓰면 손해일까 싶어서…… 에헤헤」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――そ、それだけじゃないって……？\u3000食事量が前より明らかに減ってる？」"
translation = "「――그, 그것뿐만이 아니냐고……? 식사량이 전보다 확실히 줄었다고?」"

[[dialogue]]
speaker = "unk"
original = "どこか具合が悪いのか……？"
translation = "어디 몸이라도 안 좋은 건가……?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「う……会長ちゃん、ごめんね……心配させちゃってた……？\u3000ちゃんと正直に言うね……」"
translation = "「으…… 회장짱, 미안해…… 걱정시켰구나……? 제대로 솔직하게 말할게……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「実はね……その……サラン、少し太っちゃって……」"
translation = "「사실은 말야…… 그…… 사란, 조금 살이 쪄버려서……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「制服を着ると……ちょっと色んな場所がキツくて～……。だけど戦闘服は、変身する時、体にぴったりフィットするように出現するから……」"
translation = "「교복을 입으면…… 좀 여기저기가 꽉 끼어서~……. 하지만 전투복은 변신할 때 몸에 딱 맞게 나타나니까……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「最近ね、会長ちゃんと一緒にいると、ふわふわな気持ちになるから食が進んで、前はそんなことなかったのに、なんか体重が増えてきちゃったの～……」"
translation = "「요즘 말야, 회장짱이랑 같이 있으면 마음이 폭신폭신해져서 밥이 잘 넘어가거든. 전에는 안 그랬는데 왠지 몸무게가 늘어버렸어~……」"

[[dialogue]]
speaker = "unk"
original = "言われてみれば、少しふっくらしたかも……"
translation = "듣고 보니 조금 통통해진 것 같기도……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよっ！？」"
translation = "「포요!?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「う～……さ、サラン、ダイエットする～～～っ！」"
translation = "「으~…… 사, 사란, 다이어트 할 거야~~~!」"

[[dialogue]]
speaker = "unk"
original = "というわけで、サランはその日からダイエットを開始。積極的に運動をするようになり、俺はそれをサポートすることになった。"
translation = "그리하여 사란은 그날부터 다이어트를 시작. 적극적으로 운동을 하게 되었고, 나는 그것을 서포트하게 되었다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふぅ……Ｓランクモンスター、サランでもなんとか倒せたぁ……」"
translation = "「후우…… S랭크 몬스터, 사란도 어떻게든 쓰러뜨렸다아……」"

[[dialogue]]
speaker = "unk"
original = "えらいぞ！\u3000確実に強くなってる！"
translation = "장하다! 확실히 강해지고 있어!"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そ、そうかな～……えへへ～♪\u3000――って」"
translation = "「그, 그럴까나~…… 에헤헤~♪ ――가 아니라」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「今はサラン、強くなりたいんじゃなくて、痩せたいんだよぉ～っ！\u3000リクリエも大変だけど、その前にサランの体重が大変なの～っ！」"
translation = "「지금 사란은 강해지고 싶은 게 아니라 살을 빼고 싶은 거라구~! 리크리에도 힘들지만, 그전에 사란의 몸무게가 큰일이라구~!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あぅ……いっぱい戦ったら、お腹減ってきちゃった……」"
translation = "「아으…… 잔뜩 싸웠더니 배가 고파졌어……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「で、でも、間食は我慢して、３食規則正しく食べるようにしないと……！\u3000サラン、頑張る～……！」"
translation = "「하, 하지만 간식은 참고 세 끼를 규칙적으로 먹도록 해야지……! 사란, 힘낼게~……!」"

[[dialogue]]
speaker = "unk"
original = "そこまで無理してやらなくていいんだぞ"
translation = "그렇게까지 무리해서 하지 않아도 된다고"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――もっとゆっくりやればいい？\u3000……確かに、サランは食べるの大好きだから、食事制限は辛いけど……」"
translation = "「――좀 더 천천히 하면 된다고? ……확실히 사란은 먹는 걸 정말 좋아하니까 식단 조절은 힘들지만……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「でも、会長ちゃんには、太った女の子だって思われたくないもん……」"
translation = "「하지만 회장짱에게는 살찐 여자애라고 생각되고 싶지 않은걸……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランね、今までは体重とか、全然気にならなかったんだ」"
translation = "「사란 말야, 지금까지는 몸무게 같은 거 전혀 신경 쓰이지 않았어」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だけど、会長ちゃんのこと好きになってから、自分の体重とか体型を気にしちゃう女の子たちの気持ちが、わかるようになったの」"
translation = "「하지만 회장짱을 좋아하게 된 뒤로, 자신의 몸무게나 체형을 신경 쓰는 여자애들의 마음을 알 것 같아졌어」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランは会長ちゃんから、可愛いって思ってもらいたくて……だから――」"
translation = "「사란은 회장짱이 귀엽다고 생각해주길 바라니까…… 그래서――」"

[[dialogue]]
speaker = "unk"
original = "（サランを抱き締める）"
translation = "（사란을 껴안는다）"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふわっ！？\u3000か、会長ちゃん、待って……い、今は……！」"
translation = "「후왓!? 회, 회장짱, 잠깐만…… 지, 지금은……!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いっぱい汗かいた後だから……サラン、変な匂いとかしちゃうかも……！」"
translation = "「땀을 잔뜩 흘린 뒤니까…… 사란, 이상한 냄새가 날지도 몰라……!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――恥ずかしがってるサランも可愛い？\u3000だ、だって～、サランは会長ちゃんに嫌われなくないんだもん……」"
translation = "「――부끄러워하는 사란도 귀엽다고? 하, 하지만~, 사란은 회장짱에게 미움받고 싶지 않은걸……」"

[[dialogue]]
speaker = "unk"
original = "嫌いになったりしない。好きだよ"
translation = "미워하지 않아. 좋아해"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ……会長ちゃん……ん……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「아…… 회장짱…… 응……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サランとキスをして、それからしばらく頭や顔を撫でたり、抱き締め合ったりしながら過ごす――"
translation = "사란과 키스를 하고, 그러고 나서 한동안 머리와 얼굴을 쓰다듬거나 서로 껴안으며 시간을 보낸다――"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「……あれ？\u3000なんだろ～？\u3000なんか――」"
translation = "「……어라? 뭐지~? 왠지――」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「さっきまで感じてた空腹感が、なくなったかも？」"
translation = "「아까까지 느껴지던 공복감이 사라진 것 같아?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そういうわけで、サランは会長ちゃんのおかげでダイエットに成功したの～♪」"
translation = "「그렇게 해서 사란은 회장짱 덕분에 다이어트에 성공했어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ～♪\u3000会長ちゃんとスキンシップして、ふわふわ気分でお腹いっぱいになれば、食事量を減らしても大丈夫ってわかったんだ～♪」"
translation = "「에헤헤~♪ 회장짱이랑 스킨십하고, 폭신폭신한 기분으로 배가 가득 차면 식사량을 줄여도 괜찮다는 걸 알았어~♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「な、なるほど。そんなことがあったのですね……ただ――」"
translation = "「그, 그렇군요. 그런 일이 있었나요…… 다만――」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「心なしか、その……今度は師匠が痩せてるような……」"
translation = "「기분 탓인지 그…… 이번에는 스승님이 수척해지신 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "なんかスキンシップにハマったらしくて……"
translation = "왠지 스킨십에 맛 들린 모양이라……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～<emoji=heart04>\u3000会長ちゃんに、頬っぺたすりすり～<emoji=heart04>\u3000ふわふわ～<emoji=heart04>」"
translation = "「음~<emoji=heart04> 회장짱에게 볼 부비부비~<emoji=heart04> 폭신폭신해~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一方のサランは、絶好調で綺麗なつやつや肌なのだった。"
translation = "반면 사란은 컨디션 최상으로 매끈매끈하고 윤기 나는 피부였다."

