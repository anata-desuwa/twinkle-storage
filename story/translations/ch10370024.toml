[[dialogue]]
speaker = "unk"
original = "第４話,ふわふわスキンシップ,P"
translation = "제4화, 폭신폭신 스킨십, P"

[[dialogue]]
speaker = "unk"
original = "最近、サランのスキンシップがどんどん激しくなっている。"
translation = "최근 사란의 스킨십이 점점 격해지고 있다."

[[dialogue]]
speaker = "サラン"
original = "「ね～、会長ちゃん♪\u3000サラン、もっとハグしたいな～<emoji=heart04>\u3000ダメ～？」"
translation = "「저기~, 회장짱♪ 사란, 좀 더 허그하고 싶어~<emoji=heart04> 안 돼~?」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ、やった～♪\u3000ぎゅ～<emoji=heart04>\u3000こうしてると、安心できてふわふわ～<emoji=heart04>」"
translation = "「에헤헤, 됐다~♪ 꼬옥~<emoji=heart04> 이러고 있으면 안심돼서 폭신폭신해~<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000どうしたの、会長ちゃん？\u3000大事な話ってなに～？」"
translation = "「포요? 왜 그래, 회장짱? 중요한 이야기라니 뭐야~?」"

[[dialogue]]
speaker = "unk"
original = "言いづらいことなんだけど……"
translation = "말하기 힘든 부분이지만……"

[[dialogue]]
speaker = "サラン"
original = "「――今日は２人きりだからいいけど、最近、学園でもスキンシップが多い？\u3000……確かに、言われてみると、ハグとキスは多かったかも～」"
translation = "「――오늘은 둘뿐이니까 괜찮지만, 최근 학원에서도 스킨십이 많다고? ……확실히 듣고 보니 허그랑 키스가 많았을지도~」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ！？\u3000スキンシップ制限！？\u3000な、なんでなんで～っ！？」"
translation = "「포요!? 스킨십 제한!? 왜, 왜왜~!?」"

[[dialogue]]
speaker = "サラン"
original = "「――恋人でも学園では自制しないと、周りから悪く思われちゃう……？\u3000そっか……サラン、会長ちゃんがみんなから悪く言われちゃうのは嫌だなぁ……」"
translation = "「――연인이라도 학원에서는 자제하지 않으면 주변에서 안 좋게 생각할 거라고……? 그렇구나…… 사란, 회장짱이 모두에게 욕먹는 건 싫어……」"

[[dialogue]]
speaker = "サラン"
original = "「うん……わかった！\u3000サラン、なるべくスキンシップ、我慢するようにするにするねっ」"
translation = "「응…… 알았어! 사란, 가급적 스킨십 참도록 노력해볼게」"

[[dialogue]]
speaker = "サラン"
original = "「――ハグは２人きりになった時で～……ぽよ！？\u3000き、キスは１日１回までなの～！？\u3000う～……会長ちゃんとのキス、すっごくふわふわして、サラン好きなのに……」"
translation = "「――허그는 둘만 있을 때 하고~…… 포요!? 키, 키스는 하루에 한 번까지야!? 으~…… 회장짱과의 키스, 정말 폭신폭신해서 사란은 좋은데……」"

[[dialogue]]
speaker = "unk"
original = "そうして、次の日からスキンシップ制限が始まったのだが――"
translation = "그렇게 다음 날부터 스킨십 제한이 시작되었는데――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっと……なんか大丈夫？\u3000ここ１週間くらい、星徒会の仕事が忙しくて、サランと全然会えてないみたいだけど……」"
translation = "「저기…… 왠지 괜찮아? 최근 일주일 정도 성도회 일이 바빠서 사란이랑 전혀 못 만난 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "ふわふわ成分が、足りない……！"
translation = "폭신폭신 성분이 부족해……!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふわふわ成分って何！？\u3000……とにかく、今日は一旦仕事を休みなさい！\u3000そして、サランに会ってきなさい！\u3000これはフィクサー命令よ！」"
translation = "「폭신폭신 성분이 뭐야!? ……아무튼 오늘은 일단 일을 쉬어! 그리고 사란을 만나고 와! 이건 픽서 명령이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――自分からスキンシップ制限を言い出した手前、サランも我慢してるのに、合わせる顔がない……？\u3000あのね、よく聞きなさい！」"
translation = "「――자기가 먼저 스킨십 제한을 제안한 마당에 사란도 참고 있는데 볼 면목이 없다고? 얘, 잘 들어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今のままじゃダメだって気付いたなら、２人でちゃんと話し合う！\u3000恋人だからこそ、気持ちは素直に伝え合うべきでしょう！？」"
translation = "「지금 이대로는 안 된다는 걸 깨달았다면 둘이서 제대로 대화해! 연인이니까 더더욱 마음은 솔직하게 전해야 하는 거 아냐!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに背中を押されてサランに会いにいくと、サランは調理室から出てくるところだった。"
translation = "비너스가 등을 떠밀어 사란을 만나러 가니, 사란은 조리실에서 나오던 참이었다."

[[dialogue]]
speaker = "サラン"
original = "「これでよしっと……あれ？\u3000会長ちゃん！？\u3000久しぶり～♪」"
translation = "「이걸로 됐고…… 어라? 회장짱!? 오랜만이야~♪」"

[[dialogue]]
speaker = "サラン"
original = "「やっと会えた～♪\u3000最近、星徒会の仕事が忙しかったんだよね？\u3000ずっと会えてなかったけど、大丈夫だった～？」"
translation = "「드디어 만났다~♪ 최근 성도회 일이 바빴지? 계속 못 만났는데 괜찮았어~?」"

[[dialogue]]
speaker = "サラン"
original = "「って、きゃっ！？\u3000か、会長ちゃん、いきなりハグしたりして、どうしたの～？」"
translation = "「아니, 꺄악!? 회, 회장짱, 갑자기 허그하고 왜 그래~?」"

[[dialogue]]
speaker = "サラン"
original = "「い、一応今は、廊下に人は見えなくて２人きりだけど、学園だし～。これってセーフなのかな……？」"
translation = "「이, 일단 지금은 복도에 사람이 안 보여서 둘뿐이지만 학원인데~. 이건 세이프인 걸까……?」"

[[dialogue]]
speaker = "unk"
original = "サラン、ごめん。俺が悪かった"
translation = "사란, 미안해. 내가 잘못했어"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000どうして会長ちゃんが謝るの？\u3000――気づかないうちにサランに依存してた？\u3000え～と、それってどういう……？」"
translation = "「포요? 왜 회장짱이 사과해? ――모르는 사이에 사란에게 의존하고 있었다고? 저기, 그건 어떤……?」"

[[dialogue]]
speaker = "サラン"
original = "「――付き合い始めてから、サランのこと、もっと好きになってたみたい？\u3000そうなんだ～♪\u3000なんか、すごく嬉しいかも～♪」"
translation = "「――사귀기 시작한 뒤로 사란을 더 좋아하게 된 것 같다고? 그렇구나~♪ 왠지 정말 기쁠지도~♪」"

[[dialogue]]
speaker = "サラン"
original = "「サランもね～、会長ちゃんのこと、前よりも好きになってたから、この１週間は少し寂しかったよ？」"
translation = "「사란도 말야, 회장짱을 전보다 더 좋아하게 됐으니까 이 일주일 동안 조금 외로웠어」"

[[dialogue]]
speaker = "サラン"
original = "「でもね、離れてたから気付いたこともあるの。サランね、自分よりも会長ちゃんに、ふわふわでいて欲しいんだ～」"
translation = "「하지만 말야, 떨어져 있어서 깨달은 것도 있어. 사란은 자신보다 회장짱이 더 폭신폭신한 기분이었으면 좋겠어~」"

[[dialogue]]
speaker = "サラン"
original = "「だから忙しくて会えない時でも、ふわふわな気持ちでいられるように、会長ちゃんへの差し入れで、お菓子を作ってたの～」"
translation = "「그래서 바빠서 못 만날 때라도 폭신폭신한 기분으로 지낼 수 있게, 회장짱에게 줄 간식으로 과자를 만들고 있었어~」"

[[dialogue]]
speaker = "サラン"
original = "「――うん♪\u3000もちろん食べていいよ～。はいこれ、サランのふわふわをいっぱい込めた、スペシャルケーキだよ～♪」"
translation = "「――응♪ 물론 먹어도 돼~. 자 여기, 사란의 폭신폭신함을 잔뜩 담은 스페셜 케이크야~♪」"

[[dialogue]]
speaker = "サラン"
original = "「フォークあるから、サランが食べさせてあげるね♪\u3000はい、会長ちゃん、あ～ん♪\u3000――どう？\u3000美味しい？」"
translation = "「포크 있으니까 사란이 먹여줄게♪ 자, 회장짱, 아~앙♪ ――어때? 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "すごく美味しくて、ふわふわだ"
translation = "정말 맛있고 폭신폭신해"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～♪\u3000元気出た？\u3000なら、よかった～♪」"
translation = "「에헤헤~♪ 기운 났어? 그럼 다행이다~♪」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃん。サランね、会長ちゃんのこともっとふわふわにできる、素敵な女の子になるから！」"
translation = "「회장짱. 사란 말야, 회장짱을 더 폭신폭신하게 해줄 수 있는 멋진 여자애가 될게!」"

[[dialogue]]
speaker = "unk"
original = "俺もサランのこと、もっと大切にする"
translation = "나도 사랑을 좀 더 소중히 여길게"

[[dialogue]]
speaker = "サラン"
original = "「じゃあ、両想いだね～♪\u3000――会長ちゃん、キスしたいの？\u3000うん、いいよ～<emoji=heart04>」"
translation = "「그럼, 서로 좋아하는 거네~♪ ――회장님, 키스하고 싶어? 응, 좋아~<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
original = "「……んっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「……음<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
original = "「……えへへ～<emoji=heart04>\u3000久しぶりのキス、すっごくふわふわ～<emoji=heart04>」"
translation = "「……에헤헤~<emoji=heart04> 오랜만의 키스, 정말 폭신폭신해~<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
original = "「ねぇ、会長ちゃん……もっとしてもいい？」"
translation = "「저기, 회장님…… 더 해도 돼?」"

[[dialogue]]
speaker = "unk"
original = "サランはその後、何度もキスを交わすのだった。"
translation = "사랑은 그 후, 몇 번이고 키스를 나누었다."

[[dialogue]]
speaker = "unk"
original = "それからしばらく経った、ある日の放課後。"
translation = "그로부터 시간이 꽤 흐른 어느 날 방과 후."

[[dialogue]]
speaker = "サラン"
original = "「あっ、会長ちゃん♪\u3000今日も星徒会に行く前に、サランに会いにきてくれたの～？\u3000忙しいのに、ありがと～♪」"
translation = "「앗, 회장님♪ 오늘도 성도회에 가기 전에 사랑을 만나러 와 준 거야~? 바쁠 텐데 고마워~♪」"

[[dialogue]]
speaker = "サラン"
original = "「うん、サランはこの後、星騎士として訓練に行ってこようと思ってるの～。会長ちゃんと一緒に戦えるように、強くなりたいんだ～♪」"
translation = "「응, 사랑은 이따가 성기사로서 훈련하러 가려고 해~. 회장님이랑 같이 싸울 수 있게 강해지고 싶거든~♪」"

[[dialogue]]
speaker = "サラン"
original = "「じゃあ、今日もお互い頑張れるように、ふわふわ成分補給しておく～？」"
translation = "「그럼, 오늘도 서로 힘낼 수 있게 폭신폭신 성분 보충해 둘까~?」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～♪\u3000行ってらっしゃいのハグ～<emoji=heart04>\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「에헤헤~♪ 다녀오세요 포옹~<emoji=heart04> 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "行ってきます！"
translation = "다녀오겠습니다!"

[[dialogue]]
speaker = "サラン"
original = "「うん！\u3000行ってらっしゃい、会長ちゃん♪」"
translation = "「응! 다녀와, 회장님♪」"

[[dialogue]]
speaker = "unk"
original = "俺は愛しい彼女からもらった元気を胸に、今日も星徒会の仕事に向かうのだった。"
translation = "나는 사랑스러운 그녀에게 받은 기운을 가슴에 품고, 오늘도 성도회 업무를 향해 나섰다."

