[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「いざ尋常に勝負よ！」"
translation = "「자 정정당당하게 승부야!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「新星学園では、御前試合で星徒会長を決めたって聞いたわ。なら、私だって勝ったら星徒会長になれるはずよ」"
translation = "「신성학원에서는 어전 시합으로 성도회장을 정했다고 들었어. 그렇다면, 나도 이기면 성도회장이 될 수 있을 거야」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「というわけで──会長の座を懸けて私と勝負よ！」"
translation = "「그런 고로── 회장 자리를 걸고 나랑 승부야!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「逃げるのは許さないんだからねっ」"
translation = "「도망치는 건 용서 안 할 거니까」"

