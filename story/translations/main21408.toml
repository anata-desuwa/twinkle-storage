[[dialogue]]
speaker = "unk"
original = "第８話,説得と後悔,B"
translation = "제8화, 설득과 후회"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……ずいぶんと厄介な盾を使うようになったのね、魔王」"
translation = "「……제법 까다로운 방패를 쓰게 되었군요, 마왕.」"

[[dialogue]]
speaker = "クロト"
original = "「君の方こそ、以前より遠慮がないな……！」"
translation = "「너야말로 이전보다 사정없군……!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの攻撃は、かつてデネブで相対した時とは比較にならない霊力が込められている。"
translation = "루비네의 공격에는 예전 데네브에서 상대했을 때와는 비교도 되지 않는 영력이 담겨 있다."

[[dialogue]]
speaker = "unk"
original = "しかし天界でメルエルから受け取ったコード──『アルケインカオスクエーサー』のおかげで互角以上に渡り合えていた。"
translation = "하지만 천계에서 메르엘에게 받은 코드── 『아르케인 카오스 퀘이사』 덕분에 호각 이상으로 맞설 수 있었다."

[[dialogue]]
speaker = "unk"
original = "散々に苦しめられた、俺の身体で渦巻くリクリエの力を、逆に身を守る盾として形成する──カオスイージスの突破はルヴィネといえど容易ではない。"
translation = "그토록 괴롭혔던, 내 몸에서 소용돌이치는 리크리에의 힘을 역으로 몸을 지키는 방패로 형성한다── 카오스 이지스의 돌파는 루비네라 할지라도 쉽지 않다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「出し惜しみしている場合では、なさそうね──」"
translation = "「힘을 아끼고 있을 상황은 아닌 것 같네요──」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが手のひらに乗せた、ブラックホールを小型化させたような漆黒の球体──"
translation = "루비네가 손바닥 위에 올린, 블랙홀을 소형화시킨 듯한 칠흑의 구체──"

[[dialogue]]
speaker = "unk"
original = "ぞくり、と全身が粟立つ。ルヴィネが呼び出そうとしているのは、極星従騎でも使徒のシャドウでもない！"
translation = "오싹하며 온몸에 소름이 돋는다. 루비네가 불러내려는 것은 극성종기도 사도의 그림자도 아니다!"

[[dialogue]]
speaker = "クロト"
original = "「まずい！\u3000みんな、ルヴィネを止めるんだ──！！」"
translation = "「위험해! 모두들, 루비네를 멈춰──!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「もう遅いわ。あなたたちが集めたアルケインコードも、星騎士として身に着けた訓練の成果も、こいつの前では塵と同じ──」"
translation = "「이미 늦었어요. 당신들이 모은 아르케인 코드도, 성기사로서 익힌 훈련의 성과도, 이 녀석 앞에서는 먼지와 같으니──」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──来なさい。堕落せしベガの魔王……厄災の右腕！！」"
translation = "「── 오너라. 타락한 베가의 마왕…… 재앙의 오른팔!!」"

[[dialogue]]
speaker = "unk"
original = "現れてしまった。平行世界の俺──ディザスターハンド。"
translation = "나타나고 말았다. 평행세계의 나── 디재스터 핸드."

[[dialogue]]
speaker = "unk"
original = "その破滅の拳の狙いは、一番近くにいたヴィーナス──！"
translation = "그 파멸의 주먹이 노리는 것은 가장 가까이 있던 비너스──!"

[[dialogue]]
speaker = "クロト"
original = "「させるか──カオスイージスッ！！」"
translation = "「하게 둘까 보냐── 카오스 이지스!!」"

[[dialogue]]
speaker = "unk"
original = "不可視の防壁に、厄災の右腕がぶつかる──その瞬間、盾の展開のために掲げていた俺の腕に、凄まじい衝撃がぶつかる。"
translation = "불가시의 방벽에 재앙의 오른팔이 부딪힌다── 그 순간, 방패 전개를 위해 치켜들었던 내 팔에 엄청난 충격이 몰아친다."

[[dialogue]]
speaker = "クロト"
original = "「ぐ、がぁッ──！？」"
translation = "「크, 윽──!?」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「クロト、大丈夫っ！？」"
translation = "「쿠로토, 괜찮아!?」"

[[dialogue]]
speaker = "クロト"
original = "「あ、ああっ、通用するかと思ったんだけどな……」"
translation = "「아, 아아, 통할 줄 알았는데 말이야……」"

[[dialogue]]
speaker = "unk"
original = "天界の神殿を受け止めた絶対の盾ですら、拮抗もできない……！"
translation = "천계의 신전을 받아냈던 절대의 방패조차 길항조차 할 수 없다……!"

[[dialogue]]
speaker = "unk"
original = "正面からぶつかるのを避け、攻撃をいなすことに集中しなければ──確実に腕を一本、持っていかれていた。"
translation = "정면으로 부딪히는 것을 피하고 공격을 흘려보내는 것에 집중하지 않았다면── 확실히 팔 하나는 날아갔을 것이다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「いい判断ね。流石だわ、緋宮クロト」"
translation = "「좋은 판단이네요. 역시 히노미야 쿠로토다워요.」"

[[dialogue]]
speaker = "unk"
original = "今まで降臨すれば暴れまわるだけだったあの右腕が……ルヴィネの傍に控えている。まるで主人の命令を待つ獣のように──"
translation = "지금까지 강림하면 날뛰기만 하던 그 오른팔이…… 루비네의 곁에 대기하고 있다. 마치 주인의 명령을 기다리는 짐승처럼──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「この腕のコントロールにはずいぶん手を焼いたわ。でも、今はご覧のとおり」"
translation = "「이 팔을 컨트롤하는 데는 꽤 애를 먹었죠. 하지만 지금은 보시는 바와 같아요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あなたたちはここで終わり。もう一切の手加減はないわ。行きなさい──ディザスターハンド」"
translation = "「당신들은 여기서 끝이에요. 이제 일절 봐주는 건 없어요. 가라── 디재스터 핸드.」"

[[dialogue]]
speaker = "クロト"
original = "「あいつの攻撃は俺が逸らす！\u3000みんな、ルヴィネへの攻撃を続けるんだ！！」"
translation = "「저놈의 공격은 내가 튕겨내겠어! 모두들, 루비네에 대한 공격을 계속해!!」"

[[dialogue]]
speaker = "梨緒"
original = "「倒しても倒しても使徒の影が湧き出てくる……大丈夫かアポロ？」"
translation = "「쓰러뜨려도 쓰러뜨려도 사도의 그림자가 솟아나오네…… 괜찮아, 아폴로?」"

[[dialogue]]
speaker = "アポロ"
original = "「……あたしなら平気だ。こんな幻影の言葉で、今さら悩んだりなんかしない。ヒーローになるって誓ったんだからな！」"
translation = "「……나라면 멀쩡해. 이런 환영의 말 따위에 이제 와서 고민하거나 하지 않아. 히어로가 되겠다고 맹세했으니까!」"

[[dialogue]]
speaker = "梨緒"
original = "「頼もしいな。その意気だ」"
translation = "「든든하군. 그 기세다.」"

[[dialogue]]
speaker = "ジグ"
original = "「しかし、まずい状況だね……魔王たちはまだルヴィネを止められていないらしい」"
translation = "「하지만 상황이 좋지 않네…… 마왕 일행은 아직 루비네를 멈추지 못한 모양이야.」"

[[dialogue]]
speaker = "ジグ"
original = "「このまま持久戦になれば、地上は勝ち目がないよ」"
translation = "「이대로 지구전이 되면 지상 쪽은 승산이 없어.」"

[[dialogue]]
speaker = "梨緒"
original = "「わかっている──だが……」"
translation = "「알고 있어── 하지만……」"

[[dialogue]]
speaker = "ジグ"
original = "「いったい何人コレクションしてるんだ。趣味が悪いったらないね」"
translation = "「도대체 몇 명이나 수집하고 있는 거야. 취미가 고약하기 짝이 없네.」"

[[dialogue]]
speaker = "梨緒"
original = "「……アポロ、ジグ。ここを離れて塔の頂上を目指せ」"
translation = "「……아폴로, 지그. 이곳을 떠나 탑 꼭대기를 목표로 해.」"

[[dialogue]]
speaker = "アポロ"
original = "「っ！？\u3000何言ってるんだ、３人でもやっとなのに……！」"
translation = "「!? 무슨 소리야, 셋이서도 겨우겨우인데……!」"

[[dialogue]]
speaker = "梨緒"
original = "「このままだとジリ貧だ。ルヴィネを止めない限り、いずれ押し切られる」"
translation = "「이대로는 소모전일 뿐이야. 루비네를 멈추지 않는 한 결국 밀리게 돼.」"

[[dialogue]]
speaker = "梨緒"
original = "「それに私は１人じゃない。どうやら、ノルンを介してベガの守護星から力を受け取れば、『天蓋』を回避できるようだ」"
translation = "「게다가 난 혼자가 아니야. 아무래도 노른을 통해 베가의 수호성으로부터 힘을 받으면 『천개』를 회피할 수 있는 모양이야.」"

[[dialogue]]
speaker = "梨緒"
original = "「偽ジグの『天機の星眼』も相殺したうえで、今の私なら上回れるだろう。要するに、相性がいい」"
translation = "「가짜 지그의 『천기의 성안』도 상쇄한 데다, 지금의 나라면 압도할 수 있겠지. 요컨대 상성이 좋아.」"

[[dialogue]]
speaker = "梨緒"
original = "「だから学園周辺の使徒は、私１人で殲滅する──フィオナも連れて行っていい。ここは全て私に任せろ」"
translation = "「그러니 학원 주변의 사도는 나 혼자서 섬멸하겠어── 피오나도 데려가도 좋아. 여기는 전부 내게 맡겨.」"

[[dialogue]]
speaker = "ジグ"
original = "「……わかった。私の星眼は今、不完全だ。連続使用もできない。<ruby>殿<rt>しんがり</rt></ruby>を務めるなら、アガサが適任だね」"
translation = "「……알았어. 내 성안은 지금 불완전해. 연속 사용도 할 수 없고. 후방을 맡는다면 아가사가 적임이겠네.」"

[[dialogue]]
speaker = "アポロ"
original = "「おい、ジグ……！？」"
translation = "「어이, 지그……!?」"

[[dialogue]]
speaker = "ジグ"
original = "「女の決めた覚悟にやいやい言うのは無粋だよ、アポロ」"
translation = "「여자가 정한 각오에 왈가왈부하는 건 멋없어, 아폴로.」"

[[dialogue]]
speaker = "ジグ"
original = "「塔の頂上に向かう──アガサはしっかり、私の幻影相手に白星を稼ぐといい」"
translation = "「탑 꼭대기로 향하자── 아가사는 확실히 내 환영을 상대로 승수를 쌓아두라고.」"

[[dialogue]]
speaker = "梨緒"
original = "「馬鹿を言うな。こんな模造品に、本物のジグの代わりが務まるとでも？」"
translation = "「바보 같은 소리 마. 이런 모조품이 진짜 지그의 대역을 맡을 수 있을 리 없잖아?」"

[[dialogue]]
speaker = "アポロ"
original = "「…………死ぬなよ」"
translation = "「………… 죽지 마.」"

[[dialogue]]
speaker = "梨緒"
original = "「当たり前だ。ジグに負け越したまま、逝くわけにはいかない」"
translation = "「당연하지. 지그에게 지고 있는 채로 갈 수는 없으니까.」"

[[dialogue]]
speaker = "unk"
original = "──アポロとジグがその場から離れ、梨緒だけが残された。"
translation = "── 아폴로와 지그가 그 자리를 떠나고 리오만이 남겨졌다."

[[dialogue]]
speaker = "梨緒"
original = "「守護天使ノルン──もう一度力を貸してくれ」"
translation = "「수호천사 노른── 다시 한번 힘을 빌려줘.」"

[[dialogue]]
speaker = "梨緒"
original = "「アルタイルを……ベガの二の舞にはさせない！！」"
translation = "「알타이르를…… 베가의 전철을 밟게 하지는 않겠어!!」"

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドの苛烈な攻撃をカオスイージスでいなしつつ、隙を見て攻撃を畳み込む。"
translation = "디재스터 핸드의 가혹한 공격을 카오스 이지스로 흘려내며 틈을 보아 공격을 퍼붓는다."

[[dialogue]]
speaker = "unk"
original = "何度も何度も吹き飛ばされ、ダメージが蓄積していく。けれど──それは膝を折る理由にはならない。"
translation = "몇 번이고 몇 번이고 날아가며 대미지가 축적되어 간다. 하지만── 그것이 무릎을 꿇을 이유가 되지는 않는다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「傷ついて倒れるたびに、星力がより練り上げられて息を吹き返す……話には聞いていたけれど、出鱈目な能力ね」"
translation = "「상처 입고 쓰러질 때마다 성력이 더욱 연마되어 숨을 불어넣다니…… 이야기는 들었지만 터무니없는 능력이네요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……けれどその意地も、いつまでもつかしら？」"
translation = "「……하지만 그 고집이 언제까지 버틸 수 있을까요?」"

[[dialogue]]
speaker = "クロト"
original = "「何度でも試せばいい。俺はそのたびに立ち上がって、ルヴィネ──君にリクリエをやめさせてみせる！！」"
translation = "「몇 번이든 시험해 봐. 난 그때마다 일어서서 루비네── 네가 리크리에를 그만두게 만들 테니까!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……くだらない。聞き飽きたわ、その言葉は」"
translation = "「……시시해. 귀에 못이 박히도록 들었어요, 그 말은.」"

[[dialogue]]
speaker = "unk"
original = "戦いのさなかにわかってきたことがある──"
translation = "싸움 도중에 알게 된 사실이 있다──"

[[dialogue]]
speaker = "unk"
original = "ルヴィネは相当量の霊力で、無理やりにディザスターハンドを縛り付け、操っている様子だ。"
translation = "루비네는 상당량의 영력으로 억지로 디재스터 핸드를 묶어두고 조종하고 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "簡単で明快な命令しか行えていない、そして彼女自身の消耗も激しい──だからこそ。"
translation = "간단하고 명쾌한 명령밖에 내리지 못하고 있으며, 그녀 자신의 소모도 격렬하다── 그렇기에."

[[dialogue]]
speaker = "ルヴィネ"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "unk"
original = "少しずつルヴィネ本体に俺の攻撃が通る機会も増えてきた。"
translation = "조금씩 루비네 본체에 내 공격이 통할 기회도 늘어났다."

[[dialogue]]
speaker = "クロト"
original = "「どうして極星のみんなにあんな言葉をかけられる！？\u3000今の世界を諦めて、次の世界を始めようだなんて……どうして！！」"
translation = "「어떻게 극성학원 모두에게 그런 말을 할 수 있지!? 지금의 세계를 포기하고 다음 세계를 시작하자니…… 어째서!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私ができるせめてものお礼とお詫びだからよ。今まであの子たちは、本当によく働いてくれた」"
translation = "「제가 할 수 있는 최소한의 감사와 사죄이기 때문이에요. 지금까지 그 아이들은 정말 열심히 일해 주었으니까요.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あれだけ尽くしてくれたのだから、世界の滅びに際して、特別に温情を授けようと思った……何かおかしなことがある？」"
translation = "「그만큼 헌신해 주었으니 세계의 멸망에 즈음하여 특별히 온정을 베풀려 생각했어요…… 뭔가 이상한 점이라도?」"

[[dialogue]]
speaker = "クロト"
original = "「ふざけるな──！！」"
translation = "「웃기지 마──!!」"

[[dialogue]]
speaker = "クロト"
original = "「彼女たちが今、どうして俺たちアルタイルに協力してくれていると思う！？」"
translation = "「그녀들이 지금 왜 우리 알타이르에 협력하고 있다고 생각하는 거냐!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私がリクリエを起こす敵だと知ったからでしょう？」"
translation = "「제가 리크리에를 일으키는 적이라는 걸 알았기 때문이겠죠?」"

[[dialogue]]
speaker = "クロト"
original = "「違う──未来を知ったからだ！\u3000ジグが星眼で見た未来を……！！」"
translation = "「틀려── 미래를 알았기 때문이다! 지그가 성안으로 본 미래를!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そういうこと。滅びの未来を視たのね。死にたくないと思うのは、ヒトとしてとても自然なことだわ」"
translation = "「그렇군요. 멸망의 미래를 본 거네요. 죽고 싶지 않다고 생각하는 건 인간으로서 매우 자연스러운 일이에요.」"

[[dialogue]]
speaker = "クロト"
original = "「アルタイルは滅びない！\u3000ルヴィネ！\u3000視たのは君が死ぬ未来だ！！」"
translation = "「알타이르는 멸망하지 않아! 루비네! 본 것은 네가 죽는 미래다!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……っ！？」"
translation = "「……윽!?」"

[[dialogue]]
speaker = "クロト"
original = "「このままリクリエを推し進めると……君は死んでしまう！\u3000事切れた君のそばに駆け寄る、極星のみんな……それがジグの視たビジョンだ！」"
translation = "「이대로 리크리에를 밀어붙이면…… 너는 죽고 말아! 숨이 끊어진 네 곁으로 달려가는 극성학원 모두들…… 그것이 지그가 본 비전이다!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「そんな嘘で、私を惑わせるつもり？」"
translation = "「그런 거짓말로 저를 현혹할 셈인가요?」"

[[dialogue]]
speaker = "クロト"
original = "「こんな嘘を今さら吐いて、何の意味がある！？」"
translation = "「이런 거짓말을 이제 와서 해서 무슨 의미가 있겠어!?」"

[[dialogue]]
speaker = "クロト"
original = "「極星のみんなは、君の未来を変えたいと思った！\u3000俺たちの言葉を信じて、君を救うためにここまで来たんだ……！！」"
translation = "「극성학원 모두는 너의 미래를 바꾸고 싶어 했어! 우리 말을 믿고 너를 구하기 위해 여기까지 온 거라고……!!」"

[[dialogue]]
speaker = "クロト"
original = "「女神の幼体としての君の言葉なんて、聞きたくもない！」"
translation = "「여신의 유체로서의 네 말 따위 듣고 싶지도 않아!」"

[[dialogue]]
speaker = "クロト"
original = "「極星のみんなと１０年を共に過ごした、１人の天使として話をしろ！！」"
translation = "「극성학원 모두와 10년을 함께 보낸 한 명의 천사로서 이야기해!!」"

[[dialogue]]
speaker = "クロト"
original = "「極星のみんなと１０年を共に過ごした、１人の天使として話をしろ！！」"
translation = "「극성학원 모두와 10년을 함께 보낸 한 명의 천사로서 이야기해!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（……うるさい）"
translation = "(……시끄러워)"

[[dialogue]]
speaker = "クロト"
original = "「君と彼女たちの過去を聞いた……かけがえのない時間だったんじゃないのか！？」"
translation = "「너와 그녀들의 과거를 들었어…… 무엇과도 바꿀 수 없는 시간이었던 거 아니야!?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（……うるさい、うるさい）"
translation = "(……시끄러워, 시끄러워)"

[[dialogue]]
speaker = "クロト"
original = "「懐柔するために演技していた！？\u3000そんな言葉、誰も信じていない！！」"
translation = "「회유하기 위해 연기했다고!? 그런 말 아무도 믿지 않아!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（うるさいうるさいうるさい──）"
translation = "(시끄러워 시끄러워 시끄러워──)"

[[dialogue]]
speaker = "クロト"
original = "「みんな、君が好きなんだ！\u3000大切な君に世界を滅ぼして欲しくない、今までどおり一緒に過ごしたいって……！」"
translation = "「모두들 너를 좋아해! 소중한 네가 세계를 멸망시키지 않았으면 좋겠다고, 지금까지처럼 함께 지내고 싶다고……!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（──うるさい！！）"
translation = "(── 시끄러워!!)"

[[dialogue]]
speaker = "クロト"
original = "「リクリエなんて起こさなくたって、世界は前に進んでいる！」"
translation = "「리크리에 따위 일으키지 않아도 세계는 앞으로 나아가고 있어!」"

[[dialogue]]
speaker = "クロト"
original = "「これまでどおり一緒に過ごしたい──その言葉を彼女たちは待っているんだぞ！！」"
translation = "「지금까지처럼 함께 지내고 싶다── 그 말을 그녀들은 기다리고 있단 말이다!!」"

[[dialogue]]
speaker = "クロト"
original = "「今からでも間に合う──ルヴィネ！！！」"
translation = "「지금이라도 늦지 않았어── 루비네!!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "（──間に合う？）"
translation = "(── 늦지 않았다고?)"

[[dialogue]]
speaker = "ルヴィネ"
original = "（…………そんなわけ、ないじゃない）"
translation = "(………… 그럴 리 없잖아)"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ベアトたちを騙して、ここまでのことをして──何の成果も出せませんでした、では済まないのよ！！」"
translation = "「베아토 일행을 속이고 여기까지 일을 벌여놓고── 아무런 성과도 내지 못했습니다, 로는 끝나지 않는단 말이야!!」"

[[dialogue]]
speaker = "unk"
original = "厄災の右腕に命じる──手加減はいらない。"
translation = "재앙의 오른팔에게 명한다── 봐줄 필요는 없다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「その口を、閉じなさい──！！」"
translation = "「그 입을 다무세요──!!」"

[[dialogue]]
speaker = "unk"
original = "この諦めの悪い魔王を、今すぐ、私の眼の前から消す──！"
translation = "이 포기할 줄 모르는 마왕을 지금 당장 내 눈앞에서 지워버리겠어──!"

[[dialogue]]
speaker = "ベアトリス"
original = "「もうやめてっ、ルヴィ──！！！」"
translation = "「이제 그만해, 루비──!!!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「ベアトッ……！？」"
translation = "「베아토……!?」"

[[dialogue]]
speaker = "unk"
original = "魔王を庇うようにして、ベアトが割って入ってきた。"
translation = "마왕을 감싸듯 베아토가 끼어들었다."

[[dialogue]]
speaker = "unk"
original = "ディザスターハンドへの指示はすでに出している──止められない。"
translation = "디재스터 핸드에 대한 지시는 이미 내려졌다── 멈출 수 없다."

[[dialogue]]
speaker = "unk"
original = "私の命令で、絶命必至の一撃が飛んでいく。"
translation = "내 명령으로 절명할 수밖에 없는 일격이 날아간다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「──やっ、やめなさい！\u3000止まりなさい！！\u3000待って！\u3000お願い──！」"
translation = "「── 그, 그만두세요! 멈추세요!! 기다려! 부탁이야──!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──────やめて！！！！！」"
translation = "「────── 그만둬!!!!」"

[[dialogue]]
speaker = "unk"
original = "そうして厄災の右腕の攻撃は──実行された。"
translation = "그렇게 재앙의 오른팔의 공격은── 실행되었다."

