[[dialogue]]
speaker = "アルモタヘル"
original = "「ふむ、我はケバブの移動販売の補助か。任せろ」"
translation = "「흠, 나는 케밥 이동 판매 보조인가. 맡겨둬라」"

[[dialogue]]
speaker = "unk"
original = "アルモは大丈夫？"
translation = "아르모타헬은 괜찮아?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「不要な心配だ。我はいくつものケバブ店を食べ歩いてきたのだ。ケバブのことはよく知っている」"
translation = "「불필요한 걱정이다. 나는 수많은 케밥 집을 섭렵해 왔다. 케밥에 대해서는 잘 알고 있다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「確かにマグダレナは鈍いところがあるからな。お前に苦労をかけることもあっただろう。だが我は違う」"
translation = "「확실히 마그달레나는 둔한 구석이 있으니까 말이다. 네가 고생했을 수도 있겠지. 하지만 나는 다르다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「フ。初めて給金を得た暁には、我からお前たちに馳走してやる」"
translation = "「후. 처음으로 보수를 얻게 된 새벽에는 내가 너희에게 대접하마」"

[[dialogue]]
speaker = "unk"
original = "自信満々な態度が逆に不安になるところではあったが──"
translation = "자신만만한 태도가 오히려 불안해지는 대목이었으나 ──"

[[dialogue]]
speaker = "アルモタヘル"
original = "「チキンケバブひとつ、辛口ソースだな。代金は──頂戴した」"
translation = "「치킨 케밥 하나, 매운 소스군. 대금은 ── 잘 받았다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「マトンに中辛ソース、チーズトッピング……了解した。しばし待つが良い」"
translation = "「머튼에 중간 매운 소스, 치즈 토핑…… 알겠다. 잠시 기다려라」"

[[dialogue]]
speaker = "unk"
original = "（ちゃんとできてる……！）"
translation = " (제대로 하고 있어……!) "

[[dialogue]]
speaker = "アルモタヘル"
original = "「何を驚いている。言ったであろう、不要な心配だと」"
translation = "「무엇을 놀라나. 말하지 않았나, 불필요한 걱정이라고」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「我は悠久の時を生きる守護天使だ。このくらいのこと──」"
translation = "「나는 유구한 시간을 사는 수호천사다. 이 정도 일쯤이야 ──」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ぐっ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "大丈夫！？"
translation = "괜찮아!?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ああ……だい、じょうぶだ……身体機能に異常はない……」"
translation = "「아아…… 개, 괜찮다…… 신체 기능에 이상은 없다……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「だがケバブを見ていると腹が空く……。働く前に十分食べたと思っていたが……くぅ……」"
translation = "「하지만 케밥을 보고 있으니 배가 고프구나……. 일하기 전에 충분히 먹었다고 생각했는데…… 구우……」"

[[dialogue]]
speaker = "ケバブ屋"
original = "「人が落ち着いたら休憩するかい？\u3000賄いぐらい出すよ」"
translation = "「손님이 좀 줄어들면 휴식할래? 식사 정도는 제공할게」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「すまない……助かるぞ、店主」"
translation = "「미안하다…… 도움이 되는군, 주인장」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「だが列はいつになったらなくなるのだ？」"
translation = "「그런데 이 줄은 언제쯤 없어지는 것이냐?」"

[[dialogue]]
speaker = "unk"
original = "ケバブの屋台に並んでいる人を見ると、十人や二十人どころではない、長蛇の列ができていた。"
translation = "케밥 포장마차에 늘어선 사람들을 보니 10명이나 20명 정도가 아닌 장사가 길게 늘어서 있었다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「我とてケバブ屋でこのような行列は見たことがない。何が起きているのだ？」"
translation = "「나조차도 케밥 집에서 이런 행렬은 본 적이 없다. 대체 무슨 일이 일어난 거지?」"

[[dialogue]]
speaker = "ケバブ屋"
original = "「何でも人気アニメでケバブが登場したらしくてね。アキバフェスタってことで、それを再現したコラボメニューを出してるんだよ」"
translation = "「듣자 하니 인기 애니메이션에서 케밥이 등장했다나 봐. 아키바 페스타를 맞이해서 그걸 재현한 콜라보 메뉴를 내놓고 있거든」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「何……！？\u3000やたら数が出る品があると思ったらそのせいか！？」"
translation = "「뭐……!? 유독 많이 나가는 메뉴가 있다 했더니 그 때문인가!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「すみません、ビーフケバブ、スペシャルチリソースひとつください」"
translation = "「실례합니다, 비프 케밥, 스페셜 칠리소스 하나 주세요」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「う、うむ……ひとつだな。了解した」"
translation = "「우, 음…… 하나군. 알겠다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "（これが店主の言っていたコラボメニューだな。旨味を凝縮した牛肉、香辛料をふんだんに使ったソース……美味に違いない……）"
translation = " (이것이 주인장이 말하던 콜라보 메뉴군. 감칠맛을 응축한 쇠고기, 향신료를 듬뿍 사용한 소스…… 맛있음이 분명하다……) "

[[dialogue]]
speaker = "アルモタヘル"
original = "「商品だ。受け取れ」"
translation = "「상품이다. 받아라」"

[[dialogue]]
speaker = "ナミエル"
original = "「ありがとうございます。では写真を──」"
translation = "「감사합니다. 그럼 사진을 ──」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「むむむむ…………」"
translation = "「으으으음…………」"

[[dialogue]]
speaker = "ナミエル"
original = "「なんだかすごく見られているような……」"
translation = "「왠지 굉장히 쳐다보시는 듯한……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……じゅるり」"
translation = "「……꿀꺽」"

[[dialogue]]
speaker = "unk"
original = "早く食べた方がいい！"
translation = "빨리 먹는 게 좋겠어!"

[[dialogue]]
speaker = "ナミエル"
original = "「そ、そのようですね。いただきます」"
translation = "「그, 그런 것 같네요. 잘 먹겠습니다」"

[[dialogue]]
speaker = "ナミエル"
original = "「──！\u3000ケバブは初めて食しましたが、お肉と野菜と、そしてソースがマッチして……これは美味しいです」"
translation = "「──! 케밥은 처음 먹어보지만, 고기와 채소, 그리고 소스가 어우러져서…… 이거 맛있네요.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ぐぬぬ……ぐぬぬぬぬ……！」"
translation = "「그누누…… 그누누누누……!」"

[[dialogue]]
speaker = "unk"
original = "先に休憩入る？"
translation = "먼저 휴식할래?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「いや大丈夫だ……我はまだやれる……！\u3000次の客よ、注文を告げるがいい」"
translation = "「아니, 괜찮다…… 와가는 아직 할 수 있다……! 다음 손님이여, 주문을 고하도록 해라.」"

[[dialogue]]
speaker = "マリーベル"
original = "「ビーフ、チキン、マトン、ひとつずつ。全てスペシャルチリソースで。ドネルケバブも立派な串料理。研究は怠らないわ」"
translation = "「비프, 치킨, 마톤, 하나씩. 전부 스페셜 칠리소스 버전으로. 도네르 케밥도 훌륭한 꼬치 요리. 연구를 게을리하지 않겠어.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「うむ、ミックスケバブ肉３０倍盛だな！」"
translation = "「음, 믹스 케밥 고기 30배 담기 말이군!」"

[[dialogue]]
speaker = "ケバブ屋"
original = "「うちにそんなメニューないよ！？」"
translation = "「우리 가게에 그런 메뉴 없어!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「空腹のあまり混乱しておられるようですね……」"
translation = "「공복인 나머지 혼란스러워하시는 모양이네요……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「すまぬ。かくなるうえは──来い！\u3000メジェドたち！」"
translation = "「미안하군. 이렇게 된 이상── 오너라! 메제드들!」"

[[dialogue]]
speaker = "メジェド"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "ナミエル"
original = "「何か出てきました！？」"
translation = "「뭔가가 나왔어요!?」"

[[dialogue]]
speaker = "マリーベル"
original = "「モンスター？\u3000なら全部串刺しにするけど」"
translation = "「몬스터? 그럼 전부 꼬챙이로 만들어 버리겠지만.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「いいや、心配には及ばん。これらは我が眷属、人に危害を及ぼすことはない」"
translation = "「아니, 걱정할 것 없다. 이것들은 와가의 권속, 사람에게 위해를 가하는 일은 없다.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「情けないが、少しの間我の代わりに働いてもらおう。これも一応我の力だ」"
translation = "「한심스럽지만, 잠시 동안 와가 대신 일하게 하도록 하지. 이것도 일단 와가의 힘이다.」"

[[dialogue]]
speaker = "メジェド"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker = "ナミエル"
original = "「何も反応がありませんが……」"
translation = "「아무런 반응이 없는데요……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「しまった。メジェドたちは話すことができぬ。つまり接客は不可能だ。しかももうひとつ問題があってだな……」"
translation = "「이런. 메제드들은 말을 할 수 없다. 즉 접객은 불가능하다. 게다가 문제가 하나 더 있는데 말이지……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「メジェドを出すと猛烈に腹が減るのだ」"
translation = "「메제드를 소환하면 맹렬하게 배가 고파진다.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「──バタッ」"
translation = "「──털썩.」"

[[dialogue]]
speaker = "unk"
original = "アルモーーーっ！？"
translation = "알모오오오!? 코"

