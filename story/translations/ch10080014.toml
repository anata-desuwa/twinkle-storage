[[dialogue]]
speaker = "unk"
original = "第４話,膝の上のアナ,P"
translation = "제4화, 무릎 위의 아나, P"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「行く。バーミリオンイータ……！」"
translation = "「간다. 버밀리언 이터……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら。今日のアナちゃんは絶好調ね～♪」"
translation = "「어머어머. 오늘 아나짱은 컨디션 최고네~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さすがね、アナ！\u3000私の記録が抜かされるかと思って冷や冷やしたわ！」"
translation = "「역시 아나야! 내 기록이 추월당할까 봐 조마조마했다니까!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「言い過ぎですし、まったく追い付いてません。それに、最近私たちが４人で作った９秒９８の記録を塗り替えたじゃないですか。８秒８６は異常です。無理」"
translation = "「과찬이시고, 전혀 따라잡지 못했어요. 게다가 최근에 저희 넷이서 세운 9초 98의 기록을 갈아치우셨잖아요. 8초 86은 이상해요. 무리」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、８秒台を出したの……？\u3000同じ世界の話とは思えなくなってきた……」"
translation = "「8, 8초대를 냈다고……? 같은 세상 이야기라고는 생각되지 않기 시작했어……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だって悔しかったんだもん。いくら４人がかりだったとしても、Ｓランクの記録が塗り替えられたままは嫌だわ」"
translation = "「그치만 분했는걸. 아무리 4명이서 덤볐다 해도, S랭크 기록이 갈아치워진 채로 있는 건 싫어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もう一生塗り替えられることはないかもしれません」"
translation = "「이제 평생 갱신되지 않을지도 모릅니다.」"

[[dialogue]]
speaker = "unk"
original = "みんな、そろそろ終わりにして仕事に戻ろう"
translation = "다들, 슬슬 마무리하고 업무로 돌아가자"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「じゃあ私はこのままパトロールに行ってくるわ。今日は駅のほうまで出てみようかしら」"
translation = "「그럼 난 이대로 순찰하러 다녀올게. 오늘은 역 쪽까지 나가 볼까나.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「待ってください前会長。今日は会長が買ってきてくれた和菓子があります。一緒にどうですか？」"
translation = "「기다려 주세요, 전 회장님. 오늘은 회장님이 사 오신 화과자가 있습니다. 같이 어떠신가요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それはぜひご相伴にあずかりたいわね！\u3000わかったわ、パトロールはおやつを食べた後にしましょう！」"
translation = "「그건 꼭 대접받고 싶네! 알았어, 순찰은 간식을 먹은 뒤에 하자!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ついでだから、あの人からもらった和菓子もお屋敷から取ってくる！\u3000みんなは先に戻ってて！」"
translation = "「이왕 하는 김에, 그 사람한테 받은 화과자도 저택에서 가져올게! 다들 먼저 돌아가 있어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……文字通り、棚から牡丹餅」"
translation = "「……말 그대로, 굴러 들어온 복떡.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うまいわね～、座布団一枚♪」"
translation = "「잘하네~, 방석 한 장♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はむっ……もぐもぐ……会長のお菓子、これは最近東京駅に移店してきたという和菓子屋さんのものですよね」"
translation = "「함냐…… 우물우물…… 회장님의 과자, 이건 최근 도쿄역으로 이전해 왔다는 화과자점 물건이죠.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よく買えたね。できたばっかりで凄い行列だって聞いたけど」"
translation = "「잘 샀네. 막 오픈해서 줄이 엄청 길다고 들었는데.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さすが、前会長の意思を継ぐ者……会長もなかなかやります」"
translation = "「역시, 전 회장님의 의지를 잇는 자…… 회장님도 꽤 하시네요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも……アナはそんなにお菓子ばっかり食べて、その……太ったりしないの？」"
translation = "「그치만…… 아나는 그렇게 과자만 먹고, 그…… 살찌거나 하진 않아?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しません。……しない、はずです」"
translation = "「안 쪄요. ……안 찔, 겁니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「１日の摂取カロリー計算は完璧に行っています。そうですよね、会長？」"
translation = "「하루 섭취 칼로리 계산은 완벽하게 하고 있습니다. 그렇죠, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "むしろ、もっと食べたほうがいい"
translation = "오히려, 좀 더 먹는 게 좋아"

[[dialogue]]
speaker = "unk"
original = "アナは軽いよ。"
translation = "아나는 가벼워."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そういうことです。和菓子を食べすぎて和菓子が食べられなくなるなんて、和菓子道を征くものとしてあるまじきこと」"
translation = "「그런 겁니다. 화과자를 너무 많이 먹어서 화과자를 못 먹게 된다니, 화과자도를 걷는 자로서 있을 수 없는 일.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……で、どうしてアナはクロトの膝の上に座ってるのかしら？」"
translation = "「……그런데, 어째서 아나는 쿠로토의 무릎 위에 앉아 있는 걸까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………？」"
translation = "「…………?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「随分と会長くんに心を許したのね～。お膝の上でお菓子食べちゃって。……アナちゃんを乗せるのは、お姉ちゃんである私の役目だったはずなのに～」"
translation = "「꽤나 회장군에게 마음을 열었네~. 무릎 위에서 과자까지 먹고. ……아나짱을 태우는 건, 언니인 내 역할이었을 텐데~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん、んぐっ！\u3000ご、ごほっごほっ……べ、別に心を許したとかではありません。効率的な休憩を突き詰めていった結果です」"
translation = "「꿀, 꺽! 고, 고혹 고혹…… 벼, 별로 마음을 열었다거나 하는 게 아닙니다. 효율적인 휴식을 추구한 결과입니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ごくり……もしかして、これが『ツンデレ』ってやつ……？」"
translation = "「꿀꺽…… 혹시, 이게 『츤데레』라는 건가……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いえ、クーデレというやつです」"
translation = "「아니요, 쿨데레라는 겁니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「デレは否定しないのね～♪\u3000かわいい～♪」"
translation = "「데레는 부정 안 하네~♪ 귀여워~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……指摘されると少し恥ずかしくなってきました。降ります」"
translation = "「……지적당하니 조금 부끄러워졌습니다. 내려갈게요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんだかちょっとモヤモヤするわね。私もクロトの膝に座らせてもらおうかしら……？」"
translation = "「왠지 좀 답답한 기분이네. 나도 쿠로토의 무릎에 앉아 볼까……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃん。お姉ちゃんの膝の上が空いてるわよ～♪」"
translation = "「비너스짱. 언니 무릎 위가 비어 있단다~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさん……！」"
translation = "「사샤 씨……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え、えっと……この場合、私はどうすれば……？」"
translation = "「에, 에또…… 이 경우, 나는 어떻게 하면……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイは私の膝の上よ！\u3000合体しましょう！」"
translation = "「마토이는 내 무릎 위야! 합체하자!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「その発想はなかった！」"
translation = "「그 발상은 못 했어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しょうがない。私も合体します。しゅわっち」"
translation = "「어쩔 수 없네요. 저도 합체할게요. 슈왓치」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「さ、さすがに重いわ～～～っ！」"
translation = "「과, 과연 무거워~~~!」"

[[dialogue]]
speaker = "unk"
original = "アナ、俺の膝の上も空いてるよ"
translation = "아나, 내 무릎 위도 비어 있어"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「寂しいのなら座ってあげます。よいしょっと」"
translation = "「외로우시다면 앉아 드릴게요. 영차」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長の膝の上は、私のものです。今期のベストプレイス賞受賞」"
translation = "「회장님의 무릎 위는 제 것입니다. 이번 분기 베스트 플레이스상 수상」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「和菓子の食べ心地も、お昼寝の寝心地も最高。私がつい座ってしまうのもしょうがない」"
translation = "「화과자의 맛도, 낮잠의 잠자리도 최고. 제가 그만 앉아 버리는 것도 어쩔 수 없네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……どうして笑ってるんですか、会長？」"
translation = "「……어째서 웃고 있는 건가요, 회장?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さては、私が戻ってきて嬉しくなったとか？\u3000まあ、冗談ですが……」"
translation = "「설마, 제가 돌아와서 기뻐졌다든가? 뭐, 농담입니다만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「え、本当に……？\u3000ふ、ふーん……」"
translation = "「에, 정말로……? 흐, 흐응……」"

[[dialogue]]
speaker = "unk"
original = "俺がからかうと、ぷいっと顔を背けてしまうアナだったが──"
translation = "내가 놀리자, 홱 하고 고개를 돌려버리는 아나였지만──"

[[dialogue]]
speaker = "unk"
original = "その耳は赤くなっていて、そんなアナはやっぱり可愛いと思ってしまうのだった。"
translation = "그 귀는 빨갛게 달아올라 있어서, 그런 아나는 역시 귀엽다고 생각하게 되는 것이었다."

