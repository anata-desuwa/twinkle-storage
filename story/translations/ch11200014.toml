[[dialogue]]
speaker = "unk"
original = "第４話,４０％は多すぎです,P"
translation = "제4화, 40%는 너무 많아요, P"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「必要な署名は以上です。すみません、急な対応をお願いしてしまって」"
translation = "「필요한 서명은 이상입니다. 죄송해요, 갑작스러운 대응을 부탁드려서.」"

[[dialogue]]
speaker = "unk"
original = "こちらで提出した書類に不備があったようで、わざわざ星徒会室まで来てくれた。"
translation = "이쪽에서 제출한 서류에 미비한 점이 있었는지, 일부러 성도회실까지 와주었다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「今日は会長さんお１人ですか？」"
translation = "「오늘은 회장님 혼자신가요?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「そうですか、みんなお忙しいのですね。なら、あまり長居するのもご迷惑でしょうか……」"
translation = "「그렇군요, 다들 바쁘시나 보네요. 그럼 너무 오래 머무는 것도 실례일까요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「…………あの、ええと、先日はすみませんでした。偉そうにいろいろ語ってしまって」"
translation = "「…………저기, 에구, 요전번에는 죄송했어요. 잘난 듯이 이런저런 이야기를 늘어놓아서.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「お詫びにというわけではありませんが、こちらをどうぞ」"
translation = "「사과의 의미라고 하긴 뭐하지만, 이걸 드세요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「……紅茶、です。気に入ってる銘柄で……そのー……完全栄養食にとても合うお茶なんです」"
translation = "「……홍차예요. 제가 좋아하는 브랜드인데…… 그게…… 완전 영양식에 아주 잘 어울리는 차거든요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「つまりだいたいのお菓子には合うだろうと、思っているわけです。すみません、年長者なのにこういうのに疎くって」"
translation = "「즉 웬만한 과자에는 다 잘 어울릴 거라고 생각하고 있는 셈이죠. 죄송해요, 연장자인데도 이런 쪽에는 문외한이라.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「でも、よろしければ……会長さんに味わっていただきたいです……」"
translation = "「하지만 괜찮으시다면…… 회장님이 맛봐주셨으면 해요……」"

[[dialogue]]
speaker = "unk"
original = "今すぐ淹れてきますね"
translation = "지금 바로 내어올게요."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「はい……よろしくお願い、します」"
translation = "「네…… 잘 부탁, 드려요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "（……あれ？\u3000どうして私はここで座って待っているんでしょうか？）"
translation = "(……어라? 왜 나는 여기서 앉아서 기다리고 있는 걸까?)"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "（カップが２客、明らかに２人分用意してますよね、あれ……一緒にいただこう、なんてつもりはなかったのに）"
translation = "(찻잔이 두 잔, 분명히 2인분을 준비하고 계시네, 저거…… 같이 마실 생각까지는 없었는데.)"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "（いい香りがしてきました……。会長さんは料理も上手と聞きますし、きっと紅茶もおいしく淹れてくれるんでしょうね）"
translation = "(좋은 향기가 나기 시작했어……. 회장님은 요리도 잘하신다고 들었고, 분명 홍차도 맛있게 우려주시겠지.)"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "（……確かに、好感が持てる人だと思います。皆から慕われるのも納得ですね）"
translation = "(……확실히, 호감이 가는 사람이라고 생각해. 모두에게 경외받는 것도 납득이 가네.)"

[[dialogue]]
speaker = "unk"
original = "お待たせしました"
translation = "오래 기다리셨습니다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「あ、ありがとうございます。私の分まで用意してくれなくてもよかったのに」"
translation = "「아, 감사합니다. 제 몫까지 준비해 주지 않으셔도 괜찮았는데.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「しかも、こんな立派なお茶菓子まで出してくれて……え？\u3000手作り？\u3000本当ですか？」"
translation = "「게다가 이렇게 훌륭한 다과까지 내어주시고…… 에? 수제? 정말인가요?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「さすがですね……完全栄養食でお腹を満たしている自分が少し恥ずかしくなってきました」"
translation = "「역시 대단하시네요…… 완전 영양식으로 배를 채우고 있는 제 자신이 조금 부끄러워지네요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私も一応、年頃の女の子ですから、それらしいこともしたいとは思ってるんですが……あまり頑張れていなくて」"
translation = "「저도 일단은 꽃다운 여자아이니까, 그럴듯한 일도 해보고 싶다고는 생각합니다만…… 별로 노력하지 못해서.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「学園長として表では気を張っていますけど、裏では結構ズボラだったりするんです。生活能力という点では会長さんには遠く及びませんね……」"
translation = "「학원장으로서 겉으로는 긴장하고 있지만, 속으로는 꽤 게으르기도 하거든요. 생활 능력이라는 점에서는 회장님께 한참 못 미치네요……」"

[[dialogue]]
speaker = "unk"
original = "優先順位の問題です"
translation = "우선순위의 문제입니다."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「……そう言ってもらえると救われます。確かに、私の中の優先順位では、女の子らしいことは低いと思います」"
translation = "「……그렇게 말씀해 주시니 위로가 되네요. 확실히 제 안의 우선순위에서 여자아이다운 일은 낮다고 생각해요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「それでも……ちゃんと見て欲しいな、って思う時だってあるんですよ。わずかに残っている女心、でしょうかね……」"
translation = "「그래도…… 제대로 봐줬으면 좋겠다, 라고 생각할 때도 있거든요. 미세하게 남아있는 여고생 같은 마음이랄까요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんは……えっと、その……」"
translation = "「회장님은…… 저기, 그……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私のこと、どんな風に……見えてますか？」"
translation = "「저를 어떤 식으로…… 보고 계시나요?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「っ……！！\u3000あ、い、いえっ、何でもありません！」"
translation = "「앗……!! 아, 이, 아니요! 아무것도 아니에요!」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんが淹れてくれた紅茶の香りが素敵すぎて……つい変なことを考えてしまいました」"
translation = "「회장님이 우려주신 홍차 향기가 너무 좋아서…… 그만 이상한 생각을 해버렸어요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんはほんと聞き上手ですよね。普段は絶対言わないようなことまで、私に言わせてしまうんですから」"
translation = "「회장님은 정말 남의 말을 잘 들어주시는 것 같아요. 평소라면 절대 말하지 않을 것까지 제가 말하게 만드니까요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「女の子……の自分とか……あんまり意識しないのに……おかしいですね」"
translation = "「여자아이로서의…… 제 모습이라든가…… 별로 의식하지 않는데…… 이상하네요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「っと、せっかくの紅茶が冷めてしまいますね。いただきましょう」"
translation = "「앗, 모처럼의 홍차가 식어버리겠네요. 마셔볼까요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ふーっ、ふーっ……ずずっ」"
translation = "「후─, 후─…… 홀짝.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「お砂糖入れてないのに、甘く感じます……なんでだろ、やさしい……」"
translation = "「설탕을 넣지 않았는데도 달게 느껴져요…… 왜일까, 상냥해……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「お、お菓子もいただきますねっ。はむっ」"
translation = "「과, 과자도 먹어볼게요. 냠.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「んむっ！？\u3000けほっ、けほっ」"
translation = "「음훅!? 쿨럭, 쿨럭.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「す、すみません、むせちゃいました……」"
translation = "「죄, 죄송해요, 사레들려버렸어요……」"

[[dialogue]]
speaker = "unk"
original = "落ち着いて、ゆっくり食べて"
translation = "진정하고 천천히 먹어."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんも忙しいのに、あまりのんびりしたら申し訳ないです」"
translation = "「회장님도 바쁘신데, 너무 여유 부리면 죄송하니까요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ですけど……せっかくの紅茶とお菓子、おいしいですから……慌てて食べちゃうのは勿体ないかもです」"
translation = "「하지만…… 공들인 홍차와 과자가 맛있으니까…… 급하게 먹어치우는 건 아까울지도 몰라요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「急がない程度に、きちんと味わっていただきますね」"
translation = "「서두르지 않을 정도로, 제대로 맛보며 먹을게요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ん…………おいし。あったまります」"
translation = "「음………… 맛있어. 몸이 따뜻해지네요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「いいですね、星徒会の人はいつもこれが味わえるんですから」"
translation = "「좋네요, 성도회 분들은 항상 이걸 맛볼 수 있는 거니까.」"

[[dialogue]]
speaker = "unk"
original = "心を込めておもてなししますよ"
translation = "정성을 다해 대접해 드릴게요."

[[dialogue]]
speaker = "unk"
original = "いつでも来て下さい"
translation = "언제든 오세요."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「そ、それは贅沢すぎる話です。一方的にもらうわけにはいきません」"
translation = "「그, 그건 너무 과분한 이야기예요. 일방적으로 받기만 할 수는 없죠.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「なので……えっと……わ、私でよければ、なんですけど……」"
translation = "「그러니까…… 저기…… 저, 저라도 괜찮으시다면 말인데요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんの……は、話し相手に、立候補してもいいですか？」"
translation = "「회장님의…… 대, 대화 상대로 입후보해도 될까요?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「これでも女子ですし、将来彼女さんができた時の練習に……なる、と思いますよ？」"
translation = "「이래 봬도 여자고, 나중에 여자친구가 생겼을 때의 연습이…… 될 거라고 생각해요?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私にとっても、練習になりますし。つまりはウィンウィンです」"
translation = "「제게 있어서도 연습이 되고요. 즉, 윈윈이에요.」"

[[dialogue]]
speaker = "unk"
original = "練習じゃなくなっちゃうかも？"
translation = "연습이 아니게 될지도 모르는데요?"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「そそ、それはっ……ええと……会長さん的にいいんですか？」"
translation = "「그그, 그건…… 저기…… 회장님 쪽에서 괜찮으신 건가요?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「私としては……そういうのに憧れがないと言えば嘘になりますし、会長さんのことも、その、興味が出てきましたし……」"
translation = "「저로서는…… 그런 거에 동경이 없다면 거짓말이고, 회장님에 대해서도, 그, 흥미가 생기기 시작했으니까요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「１日のうち……いくらかは、会長さんのことを考えている時間が……あったりするかも……です」"
translation = "「하루 중에…… 어느 정도는 회장님을 생각하는 시간이…… 있을지도…… 몰라요.」"

[[dialogue]]
speaker = "unk"
original = "俺はだいたい４０％くらい"
translation = "나는 대략 40% 정도."

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「そんなに！？\u3000４０％は多すぎです。そんなに思われてるなんて……その……恥ずかしいじゃないですか」"
translation = "「그렇게나!? 40%는 너무 많아요. 그렇게 생각해주고 계시다니…… 그게…… 부끄럽잖아요.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「寝ている時間を除いたら半分以上はずっと考えっぱなしですよ。それってつまり……」"
translation = "「자는 시간을 제외하면 절반 이상은 계속 생각하고 있는 거잖아요. 그건 즉……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「か、彼女、とか……そういう相手にすることじゃないですか……」"
translation = "「여, 여자친구라든가…… 그런 상대에게나 하는 거 아닌가요……?」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ずるいですよ……そんなの聞かされちゃったら、私だって……会長さんのことを考える時間、もっと増やさないと申し訳ないなって思いますし……」"
translation = "「치사해요…… 그런 말을 들어버리면 저도…… 회장님을 생각하는 시간, 더 늘리지 않으면 미안할 것 같다고 생각하게 되잖아요……」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「３０％……では、どうですか？\u3000４０％は無理です。そこまでは、ちょっと」"
translation = "「30%……로 어떻게 안 될까요? 40%는 무리예요. 그 정도까지는 좀.」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「会長さんよりちょっと少ない程度で……許して下さい。お願いです」"
translation = "「회장님보다 조금 적은 정도로…… 봐주세요. 부탁이에요.」"

