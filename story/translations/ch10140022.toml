[[dialogue]]
speaker = "unk"
original = "第２話,恋愛相談,P"
translation = "제2화, 연애상담, P"

[[dialogue]]
speaker = "unk"
original = "街の喫茶店の窓際の席に腰かけたわたしとマリオン。"
translation = "거리의 카페 창가 자리에 앉은 나와 마리온."

[[dialogue]]
speaker = "unk"
original = "わたしは他に相談できる相手も思いつかず、同級生のマリオンを呼び出して、話を聞いてもらっていたのだった。"
translation = "나는 달리 상담할 상대도 떠오르지 않아, 동급생인 마리온을 불러내 이야기를 듣고 있었다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「というのが、今日あった出来事のあらましです……」"
translation = "「라는 것이 오늘 있었던 일의 개요입니다……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あらあら、トワ。あなた、思っていたよりも魔性の女ですね？」"
translation = "「어머 어머, 토와. 당신, 생각했던 것보다 마성의 여자네요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そんなんじゃないよ……！」"
translation = "「그런 거 아니야……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そんなんじゃなくてぇ……うぅぅぅ、わたし、本当にどうしよう……」"
translation = "「그런 게 아니라아…… 우우우, 나 정말 어쩌지……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「改めて、話を整理いたしましょうか」"
translation = "「다시 한번 이야기를 정리해 볼까요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「トワはついうっかり、教え子の男の子のことを先日好きになってしまった」"
translation = "「토와는 무심코 제자인 소년을 요전에 좋아하게 되어버렸다」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぐぅ……っ」"
translation = "「우구우……윽」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そしてなんと、その想い人の方も、同じくトワのことを好きになっていた、と」"
translation = "「그리고 무려, 그 짝사랑 상대도 똑같이 토와를 좋아하고 있었다, 라고」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「素晴らしいハッピーエンドじゃありませんか♪\u3000いったい何を悩んでいるのですか？」"
translation = "「멋진 해피엔딩 아니에요♪ 대체 뭘 고민하고 있는 건가요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そんなの一目瞭然でしょ！\u3000わたしと会長くんは、先生と生徒なんだよ……！」"
translation = "「그건 일목요연하잖아! 나와 회장군은 선생님과 학생이라고……!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「まあまあ、うふふ♪\u3000普段からトワはお可愛らしいですが、今日は一段と輝いていますよ<emoji=heart04>」"
translation = "「자자, 우후후♪ 평소에도 토와는 귀엽지만 오늘은 한층 더 빛나고 있네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「とはいえ、今のあなたはあまり余裕がないみたいですから、あまりからかいすぎるのもよくありませんね」"
translation = "「그렇다고는 해도, 지금의 당신은 별로 여유가 없는 것 같으니 너무 놀리는 것도 좋지 않겠네요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「改めて確認なのですが、問題点は先生と生徒という関係性であり、そうでなければ何も問題はない、ということでしょうか？」"
translation = "「다시 한번 확인하는 것입니다만, 문제점은 선생과 학생이라는 관계성이고, 그렇지 않다면 아무런 문제가 없다, 라는 말씀이신가요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぅぅぅ～～～。いじわるな質問だよ、それは……」"
translation = "「으으으으～～～. 짓궂은 질문이야, 그건……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ちなみに知っていましたか、トワ。流星市国には教師と生徒の恋愛を禁止する法律はありません♪」"
translation = "「참고로 알고 계셨나요, 토와. 유성시국에는 교사와 학생의 연애를 금지하는 법률은 없답니다♪」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そんなのもちろん知って……って、ええぇぇえぇぇっ！？」"
translation = "「그런 거 당연히 알고…… 어, 에에에에에엑!?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「もちろん、流星学園や新星学園の雇用契約にも、その手の禁止事項はありません」"
translation = "「물론, 유성 학원이나 신성 학원의 고용 계약에도, 그런 종류의 금지 사항은 없습니다」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でもでもでも！\u3000昔から教師と生徒の恋愛は禁断の恋って、相場が決まってるじゃん！？」"
translation = "「그치만 그치만 그치만! 예전부터 교사와 학생의 연애는 금단(禁斷)의 사랑이라고, 정해져 있잖아!?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「はい。そういう時代、そういう倫理観が当たり前だった時期が長いのは、事実のようです」"
translation = "「네. 그런 시대, 그런 윤리관이 당연했던 시기가 길었던 것은, 사실인 듯합니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ただ、リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が近づいてきていると予測されている昨今、星騎士とそのサポートをする教員が恋仲になることは、決して悪いことではないと、考えが改められたようです」"
translation = "「다만, 리크리에의 본파가 다가오고 있다고 예측되는 요즈음, 성기사와 그 서포트를 하는 교원이 연인 사이가 되는 것은, 결코 나쁜 일이 아니라고, 생각이 바뀐 듯합니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「恋人や妻のいる世界を守る、そうした星騎士が十二分に力を発揮できるようサポートする……」"
translation = "「연인이나 아내가 있는 세계를 지킨다, 그러한 성기사가 충분히 힘을 발휘할 수 있도록 서포트한다……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「そういった具体的で確固たる目的やモチベーションがある方が、世界を守る戦士として心強い、という見方があるようです」"
translation = "「그러한 구체적이고 확고한 목적이나 동기 부여가 있는 편이, 세계를 지키는 전사로서 든든하다는 견해가 있는 모양이에요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ちなみに、この見解は教皇庁の立法機関が出している、公式な見解ですよ？\u3000びっくりしましたか？\u3000うふふっ<emoji=heart04>」"
translation = "「참고로, 이 견해는 교황청의 입법 기관이 내놓은, 공식적인 견해랍니다? 깜짝 놀라셨나요? 우후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ど、どうしてマリオンは、その法律にそんなに詳しいの……？」"
translation = "「어, 어째서 마리온은, 그 법률에 그렇게 자세한 거야……?」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「一時期、教員になるのも悪くないかと思って、ちょっとだけ調べものをしていたんです<emoji=heart04>」"
translation = "「한때, 교원이 되는 것도 나쁘지 않겠다고 생각해서, 아주 조금 조사를 했었거든요<emoji=heart04>」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「せっかく可愛い年下の子たちを沢山愛でられる立場になっても、すぐに職を追われるようなことになっては、つまらないじゃありませんか」"
translation = "「모처럼 귀여운 연하 아이들을 잔뜩 사랑해 줄 수 있는 입장이 되어도, 금방 직장에서 쫓겨나게 된다면, 재미없지 않겠습니까」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「アウトーーー！？」"
translation = "「아웃ーーー!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「生徒にちょっかいをかける気満々で教師になる奴がいますかぁ！」"
translation = "「학생에게 수작을 부릴 생각 가득하게 교사가 되는 녀석이 어디 있어!」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「はい。なのでやめておきました♪\u3000それに<ruby>私<rt>わたくし</rt></ruby>は、教えるよりもお世話をする方が好きなのだと、気付きましたので」"
translation = "「네. 그래서 그만두었습니다♪ 게다가 저는, 가르치는 것보다 보살펴 주는 쪽을 더 좋아한다는 걸, 깨달았으니까요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「ですがトワ、これであなたも、<ruby>私<rt>わたくし</rt></ruby>と同じ穴のムジナですね<emoji=heart04>」"
translation = "「하지만 토와, 이걸로 당신도, 저와 같은 구멍의 오소리(초록은 동색)네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うぐぐぐぐぐぐ……」"
translation = "「으구구구구구구……」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「あらあら、まあまあ♪\u3000あまりお可愛らしい顔をすると、会長様の前に<ruby>私<rt>わたくし</rt></ruby>がつまみ食いをしてしまいますよ？」"
translation = "「어머 어머, 세상에나♪ 너무 귀여운 표정을 지으시면, 회장님보다 먼저 저가 가로채 먹어버릴지도 모른다구요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「今、わたしに触ったら、本気で噛みつくからね！？」"
translation = "「지금, 나한테 손대면, 진심으로 깨물어 버릴 거니까!?」"

[[dialogue]]
speaker = "unk"
original = "わたしはこれまでちょっかいをかけられたことがなかったが、マリオンは手癖が悪いうえに恋愛対象が女の子なので、今かなりぞくっと寒気がした。"
translation = "나는 지금까지 수작을 걸린 적이 없었지만, 마리온은 손버릇이 나쁜 데다 연애 대상이 여자아이라서, 지금 꽤나 오싹하고 한기가 돌았다."

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「結構本気だったことがバレてしまいましたか。やはりあなたは<ruby>私<rt>わたくし</rt></ruby>の友人です」"
translation = "「제법 진심이었다는 걸 들켜버렸나요. 역시 당신은 저의 친구예요」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「うふふっ<emoji=heart04>\u3000話が脱線してしまいましたが、とにかく教師と生徒が禁断の恋だったのはすでに昔のお話」"
translation = "「우후훗<emoji=heart04> 이야기가 옆길로 샜습니다만, 어쨌든 교사와 학생이 금단의 사랑이었던 건 이미 옛날이야기」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「これからはあなたがより星騎士のために働き、会長様はあなたを守るためにより精一杯世界を守る、そのようにあることが、国からも学園からも望まれていることなんです」"
translation = "「이제부터는 당신이 더욱 성기사를 위해 일하고, 회장님은 당신을 지키기 위해 더욱 온 힘을 다해 세계를 지킨다, 그렇게 있는 것이, 국가에서도 학원에서도 바라는 일인 것입니다」"

[[dialogue]]
speaker_original = "マリオン"
speaker_translation = "마리온"
original = "「であればこそ、あとはあなたの気持ち次第、ということです<emoji=heart04>」"
translation = "「그렇기에, 남은 건 당신의 마음먹기 나름, 이라는 것이죠<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ、来てくれたんだ、会長くん。空き教室に呼びつけちゃったりして、ごめんね」"
translation = "「앗, 와 주었구나, 회장 군. 빈 교실로 불러내거나 해서, 미안해」"

[[dialogue]]
speaker = "unk"
original = "こっちこそ、昨日は突然ごめんなさい"
translation = "나야말로, 어제는 갑자기 미안해요"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ううん、違うの。あれはわたしに、覚悟が足りてなかったから……」"
translation = "「으응, 아니야. 그건 나에게, 각오가 부족했으니까……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「年下のキミにばっかり、勇気を出させちゃって、本当にごめんね」"
translation = "「연하인 너에게만, 용기를 내게 해서, 정말 미안해」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたしも一晩、真剣に考えてきたの……だから改めて、返事をさせてほしいな」"
translation = "「나도 하룻밤, 진지하게 생각해 왔어…… 그러니까 다시 한번, 대답을 하게 해 줘」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたしもね……キミのことが、好きですっ」"
translation = "「나도 말이야…… 너를, 좋아해!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ちょっと前に、ね？\u3000『リクリエは俺が止めます』って言ってくれたでしょう？\u3000『……そうしたら、先生は安心してくれますか？』って」"
translation = "「조금 전에, 응? 『리크리에는 제가 막겠습니다』라고 말해 줬었지? 『……그러면, 선생님은 안심해 주실 건가요?』라고」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あれを言ってもらえた時、すごく嬉しくて、かっこよくて、女の子として、キミのことがどうしようもなく、好きになっちゃってた」"
translation = "「그 말을 들었을 때, 너무 기쁘고, 멋있어서, 여자애로서, 네가 어쩔 수 없이, 좋아져 버렸어」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「だから……わたしの方から、改めて言うね」"
translation = "「그러니까…… 내가 다시 한번, 말할게」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「好きです、会長くん。わたしの……恋人になってくださいっ」"
translation = "「좋아해, 회장 군. 나의…… 연인이 되어 주세요!」"

[[dialogue]]
speaker = "unk"
original = "はい。喜んで！\u3000トワちゃん"
translation = "네. 기꺼이! 토와 짱"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えっへへぇ～。なんだかちょっと、恥ずかしい……けど、それ以上に嬉しいなっ」"
translation = "「에헤헤～. 왠지 좀, 부끄럽네…… 하지만, 그 이상으로 기뻐!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あっ！\u3000でもでも、節度のないお付き合いは先生、認められませんからねっ！」"
translation = "「앗! 하지만 하지만, 절도 없는 교제는 선생님, 인정할 수 없으니까요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「せめてキミが卒業するまでは、周囲には秘密にするくらい、こっそりと……ね？」"
translation = "「적어도 네가 졸업할 때까지는, 주변에는 비밀로 할 정도로, 몰래…… 알았지?」"

