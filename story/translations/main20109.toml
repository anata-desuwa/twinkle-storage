[[dialogue]]
speaker = "unk"
original = "第１１話,星徒会長,B"
translation = "제11화, 성도회장, B"

[[dialogue]]
speaker = "unk"
original = "梨緒に返事をした翌日。"
translation = "리오에게 대답을 한 다음 날."

[[dialogue]]
speaker = "unk"
original = "俺は星徒会のみんなにそのことを話した。"
translation = "나는 성도회 모두에게 그 사실을 이야기했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「御前試合、受けることにしたんだ。ごめん」"
translation = "「어전시합, 받기로 했어. 미안.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何で謝るのよ。好きにしなさいって言ったし、クロトが負けるとも思ってないから問題ないわ」"
translation = "「왜 사과하는 거야. 마음대로 하라고 했고, 쿠로토가 질 거라고도 생각 안 하니까 문제없어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ラジャー」"
translation = "「라져.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「わかったわ～」"
translation = "「알겠어요~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、了解」"
translation = "「응, 알았어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……みんな、驚いてないんだな」"
translation = "「……다들 놀라지 않는구나.」"

[[dialogue]]
speaker = "unk"
original = "すんなり受け入れられて俺の方が驚いてしまった。"
translation = "순순히 받아들여져서 오히려 내가 놀라고 말았다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くん、最近悩んでたでしょ。受けようって気持ちが強かったからそんなに悩んでたんだろうなって」"
translation = "「히노미야 군, 최근에 고민했잖아. 받으려는 마음이 강했으니까 그렇게 고민했던 거겠지 싶어서.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そんな気はしてたわね～。男の子なんだから腕試しはしたいじゃない」"
translation = "「그런 기분이 들었거든요~ 남자애니까 실력 시험은 해보고 싶잖아요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうか。みんなにはお見通しだったんだな」"
translation = "「그렇구나. 다들 꿰뚫어 보고 있었네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも理由くらいは知りたいわね。ただ戦いたいわけじゃないんでしょ？」"
translation = "「하지만 이유 정도는 알고 싶네. 그냥 싸우고 싶은 건 아닐 거 아냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺もみんなに聞いてほしい」"
translation = "「아아. 나도 모두가 들어줬으면 해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まず梨緒について。彼女に関してはわからないことも多いし、言ってることが正しいかわからないけど……」"
translation = "「먼저 리오에 대해서. 그녀에 관해서는 모르는 것도 많고, 하는 말이 맞는지도 모르겠지만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「世界を守りたいって意志は真摯なものだと感じた。俺はその気持ちに応えたい」"
translation = "「세계를 지키고 싶다는 의지는 진실한 것이라고 느꼈어. 나는 그 마음에 응하고 싶어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そして──俺自身について」"
translation = "「그리고── 나 자신에 대해서.」"

[[dialogue]]
speaker = "unk"
original = "もしかすると失望されるかもしれない。"
translation = "어쩌면 실망할지도 모른다."

[[dialogue]]
speaker = "unk"
original = "でもみんなには包み隠さず話したい。だって一緒に戦ってきた仲間なんだから。"
translation = "하지만 모두에게는 숨김없이 이야기하고 싶어. 같이 싸워온 동료니까."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私にできるのか……？\u3000仲間も、親友も、学園も、全て失っておきながら、おめおめと生き残った私に……」"
translation = "「나에게 가능할까……? 동료도, 친우도, 학원도, 전부 잃어버리고서, 뻔뻔스럽게 살아남은 나에게……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや弱気になるな。今度こそ世界を救うんだろう」"
translation = "「아니, 약해지지 마. 이번에야말로 세계를 구하는 거야.」"

[[dialogue]]
speaker = "unk"
original = "それにあんな心細い想いをしているのに、懸命に戦おうとしている梨緒を見ていたら、悩んでいるだけの自分が情けなくなった。"
translation = "게다가 그렇게 불안해하면서도 필사적으로 싸우려는 리오를 보고 있으니, 고민만 하던 내 자신이 한심해졌다."

[[dialogue]]
speaker = "unk"
original = "俺に起きたことを言えば、みんなと一緒に戦えなくなるかもしれない。みんなと一緒にいられなくなるかもしれない。"
translation = "나에게 일어난 일을 말하면, 모두와 함께 싸울 수 없게 될지도 몰라. 모두와 함께 있을 수 없게 될지도 몰라."

[[dialogue]]
speaker = "unk"
original = "それでも向き合わなくちゃいけない。俺も気持ちを言葉にしなくちゃいけない。"
translation = "그래도 마주해야만 해. 나도 내 마음을 말로 표현해야만 해."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「正直に言う。今の俺は魔王の力は使えない」"
translation = "「솔직하게 말할게. 지금의 나는 마왕의 힘을 쓸 수 없어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どういうこと！？」"
translation = "「그게 무슨 소리야!?」"

[[dialogue]]
speaker = "unk"
original = "いつも明るいヴィーナスも、魔王のことなると険しい表情に変わった。"
translation = "언제나 밝은 비너스도 마왕에 관한 일이 되자 험악한 표정으로 변했다."

[[dialogue]]
speaker = "unk"
original = "星徒会室全体に緊張が走り、みんなの顔にも不安が表れる。"
translation = "성도회실 전체에 긴장감이 흐르고, 모두의 얼굴에도 불안이 나타난다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この前のモンスターとの戦いで、俺の力が暴走しそうになったんだ」"
translation = "「지난번 몬스터와의 싸움에서 내 힘이 폭주할 뻔했어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「暴走？\u3000やっぱりリクリエを自分の中に封印したせい？」"
translation = "「폭주? 역시 리크리에를 자신 안에 봉인한 탓이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうかもしれないし、そうじゃないかもしれない。でも俺の中のラクシスの力が、制御できなくなりそうだったのは確かだ」"
translation = "「그럴지도 모르고, 아닐지도 몰라. 하지만 내 안의 락시스의 힘을 제어할 수 없게 될 뻔했던 건 확실해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラクシスの力の根幹は平行世界への干渉。平行世界に分かれた俺自身の可能性を収束させ、力を集めることができた。だけど……」"
translation = "「락시스 힘의 근간은 평행세계로의 간섭. 평행세계로 갈라진 나 자신의 가능성을 수렴시켜 힘을 모을 수 있었지. 하지만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「きっと平行世界の俺が見たんだろう。リクリエで破滅した世界の光景が頭に流れ込んできて、何もかも破壊したくてたまらなくなった」"
translation = "「분명 평행세계의 내가 본 거겠지. 리크리에로 파멸한 세계의 광경이 머릿속으로 흘러들어와서, 모든 것을 파괴하고 싶어 견딜 수 없게 됐어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺にも何が起こったのかわからない。でもあの時、梨緒が止めてくれなかったら……俺はみんなを手にかけていたかもしれない」"
translation = "「나도 무슨 일이 일어난 건지 모르겠어. 하지만 그때 리오가 멈춰주지 않았다면…… 나는 모두를 해쳤을지도 몰라.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんな……！」"
translation = "「말도 안 돼……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「俺から離れてくれ、って言っていたのはそういう意味だったのね～」"
translation = "「나한테서 떨어져 달라고 했던 건 그런 의미였구나~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「平行世界の可能性を呼び込む力──多大な力を得られる反面、害あるものを呼び寄せるリスクがあるのかもしれませんね」"
translation = "「평행세계의 가능성을 불러들이는 힘── 막대한 힘을 얻는 반면, 해로운 것을 불러들일 리스크가 있는 것일지도 모르겠네요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「正直、梨緒の言っていることが腑に落ちたんだ。俺は本当に世界を滅ぼす魔王なのかもしれないって」"
translation = "「솔직히 리오가 하는 말이 이해가 갔어. 내가 정말로 세계를 멸망시킬 마왕일지도 모른다고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今は力の暴走を抑えながら戦っている状態で……梨緒の言う通り、俺は星徒会長を退いて、戦いから離れた方がいいのかもしれない」"
translation = "「지금은 힘의 폭주를 억누르며 싸우는 상태라…… 리오의 말대로 나는 성도회장을 물러나서 싸움에서 떠나는 게 좋을지도 몰라.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも俺はまだ星徒会でいたい。新星学園の星徒会長でありたい」"
translation = "「하지만 나는 아직 성도회에 있고 싶어. 신성학원의 성도회장이고 싶어.」"

[[dialogue]]
speaker = "unk"
original = "そう思ってしまうのはわがままなのかもしれない。弱さなのかもしれない。"
translation = "그렇게 생각하는 건 이기심일지도 모른다. 약함일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "でも新星の星徒会長であることは、いつの間にか俺の一部になってしまった。"
translation = "하지만 신성의 성도회장이라는 것은 어느새 나의 일부가 되어버렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「最初はヴィーナスに御前試合を挑まれて、ヴィーナスの求めに応じたくて星徒会長になった。でも今はここが俺の居場所なんだって思えるんだ」"
translation = "「처음에는 비너스에게 어전시합 도전을 받고, 비너스의 요구에 응하고 싶어서 성도회장이 됐어. 하지만 지금은 이곳이 내 안식처라고 생각돼.」"

[[dialogue]]
speaker = "unk"
original = "こうして気持ちをぶつけるのは、みんなに甘えているんだと思う。"
translation = "이렇게 마음을 부딪치는 건 모두에게 어리광을 부리는 거라고 생각해."

[[dialogue]]
speaker = "unk"
original = "だけど仲間だから。きっと受け止めてくれると信じているから、今は吐き出させてほしい。"
translation = "하지만 동료니까. 분명 받아줄 거라고 믿으니까, 지금은 털어놓게 해줘."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは星騎士としての使命感じゃない。正義感でもない。他ならない俺のエゴだ」"
translation = "「이건 성기사로서의 사명감이 아니야. 정의감도 아니야. 다름 아닌 나의 에고다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから俺が星徒会長にふさわしいと、証明するチャンスが欲しい。俺がここにいていいと自分で認められるように、戦わせてほしい」"
translation = "「그러니까 내가 성도회장에 어울린다는 걸 증명할 기회를 줘. 내가 여기 있어도 된다고 스스로 인정할 수 있도록 싸우게 해줘.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それが御前試合を受けた理由だ」"
translation = "「그게 어전시합을 받아들인 이유야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……なるほど、そういうことだったのね」"
translation = "「……과연, 그런 거였구나.」"

[[dialogue]]
speaker = "unk"
original = "神妙な顔をして頷くヴィーナス。"
translation = "진지한 얼굴로 고개를 끄덕이는 비너스."

[[dialogue]]
speaker = "unk"
original = "彼女はどんな反応をするだろう。失望するだろうか。情けないと言うだろうか。"
translation = "그녀는 어떤 반응을 보일까. 실망할까. 한심하다고 말할까."

[[dialogue]]
speaker = "unk"
original = "それが怖かったけど、言うべきことは言った。"
translation = "그게 무서웠지만 해야 할 말은 했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、いいんじゃない」"
translation = "「뭐, 괜찮지 않아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え」"
translation = "「어?」"

[[dialogue]]
speaker = "unk"
original = "そして実際の彼女の言葉は、予想していたものと反対に至極軽いものだった。"
translation = "그리고 실제 그녀의 말은 예상했던 것과는 반대로 지극히 가벼운 것이었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大丈夫、最初は魔王の力だって使えなかったじゃない。でもギエルに勝つくらいになったんだし、そのうちなんとかなるわ」"
translation = "「괜찮아, 처음엔 마왕의 힘 같은 건 쓰지도 못했잖아. 그래도 기엘에게 이길 정도가 됐으니까, 조만간 어떻게든 될 거야.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうですね。現状で力が使えないと断定するのは早計です。魔王の力が大きな戦力になるのは事実ですし、より分析を進めてからでよいかと」"
translation = "「그렇네요. 현 상황에서 힘을 쓸 수 없다고 단정하는 건 성급합니다. 마왕의 힘이 큰 전력이 되는 건 사실이니, 좀 더 분석을 진행한 뒤라도 괜찮겠죠.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それに私たちは緋宮会長の星徒会役員です。会長の方針に従います」"
translation = "「게다가 저희는 히노미야 회장의 성도회 임원입니다. 회장님의 방침에 따르겠어요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、緋宮くんの気持ちを否定したりしないよ」"
translation = "「응, 히노미야 군의 마음을 부정하거나 하지 않아.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「びっくりした話もあったけど、正直に言ってくれて嬉しかった。私も星徒会役員だから頼られたいもん」"
translation = "「깜짝 놀랄 이야기도 있었지만, 솔직하게 말해줘서 기뻤어. 나도 성도회 임원이니까 의지해줬으면 좋겠는걸.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「助け合うのが星徒会だものね～。ふふ、微笑ましいわ～」"
translation = "「서로 돕는 게 성도회인걸요~ 후후, 보기 좋네요~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「星徒会長は一番強い星騎士がなるものだし、戦って決めるのもいいんじゃないかしら～」"
translation = "「성도회장은 가장 강한 성기사가 되는 법이고, 싸워서 결정하는 것도 괜찮지 않을까요~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんな……ありがとう」"
translation = "「모두…… 고마워.」"

[[dialogue]]
speaker = "unk"
original = "じんと目頭が熱くなる。俺はいい仲間を持った。"
translation = "울컥하며 눈시울이 뜨거워진다. 나는 좋은 동료를 두었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それに何よ、私たちを手にかけようとしたって。俺が本気になったら私たちなんて簡単に仕留められるとでも思ってるワケ？」"
translation = "「그나저나 뭐야, 우리를 해치려고 했다니. 내가 진심이 되면 우리 같은 건 간단히 해치울 수 있다고 생각하는 거야?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そんなに弱くなったつもりはないわ。あなたが正気を失ったら、ブン殴って正気に戻してあげる！」"
translation = "「그렇게 약해진 기억은 없거든. 당신이 제정신을 잃으면 한 대 때려서 정신 차리게 해줄게!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だって私はあなたの娘なんだもの。パパの面倒くらい見てあげるわ！」"
translation = "「그야 나는 당신의 딸인걸. 아빠 뒷바라지 정도는 해줄게!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんな介護みたいな……」"
translation = "「무슨 간병하는 것 같은……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ハハ……頼もしいな……」"
translation = "「하하…… 든든하네……」"

[[dialogue]]
speaker = "unk"
original = "さすがに介護されるほど<ruby>耄碌<rt>もうろく</rt></ruby>していない──と言いたいが、実際に危ないところだったから苦笑いしかない。"
translation = "설마 간병받을 정도로 노망나지는── 않았다고 말하고 싶지만, 실제로 위험한 상황이었기에 쓴웃음밖에 나오지 않는다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よし、じゃあ特訓よ！」"
translation = "「좋아, 그럼 특훈이야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「特訓？」"
translation = "「특훈?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「力を抑えながら戦ってるって言ってたでしょ？\u3000なら新しい戦い方に慣れないといけないわ」"
translation = "「힘을 억누르며 싸우고 있다고 했지? 그럼 새로운 싸움 방식에 익숙해져야 해.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だから私が鍛えてあげる。前の御前試合の時は仲間外れで寂しかったんだから！」"
translation = "「그러니까 내가 단련시켜 줄게. 지난번 어전시합 때는 나만 쏙 빼놓아서 외로웠단 말이야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスが対戦相手なんだから当然でしょ……。あ、特訓は私も手伝うから」"
translation = "「비너스가 대전 상대였으니까 당연하잖아……. 아, 특훈은 나도 도와줄게.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、懐かしいわね～」"
translation = "「후후, 그리운걸요~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「限界に挑戦」"
translation = "「한계에 도전.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、頼んだ。とことん甘えさせてもらうぞ」"
translation = "「아아, 부탁해. 철저하게 어리광 좀 부릴게.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとの御前試合では、不完全ながらも魔王の力に覚醒して勝利した。"
translation = "비너스와의 어전시합에서는 불완전하게나마 마왕의 힘에 각성하여 승리했다."

[[dialogue]]
speaker = "unk"
original = "でもあれはヴィーナスが俺を呼んでくれたから、求めてくれたからで、偶然で勝てたようなものだ。"
translation = "하지만 그건 비너스가 나를 불러주었기에, 원해주었기에 우연히 이길 수 있었던 것이나 다름없다."

[[dialogue]]
speaker = "unk"
original = "だから今度は自分の力で星徒会長になってみせる……！"
translation = "그러니 이번에는 자신의 힘으로 성도회장이 되어 보이겠어……!"

