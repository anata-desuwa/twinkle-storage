[[dialogue]]
speaker = "unk"
original = "第４話,マムの素直な気持ち,P"
translation = "제4화, 마무의 솔직한 마음, P"

[[dialogue]]
speaker = "unk"
original = "この前、マムと約束した『恋人として初めてのデート』。それを実行する為、俺たちは休日に街へとやって来ていた。"
translation = "얼마 전 마무와 약속했던 『연인으로서의 첫 데이트』. 그것을 실행하기 위해 우리들은 휴일에 거리로 나왔다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「手を繋いでもいいとは確かに言ったけど、まさか最初からなんて……」"
translation = "「손을 잡아도 된다고 확실히 말하긴 했지만, 설마 처음부터라니……」"

[[dialogue]]
speaker = "unk"
original = "楽しみにしてたので"
translation = "기대하고 있었으니까요"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「まあ、約束だから、仕方ないわね……」"
translation = "「뭐, 약속이니까 어쩔 수 없네……」"

[[dialogue]]
speaker = "unk"
original = "俺はマムと手を繋ぎながら、街を歩く。"
translation = "나는 마무와 손을 잡은 채 거리를 걷는다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「一緒に買い出しに出かけたりすることはあったけど、デートとなるとやっぱり感覚が違うわね」"
translation = "「같이 장을 보러 나온 적은 있었지만, 데이트라고 하니 역시 감각이 다르네」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――私が街に来たら、いつも何をして遊んでるのかって？」"
translation = "「――내가 거리에 나오면 평소에 뭘 하고 노냐고?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「正直、買い出し以外だと、１人で東京まで出向くことはほとんどないわよ。休日は寮内の掃除をしたり、寮の庭でガーデニングをしていることが多いかしら？」"
translation = "「솔직히 장 보는 거 말고는 혼자서 도쿄까지 나가는 일은 거의 없어. 휴일에는 기숙사 내부 청소를 하거나, 기숙사 정원에서 원예를 하는 경우가 많으려나?」"

[[dialogue]]
speaker = "unk"
original = "マムは新星寮が好きなんですね"
translation = "마무는 신성 기숙사를 좋아하는군요"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「っ……そういうことは、いちいち言わなくていいの。寮長をやっているんだから、思い入れがあるのは当たり前でしょう？」"
translation = "「윽…… 그런 건 일일이 말 안 해도 돼. 기숙사장을 맡고 있으니까 애착이 있는 건 당연하잖아?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――今度、ガーデニングを一緒に？\u3000ん……いいわよ。その時は私のこだわりを教えてあげる」"
translation = "「――다음에 원예를 같이? 음…… 좋아. 그때는 나의 고집을 가르쳐 줄게」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「他の趣味？\u3000そうね……あとは、けん玉かしら」"
translation = "「다른 취미? 글쎄…… 다음은 켄다마일까」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「妃竜院家の子供部屋に昔から置いてあってね。手持無沙汰な時はよく遊んでいたものよ」"
translation = "「히류인 가문의 아이 방에 옛날부터 놓여 있어서 말이야. 심심할 때는 자주 가지고 놀곤 했어」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「貴方は気づいていたかしら？\u3000実は変身した時の武器にも反映されていて、鉄球の持ち手がけん玉のような形状になっているのよ」"
translation = "「당신은 눈치채고 있었어? 사실 변신했을 때의 무기에도 반영되어 있어서, 철퇴의 손잡이가 켄다마 같은 형상으로 되어 있다고」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あと、人間界に来てからけん玉の検定も受けたりしてね。私、五段まで持っているのよ」"
translation = "「그리고 인간계에 오고 나서 켄다마 검정도 받아서 말이야. 나, 5단까지 가지고 있어」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どういう技ができるのか気になる？\u3000ふふっ、いいわ。教えてあげる――」"
translation = "「어떤 기술을 쓸 수 있는지 궁금해? 후훗, 좋아. 가르쳐 줄게――」"

[[dialogue]]
speaker = "unk"
original = "その日は会話がよく弾んで、近くのカフェに入り、お互いの趣味や好きなことについて沢山話をした。"
translation = "그날은 대화가 활기차게 이어졌고, 근처 카페에 들어가 서로의 취미나 좋아하는 것에 대해 많은 이야기를 나누었다."

[[dialogue]]
speaker = "unk"
original = "そうこうしている内に、気づけばあっという間に日が暮れてしまった。"
translation = "그러는 사이 어느덧 순식간에 해가 저물어 버렸다."

[[dialogue]]
speaker = "unk"
original = "帰り道も楽しく話しをしながら歩いていたのだが、ふとマムが足を止めた。"
translation = "돌아오는 길도 즐겁게 대화하며 걷고 있었는데, 문득 마무가 발을 멈췄다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「このままもう少し歩けば、もう学園の前ね。……いま気づいたのだけれど、手もだいぶ自然に繋げるようになったと思うわ」"
translation = "「이대로 조금 더 걸으면 벌써 학원 앞이네. ……방금 깨달은 건데, 손도 꽤 자연스럽게 잡을 수 있게 된 것 같아」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「帰り道、特に意識もしていなかったけれど……いつの間にか、貴方と手を繋いでいた」"
translation = "「돌아오는 길에 딱히 의식도 하지 않았지만…… 어느새 당신과 손을 잡고 있었어」"

[[dialogue]]
speaker = "unk"
original = "恋人繋ぎが出来る日も遠くなさそうですか？"
translation = "연인 잡기를 할 수 있는 날도 머지않은 것 같나요?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そうね、会長……。今日はまだ、時間あるかしら？」"
translation = "「글쎄, 회장……. 오늘 아직 시간 있어?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「このまま近くのベンチに座って、もう少しだけ話して行かない……？」"
translation = "「이대로 근처 벤치에 앉아서 조금만 더 이야기하다 가지 않을래……?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それで……さっき、恋人繋ぎの話をしていたじゃない？\u3000その……」"
translation = "「그래서…… 아까 연인 잡기 이야기를 했었지? 그게……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……してみる？」"
translation = "「……해 볼래?」"

[[dialogue]]
speaker = "unk"
original = "俺が驚いて、マムの顔を見やると――"
translation = "내가 놀라서 마무의 얼굴을 쳐다보자――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「自然と繋げているし……今日はそういう気分だから……いいわよ」"
translation = "「자연스럽게 잡고 있기도 하고…… 오늘은 그런 기분이니까…… 괜찮아」"

[[dialogue]]
speaker = "unk"
original = "俺はドキドキしながらも、彼女と手を繋ぎ直し……指を絡める。"
translation = "나는 두근거리면서도 그녀와 손을 다시 고쳐 잡으며…… 손가락을 얽는다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……」"
translation = "「응윽……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「こ、これ、やっぱりなんか、いやらしいわ……」"
translation = "「이, 이거 역시 왠지 야해……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「密着してる感がすごいというか…………はぁ…………」"
translation = "「밀착되어 있다는 느낌이 엄청나다고 할까………… 하아…………」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……な、なに？\u3000私の顔をじっと見て……」"
translation = "「……뭐, 뭐야? 내 얼굴을 빤히 쳐다보고……」"

[[dialogue]]
speaker = "unk"
original = "マムが可愛いから"
translation = "마무가 귀여우니까요"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ま、またそういうことを言う……」"
translation = "「또, 또 그런 소리를……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ん……聞いてもいいかって？\u3000何……？」"
translation = "「음…… 물어봐도 되냐고? 뭔데……?」"

[[dialogue]]
speaker = "unk"
original = "マムは俺のこと、どう思ってますか？"
translation = "마무는 저를 어떻게 생각하나요?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「どうって……何よ、今更……」"
translation = "「어떻게라니…… 뭐야, 새삼스럽게……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「そんなの、決まっているでしょう？」"
translation = "「그런 거 정해져 있잖아?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「嫌だったら、手なんて繋がないわよ……初めてだって言ったでしょう？」"
translation = "「싫었으면 손 같은 거 안 잡는다고…… 처음이라고 말했잖아?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「――私の口から、ちゃんと聞きたかった？」"
translation = "「――내 입으로 직접 듣고 싶었어?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……なら、１度しか言わないから、ちゃんと聞きなさい」"
translation = "「……그럼 한 번밖에 안 말할 테니까 똑똑히 들어」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……好きよ。会長」"
translation = "「……좋아해. 회장」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「って、こ、こら……か、顔が近いわよ……？\u3000あっ……！？\u3000んっ……<emoji=heart04>」"
translation = "「잠깐, 이, 이봐…… 어, 얼굴이 가까워……? 앗……!? 음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はマムの唇を、そっと奪う。"
translation = "나는 마무의 입술을 살며시 빼앗는다."

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ちゅっ……<emoji=heart04>\u3000んっ……はあぁ<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 읍…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「も、もう。許してないのに、いきなりするなんて……」"
translation = "「정, 정말. 허락도 안 했는데 갑자기 하다니……」"

[[dialogue]]
speaker = "unk"
original = "ごめん、我慢できなかった"
translation = "미안, 참을 수 없었어"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「……仕方ないわね。今日、だけなんだからね……？\u3000ん……<emoji=heart04>」"
translation = "「……어쩔 수 없네. 오늘뿐이니까 말이야……? 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は目を閉じて、唇を俺の方に向ける。そんな風にされたら――"
translation = "그녀는 눈을 감고 입술을 내 쪽으로 향한다. 그런 모습을 보이면――"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000……ちゅ、ちゅっ<emoji=heart04>」"
translation = "「음……<emoji=heart04> 쪽<emoji=heart04> ……쪽, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺とマムはそれからしばらく、言葉を交わさず、時間も忘れ、初めてのキスに没頭してしまうのだった――"
translation = "나와 마무는 그 후 한참 동안 말을 섞지 않고 시간도 잊은 채, 첫 키스에 몰두해 버리는 것이었다――"

