[[dialogue]]
speaker = "unk"
original = "──後日。"
translation = "──며칠 뒤."

[[dialogue]]
speaker = "ヴィーナス"
original = "「なっ……」"
translation = "「나……」"

[[dialogue]]
speaker = "ルリエル"
original = "「これは……！」"
translation = "「이건……!」"

[[dialogue]]
speaker = "リップル"
original = "「いらっしゃーい！\u3000今だけの特別仕様エンドレスサマーへ！」"
translation = "「어서 오세-요! 지금뿐인 특별 사양 엔들리스 서머에!」"

[[dialogue]]
speaker = "unk"
original = "砂浜には豪華なセットが設営され、ステージの前には観覧用のビーチパラソルがいくつも並ぶ。"
translation = "모래사장에는 호화로운 세트가 설치되어 있고, 스테이지 앞에는 관람용 비치 파라솔이 여러 개 늘어서 있었다."

[[dialogue]]
speaker = "unk"
original = "高らかに掲げられたフラッグには、でかでかと『リゾート結界\u3000水着コンテスト』と書かれていた。"
translation = "드높이 내걸린 깃발에는 큼지막하게 『리조트 결계 수영복 콘테스트』라고 쓰여 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「すごすぎない！？」"
translation = "「너무 굉장하잖아!?」"

[[dialogue]]
speaker = "リップル"
original = "「水着コンテストならここまでやってナンボとお聞きしました！\u3000さすがは名スポンサーサンデース！」"
translation = "「수영복 콘테스트라면 이 정도는 해줘야 제맛이라고 들었어마스! 역시 명 스폰서 상이데-스!」"

[[dialogue]]
speaker = "アナ"
original = "「時代の流れで減少している審美コンテストをこうも派手に……」"
translation = "「시대의 흐름에 따라 감소하고 있는 심미 콘테스트를 이렇게나 화려하게……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「フッ──イベンターの面目躍如だ。海の家が発展すれば、貴殿のお師匠たちも喜ばれよう……？」"
translation = "「훗── 이벤터로서의 면모를 과시할 기회지. 바다의 집이 발전하면 귀공의 스승들도 기뻐하시겠지……?」"

[[dialogue]]
speaker = "リップル"
original = "「ハーイ、その通りデース！\u3000ヘレナちゃんの寛大なお心遣いに感謝感激いたしマース！」"
translation = "「하-이, 그렇데-스! 헬레나 짱의 관대한 배려에 감사 감격했어마-스!」"

[[dialogue]]
speaker = "サーシャ"
original = "「それにしても豪華なステージね……」"
translation = "「그나저나 화려한 스테이지네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どこからこんなものが出てきたのよ」"
translation = "「어디서 이런 게 튀어나온 거야.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「何、色々とツテをあたってな。今回のビジネ……もとい、人助けのことを話したら、たくさんの協賛を得られたのだ」"
translation = "「뭐, 여러 연줄을 알아봤지. 이번 비지네…… 아니, 남 돕는 일에 관해 이야기했더니 많은 협찬을 얻을 수 있었다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「今、ビジネスって言いかけませんでした……？」"
translation = "「지금 비즈니스라고 말하려 하지 않았나요……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「気のせいだ。私はただ、この海の家を盛り上げたいだけ……」"
translation = "「기분 탓이다. 나는 그저 이 바다의 집을 활성화시키고 싶을 뿐……」"

[[dialogue]]
speaker = "リップル"
original = "「ハーイ！\u3000ヘレナちゃんはワタシのビジョンに共感してくれマシタ！」"
translation = "「하-이! 헬레나 짱은 저의 비전에 공감해주었어마시타!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「今回の『エンドレスサマー水着コンテスト』は、水着でステージにさえ上がれば誰でも参加可能！\u3000エントリー費無料！」"
translation = "「이번 『엔들리스 서머 수영복 콘테스트』는 수영복 차림으로 스테이지에 오르기만 하면 누구든 참가 가능! 엔트리 비용 무료!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「公明正大な審査によって、もっとも水着の似合っていた優勝者にはグランプリの称号が与えられる！」"
translation = "「공명정대한 심사를 통해 가장 수영복이 잘 어울렸던 우승자에게는 그랑프리의 칭호가 주어진다!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「どうかな？\u3000貴殿らも、このリゾートをより盛り上げると思って、参加してみては？」"
translation = "「어떤가? 귀공들도 이 리조트를 더욱 활기차게 만든다 생각하고 참가해 보는 게?」"

[[dialogue]]
speaker = "ルリエル"
original = "「へへへ、そう聞くとなんだか楽しそうですね♪」"
translation = "「헤헤헤, 그렇게 들으니 왠지 재밌을 것 같네요♪」"

[[dialogue]]
speaker = "リップル"
original = "「ワクワクしてきたデショウ？」"
translation = "「두근두근하기 시작했죠-?」"

[[dialogue]]
speaker = "リップル"
original = "「さらに参加者には～……もれなく豪華海のサチ、海の家ドリンクチケット、バナナボートが贈られマ～ス！」"
translation = "「게다가 참가자에게는~…… 빠짐없이 호화 해산물, 바다의 집 드링크 티켓, 바나나 보트 이용권이 증정되어마~스!」"

[[dialogue]]
speaker = "アポロ"
original = "「海の幸！\u3000バナナボート！？\u3000うおお、あたしは絶対に出場するぞ！」"
translation = "「해산물! 바나나 보트!? 우오오, 나는 무조건 출전한다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんでそんなに景品が豪華なのよ！？」"
translation = "「왜 그렇게 경품이 호화로운 거야!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「無論、この私がスポンサーだからだ」"
translation = "「물론 내가 스폰서니까.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それに驚くのはまだ早い。此度のコンテストでもし優勝すれば……」"
translation = "「거기에 놀라긴 아직 이르다. 이번 콘테스트에서 만약 우승한다면……」"

[[dialogue]]
speaker = "unk"
original = "何が……？"
translation = "무엇이……?"

[[dialogue]]
speaker = "unk"
original = "優勝すれば……？"
translation = "우승하면……?"

[[dialogue]]
speaker = "リップル"
original = "「フフフ……聞いて驚くナカレ、なのデス」"
translation = "「후후후…… 듣고 놀라지 마시라, 인 것이데-스.」"

[[dialogue]]
speaker = "リップル"
original = "「なんと一等賞には……賞金１０万テルスが贈呈されマ～～～ス！！」"
translation = "「무려 1등에게는…… 상금 10만 텔루스가 증정되어마～～～스!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええええ────っ！？！？」"
translation = "「에에에에────엣!?!?」"

