[[dialogue]]
speaker = "unk"
original = "第４話,桜十路家のお嬢様,P"
translation = "제4화, 사쿠라코지 가문의 아가씨, P"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～、お菓子の準備もオッケー～♪\u3000それじゃまったりしようね～♪」"
translation = "「에헤헤~ 과자 준비도 오케이~♪ 그럼 느긋하게 있자~♪」"

[[dialogue]]
speaker = "unk"
original = "今日はサランが我が家に遊びに来ていた。"
translation = "오늘은 사란이 우리 집에 놀러 와 있었다."

[[dialogue]]
speaker = "unk"
original = "ちょうど母さんも留守のため、２人の時間をゆっくり過ごすことが出来る。"
translation = "마침 어머니도 부재중이라 둘만의 시간을 여유롭게 보낼 수 있다."

[[dialogue]]
speaker = "unk"
original = "俺たちはお菓子を持ち寄って、リビングでそれを食べながら昼下がりのひと時を楽しんでいた。"
translation = "우리는 과자를 각자 가져와서 거실에서 그것을 먹으며 한낮의 한때를 즐기고 있었다."

[[dialogue]]
speaker = "サラン"
original = "「あ……会長ちゃん、テレビ見て～！\u3000ほらほら、この船～♪」"
translation = "「아…… 회장님, TV 좀 봐~! 봐봐, 이 배~♪」"

[[dialogue]]
speaker = "サラン"
original = "「この船が『チェリークルーズ号』だよ～」"
translation = "「이 배가 『체리 크루즈호』야~」"

[[dialogue]]
speaker = "unk"
original = "テレビのニュース画面にはとんでもなく巨大な船が映っていた。"
translation = "TV 뉴스 화면에는 말도 안 되게 거대한 배가 찍혀 있었다."

[[dialogue]]
speaker = "サラン"
original = "「出港してからしばらく経つけど、無事にハワイについたんだね～。よかったぁ～」"
translation = "「출항하고 나서 꽤 지났는데 무사히 하와이에 도착했네~. 다행이야~」"

[[dialogue]]
speaker = "サラン"
original = "「うん、この船はハワイを出たら、そのまま太平洋を横断してアメリカに向かうの～♪」"
translation = "「응, 이 배는 하와이를 떠나면 그대로 태평양을 횡단해서 미국으로 가~♪」"

[[dialogue]]
speaker = "サラン"
original = "「世界一周して日本に帰ってくるのは……ぽよ？\u3000いつになるんだろ～？」"
translation = "「세계 일주를 하고 일본으로 돌아오는 건…… 뽀요? 언제쯤 되려나~?」"

[[dialogue]]
speaker = "unk"
original = "無事に帰ってきて欲しいね"
translation = "무사히 돌아왔으면 좋겠네"

[[dialogue]]
speaker = "サラン"
original = "「きっと大丈夫だよ～♪」"
translation = "「분명 괜찮을 거야~♪」"

[[dialogue]]
speaker = "unk"
original = "ホントにでかいな！！！"
translation = "정말 크네!!!"

[[dialogue]]
speaker = "unk"
original = "それにしてもこの船……"
translation = "그나저나 이 배……"

[[dialogue]]
speaker = "サラン"
original = "「そうだよ～。国内最大級だってお父様が言ってたかな～」"
translation = "「맞아~. 국내 최대급이라고 아버님이 말씀하셨던가~」"

[[dialogue]]
speaker = "unk"
original = "国内最大級──"
translation = "국내 최대급──"

[[dialogue]]
speaker = "unk"
original = "そんな大きな船を持っている桜十路家は、やはり相当な富豪なのだと今更のように思ってしまう。"
translation = "그런 큰 배를 가지고 있는 사쿠라코지 가문은 역시 상당한 부호라고 새삼스럽게 생각하게 된다."

[[dialogue]]
speaker = "unk"
original = "そしてサランは、その桜十路家のお嬢様なのだ。"
translation = "그리고 사란은 그 사쿠라코지 가문의 아가씨인 것이다."

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000サランのこと、そんなに見つめてどうしたの～……？」"
translation = "「뽀요? 사란을 그렇게 빤히 쳐다보고 왜 그래~……?」"

[[dialogue]]
speaker = "unk"
original = "庶民がお嬢様を見つめてごめんなさい！"
translation = "서민이 아가씨를 쳐다봐서 죄송합니다!"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ～、どうしてそんなこと言うの～」"
translation = "「뽀요~ 왜 그런 말을 해~」"

[[dialogue]]
speaker = "サラン"
original = "「確かに桜十路家はお金持ちだけど、サランは普通の女の子だよ～」"
translation = "「확실히 사쿠라코지 가문은 부자지만 사란은 평범한 여자아이야~」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんにそんな風に言われると、ちょっと悲しくなっちゃうな～……」"
translation = "「회장님한테 그런 말을 들으면 조금 슬퍼져 버려~……」"

[[dialogue]]
speaker = "unk"
original = "ご、ごめん……"
translation = "미, 미안해……"

[[dialogue]]
speaker = "サラン"
original = "「えへへ、大丈夫だよ～」"
translation = "「에헤헤, 괜찮아~」"

[[dialogue]]
speaker = "サラン"
original = "「でもお嬢様っていうんだったら、ヴィーちゃんもそうだよ～」"
translation = "「하지만 아가씨라고 한다면 비너스 짱도 그렇잖아~」"

[[dialogue]]
speaker = "サラン"
original = "「とってもお金持ちの九浄家のお嬢様だし～、だけど会長ちゃんは緊張しないでしょ？」"
translation = "「엄청난 부자인 쿠죠 가문의 아가씨고~ 하지만 회장님은 긴장 안 하지?」"

[[dialogue]]
speaker = "サラン"
original = "「九浄家は桜十路家と同じ『五名門』のひとつで、主に人材の方面で活躍してるんだよ～」"
translation = "「쿠죠 가문은 사쿠라코지 가문과 같은 『오명문』 중 하나로 주로 인재 방면에서 활약하고 있어~」"

[[dialogue]]
speaker = "unk"
original = "その話はヘレナちゃん他、各所から聞いているが……"
translation = "그 이야기는 헬레나 짱을 비롯해 여러 곳에서 듣고 있지만……"

[[dialogue]]
speaker = "unk"
original = "九浄家はもはや何を得意としているのか分からないくらい手広くやっているイメージがある。"
translation = "쿠죠 가문은 이제 뭘 잘하는지 모를 정도로 문어발식으로 하고 있다는 이미지가 있다."

[[dialogue]]
speaker = "unk"
original = "学園経営に人工戦闘服の研究、カジノにイベントの運営まで、本当にいろいろだ。"
translation = "학원 경영에 인공 전투복 연구, 카지노에 이벤트 운영까지 정말 다양하다."

[[dialogue]]
speaker = "unk"
original = "桜十路家は『食品』と『流通』？"
translation = "사쿠라코지 가문은 『식품』과 『유통』?"

[[dialogue]]
speaker = "サラン"
original = "「そうだよ～。食品は分かりやすいけど、流通はあまり知られてないんだ～」"
translation = "「맞아~. 식품은 알기 쉽지만 유통은 별로 알려져 있지 않아~」"

[[dialogue]]
speaker = "サラン"
original = "「でも桜十路家に何かあったら、世界の流通は完全に麻痺しちゃうって言われてるみたい～」"
translation = "「하지만 사쿠라코지 가문에 무슨 일이 생기면 세계의 유통은 완전히 마비되어 버린다고들 하는 것 같아~」"

[[dialogue]]
speaker = "unk"
original = "やっぱりとんでもない家じゃないか！"
translation = "역시 엄청난 집안이잖아!"

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker = "unk"
original = "そんな桜十路家のお嬢様がどうして星騎士を目指したんだろうか？"
translation = "그런 사쿠라코지 가문의 아가씨가 왜 성기사를 지망한 걸까?"

[[dialogue]]
speaker = "unk"
original = "特にサランの場合はふわふわおっとりしていて、お世辞にも戦いに向いている性格とは言い難い。"
translation = "특히 사란의 경우에는 푹신푹신하고 느긋해서 빈말로도 싸움에 적합한 성격이라고는 하기 어렵다."

[[dialogue]]
speaker = "unk"
original = "そんなサランがどうして星騎士を目指したのか、どうしても気になってしまった。"
translation = "그런 사란이 왜 성기사를 지망했는지 아무래도 궁금해졌다."

[[dialogue]]
speaker = "サラン"
original = "「えっとね～。サランが小さい頃、モンスターの出現のせいで、流通業界のみんなが困ってるってお話を聞いたの」"
translation = "「저기 말이야~. 사란이 어렸을 때 몬스터의 출현 때문에 유통업계의 모두가 곤란해하고 있다는 이야기를 들었어」"

[[dialogue]]
speaker = "サラン"
original = "「もしサランが星騎士になって戦えたら、そういう人たちを守ってあげられるかな～って♪」"
translation = "「만약 사란이 성기사가 되어 싸울 수 있다면 그런 사람들을 지켜줄 수 있을까~ 해서♪」"

[[dialogue]]
speaker = "サラン"
original = "「本当に星騎士になれるかどうか分からなかったけど、とりあえず新星学園に入学してみたの～」"
translation = "「정말로 성기사가 될 수 있을지 몰랐지만 일단 신성학원에 입학해 봤어~」"

[[dialogue]]
speaker = "サラン"
original = "「でも、ちゃんとプリマステラになることができて、よかったな～って思うよ～」"
translation = "「하지만 제대로 프리마스텔라가 될 수 있어서 다행이라고 생각해~」"

[[dialogue]]
speaker = "unk"
original = "入学までの経緯がふわふわしているのはとてもサランらしい。"
translation = "입학까지의 경위가 두루뭉술한 것은 매우 사란답다."

[[dialogue]]
speaker = "unk"
original = "結果、サランは星騎士としての適性が高く、その力を開花させていった。"
translation = "결과적으로 사란은 성기사로서의 적성이 높았고 그 힘을 꽃피워 갔다."

[[dialogue]]
speaker = "unk"
original = "だが、サランがプリマステラとして認められたのは、適性のひと言で片付けられるものではない。"
translation = "하지만 사란이 프리마스텔라로 인정받은 것은 적성이라는 한마디로 치부될 수 있는 것이 아니다."

[[dialogue]]
speaker = "unk"
original = "相応の努力を積み重ねて今日の力を得た。"
translation = "그에 걸맞은 노력을 쌓아 올려 오늘의 힘을 얻었다."

[[dialogue]]
speaker = "unk"
original = "そして何より、サランには『困っている人の力になりたい』という強い想いがあるからだろう。"
translation = "그리고 무엇보다 사란에게는 『곤란한 사람에게 힘이 되고 싶다』는 강한 마음이 있기 때문일 것이다."

[[dialogue]]
speaker = "サラン"
original = "「ぽよ……？」"
translation = "「뽀요……?」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ、会長ちゃんどうしたの～？\u3000急に頭を撫でてきて～♪」"
translation = "「에헤헤, 회장님 왜 그래~? 갑자기 머리를 쓰다듬고~♪」"

[[dialogue]]
speaker = "サラン"
original = "「はわっ！？\u3000今度は急に抱きしめて……ん～、どうしちゃったんだろう～♪」"
translation = "「하왓!? 이번엔 갑자기 껴안고…… 음~ 어떻게 된 걸까~♪」"

[[dialogue]]
speaker = "unk"
original = "その健気さがたまらなくなって、思わず抱きしめてしまった。"
translation = "그 기특함이 견딜 수 없어져서 나도 모르게 껴안고 말았다."

[[dialogue]]
speaker = "unk"
original = "そんな俺を宥めるように、サランは俺に恥ずかしそうな笑顔を向けてくれるのだった。"
translation = "그런 나를 달래듯 사란은 나에게 수줍은 미소를 지어주는 것이었다."

