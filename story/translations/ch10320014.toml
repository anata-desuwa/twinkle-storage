[[dialogue]]
speaker = "unk"
original = "第４話,呪われた司書さん,P"
translation = "제4화, 저주받은 사서 씨, P"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんとキリカさんという頼もしすぎる援軍を得て、俺たちはアステラの深部へと向かう――"
translation = "위스테리아 씨와 키리카 씨라는 너무나도 든든한 원군을 얻어 우리들은 아스텔라 심부로 향한다――"

[[dialogue]]
speaker = "ウィステリア"
original = "「くっ……！」"
translation = "「큭……!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、大丈夫。モンスターにやられたわけじゃないわよ。この魔導書呪われててね、強い力を与える代わりに持ち主の精神を蝕むの」"
translation = "「아, 괜찮아. 몬스터에게 당한 게 아니야. 이 마도서가 저주받아 있어서 말이야, 강한 힘을 주는 대신 주인의 정신을 좀먹거든」"

[[dialogue]]
speaker = "unk"
original = "大丈夫じゃない！？"
translation = "안 괜찮잖아요!?"

[[dialogue]]
speaker = "ウィステリア"
original = "「普通の人なら手にしただけで死ぬか発狂するらしいけど、気を抜かなければ大丈夫よ。普段はしっかり封印してるしね」"
translation = "「보통 사람이라면 손에 넣는 것만으로 죽거나 발광한다나 봐. 하지만 정신 바짝 차리면 괜찮아. 평소에는 확실히 봉인해두고 있고 말이야」"

[[dialogue]]
speaker = "キリカ"
original = "「その危険物、まだ処理していなかったのですね」"
translation = "「그 위험물, 아직 처리하지 않았던 거군요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そんな簡単に手放せるなら苦労しないわよ。新星の図書館の本に解呪する方法とかないかしら？」"
translation = "「그렇게 간단히 떼어놓을 수 있으면 고생 안 하지. 신성 도서관 책 중에 저주 푸는 방법 같은 거 없으려나?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「こんな危ないものどこで……って思ったでしょ。それが実家に最初からあったのよこれが」"
translation = "「이런 위험한 걸 어디서…… 라고 생각했지? 이게 본가에 처음부터 있었어, 이게」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私の家は魔界でも特別古い一族でね。次期当主として生まれた私は小さい頃から呪術の教育を受けていた」"
translation = "「내 집안은 마계에서도 특별히 오래된 일족이거든. 차기 당주로 태어난 나는 어릴 때부터 주술 교육을 받았어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「動物を呪い殺させたり、大量の呪術書を読まされたり、耐性を付けるために呪われたり……極めつけにこの魔導書を与えられた。最初は何度も死にかけたわ」"
translation = "「동물을 저주해 죽이게 하거나, 대량의 주술서를 읽게 하거나, 내성을 기르기 위해 저주받거나…… 결정타로 이 마도서를 받았지. 처음엔 몇 번이나 죽을 뻔했어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「で、そんなヤバいものを押し付けてくる家が嫌になって、こっそり抜け出して流星学園に入ったってわけ」"
translation = "「그래서 그런 위험한 걸 떠넘기는 집이 싫어져서 몰래 빠져나와 유성학원에 들어왔다는 말씀」"

[[dialogue]]
speaker = "unk"
original = "だからメイドのバイトを……"
translation = "그래서 메이드 알바를……"

[[dialogue]]
speaker = "ウィステリア"
original = "「うぐっ……そうなのよ。人間界に頼れる人はいないし、お金欲しさに泣く泣くね……」"
translation = "「우그윽…… 그런 거야. 인간계에 의지할 사람은 없고, 돈이 필요해서 울며 겨자 먹기로 했지……」"

[[dialogue]]
speaker = "キリカ"
original = "「失礼ですね。ちょっとメイド服着てみたい、と言ったのはあなたでしょう」"
translation = "「실례네요. 조금 메이드복 입어보고 싶다, 라고 말한 건 당신이지 않습니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あいや、それは若気の至りっていうか、女の子なんだからフリフリしたのも一度着てみたいっていうか――」"
translation = "「아니 그건 젊은 날의 과오라고 해야 하나, 여자아이니까 프릴 달린 것도 한 번쯤 입어보고 싶었다고 해야 하나――」"

[[dialogue]]
speaker = "キリカ"
original = "「どうやらここがアステラの奥のようですね」"
translation = "「아무래도 여기가 아스텔라의 안쪽인 모양이군요」"

[[dialogue]]
speaker = "ウィステリア"
original = "「よしっ、モンスターのくせにファインプレーよ！\u3000お礼に跡形もなく消し飛ばしてあげる！」"
translation = "「좋아, 몬스터 주제에 파인 플레이야! 답례로 흔적도 없이 날려버려 줄게!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「術式凍結解除――フォビドゥンリアクター！！」"
translation = "「술식 동결 해제―― 포비든 리액터!!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はい、お終い。じゃ、アステラが崩壊する前に脱出しましょ」"
translation = "「자, 끝. 그럼 아스텔라가 붕괴하기 전에 탈출하자」"

[[dialogue]]
speaker = "unk"
original = "一瞬でモンスターが全滅した……！"
translation = "순식간에 몬스터가 전멸했어……!"

[[dialogue]]
speaker = "キリカ"
original = "「驚いておられるようですが、ウィステリアの全力はこの程度ではありませんよ。学生時代は――」"
translation = "「놀라신 모양입니다만 위스테리아의 전력은 이 정도가 아니랍니다. 학생 시절에는――」"

[[dialogue]]
speaker = "ウィステリア"
original = "「コラそこ、何いらないこと教えようとしてんの」"
translation = "「이봐 거기, 왜 쓸데없는 거 가르쳐주려고 하는 거야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私のこと、ただの司書さんだと思ってたかしら？\u3000でもあんまり他の子には言っちゃダメよ」"
translation = "「나를 그냥 사서 누나라고 생각했으려나? 하지만 다른 애들한테는 말하면 안 돼」"

[[dialogue]]
speaker = "ウィステリア"
original = "「お姉さんとのヒミツ。いい？」"
translation = "「누나와의 비밀. 알았지?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……うん、いい子ね。お姉さんとの約束よ」"
translation = "「……응, 착한 아이네. 누나랑 약속이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ」"
translation = "「앗」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あたた、私たちだけ変なところに出ちゃったわね……また不運だわ……」"
translation = "「아야야, 우리만 이상한 곳으로 나와버렸네…… 또 불운이야……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「……私のこと、やたら運の悪いお姉さんだと思ってない？\u3000あ、その顔は思ってるでしょ」"
translation = "「……나를 유독 운 없는 누나라고 생각하고 있지? 아, 그 표정은 생각하고 있는 거네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「実はね、この魔本は持ち主の魂を喰らうだけじゃなくて幸運も奪うの」"
translation = "「사실 말이야, 이 마본은 주인의 영혼을 갉아먹을 뿐만 아니라 행운도 빼앗아」"

[[dialogue]]
speaker = "ウィステリア"
original = "「新品の家電が壊れたり、財布を落としたり、赤信号に全部引っかかったり……ほんとイヤになっちゃう」"
translation = "「새 가전제품이 고장 나거나, 지갑을 떨어뜨리거나, 빨간불에 전부 걸리거나…… 정말 싫어진다니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「――だって就職した会社が一ヶ月経たずに潰れたんだから！」"
translation = "「――그도 그럴 게 취직한 회사가 한 달도 안 돼서 망했단 말이야!」"

[[dialogue]]
speaker = "unk"
original = "えええっ！？"
translation = "에에에엑!?"

[[dialogue]]
speaker = "ウィステリア"
original = "「普通の会社に就職して、普通の人として生きていくつもりだったのに、同僚の顔を覚える暇すらなく無職よ！」"
translation = "「평범한 회사에 취직해서 평범한 사람으로 살아갈 생각이었는데, 동료 얼굴 외울 틈도 없이 백수라고!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「再就職もうまくいかなくて……でもちょうど新星学園の司書さんが１人やめたそうで、行き場をなくしてる私に声をかけてくれたの。おかげで助かったわ」"
translation = "「재취업도 잘 안 돼서…… 근데 마침 신성학원 사서분이 한 명 그만두셨다고 해서, 갈 곳 없는 나한테 말을 걸어주셨어. 덕분에 살았지」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ～……今日はモンスターとキリカのせいで余計なことたくさん知られちゃったわ。あの鬼メイド長め……ケーキを作る腕前だけは認めてあげるけど」"
translation = "「하아~…… 오늘은 몬스터랑 키리카 때문에 쓸데없는 거 많이 들켜버렸네. 그 귀신 메이드장 녀석…… 케이크 만드는 솜씨만은 인정해주겠지만」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ、言っとくけど私のせいで会社が潰れたわけじゃないから。後で聞いたら元から経営状態悪かったらしいし」"
translation = "「아, 말해두겠는데 나 때문에 회사가 망한 건 아니니까. 나중에 들어보니 원래부터 경영 상태가 안 좋았다나 봐」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ――」"
translation = "「아――」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あんなに戦ったの久々だから、呪いの反動で力抜けちゃって……ありがとう、また受け止めてもらっちゃったわね」"
translation = "「그렇게 싸운 거 오랜만이라 저주의 반동으로 힘이 빠져버려서…… 고마워, 또 받아주게 했네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「…………その、ね。呪いのせいで失ったもの、まだあるの」"
translation = "「…………그게 말이야. 저주 때문에 잃은 것, 또 있어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それは……恋」"
translation = "「그건…… 사랑」"

[[dialogue]]
speaker = "ウィステリア"
original = "「魔窟みたいな家を出て、学園で青春を楽しんで、そして恋をしたかった」"
translation = "「마굴 같은 집을 나와서 학원에서 청춘을 즐기고, 그리고 사랑을 하고 싶었어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でも必ず邪魔が入ってうまいくかない」"
translation = "「하지만 반드시 방해가 들어와서 잘 안 돼」"

[[dialogue]]
speaker = "ウィステリア"
original = "「強くなりたくなんてなかった。普通の女の子になって、普通の恋ができればそれで幸せだったのに」"
translation = "「강해지고 싶지 않았어. 평범한 여자아이가 되어서 평범한 사랑을 할 수 있다면 그걸로 행복했을 텐데」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ……もう立ち上がれるわ。ごめんなさい、恥ずかしいところ見せたわね」"
translation = "「후우…… 이제 일어설 수 있어. 미안해, 부끄러운 모습 보여줬네」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけど会長くんは特別みたいで、不思議と近づける。私ね、男の子とこんなにお話できたのは初めてなの」"
translation = "「하지만 회장군은 특별한 모양인지 신기하게 다가갈 수 있어. 나 말이야, 남자애랑 이렇게 이야기해본 건 처음이야」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だから……」"
translation = "「그러니까……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「こんないわくつきの女だけど、恋の相手になってくれる？」"
translation = "「이런 사연 있는 여자지만 사랑의 상대가 되어줄래?」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふふっ、さすがにここまで言ったら動揺するのね。ちょっと勝った気分。でも会長くんにはお姉さんの相手はまだ早いかなぁ～？」"
translation = "「후후후, 역시 이 정도까지 말하면 동요하는구나. 좀 이긴 기분. 하지만 회장군에게는 누나 상대는 아직 이르려나~?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ、冗談冗談！？\u3000ごめんなさい調子乗りました！\u3000謝るから今の許して！」"
translation = "「앗, 농담 농담!? 미안해 우쭐거렸어! 사과할 테니까 방금 건 용서해줘!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「まぁ、その……さっき言ったことは忘れていいから、また図書館に来てね。お姉さん、君が相手してくれるだけで嬉しいから」"
translation = "「뭐, 그…… 아까 한 말은 잊어도 좋으니까 또 도서관에 와줘. 누나는 네가 상대해주는 것만으로도 기쁘니까」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それじゃ……おやすみなさい」"
translation = "「그럼…… 잘 자」"

