[[dialogue]]
speaker = "unk"
original = "第２話,破壊衝動との戦い,P"
translation = "제2화, 파괴 충동과의 싸움, P"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あたしの推測だとヴァレリーが現れるのは、必ず『美しい場所』だ。わかりたくもねえが、あいつなりのこだわりと美意識があるんだろう」"
translation = "「내 추측으로는 발레리가 나타나는 곳은 반드시 『아름다운 장소』야. 이해하고 싶지도 않지만, 그 녀석 나름의 고집과 미의식이 있겠지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「全員で東京中を手分けして探すぞ。会長さんは――」"
translation = "「전원이 도쿄 안을 분담해서 찾는다. 회장님은――」"

[[dialogue]]
speaker = "unk"
original = "公安委員会の面々が『美しい場所』をシラミ潰しに当たっているけど、美しい駅舎といえば、やっぱりここだ。"
translation = "공안위원회의 면면이 『아름다운 장소』를 샅샅이 뒤지고 있지만, 아름다운 역 건물이라고 하면 역시 여기다."

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「おや、会長さん。またお会いしましたね。麗しき星のお導きでしょうか」"
translation = "「오라, 회장님. 또 만났군요. 고운 별의 인도일까요」"

[[dialogue]]
speaker = "unk"
original = "本当にいた！？"
translation = "진짜로 있었어!?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「フフフ、まるで幽霊にでも遭遇したかのような物言い。お生憎様、お互いに生きていれば顔を合わせることもあるでしょう」"
translation = "「후후후, 마치 유령이라도 만난 것 같은 말투네요. 유감스럽게도 서로 살아있으면 얼굴을 마주할 일도 있는 법이죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「今日は近くに厄介な番犬の気配も感じられませんね」"
translation = "「오늘은 근처에 성가신 번견의 기척도 느껴지지 않네요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ちょうどいいです。どうですか、会長さん。先日お約束した通り、私と美術館デートと洒落こむなど」"
translation = "「마침 잘 됐습니다. 어때요, 회장님. 지난번에 약속한 대로 저와 미술관 데이트라도 즐겨보시는 건」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「美しい物を定期的に観賞し、審美眼を養っておくに越したことはありませんよ」"
translation = "「아름다운 것을 정기적으로 감상하며 심미안을 길러두어서 나쁠 건 없으니까요」"

[[dialogue]]
speaker = "unk"
original = "約束した覚えはないけど……行こうか"
translation = "약속한 기억은 없지만…… 가볼까"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ええ、ええ、行きましょう、美の園へ」"
translation = "「네, 네, 갑시다, 미의 정원으로」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「２人きりのデートです。他の女を呼びよせるなんて野暮な真似は……しませんよね？」"
translation = "「둘만의 데이트예요. 다른 여자를 불러들이다니 그런 촌스러운 짓은…… 안 하시겠죠?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あいつが何をやらかしたか、忘れちゃいねえよな。油断禁物だ……隙を見せた瞬間に、頭から喰われるぜ」"
translation = "「저 녀석이 무슨 짓을 저질렀는지 잊지는 않았겠지. 방심은 금물이야…… 빈틈을 보이는 순간 머리부터 잡아먹힐 거라고」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「気を引き締めろよ、会長さん」"
translation = "「정신 바짝 차려, 회장님」"

[[dialogue]]
speaker = "unk"
original = "あえて彼女の誘いに乗り、行動を共にすることで見えてくる真相もあるはずだ。"
translation = "그녀의 유혹에 응해 행동을 함께함으로써 보이게 되는 진상도 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "もちろん、罠の可能性も十二分にある。警戒の糸を張り巡らしつつ、俺たちは駅舎内の美術館へと向かった。"
translation = "물론 함정일 가능성도 충분히 있다. 경계의 끈을 늦추지 않으며, 우리들은 역 내의 미술관으로 향했다."

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「美しい……！\u3000ああ、実に美しい……！\u3000凛としたコントラスト……瑞々しい躍動感……はぁぁぁ……たまらない……！」"
translation = "「아름다워……! 아아, 진정 아름다워……! 단호한 대비…… 싱그러운 역동감…… 하아아…… 참을 수 없군요……!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「こちらの絵は……おお、圧倒されますね……ただ息を呑むばかりです……！\u3000この美しさ、時が止まったような錯覚すら覚える……！」"
translation = "「이 그림은…… 오오, 압도되는군요…… 그저 숨을 삼킬 뿐입니다……! 이 아름다움, 시간이 멈춘 것 같은 착각마저 들 정도예요……!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「この彫像と向き合うと、言葉を失ってしまいますね……万の言葉を並び立てようとも、この美の全てを表現できそうもありません……！」"
translation = "「이 조각상과 마주하면 할 말을 잃게 되네요…… 수만 가지 말을 늘어놓아도 이 아름다움의 모든 것을 표현할 수 없을 것 같습니다……!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「繊細でありながら大胆なタッチ……この絵画の一筆一筆に心が奪われますね……甘美な夢の中にでもいるようです」"
translation = "「섬세하면서도 대담한 터치…… 이 회화의 한 획 한 획에 마음을 빼앗기는군요…… 감미로운 꿈속에라도 있는 기분이에요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「はぁっ……はぁっ……いやはや、申し訳ない。あまりの素晴らしさに、声にして想いを紡がなくては、感動を抑えられそうになくてね」"
translation = "「하앗…… 하앗…… 이거 참, 죄송합니다. 너무나도 훌륭해서 목소리를 내어 마음을 엮지 않으면 감동을 억누를 수 없을 것 같아서요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「常に発散していないと、思わず壊したくなる美しさなもので……ふぅぅ……体が、疼きますね……！」"
translation = "「계속 발산하지 않으면 나도 모르게 부수고 싶어지는 아름다움이라서…… 후우…… 몸이 근질거리네요……!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「少しくらい……バレない範囲でもダメですかね」"
translation = "「조금 정도는…… 들키지 않는 범위 내에서도 안 될까요?」"

[[dialogue]]
speaker = "unk"
original = "ダメだからね"
translation = "안 되니까 말이지"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「わかっていますよ、会長さん。いくら私でもそこまで分別がつかないわけでは――おおっ、手が勝手に！？」"
translation = "「알고 있어요, 회장님. 아무리 저라도 그 정도로 분별이 없는 건―― 오옷, 손이 멋대로!?」"

[[dialogue]]
speaker = "unk"
original = "絶対ダメだからね！？"
translation = "절대 안 된다니까!?"

[[dialogue]]
speaker = "unk"
original = "その後もずっと、感動に打ち震えていたヴァレリーだが。"
translation = "그 후로도 계속 감동에 몸을 떨고 있던 발레리였지만."

[[dialogue]]
speaker = "unk"
original = "うっかり破壊行動に出てしまわないか気が気ではなく、じっくり観賞するところではなかった。"
translation = "무심코 파괴 행동을 저질러버리지 않을까 노심초사하느라 느긋하게 감상할 상황이 아니었다."

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ああ……ビューティフル……アメージング……マーベラス……！\u3000今回の展示も素晴らしく、私のコレクションに加えたいものばかりでした……！」"
translation = "「아아…… 뷰티풀…… 어메이징…… 마벨러스……! 이번 전시도 훌륭해서 제 컬렉션에 추가하고 싶은 것들뿐이었어요……!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「はぁっ……はぁっ……ああ、脳が大変幸せになりました。ドーパミンが出っ放しですよ……！」"
translation = "「하앗…… 하앗…… 아아, 뇌가 무척 행복해졌습니다. 도파민이 계속 뿜어져 나오고 있어요……!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「手土産に絵葉書を購入しましたが、やはり、生でなくてはあの感動は得られませんね。いつかはキサナやリーナも連れてきたいものです」"
translation = "「기념품으로 그림 엽서를 샀지만 역시 직접 보지 않으면 그 감동은 얻을 수 없네요. 언젠가는 키사나나 리나도 데려오고 싶군요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「会長さんが傍にいてくれたおかげで、破壊衝動を堪えることができましたよ。これからも美術館に赴く際には是非ともお付き合いいただきたいですね」"
translation = "「회장님이 곁에 있어 준 덕분에 파괴 충동을 견뎌낼 수 있었습니다. 앞으로도 미술관에 갈 때는 부디 함께해 주셨으면 하네요」"

[[dialogue]]
speaker = "unk"
original = "いつからそんな衝動を抱えるように……？"
translation = "언제부터 그런 충동을 품게 된 거야……?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「おや、女の口から性癖を語らせようとは……」"
translation = "「오라, 여자의 입으로 성벽을 이야기하게 만들다니……」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「なるほど、それこそがあなたの性癖なのですね？\u3000いい趣味をお持ちだ、フフフ<emoji=heart04>」"
translation = "「과연, 그것이야말로 당신의 성벽인 거군요? 좋은 취미를 가지고 계시네요, 후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「デートに付き合っていただいたお礼です。お話しするとしましょう」"
translation = "「데이트에 어울려 주신 보답입니다. 이야기해 드리도록 하죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「あなたの期待に応えられるような愉快なものでもないと思いますがね」"
translation = "「당신의 기대에 부응할 만한 유쾌한 이야기도 아닐 거라 생각하지만요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ふむ……少し場所を変えましょうか。街中で話すには少々刺激の強い話ですから」"
translation = "「흠…… 장소를 좀 옮길까요. 거리에서 이야기하기에는 조금 자극이 강한 이야기니까요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「赤の他人に聞かれたら、怪訝や侮蔑の視線を向けられることでしょう」"
translation = "「생판 남이 들으면 의아함이나 멸시의 시선을 보내오겠죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「もっとも、私はその手の視線も快感に置換できますがね、フフフ」"
translation = "「물론 저는 그런 종류의 시선도 쾌감으로 치환할 수 있습니다만, 후후후」"

[[dialogue]]
speaker = "unk"
original = "変態だーっ！？"
translation = "변태다아!?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「そんな罵りの言葉も、私にとっては立派なご褒美です、フフフフフ<emoji=heart04>」"
translation = "「그런 욕설도 제게는 훌륭한 포상입니다, 후후후후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "このヴァレリーをもってして『刺激が強い』とは、いったいどんな話をするつもりなのか。"
translation = "발레리 입에서조차 『자극이 강하다』고 할 정도면 대체 어떤 이야기를 할 생각인 걸까."

[[dialogue]]
speaker = "unk"
original = "確かに興味をそそられはするけれど、これは俺の性癖ではない……と思う。"
translation = "확실히 흥미가 생기긴 하지만 이건 내 성벽이 아니라고…… 생각한다."

