[[dialogue]]
speaker = "unk"
original = "第１１話,魔女たちの誇り,B"
translation = "제11화, 마녀들의 긍지, B"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「我々が危惧しているのは今代のリクリエの特殊性だ。過去の記録には一切見られなかったものが、今回にはある」"
translation = "「우리가 우려하고 있는 것은 이번 세대 리크리에의 특수성이다. 과거 기록에는 일절 보이지 않았던 것이, 이번에는 있다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「過去になかったもの……？\u3000って？」"
translation = "「과거에 없었던 것……? 이라는 건?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あの、仮面の少女だ」"
translation = "「저, 가면의 소녀다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「リクリエは本来ただの自然現象だ。意志を持つ使徒が現れるなど前例がない」"
translation = "「리크리에는 본래 단순한 자연 현상이다. 의지를 가진 사도가 나타나는 것은 전례가 없다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「前例……ですか」"
translation = "「전례……입니까」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。魔女の森にはこう伝えられている──リクリエとは、終焉をもたらす天災であるとな」"
translation = "「아아. 마녀의 숲에는 이렇게 전해지고 있다── 리크리에란, 종말을 가져오는 천재라고 말이지」"

[[dialogue]]
speaker = "unk"
original = "確かに、フィーニスの塔で見て回った壁画の中には……"
translation = "확실히, 피니스의 탑에서 둘러본 벽화 속에는……"

[[dialogue]]
speaker = "unk"
original = "戦争や破滅の竜なんかの描写こそあれ、使徒なる存在は描かれていなかった。"
translation = "전쟁이나 파멸의 용 같은 묘사는 있을지언정, 사도라는 존재는 그려져 있지 않았다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「『モンスター』というのもそうだ。あれは本来、三界のどこにも生息していないはずの存在──<b>今回の</b>リクリエが生み出したバグのようなもの」"
translation = "「『몬스터』라는 것도 그렇다. 그것은 본래, 삼계의 어디에도 서식하고 있지 않을 터인 존재── <b>이번</b> 리크리에가 만들어낸 버그와 같은 것」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それを、あの仮面の少女が操っていたというのだから──おおよその因果は繋がっていよう」"
translation = "「그것을, 저 가면의 소녀가 조종하고 있었다고 하니── 대략적인 인과는 연결되어 있을 것이다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「モンスターも……イレギュラーな存在というのですか」"
translation = "「몬스터도…… 이레귤러한 존재라는 말씀이십니까」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「加えて言えば、魔王を敵視するような言動も意味深です。なにせ魔王が英雄というのは<b>前回</b>の結果ですから」"
translation = "「덧붙여 말하자면, 마왕을 적대시하는 듯한 언동도 의미심장합니다. 왜냐하면 마왕이 영웅이라는 것은 <b>이전</b>의 결과이니까요」"

[[dialogue]]
speaker = "unk"
original = "彼女たちはアポロを前もって警戒していた。"
translation = "그녀들은 아폴로를 미리 경계하고 있었다."

[[dialogue]]
speaker = "unk"
original = "数万年の歴史を持つ魔女をして、由縁のわからない存在であると。"
translation = "수만 년의 역사를 가진 마녀로 하여금, 연유를 알 수 없는 존재라고."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「我々はあの少女が<b>どこから来て</b>、<b>どこへ行くのか</b>に着目している。すると期せずして今日、ヒントになりそうな言葉を得た」"
translation = "「우리는 저 소녀가 <ruby>어디서 왔고<rt>・・・ ・・</rt></ruby>, <ruby>어디로 갈지<rt>・・・ ・・</rt></ruby>에 주목하고 있다. 그러자 뜻하지 않게 오늘, 힌트가 될 만한 말을 얻었다」"

[[dialogue]]
speaker = "unk"
original = "そしてセドナさんは、ニヤリと笑ってフィオナを見た。"
translation = "그리고 세드나 씨는, 히죽 웃으며 피오나를 보았다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「あれは──はて、何だったかな？\u3000星見の少女」"
translation = "「그것은── 허허, 무엇이었더라? 호시미의 소녀」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「フィオナ……」"
translation = "「피오나……」"

[[dialogue]]
speaker = "unk"
original = "セドナさんに問い詰められ、フィオナはわずかに逡巡した。"
translation = "세드나 씨에게 추궁당하자, 피오나는 잠시 망설였다."

[[dialogue]]
speaker = "unk"
original = "彼女の出自と本名──"
translation = "그녀의 출신과 본명──"

[[dialogue]]
speaker = "unk"
original = "それからアポロが本物の『星見フィオナ』を模していることを、俺たちは彼女から直接聞いて知っている。"
translation = "그리고 아폴로가 진짜 『호시미 피오나』를 모방하고 있다는 것을, 우리는 그녀에게서 직접 듣고 알고 있다."

[[dialogue]]
speaker = "unk"
original = "ネビュラの方々も彼女が『姉さん』と呼んだのを見ていたのだろう。"
translation = "네뷸라 분들도 그녀가 『언니』라고 부르는 것을 보았을 것이다."

[[dialogue]]
speaker = "unk"
original = "そのことを聞き出そうとしているのだ。"
translation = "그 사실을 캐내려 하고 있는 것이다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「どうした。あれの見てくれについて覚えはないか？」"
translation = "「왜 그러나. 저것의 겉모습에 대해 아는 바는 없나?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ、そうですね──」"
translation = "「네, 그렇네요──」"

[[dialogue]]
speaker = "unk"
original = "フィオナもまた迷っている。"
translation = "피오나 역시 망설이고 있다."

[[dialogue]]
speaker = "unk"
original = "助けてもらった恩義と、これまでずっと隠してきた秘密とのどちらを取るかで。"
translation = "도움을 받은 은혜와, 지금까지 계속 숨겨왔던 비밀 중 어느 쪽을 택할지."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（──）"
translation = "（──）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（……！\u3000緋宮会長……）"
translation = "（……! 히노미야 회장님……）"

[[dialogue]]
speaker = "unk"
original = "その折──俺は彼女に目配せした。"
translation = "그 순간── 나는 그녀에게 눈짓을 보냈다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（まだ明かすべきじゃない。この人たちが信を置ける存在かどうか判断できるまでは）"
translation = "（아직 밝혀서는 안 돼. 이 사람들이 신뢰할 수 있는 존재인지 판단할 수 있을 때까지는）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（……わかりました）"
translation = "（……알겠습니다）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あいにくですが……私たちがあの少女と交戦したのは、今回が初めてで。新星さんは二度目だったようなのですが」"
translation = "「유감스럽지만…… 저희가 그 소녀와 교전한 것은, 이번이 처음이라서요. 신성 씨는 두 번째였던 것 같습니다만」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「『仮面の少女』に関しては──手がかりになるようなことは知りません」"
translation = "「『가면의 소녀』에 관해서는── 단서가 될 만한 것은 모릅니다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……何もわからない、と？」"
translation = "「……아무것도 모른다, 고?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい」"
translation = "「네」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そんな……！」"
translation = "「이럴 수가……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふーむ。君が姉さんと口走っていたのは──我々の聞き間違いだったとでも？」"
translation = "「흐음. 네가 언니라고 말했던 것은── 우리가 잘못 들은 것이라고라도 할 셈인가?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「後ろ姿が少々似ていたので……それに、私の姉ならあんなに小さくありません」"
translation = "「뒷모습이 조금 닮았었기 때문에…… 게다가, 제 언니라면 저렇게 작지 않습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「フィオナさん。あなたには先ほどまで、使い魔がついていたとお見受けしますが……あれは？」"
translation = "「피오나 씨. 당신에게는 방금 전까지, 사역마가 붙어 있었다고 보입니다만…… 그것은요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「彼には休んでいてもらっています。長時間の戦闘を終えたばかりなので」"
translation = "「그에게는 쉬고 있으라고 했습니다. 장시간의 전투를 막 마쳤기 때문에요」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（そういえば）"
translation = "（그러고 보니）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（静かだと思った）"
translation = "（조용하다고 생각했다）"

[[dialogue]]
speaker = "unk"
original = "この基地に入る直前からニャリオンの姿はなかった。"
translation = "이 기지에 들어오기 직전부터 냐리온의 모습은 없었다."

[[dialogue]]
speaker = "unk"
original = "どんな時でも一緒にいるのが彼女たちだったが……フィオナの警戒心のあらわれなのだろうか。"
translation = "어떤 때라도 함께 있는 것이 그녀들이었지만…… 피오나의 경계심의 발로인 것일까."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ごめんなさい。ですが、私たちもまだ混乱しているのです」"
translation = "「죄송합니다. 하지만, 저희도 아직 혼란스러운 상태입니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、そうね。あんなのは私たちも初めて見たわ」"
translation = "「후후, 그렇지. 저런 건 우리도 처음 봤어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「確かに！\u3000あのでっかい手は、前回戦った時も出てこなかったわ！」"
translation = "「확실히! 저 거대한 손은, 이전에 싸웠을 때도 나오지 않았어!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「手だけであんなに大っきいってことは……ほ、本体はどんな大きさなんでしょう。ひええ」"
translation = "「손만으로 그렇게 크다는 건…… 호, 본체는 얼마나 클까요. 히이익」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「本体が潜んでてもおかしくない……確かにいい着眼点」"
translation = "「본체가 숨어 있어도 이상하지 않네요…… 확실히 좋은 착안점입니다」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの助け舟でやや話題がアポロから逸れる。"
translation = "사샤 씨의 도움으로 화제가 다소 아폴로에게서 벗어난다."

[[dialogue]]
speaker = "unk"
original = "あの『手』に関しては、俺も思うところがあるものの……"
translation = "그 『손』에 관해서는, 나도 생각하는 바가 있지만……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま、それにほら。原則うちらって他の組織にペラペラ喋っていいわけじゃないしね」"
translation = "「뭐, 게다가 이것 봐. 원칙적으로 우리들은 다른 조직에 술술 말해도 되는 건 아니잖아」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうだったのですか？」"
translation = "「그랬던 것입니까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「情報統制。当然」"
translation = "「정보 통제. 당연합니다」"

[[dialogue]]
speaker = "unk"
original = "実際それもある。"
translation = "실제로 그것도 있다."

[[dialogue]]
speaker = "unk"
original = "この『ネビュラ』という組織──確かに俺たちも知らない超大な力を持っているが、だからといって任務で得た情報をすぐに共有はできない。"
translation = "이 『네뷸라』라는 조직── 확실히 우리도 모르는 초월적인 힘을 가지고 있지만, 그렇다고 해서 임무로 얻은 정보를 바로 공유할 수는 없다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「つまり結局……何も喋れない、と？」"
translation = "「즉 결국…… 아무것도 말할 수 없다, 는 것입니까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あくまで、今は──ですが」"
translation = "「어디까지나, 지금은── 그렇습니다만」"

[[dialogue]]
speaker = "unk"
original = "本当に彼女らが信頼できる仲間であれ、どうであれ。"
translation = "정말로 그녀들이 신뢰할 수 있는 동료이든, 아니든."

[[dialogue]]
speaker = "unk"
original = "強引にねぐらへ連れ込まれた今の状況で身の上を開示するのは──避けるのが懸命と言えた。"
translation = "억지로 소굴로 끌려 들어온 지금 상황에서 신상을 공개하는 것은── 피하는 것이 현명하다고 할 수 있었다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ふう……困りましたね。我々は敵ではないと、わかってもらえたと思うのですが」"
translation = "「후…… 곤란하네요. 저희는 적이 아니라는 것을, 이해해 주셨을 거라고 생각하는데요」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そうとも。同志と言ったろう、この世界を救いたいという気持ちは君たちと同じだ」"
translation = "「그렇고말고. 동지라고 말했잖나, 이 세계를 구하고 싶다는 마음은 너희들과 같다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おおっ、素晴らしい理念です！」"
translation = "「오옷, 훌륭한 이념입니다!」"

[[dialogue]]
speaker = "unk"
original = "確かにその一点は俺たちと同じだ。"
translation = "확실히 그 한 가지 점은 우리와 같다."

[[dialogue]]
speaker = "unk"
original = "だが、これまでの発言を踏まえるに総体としてのスタンスは矛盾している。"
translation = "하지만, 지금까지의 발언을 미루어 볼 때 총체적인 스탠스는 모순된다."

[[dialogue]]
speaker = "unk"
original = "彼女たちはまだ何かを隠している──何もかもを明かすのは、早計だ。"
translation = "그녀들은 아직 무언가를 숨기고 있다── 모든 것을 밝히는 것은, 섣부르다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ならば、魔王。君はどうだ？\u3000共に力を合わせようとは思わんか？」"
translation = "「그렇다면, 마왕. 너는 어떤가? 함께 힘을 합치려고 생각하지 않나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「思います。ですが……」"
translation = "「그렇게 생각합니다. 하지만……」"

[[dialogue]]
speaker = "unk"
original = "平然と俺のことを魔王呼ばわりしてくる──"
translation = "태연하게 나를 마왕이라고 부른다──"

[[dialogue]]
speaker = "unk"
original = "あの壁画の真実も、もしや承知の上なのかもしれない。"
translation = "그 벽화의 진실도, 혹시 알고 있는 것일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "俺はあくまでも知らない体を装って話を進めた。"
translation = "나는 어디까지나 모르는 척하며 이야기를 진행했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ひとつお訊ねします」"
translation = "「……하나 여쭙겠습니다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いいだろう」"
translation = "「좋다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「先ほど──あなた達『ネビュラ』は俺たちの活動を観測していた、と仰っしゃりましたね」"
translation = "「방금 전── 당신들 『네뷸라』는 우리의 활동을 관측하고 있었다고 말씀하셨죠」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「はい」"
translation = "「네」"

[[dialogue]]
speaker = "unk"
original = "こくり、とアイリーンさんが頷いた。"
translation = "끄덕, 하고 아이린 씨가 고개를 끄덕였다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「あなた達、星騎士──とりわけ両学園星徒会の活動については、過去の全出動を観測しています」"
translation = "「당신들, 성기사── 특히 양 학원 성도회의 활동에 대해서는, 과거의 모든 출동을 관측하고 있습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ああもちろん、ただ見ていたわけではありませんよ。あなた方のデータから次なる『計画』を練っていたのです」"
translation = "「아아 물론, 그저 보고만 있었던 것은 아닙니다. 여러분의 데이터로부터 다음 『계획』을 짜고 있었던 것입니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「もちろん、世界存続のための！\u3000ですよ」"
translation = "「물론, 세계 존속을 위한! 것입니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「すごい……学園以外にも、そんな組織がいたなんて……」"
translation = "「대단해…… 학원 외에도, 그런 조직이 있었다니……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「どこからどう観測しているのかは気になりますけど」"
translation = "「어디서 어떻게 관측하고 있는지는 궁금합니다만」"

[[dialogue]]
speaker = "unk"
original = "アイリーンさん達が嘘をついているようには見えない。"
translation = "아이린 씨 일행이 거짓말을 하고 있는 것처럼 보이지 않는다."

[[dialogue]]
speaker = "unk"
original = "だから、信じたい気持ちも山々なのだけど……確かめなくてはならないことがあった。"
translation = "그래서, 믿고 싶은 마음도 굴뚝같지만…… 확인해야만 하는 것이 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ならお分かりかと思いますが、これまで俺たちの活動は全てがうまくやれていたわけではありません」"
translation = "「그렇다면 아시리라 생각합니다만, 지금까지 우리의 활동은 모든 것이 잘 풀렸던 것은 아닙니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「前回のアポロ出現時には、多くの犠牲も出しました。不甲斐ないところですが」"
translation = "「이전 아폴로 출현 시에는, 많은 희생도 치렀습니다. 한심한 부분입니다만」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そのようですね。あれほどの相手にしては、少ない被害に抑えたとも言えそうですが」"
translation = "「그런 것 같네요. 저 정도의 상대치고는, 적은 피해로 막았다고도 할 수 있겠습니다만」"

[[dialogue]]
speaker = "unk"
original = "アステラ、モンスター、流星の嵐……"
translation = "아스테라, 몬스터, 유성의 폭풍……"

[[dialogue]]
speaker = "unk"
original = "数々の苦難に見舞われて、ピンチに陥ったのも一度や二度じゃない。"
translation = "수많은 고난을 겪고, 위기에 빠진 것도 한두 번이 아니다."

[[dialogue]]
speaker = "unk"
original = "それを彼女たちが知っているというのなら、疑問がある。"
translation = "그것을 그녀들이 알고 있다고 한다면, 의문이 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なぜ、今回に限って俺たちを助けてくれたんですか？」"
translation = "「왜, 이번에 한해서 우리를 도와준 겁니까?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「それは……」"
translation = "「그것은……」"

[[dialogue]]
speaker = "unk"
original = "単純な問いかけだった。"
translation = "단순한 질문이었다."

[[dialogue]]
speaker = "unk"
original = "セドナさんも、当然とばかりに答える。"
translation = "세드나 씨도, 당연하다는 듯이 대답한다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「決まっている。君たちは使える。失うには早いと判断しただけのこと」"
translation = "「정해져 있다. 너희들은 쓸모 있다. 잃기에는 이르다고 판단했을 뿐이다」"

[[dialogue]]
speaker = "unk"
original = "今回ばかりは手助けせざるを得ないピンチだったというセドナさん。"
translation = "이번만큼은 도와줄 수밖에 없는 위기였다는 세드나 씨."

[[dialogue]]
speaker = "unk"
original = "そして事実、俺たちは命を救われたわけだ。"
translation = "그리고 사실, 우리는 목숨을 구원받은 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その評価は光栄なこと──ですが」"
translation = "「그 평가는 영광스러운 일── 입니다만」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「星騎士じゃないフツーの人たちのことは、どうでもいいってコトなのかな？」"
translation = "「성기사가 아닌 평범한 사람들에 대해서는, 아무래도 상관없다는 건가?」"

[[dialogue]]
speaker = "unk"
original = "セーラさんが俺の訊きたいことを汲んでくれた。"
translation = "세라 씨가 내가 묻고 싶은 것을 알아차려 주었다."

[[dialogue]]
speaker = "unk"
original = "まごつくアイリーンさんに対して、セドナさんの態度は変わらない。"
translation = "머뭇거리는 아이린 씨에 대해, 세드나 씨의 태도는 변하지 않는다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「経緯はどうあれ、リクリエの時期に人が死ぬのは避けられんことだ。どうでもいいとは言わんが、優先度が低い」"
translation = "「경위가 어떻든, 리크리에 시기에 사람이 죽는 것은 피할 수 없는 일이다. 아무래도 상관없다고는 말하지 않겠지만, 우선순위가 낮다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「自然現象と言っただろう？\u3000越冬のようなものだ──そして残念ながら、やり過ごせる穴ぐらは三界のどこにもない」"
translation = "「자연 현상이라고 말했잖나? 월동과 같은 것이다── 그리고 유감스럽게도, 무사히 넘길 수 있는 굴은 삼계 어디에도 없다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そんなっ……！\u3000皆さんのお力があれば、もっと多くの人が助けられるはずです！」"
translation = "「서, 설마……! 여러분의 힘이 있다면, 더 많은 사람이 도움을 받을 수 있을 거예요!」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お気持ちはわかりますが、それはあなた方のなすべき責務です」"
translation = "「심정은 이해합니다만, 그것은 여러분이 해야 할 책무입니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「我々はあくまでも裏方──表の秩序を守るのは、<ruby>星騎士<rt>スターナイト</rt></ruby>の領分でしょう」"
translation = "「저희는 어디까지나 뒷일── 겉의 질서를 지키는 것은, 성기사의 영역이겠지요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だ……だからって、見殺しにするなんて……」"
translation = "「그…… 그렇다고 해서, 모른 척 죽게 내버려 두다니……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうですよう！\u3000あんなに強い力があるなら、アステラの排除だってできると思います！」"
translation = "「그렇습니다요! 그렇게 강한 힘이 있다면, 아스테라의 제거도 할 수 있을 거라고 생각합니다!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「キリのない掃除に付き合わされるなど、御免だ。根本的な解決にならん」"
translation = "「끝없는 청소에 어울리는 것은 사양이다. 근본적인 해결이 되지 않아」"

[[dialogue]]
speaker = "unk"
original = "にべもない様子で突っ返すセドナさん。"
translation = "쌀쌀맞은 태도로 되받아치는 세드나 씨."

[[dialogue]]
speaker = "unk"
original = "彼女たちの力は、俺たちと同じ用途にはないと。"
translation = "그녀들의 힘은, 우리와 같은 용도에는 없다고."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それとも泣きついているのか？\u3000自分たちだけでは人間界すら守りきれぬ──と」"
translation = "「아니면 매달리고 있는 건가? 자기들만으로는 인간계조차 지켜낼 수 없다── 고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「むか！\u3000別にそんなんじゃないし！」"
translation = "「흥! 딱히 그런 거 아니거든!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なら営々と責務に励みたまえ。所詮私たちは別組織、部分的に共闘するのが関の山だ」"
translation = "「그렇다면 부지런히 책무에 힘쓰도록 해라. 어차피 우리는 별개의 조직, 부분적으로 공투하는 것이 고작이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なるほど……」"
translation = "「과연……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ならやっぱり、あなた達の組織は『世界存続』のために動いている」"
translation = "「그렇다면 역시, 당신들 조직은 『세계 존속』을 위해 움직이고 있군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「その通りだ」"
translation = "「그렇다」"

[[dialogue]]
speaker = "unk"
original = "なんとなく彼女たちのポリシーが判ってきた。"
translation = "어쩐지 그녀들의 방침을 알 것 같았다."

[[dialogue]]
speaker = "unk"
original = "つまり彼女たちは『世界の存亡』のためには働くものの、『生命の存亡』までは興味がないと。"
translation = "즉 그녀들은 『세계의 존망』을 위해서는 일하지만, 『생명의 존망』까지는 관심이 없다고."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「別にあなた方が人命救助を行うのを咎めるつもりもありません。適材適所というまでです」"
translation = "「딱히 여러분이 인명 구조를 하는 것을 탓할 생각도 없습니다. 적재적소라고 할 뿐입니다」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ま、確かにこっちから強制できる義理もないけどさ」"
translation = "「뭐, 확실히 이쪽에서 강제할 의무도 없지만」"

[[dialogue]]
speaker = "unk"
original = "俺たちとしても『ネビュラ』にどうこう言える権利はない。"
translation = "우리로서도 『네뷸라』에게 이래라저래라 할 권리는 없다."

[[dialogue]]
speaker = "unk"
original = "だが組織としてのスタンスが違う彼女らに、どこまで懐を開いてよいものか──"
translation = "하지만 조직으로서의 입장이 다른 그녀들에게, 어디까지 속마음을 터놓아야 할지──"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「！\u3000これは……？」"
translation = "「! 이건……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、私らの連絡だ。もっしもーし」"
translation = "「아, 우리 연락이다. 여보세요」"

[[dialogue]]
speaker = "unk"
original = "そこへ、俺たち全員のＤＩＳＣ連絡が再び鳴った。"
translation = "그때, 우리 모두의 디스크 연락이 다시 울렸다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『こちらセイファート。聞こえるかね、星徒会メンバー諸君』"
translation = "『여기는 세이퍼트. 들리는가, 성도회 멤버 제군』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい、学園長。どうぞ」"
translation = "「네, 학원장. 말씀하세요」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "『星力の復旧が確認されたのは既に連絡したことかと思う。本件にあたり緊急会議を開くため、ただちに学園まで帰還せよ』"
translation = "『성력의 복구가 확인된 것은 이미 연락했을 것이라 생각한다. 본 건에 대해 긴급 회의를 열기 위해, 즉시 학원까지 귀환하라』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「了解です。メンバー総員、至急帰還いたします」"
translation = "「알겠습니다. 멤버 전원, 지체 없이 귀환하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣの連絡が切れる。"
translation = "디스크의 연락이 끊긴다."

[[dialogue]]
speaker = "unk"
original = "今の連絡は、俺たち全員へ向けての帰還命令だった。"
translation = "지금의 연락은, 우리 모두를 향한 귀환 명령이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「申し訳ありません。そういうことなので」"
translation = "「죄송합니다. 그런 이유로」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「……このまま帰ると言うのですか」"
translation = "「……이대로 돌아가겠다는 말씀이십니까」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「命令だもの、ちょっと戻るだけよ♪」"
translation = "「명령인걸, 잠깐 돌아가는 것뿐이야♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それに──助けてくれたことは感謝してるわ。だけど、私たちもまだ整理がついてないから」"
translation = "「게다가── 도와준 건 감사하고 있어. 하지만, 우리도 아직 정리가 안 됐으니까」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスがあっけなく席を立ったことで、俺たちも揃ってそれに続いた。"
translation = "비너스가 싱겁게 자리에서 일어남으로써, 우리도 모두 이어서 일어섰다."

[[dialogue]]
speaker = "unk"
original = "たぶん彼女は素でああ言っているだけなのだが、結果的にけっこう舌が回っている。"
translation = "아마 그녀는 본심으로 저렇게 말하고 있을 뿐이겠지만, 결과적으로 꽤나 능숙하게 상황을 처리하고 있다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「まだあなた方の持つ情報について聞けていません」"
translation = "「아직 여러분이 가진 정보에 대해 듣지 못했습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すみません。ヴィーナスの言う通り、俺たちもまだ不確定なことが多いので」"
translation = "「죄송합니다. 비너스가 말한 대로, 저희도 아직 불확실한 점이 많아서요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それに……<ruby>星騎士<rt>スターナイト</rt></ruby>はこの三界と、そこにいる命を守るために動いています。俺たちの目的は似ているようで違うものかと」"
translation = "「게다가…… 성기사는 이 삼계와, 그곳에 있는 생명을 지키기 위해 움직이고 있습니다. 저희의 목적은 비슷한 듯 다른 것이라고 생각합니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ふ……ええ、そうですね。私たちはあなた方ほど夢見がちじゃありません」"
translation = "「후…… 네, 그렇군요. 저희는 여러분만큼 몽상가 같지 않습니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「かつて同じようなことを言って、何度も文明が滅んできた歴史を……魔女はずっと見てきていますから」"
translation = "「이전에 같은 말을 하고, 몇 번이고 문명이 멸망해 온 역사를…… 마녀는 계속 지켜봐 왔으니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「アイリーンさん……？」"
translation = "「아이린 씨……?」"

[[dialogue]]
speaker = "unk"
original = "遠い目をするアイリーンさん。"
translation = "먼 곳을 바라보는 아이린 씨."

[[dialogue]]
speaker = "unk"
original = "残る問題は、彼女の上司であるセドナさんだったが──"
translation = "남은 문제는, 그녀의 상사인 세드나 씨였는데──"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……やれやれ、仕方ないな。君たちの決意は本物らしい」"
translation = "「……에휴, 어쩔 수 없군. 너희들의 결의는 진짜인 모양이다」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺たちの<ruby>眦<rt>まなじり</rt></ruby>を見ると、肩をすくめて笑った。"
translation = "그녀는 우리의 눈꼬리를 보더니, 어깨를 으쓱하며 웃었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゃあ……」"
translation = "「그럼……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。では、気をつけてお帰り願おう──」"
translation = "「아아. 그럼, 조심히 돌아가 주길 바라지──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「っ！？」"
translation = "「──읏!?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──などと、甘えた態度を許すとでも？」"
translation = "「──라니, 나약한 태도를 용서할 것 같으냐?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──何のつもり！？」"
translation = "「──무슨 속셈이야!?」"

[[dialogue]]
speaker = "unk"
original = "各所に潜んでいたネビュラの兵士たちが揃って俺たちに銃口を突きつける。"
translation = "곳곳에 숨어 있던 네뷸라의 병사들이 일제히 우리에게 총구를 겨눈다."

[[dialogue]]
speaker = "unk"
original = "先ほどから視線を感じてはいたが……想定していたより多い。"
translation = "아까부터 시선을 느끼고는 있었지만…… 예상했던 것보다 많다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「使えるから生かしたと言っただろう。我々も善意で助けたわけではないのだよ」"
translation = "「쓸모가 있으니 살려뒀다고 말했잖나. 우리도 선의로 도와준 것은 아니야」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まあ、それにしてもふん縛るような趣味はない。多少の気概を見せるなら帰してやるさ」"
translation = "「뭐, 그렇다고 해도 꽁꽁 묶어둘 취미는 없다. 약간의 기개를 보여준다면 돌려보내 주지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「戦え──ってこと……！？」"
translation = "「싸우라는── 거……!?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「何、ちょっとしたテストだ。我々としても、使えん仲間なら願い下げだからな」"
translation = "「뭐, 사소한 시험이다. 우리로서도, 쓸모없는 동료라면 사양이니까」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんつー日だよ、ったく……もう散々消耗してるっつーのによ」"
translation = "「이런 날이 다 있냐, 정말…… 이미 실컷 소모하고 있는데 말이야」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「勝手に連れてきたくせに、強引よね～」"
translation = "「멋대로 데려와 놓고, 억지네」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「遊んでやれ、アイリーン。私は姫のところへ向かう」"
translation = "「상대해 줘라, 아이린. 나는 공주가 있는 곳으로 향하겠다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「イエス、マム。総員──構え！」"
translation = "「예스, 마님. 전원── 자세!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「本気みたいね──！」"
translation = "「진심인 모양이네──!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「仕方ありません。お相手しましょう」"
translation = "「어쩔 수 없습니다. 상대해 드리겠습니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「行くぞ、皆！」"
translation = "「간다, 모두!」"

