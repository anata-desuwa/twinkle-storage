[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「カフェテリアは追い出されちまいましたけど、そんなことでへこたれる私じゃありませんわ！」"
translation = "「카페테리아에서는 쫓겨나 버렸지만, 그런 일로 꺾일 제가 아니랍니다!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「パンプキンボックスもガムテープで修理しましたし、新たに場所も確保しました……再起の準備は整いましたわ！」"
translation = "「펌킨 박스도 테이프로 수리했고, 새로운 장소도 확보했어요…… 재기의 준비는 끝났답니다!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「さあさあ、道往くみなさま方！\u3000じゃぶじゃぶお金を使っていってくださいまし！」"
translation = "「자자, 길을 지나는 여러분! 펑펑 돈을 써주세요!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「おっ、あそこに格好の獲物を発見だし♪」"
translation = "「엇, 저기에 딱 좋은 먹잇감 발견이라구♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「挫けずここで商売してるみたいですね」"
translation = "「굴하지 않고 여기서 장사를 하고 있나 보네요.」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「何をするつもりだゆ？」"
translation = "「뭘 할 생각인 거냐유?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ソフィの戦闘服の能力に姿を消せるっていうのがあるみたいじゃない？\u3000だから姿を消してこっそり近づいて驚かすし♪」"
translation = "「소피의 전투복 능력 중에 모습을 감추는 게 있는 것 같잖아? 그러니까 모습을 감추고 몰래 다가가서 놀라게 해주자구♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「面白そうゆ！」"
translation = "「재밌을 것 같다유!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こっそり近づいて、どんな風に驚かせばいいんですか？」"
translation = "「몰래 다가가서, 어떤 식으로 놀라게 하면 될까요?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あの人の耳元でこう囁くし……いちま～い、にま～い……いちまいたりな～い」"
translation = "「저 사람 귓가에서 이렇게 속삭이는 거야…… 한 장~ 두 장~ 한 장이 모자라~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それは全然ハロウィンじゃないんですけど……」"
translation = "「그건 전혀 할로윈이 아닌 것 같습니다만……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「でも、斬新な感じがしていいゆ！\u3000それでいくゆ！」"
translation = "「하지만 참신한 느낌이 들어서 좋다유! 그걸로 가자유!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「分かりました。やるからには全力で驚かしてきましょう。ふっふっふ……」"
translation = "「알겠습니다. 하는 이상 전력으로 놀라게 해주죠. 훗훗훗……」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほほほ、収益も上々ですわ！\u3000やっぱりハロウィンはかき入れ時、お金が稼げてたまりませんわ！」"
translation = "「호호호, 수익도 아주 좋네요! 역시 할로윈은 대목, 돈을 벌 수 있어서 참을 수가 없어요!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「さてと、周りには誰もいませんわね？\u3000どれだけ稼げたかちょっと数えてみますの」"
translation = "「어디 보자, 주변에 아무도 없죠? 얼마나 벌었는지 좀 세어볼게요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いちま～い」"
translation = "「한 장~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「いちま～い」"
translation = "「한 장~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「にま～い」"
translation = "「두 장~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「にま～い」"
translation = "「두 장~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「もう、なんなんですの！\u3000そんなスローペースで数えてたら日が暮れてしまいますの！」"
translation = "「정말, 뭐 하시는 거예요! 그런 느릿느릿한 속도로 세고 있으면 해가 저물어버린다구요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いちまいたりな～い」"
translation = "「한 장이 모자라~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「た、足りないですの！？\u3000そんなまさか、数え間違いじゃありませんの！？」"
translation = "「모, 모자라다구요!? 그럴 리가, 잘못 센 거 아니에요!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「たりな～い、どこかに落ちてるかもしれないからさが～す」"
translation = "「모자라~ 어딘가 떨어져 있을지도 모르니까 찾을 거야~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「分かりましたわ！\u3000この辺りですの？\u3000それともこの辺りですの？」"
translation = "「알겠어요! 이 근처인가요? 아니면 이 근처인가요?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「うらめしゆーーー！！！」"
translation = "「원망스럽다유---!!!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほぎゃーーーーーーーっ！！！！」"
translation = "「호갸-------!!!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ちょっと、なんですか！\u3000せっかく私が情緒たっぷりにイタズラしていたというのに！」"
translation = "「잠깐, 뭐예요! 기껏 제가 정취 있게 장난을 치고 있었는데!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あはは。ゆゆ姫ちゃんが自分もやりたいって言うから」"
translation = "「아하하. 유유히메 짱이 자기도 하고 싶다고 해서.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「でもゆゆ姫ちゃん、お菊さんはもっとウラメシー感じでやらなきゃだよ？」"
translation = "「하지만 유유히메 짱, 오키쿠 상은 좀 더 원망스러운 느낌으로 해야 한다구?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆー、よくわからないゆ……」"
translation = "「유-, 잘 모르겠다유……」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ちょ！\u3000誰かと思ったらまたあなたたちですの！」"
translation = "「저기! 누군가 했더니 또 당신들인가요!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「イタズラしにきたんだよ。トリックオアトリート♪」"
translation = "「장난치러 왔어. 트릭 오어 트릿♪」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「まったく……おったまげて心臓が止まるかと思ったですわ！」"
translation = "「정말이지…… 깜짝 놀라서 심장이 멈추는 줄 알았다구요!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「あら？\u3000ソフィア様の声が聞こえたと思ったのですが……姿が見えませんわね？」"
translation = "「어라? 소피아 님의 목소리가 들린 것 같았는데…… 모습이 안 보이네요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「うらめしや～」"
translation = "「원망스러워라~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほげぇーーーーっ！！！\u3000お、お化けーーーーーっ！！！」"
translation = "「호게에----!!! 귀, 귀신이다-----!!!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふふふ、お化けではなく私でした♪\u3000お菓子をくれないとイタズラしてしまいますよ？」"
translation = "「후후후, 귀신이 아니라 저였답니다♪ 과자를 주지 않으면 장난칠 거예요?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「す、姿を消してたんですの？\u3000いつの間にそんな能力を……」"
translation = "「모, 모습을 감추고 있었던 건가요? 어느 틈에 그런 능력을……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「実は──」"
translation = "「사실은──」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「なるほど……その格好は仮装ではなかったですのね？」"
translation = "「과연…… 그 모습은 가장이 아니었군요?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「それで、そのフォームを解除するために、先程からいろいろ動き回っていた、と……」"
translation = "「그래서 그 폼을 해제하기 위해 아까부터 여러 가지로 돌아다니고 있었던 거군요……」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ですが、ふっ──まだまだですわ。そんな素晴らしい能力を持ちながら、この程度のイタズラしか考えつかないなんて」"
translation = "「하지만, 훗── 아직 멀었네요. 그런 훌륭한 능력을 가지고 있으면서 이 정도 수준의 장난밖에 생각 못 하다니.」"

[[dialogue]]
speaker = "unk"
original = "特大の悲鳴を上げてたのによく言う"
translation = "특대급 비명을 질러놓고 잘도 말하네."

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「う、うるさいですわ！\u3000とにかく私も協力しますから感謝しやがれですわっ！」"
translation = "「시, 시끄러워요! 아무튼 저도 협력할 테니 감사하라구요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「別に頼んでないのに……」"
translation = "「딱히 부탁한 적 없는데……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「お願いするゆ！\u3000みんなで遊んだ方が楽しいゆ！」"
translation = "「부탁한다유! 다 같이 노는 게 더 즐겁다유!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そだね！\u3000それじゃ次のターゲットを探して、レッツゴー！」"
translation = "「그렇지! 그럼 다음 타겟을 찾아서, 레츠 고!」"

