[[dialogue]]
speaker = "unk"
original = "第１話,ロクサーナの突撃取材,P"
translation = "제1화, 록사나의 돌격 취재, P"

[[dialogue]]
speaker = "unk"
original = "この日は朝早くから、星徒会室に来客があった。"
translation = "이날은 아침 일찍부터, 성도회실에 손님이 있었다."

[[dialogue]]
speaker = "ロクサーナ"
original = "「演劇部部長ロクサーナだ！\u3000朝イチから失礼する」"
translation = "「연극부 부장 록사나다! 아침 일찍부터 실례하지」"

[[dialogue]]
speaker = "アナ"
original = "「おはようございます、ロクサーナ部長。演劇部の部費の申請ですか」"
translation = "「안녕하세요, 록사나 부장. 연극부 부비 신청인가요」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「先日の舞台では演出の都合上、セットを派手に爆破したからな。追加申請をしたいのはやまやまなのだが、今日の目的はそれじゃない。会長への取材申請だ」"
translation = "「지난번 무대에서는 연출상의 이유로 세트를 화끈하게 폭파했으니까 말이야. 추가 신청을 하고 싶은 마음은 굴뚝같지만, 오늘의 목적은 그게 아니다. 회장에 대한 취재 신청이다」"

[[dialogue]]
speaker = "unk"
original = "俺に取材？"
translation = "나에게 취재?"

[[dialogue]]
speaker = "ロクサーナ"
original = "「新星学園で最も強い男である星徒会長をモデルにした寸劇をやってほしいとリクエストがあってな」"
translation = "「신성학원에서 가장 강한 남자인 성도회장을 모델로 한 촌극을 해달라는 요청이 있어서 말이지」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「差し当たり、リアリティ追及のため、会長に密着取材をおこないたいというわけだ」"
translation = "「일단, 리얼리티 추구를 위해, 회장에게 밀착 취재를 하고 싶다는 거다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「会長、お前のできる反応は『首を縦に振る』か『ＹＥＳと言う』の２択だ。どっちを選んでも良いぞ」"
translation = "「회장, 네가 할 수 있는 반응은 『고개를 끄덕인다』 혹은 『YES라고 말한다』의 2가지 선택지뿐이다. 어느 쪽을 골라도 좋다」"

[[dialogue]]
speaker = "unk"
original = "ＹＥＳ"
translation = "YES"

[[dialogue]]
speaker = "unk"
original = "（首を縦に振る）"
translation = "(고개를 끄덕인다)"

[[dialogue]]
speaker = "ロクサーナ"
original = "「よろしい！\u3000では、早速、取材を始めさせてもらう。手始めに趣味、好きな物、癖と将来の夢はなんだ？」"
translation = "「좋아! 그럼, 지체 없이 취재를 시작하도록 하지. 우선 취미, 좋아하는 것, 버릇과 장래 희망은 뭐지?」"

[[dialogue]]
speaker = "アナ"
original = "「会長の趣味は漫画を読むことと時代劇を見ること。好きな物は和菓子ですね」"
translation = "「회장님의 취미는 만화 읽기와 시대극 보기. 좋아하는 것은 일본 과자예요」"

[[dialogue]]
speaker = "アナ"
original = "「手持ち無沙汰だと、そわそわする癖があります。ワーカーホリック気味ですね。将来の夢は立派な星騎士になること……とメモリーしています」"
translation = "「손이 심심하면, 안절부절못하는 버릇이 있습니다. 워커홀릭 기질이 있네요. 장래 희망은 훌륭한 성기사가 되는 것……이라고 메모리하고 있습니다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「……ふむ。会長、今の情報に間違いはないか？\u3000訂正する点は？」"
translation = "「……흠. 회장, 지금 정보에 틀린 건 없나? 정정할 점은?」"

[[dialogue]]
speaker = "unk"
original = "特にないです"
translation = "딱히 없어요"

[[dialogue]]
speaker = "アナ"
original = "「会長の補佐たる副会長たるもの、このくらい答えられて当然。オフコースです」"
translation = "「회장을 보좌하는 부회장으로서, 이 정도는 대답할 수 있는 게 당연. 오프코스입니다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「なるほど。会長には極めて優秀な副会長がついているのだな。重要な役どころだ。メイプルにでもやらせるとするか」"
translation = "「과연. 회장에게는 지극히 우수한 부회장이 붙어 있군. 중요한 역할이야. 메이플에게라도 시키기로 할까」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「アナ副会長、お前から見て、会長はどのような存在だ？」"
translation = "「아나 부회장, 네가 보기에 회장은 어떤 존재지?」"

[[dialogue]]
speaker = "アナ"
original = "「会長ですか。全生徒が手本とするべき、尊い存在ですね。人格、人柄、容姿、仕事ぶりなど全てにおいて、非の打ちどころがありません。パーフェクトです」"
translation = "「회장님 말인가요. 전 학생이 본보기로 삼아야 할, 고귀한 존재지요. 인격, 됨됨이, 용모, 일 솜씨 등 모든 면에서, 나무랄 데가 없습니다. 퍼펙트예요」"

[[dialogue]]
speaker = "unk"
original = "後で和菓子をあげよう"
translation = "나중에 일본 과자 줄게"

[[dialogue]]
speaker = "アナ"
original = "「ありがたき幸せ」"
translation = "「망극하옵니다」"

[[dialogue]]
speaker = "アナ"
original = "「ロクサーナ部長、取材はこれで終了でしょうか？」"
translation = "「록사나 부장, 취재는 이걸로 끝인가요?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「バカを言え。この程度の情報収集は序の口に過ぎん。密着取材はまだ始まったばかりだ。今日１日、会長と行動を共にさせてもらう」"
translation = "「바보 같은 소리 마라. 이 정도 정보 수집은 서두에 불과해. 밀착 취재는 이제 막 시작됐을 뿐이다. 오늘 하루, 회장과 행동을 같이하겠다」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ふむ。授業は極めて真面目に取り組んでいるようだな」"
translation = "「흠. 수업은 지극히 성실하게 임하고 있는 모양이군」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「昼食はハンバーグプレートか。ふむ、会長はライスを箸で食べる派なのだな」"
translation = "「점심은 함박 스테이크 플레이트인가. 흠, 회장은 밥을 젓가락으로 먹는 파로군」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「ふむふむ。星徒会の仕事ぶりは実に興味深い。星徒会各役員のキャスティングは悩ましいな」"
translation = "「흠흠. 성도회의 일 솜씨는 실로 흥미롭군. 성도회 각 임원들의 캐스팅이 고민되는걸」"

[[dialogue]]
speaker = "unk"
original = "新星星徒会、出撃する！"
translation = "신성성도회, 출격한다!"

[[dialogue]]
speaker = "unk"
original = "アステライト発生アラートだ！"
translation = "아스텔라이트 발생 알람이다!"

[[dialogue]]
speaker = "ロクサーナ"
original = "「おお！\u3000待っていたのはこの瞬間だ！」"
translation = "「오오! 기다리던 건 바로 이 순간이다!」"

[[dialogue]]
speaker = "アナ"
original = "「ロクサーナ部長、ついてくるつもりですか？」"
translation = "「록사나 부장, 따라오실 생각인가요?」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「当然だろう！\u3000千載一遇の取材チャンス！\u3000この決定的瞬間を見逃してどうする！」"
translation = "「당연하지! 천재일우의 취재 찬스! 이 결정적인 순간을 놓쳐서 어쩌겠나!」"

[[dialogue]]
speaker = "アナ"
original = "「星徒会活動は遊びではありません。極めてデンジャラスですよ」"
translation = "「성도회 활동은 장난이 아닙니다. 극히 덴저러스하다구요」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「私の取材とて遊びではない！\u3000取材が危険と隣り合わせなのは承知の上だ！」"
translation = "「나의 취재 또한 장난이 아니다! 취재가 위험과 직결되어 있다는 것쯤은 알고 있다!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「これでもプリマステラの端くれだ。己の身を護る程度の力は備わっている。心配せずとも足を引っ張るような真似も、手を煩わせるような愚行もせん」"
translation = "「이래 봬도 프리마스텔라의 일원이다. 제 몸 하나 지킬 정도의 힘은 갖추고 있지. 걱정하지 않아도 발목을 잡는 짓도, 손을 번거롭게 하는 어리석은 짓도 하지 않아」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「取材を拒否されようとも、私は私の信念で動く。神であろうが星徒会長であろうが、私の好奇心を止められる者は存在せん！」"
translation = "「취재를 거부당하더라도, 나는 나의 신념으로 움직인다. 신이든 성도회장이든, 나의 호기심을 멈출 수 있는 자는 존재하지 않아!」"

[[dialogue]]
speaker = "アナ"
original = "「会長、そちらに向かいました！」"
translation = "「회장님, 그쪽으로 갔습니다!」"

[[dialogue]]
speaker = "unk"
original = "ディマイズブレイカー！"
translation = "디마이즈 브레이커!"

[[dialogue]]
speaker = "ロクサーナ"
original = "「うむ、実に見事な手際だ。今の戦いを舞台で再現するとなると、派手なアクションが必要になる。演出泣かせだな。また舞台のひとつも爆破せねばなるまい」"
translation = "「음, 실로 훌륭한 솜씨군. 지금의 싸움을 무대에서 재현하려면, 화려한 액션이 필요하겠어. 연출가를 울리겠는걸. 또 무대 하나쯤은 폭파해야겠어」"

[[dialogue]]
speaker = "unk"
original = "無事、アステライトを制圧し、本日の星徒会業務はこれにて終了となった。"
translation = "무사히 아스텔라이트를 제압하고, 오늘의 성도회 업무는 이것으로 종료되었다."

[[dialogue]]
speaker = "アナ"
original = "「ロクサーナ部長、会長への密着取材はいかがでしたか」"
translation = "「록사나 부장, 회장님에 대한 밀착 취재는 어떠셨나요」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「退屈知らずの１日だった。新星のトップに君臨する会長の仕事とは想像以上の激務なのだな」"
translation = "「지루할 틈 없는 하루였다. 신성의 정점에 군림하는 회장의 업무란 상상 이상의 격무로군」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「会長をより深く描くとなると、とても寸劇程度の尺では足りそうにない。実に参考になった。星徒会諸君、感謝する」"
translation = "「회장을 보다 깊게 묘사하자면, 도저히 촌극 정도의 분량으로는 부족하겠어. 실로 참고가 되었다. 성도회 제군들, 감사한다」"

[[dialogue]]
speaker = "unk"
original = "演劇部部長による密着取材は終わり、それぞれが家へと帰っていった。"
translation = "연극부 부장에 의한 밀착 취재는 끝나고, 각자 집으로 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "――翌日。"
translation = "──다음 날."

[[dialogue]]
speaker = "ロクサーナ"
original = "「演劇部部長ロクサーナだ！」"
translation = "「연극부 부장 록사나다!」"

[[dialogue]]
speaker = "unk"
original = "また来た！？"
translation = "또 왔어!?"

[[dialogue]]
speaker = "アナ"
original = "「昨日で取材は終わりじゃなかったのですか」"
translation = "「어제로 취재는 끝난 게 아니었나요」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「いつ取材が終わりだと言った？\u3000寸劇程度の尺では足りないと言った覚えはあるがな！」"
translation = "「언제 취재가 끝이라고 했나? 촌극 정도의 분량으로는 부족하다고 말한 기억은 있다만!」"

[[dialogue]]
speaker = "ロクサーナ"
original = "「星徒会長を描くならば、大長編だ！\u3000今後も密着取材を敢行させてもらう！」"
translation = "「성도회장을 묘사한다면, 대장편이다! 앞으로도 밀착 취재를 감행하겠다!」"

[[dialogue]]
speaker = "unk"
original = "どうやら変わり者の脚本家の興味を惹きつけてしまったようで、彼女の密着取材はしばらくの間、続くのであった。"
translation = "아무래도 별난 각본가의 흥미를 끌어버린 모양이라, 그녀의 밀착 취재는 당분간 계속되는 것이었다."

