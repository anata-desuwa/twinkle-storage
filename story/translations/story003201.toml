[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ……教皇庁ったら、人遣いが荒いんだから。ただでさえ普段の仕事があるのに、用事があるって言って呼び出してくるし……」"
translation = "「하아…… 교황청도 참, 사람을 너무 부려 먹는다니까. 가뜩이나 평소 업무가 있는데, 용건이 있다면서 불러내고……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん？\u3000くんくん……いい匂いがするわね。そろそろバレンタインだし、誰かお菓子でも焼いてきたのかしら？」"
translation = "「응? 킁킁…… 좋은 냄새가 나네. 슬슬 발렌타인이기도 하고, 누가 과자라도 구워온 걸까?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あっ、イレーナさま！\u3000ちょうどいいところに！」"
translation = "「앗, 이레이나 님! 마침 잘 오셨어요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ああ、やっぱりシャロンだったの」"
translation = "「아아, 역시 샤론이었구나」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「甘くていい匂い……それにお酒の香りも少しするような……またカヌレでも焼いてきたの？」"
translation = "「달콤하고 좋은 냄새…… 거기다 술 향기도 조금 나는 것 같은데…… 또 까눌레라도 구워왔어?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい、ご名答ですっ。試食して感想を聞かせてもらえませんか？」"
translation = "「네, 정답입니다! 시식하고 감상을 들려주지 않으실래요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「試食？\u3000カヌレなら今まで何度も作ってきてるでしょ。まぁ、もらえるならもらうけど……あ、まだちょっとぬくいじゃない」"
translation = "「시식? 까눌레라면 지금까지 몇 번이나 만들어 왔잖아. 뭐, 준다면 받겠지만…… 아, 아직 좀 따끈따끈하네」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい、先ほど焼いてきましたので。少し冷めて外側がカリッと、中がモチッとして、今が一番美味しい時です！」"
translation = "「네, 방금 구워왔거든요. 조금 식어서 겉은 바삭하고, 속은 쫀득해서 지금이 제일 맛있을 때예요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「へぇ、それは期待できるわね。それじゃ……あんっ」"
translation = "「헤에, 그건 기대되네. 그럼…… 아앙」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うん、確かにカリモチで美味し……ん？\u3000チョコの味がするわね」"
translation = "「응, 확실히 겉바속쫀이라 맛있…… 응? 초코 맛이 나네」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はいっ！\u3000バレンタイン用にチョコカヌレを作ってみたんですっ」"
translation = "「네! 발렌타인용으로 초코 까눌레를 만들어 봤어요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「見た目じゃわからなかったけど、これはこれで美味しいわね」"
translation = "「겉모습으론 몰랐는데, 이건 이것대로 맛있네」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ありがとうございます！\u3000そう言っていただけて嬉しいです！」"
translation = "「감사합니다! 그렇게 말씀해 주시니 기뻐요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですがもっとこう……見た目でもバレンタインらしい特別感を出せたらいいなと思っていまして……」"
translation = "「하지만 좀 더 이렇게…… 겉모습으로도 발렌타인다운 특별함을 낼 수 있으면 좋겠다고 생각해서요……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうねぇ、カヌレの形は特徴的だけど……どうせならもう一工夫、バレンタインならではの華やかさが欲しいとこよね」"
translation = "「그렇네, 까눌레 모양은 특징적이지만…… 이왕이면 한 번 더 연구해서, 발렌타인만의 화려함이 있었으면 좋겠지」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうなんですっ！\u3000形を変えちゃうとカヌレじゃなくなっちゃいますし、困りどころなんです」"
translation = "「맞아요! 모양을 바꿔버리면 까눌레가 아니게 되어버리니까, 고민이에요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふーん、なるほどねぇ……。で？\u3000このチョコカヌレ、どうしたのよ？\u3000どっかで配るの？」"
translation = "「흐응, 그렇구나……. 그래서? 이 초코 까눌레, 어떻게 할 거야? 어디서 나눠줄 거야?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それはもちろん、女神様の愛をあまねく届かせるために……」"
translation = "「그건 물론, 여신님의 사랑을 널리 전하기 위해서……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そして私自身の感謝の気持ちを込めて、会長さまにお渡ししたいのです」"
translation = "「그리고 제 자신의 감사하는 마음을 담아, 회장님께 드리고 싶어요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……へえー？\u3000あいつにー、バレンタインのプレゼントねー。あげたら、すっごく喜ぶんじゃない？」"
translation = "「……헤에─? 그 녀석한테─, 발렌타인 선물이구나─. 주면, 엄청 좋아하지 않겠어?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「えへへ、喜んでもらえたら嬉しいんですけど……イレーナさまは会長さまにバレンタインのプレゼントをしないんですか？」"
translation = "「에헤헤, 기뻐해 주면 좋겠는데…… 이레이나 님은 회장님께 발렌타인 선물을 안 하시나요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「な、なんで、あたしがあいつにバレンタインのチョコをあげなきゃいけないの！？」"
translation = "「내, 내가 왜 그 녀석한테 발렌타인 초코를 줘야 하는 건데!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「日頃の感謝をお菓子に込めれば、普段は伝えにくいことも素直に言えると思いますよ♪」"
translation = "「평소의 감사를 과자에 담으면, 평소엔 전하기 힘든 것도 솔직하게 말할 수 있다고 생각해요~♪」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別に伝えにくいことなんて……っていうか、素直とかそういう問題じゃないし。あたしは神官なんだから、バレンタインなんかに乗っかるわけないでしょ」"
translation = "「딱히 전하기 힘든 것 따위…… 그보다, 솔직하고 말고의 문제가 아니라고. 난 신관이니까, 발렌타인 같은 거에 편승할 리 없잖아」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「えっ！？\u3000神官ってバレンタインをしては駄目なのですかっ！？」"
translation = "「엣!? 신관은 발렌타인을 하면 안 되는 건가요!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そりゃそうでしょ。あたしたち神職ってのは、世俗から距離を取って貞淑でないといけないんだから」"
translation = "「당연하잖아. 우리 같은 성직자는 세속과 거리를 두고 정숙해야 하니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ボランティアでお菓子を配るくらいならともかく、特定の誰かに入れ込んだりするのはダメ」"
translation = "「자원봉사로 과자를 나눠주는 정도라면 몰라도, 특정 누군가에게 빠지거나 하는 건 안 돼」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうなのですか……」"
translation = "「그런 건가요……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それに義理であげたチョコを本命と勘違いされて、本気で迫られでもしたら困るでしょ？\u3000どこかの会長とかに」"
translation = "「게다가 의리로 준 초코를 진심이라고 착각해서, 진짜로 들이대기라도 하면 곤란하잖아? 어디의 회장이라든가」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「本気で、迫られ……そ、そうですね、心の準備ができていないと、ちょっと困っちゃうかもしれませんね、えへへ<emoji=heart04>」"
translation = "「진짜로, 들이대…… 그, 그렇네요, 마음의 준비가 안 되어 있으면, 조금 곤란할지도 모르겠네요, 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いや、そういう意味じゃないんだけど……」"
translation = "「아니, 그런 의미가 아닌데……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、そろそろ時間だわ。教皇庁から呼び出されてるから、ちょっと行ってくるわね」"
translation = "「아, 슬슬 시간이다. 교황청에서 호출이 왔으니까, 좀 다녀올게」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はいっ、もっと改良を重ねますので、次も感想を聞かせてくださいねっ」"
translation = "「네! 좀 더 개량을 거듭할 테니까, 다음에도 감상을 들려주세요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ……シャロンのあの素直さは危なっかしいというか……ちょっとだけ羨ましいというか……」"
translation = "「하아…… 샤론의 저 솔직함은 위태롭다고 해야 할지…… 조금은 부럽다고 해야 할지……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いやいや、羨ましくなんてないから。あたしこれでも神官だし、バレンタインのチョコとか関係ないんだから」"
translation = "「아니 아니, 부럽거나 하지 않으니까. 나 이래 봬도 신관이고, 발렌타인 초코 같은 건 상관없으니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だけど教皇庁の呼び出しって、どういう要件かしら？\u3000面倒なことにならないといいけど……」"
translation = "「그건 그렇고 교황청의 호출이라니, 무슨 용건일까? 귀찮은 일이 아니면 좋겠는데……」"

[[dialogue]]
speaker = "unk"
original = "イレーナは教皇庁の建物に入ると、先任の神官に呼び出しの理由を尋ねる。"
translation = "이레이나는 교황청 건물에 들어가자, 선임 신관에게 호출 이유를 묻는다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「神官イレーナ、ただいま戻りました。私に特別な用件とは何でしょうか？」"
translation = "「신관 이레이나, 방금 돌아왔습니다. 저에게 특별한 용건이란 무엇입니까?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……え？\u3000バレンタインデーについて？」"
translation = "「……네? 발렌타인 데이에 대해서요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「バレンタインの贈り物をし合うのは、あくまで世俗の行事」"
translation = "「발렌타인 선물을 주고받는 건 어디까지나 세속의 행사」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「愛する人を想う心は尊いものではありますが、流星教としては貞淑を守り、浮ついたりしないよう──」"
translation = "「사랑하는 사람을 생각하는 마음은 고귀한 것이긴 하지만, 유성교로서는 정숙을 지키고, 들뜨거나 하지 않도록──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え、そうではなくて？\u3000ふむふむ……ふむ、ふむ……えっ？」"
translation = "「에, 그게 아니고요? 흠흠…… 흠, 흠…… 엣?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「えええ～～～～～っ！？」"
translation = "「에에에~~~~~엣!?」"

