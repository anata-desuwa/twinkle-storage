[[dialogue]]
speaker = "unk"
original = "第４話,墜落,B"
translation = "제4화, 추락, B"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「フィーニスの塔……か」"
translation = "「피니스의 탑……인가.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふ……悪くない。<b>めがみ</b>とかいうやつもきっと、このアポロの敵なんだろうからな」"
translation = "「후…… 나쁘지 않군. <b>여신</b>인가 뭔가 하는 녀석도 분명, 이 아폴로의 적일 테니까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──っあっ！」"
translation = "「──윽 앗!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「っつつ……！\u3000派手に叩き落とされたな──みんな、無事か！？」"
translation = "「아얏……! 요란하게 얻어맞아 떨어졌군── 모두, 무사한가!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「なんとか……っ！」"
translation = "「간신히……요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「い、生きてる……？\u3000ほっ……死んだかと思った──」"
translation = "「사, 살아있어……? 휴우…… 죽는 줄 알았네──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「フィオナちゃん達のおかげかな？\u3000この程度の衝撃で済んだのは……」"
translation = "「피오나짱 덕분일까? 이 정도 충격으로 끝난 건……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ……今の私には、星術がなくとも霊力がありましたから」"
translation = "「네…… 지금의 저에게는, 성술이 없어도 영력이 있었으니까요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ただ、それより緋宮会長のおかげでしょうか」"
translation = "「다만, 그것보다 히노미야 회장 덕분일까요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──俺はまだ星術も使えるからな」"
translation = "「아아── 나는 아직 성술도 쓸 수 있으니까.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そっか、会長くんの守護星は地球だから……」"
translation = "「그렇구나, 회장 군의 수호성은 지구니까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さっすがクロトね！\u3000最強の魔王は空に蓋をされてもバッチリってわけ！」"
translation = "「역시 쿠로토네! 최강의 마왕은 하늘에 뚜껑이 덮여도 문제없다는 거지!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただ、ひとまず凌いだとはいえ──窮地には変わりない」"
translation = "「다만, 일단은 버텼다고는 해도── 궁지인 건 변함없다.」"

[[dialogue]]
speaker = "unk"
original = "俺とフィオナが手分けすることで、なんとかみんなをかばって着地した。"
translation = "나와 피오나가 분담하여, 간신히 모두를 감싸며 착지했다."

[[dialogue]]
speaker = "unk"
original = "だが、もし俺たちがただの星騎士のままだったなら……間違いなく全員が粉々になっていた。"
translation = "하지만, 만약 우리가 단순한 성기사 그대로였다면…… 틀림없이 전원이 산산조각 났을 것이다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「と、とんでもないことになったニャン。このままじゃ会いにもいけニャいニャン……！」"
translation = "「터, 터무니없는 일이 됐다 냥. 이대로는 만나러 갈 수도 없다 냥……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私たちだけではありません。恐らくここ以外でも、リンクを切られた星騎士が多数出ているはずです」"
translation = "「우리뿐만이 아닙니다. 아마도 이곳 외에도, 링크가 끊긴 성기사가 다수 발생했을 것입니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それは……とんでもなく危険なんじゃ……？」"
translation = "「그건…… 엄청나게 위험한 거 아냐……?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ここで飛ぼうとしても──うん。無理っぽい。やばいね、打つ手なしだ」"
translation = "「여기서 날아보려고 해도── 응. 무리일 것 같아. 큰일 났네, 손쓸 방법이 없어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あの規模から見て、少なくとも流星市国全域は天蓋の影響下にありそうです。その分、モンスターの侵攻だって止めきれない」"
translation = "「저 규모로 볼 때, 적어도 유성 시국 전역은 천개의 영향권 아래에 있을 것 같습니다. 그만큼, 몬스터의 침공도 막아낼 수 없을 겁니다.」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔の頂上──アポロはあそこから、人間界を見下ろしてる。"
translation = "피니스의 탑 정상── 아폴로는 저곳에서, 인간계를 내려다보고 있다."

[[dialogue]]
speaker = "unk"
original = "それはかつてセイファート学園長も達した世界の『視座』。"
translation = "그것은 과거 세이퍼트 학원장도 도달했던 세계의 『시좌』."

[[dialogue]]
speaker = "unk"
original = "<ruby>頂<rt>いただき</rt></ruby>に立つアポロが、そこから傘のように天蓋を張っているのが現状だ。"
translation = "정상에 선 아폴로가, 그곳에서 우산처럼 천개를 펼치고 있는 것이 현 상황이다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「フィオナ嬢。霊力を使ってなんとかあそこまで飛べないのかニャ？」"
translation = "「피오나 양. 영력을 사용해서 어떻게든 저기까지 날 수 없는 거냐 냥?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「塔の頂上は成層圏より上……霊力だけであの高空まで飛翔するのは困難です。まして、そのまま姉さんと戦うことなど」"
translation = "「탑의 정상은 성층권보다 위…… 영력만으로 저 고공까지 비행하는 것은 어렵습니다. 하물며, 그대로 언니와 싸우는 것은 더더욱.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……同感だ。到達できるにしても、それがやっとだろう」"
translation = "「……동감이다. 도달할 수 있다고 해도, 그것이 고작일 테지.」"

[[dialogue]]
speaker = "unk"
original = "仮面にダメージは入れられても、再生を防ぐことはできなかった。"
translation = "가면에 피해를 입힐 수는 있어도, 재생을 막을 수는 없었다."

[[dialogue]]
speaker = "unk"
original = "片手落ちの状態で対面できたとしても、また叩き落されるのが見えている。"
translation = "불완전한 상태로 대면한다고 해도, 또다시 얻어맞아 떨어지는 것이 눈에 보인다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゃ、じゃあもう無理ってこと……？」"
translation = "「자, 그럼 이제 무리라는 거야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや──そうとも限らない」"
translation = "「아니── 그렇다고만은 할 수 없다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もしかして……会長さんだけで行くつもり？」"
translation = "「혹시…… 회장님 혼자 갈 생각이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いえ……正直、俺一人では厳しい。みんなの力が必要なのは変わりません」"
translation = "「아니…… 솔직히, 나 혼자서는 버겁다. 모두의 힘이 필요한 건 변함없어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ですが、今の私たちでは……」"
translation = "「하지만, 지금의 저희로서는……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「天蓋をなんとかする方法があるのかニャ……？」"
translation = "「천개를 어떻게든 할 방법이 있는 거냐 냥……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「試してみないとわからないが──うまくいけば。間に合いそうか、アナ」"
translation = "「시험해 보지 않으면 모르겠지만── 잘만 된다면. 제시간에 될 것 같아, 아나.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぎりぎりですね。すでに根回しは終えていますが」"
translation = "「아슬아슬합니다. 이미 사전 조치는 끝냈습니다만.」"

[[dialogue]]
speaker = "unk"
original = "天蓋への対策は事前に考えられていた重要事項だった。"
translation = "천개에 대한 대책은 사전에 고려되었던 중요 사항이었다."

[[dialogue]]
speaker = "unk"
original = "展開される前に叩く──という作戦は失敗に終わったが、次の一手がないわけじゃない。"
translation = "전개되기 전에 때린다──는 작전은 실패로 끝났지만, 다음 수가 없는 것은 아니다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも……いざ頂上までたどり着いたとしても、不安よね」"
translation = "「근데…… 막상 정상까지 도착한다고 해도, 불안하겠지.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「また同じにならないとも限らないしねー。ま……１％でも希望があるならいい方なのかな」"
translation = "「또 똑같이 되지 않을 거라고도 할 수 없고ー. 뭐…… 1%라도 희망이 있다면 좋은 쪽인 걸까.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それについては……むしろ、俺は先ほどのアポロを見て、可能性を感じました」"
translation = "「그것에 대해서는…… 오히려, 나는 방금 전의 아폴로를 보고, 가능성을 느꼈다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だってアポロは……悲しんでいるように見えた」"
translation = "「왜냐하면 아폴로는…… 슬퍼하는 것처럼 보였으니까.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……はい。姉さんは……私たち以外とも、戦っているように感じました」"
translation = "「……네. 언니는…… 저희들 외의 무언가와도, 싸우고 있는 것처럼 느껴졌어요.」"

[[dialogue]]
speaker = "unk"
original = "アポロは間違いなく<ruby>苛<rt>さいな</rt></ruby>まれていた。"
translation = "아폴로는 틀림없이 괴로워하고 있었다."

[[dialogue]]
speaker = "unk"
original = "仮面のもたらす使徒としての使命と、己が本当の姿との狭間で。"
translation = "가면이 가져다주는 사도로서의 사명과, 자신의 진짜 모습 사이에서."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「記憶を失っても。自我が封じられても。お姉さんの人格は生きている」"
translation = "「기억을 잃어도. 자아가 봉인되어도. 언니의 인격은 살아있다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それに、事実──フィオナの言葉はあの仮面にヒビを入れた」"
translation = "「게다가, 사실── 피오나의 말은 저 가면을 금가게 했다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。すぐに修復されてしまいましたが……」"
translation = "「네. 금방 수복되어 버렸지만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「けれど、どんな攻撃よりもフィオナちゃんの言葉が響いた──」"
translation = "「하지만, 어떤 공격보다도 피오나짱의 말이 울려 퍼졌어──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ワンチャンある、って感じかなー」"
translation = "「한 방 노려볼 만하다, 라는 느낌일까ー.」"

[[dialogue]]
speaker = "unk"
original = "<ruby>妹<rt>フィオナ</rt></ruby>の想いはきっと届く。そう信じずにはいられなかった。"
translation = "여동생의 마음은 분명 닿을 것이다. 그렇게 믿지 않을 수 없었다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「で、でも結局、ワガハイ達の状況は変わってないニャ……？」"
translation = "「그, 근데 결국, 우리들의 상황은 바뀌지 않은 거냐 냥……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……まだ希望が潰えたわけじゃない。天蓋の上にさえ出られれば──星力をまたを取り戻せる」"
translation = "「……아직 희망이 꺾인 건 아니다. 천개 위로만 나갈 수 있다면── 성력을 다시 되찾을 수 있다.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「けど、あそこに向かう方法がねーって話だろ？\u3000このままじゃ地上にいたって何もできねえし──」"
translation = "「근데, 저기로 향할 방법이 없다는 얘기잖아? 이대로는 지상에 있어봤자 아무것도 못 하고──」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「って……待て。会長さん、まさかとんでもないこと考えてねーか？」"
translation = "「잠…… 잠깐. 회장 군, 설마 터무니없는 생각 하는 거 아냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。そのまさかしかないよ、ユウリ」"
translation = "「아아. 바로 그 설마밖에 없어, 유우리.」"

[[dialogue]]
speaker = "unk"
original = "俺は、改めてみんなを見渡して言った。"
translation = "나는, 다시 한번 모두를 둘러보며 말했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もう一度──俺たちで塔を昇る。今度は一階から、アポロのいる頂上まで」"
translation = "「다시 한번── 우리들이 탑을 오른다. 이번에는 1층부터, 아폴로가 있는 정상까지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！？\u3000てっぺんまで──！？」"
translation = "「!? 꼭대기까지──!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「無茶──としか思えませんが……」"
translation = "「무리──라고밖에 생각되지 않습니다만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「自分でもそう思う。だけど、他に方法はない」"
translation = "「나도 그렇게 생각해. 하지만, 다른 방법은 없어.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「確かに──塔の内部で流れる時間は現実よりも穏やかです。踏破さえできれば、間に合うかもしれませんが……」"
translation = "「확실히── 탑 내부에서 흐르는 시간은 현실보다 온화합니다. 완주만 할 수 있다면, 제시간에 도착할 수도 있겠지만……」"

[[dialogue]]
speaker = "unk"
original = "それは──かつてセイファート学園長が通った道筋だ。"
translation = "그것은── 과거 세이퍼트 학원장이 지나갔던 길이다."

[[dialogue]]
speaker = "unk"
original = "仮面によって失われた妻を求めて塔を昇った。そんな制覇者たる彼と同じ軌跡を、俺たちで辿る。"
translation = "가면에 의해 잃어버린 아내를 찾아 탑을 올랐다. 그런 제패자인 그와 같은 궤적을, 우리들이 따라간다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──いいじゃない。だって、これが最後のリクリエなんでしょ？\u3000だったら、今ムチャしないでいつムチャするのよ」"
translation = "「──좋잖아. 왜냐면, 이게 마지막 리크리에잖아? 그렇다면, 지금 무리하지 않고 언제 무리할 건데.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふぅ。ヴィーナスちゃんはヴィーナスちゃんねえ」"
translation = "「후우. 비너스짱은 비너스짱이네.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ですが……わずかでも希望が残っているなら、そこに懸けてみたいです！」"
translation = "「하지만…… 아주 조금이라도 희망이 남아 있다면, 거기에 걸어보고 싶습니다!」"

[[dialogue]]
speaker = "unk"
original = "全員で──そびえ立つフィーニスの塔に向き直る。"
translation = "전원이── 우뚝 솟은 피니스의 탑을 마주 본다."

[[dialogue]]
speaker = "unk"
original = "どんなに果てしない道だとしても、そこに希望の光があるなら俺たちは諦めない──"
translation = "아무리 끝없는 길이라 할지라도, 그곳에 희망의 빛이 있다면 우리는 포기하지 않는다──"

