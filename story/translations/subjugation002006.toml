[[dialogue]]
speaker = "unk"
original = "いよいよ明日はバレンタインデー。それなのにまたチョコレート泥棒が出てしまったらしい──俺は大急ぎでカフェテリアへ向かった。"
translation = "드디어 내일은 밸런타인데이. 그런데 또 초콜릿 도둑이 나타난 모양이다── 나는 서둘러 카페테리아로 향했다."

[[dialogue]]
speaker = "ルリエル"
original = "「ちちち、違うのです～……！\u3000ルリエルは犯人じゃないのです！\u3000ちょっと目を離した隙に、誰かが食べ散らかしていて……！」"
translation = "「아아아, 아닌 것이에욧~……! 루리에르는 범인이 아닌 거예요! 잠깐 눈을 뗀 사이에 누군가가 먹어 치워서……!」"

[[dialogue]]
speaker = "セーラ"
original = "「それは疑ってないんだけど……ルリちーが購買行って帰るまで、１０分くらいでしょ？\u3000そんなにたくさん食べられるもの？」"
translation = "「그건 의심하지 않는데…… 루리치가 매점 갔다 올 때까지 10분 정도잖아? 그렇게 많이 먹을 수 있는 거야?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「作り置きしてたチョコ、片っ端から食べられちゃうだなんて……」"
translation = "「미리 만들어 둔 초코를 죄다 먹어 치우다니……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「本当に由々しき事態ですね。明日の大聖堂のイベントに間に合うでしょうか……」"
translation = "「정말로 예사로운 일이 아니네요. 내일 대성당 이벤트까지 맞출 수 있을까요……」"

[[dialogue]]
speaker = "unk"
original = "ジュエリー、どう思う？"
translation = "주얼리, 어떻게 생각해?"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手。もしかしたら一連の犯行は、モンスターの仕業かもしれない」"
translation = "「조수. 어쩌면 일련의 범행은 몬스터의 소행일지도 몰라」"

[[dialogue]]
speaker = "ジュエリー"
original = "「前回の盗み食いの時から奇妙なんだ。いくら何でもカフェテリアにあるチョコを全部食べつくすだなんて、人間業じゃないだろう？」"
translation = "「지난번 무단 취식 때부터 기묘했어. 아무리 그래도 카페테리아에 있는 초코를 전부 먹어 치우다니, 인간의 소행이 아니잖아?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「集団犯かとも思ったが、その痕跡もない。それにこれを見てくれるかい。昨夜、かじられたチョコの余りだ」"
translation = "「집단 범행인가도 생각했지만 그 흔적도 없어. 그리고 이걸 봐주겠어? 어젯밤 먹다 남은 초코야」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それは、私の失敗作の……？」"
translation = "「그건 제 실패작인……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。シャルレーヌさんが昨日、昼間に作っていた激辛チョコさ。こっそり拝借して置いておいたんだが、またかじられている」"
translation = "「그래. 샤를레느 씨가 어제 낮에 만들었던 아주 매운 초코지. 몰래 빌려서 놓아두었는데 또 베어 물려 있어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「このチョコを辛いと知っている者なら、食べずに放っておくだろう？\u3000しかし同じミスを２度もしている。犯人には知能が見られないんだ」"
translation = "「이 초코가 맵다는 걸 아는 자라면 먹지 않고 내버려 뒀겠지? 하지만 같은 실수를 두 번이나 했어. 범인에게는 지능이 보이지 않아」"

[[dialogue]]
speaker = "ウズメイア"
original = "「でもアラートは反応してないんだよね？」"
translation = "「하지만 알람은 반응하지 않았지?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だからここからは想像なんだが……もしかしたら、新種のモンスターではないかな？」"
translation = "「그래서 여기서부터는 상상이지만…… 어쩌면 신종 몬스터가 아닐까?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「星騎士にもステルス能力を持った生徒がいるだろう？\u3000それと同じような力を持つ、特殊個体モンスター……そう考えると辻褄が合う」"
translation = "「성기사 중에도 스텔스 능력을 갖춘 학생이 있지? 그것과 비슷한 힘을 가진 특수 개체 몬스터…… 그렇게 생각하면 앞뒤가 맞아」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「確かに仮説として成り立つとは思いますけれど、目的は一体……？」"
translation = "「확실히 가설로서 성립한다고 생각합니다만, 목적은 대체……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うーん……あれじゃない？\u3000星力の込められたチョコだし、それを食べて強くなろうとしてるとか……」"
translation = "「으음…… 그거 아냐? 성력이 담긴 초코니까 그걸 먹고 강해지려고 한다든가……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ともかく、アラートに反応しないからヒトの犯行、という思い込みは捨てるべきかもしれない。今後の対応だが──」"
translation = "「어쨌든 알람에 반응하지 않으니 인간의 범행이라는 선입견은 버려야 할지도 몰라. 향후 대응이지만──」"

[[dialogue]]
speaker = "女子生徒"
original = "「──キャァアァアアーッ！」"
translation = "「──꺄아아아아아악!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「今の悲鳴は……！？」"
translation = "「지금 비명은……!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「みんな、あっち！\u3000カフェの隅っこ──！」"
translation = "「얘들아, 저쪽! 카페 구석──!」"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～～～～～っ♪」"
translation = "「이~~~~~~♪」"

[[dialogue]]
speaker = "女子生徒"
original = "「やめてぇ！\u3000それ、大切なチョコなの！\u3000食べないで～！」"
translation = "「그만해! 그거 소중한 초코란 말야! 먹지 마~!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ああっ、ひどい！\u3000手当たり次第にチョコを食べてる……！\u3000あいつが犯人！？」"
translation = "「아앗, 너무해! 닥치는 대로 초코를 먹고 있어……! 저 녀석이 범인!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「モンスター発生のアラートが反応していません！\u3000ジュエリー先輩の推理が当たったみたいです……！」"
translation = "「몬스터 발생 알람이 반응하지 않아요! 주얼리 선배의 추측이 맞은 것 같아요……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「というか、あのフワッチ……チョコを食べるたびに大きくなっていませんか！？」"
translation = "「그보다 저 후왓치…… 초코를 먹을 때마다 커지고 있지 않나욧!?」"

[[dialogue]]
speaker = "フワッチ"
original = "「イーーーーーーッ！！」"
translation = "「이──────!!」"

[[dialogue]]
speaker = "unk"
original = "チョコを暴食していたフワッチが輝きだし、そして──"
translation = "초코를 폭식하던 후왓치가 빛나기 시작하고, 그리고──"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～～ト～～～～ッ！！」"
translation = "「이~~~~토~~~~!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「青天霹靂～っ！？\u3000なんか進化したし～～～っ！？」"
translation = "「마른하늘에 날벼락~!? 뭔가 진화했다구~~~!?」"

