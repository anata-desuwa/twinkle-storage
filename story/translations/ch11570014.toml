[[dialogue]]
speaker = "unk"
original = "第４話,それぞれの世界へ,P"
translation = "제4화, 각자의 세계로, P"

[[dialogue]]
speaker = "unk"
original = "トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。"
translation = "트레지안나로부터 연락을 받고 이로하, 카오리, 코코아 세 사람은 시부야로 향한다."

[[dialogue]]
speaker = "unk"
original = "そこは彼女たちが、異世界より最初にたどり着いた場所だった。"
translation = "그곳은 그녀들이 이세계로부터 처음 도착했던 장소였다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「──戻って来たようです！」"
translation = "「──돌아온 모양입니다!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナがそう発した直後、目の前の空間が歪んだ。"
translation = "트레지안나가 그렇게 말한 직후, 눈앞의 공간이 뒤틀렸다."

[[dialogue]]
speaker = "unk"
original = "そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。"
translation = "그리고 다음 순간, 옴니스를 안고 있는 이로하 일행이 잘 아는 아키사의 모습이 나타났다."

[[dialogue]]
speaker = "陽彩"
original = "「ごめん、みんな……心配をかけた」"
translation = "「미안, 얘들아…… 걱정 끼쳤어」"

[[dialogue]]
speaker = "unk"
original = "陽彩は寄生していた悪魔から、無事に解放された。"
translation = "아키사는 기생해 있던 악마로부터 무사히 해방되었다."

[[dialogue]]
speaker = "unk"
original = "事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。"
translation = "사건의 전말을 아키사의 입으로 들은 후, 드디어 이로하 일행은 원래 세계로 돌아가게 되었다."

[[dialogue]]
speaker = "ここあ"
original = "「プリちんともこれでお別れか～、寂しいにゃあ」"
translation = "「프리칭과도 이걸로 작별인가~, 외롭다냐아」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふん……我は悪の終末兵器じゃ。こんな別れ、寂しくもなんともないのじゃ……」"
translation = "「흥…… 나는 악의 종말 병기니라. 이런 작별, 외롭지도 뭣도 아니니라……」"

[[dialogue]]
speaker = "サチ"
original = "「強がっちゃって……こんな時くらい素直になればいいのに」"
translation = "「강한 척하기는…… 이럴 때만큼은 솔직해지면 좋을 텐데」"

[[dialogue]]
speaker = "プリムラ"
original = "「う、うるさいのじゃ！」"
translation = "「시, 시끄럽느니라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「……じゃが……まあ、貴様を手放すのは、惜しくはあるのう」"
translation = "「……하지만…… 뭐, 네놈을 놓아주는 것은 아쉽긴 하구나」"

[[dialogue]]
speaker = "プリムラ"
original = "「貴様は優秀な眷属じゃった。時々、言うことを聞いてくれぬが……それでも十分、我に尽くしたのじゃ」"
translation = "「네놈은 우수한 권속이었느니라. 가끔 말을 들어주지 않지만…… 그래도 충분히 나를 섬겼느니라」"

[[dialogue]]
speaker = "プリムラ"
original = "「我を放ってどこぞをほっつき歩いておる、第一の眷属にも見習わせたいくらいじゃ！」"
translation = "「나를 내버려 두고 어딘가를 쏘다니고 있는 제일의 권속도 본받게 하고 싶을 정도니라!」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃはは、ありがとう♪\u3000眷属じゃなくなっても、ここあのこと、ちゃんと覚えておいて欲しいなっ」"
translation = "「냐하하, 고마워♪ 권속이 아니게 되어도 코코아를 꼭 기억해 줬으면 좋겠어」"

[[dialogue]]
speaker = "プリムラ"
original = "「そうじゃな……特別に、覚えておいてやらんこともない」"
translation = "「그렇구나…… 특별히 기억해 주지 못할 것도 없지」"

[[dialogue]]
speaker = "ここあ"
original = "「嬉しいよ、プリちん♪」"
translation = "「기뻐, 프리칭♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "プリムラ"
original = "「……いやじゃ」"
translation = "「……싫다」"

[[dialogue]]
speaker = "サチ"
original = "「プリムラ？」"
translation = "「프리무라?」"

[[dialogue]]
speaker = "プリムラ"
original = "「嫌じゃと言うておる！」"
translation = "「싫다고 말하고 있지 않느냐!」"

[[dialogue]]
speaker = "プリムラ"
original = "「やはり貴様は手放すに惜しい！\u3000これから先もずっと我の眷属でおるのじゃ！」"
translation = "「역시 네놈은 놓아주기 아쉽구나! 앞으로도 계속 나의 권속으로 있으려무나!」"

[[dialogue]]
speaker = "ここあ"
original = "「ごめんね、プリちん。ここあもそうしたいけど、元の世界に戻らなくちゃいけないから……」"
translation = "「미안해, 프리칭. 코코아도 그러고 싶지만, 원래 세계로 돌아가야 하니까……」"

[[dialogue]]
speaker = "サチ"
original = "「そうだよ、わがまま言わないの」"
translation = "「맞아, 떼쓰지 마」"

[[dialogue]]
speaker = "プリムラ"
original = "「わかっておる！\u3000誰も行くなとは言っておらんじゃろうが！」"
translation = "「알고 있느니라! 아무도 가지 말라고는 하지 않았지 않느냐!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ただ、主従の関係を解消してやるのをやめただけじゃ！\u3000ここあ、貴様はこれから先もずっと我の眷属じゃ！\u3000わかったの！」"
translation = "「다만, 주종 관계를 해소해 주는 것을 그만뒀을 뿐이니라! 코코아, 네놈은 앞으로도 계속 나의 권속이니라! 알겠느냐!」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃはは……うん、わかったよ」"
translation = "「냐하하…… 응, 알았어」"

[[dialogue]]
speaker = "ここあ"
original = "「ここあはずっと、元の世界にもどってもプリちんの眷属だから♪」"
translation = "「코코아는 계속, 원래 세계에 돌아가서도 프리칭의 권속이니까♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「約束じゃぞ……忘れるなよ……」"
translation = "「약속이니라…… 잊지 말거라……」"

[[dialogue]]
speaker = "サチ"
original = "「何よ、可愛いところあるじゃない」"
translation = "「뭐야, 귀여운 구석이 있잖아」"

[[dialogue]]
speaker = "プリムラ"
original = "「ふん……」"
translation = "「흥……」"

[[dialogue]]
speaker = "オムニス"
original = "「俺がいない間に、ずいぶん仲良くなったんだな」"
translation = "「내가 없는 사이에 꽤 친해졌나 보네」"

[[dialogue]]
speaker = "ここあ"
original = "「にゃはは、そうなんだよ～」"
translation = "「냐하하, 그렇다니까~」"

[[dialogue]]
speaker = "オムニス"
original = "「ありがとう、本当にお世話になった」"
translation = "「고마워, 정말 신세를 많이 졌어」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いえいえ、短い間でしたけど、とても楽しい時間を過ごさせていただきました」"
translation = "「아니에요, 짧은 시간이었지만 정말 즐거운 시간을 보냈답니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「これから先、いろいろ大変なことが待ち受けているでしょうが、挫けずに頑張ってください♪」"
translation = "「앞으로 여러 가지 힘든 일이 기다리고 있겠지만, 굴하지 말고 힘내세요♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「よいか、悪魔なぞに負けたら承知せぬぞ！」"
translation = "「알겠느냐, 악마 따위에게 지면 가만두지 않겠다!」"

[[dialogue]]
speaker = "オムニス"
original = "「ああ、頑張るよ」"
translation = "「아아, 열심히 할게」"

[[dialogue]]
speaker = "ここあ"
original = "「みんなで力を合わせて、そして絶対に勝つから……安心して、プリちん♪」"
translation = "「다 같이 힘을 합쳐서, 그리고 반드시 이길 거니까…… 안심해, 프리칭♪」"

[[dialogue]]
speaker = "ここあ"
original = "「そんで平和になったら、またプリちんに会いにこの世界に来たいから……だから……」"
translation = "「그러고 나서 평화로워지면, 다시 프리칭을 만나러 이 세계에 오고 싶으니까…… 그러니까……」"

[[dialogue]]
speaker = "ここあ"
original = "「プリちんも絶対に守ってね、この世界を！」"
translation = "「프리칭도 반드시 지켜줘, 이 세계를!」"

[[dialogue]]
speaker = "プリムラ"
original = "「もちろんじゃ、任せておけ！」"
translation = "「물론이지, 맡겨두거라!」"

[[dialogue]]
speaker = "オムニス"
original = "「それではトレジアンナさん、お願いします」"
translation = "「그러면 트레지안나 씨, 부탁합니다」"

[[dialogue]]
speaker = "unk"
original = "──こうして、突然始まったここあたちの異世界生活は幕を閉じた。"
translation = "──이렇게, 갑작스럽게 시작된 코코아 일행의 이세계 생활은 막을 내렸다."

[[dialogue]]
speaker = "unk"
original = "再び、魔法少女たちがまみえる可能性は限りなく低い。"
translation = "다시 마법 소녀들이 마주할 가능성은 한없이 낮다."

[[dialogue]]
speaker = "unk"
original = "だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。"
translation = "하지만, 제로가 아닌 그 가능성을 믿고, 두 세계의 마법 소녀들은 각자 가로막는 시련을 향해 도전해 나가는 것이었다."

