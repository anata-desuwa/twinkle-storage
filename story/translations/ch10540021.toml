[[dialogue]]
speaker = "unk"
original = "第１話,ユーリスと恋人外出デート,P"
translation = "제1화, 유리스와 연인 외출 데이트, P"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あっ……ふふ、待ってたよ会長。突然呼び出しちゃってごめんね？」"
translation = "「앗…… 후후, 기다렸어 회장. 갑자기 불러내서 미안해?」"

[[dialogue]]
speaker = "unk"
original = "ユーリスから外出に誘われるなんて珍しい"
translation = "유리스가 외출하자고 권하다니 드문 일이다"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そうかな？\u3000……いや、そうかも。いつもは私の秘密がバレないように、大抵どちらかの部屋で過ごしてるもんね？」"
translation = "「그럴까? ……아니, 그럴지도. 평소에는 내 비밀이 들키지 않도록, 대체로 서로의 방에서 시간을 보냈으니까 말이야.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「そう思うと窮屈な思いをさせちゃってたかな……？\u3000私の都合ばかり優先して、ろくに外に遊びに出ることもできなくて……」"
translation = "「그렇게 생각하니 답답하게 만들었으려나……? 내 사정만 우선하느라, 제대로 밖에 놀러 나가지도 못하고……」"

[[dialogue]]
speaker = "unk"
original = "恋人と一緒にいられるならどこでも楽しいよ"
translation = "연인과 함께 있을 수 있다면 어디든 즐거워"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「恋び──～～っっ。あ、ありがとう……。でも人目のある場所でそういうセリフは……」"
translation = "「연이──～～윽. 아, 고마워……. 하지만 남의 눈이 있는 장소에서 그런 대사는……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ううんっ、嫌なわけじゃなくて……！\u3000今の世の中、男同士で付き合っていてもおかしくはないし、誤魔化せるかもしれないけど……！」"
translation = "「으응, 싫다는 게 아니라……! 지금 세상에 남자끼리 사귀고 있어도 이상할 건 없고, 속일 수 있을지도 모르지만……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「単純に、その……照れてしまうよ。あんまり恋人扱いされると、ユリアーナの自分が顔を出しちゃうというか……」"
translation = "「단순히, 그…… 부끄러워져서 말이야. 너무 연인 취급을 받으면, 율리아나로서의 내가 얼굴을 내밀어 버린다고 해야 할까……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「キ……キスとかも、したくなっちゃう」"
translation = "「키…… 키스 같은 것도, 하고 싶어져 버려」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「会長……」"
translation = "「회장……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ハッ──！\u3000わ、私はこんな大通りで何を……！」"
translation = "「핫──! 나, 나는 이런 큰길에서 대체 무슨……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「とりあえず行こうっ……。なんだか居たたまれないからっ……。話は歩きながらするよっ……！」"
translation = "「일단 가자……! 왠지 가만히 있을 수가 없으니까……! 이야기는 걸으면서 할게……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「実はセーラさんやユウリさんから叱られちゃってね。少しは自分のためにもお金を使えって」"
translation = "「사실 세라 씨나 유우리 씨한테 혼났거든. 조금은 자신을 위해서도 돈을 쓰라고 말이야.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「両親にも同じことを言われちゃったよ。送金したカジノのバイト代も半分くらい戻ってきちゃってさ」"
translation = "「부모님께도 같은 말을 들었어. 송금했던 카지노 아르바이트비도 절반 정도 돌아와 버려서 말이야.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「それで金銭的にもちょっと余裕ができたものだから。今日は会長に何か奢ってあげようかなって」"
translation = "「그래서 금전적으로도 조금 여유가 생겼거든. 오늘은 회장에게 뭔가 사줄까 해서.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふふ、なんでも好きなものを言ってよ。今日の私はフルコースでも耐えられるよ？」"
translation = "「후후, 뭐든 좋아하는 걸 말해줘. 오늘의 나라면 풀코스라도 견딜 수 있다고?」"

[[dialogue]]
speaker = "unk"
original = "それじゃ王子様からのキスを"
translation = "그럼 왕자님의 키스를"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「なっ──！！？\u3000お、お金で買えるものにしてよっ……！\u3000なんでもとは言ったけど、そういうのは……！」"
translation = "「나앗──!!? 도, 돈으로 살 수 있는 걸로 해줘……! 뭐든지라고는 했지만, 그런 건……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「どうしてもと言うなら、その……お部屋に戻ってからしてあげるけど。でもせっかくこうして外にも出てきたわけだし……」"
translation = "「정 원한다면, 그…… 방으로 돌아가서 해줄 테니까. 하지만 모처럼 이렇게 밖으로 나오기도 했고……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「私としては奢りを理由に、普段しない外出デートを楽しみたいと思って──……。そ、そもそもキスなんか無料でいくらでも──……」"
translation = "「나로서는 한턱내는 걸 구실로, 평소에 하지 못하는 외출 데이트를 즐기고 싶다고 생각해서──……. 애, 애초에 키스 같은 건 무료로 얼마든지──……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あっ、何をくすくす笑ってるんだいっ？\u3000もしかしなくても、私をからかったねっ？\u3000い、意地悪だよっ」"
translation = "「앗, 뭘 큭큭 웃는 거야? 혹시나 싶지만, 나를 놀렸구나? 치, 치사해」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ひゃっ！？\u3000ちょっ、ちょっと外で抱き締めるのは……！\u3000こここ、こんなところ誰かに見られたら……！」"
translation = "「히얏!? 자, 잠깐 밖에서 껴안는 건……! 이이, 이런 곳에서 누군가에게 들키면……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「肩を組んでるだけって、んんっ……。あ、明らかに正面から抱き締めてるじゃないかっ……！」"
translation = "「어깨동무를 하고 있을 뿐이라니, 으음……. 아, 아무리 봐도 정면에서 껴안고 있잖아……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「嫌じゃないけど。嫌なわけないけどっ。でも恥ずかしすぎて──」"
translation = "「싫지는 않지만. 싫을 리 없지만! 하지만 너무 부끄러워서──」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──あれ？\u3000会長とユーリスくん？」"
translation = "「──어라? 회장하고 유리스 군?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「きゃっ……！！？」"
translation = "「꺄악……!!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「２人してお出かけ？\u3000男同士仲良いね～」"
translation = "「둘이서 나들이? 남자끼리 사이좋네~」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「マ、マトイさん。ちょっと臨時収入があったものだから２人で何か食べに行こうかって話になりまして」"
translation = "「마, 마토이 씨. 조금 임시 수입이 생겨서 둘이서 뭐라도 먹으러 갈까 하는 이야기가 되어서요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヘレナさんのカジノでバイトしてたんだっけ？\u3000色々と大変だったらしいね～。新種のモンスターが出たとか」"
translation = "「헬레나 씨 카지노에서 알바했었지? 여러모로 힘들었다며~. 신종 몬스터가 나왔다던가.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "（っっ。バ、バレてない……？\u3000会長とイチャイチャしちゃってたこと……。も、もし見られてたら……！）"
translation = "（윽. 드, 들키지 않았나……? 회장하고 꽁냥거리고 있었다는 거……. 호, 혹시 보였다면……!）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ところで……その。さっき２人で抱き合ってなかった？」"
translation = "「그런데…… 그. 아까 둘이서 껴안고 있지 않았어?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「へっ！？」"
translation = "「헷!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「遠目からだったし見間違いかもしれないんだけど。すっごく距離が近かったような……」"
translation = "「멀리서 봐서 잘못 본 걸지도 모르겠지만. 굉장히 거리가 가까웠던 것 같아서……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「それは、えとっ、そのっ……」"
translation = "「그건, 에토, 그게……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ひゃっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker = "unk"
original = "俺とユーリスの仲だからな"
translation = "나와 유리스 사이니까"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「か、会長……！\u3000こんなにくっついたら……！」"
translation = "「회, 회장……! 이렇게 달라붙으면……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは、ホントに仲良しなんだね♪\u3000なんだか羨ましいなぁ。気の置けない親友同士って感じで」"
translation = "「아하하, 정말 사이가 좋구나♪ 왠지 부럽네. 허물없는 절친 사이라는 느낌이라.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それじゃ２人のデートを邪魔するのも悪いし、私は行くね～。私もこれからアナとデートだから♪\u3000会長みたいにアナのこと抱き締めてあげちゃおっと♪」"
translation = "「그럼 두 사람의 데이트를 방해하는 것도 미안하니, 난 가볼게~. 나도 이제부터 아나랑 데이트니까♪ 회장처럼 아나를 꽉 안아줘 버려야지♪」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「い……行っちゃった。意外と、その……誤魔化せちゃうものなんだね？\u3000もっとこう……騒ぎ立てられちゃうものだと思ったよ」"
translation = "「가…… 가버렸네. 의외로, 그…… 속여 넘길 수 있는 거구나? 좀 더 이렇게…… 소란을 피울 줄 알았어.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「みんなから見たら男同士でベタベタしているように見えるわけだし、会長にも迷惑かかっちゃうかもって……」"
translation = "「남들이 보기엔 남자끼리 끈적거리는 것처럼 보일 테고, 회장에게도 폐가 될지도 모른다고……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「でも……嬉しかった。私はマトイさんが来て、つい身を離しちゃったのに……。会長はぐっと私を抱き寄せてくれて……」"
translation = "「하지만…… 기뻤어. 나는 마토이 씨가 와서 그만 몸을 떼버렸는데……. 회장은 꽉 나를 끌어당겨 줘서……」"

[[dialogue]]
speaker = "unk"
original = "こそこそする必要なんて何もないからね"
translation = "몰래 숨길 필요 같은 건 전혀 없으니까"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「うん……そうだったんだね。私は他人の目を気にしすぎていたみたいだ」"
translation = "「응…… 그랬구나. 나는 타인의 시선을 너무 신경 쓰고 있었나 봐.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「たとえ私が男でも女でも、私と会長の仲が良いのは、その、確かなことなんだから…………」"
translation = "「설령 내가 남자든 여자든, 나와 회장의 사이가 좋은 건, 그, 확실한 거니까…………」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「えへへ、なんだか吹っ切れた気がするよ。これからは出先でも心置きなくイチャイチャしちゃうことにする」"
translation = "「에헤헤, 왠지 후련해진 기분이야. 이제부터는 밖에서도 마음 놓고 꽁냥거리기로 할게.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「本当はずっとこんな風に君とイチャイチャしたかったんだ。いつでもどこでもベタベタしたり、普通のカップルみたいに一緒に買い食いや寄り道したり……」"
translation = "「사실은 계속 이런 식으로 너와 꽁냥거리고 싶었어. 언제 어디서든 달라붙거나, 평범한 커플처럼 같이 사 먹거나 들르거나……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「しても……良かったんだね？\u3000私が怖がってただけで、こそこそする必要なんて最初からなかったんだ」"
translation = "「해도…… 괜찮았던 거네? 내가 겁냈을 뿐이지, 몰래 숨길 필요 같은 건 처음부터 없었어.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ん、ちゅっ──。えへへ、それじゃあ行こっか会長。思いっきりデートしちゃおうっ？」"
translation = "「응, 츄──. 에헤헤, 그럼 가자 회장. 마음껏 데이트해 버리자?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「私、会長としたいことたくさんあるんだ。今日はとことん付き合ってもらっちゃうからねっ？」"
translation = "「나, 회장과 하고 싶은 거 많이 있어. 오늘은 끝까지 어울려 줘야 하니까?」"

