[[dialogue]]
speaker = "unk"
original = "それは、サーシャさんとお正月デートに出かけた日の、帰り際のこと。"
translation = "그것은 사샤 씨와 정월 데이트를 나갔던 날의 돌아오는 길의 일."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もうすっかり夜になっちゃったわね～」"
translation = "「벌써 완전히 밤이 되어버렸네~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「じゃあ……そろそろお姉ちゃんと『姫始め』、しちゃう？」"
translation = "「그럼…… 슬슬 누나랑 『히메하지메』 해버릴까?」"

[[dialogue]]
speaker = "unk"
original = "耳元でそっと囁かれたその言葉に、俺は思わずドキッとしてしまう。"
translation = "귓가에서 살며시 속삭여진 그 말에 나는 나도 모르게 가슴이 두근거리고 만다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～<emoji=heart04>\u3000会長くんたら、可愛い～<emoji=heart04>\u3000そんな驚いた顔して……♪」"
translation = "「어머~<emoji=heart04> 회장군도 참, 귀여워~<emoji=heart04> 그런 놀란 얼굴을 하고……♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「可愛すぎて、思わず弟くんにしたくなっちゃうわ<emoji=heart04>」"
translation = "「너무 귀여워서 나도 모르게 남동생 군으로 삼고 싶어지네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は顔が熱くなるのを感じながら答える。"
translation = "나는 얼굴이 뜨거워지는 것을 느끼며 대답한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当の弟になっちゃったら、サーシャさんのこと抱けないじゃないですか……」"
translation = "「진짜 남동생이 되어버리면 사샤 씨를 안을 수 없잖아요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふっ<emoji=heart04>\u3000弟くんになっちゃうのは、嫌じゃないの？」"
translation = "「어머어머, 우후훗<emoji=heart04> 남동생 군이 되어버리는 건 싫어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ねぇねぇ、会長くん。<ruby>姉弟<rt>きょうだい</rt></ruby>でセックスしちゃいけない決まりなんて、どこにもないでしょ？」"
translation = "「있지 있지, 회장군. 남매끼리 섹스하면 안 된다는 규칙 같은 건 어디에도 없잖아?」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは悪戯っぽく艶やかな笑みを浮かべながら、耳元で囁く。"
translation = "사샤 씨는 장난스럽고 요염한 미소를 지으며 귓가에 속삭인다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから――会長くんがその気なら、今夜は私のこと『お姉ちゃん』にしちゃってもいいのよ<emoji=heart04>」"
translation = "「그러니까── 회장군이 그럴 마음이라면 오늘 밤은 나를 『누나』로 삼아도 된다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちは腕を組んでくっ付きながら、街のラブホテルへと移動して。"
translation = "그 후 우리들은 팔짱을 끼고 밀착한 채 거리의 러브호텔로 이동했다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ん……よいしょっと……<emoji=heart04>」"
translation = "「응…… 영차……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ……<emoji=heart04>\u3000お待たせ、<b>弟くん</b><emoji=heart04>」"
translation = "「후훗……<emoji=heart04> 오래 기다렸지, <b>남동생아</b><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは自らおま○こに手を添えて広げて、ピンク色の中を見せて誘ってくる。"
translation = "사샤 씨는 스스로 보지에 손을 얹고 벌려서, 핑크색 안쪽을 보여주며 유혹해 온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さ、サーシャさん、そんなポーズ……っ」"
translation = "「사, 사샤 씨, 그런 포즈는……윽」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら？\u3000人間界のカップルは、お正月にこうやって『姫始め』というのをするんでしょう？」"
translation = "「어라? 인간계의 커플은, 새해에 이렇게 『히메하지메』라는 걸 한다면서?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「その年でいちばん初めのおま○こを召し上がれ～、って<emoji=heart04>」"
translation = "「그해의 가장 첫 보지를 드세요~, 라면서<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……サーシャさんはちょっと、『姫始め』の知識を間違って覚えてしまっている気がする。が、ここでわざわざそれを訂正するのは、野暮というものだ。"
translation = "……사샤 씨는 조금, 『히메하지메』의 지식을 잘못 기억하고 있는 느낌이 든다. 하지만, 여기서 굳이 그것을 정정하는 것은 야비한 짓이다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「さあ、弟くん……セックス、しましょう？」"
translation = "「자, 남동생아……섹스, 할까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん……サーシャさん」"
translation = "「응……사샤 씨」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ<emoji=heart04>\u3000ダ～メ<emoji=heart04>\u3000『お姉ちゃん』、でしょ？」"
translation = "「후훗<emoji=heart04> 안~돼<emoji=heart04> 『누나』, 라고 해야지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お、お姉ちゃん……」"
translation = "「누, 누나……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「は～い♪\u3000よくできました<emoji=heart04>\u3000今日はた～っぷり、お姉ちゃんに甘えていいからね……<emoji=heart04>」"
translation = "「네~에♪ 참 잘했어요<emoji=heart04> 오늘은 듬~뿍, 누나한테 어리광 부려도 되니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ほら……見て？\u3000お姉ちゃん、弟くんに甘えてもらえて、凄く興奮してるのよ<emoji=heart04>\u3000もうこんなに濡れてる……<emoji=heart04>」"
translation = "「자…… 봐봐? 누나, 남동생이 어리광 부려줘서, 엄청 흥분했어<emoji=heart04> 벌써 이렇게 젖어버렸네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは誘うように、手でおま○こをくぱぁっと開き、愛液が溢れて<ruby>淫靡<rt>いんび</rt></ruby>な膣穴を見せつけてくる。"
translation = "사샤 씨는 유혹하듯이, 손으로 보지를 쿠파앗 하고 벌려, 애액이 넘쳐흐르는 음비한 질 구멍을 과시해 온다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから……早くきて、弟くん<emoji=heart04>\u3000お姉ちゃんと一緒に――」"
translation = "「그러니까…… 빨리 와, 남동생아<emoji=heart04> 누나랑 같이――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「<ruby>姉弟<rt>きょうだい</rt></ruby>セックスで、ドロドロに気持ちよく溶け合っちゃおう<emoji=heart04>」"
translation = "「남매 섹스로, 걸쭉하게 기분 좋게 녹아버리자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの甘い色気に満ちた誘惑姿に、とっくにガチガチに勃起してしまっていた俺は、ペニスを膣穴にあてがっていく。"
translation = "사샤 씨의 달콤한 색기가 넘치는 유혹하는 모습에, 이미 진작에 딱딱하게 발기해 버린 나는, 페니스를 질 구멍에 갖다 댄다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あんっ<emoji=heart04>\u3000おち○ちん、入り口に擦れてる<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「안<emoji=heart04> 자지, 입구에 스치고 있어<emoji=heart04> 응<emoji=heart04> 하아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「挿れるよ、<b>お姉ちゃん</b>」"
translation = "「삽입할게, <b>누나</b>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ――<emoji=heart04>」"
translation = "「앗――<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んんんぅっ――あっ<emoji=heart04><emoji=heart04>\u3000ふあああぁぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응응윽――앗<emoji=heart04><emoji=heart04> 후아아아아아～～～윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は今に暴発しそうな欲情を抑え込みつつ、ゆっくりとペニスをサーシャさんの蜜壺の中に挿入した。"
translation = "나는 당장이라도 폭발할 것 같은 욕정을 억누르며, 천천히 페니스를 사샤 씨의 밀단지 속에 삽입했다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んぅっ<emoji=heart04>\u3000はあぁっ……あっ<emoji=heart04>\u3000んうぅっ……んあぁっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하아앗…… 앗<emoji=heart04> 응우윽…… 응아앗<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「弟くんのおち○ちん、大きくて<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ……んっ<emoji=heart04>」"
translation = "「남동생의 자지, 커서<emoji=heart04> 하아앗<emoji=heart04> 후우웃…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「挿れられただけで、お姉ちゃん気持ち良く感じちゃうわぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んうぅっ……はああぁんっ<emoji=heart04>」"
translation = "「삽입된 것만으로도, 누나 기분 좋게 느껴버려아<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 응우윽…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内のトロトロに蕩けるような感触を味わうように、俺はサーシャさんが感じる膣の浅い場所から、じっくりとペニスのカリ首を擦り付けていく。"
translation = "질 내의 걸쭉하게 녹아내리는 듯한 감촉을 맛보듯이, 나는 사샤 씨가 느끼는 질의 얕은 곳부터, 정성스럽게 페니스의 귀두 부분을 문질러 나간다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁんっ<emoji=heart04>\u3000弟くん、そこ、お姉ちゃんの気持ちいいところぉ<emoji=heart04>\u3000ズリズリされたら感じちゃうぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅ～っ<emoji=heart04>\u3000ふああぁ……っ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 남동생아, 거기, 누나의 기분 좋은 곳이야아<emoji=heart04> 즈리즈리 비벼지면 느껴버려어<emoji=heart04> 앗<emoji=heart04> 하아아<emoji=heart04> 응으윽<emoji=heart04> 후아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "艶めいた声とともにおま○この中がぎゅ～っと締まり、ペニスを抱きしめるように収縮する。その甘い圧に耐えきれず、俺は喉の奥で声を漏らした。"
translation = "요염한 목소리와 함께 보지의 안쪽이 꽈아악 조여지며, 페니스를 껴안듯이 수축한다. 그 달콤한 압박을 견디지 못하고, 나는 목구멍 깊은 곳에서 신음 소리를 냈다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000弟くんは、お姉ちゃんのおま○こ、気持ちいい……？」"
translation = "「응<emoji=heart04> 후우우……<emoji=heart04> 남동생아, 누나의 보지, 기분 좋아……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……うん。いつもよりすごく絡みついてきて、気持ちいいっ」"
translation = "「윽…… 응. 평소보다 엄청나게 휘감겨 와서, 기분 좋아」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁあっ<emoji=heart04>\u3000お姉ちゃんも、今日の為に……自分でしないで我慢してたからぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000おま○こ、すごく気持ちよく感じちゃうわぁ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 누나도, 오늘을 위해서…… 스스로 하지 않고 참았으니까아<emoji=heart04> 앗<emoji=heart04> 응…… 후우우<emoji=heart04> 보지, 엄청나게 기분 좋게 느껴져어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んあぁっ<emoji=heart04>\u3000気持ち良すぎて、お姉ちゃん、もっとおち○ちん欲しくなっちゃうのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ……んうぅっ<emoji=heart04>\u3000はああぁんっ……<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 너무 기분 좋아서, 누나, 자지 더 갖고 싶어지게 돼애<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아앗……응으읏<emoji=heart04> 하아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの膣内は、たまらなく気持ちいい。濡れそぼった粘膜がぴたりと絡みつき、熱を帯びた内部がペニスの輪郭をなぞるように吸いついてくる。"
translation = "사샤 씨의 질 안은, 참을 수 없을 정도로 기분 좋다. 흠뻑 젖은 점막이 착 달라붙어 얽히고, 열기를 띤 내부가 페니스의 윤곽을 덧그리듯이 빨아당긴다."

[[dialogue]]
speaker = "unk"
original = "入口から奥まで、まるで何十もの柔らかな舌で愛撫されているかのような感覚に、思わず腰が震える。"
translation = "입구부터 안쪽까지, 마치 수십 개의 부드러운 혀로 애무받는 듯한 감각에, 나도 모르게 허리가 떨린다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから、お願い<emoji=heart04>\u3000今日はお姉ちゃんのこと……弟くんのおち○ちんで、めいっぱい気持ちよくしてぇ<emoji=heart04>」"
translation = "「그러니까, 부탁이야<emoji=heart04> 오늘은 누나를…… 남동생 군의 자지로, 한껏 기분 좋게 해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなサーシャさんの煽りに、俺は高ぶった興奮が抑えられず、膣内の奥までペニスを押し込んで、彼女の深い場所にある性感帯を刺激し始める。"
translation = "그런 사샤 씨의 도발에, 나는 고조된 흥분을 억제하지 못하고, 질 안쪽 깊숙이 페니스를 밀어 넣어, 그녀의 깊은 곳에 있는 성감대를 자극하기 시작한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふあぁっ<emoji=heart04>\u3000弟くぅんっ<emoji=heart04><emoji=heart04>\u3000奥の気持ちいいところ、おち○ちんきてるぅ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ……はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 남동생아아앗<emoji=heart04><emoji=heart04> 안쪽의 기분 좋은 곳에, 자지가 오고 있어어<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 응우웃<emoji=heart04> 응아앗……하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これまで幾度も感じさせてきた膣奥の敏感な一点を、亀頭で押しつけるようにぐりぐりと擦ると、奥がきゅっと締まり、快感に震える。"
translation = "지금까지 몇 번이고 느끼게 해왔던 질 안쪽의 민감한 한 점을, 귀두로 짓누르듯이 구리구리 비비자, 안쪽이 꽉 조여지며 쾌감에 떨린다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んああぁっ<emoji=heart04><emoji=heart04>\u3000お姉ちゃんの気持ちいいところ、弟くんに知られちゃってるぅ<emoji=heart04>\u3000感じるぅ<emoji=heart04>\u3000お姉ちゃん気持ちよくて、おま○こキュンキュンしちゃうのぉ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04><emoji=heart04> 누나의 기분 좋은 곳, 남동생한테 들켜버렸어어<emoji=heart04> 느껴져어<emoji=heart04> 누나 너무 기분 좋아서, 보지 큥큥거려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁんっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとお姉ちゃんを気持ちよくしてぇ<emoji=heart04>\u3000キスも<emoji=heart04>\u3000弟くん、キスもおねが～い<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 더<emoji=heart04> 더 누나를 기분 좋게 해줘어<emoji=heart04> 키스도<emoji=heart04> 남동생아, 키스도 부탁해에~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ<emoji=heart04>\u3000んっ……んむっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅむっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅうぅっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000れろちゅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응……음뭇<emoji=heart04> 츄<emoji=heart04> 츄파<emoji=heart04> 츄뭇<emoji=heart04> 츄푸푸……츄우우<emoji=heart04> 츄르릅<emoji=heart04> 르릅르릅<emoji=heart04> 츄루루룻<emoji=heart04> 레로츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はサーシャさんの唇を奪って、お互い貪るように舌を絡め合い、キスをする。"
translation = "나는 사샤 씨의 입술을 빼앗고, 서로 탐하듯 혀를 얽으며 키스를 한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁっ<emoji=heart04>\u3000キス、気持ちいいわぁ<emoji=heart04>\u3000頭の中まで、気持ちいいのでいっぱいになっちゃう<emoji=heart04>\u3000ん～っ<emoji=heart04>\u3000んむぅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅれるっ……ちゅるるるぅっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 키스, 기분 좋아아<emoji=heart04> 머릿속까지 기분 좋은 걸로 가득 차버려어<emoji=heart04> 응~읏<emoji=heart04> 음무웃<emoji=heart04> 츄웁<emoji=heart04> 츄파앗<emoji=heart04> 츄르릇…… 츄루루루웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は興奮に促されるままに、ぶるんぶるんと大きく揺れて誘惑してくるおっぱいを鷲掴みにする。"
translation = "나는 흥분에 이끌리는 대로, 출렁출렁 크게 흔들리며 유혹해 오는 가슴을 움켜쥔다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んんっ<emoji=heart04>\u3000ちゅむっ……れるれるっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅぱぁっ……はあぁっ<emoji=heart04>\u3000いいわぁ、弟くぅん<emoji=heart04>\u3000お姉ちゃんのおっぱいも、もっといじってぇ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 츄뭇…… 레로레롯<emoji=heart04> 츄루루룻<emoji=heart04> 레로츄웁<emoji=heart04> 츄파아앗…… 하아앗<emoji=heart04> 좋아아, 남동생 구운<emoji=heart04> 누나 가슴도 더 만져줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ――ふああぁんっ<emoji=heart04><emoji=heart04>\u3000弟くんにおっぱい吸われちゃったぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000お姉ちゃん乳首弱いからぁ、強く吸われちゃったら、もっと感じちゃうのぉ<emoji=heart04>」"
translation = "「앗――후아아앙<emoji=heart04><emoji=heart04> 남동생 군이 가슴 빨아버렸어어<emoji=heart04> 앗<emoji=heart04> 하아앙<emoji=heart04> 누나 유두 약하니까아, 강하게 빨리면 더 느껴버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はサーシャさんに言葉で誘われるまま、おっぱいにむしゃぶりついて、乳首を吸ったり、舌で転がしたりする。"
translation = "나는 사샤 씨의 말에 유혹당하는 대로, 가슴에 매달려 유두를 빨거나 혀로 굴리기도 한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁんっ<emoji=heart04><emoji=heart04>\u3000おっぱい気持ちいいっ<emoji=heart04>\u3000乳首コリコリされるのも気持ちいいわぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아앗<emoji=heart04> 응아앙<emoji=heart04><emoji=heart04> 가슴 기분 좋아<emoji=heart04> 유두 꼬집히는 것도 기분 좋아아<emoji=heart04> 앗<emoji=heart04> 응으윽<emoji=heart04> 응아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を吸っているのとは反対側のおっぱいも、乳首を指でコリコリと愛撫していく。……こうすると気持ちがいいというのも、サーシャさんに教えてもらったものだ。"
translation = "유두를 빨고 있는 반대편 가슴도, 유두를 손가락으로 꼬집으며 애무해 나간다. ……이렇게 하면 기분이 좋다는 것도, 사샤 씨에게 배운 것이다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んふうぅ～<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000ねぇ、弟くん<emoji=heart04>\u3000お姉ちゃんのおっぱい……弟くんは飲んでみたい？」"
translation = "「하아앗<emoji=heart04> 앙<emoji=heart04> 응후우~<emoji=heart04> 아아앗<emoji=heart04> 저기, 남동생 군<emoji=heart04> 누나 가슴…… 남동생 군은 마셔보고 싶어?」"

[[dialogue]]
speaker = "unk"
original = "俺が思わず「えっ」と驚いて顔を上げる。サーシャさんは母性と艶やかさが入り混じった微笑みを浮かべて、俺の耳元で囁く。"
translation = "내가 나도 모르게 「엣」 하고 놀라며 고개를 든다. 사샤 씨는 모성애와 요염함이 뒤섞인 미소를 지으며, 내 귓가에 속삭인다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今年は――お姉ちゃんに、弟くんの赤ちゃん、孕ませちゃおっか<emoji=heart04>」"
translation = "「올해는―― 누나한테, 남동생 군의 아기, 임신해버릴까<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000うぁっ！？」"
translation = "「윽……! 우앗!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ！？\u3000ふああぁんっ<emoji=heart04><emoji=heart04>\u3000弟くんの、<ruby>射精<rt>で</rt></ruby>てるぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아앙<emoji=heart04><emoji=heart04> 남동생 군의, 사정하고 있어어어~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はサーシャさんの孕ませ発言に興奮して、つい暴発してしまった。"
translation = "나는 사샤 씨의 임신 발언에 흥분해서, 그만 폭발해버리고 말았다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000弟くん、射精しながらでも、腰止まらないのすごぉいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하아앙<emoji=heart04> 남동생 군, 사정하면서도 허리가 멈추지 않는 거 대단해애<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんを孕ませる――それを想像したら、俺のペニスは休む暇もなくいきり立って、腰を止めることなんてできなかった。"
translation = "사샤 씨를 임신시킨다―― 그것을 상상하자, 내 페니스는 쉴 틈도 없이 발기하여 허리를 멈출 수가 없었다."

[[dialogue]]
speaker = "unk"
original = "むしろ、体の内側から更に燃え上がるように興奮は高まってきて。"
translation = "오히려 몸 안쪽에서 더욱 타오르듯이 흥분은 고조되어 가고."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！\u3000お姉ちゃんっ！！」"
translation = "「큭……! 누나!!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁあっ<emoji=heart04>\u3000弟くん<emoji=heart04>\u3000あああっ――<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 남동생 군<emoji=heart04> 아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んあああぁ～～っ、ふあぁあぁぁあぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아~~앗, 후아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は欲望に突き動かされるまま、腰を更に振り始めた。"
translation = "나는 욕망에 이끌리는 대로, 허리를 더욱 흔들기 시작했다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「おち○ちんすごぉいっ<emoji=heart04><emoji=heart04>\u3000んっ、あっ、はぁあっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、んうぅっ<emoji=heart04>\u3000んっんっんっ<emoji=heart04>\u3000んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「자지 대단해애<emoji=heart04><emoji=heart04> 응, 앗, 하아앗<emoji=heart04><emoji=heart04> 앗, 앗, 응으윽<emoji=heart04> 응응응<emoji=heart04> 응아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一度吐き出した精液が空気を含んでとろりと泡立ち、サーシャさんの膣内で、ぬちゅぬちゅといやらしい音を立てながら、俺のペニスを締めつけてくる。"
translation = "한 번 쏟아낸 정액이 공기를 머금어 걸쭉하게 거품이 일고, 사샤 씨의 질 내에서 뉘츄뉘츄하고 야한 소리를 내며 내 페니스를 조여온다."

[[dialogue]]
speaker = "unk"
original = "逃がすものかと腰を深く打ちつけ、子宮口めがけて亀頭を押しつけるたび、ぐちゅっと濁った快感が膣奥で響き合い、彼女の奥がさらに甘く啼いた。"
translation = "놓치지 않겠다는 듯 허리를 깊게 쳐박고, 자궁구를 향해 귀두를 밀어붙일 때마다 구츄하고 탁한 쾌감이 질 깊은 곳에서 울려 퍼지며, 그녀의 안쪽이 더욱 달콤하게 울부짖었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふああぁあ～っ<emoji=heart04><emoji=heart04>\u3000弟くんの精子、入って来てるよぉっ<emoji=heart04>\u3000んんんんぅうぅううう～～<emoji=heart04>」"
translation = "「후아아아~앗<emoji=heart04><emoji=heart04> 남동생 군의 정자, 들어오고 있어어<emoji=heart04> 응응응응으으으으으~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんの<ruby>子宮<rt>なか</rt></ruby>で、元気に泳いでるのぉ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04><emoji=heart04>\u3000んうぅっ、んあぁっ、ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「누나의 자궁에서, 활기차게 헤엄치고 있어어<emoji=heart04> 앗, 앗, 앙<emoji=heart04><emoji=heart04> 응으윽, 응아앗, 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんは高まる快楽にうっとりとした瞳で、想像を煽ることを口にする。"
translation = "사샤 씨는 고조되는 쾌락에 황홀해진 눈동자로, 상상력을 자극하는 말을 내뱉는다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はああぁっ<emoji=heart04>\u3000お姉ちゃんの子宮、キュンキュン喜んで卵子作っちゃうぅっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04> 누나 자궁이 큥큥 기뻐하며 난자를 만들어 버려어엇<emoji=heart04> 앗, 앗, 앗, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「排卵して精子お迎えしちゃうのぉっ<emoji=heart04>\u3000はあぁっ、あっ、あっ、はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「배란해서 정자를 맞이해 버려어엇<emoji=heart04> 하아앗, 앗, 앗, 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ、あんっ<emoji=heart04>\u3000お姉ちゃん卵子、弟くん精子にハグしちゃってるぅ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 누나 난자가 남동생 군 정자를 허그하고 있어어<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 하아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんの妄想に俺も一緒になって興奮しながら、子宮口に何度も亀頭の先をぐりぐりと押し付けて、精子を子宮に向かって送り込む。"
translation = "사샤 씨의 망상에 나도 함께 흥분하면서, 자궁구에 몇 번이고 귀두 끝을 그리그리 밀어붙여 정자를 자궁을 향해 보낸다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はああぁ～っ<emoji=heart04><emoji=heart04>\u3000元気な精子、卵子の中に入ってきちゃうっ<emoji=heart04><emoji=heart04>\u3000あぁあぁあああっ<emoji=heart04>」"
translation = "「하아아아~앗<emoji=heart04><emoji=heart04> 건강한 정자가 난자 안으로 들어와 버려어<emoji=heart04><emoji=heart04> 아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃん、弟くんの赤ちゃん受精するぅっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ、ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「누나, 남동생 군의 아기를 수정해 버려어엇<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙, 후아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……お姉ちゃん！\u3000俺の赤ちゃん、沢山産んでっ！」"
translation = "「윽…… 누나! 내 아기, 잔뜩 낳아줘!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はああああぁっ<emoji=heart04><emoji=heart04>\u3000弟くん、弟くんっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、んあぁあっ<emoji=heart04>\u3000はあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아앗<emoji=heart04><emoji=heart04> 남동생 군, 남동생 군<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 응아앗<emoji=heart04> 하아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２度目の射精欲が限界まで高まってきて、俺はサーシャさんに覆いかぶさるように体重をかけながら、腰の動きをどんどん速めていく。"
translation = "두 번째 사정욕이 한계까지 높아져서, 나는 사샤 씨를 덮어씌우듯 체중을 실으며 허리 움직임을 점점 빠르게 한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ、あっ、あっ、んああぁんっ<emoji=heart04><emoji=heart04>\u3000おち○ちん、どちゅどちゅすごいぃぃっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、はぁんっ<emoji=heart04>\u3000気持ちいいわぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 응아아앙<emoji=heart04><emoji=heart04> 자지, 도츄도츄 굉장해애애앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 하앙<emoji=heart04> 기분 좋아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「弟くん、気持ちいいっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとお姉ちゃんにおち○ちんプレスしてぇっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ、ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「남동생 군, 기분 좋아<emoji=heart04> 더<emoji=heart04> 더 누나한테 자지 프레스 해줘어엇<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙, 후아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ああぁんっ<emoji=heart04><emoji=heart04>\u3000きてっ<emoji=heart04>\u3000来てきてぇっ<emoji=heart04><emoji=heart04>\u3000お姉ちゃんの中に、いっぱい種付けしてぇ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앙<emoji=heart04><emoji=heart04> 와줘<emoji=heart04> 와줘와줘어엇<emoji=heart04><emoji=heart04> 누나 안에 잔뜩 씨뿌리기 해줘어어~~엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっあっあっあっ<emoji=heart04><emoji=heart04>\u3000んあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん激しいいっ<emoji=heart04><emoji=heart04>\u3000お姉ちゃんイクっ<emoji=heart04><emoji=heart04>\u3000イクイク、イっちゃうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗<emoji=heart04><emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지 격렬해애앗<emoji=heart04><emoji=heart04> 누나 가버려<emoji=heart04><emoji=heart04> 가버려가버려, 가버렷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お姉ちゃん、俺、もうイキそうっ！」"
translation = "「누나, 나, 이제 갈 것 같아!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んぅうう、あぁあ、あぁあぁあっ<emoji=heart04>\u3000あ、あ、あ、あ、あ、あっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000弟くんの本気射精で、受精イキするぅ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으으, 아아아, 아아아앗<emoji=heart04> 아, 아, 아, 아, 아, 앗<emoji=heart04> 아아아앗<emoji=heart04> 남동생 군의 진심 사정으로 수정 절정해버려어어어~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「孕んで、お姉ちゃんっ！！」"
translation = "「임신해줘, 누나!!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>\u3000イクイク、イっクぅぅうううっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아, 아아, 아아, 아아, 아아앗<emoji=heart04> 가버려가버려가버려엇<emoji=heart04><emoji=heart04><emoji=heart04> 앗앗앗앗앗<emoji=heart04> 가버려가버려, 가버려어어으으으읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふああぁああぁあぁあぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어으으으으윽------------------앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はいちばん奥深くまでペニスを挿入し、精液の逃げ場所がないようにして、サーシャさんの中に思いっきり射精する。"
translation = "나는 가장 깊숙한 곳까지 페니스를 삽입하고 정액이 도망갈 곳이 없도록 해서 사샤 씨의 안에 마음껏 사정한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁぁああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あああっ、すごぉいっ<emoji=heart04>\u3000２回目なのに、弟くんの精子もっといっぱい出てるぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 아아앗, 굉장해에앗<emoji=heart04> 두 번째인데 남동생 군 정자 더 잔뜩 나오고 있어어어~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんという、これ以上ない魅力的な女性へ種付けできるという多幸感に酔いしれながら、俺は大量の精液を射精し続ける。"
translation = "사샤 씨라는, 더할 나위 없이 매력적인 여성에게 씨를 뿌릴 수 있다는 다행감에 취하면서, 나는 대량의 정액을 계속 사정한다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んああぁんっ<emoji=heart04><emoji=heart04>\u3000射精すごいわぁ<emoji=heart04>\u3000お姉ちゃんの卵子、弟くんの精子で溺れちゃいそう……<emoji=heart04>」"
translation = "「응아아아앙<emoji=heart04><emoji=heart04> 사정 엄청나아<emoji=heart04> 누나의 난자, 남동생 군의 정자로 익사해버릴 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あぁんっ<emoji=heart04>\u3000卵子の中に、弟くん精子がもう１つ入ってきて、双子受精しちゃうかもぉ<emoji=heart04>\u3000はああぁ～っ……<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 난자 속에 남동생 군 정자가 하나 더 들어와서, 쌍둥이 수정돼버릴지도 몰라아<emoji=heart04> 하아아아~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――やがて、長かった射精が終わり、サーシャさんの豊満な胸に顔を埋めて快楽の余韻に浸っていた俺は、ペニスをゆっくりと膣から引き抜く。"
translation = "――이윽고, 길었던 사정이 끝나고, 사샤 씨의 풍만한 가슴에 얼굴을 묻고 쾌락의 여운에 잠겨 있던 나는, 페니스를 천천히 질에서 뽑아낸다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あぁあんっ……<emoji=heart04>」"
translation = "「아아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んっ……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>\u3000姫始めの種付けエッチ、ものすごく気持ち良くイっちゃったわ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아…… 후우……<emoji=heart04> 새해 첫 씨뿌리기 섹스, 엄청나게 기분 좋게 가버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ほら、見て<emoji=heart04>\u3000弟くんのすごくねっとりとした濃い精液、お姉ちゃんの膣から溢れてきちゃう……<emoji=heart04>」"
translation = "「자, 봐봐<emoji=heart04> 남동생 군의 아주 걸쭉하고 진한 정액이, 누나의 보지에서 흘러넘치고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃん、本当に赤ちゃんできちゃったかも……ふふふっ<emoji=heart04>\u3000孕ませエッチ、弟くんも気持ちよかった……？」"
translation = "「누나, 정말로 아기가 생겨버렸을지도…… 후후후<emoji=heart04> 임신시키기 섹스, 남동생 군도 기분 좋았어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そりゃあもう……。でも俺……サーシャさんに甘え過ぎて、ダメ人間になっちゃいそうで、ちょっと怖いです」"
translation = "「그거야 당연히……. 하지만 저…… 사샤 씨에게 너무 어리광 부려서, 못난 사람이 되어버릴 것 같아 조금 무서워요」"

[[dialogue]]
speaker = "unk"
original = "俺がどんなに甘えても、サーシャさんはいつも笑顔で受け入れてくれるので、ついつい我慢できずに激しく劣情をぶつけてしまう。"
translation = "내가 아무리 어리광을 부려도, 사샤 씨는 언제나 웃으며 받아주기에, 그만 참지 못하고 격렬한 열정을 쏟아붓고 만다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふっ♪\u3000こ～ら、『サーシャさん』じゃなくて『お姉ちゃん』、でしょ？」"
translation = "「어머어머, 우후후♪ 이~놈, 『사샤 씨』가 아니라 『누나』라고 불러야지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ、それはだって……」"
translation = "「엣, 그건 그게……」"

[[dialogue]]
speaker = "unk"
original = "セックスが終わった後だと、どうしても気恥ずかしくなってしまう。"
translation = "섹스가 끝난 직후에는 아무래도 쑥스러워지고 만다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「『でも』も『だって』もありません。聞き分けのない弟くんは、お姉ちゃんのおま○こでわからせちゃうぞ<emoji=heart04>」"
translation = "「『하지만』도 『그게』도 없어요. 말 안 듣는 남동생 군은, 누나의 보지로 혼내줄 거야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サーシャさんは俺の背中に手を回して抱き寄せながら、耳元で囁く。"
translation = "그렇게 말하며 사샤 씨는 내 등에 팔을 돌려 끌어안으면서 귓가에 속삭인다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――大丈夫よ、<b>会長くん</b>。ダメ人間にならないように、お姉ちゃんがきちんと管理してあげるから<emoji=heart04>」"
translation = "「――괜찮아, <b>회장</b> <b>군</b>. 못난 사람이 되지 않도록 누나가 제대로 관리해 줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから今日は……ハメを外して、ずっと弟くんのままで、ね？」"
translation = "「그러니까 오늘은…… 고삐를 풀고, 계속 남동생 군인 채로 있어줘, 응?」"

[[dialogue]]
speaker = "unk"
original = "年上の恋人から、甘い声でそんな風に優しく言われてしまえば、我慢できるはずもなく──"
translation = "연상의 연인에게 달콤한 목소리로 그런 식으로 다정하게 말을 들으면, 참을 수 있을 리도 없었고──"

[[dialogue]]
speaker = "unk"
original = "俺はそれからも、夜が更けるまで『お姉ちゃん』に甘え続けてしまうのだった。"
translation = "나는 그 뒤로도 밤이 깊어질 때까지 『누나』에게 계속 어리광을 부리고 말았다."

