[[dialogue]]
speaker = "unk"
original = "第２話,せつな流ストーキング忍術,P"
translation = "제2화, 세츠나류 스토킹 인술, P"

[[dialogue]]
speaker = "unk"
original = "あれから数日後、俺はせつなに呼ばれて九浄家に来ていた。"
translation = "그로부터 며칠 후, 나는 세츠나의 부름을 받고 쿠죠 가문에 와 있었다."

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「にんにん！\u3000これがせつなの新しいフォームでござるよ～！」"
translation = "「닌닌! 이것이 세츠나의 새로운 폼인 것이오~!」"

[[dialogue]]
speaker = "蘭美"
original = "「完全に使いこなせるようになったみたいね、やるじゃない！」"
translation = "「완전히 다룰 수 있게 된 모양이네, 제법이잖아!」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「ややっ、蘭美殿からお褒めの言葉を頂戴できるとは！\u3000光栄にござるよ～」"
translation = "「야얏, 라미 공으로부터 칭찬을 들을 수 있다니! 영광인 것이오~」"

[[dialogue]]
speaker = "閃"
original = "「せつなが努力している姿を見続けていただけに……感慨深いです」"
translation = "「세츠나가 노력하는 모습을 계속 지켜봐 왔던 만큼…… 감회가 깊네요」"

[[dialogue]]
speaker = "unk"
original = "頑張ったね、せつな"
translation = "열심히 했네, 세츠나"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「にゃにゃっ、それほどでもないでござるよ～」"
translation = "「냐냐앗, 그 정도는 아닌 것이오~」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふふっ、せつなさん照れてます♪」"
translation = "「후훗, 세츠나 씨 부끄러워하고 있어요♪」"

[[dialogue]]
speaker = "蘭美"
original = "「謙遜は程々になさい。努力を否定することは、結果を否定することにもなるのよ」"
translation = "「겸손은 적당히 하렴. 노력을 부정하는 것은, 결과도 부정하는 것이 된단다」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「……蘭美殿の言う通りでござるな。有難いお言葉、素直に頂戴しておくでござる」"
translation = "「……라미 공의 말씀대로인 것이오. 고마운 말씀, 솔직하게 받아두는 것이오」"

[[dialogue]]
speaker = "ヨミ"
original = "「せつなさん、得たのは新しいフォームだけじゃないんですよね？」"
translation = "「세츠나 씨, 얻은 건 새로운 폼뿐만이 아니죠?」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「そうなのでござる！\u3000なんとこのたび、師匠から正式な忍として認めてもらったでござる！」"
translation = "「맞는 것이오! 무려 이번에, 스승님으로부터 정식 닌자로 인정받은 것이오!」"

[[dialogue]]
speaker = "蘭美"
original = "「へえ、よかったじゃない。それで、今までとは何が違うのかしら？」"
translation = "「헤에, 잘됐네. 그래서, 지금까지와는 뭐가 다른 거니?」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「うっ、具体的には……そのぉ……」"
translation = "「윽, 구체적으로는…… 그게……」"

[[dialogue]]
speaker = "ヨミ"
original = "「見習い忍者を指導できるようになったみたいですよ」"
translation = "「견습 닌자를 지도할 수 있게 된 모양이에요」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「そう、それでござる！\u3000助言感謝でござるよ～、ヨミ殿！」"
translation = "「맞소, 그것인 것이오! 조언 감사한 것이오~, 요미 공!」"

[[dialogue]]
speaker = "蘭美"
original = "「ふっ、まだまだね……。なんだかとても頼りないわ！」"
translation = "「훗, 아직 멀었네……. 왠지 아주 미덥지 못해!」"

[[dialogue]]
speaker = "閃"
original = "「ですが、新しいフォームで戦闘力も向上したみたいですし、忍者としてもレベルアップしたのでは？」"
translation = "「하지만, 새로운 폼으로 전투력도 향상된 것 같고, 닌자로서도 레벨업한 것 아닐까요?」"

[[dialogue]]
speaker = "unk"
original = "実際に見せてあげたらどうかな？"
translation = "실제로 보여주는 건 어떨까?"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「それでござる！\u3000忍としてのニューせつなを披露するでござるよ～！」"
translation = "「그것인 것이오! 닌자로서의 뉴 세츠나를 선보이는 것이오~!」"

[[dialogue]]
speaker = "蘭美"
original = "「いいわ。どのくらい強くなったのか、私に見せてみなさい！\u3000スピード対決よ！」"
translation = "「좋아. 어느 정도 강해졌는지, 나에게 보여보렴! 스피드 대결이야!」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「面白いでござるな！\u3000蘭美殿の高速っぷりは有名でござるから」"
translation = "「재미있는 것이오! 라미 공의 고속 실력은 유명하니까 말이오」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふん、私の速度に勝てるかしら？\u3000さあ、捕まえてみなさい！」"
translation = "「후훗, 내 속도를 이길 수 있을까? 자, 잡아보렴!」"

[[dialogue]]
speaker = "ヨミ"
original = "「はや！\u3000さすがメイド長、もう見えなくなっちゃいました」"
translation = "「빨라! 역시 메이드장, 벌써 안 보이게 됐어요」"

[[dialogue]]
speaker = "閃"
original = "「さすがにあれには追いつけないような……」"
translation = "「과연 저건 따라잡을 수 없을 것 같은데……」"

[[dialogue]]
speaker = "unk"
original = "せつななら勝てるよ！"
translation = "세츠나라면 이길 수 있어!"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「あ、主様ぁ～～。そのお言葉がせつなを強くするでござる！」"
translation = "「아, 주인님~~. 그 말씀이 세츠나를 강하게 만드는 것이오!」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「よーし、頑張るでござるよっ！」"
translation = "「조오아, 힘내는 것이오!」"

[[dialogue]]
speaker = "蘭美"
original = "「たとえ新たな戦闘服を得たとしても、私に速度で勝てると思わないでちょうだい」"
translation = "「비록 새로운 전투복을 얻었다고 해도, 나에게 속도로 이길 수 있다고 생각하지 말아줘」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「──果たしてそれはどうでござるかな？」"
translation = "「──과연 그럴까 말이오?」"

[[dialogue]]
speaker = "蘭美"
original = "「やるわね、私に追いついてくるなんて。けれどこれが全力だなんて思わないでちょうだい」"
translation = "「제법이네, 나를 따라잡다니. 하지만 이게 전력이라고 생각하지 말아줘」"

[[dialogue]]
speaker = "蘭美"
original = "「まだ５割、いや３割、全然本気じゃないんだから。全力を出せば一瞬で──」"
translation = "「아직 5할, 아니 3할, 전혀 진심이 아니니까. 전력을 다하면 순식간에──」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「その前に捕まえるでござる！\u3000忍法、影分身っ！」"
translation = "「그전에 잡는 것이오! 인법, 그림자 분신!」"

[[dialogue]]
speaker = "蘭美"
original = "「何ですって！？」"
translation = "「뭐라고!?」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「にんにん、せつなの勝ちでござる～！\u3000忍には忍の戦い方があるでござるよ♪」"
translation = "「닌닌, 세츠나의 승리인 것이오~! 닌자에게는 닌자의 싸움 방식이 있는 것이오♪」"

[[dialogue]]
speaker = "蘭美"
original = "「油断したわ……次はこちらも戦闘服でやるから、もう１戦よ！」"
translation = "「방심했네…… 다음은 이쪽도 전투복으로 할 테니까, 한 판 더 해!」"

[[dialogue]]
speaker = "閃"
original = "「いえ、同じことを繰り返すより別なことを、次は私がお相手します」"
translation = "「아니요, 같은 것을 반복하기보다 다른 것을, 다음은 제가 상대하겠습니다」"

[[dialogue]]
speaker = "unk"
original = "閃なら、ストーキング対決だ！"
translation = "센이라면, 스토킹 대결이다!"

[[dialogue]]
speaker = "閃"
original = "「待って下さい！\u3000どうして私ならストーキング対決なんですかっ？」"
translation = "「잠깐만요! 어째서 저라면 스토킹 대결인 건가요!」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「閃殿はストーキングの達人でござるからな～。せつなも心して挑まねばなりません！」"
translation = "「센 공은 스토킹의 달인이니까 말이오~. 세츠나도 마음 단단히 먹고 도전해야 하오!」"

[[dialogue]]
speaker = "蘭美"
original = "「面白そうじゃない。ストーキング対象は言い出しっぺの会長にやってもらおうかしら」"
translation = "「재밌겠네. 스토킹 대상은 말을 꺼낸 회장님이 해줄까」"

[[dialogue]]
speaker = "unk"
original = "２人とも準備はいい？"
translation = "둘 다 준비됐어?"

[[dialogue]]
speaker = "unk"
original = "まかせて！"
translation = "맡겨줘!"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「いつでもいいでござるよ」"
translation = "「언제든 괜찮은 것이오」"

[[dialogue]]
speaker = "閃"
original = "「私はまだやるとは言ってませんよ～っ！」"
translation = "「저는 아직 한다고 말 안 했어요~!」"

[[dialogue]]
speaker = "蘭美"
original = "「問答無用！\u3000ストーキング、スタート！」"
translation = "「문답무용! 스토킹, 스타트!」"

[[dialogue]]
speaker = "ヨミ"
original = "「消えました！？\u3000いつの間に……」"
translation = "「사라졌어요!? 어느 사이에……」"

[[dialogue]]
speaker = "蘭美"
original = "「いいわね、何だかんだ言って、２人ともやる気十分ってところかしら」"
translation = "「좋네, 이러니저러니 해도 둘 다 의욕 충만하다는 걸까」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「……にんにん♪」"
translation = "「……닌닌♪」"

[[dialogue]]
speaker = "unk"
original = "（……せつな？）"
translation = "（……세츠나?）"

[[dialogue]]
speaker = "unk"
original = "（……え？）"
translation = "（……에?）"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「ストーキング開始でござるよ～。たとえ閃殿が相手でも、主様へのストーキングで負けるわけには参りませぬ」"
translation = "「스토킹 개시인 것이오~. 비록 센 공이 상대라도, 주인님을 향한 스토킹에서 질 수는 없소」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「ふふふ、これぞ密着の術にござる<emoji=heart04>」"
translation = "「후후후, 이것이 바로 밀착의 술법인 것이오<emoji=heart04>」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「これでもう主様は逃げられないでござる……ずっとせつなと一緒でござる」"
translation = "「이걸로 이제 주인님은 도망칠 수 없는 것이오…… 계속 세츠나와 함께인 것이오」"

[[dialogue]]
speaker = "unk"
original = "これってストーキングになるの？"
translation = "이게 스토킹이 되는 거야?"

[[dialogue]]
speaker = "unk"
original = "し、刺激的すぎる"
translation = "자, 자극이 너무 심해"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「ご安心下され。師匠直伝、ストーキング忍術にござる」"
translation = "「안심하시구려. 스승님 직전, 스토킹 인술인 것이오」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「このまま正面に回るでござるよ～。なあに、忍術なので絶対に気付かれないでござる♪」"
translation = "「이대로 정면으로 돌아가는 것이오~. 뭐어, 인술이라 절대 들키지 않는 것이오♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ええと……誰か教えてくれるかしら？\u3000いったいあれは何なの？」"
translation = "「저기…… 누가 좀 알려줄래? 대체 저건 뭐야?」"

[[dialogue]]
speaker = "ヨミ"
original = "「あはは、イチャイチャ忍術ですかねぇ？」"
translation = "「아하하, 꽁냥꽁냥 인술일까요?」"

[[dialogue]]
speaker = "閃"
original = "「あんなの入っていけません！\u3000まさかこんな画期的なストーキング術があったなんて……」"
translation = "「저런 데 끼어들 수 없어요! 설마 이런 획기적인 스토킹 술법이 있었다니……」"

[[dialogue]]
speaker = "閃"
original = "「あ、いえ。私はストーキング術に興味なんてありませんよ。気のせいです、気のせい」"
translation = "「아, 아니요. 저는 스토킹 기술에 흥미 같은 거 없거든요. 기분 탓이에요, 기분 탓.」"

[[dialogue]]
speaker = "せつな（覚醒）"
original = "「さあ、主様。も～っとむぎゅっとするでござるよ～<emoji=heart04>」"
translation = "「자, 주군. 좀~ 더 꼬옥 껴안는 것이오~ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺はせつなのストーキング忍術を受け続けるのだった。"
translation = "이렇게 해서, 나는 세츠나의 스토킹 인술을 계속 받게 되는 것이었다."

