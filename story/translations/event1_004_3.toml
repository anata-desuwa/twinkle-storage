[[dialogue]]
speaker = "unk"
original = "場所を変え、星徒会室で事情を聞くことになった。"
translation = "장소를 옮겨, 성도회실에서 사정을 듣기로 했다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あの本、私たちが追いつくまでの間に、お兄さんの記憶も奪ってたなんて……！」"
translation = "「그 책, 우리가 따라잡기 전 사이에 오빠의 기억도 앗아갔다니……!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族よ、大丈夫か！？\u3000怪我はないのか！？」"
translation = "「권속이여, 괜찮으냐!? 다친 곳은 없느냐!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――そうか、記憶喪失というだけなんじゃな？\u3000それならば、ひとまずはよい。怪我をされるよりマシじゃからな」"
translation = "「――그런가, 기억상실일 뿐인 것이냐? 그렇다면 일단은 다행이구나. 다치는 것보다야 나으니까 말이다」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっと！\u3000私が記憶を失った時と、反応違くない！？\u3000なんで私の場合は怒るわけ！？」"
translation = "「잠깐! 내가 기억을 잃었을 때랑 반응이 다르지 않아!? 왜 내 경우에는 화를 내는 건데!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「うっさいわ！\u3000眷族は、我の第一の配下なんじゃ！\u3000<ruby>主<rt>あるじ</rt></ruby>として、その身を案じるのは当然のことじゃ！」"
translation = "「시끄럽느니라! 권속은 나의 제일가는 부하이니라! 주인으로서 그 몸을 걱정하는 것은 당연한 일이지!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「大体、サチ！\u3000貴様の場合は、幸運だからと調子に乗った挙句に、記憶を取られたんじゃろうが！\u3000後先考えない行動しおってからに……！」"
translation = "「애초에 사치! 네놈의 경우는 행운이라며 우쭐대다가 기억을 빼앗긴 것 아니더냐! 앞뒤 생각 안 하고 행동하더니만……!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あそこでロストアイテムを逃がしてなければ、眷族の記憶が奪われることもなかったんじゃ！」"
translation = "「거기서 로스트 아이템을 놓치지 않았더라면 권속의 기억이 빼앗길 일도 없었느니라!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「逃がしたのはアンタも一緒でしょ！\u3000１年くらい記憶を忘れてるからって、なんなのよ！」"
translation = "「놓친 건 너도 마찬가지잖아! 1년 정도 기억을 잊었다고 해서 뭐가 어쨌다는 거야!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「その『我に関する記憶』を忘れているせいで、連携ガタガタだったじゃろうが！」"
translation = "「그 『나에 관한 기억』을 잊고 있는 탓에 연계가 엉망진창이었지 않느냐!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「アンタがもっと協力的なら、カバーできてたと思うんだけど！？」"
translation = "「네가 좀 더 협조적이었다면 커버할 수 있었을 거라 생각하는데!?」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「お、お２人とも、落ち着いて……それよりも今は、記憶喪失の会長さまに色々説明してあげませんと。ね？」"
translation = "「두, 두 분 다 진정하세요…… 그것보다 지금은 기억상실인 회장님께 여러 가지 설명해 드려야죠. 네?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……ごめんなさい。トマルくんの言う通りですね」"
translation = "「……미안해요. 토마루 군 말이 맞네요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふん」"
translation = "「흥」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん。私やプリムラのことも忘れちゃってるっていうのは、本当ですか？」"
translation = "「오빠. 저나 프리뮬러에 대해서도 잊어버렸다는 게 정말인가요?」"

[[dialogue]]
speaker = "unk"
original = "ごめん。思い出せないんだ……"
translation = "미안. 기억이 안 나……"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いえ、元は私の不始末が原因ですから。私たちのことを覚えてないのなら、改めて自己紹介しないとですね――」"
translation = "「아니에요, 원래 제 불찰이 원인이니까요. 저희를 기억하지 못하신다면 다시 자기소개를 해야겠네요――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私は、流星学園附属校で<b>生徒会長</b>をやっている、<ruby>白詰<rt>しろつめ</rt></ruby>サチです」"
translation = "「저는 유성 학원 부속교에서 <b>학생회장</b>을 맡고 있는 시로츠메 사치예요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「附属校については――覚えてるみたいですね。流星学園の本校よりも、学年が下の生徒達が通っているところです」"
translation = "「부속교에 대해서는―― 기억하고 계신 모양이네요. 유성 학원 본교보다 학년이 낮은 학생들이 다니는 곳이에요」"

[[dialogue]]
speaker = "unk"
original = "━━ちなみに新星学園の附属校はない。"
translation = "━━참고로 신성 학원의 부속교는 없다."

[[dialogue]]
speaker = "unk"
original = "新星学園にスカウトした子がまだ若かった場合には、流星学園附属校に通ってから、新星学園に進学するパターンもあるのだとか。"
translation = "신성 학원에 스카우트한 아이가 아직 어릴 경우에는 유성 학원 부속교에 다니다가 신성 학원으로 진학하는 패턴도 있다고 한다."

[[dialogue]]
speaker = "unk"
original = "新星学園が開校した現在では、附属生は卒業後、どちらの学園に通うかを自身で選ぶことができるらしい。"
translation = "신성 학원이 개교한 현재는 부속생들이 졸업 후 어느 학원에 다닐지 스스로 선택할 수 있는 모양이다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それで、こちらが私と同じく、生徒会所属の――」"
translation = "「그리고 이쪽이 저와 마찬가지로 학생회 소속인――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我こそは、悪の終末兵器にして、やがて世界征服を成し遂げる支配者、プリムラじゃ！」"
translation = "「나야말로 악의 종말 병기이자 머지않아 세계 정복을 이룩할 지배자, 프리뮬러이니라!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「自称なんで、悪とか終末兵器とかは、とりあえずスルーしてください」"
translation = "「자칭이니까 악이라든가 종말 병기라든가 하는 건 일단 무시해 주세요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「自称じゃないわ！\u3000眷族よ、忘れているかもしれんが貴様は、我と主従の契約を結んでいるのじゃ！」"
translation = "「자칭이 아니니라! 권속이여, 잊었을지도 모르지만 네놈은 나와 주종 계약을 맺었느니라!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……眷族って、どうせプリムラが一方的にそう呼んでるだけなんじゃないの？」"
translation = "「……권속이라니, 어차피 프리뮬러가 일방적으로 그렇게 부르는 것뿐 아냐?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「嘘じゃないわい！\u3000我が眷属の主なのじゃ！」"
translation = "「거짓말이 아니니라! 내가 권속의 주인인 것이니라!」"

[[dialogue]]
speaker = "？？？"
original = "「眷族なのは合ってますけど、力関係は逆ですよね～。契約失敗しちゃって、会長さんの方がプリムラさんの主なんですよ」"
translation = "「권속인 건 맞지만 힘의 관계는 반대죠~. 계약에 실패해서 회장님이 프리뮬러 씨의 주인이에요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「こらっ、トレジアンナ！\u3000余計なこと言うでないわ！」"
translation = "「이봐, 트레지안나! 쓸데없는 소리 하지 말거라!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これって、保健室で聞いたのと同じ声……！\u3000一体どこから……？」"
translation = "「이건 보건실에서 들었던 거랑 같은 목소리……! 대체 어디서……?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「マトイさんとは、これが初めましてですね～。サチさんの髪飾りから、声だけで失礼します～」"
translation = "「마토이 씨와는 이게 처음 뵙는 거네요~. 사치 씨의 머리 장식에서 목소리만으로 실례할게요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「私、サチさんのロストアイテムに宿ってる、トレジアンナって言います～。よろしくお願いしますね～♪」"
translation = "「저, 사치 씨의 로스트 아이템에 깃들어 있는 트레지안나라고 해요~. 잘 부탁드려요~♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「は、はい、よろしくお願いします……って、そろそろ教えて欲しいんだけど、ロストアイテムって一体なんなの？」"
translation = "「네, 네, 잘 부탁해…… 근데 슬슬 알려줬으면 좋겠는데, 로스트 아이템이란 게 대체 뭐야?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あの本や、トレジアンナさん等ロストアイテムは……３０００年以上前から存在している、特殊な力を持つ道具なんです」"
translation = "「저 책이나 트레지안나 씨 같은 로스트 아이템은…… 3000년 이상 전부터 존재해 온 특수한 힘을 가진 도구예요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「悪の終末兵器である我も、元はロストアイテム『賢者の石』から作られた存在なのじゃ」"
translation = "「악의 종말 병기인 나도 원래는 로스트 아이템 『현자의 돌』에서 만들어진 존재이니라」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ！？\u3000プリムラちゃんもそうなの！？」"
translation = "「엣!? 프리뮬러 짱도 그래!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ロストアイテムは、それぞれ理屈を超越した力を持っていて、使い方を誤れば、それこそ世界を滅ぼすことも可能なくらい危険なものなんです」"
translation = "「로스트 아이템은 저마다 이치를 초월한 힘을 가지고 있어서, 사용법을 그르치면 그야말로 세계를 멸망시키는 것도 가능할 만큼 위험한 거예요」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふふん、悪の終末兵器は自称でないと言ったじゃろう？」"
translation = "「후훈, 악의 종말 병기는 자칭이 아니라고 하지 않았느냐?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「世界にリクリエの危機が迫りつつある今、私を含めて、ロストアイテム達は長き眠りから目覚めつつあります」"
translation = "「세계에 리크리에의 위기가 다가오고 있는 지금, 저를 포함해서 로스트 아이템들은 긴 잠에서 깨어나고 있어요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いえ、正確には、リクリエを引き起こす為に目覚めているのかもしれませんが……」"
translation = "「아니, 정확히는 리크리에를 일으키기 위해 깨어나고 있는 것일지도 모르지만요……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そうならないように、私はトレジアンナさんに協力して、ロストアイテムの回収をしているんです」"
translation = "「그렇게 되지 않도록 저는 트레지안나 씨에게 협력해서 로스트 아이템을 회수하고 있는 거예요」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そう……サチさんに、魔法少女トレジャー☆サチへと変身してもらって！」"
translation = "「그래요~ 사치 씨에게 마법소녀 트레저☆사치로 변신하게 해서!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「魔法少女っていうのは認めてませんから！\u3000お兄さん、違いますからね！？」"
translation = "「마법소녀라는 건 인정 안 하니까요! 오빠, 아니거든요!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トレジアンナさんの趣味で、勝手にそう言ってるだけですから！」"
translation = "「트레지안나 씨의 취미로 멋대로 그렇게 말하는 것뿐이니까요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「え～、魔法少女、可愛いじゃないですか～。サチさんの戦闘服も、それっぽいですし～☆」"
translation = "「에~ 마법소녀, 귀엽잖아요~. 사치 씨의 전투복도 그럴싸하고요~☆」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「言われてみれば、確かに……！」"
translation = "「듣고 보니 확실히……!」"

[[dialogue]]
speaker = "unk"
original = "違和感なかった"
translation = "위화감이 없었다"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ですよね！\u3000ですよね～♪」"
translation = "「그쵸! 그렇죠~♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「うぅ……好きであの戦闘服なわけじゃないんですが……」"
translation = "「으으…… 좋아서 저 전투복인 게 아닌데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、トマルや記憶を失う前の会長は知ってたみたいだけど、サチちゃん達が危険なロストアイテムを回収してたなら、もっと早く教えてくれればよかったのに」"
translation = "「하지만 토마루나 기억을 잃기 전의 회장은 알고 있었던 것 같은데, 사치 짱들이 위험한 로스트 아이템을 회수하고 있었다면 좀 더 일찍 알려줬으면 좋았을 텐데」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「知ってたら、私も協力してたよ？」"
translation = "「알았더라면 나도 도와줬을 거야」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「そこはごめんなさ～い。私からサチさん達に、あまりロストアイテムの存在を広めないようにお願いしてたんですよ～」"
translation = "「그 점은 죄송해요~. 제가 사치 씨 일행에게 로스트 아이템의 존재를 너무 퍼뜨리지 말아 달라고 부탁했거든요~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「残念ながら、世の中は良い人ばかりではありませんから。悪い人の手に渡れば、ロストアイテムは本当に世界を滅ぼす兵器にもなりえます」"
translation = "「안타깝게도 세상에는 좋은 사람만 있는 게 아니니까요. 나쁜 사람의 손에 넘어가면 로스트 아이템은 정말로 세계를 멸망시킬 병기가 될 수도 있어요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なるほどねぇ……それはそうかも」"
translation = "「과연…… 그럴지도 모르겠네」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それで、今回の『記憶のロストアイテム』についてですが――」"
translation = "「그래서 이번 『기억의 로스트 아이템』에 대해서인데요――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あの本はもうお分かりの通り、人の記憶を奪う力を持っています。放置しておくことはできません」"
translation = "「저 책은 이미 아시다시피 사람의 기억을 빼앗는 힘을 가지고 있어요. 방치해 둘 수는 없죠」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ただ情けない話ですが、見ての通り苦戦していて……お兄さんとマトイ先輩にも協力してほしいんですが……お願いできませんか？」"
translation = "「다만 한심한 이야기지만 보시다시피 고전하고 있어서…… 오빠와 마토이 선배님도 도와주셨으면 하는데…… 부탁드려도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん協力するよ"
translation = "물론 협력할게"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「２人の記憶を取り戻さないといけないし、後輩の頼みなら力を貸さないとね」"
translation = "「두 사람의 기억을 되찾아야 하기도 하고, 후배의 부탁이라면 힘을 보태야지」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ありがとうございます」"
translation = "「감사합니다」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「それじゃあ、皆で魔法少女活動、再開しましょ～！\u3000お～☆」"
translation = "「그럼 다 같이 마법소녀 활동 재개해 봐요~! 오~☆」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「お～！」"
translation = "「오~!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「おー！\u3000……って、魔法少女じゃないですからっ！」"
translation = "「오~! ……가 아니라, 마법소녀 아니라니까요!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「え～、サチさんのいけず～」"
translation = "「에~ 사치 씨 너무해~」"

[[dialogue]]
speaker = "unk"
original = "こうして、サチ達のロストアイテム回収を手伝うことになったのだった。"
translation = "이렇게 해서 사치 일행의 로스트 아이템 회수를 돕게 된 것이었다."

