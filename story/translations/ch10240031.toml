[[dialogue]]
speaker = "unk"
original = "第１話,特別な権利,P"
translation = "제1화, 특별한 권리, P"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「２人ともよく来てくれた。用件は他でもない、我々のウェディングフォームについて所感を聞こうと思ってな」"
translation = "「둘 다 잘 와주었다. 용건은 다름이 아니라, 우리의 웨딩 폼에 대해 소감을 들어볼까 해서 말이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「まずはヨミ、ウェディングフォームに」"
translation = "「먼저 요미, 웨딩 폼으로」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「は、はいっ！」"
translation = "「네, 넵!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「……ふむ」"
translation = "「……흠」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「な、何か気になるところが……？」"
translation = "「머, 뭔가 신경 쓰이는 부분이라도……?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「変身速度も申し分ない。星力の循環も順調のように見える。が……」"
translation = "「변신 속도도 나무랄 데 없다. 성력의 순환도 순조로운 것으로 보이는군. 하지만……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「すこぶる可愛いな♪」"
translation = "「무척이나 귀엽구나♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁんっ！？\u3000勿体つけて出した感想がそれですか？」"
translation = "「코양!? 뜸 들여서 내놓은 감상이 그거예요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「何を言うか、可愛さは何より重要だぞ、ヨミヨミ」"
translation = "「무슨 소리냐, 귀여움은 무엇보다 중요하다구, 요미요미」"

[[dialogue]]
speaker = "unk"
original = "同感です！"
translation = "동감입니다!"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ほら、恋人もこう申しているではないか」"
translation = "「보아라, 연인도 이렇게 말하고 있지 않으냐」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、そういうものなんでしょうか？\u3000もしかして、私の認識が間違ってる？」"
translation = "「그, 그런 걸까요? 혹시 제 인식이 틀린 건가요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ただ戦闘力を求めるなら、花嫁装束でなくともよい。では何故、私がウェディングフォームを欲したのか。それ即ち」"
translation = "「단순히 전투력만을 원한다면 굳이 신부 의복이 아니어도 된다. 그렇다면 어째서 내가 웨딩 폼을 원했는가. 그것은 즉」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「可愛いお嫁さんが見たかったからだ！！」"
translation = "「귀여운 신부를 보고 싶었기 때문이다!!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そんなどうでもいい理由だったんですか……」"
translation = "「그런 아무래도 좋은 이유였나요……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「だって悔しいじゃないか、星見家ばっかり可愛い花嫁さんを取り揃えて。これは不公平というものだ」"
translation = "「그치만 분하지 않느냐, 호시미 가문만 귀여운 신부들을 갖춰놓고. 이건 불공평한 처사다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「であるから、九浄家としては星見家に対抗してウェディングフォームを研究、開発したというわけだ。理解したか？」"
translation = "「그리하여 쿠죠 가문으로서는 호시미 가문에 대항해 웨딩 폼을 연구, 개발했다는 것이다. 이해했느냐?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はい、このウェディングフォームにはそんな理由が……」"
translation = "「네, 이 웨딩 폼에는 그런 이유가……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「って、割としょうもない理由なんですね。まあ、いつものことですけど」"
translation = "「라니, 꽤나 시시한 이유네요. 뭐, 늘 있는 일이지만요」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そうぼやくな、ヨミヨミ。なんだかんだでよい思いができたのではないか？」"
translation = "「그렇게 투덜대지 마라, 요미요미. 이러니저러니 해도 좋은 경험을 하지 않았느냐?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それは……確かに……はい、仰る通りですね。会長がもっと私のこと、見てくれるようになりましたし<emoji=heart04>」"
translation = "「그건…… 확실히…… 네, 말씀하신 대로예요. 회장님이 제 모습을 더 봐주게 되었고요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気付いてたの！？"
translation = "눈치채고 있었어!?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もちろん気付きますよ～！\u3000もう、チラチラ視線を向けて……恋人同士なんだから、もっと堂々と見てもいいのに」"
translation = "「당연히 눈치채죠~! 정말, 힐끔힐끔 시선을 보내고는…… 연인 사이니까 좀 더 당당하게 봐도 되는데」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そう責めてやるな。ヨミヨミがかわゆすぎて、直視できなかったのであろうよ。それもまた男心、魔王の伴侶ならそのくらい酌んでこそ、よき女というものだぞ」"
translation = "「그렇게 나무라지 마라. 요미요미가 너무 귀여워서 똑바로 쳐다볼 수 없었던 게지. 그것 또한 남자의 마음, 마왕의 반려라면 그 정도는 헤아려야 좋은 여자라 할 수 있느니라」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、そうですね。別に見られてても嫌じゃなかったですし」"
translation = "「그, 그렇네요. 딱히 보고 있어도 싫지는 않았고요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こそこそ見られるのも悪くないんですけど、やっぱり見たいって直接言われたかったですね。彼女として求められてるな～って感じたいなって思います」"
translation = "「몰래 보는 것도 나쁘지 않지만, 역시 보고 싶다고 직접 말해주길 바랐어요. 여자친구로서 원해지고 있구나~ 하고 느끼고 싶다고 생각해요」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「こう申しているが、どうだ？」"
translation = "「이렇게 말하는데, 어떠냐?」"

[[dialogue]]
speaker = "unk"
original = "ヨミヨミの花嫁姿、じっくり見ていい？"
translation = "요미요미의 신부 모습, 자세히 봐도 돼?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁん！？\u3000自分から言ったことですけど、それにしたってストレートに言いますね」"
translation = "「코양!? 제가 한 말이긴 하지만, 그렇다고 해도 너무 직설적으로 말씀하시네요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「まあ……会長が見たいって言ってくれたから……いいですよ、見ても。せっかくの機会です、しっかり観察して、思う存分好奇心を満たして下さい」"
translation = "「뭐…… 회장님이 보고 싶다고 하셨으니까…… 좋아요, 봐도. 귀한 기회니까요, 제대로 관찰해서 마음껏 호기심을 채우세요」"

[[dialogue]]
speaker = "unk"
original = "じぃーーーーーーっ"
translation = "빤히――――"

[[dialogue]]
speaker = "unk"
original = "ではさっそく"
translation = "그럼 곧바로"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ち、近いですよ、近すぎますって」"
translation = "「가, 가까워요, 너무 가깝다니까요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はわわわわっ、会長がこんなに近くに……２人きりの時はよくあるけど、当主様の前で恋人距離なんて……」"
translation = "「하와와와, 회장님이 이렇게 가까이…… 둘만 있을 때는 자주 있는 일이지만, 당주님 앞에서 연인 거리라니……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「照れているな、ヨミヨミ。可愛いぞ♪」"
translation = "「부끄러워하는구나, 요미요미. 귀엽구나♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやん！\u3000からかわないでくださいよぉ～～～っ！」"
translation = "「코양! 놀리지 말아 주세요오~~~!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「どうだ、白無垢を纏ったヨミヨミは？\u3000九浄家自慢のメイドだぞ」"
translation = "「어떠냐, 시로무쿠를 입은 요미요미는? 쿠죠 가문이 자랑하는 메이드다」"

[[dialogue]]
speaker = "unk"
original = "最高に可愛いです"
translation = "최고로 귀엽습니다"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁっ……」"
translation = "「코양……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「最高に可愛い……確かにその通りだ。しかし！\u3000もっと他にも褒める要素があるだろう？」"
translation = "「최고로 귀엽다…… 확실히 그렇군. 하지만! 좀 더 다른 칭찬 요소가 있지 않느냐?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ヨミヨミの実家は神社だからな。巫女装束も着慣れている。だからこそ、この白無垢の着こなしよ！\u3000一朝一夕で身につくものではないぞ」"
translation = "「요미요미의 본가는 신사니까 말이다. 무녀복도 익숙하지. 그렇기에 이 시로무쿠의 맵시가 사는 것이다! 하루아침에 몸에 익는 것이 아니란 말이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「つまり、このウェディングフォームはただの萌え衣装ではない。ヨミヨミのために最適化された特別な装いなのだっ！」"
translation = "「즉, 이 웨딩 폼은 단순한 모에 의상이 아니다. 요미요미를 위해 최적화된 특별한 복장인 것이다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、そこまで考えてくれていたんですね……私、感動です！」"
translation = "「거, 거기까지 생각해주셨군요…… 저, 감동이에요!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さあ、魔王よ。ヨミヨミの花婿となるつもりなら、その魅力を余すところなく語ってみよ！」"
translation = "「자, 마왕이여. 요미요미의 신랑이 될 생각이라면 그 매력을 남김없이 말해보아라!」"

[[dialogue]]
speaker = "unk"
original = "清楚で可憐でふわふわしてていい匂いがして"
translation = "청초하고 가련하고 푹신푹신하고 좋은 냄새가 나고"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ストーーップ！\u3000そのくらいでもう十分です！\u3000しっかり伝わりましたからぁ！」"
translation = "「스토오옵! 그 정도면 충분해요! 확실히 전해졌으니까요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もう、すごい勢いでまくし立てるんですから……」"
translation = "「정말, 엄청난 기세로 몰아붙이시니까……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それほどヨミヨミには魅力が詰まっている、と言いたいのだろう？\u3000愛されているではないか」"
translation = "「그만큼 요미요미에게는 매력이 가득 차 있다는 말이겠지? 사랑받고 있지 않느냐」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そそ、そうですね……すごく、愛を感じました。えへへ、嬉しくなっちゃいますね<emoji=heart04>」"
translation = "「그그, 그렇네요…… 엄청 사랑을 느꼈어요. 에헤헤, 기뻐지네요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ウェディングフォームになるだけでは、ここまでのぷりてぃーなヨミヨミは引き出せなかった」"
translation = "「웨딩 폼이 되는 것만으로는 이 정도로 프리티한 요미요미를 끌어낼 수 없었겠지」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「さすがは魔王、ヨミヨミの可愛さを増幅させる天才だな！」"
translation = "「역시 마왕, 요미요미의 귀여움을 증폭시키는 천재로군!」"

[[dialogue]]
speaker = "unk"
original = "いや、それほどでも……あるかな"
translation = "아니, 그 정도까지는…… 있을지도"

[[dialogue]]
speaker = "unk"
original = "えっへん！"
translation = "에헴!"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「気に入ったぞ！\u3000ヨミヨミと子を作る権利をやろう！」"
translation = "「마음에 들었다! 요미요미와 아이를 만들 권리를 주마!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁっ！！？\u3000と、当主様！？\u3000いきなり何とんでもないこと言ってるんですかぁぁっ！！」"
translation = "「코양!!? 다, 당주님!? 갑자기 무슨 말도 안 되는 소리를 하시는 거예요오오앗!!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「まあ、そう声を荒らげるな。私も九浄家の当主、配下のメイド達の将来を考えねばならぬ」"
translation = "「뭐, 그렇게 소리를 지르지 마라. 나도 쿠죠 가문의 당주, 부하 메이드들의 장래를 생각해야 하느니라」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「メイド達には最高の伴侶を宛がってやりたい。そして幸せな結婚をして、子を成す……」"
translation = "「메이드들에게는 최고의 반려를 맺어주고 싶다. 그리고 행복한 결혼을 해서 아이를 낳고……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「皆には女としての幸せを全て手に入れて、九浄家のメイド隊の一員でよかったと心の底から思ってもらいたいのだ」"
translation = "「모두가 여자로서의 행복을 전부 손에 넣어, 쿠죠 가문 메이드대의 일원이라 다행이라고 마음 깊은 곳에서부터 생각하게 해주고 싶단 말이다」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「当主様……そのようなお考えが……」"
translation = "「당주님…… 그런 생각을……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そうすれば、最高に可愛いメイドが見られるからな！\u3000はっはっは！」"
translation = "「그러면 최고로 귀여운 메이드를 볼 수 있으니까 말이다! 하하하!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「どうせそんなことだろうと思ってましたよ……」"
translation = "「어차피 그런 이유일 줄 알았어요……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そうぼやくな。可愛い花嫁衣装が台無しだぞ」"
translation = "「그렇게 투덜대지 마라. 귀여운 신부 의상이 아깝지 않느냐」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それより話を戻そう。どうなんだ、魔王のことは？\u3000好いているなら子を作りたくなるものではないのか？」"
translation = "「그보다 이야기를 되돌리지. 어떠냐, 마왕은? 좋아한다면 아이를 만들고 싶어지는 법이 아니더냐?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そそそ、それは……そのぉ……否定はしませんけど……」"
translation = "「그그그, 그건…… 저기…… 부정은 안 하겠지만……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやぁぁんっ！！\u3000この話はなし！\u3000今は保留にさせて下さいぃ～～～～っ！！」"
translation = "「코양아아앙!! 이 이야기는 없던 걸로! 지금은 보류하게 해주세요오~~~~!」"

[[dialogue]]
speaker = "unk"
original = "こうして、ヨミと子作りする権利は、残念ながら有耶無耶になってしまうのだった。"
translation = "이렇게 요미와 아이를 만들 권리는 아쉽게도 유야무야되어 버리는 것이었다."

