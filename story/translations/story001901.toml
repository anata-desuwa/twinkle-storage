[[dialogue]]
speaker = "unk"
original = "街の至る所からクリスマスツリーが撤去された途端、世間の空気は一気に様変わり。"
translation = "거리 곳곳에서 크리스마스트리가 철거되자마자 세상의 공기는 단숨에 바뀌었다."

[[dialogue]]
speaker = "unk"
original = "スーパーやコンビニにはお節の食材や鏡餅が並び、年越しムードが高まりつつあった。"
translation = "슈퍼나 편의점에는 오세치 식재료와 카가미모치가 진열되며 연말 분위기가 고조되고 있었다."

[[dialogue]]
speaker = "ヘレナ"
original = "「ヘレナちゃんである！\u3000クリスマスはどうであったか？」"
translation = "「헬레나 짱이라노다! 크리스마스는 어떠했느냐?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「各々が思い思いに楽しんだことだろう。だが、クリスマスが終わればすぐに年末、そして、新春」"
translation = "「각자가 제각기 즐겼겠지. 하지만 크리스마스가 끝나면 바로 연말, 그리고 신춘이라노다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「新春となれば、当然、晴れ着である。いやはや、イベント目白押しの師走になると、デザインのインスピレーションが高まってしまってな」"
translation = "「신춘이 되면 당연히 설빔이라노다. 이야, 이벤트가 몰아치는 섣달이 되니 디자인의 영감이 솟구쳐서 말이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「我がメイド隊自慢の服飾担当、美鶴には少々無理をさせてしまい、申し訳なく思っている。反省はするが、自制はしないのが私だ」"
translation = "「우리 메이드대 자랑의 복식 담당, 미츠루에게 조금 무리를 시켜버려 미안하게 생각하고 있노다. 반성은 하지만 자제는 하지 않는 게 나지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「美鶴があつらえた出来立てほやほや、冬の最新モデル。栄えある晴れ着戦闘服にふさわしい者は──」"
translation = "「미츠루가 갓 지어낸 따끈따끈한 겨울 최신 모델. 영광스러운 설빔 전투복에 어울리는 자는──」"

[[dialogue]]
speaker = "フィオナ"
original = "「私、ですか」"
translation = "「저, 인가요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。フィオナにはうちのヴィーナスが散々世話になっているであろう。保護者からのせめてもの礼だ。ぜひ受け取ってほしい」"
translation = "「음. 피오나에게는 우리 비너스가 신세를 많이 지고 있지 않느냐. 보호자로서 주는 최소한의 답례노다. 부디 받아주길 바란다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「お礼を頂くほどのことはしていませんけど……そういうことでしたら受け取らせていただきます。ありがとうございます」"
translation = "「답례를 받을 정도의 일은 하지 않았습니다만…… 그런 거라면 감사히 받겠습니다. 감사합니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そして、もう１着。受け取ってくれるな、トリシャ」"
translation = "「그리고 한 벌 더. 받아주게나, 트리샤.」"

[[dialogue]]
speaker = "トリシャ"
original = "「此度、私が呼び出されたのは、そのような用件でしたか……その、いただいても、よろしいのですか……？\u3000恐れ多いです……」"
translation = "「이번에 제가 불려 온 건 그런 용건이었나요…… 그, 받아도 되는 건가요……? 황송합니다……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「何を恐れることがあろうか。遠慮せずに受け取るがよい。貴殿の占いには皆も世話になっておる」"
translation = "「무엇을 두려워하느냐. 사양 말고 받도록 하거라. 그대의 점괘에는 모두가 도움을 받고 있노다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「かしこまりました。では、謹んで……わ、これが晴れ着……すごく綺麗……にへへ♪」"
translation = "「알겠습니다. 그럼 삼가…… 와, 이것이 설빔…… 정말 예뻐요…… 니헤헤♪」"

[[dialogue]]
speaker = "ヘレナ"
original = "「２人とも早速、着替えてきてはどうだ？\u3000ひとりでは難解な着付けも、我がメイド隊の手にかかればマッハで解決だ。蘭美」"
translation = "「둘 다 어서 갈아입고 오는 게 어떠냐? 혼자서는 난해한 옷 입기도 우리 메이드대의 손을 거치면 마하로 해결이라노다. 라비.」"

[[dialogue]]
speaker = "蘭美"
original = "「その通りです当主様。２人とも、私が最速で着替えさせてみせるから安心しなさい」"
translation = "「그렇습니다, 당주님. 두 사람 모두 제가 최속으로 갈아입혀 줄 테니 안심하세요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker = "蘭美"
original = "「準備が終わりました。まずはフィオナ様から、どうぞ」"
translation = "「준비가 끝났습니다. 우선 피오나 님부터, 자.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええと……」"
translation = "「저기……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「どうした？\u3000恥ずかしがらずに出てくるがよい」"
translation = "「왜 그러느냐? 부끄러워하지 말고 나오도록 하거라.」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい……あ、あの……ウズメの時も思いましたけど、和服にしてはアレンジが斬新で、大胆ですよね……トリシャさんの方は？」"
translation = "「네…… 저, 저기…… 우즈메 때도 생각했지만 화복치고는 어레인지가 참신하고 대담하네요…… 트리샤 씨 쪽은?」"

[[dialogue]]
speaker = "トリシャ"
original = "「このような装いとなっております……」"
translation = "「이런 차림이 되었습니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「これは、また大胆な……いえ、とても似合っていますし、お綺麗なんですけど……」"
translation = "「이건 또 대담한…… 아니, 무척 잘 어울리고 아름다우시지만요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「和装の文化、ちょっと憧れてました……」"
translation = "「일본풍 복장 문화, 조금 동경했었어요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「晴れ着の効果でしょうか……？\u3000いつもの戦闘服以上に、力が満ち満ちているような……占いの精度も、必ずや高まることでしょう……」"
translation = "「설빔의 효과일까요……? 평소 전투복 이상으로 힘이 가득 차오르는 듯한…… 점괘의 정밀도도 반드시 높아질 거예요……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふむ、もう晴れ着戦闘服を着こなしているのか。貴殿の星力を操る力は相当のようだな」"
translation = "「흠, 벌써 설빔 전투복을 다루고 있는 건가. 그대의 성력을 다루는 힘은 상당한 모양이구나.」"

[[dialogue]]
speaker = "unk"
original = "今度の晴れ着はフィオナとトリシャ？"
translation = "「이번 설빔은 피오나와 트리샤야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長！？\u3000何故ここに！？」"
translation = "「히노미야 회장님!? 어째서 여기에!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「こんなこともあろうかと、私が呼びつけておいた。どれ、魔王よ、２人に忌憚ない感想を聞かせてやってくれ」"
translation = "「이런 일이 있을까 봐 내가 불러두었노다. 자, 마왕이여, 두 사람에게 가감 없는 감상을 들려주게나.」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長……ど、どうでしょうか？\u3000普段より露出が多くて、少し恥ずかしいのですけれど……」"
translation = "「히노미야 회장님…… 어, 어떤가요? 평소보다 노출이 많아서 조금 부끄럽습니다만……」"

[[dialogue]]
speaker = "unk"
original = "ふたりともよく似合ってるよ"
translation = "「둘 다 정말 잘 어울려.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そう、ですか……？\u3000真正面から緋宮会長に褒めてもらえると、悪い気はしませんね……」"
translation = "「그렇, 가요……? 히노미야 회장님께 정면으로 칭찬을 들으니 기분이 나쁘진 않네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あ、ありがとうございます……気を抜くと、胸がまろび出てしまいそうですが……」"
translation = "「가, 감사합니다…… 방심하면 가슴이 삐져나와 버릴 것 같지만요……」"

[[dialogue]]
speaker = "unk"
original = "まろび出ちゃわないよう気をつけて！？"
translation = "「삐져나오지 않게 조심해!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「おや魔王、顔が赤いではないか。お披露目している方よりも照れてどうする」"
translation = "「어라 마왕, 얼굴이 붉지 않느냐. 보여주는 쪽보다 수줍어해서 어찌 하느냐.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いやしかし、２人に似合うと確信していたが、やはり完璧であったな。我ながら自分のセンスには感嘆する」"
translation = "「아니 하지만, 두 사람에게 어울릴 거라 확신했지만 역시 완벽하구나. 나조차 내 센스에 감탄하게 되는구나.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「新衣装のお披露目は終わったようね。流石はメイド隊自慢の服飾担当。美鶴はいい仕事するわ。フィオナも晴れ着よく似合ってるじゃない！」"
translation = "「새 의상 발표는 끝난 모양이네. 역시 메이드대 자랑의 복식 담당. 미츠루는 일 잘한다니까. 피오나도 설빔 잘 어울리잖아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます。普段から和服を着慣れている九浄家のみなさんほどではないと思いますけど……」"
translation = "「감사합니다. 평소부터 화복을 즐겨 입는 쿠죠 가문의 여러분만큼은 아니라고 생각합니다만……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「謙遜なしなーし！\u3000フィオナ会長、めっちゃ可愛いってば！\u3000前から興味津々だったもんねー。ついに念願のお正月フォームってカンジ？」"
translation = "「겸손은 넣어둬 넣어둬! 피오나 회장, 완전 귀엽다니까! 전부터 엄청 흥미 있었잖아. 드디어 염원하던 정월 폼이란 느낌?」"

[[dialogue]]
speaker = "ソフィア"
original = "「さすがフィオナ会長です。もちろんトリシャさんも……ヴィーナスさんも、ウズメも、皆さんとても素敵です」"
translation = "「역시 피오나 회장님이에요. 물론 트리샤 씨도…… 비너스 씨도, 우즈메도 다들 정말 멋져요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ウズメにソフィアまで……晴れ着フォーム勢ぞろいだね」"
translation = "「우즈메에 소피아까지…… 설빔 폼 총출동이네.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ね、ね、せっかくの晴れ着なんだし、みんなで写真撮ろ！\u3000トリシャさんもそんな隅っこでちっちゃくなってないでさ！\u3000おっぱいはおっきいんだから！」"
translation = "「저기저기, 기껏 차려입은 설빔인데 다 같이 사진 찍자! 트리샤 씨도 그렇게 구석에서 움츠려 있지 말고! 가슴은 저렇게 큰데 말이야!」"

[[dialogue]]
speaker = "トリシャ"
original = "「そ、そんな……一緒に写真なんて撮ったら、皆さんと、友達になってしまいますよ……？」"
translation = "「그, 그런…… 같이 사진 같은 걸 찍으면 여러분과 친구가 되어버리잖아요……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「友達になったら、何か困るん？\u3000なっちゃおーよ、友達！」"
translation = "「친구가 되면 뭐 곤란한 거라도 있어? 되어버리자구, 친구!」"

[[dialogue]]
speaker = "トリシャ"
original = "「そ、そんな簡単に……！？」"
translation = "「그, 그렇게 간단히……!?」"

[[dialogue]]
speaker = "unk"
original = "友達が増えて、良かったね"
translation = "「친구가 늘어서 잘됐네.」"

[[dialogue]]
speaker = "トリシャ"
original = "「は、はい……これもあなたと出会い、人間界にやってきたおかげ……僥倖です……」"
translation = "「네, 네…… 이것도 당신과 만나 인간계에 온 덕분…… 요행입니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「お近づきの印に……よろしければ、ひと占い、しましょう……おみくじの力も、試してみたいですし……」"
translation = "「친해진 증표로…… 괜찮으시다면 점을 한 번 쳐드릴까요…… 오미쿠지의 힘도 시험해 보고 싶기도 하고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいじゃない！\u3000占ってもらいましょ！」"
translation = "「좋잖아! 점 봐달라고 하자!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「何について占ってもらっちゃう～？\u3000やっぱり恋愛運？」"
translation = "「어떤 거 점쳐볼까~? 역시 연애운?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「この場で皆の恋路を占うのは、なかなか拗れそうな気がするのでな、却下としよう」"
translation = "「이 자리에서 모두의 연애 행방을 점치는 건 꽤 꼬일 것 같은 기분이 드는구나, 기각하겠노다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「それは、まあ……では、来年の運気を見てもらうというのはどうでしょうか？」"
translation = "「그건 뭐…… 그럼 내년의 운세를 보는 건 어떨까요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「かしこまり……ました……かしこみ、かしこみ……カシャ、カシャ……」"
translation = "「알겠……습니다…… 두렵고 황송하게…… 찰칵, 찰칵……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ドキドキワクワク♪」"
translation = "「두근두근 설렌다구♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「出ましたね。その真っ黒な棒、なんて書いてあるんですか？」"
translation = "「나왔네요. 그 새까만 막대기, 뭐라고 적혀 있나요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「どことな～く不吉なカンジ……見てて、背中がゾワゾワするっていうか……」"
translation = "「어딘가~ 불길한 느낌…… 보고 있으면 등이 오싹오싹하다 할까……」"

[[dialogue]]
speaker = "トリシャ"
original = "「その通りです……世にも恐ろしい凶兆が……出てしまいました……」"
translation = "「맞아요…… 세상에서 가장 무서운 흉조가…… 나와버렸습니다……」"

[[dialogue]]
speaker = "ソフィア"
original = "「具体的に、どのような……？」"
translation = "「구체적으로 어떤……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「そう……ですね。具体的に申し上げると、新年を迎える前に……」"
translation = "「그러……네요. 구체적으로 말씀드리면 신년을 맞이하기 전에……」"

[[dialogue]]
speaker = "トリシャ"
original = "「世界は……滅亡します……」"
translation = "「세계는…… 멸망합니다……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「な、なんですってー！」"
translation = "「뭐, 뭐라고ー!」"

