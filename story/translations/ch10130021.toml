[[dialogue]]
speaker = "unk"
original = "第１話,噂の新人バニーガール,P"
translation = "제1화, 소문의 신인 바니걸, P"

[[dialogue]]
speaker = "ユウリ"
original = "「だーかーらー！\u3000何度頼まれても嫌だっつの！」"
translation = "「그-러-니-까-! 몇 번을 부탁해도 싫다니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「いいじゃない。セーラさんから聞いたよ？\u3000とーっても可愛かったって」"
translation = "「좋잖아. 세라 씨한테 들었다구? 어-엄청 귀여웠다면서.」"

[[dialogue]]
speaker = "ユウリ"
original = "「おだてても無駄だ。似合ってねえのはあたしが一番わかってる」"
translation = "「추켜세워도 소용없어. 안 어울리는 건 내가 제일 잘 안다고.」"

[[dialogue]]
speaker = "unk"
original = "どうしたんだ？"
translation = "무슨 일이야?"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、緋宮会長、丁度良いところに。ユウリったら恥ずかしがって例のバニーガール姿を見せてくれないんです」"
translation = "「아, 히노미야 회장님, 마침 잘 오셨어요. 유우리가 부끄러워하면서 그 바니걸 모습을 안 보여주지 뭐예요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「ほいほい見せるようなもんでもねえだろうが。それにあたしは自分から笑い物にされに行くほど酔狂でもねえ」"
translation = "「함부로 보여줄 만한 것도 아니잖아. 게다가 난 스스로 웃음거리가 되러 갈 만큼 별나지도 않다고.」"

[[dialogue]]
speaker = "フィオナ"
original = "「笑ったりなんかしないって。ちょっと変身してくれるだけでいいから。みんなユウリの可愛さに釘付けになるよ？」"
translation = "「웃거나 하지 않는다니까. 잠깐 변신해 주기만 하면 돼. 다들 유우리의 귀여움에 눈을 떼지 못할걸?」"

[[dialogue]]
speaker = "ユウリ"
original = "「こんな衆人環視の中で誰が変身するか。完全に見世物じゃねえか」"
translation = "「이런 사람들이 다 보는 데서 누가 변신하겠냐. 완전히 구경거리잖아.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そんなこと言わずに～。緋宮会長も見たいんじゃないですか？\u3000ユウリの可愛いバニーガール姿、もう一度見たいですよね？」"
translation = "「그러지 말고~. 히노미야 회장님도 보고 싶지 않으세요? 유우리의 귀여운 바니걸 모습, 다시 한번 보고 싶으시죠?」"

[[dialogue]]
speaker = "unk"
original = "実は２人きりの時は見せてくれるんだ"
translation = "사실 둘만 있을 때는 보여주거든."

[[dialogue]]
speaker = "フィオナ"
original = "「え……？\u3000ユウリ、意外と大胆なんだ……」"
translation = "「에……? 유우리, 의외로 대담하구나……」"

[[dialogue]]
speaker = "ユウリ"
original = "「わかりづらい嘘をつくな、このアホ！\u3000フィオナが信じるだろうが！？」"
translation = "「알기 어려운 거짓말 하지 마, 이 바보야! 피오나가 믿어버리잖아!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「つか登校時間なのになんでここにいんだよ！？\u3000あんたの学園あっちだろ！？」"
translation = "「그보다 등교 시간인데 왜 여기 있는 거야!? 네 학원은 저쪽이잖아!?」"

[[dialogue]]
speaker = "unk"
original = "ユウリが待ち合わせ場所に来ないから"
translation = "유우리가 약속 장소에 안 오니까."

[[dialogue]]
speaker = "ユウリ"
original = "「っっ。そ、それはっ。待ち合わせして登校するなんて、カ、カップルみてえだし……」"
translation = "「윽. 그, 그것은. 약속하고 등교하다니, 커, 커플 같고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「みたい、じゃなくて実際カップルなんだし。みんなもう知ってるよ？」"
translation = "「같은 게 아니라 실제로 커플이잖아. 다들 이미 알고 있다구?」"

[[dialogue]]
speaker = "ユウリ"
original = "「～～っっ。ちげえし、カップルじゃねえし、仮にそうでも仲良く登校なんて恥ずかしい真似あたしはしねえっ！」"
translation = "「~~윽. 아니거든, 커플 아니거든, 설령 그렇다 해도 사이좋게 등교하는 부끄러운 짓 따위 난 안 해!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、こんな照れ屋で天邪鬼な子ですけど、これからもよろしくお願いしますね？」"
translation = "「후후, 이렇게 부끄럼을 잘 타고 솔직하지 못한 아이지만, 앞으로도 잘 부탁드릴게요?」"

[[dialogue]]
speaker = "ユウリ"
original = "「菓子折を渡すな！\u3000会長さんも深々頷くな！\u3000つかあたしと手ぇ繋いでこようとすんな！！」"
translation = "「과자 상자 건네지 마! 회장님도 깊게 고개 끄덕이지 말고! 그보다 내 손 잡고 오려고 하지 마!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「遠慮しなくていいのに。２人きりの時は仲良く手を繋いでイチャイチャしてるんでしょ？」"
translation = "「부담 가질 필요 없는데. 둘만 있을 때는 사이좋게 손잡고 꽁냥꽁냥하고 있잖아?」"

[[dialogue]]
speaker = "ユウリ"
original = "「し、してねえってのっ」"
translation = "「아, 안 한다니까아」"

[[dialogue]]
speaker = "フィオナ"
original = "「星徒会宛てに何件も目撃情報が届いてるけど。ペンネーム『ウサギギャル』さんからのお手紙によると──」"
translation = "「성도회 앞으로 몇 건이나 목격 정보가 도착해 있는데. 필명 『토끼 갸루』 씨가 보낸 편지에 따르면──」"

[[dialogue]]
speaker = "ユウリ"
original = "「読むな読むな読むな！\u3000つかラジオのお便りコーナー感覚で人のプライベート星徒会に届けてんじゃねえよ！？」"
translation = "「읽지 마 읽지 마 읽지 마! 그보다 라디오 사연 코너 같은 느낌으로 남의 사생활을 성도회에 보내지 말라고!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、ユウリ、真っ赤になってる。恋人の前だとそんな顔するんだ？」"
translation = "「후후, 유우리, 얼굴이 새빨개졌어. 연인 앞에서는 그런 표정을 짓는구나?」"

[[dialogue]]
speaker = "ユウリ"
original = "「単なるツッコミ疲れだから……」"
translation = "「단순히 츳코미 거느라 지쳐서 그런 거니까……」"

[[dialogue]]
speaker = "フィオナ"
original = "「それじゃユウリの決意も固まったところで変身タイムですね。みんな、ユウリのバニーガール姿を見るの楽しみにしてるよ♪」"
translation = "「그럼 유우리의 결의도 굳어진 참이니 변신 타임이네요. 모두 유우리의 바니걸 모습을 기대하고 있다구♪」"

[[dialogue]]
speaker = "ユウリ"
original = "「どこにあった？\u3000決意固まる要素どこにあった？\u3000むしろ真逆の意志が断固として固まったわ」"
translation = "「어디에 있었어? 결의가 굳어질 요소가 어디에 있었냐고? 오히려 정반대의 의지가 단호하게 굳어졌거든」"

[[dialogue]]
speaker = "ユウリ"
original = "「つかもう変身できねえし。とっくの昔にいつもの戦闘服に調整し直したっての」"
translation = "「그보다 이제 변신 못 해. 한참 전에 평소의 전투복으로 다시 조정해 뒀단 말이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「なんだ残念……。てっきり緋宮会長のためにもうしばらくバニーガールのまま過ごすと思ってたのに」"
translation = "「에이 아쉬워라……. 틀림없이 히노미야 회장님을 위해서 좀 더 바니걸 상태로 지낼 줄 알았는데」"

[[dialogue]]
speaker = "ユウリ"
original = "「っっ。ん、んなバカップルみたいなこと、あたしがすっかよ」"
translation = "「윽. 내, 내가 그런 바보 커플 같은 짓을 하겠냐」"

[[dialogue]]
speaker = "フィオナ"
original = "「せっかくの機会だったのに勿体ない。緋宮会長もしょんぼりしちゃってるよ？」"
translation = "「절호의 기회였는데 아깝네. 히노미야 회장님도 시무룩해하고 계신걸?」"

[[dialogue]]
speaker = "ユウリ"
original = "「う、うるせえな。会長さんも困るだろ、似合ってもない服あたしに着られても……」"
translation = "「시, 시끄러워. 회장님도 곤란할 거 아냐, 어울리지도 않는 옷을 내가 입고 있어 봤자……」"

[[dialogue]]
speaker = "ユウリ"
original = "「いや、えと、あんたは似合ってるって言ってくれるけど……。それはそれで気を遣わせちゃってるみたいで悪いというか……」"
translation = "「아니, 그게, 당신은 어울린다고 말해주지만……. 그건 그것대로 신경 쓰이게 만드는 것 같아서 미안하달까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ほ、本心なのはわかってるけどよ。逆にまたそれが恥ずかしいというか、逆に照れて着づらくなるというか……」"
translation = "「지, 진심인 건 알고 있지만 말이야. 거꾸로 그게 또 부끄럽달까, 오히려 쑥스러워서 입기 힘들어진달까……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あうっ……。だから残念がるなってっ……！\u3000勝手に戦闘服調整したのは悪かったけど……！\u3000というかホントはまだ──……」"
translation = "「아우윽……! 그러니까 아쉬워하지 말라니까……! 멋대로 전투복 조정한 건 미안하지만……! 그보다 사실은 아직──……」"

[[dialogue]]
speaker = "フィオナ"
original = "「！\u3000街中に複数のモンスターが出現したようです。お喋りは後にして、手分けして片付けにいきましょうっ」"
translation = "「! 거리 곳곳에 여러 마리의 몬스터가 출현한 모양이에요. 수다는 나중에 떨고, 분담해서 처리하러 가죠!」"

[[dialogue]]
speaker = "ユウリ"
original = "「えっ！？\u3000いやあたしは今日はちょっと──」"
translation = "「엣!? 아니, 나는 오늘은 좀──」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長とユウリは西側をお願いします！」"
translation = "「히노미야 회장님과 유우리는 서쪽을 부탁드려요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「うっ……！\u3000くそ、割と大量にいやがる……！」"
translation = "「윽……! 제길, 제법 많이 있잖아……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「か、会長さん、悪いけどここは一人で片付けてもらって……いや、無茶言ってんのはわかってるけど……！」"
translation = "「회, 회장님, 미안하지만 여기는 혼자서 처리해 줬으면…… 아니, 무리한 소리라는 건 알지만……!」"

[[dialogue]]
speaker = "unk"
original = "ユウリ、危ないっ！"
translation = "유우리, 위험해!"

[[dialogue]]
speaker = "ユウリ"
original = "「きゃっ、会長さん……！？\u3000ああっ、あたしを庇って……！\u3000悪い、あたしがおたおたしてたばっかりに……！」"
translation = "「꺄악, 회장님……!? 아앗, 나를 감싸고……! 미안, 내가 허둥대고만 있어서……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「くそ、バカかあたしは……！\u3000あたしのしょうもない羞恥心なんかより、会長さんのことの方が何倍もっ……！！」"
translation = "「젠장, 바보냐 나는……! 내 하찮은 수치심 따위보다, 회장님이 몇 배는 더……!!」"

[[dialogue]]
speaker = "ユウリ"
original = "「何倍もっ、大事だろうがよぉっ！」"
translation = "「몇 배는 더, 중요하단 말이다아앗!」"

[[dialogue]]
speaker = "unk"
original = "その姿……"
translation = "그 모습……"

[[dialogue]]
speaker = "ユウリ"
original = "「～～っっ！\u3000やっぱハズいっ！！\u3000見んなっ、まじまじ見んなっ！」"
translation = "「~~윽!! 역시 창피해!! 보지 마, 빤히 보지 말라고!」"

[[dialogue]]
speaker = "ユウリ"
original = "「んだよ、悪いかよ、フィオナの言うとおりだよっ！\u3000一応またバニーに変身できるようにこっちの服も残しといたんだよっ！」"
translation = "「왜, 뭐 어때서, 피오나 말이 맞아! 일단 다시 바니로 변신할 수 있게 이쪽 옷도 남겨뒀단 말이야!」"

[[dialogue]]
speaker = "ユウリ"
original = "「それでもいつもの戦闘服に変身するつもりだったのに……！\u3000戦闘服が増えると変身が不安定になって……！」"
translation = "「그래도 평소의 전투복으로 변신할 생각이었는데……! 전투복이 늘어나면 변신이 불안정해져서……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ニ、ニヤニヤしてんじゃねえっ……！\u3000これはあんたが可愛い可愛いうるさいから仕方なくっ──そう、仕方なく残しておいただけで……！」"
translation = "「히, 히죽거리지 마……! 이건 당신이 귀엽다 귀엽다 시끄러우니까 어쩔 수 없이── 그래, 어쩔 수 없이 남겨둔 것뿐이니까……!」"

[[dialogue]]
speaker = "ユウリ"
original = "「てめぇらも──さっきから邪魔なんだよぉ～！！」"
translation = "「네놈들도── 아까부터 방해된다고오~!!」"

[[dialogue]]
speaker = "unk"
original = "そしてユウリがモンスターを蹴散らし、後日その活躍ぶりが話題になったのだった。"
translation = "그리고 유우리가 몬스터를 격퇴했고, 훗날 그 활약상이 화제가 되었다."

