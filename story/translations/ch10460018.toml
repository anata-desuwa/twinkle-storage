[[dialogue]]
speaker = "unk"
original = "俺は閃のことが好きだ――そう気付いてから、しばらく経つ。しかし、閃はヴィーナスが好きだと分かっているから、今の関係性を壊すのが怖くて、なかなか告白出来ずにいた。"
translation = "나는 센을 좋아한다―― 그렇게 깨닫고 나서 꽤 시간이 흘렀다. 하지만 센은 비너스를 좋아한다는 걸 알고 있기에 지금의 관계를 깨는 것이 무서워 좀처럼 고백하지 못하고 있었다."

[[dialogue]]
speaker = "unk"
original = "そんなある日、ヴィーナスから勉強を教えて欲しいと頼まれ、彼女の部屋にやって来ていたのだが――"
translation = "그러던 어느 날, 비너스로부터 공부를 가르쳐 달라는 부탁을 받고 그녀의 방에 오게 되었는데――"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これは一体、どういう状況……！？」"
translation = "「이건 대체, 어떻게 된 상황이야……!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスからは、休憩時間になったらクローゼットを開けるように指示されていたのだが、その結果がこれだ。"
translation = "비너스로부터는, 휴식 시간이 되면 클로젯을 열라는 지시를 받았었지만, 그 결과가 이것이다."

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ<emoji=heart04>\u3000仕方ないです……私がクローゼットに隠れて監視していたところを、会長さんが気付いて見つけ出したりするから……っ」"
translation = "「응읏<emoji=heart04> 어쩔 수 없어요…… 제가 클로젯에 숨어서 감시하던 걸, 회장님이 눈치채고 찾아내 버리니까……윽」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お手洗いに行っていたお嬢様が、部屋に戻って来てしまったので……慌ててクローゼットの中に、引っ張り込まざるを得なくなってしまったんです……」"
translation = "「화장실에 가셨던 아가씨가, 방으로 돌아와 버리셔서…… 당황해서 클로젯 안으로, 끌어들일 수밖에 없게 된 거예요……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「隠れる必要はない？\u3000んっ<emoji=heart04>\u3000だって、ここはお嬢様のクローゼットの中ですよ？\u3000はあぁ……<emoji=heart04>\u3000お嬢様の下着とかも、しまってあるんです」"
translation = "「숨을 필요는 없다고요? 응읏<emoji=heart04> 그치만, 여기는 아가씨의 클로젯 안이란 말이에요? 하아아……<emoji=heart04> 아가씨의 속옷 같은 것도, 보관되어 있다고요」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「出て行ったら、私が変な疑いを掛けられちゃうじゃ、ないですか。ふうぅ……<emoji=heart04>」"
translation = "「나가버리면, 제가 이상한 의심을 받게 되잖아요. 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「だから会長さんにも、共犯になってもらいます。もし言いつけたりしたら、一緒にコソコソしてたってバラしちゃいますから」"
translation = "「그러니까 회장님도, 공범이 되어 주셔야겠어요. 만약 일러바치기라도 하면, 같이 몰래 숨어 있었다고 폭로해 버릴 거니까요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「何故脱いでいるのか？\u3000はあぁ……<emoji=heart04>\u3000お嬢様と部屋で２人きりになったのをいいことに、会長さんがお嬢様の魅力にムラムラして、襲っちゃうかもしれませんから」"
translation = "「어째서 벗고 있냐고요? 하아아……<emoji=heart04> 아가씨와 방에 둘이 남은 걸 기회 삼아, 회장님이 아가씨의 매력에 욕정이 생겨서, 덮쳐버릴지도 모르니까요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「だったらここは、護衛のメイドである私が代わりに相手をして、お嬢様の貞操を守らないと……んっ<emoji=heart04>」"
translation = "「그렇다면 여기서는, 호위 메이드인 제가 대신 상대가 되어 아가씨의 정조를 지켜야만…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「しっ……大きな声を出しては、ダメですよ……お嬢様が部屋にいるんですから……ほら」"
translation = "「쉿…… 큰 소리를 내면, 안 돼요…… 아가씨가 방에 계시니까요…… 자.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「――クロト～？\u3000あれ？\u3000おかしいわね……クロトもお手洗いに行ったのかしら？」"
translation = "「――쿠로토~? 어라? 이상하네…… 쿠로토도 화장실에 간 걸까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まぁ、いいわ！\u3000ちょっと疲れちゃったし、戻ってくるまで勉強は中断して休憩ね♪」"
translation = "「뭐, 됐어! 좀 지치기도 했고, 돌아올 때까지 공부는 중단하고 휴식이야♪」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「……状況が分かりましたか？\u3000んっ<emoji=heart04>\u3000……私たちはお嬢様が再び部屋を出るまで、このクローゼットの中で大人しく、待機しなくちゃいけないんです」"
translation = "「……상황 파악이 되셨나요? 응읏<emoji=heart04> ……우리는 아가씨가 다시 방을 나갈 때까지, 이 클로젯 안에서 얌전히, 대기해야만 해요.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「でも、会長さんの性欲を放って置くわけにも行きません……幸いお嬢様の部屋は広いので、大きな声を出さなければ聞こえたりはしませんから……ふうぅ<emoji=heart04>」"
translation = "「하지만, 회장님의 성욕을 방치해 둘 수도 없으니까요…… 다행히 아가씨의 방은 넓어서, 큰 소리만 내지 않으면 들리거나 하지는 않으니까…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「い、いや……俺が好きなのはヴィーナスじゃなくって……っ」"
translation = "「아, 아니…… 내가 좋아하는 건 비너스가 아니라……윽.」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「問答、無用です……<emoji=heart04>\u3000この待機時間を利用して、事を済ましてしまいましょう<emoji=heart04>\u3000ほら、まずは素股で準備、しますよ……んんっ<emoji=heart04>」"
translation = "「문답무용이에요……<emoji=heart04> 이 대기 시간을 이용해서, 일을 마쳐버리자고요<emoji=heart04> 자, 우선은 스마타로 준비, 할게요…… 응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はあぁ……んっ<emoji=heart04>\u3000ふうぅ……んん……<emoji=heart04>\u3000んっ、はぁ……ふぅ<emoji=heart04>\u3000んうぅ……はあぁ……ふうぅ……<emoji=heart04>\u3000はぁっ、んっ……ふあぁ……<emoji=heart04>\u3000んんっ……あん<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아아…… 응읏<emoji=heart04> 후우우…… 응응……<emoji=heart04> 응읏, 하아…… 후우<emoji=heart04> 응우우…… 하아아…… 후우우……<emoji=heart04> 하앗, 응읏…… 후아아……<emoji=heart04> 응응읏…… 아앙<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ……<emoji=heart04>\u3000会長さんは、やはり要注意な人です<emoji=heart04>\u3000口では否定しつつも、みるみるおち○ちんが、大きくなってるじゃないですか……はあぁ……ふうぅ<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 회장님은 역시 요주의 인물이에요<emoji=heart04> 입으로는 부정하면서도, 눈 깜짝할 새에 자지가, 커지고 있잖아요…… 하아아…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「しかもこの大きさ……<emoji=heart04>\u3000絶対に普通じゃありません……んんっ<emoji=heart04>\u3000男の人の中でも、間違いなく大きい……ふうぅ……<emoji=heart04>」"
translation = "「게다가 이 크기……<emoji=heart04> 절대로 보통이 아니에요…… 응응읏<emoji=heart04> 남자들 중에서도, 틀림없이 큰 편…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「太くて、固くて……あんっ<emoji=heart04>\u3000凄い存在感で……はあぁ……<emoji=heart04>\u3000あそこに擦り付けているだけで、濡れて来ちゃいます……<emoji=heart04>」"
translation = "「굵고, 딱딱해서…… 아앙읏<emoji=heart04> 굉장한 존재감이라…… 하아아……<emoji=heart04> 거기에 문지르는 것만으로도, 젖어버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ……<emoji=heart04>\u3000先っぽもよく濡らさないと……手で触りますね……はあぁ<emoji=heart04>\u3000やっぱり、大きい……<emoji=heart04>\u3000凄く熱くて、火傷しちゃいそうなくらい……ふうぅ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 끝부분도 잘 적셔둬야…… 손으로 만질게요…… 하아아<emoji=heart04> 역시, 커요……<emoji=heart04> 너무 뜨거워서, 데어버릴 것 같을 정도로…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んふっ<emoji=heart04>\u3000手で撫でたら、ビクンって反応して……<emoji=heart04>\u3000おち○ちん、先走り液が沢山でヌルヌルじゃないですか……<emoji=heart04>」"
translation = "「응훗<emoji=heart04> 손으로 쓰다듬으니까, 움찔하고 반응해서……<emoji=heart04> 자지, 쿠퍼액이 잔뜩 나와서 미끌미끌하잖아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ……<emoji=heart04>\u3000素股だけなのに、気持ち良かったんですか……？\u3000これだけ濡れてたら、もう挿れちゃっても……あんっ<emoji=heart04>\u3000ビクンって大きく反応して<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 스마타뿐인데, 기분 좋으셨나요……? 이만큼 젖어 있으면, 이제 삽입해 버려도…… 아앙읏<emoji=heart04> 움찔하고 크게 반응해서<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はあぁ……あそこで……おま○こでするの、期待しちゃってるんですか……？\u3000ふふっ<emoji=heart04>」"
translation = "「하아아…… 거기서…… 보지로 하는 거, 기대하고 있는 건가요……? 후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ<emoji=heart04>\u3000ほら、おま○この穴は、ここです……<emoji=heart04>\u3000先っぽに当たっているの、分かりますか……？」"
translation = "「응읏<emoji=heart04> 자, 보지 구멍은, 여기예요……<emoji=heart04> 끝부분에 닿고 있는 거, 느껴지시나요……?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「会長さんのおち○ちんが卑猥なせいで、愛液が溢れて、来ちゃってます……はぁん<emoji=heart04>」"
translation = "「회장님의 자지가 음란한 탓에, 애액이 넘쳐, 나오고 있어요…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お互いぬるぬるで、ちょっと先っぽ擦り付けるだけで凄い……ふあぁ<emoji=heart04>\u3000これがもし中に来たりしたら……んんっ<emoji=heart04>」"
translation = "「서로 미끌미끌해서, 살짝 끝부분을 문지르는 것만으로도 굉장해…… 후아아<emoji=heart04> 이게 만약 안에 들어오기라도 하면…… 응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ほら、会長さん……<emoji=heart04>\u3000後は腰を突き出すだけで――」"
translation = "「자, 회장님……<emoji=heart04> 남은 건 허리를 내밀기만 하면――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト、遅いわね～？\u3000屋敷の中で迷っちゃってるのかしら？\u3000それとも……実は部屋のどこかに隠れているとか？」"
translation = "「쿠로토, 늦네~? 저택 안에서 길을 잃은 걸까? 아니면…… 사실 방 어딘가에 숨어 있다거나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「隠れて私を驚かそうと……ありえるわね！\u3000探してみようかしら？\u3000まず１番怪しいのは、何といってもクローゼットよね！」"
translation = "「숨어서 나를 놀래키려고…… 그럴 수 있겠네! 한번 찾아볼까? 우선 제일 수상한 건, 뭐니 뭐니 해도 클로젯이지!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んんっ……<emoji=heart04>」"
translation = "「응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっ……閃……？\u3000この状況で何で挿れようと……ヴィーナスがこっちに近付いて来てるのにっ……待っ――」"
translation = "「잠깐…… 센……? 이 상황에서 왜 넣으려고…… 비너스가 이쪽으로 다가오고 있는데…… 기, 기다――」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ふうぅ……んんっ<emoji=heart04>\u3000あっ……んんん～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후우우…… 응응읏<emoji=heart04> 앗…… 응응응~~~~~~읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さ～て、クロトはクローゼットの中に居るかしら？\u3000観念して出て来るなら今の内よ～？」"
translation = "「자~ 그럼, 쿠로토는 클로젯 안에 있을까? 단념하고 나올 거라면 지금이야~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（もうダメだ……！）"
translation = "（이제 끝이다……！）"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "（いいえ……大丈夫ですよ<emoji=heart04>）"
translation = "（아니요…… 괜찮아요<emoji=heart04>）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ああ、でもよく考えたら、隠れているとかそんなわけないか。だって――」"
translation = "「아아, 하지만 잘 생각해보니, 숨어 있다거나 그럴 리가 없겠지. 왜냐면――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「部屋の中に隠れているなら、護衛してくれているセンちゃんが、気付かないはずないもの♪」"
translation = "「방 안에 숨어 있다면, 호위해 주는 센짱이, 모를 리가 없는걸♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「だからきっと、屋敷の中が広いから迷っているのね。これは迎えに行かないと！」"
translation = "「그러니까 분명, 저택 안이 넓어서 헤매고 있는 거겠지. 이건 마중 나가야겠어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「た、助かった……」"
translation = "「사, 살았다……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ね？\u3000大丈夫だったでしょう……んんっ<emoji=heart04>\u3000あっ……あぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「봐요? 괜찮았죠…… 응응읏<emoji=heart04> 앗…… 아아앙읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はあぁ<emoji=heart04>\u3000ふぅん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おち○ちん凄い<emoji=heart04>\u3000はっ……あんっ<emoji=heart04>\u3000中押し広げられてぇ……はぁんっ<emoji=heart04>\u3000おま○こ、会長さんの形に変わっちゃいます……あぁん<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 후우운<emoji=heart04> 앗<emoji=heart04> 자지 굉장해<emoji=heart04> 핫…… 아앙읏<emoji=heart04> 안이 벌려져서어…… 하아앙읏<emoji=heart04> 보지, 회장님의 모양으로 바뀌어버려요…… 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「何でバレないと分かったのか、ですか？\u3000はぅん<emoji=heart04>\u3000『予測の星眼』が、ありますから……あんっ<emoji=heart04>\u3000お嬢様がクローゼットを開けない未来は、見えていたんです……はぁんっ<emoji=heart04>」"
translation = "「어째서 안 들킬 줄 알았냐고요? 하우운<emoji=heart04> 『예측의 성안』이, 있으니까요…… 아앙읏<emoji=heart04> 아가씨가 클로젯을 열지 않는 미래는, 보이고 있었거든요…… 하아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「でも、お嬢様は最初から私に、気付いていたのかもしれませんけど……んっ<emoji=heart04>\u3000会長さんを部屋に呼んだのも、もしかしたら……あっ<emoji=heart04>\u3000ふあぁんっ<emoji=heart04>」"
translation = "「하지만, 아가씨는 처음부터 저를, 눈치채고 있었을지도 모르지만요…… 응읏<emoji=heart04> 회장님을 방으로 부른 것도, 어쩌면…… 앗<emoji=heart04> 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「とにかくお嬢様はしばらく戻って来ないよう、ですからっ……んあぁっ<emoji=heart04>\u3000その間に性欲処理を……ふあぁっ<emoji=heart04>\u3000初めてなのに、気持ちいい……ふあぁんっ<emoji=heart04>」"
translation = "「어쨌든 아가씨는 한동안 돌아오지 않을 것, 같으니까요…… 응아앗<emoji=heart04> 그동안 성욕 처리를…… 후아앗<emoji=heart04> 처음인데, 기분 좋아…… 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ<emoji=heart04>\u3000そう、ですよ？\u3000あんっ<emoji=heart04>\u3000セックスは今日が初めて<emoji=heart04>\u3000会長さんに、処女を破ってもらったんです<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁ……おち○ちんのカリ凄い<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 그래요, 아시겠어요? 아앙읏<emoji=heart04> 섹스는 오늘이 처음<emoji=heart04> 회장님에게, 처녀를 바친 거예요<emoji=heart04> 앗<emoji=heart04> 하아아…… 자지 귀두 굉장해<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「別に何も、問題ないですっ……んはぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000初めてでも、全然痛くないですし<emoji=heart04>\u3000むしろ……ふあぁっ<emoji=heart04>」"
translation = "「별로 아무런, 문제 없어요…… 응하아<emoji=heart04> 아앙읏<emoji=heart04> 처음이라도, 전혀 아프지 않고<emoji=heart04> 오히려…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「だから会長さんも、もっと腰を振れば、いいんです<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁ……んあぁっ<emoji=heart04>」"
translation = "「그러니까 회장님도, 좀 더 허리를 흔들면, 돼요<emoji=heart04> 앗<emoji=heart04> 하아앙읏……<emoji=heart04> 응응읏<emoji=heart04> 후우우읏……<emoji=heart04> 앗<emoji=heart04> 하아아…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ほら……こんなのは、どうですか？\u3000んっ<emoji=heart04>\u3000腰を振る時に、少しグラインドさせて……んあぁっ<emoji=heart04>」"
translation = "「자…… 이런 건, 어때요? 응읏<emoji=heart04> 허리를 흔들 때, 조금 그라인드 시켜서…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「おち○ちん、ビクビクしてますよ？\u3000はあぁ<emoji=heart04>\u3000気持ちいいんですか？\u3000んふっ……<emoji=heart04>」"
translation = "「자지, 파르르 떨리고 있어요? 하아아<emoji=heart04> 기분 좋으신가요? 응훗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はぁんっ<emoji=heart04>\u3000お嬢様にぶつけるはずだった性欲は……んんっ<emoji=heart04>\u3000私が全部、受け止めますから……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁ……そこ気持ちいい……ふあぁんっ<emoji=heart04>」"
translation = "「하아앙읏<emoji=heart04> 아가씨에게 쏟아부으려던 성욕은…… 응응읏<emoji=heart04> 제가 전부, 받아낼 테니까……<emoji=heart04> 아앙읏<emoji=heart04> 하아아…… 거기 기분 좋아…… 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ふうぅ……<emoji=heart04>\u3000会長さんはとにかく、我慢せずに……私の中で気持ち良くなっていれば、いいんです。んあぁんっ<emoji=heart04>\u3000お嬢様を守るのが、私の役目なんですから<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 회장님은 어쨌든, 참지 말고…… 제 안에서 기분 좋아지면, 되는 거예요. 응아아앙읏<emoji=heart04> 아가씨를 지키는 게, 제 역할이니까요<emoji=heart04> 하아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「……お嬢様に手を出す気はない？\u3000んっ<emoji=heart04>\u3000そんなこと言っても、もし迫られたりしたら、どうなるか分からないじゃないですか……はあぁ<emoji=heart04>」"
translation = "「……아가씨에게 손댈 생각은 없다? 응읏<emoji=heart04> 그런 말을 해도, 만약 유혹이라도 당하면, 어떻게 될지 모르잖아요…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ふうぅ……お嬢様は、魅力的な女性なんですから……あんっ<emoji=heart04>\u3000私に迫られて、エッチしちゃう会長さんが……あんっ<emoji=heart04>」"
translation = "「후우우…… 아가씨는, 매력적인 여성이니까요…… 아앙읏<emoji=heart04> 저에게 유혹당해서, 섹스해 버리는 회장님이…… 아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様にムラムラしないなんて、信用出来ないです……はあぁ……<emoji=heart04>」"
translation = "「아가씨에게 욕정하지 않다니, 믿을 수 없어요…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「お嬢様の部屋なのに、こんなおち○ちん大きくしてる癖に……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はあぁ……んっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふうぅ……んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ……あぁんっ<emoji=heart04>」"
translation = "「아가씨의 방인데도, 이렇게 자지를 크게 세우고 있으면서……<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 하아아…… 응<emoji=heart04> 앙<emoji=heart04> 후우우…… 응<emoji=heart04> 앗<emoji=heart04> 후아앗…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もしかして閃、ヴィーナスに嫉妬してる……？」"
translation = "「혹시 센, 비너스에게 질투하고 있어……?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ<emoji=heart04>\u3000違いますっ……私が好きなのは、ヴィーナスお嬢様で……あっ<emoji=heart04>\u3000お嬢様と仲良くしてる、会長さんに……んあぁっ<emoji=heart04>\u3000嫉妬してるんです……んふぅっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 아니에요…… 제가 좋아하는 건 비너스 아가씨고…… 앗<emoji=heart04> 아가씨와 사이좋게 지내는 회장님한테…… 응아앗<emoji=heart04> 질투하고 있는 거예요…… 응후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺に嫉妬してるのに、俺とセックスしちゃうの？」"
translation = "「나한테 질투하면서, 나랑 섹스해버리는 거야?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「それはだから……お嬢様に手を出させない為で<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000会長さんじゃなく、お嬢様に嫉妬とかそんな……あんっ<emoji=heart04>\u3000あり得ませんから……！」"
translation = "「그건 그러니까…… 아가씨에게 손대지 못하게 하기 위해서고<emoji=heart04> 후아앗<emoji=heart04> 회장님이 아니라 아가씨에게 질투라니 그런 건…… 앙<emoji=heart04> 있을 수 없으니까요……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも……初めての男は俺でいいって、思ってくれたんだよね？」"
translation = "「하지만…… 첫 남자는 나라도 좋다고 생각해 준 거지?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「そ、それは……あっ！？\u3000あぁんっ<emoji=heart04>\u3000会長さん、首筋にキスしちゃダメです……んあぁっ<emoji=heart04>\u3000そんな何度も……はぁん<emoji=heart04>\u3000背筋ゾクゾクしちゃいます……ふうぅ<emoji=heart04>」"
translation = "「그, 그건…… 앗!? 아앙<emoji=heart04> 회장님, 목덜미에 키스하면 안 돼요…… 응아앗<emoji=heart04> 그렇게 몇 번이나…… 하앙<emoji=heart04> 등줄기가 오싹오싹해져요…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺が好きなのは、ヴィーナスじゃなくて閃だ。……閃が相手だから、我慢できなかったんだっ」"
translation = "「윽…… 내가 좋아하는 건 비너스가 아니라 센이다. ……센이 상대니까, 참을 수 없었던 거야」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「え！？\u3000あぁんっ<emoji=heart04>\u3000そんな……ふあぁっ<emoji=heart04>\u3000でも、私にお嬢様に勝る魅力なんて……んんっ<emoji=heart04>\u3000女として選ぶなら、お嬢様の方が……あぁんっ<emoji=heart04>」"
translation = "「에!? 아앙<emoji=heart04> 그런…… 후아앗<emoji=heart04> 하지만, 저에게 아가씨를 능가하는 매력 따위…… 응응<emoji=heart04> 여자로서 고른다면 아가씨 쪽이…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ふあぁっ<emoji=heart04>\u3000決めたって、会長さん……いったい何を……あんっ<emoji=heart04>\u3000あっ、奥突いちゃ……はあぁんっ<emoji=heart04>\u3000そんなとこ擦っちゃ……ふあぁっ、ダメぇ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 결정했다니, 회장님…… 도대체 무엇을…… 앙<emoji=heart04> 앗, 안쪽을 찌르면…… 하아앙<emoji=heart04> 그런 곳을 문지르면…… 후아앗, 안 돼에<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は……閃を孕ませて、ヴィーナスから寝取る！」"
translation = "「나는…… 센을 임신시켜서, 비너스에게서 빼앗겠어!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「なっ！？\u3000ね、寝取る！？\u3000いきなり何でそんなこと……あっ、ふあぁっ<emoji=heart04>」"
translation = "「나앗!? 빼, 빼앗는다고요!? 갑자기 왜 그런 소리를…… 앗, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「私はお嬢様の護衛で……あっ、ダメ、今そこ突いちゃ……はあぁんっ<emoji=heart04>\u3000頭の中、とろけちゃいますぅ<emoji=heart04>\u3000あんっ、はぁんっ<emoji=heart04>」"
translation = "「저는 아가씨의 호위고…… 앗, 안 돼, 지금 거기 찌르면…… 하아앙<emoji=heart04> 머릿속이 녹아버려요오<emoji=heart04> 앙, 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺が孕ませたい女は、ヴィーナスじゃなくて閃だ。だから閃を孕ませる。そして……ヴィーナスから寝取って、俺のことを好きだって言わせてみせる！」"
translation = "「내가 임신시키고 싶은 여자는 비너스가 아니라 센이다. 그러니까 센을 임신시킬 거야. 그리고…… 비너스에게서 빼앗아서, 나를 좋아한다고 말하게 만들겠어!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「そ、そんな……はあぁっ<emoji=heart04>\u3000そんなこと……ふうぅ<emoji=heart04>\u3000言われたら……あぁんっ<emoji=heart04>\u3000お、おま○こ勝手に反応して、会長さんのおち○ちん、締め付けちゃいますぅ<emoji=heart04>」"
translation = "「그, 그런…… 하아앗<emoji=heart04> 그런 소리를…… 후우우<emoji=heart04> 들으면…… 아앙<emoji=heart04> 보, 보지가 멋대로 반응해서, 회장님의 자지를 조여버려요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「子宮口降りて来ちゃって、種付け体勢に入って……あっ……あんっ<emoji=heart04>\u3000会長さん、ダメぇ……ふあぁっ<emoji=heart04>」"
translation = "「자궁구가 내려와서, 씨받이 태세에 들어가고…… 앗…… 앙<emoji=heart04> 회장님, 안 돼에…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あんっ<emoji=heart04>\u3000おち○ちんで奥キスしちゃ……はあぁん<emoji=heart04>\u3000子宮口開いちゃう<emoji=heart04>\u3000あっ……んんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 자지로 안쪽을 키스하면…… 하아앙<emoji=heart04> 자궁구가 열려버려요<emoji=heart04> 앗…… 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「会長さんの孕ませ精子求めて、おち○ちんの先っぽに、ちゅっちゅって吸い付いちゃ……んあぁっ<emoji=heart04>」"
translation = "「회장님의 임신 정액을 원하며, 자지 끝부분에 쪽쪽 하고 달라붙어서…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……閃！」"
translation = "「윽…… 센!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あっ<emoji=heart04>\u3000ダメ、会長さん<emoji=heart04>\u3000待って――あっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 안 돼, 회장님<emoji=heart04> 기다려―― 앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ダメダメ、そんな激しくしちゃ<emoji=heart04>\u3000はああぁぁんっ<emoji=heart04>」"
translation = "「후아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 안 돼 안 돼, 그렇게 격하게 하면<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あっ、あっ、気持ちいいっ、ふあぁぁっ<emoji=heart04>\u3000奥っ<emoji=heart04>\u3000奥激しっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 기분 좋아, 후아아앗<emoji=heart04> 안쪽<emoji=heart04> 안쪽이 격해<emoji=heart04> 앗, 앗, 앗, 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はあぁっ<emoji=heart04>\u3000おち○ちん凄いっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000んっ、あっ、あっ、はっ、はぁっ、ふああぁんっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 자지 굉장해<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 기분 좋아<emoji=heart04> 응, 앗, 앗, 하앗, 하앗, 후아아앙<emoji=heart04> 앗, 앙<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「会長さん<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000ダメ、ダメです<emoji=heart04>\u3000あんっ、んあぁっ、ふああぁぁっ<emoji=heart04>」"
translation = "「회장님<emoji=heart04> 앗, 앗<emoji=heart04> 안 돼, 안 돼요<emoji=heart04> 앙, 응아앗, 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「孕ませるなんてぇ<emoji=heart04>\u3000やっ、あっ、いい<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000そこっ、あぁんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「임신시킨다니이<emoji=heart04> 야앗, 앗, 좋아<emoji=heart04> 하아아앙<emoji=heart04> 거기, 아앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あっ、あんっ<emoji=heart04>\u3000私にはお嬢様がぁ<emoji=heart04>\u3000はぁっ、はぁっ、あぁんっ<emoji=heart04>\u3000お嬢様のメイドなのにぃ<emoji=heart04>\u3000あっ、あっ、ふあぁっ<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000はあぁっ、奥っ<emoji=heart04>\u3000んあぁぁんっ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 저에게는 아가씨가아<emoji=heart04> 하앗, 하앗, 아앙<emoji=heart04> 아가씨의 메이드인데에<emoji=heart04> 앗, 앗, 후아앗<emoji=heart04> 기분 좋아<emoji=heart04> 하아앗, 안쪽<emoji=heart04> 응아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あぁん<emoji=heart04>\u3000耳元でそんな、ふあぁっ<emoji=heart04>\u3000何度も好きって囁いちゃダメぇ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 귓가에서 그렇게, 후아앗<emoji=heart04> 몇 번이나 좋아한다고 속삭이면 안 돼에<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はあぁんっ<emoji=heart04>\u3000おま○こキュンって、あっ、あっ<emoji=heart04>\u3000感じちゃいますぅ<emoji=heart04>\u3000あっ、あっ、はああぁんっ<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 보지가 큥 하고, 앗, 앗<emoji=heart04> 느껴버려요오<emoji=heart04> 앗, 앗, 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あっ、あっ<emoji=heart04>\u3000おま○こ気持ちいい<emoji=heart04>\u3000ふああぁぁぁ<emoji=heart04>\u3000会長さんのおち○ちん、逞しくて、あぁんっ<emoji=heart04>\u3000凄く気持ちいいのぉ<emoji=heart04>\u3000奥っ、奥凄い<emoji=heart04>\u3000はああぁぁんっ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 보지 기분 좋아<emoji=heart04> 후아아아아아<emoji=heart04> 회장님의 자지, 늠름해서, 아앙<emoji=heart04> 너무 기분 좋아아<emoji=heart04> 안쪽, 안쪽 굉장해<emoji=heart04> 하아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「か、会長さんとのセックス、ああぁんっ<emoji=heart04>\u3000気持ち良くて、ふあぁぁっ<emoji=heart04>\u3000忘れられなくなっちゃう<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000癖になっちゃうぅ<emoji=heart04>\u3000そこっ、ダメっ<emoji=heart04>\u3000ふああぁぁっ<emoji=heart04>」"
translation = "「회, 회장님과의 섹스, 아아앙<emoji=heart04> 기분 좋아서, 후아아앗<emoji=heart04> 잊을 수 없게 되어버려요<emoji=heart04> 앗, 앗<emoji=heart04> 버릇이 되어버려어<emoji=heart04> 거기, 안 돼<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「このままじゃ本当に寝取られちゃう<emoji=heart04>\u3000あっ、あんっ、んああぁっ<emoji=heart04>\u3000おち○ちん凄くて、はぁっ、はぁっ、あん<emoji=heart04>\u3000会長さんの女にさせられちゃうぅん<emoji=heart04>\u3000はあぁぁんっ<emoji=heart04>」"
translation = "「이대로라면 정말로 빼앗겨버려요<emoji=heart04> 앗, 앙, 응아아앗<emoji=heart04> 자지가 굉장해서, 하앗, 하앗, 앙<emoji=heart04> 회장님의 여자로 만들어져버려어<emoji=heart04> 하아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あっ、あっ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000気持ち良いの来る<emoji=heart04>\u3000ふああぁぁぁ<emoji=heart04>\u3000知らない大きなアクメ来るぅ<emoji=heart04>\u3000ふぅっ、ふぅっ、ああぁんっ<emoji=heart04>\u3000おま○こ降参しちゃいますぅ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 안 돼<emoji=heart04> 기분 좋은 거 와요<emoji=heart04> 후아아아아아<emoji=heart04> 모르는 커다란 아크메 와요오<emoji=heart04> 후우, 후우, 아아앙<emoji=heart04> 보지가 항복해버려요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「閃、俺もう……！」"
translation = "「센, 나 이제……!」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あああっ<emoji=heart04>\u3000ダメダメ、会長さん<emoji=heart04>\u3000そんな奥突いちゃダメぇ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000アクメ来る<emoji=heart04>\u3000あっ、はっ、はああぁんっ<emoji=heart04>\u3000凄い勢いで来ちゃいますからぁ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 안 돼 안 돼, 회장님<emoji=heart04> 그렇게 안쪽 찌르면 안 돼에<emoji=heart04> 앗, 앗<emoji=heart04> 아크메 와요<emoji=heart04> 앗, 하앗, 하아아앙<emoji=heart04> 엄청난 기세로 와버리니까요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「おち○ちん<emoji=heart04>\u3000おち○ちん膨らんでる<emoji=heart04>\u3000ダメダメダメぇ<emoji=heart04>\u3000いま射精されたら、堕ちる、堕ちちゃうぅ<emoji=heart04>\u3000あっ、あっ、ふあああっ<emoji=heart04>」"
translation = "「자지<emoji=heart04> 자지가 부풀고 있어<emoji=heart04> 안 돼 안 돼 안 돼에<emoji=heart04> 지금 사정하면, 타락해, 타락해버려어<emoji=heart04> 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000待って待って、来るくるくる来る<emoji=heart04>\u3000来ちゃう<emoji=heart04>\u3000イっちゃいます<emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04><emoji=heart04> 기다려 기다려, 와 와 와 와요<emoji=heart04> 와버려요<emoji=heart04> 가버려요<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ダメダメダメ、イク<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000イクイクイク――」"
translation = "「안 돼 안 돼 안 돼, 가<emoji=heart04> 앗 앗 앗<emoji=heart04> 가요 가요 가요――」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「っ……ふあああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックぅぅぅ―――――――――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 후아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가아아아앗―――――――――앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「はあああぁぁぁ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000子宮に会長さんの精子、一杯入って来てますぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아<emoji=heart04><emoji=heart04><emoji=heart04> 자궁에 회장님의 정액, 가득 들어오고 있어요오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「ふあああぁぁぁ……<emoji=heart04>\u3000射精まだ続いて……お腹の中、熱くて凄い……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「후아아아아아……<emoji=heart04> 사정 아직 계속되고…… 배 속이 뜨거워서 굉장해……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んんっ<emoji=heart04>\u3000はぁっ……はぁっ……射精やっと収まった……<emoji=heart04>\u3000会長さんのおち○ちん、射精量も凄過ぎです……<emoji=heart04>」"
translation = "「응응<emoji=heart04> 하앗…… 하앗…… 사정 겨우 멈췄다……<emoji=heart04> 회장님의 자지, 사정량도 너무 굉장해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「あんっ<emoji=heart04>\u3000おち○ちん抜けちゃ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 자지 빠져버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ……はあぁ<emoji=heart04>\u3000精子、中から溢れて来ちゃいます……<emoji=heart04>\u3000会長さん、出し過ぎです……<emoji=heart04>\u3000本当に１回で孕んじゃいますよ<emoji=heart04>」"
translation = "「응…… 하아아<emoji=heart04> 정액, 안에서 넘쳐흘러 나와요……<emoji=heart04> 회장님, 너무 많이 냈어요……<emoji=heart04> 정말로 한 번에 임신해버릴 거예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「初めてのセックス、お嬢様の部屋でしちゃいました……<emoji=heart04>\u3000んっ……き、気持ち良かったかなんて、わざわざ聞かないで下さい……<emoji=heart04>」"
translation = "「첫 섹스, 아가씨의 방에서 해버렸어요……<emoji=heart04> 응…… 기, 기분 좋았냐니, 일부러 묻지 말아 주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「会長さんこそ、どうだったんですか……？\u3000気持ち良かったなら……その、よかったですけど……」"
translation = "「회장님이야말로, 어땠나요……? 기분 좋았다면…… 그, 다행이지만요……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「えっと……それで……さっき言ったことって、本気なんですか……？」"
translation = "「에또…… 그래서…… 아까 말한 거, 진심인가요……?」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「は、孕ませたいって……お嬢様から寝取る、って言ったことです」"
translation = "「이, 임신시키고 싶다니…… 아가씨에게서 빼앗겠다, 고 말한 거요」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「本気……そ、そう、ですか……」"
translation = "「진심…… 그, 그렇, 군요……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「え？\u3000クローゼットから出る？\u3000あ、ああ、後片付け……そうですよね、ぼーっとしてたら、お嬢様が戻って来ちゃいますし……」"
translation = "「에? 클로젯에서 나가자고요? 아, 아아, 뒷정리…… 그렇죠, 멍하니 있으면 아가씨가 돌아와 버릴 테고……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「……あ、あの、会長さん」"
translation = "「……저, 저기, 회장님」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「少しだけ……いいですか？\u3000顔をちょっと近付けて下さい……そう、それくらいで……」"
translation = "「잠시만…… 괜찮을까요? 얼굴을 조금만 가까이 대 주세요…… 네, 그 정도면……」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「えっと……今のは、会長さんの本気に対する、私の返事というか……つまり――」"
translation = "「저기…… 방금 건, 회장님의 진심에 대한 제 대답이라고 할까…… 그러니까――」"

[[dialogue]]
speaker_original = "閃"
speaker_translation = "센"
original = "「私も、会長さんのこと……好き、です<emoji=heart04>」"
translation = "「저도, 회장님을…… 좋아, 해요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って閃は目を逸らしながら、恥ずかしそうに顔を赤くするのだった。"
translation = "그렇게 말하며 센은 시선을 피하면서, 부끄러운 듯 얼굴을 붉히는 것이었다."

