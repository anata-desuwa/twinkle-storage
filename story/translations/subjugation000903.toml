[[dialogue]]
speaker = "unk"
original = "俺は保健室に現れたフェリシーという女生徒に、ソフレと出会った状況を説明した。"
translation = "나는 보건실에 나타난 펠리시라는 여학생에게 소프레와 만난 상황을 설명했다."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「――なるほどね～。会長さんが保健室にきたら、ソフレが隠れてお昼寝してたってわけか」"
translation = "「──그렇구나~. 회장님이 보건실에 왔더니 소프레가 숨어서 낮잠을 자고 있었다는 거네」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「酷い偶然なのだわ」"
translation = "「지독한 우연인 거예요」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「そう？\u3000素敵な出会いじゃない？」"
translation = "「그래? 멋진 만남 아니야?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレの安眠スポットがまた１つ減ったのだわ！」"
translation = "「소프레의 안면 스팟이 또 하나 줄어든 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「お昼寝ばっかりしてないで、星騎士としてちゃんと働きましょうって女神様からのお告げだよ、きっと！」"
translation = "「낮잠만 자지 말고 성기사로서 제대로 일하라는 여신님의 계시일 거야, 분명!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そんな面倒なこと、今更する気はないのよ！\u3000働いたら負けなのだわ！」"
translation = "「그런 귀찮은 일, 이제 와서 할 생각 없는 거예요! 일하면 지는 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ソフレったら、またそういうこと言う。一緒に頑張ろうよ～」"
translation = "「소프레도 참, 또 그런 말을 한다. 같이 힘내자니까~」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「お前となんて、ぜっっったいにイヤなのだわ！」"
translation = "「너 같은 거랑은 절ㄹㄹㄹ대로 싫은 거예요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「というか、相変わらず距離が近いのよ！\u3000ソフレの肩とか手とか、気安く触るんじゃないのだわ！」"
translation = "「그보다 여전히 거리가 너무 가깝단 거예요! 소프레의 어깨나 손 같은 거 함부로 만지지 말란 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「あっ、ごめんごめん。つい♪」"
translation = "「앗, 미안 미안. 나도 모르게♪」"

[[dialogue]]
speaker = "unk"
original = "２人は友達なのか？"
translation = "둘은 친구야?"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「違うのだわ！\u3000ただのクラスメイトなのよ！」"
translation = "「아닌 거예요! 그냥 같은 반 친구인 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「私は友達になりたいんだけどね。まだ認めてもらえてないって感じかな～」"
translation = "「난 친구가 되고 싶은데 말이지. 아직 인정받지 못한 느낌이려나~」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「この距離感バグってる女から、ソフレが一方的にセクシャルハラスメントを受けているだけなのだわ！」"
translation = "「이 거리감 버그 걸린 여자로부터 소프레가 일방적으로 섹슈얼 해러스먼트를 당하고 있을 뿐인 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「そこまで言わなくても……トホホ」"
translation = "「그렇게까지 말 안 해도…… 토호호」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「あっ、そういえば私、まだ会長さんにちゃんと自己紹介してなかったよね？」"
translation = "「앗, 그러고 보니 나 아직 회장님께 제대로 자기소개 안 했었지?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「初めまして！\u3000私は流星学園２年生の、<ruby>恵原<rt>めぐはら</rt></ruby>フェリシーです！\u3000種族は人間で、お母さんがイタリア人、お父さんが日本人のハーフなんだ！」"
translation = "「처음 뵙겠습니다! 저는 유성학원 2학년 에바라 펠리시라고 해요! 종족은 인간이고 엄마가 이탈리아인, 아빠가 일본인인 혼혈이야!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「生まれ育ったのはイタリアで、お母さんの家業を引き継いで『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』をやってるの！」"
translation = "「태어나 자란 건 이탈리아고, 엄마의 가업을 이어받아 『엑소시스트』를 하고 있어!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「――そう、エクソシスト。あまり聞いたことがない職業かな？」"
translation = "「──응, 엑소시스트. 별로 들어본 적 없는 직업이지?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「簡単に言うと、実際に起こってるけど、原因がわからないような『異変』の調査と解決をする仕事、って感じだね」"
translation = "「간단히 말하면 실제로 일어나고는 있지만 원인을 알 수 없는 『이변』을 조사하고 해결하는 일, 같은 느낌이야」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「実は私、会長さんのことは、前から友達に聞かされてたんだよね！」"
translation = "「사실 나, 회장님에 대해서는 전부터 친구한테 들어서 알고 있었거든!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「探偵の『ジュエリー』！\u3000私、彼女とは昔からの友達なんだ♪」"
translation = "「탐정인 『주얼리』! 나 걔랑은 옛날부터 친구야♪」"

[[dialogue]]
speaker = "unk"
original = "流星学園１年生、ジュエリー・ブラウン。"
translation = "유성학원 1학년 주얼리 브라운."

[[dialogue]]
speaker = "unk"
original = "流星市国でも数々の難事件を解決してきたことから有名な名探偵で、屋内でも日傘を差していることから『日傘探偵』と呼ばれている。"
translation = "유성시국에서도 수많은 난제를 해결해 온 것으로 유명한 명탐정으로, 실내에서도 양산을 쓰고 다닌다고 해서 『양산 탐정』이라 불리고 있다."

[[dialogue]]
speaker = "unk"
original = "そして実はなんと、世界三大探偵の１人、『ブラウン神父』の子孫だったりする。"
translation = "그리고 사실 무려 세계 3대 탐정 중 한 명인 『브라운 신부』의 후손이기도 하다."

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ジュエリーがよく、会長さんのことを頼れる助手だって話してたんだ。それで、私も前から会ってみたかったんだよね！」"
translation = "「주얼리가 자주 회장님을 믿음직한 조수라고 얘기했었어. 그래서 나도 전부터 만나보고 싶었거든!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「同学年だし、よかったら、<b>会長くん</b>って呼んでもいいかな？」"
translation = "「같은 학년이고 괜찮다면 <b>회장군</b>이라고 불러도 될까?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「――うんっ♪\u3000その代わり、私のこともフェリシーって呼んでくれていいよ！」"
translation = "「──응♪ 대신 내 이름도 펠리시라고 불러줘도 돼!」"

[[dialogue]]
speaker = "unk"
original = "よろしく、フェリシー"
translation = "잘 부탁해, 펠리시"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「これから仲よくしようね！\u3000会長くん♪」"
translation = "「앞으로 친하게 지내자! 회장군♪」"

[[dialogue]]
speaker = "unk"
original = "そういえば、フェリシーはどうして保健室に来たんだ？\u3000と疑問に思い尋ねると――"
translation = "그러고 보니 펠리시는 왜 보건실에 온 거야? 하고 의문이 생겨 묻자──"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ああ、実は私、新星学園から『保健室の調査』の依頼を受けて来たの！」"
translation = "「아아, 사실 나 신성학원으로부터 『보건실 조사』 의뢰를 받고 왔어!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「なんでも最近、異変が報告されてるからって――」"
translation = "「뭐랄까 최근 이변이 보고되고 있다고 해서──」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「え？\u3000会長くんも学園からの依頼で、ここに来たの？\u3000じゃあ、聞いてた学園側からの助っ人っていうのは、キミのことだったんだね！」"
translation = "「에? 회장군도 학원 의뢰로 여기 온 거야? 그럼 듣고 있었던 학원 측 조력자라는 게 바로 너였구나!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「これは、会長くんと仲よくなりましょうっていう、女神様からの思し召しかも♪」"
translation = "「이건 회장군이랑 친해지라는 여신님의 계시일지도♪」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「そうだ、せっかくだし、ソフレのこともちゃんと紹介しておくね！\u3000この子は――って、あれ……？」"
translation = "「맞다, 이왕 이렇게 된 거 소프레에 대해서도 제대로 소개해 줄게! 이 애는── 어라……?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「いつの間にかソフレ、いなくなってる！？」"
translation = "「언제부턴가 소프레가 없어졌어!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふん……フェリシーの押し付け友達ムーブになんか、いちいち付き合っていられないのだわ」"
translation = "「흥…… 펠리시의 강요 친구 무브에 일일이 어울려 줄 순 없는 거예요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「……ソフレは、誰にも邪魔されず、１人でお昼寝ができれば、それで十分なのよ」"
translation = "「……소프레는 누구에게도 방해받지 않고 혼자 낮잠을 잘 수 있으면 그걸로 충분한 거예요」"

[[dialogue]]
speaker = "unk"
original = "ソフレは１人でそう呟きながら、雲に乗ってふわふわとその場を離れていくのだった――"
translation = "소프레는 혼자 그렇게 중얼거리며 구름을 타고 둥실둥실 그 자리를 떠나는 것이었다──"

