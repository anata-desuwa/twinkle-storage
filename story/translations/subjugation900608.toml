[[dialogue]]
speaker_original = "子どもＡ"
speaker_translation = "아이 A"
original = "「聖女さま、シスターさま、今日はありがとう～！」"
translation = "「성녀님, 수녀님, 오늘은 고마워요~!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえいえ。お気を付けて帰ってくださいね」"
translation = "「아니에요. 조심히 돌아가세요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「皆さまに女神様の祝福があらんことを」"
translation = "「여러분에게 여신님의 축복이 함께하기를.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぅ……ようやく落ち着いたわね。結局ほとんど飲み食いしている暇なかったわ」"
translation = "「후우…… 겨우 좀 진정됐네. 결국 거의 먹고 마실 틈도 없었어.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「大人気でしたものね。私もイレーナさまと同じくらい子どもたちのお相手がうまくなりたいものです」"
translation = "「인기가 대단했으니까요. 저도 이레이나 님만큼이나 아이들을 잘 상대하게 되고 싶네요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「シャロンも十分上手だったと思うけど？\u3000さすが普段から子ども会の手伝いしてるだけはあるわね」"
translation = "「샤론도 충분히 잘했다고 생각하는데? 역시 평소에 어린이회 돕는 보람이 있네.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「うふふ。イレーナさまにお褒めいただけるなんて恐縮です♪」"
translation = "「우후후. 이레이나 님께 칭찬을 듣다니 영광이에요♪」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あと、そこに転がってるヤツもついでに褒めてあげるわ」"
translation = "「그리고, 거기 굴러다니는 녀석도 덤으로 칭찬해 줄게.」"

[[dialogue]]
speaker = "unk"
original = "つ……疲れた"
translation = "지…… 지쳤다"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふふ、トナカイ役ご苦労だったわね♪\u3000子どもたちも喜んでたわよ♪」"
translation = "「후후, 루돌프 역할 수고했어♪ 아이들도 기뻐했어♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あ、あれは本当に良かったのでしょうか……。催し物とはいえ、人の背中に乗って歩き回らせるなど不道徳だったような……」"
translation = "「아, 그건 정말 괜찮았던 걸까요……. 행사라고는 해도 사람 등 위에 타고 돌아다니게 하다니 부도덕했던 게 아닌지……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いいのよ、コイツにはこれくらいで。人が気合い入れて用意した衣装をスケベな目で見るような男だし」"
translation = "「괜찮아, 이 녀석한테는 이 정도로. 사람이 기껏 준비한 의상을 야한 눈으로 보는 남자니까.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それよりシャロン……。ちょっと付き合いなさいよ。話があるから」"
translation = "「그보다 샤론…… 좀 같이 가. 할 얘기가 있으니까.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「？？？\u3000ここではいけないのですか？」"
translation = "「??? 여기서 하면 안 되나요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「い、いいから来なさいってば。ここだと誰かに見られるかもしれないでしょ……！」"
translation = "「그, 그냥 좀 오라니까. 여기 있으면 누가 볼지도 모르잖아……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ひゃっ。そ、そんなに引っ張らないでくださいませ！」"
translation = "「햣. 그, 그렇게 잡아당기지 말아 주세요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それで……お話というのは」"
translation = "「그래서…… 하실 말씀이라는 건.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ええと、その……あんたに……」"
translation = "「그게, 그…… 너한테……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ハッ──！\u3000まさかまた聖女をお辞めになると仰るつもりですかっ！？\u3000いけませんよ、イレーナさま……！」"
translation = "「핫──! 설마 또 성녀를 그만두겠다고 말씀하실 생각이세요!? 안 돼요, 이레이나 님……!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ああもう、そうじゃないわよ……！\u3000てかあんた、あたしが聖女を辞められるように助力するとか言ってなかったっけ？」"
translation = "「아아 진짜, 그런 거 아니야……! 그보다 너, 내가 성녀를 그만둘 수 있게 돕겠다고 하지 않았었나?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あの時はイレーナさまの<ruby>天邪鬼<rt>あまのじゃく</rt></ruby>なお心を理解しておりませんでしたから。ですが今は違います！\u3000お辞めにならないでください、イレーナさま！」"
translation = "「그때는 이레이나 님의 청개구리 같은 마음을 이해하지 못했었으니까요. 하지만 지금은 달라요! 그만두지 말아 주세요, 이레이나 님!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「誰が天邪鬼よ！\u3000あんたのせいでその気も失せたっての……。どうせ辞めるならもっといい辞め時を考えるわ」"
translation = "「누가 청개구리라는 거야! 너 때문에 그럴 마음도 싹 사라졌다고……. 어차피 그만둘 거라면 더 좋은 때를 생각할 거야.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それなら安心いたしました！\u3000今後ともよろしくお願いいたしますね、イレーナさま！」"
translation = "「그렇다면 안심입니다! 앞으로도 잘 부탁드려요, 이레이나 님!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え、ええ──じゃなくて！\u3000あたしの用事はこれよ、これ！」"
translation = "「어, 어── 그게 아니라! 내 용건은 이거야, 이거!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「！\u3000こちらは……」"
translation = "「! 이것은……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うちの地元だとクリスマスといえばこれ……パネットーネなのよ。親しい友人に渡して、聖夜を祝うの」"
translation = "「우리 고향에선 크리스마스라고 하면 이거…… 파네토네야. 친한 친구에게 주면서 성스러운 밤을 축하하는 거지.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「親しい友人に……」"
translation = "「친한 친구에게……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「サランに材料を手配してもらって……途中失敗しちゃったけど、何度も作り直してやっとうまくできたの。だからあんたに……」"
translation = "「사란에게 재료를 부탁해서…… 중간에 실패도 했지만, 몇 번이나 다시 만들어서 겨우 잘됐어. 그러니까 너한테……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「その……ごめんなさい。この前はついカっとなってシャロンに酷いことを言ったわ」"
translation = "「그…… 미안해. 저번엔 홧김에 샤론에게 심한 말을 했어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたはあんたなりに感謝を伝えてくれただけなのに……自分勝手にぶち切れて、あんたの信仰を傷つけた。本当にごめんなさい」"
translation = "「너는 너 나름대로 감사를 전해준 것뿐인데…… 내 마음대로 화내고, 네 신앙을 상처 입혔어. 정말 미안해.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「これで許してって言うつもりはないけど、よかったら……受け取って」"
translation = "「이걸로 용서해달라는 건 아니지만, 괜찮다면…… 받아줘.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま……」"
translation = "「이레이나 님……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「謝るのは私の方です。イレーナさまの心の内も知らずに、あなたを傷つけてしまいました」"
translation = "「사과해야 할 건 저예요. 이레이나 님의 속마음도 모르고 당신을 상처 입히고 말았습니다.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですから私もプレゼントを……」"
translation = "「그러니까 저도 선물을……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「プレゼントって──これ、パネットーネじゃない！？\u3000どうしてシャロンが……？」"
translation = "「선물이라니── 이거, 파네토네 아니야!? 어째서 샤론이……?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまがパネットーネを食べたがっていると小耳に挟んだもので。少しでもお喜びいただければと」"
translation = "「이레이나 님이 파네토네를 먹고 싶어 하신다는 이야기를 살짝 들었거든요. 조금이라도 기뻐해 주셨으면 해서.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まったく、あの口の軽いトナカイは……。また変なところで気を回してくれちゃってるんだから……」"
translation = "「진짜, 저 입 가벼운 루돌프가……. 또 쓸데없는 데 참견했다니까……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私もサランさまに教わって作ったのです。お母様の味には劣るかもしれませんが……受け取ってくださいますか？」"
translation = "「저도 사란 님에게 배워서 만든 거예요. 어머님의 맛에는 못 미칠지도 모르지만…… 받아주시겠어요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「バカね……。パネットーネってのは、こんなに畏まって交換しあうようなもんじゃないっての。むず痒いったらありゃしないじゃない……」"
translation = "「바보네……. 파네토네라는 건 이렇게 격식 차려서 주고받는 게 아니란 말이야. 간지러워 죽겠네 진짜……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「会話の内容は聞き取れませんが……どうやら様子を見に来る必要はなかったようですね」"
translation = "「대화 내용은 들리지 않지만…… 아무래도 상태를 보러 올 필요는 없었던 모양이네요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「みたいだね～♪\u3000２人から同じ相談された時はびっくりしたけど、うまくいってよかった～♪」"
translation = "「그런 것 같네~♪ 둘한테 똑같은 상담을 받았을 땐 깜짝 놀랐지만, 잘돼서 다행이야~♪」"

[[dialogue]]
speaker = "unk"
original = "戻ろうか"
translation = "돌아갈까"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はい。友人同士の時間に他人が水を差すものではありませんしね」"
translation = "「네. 친구끼리의 시간에 타인이 끼어들 일은 아니니까요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「戻ってお茶の準備しなきゃだね～♪\u3000パネットーネに合う紅茶を選んでおかないと～♪」"
translation = "「돌아가서 차 마실 준비 해야겠네~♪ 파네토네에 어울리는 홍차를 골라둬야겠어~♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまの言う通り、イレーナさまの癒しの力は女神様の愛ではないのでしょう」"
translation = "「이레이나 님이 말씀하신 대로, 이레이나 님의 치유의 힘은 여신님의 사랑이 아닐지도 몰라요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だからそう言ってんじゃない。さすがのあんたもいい加減認めたわね」"
translation = "「그러니까 그렇다고 말했잖아. 너도 이제야 겨우 인정했네.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「つまり、イレーナさまの愛ですね！！」"
translation = "「즉, 이레이나 님의 사랑이군요!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ！？」"
translation = "「하아!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまを見ていれば、人々を愛していることがわかります。イレーナさまはとても愛の深いお方です！」"
translation = "「이레이나 님을 보고 있으면 사람들을 사랑하고 있다는 걸 알 수 있어요. 이레이나 님은 아주 사랑이 깊은 분이세요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「な、な、何言ってんのよ！？\u3000あんたの目、節穴なんじゃないっ？」"
translation = "「뭐, 뭐, 무슨 소릴 하는 거야!? 네 눈, 장식 아니야?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「てかあんた、気にしてないの？\u3000あたし、女神のせいで病気に……なんて言ったのに」"
translation = "「그보다 너, 신경 안 쓰여? 나, 여신 때문에 병에 걸렸다고…… 같은 소릴 했는데.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ええ、全く。私は女神様を信じていますから」"
translation = "「네, 전혀요. 저는 여신님을 믿고 있으니까요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何よ……あんたのほうがよっぽど聖女みたいじゃない」"
translation = "「뭐야…… 네가 훨씬 더 성녀 같잖아.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「これから先、あなたが悩み苦しむこともあるでしょう。女神様の愛はイレーナさまを直接お救いにならないかもしれません」"
translation = "「앞으로 당신이 고민하고 괴로워할 일도 있겠죠. 여신님의 사랑이 이레이나 님을 직접 구해주지 않을지도 몰라요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですから、あなたの心は私が救います。女神様の愛が届かなくとも、私が愛を注ぎます」"
translation = "「그러니까 당신의 마음은 제가 구하겠습니다. 여신님의 사랑이 닿지 않더라도 제가 사랑을 쏟을게요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まったくもう……愛、愛って小っ恥ずかしいわね……」"
translation = "「정말이지 진짜…… 사랑, 사랑이라니 낯간지럽게……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それが私の信仰ですから」"
translation = "「그게 제 신앙이니까요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「強情ね」"
translation = "「고집불통이네.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさまほどでは」"
translation = "「이레이나 님만 할까요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふんっ、言うようになったじゃない」"
translation = "「흥, 이제 제법 말대답도 하네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まぁいいわ。お腹減ったし、そろそろパネットーネ食べましょ」"
translation = "「뭐 됐어. 배고프니까 슬슬 파네토네 먹자.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、でもその前にこれ言わないといけないわよね」"
translation = "「아, 하지만 그전에 이거 말해야겠지.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「メリークリスマス、シャロン」"
translation = "「메리 크리스마스, 샤론.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい、メリークリスマスです、イレーナさま♪」"
translation = "「네, 메리 크리스마스예요, 이레이나 님♪」"

[[dialogue]]
speaker = "unk"
original = "後日──"
translation = "며칠 후──"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま！\u3000子ども会の子たちからお手紙が届きましたよ！\u3000ぜひご覧になってください！」"
translation = "「이레이나 님! 어린이회 아이들로부터 편지가 도착했어요! 꼭 봐주세요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま！\u3000街にイタリアンジェラートのお店ができたそうです。今度一緒に行ってみませんか！？」"
translation = "「이레이나 님! 마을에 이탈리안 젤라토 가게가 생겼대요. 다음에 같이 가보지 않으실래요!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま！\u3000イレーナさま！\u3000イレーナさま～！」"
translation = "「이레이나 님! 이레이나 님! 이레이나 님~!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ～も～うるさーい！\u3000ちょっとは静かにしなさーい！」"
translation = "「아~ 진짜 시끄러워! 좀 조용히 해!」"

