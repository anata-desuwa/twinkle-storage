[[dialogue]]
speaker = "unk"
original = "第３話,パワー系転入生,P"
translation = "제3화, 파워계 전입생, P"

[[dialogue]]
speaker = "unk"
original = "流星寮でお茶会が開かれるとのことで招待を受け、迎えに来たフニと共に向かうと、何やらロビーが騒がしい様子だった――"
translation = "유성 기숙사에서 다과회가 열린다는 초대를 받고, 마중 나온 후니와 함께 향하자 왠지 로비가 소란스러운 모습이었다──"

[[dialogue]]
speaker = "フェニエル"
original = "「ヒルディお姉様、会長さんを呼んで参りました……って、何かあったんですか？」"
translation = "「힐디 언니분, 회장님을 모셔 왔어요…… 어라, 무슨 일 있었나요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ああ、フニ。ご苦労様ですわ」"
translation = "「아아, 후니. 수고했어요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「緋宮会長、ごきげんよう。お茶会の招待に応じて下さり、感謝致しますわ」"
translation = "「히노미야 회장님, 평안하신지요. 다과회 초대에 응해주셔서 감사드려요.」"

[[dialogue]]
speaker = "unk"
original = "で、そこにある巨大なダビデ像は一体……？"
translation = "그런데, 저기 있는 거대한 다비드상은 대체……?"

[[dialogue]]
speaker = "unk"
original = "先輩、ごきげんよう"
translation = "선배, 평안하신지요."

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「やはりこの場だと邪魔ですわよね……３メートルくらいありますもの」"
translation = "「역시 이 자리에 두면 방해가 되는군요…… 3미터 정도 되니까요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「これって確か、卒業生の方からの寄付で届くって言っていた美術品ですよね？\u3000本来は中庭に搬入される予定だったはず……」"
translation = "「이거 분명 졸업생분이 기부해서 도착할 거라고 하셨던 미술품이죠? 원래는 중정에 반입될 예정이었을 텐데……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ。ですが、どうやら業者に手違いがあったようですの」"
translation = "「네. 하지만 아무래도 업자 측에 착오가 있었던 모양이에요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「まあ、私たちは星騎士ですから、本気でやろうと思えば中庭に運べなくはないのでしょうけれど……」"
translation = "「뭐, 저희는 성기사니까 진심으로 하려고 하면 중정으로 옮기지 못할 것도 없겠지만요……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「出入口もギリギリ通る大きさですし、ぶつけて傷付けたりしたら大変でしょう？」"
translation = "「출입구도 아슬아슬하게 통과할 크기이고, 부딪혀서 흠집이라도 내면 큰일이잖아요?」"

[[dialogue]]
speaker = "フェニエル"
original = "「なるほどですっ。卒業生の方が下さった物ですから、丁重に扱わないといけませんよね」"
translation = "「그렇군요! 졸업생분이 주신 물건이니까 정중히 다뤄야겠죠.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それで、どうしたものかと寮生の皆で相談していて……フニ？」"
translation = "「그래서 어떻게 할지 기숙사생들과 상의하고 있었는데…… 후니?」"

[[dialogue]]
speaker = "フェニエル"
original = "「中庭ですねっ。それでは私がお持ちします！」"
translation = "「중정이군요! 그럼 제가 옮길게요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「お待ちなさい。貴方、私の話を聞いておりましたの？\u3000それは私が変身して運ぼうと思っても、苦労する大きさと重さがありますのよ？\u3000４トンですわ、４トン！」"
translation = "「기다리세요. 당신, 제 말을 듣고 있었나요? 그건 제가 변신해서 옮기려고 해도 고생할 정도의 크기와 무게가 있다고요! 4톤이에요, 4톤!」"

[[dialogue]]
speaker = "フェニエル"
original = "「よいしょっと……」"
translation = "「영차……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「いやいやいや、変身もしないで、ましてや貴方の体格で持ち上がるわけが……」"
translation = "「아니 아니 아니, 변신도 안 하고, 하물며 당신의 체격으로 들릴 리가……」"

[[dialogue]]
speaker = "フェニエル"
original = "「ほっ！」"
translation = "「흡!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「軽々と持ち上がりましたわぁぁぁ―――――――っ！！？」"
translation = "「가볍게 들어 올렸어요오오오──────!!?」"

[[dialogue]]
speaker = "unk"
original = "そんなことある！？"
translation = "그런 일이 있을 수 있어!?"

[[dialogue]]
speaker = "流星寮の１年生"
original = "「きゃあぁぁぁ――――――っ！？\u3000フニちゃん、腰を壊してしまいますわ！」"
translation = "「꺄아아아──────!? 후니짱, 허리 나가겠어요!」"

[[dialogue]]
speaker = "流星寮の２年生"
original = "「待って待って待って！\u3000フニさん、潰れちゃう！\u3000そのままだと潰れちゃいます！」"
translation = "「잠깐 잠깐 잠깐! 후니 씨, 깔려요! 그대로 있으면 깔려버린다고요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「大丈夫です！\u3000私、こう見えて力持ちなので！」"
translation = "「괜찮아요! 저, 이래 봬도 힘이 세거든요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「えっ、素の力ですの！？\u3000それ本当に、筋肉だけで持ち上げてますの！？\u3000種も仕掛けもある手品とかじゃないんですの！？」"
translation = "「엣, 생판 맨몸의 힘인가요!? 그거 정말 근육만으로 들어 올리고 있는 건가요!? 눈속임이 있는 마술 같은 게 아닌 건가요!?」"

[[dialogue]]
speaker = "フェニエル"
original = "「じゃあ、運びますね～」"
translation = "「그럼 옮길게요~」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あっ、お止めなさい、フニ！\u3000出入口は像を横に倒さないと通りませんわ！\u3000そんなの１人では――」"
translation = "「앗, 멈추세요, 후니! 출입구는 상을 옆으로 눕히지 않으면 통과 못 해요! 그런 걸 혼자서는──」"

[[dialogue]]
speaker = "フェニエル"
original = "「はい、大丈夫です、把握してますっ。……片手で一旦持って、倒して持ち替えて、っと……」"
translation = "「네, 괜찮아요, 파악했어요. ……한 손으로 일단 들고, 눕혀서 다시 잡고서……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「片手でって言いましたか今！？\u3000えっ、貴方片手でそれを持てますの！？\u3000発砲スチロール製じゃないんですのよそれ！？」"
translation = "「한 손으로라고 했나요 방금!? 엣, 당신 한 손으로 그걸 들 수 있나요!? 스티로폼제가 아니라고요 그거!?」"

[[dialogue]]
speaker = "フェニエル"
original = "「これで通れますね！\u3000中庭の設置予定場所に置いて来ます！」"
translation = "「이제 통과할 수 있겠네요! 중정 설치 예정 장소에 두고 올게요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「フニ、中庭に像を運んでくれたことには、感謝いたしますわ」"
translation = "「후니, 중정에 상을 옮겨준 것에는 감사드려요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「はいっ、力仕事でしたら、今後もお任せ下さい！」"
translation = "「네! 힘쓰는 일이라면 앞으로도 맡겨주세요!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「で・す・が、先程の行動は、あまり褒められたものではありませんわよ？」"
translation = "「하·지·만, 방금 전의 행동은 그리 칭찬받을 만한 것이 아니랍니다?」"

[[dialogue]]
speaker = "フェニエル"
original = "「え……お姉様、申し訳ありません。何か私、ミスをしてしまいましたか？」"
translation = "「에…… 언니분, 죄송합니다. 제가 뭔가 실수를 했나요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「別に怒っているわけではありませんわ。貴方がミスをしたわけでもありません。ただ……」"
translation = "「딱히 화를 내는 건 아니에요. 당신이 실수를 한 것도 아니고요. 다만……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「幾ら力持ちでも、巨大な像を１人で運ぼうとしたことは危険な行為ですわ。手が滑れば潰されてしまうかもしれないし、前が見えなくて誰かにぶつけてしまうかもしれない」"
translation = "「아무리 힘이 세도 거대한 상을 혼자 옮기려 한 것은 위험한 행위예요. 손이 미끄러지면 깔려버릴지도 모르고, 앞이 보이지 않아 누군가와 부딪힐지도 모르죠.」"

[[dialogue]]
speaker = "フェニエル"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「だから、こういう時は慎重になって、プロである業者に頼んだり、仲間で協力し合って、安全に運ぶのがエレガントというものですわ」"
translation = "「그러니 이럴 때는 신중해져서 프로인 업자에게 맡기거나, 동료끼리 협력해서 안전하게 옮기는 것이 엘레강트한 법이랍니다.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「私の言いたいこと、分かるかしら、フニ？」"
translation = "「내가 무슨 말을 하는지 알겠니, 후니?」"

[[dialogue]]
speaker = "フェニエル"
original = "「はい、お姉様。申し訳ありませんでした。次はまず、皆さんに相談するようにします」"
translation = "「네, 언니분. 죄송했습니다. 다음부터는 우선 여러분과 상의하도록 할게요.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええ、そうなさい。さて、お小言はこれでおしまいですわ。楽しいお茶会を始めましょう……と言いたいところですが――」"
translation = "「네, 그렇게 하세요. 자, 잔소리는 이걸로 끝이에요. 즐거운 다과회를 시작하죠……라고 말하고 싶지만──」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「その前に！\u3000私、腕相撲がしたいですわ！」"
translation = "「그전에! 저, 팔씨름이 하고 싶어요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "何て……？"
translation = "뭐라고……?"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「腕相撲ですわ！\u3000フニのあの圧倒的パワーを見せられて、最強の星騎士を目指す者として見過ごすなど出来ません！」"
translation = "「팔씨름이에요! 후니의 그 압도적인 파워를 보고서, 최강의 성기사를 목표로 하는 자로서 그냥 지나칠 수는 없답니다!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それに、寮生たちの中にも、フニと戦いたい者が居るはず！\u3000なにせここには、学園対抗杯で勝利を目指す星騎士が集っているんですもの！」"
translation = "「게다가 기숙사생들 중에도 후니와 겨뤄보고 싶은 자가 있을 터! 왜냐하면 여기에는 학원 대항배에서 승리를 목표로 하는 성기사들이 모여 있으니까요!」"

[[dialogue]]
speaker = "フェニエル"
original = "「えええぇぇぇっ！？\u3000いや、でも私、腕相撲とか全然したことがなくて……！」"
translation = "「에에에엑!? 아니, 하지만 저, 팔씨름 같은 건 전혀 해본 적이 없어서……!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「おーっほっほっほ！\u3000さあ、変身して勝負ですわよ、フニ！」"
translation = "「오홋홋홋! 자, 변신해서 승부예요, 후니!」"

[[dialogue]]
speaker = "unk"
original = "俺もちょっと勝負してみたいかも"
translation = "나도 좀 승부해보고 싶을지도."

[[dialogue]]
speaker = "フェニエル"
original = "「会長さんまで！？」"
translation = "「회장님까지!?」"

[[dialogue]]
speaker = "unk"
original = "その後、流星寮ではお茶会も忘れる程に、熱い腕相撲大会が開かれることとなるのだった。"
translation = "그 후, 유성 기숙사에서는 다과회도 잊을 정도로 뜨거운 팔씨름 대회가 열리게 되는 것이었다."

