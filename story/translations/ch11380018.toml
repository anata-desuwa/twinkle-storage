[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んっ……はあぁあっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「응…… 하아아앗<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルと『小さい姿』でデートした帰り、ラブホテルに寄ることになった俺たちだったのだが──"
translation = "메르엘과 『작은 모습』으로 데이트하고 돌아오는 길, 러브호텔에 들르게 된 우리들이었지만──"

[[dialogue]]
speaker = "unk"
original = "ベッドへたどり着くや否や、興奮した吐息を漏らすメルエルに、騎乗位の体勢で押し倒されてしまった。"
translation = "침대에 다다르자마자, 흥분한 숨결을 내뱉는 메르엘에게 기승위 자세로 눌려버리고 말았다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんには前にも言ったけどねっ<emoji=heart04>\u3000はふぅっ<emoji=heart04>\u3000リトルフォームになるといつもより勇気が出て……普段じゃできないようなことも、できるようになるんだよっ<emoji=heart04>」"
translation = "「회장 군에게는 전에도 말했지만 말이야앗<emoji=heart04> 하후웃<emoji=heart04> 리틀 폼이 되면 평소보다 용기가 나서…… 평소라면 못 할 것 같은 일도 할 수 있게 된다구웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だから――あはぁあっ<emoji=heart04>\u3000今日は私が、会長くんを襲っちゃうね？」"
translation = "「그러니까── 아하아앗<emoji=heart04> 오늘은 내가 회장 군을 덮쳐버릴게?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ……おち○ちん、ううん、会長くんの<b>おち○ぽ</b><emoji=heart04>\u3000ちゃんと大きくなってて、嬉しいっ<emoji=heart04>\u3000ふわぁあっ<emoji=heart04>」"
translation = "「앗…… 꼬추, 아니아니, 회장 군의 <b>자지</b><emoji=heart04> 제대로 커져 있어서 기뻐어<emoji=heart04> 후와아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへへ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000『おち○ぽ』って言うの、とってもはしたなくて、エッチだよね<emoji=heart04>」"
translation = "「에헤헤헤<emoji=heart04> 하아앗<emoji=heart04> 『자지』라고 말하는 거, 정말 상스럽고 야하지<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁぁっ<emoji=heart04>\u3000最近、会長くんは私がエッチなことすると、たくさん興奮してくれるって、気づいたの<emoji=heart04>\u3000だから勇気を出して、たくさんエッチになってみるねっ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 최근에 회장 군은 내가 야한 짓을 하면 엄청 흥분해 준다는 걸 깨달았어<emoji=heart04> 그러니까 용기를 내서 잔뜩 야해져 볼게엣<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あとね……会長くん、ちっちゃい姿だと、はぁあぁっ<emoji=heart04>\u3000キスはしてくれても、エッチまでは、してくれないでしょ……？」"
translation = "「그리고 말이야…… 회장 군, 조그만 모습이면, 하아아아앗<emoji=heart04> 키스는 해줘도 섹스까지는 안 해주잖아……?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んんぅ……<emoji=heart04>\u3000もしかしたら、ちっちゃい私だと、興奮してくれないのかも、って心配してたんだぁ<emoji=heart04>」"
translation = "「응으으……<emoji=heart04> 어쩌면 조그만 나로서는 흥분해 주지 않는 걸지도 모른다고 걱정했었어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……ごめん。実はカッコつけてただけで……」"
translation = "「그건…… 미안. 사실 멋있는 척했을 뿐이라……」"

[[dialogue]]
speaker = "unk"
original = "本当はしてみたいと思っていた……が、男としての変な見栄から『小さな姿のメルエルとエッチしたい』とは言えなくて、今日まで来てしまっていた。"
translation = "사실은 해보고 싶다고 생각했다…… 하지만, 남자로서의 이상한 허세 때문에 『작은 모습의 메르엘과 섹스하고 싶다』고는 말하지 못한 채, 오늘까지 오고 말았다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そう、だったんだぁ<emoji=heart04>\u3000えへへへへへぇ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000よかったぁ<emoji=heart04>\u3000じゃあ、これからはもう、遠慮しないでねっ<emoji=heart04>」"
translation = "「그랬구나아<emoji=heart04> 에헤헤헤헤헤<emoji=heart04> 아앙<emoji=heart04> 다행이다아<emoji=heart04> 자, 이제부터는 더 이상, 사양하지 마<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁぁんっ<emoji=heart04>\u3000あぁぁ……<emoji=heart04>\u3000私は、おっきい姿でも、ちっちゃい姿でも……１回でも多く、会長くんにエッチしたいって思われた方が、嬉しくなっちゃうから<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 아아아……<emoji=heart04> 나는, 큰 모습이든, 작은 모습이든…… 한 번이라도 더 많이, 회장군이 섹스하고 싶다고 생각해주면, 기뻐져 버리니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「こうして、はあぁあぁっ<emoji=heart04>\u3000私に興奮してくれてるおち○ぽ、おま○こに擦り合わせてるだけで……んんぅっ<emoji=heart04>」"
translation = "「이렇게, 하아아아<emoji=heart04> 나한테 흥분해 있는 자지, 보지에 문지르고 있는 것만으로도…… 응으읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふわぁあんっ<emoji=heart04>\u3000はあぁっ……キュンキュンして、愛液止まらなくなっちゃうんだもん<emoji=heart04>」"
translation = "「후와아앙<emoji=heart04> 하아아…… 큥큥거려서, 애액이 멈추지 않게 되어버리는걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だからもう、おち○ぽを中に挿れさせてもらって……会長くんのこと、気持ちよくさせて欲しいの<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「그러니까 이제, 자지를 안에 삽입하게 해줘서…… 회장군을 기분 좋게 해주고 싶어<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んんぅっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000今日は私が挿れちゃうから、会長くんはそのまま、楽にしてていいからね……あっ<emoji=heart04>」"
translation = "「응으읏<emoji=heart04> 아아아앗<emoji=heart04> 오늘은 내가 삽입할 테니까, 회장군은 그대로, 편하게 있어도 돼…… 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んうぅっ――あっ<emoji=heart04>\u3000ふあああぁぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응우읏――앗<emoji=heart04> 후아아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中へ挿入すると同時に、メルエルの膣内がきゅうぅっとペニスに絡みつき、メルエル自身もヘコヘコと腰を震わせる。"
translation = "안으로 삽입함과 동시에, 메르엘의 질 내부가 뀨우욱 하고 페니스를 휘감고, 메르엘 자신도 앙탈지게 허리를 떨었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあぁあぁ～～っ<emoji=heart04><emoji=heart04>\u3000おち○ぽ挿れてもらったら、すぐにイッちゃったよぉっ<emoji=heart04>\u3000んふぅう<emoji=heart04>\u3000ふあぁあんっ<emoji=heart04>」"
translation = "「하아아아~~앗<emoji=heart04><emoji=heart04> 자지 삽입받았더니, 바로 가버렸어어<emoji=heart04> 응후우<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちっちゃい体、だからかなぁ？<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000会長くんのおち○ぽ、いつもよりおっきく感じて、すごいよぉ<emoji=heart04>」"
translation = "「작은 몸이라서 그럴까나?<emoji=heart04> 아아앙<emoji=heart04> 회장군의 자지, 평소보다 크게 느껴져서 굉장해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁんっ<emoji=heart04>\u3000会長くんので、おま○こ気持ちいいのぉっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 회장군 거 때문에, 보지 기분 좋아아앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルは嬉しそうに目じりを下げて、俺のペニスを愛撫するように、ねちっこく腰を上下に動かしていく。"
translation = "메르엘은 기쁜 듯이 눈꼬리를 내리고, 내 페니스를 애무하듯이 끈적하게 허리를 상하로 움직여 갔다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんのおち○ぽ、たくましくてぇ<emoji=heart04>\u3000ちっちゃいおま○こが、キュンキュン喜んじゃってるのぉっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「회장군의 자지, 늠름해서어<emoji=heart04> 작은 보지가, 큥큥거리며 기뻐하고 있어어<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000いつもと違うの<emoji=heart04>\u3000おっきいおち○ぽでいっぱいにしてもらえて、あぁああっ<emoji=heart04>\u3000しあわせだよぉ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 평소랑 달라아<emoji=heart04> 커다란 자지로 가득 채워져서, 아아아앗<emoji=heart04> 행복해애<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も、小さなメルエルのおま○こ、いつもと違う感じで、気持ちいい……！」"
translation = "「나도, 작은 메르엘의 보지, 평소랑 다른 느낌이라 기분 좋아……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあぁあっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000あぁあぁっ……<emoji=heart04>\u3000私、いつも会長くんに気持ちよくしてもらって、ばっかりだったからぁ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 기뻐어<emoji=heart04> 아아아앗……<emoji=heart04> 나, 항상 회장군에게 기분 좋게 도움받기만 했으니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んうぅっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000ふんっ<emoji=heart04>\u3000今日はね、あんっ<emoji=heart04>\u3000私がキミを、たくさん気持ちよくなれるように、ご奉仕したいの<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 흣<emoji=heart04> 흣<emoji=heart04> 오늘은 말이야, 앙<emoji=heart04> 내가 너를, 잔뜩 기분 좋아질 수 있게 봉사하고 싶어<emoji=heart04> 응후읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんにエッチしてもらうの、あんっ<emoji=heart04>\u3000とっても幸せで、すっごく大好きなんだけどっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「회장군에게 에치 받는 거, 앙<emoji=heart04> 정말 행복하고, 너무너무 좋아하지만<emoji=heart04> 앙<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んふぅうんっ<emoji=heart04>\u3000あぁあ……<emoji=heart04>\u3000会長くんに動いてもらっちゃうと、私、すぐに気持ちよくなりすぎて、あんっ<emoji=heart04>\u3000何もわからなくなっちゃう、からぁ<emoji=heart04>」"
translation = "「응후으응<emoji=heart04> 아아아……<emoji=heart04> 회장군이 움직여 버리면, 나, 금방 너무 기분 좋아져서, 앙<emoji=heart04> 아무것도 모르게 되어버리니까아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を振りながら語るうちにメルエル自身もどんどん興奮が高まっているようで、呼吸はより熱を帯びて、甘ったるくなっていく。"
translation = "허리를 흔들며 이야기하는 동안 메르엘 자신도 점점 흥분이 고조되는 듯, 호흡은 더욱 열기를 띠며 달콤하게 변해간다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁあんっ<emoji=heart04>\u3000それに私、女の子が男の子の上に乗って腰を振るのって……んんぅっ<emoji=heart04>\u3000なんだかとってもはしたない気がして、恥ずかしくて勇気がでなかったんだぁ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 게다가 나, 여자가 남자 위에 올라타서 허리를 흔드는 건…… 응응윽<emoji=heart04> 왠지 너무나 파렴치한 기분이 들어서, 부끄러워서 용기가 나지 않았어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でも……あぁんっ<emoji=heart04>\u3000リトルフォームになれば、勇気が出せると思ったの<emoji=heart04>\u3000んふぅうんっ<emoji=heart04>」"
translation = "「하지만…… 아앙<emoji=heart04> 리틀 폼이 되면, 용기를 낼 수 있을 거라 생각했어<emoji=heart04> 응후으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だから今日は……はふぅんっ<emoji=heart04>\u3000会長くんのおち○ぽの上で、一生懸命腰振っちゃうからっ<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000んふぅんっ<emoji=heart04>」"
translation = "「그러니까 오늘은…… 하후웅<emoji=heart04> 회장군의 자지 위에서, 열심히 허리 흔들어 버릴 거니까<emoji=heart04> 아앙<emoji=heart04> 응후웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁっ……会長くんのこと、たくさん気持ちよくして<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000私のことしか、考えられなくしちゃいたいっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 아아앗…… 회장군을 잔뜩 기분 좋게 해서<emoji=heart04> 응응으<emoji=heart04> 내 생각밖에 할 수 없게 만들고 싶어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんに、気持ちよくしてもらうんじゃなくて、ああぁんっ<emoji=heart04>\u3000私のおま○こで、会長くんをメロメロにしちゃいたいのっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「회장군에게 기분 좋게 도움받는 게 아니라, 아아앙<emoji=heart04> 내 보지로 회장군을 헤롱헤롱하게 만들고 싶어어<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ああぁあぁっ<emoji=heart04>\u3000ずっと考えてたエッチな告白、ついにしちゃったよぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아<emoji=heart04> 하아아<emoji=heart04> 아아아아앗<emoji=heart04> 계속 생각했던 야한 고백, 드디어 해버렸어어<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아아아~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごく嬉しいっ。でもずっと前から、俺はメルエルにメロメロだよっ」"
translation = "「정말 기뻐. 하지만 훨씬 전부터, 나는 메르엘에게 헤롱헤롱이야」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──ふわぁああ～～んっ<emoji=heart04>\u3000ああぁあっ<emoji=heart04>\u3000ダメぇ、嬉しいこと言われると、それだけでイッちゃう<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>」"
translation = "「──후와아아~~앙<emoji=heart04> 아아아앗<emoji=heart04> 안 돼애, 기쁜 말을 들으면 그것만으로 가버려어<emoji=heart04> 아아앙<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ<emoji=heart04>\u3000会長くんも、私のおま○こで、気持ちよくなってくれてる？<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長くん、私のちっちゃいおま○こ好きっ？<emoji=heart04>」"
translation = "「앙<emoji=heart04> 회장군도 내 보지로 기분 좋아지고 있어?<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 회장군, 내 조그만 보지 좋아해?<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、メルエルのおま○こ、すごく気持ちいいっ。気持ちよくて好きだっ」"
translation = "「아아, 메르엘의 보지, 정말 기분 좋아. 기분 좋아서 좋아해」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──ふわぁあぁああんっ<emoji=heart04>\u3000あぁあああぁあっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000会長くんにおま○こ好きって言ってもらえて、愛液どぷどぷ溢れてきちゃうよぉ<emoji=heart04>\u3000ふああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「──후와아아아앙<emoji=heart04> 아아아아아앗<emoji=heart04> 기뻐<emoji=heart04> 회장 군에게 보지 좋아한다는 말을 들어서, 애액이 도프도프 넘쳐흘러 버려어<emoji=heart04> 후아아아~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "『好き』というただ一言に反応して、メルエルの膣がビクビクと震える。その快感が制御できないとでも言うように、ヘコヘコと不規則に痙攣する腰がとても淫靡だ。"
translation = "『좋아해』라는 단 한마디에 반응하여, 메르엘의 질이 파르르 떨린다. 그 쾌감을 제어할 수 없다는 듯이, 삐걱삐걱 불규칙하게 경련하는 허리가 무척 음비하다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ぬるぬるでトロトロになった、ちっちゃなおま○こで、あぁあんっ<emoji=heart04>\u3000おち○ぽの気持ちいいところ、あんっ<emoji=heart04>\u3000たくさんご奉仕しちゃうねっ<emoji=heart04>」"
translation = "「미끌미끌하고 걸쭉해진, 조그만 보지로, 아앙<emoji=heart04> 자지의 기분 좋은 곳, 앙<emoji=heart04> 잔뜩 봉사해 줄게<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふああぁんっ<emoji=heart04>\u3000あぁぁ……会長くんはリラックスして、私のおま○こで、いっぱい気持ちよくなってぇ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「후아아앙<emoji=heart04> 아아아…… 회장 군은 릴랙스하고, 내 보지로, 잔뜩 기분 좋아져줘어<emoji=heart04> 하아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「我慢なんてせずに、あぁんっ<emoji=heart04>\u3000会長くんの一番気持ちいいところで、中出ししてほしいのっ<emoji=heart04>\u3000あぁあぁんっ<emoji=heart04>」"
translation = "「참지 말고, 아앙<emoji=heart04> 회장 군이 제일 기분 좋은 곳에서, 질내사정 해줬으면 좋겠어어<emoji=heart04> 아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「１回で終わりになんてしないでっ、あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000５回でも１０回でもぉ<emoji=heart04>\u3000私のおま○こに中出ししてほしいっ<emoji=heart04>」"
translation = "「한 번으로 끝내지 말아줘, 앗<emoji=heart04> 앙<emoji=heart04> 5번이라도 10번이라도오<emoji=heart04> 내 보지에 질내사정 해줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だってだって<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000少しでも早く、キミの赤ちゃん孕ませてほしいからぁ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「그치만 그치만<emoji=heart04> 앙<emoji=heart04> 조금이라도 빨리, 너의 아기를 임신하고 싶으니까아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ああぁぁっ……会長くん──<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗…… 회장 군──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルは辛抱たまらないといった様子で、小さな腰を上下に振りながら、俺の顔に覆いかぶさって甘い甘いディープキスをする。"
translation = "메르엘은 참을 수 없다는 기색으로, 가느다란 허리를 상하로 흔들면서, 내 얼굴을 덮어씌우듯 달콤하디 달콤한 딥 키스를 한다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んちゅうぅっ<emoji=heart04>\u3000れるっ<emoji=heart04>\u3000んちゅるっ<emoji=heart04>\u3000……ちゅるぅっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000……んれるっ<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>」"
translation = "「응츄우<emoji=heart04> 레루<emoji=heart04> 응츄루<emoji=heart04> ……츄루우<emoji=heart04> 응츄<emoji=heart04> 츄파<emoji=heart04> ……응레루<emoji=heart04> 츄루루<emoji=heart04> 츄파<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふぅう、んんんっ<emoji=heart04>\u3000舌で愛し合うきしゅ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000……んちゅっ<emoji=heart04>\u3000れるっ<emoji=heart04>\u3000んちゅるっ<emoji=heart04>\u3000……れちゅるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000れろれろ<emoji=heart04>」"
translation = "「후우우, 응응응<emoji=heart04> 혀로 서로 사랑하는 키슈<emoji=heart04> 기분 좋아<emoji=heart04> ……응츄<emoji=heart04> 레루<emoji=heart04> 응츄루<emoji=heart04> ……레츄루<emoji=heart04> 츄파<emoji=heart04> 레로레로<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んちゅ、しゅきっ<emoji=heart04>\u3000会長くんしゅきぃ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅぅうっ<emoji=heart04>\u3000……れるれるっ<emoji=heart04>\u3000んれぇ、くちゅるるっ<emoji=heart04>」"
translation = "「응츄, 죠아<emoji=heart04> 회장 군 죠아아<emoji=heart04> 츄<emoji=heart04> 츄우우<emoji=heart04> ……레루레루<emoji=heart04> 응레에, 쿠츄루루<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んちゅうっ<emoji=heart04>\u3000れるれるれるっ<emoji=heart04>\u3000ちゅるれるれるっ<emoji=heart04>\u3000んむぅぅっ！<emoji=heart04>\u3000ちゅるっ<emoji=heart04>\u3000──んううぅううう～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응츄우<emoji=heart04> 레루레루레루<emoji=heart04> 츄루레루레루<emoji=heart04> 응무우우! <emoji=heart04> 츄루<emoji=heart04> ──응우우우우우우~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルの体がブルブルと震えて、また膣内が強く締めつけられる。"
translation = "메르엘의 몸이 부르르 떨리고, 다시 질 내부가 강하게 조여진다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちゅぱっ<emoji=heart04>\u3000はああぁあぁっ……<emoji=heart04>\u3000ふわぁ、えへへへへへぇ<emoji=heart04>\u3000キスでまた、イっちゃったぁっ<emoji=heart04>」"
translation = "「츄파<emoji=heart04> 하아아아아앗……<emoji=heart04> 후와아, 에헤헤헤헤헤<emoji=heart04> 키스로 또, 가버렸어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁんっ<emoji=heart04>\u3000私、キスするとすぐにイっちゃうから、ちょっと恥ずかしいけど……<emoji=heart04>\u3000んぅちゅるうぅっ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 나, 키스하면 금방 가버리니까, 조금 부끄럽지만……<emoji=heart04> 응으츄루우<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「れるれるれるっ、ちゅぱっ……でもキミとキスするの、んちゅるる<emoji=heart04>\u3000頭フワフワってして、しあわせぇ～<emoji=heart04>\u3000んむぅっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「레로레로레로, 츄릅…… 하지만 너랑 키스하는 거, 응츄루루<emoji=heart04> 머리가 둥실둥실해서, 행복해에～<emoji=heart04> 응무웃<emoji=heart04> 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろんと恍惚な表情を浮かべて、キスしながら腰を振り続けるメルエル。"
translation = "황홀한 표정을 띄우며, 키스하면서 허리를 계속 흔드는 메르엘."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んむぅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000またイクぅっ<emoji=heart04>\u3000あああっ――ふあああぁああ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응무웃<emoji=heart04> 츄릅<emoji=heart04> 응아아앗<emoji=heart04> 또 가버렷<emoji=heart04> 아아앗――후아아아아아아～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ぷぁあっ──<emoji=heart04>\u3000あぁぁっ、エッチしながらキスしてると、本当に何度もイっちゃうよぉっ<emoji=heart04>\u3000あぁあぁんっ、すっごくしあわせぇっ<emoji=heart04>」"
translation = "「푸아앗──<emoji=heart04> 아아앗, 섹스하면서 키스하고 있으면, 정말로 몇 번이고 가버려어<emoji=heart04> 아아아앙, 너무 행복해에<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふわあぁんっ<emoji=heart04>\u3000すっごく幸せだけど、んんぅ<emoji=heart04>\u3000今日は会長くんのおち○ぽに、ご奉仕したいから、キスは一旦休憩するねっ<emoji=heart04>」"
translation = "「후와아앙<emoji=heart04> 너무 행복하지만, 응응으<emoji=heart04> 오늘은 회장 군의 자지에, 봉사하고 싶으니까, 키스는 일단 휴식할게<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私ばっかりイっちゃってるけど、あんっ<emoji=heart04>\u3000会長くんも、好きな時に射精していいんだよ？\u3000うぅん、私が射精してほしいのっ<emoji=heart04>」"
translation = "「나만 계속 가버리고 있지만, 아앙<emoji=heart04> 회장 군도, 좋을 때 사정해도 괜찮아? 으응, 내가 사정해 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁあんっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000会長くんの濃い精液、たっくさん子宮に流し込んでもらって……受精、させてほしいからぁ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 아아앗<emoji=heart04> 회장 군의 진한 정액, 잔뜩 자궁에 쏟아부어 줘서…… 수정, 시켜 줬으면 하니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、もうちょっとだけ我慢してっ。メルエルが一番気持ちよくなってる時に、一緒にイきたい……！」"
translation = "「하지만, 조금만 더 참아 줘. 메르엘이 제일 기분 좋아졌을 때, 같이 가고 싶어……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「～～～っ<emoji=heart04>\u3000うん、わかったぁっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000会長くんが気持ちよくなってくれるなら、あぁあっ<emoji=heart04>\u3000私も、もっと頑張るねっ<emoji=heart04>」"
translation = "「～～앗<emoji=heart04> 응, 알았어어<emoji=heart04> 하아앙<emoji=heart04> 회장 군이 기분 좋아진다면, 아아앗<emoji=heart04> 나도, 좀 더 힘낼게<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぁあんっ<emoji=heart04>\u3000それで、私の子宮にいっぱい精液流し込んでもらって<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長くんの赤ちゃん、受精させて欲しいのぉ<emoji=heart04>」"
translation = "「하아앙<emoji=heart04> 그래서, 내 자궁에 가득 정액 쏟아부어 줘서<emoji=heart04> 아앙<emoji=heart04> 회장 군의 아기, 수정시켜 줬으면 좋겠어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……メルエルにしてもらって、すごく気持ちいいからっ。本当にメルエルが受精しちゃうくらい、本気の射精が出そうっ」"
translation = "「윽…… 메르엘이 해 줘서, 정말 기분 좋으니까. 정말로 메르엘이 수정해 버릴 정도로, 진심인 사정이 나올 것 같아」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──ふわぁあああぁああ～～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あぁああっ<emoji=heart04>\u3000会長くんの、本気の孕ませ射精ぇ<emoji=heart04><emoji=heart04>」"
translation = "「──후와아아아아아아～～앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 아아아앗<emoji=heart04> 회장 군의, 진심인 임신시키기 사정어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んふぅ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000キミの精液で受精するところ想像したら、あんっ<emoji=heart04>\u3000またイッちゃったぁ<emoji=heart04><emoji=heart04>」"
translation = "「응후<emoji=heart04> 아아아앗<emoji=heart04> 너의 정액으로 수정하는 걸 상상했더니, 아앙<emoji=heart04> 또 가버렸어어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でも……はぁあんっ<emoji=heart04>\u3000もしこの姿で孕んじゃったら、しばらくおっきい姿に戻れないねっ<emoji=heart04>」"
translation = "「하지만…… 하아앙<emoji=heart04> 만약 이 모습으로 임신해 버리면, 한동안 커다란 모습으로 돌아갈 수 없겠네<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あぁあんっ<emoji=heart04>\u3000もちろん、その時はこの姿のままで産むよ<emoji=heart04>\u3000男の子でも女の子でも、あんっ<emoji=heart04>\u3000きっと可愛い子が産まれてくるよねっ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 물론, 그때는 이 모습 그대로 낳을 거야<emoji=heart04> 남자아이든 여자아이든, 아앙<emoji=heart04> 분명 귀여운 아이가 태어나겠지<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ちっちゃい私で赤ちゃん作ったら<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000――今度は、おっきい姿でも種付けしてね<emoji=heart04>」"
translation = "「조그만 나로 아기를 만들면<emoji=heart04> 하아앙<emoji=heart04> ――다음번엔, 커다란 모습으로도 씨뿌리기 해 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000キミとの赤ちゃんは、何人でも欲しいからっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000家族も兄妹も、たくさんいた方が、幸せだもんね<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 아아앙<emoji=heart04> 너와의 아기는 몇 명이라도 갖고 싶으니까<emoji=heart04> 응후우<emoji=heart04> 가족도 남매도 많은 편이 행복하잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんも、おち○ぽからいっぱい精液出して……はぁあんっ<emoji=heart04>\u3000精子が卵子を『ぷちゅん』って受精させちゃうところ、想像してっ<emoji=heart04>」"
translation = "「회장 군도 자지에서 정액 잔뜩 내보내 줘…… 하아앙<emoji=heart04> 정자가 난자를 『푸츄운』 하고 수정시켜 버리는 거, 상상해 줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふわぁあぁあ～<emoji=heart04>\u3000おち○ぽ、ビクってなったよ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000ちっちゃい私を孕ませるところ想像して、興奮してくれたんだぁ<emoji=heart04>」"
translation = "「후와아아아~<emoji=heart04> 자지가 움찔거렸어<emoji=heart04> 아아앙<emoji=heart04> 조그만 나를 임신시키는 상상을 해서 흥분해 준 거구나<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「いいよっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もっともっと興奮して、気持ちよくなって<emoji=heart04>\u3000想像だけじゃなくて、本物の赤ちゃん作っちゃおっ<emoji=heart04>」"
translation = "「좋아<emoji=heart04> 앙<emoji=heart04> 좀 더 좀 더 흥분해서 기분 좋아져 줘<emoji=heart04> 상상뿐만 아니라 진짜 아기를 만들자<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はあぁあっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000またイクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000――ふああぁああぁあ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 아아앗<emoji=heart04> 또 가버려<emoji=heart04> 가버려 가버려<emoji=heart04> ――후아아아아아아아~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おち○ぽビクビクしたり、子宮の入り口クリクリされると、中出ししてもらった時のこと思い出して――んあああぁ～～っ<emoji=heart04><emoji=heart04>\u3000何度でも、すぐイッちゃうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「자지가 움찔움찔하거나 자궁 입구를 구리구리 당하면, 질내사정 받았을 때가 생각나서――응아아아아~~<emoji=heart04><emoji=heart04> 몇 번이고 바로 가버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ<emoji=heart04>\u3000もうダメっ<emoji=heart04>\u3000おま○こが何度も絶頂しちゃって、これ以上会長くんの精液、我慢できないよぉ<emoji=heart04>\u3000んっ、ああぁあっ<emoji=heart04>\u3000ふああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 이제 안 돼<emoji=heart04> 보지가 몇 번이나 절정해 버려서, 더 이상 회장 군의 정액을 참을 수 없어어<emoji=heart04> 응, 아아아앗<emoji=heart04> 후아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「本物の精液どぴゅどぴゅってして、いちばん気持ちいいところに、２人で一緒に行こぉ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「진짜 정액을 도퓨도퓨 뿌려서, 제일 기분 좋은 곳으로 둘이서 같이 가자아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……メルエルっ！！」"
translation = "「윽…… 메르엘!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あっ――ふああああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――후아아아아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんのおち○ぽきてるぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000ふああぁあんっ<emoji=heart04><emoji=heart04>」"
translation = "「회장 군의 자지가 오고 있어어~~<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はああぁっ<emoji=heart04><emoji=heart04>\u3000気持ちいいっ、会長くんの種付けおち○ぽ気持ちいいよぉ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗<emoji=heart04><emoji=heart04> 기분 좋아, 회장 군의 씨뿌리기 자지 기분 좋아아~~<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「好きっ、会長くんのおち○ぽ好きぃっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000おま○こ気持ちよくて、しあわせになっちゃうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「좋아, 회장 군의 자지 좋아아<emoji=heart04> 아아아앗<emoji=heart04> 보지가 기분 좋아서 행복해져 버려어~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あああっ、イっちゃうっ<emoji=heart04>\u3000気持ちいいの大きくなって、またイっちゃうっ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>」"
translation = "「아아앗, 가버려어<emoji=heart04> 기분 좋은 게 커져서 또 가버려어<emoji=heart04><emoji=heart04> 앗앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──ふわぁあぁあああ～～～<emoji=heart04><emoji=heart04>\u3000あぁあぁあっ、気持ちいいっ<emoji=heart04>\u3000幸せいっぱいあふれて来ちゃってるよぉ～～っ<emoji=heart04><emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「──후와아아아아아아아~~<emoji=heart04><emoji=heart04> 아아아아앗, 기분 좋아<emoji=heart04> 행복이 가득 넘쳐 흘러나오고 있어어~~<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あん、あん、あんっ<emoji=heart04>\u3000はあぁっ、ふああぁんっ<emoji=heart04><emoji=heart04>\u3000好きっ<emoji=heart04>\u3000会長くん大好きぃっ<emoji=heart04>\u3000大好きな人に求められるの、しあわせすぎるのぉ<emoji=heart04><emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 하아아앗, 후아아앙<emoji=heart04><emoji=heart04> 좋아<emoji=heart04> 회장 군 너무 좋아아<emoji=heart04> 좋아하는 사람이 원해 주는 거, 너무 행복해에<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「しゅきっ<emoji=heart04>\u3000しゅきしゅきっ<emoji=heart04>\u3000だいしゅきぃ～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000はあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「죠아<emoji=heart04> 죠아죠아<emoji=heart04> 너무 죠아아~~<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 하아아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「おち○ぽで愛されてしあわせぇ<emoji=heart04><emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>\u3000おち○ぽ好きっ<emoji=heart04>\u3000おち○ぽ大好きぃ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지로 사랑받아서 행복해에<emoji=heart04><emoji=heart04> 앗앗앗앗앗<emoji=heart04> 자지 좋아<emoji=heart04> 자지 너무 좋아아<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエル、もうそろそろ……！」"
translation = "「메르엘, 이제 슬슬……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ、あ、あ、あ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000きてっ<emoji=heart04>\u3000きてきてっ<emoji=heart04>\u3000会長くんの愛、子宮にいっぱい注いでぇ<emoji=heart04>」"
translation = "「아, 아, 아, 아<emoji=heart04> 기뻐어<emoji=heart04> 와 줘<emoji=heart04> 와 줘 와 줘<emoji=heart04> 회장 군의 사랑을 자궁에 가득 부어 줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「赤ちゃんくださいっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000孕ませてっ<emoji=heart04>\u3000あぁああぁあぁぁっ<emoji=heart04>\u3000またイク、イクイクっ、イッちゃうぅぅ～～<emoji=heart04>」"
translation = "「아기 주세요<emoji=heart04> 아아앗<emoji=heart04> 임신시켜 줘<emoji=heart04> 아아아아아아아앗<emoji=heart04> 또 가, 가버려 가버려, 가버려어어~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふわぁああああっ<emoji=heart04>\u3000イッてるっ<emoji=heart04><emoji=heart04>\u3000おま○こイッてるぅぅ<emoji=heart04>\u3000あ、あ、あ、あ、あ、あっ<emoji=heart04>\u3000んあぁあああんっ<emoji=heart04>」"
translation = "「후와아아아아앗<emoji=heart04> 가고 있어<emoji=heart04><emoji=heart04> 보지가 가고 있어어어<emoji=heart04> 아, 아, 아, 아, 아, 앗<emoji=heart04> 응아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっあんっあんっあんっ<emoji=heart04>\u3000ああぁあっ<emoji=heart04><emoji=heart04>\u3000きてっ<emoji=heart04>\u3000きてきてきてぇっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙앙앙앙<emoji=heart04> 아아아앗<emoji=heart04><emoji=heart04> 와 줘<emoji=heart04> 와 줘 와 줘 와 줘어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「もうイクっ<emoji=heart04>\u3000おっきいの来ちゃう<emoji=heart04><emoji=heart04>\u3000あぁあ、あぁああっ<emoji=heart04>\u3000あっ、ああ、あ、あああっ<emoji=heart04>」"
translation = "「이제 가버려<emoji=heart04> 큰 게 와 버려어<emoji=heart04><emoji=heart04> 아아아, 아아아앗<emoji=heart04> 앗, 아아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「イクイクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクぅ～<emoji=heart04>\u3000んあぁああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려 가버려<emoji=heart04><emoji=heart04> 가버려 가버려 가버려 가버려 가버려어~<emoji=heart04> 응아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「イックうううぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふわあぁああぁぁあああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후와아아아아아아아아아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルが背筋を大きく仰け反らせると同時に、俺も溜め込んでいた射精欲を一気に解き放った。"
translation = "메르엘이 등줄기를 크게 젖힘과 동시에, 나도 쌓아두었던 사정욕을 단숨에 해방했다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はああぁああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000会長くんの熱い精液、いっぱい子宮に入ってくるうぅ～～っ<emoji=heart04><emoji=heart04>\u3000ふあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 회장 군의 뜨거운 정액이 자궁에 잔뜩 들어와아~~<emoji=heart04><emoji=heart04> 후아아아아~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はああぁんっ<emoji=heart04><emoji=heart04>\u3000会長くんに中出しされて、子宮が喜んでるよぉ<emoji=heart04><emoji=heart04>\u3000あぁあぁっ、連続でイっちゃうぅ～～っ<emoji=heart04><emoji=heart04>\u3000──んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앙<emoji=heart04><emoji=heart04> 회장 군에게 질내사정 당해서 자궁이 기뻐하고 있어어<emoji=heart04><emoji=heart04> 아아아앗, 연속으로 가버려어~~<emoji=heart04><emoji=heart04> ──응아아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「んっ<emoji=heart04>\u3000はああぁんっ……<emoji=heart04>\u3000会長くんの射精、長くて好きぃ<emoji=heart04><emoji=heart04>\u3000あっ……んはああぁ<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아앙……<emoji=heart04> 회장 군의 사정, 길어서 좋아아<emoji=heart04><emoji=heart04> 앗…… 응하아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふあああぁ……っ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000子宮の中、大好きな人のでいっぱいで、しあわせぇ<emoji=heart04><emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「후아아아아……앗<emoji=heart04> 응응<emoji=heart04> 자궁 속이 좋아하는 사람의 것으로 가득해서 행복해에<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あんっ<emoji=heart04>\u3000はあぁ……んんぅ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하아아…… 응응으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、射精が止まったペニスを引き抜くと、小さな膣に入り切らなかった白濁が溢れ出してきた。"
translation = "이윽고 사정이 멈춘 페니스를 뽑아내자, 작은 질에 다 들어가지 못한 백탁액이 넘쳐흘러 나왔다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふうぅ……<emoji=heart04>\u3000今日は私が会長くんを気持ちよくするつもりだったのに、また私の方が気持ちよくなって、いっぱいイっちゃったぁ……<emoji=heart04>」"
translation = "「후우……<emoji=heart04> 오늘은 내가 회장 군을 기분 좋게 해 줄 생각이었는데, 또 나만 기분 좋아져서 잔뜩 가버렸네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんは、ちゃんと気持ちよくなれたかな……？」"
translation = "「회장 군은 제대로 기분 좋아졌을까……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫、すごく気持ちよかった……」"
translation = "「괜찮아, 정말 기분 좋았어……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへ、よかったぁ<emoji=heart04>\u3000私でいっぱい気持ちよくなってくれたなら、すっごく嬉しいなぁ<emoji=heart04>」"
translation = "「에헤헤, 다행이다아<emoji=heart04> 나 때문에 잔뜩 기분 좋아졌다면 정말 기뻐어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に愛らしく笑うメルエルに、今度は俺の方からキスをしてしまうのだった──"
translation = "그렇게 사랑스럽게 웃는 메르엘에게, 이번에는 내가 먼저 키스를 해버리고 마는 것이었다──"

