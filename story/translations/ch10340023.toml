[[dialogue]]
speaker = "unk"
original = "第３話,アツアツのカレーパン,P"
translation = "제3화,뜨끈뜨끈한 카레빵,P"

[[dialogue]]
speaker = "unk"
original = "俺はカティアとともに巡回パトロールに出動していた。"
translation = "나는 카티아와 함께 순찰 임무에 출동했다."

[[dialogue]]
speaker = "カティア"
original = "「幽霊みたいなモンスターの目撃情報は、この辺らしいですワン」"
translation = "「유령 같은 몬스터 목격 정보는, 이 근처인 것 같습니다멍」"

[[dialogue]]
speaker = "カティア"
original = "「はい。突然出てきては、すぐに消えて……被害はそんなに大きくないけど、街の人たちはすっごく迷惑してるそうです」"
translation = "「네. 갑자기 나타났다가, 바로 사라지고…… 피해는 그렇게 크지 않지만, 마을 사람들은 엄청나게 불편해한다고 합니다」"

[[dialogue]]
speaker = "カティア"
original = "「そこで鼻の利く私の出番ですワン！」"
translation = "「그래서 코가 잘 듣는 제가 나설 차례입니다멍!」"

[[dialogue]]
speaker = "カティア"
original = "「この辺にはお気に入りのパン屋さんがいくつもあるんです。迷惑をかけるモンスターは絶対許さないガオ！」"
translation = "「이 근처에는 제가 좋아하는 빵집이 몇 군데 있거든요. 폐를 끼치는 몬스터는 절대 용서 못 합니다갸오!」"

[[dialogue]]
speaker = "カティア"
original = "「私、パン屋さん巡りが趣味でして。そこのお店も行きつけで、特にメロンパンが絶品なんですガオ！」"
translation = "「저는 빵집 순례가 취미라서요. 그 가게도 단골인데, 특히 멜론빵이 일품이랍니다갸오!」"

[[dialogue]]
speaker = "カティア"
original = "「上のクッキーがサックサクなのに、中にはふわっふわのカステラが入ってるんです！\u3000一口かじっただけで幸せになれちゃうんですよ」"
translation = "「위에 쿠키는 바삭바삭한데, 안에는 폭신폭신한 카스텔라가 들어있어요! 한 입 베어 물기만 해도 행복해질 수 있답니다」"

[[dialogue]]
speaker = "カティア"
original = "「焼き立てをすぐに食べるのが一番美味しいんですよね。立ち食いはちょっとお行儀悪いんですけど……えへへ」"
translation = "「갓 구운 걸 바로 먹는 게 제일 맛있죠. 서서 먹는 건 좀 예의 없지만…… 에헤헤」"

[[dialogue]]
speaker = "unk"
original = "他にも──"
translation = "이 외에도──"

[[dialogue]]
speaker = "カティア"
original = "「あそこのサンドイッチはボリューミーで美味しいんです！\u3000パンからはみ出すくらい、具がたっぷりで！」"
translation = "「저기 샌드위치는 푸짐하고 맛있어요! 빵을 비집고 나올 정도로, 속 재료가 가득해서!」"

[[dialogue]]
speaker = "カティア"
original = "「しかも、パンを買うと、サンドイッチを作った余りのパンの耳がタダでもらえちゃうんですよ！」"
translation = "「게다가, 빵을 사면, 샌드위치를 만들고 남은 빵의 귀퉁이를 공짜로 받을 수 있답니다!」"

[[dialogue]]
speaker = "カティア"
original = "「耳をオーブンでカリカリに焼くと、ラスクみたいになっていいオヤツになりますワン！」"
translation = "「귀퉁이를 오븐에 바삭하게 구우면, 러스크처럼 돼서 좋은 간식이 됩니다멍!」"

[[dialogue]]
speaker = "unk"
original = "どこも美味しそうだね"
translation = "어디든 맛있어 보이네"

[[dialogue]]
speaker = "カティア"
original = "「はいっ！\u3000オススメのパン屋さんを魔王様に教えられて良かったですワン♪」"
translation = "「네엣! 추천 빵집을 마왕님께 알려드릴 수 있어서 좋았습니다멍♪」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様とお散歩、嬉しいなー<emoji=heart04>\u3000あっ、お散歩じゃないです……真面目にパトロールしなきゃですよね」"
translation = "「마왕님과 산책, 기쁘다ー<emoji=heart04> 앗, 산책이 아니죠…… 진지하게 순찰해야 하죠」"

[[dialogue]]
speaker = "unk"
original = "オススメのお店、もっと教えて"
translation = "추천 가게, 더 알려줘"

[[dialogue]]
speaker = "unk"
original = "ちゃんとパトロールもしてるし"
translation = "제대로 순찰도 하고 있고"

[[dialogue]]
speaker = "カティア"
original = "「……はいっ！」"
translation = "「……네엣!」"

[[dialogue]]
speaker = "カティア"
original = "「こっちの路地の奥にも絶品カレーパンのお店があって──わふっ！？」"
translation = "「이쪽 골목 안쪽에도 일품 카레빵 가게가 있는데── 와프!?」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様、モンスターいます！」"
translation = "「마왕님, 몬스터가 있어요!」"

[[dialogue]]
speaker = "unk"
original = "モンスターの反応は感じないのに"
translation = "몬스터의 반응은 느껴지지 않는데"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?」"

[[dialogue]]
speaker = "カティア"
original = "「こっちですっ！」"
translation = "「이쪽입니다!」"

[[dialogue]]
speaker = "unk"
original = "カティアは疾風のように駆け出した。"
translation = "카티아는 질풍처럼 달려나갔다."

[[dialogue]]
speaker = "モンスター"
original = "「イィィッ！？」"
translation = "「이이이잇!?」"

[[dialogue]]
speaker = "カティア"
original = "「おっと、そっちには行かせないよ！」"
translation = "「어엇, 그쪽으로는 못 가게 할 거야!」"

[[dialogue]]
speaker = "unk"
original = "カティアが素早く先回りし、モンスターの逃げ道をふさぐ。"
translation = "카티아가 재빨리 앞질러가, 몬스터의 도주로를 막는다."

[[dialogue]]
speaker = "カティア"
original = "「魔王様、トドメをっ！」"
translation = "「마왕님, 마무리를!」"

[[dialogue]]
speaker = "unk"
original = "ディマイズブレイカー！"
translation = "디마이즈 브레이커!"

[[dialogue]]
speaker = "unk"
original = "ナイス足止め！"
translation = "나이스 발 묶기!"

[[dialogue]]
speaker = "モンスター"
original = "「イィィ……ッ」"
translation = "「이이이……엣」"

[[dialogue]]
speaker = "カティア"
original = "「やったー！\u3000さすがは魔王様ですガオー！」"
translation = "「야호ー! 역시 마왕님이십니다갸오ー!」"

[[dialogue]]
speaker = "unk"
original = "やっぱり匂いで？"
translation = "역시 냄새로?"

[[dialogue]]
speaker = "unk"
original = "よく気づいたね"
translation = "잘도 눈치챘네"

[[dialogue]]
speaker = "カティア"
original = "「はいっ、カレーパンの良い匂いの中に、モンスターの嫌～な臭いが混ざってましたから」"
translation = "「네엣, 카레빵의 좋은 냄새 속에, 몬스터의 싫～은 냄새가 섞여 있었으니까요」"

[[dialogue]]
speaker = "カティア"
original = "「モンスターはやっつけましたし、これで任務完了ですね！\u3000お疲れさまでしたワン！」"
translation = "「몬스터는 해치웠으니, 이걸로 임무 완료네요! 수고하셨습니다멍!」"

[[dialogue]]
speaker = "カティア"
original = "「でも、パトロールが終わっちゃったのは、ちょっと残念かもです」"
translation = "「하지만, 순찰이 끝나버린 건, 조금 아쉬울지도 몰라요」"

[[dialogue]]
speaker = "カティア"
original = "「まだ魔王様に教えたいパン屋さん、いっぱいあるんですけど――」"
translation = "「아직 마왕님께 알려드리고 싶은 빵집, 잔뜩 있는데――」"

[[dialogue]]
speaker = "unk"
original = "あとはパトロールじゃなくてデートってことで"
translation = "나머지는 순찰이 아니라 데이트라고 하자"

[[dialogue]]
speaker = "カティア"
original = "「ま、ま、魔王様とデ、デ、デートですガオ～～～！？」"
translation = "「마, 마, 마왕님과 데, 데, 데이트인가요오오오～～～!?」"

[[dialogue]]
speaker = "カティア"
original = "「と、とりあえず、カレーパンを買って……一緒に食べませんか？」"
translation = "「트, 일단, 카레빵을 사서…… 같이 드시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "照れて真っ赤になったカティアの顔は、揚げたてのカレーパンよりもアツアツなのだった。"
translation = "부끄러워 새빨개진 카티아의 얼굴은, 갓 튀겨낸 카레빵보다도 뜨끈뜨끈했다."

