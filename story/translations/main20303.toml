[[dialogue]]
speaker = "unk"
original = "第３話,覚醒した力,B"
translation = "제3화, 각성한 힘, B"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「この……！」"
translation = "「이익……!」"

[[dialogue]]
speaker = "unk"
original = "稲妻を帯びた矢が雷鳴とともに迸る。"
translation = "번개를 머금은 화살이 뇌명과 함께 쏟아진다."

[[dialogue]]
speaker = "unk"
original = "だが仮面の騎士は大剣を軽々と扱い、矢を容易く切り落とした。"
translation = "하지만 가면의 기사는 대검을 가볍게 다루며 화살을 손쉽게 베어 넘겼다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君の攻撃は読みやすいね、性格が表れているのかな。それに──」"
translation = "「네 공격은 읽기 쉽네, 성격이 드러나는 걸까. 게다가──」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あぐっ──」"
translation = "「아윽──」"

[[dialogue]]
speaker = "unk"
original = "音もなく忍び寄ったナターシャを、ジグがあっけなく返り討ちにした。"
translation = "소리 없이 다가간 나타샤를 지그가 허무하게 반격했다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「隙を見せたら斬りかかってくるってわかってたよ。速いけど素直すぎる」"
translation = "「빈틈을 보이면 베러 올 거라는 건 알고 있었어. 빠르지만 너무 정직해」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でもすごいね、気配をほとんど感じなかった。暗殺者みたいだ」"
translation = "「하지만 대단하네, 기척을 거의 느끼지 못했어. 암살자 같아」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「みたいじゃなくて本物。気付かれちゃったのは不覚だけどね」"
translation = "「같은 게 아니라 진짜야. 들켜버린 건 실수지만 말이지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「へぇ、暗殺者なんて本当にいるんだ」"
translation = "「헤에, 암살자라는 게 정말로 있구나」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でも暗殺者なら、命を取られる覚悟もできてるよね？」"
translation = "「하지만 암살자라면 목숨을 잃을 각오도 되어 있겠지?」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの首めがけ、容赦なく大剣が振り下ろされる。"
translation = "나타샤의 목을 겨냥해 가차 없이 대검이 휘둘러진다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「させませんっ！」"
translation = "「하게 두지 않아요!」"

[[dialogue]]
speaker = "unk"
original = "しかし寸でのところで、槍を伸ばしていたベアトリスが刃を弾く。"
translation = "그러나 간발의 차로 창을 뻗은 베아트리스가 칼날을 튕겨낸다."

[[dialogue]]
speaker = "unk"
original = "その隙にアポロがナターシャを剣の間合いから離脱させた。"
translation = "그 틈에 아폴로가 나타샤를 검의 사정권 밖으로 이탈시켰다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「大丈夫か、ナターシャ？」"
translation = "「괜찮아, 나타샤?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ありがと。けっこう痛かったけどまだ戦う分には支障ないかな」"
translation = "「고마워. 꽤 아팠지만 아직 싸우는 데 지장은 없으려나」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「助け合いか……そういうのも悪くないね。でも敵は私だけじゃないよ？」"
translation = "「서로 돕는 건가…… 그런 것도 나쁘지 않네. 하지만 적은 나뿐만이 아니라고?」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルル！」"
translation = "「그르르르!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ここはあたしがやる！」"
translation = "「여긴 내가 맡겠다!」"

[[dialogue]]
speaker = "unk"
original = "唸る機械型モンスターを、流星の閃きを宿した刃が真っ二つに切り裂いた。"
translation = "으르렁거리는 기계형 몬스터를 유성의 광채를 품은 칼날이 단칼에 베어 갈랐다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「お見事。でも私の仲間もまだまだいるよ」"
translation = "「훌륭해. 하지만 내 동료도 아직 많이 있다고」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルゥ……！」"
translation = "「그르르우……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「くっ……次から次へと……切りがないな！」"
translation = "「큭…… 차례차례…… 끝이 없군!」"

[[dialogue]]
speaker = "unk"
original = "アポロを圧殺せんと、モンスターの群れが迫りくる。"
translation = "아폴로를 압살하려는 듯 몬스터 무리가 몰려온다."

[[dialogue]]
speaker = "unk"
original = "機械型モンスターと正面からまともに戦える星騎士は一握り。そんな強敵が殺到すれば、魔王の力を持つアポロとて一蹴することはできない。"
translation = "기계형 몬스터와 정면에서 제대로 싸울 수 있는 성기사는 극소수. 그런 강적이 쇄도하자 마왕의 힘을 가진 아폴로라 해도 단숨에 물리칠 수는 없었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「じゃあ、今のうちに先輩から堕とさせてもらおうかな──」"
translation = "「그럼 이쯤에서 선배부터 떨어뜨려 볼까──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ、はぁ……ジグ、君の相手は、私だ……！」"
translation = "「하아, 하아…… 지그, 네 상대는 나다……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「さっきも私を知っているような口ぶりだったけど、どこかで会ったかい？」"
translation = "「아까부터 나를 아는 것처럼 말하는데, 어디선가 만난 적이 있니?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君は新星学園の星徒会長で、私は副会長だった。忘れたとは言わせないぞ！」"
translation = "「너는 신성학원의 성도회장이었고, 나는 부회장이었어. 잊었다고 말하게 두지 않겠어!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「忘れたなぁ。世界を導く使命のために、私は生まれ変わったからね」"
translation = "「잊어버렸는걸. 세계를 이끌 사명을 위해 나는 다시 태어났으니까」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "ジグを見つめるその目は潤み、涙をこらえるように唇を噛む。"
translation = "지그를 바라보는 그 눈은 젖어 있었고, 눈물을 참으려는 듯 입술을 깨문다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃんをいじめるのは許しません！」"
translation = "「리오짱을 괴롭히는 건 용서 못 해요!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「本当に覚えがないし、別にいじめてるつもりはないんだけど」"
translation = "「정말로 기억이 없고, 딱히 괴롭힐 생각은 없는데 말이야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まぁいいや。“真なる神”に仕える者として、仕事をさせてもらうよ」"
translation = "「뭐 됐어. “진정한 신”을 섬기는 자로서 일을 하도록 하지」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「スパイラルブレイク！」"
translation = "「스파이럴 브레이크!」"

[[dialogue]]
speaker = "unk"
original = "暴風とともに槍が駆けた。"
translation = "폭풍과 함께 창이 달렸다."

[[dialogue]]
speaker = "unk"
original = "音速を超えた速度に反応しきれず、右肩にもろに食らってしまう。"
translation = "음속을 넘은 속도에 미처 반응하지 못하고 오른쪽 어깨에 정면으로 맞고 만다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「チッ、今のでも仕留めきれなかったか……魔王はしぶといな」"
translation = "「치, 방금 걸로도 끝내지 못했나…… 마왕은 끈질기군」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ていうかお前、さっきなんて言った？\u3000アタシがリクリエの使徒？」"
translation = "「그보다 너, 아까 뭐라고 했지? 내가 리크리에의 사도?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「魔王がそれを言うか？\u3000世界を滅ぼすのは……お前だろうがっ！！」"
translation = "「마왕이 그런 말을 하는 거냐? 세계를 멸망시키는 건…… 너잖아!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぅぅっ……！！」"
translation = "「크으윽……!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「緋宮くんっ！？」"
translation = "「히노미야 군!?」"

[[dialogue]]
speaker = "unk"
original = "動きが鈍ったところにもう一撃もらった。意識が飛びかける。"
translation = "움직임이 둔해진 틈에 한 대 더 맞았다. 의식이 날아갈 것 같다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（まずい……な……）"
translation = "(위험……하군……)"

[[dialogue]]
speaker = "unk"
original = "魔王の力に及ばずとも、自分の星力だけで戦えるようになった。"
translation = "마왕의 힘에 미치지 못하더라도 자신의 성력만으로 싸울 수 있게 되었다."

[[dialogue]]
speaker = "unk"
original = "だがそれでは足りない。彼女はただ単純に──強い。"
translation = "하지만 그것만으로는 부족하다. 그녀는 그저 단순하게── 강하다."

[[dialogue]]
speaker = "unk"
original = "それに──"
translation = "게다가──"

[[dialogue]]
speaker = "unk"
original = "追い詰められれば追い詰められるほど、俺の中のリクリエが疼く。"
translation = "막다른 곳에 몰리면 몰릴수록 내 안의 리크리에가 꿈틀거린다."

[[dialogue]]
speaker = "unk"
original = "宿主を守ろうとしているのか……いや、俺の窮地を虎視眈々と狙っているのか。"
translation = "숙주를 지키려는 건가…… 아니면 나의 위기를 호시탐탐 노리고 있는 건가."

[[dialogue]]
speaker = "unk"
original = "このままでは俺がやられる前に、リクリエの力が目覚めてしまうかもしれない。"
translation = "이대로라면 내가 당하기 전에 리크리에의 힘이 눈떠버릴지도 모른다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシはただの星騎士だ！！\u3000お前みたいな厄災の化身と一緒にするんじゃねえ！！」"
translation = "「나는 평범한 성기사다!! 너 같은 재앙의 화신과 똑같이 취급하지 마!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（厄災の化身か……否定できないな）"
translation = "(재앙의 화신인가…… 부정할 수 없군)"

[[dialogue]]
speaker = "unk"
original = "この身に封じたリクリエと、ラクシスが持っていた世界を超える力。"
translation = "이 몸에 봉인한 리크리에와 락시스가 가졌던 세계를 넘는 힘."

[[dialogue]]
speaker = "unk"
original = "２つも暴走の要因を抱えていれば、強がりでも否定するのは難しい。"
translation = "두 가지나 폭주의 요인을 안고 있다면, 아무리 허세를 부려도 부정하기는 어렵다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どきなさい！\u3000セイクリッドスフィア！」"
translation = "「비키세요! 세이크리드 스피어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「邪魔しないでって言ってるでしょ！」"
translation = "「방해하지 말라고 했잖아!」"

[[dialogue]]
speaker = "unk"
original = "俺を助けようとしたヴィーナスをガーディアンが阻む。"
translation = "나를 도우려던 비너스를 가디언이 가로막는다."

[[dialogue]]
speaker = "unk"
original = "そればかりか──"
translation = "그뿐만 아니라──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ッ…………！！」"
translation = "「윽…………!!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃん、まだ持ちこたえられる？」"
translation = "「마토이짱, 아직 버틸 수 있겠어~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はい、なんとか……！」"
translation = "「네, 어떻게든……!」"

[[dialogue]]
speaker = "unk"
original = "星徒会役員たちもガーディアンの猛攻に押されつつあった。"
translation = "성도회 임원들도 가디언의 맹공에 밀리고 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「他の場所でもガーティアンが現れていて、流星星徒会はそちらの対応に当たっているそうです……！」"
translation = "「다른 장소에서도 가디언이 나타나서, 유성성도회는 그쪽 대응을 맡고 있다고 합니다……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「星徒会以外のプリマステラも各地で交戦中。援軍を期待するのは難しい！」"
translation = "「성도회 이외의 프리마스텔라도 각지에서 교전 중. 원군을 기대하기는 어렵습니다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長は正体不明の敵に押され、私たちもガーディアンの攻撃を凌ぐので精いっぱい。戦況は圧倒的に不利ですっ」"
translation = "「회장님은 정체불명의 적에게 밀리고 있고, 저희도 가디언의 공격을 막아내는 것만으로도 벅찹니다. 전황은 압도적으로 불리해요」"

[[dialogue]]
speaker = "unk"
original = "アナが敵の攻撃をさばきながら、冷静な状況判断を告げる。"
translation = "아나가 적의 공격을 쳐내며 냉정하게 상황 판단을 알린다."

[[dialogue]]
speaker = "unk"
original = "圧倒的な不利──それは誰にも否定しようがない事実だった。"
translation = "압도적인 불리── 그것은 누구도 부정할 수 없는 사실이었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、今の私たちには奥の手がある……！」"
translation = "「하지만 지금의 우리에겐 비장의 수단이 있어……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「やるしかないわね～」"
translation = "「할 수밖에 없겠네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リスクはありますが──ここが切り札を出すタイミングでしょう」"
translation = "「리스크는 있지만── 여기가 필살기를 꺼낼 타이밍이겠죠」"

[[dialogue]]
speaker = "unk"
original = "マトイ、サーシャ、アナが目を合わせて頷く。"
translation = "마토이, 사샤, 아나가 눈을 맞추며 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "３人"
speaker_translation = "3명"
original = "「チェンジ・ノヴァフォーム！！！」"
translation = "「체인지 노바 폼!!!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「姿が変わった──！？」"
translation = "「모습이 변했어──!?」"

[[dialogue]]
speaker = "unk"
original = "それは魔王と絆を結び、そして己が限界を超えた者が辿り着ける境地。"
translation = "그것은 마왕과 유대를 맺고, 자신의 한계를 넘은 자가 도달할 수 있는 경지."

[[dialogue]]
speaker = "unk"
original = "魔王の因子を触媒にして、爆発的に力を高める切り札。"
translation = "마왕의 인자를 촉매로 삼아 폭발적으로 힘을 높이는 비장의 카드."

[[dialogue]]
speaker = "unk"
original = "だがその分消耗が激しく、星力を瞬く間に使い切ってしまう諸刃の剣でもある。"
translation = "하지만 그만큼 소모가 격렬하여 성력을 순식간에 다 써버리는 양날의 검이기도 하다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「魔王のおまけ風情が！」"
translation = "「마왕의 덤 주제에!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「リフレクトゴッデスカリバー！」"
translation = "「리플렉트 고데스 캐리버!」"

[[dialogue]]
speaker = "unk"
original = "マトイの一閃を受けたガーディアンが真っ二つになって消える。"
translation = "마토이의 일격을 받은 가디언이 두 동강 나며 사라진다."

[[dialogue]]
speaker = "unk"
original = "周囲を取り囲むようににじり寄っていた他のガーディアンたちも、アナとサーシャさんの一撃によって次々に消滅していった。"
translation = "주위를 포위하듯 다가오던 다른 가디언들도 아나와 사샤 씨의 일격에 의해 차례차례 소멸해 갔다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「！！\u3000極星従騎が一撃で……」"
translation = "「!! 극성종기가 일격에……」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「私なんて、緋宮くんやフィオナさんみたいな魔王に比べたら、確かにおまけみたいなものかもしれない」"
translation = "「나 같은 건 히노미야 군이나 피오나 씨 같은 마왕에 비하면 확실히 덤 같은 존재일지도 몰라」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「でも無力なんかじゃない！\u3000おまけだって無いより有った方がマシなんだから！」"
translation = "「하지만 무력하지 않아! 덤이라도 없는 것보다는 있는 게 나으니까!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「おまけは否定しないんですね」"
translation = "「덤이라는 건 부정하지 않으시네요」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「マトイちゃんは相変わらずちょっとネガティブね～」"
translation = "「마토이짱은 여전히 좀 부정적이네~」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ぐっ……だからどうした！\u3000アタシは……アタシたちは負けない！」"
translation = "「윽…… 그래서 어쨌다는 거냐! 나는…… 우리들은 지지 않아!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ノヴァだか何だか知らないが、まとめて貫いてやるっ！！」"
translation = "「노바인지 뭔지 모르겠지만 한꺼번에 꿰뚫어 주마!!」"

