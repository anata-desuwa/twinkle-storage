[[dialogue]]
speaker = "unk"
original = "第８話,天界へ,B"
translation = "제8화, 천계로, B"

[[dialogue]]
speaker = "unk"
original = "ベアトリスが会議室から戻ってきて、チナから聞いた情報を俺たちに話してくれた。"
translation = "베아트리스가 회의실에서 돌아와 치나에게 들은 정보를 우리에게 이야기해 주었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「このままじゃ女神の神殿が破壊されて、天使も天界も消滅しちゃうってこと！？\u3000早くその神殿に行かないと！」"
translation = "「이대로라면 여신의 신전이 파괴되어서 천사도 천계도 소멸해버린다는 거야!? 빨리 그 신전으로 가야 해!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが神殿の場所がわからなければ、動きようがありません。天界にあることしか判明していないのでは……」"
translation = "「하지만 신전의 위치를 모른다면 움직일 방도가 없습니다. 천계에 있다는 것밖에 판명되지 않은 것이라면……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ごめんなさい、場所まではチナちゃんもわからないって……」"
translation = "「죄송해요, 위치까지는 치나짱도 모른다고 해서……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトのせいじゃない。むしろベアトのおかげで天界の神殿襲撃について知ることができた」"
translation = "「베아토 탓이 아니야. 오히려 베아토 덕분에 천계의 신전 습격에 대해 알 수 있었어」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし女神の神殿は、今まで存在すら知られていませんでした。チナさんが偽の情報を教えて、こちらを撹乱しようとしている可能性もあるのでは？」"
translation = "「하지만 여신의 신전은 지금까지 존재조차 알려지지 않았습니다. 치나 씨가 거짓 정보를 가르쳐주어 이쪽을 교란하려 할 가능성도 있지 않을까요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、それはないと思うよ。チナちゃんは嘘がつけない子だし……」"
translation = "「그, 그럴 리는 없다고 생각해. 치나짱은 거짓말을 못 하는 아이고……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そもそもチナさんが嘘を教えられている可能性もあります。偽の情報で誘導し、守りが薄くなった流星市国をまた襲撃する計画かもしれません」"
translation = "「애초에 치나 씨가 거짓 정보를 전해 들었을 가능성도 있습니다. 거짓 정보로 유도하고, 수비가 허술해진 유성시국을 다시 습격할 계획일지도 모릅니다」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それは……そうかもしれないけど……」"
translation = "「그건…… 그럴지도 모르지만……」"

[[dialogue]]
speaker = "unk"
original = "目指す場所がわからない上に、情報も確証がない。"
translation = "목표로 하는 장소를 모르는 데다 정보도 확증이 없다."

[[dialogue]]
speaker = "unk"
original = "一刻も早く動かないといけないという焦りが、余計に疑心暗鬼に陥らせる。"
translation = "한시라도 빨리 움직여야 한다는 초조함이 불필요하게 의구심을 품게 만든다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いや、チナが言ってることは本当だと思うよ。だって私、女神の神殿の場所、知ってるから」"
translation = "「아니, 치나가 말하는 건 사실이라고 생각해. 왜냐면 나, 여신의 신전 위치를 알고 있거든」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ええっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "unk"
original = "驚きとともに、ナターシャにみんなの注目が集まる。"
translation = "놀라움과 함께 나타샤에게 모두의 주목이 집중된다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ナターシャ、知ってたのか！？\u3000なら天界が襲われてるって聞いた時に言ってくれればよかっただろ！」"
translation = "「나타샤, 알고 있었던 거야!? 그럼 천계가 습격당하고 있다는 말을 들었을 때 말해줬으면 됐잖아!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「女神の神殿が狙いだって確証がなかったから、そう簡単に言えなかったんだよ」"
translation = "「여신의 신전이 노림수라는 확증이 없어서 그렇게 쉽게 말할 수 없었어」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「薄々そっちが本命じゃないかと思ってたけど、全ての天使の命に関わることだから、聖庭園でも上位の秘匿事項になっててね」"
translation = "「어렴풋이 그쪽이 본래 목적이 아닐까 생각은 했지만, 모든 천사의 목숨이 걸린 일이라 성정원에서도 상위 비닉 사항으로 되어 있었거든」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だけど女神の神殿が狙いなら話が早いや。とりあえず聖庭園に行こう。そこからが一番近い」"
translation = "「하지만 여신의 신전이 노림수라면 이야기가 빠르지. 일단 성정원으로 가자. 거기서가 제일 가까워」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なら決まりね！\u3000みんなで聖庭園に行くわよ！」"
translation = "「그럼 결정됐네! 다 같이 성정원으로 가자!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「う～ん、ちょっと待って。本命が女神の神殿でも、守護天使の神殿が極星従騎に襲われているのは変わらないのよね～」"
translation = "「으음, 잠깐 기다려봐. 본래 목적이 여신의 신전이라 해도, 수호천사의 신전이 극성종기에게 습격당하고 있는 건 변함없잖아~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。女神の神殿も守る必要がありますが、守護天使の神殿が破壊されても世界は崩壊します」"
translation = "「예. 여신의 신전도 지킬 필요가 있습니다만, 수호천사의 신전이 파괴되어도 세계는 붕괴합니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「結局、全部守らないといけないんだね……」"
translation = "「결국 전부 지켜야 한다는 거네……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ごめん、さっき聖庭園に行くって聞こえてきたんだけど……」"
translation = "「미안, 방금 성정원에 간다는 소리가 들렸는데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエル？\u3000どうしてここに？」"
translation = "「메르엘? 왜 여기에?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「姫咲さんは私たちと一緒に守護天使の神殿に行く予定で、待機してもらってたんだ」"
translation = "「히메사키 씨는 우리와 함께 수호천사의 신전으로 갈 예정이라 대기하고 있었어」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん、私もそのつもりだったんだけど……会長くんたちは聖庭園に行くんだよね？」"
translation = "「응, 나도 그럴 생각이었는데…… 회장님 일행은 성정원에 가는 거지?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「じゃあ私も聖庭園に行くよ！」"
translation = "「그럼 나도 성정원에 갈래!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「え？\u3000メルエルが？」"
translation = "「에? 메르엘이?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「女神様の神殿が破壊されれば、天使と天界が消滅する……ということは、天使みんなの命が懸かってるんだよね」"
translation = "「여신님의 신전이 파괴되면 천사와 천계가 소멸한다……는 건, 천사 모두의 목숨이 걸려 있다는 거잖아」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「それなら私たち天使が戦わないと！\u3000それに聖庭園なら私の故郷だし、きっと力になれると思うんだ」"
translation = "「그렇다면 우리 천사들이 싸워야지! 게다가 성정원이라면 내 고향이고, 분명 힘이 될 수 있을 거라고 생각해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かにメルエルがいてくれるのは心強いけど……」"
translation = "「확실히 메르엘이 있어 주는 건 든든하지만……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ちょっと待った。女神の神殿にはおそらく極星星徒会が直接やってくる。一番の激戦になるよ」"
translation = "「잠깐만. 여신의 신전에는 아마 극성성도회가 직접 올 거야. 최고의 격전지가 될 거라고」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「戦いが危険なのはわかってる。でも天使みんなが消えるかどうかなんだから、ここで戦わなきゃ！」"
translation = "「싸움이 위험하다는 건 알아. 하지만 천사 모두가 사라지느냐 마느냐 하는 거니까, 여기서 싸워야 해!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「絶対に足手まといにはならない……ううん、絶対に役に立つから！」"
translation = "「절대로 짐이 되지 않을게…… 아니, 절대로 도움이 될 테니까!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そう言われてもなぁ……」"
translation = "「그렇게 말해도 말이지……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "（メルエルに危険が及ぶのは困るんだけど……でもここで無理に止めるのも不自然だし……）"
translation = "(메르엘이 위험해지는 건 곤란한데…… 하지만 여기서 무리하게 말리는 것도 부자연스럽고……)"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「はぁ……わかった。私は止めない。でも最終的に決めるのは会長さんだからね？」"
translation = "「하아…… 알았어. 나는 말리지 않을게. 하지만 최종적으로 결정하는 건 회장님이니까?」"

[[dialogue]]
speaker = "unk"
original = "チラリとナターシャが俺を見やる。"
translation = "나타샤가 슬쩍 나를 쳐다본다."

[[dialogue]]
speaker = "unk"
original = "親友を危険に晒したくないナターシャの気持ちは理解できるが、メルエルも立派なプリマステラだ。ここはメルエルを頼らせてもらう。"
translation = "절친을 위험에 빠뜨리고 싶지 않은 나타샤의 마음은 이해하지만, 메르엘도 어엿한 프리마스텔라다. 여기서는 메르엘에게 의지하기로 한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「メルエルの気持ちはわかった。一緒に戦ってくれ、メルエル」"
translation = "「메르엘의 마음은 알았어. 함께 싸워줘, 메르엘」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん、絶対に天界を守ろうね！」"
translation = "「응, 절대로 천계를 지키자!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あぁ～……やっぱそうなるかー」"
translation = "「아아~…… 역시 그렇게 되나─」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "（こうなって欲しくなかったんだけどなぁ……ま、結局やることは変わらないか。メルエルを守るのが仕事だし）"
translation = "(이렇게 되지 않길 바랐는데 말이야……. 뭐, 결국 할 일은 변하지 않나. 메르엘을 지키는 게 일이니까)"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ナターシャちゃん？」"
translation = "「나타샤짱?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ああ、ううん、何でもない。女神の神殿がやられたら私も消えるんだから、真剣に戦わないとね」"
translation = "「아, 아니, 아무것도 아니야. 여신의 신전이 당하면 나도 사라지는 거니까, 진지하게 싸워야지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それじゃ、誰がどこに行くか改めて決めよう」"
translation = "「그럼 누가 어디로 갈지 다시 정하자」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全員で女神の神殿に向かいたいところだが、報告を聞く限り、守護天使の神殿を防衛する戦力も足りていない」"
translation = "「전원이 여신의 신전으로 향하고 싶지만, 보고를 듣기로는 수호천사의 신전을 방어할 전력도 부족해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だからノヴァフォームを持つマトイたちは、分かれて守護天使の神殿を守ってくれ」"
translation = "「그러니까 노바 폼을 가진 마토이 일행은 나뉘어서 수호천사의 신전을 지켜줘」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、わかった！\u3000ノヴァフォームなら複数の極星従騎も相手できるしね」"
translation = "「응, 알았어! 노바 폼이라면 여러 마리의 극성종기도 상대할 수 있으니까」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私も先行している流星星徒会と合流して、守護天使の神殿の防衛に回ります」"
translation = "「저도 선행하고 있는 유성성도회와 합류해서 수호천사의 신전 방어로 돌아가겠습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ、頼んだぞ、フィオナ！」"
translation = "「아아, 부탁한다, 피오나!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺とヴィーナス、メルエルは女神の神殿へ。選挙管理委員会も一緒に来てくれ。ベアトリスなら極星星徒会を説得できるかもしれない」"
translation = "「나와 비너스, 메르엘은 여신의 신전으로. 선거관리위원회도 같이 와줘. 베아트리스라면 극성성도회를 설득할 수 있을지도 몰라」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「わかりました！」"
translation = "「알겠습니다!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、極星学園の好きにはさせない」"
translation = "「그래, 극성학원 마음대로 하게 두지 않겠어」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「では私は、残った星騎士とともに流星市国の防衛を。エステルさんもご協力お願いできますか？」"
translation = "「그럼 저는 남은 성기사와 함께 유성시국의 방어를. 에스텔 씨도 협력해 주시겠습니까?」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「かしこまりました。私は複雑な立場ですから、どなたかと行動を共にしていた方がよろしいでしょう」"
translation = "「알겠습니다. 저는 복잡한 입장이니 누군가와 행동을 함께하는 편이 좋겠지요」"

[[dialogue]]
speaker_original = "シノ"
speaker_translation = "시노"
original = "「ご理解が早くて助かります。エステルさんを疑うわけではありませんが、周囲に余計な心配をさせないためにも、そういった配慮は必要ですから」"
translation = "「이해가 빠르셔서 다행입니다. 에스텔 씨를 의심하는 건 아니지만, 주변에 불필요한 걱정을 끼치지 않기 위해서라도 그런 배려는 필요하니까요」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『こちらネビュラ基地のリノよ。世界樹への魔力充填、完了したわよ。いつでも行けるわ！』"
translation = "『여기 네뷸라 기지의 리노야. 세계수로의 마력 충전, 완료했어. 언제든 갈 수 있어!』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「母さん！」"
translation = "「엄마!」"

[[dialogue]]
speaker = "unk"
original = "そこに母さんから通信が入ってきた。"
translation = "그때 엄마로부터 통신이 들어왔다."

[[dialogue]]
speaker = "unk"
original = "どうやら母さんが世界樹の管制を担当してくれているらしい。"
translation = "아무래도 엄마가 세계수의 관제를 담당해 주고 있는 모양이다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『あらクロト、アルタイルに戻ったとは聞いたけど、もう元気なのね』"
translation = "『어머 쿠로토, 알타이르로 돌아왔다는 말은 들었지만 벌써 기운차구나』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、向こうの母さんが助けてくれたんだ」"
translation = "「응, 저쪽 엄마가 도와줬어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『デネブの私に会ったの！？\u3000向こうの私がどうなってるのか気になるわね。落ち着いたら聞かせてちょうだい』"
translation = "『데네브의 나를 만났니!? 저쪽의 내가 어떻게 지내는지 궁금하네. 진정되면 들려주렴』"

[[dialogue]]
speaker = "unk"
original = "アルタイルの母さんは無事だとわかっていたはずなのに、声を聞いただけで安堵してしまう。"
translation = "알타이르의 엄마는 무사하다는 걸 알고 있었을 텐데, 목소리를 듣는 것만으로 안심이 된다."

[[dialogue]]
speaker = "unk"
original = "もっと話をしたいけど、残念ながら今は天界に行かなければいけない。"
translation = "더 이야기하고 싶지만, 아쉽게도 지금은 천계에 가야만 한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、母さん。守護天使の神殿だけじゃなくて、聖庭園にも行かないといけないんだ」"
translation = "「미안, 엄마. 수호천사의 신전뿐만 아니라 성정원에도 가야 해」"

[[dialogue]]
speaker = "unk"
original = "ベアトリスがくれた情報を手短に母さんに伝える。"
translation = "베아트리스가 준 정보를 짧게 엄마에게 전한다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『なるほど、女神の神殿ね……確かにそっちも無視できないわ』"
translation = "『과연, 여신의 신전이라…… 확실히 그쪽도 무시할 수 없겠네』"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『だけど世界樹の魔力が足りるかどうか……あ、クラウディア様がＯＫしてくれたわ！』"
translation = "『하지만 세계수의 마력이 충분할지…… 아, 클라우디아 님이 OK 해주셨어!』"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『“余に無茶をさせたからには必ず成し遂げてみせよ”──だって』"
translation = "『“짐에게 무리를 시킨 이상 반드시 완수해 보이라”──라셔』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、わかった。必ず天界を守るよ」"
translation = "「응, 알았어. 반드시 천계를 지킬게」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『じゃあ星徒会室に世界樹を繋げるわ。聖庭園には私が話を通しておくわね』"
translation = "『그럼 성도회실에 세계수를 연결할게. 성정원에는 내가 말을 해둘게』"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『それじゃ──行ってらっしゃい！』"
translation = "『그럼── 다녀오렴!』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう。行ってきます！」"
translation = "「고마워요. 다녀올게요!」"

[[dialogue]]
speaker = "unk"
original = "そして俺たちは、世界樹の根を通って天界に登った──"
translation = "그리고 우리는 세계수의 뿌리를 통해 천계로 올라갔다──"

