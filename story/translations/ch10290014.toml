[[dialogue]]
speaker = "unk"
original = "第４話,シャルレーヌの夢,P"
translation = "제4화, 샤를렌의 꿈, P"

[[dialogue]]
speaker = "unk"
original = "福引でポケットティッシュ以外を当てたのはいつ以来だろう。"
translation = "경품 추첨에서 포켓 티슈 이외의 것을 당첨받은 게 얼마 만일까."

[[dialogue]]
speaker = "unk"
original = "しかも驚くことに大当たりだ。流星市国から少し遠出したところにある遊園地の１日フリーパス。"
translation = "게다가 놀랍게도 대박이다. 유성시국에서 조금 떨어진 곳에 있는 유원지의 1일 프리패스권."

[[dialogue]]
speaker = "unk"
original = "男１人で行くのはあまりに悲しいし、誰かを誘いたいけれど……"
translation = "남자 혼자 가기엔 너무 슬프고 누군가를 유혹하고 싶지만……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「あれ、会長さんじゃないですかぁ」"
translation = "「어라, 회장군 아니에요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「街中で鐘を鳴らされているから、通報でもされてるのかと思っちゃいました♪」"
translation = "「거리에서 종을 울려대길래 신고라도 당하는 줄 알았어요♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「──って、ああ、福引で当たったんですね。それは……遊園地のチケット？」"
translation = "「──아, 경품 추첨에 당첨됐군요. 그건…… 유원지 티켓?」"

[[dialogue]]
speaker = "unk"
original = "一緒に行く？"
translation = "같이 갈래?"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「いいですね。行きます、行きます」"
translation = "「좋네요. 갈게요, 갈게요」"

[[dialogue]]
speaker = "unk"
original = "貴族令嬢が遊園地なんて──って、ＯＫ！？"
translation = "귀족 영애가 유원지라니── 라고 생각했는데 OK!? "

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「会長さん、何ですかー。そのひとりノリツッコミ」"
translation = "「회장군, 뭐예요~ 그 혼자 북 치고 장구 치는 반응은」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ともかくお誘い自体はＯＫ。でも明日からしばらく忙しくなっちゃうのよね……」"
translation = "「어쨌든 권유 자체는 OK. 하지만 내일부터 한동안 바빠질 것 같거든요……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「会長さんさえ良かったら、今すぐ行っちゃいます？\u3000制服のまま遊園地で遊ぶ、っていうのも面白そう♪」"
translation = "「회장군만 괜찮다면 지금 당장 가버릴까요? 교복 차림으로 유원지에서 노는 것도 재미있을 것 같아♪」"

[[dialogue]]
speaker = "unk"
original = "こうしていきなり始まった、シャルレーヌとの遊園地デート。"
translation = "이렇게 갑자기 시작된 샤를렌과의 유원지 데이트."

[[dialogue]]
speaker = "unk"
original = "ディアーブルという名門貴族出身の彼女が、庶民の遊び場とも呼べる遊園地を楽しめるのかという杞憂は、すぐになくなった。"
translation = "디아블이라는 명문 귀족 출신인 그녀가 서민의 놀이터라 부를 수 있는 유원지를 즐길 수 있을까 하는 기우는 금방 사라졌다."

[[dialogue]]
speaker = "unk"
original = "驚くべきことに、シャルレーヌは遊園地というものにとても慣れていたのだ。"
translation = "놀랍게도 샤를렌은 유원지라는 것에 매우 익숙해져 있었다."

[[dialogue]]
speaker = "unk"
original = "閉園ぎりぎりまで遊ぶ彼女の姿は、遊園地という『非日常』を楽しむ歳相応の少女そのものだった──"
translation = "폐장 직전까지 노는 그녀의 모습은 유원지라는 『비일상』을 즐기는 제 나이대의 소녀 그 자체였다──"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「すっかり遅くなっちゃったかも……でも楽しかったぁ」"
translation = "「완전히 늦어버렸을지도…… 그래도 즐거웠어」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「料理もおいしかったし、パレードの演出も素敵だったし」"
translation = "「요리도 맛있었고 퍼레이드 연출도 멋졌고」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「惜しむらくは全部のアトラクション、回れなかったことかしら。ん～、気になる……」"
translation = "「아쉬운 건 모든 놀이기구를 다 타지 못했다는 점일까나. 음~ 신경 쓰여……」"

[[dialogue]]
speaker = "unk"
original = "遊園地、もしかしてすごく好きだったり？"
translation = "유원지, 혹시 엄청 좋아하는 거야?"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……そんなわけないでしょー。子供じゃないんだから」"
translation = "「……그럴 리 없잖아요~ 어린애도 아니고」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「って。流石に無理があるか。うん、遊園地はね、かなり好き」"
translation = "「라고 하기엔 역시 무리가 있나. 응, 유원지는 말이야, 꽤 좋아해」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「人間界に来てすぐの頃だったかしら……学園のクラスメイトと一緒に遊びに行って。とても驚いたの」"
translation = "「인간계에 온 지 얼마 안 됐을 때였나…… 학원 반 친구들이랑 같이 놀러 가서 아주 놀랐거든」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「特別な日にだけ許されるお祭りが、毎日開催している感じ。素敵な場所だなって思ったわ」"
translation = "「특별한 날에만 허락되는 축제가 매일 열리는 느낌. 멋진 곳이라고 생각했어」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「魔界──少なくとも私の出身のシャリオン地方には、こんな素敵なものはない」"
translation = "「마계── 적어도 내 고향인 샤리온 지방에는 이런 멋진 건 없어」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「だからいずれ造ってやろうと思っているの。シャリオンで初めての遊園地を」"
translation = "「그래서 언젠가 만들어 줄 생각이야. 샤리온 최초의 유원지를」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「私のための遊園地を思う存分楽しんで……ついでに領民たちにも、この素敵な体験をさせてあげるつもり」"
translation = "「나를 위한 유원지를 마음껏 즐기고…… 덤으로 영민들에게도 이 멋진 체험을 시켜줄 생각이야」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「何驚いた顔してるんですか、会長さん？\u3000私が領民のことを気にするのがそんなにおかしいんです？」"
translation = "「왜 놀란 얼굴을 하고 있어요, 회장군? 내가 영민들을 신경 쓰는 게 그렇게 이상한가요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「私は貴族。支配層なのよ？\u3000付き従う者には相応の生活をさせてあげないといけないわ」"
translation = "「난 귀족. 지배층이라고요? 따르는 자들에게는 그에 걸맞은 생활을 시켜줘야만 해」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ただ力で押さえつけるなんて三流のやること。ムチとアメを使い分けて、自分から服従したがるようにさせるのが貴族の在り方」"
translation = "「그저 힘으로 억누르는 건 삼류나 하는 짓. 채찍과 당근을 적절히 사용해서 스스로 복종하고 싶어지게 만드는 게 귀족의 도리」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「シャルレーヌ様にかしずいて幸せだった……そう思わせるのよ。それが支配するってことなんだから」"
translation = "「샤를렌 님을 모셔서 행복했다…… 그렇게 생각하게 만드는 거야. 그게 지배한다는 거니까」"

[[dialogue]]
speaker = "unk"
original = "……シャルレーヌらしいな"
translation = "……샤를렌답네"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふふ、他人事みたいに言ってる場合？」"
translation = "「후후, 남 일처럼 말할 때야?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「遊園地なんて造れるようになる頃には、ディアーブルの香水の名はもっと三界に知れ渡っているはずよ」"
translation = "「유원지 같은 걸 만들 수 있게 될 즈음에는 디아블의 향수 이름은 더욱 삼계에 널리 알려져 있을 거야」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「当然、私の権力も、今以上に凄いことになってる」"
translation = "「당연히 내 권력도 지금 이상으로 대단해져 있겠지」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「つまり──その時にはきっと、会長さんも私のペットになってるってことですけど～？」"
translation = "「즉── 그때는 분명 회장군도 내 펫이 되어 있을 거란 소리지만요~?」"

[[dialogue]]
speaker = "unk"
original = "簡単には負けないからな！"
translation = "쉽게 지지 않을 거니까!"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くすくすっ♪\u3000私に負けてば～っかりなのに強がりばっかり♪」"
translation = "「쿠스쿠스♪ 나한테 지기만~ 하면서 허세만 부리기는♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「でも会長さんのそういう所、嫌いじゃないですよ<emoji=heart04>」"
translation = "「하지만 회장군의 그런 점, 싫지 않아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「どうせ最後は、私にわからされちゃうんだから……」"
translation = "「어차피 마지막엔 나한테 굴복하게 될 테니까……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「どうかそれまで、精一杯に抵抗して、シャルレーヌを楽しませてくださいね♪」"
translation = "「부디 그때까지 마음껏 저항해서 샤를렌을 즐겁게 해주세요♪」"

