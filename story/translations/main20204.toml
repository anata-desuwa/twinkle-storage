[[dialogue]]
speaker = "unk"
original = "第４話,今在るこの世界は,B"
translation = "제4화, 지금 존재하는 이 세계는, B"

[[dialogue]]
speaker = "unk"
original = "梨緒が緋宮クロトに御前試合で敗北し、大聖堂で守護天使ラクシャと会話した後──"
translation = "리오가 히노미야 쿠로토에게 어전시합에서 패배하고, 대성당에서 수호천사 락샤와 대화한 후──"

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣの呼び出しに応え星徒会室へ赴くと、そこには呼び出した張本人に加え、<ruby>フィオナ<rt>エリシア</rt></ruby>の姿があった。"
translation = "DISC의 호출에 응해 성도회실로 향하자, 그곳에는 호출한 장본인과 더불어, <ruby>피오나<rt>엘리시아</rt></ruby>의 모습이 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「突然呼び出してしまって、すまない。本当なら、御前試合の疲れが癒えた後日にするべきかとも思ったんだけど……」"
translation = "「갑자기 불러내서 미안해. 원래라면 어전시합의 피로가 풀린 며칠 뒤에 해야 할까 생각도 했지만……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「前置きはいらない。大事な話があると聞いたから来たんだ」"
translation = "「서론은 필요 없어. 중요한 이야기가 있다고 들어서 온 거다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「では……梨緒さん。私たちはあなたに、改めて聞いておきたいことと、話しておきたいことがあります」"
translation = "「그럼…… 리오 씨. 저희는 당신에게 다시 한번 물어보고 싶은 것과, 이야기해 두고 싶은 것이 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "現・新星学園の星徒会長と、流星学園の星徒会長は、互いに目配せをして頷き合うと、話を始めた。"
translation = "현 신성학원의 성도회장과, 유성학원의 성도회장은 서로 눈짓을 하며 고개를 끄덕이고는 이야기를 시작했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「率直に話そう。梨緒、キミは『平行世界』を知っているか？」"
translation = "「솔직하게 말하지. 리오, 너는 『평행세계』를 알고 있나?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……当然、そういう概念があることは知っている」"
translation = "「……당연히 그런 개념이 있다는 건 알고 있다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「オカルトやＳＦの話じゃないんだ。現実の問題として、リクリエに関連する脅威の中に、平行世界が関係している」"
translation = "「오컬트나 SF 이야기가 아니야. 현실적인 문제로서, 리크리에와 관련된 위협 중에 평행세계가 관계되어 있어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君は先日、俺の未来を知っているというようなことを言っていた」"
translation = "「너는 요전번에 내 미래를 알고 있다는 식의 말을 했었지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちが知り得た情報によると、この世界をとりまく平行世界間には『時間のズレ』が存在しているらしい」"
translation = "「우리가 알아낸 정보에 따르면, 이 세계를 둘러싼 평행세계 사이에는 『시간의 어긋남』이 존재하는 모양이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「つまり君は、俺たちの世界とは異なる平行世界からやって来たんじゃないかと、俺たちは考えている」"
translation = "「즉 너는, 우리 세계와는 다른 평행세계에서 온 게 아닐까 하고 우리는 생각하고 있어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker = "unk"
original = "衝撃的な話ではあったが、出鱈目と切って捨てることはできなかった。梨緒自身、身の回りで起こっていることが『異常』であると、ずっと感じ続けていたから。"
translation = "충격적인 이야기였지만, 터무니없다고 치부해 버릴 수는 없었다. 리오 자신도 주변에서 일어나고 있는 일이 『이상』하다고 계속 느끼고 있었으니까."

[[dialogue]]
speaker = "unk"
original = "必死の思いで深呼吸を繰り返し、動悸を鎮める。ここで取り乱しては負けだと思った。"
translation = "필사적인 마음으로 심호흡을 반복하며 두근거림을 가라앉힌다. 여기서 당황하면 지는 것이라고 생각했다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ただ、そうなると……ラクシャの話のいくつかが腑に落ちてしまうところがある。嫌な感じだ）"
translation = "(다만, 그렇게 되면…… 락샤의 이야기 중 몇 가지가 납득이 가 버리는 부분이 있어. 기분 나쁜 느낌이다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ともあれ、『緋宮クロトの末路』については、本人に詳しく話さないというのが守護天使との約束だ）"
translation = "(여하튼, 『히노미야 쿠로토의 말로』에 대해서는 본인에게 자세히 말하지 않는 것이 수호천사와의 약속이다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（だが、あくまで<b>アレ</b>の正体についてや、詳しい顛末を話さないのであれば、良くも悪くも『今更』の範疇だろう）"
translation = "(하지만 어디까지나 <b>그것</b>의 정체에 대해서나 자세한 전말을 말하지 않는 것이라면, 좋든 싫든 『이제 와서』의 범주겠지.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……よ、要するに私は、この世界の住人ではなく、ここによく似た平行世界からやってきた異邦人だ、ということか？」"
translation = "「……요, 요컨대 나는 이 세계의 주민이 아니라, 여기와 꼭 닮은 평행세계에서 온 이방인이라는 건가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「話が早くて助かる。つまりそういうことだ」"
translation = "「말이 빨라서 다행이군. 요컨대 그런 뜻이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「女神や守護天使たちの話を総括すると、『宇宙』は１つではなく、複数の世界が俺たちの知らないところで運営されているらしい」"
translation = "「여신이나 수호천사들의 이야기를 종합해 보면, 『우주』는 하나가 아니라 여러 세계가 우리가 모르는 곳에서 운영되고 있는 모양이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この世界とは全く異なる『オルタナティブ宇宙』も存在していて、その数や上限は俺たちでは知ることができない」"
translation = "「이 세계와는 전혀 다른 『얼터너티브 우주』도 존재하고 있어서, 그 수나 상한은 우리로서는 알 수 없어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただ、この世界と関係の深い平行世界が、合計で３つ存在していることは明らかになった」"
translation = "「다만 이 세계와 관계가 깊은 평행세계가 합계 세 개 존재한다는 것은 분명해졌지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちがいるこの世界は『アルタイル』。そして、残りの２つが『デネブ』と『ベガ』だ」"
translation = "「우리가 있는 이 세계는 『알타이르』. 그리고 남은 두 개가 『데네브』와 『베가』다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルタイルも含めた３つの世界は、たった一つの可能性から分岐した世界──故に酷似しているという話だ」"
translation = "「알타이르를 포함한 세 세계는 단 하나의 가능성에서 분기된 세계── 그래서 매우 닮아 있다는 이야기야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そのどちらなのかはわからないが、君はデネブか、あるいはベガからやってきた存在である、というのが俺たち両星徒会の見解だ」"
translation = "「그중 어느 쪽인지는 모르겠지만, 너는 데네브나 혹은 베가에서 온 존재라는 것이 우리 양 성도회의 견해다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……なるほど。一応、話としては理解できた。納得するかどうかは別としてな」"
translation = "「……과연. 일단 이야기로서 이해는 했다. 납득할지 어떨지는 별개지만 말이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひとつ聞きたい。なぜ、今なんだ？\u3000恐らく君たちは、最初からその情報を持っていたわけだろう？」"
translation = "「하나 묻고 싶군. 왜 지금이지? 아마 너희는 처음부터 그 정보를 가지고 있었을 것 아닌가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「どうして私に、最初に出会った時点でその話をしなかったんだ？」"
translation = "「어째서 나에게 처음 만난 시점에 그 이야기를 하지 않은 거지?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そのことについては、私から説明しましょう」"
translation = "「그 점에 대해서는 제가 설명하죠.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「エリシア……」"
translation = "「엘리시아……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「当然、梨緒さんが最初に現れた時から、我々は梨緒さんを平行世界人だと疑っていました」"
translation = "「당연히 리오 씨가 처음에 나타났을 때부터, 저희는 리오 씨를 평행세계인이라고 의심하고 있었습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「同時に、『私たちの敵』である可能性が非常に高い、とも考えていたんです」"
translation = "「동시에 『우리의 적』일 가능성이 매우 높다고도 생각했었죠.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私たちの、敵……？」"
translation = "「우리의, 적……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「『リクリエの使徒』という言葉を、ご存じでしょうか？」"
translation = "「『리크리에의 사도』라는 말을 알고 계십니까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、聞いたことはない」"
translation = "「아니, 들어본 적 없다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「アルタイルには過去、リクリエの使徒を名乗る者が現れたことがあります」"
translation = "「알타이르에는 과거 리크리에의 사도를 자처하는 자가 나타난 적이 있습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その者は、私の双子の姉……平行世界の星見フィオナだったんです」"
translation = "「그자는 제 쌍둥이 언니…… 평행세계의 호시미 피오나였습니다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なっ！？」"
translation = "「뭣!?」"

[[dialogue]]
speaker = "unk"
original = "それからエリシアは、この世界で起こったリクリエの使徒との戦いと、現在の星見アポロが辿った顛末を語った。"
translation = "그러고 나서 엘리시아는 이 세계에서 일어난 리크리에의 사도와의 싸움과, 현재의 호시미 아폴로가 겪은 전말을 이야기했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「故に、平行世界から現れた梨緒さんに対し、我々は非常に警戒しました」"
translation = "「그렇기에 평행세계에서 나타난 리오 씨에 대해 저희는 매우 경계했습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「どういう理屈なのかはわかりませんが、リクリエの使徒は異なる平行世界の人物が選ばれるらしいことまでは把握しています」"
translation = "「어떤 원리인지는 모르겠습니다만, 리크리에의 사도는 서로 다른 평행세계의 인물이 선택되는 모양이라는 것까지는 파악하고 있습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そのため、平行世界から現れたとおぼしき梨緒さんは、次の使徒なのではないかと思ったんです」"
translation = "「그 때문에 평행세계에서 나타난 것으로 짐작되는 리오 씨가 다음 사도가 아닐까 생각했던 겁니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど、梨緒にはリクリエの使徒の特徴がなかった」"
translation = "「하지만 리오에게는 리크리에의 사도의 특징이 없었어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「リクリエの使徒の特徴……？」"
translation = "「리크리에의 사도의 특징……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リクリエの使徒は仮面を持って現れます。また『世界の再創生』を望み、リクリエの瘴気と、モンスターを使役します」"
translation = "「리크리에의 사도는 가면을 가지고 나타납니다. 또한 『세계의 재창생』을 원하며, 리크리에의 장기와 몬스터를 사역하죠.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「梨緒さんが最初にこの世界に現れた時から、緋宮会長との御前試合の最中まで、ずっと観察させてもらいましたが、これらの特徴を梨緒さんは備えていませんでした」"
translation = "「리오 씨가 처음에 이 세계에 나타났을 때부터 히노미야 회장과의 어전시합 도중까지 계속 관찰했습니다만, 리오 씨는 이러한 특징을 갖추고 있지 않았습니다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なるほど……私はずっと、監視されていたんだな」"
translation = "「과연…… 나는 계속 감시당하고 있었던 거군.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あえて言葉を選ばずに言わせてもらえれば……意図的に泳がせていました」"
translation = "「굳이 말을 고르지 않고 말씀드리자면…… 의도적으로 지켜보고 있었습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そして結論ですが、梨緒さんは限りなく白です」"
translation = "「그리고 결론입니다만, 리오 씨는 한없이 백색입니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「つまり俺たち視点で言えば、今のところ梨緒は、偶然アルタイルに紛れ込んだ平行世界人だ」"
translation = "「즉 우리 시점에서 말하자면, 현재로서는 리오는 우연히 알타이르에 흘러 들어온 평행세계인이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「とはいえ、平行世界の間の移動は女神ですらも気軽には行えないらしい。つまりただのラッキーやアンラッキーによってふらっと迷い込んだわけではない」"
translation = "「그렇다고는 해도 평행세계 사이의 이동은 여신조차도 가볍게 할 수 없는 모양이야. 즉 단순한 행운이나 불운에 의해 훌쩍 길을 잃고 들어온 게 아니라는 거지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何か、世界間を移動するような、大きな事象に巻き込まれた結果として、ここに現れたとみるべきだろう」"
translation = "「무언가 세계 사이를 이동할 정도의 커다란 사상에 휘말린 결과로서 여기에 나타났다고 봐야 할 거야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（世界間を移動するような、大きな事象──つまり、『世界の終焉』）"
translation = "(세계 사이를 이동할 정도의 커다란 사상── 즉, 『세계의 종언』)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（いや、だが私も、世界の滅びそのものを目撃したわけじゃない。本当に世界が滅びたのであれば、私自身だって滅びていなければ辻褄が合わない）"
translation = "(아니, 하지만 나도 세계의 멸망 그 자체를 목격한 건 아니야. 정말로 세계가 멸망했다면 나 자신도 멸망했어야 앞뒤가 맞아.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私がここに存在している、ということそのものが、私の世界がまだ生きているという保証になるんじゃないだろうか……？）"
translation = "(내가 여기에 존재하고 있다는 것 자체가 내 세계가 아직 살아있다는 보증이 되는 게 아닐까……?)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ともあれ、今はまだこのことを詳しく話すことはできない）"
translation = "(여하튼 지금은 아직 이 일을 자세히 이야기할 수는 없어.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひとまず、話としてはわかった」"
translation = "「일단 이야기로서 알았다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ただ正直に言って、荒唐無稽な話だとは感じている」"
translation = "「다만 솔직히 말해서, 황당무계한 이야기라고는 느끼고 있다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（この感想も、決して嘘ではない。彼らの話は辻褄の合う部分も多いが、逆に言うと筋が通っているだけで証拠は何もない）"
translation = "(이 감상도 결코 거짓은 아니야. 그들의 이야기는 앞뒤가 맞는 부분도 많지만, 반대로 말하면 이치에 맞을 뿐 증거는 아무것도 없어.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（もしかすると、壮大な嘘で私を騙そうとしている可能性だって、まだゼロではない）"
translation = "(어쩌면 장대한 거짓말로 나를 속이려 하고 있을 가능성도 아직 제로는 아니야.)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「言いたいことはわかる。突然こんな話をされても、『自分は平行世界人だったんだ！』なんていう天啓が降りてきたりはしないだろうな」"
translation = "「무슨 말인지 알아. 갑자기 이런 이야기를 들어도 『나는 평행세계인이었구나!』 같은 천계가 내려오지는 않겠지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ。どの話も私自身が見聞きしたことではないし、検証や裏取りができるようなものでもない」"
translation = "「아아. 어느 이야기도 내 자신이 보고 들은 것이 아니고, 검증이나 뒷조사를 할 수 있는 것도 아니니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ただ、話してくれたことには感謝する。鵜呑みにはできないが、頭の片隅には入れておこうと思う」"
translation = "「다만 이야기해 준 것에는 감사하지. 곧이곧대로 믿을 수는 없지만 머릿속 한구석에는 넣어 두도록 하마.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう言ってもらえると助かるよ」"
translation = "「그렇게 말해주니 다행이군.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとうございます。冷静に受け取ってもらえて、私からも感謝します」"
translation = "「감사합니다. 냉정하게 받아들여 주셔서 저로서도 감사드려요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「梨緒さんの当面の生活の面倒は、引き続き星見家で見させてください」"
translation = "「리오 씨의 당분간의 생활은 계속해서 호시미 가문에서 돌보게 해 주세요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「平行世界人であろうがなかろうが、梨緒さんがリクリエ絡みの重要人物であることには変わりありません」"
translation = "「평행세계인이든 아니든, 리오 씨가 리크리에와 관련된 중요 인물이라는 점에는 변함이 없습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ただ、生活と安全を保障する代わりに、『梨緒さんが現れた』という異変の調査に協力してもらえれば幸いです」"
translation = "「다만 생활과 안전을 보장하는 대신, 『리오 씨가 나타났다』는 이변의 조사에 협력해 주신다면 감사하겠습니다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「む……それはもしかすると、私は今後、軟禁生活になる、ということか？」"
translation = "「음…… 그건 어쩌면 나는 앞으로 연금 생활이 된다는 건가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（今までの行動については、私の反応を伺うために泳がせていたという話だ。その答えが出た以上、素性の知れない人間を好き勝手させる道理はない、か？）"
translation = "(지금까지의 행동에 대해서는 내 반응을 살피기 위해 지켜보고 있었다는 이야기다. 그 답이 나온 이상, 정체 모를 인간을 마음대로 하게 둘 리는 없나?)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「違います、違いますっ！\u3000梨緒さんには今まで通り、自由に生活していただいて構いません」"
translation = "「아닙니다, 아니에요! 리오 씨는 지금까지처럼 자유롭게 생활하셔도 상관없습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もちろん、梨緒さんに悪意や企みの気配があれば、そういうことも考えました」"
translation = "「물론 리오 씨에게 악의나 음모의 기색이 있다면 그런 것도 고려했겠죠.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長との御前試合で、あなたが卑怯な手や不審な動きをすれば、会場内に控えさせていた全戦力をもって、あなたを討っていたでしょう」"
translation = "「히노미야 회장과의 어전시합에서 당신이 비겁한 수나 수상한 움직임을 보였다면, 회장 내에 대기시키고 있던 전 전력을 동원해 당신을 토벌했을 겁니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「しかし、あなたにそういった素振りはありませんでした」"
translation = "「하지만 당신에게 그런 기색은 없었습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「疑いが晴れた以上、リクリエの新型モンスターに単騎で対抗できる星騎士を遊ばせておく余力は、私たちにはありません」"
translation = "「의심이 풀린 이상, 리크리에의 신형 몬스터에 단기로 대항할 수 있는 성기사를 놀려둘 여력은 저희에게 없습니다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「つまり？」"
translation = "「즉?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今後は正式に新星学園の生徒として登録してもらい、その力を我々星徒会にもお貸しください」"
translation = "「앞으로는 정식으로 신성학원의 학생으로 등록하고, 그 힘을 저희 성도회에도 빌려주십시오.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「学園としても星見家としても、梨緒さんが現れた謎の究明については急務です」"
translation = "「학원으로서도 호시미 가문으로서도 리오 씨가 나타난 수수께끼를 규명하는 것은 급선무입니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「不明点が多く、手探りの調査になると思いますが、共同歩調が取れれば幸いです」"
translation = "「불분명한 점이 많아 더듬어가는 조사가 되겠지만, 보조를 맞출 수 있다면 좋겠습니다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なるほど。私にとってはこれ以上ない申し出だ」"
translation = "「과연. 나에게는 이보다 더 좋을 수 없는 제안이군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ただ、私にとって『魔王の力』が危険なものであるという認識は変わらない」"
translation = "「다만 나에게 있어 『마왕의 힘』이 위험한 것이라는 인식은 변하지 않아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君たちは信じないだろうが、私はリクリエではなく、魔王が世界を滅ぼす様をこの目で見たんだ」"
translation = "「너희는 믿지 않겠지만, 나는 리크리에가 아니라 마왕이 세계를 멸망시키는 모습을 이 눈으로 봤다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君の見たものを疑っているわけじゃない。ただ、魔王の力はリクリエに抗うための肝だ。危険だから手放します、というわけにはいかない」"
translation = "「네가 본 것을 의심하는 게 아니야. 다만 마왕의 힘은 리크리에에 대항하기 위한 핵심이다. 위험하니까 포기하겠다는 식으로는 안 돼.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「わかっている。だから私は、その力を禁じるのではなく、その力を振るう君自身を監視するとしよう」"
translation = "「알고 있다. 그래서 나는 그 힘을 금지하는 게 아니라, 그 힘을 휘두르는 너 자신을 감시하도록 하지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いざという時に君を命に代えても止める者がいれば、世界そのものが無くなってしまうという最悪の事態は防げるかもしれない」"
translation = "「만약의 사태에 너를 목숨과 바꿔서라도 멈출 자가 있다면, 세계 자체가 없어져 버리는 최악의 사태는 막을 수 있을지도 모르니까.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そして、そういった後ろ暗い役割は、君の仲間ではなく、私のような外の人間が担うべきだ」"
translation = "「그리고 그런 어두운 역할은 네 동료가 아니라 나 같은 외부인이 맡아야 한다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それは……」"
translation = "「그건……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう」"
translation = "「고마워.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「正直、俺自身、魔王の力を使いこなせてるとは言い難いし、この力で仲間を傷つけるのが怖い」"
translation = "「솔직히 나 자신도 마왕의 힘을 완전히 다루고 있다고 하긴 어렵고, 이 힘으로 동료를 상처 입히는 게 무서워.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうならないよう努力するが、いざという時に梨緒が介錯してくれるなら、気兼ねなくやれるってものだ」"
translation = "「그렇게 되지 않도록 노력하겠지만, 만약의 사태에 리오가 처단해 준다면 마음 편히 할 수 있겠어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……悟ったようなことを言うんだな。自分の命を他人に預けることなんて、そう簡単にできないというのに」"
translation = "「……통달한 듯한 말을 하는군. 자신의 목숨을 타인에게 맡기는 일 따위 그렇게 쉽게 할 수 있는 게 아닌데도.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まあいい。私のやり方を認めてもらえるのなら、表立って敵対する理由はない」"
translation = "「뭐 됐다. 내 방식을 인정해 준다면 겉으로 적대할 이유는 없지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが覚悟しろ、緋宮クロト」"
translation = "「하지만 각오해라, 히노미야 쿠로토.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王という立場だけではない。新星の星徒会長としても、君が本当に相応しい人物なのかどうかを、私は常に監視し続けているからな」"
translation = "「마왕이라는 입장뿐만이 아니다. 신성의 성도회장으로서도 네가 정말로 어울리는 인물인지 어떤지, 나는 항상 계속 감시할 테니까.」"

[[dialogue]]
speaker = "unk"
original = "梨緒の宣言に対し、緋宮クロトは満足そうに頷いた。"
translation = "리오의 선언에 대해 히노미야 쿠로토는 만족스러운 듯 고개를 끄덕였다."

[[dialogue]]
speaker = "unk"
original = "そうして、長い長い１日が終わった。"
translation = "그렇게 길고 긴 하루가 끝났다."

[[dialogue]]
speaker = "unk"
original = "魔王、御前試合、星徒会長、そして平行世界。"
translation = "마왕, 어전시합, 성도회장, 그리고 평행세계."

[[dialogue]]
speaker = "unk"
original = "梨緒にとってはわからないことだらけだったが、ひとつの節目が終わり、新しい生活が始まる契機の日であったことだけは、間違いなかった。"
translation = "리오에게는 모르는 것투성이였지만, 하나의 매듭이 끝나고 새로운 생활이 시작되는 계기의 날이었음은 틀림없었다."

