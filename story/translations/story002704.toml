[[dialogue]]
speaker = "unk"
original = "その後、マトイの煩悩は一旦満たされたようで、会長の影は気づけば消え去っていた――"
translation = "그 후 마토이의 번뇌는 일단 채워진 모양인지, 회장의 그림자는 어느새 사라져 있었다──"

[[dialogue]]
speaker = "ミヤハル"
original = "「それじゃあ、次はルリエルはんの煩悩を解放する番やね<emoji=heart04>」"
translation = "「그럼 다음은 루리엘 한의 번뇌를 해방할 차례네예<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「はい！\u3000何が起こるか楽しみでワクワクするのです♪」"
translation = "「네! 무슨 일이 일어날지 기대돼서 두근거리는 거예요♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふふっ<emoji=heart04>\u3000煩悩を楽しめるなんて、ルリエルはん、巫女の素質あるわぁ<emoji=heart04>」"
translation = "「후후<emoji=heart04> 번뇌를 즐기다니 루리엘 한, 무녀 소질이 있구마.」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょ、ちょっと待って！\u3000ミヤハルさん、ストップ！」"
translation = "「자, 잠깐 기다려! 미야하르 씨, 스톱!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あら、どないしたん、マトイはん？\u3000もしかして、煩悩おかわり？\u3000ふふっ、ええよ<emoji=heart04>\u3000うちも会長はんの影ともっと遊びたかったし～」"
translation = "「어라, 와카는교 마토이 한? 혹시 번뇌 곱빼기? 후후, 괜찮습니데이<emoji=heart04> 내도 회장 한 그림자랑 더 놀고 싶었고~」"

[[dialogue]]
speaker = "マトイ"
original = "「いや、やらないよ！？\u3000そうじゃなくて、一旦クールダウンさせて！\u3000あんなの休憩せずに連発されたら、普通にキャパオーバーだから！」"
translation = "「아니 안 할 거야!? 그게 아니라 일단 쿨다운 시켜줘! 저런 걸 휴식도 없이 연발하면 평범하게 용량 초과라고!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「え～、ルリエルはんの煩悩、早く見せてもらいたいのに～<emoji=heart04>」"
translation = "「에~ 루리엘 한 번뇌 빨리 보고 싶은데~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ミヤハルさん、完全に楽しんでるよね！？」"
translation = "「미야하르 씨, 완전히 즐기고 있죠!?」"

[[dialogue]]
speaker = "unk"
original = "そうして、４人で縁側に座り休憩していると、トマルが口を開く。"
translation = "그렇게 넷이서 툇마루에 앉아 쉬고 있자 토마루가 입을 연다."

[[dialogue]]
speaker = "トマル"
original = "「――そういえば、マトイ姉さまとルリエルさまの巫女フォームの力は、どんな感じなのでしょうか？」"
translation = "「──그러고 보니 마토이 누님과 루리엘 님의 무녀 폼의 힘은 어떤 느낌인가요?」"

[[dialogue]]
speaker = "マトイ"
original = "「ああ、トマルにはまだ見せてなかったよね。えっとね……」"
translation = "「아아, 토마루에겐 아직 안 보여줬었네. 그러니까……」"

[[dialogue]]
speaker = "マトイ"
original = "「私の新しい武器は、『二刀流の刀』なんだ」"
translation = "「내 새로운 무기는 『이도류 도』야.」"

[[dialogue]]
speaker = "トマル"
original = "「カッコいいです♪\u3000<b>両利き</b>の姉さまにはピッタリの武器ですね」"
translation = "「멋집니다♪ <b>양손잡이</b>인 누님에겐 딱 맞는 무기네요.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「あら、マトイはん、手が両利きなん？\u3000それはえろう便利そうやねぇ」"
translation = "「어머, 마토이 한 양손잡이였나? 그건 억수로 편리하겠네예.」"

[[dialogue]]
speaker = "マトイ"
original = "「実はそうなんだ。今まで戦闘に役立てようとは思ったことなかったんだけど、この機会に二刀流のスタイルも試してみようかと思って」"
translation = "「실은 그래. 지금까지 전투에 도움 될 거라 생각한 적 없었는데, 이번 기회에 이도류 스타일도 시험해 볼까 싶어서.」"

[[dialogue]]
speaker = "ルリエル"
original = "「わたしの方はですね～、『太鼓』なのですよ♪\u3000でんでん♪」"
translation = "「저는 말이죠~ 『북』인 거예요♪ 둥둥♪」"

[[dialogue]]
speaker = "トマル"
original = "「ルリエルさまの楽器が、巫女らしく変化したのですね。可愛らしくて素敵です♪」"
translation = "「루리엘 님의 악기가 무녀답게 변화했군요. 귀엽고 멋져요♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ♪\u3000この太鼓を叩くと、なんと天気を操ることができるのです！\u3000まあ、今は全然上手く行かなくて、自分も巻き込む嵐ばっかり起きちゃうんですけど……」"
translation = "「에헤헤♪ 이 북을 치면 무려 날씨를 조종할 수 있는 거예요! 뭐 지금은 전혀 잘 안 돼서 자신도 휘말리는 폭풍우만 일어버리지만요……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「せや、ちょうどいいタイミングやし、軽く巫女フォームでの戦い方を確認でもしとこか？」"
translation = "「글쿠마, 마침 좋은 타이밍이니 가볍게 무녀 폼 전투 방식이나 확인해 볼까예?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「星力を巫女の力に変化させて使う『巫術』がどういうものなのかも、はんなりと見せられるしな<emoji=heart04>」"
translation = "「성력을 무녀의 힘으로 변화시켜 쓰는 『무술』이 어떤 건지도 사뿐하게 보여줄 수 있고 안 글나<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、マトイとルリエルは、ミヤハルと戦闘訓練を行うことになった――のだが。"
translation = "그리하여 마토이와 루리엘은 미야하르와 전투 훈련을 하게 되었는데──"

[[dialogue]]
speaker = "ミヤハル"
original = "「巫術二十三式――<ruby>浄火閃<rt>じょうかせん</rt></ruby>！」"
translation = "「무술 제23식── 정화섬!」"

[[dialogue]]
speaker = "ルリエル"
original = "「きゅ～……ま、参りましたなのです……！」"
translation = "「규~…… 졌습니다인 거예요……!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ふぅ～、ルリエルはん、お疲れ様どすえ<emoji=heart04>」"
translation = "「후우~ 루리엘 한, 수고했습니데이<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「はぁ……はぁ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「マトイはんの方は、盾役やっとるだけあって、倒れへんねぇ。まだ続けなはります？」"
translation = "「마토이 한 쪽은 방패역을 맡고 있어서 그런지 안 쓰러지네예. 더 계속하시겠습니껴?」"

[[dialogue]]
speaker = "マトイ"
original = "「……ううん、ギブアップ。ミヤハルさん、手合わせありがとうございました」"
translation = "「……으응, 기브업. 미야하르 씨, 상대해 주셔서 감사합니다.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「いえいえ、こちらこそおおきに。でも、さすがは２人共、星徒会メンバーなだけあるねぇ。力のコントロールがまだ出来てないにしても、強くて驚いたわぁ<emoji=heart04>」"
translation = "「아니라예, 저야말로 고맙습니데이. 근데 과연 둘 다 성도회 멤버답네예. 힘 조절이 아직 안 된다 해도 강해서 놀랐구마<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ミヤハルさん、今の戦いって……陰陽術は一切使ってなかったんだよね？」"
translation = "「미야하르 씨, 방금 전투…… 음양술은 일절 안 썼던 거죠?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うん。使ったのは巫女の力だけ。巫術と陰陽術っていうのは、完全に別物なんよ」"
translation = "「응. 쓴 건 무녀의 힘뿐이라예. 무술이랑 음양술은 완전히 별개인 기라.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「陰陽術は選星者『陰陽師』としての能力。大気中の<b>魔力</b>――マナって呼んどるものを使って発動する、特殊な『<b>魔法</b>』の一種なんよ」"
translation = "「음양술은 선성자 『음양사』로서의 능력. 대기 중의 <b>마력</b>── 마나라고 부르는 걸 써서 발동하는 특수한 『<b>마법</b>』의 일종이지예.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「魔女の人たちが使ってる魔法は、おそらく体内の魔力を消費してるんやろね。陰陽術が分類上では魔法に属するってことも、わりと最近わかってきたことなんよ」"
translation = "「마녀분들이 쓰는 마법은 아마 체내 마력을 소비하고 있겠지예. 음양술이 분류상 마법에 속한다는 것도 비교적 최근에야 알게 된 사실이라예.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「一方で、巫術は星力を変化させて使う巫女の力。うちはその２つを使い分けながら戦う、手札の多さが強みの星騎士ってわけやね<emoji=heart04>」"
translation = "「반면에 무술은 성력을 변화시켜 쓰는 무녀의 힘. 내는 그 두 가지를 가려 써가며 싸우는 패가 많다는 게 강점인 성기사인 기라<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "（私とルリエルちゃん、２人まとめてかかっても、一撃も与えることができなかった……）"
translation = "（나랑 루리엘짱, 둘이 덤벼도 한 대도 못 때렸어……）"

[[dialogue]]
speaker = "マトイ"
original = "（陰陽術なしでも、ミヤハルさんの強さは体感、私のノヴァフォームと同じくらい強い……！）"
translation = "（음양술 없이도 미야하르 씨의 강함은 체감상 내 노바 폼이랑 비슷할 정도로 강해……!）"

[[dialogue]]
speaker = "マトイ"
original = "「ミヤハルさん、前線で戦っている姿を全然見かけなかったから、こんなに強いなんて知らなかったよ」"
translation = "「미야하르 씨, 전선에서 싸우는 모습을 전혀 못 봐서 이렇게 강할 줄은 몰랐어요.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ん？\u3000ああ、うちは家の事情で『積極的に戦うな』って言われとるしな」"
translation = "「응? 아아, 내는 집안 사정으로 『적극적으로 싸우지 마라』는 소릴 들어서 말이구마.」"

[[dialogue]]
speaker = "マトイ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「マトイはんは『魔獣』って、聞いたことある？」"
translation = "「마토이 한은 『마수』라고 들어본 적 있나?」"

[[dialogue]]
speaker = "マトイ"
original = "「それは……うん。流星学園にフェニエルちゃんって子がいて、その中に『不死鳥』って魔獣が宿ってるのを知ってるけど……」"
translation = "「그건…… 응. 유성학원에 페니엘이라는 애가 있고 그 안에 『불사조』라는 마수가 깃든 건 알고 있는데……」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そう。それの同類で『<ruby>麒麟<rt>きりん</rt></ruby>』って魔獣がおってな？」"
translation = "「그래. 그거랑 비슷한 놈으로 『키린』이라는 마수가 있거든?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「うちの先祖――有名な陰陽師の安倍晴明はんが１１００年前、そいつとこの流星市国でやり合って、封印したんよ」"
translation = "「내 조상── 유명한 음양사 아베노 세이메이 한이 1100년 전 걔랑 이 유성시국에서 한판 붙어서 봉인했는기라.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「この浅草安倍野神社の、ちょうど地下にな」"
translation = "「이 아사쿠사 아베노 신사 바로 지하에 말이구마.」"

[[dialogue]]
speaker = "トマル"
original = "「この神社の下に魔獣が……！？」"
translation = "「이 신사 아래에 마수가……!?」"

[[dialogue]]
speaker = "unk"
original = "一緒に聞いていたトマルが、驚きの声を上げる。"
translation = "같이 듣고 있던 토마루가 놀란 목소리를 냈다."

[[dialogue]]
speaker = "ミヤハル"
original = "「麒麟は、晴明はんでも退治できん程の化け物だったらしくてな。封印することしかできんかったそうや」"
translation = "「기린은 세이메이 한이라도 처치 못 할 정도의 괴물이었던 모양이라 안 글나. 봉인하는 것밖에 못 했다고 하대예.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ほんで、封印を維持し続ける為に、追加で２つの<ruby>楔<rt>くさび</rt></ruby>を打つことにした」"
translation = "「글카고 봉인을 계속 유지하기 위해서 추가로 두 개의 쐐기를 박기로 했는기라.」"

[[dialogue]]
speaker = "マトイ"
original = "「楔……？」"
translation = "「쐐기……?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「１つは封印の上に社を立てて、結界を張ること」"
translation = "「하나는 봉인 위에 사당을 세우고 결계를 치는 것.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「この神社に、星力持ってる者しか出入りできない結界が張られてるのはその為や。麒麟の封印がもし解けた時、中に閉じ込めておく保険としてな」"
translation = "「이 신사에 성력 가진 자만 드나들 수 있는 결계가 쳐진 건 그 때문이라예. 기린의 봉인이 만약 풀렸을 때 안에 가둬둘 보험으로서 말이구마.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「もう１つは、選星者自身」"
translation = "「또 하나는 선성자 자신.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「晴明はんは、選星者『陰陽師』という存在自体を封印の楔としたんよ」"
translation = "「세이메이 한은 선성자 『음양사』라는 존재 자체를 봉인의 쐐기로 삼았는기라.」"

[[dialogue]]
speaker = "トマル"
original = "「それでは、ミヤハルさまが……？」"
translation = "「그러면 미야하르 님이……?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「そう。陰陽師と安倍野家は代々、その封印の役目も一緒に受け継いできた」"
translation = "「그래. 음양사와 아베노 가문은 대대로 그 봉인의 소임도 같이 이어받아 왔는기라.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「だから、うちが万が一モンスターと戦って死んでしまうと、麒麟の封印に綻びが生じ、目覚めてしまう可能性があるっていうわけや」"
translation = "「그래서 내 혹시라도 몬스터랑 싸우다 죽어버리면 기린의 봉인에 틈이 생겨서 깨어날 가능성이 있다는 소리지예.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「で、そのことは学園側も知っていて、前線に出なくていいって言われとるんよ」"
translation = "「글카고 그 사실은 학원 측도 알고 있어서 전선에 안 나가도 된다는 소릴 듣고 있는 기라.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「まあ、うちの性格的にも、別に戦うことは好きやないし、ええんやけど」"
translation = "「뭐 내 성격상으로도 딱히 싸우는 건 안 좋아하니 괜찮지만 말이구마.」"

[[dialogue]]
speaker = "ミヤハル"
original = "「もう分かってると思うけど、うちは人よりスケベぇなことが好きな、煩悩で生きとる女なんでな<emoji=heart04>」"
translation = "「이미 알겠지만 내는 남보다 야한 걸 좋아하는 번뇌로 사는 여자니까 말이구마<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「――残念なのです。ミヤハルさんが一緒にリクリエと戦ってくれたら、すごく心強いのですが……」"
translation = "「──아쉬운 거예요. 미야하르 씨가 같이 리크리에랑 싸워준다면 정말 든든할 텐데……」"

[[dialogue]]
speaker = "unk"
original = "話を聞いていたらしいルリエルが、起き上がりながら言う。"
translation = "이야기를 듣고 있던 루리엘이 일어나며 말한다."

[[dialogue]]
speaker = "ミヤハル"
original = "「別に、ルリエルはんやマトイはんが巫女の力を使いこなせるようになったら、うち１人くらい居なくても変わらへんやろ？」"
translation = "「딱히 루리엘 한이나 마토이 한이 무녀의 힘을 능숙하게 다루게 되면 내 한 명쯤 없어도 별 상관없지 않겠나?」"

[[dialogue]]
speaker = "ミヤハル"
original = "「とりあえず、今日は久しぶりに戦って疲れてもうたし、修業の続きはまた明日にしまひょか<emoji=heart04>」"
translation = "「일단 오늘은 오랜만에 싸워서 지쳐버렸으니, 수행의 뒷부분은 내일 다시 하입시데이<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "数日後。"
translation = "며칠 후."

[[dialogue]]
speaker = "unk"
original = "マトイ、ルリエル、トマルは連日神社におもむき、巫女修行を続けていた――"
translation = "마토이, 루리엘, 토마루는 연일 신사로 향하며 무녀 수행을 계속하고 있었다――"

[[dialogue]]
speaker = "ミヤハル"
original = "「さて、それじゃあ今日は、ルリエルはんの煩悩を解放していきますえ<emoji=heart04>」"
translation = "「자, 그럼 오늘은 루리엘 한의 번뇌를 해방해 보겠습니데이<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「はいなのです！」"
translation = "「네, 인 것입니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「と、とりあえず、心の準備はして来たけど……」"
translation = "「이, 일단 마음의 준비는 하고 왔지만……」"

[[dialogue]]
speaker = "トマル"
original = "（ま、また会長さまが出て来たら、どうしましょう……）"
translation = "（또, 또 회장님이 나오시면 어쩌지……）"

[[dialogue]]
speaker = "ミヤハル"
original = "「ほんなら行きますえ<emoji=heart04>\u3000<ruby>急急如律令<rt>きゅうきゅうにょりつりょう</rt></ruby>、<ruby>心影投射<rt>しんえいとうしゃ</rt></ruby>――」"
translation = "「그라믄 갑니데이<emoji=heart04> 급급여율령, 심영투사――」"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ルリエル"
original = "「わたしのドッペルゲンガーなのです！？」"
translation = "「저의 도플갱어인 것입니다!?」"

[[dialogue]]
speaker = "unk"
original = "現れたのは、ルリエルの影であった。"
translation = "나타난 것은 루리엘의 그림자였다."

[[dialogue]]
speaker = "ドッペルリエル"
original = "「こんにちはなのです、本物のわたし！」"
translation = "「안녕인 것입니다, 진짜 나!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、はいなのです！\u3000偽物のわたし！」"
translation = "「앗, 네인 것입니다! 가짜 나!」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「わたしのしたいことは――」"
translation = "「내가 하고 싶은 것은――」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「ズバリ、<b>遊ぶこと</b>なのです！」"
translation = "「바로, <b>노는</b> <b>것</b>인 것입니다!」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「というわけで、ミヤハルさん！\u3000街に遊びに行きましょう！」"
translation = "「그런 고로, 미야하르 씨! 거리에 놀러 가요!」"

[[dialogue]]
speaker = "ミヤハル"
original = "「えっ、うち？」"
translation = "「엣, 내?」"

[[dialogue]]
speaker = "ドッペルリエル"
original = "「レディー・ゴー！\u3000陰陽師なのです♪」"
translation = "「레디 고! 음양사인 것입니다♪」"

[[dialogue]]
speaker = "ミヤハル"
original = "「ちょっ、どういうことなん！？\u3000わっ――」"
translation = "「잠깐, 우찌 된 일이고!? 왓――」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの影がミヤハルの手を引っ張り、勢い良く神社を飛び出して行く。"
translation = "루리엘의 그림자가 미야하르의 손을 잡아끌고 기세 좋게 신사를 뛰쳐나간다."

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、待って下さ～い！\u3000ずるいのです！\u3000本物のわたしも遊びたいのです～！」"
translation = "「앗, 기다려 주세~요! 치사한 것입니다! 진짜 저도 놀고 싶은 것입니다~!」"

[[dialogue]]
speaker = "unk"
original = "本物のルリエルとマトイ達もその後を追いかけて、街へと繰り出すのだった――"
translation = "진짜 루리엘과 마토이 일행도 그 뒤를 쫓아 거리로 나서는 것이었다――"

