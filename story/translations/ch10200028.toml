[[dialogue]]
speaker = "unk"
original = "これは、ルルカが水着フォームを手に入れるよりも、ハメ撮り風疑似配信エッチをするよりも、ずっと前の出来事。"
translation = "이것은 루루카가 수영복 폼을 손에 넣기보다도, 셀카풍 유사 방송 섹스를 하기보다도 훨씬 전의 일."

[[dialogue]]
speaker = "unk"
original = "彼女とまだ初体験を済ませる前の、初々しかった頃の俺たちの思い出だ。"
translation = "그녀와 아직 첫 경험을 치르기 전인, 풋풋했던 시절의 우리들의 추억이다."

[[dialogue]]
speaker = "unk"
original = "ルルカと付き合い始めてしばらく経ったある日──俺は決意を固めて、彼女を自宅に呼んだ。"
translation = "루루카와 사귀기 시작하고 얼마 지나지 않은 어느 날── 나는 결심을 굳히고 그녀를 집으로 불렀다."

[[dialogue]]
speaker = "ルルカ"
original = "「んぅっ……ちゅ、んちゅるっ……ちゅぅ、んちゅっ……はぁっ……<emoji=heart04>」"
translation = "「응으…… 츄, 츄르릅…… 츄우, 츄릅…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「え、えへへ……キス、何回もしてきたけど……今までで一番ドキドキしてるかも……」"
translation = "「에, 에헤헤…… 키스, 몇 번이나 했지만…… 지금까지 중에 제일 두근거릴지도……」"

[[dialogue]]
speaker = "ルルカ"
original = "「その、今日はお兄ちゃんのお家、誰も帰ってこないんだよね……？」"
translation = "「그게, 오늘은 오빠네 집, 아무도 안 돌아오는 거지……?」"

[[dialogue]]
speaker = "ルルカ"
original = "「う、うん。お家に来てって言われた時から、わかってたよ。心の準備もしてきたし……」"
translation = "「으, 응. 집에 오라고 했을 때부터 알고 있었어. 마음의 준비도 해왔고……」"

[[dialogue]]
speaker = "ルルカ"
original = "「お家でシャワーも浴びてきたの。そ、そういうこと、するんだなってわかってたから……だから……」"
translation = "「집에서 샤워도 하고 왔어. 그, 그런 거 한다는 거 알고 있었으니까…… 그러니까……」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃん。あたしの初めて、もらってくれる……？」"
translation = "「오빠. 나의 처음, 가져가 줄래……?」"

[[dialogue]]
speaker = "ルルカ"
original = "「こ、こんな体勢でいいのかな……お兄ちゃん、重くない……？」"
translation = "「이, 이런 자세면 될까…… 오빠, 무겁지 않아……?」"

[[dialogue]]
speaker = "unk"
original = "学園の制服を脱いで、一糸まとわぬ姿になったルルカが不安そうにこぼしてくる。"
translation = "학원 교복을 벗고 실오라기 하나 걸치지 않은 모습이 된 루루카가 불안한 듯이 말을 건넨다."

[[dialogue]]
speaker = "クロト"
original = "「ぜんぜん。むしろ軽すぎるくらい」"
translation = "「전혀. 오히려 너무 가벼울 정도야.」"

[[dialogue]]
speaker = "ルルカ"
original = "「そ、そっか。それなら良かったかも……」"
translation = "「그, 그렇구나. 그렇다면 다행일지도……」"

[[dialogue]]
speaker = "unk"
original = "一年生の中でも小柄なルルカは見た目どおり、いや、見た目以上の軽さだった。"
translation = "1학년 중에서도 왜소한 루루카는 겉모습대로, 아니, 겉모습 이상의 가벼움이었다."

[[dialogue]]
speaker = "unk"
original = "こんなに華奢な女の子とこれから繋がって本当に良いのか──そんな背徳感を覚えてしまうほどだ。"
translation = "이렇게 가녀린 여자아이와 이제부터 이어져도 정말 괜찮은 걸까── 그런 배덕감을 느낄 정도다."

[[dialogue]]
speaker = "ルルカ"
original = "「うう～……夢みたい。まさかお兄ちゃんと、こういうエッチなことができるだなんて……」"
translation = "「으으~…… 꿈만 같아. 설마 오빠랑 이런 야한 짓을 할 수 있다니……」"

[[dialogue]]
speaker = "ルルカ"
original = "「恋人同士になってから、こーゆうこと。期待はしてたけど……実はちょっぴり不安だったんだ～……」"
translation = "「연인 사이가 된 뒤로 이런 거. 기대는 했지만…… 사실은 조금 불안했거든~……」"

[[dialogue]]
speaker = "クロト"
original = "「不安って？」"
translation = "「불안하다니?」"

[[dialogue]]
speaker = "ルルカ"
original = "「ほ、ほら。あたしっておっぱい小さいし、あんまりエッチな体つきもしてないでしょ？」"
translation = "「그, 그게. 난 가슴도 작고, 별로 야한 몸매도 아니잖아?」"

[[dialogue]]
speaker = "ルルカ"
original = "「それにお兄ちゃんは、星徒会ですごい美人さんに囲まれてるし……見劣りしちゃうかなぁ～……なんて……」"
translation = "「게다가 오빠는 성도회에서 엄청난 미인들한테 둘러싸여 있고…… 초라해 보이지 않을까~ 싶어서……」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことないよ。絶対にない。ルルカの裸にドキドキしていないと、俺だってこんな風にならないから」"
translation = "「그럴 리 없어. 절대로 없어. 루루카의 알몸에 두근거리지 않는다면 나도 이런 상태가 되지 않았을 테니까.」"

[[dialogue]]
speaker = "unk"
original = "ルルカのお尻に、痛いほどに勃起したペニスを擦り付けると、膝上に乗った彼女がぶるりと震えた。"
translation = "루루카의 엉덩이에 아플 정도로 발기한 자지를 문지르자, 무릎 위에 앉은 그녀가 부르르 떨었다."

[[dialogue]]
speaker = "ルルカ"
original = "「ぁ──ほんとだ……<emoji=heart04>\u3000お兄ちゃんの、お、おち○ぽ……すっごく大きくなってる……」"
translation = "「아── 진짜다……<emoji=heart04> 오빠의, 자, 자지…… 엄청 커졌어……」"

[[dialogue]]
speaker = "ルルカ"
original = "「男の人ってこんな風になっちゃうと、射精？\u3000しないと小さくならないんだよね……？」"
translation = "「남자는 이렇게 되면 사정? 하지 않으면 안 작아지는 거지……?」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、えへへぇ<emoji=heart04>\u3000『おち○ぽ』って言い方、すっごくえっちだよね？\u3000こういう風に言うと、男の人が喜ぶって雑誌に書いてあったんだぁ<emoji=heart04>」"
translation = "「아, 에헤헤<emoji=heart04> 『자지』라는 말, 엄청 야하지? 이렇게 말하면 남자가 기뻐한다고 잡지에 써 있었어<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「う、うん。いいよ、お兄ちゃん。ルルカのおま○こに……入れて？」"
translation = "「으, 응. 좋아, 오빠. 루루카의 보지에…… 넣어줘?」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんとキスしてた時から──ううん。お家に来る前から、ドキドキして、あたし、濡れちゃってるから……」"
translation = "「오빠랑 키스할 때부터── 아니. 집에 오기 전부터 두근거려서, 나, 젖어버렸으니까……」"

[[dialogue]]
speaker = "クロト"
original = "「──っ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "ルルカ"
original = "「ルルカのおま○こで、おち○ぽいっぱい、気持ちよくなっていいんだよ。お兄ちゃん？」"
translation = "「루루카의 보지로 자지 잔뜩 기분 좋아져도 돼. 오빠?」"

[[dialogue]]
speaker = "unk"
original = "繋いだ手に力がこもる。可愛い恋人がもう覚悟を決めているみたいだった。"
translation = "맞잡은 손에 힘이 들어간다. 귀여운 연인이 이미 각오를 다진 모양이었다."

[[dialogue]]
speaker = "unk"
original = "俺はうなずいて、ペニスをルルカの女性器にあてがって──"
translation = "나는 고개를 끄덕이고 자지를 루루카의 성기에 갖다 대고──"

[[dialogue]]
speaker = "ルルカ"
original = "「ふう、ぅっ──ぁ、はっ……あぁあ、あぁあっ……<emoji=heart04>」"
translation = "「후우, 윽── 아, 하…… 아아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "狭くて熱いルルカの膣内に、俺のペニスが根元まで埋まった。"
translation = "좁고 뜨거운 루루카의 질 안에 내 자지가 뿌리까지 묻혔다."

[[dialogue]]
speaker = "ルルカ"
original = "「ふぅっ……んんぅっ……はぁ、んんっ……んはぁー……す、すごぃ……お兄ちゃんのおち○ぽ、全部、入っちゃったぁ……<emoji=heart04>」"
translation = "「후우…… 음으…… 하아, 음…… 은하아…… 서, 설마…… 오빠의 자지, 전부 들어가 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「苦しくないか？」"
translation = "「괴롭지는 않아?」"

[[dialogue]]
speaker = "ルルカ"
original = "「う、うん。ありがと……思ってたよりぜんぜん平気。んんっ……ふぅっ……ぅ、ぁっ……<emoji=heart04>」"
translation = "「으, 응. 고마워…… 생각했던 것보다 전혀 괜찮아. 음…… 후우…… 으, 아……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんのおち○ぽで、お腹がいっぱいになってて……はぁ、うぅんんっ……苦しいけど、痛くは、ないよぉ……？<emoji=heart04>」"
translation = "「오빠의 자지로 배가 가득 차서…… 하아, 으으음…… 괴롭지만 아프지는 않아……?<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「んんぅ、はぁ、はああーっ……おち○ぽ大きい……おへその辺りまで、入っちゃってる感じ……す、すごぉ～……<emoji=heart04>」"
translation = "「음으, 하아, 하아아…… 자지 커…… 배꼽 근처까지 들어와 있는 느낌이야…… 서, 설마~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカが喋ったり息継ぎをするたびに、キュッキュッと膣内が締まってくる。"
translation = "루루카가 말하거나 숨을 쉴 때마다 꽉꽉 질 안이 조여온다."

[[dialogue]]
speaker = "クロト"
original = "「ぅ、くぅっ……！」"
translation = "「으, 윽……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、ぁっ……お兄ちゃん、あたしの中でびくびく、してる……<emoji=heart04>\u3000もしかして、気持ちよくなってくれてる……？」"
translation = "「아, 앗…… 오빠, 내 안에서 움찔움찔하고 있어……<emoji=heart04> 혹시 기분 좋아진 거야……?」"

[[dialogue]]
speaker = "クロト"
original = "「正直、入れてるだけで出そうなくらい、気持ちいい……」"
translation = "「솔직히 넣고 있는 것만으로도 나올 것 같을 정도로 기분 좋아……」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ、あはー……<emoji=heart04>\u3000嬉しい……あたしたち、もしかして体の相性、いいのかな<emoji=heart04>」"
translation = "「아, 아하~……<emoji=heart04> 기뻐…… 우리 혹시 속궁합이 좋은 걸까<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「でも、男の人ってじっとしてるの辛いんだよね？\u3000お兄ちゃん、動いていいよ……？」"
translation = "「하지만 남자는 가만히 있는 거 힘들지? 오빠, 움직여도 돼……?」"

[[dialogue]]
speaker = "クロト"
original = "「──いいのか？」"
translation = "「──괜찮겠어?」"

[[dialogue]]
speaker = "ルルカ"
original = "「うん、ルルカのお尻つかんで、いっぱいおち○ぽ、出し入れして……？<emoji=heart04>\u3000気持ち良ーく、なって欲しいな<emoji=heart04>」"
translation = "「응, 루루카 엉덩이 잡고 자지 잔뜩 넣었다 뺐다 해줘……?<emoji=heart04> 기분 좋게 됐으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "耳元でルルカのおねだりを聞いて、俺も我慢ができなくなった。"
translation = "귓가에서 루루카의 애원을 듣고 나도 참을 수 없게 되었다."

[[dialogue]]
speaker = "ルルカ"
original = "「っふぅうっ<emoji=heart04>\u3000んんんぅっ<emoji=heart04>\u3000は、ぁっ……はぅ、ぅうっ……んんぅっ……んぁっ……<emoji=heart04>」"
translation = "「후우우윽<emoji=heart04> 음음으윽<emoji=heart04> 하, 아…… 하우, 우윽…… 음음으…… 응아……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「す、すごぉいっ……おち○ぽ、本当に、出たり、入ったり、して、るぅっ……<emoji=heart04>」"
translation = "「서, 설마…… 자지 진짜로 나갔다 들어왔다 하고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たっぷりの愛液で濡れそぼっていて、狭くて熱い膣内。ゆっくりピストンをするだけで、俺にとっても未体験の快感が押し寄せてくる。"
translation = "듬뿍 솟아난 애액으로 흠뻑 젖어 있는 좁고 뜨거운 질 안. 천천히 피스톤질을 하는 것만으로도 나에게도 미체험의 쾌감이 몰려온다."

[[dialogue]]
speaker = "ルルカ"
original = "「んんっ……ふぅ、んんんっ<emoji=heart04>\u3000あ、ぁっ……下から、ずぷ、ずぷって……突かれてっ……んんぅ、ふぁ、あぁっ……<emoji=heart04>」"
translation = "「음…… 후우, 음음음<emoji=heart04> 아, 앗…… 밑에서 즈뿝, 즈뿝 하고…… 찔려서…… 음음으, 하아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お、お兄ちゃん、気持ちいい？\u3000ルルカのおま○こ、ちゃんと気持ちいいかなっ……？」"
translation = "「오, 오빠 기분 좋아? 루루카 보지, 제대로 기분 좋을까……?」"

[[dialogue]]
speaker = "unk"
original = "とろんとした眼差しが俺を見つめてくる。上目遣いが可愛くて、そんな些細なことでもペニスへの刺激となってたまらない。"
translation = "풀린 눈동자가 나를 바라본다. 치켜뜬 눈이 귀여워서 그런 사소한 것조차 자지에 자극이 되어 견딜 수 없다."

[[dialogue]]
speaker = "ルルカ"
original = "「ぁ、あ、ぁっ<emoji=heart04>\u3000お腹の、んぅ、中で、おち○ぽビクビクって……はぁ、んんっ……喜んでくれてる、の……？<emoji=heart04>」"
translation = "「아, 아, 앗<emoji=heart04> 배, 음, 안에서 자지 움찔움찔하고…… 하아, 음…… 기뻐해 주는 거야……?<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「嬉しいよ、ぉっ……お兄ちゃんが気持ちよくなってくれるの、嬉しいっ……んんっ、はぁ、あ、ああぁっ……んんっ……んぅ、ふぅ<emoji=heart04>」"
translation = "「기뻐어…… 오빠가 기분 좋아지는 거 기뻐…… 음, 하아, 아, 아아아앗…… 음…… 음으, 후우<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「おち○ぽ、いっぱい感じてね……？<emoji=heart04>\u3000んんっ……あ、あっ<emoji=heart04>\u3000先っぽから、根元まで、ぜんぶっ……ルルカの中でごしごし、して？」"
translation = "「자지 잔뜩 느껴줘……?<emoji=heart04> 음…… 아, 앗<emoji=heart04> 끝부분부터 뿌리까지 전부…… 루루카 안에서 비벼줘?」"

[[dialogue]]
speaker = "ルルカ"
original = "「は、あぁ、ぁ、ぅっ……お兄ちゃんのお顔、気持ちよさそうっ……嬉しい、幸せぇっ……はぁ、んんぅ、んぁ、ぁ、あああっ……<emoji=heart04>」"
translation = "「하, 아아, 아, 윽…… 오빠 표정, 기분 좋아 보여…… 기뻐, 행복해…… 하아, 음음으, 응아, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカも初めてで余裕はないはずなのに、彼女は俺の表情やペニスの反応にすごく気を配ってくれている。"
translation = "루루카도 처음이라 여유가 없을 텐데도 그녀는 내 표정이나 자지의 반응에 굉장히 신경을 써주고 있다."

[[dialogue]]
speaker = "unk"
original = "常に周りを気遣うその姿勢は、動画配信者としての活動の癖なのか。それともルルカ自身の性格なのか。きっと両方だ。"
translation = "항상 주변을 배려하는 그 자세는 동영상 스트리머로서의 활동 습관인 걸까. 아니면 루루카 자신의 성격인 걸까. 분명 둘 다일 것이다."

[[dialogue]]
speaker = "ルルカ"
original = "「んんっ……は、ぅあ、んんっ、んぅっ<emoji=heart04>\u3000お兄ちゃん、もっと感じてるお顔、見せてっ……そのお顔、好きっ……好きぃっ<emoji=heart04>」"
translation = "「음…… 하, 우아, 음, 음으<emoji=heart04> 오빠, 더 느끼는 표정 보여줘…… 그 표정 좋아…… 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が快感を得ることが、自分の喜びだとでも言いたげなルルカの言動。それがすごくすごく、いじらしくて──"
translation = "내가 쾌감을 얻는 것이 자신의 기쁨이라고 말하는 듯한 루루카의 언동. 그것이 너무나도 기특해서──"

[[dialogue]]
speaker = "unk"
original = "ピストンに合わせて揺れているおっぱいに思わず手を伸ばしてしまう。"
translation = "피스톤에 맞춰 흔들리는 가슴에 나도 모르게 손을 뻗고 만다."

[[dialogue]]
speaker = "ルルカ"
original = "「ひぁんっ<emoji=heart04>\u3000んんっ……あっ……は、ぁうっんぅ<emoji=heart04>\u3000あ、あっ……おっぱい、おっぱいも触ってくれてる、ぅ<emoji=heart04>」"
translation = "「히앙<emoji=heart04> 음…… 앗…… 하, 아우음으<emoji=heart04> 아, 앗…… 가슴, 가슴도 만져주고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんの手、あったかくて、大きくて──あんっ<emoji=heart04>\u3000触り方も、優しいよぉっ……ぁぁぁあっ、お兄ちゃん好き、好きっ……<emoji=heart04>」"
translation = "「오빠 손, 따뜻하고 커서── 앙<emoji=heart04> 만지는 법도 다정해애…… 아아아앗, 오빠 좋아, 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんに、んぁ、はぅっ……おっぱい、むにむにって、揉まれるの、ドキドキ、するよぅっ……んんぁ、ぅっ<emoji=heart04>」"
translation = "「오빠한테, 응아, 하우…… 가슴 조물조물 만져지는 거 두근거려어…… 음응아, 윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカは小さいだなんて卑下していたけれど、そんなことはない。大好きな恋人のおっぱいを揉んで、興奮しない男がこの世にいるか。"
translation = "루루카는 작다며 비하했지만 그렇지 않다. 사랑하는 연인의 가슴을 주무르며 흥분하지 않을 남자가 이 세상에 있을까."

[[dialogue]]
speaker = "ルルカ"
original = "「や、ぁ──んんんっ<emoji=heart04>\u3000あ、ふうぅあっ……おち○ぽ、また太く、なった、ぁっ……？\u3000な、なんでっ……？」"
translation = "「야, 아── 음음음<emoji=heart04> 아, 후우으앗…… 자지 또 굵어졌어어……? 왜, 왜에……?」"

[[dialogue]]
speaker = "クロト"
original = "「ルルカのおっぱいで、興奮したんだ」"
translation = "「루루카의 가슴 때문에 흥분했어.」"

[[dialogue]]
speaker = "ルルカ"
original = "「んんぅ～～っ<emoji=heart04>\u3000あ、ああ、あっ<emoji=heart04>\u3000ほんと？\u3000やったぁ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あたしのおっぱいで、おち○ぽ喜んでくれたんだぁっ……<emoji=heart04>」"
translation = "「음음으~~윽<emoji=heart04> 아, 아아, 앗<emoji=heart04> 정말? 야호<emoji=heart04> 음<emoji=heart04> 내 가슴으로 자지가 기뻐해 줬다아……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「嬉しいよぉっ……ありがとっ、あ、んぁ、お兄ちゃんっ……ふぅ、んんっ<emoji=heart04>」"
translation = "「기뻐어…… 고마워, 아, 응아, 오빠…… 후우, 음<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺ばっかり楽しんじゃってる気がするけど……ルルカも嬉しいのか？」"
translation = "「나만 즐기고 있는 것 같은데…… 루루카도 기뻐?」"

[[dialogue]]
speaker = "ルルカ"
original = "「嬉しい、よぉっ……<emoji=heart04>\u3000恋人の、お兄ちゃんがっ……ん、あっ<emoji=heart04>\u3000あたしの体で、興奮してくれるの、う、嬉しいっ……は、ぁ、んぅ<emoji=heart04>」"
translation = "「기뻐어……<emoji=heart04> 연인인 오빠가…… 음, 앗<emoji=heart04> 내 몸으로 흥분해 주는 거 기, 기뻐…… 하, 아, 음으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──っ」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "背筋にぞぞぞっと電流が走る。性の快感だけじゃない。ルルカが向けてくれる愛情が、気持ちいいんだ。"
translation = "등줄기에 찌릿찌릿 전율이 흐른다. 성적인 쾌감뿐만이 아니다. 루루카가 보내주는 애정이 기분 좋다."

[[dialogue]]
speaker = "クロト"
original = "「──ルルカっ」"
translation = "「──루루카!」"

[[dialogue]]
speaker = "unk"
original = "興奮が一気にせりあがった俺は、ルルカの唇を奪った。"
translation = "흥분이 단숨에 치솟은 나는 루루카의 입술을 빼앗았다."

[[dialogue]]
speaker = "ルルカ"
original = "「んぅちゅぅっ<emoji=heart04>\u3000んむぅっ<emoji=heart04>\u3000ちゅるう、れぇ、んちゅるっ、ちゅぅんちゅ、ちゅぱ、んぢゅるぅっ<emoji=heart04>」"
translation = "「음으츄우<emoji=heart04> 음무우<emoji=heart04> 츄르으, 레에, 음츄르, 츄우음츄, 츄파, 음쥬르으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンを強めながら、ルルカとめちゃくちゃに舌を絡める。"
translation = "피스톤질을 강하게 하며 루루카와 엉망진창으로 혀를 섞는다."

[[dialogue]]
speaker = "ルルカ"
original = "「んちゅっ……ぷぁあ<emoji=heart04>\u3000お兄ちゃんと繋がりながらキス、んんぅっ……ぢゅ、んちゅる、れぇ、ちゅる、んんちゅるっ、んちゅるぅ<emoji=heart04>」"
translation = "「음츄…… 푸하아<emoji=heart04> 오빠랑 이어지면서 키스, 음음으…… 쥬, 음츄르, 레에, 츄르, 음음츄르, 음츄르으<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「これしゅきぃっ……んんちゅるっ<emoji=heart04>\u3000気持ちいぃ、んんっ、お兄ちゃあんっ……ちゅるぅ、んるちゅる、れるれる、んちゅうぅ～っ<emoji=heart04>」"
translation = "「이거 조아아…… 음음츄르<emoji=heart04> 기분 조아, 음음, 오빠아…… 츄르으, 음루츄르, 레를레를, 음츄우우~윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "深いキスをするたびに、ルルカの女性器が小刻みに締まり、ペニスに快感を送ってくる。"
translation = "깊은 키스를 할 때마다 루루카의 성기가 잘게 조여지며 자지에 쾌감을 보내온다."

[[dialogue]]
speaker = "unk"
original = "ピストンしづらいほどにきつく締まる蜜穴を何度も穿ち、舌を絡めていく。"
translation = "피스톤질하기 힘들 정도로 꽉 조이는 꿀구멍을 몇 번이고 꿰뚫으며 혀를 얽는다."

[[dialogue]]
speaker = "ルルカ"
original = "「れぇれる、んちゅるっ<emoji=heart04>\u3000しゅき、しゅきぃっ……んんぅ、ちゅるうる、お兄ちゃん、好きぃ、んちゅるっ……<emoji=heart04>」"
translation = "「레에레를, 음츄르<emoji=heart04> 조아, 조아해애…… 음음으, 츄르우루, 오빠 좋아해, 음츄르……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を差し入れれば、夢中で絡め返してくれる、年下の可愛い彼女が愛おしくて仕方がない。"
translation = "혀를 밀어 넣으면 필사적으로 혀를 섞어오는 연하의 귀여운 여자친구가 사랑스러워 견딜 수 없다."

[[dialogue]]
speaker = "クロト"
original = "「俺も好きだ、好きだぞ、ルルカっ……！」"
translation = "「나도 좋아해, 좋아한다고, 루루카……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「んんううっ<emoji=heart04>\u3000ちゅぱ、んちゅるぅ<emoji=heart04>\u3000うんっ……あたしもしゅき、キスしゅきっ<emoji=heart04>\u3000んん、ぱんぱんも、好きぃ<emoji=heart04>\u3000幸せっ……<emoji=heart04>」"
translation = "「음음우우윽<emoji=heart04> 츄파, 음츄르으<emoji=heart04> 응…… 나도 조아, 키스 조아<emoji=heart04> 음음, 팡팡도 좋아아<emoji=heart04> 행복해……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「ちゅぱ、れろっ、んちゅるう、んじゅるっ、ちゅるちゅぱっ、れぇ、れるれる、んちゅるぅっ……<emoji=heart04>」"
translation = "「츄파, 레로, 음츄르우, 음쥬르, 츄르츄파, 레에, 레를레를, 음츄르으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカの体はどこもかしこも、温かくて柔らかい。汗と一緒にたちのぼるルルカの香りは、くらくらするほどに魅力的だった。"
translation = "루루카의 몸은 어디든 따뜻하고 부드럽다. 땀과 함께 피어오르는 루루카의 향기는 아찔할 정도로 매력적이었다."

[[dialogue]]
speaker = "ルルカ"
original = "「んんぅ、ふぅっ……んちゅるうー、れろっ……お兄ちゃん、おち○ぽ、すっごく震えて、きてる、よっ……？\u3000んちゅるっ<emoji=heart04>」"
translation = "「음으, 후우…… 음츄르으, 레로…… 오빠, 자지, 엄청 떨리고, 있어……? 음츄르<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「イ、イキたくなったら、好きな時にっ……ちゅぱ、んちゅるっ、好きなところに出していいから──ね？<emoji=heart04>」"
translation = "「가, 가고 싶어지면, 좋을 때…… 츄파, 음츄르, 좋은 곳에 내보내도 되니까── 알았지?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぞくぞくと昂ってきていたところへ、そんなことを言われたら──"
translation = "점점 고조되던 참에 그런 말을 듣게 되니──"

[[dialogue]]
speaker = "ルルカ"
original = "「ひっ、あ、あ、あ、あぁっ！<emoji=heart04>\u3000激しっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000お兄ちゃんっ、激しいっ、おち○ぽ激しいよぉおっ<emoji=heart04>」"
translation = "「히익, 아, 아, 아, 아아앗!<emoji=heart04> 격렬해<emoji=heart04> 음음음<emoji=heart04> 오빠, 격렬해, 자지 너무 격렬해애앳<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "繋いだ手にぎゅううっと力を込めたまま、腰を突き上げてルルカの体を弾ませる。"
translation = "맞잡은 손에 꼬옥 힘을 준 채로, 허리를 쳐올려 루루카의 몸을 튀게 만든다."

[[dialogue]]
speaker = "unk"
original = "お尻を抱きかかえるようにして突き上げるピストンだ。"
translation = "엉덩이를 껴안듯이 받쳐 들고 쳐올리는 피스톤질이다."

[[dialogue]]
speaker = "ルルカ"
original = "「あんっ<emoji=heart04>\u3000あっあっ、ふあんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んぁっ、あぅ、んっ、んんっんっんぅ！<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앗앗, 후앙<emoji=heart04> 음음으<emoji=heart04> 응아, 아우, 응, 음음응음음으!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろとろに濡れそぼった女性器にピストンを続け、ピンク色にとがったルルカの乳首を指でこね回す。"
translation = "걸쭉하게 젖어버린 성기에 피스톤질을 계속하며, 분홍색으로 솟아오른 루루카의 젖꼭지를 손가락으로 주무른다."

[[dialogue]]
speaker = "ルルカ"
original = "「ひぅううっ<emoji=heart04>\u3000んっ、んんぅーっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000おっぱい、そこ、ひやぁぁ、ぁあ～っ<emoji=heart04>\u3000んんぅっ、はぁああっ<emoji=heart04>」"
translation = "「히으으으윽<emoji=heart04> 응, 음음으으으<emoji=heart04> 앗앗앗<emoji=heart04> 가슴, 거기, 히야아아, 아아~앗<emoji=heart04> 음음으, 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「う、くぅっ……中が、すごく締まって……！」"
translation = "「우, 쿠우…… 안이, 엄청 조여서……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「乳首、だ、ダメだよぉ、お兄ちゃん、ひぁ、あぁあっ<emoji=heart04>\u3000それ気持ちいいっ、ふう、んんぅんぁ、あぁあっ<emoji=heart04>」"
translation = "「젖꼭지, 아, 안 돼애, 오빠, 히아, 아아앗<emoji=heart04> 그거 기분 좋아, 후우, 음음으응아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「感じすぎちゃうからっ、感じすぎちゃうからぁっ、んぁあ！<emoji=heart04>\u3000ぴんぴんダメぇっ<emoji=heart04>\u3000あっあっあっ、んんっ、んんぅ～っ<emoji=heart04>」"
translation = "「너무 느껴버리니까, 너무 느껴버리니까아, 응아아!<emoji=heart04> 빳빳한 거 안 돼애<emoji=heart04> 앗앗앗, 음음, 음음으~으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ルルカが感じてくれると、俺も幸せなんだ。いっぱい気持ちよくなって」"
translation = "「루루카가 느껴주면 나도 행복해. 잔뜩 기분 좋아지렴」"

[[dialogue]]
speaker = "unk"
original = "指でつまんでくりくりと刺激しながら、真下からペニスで可愛いルルカを串刺しにする。"
translation = "손가락으로 집어 비틀며 자극하면서, 바로 아래에서 페니스로 귀여운 루루카를 꿰뚫는다."

[[dialogue]]
speaker = "ルルカ"
original = "「ふぅう～っ、んん、んくぅうぅ～っ……！<emoji=heart04>\u3000あっ、はぁあっ、ふぅうっ、んぁ、はぁあ、んぁ、ぁう、んんぅっ！<emoji=heart04>」"
translation = "「후으으~으, 음음, 음쿠우우우~윽……!<emoji=heart04> 앗, 하아앗, 후으으, 응아, 하아아, 응아, 아우, 음음으!<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お、お兄ちゃんも、同じ気持ち、なんだっ……<emoji=heart04>\u3000大好きな人が気持ちよくなってくれたら、し、幸せっ、なるの……？」"
translation = "「오, 오빠도, 같은 마음, 인 거구나……<emoji=heart04> 정말 좋아하는 사람이 기분 좋아지면, 해, 행복해, 지는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "頷いて、はち切れそうなペニスをルルカの中で擦り上げ、シゴきたてる。"
translation = "고개를 끄덕이며, 터질 것 같은 페니스를 루루카의 안에서 문지르며 비벼댄다."

[[dialogue]]
speaker = "ルルカ"
original = "「あ、ぁ、あ、あ、ぁ、あっ<emoji=heart04>\u3000じゃ、じゃあっ、なろ<emoji=heart04>\u3000一緒に幸せになろっ<emoji=heart04>\u3000んん、ふぅ、んんんっ<emoji=heart04>」"
translation = "「아, 아, 아, 아, 아, 앗<emoji=heart04> 그, 그럼, 되자<emoji=heart04> 같이 행복해지자아<emoji=heart04> 음음, 후우, 음음음<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「気持ちよくなって<emoji=heart04>\u3000いっぱいイって<emoji=heart04>\u3000びゅうびゅうって、してっ、して、してっ──あ、ぁ、ぁ、ぁ、ぁ、ぁ、ぁ──<emoji=heart04>」"
translation = "「기분 좋아져줘<emoji=heart04> 잔뜩 가버려<emoji=heart04> 뷰릇뷰릇하고, 해줘, 해줘, 해줘── 아, 아, 아, 아, 아, 아, 아──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精の準備が整う。ペニスをぞくぞくと登ってきて、もう歯を食いしばっても押しとどめられない。出る、出る、出る──"
translation = "사정 준비가 끝난다. 페니스를 타고 전율이 올라와, 이제 어금니를 사려 물어도 억누를 수 없다. 나온다, 나온다, 나온다──"

[[dialogue]]
speaker = "ルルカ"
original = "「出してっ<emoji=heart04>\u3000お兄ちゃん、出してっ<emoji=heart04>\u3000あたしの中に射精してっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好き好きっ、好きぃっ……！<emoji=heart04>」"
translation = "「싸줘<emoji=heart04> 오빠, 싸줘<emoji=heart04> 내 안에 사정해줘<emoji=heart04> 좋아해<emoji=heart04> 좋아해 좋아해, 좋아해애……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「ふあぁぁっ……ひゃぁあぁああぁあああぁああぁああ～～～～～～っ……！！<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗…… 히야아아아아아아아아아아아아아아아아아아아아~~~~~~앗……!!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「んんぅっ、ふぁあ、ぁ、あぁああ～っ……出てるぅっ……いっぱい、ぁ、は──んんぅっ……<emoji=heart04>」"
translation = "「음음으, 하아, 아, 아아아아~앗…… 나오고 있어…… 잔뜩, 아, 하── 음음으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "魂まで一緒に飛び出ていきそうなほどの射精が止まらない。"
translation = "영혼까지 함께 튀어나갈 것만 같은 사정이 멈추지 않는다."

[[dialogue]]
speaker = "ルルカ"
original = "「ひ、ひぅうっ<emoji=heart04>\u3000んうぁあっ<emoji=heart04>\u3000勢い、すごっ……んんぅっ……すごいよぉおっ……あ、ぁあ、まだ出てっ……ふぅう～っ……<emoji=heart04>」"
translation = "「히, 히으윽<emoji=heart04> 응우아앗<emoji=heart04> 기세, 대단해…… 음음으…… 대단해애…… 아, 아아, 아직 나오고 있어…… 후으으~으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつも動画配信で聴いている大好きな声が、俺の射精を受けて艶っぽくなっている。"
translation = "항상 영상 방송으로 듣던 정말 좋아하는 목소리가, 나의 사정을 받아내며 요염해져 있다."

[[dialogue]]
speaker = "ルルカ"
original = "「はぁっ、ぁ、あぁあ──好き、好きぃっ……お兄ちゃんっ……<emoji=heart04>\u3000んんぅっ……<emoji=heart04>」"
translation = "「하앗, 아, 아아아── 좋아해, 좋아해애…… 오빠……<emoji=heart04> 음음으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろけるような喘ぎ声を耳元で聴きながらの長い長い射精が──ようやく終わった。"
translation = "녹아내릴 듯한 신음 소리를 귓가에서 들으며 이어지던 길고 긴 사정이── 마침내 끝났다."

[[dialogue]]
speaker = "ルルカ"
original = "「んんっ……はぁあっ……はぁあぁあーっ……ふぅううーっ……<emoji=heart04>」"
translation = "「음음…… 하아앗…… 하아아아──앗…… 후으으으──앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「お、男の人って……こ、こんなに……すごいん、だね……？\u3000お兄ちゃんのおち○ぽ、ずぅっとビクビクしてたぁ……<emoji=heart04>」"
translation = "「나, 남자는…… 이, 이렇게나…… 대단하구나……? 오빠의 자지, 계속 움찔움찔거렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「こんなに出たの、初めてだ……」"
translation = "「이렇게 많이 나온 건 처음이야……」"

[[dialogue]]
speaker = "ルルカ"
original = "「そ、それって……？」"
translation = "「그, 그건……?」"

[[dialogue]]
speaker = "クロト"
original = "「俺の恋人が可愛すぎて、止まらなかった」"
translation = "「내 애인이 너무 귀여워서 멈추질 않았어」"

[[dialogue]]
speaker = "ルルカ"
original = "「えへ、へへへぇっ……良かったぁ……お兄ちゃん、あたしとのエッチで、そんなに喜んでくれたんだ……<emoji=heart04>」"
translation = "「에헤, 헤헤헤에…… 다행이다…… 오빠, 나랑 하는 섹스로 그렇게 기뻐해 줬구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精を一区切りに、いったんセックスは終わり……なんだろうけど。"
translation = "사정으로 한 단락 지어지며, 일단 섹스는 끝……이겠지만."

[[dialogue]]
speaker = "unk"
original = "俺もルルカも、ぎゅっと抱き合って余韻に浸っていた。"
translation = "나도 루루카도 꽉 껴안은 채 여운에 젖어 있었다."

[[dialogue]]
speaker = "ルルカ"
original = "「ねぇ、お兄ちゃん……これからも、ずっと一緒にいてね……？」"
translation = "「있지, 오빠…… 앞으로도 계속 같이 있어 줘……?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん。ずっと支えるよ。恋人としても、Ｖチューバーのサポーターとしても」"
translation = "「물론이지. 계속 지탱해 줄게. 연인으로서도, VTuber의 서포터로서도 말이야」"

[[dialogue]]
speaker = "ルルカ"
original = "「うん……<emoji=heart04>\u3000あたしもお兄ちゃんのこと、ず～っと支えるね。約束……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 나도 오빠를 저~엉말 계속 지탱해 줄게. 약속이야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いの気持ちを確かめ合うように、繋いだ手に力を込める。"
translation = "서로의 마음을 확인하듯, 맞잡은 손에 힘을 준다."

[[dialogue]]
speaker = "unk"
original = "汗だくになったまま、手を固く握りあったまま、俺たちはピロートークを続けるのだった──"
translation = "땀범벅이 된 채로, 손을 꽉 쥔 채로, 우리들은 후희를 이어가는 것이었다──"

