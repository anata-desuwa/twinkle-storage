[[dialogue]]
speaker = "unk"
original = "第４話,覇霊玉,B"
translation = "「제4화, 패령옥, B」"

[[dialogue]]
speaker = "unk"
original = "が──"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「邪魔です──下がりなさい、小童ども！」"
translation = "「방해됩니다── 물러나세요, 애송이들!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「な──きゃあっ！？」"
translation = "「뭐── 꺄악!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「くっ──！？」"
translation = "「크읏──!?」"

[[dialogue]]
speaker = "unk"
original = "またしても拡散する『影』の波動が──あらゆる侵攻を弾き飛ばした。"
translation = "「또다시 확산하는 『그림자』의 파동이── 모든 침공을 튕겨냈다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なんです──あの妙な闇は……」"
translation = "「뭡니까── 저 이상한 어둠은……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──以前戦った時より、数段手強い……！」"
translation = "「아아── 이전에 싸웠을 때보다, 몇 단계 더 강해……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おかしい──あたしは、ギエルにあんな力は与えてないぞ……！」"
translation = "「이상해── 나는, 기엘에게 저런 힘은 주지 않았다고……!」"

[[dialogue]]
speaker = "unk"
original = "今までのギエルとは違う。そして仮面に操られていたアポロとも違う。桁違いの『影』の奔流。"
translation = "「지금까지의 기엘과는 다르다. 그리고 가면에게 조종당했던 아폴로와도 다르다. 차원이 다른 『그림자』의 급류.」"

[[dialogue]]
speaker = "unk"
original = "そんな未知のオーラの発露に、アポロでさえ驚いていた。"
translation = "「그런 미지의 오라 발현에, 아폴로조차 놀라고 있었다.」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「くくっ……おおっ……なんでしょうか、この力は」"
translation = "「크크읏…… 오옷…… 무엇일까요, 이 힘은」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「胸の奥底から湧き上がってくるような……万能感を覚えます。おお、なんという祝福であることか！」"
translation = "「가슴 속 깊은 곳에서 솟아오르는 듯한…… 만능감을 느낍니다. 오오, 이 얼마나 축복이란 말입니까!」"

[[dialogue]]
speaker = "unk"
original = "仮面に宿っていた瘴気とギエルの『影』はたちまち融合し、やがて燕尾服の胸元へと吸い込まれていった。"
translation = "「가면에 깃들어 있던 장기와 기엘의 『그림자』는 순식간에 융합하여, 이윽고 연미복의 가슴팍으로 빨려 들어갔다.」"

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "「그리고……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「待って──何か出てきたよ！」"
translation = "「잠깐── 뭔가 나왔어!」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ──！？」"
translation = "「냥읏……!? 냐냐냐……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あのオーブって──」"
translation = "「저 오브는──」"

[[dialogue]]
speaker = "unk"
original = "ギエルの胸から現れた球体──"
translation = "「기엘의 가슴에서 나타난 구체──」"

[[dialogue]]
speaker = "unk"
original = "それは、第零層の最奥に置かれていた緋色のオーブだった。"
translation = "「그것은, 제영층의 가장 깊은 곳에 놓여 있던 비색의 오브였다.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あれはもしかして──覇霊玉……！？」"
translation = "「저건 혹시── 패령옥……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000知ってるのか……母さん？」"
translation = "「! 알고 있는 거야…… 엄마?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「文献にあった特徴と一致しているわ。あなた達こそ……あれを見たことがあるの？」"
translation = "「문헌에 있던 특징과 일치하고 있어. 너희들이야말로…… 저걸 본 적이 있는 거야?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。人間界へ戻ってくる際、フィーニスの塔の内部で──」"
translation = "「네. 인간계로 돌아올 때, 피니스의 탑 내부에서──」"

[[dialogue]]
speaker_original = "敗残の亡霊"
speaker_translation = "패잔의 망령"
original = "『俺ハ……俺ハ決して滅びぬ……！\u3000リクリエの到来と共に……チャカパラ様の誕生を見届けるまで……！』"
translation = "『나느은…… 나느은 결코 멸망하지 않는다……! 리크리에의 도래와 함께…… 차카파라 님의 탄생을 지켜볼 때까지……!』"

[[dialogue]]
speaker_original = "敗残の亡霊"
speaker_translation = "패잔의 망령"
original = "『血は受け継がれるものだ……貴様がそうだったように──』"
translation = "『피는 계승되는 것이다…… 네놈이 그랬듯이──』"

[[dialogue]]
speaker_original = "敗残の亡霊"
speaker_translation = "패잔의 망령"
original = "『故ニ、俺は……何度でも……よみがえ、る……ォォォォーン…………！』"
translation = "『고로, 나는…… 몇 번이고…… 되살아, 난다…… 오오오오온…………!』"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ふふ……あぁ……なるほど。これが……今まで私を<ruby>苛<rt>さいな</rt></ruby>んできた、闇の正体でしたか」"
translation = "「후후…… 아아…… 과연. 이것이…… 지금까지 저를 괴롭혀 왔던, 어둠의 정체였습니까」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「訂正しましょう。どうやら私には……英雄とは非なる血筋が通っていたようです」"
translation = "「정정하겠습니다. 아무래도 저에게는…… 영웅과는 다른 혈통이 흐르고 있었던 것 같습니다」"

[[dialogue]]
speaker = "unk"
original = "あの時の相手は──３０００年前、先代魔王に敗れたという教祖の怨霊だった。"
translation = "「그때의 상대는── 3000년 전, 선대 마왕에게 패배했다는 교주의 원령이었다.」"

[[dialogue]]
speaker = "unk"
original = "それと全く同じ闇の瘴気が、今のギエルには宿っている。"
translation = "「그것과 완전히 똑같은 어둠의 장기가, 지금의 기엘에게는 깃들어 있다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リノさん。覇霊玉とは──？」"
translation = "「리노 씨. 패령옥이란──?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「覇霊玉は──<b>前</b>森羅暦の時代、バジュラ教団という団体が崇めていた呪物よ」"
translation = "「패령옥은── <b>전</b>신라력 시대, 바쥬라 교단이라는 단체가 숭배하던 저주받은 물건이야」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あの亡霊も、そんなのを名乗ってたわね……！」"
translation = "「저 망령도, 그런 걸 자칭했었지……!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「でも……魔女の長い歴史の中でも、その現存は確認されていなかったはず──」"
translation = "「하지만…… 마녀의 긴 역사 속에서도, 그 현존은 확인되지 않았을 터인데──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だとしたら……これまで、ずっと潜んできたのかもしれない」"
translation = "「그렇다면…… 지금까지, 계속 숨어 있었을지도 몰라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あの教祖の亡霊が言っていた──血は受け継がれるものだと。俺たちのように」"
translation = "「저 교주의 망령이 말했었지── 피는 계승되는 것이라고. 우리들처럼」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「！\u3000魔王の血は、３０００年の時を経ても受け継がれてきた──」"
translation = "「! 마왕의 피는, 3000년의 시간을 거쳐도 계승되어 왔다──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「だから同様に──魔王に敗れた者の系譜も、現代に残っていたというわけね……！」"
translation = "「그러니 마찬가지로── 마왕에게 패배한 자의 계보도, 현대에 남아 있었다는 이야기네……!」"

[[dialogue]]
speaker = "unk"
original = "魔王に破れ、散っていった敗残者の血脈。それは当然、魔王のように祭り上げられるものではなかった。"
translation = "「마왕에게 패하고, 흩어져 간 패잔자의 혈맥. 그것은 당연히, 마왕처럼 추앙받는 것은 아니었다.」"

[[dialogue]]
speaker = "unk"
original = "けれど、この数千年、いつか来たる復讐の機に備えて眠り続けてきたのだ。"
translation = "「하지만, 이 수천 년, 언젠가 올 복수의 기회를 대비하여 계속 잠들어 왔던 것이다.」"

[[dialogue]]
speaker = "unk"
original = "そしてその末裔こそが、ギエル──希崎レイトという人間だった。"
translation = "「그리고 그 후예야말로, 기엘── 키자키 레이토라는 인간이었다.」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ああ、おかしい。なんと奇遇にして不遇なことか」"
translation = "「아아, 이상하군요. 이 얼마나 기구하고 불우한 일입니까」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「まさに穢れた血統……生まれながらにして、私は負け犬だったというわけだ……くくくっ……！」"
translation = "「바로 더럽혀진 혈통…… 태어날 때부터, 저는 패배자였다는 이야기군요…… 크크크읏……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「『影』の正体は──あの亡霊と同じものだったのか……！」"
translation = "「『그림자』의 정체는── 저 망령과 같은 것이었나……!」"

[[dialogue]]
speaker = "unk"
original = "ギエルの足元から広がる影が、まるで生き物のように蠢く。"
translation = "「기엘의 발밑에서 퍼지는 그림자가, 마치 생물처럼 꿈틀거린다.」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「いやはや……しかしこれで、私が<b>間違っていなかった</b>ことの証明になりましたかねぇ」"
translation = "「이런이런…… 하지만 이걸로, 제가 <ruby>틀리지 않았다는<rt>・・・ ・・・・</rt></ruby> 증명이 되었을까요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ふざけるな──他人を巻き込んで世界を終わらせることに、どんな正当性もありはしない」"
translation = "「까불지 마── 타인을 끌어들여 세계를 끝내는 것에, 어떤 정당성도 있을 수 없어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それにおまえは……親や血統に従って、これまでのことを仕出かしたわけじゃないだろう！」"
translation = "「게다가 너는…… 부모나 혈통에 따라서, 지금까지의 일을 저지른 건 아닐 거잖아!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「確かにこれまで自覚はなかった──が。こうなってしまっては、私も己の『血統』に準ずるしかありません」"
translation = "「확실히 지금까지 자각은 없었습니다──만. 이렇게 되어 버린 이상, 저도 스스로의 『혈통』에 따를 수밖에 없습니다」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ほら──あなたも、星見の妹も、すぐ血統にすがりたがるでしょう？\u3000それが絶対のアイデンティティであるかのように」"
translation = "「보세요── 당신도, 호시미의 여동생도, 금방 혈통에 매달리려 하잖아요? 그것이 절대적인 정체성인 것처럼」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「私が他人に興味がないのも、すぐ生き物を殺したくなるのも、いやはや仕方のなきことだったのでしょう。すべては『血』の定めなのですからねぇ……！」"
translation = "「제가 타인에게 흥미가 없는 것도, 금방 생물을 죽이고 싶어지는 것도, 이런이런 어쩔 수 없는 일이었겠지요. 모든 것은 『피』의 운명이니까요……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ッ──そんなの、ただの責任転嫁じゃない！」"
translation = "「읏── 그런 건, 단순한 책임 전가잖아!」"

[[dialogue]]
speaker = "unk"
original = "覇霊玉は未だに宙をたゆたっている。"
translation = "「패령옥은 아직도 허공을 떠돌고 있다.」"

[[dialogue]]
speaker = "unk"
original = "あの瘴気もまだ、ギエルを支配するには至っていない──！"
translation = "「저 장기도 아직, 기엘을 지배하기에는 이르지 않았다──!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その力を受け入れちゃダメだ──希崎レイト！\u3000ヒトに戻れなくなるぞ！」"
translation = "「그 힘을 받아들이면 안 돼── 키자키 레이토! 인간으로 돌아갈 수 없게 된다고!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おまえの恨みも、無念も……そいつはただの燃料としてしか見ていない。そんなのに乗っ取られるのがおまえの望みだったのか！？」"
translation = "「너의 원한도, 무념도…… 그 녀석은 단순한 연료로밖에 보지 않아. 그런 것에 잠식당하는 게 너의 바람이었던 거냐!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうよ──！\u3000あの教祖ってやつの亡霊は、ろくなもんじゃなかったんだから！」"
translation = "「맞아──! 저 교주라는 녀석의 망령은, 변변찮은 게 아니었으니까!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「ああ……うるさいうるさい。誉れある英雄の血でないなら拒めと？\u3000いつまでも勝手なことを仰るものだ」"
translation = "「아아…… 시끄럽고 시끄럽습니다. 명예로운 영웅의 피가 아니라면 거부하라고요? 언제까지나 제멋대로인 말씀을 하시는군요」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「言ったでしょう。深海の魚は、光に憧れなどしないのですよ。私にとっては……この暗澹たる闇こそが心地よい！」"
translation = "「말씀드렸잖습니까. 심해의 물고기는, 빛을 동경하지 않는다고요. 저에게는…… 이 암담한 어둠이야말로 편안합니다!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「まずいわ──どんどん破片が取り込まれていく！」"
translation = "「큰일이야── 점점 파편이 흡수되고 있어!」"

[[dialogue]]
speaker = "unk"
original = "忌まわしき血統を、ギエルは拒むどころか歓迎していた。"
translation = "「꺼림칙한 혈통을, 기엘은 거부하기는커녕 환영하고 있었다.」"

[[dialogue]]
speaker = "unk"
original = "覇霊玉を<ruby>核<rt>コア</rt></ruby>として、断片に分かれていた仮面のカケラがギエル本人と同化していく──！"
translation = "「패령옥을 핵으로, 조각으로 나뉘어 있던 가면의 파편이 기엘 본인과 동화되어 간다──!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「おお……私の血が叫んでいる！\u3000魔王を滅せ、ラクシスを討てと……！」"
translation = "「오오…… 저의 피가 외치고 있습니다! 마왕을 멸하라, 라크시스를 토벌하라고……!」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「アポロ様──今や魔王と化してしまったあなたもだ！」"
translation = "「아폴로 님── 이제 마왕이 되어 버린 당신도입니다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──ッ……！」"
translation = "「──읏……!」"

[[dialogue]]
speaker = "unk"
original = "仮面の瘴気──敗残者の影──あらゆる闇をまとったギエルは、ついにアポロを明確な<ruby>魔王<rt>てき</rt></ruby>と捉えた。"
translation = "「가면의 장기── 패잔자의 그림자── 모든 어둠을 두른 기엘은, 마침내 아폴로를 명확한 적으로 인식했다.」"

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "「그리고──」"

[[dialogue]]
speaker_original = "ギエル"
speaker_translation = "기엘"
original = "「さあ──終曲の調べを奏でるとしましょうか！」"
translation = "「자── 종곡의 선율을 연주해 볼까요!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「くふふふ……おや……？\u3000どうされました、星騎士の諸君──？」"
translation = "「크흐흐흐…… 어라……? 무슨 일이십니까, 성기사 제군──?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャッ……！？\u3000ニャニャニャ……！？」"
translation = "「냥읏……!? 냐냐냐……!?」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「こ……これは……！？」"
translation = "「이…… 이것은……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「仮面──どころじゃないな……」"
translation = "「가면── 정도가 아니군……」"

[[dialogue]]
speaker = "unk"
original = "ギエルは──自らの影に包まれて、人ならざるものへの変貌を遂げていた。"
translation = "「기엘은── 스스로의 그림자에 휩싸여, 인간이 아닌 존재로 변모를 이루고 있었다.」"

[[dialogue]]
speaker = "unk"
original = "アポロを越える仮面との超適合によって、創り変えられたおぞましき『使徒』の姿に。"
translation = "「아폴로를 뛰어넘는 가면과의 초적합에 의해, 새롭게 창조된 끔찍한 『사도』의 모습으로.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ぐっ……！\u3000ギ、ギエル──戻ってくれ！\u3000呑まれちゃダメだ──！」"
translation = "「크윽……! 기, 기엘── 돌아와 줘! 집어삼켜지면 안 돼──!」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「邪魔です──失せなさい」"
translation = "「방해됩니다── 사라지세요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──っっ！！」"
translation = "「──읏!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「ダメ、姉さん──近づいたら！」"
translation = "「안 돼요, 언니── 가까이 가면!」"

[[dialogue]]
speaker = "unk"
original = "必死に手を伸ばそうとするアポロも、尋常ならざる影の波動によって撃退される。"
translation = "「필사적으로 손을 뻗으려는 아폴로도, 심상치 않은 그림자의 파동에 의해 격퇴당한다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アポロ……力を貸してくれ」"
translation = "「아폴로…… 힘을 빌려줘」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちで戦線を組んで──ギエルを食い止めるぞ！」"
translation = "「우리들이 전선을 짜서── 기엘을 막아내자!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「魔王……ああ。わかった」"
translation = "「마왕…… 아아. 알았어」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「アイツの目を覚まさせてやれるのは……あたししかいない！」"
translation = "「저 녀석의 눈을 뜨게 해 줄 수 있는 건…… 나밖에 없어!」"

[[dialogue]]
speaker = "unk"
original = "アポロは覚悟を決め、大剣を担ぎ上げた。"
translation = "「아폴로는 각오를 다지고, 대검을 짊어졌다.」"

[[dialogue]]
speaker = "unk"
original = "かつては寄り添っていた主と従者が、ここに向かい合う。"
translation = "「예전에는 함께했던 주인과 종자가, 이곳에서 마주 선다.」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「ククク……これが……私の新たなる力……」"
translation = "「크크크…… 이것이…… 저의 새로운 힘……」"

[[dialogue]]
speaker_original = "魔神ギエル"
speaker_translation = "마신 기엘"
original = "「オオオオッ…………覇アアアアァァァァァッッ────！！」"
translation = "「오오오오옷………… 패아아아아아아아아앗────!!」"

