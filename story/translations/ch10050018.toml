[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「寒い寒い寒い！\u3000冷気を出すモンスターとか反則ですよ！？\u3000早くお風呂に……！」"
translation = "「추워 추워 추워! 냉기를 내뿜는 몬스터라니 반칙이라고요!? 빨리 목욕탕에……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お先にどうぞ……って、何言ってるんですか、あなたも寒そうにしてるんだから一緒に入りましょう！」"
translation = "「먼저 들어가세요…… 가 아니라, 무슨 소리를 하는 건가요, 당신도 추워 보이니까 같이 들어가요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「というかそんなこと言ってる時間が惜しいです！\u3000いいから入る！」"
translation = "「그보다 그런 말 하고 있을 시간이 아까워요! 됐으니까 들어와!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ……温かい……生き返る……」"
translation = "「하아…… 따뜻해…… 살 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "一糸まとわぬ姿で湯船に浸かると、お湯の熱さが冷えた体に染み渡り、まさに極楽の心地だ。"
translation = "실오라기 하나 걸치지 않은 모습으로 욕조에 몸을 담그자, 뜨거운 물의 열기가 식은 몸에 스며들어 그야말로 극락의 기분이다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "けれど全身が温まってくると、凍っていた思考が解けてくる。"
translation = "하지만 전신이 따뜻해지자, 얼어붙었던 사고가 풀리기 시작한다."

[[dialogue]]
speaker = "unk"
original = "すると目の前にあるのは……"
translation = "그러자 눈앞에 있는 것은……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えと、その……裸、ですね……お風呂だから当然ですけど」"
translation = "「에토, 그…… 알몸, 이네요…… 목욕탕이니까 당연하지만요.」"

[[dialogue]]
speaker = "unk"
original = "しかし俺に見られるとわかっているのに、ソフィは大事なところを隠そうとはしなかった。"
translation = "하지만 나에게 보인다는 걸 알고 있을 텐데도, 소피는 중요한 곳을 숨기려 하지 않았다."

[[dialogue]]
speaker = "unk"
original = "まるで芸術品のような白い肌。控えめな膨らみにピンク色の乳首。お尻に向かって緩やかにカーブを描く腰つき。"
translation = "마치 예술품 같은 하얀 피부. 아담한 부풀어 오름에 핑크색 유두. 엉덩이를 향해 완만하게 곡선을 그리는 허리 라인."

[[dialogue]]
speaker = "unk"
original = "そして縦に走るスリットまでもが大胆に晒され、初めて見るソフィの裸体に目を奪われる。"
translation = "그리고 세로로 달리는 슬릿까지도 대담하게 노출되어, 처음 보는 소피의 나체에 눈을 빼앗긴다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんのが……男の人のってこうなってるんですね……」"
translation = "「회장님 거…… 남자의 거란 건 이렇게 되어 있군요……」"

[[dialogue]]
speaker = "unk"
original = "一度意識すると抑えようもなく、本能がむくむくと膨らむ。"
translation = "한번 의식하자 억누를 길 없이, 본능이 뭉클뭉클 부풀어 오른다."

[[dialogue]]
speaker = "unk"
original = "だけどソフィは、緊張と興奮が入り混じったような、何とも言い難い表情で俺の股間を見つめていた。"
translation = "하지만 소피는 긴장과 흥분이 뒤섞인 듯한, 뭐라 말하기 힘든 표정으로 내 가랑이 사이를 응시하고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「興奮すると大きくなるって聞きましたけど、今がそうなんですか……？\u3000あっ、言わなくていいです……」"
translation = "「흥분하면 커진다고 들었습니다만, 지금이 그런 건가요……? 앗, 말 안 하셔도 돼요……」"

[[dialogue]]
speaker = "unk"
original = "早く上がった方がいいかもしれない。せめて目は逸らした方がいいかもしれない。"
translation = "빨리 나가는 편이 좋을지도 모른다. 적어도 시선은 돌리는 편이 좋을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "けれど思考はまともに働かなくて、ソフィの裸体に見とれていた。"
translation = "하지만 사고는 제대로 작동하지 않아서, 소피의 나체에 넋을 잃고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ご、ごめんなさい……」"
translation = "「죄, 죄송해요……」"

[[dialogue]]
speaker = "unk"
original = "ソフィが身を離そうとすると、不意にお互いの股間が当たって──"
translation = "소피가 몸을 떼려 하자, 문득 서로의 가랑이가 맞닿아서──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ひゃっ……！？」"
translation = "「히얏……!?」"

[[dialogue]]
speaker = "unk"
original = "性器と性器が触れ合い、肉の柔らかさと、痺れるような快感が脳天へと走り抜け、無意識に体が跳ねた。"
translation = "성기와 성기가 맞닿아, 살의 부드러움과 저릿한 쾌감이 정수리까지 달려 나가 무의식적으로 몸이 튀어 올랐다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「今の、なに……？」"
translation = "「방금 거, 뭐야……?」"

[[dialogue]]
speaker = "unk"
original = "未知の刺激に驚きの声を漏らすソフィ。"
translation = "미지의 자극에 놀라운 목소리를 흘리는 소피."

[[dialogue]]
speaker = "unk"
original = "戸惑いながらも、さっきの感触を確かめるようにおずおずと股間を近づけていって……"
translation = "당황하면서도, 방금 전의 감촉을 확인하려는 듯 머뭇머뭇 가랑이를 가까이 가져가더니……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふああっ……<emoji=heart04>」"
translation = "「후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、確かな快感の声がこぼれる。"
translation = "그 순간, 확실한 쾌락의 목소리가 새어 나온다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もうちょっと……」"
translation = "「조금만 더……」"

[[dialogue]]
speaker = "unk"
original = "今のソフィは初めて性の芽生えを経験した子どものようで、熱に浮かされたように、また自分の股間をペニスに押し付けていく。"
translation = "지금의 소피는 처음으로 성의 눈뜸을 경험한 아이 같아서, 열에 들뜬 듯 다시 자신의 가랑이를 페니스에 밀어붙여 간다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んんんっ……<emoji=heart04>」"
translation = "「응응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "より確かに感じる肉の弾力。"
translation = "더욱 확실하게 느껴지는 살의 탄력."

[[dialogue]]
speaker = "unk"
original = "温かくてぷにぷにした感触がいきり立ったペニスに密着し、さらなる快感を求めて腰が勝手に動き出す。"
translation = "따뜻하고 말랑말랑한 감촉이 발기한 페니스에 밀착되고, 더 큰 쾌감을 찾아 허리가 제멋대로 움직이기 시작한다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふ……あっ……はぁ……はんっ……<emoji=heart04>\u3000会長さんの、熱い……はぁはぁ……はっ、はぁ、んん～……<emoji=heart04>」"
translation = "「하…… 앗…… 하아…… 항…… <emoji=heart04> 회장님의, 뜨거워…… 하아 하아…… 하, 하아, 응응~…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さんの、おち○ちんが、擦れて……はぁ、はっ、ん……変になりそう……ん、はぁん……<emoji=heart04>」"
translation = "「회장님의, 자지가, 비벼져서…… 하아, 하, 응…… 이상해질 것 같아…… 응, 하앙…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お湯の中で性器が摩擦する度、いつもは冷静なソフィの口からくぐもった吐息がこぼれる。"
translation = "따뜻한 물 속에서 성기가 마찰할 때마다, 평소에는 냉정한 소피의 입에서 억눌린 숨결이 새어 나온다."

[[dialogue]]
speaker = "unk"
original = "理性もお湯の熱さに溶けてしまって、水の抵抗を感じながらお互いに腰を使う。"
translation = "이성도 물의 열기에 녹아버려, 물의 저항을 느끼면서 서로 허리를 놀린다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んん……ふ……あっ……はあぁ……あっ、はぁ……会長さんのおち○ちん、硬くて大きいです……」"
translation = "「응응…… 후…… 앗…… 하아아…… 앗, 하아…… 회장님의 자지, 딱딱하고 커요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「これ、止まらない……ふっ……あ、はっ……頭、ふわふわする……<emoji=heart04>」"
translation = "「이거, 멈추지 않아…… 훗…… 아, 하앗…… 머릿속이, 폭신폭신해…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなつもりじゃなかったのに、淫らなことだとわかっているはずなのに……体が勝手に動く。"
translation = "그럴 생각은 아니었는데, 음란한 일이라는 걸 알고 있을 텐데도…… 몸이 제멋대로 움직인다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ダメ、なのに……ふあっ、あ……んん～……おまた、ジンジンして……あ、ぬるぬるしてきた……」"
translation = "「안 돼, 는데…… 후앗, 아…… 응응~…… 가랑이가, 징징거려서…… 아, 미끈미끈해졌어……」"

[[dialogue]]
speaker = "unk"
original = "蜜は風呂の湯に混ざって流れてしまうが、ソフィと密着している部分だけ愛液で濡れてさらなる快感を生む。"
translation = "애액은 욕조 물에 섞여 흘러가 버리지만, 소피와 밀착된 부분만은 애액으로 젖어 한층 더한 쾌감을 낳는다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「は……ふぁっ、あんっ……おち○ちん、ぬるぬるするの、いい……はぁはっ、あ、ん……もっとぉ……<emoji=heart04>」"
translation = "「하…… 후아, 앙…… 자지, 미끈거리는 거, 좋아…… 하아 하앗, 아, 응…… 더어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁ、はっ、んん……気持ち、いい……ふっ、あ……おち○ちん、気持ち、いいよぉ……<emoji=heart04>」"
translation = "「하아, 하, 응…… 기분, 좋아…… 훗, 아…… 자지, 기분, 좋아아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "湯の温度は変わっていないはずなのに、まるで鍋釜で茹でられているみたいにどんどん体が熱くなってくる。"
translation = "물의 온도는 변하지 않았을 텐데, 마치 가마솥에 삶아지는 것처럼 점점 몸이 뜨거워진다."

[[dialogue]]
speaker = "unk"
original = "性器を擦り合わせるごとに、もっとソフィを感じたくなって、押し付ける力が少しずつ強くなる。"
translation = "성기를 비빌 때마다, 더 소피를 느끼고 싶어져서 밀어붙이는 힘이 조금씩 강해진다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふあぁ……おま○こ、熱いぃ……おち○ちん、おまたでゴシゴシするの好きぃ……ふっ……んっ、はぁ、はぁ……<emoji=heart04>」"
translation = "「후아아…… 보지, 뜨거워어…… 자지, 가랑이로 비비는 거 좋아아…… 훗…… 응, 하아, 하아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おち○ちん……おち○ちん……もっとぉ……ふ……あっ、は、はんっ……おま○こ、いい……<emoji=heart04>」"
translation = "「자지…… 자지…… 더어…… 후…… 앗, 하, 하앙…… 보지, 좋아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "白い肌を火照らせ、小さな体を揺らして、性器を擦り付けるのに夢中になるソフィ。"
translation = "하얀 피부를 붉게 물들이고, 가냘픈 몸을 흔들며 성기를 비벼대는 데 열중하는 소피."

[[dialogue]]
speaker = "unk"
original = "もう羞恥心も溶けてしまったのか、うわごとのように卑猥な言葉を何度も口にしていた。"
translation = "이미 수치심도 녹아버린 것인지, 잠꼬대처럼 비속한 말을 몇 번이고 입에 담고 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おち○ちん、もっと欲しい……です……はぁ、はぁ、あんっ……ふ、んん～っ<emoji=heart04>」"
translation = "「자지, 더 갖고 싶어…… 요…… 하아, 하아, 아앙…… 후, 응응~ <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はっ、はっ……ふぁ、んん……もっと、もっとぉ……もっといっぱい、おち○ちん、してくださいっ……」"
translation = "「하앗, 하앗…… 후아, 응응…… 더, 더어…… 더 많이, 자지, 해주세요……」"

[[dialogue]]
speaker = "unk"
original = "ソフィは腰を大きく引くと、スリットをためらいなくペニスの先端へと押し付けて──"
translation = "소피는 허리를 크게 뒤로 뺐다가, 갈라진 틈을 망설임 없이 페니스 끝에 밀어붙이고──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふあぁあ～～～～っ！\u3000会長さんのおち○ちん、入ってきた、ぁっ……<emoji=heart04>」"
translation = "「후아아아~~~~앗! 회장님 자지, 들어왔, 어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスを呑み込み、華奢な体を震わせながら声を上げた。"
translation = "팽창한 페니스를 집어삼키며, 가냘픈 몸을 떨면서 소리를 질렀다."

[[dialogue]]
speaker = "unk"
original = "ソフィの中は風呂の湯よりずっと熱く、寒がりの彼女とは思えない体温で、火傷してしまうかと思うほど。"
translation = "소피의 안은 욕조 물보다 훨씬 뜨거웠고, 추위를 타는 그녀라고는 믿기지 않는 체온이라 화상을 입을 것만 같았다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おち○ちんで、私の中、広がってますぅ……んんんっ、はぁっ、はっ……」"
translation = "「자지로, 제 안이, 넓어지고 있어요…… 응응응, 하앗, 하……」"

[[dialogue]]
speaker = "unk"
original = "体の小さなソフィらしく、中は狭く、愛液で濡れた粘膜が痛いぐらいにぎゅっと締め付けてくる。"
translation = "몸집이 작은 소피답게 안은 좁았고, 애액으로 젖은 점막이 아플 정도로 꽉 조여온다."

[[dialogue]]
speaker = "unk"
original = "けれどソフィはその小さな体で、そのまま腰を動かし始めた。"
translation = "하지만 소피는 그 작은 몸으로 그대로 허리를 움직이기 시작했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふぅ……あっ……はっ、はんっ……おち○ちん、大きくて、硬い……はあぁっ、ふぁっ……あっ、んん～～っ<emoji=heart04>」"
translation = "「후우…… 앗…… 하, 하앙…… 자지, 크고, 딱딱해…… 하아앗, 후아…… 앗, 응응~~ <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「中で擦れてっ……あっ、あんっ……！\u3000ふっ、はあぁっ、はっ……熱いおち○ちんで、お腹の中、ごしごしされてるっ……<emoji=heart04>」"
translation = "「안에서 비벼져서…… 앗, 아앙……! 훗, 하아앗, 하…… 뜨거운 자지로, 배 속이, 벅벅 긁히고 있어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段は表情の控えめなソフィが、うっとりと恍惚とした顔で喘ぐ。"
translation = "평소에는 표정이 절제된 소피가, 넋을 잃은 황홀한 얼굴로 신음한다."

[[dialogue]]
speaker = "unk"
original = "破瓜の痛みも快感に押し流されたようで、自分から腰を揺らして何度も性器を擦り合わせていた。"
translation = "처녀막의 통증도 쾌감에 씻겨 내려간 듯, 스스로 허리를 흔들며 몇 번이고 성기를 마찰시켰다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「これ、気持ちいい、ですっ……ふわあっ、あぁっ……おち○ちん、ズボズボって……はぁっ、あぁんっ……<emoji=heart04>」"
translation = "「이거, 기분 좋아, 요…… 후아앗, 아아앗…… 자지가, 푹푹 하고…… 하앗, 아아앙…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２人で腰を前後に動かし、ペニスがソフィの中を出たり入ったりを繰り返す。"
translation = "둘이서 허리를 앞뒤로 움직이며, 페니스가 소피의 안을 들락날락하기를 반복한다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はっ……あっ……あんっ<emoji=heart04>\u3000会長さんっ……会長さんっ<emoji=heart04>」"
translation = "「하앗…… 앗…… 아앙 <emoji=heart04> 회장님…… 회장님 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "よりつながりを求めて、唇を重ね合わせる。"
translation = "더욱 깊은 연결을 원하며 입술을 포갠다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んんっ……んちゅっ……んぅ<emoji=heart04>\u3000はぁ……んっ……<emoji=heart04>」"
translation = "「응응…… 응츄…… 응으 <emoji=heart04> 하아…… 응…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふわぁっ、はぁんっ……んんっ……会長さんのおち○ちんで、中から広げられてますぅ……んん～っ<emoji=heart04>」"
translation = "「후아앗, 하앙…… 응응…… 회장님 자지로, 안에서부터 넓혀지고 있어요…… 응응~ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィの中はたっぷりの愛液で満ちていて、ペニスを突き入れる度にとろとろの蜜が絡みつく。"
translation = "소피의 안은 듬뿍 고인 애액으로 가득 차 있어, 페니스를 찔러넣을 때마다 걸쭉한 꿀이 얽혀든다."

[[dialogue]]
speaker = "unk"
original = "膣内の肉のひだでペニスの表面を撫でられ、ぞわぞわと悪寒めいた快感が駆け抜けた。"
translation = "질 내부의 살주름이 페니스 표면을 훑자, 오한 같은 소름 돋는 쾌감이 스쳐 지나갔다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ひぁああっ、はっ、んんっ……こんなの、知らない……これ、好き……ふあっ、あぁ～っ……<emoji=heart04>」"
translation = "「히아아앗, 하, 응응…… 이런 거, 몰라…… 이거, 좋아…… 후앗, 아아~앗…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おち○ちん熱くてっ、お腹の中、あったかいですっ……ふああっ、あっ、ああんっ……ああぁ～っ<emoji=heart04>」"
translation = "「자지 뜨거워서, 배 속이, 따뜻해요…… 후아앗, 앗, 아아앙…… 아아아~앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつもの真面目さはとろけてしまって、互いの性器でただつながることに集中する。"
translation = "평소의 성실함은 녹아버리고, 서로의 성기로 그저 이어지는 것에만 집중한다."

[[dialogue]]
speaker = "unk"
original = "そのだらしない顔はまるで酔っているようで、初めてなのにすっかり快楽の虜になっていた。"
translation = "그 흐트러진 얼굴은 마치 취한 것 같았고, 처음인데도 완전히 쾌락의 포로가 되어 있었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ひぁあ～～っ<emoji=heart04>\u3000おち○ちんで、おま○こされるの気持ちいいっ……<emoji=heart04>\u3000はぁああっ、はっ、はっ……んん～っ<emoji=heart04>」"
translation = "「히아아~~앗 <emoji=heart04> 자지로, 보지 하는 거 기분 좋아…… <emoji=heart04> 하아아앗, 하, 하…… 응응~ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひたすら腰を押して、引いて、快楽を堪能する。"
translation = "그저 허리를 밀고 당기며 쾌락을 만끽한다."

[[dialogue]]
speaker = "unk"
original = "理性をとろとろに溶かされながら、俺もソフィも夢中になって腰を振っていた。"
translation = "이성을 걸쭉하게 녹여가며, 나도 소피도 정신없이 허리를 흔들었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あっ、んんんっ……<emoji=heart04>\u3000お腹の中、おち○ちんでゴリゴリされてぇっ……んはっ、はっ、ああんっ……<emoji=heart04>」"
translation = "「앗, 응응응…… <emoji=heart04> 배 속이, 자지로 고리고리 비벼져서어…… 응하앗, 하, 아아앙…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はあぁ、はぁ……んっ、んぅっ……はあぁっ、はっ、はんっ……おち○ちん太いぃ……んんはっ、んんっ……<emoji=heart04>」"
translation = "「하아아, 하아…… 응, 응으…… 하아아앗, 하, 하앙…… 자지 굵어어…… 응응하앗, 응응…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段の寒がりな彼女と対照的に、火傷しそうに熱いソフィの中。"
translation = "평소 추위를 타는 그녀와 대조적으로, 화상 입을 듯 뜨거운 소피의 안."

[[dialogue]]
speaker = "unk"
original = "熱々のお湯に浸かるみたいに、パンパンに膨張した敏感なペニスでソフィを感じながら、ピストンを続ける。"
translation = "뜨끈뜨끈한 물에 몸을 담그는 것처럼, 팽팽하게 부풀어 오른 민감한 페니스로 소피를 느끼며 피스톤질을 계속한다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「もっと……ゴリゴリしてぇ……はぁっ、ふぁっ、んんっ……ひぁああ～っ<emoji=heart04>」"
translation = "「더…… 비벼줘어…… 하앗, 후아, 응응…… 히아아아~앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おま○こ、もっと擦ってください……あっ、はっ、はっ……おち○ちん、もっと、もっとぉ……<emoji=heart04>」"
translation = "「보지, 더 문질러 주세요…… 앗, 하, 하…… 자지, 더, 더어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んんん～～っ<emoji=heart04>\u3000はぁっ、はっ、深いぃっ……<emoji=heart04>\u3000ふあっ、はっ、はっ……おち○ちん、激し、いっ……<emoji=heart04>」"
translation = "「응응응~~앗 <emoji=heart04> 하앗, 하, 깊어어…… <emoji=heart04> 후앗, 하, 하…… 자지, 격렬, 해…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はあぁっ、はっ、はんっ……<emoji=heart04>\u3000おち○ちん、いっぱい、ズンズン来てますぅっ……<emoji=heart04>\u3000ふわぁっ、はっ、ああぁ～っ<emoji=heart04>」"
translation = "「하아아앗, 하, 하앙…… <emoji=heart04> 자지, 잔뜩, 쿵쾅쿵쾅 오고 있어요…… <emoji=heart04> 후아앗, 하, 아아아~앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もうソフィを感じることしか考えられない。"
translation = "이제 소피를 느끼는 것밖에 생각할 수 없다."

[[dialogue]]
speaker = "unk"
original = "お風呂の中でめいっぱい体を揺らし、大きく速く動こうとするソフィ。"
translation = "욕조 안에서 한껏 몸을 흔들며, 크고 빠르게 움직이려는 소피."

[[dialogue]]
speaker = "unk"
original = "俺も奥めがけて叩きつけるように、しゃにむにペニスを突き入れる。"
translation = "나도 안쪽 깊숙한 곳을 향해 때려박듯이, 막무가내로 페니스를 찔러넣는다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んはっ……あっ、あっ、ああんっ<emoji=heart04>\u3000はぁっ、はっ、あぁっ……おま○こ、溶けちゃいそうですっ……気持ちいいっ、んんっ……<emoji=heart04>」"
translation = "「응하앗…… 앗, 앗, 아아앙 <emoji=heart04> 하앗, 하, 아앗…… 보지, 녹아버릴 것 같아요…… 기분 좋아, 응응…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ひぁああっ、ああぁ～っ<emoji=heart04>\u3000会長さんのおち○ちん、奥当たって……んんーーっ<emoji=heart04>\u3000コツコツ当たってますぅっ……<emoji=heart04>」"
translation = "「히아아앗, 아아아~앗 <emoji=heart04> 회장님 자지, 안쪽 닿아서…… 응응──앗 <emoji=heart04> 툭툭 닿고 있어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おち○ちんで、お腹いっぱいになってますっ……はぁはっ、はんっ、んんっ……<emoji=heart04>\u3000あっ、はっ、はっ、ああぁ～っ<emoji=heart04>」"
translation = "「자지로, 배가 가득 차고 있어요…… 하아하앗, 하앙, 응응…… <emoji=heart04> 앗, 하, 하, 아아아~앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "爆発しそうに膨らんだ亀頭が一番奥に届く度、ソフィの体が震える。"
translation = "폭발할 듯 부푼 귀두가 가장 깊은 곳에 닿을 때마다, 소피의 몸이 떨린다."

[[dialogue]]
speaker = "unk"
original = "ソフィの小さな体を俺のペニスで満たすのが心地いい。"
translation = "소피의 작은 몸을 내 페니스로 채우는 것이 기분 좋다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふわぁっ、あっ、はんっ……<emoji=heart04>\u3000おま○こ熱いぃっ……お腹、熱くて、奥キュンキュンしますっ……<emoji=heart04>」"
translation = "「후아앗, 앗, 하앙…… <emoji=heart04> 보지 뜨거워어…… 배, 뜨겁고, 안쪽이 큥큥거려요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣が痙攣し、ペニスをきゅうきゅうと締め付けてくるのがたまらない。"
translation = "질이 경련하며 페니스를 꽉꽉 조여오는 것이 견딜 수 없다."

[[dialogue]]
speaker = "unk"
original = "さらにもう一度唇を重ね、舌を絡めてソフィを味わう。"
translation = "다시 한번 입술을 겹치고, 혀를 섞으며 소피를 맛본다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んちゅっ……ちゅるっ、ちゅるるるっ<emoji=heart04>\u3000ふぁ、あんっ……れろ、れろ、ちゅぱっ……じゅるるっ──んん～っ<emoji=heart04>」"
translation = "「응츄…… 츄릅, 츄르르릇 <emoji=heart04> 후아, 하앙…… 레로, 레로, 츄파…… 쥬르르──응응~ <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ぷはぁ……気持ち良くて、溶けちゃうっ……はっ、はあぁ、はぁ……気持ち良すぎて、おかしくなっちゃいますぅっ……<emoji=heart04>」"
translation = "「푸하아…… 기분 좋아서, 녹아버려…… 하, 하아아, 하아…… 너무 기분 좋아서, 이상해져 버려요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んんっ……！？\u3000おち○ちんビクビクしてっ……はっ、あっ……私の中で、おち○ちん暴れてっ……はっ、はぁんっ……<emoji=heart04>」"
translation = "「응응……!? 자지 파르르 떨려서…… 하, 앗…… 제 안에서, 자지가 날뛰어서…… 하, 하앙…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界を知らせるように、ソフィの中でペニスが脈打つ。"
translation = "한계를 알리듯, 소피의 안에서 페니스가 맥동한다."

[[dialogue]]
speaker = "unk"
original = "腰の奥で圧力が高まって爆発する寸前で、ペニスを締め付ける膣もひくひくと震えて前兆を伝えてきた。"
translation = "허리 깊숙한 곳에서 압력이 높아져 폭발하기 직전, 페니스를 조이는 질도 파르르 떨리며 전조를 전해왔다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふぁっ、はっ、はっ、ああっ……<emoji=heart04>\u3000すごいっ……はっ、はぁ……おち○ちんすごいですぅっ……<emoji=heart04>」"
translation = "「후앗, 하, 하, 아앗…… <emoji=heart04> 대단해…… 하, 하아…… 자지 대단해요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁはぁ、はっ、あんっ……あっ、あっ、あっ、あぁ～っ<emoji=heart04>\u3000熱いおち○ちん好き、大好きぃっ……<emoji=heart04>」"
translation = "「하아하아, 하, 하앙…… 앗, 앗, 앗, 아아~앗 <emoji=heart04> 뜨거운 자지 좋아, 정말 좋아아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はっ、はっ、は、はんっ……<emoji=heart04>\u3000も、もうダメ……な、何か来ちゃうっ……ふぁっ、ああっ……頭、真っ白に……」"
translation = "「하, 하, 하, 하앙…… <emoji=heart04> 이, 이제 안 돼…… 무, 뭔가 와버려…… 후앗, 아앗…… 머릿속이 하얘져서……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「来るっ、来ちゃうぅっ……<emoji=heart04>\u3000あっ、あっ、あっ、あ、あんっ……<emoji=heart04>\u3000はぁはっ、は、あぁ──」"
translation = "「와, 와버려어…… <emoji=heart04> 앗, 앗, 앗, 아, 아앙…… <emoji=heart04> 하아하앗, 하, 아아──」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「んんぁああ～～～～～～～～～～っ！！」"
translation = "「응응아아아아~~~~~~~~앗!!」"

[[dialogue]]
speaker = "unk"
original = "ソフィアの奥で情欲が爆ぜ、さらにその奥へと熱が迸っていく。"
translation = "소피아의 안쪽에서 정욕이 터지고, 다시 그 너머로 열기가 뿜어져 나간다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ふあぁあっ、はぁっ、あ──熱いっ、熱いですぅっ……<emoji=heart04>\u3000熱いの、びゅーって、奥に……んんんっ<emoji=heart04>」"
translation = "「후아아앗, 하앗, 아── 뜨거워, 뜨거워요…… <emoji=heart04> 뜨거운 게, 뷰우 하고, 안쪽에…… 응응응 <emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おち○ちん、お腹の中でドクドクして……はあぁんっ……<emoji=heart04>\u3000はぁ、はぁ、……はぁ～っ<emoji=heart04>」"
translation = "「자지, 배 속에서 울컥울컥거려서…… 하아아앙…… <emoji=heart04> 하아, 하아, …… 하아~앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂と同時に膣壁が収縮し、ペニスにぴったりとまとわりつく。"
translation = "절정과 동시에 질벽이 수축하며 페니스에 딱 달라붙는다."

[[dialogue]]
speaker = "unk"
original = "隙間なく密着する粘膜に絞られながら、ソフィの中に精を注ぎ続けた。"
translation = "틈 없이 밀착된 점막에 쥐어짜이며, 소피의 안에 정을 계속 쏟아부었다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はあぁ、はっ……熱いのいっぱい出てっ……はあぁ、あっ……んんん～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아, 하앗…… 뜨거운 거 잔뜩 나와서…… 하아아, 앗…… 응응응~~~~앗 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はあぁ、はぁ、はぁ……は、あぁ……会長さんので、お腹いっぱい、です……」"
translation = "「하아아, 하아, 하아…… 하, 아아…… 회장님 걸로, 배가 가득해요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まだ、熱い……はあぁ、はっ、はぁ……はぁ～……」"
translation = "「아직, 뜨거워…… 하아아, 하, 하아…… 하아~……」"

[[dialogue]]
speaker = "unk"
original = "目はとろんとさせてお湯に揺蕩い、まだ夢見心地のようだ。"
translation = "눈은 풀린 채 따뜻한 물속에 몸을 맡기고, 아직 꿈결인 듯하다."

[[dialogue]]
speaker = "unk"
original = "いや、俺もまだふわふわしていて、夢見心地なのは俺も変わらない。"
translation = "아니, 나도 아직 둥실둥실 떠 있는 기분이라, 꿈결인 건 나도 마찬가지다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はぁはぁ……暑い……さすがに温まり過ぎたかも、です……」"
translation = "「하아하아…… 더워요…… 역시 몸이 너무 따뜻해진 것 같아, 요……」"

[[dialogue]]
speaker = "unk"
original = "ペニスを抜くこともできないまま湯船に浸かり、思考と疲労が回復するのを待つ。"
translation = "페니스를 뽑지도 못한 채 욕조에 몸을 담그고, 사고와 피로가 회복되기를 기다린다."

[[dialogue]]
speaker = "unk"
original = "つながったところからソフィの温もりを感じ、快感とは違う、不思議な充足感が胸に満ちていく。"
translation = "이어진 곳에서 소피의 온기를 느끼며, 쾌감과는 다른 신기한 충족감이 가슴에 차오른다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「好きです、会長さん……」"
translation = "「좋아해요, 회장님……」"

[[dialogue]]
speaker = "unk"
original = "薄い胸を上下させながら、ソフィがぽつりと呟く。"
translation = "가냘픈 가슴을 들썩이며 소피가 툭 중얼거린다."

[[dialogue]]
speaker = "unk"
original = "落ち着いたらソフィの顔をまともに見れないかもしれないけど……これはこれで良かったと密かに思うのだった。"
translation = "진정되면 소피의 얼굴을 똑바로 보지 못할지도 모르겠지만…… 이건 이것대로 좋았다고 남몰래 생각하는 것이었다."

[[dialogue]]
speaker = "unk"
original = "テンプレートシナリオ"
translation = "템플릿 시나리오"

