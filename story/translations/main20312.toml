[[dialogue]]
speaker = "unk"
original = "第１３話,頂上で待つもの,B"
translation = "제13화, 정상에서 기다리는 것, B"

[[dialogue]]
speaker = "unk"
original = "ガーディアンを倒しながら最短距離を進み、ようやく頂上に辿り着いた。"
translation = "가디언을 쓰러뜨리며 최단 거리로 나아가, 겨우 정상에 도착했다."

[[dialogue]]
speaker = "unk"
original = "だが……"
translation = "하지만……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さすがに疲れたな……」"
translation = "「역시 지치는군……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だねー……」"
translation = "「그러게……」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔は天高くそびえ、その頂上は天界すらも超える。物理的には繋がっていないはずの三界を貫く塔だ。"
translation = "피니스의 탑은 하늘 높이 솟아있어 그 정상은 천계조차 뛰어넘는다. 물리적으로는 이어져 있지 않을 삼계를 꿰뚫는 탑이다."

[[dialogue]]
speaker = "unk"
original = "前回の登頂時も、天井を破壊、ぶち抜いたところを飛翔してショートカットした。"
translation = "지난번 등정 때도 천장을 파괴하고 뚫린 곳을 비행해서 지름길로 갔다."

[[dialogue]]
speaker = "unk"
original = "その時の穴がまだ修復されきってなかったため同じルートを飛んできたが、それでも流石に骨が折れた。"
translation = "그때의 구멍이 아직 다 수복되지 않았기에 같은 루트로 날아왔지만, 그럼에도 역시 꽤나 고된 일이었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「フィーニスの塔の中って普段は見られないから、私は楽しかったわ～」"
translation = "「피니스의 탑 내부는 평소엔 볼 수 없으니까 나는 즐거웠어~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ガーディアンが塔内部の修復を行っているところも見られました」"
translation = "「가디언이 탑 내부를 수복하고 있는 모습도 볼 수 있었습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あはは……」"
translation = "「아하하……」"

[[dialogue]]
speaker = "unk"
original = "元々知的好奇心の強い２人にとっては、世界の深奥ともいえるフィーニスの塔内部は、興味をそそられるようだ。"
translation = "원래 지적 호기심이 강한 두 사람에게는 세계의 심연이라 할 수 있는 피니스의 탑 내부는 흥미를 끄는 모양이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「帰りが憂鬱ね～。ここまで来たからには情報持って帰るわよ！」"
translation = "「돌아가는 길이 우울하네~. 여기까지 온 이상 정보는 가지고 돌아가겠어!」"

[[dialogue]]
speaker = "unk"
original = "セイファート前学園長はここからベガを見た。デネブを見た。"
translation = "세이파트 전 학원장은 여기서 베가를 보았다. 데네브를 보았다."

[[dialogue]]
speaker = "unk"
original = "ならば今の俺たちにも何か見えるはず──"
translation = "그렇다면 지금의 우리에게도 무언가 보일 터──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "鋭い鉤爪に心臓を鷲掴みにされたような感覚。"
translation = "날카로운 갈고리발톱에 심장을 움켜쥐인 듯한 감각."

[[dialogue]]
speaker = "unk"
original = "嫌な胸騒ぎがして左胸を押さえる。"
translation = "불길한 예감이 들어 왼쪽 가슴을 억누른다."

[[dialogue]]
speaker = "unk"
original = "冷や汗が噴き出る。動悸が激しい。頭がズキズキと痛くて割れそうだ。"
translation = "식은땀이 솟구친다. 심장 박동이 격렬하다. 머리가 지끈거리고 쪼개질 듯이 아프다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はぁ……はぁ……」"
translation = "「하아…… 하아……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト、どうしたの！？\u3000大丈夫！？」"
translation = "「쿠로토, 왜 그래!? 괜찮아!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ダメだ──来る──！！」"
translation = "「안 돼── 온다──!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！！？」"
translation = "「!!?」"

[[dialogue]]
speaker = "unk"
original = "塔の頂上に突如現れたのは、かつてアポロを助けた巨大な手。"
translation = "탑 정상에 돌연 나타난 것은 일전에 아폴로를 구했던 거대한 손."

[[dialogue]]
speaker = "unk"
original = "ただの一撃で、しかも指の一本でフィオナを打ち倒した謎の敵。"
translation = "단 일격에, 그것도 손가락 하나로 피오나를 쓰러뜨렸던 수수께끼의 적."

[[dialogue]]
speaker = "unk"
original = "それが今俺たちの前に現れ、その大きな<ruby>掌<rt>てのひら</rt></ruby>を広げていた。"
translation = "그것이 지금 우리 앞에 나타나 그 커다란 손바닥을 펼치고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あの時はよくも邪魔してくれたわね！」"
translation = "「그때는 감히 방해를 잘도 해줬겠다!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが星術で極大の光条を放つ。"
translation = "비너스가 성술로 극대 광조를 발사한다."

[[dialogue]]
speaker = "unk"
original = "まるで虫にでも刺されたみたいに……いや虫刺されの方がまだ痕は大きかったか。<b>手</b>には焦げ跡ひとつ付かなかった。"
translation = "마치 벌레에게 쏘인 것처럼…… 아니, 벌레에게 쏘인 게 오히려 자국이 더 컸을까. <b>손</b>에는 그을린 자국 하나 남지 않았다."

[[dialogue]]
speaker = "unk"
original = "<b>手</b>が自らを広げ、さながら虫を潰すかのように振り下ろされる。"
translation = "<b>손</b>이 스스로를 펼치고, 마치 벌레를 짓이기려는 듯이 내리쳐진다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ダメね」"
translation = "「안 되겠네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「みんな、私の後ろに──！」"
translation = "「모두, 내 뒤로──!」"

[[dialogue]]
speaker = "unk"
original = "勝てない。敵わない。届かない。"
translation = "이길 수 없다. 당해낼 수 없다. 닿지 않는다."

[[dialogue]]
speaker = "unk"
original = "幾多の戦いを潜り抜けてきたからこそ理解し、忘我する。"
translation = "수많은 사선을 넘나들어 왔기에 이해하고, 망연자실한다."

[[dialogue]]
speaker = "unk"
original = "圧倒的などという言葉ではとても足りない、絶望しかない力の差に──"
translation = "압도적이라는 말로는 도저히 부족한, 절망밖에 없는 힘의 차이에──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ライトニングテンペスト！」"
translation = "「라이트닝 템페스트!」"

[[dialogue]]
speaker = "unk"
original = "<b>手</b>の動きが一瞬止まった。"
translation = "<b>손</b>의 움직임이 일순 멈췄다."

[[dialogue]]
speaker = "unk"
original = "我に返って振り向くと、梨緒がクロスボウを構えていた。"
translation = "정신을 차리고 돌아보니, 리오가 크로스보우를 겨누고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「梨緒……！？」"
translation = "「리오……!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くっ……アレには勝てない！\u3000逃げるぞ！」"
translation = "「큭…… 저것에는 이길 수 없어! 도망치자!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……！\u3000新星星徒会、撤退だ！」"
translation = "「아아……! 신성성도회, 철수다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え、ええっ！」"
translation = "「에, 에엣!」"

[[dialogue]]
speaker = "unk"
original = "敗北を認め、ただ生き延びるために全速力で飛ぶ。"
translation = "패배를 인정하고, 그저 살아남기 위해 전속력으로 난다."

[[dialogue]]
speaker = "unk"
original = "だが視界の遠くに、見慣れた場所の、見たことのない光景が映った。"
translation = "하지만 시야 저편에, 낯익은 장소의, 본 적 없는 광경이 비쳤다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（あれは──）"
translation = "(저건──)"

[[dialogue]]
speaker = "？？？"
original = "「もう少しで勝てそうだったんだが……残念ながら俺はここまでのようだ」"
translation = "「조금만 더 하면 이길 수 있을 것 같았는데…… 안타깝게도 난 여기까지인 모양이군」"

[[dialogue]]
speaker = "unk"
original = "息も絶え絶えに、傷ついた体を引き摺る青年。"
translation = "숨을 헐떡이며, 상처 입은 몸을 이끄는 청년."

[[dialogue]]
speaker = "unk"
original = "出血がひどく、その言葉通り彼の命はあと数分と持たないだろう。"
translation = "출혈이 심해, 그 말대로 그의 목숨은 앞으로 몇 분도 버티지 못할 것이다."

[[dialogue]]
speaker = "unk"
original = "その顔は俺と瓜二つ。だが今の俺より大人びて見えた。"
translation = "그 얼굴은 나와 판박이. 하지만 지금의 나보다 어른스러워 보였다."

[[dialogue]]
speaker = "？？？"
original = "「このままでは俺は──となるだろう。枝分かれした可能性の中に、そうなった──が見え──」"
translation = "「이대로라면 나는 ──가 되겠지. 갈라진 가능성 속에서, 그렇게 된 ──가 보이──」"

[[dialogue]]
speaker = "？？？"
original = "「だが俺の心も体もリクリエには──」"
translation = "「하지만 내 마음도 몸도 리크리에에는 ──」"

[[dialogue]]
speaker = "unk"
original = "声にはノイズが混じって全部は聞こえない。"
translation = "목소리에는 노이즈가 섞여 전부 들리지는 않는다."

[[dialogue]]
speaker = "unk"
original = "だけど彼は不思議と落ち着いていて……"
translation = "하지만 그는 신기할 정도로 침착해 보여서……"

[[dialogue]]
speaker = "？？？"
original = "「道は俺が────娘の成長をこの目で見られないのは残念だが──元気に育ってくれるなら──」"
translation = "「길은 내가 ──── 딸의 성장을 이 눈으로 보지 못하는 건 아쉽지만── 건강하게 자라준다면──」"

[[dialogue]]
speaker = "？？？"
original = "「<ruby>娘<rt>ヴィーナス</rt></ruby>を頼んだぞ……ラク──」"
translation = "「<ruby>딸<rt>비너스</rt></ruby>을 부탁한다…… 락──」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、世界が弾けた。"
translation = "다음 순간, 세계가 터져 나갔다."

[[dialogue]]
speaker = "unk"
original = "遥か彼方の世界で起きた爆発が塔の頂上にまで届き、光に紛れて頂上を脱したのだった。"
translation = "먼 저편의 세계에서 일어난 폭발이 탑의 정상에까지 닿아, 빛에 섞여 정상을 탈출한 것이었다."

