[[dialogue]]
speaker = "unk"
original = "第３話,トントロをいっぱいにするのです！,P"
translation = "제3화, 톤토로를 가득 채우는 거예요!, P"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんっ。ルリエル、貯金をしようと思います！」"
translation = "「회장님. 루리엘, 저금을 하려고 생각해요!」"

[[dialogue]]
speaker = "unk"
original = "何か欲しいものが？"
translation = "뭔가 갖고 싶은 거라도?"

[[dialogue]]
speaker = "ルリエル"
original = "「いえ！\u3000ルリエル、今までお小遣いはもらったそばからどんどん使っちゃっていました」"
translation = "「아니요! 루리엘, 지금까지 용돈은 받자마자 계속 써버리고 있었어요」"

[[dialogue]]
speaker = "ルリエル"
original = "「でも、無駄遣いはいけないことです。故郷のじっちゃんばっちゃんにも怒られちゃいます。そこで……！」"
translation = "「하지만, 낭비는 안 좋은 일이에요. 고향의 할아버지 할머니한테도 혼나버릴 거예요. 그래서……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「トントロにしまっちゃえばいいことに気づいたのです～♪\u3000これならどんどんお金が貯まっていくはずなのですよ！」"
translation = "「톤토로에 넣어버리면 된다는 걸 깨달은 거예요~♪ 이러면 계속 돈이 쌓여갈 것이 분명한 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「それで、トントロがいっぱいになったら。じっちゃんたちに何かお礼の贈り物でも……なんて思ってるのです♪」"
translation = "「그래서, 톤토로가 가득 차면. 할아버지들께 뭔가 보답의 선물이라도…… 하고 생각하고 있는 거예요♪」"

[[dialogue]]
speaker = "unk"
original = "名案だね、がんばれ！"
translation = "명안이네, 힘내!"

[[dialogue]]
speaker = "ルリエル"
original = "「はいです！\u3000ではさっそく、お財布のお金をいくらか、貯金して──」"
translation = "「네이에요! 그럼 당장, 지갑의 돈을 얼마간, 저금해서──」"

[[dialogue]]
speaker = "セーラ"
original = "「あ。ルリちーに会長さんじゃん。やっほー」"
translation = "「아. 루리치에 회장님이잖아. 안녕」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、セーラ先輩。奇遇なのです～。お買い物ですか？」"
translation = "「앗, 세라 선배. 기우인 거예요~. 쇼핑인가요?」"

[[dialogue]]
speaker = "セーラ"
original = "「そだよん。てゆーか良いタイミングで会えたね！\u3000ルリちーにぜひとも教えたいスイーツショップがあるんだ～」"
translation = "「그랭. 그보다 좋은 타이밍에 만났네! 루리치에게 꼭 알려주고 싶은 스위츠 샵이 있거든~」"

[[dialogue]]
speaker = "ルリエル"
original = "「スウィーツっ……！？」"
translation = "「스위츠……!?」"

[[dialogue]]
speaker = "セーラ"
original = "「そそ。つい最近オープンしたばっかりの店でね。限定のいちごショートがちょー最高なんだよね！」"
translation = "「그래그래. 바로 최근에 오픈한 지 얼마 안 된 가게인데. 한정 딸기 쇼트케이크가 진짜 최고거든!」"

[[dialogue]]
speaker = "ルリエル"
original = "「新しいお店！\u3000限定！\u3000いちご！\u3000は、はうう♪\u3000気になります、ルリエルも食べたいのですっ！」"
translation = "「새로운 가게! 한정! 딸기! 하, 하우우♪ 신경 쓰여요, 루리엘도 먹고 싶은 거예요!」"

[[dialogue]]
speaker = "unk"
original = "あ、あれ、貯金は……？"
translation = "어, 어라, 저금은……?"

[[dialogue]]
speaker = "ルリエル"
original = "「行きましょう、セーラ先輩っ！」"
translation = "「가요, 세라 선배!」"

[[dialogue]]
speaker = "セーラ"
original = "「よっしゃー、レッツゴーだね～♪\u3000会長さんもおいでよ！」"
translation = "「좋았어, 렛츠 고네~♪ 회장님도 와!」"

[[dialogue]]
speaker = "ルリエル"
original = "「お腹ぺこぺこなのです～♪\u3000いっぱい買っちゃうのですよー♪」"
translation = "「배가 페코페코인 거예요~♪ 잔뜩 사버릴 거예요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「や、やってしまいました……くすん……貯金しようとした矢先に無駄遣いを……もぐもぐ……でもケーキはとってもおいしいのです……」"
translation = "「해, 해버렸습니다…… 흑…… 저금하려고 했던 참에 낭비를…… 우물우물…… 하지만 케이크는 정말 맛있는 거예요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「で、でも！\u3000ここから挽回なのですよ！\u3000今度こそお財布のお金を、無駄遣いする前にトントロへ……！」"
translation = "「하, 하지만! 여기서부터 만회하는 거예요! 이번에야말로 지갑의 돈을, 낭비하기 전에 톤토로에게……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「……あ。会長さんに、ルリ。こんにちは」"
translation = "「……아. 회장님에, 루리. 안녕」"

[[dialogue]]
speaker = "ルリエル"
original = "「ソフィアもお散歩ですか……って、くんくん。何だか甘い匂いがするのですっ」"
translation = "「소피아도 산책인가요…… 어라, 킁킁. 왠지 달콤한 냄새가 나는 거예요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「い、いきなり嗅がないでください！\u3000えっと、今ちょうどパンケーキの食べ歩きをしてたんです……ルリも一緒に行きますか？」"
translation = "「갑, 갑자기 맡지 마세요! 에또, 지금 막 팬케이크를 먹으러 다니던 참이었어요…… 루리도 같이 갈래요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「パンケーキ……！\u3000ルリエル、パンケーキには目がないのです～♪」"
translation = "「팬케이크……! 루리엘, 팬케이크에는 사족을 못 쓰는 거예요~♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっとルリエル！？"
translation = "잠깐 루리엘!?"

[[dialogue]]
speaker = "ルリエル"
original = "「ソフィアのおすすめはいつもとっても美味しいですから楽しみなのですっ♪」"
translation = "「소피아가 추천하는 건 언제나 정말 맛있으니까 기대되는 거예요♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「期待していいよ。あそこはひと味違うから。あ、会長さんも一緒にどうですか？」"
translation = "「기대해도 좋아. 저기는 차원이 다르니까. 아, 회장님도 같이 어때요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルはダメダメ天使なのです……誘惑に抗うことができません……もぐもぐ……でもパンケーキもたまらなくおいしいのです……」"
translation = "「루리엘은 안돼안돼 천사인 거예요…… 유혹에 저항할 수가 없어요…… 우물우물…… 하지만 팬케이크도 참을 수 없이 맛있는 거예요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「貯金というのは、こうも難しいものなのですね……ロロットさんはきっと鋼の意思を持った天使様なのですよ……」"
translation = "「저금이라는 건, 이렇게나 어려운 것이군요…… 로롯토 씨는 분명 강철의 의지를 가진 천사님인 거예요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ルリエル、ここにいたの。ちょうど良かった、良かったら一緒にお茶でも──」"
translation = "「루리엘, 여기 있었구나. 마침 잘 됐다, 괜찮으면 같이 차라도──」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふ、ふぇえええんっ！\u3000フィオナ会長、ごめんなさい～っ！\u3000欲に弱いルリエルを許してくださいなのです～っ！」"
translation = "「후, 후에에에엥! 피오나 회장님, 죄송해요~! 욕심에 약한 루리엘을 용서해 주세요인 거예요~!」"

[[dialogue]]
speaker = "フィオナ"
original = "「え……え～っと。いったい何が……？」"
translation = "「에…… 에~또. 도대체 무슨 일이……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ルリエルが喜びそうなカフェを見つけたから、一緒にどうかと思っただけなんだけど……」"
translation = "「루리엘이 기뻐할 것 같은 카페를 찾아서, 같이 어떨까 생각했을 뿐인데……」"

[[dialogue]]
speaker = "unk"
original = "そっとしておいてあげて"
translation = "그냥 내버려 둬"

[[dialogue]]
speaker = "フィオナ"
original = "「は、はい。緋宮会長がそうおっしゃるのでしたら……」"
translation = "「네, 네. 히노미야 회장님이 그렇게 말씀하신다면……」"

[[dialogue]]
speaker = "unk"
original = "友達がとても多く、また欲に弱いルリエルが貯金箱の中身をいっぱいにできるのは、まだまだ先のことになりそうなのだった。"
translation = "친구가 아주 많고, 또한 욕심에 약한 루리엘이 저금통 속을 가득 채울 수 있는 것은, 아직 한참 먼 일이 될 것 같았다."

[[dialogue]]
speaker = "ルリエル"
original = "「うわーんっ……！\u3000人間界は、誘惑が多すぎますよう～っ！」"
translation = "「으앙~! 인간계는, 유혹이 너무 많아요~!」"

