[[dialogue]]
speaker = "unk"
original = "第１話,妹（？）との再会,P"
translation = "제1화, 여동생(?)과의 재회"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「休日だってのに、わざわざ捜査に付き合ってもらって悪いな、会長さん。コラプサー相手だと、あたしだけじゃ心許なくてな」"
translation = "「휴일인데도, 일부러 수사에 동행하게 해서 미안하군, 회장님. 콜랩서 상대라면, 나 혼자서는 좀 불안해서 말이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「だけど会長さん、ヴァレリーは捕まえるとして、リーナはどうするつもりだ？\u3000前の戦いじゃ助けられたが、所属としては敵だ」"
translation = "「하지만 회장님, 발레리는 잡는다고 쳐도, 리나는 어쩔 셈이지? 지난번 싸움에선 도움을 받았지만, 소속으로 따지면 적이야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「……てか、あんたはお兄ちゃんのままでいいのかよ？」"
translation = "「……그보다, 당신은 오빠인 채로 있어도 괜찮은 거야?」"

[[dialogue]]
speaker = "unk"
original = "どうすればいいんでしょうか……"
translation = "어쩌면 좋을까요……"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん……」"
translation = "「오빠……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、久しぶり♪\u3000会いたかったよっ♪」"
translation = "「오빠, 오랜만이야♪ 보고 싶었어♪」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「噂をすれば、ってやつか……寒気で毛が逆立ったぜ」"
translation = "「호랑이도 제 말 하면 온다더니…… 한기 때문에 소름이 돋는군」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、一緒に遊ぼう！\u3000遊園地も水族館も行きたいし～……あ、この間は途中だったし、またお洋服見に行くのもいいな～」"
translation = "「오빠, 같이 놀자! 유원지도 수족관도 가고 싶고~…… 아, 저번에는 도중이었으니까, 다시 옷 보러 가는 것도 좋겠다~」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「遊ぼうって、お前コラプサーだろ？\u3000敵じゃねえか」"
translation = "「놀자니, 너 콜랩서잖아? 적이 아니냐고」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナはお兄ちゃんに聞いてるの。お姉ちゃんには聞いてないから」"
translation = "「리나는 오빠한테 물어보는 거야. 언니한테 물어보는 거 아니거든」"

[[dialogue]]
speaker = "unk"
original = "リーナ、そんな言い方したらダメだよ"
translation = "리나, 그렇게 말하면 안 돼"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「は～い。ごめんなさい、お姉ちゃん」"
translation = "「네~에. 미안해요, 언니」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「すっかり兄貴面じゃねえか！？」"
translation = "「아주 오빠 노릇이 판에 박혔구만!?」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（どうする？\u3000戦うか）"
translation = "（어떡할 거야? 싸울까?）"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（……いや、そうだな、やめとこう。リーナの力は未知数だし、場所も場所だしな）"
translation = "（……아니, 그렇군, 관두자. 리나의 힘은 미지수고, 장소도 장소니까 말이야）"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「動物園も行きたいな～。お兄ちゃんはどこがいい？」"
translation = "「동물원도 가고 싶다~. 오빠는 어디가 좋아?」"

[[dialogue]]
speaker = "unk"
original = "リーナの本当のお兄ちゃんはどこに──"
translation = "리나의 진짜 오빠는 어디에──"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「どうしてそんなこと言うの？\u3000リーナのお兄ちゃんは、ここにいるお兄ちゃんだけだよ？」"
translation = "「왜 그런 말을 해? 리나의 오빠는, 여기 있는 오빠뿐이야?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、リーナのこと嫌いなの……？\u3000リーナ、いらない子なの……？」"
translation = "「오빠, 리나가 싫어……? 리나, 필요 없는 아이야……?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「そんなことない……？\u3000よかった～！\u3000お兄ちゃんに嫌いって言われたら、リーナ、悲しくて死んじゃうもんっ」"
translation = "「그렇지 않아……? 다행이다~! 오빠한테 싫다는 소릴 들으면, 리나, 슬퍼서 죽어버릴 거야」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（やめとけ。話が通じる相手じゃねえ。適当に合わせとけ）"
translation = "（관둬. 말이 통하는 상대가 아냐. 적당히 맞춰줘）"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナはお兄ちゃんのこと大好きだもん。だからお兄ちゃんもリーナのこと大好きだよね？」"
translation = "「리나는 오빠를 정말 좋아해. 그러니까 오빠도 리나를 정말 좋아하지?」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……ね？」"
translation = "「……그치?」"

[[dialogue]]
speaker = "unk"
original = "う、うん……"
translation = "으, 응……"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「えへへ♪\u3000大好きって言ってもらっちゃった～♪」"
translation = "「에헤헤♪ 정말 좋아한다는 소리 들었다~♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「じゃあ行こっ。お兄ちゃんと一緒ならどこでもいいからっ」"
translation = "「그럼 가자. 오빠랑 함께라면 어디든 좋으니까」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ふんふんふふ～ん♪\u3000お兄ちゃんとお出かけ～♪\u3000お兄ちゃんと一緒～♪」"
translation = "「흥흥흐흥~♪ 오빠랑 나들이~♪ 오빠랑 함께~♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん、これからどこ行くの？\u3000……美味しいケーキ屋さん？\u3000やったぁっ！」"
translation = "「오빠, 이제 어디 가? ……맛있는 케이크 가게? 야호!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「リーナね、生クリーム好きなの♪\u3000甘くて、口の中でとろけて、幸せな気持ちになれちゃうんだぁ～♪」"
translation = "「리나 말이야, 생크림 좋아해♪ 달콤하고, 입안에서 사르르 녹아서, 행복한 기분이 들거든~♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃんはどんなケーキが好き？\u3000リーナは苺のショートケーキ♪」"
translation = "「오빠는 어떤 케이크를 좋아해? 리나는 딸기 쇼트케이크♪」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「……え、和菓子が好き？\u3000も～、ケーキって言ってるでしょっ。お兄ちゃんってば、お話聞いてないんだから～っ」"
translation = "「……에, 화과자가 좋아? 정말~, 케이크라고 했잖아. 오빠도 참, 내 말 안 듣는다니까~」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「あ、でも向こうに和菓子屋さんがあるっ。ケーキ屋さんの後で行こうよ。お兄ちゃんが好きなもの、リーナも好きになりたいな」"
translation = "「아, 하지만 저쪽에 화과자 가게가 있네. 케이크 가게 다음에 가자. 오빠가 좋아하는 거, 리나도 좋아하고 싶어」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（一応ついてきたが……特に何も起きねえな。それならそれでいいが）"
translation = "（일단 따라오긴 했지만…… 딱히 아무 일도 안 일어나는군. 그렇다면 그것대로 다행이지만）"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ねぇ、お兄ちゃん」"
translation = "「저기, 오빠」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ぎゅ～っ<emoji=heart04>」"
translation = "「꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「何でもないっ。お兄ちゃんにぎゅ～ってしたかっただけ<emoji=heart04>\u3000えへへ<emoji=heart04>」"
translation = "「아무것도 아냐. 오빠한테 꼬옥 하고 싶었을 뿐<emoji=heart04> 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「お兄ちゃん大好き……ふふ……」"
translation = "「오빠 너무 좋아…… 후후……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（大好きって言ってる割に殺気がヤバいんだが……本当に大丈夫か？）"
translation = "（좋아한다는 것치고는 살기가 장난 아닌데…… 정말 괜찮은 거야?）"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「ケーキも和菓子も美味しかった！\u3000連れていってくれてありがとう、お兄ちゃん♪」"
translation = "「케이크도 화과자도 맛있었어! 데려가 줘서 고마워, 오빠♪」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（リーナを利用してコラプサーの情報を聞き出すか？\u3000……って、そんなに嫌そうな顔すんなよ。わかったわかった、そういうズルはやんないって）"
translation = "（리나를 이용해서 콜랩서의 정보를 캐낼까? ……이봐, 그렇게 싫은 표정 짓지 마. 알았어 알았어, 그런 치사한 짓은 안 할 테니까）"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "（ま、上からはリーナをどうこうしろって命令は受けてねえし、下手に刺激しても怖いからな）"
translation = "（뭐, 위에서도 리나를 어떻게 하라는 명령은 받지 않았고, 서투르게 자극해도 무서우니까 말이지）"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「次は～……あ、そろそろ帰らないとキサナお姉ちゃんに怒られちゃうかも」"
translation = "「다음은~…… 아, 슬슬 돌아가지 않으면 키사나 언니한테 혼날지도 몰라」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「でもお兄ちゃんとサヨナラするのは寂しいし……」"
translation = "「하지만 오빠랑 헤어지는 건 외롭고……」"

[[dialogue]]
speaker = "unk"
original = "また会えるから大丈夫"
translation = "다시 만날 수 있으니까 괜찮아"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「うん！\u3000お兄ちゃんはリーナのお兄ちゃんだもんねっ！」"
translation = "「응! 오빠는 리나의 오빠인걸!」"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「絶対に離さないからね……お兄ちゃん」"
translation = "「절대로 놓지 않을 거니까…… 오빠」"

[[dialogue]]
speaker = "unk"
original = "え──？"
translation = "에──?"

[[dialogue]]
speaker_original = "リーナ"
speaker_translation = "리나"
original = "「またねー、お兄ちゃん！」"
translation = "「또 봐, 오빠!」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「結局戦わずじまいか。ま、平和なのはいいことだが」"
translation = "「결국 안 싸우고 끝났나. 뭐, 평화로운 건 좋은 일이지」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「リーナについてはわからないことだらけだ。あたしもあたしでリーナのことを探ってみるよ」"
translation = "「리나에 대해서는 모르는 것 투성이야. 나도 나대로 리나에 대해 조사해 볼게」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「だけどありゃ、本当に懐いてるのかね……？\u3000何せ相手はコラプサーだ。気を付けろよ、会長さん」"
translation = "「하지만 저거, 정말로 따르는 걸까……? 어쨌든 상대는 콜랩서다. 조심해, 회장님」"

