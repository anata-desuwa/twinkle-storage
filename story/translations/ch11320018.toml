[[dialogue]]
speaker = "unk"
original = "こうしてケイティさんと一緒に、我が家でお茶会をするのも何度目だろうか？"
translation = "이렇게 케이티 씨와 함께 우리 집에서 다도회를 하는 것도 몇 번째일까?"

[[dialogue]]
speaker = "unk"
original = "今日は母さんも家におらず、２人きりの時間を過ごしている。"
translation = "오늘은 어머니도 집에 안 계셔서 둘만의 시간을 보내고 있다."

[[dialogue]]
speaker = "ケイティ"
original = "「魔王さん、今日のお茶会はそろそろ終わりでしょうか……？」"
translation = "「마왕님, 오늘의 다도회는 이제 슬슬 끝인가요……?」"

[[dialogue]]
speaker = "unk"
original = "モジモジしながら立ち上がったケイティさんは、もう待ちきれないといった様子だった。"
translation = "머뭇거리며 일어난 케이티 씨는 더 이상 기다릴 수 없다는 기색이었다."

[[dialogue]]
speaker = "クロト"
original = "「俺としてはもっとゆっくりお茶会を楽しんでもいいんだけど？」"
translation = "「나로서는 좀 더 느긋하게 다도회를 즐겨도 괜찮은데?」"

[[dialogue]]
speaker = "ケイティ"
original = "「はい……それもいいかもしれないのですが…………もう、意地悪しないでください……」"
translation = "「네…… 그것도 좋을지 모르겠지만………… 정말, 심술궂게 굴지 말아 주세요……」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ窓に手を突いて、お尻をこっちに向けて……」"
translation = "「그럼 창문에 손을 짚고 엉덩이를 이쪽으로 향해줘……」"

[[dialogue]]
speaker = "ケイティ"
original = "「こう……ですか……？」"
translation = "「이렇……게……인가요……?」"

[[dialogue]]
speaker = "unk"
original = "プリンとしたお尻を向けたケイティさんの腰を掴んで引き寄せる。"
translation = "탱글한 엉덩이를 향한 케이티 씨의 허리를 붙잡아 끌어당긴다."

[[dialogue]]
speaker = "unk"
original = "そして片足を高く持ち上げ、すでに硬くなっているペニスをケイティさんの局部に擦りあてた。"
translation = "그리고 한쪽 다리를 높게 들어 올려 이미 단단해진 자지를 케이티 씨의 국부에 문질렀다."

[[dialogue]]
speaker = "ケイティ"
original = "「はぁ……ぅ……こんな格好……恥ずかしいです……」"
translation = "「하아……으…… 이런 모습…… 부끄러워요……」"

[[dialogue]]
speaker = "クロト"
original = "「そう？\u3000ケイティさんのここはすごく喜んでるみたいだけど……」"
translation = "「그래? 케이티 씨의 여기는 무척 기뻐하는 것 같은데……」"

[[dialogue]]
speaker = "ケイティ"
original = "「あぁぅっ……んんんっ……はぁ……ぅ……んんんっ……ぁ……ああぁ……<emoji=heart04>」"
translation = "「아아으…… 응응…… 하아……으…… 응응…… 아…… 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「恥ずかしい……けど……んんっ……本当は……嫌じゃ、ないです……<emoji=heart04>」"
translation = "「부끄러워…… 하지만…… 응…… 사실은…… 싫지, 않아요……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「私の、身体は……は、あぅ……んんっ……正直で……魔王さんの、おち○ちん……すりすりされて……喜んでます……んんんっ……<emoji=heart04>」"
translation = "「저의, 몸은…… 하, 아으…… 응…… 정직해서…… 마왕님의, 자지…… 비벼져서…… 기뻐하고 있어요…… 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「興奮してるんだね……」"
translation = "「흥분했나 보네……」"

[[dialogue]]
speaker = "ケイティ"
original = "「はい……んんっ、あっ……はぁ……とても……興奮してます……あ、んぅうう……<emoji=heart04>」"
translation = "「네…… 응, 앗…… 하아…… 무척…… 흥분하고 있어요…… 아, 응으으으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスをこすりつけている局部からは、興奮を示す愛液がすでに止めどなくあふれ出てきている。"
translation = "자지를 문지르고 있는 국부에서는 흥분을 나타내는 애액이 이미 쉼 없이 흘러나오고 있다."

[[dialogue]]
speaker = "ケイティ"
original = "「やぁ、んっ……お願い、です……魔王さんっ……ああ……焦らさないで……くださいぃ……んんんっ……<emoji=heart04>」"
translation = "「야, 응…… 부탁, 이에요…… 마왕님…… 아아…… 애태우지…… 말아 주세요오…… 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「いつもみたいに……魔王さんの、逞しいおち○ちん……私のトロトロおま○こに……突っ込んでください……んっ、あっ……はぁっ……<emoji=heart04>」"
translation = "「평소처럼…… 마왕님의, 늠름한 자지…… 제 질퍽질퍽한 보지에…… 박아주세요…… 응, 앗…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「あぁあああんっ<emoji=heart04>\u3000はぁ……ぁ……<emoji=heart04>\u3000ああっ……んんんっ……入って、くるぅうっ……<emoji=heart04>」"
translation = "「아아아아앙<emoji=heart04> 하아……아……<emoji=heart04> 아앗…… 응응응…… 들어, 와아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先端をケイティさんの局部にあてがっただけで、俺のペニスはそのまま滑るように呑み込まれていく。"
translation = "끝부분을 케이티 씨의 국부에 갖다 댄 것만으로 내 자지는 그대로 미끄러지듯 삼켜져 간다."

[[dialogue]]
speaker = "ケイティ"
original = "「はぅ、ん、ふぅ……私のおま○こ……何の迷いもなく、魔王さんのおち○ちんを受け入れて……んんんっ……<emoji=heart04>」"
translation = "「하으, 응, 후으…… 제 보지…… 아무 망설임 없이 마왕님의 자지를 받아들여서…… 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「少しでも入れるのに……キツくて……入らなくて……大変だったおち○ちんが……こんなに簡単に……は、んぅうう……<emoji=heart04>」"
translation = "「조금이라도 넣는 데…… 꽉 조여서…… 안 들어가서…… 힘들었던 자지가…… 이렇게 간단히…… 하, 응으으으……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「でも、ぴったり俺のに密着して……こうしてじっとしてるだけでも気持ちいいよ……」"
translation = "「하지만 딱 내 거에 밀착해서…… 이렇게 가만히 있는 것만으로도 기분 좋아……」"

[[dialogue]]
speaker = "ケイティ"
original = "「嬉しいです……んっ、く……私のおま○こ……魔王さんに……喜んでいただけて……はぁ……んぅ……<emoji=heart04>」"
translation = "「기뻐요…… 응, 윽…… 제 보지…… 마왕님께…… 기쁨을 드릴 수 있어서…… 하아…… 응으……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お茶会のためにケイティさんを家に招くようになって──"
translation = "다도회를 위해 케이티 씨를 집으로 초대하게 된 뒤로──"

[[dialogue]]
speaker = "unk"
original = "何度目かのお茶会の後、自然とそういう行為をして男女の関係になって──"
translation = "몇 번째인가 다도회 후에 자연스럽게 그런 행위를 하며 남녀 관계가 되고──"

[[dialogue]]
speaker = "unk"
original = "それからは夢中で交わった。２人きりになる機会を作ってはその度に肌を重ね合って、そして──"
translation = "그 뒤로는 정신없이 섞였다. 둘만 있을 기회를 만들어서는 그때마다 살을 맞대었고, 그리고──"

[[dialogue]]
speaker = "ケイティ"
original = "「私の、身体……少しずつ……魔王さんのものになっていってるって……感じます……」"
translation = "「저의, 몸…… 조금씩…… 마왕님의 것이 되어가고 있다고…… 느껴져요……」"

[[dialogue]]
speaker = "ケイティ"
original = "「最初は……本当にこんなことしていいのか……はしたない行為ではないかって……迷ってましたけど……でも……」"
translation = "「처음에는…… 정말 이런 짓을 해도 되는지…… 천박한 행위가 아닐까 하고…… 망설였지만…… 하지만……」"

[[dialogue]]
speaker = "ケイティ"
original = "「これが、愛にあふれる行為だと気付きました……魔王さんが気付かせてくれました……だから……」"
translation = "「이것이 사랑으로 가득 찬 행위라는 걸 깨달았어요…… 마왕님이 깨닫게 해주셨어요…… 그러니까……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……」"
translation = "「아아……」"

[[dialogue]]
speaker = "unk"
original = "ゆっくりとピストンを開始する。"
translation = "천천히 피스톤을 시작한다."

[[dialogue]]
speaker = "ケイティ"
original = "「ああっ、あっ、あっ……んんっ、あっ、は……んんぅ……ふぁ……ぁ……ああ、あ……ああっ……<emoji=heart04>」"
translation = "「아앗, 앗, 앗…… 응응, 앗, 하…… 응으…… 화……아…… 아아, 아…… 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「魔王さんの、おち○ちん……んっ、う……ぁ、はあっ、あ……あっ、あ、あ、ああっ……んんっ、あっ……あ……ああっ……<emoji=heart04>」"
translation = "「마왕님의, 자지…… 응, 으……아, 하앗, 아…… 앗, 아, 아, 아앗…… 응응, 앗…… 아…… 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ケイティさんも自分から動いてる……すごくエッチな腰の動きだ……」"
translation = "「케이티 씨도 스스로 움직이고 있어…… 굉장히 야한 허리 놀림이야……」"

[[dialogue]]
speaker = "ケイティ"
original = "「気持ちよさを、自分から求めてしまうんです……恥ずかしい……んんっ……本当に、恥ずかしいんです……<emoji=heart04>」"
translation = "「기분 좋음을 스스로 갈구하게 돼요…… 부끄러워…… 응응…… 정말로, 부끄러워요……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「誰かに見られるかもしれない窓際で……何のためらいもなく、こんなエッチなポーズをしてまぐわいあって……<emoji=heart04>」"
translation = "「누군가 볼지도 모르는 창가에서…… 아무 망설임 없이 이런 야한 포즈를 하고 성교를 나누고……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「でも、この恥ずかしさも……んぁあっ……今は嬉しいです……幸せなんですっ……<emoji=heart04>」"
translation = "「하지만 이 부끄러움도…… 응아앗…… 지금은 기뻐요…… 행복해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「いやらしい言葉も自然に出てしまうようになりました……どんなことでも魔王さんに求められたら応じてしまう……」"
translation = "「상스러운 말도 자연스럽게 나오게 되었어요…… 어떤 것이라도 마왕님이 원하신다면 응해버려요……」"

[[dialogue]]
speaker = "ケイティ"
original = "「身体が……心が……そんな風に感じられるようになったんです……んんんっ……<emoji=heart04>」"
translation = "「몸이…… 마음이…… 그렇게 느끼게 되었답니다…… 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「それは全て……あっ……ああんっ……<emoji=heart04>\u3000魔王さんが……私のおま○こに教えてくれたからです……んんんっ……<emoji=heart04>」"
translation = "「그건 전부…… 앗…… 아앙……<emoji=heart04> 마왕님이…… 제 보지에 가르쳐 주셨기 때문이에요…… 응응응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ケイティさん……キスしよう……こっちを向いて……」"
translation = "「케이티 씨…… 키스하자…… 이쪽을 봐……」"

[[dialogue]]
speaker = "ケイティ"
original = "「はい……んむむっ……ちゅっ……は……んんんっ……ふ……んんんっ……ちゅ、は、ちゅむ、んんっ……ふぁ……<emoji=heart04>」"
translation = "「네…… 음무무…… 츄…… 하…… 응응응…… 후…… 응응응…… 츄, 하, 츄무, 응응…… 화……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "小刻みな動きでケイティさんの膣を攻めながら、ねっとりと舌を絡めたキスをする。"
translation = "잘게 움직이며 케이티 씨의 질을 공략하면서 진득하게 혀를 섞은 키스를 한다."

[[dialogue]]
speaker = "ケイティ"
original = "「んんっ、ちゅ、んんんっ……んんっ、ちゅっ、ちゅっ、れる、んんぅ……んふ、ちゅ、ふ、んんんっ、ちゅ、は、んん……ふ、ちゅ、はぁっ……<emoji=heart04>」"
translation = "「응응, 츄, 응응응…… 응응, 츄, 츄, 낼름, 응으…… 응후, 츄, 후, 응응응, 츄, 하, 응응…… 후, 츄, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「ちゅ、は、んんっ、ふ……ふぁ……こんな濃厚なキス……んんっ、んっ、んっ、んっ……んふ、ちゅ、はぁ……気持ちいいに決まってます<emoji=heart04>」"
translation = "「츄, 하, 응응, 후…… 화…… 이런 농밀한 키스…… 응, 응, 응, 응…… 응후, 츄, 하아…… 기분 좋을 수밖에 없어요<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「もっと、欲しいです……おま○こズブズブされながら……もっと激しいキス、してもいいですよね……ちゅ、んんんっ！\u3000んっ、ふぁ、ちゅ、んんんっ<emoji=heart04>」"
translation = "「더, 원해요…… 보지 즈븝즈븝 당하면서…… 더 격렬한 키스, 해도 괜찮겠죠…… 츄, 응응응! 응, 화, 츄, 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「ちゅ、ちゅぷ、れる、れる、ちゅぱ、ふ、んんっ……<emoji=heart04>\u3000んっ、んっ、ん、ふ、んんっ……ふぁ……ふ、ちゅ、はぁ、ちゅば、んん、ふぅ、ちゅるっ……<emoji=heart04>」"
translation = "「츄, 츄릅, 낼름, 낼름, 츄파, 후, 응응……<emoji=heart04> 응, 응, 응, 후, 응응…… 화…… 후, 츄, 하아, 츄바, 응응, 후우, 츄루룹……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「はぁ、ふ……はぁ……魔王さんの、愛……んんっ、あっ……感じ、ます……はぁ、あ……ああっ、あ、あ……んんっ……ん、ああっ……<emoji=heart04>」"
translation = "「하아, 후…… 하아…… 마왕님의, 사랑…… 응응, 앗…… 느껴, 져요…… 하아, 아…… 아앗, 아, 아…… 응응…… 응, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスに夢中になりすぎて、唾液を拭うのも忘れてしまっていた。"
translation = "키스에 너무 열중한 나머지 침을 닦는 것도 잊고 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、あふれだしているのは上だけじゃなくて、結合部からもトロリとした液体が、腿を幾筋も伝って流れ落ちていくのを感じた。"
translation = "그리고 넘쳐흐르는 것은 위쪽뿐만이 아니라 결합부에서도 걸쭉한 액체가 허벅지를 타고 몇 줄기나 흘러내리는 것을 느꼈다."

[[dialogue]]
speaker = "unk"
original = "突けば突くほどに潤っていく潤滑油の助けを借りながら、俺は更にピストンを激しくする。"
translation = "찌르면 찌를수록 젖어가는 윤활유의 도움을 받으며 나는 더욱 피스톤을 격렬하게 한다."

[[dialogue]]
speaker = "ケイティ"
original = "「ああっ、あっ、あっ、あ、ああっ……<emoji=heart04>\u3000んっ、んっ、んうっ、あ、あ、あああっ……<emoji=heart04>」"
translation = "「아앗, 앗, 앗, 아, 아앗……<emoji=heart04> 응, 응, 응으, 아, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「パンパンって、音、立てて……魔王さんの、おち○ちん、奥の方まで抉ってっ……あ、あああっ……<emoji=heart04>」"
translation = "「팍팍 하고, 소리, 내면서…… 마왕님의, 자지, 안쪽 깊숙한 곳까지 후벼 파서…… 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「はぁ、あっ、んんっ……私の、おま○このっ、んんっ、弱い、とこっ……ん、ああ、あっ、は、あああっ……<emoji=heart04>」"
translation = "「하아, 앗, 응응…… 제, 보지의, 응응, 약한, 부분…… 응, 아아, 앗, 하, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「ずんっ、ずんっ、って突いてっ……んんぅっ、は、あ、ああ、あんっ……あ、んんっ……気持ちよく、してくるっ……<emoji=heart04>」"
translation = "「쿵, 쿵, 하고 찔러서…… 응응으, 하, 아, 아아, 앙…… 아, 응응…… 기분 좋게, 해줘……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「あっ、あっ、あっ、あ、んんっ……すご、いっ……おち○ちんすごいっ……おち○ちん、すごいですっ……あ、ああぁあ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아, 응응…… 대단, 해…… 자지 대단해…… 자지, 대단해요…… 아, 아아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身体中の血液が下半身に集まり、ケイティさんの体内に潜り込んだ部分が痛いほど張り詰めている。"
translation = "온몸의 혈액이 하반신으로 모여 케이티 씨의 체내로 파고든 부분이 아플 정도로 팽창해 있다."

[[dialogue]]
speaker = "unk"
original = "その先端がケイティさんの弱いところを突くたびに、切迫した喘ぎ声を漏らす。"
translation = "그 끝이 케이티 씨의 약한 부분을 찌를 때마다 다급한 신음이 새어 나온다."

[[dialogue]]
speaker = "ケイティ"
original = "「はぁ、あ……魔王さんっ……もう、全部、知ってるんですね……んんっ、あ、あああっ<emoji=heart04>」"
translation = "「하아, 아…… 마왕님…… 이제, 전부, 알고 계시네요…… 응응, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「おま○この、弱いところっ……ん、あ、ああっ、あっ……あ、んふぅ、んんっ、あっ、あああ……<emoji=heart04>」"
translation = "「보지의, 약한 부분…… 응, 아, 아앗, 앗…… 아, 응후, 응응, 앗, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「全部っ、んんっ……暴いちゃったんですね……ああっ、あっ、あ、あ、ああっ、はぁ、あ、あああっ……<emoji=heart04>」"
translation = "「전부, 응응…… 파헤쳐 버리셨네요…… 아앗, 앗, 아, 아, 아앗, 하아, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ケイティさんと交わった回数はそれほど多くはないが、彼女の言う通り俺は感じる場所を何となく知っていた。"
translation = "케이티 씨와 섞인 횟수는 그리 많지 않지만 그녀의 말대로 나는 느끼는 부위를 어느 정도 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "いや、知っていたというのも違うかもしれない。"
translation = "아니, 알고 있었다는 것도 다를지 모른다."

[[dialogue]]
speaker = "unk"
original = "直感的に、衝動的に、情動的に……求めるがままに動いたら、そこがケイティさんの一番感じる場所だった、というだけのことだ。"
translation = "직관적으로, 충동적으로, 정동적으로…… 원하는 대로 움직였더니 그곳이 케이티 씨가 가장 느끼는 부위였을 뿐이다."

[[dialogue]]
speaker = "unk"
original = "だが、それが合致するという奇跡は、もはや運命と呼んでしまっても良いのではないだろうか？"
translation = "하지만 그것이 일치한다는 기적은 이제 운명이라고 불러도 되지 않을까?"

[[dialogue]]
speaker = "ケイティ"
original = "「はぁ、あ、ああっ……んぅ、や、ぁああ……はぁ、あ、ああっ<emoji=heart04>\u3000んんっ、んっ、あっ、あっ、あっ、は、あ、あああっ<emoji=heart04>」"
translation = "「하아, 아, 아앗…… 응으, 야, 아아아…… 하아, 아, 아앗<emoji=heart04> 응응, 응, 앗, 앗, 앗, 하, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「んんっ、ん、そこっ、んんっ、あ、ああっ<emoji=heart04>\u3000もっと、あぁ、ん、あ、あぁああ、んんっ<emoji=heart04>\u3000もっと、突いてくださいっ、あ、あああっ<emoji=heart04>」"
translation = "「응응, 응, 거기, 응응, 아, 아앗<emoji=heart04> 좀 더, 아아, 응, 아, 아아아, 응응<emoji=heart04> 좀 더, 찔러주세요, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、いっぱい突いて……それから今日も……いっぱい出す……！\u3000ケイティさんの中を俺のでいっぱいにするぞ」"
translation = "「아아, 잔뜩 찌르고…… 그리고 오늘도…… 잔뜩 쌀 거야……! 케이티 씨 안을 내 거로 가득 채우겠어.」"

[[dialogue]]
speaker = "ケイティ"
original = "「あぁあ……ありがとうございますっ……<emoji=heart04>\u3000くださいっ、私の中に、たくさん……魔王さんの精液……解き放ってくださいっ<emoji=heart04>」"
translation = "「아아아…… 감사합니다……<emoji=heart04> 주세요, 제 안에, 잔뜩…… 마왕님의 정액…… 해방해 주세요<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「びゅーっ、びゅーっ、って熱いの……吹き出して……お腹の奥を焼かれて……それで、ますます私は……魔王さんに夢中になるんですっ……<emoji=heart04>」"
translation = "「뷰릇, 뷰릇, 하고 뜨거운 거…… 내뿜어서…… 배 속 깊은 곳이 타버리고…… 그래서 더욱더 저는…… 마왕님께 빠져드는 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「はぁ、あっ、あっ、あ、あああっ<emoji=heart04>\u3000あ、や、んんっ、あっ、あ、ああ、あっ、はあ、ぅ、あ、ああっ<emoji=heart04>\u3000んん、あっ、あ、ああああっ……！」"
translation = "「하아, 앗, 앗, 아, 아아앗<emoji=heart04> 아, 야, 응응, 앗, 아, 아아, 앗, 하아, 으, 아, 아아앗<emoji=heart04> 응응, 앗, 아, 아아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "徐々に俺もケイティさんも、絶頂が近づいてきているのを感じていた。"
translation = "서서히 나도 케이티 씨도 절정이 다가오고 있음을 느끼고 있었다."

[[dialogue]]
speaker = "unk"
original = "今にも爆発しそうな欲望を懸命に抑えながら、ケイティさんの膣内をがむしゃらにかき回す。"
translation = "당장이라도 폭발할 것 같은 욕망을 필사적으로 억누르며 케이티 씨의 질 내부를 무턱대고 휘젓는다."

[[dialogue]]
speaker = "ケイティ"
original = "「はっ、ひ、んぅうっ、は、ぁあっ、あ、んんっ、あ、やぁっ<emoji=heart04>\u3000はぁ、あっ、あっ、ああ、ああ、あ、あ、あ、ああっ……<emoji=heart04>」"
translation = "「하, 히, 응으으, 하, 아앗, 아, 응응, 아, 야앗<emoji=heart04> 하아, 앗, 앗, 아아, 아아, 아, 아, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「んぐ、ぅ……んんっ、く……魔王さんっ……私、もうっ……んんん、あ、あ、あああっ……<emoji=heart04>」"
translation = "「응그, 으…… 응응, 윽…… 마왕님…… 저, 이제…… 응응응, 아, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いいよ、そのまま……」"
translation = "「괜찮아, 그대로……」"

[[dialogue]]
speaker = "ケイティ"
original = "「は、いっ、んんっ、イキ、ますっ……このまま、魔王さんに、おま○こかき回されながら……思いっきり、絶頂しますっ……<emoji=heart04>」"
translation = "「네, 엣, 응응, 가, 가요…… 이대로 마왕님께 보지 휘저어지면서…… 마음껏 절정할게요……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「だから、魔王さんっ<emoji=heart04>\u3000んんっ、あ、ああ……最後、までっ<emoji=heart04>\u3000思いっきり、動いてっ……んんっ、イッてくださいっ……あ、あああっ<emoji=heart04>」"
translation = "「그러니까 마왕님<emoji=heart04> 응응, 아, 아아…… 마지막까지<emoji=heart04> 마음껏 움직여서…… 응응, 가주세요…… 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「私、も、イキますからっ、あ、あっ、や、んんっ、あっ、ああ……あ、あああっ……<emoji=heart04>\u3000はぁ、あ、あ、ああっ……ん、ぁ、あああっ、や、あぁあ……」"
translation = "「저도, 갈 테니까요, 아, 앗, 야, 응응, 앗, 아아…… 아, 아아앗…… 하아, 아, 아, 아앗…… 응, 아, 아아앗, 야, 아아아……」"

[[dialogue]]
speaker = "unk"
original = "熱い衝動が上ってくる。"
translation = "뜨거운 충동이 올라온다."

[[dialogue]]
speaker = "unk"
original = "ケイティさんの膣内で疼いていたペニスが、脈動を抑えきれずビクンビクンと跳ね……"
translation = "케이티 씨의 질 내에서 욱신거리던 자지가 박동을 억제하지 못하고 움찔움찔 튀며……"

[[dialogue]]
speaker = "ケイティ"
original = "「っあああっ！\u3000んんっ、あっ、あああっ！\u3000はぁ、んぅううっ、あっ、あ、あああっ！\u3000や、んんっ、く、んんぅ、イク、ぅううっ……！」"
translation = "「으아아앗! 응응, 앗, 아아앗! 하아, 응으으으, 앗, 아, 아아앗! 야, 응응, 윽, 응응으, 가, 가요오옷……!」"

[[dialogue]]
speaker = "ケイティ"
original = "「魔王、さんっ、あああっ、あ……私っ、もう……ああっ、イッちゃいますっ、んんっ、あっ、あ、あああ……あっ、あ、ああ、あ、あああっ……！」"
translation = "「마왕, 님, 아아앗, 아…… 저…… 이제…… 아앗, 가버려요, 응응, 앗, 아, 아아아…… 앗, 아, 아아, 아, 아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "その動きに反応するように、ケイティさんの身体が大きく痙攣した。"
translation = "그 움직임에 반응하듯 케이티 씨의 몸이 크게 경련했다."

[[dialogue]]
speaker = "ケイティ"
original = "「ああっ、んぅうう……く、あ……もう、だめ……魔王さんっ、あっ、あ、あ、ああっ、や、んぅ、あ、ああっ！\u3000あ、あぁああああ……ん、ぁ……ああああっ！！」"
translation = "「아앗, 응으으으…… 윽, 아…… 이제, 안 돼…… 마왕님, 앗, 아, 아, 아앗, 야, 응으, 아, 아아앗! 아, 아아아아아아…… 응, 아…… 아아아앗!!」"

[[dialogue]]
speaker = "ケイティ"
original = "「あぁあああああああああああああああああああっ！！！！」"
translation = "「아아아아아아아아아아아아아아아아아아앗!!!!」"

[[dialogue]]
speaker = "unk"
original = "ケイティさんの嬌声と共に、俺のペニスが激しく脈打つ。"
translation = "케이티 씨의 교성과 함께 내 자지가 격렬하게 맥동한다."

[[dialogue]]
speaker = "ケイティ"
original = "「あぁああっ<emoji=heart04>\u3000あっ、んんっ、あ、あああっ<emoji=heart04>\u3000ぁ……あはぁっ、ん、んぅ、あ、ああっ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 앗, 응응, 아, 아아앗<emoji=heart04> 아…… 아화아, 응, 응으, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "抱え上げたケイティさんの太股が腕の中で暴れ、立っていられないのか膝ががくがくと揺れる。"
translation = "안아 올린 케이티 씨의 허벅지가 팔 안에서 날뛰고, 서 있을 수 없는지 무릎이 가들가들 떨린다."

[[dialogue]]
speaker = "ケイティ"
original = "「はあっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000出て、るっ<emoji=heart04>\u3000魔王さんの、精液っ<emoji=heart04>\u3000真っ白で濃厚な<emoji=heart04>\u3000魔王さんのザーメンっ……<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 아앗<emoji=heart04> 나오고, 있어<emoji=heart04> 마왕님의, 정액<emoji=heart04> 새하얗고 진한<emoji=heart04> 마왕님의 정액이……<emoji=heart04>」"

[[dialogue]]
speaker = "ケイティ"
original = "「おま○こ、飲み込んでるっ……はぁっ……<emoji=heart04>\u3000すご、い、ですっ……収まり、きらない、くらい……いっぱいに……あっ、あああっ……<emoji=heart04>」"
translation = "「보지가, 집어삼키고 있어…… 하앗……<emoji=heart04> 대단, 해요…… 다 담기지, 않을, 정도로…… 가득…… 앗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが脈打つたびに、意識が遠のきそうなほどの快感に襲われる。"
translation = "자지가 맥동할 때마다 의식이 멀어질 정도의 쾌감이 덮쳐온다."

[[dialogue]]
speaker = "unk"
original = "そんな中で、俺はしっかりと最後の一滴までケイティさんの中に出そうと、下腹部に力を込めていた。"
translation = "그런 와중에도 나는 확실히 마지막 한 방울까지 케이티 씨의 안에 내보내려고 아랫배에 힘을 주었다."

[[dialogue]]
speaker = "unk"
original = "やがて、緩やかに射精の波が引いていく。"
translation = "이윽고 완만하게 사정의 파도가 가라앉는다."

[[dialogue]]
speaker = "unk"
original = "全てを出し尽くした俺がゆっくり腰を引くと、ペニスが抜けた瞬間に、内側から粘液が垂れ落ちてくる。"
translation = "모든 것을 쏟아부은 내가 천천히 허리를 빼자 자지가 빠진 순간 내면에서 점액이 뚝뚝 떨어진다."

[[dialogue]]
speaker = "ケイティ"
original = "「いっぱい……出してくださったんですね……」"
translation = "「가득…… 내보내 주셨네요……」"

[[dialogue]]
speaker = "クロト"
original = "「それだけ気持ちよかったからだよ……」"
translation = "「그만큼 기분 좋았으니까.」"

[[dialogue]]
speaker = "unk"
original = "絶頂の余韻に浸りながら、ケイティさんは穏やかな微笑みを浮かべる。"
translation = "절정의 여운에 젖은 채 케이티 씨는 온화한 미소를 짓는다."

[[dialogue]]
speaker = "ケイティ"
original = "「私の方こそ……ありがとうございます……こんなに気持ちよくしてくれて……」"
translation = "「저야말로…… 감사합니다…… 이렇게 기분 좋게 해주셔서……」"

[[dialogue]]
speaker = "ケイティ"
original = "「魔王さんと出会わなかったら……私、こんな気持ちよいことを知らずに……いたのかもしれないんですよね……」"
translation = "「마왕님과 만나지 못했다면…… 저, 이런 기분 좋은 일을 모르고…… 지냈을지도 모르겠네요……」"

[[dialogue]]
speaker = "ケイティ"
original = "「よかった、です……私……魔王さんに愛してもらえて……」"
translation = "「다행, 이에요…… 저…… 마왕님이 사랑해 주셔서……」"

[[dialogue]]
speaker = "クロト"
original = "「うん……でも……」"
translation = "「응…… 하지만……」"

[[dialogue]]
speaker = "ケイティ"
original = "「どうしたのですか……？」"
translation = "「왜 그러시나요……?」"

[[dialogue]]
speaker = "クロト"
original = "「こんな気持ちいいことを知っちゃったら……ケイティさんを天界に帰したくなくなるよ……」"
translation = "「이렇게 기분 좋은 일을 알아버렸으니…… 케이티 씨를 천계로 돌려보내고 싶지 않아져……」"

[[dialogue]]
speaker = "ケイティ"
original = "「魔王さん……」"
translation = "「마왕님……」"

[[dialogue]]
speaker = "ケイティ"
original = "「ふふ……それは……私だって同じですよ……」"
translation = "「후후…… 그건…… 저도 마찬가지예요……」"

[[dialogue]]
speaker = "ケイティ"
original = "「でも……任務が終われば、私は天界に帰らなくてはなりません……」"
translation = "「하지만…… 임무가 끝나면 저는 천계로 돌아가야만 해요……」"

[[dialogue]]
speaker = "ケイティ"
original = "「だから、それまで……いーっぱい……愛し合いましょう……」"
translation = "「그러니까 그때까지…… 마ー니…… 사랑해요……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……」"
translation = "「아아……」"

[[dialogue]]
speaker = "unk"
original = "噛みしめるように答えた俺は、汗に濡れたケイティさんの身体を、ギュッと強く抱きしめたのだった。"
translation = "되새기듯 대답한 나는 땀에 젖은 케이티 씨의 몸을 꽉 세게 껴안는 것이었다."

