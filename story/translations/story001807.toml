[[dialogue]]
speaker = "ルルカ"
original = "「えっと……フェニックス、さん？\u3000自分を消して欲しいって、どういう……？」"
translation = "「저기…… 페닉스 씨? 자신을 지워달라니 그게 무슨……?」"

[[dialogue]]
speaker = "フェニックス"
original = "「ホウちゃん、で構いません。フニが付けてくれた呼び名、私は気に入っているのです」"
translation = "「호우 짱이라도 상관없습니다. 후니가 붙여준 이름, 저는 마음에 들어 하니까요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「鳳凰のホウちゃん、という意味らしいです。人間界に伝わる鳳凰は吉兆……縁起のいい名前です」"
translation = "「봉황의 호우 짱이라는 의미라더군요. 인간계에 전해지는 봉황은 길조…… 상서로운 이름입니다.」"

[[dialogue]]
speaker = "セシア"
original = "「なら、ホウちゃん。ちゃんとあなたの事情を聞かせて欲しいわ」"
translation = "「그럼 호우 짱. 제대로 당신의 사정을 들려줬으면 해.」"

[[dialogue]]
speaker = "セシア"
original = "「わたくし、転生をしたことで、前世の蓄積のほとんど失ってしまっているの。だから、あなたのこともわたくしは思い出せないのよ」"
translation = "「저는 전생을 함으로써 전세의 축적 대부분을 잃어버렸어요. 그러니 당신에 대해서도 저는 떠올릴 수 없거든요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「そうでしたね」"
translation = "「그랬었죠.」"

[[dialogue]]
speaker = "unk"
original = "ラクシスのことも……\nどうして知っているんだ？"
translation = "라크시스에 대해서도…… 어떻게 알고 있는 거지?"

[[dialogue]]
speaker = "フェニックス"
original = "「幸い、この精神世界の中では、時間の流れが現実よりも遥かに遅い。まずは落ち着いて、その辺りのことを説明しましょう」"
translation = "「다행히 이 정신 세계 안에서는 시간의 흐름이 현실보다 훨씬 느립니다. 우선 진정하고 그 주변 일들을 설명하도록 하죠.」"

[[dialogue]]
speaker = "フェニックス"
original = "「――私はかつて３０００年前、当時の『クルセイダース』を率いた魔王『ラクシス』と共に、リクリエと戦ったことがあります」"
translation = "「――저는 과거 3000년 전, 당시의 『크루세이더스』를 이끌었던 마왕 『라크시스』와 함께 리크리에와 싸운 적이 있습니다.」"

[[dialogue]]
speaker = "セシア"
original = "「あなた、魔王と一緒に戦う仲間だったのね」"
translation = "「당신, 마왕과 함께 싸우던 동료였구나.」"

[[dialogue]]
speaker = "フェニックス"
original = "「ええ。――リクリエとの戦いが、終わるまでは」"
translation = "「네. ――리크리에와의 싸움이 끝나기 전까지는요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「私は……リクリエを撃退した後、アウクセシア――あなたと対立しました」"
translation = "「저는…… 리크리에를 격퇴한 후 아우크세시아―― 당신과 대립했습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「次のリクリエが来た時に負けない『強い世界』を作るには、淘汰や闘争の絶えない乱世を続けるべきだと、私は主張しました」"
translation = "「다음 리크리에가 왔을 때 지지 않을 『강한 세계』를 만들기 위해서는 도태나 투쟁이 끊이지 않는 난세를 지속해야 한다고 저는 주장했습니다.」"

[[dialogue]]
speaker = "ルルカ"
original = "「どうして、そんな……」"
translation = "「어째서 그런……」"

[[dialogue]]
speaker = "フェニックス"
original = "「闘争なき平和な世界では、決して強さを維持できないからです。そして、不死の力を持つ私と違って、生物には基本的に寿命が存在する」"
translation = "「투쟁 없는 평화로운 세계에서는 결코 강함을 유지할 수 없기 때문입니다. 그리고 불사의 힘을 가진 저와 달리 생물에게는 기본적으로 수명이 존재하죠.」"

[[dialogue]]
speaker = "フェニックス"
original = "「リクリエを生き抜いた世代の多くが寿命で居なくなった時、次に残る世代の多くは、リクリエの脅威を実感せずに過ごすこととなる」"
translation = "「리크리에를 이겨낸 세대 다수가 수명으로 사라졌을 때, 다음에 남을 세대 다수는 리크리에의 위협을 실감하지 못한 채 지내게 됩니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「それでは次の３０００年後にリクリエが訪れる時まで、強さを維持することなどできるはずがない」"
translation = "「그래서야 다음 3000년 후에 리크리에가 찾아올 때까지 강함을 유지하는 것 따위 가능할 리 없습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「だからこそ、私はヒトビトを争わせ続けるべきだと主張したのです」"
translation = "「그렇기에 저는 사람들로 하여금 계속해서 다투게 해야 한다고 주장했던 것입니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「――そんな私に対して、誰よりも反対を示したのが、守護天使アウクセシアでした」"
translation = "「――그런 저에 대해 누구보다 반대를 표명한 것이 수호천사 아우크세시아였습니다.」"

[[dialogue]]
speaker = "セシア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フェニックス"
original = "「私と彼女はやがて、魔界のこの場所で戦うことになり――結果として、敗れたのは私の方でした」"
translation = "「저와 그녀는 이윽고 마계의 이곳에서 싸우게 되었고―― 결과적으로 패배한 쪽은 저였습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「その時に、アウクセシアが言ったのです」"
translation = "「그때 아우크세시아가 말했죠.」"

[[dialogue]]
speaker = "フェニックス"
original = "「あなたにも未来を見て、そこで判断して欲しい――と」"
translation = "「당신도 미래를 보고 거기서 판단해 줬으면 한다――고.」"

[[dialogue]]
speaker = "フェニックス"
original = "「最終的に、アウクセシアが≪円環≫のラクシャの力を借りて、私に施したのが……」"
translation = "「최종적으로 아우크세시아가 ≪원환≫의 라크샤의 힘을 빌려 제게 시전한 것이……」"

[[dialogue]]
speaker = "セシア"
original = "「――『転生封印』だったのね」"
translation = "「――『전생 봉인』이었군요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「はい。未来に生まれて来る天使の中に存在を宿す――」"
translation = "「네. 미래에 태어날 천사 안에 존재를 깃들게 하는――」"

[[dialogue]]
speaker = "ルルカ"
original = "「それがフニちゃん……！」"
translation = "「그게 후니 짱……!」"

[[dialogue]]
speaker = "フェニックス"
original = "「私はアウクセシアと本気で戦い負けた身。故に勝者である彼女の言う未来を観測しようと思い、その封印を受け入れました」"
translation = "「저는 아우크세시아와 전력으로 싸워 패배한 몸. 고로 승자인 그녀가 말하는 미래를 관측하고자 그 봉인을 받아들였습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「しかし、誤算が１つありました」"
translation = "「하지만 오산이 하나 있었습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「他人の中に宿るというのが一体どういうことなのか、私は予想できていなかったのです」"
translation = "「타인 안에 깃든다는 것이 대체 어떤 것인지 저는 예상하지 못했던 것입니다.」"

[[dialogue]]
speaker = "unk"
original = "思い出すように目を細めながら、魔獣フェニックスは続きを語る。"
translation = "회상하듯 눈을 가늘게 뜨며 마수 페닉스는 이야기를 이어갔다."

[[dialogue]]
speaker = "フェニックス"
original = "「――私がフニの中で目覚めたのは、彼女の最初の故郷がモンスターに襲われた時です」"
translation = "「――제가 후니 안에서 깨어난 건 그녀의 첫 번째 고향이 몬스터에게 습격당했을 때입니다.」"

[[dialogue]]
speaker = "ルルカ"
original = "「最初の故郷……？」"
translation = "「첫 번째 고향……?」"

[[dialogue]]
speaker = "フェニックス"
original = "「彼女は北海道の孤児院で世話になる前、別の村に両親と住んでいたのです。フニにとっては、物心がつくよりも以前の話になります」"
translation = "「그녀는 홋카이도 고아원에서 보살핌을 받기 전, 다른 마을에서 부모님과 살고 있었습니다. 후니에게는 철이 들기 전의 이야기입니다.」"

[[dialogue]]
speaker = "unk"
original = "その村は……？"
translation = "그 마을은……?"

[[dialogue]]
speaker = "フェニックス"
original = "「……突然変異の、学園の基準ではＳランクに相当するモンスターでした。村唯一の星騎士であったフニの母親も敵わずに、住人は全滅」"
translation = "「……돌연변이인, 학원 기준으로는 S랭크에 상당하는 몬스터였습니다. 마을 유일의 성기사였던 후니의 어머니도 당해내지 못하고 주민들은 전멸.」"

[[dialogue]]
speaker = "フェニックス"
original = "「最後の生き残りであった幼いフニも瀕死状態でした。私が目覚めたのはその時」"
translation = "「마지막 생존자였던 어린 후니도 빈사 상태였습니다. 제가 깨어난 건 그때.」"

[[dialogue]]
speaker = "フェニックス"
original = "「意識を失ったフニの代わりに、私がモンスターを倒しました。フニは事件の奇跡的な生存者として、別の村の孤児院で過ごすことになります」"
translation = "「의식을 잃은 후니 대신 제가 몬스터를 쓰러뜨렸습니다. 후니는 사건의 기적적인 생존자로서 다른 마을의 고아원에서 지내게 됩니다.」"

[[dialogue]]
speaker = "ルルカ"
original = "「フニちゃん、そんな辛い経験があったなんて……」"
translation = "「후니 짱, 그런 아픈 경험이 있었구나……」"

[[dialogue]]
speaker = "フェニックス"
original = "「ですが……驚いたのは、彼女の心の強さです」"
translation = "「하지만…… 놀라운 것은 그녀의 마음의 강함입니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「赤ん坊の頃に事故に遭い、両親を失っているにも関わらず、彼女がその件で泣くことは決してありませんでした」"
translation = "「갓난아기 시절에 사고를 당해 부모님을 잃었음에도 불구하고 그녀가 그 일로 우는 일은 결코 없었습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「フニはその見た目からは信じられない程に……強い心を持っていました。亡くなった両親の分も立派に生きようと、前を向いて進むことを選んだのです」"
translation = "「후니는 그 겉모습으로는 믿기지 않을 정도로…… 강한 마음을 가지고 있었습니다. 돌아가신 부모님의 몫까지 훌륭하게 살아가겠노라며 앞을 향해 나아가는 것을 선택했죠.」"

[[dialogue]]
speaker = "フェニックス"
original = "「そんな彼女の健気な姿に、周りの大人も感化されていきました。村の全員が家族のように、フニのことを可愛がるようになったんです」"
translation = "「그런 그녀의 기특한 모습에 주변 어른들도 감화되어 갔습니다. 마을 사람 모두가 가족처럼 후니를 귀여워하게 되었죠.」"

[[dialogue]]
speaker = "フェニックス"
original = "「そしてそれは――私も同じでした」"
translation = "「그리고 그것은―― 저도 마찬가지였습니다.」"

[[dialogue]]
speaker = "unk"
original = "その時、俺は気づく。思い出しながら語るフェニックス――ホウちゃんの目が、とても優しいものであることに。"
translation = "그때 나는 깨달았다. 지난날을 회상하며 이야기하는 페닉스―― 호우 짱의 눈이 무척이나 자애롭다는 것을."

[[dialogue]]
speaker = "セシア"
original = "「ああ……今わかったわ。ホウちゃん、あなた――」"
translation = "「아아…… 이제 알겠어요. 호우 짱, 당신――」"

[[dialogue]]
speaker = "セシア"
original = "「いつの間にか、フニの<b>ママ</b>になっていたのね」"
translation = "「어느새 후니의 <b>마마</b>가 되어 있었군요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「――ママ、と言えるほど、大層なものではありません。ですが、そうですね……フニのことを娘のように愛おしく思うようになっていたことは、否定しません」"
translation = "「――마마라고 할 정도로 대단한 존재는 아닙니다. 하지만 그렇군요…… 후니를 딸처럼 사랑스럽게 여기게 되었다는 점은 부정하지 않겠습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「それからの経緯は、先日フニがあなた達に話していた通りです」"
translation = "「그 이후의 경위는 요전번 후니가 당신들에게 이야기했던 대로입니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「フニは街に買い物へ出かけた際、再びモンスターの襲撃事件に遭遇し……通りがかった<b>見知らぬ子供を庇って</b>、瀕死の重傷を負いました」"
translation = "「후니는 시내에 장을 보러 나갔을 때 다시 한번 몬스터 습격 사건을 마주했고…… 지나가던 <b>모르는</b> <b>아이를</b> <b>지키려다</b> 빈사의 중상을 입었습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「当時のフニは、星力にも目覚めていない……ごくごく普通の一般市民だったというのに」"
translation = "「당시의 후니는 성력조차 눈뜨지 않은…… 아주 평범한 일반 시민이었는데도 말이죠.」"

[[dialogue]]
speaker = "セシア"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "フェニックス"
original = "「そこで私の封印が更に緩んで、フニは星力に目覚めました。そして私とも、意志疎通ができるようになりました」"
translation = "「거기서 제 봉인이 더욱 느슨해졌고 후니는 성력에 눈을 떴습니다. 그리고 저와도 의사소통을 할 수 있게 되었죠.」"

[[dialogue]]
speaker = "フェニックス"
original = "「フニと直接話ができるようになった時は、それはもう嬉しかった」"
translation = "「후니와 직접 대화할 수 있게 되었을 때는 정말로 기뻤습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「できれば、このまま彼女が成長して行くのを、ずっと見守っていたかった……」"
translation = "「할 수만 있다면 이대로 그녀가 성장해가는 것을 계속 지켜보고 싶었습니다……」"

[[dialogue]]
speaker = "フェニックス"
original = "「ですが、現実はそう上手くは行きませんでした……」"
translation = "「하지만 현실은 그리 호락호락하지 않았습니다……」"

[[dialogue]]
speaker = "フェニックス"
original = "「アウクセシアの転生封印は、もともと私とフニが対等の状態で共存できるようには、作られていなかったのです」"
translation = "「아우크세시아의 전생 봉인은 원래 저와 후니가 대등한 상태로 공존할 수 있도록 만들어진 것이 아니었습니다.」"

[[dialogue]]
speaker = "セシア"
original = "「あなたの姿を実際に見て、術式の内容がわかったわ。元々はあなたの力は表に出て来ず、あくまでフニの体の中から世界を観測するだけのはずだった」"
translation = "「당신의 모습을 실제로 보니 술식의 내용이 이해가 가요. 원래 당신의 힘은 겉으로 드러나지 않고 어디까지나 후니의 몸속에서 세계를 관측할 뿐이었어야 했죠.」"

[[dialogue]]
speaker = "セシア"
original = "「そうして、フニが寿命を全うした時、初めて封印が解けて、元の姿で外に出られるはずだったのね」"
translation = "「그렇게 후니가 수명을 다했을 때 비로소 봉인이 풀려 원래 모습으로 밖으로 나올 수 있었을 거예요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「ええ。私は不死鳥ですから……」"
translation = "「네. 저는 불사조니까요……」"

[[dialogue]]
speaker = "セシア"
original = "「だけど、意図しない形で封印が緩んでしまった。フニが過去に２度、<b>リクリエのモンスターによって</b>死にかけたことで」"
translation = "「하지만 의도치 않은 형태로 봉인이 풀리고 말았어. 후니가 과거에 두 번, <b>리크리에의</b> <b>몬스터</b> <b>때문에</b> 죽을 뻔하면서.」"

[[dialogue]]
speaker = "フェニックス"
original = "「私とフニの力関係は、これまで奇跡的に、絶妙なバランスで保たれていたのです。しかし――」"
translation = "「저와 후니의 힘의 관계는 지금까지 기적적으로 절묘한 밸런스를 유지해왔습니다. 하지만――」"

[[dialogue]]
speaker = "セシア"
original = "「フニが新たな力――クリスマスフォームを手に入れたことで、更にあなたの力を引き出せるようになった」"
translation = "「후니가 새로운 힘―― 크리스마스 폼을 얻음으로써 더욱 당신의 힘을 끌어낼 수 있게 되었죠.」"

[[dialogue]]
speaker = "フェニックス"
original = "「はい。その結果……ついにバランスが崩れてしまったのです」"
translation = "「네. 그 결과…… 마침내 밸런스가 무너지고 만 것입니다.」"

[[dialogue]]
speaker = "ルルカ"
original = "「それって……このままだと、どうなっちゃうの！？」"
translation = "「그거…… 이대로라면 어떻게 되는 거야!?」"

[[dialogue]]
speaker = "フェニックス"
original = "「……フニと私が完全に融合して、フニの精神が消滅します」"
translation = "「……후니와 제가 완전히 융합하여 후니의 정신이 소멸하게 됩니다.」"

[[dialogue]]
speaker = "unk"
original = "なっ……！？"
translation = "뭐라고……!?"

[[dialogue]]
speaker = "フェニックス"
original = "「私の力に、フニの精神が耐え切れないのです。このままでは、フニの体に私の精神だけが残る形になります」"
translation = "「제 힘을 후니의 정신이 견뎌내지 못하는 것입니다. 이대로라면 후니의 몸에 제 정신만 남는 형태가 됩니다.」"

[[dialogue]]
speaker = "ルルカ"
original = "「そんな……！」"
translation = "「말도 안 돼……!」"

[[dialogue]]
speaker = "フェニックス"
original = "「だからこそ……セシア。あなたにお願いしたくて、ここへ呼んだのです」"
translation = "「그렇기에…… 세시아. 당신에게 부탁하고 싶어 이곳으로 불렀습니다.」"

[[dialogue]]
speaker = "フェニックス"
original = "「フニの精神が消滅してしまう前に――私という存在を消して下さい」"
translation = "「후니의 정신이 소멸하기 전에―― 저라는 존재를 지워주십시오.」"

[[dialogue]]
speaker = "フェニックス"
original = "「『蓄積』を司る守護天使のあなたならば、それができる。不死の力を持つ私であっても、存在の『蓄積』をゼロにすることで、完全消滅させることが」"
translation = "「『축적』을 관장하는 수호천사인 당신이라면 그것이 가능합니다. 불사의 힘을 지닌 저라 할지라도 존재의 『축적』을 제로로 만듦으로써 완전 소멸시키는 것이.」"

[[dialogue]]
speaker = "セシア"
original = "「……待ちなさい。いくらわたくしでも、そこまで強力な霊術は扱えないわ」"
translation = "「……잠깐 기다리세요. 아무리 저라 해도 그렇게 강력한 영술은 다룰 수 없어요.」"

[[dialogue]]
speaker = "フェニックス"
original = "「確かに、通常なら意思を持つ相手の存在、『蓄積』を一方的に奪うことはできないでしょう。ですが、私自身がその術に協力的であれば可能なはず。違いますか？」"
translation = "「확실히 통상적이라면 의지를 지닌 상대의 존재, 『축적』을 일방적으로 빼앗을 수는 없겠죠. 하지만 저 자신이 그 술식에 협조적이라면 가능할 터입니다. 아닙니까?」"

[[dialogue]]
speaker = "セシア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ルルカ"
original = "「ま、待って！\u3000そんなことしなくても、例えば封印をもう１度かけ直すとか、そういうのはできないの？」"
translation = "「잠, 잠깐만! 그렇게 하지 않아도 예를 들어 봉인을 다시 한번 건다거나 그런 건 못 하는 거야?」"

[[dialogue]]
speaker = "フェニックス"
original = "「残念ながら、それは無理なのです、ルルカ。何故なら今のセシアには、昔ほどの力はない」"
translation = "「안타깝게도 그것은 불가능합니다, 루루카. 왜냐하면 지금의 세시아에게는 예전만큼의 힘은 없으니까요.」"

[[dialogue]]
speaker = "セシア"
original = "「ええ、そうね。フニにかけてある封印をどうにかするのは、今のわたくしでは力不足……」"
translation = "「네, 맞아요. 후니에게 걸려 있는 봉인을 어떻게 하는 건 지금의 저로서는 역부족……」"

[[dialogue]]
speaker = "フェニックス"
original = "「ですが、蓄積を増やすことはできなくとも、蓄積を減らすことはできる。だから、その力で私の蓄積をゼロにして欲しいのです」"
translation = "「하지만 축적을 늘리는 것은 못 해도 축적을 줄이는 것은 가능하죠. 그러니 그 힘으로 제 축적을 제로로 만들어 주십시오.」"

[[dialogue]]
speaker = "セシア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "フェニックス"
original = "「お願いします。セシア、どうかフニの為に、私を――」"
translation = "「부탁합니다. 세시아, 부디 후니를 위해서 저를――」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "바로 그때였다."

[[dialogue]]
speaker = "フェニエル"
original = "「そんなの、ダメーーーーーーーーーっ！！！」"
translation = "「그런 건 안 돼ーーーーーーーーー엣!!!」"

[[dialogue]]
speaker = "フェニックス"
original = "「っ！？\u3000この声は、フニ……！？」"
translation = "「윽!? 이 목소리는 후니……!?」"

[[dialogue]]
speaker = "unk"
original = "精神世界に、昏睡状態だったはずの彼女の声が響き渡るのだった――"
translation = "정신 세계에 혼수상태였을 그녀의 목소리가 울려 퍼졌다――"

