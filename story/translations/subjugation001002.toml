[[dialogue]]
speaker = "unk"
original = "小さい体になった俺や守護天使の２人。そのことについて、アニマ先輩から話を聞くと――"
translation = "작은 몸이 된 나와 수호천사 두 사람. 그 일에 대해 아니마 선배에게 이야기를 들어보니──"

[[dialogue]]
speaker = "アニマ"
original = "「会長たちがいま使っている体は、アニマが何かあった時の予備として作っておいたスペアボディ『幼アバター』だヨ」"
translation = "「회장 일행이 지금 쓰고 있는 몸은 아니마가 무슨 일이 있을 때를 대비해 만들어 둔 예비 보디 『어린 아바타』다타.」"

[[dialogue]]
speaker = "アニマ"
original = "「アステラの中で謎の新種モンスターと戦った際、会長たちの本体はリクリエの瘴気を浴びて、汚染されてしまった」"
translation = "「아스텔라 안에서 수수께끼의 신종 몬스터와 싸웠을 때, 회장 일행의 본체는 리크리에의 장기를 뒤집어쓰고 오염되어 버렸타.」"

[[dialogue]]
speaker = "アニマ"
original = "「アニマが検査したところ、それの除去には、どうやら時間がかかりそうでネ」"
translation = "「아니마가 검사한 결과, 그것의 제거에는 아무래도 시간이 걸릴 것 같아서 말이타.」"

[[dialogue]]
speaker = "アニマ"
original = "「そこで一時的に、幼アバターに精神を移して、活動できるようにしたというわけダ」"
translation = "「그래서 일시적으로 어린 아바타에 정신을 옮겨서 활동할 수 있게 한 것이타.」"

[[dialogue]]
speaker = "unk"
original = "保健室の他のベッドを見やると、確かに俺や、マグダレナさん、アルモタヘルさんの元々の体が寝かされていた。"
translation = "보건실의 다른 침대들을 보니 확실히 나와 마그달레나 씨, 아르모타헬 씨의 원래 몸이 뉘여 있었다."

[[dialogue]]
speaker = "unk"
original = "でも、どうして小さい体に？"
translation = "그런데 왜 작은 몸으로?"

[[dialogue]]
speaker = "アニマ"
original = "「そんなの決まっているダロウ？」"
translation = "「그거야 뻔하지 않타?」"

[[dialogue]]
speaker = "アニマ"
original = "「アニマの趣味ダ♪\u3000小さい姿も楽しめた方がお得ダロウ？\u3000フヒ♪」"
translation = "「아니마의 취향이타♪ 작은 모습도 즐길 수 있는 편이 이득이지 않겠나? 후히♪」"

[[dialogue]]
speaker = "unk"
original = "えぇ……"
translation = "에휴……."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ふふ♪\u3000でも、小さくなった会長さまも、とても可愛らしいですよ♪」"
translation = "「후후♪ 하지만 작아진 회장님도 정말 사랑스러워요♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「思わず、私の中にある『ママになりたい欲』が溢れてきてしまいます♪」"
translation = "「무심코 제 안에 있는 『엄마가 되고 싶은 욕구』가 넘쳐흐르고 마네요♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「うむ！\u3000アルモたん的にも、よく似合っていると思うぞ、会長！\u3000ちょうど我らと同い年くらいの外見になった感じだな！」"
translation = "「음! 알모땅적으로도 아주 잘 어울린다고 생각한다, 회장! 딱 우리랑 동갑 정도의 외형이 된 느낌이군!」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そう思ったら、早く一緒に遊びたくなってきたのだ♪」"
translation = "「그렇게 생각하니 빨리 같이 놀고 싶어진 것이다♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――あら？\u3000会長さま、どうかされました？」"
translation = "「──어라? 회장님, 왜 그러세요?」"

[[dialogue]]
speaker = "unk"
original = "なんか２人とも……性格が変わってない？"
translation = "왠지 두 사람 다…… 성격이 변하지 않았어?"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そうか？\u3000アニマからも同じことを言われたのだ。でも、う～む……アルモたん的には普段通りのつもりなのだが……」"
translation = "「그런가? 아니마에게도 같은 말을 들은 것이다. 하지만, 으음…… 알모땅적으로는 평소대로인 셈이다만……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「あ！\u3000でも確かに、この姿になってから初めて、附属校に通ってみたいと思ったのだ！」"
translation = "「아! 하지만 확실히 이 모습이 되고 나서 처음으로 부속교에 다니고 싶다고 생각한 것이다!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「私もです♪\u3000性格がどう変わったのかは、自身ではよくわかりませんが、今までよりも新鮮な気持ちが溢れてくるというか……」"
translation = "「저도요♪ 성격이 어떻게 변했는지는 스스로 잘 모르겠지만, 지금까지보다 신선한 기분이 넘쳐흐른다고나 할까……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「アルモタヘルと２人でアニマさまに相談して、流星学園附属校に体験入学させてもらえることになったんです」"
translation = "「아르모타헬과 둘이서 아니마 님께 상담해서 유성학원 부속교에 체험 입학을 할 수 있게 되었답니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「フィオナ会長に守護天使２人が望んでいると話してみたら、快く手続きの協力をしてくれたヨ♪」"
translation = "「피오나 회장에게 수호천사 두 사람이 원하고 있다고 말해봤더니 흔쾌히 절차 협조를 해줬타♪」"

[[dialogue]]
speaker = "アニマ"
original = "「これはアニマの推測だガ、２人の『魂』は、小さくなった『体』に引っ張られているのかもしれナイ」"
translation = "「이건 아니마의 추측이타만, 두 사람의 『영혼』은 작아진 『몸』에 이끌리고 있는 것일지도 모르겠타.」"

[[dialogue]]
speaker = "アニマ"
original = "「アバターを切り替えた副作用とも言い換えられるかもしれないナ。実に興味深い現象ダ」"
translation = "「아바타를 교체한 부작용이라고 말할 수도 있겠타. 실로 흥미로운 현상이타.」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「そうだ、いいことを思い付いたのだ！\u3000会長もせっかく小さくなったのだから、アルモたんと一緒に附属校体験をしてみるのはどうだ？」"
translation = "「맞다, 좋은 생각이 난 것이다! 회장도 모처럼 작아졌으니 알모땅이랑 같이 부속교 체험을 해보는 건 어떠냐?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「まあ！\u3000それは面白そうですね♪\u3000アニマさま、会長さまの制服を作ることは可能でしょうか？」"
translation = "「어머! 그거 재미있을 것 같네요♪ 아니마 님, 회장님의 교복을 만드는 것도 가능할까요?」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ♪\u3000アルモたんとマグたんが附属校に通いたいと言い出した時から、こんなこともあろうかと準備をしていたヨ♪」"
translation = "「후히♪ 알모땅이랑 마그땅이 부속교에 다니고 싶다고 말했을 때부터 이런 일이 있을 줄 알고 준비해 뒀타♪」"

[[dialogue]]
speaker = "アニマ"
original = "「というわけで――附属校の制服～♪」"
translation = "「그런 의미에서── 부속교 교복이타~♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっと待って！\u3000それ女子用の制服ですよね！？"
translation = "잠깐 기다려요! 그거 여자용 교복이죠!?"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ♪\u3000そっちの方が、更に面白いダロウ？」"
translation = "「후히♪ 그쪽이 훨씬 더 재미있지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "翌日。流星学園附属校にて――"
translation = "다음 날. 유성학원 부속교에서──"

[[dialogue]]
speaker = "ナミエル"
original = "「え……！？」"
translation = "「에……!?」"

[[dialogue]]
speaker = "unk"
original = "１年Ｃ組に所属するナミエル・クレシェンテは、驚きで瞳を見開く。"
translation = "1학년 C반에 소속된 나미엘 크레셴테는 놀라움에 눈을 크게 뜬다."

[[dialogue]]
speaker = "アルモタヘル（幼少）"
original = "「――そういう事情があって、今日から附属校に通うことになった、守護天使のアルモタヘルなのだ！\u3000気軽にアルモたんって呼んでくれると嬉しいぞ♪」"
translation = "「──그런 사정이 있어서 오늘부터 부속교에 다니게 된 수호천사 아르모타헬인 것이다! 편하게 알모땅이라고 불러주면 기쁘겠다♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「同じく、小さくなった守護天使のマグダレナです～。私のことも、気軽にママダレナって呼んでくれると嬉しいかな、なんて♪\u3000うふふっ<emoji=heart04>」"
translation = "「마찬가지로 작아진 수호천사 마그달레나예요~. 저도 편하게 마마달레나라고 불러주시면 기쁠까나, 하고♪ 우후훗♡」"

[[dialogue]]
speaker = "unk"
original = "守護天使の２人が転入してきたことにも、もちろん驚いたナミエルだが、それ以上に――"
translation = "수호천사 두 사람이 전입해 온 것에도 물론 놀란 나미엘이지만, 그 이상으로──"

[[dialogue]]
speaker = "ナミエル"
original = "（な、なんて可愛らしい子なんでしょう……）"
translation = "(어, 어쩜 저렇게 사랑스러운 아이일까요……)"

[[dialogue]]
speaker = "unk"
original = "彼女が、ぽーっと見惚れてしまったのは、もう１人の女子生徒だった。"
translation = "그녀가 멍하니 넋을 잃고 본 것은 또 다른 한 명의 여학생이었다."

[[dialogue]]
speaker = "ナミエル"
original = "（長くて艶やかな黒髪、星の輝きを内包したかのような綺麗な瞳……それに、スタイルも抜群で……）"
translation = "(길고 윤기 나는 흑발, 별의 반짝임을 내포한 듯한 예쁜 눈동자…… 게다가 스타일도 발군이고……)"

[[dialogue]]
speaker = "unk"
original = "は、初めまして。緋宮クロトです"
translation = "처, 처음 뵙겠습니다. 히노미야 쿠로토예요."

[[dialogue]]
speaker = "ナミエル"
original = "（クロトさんっていうんですね……親しみを感じる、いい名前です）"
translation = "(쿠로토 씨라고 하는군요…… 친근함이 느껴지는 좋은 이름이에요)"

[[dialogue]]
speaker = "ナミエル"
original = "（……ん？\u3000クロト……？\u3000緋宮クロトって……）"
translation = "(……응? 쿠로토……? 히노미야 쿠로토라면……)"

[[dialogue]]
speaker = "unk"
original = "その……中身は、新星学園の会長です"
translation = "그…… 알맹이는 신성학원의 회장입니다."

[[dialogue]]
speaker = "ナミエル"
original = "「って、ええぇっ！？」"
translation = "「어, 에에엣!?」"

[[dialogue]]
speaker = "ナミエル"
original = "「緋宮会長～～～っ！？！？」"
translation = "「<u>히노미야</u> 회장님~~~!?!?」"

[[dialogue]]
speaker = "unk"
original = "思わず他のクラスメイト達と一緒に立ち上がって、叫んでしまうナミエルなのであった。"
translation = "나미엘은 다른 클래스메이트들과 함께 벌떡 일어나 비명을 지르고 말았다."

