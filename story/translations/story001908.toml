[[dialogue]]
speaker = "ソフィア"
original = "「舞亜、こんなところに呼び出してどうしたの？」"
translation = "「마아, 이런 곳에 불러내서 무슨 일이야?」"

[[dialogue]]
speaker = "舞亜"
original = "「これは今までに着たことない巫女衣装が、ヒントになったんだけど……オオヒメさんに神様を呼ぶ踊り──神楽を捧げようと思うんだ」"
translation = "「이건 지금까지 입어본 적 없는 무녀 의상이 힌트가 된 건데…… 오오히메 씨에게 신을 부르는 춤── 카구라를 바치려고 해♥」"

[[dialogue]]
speaker = "舞亜"
original = "「でも、それをやるには、私ひとりじゃ体が足りない。みんな、力を貸して。お願いします」"
translation = "「하지만 그걸 하려면 나 혼자서는 몸이 부족해. 다들 힘을 빌려줘. 부탁할게♥」"

[[dialogue]]
speaker = "unk"
original = "何か考えがあるんだ？"
translation = "「무슨 생각이라도 있는 거야?」"

[[dialogue]]
speaker = "舞亜"
original = "「うん。もう一度、オオヒメさんに私の……私たちの演技を見せつける。星術を使った、私たちにしかできない神楽舞を」"
translation = "「응. 다시 한번 오오히메 씨에게 나의…… 우리의 연기를 보여줄 거야. 성술을 사용한, 우리만이 할 수 있는 카구라 춤을♥」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んん～？\u3000それならもうやったでしょ？」"
translation = "「응응~? 그건 이미 했잖아?」"

[[dialogue]]
speaker = "舞亜"
original = "「ううん、自信のある演技を披露しただけで、あれは神楽舞じゃない。それにあれは『星術でリンクを再現したフィギュアスケート』。氷でリンクを作っただけだよ」"
translation = "「아니, 자신 있는 연기를 선보였을 뿐이지 그건 카구라 춤이 아니야. 게다가 그건 『성술로 링크를 재현한 피겨 스케이트』. 얼음으로 링크를 만들었을 뿐이야♥」"

[[dialogue]]
speaker = "舞亜"
original = "「これからやろうとしているのは『星術とスケートをフル活用した舞台』……テーマパークとかであるよね。なんだっけ……プロテクション……ラッピング……？」"
translation = "「이제부터 하려는 건 『성술과 스케이트를 풀 활용한 무대』…… 테마파크 같은 곳에 있잖아. 뭐였더라…… 프로텍션…… 래핑……?♥」"

[[dialogue]]
speaker = "トリシャ"
original = "「プロテクション……？\u3000防御系の星術でしょうか……」"
translation = "「프로텍션……? 방어계 성술 말씀이신가요……」"

[[dialogue]]
speaker = "舞亜"
original = "「じゃなくて、ほら、映像を、こう、スクリーンに映して……？\u3000火が出たり、水が出たり、花が咲いたり……」"
translation = "「그게 아니라, 있잖아, 영상을 이렇게 스크린에 비춰서……? 불이 나오거나, 물이 나오거나, 꽃이 피거나……♥」"

[[dialogue]]
speaker = "unk"
original = "プロジェクション・マッピング？"
translation = "「프로젝션 맵핑?」"

[[dialogue]]
speaker = "舞亜"
original = "「それそれ。星術で舞台を作るだけじゃなくて、キラキラな演出に使用するの」"
translation = "「그거 그거. 성술로 무대를 만드는 것뿐만 아니라, 반짝거리는 연출에 사용하는 거야♥」"

[[dialogue]]
speaker = "舞亜"
original = "「大会後にエキシヴィションであるんだよね。審査を度外視した、ただ楽しいだけのフィギュアスケート」"
translation = "「대회 후에 갈라쇼 같은 게 있잖아. 심사를 도외시한, 그저 즐겁기만 한 피겨 스케이트♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「男女の役を入れ替えたり、漫画やアニメのキャラのコスプレをしたりとか。お祭りみたいな感じなんです」"
translation = "「남녀의 역할을 바꾸거나, 만화나 애니메이션 캐릭터 코스프레를 하거나 하는 것 말이죠. 축제 같은 느낌이에요.」"

[[dialogue]]
speaker = "舞亜"
original = "「ソフィ、さっき言ってたよね。私の演技は完璧だったけど、あれを超える『個人技』なんて考えつかないって」"
translation = "「소피, 아까 말했지. 내 연기는 완벽했지만 그걸 뛰어넘는 『개인 기술』 같은 건 생각도 못 하겠다고♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「……言ってたかな。言ってたかも」"
translation = "「……그랬었나. 그랬던 것 같기도 하고.」"

[[dialogue]]
speaker = "舞亜"
original = "「私の演技は大会用の個人技に偏りすぎてたんだ。勝つための表現にばかり特化していた」"
translation = "「내 연기는 대회용 개인 기술에 너무 치우쳐 있었어. 이기기 위한 표현에만 특화되어 있었지♥」"

[[dialogue]]
speaker = "舞亜"
original = "「個人技である必要はない。だって、メダルを狙うための正確な演技じゃなくって、人を喜ばせるための隠し芸なんだから。力を合わせた団体競技でいいんだよね」"
translation = "「개인 기술일 필요는 없어. 왜냐면 메달을 따기 위한 정확한 연기가 아니라, 사람을 기쁘게 하기 위한 장기 자랑이니까. 힘을 합친 단체 경기면 되는 거지♥」"

[[dialogue]]
speaker = "舞亜"
original = "「だから、力を貸して。お願いします」"
translation = "「그러니까 힘을 빌려줘. 부탁할게♥」"

[[dialogue]]
speaker = "ウズメイア"
original = "「モチのロ～ン！」"
translation = "「물론이~지!」"

[[dialogue]]
speaker = "ソフィア"
original = "「そういうことならいくらでも。頼りにされるのは嬉しいから」"
translation = "「그런 거라면 얼마든지요. 의지가 된다는 건 기쁜 일이니까요.」"

[[dialogue]]
speaker = "舞亜"
original = "「ありがと。じゃあ早速、練習するから、会長さんは他の人たちに話を通してくれると──」"
translation = "「고마워. 그럼 바로 연습할 테니까, 회장님은 다른 사람들에게 이야기를 좀 전해줘──♥」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「話は全て聞かせてもらったわ！\u3000つまり、私たちが派手派手な舞台装置になればいいのね！」"
translation = "「이야기는 다 들었어! 즉, 우리가 화려한 무대 장치가 되면 된다는 거지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「すみません……立ち聞きはよくないと思いつつ」"
translation = "「죄송합니다…… 엿듣는 건 좋지 않다고 생각하면서도.」"

[[dialogue]]
speaker = "トリシャ"
original = "「友達が困っていたら……救いの手を差し出すのが、ゆ、友情というものです……にへ、にへへ」"
translation = "「친구가 곤란해하면…… 구원의 손길을 내미는 것이 우, 우정이라는 것입니다…… 니헤, 니헤헤.」"

[[dialogue]]
speaker = "舞亜"
original = "「むしろ、説明とお願いをする手間が省けて良かった。えっと……お願いしても？」"
translation = "「오히려 설명하고 부탁하는 수고를 덜어서 다행이네. 저기…… 부탁해도 될까?♥」"

[[dialogue]]
speaker = "フィオナ"
original = "「もちろんです、舞亜さん。喜んで協力させてもらいます」"
translation = "「물론입니다, 마아 씨. 기꺼이 협력하겠습니다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長たちがいてくれるだけで心強いです。皆さん、スケートの経験は？」"
translation = "「회장님들이 계셔주시는 것만으로도 든든해요. 여러분, 스케이트 경험은요?」"

[[dialogue]]
speaker = "トリシャ"
original = "「氷に覆われてるレゾフではアイススケートも盛んではありましたが……私はまったく……申し訳ありません、お役に立てず……」"
translation = "「얼음으로 덮인 레조프에서는 아이스 스케이트도 활발하긴 했습니다만…… 저는 전혀…… 죄송합니다, 도움이 되지 못해서……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしはお遊びでちょっとやったことあるくらい～。舞亜たちみたいに空中３回スピンなんてできないよ～？」"
translation = "「나는 놀이 삼아 조금 해본 정도야~. 마아 너희처럼 공중 3회전 스핀 같은 건 못 한다구~?」"

[[dialogue]]
speaker = "舞亜"
original = "「少し滑れるくらいで問題ないよ。競技じゃないから高難度技は……ちょっとしか入れないし」"
translation = "「조금 미끄러질 수 있는 정도면 문제없어. 경기가 아니니까 고난도 기술은…… 조금밖에 안 넣을 거니까♥」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ちょっとは入れるんだ～！？」"
translation = "「조금은 넣는다는 거야~!?」"

[[dialogue]]
speaker = "舞亜"
original = "「本当に難しいところは私とソフィでなんとかするよ」"
translation = "「정말 어려운 부분은 나랑 소피가 어떻게든 할게♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうやって、しれっと無茶振りしてくるんだから……まぁ、でも、やる」"
translation = "「그렇게 슬쩍 억지 부린다니까…… 뭐, 그래도 할게.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうと決まれば、悠長にしてる時間はないわね！\u3000今から特訓よ！\u3000そのためにアリーナを借り切ったんでしょ？」"
translation = "「그렇게 결정됐으면 꾸물거릴 시간은 없네! 지금부터 특훈이야! 그러려고 아레나를 통째로 빌린 거잖아?」"

[[dialogue]]
speaker = "舞亜"
original = "「会長さんは全体的な仕上がりを客観的に見て、遠慮なくダメ出しして。フィギュアチームのプロデュース、よろしくね」"
translation = "「회장님은 전체적인 완성을 객관적으로 보고 사양 말고 지적해 줘. 피겨 팀의 프로듀싱, 잘 부탁해♥」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そのくらい、アイドルプロデュース経験もあるクロトならお茶の子さいさいね！」"
translation = "「그 정도는 아이돌 프로듀싱 경험도 있는 쿠로토라면 식은 죽 먹기지!」"

[[dialogue]]
speaker = "ソフィア"
original = "「えっ、そうなんですか。新星の会長さんはなんでもやられてるんですね」"
translation = "「엣, 그런가요. 신성의 회장님은 뭐든지 다 하시네요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんたって、あの『アーネスト』の名付け親はクロトだもの！\u3000海賊船に乗ったつもりで安心なさい！」"
translation = "「그럼, 저 『어니스트』의 이름을 지어준 사람이 쿠로토인걸! 해적선에 탔다 생각하고 안심하렴!」"

[[dialogue]]
speaker = "unk"
original = "そして、即席フィギュアスケートチームの短期特訓が始まった。"
translation = "그리고 즉석 피겨 스케이트 팀의 단기 특훈이 시작되었다."

[[dialogue]]
speaker = "unk"
original = "ウズメ、立ち位置ズレてるよ\n舞亜、ソフィア、急かしすぎ"
translation = "「우즈메, 서 있는 위치가 어긋났어. 마아, 소피아, 너무 서두르지 마.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んひぃ～、覚えること多すぎ～っ！」"
translation = "「히익~, 외울 게 너무 많아~!」"

[[dialogue]]
speaker = "舞亜"
original = "「ごめん、みんなに無茶させちゃってる？\u3000もう少し難易度を下げても──」"
translation = "「미안, 다들 너무 무리시키고 있나? 난이도를 조금 낮춰도──♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「大丈夫。思ってたよりペース早いし、これならすぐ形にできるよ」"
translation = "「괜찮아. 생각보다 페이스가 빠르고, 이 정도면 금방 모양이 잡힐 거야.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ソフィってば乗せ上手なんだから～。んしっ、もう一本ふぁいとっ！」"
translation = "「소피는 정말 사람 잘 부린다니까~. 읏샤, 한 번 더 화이팅!」"

[[dialogue]]
speaker = "フィオナ"
original = "「皆の走った軌跡を、星術で彩る……思っていた以上に精密な星力操作を要求されますね……！」"
translation = "「모두가 달린 궤적을 성술로 수놓는다…… 생각했던 것보다 더 정밀한 성력 조작을 요구받는군요……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ここで一発、花火をドーン！\u3000ほら、フィオナもやりなさい！\u3000さっきの恥ずかしさを吹っ飛ばすつもりで！」"
translation = "「여기서 한 방, 불꽃을 콰앙! 자, 피오나도 해! 아까의 부끄러움을 날려버린다는 생각으로!」"

[[dialogue]]
speaker = "フィオナ"
original = "「蒸し返さないでいいですからっ！\u3000まったく……ヴィーナスさんの出力についていける星騎士がどれだけいると思っているんですか」"
translation = "「다시 꺼내지 마시라고요! 정말이지…… 비너스 씨의 출력을 따라갈 수 있는 성기사가 얼마나 된다고 생각하시는 건가요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「その内のひとりがあなたじゃない。ここでふんばらないと世界がなくなっちゃうのよ？」"
translation = "「그중 한 명이 너잖아. 여기서 버티지 않으면 세계가 없어진다구?」"

[[dialogue]]
speaker = "unk"
original = "わずかな休憩時間だけで特訓は進み、ようやく全体の完成図が見えてきた頃──"
translation = "짧은 휴식 시간만으로 특훈은 진행되었고, 마침내 전체적인 완성도가 보이기 시작할 무렵──"

[[dialogue]]
speaker = "トリシャ"
original = "「これは……凶兆の空模様……崩壊に至るまでのカウントが……着実に進んでいます……」"
translation = "「이것은…… 흉조의 하늘 모양…… 붕괴에 이르기까지의 카운트가…… 착실히 진행되고 있습니다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「特訓はここまでにしましょうか。疲れた体では本番にも差し障ります」"
translation = "「특훈은 여기까지만 할까요. 지친 몸으로는 본방송에도 지장이 생길 테니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「プログラムを組んで、通しで１回やっただけですよ？\u3000まだ仕上がりの甘いところも多く……」"
translation = "「프로그램을 짜고 처음부터 끝까지 한 번 해본 것뿐이에요. 아직 완성이 덜 된 부분도 많고……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ほとんどぶっつけ本番ね！\u3000あとはアドリブでなんとかしましょ！」"
translation = "「거의 실전이나 다름없네! 나머지는 애드리브로 어떻게든 하자구!」"

[[dialogue]]
speaker = "舞亜"
original = "「うん。今いい感じにできてるから、この感覚を忘れなければいけると思うよ」"
translation = "「응. 지금 느낌이 좋으니까 이 감각을 잊지 않으면 될 것 같아♥」"

[[dialogue]]
speaker = "ソフィア"
original = "「舞亜がそう言うなら……いえ、私も覚悟を決めました。行きましょう」"
translation = "「마아가 그렇게 말한다면…… 아니, 저도 각오를 정했습니다. 가죠.」"

[[dialogue]]
speaker = "トリシャ"
original = "「今度こそ、オオヒメさんの心の扉を開き……フィーニスの塔へと戻しましょう……！」"
translation = "「이번에야말로 오오히메 님의 마음의 문을 열고…… 피니스의 탑으로 돌려보내죠……!」"

