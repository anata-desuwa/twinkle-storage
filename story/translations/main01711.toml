[[dialogue]]
speaker = "unk"
original = "第１３話,日常へ……,B"
translation = "제13화, 일상으로……, B"

[[dialogue]]
speaker = "unk"
original = "──それから……。"
translation = "──그리고 나서……."

[[dialogue]]
speaker_original = "子ども園の先生"
speaker_translation = "어린이집 선생님"
original = "「はーい、皆さんいいですかー？\u3000もうすぐバスが出発しますよ～」"
translation = "「하ー이, 여러분 괜찮으신가요ー? 곧 버스가 출발합니다요～」"

[[dialogue]]
speaker_original = "近所の子ども"
speaker_translation = "이웃집 아이"
original = "「わ……急がなくちゃ。はーい！」"
translation = "「와…… 서둘러야지. 하ー이!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（何事もない……か。はは、それが当たり前なんだけどな）"
translation = "（아무 일도 없구나…… 하하, 그게 당연한 거지만）"

[[dialogue]]
speaker = "unk"
original = "いつもの通学路。何気ない日常の光景。"
translation = "언제나의 등굣길. 아무렇지도 않은 일상의 광경."

[[dialogue]]
speaker = "unk"
original = "のどかに流れる街のひと時を、俺は歩きながら噛みしめる……。"
translation = "평화롭게 흘러가는 거리의 한때를, 나는 걸으면서 되새긴다……."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クーロート」"
translation = "「쿠ー로토」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ん……？」"
translation = "「응……?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ネクタイ。忘れてるわよ、ほら」"
translation = "「넥타이. 잊었네, 자」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ……ごめんごめん」"
translation = "「아…… 미안 미안」"

[[dialogue]]
speaker = "unk"
original = "マンションから追いかけてきた母さんが、わざわざネクタイを持ってきて結んでくれた。"
translation = "맨션에서 쫓아온 엄마가, 일부러 넥타이를 가져와 매어 주었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃ……行ってきます！」"
translation = "「그럼…… 다녀오겠습니다!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「はい。いってらっしゃい」"
translation = "「응. 다녀와」"

[[dialogue]]
speaker = "unk"
original = "──『リクリエ』が去って、数日。"
translation = "──『리크리에』가 떠나고, 며칠."

[[dialogue]]
speaker = "unk"
original = "世界には平和が戻った。"
translation = "세계에는 평화가 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "人間界の被害は流星市国を中心とした最小限で済み、リクリエは過去のものとなった。"
translation = "인간계의 피해는 유성 시국을 중심으로 한 최소한으로 끝났고, 리크리에는 과거의 것이 되었다."

[[dialogue]]
speaker = "unk"
original = "魔界と、天界にも、軽くないひと悶着があったらしいものの、すでに解決されたと聞いている。"
translation = "마계와, 천계에도, 가볍지 않은 한바탕 소동이 있었던 듯하지만, 이미 해결되었다고 듣고 있다."

[[dialogue]]
speaker = "unk"
original = "３０００年の周期を経て再来したリクリエの脅威は、ようやく終わりを告げたのだ。"
translation = "3000년의 주기를 거쳐 재래한 리크리에의 위협은, 드디어 끝을 고한 것이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（とはいえ……いつまでこの状態を保てるか、だけどな）"
translation = "（그렇다고 해도…… 언제까지 이 상태를 유지할 수 있을지, 이지만）"

[[dialogue]]
speaker = "unk"
original = "リクリエの本体──アポロとギエルを創り変えた瘴気は今、俺という器に封じられている。"
translation = "리크리에의 본체── 아폴로와 기엘을 바꿔 만든 장기는 지금, 나라는 그릇에 봉인되어 있다."

[[dialogue]]
speaker = "unk"
original = "少なくともあれからずっとコントロール下には置けている。"
translation = "적어도 그 이후로 계속 컨트롤 하에 두고 있다."

[[dialogue]]
speaker = "unk"
original = "<ruby>先代<rt>ラクシス</rt></ruby>が味わったような後遺症も今のところはない。"
translation = "<ruby>선대<rt>라크시스</rt></ruby>가 맛보았던 것 같은 후유증도 현재로서는 없다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、いつ爆発するかもわからない爆弾を抱えているようなものだ。"
translation = "그렇다고 해도, 언제 폭발할지 모르는 폭탄을 안고 있는 것과 같다."

[[dialogue]]
speaker = "unk"
original = "しっかりとこの内に秘めた爆弾を制御できるようになるまで、俺だけは油断しちゃならないだろう。"
translation = "확실히 이 안에 숨긴 폭탄을 제어할 수 있게 될 때까지, 나만은 방심해서는 안 될 것이다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「生徒の諸君、おはよー！\u3000今日も元気かな！？」"
translation = "「학생 여러분, 안녕ー! 오늘도 건강한가요!?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それじゃトワちゃん先生の～……抜き打ち荷物チェ～ック！\u3000校則違反は許さないんだよ～！」"
translation = "「그럼 토와짱 선생님의～…… 불시 짐 검사아! 교칙 위반은 용서하지 않는다구요～!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「お、我らが星徒会長くん！\u3000まさか君は校則違反してないよねぇ？」"
translation = "「오, 우리 성도 회장군! 설마 너는 교칙 위반 안 했겠지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろんです。どこを調べてくれても構いませんよ」"
translation = "「물론입니다. 어디를 조사해 주셔도 상관없습니다」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えーっと…………あ！\u3000カバンに漫画が入ってる！」"
translation = "「에ー또………… 아! 가방에 만화책이 들어 있어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ。マトイに借りてたの返そうと思って……」"
translation = "「아. 마토이에게 빌린 거 돌려주려고……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「もうっ。ちょっと世界を救ったからって気が抜けてるんじゃない？」"
translation = "「정말. 조금 세계를 구했다고 해서 긴장이 풀린 거 아니야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「面目ないです」"
translation = "「면목 없습니다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふむ──朝から活気があってよいことだ」"
translation = "「흠── 아침부터 활기가 넘쳐서 좋은 일이다」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「こ──これは流星学園ちょ……じゃなかった総合学園長の白夜院先生！\u3000おはようございます！」"
translation = "「이, 이것은 유성 학원장……이 아니었죠, 종합 학원장인 하쿠야인 선생님! 안녕하세요!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「おはよう。やれやれ……けったいな肩書きとなってしまったものだ」"
translation = "「안녕. 이봐 이봐…… 괴상한 직함이 되어 버렸군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おはようございます。人間界じゃお忙しそうですね、ラティエさん」"
translation = "「안녕하세요. 인간계에서 바쁘신 것 같네요, 라티에 씨」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「全くだ。しかも最近は星見嬢の監視がきつく、なかなか次の旅へ出られん」"
translation = "「전혀. 게다가 최근에는 별을 보는 아가씨의 감시가 심해서, 좀처럼 다음 여행을 떠날 수 없군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「自分で業務を全うするという発想はないんですね……」"
translation = "「스스로 업무를 완수한다는 발상은 없으신 거군요……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「当然だ。私がこの役職でいるのも、あくまで一時的な措置にすぎん」"
translation = "「당연하다. 내가 이 직책에 있는 것도, 어디까지나 일시적인 조치에 불과해」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「学園長の椅子に座らせるちょうどいい人材さえ捕まれば……私も晴れてお役御免となろう。はっはっはっ」"
translation = "「학원장의 자리에 앉힐 적절한 인재만 잡으면…… 나도 드디어 임무 해제될 것이다. 핫핫핫」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（学園長が務まる人材なんて、そうそう見つかるのかな……？）"
translation = "（학원장을 맡을 인재를, 그렇게 쉽게 찾을 수 있을까……?）"

[[dialogue]]
speaker = "unk"
original = "リクリエから世界を守る──<ruby>星騎士<rt>スターナイト</rt></ruby>たちの本懐は無事に果たされた。"
translation = "리크리에로부터 세계를 지킨다── <ruby>성기사<rt>스타 나이트</rt></ruby>들의 본래의 소원은 무사히 이루어졌다."

[[dialogue]]
speaker = "unk"
original = "とはいえ、学園自体はまだしばらく存続していくことが決まっていた。"
translation = "그렇다고는 해도, 학원 자체는 아직 당분간 존속해 나가는 것이 결정되어 있었다."

[[dialogue]]
speaker = "unk"
original = "なぜならまだ、モンスターの出現が報告されているからだ。"
translation = "왜냐하면 아직, 몬스터의 출현이 보고되고 있기 때문이다."

[[dialogue]]
speaker = "unk"
original = "特異点である流星市国内では、残骸のようなアステラもいくつか確認されているという。"
translation = "특이점인 유성 시국 내에서는, 잔해와 같은 아스테라도 몇 군데 확인되고 있다고 한다."

[[dialogue]]
speaker = "unk"
original = "これまで学園で計測されてきたリクリエの予兆は完全に消滅した──"
translation = "지금까지 학원에서 측정되어 온 리크리에의 전조는 완전히 소멸했다──"

[[dialogue]]
speaker = "unk"
original = "だというのに、リクリエの先駆けであるアステラやモンスターだけが残り続けているのは謎だ。"
translation = "그런데도, 리크리에의 선봉인 아스테라나 몬스터만이 계속 남아 있는 것은 수수께끼다."

[[dialogue]]
speaker = "unk"
original = "時間による自然消滅も、なかなか見込めそうにないと聞いている。"
translation = "시간에 의한 자연 소멸도, 좀처럼 기대할 수 없을 것 같다고 듣고 있다."

[[dialogue]]
speaker = "unk"
original = "よって、まだまだ星騎士のお役御免には程遠い。"
translation = "따라서, 아직 성기사의 임무 해제에는 한참 멀었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（それとも……また３０００年後に『次』が来てしまうのか……）"
translation = "（아니면…… 또 3000년 후에 『다음』이 와 버리는 걸까……）"

[[dialogue]]
speaker = "unk"
original = "今を生きる俺たちの視点では、それがあるのか、ないのかすら、確証を得ることはできない。"
translation = "지금을 사는 우리들의 시점에서는, 그것이 있을지, 없을지조차, 확증을 얻을 수는 없다."

[[dialogue]]
speaker = "unk"
original = "世界から完全に脅威が消えてなくなるまで──俺たちの戦いは続くのだった。"
translation = "세계에서 완전히 위협이 사라질 때까지── 우리들의 싸움은 계속되는 것이었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ、世界を救った会長くんだ！\u3000おっはよー！」"
translation = "「아, 세계를 구한 회장군이다! 안녕ー!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長～♪\u3000この間は大活躍だったらしいじゃないですか～、このこの～」"
translation = "「회장～♪ 요전에 대활약했다면서요～, 이이～」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「変な絡み方をするな。無事に勝てたのは星騎士みんなの成果だよ」"
translation = "「이상하게 엮지 마. 무사히 이긴 건 성기사 모두의 성과야」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「会長は……謙虚ですね。大変な死闘だったと伺いしましたが……」"
translation = "「회장님은…… 겸손하시네요. 대단한 사투였다고 들었습니다만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こっちも、蛍火が各地で一騎当千の活躍だったって聞いてるよ」"
translation = "「이쪽도, 호타루비가 각지에서 일기당천의 활약이었다고 들었어」"

[[dialogue]]
speaker = "unk"
original = "リクリエが去っても学園の日常は変わっていない。"
translation = "리크리에가 떠나도 학원의 일상은 변하지 않았다."

[[dialogue]]
speaker = "unk"
original = "だが俺にとって日常の象徴でもあった環の姿は……そこにはなかった。"
translation = "하지만 나에게 일상의 상징이기도 했던 타마키의 모습은…… 그곳에는 없었다."

[[dialogue]]
speaker = "unk"
original = "環──ラクシャは魔界で『世界が無事ならまた会える』と言って姿を消した。"
translation = "타마키── 라크샤는 마계에서 『세계가 무사하면 다시 만날 수 있다』고 말하고 모습을 감췄다."

[[dialogue]]
speaker = "unk"
original = "あいつがそう言うからには、そのうちひょっこり顔を出すのだろう。友人として、俺はそう確信していた。"
translation = "그 녀석이 그렇게 말했으니, 조만간 불쑥 얼굴을 내밀겠지. 친구로서, 나는 그렇게 확신하고 있었다."

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒっ♪\u3000リクリエ討伐記念セール、今ならアニマ特製のお菓子詰め合わせセットがスペシャルプライスで登場だヨ……！」"
translation = "「후히♪ 리크리에 토벌 기념 세일, 지금이라면 아니마 특제 과자 종합 세트가 스페셜 프라이스로 등장한다요……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「わーお！\u3000これ、超おトク～！\u3000３セット買いまーす♪」"
translation = "「와ー오! 이거, 완전 이득～! 3세트 살게요♪」"

[[dialogue]]
speaker_original = "せつな"
speaker_translation = "세츠나"
original = "「こ、これ詰め込みすぎではござらんか……？」"
translation = "「이, 이것 너무 많이 넣은 것 아니옵니까……?」"

[[dialogue]]
speaker = "unk"
original = "購買部はいつにも増して生徒たちで賑わいを見せていた。"
translation = "매점은 평소보다 더욱 학생들로 붐비고 있었다."

[[dialogue]]
speaker = "unk"
original = "そんな中、俺を見つけた女子が駆け寄ってくる。"
translation = "그런 가운데, 나를 발견한 여학생이 달려온다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ！\u3000なにジロジロ乙女を盗み見てるんですかっ」"
translation = "「선배! 왜 빤히 아가씨를 훔쳐보고 있는 거예요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーリア──よかった。まだ学園にいられるんだな」"
translation = "「리리아── 다행이다. 아직 학원에 있을 수 있구나」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「当たり前じゃないですかぁ。私はまだまだ新星学園の１年生！\u3000星騎士に変わりないんですから」"
translation = "「당연한 거 아니겠어요. 저는 아직 신성 학원의 1학년! 성기사임에는 변함없으니까요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その、なんだ。色々あったから」"
translation = "「그, 뭐랄까. 여러 가지 일이 있었으니까」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あはっ。冗談ですよ、冗談♪\u3000そりゃスパイだった奴が堂々と学園に居残ってたら、驚きますよね」"
translation = "「아핫. 농담이에요, 농담♪ 하긴 스파이였던 녀석이 당당하게 학원에 남아 있으면, 놀라겠죠」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「なんかぁ、ネビュラと学園のお偉いさん同士で話がついてるらしいですよ？\u3000現場の私たちには、まだ詳しいことはわかんないですけど」"
translation = "「왠지, 네뷸라와 학원의 높으신 분들끼리 이야기가 된 것 같아요? 현장의 저희는, 아직 자세한 건 모르겠지만요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ネビュラとしても、人間界も守れるならそれに越したことはなかったわけですし。今は完全に利害が一致した、本当のウィンウィン♪\u3000ってやつですね！」"
translation = "「네뷸라로서도, 인간계도 지킬 수 있다면 그보다 더 좋은 건 없었을 테고요. 지금은 완전히 이해관계가 일치한, 진정한 윈윈♪ 이라는 거죠!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「モンスターも完全には消えてないって聞きますし……近いうちに共同作戦があるとかないとか」"
translation = "「몬스터도 완전히 사라지지 않았다고 듣고요…… 조만간 공동 작전이 있다거나 없다거나」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「まあそこら辺のムズかしい話は、今度お偉いさんたちからセンパイに話がいくんじゃないですかね！」"
translation = "「뭐 그쪽의 어려운 이야기는, 다음에 높으신 분들로부터 선배에게 이야기가 가지 않을까요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そこはぶん投げじゃなくて、おまえも関わってくれよ」"
translation = "「거긴 떠넘기지 말고, 너도 관여해 줘」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えぇ～、ヤですよぉ。メンドーな会議に参加しなくていいってことだけが、下っ端の数少ない特権なんですから」"
translation = "「에에～, 싫어요오. 귀찮은 회의에 참가하지 않아도 된다는 것만이, 하급직의 몇 안 되는 특권이니까요」"

[[dialogue]]
speaker = "unk"
original = "リーリアはわざとらしく『うげぇ』とリアクションしてから、ぱっと表情を切り替えた。"
translation = "리리아는 일부러 『우웩』하고 리액션을 취한 후, 확 표정을 바꿨다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「まっ、何はともあれ……サイコーの結末だってことは間違いないですから♪」"
translation = "「뭐, 어쨌든…… 최고의 결말이라는 건 틀림없으니까요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それもこれもセンパイのおかげです！\u3000ありがとうございましたっ」"
translation = "「그것도 전부 선배 덕분이에요! 감사했습니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ネビュラのみんなのおかげでもあるよ。こっちこそ、ありがとうな」"
translation = "「……네뷸라 모두의 덕분이기도 해. 이쪽이야말로, 고맙다」"

[[dialogue]]
speaker = "unk"
original = "アポロ、そしてギエルとの激戦は、紛れもない宇宙規模のそれだった。"
translation = "아폴로, 그리고 기엘과의 격전은, 틀림없는 우주 규모의 그것이었다."

[[dialogue]]
speaker = "unk"
original = "クラウディアの張ってくれたグレート・ウォールがなければ──ただ戦闘の余波だけで、人間界ごと壊滅していただろう。"
translation = "클라우디아가 쳐 준 그레이트 월이 없었다면── 그저 전투의 여파만으로, 인간계째로 괴멸했을 것이다."

[[dialogue]]
speaker = "unk"
original = "人間、魔族、天使、それに魔女……"
translation = "인간, 마족, 천사, 그리고 마녀……"

[[dialogue]]
speaker = "unk"
original = "この世界に生きるすべての人が、一丸となって掴んだ勝利だった。"
translation = "이 세계에 사는 모든 사람이, 하나가 되어 거머쥔 승리였다."

