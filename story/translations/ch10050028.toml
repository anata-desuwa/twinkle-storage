[[dialogue]]
speaker = "unk"
original = "事の始まりは、ソフィとのお正月デートを済ませた帰り道で起こった。"
translation = "사건의 시작은 소피와의 정월 데이트를 마치고 돌아오는 길에 일어났다."

[[dialogue]]
speaker = "unk"
original = "アステラの出現──新年が始まったばかりだというのにモンスターの活動は空気を読まないったらない。"
translation = "아스테라의 출현── 신년이 막 시작됐을 뿐인데 몬스터의 활동은 눈치 없기 짝이 없다."

[[dialogue]]
speaker = "unk"
original = "現場近くにいた俺とソフィ、そしてサーシャさんが駆けつけて無事にモンスターを駆逐。"
translation = "현장 근처에 있던 나와 소피, 그리고 사샤 씨가 달려가 무사히 몬스터를 구축."

[[dialogue]]
speaker = "unk"
original = "さぁ帰るぞ──という段階で、俺はつまずいて。"
translation = "자, 돌아가자──라는 단계에서, 나는 발을 헛디뎌."

[[dialogue]]
speaker = "unk"
original = "サーシャさんの大きなお胸へダイブ。"
translation = "사샤 씨의 커다란 가슴으로 다이브."

[[dialogue]]
speaker = "unk"
original = "それを見たソフィはぷんすかと怒ってしまい……"
translation = "그것을 본 소피는 씩씩거리며 화를 내버렸고……"

[[dialogue]]
speaker = "ソフィア"
original = "「むっすぅ～……」"
translation = "「뿌우우~……」"

[[dialogue]]
speaker = "unk"
original = "──今ここ、というわけだ。"
translation = "──지금 여기, 라는 상황이다."

[[dialogue]]
speaker = "unk"
original = "晴れ着をベッドの上ではだけて、綺麗なおっぱいを露出してくれているソフィ。けれどもそのほっぺたは、誰が見ても分かるくらいにむくれていた。"
translation = "나들이옷을 침대 위에서 풀어헤치고, 예쁜 가슴을 노출해 주고 있는 소피. 하지만 그 뺨은 누가 봐도 알 수 있을 정도로 부풀어 있었다."

[[dialogue]]
speaker = "ソフィア"
original = "「私みたいなちっちゃな体では、会長さんは満足できないかもしれませんが。それでもいいのでしたら、どうぞっ？」"
translation = "「저 같은 조그만 몸으로는, 회장님은 만족하실 수 없을지도 모르겠지만요. 그래도 괜찮으시다면, 어서요?」"

[[dialogue]]
speaker = "unk"
original = "ソフィは自分のスタイルのことを気にしており、男性にとって面白くない体だと思い込んでいる節がある。"
translation = "소피는 자신의 스타일을 신경 쓰고 있으며, 남성에게 있어 재미없는 몸이라고 믿고 있는 구석이 있다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女が、別の大きなおっぱいの女性（しかも姉）に顔を埋めている彼氏を見てしまったら──不機嫌になってしまうのは無理はない。"
translation = "그런 그녀가, 다른 커다란 가슴의 여성(게다가 언니)에게 얼굴을 묻고 있는 남자친구를 봐버렸으니── 기분이 상하는 것도 무리는 아니다."

[[dialogue]]
speaker = "クロト"
original = "「……俺はソフィ一筋だぞ？」"
translation = "「……난 소피뿐이라고?」"

[[dialogue]]
speaker = "ソフィア"
original = "「そうですか。私も会長さん一筋ですよ。つーん」"
translation = "「그렇습니까. 저도 회장님뿐이에요. 흥이다」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さん。姉さんのおっぱいに飛び込んだ時、すっっっごくだらしない顔、してました。つーん、ってなってもしょうがないです」"
translation = "「회장님. 언니 가슴에 뛰어들었을 때, 어어어어엄청 지저분한 얼굴, 하고 있었어요. 흥, 하게 되어도 어쩔 수 없어요」"

[[dialogue]]
speaker = "クロト"
original = "「そんな顔してないって……俺がエッチしたいって思うのはソフィだけだよ。魅力的だって思ってなかったらこんな風にはならないだろ？」"
translation = "「그런 얼굴 안 했다니까…… 내가 야한 짓 하고 싶다고 생각하는 건 소피뿐이야. 매력적이라고 생각하지 않았다면 이렇게 되지는 않았을 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "恋人との姫始めということで期待しているペニス──そこへ視線を向けたソフィは頬を赤く染めながらもそっぽを向く。"
translation = "연인과의 첫 정사를 기대하며 발기한 자지── 그곳으로 시선을 향한 소피는 뺨을 붉게 물들이면서도 외면한다."

[[dialogue]]
speaker = "ソフィア"
original = "「ね、姉さんのおっぱいを思い出して、おっきくなってるのかもしれません。つーんっ！」"
translation = "「어, 언니의 가슴을 떠올려서, 커져 버린 걸지도 몰라요. 흥!」"

[[dialogue]]
speaker = "unk"
original = "困った……今回は相当にお冠みたいだ。"
translation = "곤란하네…… 이번에는 상당히 화가 난 모양이다."

[[dialogue]]
speaker = "unk"
original = "どうすれば機嫌を直してもらえるんだろう……"
translation = "어떻게 해야 기분을 풀어줄 수 있을까……"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、ソフィ。俺、一生懸命ソフィを求めるから、それで判断してもらえるか？」"
translation = "「그럼, 소피. 나, 온 힘을 다해 소피를 원할 테니까, 그걸로 판단해 줄래?」"

[[dialogue]]
speaker = "ソフィア"
original = "「──えっ？」"
translation = "「──엣?」"

[[dialogue]]
speaker = "unk"
original = "宣言と同時に、すでにしっとりと濡れていたソフィのあそこへペニスを挿入した──"
translation = "선언과 동시에, 이미 촉촉하게 젖어 있던 소피의 그곳으로 자지를 삽입했다──"

[[dialogue]]
speaker = "ソフィア"
original = "「んんぅ、あぁあっ……！<emoji=heart04>\u3000そんな、いきなり、ぃっ……ぁ、はぁ……！<emoji=heart04>」"
translation = "「응으윽, 아아앗……!<emoji=heart04> 그런, 갑자기, 이잇…… 아, 하아……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いきなりの挿入には違いなかったけれど、ペニスは根元までぬるんと一息に入ってしまった。"
translation = "갑작스러운 삽입이었음에는 틀림없었지만, 자지는 뿌리까지 미끄러지듯 단숨에 들어가 버렸다."

[[dialogue]]
speaker = "unk"
original = "今日まで、数えきれないくらいにエッチをしてきた証拠だった。"
translation = "오늘까지, 셀 수 없을 정도로 에로한 짓을 해왔다는 증거였다."

[[dialogue]]
speaker = "ソフィア"
original = "「か、会長さんの、んんぅっ……はぁっ……すっごく熱い……は、あ、ぁあっ……それに、いつもより、硬いかも……」"
translation = "「회, 회장님의, 응응윽…… 하아…… 엄청 뜨거워…… 하, 아, 아앗…… 게다가, 평소보다, 딱딱할지도……」"

[[dialogue]]
speaker = "unk"
original = "たくさん感じて欲しい。俺がこんなにも興奮するのはソフィだけだ──それを証明するために動く。"
translation = "잔뜩 느껴주길 바란다. 내가 이렇게까지 흥분하는 건 소피뿐이다── 그것을 증명하기 위해 움직인다."

[[dialogue]]
speaker = "ソフィア"
original = "「ふぅうっ、あ、あ、ぁっ……<emoji=heart04>\u3000んんぅっ……あ、ぅぁ、あ、ぁあっ<emoji=heart04>」"
translation = "「후우우, 아, 아, 아앗……<emoji=heart04> 응응윽…… 아, 우아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「んん、ぅうっ……はあぁっ……んんっ……おへその裏、ぐりぐりって、いっぱい、こすれて──んんぅっ<emoji=heart04>」"
translation = "「응응, 으으윽…… 하아아…… 응윽…… 배꼽 뒤쪽, 꾸욱꾸욱하고, 잔뜩, 문질러져서── 응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "新年が明けてから、ソフィとの初めてのエッチ。年末年始と禁欲を続けていたこともあって、勃起の角度がすごいことになっている。"
translation = "새해가 밝고 나서, 소피와의 첫 에로. 연말연시 동안 금욕을 이어온 탓도 있어, 발기 각도가 엄청나게 되어 있다."

[[dialogue]]
speaker = "ソフィア"
original = "「あ、ぁ、あっ<emoji=heart04>\u3000そ、そんな、腰を掴んで、お尻持ち上げちゃ駄目ですっ……体、反りかえっちゃいま──んんぅう～～っ<emoji=heart04>」"
translation = "「아, 아, 앗<emoji=heart04> 그, 그렇게, 허리를 잡고, 엉덩이를 들어 올리면 안 돼요…… 몸이, 뒤로 젖혀져 버려── 응응으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「おち○ちんで、ぐいぐいって、ナナメに突き上げるの、だ──めぇ、あっ、んんぅっ<emoji=heart04>\u3000おま○こ、感じちゃいまっ、あ、あっあっ！<emoji=heart04>」"
translation = "「자지로, 꾹꾹하고, 비스듬하게 찔러 올리는 거, 안── 돼애, 앗, 응응윽<emoji=heart04> 보지, 느껴버려요, 아, 앗앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィと交わる時は、手を繋いだり、両手を背中に回して抱きあったりすることが多い。"
translation = "소피와 섞일 때는, 손을 잡거나, 양손을 등에 돌려 껴안는 경우가 많다."

[[dialogue]]
speaker = "unk"
original = "今日みたいに腰を持って、華奢な背中を反らせながら、ペニスで突きこむエッチは初めてだ。"
translation = "오늘처럼 허리를 잡고, 가냘픈 등을 젖히게 하며, 자지로 찔러넣는 에로는 처음이다."

[[dialogue]]
speaker = "ソフィア"
original = "「そんな、奥までぱんぱん、されたらっ……んああっ<emoji=heart04>\u3000ふぅ、んんっ、や、あぁあっ……ぐいぐい、来るぅっ<emoji=heart04>」"
translation = "「그렇게, 안쪽까지 꽉꽉, 채워지면…… 응아앗<emoji=heart04> 후우, 응윽, 싫, 아아앗…… 꾹꾹, 들어와앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "星騎士として鍛えているのに、華奢な体のソフィ。"
translation = "성기사로서 단련하고 있는데도, 가냘픈 몸의 소피."

[[dialogue]]
speaker = "unk"
original = "ペニスをぐいっと上へ向けると、それだけでお尻がくくっと持ち上がるのがたまらなくいやらしい。"
translation = "자지를 쭈욱 위로 향하게 하면, 그것만으로 엉덩이가 움찔움찔 들썩이는 게 참을 수 없을 정도로 음란하다."

[[dialogue]]
speaker = "ソフィア"
original = "「あ、ぁ、ぁっ、あ～っ……！<emoji=heart04>\u3000きょ、今日の会長さん、ふうぁ、あ、あっ……絶対にいつもより硬いです、んんぁ、なんでっ……！？<emoji=heart04>」"
translation = "「아, 아, 앗, 아~앗……! <emoji=heart04> 오, 오늘의 회장님, 후아, 아, 앗…… 분명 평소보다 딱딱해요, 응아, 왜애……!? <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなの、大好きな恋人のソフィと繋がっているから以外にない──ピストンの合間にそう率直に伝える。"
translation = "그런 건, 사랑하는 연인인 소피와 이어져 있기 때문일 수밖에 없다── 피스톤질 도중에 그렇게 솔직하게 전한다."

[[dialogue]]
speaker = "ソフィア"
original = "「んんぁ、あ、あっ<emoji=heart04>\u3000はぁ、ぁ、ぅっ<emoji=heart04>\u3000ほ、本当、ですかっ？\u3000私、んんぁっ、可愛いっ……ですかっ……？<emoji=heart04>\u3000姉さん、より……？」"
translation = "「응아, 아, 앗 <emoji=heart04> 하아, 아, 윽 <emoji=heart04> 저, 정말, 인가요? 저, 응아앗, 귀여…… 운가요……? <emoji=heart04> 언니, 보다……?」"

[[dialogue]]
speaker = "クロト"
original = "「当たり前だっ……！」"
translation = "「당연하지……!」"

[[dialogue]]
speaker = "unk"
original = "ソフィの腰を引きよせて、ぱんぱんに膨らんだ亀頭で、おへその裏側をぐりぐりと擦り上げる。"
translation = "소피의 허리를 끌어당겨서, 팽팽하게 부풀어 오른 귀두로 배꼽 뒷부분을 그리그리 문지른다."

[[dialogue]]
speaker = "ソフィア"
original = "「ふぅ、んんんぅ～っ<emoji=heart04>\u3000あっ──は、ぁ、あ、あぁあっ！<emoji=heart04>\u3000んんぅっ、くっふぅ、ぅう～っ……！<emoji=heart04>」"
translation = "「후우, 응응으~윽 <emoji=heart04> 앗──하, 아, 아, 아아앗! <emoji=heart04> 응으윽, 큭후우, 으으~윽……! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィが深く感じてくれたのか、俺の手のひらにビクビクビクっと振動が広がる。恋人の可愛い反応を受け止めながら、俺はどんどん言葉を伝えていく。"
translation = "소피가 깊게 느껴준 것인지, 내 손바닥으로 파르르르 떨리는 진동이 퍼진다. 연인의 귀여운 반응을 받아내며, 나는 계속해서 말을 건넨다."

[[dialogue]]
speaker = "クロト"
original = "「普段からとびきり可愛いけど、今日は輪をかけて素敵だ」"
translation = "「평소에도 유독 귀엽지만, 오늘은 평소보다 훨씬 더 멋져.」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、あっあっあっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000嬉しいこと言いながら、ぱんぱん、ふああぁ、ああっ！<emoji=heart04>」"
translation = "「아, 앗앗앗 <emoji=heart04> 안 돼 <emoji=heart04> 기쁜 말을 하면서, 팡팡, 후아아아, 아앗! <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「晴れ着もよく似合っている。髪飾りもおしゃれで、デートしている時からずっとドキドキしてた」"
translation = "「나들이옷도 잘 어울려. 머리 장식도 세련돼서, 데이트할 때부터 계속 두근거렸어.」"

[[dialogue]]
speaker = "ソフィア"
original = "「んっ、ふぅ、んんっ<emoji=heart04>\u3000あ、あっあっ<emoji=heart04>\u3000おち○ちんで、そこ、ぐりぐり、ゃああぁ<emoji=heart04>\u3000くぅ、気持ち、いぃい、ですぅっ……<emoji=heart04>」"
translation = "「응, 후우, 응윽 <emoji=heart04> 아, 앗앗 <emoji=heart04> 자지로, 거기, 그리그리, 야아아아 <emoji=heart04> 쿠우, 기분, 조아아, 요오…… <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「それに今日は、うっすら化粧もしてる？」"
translation = "「게다가 오늘은, 옅게 화장도 했어?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ぁっ……ふぁあ、あ、あっ……はいっ……<emoji=heart04>\u3000会長さんに、可愛いって、思ってもらいたくって──ひぁああぁっ<emoji=heart04>」"
translation = "「앗…… 후아아, 아, 앗…… 네에…… <emoji=heart04> 회장님한테, 귀엽다고, 생각되고 싶어서── 히아아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「んぁ、あ、あっ……ウズメにお化粧、やり方、聞いて──あぁぁあっ！<emoji=heart04>」"
translation = "「응아, 아, 앗…… 우즈메에게 화장, 하는 법, 물어봐서── 아아아앗! <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「んんぅ、ふぅ、うぅうっ<emoji=heart04>\u3000す、すみませ、んっ……会長さん、さっき……んんっ、可愛くない態度、取っちゃって……！」"
translation = "「응으, 후우, 우으윽 <emoji=heart04> 죄, 죄송해, 요…… 회장님, 아까…… 응윽, 귀엽지 않은 태도, 보여버려서……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんの周り、綺麗で、スタイルのいい女性、ばかりで……ね、姉さんと比べられたら、私、勝てるところないって、思ってて……！」"
translation = "「회장님 주변에, 예쁘고, 스타일 좋은 여성들, 뿐이라서…… 어, 언니랑 비교당하면, 저, 이길 수 있는 부분이 없다고, 생각해서……!」"

[[dialogue]]
speaker = "unk"
original = "気にしてない。ソフィにヤキモチを焼かれるのだって悪い気分じゃないんだ。──そう伝えながら唇を奪う。"
translation = "신경 쓰지 않아. 소피가 질투하는 것조차 나쁜 기분은 아니니까. ──그렇게 전하며 입술을 빼앗는다."

[[dialogue]]
speaker = "ソフィア"
original = "「ぁっ……会長さんっ……んんぅ<emoji=heart04>\u3000はぷっ、んちゅぅ、れぇ、ちゅぅっ……<emoji=heart04>」"
translation = "「앗…… 회장님…… 응으 <emoji=heart04> 하픗, 응츄우, 레에, 츄우…… <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「んぅちゅるっ、れぇえ、んちゅる、れえ、れろっ、んちゅう……<emoji=heart04>\u3000ぷあっ……はぁ、ふぅっ、んんぅっ、あぁ、好き、好きです、んぅ<emoji=heart04>」"
translation = "「응으츄릅, 레에에, 응츄릅, 레에, 레로, 응츄우…… <emoji=heart04> 푸핫…… 하아, 후우, 응으윽, 아아, 좋아, 좋아해요, 응으 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィのヤキモチは嬉しい。だけど……もう少し俺のことも信じてもらいたい。こんなに好きなんだってこと。"
translation = "소피의 질투는 기쁘다. 하지만…… 조금 더 나를 믿어주었으면 좋겠다. 이만큼 좋아하고 있다는 것을."

[[dialogue]]
speaker = "クロト"
original = "「俺がソフィのこと、どれくらい好きなのか。今日はしっかり体で覚えてもらうからな」"
translation = "「내가 소피를 얼마나 좋아하는지. 오늘은 확실히 몸으로 기억하게 해줄 테니까」"

[[dialogue]]
speaker = "ソフィア"
original = "「……え？」"
translation = "「……에?」"

[[dialogue]]
speaker = "unk"
original = "ソフィの腰を逃がさないようにホールドして、彼女の弱いところ──女性器の最奥を強くピストンする。"
translation = "소피의 허리가 빠져나가지 않도록 붙잡고, 그녀의 약한 곳── 여성기의 가장 안쪽을 강하게 피스톤질한다."

[[dialogue]]
speaker = "ソフィア"
original = "「ひっ──ぁっ──ぁぁあぁ～っ<emoji=heart04>\u3000そ、そこぉっ、ら、らめぇ、らめれすっ……あ、ぁ、あ、あ、あぁ、あっ！<emoji=heart04>」"
translation = "「히──앗──아아아아~앗<emoji=heart04> 거, 거기잇, 아, 아앙, 안대애애…… 아, 아, 아, 아, 아, 앗!<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふううぁ、あ、あぁっ<emoji=heart04>\u3000会長、さんっ、ぁ、あ、あっ<emoji=heart04>\u3000おま○こ、奥のところ、トントン、だめ、ぇっ……あ、はぁ、あぁあっ<emoji=heart04>」"
translation = "「후우우아, 아, 아앗<emoji=heart04> 회장, 님, 아, 아, 앗<emoji=heart04> 보지, 안쪽, 툭툭, 안 돼, 에…… 아, 하아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「おち○ちん、んんぅ、ふぅう、あぁっ<emoji=heart04>\u3000が、ガチガチ、すぎますっ、あ、ぁあ、ああっ<emoji=heart04>\u3000熱い、熱い、んんぅ、ぅうっ！<emoji=heart04>」"
translation = "「자지, 응으, 후우, 아앗<emoji=heart04> 너, 너무 딱딱해요, 아, 아아, 아앗<emoji=heart04> 뜨거워, 뜨거워, 응으, 으윽!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱くて硬いのは、ソフィのことが好きだからだ。色っぽくて、エッチな彼女だからこんなに硬くなっているんだと、何度もピストンで伝える。"
translation = "뜨겁고 단단한 것은 소피를 좋아하기 때문이다. 요염하고 야한 그녀이기에 이렇게 단단해진 것이라고, 몇 번이고 피스톤질로 전한다."

[[dialogue]]
speaker = "ソフィア"
original = "「んんぅっ、あ、あ、あぁ、ああっ<emoji=heart04>\u3000ふぅっ、んんんっ！<emoji=heart04>\u3000ちょ、ちょっと、ゆるめて、あ、ぁ、あぁ、あっ<emoji=heart04>\u3000ゆるめてくださいっ<emoji=heart04>」"
translation = "「응으윽, 아, 아, 아아, 아앗<emoji=heart04> 후우, 응응윽!<emoji=heart04> 조, 조금만, 살살, 아, 아, 아아, 앗<emoji=heart04> 살살 해주세요<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「おち○ちん、よ、弱くしてっ<emoji=heart04>\u3000て、手加減して、ください、ぃ──っ<emoji=heart04>」"
translation = "「자지, 살, 살살 해줘어<emoji=heart04> 저, 적당히 해주세, 요──옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ソフィのこと、大好きだから無理」"
translation = "「소피를 너무 좋아하니까 무리」"

[[dialogue]]
speaker = "ソフィア"
original = "「そ、そっ──そんなぁっ<emoji=heart04>\u3000あ、あ、ああっ<emoji=heart04>\u3000ふうぁっ<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000あっあっあっあっあっ<emoji=heart04>」"
translation = "「그, 그──그런어어<emoji=heart04> 아, 아, 아앗<emoji=heart04> 후우아<emoji=heart04> 응으<emoji=heart04> 앗앗앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンのたびに、ぷるんぷるんと揺れるおっぱいも揉みしだく。乳房をこねて、乳首をぴんぴん弾いていく。"
translation = "피스톤질을 할 때마다 푸들푸들 흔들리는 가슴도 주물러 터뜨린다. 유방을 반죽하고, 유두를 팅팅 튕겨 나간다."

[[dialogue]]
speaker = "ソフィア"
original = "「んんんぅーっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000ふうううっ<emoji=heart04>\u3000おっぱい、あ、あっ<emoji=heart04>\u3000今、気持ちいいの、いっぱい来てて、だから触るの、ま、待って──」"
translation = "「응응응으─앗<emoji=heart04> 후우<emoji=heart04> 후우우우웃<emoji=heart04> 가슴, 아, 앗<emoji=heart04> 지금, 기분 좋은 거, 잔뜩 오고 있어서, 그러니까 만지는 거, 기, 기다려──」"

[[dialogue]]
speaker = "クロト"
original = "「ソフィのおっぱいも、大好きだから無理」"
translation = "「소피의 가슴도 너무 좋아하니까 무리」"

[[dialogue]]
speaker = "ソフィア"
original = "「きゅっふ、ぅ、ぅ──ぁあ、あ、あぁあっ<emoji=heart04>\u3000や、やぁっ──気持ちいいの、く、来る、来ちゃい、ま──す、ぅっ──<emoji=heart04>」"
translation = "「큐후, 으, 으──아아, 아, 아아앗<emoji=heart04> 시, 싫어어── 기분 좋은 거, 와, 와요, 와버려어──요, 오옷──<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「ぁっ──んんぅぅ、ぅうぅぅ～っ……！<emoji=heart04>」"
translation = "「아──응으으, 으우으으~윽……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィが軽く絶頂して、ぎゅぎゅうぅっ──！！\u3000とペニスに苛烈な締め付けが走る。"
translation = "소피가 가볍게 절정에 달해, 꽉꽉구우욱──!! 하고 페니스에 가혹한 조임이 달린다."

[[dialogue]]
speaker = "unk"
original = "何度も経験していたから、快感に耐えながらピストンを続けられる。"
translation = "몇 번이나 경험했기에, 쾌감을 견디며 피스톤질을 계속할 수 있다."

[[dialogue]]
speaker = "unk"
original = "フィギュアスケートで鍛えているからか、小柄ゆえに膣内が狭いからか──ソフィの絶頂の締め付けは本当にすさまじい。"
translation = "피겨 스케이팅으로 단련해서인지, 몸집이 작아 질 내부가 좁아서인지── 소피의 절정 시 조임은 정말이지 굉장하다."

[[dialogue]]
speaker = "ソフィア"
original = "「ぁ、ふぁ、あぁ、あああっ！？<emoji=heart04>\u3000会長さん、わ、私っ、イってます、イってますからっ……！\u3000おち○ちん、止め、止めてっ……！<emoji=heart04>」"
translation = "「아, 하아, 아아, 아아앗!?<emoji=heart04> 회장님, 저, 저어, 가요, 가고 있으니까……! 자지, 멈춰, 멈춰줘요……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィのことをどれだけ愛しているかを伝えるエッチだから止まるわけがない。むしろ、さっきの締め付けで射精欲を刺激されてしまった。"
translation = "소피를 얼마나 사랑하는지를 전하는 섹스니까 멈출 리가 없다. 오히려, 방금 전의 조임에 사정욕이 자극되어 버렸다."

[[dialogue]]
speaker = "ソフィア"
original = "「あ、だ、だめっ……これ以上、速くするの、だ──めっ<emoji=heart04>」"
translation = "「아, 안, 안돼…… 이 이상, 빠르게 하는 거, 안──돼<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「ひぅぅううっ<emoji=heart04>\u3000んんぅうっ<emoji=heart04>\u3000ぁあんっ<emoji=heart04>\u3000あっあっあ、ひあ、あぁあ～っ<emoji=heart04>\u3000や、やぁあ、やぁぁぁんんっ……<emoji=heart04>」"
translation = "「히으으으으읏<emoji=heart04> 응으으읏<emoji=heart04> 아앙<emoji=heart04> 앗앗아, 히아, 아아아~앗<emoji=heart04> 싫, 싫어어, 싫어어어어응……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「おち○ちん──ふっきゅ、ぅう！<emoji=heart04>\u3000そんな乱暴に、ずぷずぷ、ひ、ひぁあぁあっ！<emoji=heart04>\u3000あっ、あぁああ、ぁあ～っ！<emoji=heart04>」"
translation = "「자지── 후뀨, 우우!<emoji=heart04> 그렇게 난폭하게, 즈푸즈푸, 히, 히아아아앗!<emoji=heart04> 앗, 아아아아, 아아~앗! <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「わ、私の体、持ち上げられちゃってますっ、ぁ、あぁああ！？<emoji=heart04>\u3000反らせながら、ぱんぱん<emoji=heart04>\u3000んぅ～っ、ふぅうっ、あぁああっ<emoji=heart04>」"
translation = "「제, 제 몸, 들어 올려지고 있어요, 아, 아아아아!?<emoji=heart04> 젖혀지면서, 팡팡<emoji=heart04> 응으~읏, 후우우읏, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「串刺しに、されてる、みた──いっ……あ、あぁああ、んっ、ぅ、ふぅう～っ！<emoji=heart04>」"
translation = "「꼬챙이가, 된 것, 같아──아…… 아, 아아아아, 응, 으, 후우우~읏!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィが喘ぐたび、ぎゅうぅ、ぎゅぅぅう──とペニスが絞られて、ぞくぞくと精液が登ってきている。"
translation = "소피가 신음할 때마다, 규우우, 규우우우── 하고 페니스가 조여져서, 오싹오싹 정액이 올라오고 있다."

[[dialogue]]
speaker = "unk"
original = "でもピストンは止めない。限界ぎりぎりまで全力で叩きつける。"
translation = "하지만 피스톤은 멈추지 않는다. 한계 아슬아슬할 때까지 전력으로 내리친다."

[[dialogue]]
speaker = "クロト"
original = "「ソフィ……好きだ……！\u3000大好きだっ……！」"
translation = "「소피…… 좋아해……! 정말 좋아해……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「わ、私も好きっ<emoji=heart04>\u3000会長さんのこと好きっ<emoji=heart04>\u3000あ、ぁあ、はぁあ<emoji=heart04>\u3000もっと、もっと愛してくださいっ<emoji=heart04>\u3000ぱんぱん、ぱんぱんしてっ<emoji=heart04>」"
translation = "「저, 저도 좋아해요<emoji=heart04> 회장님 좋아해요<emoji=heart04> 아, 아아, 하아아<emoji=heart04> 좀 더, 좀 더 사랑해 주세요<emoji=heart04> 팡팡, 팡팡 해줘요<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんの気持ち、いっぱい、伝えてくださいっ<emoji=heart04>\u3000私のこと、いっぱい求めてくださいっ──あ、ぁあ、ぁ、そこだめぇ、あぁあ～っ<emoji=heart04>」"
translation = "「회장님의 마음, 가득, 전해 주세요<emoji=heart04> 저를, 가득 원해 주세요── 아, 아아, 아, 거기 안돼에, 아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィの可愛くてエッチなお尻が波打つくらいにバチュバチュと腰を振る。おっぱいをもみくちゃにしながら、腰をぐいっと引き寄せて──"
translation = "소피의 귀엽고 야한 엉덩이가 물결칠 정도로 바츄바츄 허리를 흔든다. 가슴을 주물러 터뜨리면서, 허리를 홱 끌어당겨서──"

[[dialogue]]
speaker = "ソフィア"
original = "「キスっ……キスしてください、会長さんっ<emoji=heart04>\u3000チューしながら出して、あ、ぁ、あぁ、あぁっ！<emoji=heart04>」"
translation = "「키스…… 키스해 주세요, 회장님<emoji=heart04> 츄우하면서 내보내 줘요, 아, 아, 아아, 아아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感でふやけたソフィの唇を奪い、むさぼるようにかきまぜながらラストスパート。"
translation = "쾌감으로 흐물흐물해진 소피의 입술을 빼앗아, 탐하듯 휘저으며 라스트 스퍼트."

[[dialogue]]
speaker = "ソフィア"
original = "「んぅじゅぅるる、れぇ、じゅるれる、ちゅるちゅぱっ<emoji=heart04>\u3000れぇえ～っ<emoji=heart04>\u3000んちゅぅう、じゅるぅ、ちゅるるう、んちゅぅ、ちゅぅ～っ<emoji=heart04>」"
translation = "「응으쥬루루, 레에, 쥬루레루, 츄루츄팟<emoji=heart04> 레에에~엣<emoji=heart04> 응츄우우, 쥬루우, 츄루루우, 응츄우, 츄우~웃<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さっ、会長さんっ<emoji=heart04>\u3000んぅぢゅるぅ<emoji=heart04>\u3000れちょれちょれちょ<emoji=heart04>\u3000んぅぢゅるるっ<emoji=heart04>\u3000じゅるれる、じゅるぅう、れぇ～、じゅるぅっ<emoji=heart04>」"
translation = "「회장니잇, 회장님<emoji=heart04> 응으쥬루우<emoji=heart04> 레쵸레쵸레쵸<emoji=heart04> 응으쥬루루<emoji=heart04> 쥬루레루, 쥬루우우, 레에~, 쥬루우<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「んぅじゅるるっ、しゅき<emoji=heart04>\u3000んぅりゅ<emoji=heart04>\u3000会長しゃん、しゅき<emoji=heart04>\u3000だいしゅきっ、んぅっ<emoji=heart04>」"
translation = "「응으쥬루루, 죠아<emoji=heart04> 응으류<emoji=heart04> 회장님, 죠아<emoji=heart04> 뎡말 죠아, 응으<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「んっんっんっんっんっ──ぷぁあっ<emoji=heart04>\u3000はあっ、おち○ちん、ふ、膨らんで来てますっ、で、出ますかっ？<emoji=heart04>\u3000出ちゃうん、ですかっ？<emoji=heart04>」"
translation = "「응응응응응── 푸핫<emoji=heart04> 하앗, 자지, 부, 부풀어 오르고 있어요, 나, 나와요? <emoji=heart04> 나와버리는, 건가요? <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう限界だ──精液が登ってきていて、あと数秒で我慢も利かなくなるのが分かった。"
translation = "이제 한계다── 정액이 올라오고 있어, 앞으로 몇 초면 참을 수 없게 될 것을 알았다."

[[dialogue]]
speaker = "unk"
original = "ソフィと深いキスをしながら、イキたい──"
translation = "소피와 깊은 키스를 나누며, 가버리고 싶어──"

[[dialogue]]
speaker = "ソフィア"
original = "「んぅじゅぅるるうっ！<emoji=heart04>\u3000んぢゅるるうっ！<emoji=heart04>\u3000出してっ、会長さっ、出してっ、出して出して出してっ──ん──うぅぅう～っ！<emoji=heart04>」"
translation = "「응으쥬르르웃! <emoji=heart04> 응쥬르르웃! <emoji=heart04> 내보내 줘, 회장님, 내보내 줘, 내보내 줘 내보내 줘 내보내 줘──응──으으으으~읏! <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「んんぅっ！<emoji=heart04>\u3000はぁ、あぁああ、ぁあぁああ～っ！？<emoji=heart04>」"
translation = "「응응으읏! <emoji=heart04> 하아, 아아아아, 아아아아아~앗!? <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "放っている俺が驚くほどの勢いと量──熱い精液がドプドプとソフィの膣内に注がれていく。"
translation = "내뿜고 있는 나조차 놀랄 정도의 기세와 양── 뜨거운 정액이 도프도프 소리를 내며 소피의 질 내부에 쏟아져 들어간다."

[[dialogue]]
speaker = "ソフィア"
original = "「熱いっ……ふぁ、あぁ、ああっ<emoji=heart04>\u3000おま○こ、熱い、です、ぅうっ……<emoji=heart04>\u3000頭の中、ばちばちって、して、へ、ぇえ、えぇっ……<emoji=heart04>」"
translation = "「뜨거워……화, 아아, 아아앗 <emoji=heart04> 보지, 뜨거워, 요, 우우읏…… <emoji=heart04> 머릿속이, 파지직하고, 해서, 헤, 에에, 에엣…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一滴も漏らさないために、彼女の腰を引きよせながら、最後の一滴まで、射精──"
translation = "한 방울도 흘리지 않기 위해, 그녀의 허리를 끌어당기며, 마지막 한 방울까지, 사정──"

[[dialogue]]
speaker = "ソフィア"
original = "「くっふぅ、ううぅ～！<emoji=heart04>\u3000あ、あぁ、あぁあーっ……<emoji=heart04>\u3000そんなぁっ……奥に押し付けながら、ぴゅっぴゅしちゃ──ひぁあぁあっっ<emoji=heart04>」"
translation = "「큿후우, 우우우~! <emoji=heart04> 아, 아아, 아아아─앗…… <emoji=heart04> 그런…… 안쪽에 밀어붙이면서, 퓨퓻해버리──히아아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「あったかぁいっ……は、あぁあ、ぁああ～っ……<emoji=heart04>\u3000会長さんの、精液っ……あ、ぁんっ……<emoji=heart04>\u3000気持ちいぃっ……しゅ、しゅきぃ……<emoji=heart04>」"
translation = "「따뜻해……하, 아아아, 아아아~앗…… <emoji=heart04> 회장님의, 정액…… 아, 아앙…… <emoji=heart04> 기분 좋아…… 죠, 죠아해…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "体の内側からぽかぽかに温もっているからか、ソフィの声は本当に気持ちよさそうで……"
translation = "몸 안쪽부터 포근하게 데워져서인지, 소피의 목소리는 정말 기분 좋아 보였고……"

[[dialogue]]
speaker = "unk"
original = "どぴゅ、どぴゅっ──と精液を放つたびに、可愛い声が出る。"
translation = "도퓩, 도퓩── 하고 정액을 내뿜을 때마다, 귀여운 목소리가 터져 나온다."

[[dialogue]]
speaker = "ソフィア"
original = "「ひゃぅっ<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000ふぇあっ<emoji=heart04>\u3000んんぅっ……ふぅうう～っ……あっ……はぁぁ、あぁぁあぁああぁーっ………………<emoji=heart04>」"
translation = "「히야웃 <emoji=heart04> 앗 <emoji=heart04> 후에앗 <emoji=heart04> 응응으읏…… 후우우우~읏…… 앗…… 하아아, 아아아아아아아아아─앗……………… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精が収まったのを確認してから、ずるり──とペニスを引き抜く。"
translation = "사정이 잦아든 것을 확인한 뒤, 주르륵── 하고 페니스를 뽑아낸다."

[[dialogue]]
speaker = "ソフィア"
original = "「んはあぁっ……ふうぅうっ……はーっ……ふぅうう～っ……はぁあ～っ……<emoji=heart04>」"
translation = "「응하아앗…… 후우우읏…… 하─앗…… 후우우우~읏…… 하아아~앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ソフィのちっちゃな女性器から、とろとろと精液が溢れ出てくるのが見える……"
translation = "소피의 조그만 여성기에서, 걸쭉하게 정액이 흘러넘쳐 나오는 것이 보인다……"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんのっ……ふぅうっ……気持ち、しっかり、伝わりました……<emoji=heart04>」"
translation = "「회장님의…… 후우읏…… 마음, 확실히, 전달받았어요…… <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「いっぱい、想ってもらえて……素敵な、エッチ……でした……<emoji=heart04>\u3000んんぅっ……はぁあっ……<emoji=heart04>」"
translation = "「잔뜩, 생각해주셔서…… 멋진, 엣찌……였어요…… <emoji=heart04> 응응으읏…… 하아앗…… <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「愛してるよ、ソフィ。誰よりも」"
translation = "「사랑해, 소피. 누구보다도」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい……私もです……会長さんのこと、愛してます……<emoji=heart04>」"
translation = "「네…… 저도예요…… 회장님을, 사랑해요…… <emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ……会長さんのおち○ちん……ピクって動きました……<emoji=heart04>」"
translation = "「아…… 회장님의 자지…… 움찔하고 움직였어요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もちろん、たった１回で終わらせるつもりは毛頭ない。"
translation = "물론, 고작 한 번으로 끝낼 생각은 눈곱만큼도 없다."

[[dialogue]]
speaker = "unk"
original = "夜通し、全力でソフィを抱く。俺が彼女のことをどれくらい愛しているのか、知って欲しいから。"
translation = "밤새도록, 전력으로 소피를 안는다. 내가 그녀를 얼마나 사랑하고 있는지, 알아줬으면 하니까."

[[dialogue]]
speaker = "ソフィア"
original = "「はい……<emoji=heart04>\u3000会長さんが満足するまで、抱いてください……抱き潰して欲しいです……<emoji=heart04>」"
translation = "「네……<emoji=heart04> 회장님이 만족하실 때까지, 안아주세요…… 안아서 뭉개버려 주셨으면 해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「キス、い～っぱいしながら……お腹の奥……何回も……びゅーっ……<emoji=heart04>\u3000て、して欲しいです……<emoji=heart04>」"
translation = "「키스, 가~득 하면서…… 배 속 깊은 곳에…… 몇 번이고…… 뷰웃……<emoji=heart04> 하고, 해주셨으면 해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後──夜が更けて、朝が来るまで。俺とソフィは全身汗だくになりながら、交わり続けるのだった。"
translation = "그 후── 밤이 깊어지고, 아침이 올 때까지. 나와 소피는 온몸이 땀범벅이 된 채, 계속해서 섞이는 것이었다."

