[[dialogue]]
speaker = "unk"
original = "第１話,バレンタインドレスの力,P"
translation = "제1화, 발렌타인 드레스의 힘, P"

[[dialogue]]
speaker = "unk"
original = "放課後。今日は星徒会の活動がないので、真っ直ぐ帰ろうと思ったが──"
translation = "방과 후. 오늘은 성도회 활동이 없어서, 곧장 돌아가려 생각했지만──"

[[dialogue]]
speaker = "？？？"
original = "「ねぇ、ちょっと……」"
translation = "「저기, 잠깐……」"

[[dialogue]]
speaker = "unk"
original = "俺を呼び止める声が聞こえて振り返る。"
translation = "나를 불러 세우는 목소리가 들려 뒤를 돌아본다."

[[dialogue]]
speaker = "イレーナ"
original = "「あんたに頼みがあるんだけど……暇なら一緒に来てくれない？」"
translation = "「너한테 부탁이 좀 있는데…… 한가하면 같이 가주지 않을래?」"

[[dialogue]]
speaker = "イレーナ"
original = "「せっかくバレンタインフォームに変身できるようになったし、イベントだけじゃなくて、実戦でも使いこなせるようになりたいと思ったのよ」"
translation = "「모처럼 발렌타인 폼으로 변신할 수 있게 됐으니까, 이벤트뿐만 아니라 실전에서도 능숙하게 다룰 수 있게 되고 싶다고 생각했거든」"

[[dialogue]]
speaker = "イレーナ"
original = "「シャロンが修道院の用事で外せなくて、頼めそうなのがあんたくらいしかいなくてね。付き合ってくれて助かったわ」"
translation = "「샤론이 수도원 일 때문에 자리를 비울 수 없어서, 부탁할 만한 게 너밖에 없더라고. 같이 가줘서 고마워」"

[[dialogue]]
speaker = "イレーナ"
original = "「ん？\u3000がっかりした？\u3000２人きりだから何かあると思った？\u3000残念、別に色気のある話じゃないわよ」"
translation = "「응? 실망했어? 둘뿐이라서 무슨 일이라도 있을 줄 알았어? 유감이네, 딱히 야한 이야기는 아니야」"

[[dialogue]]
speaker = "イレーナ"
original = "「まぁ、でも……この衣装の感想とか聞いてなかったから、言うことがあるなら聞いてあげなくもないけど……」"
translation = "「뭐, 그래도…… 이 의상 소감 같은 건 못 들었으니까, 할 말이 있다면 들어주지 못할 것도 없지만……」"

[[dialogue]]
speaker = "unk"
original = "聖女なのに肌面積がすごい"
translation = "성녀인데 노출도가 엄청나"

[[dialogue]]
speaker = "イレーナ"
original = "「はああぁっ！？\u3000あんたそれしか言うことないの！？\u3000このスケベ魔王！！」"
translation = "「하아아앗!? 너 그것밖에 할 말이 없어!? 이 변태 마왕!!」"

[[dialogue]]
speaker = "unk"
original = "だから本当は独り占めしたい"
translation = "그래서 사실은 독점하고 싶어"

[[dialogue]]
speaker = "イレーナ"
original = "「んなっ──！？」"
translation = "「뭐랏──!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「他の男に見せたくない……？\u3000見つめてもいいのは俺だけ……？\u3000あと色が大人っぽくて素敵？\u3000いや最後のは最初に言いなさいよ」"
translation = "「다른 남자에게 보여주고 싶지 않아……? 바라봐도 되는 건 나뿐……? 그리고 색깔이 어른스러워서 멋지다고? 아니, 마지막 말은 처음에 하라고」"

[[dialogue]]
speaker = "イレーナ"
original = "「はいはい、そういう独占欲は２人きりの時だけにしてねー。イベントで使うやつだし、これでも一応戦闘服だから、これで戦うこともあるし」"
translation = "「네네, 그런 독점욕은 둘만 있을 때만 부려줘─. 이벤트에서 쓰는 거고, 이것도 일단 전투복이니까 이걸로 싸울 일도 있으니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「まぁ気が向いたら、じっくり見せてあげても──」"
translation = "「뭐 마음 내키면, 찬찬히 보여줄 수도──」"

[[dialogue]]
speaker = "イレーナ"
original = "「って、そういうんじゃないから！\u3000今日はあくまでこの戦闘服を使いこなす訓練！\u3000鑑賞会じゃないっての！」"
translation = "「아니, 그런 게 아니니까! 오늘은 어디까지나 이 전투복을 다루는 훈련! 감상회가 아니라고!」"

[[dialogue]]
speaker = "unk"
original = "ちなみにイレーナの戦闘服って──"
translation = "그나저나 이레이나의 전투복이란──"

[[dialogue]]
speaker = "イレーナ"
original = "「ん？\u3000これは人工戦闘服じゃなくて自前よ。前のクリスマスフォームもそうだけど」"
translation = "「응? 이건 인공 전투복이 아니라 내 거야. 저번 크리스마스 폼도 그렇지만」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームや水着戦闘服、人工戦闘服という例外はあるものの、星騎士がまとう戦闘服は、基本的に１人につき１つだ。"
translation = "노바 폼이나 수영복 전투복, 인공 전투복이라는 예외는 있지만, 성기사가 걸치는 전투복은 기본적으로 1인당 하나다."

[[dialogue]]
speaker = "unk"
original = "自力で戦闘服を変えるのは高度な星力コントロール技術が必要とされるが、イレーナはそれが可能な、稀有な存在だ。"
translation = "자력으로 전투복을 바꾸는 것은 고도의 성력 컨트롤 기술이 필요하지만, 이레이나는 그것이 가능한 희귀한 존재다."

[[dialogue]]
speaker = "イレーナ"
original = "「これでもヨーロッパじゃ有名な星騎士だったからね。それなりにはやるわ」"
translation = "「이래 봬도 유럽에선 유명한 성기사였으니까. 그럭저럭은 한다고」"

[[dialogue]]
speaker = "unk"
original = "だから全部露出度が高いのか……"
translation = "그래서 전부 노출도가 높은 건가……"

[[dialogue]]
speaker = "イレーナ"
original = "「そんなわけないでしょ！\u3000人を露出狂呼ばわりしないで！」"
translation = "「그럴 리가 없잖아! 사람을 노출광 취급하지 마!」"

[[dialogue]]
speaker = "イレーナ"
original = "「……あれ？\u3000でも戦闘服を調整しようとすると、いつもこんな感じになるような……いえ、今はいいわ。考えないようにしましょ」"
translation = "「……어라? 근데 전투복을 조정하려고 하면 항상 이런 느낌이 되는 것 같은…… 아니, 지금은 됐어. 생각하지 않기로 하자」"

[[dialogue]]
speaker = "イレーナ"
original = "「本題に戻るわよ。バレンタインフォームを使いこなす練習に付き合ってほしいの」"
translation = "「본론으로 돌아갈게. 발렌타인 폼을 능숙하게 다루는 연습을 도와줬으면 해」"

[[dialogue]]
speaker = "イレーナ"
original = "「で、このフォームの力はどんなのかっていうと、こうやってドリンクやチョコを出せるの」"
translation = "「그래서, 이 폼의 힘이 어떤 거냐 하면, 이렇게 드링크나 초코를 꺼낼 수 있어」"

[[dialogue]]
speaker = "unk"
original = "そう言ってイレーナが手を開くと、チョコレート色の液体が入ったグラスが生まれる。"
translation = "그렇게 말하며 이레이나가 손을 펴자, 초콜릿색 액체가 담긴 잔이 생겨난다."

[[dialogue]]
speaker = "イレーナ"
original = "「これはエスプレッソとホットチョコレート、生クリームを合わせたドリンクで、イタリアのトリノじゃ有名なやつよ」"
translation = "「이건 에스프레소와 핫 초콜릿, 생크림을 섞은 음료로, 이탈리아 토리노에서 유명한 거야」"

[[dialogue]]
speaker = "イレーナ"
original = "「巡礼者の滋養強壮のために考えられた……とか聞いたことあるわ。本当か知らないけど」"
translation = "「순례자의 자양강장을 위해 고안되었다……고 들은 적이 있어. 진짜인지는 모르겠지만」"

[[dialogue]]
speaker = "イレーナ"
original = "「……イレーナは神官だからぴったり？\u3000まぁ信仰に関わるって点ではそうかもね」"
translation = "「……이레이나는 신관이니까 딱 맞다고? 뭐 신앙에 관련된다는 점에선 그럴지도」"

[[dialogue]]
speaker = "イレーナ"
original = "「ちなみに混ぜずに飲むのが正しい飲み方よ。一杯いってみる？\u3000……はい、あげる」"
translation = "「참고로 섞지 않고 마시는 게 올바른 음용법이야. 한 잔 마셔볼래? ……자, 줄게」"

[[dialogue]]
speaker = "unk"
original = "甘くて苦くて美味しい！"
translation = "달콤 쌉싸름해서 맛있어!"

[[dialogue]]
speaker = "イレーナ"
original = "「でしょう？\u3000生クリームのコクと、チョコの甘さ、エスプレッソの苦みが順番にやってきて、口の中で溶け合って……絶妙な味になるのよ」"
translation = "「그렇지? 생크림의 풍미와 초코의 단맛, 에스프레소의 쓴맛이 차례대로 찾아와서 입안에서 녹아 어우러져…… 절묘한 맛이 난다고」"

[[dialogue]]
speaker = "unk"
original = "力がみなぎる……！"
translation = "힘이 샘솟아……!"

[[dialogue]]
speaker = "イレーナ"
original = "「星術で出してるやつなんだから、そりゃそうでしょ。普通のドリンクじゃないわよ」"
translation = "「성술로 꺼낸 거니까 당연하지. 평범한 드링크가 아니라고」"

[[dialogue]]
speaker = "イレーナ"
original = "「これが私のバレンタインフォームの力。ドリンクとチョコで味方を元気づけるの」"
translation = "「이게 내 발렌타인 폼의 힘. 드링크와 초코로 아군을 기운차게 만드는 거야」"

[[dialogue]]
speaker = "イレーナ"
original = "「あとこんなのも出せるわ」"
translation = "「그리고 이런 것도 꺼낼 수 있어」"

[[dialogue]]
speaker = "unk"
original = "イレーナが手の中に小さなお菓子を生み出す。"
translation = "이레이나가 손안에 작은 과자를 만들어낸다."

[[dialogue]]
speaker = "イレーナ"
original = "「これはバーチ・ディ・ダーマっていって、クッキーにチョコを挟んだもの。これもトリノ発祥らしいわ。食べてみて」"
translation = "「이건 바치 디 다마라고 해서, 쿠키에 초코를 끼운 거야. 이것도 토리노 발상이라더군. 먹어봐」"

[[dialogue]]
speaker = "イレーナ"
original = "「……サクサクの食感とチョコの甘さが合わさって美味しい？\u3000ならよかったわ」"
translation = "「……바삭바삭한 식감과 초코의 단맛이 어우러져서 맛있다고? 그럼 다행이네」"

[[dialogue]]
speaker = "イレーナ"
original = "「ついでにドリンクもう一杯いっとく？\u3000はい、どうぞ」"
translation = "「덤으로 드링크 한 잔 더 마실래? 자, 여기」"

[[dialogue]]
speaker = "unk"
original = "──苦ぁっ！！？"
translation = "──쓰거워!!?"

[[dialogue]]
speaker = "イレーナ"
original = "「さっき露出狂呼ばわりしてくれたお礼よ」"
translation = "「아까 노출광 취급해 준 답례야」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしが出すチョコは、甘いも苦いもあたし次第。苦～いのを味わいたくなかったら、あたしの機嫌を損ねないことね♪」"
translation = "「내가 내놓는 초코는 달콤함도 쓴맛도 내 마음대로. 쓴─ 걸 맛보기 싫으면 내 기분을 상하게 하지 말라고♪」"

[[dialogue]]
speaker = "unk"
original = "バレンタインフォームを使いこなす練習と言っていたけど、イレーナはすでにこのフォームを十分に使いこなしているようだった。"
translation = "발렌타인 폼을 다루는 연습이라고 말했지만, 이레이나는 이미 이 폼을 충분히 다루고 있는 듯했다."

