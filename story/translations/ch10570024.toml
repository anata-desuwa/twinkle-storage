[[dialogue]]
speaker = "unk"
original = "第４話,２人だけの甘酒,P"
translation = "제4화, 둘만의 아마자케, P"

[[dialogue]]
speaker = "unk"
original = "初詣のために浅草に到着すると、時間はすっかり夜になっていた。"
translation = "하츠모데를 위해 아사쿠사에 도착하자 시간은 완전히 밤이 되어 있었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「お昼は人も多かったでしょうが……夜になると幾分か人も少ないですね……人ごみが苦手な私にはちょうどいい塩梅です」"
translation = "「낮에는 사람도 많았겠지만…… 밤이 되니 어느 정도 사람도 적네요…… 인파를 싫어하는 저에게는 딱 좋은 정도입니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですが、今晩は冷え込みますね……私は寒さには強い方ですので……この格好でも問題ありませんが、あなたは……」"
translation = "「하지만 오늘 밤은 꽤 춥네요…… 저는 추위에는 강한 편이라서…… 이런 차림이라도 문제없습니다만, 당신은……」"

[[dialogue]]
speaker = "unk"
original = "風が寒ーいっ！"
translation = "「바람이 추워어!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「でしょうね……身を裂くほどの北風……レゾフならば氷結ヨーグルトを欲するところですが、今日は温かい物でも……おや……？」"
translation = "「그렇겠네요…… 몸을 찢는 듯한 북풍…… 레조프였다면 빙결 요구르트를 원했겠지만, 오늘은 따뜻한 것이라도…… 어라……?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あの湯気の出ている屋台は……甘酒？\u3000甘いお酒を、販売しているのですね……？\u3000小さな子どもも口にしているようですが……」"
translation = "「저 김이 나고 있는 노점은…… 아마자케? 달콤한 술을 판매하고 있는 것이군요……? 어린아이들도 입에 대고 있는 것 같습니다만……」"

[[dialogue]]
speaker = "unk"
original = "甘酒はノンアルコールのもあります"
translation = "「아마자케는 무알코올인 것도 있어.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「そうなのですね……どのような飲み物なのか、興味があります……暖を取りましょう」"
translation = "「그렇군요…… 어떤 음료인지 흥미가 생깁니다…… 몸을 녹이죠.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ……ここは私がお支払いします……手伝ってもらったお礼と……今日は少しだけお金持ちですから……フフフ」"
translation = "「아…… 여기는 제가 내겠습니다…… 도와주신 답례와…… 오늘은 조금 부자니까요…… 후후후.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あちち……これが甘酒ですか……白くて、濁っていて、どろりどろりと……どことなくヨーグルトのようにも見えますが……いただきます」"
translation = "「앗 뜨거…… 이것이 아마자케입니까…… 하얗고, 탁하고, 걸쭉걸쭉하니…… 어딘지 모르게 요구르트처럼 보이기도 합니다만…… 잘 먹겠습니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ずず──んぅ、熱っ……！\u3000舌……火傷してしまいまひた……」"
translation = "「후룹── 응으, 뜨거워……! 혀…… 데어 버렸습니하……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですが、とても美味です……ずずず……どこか氷結ヨーグルトにも通ずるような……？」"
translation = "「하지만 아주 맛있습니다…… 후루룹…… 어딘가 빙결 요구르트와도 통하는 듯한……?」"

[[dialogue]]
speaker = "unk"
original = "ヨーグルトも甘酒も発酵食品だからかな？"
translation = "「요구르트도 아마자케도 발효 식품이라서 그런가?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「なるほど……はぁぁ……体が内側から、ぽかぽかと温かく……隠し味にジンジャーも入っているのでしょうか……さ、あなたもどうぞ。フフフ」"
translation = "「과연…… 하아아…… 몸이 안쪽에서부터 따끈따끈하게 데워지고…… 숨은 맛으로 진저도 들어있는 걸까요…… 자, 당신도 드세요. 후후후.」"

[[dialogue]]
speaker = "unk"
original = "トリシャから甘酒を受け取り、一口すする。"
translation = "트리샤에게서 아마자케를 받아 한 모금 들이킨다."

[[dialogue]]
speaker = "unk"
original = "ずずず……美味しくて温まる！"
translation = "「후루룹…… 맛있고 따뜻해!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい、とっても……！\u3000甘酒、クセになってしまいそうな美味しさです……まだまだ人間界には美味しいものがいっぱい……」"
translation = "「네, 정말로……! 아마자케, 중독될 것 같은 맛입니다…… 아직 인간계에는 맛있는 게 잔뜩 있네요……」"

[[dialogue]]
speaker = "unk"
original = "もうもうと湯気が出る熱さと優しい甘さが、<ruby>悴<rt>かじか</rt></ruby>んだ体に染みた。"
translation = "모락모락 김이 나는 뜨거움과 부드러운 단맛이 곱은<rt>카지카</rt></ruby> 몸에 스며들었다."

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「甘酒もいただきましたし、お参りも済ませましたし……ああ、そうです……おみくじを引きましょう」"
translation = "「아마자케도 마셨고, 참배도 마쳤으니…… 아아, 그렇네요…… 오미쿠지를 뽑죠.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私は私自身を占うことを、師から禁じられていますので……こちらでおみくじを引かせていただきます……」"
translation = "「저는 제 자신을 점치는 것을 스승님께 금지당했기에…… 여기서 오미쿠지를 뽑아 보겠습니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あんなにおみくじを引いたのに……ちゃんとしたものを引くのは初めてです……不思議ですね……」"
translation = "「그렇게 오미쿠지를 많이 뽑아 줬는데…… 제대로 된 걸 뽑는 건 처음입니다…… 신기하네요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「では初穂料をお納めして……カシャ、カシャ……」"
translation = "「그럼 하츠호료를 납부하고…… 달각, 달각……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「５７番です……えぇと……５７番は小吉、ですね」"
translation = "「57번입니다…… 에또…… 57번은 소길, 이네요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「『勉学──やがて実を結ぶ』……『失せ物──根気よく探せば必ず』……『恋愛──じっくり育む時期』……ふむ、ふむ……」"
translation = "「『학업── 머지않아 결실을 본다』…… 『분실물── 끈기 있게 찾으면 반드시』…… 『연애── 차분히 키워갈 시기』…… 흠, 흠……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いずれも日々の努力を怠るなかれ……ということでしょうか……生き急ぐ必要はありません……」"
translation = "「어느 쪽이든 매일의 노력을 게을리하지 말라……는 뜻일까요…… 서둘러 살 필요는 없습니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「おや？\u3000フフフ……ここ、見てください……『金運──大金は縁遠し。小銭は多少の縁あり』」"
translation = "「어라? 후후후…… 여기 보세요…… 『금전운── 큰돈은 인연이 멀다. 잔돈은 다소 인연이 있음』」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「よく当たるおみくじですね……ええ、身の丈に合った金額で良いのです……私には小銭くらいでちょうどいい……」"
translation = "「잘 맞는 오미쿠지네요…… 네, 분수에 맞는 금액이면 족합니다…… 저에게는 잔돈 정도로 딱 좋아요……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「巨万の富を手に入れてしまったばかりに、かえって不幸に見舞われ、身を崩してしまう話を数えたら……<ruby>枚挙<rt>まいきょ</rt></ruby>に<ruby>暇<rt>いとま</rt></ruby>がありません……」"
translation = "「거만(巨萬)의 부를 손에 넣은 탓에 오히려 불행을 겪고 몸을 망치는 이야기를 세자면…… 매거<rt>마이쿄</rt></ruby>할 겨를<rt>이토마</rt></ruby>이 없습니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ほどほどが一番です……過度な贅沢をせずとも、幸せは味わえるのですから……今、この時間のように」"
translation = "「적당한 게 제일입니다…… 과도한 사치를 하지 않아도 행복은 맛볼 수 있으니까요…… 지금 이 시간처럼.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あなたとの初詣デート……新年から有意義な時を、過ごせました……」"
translation = "「당신과의 하츠모데 데이트…… 신년부터 유의미한 시간을 보낼 수 있었습니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですが人間界の居心地の良さに甘えてしまうと……魔界に帰るのがつらくなってしまいそうですね……」"
translation = "「하지만 인간계의 안락함에 응석 부리게 되면…… 마계로 돌아가는 게 힘들어질 것 같네요……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさん、帰っちゃうんですか？"
translation = "「트리샤 씨, 돌아가 버리는 거야?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いずれ魔界に帰るのか、このまま人間界に留まるのかは……まだ決めあぐねています」"
translation = "「언젠가 마계로 돌아갈지, 이대로 인간계에 머물지는…… 아직 결정하지 못했습니다.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ですがもうしばらくは……この居心地の甘さに浸っていたいと思います……」"
translation = "「하지만 좀 더 당분간은…… 이 안락한 달콤함에 젖어 있고 싶다고 생각합니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「できうるならば、あなたと<ruby>運命<rt>さだめ</rt></ruby>を共にし続けていたいのですが……ご迷惑でしょうか……？」"
translation = "「가능하다면 당신과 운명<rt>사다메</rt></ruby>을 계속 함께하고 싶습니다만…… 폐가 될까요……?」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんのいるところが俺の居場所です"
translation = "「트리샤 씨가 있는 곳이 내 거처야.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「……！\u3000嬉しいです……これからも、末永くよろしくお願いします……」"
translation = "「……! 기쁩니다…… 앞으로도 오래도록 잘 부탁드립니다……」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「また来年のお正月も……初詣に赴きたいものです……美味しい甘酒も飲みたいですし……フフ」"
translation = "「또 내년 정월에도…… 하츠모데를 가고 싶네요…… 맛있는 아마자케도 마시고 싶고요…… 후후.」"

[[dialogue]]
speaker = "unk"
original = "甘酒ならコンビニでも買えますよ？"
translation = "「아마자케라면 편의점에서도 살 수 있는데?」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「いえ、それではいけません……違うのです」"
translation = "「아니요, 그러면 안 됩니다…… 다른 거예요.」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「私が好きなのは……あなたと共に赴いた初詣で、冷えた体を芯から温めてくれる１杯の甘酒なのですから……にへへ♪」"
translation = "「내가 좋아하는 건…… 당신과 함께 간 하츠모데에서, 식은 몸을 속부터 데워주는 한 잔의 아마자케니까요…… 니헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは俺の腕にしがみつくと、前よりもちょっとだけ上手になった笑顔を満面に浮かべるのだった。"
translation = "트리샤 씨는 내 팔에 매달리며, 전보다 조금 더 능숙해진 미소를 만면에 띄우는 것이었다."

