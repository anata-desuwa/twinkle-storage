[[dialogue]]
speaker = "unk"
original = "第４話,ホワイトデーは遊園地で,P"
translation = "제4화, 화이트데이는 유원지에서, P"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ホワイトデーのお返し、てっきり何かのお菓子を貰うんだろうな～って思ってたんですけど」"
translation = "「화이트데이 답례로, 당연히 무슨 과자라도 받을 줄 알았는데」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「まさか会長さんから遊園地デートに誘われるだなんて、思いませんでした。ふふっ、すっごくポイント高いですよ～<emoji=heart04>」"
translation = "「설마 회장군이 유원지 데이트에 권유할 줄은 몰랐어요. 후훗, 굉장히 점수 높아요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それに～……くふふふふっ<emoji=heart04>\u3000会長さんの狼男のコスプレ、よ～く似合ってます♪」"
translation = "「게다가~…… 쿠후후후훗<emoji=heart04> 회장군의 늑대인간 코스프레, 아~주 잘 어울려요♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「不思議ですねぇ、チョコをくださいの一言もなかなか言えない男の子なのに、オオカミの恰好が似合っちゃうだなんて～♪」"
translation = "「희한하네요, 초코를 달라는 말 한마디도 제대로 못 하는 소년인데, 늑대 모습이 어울리다니~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「本当に面白い試みです。遊園地のイベントで、月に１回のコスプレデーがあるだなんて」"
translation = "「정말 흥미로운 시도예요. 유원지 이벤트로 한 달에 한 번 코스프레 데이가 있다니」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「衣装を借りて着飾れば、色々なアトラクションで恩恵を得られる……いい仕組みです」"
translation = "「의상을 빌려 차려입으면 여러 어트랙션에서 혜택을 얻을 수 있다니…… 좋은 시스템이에요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ハロウィンを季節感なく取り入れた感じなんでしょうか……？\u3000将来、魔界に遊園地を作る時の参考にできそうですね♪」"
translation = "「할로윈을 계절감 없이 도입한 느낌일까요……? 나중에 마계에 유원지를 만들 때 참고할 수 있겠네요♪」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌは着替えないの？"
translation = "샤를렌은 안 갈아입어?"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それなんですけど……遊園地から貸し出しされる衣装、どれも胸元がキツくって……」"
translation = "「그게 말이죠…… 유원지에서 대여해 주는 의상이 하나같이 가슴 쪽이 끼어서……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「私も会長さんみたいにレンタルしたかったんですけどー。私、背丈の割に胸がほんのちょっぴり大きいじゃないですか～？」"
translation = "「저도 회장군처럼 렌탈하고 싶었는데요~. 제가 키에 비해서 가슴이 아주 쪼금 크잖아요~?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ん～。どうしましょう。やっぱり星騎士の戦闘服に変身するのが一番でしょうか」"
translation = "「음~. 어쩌죠. 역시 성기사 전투복으로 변신하는 게 제일 나을까요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ね～、会長さん？\u3000シャルレーヌ、変身できる服が２種類ありますけど……どっちの衣装を着てほしいですか～？」"
translation = "「저기~, 회장군? 샤를렌, 변신할 수 있는 옷이 두 종류 있는데…… 어느 의상을 입어줬으면 좋겠어요~?」"

[[dialogue]]
speaker = "unk"
original = "バレンタインフォームで……"
translation = "발렌타인 폼으로……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふっ<emoji=heart04>\u3000は～い、それじゃあ──変身っ<emoji=heart04>」"
translation = "「쿠훗<emoji=heart04> 네~에, 그럼── 변신!<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「リクエストしていただいたバレンタインフォームですよ～、会長さん<emoji=heart04>」"
translation = "「리퀘스트하신 발렌타인 폼이에요~, 회장군<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふふ、狼男の会長さんの隣に立つと、不思議とハロウィンっぽくてまとまりがありますね～♪」"
translation = "「후후, 늑대인간인 회장군 옆에 서니까 묘하게 할로윈 느낌이 나서 조화롭네요~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「でもでも、この衣装……露出がちょっぴり多めなので。しっかりエスコートしてくださいね？」"
translation = "「하지만 하지만, 이 의상…… 노출이 조금 많은 편이라서. 확실하게 에스코트해 주셔야 해요?」"

[[dialogue]]
speaker = "unk"
original = "こうして遊園地のアトラクションを見て回ることになった俺たちは──"
translation = "이렇게 유원지 어트랙션을 둘러보게 된 우리들은──"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「会長さん、こっちのお城を背景に記念撮影しませんか？」"
translation = "「회장군, 이쪽 성을 배경으로 기념사진 찍지 않을래요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ＤＩＳＣで自撮りしますから、しっかりくっつかないと入りませんよー？」"
translation = "「DISC로 셀카 찍을 거니까, 꽉 붙지 않으면 안 들어와요~?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それじゃあいきますよ？\u3000３、２、１──」"
translation = "「그럼 갑니다? 3, 2, 1──」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふふっ──ちゅっ<emoji=heart04>」"
translation = "「쿠후후── 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "い、今ほっぺに……！"
translation = "지, 지금 볼에……!"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「不意打ち成功ですね～♪\u3000あはっ、会長さんのお顔、ふにゃふにゃになってヤバ～<emoji=heart04>\u3000こんな弱そうな狼男さん、初めて見た～<emoji=heart04>」"
translation = "「기습 성공이네요~♪ 아핫, 회장군 얼굴, 흐물흐물해져서 대박~<emoji=heart04> 이렇게 약해 보이는 늑대인간님은 처음 봐~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ほらほらー、せっかくのフリーパスなんですから。とことん楽しみましょう？\u3000いきますよ～♪」"
translation = "「자 자~, 기왕 얻은 프리패스니까요. 마음껏 즐기자구요? 갑니다~♪」"

[[dialogue]]
speaker = "unk"
original = "こうしてからかわれるのはいつものことで、俺も彼女の手のひらで転がされるのが楽しかったりする。"
translation = "이렇게 놀림당하는 건 늘 있는 일이었고, 나도 그녀의 손바닥 위에서 놀아나는 게 즐겁기도 하다."

[[dialogue]]
speaker = "unk"
original = "俺とシャルレーヌは盛り上がりながら、２人きりのコスプレデートを満喫して──"
translation = "나와 샤를렌은 들뜬 기분으로 둘만의 코스프레 데이트를 만끽하고──"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ナイトパレード、すっごく綺麗でしたね。音楽も照明の演出も素敵だったし……<emoji=heart04>」"
translation = "「나이트 퍼레이드, 정말 아름다웠죠. 음악도 조명 연출도 멋졌고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「以前に会長さんが福引を当てた時は、アトラクションを全部楽しめなかったのが心残りでしたけど」"
translation = "「예전에 회장군이 경품에 당첨됐을 때는 어트랙션을 전부 즐기지 못했던 게 아쉬웠는데」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「今日は朝の開園からデートできたので、バッチリでしたね、くふふ♪」"
translation = "「오늘은 아침 개장부터 데이트할 수 있어서 완벽했네요, 쿠후♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それじゃあ会長さん。名残惜しいですけどそろそろ閉演ですし……帰りましょうか？」"
translation = "「그럼 회장군. 아쉽지만 슬슬 폐장 시간이고…… 돌아갈까요?」"

[[dialogue]]
speaker = "unk"
original = "待ってほしい"
translation = "잠깐 기다려줘."

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい？\u3000どうかしたんですか……って、それは……？」"
translation = "「네? 무슨 일인가요…… 어라, 그건……?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「わぁ……こんな贈り物まで用意してただなんて、驚いちゃいました。開けてもいいです？」"
translation = "「와아…… 이런 선물까지 준비했다니 놀랐어요. 열어봐도 돼요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「あ……素敵なペンダント……」"
translation = "「아…… 멋진 펜던트……」"

[[dialogue]]
speaker = "unk"
original = "シャルレーヌには不釣り合いかもだけど"
translation = "샤를렌에게는 어울리지 않을지도 모르지만."

[[dialogue]]
speaker = "unk"
original = "庶民の俺のセンスだから……"
translation = "서민인 내 센스니까……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「…………ダメね。なってないわ」"
translation = "「…………안 되겠네. 틀려먹었어」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ペンダントが、じゃないわ。会長さんのその考えがよ」"
translation = "「펜던트가 그렇다는 게 아니야. 회장군의 그 생각이 말이야」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「贈り物に大切なのは、何よりも気持ちでしょう？\u3000ディアーブルはしたたかな一族と思われているかもしれないけれど……」"
translation = "「선물에서 중요한 건 무엇보다 마음이잖아? 디아블은 영악한 일족이라고 생각될지 모르지만……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「物の価値を全て値段で測るような、凡俗な家柄ではないわ。見くびらないでほしいわね」"
translation = "「물건의 가치를 전부 가격으로 매기는 그런 천박한 가문이 아니야. 얕보지 말아줬으면 좋겠네」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「このペンダント……とっても素敵。会長さんの気持ちがこもってるのが一目でわかったわ」"
translation = "「이 펜던트…… 정말 멋져. 회장군의 마음이 담겨있다는 걸 한눈에 알 수 있었어」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「流星市国でも有名なブランド。だから会長さんが背伸びをして、無理して買ってくれたこともわかるし……」"
translation = "「유성시국에서도 유명한 브랜드. 그러니까 회장군이 무리해서 사줬다는 것도 알 수 있고……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それにここのブランドは、カシオペア星座にちなんだデザインにこだわってることも知ってる」"
translation = "「게다가 여기 브랜드는 카시오페이아자리에 얽힌 디자인을 고집한다는 것도 알고 있어」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「きっと私の守護星──シェダルに関係していたから、選んでくれたんでしょう？」"
translation = "「분명 내 수호성── 셰달과 관계있었으니까 골라준 거겠지?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「本当に……会長さんにしては悪くないセンスだわ。ご褒美をあげるから、ちょっとしゃがみなさい？」"
translation = "「정말…… 회장군 치고는 나쁘지 않은 센스야. 상을 줄 테니까 잠깐 숙여볼래?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……ちゅっ<emoji=heart04>」"
translation = "「……쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「何よ驚いて……私だって、ここまで想いのこもった贈り物をされた時にまで、からかったりしないわ」"
translation = "「뭘 그렇게 놀라…… 나라고 해서 이렇게 마음이 담긴 선물을 받았을 때까지 놀리거나 하진 않아」"

[[dialogue]]
speaker = "unk"
original = "俺と付き合ってくれる？"
translation = "나랑 사귀어 줄래?"

[[dialogue]]
speaker = "unk"
original = "……大好きだよ、シャルレーヌ"
translation = "……정말 좋아해, 샤를렌."

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……それってつまり、あなたは私のものになるってこと？\u3000ず～っと私のペットになるって宣言かしら？」"
translation = "「……그 말은 즉, 당신은 내 것이 되겠다는 뜻? 계속 내 펫이 되겠다는 선언일까?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「家名のための目的は達成できるけれど……ちょっとだけつまらないわね」"
translation = "「가문을 위한 목적은 달성할 수 있겠지만…… 조금은 재미없네」"

[[dialogue]]
speaker = "unk"
original = "俺はまだ負けてない！"
translation = "난 아직 지지 않았어!"

[[dialogue]]
speaker = "unk"
original = "……お付き合いは対等なものだろ？"
translation = "……사귀는 건 대등한 거잖아?"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「…………くふふふっ<emoji=heart04>」"
translation = "「…………쿠후후후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「素敵～♪\u3000面白い考えですねぇ。それ、乗ってあげます<emoji=heart04>」"
translation = "「멋져~♪ 재미있는 생각이네요. 그거, 받아들여 줄게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「今日から私たちは交際をしますが、会長さんが私のペットになるかどうかは、まだ勝負がついていない……ということで<emoji=heart04>」"
translation = "「오늘부터 우리는 교제를 하겠지만, 회장군이 내 펫이 될지 어떨지는 아직 승부가 나지 않았다……는 걸로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "簡単には負けないからな！"
translation = "쉽게 지지는 않을 거니까!"

[[dialogue]]
speaker = "unk"
original = "前にも言ったけど……"
translation = "전에도 말했지만……"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「キャハハハっ<emoji=heart04>\u3000何度負けても負けを認めない困った魔王様ですけど～……だからこそ、調教しがいがあるってものですよね♪」"
translation = "「캬하하하<emoji=heart04> 몇 번을 져도 패배를 인정하지 않는 곤란한 마왕님이지만~…… 그렇기에 조교할 보람이 있는 법이죠♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はぁい、承知いたしました<emoji=heart04>\u3000結末はもう決まりきってますけど～……」"
translation = "「네에, 잘 알겠습니다<emoji=heart04> 결말은 이미 정해져 있지만요~……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「もうちょっとだけシャルレーヌに見せてください。会長さんの弱くて情けなくて、可愛い～ところ<emoji=heart04>」"
translation = "「조금만 더 샤를렌에게 보여주세요. 회장군의 약하고 한심하고, 귀여운~ 모습<emoji=heart04>」"

