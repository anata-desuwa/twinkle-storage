[[dialogue]]
speaker = "unk"
original = "第４話,メルクリウスハート,P"
translation = "제4화, 메르쿠리우스 하트, P"

[[dialogue]]
speaker = "unk"
original = "プリムラとの付き合いも長くなってきた、とある休日。彼女が突然、家に押しかけてきた――"
translation = "프리뮬러와 알고 지낸 지도 꽤 된 어느 휴일. 그녀가 갑자기 집으로 들이닥쳤다――"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フフフ……<ruby>眷族<rt>けんぞく</rt></ruby>よ、よもやこの券を忘れてはおるまいな？」"
translation = "「후후후…… 권속이여, 설마 이 권을 잊은 건 아니겠지?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そう、これは……貴様が以前困っていた時に我が力を貸して、その見返りとして発行させた『１日何でも言うことを聞く券』じゃ！」"
translation = "「그래, 이것은…… 네놈이 이전에 곤란해할 때 내가 힘을 빌려주고, 그 대가로 발행하게 한 『하루 동안 뭐든 말 듣는 권』이니라!」"

[[dialogue]]
speaker = "unk"
original = "まさかそれを使って、俺を眷族にしようと？"
translation = "설마 그걸 써서 나를 권속으로 삼으려고?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハ！\u3000その通り！\u3000少なくとも今日１日は、我の命令を素直に聞くのじゃ！」"
translation = "「후하하하! 바로 그렇다! 적어도 오늘 하루는 나의 명령을 순순히 듣거라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なに、案ずるな。今回に限っていえば、悪事を働けなどと命令するつもりはない。我が貴様に命じるのは――」"
translation = "「뭐, 걱정 마라. 이번에 한해서는 나쁜 짓을 하라고 명령할 생각은 없느니라. 내가 네놈에게 명하는 것은――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我を<b>抱っこ</b>することじゃ！」"
translation = "「나를 <b>안아주는</b> 것이니라!」"

[[dialogue]]
speaker = "unk"
original = "……なんて？"
translation = "……뭐라고?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「抱っこじゃ！\u3000貴様は今、ソファーに腰かけているであろう？\u3000我をその膝の上に乗せるがよい！」"
translation = "「안아달란 말이다! 네놈은 지금 소파에 앉아 있지 않느냐? 나를 그 무릎 위에 앉히거라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「何も難しいことは言っておらぬであろう？\u3000まさか嫌とは言うまいな？」"
translation = "「딱히 어려운 걸 말하는 게 아니지 않느냐? 설마 싫다고는 안 하겠지?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――フフフ、よしよし♪\u3000ならば膝の上、邪魔させてもらうぞ。……よいしょっと」"
translation = "「――후후후, 좋아 좋아♪ 그렇다면 무릎 위, 실례하마. ……영차.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふむふむ……おお……！\u3000なるほど♪」"
translation = "「흠흠…… 오오……! 과연♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フフフ、これはなかなかにいいものなのじゃ♪\u3000世界征服をした暁には、玉座にこうやって２人腰かけるのも悪くないやもしれぬ」"
translation = "「후후후, 이것 참 꽤 좋은 것이로구나♪ 세계정복을 완수한 뒤에는 옥좌에 이렇게 둘이서 앉는 것도 나쁘지 않을지도 모르겠군.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――む？\u3000なぜ抱っこなのかじゃと？」"
translation = "「――음? 왜 안아달라고 했느냐고?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様、いつもサチとこんな形で抱き合っておるであろう。故に我も同じことをしてみただけのこと」"
translation = "「네놈, 항상 사치와 이런 형태로 껴안고 있지 않느냐. 고로 나도 똑같은 걸 해봤을 뿐이니라.」"

[[dialogue]]
speaker = "unk"
original = "言っとくけど、あれは不可抗力だからね！？"
translation = "말해두겠는데, 그건 불가항력이거든!?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様がサチの幸運を狂わせる特異点であることは承知の上じゃ」"
translation = "「네놈이 사치의 행운을 뒤흔드는 특이점이라는 건 알고 있느니라.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ただ、貴様は我と眷族の契約を結んでいるのだから、我がサチと同じことをしても何らおかしくはなかろう？」"
translation = "「다만 네놈은 나와 권속의 계약을 맺고 있으니, 내가 사치와 똑같은 짓을 해도 전혀 이상할 것 없지 않느냐?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「というよりも、むしろ我の方に権利があるはず。待てよ、サチとはもっとハレンチな状態になっておったな……そうじゃ！」"
translation = "「그보다 오히려 나에게 권리가 있을 터. 잠깐, 사치와는 좀 더 파렴치한 상태가 되어 있었지…… 그래!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「お互いに腕を相手の背中に回して、もっと密着するのじゃ。こんな風に」"
translation = "「서로 팔을 상대의 등에 두르고 좀 더 밀착하거라. 이런 식으로.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ほら、貴様もじゃ。サチがよくて、我がダメなどとは言うまいな？」"
translation = "「자, 네놈도 말이다. 사치는 되고 나는 안 된다는 소리는 안 하겠지?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「何をもたもたしておるのじゃ。早くせい」"
translation = "「뭘 꾸물거리고 있느냐. 어서 하거라.」"

[[dialogue]]
speaker = "unk"
original = "（プリムラの体を抱き締める）"
translation = "(프리뮬러의 몸을 끌어안는다)"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ん……、フフフ……♪\u3000何だ、サチのやつめ、これで慌てるとはまだまだ子供じゃな」"
translation = "「응……, 후후후……♪ 뭐야, 사치 녀석, 이걸로 당황하다니 아직 애로구나.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「全然悪くないではないか。体温が心地よく、布団よりもよく寝られそうじゃ」"
translation = "「전혀 나쁘지 않지 않느냐. 체온이 기분 좋아서 이불보다 더 잘 잘 수 있을 것 같구나.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「貴様も、サチとくっつくよりも、我の方がよいのではないか？\u3000なんせ、我の体は世界でただ１つの賢者の石でできておるのじゃからな♪」"
translation = "「네 녀석도, 사치랑 붙어먹는 것보다 짐이 더 좋지 않으냐? 뭐니 뭐니 해도, 짐의 몸은 세계에서 단 하나뿐인 현자의 돌로 되어 있으니 말이다♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「人を駄目にしてしまうであろう抱き心地の、ぷにぷにもちもち肌よ。それに、元の姿を取り戻せば、我は胸や尻も大きいナイスバディ―なのじゃ」"
translation = "「사람을 망쳐버릴 것만 같은 안기고 싶은 기분, 푸딩처럼 말랑말랑 쫀득쫀득한 피부니라. 게다가 본래의 모습을 되찾으면, 짐은 가슴이나 엉덩이도 커다란 나이스 바디란 말이지.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「サチとどちらが優れているかなど比べるまでもあるまい。我の眷属になれば、こうして抱っこする権利が手に入るというわけじゃ」"
translation = "「사치와 어느 쪽이 더 뛰어난지 따위는 비교할 필요도 없겠지. 짐의 권속이 된다면, 이렇게 안아줄 권리를 손에 넣을 수 있다는 뜻이니라.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「故に、どうじゃ？\u3000そろそろ貴様も、我の眷族に下ってもよい頃合いなのではないか？」"
translation = "「고로, 어떠냐? 슬슬 네 녀석도 짐의 권속으로 들어와도 좋을 때가 되지 않았느냐?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フフフ……澄ましておるが、心臓の音が早まっているのを感じるぞ♪\u3000これはすなわち、我を子供ではなく女として見ているということ。違うか？」"
translation = "「후후후…… 시치미를 떼고 있다만, 심장 소리가 빨라지는 게 느껴지는구나♪ 이건 즉, 짐을 어린애가 아니라 여자로 보고 있다는 것. 아니냐?」"

[[dialogue]]
speaker = "unk"
original = "俺も一応男だし……こうも密着してたら……"
translation = "나도 일단 남자고…… 이렇게나 밀착해 있으면……"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「フハハハ！\u3000その反応は、なかなかに悪くない気分なのじゃ♪」"
translation = "「후하하하! 그 반응은 꽤 나쁘지 않은 기분이구나♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「これは明日、サチに自慢してやらねばな！」"
translation = "「이건 내일 사치에게 자랑해 줘야겠구나!」"

[[dialogue]]
speaker = "unk"
original = "（もしかして、サチが羨ましくて……？）"
translation = "(설마 사치가 부러워서……?)"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――ということが、昨日あったのじゃ！\u3000これはもう、我の勝ちであろう？」"
translation = "「――라는 일이 어제 있었느니라! 이건 이제 짐의 승리겠지?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え、えっと……」"
translation = "「어, 에또……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「どうした、驚いて声も出ないか？」"
translation = "「왜 그러느냐, 놀라서 목소리도 안 나오느냐?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「う、うん……なんというか、それってもう恋人同士のやることっていうか……」"
translation = "「으, 응…… 뭐랄까, 그건 이미 연인끼리나 하는 짓이랄까……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いやだって、自発的に抱き合うって……少なくとも、相手のことが好きじゃないとできないよね？」"
translation = "「아니 그게, 자발적으로 껴안는다는 건…… 적어도 상대방을 좋아하지 않으면 못 하는 거잖아?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「プリムラはつまり、お兄さんのことが……」"
translation = "「프림라는 그러니까, 오빠를……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ななな、何を言っておるのじゃ！？\u3000我が眷族のことをす、す、す、好き！？\u3000悪の終末兵器たる我が、そのような意識を向けるわけが……」"
translation = "「뭐뭐뭐, 무슨 소리를 하는 게냐!? 짐이 권속을 조, 조, 조, 좋아해!? 악의 종말병기인 짐이 그런 의식을 가질 리가……」"

[[dialogue]]
speaker = "unk"
original = "（こちらを見るプリムラと、目を合わせる）"
translation = "(이쪽을 보는 프림라와 눈을 맞춘다)"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「～～～～～～っ！\u3000じゅ――」"
translation = "「～～～～～～! 지――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「１０万年早いのじゃ、馬鹿者ぉぉぉ～～～っ！」"
translation = "「10만 년은 이르느니라, 바보야아아아～～～!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あのプリムラが……ふふっ♪」"
translation = "「그 프림라가…… 후훗♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん。これからもどうか、プリムラのことをよろしくお願いしますね」"
translation = "「오빠. 앞으로도 부디 프림라를 잘 부탁드려요.」"

[[dialogue]]
speaker = "unk"
original = "サチの手前、照れ臭くなりつつも、プリムラが昨日と違って男として意識してくれたことを、嬉しく思ってしまうのだった。"
translation = "사치 앞에서 쑥스러워지면서도, 프림라가 어제와 달리 남자로 의식해 준 것이 기쁘게 느껴졌다."

