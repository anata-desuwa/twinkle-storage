[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「オープン前に招待してもらえるなんて、ヘレナ様には感謝感激大喝采ですね！」"
translation = "「오픈 전에 초대받다니 헬레나 님께는 감사 감격 대갈채네요!」"

[[dialogue]]
speaker = "unk"
original = "百目騎家の保養所は再整備され、新たに海水浴場としてオープンすることになった。"
translation = "도우메키 가의 요양소는 재정비되어 새로 해수욕장으로 오픈하게 되었다."

[[dialogue]]
speaker = "unk"
original = "俺たちは、ヘレナちゃんの計らいでオープン前に入れてもらったのだ。"
translation = "우리는 헬레나짱의 배려로 오픈 전에 들어오게 된 것이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「前来た時は荒れ放題でしたから、ずいぶん綺麗になりました。これでいつお客さんが来ても大丈夫です」"
translation = "「지난번에 왔을 때는 황폐했었는데 제법 깨끗해졌어요. 이제 언제 손님이 와도 괜찮아요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私の思い出の場所が、生まれ変わって、また誰かの思い出の場所になる……。寂しい気持ちもありますけど、やっぱり嬉しいですね」"
translation = "「제 추억의 장소가 다시 태어나 또 누군가의 추억의 장소가 된다니…… 쓸쓸한 기분도 들지만 역시 기쁘네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日はまず俺たちが思い出を作ろう」"
translation = "「오늘은 먼저 우리가 추억을 만들자」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はい！\u3000というわけで……てい！」"
translation = "「네! 그런 의미에서…… 에잇!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うわっ！」"
translation = "「우왓!」"

[[dialogue]]
speaker = "unk"
original = "いきなりビニールシートに押し倒されてしまった。レイラの大きなおっぱいが体に密着する。"
translation = "갑자기 비닐 시트 위로 밀쳐지고 말았다. 레이라의 커다란 가슴이 몸에 밀착된다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「レイラ、何する気？」"
translation = "「레이라, 뭐 할 생각이야?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「何というかナニです。せっかくお外で２人きりなんですから、思いっきりハメを外しませんか？」"
translation = "「뭐랄까 거시기입니다. 어렵게 야외에서 둘뿐이니까 마음껏 파격(하메)적으로 놀아보지 않을래요?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「まぁハメを外すというかハメるんですが」"
translation = "「뭐 파격적이라기보다 박(하메)는 거지만요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「言い方ぁ！」"
translation = "「말투가 왜 그래!」"

[[dialogue]]
speaker = "unk"
original = "初めて体を重ねた夜から、俺たちは何度も愛し合ってきた。"
translation = "처음 몸을 섞은 밤부터 우리는 몇 번이나 서로 사랑을 나누어 왔다."

[[dialogue]]
speaker = "unk"
original = "でも今日みたいに野外で──というのは経験がない。"
translation = "하지만 오늘처럼 야외에서── 라는 건 경험이 없다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さんともあろうお方が野外プレイに怖気づいたりしませんよね？」"
translation = "「마왕님씩이나 되는 분이 야외 플레이에 겁먹거나 하진 않겠죠?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なわけないよ。男の夢だし」"
translation = "「그럴 리 없잖아. 남자의 꿈이고」"

[[dialogue]]
speaker = "unk"
original = "個人的には、人生でやってみたいことのひとつだと思う。"
translation = "개인적으로는 인생에서 해보고 싶은 일 중 하나라고 생각한다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「なるほど。魔王さんの魔王さんもその気みたいですね」"
translation = "「과연. 마왕님의 마왕님도 그럴 기세인 것 같네요」"

[[dialogue]]
speaker = "unk"
original = "レイラが水着の上から俺の股間をなでる。ペニスもすでに固くなりつつあった。"
translation = "레이라가 수영복 위로 나의 가랑이를 어루만진다. 페니스도 이미 단단해지고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日はなんか積極的だね？」"
translation = "「오늘은 왠지 적극적이네?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いつも魔王さんにはヒィコラ言わされてますからね。今日は私が魔王さんを鳴かせる番です」"
translation = "「항상 마왕님께는 낑낑대며 당하기만 하니까요. 오늘은 제가 마왕님을 울릴 차례예요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……できるといいね」"
translation = "「……할 수 있으면 좋겠네」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「むぅ～、私で童貞捨てたくせにぃ……」"
translation = "「무으~ 저한테 동정 떼놓고서어……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「こうなったら泣いて謝っても許しませんからね。気持ちよくて死んじゃう～って言わせてみせます。余裕なのも今のうちですよ」"
translation = "「이렇게 된 이상 울며 사과해도 용서 안 할 거니까요. 기분 좋아서 죽을 것 같아~라고 말하게 만들 거예요. 여유로운 것도 지금뿐이라구요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「じゃあ脱ぎ脱ぎしましょうね。……あ、ちょっと腰浮かせて……はい、いいですよ。ふふっ、すっぽんぽんになっちゃいましたね」"
translation = "「자, 그럼 벗겨드릴게요. ……아, 허리 좀 들어봐요…… 네, 됐어요. 후후, 홀딱 벗어버렸네요」"

[[dialogue]]
speaker = "unk"
original = "海パンをはぎ取られた俺の上に、水着を着崩したレイラが跨る。"
translation = "수영복을 빼앗긴 내 위에 수영복을 흐트러뜨린 레이라가 올라탄다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さんのおち○ちん、準備万端ですね。鉄みたいに固くなって、熱くて、すごく、その……おち○ちんって感じです」"
translation = "「마왕님 자지, 준비 완료네요. 철처럼 딱딱해지고 뜨거워서 정말 그…… 자지라는 느낌이에요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……どんな感じ？」"
translation = "「……어떤 느낌?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いやあの、うまく説明できないというか、他に説明しようがないというか……独特の存在感といいましょうか……」"
translation = "「아니 그게, 설명을 잘 못 하겠달까 달리 설명할 길이 없달까…… 독특한 존재감이라고나 할까요……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「おっきなおち○ちん見てたら、私もドキドキしてきちゃいました。ほら、もうこんなに濡れてます」"
translation = "「커다란 자지를 보고 있으니까 저도 두근거리기 시작했어요. 봐요, 벌써 이렇게 젖었어요」"

[[dialogue]]
speaker = "unk"
original = "ずらした水着から見えるレイラの秘所は、言葉通り愛液がにじんでいた。"
translation = "옆으로 젖힌 수영복 사이로 보이는 레이라의 비소는 말 그대로 애액이 배어 나오고 있었다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふふっ。魔王さん、私のおま○こ、そんなに気になりますか？\u3000視線、分かっちゃうんですから」"
translation = "「후후. 마왕님, 제 보지 그렇게 신경 쓰이나요? 시선, 다 느껴진다구요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あっ<emoji=heart04>\u3000すーり、すーり……ほぉら、レイラの恋人おま○こ、おち○ちんに擦ってるだけでも気持ちいいでしょう？」"
translation = "「앗<emoji=heart04> 문질, 문질…… 봐요, 레이라의 연인 보지, 자지에 문지르기만 해도 기분 좋죠?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「今日は私がリードしますからね。魔王さんが上手におねだりできるまで挿れてあげません」"
translation = "「오늘은 제가 리드할 거니까요. 마왕님이 예쁘게 조를 때까지 안 넣어줄 거예요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「レイラのおま○こに早くち○ちん挿れたい。挿れさせてくださいお願いします」"
translation = "「레이라 보지에 빨리 자지 넣고 싶어. 넣게 해주세요 부탁입니다」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「なっ！？\u3000一切の躊躇なし！？\u3000魔王さん、さすがの思い切りです」"
translation = "「앗!? 일절의 망설임도 없이!? 마왕님, 역시 과감하시네요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここまでされてお預けなんてごめんだよ。俺のプライドなんて海に投げ捨てた」"
translation = "「여기까지 당하고 참으라니 거절이야. 내 프라이드 따위 바다에 던져버렸어」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「プライドの不法投棄！？\u3000分かりました。不肖百目騎レイラ、魔王さんの覚悟に応えましょう」"
translation = "「프라이드 불법 투기!? 알겠습니다. 부족한 도우메키 레이라, 마왕님의 각오에 부응하죠」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「では、魔王さんのおち○ちん……」"
translation = "「그럼 마왕님의 자지……」"

[[dialogue]]
speaker = "unk"
original = "ペニスの先端にレイラの膣口が当たる。柔らかい肉の、生の感触だ。"
translation = "페니스의 끝에 레이라의 질 입구가 닿는다. 부드러운 살점의 생생한 감촉이다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いただきまぁす<emoji=heart04>」"
translation = "「잘 먹겠습니다아<emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ん～～～～～～～～～っ<emoji=heart04>」"
translation = "「응~~~~~~~~~~~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を下ろし、ペニスを根元までくわえ込んだレイラがぶるぶると震える。"
translation = "허리를 숙이고 자지를 뿌리까지 물어버린 레이라가 부들부들 떤다."

[[dialogue]]
speaker = "unk"
original = "初めての時はこじ開けるように入れていたのに、今では簡単に奥まで飲み込んでいた。"
translation = "처음에는 억지로 비집어 열듯 넣었었는데, 이제는 간단하게 깊은 곳까지 삼키고 있었다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「っ……はぁ……はぁ……」"
translation = "「으…… 하아…… 하아……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……大丈夫？」"
translation = "「……괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "膣がぎゅっと締まり、レイラの快感が俺にも伝わってくる。俺も油断していたら果ててしまっていたかもしれない。"
translation = "질이 꽉 조여지며 레이라의 쾌감이 나에게도 전해져 온다. 나도 방심했다면 가버렸을지도 모른다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「だ、だいじょーぶ、だいじょーぶです。ちょっとイったりしてないですから……」"
translation = "「개, 괜찮아, 괜찮아요. 조금 가버리거나 하지 않았으니까……」"

[[dialogue]]
speaker = "unk"
original = "虚勢なのは一目瞭然だが、可愛いので指摘はしない。"
translation = "허세라는 건 일목요연하지만, 귀여우니까 지적하지는 않는다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さんのおち○ちん、おっきくて、熱くて……私の中でそそり立ってる……本当に、すごい存在感……」"
translation = "「마왕님의 자지, 커다랗고, 뜨거워서…… 제 안에서 우뚝 솟아있어…… 정말로, 대단한 존재감……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「私が上になるの、初めてだから、知らなかった……こんな感じなんだ……」"
translation = "「제가 위가 되는 거 처음이라 몰랐어요…… 이런 느낌이구나……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ひー、ひー、ふー、ふー…………」"
translation = "「히ー, 히ー, 후ー, 후ー…………」"

[[dialogue]]
speaker = "unk"
original = "精神統一するかのように、息を整えるレイラ。"
translation = "정신통일이라도 하듯 숨을 고르는 레이라."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「慣れるまで動かないでいたら？」"
translation = "「익숙해질 때까지 움직이지 말고 있을래?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んんっ、いえ、今日は……私のターンなので、いっぱい責めちゃいます」"
translation = "「음읏, 아니요, 오늘은…… 제 차례니까, 잔뜩 괴롭혀줄 거예요」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それじゃ、動きますね……」"
translation = "「그럼, 움직일게요……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んんっ！\u3000ふっ、んっ……ん～～～っ<emoji=heart04>\u3000はぁ、はぁ……んんぅっ……<emoji=heart04>」"
translation = "「음읏! 훗, 응…… 으응~~~으 <emoji=heart04> 하아, 하아…… 음응으윽…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラが声を抑えながら腰を動かし始める。"
translation = "레이라가 목소리를 억누르며 허리를 움직이기 시작한다."

[[dialogue]]
speaker = "unk"
original = "熱い粘膜が硬いペニスと摩擦して、刺激が気持ちいい。"
translation = "뜨거운 점막이 딱딱한 자지와 마찰하며 자극이 기분 좋다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「まおう、さんっ……勝手に、イっちゃ、ダメ、ですから、ね？\u3000あふっ……あんっ<emoji=heart04>」"
translation = "「마왕, 님…… 마음대로, 가버리면, 안, 되니까, 요? 아후…… 앙 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「勝手に、中に出したら……あっ、早漏さんになっちゃい、ますっ……んんっ<emoji=heart04>」"
translation = "「마음대로, 안에 싸버리면…… 앗, 조루 씨가 되어버려, 요…… 음읏 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラが体を上下させる度、大きな胸がたぷんたぷんと揺れて、煽情的な光景に思わず下半身にも力が入る。"
translation = "레이라가 몸을 위아래로 흔들 때마다 커다란 가슴이 출렁출렁 흔들려, 선정적인 광경에 나도 모르게 하반신에 힘이 들어간다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さんの、あっ<emoji=heart04>\u3000おち○ちん、私の中でびくって、しました、ね……んんっ、今日は、このまま……私がリード、しちゃいます、よ……あっ<emoji=heart04>」"
translation = "「마왕님의, 앗 <emoji=heart04> 자지, 제 안에서 움찔, 했네, 요…… 음읏, 오늘은, 이대로…… 제가 리드, 해버릴 거예, 요…… 앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎこちなかったレイラの腰の動きが、次第に大きくなっていく。"
translation = "어색했던 레이라의 허리 놀림이 점차 커져간다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ん、あ、ああ<emoji=heart04>\u3000ん～～～<emoji=heart04>\u3000おち○ちん、熱い……中、こすれて、声、出ちゃう……っ<emoji=heart04>」"
translation = "「음, 아, 아아 <emoji=heart04> 음~~~ <emoji=heart04> 자지, 뜨거워…… 안쪽, 쓸려서, 목소리, 나와버려…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふっ、はぁ、あ、ん<emoji=heart04>\u3000はぁ、はぁ、ああっ<emoji=heart04>\u3000魔王、さん……ん<emoji=heart04>\u3000気持ち、いい、ですか……？」"
translation = "「훗, 하아, 아, 응 <emoji=heart04> 하아, 하아, 아앗 <emoji=heart04> 마왕, 님…… 응 <emoji=heart04> 기분, 좋, 아요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、すごく気持ちいいよ」"
translation = "「아아, 정말 기분 좋아」"

[[dialogue]]
speaker = "unk"
original = "レイラの熱い体温が、柔らかい肉感が、俺を包んで離さない。"
translation = "레이라의 뜨거운 체온이, 부드러운 육감이 나를 감싸고 놓아주지 않는다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふふっ、よかった……あっ<emoji=heart04>\u3000もっと、もっと……気持ち、よく、しちゃいます、よ……あふっ<emoji=heart04>」"
translation = "「후훗, 다행이다…… 앗 <emoji=heart04> 더, 더…… 기분, 좋게, 해버릴 거예, 요…… 아후 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それじゃ……ちょっと角度を付けて……んあっ<emoji=heart04>\u3000あ、はっ、ああ、んんっ、ん～～っ<emoji=heart04>」"
translation = "「그럼…… 살짝 각도를 줘서…… 음앗 <emoji=heart04> 아, 핫, 아아, 음읏, 음~~읏 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ、ああっ、んっ<emoji=heart04>\u3000あたるトコ変わると、ぞわって……ん、ん、んんっ……あっ……ふぅ、はぁ、ん～～～っ<emoji=heart04>」"
translation = "「하아, 아앗, 응 <emoji=heart04> 닿는 곳이 바뀌니까, 오싹해서…… 응, 응, 음읏…… 앗…… 후우, 하아, 음~~~으 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を責めると言いながらも、まるで俺のペニスで自慰をするみたいに、少しづつ角度や緩急を変えて気持ちいいところを探っている。"
translation = "나를 괴롭히겠다고 말하면서도, 마치 내 자지로 자위라도 하는 것처럼 조금씩 각도나 완급을 바꾸며 기분 좋은 곳을 찾고 있다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふっ……はっ……あ、ああ、ああんっ<emoji=heart04>\u3000あ、ここ、いい……はあぁっ<emoji=heart04>\u3000んんっ、は、はっ……あんっ<emoji=heart04>」"
translation = "「훗…… 핫…… 아, 아아, 아앙 <emoji=heart04> 아, 여기, 좋아…… 하아아앗 <emoji=heart04> 음읏, 하, 핫…… 앙 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「いいところ、擦れて……ふああっ<emoji=heart04>\u3000はぁ、はぁ……んっ、あ、は、ああっ<emoji=heart04>\u3000ん、あ、あ、あ、ひっ、ひやぁああっ<emoji=heart04>」"
translation = "「좋은 곳, 쓸려서…… 후아앗 <emoji=heart04> 하아, 하아…… 응, 아, 하, 아앗 <emoji=heart04> 응, 아, 아, 아, 히익, 히야아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "コツを掴んできたのか、レイラの腰のリズムが一定になってきた。息も浅く、速くなっている。"
translation = "요령을 터득했는지 레이라의 허리 리듬이 일정해졌다. 숨결도 얕고 빨라지고 있다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はっ、あっ、ああ……は、あ、んっ<emoji=heart04>\u3000腰、動いちゃ、う……ああぁっ<emoji=heart04>」"
translation = "「핫, 앗, 아아…… 하, 아, 응 <emoji=heart04> 허리, 움직여버려, 요…… 아아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラの自慰を覗いているようで興奮する。それと同時にイタズラ心も湧いてきて……"
translation = "레이라의 자위를 엿보고 있는 것 같아 흥분된다. 그와 동시에 장난기 또한 솟구쳐서……"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ、ダメですっ、いま、おっぱいさわっちゃ──」"
translation = "「아, 안 돼요, 지금, 가슴 만지면──」"

[[dialogue]]
speaker = "unk"
original = "頭上で揺れるレイラの乳を鷲掴みにする。"
translation = "머리 위에서 흔들리는 레이라의 젖을 움켜쥔다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んん～～～～～～～っ<emoji=heart04>」"
translation = "「음음~~~~~~~~~~~으 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラの全身がビクビク小さく跳ねた。"
translation = "레이라의 전신이 파르르 작게 튀어 올랐다."

[[dialogue]]
speaker = "unk"
original = "俺は構わずレイラのおっぱいに吸い付き、その先端を軽く噛む。"
translation = "나는 상관하지 않고 레이라의 가슴에 입을 맞추며, 그 끝을 살짝 깨문다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ひぃぃいんっ！？\u3000ダメ、ダメ、今日は私が魔王さんをイかせるのっ！」"
translation = "「히이이잉!? 안 돼, 안 돼, 오늘은 내가 마왕님을 가게 만들어야 한단 말야!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んんぁあっ<emoji=heart04>\u3000ダメなのに、ダメなのに……おっぱい甘噛みされてゾクゾクしちゃう<emoji=heart04>\u3000腰止まらなくて、このままじゃ、イっちゃ──」"
translation = "「음응아앗 <emoji=heart04> 안 되는데, 안 되는데…… 가슴 살짝 깨물려서 움찔거려버려 <emoji=heart04> 허리 멈추질 않아서, 이대로라면, 가버렷──」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んああっ～～～～～～～っっ<emoji=heart04><emoji=heart04>」"
translation = "「음아앗~~~~~~~~~~~으으 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂し、全身を大きく震わせるレイラ。"
translation = "절정하며 전신을 크게 떨고 있는 레이라."

[[dialogue]]
speaker = "unk"
original = "それに伴って、射精を促すように強く締め付けてくるが、歯を食いしばって耐える。"
translation = "그에 수반하여 사정을 재촉하듯 강하게 조여오지만, 이를 악물고 버틴다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「うぅ……魔王さんをイかせるはずだったのにぃ……」"
translation = "「으으…… 마왕님을 가게 만들 생각이었는데에……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁはぁ……もうっ、魔王さんのおち○ちんが気持ちよすぎるのがいけないんですぅ～」"
translation = "「하아하아…… 정말이지, 마왕님의 자지가 너무 기분 좋은 게 잘못이라구요오~」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さんの下半身大魔王っ。おっぱい大好き魔人っ」"
translation = "「마왕님의 하반신 대마왕. 가슴 너무 좋아 마인」"

[[dialogue]]
speaker = "unk"
original = "開き直りながら拗ねるレイラ。でもまだ俺のペニスが挿入ったままだ。"
translation = "적반하장 격으로 투덜거리는 레이라. 하지만 아직 내 자지는 삽입된 채다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ今度は俺の番だな」"
translation = "「그럼 이번엔 내 차례네」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え、うそ！？\u3000私もうイって……や、ダメっ！」"
translation = "「에, 거짓말!? 나 이미 가버렸는데…… 야, 안 돼!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ひあああっ<emoji=heart04>\u3000やっ<emoji=heart04>\u3000んぁ、ああっ<emoji=heart04>\u3000あん、あ、あ、ああぁあっ<emoji=heart04>\u3000」"
translation = "「히아아앗 <emoji=heart04> 싫어 <emoji=heart04> 음아, 아앗 <emoji=heart04> 앙, 아, 아, 아아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身に力を込め、レイラを思い切り、力任せに突き上げる。"
translation = "하반신에 힘을 주어, 레이라를 마음껏 힘껏 밀어 올린다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「やっ<emoji=heart04>\u3000魔王さん、はげ、しいっ……ああぁっ<emoji=heart04>\u3000下から突かれて、体、浮いちゃっ<emoji=heart04>」"
translation = "「싫어 <emoji=heart04> 마왕님, 격해, 요…… 아아아앗 <emoji=heart04> 밑에서 찔려서, 몸이, 떠버려 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んあっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000私の、一番、深いところ……子宮まで、突き上げられてるっ<emoji=heart04>\u3000魔王さんの、おち○ちんでっ<emoji=heart04>」"
translation = "「음앗 <emoji=heart04> 아아아앗 <emoji=heart04> 제, 제일, 깊은 곳…… 자궁까지, 꿰뚫리고 있어 <emoji=heart04> 마왕님의, 자지에 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ひあっ<emoji=heart04>\u3000子宮の、あ、入口、ずんずんされてるっ<emoji=heart04>\u3000ふあっ、あ、や、ああ、あん<emoji=heart04>」"
translation = "「히앗 <emoji=heart04> 자궁의, 아, 입구, 쿡쿡 찔리고 있어 <emoji=heart04> 후앗, 아, 야, 아아, 앙 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「魔王さんの、おち○ちんっ<emoji=heart04>\u3000んぁっ、あっ<emoji=heart04>\u3000私の、おま○この、中で、暴れてるっ<emoji=heart04>」"
translation = "「마왕님의, 자지 <emoji=heart04> 음아앗, 앗 <emoji=heart04> 제, 보지, 안에서, 날뛰고 있어 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「や、や、やぁっ<emoji=heart04>\u3000私のおま○こ、魔王さんに、好き放題されてるっ<emoji=heart04>」"
translation = "「야, 야, 야아앗 <emoji=heart04> 내 보지, 마왕님한테, 마음껏 당하고 있어 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「もうイってるのにぃっ<emoji=heart04>\u3000もう気持ちいいのにっ<emoji=heart04>\u3000あ、ふっ<emoji=heart04>\u3000無理やり、気持ちよくされてるっ<emoji=heart04>」"
translation = "「이미 가버렸는데에 <emoji=heart04> 이미 기분 좋은데 <emoji=heart04> 아, 훗 <emoji=heart04> 억지로, 기분 좋아지게 당하고 있어 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んん、あ、あぁっ<emoji=heart04>\u3000や、あっ、あっ、ひぃいん<emoji=heart04>\u3000んんあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「음응, 아, 아아앗 <emoji=heart04> 야, 앗, 앗, 히이잉 <emoji=heart04> 음응아앗 <emoji=heart04> 후아아앗 <emoji=heart04> 음읏 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分の突き上げで激しくおっぱいが揺れるのも嬉しい。レイラの身体の全てを支配しているような気分になる。"
translation = "나의 쳐올리기에 격하게 가슴이 흔들리는 것도 즐겁다. 레이라의 몸 전체를 지배하고 있는 듯한 기분이 든다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「きゃっ！？\u3000おっぱい、両手でがっしり掴まないでっ！\u3000おっぱい潰れちゃうっ<emoji=heart04>\u3000いたいですっ<emoji=heart04>」"
translation = "「꺄악!? 가슴, 두 손으로 꽉 잡지 마! 가슴 찌부러진단 말야 <emoji=heart04> 아파요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んんんっ<emoji=heart04>\u3000なんでっ<emoji=heart04>\u3000なんでいたいのに気持ちいいのっ<emoji=heart04>\u3000魔王さんに触られたら、どこでも、気持ちよくなっちゃうっ<emoji=heart04>」"
translation = "「음음음앗 <emoji=heart04> 왜 <emoji=heart04> 왜 아픈데 기분 좋은 거야 <emoji=heart04> 마왕님이 만지면, 어디든지, 기분 좋아져버려 <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「レイラが感じてくれて俺も嬉しいよ」"
translation = "「레이라가 느껴주니 나도 기뻐」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「やぁ<emoji=heart04>\u3000魔王さんの、いじわるっ<emoji=heart04>\u3000そう言って、いつも、加減してくれないくせにっ<emoji=heart04>」"
translation = "「야아 <emoji=heart04> 마왕님, 심술쟁이 <emoji=heart04> 그렇게 말하면서, 항상, 살살 안 해주는 주제에 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "加減なんてできない。俺の全部でレイラを愛したい。レイラの全部が欲しい。レイラの全部を俺で満たしたい。"
translation = "살살 같은 건 할 수 없다. 나의 전부로 레이라를 사랑하고 싶다. 레이라의 전부를 원한다. 레이라의 전부를 나로 채우고 싶다."

[[dialogue]]
speaker = "unk"
original = "左右の乳房を掴んだまま引き寄せ、両方とも先端を口に含む。"
translation = "좌우의 유방을 잡은 채 끌어당겨, 양쪽 다 끝부분을 입에 머금는다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んんっ<emoji=heart04>\u3000おっぱい吸わないで、まだ<emoji=heart04>\u3000出ないって言ってるのにぃ<emoji=heart04>\u3000あっ！？\u3000やだやだやだ────」"
translation = "「음읏 <emoji=heart04> 가슴 빨지 마, 아직 <emoji=heart04> 안 나온다고 말했는데에 <emoji=heart04> 앗!? 싫어싫어싫어──」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ひぃああああああああっ！？」"
translation = "「히이아아아아아아아앗!?」"

[[dialogue]]
speaker = "unk"
original = "おっぱいがスイッチにでもなっているのか、レイラがまた絶頂した。ぎゅっと膣が締まって、俺もそろそろ限界だ。"
translation = "가슴이 스위치라도 된 것인지 레이라가 또 절정했다. 꽉 자궁이 조여오며, 나도 슬슬 한계다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぁあっ<emoji=heart04>\u3000魔王さんのおち○ちん、ドクンドクンしてるっ<emoji=heart04>」"
translation = "「앗 <emoji=heart04> 앗 <emoji=heart04> 히아앗 <emoji=heart04> 마왕님의 자지, 두근두근거려 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「射精したいんですかっ、私の子宮にっ……ひぁぁっ<emoji=heart04>\u3000勝手に出しちゃ、ダメって言ってるじゃないですかっ<emoji=heart04>」"
translation = "「사정하고 싶은 건가요, 제 자궁에…… 히아아앗 <emoji=heart04> 마음대로 싸면, 안 된다고 말하고 있잖아요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁっ、あっ<emoji=heart04>\u3000精子、中に出したら……赤ちゃん、できちゃうぅっ<emoji=heart04>」"
translation = "「하앗, 앗 <emoji=heart04> 정액, 안에 싸면…… 아기, 생겨버려어 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「や<emoji=heart04>\u3000あ<emoji=heart04>\u3000奥、叩かないでっ<emoji=heart04>\u3000子宮、おち○ちんにノックされてるっ<emoji=heart04>\u3000まだダメ、まだ赤ちゃんできちゃダメだからっ<emoji=heart04>」"
translation = "「야 <emoji=heart04> 아 <emoji=heart04> 안쪽, 때리지 마 <emoji=heart04> 자궁, 자지에 노크 당하고 있어 <emoji=heart04> 아직 안 돼, 아직 아기 생기면 안 되니까 <emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「まだ、なんだ？」"
translation = "「아직은, 인 거야?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あん<emoji=heart04>\u3000あ、だって、いつかは……ぁんっ<emoji=heart04>\u3000あなたの、赤ちゃん、欲しいから、ぁん<emoji=heart04>」"
translation = "「앙 <emoji=heart04> 아, 그치만, 언젠가는…… 앙 <emoji=heart04> 당신의, 아기, 갖고 싶으니까, 앙 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「でも、でも<emoji=heart04>\u3000あっ<emoji=heart04>\u3000こんなに奥、突かれたら<emoji=heart04>\u3000精子<emoji=heart04>\u3000中に出して、ほしくなる<emoji=heart04>\u3000今、欲しくなっちゃうぅっ<emoji=heart04>」"
translation = "「그치만, 그치만 <emoji=heart04> 앗 <emoji=heart04> 이렇게 안쪽까지, 찔리면 <emoji=heart04> 정액 <emoji=heart04> 안에 싸, 줬으면 좋겠어 <emoji=heart04> 지금, 원하게 돼버려어 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ふぁあっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私の赤ちゃんのおへや、あなたのおち○ちんでこじ開けられちゃうっ<emoji=heart04>」"
translation = "「후아앗 <emoji=heart04> 핫 <emoji=heart04> 앗 <emoji=heart04> 제 아기 방, 당신의 자지로 비집어 열려버려요 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "レイラは言葉では拒みつつも、その声はむしろ求めているようだ。"
translation = "레이라는 말로는 거부하면서도, 그 목소리는 오히려 구하고 있는 것 같다."

[[dialogue]]
speaker = "unk"
original = "本能を刺激され、渾身の力で突き上げる。"
translation = "본능을 자극받아, 온 힘을 다해 밀어 올린다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ひあぁぁ～～～～<emoji=heart04>\u3000おち○ちん、つよい<emoji=heart04>\u3000さからえない<emoji=heart04>\u3000あっ、ふぁ<emoji=heart04>\u3000もうらめっ<emoji=heart04>\u3000らめっ<emoji=heart04><emoji=heart04>」"
translation = "「히아아아~~~~ <emoji=heart04> 자지, 강해 <emoji=heart04> 거역할 수 없어 <emoji=heart04> 앗, 후아 <emoji=heart04> 이제 안 대 <emoji=heart04> 안 대 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「精子、欲しいっ<emoji=heart04>\u3000あなたの精子、欲しいのっ<emoji=heart04>\u3000赤ちゃんのおへや、いっぱいにしてほしいのっ<emoji=heart04>」"
translation = "「정액, 갖고 싶어 <emoji=heart04> 당신의 정액, 갖고 싶단 말야 <emoji=heart04> 아기 방, 가득 채워줬으면 좋겠어 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "理性が蕩けたレイラの甘い声。俺ももう理性なんかとっくにない。レイラの中にこの熱を解き放つことしか考えられない。"
translation = "이성이 녹아내린 레이라의 달콤한 목소리. 나도 이성 따윈 이미 오래전에 사라졌다. 레이라 안에 이 열기를 해방하는 것밖에 생각나지 않는다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「イク、イク、イク<emoji=heart04>\u3000またイっちゃうっ<emoji=heart04>\u3000おま○こイっちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあ<emoji=heart04>\u3000あああっ<emoji=heart04>」"
translation = "「가, 가, 가 <emoji=heart04> 또 가버려 <emoji=heart04> 보지로 가버려 <emoji=heart04> 앗 <emoji=heart04> 응아 <emoji=heart04> 아아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「出して<emoji=heart04>\u3000出して<emoji=heart04>\u3000せいし出してぇっ<emoji=heart04>\u3000赤ちゃんのもと<emoji=heart04>\u3000びゅって、出して<emoji=heart04>\u3000いっぱい注いでっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「내줘 <emoji=heart04> 내줘 <emoji=heart04> 정액 내줘어 <emoji=heart04> 아기 씨 <emoji=heart04> 뷰릇 하고, 내줘 <emoji=heart04> 잔뜩 쏟아줘 <emoji=heart04> 아아아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はっ、はっ、はっ、はぁ、はぁあっ<emoji=heart04>\u3000あ、あ、あ<emoji=heart04>\u3000は、はあぁ、あ──あ、あああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「핫, 핫, 핫, 하아, 하아앗 <emoji=heart04> 아, 아, 아 <emoji=heart04> 하, 하아아, 아── 아, 아아아아아아아앗 <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ、ふぁ──んん<emoji=heart04>\u3000ふああぁ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 후아── 음음 <emoji=heart04> 후아아아~~~~~~~~~앗 <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最後の突き上げと同時、レイラの一番奥目掛けて射精した。神経が焼き切れそうなほどの快楽が脳髄を焦がす。"
translation = "마지막 밀어 올림과 동시에, 레이라의 가장 깊은 곳을 목표로 사정했다. 신경이 타버릴 것만 같은 쾌락이 뇌수를 불태운다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「ああっ<emoji=heart04>\u3000おち○ちん、私の中で暴れてりゅっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000せいし<emoji=heart04>\u3000ぶちまけられてりゅっ<emoji=heart04>」"
translation = "「아앗 <emoji=heart04> 자지, 제 안에서 날뛰고 있쪄 <emoji=heart04> 아 <emoji=heart04> 정액 <emoji=heart04> 흩뿌려지고 있쪄 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「んあっ<emoji=heart04>\u3000あついっ<emoji=heart04>\u3000おなかあついのっ<emoji=heart04>\u3000あなたのせいしで、おなかいっぱいになりゅぅ<emoji=heart04>\u3000あああぁぁ……<emoji=heart04>」"
translation = "「음앗 <emoji=heart04> 뜨거워 <emoji=heart04> 배 안이 뜨거워 <emoji=heart04> 당신의 정액으로, 배가 꽉 차버려어 <emoji=heart04> 아아아아아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを子宮に密着させ、レイラの中にたっぷりと吐き出す。"
translation = "자지를 자궁에 밀착시켜, 레이라 안에 듬뿍 토해낸다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ……<emoji=heart04>\u3000すごい……<emoji=heart04>\u3000おなかのおくに、びゅーっ、びゅーって、わたしをはらませようとしてるぅ……<emoji=heart04>」"
translation = "「아…… <emoji=heart04> 대단해…… <emoji=heart04> 배 깊은 곳에, 뷰릇, 뷰릇 하고, 나를 임신시키려고 하고 있어…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000あなたのせいしで、子宮、パンパンにされて……はあぁ<emoji=heart04>」"
translation = "「하아…… <emoji=heart04> 응…… <emoji=heart04> 당신의 정액으로, 자궁, 팡팡해져서…… 하아아 <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「はぁ、はぁ…………はあぁ……<emoji=heart04>」"
translation = "「하아, 하아………… 하아아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「もうっ、気持ちよすぎて死んじゃうかと思いました……<emoji=heart04>」"
translation = "「정말, 너무 기분 좋아서 죽는 줄 알았어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あなたの精子、垂れてきちゃいました……。私が白いおしっこしてるみたいじゃないですかぁ……」"
translation = "「당신의 정액, 흘러나와 버렸어요……. 제가 하얀 오줌을 싸는 것 같잖아요오……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、レイラだっていっぱい出してって言ってたし……」"
translation = "「하지만 레이라도 잔뜩 내달라고 했었으면서……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「それは言葉の綾というか……おち○ちんに屈服してしまったというか……」"
translation = "「그건 말의 수사라고 할까…… 자지에 굴복해버렸다고 할까……」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「もう、何言わせるんですか！」"
translation = "「정말, 무슨 말을 시키는 거예요!」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「とにかく、いざというときは責任取っていただきますからね」"
translation = "「어쨌든, 만약의 사태가 오면 책임져주셔야 하니까요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはもちろん。俺はレイラと一緒に生きていくよ」"
translation = "「그건 당연하지. 나는 레이라와 함께 살아갈 거야」"

[[dialogue]]
speaker = "unk"
original = "それはもう誓ってる。"
translation = "그건 이미 맹세했어."

[[dialogue]]
speaker = "unk"
original = "俺の命が尽きるまで、俺はレイラと一緒にいたい。こんなに可愛くて楽しい人を俺は知らない。"
translation = "내 목숨이 다할 때까지, 나는 레이라와 함께 있고 싶다. 이렇게 귀엽고 즐거운 사람을 나는 알지 못한다."

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「そ、そこまで言われたら仕方ないですね……本当はダメですけど、今日のところは許してあげます」"
translation = "「그, 그렇게까지 말한다면 어쩔 수 없네요…… 원래는 안 되지만, 오늘은 허락해 줄게요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ今日はいいんだ」"
translation = "「그럼 오늘은 괜찮은 거네」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「え、魔王さん、何を……もしかして第２ラウンドですか！？」"
translation = "「에, 마왕님, 뭘…… 설마 제2라운드인가요!?」"

[[dialogue]]
speaker_original = "レイラ"
speaker_translation = "레이라"
original = "「あ、あ<emoji=heart04>\u3000あああああぁぁ～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「아, 아 <emoji=heart04> 아아아아아아아~~~~앗 <emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛く拗ねるレイラに我慢できず、俺たちは時間の許す限り愛し合った。"
translation = "귀엽게 투덜거리는 레이라를 참지 못하고, 우리는 시간이 허락하는 한 사랑을 나누었다."

