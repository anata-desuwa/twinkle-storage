[[dialogue]]
speaker = "unk"
original = "第３話,親心,B"
translation = "피오나──라고 우리가 부르고 있는 그녀──와 아폴로의 관계에 대해서는 아직 불분명한 점도 많다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（……ふう。さすがに緊張したな）"
translation = "그녀 본인이 피오나라고 계속 자처하는 한…… 나도 거기에 맞추기로 했다."

[[dialogue]]
speaker = "unk"
original = "会合を終え、カフェテリアへと逃げ込んだ俺。"
translation = "회합을 마치고, 카페테리아로 도망친 나."

[[dialogue]]
speaker = "unk"
original = "度重なる戦闘から重苦しい会議と、ヘビィな展開が続いたので一息つこうとしていた。"
translation = "거듭되는 전투부터 무거운 회의까지, 헤비한 전개가 이어졌기에 한숨 돌리려 하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（あの手……ネビュラ……魔女……整理のつけられないことが多いな）"
translation = "（저 손…… 네뷸라…… 마녀…… 정리할 수 없는 것이 많군）"

[[dialogue]]
speaker = "unk"
original = "ネビュラの人たちは『リクリエを阻止する』という理念のもと動いている──と言っていた。"
translation = "네뷸라 사람들은 『리크리에를 저지한다』는 이념 아래 움직이고 있다──고 말했다."

[[dialogue]]
speaker = "unk"
original = "なら便宜上は「味方」にあたるし、現時点で敵視する必要はないだろう。"
translation = "그렇다면 편의상 「아군」에 해당하고, 현시점에서 적대시할 필요는 없을 것이다."

[[dialogue]]
speaker = "unk"
original = "無論、動向に気を配る必要はあるかもしれないが。"
translation = "물론, 동향에 신경 쓸 필요는 있을지도 모르지만."

[[dialogue]]
speaker = "unk"
original = "そんなことを考えていると……"
translation = "그런 생각을 하고 있을 때……"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「──壮健かね、少年」"
translation = "「──건강한가, 소년」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000セイファート学園長……！」"
translation = "「! 세이퍼트 학원장……!」"

[[dialogue]]
speaker = "unk"
original = "同じく会合を終えた学園長と、ばったり鉢合わせてしまった。"
translation = "마찬가지로 회합을 마친 학원장과, 딱 마주치고 말았다."

[[dialogue]]
speaker = "unk"
original = "俺にとっては命の恩人であり見習うべき対象──思わずさっと居住まいを正す。"
translation = "나에게는 생명의 은인이자 본받아야 할 대상── 무심코 재빨리 자세를 바로잡는다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ハハ……そうかしこまらなくていい。あの場では多少、威厳を保つ必要もあったがな」"
translation = "「하하…… 그렇게 딱딱하게 굴지 않아도 된다. 저 자리에서는 다소, 위엄을 유지할 필요도 있었지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうですか……？」"
translation = "「그러십니까……?」"

[[dialogue]]
speaker = "unk"
original = "セイファート学園長は相好を崩し、朗らかな笑みを見せてくれた。"
translation = "세이퍼트 학원장은 상냥한 얼굴을 하고, 명랑한 웃음을 보여주었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「精悍な顔つきになったな。御前試合からそう時も経っていないというのに──随分と見違えたように思える」"
translation = "「늠름한 얼굴이 되었군. 어전 시합부터 그리 시간도 지나지 않았는데── 몰라보게 달라진 것 같다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「男子三日会わざれば……というやつか」"
translation = "「남자는 사흘만 안 봐도……라는 건가」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「少しでも成長できていると嬉しいですが。みんなや学園長に追いつくにはまだまだです」"
translation = "「조금이라도 성장하고 있다면 기쁘겠습니다. 모두나 학원장에게 따라잡기에는 아직 멀었습니다」"

[[dialogue]]
speaker = "unk"
original = "──あの日、俺を救った一太刀。"
translation = "──그날, 나를 구했던 일태도."

[[dialogue]]
speaker = "unk"
original = "今だからこそあれが、まだ俺の達せていない境地ということもわかっていた。"
translation = "지금이기에 그것이, 아직 내가 도달하지 못한 경지라는 것도 알고 있었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「フ。謙遜せずとも、既に君主導の星徒会が各地で目覚ましい活躍を上げているのは知っているよ」"
translation = "「흥. 겸손하지 않아도, 이미 네가 주도하는 성도회가 각지에서 눈부신 활약을 올리고 있다는 건 알고 있다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとうございます。それも、仲間のおかげです」"
translation = "「감사합니다. 그것도, 동료들 덕분입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「先ほどの件も含めて。俺がここまで来れたのは……ヴィーナスのおかげですから」"
translation = "「방금 전의 건도 포함해서. 제가 여기까지 올 수 있었던 건…… 비너스 덕분이니까요」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「……九浄くんの？」"
translation = "「……쿠죠 군의?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ええ。荒唐無稽なお話ですが──」"
translation = "「예. 황당무계한 이야기지만──」"

[[dialogue]]
speaker = "unk"
original = "──と、前会長の話題でも振ろうとしたところ……。"
translation = "──하고, 전 회장의 화제라도 꺼내려 했을 때……."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト──っ！」"
translation = "「쿠로토──!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「おや……」"
translation = "「이런……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうだった！？\u3000って学園長までいるじゃない。私を臨時招集から省くなんていい度胸よね！」"
translation = "「어땠어!? 라고 하려 했는데 학원장까지 있잖아. 나를 임시 소집에서 빼놓다니 배짱 한번 좋네!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちょっ、ヴィーナス！\u3000学園長相手には言葉遣いちゃんとしなさいってあれほど──」"
translation = "「저, 비너스! 학원장 상대로는 말조심하라고 그렇게나──」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ハハ……気にしないよ。君は相変わらず<ruby>溌剌<rt>はつらつ</rt></ruby>だな」"
translation = "「하하…… 신경 쓰지 않는다. 너는 여전히 활발하군」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃんの美徳よね～」"
translation = "「비너스짱의 미덕이지이~」"

[[dialogue]]
speaker = "unk"
original = "会合がどうなったのか気になってか、新星星徒会のみんなが駆けつけてくれていた。"
translation = "회합이 어떻게 되었는지 궁금했는지, 신성 성도회 모두가 달려와 주었다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ちょうど九浄くんの話をしていたところさ。緋宮会長が、君のおかげだとな」"
translation = "「마침 쿠죠 군의 이야기를 하고 있었다. 히노미야 회장이, 너 덕분이라고 하더군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！\u3000が、学園長……本人の前では」"
translation = "「! 하, 학원장…… 본인 앞에서는」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「恥ずかしがってる。珍しいですね」"
translation = "「부끄러워하고 있네요. 드문 일입니다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふっふーん。当然よ。私がクロトを導く役目だってのは、日誌に定められてた運命なんだから！」"
translation = "「훗후웅. 당연하지. 내가 쿠로토를 이끄는 역할이라는 건, 일지에 정해져 있던 운명이니까!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今日はちょっとミソがついちゃったけど……ここからいくらだって挽回していくわよ！」"
translation = "「오늘은 좀 흠이 잡혔지만…… 지금부터 얼마든지 만회해 나갈 거야!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「日誌……？\u3000運命……？\u3000ふうむ……？」"
translation = "「일지……? 운명……? 흐음……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（ああもう、ヴィーナスはよく学園長にそんな口が利けるわよね……！）"
translation = "（아아 정말, 비너스는 어떻게 학원장에게 그런 말을 할 수 있는 걸까……!）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（あはは……）"
translation = "（아하하……）"

[[dialogue]]
speaker = "unk"
original = "セイファート学園長相手にここまで物怖じせず喋れるのはヴィーナスくらいのものだった。"
translation = "세이퍼트 학원장 상대로 이렇게 겁먹지 않고 말할 수 있는 건 비너스 정도였다."

[[dialogue]]
speaker = "unk"
original = "ついこの間までは会長職として、恐らく何度もやり取りしてきた仲なのだろう。"
translation = "바로 얼마 전까지는 회장직으로서, 아마도 몇 번이나 교류해 온 사이일 것이다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「仔細はわからぬが……二人の間にある絆は感じられた」"
translation = "「자세한 사정은 모르겠지만…… 두 사람 사이에 있는 인연은 느껴졌다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「君たちの間には、何か──ただならぬ縁があるのかもしれないな」"
translation = "「너희들 사이에는, 뭔가── 예사롭지 않은 인연이 있을지도 모르겠군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「学園長……」"
translation = "「학원장……」"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスを見比べて、にこやかに微笑むセイファート学園長。"
translation = "나와 비너스를 번갈아 보며, 온화하게 미소 짓는 세이퍼트 학원장."

[[dialogue]]
speaker = "unk"
original = "今の星騎士・緋宮クロトがあるのは、彼のおかげなのだというのが……今は少しだけ誇らしくなった。"
translation = "지금의 성기사 히노미야 쿠로토가 있는 것은, 그 덕분이라는 것이…… 이제는 조금 자랑스러워졌다."

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「もっとも──まだ何も事態は解決していない。迫るリクリエ、謎の現象、第三組織……ここからはより混迷を深めていくだろう」"
translation = "「물론── 아직 아무것도 사태는 해결되지 않았다. 다가오는 리크리에, 수수께끼의 현상, 제삼 조직…… 지금부터는 더욱 혼란이 깊어질 것이다」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「強くあれ。新星星徒会の諸君。変わりゆく世界を、乗り越えていくために」"
translation = "「강해져라. 신성 성도회 제군. 변해가는 세계를, 극복해 나가기 위해서」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！\u3000はい！」"
translation = "「……! 예!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ラジャです」"
translation = "「라자입니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「がっ……頑張りますっ！」"
translation = "「히윽…… 힘내겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "──そうして。"
translation = "──그렇게 해서."

[[dialogue]]
speaker = "unk"
original = "数え切れないほどのトラブルに見舞われた今日も……ようやく終わりを迎えた。"
translation = "셀 수 없을 만큼 많은 트러블에 시달린 오늘도…… 드디어 끝을 맞이했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あの、そこの方……もう出てきていいと思いますよ。みんな帰りましたし」"
translation = "「저, 거기 계신 분…… 이제 나와도 될 것 같습니다. 모두 돌아갔으니까요」"

[[dialogue]]
speaker_original = "アニュラス"
speaker_translation = "아뉴라스"
original = "「ぐ……ぐぐぐ……！\u3000お父様のあんな笑顔を独り占めにするなんて──ますます許すまじ、緋宮クロト……！」"
translation = "「크…… 크크크……! 아버님의 저런 웃는 얼굴을 독차지하다니── 더욱 용서할 수 없다, 히노미야 쿠로토……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（流星生……？\u3000顔もよくわかりませんが、変な人……）"
translation = "（유성 학원생……? 얼굴도 잘 모르겠지만, 이상한 사람……）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただいま──と」"
translation = "「다녀왔어──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「おっかえり～。ってうわあ、どうしたのそんなに疲れて。やっぱりお昼の空どよよ～んが原因？」"
translation = "「다녀왔니~. 라고 하려 했는데 우와아, 왜 그렇게 지쳤어. 역시 점심때 하늘이 흐렸던 게 원인?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え、そう？\u3000別に普通だけど……」"
translation = "「에, 그래? 별로 평소랑 같은데……」"

[[dialogue]]
speaker = "unk"
original = "戦闘直後でもあるまいに平常を装っていたつもりだったが、母の勘は強かった。"
translation = "전투 직후도 아닐진대 평정을 가장하고 있었던 참이었지만, 엄마의 감은 강했다."

[[dialogue]]
speaker = "unk"
original = "自分でも気づかぬうちに結構な疲労が蓄積していたのかもしれない。"
translation = "나도 모르는 사이에 상당한 피로가 축적되어 있었을지도 모른다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「星騎士になるのはいいけど……あんまり危険なことばかりしてちゃダメよ？\u3000怪我したら元も子もないんだからね」"
translation = "「성기사가 되는 건 좋지만…… 너무 위험한 일만 해선 안 돼? 다치면 아무 소용도 없으니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかってるよ。今日の晩ごはんは？」"
translation = "「알고 있어. 오늘 저녁밥은?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「里芋のコロッケ。クロトの好きなやつ」"
translation = "「토란 고로케. 쿠로토가 좋아하는 거」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やった。んじゃさっさと風呂入ってくる」"
translation = "「야호. 그럼 얼른 목욕하고 올게」"

[[dialogue]]
speaker = "unk"
original = "俺は意気揚々と制服を抜いで、脱衣所へ向かった。"
translation = "나는 의기양양하게 교복을 벗고, 탈의실로 향했다."

[[dialogue]]
speaker = "unk"
original = "すると……"
translation = "그러자……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あれ……通信だ」"
translation = "「어라…… 통신이다」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「もー。また何か事件なの？」"
translation = "「모오. 또 무슨 사건이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わからない。一応、その気配はないけど……」"
translation = "「모르겠어. 일단, 그런 기색은 없지만……」"

[[dialogue]]
speaker = "unk"
original = "リクリエの影響はいつどんな風に出るかわからない。"
translation = "리크리에의 영향은 언제 어떤 식으로 나올지 알 수 없다."

[[dialogue]]
speaker = "unk"
original = "緊急の出動要請という線もありえる──俺はすぐにＤＩＳＣを起動させた。"
translation = "긴급 출동 요청이라는 가능성도 있을 수 있다── 나는 곧바로 디스크를 기동시켰다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もしも──あ……うん。どうしたの」"
translation = "「여보세요── 아…… 응. 무슨 일이야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん……ああ。わかった。大丈夫だよ、みんなにも声をかけておく」"
translation = "「응…… 아아. 알았어. 괜찮아, 모두에게도 이야기해 둘게」"

[[dialogue]]
speaker = "unk"
original = "緊急の連絡ではなかった。"
translation = "긴급 연락은 아니었다."

[[dialogue]]
speaker = "unk"
original = "俺はひと言ふた言、簡単なやり取りを交わしてから通話を切る。"
translation = "나는 한두 마디, 간단한 대화를 나누고 나서 통화를 끊는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──なんでもなかった。風呂入ってくる」"
translation = "「──아무것도 아니었어. 목욕하고 올게」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あら、そう？\u3000でも～、女の子の声がしたわねえ。一体どんな関係なんでしょう。デートのお誘い？」"
translation = "「어머, 그래? 그런데~, 여자아이 목소리가 났는데. 대체 어떤 관계일까. 데이트 신청?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「事務連絡。星徒会メンバーはみんな女の子なんだから」"
translation = "「사무 연락. 성도회 멤버는 모두 여자아이잖아」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「つれない反応～。あ、こら制服はちゃんとハンガーにかけなさい！」"
translation = "「쌀쌀맞은 반응~. 아, 이봐 교복은 제대로 옷걸이에 걸어놔!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はーい！」"
translation = "「네에!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……ふぅ」"
translation = "「……후우」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「やれやれ……いつの間にかたくましくなっちゃって。母の心配は本当なんだけどねえ」"
translation = "「이런이런…… 어느새 듬직해져 버려서. 엄마 걱정은 정말인데 말이지」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は一日の疲れをたっぷり洗い流すと……"
translation = "그렇게 나는 하루의 피로를 듬뿍 씻어내고는……"

[[dialogue]]
speaker = "unk"
original = "母の手料理に舌鼓を打って、ぐっすり眠りについた。"
translation = "엄마의 집밥을 맛있게 먹고, 푹 잠들었다."

