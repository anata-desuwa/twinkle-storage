[[dialogue]]
speaker = "unk"
original = "これは『マジカミ』の魔法少女４人が、『ティンクルスターナイツ』の世界から、自分たちの世界へと帰還する途中で起きた出来事──"
translation = "이것은 『매지컬 미라이』의 마법 소녀 4명이, 『틴클 스타 나이츠』의 세계에서 자신들의 세계로 귀환하던 도중에 일어난 일──"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「あれ？\u3000ここってどこだろう？」"
translation = "「어라? 여긴 어디지?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「なんか変なところに出ちゃったけど……」"
translation = "「뭔가 이상한 곳으로 나와 버렸는데……」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「ん～、向こうの世界でも見たことのない場所だね～？」"
translation = "「음~, 저쪽 세계에서도 본 적 없는 장소네~?」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「おそらくは次元の狭間みたいな場所だと思うが……。けど、おかしい……」"
translation = "「아마도 차원의 틈새 같은 장소라고 생각하지만……. 하지만, 이상해……」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ぼくは向こうの世界へ転移する際、こんな場所を通った記憶がない」"
translation = "「나는 저쪽 세계로 전이할 때, 이런 장소를 지나간 기억이 없어」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「俺も見覚えがないな――って！\u3000みんな、気を付けろ！」"
translation = "「나도 본 기억이 없는데── 앗! 얘들아, 조심해!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「！？\u3000あれって……」"
translation = "「!? 저건……」"

[[dialogue]]
speaker_original = "アラクネ"
speaker_translation = "아라크네"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「あれは、ぼくたちの世界の<b>悪魔</b>……！？」"
translation = "「저건, 우리들의 세계의 <b>악마</b>……!?」"

[[dialogue]]
speaker = "unk"
original = "次元の狭間に現れた存在は、『マジカミ』の世界で魔法少女たちが戦っている『悪魔』と呼ばれる怪物だった。"
translation = "차원의 틈새에 나타난 존재는, 『매지컬 미라이』의 세계에서 마법 소녀들이 싸우고 있는 『악마』라고 불리는 괴물이었다."

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「しかも１体だけじゃないぞ……！」"
translation = "「게다가 한 마리뿐만이 아니라고……!」"

[[dialogue]]
speaker_original = "アラクネ"
speaker_translation = "아라크네"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「んにゃ！？\u3000いっぱい出てきた！」"
translation = "「냐앗!? 잔뜩 나타났어!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「悪魔がどうしてこんなところにっ！？」"
translation = "「악마가 어째서 이런 곳에!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「……ここが次元の狭間だと仮定するなら」"
translation = "「……여기가 차원의 틈새라고 가정한다면」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ぼくたちが自分たちの世界へすぐに帰還できず、この場所に出たのは、こいつらのせいかもしれない」"
translation = "「우리들이 자신들의 세계로 바로 귀환하지 못하고 이 장소로 나온 건, 이 녀석들 때문일지도 몰라」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「世界を繋ぐ移動経路にたくさんの悪魔が集まったことで、渋滞が起こってこんな状況になってしまったと考えれば、説明はつく……」"
translation = "「세계를 잇는 이동 경로에 수많은 악마가 모여서 정체가 일어나는 바람에 이런 상황이 되었다고 생각하면, 설명이 돼……」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「これ、放っておいたらマズくない？\u3000もしかしなくても、ここに集まってきてるのって……」"
translation = "「이거, 내버려 두면 위험하지 않아? 혹시 아니더라도, 여기 모여들고 있는 건……」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「ああ……ぼくのせいだ。ぼくが向こうの世界への道を開けてしまったから、ここに集まってきた。悪魔たちが向こうの世界へ行こうとして……！」"
translation = "「아아…… 나 때문이야. 내가 저쪽 세계로 가는 길을 열어버렸기 때문에 여기로 모여든 거야. 악마들이 저쪽 세계로 가려고……!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「大丈夫だよ、陽彩ちゃん――」"
translation = "「괜찮아, 아키사짱──」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「そんなことをさせない為に、あたしたち魔法少女がいるんだから！」"
translation = "「그런 짓을 못 하게 하려고 우리 마법 소녀가 있는 거니까!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「……まぁ、こうなっちゃったら、ウチらがやるしかないよね。すっごく大変そうだけど」"
translation = "「……뭐, 이렇게 돼 버렸다면 우리가 할 수밖에 없겠네. 엄청 힘들 것 같지만」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「にゃははっ♪\u3000でもカオリン、なんか今日はちょっと、いつもよりやる気出てな～い？」"
translation = "「냐하하♪ 그치만 카오링, 왠지 오늘은 평소보다 좀 더 의욕이 넘치지 않아~?」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「向こうの世界で魔法少女に出会ったからだったりして♪」"
translation = "「저쪽 세계에서 마법 소녀를 만났기 때문이라거나♪」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「いやいや、向こうで知り合った友達を守る為だから！」"
translation = "「아니 아니, 저쪽에서 알게 된 친구들을 지키기 위해서니까!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「だよね～、サチサチたちの為にも、ここあたちが頑張らないと！」"
translation = "「그렇지~, 사치사치들을 위해서라도 코코아들이 힘내야지!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「うん！\u3000ここにいる悪魔は、あたしたちで全部やっつけよう！」"
translation = "「응! 여기 있는 악마는 우리가 전부 해치우자!」"

[[dialogue]]
speaker_original = "陽彩"
speaker_translation = "히이로"
original = "「だったら、ぼくも……！」"
translation = "「그렇다면 나도……!」"

[[dialogue]]
speaker_original = "ここあ"
speaker_translation = "코코아"
original = "「んにゃ、あきあきは無理しちゃダメだよ。まだ体が十分に回復してないでしょ？」"
translation = "「냐앗, 아키아키는 무리하면 안 돼. 아직 몸이 충분히 회복되지 않았잖아?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ここはウチらに任せて、休んでて」"
translation = "「여기는 우리한테 맡기고 쉬고 있어」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「オムオム、陽彩ちゃんのこと、お願い！」"
translation = "「옴옴, 아키사짱을 부탁해!」"

[[dialogue]]
speaker_original = "オムニス"
speaker_translation = "옴니스"
original = "「ああ、わかった！\u3000気を付けろよ、みんな！」"
translation = "「아아, 알았다! 조심해라, 얘들아!」"

[[dialogue]]
speaker_original = "いろは"
speaker_translation = "이로하"
original = "「よ～し！\u3000カオリン、ここにゃん、行っくよ～！」"
translation = "「조~아! 카오링, 코코냥, 가자~아!」"

[[dialogue]]
speaker = "unk"
original = "こうして、魔法少女たちによる悪魔討伐が開始されるのだった。"
translation = "이렇게 해서 마법 소녀들에 의한 악마 토벌이 개시되는 것이었다."

