[[dialogue]]
speaker = "unk"
original = "第１話,よく似合う女,P"
translation = "제1화, 잘 어울리는 여자, P"

[[dialogue]]
speaker = "ヘレナ"
original = "「……来たか」"
translation = "「……왔는가」"

[[dialogue]]
speaker = "ミルフィー"
original = "「し、失礼しますっ。新星学園２年、ミルフィー・インセントです」"
translation = "「시, 실례하겠습니다. 신성 학원 2학년, 밀피 인센트입니다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「なに、そのように怯えるでない。取って食おうというわけではないのだからな」"
translation = "「무엇을 그렇게 겁내는 게냐. 잡아먹으려는 게 아니니 말이다」"

[[dialogue]]
speaker = "ミルフィー"
original = "「は、はい……でも、私なんかを直々に呼び出すなんて、一体どんなご用件が？」"
translation = "「하, 네…… 하지만 저 같은 걸 직접 불러내시다니, 대체 무슨 용건이신가요?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ミルフィー・インセント。お前のことはメイドの美鶴から聞いている」"
translation = "「밀피 인센트. 네 이야기는 메이드인 미츠루에게 들었다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「チアの衣装が似合う、めちゃくちゃドエロい女がいるとな！」"
translation = "「치어리더 의상이 잘 어울리는, 엄청나게 음란한 여자가 있다고 말이다!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふえぇえ～～～～～っ！！？\u3000み、美鶴ちゃん！？\u3000いったいどうしてそんなっ……！？」"
translation = "「후에에에~~~~~!!? 미, 미츠루 짱!? 대체 어째서 그런……!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「いや、実際は違う表現だったがな。美鶴からの報告を私が意訳した結果だ」"
translation = "「아니, 실제로는 다른 표현이었지만 말이다. 미츠루의 보고를 내가 의역한 결과다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「しかし、あのチア戦闘服は大層好評を博したようだな。そこでエッチな服がよく似合うお前に、新たな人工戦闘服を用意した。受け取るがいい」"
translation = "「하지만, 그 치어 전투복은 대단히 호평을 받은 모양이더군. 그래서 야한 옷이 잘 어울리는 네게, 새로운 인공 전투복을 준비했다. 받도록 해라」"

[[dialogue]]
speaker = "ミルフィー"
original = "「う、受け取り拒否は……」"
translation = "「수, 수령 거부는……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「拒否が許されると思うか？」"
translation = "「거부가 허용될 거라 생각하나?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でもでもっ、エッチな服なんですよね……？」"
translation = "「하지만 하지만, 야한 옷인 거죠……?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「無論だ。エッチなミルフィーのいやらし度が更にアップする出来映えだぞ」"
translation = "「물론이다. 야한 밀피의 야릇함이 한층 더 업그레이드되는 완성도라고」"

[[dialogue]]
speaker = "ミルフィー"
original = "「や、やっぱり受け取り拒否でお願いします～～っ！」"
translation = "「여, 역시 수령 거부로 부탁드려요~~!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ほれ。つべこべ言わずに早く変身して見せよ」"
translation = "「자. 이러쿵저러쿵 말하지 말고 어서 변신해서 보여라」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うううう～～～…………へ、変身っ」"
translation = "「으으으으~~~~………… 변, 변신」"

[[dialogue]]
speaker = "ミルフィー"
original = "「こ、これは……エッチじゃない？\u3000ううん、エッチかどうかは微妙なところだけど……」"
translation = "「이, 이건…… 안 야해? 아니, 야한지 어떤지는 미묘한 부분이지만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふむ！\u3000実にエッチだな！」"
translation = "「흠! 실로 야하구나!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「やっぱりエッチなんだぁ！」"
translation = "「역시 야한 거잖아!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「諦めろ。人工戦闘服は多かれ少なかれそういうものだ」"
translation = "「포기해라. 인공 전투복은 정도의 차이는 있어도 다 그런 법이다」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ひ、開き直り強要された！？」"
translation = "「배, 배째라는 식으로 강요당했어!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「とにかく事態は急を要している。その人工戦闘服……チーパオフォームに備わっている能力が必要な状況なのだ」"
translation = "「어쨌든 사태는 급을 요하고 있다. 그 인공 전투복…… 치파오 폼에 갖춰진 능력이 필요한 상황이란 말이다」"

[[dialogue]]
speaker = "ミルフィー"
original = "「え？\u3000それってどういう……」"
translation = "「에? 그게 무슨……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ゾンビのような、幽霊のような……そのような存在が学園に出没している」"
translation = "「좀비 같은, 유령 같은…… 그런 존재가 학원에 출몰하고 있다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「このフォームは幽体や霊体に対して非常に有効だ。まさに今起きている事態に対応出来るのは、ミルフィー・インセント、お前だけなのだ！」"
translation = "「이 폼은 유체나 영체에 대해 매우 유효하다. 바로 지금 일어나는 사태에 대응할 수 있는 건, 밀피 인센트, 너뿐이다!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そういうことなら……頑張ってみます。エッチなのは恥ずかしいけど、我慢すればなんとか……」"
translation = "「그런 거라면…… 열심히 해볼게요. 야한 건 부끄럽지만, 참으면 어떻게든……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「頑張れミルフィー、いける……いけるよね……いける、かなぁ？\u3000うう、やっぱり不安かも……」"
translation = "「힘내자 밀피, 할 수 있어…… 할 수 있겠지…… 할 수, 있을까? 으으, 역시 불안할지도……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「急な話で不安になるのも当然だ。もちろんそのままお前を戦場に放り出すつもりはない」"
translation = "「갑작스러운 이야기라 불안해지는 것도 당연하다. 물론 그대로 너를 전장에 내던질 생각은 없다」"

[[dialogue]]
speaker = "ヘレナ"
original = "「待たせたな、入れ」"
translation = "「기다리게 했군, 들어와라」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……トリシャ＝アポテレスマティカ、です……」"
translation = "「후후후…… 트리샤 아포테레스마티카, 예요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「……変身」"
translation = "「……변신」"

[[dialogue]]
speaker = "トリシャ"
original = "「これが私の……新たな装い……です……」"
translation = "「이것이 저의…… 새로운 차림새……예요……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「これも私と同じチーパオフォーム？\u3000私のとは少し違うみたいだけど……」"
translation = "「이것도 나랑 같은 치파오 폼? 내 거랑은 조금 다른 것 같은데……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「トリシャはミルフィーのオトモポジションだ。戦闘服の機能もオトモに適したものになっている」"
translation = "「트리샤는 밀피의 서포트 포지션이다. 전투복의 기능도 서포트에 적합한 것으로 되어 있지」"

[[dialogue]]
speaker = "トリシャ"
original = "「ミルフィーさん……この私を……オトモにしてくれますか……？」"
translation = "「밀피 씨…… 이런 저를…… 서포트로 삼아 주시겠어요……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「え？\u3000いや、別にオトモじゃなくても……よくない？」"
translation = "「에? 아니, 딱히 서포트가 아니어도…… 괜찮지 않아?」"

[[dialogue]]
speaker = "トリシャ"
original = "「ううう……やっぱり私なんかがオトモじゃ嫌なんですね……そうですよね、陰気ですし、胡散臭いですし……」"
translation = "「으으으…… 역시 저 같은 게 서포트라면 싫으신 거군요…… 그렇죠, 음침하고, 수상쩍고……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いや、そういうことじゃなくてね！\u3000ていうかトリシャさん、そんなにオトモになりたいの？」"
translation = "「아니, 그런 게 아니라니까! 그보다 트리샤 씨, 그렇게 서포트가 되고 싶은 거야?」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……オトモ……響きがとてもいいじゃありませんか……」"
translation = "「후후후…… 서포트…… 어감이 아주 좋지 않나요……」"

[[dialogue]]
speaker = "トリシャ"
original = "（オトモ……オトモ……言葉の響きがオトモダチに似ていて……とても、いい……フフフ……）"
translation = "(서포트…… 서포트…… 말의 어감이 서포트(도우미) 친구랑 비슷해서…… 아주, 좋아요…… 후후후……)"

[[dialogue]]
speaker = "ヘレナ"
original = "「実はこのフォームには元ネタの映画があってな。ヒロインはオトモを連れているのだ」"
translation = "「사실 이 폼에는 모티브가 된 영화가 있어서 말이다. 히로인은 서포트를 데리고 다니거든」"

[[dialogue]]
speaker = "ヘレナ"
original = "「トリシャの戦闘服は、そのオトモの衣装を参考にして作られている。ちなみにミルフィーの戦闘服はヒロインのデザインを参考にした」"
translation = "「트리샤의 전투복은 그 서포트의 의상을 참고해서 만들어졌다. 참고로 밀피의 전투복은 히로인의 디자인을 참고했지」"

[[dialogue]]
speaker = "トリシャ"
original = "「ヒロインとオトモはとても仲良し……協力して冥界より現れし怪異を相手に戦います……そういう設定です……」"
translation = "「히로인과 서포트는 아주 사이좋은 사이…… 협력해서 명계에서 나타난 괴이와 맞서 싸웁니다…… 그런 설정이에요……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「せ、設定……うーん、私はその映画を知らないんですけど……そういう事なら仕方ないのかな……」"
translation = "「설, 설정…… 으음, 나는 그 영화를 모르지만…… 그런 거라면 어쩔 수 없는 걸까……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「わかりました、それではトリシャさんは私のオトモということで」"
translation = "「알겠습니다, 그럼 트리샤 씨는 제 서포트인 걸로」"

[[dialogue]]
speaker = "トリシャ"
original = "「やった……ミルフィーさんに……オトモにしてもらえた……嬉しい……」"
translation = "「해냈다…… 밀피 씨가…… 서포트로 삼아 주셨어…… 기뻐요……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「チーパオフォームをもらった者同士、頑張ろうね」"
translation = "「치파오 폼을 받은 동료끼리, 열심히 하자」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……よろしくお願いします、ミルフィーさん……」"
translation = "「네…… 잘 부탁드려요, 밀피 씨……」"

[[dialogue]]
speaker = "ミルフィー"
original = "（トリシャさんは全然エッチだって感じてないみたい。もしかして私が気にしすぎ？）"
translation = "(트리샤 씨는 전혀 야하다고 느끼지 않는 것 같아. 혹시 내가 너무 신경 쓰는 건가?)"

[[dialogue]]
speaker = "ミルフィー"
original = "（ううん、気付いてないだけかもしれないし、ここは私が……）"
translation = "(아니, 눈치채지 못한 것뿐일지도 모르니, 여기선 내가……)"

[[dialogue]]
speaker = "ミルフィー"
original = "「ねえ、トリシャさん、ちょっと確認したいから、じっとしてもらっていい？」"
translation = "「저기, 트리샤 씨, 잠깐 확인하고 싶은 게 있으니까, 가만히 있어 줄래?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……フフフ……オトモとして、初めての命令……」"
translation = "「네…… 후후후…… 서포트로서, 첫 명령……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「命令じゃないからね。お願いだから」"
translation = "「명령 아니거든. 부탁이니까」"

[[dialogue]]
speaker = "トリシャ"
original = "「主であるミルフィーさんの言葉は理解しています……お願いという名の絶対厳守の言霊……」"
translation = "「주인인 밀피 씨의 말씀은 이해하고 있어요…… 부탁이라는 이름의 절대 엄수의 언령……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いやほんと違うからね」"
translation = "「아니 진짜 아니라니까」"

[[dialogue]]
speaker = "ミルフィー"
original = "（調子狂うなぁ……でも、尚更私がしっかり確認してあげなきゃ……）"
translation = "(페이스가 말리네…… 하지만, 그럴수록 내가 확실히 확인해 줘야지……)"

[[dialogue]]
speaker = "ミルフィー"
original = "（どれどれ……うん、トリシャさんもスタイル抜群だし……エッチ、だよね……これって一般的にはエッチじゃないのかなぁ？）"
translation = "(어디 보자…… 응, 트리샤 씨도 스타일 발군이고…… 야하, 네…… 이건 일반적으론 안 야한 건가?)"

[[dialogue]]
speaker = "ヘレナ"
original = "「トリシャもエッチだな！\u3000実にドスケベで結構結構♪」"
translation = "「트리샤도 야하구나! 실로 엄청나게 야해서 아주 좋아 좋아♪」"

[[dialogue]]
speaker = "ミルフィー"
original = "「へ、ヘレナさん！？\u3000そんなド直球な……！？\u3000本人を前にして失礼じゃないですか！」"
translation = "「헤, 헬레나 씨!? 그렇게 직설적으로……!? 본인 앞에서 실례잖아요!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「何を言う、女子にとってエッチは褒め言葉だぞ」"
translation = "「무슨 소리냐, 여자에게 야하다는 건 칭찬이라고」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そう思うのはヘレナさんだけですっ」"
translation = "「그렇게 생각하는 건 헬레나 씨뿐이에요!」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ……ミルフィーさん、活力に満ち溢れていますね……素晴らしいことです……」"
translation = "「후후…… 밀피 씨, 활력이 넘치시네요…… 멋진 일이에요……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「結構。主従の絆も確認出来たようだし、現場に向かうぞ」"
translation = "「좋다. 주종의 유대도 확인된 것 같으니, 현장으로 향한다」"

[[dialogue]]
speaker = "ミルフィー"
original = "「は、はい……トリシャさん、一緒に頑張ろうね」"
translation = "「네, 네…… 트리샤 씨, 같이 힘내자」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……オトモの働き、任せてください……」"
translation = "「후후후…… 서포트의 역할, 맡겨 주세요……」"

[[dialogue]]
speaker = "unk"
original = "こうしてミルフィーはオトモのトリシャさんと共に新星学園に急行するのだった。"
translation = "이렇게 해서 밀피는 서포트인 트리샤 씨와 함께 신성 학원으로 급행하는 것이었다."

