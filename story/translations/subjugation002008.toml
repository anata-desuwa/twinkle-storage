[[dialogue]]
speaker = "unk"
original = "女の子の手作りチョコを食べ荒らすダークカイザーチョコッチを成敗した翌日。大聖堂では──"
translation = "여자아이의 수제 초코를 먹어 치우던 다크 카이저 초코치를 성패한 다음 날. 대성당에서는──"

[[dialogue]]
speaker = "フィオナ"
original = "「この度はありがとうございました、緋宮会長。おかげさまで無事にバレンタインのイベントを開催できました」"
translation = "「이번에는 감사했습니다, 히노미야 회장. 덕분에 무사히 발렌타인 이벤트를 개최할 수 있었습니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「セーラさんやルリエルから、大変お世話になったと聞いています……あの、こちら、よろしければ」"
translation = "「세라 씨나 루리에르로부터, 큰 도움을 받았다고 들었어요…… 저기, 이거, 괜찮으시다면.」"

[[dialogue]]
speaker = "unk"
original = "フィオナからのチョコレート……！"
translation = "피오나로부터의 초콜릿……!"

[[dialogue]]
speaker = "フィオナ"
original = "「キリカから教えてもらったレシピなので、味は保証しますよ。デスクワークのお供にでも♪」"
translation = "「키리카에게 배운 레시피니까, 맛은 보장해요. 서류 작업할 때 곁들여서라도♪」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、大切に食べるよ"
translation = "고마워, 소중히 먹을게"

[[dialogue]]
speaker = "フィオナ"
original = "「もちろんここで配られているチョコも貰っていってくださいね。それでは！」"
translation = "「물론 여기서 나눠주는 초코도 받아 가세요. 그럼!」"

[[dialogue]]
speaker = "セーラ"
original = "「おっ、早速チョコ貰ってる。色男だね～会長さん？\u3000はいこれ、うちからもチョコレート♪」"
translation = "「오, 벌써 초코 받았네. 인기쟁이네~ 회장님? 자 이거, 우리 쪽에서도 주는 초콜릿♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「試食にお熱のルリエルでしたが、ちゃーんと会長さんへのチョコは用意していたのです！\u3000はい、どうぞっ！」"
translation = "「시식에 정신없던 루리에르였지만, 회장님을 위한 초코는 제대로 준비해 두었던 것이에욧! 자, 여기욧!」"

[[dialogue]]
speaker = "unk"
original = "２人とも、ありがとう"
translation = "둘 다 고마워"

[[dialogue]]
speaker = "ジュエリー"
original = "「やあ助手。今回はすまなかったね……もっと早くにモンスターの仕業であると見抜けていれば、対策も打てたんだが」"
translation = "「여어 조수. 이번엔 미안했네…… 좀 더 빨리 몬스터의 소행이라는 걸 간파했다면, 대책도 세웠을 텐데.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「……ふふ。励ましてくれてありがとう。これは私からのチョコだ。受け取ってくれるかい？」"
translation = "「……후후. 격려해 줘서 고맙네. 이건 내가 주는 초코다. 받아 주겠나?」"

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론이지"

[[dialogue]]
speaker = "ジュエリー"
original = "「うん……こうやって贈り物を受け取ってもらえるというのは、存外嬉しいものだね」"
translation = "「응…… 이렇게 선물을 받아 준다는 건, 생각보다 기쁜 일이군.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「また機会があればお茶でもしよう。キミと語らう時間は楽しいからね。それじゃあ」"
translation = "「또 기회가 되면 차라도 마시자구. 자네와 이야기하는 시간은 즐거우니까. 그럼 이만.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「わ～、会長くん。やっと見つけたと思ったら、両手いっぱいにチョコ持ってるし！\u3000出遅れた～！」"
translation = "「와~, 회장군. 겨우 찾았다 싶었더니, 양손 가득 초코를 들고 있잖아! 늦어버렸다구~!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「そんなにいっぱい貰えたのでしたら、私たちのチョコは持てないかもしれませんね。残念ですがこれはなかったことに……」"
translation = "「그렇게나 많이 받으셨다면, 저희 초코는 들지 못하실지도 모르겠네요. 유감이지만 이건 없었던 일로……」"

[[dialogue]]
speaker = "unk"
original = "２人からも欲しいよ……！"
translation = "둘한테서도 받고 싶어……!"

[[dialogue]]
speaker = "unk"
original = "待って待って！？"
translation = "잠깐 기다려!?"

[[dialogue]]
speaker = "ウズメイア"
original = "「あははっ♪\u3000もー、シャルレーヌちゃん。イジワルは駄目だし！\u3000ちゃんと渡そ？」"
translation = "「아하하♪ 증말, 샤를레느짱. 심술부리면 안 된다구! 제대로 주자?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くすくす♪\u3000言ってみただけです。会長さんには今回、とってもお世話になりましたから」"
translation = "「쿠스쿠스♪ 말해본 것뿐이에요. 회장님께는 이번에, 정말 신세를 졌으니까요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「は～い、雨野ウズメイア特製！\u3000ガトーショコラだよ！\u3000受け取って<emoji=heart04>」"
translation = "「짜잔, 아마노 우즈메이야 특제! 가토 쇼콜라야! 받아줘<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「シャルレーヌお手製のトリュフチョコレートです♪\u3000あ、ちなみに本命ですから<emoji=heart04>\u3000また感想、教えてくださいね～？」"
translation = "「샤를레느가 직접 만든 트러플 초콜릿입니다♪ 아, 참고로 진심이니까<emoji=heart04> 나중에 소감, 알려주세요~?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えっ、本命！？\u3000シャルレーヌちゃん、それ本命なの！？」"
translation = "「엣, 진심!? 샤를레느짱, 그거 진심인 거야!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「はい♪\u3000会長さんには前から言ってますよね？」"
translation = "「네♪ 회장님께는 전부터 말씀드렸죠?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「いずれ魔王の血をディアーブル家に取り込ませていただくと……くふふっ。これはその根回しみたいな感じです♪」"
translation = "「언젠가 마왕의 피를 디아블 가문에 들여오겠다고…… 크후훗. 이건 그 사전 작업 같은 느낌이에요♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、なんか急に政治っぽい話になったし」"
translation = "「아, 뭔가 갑자기 정치적인 이야기가 됐다구.」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あれ？\u3000あれあれあれ～<emoji=heart04>\u3000もしかしてぇ、本当に私の想いが詰まったチョコだと思っちゃいましたぁ？\u3000くふふふっ<emoji=heart04>」"
translation = "「어라? 어라어라어라~<emoji=heart04> 설마아, 정말로 제 마음이 가득 담긴 초코라고 생각하신 거예요? 크후후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "またからかわれた……！"
translation = "또 놀림당했다……!"

[[dialogue]]
speaker = "ウズメイア"
original = "「ど～んまい、会長くん……あっ、向こうの女の子たちが呼んでるみたいだよ？\u3000行って来たら？」"
translation = "「더~언마이, 회장군…… 앗, 저쪽 여자애들이 부르는 것 같아. 갔다 와보는 게 어때?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふ♪\u3000ホワイトデーのお返し、楽しみにしてますね～。それじゃあ～<emoji=heart04>」"
translation = "「크후후♪ 화이트데이 답례, 기대하고 있을게요~. 그럼 이만~<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ふ～。楽しかったバレンタインもこれで終わりかぁ。でもシャルレーヌちゃんとペアが組めて楽しかったかも♪」"
translation = "「후~. 즐거웠던 발렌타인도 이걸로 끝인가아. 그래도 샤를레느짱이랑 페어를 이뤄서 즐거웠을지도♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私もです。普段あまり話さない人と交流できるのも楽しかったですし……」"
translation = "「저도예요. 평소에 별로 대화하지 않던 분과 교류할 수 있어서 즐거웠고……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「私の素を見てもちゃんと受け入れてくれて……ウズメイア先輩とペアで良かったって思います」"
translation = "「제 본모습을 보고도 제대로 받아주셔서…… 우즈메이야 선배와 페어라서 다행이라고 생각해요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、ほんとに～？\u3000えへ、そう言ってくれるとすっごく嬉しいし！」"
translation = "「아, 정말루~? 에헤, 그렇게 말해주니까 완전 기쁘다구!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それで、あの……お礼と言っては何なのですが。実は先輩にもチョコを作ってて……」"
translation = "「그래서, 저기…… 답례라고 하기엔 뭣하지만. 사실 선배한테 줄 초코도 만들어서……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あはっ♪\u3000気が合うね！\u3000シャルレーヌちゃん。あたしも可愛い後輩に贈る、友チョコを用意してたり～？」"
translation = "「아핫♪ 마음이 통했네! 샤를레느짱. 나도 귀여운 후배한테 줄 우정 초코를 준비했거든~?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふっ♪\u3000じゃあ交換しましょうか？\u3000ハッピーバレンタインです、ウズメイア先輩♪」"
translation = "「크후훗♪ 그럼 교환할까요? 해피 발렌타인이에요, 우즈메이야 선배♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うん♪\u3000これからも仲良くしよーねっ、シャルレーヌちゃん！\u3000ハッピーバレンタインっ♪」"
translation = "「응♪ 앞으로도 친하게 지내자, 샤를레느짱! 해피 발렌타인♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、ドタバタなトラブルを抱えつつも、流星学園のバレンタインは大盛況のうちに幕を下ろしたのだった──"
translation = "이렇게, 우당탕탕 트러블을 겪으면서도, 유성학원의 발렌타인은 대성황 속에 막을 내린 것이었다──"

