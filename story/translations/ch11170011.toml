[[dialogue]]
speaker = "unk"
original = "第１話,抗えぬ誘惑,P"
translation = "제1화, 거부할 수 없는 유혹, P"

[[dialogue]]
speaker = "unk"
original = "先日の新星学園襲撃事件では、複数のコラプサーが一斉に捕縛された。"
translation = "얼마 전의 신성학원 습격 사건에서는 여러 명의 콜랩서가 일제히 포획되었다."

[[dialogue]]
speaker = "unk"
original = "彼女たちはネビュラ基地で拘束されることになり、俺はエンジュの元へと面会に向かった。"
translation = "그녀들은 네뷸라 기지에 구속되게 되었고, 나는 엔주의 면회를 향했다."

[[dialogue]]
speaker = "リーリア"
original = "「あっ、センパイ。私に会いに来てくれて、ありがとうございま～す☆」"
translation = "「앗, 선배. 저를 보러 와주셔서 감사합니당~☆」"

[[dialogue]]
speaker = "リーリア"
original = "「な～んて後輩の可愛らしい冗談はさておいて、エンジュさんですけど……バイタルには問題はないんですが、すごく頑なでして」"
translation = "「라~는 후배의 귀여운 농담은 제쳐두고, 엔주 씨 말인데요…… 바이탈에는 문제가 없는데, 굉장히 완고해서요」"

[[dialogue]]
speaker = "リーリア"
original = "「こちらが出した食事には一切手を付けてくれないんですよ～。『ネビュラは捕虜にご飯も与えず、虐待してる～！』なんて噂が広まったら、困っちゃいます」"
translation = "「이쪽에서 내준 식사에는 일절 손을 대지 않거든요~. 『네뷸라는 포로에게 밥도 안 주고 학대한다~!』 같은 소문이 퍼지면 곤란하다구요」"

[[dialogue]]
speaker = "エンジュ"
original = "「……魔王か」"
translation = "「……마왕인가」"

[[dialogue]]
speaker = "リーリア"
original = "「飲まず食わずでもう３日目……普通の人なら、もう限界のはずなんですけど……」"
translation = "「먹지도 마시지도 않고 벌써 3일째…… 보통 사람이라면 이미 한계일 텐데요……」"

[[dialogue]]
speaker = "エンジュ"
original = "「敵に出された飯なんかに手をつけられるものか。自白剤なんて入れられてたらたまったもんじゃないからな」"
translation = "「적에게 받은 밥 따위에 손을 댈 수 있겠냐. 자백제라도 들어있으면 큰일이니까」"

[[dialogue]]
speaker = "unk"
original = "食べ物を粗末にしたら、キサナが怒るよ"
translation = "음식을 소중히 안 하면 키사나가 화낼 거야"

[[dialogue]]
speaker = "unk"
original = "このままじゃ栄養失調で倒れるよ"
translation = "이대로라면 영양실조로 쓰러질 거야"

[[dialogue]]
speaker = "エンジュ"
original = "「あたしの知ったことか。あたしがぶっ倒れて情報を得られなくて困るのはお前たちだ」"
translation = "「내가 알 바냐. 내가 쓰러져서 정보를 얻지 못해 곤란한 건 너희들이다」"

[[dialogue]]
speaker = "リーリア"
original = "「なんとかして食べさせてあげたいんですけど……センパイ、彼女が我慢できなくなるような大好物とかご存じないですか？\u3000ないですよね～？」"
translation = "「어떻게든 먹게 해주고 싶은데…… 선배, 그녀가 참지 못할 정도로 좋아하는 음식 같은 거 모르시나요? 없겠죠~?」"

[[dialogue]]
speaker = "メテオラ"
original = "『あたしの友達がドーナツ大好きだからな！\u3000チョーおいしいドーナツを買ってってあげようとしたんだぞ！』"
translation = "『내 친구가 도넛 엄청 좋아하거든! 그래서 짱 맛있는 도넛을 사다 주려고 한 거야!』"

[[dialogue]]
speaker = "エンジュ"
original = "『ドーナツはもういい！\u3000いや、必ず美味しくいただくが、こいつを片づけた後だ！』"
translation = "『도넛은 이제 됐어! 아니, 꼭 맛있게 먹겠지만, 이 녀석을 해치운 뒤다!』"

[[dialogue]]
speaker = "unk"
original = "今すぐ買ってくる！"
translation = "지금 당장 사 올게!"

[[dialogue]]
speaker = "unk"
original = "ドーナツだ！"
translation = "도넛이야!"

[[dialogue]]
speaker = "リーリア"
original = "「えっ、知ってるんですか！？\u3000是非お願いしま～す！」"
translation = "「엣, 알고 계신가요!? 부디 부탁드려요!」"

[[dialogue]]
speaker = "エンジュ"
original = "「はっ、やり口がヌルいんだよ。無理やりにでもあたしの口を割らせたかったら、拷問にでもかけるんだな」"
translation = "「핫, 수법이 무르구먼. 억지로라도 내 입을 열게 하고 싶으면 고문이라도 하든가」"

[[dialogue]]
speaker = "リーリア"
original = "「エンジュさん、差し入れですよ～。お好きだろうからって、センパイからです」"
translation = "「엔주 씨, 간식이에요~. 좋아하실 것 같아서 선배님이 가져오셨어요」"

[[dialogue]]
speaker = "エンジュ"
original = "「ふん、何をチラつかされたところで、あたしは──くんくん……ん？\u3000なんだ、この香ばしくて、甘～い匂い、まさか……！？」"
translation = "「흥, 뭘 내밀어봤자 나는── 킁킁…… 응? 뭐야, 이 고소하고 달콤~한 냄새는, 설마……!?」"

[[dialogue]]
speaker = "エンジュ"
original = "「ドーナツだぁ……♪」"
translation = "「도넛이다아……♪」"

[[dialogue]]
speaker = "エンジュ"
original = "「なんで、あたしがドーナツ好きって──はっ！？\u3000そうか、あの時、メテオラが余計なことを……！」"
translation = "「어떻게 내가 도넛 좋아하는 걸── 핫!? 그렇군, 그때 메테오라가 쓸데없는 소리를……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ふん、飢えたあたしにドーナツを与えて、口を割らせるって魂胆か……何も喋らないからな！」"
translation = "「흥, 굶주린 나에게 도넛을 줘서 입을 열게 하겠다는 속셈인가…… 아무 말도 안 할 거니까!」"

[[dialogue]]
speaker = "unk"
original = "これはただの差し入れだから"
translation = "이건 그냥 간식이야"

[[dialogue]]
speaker = "unk"
original = "何も喋らなくていいよ"
translation = "아무 말도 안 해도 돼"

[[dialogue]]
speaker = "エンジュ"
original = "「ほ、本当か……？\u3000嘘じゃないだろうな……自白剤とか入れてないだろうな……！？」"
translation = "「저, 정말이냐……? 거짓말 아니겠지……? 자백제 같은 거 넣지 않았겠지……!?」"

[[dialogue]]
speaker = "リーリア"
original = "「美味しいドーナツにそんなことしないですよね～。さ、エンジュさん、冷めちゃう前に召し上がれ」"
translation = "「맛있는 도넛에 그런 짓을 할 리 없잖아요~. 자, 엔주 씨, 식기 전에 드세요」"

[[dialogue]]
speaker = "エンジュ"
original = "「じゃ、じゃあ、１個だけ……くんくん……ぺろっ……うん、怪しい匂いも味もしないな。どうやら、大丈夫なようだが……あむっ」"
translation = "「그, 그럼 딱 하나만…… 킁킁…… 낼름…… 응, 수상한 냄새도 맛도 안 나는군. 아무래도 괜찮은 것 같다만…… 냠」"

[[dialogue]]
speaker = "エンジュ"
original = "「んんんん～～～っ♪」"
translation = "「으으으으음~~♪」"

[[dialogue]]
speaker = "リーリア"
original = "「美味しそうですね☆」"
translation = "「맛있어 보이네요☆」"

[[dialogue]]
speaker = "エンジュ"
original = "「ふ、ふんっ、美味しいに決まってるだろ！\u3000プロのドーナツ屋さんが作っているんだからな！」"
translation = "「후, 흥, 맛있는 게 당연하지! 전문 도넛 가게에서 만든 거니까!」"

[[dialogue]]
speaker = "エンジュ"
original = "「あむ、あむ、もぐ、もぐ……んふーっ♪\u3000あっ……もう、なくなっちゃった……」"
translation = "「냠, 냠, 우물, 우물…… 응후─♪ 앗…… 벌써 없어져 버렸어……」"

[[dialogue]]
speaker = "unk"
original = "全部食べていいんだよ"
translation = "전부 먹어도 돼"

[[dialogue]]
speaker = "エンジュ"
original = "「ぜ、全部……だと……！？\u3000１０個も独り占めしていいのか……？\u3000言ったな！？\u3000絶対だからな！？\u3000あむ、あむ、あむ！」"
translation = "「전, 전부……라고……!? 10개나 혼자 다 먹어도 된다고……? 말했다!? 절대니까 말이야!? 냠, 냠, 냠!」"

[[dialogue]]
speaker = "エンジュ"
original = "「これはチョコか。緑のはなんだ、抹茶？\u3000そんなのもあるんだな。こっちには白いクリームが入ってる！\u3000ふわふわだ～♪」"
translation = "「이건 초코인가. 초록색은 뭐야, 말차? 그런 것도 있구나. 이쪽에는 하얀 크림이 들어있어! 폭신폭신해~♪」"

[[dialogue]]
speaker = "unk"
original = "エンジュは両手にそれぞれドーナツを掴み、飲まず食わずだった３日分のカロリーを取り戻すかのような勢いで食べ進めた。"
translation = "엔주는 양손에 각각 도넛을 쥐고, 먹지도 마시지도 못했던 3일 치의 칼로리를 되찾으려는 듯한 기세로 먹어 치웠다."

[[dialogue]]
speaker = "エンジュ"
original = "「なんだ、人が食ってるとこ見て、何が面白いんだ。あんまり見るな。やらないからな」"
translation = "「뭐야, 사람 먹는 거 보고 뭐가 재밌어. 너무 보지 마. 안 줄 거니까」"

[[dialogue]]
speaker = "unk"
original = "はい、ホットミルク"
translation = "자, 따뜻한 우유"

[[dialogue]]
speaker = "unk"
original = "誰も取らないから、ゆっくりお食べ"
translation = "아무도 안 뺏으니까 천천히 먹어"

[[dialogue]]
speaker = "エンジュ"
original = "「ドーナツには温かいミルクが一番合うことまで知ってるだと……！？\u3000くそっ、卑怯だぞ、そんなの抗えるはずが……！」"
translation = "「도넛에는 따뜻한 우유가 제일 잘 어울린다는 것까지 알고 있다니……!? 젠장, 비겁하다구, 그런 거 거부할 수 있을 리가……!」"

[[dialogue]]
speaker = "エンジュ"
original = "「ぱくぱくぱく、んくんくんく……ぷはぁっ♪」"
translation = "「냠냠냠, 꿀꺽꿀꺽…… 푸하~♪」"

[[dialogue]]
speaker = "リーリア"
original = "（ふふ、食べてる食べてる。危ないコラプサーも、こうしてるとかわいいんですけどね）"
translation = "(후후, 잘 먹네 잘 먹어. 위험한 콜랩서도 이러고 있으면 귀여운데 말이죠)"

[[dialogue]]
speaker = "エンジュ"
original = "「ふう、食った食った……それにしてもわからないな。あたしに施して、お前たちに何の得がある」"
translation = "「후우, 잘 먹었다…… 그나저나 모르겠군. 나에게 베풀어서 너희들에게 무슨 이득이 있지?」"

[[dialogue]]
speaker = "エンジュ"
original = "「与えられてばかりってのは気味が悪い。上手すぎる話には裏を疑うのが当然だろう」"
translation = "「받기만 하는 건 기분 나빠. 너무 좋은 이야기에는 뒷면을 의심하는 게 당연하잖아」"

[[dialogue]]
speaker = "unk"
original = "世の中、損得で動いてる人ばかりじゃないんだ"
translation = "세상에 손익으로만 움직이는 사람만 있는 건 아니야"

[[dialogue]]
speaker = "unk"
original = "エンジュが幸せになれたなら良かったよ"
translation = "엔주가 행복해졌다면 다행이야"

[[dialogue]]
speaker = "エンジュ"
original = "「ふん、偽善者たちめ。……あと、これはただの独り言だけど」"
translation = "「흥, 위선자 녀석들. ……그리고 이건 그냥 혼잣말인데」"

[[dialogue]]
speaker = "エンジュ"
original = "「ドーナツ美味かったよ。生き返った気分だ……ありがとう」"
translation = "「도넛 맛있었어. 살아난 기분이야…… 고마워」"

[[dialogue]]
speaker = "unk"
original = "──それから後。"
translation = "──그로부터 얼마 후."

[[dialogue]]
speaker = "リーリア"
original = "「エンジュさん。あれからネビュラで出される食事も口にするようになりまして。態度もちょっぴり柔らかくなったんです。センパイのおかげ、ですねっ☆」"
translation = "「엔주 씨, 그때부터 네뷸라에서 나오는 식사도 먹게 되었구요. 태도도 조금 부드러워졌답니다. 선배 덕분이네요☆」"

