[[dialogue]]
speaker = "unk"
original = "第９話,梨緒・Ａ・クリステレス,B"
translation = "제9화, 리오·A·크리스테레스, B"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ああ……暗い……何も見えない……）"
translation = "(아아…… 어두워…… 아무것도 안 보여……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（深く……沈んでいく……寒くて冷たい、闇の中に……）"
translation = "(깊게…… 가라앉아 가…… 춥고 차가운, 어둠 속으로……)"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私の勝ちだよ、アガサ。これで次の星徒会長は私だね」"
translation = "「나의 승리야, 아가사. 이걸로 다음 성도회장은 나네」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くっ……私の……負けだ」"
translation = "「큭…… 나의…… 패배다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「新星学園へ通信連絡。こちらレナーテ・Ｚ・サイフリート」"
translation = "「신성학원으로 통신 연락. 여기는 레나테 Z 자이프리트」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「うん、モンスターの討伐は完了したよ。星徒会に被害はない。だけど──」"
translation = "「응, 몬스터 토벌은 완료했어. 성도회에 피해는 없어. 하지만──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「うぅっ……間に合わなかった……」"
translation = "「으윽…… 늦어버렸어……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「一般人と、初期対応にあたった星騎士に犠牲者が出た。保健委員も懸命に救護しようとしてくれたが……手の施しようがなかった」"
translation = "「일반인과, 초기 대응에 나섰던 성기사 중에 희생자가 나왔어. 보건 위원도 필사적으로 구호하려 했지만…… 손을 쓸 방도가 없었어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「また、救えなかった……！\u3000私は、弱い……っ」"
translation = "「또, 구하지 못했어……! 나는, 약해……윽」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」"
translation = "「……유성시국 이외에도 몬스터가 나타나는 게 당연해졌고, 각지에서 큰 피해가 나오고 있어. 관동만 해도 여러 도시가 괴멸했어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」"
translation = "「인류의 생존권은 시시각각 좁아지고, 지금도 어딘가에서 희생이 나오고 있어……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ロンドンが壊滅した。巨大なアステラに呑み込まれたそうだ」"
translation = "「런던이 괴멸했어. 거대한 아스테라에 집어삼켜졌다고 해」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ロンドンには、家族がいるんだ……祖父と祖母が住んでいて……幼い頃一緒に遊んだ友達も……」"
translation = "「런던에는, 가족이 있어…… 할아버지와 할머니가 살고 계시고…… 어릴 적 같이 놀던 친구도……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ぐすっ……ひぐっ、うぅっ……何も、できなかった……」"
translation = "「구스윽…… 히극, 으윽…… 아무것도, 못 했어……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私たちが……私が弱いせいで……うぅ、ぅっ……ううぅっ……！」"
translation = "「우리가…… 내가 약한 탓에…… 으으, 윽…… 으으윽……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサ、ディザスターハンドとの決戦前にすまない。残念な知らせだ」"
translation = "「아가사, 디재스터 핸드와의 결전 전에 미안하군. 유감스러운 소식이다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「エリシアが死んだ」"
translation = "「엘리시아가 죽었다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ……ああぁああああっ……！！」"
translation = "「아아…… 아아아아아아앗……!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そんな……そんなことって……うぅ、ううぅっ……うっ……」"
translation = "「말도 안 돼…… 그럴 수가…… 으으, 으으윽……윽……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「フィオ……ナ……あぁ……うぅ……」"
translation = "「피오……나…… 아아…… 으으……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やぁ生きてるかい、アガサ」"
translation = "「여어 살아있나, 아가사」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ！？\u3000まだ生きて……！？」"
translation = "「지그!? 아직 살아……!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「すまない、少し気を失っていたようだ。だけど私はまだ戦えるよ」"
translation = "「미안, 잠깐 정신을 잃었던 모양이야. 하지만 나는 아직 싸울 수 있어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私も……まだ、諦めていない……！\u3000この世界を、守るんだ……！」"
translation = "「나도…… 아직, 포기하지 않았어……! 이 세계를, 지키는 거야……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、それでこそアガサだ。倒れていったみんなの分まで頑張ろう」"
translation = "「아아, 그래야 아가사지. 쓰러져간 모두의 몫까지 힘내자」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ベガの最期の瞬間、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が現れた）"
translation = "(베가의 마지막 순간, 『<ruby>제로스<rt>XELOS</rt></ruby>』가 나타났어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私はただ、ジグがリクリエの使徒に作り変えられるのを見ているだけだった）"
translation = "(나는 그저, 지그가 리크리에의 사도로 개조되는 것을 지켜보고 있을 뿐이었어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（負けてばかりの人生だった）"
translation = "(지기만 하는 인생이었어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（失くしてばかりの人生だった）"
translation = "(잃기만 하는 인생이었어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（それに恥の多い人生だった）"
translation = "(그리고 부끄러움 많은 인생이었어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（自分の弱さを突き付けられたくないばかりに勝ちにこだわって、世界を救うためなんて言って自分を騙していた）"
translation = "(자신의 약함을 직면하고 싶지 않은 나머지 승리에 집착하고, 세계를 구하기 위해서라며 자신을 속여왔어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（性懲りもなく何度もジグに挑んで、その度に負けて）"
translation = "(염치도 없이 몇 번이고 지그에게 도전하고, 그때마다 지고서)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（何も守れず、全てを失って）"
translation = "(아무것도 지키지 못하고, 모든 것을 잃고)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（挙句の果てに『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在に心折れ、共に戦っていたジグまで見捨てて、それすら忘れてしまった）"
translation = "(결국에는 『<ruby>제로스<rt>XELOS</rt></ruby>』의 존재에 마음이 꺾여, 함께 싸우던 지그마저 저버리고, 그것조차 잊어버렸어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私は弱くて、泣き虫で、無価値で……）"
translation = "(나는 약하고, 울보에, 무가치해서……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（全てをなかったことにして、やり直すことができたら、どんなにいいか──）"
translation = "(모든 것을 없었던 일로 하고, 다시 시작할 수 있다면 얼마나 좋을까──)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いいわけないだろう」"
translation = "「좋을 리가 없잖아」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「リクリエを受け入れて、使徒になって、弱い自分を捨てれば、私は強くなれるのか？」"
translation = "「리크리에를 받아들이고, 사도가 되어서, 약한 자신을 버리면, 나는 강해질 수 있는 건가?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は自分の弱さにすら負けるのか？」"
translation = "「나는 자신의 약함에조차 지는 건가?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「過ちも、失敗も、誰だって持ってる弱さだ。だからその弱さを許してやれ」"
translation = "「실수도, 실패도, 누구라도 가지고 있는 약함이다. 그러니 그 약함을 용서해 줘라」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「弱さを……許す……」"
translation = "「약함을…… 용서해……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「弱いことは罪じゃない。恥ずかしいことでもない。誰だってそうなんだから」"
translation = "「약한 것은 죄가 아니야. 부끄러운 일도 아니고. 누구라도 다 그렇거든」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「でもありがとな。それが弱さを許すってことだ。ちゃんとできてるじゃないか」"
translation = "「그래도 고맙다. 그게 약함을 용서한다는 거다. 제대로 하고 있잖냐」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そ、そうなのか……？」"
translation = "「그, 그런 건가……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そうだよ。ま、偉そうに言ってるあたしもまだまだヒーローになろうとしてる途中だけどな」"
translation = "「그래. 뭐, 잘난 듯이 말하는 나도 아직 히어로가 되려는 도중이지만 말이야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そしてヒーローは弱さを強さに変えるものだ」"
translation = "「그리고 히어로는 약함을 강함으로 바꾸는 법이지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「弱さを……強さに……」"
translation = "「약함을…… 강함으로……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ。強くなりたいなら、弱さと向き合わなくちゃいけない」"
translation = "「아아. 강해지고 싶다면, 약함과 마주해야만 해」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それが『許す』ことなのか？」"
translation = "「그게 『용서하는』 것인가?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、そういうことだ」"
translation = "「아아, 그런 거지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「誰かを『赦す』ってことは、もちろん口で言うほど簡単なことじゃない。だけどそこまでわかってるなら大丈夫だろ」"
translation = "「누군가를 『용서한다』는 건, 물론 말처럼 쉬운 일은 아니야. 하지만 거기까지 알고 있다면 괜찮겠지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は負けるのが嫌だった」"
translation = "「나는 지는 게 싫었다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「何もできない自分が嫌いで、自分の弱さを突き付けられるから」"
translation = "「아무것도 못 하는 내 자신이 싫어서, 내 약함을 들이대니까」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから世界を救うためなんて自分を騙して、星騎士になった」"
translation = "「그래서 세계를 구한다는 핑계로 자신을 속이고, 성기사가 됐어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今でも負けるのは嫌いだ。負け続けるのはもっと嫌いだ」"
translation = "「지금도 지는 건 싫어. 계속해서 지는 건 더 싫어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それでも昔に比べて、負けを認められるようになった」"
translation = "「그래도 예전에 비하면, 패배를 인정할 수 있게 됐어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベアトやナターシャ、２人のアポロと出会って、自分が弱くていいと、少しずつ思えるようになった」"
translation = "「베아토나 나타샤, 두 명의 아폴로와 만나면서, 내가 약해도 괜찮다고 조금씩 생각할 수 있게 됐어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「何度も負けて、負け続けて、絶望して、世界を滅ぼされた。一度は何もかも失った」"
translation = "「몇 번이나 지고, 계속해서 지고, 절망하고, 세계가 멸망당했지. 한 번은 모든 걸 잃었어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そんな私でも、手に入れたものがあった。教えてくれた仲間がいた」"
translation = "「그런 나라도 손에 넣은 게 있었어. 가르쳐 준 동료가 있었어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「弱さから目を背けた自分も、何も守れない無力な自分も、絶望して仲間を見捨てた自分も──」"
translation = "「약함에서 눈을 돌린 나도, 아무것도 지키지 못하는 무력한 나도, 절망해서 동료를 저버린 나도──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「負けず嫌いな自分も、ここまで戦ってきた自分も、仲間に支えられてきた自分も、全部が私なんだ」"
translation = "「지기 싫어하는 나도, 여기까지 싸워온 나도, 동료들에게 의지해온 나도, 전부가 나야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だからなかったことにはさせない」"
translation = "「그러니까 없었던 일로 하지는 않겠어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「負けたのならまた挑戦すればいい」"
translation = "「졌다면 다시 도전하면 돼」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「絶望したのならまた立ち上がればいい」"
translation = "「절망했다면 다시 일어서면 돼」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「新しい仲間を得て、あがいて、もがいて、前に進む」"
translation = "「새로운 동료를 얻고, 발버둥 치고, 몸부림치며, 앞으로 나아간다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それが梨緒・Ａ・クリステレスの戦いだ！！」"
translation = "「그게 리오·A·크리스테레스의 싸움이다!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──ッ！？\u3000何故だ！？\u3000何故、我が神の声を拒める……！？」"
translation = "「──윽!? 어째서냐!? 어째서, 우리 신의 목소리를 거부하는 거지……!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「言ったはずだ。私は君を救うと」"
