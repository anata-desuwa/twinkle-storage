[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「深淵に沈みなさい。ヘイダルゾーンアビス！」"
translation = "「심연에 가라앉으세요. 헤이달 존 어비스!」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんが圧倒的な力でアステラを駆逐する。"
translation = "위스테리아 씨가 압도적인 힘으로 아스텔라를 구축한다."

[[dialogue]]
speaker = "unk"
original = "しかしビーチの人々は避難したようで、戻ってくると海の家の周りから人気がなくなっていた。"
translation = "하지만 해변의 사람들은 피난한 듯, 돌아와 보니 바다의 집 주변에서 인기가 사라져 있었다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「２人きりになっちゃったわね。じゃあ──」"
translation = "「둘만 남게 됐네. 그럼──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んん……ちゅるっ、ちゅぱ……んふぅ、れぇろ……ちゅぷっ、ちゅるる、じゅるるん……<emoji=heart04>」"
translation = "「응응…… 츄룻, 츄파…… 응후우, 레에로…… 츄풋, 츄루루, 쥬루룬……」"

[[dialogue]]
speaker = "unk"
original = "互いを意識すると、どちらからともなく求め合う。"
translation = "서로를 의식하자, 누가 먼저랄 것도 없이 서로를 갈구한다."

[[dialogue]]
speaker = "unk"
original = "舌を絡め合い、唾液が混ざる濃密なキスを交わす。"
translation = "혀를 얽고, 타액이 섞이는 농밀한 키스를 나눈다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ちゅっ、ちゅぱっ……ぴちゃぴちゃ、ちゅっぷ……ふぅ、んっ……れぇる、れろれろ……るれろん……<emoji=heart04>」"
translation = "「츄, 츄팟…… 피챠피챠, 츄프…… 후우, 응…… 레에루, 레로레로…… 루레론……」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの味が、体温が、柔らかさが、俺の熱情を呼び起こす。"
translation = "위스테리아 씨의 맛이, 체온이, 부드러움이, 나의 열정을 불러일으킨다."

[[dialogue]]
speaker = "unk"
original = "体の奥が熱くなって、ドクドクと下半身が反応するのが自分でもわかった。"
translation = "몸 안쪽이 뜨거워져서, 두근두근하며 하반신이 반응하는 것을 스스로도 알 수 있었다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ちゅぷるっ……んちゅ、じゅるる……ぷぁ。会長くんとのキス……おいしい……<emoji=heart04>」"
translation = "「츄푸룻…… 응츄, 쥬루루…… 푸아. 회장군과의 키스…… 맛있어……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ……大きくなってる……もう、元気なんだから……」"
translation = "「아…… 커지고 있네…… 정말, 팔팔하기도 하지……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こんなキスしたら、大きくなって当然ですよ」"
translation = "「이런 키스를 하면, 커지는 게 당연하죠.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それはそうかもだけど……」"
translation = "「그건 그럴지도 모르지만……」"

[[dialogue]]
speaker = "unk"
original = "勃起したペニスが、水着を内側から押し上げている。"
translation = "발기한 페니스가, 수영복을 안쪽에서 밀어 올리고 있다."

[[dialogue]]
speaker = "unk"
original = "膨らんだ欲望に窮屈さを感じていると、ウィステリアさんが俺の手を引いて──"
translation = "부풀어 오른 욕망에 답답함을 느끼고 있자, 위스테리아 씨가 내 손을 이끌고──"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「こっち来て。人が戻ってきたらいけないから……ね？」"
translation = "「이리 와. 사람들이 돌아오면 안 되니까…… 응?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んっ……しょっと」"
translation = "「응…… 읏차.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──っ」"
translation = "「──읏.」"

[[dialogue]]
speaker = "unk"
original = "水着を脱いで横たわると、いきり立ったものをウィステリアさんの乳房で挟まれる。"
translation = "수영복을 벗고 눕자, 빳빳하게 선 것을 위스테리아 씨의 유방으로 끼워진다."

[[dialogue]]
speaker = "unk"
original = "むっちりとした柔らかさに、ペニスを包み込むほどのボリュームが快感を生み、ますます下半身に血流が集中していく。"
translation = "찰진 부드러움에, 페니스를 감쌀 정도의 볼륨이 쾌감을 낳고, 점점 하반신에 혈류가 집중되어 간다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「もう、ビーチなのにおち○ぽこんなに大きくしちゃって。仕方ないんだから」"
translation = "「정말, 해변인데 자지를 이렇게 크게 만들다니. 못 말리겠네.」"

[[dialogue]]
speaker = "unk"
original = "口では咎めつつも、ウィステリアさんの顔には小さく笑みが浮かんでいて、声もどことなく嬉しそうだ。"
translation = "입으로는 나무라면서도, 위스테리아 씨의 얼굴에는 작은 미소가 떠올라 있고, 목소리도 어딘가 기뻐 보인다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「君のだ～い好きなおっぱいで、おち○ぽムニュムニュしてあげる。嬉しい？」"
translation = "「네가 너~무 좋아하는 가슴으로, 자지 문질문질해 줄게. 기뻐?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んっ……！\u3000おっぱいの中でビクビクして……ふふ、聞くまでもなかったみたいね」"
translation = "「응……! 가슴 안에서 꿈틀거려서…… 후후, 물어볼 필요도 없었네.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「正直に言って？\u3000私が司書として働いている時から、こうしてほしかったんでしょ？\u3000いつも私の胸見てるものね」"
translation = "「솔직하게 말해봐? 내가 사서로 일할 때부터, 이렇게 해줬으면 했지? 항상 내 가슴 보고 있었잖아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だってあんな服着てるから……」"
translation = "「그야 그런 옷을 입고 있으니까……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも君の視線はとびっきり熱っぽいわ。君に見られてるの感じると、図書館なのにゾクッときちゃうの」"
translation = "「하지만 네 시선은 엄청나게 뜨거워. 너한테 보여지는 걸 느끼면, 도서관인데도 짜릿해져 버려.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「だからこのおっぱいでエッチなことしてほしいんだろうな～って。当たりだったみたいね……えいっ<emoji=heart04>」"
translation = "「그래서 이 가슴으로 야한 짓 해줬으면 좋겠구나~ 싶었지. 정답이었나 보네…… 에잇.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うっ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "左右からぎゅっと胸を寄せられると、柔らかな肉の感触につい声がこぼれる。"
translation = "좌우에서 꽉 가슴을 모아오자, 부드러운 살의 감촉에 저절로 소리가 새어 나온다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「声出しちゃって、そんなに気持ちいいんだ……ふふ、会長くん、かわいい……<emoji=heart04>\u3000じゃあもっと……えい<emoji=heart04>\u3000えい<emoji=heart04>」"
translation = "「소리 내버리고, 그렇게 기분 좋아…… 후후, 회장군, 귀여워…… 그럼 더…… 에잇, 에잇.」"

[[dialogue]]
speaker = "unk"
original = "遊ぶように、ぎゅっ、ぎゅっと圧力を強めるウィステリアさん。"
translation = "장난치듯, 꾹, 꾹 압력을 높이는 위스테리아 씨."

[[dialogue]]
speaker = "unk"
original = "その度にむにゅっと大きなおっぱいが潰れて、刺激で腰が震えてしまう。"
translation = "그때마다 뭉클하고 커다란 가슴이 찌그러져서, 자극에 허리가 떨려 버린다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「さっきまで動いてたから、おち○ぽすごい匂いしちゃってる……<emoji=heart04>\u3000それにおつゆも出ちゃってるじゃない<emoji=heart04>\u3000それじゃ──ちゅっ<emoji=heart04>」"
translation = "「아까까지 움직였으니까, 자지 엄청난 냄새가 나…… 거기에 애액도 나와 있잖아. 그럼── 츄.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「～～っ」"
translation = "「～～읏.」"

[[dialogue]]
speaker = "unk"
original = "敏感な亀頭にウィステリアさんの唇が触れ、不意の快感に思わず全身がのたうつ。"
translation = "민감한 귀두에 위스테리아 씨의 입술이 닿고, 갑작스러운 쾌감에 저절로 전신이 몸부림친다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「嬉しそうにビクビク跳ねちゃって♪\u3000喜んでくれるともっとしてあげたくなっちゃう……ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「기쁜 듯이 꿈틀거리면서♪ 기뻐해 주니까 더 해주고 싶어지잖아…… 츄, 츄, 츄.」"

[[dialogue]]
speaker = "unk"
original = "亀頭や幹の部分にキスを浴びせられ、カウパーがさらに滲み出していく。"
translation = "귀두나 기둥 부분에 키스를 퍼부어지고, 쿠퍼액이 더욱 배어 나온다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「君にはいつも気持ち良くしてもらってるから、今日はお姉さんがた～っぷり可愛がってあげる♪」"
translation = "「너한테는 항상 기분 좋게 해주고 있으니까, 오늘은 누나가 너~무 예뻐해 줄게♪」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの口元に少しサディスティックな笑みが浮かぶ。そして……"
translation = "위스테리아 씨의 입가에 조금 사디스틱한 미소가 떠오른다. 그리고……"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「それじゃ──」"
translation = "「그럼──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ～んっ<emoji=heart04>」"
translation = "「아~앙.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あああっ……！？」"
translation = "「아아앗……!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅるっ……君のおち○ちん、食べちゃった<emoji=heart04>」"
translation = "「쥬룻…… 네 자지, 먹어버렸어.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「おち○ぽ、熱くて、大きい……ドクドク跳ねてる……んじゅる……じゅぷるっ、ふっ、んんっ<emoji=heart04>」"
translation = "「자지, 뜨겁고, 커…… 두근두근 뛰고 있어…… 응쥬루…… 쥬푸룻, 흣, 응응……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅぷっ、じゅるっ、じゅくるるっ……<emoji=heart04>\u3000んっ、ふぅ……じゅるれろっ、ちゅぷるっ、ちゅれろれろ<emoji=heart04>」"
translation = "「쥬풋, 쥬룻, 쥬쿠루룻…… 응, 후우…… 쥬루레롯, 츄푸룻, 츄레로레로.」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんは乳房を上下させながら頭を動かし、胸と口の両方でペニスを刺激してくる。"
translation = "위스테리아 씨는 유방을 상하로 움직이며 머리를 움직여, 가슴과 입 양쪽으로 페니스를 자극해 온다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いっぱい、気持ち良く、なって……じゅるる……んっ、んんっ……んちゅる、れる……るれろ、れろ……<emoji=heart04>」"
translation = "「잔뜩, 기분 좋게, 되어서…… 쥬루루…… 응, 응응…… 응츄루, 레루…… 루레로, 레로……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んじゅぷ、じゅる、じゅる……ちゅっぷぅっ……ちゅるれろ……ちゅぅっ、じゅるるるっ<emoji=heart04>」"
translation = "「응쥬푸, 쥬루, 쥬루…… 츄뿌우…… 츄루레로…… 츄우, 쥬루루루.」"

[[dialogue]]
speaker = "unk"
original = "ガチガチに怒張したペニスをおっぱいと口で同時に刺激され、射精欲がさらに高まっていく。"
translation = "딱딱하게 발기한 페니스를 가슴과 입으로 동시에 자극받아, 사정 욕구가 더욱 높아져 간다."

[[dialogue]]
speaker = "unk"
original = "咥えたまま舐められたり、吸われたりして、その度に下半身が跳ねてしまう。"
translation = "입에 문 채로 핥거나, 빨거나 해서, 그때마다 하반신이 튀어 버린다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅる、じゅぷぷぷっ……じゅくるるっ……おち○ぽの味、する……じゅぷるっ、じゅくっ<emoji=heart04>」"
translation = "「쥬루, 쥬푸푸풋…… 쥬쿠루룻…… 자지 맛, 나…… 쥬푸룻, 쥬쿠.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んっふぅ……おち○ぽ、おっきくて、口に、入りきらないかも……じゅぷっ、じゅぷっ……ふっ……んじゅぷぅっ……<emoji=heart04>」"
translation = "「응후우…… 자지, 커서, 입에, 다 안 들어갈지도…… 쥬풋, 쥬풋…… 흣…… 응쥬푸우……」"

[[dialogue]]
speaker = "unk"
original = "唾液と先走りが混じった汁がペニスから垂れて、ウィステリアさんの胸をいやらしく濡らす。"
translation = "타액과 애액이 섞인 즙이 페니스에서 흘러내려, 위스테리아 씨의 가슴을 요염하게 적신다."

[[dialogue]]
speaker = "unk"
original = "ぬるぬると滑りが良くなり、大きなおっぱいの肉感と相まって極上の快楽をもたらしていた。"
translation = "미끌미끌하게 윤활이 잘 되어, 커다란 가슴의 육감과 어우러져 극상의 쾌락을 가져다주고 있었다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んむっ……んっ……じゅぷるるっ<emoji=heart04>\u3000気持ち良くなって、くれてる……？」"
translation = "「응무…… 응…… 쥬푸루룻…… 기분 좋아지고, 있어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「く……はい、すごく気持ちいいです……」"
translation = "「크…… 네, 정말 기분 좋아요……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「なら、良かった……じゅぅっ、じゅっ、じゅるっ……じゅぷぷっ<emoji=heart04>\u3000んっ、んんっ……ふぅ、んじゅぷるるっ<emoji=heart04>」"
translation = "「그럼, 다행이다…… 쥬우, 쥬, 쥬룻…… 쥬푸풋…… 응, 응응…… 후우, 응쥬푸루룻.」"

[[dialogue]]
speaker = "unk"
original = "年上の余裕を見せながらも、一生懸命俺を気持ち良くしようとしてくれるウィステリアさん。"
translation = "연상의 여유를 보이면서도, 열심히 나를 기분 좋게 해주려는 위스테리아 씨."

[[dialogue]]
speaker = "unk"
original = "恋人が頑張ってくれている姿に興奮が高まり、また先走りの汁を吐き出す。"
translation = "연인이 열심히 해주는 모습에 흥분이 높아져, 또 애액을 토해낸다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んふっ……！\u3000おち○ぽの味、濃くなった……<emoji=heart04>\u3000じゅるじゅる……じゅるるるっ……！」"
translation = "「응후……! 자지 맛, 진해졌어…… 쥬루쥬루…… 쥬루루룻……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うっ……強く吸われて……」"
translation = "「윽…… 세게 빨려서……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んんっ……んしょっ……私のおっぱい、たくさん、感じて……んっ……じゅりゅっ、じゅるじゅる……<emoji=heart04>」"
translation = "「응응…… 응읏…… 내 가슴, 잔뜩, 느껴…… 응…… 쥬류, 쥬루쥬루……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んじゅるじゅるっ……んっ、ふっ、んぅ……れりゅ、れりゅれりゅ……じゅるじゅぱっ……じゅく、ちゅるちゅぷ、ちゅりゅりゅ<emoji=heart04>」"
translation = "「응쥬루쥬루룻…… 응, 흣, 응우…… 레류, 레류레류…… 쥬루쥬팟…… 쥬쿠, 츄루츄푸, 츄류류.」"

[[dialogue]]
speaker = "unk"
original = "こんな昼日中にビーチで性器をしゃぶられて、倒錯感が余計に快感を生む。"
translation = "이런 대낮에 해변에서 성기를 빨리고 있으니, 도착감이 더욱 쾌감을 낳는다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ん、んんっ……ふっ、んっ、んっ……おっぱいの中で、おち○ぽ、またおっきくなってる……<emoji=heart04>」"
translation = "「응, 응응…… 흣, 응, 응…… 가슴 안에서, 자지, 또 커지고 있어……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んじゅる、じゅるじゅるっ……じゅっ……じゅっ……じゅっ……んふっ、んじゅるじゅる<emoji=heart04>」"
translation = "「응쥬루, 쥬루쥬루룻…… 쥬…… 쥬…… 쥬…… 응후, 응쥬루쥬루.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んふ<emoji=heart04>\u3000ん<emoji=heart04>\u3000ん<emoji=heart04>\u3000じゅるる……私も、体、熱くなっちゃう……んんっ、じゅるじゅぱっ<emoji=heart04>」"
translation = "「응후…… 응…… 응…… 쥬루루…… 나도, 몸, 뜨거워져 버려…… 응응, 쥬루쥬팟.」"

[[dialogue]]
speaker = "unk"
original = "漏れ出る吐息に甘い響きが混じり、ウィステリアさんがもじもじと股を擦り合わせる。"
translation = "새어 나오는 한숨에 달콤한 울림이 섞이고, 위스테리아 씨가 꼼지락거리며 가랑이를 비벼댄다."

[[dialogue]]
speaker = "unk"
original = "胸と口の動きがだんだんと加速していって──"
translation = "가슴과 입의 움직임이 점점 가속해 가서──"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ちゅぷるっ<emoji=heart04>\u3000ちゅるっ<emoji=heart04>\u3000ちゅぷるるるっ<emoji=heart04>\u3000ふっ、んっ……んじゅるっ<emoji=heart04>\u3000じゅるっ<emoji=heart04>\u3000ちゅぷぷじゅるっ<emoji=heart04>」"
translation = "「츄푸룻…… 츄룻…… 츄푸루루룻…… 흣, 응…… 응쥬룻…… 쥬룻…… 츄푸푸쥬룻.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「れりゅれりゅ<emoji=heart04>\u3000んれりゅれりゅっ<emoji=heart04>\u3000んじゅるっ、じゅるっ<emoji=heart04>\u3000んんっ、ふっ、ふぅん……んじゅるちゅぷちゅるるっ<emoji=heart04>」"
translation = "「레류레류…… 응레류레류룻…… 응쥬룻, 쥬룻…… 응응, 흣, 후우…… 응쥬루츄푸츄루룻.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んちゅぷぷっ……<emoji=heart04>\u3000また、先走り出て、会長くんの味、するぅ……<emoji=heart04>\u3000ちゅるっ、じゅるるるっ……んくっ、んんっ<emoji=heart04>」"
translation = "「응츄푸풋…… 또, 애액 나와서, 회장군의 맛, 나…… 츄룻, 쥬루루루…… 응쿠, 응응……」"

[[dialogue]]
speaker = "unk"
original = "こんなに美人なお姉さんがおっぱいを使いながらペニスをしゃぶってくれて、先走りまで飲んでくれて、昂らないはずがない。"
translation = "이렇게 미인인 누나가 가슴을 사용하면서 페니스를 빨아주고, 애액까지 마셔주는데, 안 달아오를 리가 없다."

[[dialogue]]
speaker = "unk"
original = "おっぱいの肉感に包まれながら、亀頭を激しく刺激され、気を抜けば今すぐにでも射精してしまいそうだった。"
translation = "가슴의 육감에 감싸이면서, 귀두를 격렬하게 자극받아, 정신을 놓으면 당장이라도 사정해 버릴 것 같았다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んむっ、んんっ、んじゅるっ<emoji=heart04>\u3000おち○ぽ、ドクドクして……んぷっ、んんっ……じゅるっ、じゅるるんっ<emoji=heart04>」"
translation = "「응무, 응응, 응쥬룻…… 자지, 두근두근해서…… 응풋, 응응…… 쥬룻, 쥬루룬.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うっ……ウィステリアさん、すごくエッチです……」"
translation = "「윽…… 위스테리아 씨, 정말 야해요……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「だって、おち○ぽ熱くて、太くて……んふっ、んっ<emoji=heart04>\u3000ちゅぷっ、じゅりゅっ<emoji=heart04>\u3000私も、ドキドキしちゃうっ<emoji=heart04>」"
translation = "「그야, 자지 뜨겁고, 굵어서…… 응후, 응…… 츄풋, 쥬류룻…… 나도, 두근두근해져……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅぷるっ<emoji=heart04>\u3000じゅるっ<emoji=heart04>\u3000じゅるるんっ<emoji=heart04>\u3000君のおち○ぽ好き<emoji=heart04>\u3000れりゅりゅ<emoji=heart04>\u3000おま○こ疼いちゃうのっ<emoji=heart04>」"
translation = "「쥬푸룻…… 쥬룻…… 쥬루룬…… 네 자지 좋아…… 레류류…… 보지 쑤셔와……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んふっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000おち○ぽ、ズリズリしてると、おっぱいまで気持ち良く、なっちゃうっ<emoji=heart04>」"
translation = "「응후…… 응…… 응…… 자지, 즈리즈리 비비고 있으면, 가슴까지 기분 좋게, 되어버려……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「君のおち○ぽ、熱くて、硬くて、おっぱいに跡が付いちゃうっ<emoji=heart04>\u3000ちゅぷっ、じゅるっ……おち○ぽ、刻み込まれちゃう<emoji=heart04>」"
translation = "「네 자지, 뜨겁고, 딱딱해서, 가슴에 자국이 남을 것 같아…… 츄풋, 쥬룻…… 자지, 새겨져 버려……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んぷっ<emoji=heart04>\u3000ふっ、んっ、ちゅぷるるっ<emoji=heart04>\u3000んりゅっ<emoji=heart04>\u3000れりゅれりゅっ<emoji=heart04>\u3000ちゅぷるれるっ<emoji=heart04>」"
translation = "「응풋…… 흣, 응, 츄푸루룻…… 응류룻…… 레류레류룻…… 츄푸루레룻.」"

[[dialogue]]
speaker = "unk"
original = "夢中になってペニスをしゃぶるウィステリアさんがたまらない。"
translation = "정신없이 페니스를 빠는 위스테리아 씨가 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "ぎゅうっと潰すようにおっぱいを押し付けてきて、その柔らかさに頭が沸騰しそうだ。"
translation = "꽉 찌그러뜨리듯 가슴을 밀착해 와서, 그 부드러움에 머리가 터질 것 같다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んぷっ、ふんっ、ん<emoji=heart04>\u3000ちゅぷるっ<emoji=heart04>\u3000れりゅ、れるれるっ<emoji=heart04>\u3000君のおち○ぽ、おいしいの……ぷちゅるるっ<emoji=heart04>」"
translation = "「응풋, 흣, 응…… 츄푸룻…… 레류, 레루레루룻…… 네 자지, 맛있어…… 푸츄루룻.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ウィステリアさん……もう……っ」"
translation = "「위스테리아 씨…… 이제…… 읏.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「うん、出してっ<emoji=heart04>\u3000私のおっぱいで、気持ち良くなって、熱い精液出してっ<emoji=heart04>\u3000んぷっ、じゅるっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ちゅぷるるっ<emoji=heart04>」"
translation = "「응, 싸줘…… 내 가슴으로, 기분 좋아져서, 뜨거운 정액 싸줘…… 응풋, 쥬룻…… 응응…… 츄푸루룻.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅくるっ、じゅぷるるっ<emoji=heart04>\u3000んぷっ<emoji=heart04>\u3000ちゅくるるっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ちゅぷっ<emoji=heart04>\u3000じゅぷるるるっ<emoji=heart04>」"
translation = "「쥬쿠룻, 쥬푸루룻…… 응풋…… 츄쿠루룻…… 응…… 응…… 츄풋…… 쥬푸루루룻.」"

[[dialogue]]
speaker = "unk"
original = "ラストスパートとばかりに胸と口の責めが激しくなる。"
translation = "라스트 스퍼트라는 듯이 가슴과 입의 공세가 격렬해진다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私も欲しいの<emoji=heart04>\u3000君の精液、出してほしいっ<emoji=heart04>\u3000んぷっ<emoji=heart04>\u3000じゅるるっ<emoji=heart04>\u3000じゅくるるるっ<emoji=heart04>」"
translation = "「나도 원해…… 네 정액, 싸줬으면 좋겠어…… 응풋…… 쥬루룻…… 쥬쿠루루룻.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「熱くて、濃い精液、出してもらえるって、思ったら<emoji=heart04>\u3000んっ<emoji=heart04>\u3000じゅぷっ<emoji=heart04>\u3000おま○こ、キュンキュンしちゃうのっ<emoji=heart04>」"
translation = "「뜨겁고, 진한 정액, 싸준다고 생각하면…… 응…… 쥬풋…… 보지, 큥큥거려……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000精液出してっ<emoji=heart04>\u3000んぷっ<emoji=heart04>\u3000ちゅくるるっ<emoji=heart04>\u3000このまま口に出してっ<emoji=heart04>\u3000君の精液、飲ませてっ<emoji=heart04>」"
translation = "「응…… 응…… 응…… 응응…… 정액 싸줘…… 응풋…… 츄쿠루룻…… 이대로 입에 싸줘…… 네 정액, 마시게 해줘……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅぷるっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000じゅるるるっ<emoji=heart04>\u3000じゅるじゅるっ<emoji=heart04>\u3000んちゅぅっ<emoji=heart04>\u3000ふっ、んちゅるちゅるっ<emoji=heart04>」"
translation = "「쥬푸룻…… 응…… 쥬루루루룻…… 쥬루쥬루룻…… 응츄우…… 흣, 응츄루츄루룻.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んんっ……！\u3000おち○ちんビクビクしてっ<emoji=heart04>\u3000出るのねっ<emoji=heart04>\u3000うん、出してっ、出してぇっ<emoji=heart04>\u3000んちゅるっ、ちゅるちゅる、んっちゅぅっ<emoji=heart04>」"
translation = "「응응……! 자지 두근거려서…… 나오는구나…… 응, 싸줘, 싸줘어…… 응츄룻, 츄루츄루, 응츄우.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅるっ──じゅるるるっ<emoji=heart04><emoji=heart04>\u3000じゅくるっ<emoji=heart04>\u3000じゅるっ<emoji=heart04>\u3000じゅるじゅるっ<emoji=heart04>\u3000らして、らして、らしてっ<emoji=heart04>」"
translation = "「쥬룻── 쥬루루루룻…… 쥬쿠룻…… 쥬룻…… 쥬루쥬루룻…… 싸줘, 싸줘, 싸줘어……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「せーえき、ほしいのっ<emoji=heart04>\u3000熱いせーえき、たくさんらしてっ<emoji=heart04>\u3000ぷじゅるっ<emoji=heart04>\u3000じゅるじゅるじゅるぅっ<emoji=heart04>」"
translation = "「정액, 원해…… 뜨거운 정액, 잔뜩 싸줘…… 푸쥬룻…… 쥬루쥬루쥬루우.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ん──んっ、んっ、んっ、んん～～っ<emoji=heart04>\u3000じゅぷるっ<emoji=heart04>\u3000じゅっ<emoji=heart04>\u3000じゅっ<emoji=heart04>\u3000じゅるるるるーーーっ<emoji=heart04><emoji=heart04>」"
translation = "「응── 응, 응, 응, 응응～～…… 쥬푸룻…… 쥬…… 쥬…… 쥬루루루루──.」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんが強く吸った瞬間、頭が真っ白になって──"
translation = "위스테리아 씨가 세게 빤 순간, 머리가 하얘져서──"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んん～～～～～～～～～～～っ！！？」"
translation = "「응응～～～～～～～～～～～!!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んふっ……んっ……んんっ……！\u3000くちのなかで、おち○ちん、ドクドクって……んぶっ……んんぅ……っ」"
translation = "「응후…… 응…… 응응……! 입안에서, 자지, 두근두근하고…… 응붓…… 응응…… 읏.」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの口内に思い切り精を吐き出す。"
translation = "위스테리아 씨의 구강에 마음껏 정액을 토해낸다."

[[dialogue]]
speaker = "unk"
original = "豊満なおっぱいに包まれながら射精する至高の快感に、神経が焼き切れそうになる。"
translation = "풍만한 가슴에 감싸이면서 사정하는 지고의 쾌감에, 신경이 타버릴 것 같다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「んんっ、んっ……<emoji=heart04>\u3000ふっ、んっ……せーえき、たくさん出てる……<emoji=heart04>\u3000んふぅ……んくっ……こくっ、んんっ<emoji=heart04>」"
translation = "「응응, 응…… 흣, 응…… 정액, 잔뜩 나오고 있어…… 응후우…… 응쿠…… 꼴깍, 응응.」"

[[dialogue]]
speaker = "unk"
original = "口内にぶちまけられた精を懸命に受け止め、喉を鳴らして呑み込むウィステリアさん。"
translation = "구강에 쏟아진 정액을 필사적으로 받아내고, 목을 울리며 삼키는 위스테리아 씨."

[[dialogue]]
speaker = "unk"
original = "けれど甘い吐息を漏らし、どこか恍惚としているようでもあった。"
translation = "하지만 달콤한 한숨을 흘리며, 어딘가 황홀해하는 것 같기도 했다."

[[dialogue]]
speaker = "unk"
original = "射精の勢いが弱まってくると──"
translation = "사정의 기세가 약해지자──"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅるるるるっ……！」"
translation = "「쥬루루루룻……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぅぅっ……！？」"
translation = "「쿠우우……!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゅくるっ、じゅるっ<emoji=heart04>\u3000ぜんぶ、らして……じゅるるっ<emoji=heart04>\u3000んくっ……んっ、んっ……ごくっ<emoji=heart04>」"
translation = "「쥬쿠룻, 쥬룻…… 전부, 싸줘…… 쥬루룻…… 응쿠…… 응…… 응…… 꼴깍.」"

[[dialogue]]
speaker = "unk"
original = "おっぱいでペニスを絞りながら、尿道に残った精まで吸い出し、最後の一滴まで飲み干した。"
translation = "가슴으로 페니스를 조이며, 요도에 남은 정액까지 빨아내어, 마지막 한 방울까지 들이켰다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「はあぁ……ごちそうさま……<emoji=heart04>」"
translation = "「하아…… 잘 먹었습니다……」"

[[dialogue]]
speaker = "unk"
original = "口の端からドロリと精液を垂らしながら、淫靡に笑む。"
translation = "입가에서 걸쭉하게 정액을 흘리며, 음탕하게 웃는다."

[[dialogue]]
speaker = "unk"
original = "その笑顔だけでゾクリと背筋が震えるほどだ。"
translation = "그 미소만으로도 오싹할 정도로 등줄기가 떨린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとうございました……」"
translation = "「감사합니다……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「どういたしまして♪\u3000私もついつい熱が入っちゃったわ」"
translation = "「천만에♪ 나도 모르게 열이 올라버렸어.」"

[[dialogue]]
speaker = "unk"
original = "射精後の脱力感に身を委ね、ぐったりと浜辺に横たわる。"
translation = "사정 후의 탈력감에 몸을 맡기고, 녹초가 되어 해변에 눕는다."

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんにパイズリしてもらっていただけなのに、戦闘よりも疲れたかもしれない。"
translation = "위스테리아 씨에게 파이즈리만 받았을 뿐인데, 전투보다 더 지쳤을지도 모른다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、まだちょっと精液付いてるわね──ぺろっ」"
translation = "「아, 아직 조금 정액 묻어있네── 핥짝.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「～～っ」"
translation = "「～～읏.」"

[[dialogue]]
speaker = "unk"
original = "まるで頬に付いたクリームを舐めるみたいに、射精後で敏感な亀頭をペロリと舐められた。"
translation = "마치 뺨에 묻은 크림을 핥듯이, 사정 후라 민감한 귀두를 핥짝 핥아졌다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「我ながら盛り上がり過ぎちゃったかも。精液、ドロドロで熱くて……口に出された瞬間、ちょっとイッちゃったし」"
translation = "「나도 모르게 너무 달아올랐을지도. 정액, 걸쭉하고 뜨거워서…… 입에 싸인 순간, 살짝 가버렸고.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「たくさん出してくれたわね。口の中、君の味と匂いでいっぱいだわ」"
translation = "「잔뜩 싸줬네. 입안, 네 맛과 냄새로 가득해.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ふふ、君が私のおっぱい大好きってことがよくわかったわ。次はいつもの服でもしてあげましょうか？」"
translation = "「후후, 네가 내 가슴을 엄청 좋아한다는 게 잘 알겠어. 다음엔 평소 입던 옷으로도 해줄까?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、またおち○ぽビクッてした。期待しちゃって……ふふ、じゃあそのうちしてあげるわね」"
translation = "「아, 또 자지 꿈틀거렸어. 기대하고 있네…… 후후, 그럼 조만간 해줄게.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そろそろビーチに人が戻ってきそうだし、軽くシャワーを浴びて、今度こそ遊びましょうか。さ、いきましょ」"
translation = "「슬슬 해변에 사람들이 돌아올 것 같으니까, 가볍게 샤워하고, 이번엔 진짜로 놀까? 자, 가자.」"

