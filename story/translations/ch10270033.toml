[[dialogue]]
speaker = "unk"
original = "第３話,カフェテリアの新メニュー・完結編,P"
translation = "제3화, 카페테리아의 신메뉴·완결편, P"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃ～ん、どうかな～？\u3000サラン、クロール出来るようになったよ～♪」"
translation = "「회장님~ 어때~? 사란, 크롤 수영 할 수 있게 됐어~♪」"

[[dialogue]]
speaker = "unk"
original = "日焼け止めを塗り終わった俺たちはプールに入る。"
translation = "선크림을 다 바른 우리는 수영장에 들어간다."

[[dialogue]]
speaker = "unk"
original = "最初は水に浮くことさえおぼつかなかったサランだが、しばらく教えると、どうにか泳ぐことはできるようになっていた。"
translation = "처음에는 물에 뜨는 것조차 위태로웠던 사란이지만, 잠시 가르치자 어떻게든 수영은 할 수 있게 되었다."

[[dialogue]]
speaker = "unk"
original = "でも、泳げてるからＯＫ！"
translation = "그래도 수영할 수 있으니 OK!"

[[dialogue]]
speaker = "unk"
original = "どちらかというと犬かきだけど……"
translation = "어느 쪽인가 하면 개헤엄이지만……"

[[dialogue]]
speaker = "サラン"
original = "「今からそこまで泳いでいくよ～。会長ちゃんは動かないでね～」"
translation = "「지금부터 저기까지 수영해 갈게~. 회장님은 움직이지 마~」"

[[dialogue]]
speaker = "unk"
original = "バシャバシャバシャ……"
translation = "어푸어푸어푸……"

[[dialogue]]
speaker = "unk"
original = "バシャバシャバシャ……！"
translation = "어푸어푸어푸……!"

[[dialogue]]
speaker = "unk"
original = "バシャバシャバシャ！！"
translation = "어푸어푸어푸!!"

[[dialogue]]
speaker = "サラン"
original = "「えーーーーい！」"
translation = "「에잇!」"

[[dialogue]]
speaker = "unk"
original = "バッシャーーーン！！！"
translation = "첨버덩!!!"

[[dialogue]]
speaker = "unk"
original = "ギリギリ何とか俺のところまで泳ぎ着いたサランが俺に飛びついてくる。"
translation = "아슬아슬하게 어떻게든 내 쪽까지 헤엄쳐 온 사란이 나에게 달려든다."

[[dialogue]]
speaker = "unk"
original = "顔面に思いっきり水が打ち付けた。"
translation = "얼굴에 힘껏 물이 튀었다."

[[dialogue]]
speaker = "unk"
original = "と同時に、ものすごく気持ちいい弾力が俺の胸に押しあてられる。"
translation = "동시에 엄청나게 기분 좋은 탄력이 내 가슴에 밀착된다."

[[dialogue]]
speaker = "サラン"
original = "「えへへ、やった～。ちゃんと会長ちゃんのところまで泳ぎついたよ～♪」"
translation = "「에헤헤, 해냈다~. 제대로 회장님 있는 곳까지 헤엄쳐 왔어~♪」"

[[dialogue]]
speaker = "サラン"
original = "「なんだか、だんだん泳ぐのが楽しくなってきたかも～」"
translation = "「왠지 점점 수영하는 게 즐거워진 것 같아~」"

[[dialogue]]
speaker = "サラン"
original = "「これも会長ちゃんが泳ぎ方を教えてくれたおかげだね～、ありがとう～♪」"
translation = "「이것도 회장님이 수영하는 법을 가르쳐 준 덕분이네, 고마워~♪」"

[[dialogue]]
speaker = "unk"
original = "２つの大きなスイカが……"
translation = "커다란 수박 두 개가……"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？」"
translation = "「뽀요?」"

[[dialogue]]
speaker = "サラン"
original = "「そっか～。サランたちはデザートのアイデアを考えるためにプールに来たんだよね～」"
translation = "「그렇구나~. 사란 일행은 디저트 아이디어를 생각하기 위해 수영장에 온 거였지~」"

[[dialogue]]
speaker = "サラン"
original = "「遊ぶのに夢中になってて、サラン、すっかり忘れちゃってたよ～」"
translation = "「노는 데 정신이 팔려서 사란, 완전히 잊고 있었어~」"

[[dialogue]]
speaker = "サラン"
original = "「んっと……会長ちゃん的には、夏と言えばスイカってこと？」"
translation = "「음…… 회장님 생각에는 여름 하면 수박이라는 거지?」"

[[dialogue]]
speaker = "unk"
original = "そ、それが言いたかった！"
translation = "그, 그걸 말하고 싶었어!"

[[dialogue]]
speaker = "サラン"
original = "「ん……ん～、なんだかイメージが湧いてきたかも……」"
translation = "「음…… 음~ 왠지 이미지가 떠오른 것 같아……」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃん、急いでカフェテリアに戻ろ～！」"
translation = "「회장님, 빨리 카페테리아로 돌아가자!」"

[[dialogue]]
speaker = "unk"
original = "カフェテリアに戻ったサランは、厨房に入って早速何かを作り始める。"
translation = "카페테리아로 돌아온 사란은 주방에 들어가 곧바로 무언가를 만들기 시작한다."

[[dialogue]]
speaker = "蛍火"
original = "「どんなデザートを思いついたんでしょうか……？」"
translation = "「어떤 디저트를 생각해 냈을까요……?」"

[[dialogue]]
speaker = "unk"
original = "皆が関心を寄せる中、サランが厨房から姿を現した。"
translation = "모두가 관심을 보이는 가운데, 사란이 주방에서 모습을 드러냈다."

[[dialogue]]
speaker = "unk"
original = "その視線は、彼女の手にしているデザートグラスに集まる。"
translation = "그 시선은 그녀가 손에 들고 있는 디저트 글라스에 집중된다."

[[dialogue]]
speaker = "サラン"
original = "「はい、ふたつのおっきなスイカアイスだよ～♪」"
translation = "「자, 커다란 수박 아이스크림 두 개야~♪」"

[[dialogue]]
speaker = "unk"
original = "……！！！！？？？"
translation = "……!!!!???"

[[dialogue]]
speaker = "unk"
original = "グラスには薄緑色の球形のアイスが２つ。"
translation = "글라스에는 연녹색의 구형 아이스크림이 두 개."

[[dialogue]]
speaker = "unk"
original = "スイカをイメージして、チョコレートのラインが入っている。"
translation = "수박을 이미지해서 초콜릿 라인이 들어가 있다."

[[dialogue]]
speaker = "蛍火"
original = "「なるほど、これはまさに夏っぽいです！！！」"
translation = "「과연, 이건 정말 여름 느낌이 나네요!!!」"

[[dialogue]]
speaker = "蛍火"
original = "「かわいらしさもあって、これは女の子にも人気が出ますよ！」"
translation = "「귀여움도 있어서 이건 여자아이들에게도 인기가 많겠어요!」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～、そうだよね～？」"
translation = "「에헤헤~ 그치~?」"

[[dialogue]]
speaker = "蛍火"
original = "「でも、どうして『ふたつの』『おっきな』スイカアイスなんでしょうか？」"
translation = "「그런데 왜 『두 개의』 『커다란』 수박 아이스크림인가요?」"

[[dialogue]]
speaker = "サラン"
original = "「それはね～、会長ちゃんからアイデアを貰ったからだよ～」"
translation = "「그건 말이야~ 회장님한테 아이디어를 얻었기 때문이야~」"

[[dialogue]]
speaker = "サラン"
original = "「プールで泳いでたらね～。急に会長ちゃんがそんなことを言い出したの～」"
translation = "「수영장에서 수영하고 있었더니 말이야~. 갑자기 회장님이 그런 말을 꺼냈어~」"

[[dialogue]]
speaker = "サラン"
original = "「それで理由を聞いてみたら、夏っぽいデザートと言えば『ふたつのおっきなスイカ』だ、って～♪」"
translation = "「그래서 이유를 물어봤더니 여름 느낌 나는 디저트라고 하면 『커다란 수박 두 개』라고~♪」"

[[dialogue]]
speaker = "蛍火"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "サラン"
original = "「ちょっとだけ泳げるようになってはしゃいでたから、メニュー作りのこと忘れかけちゃってたんだ～」"
translation = "「조금 수영할 수 있게 돼서 들떠 있느라 메뉴 만드는 걸 잊을 뻔했거든~」"

[[dialogue]]
speaker = "サラン"
original = "「でも、会長ちゃんのひと言で、ぱぁ～ってアイデアが広がったんだよね～♪」"
translation = "「하지만 회장님의 한마디로 아이디어가 팍 하고 퍼졌어~♪」"

[[dialogue]]
speaker = "unk"
original = "そ、そんな目で見ないで！！！"
translation = "그, 그런 눈으로 보지 마!!!"

[[dialogue]]
speaker = "蛍火"
original = "「師匠が何を見て、そんな発想をしたのかは分かりませんが……こちらはカフェテリアのメニューに加えさせていただいてもいいですか？」"
translation = "「스승님이 뭘 보고 그런 발상을 하셨는지는 모르겠습니다만…… 이건 카페테리아 메뉴에 추가해도 될까요?」"

[[dialogue]]
speaker = "サラン"
original = "「もちろんだよ～♪」"
translation = "「물론이지~♪」"

[[dialogue]]
speaker = "unk"
original = "というわけで、カフェテリアに新しいメニューが加えられた。"
translation = "그리하여 카페테리아에 새로운 메뉴가 추가되었다."

[[dialogue]]
speaker = "unk"
original = "それは瞬く間に人気メニューとなったが、なぜそんな名前なのかを訊ねられると、関係者は一様に口を閉ざしている。"
translation = "그것은 순식간에 인기 메뉴가 되었지만, 왜 그런 이름인지 질문을 받으면 관계자들은 한결같이 입을 다물고 있다."

[[dialogue]]
speaker = "unk"
original = "俺には、できれば永遠にその理由が明かされないことを願うしかなかった。"
translation = "나는 그저 가능하면 영원히 그 이유가 밝혀지지 않기를 바랄 뿐이었다."

