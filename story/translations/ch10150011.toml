[[dialogue]]
speaker = "unk"
original = "第１話,アルモたんと呼べ,P"
translation = "제1화, 알모탄이라 불러라"

[[dialogue]]
speaker = "unk"
original = "ある日。アナと書類仕事をしていると、星徒会室の扉をノックする音が響いた──"
translation = "어느 날. 아나와 서류 작업을 하고 있자, 성도회실 문을 노크하는 소리가 울려 퍼졌다──"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「頼もう」"
translation = "「실례하마」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。お入り下さい」"
translation = "「노 프라블럼. 들어오세요」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「失礼する。この学園の星徒会とやらは、ここで間違いないだろうか？」"
translation = "「실례하지. 이 학원의 성도회라는 곳이, 여기가 맞겠지?」"

[[dialogue]]
speaker = "unk"
original = "あ、貴女は、まさか……！"
translation = "아, 당신은 설마……!"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「うむ。我が名は、守護天使《<ruby>命脈<rt>めいみゃく</rt></ruby>》のアルモタヘル。リクリエの原因を解明し、世界を守護する為、ここに降臨した」"
translation = "「음. 내 이름은 수호천사 《<ruby>명맥<rt>생명줄</rt></ruby>》의 아르모타헬. 리크리에의 원인을 규명하고 세계를 수호하기 위해 이곳에 강림했다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「先日は不甲斐ない姿を晒し、面目次第もない。すでに承知のことかと思うが、我もマグダレナ同様、リクリエの瘴気に飲まれ堕天していたようだ」"
translation = "「지난번엔 한심한 모습을 보여 면목이 없군. 이미 알고 있겠지만, 나도 막달레나와 마찬가지로 리크리에의 장기에 삼켜져 타락했던 모양이다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「この体は守護天使本来のものではない。この学園にいる錬金術の子と、そこにいる天使の子──」"
translation = "「이 몸은 수호천사 본래의 것이 아니다. 이 학원에 있는 연금술 아이와, 저기 있는 천사 아이──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私と、アニマ先輩ですね。２人でアルモタヘル様を人間界に降臨させる為の、<b>物理アバター</b>を作成しました」"
translation = "「저와 아니마 선배군요. 둘이서 아르모타헬 님을 인간계에 강림시키기 위한, <b>물리</b> <b>아바타</b>를 제작했습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「守護天使様の本体は、未だ魔界の奥地に囚われている状態」"
translation = "「수호천사 님의 본체는 아직 마계 오지에 갇혀 있는 상태」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しかし、アニマ先輩が我々の交戦記録から存在情報を探知し、力のごく一部ですが、アバターの中へ緊急避難させることができました」"
translation = "「하지만 아니마 선배가 우리와의 교전 기록에서 존재 정보를 탐지해, 힘의 극히 일부지만 아바타 속으로 긴급 피난시킬 수 있었습니다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そういうことだ。これから我も戦いに協力する故、この学園のトップ──星徒会長であるお前に、挨拶に来た次第だ」"
translation = "「그렇게 된 거다. 이제부터 나도 싸움에 협력할 테니, 이 학원의 톱──성도회장인 네게 인사를 하러 온 참이지」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「でも、守護天使様の膨大な存在情報を、アバターに収めるのは無理……」"
translation = "「하지만 수호천사 님의 방대한 존재 정보를 아바타에 담는 건 무리……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「過去のリクリエについてや、魔界に囚われている本体の所在など、記憶情報には大きな欠落があるようです」"
translation = "「과거의 리크리에에 대해서나 마계에 갇힌 본체의 소재 등, 기억 정보에는 큰 결락이 있는 모양이에요」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「リクリエの阻止という使命は忘れておらぬ故、問題ない。それにこの義体、現状では守護天使の本体にこそ及ばぬが、見事なものだ」"
translation = "「리크리에 저지라는 사명은 잊지 않았으니 문제없다. 게다가 이 의체, 현상태로는 수호천사 본체에는 미치지 못하나 훌륭하군」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「通常の天使の肉体をベースとし、守護天使の力を再現する為に強化されている。それでいて破綻が無い。間違いなく天才の所業と言えよう」"
translation = "「통상적인 천사의 육체를 베이스로 수호천사의 힘을 재현하기 위해 강화되어 있어. 그러면서도 파탄이 없지. 틀림없이 천재의 소행이라 할 수 있겠군」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「光栄です。そう言って貰えると、頑張った甲斐があります」"
translation = "「영광입니다. 그렇게 말씀해 주시니 공들인 보람이 있네요」"

[[dialogue]]
speaker = "unk"
original = "不完全でも圧倒的な星力（？）のオーラを感じる……！"
translation = "불완전해도 압도적인 성력(?)의 오라가 느껴져……!"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「守護天使の力はお前たちが扱う星力ではなく、３０００年前にこの世界から失われた『<b>霊力</b>』に由来するのだが……まあいい。いずれにせよ──」"
translation = "「수호천사의 힘은 너희가 다루는 성력이 아니라, 3000년 전 이 세계에서 소실된 『<b>영력</b>』에서 유래한 것이지만…… 뭐, 됐다. 어쨌든──」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我が炎、必ずやお前たちの役に立つと約束しよう。人の子よ、これからよろしく頼む」"
translation = "「나의 불꽃, 반드시 너희에게 도움이 될 것을 약속하마. 사람의 아이여, 앞으로 잘 부탁한다」"

[[dialogue]]
speaker = "unk"
original = "こちらこそ、よろしくお願いします"
translation = "저야말로 잘 부탁드립니다"

[[dialogue]]
speaker = "unk"
original = "心強いです！"
translation = "든든해요!"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「うむ。それと、我が呼び方についてだが、親しみを込めて……」"
translation = "「음. 그리고 나를 부르는 호칭에 대해서다만, 친근함을 담아……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「『アルモたん』と呼ぶがよい」"
translation = "「『알모탄』이라 부르도록 해라」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker = "unk"
original = "何て？"
translation = "뭐라고요?"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「む？\u3000よく聞こえなかったか」"
translation = "「음? 잘 안 들렸나」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もう一度言おう。我が呼び方についてだが、親しみを込めて……」"
translation = "「다시 말하지. 나를 부르는 호칭에 대해서다만, 친근함을 담아……」"

[[dialogue]]
speaker = "unk"
original = "何故にアルモたん！？"
translation = "왜 알모탄이야!?"

[[dialogue]]
speaker = "unk"
original = "いやいやいや、聞こえてましたから！"
translation = "아니아니아니, 들었거든요!"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我が名──アルモタヘルは、どうやら皆、覚え難いようでな……。学園の子らがよく言い間違うのだ」"
translation = "「내 이름──아르모타헬은 아무래도 다들 외우기 어려운 모양이라서 말이지……. 학원 아이들이 자주 틀리더군」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我は名前の間違いなど気にしないのだが、その場に居合わせた錬金術の子が、良き提案をしてくれた」"
translation = "「나는 이름이 틀리는 것 따위 신경 쓰지 않지만, 그 자리에 있던 연금술 아이가 좋은 제안을 해주었다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「『アルモたん』という愛称で呼んで貰うようにすれば、本名もきっと間違えずに覚えてくれるはずだ、と」"
translation = "「『알모탄』이라는 애칭으로 부르게 하면, 본명도 분명 틀리지 않고 기억해 줄 것이라고」"

[[dialogue]]
speaker = "unk"
original = "元凶はアニマ先輩か……"
translation = "원흉은 아니마 선배인가……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「守護天使様に何とんでもない愛称付けてるんですか、あの人。頭おかしいんじゃないですか？」"
translation = "「수호천사 님한테 무슨 말도 안 되는 애칭을 붙이는 거예요, 그 사람. 머리가 어떻게 된 거 아니에요?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「やはり天才かと、我は感心したぞ？\u3000親しみやすく、良き名だ。我は気に入っている」"
translation = "「역시 천재인가 하고 나는 감탄했다고? 친근하고 좋은 이름이다. 나는 마음에 들어」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「人の子らは仲間に対し、親しみを込めて愛称で呼ぶことがあると聞く。故に、我のことも『アルモたん』で構わぬ」"
translation = "「사람의 아이들은 동료에게 친근함을 담아 애칭으로 부르는 경우가 있다고 들었다. 그러니 나도 『알모탄』이라 불러도 상관없다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「守護天使様相手に、その呼び方はさすがに……って、会長？」"
translation = "「수호천사 님을 상대로 그 호칭은 아무래도…… 어라, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "……アルモたん！"
translation = "……알모탄!"

[[dialogue]]
speaker = "unk"
original = "貴女がそう望むなら、呼ばせてもらいます。"
translation = "당신이 그렇게 원하신다면 그렇게 부르겠습니다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「えぇぇぇぇ……！？」"
translation = "「에에에에……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、正気に戻って。守護天使様ですよ、守護天使様っ。天界では女神様に次ぐ存在で、リクリエという緊急事態でなければ私たちが声をかけられるような方ではないんです！」"
translation = "「회장님, 제정신 차리세요. 수호천사 님이라고요, 수호천사 님. 천계에서는 여신님 다음가는 존재로, 리크리에라는 긴급 사태가 아니면 우리가 말을 걸 수도 없는 분이란 말이에요!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おお……おぉ！\u3000我は喜ばしい。そう呼んでくれたのはお前が初だ、人の子よ！」"
translation = "「오오…… 오! 나는 기쁘구나. 그렇게 불러준 건 네가 처음이다, 사람의 아이여!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そうでしょうとも……！」"
translation = "「그야 그렇겠죠……!」"

[[dialogue]]
speaker = "unk"
original = "あ、やっぱり皆、呼べなかったんだ"
translation = "아, 역시 다들 못 불렀던 거구나"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「人の子よ。お前の名も、我に教えるがよい」"
translation = "「사람의 아이여. 너의 이름도 내게 가르쳐 주거라」"

[[dialogue]]
speaker = "unk"
original = "……緋宮クロトだ"
translation = "……히노미야 쿠로토다"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「うむ、良き名だ。我が記憶に焼き付けよう」"
translation = "「음, 좋은 이름이군. 내 기억에 새겨두마」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「改めて、これからよろしく頼むぞ」"
translation = "「새삼스럽지만, 앞으로 잘 부탁한다」"

[[dialogue]]
speaker = "unk"
original = "こうして、手を差し出したアルモと握手を交わし、俺たちは心強い仲間を手に入れたのだった。"
translation = "이렇게 손을 내민 알모와 악수를 나누며, 우리들은 든든한 동료를 얻게 된 것이었다."

