[[dialogue]]
speaker = "unk"
original = "第２話,熱愛発覚！？,P"
translation = "제2화, 열애 발각!?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えええぇぇっ！？\u3000ま、舞亜ちゃんに熱愛疑惑！？」"
translation = "「에에에에엑!? 마, 마이아짱에게 열애 의혹!?」"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。ＤＩＳＣでニュースを見ていたマトイが驚きの声を上げた。"
translation = "어느 날 방과 후. DISC로 뉴스를 보고 있던 마토이가 놀란 목소리를 냈다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まさか舞亜ちゃんに彼氏なんて──ああでも舞亜ちゃんだって学生なんだし、恋愛に興味あってもおかしくないよね……？」"
translation = "「설마 마이아짱에게 남자친구라니── 아아 하지만 마이아짱도 학생이고, 연애에 관심 있어도 이상할 건 없지……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だけど舞亜ちゃんはスケート一筋ってイメージだったから意外というか、差し出がましいけど競技に影響が出ないといいんだけど……」"
translation = "「하지만 마이아짱은 스케이트 일편단심이라는 이미지였으니까 의외랄까, 참견일지도 모르지만 경기에 영향이 없으면 좋겠는데……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「相手は誰なんだろ……？\u3000ああいや、熱愛が本当だって決まったわけじゃないし……」"
translation = "「상대는 누구일까……? 아아 아니, 열애가 진짜라고 정해진 건 아니니까……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれ、どうして会長も引きつった顔してるの？\u3000あ、会長もショックなんだよね！？\u3000そうなんだよね！？」"
translation = "「어라, 왜 회장도 얼굴이 굳어 있어? 아, 회장도 쇼크인 거지!? 그런 거지!?」"

[[dialogue]]
speaker = "unk"
original = "ま、まぁ、そうかな……"
translation = "뭐, 뭐어, 그렇지……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うんうん、わかるわかる。舞亜ちゃん、全然噂とかなかったからビックリだよねー」"
translation = "「응응, 이해해 이해해. 마이아짱, 전혀 소문 같은 게 없었으니까 깜짝 놀랐지-」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今日は星徒会ないから、じゃ、また明日ね」"
translation = "「오늘은 성도회 없으니까, 자, 내일 봐」"

[[dialogue]]
speaker = "unk"
original = "マトイと別れて、俺は真っ直ぐ帰宅──ではなく街へ繰り出す。"
translation = "마토이와 헤어지고, 나는 곧장 귀가──가 아니라 거리로 나선다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あ、お迎えありがとー」"
translation = "「아, 마중 나와줘서 고마워-」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「今日は何の用事って？\u3000この近くのスタジオで、スポーツ番組のインタビュー受けてたんだ。星騎士になったこととか、いろいろ話したよ」"
translation = "「오늘은 무슨 일이냐고? 이 근처 스튜디오에서 스포츠 프로그램 인터뷰를 받았어. 성기사가 된 일이라든가, 여러 가지 이야기했어」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「今日はこの後オフだし、この辺ブラブラしよっか。あ、そうだ、会長さんのおうちに行ってもいい？」"
translation = "「오늘은 이 뒤로 쉬니까, 이 근처 좀 돌아다닐까. 아, 맞다, 회장님 집에 가도 돼?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……大丈夫？\u3000じゃあお邪魔するね」"
translation = "「……괜찮아? 그럼 실례할게」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それじゃ……手、繋ごっか？」"
translation = "「그럼…… 손, 잡을까?」"

[[dialogue]]
speaker = "unk"
original = "こんなところで手を繋いで大丈夫？"
translation = "이런 곳에서 손을 잡아도 괜찮아?"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、大丈夫。だって私たち、恋人でしょ？」"
translation = "「응, 괜찮아. 왜냐면 우리, 연인이잖아?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「今までなんとなく隠してたけど、別に悪いことしてるわけじゃないから。もちろん会長さんが迷惑ならやめるけど……」"
translation = "「지금까지 왠지 모르게 숨겨왔지만, 딱히 나쁜 짓을 하는 건 아니니까. 물론 회장님이 곤란하다면 그만두겠지만……」"

[[dialogue]]
speaker = "unk"
original = "俺も堂々としていたい"
translation = "나도 당당하고 싶어"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……そっか。うん、ありがと」"
translation = "「……그렇구나. 응, 고마워」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「じゃあお手を失礼。ふふ、ここならたくさんの人に見られちゃうし、もう言い逃れできないね」"
translation = "「그럼 손 좀 빌릴게. 후후, 여기라면 많은 사람들에게 보여버릴 테고, 이제 발뺌할 수 없겠네」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「他に誰もいない時は手を繋いでたけど……こうして堂々としてると、晴れ晴れするっていうか、スカッとするね」"
translation = "「다른 아무도 없을 때는 손을 잡았었지만…… 이렇게 당당하게 있으니까, 속이 시원하달까, 상쾌하네」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ちなみに会長さん、今日の晩ご飯は？\u3000……今夜は母さんがいないから未定？\u3000じゃあ私が作ってあげるね」"
translation = "「참고로 회장님, 오늘 저녁밥은? ……오늘 밤은 어머니가 안 계셔서 미정? 그럼 내가 만들어 줄게」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ん？\u3000何驚いてるの？\u3000私、料理できるんだよ」"
translation = "「응? 왜 놀라? 나, 요리할 줄 알아」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「実はサボテンもステーキにするために育てて……って、冗談冗談。うちのポチとタマはかわいい家族なんだから、食べたら怒るからね」"
translation = "「사실 선인장도 스테이크로 만들기 위해 키우고……는, 농담 농담. 우리 포치랑 타마는 귀여운 가족이니까, 먹으면 화낼 거라구」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「食事は自分で管理できるようにしておけ、って母さんに言われてて、一通り料理は教えてもらってるんだ。アスリート向けのレシピも一緒にね」"
translation = "「식사는 스스로 관리할 수 있게 해두라고 엄마가 말씀하셔서, 웬만한 요리는 다 배웠어. 운동선수용 레시피도 함께 말이야」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「じゃ、一緒に買い物しよ♪」"
translation = "「자, 같이 장보자♪」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「トマトと、玉ねぎと、セロリと……あと卵と……うん、買いたいものは揃ったかな」"
translation = "「토마토랑, 양파랑, 셀러리랑…… 그리고 계란이랑…… 응, 사고 싶은 건 다 모였나」"

[[dialogue]]
speaker = "unk"
original = "一緒に買い物してると夫婦みたいだ"
translation = "같이 장을 보고 있으니 부부 같아"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「恋人通り越して夫婦かぁ……そう言われると照れちゃうなぁ。これから一緒にご飯食べるんだから、ますます家族みたいだね」"
translation = "「연인을 넘어서 부부라니…… 그렇게 들으니 쑥스럽네. 이제부터 같이 밥 먹을 거니까, 점점 가족 같아지겠네」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それじゃ、そろそろ会長さんのおうちに行こっか。私の特別メニューでもっとメロメロにしてあげちゃうよ？」"
translation = "「그럼, 슬슬 회장님 집으로 갈까. 나의 특별 메뉴로 좀 더 헤롱헤롱하게 만들어 줄게?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ま、ま……舞亜ちゃん！？\u3000──と、会長！？」"
translation = "「마, 마…… 마이아짱!? ──이랑, 회장!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どど、どうして会長と舞亜ちゃんが一緒にいるの！？」"
translation = "「어어, 어째서 회장이랑 마이아짱이 같이 있는 거야!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「こんにちは。ええと、確か……新星の星徒会の人だよね」"
translation = "「안녕하세요. 에또, 분명…… 신성의 성도회 사람이었지」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ここ、こんにちは！？\u3000はわわわわ……ま、まさか舞亜ちゃんと直接お話できるなんて……！？」"
translation = "「아, 안녕하세요!? 하와와와와…… 마, 설마 마이아짱이랑 직접 이야기할 수 있다니……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「って、そうじゃなくて！\u3000会長と舞亜ちゃんが一緒にいて、しかも手を繋いでいるということは──」"
translation = "「그, 그게 아니라! 회장이랑 마이아짱이 같이 있고, 게다가 손을 잡고 있다는 건──」"

[[dialogue]]
speaker = "unk"
original = "俺が舞亜の恋人なんだ"
translation = "내가 마이아의 연인이야"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えええ～～～～～～～っ！！？」"
translation = "「에에에~~~~~~~~~~~~~~~~엑!!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん。まぁ、そういうこと」"
translation = "「응. 뭐, 그렇게 됐어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「い、言っちゃって良かったの！？\u3000秘密じゃなかったの！？」"
translation = "「마, 말해버려도 괜찮은 거야!? 비밀 아니었어!?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「大丈夫。実は今日のインタビューで、例の噂について聞かれたから、彼氏がいるって正直に答えちゃった」"
translation = "「괜찮아. 사실 오늘 인터뷰에서 그 소문에 대해 질문받아서, 남자친구가 있다고 솔직하게 대답해 버렸거든」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そうなんだ……！\u3000あのニュースは本当だったんだね……」"
translation = "「그, 그렇구나……! 그 뉴스는 진짜였구나……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でもホッとした。正直、だらしない男の人が相手だったらと思って心配だったけど、会長なら安心だよ」"
translation = "「하지만 안심했어. 솔직히, 형편없는 남자가 상대라면 어쩌나 걱정했는데, 회장이라면 안심이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それなら会長が教えてくれてもよかったのに……と思わなくもないけどね」"
translation = "「그렇다면 회장이 가르쳐 줬어도 됐을 텐데…… 하는 생각이 안 드는 건 아니지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "それについてはごめん"
translation = "그건 미안해"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「これからは周りを気にせず見せつけていくけど、ちゃんとスケートもするから。応援よろしくね？」"
translation = "「이제부터는 주변 신경 안 쓰고 과시해 나갈 거지만, 스케이트도 제대로 할 거니까. 응원 부탁해?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もちろん！\u3000舞亜ちゃんが幸せならオッケー！\u3000だよ！」"
translation = "「물론이지! 마이아짱이 행복하다면 오케이! 야!」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ありがと。それじゃ──」"
translation = "「고마워. 그럼──」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんに、ぎゅ～っと♪\u3000今まで隠してた分もイチャイチャしちゃうからね♪」"
translation = "「회장님에게, 꼬옥♪ 지금까지 숨겼던 만큼 꽁냥거려 줄 거니까♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「舞亜ちゃんってば大胆……！？」"
translation = "「마이아짱도 참 대담해……!?」"

[[dialogue]]
speaker = "unk"
original = "マトイの前で照れくささがあるものの、舞亜の体温と柔らかさにドキドキしてしまうのだった。"
translation = "마토이 앞에서 쑥스러움이 있으면서도, 마이아의 체온과 부드러움에 두근거려 버리는 것이었다."

