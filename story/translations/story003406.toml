[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あの～、これはどういうことでしょう……？」"
translation = "「저기~, 이건 어떻게 된 일일까요……?」"

[[dialogue]]
speaker_original = "赤ちゃんクマロボＡ"
speaker_translation = "아기 곰 로봇 A"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부ー<emoji=heart04>」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「どういうこと、なんですかね……？」"
translation = "「어떻게 된 일, 인 걸까요……?」"

[[dialogue]]
speaker_original = "赤ちゃんクマロボＢ"
speaker_translation = "아기 곰 로봇 B"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부ー<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくにもさっぱりわからないよ」"
translation = "「나도 전혀 모르겠어」"

[[dialogue]]
speaker_original = "赤ちゃんクマロボＣ"
speaker_translation = "아기 곰 로봇 C"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부ー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうして３匹に増えてるの？"
translation = "어째서 세 마리로 늘어난 거야?"

[[dialogue]]
speaker = "unk"
original = "赤ちゃんクマロボが何故か２匹に増えたその翌日の朝。"
translation = "아기 곰 로봇이 왠지 두 마리로 늘어난 그 이튿날 아침."

[[dialogue]]
speaker = "unk"
original = "いつもの面々で星徒会室に集合すると、ルリエル、ステラ、ラファエロの３人は、１人１匹ずつ赤ちゃんクマロボを抱きかかえていた。"
translation = "평소의 면면이 성도회실에 집합하자 루리엘, 스텔라, 라파엘로 세 사람은 한 사람당 한 마리씩 아기 곰 로봇을 껴안고 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「まあでも、この子たちが増えてくれたおかげで、１人に１匹、一家に１台、赤ちゃんの取り合いになる心配はなくなったのです♪」"
translation = "「뭐 하지만 이 아이들이 늘어나 준 덕분에 1인 1마리, 1가구 1대, 아기를 두고 싸울 걱정은 없어진 거예요♪」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、それを考えたら、むしろありがたい気もしますねっ」"
translation = "「그, 그걸 생각하면 오히려 고마운 기분도 드네요」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくたちの願いに、この子が応えてくれたってことかな？」"
translation = "「우리들의 소원에 이 아이가 응답해 준 걸까?」"

[[dialogue]]
speaker = "unk"
original = "さすがにおかしい！！！"
translation = "아무리 봐도 이상해!!!"

[[dialogue]]
speaker = "unk"
original = "いや、待って！！"
translation = "아니, 잠깐 기다려!!"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はっ！？」"
translation = "「핫!?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「そ、そうだね……危うく流されるところだったよ」"
translation = "「그, 그러게…… 하마터면 휩쓸릴 뻔했어」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「どう考えてもおかしいのに、問題ないみたいな気分になっちゃってました……」"
translation = "「아무리 생각해도 이상한데 문제없다는 기분이 되어버렸어요……」"

[[dialogue]]
speaker = "unk"
original = "赤ちゃんクマロボを可愛いと思い、お世話したくなるという気持ちを持つことは不思議ではない。"
translation = "아기 곰 로봇을 귀엽다고 생각하고 돌보고 싶어 하는 마음을 갖는 것은 이상하지 않다."

[[dialogue]]
speaker = "unk"
original = "けれど父親捜しについていったフィオナも含め、３人のそれはあまりにも過剰なもののように思えた。"
translation = "하지만 아버지 찾기를 따라간 피오나를 포함해 세 사람의 그것은 너무나도 과도한 것처럼 느껴졌다."

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「か、会長さん……もしかして、この子が犯人だと思ってるんですか？」"
translation = "「회, 회장님…… 혹시 이 아이가 범인이라고 생각하시는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "可能性はあると思ってる"
translation = "가능성이 있다고 생각해"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん！\u3000ＤＩＳＣを開いたら、物凄い量の通知が来ているのです！」"
translation = "「회장님! DISC를 열었더니 엄청난 양의 알림이 오고 있어요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「学園の掲示板を通知登録していたのですが、今日になってから『物が消える』事件の報告が、さらに急増しているようなのです！」"
translation = "「학원 게시판을 알림 등록해 뒀는데 오늘 들어서 『물건이 사라지는』 사건 보고가 더욱 급증하고 있는 모양이에요!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「赤ちゃんクマロボが３匹に増えたから、事件の数も３倍になったとでもいうのかい？」"
translation = "「아기 곰 로봇이 세 마리로 늘어났으니까 사건 수도 세 배가 됐다는 소리일까?」"

[[dialogue]]
speaker = "unk"
original = "書き込み量的には３倍くらいになってる"
translation = "올라오는 글 양으로는 세 배 정도 되고 있어"

[[dialogue]]
speaker = "unk"
original = "大げさじゃないかも"
translation = "과장이 아닐지도 몰라"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもでも、今この瞬間にも事件の報告は、どんどん増えていってるのですよ～！？」"
translation = "「그치만 그치만, 지금 이 순간에도 사건 보고는 점점 늘어나고 있다고요~!?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「わわっ！\u3000この穴は……」"
translation = "「와왓! 이 구멍은……」"

[[dialogue]]
speaker = "unk"
original = "黒ベア子か！？"
translation = "흑베아코냐!?"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「そんな大声で呼ばなくても黒ベア子だくま」"
translation = "「그렇게 큰 소리로 안 불러도 흑베아코다곰」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちょっとあなた、これはどういうことなのですか！」"
translation = "「잠깐 당신, 이건 어떻게 된 일인가요!」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「あらら？\u3000この世界でも何か問題が起きちゃってるくま？」"
translation = "「어라라? 이 세계에서도 뭔가 문제가 생겨버렸냐곰?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ということは、別の世界でも問題が起こっているということかな？」"
translation = "「그렇다는 건 다른 세계에서도 문제가 일어나고 있다는 뜻일까?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「そうくま！\u3000問題起きまくりくま！\u3000おかげであちこちの世界を飛び回らなきゃいけなくなってるくま！」"
translation = "「그렇다곰! 문제투성이다곰! 덕분에 여기저기 세계를 날아다녀야 하게 됐다곰!」"

[[dialogue]]
speaker = "unk"
original = "とりあえず何が起きてるのか教えてくれ"
translation = "일단 무슨 일이 일어나고 있는 건지 알려줘"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「わかったくま、まず最初に赤ちゃんクマロボのことくま」"
translation = "「알았다곰, 우선 제일 먼저 아기 곰 로봇에 대한 거다곰」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「わたしたちは赤ちゃんクマロボのパパを捜して、色んな世界を旅していたくま」"
translation = "「우리들은 아기 곰 로봇의 아빠를 찾아서 여러 세계를 여행하고 있었다곰」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「でも、違ったんだくま。赤ちゃんクマロボにパパなんて、最初からいなかったんだくま！」"
translation = "「하지만 틀렸다곰. 아기 곰 로봇에게 아빠 같은 건 처음부터 없었다곰!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えっ？\u3000そうだったのですか！？」"
translation = "「엣? 그랬던 건가요!?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「そうくま！\u3000赤ちゃんクマロボの正体は、クマロボが赤ちゃんの姿に変化したものくま」"
translation = "「그렇다곰! 아기 곰 로봇의 정체는 곰 로봇이 아기의 모습으로 변화한 거다곰」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「召喚したクマロボたちがいなくなるから変だと思ってたくま。そしたらクマロボが赤ちゃんクマロボに変化してることがわかったんだくま」"
translation = "「소환한 곰 로봇들이 없어지니까 이상하다고 생각했다곰. 그랬더니 곰 로봇이 아기 곰 로봇으로 변화하고 있다는 걸 알게 됐다곰」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「しかも、ただ変化するだけじゃないくま。赤ちゃんになったクマロボは、恐ろしい力を使っていろんな騒ぎを起こし始めたくま」"
translation = "「게다가 그냥 변화하는 것만이 아니다곰. 아기가 된 곰 로봇은 무시무시한 힘을 사용해서 여러 소동을 일으키기 시작했다곰」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、その恐ろしい力というのは何なんでしょうか……？」"
translation = "「그, 그 무시무시한 힘이라는 건 뭔가요……?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ラブリーな姿で相手を『魅了』してしまうくま。その術中にはまった者は、赤ちゃんクマロボを可愛がりたくなったり、お世話したくなったりするくま」"
translation = "「러블리한 모습으로 상대를 『매료』해버린다곰. 그 술수에 빠진 자는 아기 곰 로봇을 귀여워하고 싶어지거나 돌보고 싶어지게 된다곰」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんの言ってた通りなのです……！」"
translation = "「회장님이 말씀하신 대로예요……!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「でもそれほど恐ろしい力、というわけでもないような……」"
translation = "「하지만 그렇게 무시무시한 힘이라는 느낌은 안 드는 것 같은……」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「とんでもないくま！\u3000エスカレートすると赤ちゃんクマロボを巡って大戦争が起こってしまうくま！\u3000早く何とかしないとまずいくま！」"
translation = "「천만의 말씀이다곰! 에스컬레이트하면 아기 곰 로봇을 둘러싸고 대전쟁이 일어나버린다곰! 빨리 어떻게든 하지 않으면 큰일이다곰!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「とっても物騒な能力なのですぅ！？」"
translation = "「엄청나게 흉흉한 능력인데요!?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「だからこっちの世界でも、赤ちゃんクマロボを捕まえといて欲しいくま！」"
translation = "「그러니까 이쪽 세계에서도 아기 곰 로봇을 붙잡아뒀으면 좋겠다곰!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ああ、心配しなくても、あの子たちのことはちゃんと世話をしているから大丈夫だよ……って、あれ？」"
translation = "「아아, 걱정하지 마. 그 아이들은 제대로 돌보고 있으니까 괜찮아…… 어라?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「赤ちゃんクマロボさんがいません！」"
translation = "「아기 곰 로봇 씨가 없어요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ええっ！？\u3000さっきまで抱っこしてたはずなのに！」"
translation = "「에엣!? 아까 전까지 안고 있었을 텐데!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「正体がバレてしまったから、逃げ出したのかもしれないね」"
translation = "「정체가 들통나버려서 도망친 걸지도 모르겠네」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「急いで捕まえるくま！\u3000わたしはこのことを他の世界にも伝えに行かなきゃいけないくま！\u3000だから後は頼んだくま！」"
translation = "「서둘러서 잡는 거다곰! 나는 이 사실을 다른 세계에도 전하러 가야 한다곰! 그러니까 나머지는 부탁한다곰!」"

[[dialogue]]
speaker = "unk"
original = "なっ！？\u3000ちょっと待て！"
translation = "뭐!? 잠깐 기다려!"

[[dialogue]]
speaker = "unk"
original = "またしても止める間もなく、黒ベア子は黒い穴の中に消えて行ってしまう。"
translation = "이번에도 말릴 새도 없이 흑베아코는 검은 구멍 속으로 사라져 버린다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「結局、ルリエルたちに丸投げして行ってしまったのです！」"
translation = "「결국 루리엘 일행에게 떠넘기고 가버렸어요!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「でも放置しておくわけにはいかないだろう？\u3000騒ぎを起こす前に捕まえた方がいい」"
translation = "「하지만 방치해 둘 수는 없잖아? 소동을 일으키기 전에 잡는 게 좋아」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「でも、どこを捜しに行けばいいんでしょうか？」"
translation = "「하지만 어디를 찾으러 가야 할까요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「片っ端から捜して回るしかないですね……行きましょう！」"
translation = "「닥치는 대로 찾아다닐 수밖에 없겠네요…… 가요!」"

