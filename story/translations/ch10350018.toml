[[dialogue]]
speaker = "unk"
original = "夜も更けて静かな、ある日の新星学園星徒会室。扉には鍵をかけて、中には俺とセナリィの２人きりだ。"
translation = "밤도 깊어 고요한 어느 날의 신성학원 성도회실. 문에는 자물쇠를 채우고 안에는 나와 세나리 둘뿐이다."

[[dialogue]]
speaker = "unk"
original = "セナリィの<b>恋愛パートナー</b>になってから、半年が経ち、今日ついにその時を迎えようとしていた――"
translation = "세나리의 <b>연애</b> <b>파트너</b>가 된 지 반년이 지났고, 오늘 드디어 그날을 맞이하려 하고 있었다――"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様。私と恋愛パートナーの契約を結んだ時のことを、覚えていますかしら？」"
translation = "「회장님. 저와 연애 파트너 계약을 맺었을 때를 기억하시나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「私にとって恋愛とは、ビジネスと同じく信頼関係を積み重ねていくことだと思っておりますの」"
translation = "「저에게 연애란 비즈니스와 마찬가지로 신뢰 관계를 쌓아가는 것이라고 생각하고 있어요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「故に、あなたと契約書を交わして、恋愛パートナーになったのですわ。そして、今日でちょうど半年が経ちます」"
translation = "「고로 당신과 계약서를 주고받고 연애 파트너가 된 것이죠. 그리고 오늘로 딱 반년이 지났습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「なので契約通り、恋愛の次の段階に進もうと思いますの。つまり、今日からはセ……んんっ！」"
translation = "「그래서 계약대로 연애의 다음 단계로 나아가려고 해요. 즉, 오늘부터는 세…… 흠흠!」"

[[dialogue]]
speaker = "セナリィ"
original = "「えぇっと……今日からは性交渉も行い、肉体的な信頼関係も築いて行こうと思いますわ。……準備はよろしいですわね？」"
translation = "「에또…… 오늘부터는 성교섭도 행하여 육체적인 신뢰 관계도 쌓아가려고 합니다. ……준비는 되셨겠죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「何も心配する必要はありませんわ。これまで言ってきた通り、私は男性経験も豊富ですので！」"
translation = "「아무것도 걱정하실 필요 없어요. 지금까지 말해왔듯이 저는 남성 경험도 풍부하니까요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「お任せいただければ、会長様の童貞卒業を最高の形でプロデュース致しますわ」"
translation = "「맡겨주신다면 회장님의 동정 졸업을 최고의 형태로 프로듀스해 드릴게요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「その為の秘密兵器がこれ……特別性のローションですの！」"
translation = "「그걸 위한 비밀 병기가 이것…… 특별제 로션이에요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふ……これさえあれば、痛みとは無縁。たとえ性交渉が初めてであっても、問題なく気持ちよくなれるはずですわ♪」"
translation = "「후후…… 이것만 있으면 통증과는 무관. 설령 성교섭이 처음이라 해도 문제없이 기분 좋아질 수 있을 거예요♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「え……？\u3000男は初めてでも痛くない？\u3000も、もちろん存じておりますわ！\u3000そうは言っても相手は童貞！\u3000準備は入念に越したことはありませんの」"
translation = "「에……? 남자는 처음이라도 안 아프다구요? 무, 물론 알고 있어요! 그렇다 해도 상대는 동정! 준비는 철저히 해서 나쁠 거 없으니까요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「それでは会長様は裸になって、ソファーでくつろいで下さいな。……ええ、もちろん私がリード致しますわ」"
translation = "「그럼 회장님은 옷을 벗고 소파에서 편히 쉬어주세요. ……네, 물론 제가 리드할게요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「私は経験豊富なのですから、当然でしょう？\u3000これくらい戦場で撃ち合うことに比べれば、どうってことありませんわっ。ええ、そうですとも！」"
translation = "「저는 경험이 풍부하니까 당연하겠죠? 이 정도 전장에서 총질하는 거에 비하면 아무것도 아니에요. 네, 그렇고말고요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「こ、これが会長様の……想像していたより……ごくり……大きいですわ……」"
translation = "「이, 이것이 회장님의…… 상상했던 것보다…… 꿀꺽…… 커요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「ああいえ、ほかの男性と比べて、ということですわよ！？\u3000十分に立派なおち○ちんだと思いますわっ」"
translation = "「아아 아니요, 다른 남성에 비해서 그렇다는 말이에요!? 충분히 훌륭한 자지라고 생각해요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「と、とにかくこのまま、ローションを塗り広げていきますわね――」"
translation = "「어, 어쨌든 이대로 로션을 펴 발라 갈게요――」"

[[dialogue]]
speaker = "セナリィ"
original = "「んっ<emoji=heart04>\u3000おち○ちん熱い……！\u3000はあぁ……<emoji=heart04>\u3000触っていると、どんどん固く……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 자지가 뜨거워……! 하아……<emoji=heart04> 만지고 있으니 점점 딱딱하게……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「もしかして会長様、気持ちいいんですの？\u3000ああ、すごい……まだ大きくなりますわ……<emoji=heart04>」"
translation = "「혹시 회장님, 기분 좋으신가요? 아아, 대단해…… 아직 더 커지네요……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ドクンドクンって脈打って……んっ<emoji=heart04>\u3000濃いオス臭がしますわ……<emoji=heart04>\u3000ふわぁぁ……<emoji=heart04>」"
translation = "「두근두근하고 맥동하며…… 응읏<emoji=heart04> 진한 수컷 냄새가 나요……<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はあぁ……<emoji=heart04>\u3000先っぽの方から、カウパーが……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000匂いを嗅いでいると、私も……」"
translation = "「하아……<emoji=heart04> 끝부분에서 쿠퍼액이……<emoji=heart04> 후우……<emoji=heart04> 냄새를 맡고 있으니 저도……」"

[[dialogue]]
speaker = "セナリィ"
original = "「あっ、いえ、な、何でもないですわっ。私のテクニックで、順調に濡れてきてますわねっ……んんっ<emoji=heart04>」"
translation = "「앗, 아니요, 아, 아무것도 아니에요. 제 테크닉으로 순조롭게 젖어오고 있네요…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「次は私のおま○こも準備しますわ。おち○ちんはローションでヌルヌルにしましたから、擦りつけて慣らしますわね……んっ<emoji=heart04>」"
translation = "「다음은 제 보지도 준비할게요. 자지는 로션으로 미끌미끌하게 만들었으니까 문질러서 길들일게요…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ひゃんっ<emoji=heart04>\u3000あっ、ち、違いますの<emoji=heart04>\u3000ローションの感触に驚いたとかじゃなく……そう！\u3000会長様のおち○ちんが立派だから、圧倒されてしまったのですわ<emoji=heart04>」"
translation = "「히양<emoji=heart04> 앗, 아, 아니에요<emoji=heart04> 로션의 감촉에 놀랐다거나 그런 게 아니라…… 그래요! 회장님의 자지가 훌륭해서 압도당해 버린 거예요<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はあぁ……<emoji=heart04>\u3000熱くて、固くて、太くて……け、経験豊富な私でなければ、こんな凶悪なおち○ちんの相手は、できなかったでしょう<emoji=heart04>\u3000んっ……ふぅ……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 뜨겁고, 딱딱하고, 굵고…… 겨, 경험 풍부한 제가 아니었다면 이런 흉악한 자지를 상대하는 건 불가능했겠죠<emoji=heart04> 응읏…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁぁ……<emoji=heart04>\u3000ロ、ローションの量が、多すぎましたでしょうか？<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 로, 로션의 양이 너무 많았을까요?<emoji=heart04> 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「下に滴り落ちて、ソファーが濡れてしまってますわ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000決して、私の愛液ではありませんのよ？」"
translation = "「아래로 뚝뚝 떨어져서 소파가 젖어버렸네요<emoji=heart04> 후우읏……<emoji=heart04> 결코 제 애액이 아니랍니다?」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁんっ<emoji=heart04>\u3000クリトリスがおち○ちんと擦れてっ<emoji=heart04>\u3000び、敏感なところ同士ですから、これは不可抗力ですわよね……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んっ……ああっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 클리토리스가 자지랑 문질러져서<emoji=heart04> 예, 예민한 곳끼리니까 이건 불가항력이겠죠……<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 응읏…… 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「……って、ああっ！？\u3000ソファーに垂れたローションで、足が滑っ――」"
translation = "「……랄까, 아앗!? 소파에 떨어진 로션 때문에 발이 미끄러――」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んおお゛ぉぉぉ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「옷<emoji=heart04><emoji=heart04><emoji=heart04> 응오오오오～～～～～～! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「セナリィ！？\u3000だ、大丈夫か！？\u3000セナリィ！」"
translation = "「세나리!? 괴, 괜찮아!? 세나리!」"

[[dialogue]]
speaker = "セナリィ"
original = "（あ、足が滑って……んおぉぉっ<emoji=heart04>\u3000アナルに入って、しまいましたわ！？\u3000お、おぉっ……<emoji=heart04>\u3000ふ、深いぃ……<emoji=heart04>\u3000おほおぉ<emoji=heart04>）"
translation = "(바, 발이 미끄러져서…… 응오오옷<emoji=heart04> 애널에 들어가 버렸어요!? 오, 오옷……<emoji=heart04> 기, 깊어……<emoji=heart04> 오호오<emoji=heart04>)"

[[dialogue]]
speaker = "セナリィ"
original = "（おっ……おぉぉっ<emoji=heart04>\u3000待って待って<emoji=heart04>\u3000痛かったのは一瞬で、おち○ちんの感触が気持ちよくっ<emoji=heart04>\u3000こ、これはローションを塗ったからですの……！？）"
translation = "(옷…… 오오옷<emoji=heart04> 잠깐만 잠깐만<emoji=heart04> 아팠던 건 한순간이고 자지의 감촉이 기분 좋아서<emoji=heart04> 이, 이건 로션을 발랐기 때문인가요……!?)"

[[dialogue]]
speaker = "セナリィ"
original = "「あっ<emoji=heart04>\u3000会長様、抜こうとするのはダメ<emoji=heart04>\u3000ちょっとでも動いたら、おち○ちん擦れて<emoji=heart04>\u3000おっ、おぉうっ<emoji=heart04>\u3000おほっ！？\u3000おっ……おおっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장님, 빼려고 하는 건 안 돼<emoji=heart04> 조금이라도 움직이면 자지가 쓸려서<emoji=heart04> 옷, 오오웃<emoji=heart04> 오홋!? 옷…… 오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んおお゛ぉぉぉ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오～～～～～～! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ほっ<emoji=heart04>\u3000んおお゛……<emoji=heart04>\u3000はっ、はぁ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ほおぉ……<emoji=heart04>」"
translation = "「홋<emoji=heart04> 응오오오……<emoji=heart04> 하아, 하아……<emoji=heart04> 응읏<emoji=heart04> 호오오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はあぁ<emoji=heart04>\u3000……だ、大丈夫ですわ<emoji=heart04>\u3000ほ、ほほほっ、これくらい経験豊富で、慣れてますもの……ふうぅ<emoji=heart04>」"
translation = "「하아<emoji=heart04> ……괘, 괜찮아요<emoji=heart04> 호, 호호호, 이 정도는 경험 풍부해서 익숙하니까요…… 후우<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ちょっとしたトラブルですのよ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000す、すぐに動けますわ……おほおぉっ<emoji=heart04>」"
translation = "「사소한 트러블일 뿐이에요<emoji=heart04> 응응읏<emoji=heart04> 바, 바로 움직일 수 있어요…… 오호오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「い、いえいえ……はぁぁ<emoji=heart04>\u3000これくらい、おま○こでする前の、前戯ですわ……んおぉっ<emoji=heart04>」"
translation = "「아, 아니요 아니요…… 하아아<emoji=heart04> 이 정도는 보지로 하기 전의 전희예요…… 응오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「前戯……はぁっ、はぁっ……ですから……お゛っ<emoji=heart04>\u3000う、動き始め、ますわよ……おっ、おお゛っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「전희…… 하앗, 하앗…… 이니까요…… 오윽<emoji=heart04> 우, 움직이기 시작할게요…… 옷, 오오윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んおぉ゛っ<emoji=heart04>\u3000ほっ……んほぉっ<emoji=heart04>\u3000ふっ……ふぅっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000ほぉっ……んおぉ゛っ<emoji=heart04>」"
translation = "「응오오윽<emoji=heart04> 홋…… 응호옷<emoji=heart04> 훗…… 후웃<emoji=heart04> 오윽<emoji=heart04> 호옷…… 응오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「お尻の穴、熱っ……おっ、おぅっ<emoji=heart04>\u3000ほおぉ゛っ……んっ<emoji=heart04>\u3000んほぉっ<emoji=heart04>」"
translation = "「엉덩이 구멍, 뜨거워…… 옷, 오웃<emoji=heart04> 호오오윽…… 응읏<emoji=heart04> 응호옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "（あ、アナルなんて弄ったこともないのにぃ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000初めてなのにこんな……お尻でなんて<emoji=heart04>）"
translation = "(애, 애널 같은 건 만져본 적도 없는데에<emoji=heart04> 오윽<emoji=heart04> 처음인데 이런…… 엉덩이로 하다니<emoji=heart04>)"

[[dialogue]]
speaker = "セナリィ"
original = "（んお゛ぉっ<emoji=heart04>\u3000でも、気持ちよくて、止まらないぃ<emoji=heart04>\u3000どうして<emoji=heart04>\u3000どうしてなんですのぉ<emoji=heart04>\u3000おほおぉぉっ<emoji=heart04>）"
translation = "(응오오윽<emoji=heart04> 하지만 기분 좋아서 멈추질 않아아<emoji=heart04> 어째서<emoji=heart04> 어째서인 거예요오<emoji=heart04> 오호오오오옷<emoji=heart04>)"

[[dialogue]]
speaker = "セナリィ"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000おっ……ほぉぉっ<emoji=heart04>\u3000んお゛っ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 후우웃<emoji=heart04> 옷…… 호오오옷<emoji=heart04> 응오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はあぁっ……ん゛っ<emoji=heart04>\u3000んお゛ぉっ……ふっ……ふお゛ぉんっ<emoji=heart04>\u3000ほっ、ほお゛ぉっ……おっ<emoji=heart04>\u3000んおお゛ぉんっ<emoji=heart04>」"
translation = "「하아앗…… 응윽<emoji=heart04> 응오오윽…… 훗…… 후오오윽<emoji=heart04> 홋, 호오오윽…… 옷<emoji=heart04> 응오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「飛ばしすぎ？\u3000そ、そんなことは、ないですわ<emoji=heart04>\u3000……おお゛っ<emoji=heart04>\u3000わ、私これが平常運転で……<emoji=heart04>\u3000ああいや、スケベということではなく<emoji=heart04>\u3000ほっ、んおぉ゛んっ<emoji=heart04>」"
translation = "「너무 달린다구요? 그, 그런 거 아니에요<emoji=heart04> ……오오윽<emoji=heart04> 저, 저 이게 평상시 운전이라서……<emoji=heart04> 아아 아니, 야하다는 게 아니라<emoji=heart04> 홋, 응오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふ、普通に大丈夫、ということですわ……<emoji=heart04>\u3000んおぉ゛っ<emoji=heart04>\u3000ローションが効いてるって？\u3000ど、どういうことですの？\u3000……お゛っ<emoji=heart04>\u3000んほぉっ<emoji=heart04>」"
translation = "「보, 보통으로 괜찮다는 뜻이에요……<emoji=heart04> 응오오오윽<emoji=heart04> 로션이 듣고 있다구요? 무, 무슨 소리예요? ……오윽<emoji=heart04> 응호옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「び、媚薬入りじゃないかって……そ、そんなっ<emoji=heart04>\u3000でも……おほぉぉっ<emoji=heart04>」"
translation = "「미, 미약이 들어간 거 아니냐니…… 그, 그럴 리가<emoji=heart04> 하지만…… 오호오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ<emoji=heart04>\u3000おぁっ<emoji=heart04>\u3000このローションは、ネーゼマインが、くれたのですわ<emoji=heart04>\u3000会長様とする時に使えって<emoji=heart04>」"
translation = "「옷<emoji=heart04> 오앗<emoji=heart04> 이 로션은 네제마인이 준 거예요<emoji=heart04> 회장님이랑 할 때 쓰라고<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「それがまさか……気持ちよくなりすぎている、原因だって言うんですの？\u3000んお゛ぉっ<emoji=heart04>」"
translation = "「그게 설마…… 너무 기분 좋아지고 있는 원인이라는 건가요? 응오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「強力な媚薬かも……？\u3000そ、そんな<emoji=heart04>\u3000おっ、おほっ<emoji=heart04>\u3000こんなはずでは……んお゛ぉぉっ<emoji=heart04>」"
translation = "「강력한 미약일지도……? 그, 그럴 수가<emoji=heart04> 옷, 오홋<emoji=heart04> 이럴 리가…… 응오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「だ、ダメ<emoji=heart04>\u3000が、我慢できませんわ<emoji=heart04>\u3000おおおっ<emoji=heart04>\u3000腰が止まらないぃんっ<emoji=heart04>\u3000んおお゛ぉんっ<emoji=heart04>」"
translation = "「안, 안 돼<emoji=heart04> 차, 참을 수 없어요<emoji=heart04> 오오오옷<emoji=heart04> 허리가 멈추질 않아아앗<emoji=heart04> 응오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ど、どうして……おっ、お゛ん<emoji=heart04>\u3000どうして、こうなりますのぉ～っ！？\u3000おっ<emoji=heart04>\u3000ふおぉ゛んっ<emoji=heart04>\u3000私はただ……お゛っ<emoji=heart04>\u3000んお゛ぉっ<emoji=heart04>」"
translation = "「어, 어째서…… 옷, 오윽<emoji=heart04> 어째서 이렇게 되는 거예요오~! ? 옷<emoji=heart04> 후오오오윽<emoji=heart04> 저는 단지…… 오윽<emoji=heart04> 응오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ほおぉっ<emoji=heart04>\u3000ヤベッ<emoji=heart04>\u3000き、きますわ<emoji=heart04>\u3000お、お尻できちゃう<emoji=heart04>\u3000んおおお゛ぉぉぉっ<emoji=heart04>」"
translation = "「호오오옷<emoji=heart04> 위험해<emoji=heart04> 와, 와요<emoji=heart04> 어, 엉덩이로 해버려요<emoji=heart04> 응오오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ、おっ、おっ<emoji=heart04>\u3000イクイクイグ――――――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「옷, 옷, 옷<emoji=heart04> 가요 가요 가아아앗――――! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「っ……おほおお゛ぉぉぉ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 오호오오오오오～～～～～～! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ん゛っ<emoji=heart04>\u3000はあぁ……おぉうっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000イったのにまだ、刺激足りなくて、動いぢゃう<emoji=heart04>\u3000おおっ……んおお゛っ、ほっ、んお゛っ、ほおぉぉっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하아아…… 오오웃<emoji=heart04> 안 돼<emoji=heart04> 갔는데 아직 자극이 부족해서 움직여버려어<emoji=heart04> 오옷…… 응오오윽, 홋, 응오윽, 호오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「あっ<emoji=heart04>\u3000気持ち良くて、腰止まらないのぉ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000んお゛っ<emoji=heart04>\u3000おほぉぉっ<emoji=heart04>\u3000はしたなくてごめんなさいぃ<emoji=heart04>\u3000こんなはずじゃ、なかったんですのぉ<emoji=heart04>\u3000おお゛ぉん<emoji=heart04>」"
translation = "「앗<emoji=heart04> 기분 좋아서 허리가 안 멈춰요오<emoji=heart04> 옷<emoji=heart04> 응오오윽<emoji=heart04> 오호오오옷<emoji=heart04> 천박해서 죄송해요오<emoji=heart04> 이럴 생각은 아니었는데요오<emoji=heart04> 오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「嘘ついてましたのぉ<emoji=heart04>\u3000おっ、お゛っ<emoji=heart04>\u3000本当は私、エッチなことするの、初めてだったんですのぉ<emoji=heart04>\u3000んお゛っ、おほっ<emoji=heart04>\u3000でも恥ずかしくて、正直に言えなくてぇ<emoji=heart04>」"
translation = "「거짓말하고 있었어요오<emoji=heart04> 옷, 오윽<emoji=heart04> 사실 저 야한 짓 하는 거 처음이었어요오<emoji=heart04> 응오오윽, 오홋<emoji=heart04> 하지만 부끄러워서 솔직하게 말 못 해서어<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「騙してごめんなさいぃ<emoji=heart04>\u3000どうかこんな情けない私を、嫌わないでぇ……お゛っ、おっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000んおお゛ぉんっ<emoji=heart04>」"
translation = "「속여서 죄송해요오<emoji=heart04> 부디 이런 한심한 저를 미워하지 말아주세요오…… 오윽, 옷<emoji=heart04> 오홋<emoji=heart04> 응오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふあっ！？\u3000か、会長様、お尻掴んで……お゛っ<emoji=heart04>\u3000んお゛っ<emoji=heart04>\u3000さ、触り方やらし……おほっ<emoji=heart04>\u3000そんな掴んで押しつけるように動かしちゃ、ダメですわ<emoji=heart04>\u3000んほお゛ぉんっ<emoji=heart04>」"
translation = "「후앗!? 회, 회장님, 엉덩이 잡고…… 오윽<emoji=heart04> 응오오윽<emoji=heart04> 마, 만지는 법 야해…… 오홋<emoji=heart04> 그렇게 잡고 밀어붙이듯 움직이면 안 돼요<emoji=heart04> 응호오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「……嫌ったり、しない？\u3000お゛っ、おぅ<emoji=heart04>\u3000ほ、本当に？\u3000んっ<emoji=heart04>\u3000んお゛っ……おっ<emoji=heart04>\u3000おほぉっ<emoji=heart04>」"
translation = "「……미워하거나 하지 않는다구요? 오윽, 오우<emoji=heart04> 저, 정말로요? 응읏<emoji=heart04> 응오오윽…… 옷<emoji=heart04> 오호오옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……セナリィが初めてなのは、本当はわかってた。初めての男になれて嬉しいし、セナリィの乱れた姿を見ると正直……興奮する」"
translation = "「윽…… 세나리가 처음인 건 사실 알고 있었어. 첫 남자가 될 수 있어서 기쁘고, 세나리의 흐트러진 모습을 보면 솔직히…… 흥분돼.」"

[[dialogue]]
speaker = "セナリィ"
original = "「そ、そんな<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000会長様……そんなこと、言われたらぁ<emoji=heart04>\u3000おっ、お゛っ、んお゛おぉんっ<emoji=heart04>」"
translation = "「그, 그럴 수가<emoji=heart04> 오윽<emoji=heart04> 회장님…… 그런 말 들으면어어<emoji=heart04> 옷, 오윽, 응오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「私……私ぃ……お゛っ、おほっ<emoji=heart04>\u3000おっ、お゛っ<emoji=heart04>\u3000おほおぉぉっ<emoji=heart04>」"
translation = "「저…… 저어…… 오윽, 오홋<emoji=heart04> 옷, 오윽<emoji=heart04> 오호오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「き、気持ちいいの<emoji=heart04>\u3000我慢できなく、なってしまいますわ<emoji=heart04>\u3000あああ゛<emoji=heart04>\u3000また、またきてしまいますの<emoji=heart04>」"
translation = "「기, 기분 좋아요<emoji=heart04> 참을 수 없게 되어버려요<emoji=heart04> 아아아아<emoji=heart04> 또, 또 와버려요오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「またイグっ<emoji=heart04>\u3000イキながら、潮吹き……<emoji=heart04>\u3000また出ちゃいますわ<emoji=heart04>\u3000おっおっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000おおおぉぉぉ゛っ<emoji=heart04>」"
translation = "「또 가아앗<emoji=heart04> 가면서 시오후키……<emoji=heart04> 또 나와버려요<emoji=heart04> 옷옷<emoji=heart04> 오윽<emoji=heart04> 오오오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はぁぁぁぁ……<emoji=heart04>\u3000潮吹いてイっちゃいますわぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おほおお゛ぉぉぉ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아……<emoji=heart04> 시오후키 하면서 가버려요오오옷<emoji=heart04><emoji=heart04><emoji=heart04> 오호오오오오오～～～～～～! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「あっはぁぁぁ……<emoji=heart04>\u3000う、嬉しくて、お潮いっぱい、出ちゃってますのぉ……<emoji=heart04>\u3000ほお゛ぉ……<emoji=heart04>」"
translation = "「앗하아아……<emoji=heart04> 기, 기뻐서 물이 잔뜩 나와버렸어요오……<emoji=heart04> 호오오오……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ど、どうやら私……<emoji=heart04>\u3000気持ちよくなると、潮吹いちゃう、体質みたいですわぁ……<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「아, 아무래도 저……<emoji=heart04> 기분 좋아지면 시오후키 해버리는 체질인가 봐요오……<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……セナリィっ！」"
translation = "「윽…… 세나리!」"

[[dialogue]]
speaker = "セナリィ"
original = "「あっ！？\u3000あんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000待って、会長様！\u3000今すごいイってるところですの<emoji=heart04>」"
translation = "「앗!? 앙<emoji=heart04> 후아아앗<emoji=heart04> 기다려요, 회장님! 지금 엄청 가고 있는 중이에요<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ああっ<emoji=heart04>\u3000お尻掴んで、押しつけようとするのダメ<emoji=heart04>\u3000んお゛っ<emoji=heart04>\u3000腰やっと止まったのに、また気持ちよくなっちゃ――」"
translation = "「아앗<emoji=heart04> 엉덩이 잡고 밀어붙이려고 하는 거 안 돼<emoji=heart04> 응오오윽<emoji=heart04> 허리 겨우 멈췄는데 또 기분 좋아져버려――」"

[[dialogue]]
speaker = "セナリィ"
original = "「んおおお゛ぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おひっ<emoji=heart04>\u3000おほおおお゛ぉぉぉ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오오윽<emoji=heart04><emoji=heart04><emoji=heart04> 오힉<emoji=heart04> 오호오오오오오～～～～～～! <emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「気持ちよくて、腰また止まらなく……っ<emoji=heart04>\u3000おっ、おっ、お゛っ、ダメですのっ<emoji=heart04>\u3000おっ、おお゛っ、おほお゛ぉぉぉっ<emoji=heart04>」"
translation = "「기분 좋아서 허리가 또 안 멈춰요…… 윽<emoji=heart04> 옷, 옷, 오윽, 안 돼요오<emoji=heart04> 옷, 오오오윽, 오호오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ピストンする度、お潮吹いちゃいますのぉ<emoji=heart04>\u3000おっ、お゛っ、おひっ<emoji=heart04>\u3000おほっ、んお゛っ、おほお゛ぉんっ<emoji=heart04>」"
translation = "「피스톤 할 때마다 시오후키 해버려요오<emoji=heart04> 옷, 오윽, 오힉<emoji=heart04> 오홋, 응오오윽, 오호오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「お尻気持ちいいぃんっ<emoji=heart04>\u3000おほっ、おっ、おっ、お゛っ<emoji=heart04>\u3000んほぉぉぉっ<emoji=heart04>」"
translation = "「엉덩이 기분 좋아아앗<emoji=heart04> 오홋, 옷, 옷, 오윽<emoji=heart04> 응호오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「あああ゛<emoji=heart04>\u3000ヤベェ～～～っ<emoji=heart04>\u3000おっ、おっ<emoji=heart04>\u3000お゛ぉっ<emoji=heart04>\u3000んお゛……っ<emoji=heart04>」"
translation = "「아아아아<emoji=heart04> 위험해～～～<emoji=heart04> 옷, 옷<emoji=heart04> 오오윽<emoji=heart04> 응오오…… 윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おち○ちん<emoji=heart04>\u3000おち○ちんヤバいですわっ<emoji=heart04>\u3000おっ、おっ、おっ<emoji=heart04>\u3000……お゛んっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000んおぉお゛ぉぉっ<emoji=heart04>」"
translation = "「자지<emoji=heart04> 자지 위험해요오<emoji=heart04> 옷, 옷, 옷<emoji=heart04> ……오윽<emoji=heart04> 오홋<emoji=heart04> 응오오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「お゛ほぉぉぉっ<emoji=heart04>\u3000おっ、おっ、お゛んっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000おっ、おっ、お゛ぉっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おおお゛ぉぉぉ～～～っ<emoji=heart04>」"
translation = "「오호오오오오옷<emoji=heart04> 옷, 옷, 오윽<emoji=heart04> 오윽<emoji=heart04> 옷, 옷, 오오윽<emoji=heart04> 오홋<emoji=heart04> 옷<emoji=heart04> 오오오오오오오～～～윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おくっ<emoji=heart04>\u3000お゛っ、おくっ、気持ぢぃ<emoji=heart04>\u3000イグイグッ<emoji=heart04>\u3000おんっ、お゛んっ<emoji=heart04>\u3000お゛っ、おほぉぉぉっ<emoji=heart04>」"
translation = "「깊숙이<emoji=heart04> 오윽, 깊숙이, 기분 조아아<emoji=heart04> 가요 가요오<emoji=heart04> 응읏, 응윽<emoji=heart04> 오윽, 오호오오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「またイっでるっ<emoji=heart04>\u3000潮吹きながらイっちゃってますのぉ<emoji=heart04>\u3000おっ、お゛っ、おっ、んお゛ぉぉぉっ<emoji=heart04>」"
translation = "「또 가고 이써어<emoji=heart04> 시오후키 하면서 가버리고 있어요오<emoji=heart04> 옷, 오윽, 옷, 응오오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ、お尻気持ちいい<emoji=heart04>\u3000気持ちいいですわぁ<emoji=heart04>\u3000んお゛ぉぉぉっ<emoji=heart04>\u3000初めてなのに、アナル気持ちいいのぉ<emoji=heart04>\u3000おっ、おっ、お゛っ、おほぉぉぉっ<emoji=heart04>」"
translation = "「옷, 엉덩이 기분 좋아<emoji=heart04> 기분 좋아요오<emoji=heart04> 응오오오오오오윽<emoji=heart04> 처음인데 애널 기분 좋아아아<emoji=heart04> 옷, 옷, 오윽, 오호오오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ、おっ<emoji=heart04>\u3000お゛ほっ！？\u3000会長様のおち○ちん、中で膨らんで……おっ、おっ、お゛ん<emoji=heart04>」"
translation = "「옷, 옷<emoji=heart04> 오호옷!? 회장님 자지, 안에서 부풀어서…… 옷, 옷, 오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ま、まさかこれ射精の<emoji=heart04>\u3000……はっ、あああっ<emoji=heart04>\u3000会長様も、限界ですの？\u3000お゛んっ、おほっ、おっ、んおお゛ぉんっ<emoji=heart04>」"
translation = "「서, 설마 이거 사정의<emoji=heart04> ……핫, 아아앗<emoji=heart04> 회장님도 한계인가요? 오윽, 오홋, 옷, 응오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おお゛おっ、ヤベっ<emoji=heart04>\u3000いっぱいイっでるのに゛っ<emoji=heart04>\u3000射精想像したら、興奮じて<emoji=heart04>\u3000すごい絶頂きちゃ<emoji=heart04>\u3000おっ、お゛っ、おっ、お゛んつ<emoji=heart04>"
translation = "「오오오옷, 위험해에<emoji=heart04> 잔뜩 가고 있는데에<emoji=heart04> 사정 상상하니까 흥분돼서어<emoji=heart04> 엄청난 절정이 와버려어<emoji=heart04> 옷, 오윽, 옷, 오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「これ絶対にヤベェ<emoji=heart04>\u3000おっ、おっ、お゛ほぉっ<emoji=heart04>\u3000ヤベェですのぉ<emoji=heart04>\u3000……おっ、おっ、んお゛ぉっ<emoji=heart04>\u3000おほお゛ぉぉんっ<emoji=heart04>」"
translation = "「이거 절대로 위험해에<emoji=heart04> 옷, 옷, 오호오옷<emoji=heart04> 위험해요오오<emoji=heart04> ……옷, 옷, 응오오윽<emoji=heart04> 오호오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おおお゛っ、来る、くるくるくる<emoji=heart04>\u3000すごいアクメくりゅぅ<emoji=heart04>\u3000おっ、おっ、お゛っ<emoji=heart04>\u3000おおお゛ぉぉぉっ<emoji=heart04>」"
translation = "「오오오오윽, 온다, 온다 온다 온다<emoji=heart04> 엄청난 아크메가 와버려어어<emoji=heart04> 옷, 옷, 오윽<emoji=heart04> 오오오오오오오윽<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んお゛おおおっ<emoji=heart04>\u3000きだっ<emoji=heart04>\u3000イっぢゃう<emoji=heart04>\u3000イグイグイグイグイグぅぅぅぅ────っっっ<emoji=heart04>」"
translation = "「응오오오오오오옷<emoji=heart04> 와따아아<emoji=heart04> 가버려어어<emoji=heart04> 가요 가요 가요 가요 가요오오오오오――――! ! ! <emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「っ……イッグぅぅぅぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おほお゛お゛お゛ぉぉぉ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 가아아아아아아아아아아아아아아―――――――――! <emoji=heart04><emoji=heart04><emoji=heart04> 오호오오오오오오오오오오오～～～～～～～～～! <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「はっ……んおおお゛ぉぉぉっ<emoji=heart04><emoji=heart04>\u3000お尻に精子入ってくりゅぅぅぅ<emoji=heart04>\u3000ほおおお゛ぉぉぉ～～～～っ<emoji=heart04>」"
translation = "「하앗…… 응오오오오오오오윽<emoji=heart04><emoji=heart04> 엉덩이에 정액 들어와요오오오오<emoji=heart04> 호오오오오오오오오～～～～옷<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「おっ、お゛ぉっ……<emoji=heart04>\u3000会長様の射精しゅごい<emoji=heart04>\u3000止まらにゃくて、お尻の中でまだ、ドクンドクンって<emoji=heart04>\u3000熱くて、幸せぇ……おほぉ<emoji=heart04>」"
translation = "「옷, 오오윽……<emoji=heart04> 회장님 사정 대단해애<emoji=heart04> 멈추지 않아서 엉덩이 안에서 아직도 두근두근하고오<emoji=heart04> 뜨겁고 행복해애…… 오호오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んあ゛ぁっ……<emoji=heart04>\u3000お、おま○こも……気持ちいい潮吹き、しちゃってますのぉ……<emoji=heart04>\u3000ほおぉぉ<emoji=heart04>」"
translation = "「응아아앗……<emoji=heart04> 보, 보지도…… 기분 좋은 시오후키 해버리고 있어요오……<emoji=heart04> 호오오오오<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「あんっ……<emoji=heart04>\u3000おち○ちん、お尻から抜けちゃいますわぁ<emoji=heart04>\u3000んはあぁ……<emoji=heart04>」"
translation = "「앙……<emoji=heart04> 자지, 엉덩이에서 빠져버려요오……<emoji=heart04> 응하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「んっ……<emoji=heart04>\u3000はぁ……はぁ……初めてのセックス……気持ちよすぎましたわ<emoji=heart04>\u3000お、お尻の方でしたけど……」"
translation = "「응읏……<emoji=heart04> 하아…… 하아…… 첫 섹스…… 너무 기분 좋았어요<emoji=heart04> 어, 엉덩이 쪽이었지만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様はその……私として、気持ちよかったですの？」"
translation = "「회장님은 그…… 저로 해서 기분 좋으셨나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ん……っ<emoji=heart04>\u3000そ、そこで褒めながら、頭撫でるのは反則ですわ<emoji=heart04>\u3000わ、私、変な気持ちになってしまいます……」"
translation = "「응……읏<emoji=heart04> 거기서 칭찬하면서 머리 쓰다듬는 건 반칙이에요<emoji=heart04> 저, 이상한 기분이 되어버려요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「変な気持ちというのは、つまり……私らしくないということですわ。私、形のないものは信じない主義ですのに……」"
translation = "「이상한 기분이라는 건 그러니까…… 저답지 않다는 뜻이에요. 저, 형태 없는 건 믿지 않는 주의인데……」"

[[dialogue]]
speaker = "セナリィ"
original = "「い、今だけは契約のことなんて忘れて、会長様と……単純な恋人になりたいとか、ちょっとだけ……」"
translation = "「지, 지금만큼은 계약 같은 건 잊고 회장님과…… 단순한 연인이 되고 싶다든가, 조금만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「って、わ、笑わないで下さいな！\u3000自分でもわかってますから！」"
translation = "「아니, 우, 웃지 말아 주세요! 저도 알고 있으니까요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「……え？\u3000そもそも単純な恋人でしかない？\u3000それってどういう……」"
translation = "「……에? 애초에 단순한 연인일 뿐이라니? 그게 무슨……」"

[[dialogue]]
speaker = "クロト"
original = "「――俺は、小難しいこと抜きにして、セナリィのこと……好きだよ。セナリィはどう？」"
translation = "「――난 복잡한 거 빼고, 세나리…… 좋아해. 세나리는 어때?」"

[[dialogue]]
speaker = "セナリィ"
original = "「っ……そ、それは……」"
translation = "「윽…… 그, 그건……」"

[[dialogue]]
speaker = "セナリィ"
original = "「嫌でしたら……恋愛パートナーの契約なんて、持ちかけておりませんわ……た、単純に言うなら……」"
translation = "「싫었다면…… 연애 파트너 계약 같은 거 제안하지 않았을 거예요…… 다, 단순하게 말하자면……」"

[[dialogue]]
speaker = "セナリィ"
original = "「私も会長様のこと……好きですわ……」"
translation = "「저도 회장님…… 좋아해요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「あんっ<emoji=heart04>\u3000か、会長様、おち○ちんが、おま○こに当たって……！」"
translation = "「앙<emoji=heart04> 회, 회장님, 자지가 보지에 닿아서……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「――おま○こで、今度は本番をしたい？\u3000ふあぁっ<emoji=heart04>\u3000おち○ちん、あんなに射精したばかりなのに、もう大きく……<emoji=heart04>」"
translation = "「――보지로 이번엔 본방을 하고 싶다구요? 후아앗<emoji=heart04> 자지, 그렇게나 사정한 지 얼마 안 됐는데 벌써 커져서……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「そ、そんなおねだりしながら、先っぽ押しつけちゃダメですわ<emoji=heart04>\u3000おま○こもイキまくって、トロトロにほぐれちゃってるんですから<emoji=heart04>」"
translation = "「그, 그렇게 조르면서 끝부분 밀어붙이면 안 돼요<emoji=heart04> 보지도 계속 가버려서 말랑말랑하게 풀려버렸으니까요<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「い、嫌かどうか聞くなんて、ずるいですわよ<emoji=heart04>\u3000あんな気持ちいいの知ってしまった後で、そんなおねだりの仕方されたら……<emoji=heart04>」"
translation = "「시, 싫은지 어떤지 묻다니 비겁해요<emoji=heart04> 그런 기분 좋은 거 알아버린 뒤에 그렇게 조르면……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「こ、断れるわけありませんわ……あっ――<emoji=heart04>」"
translation = "「거, 거절할 수 있을 리 없잖아요…… 앗――<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふあぁぁっ……<emoji=heart04>\u3000会長様ぁ<emoji=heart04>\u3000あぁぁんっ……<emoji=heart04>」"
translation = "「후아아아앗……<emoji=heart04> 회장님아아<emoji=heart04> 아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たちは余計なことを考えられなくなるくらい、夢中で甘い快楽を貪り合うのだった。"
translation = "그 후, 우리들은 불필요한 생각은 할 수 없게 될 정도로 정신없이 달콤한 쾌락을 탐닉했다."

