[[dialogue]]
speaker = "unk"
original = "第７話,御前試合再び,B"
translation = "제7화, 어전시합 다시 한번"

[[dialogue]]
speaker = "unk"
original = "梨緒と名乗る女性と鮮烈な出会いを果たした翌日。"
translation = "리오라고 자칭한 여성과 강렬한 만남을 가진 다음 날."

[[dialogue]]
speaker = "unk"
original = "俺が御前試合を挑まれたという噂は、瞬く間に新星学園中を駆け抜けていた。"
translation = "내가 어전시합을 도전받았다는 소문은 순식간에 신성학원 전체로 퍼져 나갔다."

[[dialogue]]
speaker = "生徒D"
original = "「ねぇ聞いた！？\u3000謎の転校生が会長に挑戦状を叩きつけたんだって！」"
translation = "「야, 들었어!? 수수께끼의 전학생이 회장님한테 도전장을 내밀었대!」"

[[dialogue]]
speaker = "生徒E"
original = "「でも緋宮会長ってヴィーナス前会長より強いんでしょう？\u3000それにリクリエも阻止したし敵うはずないんじゃ……」"
translation = "「하지만 히노미야 회장은 비너스 전 회장보다 강하잖아? 게다가 리크리에도 저지했고 이길 수 있을 리가……」"

[[dialogue]]
speaker = "生徒F"
original = "「会長の力を知らないはずないし、挑戦者は自信ありってことだろ？\u3000へっ、御前試合楽しみだな！」"
translation = "「회장의 힘을 모를 리가 없고, 도전자는 자신 있다는 거 아냐? 헤헷, 어전시합 기대되네!」"

[[dialogue]]
speaker = "マトイ"
original = "「学園中、御前試合の話で持ち切りだね……」"
translation = "「학원 전체가 어전시합 이야기로 떠들썩하네……」"

[[dialogue]]
speaker = "クロト"
original = "「既視感がすごいな……」"
translation = "「기시감이 엄청나군……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あはは……懐かしいといえば懐かしいね」"
translation = "「아하하…… 그립다면 그립네.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスとの御前試合の時を思い返し、苦笑いを浮かべるマトイと、クラス委員長のミルフィー。"
translation = "비너스와의 어전시합 때를 떠올리며 쓴웃음을 짓는 마토이와, 클래스 위원장인 밀피."

[[dialogue]]
speaker = "unk"
original = "俺が転入した直後、ヴィーナスから御前試合を挑まれた時の学園内の盛り上がりはすごかった。"
translation = "내가 전입한 직후, 비너스에게 어전시합을 도전받았을 때의 학원 내 열기는 대단했다."

[[dialogue]]
speaker = "unk"
original = "なぜか俺がヴィーナスに挑戦したという話になっていて、無茶とか命知らずとか言われたっけ。"
translation = "어째서인지 내가 비너스에게 도전했다는 이야기가 되어 있어서, 무모하다느니 겁도 없다느니 하는 소리를 들었었지."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"
translation = "「당신을 오늘 자로 여기, 신성학원 성도회── 성도회장으로 임명하겠어. 그리고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"
translation = "「히노미야 쿠로토── 당신은 마왕이 되어서, 이 세계를 구하는 거야!」"

[[dialogue]]
speaker = "クロト"
original = "「…………………………え？」"
translation = "「…………………………에?」"

[[dialogue]]
speaker = "unk"
original = "今はヴィーナスの事情を知っているけど、あの時は文字通り言葉を失った。"
translation = "지금은 비너스의 사정을 알고 있지만, 그때는 말 그대로 할 말을 잃었었다."

[[dialogue]]
speaker = "unk"
original = "挑まれたのは同じだが、今回は立場が逆で、俺が会長だ。"
translation = "도전받은 것은 같지만, 이번에는 입장이 반대로 내가 회장이다."

[[dialogue]]
speaker = "unk"
original = "そしてもうひとつ逆なのは──"
translation = "그리고 또 하나 반대인 것은──"

[[dialogue]]
speaker = "梨緒"
original = "「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」"
translation = "「너는 머지않아 악한 마왕으로 타락해, 세계를 멸망시킨다.」"

[[dialogue]]
speaker = "梨緒"
original = "「だからその前に私が君を止める」"
translation = "「그러니 그전에 내가 너를 막겠어.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは、俺が世界を救うと言った。"
translation = "비너스는 내가 세계를 구한다고 말했다."

[[dialogue]]
speaker = "unk"
original = "だが彼女は──梨緒は、俺が世界を滅ぼすと言った。"
translation = "하지만 그녀는── 리오는, 내가 세계를 멸망시킨다고 말했다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが言ったことも最初は信じられなかったけど、梨緒の言葉も信じ難い──"
translation = "비너스가 한 말도 처음에는 믿기지 않았지만, 리오의 말도 믿기 어렵다──"

[[dialogue]]
speaker = "unk"
original = "いや、本当にそうか？"
translation = "아니, 정말 그런가?"

[[dialogue]]
speaker = "unk"
original = "俺の中にはリクリエの力が封じられている。その力が世界に破滅をもたらすかもしれない。"
translation = "내 안에는 리크리에의 힘이 봉인되어 있다. 그 힘이 세계에 파멸을 가져올지도 모른다."

[[dialogue]]
speaker = "unk"
original = "あの時だって俺は……"
translation = "그때만 해도 나는……"

[[dialogue]]
speaker = "マトイ"
original = "「御前試合、受けるの？」"
translation = "「어전시합, 받아들일 거야?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、いや……どうしよう」"
translation = "「아아, 아니…… 어쩌지.」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でも受ける理由はないんじゃない？\u3000ヴィーナスさんの時は負けたら退学だったけど、今は何かが懸かってるわけじゃないし」"
translation = "「하지만 받아들일 이유는 없지 않아? 비너스 씨 때는 지면 퇴학이었지만, 지금은 뭔가가 걸려 있는 것도 아니고.」"

[[dialogue]]
speaker = "クロト"
original = "「それは……そうなんだけど」"
translation = "「그건…… 그렇지만.」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、そろそろ部活行かなきゃ。マトイさんも会長くんも星徒会頑張ってね～」"
translation = "「아, 슬슬 부활동 가야겠다. 마토이 씨도 회장님도 성도회 힘내요~」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、ヒヨにもよろしくな」"
translation = "「그래, 히요에게도 안부 전해줘.」"

[[dialogue]]
speaker = "マトイ"
original = "「委員長、また明日～」"
translation = "「위원장, 내일 봐~」"

[[dialogue]]
speaker = "マトイ"
original = "「じゃ、私たちも星徒会いこっか」"
translation = "「그럼, 우리도 성도회 가볼까.」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ」"
translation = "「……그래.」"

[[dialogue]]
speaker = "unk"
original = "確かに、御前試合を断ることに何のペナルティもないし、勝ったとしても得るものはない。"
translation = "확실히, 어전시합을 거절하는 것에 아무런 페널티도 없고, 이긴다고 해도 얻는 것은 없다."

[[dialogue]]
speaker = "unk"
original = "なのに、堂々と梨緒の挑戦を跳ねのけられない自分がいた。"
translation = "그런데도 당당하게 리오의 도전을 뿌리치지 못하는 내가 있었다."

[[dialogue]]
speaker = "アナ"
original = "「昨日の新種のモンスターですが、あれから発生はなし。怪我を負ったプリマステラも傷は浅く、近く復帰可能だそうです」"
translation = "「어제의 신종 몬스터 말입니다만, 그 후로 발생은 없습니다. 부상을 입은 프리마스텔라도 상처가 얕아 곧 복귀 가능하다고 합니다.」"

[[dialogue]]
speaker = "クロト"
original = "「そうか、報告ありがとう」"
translation = "「그래, 보고 고마워.」"

[[dialogue]]
speaker = "unk"
original = "そう、昨日起きた事件は梨緒の宣戦布告だけではない。"
translation = "그래, 어제 일어난 사건은 리오의 선전포고뿐만이 아니다."

[[dialogue]]
speaker = "クロト"
original = "「モンスターの残骸の解析は進んでる？」"
translation = "「몬스터 잔해 분석은 진행되고 있어?」"

[[dialogue]]
speaker = "アナ"
original = "「やはりガーディアン同様、リクリエの瘴気の影響が見られました」"
translation = "「역시 가디언과 마찬가지로 리크리에의 장기 영향이 보였습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「問題はモンスターの汚染源。あれほど強力なモンスターであれば、影響を与えたリクリエの瘴気も相当な濃度であると考えられます」"
translation = "「문제는 몬스터의 오염원. 그 정도로 강력한 몬스터라면 영향을 준 리크리에의 장기도 상당한 농도일 것으로 생각됩니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アステラに呑み込まれたとか？\u3000モグモグペッ、って吐き出されたんじゃない？」"
translation = "「아스테라에 삼켜졌다거나? 우물우물 퉤, 하고 뱉어진 거 아냐?」"

[[dialogue]]
speaker = "マトイ"
original = "「そんなガムじゃないんだから……」"
translation = "「무슨 껌도 아니고……」"

[[dialogue]]
speaker = "アナ"
original = "「アステラに呑み込まれて変質した……という可能性はあながち否定できません。モンスターにもアステラにも改変効果がありますから」"
translation = "「아스테라에 삼켜져 변질되었다……는 가능성도 아주 부정할 수는 없습니다. 몬스터에게도 아스테라에게도 개변 효과가 있으니까요.」"

[[dialogue]]
speaker = "アナ"
original = "「ですが現在流星市国に発生するアステラは、瘴気の濃度は高くありません。あれほど強力なモンスターが発生するとは考えにくいです」"
translation = "「하지만 현재 유성시국에 발생하는 아스테라는 장기 농도가 높지 않습니다. 그 정도로 강력한 몬스터가 발생한다고는 생각하기 어렵습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「汚染源は別にあるってことか……」"
translation = "「오염원이 따로 있다는 건가……」"

[[dialogue]]
speaker = "unk"
original = "星徒会役員の攻撃すら耐える新種のモンスター。"
translation = "성도회 임원의 공격조차 견뎌내는 신종 몬스터."

[[dialogue]]
speaker = "unk"
original = "もしあれが大挙して押し寄せていたらと思うとぞっとしない。"
translation = "만약 저런 게 대거 몰려왔을 거라고 생각하면 소름이 돋는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「次は最初から全力よ！\u3000仲間なんて増やさせないわ！」"
translation = "「다음은 처음부터 전력이야! 동료 따위 늘리게 두지 않겠어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね～。私たちも精進しないとかしら～」"
translation = "「그렇네요~. 저희도 정진해야겠는걸요~」"

[[dialogue]]
speaker = "アナ"
original = "「対策が必要ですね。シミュレーターへのデータの反映、再度遭遇した時の戦闘プランの策定などしておきます」"
translation = "「대책이 필요하겠네요. 시뮬레이터에 데이터 반영, 다시 조우했을 때의 전투 플랜 책정 등을 해두겠습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ありがとう～。さっすがアナちゃんね～」"
translation = "「고마워요~ 역시 아나짱이네요~」"

[[dialogue]]
speaker = "サーシャ"
original = "「で、会長くん。あの梨緒って子はどうするの～？」"
translation = "「그래서 회장님. 저 리오라는 아이는 어떻게 할 건가요~?」"

[[dialogue]]
speaker = "unk"
original = "梨緒・Ａ・クリステレス。やはりこちらでも話題になった。"
translation = "리오·A·크리스테레스. 역시 이곳에서도 화제가 되었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「突然クロトを攻撃してくるし、何なのよ。しかもいきなり御前試合を挑んでくるなんて非常識ね」"
translation = "「갑자기 쿠로토를 공격해오질 않나, 뭐야 정말. 게다가 뜬금없이 어전시합을 신청하다니 몰상식하네.」"

[[dialogue]]
speaker = "マトイ"
original = "「転入直後の緋宮くんに『御前試合しなさい』って言ったの誰だっけ？」"
translation = "「전입 직후의 히노미야 군에게 『어전시합 하세요』라고 말한 게 누구였더라?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私よ！\u3000でもそれはクロトが魔王に覚醒するために必要なことだったじゃない」"
translation = "「나야! 하지만 그건 쿠로토가 마왕으로 각성하기 위해 필요한 일이었잖아.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だいたい、クロトのこと悪しき魔王とか言い出して、なんなのあの梨緒って子！？\u3000魔王は英雄でしょ！」"
translation = "「애초에 쿠로토를 보고 악한 마왕이라니 어쩌니, 뭐야 저 리오라는 애는!? 마왕은 영웅이라고!」"

[[dialogue]]
speaker = "アナ"
original = "「<ruby>梨緒<rt>りお</rt></ruby>・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレスと言っていました」"
translation = "「리오·<ruby>A<rt>아가사</rt></ruby>·크리스테레스라고 했습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういう意味じゃなくてー！」"
translation = "「그런 의미가 아니야─!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王が悪者っていつの話よ！\u3000魔王は英雄！\u3000この前だって世界を救ったんだから！」"
translation = "「마왕이 악당이라니 언제 적 얘기야! 마왕은 영웅! 얼마 전에도 세계를 구했으니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "「太陽の壁画を信じてるってことかしら～？\u3000あの壁画も、いろいろ謎が多いけれど～」"
translation = "「태양의 벽화를 믿고 있다는 걸까요~? 그 벽화도 여러모로 수수께끼가 많지만요~」"

[[dialogue]]
speaker = "unk"
original = "天使・人間・魔族が力を合わせて魔王を打ち破ったとされるのが、大聖堂にある『太陽の壁画』。"
translation = "천사·인간·마족이 힘을 합쳐 마왕을 물리쳤다고 전해지는 것이 대성당에 있는 『태양의 벽화』."

[[dialogue]]
speaker = "unk"
original = "それに対し、星見家に保管されているのは『月の壁画』。こちらは魔王がリクリエを退けた様を描いたもの。"
translation = "그에 반해 호시미 가문에 보관되어 있는 것은 『달의 벽화』. 이쪽은 마왕이 리크리에를 물리친 모습을 그린 것."

[[dialogue]]
speaker = "unk"
original = "真実に近いのはこちらなのだが、『太陽の壁画』は嘘にしては浸透しすぎている──というのがアナの所感だった。"
translation = "진실에 가까운 것은 이쪽이지만, 『태양의 벽화』는 거짓말치고는 너무 널리 퍼져 있다는 것이 아나의 소견이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「彼女、ほんとに何者なの？\u3000新星学園にあんな子いたかしら？」"
translation = "「그녀, 정말 정체가 뭐야? 신성학원에 저런 애가 있었나?」"

[[dialogue]]
speaker = "アナ"
original = "「彼女は昨日付けで新星学園に転入したことになっています」"
translation = "「그녀는 어제 자로 신성학원에 전입한 것으로 되어 있습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「現在の住所は教皇庁公邸。つまり星見家です」"
translation = "「현재 주소는 교황청 공저. 즉 호시미 가문입니다.」"

