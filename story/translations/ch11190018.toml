[[dialogue]]
speaker = "unk"
original = "それは、恋人になったミネコと街でデートした後のこと――"
translation = "그것은 연인이 된 미네코와 시내에서 데이트를 마친 후의 일――"

[[dialogue]]
speaker = "ミネコ"
original = "「――もうすっかり辺りも暗くなっちゃったね～。でも……」"
translation = "「――벌써 주변이 완전히 어두워졌네~. 하지만……」"

[[dialogue]]
speaker = "ミネコ"
original = "「怪盗的には、夜からが本番だよね♪\u3000ふふふっ♪」"
translation = "「괴도한테는 밤부터가 본방이지♪ 후후후♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「そういうわけで、会長――」"
translation = "「그런 의미에서 회장――」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺の耳元に口を寄せて、息を吹きかけるように囁く。"
translation = "그녀는 내 귓가에 입을 가까이 대고 입김을 불어넣듯 속삭인다."

[[dialogue]]
speaker = "ミネコ"
original = "「そろそろ……ラブホテル、行こっか<emoji=heart04>」"
translation = "「슬슬…… 러브호텔, 가자<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはラブホテルの室内に入ったのだが――"
translation = "그렇게 우리들은 러브호텔 실내로 들어갔는데――"

[[dialogue]]
speaker = "ミネコ"
original = "「会長見てみて～！\u3000色々おもちゃとかあるよ。手錠とか、ほら♪」"
translation = "「회장 이것 좀 봐~! 여러 가지 장난감 같은 게 있어. 수갑이라든가, 이거 봐♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ、そうだ！\u3000いいこと思いついた♪\u3000ふふふっ♪」"
translation = "「앗, 맞다! 좋은 게 생각났다♪ 후후후♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「あのね、会長……ごにょごにょ<emoji=heart04>」"
translation = "「있잖아, 회장…… 소곤소곤<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「くっ……<emoji=heart04>」"
translation = "「큭……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから出来上がったのは、怪盗衣装をはだけさせたミネコが、ベッドに寝転がっているという状況だった。"
translation = "그 후 만들어진 상황은 괴도 의상을 풀어헤친 미네코가 침대에 누워있는 광경이었다."

[[dialogue]]
speaker = "unk"
original = "おまけに、先ほど見つけたおもちゃの手錠を両手にかけて、ミネコは自分の意思では満足に動けない状態だ。"
translation = "게다가 조금 전 발견한 장난감 수갑을 양손에 차고 있어, 미네코는 자신의 의지만으로는 제대로 움직일 수 없는 상태다."

[[dialogue]]
speaker = "ミネコ"
original = "「キミ、探偵の助手なのに、まさか裏でこんな下衆なことをしているなんて……！」"
translation = "「너, 탐정의 조수면서 설마 뒤에서 이런 저질스러운 짓을 하고 있다니……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「本当ならこんな手錠、無理矢理引き千切れるはずなのに、体に力が入らない……！」"
translation = "「원래라면 이런 수갑, 억지로 끊어버릴 수 있을 텐데 몸에 힘이 안 들어가……!」"

[[dialogue]]
speaker = "unk"
original = "ミネコが望んだのは、『怪盗が悪い探偵助手に捕まりレイプされてしまう』というシチュエーションのロールプレイえっち。"
translation = "미네코가 원한 것은 『괴도가 나쁜 탐정 조수에게 붙잡혀 강간당해버리는』 상황의 롤플레이 섹스."

[[dialogue]]
speaker = "unk"
original = "俺は悪役になり切って彼女に合わせる。……わりと楽しい。"
translation = "나는 악역에 몰입해 그녀에게 맞춰준다. ……꽤 즐겁다."

[[dialogue]]
speaker = "ミネコ"
original = "「――『心身拘束』の能力……！？」"
translation = "「――『심신구속』의 능력……!?」"

[[dialogue]]
speaker = "クロト"
original = "「そうだ。星術で１度捕らえたら、いくら怪盗のお前といえども、簡単には逃げられない。覚悟しろ」"
translation = "「그래. 성술로 한 번 붙잡으면 아무리 괴도인 너라도 쉽게 도망칠 순 없다. 각오해라」"

[[dialogue]]
speaker = "クロト"
original = "「このまま身も心も、俺の女に堕としてやる」"
translation = "「이대로 몸도 마음도 내 여자로 타락시켜주마」"

[[dialogue]]
speaker = "ミネコ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "囁くように言うと、彼女は顔を赤くしながら、ゾクゾクと体を身震いさせて──"
translation = "속삭이듯 말하자 그녀는 얼굴을 붉히며 오싹오싹 몸을 떨고──"

[[dialogue]]
speaker = "ミネコ"
original = "「っ……<emoji=heart04>\u3000だ、誰がキミなんかに……！」"
translation = "「윽……<emoji=heart04> 누, 누가 너 따위한테……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「んっ<emoji=heart04>\u3000はあぁっ……ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아앗…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "怪盗である自分が辱められる状況に興奮を覚えているのか、早くも呼吸が荒くなっている。"
translation = "괴도인 자신이 능욕당하는 상황에 흥분을 느끼는 건지, 벌써부터 호흡이 거칠어지고 있다."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女に、更に説明する。"
translation = "나는 그런 그녀에게 더욱 설명한다."

[[dialogue]]
speaker = "ミネコ"
original = "「――快楽をトリガーにして、拘束の能力が強まっていくって……！？」"
translation = "「――쾌락을 트리거로 해서 구속 능력이 강해진다고……!?」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、本当にそれらしき術はかけてある。即興の付け焼刃なので、ミネコが本気になれば破れてしまう程度の拘束だが、スパイスとしては十分だろう。"
translation = "참고로 정말 그런 듯한 술법을 걸어두었다. 즉석에서 만든 임시방편이라 미네코가 본심을 내면 풀려버릴 정도의 구속이지만, 조미료로서는 충분할 것이다."

[[dialogue]]
speaker = "ミネコ"
original = "「それで私が逃げられないように堕とすつもり……！？\u3000なんて卑劣な能力なの！」"
translation = "「그래서 내가 도망치지 못하게 타락시킬 셈이야!? 정말 비열한 능력이야!」"

[[dialogue]]
speaker = "unk"
original = "俺はミネコの背中に指で触れて、そこからゆっくり滑らせて、お尻にかけてそっと撫でていく。"
translation = "나는 미네코의 등에 손가락을 대고 거기서부터 천천히 미끄러뜨려 엉덩이까지 부드럽게 훑어 내려간다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ<emoji=heart04>\u3000ふあぁんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「んっ<emoji=heart04>\u3000お尻強く揉まれて、あっ……<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 엉덩이 세게 주물러져서, 앗……<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度は太ももへと手を移し、スリスリと撫で回す。"
translation = "이번에는 허벅지로 손을 옮겨 문질문질 쓰다듬는다."

[[dialogue]]
speaker = "ミネコ"
original = "「――太ももが、いやらしい肉づきしてるって……？\u3000んっ<emoji=heart04>\u3000へ、変態っ……！」"
translation = "「――허벅지가 야한 살집을 하고 있다고……? 응……<emoji=heart04> 변, 변태……!」"

[[dialogue]]
speaker = "unk"
original = "俺は太ももの外側から内側にかけて撫でた後に、指を彼女の股間へと滑らせる。"
translation = "나는 허벅지 바깥쪽에서 안쪽으로 훑은 뒤, 손가락을 그녀의 가랑이 사이로 미끄러뜨린다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ！？\u3000おま○こに、指が触れてっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふああぁっ……！」"
translation = "「앗!? 보지에 손가락이 닿아서……<emoji=heart04> 응……<emoji=heart04> 후아아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「変態はどっちだ？\u3000もうすっかりびしょびしょだぞ」"
translation = "「변태는 어느 쪽이지? 벌써 아주 흠뻑 젖었다고」"

[[dialogue]]
speaker = "ミネコ"
original = "「んあぁっ！？\u3000ふあぁっ<emoji=heart04>\u3000中に指が入って……あっ<emoji=heart04>\u3000んああぁっ……！」"
translation = "「응아앗!? 후아앗<emoji=heart04> 안에 손가락이 들어와서…… 앗<emoji=heart04> 응아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "俺は中指を彼女の膣内に挿入して、くちゅくちゅと揺らすように動かす。"
translation = "나는 가운뎃손가락을 그녀의 질 내부에 삽입해 질척질척 흔들 듯이 움직인다."

[[dialogue]]
speaker = "ミネコ"
original = "「やあぁっ<emoji=heart04>\u3000そんなエッチな音鳴らしちゃぁっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000はあぁっ……あんっ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 그런 야한 소리 내게 하면……<emoji=heart04> 앗<emoji=heart04> 하아앗…… 응으윽<emoji=heart04> 하아앗…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000んくっ……んうぅっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……！」"
translation = "「앗<emoji=heart04> 후우웃……<emoji=heart04> 응윽…… 응우웃<emoji=heart04> 하아앗…… 후아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「愛液がどんどん溢れて来てるぞ？\u3000本当は怪盗なんかじゃなくて、性奴隷が天職なんじゃないか？」"
translation = "「애액이 계속 흘러넘치고 있다고? 사실은 괴도 같은 게 아니라 성노예가 천직 아니야?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そ、そんなことない……！\u3000んっ……<emoji=heart04>」"
translation = "「그, 그럴 리 없어……! 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は指を抜き、代わりに興奮の高まってきたペニスを、彼女のおま○こへ押し当てる。"
translation = "나는 손가락을 빼고 대신 흥분이 고조된 자지를 그녀의 보지에 갖다 댄다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ<emoji=heart04>\u3000おち○ちん、固くて……熱いっ<emoji=heart04>\u3000はあぁっ……ふうぅぅぅ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 자지, 딱딱하고…… 뜨거워<emoji=heart04> 하아앗…… 후우우우우<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「――これで犯罪者の強気な女たちを快楽で堕として、性奴隷にしてきた……？\u3000くっ……この下衆め！」"
translation = "「――이걸로 범죄자 기가 센 여자들을 쾌락으로 타락시켜서 성노예로 삼아왔다고……? 윽…… 이 저질스러운 자식!」"

[[dialogue]]
speaker = "ミネコ"
original = "「そんな、たかだかおち○ちんを突っ込んだ程度で、女の子の心を操れると思ったら大間違いだから……！」"
translation = "「그까짓 자지 좀 박아 넣는 정도로 여자애 마음을 조종할 수 있을 거라 생각하면 큰 착각이니까……!」"

[[dialogue]]
speaker = "unk"
original = "俺はペニスをおま○この割れ目に擦り付け、愛液を塗り広げていく。"
translation = "나는 자지를 보지 틈새에 문지르며 애액을 펴 바른다."

[[dialogue]]
speaker = "ミネコ"
original = "「んっ……ふあぁっ<emoji=heart04>\u3000クリに擦れて……あっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……はあぁっ……<emoji=heart04>」"
translation = "「응…… 후아앗<emoji=heart04> 클리에 스쳐서…… 앗<emoji=heart04> 하아앗…… 응우웃<emoji=heart04> 응……<emoji=heart04> 후우웃…… 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "十分にヌルヌルになったところで、亀頭を膣穴に押し当てる。"
translation = "충분히 미끈미끈해졌을 즈음 귀두를 질 구멍에 밀어 넣는다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ<emoji=heart04>\u3000おま○この入り口、くちゅくちゅってされてぇ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ……んうぅっ……！」"
translation = "「앗<emoji=heart04> 보지 입구, 질척질척하게 비벼져서<emoji=heart04> 응응<emoji=heart04> 하아앗…… 응우웃……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「っ……！\u3000はあぁっ<emoji=heart04>\u3000おま○こ、押し広げられてっ……！」"
translation = "「윽……! 하아앗<emoji=heart04> 보지, 억지로 벌려져서……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふあああああぁっ……<emoji=heart04>\u3000あああっ、おち○ちん、中に入って、きたあぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아앗……<emoji=heart04> 아앗, 자지, 안에 들어왔어어어~~~엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを挿入すると、ミネコは簡単に甘い嬌声を上げて、背筋を仰け反らせる。"
translation = "자지를 삽입하자 미네코는 간단히 달콤한 교성을 지르며 등을 젖힌다."

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁっ……<emoji=heart04>\u3000んうぅっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 응우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ！？\u3000ふああああああぁっ<emoji=heart04><emoji=heart04>\u3000おち○ちん、動いてるぅっ<emoji=heart04><emoji=heart04>\u3000あっ……んうぅっ<emoji=heart04>\u3000はあぁっ……んああぁっ<emoji=heart04>」"
translation = "「앗!? 후아아아아아앗<emoji=heart04><emoji=heart04> 자지, 움직이고 있어어<emoji=heart04><emoji=heart04> 앗…… 응우웃<emoji=heart04> 하아앗…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「悪党おち○ちん、おっきぃっ<emoji=heart04>\u3000あっ……ふうぅっ。はあぁっ<emoji=heart04>\u3000んうぅっ……あっ。ふあぁあっ<emoji=heart04>」"
translation = "「악당 자지, 커어<emoji=heart04> 앗…… 후우웃. 하아앗<emoji=heart04> 응우웃…… 앗. 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「んっ……ふああぁっ<emoji=heart04>\u3000悪党おち○ちんが、私の中……出たり、入ったりぃ<emoji=heart04>\u3000ぶっといカリで……んんぅ<emoji=heart04>\u3000おま○こ、犯されちゃってるぅっ<emoji=heart04>」"
translation = "「응…… 후아아앗<emoji=heart04> 악당 자지가 내 안을…… 나갔다 들어왔다 해애<emoji=heart04> 굵은 귀두로…… 응응<emoji=heart04> 보지, 범해지고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ<emoji=heart04>\u3000ふうぅっ……んあぁっ<emoji=heart04>\u3000あっ……んんっ<emoji=heart04>\u3000はあぁっ……んふうぅっ<emoji=heart04>\u3000んっ、くぅっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후우웃…… 응아앗<emoji=heart04> 앗…… 응응<emoji=heart04> 하아앗…… 응후우웃<emoji=heart04> 응, 윽<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗…… 응응<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「やはり変態はお前の方だったな、マゾ女。挿入しただけで、ま○こがペニスに絡みついてきてるぞ」"
translation = "「역시 변태는 네 쪽이었군, 마조 계집. 삽입한 것만으로 보지가 자지에 착 달라붙고 있잖아」"

[[dialogue]]
speaker = "ミネコ"
original = "「ち、違ぁ……っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000んっ……ふううぅぅぅっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04><emoji=heart04>」"
translation = "「아, 아니야……<emoji=heart04><emoji=heart04><emoji=heart04> 아아앙<emoji=heart04> 응…… 후우우우우웃<emoji=heart04> 후와아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「口でなんと言おうが、気持ち良くなればなるほど、拘束が強くなっていくぞ？\u3000ほら――」"
translation = "「입으로 뭐라고 하든 기분이 좋아질수록 구속이 강해진다고? 자――」"

[[dialogue]]
speaker = "unk"
original = "ペニスの挿入する角度を変えて、彼女が好きなスポットをカリで擦り上げる。"
translation = "자지를 삽입하는 각도를 바꿔 그녀가 좋아하는 스팟을 귀두로 긁어 올린다."

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁぁあっ<emoji=heart04><emoji=heart04>\u3000そこっ<emoji=heart04>\u3000ダメぇっ<emoji=heart04>\u3000あっ……あぁんっ<emoji=heart04>\u3000おま○こ感じちゃうっ<emoji=heart04>\u3000あっ……んふうぅぅんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04><emoji=heart04> 거기<emoji=heart04> 안 돼애<emoji=heart04> 앗…… 아앙<emoji=heart04> 보지 느껴버려어<emoji=heart04> 앗…… 응후우우웅<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「望んでないのに、おま○こどんどん、気持ちよくなっちゃうっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁんっ……んうぅっ<emoji=heart04>\u3000ああっ……ふああぁんっ<emoji=heart04>」"
translation = "「바라지 않는데 보지 자꾸, 기분 좋아져버려어<emoji=heart04> 앗…… 앙<emoji=heart04> 하아앙…… 응우웃<emoji=heart04> 아앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「我慢せずに、快楽に身を任せたらどうだ？\u3000そうしたら、もっと気持ちよくしてやるぞ？」"
translation = "「참지 말고 쾌락에 몸을 맡기는 게 어때? 그러면 더 기분 좋게 해주지」"

[[dialogue]]
speaker = "ミネコ"
original = "「っ……<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>\u3000そ、その手には乗らないから……！」"
translation = "「윽……<emoji=heart04> 응…… 후우웃<emoji=heart04> 그, 그 수법에는 안 넘어갈 거니까……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「私は怪盗の誇りにかけて……あっ、あんっ<emoji=heart04>\u3000キミの拘束に、打ち勝ってみせる……！」"
translation = "「나는 괴도의 긍지를 걸고…… 앗, 안<emoji=heart04> 너의 구속에, 이겨내 보이겠어……!」"

[[dialogue]]
speaker = "クロト"
original = "「そうか……なら――」"
translation = "「그런가…… 그렇다면――」"

[[dialogue]]
speaker = "unk"
original = "俺は空いている片手を伸ばして、彼女のクリトリスを人差し指と親指で摘まむ。"
translation = "나는 비어 있는 한쪽 손을 뻗어서, 그녀의 클리토리스를 검지와 엄지로 집는다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ！？\u3000そ、そこっ<emoji=heart04>\u3000クリっ<emoji=heart04>\u3000ピストンされてるのに、同時に刺激するなんてっ<emoji=heart04>\u3000んひいぃっ<emoji=heart04>」"
translation = "「앗!? 거, 거기<emoji=heart04> 클리<emoji=heart04> 피스톤질 당하고 있는데, 동시에 자극하다니<emoji=heart04> 응히이잇<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「んうぅっ<emoji=heart04>\u3000だ、ダメダメっ<emoji=heart04>\u3000そんなクリ、きゅっと摘まんだら<emoji=heart04>\u3000刺激強くて、感じちゃっ……んびゃぁっ！\u3000ひっ<emoji=heart04>\u3000あひっ！？\u3000ひいぃんっ<emoji=heart04>」"
translation = "「응우웃<emoji=heart04> 아, 안돼안돼<emoji=heart04> 그렇게 클리, 꽉 집으면<emoji=heart04> 자극이 너무 강해서, 느껴버렷…… 응뱌아앗! 히익<emoji=heart04> 아힉!? 히이이잉<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「やっ、やめっ<emoji=heart04>\u3000んひぃっ<emoji=heart04>\u3000ひああぁっ<emoji=heart04>\u3000感じるっ<emoji=heart04>\u3000クリ弄り、感じて気持ち良くなっちゃうぅっ<emoji=heart04>」"
translation = "「얏, 그만<emoji=heart04> 응히잇<emoji=heart04> 히아아앗<emoji=heart04> 느껴져<emoji=heart04> 클리 만져지는 거, 느껴져서 기분 좋아져 버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「降参するか？\u3000自ら性奴隷になると言えれば、可愛がってやるぞ？」"
translation = "「항복하겠나? 스스로 성노예가 되겠다고 말하면, 예뻐해 주지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「そ、それはぁ……！\u3000ひっ<emoji=heart04>\u3000あひっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000……あっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04>」"
translation = "「그, 그건……! 히익<emoji=heart04> 아힉<emoji=heart04> 응후웃<emoji=heart04> ……앗<emoji=heart04> 앗, 앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「まだ素直になれないというなら、このまま子宮の奥まで精液を注ぎ込んでやる」"
translation = "「아직 솔직해지지 못하겠다면, 이대로 자궁 안쪽까지 정액을 쏟아부어 주마.」"

[[dialogue]]
speaker = "クロト"
original = "「楽しみだろう？\u3000かけた術のおかげで、子宮が精液を受け止めると、天にも昇る気持ち良さが味わえるぞ。並みの女は、１発で中出し中毒だ」"
translation = "「기대되지? 걸어둔 술법 덕분에, 자궁이 정액을 받아들이면 하늘로 날아오를 듯한 기분 좋음을 맛볼 수 있다고. 평범한 여자는 단 한 번의 질내사정으로 중독되지.」"

[[dialogue]]
speaker = "ミネコ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "クロト"
original = "「果たしてそれでも、怪盗の誇りを保っていられるかな……？」"
translation = "「과연 그러고도, 괴도의 긍지를 유지할 수 있을까……?」"

[[dialogue]]
speaker = "ミネコ"
original = "「んっ<emoji=heart04>\u3000ふうぅっ……！」"
translation = "「응<emoji=heart04> 후우웃……!」"

[[dialogue]]
speaker = "unk"
original = "ゾクゾクゾク、と背筋を震わせるミネコ。"
translation = "부르르르, 하고 등줄기를 떨며 전율하는 미네코."

[[dialogue]]
speaker = "unk"
original = "俺はここぞとばかりにペニスを一番奥まで入れて、彼女の子宮口を刺激する。"
translation = "나는 이때다 싶어 자지를 가장 안쪽까지 집어넣어, 그녀의 자궁구를 자극한다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ！？\u3000んああああぁっ<emoji=heart04><emoji=heart04>\u3000おち○ちんの先っぽで、子宮口にどちゅどちゅってキスされてるぅっ<emoji=heart04>\u3000あっ、あぁんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ……ふああぁっ<emoji=heart04>」"
translation = "「앗!? 응아아아아앗<emoji=heart04><emoji=heart04> 자지 끝으로 자궁구에 쪽쪽하고 키스당하고 있어어<emoji=heart04> 앗, 아앙<emoji=heart04> 하아앗<emoji=heart04> 응……후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ダメっ<emoji=heart04>\u3000ダメダメっ<emoji=heart04>\u3000中出し意識してる状態で、そんなにおち○ちんキスされたら、子宮降りてきちゃうっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅっ……ふああぁんっ<emoji=heart04>」"
translation = "「안 돼<emoji=heart04> 안 돼안 돼<emoji=heart04> 질내사정 의식하고 있는 상태에서 그렇게 자지 키스당하면, 자궁이 내려와 버려엇<emoji=heart04> 하아앗<emoji=heart04> 응응<emoji=heart04> 응후으……후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ダメなのに、射精受け入れる準備できちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ……ふわぁぁっ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>\u3000んああぁっ！」"
translation = "「안 되는데, 사정 받아들일 준비가 돼 버려어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응우으……후와아아앗<emoji=heart04> 하아앗……응응<emoji=heart04> 응아아앗!」"

[[dialogue]]
speaker = "クロト"
original = "「どうだ？\u3000性奴隷になるか？\u3000それとも子宮に出されて、精液中毒になってみるか？」"
translation = "「어떠냐? 성노예가 되겠느냐? 아니면 자궁에 싸질러져서 정액 중독이 되어 보겠느냐?」"

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁっ<emoji=heart04>\u3000ま、待って……！\u3000み――」"
translation = "「하아앗<emoji=heart04> 기, 기다려……! 미――」"

[[dialogue]]
speaker = "ミネコ"
original = "「認める……！\u3000認めますから、中には出さないでっ<emoji=heart04>\u3000じ、実は――」"
translation = "「인정할게……! 인정할 테니까, 안에는 싸지 마아<emoji=heart04> 사실, 사실은――」"

[[dialogue]]
speaker = "ミネコ"
original = "「今日、危ない日なのっ……！」"
translation = "「오늘, 위험한 날이란 말이야……!」"

[[dialogue]]
speaker = "クロト"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁっ……ふうぅっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000あぁぁっ、嘘じゃないの<emoji=heart04>\u3000本当なの<emoji=heart04>\u3000バレたら弱みになるから、黙ってて……<emoji=heart04>」"
translation = "「하아앗……후우우<emoji=heart04> 하아앙<emoji=heart04> 아아앗, 거짓말 아니야<emoji=heart04> 정말이라구<emoji=heart04> 들키면 약점이 되니까 말 안 했던 건데……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「で、でも……はぁん<emoji=heart04>\u3000性奴隷が赤ちゃん孕んでたら、んんっ<emoji=heart04>\u3000キミも使いづらい、でしょ……？\u3000ふあぁぁん<emoji=heart04>」"
translation = "「하, 하지만……하앙<emoji=heart04> 성노예가 아기를 배고 있으면, 응응<emoji=heart04> 너도 쓰기 불편하, 잖아……? 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あぁん<emoji=heart04>\u3000性奴隷……なります<emoji=heart04>\u3000ならせてくださぁい<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000その代わり……中出しだけは、待って<emoji=heart04>\u3000赤ちゃん、怖いの……っ」"
translation = "「아앙<emoji=heart04> 성노예…… 될게요<emoji=heart04> 되게 해주세에요<emoji=heart04> 응응으<emoji=heart04> 그 대신…… 질내사정만은 기다려줘<emoji=heart04> 아기, 무섭단 말이야……」"

[[dialogue]]
speaker = "ミネコ"
original = "「って、あああっ……<emoji=heart04>\u3000嘘っ<emoji=heart04>\u3000おち○ちんが、中で更に大きく……<emoji=heart04>\u3000な、なんで……<emoji=heart04>」"
translation = "「라니, 아아앗……<emoji=heart04> 거짓말<emoji=heart04> 자지가 안에서 더 커졌……<emoji=heart04> 왜, 왜애……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そんなの決まってるだろ？\u3000ミネコがわざわざ、男の性欲を刺激するようなこと言うからだ」"
translation = "「그거야 뻔하지 않나? 미네코 네가 굳이 남자의 성욕을 자극할 만한 소리를 했으니까 말이다」"

[[dialogue]]
speaker = "クロト"
original = "「――危ない日だと言われたらむしろ、孕ませたくなるに決まっている」"
translation = "「――위험한 날이라는 말을 들으면 오히려 임신시키고 싶어지는 법이지」"

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁっ……<emoji=heart04>\u3000い、嫌ぁ……っ<emoji=heart04>\u3000そんな……っ<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 시, 싫어……<emoji=heart04> 그런……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふうぅんっ……<emoji=heart04>\u3000はぁぁ、待って――あっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후우웅……<emoji=heart04> 하아아, 기다려――앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふああああああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000激しいおち○ちんピストン、来たあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아앗<emoji=heart04><emoji=heart04> 격렬한 자지 피스톤, 왔다아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が腰の動きを激しくすると、興奮による愛液でだくだくになった蜜壺が、じゅっぽじゅっぽ<emoji=heart04>\u3000と淫靡な音を響かせる。"
translation = "내가 허리 놀림을 격렬하게 하자, 흥분으로 인한 애액으로 흥건해진 보지가 쥬웁쥬웁<emoji=heart04> 하며 음탕한 소리를 울린다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ふわあああぁっ<emoji=heart04>\u3000あんっ、あんっ、あぁんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 후아아앗<emoji=heart04> 응응응<emoji=heart04> 후와아아앗<emoji=heart04> 앙, 앙, 아앙<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ダメっ<emoji=heart04>\u3000すごぉっ<emoji=heart04>\u3000あんっ、はぁぁんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04><emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼<emoji=heart04> 굉장해에<emoji=heart04> 앙, 하아아앙<emoji=heart04> 기분 좋아아<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 보지 기분 좋아아앗<emoji=heart04><emoji=heart04> 앙, 앙, 앙<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっあっあっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おち○ちん、すごく気持ちいいのぉっ<emoji=heart04><emoji=heart04>\u3000はああぁんっ<emoji=heart04>\u3000んふぅぅぅ<emoji=heart04>\u3000ふわぁぁ<emoji=heart04>\u3000んくぅ、はふぅぅん<emoji=heart04>」"
translation = "「앗앗앗<emoji=heart04> 기분 좋아아<emoji=heart04> 자지, 너무 기분 좋아아<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04> 응후우우우<emoji=heart04> 후와아아<emoji=heart04> 응쿠우, 하후우웅<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「ダメなのに、おま○こ喜んじゃってるっ<emoji=heart04>\u3000んくぅぅ<emoji=heart04>\u3000いっぱい気持ち良くされて、おち○ちんにメロメロになっちゃってるのぉ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>」"
translation = "「안 되는데, 보지가 기뻐하고 있어어<emoji=heart04> 응쿠우우<emoji=heart04> 잔뜩 기분 좋게 해줘서, 자지에 사족을 못 쓰게 돼 버려어<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000堕ちちゃうっ<emoji=heart04>\u3000あああぁぁっ<emoji=heart04>\u3000ダメなのにぃ<emoji=heart04>\u3000子宮に中出しして、精液中毒にしてほしくなっちゃうのぉぉ<emoji=heart04>\u3000くふぅぅん<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 타락해 버려어<emoji=heart04> 아아아아앗<emoji=heart04> 안 되는데에<emoji=heart04> 자궁에 질내사정 해서, 정액 중독으로 만들어줬으면 좋겠어어어<emoji=heart04> 쿠후우웅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はまた手を伸ばして、クリを摘まむ。"
translation = "나는 다시 손을 뻗어, 클리토리스를 집어 비튼다."

[[dialogue]]
speaker = "ミネコ"
original = "「ひいぃっ<emoji=heart04>\u3000おち○ちんピストンとクリの同時責め、ダメえぇぇぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふわあああぁぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「히이잇<emoji=heart04> 자지 피스톤이랑 클리 동시 공격은 안 돼에에에엣<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후와아아아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「これ、これヤバいって<emoji=heart04><emoji=heart04>\u3000感じすぎちゃうっ<emoji=heart04>\u3000ああぁあぁっ<emoji=heart04>\u3000悪党の性奴隷になるのっ、幸せ感じちゃってるぅぅ<emoji=heart04>\u3000あひぃぃん<emoji=heart04>」"
translation = "「이거, 이거 위험하다구우<emoji=heart04><emoji=heart04> 너무 느껴 버려어앗<emoji=heart04> 아아아아앗<emoji=heart04> 악당의 성노예가 되는 거, 행복을 느껴버리고 있어어어<emoji=heart04> 아히이잉<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「気持ちよすぎて、子宮がキュンキュンしちゃうっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000これダメっ<emoji=heart04>\u3000排卵しちゃうっ<emoji=heart04>\u3000赤ちゃんできちゃうのぉぉ<emoji=heart04>\u3000んああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「너무 기분 좋아서 자궁이 큥큥거려어앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 이거 안 돼<emoji=heart04> 배란돼 버려어앗<emoji=heart04> 아기 생겨 버린다구우우<emoji=heart04> 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ミネコ、そろそろ中に出すぞ！」"
translation = "「미네코, 슬슬 안에 싼다!」"

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁっ<emoji=heart04>\u3000ダメぇっ<emoji=heart04>\u3000今出されたら、本当に赤ちゃんできちゃうぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 안 돼에앗<emoji=heart04> 지금 싸면 정말로 아기 생겨 버려어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は高まる射精感に合わせて、腰の動きを更に速くする。"
translation = "나는 고조되는 사정감에 맞춰 허리 놀림을 더욱 빠르게 한다."

[[dialogue]]
speaker = "ミネコ"
original = "「あっ！？\u3000ふあああぁぁぁっ<emoji=heart04>\u3000ピストン激しいぃぃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 후아아아아아앗<emoji=heart04> 피스톤 격렬해에에엣<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あんっ、あんっ、あんっ<emoji=heart04>\u3000はああぁぁっ<emoji=heart04>\u3000くふぅぅん<emoji=heart04>\u3000ふわぁぁぁ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふわああぁぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 하아아아앗<emoji=heart04> 쿠후우웅<emoji=heart04> 후와아아아<emoji=heart04> 아아앗<emoji=heart04> 응아아앙<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후와아아아앙앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「んんんっ<emoji=heart04>\u3000くふぅぅん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000きたっ<emoji=heart04>\u3000ダメなのに<emoji=heart04>\u3000精液中毒になってフワフワになっちゃうぅぅ<emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000んああああああっ<emoji=heart04><emoji=heart04>」"
translation = "「응응응<emoji=heart04> 쿠후우웅<emoji=heart04> 아아앗<emoji=heart04> 왔다앗<emoji=heart04> 안 되는데<emoji=heart04> 정액 중독이 돼서 몽롱해져 버려어어<emoji=heart04> 앗앗앗앗<emoji=heart04> 응아아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベッドに組み敷かれてほとんど身動きできない格好のミネコが、ヘコヘコと腰を振ってペニスを迎えに来る。"
translation = "침대에 깔려 거의 움직이지 못하는 자세의 미네코가, 엉덩이를 흔들며 페니스를 마중 나온다."

[[dialogue]]
speaker = "unk"
original = "そのエロい腰遣いを見て、ペニスがまた一層興奮で膨らんだような気がした。"
translation = "그 야한 허리짓을 보자, 페니스가 다시 한층 흥분으로 팽창한 듯한 느낌이 들었다."

[[dialogue]]
speaker = "ミネコ"
original = "「あぁんっ<emoji=heart04>\u3000はぁあん<emoji=heart04>\u3000ふわあああっ<emoji=heart04>\u3000精液っ<emoji=heart04>\u3000精液ほしいのぉ<emoji=heart04>\u3000あああああっ<emoji=heart04>\u3000赤ちゃんの素くださぁぁい<emoji=heart04><emoji=heart04>\u3000はああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앙앗<emoji=heart04> 하아앙<emoji=heart04> 후와아아앗<emoji=heart04> 정액<emoji=heart04> 정액 원해애<emoji=heart04> 아아아아앗<emoji=heart04> 아기의 씨앗 주세요오오오<emoji=heart04><emoji=heart04> 하아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あん、あん、あん<emoji=heart04>\u3000あはぁぁっ<emoji=heart04>\u3000来るっ<emoji=heart04>\u3000くるくるっ<emoji=heart04><emoji=heart04>\u3000きもちぃの来るぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっあっあっあっ<emoji=heart04>\u3000ふああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 아하아아앗<emoji=heart04> 온다앗<emoji=heart04> 온다온다앗<emoji=heart04><emoji=heart04> 기분 좋은 게 와아앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗앗앗앗<emoji=heart04> 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000はぁぁっ、イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 하아앗, 간다앗<emoji=heart04><emoji=heart04> 가가가가가가아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「――孕めっ！！！」"
translation = "「――임신해라!!!」"

[[dialogue]]
speaker = "ミネコ"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「イックうぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어어어어어어어억<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아～～～～～～～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女のいちばん奥――子宮口にペニスの先で深くキスすると、限界まで高まった射精感を解放して、溜め込んでいた精液を思いっきり吐き出した。"
translation = "나는 그녀의 가장 깊은 곳――자궁구에 페니스 끝으로 깊게 키스하며, 한계까지 높아진 사정감을 해방해 쌓아두었던 정액을 마음껏 뿜어냈다."

[[dialogue]]
speaker = "ミネコ"
original = "「はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000子宮の中に、精液いっぱい出されてるぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあああぁ～っ……<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아아～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 자궁 속에 정액 잔뜩 쏟아지고 있어어어～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아～앗……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「んうぅ～っ……<emoji=heart04><emoji=heart04>\u3000会長の射精、すごい量ぉ……<emoji=heart04>\u3000どぴゅどぴゅ止まらなぁい<emoji=heart04>\u3000はあぁ～っ<emoji=heart04>\u3000んうぅっ……<emoji=heart04>」"
translation = "「응우우～앗……<emoji=heart04><emoji=heart04> 회장님의 사정, 양이 엄청나아……<emoji=heart04> 도퓨도퓨 멈추지 않아아<emoji=heart04> 하아아～앗<emoji=heart04> 응우으……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「んあぁっ……<emoji=heart04>\u3000まだ出てる……<emoji=heart04>\u3000お腹の中、熱いのでいっぱい……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「응아앗……<emoji=heart04> 아직 나오고 있어……<emoji=heart04> 배 안이 뜨거운 걸로 가득해……<emoji=heart04> 하아아……후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しばらくして、ようやく射精が止まる。俺が腰を引いていくと――"
translation = "잠시 후, 마침내 사정이 멈춘다. 내가 허리를 빼자――"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ……<emoji=heart04>\u3000おち○ちん、抜けちゃう……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 자지, 빠져 버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あんっ……<emoji=heart04>」"
translation = "「앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁぁ……ふうぅぅ……<emoji=heart04>」"
translation = "「하아아아……후우우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、ぼーっとした顔で放心状態のミネコ。"
translation = "그러고는 멍한 얼굴로 방심 상태인 미네코."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の顔を覗き込み、頬を撫でる。"
translation = "나는 그녀의 얼굴을 들여다보며, 뺨을 어루만진다."

[[dialogue]]
speaker = "クロト"
original = "「ミネコ、大丈夫……？」"
translation = "「미네코, 괜찮아……?」"

[[dialogue]]
speaker = "ミネコ"
original = "「あ……うん<emoji=heart04>\u3000大丈夫<emoji=heart04>\u3000ロールプレイエッチ、すごく興奮して、気持ちよかったから……余韻がすごいだけ<emoji=heart04>」"
translation = "「아…… 응<emoji=heart04> 괜찮아<emoji=heart04> 롤플레잉 섹스, 너무 흥분해서 기분 좋았으니까…… 여운이 엄청날 뿐이야<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「――私が途中で危険日とか言い出すから、会長も興奮して、いっぱい出ちゃった……？\u3000ふふっ<emoji=heart04>\u3000おま○こから精液、こんなに溢れ出して来ちゃってるもんね……<emoji=heart04>」"
translation = "「――내가 중간에 가임기라느니 말하니까, 회장도 흥분해서 잔뜩 싸버렸네……? 후훗<emoji=heart04> 보지에서 정액이 이렇게나 넘쳐흐르고 있는걸……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「思いつきだったけど、危険日シチュエーション、すごくいいかも……<emoji=heart04>\u3000レイプシチュとも相性バッチリだしね<emoji=heart04>」"
translation = "「충동적이었지만, 가임기 상황극, 정말 좋을지도……<emoji=heart04> 강간 상황극이랑도 궁합이 딱이고 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本当にこんなのがいいのか？\u3000恋人としては、ちょっと心配になるんだけど……」"
translation = "「정말로 이런 게 좋은 거야? 연인으로서는 조금 걱정되는데……」"

[[dialogue]]
speaker = "ミネコ"
original = "「えへへぇ～<emoji=heart04>\u3000ドＭの彼女でごめんねぇ<emoji=heart04>\u3000でもでも、怪盗を調教する悪党のセリフ、結構堂に入ってたよ<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 메가 M인 여자친구라 미안해~<emoji=heart04> 그래도 그래도, 괴도를 조교하는 악당 대사, 제법 그럴싸했어<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「そ・れ・に～<emoji=heart04>\u3000こんなの、悪党役が会長の顔と声だから興奮するだけだから、心配しないで<emoji=heart04>」"
translation = "「그·리·고~<emoji=heart04> 이런 거, 악당 역할이 회장의 얼굴이랑 목소리니까 흥분하는 것뿐이니까, 걱정하지 마<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「……私の子宮、ずっと前から会長限定の精液中毒だから、他人のなんかじゃちっとも気持ち良くなれないよ<emoji=heart04>」"
translation = "「……내 자궁, 아주 오래전부터 회장 한정 정액 중독이라서, 다른 사람 거 가지곤 조금도 기분 좋아질 수 없어<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ……でも――」"
translation = "「앗…… 하지만――」"

[[dialogue]]
speaker = "unk"
original = "彼女は顔を上げると、俺の耳に唇を寄せて……"
translation = "그녀는 고개를 들더니, 내 귀에 입술을 가까이 대고……"

[[dialogue]]
speaker = "ミネコ"
original = "「本当に赤ちゃん作る時は、甘々でラブラブにね<emoji=heart04>\u3000……ちゅっ<emoji=heart04>」"
translation = "「정말로 아기 만들 때는, 달콤하고 러브러브하게 해줘<emoji=heart04> ……쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「って、あっ……<emoji=heart04>\u3000会長、すごい……<emoji=heart04>\u3000さっきいっぱい出したばかりなのに、もう大きくなって……<emoji=heart04>」"
translation = "「그나저나, 앗……<emoji=heart04> 회장, 대단해……<emoji=heart04> 방금 잔뜩 쌌는데 벌써 커져서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人からそんな風に可愛く囁かれたら、やりたい盛りの男子として盛り上がらないわけがなく。"
translation = "연인에게 그런 식으로 귀엽게 속삭임을 당하면, 한창때인 남자로서 달아오르지 않을 수가 없다."

[[dialogue]]
speaker = "ミネコ"
original = "「あんっ<emoji=heart04>\u3000会長、溢れちゃうくらい精液いっぱいなのに、これ以上したら本当にできちゃうかもしれないよ？\u3000ふふふっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 회장, 넘쳐흐를 정도로 정액이 가득한데, 여기서 더 하면 정말로 생겨버릴지도 몰라? 후후후<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 안……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、入室時間を延長してしまうくらい、孕ませロールプレイに夢中になってしまう俺たちなのだった――"
translation = "그 후, 입실 시간을 연장해버릴 정도로 임신시키기 롤플레잉에 열중해버린 우리였다――"

