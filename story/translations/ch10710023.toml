[[dialogue]]
speaker = "unk"
original = "第３話,キサナがいる生活,P"
translation = "제3화, 키사나가 있는 생활"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「起きろー、魔王。朝だぜ」"
translation = "「일어나라, 마왕. 아침이라고.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「チッ、なかなか起きねえな。ここは一発、ド派手にお見舞いしてやるか」"
translation = "「칫, 좀처럼 안 일어나네. 여기서 한 방, 화끈하게 선사해 줄까.」"

[[dialogue]]
speaker = "unk"
original = "お、おはよう！"
translation = "조, 좋은 아침!"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「お、やっと起きやがった。朝メシの時間だ。顔洗ってこい」"
translation = "「오, 드디어 일어났네. 아침 먹을 시간이다. 세수하고 와.」"

[[dialogue]]
speaker = "unk"
original = "恋人になった矢先、キサナは俺の家に転がり込んできた。キサナが言うには、男と女は一緒に暮らすものらしい。"
translation = "연인이 된 직후, 키사나는 우리 집에 굴러 들어왔다. 키사나의 말로는 남녀는 같이 사는 법이라고 한다."

[[dialogue]]
speaker = "unk"
original = "ちょっと戸惑ったけど、いつもキサナの顔が見れて嬉しい。"
translation = "조금 당황스럽긴 했지만, 언제나 키사나의 얼굴을 볼 수 있어서 기쁘다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「おい、なにニヤニヤしてんだ。メシが冷めるだろーが、早く顔洗ってこいっつってんだろ！」"
translation = "「어이, 뭘 헤벌쭉하고 있는 거야. 밥 다 식잖아, 빨리 세수하고 오라고 했지!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「おはよう、クロト。キサナちゃんも起こしてきてくれてありがとうね」"
translation = "「안녕, 쿠로토. 키사나 양도 깨워줘서 고마워요.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うっす」"
translation = "「넵.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んじゃ、朝飯いただきます」"
translation = "「그럼, 아침 잘 먹겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "母さんの料理は栄養満点だけど、味にはそこまでこだわらない。でもキサナは喜んで食べてくれるからひと安心だ。"
translation = "어머니의 요리는 영양 만점이지만, 맛에는 그렇게까지 구애받지 않으신다. 하지만 키사나가 기쁘게 먹어주니 한시름 놨다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「キサナちゃん、お箸の使い方うまくなったわね～」"
translation = "「키사나 양, 젓가락질이 아주 능숙해졌네~」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あざっす。姐さんのおかげっす」"
translation = "「고맙슴다. 아네고 덕분임다.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふ、ありがとう。食べたらお勉強する？」"
translation = "「후후, 고마워요. 다 먹으면 공부할까요?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あー、えっと、今日はこれからコイツと出かけるんで……な、そうだろ？」"
translation = "「아─, 저기, 오늘은 지금부터 이 녀석이랑 나갈 거라서…… 그치, 그렇지?」"

[[dialogue]]
speaker = "unk"
original = "キサナは子どものころ教育を受けられなかったらしく、今はその分勉強中だ。"
translation = "키사나는 어릴 적에 교육을 받지 못했다고 해서, 지금 그만큼 공부 중이다."

[[dialogue]]
speaker = "unk"
original = "でも今日は勉強の気分じゃないらしい。"
translation = "하지만 오늘은 공부할 기분이 아닌 모양이다."

[[dialogue]]
speaker = "unk"
original = "今日は一日デートの予定"
translation = "오늘은 하루 종일 데이트할 예정이야."

[[dialogue]]
speaker = "unk"
original = "特に約束はしていないけど、口裏を合わせてみた。休日だし、元々そのつもりだ。"
translation = "딱히 약속한 건 아니지만, 입을 맞춰 보았다. 휴일이기도 하고, 원래 그럴 생각이었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「きゃー、若いっていいわね。じゃあ、ご飯も外で食べてくるわよね？\u3000お小遣い渡すわね」"
translation = "「어머나, 젊음이 좋긴 좋네. 그럼 밥도 밖에서 먹고 오겠지? 용돈 줄게.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ、いや……」"
translation = "「아, 아뇨……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「遠慮しないで受け取って。年長者からの厚意は素直に受け取るのも礼儀よ。なんたって私、３００歳いってるしね」"
translation = "「부담 갖지 말고 받아요. 연장자의 호의는 솔직하게 받는 것도 예의랍니다. 어쨌든 나, 300살이나 먹었으니까 말이죠.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "（……なぁ魔王。お前の母親、マジで反応に困ること言うよな）"
translation = "「(……야 마왕. 네 어머니, 진짜 반응하기 곤란한 소리만 하시네.)」"

[[dialogue]]
speaker = "unk"
original = "（なんかごめん）"
translation = "「(어쩐지 미안.)」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシが昔いたとこだと、上から小遣い渡されたら、ヤバい仕事の前フリだったんで…………姐さんが言うならもらっとく……っす」"
translation = "「(내가 옛날에 있던 곳에선, 윗사람이 용돈을 주면 위험한 일의 예고편이었는데………… 아네고가 말씀하신다면 받아두겠……슴다.)」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ここではそんな心配しなくていいのよ、キサナちゃん。安心しておいしいもの食べてきて！」"
translation = "「여기서는 그런 걱정 안 해도 돼요, 키사나 양. 안심하고 맛있는 거 먹고 와요!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……うっす」"
translation = "「……넵.」"

[[dialogue]]
speaker = "unk"
original = "俺たちは遊園地併設のプールに行くことにした。ここはプールで遊ぶのはもちろん、売店でグルメも楽しめる。"
translation = "우리는 유원지에 병설된 수영장에 가기로 했다. 이곳은 수영장에서 노는 것은 물론, 매점에서 먹거리도 즐길 수 있다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あーあ、まんまと金握らされちまった。いや、不満ってワケじゃねえけど……やっぱり落ち着かねえ」"
translation = "「아─ 아, 고스란히 돈을 받아버렸네. 아니, 불만이라는 건 아니지만…… 역시 진정이 안 돼.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ここはアタシのいた世界じゃねえ。それは分かってんだが、どうにもな」"
translation = "「여기는 내가 있던 세계가 아니야. 그건 알고 있지만, 아무래도 말이지.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシがいたのは右も左もマフィアばっかのとこだった。タダで与えられるものなんてねえ。何を得るにも代償が必要だった」"
translation = "「내가 있던 곳은 사방이 마피아뿐인 곳이었어. 공짜로 주어지는 것 따윈 없었지. 무엇을 얻든 대가가 필요했어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それがテメエのもんか、あるいは他人のもんか。命にしろ金にしろな」"
translation = "「그게 네놈 것이든, 아니면 남의 것이든 말이야. 목숨이든 돈이든.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あー、考えても仕方ねえな。肉食おうぜ肉」"
translation = "「아─, 생각해 봤자 별 수 없네. 고기 먹자, 고기.」"

[[dialogue]]
speaker = "unk"
original = "無理させてるならごめん"
translation = "무리하게 하고 있다면 미안해."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ？\u3000無理なんかしてねえよ……オマエにはそう見えてんのか」"
translation = "「앙? 무리 같은 거 안 해…… 너한텐 그렇게 보여?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「それに、オマエの女になるって約束したしな。オマエと同じ世界を見てたいんだよ」"
translation = "「게다가 네 여자가 되겠다고 약속했으니까 말이야. 너랑 같은 세계를 보고 싶다고.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「つうか、なんか勘違いしてねえか？\u3000アタシはオマエのこと気に入ってんだぜ。勝負に負けたからイヤイヤ一緒にいるんじゃねえぞ」"
translation = "「그보다, 뭔가 착각하고 있는 거 아냐? 난 네가 맘에 든단 말이야. 승부에서 져서 억지로 같이 있는 게 아니라고.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……ほ、本気でイヤなら勝負だってしねえよ」"
translation = "「……저, 정말 싫다면 승부조차 안 했겠지.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「最初は星騎士なんて口先だけの偽善者のハリボテだろうと思ってたけどよ、そうじゃなかった。世界を救うってのもやり遂げちまった」"
translation = "「처음엔 성기사니 뭐니 입만 산 위선자의 껍데기일 거라고 생각했는데 말이야, 그게 아니었어. 세계를 구하는 것도 해내 버렸고.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あのガキを施設に入れたのだってそうだ。お前の言うとおりにしたから、アイツは今、なんとか楽しそうにやってる」"
translation = "「그 꼬맹이를 시설에 보낸 것도 그래. 네 말대로 했으니까 그 녀석은 지금 어떻게든 즐겁게 지내고 있잖아.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オマエはちゃんと、正義の味方でいてくれた」"
translation = "「너는 제대로, 정의의 사자로 있어 주었어.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なんていうか、アタシはオマエを認めてるんだ。だから堂々としてろよ。アタシの男なんだろ」"
translation = "「뭐랄까, 난 너를 인정하고 있어. 그러니까 당당하게 있으라고. 내 남자잖아.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「つうかよ、男なら女を自分の色に染めるもんだろ。遠慮とかしてんじゃねえ。……アタシの覚悟はもうできてるからよ」"
translation = "「그보다 말이야, 남자라면 여자를 자기 색으로 물들이는 법이잖아. 사양 같은 거 하지 마. ……내 각오는 이미 끝났으니까.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああもう！\u3000余計なこと言っちまった。それもこれもテメエが情けねえツラしてっからだ！」"
translation = "「아아 진짜! 괜한 소릴 해버렸잖아. 이게 다 네가 한심한 표정을 짓고 있어서 그런 거라고!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「肉だ、とにかく肉持ってこい！\u3000どうせあぶく銭だ。ぱーっと使うぞ！」"
translation = "「고기다, 어쨌든 고기 가져와! 어차피 공짜 돈이다. 팍팍 쓰자고!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んで、そのあとは遊ぶぞ！\u3000具体的には水鉄砲の的になれ」"
translation = "「그리고 그 다음엔 노는 거다! 구체적으로는 물총 과녁이 돼라.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オマエに染まる覚悟があるとは言ったけどよ、オマエにその気がないならケツに敷いてペラッペラの座布団にしてやるからな」"
translation = "「너한테 물들 각오가 되어 있다고는 했지만, 네가 그럴 마음이 없다면 엉덩이 밑에 깔아서 납작한 방석으로 만들어 줄 테니까.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハハッ！\u3000いいツラしてんじゃねえか！\u3000屈服させてやるぜ！」"
translation = "「하핫! 좋은 표정이네! 굴복시켜 주마!」"

[[dialogue]]
speaker = "unk"
original = "ご飯の後、キサナの水鉄砲にへとへとになるまで追いかけまわされたのだった。"
translation = "식사 후, 키사나의 물총에 녹초가 될 때까지 쫓겨 다녀야 했다."

