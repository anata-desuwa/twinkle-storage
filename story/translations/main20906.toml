[[dialogue]]
speaker = "unk"
original = "第６話,ベアトリスの追想,B"
translation = "제6화, 베아트리스의 추억, B"

[[dialogue]]
speaker = "unk"
original = "ベアトリスは星徒会室を離れ、チナがいる会議室に向かう。"
translation = "베아트리스는 성도회실을 떠나 치나가 있는 회의실로 향한다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（梨緒ちゃんたちにはああいったけど、チナちゃんと話すの久しぶりだから緊張しちゃうな……──って、弱気になっちゃダメ）"
translation = "（리오짱 일행에게는 그렇게 말했지만, 치나짱이랑 이야기하는 건 오랜만이라 긴장되네…… ──아니, 약해지면 안 돼）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（チナちゃんとお話しできるように……自分の気持ちを、ちゃんと自分の言葉にできるようにしないと）"
translation = "（치나짱이랑 대화할 수 있도록…… 내 마음을 제대로 내 언어로 표현할 수 있게 해야 해）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ルヴィは、テルル様に代わる新しい女神だった）"
translation = "（루비는 테루루 님을 대신하는 새로운 여신이었어）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（びっくりした……なんて言葉も出ないくらい、思いもしないことだった）"
translation = "（깜짝 놀랐어…… 라는 말도 안 나올 정도로 생각지도 못한 일이었지）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ずっと一緒にデネブを守ってきた友達が女神様だったなんて、信じられない……はずなんだけど、ちょっと納得できた気がする）"
translation = "（계속 함께 데네브를 지켜온 친구가 여신님이었다니, 믿을 수 없을…… 터였는데, 조금은 납득이 가는 기분이야）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（だってルヴィはそれくらい特別な存在だったから。私たちとは違う次元の存在だって、なんとなく感じていたから）"
translation = "（왜냐하면 루비는 그만큼 특별한 존재였으니까. 우리와는 다른 차원의 존재라고 어렴풋이 느끼고 있었으니까）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（だけど──）"
translation = "（하지만──）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ルヴィはディザスターハンドと一緒にいて、ディザスターハンドは梨緒ちゃんの世界を滅ぼした存在で……）"
translation = "（루비는 디재스터 핸드와 함께 있었고, 디재스터 핸드는 리오짱의 세계를 멸망시킨 존재고……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（つまりルヴィは、リクリエを起こす側にいるってこと）"
translation = "（즉 루비는 리크리에를 일으키는 쪽에 있다는 뜻이야）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ずっとルヴィはデネブを守るふりをして、リクリエを起こそうとしていたのかな……）"
translation = "（계속 루비는 데네브를 지키는 척하면서 리크리에를 일으키려 했던 걸까……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（リクリエからデネブを守るために戦ってきたはずなのに……なんだろ、今までのいろいろなことが無駄になったような気がする）"
translation = "（리크리에로부터 데네브를 지키기 위해 싸워왔을 텐데…… 뭐랄까, 지금까지의 여러 가지 일들이 헛수고가 된 것 같은 기분이야）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（私たち極星学園も、今まで知らず知らずのうちに、リクリエを起こす手助けをしていたのかも……）"
translation = "（우리 극성학원도 지금까지 알게 모르게 리크리에를 일으키는 걸 돕고 있었을지도 몰라……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（今さらになって、私に裏切られた梨緒ちゃんの気持ちがわかった気がする。裏切られるのってこんな感じなんだ……）"
translation = "（이제야 나에게 배신당했던 리오짱의 기분을 알 것 같아. 배신당한다는 건 이런 느낌이구나……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（だけど……もしかしたら、ルヴィはディザスターハンドや『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に操られてるのかもしれない。何か仕方ない理由があるのかもしれない）"
translation = "（하지만…… 어쩌면 루비는 디재스터 핸드나 『<ruby>제로스<rt>XELOS</rt></ruby>』에게 조종당하고 있는 걸지도 몰라. 뭔가 어쩔 수 없는 이유가 있는 걸지도 몰라）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（いや……本当はルヴィの意志じゃないって、私がそう思いたいだけかもしれない。裏切られたって信じたくないだけかもしれない）"
translation = "（아니…… 사실은 루비의 의지가 아니라고 내가 그렇게 생각하고 싶을 뿐일지도 몰라. 배신당했다는 걸 믿고 싶지 않을 뿐일지도 몰라）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（……『かもしれない』だらけだ）"
translation = "（……『일지도 몰라』 투성이네）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（デネブを滅ぼすことが正しいと思ってるなら、ルヴィはきっと本当にデネブを滅ぼす）"
translation = "（데네브를 멸망시키는 것이 옳다고 생각한다면 루비는 분명 정말로 데네브를 멸망시킬 거야）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（だってルヴィはいつも正しくて、合理的だから）"
translation = "（왜냐하면 루비는 언제나 옳고 합리적이니까）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（でもルヴィは、誰よりも率先してモンスターと戦って、みんなを守って……）"
translation = "（하지만 루비는 누구보다 앞장서서 몬스터와 싸우고 모두를 지키고……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（アルバイトしながら流星市国の人々と交流して、私たちが呆れるほど担々麺が好きで……）"
translation = "（아르바이트를 하면서 유성시국 사람들과 교류하고, 우리가 질릴 정도로 탄탄면을 좋아하고……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ルヴィは、デネブを、流星市国を愛してると思う）"
translation = "（루비는 데네브를, 유성시국을 사랑하고 있다고 생각해）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（それに私を止めようとしてくれたルヴィは本気だった）"
translation = "（게다가 나를 막으려 했던 루비는 진심이었어）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（私がいずれリクリエで消滅するものだと、そう考えているようには見えなかった）"
translation = "（내가 머지않아 리크리에로 소멸할 존재라고 그렇게 생각하고 있는 것처럼은 보이지 않았어）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（だから、ルヴィはまだ仲間だと思ってる）"
translation = "（그러니까 루비는 아직 동료라고 생각해）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（私は心のどこかで、まだルヴィを信じてるんだ……）"
translation = "（나는 마음 한구석에서 아직 루비를 믿고 있어……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「……ふぅ」"
translation = "「……후우」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（もしルヴィが『新しい世界のために滅びて』って言ったら、私はどうするだろう？）"
translation = "（만약 루비가 『새로운 세계를 위해 멸망해줘』라고 말한다면 나는 어떻게 할까?）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ルヴィが言うなら、ってちょっと受け入れちゃうかもしれない。でも何か違う気がする）"
translation = "（루비가 말한다면, 하고 조금은 받아들여 버릴지도 몰라. 하지만 뭔가 아닌 것 같아）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（もしルヴィが敵だって確信できたら、私は戦えるだろうか）"
translation = "（만약 루비가 적이라고 확신하게 된다면 나는 싸울 수 있을까）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（もしルヴィを討たないと世界を守れないとしたら……いや、それは私には無理だよ……）"
translation = "（만약 루비를 치지 않으면 세계를 지킬 수 없다고 한다면…… 아니, 그건 나에겐 무리야……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（ルヴィは私のこと、どう思ってるんだろう？\u3000私はルヴィに、何をすればいいんだろう？）"
translation = "（루비는 나를 어떻게 생각하고 있을까? 나는 루비에게 무엇을 하면 좋을까?）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（結局、わかんないことだらけだなぁ……）"
translation = "（결국 모르는 것투성이네……）"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも、逃げないよ」"
translation = "「하지만 도망치지 않아」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「何もわからないからって、逃げたり諦めたりしたら、きっともうルヴィに近づけなくなっちゃうから」"
translation = "「아무것도 모른다고 해서 도망치거나 포기해 버리면, 분명 더 이상 루비에게 다가갈 수 없게 될 테니까」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だからせめて、逃げることだけはしない」"
translation = "「그러니까 적어도 도망치는 것만은 하지 않겠어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィが敵でも、そうじゃなくても、本人の口から直接聞かないと納得できない」"
translation = "「루비가 적이든 아니든 본인의 입으로 직접 듣지 않으면 납득할 수 없어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「簡単にはまた会えないだろうけど、諦めないから」"
translation = "「쉽게 다시 만날 수는 없겠지만 포기하지 않을 거야」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「９００回負けても諦めない梨緒ちゃんみたいに、ルヴィにもう一度会うまで諦めないんだから……！」"
translation = "「900번을 져도 포기하지 않는 리오짱처럼, 루비를 다시 만날 때까지 포기하지 않을 거니까……!」"

[[dialogue]]
speaker = "unk"
original = "そしてベアトリスが会議室の前に到着する。"
translation = "그리고 베아트리스가 회의실 앞에 도착한다."

[[dialogue]]
speaker = "unk"
original = "呼吸を整え、そしてドアを開く。"
translation = "호흡을 가다듬고 문을 연다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「入るよ、チナちゃん」"
translation = "「들어갈게, 치나짱」"

