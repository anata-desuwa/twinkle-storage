[[dialogue]]
speaker = "unk"
original = "お菓子をくれるパーティー会場の星騎士たちを強制変身させて、次々と勝負を挑んでいくジャック・オー・ランタン。"
translation = "과자를 주는 행사장 성기사들을 강제로 변신시켜 차례차례 승부를 걸어가는 잭 오 랜턴."

[[dialogue]]
speaker = "unk"
original = "誰もハロウィンの幽霊に勝つことはできず、カボチャ頭にされて気を失ってしまっていた。"
translation = "아무도 할로윈 유령에게 이길 수 없었고 호박 머리가 된 채 정신을 잃고 말았다."

[[dialogue]]
speaker = "セナリィ"
original = "「ま、マズい……！\u3000これは本格的にヤベェですわ！\u3000ジャック様、全然こちらの言うことを聞いてくれませんわよ！？」"
translation = "「조, 좋지 않아……! 이건 본격적으로 큰일입니다와! 잭 님 전혀 이쪽 말을 안 들어주잖아요와!?」"

[[dialogue]]
speaker = "unk"
original = "倒れてる子たち、外傷はないみたいだけど"
translation = "쓰러진 애들 외상은 없는 것 같지만."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「とは言えこんだけの人数気絶させといて、後で会場を盛り上げる為のレクリエーションでした～って誤魔化すのは、ちょ～っと交渉が難しいかもね～♪」"
translation = "「그렇다곤 해도 이만큼의 인원 기절시켜놓고 나중에 행사장을 띄우기 위한 레크리에이션이었습니다~ 하고 얼버무리는 건 조~금 협상이 어려울지도 모르겠네~♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「こうなったら……！\u3000非常に勿体ないですけれど、止むを得ませんわ！」"
translation = "「이렇게 되면……! 굉장히 아깝지만 어쩔 수 없습니다와!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ヒトリ様！\u3000ジャック様の召喚を解いて、帰ってもらって下さいまし！」"
translation = "「히토리 님! 잭 님의 소환을 풀어서 돌아가게 해주세요와!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「え？\u3000召喚を解く？\u3000えっと……」"
translation = "「에? 소환을 풀어요? 저기……」"

[[dialogue]]
speaker = "セナリィ"
original = "「お早くお願いしますわ！\u3000ヒトリ様！」"
translation = "「빨리 부탁드립니다와! 히토리 님!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そ、その……ごめんなさい。私の星術は、幽霊のいる場所との門を作って、繋ぐことはできますけど……」"
translation = "「그, 그게…… 죄송해요. 제 성술은 유령이 있는 곳과의 문을 만들어 잇는 건 할 수 있지만……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「生きている人と同じように、来て欲しい時はお話して、お願いするような形なので……強制的に戻ってもらう術とかはなくて……」"
translation = "「살아있는 사람이랑 마찬가지로 와줬으면 할 때 대화해서 부탁하는 방식이라…… 강제로 돌려보내는 술법 같은 건 없어서……」"

[[dialogue]]
speaker = "セナリィ"
original = "「ま、まさか……」"
translation = "「서, 설마……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「どうにかして、説得して止める以外にはないかと……」"
translation = "「어떻게든 설득해서 멈추는 수밖에 없지 않을까 싶어서요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「ど――」"
translation = "「어──」"

[[dialogue]]
speaker = "セナリィ"
original = "「どうしてこうなりますのぉーーーっ！？」"
translation = "「어째서 이렇게 되는 거예요오오오오옷!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「きゃはははっ♪\u3000セナリィ、やっちゃったね～～～っ♪」"
translation = "「캬하하하♪ 세나리 사고 쳤네~~~~♪」"

[[dialogue]]
speaker = "サラン"
original = "「わ～い！\u3000ジャックちゃんと一緒に遊ぶの楽しい～♪」"
translation = "「와아~! 잭짱이랑 같이 노는 거 재밌어~♪」"

[[dialogue]]
speaker = "サラン"
original = "「みんな、ジャックちゃんにだけじゃなくて、サランにもお菓子をくれて、ふわふわ～♪」"
translation = "「모두 잭짱한테만이 아니라 사란한테도 과자를 줘서 둥실둥실해~♪」"

[[dialogue]]
speaker = "ジャック"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "サラン"
original = "「サランとジャックちゃんのコンビで、また勝っちゃったね～♪\u3000うぇ～い♪」"
translation = "「사란이랑 잭짱 콤비로 또 이겨버렸네~♪ 웨~이♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「というか、サラン様はいつの間にかジャック様とタッグ組んで暴れてるんですけど！？\u3000どうしてそうなりますのっ！？」"
translation = "「그보다 사란 님은 어느새 잭 님이랑 태그 먹고 날뛰고 있는 건가요와!? 어째서 그렇게 되는 거예요와!」"

[[dialogue]]
speaker = "unk"
original = "『美食酔い』してるな、あれは……"
translation = "『미식 취기』 상태네 저건……."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひっ♪\u3000あれが桜十路先輩の美食酔いか～。美味しい物を食べると、ふわふわな気分になって酔っ払ったみたいになっちゃうんだっけ？」"
translation = "「니히히♪ 저게 사쿠라코지 선배의 미식 취기인가~. 맛있는 걸 먹으면 둥실둥실한 기분이 돼서 취한 것처럼 돼버린댔지?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「周りはカボチャ頭で倒れてる人だらけ、その中心で笑ってる幽霊と酔っ払いとか、まさにカオスな状況だね～♪\u3000きゃはははっ♪」"
translation = "「주변은 호박 머리로 쓰러진 사람 천지 그 중심에서 웃고 있는 유령이랑 취객이라니 그야말로 카오스 상황이네~♪ 캬하하하♪」"

[[dialogue]]
speaker = "サラン"
original = "「あ～♪\u3000マインちゃんが笑ってる～♪」"
translation = "「아~♪ 마인짱이 웃고 있어~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おっと……先輩、いつの間にかこっちに……」"
translation = "「오 이런…… 선배 어느새 이쪽으로……」"

[[dialogue]]
speaker = "サラン"
original = "「マインちゃん、すっごく楽しそうな顔してるよ～？\u3000マインちゃんも、気分ふわふわ～？」"
translation = "「마인짱 정말 즐거워 보이는 표정이야~? 마인짱도 기분 둥실둥실해~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まぁ、これは私の悪い癖で……台風が来ると、ついテンション上がっちゃうタイプというか……」"
translation = "「뭐 이건 제 나쁜 버릇이라서…… 태풍이 오면 괜히 텐션 올라가는 타입이랄까……」"

[[dialogue]]
speaker = "サラン"
original = "「そうなんだ～♪\u3000会長ちゃんに悪戯してる時も楽しそうな顔してたけど、なんだかジャックちゃんみたいだね～♪」"
translation = "「그렇구나~♪ 회장짱한테 장난칠 때도 즐거운 표정이었지만 왠지 잭짱 같네~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "サラン"
original = "「ほら、ジャックちゃんって、ハロウィンの幽霊だから、悪戯が好きなんだよ～♪\u3000それがなんだか、マインちゃんに似てるな～って♪」"
translation = "「봐봐 잭짱은 할로윈 유령이라 장난을 좋아하잖아~♪ 그게 왠지 마인짱이랑 닮았다고 생각해서♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……そっか、なるほど。つまり、今のジャックさんは、私と同じ気持ちってことか……」"
translation = "「……그렇구나 과연. 즉 지금의 잭 씨는 나랑 같은 마음이라는 건가……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――わかったよ、会長。ジャックさんとの交渉方法が」"
translation = "「──알았어 회장. 잭 씨와의 협상 방법을.」"

[[dialogue]]
speaker = "unk"
original = "ああ、俺もわかった"
translation = "아아 나도 알았어."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ジャックさんはハロウィンを楽しみたくて、悪戯をしてる。だから、止めるには、その欲求を満足させてあげればいい」"
translation = "「잭 씨는 할로윈을 즐기고 싶어서 장난을 치고 있어. 그러니까 멈추게 하려면 그 욕구를 만족시켜 주면 돼.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そうと決まれば……桜十路先輩！」"
translation = "「그렇게 정해졌으면…… 사쿠라코지 선배!」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？」"
translation = "「뽀요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「今から私、ジャックさんと勝負しようと思うんで、一緒にやりませんか～？」"
translation = "「지금부터 저, 잭 씨랑 승부할 생각인데 같이 하지 않으실래요~?」"

[[dialogue]]
speaker = "サラン"
original = "「マインちゃんと一緒にっ？\u3000うんっ、サランもやる～っ♪」"
translation = "「마인짱이랑 같이? 응! 사란도 할래~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「交渉成立ですね♪\u3000それじゃあ戦闘服に変身して～、って……ん？\u3000なんか衣装が光って――」"
translation = "「교섭 성립이네요♪ 그럼 전투복으로 변신해서~, 어라? 왠지 의상이 빛나는데──」"

[[dialogue]]
speaker = "サラン"
original = "「わ～♪\u3000サランも光ってるよ～？」"
translation = "「와~♪ 사란도 빛나고 있어~?」"

[[dialogue]]
speaker = "ジャック"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「これは……ハロウィン衣装のまま、戦闘服に変身した……！？」"
translation = "「이건…… 할로윈 의상인 채로 전투복으로 변신했어……!?」"

[[dialogue]]
speaker = "サラン"
original = "「すご～い♪\u3000なんだか力が、すっごくふわふわ湧いてくるよ～♪」"
translation = "「대단해~♪ 왠지 힘이 엄청 둥실둥실 솟아나~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「どうやらこれは、ジャックさんの仕業かな？」"
translation = "「아무래도 이건 잭 씨의 소행일까요?」"

[[dialogue]]
speaker = "ジャック"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker = "サラン"
original = "「そうみたい～♪\u3000ジャックちゃんも、マインちゃんと遊びたいみたいだよ～？」"
translation = "「그런가 봐~♪ 잭짱도 마인짱이랑 놀고 싶은가 봐~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000そういうことなら、ご好意に甘えて――」"
translation = "「니히히♪ 그렇게 된 거라면 호의를 받아들여서──」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「私もハロウィンを、本気で遊んじゃおうかなっ！」"
translation = "「저도 할로윈을 진심으로 즐겨 볼까요!」"

[[dialogue]]
speaker = "サラン"
original = "「レディ～！\u3000ゴ～ッ♪」"
translation = "「레디~! 고~♪」"

[[dialogue]]
speaker = "unk"
original = "いつになく楽しそうな顔をしたネーゼマインは、サランと共に、ジャック・オー・ランタンへ勝負を挑むのだった――"
translation = "평소보다 즐거워 보이는 표정을 지은 네제마인은 사란과 함께 잭 오 랜턴에게 승부를 거는 것이었다──"

