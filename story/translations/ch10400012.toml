[[dialogue]]
speaker = "unk"
original = "第２話,魔女の街歩き,P"
translation = "제2화, 마녀의 거리 걷기, P"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ここが秋葉原。以前は電器で、今はアニメやアイドルなどのサブカルで知られている街です」"
translation = "「여기가 아키하바라. 이전에는 전기 제품으로, 지금은 애니메이션이나 아이돌 등의 서브컬처로 알려진 거리입니다」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お～っ！\u3000建物がいっぱい！\u3000なんか楽しそうっ！」"
translation = "「오~! 건물이 잔뜩! 왠지 즐거워 보여!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、目をキラキラさせてかわいいわね～」"
translation = "「후훗, 눈을 반짝거리고 귀엽네~」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「私知ってるよ！\u3000メイドさんっていうかわいい人がたくさんいて、どんなご奉仕でもしてくれるんだよね？」"
translation = "「나 알고 있어! 메이드라는 귀여운 사람이 잔뜩 있어서 어떤 봉사든 해준다며?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「私も“ごしゅじんさま”になってみたいなぁ～。ジュース飲ませてもらってー、マッサージしてもらってー、ネビュラのお仕事も代わりにやってもらおーっと」"
translation = "「나도 “주인님”이 되어보고 싶어~. 주스도 얻어 마시고~ 마사지도 받고~ 네뷸라 일도 대신 시켜야지」"

[[dialogue]]
speaker = "unk"
original = "それは無理な気がする……"
translation = "그건 무리일 것 같은데……"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「え～、できないの～？\u3000ざんねーん」"
translation = "「에~ 안 되는 거야~? 아쉽네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「さて、次はどこを案内しようかしら～。あ、あそこがいいかもしれないわね」"
translation = "「자, 다음은 어디를 안내해 줄까~. 아, 저기가 좋을지도 모르겠네」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「うわぁ～っ、大きい！\u3000らい、もん……？\u3000どういう意味？」"
translation = "「우와~ 크다! 라이, 몬……? 무슨 뜻이야?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「かみなりもん……？\u3000へぇ、そう読むんだ。ふぅ～ん、風神さまと雷神さまが由来なんだね。私も風と雷は得意だよ！」"
translation = "「카미나리몬……? 헤에, 그렇게 읽는구나. 흐음, 풍신님이랑 뇌신님이 유래구나. 나도 바람이랑 번개는 자신 있어!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら？」"
translation = "「어라?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「あれ？」"
translation = "「어라?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「どうしましたか？\u3000ウィステリア女史の扇情的な服装は魔女でも気になりますか」"
translation = "「왜 그러시죠? 위스테리아 여사의 선정적인 복장은 마녀라도 신경 쓰이나요」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「こらそこ、しれっと何言ってんの」"
translation = "「이봐 거기, 아무렇지도 않게 무슨 소릴 하는 거야」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お姉さんの本、すごい魔力……しかもその魔力が呪いになってる」"
translation = "「언니 책, 엄청난 마력…… 게다가 그 마력이 저주가 되어 있어」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「魔女じゃないのにどうして……ううん、魔女でもそんなの持ってたらおかしいよ」"
translation = "「마녀가 아닌데 어째서…… 아니, 마녀라도 그런 걸 가지고 있으면 이상해」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「こんな強い呪いの本、魔女でも普通は呪い殺される。これだけの魔力をコントロールしてるなんて、ちょっと信じられないかも……」"
translation = "「이렇게 강한 저주의 책은 마녀라도 보통은 저주받아 죽어. 이 정도의 마력을 컨트롤하고 있다니 조금 믿기지 않을지도……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「はいはい、私はただの司書ですよー。害がないようちゃんと封印してるから、そんなドン引きしないでってば」"
translation = "「네네, 전 그냥 사서일 뿐이에요. 해가 없도록 제대로 봉인해 뒀으니까 그렇게 질색하지 말아줘」"

[[dialogue]]
speaker = "unk"
original = "魔女や魔力を知ってるんですか？"
translation = "마녀나 마력을 아시나요?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「一応ね。私の実家は魔界でも古い家系だから、そういう存在がいることは知っていたわ」"
translation = "「일단은. 내 본가는 마계에서도 오래된 가계라 그런 존재가 있다는 건 알고 있었어」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「まぁ、こんなところで出くわすとは思わなかったけど。星徒会が魔女と知り合いなのも驚きだわ」"
translation = "「뭐, 이런 곳에서 마주칠 줄은 몰랐지만. 성도회가 마녀와 아는 사이인 것도 놀랍네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「一度世界を離れてリクリエを逃れた魔女は、こっちの世界にこっそり顔を出していると聞いていたけど……」"
translation = "「한번 세계를 떠나 리크리에를 피한 마녀는 이쪽 세계에 몰래 얼굴을 내밀고 있다고 듣긴 했지만……」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「！\u3000ねぇ、もしかしてお母さんのこと知ってる？」"
translation = "「! 저기, 혹시 우리 엄마 알아?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「お母さん？」"
translation = "「엄마?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お母さん、ネビュラの情報収集部門で、こっちの世界に来てたんだ。だからどこかで会ってないかなって」"
translation = "「우리 엄마, 네뷸라 정보 수집 부문이라 이쪽 세계에 왔었거든. 그래서 어디서 만난 적 없나 해서」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そうなの。でも私は知らないわ。ごめんなさいね」"
translation = "「그렇구나. 하지만 난 모르겠는걸. 미안해」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そっかー……」"
translation = "「그렇구나……」"

[[dialogue]]
speaker = "unk"
original = "お母さんのこと好きなんだな"
translation = "엄마를 좋아하는구나"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「うん！\u3000こっちの世界のことたくさん聞かせてくれたんだよ！」"
translation = "「응! 이쪽 세계 얘기 잔뜩 들려줬거든!」"

[[dialogue]]
speaker_original = "ミネルバ"
speaker_translation = "미네르바"
original = "「ホー！」"
translation = "「호!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「もしかしたらどこかですれ違ったりしたかしら……？\u3000気付かないだけで、他にも身近なところに魔女がいたりして」"
translation = "「혹시 어디선가 스쳐 지나갔을지도 모르겠네……? 눈치채지 못했을 뿐이지 다른 가까운 곳에도 마녀가 있을지도」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「まぁ私のことは置いといて……みんなは浅草観光ってところかしら」"
translation = "「뭐 내 얘기는 제쳐두고…… 다들 아사쿠사 관광 중인가 보네」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「うん！\u3000浅草ってほんとにお店がたくさんあるんだね」"
translation = "「응! 아사쿠사는 정말 가게가 잔뜩 있구나」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、そうだ。私も買い物があるんだった」"
translation = "「아, 맞다. 나도 볼일이 있었지」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「なになに？\u3000おいしいもの？」"
translation = "「뭔데 뭔데? 맛있는 거?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ええ、この近くに有名なプリンのお店があるの。久しぶりに買って帰ろうと思ってね」"
translation = "「응, 이 근처에 유명한 푸딩 가게가 있어. 오랜만에 사서 돌아가려고」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「プリン！\u3000ウェンディさんがよく食べてるやつだ！」"
translation = "「푸딩! 웬디 씨가 자주 먹던 거다!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ、それはわたしも気になるわね～」"
translation = "「후후, 그건 나도 신경 쓰이는걸~」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「呪いのお姉さん、私もついていっていい？」"
translation = "「저주 언니, 나도 따라가도 돼?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「別にいいけど、呪いのお姉さんは人聞きが悪すぎるからやめて……」"
translation = "「별로 상관없지만 저주 언니는 어감이 너무 나쁘니까 그만둬……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「じゃあ売り切れないうちに早く行きましょうか」"
translation = "「그럼 다 팔리기 전에 얼른 갈까요.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「やった～！\u3000一緒にプリン食べようね、ミーちゃん♪」"
translation = "「앗싸~! 같이 푸딩 먹자, 미짱♪」"

[[dialogue]]
speaker = "unk"
original = "モンスター！"
translation = "몬스터!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ここから少し遠いわね～。でも星徒会として見過ごせないわ」"
translation = "「여기서 조금 멀네~. 하지만 성도회로서 못 본 체할 수는 없지.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ええっ、それじゃプリン売り切れちゃうかもしれないよ？」"
translation = "「에엣, 그러면 푸딩 다 팔려버릴지도 모른다구?」"

[[dialogue]]
speaker = "unk"
original = "でも俺たちは星騎士だから──"
translation = "하지만 우리들은 별의 기사니까──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それなら私たちが会長の分も戦っておきます」"
translation = "「그렇다면 저희가 회장님 몫까지 싸워 두겠습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「敵か味方かわからないネビュラの構成員を監視するのも、会長の立派な仕事じゃないかしら～？」"
translation = "「적군인지 아군인지 알 수 없는 네뷸라의 구성원을 감시하는 것도, 회장님의 훌륭한 업무 아닐까나~?」"

[[dialogue]]
speaker = "unk"
original = "じゃあ頼みました！"
translation = "그럼 부탁할게요!"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「頼まれました。その代わり私たちの分のプリンの確保をお願いします」"
translation = "「맡겨주세요. 그 대신 저희 몫의 푸딩 확보를 부탁드립니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「よーし、それじゃプリンにレッツゴー！」"
translation = "「조아쓰, 그럼 푸딩으로 렛츠 고!」"

