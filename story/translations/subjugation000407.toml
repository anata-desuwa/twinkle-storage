[[dialogue]]
speaker = "unk"
original = "ネーゼマインとサランは見事なコンビネーションで、ついにジャック・オー・ランタンに勝利した。"
translation = "네제마인과 사란은 훌륭한 콤비네이션으로 마침내 잭 오 랜턴에게 승리했다."

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ、ジャックちゃん、いっぱい遊んで満足したみたい♪\u3000バイバ～イって、手を振ってるみたい」"
translation = "「아, 잭짱 잔뜩 놀아서 만족했나 봐♪ 바이바이~라며 손을 흔드는 것 같아」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ふぅ～……やれやれ、とんでもなく手強くて、勝つのも一苦労でしたけど――」"
translation = "「후우~…… 이런이런, 말도 못 하게 강적이라 이기는 것도 고생이었지만──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「久しぶりに楽しくて、スッキリしました。そこは感謝しないとですね♪」"
translation = "「오랜만에 즐거워서 개운해졌어요. 그 점은 감사해야겠네요♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ネーゼマインも小さく手を振ると――"
translation = "그렇게 말하며 네제마인도 작게 손을 흔들자──"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「…………（紳士のようにお辞儀）"
translation = "「…………(신사처럼 정중히 인사)」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ジャックちゃん、またね～！」"
translation = "「잭짱, 또 봐~!」"

[[dialogue]]
speaker = "unk"
original = "それから、気絶していた生徒達はみんな、頭に被ったカボチャは消えて、何事もなかったかのように目を覚ました。"
translation = "그러자 기절해 있던 학생들은 모두 머리에 쓰고 있던 호박이 사라지며 아무 일도 없었다는 듯 눈을 떴다."

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「トホホ……こんなはずでは……」"
translation = "「토호호…… 이럴 리가 없는데……」"

[[dialogue]]
speaker = "unk"
original = "セナリィは会場を騒がせたお詫びとして、ジャック・オー・ランタンに食べさせる目的で売ったお菓子の分を返金。"
translation = "세나리는 회장을 소란스럽게 만든 사죄의 의미로, 잭 오 랜턴에게 먹일 목적으로 팔았던 과자 분량을 환불해주었다."

[[dialogue]]
speaker = "unk"
original = "残っていた在庫のカップケーキも無料で配布し、最終的な利益は、お小遣い稼ぎ程度のものとなった。"
translation = "남아있던 재고인 컵케이크도 무료로 배포했고, 최종적인 이익은 용돈 벌이 정도 수준에 그쳤다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「パーティー楽しかったけど、お菓子全部なくなっちゃったね～」"
translation = "「파티는 즐거웠지만 과자가 전부 없어져 버렸네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「みんな、ジャックさんにあげてましたからね～」"
translation = "「다들 잭 씨에게 줘 버렸으니까요~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サラン、少ししか食べられなかったかも～……残念～」"
translation = "「사란, 조금밖에 못 먹었을지도~…… 아쉬워~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……ああ、それなら、そうだ――」"
translation = "「……아아, 그렇다면 그렇죠──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「一応ですけど、私、お菓子を持ってきてて……食べます？」"
translation = "「일단은 말이죠, 제가 과자를 좀 가져왔는데…… 드실래요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えっ？\u3000マインちゃん、なにかあるの？\u3000なになに～？」"
translation = "「엣? 마인짱 뭐 있어? 뭔데 뭔데~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「その……辛い味なので、先輩の口に合うかはわかりませんけど……これ」"
translation = "「그게…… 매운맛이라 선배 입에 맞을지는 모르겠지만…… 이거요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「これって……ハバネロの……激辛お菓子～？」"
translation = "「이건…… 하바네로…… 아주 매운 과자~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「すっごい辛いやつです。前に……ハロウィンに販売するお菓子の、試食会やったじゃないですか」"
translation = "「엄청 매운 녀석이에요. 예전에…… 할로윈에 판매할 과자 시식회 했었잖아요」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あの時は言えなかったんですけど……本当は私、甘いものはそんなに好きじゃなくて」"
translation = "「그때는 말 못 했지만…… 사실 저, 단것은 그렇게 좋아하지 않아서요」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「こういう、激辛のやつが好きなんです」"
translation = "「이런 아주 매운 녀석을 좋아해요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうだったんだ～！\u3000サラン、激辛のお菓子も、すっごく好きだよ～？」"
translation = "「그랬구나! 사란, 아주 매운 과자도 정말 좋아해~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「マジですか？\u3000てっきり、甘いお菓子が好きなものだとばかり……」"
translation = "「진짜예요? 틀림없이 단 과자를 좋아할 거라고만 생각했는데……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「もちろん甘いお菓子は好きだけど～。サラン、なんでも食べるよ～？\u3000渋いのも、苦いのも好きだし～♪\u3000辛い料理もよく食べるんだよ～♪」"
translation = "「물론 단 과자도 좋아하지만~. 사란은 뭐든지 잘 먹어~? 떫은 것도 쓴 것도 좋아하고~♪ 매운 요리도 자주 먹는걸~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サラン、嫌いな食べ物がないのは、昔からの自慢なんだ～♪\u3000えへへ♪」"
translation = "「사란, 못 먹는 음식이 없는 건 옛날부터 자랑거리였어~♪ 에헤헤♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、なるほど。言われてみればそうか……好きな食べ物ばかりで、嫌いな物はない……うん、桜十路先輩らしい」"
translation = "「아~ 과연. 듣고 보니 그렇네요…… 좋아하는 것투성이라 싫어하는 건 없다…… 응, 사쿠라코지 선배답네요」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……先輩、さっきはありがとうございました」"
translation = "「……선배, 아까는 고마웠어요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000なんのこと～？」"
translation = "「뽀요? 무슨 일~?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ジャックさんのことです。先輩のおかげで、止め方がわかりました」"
translation = "「잭 씨 말이에요. 선배 덕분에 멈추게 할 방법을 알았거든요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「う～ん、ごめんね？\u3000サラン、美味しい物食べてふわふわになってたせいか、何を言ったのか、あんまりよく思い出せなくて……」"
translation = "「으음, 미안해? 사란, 맛있는 거 먹고 둥실둥실해진 탓인지 무슨 말을 했는지 잘 기억이 안 나서……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「でも……えへへ♪\u3000マインちゃんの役に立てたなら嬉しいかも～♪」"
translation = "「하지만…… 에헤헤♪ 마인짱에게 도움이 됐다면 기쁠지도~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「戦闘でも大活躍でしたよ？」"
translation = "「전투에서도 대활약이었어요」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サラン、また来年、ジャックちゃんと遊びたいな～♪」"
translation = "「사란, 내년에 또 잭짱이랑 놀고 싶어~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000まあ、確かに楽しかったですしね～」"
translation = "「니히히♪ 뭐 확실히 즐겁긴 했으니까요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「もう呼び出すのは、懲り懲りですわよ！？」"
translation = "「다시 불러내는 건 이제 진저리가 난다구요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――だそうです♪」"
translation = "「──라네요♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「え～？\u3000サランは楽しかったけどな～♪」"
translation = "「에~? 사란은 즐거웠는데~♪」"

[[dialogue]]
speaker = "unk"
original = "ネーゼマインとサランは、すっかり打ち解けた様子で笑い合うのだった。"
translation = "네제마인과 사란은 완전히 허물없는 모습으로 함께 웃는 것이었다."

