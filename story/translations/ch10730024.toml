[[dialogue]]
speaker = "unk"
original = "第４話,世界でいちばん大切な,P"
translation = "제4화, 세상에서 가장 소중한, P"

[[dialogue]]
speaker = "unk"
original = "その日、私はクロトと一緒に、リゾート結界のプライベートビーチへとやって来ていた。"
translation = "그날 나는 쿠로토와 함께 리조트 결계의 프라이빗 비치로 와 있었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クロト、今日は私の頼みを聞いてくれてありがとね」"
translation = "「쿠로토, 오늘 내 부탁 들어줘서 고마워」"

[[dialogue]]
speaker = "unk"
original = "わざわざお礼なんていいよ"
translation = "일부러 고맙다는 인사는 됐어"

[[dialogue]]
speaker = "unk"
original = "海に行かないかと提案して誘ったのは、私の方からだった。"
translation = "바다에 가자고 제안하며 꼬드긴 건 내 쪽이었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ほら、毎年２人で海には遊びに来てたのに、今年はまだだったでしょ？\u3000まぁ、私の方からクロトと距離を取っちゃってたせいなんだけど……」"
translation = "「있지, 매년 둘이서 바다에는 놀러 왔었는데 올해는 아직이었잖아? 뭐, 내 쪽에서 쿠로토와 거리를 둬버린 탓이지만……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「今日は私、改めてちゃんと２人で話をしたいと思ったの」"
translation = "「오늘은 나 다시 제대로 둘이서 이야기를 하고 싶다고 생각했어」"

[[dialogue]]
speaker = "unk"
original = "ビーチチェアーのところへ移動し腰かけてから、私は言葉を続ける。"
translation = "비치체어로 이동해 걸터앉은 뒤 나는 말을 잇는다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「前に家で話した時、私が逃げ出しちゃったけど……『夢』のこと、話してもいい？」"
translation = "「전에 집에서 이야기했을 때 내가 도망쳐 버렸지만…… 『꿈』 이야기, 해도 될까?」"

[[dialogue]]
speaker = "unk"
original = "隣のビーチチェアーに腰かけたクロトは、頷く。"
translation = "옆 비치체어에 앉은 쿠로토는 고개를 끄덕인다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……私ね、あの夢を見るまで、クロトとああいう関係になる自分とか、想像したことなかった」"
translation = "「……나 말이야, 그 꿈을 보기 전까지 쿠로토와 그런 관계가 되는 자신 같은 거 상상해 본 적 없었어」"

[[dialogue]]
speaker = "unk"
original = "平行世界で恋人関係になっていた光景を思い出す。"
translation = "평행 세계에서 연인 관계였던 광경을 떠올린다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「だから、戸惑っちゃったのよ。今まで親子として一緒に過ごして来たから、なおさら……」"
translation = "「그래서 당황했던 거야. 지금까지 부모 자식으로서 함께 지내왔으니까 더더욱……」"

[[dialogue]]
speaker = "unk"
original = "夢を見た後、母さんは俺のこと――気持ち悪いと思った？"
translation = "꿈을 본 뒤에 엄마는 나를── 기분 나쁘다고 생각했어?"

[[dialogue]]
speaker = "unk"
original = "クロトが告げたのは、私がこの前逃げてしまった時に聞きそびれた、言葉の続きだった。"
translation = "쿠로토가 꺼낸 말은 내가 저번에 도망쳤을 때 듣지 못했던 말의 뒷부분이었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……ううん、そんなことないわ」"
translation = "「……아니, 그렇지 않아」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「むしろ私は――ドキドキしちゃってた」"
translation = "「오히려 나는── 두근거려 버렸어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「恥ずかしいけど、本当は私、クロトのことを１人の男の子として意識しちゃって、顔もまともに見れなくなっちゃってたのよ」"
translation = "「부끄럽지만 사실 나 쿠로토를 한 명의 남자로 의식해 버려서 얼굴도 제대로 못 보게 됐었어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「私、魔女だし、これまで男性経験も恋愛経験も皆無だったから、そういう相手として誰かを意識するっていうのも、今回が初めてでね……」"
translation = "「나 마녀이기도 하고 지금까지 남성 경험도 연애 경험도 전무했으니까 그런 상대로 누군가를 의식한다는 것도 이번이 처음이라서……」"

[[dialogue]]
speaker = "unk"
original = "俺も母さんと同じだ"
translation = "나도 엄마와 같아"

[[dialogue]]
speaker = "unk"
original = "――それで俺、その後に色々考えたんだ。"
translation = "──그래서 나 그 뒤로 여러 가지로 생각했어."

[[dialogue]]
speaker = "unk"
original = "クロトはそう言葉を続けて。"
translation = "쿠로토는 그렇게 말을 이어가고."

[[dialogue]]
speaker = "unk"
original = "母さん……いや、リノさん"
translation = "엄마…… 아니, 리노 씨"

[[dialogue]]
speaker = "unk"
original = "クロトは私に向き直り、目を真っすぐに見つめながら、告げる。"
translation = "쿠로토는 나를 향해 고개를 돌리고 눈을 똑바로 쳐다보며 말한다."

[[dialogue]]
speaker = "unk"
original = "俺の恋人になって欲しい"
translation = "내 연인이 되어줘"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "――簡単には言葉に表せないくらい色々な気持ちが入り混じってるけど、リノさんのこと、間違いなく１人の女性として好きだと感じているから。"
translation = "──간단히 말로는 다 표현할 수 없을 정도로 여러 마음이 섞여 있지만 리노 씨를 틀림없이 한 명의 여성으로서 좋아한다고 느끼고 있으니까."

[[dialogue]]
speaker = "unk"
original = "――これからもずっと、あなたは俺の母親で、俺は息子だけど、それでも恋人になって欲しいんだ。"
translation = "──앞으로도 계속 당신은 내 어머니고 나는 아들이겠지만 그래도 연인이 되어줬으면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "クロトは真剣な顔で、そう告げた。"
translation = "쿠로토는 진지한 얼굴로 그렇게 말했다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……クロト、私ね」"
translation = "「……쿠로토, 나 말이야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「正直に言うと、今もまだ、自分の気持ちにはっきりと整理がついているわけじゃないの」"
translation = "「솔직히 말하면 지금도 아직 내 마음에 확실히 정리가 된 건 아니야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「今日は素直に今の気持ちを伝えて、変なわだかまりが解けたらってそう思ってた」"
translation = "「오늘은 솔직하게 지금 기분을 전하고 이상한 앙금이 풀렸으면 좋겠다고 그렇게 생각했어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「だから、クロトが言ってくれたのと同じで、私も色々複雑な気持ちがあって、簡単に答えは出せないけど……」"
translation = "「그러니까 쿠로토가 말해준 것과 마찬가지로 나도 여러 복잡한 마음이 있어서 쉽게 답은 낼 수 없지만……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「でも、１つはっきりと言えるのは――」"
translation = "「하지만 한 가지 확실히 말할 수 있는 건──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「これからどっちの道を選ぶのだとしても、クロトは私にとって、世界一大切な男の子ってことよ」"
translation = "「앞으로 어느 길을 선택하든 쿠로토는 나에게 세상에서 제일 소중한 소년이라는 거야」"

[[dialogue]]
speaker = "unk"
original = "俺にとっても母さんは、世界でいちばん大切な女性だよ"
translation = "나에게도 엄마는 세상에서 가장 소중한 여성이야"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ん……♪\u3000ありがとう」"
translation = "「응……♪ 고마워」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「お母さん、すごく嬉しいわ」"
translation = "「엄마, 정말 기쁘네」"

[[dialogue]]
speaker = "unk"
original = "ふと、クロトは私に手を差し伸べる。"
translation = "문득 쿠로토는 나에게 손을 내민다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「え？\u3000――せっかく海に来たから、遊びたい？」"
translation = "「에? ──기왕 바다에 왔으니까 놀고 싶다고?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ、なら男の子として、お母さんのことエスコートしてくれるかしら？」"
translation = "「후후, 그럼 남자로서 엄마를 에스코트해 주겠니?」"

[[dialogue]]
speaker = "unk"
original = "私がその手を取ると、彼は嬉しそうな微笑みと共に優しく握り返してくれる。"
translation = "내가 그 손을 잡자 그는 기쁜 미소와 함께 부드럽게 다시 쥐어준다."

[[dialogue]]
speaker = "unk"
original = "もちろん、喜んで"
translation = "물론, 기꺼이"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker = "unk"
original = "その時、私の心臓がまた、ドキッと高鳴った。"
translation = "그때 내 심장이 다시 두근하고 뛰었다."

[[dialogue]]
speaker = "unk"
original = "クロトに手を引かれて、立ち上がり、前に進む。"
translation = "쿠로토의 손에 이끌려 일어나 앞으로 나아간다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（これから先、私たち２人の未来は、どうなって行くのだろう）"
translation = "(앞으로 우리 두 사람의 미래는 어떻게 되어갈까)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（不安はもちろんある。でも――）"
translation = "(불안은 물론 있어. 하지만――)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（今この瞬間、目の前に広がる鮮やかで美しい青い海のように、素敵なものだったらいいなと期待してしまう）"
translation = "(지금 이 순간, 눈앞에 펼쳐지는 선명하고 아름다운 푸른 바다처럼, 멋진 것이라면 좋겠다고 기대하게 돼)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（――どうか、幸せでありますように）"
translation = "(――부디, 행복하기를)"

[[dialogue]]
speaker = "unk"
original = "そう願いながら、私は世界でいちばん大切な手を、今度はしっかりと離さずに、握り返すのだった――"
translation = "그렇게 바라며, 나는 세상에서 가장 소중한 손을, 이번에는 확실히 놓지 않고 다시 맞잡는 것이었다――"

