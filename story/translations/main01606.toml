[[dialogue]]
speaker = "unk"
original = "第７話,太陽の魔王,B"
translation = "제7화, 태양의 마왕, B"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「さあ……姉さん。これで邪魔は入りません」"
translation = "「자…… 언니. 이걸로 방해는 들어오지 않습니다」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「その仮面を捨てて……素顔を見せてください。もう一度」"
translation = "「그 가면을 버리고…… 맨얼굴을 보여주세요. 다시 한번」"

[[dialogue]]
speaker = "アポロ"
original = "「仮面を……捨てる……」"
translation = "「가면을…… 버린다……」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ。『アポロごっこ』なら──少しは休んだっていいはずです。姉さんばかりヒーローを演じて、ずるいですよ」"
translation = "「네. 『아폴로 놀이』라면── 조금은 쉬어도 괜찮을 거예요. 언니만 히어로를 연기하고, 치사해요」"

[[dialogue]]
speaker = "unk"
original = "熱くも温かいフィオナのオーラが、アポロを抱きしめるように包み込む。"
translation = "뜨거우면서도 따뜻한 피오나의 오라가, 아폴로를 안아주듯이 감싼다."

[[dialogue]]
speaker = "リノ"
original = "（そうね……説得するなら、私なんかよりフィオナちゃんのほうが……）"
translation = "（그렇지…… 설득하는 거라면, 나 같은 것보다 피오나짱이……）"

[[dialogue]]
speaker = "クロト"
original = "（ああ──最後まで戦わずに済む方法を。フィオナらしい）"
translation = "（아아── 마지막까지 싸우지 않고 끝낼 방법을. 피오나답네）"

[[dialogue]]
speaker = "unk"
original = "そう──フィオナは太陽。"
translation = "그래── 피오나는 태양."

[[dialogue]]
speaker = "unk"
original = "決して、北風のように無理強いはせず、ただ旅人の意志を促せる存在なんだ。"
translation = "결코, 북풍처럼 억지로 강요하지 않고, 그저 여행자의 의지를 북돋을 수 있는 존재인 것이다."

[[dialogue]]
speaker = "アポロ"
original = "「ああ……そうだ。そうだな──あたしは……お姉さんだもんな」"
translation = "「아아…… 그래. 그렇구나── 나는…… 언니잖아」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「はい。帰りましょう、姉さん──我が家に」"
translation = "「네. 돌아가요, 언니── 우리 집으로」"

[[dialogue]]
speaker = "unk"
original = "魔王として目覚めたフィオナの──"
translation = "마왕으로서 눈을 뜬 피오나의──"

[[dialogue]]
speaker = "unk"
original = "優しさの光ともいうべき温かみが、硬く閉ざされていたアポロの氷を溶かし始める。"
translation = "상냥함의 빛이라고도 할 수 있는 따스함이, 단단히 닫혀 있던 아폴로의 얼음을 녹이기 시작한다."

[[dialogue]]
speaker = "unk"
original = "──が──"
translation = "──하지만──"

[[dialogue]]
speaker = "アポロ"
original = "「──ぐあああああぁぁぁぁぁっっっ…………！！」"
translation = "「──그아아아아아아아아아아아아앗…………!!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「！\u3000姉さん──っ……！？」"
translation = "「! 언니──읏……!?」"

[[dialogue]]
speaker = "アポロ"
original = "「ぐ……っ！\u3000ぐ、ぐぅぅ──っ……違う……あたしは──使徒……リクリエの……そのために、来たんだ……っ……！」"
translation = "「크……읏! 크, 크으으──읏…… 달라…… 나는── 사도…… 리크리에의…… 그것을 위해서, 온 거다……읏……!」"

[[dialogue]]
speaker = "unk"
original = "今、まさに手をかけていた仮面の瘴気がよどみを増す。"
translation = "지금, 막 손을 대고 있던 가면의 장기가 침체를 더한다."

[[dialogue]]
speaker = "unk"
original = "アポロの全身を包み込むほどに拡散する濃紫のオーラ──"
translation = "아폴로의 전신을 감쌀 정도로 확산되는 짙은 보랏빛 오라──"

[[dialogue]]
speaker = "アポロ"
original = "「あ……あたしは──あたしは、魔王を……だから……もう、人間なんかには────」"
translation = "「아…… 나는── 나는, 마왕을…… 그러니까…… 이제, 인간 따위에게는────」"

[[dialogue]]
speaker = "ソフィア"
original = "「！？\u3000仮面が、また──！」"
translation = "「!? 가면이, 또──!」"

[[dialogue]]
speaker = "ユウリ"
original = "「キリねえな、くそ──自分でも剥がせねえってのかよ！」"
translation = "「끝이 없네, 젠장── 스스로도 못 벗긴다는 거냐!」"

[[dialogue]]
speaker = "アポロ"
original = "「リクリエ──そうだ、リクリエ……再創生……起コセ……魔王──倒ス…………ッ！」"
translation = "「리크리에── 그래, 리크리에…… 재창생…… 일어나라…… 마왕── 쓰러뜨린다…………읏!」"

[[dialogue]]
speaker = "クロト"
original = "「アポロ自身でも抑制できない──なんて支配だ……！」"
translation = "「아폴로 스스로도 억제할 수 없다니── 이런 지배라니……!」"

[[dialogue]]
speaker = "unk"
original = "あの仮面がある限り──アポロは決して解放されない。"
translation = "저 가면이 있는 한── 아폴로는 결코 해방되지 않는다."

[[dialogue]]
speaker = "アポロ"
original = "「はぁ、はぁ……うるさい。うるさいぞ。あたしはただ正しいことをしてるだけなのに、どうしてこんなに苦しいんだ」"
translation = "「하아, 하아…… 시끄러워. 시끄럽다고. 나는 그저 올바른 일을 하고 있을 뿐인데, 왜 이렇게 괴로운 거냐」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「それは──姉さんの本心が、反発しているからです」"
translation = "「그것은── 언니의 본심이, 반발하고 있기 때문입니다」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「気を強く持って。私のところへ戻りたいと、また願ってください。必ず助け出してみせます──」"
translation = "「마음을 굳게 먹으세요. 제게로 돌아오고 싶다고, 다시 바라세요. 반드시 구해내 보이겠습니다──」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ……黙れ黙れ！\u3000後はここだけ……アルタイルだけなんだ──世界の完成は、近づいてるんだ……！」"
translation = "「아아…… 닥쳐 닥쳐! 남은 건 여기뿐…… 알타이르뿐이다── 세계의 완성은, 다가오고 있어……!」"

[[dialogue]]
speaker = "アポロ"
original = "「オマエたちみたいな塵屑は……宇宙に呑まれて消えればいいッ！」"
translation = "「너희들 같은 티끌은…… 우주에 삼켜져 사라져 버리면 돼!」"

[[dialogue]]
speaker = "アポロ"
original = "「彗星──ダストストーム！！」"
translation = "「혜성── 더스트 스톰!!」"

[[dialogue]]
speaker = "クロト"
original = "「────ッ！」"
translation = "「────읏!」"

[[dialogue]]
speaker = "unk"
original = "アポロを中心に──凄絶な輝きの嵐が巻き起こった。"
translation = "아폴로를 중심으로── 처절한 섬광의 폭풍이 휘몰아쳤다."

[[dialogue]]
speaker = "unk"
original = "万を越える彗星が尾を引いて、魚群のように頂上一帯へ渦を巻く！"
translation = "만을 넘는 혜성이 꼬리를 끌며, 물고기 떼처럼 정상 일대로 소용돌이친다!"

[[dialogue]]
speaker = "モンスター"
original = "「──ギアアアアアアッッ────！！」"
translation = "「──기아아아아아앗────!!」"

[[dialogue]]
speaker = "モンスター"
original = "「──グオオオオオオオッッッ………………！！！」"
translation = "「──그오오오오오오오옷옷옷………………!!!」"

[[dialogue]]
speaker = "ユウリ"
original = "「なっ……なんつう威力だよ……！？」"
translation = "「뭣…… 이 무슨 위력이냐……!?」"

[[dialogue]]
speaker = "アナ"
original = "「彗星の嵐──当たれば即死級です！」"
translation = "「혜성의 폭풍── 맞으면 즉사급입니다!」"

[[dialogue]]
speaker = "unk"
original = "敵味方無差別の超広範囲攻撃──"
translation = "적과 아군을 가리지 않는 초광범위 공격──"

[[dialogue]]
speaker = "unk"
original = "きらめく彗星は一瞬掠めただけでも、周囲のモンスターたちの図体を爆発四散させていった。"
translation = "반짝이는 혜성은 한순간 스치기만 해도, 주위 몬스터들의 몸뚱이를 폭발 사산시켰다."

[[dialogue]]
speaker = "クロト"
original = "「全霊で食い止める──いけるか、フィオナ！」"
translation = "「전력으로 막는다── 할 수 있겠어, 피오나!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「ええ──この命に、代えても──！」"
translation = "「네── 이 목숨과, 바꿔서라도──!」"

[[dialogue]]
speaker = "ユウリ"
original = "「おおおおお────！」"
translation = "「오오오오오────!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ここさえ凌げば──チャンスはあります──っ！」"
translation = "「여기만 버텨낸다면── 찬스는 있습니다──읏!」"

[[dialogue]]
speaker = "unk"
original = "一瞬でも垣間見えたアポロの正気を希望に、俺たちは全力で抗う。"
translation = "한순간이라도 엿보인 아폴로의 제정신을 희망 삼아, 우리는 전력으로 맞선다."

[[dialogue]]
speaker = "unk"
original = "だが……"
translation = "하지만……"

[[dialogue]]
speaker = "アポロ"
original = "「広がれ……もっと──もっとだ……！」"
translation = "「퍼져라…… 더── 더!」"

[[dialogue]]
speaker = "アポロ"
original = "「もういい──何もかも──滅びろ────ッッ！！」"
translation = "「이제 됐어── 모든 것이── 멸망해라────!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「──ッッ！」"
translation = "「──읏!」"

[[dialogue]]
speaker = "リノ"
original = "「さらに拡散──！」"
translation = "「더욱 확산──!」"

[[dialogue]]
speaker = "unk"
original = "渦巻いていた彗星の嵐が、爆発するかのように四方八方へ飛散した。"
translation = "소용돌이치던 혜성의 폭풍이, 폭발하듯이 사방팔방으로 비산했다."

[[dialogue]]
speaker = "unk"
original = "それでいて、威力の濃度はまるで減衰していない──"
translation = "그러면서도, 위력의 농도는 전혀 감쇠하지 않았다──"

[[dialogue]]
speaker = "クロト"
original = "「北と東は俺がカバーする！\u3000流星群と大差ないエネルギーの爆散だ、一発も漏らすな！」"
translation = "「북쪽과 동쪽은 내가 커버한다! 유성군과 다를 바 없는 에너지의 폭산이다, 한 발도 놓치지 마!」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
original = "「私はこちらを──ですが──」"
translation = "「저는 이쪽을── 하지만──」"

[[dialogue]]
speaker = "ルリエル"
original = "「広範囲すぎます──とてもカバーしきれません！」"
translation = "「너무 광범위합니다── 도저히 커버할 수 없습니다!」"

[[dialogue]]
speaker = "unk"
original = "撃ち落としても撃ち落としても、襲いくる彗星は限りない。"
translation = "쏘아 떨어뜨려도 쏘아 떨어뜨려도, 덮쳐오는 혜성은 끝이 없다."

[[dialogue]]
speaker = "リノ"
original = "「まずいわクロト──地上に被害が及ぶわよ！」"
translation = "「큰일이야 쿠로토── 지상에 피해가 미치겠어!」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "サーシャ"
original = "「プリマステラ達だけじゃ……これを凌ぐのは無理よ！」"
translation = "「프리마 스텔라들만으로는…… 이걸 버텨내는 건 무리야!」"

[[dialogue]]
speaker = "unk"
original = "さらにこの規模──地上どころか、人間界全土に広がりかねない！"
translation = "게다가 이 규모── 지상은 물론, 인간계 전역에 퍼질 수도 있다!"

[[dialogue]]
speaker = "マトイ"
original = "「ダメッそんなのっ！\u3000あっ、あたしが降りて──助けにいくよっ！」"
translation = "「안 돼! 그런 거! 아, 내가 내려가서── 도우러 갈게!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「無茶を言うニャン！\u3000今ここから離れたら、天蓋で飛べなくなって墜落するだけニャンよ！」"
translation = "「무리한 소리 하지 마라냥! 지금 여기서 벗어나면, 천개 때문에 날 수 없게 되어 추락할 뿐이다냥!」"

[[dialogue]]
speaker = "マトイ"
original = "「だ……だって、このままじゃ──！」"
translation = "「하…… 하지만, 이대로는──!」"

[[dialogue]]
speaker = "リノ"
original = "「っ──ならせめて、私だけでも──」"
translation = "「읏── 그럼 하다못해, 나만이라도──」"

[[dialogue]]
speaker = "クロト"
original = "（くそっ、どうすれば──ここを離れるわけにも──）"
translation = "（젠장, 어떻게 해야── 여기를 떠날 수도──）"

[[dialogue]]
speaker = "unk"
original = "地上の星騎士たちを信じるしかないのか？"
translation = "지상의 성기사들을 믿을 수밖에 없는 건가?"

[[dialogue]]
speaker = "unk"
original = "無謀だ。宇宙規模の災害を前に、限られた人類じゃどうしようもない。"
translation = "무모하다. 우주 규모의 재해 앞에서, 한정된 인류로는 어쩔 도리가 없다."

[[dialogue]]
speaker = "unk"
original = "諦めかけた、その時──声が聞こえた。"
translation = "포기하려던, 그때── 목소리가 들렸다."

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「──グレート・ウォール──」"
translation = "「──그레이트 월──」"

[[dialogue]]
speaker = "マトイ"
original = "「え……な、何、今の……？」"
translation = "「에…… 뭐, 뭐야, 방금 건……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ガキんちょの声──しかも、これって……！」"
translation = "「꼬맹이 목소리── 게다가, 이거……!」"

[[dialogue]]
speaker = "unk"
original = "俺たちの立つ頂上、その周囲に──光の結界が張られていた。"
translation = "우리가 서 있는 정상, 그 주위에── 빛의 결계가 쳐져 있었다."

[[dialogue]]
speaker = "unk"
original = "結界と言っても、生半可な厚みじゃない。"
translation = "결계라고 해도, 어설픈 두께가 아니다."

[[dialogue]]
speaker = "unk"
original = "彗星の嵐さえ完全に内部へ封じきる、前代未聞の大結界──"
translation = "혜성의 폭풍조차 완전히 내부로 봉쇄하는, 전대미문의 대결계──"

[[dialogue]]
speaker = "リノ"
original = "「これは──グレート・ウォールの……局所展開！？」"
translation = "「이건── 그레이트 월의…… 국소 전개!?」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「やれやれ……待ちきれんので使わせてもらったぞ」"
translation = "「이런이런…… 기다릴 수 없어 쓰게 해 주었다」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「とはいえ、これはあくまでも卵の段階。いつまでもこの範囲にリクリエの<ruby>本波<rt>ほんぱ</rt></ruby>を抑えられるとは思えん」"
translation = "「그렇다고는 하나, 이는 어디까지나 알의 단계. 언제까지나 이 범위에 리크리에의 본파를 억누를 수 있으리라 생각지 않는다」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「もし主らが散るようなら、こちらの予定通り展開させてもらう。が、粘れるなら好きにやるとよい」"
translation = "「만약 너희들이 흩어진다면, 이쪽의 예정대로 전개시키겠다. 허나, 버틸 수 있다면 마음대로 하거라」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「その限られた範囲内に、使徒の持つリクリエすべてのエネルギーが集中する──」"
translation = "「그 한정된 범위 내에, 사도가 가진 리크리에 모든 에너지가 집중될 것이다──」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「せいぜい気張るがよいぞ。金網<b>ですまっち</b>というやつだ」"
translation = "「부디 힘쓰도록 하거라. 철망 <b>데스매치</b>라는 것이다」"

[[dialogue]]
speaker = "クロト"
original = "「これが本来──人間界全域に張られる計画だった、グレート・ウォール……」"
translation = "「이것이 본래── 인간계 전역에 쳐질 계획이었던, 그레이트 월……」"

[[dialogue]]
speaker = "アナ"
original = "「恐ろしいまでの強度──彗星も、流星群も、モンスター達の暴走も完全に防いでいます」"
translation = "「무서울 정도의 강도── 혜성도, 유성군도, 몬스터들의 폭주도 완전히 막고 있습니다」"

[[dialogue]]
speaker = "リノ"
original = "「クラウディア様は──どうやら、先んじてここだけに結界を張ったみたい」"
translation = "「클라우디아 님은── 아무래도, 미리 이곳에만 결계를 친 것 같아」"

[[dialogue]]
speaker = "リノ"
original = "「私たちも使徒さんも、まとめて飲み込むことで」"
translation = "「우리도 사도 씨도, 한꺼번에 집어삼키는 것으로」"

[[dialogue]]
speaker = "unk"
original = "元凶──使徒が範囲に収められていることに変わりはない。"
translation = "원흉── 사도가 범위 안에 갇혀 있다는 것에는 변함이 없다."

[[dialogue]]
speaker = "unk"
original = "言わば、これからここで巻き起こる災禍は、リクリエが人間界全土を襲う前哨戦だ。"
translation = "말하자면, 이제부터 이곳에서 벌어질 재앙은, 리크리에가 인간계 전역을 덮치기 위한 전초전이다."

[[dialogue]]
speaker = "ソフィア"
original = "「私たちの逃げ場も封じられている──と」"
translation = "「우리의 도피처도 봉쇄되어 있다──는 거군요」"

[[dialogue]]
speaker = "セーラ"
original = "「宇宙規模の厄災を抑えるにしちゃ……激狭なフィールドじゃんね」"
translation = "「우주 규모의 재앙을 막기에는…… 너무 좁은 필드잖아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも──下に被害が及ぶより全然いいわ！」"
translation = "「하지만── 아래에 피해가 미치는 것보다 훨씬 나아!」"

[[dialogue]]
speaker = "ユウリ"
original = "「ああ。上等だ！\u3000最初から逃げるつもりなんざねえ！」"
translation = "「아아. 좋다! 처음부터 도망칠 생각 따위 없었어!」"

[[dialogue]]
speaker = "unk"
original = "救済か、全滅か。"
translation = "구원인가, 전멸인가."

[[dialogue]]
speaker = "unk"
original = "お互い全力でぶつかり合うことによってしか──この先の結末は生まれない。"
translation = "서로 전력으로 부딪치는 것에 의해서만── 이 앞의 결말은 탄생한다."

