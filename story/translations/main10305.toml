[[dialogue]]
speaker = "unk"
original = "第５話,破られた約束,B"
translation = "제5화, 깨진 약속, B"

[[dialogue]]
speaker = "シルヴィ"
original = "「ごちそう様！」"
translation = "「잘 먹었어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ごちそう様でした」"
translation = "「잘 먹었습니다」"

[[dialogue]]
speaker = "蛍火"
original = "「お粗末様です」"
translation = "「변변치 못했습니다」"

[[dialogue]]
speaker = "蛍火"
original = "「では、私は後片付けしていますので、おふたりはどうぞごゆっくり」"
translation = "「그럼, 저는 뒷정리를 할 테니 두 분은 부디 편히 쉬세요」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ありがとっ」"
translation = "「고마워」"

[[dialogue]]
speaker = "サーシャ"
original = "「お疲れ様～」"
translation = "「수고했어~」"

[[dialogue]]
speaker = "サーシャ"
original = "「シルヴィ。今日、このあと時間あるかしら？」"
translation = "「실비. 오늘 이다음에 시간 있니?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「大丈夫！\u3000今日はなんもないよ！」"
translation = "「괜찮아! 오늘은 아무것도 없어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「じゃあ、このまま大聖堂に行ってみない？」"
translation = "「그럼, 이대로 대성당에 가보지 않을래?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うっ…………」"
translation = "「윽…………」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ……とって食べたりしないわよ～♪」"
translation = "「후훗…… 잡아먹거나 하지 않는단다~♪」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……サーシャ怒ってる？\u3000怒ってるよね？」"
translation = "「……사샤 화났어? 화난 거지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「怒ってないわ～。でも、そう思うなら一緒に来て」"
translation = "「안 화났어~. 하지만 그렇게 생각한다면 같이 와줘」"

[[dialogue]]
speaker = "シルヴィ"
original = "「もう、分かったよぅ……」"
translation = "「정말, 알았어어……」"

[[dialogue]]
speaker = "unk"
original = "ここ大聖堂は女神の信仰の中心地だ。"
translation = "이곳 대성당은 여신 신앙의 중심지다."

[[dialogue]]
speaker = "unk"
original = "人々に星力を与え、星騎士を誕生させたのも女神とされている。"
translation = "사람들에게 성력을 주고, 성기사를 탄생시킨 것도 여신이라고 전해진다."

[[dialogue]]
speaker = "unk"
original = "星騎士たちにとって、ここは己のうちに秘めた誓いや祈りを捧げる場所でもあるのだ。"
translation = "성기사들에게 이곳은 자신의 내면에 간직한 맹세나 기도를 바치는 장소이기도 하다."

[[dialogue]]
speaker = "サーシャ"
original = "「ふたりでここに来るのも久しぶりね～♪」"
translation = "「둘이서 여기 오는 것도 오랜만이네~♪」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うん、そうだね……」"
translation = "「응, 그렇네……」"

[[dialogue]]
speaker = "サーシャ"
original = "「知ってる？\u3000ここにあるのは『太陽の壁画』だけど、実は別に『月の壁画』があって……あれ？\u3000これ言っていいのかしら？」"
translation = "「알고 있니? 여기 있는 건 『태양의 벽화』지만, 사실 따로 『달의 벽화』가 있어서…… 어라? 이거 말해도 되려나?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「え！？\u3000そこまで言ってやめるの！？」"
translation = "「에!? 거기까지 말하고 관두는 거야!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「この先はフィオナちゃんに許可をとらないとだわ～♪」"
translation = "「이 앞은 피오나짱에게 허락을 받아야겠어~♪」"

[[dialogue]]
speaker = "シルヴィ"
original = "「めっちゃ気になる～！」"
translation = "「엄청 신경 쓰여~!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ええと、壁画に描かれてるのって……どちらも魔王だよね？」"
translation = "「그나저나, 벽화에 그려진 건…… 둘 다 마왕이지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよ～、でもそれぞれの壁画で別な描かれ方をしているの」"
translation = "「그래~, 하지만 각각의 벽화에서 다르게 묘사되고 있어」"

[[dialogue]]
speaker = "シルヴィ"
original = "「へぇ……そうなんだ……」"
translation = "「헤에…… 그렇구나……」"

[[dialogue]]
speaker = "サーシャ"
original = "（『太陽の壁画』の魔王は大悪として描かれている。一般的に知られているのはこちらの方……）"
translation = "（『태양의 벽화』의 마왕은 대악으로 그려져 있어. 일반적으로 알려진 건 이쪽이지……）"

[[dialogue]]
speaker = "サーシャ"
original = "（一方で『月の壁画』で魔王はリクリエを撃退した英雄として描かれているのよね……）"
translation = "（한편으로 『달의 벽화』에서 마왕은 리크리에를 격퇴한 영웅으로 그려져 있단다……）"

[[dialogue]]
speaker = "シルヴィ"
original = "「魔王、か……そういえば、今の会長くんも魔王なんだっけ？」"
translation = "「마왕이라…… 그러고 보니 지금 회장군도 마왕이었지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうよ～とっても魔王だわ～」"
translation = "「그래~ 아주 마왕이란다~」"

[[dialogue]]
speaker = "サーシャ"
original = "「……今思えば、その言葉から今の星徒会は始まったのね」"
translation = "「……지금 생각하면, 그 말로부터 지금의 성도회는 시작되었지」"

[[dialogue]]
speaker = "サーシャ"
original = "「少し、聴いててくれる？」"
translation = "「조금, 들어줄래?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「うん……」"
translation = "「응……」"

[[dialogue]]
speaker = "サーシャ"
original = "「始まりは、会長くん──緋宮クロトくんが転入してきたことだった」"
translation = "「시작은, 회장군── 히노미야 쿠로토 군이 전학 온 것이었어」"

[[dialogue]]
speaker = "サーシャ"
original = "「転入初日、ヴィーナスちゃんが彼を魔王と呼び、御前試合を叩きつけた」"
translation = "「전학 첫날, 비너스짱이 그를 마왕이라 부르며 어전시합을 걸었지」"

[[dialogue]]
speaker = "サーシャ"
original = "「彼は見事、御前試合に勝利し、新星星徒会長に就任。対リクリエの最前線に立つことになる」"
translation = "「그는 멋지게 어전시합에서 승리해 신성 성도회장에 취임. 대 리크리에의 최전선에 서게 돼」"

[[dialogue]]
speaker = "サーシャ"
original = "「そして、会長くん、ヴィーナスちゃん、流星学園のフィオナちゃんを中心に私たちはフィーニスの塔を昇り、世界の真実を知ったわ」"
translation = "「그리고 회장군, 비너스짱, 유성학원의 피오나짱을 중심으로 우리는 피니스의 탑을 올라 세계의 진실을 알게 됐어」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ちょっと待って！\u3000フィーニスの塔って入っちゃいけないんじゃなかった！？\u3000めっちゃ怒られるやつ！」"
translation = "「잠깐 기다려! 피니스의 탑은 들어가면 안 되는 거 아니었어!? 엄청 혼나는 거잖아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「じゃあ今の話オフレコでお願いね～」"
translation = "「그럼 지금 이야기는 오프더레코드로 부탁해~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ぐだぐだだよ、もう！」"
translation = "「엉망진창이야, 정말!」"

[[dialogue]]
speaker = "サーシャ"
original = "「続けるわね？\u3000……塔の攻略中、ヴィーナスちゃんが<ruby>拐<rt>さら</rt></ruby>われてしまったの」"
translation = "「계속할게? ……탑 공략 중에 비너스짱이 납치당하고 말았어」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃんを追って、私たちは魔界レゾフに降り立った」"
translation = "「비너스짱을 쫓아 우리는 마계 레조프에 발을 들였지」"

[[dialogue]]
speaker = "シルヴィ"
original = "「え、どうやって魔界に？\u3000これも言えないやつ？」"
translation = "「에, 어떻게 마계에? 이것도 말하면 안 되는 거야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「もう、話の腰を折らないの」"
translation = "「정말, 말허리 자르지 말렴」"

[[dialogue]]
speaker = "シルヴィ"
original = "「今のあたしが悪いの！？」"
translation = "「지금은 내가 잘못한 거야!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「運よく占い師さんのおかげでヴィーナスちゃんは見つけられたけど、同時にスタンピードが発生して大変だったわ」"
translation = "「운 좋게 점술사님 덕분에 비너스짱을 찾을 수 있었지만, 동시에 스탬피드가 발생해서 큰일이었어」"

[[dialogue]]
speaker = "シルヴィ"
original = "「スタンピード……大いなる冬に連なる大寒波。レゾフの大災害……サーシャから何度か話してもらったよね？」"
translation = "「스탬피드…… 위대한 겨울로 이어지는 대한파. 레조프의 대재앙…… 사샤한테 몇 번 들었었지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ、ちょうどその時期だったの」"
translation = "「응, 딱 그 시기였어」"

[[dialogue]]
speaker = "サーシャ"
original = "「でも、これも流星の学園長の協力でなんとかなって、ヴィーナスちゃんを救出。その勢いのまま人間界に戻って、あとはみんなの知るとおりね」"
translation = "「하지만 이것도 유성의 학원장님의 협력으로 어떻게든 해결하고 비너스짱을 구출. 그 기세 그대로 인간계로 돌아와서, 그다음은 다들 아는 대로야」"

[[dialogue]]
speaker = "unk"
original = "新星・流星の両星徒会を中心に、学園に所属する全星騎士の尽力によってリクリエは退けられた。"
translation = "신성·유성 두 성도회를 중심으로 학원에 소속된 전 성기사의 노력에 의해 리크리에는 물리쳐졌다."

[[dialogue]]
speaker = "unk"
original = "──だがその中に、シルヴィはいなかった。"
translation = "──하지만 그 속에 실비는 없었다."

[[dialogue]]
speaker = "シルヴィ"
original = "「…………ぐすっ」"
translation = "「…………흑」"

[[dialogue]]
speaker = "サーシャ"
original = "「シルヴィ……」"
translation = "「실비……」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……なんであたしは、そこにいなかったんだろう」"
translation = "「……왜 나는 거기에 없었을까」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……約束、憶えてる？」"
translation = "「……약속, 기억해?」"

[[dialogue]]
speaker = "サーシャ"
original = "「もちろん、憶えてる。忘れたことなんてないわ」"
translation = "「물론 기억해. 잊은 적 없어」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ごめん、本当にごめん……なんて、なんて謝ったらいいか…………」"
translation = "「미안해, 정말 미안해…… 뭐라고, 뭐라고 사과해야 할지…………」"

[[dialogue]]
speaker = "サーシャ"
original = "「私こそごめんなさい。責めるつもりはなかったの。……だって、私は、ずっとあなたに助けられていたんだから」"
translation = "「나야말로 미안해. 탓하려던 게 아니었어. ……그치만, 나는 계속 너에게 도움을 받았으니까」"

