[[dialogue]]
speaker = "unk"
original = "放課後、俺は１人で残った雑務を片付けていると、外から急に大雨が降りだした音が聞こえてくる。"
translation = "방과 후, 내가 혼자 남은 잡무를 정리하고 있자니, 밖에서 갑자기 폭우가 쏟아지는 소리가 들려온다."

[[dialogue]]
speaker = "unk"
original = "今日は傘を持ってこなかったので、どうしたものかと頭を悩ませていると──"
translation = "오늘은 우산을 가져오지 않았기에, 어떻게 해야 하나 고민하고 있자──"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、会長くん。まだ仕事してたの？\u3000あんまり根詰めちゃダメよ～」"
translation = "「어머, 회장군. 아직 일하고 있었어? 너무 무리하면 안 돼~」"

[[dialogue]]
speaker = "サーシャ"
original = "「それにしてもすっごい雨ね～～。ちょっと外に出ただけなのに、びしょびしょになっちゃったわ～」"
translation = "「그나저나 엄청난 비네~~. 잠깐 밖에 나갔을 뿐인데, 흠뻑 젖어버렸어~」"

[[dialogue]]
speaker = "サーシャ"
original = "「タオル、タオルっと。……ん？\u3000こっちのほうじーっと見て、どうかしたの？」"
translation = "「수건, 수건……. 응? 이쪽을 빤히 쳐다보고, 무슨 일이야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ああ……そういうこと♪\u3000ふふっ、おっぱい拭く姿を見て、興奮しちゃったんだ♪\u3000お姉ちゃんのブラウス、少し透けちゃってるものね？」"
translation = "「아아…… 그런 거구나♪ 후훗, 가슴 닦는 모습을 보고 흥분해 버렸구나♪ 언니의 블라우스, 조금 비쳐 보이니까 말이야?」"

[[dialogue]]
speaker = "サーシャ"
original = "「今日はもう、みんな帰っちゃったみたいだし……」"
translation = "「오늘은 이제, 다들 돌아가 버린 것 같고……」"

[[dialogue]]
speaker = "サーシャ"
original = "「──お姉ちゃんのおっぱいで、甘えちゃう？」"
translation = "「──언니 가슴으로, 어리광 부릴래?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら。まだおっぱい見せただけなのに、むくむくっておち○ちん大きくなっちゃって。本当におっぱいが好きなのね～<emoji=heart04>\u3000ふふっ……可愛い♪」"
translation = "「어머어머. 아직 가슴을 보여줬을 뿐인데, 불끈불끈 자지가 커져 버려서. 정말로 가슴을 좋아하는구나~<emoji=heart04> 후훗…… 귀여워♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁぁ<emoji=heart04>\u3000おち○ちん、あっという間にパンパンにしちゃって、凄い……<emoji=heart04>\u3000太くて、逞しくて、男の子の濃い匂いがして……ふぅぅ<emoji=heart04>\u3000お姉ちゃんも興奮しちゃう……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 자지, 순식간에 팽팽해져 버려서, 대단해……<emoji=heart04> 굵고, 늠름하고, 남자아이의 진한 냄새가 나서…… 후우우<emoji=heart04> 언니도 흥분돼 버려……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「この子がいつも、お姉ちゃんを気持ち良くしてくれてる、のよね<emoji=heart04>\u3000ん、ふぅぅ……愛おしくて、癒してあげたくなっちゃう<emoji=heart04>」"
translation = "「이 아이가 언제나, 언니를 기분 좋게 해주고 있는 거네<emoji=heart04> 응, 후우우…… 사랑스러워서, 치유해 주고 싶어지네<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ねぇ、会長くん？\u3000今日は雨で少し寒かったし、おち○ちん、おっぱいに甘える前にお口で温めたほうがいいと思うんだけど……どうかしら♪」"
translation = "「저기, 회장 군? 오늘은 비가 와서 조금 추웠고, 자지, 가슴에 어리광 부리기 전에 입으로 따뜻하게 하는 게 좋을 것 같은데…… 어떨까나♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほら、あ～ん♪\u3000お口の中、ぽかぽかであったかいわよ～<emoji=heart04>？\u3000それに舌でぺろぺろするのも、気持ちいいの知ってるでしょ<emoji=heart04>？\u3000だから……ね<emoji=heart04>？」"
translation = "「자, 아~앙♪ 입안, 포근하고 따뜻하다구~<emoji=heart04>? 게다가 혀로 낼름낼름하는 것도, 기분 좋은 거 알고 있잖아<emoji=heart04>? 그러니까…… 응<emoji=heart04>?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、おち○ちんがぴくって反応したぁ<emoji=heart04>\u3000決まりね♪\u3000お姉ちゃんのお口でおち○ちん、いい子いい子してあげる♪」"
translation = "「후훗, 자지가 움찔하고 반응했다아<emoji=heart04> 결정됐네♪ 언니 입으로 자지, 착하다 착하다 해줄게♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「は～い。それじゃあ、お姉ちゃんのお口の中、入りますよ～♪」"
translation = "「네~에. 그럼, 언니 입속으로 들어갑니다~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ～むっ<emoji=heart04>」"
translation = "「아~암<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふっ、んちゅう……んはぁ……<emoji=heart04>\u3000おち○ちんからエッチな我慢汁出てる……んふぅ<emoji=heart04>\u3000口の中、男の子フェロモンがいっぱいで、くらくらしちゃう<emoji=heart04>」"
translation = "「응훗, 응츄…… 응하아……<emoji=heart04> 자지에서 야한 쿠퍼액이 나오고 있어…… 응후우<emoji=heart04> 입안이 남자아이 페로몬으로 가득해서, 어질어질해져 버려<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んあっ、ちゅぷっ、ちゅぽ、ちゅぽ<emoji=heart04>\u3000とってもエッチな味ぃ……れろ、れろちゅ、ちゅぱっ<emoji=heart04>\u3000媚薬みたいで興奮しちゃう……んちゅっ、ちゅれろ、ちゅるる<emoji=heart04>」"
translation = "「응앗, 츄풋, 츄포, 츄포<emoji=heart04> 정말 야한 맛이야…… 레로, 레로츄, 츄팟<emoji=heart04> 비약 같아서 흥분돼 버려…… 응츄, 츄레로, 츄루루<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふっ、会長くん、エッチな顔ぉ♪\u3000ちゅぽっ、れろちゅ、ちゅぶぶっ<emoji=heart04>\u3000お姉ちゃんのお口で気持ち良くなってくれて、嬉しい<emoji=heart04>\u3000ちゅぱっ、もっとしてあげちゃう<emoji=heart04>」"
translation = "「응훗, 회장군, 야한 표정♪ 츄폿, 레로츄, 츄부붓<emoji=heart04> 누나의 입으로 기분 좋아해 줘서, 기뻐<emoji=heart04> 츄팟, 더 많이 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁ……んちゅる、ちゅ、ちゅ、ちゅぶぶ<emoji=heart04>\u3000んちゅる……んふふ……んー<emoji=heart04>\u3000ちゅぷちゅぷちゅぷちゅぷ……んちゅう……ちゅぶ、ちゅう、ちゅるる<emoji=heart04>」"
translation = "「하아…… 응츄루, 츄, 츄, 츄부부<emoji=heart04> 응츄루…… 응후후…… 응─<emoji=heart04> 츄푸츄푸츄푸츄푸…… 응츄…… 츄부, 츄, 츄루루<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふふ<emoji=heart04>\u3000おち○ちん、こんなに逞しいのに敏感で可愛い♪\u3000ちゅぱっ、んちゅっ、ちゅぷっ……<emoji=heart04>\u3000いっぱいちゅーしましょうね～、んちゅる、ちゅっ、ちゅうっ<emoji=heart04>」"
translation = "「응후후<emoji=heart04> 자지, 이렇게 늠름한데 민감해서 귀여워♪ 츄팟, 응츄, 츄풋……<emoji=heart04> 잔뜩 뽀뽀하자~, 응츄루, 츄, 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふ、感じてる顔、きゅんとしちゃう……♪\u3000お姉ちゃんのお口ま○こ、も～っと激しくピストンしてあげる<emoji=heart04>♪\u3000ちゅぷっ、ちゅぽっ、ちゅぷぷっ──<emoji=heart04><emoji=heart04>」"
translation = "「응후, 느끼는 얼굴, 심쿵해 버려……♪ 누나의 입보지, 더~욱 격렬하게 피스톤 해줄게<emoji=heart04>♪ 츄풋, 츄폿, 츄푸풋──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁむっ、んっ<emoji=heart04><emoji=heart04>！\u3000んぢゅ、ぢゅぶ、ぢゅぶ、ぢゅぶっ<emoji=heart04>！\u3000んじゅる、ぢゅぶぶぶっ、んぢゅるっ<emoji=heart04><emoji=heart04>！\u3000んっ、んぽっ、んくちゅ、くちゅ、ちゅるうぅっ<emoji=heart04><emoji=heart04>！」"
translation = "「하아뭇, 응<emoji=heart04><emoji=heart04>! 응쥬, 쥬부, 쥬부, 쥬붓<emoji=heart04>! 응쥬루, 쥬부부붓, 응쥬룻<emoji=heart04><emoji=heart04>! 응, 응폿, 응쿠츄, 쿠츄, 츄루우웃<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふぅ<emoji=heart04>\u3000おひ○ひん膨らんできたぁ<emoji=heart04>\u3000んぢゅる、くちゅくちゅくちゅ、ぢゅるるるっ……<emoji=heart04>\u3000んはぁ、んっ、んぢゅるぅっ！\u3000ぢゅぽっ、ぢゅぽっ、ちゅるるっ<emoji=heart04>！」"
translation = "「응후우<emoji=heart04> 자지 부풀어 올랐어<emoji=heart04> 응쥬루, 쿠츄쿠츄쿠츄, 쥬루루룻……<emoji=heart04> 응하아, 응, 응쥬루웃! 쥬폿, 쥬폿, 츄루룻<emoji=heart04>!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あんっ、おひ○ひん熱くなってぇ……んちゅっ<emoji=heart04>\u3000ちゅぷっ、ちゅぶぶっ、ぢゅぶぶぶっ<emoji=heart04>\u3000んっ、お口に射精、したがってるぅ<emoji=heart04>\u3000んぢゅる、ぢゅるるるっ……んはぁっ<emoji=heart04>！」"
translation = "「안, 자지 뜨거워져서…… 응츄<emoji=heart04> 츄풋, 츄부붓, 쥬부부붓<emoji=heart04> 응, 입에 사정하고 싶어 해<emoji=heart04> 응쥬루, 쥬루루룻…… 응하앗<emoji=heart04>!」"

[[dialogue]]
speaker = "サーシャ"
original = "「でもぉ……んくちゅ、ちゅるるっ<emoji=heart04>\u3000……んふぅ。どれだけ気持ちよくても、まだ出しちゃダメよ？」"
translation = "「하지만…… 응쿠츄, 츄루룻<emoji=heart04> ……응후우. 아무리 기분 좋아도, 아직 싸면 안 돼?」"

[[dialogue]]
speaker = "サーシャ"
original = "「まだお姉ちゃんのおっぱいに、甘えられてないでしょ？\u3000お射精は、こっちでいっぱい……ね<emoji=heart04>？」"
translation = "「아직 누나의 가슴에 어리광 부리지 못했지? 사정은 이쪽에서 잔뜩…… 응<emoji=heart04>?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほら、会長くん、こっちにきて？\u3000ふぅぅ<emoji=heart04>\u3000……おち○ちんを舐めてたせいで、私も身体が火照っちゃってるの……<emoji=heart04>」"
translation = "「자, 회장군, 이쪽으로 올래? 후우우<emoji=heart04> ……자지를 핥은 탓에, 나도 몸이 달아올라 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "見れば、サーシャさんの乳首はぷっくりと勃起していて。"
translation = "보면, 사샤 씨의 젖꼭지는 봉긋하게 발기해 있어서."

[[dialogue]]
speaker = "unk"
original = "垂らした涎と汗でぬるぬるになった淫らな谷間に、俺は我慢できず──"
translation = "흘린 침과 땀으로 미끈미끈해진 음란한 골짜기에, 나는 참지 못하고──"

[[dialogue]]
speaker = "サーシャ"
original = "「ふあぁっ<emoji=heart04>\u3000おち○ちん、ぬぷぷってきたぁっ……<emoji=heart04><emoji=heart04>！\u3000はぁぁ……<emoji=heart04>\u3000熱くて、固くてぇ……<emoji=heart04>\u3000挟んだだけなのに、おっぱい感じちゃうぅ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 자지, 누푸푸하고 들어왔어……<emoji=heart04><emoji=heart04>! 하아아……<emoji=heart04> 뜨겁고, 딱딱해서……<emoji=heart04> 끼웠을 뿐인데, 가슴으로 느껴져어<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふふ……<emoji=heart04>\u3000会長くんも、天井見上げちゃって、そんなに気持ちよかったぁ<emoji=heart04>？」"
translation = "「응후후……<emoji=heart04> 회장 군도 천장을 올려다보고, 그렇게 기분 좋았어<emoji=heart04>?」"

[[dialogue]]
speaker = "サーシャ"
original = "「んっ<emoji=heart04>\u3000……おち○ちんびくびくってして……ひょっとして、挟んだだけでお射精、しそうになっちゃった？」"
translation = "「응<emoji=heart04> ……자지가 파르르 떨려서…… 혹시, 끼운 것만으로 사정, 해버릴 것 같아졌어?」"

[[dialogue]]
speaker = "クロト"
original = "「さ、サーシャさんが寸止めするから……！」"
translation = "「사, 사샤 씨가 가기 직전에 멈추니까……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ごめんね～<emoji=heart04>\u3000でも、おっぱいでおち○ちん、ズリズリしてぇ……<emoji=heart04>\u3000いーっぱい我慢してからぁ<emoji=heart04>\u3000思いっきりお射精したほうが、絶対気持ちいいわよ～？♪」"
translation = "「미안해~<emoji=heart04> 하지만, 가슴으로 자지, 문질문질해서……<emoji=heart04> 잔뜩 참았다가아<emoji=heart04> 마음껏 사정하는 편이, 분명 훨씬 기분 좋을 거야~?♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほら、私の大きなおっぱいだったら、会長くんのおっきなおち○ちんでも……んっ<emoji=heart04>\u3000全部包み込んで、受け止められるから<emoji=heart04>」"
translation = "「자, 내 커다란 가슴이라면, 회장 군의 커다란 자지라도…… 응<emoji=heart04> 전부 감싸서, 받아낼 수 있으니까<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「──会長くんの好きなように、動いて♪」"
translation = "「──회장 군이 하고 싶은 대로, 움직여줘♪」"

[[dialogue]]
speaker = "クロト"
original = "「っ……サーシャさん！」"
translation = "「윽…… 사샤 씨!」"

[[dialogue]]
speaker = "サーシャ"
original = "「んあぁっ<emoji=heart04>\u3000おっぱいに擦れる、おち○ちんの感触、カリが太くて凄いぃ<emoji=heart04>\u3000んっ、ふあぁっ<emoji=heart04>\u3000いつもこんな風におま○この中、かき回してるのね……えっちぃ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 가슴에 스치는, 자지의 감촉, 귀두가 굵어서 굉장해ぇ<emoji=heart04> 응, 후아앗<emoji=heart04> 항상 이런 식으로 보지 안을 휘젓고 있는 거구나…… 야해ぇ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「私も負けずにっ、はぁっ、んっ<emoji=heart04>\u3000動いちゃうんだからぁっ<emoji=heart04>」"
translation = "「나도 지지 않고, 하앗, 응<emoji=heart04> 움직여 버릴 거니까앗<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふぅぅっ、んっ、んんっ<emoji=heart04>\u3000こうしてあげると……<emoji=heart04>\u3000縦パイズリって言うのかしらっ？\u3000ほーら、ほーらぁ♪」"
translation = "「후우우, 응, 으응<emoji=heart04> 이렇게 해주면……<emoji=heart04> 세로 파이즈리라고 하는 걸까? 자아, 자아♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふっ、パンパン、パンパンって音が鳴ってぇ<emoji=heart04>\u3000はぁぁっ、まるでおっぱいと、セックスしてるみたい<emoji=heart04>\u3000んっ、はあっ、はあっ、んふぅ<emoji=heart04>」"
translation = "「응훗, 팡팡, 팡팡 소리가 나고ぉ<emoji=heart04> 하아아앗, 마치 가슴이랑 섹스하는 것 같아<emoji=heart04> 응, 하앗, 하앗, 응후우<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「サーシャさんも、おま○こでセックスしてる時みたいに、気持ち良さそうな顔してますよ……っ」"
translation = "「사샤 씨도, 보지로 섹스할 때처럼 기분 좋아 보이는 표정을 짓고 있어요……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あぁんっ<emoji=heart04>\u3000だって会長くんがぁ<emoji=heart04>\u3000いつもお姉ちゃんのおっぱい、いやらしく揉むからぁ<emoji=heart04><emoji=heart04>\u3000んっ、あっ、はあっ、ふあぁっ……<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 그치만 회장군이이<emoji=heart04> 항상 누나 가슴을 야하게 주무르니까아<emoji=heart04><emoji=heart04> 응, 앗, 하앗, 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「すっかり開発されて<emoji=heart04>\u3000おっぱいでも感じちゃう身体に<emoji=heart04>\u3000なっちゃったんじゃない<emoji=heart04><emoji=heart04>\u3000んっ、はぁんっ、んんっ、んあっ、んぅっ<emoji=heart04>」"
translation = "「완전히 개발돼서<emoji=heart04> 가슴으로도 느껴버리는 몸이<emoji=heart04> 되어버린 거 아니야아<emoji=heart04><emoji=heart04> 응, 하앙, 으응, 응앗, 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「はぁ、はぁ、だからぁ……<emoji=heart04>\u3000おっぱいの奥にね、おち○ちんが届くと……んあぁっ<emoji=heart04>\u3000おま○こ突かれてるみたいな、気分になっちゃうの<emoji=heart04>\u3000……ふあぁぁっ<emoji=heart04>」"
translation = "「하아, 하아, 그러니까아……<emoji=heart04> 가슴 깊숙한 곳에 있지, 자지가 닿으면…… 응아앗<emoji=heart04> 보지를 찔리는 것 같은 기분이 되어버려<emoji=heart04> ……후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「なら責任とって、サーシャさんのおっぱいマ○コ、気持ち良くしちゃいますからっ……！」"
translation = "「그럼 책임지고, 사샤 씨의 가슴 보지, 기분 좋게 해버릴 테니까요……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふあぁぁぁっ<emoji=heart04><emoji=heart04>！\u3000あっ<emoji=heart04>\u3000はあっ、はああっ<emoji=heart04>\u3000お姉ちゃんのおっぱい、おま○こみたいに犯されちゃってるぅ……<emoji=heart04>\u3000んっ、んっ……あぁんっ<emoji=heart04>！」"
translation = "「후아아아앗<emoji=heart04><emoji=heart04>! 앗<emoji=heart04> 하앗, 하아앗<emoji=heart04> 언니의 가슴, 보지처럼 범해지고 있어어……<emoji=heart04> 응, 응…… 아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "サーシャ"
original = "「おっぱいまたぁ、会長くんに開発されちゃうぅ<emoji=heart04><emoji=heart04>\u3000んはぁっ<emoji=heart04>\u3000んあぁっ、ふあぁぁんっ<emoji=heart04>\u3000おっぱいがおち○ちんの味、覚えちゃうのぉ<emoji=heart04>\u3000あっ、あっ、んあぁぁっ<emoji=heart04>！」"
translation = "「가슴이 또오, 회장군에게 개발되어 버려어<emoji=heart04><emoji=heart04> 응하앗<emoji=heart04> 응아앗, 후아아앙<emoji=heart04> 가슴이 자지의 맛, 기억해 버려어<emoji=heart04> 앗, 앗, 응아아앗<emoji=heart04>!」"

[[dialogue]]
speaker = "サーシャ"
original = "「おっぱい気持ち良くてぇ<emoji=heart04>\u3000乳首もぴんって立っちゃってるのぉ<emoji=heart04>\u3000んっ、はあぁっ、ふあぁぁんっ<emoji=heart04>！」"
translation = "「가슴 기분 좋아서어<emoji=heart04> 유두도 빳빳하게 서 버렸어어<emoji=heart04> 응, 하아앗, 후아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ、あぁんっ<emoji=heart04>\u3000乳首ダメ<emoji=heart04>\u3000コリコリするの、ダメぇ<emoji=heart04>\u3000凄く感じちゃうからぁ<emoji=heart04>！」"
translation = "「앗, 아앙<emoji=heart04> 유두 안 돼<emoji=heart04> 오물오물하는 거, 안 돼애<emoji=heart04> 엄청 느껴버리니까아!」"

[[dialogue]]
speaker = "サーシャ"
original = "「おっぱい犯されながら弄られたら<emoji=heart04>\u3000イッちゃう<emoji=heart04>\u3000すぐイッちゃうからぁっ<emoji=heart04>」"
translation = "「가슴 범해지면서 만져지면<emoji=heart04> 가버려<emoji=heart04> 금방 가버리니까앗<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ひあぁんっ<emoji=heart04>\u3000おっぱいでおち○ちん、気持ち良くしてあげようとっ<emoji=heart04>\u3000ふぁぁ<emoji=heart04>\u3000思ってたのにぃ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000これじゃ私の方がっ……あっ<emoji=heart04>\u3000ああっ<emoji=heart04>」"
translation = "「히아앙<emoji=heart04> 가슴으로 자지, 기분 좋게 해주려고오<emoji=heart04> 후아아<emoji=heart04> 생각했는데에<emoji=heart04> 하아앙<emoji=heart04> 이래선 내 쪽이…… 앗<emoji=heart04> 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺はサーシャさんと一緒に、気持ちよくなりたいですっ……！」"
translation = "「저는 사샤 씨와 함께, 기분 좋아지고 싶어요……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「そ、そんなことっ<emoji=heart04>\u3000……言われちゃったらぁ<emoji=heart04>\u3000あっ、ひっ、ひあぁぁっ！\u3000嬉しくてぇ、心も身体も、全部気持ちよくなっちゃうぅっ……あぁぁんっ<emoji=heart04>！」"
translation = "「그, 그런 거어<emoji=heart04> ……들어버리면어어<emoji=heart04> 앗, 히, 히아아앗! 기뻐서어, 마음도 몸도, 전부 기분 좋아져 버려어…… 아아앙<emoji=heart04>!」"

[[dialogue]]
speaker = "サーシャ"
original = "「わ、私もっ、会長くんと一緒に<emoji=heart04>\u3000気持ちよく、なるからぁ……<emoji=heart04>！\u3000はぁっ、はぁんっ、んあぁっ<emoji=heart04><emoji=heart04>」"
translation = "「저, 저도오, 회장군이랑 같이<emoji=heart04> 기분 좋게, 될 거니까아……! 하앗, 하앙, 응아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから……<emoji=heart04>\u3000たくましいおち○ちんで、お姉ちゃんのおっぱいマ○コ、いっぱい突いてぇっ<emoji=heart04>！」"
translation = "「그러니까……<emoji=heart04> 늠름한 자지로, 언니의 가슴 보지, 잔뜩 찔러줘어<emoji=heart04>!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……お姉ちゃんっ！」"
translation = "「윽…… 누나!」"

[[dialogue]]
speaker = "unk"
original = "俺はサーシャさんが興奮する、とっておきの呼び方をしながら、ピストンを激しくする。"
translation = "나는 사샤 씨가 흥분하는, 아껴둔 호칭을 부르면서, 피스톤을 격렬하게 한다."

[[dialogue]]
speaker = "サーシャ"
original = "「ふあああぁぁぁぁぁぁ～～～っ<emoji=heart04>\u3000お姉ちゃん呼びはずるいのぉ～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んあぁぁぁっ！\u3000はっ、はぁんっ、ふあぁぁぁんっ！」"
translation = "「후아아아아아아아아~~앗<emoji=heart04> 언니라고 부르는 건 반칙이야아~앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응아아아앗! 핫, 하앙, 후아아아앙!」"

[[dialogue]]
speaker = "サーシャ"
original = "「お、お姉ちゃんって言いながら、おっぱいマ○コ突くのダメぇっ<emoji=heart04>\u3000あぁんっ、んあっ、んあぁぁんっ、おっぱい気持ち良いっ、感じちゃうっ<emoji=heart04>\u3000はあぁぁんっ！」"
translation = "「어, 언니라고 말하면서, 가슴 보지 찌르는 거 안 돼애<emoji=heart04> 아앙, 응앗, 응아아앙, 가슴 기분 좋아, 느껴버려어<emoji=heart04> 하아아앙!」"

[[dialogue]]
speaker = "サーシャ"
original = "「もっと開発されちゃうぅっ<emoji=heart04>\u3000あっ、あっ、あぁぁんっ！\u3000パイズリで、気持ちよくなる癖、付いちゃうよぉっ<emoji=heart04>\u3000んっ、んあっ、ふあぁぁんっ！」"
translation = "「더 개발되어 버려어<emoji=heart04> 앗, 앗, 아아앙! 파이즈리로, 기분 좋아지는 버릇, 들어버려어<emoji=heart04> 응, 응앗, 후아아앙!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ、あっ、乳首コリコリ同時ダメぇ<emoji=heart04>\u3000んあぁぁっ、もう気持ちよくなってるっ<emoji=heart04>\u3000本気ピストンで気持ちよくなっちゃってるからぁっ<emoji=heart04>\u3000ひっ、んひっ、ひあぁんっ！」"
translation = "「앗, 앗, 유두 오물오물 동시에 하는 거 안 돼애<emoji=heart04> 응아아앗, 벌써 기분 좋아지고 있어어<emoji=heart04> 본격 피스톤으로 기분 좋아져 버렸으니까아앗<emoji=heart04> 히, 응히, 히아앙!」"

[[dialogue]]
speaker = "サーシャ"
original = "「んひぃぃっ、手綱みたいに乳首引っ張りながら、ピストンらめぇっ<emoji=heart04>\u3000あっ、あんっ、ひあぁっ！\u3000本当に癖になっちゃう。おっぱいが気持ちいいの、覚えちゃうのぉっ！」"
translation = "「응히이잇, 고삐처럼 유두 잡아당기면서, 피스톤 안 돼애<emoji=heart04> 앗, 앙, 히아앗! 정말 버릇 되어버려. 가슴이 기분 좋은 거, 기억해 버려어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふあぁぁんっ！\u3000おっぱいマ○コ、凄く感じちゃうぅっ……<emoji=heart04>\u3000ひああぁっ、気持ちいいのぉっ！\u3000あっ、あっ、乳首っ、もっと<emoji=heart04>\u3000もっとぉっ<emoji=heart04><emoji=heart04>\u3000んあぁぁんっ」"
translation = "「후아아앙! 가슴 보지, 엄청 느껴버려어……<emoji=heart04> 히아아앗, 기분 좋아아! 앗, 앗, 유두, 더<emoji=heart04> 더어<emoji=heart04><emoji=heart04> 응아아앙」"

[[dialogue]]
speaker = "サーシャ"
original = "「んっ、はあぁんっ、我慢汁の濃い雄の匂い、凄いぃっ<emoji=heart04>\u3000んあぁっ、会長くんも、そろそろイキそう？\u3000あっ、あっ、ふあぁぁんっ」"
translation = "「응, 하아앙, 쿠퍼액의 진한 수컷 냄새, 대단해애<emoji=heart04> 응아앗, 회장군도, 슬슬 갈 것 같아? 앗, 앗, 후아아앙」"

[[dialogue]]
speaker = "サーシャ"
original = "「お、お姉ちゃんも<emoji=heart04>\u3000おっぱいでイキそうなのっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000おっぱい気持ち良くて<emoji=heart04>\u3000乳首もジンジン<emoji=heart04>\u3000気持ちよくなっちゃってるのっ<emoji=heart04>\u3000はっ、んあぁぁんっ！」"
translation = "「어, 언니도<emoji=heart04> 가슴으로 갈 것 같아아<emoji=heart04> 하아앙<emoji=heart04> 가슴 기분 좋아서<emoji=heart04> 유두도 징징<emoji=heart04> 기분 좋아져 버렸어어<emoji=heart04> 핫, 응아아앙!」"

[[dialogue]]
speaker = "サーシャ"
original = "「きてっ、きてきてっ<emoji=heart04>\u3000お姉ちゃんのおっぱいマ○コ、いっぱい中出し<emoji=heart04><emoji=heart04>\u3000あぁんっ、ふあぁぁっ！\u3000お姉ちゃんと一緒にイッてぇっ！」"
translation = "「와줘, 와줘와줘어<emoji=heart04> 언니의 가슴 보지에, 잔뜩 질내사정<emoji=heart04><emoji=heart04> 아앙, 후아아앗! 언니랑 같이 가버려어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃんも動くからっ<emoji=heart04>\u3000パンパンッ、パンパン<emoji=heart04>\u3000あっ、あっ、んあぁっ<emoji=heart04>\u3000乳首、乳首もっとコリコリっ<emoji=heart04>\u3000あぁんっ、あんっ<emoji=heart04>\u3000はあぁぁんっ<emoji=heart04>」"
translation = "「언니도 움직일 테니까아<emoji=heart04> 퍽퍽, 퍽퍽<emoji=heart04> 앗, 앗, 응아앗<emoji=heart04> 유두, 유두 더 오물오물해줘어<emoji=heart04> 아앙, 앙<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「おっぱいでイク、イクイク、イッちゃうっ<emoji=heart04>\u3000あああっ、んあぁっ、ふああああああっ<emoji=heart04>」"
translation = "「가슴으로 가, 가, 가버려어<emoji=heart04> 아아앗, 응아앗, 후아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……もう出る！\u3000──お姉ちゃんっ！」"
translation = "「윽…… 이제 나와! ── 누나!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あああああっ、乳首強くひねるのダメぇっ！！！\u3000ふあああああっ<emoji=heart04><emoji=heart04>\u3000イク、イクイクイク──<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗, 유두 세게 비트는 거 안 돼애!!! 후아아아아앗<emoji=heart04><emoji=heart04> 가, 가가각──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「おっぱいに中出しされて、イックうぅぅぅぅ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가슴에 질내사정 당해서, 가버려어어어어어──────앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふあっ──ふああああああああああああ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후앗── 후아아아아아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「あっ、あっ、ああっ……すごぉい<emoji=heart04>\u3000こんな、精液出しちゃって……<emoji=heart04>\u3000お姉ちゃんのおっぱいで気持ち良くなってくれて、嬉しい<emoji=heart04>」"
translation = "「앗, 앗, 아앗…… 대단해애<emoji=heart04> 이런, 정액을 내버리고……<emoji=heart04> 언니의 가슴으로 기분 좋아져 줘서, 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふぅ、はぁぁ……<emoji=heart04>\u3000もう出し切った？\u3000ううん、まだ出るわよね？\u3000ちゃ～んとお姉ちゃんが、最後の一滴まで搾り取ってあげるわ<emoji=heart04>」"
translation = "「응후, 하아……<emoji=heart04> 이제 다 냈어? 아니, 아직 더 나오지? 자~알 언니가, 마지막 한 방울까지 짜내 줄게<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ほ～ら、お姉ちゃんのお口で<emoji=heart04>\u3000んくちゅ、くちゅる、ちゅくちゅく、んちゅう……んっ、んちゅぶ、ちゅ、れるれる、んちゅう……<emoji=heart04>」"
translation = "「자~아, 언니 입으로<emoji=heart04> 응쿠츄, 쿠츄루, 츄쿠츄쿠, 응츄…… 응, 응츄부, 츄, 레루레루, 응츄……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……サーシャさん、そんな熱心にしゃぶられたら、また……！」"
translation = "「윽…… 사샤 씨, 그렇게 열심히 빨아대면, 또……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「んん～～～～～、んくちゅ、ちゅ、んくちゅくちゅ、んっ<emoji=heart04>\u3000んっ、はああ……<emoji=heart04>」"
translation = "「응응~~~~~, 응쿠츄, 츄, 응쿠츄쿠츄, 응<emoji=heart04> 응, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「んふふっ<emoji=heart04>\u3000また大きくなっちゃったわね<emoji=heart04>\u3000相変わらず絶倫なんだから……<emoji=heart04>\u3000ねぇ、会長くん……」"
translation = "「응후후<emoji=heart04> 다시 커져 버렸네<emoji=heart04> 여전히 절륜하다니까……<emoji=heart04> 저기, 회장군……」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃん、おっぱいでイッちゃったせいで、おま○こがトロトロで、凄いことになっちゃってるの……<emoji=heart04>」"
translation = "「언니, 가슴으로 가버린 탓에, 보지가 걸쭉해져서, 엄청난 상태가 되어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「だから……ね？」"
translation = "「그러니까…… 응?」"

[[dialogue]]
speaker = "unk"
original = "甘えるような声と発情に染まった瞳を向けてくるサーシャさんに、今度は押し倒されて──"
translation = "어리광 부리는 듯한 목소리와 발정에 물든 눈동자를 향해오는 사샤 씨에게, 이번에는 눌려 쓰러져서──"

[[dialogue]]
speaker = "サーシャ"
original = "「んふふぅ～<emoji=heart04>\u3000……はぁぁ、会長くぅん<emoji=heart04>」"
translation = "「응후후~<emoji=heart04> ……하아아, 회장구운<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度こそ俺が、彼女にたっぷり甘やかされる番になるのだった。"
translation = "이번에야말로 내가, 그녀에게 듬뿍 응석 부릴 차례가 되는 것이었다."

