[[dialogue]]
speaker = "unk"
original = "第１１話,悩みの迷路,B"
translation = "제11화, 고민의 미로, B"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ひとり待たされているヴィーナスは、外の景観を眺めつつ憂いにふけっていた。"
translation = "혼자 기다리고 있는 비너스는, 바깥 경관을 바라보며 시름에 잠겨 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（どうして私は……クロトじゃなきゃダメなんだろう……）"
translation = "（왜 나는…… 쿠로토가 아니면 안 되는 걸까……）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもそれって、解釈次第ではありますよね」"
translation = "「하지만 그건, 해석하기 나름이기도 하죠」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「魔王の素質を目覚めさせる──という意味なら、例の御前試合の際に役目は一度終えているはずです」"
translation = "「마왕의 소질을 일깨운다──는 의미라면, 예의 어전 시합 때 역할은 이미 한 번 끝났어야 합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そしてヴィーナスさんの立場からすれば──その後、彼に負けないよう己を高める、という道もありえたでしょう」"
translation = "「그리고 비너스 씨의 입장에서는── 그 후, 그에게 지지 않도록 자신을 단련하는, 그런 길도 있었을 것입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「けれどヴィーナスさんは、最後まで緋宮会長につきっきりで鍛え上げるという選択をした……」"
translation = "「하지만 비너스 씨는, 끝까지 히노미야 회장에게 딱 붙어서 단련시키는 선택을 했어요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その理由は一体、なぜなんでしょうね？」"
translation = "「그 이유는 대체, 무엇일까요?」"

[[dialogue]]
speaker = "unk"
original = "──あの時、ヴィーナスは自分でも気づいていなかった原初の意思を自覚した。"
translation = "──그때, 비너스는 자신도 깨닫지 못했던 원초적인 의사를 자각했다."

[[dialogue]]
speaker = "unk"
original = "大事なことは日誌に従う──"
translation = "중요한 일은 일지를 따른다──"

[[dialogue]]
speaker = "unk"
original = "自分はそうやって生きてきたと思っていたが、どうも全てがそうではなかったかもしれない。"
translation = "자신은 그렇게 살아왔다고 생각했지만, 아무래도 전부가 그렇지는 않았을지도 모른다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（九浄の家に着いた時──私はもう言葉も話せた。日誌も読めた）"
translation = "（쿠죠 가문에 도착했을 때── 나는 이미 말도 할 수 있었다. 일지도 읽을 수 있었다）"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（だったら……クロトを鍛えようって思った決め手は、なんだったんだろ……？）"
translation = "（그렇다면…… 쿠로토를 단련시키자고 생각한 결정적인 계기는, 뭐였을까……?）"

[[dialogue]]
speaker = "？？？"
original = "「──お悩みのようだのう」"
translation = "「──고민이 있는 듯하구나」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "一瞬、目を伏せていたヴィーナスのもとに幼げな声がかけられる。"
translation = "잠시 눈을 감고 있던 비너스에게 어린 목소리가 말을 건다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「出口のない<ruby>懊悩<rt>おうのう</rt></ruby>ならば、余に打ち明けてみるとよい。人の子には及ばぬ知恵を、授けてやれるやもしれんぞ？」"
translation = "「출구가 없는 고뇌라면, 나에게 털어놓아 보거라. 인간의 아이에게는 미치지 못할 지혜를, 내려줄 수 있을지도 모르니?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが振り返ってみると、そこに立っていたのは──"
translation = "비너스가 뒤돌아보니, 그곳에 서 있던 것은──"

[[dialogue]]
speaker = "unk"
original = "極めて異彩なオーラを放つ、一組の<b>魔女</b>だった。"
translation = "극히 이채로운 아우라를 풍기는, 한 쌍의 <b>마녀</b>였다."

