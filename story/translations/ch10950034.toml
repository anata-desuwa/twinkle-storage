[[dialogue]]
speaker = "unk"
original = "第４話,シズハと久しぶりのキス,P"
translation = "제4화, 시즈하와 오랜만의 키스, P"

[[dialogue]]
speaker = "unk"
original = "その日は久しぶりに、シズハが俺の家へ遊びにやって来ていた。"
translation = "그날은 오랜만에 시즈하가 우리 집에 놀러 왔다."

[[dialogue]]
speaker = "シズハ"
original = "「会長、あのね、今日は久しぶりに２人きりで過ごす休日だから――」"
translation = "「회장님, 저기, 오늘은 오랜만에 둘이서만 보내는 휴일이니까――」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「じ、じゃ～ん♪\u3000チェンジ、ヴィクトリアフォ～ム……！」"
translation = "「자, 잔~♪ 체인지, 빅토리아 포~옴……!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ってことで、今日はこの衣装で一緒に過ごしましょ。えへへっ……<emoji=heart04>」"
translation = "「그런 고로, 오늘은 이 의상으로 함께 보내요. 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少し頬を染め、指先でもじもじとスカートの裾をつまみながら言うシズハ。"
translation = "살짝 뺨을 붉히며, 손가락으로 꾸물꾸물 스커트 자락을 만지작거리며 말하는 시즈하."

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000ディーちゃん無しでも変身できるのか"
translation = "어라? 디짱 없이도 변신할 수 있는 건가?"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「うん、マイナスエネルギーはディーちゃんがいないと使えないけど、変身するだけはできるのよ」"
translation = "「응, 마이너스 에너지는 디짱이 없으면 쓸 수 없지만, 변신하는 것만은 할 수 있어.」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「これはノヴァフォームみたいに、会長との『絆の力』でもあるしね」"
translation = "「이건 노바 폼처럼 회장님과의 『인연의 힘』이기도 하니까.」"

[[dialogue]]
speaker = "unk"
original = "ちなみにディーちゃんは、俺たちが２人きりで過ごしたい時は、今日みたいに気を利かせてくれることが多い。"
translation = "참고로 디짱은 우리 둘이서만 시간을 보내고 싶어 할 때는 오늘처럼 눈치껏 자리를 비워줄 때가 많다."

[[dialogue]]
speaker = "unk"
original = "今度３人でゲームして遊ぶ時に、改めてお礼を言わないとな。"
translation = "다음에 셋이서 게임하며 놀 때, 다시 한번 고맙다고 말해야겠네."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「それでね、今日は『絆の力』を強くする為に、このフォームでイチャイチャの訓練をしようと思って……<emoji=heart04>」"
translation = "「그래서 말인데, 오늘은 『인연의 힘』을 강하게 하기 위해서 이 폼으로 꽁냥꽁냥 훈련을 하려고 해서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "訓練って、本当に～？"
translation = "훈련이라니, 정말로~?"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「も。もうっ、会長のバカバカ！\u3000そこは素直にいけいけゴーゴーな感じで流してよっ！」"
translation = "「정, 정말, 회장님 바보바보! 거기는 솔직하게 이케이케 고고 하는 느낌으로 넘어가 줘요!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ちゃんと理由がないと、私がただイチャイチャしたいだけになっちゃうじゃない<emoji=heart04>」"
translation = "「제대로 이유가 없으면, 내가 그냥 꽁냥거리고 싶어 하는 것뿐이게 되잖아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は訓練関係なく、イチャイチャしたいけどな"
translation = "나는 훈련과 상관없이 꽁냥거리고 싶지만 말야."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ば、バカバカ<emoji=heart04>\u3000会長はそういうこと、ストレートに言いすぎなの<emoji=heart04>」"
translation = "「바, 바보바보<emoji=heart04> 회장님은 그런 거 너무 직설적으로 말한다니까<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「あっ、会長……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「앗, 회장님……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はシズハの腰に手を回し、ゆっくりと抱き寄せた。"
translation = "나는 시즈하의 허리에 손을 감고 천천히 끌어안았다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇が触れ合う瞬間、彼女の肩がぴくりと震える。"
translation = "입술이 맞닿는 순간, 그녀의 어깨가 움찔하고 떨린다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「はあぁっ……<emoji=heart04>\u3000い、いきなりキスなんて、ずるいわよ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 갑, 갑자기 키스라니 비겁해요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最近はヴィクトリアフォームの訓練で、ディーちゃんも一緒にいることが多かったから、こうして２人でキスするのは久しぶりだった。"
translation = "최근에는 빅토리아 폼 훈련 때문에 디짱도 같이 있을 때가 많았기에, 이렇게 둘이서 키스하는 건 오랜만이었다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「まぁ……確かに、前にキスしてから『９日』ぶりだけど……」"
translation = "「뭐…… 확실히 전에 키스하고 나서 『9일』 만이긴 하지만……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「――そこまで細かい日数は覚えてなかったって？\u3000た、たまたまよ！\u3000たまたま！」"
translation = "「――그렇게 자세한 날짜까지는 기억 못 했다고? 다, 다행히 우연이야! 우연!」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「別に気にしてたとか、寂しかったとか……そんなことないんだからねっ！」"
translation = "「딱히 신경 썼다거나, 외로웠다거나…… 그런 거 아니니까 말야!」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤にして言い返してくるシズハ。"
translation = "얼굴을 새빨갛게 물들이며 대꾸하는 시즈하."

[[dialogue]]
speaker = "unk"
original = "その様子が愛おしくて、俺はもう１度、強めに抱きしめる。"
translation = "그 모습이 사랑스러워서 나는 다시 한번 강하게 껴안는다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「んっ……<emoji=heart04>\u3000もう、会長ってば、ハグするのも早いわよ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 정말, 회장님도 참, 허그하는 것도 빠르다니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は背中に回した手で、ゆっくりと円を描くように撫でる。"
translation = "나는 등 뒤로 돌린 손으로 천천히 원을 그리듯 쓰다듬는다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「んんっ……<emoji=heart04>\u3000はふぅ……<emoji=heart04>」"
translation = "「으응……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "（会長の手、あったかい……<emoji=heart04>\u3000優しく撫でられるだけで、胸の奥がじんわりして……<emoji=heart04>）"
translation = "(회장님 손, 따뜻해……<emoji=heart04> 상냥하게 쓰다듬어지는 것만으로 가슴 깊은 곳이 뭉클해져서……<emoji=heart04>)"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "（あっ……頭も撫でられて……はあぁ……<emoji=heart04>）"
translation = "(앗…… 머리도 쓰다듬어지고…… 하아아……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "俺が髪を梳くように撫でると、シズハは力を抜いて体重を預けてくる。"
translation = "내가 머리카락을 빗어 넘기듯 쓰다듬자 시즈하는 힘을 빼고 체중을 맡겨온다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "（幸せ……<emoji=heart04>\u3000こうしてくっ付いてるだけで、心が満たされていく感じ……<emoji=heart04>）"
translation = "(행복해……<emoji=heart04> 이렇게 달라붙어 있는 것만으로 마음이 채워지는 느낌……<emoji=heart04>)"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "（会長の匂い、会長の体温……全部好き……<emoji=heart04>）"
translation = "(회장님의 냄새, 회장님의 체온…… 전부 좋아……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "……シズハのこと、やっぱり好きだなぁ"
translation = "……시즈하, 역시 좋아해."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「えっ！？\u3000か、会長も……好きなの？」"
translation = "「엣!? 회, 회장님도…… 좋아해?」"

[[dialogue]]
speaker = "unk"
original = "一瞬目を見開いたあと、顔を赤くして視線を逸らす。"
translation = "순간 눈을 크게 뜬 뒤, 얼굴을 붉히며 시선을 피한다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「あっ、いや……なんでもないっ！」"
translation = "「앗, 아니…… 아무것도 아니야!」"

[[dialogue]]
speaker = "unk"
original = "俺は、もっと撫でてもいいかと尋ねる。"
translation = "나는 더 쓰다듬어도 되겠냐고 묻는다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「……う、うん<emoji=heart04>\u3000いいけど……」"
translation = "「……으, 응<emoji=heart04> 괜찮지만……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「でも、お尻を触るのは……もっと絆を深めてからじゃないとダメだからね<emoji=heart04>」"
translation = "「하지만, 엉덩이를 만지는 건…… 인연을 더 깊게 쌓은 뒤가 아니면 안 되니까 말야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻のハードル、やっぱり高いのか"
translation = "엉덩이 허들, 역시 높은 건가."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「あ、当たり前じゃない！\u3000恋人同士でお尻を触り合うのは、その……愛をちゃんと確かめ合う時でしょ<emoji=heart04>」"
translation = "「다, 당연하잖아! 연인끼리 엉덩이를 서로 만지는 건, 그…… 사랑을 제대로 확인할 때잖아<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「だ、だから……心の準備ができるまでは、まだダメ<emoji=heart04>」"
translation = "「그, 그러니까…… 마음의 준비가 될 때까지는 아직 안 돼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "――なら、それまでに、しっかりと絆を深めておかないとな。"
translation = "――그럼 그때까지 착실하게 인연을 쌓아둬야겠네."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「あっ……<emoji=heart04>\u3000ま、またキス、するの……？」"
translation = "「앗……<emoji=heart04> 또, 또 키스, 하는 거야……?」"

[[dialogue]]
speaker = "unk"
original = "ダメか？"
translation = "안 돼?"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「…………久しぶりだし……またしばらく出来ないかもしれないから……」"
translation = "「…………오랜만이고…… 또 한동안 못 할지도 모르니까……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「いいわよ。『キス<ruby>貯<rt>だ</rt></ruby>め』ってことで……<emoji=heart04>」"
translation = "「좋아. 『키스 비축』이라고 치고……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「だから――ん……<emoji=heart04>」"
translation = "「그러니까―― 음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゆっくりと目を閉じ、今度は自分から唇を近づけてくる。"
translation = "천천히 눈을 감고, 이번에는 스스로 입술을 가까이 가져온다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の頬に手を添え、丁寧に口づける。"
translation = "나는 그녀의 뺨에 손을 얹고 정성스럽게 입을 맞춘다."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "シズハ、好きだ"
translation = "시즈하, 좋아해."

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「はあぁっ……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「んちゅっ……<emoji=heart04>\u3000私も……<emoji=heart04>」"
translation = "「응쪽……<emoji=heart04> 저도……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「好きよ、会長……<emoji=heart04>」"
translation = "「좋아해요, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
original = "「んっ……ちゅっ……<emoji=heart04>\u3000んちゅっ……<emoji=heart04>」"
translation = "「응…… 쪽……<emoji=heart04> 응쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "互いの温もりを確かめ合うように、何度もキスを重ねる。"
translation = "서로의 온기를 확인하듯 몇 번이고 키스를 거듭한다."

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、しばらく会えない日々に備えて――抱きしめ合いながら、たっぷりと『キス貯め』をするのだった。"
translation = "그 후 우리들은 한동안 만나지 못할 날들을 대비해―― 서로 껴안으며 잔뜩 『키스 비축』을 했다."

