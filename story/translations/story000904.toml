[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もいっちょレーイズ！」"
translation = "「한 번 더 레이즈!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「へぇ、いい手でも来てんすか？」"
translation = "「헤에, 좋은 패라도 들어왔음?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「来てる来てる♪\u3000超いいの来てるよ～？\u3000フォールドした方がいいんじゃない？」"
translation = "「들어왔지 들어왔지♪ 엄청 좋은 거 들어왔다구~? 폴드하는 게 좋지 않아?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「その手には乗らねえっすよ」"
translation = "「그 수법엔 안 넘어감.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（あたしの手札はハートの９とクラブの１０。場にはハートの１１と１０、それにダイヤの１０とハートの８が見えてる）"
translation = "(내 패는 하트 9랑 클로버 10. 바닥에는 하트 11이랑 10, 그리고 다이아 10이랑 하트 8이 보이고 있어)"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（つまり既に１０のスリーカードだ。しかもハートの１２が来りゃストレートフラッシュ昇格──降りるわけがねえ！）"
translation = "(즉 이미 10 트리플이야. 게다가 하트 12가 오면 스트레이트 플러시 승격── 기권할 리가 없지!)"

[[dialogue]]
speaker = "unk"
original = "フォールド……"
translation = "폴드……"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（会長さんは降りたか。てことはここであたしが降りたら会長さんが罰ゲームだな）"
translation = "(회장님은 기권인가. 그럼 여기서 내가 기권하면 회장님이 벌칙 게임이겠네)"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（でもそれじゃ面白くねえ。たまにはセーラさんに一泡吹かせてやりてぇし）"
translation = "(하지만 그건 재미없지. 가끔은 세라 씨의 콧대를 꺾어주고 싶고)"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「コール」"
translation = "「콜.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「それでは最後のカードを追加しますね」"
translation = "「그럼 마지막 카드를 추가할게요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（来た、ハートのクイーン！\u3000ストフラ確定！）"
translation = "(왔다, 하트 퀸! 스트플 확정!)"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ユウリちゃんは通常ベット？\u3000んじゃうちはさらにレーイズ！」"
translation = "「유우리짱은 일반 베팅? 그럼 난 한 번 더 레이즈!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「うわ、あたしを最下位に落とす気満々じゃないっすか。よっぽど勝負手なんすね？」"
translation = "「우와, 나를 꼴찌로 떨어뜨리려고 작정했음? 엄청난 승부수인가 보네?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「どうだろーね～。まぁここでうちが負けても会長さんが最下位だし♪」"
translation = "「글쎄 어떨까~. 뭐 여기서 내가 져도 회장님이 꼴찌니까♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「でも、あたしがさらにレイズして負けたらセーラさんが最下位っすよ？」"
translation = "「하지만 내가 여기서 더 레이즈해서 지면 세라 씨가 꼴찌임.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あれれ、うちに罰ゲームさせたい感じ～？\u3000ケド返り討ちにあったらユウリちゃんが最下位だぜぃ？\u3000降りて会長さんに罰ゲームさせたら～？」"
translation = "「어라라, 나한테 벌칙 시키고 싶은 느낌~? 하지만 역공 당하면 유우리짱이 꼴찌라구? 폴드하고 회장님한테 벌칙 시키는 게 안전하지 않아~?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「たまにはあたしもセーラさんを悔しがらせたいもんっすから。つーわけでレイ──」"
translation = "「가끔은 나도 세라 씨를 분하게 만들고 싶단 말임. 그러니까 레이──」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（っっ、待て。場のカードをよく見ろ！\u3000ハートが１０・１１・１２と続いてるじゃねえか！）"
translation = "(윽, 잠깐. 바닥 카드를 잘 봐! 하트가 10, 11, 12로 이어지고 있잖아!)"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（万が一セーラさんがハートのエースとキングを持ってたらロイヤルストレートフラッシュ……！\u3000あ、あたしの負けだ！）"
translation = "(만약 세라 씨가 하트 에이스랑 킹을 가지고 있으면 로열 스트레이트 플러시……! 내, 내가 지는 거야!)"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（いやでも、んな豪運……！\u3000良くてフラッシュかストレート……！\u3000つか強気のレイズもブラフ臭えし、フォールド誘いのゴミ手って可能性も……！）"
translation = "(아니 하지만 그런 미친 운이……! 좋아 봐야 플러시나 스트레이트……! 아니 강세 레이즈도 블러핑 같고, 폴드를 유도하는 쓰레기 패일 가능성도……!)"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ちなみに、うちが考えてるユウリちゃんへの罰ゲームはぁ……ニャリオンちゃんにバニーガール写真を送ることだから♪」"
translation = "「참고로 내가 생각하는 유우리짱 벌칙은 말이야…… 냐리온 씨한테 바니걸 사진 보내기니까♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なっ──……！\u3000んなことされたらあたしの人生終わっちまう！？」"
translation = "「뭐──……! 그런 짓 당하면 내 인생 끝장난다고!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「どーする？\u3000レイズする～？\u3000降りてうちをトップにして、会長さんに罰ゲーム押しつけた方が安全じゃなーい？」"
translation = "「어떡할래? 레이즈 할 거야~? 폴드해서 나를 1등으로 만들고, 회장님한테 벌칙 떠넘기는 게 안전하지 않아?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（お、落ち着け……！\u3000あたしのストレートフラッシュが負けるわけがねえ……！\u3000ハートのエースとキングを持ってるなんて奇跡、あるはずがねえ……！）"
translation = "(지, 진정해……! 내 스트레이트 플러시가 질 리가 없어……! 하트 에이스랑 킹을 가지고 있는 기적 따위 있을 리가 없다고……!)"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「レイズ！\u3000いっそオールインだ、エロ王子！」"
translation = "「레이즈! 아예 올인이다, 에로 왕자!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「コ、コホン。その呼び方はやめていただけると……」"
translation = "「코, 흠. 그 호칭은 자제해 주셨으면……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「もちろんコール♪」"
translation = "「물론 콜♪」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「それではショーダウンです。ユウリさんから役の公開をお願いします」"
translation = "「그럼 쇼다운입니다. 유우리 씨부터 족보 공개 부탁드려요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「くらえセーラさんっ──神のストレートフラッシュだ！」"
translation = "「먹어라 세라 씨── 신의 스트레이트 플러시다!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「残念♪\u3000ロイヤルストレートフラッシュ<emoji=heart04>」"
translation = "「아쉽네♪ 로열 스트레이트 플러시♥」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「！！？\u3000こ、こんなっ、バカなことがっ……！？」"
translation = "「!!? 이, 이런 말도 안 되는 일이……!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「だから言ったでしょ♪\u3000降りた方がいーって♪」"
translation = "「그러니까 말했잖아♪ 죽는 게 나을 거라고♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「やっぱりストレートできてたかぁ。でも場のカードでストレートができかけてる時は、他のプレイヤーも狙いやすいってワケ♪」"
translation = "「역시 스트레이트였구나. 하지만 바닥 카드로 스트레이트가 만들어질 것 같을 때는 다른 플레이어도 노리기 쉽다는 법♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「てなわけで……うふふ～。ドキドキ撮影ターイム♪」"
translation = "「자 그럼…… 우후후~. 두근두근 촬영 타임♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ゆ、許してください！\u3000あのクソ猫にこんな姿見られたら、あたし……！」"
translation = "「제, 제발 봐주세요! 그 똥고양이한테 이런 모습 보여버리면 나……!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「悲しいけど……これギャンブルなんだよね」"
translation = "「슬프지만…… 이게 도박이라는 거지.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「い、嫌だぁああああっっ～～！！！」"
translation = "「시, 싫어어어어어억~~!!!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「――ストップ。罰ゲームといえど人の嫌がることはしてはいけませんよ、セーラさん」"
translation = "「──스톱. 벌칙 게임이라도 남이 싫어하는 짓을 해서는 안 됩니다, 세라 씨.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「冗談だよ冗談。もちろんわかってるよ」"
translation = "「농담이야 농담. 당연히 알고 있다구.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「もう、本気かと思いましたよ」"
translation = "「정말이지, 진심인 줄 알았잖아요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「エロ王子、あんた……」"
translation = "「에로 왕자, 너……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「大丈夫ですか、ユウリさん。ああ、恐怖のあまり椅子から転げ落ちてしまって。さぁお手をどうぞ」"
translation = "「괜찮으세요, 유우리 씨. 아아, 공포 때문에 의자에서 굴러떨어져 버리시다니. 자, 손을 잡으세요.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「えっ……？\u3000あっ……お……おう……」"
translation = "「엣……? 앗…… 어…… 어어……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うわ、すご。あんな風に自然と女の子に手ぇ差し伸べられるもんなんだ？\u3000さっすが王子だねー……？」"
translation = "「우와, 대박. 저렇게 자연스럽게 여자애한테 손을 내밀 수 있는 거구나? 역시 왕자님이네~?」"

[[dialogue]]
speaker = "unk"
original = "輝くような王子っぷり……"
translation = "눈부신 왕자 포스……"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さん、この後王子と並んで仕事するんでしょ？\u3000なんかご愁傷様」"
translation = "「회장님, 이따가 왕자님이랑 나란히 서서 일할 거지? 왠지 명복을 빕니다.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「さぁユウリさん、お手を」"
translation = "「자 유우리 씨, 손을.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「～～っっ！\u3000じ、自分で立てるっつの！\u3000つかあんたがあたしにバニースーツなんか着せっからこんなことになってるんだろうが！？」"
translation = "「~~!! 나, 혼자 일어날 수 있거든! 그보다 네가 나한테 바니 수트 같은 걸 입히니까 이런 꼴이 된 거 아니냐고!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あう！？\u3000それについては本当に申し訳ありません……！」"
translation = "「아우!? 그 점에 대해서는 정말 죄송합니다……!」"

[[dialogue]]
speaker = "unk"
original = "やっぱりモテモテだったな"
translation = "역시 인기 만점이었네"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あはは、そんなことないよ。会長よりカジノに慣れているだけさ。お客さんたちもオーバーだったしね」"
translation = "「아하하, 그렇지 않아. 회장님보다 카지노에 익숙할 뿐이야. 손님들도 좀 오버했던 것 같고 말이지.」"

[[dialogue]]
speaker = "unk"
original = "見事なカード捌きや振る舞いも勇者スキル？"
translation = "훌륭한 카드 기술이나 매너도 용사 스킬?"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「うん。勇者スキル『リフルシャッフル』に『ストリップ』、そして『ピッチング』──ご先祖様の華麗な技術の数々には私も頭が下がる思いだよ」"
translation = "「응. 용사 스킬 『리플 셔플』에 『스트립』, 그리고 『피칭』── 조상님들의 화려한 기술들에는 나도 고개가 절로 숙여져.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「でも振る舞いまで落ち着いて見えたのなら、それは会長のおかげかな」"
translation = "「하지만 매너까지 차분해 보였다면 그건 회장님 덕분일까.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「実を言うとすごく緊張していたんだ。恥ずかしいから、あまり大きな声では言えないんだけどね？」"
translation = "「실은 말이야, 엄청 긴장하고 있었거든. 부끄러우니까 너무 큰 소리로 말하면 안 되지만?」"

[[dialogue]]
speaker = "unk"
original = "そんな風には見えなかったけど"
translation = "그렇게는 안 보였는데"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「会長が隣にいてくれたからだよ。会長が傍にいてくれると不思議と安心するんだ」"
translation = "「회장님이 옆에 있어 줬으니까. 회장님이 곁에 있어 주면 신기하게도 안심이 되거든.」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「なんと言えばいいかな……。会長が近くにいてくれるとこう……胸の中が温かくなってね？\u3000肩の力も抜けていつもより自然体でいられるというか……」"
translation = "「뭐라고 해야 할까……. 회장님이 근처에 있어 주면 이렇게…… 가슴 속이 따뜻해진다고 해야 하나? 어깨에 힘도 빠지고 평소보다 더 자연스럽게 있을 수 있게 된다고 할까……」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「うん。やっぱり安心する……。ふふ、なんだか笑顔まで溢れてきちゃうよ……」"
translation = "「응. 역시 안심돼……. 후후, 왠지 웃음까지 흘러나오네……」"

[[dialogue]]
speaker = "unk"
original = "そ、そんなに見つめられると……"
translation = "그, 그렇게 빤히 쳐다보면……"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「あっ──ご、ごめんね、つい……！\u3000会長の顔を眺めていたら、もっと近くで見たくなっちゃって……！」"
translation = "「앗── 미, 미안해, 나도 모르게……! 회장님 얼굴을 보고 있었더니 더 가까이서 보고 싶어져서……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「とにかく会長には感謝してるからっ。きっと私１人だったら、緊張で頭の中が真っ白になってただろうし……！」"
translation = "「아무튼 회장님한테는 감사하고 있으니까. 분명 나 혼자였다면 긴장해서 머릿속이 하얘졌을 거야……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「休憩明けはセーラさんたちを手伝いにいくんだよねっ？\u3000私のことは気にせず、２人の傍にいてあげてよ！\u3000今は逆に会長が傍にいると……！」"
translation = "「휴식 끝나면 세라 씨 일행 도와주러 가는 거지? 내 걱정은 말고 두 사람 곁에 있어 줘! 지금은 반대로 회장님이 옆에 있으면……!」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ご、ごめん、ちょっとお手洗いに……！\u3000なんだか顔が妙に熱くなっちゃってるから……！」"
translation = "「미, 미안, 잠깐 화장실 좀……! 왠지 얼굴이 묘하게 뜨거워져서……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なに堂々と女子トイレ入ろうとしてんだ！？\u3000エロ王子にも程があんぞ！？」"
translation = "「어딜 당당하게 여자 화장실로 들어오려는 거임!? 에로 왕자도 정도가 있지!?」"

[[dialogue]]
speaker_original = "ユーリス"
speaker_translation = "유리스"
original = "「ふぇっ！？\u3000これは違うんです～～！！」"
translation = "「후에!? 그게 아닙니다아~~!!」"

