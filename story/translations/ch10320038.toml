[[dialogue]]
speaker = "unk"
original = "今日は、魔将となったウィステリアさんと実戦トレーニングをしていた。"
translation = "오늘은 마장이 된 위스테리아 씨와 실전 트레이닝을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "クロト"
original = "「くっ……俺の負けです……」"
translation = "「윽…… 내가 졌어요……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「どうしたの、会長くん？\u3000ずいぶんあっさりだったじゃない」"
translation = "「무슨 일이야, 회장군? 꽤나 싱거웠잖아.」"

[[dialogue]]
speaker = "unk"
original = "元々英雄と呼ばれるほどの実力者であるウィステリアさんが新たな力に目覚めたのだから、魔将フォームは本当に強力だ。"
translation = "원래 영웅이라 불릴 정도의 실력자인 위스테리아 씨가 새로운 힘에 눈을 떴으니, 마장 폼은 정말 강력하다."

[[dialogue]]
speaker = "unk"
original = "ただそれ以上に、肌の露出が大きくなっていて、そこに気を取られてしまった。"
translation = "단지 그 이상으로, 피부 노출이 커져서, 거기에 정신이 팔려버렸다."

[[dialogue]]
speaker = "クロト"
original = "「えっと、それは……ウィステリアさんの肌が気になって……」"
translation = "「어, 그건…… 위스테리아 씨의 피부가 신경 쓰여서……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「ええっ！？\u3000星騎士だったら、他にもこれくらい露出してる子はいるでしょ！？\u3000確かに肌面積は多めかもしれないけどっ」"
translation = "「에엣!? 성기사라면, 다른 애들도 이 정도 노출은 하잖아!? 확실히 피부 면적은 많은 편일지도 모르지만.」"

[[dialogue]]
speaker = "クロト"
original = "「好きな人がそんな格好していたら、当然気になりますよ！」"
translation = "「좋아하는 사람이 그런 차림을 하고 있으면, 당연히 신경 쓰이죠!」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「うぅ……そこまで言われると恥ずかしいんだけど……」"
translation = "「우우…… 그렇게까지 말하면 부끄러운데……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「でも会長くんが気を抜いていたのは事実。エッチな会長くんにはお仕置きしないといけないわね」"
translation = "「하지만 회장군이 방심하고 있었던 건 사실. 야한 회장군에게는 벌을 줘야겠네.」"

[[dialogue]]
speaker = "クロト"
original = "「え──？」"
translation = "「에──?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふふ……」"
translation = "「후후후……」"

[[dialogue]]
speaker = "クロト"
original = "「ウィステリアさん……？」"
translation = "「위스테리아 씨……?」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんが魔将の衣装をはだけ、不敵な笑みを浮かべて俺に跨る。"
translation = "위스테리아 씨가 마장의 의상을 헤치고, 불온한 미소를 띠며 나에게 올라탄다."

[[dialogue]]
speaker = "unk"
original = "少し身じろぎするだけで大きな乳房がたぷんと揺れ、下から見上げるその迫力に目を奪われてしまう。"
translation = "조금 몸을 움직이는 것만으로 커다란 유방이 출렁거리고, 아래에서 올려다보는 그 박력에 눈을 뺏겨버린다."

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くんに魔将の恐ろしさを教えてあげるわ」"
translation = "「회장군에게 마장의 무서움을 가르쳐 줄게.」"

[[dialogue]]
speaker = "クロト"
original = "「魔将の恐ろしさ……？」"
translation = "「마장의 무서움……?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「大丈夫、悪いようにはしないから私に任せなさい。たっぷりいいことしてあげるわ」"
translation = "「괜찮아, 나쁜 짓은 안 할 테니까 나한테 맡겨. 잔뜩 기분 좋은 거 해줄게.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、ウィステリアさんが腰を揺らしてペニスに秘部を押し付けてくる。"
translation = "그렇게 말하며, 위스테리아 씨가 허리를 흔들어 페니스에 비부를 밀착해 온다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んっ……はぁ……おち○ぽ大きい……<emoji=heart04>\u3000戦いながらこんなに大きくしてたのね？」"
translation = "「응…… 하아…… 자지 커…… 싸우면서 이렇게 크게 만들고 있었어?」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……だってウィステリアさんが魅力的だから」"
translation = "「윽…… 그야 위스테리아 씨가 매력적이니까.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふっ……はぁ……この期に及んでそんなこと言うのね。んん……やっぱりお仕置きしないとだわ」"
translation = "「훗…… 하아…… 이런 상황에서도 그런 말을 하네. 응응…… 역시 벌을 줘야겠어.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ……ん……もうおち○ぽガチガチね<emoji=heart04>\u3000これなら──」"
translation = "「후우…… 응…… 이제 자지 딱딱하네. 이 정도면──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗……」"

[[dialogue]]
speaker = "unk"
original = "蜜で潤った柔らかな膣壁と、熱い体温に優しく包みこまれる。"
translation = "꿀로 젖은 부드러운 질벽과, 뜨거운 체온에 부드럽게 감싸인다."

[[dialogue]]
speaker = "unk"
original = "勃起して敏感になったペニス全体を飲み込まれ、快感に背中がゾクゾクと震えた。"
translation = "발기해서 민감해진 페니스 전체를 삼켜져, 쾌감에 등이 짜릿하게 떨렸다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ……おま○この中で、おち○ぽビクビク跳ねてる<emoji=heart04>\u3000そんなに気持ちいいんだ<emoji=heart04>」"
translation = "「후후…… 보지 속에서, 자지 두근두근 뛰고 있어. 그렇게 기분 좋아?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「それじゃ……君のだ～い好きなお姉さんのおま○こで、たくさん気持ち良くしてあげるわね<emoji=heart04>」"
translation = "「그럼…… 네가 너~무 좋아하는 누나의 보지로, 잔뜩 기분 좋게 해줄게.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぁあああっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふっ……んっ……はあぁ……<emoji=heart04>」"
translation = "「파아아앗…… 앗…… 흣…… 응…… 하아아……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁっ……はっ、あっ……んんっ<emoji=heart04>\u3000ふふふ、君のおち○ぽ、おっきくて、私の中、いっぱいになっちゃうわ<emoji=heart04>」"
translation = "「하앗…… 핫, 앗…… 응응…… 후후후, 네 자지, 커서, 내 안이, 가득 차 버려.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んんっ……ふっ……んっ……<emoji=heart04>\u3000ほら、私のおま○こ、熱くて柔らかくて、気持ちいいでしょ<emoji=heart04>\u3000ふぅ……はっ……私の中、感じて<emoji=heart04>」"
translation = "「응응…… 흣…… 응…… 자, 내 보지, 뜨겁고 부드러워서, 기분 좋지? 후우…… 핫…… 내 안을, 느껴.」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんがゆっくり体を上下させ、ペニスを撫でるように粘膜と摩擦させる。"
translation = "위스테리아 씨가 천천히 몸을 상하로 움직이며, 페니스를 어루만지듯 점막과 마찰시킨다."

[[dialogue]]
speaker = "unk"
original = "愛液で濡れた膣壁で擦られ、その度に下半身が熱を増していく。"
translation = "애액으로 젖은 질벽으로 비벼져, 그때마다 하반신이 열기를 더해간다."

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くんは快楽に身を委ねて……はぁ、あっ、はぁ……<emoji=heart04>\u3000気持ち良くなることだけ考えてね……んっ……はっ、はあぁ……<emoji=heart04>」"
translation = "「회장군은 쾌락에 몸을 맡기고…… 하아, 앗, 하아…… 기분 좋아지는 것만 생각해…… 응…… 핫, 하아아……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はっ……はぁ……気持ちいいのだけ感じて……<emoji=heart04>\u3000はぁ、はっ、んんっ……おち○ぽで、私のおま○こ、味わって……ぁん……<emoji=heart04>」"
translation = "「핫…… 하아…… 기분 좋은 것만 느껴…… 하아, 핫, 응응…… 자지로, 내 보지, 맛봐…… 아앙……」"

[[dialogue]]
speaker = "unk"
original = "お仕置きという言葉とは裏腹に、ウィステリアさんは甘く囁きかけ、快楽だけを俺に与えようとする。"
translation = "벌이라는 말과는 다르게, 위스테리아 씨는 달콤하게 속삭이며, 쾌락만을 나에게 주려 한다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ほら、おっぱいも見ていいのよ<emoji=heart04>\u3000はあぁっ、あっ……会長くんが大好きな、大きなおっぱい、しっかり見て<emoji=heart04>」"
translation = "「자, 가슴도 봐도 돼. 하아앗, 앗…… 회장군이 제일 좋아하는, 커다란 가슴, 확실히 봐.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふはぁ、はぁ……会長くんのおち○ぽ、大きい……<emoji=heart04>\u3000はあぁ、あっ、あぁんっ……私も、会長くんのおち○ぽ感じてるわ<emoji=heart04>」"
translation = "「후하아, 하아…… 회장군의 자지, 커…… 하아, 앗, 아앙…… 나도, 회장군의 자지 느끼고 있어.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぅ、はぁ、はぁ、はぁっ……<emoji=heart04>\u3000い～っぱい、おち○ぽかわいがってあげるから<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>」"
translation = "「후우, 하아, 하아, 하앗…… 너~무, 자지 예뻐해 줄 테니까…… 하아앗…… 앗…… 응응……」"

[[dialogue]]
speaker = "unk"
original = "蜜で蕩けた膣壁が甘く締め付けてきて、射精欲が急激にこみあげてくる。"
translation = "꿀로 녹아내린 질벽이 달콤하게 조여와, 사정 욕구가 급격히 치밀어 오른다."

[[dialogue]]
speaker = "クロト"
original = "「ウィステリアさん、もう……」"
translation = "「위스테리아 씨, 이제……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「もう射精しちゃいそうなのね<emoji=heart04>\u3000中に出していいわよ<emoji=heart04>\u3000はぁっ……あっ、あんっ……<emoji=heart04>」"
translation = "「이제 사정할 것 같구나. 안에 싸도 돼. 하앗…… 앗, 앙……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「私のおま○こは会長くんのものだから<emoji=heart04>\u3000はぁ、はっ、あぁっ<emoji=heart04>\u3000いっぱい出してね<emoji=heart04>」"
translation = "「내 보지는 회장군의 것이니까<emoji=heart04> 하아, 핫, 아앗<emoji=heart04> 잔뜩 싸줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの優しい声が、頭に、心に、本能に沁み込んでくる。"
translation = "위스테리아 씨의 다정한 목소리가 머리에, 마음에, 본능에 스며들어 온다."

[[dialogue]]
speaker = "unk"
original = "弾力のある膣壁も、射精を促すようにうねって下半身を刺激する。"
translation = "탄력 있는 질벽도 사정을 재촉하듯 꿈틀거리며 하반신을 자극한다."

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ、はっ、はぁ……んんっ……<emoji=heart04>\u3000気持ちいいの、おち○ぽで、いっぱい感じて……<emoji=heart04>」"
translation = "「앗, 핫, 하아…… 응응……<emoji=heart04> 기분 좋아, 자지로 잔뜩 느껴져……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ、はぁ、ぁんっ<emoji=heart04>\u3000射精しやすいように、おま○こ締めてあげるわね……んんっ<emoji=heart04>」"
translation = "「하아, 하아, 아앙……<emoji=heart04> 사정하기 쉽게 보지를 조여줄게…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを深く咥えたまま膣が締まって──"
translation = "페니스를 깊숙이 문 채 질이 조여들며──"

[[dialogue]]
speaker = "クロト"
original = "「くぅぅっ……！」"
translation = "「크으윽……!」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふぁああぁっ<emoji=heart04>\u3000会長くんの熱い精液、流れ込んでくるわ<emoji=heart04>」"
translation = "「흐아아아앗<emoji=heart04> 회장군의 뜨거운 정액, 흘러들어와<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "衝動をこらえることができず、そのまま中に射精してしまう。"
translation = "충동을 참지 못하고 그대로 안에 사정해 버린다."

[[dialogue]]
speaker = "unk"
original = "しかしウィステリアさんは動きを止めることなく、射精を受け止めながら腰を振り続ける。"
translation = "하지만 위스테리아 씨는 움직임을 멈추지 않고, 사정을 받아내면서 허리를 계속 흔든다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んんんっ<emoji=heart04>\u3000びゅくびゅくって、熱いの出されるの、気持ちいい<emoji=heart04>」"
translation = "「응응응……<emoji=heart04> 덜덜 떨면서 뜨거운 걸 싸주는 거, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうよ、出したくなったら、そのまま出しちゃっていいの<emoji=heart04>\u3000おもらしするみたいに、出したい時に好きなだけ出していいのよ<emoji=heart04>」"
translation = "「그래, 싸고 싶어지면 그대로 싸버려도 돼<emoji=heart04> 오줌 누는 것처럼, 싸고 싶을 때 마음껏 싸도 된다고<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "欲望のままに、ウィステリアさんの中に俺の精を注ぐ──それはどれだけ幸福なことだろうか。"
translation = "욕망대로 위스테리아 씨 안에 내 정액을 쏟는다── 그것은 얼마나 행복한 일인가."

[[dialogue]]
speaker = "ウィステリア"
original = "「射精したくなったら、我慢せずに出してね<emoji=heart04>\u3000はっ、はぁっ……私のおま○こで、いくらでも受け止めてあげるわ<emoji=heart04>」"
translation = "「사정하고 싶어지면 참지 말고 싸버려<emoji=heart04> 핫, 하앗…… 내 보지로 얼마든지 받아줄게<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んんっ……<emoji=heart04>\u3000おま○この中で、おち○ぽまた硬くなってる<emoji=heart04>\u3000ふっ、んんっ<emoji=heart04>\u3000また精液出してくれそうね<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 보지 안에서 자지가 다시 딱딱해지고 있어<emoji=heart04> 훗, 응응……<emoji=heart04> 또 정액을 싸줄 모양이네<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふはぁ、はぁ、はっ……あっ、はぁっ……<emoji=heart04>\u3000何も気にしなくていい……私の中に注ぐことだけ考えればいいの<emoji=heart04>」"
translation = "「후하아, 하아, 핫…… 앗, 하앗……<emoji=heart04> 아무것도 신경 쓰지 마…… 내 안에 쏟아붓는 것만 생각하면 돼<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ただ快楽だけを感じて、他のことは忘れて……んんっ、はぁっ……戦いも、日常も、全て……<emoji=heart04>」"
translation = "「그저 쾌락만 느끼고 다른 건 잊어버려…… 응응, 하앗…… 싸움도, 일상도, 전부……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はっ、あっ、ふあぁっ<emoji=heart04>\u3000嫌なこと、面倒なことは全部放り出して……交わり合う快楽を愉しみましょう？」"
translation = "「핫, 앗, 후아앗<emoji=heart04> 싫은 것, 귀찮은 건 전부 내던지고…… 서로 섞이는 쾌락을 즐기자?」"

[[dialogue]]
speaker = "unk"
original = "感じるのは、ウィステリアさんの声と、下半身で味わう快感だけ。"
translation = "느껴지는 것은 위스테리아 씨의 목소리와 하반신으로 맛보는 쾌감뿐."

[[dialogue]]
speaker = "unk"
original = "それ以外の感覚が薄れていく。"
translation = "그 외의 감각이 희미해져 간다."

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁ、はっ、あっ、あっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっと気持ち良くなって<emoji=heart04>\u3000君が感じるのは快楽だけ<emoji=heart04>」"
translation = "「하아, 핫, 앗, 앗<emoji=heart04> 더<emoji=heart04> 더 기분 좋아져<emoji=heart04> 네가 느끼는 건 쾌락뿐이야<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「君はもう何もしなくていいの<emoji=heart04>\u3000はあぁ、ぁっ、あぁんっ<emoji=heart04>\u3000何も考えられないように、私が気持ち良くしてあげる<emoji=heart04>」"
translation = "「너는 이제 아무것도 안 해도 돼<emoji=heart04> 하아아, 앗, 아앙……<emoji=heart04> 아무것도 생각할 수 없게 내가 기분 좋게 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はっ──はっ──はっ──ふぁああっ<emoji=heart04>\u3000ひあぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ひやぁああっ<emoji=heart04>」"
translation = "「핫── 핫── 핫── 후아아앗<emoji=heart04> 히아앗<emoji=heart04> 아앗<emoji=heart04> 응<emoji=heart04> 응응……<emoji=heart04> 히야아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふはぁ、はぁっ、ああっ<emoji=heart04>\u3000君のおち○ぽ、硬くて、おっきくて、私も気持ち良くなるのっ<emoji=heart04>」"
translation = "「후하아, 하앗, 아앗<emoji=heart04> 네 자지, 딱딱하고 커서 나도 기분 좋아져<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひぁああっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000おち○ぽ、奥に当たってっ<emoji=heart04>\u3000おま○こ切なくなっちゃうっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 핫<emoji=heart04> 아아앙……<emoji=heart04> 자지가 안쪽에 닿아서…… 보지가 애달파져<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「奥にズンズン当たるの、君もおち○ぽで感じるでしょっ<emoji=heart04>\u3000ふああっ、あっ、あっ──ひぃあああっ<emoji=heart04>」"
translation = "「안쪽에 쿵쿵 닿는 거, 너도 자지로 느껴지지? <emoji=heart04> 후아앗, 앗, 앗── 히이아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの動きが激しくなり、より強烈な快感が押し寄せてくる。"
translation = "위스테리아 씨의 움직임이 격렬해지고 더욱 강렬한 쾌감이 밀려온다."

[[dialogue]]
speaker = "unk"
original = "与えられるままに快楽を甘受し、思考がほとんど働かなくなっていく。"
translation = "주어지는 대로 쾌락을 달게 받아들이며 사고가 거의 작동하지 않게 되어간다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んんっ<emoji=heart04>\u3000おち○ぽビクビクしてる<emoji=heart04>\u3000また射精したいのね<emoji=heart04>\u3000いいわよ<emoji=heart04>\u3000思いっきり出しちゃって<emoji=heart04>」"
translation = "「응응……<emoji=heart04> 자지가 덜덜 떨려<emoji=heart04> 또 사정하고 싶은 거지? <emoji=heart04> 괜찮아<emoji=heart04> 마음껏 싸버려<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000おもらし射精しちゃっていいのよ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私のおま○こに、白いおしっこ、出して<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 앗<emoji=heart04> 하앙……<emoji=heart04> 오줌 싸듯이 사정해도 돼<emoji=heart04> 흣<emoji=heart04> 앗<emoji=heart04> 내 보지에 하얀 오줌을 싸줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もうこらえることなんて考えられなくて──"
translation = "더 이상 참는다는 건 생각할 수 없어서──"

[[dialogue]]
speaker = "ウィステリア"
original = "「んん～～～っ<emoji=heart04>\u3000精液、また出てるっ<emoji=heart04>\u3000おち○ぽドクドクして、気持ちいいっ<emoji=heart04><emoji=heart04>」"
translation = "「응응~~~<emoji=heart04> 정액, 또 나오고 있어<emoji=heart04> 자지가 울컥거려서 기분 좋아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "また射精してしまった。"
translation = "또 사정해 버렸다."

[[dialogue]]
speaker = "unk"
original = "ドクドクと跳ねる下半身から上ってくる快感が俺を塗り潰す。"
translation = "울컥거리며 튀는 하반신에서 올라오는 쾌감이 나를 뒤덮는다."

[[dialogue]]
speaker = "ウィステリア"
original = "「はあぁ<emoji=heart04>\u3000おもらし射精、気持ち良かった？\u3000はぁっ、ふぅ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ぴゅるぴゅるーって、白いおしっこ出すの気持ち良かったわよね<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 오줌 싸듯이 사정한 거, 기분 좋았어? 하앗, 후우……<emoji=heart04> 응응……<emoji=heart04> 퓨르르르 하고 하얀 오줌 싸는 거 기분 좋았지? <emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ほんとにおもらししたくなったら、このまま出していいのよ<emoji=heart04>\u3000私のおま○こで、君のおもらし、全部受け止めてあげるから<emoji=heart04>」"
translation = "「정말로 오줌이 마려우면 이대로 싸도 돼<emoji=heart04> 내 보지로 네 오줌을 전부 받아줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「君は、気持ちいいって感じるだけでいいの<emoji=heart04>\u3000つらいことも、面倒なことも、しなくていいの……はっ、あっ、ああぁっ<emoji=heart04>」"
translation = "「너는 기분 좋다고 느끼기만 하면 돼<emoji=heart04> 힘든 일도, 귀찮은 일도 안 해도 돼…… 핫, 앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁が蠢くように絡みつき、絶え間なく与えられる快楽が俺を怠惰の奈落へと<ruby>誘<rt>いざな</rt></ruby>う。"
translation = "질벽이 꿈틀거리며 휘감기고, 끊임없이 주어지는 쾌락이 나를 나태의 나락으로 유혹한다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んん～～っ<emoji=heart04>\u3000また来た<emoji=heart04>\u3000ビュクビュクって……はああぁっ<emoji=heart04>」"
translation = "「응응~~<emoji=heart04> 또 왔어<emoji=heart04> 덜덜 떨면서…… 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "我慢も、自制も、羞恥もない。"
translation = "참음도, 자제도, 수치심도 없다."

[[dialogue]]
speaker = "unk"
original = "熱がこみ上げる度にウィステリアさんの中に吐き出す。"
translation = "열기가 솟구칠 때마다 위스테리아 씨 안에 토해낸다."

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000おっきくて、硬いおち○ぽで、おま○こいっぱいになってるっ<emoji=heart04>\u3000おち○ぽ気持ちいいっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 아아앙……<emoji=heart04> 크고 딱딱한 자지로 보지가 가득 찼어<emoji=heart04> 자지 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んんんっ<emoji=heart04>\u3000おち○ぽ奥まで届いて<emoji=heart04>\u3000おま○こキュンキュンしちゃうぅっ<emoji=heart04>\u3000ひやぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>」"
translation = "「응응응……<emoji=heart04> 자지가 안쪽까지 닿아서 보지가 큥큥거려어어<emoji=heart04> 히야앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ぁ……ぅ……」"
translation = "「아…… 우……」"

[[dialogue]]
speaker = "unk"
original = "快感に呑まれて、もうまともに言葉を発することもできない。"
translation = "쾌감에 삼켜져 이제 제대로 말을 할 수도 없다."

[[dialogue]]
speaker = "ウィステリア"
original = "「君は気持ち良くなるだけでいいの<emoji=heart04>\u3000それが君の幸せなの<emoji=heart04>\u3000んあっ──ふっ──ふぁああ<emoji=heart04>\u3000ひああぁ～～っ<emoji=heart04>」"
translation = "「너는 기분 좋아지기만 하면 돼<emoji=heart04> 그게 너의 행복이야<emoji=heart04> 응앗── 훗── 후아아아<emoji=heart04> 히아아아~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "でもそれでいい。"
translation = "하지만 그걸로 됐다."

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんと交わることができれば、それだけでいい。"
translation = "위스테리아 씨와 섞일 수 있다면 그것만으로 충분하다."

[[dialogue]]
speaker = "unk"
original = "それ以外は……面倒だ。"
translation = "그 외의 것은…… 귀찮다."

[[dialogue]]
speaker = "ウィステリア"
original = "「んんはぁ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000おち○ぽの先っぽ、子宮に当たって、ぐりぐりって<emoji=heart04>\u3000これ、いいっ<emoji=heart04>」"
translation = "「응응하아<emoji=heart04> 하앗<emoji=heart04> 응응응……<emoji=heart04> 자지 끝이 자궁에 닿아서 꾹꾹 눌러대…… 이거, 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ふああぁっ<emoji=heart04>\u3000おち○ぽビクビクって、震えてる<emoji=heart04>\u3000一番大きいの、来そう<emoji=heart04>\u3000ふぁっ──は──あ──んん～～～っ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 자지가 덜덜 떨고 있어<emoji=heart04> 제일 큰 게 올 것 같아<emoji=heart04> 흣── 하── 아── 응응~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「出して<emoji=heart04>\u3000出して<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000君の精液で、私のおま○こいっぱいにしてぇっ<emoji=heart04>」"
translation = "「싸줘<emoji=heart04> 싸줘<emoji=heart04> 하아앗<emoji=heart04> 앗<emoji=heart04> 네 정액으로 내 보지를 가득 채워줘어<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「孕ませちゃっていいから<emoji=heart04>\u3000全部出して<emoji=heart04>\u3000私の中に注いで<emoji=heart04>\u3000ひぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>」"
translation = "「임신시켜도 괜찮으니까<emoji=heart04> 전부 싸줘<emoji=heart04> 내 안에 쏟아부어줘<emoji=heart04> 히아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000私のおま○こが<emoji=heart04>\u3000子宮が<emoji=heart04>\u3000君の精液欲しがってるの<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 내 보지가<emoji=heart04> 자궁이<emoji=heart04> 네 정액을 원하고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あ──あ──あ──んんぁああっ<emoji=heart04>\u3000君のおち○ぽで、おま○こイキそうっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イッちゃうぅっ<emoji=heart04>」"
translation = "「아── 아── 아── 응응아아앗<emoji=heart04> 네 자지로 보지가 갈 것 같아<emoji=heart04> 가<emoji=heart04> 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「君の精液で、イかせてっ<emoji=heart04>\u3000んひぁあっ<emoji=heart04>\u3000んぁ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000ふぁあああっ────」"
translation = "「네 정액으로 가게 해줘<emoji=heart04> 응히아앗<emoji=heart04> 응앗<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 후아아아앗────」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ひぁぁあああぁあ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히야아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「んっ……んん……んんん～～～っ<emoji=heart04>\u3000はぁはっ<emoji=heart04>\u3000びゅるびゅるーって、きてるっ<emoji=heart04>\u3000はぁ……あ……はあぁんっ<emoji=heart04>」"
translation = "「응…… 응응…… 응응응~~~앗<emoji=heart04> 하아핫<emoji=heart04> 퓨르르르 하고 오고 있어<emoji=heart04> 하아…… 아…… 하아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "強烈な絶頂が駆け抜け、大量の精液をウィステリアさんの中に吐き出す。"
translation = "강렬한 절정이 스쳐 지나가고 대량의 정액을 위스테리아 씨 안에 토해낸다."

[[dialogue]]
speaker = "ウィステリア"
original = "「はあぁ……<emoji=heart04>\u3000おち○ぽドクドクして……まだこんなに出るのね……<emoji=heart04>\u3000嬉しい<emoji=heart04>\u3000はぁ……あ……君の精液、子宮で飲んであげるわね……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 자지가 울컥거려서…… 아직도 이렇게나 나오는구나……<emoji=heart04> 기뻐<emoji=heart04> 하아…… 아…… 네 정액, 자궁으로 마셔줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんが腰を深く沈め、脈打つ亀頭に子宮口を密着させる。"
translation = "위스테리아 씨가 허리를 깊숙이 가라앉히고 맥동하는 귀두에 자궁구를 밀착시킨다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ああっ……んんっ……熱いぃ……<emoji=heart04>\u3000子宮に、精液、いっぱい入ってきてる……はぁ……ぁっ……はあぁ……<emoji=heart04>」"
translation = "「아앗…… 응응…… 뜨거워……<emoji=heart04> 자궁에 정액이 가득 들어오고 있어…… 하아…… 앗…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮に注がれる精液の熱さに打ち震えるウィステリアさん。"
translation = "자궁에 쏟아지는 정액의 뜨거움에 몸을 떠는 위스테리아 씨."

[[dialogue]]
speaker = "unk"
original = "俺は快楽を味わうだけのモノと成り果てながら、最後の一滴まで射精し続けた。"
translation = "나는 쾌락을 맛보기만 하는 물건으로 전락하면서도 마지막 한 방울까지 계속 사정했다."

[[dialogue]]
speaker = "ウィステリア"
original = "「ふふ<emoji=heart04>\u3000おま○こにた～くさん精液出してくれたわね<emoji=heart04>」"
translation = "「후후<emoji=heart04> 보지에 정액을 잔뜩 싸줬네<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
original = "「はあぁ……子宮が君の精液でいっぱい<emoji=heart04>\u3000本当に孕んじゃったかも<emoji=heart04>」"
translation = "「하아아…… 자궁이 네 정액으로 가득해<emoji=heart04> 정말로 임신해버렸을지도<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんが妖艶に微笑みかけるが、俺は何も言葉を返すことができない。"
translation = "위스테리아 씨가 요염하게 미소 짓지만, 나는 아무런 말도 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "快楽を感じる以外のことが面倒で、そんな力は残っていない。"
translation = "쾌락을 느끼는 것 외에는 귀찮아서, 그런 힘은 남아 있지 않다."

[[dialogue]]
speaker = "ウィステリア"
original = "「うふふ……たくさん射精してくれてありがとう<emoji=heart04>\u3000お疲れ様<emoji=heart04>」"
translation = "「우후후…… 많이 사정해 줘서 고마워❤️ 수고했어❤️」"

[[dialogue]]
speaker = "ウィステリア"
original = "「疲れたなら眠るといいわ。それじゃ……おやすみなさい」"
translation = "「피곤하다면 자도록 해. 그럼…… 잘 자」"

[[dialogue]]
speaker = "unk"
original = "俺は怠惰に身を委ね、まぶたを閉じた──"
translation = "나는 나태함에 몸을 맡기고, 눈꺼풀을 감았다──"

[[dialogue]]
speaker = "ウィステリア"
original = "「会長くん」"
translation = "「회장 군」"

[[dialogue]]
speaker = "クロト"
original = "「ハッ──！\u3000俺は何を……？」"
translation = "「핫──! 나는 뭘……?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「目が覚めたわね。あのまま眠っていたら魂を持っていかれてたわよ」"
translation = "「눈을 떴네. 그 상태로 잠들었으면 영혼을 빼앗길 뻔했어」"

[[dialogue]]
speaker = "ウィステリア"
original = "「今のが魔将の呪いの力。怠惰に魅了されて、快楽を得ること以外放棄しそうになっていたの」"
translation = "「지금 게 마장의 저주의 힘. 나태함에 매료되어서, 쾌락을 얻는 것 외에는 포기할 뻔했던 거야」"

[[dialogue]]
speaker = "クロト"
original = "「これが魔将の恐ろしさ……？」"
translation = "「이게 마장의 무서움……?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうよ。呪いは容易く魂を奪うもの。だから私がこの姿の時は、油断しすぎないでね」"
translation = "「그래. 저주는 쉽게 영혼을 앗아가는 법이지. 그러니까 내가 이 모습일 때는, 너무 방심하지 말라고」"

[[dialogue]]
speaker = "ウィステリア"
original = "「でもしたい時はちゃんと言ってね？\u3000言ってくれたら、ちゃんとスッキリさせてあげるから<emoji=heart04>」"
translation = "「하지만 하고 싶을 때는 제대로 말해줘? 말해주면, 확실하게 기분 좋게 해줄 테니까❤️」"

[[dialogue]]
speaker = "クロト"
original = "「は……はい……」"
translation = "「네…… 네……」"

[[dialogue]]
speaker = "unk"
original = "さっきまで味わっていた怠惰の快楽は、記憶に深く刻まれてしまった。"
translation = "아까까지 맛보았던 나태의 쾌락은, 기억에 깊이 새겨져 버렸다."

[[dialogue]]
speaker = "unk"
original = "魔将となった姿を見る度に思い出してしまいそうで、ウィステリアさんの言葉通り、魔将の恐ろしさを身を以て思い知ったのだった。"
translation = "마장이 된 모습을 볼 때마다 떠오를 것 같아서, 위스테리아 씨의 말대로 마장의 무서움을 몸소 실감했다."

