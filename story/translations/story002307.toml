[[dialogue]]
speaker = "unk"
original = "緋宮クロトと人形がレイラと戦っている最中、マリオンは見知った魔力を感じ、廃教会に飛び込んだ。"
translation = "히노미야 쿠로토와 인형이 레이라와 싸우는 도중, 마리온은 낯익은 마력을 느끼고 폐교회로 뛰어들었다."

[[dialogue]]
speaker = "unk"
original = "荒んだ内装の中心には魔法陣に浮かぶコハルコの姿があった。"
translation = "황폐한 내장 중심에는 마법진에 떠 있는 코하루코의 모습이 있었다."

[[dialogue]]
speaker = "マリオン"
original = "「コハルコ様──」"
translation = "「코하루코 님──」"

[[dialogue]]
speaker = "マリオン"
original = "「ぐっ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker = "unk"
original = "四方八方からの斬撃。侵入者を歓迎するトラップだ。マリオンを容赦なく八つ裂きにする。"
translation = "사방팔방에서 날아오는 참격. 침입자를 환영하는 트랩이다. 마리온을 가차 없이 여덟 조각으로 찢어버린다."

[[dialogue]]
speaker = "イザベラ"
original = "「久しぶりね、マリオン。相変わらず気色の悪い魔法」"
translation = "「오랜만이네, 마리온. 여전히 기분 나쁜 마법이야.」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「お褒め頂き光栄です。あなたもお元気そうですね」"
translation = "「칭찬해 주시니 영광입니다. 당신도 건강해 보이시네요.」"

[[dialogue]]
speaker = "unk"
original = "さっき斬られたのは人形だ。敵の拠点に乗り込むのに、最初から本体で乗り込む愚は犯さない。"
translation = "방금 베인 것은 인형이다. 적의 거점에 쳐들어가는 데 처음부터 본체로 들이닥치는 어리석은 짓은 범하지 않는다."

[[dialogue]]
speaker = "イザベラ"
original = "「忌まわしい姿ね……見ているだけで腹が立つわ」"
translation = "「꺼림칙한 모습이네…… 보고 있는 것만으로도 화가 나.」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「ふふ、そう言わないでください。私にとっては正装なのですよ？」"
translation = "「후후, 그렇게 말씀하지 마세요. 제게는 정장이라구요?」"

[[dialogue]]
speaker = "unk"
original = "これがマリオンの本来の姿。ネビュラ内部の反乱分子を抹殺する『魔女狩り』だ。"
translation = "이것이 마리온의 본래 모습. 네뷸라 내부의 반란 분자를 말살하는 『마녀 사냥』이다."

[[dialogue]]
speaker = "イザベラ"
original = "「会わないうちに、随分おしゃべりになったみたいね。人間界はよほど水が合ったのかしら」"
translation = "「안 본 사이에 꽤 말이 많아진 모양이네. 인간계가 아주 적성에 맞았나 보지?」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「ええ、お陰様で。そちらは腕が落ちたようですが」"
translation = "「네, 덕분에요. 그쪽은 실력이 죽은 것 같습니다만.」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「結界術は私の専門外ですが、それでも魔法陣を見れば分かります。これは世界を救う魔法などではありません。いったい何を企んでいるのです？」"
translation = "「결계술은 제 전문 외입니다만, 그래도 마법진을 보면 압니다. 이건 세계를 구하는 마법 같은 게 아니에요. 도대체 무엇을 꾸미고 있는 거죠?」"

[[dialogue]]
speaker = "イザベラ"
original = "「そりゃそうよ、世界なんてどうでもいいもの」"
translation = "「그거야 당연하지, 세계 따위 아무래도 좋으니까.」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「は……？\u3000あなたは世界を救う研究をしていたはずでは？」"
translation = "「하……? 당신은 세계를 구하는 연구를 하고 있었을 텐데요?」"

[[dialogue]]
speaker = "イザベラ"
original = "「……けんじゃないわよ」"
translation = "「……웃기지 마.」"

[[dialogue]]
speaker = "イザベラ"
original = "「ふざけんじゃないわよ！\u3000どいつもこいつも口を開けば世界世界って！！\u3000そんなに世界が大事なの！？」"
translation = "「웃기지 말라고! 너도나도 입만 열면 세계 세계!! 그렇게나 세계가 중요해!?」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「何を……？\u3000リクリエを打倒し、世界を救う。それが我々、魔女の使命……」"
translation = "「무슨……? 리크리에를 타도하고 세계를 구한다. 그것이 우리 마녀의 사명……」"

[[dialogue]]
speaker = "イザベラ"
original = "「それがくだらないって言ってるんでしょうがぁっ！！」"
translation = "「그게 하찮다고 말하는 거잖아!!」"

[[dialogue]]
speaker = "イザベラ"
original = "「使命なんて、要らない！\u3000私たち魔女は森に引きこもっていればよかった！」"
translation = "「사명 따위 필요 없어! 우리 마녀들은 숲에 처박혀 있으면 됐어!」"

[[dialogue]]
speaker = "イザベラ"
original = "「そうすれば、ウェールは……っ！\u3000世界を救う使命が、私からあの子を奪ったのよ！！」"
translation = "「그랬다면 웨일은……! 세계를 구하는 사명이 나에게서 그 아이를 뺏어갔어!!」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「ウェール……あなたの娘でしたね。ネビュラの任務でアステラを調査している途中で行方不明になったと、報告にはありました」"
translation = "「웨일…… 당신의 딸이었죠. 네뷸라의 임무로 아스텔라를 조사하던 도중 행방불명되었다고 보고서에 있었습니다.」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「しかしあなたが娘を養育していたのは、他の魔女の都合が悪くなり、仕方なく引き受けたからだと聞いています。子育てに辟易していたとも」"
translation = "「하지만 당신이 딸을 양육했던 것은 다른 마녀의 형편이 나빠져 어쩔 수 없이 맡았기 때문이라고 들었습니다. 육아에 진저리치고 있었다고도요.」"

[[dialogue]]
speaker = "イザベラ"
original = "「そりゃそうでしょ。子どもなんて、うるさいし、言うこと聞かないし、好き嫌いばっかだし、資料だって汚すし、いいことなんてひとつもなかったわ」"
translation = "「그거야 당연하지. 애란 건 시끄럽고, 말도 안 듣고, 편식만 해대고, 자료는 더럽히고, 좋은 점이라곤 하나도 없었어.」"

[[dialogue]]
speaker = "イザベラ"
original = "「でも、でも……私には、あの子が……あの子さえ……」"
translation = "「하지만, 하지만…… 내겐 그 아이가…… 그 아이만이라도……」"

[[dialogue]]
speaker = "イザベラ"
original = "「私はもう誰も死なない世界を作りたかった。だけど、もういいわ」"
translation = "「나는 이제 아무도 죽지 않는 세계를 만들고 싶었어. 하지만 이제 됐어.」"

[[dialogue]]
speaker = "イザベラ"
original = "「あの子のいない世界に意味なんてないもの」"
translation = "「그 아이가 없는 세계에 의미 따위 없는걸.」"

[[dialogue]]
speaker = "イザベラ"
original = "「私はこの結界で秋葉原を切り離し、異界に隔離する。世界なんて勝手に滅びなさい」"
translation = "「나는 이 결계로 아키하바라를 떼어내 이계로 격리하겠어. 세계 따위 마음대로 망해버리라지.」"

[[dialogue]]
speaker = "イザベラ"
original = "「あの子だっていつか帰ってくる……まだ見つかってないんだもの、希望はあるわ」"
translation = "「그 아이도 언젠가 돌아올 거야…… 아직 발견되지 않았으니 희망은 있어.」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「あなたが何を成そうとしているのかは分かりました。ですが、そのためにコハルコ様を犠牲にするわけには参りません。あなたはここで私が討ちます」"
translation = "「당신이 무엇을 이루려 하는지는 알겠습니다. 하지만 그러기 위해 코하루코 님을 희생시킬 수는 없습니다. 당신은 여기서 제가 처단하겠습니다.」"

[[dialogue]]
speaker = "イザベラ"
original = "「やれるものならやってみなさい。どれだけ鈍らになったか見てあげるわ」"
translation = "「할 수 있다면 해보렴. 얼마나 무뎌졌는지 지켜봐 주마.」"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イザベラ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "両者が向かい合い、沈黙が落ちた。魔力が膨れ上がった次の瞬間──"
translation = "양자가 마주 보고 침묵이 내려앉았다. 마력이 부풀어 오른 다음 순간──"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「マリオネット・エグゼキューション！！」"
translation = "「마리오네트 익제큐션!!」"

[[dialogue]]
speaker = "イザベラ"
original = "「ダークネス・オブリビオン！」"
translation = "「다크니스 오블리비언!」"

[[dialogue]]
speaker = "unk"
original = "マリオンの操る刃が、黒い斬撃を弾き、深々とイザベラに突き刺さる。"
translation = "마리온이 조종하는 칼날이 검은 참격을 튕겨내고 깊숙이 이자벨라에게 박힌다."

[[dialogue]]
speaker = "unk"
original = "もともと研究職であったイザベラが、魔女との戦闘に特化したマリオンに敵うはずもない。"
translation = "원래 연구직이었던 이자벨라가 마녀와의 전투에 특화된 마리온을 상대할 수 있을 리 없다."

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「さようなら」"
translation = "「안녕히 가시길.」"

[[dialogue]]
speaker = "イザベラ"
original = "「がはっ……」"
translation = "「커흑……」"

[[dialogue]]
speaker = "unk"
original = "致命傷だ。マリオンはそう判断し、コハルコを救出しようとして……立ち止まる。"
translation = "치명상이다. 마리온은 그렇게 판단하고 코하루코를 구출하려다…… 멈춰 선다."

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "（何かがおかしい……）"
translation = "（무언가 이상하군요……）"

[[dialogue]]
speaker = "unk"
original = "これでは過去の再演だ。以前もこうしてイザベラを葬った。その時も確かに手ごたえはあった。だというのに、なぜ彼女は再び現れたのか？"
translation = "이것은 과거의 재연이다. 이전에도 이렇게 이자벨라를 매장했다. 그때도 분명히 감촉은 있었다. 그런데 어째서 그녀는 다시 나타난 것인가?"

[[dialogue]]
speaker = "イザベラ"
original = "「──だから言ったじゃない、鈍らだって」"
translation = "「──그러니까 말했잖아, 무뎌졌다고.」"

[[dialogue]]
speaker = "unk"
original = "マリオンが振り返ると同時、イザベラは立ち上がっていた。その手に、黒い球体──ブラックホールを浮かべて。"
translation = "마리온이 뒤돌아봄과 동시에 이자벨라는 일어서 있었다. 그 손에 검은 구체── 블랙홀을 띄운 채."

[[dialogue]]
speaker = "unk"
original = "穿たれたはずの傷はすでにふさがっている。"
translation = "뚫렸을 터인 상처는 이미 아물어 있다."

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "（なるほど、そういうことですか。コラプサーたちの経緯に共通点があると思いましたが……）"
translation = "（과연, 그런 것이었습니까. 콜랩서들의 경위에 공통점이 있다고 생각했습니다만……）"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "（ブラックホールは死した星の成れの果て。そしてコラプサーも自身の死によってその力に目覚める）"
translation = "（블랙홀은 죽은 별의 말로. 그리고 콜랩서 역시 자신의 죽음으로 인해 그 힘에 깨어난다.）"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "（一度討ったはずのイザベラが蘇ったのも──）"
translation = "（한번 처단했을 이자벨라가 되살아난 것도──）"

[[dialogue]]
speaker = "マリオン（覚醒）"
original = "「……あなたもコラプサーだったのですね」"
translation = "「……당신도 콜랩서였군요.」"

[[dialogue]]
speaker = "イザベラ"
original = "「違うと言った覚えはないわ。……消えなさい、ブラックホール・ディバウアー！」"
translation = "「아니라고 말한 기억은 없는데. ……사라지렴, 블랙홀 디바우어!」"

[[dialogue]]
speaker = "イザベラ"
original = "「これで邪魔者は……消えたわね……」"
translation = "「이걸로 방해꾼은…… 사라졌네……」"

[[dialogue]]
speaker = "マリオン"
original = "（──！）"
translation = "（──!）"

[[dialogue]]
speaker = "unk"
original = "人形のマリオンが消えゆく間際、イザベラの輪郭が解け、異形へと変じていく瞬間を目撃する。"
translation = "인형 마리온이 사라지기 직전, 이자벨라의 윤곽이 풀리며 이형으로 변해가는 순간을 목격한다."

[[dialogue]]
speaker = "イザベラ"
original = "『さぁ……最後の仕上げよ……』"
translation = "『자…… 마지막 마무리야……』"

