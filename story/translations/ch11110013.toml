[[dialogue]]
speaker = "unk"
original = "第３話,ニンニク大好きベアトさん,P"
translation = "제3화, 마늘을 정말 좋아하는 베아트 씨, P"

[[dialogue]]
speaker = "ベアトリス"
original = "「う～ん、やっぱりまだないのかな～……」"
translation = "「으~음, 역시 아직 없는 걸까~……」"

[[dialogue]]
speaker = "unk"
original = "こんにちは、ベアトリス"
translation = "안녕, 베아트리스"

[[dialogue]]
speaker = "ベアトリス"
original = "「かか、会長さん！？\u3000ごめんなさい、この前は、お見苦しいところをお見せしました……」"
translation = "「카, 회장님!? 죄송해요, 요 전에는 꼴사나운 모습을 보여드려서……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、気にしてないよ"
translation = "괜찮아, 신경 안 써"

[[dialogue]]
speaker = "ベアトリス"
original = "「そ、そうですか……ありがとうございます……」"
translation = "「그, 그렇습니까…… 감사합니다……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あの、恥のかきついでに聞きたいんですけど、この辺りにニンニクを好きなだけ盛れるパスタ屋さんってありませんでしたか？」"
translation = "「저기, 창피한 김에 여쭤보고 싶은 게 있는데요, 이 근처에 마늘을 원하는 만큼 얹을 수 있는 파스타 가게는 없었나요?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「……この辺にはない？\u3000やっぱりそうですか……」"
translation = "「……이 근처에는 없어? 역시 그런가요……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「え、心当たりがある？\u3000ホントですか！？」"
translation = "「에, 짐작 가는 곳이 있어? 정말인가요!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「アーリオ・ポモドーロ……そう、このお店です！\u3000イタリア語でニンニクとトマトって意味らしいですよ」"
translation = "「아리오 포모도로…… 맞아요, 이 가게예요! 이탈리아어로 마늘과 토마토라는 뜻이래요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「は～、こんなところにお店があるなんて知らなかったなぁ～。もしかしてここから移転したのかな？」"
translation = "「하~, 이런 곳에 가게가 있는 줄은 몰랐네~. 혹시 여기서 이전한 걸까?」"

[[dialogue]]
speaker = "unk"
original = "ここから移転した……？"
translation = "여기서 이전했다……?"

[[dialogue]]
speaker = "ベアトリス"
original = "「ああいえいえいえっ、何でもないですよ、何でもっ。あははは……」"
translation = "「아아 아뇨아뇨아뇨, 아무것도 아니에요, 아무것도. 아하하하……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そうです会長さん、せっかくですしここで一緒にお食事しませんか？」"
translation = "「맞다 회장님, 기왕 이렇게 된 거 여기서 같이 식사하지 않으실래요?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ここはニンニクたっぷりがデフォなので、匂いが気にならなければですけど……」"
translation = "「여기는 마늘 듬뿍이 기본이라서, 냄새가 신경 쓰이지 않으신다면요……」"

[[dialogue]]
speaker = "unk"
original = "喜んで！"
translation = "기꺼이!"

[[dialogue]]
speaker = "ベアトリス"
original = "「やった！\u3000じゃあ行きましょう！」"
translation = "「앗싸! 그럼 가요!」"

[[dialogue]]
speaker = "unk"
original = "これから人に会う予定のない俺たちは、思う存分ニンニクたっぷりのパスタを味わった。"
translation = "앞으로 사람을 만날 예정이 없는 우리들은, 마음껏 마늘이 듬뿍 들어간 파스타를 맛보았다."

[[dialogue]]
speaker = "ベアトリス"
original = "「は～、美味しかった～♪」"
translation = "「하~, 맛있었다~♪」"

[[dialogue]]
speaker = "unk"
original = "口の周りが真っ赤になってるよ"
translation = "입 주변이 새빨개졌어"

[[dialogue]]
speaker = "ベアトリス"
original = "「ええっ、ウソ！？\u3000ＤＩＳＣで確認を──ああ、ホントだ！？\u3000トマトソースがべったり付いてる！！」"
translation = "「에엣, 거짓말!? DISC로 확인을── 아아, 진짜다!? 토마토 소스가 잔뜩 묻어 있어!!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ふきふき……ごめんなさい。はしたないところをお見せしました……」"
translation = "「슥슥…… 죄송해요. 품위 없는 모습을 보여드렸네요……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも会長さんのおかげで、最近足りなかったニンニク分を補充できました。ありがとうございますっ」"
translation = "「하지만 회장님 덕분에, 최근 부족했던 마늘 성분을 보충할 수 있었어요. 감사합니다」"

[[dialogue]]
speaker = "ベアトリス"
original = "「会長さんは魔王で怖い人だって聞いてたんですけど、全然そんなことなかったです。むしろ優しくて驚いちゃいました」"
translation = "「회장님은 마왕이라 무서운 분이라고 들었는데, 전혀 그렇지 않았어요. 오히려 다정해서 놀랐을 정도예요」"

[[dialogue]]
speaker = "unk"
original = "吸血鬼なのにニンニクは大丈夫なの？"
translation = "흡혈귀인데 마늘은 괜찮아?"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ～、吸血鬼はニンニクが苦手ってやつですね」"
translation = "「아~, 흡혈귀는 마늘을 못 먹는다는 그거 말이죠」"

[[dialogue]]
speaker = "ベアトリス"
original = "「吸血鬼は嗅覚が鋭いので、ニンニクの匂いが嫌いな人は多いんですけど、食べたら死ぬとかそんなことはないですよ」"
translation = "「흡혈귀는 후각이 예민해서 마늘 냄새를 싫어하는 사람은 많지만, 먹는다고 죽거나 그런 건 아니에요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「むしろ私は大好きです！\u3000故郷じゃ全然食べられなかったから、流星市国に来て良かったです！」"
translation = "「오히려 저는 정말 좋아해요! 고향에선 전혀 먹을 수 없었으니까, 유성시국에 오길 잘했어요!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「おかげで息がニンニクの匂いになっちゃいましたけど」"
translation = "「덕분에 숨결에서 마늘 냄새가 나게 되어버렸지만요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「でも時間は限られてますから。食事を楽しまなきゃ人生損ですっ」"
translation = "「하지만 시간은 한정되어 있으니까요. 식사를 즐기지 않으면 인생 손해예요」"

[[dialogue]]
speaker = "ベアトリス"
original = "「──！\u3000モンスター！」"
translation = "「──! 몬스터!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「ここから近いです！\u3000行きましょう、会長さん！」"
translation = "「여기서 가까워요! 가요, 회장님!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イ～～～～～ッ！！」"
translation = "「이~~~~~익!!」"

[[dialogue]]
speaker = "unk"
original = "突如として街に現れる大型モンスター。力ない人々は逃げ惑うが──"
translation = "갑자기 거리에 나타난 대형 몬스터. 힘없는 사람들은 도망치기 바쁘지만──"

[[dialogue]]
speaker = "ベアトリス"
original = "「させないよ！\u3000ブラッディインベイション──！」"
translation = "「하게 두지 않아! 블러디 인베이전──!」"

[[dialogue]]
speaker = "ダークキングフワッチ"
original = "「イ～～～ッ……」"
translation = "「이~~~익……」"

[[dialogue]]
speaker = "unk"
original = "いつもの少し頼りない様子はどこへやら、圧倒的な力でモンスターを駆逐していくベアトリス。"
translation = "평소의 조금 미덥지 못한 모습은 어디로 갔는지, 압도적인 힘으로 몬스터를 구축해 나가는 베아트리스."

[[dialogue]]
speaker = "unk"
original = "その実力は星徒会の役員に匹敵する──あるいはそれ以上かもしれない。"
translation = "그 실력은 성도회의 임원에 필적하는── 혹은 그 이상일지도 모른다."

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～～！」"
translation = "「이~~~!」"

[[dialogue]]
speaker = "unk"
original = "！\u3000モンスターが逃げる人の方に──！"
translation = "! 몬스터가 도망치는 사람 쪽으로──!"

[[dialogue]]
speaker = "ベアトリス"
original = "「させないって言ってるでしょ！\u3000誰も傷つけさせないから！」"
translation = "「안 된다고 말했잖아! 아무도 상처 입히게 두지 않을 거니까!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「これで終わり──レッドスプラッシュ！」"
translation = "「이걸로 끝── 레드 스플래시!」"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～……」"
translation = "「이~~……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「はい、これでおしまいっと。みなさんお怪我はありませんか？」"
translation = "「네, 이걸로 끝. 여러분 다친 곳은 없으신가요?」"

[[dialogue]]
speaker = "女性"
original = "「はい、おかげさまで……んっ！？」"
translation = "「네, 덕분에…… 응!?」"

[[dialogue]]
speaker = "女性"
original = "「あ、ありがとうございました……失礼します……」"
translation = "「고, 고마웠습니다…… 실례할게요……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「あ、行っちゃった……。私たち、避けられてる……？\u3000怖がられちゃったのかな？」"
translation = "「아, 가버렸다……. 우리들, 피해 지고 있어……? 무서워하는 걸까?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「はーい、とうちゃく～」"
translation = "「네~이, 도차~악」"

[[dialogue]]
speaker = "アポロ"
original = "「なんだ、もう終わってるじゃんか。モンスターが綺麗さっぱりいなくなってるぞ」"
translation = "「뭐야, 벌써 끝났잖아. 몬스터가 아주 깔끔하게 사라졌는데」"

[[dialogue]]
speaker = "梨緒"
original = "「魔王とベアトか……なら私たちの出る幕はなかったか」"
translation = "「마왕과 베아트인가…… 그렇다면 우리가 나설 차례는 없었겠군」"

[[dialogue]]
speaker = "ベアトリス"
original = "「そんなことないよ。来てくれてありがとう、みんな」"
translation = "「그렇지 않아. 와줘서 고마워, 얘들아」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ん？\u3000すんすん……」"
translation = "「응? 킁킁……」"

[[dialogue]]
speaker = "梨緒"
original = "「これは……」"
translation = "「이건……」"

[[dialogue]]
speaker = "アポロ"
original = "「どうした２人とも？\u3000仲間外れは良くない──んっ！？」"
translation = "「왜 그래 둘 다? 따돌림은 좋지 않── 윽!?」"

[[dialogue]]
speaker = "ベアトリス"
original = "「どうしたの！？\u3000何かあった！？」"
translation = "「왜 그래!? 무슨 일 있어!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ごめんベアト、ちょ～っと離れててくれる？」"
translation = "「미안 베아트, 조~금만 떨어져 있어 줄래?」"

[[dialogue]]
speaker = "梨緒"
original = "「ベアト、魔王、こういう言い方はなんだが……匂いがきついぞ」"
translation = "「베아트, 마왕, 이런 말 하긴 좀 그렇지만…… 냄새가 심하군」"

[[dialogue]]
speaker = "アポロ"
original = "「ニンニク食べすぎだ！\u3000こっち寄るな、ベアト、魔王！」"
translation = "「마늘을 너무 많이 먹었어! 이쪽으로 오지 마, 베아트, 마왕!」"

[[dialogue]]
speaker = "ベアトリス"
original = "「え～～っ、ごめんなさ～～～いっ！？」"
translation = "「에에~~엑, 죄송해~~요!?」"

[[dialogue]]
speaker = "unk"
original = "星騎士たる者、緊急の事態を想定し、匂いの強いものはほどほどにはすべき……なのかもしれない。"
translation = "성기사 된 자, 긴급 사태를 상정하여 냄새가 강한 것은 적당히 해야…… 하는 것일지도 모른다."

