[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「うおおおっ！\u3000ブレイズアサルトッ！」"
translation = "「우오오오! 블레이즈 어썰트!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「サタニックグレイスッ！」"
translation = "「사타닉 그레이스!」"

[[dialogue]]
speaker = "unk"
original = "俺たちが同時に放った技が激しくぶつかり、轟音を伴って弾けた。"
translation = "우리들이 동시에 날린 기술이 격렬하게 충돌하며 굉음과 함께 튕겨 나갔다."

[[dialogue]]
speaker = "unk"
original = "しかし、星術の練度や純粋な攻撃力は俺の方が上だ。"
translation = "하지만 성술의 숙련도나 순수한 공격력은 내가 위다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いてて……！\u3000あんた、やっぱり強ぇな……前の立ち会いからかなり鍛えたつもりだったけど、まだまだ敵わねえのか」"
translation = "「아야야……! 당신, 역시 강하네…… 지난번 대련 이후로 꽤 단련했다고 생각했는데, 아직도 상대가 안 되는 건가.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「あーあ、オレの負けだ、負け！\u3000約束だ。負けちまったからには、あんたの要求に応えねえとな」"
translation = "「아ー아, 내 패배다, 패배! 약속이지. 져버린 이상, 당신 요구에 응해야겠네.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「どうする？\u3000星徒会での雑用奉仕？\u3000逆立ちで渋谷一周？\u3000なんでもやってやるよ、女に二言はねえ！」"
translation = "「어떡할래? 성도회에서의 잡무 봉사? 물구나무서서 시부야 한 바퀴? 뭐든지 해줄게, 여자에게 일구이언은 없으니까!」"

[[dialogue]]
speaker = "unk"
original = "俺の力に屈服し、傷ついたフランを見ていると、そのいろいろを全部差し置いて、不埒な感情がムクムクと湧き上がってきた。"
translation = "내 힘에 굴복해 상처 입은 프랑을 보고 있자니, 그런 여러 가지를 전부 제쳐두고 불온한 감정이 뭉게뭉게 솟아올랐다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「……ん？\u3000お、おい、あんたの股間、デッカくなってねえか？」"
translation = "「……응? 어, 어이, 당신 가랑이, 엄청 커져 있지 않아?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いや、いやいや！\u3000なんでもするとは言ったけどよ。まさか、こんなとこでヤるつもりじゃねえだろうな……！？」"
translation = "「아니, 아니 아니! 뭐든지 하겠다고는 했지만 말이야. 설마, 이런 데서 할 생각은 아니겠지……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「女に二言はないんだよな？」"
translation = "「여자에게 일구이언은 없다고 했지?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ね、ねえけど――うわあぁあああああぁっ！？」"
translation = "「그, 없긴 하지만――우와아아아아아아악!?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「バ、バカ！\u3000こんなところでち○ぽ出すんじゃねえよ！」"
translation = "「바, 바보! 이런 데서 자지를 꺼내지 말라고!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なんでもするとか言った上、ボロボロになった戦闘服から肌を見せてるフランのエロさが悪い」"
translation = "「뭐든지 하겠다고 한 데다, 너덜너덜해진 전투복 사이로 살결을 보여주는 프랑의 에로함이 나빠.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「グロリアじゃあるまいし、オレはエロくねえだろ！\u3000あんたが勝手に、発情してるだけでよ……」"
translation = "「글로리아도 아니고, 난 에로하지 않다고! 당신이 멋대로 발정했을 뿐이지……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「負けたんだから、なんでも従わないとな？」"
translation = "「졌으니까, 뭐든지 따라야겠지?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「くっ……卑怯だぞっ……！\u3000今までこんなことしなかったろ！\u3000いつもはもっと優しく抱いてくれるのに……！」"
translation = "「큿…… 비겁하다……! 지금까지 이런 적 없었잖아! 평소에는 좀 더 상냥하게 안아줬으면서……!」"

[[dialogue]]
speaker = "unk"
original = "フランとは既に何度も肌を重ねているけど、こんな乱暴なシチュエーションは初めてだ。"
translation = "프랑과는 이미 몇 번이나 몸을 섞었지만, 이런 거친 시츄에이션은 처음이다."

[[dialogue]]
speaker = "unk"
original = "愛撫されるまでもなくガチガチに勃起しているペニスを、フランの股間へとあてがう。"
translation = "애무할 것도 없이 딱딱하게 발기한 페니스를 프랑의 가랑이 사이에 갖다 댄다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぅっ……！？\u3000お、おい、あんたのち○ぽ、いつもより硬くねえ？\u3000こんなシチュでメチャクチャ興奮してるなんて変態かよ……」"
translation = "「응읏……!? 어, 어이, 당신 자지, 평소보다 딱딱하지 않아? 이런 시츄에이션에 엄청나게 흥분하다니 변태냐고……」"

[[dialogue]]
speaker = "unk"
original = "変態呼ばわりするフランも、いつも以上にぐしょ濡れだ。"
translation = "변태라고 부르는 프랑도 평소 이상으로 흠뻑 젖어 있다."

[[dialogue]]
speaker = "unk"
original = "宛がっているペニスを伝うたっぷりの愛液は、何よりも正直に期待を物語っている。"
translation = "맞닿은 페니스를 타고 흐르는 듬뿍 담긴 애액은, 무엇보다 정직하게 기대를 말해주고 있다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ちょっ、マジで挿れる気マンマンなのかよ……！\u3000会長が外でこんなことしてるなんてバレたら、絶対にヤベえだろ」"
translation = "「잠깐, 진짜로 삽입할 기세 만만인 거냐고……! 회장이 밖에서 이런 짓 하고 있다는 거 들키면, 진짜 좆되잖아.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「こんな明るいとこで、セックスしちまうなんて……誰かに見られたらどうすんだよ、言い訳できねえぞ……？」"
translation = "「이렇게 밝은 곳에서 섹스해버리다니…… 누군가에게 들키면 어떡할 거야, 변명도 못 한다고……?」"

[[dialogue]]
speaker = "unk"
original = "お互いの体はすっかり交わる準備ができているのに、今更どこかに場所を移すなんて、面倒なことはしてられない。"
translation = "서로의 몸은 완전히 섞일 준비가 되어 있는데, 이제 와서 어딘가로 장소를 옮기는 귀찮은 짓은 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "フランの両腕を掴み、体を後ろに引き寄せて……"
translation = "프랑의 양팔을 잡고 몸을 뒤로 끌어당겨서……"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「待て、待てって！\u3000今日のあんた、強引すぎっ……んっ、んぅ、ウソだろ、マジで……！？」"
translation = "「기다려, 기다리라니까! 오늘 당신, 너무 강압적이야…… 응, 응으, 거짓말이지, 진짜로……!?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぅっ！\u3000くぁ、はぁあぁぁっ……！\u3000は、挿入って、ち〇ぽっ、挿入ってきちゃうぅっ……」"
translation = "「응읏! 크아, 하아아아앗……! 서, 삽입해버려, 자지가, 삽입되어 들어와버려어어……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぁはぁあぁぁっ……！\u3000なんだこのち○ぽ、ぶっとすぎだろっ……！\u3000ま○こ、めちゃくちゃ広がってる……！」"
translation = "「응아하아아아앗……! 뭐야 이 자지, 너무 굵잖아……! 보지, 엄청나게 벌어지고 있어……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はぁ、ふぁぁっ、バカ……こんな、外で……ち〇ぽっ、挿れちまうなんてぇっ………！」"
translation = "「하아, 하아앗, 바보…… 이런, 밖에서…… 자지, 삽입해버리다니잇………!」"

[[dialogue]]
speaker = "unk"
original = "ペニスが熱い膣粘膜に包まれた瞬間、今までしてきたセックスと明らかに違う征服感に襲われた。"
translation = "페니스가 뜨거운 질 점막에 감싸인 순간, 지금까지 해온 섹스와는 명백히 다른 정복감에 휩싸였다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「も、もういいだろ……？\u3000ここでやめようぜ？\u3000誰にも見られないとこなら、何してもいいからさ。な？」"
translation = "「이, 이제 됐지……? 여기서 그만하자. 아무에게도 들키지 않는 곳이라면 뭐든 해도 좋으니까. 응?」"

[[dialogue]]
speaker = "unk"
original = "一度挿れて動き始めてしまったら、途中で止められるわけがない。"
translation = "한번 삽입해서 움직이기 시작했다면, 도중에 멈출 수 있을 리 없다."

[[dialogue]]
speaker = "unk"
original = "フランの胸を張らせるように腕を引き、密着感を増しながら、とろとろになっているフランのおま○こを往復する。"
translation = "프랑의 가슴을 펴게 하듯 팔을 당겨 밀착감을 더하며, 걸쭉해진 프랑의 보지를 왕복한다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ひぅ、んっ、んぅぐっ……話、聞けってえ……！\u3000猿みたいにち〇ぽパコパコぶつけやがって……オレのま〇こ、そんなに気持ちいいのかよっ……！」"
translation = "「히우, 응, 응으윽…… 말 좀 들으라니까……! 원숭이처럼 자지를 퍽퍽 박아대고…… 내 보지, 그렇게 기분 좋은 거냐고……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、いつもより締まってすごく気持ちいい。フランはこういうプレイが好きなんだな」"
translation = "「아아, 평소보다 조여서 아주 기분 좋아. 프랑은 이런 플레이를 좋아하는구나.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「バカ言うんじゃねえっ！\u3000す、好きなわけ――んひゃぅっ！\u3000あっ、んぁっ、くぅぅ、ひぎゅっ！」"
translation = "「바보 같은 소리 하지 마! 조, 좋을 리가――응햐앗! 앗, 응아앗, 크으으, 히귯!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はぁ、はひぃ……ズリぃ、ぞっ……オレの弱いとこばっか、突きやがってぇ……！」"
translation = "「하아, 하히이…… 치사해…… 내 약한 곳만 찔러대고오……!」"

[[dialogue]]
speaker = "unk"
original = "伊達に何度も交わっちゃいない。フランの膣内のウィークポイントは既に熟知している。例えば、角度をつけて抉れば――"
translation = "허투루 여러 번 섞인 게 아니다. 프랑의 질 내 약점은 이미 숙지하고 있다. 예를 들어 각도를 주어 도려내면――"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んきゃぁあぁぁぁんっ！」"
translation = "「응캬아아아앙!」"

[[dialogue]]
speaker = "unk"
original = "いつものフランからは考えられないくらい、甲高くて可愛い喘ぎが飛び出る。"
translation = "평소의 프랑에게서는 생각할 수 없을 정도로 가늘고 귀여운 신음이 터져 나온다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はっ……！？\u3000ち、違う、からなっ！\u3000今の声は、気持ちいい、とかじゃなくって……！\u3000ち○ぽがデカすぎるから、無理やり押し出されちまっただけで……」"
translation = "「핫……!? 아, 아니거든! 방금 목소리는 기분 좋다거나 그런 게 아니라……! 자지가 너무 커서 억지로 밀려 나온 것뿐이고……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はぁ、はっ、くそぉ……オレは変態プレイで感じたりしねえし……！\u3000絶対あんたのち○ぽになんて負けねえからな……勝負だっ！」"
translation = "「하아, 핫, 빌어먹을…… 난 변태 플레이 같은 걸로 느끼지 않는다고……! 절대 당신 자지 따위에 안 질 거니까…… 승부다!」"

[[dialogue]]
speaker = "unk"
original = "その抵抗は、逆効果だ。敗北フラグだ。"
translation = "그 저항은 역효과다. 패배 플래그다."

[[dialogue]]
speaker = "unk"
original = "『絶対ち○ぽになんて負けない！』と強く抵抗すればするほど、俺の情欲と意地を煽るだけ。"
translation = "『절대 자지 따위에게 지지 않아!』라고 강하게 저항하면 할수록, 나의 정욕과 고집을 부추길 뿐."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「あっ！\u3000あっ、あっ、はぁあんっ……！\u3000ち○ぽ、また膨れたぁ……どこまでデカくなんだよ……！」"
translation = "「앗! 앗, 앗, 하아앙……! 자지, 또 부풀었어…… 어디까지 커지는 거야……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「初めての時だって、こんなデッカくしなかったクセに……無理やり犯して興奮するなんて、バカ、バカ！」"
translation = "「처음 했을 때도 이렇게 안 키웠으면서…… 억지로 범하면서 흥분하다니, 바보, 바보!」"

[[dialogue]]
speaker = "unk"
original = "そういうフランの膣内も、膣ひだがきゅっきゅっとキツく締めつけてきて、少しでも早く俺をイかせようとしてくる。"
translation = "그러는 프랑의 질 내부도 질 주름이 꽉꽉 조여오며 조금이라도 빨리 나를 사정하게 하려 한다."

[[dialogue]]
speaker = "unk"
original = "恋人セックスの時より反応が良いけれど、こっちも負けちゃいられない。早いとこ快感で屈服させないと。"
translation = "연인 간의 섹스 때보다 반응이 좋지만, 이쪽도 질 수 없다. 얼른 쾌감으로 굴복시켜야지."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "（見えないし、乱暴だし、いつもよりち○ぽデカいから、知らないヤツに犯されてるみたいなのに……）"
translation = "（보이지도 않고, 거칠고, 평소보다 자지가 크니까, 모르는 녀석한테 범해지는 것 같은데……）"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "（なんでオレ、いつもより感じちまってんだよ……オレ、もしかして、こいつと同じで、変態なのか……！？）」"
translation = "（왜 나, 평소보다 더 느끼고 있는 거야…… 나, 혹시 이 녀석이랑 똑같은 변태인 건가……!?）"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "（違え、絶対に違えし！\u3000んなわけねえ……！\u3000オレは普通だ……乱暴にされるより、ベッドでイチャイチャする方が気持ちいいに決まってる……！）"
translation = "（아냐, 절대 아냐! 그럴 리 없어……! 난 평범하다고…… 거칠게 다뤄지는 것보다 침대에서 꽁냥거리는 게 기분 좋은 게 당연하잖아……!）"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ああ、くそっ……！\u3000どうせ、出すまで収まらねぇんだろ！？\u3000オレのま○こ使っていいから、とっととイッちまえっ……！」"
translation = "「아아, 젠장……! 어차피 쌀 때까지 안 멈출 거잖아!? 내 보지 마음대로 써도 되니까, 얼른 싸버려……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ったく……あんたと愛し合ってるとこなんて、誰かに見られたくねえんだよ……」"
translation = "「정말이지…… 당신이랑 사랑 나누는 모습 같은 거, 누군가에게 들키고 싶지 않다고……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「格好いい応援団で通ってるオレが、ち○ぽで喘いでるとこなんて見られたら、ただの女みたいじゃんか……！」"
translation = "「멋진 응원단으로 통하는 내가, 자지 때문에 신음하고 있는 모습 같은 걸 들키면, 그냥 여자 같잖아……!」"

[[dialogue]]
speaker = "unk"
original = "強がる彼女が、セックスの快感にあっさり屈してしまうただの女の子であるところをもっと引き出したくなった。"
translation = "강한 척하는 그녀가, 섹스의 쾌감에 허무하게 굴복해 버리는 평범한 여자아이라는 점을 좀 더 이끌어내고 싶어졌다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ひぃあっ！？\u3000ひぅぐっ！\u3000んぅふっ……だめだって、そこ――んぁっ！\u3000ぅんうぅぅんっっ……<emoji=heart04>」"
translation = "「히익!? 히으윽! 응후…… 안 된다니까, 거기―― 응아! 으응우우우웅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口から膣口まで、角度を付けて膣ひだを抉り、満遍なくフランの膣内を擦ると、脚をわななかせて甘い声を漏らす。"
translation = "자궁 입구부터 질 입구까지, 각도를 주어 질 주름을 후벼 파고, 골고루 프랑의 질 내부를 문지르자, 다리를 파들거리며 달콤한 목소리를 흘린다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "（だめ、だめだ……！\u3000負けるわけいかねえのに……いつものセックスと全然違うのにっ……ち○ぽが気持ちよくなるためだけの<ruby>慰み物<rt>オナホ</rt></ruby>にされちまってるのに……<emoji=heart04>）"
translation = "（안 돼, 안 된다고……! 질 수는 없는데…… 평소의 섹스랑 전혀 다른데…… 자지가 기분 좋아지기 위한 위안물이 되어버리고 있어……<emoji=heart04>）"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "（オレのま○こ、どうしてこんなに感じちまうんだ……<emoji=heart04>\u3000大好きな会長のち○ぽに勝てねえよっ……！）"
translation = "（내 보지, 어째서 이렇게 느껴버리는 거야……<emoji=heart04> 정말 좋아하는 회장의 자지에는 이길 수 없어……!）"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぅいひっ！？\u3000はぁ、ほぁ……はぁ、はーっ、はぁーっ……！\u3000立ってらんなく、なるぅ……デカち○ぽで子宮潰されるぅっ……<emoji=heart04>」"
translation = "「응으이힛!? 하아, 호아…… 하아, 하아, 하아……! 서 있을 수가, 없게 돼…… 거대한 자지에 자궁이 뭉개져 버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぅぐっ！\u3000ふぁ、あ、あっあっあっあぁっ！\u3000激しっ、んぁああぁっ、イクっ、イっちゃっ、あっ、あぁあぁーっ！」"
translation = "「응으윽! 화, 아, 앗앗앗아앗! 격렬해, 응아아앗, 가, 가버려, 앗, 아아아앗!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はーっ、はーっ……<emoji=heart04>\u3000もう、わかった、わかったからぁっ！\u3000オレの負け、負けでいいからぁっ！」"
translation = "「하아, 하아……<emoji=heart04> 이제, 알았어, 알았으니까! 내가 졌어, 진 걸로 할 테니까!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「またイクッ、イクイクぅっ、イキすぎて、おかしくなる、ま○こ壊れちゃうからっ！\u3000もう許して、許してぇっ！」"
translation = "「또 가, 가버려어, 너무 가서, 이상해져, 보지 망가져 버리니까! 이제 용서해줘, 용서해줘어!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう言われても、フランのおま○こが、ち○ぽを離してくれないんだけど？」"
translation = "「그렇게 말해도, 프랑의 보지가 자지를 놓아주질 않는데?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「し、知らねえって――んぁ、あ゛ぁっ！\u3000あっ、ひぐっ、んぅあっ！\u3000んはぁああああんっ<emoji=heart04>」"
translation = "「나, 나도 모른다구―― 응아, 아아아! 앗, 히극, 응으앗! 응하아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感に耐えきれなくなったフランは、アリーナ中に響き渡るほどの甲高い嬌声を響かせる。"
translation = "쾌감을 견딜 수 없게 된 프랑은, 경기장 안에 울려 퍼질 정도로 높은 교성을 내지른다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「また、またイグぅうぅっ、んぁああっ<emoji=heart04>\u3000はひっ、んぃ、イク、イクッ、イックぅぅぅっ……<emoji=heart04>」"
translation = "「또, 또 가아아앗, 응아아앗<emoji=heart04> 하힛, 응이, 가, 가, 가버려어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "何度も絶頂に達しているフランの性器は、ペニスから精液を搾り取るようにキツく締め付けてくる。"
translation = "몇 번이나 절정에 달하고 있는 프랑의 성기는, 페니스에서 정액을 짜내듯이 꽉 조여 온다."

[[dialogue]]
speaker = "unk"
original = "愛液なのか潮なのか、結合部からは体液が滴り、地面を濡らした。"
translation = "애액인지 애액인지, 결합부에서는 체액이 뚝뚝 떨어져 지면을 적셨다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっと気持ちよくなりたいなら、自分でも腰を振らないとな。気持ちいいの早く認めちゃった方が楽になるぞ」"
translation = "「더 기분 좋아지고 싶으면, 스스로도 허리를 흔들어야지. 기분 좋은 걸 빨리 인정하는 게 편해질 거야」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「わかったっ！\u3000わかった、認めるから……！\u3000ち○ぽ気持ちいいっ、セックスきもぢいいからぁっ！」"
translation = "「알았어! 알았어, 인정할 테니까……! 자지 기분 좋아, 섹스 기분 조으니까아!」"

[[dialogue]]
speaker = "unk"
original = "子宮口を小突く度、フランが甘い絶頂に達する。もう何度目なのかも数えきれない。"
translation = "자궁 입구를 쿡쿡 찌를 때마다, 프랑이 달콤한 절정에 달한다. 벌써 몇 번째인지 셀 수도 없다."

[[dialogue]]
speaker = "unk"
original = "幾度も重なった絶頂の連続が、フランの理性の糸を断ち切った。"
translation = "수없이 겹쳐진 절정의 연속이, 프랑의 이성의 끈을 끊어버렸다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぅうぅんっ<emoji=heart04>\u3000はぁ、はっ、きもぢいっ、外でセックスしゅるの、きもぢいいっ！\u3000ふぁ、んぁはあぁああっ<emoji=heart04>」"
translation = "「응으으응<emoji=heart04> 하아, 하앗, 기분 조아, 밖에서 섹스하는 거, 기분 조아아! 화, 응아하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フランのおま○こがより強く収縮する。男をイかせ、子種を搾り取り、中出しを懇願する収縮運動だ。"
translation = "프랑의 보지가 더욱 강하게 수축한다. 남자를 가게 하고, 씨물을 짜내어, 질내사정을 간청하는 수축 운동이다."

[[dialogue]]
speaker = "unk"
original = "そのリクエストに応えるように、ペニスの下から熱い濁流がせり上がってくる。"
translation = "그 요청에 응답하듯, 페니스 밑바닥에서 뜨거운 탁류가 치밀어 오른다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000ち○ぽびくびく跳ねてる、精液っ、このまま出すのか……？\u3000オレの膣内に出しちゃうつもりなのかよぉ……！」"
translation = "「앗, 앗, 앗<emoji=heart04> 자지 움찔움찔 뛰고 있어, 정액, 이대로 내보내는 거야……? 내 질 안에 싸버릴 셈인 거냐고오……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フランが欲しいんだろ？\u3000俺の精液で孕ませてほしいんだろ？\u3000ちゃんと素直におねだりしなきゃ」"
translation = "「프랑이 원하잖아? 내 정액으로 임신시켜 주길 바라는 거지? 제대로 솔직하게 졸라야지」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぁ、はぁ……はぁっ……欲ひぃ、欲ひぃよ……精液感じながら、イキたいんだぁ……<emoji=heart04>」"
translation = "「응아, 하아…… 하앗…… 원해, 원해애…… 정액 느끼면서, 가고 싶어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「くっ、くだ、ひゃいっ、オレの膣内に、精液っ……精子出されたら、イク、絶対にイッちゃうからぁ……！」"
translation = "「주, 주제, 요, 내 질 안에, 정액…… 정자 싸지면, 가, 절대로 가버리니까아……!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「熱ぅい精液っ……！\u3000たくさん注いで、思いっきり、イカせてくれよぉっ<emoji=heart04>」"
translation = "「뜨거운 정액……! 잔뜩 쏟아서, 마음껏, 가게 해줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「孕んじゃってもいいから、オレの子宮に精子、赤ちゃんの素、くれ、くれ、くれぇええっ……！」"
translation = "「임신해버려도 좋으니까, 내 자궁에 정자, 아기 씨, 줘, 줘, 줘어어어어……!」"

[[dialogue]]
speaker = "unk"
original = "自分がどこにいるかも忘れ、ただ快感を求めるだけのフランのおねだりにラストスパートのピストンを叩きつける。"
translation = "자신이 어디에 있는지도 잊고, 그저 쾌감만을 갈구하는 프랑의 조름에 라스트 스퍼트 피스톤을 때려 박는다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「くはっ、んぁああああっ<emoji=heart04>\u3000だめ、激しっ、イクっ、またイかされるっ、こんなに突かれたら、スゴいイキ方しちまうってえぇっ……<emoji=heart04>」"
translation = "「쿠핫, 응아아아아앗<emoji=heart04> 안 돼, 격렬해, 가, 또 가게 돼, 이렇게 찔러대면, 엄청나게 가버린다고오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぃひぃんっ！\u3000またイク、イクイクッ！\u3000イキすぎて、ワケわかんなくなってるっ<emoji=heart04>\u3000ま○こぐずぐずで、ち○ぽとひとつになっちゃってるぅっ！」"
translation = "「응이히잉! 또 가, 가버려! 너무 가서, 뭐가 뭔지 모르겠어<emoji=heart04> 보지 엉망진창이라서, 자지랑 하나가 되어버려어!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ずっとずっと気持ちよくってっ、イキっぱなしでっ！\u3000ひぐっ！\u3000ま○こ壊りぇるっ、ふぁああっっ！\u3000激しっ、イクッ、イクイクイックぅぅぅっっ<emoji=heart04>」"
translation = "「계속 계속 기분 좋아서, 계속 가고 있어! 히극! 보지 망가져어, 화아아앗! 격렬해, 가, 가버려어어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はひんっ<emoji=heart04>\u3000ち○ぽ、ち○ぽ、デッカくなってるっ<emoji=heart04>\u3000ぷくぅって、射精する？\u3000するんだよなっ！？」"
translation = "「하힝<emoji=heart04> 자지, 자지, 커지고 있어<emoji=heart04> 부풀어서, 사정해? 하는 거지!?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はあっ、ちょうだい、ちょうだい、オレの膣内にアッツいのちょうだいっ……んぅうぅうぅっ！」"
translation = "「하앗, 줘, 줘, 내 질 안에 뜨거운 거 줘…… 응으으으으으!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぁっ、あっ、イクイクっ<emoji=heart04>\u3000デカち○ぽっ、よわよわま○こ、堕ちちゃう、堕とされちゃうぅっ<emoji=heart04>」"
translation = "「응앗, 앗, 가버려가버려<emoji=heart04> 거대 자지, 약해빠진 보지, 타락해버려, 타락해버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ふぁあぁ！\u3000んぁ、あぁぁっ<emoji=heart04>\u3000クるっ<emoji=heart04>\u3000しゅごいの、クるクるぅっ<emoji=heart04>\u3000イックぅうぅうぅうぅぅぅっっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화아아! 응아, 아아앗<emoji=heart04> 온다<emoji=heart04> 굉장한 거, 온다아아<emoji=heart04> 가버려어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んあ゛ぁあぁあぁっ！？\u3000ふぁっ！\u3000あっ、んぁはあぁあぁぁぁぁぁっ<emoji=heart04>」"
translation = "「응아아아아앗!? 화앗! 앗, 응아하아아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口に押し付けた尖端から、勢いよく精液が噴き出した。"
translation = "자궁 입구에 밀착시킨 끝부분에서, 세차게 정액이 뿜어져 나왔다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んぃひっ！\u3000イッ、イグぅうぅっ<emoji=heart04>\u3000またっ、あ゛っ！\u3000あ゛はぁあぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「응이힛! 가, 가버려어<emoji=heart04> 또, 앗! 아하아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「中出しっ、熱いの、びゅーっびゅーって、イッぢゃうっ<emoji=heart04>\u3000んぁあ゛、はひっ！\u3000イッ、イグの止まんな゛ぁいっ！」"
translation = "「질내사정, 뜨거운 거, 뷰욱뷰욱하고, 가버려어<emoji=heart04> 응아아, 하힛! 가, 가는 게 안 멈춰어!」"

[[dialogue]]
speaker = "unk"
original = "ガクガクと全身を震わせ、立つこともままならないフランを支えながら、全ての欲望をフランの膣内に吐き出した。"
translation = "부르르 온몸을 떨며, 서 있는 것조차 힘겨운 프랑을 지탱하면서, 모든 욕망을 프랑의 질 내부에 토해냈다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はっ、はひぃ……こんにゃの、知らにゃあい……<emoji=heart04>\u3000こんにゃの、セックスじゃなくって、ケダモノの交尾らぁ……<emoji=heart04>」"
translation = "「하, 하히이…… 이런 거, 몰라아……<emoji=heart04> 이런 거, 섹스가 아니라, 짐승의 교미야아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はぁーっ！\u3000はぁーっ！\u3000はぁーっ！\u3000ひはっ、はぁーっ、はっ、い、息、できなっ……苦ひぃ……<emoji=heart04>」"
translation = "「하아! 하아! 하아! 히하, 하아, 핫, 수, 숨을 못 쉬겠…… 괴로워어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いに体液を吐き出しきった途端、今の今までかかっていた魅了の魔法が解けたみたいに頭が冷静になり出す。"
translation = "서로 체액을 다 토해내자마자, 방금 전까지 걸려 있던 매료 마법이 풀린 것처럼 머리가 차분해지기 시작한다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はっ、はっ……腹の中、アッチい……精液でたぽたぽだし……ま○こから、溢れてるし……」"
translation = "「하, 하…… 배 안이, 뜨거워…… 정액으로 출렁거리고…… 보지에서, 넘쳐흐르고 있어……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「うぅぅ、めちゃくちゃしやがってえ……どんだけ出したんだよ、マジで赤ちゃんデキちゃうだろぉ……？」"
translation = "「으으으, 엉망진창으로 해대고 말이야…… 얼마나 싸댄 거야, 진짜로 아기 생겨버리겠네……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フランが中に出してって、おねだりしたんだよ？」"
translation = "「프랑이 안에 싸달라고 졸랐잖아?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はぁっ！？\u3000んなこと言うわけ――あれ？\u3000オレ、もしかして、すっげぇ変態なこと言ってた……！？」"
translation = "「하아!? 그런 말을 할 리가―― 어라? 나, 혹시, 엄청 변태 같은 말을 했었나……!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごかった。録音しておきたかったくらい」"
translation = "「대단했어. 녹음해두고 싶었을 정도로」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ふふふふふふふざけんなっ！\u3000そんなことしてたら、ぶん殴るぞ！？」"
translation = "「우우우우우웃기지 마! 그런 짓 했다간, 한 대 때려줄 거야!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「乱れてるフラン、すごく可愛かったよ」"
translation = "「흐트러진 프랑, 정말 귀여웠어」"

[[dialogue]]
speaker = "unk"
original = "背後から優しく頭を撫でてあげると、ペニスを包み込んでいる膣肉がまたキュンキュンとヒクついた。"
translation = "뒤에서 부드럽게 머리를 쓰다듬어 주자, 페니스를 감싸고 있는 질 근육이 다시 움찔움찔 경련했다."

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はぁっ、はぁ……ホントにズリぃよな、あんた……」"
translation = "「하아, 하아…… 정말 반칙이라니까, 당신……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「あんな酷いことされた後だってのに……いきなり優しくされたら、もっと好きになっちまうだろうが……バカ」"
translation = "「그런 심한 짓을 당한 뒤인데도…… 갑자기 다정하게 굴면, 더 좋아하게 되어버리잖아…… 바보」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレはヤダって言ってたのに……あんな変態みてえなセックス教えやがって、癖になっちまったらどう責任取るつもりだよ……」"
translation = "「나는 싫다고 했는데…… 그런 변태 같은 섹스를 가르쳐줘서, 버릇이 되어버리면 어떻게 책임질 생각이야……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「責任取って、一生愛してくれなきゃ……絶対に許さねえからな、へへ<emoji=heart04>」"
translation = "「책임지고, 평생 사랑해 주지 않으면…… 절대 용서 안 할 거니까, 헤헤<emoji=heart04>」"

