[[dialogue]]
speaker = "unk"
original = "第５話,月の壁画、その使命,B"
translation = "제5화, 달의 벽화, 그 사명, B"

[[dialogue]]
speaker = "unk"
original = "フィオナにうながされる形で最初の部屋まで戻ってくると、今度は反対側にある部屋に案内された。"
translation = "피오나에게 이끌리는 형태로 첫 번째 방으로 돌아오자, 이번에는 반대쪽에 있는 방으로 안내되었다."

[[dialogue]]
speaker = "ルリエル"
original = "「およ？\u3000さっきの部屋に似てますが、別室ですよね？」"
translation = "「어이쿠? 아까 방과 비슷하지만, 별실이죠?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。もうひとつ、皆さんにお伝えしておく事項があります」"
translation = "「예. 또 하나, 여러분에게 전해드릴 사항이 있습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「上を見てもらえるかしら、ソフィア」"
translation = "「위를 봐주실까요, 소피아」"

[[dialogue]]
speaker = "ソフィア"
original = "「上……？\u3000あっ」"
translation = "「위……? 앗」"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちが見上げた先には、かつて塔で見た絵画が飾られていた。"
translation = "그렇게 우리가 올려다본 곳에는, 예전에 탑에서 보았던 그림이 걸려 있었다."

[[dialogue]]
speaker = "マトイ"
original = "「これ、太陽の壁画──あれ。ちょっと違う……？」"
translation = "「이거, 태양의 벽화── 어라. 조금 다른데……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「違うわ、マトイ。これは太陽の壁画じゃなくて──月の壁画。そうよね、フィオナ」"
translation = "「달라, 마토이. 이건 태양의 벽화가 아니라── 달의 벽화. 그렇지, 피오나」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。我が星見家に代々受け継がれてきた……真なる魔王の姿です」"
translation = "「예. 저희 호시미 가문에 대대로 계승되어 온…… 진정한 마왕의 모습입니다」"

[[dialogue]]
speaker = "unk"
original = "それからフィオナはこの絵についての委細を語った。"
translation = "그리고 피오나는 이 그림에 대한 자세한 내용을 이야기했다."

[[dialogue]]
speaker = "unk"
original = "俺たちがフィーニスの塔で得た知識──魔王候補──リクリエのサイクル──なども合わせ……"
translation = "우리가 피니스의 탑에서 얻은 지식── 마왕 후보── 리크리에의 사이클── 등도 합쳐서……"

[[dialogue]]
speaker = "unk"
original = "この絵は森羅暦元年、魔王がリクリエを撃退した時の図であるのだと。"
translation = "이 그림은 신라력 원년, 마왕이 리크리에를 격퇴했을 때의 그림인 것이라고."

[[dialogue]]
speaker = "ルリエル"
original = "「ほ……ほえぇ～！\u3000まさかリクリエさんが過去何度も訪れていたなんて……！」"
translation = "「호…… 호에에~! 설마 리크리에 씨가 과거 몇 번이나 찾아왔었다니……!」"

[[dialogue]]
speaker = "セーラ"
original = "「んー、納得はできるけど余計に途方もなく思えてきたよねぇ」"
translation = "「음~ 납득은 가지만 더욱 터무니없게 느껴지네에」"

[[dialogue]]
speaker = "アナ"
original = "「話を聞くに今のこの世界は、耐久度的には限界を迎えているようですね」"
translation = "「이야기를 들으니 지금 이 세계는, 내구도적으로는 한계를 맞이하고 있는 것 같네요」"

[[dialogue]]
speaker = "unk"
original = "荒唐無稽な話ではあったものの、俺たちがマグダレナさんから聞いたことも織り交ぜることでなんとか理解してもらえた。"
translation = "황당무계한 이야기였지만, 우리가 막달레나 씨에게 들었던 것도 섞어 설명함으로써 어떻게든 이해시킬 수 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「先ほど──『フィオナ』という名は襲名するものであるとご説明しましたね」"
translation = "「아까── 『피오나』라는 이름은 습명하는 것이라고 설명드렸죠」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい。ですので、現フィオナ会長はお姉さんの跡を継いだと……」"
translation = "「예. 그래서, 현 피오나 회장님은 언니의 뒤를 이었다고……」"

[[dialogue]]
speaker = "フィオナ"
original = "「星見家の長女──フィオナには通常、役目が背負わされます。女神に仕える流星教皇庁、その巫女としての」"
translation = "「호시미 가문의 장녀── 피오나에게는 통상, 역할이 지워집니다. 여신을 모시는 유성 교황청, 그 무녀로서의」"

[[dialogue]]
speaker = "フィオナ"
original = "「しかし……その役目はあくまで表向きのものにすぎません」"
translation = "「하지만…… 그 역할은 어디까지나 겉모습에 지나지 않습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「<b>次</b>のリクリエが起こった時、この世界を救う『魔王』となること──それこそが、星見フィオナに与えられた本当の使命なのです」"
translation = "「<b>다음</b> 리크리에가 일어났을 때, 이 세계를 구할 『마왕』이 되는 것── 그것이야말로, 호시미 피오나에게 주어진 진정한 사명인 것입니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ソフィア"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "アナ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ルリエル"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "マトイ"
original = "「魔王になるのが使命──って、それじゃ……」"
translation = "「마왕이 되는 게 사명── 이라면, 그럼……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私がクロトに頼んでたのと、同じ……！」"
translation = "「내가 쿠로토에게 부탁했던 거랑, 똑같아……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。姉は紛れもなく……かの存在を目指していました」"
translation = "「예. 언니는 틀림없이…… 그 존재를 목표로 하고 있었습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「かつてクルセイダースを率い、<ruby>古<rt>いにしえ</rt></ruby>の終焉を退けた伝説の英雄──『魔王』を」"
translation = "「이전에 크루세이더스를 이끌고, 옛 종언을 물리친 전설의 영웅── 『마왕』을」"

[[dialogue]]
speaker = "フィオナ"
original = "「しかし、その道半ばで……姉は醒めない眠りに陥ってしまいました。その原因は、今も不明なまま」"
translation = "「하지만, 그 도중에…… 언니는 깨어나지 않는 잠에 빠지고 말았습니다. 그 원인은, 지금도 불명인 채」"

[[dialogue]]
speaker = "フィオナ"
original = "「よって私は──『フィオナ』という名とともに、魔王を目指すという宿命をも受け継ぐこととしたのです」"
translation = "「따라서 저는── 『피오나』라는 이름과 함께, 마왕을 목표로 하는 숙명까지 계승하기로 한 것입니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃん以外にも、そんな子がいたなんてね……」"
translation = "「비너스짱 말고도, 그런 아이가 있었다니……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ほえー……『魔王』様が英雄だなんて、驚きです！」"
translation = "「호에~…… 『마왕』님이 영웅이라니, 놀랍습니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「大聖堂の壁画じゃあ、あんな悪者みたいに描かれてたのに──」"
translation = "「대성당 벽화에서는, 저렇게 악당처럼 그려져 있었는데──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふん。だから言ったじゃないの！\u3000あんなのは嘘っぱちなんだって！」"
translation = "「훗후웅. 그러니까 말했잖아! 저런 건 거짓말이라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「日誌に書かれていた通りよ！\u3000ね、アナ」"
translation = "「일지에 쓰여 있던 대로야! 그치, 아나」"

[[dialogue]]
speaker = "アナ"
original = "「……合致はしますね」"
translation = "「……일치합니다」"

[[dialogue]]
speaker = "unk"
original = "『終焉を打ち砕きし魔王の真実は未だ偽りの悪に虚飾されている。この世界に根を張る日輪の図が、過去の因果を捻じ曲げているのだ』"
translation = "『종언을 부수었던 마왕의 진실은 아직 거짓된 악에 허식되어 있다. 이 세계에 뿌리내린 일륜의 그림이, 과거의 인과를 왜곡하고 있는 것이다』"

[[dialogue]]
speaker = "unk"
original = "『真実を描いた月輪の図はどこかに隠されているという。私は、その在り処を求めるべく友の力を借りた』"
translation = "『진실을 그린 월륜의 그림은 어딘가에 숨겨져 있다고 한다. 나는, 그 소재를 찾기 위해 친구의 힘을 빌렸다』"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは手ずから日誌を開いて俺たちに見せた。"
translation = "비너스는 손수 일지를 펼쳐 우리에게 보여주었다."

[[dialogue]]
speaker = "unk"
original = "いつかは白い目で見られていた彼女の主張にも、こうなると説得力があるように思える。"
translation = "언젠가는 곱지 않은 시선으로 보였던 그녀의 주장도, 이렇게 되니 설득력이 있는 것처럼 느껴진다."

[[dialogue]]
speaker = "クロト"
original = "「ここに記されてる日輪の図──ってのが、太陽の壁画にあたるってことだな」"
translation = "「여기에 기록된 일륜의 그림──이라는 게, 태양의 벽화에 해당한다는 거네」"

[[dialogue]]
speaker = "アナ"
original = "「して、それが『偽りの悪』であると」"
translation = "「그리고, 그것이 『거짓된 악』이라는 것이군요」"

[[dialogue]]
speaker = "unk"
original = "学園生なら誰もが知る『太陽の壁画』。"
translation = "학원생이라면 누구나 아는 『태양의 벽화』."

[[dialogue]]
speaker = "unk"
original = "そこには災いの権化として、魔王の倒される姿が描かれていた。"
translation = "그곳에는 재앙의 화신으로서, 마왕이 쓰러지는 모습이 그려져 있었다."

[[dialogue]]
speaker = "unk"
original = "となると、ここでひとつの疑問が生じる。"
translation = "그렇다면, 여기서 하나의 의문이 생긴다."

[[dialogue]]
speaker = "クロト"
original = "「──フィオナ。こっちの──『月の壁画』が描かれたのはいつ頃か、わかるか？」"
translation = "「──피오나. 이쪽의── 『달의 벽화』가 그려진 건 언제쯤인지, 알 수 있어?」"

[[dialogue]]
speaker = "フィオナ"
original = "「なにぶん古いものですから、正確な年代はわかりませんが……星見家に伝わっている情報によれば約３０００年前とされています」"
translation = "「워낙 오래된 것이라, 정확한 연대는 알 수 없지만…… 호시미 가문에 전해지는 정보에 따르면 약 3000년 전이라고 합니다」"

[[dialogue]]
speaker = "ユウリ"
original = "「３０００年前──っつうと、リクリエが起こってすぐかよ」"
translation = "「3000년 전──이라니, 리크리에가 일어나고 바로 직후인가」"

[[dialogue]]
speaker = "アナ"
original = "「……なるほど。一方の『太陽の壁画』は２０００年前に描かれたとされていますから──辻褄は合いますね」"
translation = "「……과연. 한편 『태양의 벽화』는 2000년 전에 그려졌다고 하니── 앞뒤가 맞네요」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。あっちのほうが<b>新しい</b>んだ」"
translation = "「아아. 저쪽이 더 <b>새로운</b> 거지」"

[[dialogue]]
speaker = "セーラ"
original = "「へえ……？\u3000誰かが間違って模写しちゃった、とか？」"
translation = "「헤에……? 누군가가 잘못 베껴 그렸다, 라든가?」"

[[dialogue]]
speaker = "ユウリ"
original = "「なんつーか──そう単純じゃなさそうだよな」"
translation = "「뭐랄까── 그렇게 단순하진 않을 것 같네」"

[[dialogue]]
speaker = "unk"
original = "同じ過去のリクリエを伝える絵だというのに、真逆の結末が描かれているなんて不自然だ。"
translation = "같은 과거의 리크리에를 전하는 그림이라고 하는데, 정반대의 결말이 그려져 있다는 건 부자연스럽다."

[[dialogue]]
speaker = "unk"
original = "もしここに、何らかの意図が仕組まれているとするなら……"
translation = "만약 여기에, 어떤 의도가 숨겨져 있다고 한다면……"

[[dialogue]]
speaker = "フィオナ"
original = "「誰かが──都合の悪い真実を<b>描き変えた</b>」"
translation = "「누군가가── 형편이 나쁜 진실을 <ruby>다시 그려<rt>・・ ・・</rt></ruby> 넣은」"

[[dialogue]]
speaker = "クロト"
original = "「──のかも、しれない」"
translation = "「──걸지도, 모르지」"

[[dialogue]]
speaker = "ソフィア"
original = "「……！\u3000そっちの絵がずっと、残り続けてしまったのですか……！」"
translation = "「……! 그쪽 그림이 계속, 남아버린 것입니까……!」"

[[dialogue]]
speaker = "unk"
original = "多くの人たちが──魔王は大悪だと信じ込んだように。"
translation = "많은 사람들이── 마왕은 대악이라고 믿어버린 것처럼."

[[dialogue]]
speaker = "unk"
original = "日誌の記述を信じるのなら、この真実は隠蔽されたとも考えられる。"
translation = "일지의 기술을 믿는다면, 이 진실은 은폐되었다고도 생각할 수 있다."

[[dialogue]]
speaker = "クロト"
original = "（考えられる可能性としてはもうひとつ……ただ、これはまだ不確定だし胸にしまっておくか）"
translation = "（생각할 수 있는 가능성으로는 또 하나…… 다만, 이건 아직 불확실하니 가슴에 담아둘까）"

[[dialogue]]
speaker = "unk"
original = "──と、集まった情報を整理していたところ……"
translation = "──라고, 모인 정보를 정리하고 있던 그때……"

