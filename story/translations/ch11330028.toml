[[dialogue]]
speaker = "リィベル"
original = "「服を脱ぎなさい、魔王」"
translation = "「옷 벗어, 마왕」"

[[dialogue]]
speaker = "unk"
original = "一度、勢いで体を重ねてからというもの、リィベルは発情する度にセックスをねだるようになってしまった。"
translation = "한번, 기세로 몸을 섞은 뒤로, 리벨은 발정할 때마다 섹스를 조르게 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "タイミングはリィベル次第で、ムードも何もあったもんじゃない。"
translation = "타이밍은 리벨 마음대로라, 분위기고 뭐고 없었다."

[[dialogue]]
speaker = "クロト"
original = "「また？」"
translation = "「또야?」"

[[dialogue]]
speaker = "リィベル"
original = "「また、じゃないわよ。あなたが私にセックスの快感を教えたんだから、責任を取りなさい。でないと暴れるわよ」"
translation = "「또, 가 아니야. 당신이 나에게 섹스의 쾌감을 가르쳐줬으니까, 책임을 지라고. 안 그러면 날뛸 거야」"

[[dialogue]]
speaker = "クロト"
original = "（めちゃくちゃな脅迫だ）"
translation = "（엉망진창인 협박이다）"

[[dialogue]]
speaker = "クロト"
original = "「俺はいいけど、リィベルは大丈夫なのか？\u3000妊娠とか……」"
translation = "「난 괜찮지만, 리벨은 괜찮은 거야? 임신이라든가……」"

[[dialogue]]
speaker = "リィベル"
original = "「竜の魔族ってなかなか孕まないらしいから大丈夫よ。だから生でしてあげるわ。好きでしょ？\u3000生中出しセックス」"
translation = "「용의 마족은 좀처럼 임신하지 않는 모양이니까 괜찮아. 그러니까 노콘으로 해줄게. 좋아하지? 생질내사정 섹스」"

[[dialogue]]
speaker = "クロト"
original = "「っ……そりゃ好きだけどさ」"
translation = "「윽…… 그야 좋아하지만」"

[[dialogue]]
speaker = "unk"
original = "リィベルはエロ漫画で覚えた言葉で俺を挑発してくる。だけど結果はいつも……"
translation = "리벨은 에로 만화에서 배운 단어로 나를 도발해 온다. 하지만 결과는 언제나……"

[[dialogue]]
speaker = "リィベル"
original = "「今日はこっちでしてあげる。好きなんでしょ、これ。ほら、早く寝っ転がりなさい」"
translation = "「오늘은 이쪽으로 해줄게. 좋아하는 거지, 이거. 자, 얼른 드러누워」"

[[dialogue]]
speaker = "unk"
original = "言われるがまま、俺は服を脱いでベッドに横になった──"
translation = "말하는 대로, 나는 옷을 벗고 침대에 누웠다──"

[[dialogue]]
speaker = "リィベル"
original = "「ふふっ、いい様ね」"
translation = "「후훗, 보기 좋네」"

[[dialogue]]
speaker = "unk"
original = "服をはだけたリィベルが俺の上にまたがる。控えめなおっぱいと、これまた控えめな乳首が可愛らしい。"
translation = "옷을 풀어헤친 리벨이 내 위에 올라탄다. 아담한 가슴과, 마찬가지로 아담한 유두가 사랑스럽다."

[[dialogue]]
speaker = "リィベル"
original = "「今日は私があなたを鳴かせてあげる。覚悟はいいかしら？」"
translation = "「오늘은 내가 당신을 울려줄게. 각오는 됐어?」"

[[dialogue]]
speaker = "クロト"
original = "「覚悟、ね……」"
translation = "「각오, 라……」"

[[dialogue]]
speaker = "unk"
original = "その自信がどこから来るのだろうか。ちょっと俺には分からない。"
translation = "그 자신감이 어디서 오는 걸까. 조금은 모르겠다."

[[dialogue]]
speaker = "リィベル"
original = "「何よ。余裕こいていられるのも今のうちよ」"
translation = "「뭐야. 여유 부릴 수 있는 것도 지금뿐이야」"

[[dialogue]]
speaker = "リィベル"
original = "「一滴残らず精液搾り取って、エロ漫画みたいに『もう出ない～』って言わせてやるわ。もうちん負け雑魚ま○ことは言わせないんだから」"
translation = "「한 방울도 남김없이 정액 짜내서, 에로 만화처럼 『더는 안 나와~』라고 말하게 해주겠어. 이제 자지패배 허접보지라고는 말 못 하게 할 거니까」"

[[dialogue]]
speaker = "クロト"
original = "「いや、言った覚えないんだけど」"
translation = "「아니, 말한 기억 없는데」"

[[dialogue]]
speaker = "リィベル"
original = "「ふん。上の口でなんと言おうと、下半身は正直ね。私の中に入りたくて、おち○ぽバキバキじゃない。でも、まだ挿れてあげない」"
translation = "「흥. 윗입으로 뭐라고 하든, 하반신은 정직하네. 내 안에 들어오고 싶어서, 자지가 바짝 서 있잖아. 하지만, 아직 넣어주지 않을 거야.」"

[[dialogue]]
speaker = "リィベル"
original = "「ほら……すり、すり……<emoji=heart04>\u3000おち○ぽ、待ちきれなくてビクビクしてるわ。このまま射精してもいいのよ？\u3000早漏魔王って呼んであげる」"
translation = "「자…… 비비적, 비비적……<emoji=heart04> 자지, 기다리지 못해서 움찔거리고 있어. 이대로 사정해도 괜찮다고? 조루 마왕이라고 불러 줄게.」"

[[dialogue]]
speaker = "リィベル"
original = "「あっ<emoji=heart04>\u3000分かる？\u3000今、先っぽがおま○この入り口に当たってるわ」"
translation = "「앗<emoji=heart04> 알겠어? 지금, 끝부분이 보지 입구에 닿고 있어.」"

[[dialogue]]
speaker = "unk"
original = "リィベルから溢れた蜜が俺のペニスを濡らしていて、言われなくても発情具合が伝わってくる。"
translation = "리벨에게서 넘쳐흐른 애액이 내 페니스를 적시고 있어, 말하지 않아도 발정 정도가 전해져 온다."

[[dialogue]]
speaker = "リィベル"
original = "「さぁ、挿れるわよ。いい声で喘ぎなさい」"
translation = "「자, 넣을게. 좋은 목소리로 신음하렴.」"

[[dialogue]]
speaker = "リィベル"
original = "「ん、んん～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응, 으으～～～～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "声にならない叫びを上げ、小刻みに震えるリィベル。"
translation = "목소리가 되지 않는 비명을 지르며, 잘게 떠는 리벨."

[[dialogue]]
speaker = "unk"
original = "愛液で潤っていても、膣はぎちぎちに締め付けてきて強い快感が走る。"
translation = "애액으로 젖어 있어도, 질은 꽉꽉 조여와서 강한 쾌감이 달린다."

[[dialogue]]
speaker = "リィベル"
original = "「ど、どうかしら？\u3000私の、おま○こに屈する気になった……？」"
translation = "「어, 어때? 내, 보지에 굴복할 마음이 들었어……?」"

[[dialogue]]
speaker = "unk"
original = "屈するも何もまだ挿れたばかりだ。どう答えるか迷っていると……"
translation = "굴복이고 뭐고 이제 막 넣었을 뿐이다. 어떻게 대답할지 망설이고 있자……"

[[dialogue]]
speaker = "リィベル"
original = "「ふー……ふー……言葉も、出ないようね」"
translation = "「후우…… 후우…… 말도, 안 나오는 모양이네.」"

[[dialogue]]
speaker = "クロト"
original = "「……まだ動かないでくれ。リィベルの中、気持ちよすぎてすぐ射精しそうだ」"
translation = "「……아직 움직이지 말아줘. 리벨의 안, 너무 기분 좋아서 금방 사정할 것 같아.」"

[[dialogue]]
speaker = "リィベル"
original = "「んんっ……ずいぶん可愛いことを言うのね、魔王のくせに。救世の英雄とはいえ、おち○ぽは普通の人間ね」"
translation = "「으응…… 제법 귀여운 소리를 하네, 마왕 주제에. 구세의 영웅이라고는 해도, 자지는 평범한 인간이구나.」"

[[dialogue]]
speaker = "リィベル"
original = "「でも……ダメよ。ん、今日は、あなたが……鳴く番だって言ったでしょ」"
translation = "「하지만…… 안 돼. 응, 오늘은, 네가…… 울 차례라고 말했잖아.」"

[[dialogue]]
speaker = "クロト"
original = "「そんな……くっ」"
translation = "「그런…… 큭.」"

[[dialogue]]
speaker = "unk"
original = "強気なリィベルが可愛くて、つい乗ってしまう。"
translation = "기세 등등한 리벨이 귀여워서, 그만 장단에 맞추고 만다."

[[dialogue]]
speaker = "リィベル"
original = "「ふふっ……そんなに、ん、惨めな顔をしないで、ちょうだい。これからいっぱい気持ちよくして、あげ、る……ふー……」"
translation = "「후훗…… 그렇게, 응, 비참한 얼굴 하지 마, 제발. 이제부터 잔뜩 기분 좋게 해, 줄게…… 후우……」"

[[dialogue]]
speaker = "unk"
original = "俺の頬に触れながら微笑むリィベル。いつの間にか乳首もつんと尖っていて、余裕はすでになさそうだけど……"
translation = "내 뺨을 만지며 미소 짓는 리벨. 어느새 유두도 꼿꼿하게 서 있어서, 여유는 이미 없어 보이지만……"

[[dialogue]]
speaker = "リィベル"
original = "「ふー……ふー……観念しなさい。動くわよ……」"
translation = "「후우…… 후우…… 단념해. 움직일 거야……」"

[[dialogue]]
speaker = "リィベル"
original = "「んん～～～～～～～～～～～っ<emoji=heart04>」"
translation = "「으으～～～～～～～～～～～읏<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「はぁ、あああ、んんっ<emoji=heart04>\u3000魔王のおち○ぽ、おっきいっ<emoji=heart04>」"
translation = "「하아, 아아아, 으응<emoji=heart04> 마왕의 자지, 커엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ついに腰を動かし始め、熱い粘膜がペニスと摩擦して快感を生み出す。"
translation = "드디어 허리를 움직이기 시작하고, 뜨거운 점막이 페니스와 마찰하며 쾌감을 만들어낸다."

[[dialogue]]
speaker = "リィベル"
original = "「ふ、はぁ、あああっ<emoji=heart04>\u3000ふっ……どう？\u3000もう射精しちゃいそう？」"
translation = "「후, 하아, 아아앗<emoji=heart04> 훗…… 어때? 벌써 사정해버릴 것 같아?」"

[[dialogue]]
speaker = "クロト"
original = "「まだだ。耐えて、みせる……」"
translation = "「아직이다. 버텨, 보이겠어……」"

[[dialogue]]
speaker = "リィベル"
original = "「そう、ね。んっ……少し動いたくらいで根を上げられたら、私も溜飲が下がらないわ」"
translation = "「그렇, 네. 응…… 조금 움직인 정도로 항복하면, 나도 분이 풀리지 않는걸.」"

[[dialogue]]
speaker = "リィベル"
original = "「今日のために、あなたの本棚から女性上位モノのエロ漫画を探して読み込んだんだもの」"
translation = "「오늘을 위해서, 네 책장에서 여상위물 에로 망가를 찾아서 읽고 공부했단 말이야.」"

[[dialogue]]
speaker = "リィベル"
original = "「ふふっ……英雄なのに、意外な趣味ね。こうやって、んっ、女にいいようにされるのが、好きだったの？」"
translation = "「후훗…… 영웅인데, 의외인 취미네. 이렇게, 응, 여자 마음대로 휘둘리는 게, 좋았던 거야?」"

[[dialogue]]
speaker = "リィベル"
original = "「ん、んんっ<emoji=heart04>\u3000ああ、あ、はぁ……<emoji=heart04>\u3000おち○ぽ、ビクビクして、るっ<emoji=heart04>」"
translation = "「응, 으응<emoji=heart04> 아아, 아, 하아……<emoji=heart04> 자지, 움찔움찔하고, 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「いいわよ……いっぱい感じて、気持ちよくなりなさい。いくら我慢しても、最後にはみっともなく射精させてあげる」"
translation = "「괜찮아…… 잔뜩 느끼고, 기분 좋아지렴. 아무리 참아도, 마지막에는 꼴사납게 사정하게 해 줄 테니까.」"

[[dialogue]]
speaker = "リィベル"
original = "「白くてねばねばの精液、私の子宮に出したいんでしょう？\u3000いくらでも出していいのよ<emoji=heart04>」"
translation = "「하얗고 끈적끈적한 정액, 내 자궁에 내보내고 싶지? 얼마든지 내보내도 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「びゅ～～って出しなさいよっ<emoji=heart04>\u3000ほらっ<emoji=heart04>」"
translation = "「뷰～～ 하고 내보내라고옷<emoji=heart04> 자앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「はぁ、んっ<emoji=heart04>\u3000精液、出しちゃいなさいっ<emoji=heart04>\u3000早漏魔王って呼んであげるっ<emoji=heart04>\u3000よく射精できたわねって、頭なでて、褒めて、あげるっ<emoji=heart04>」"
translation = "「하아, 응<emoji=heart04> 정액, 내보내 버려어<emoji=heart04> 조루 마왕이라고 불러 줄게에<emoji=heart04> 잘 사정했네라며, 머리 쓰다듬으면서, 칭찬해, 줄게에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥歯を食いしばって責めに耐える。下では物理的な快楽が、上では囁く声が俺の意地を溶かそうとしてくる。"
translation = "어금니를 꽉 깨물고 공격을 견딘다. 아래에서는 물리적인 쾌락이, 위에서는 속삭이는 목소리가 내 고집을 녹이려 한다."

[[dialogue]]
speaker = "リィベル"
original = "「あっ<emoji=heart04>\u3000ん、んんっ<emoji=heart04>\u3000まだ、耐えるの、ねっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응, 으응<emoji=heart04> 아직, 버티는, 거네에<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「いいわ……なら、私も本気を出すまでよ……<emoji=heart04>」"
translation = "「좋아…… 그렇다면, 나도 본실력을 낼 뿐이야……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「本気だって……？」"
translation = "「본실력이라니……?」"

[[dialogue]]
speaker = "unk"
original = "これまでは本気じゃなかったっていうのか。リィベルを見くびりすぎていたかもしれない。"
translation = "지금까지는 진심이 아니었다는 건가. 리벨을 너무 얕보고 있었을지도 모른다."

[[dialogue]]
speaker = "リィベル"
original = "「ほら、とくと味わいなさい……んん、んんん──ッ<emoji=heart04>」"
translation = "「자, 똑똑히 맛보도록 해…… 으응, 으으으──읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルの腰が深く沈み、同時に強く膣が締まる。痛いくらいの締め付けに、一瞬、漏らしそうになった。"
translation = "리벨의 허리가 깊게 가라앉고, 동시에 강하게 질이 조여진다. 아플 정도의 압박감에, 순간, 지려버릴 뻔했다."

[[dialogue]]
speaker = "リィベル"
original = "「はっ、んっ……<emoji=heart04>\u3000下半身に力を込めて、おま○こ締めてみたわ。これは、ん、効くでしょう？」"
translation = "「하앗, 응……<emoji=heart04> 하반신에 힘을 줘서, 보지를 조여 봤어. 이건, 응, 효과가 있겠지?」"

[[dialogue]]
speaker = "リィベル"
original = "「んん──ん、んん、んッ<emoji=heart04>\u3000はぁはっ……んんッ<emoji=heart04>」"
translation = "「으으──응, 으응, 으윽<emoji=heart04> 하아핫…… 으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルが力を込める度、ぎゅっぎゅっと締まって、文字通り搾り取ろうとしてくる。"
translation = "리벨이 힘을 줄 때마다, 꽉꽉 조여지며, 문자 그대로 짜내려 한다."

[[dialogue]]
speaker = "リィベル"
original = "「どう？\u3000ちゃんと練習したんだから……早く精液出しな、さいっ……んっ<emoji=heart04>」"
translation = "「어때? 제대로 연습했으니까…… 빨리 정액 내보내, 라고…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ、うぅっ……練習？\u3000どうやって……？」"
translation = "「큭, 으윽…… 연습? 어떻게……?」"

[[dialogue]]
speaker = "unk"
original = "無視するには大きすぎる疑問で、思わず口に出ていた。"
translation = "무시하기에는 너무나 큰 의문이라, 나도 모르게 입 밖으로 나왔다."

[[dialogue]]
speaker = "リィベル"
original = "「どうって…………しっぽの先をおま○こに挿れて、おへその下に力入れて……って、何を言わせるのよ」"
translation = "「어떻게라니………… 꼬리 끝을 보지에 넣고, 배꼽 아래에 힘을 줘서…… 라니, 뭘 말하게 하는 거야.」"

[[dialogue]]
speaker = "クロト"
original = "「しっぽ、硬そうだけど痛くなかった？」"
translation = "「꼬리, 딱딱해 보이는데 아프지 않았어?」"

[[dialogue]]
speaker = "リィベル"
original = "「え？\u3000ちゃんと濡らせば大丈夫だったけど……だから言わせないでってばっ」"
translation = "「에? 제대로 적시면 괜찮았는데…… 그러니까 말하게 하지 말라니까!」"

[[dialogue]]
speaker = "クロト"
original = "「それはもうただのオナニーじゃ……」"
translation = "「그건 이미 그냥 자위가……」"

[[dialogue]]
speaker = "リィベル"
original = "「このっ、ばかっ……余計なこと考えないで、さっさと、射精、しなさい、よ……んん、んっ<emoji=heart04>」"
translation = "「이, 바보가…… 쓸데없는 생각 하지 말고, 얼른, 사정, 하라고, 요…… 으응, 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "考えるななんて、そんなの無理だ。おま○こを締める練習と称してしっぽオナニーしてただなんて可愛すぎる。"
translation = "생각하지 말라니, 그런 건 무리다. 보지를 조이는 연습이라 칭하며 꼬리 자위나 하고 있었다니 너무 귀엽다."

[[dialogue]]
speaker = "unk"
original = "リィベルの痴態を想像して、けど、想像するしかない悔しさがこみ上げてきて──"
translation = "리벨의 치태를 상상하며, 하지만 상상할 수밖에 없는 분함이 치밀어 올라──"

[[dialogue]]
speaker = "リィベル"
original = "「ひああぁ～～～～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히아아아～～～～～～～～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「うそっ！？\u3000んぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000下から、突き上げられて、からだ、浮いちゃうっ<emoji=heart04>」"
translation = "「거짓말!? 응아앗<emoji=heart04> 앙<emoji=heart04> 밑에서, 쳐올려져서, 몸이, 떠버려엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気が付けば、がむしゃらに腰を振っていた。この感情の昂りをリィベルのおま○こに直接ぶつけてやる。"
translation = "정신을 차려보니, 무아지경으로 허리를 흔들고 있었다. 이 감정의 고양을 리벨의 보지에 직접 부딪쳐 주마."

[[dialogue]]
speaker = "リィベル"
original = "「んあ、あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000あ、あ、あああっ──ふあぁ～～～～っ<emoji=heart04>」"
translation = "「응아, 앗<emoji=heart04> 아아앗<emoji=heart04> 아, 아, 아아앗──후아아～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「あなた、もう限界のはずじゃ……ああんっ<emoji=heart04>\u3000ひやぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んん～っ<emoji=heart04>」"
translation = "「당신, 이제 한계일 텐데…… 아앙<emoji=heart04> 히야앗<emoji=heart04> 앗<emoji=heart04> 응응～앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「それはリィベルも、だろ……！」"
translation = "「그건 리벨도, 마찬가지잖아……!」"

[[dialogue]]
speaker = "unk"
original = "俺もほとんど理性が焼き切れそうだ。"
translation = "나도 거의 이성이 타버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "だけどそれは向こうも一緒のはず。その証拠に愛液で互いの下半身がびしょびしょだ。"
translation = "하지만 그건 저쪽도 마찬가지일 터. 그 증거로 애액 때문에 서로의 하반신이 비축비축하다."

[[dialogue]]
speaker = "unk"
original = "こうなったら、イかされる前にイかせてやる。"
translation = "이렇게 된 이상, 가버리기 전에 가게 만들어 주마."

[[dialogue]]
speaker = "クロト"
original = "「俺も本気を見せてやるっ！」"
translation = "「나도 본때를 보여주마!」"

[[dialogue]]
speaker = "リィベル"
original = "「ふあ、あ、あぁっ<emoji=heart04>\u3000おち○ぽ、ゴリゴリって、私の中で、暴れてるっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>」"
translation = "「후아, 아, 아앗<emoji=heart04> 자지, 고리고리하고, 내 안에서, 날뛰고 있어엇<emoji=heart04> 히익<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「やぁっ<emoji=heart04>\u3000そこ、だめっ<emoji=heart04>\u3000私の、子宮、力任せに叩かないでぇっ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 거기, 안 돼앗<emoji=heart04> 내, 자궁, 힘껏 때리지 마아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ひぃん<emoji=heart04>\u3000待って、待ってってばっ<emoji=heart04>\u3000あっ、あっ、ああぁっ<emoji=heart04>\u3000はぁっ、ああぁんっ<emoji=heart04>」"
translation = "「히잉<emoji=heart04> 기다려, 기다리라니까앗<emoji=heart04> 앗, 앗, 아아앗<emoji=heart04> 하앗, 아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルの体は小さくて、簡単に奥まで届く。"
translation = "리벨의 몸은 작아서, 간단히 안쪽까지 닿는다."

[[dialogue]]
speaker = "unk"
original = "子宮の入り口を亀頭でこじ開けるつもりで何度もノックする。"
translation = "자궁 입구를 귀두로 억지로 열 생각으로 몇 번이고 노크한다."

[[dialogue]]
speaker = "リィベル"
original = "「ふゃああ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私の、おま○こ、壊れて、ばかになっちゃったっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「후야아아<emoji=heart04> 앗<emoji=heart04> 내, 보지, 망가져서, 바보가 되어버렸어엇<emoji=heart04> 후아앗<emoji=heart04> 앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「乱暴に<emoji=heart04>\u3000あ<emoji=heart04>\u3000おち○ぽで、ごしごし擦られただけで気持ちよくなるっ<emoji=heart04>\u3000何も考えられなくなりゅっ<emoji=heart04>」"
translation = "「난폭하게<emoji=heart04> 아<emoji=heart04> 자지로, 고시고시 문지르는 것만으로 기분 좋아져엇<emoji=heart04> 아무것도 생각할 수 없게 되어버렷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「おち○ぽに屈する気になった？」"
translation = "「자지에 굴복할 마음이 생겼어?」"

[[dialogue]]
speaker = "リィベル"
original = "「屈するっ<emoji=heart04>\u3000屈しちゃうっ<emoji=heart04>\u3000屈するからいっぱいおち○ぽ突いてぇっ<emoji=heart04>」"
translation = "「굴복할게앗<emoji=heart04> 굴복해버려엇<emoji=heart04> 굴복할 테니까 잔뜩 자지 찔러줘어엇<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ごめんなさい、淫乱雑魚ま○こでごめんなさいぃ<emoji=heart04>」"
translation = "「죄송해요, 음란 허접 보지라서 죄송해요오<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「おち○ぽ、おち○ぽ、おち○ぽ<emoji=heart04>\u3000おち○ぽしゅきなのっ<emoji=heart04>\u3000おま○こされるのしゅきなのぉっ<emoji=heart04>」"
translation = "「자지, 자지, 자지<emoji=heart04> 자지 좋아해앳<emoji=heart04> 보지 당하는 거 좋아해애엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すっかりスイッチの入ったリィベルをもっと刺激したくて、胸に手を伸ばした。"
translation = "완전히 스위치가 켜진 리벨을 더 자극하고 싶어서, 가슴으로 손을 뻗었다."

[[dialogue]]
speaker = "リィベル"
original = "「やぁっ<emoji=heart04>\u3000ちくび、やぁっ<emoji=heart04>\u3000ちくび、いぢめないでぇっ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 젖꼭지, 야앗<emoji=heart04> 젖꼭지, 괴롭히지 마아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "硬く尖った乳首を潰すように摘まんで、くりくりと弄ぶ。"
translation = "딱딱하게 끝이 선 유두를 으깨듯이 집어서, 구리구리하며 만지작거린다."

[[dialogue]]
speaker = "unk"
original = "その度にリィベルの脚ががくがくと揺れ、膣内がきゅっと嬉しそうに締まった。"
translation = "그럴 때마다 리벨의 다리가 가쿠가쿠 떨리고, 질 안이 뀨 하고 기쁜 듯이 조여졌다."

[[dialogue]]
speaker = "リィベル"
original = "「ふやぁっ<emoji=heart04>\u3000ちくび、ひっぱらないでっ<emoji=heart04>\u3000やっ、のびない、おっぱいのびないからぁっ<emoji=heart04>」"
translation = "「후야앗<emoji=heart04> 젖꼭지, 잡아당기지 마앗<emoji=heart04> 얏, 안 늘어나, 가슴 안 늘어나니까아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルの可愛い顔を引き寄せ、唇を奪う。"
translation = "리벨의 귀여운 얼굴을 끌어당겨, 입술을 빼앗는다."

[[dialogue]]
speaker = "リィベル"
original = "「んんんっ！？」"
translation = "「응응응!?」"

[[dialogue]]
speaker = "unk"
original = "間髪入れず、小さな口に躊躇なく舌をねじ込む。"
translation = "쉴 틈 없이, 작은 입에 주저 없이 혀를 밀어 넣는다."

[[dialogue]]
speaker = "リィベル"
original = "「んふぅっ<emoji=heart04>\u3000んじゅるっ、ちゅぱっ<emoji=heart04>\u3000じゅ、ちゅるるっちゅるっ……ちゅっ、んちゅぱっ<emoji=heart04>」"
translation = "「응후웃<emoji=heart04> 응쥬룻, 츄팟<emoji=heart04> 쥬, 츄르르츄룻…… 츄, 응츄팟<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んちゅっ<emoji=heart04>\u3000ちゅるるっちゅっ……じゅるるっ<emoji=heart04>\u3000ちゅるりろっ<emoji=heart04>\u3000んぱっ<emoji=heart04>」"
translation = "「응츄앗<emoji=heart04> 츄르르츄앗…… 쥬르르앗<emoji=heart04> 츄르리로앗<emoji=heart04> 응팟<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "付き合ってもいないのにセックスだけしているから、キスもセックスの間だけだ。なら、今のうちに好きにさせてもらう。"
translation = "사귀지도 않는데 섹스만 하고 있으니까, 키스도 섹스하는 동안뿐이다. 그렇다면 지금 이 기회에 마음대로 하겠다."

[[dialogue]]
speaker = "リィベル"
original = "「じゅるるるっ<emoji=heart04>\u3000んじゅる、ちゅぱ<emoji=heart04>\u3000んちゅぱちゅるるっ<emoji=heart04>\u3000じゅるちゅっ<emoji=heart04>」"
translation = "「쥬르르르앗<emoji=heart04> 응쥬루, 츄파<emoji=heart04> 응츄파츄르르앗<emoji=heart04> 쥬루츄앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感にうっとりしたリィベルの顔が目の前にあって、それを歪ませたい。もっと快楽で染め上げたい。"
translation = "쾌감에 황홀해진 리벨의 얼굴이 눈앞에 있고, 그것을 일그러뜨리고 싶다. 더 쾌락으로 물들이고 싶다."

[[dialogue]]
speaker = "リィベル"
original = "「おち○ぽ、暴れてりゅ<emoji=heart04>\u3000はぁ、あ、あっ<emoji=heart04>\u3000ズンズンきてるっ<emoji=heart04>\u3000子宮、ぶっ叩かれてりゅ<emoji=heart04>」"
translation = "「자지, 날뛰고 있어어<emoji=heart04> 하아, 아, 앗<emoji=heart04> 즈음즈음 오고 있어엇<emoji=heart04> 자궁, 얻어맞고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ひぃああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふぅ、あ、あぁっ<emoji=heart04>\u3000あひ、ひぃんっ<emoji=heart04>\u3000んやぁ～～～っ<emoji=heart04>」"
translation = "「히이아아앗<emoji=heart04> 앗<emoji=heart04> 후우, 아, 아앗<emoji=heart04> 아히, 히잉앗<emoji=heart04> 응야아～～～앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルの切羽詰まった鳴き声に射精欲がこみ上げてくる。細い腰を掴んで、ラストスパートをかける。"
translation = "리벨의 절박한 울음소리에 사정욕이 치밀어 오른다. 가는 허리를 붙잡고, 라스트 스퍼트를 올린다."

[[dialogue]]
speaker = "リィベル"
original = "「ふあああっ<emoji=heart04>\u3000あっ、ひあ、ああっ<emoji=heart04>\u3000ひぃ、ふあ、あ<emoji=heart04>\u3000あ、あん、ひあっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 앗, 히아, 아앗<emoji=heart04> 히이, 후아, 아<emoji=heart04> 아, 안, 히앗<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「おち○ぽ、ビクビクしてりゅっ<emoji=heart04>\u3000しゃせー<emoji=heart04>\u3000しゃせーされちゃうのぉっ<emoji=heart04>」"
translation = "「자지, 비쿠비쿠하고 있어엇<emoji=heart04> 사정<emoji=heart04> 사정당해버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「あついのくりゅ<emoji=heart04>\u3000あっついせーえききちゃう<emoji=heart04>\u3000きてきてぇ<emoji=heart04>\u3000せーえききてぇっ<emoji=heart04>」"
translation = "「뜨거운 거 와아<emoji=heart04> 뜨거운 정액 와버려어<emoji=heart04> 와줘와줘어<emoji=heart04> 정액 와줘어엇<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ひぁああっ<emoji=heart04>\u3000あついの、きてっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000わたしもおま○こイっちゃぅっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 뜨거운 거, 와줘엇<emoji=heart04> 가앗<emoji=heart04> 가앗<emoji=heart04> 나도 보지 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んぁ、あ、あ、あ、あぁ～っ<emoji=heart04>\u3000あひぃっ<emoji=heart04>\u3000イクぅっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イッっくぅ～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아, 아, 아, 아, 아아～앗<emoji=heart04> 아히잇<emoji=heart04> 가버려엇<emoji=heart04> 보지 가버려엇<emoji=heart04> 가앗, 가아～～～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「んひゃあああああああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응히야아아아아아아아～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ん、んんっ<emoji=heart04>\u3000ひあ、ああ～<emoji=heart04>\u3000おち○ぽ、おなかのなかであばれてりゅりゅぅ<emoji=heart04>\u3000あついぃ、せーえきあっついのぉ<emoji=heart04>」"
translation = "「응, 응응앗<emoji=heart04> 히아, 아아～<emoji=heart04> 자지, 배 안에서 날뛰고 있어어어<emoji=heart04> 뜨거워어, 정액 뜨거워어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リィベルの子宮口に亀頭を押し付けながら射精する。なかなか孕まないと言われても、本能はそれを目指していた。"
translation = "리벨의 자궁구에 귀두를 밀어붙이며 사정한다. 좀처럼 임신하지 않는다고 해도, 본능은 그것을 목표로 하고 있었다."

[[dialogue]]
speaker = "リィベル"
original = "「びゅ～って、びゅ～ってせーえききてりゅ<emoji=heart04>\u3000は、あ、ふわぁ～<emoji=heart04>\u3000おなかいっぱい、あったかいのぉ……きもちい<emoji=heart04>\u3000おま○こしあわせぇ……<emoji=heart04>」"
translation = "「뷰우~ 하고, 뷰우~ 하고 정액 오고 있어어<emoji=heart04> 하, 아, 후와아～<emoji=heart04> 배불러, 따뜻해에…… 기분 좋아<emoji=heart04> 보지 행복해에……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「もっと、もっとせえーき出してぇ<emoji=heart04>\u3000ぎゅってしてあげるからぁ<emoji=heart04>\u3000ん、んんんっ<emoji=heart04>」"
translation = "「더, 더 정액 내보내줘어<emoji=heart04> 뀨 하고 해줄 테니까아<emoji=heart04> 응, 응응응앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一滴残らず搾り取ろうと、リィベルが膣を絞める。俺もそれに応えて、痛いくらいに射精する。"
translation = "한 방울도 남김없이 짜내려고, 리벨이 질을 조인다. 나도 그에 응해서, 아플 정도로 사정한다."

[[dialogue]]
speaker = "リィベル"
original = "「はぁ、ん、ぬけちゃっ……<emoji=heart04>」"
translation = "「하아, 응, 빠져버렸……<emoji=heart04>」"

[[dialogue]]
speaker = "リィベル"
original = "「ふー、はー……はぁ、はぁ………ふぅ、はぁ…………」"
translation = "「후우, 하아…… 하아, 하아……… 후우, 하아…………」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けると、どぼっと精液の塊が膣からこぼれてきた。"
translation = "자지가 빠지자, 울컥하고 정액 덩어리가 질에서 쏟아져 나왔다."

[[dialogue]]
speaker = "unk"
original = "自分でも驚くぐらいリィベルの中に射精していたようだ。"
translation = "나 스스로도 놀랄 정도로 리벨의 안에 사정했던 모양이다."

[[dialogue]]
speaker = "リィベル"
original = "「うぅ……またちん負けしたぁ……我を忘れてサカって、バカみたい……」"
translation = "「으으…… 또 자지한테 졌어어…… 정신없이 발정해서, 바보 같아……」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことないよ。いっぱい感じてくれて可愛かった」"
translation = "「그렇지 않아. 잔뜩 느껴줘서 귀여웠어」"

[[dialogue]]
speaker = "リィベル"
original = "「ふんっ……どうせあなたも、雑魚まんドラゴンだと思ってるんでしょ」"
translation = "「흥…… 어차피 당신도, 허접 보지 드래곤이라고 생각하고 있잖아」"

[[dialogue]]
speaker = "unk"
original = "自分から誘ってきたのに、拗ねてしまった。自分勝手というか、マイペースというか。"
translation = "먼저 유혹해 놓고선, 삐져버렸다. 제멋대로라고 해야 할지, 마이페이스라고 해야 할지."

[[dialogue]]
speaker = "リィベル"
original = "「次こそはあなたをひいひい言わせてやるんだから。覚悟しておくことね」"
translation = "「다음번엔 반드시 당신이 가쁜 숨을 내뱉게 해줄 거니까. 각오해 두라고」"

[[dialogue]]
speaker = "クロト"
original = "「はいはい。……でも、そんなに俺だけイかせたいなら、手とか口でもいいんじゃないか？」"
translation = "「네, 네. ……그치만, 그렇게 나만 가게 만들고 싶다면, 손이나 입으로 해도 되잖아?」"

[[dialogue]]
speaker = "リィベル"
original = "「え、イヤよ。だって…………それじゃ私が気持ちよくならないじゃない」"
translation = "「에, 싫어. 그치만………… 그러면 내가 기분 좋지 않잖아」"

[[dialogue]]
speaker = "クロト"
original = "「…………そっか」"
translation = "「…………그렇구나」"

[[dialogue]]
speaker = "unk"
original = "次も、その次もひいひい言わせてやろう。そう心の中で誓うのだった。"
translation = "다음에도, 그다음에도 가쁜 숨을 내뱉게 해주마. 그렇게 마음속으로 맹세하는 것이었다."

