[[dialogue]]
speaker = "unk"
original = "ある日、マリーベルに地下に呼び出されて──"
translation = "어느 날, 마리벨에게 지하로 호출받아──"

[[dialogue]]
speaker = "マリーベル"
original = "「私を犯してほしいの」"
translation = "「나를 범해 줬으면 좋겠어.」"

[[dialogue]]
speaker = "クロト"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker = "マリーベル"
original = "「勘違いしないで。別にそういう趣味ってわけじゃないわ」"
translation = "「오해하지 마. 딱히 그런 취미가 있는 건 아니니까.」"

[[dialogue]]
speaker = "マリーベル"
original = "「トワ先生によると、星力が暴走しやすいのは私が危機に陥った時らしいの。だから星力を制御する訓練のためにね」"
translation = "「토와 선생님에 따르면, 성력이 폭주하기 쉬운 건 내가 위기에 처했을 때인 것 같아. 그래서 성력을 제어하는 훈련을 위해서야.」"

[[dialogue]]
speaker = "マリーベル"
original = "「仮に星力が暴走しても、あなたなら何とかなるでしょう。星徒会なんだから」"
translation = "「설령 성력이 폭주해도, 당신이라면 어떻게든 하겠지. 성도회니까.」"

[[dialogue]]
speaker = "クロト"
original = "「な、なるほど……？」"
translation = "「그, 그렇구나……?」"

[[dialogue]]
speaker = "マリーベル"
original = "「私のことは考えずに、性欲のはけ口にでもしてくれたらいいわ」"
translation = "「내 생각은 하지 말고, 성욕의 배출구로라도 삼으면 돼.」"

[[dialogue]]
speaker = "unk"
original = "とんでもない内容をこともなげに言うマリーベル。"
translation = "터무니없는 내용을 아무렇지도 않게 말하는 마리벨."

[[dialogue]]
speaker = "unk"
original = "雰囲気に流されて成り行きでセックスしたことはあるが、マリーベルは俺のことをどう思ってるんだろうか？"
translation = "분위기에 휩쓸려 어쩌다 보니 섹스를 한 적은 있지만, 마리벨은 나를 어떻게 생각하고 있는 걸까?"

[[dialogue]]
speaker = "クロト"
original = "「わかった。それなら──」"
translation = "「알았어. 그렇다면──」"

[[dialogue]]
speaker = "マリーベル"
original = "「っ……これがあなたの趣味なの？」"
translation = "「윽…… 이게 당신의 취미야?」"

[[dialogue]]
speaker = "クロト"
original = "「マリーベルが犯してくれって言ったんだろ」"
translation = "「마리벨이 범해 달라고 했잖아.」"

[[dialogue]]
speaker = "マリーベル"
original = "「そうだけど、拘束してくれとは言ってないわ。なかなかいい趣味してるわね」"
translation = "「그렇긴 하지만, 구속해 달라고는 안 했어. 제법 괜찮은 취미를 갖고 있네.」"

[[dialogue]]
speaker = "unk"
original = "乱暴に服を破られ、手枷で腕を戒められながらマリーベルが毒づく。"
translation = "난폭하게 옷이 찢기고, 수갑으로 팔이 묶인 채 마리벨이 독설을 내뱉는다."

[[dialogue]]
speaker = "unk"
original = "こちらを覗くマリーベルの顔には、期待と怖れが入り混じったような、曖昧な表情が浮かんでいた。"
translation = "이쪽을 훔쳐보는 마리벨의 얼굴에는 기대와 두려움이 뒤섞인 듯한 모호한 표정이 떠올라 있었다."

[[dialogue]]
speaker = "マリーベル"
original = "「まぁいいわ。これなら抵抗もできないでしょうし」"
translation = "「뭐, 됐어. 이러면 저항도 못 할 테고.」"

[[dialogue]]
speaker = "unk"
original = "拘束されたマリーベルの姿はとても扇情的で、下半身がガチガチに硬くなっていく。"
translation = "구속된 마리벨의 모습은 무척 선정적이어서, 하반신이 단단하게 굳어 간다."

[[dialogue]]
speaker = "マリーベル"
original = "「今さら躊躇わないで。私を犯して……壊して……ズタズタにして」"
translation = "「이제 와서 주저하지 마. 나를 범해…… 망가뜨려…… 갈기갈기 찢어 줘.」"

[[dialogue]]
speaker = "unk"
original = "蠱惑的な囁きに誘われ、まだ濡れていない秘部にいきり立ったペニスを突き立てた。"
translation = "매혹적인 속삭임에 이끌려, 아직 젖지 않은 비부에 빳빳하게 선 자지를 찔러 넣었다."

[[dialogue]]
speaker = "マリーベル"
original = "「くあああぁっ……！」"
translation = "「크아아아악……!」"

[[dialogue]]
speaker = "マリーベル"
original = "「ふっ……は、あぁ……硬いのが、入って、くる……ぁ……っ」"
translation = "「훗…… 하, 아아…… 딱딱한 게, 들어, 와…… 아……윽」"

[[dialogue]]
speaker = "unk"
original = "パンパンに膨張した亀頭が、マリーベルの膣内をめりめりとこじ開けていく。"
translation = "빵빵하게 팽창한 귀두가 마리벨의 질 내부를 짓이기며 비집고 들어간다."

[[dialogue]]
speaker = "unk"
original = "濡れていない膣壁は俺を拒んでいるようで、マリーベルを征服しているような心地がした。"
translation = "젖지 않은 질벽은 나를 거부하는 듯했고, 마리벨을 정복하고 있는 듯한 기분이 들었다."

[[dialogue]]
speaker = "マリーベル"
original = "「いっ、た……ふぅ……はぁ……ぁ……」"
translation = "「아, 아파…… 후우…… 하아…… 아……」"

[[dialogue]]
speaker = "マリーベル"
original = "「うぁ、はぁ……そう、それでいいの……私を罰して……」"
translation = "「으아, 하아…… 그래, 그걸로 됐어…… 나를 벌해 줘……」"

[[dialogue]]
speaker = "マリーベル"
original = "「くああっ……私の中で、動いてる……あ……はっ……」"
translation = "「크아악…… 내 안에서, 움직이고 있어…… 아…… 하윽……」"

[[dialogue]]
speaker = "unk"
original = "マリーベルを蹂躙するように、力ずくで何度もペニスを突き入れる。"
translation = "마리벨을 유린하듯이, 완력으로 몇 번이고 자지를 찔러 넣는다."

[[dialogue]]
speaker = "マリーベル"
original = "「あっ、はぁ……大き、い……ふあぁ……ぁ……うあぁっ……」"
translation = "「앗, 하아…… 커, 커다래…… 후아아…… 아…… 우아아악……」"

[[dialogue]]
speaker = "マリーベル"
original = "「お腹の中、押し広げられて……んんっ……！\u3000ふぅ……あぁ……」"
translation = "「배 속이, 억지로 벌려져서…… 으응……! 후우…… 아아……」"

[[dialogue]]
speaker = "unk"
original = "マリーベルの綺麗な顔が苦痛に歪むのとは裏腹に、ペニスは温かな膣壁に包まれて快感が押し寄せてくる。"
translation = "마리벨의 아름다운 얼굴이 고통으로 일그러지는 것과는 대조적으로, 자지는 따뜻한 질벽에 감싸여 쾌감이 밀려온다."

[[dialogue]]
speaker = "マリーベル"
original = "「ぅ、うぅ……ん……本当に、私、犯されて……くっ……ぁ……」"
translation = "「으, 으윽…… 음…… 정말로, 나, 범해져서…… 큭…… 아……」"

[[dialogue]]
speaker = "unk"
original = "腕を拘束されたままお尻を突き出し、屈辱的な姿で貫かれるマリーベル。"
translation = "팔이 묶인 채 엉덩이를 내밀고, 굴욕적인 자세로 꿰뚫리는 마리벨."

[[dialogue]]
speaker = "unk"
original = "マリーベルが呻くのもお構いなしに膣を突きまくる。"
translation = "마리벨이 신음하는 것도 아랑곳하지 않고 질을 계속 찔러댄다."

[[dialogue]]
speaker = "マリーベル"
original = "「くあぁ……あ、はぁ……あそこ、壊れる……」"
translation = "「크아아…… 아, 하아…… 거기, 망가져버려……」"

[[dialogue]]
speaker = "クロト"
original = "「痛いか？\u3000苦しいか？」"
translation = "「아프냐? 괴로워?」"

[[dialogue]]
speaker = "マリーベル"
original = "「ええ……あそこがじんじんして、お腹が圧迫されて……くぅ……すごく惨めな気持ち……」"
translation = "「네…… 거기가 징징 울리고, 배가 압박돼서…… 쿠우…… 정말 비참한 기분이야……」"

[[dialogue]]
speaker = "クロト"
original = "「そうか。ならもっとするぞ」"
translation = "「그래. 그럼 더 해 주지.」"

[[dialogue]]
speaker = "マリーベル"
original = "「んんんっ……！\u3000おち○ちん大きくて、お腹、苦し……ぁ……くぅっ……」"
translation = "「으으응……! 자지 너무 커서, 배가, 괴로워…… 아…… 윽……」"

[[dialogue]]
speaker = "unk"
original = "マリーベルが苦しもうと容赦なく肉の杭を打ち込む。"
translation = "마리벨이 괴로워하든 말든 가차 없이 고기 말뚝을 박아 넣는다."

[[dialogue]]
speaker = "マリーベル"
original = "「うあああぁっ……！」"
translation = "「우아아아악……!」"

[[dialogue]]
speaker = "unk"
original = "また悲鳴が上がり、俺の中の嗜虐的な部分が沸き立った。"
translation = "또다시 비명이 터져 나오고, 내 안의 가학적인 부분이 끓어올랐다."

[[dialogue]]
speaker = "マリーベル"
original = "「はあぁ、はっ……あっ……私の中、かき混ぜられて……」"
translation = "「하아아, 하윽…… 앗…… 내 안이, 휘저어져서……」"

[[dialogue]]
speaker = "マリーベル"
original = "「くああっ……おち○ちん、熱いぃ……ぁ、あぁ……」"
translation = "「크아악…… 자지, 뜨거워어…… 아, 아아……」"

[[dialogue]]
speaker = "unk"
original = "ペニスで突かれる度に揺れる大きな胸を、乱暴に揉みしだく。"
translation = "자지로 찔릴 때마다 흔들리는 커다란 가슴을, 난폭하게 주물러 터뜨린다."

[[dialogue]]
speaker = "マリーベル"
original = "「くああぁっ……！\u3000ふぅ……あ……力、強いぃ……はぁ……ぁっ……」"
translation = "「크아아악……! 후우…… 아…… 힘, 너무 세에…… 하아…… 아윽……」"

[[dialogue]]
speaker = "マリーベル"
original = "「いっ、た……んんっ！\u3000そんなにされたら……ぐっ……おっぱいに跡がついちゃう……んあぁっ……！」"
translation = "「아, 아파…… 으응! 그렇게 하면…… 윽…… 가슴에 자국이 남는단 말이야…… 으아아악……!」"

[[dialogue]]
speaker = "unk"
original = "痛みに身をよじるマリーベル。"
translation = "고통에 몸을 비트는 마리벨."

[[dialogue]]
speaker = "unk"
original = "さすがにやりすぎかと思ったが──"
translation = "과연 너무 심했나 싶었지만──"

[[dialogue]]
speaker = "マリーベル"
original = "「もっと……もっと……」"
translation = "「더…… 더……」"

[[dialogue]]
speaker = "マリーベル"
original = "「私を罰して……痛くていいから……苦しくていいから……」"
translation = "「나를 벌해 줘…… 아파도 좋으니까…… 괴로워도 좋으니까……」"

[[dialogue]]
speaker = "unk"
original = "うわごとのように呟くのを聞いて、硬くなった乳首をぎゅっとつねってやる。"
translation = "잠꼬대처럼 중얼거리는 소리를 듣고, 딱딱해진 유두를 꽉 꼬집어 주었다."

[[dialogue]]
speaker = "マリーベル"
original = "「～～～ッ！\u3000いたっ……んんっ……！」"
translation = "「~~~윽! 아파…… 으응……!」"

[[dialogue]]
speaker = "マリーベル"
original = "「乳首、いた、い……あぁっ……！\u3000んんぅ……うぁ……ああぁっ！」"
translation = "「유두, 아파, 아파…… 아아악……! 으으으…… 우아…… 아아아악!」"

[[dialogue]]
speaker = "unk"
original = "乳首をギリギリとつねりあげると、一際大きな苦悶の声を上げた。"
translation = "유두를 비틀어 올리자, 한층 더 커다란 고통의 목소리를 내질렀다."

[[dialogue]]
speaker = "マリーベル"
original = "「くうぅ……ぁ、はっ……あぁっ……！\u3000おち○ちんで、突かれながら……おっぱいも、揉みくちゃにされて……っ」"
translation = "「크으으…… 아, 하윽…… 아아악……! 자지로, 찔리면서…… 가슴도, 엉망진창으로 주물려져서……」"

[[dialogue]]
speaker = "マリーベル"
original = "「はぁっ……あっ……おち○ちん太いぃっ……！\u3000んんっ……私のおま○こ、広がっちゃうぅっ……！」"
translation = "「하아…… 앗…… 자지 너무 굵어어……! 으응…… 내 보지, 벌어져 버려어……!」"

[[dialogue]]
speaker = "マリーベル"
original = "「ふああぁっ……<emoji=heart04>\u3000あっ……はっ……はんっ<emoji=heart04>」"
translation = "「후아아악……<emoji=heart04> 앗…… 하윽…… 항<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「硬いの、奥まで、届いて……んっ<emoji=heart04>\u3000はぁっ……はっ……あ、ふあぁっ<emoji=heart04>」"
translation = "「딱딱한 게, 안쪽까지, 닿아서…… 윽<emoji=heart04> 하아…… 하윽…… 아, 후아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけど苦しそうな喘ぎの中に、艶っぽい声も混じってきた。"
translation = "하지만 괴로운 듯한 신음 속에, 요염한 목소리도 섞여 들기 시작했다."

[[dialogue]]
speaker = "マリーベル"
original = "「あっ、あっ、あっ……んんっ<emoji=heart04>\u3000\u3000はぁは……深いぃっ……はぁ、あぁ……んぁああっ<emoji=heart04>」"
translation = "「앗, 앗, 앗…… 으응<emoji=heart04> 하아하…… 깊어어…… 하아, 아아…… 으아아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ああっ<emoji=heart04>\u3000おち○ちん、お腹の中でビクビクしてる……んっ<emoji=heart04>\u3000はぁっ<emoji=heart04>」"
translation = "「아아악<emoji=heart04> 자지가, 배 속에서 파르르 떨고 있어…… 윽<emoji=heart04> 하아<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「マリーベルの中、濡れてきてる。感じてるのか？」"
translation = "「마리벨 안쪽, 젖어 오고 있어. 느끼고 있는 건가?」"

[[dialogue]]
speaker = "マリーベル"
original = "「犯されてるんだから……そんなわけ、ないでしょ……ん……はぁ<emoji=heart04>\u3000ふあぁ、あっ……あんっ<emoji=heart04>」"
translation = "「범해지고 있는데…… 그럴 리가, 없잖아…… 응…… 하아<emoji=heart04> 후아아, 앗…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ふぁ、はぁ……体を守るための、反射みたいなものよ……あっ……はっ、はぁ……んあぁっ<emoji=heart04>」"
translation = "「화, 하아…… 몸을 지키기 위한, 반사 같은 거야…… 앗…… 하윽, 하아…… 으아아악<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけど膣もペニスを甘く締め付けてきて、マリーベルの体も悦んでいるみたいだ。"
translation = "하지만 질도 자지를 달콤하게 조여 오고 있어, 마리벨의 몸도 기뻐하고 있는 것 같다."

[[dialogue]]
speaker = "unk"
original = "反応を確かめるように、おっぱいを優しく揉む。"
translation = "반응을 확인하듯이, 가슴을 상냥하게 주무른다."

[[dialogue]]
speaker = "マリーベル"
original = "「んん<emoji=heart04>\u3000あん<emoji=heart04>\u3000はあぁ……はぁ……んっ<emoji=heart04>\u3000そういうこと、しないで……ふあぁっ<emoji=heart04>」"
translation = "「으응<emoji=heart04> 앙<emoji=heart04> 하아아…… 하아…… 윽<emoji=heart04> 그런 짓, 하지 마…… 후아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「犯してって言ったでしょ……んぁっ<emoji=heart04>\u3000ぁっ……ふぁあっ……あぁんっ<emoji=heart04>」"
translation = "「범해 달라고 했잖아…… 으아윽<emoji=heart04> 윽…… 화아아…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳房をやわやわと刺激されて甘い声を漏らすマリーベル。"
translation = "유방을 말랑말랑 자극받으며 달콤한 소리를 흘리는 마리벨."

[[dialogue]]
speaker = "unk"
original = "だけど今度は揉みつぶすように乳房を握った。"
translation = "하지만 이번에는 으스러뜨릴 듯이 유방을 움켜쥐었다."

[[dialogue]]
speaker = "マリーベル"
original = "「ひあぁああぁっ！？」"
translation = "「히아아아아악!?」"

[[dialogue]]
speaker = "マリーベル"
original = "「あなた、何して……んんっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000はぁ……はぁ……んんっ<emoji=heart04>」"
translation = "「당신, 뭐 하는…… 으응<emoji=heart04> 아아악<emoji=heart04> 하아…… 하아…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000おま○こ突かれながら、おっぱいも……はっ、あっ……んあぁっ<emoji=heart04>」"
translation = "「앗, 앗, 아앙<emoji=heart04> 보지 찔리면서, 가슴도…… 하윽, 앗…… 으아아악<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリーベルの気持ちいいところを突きながら、乳首をきつくつまんでやる。"
translation = "마리벨의 기분 좋은 곳을 찌르면서, 유두를 강하게 꼬집어 준다."

[[dialogue]]
speaker = "マリーベル"
original = "「んんーーーっ！？」"
translation = "「으으응──윽!?」"

[[dialogue]]
speaker = "マリーベル"
original = "「はぁ……はぁ……んっ<emoji=heart04>\u3000あなた、何が、したいの？\u3000ふあぁ、はぁ、あんっ<emoji=heart04>」"
translation = "「하아…… 하아…… 윽<emoji=heart04> 당신, 뭘, 하고 싶은 거야? 후아아, 하아, 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「痛いのと気持ちいいのを交互にしたら、痛いのも気持ち良くなるかと思って」"
translation = "「아픈 거랑 기분 좋은 걸 번갈아 가며 하면, 아픈 것도 기분 좋아질까 싶어서.」"

[[dialogue]]
speaker = "マリーベル"
original = "「そんなはず、あるわけないでしょ……ぁっ<emoji=heart04>\u3000ふはぁ……あっ……ん～っ<emoji=heart04>」"
translation = "「그럴 리가, 없잖아…… 아윽<emoji=heart04> 후하아…… 앗…… 으음~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかしまたおっぱいをぎゅっと絞ると──"
translation = "그러나 다시 가슴을 꽉 짜내자──"

[[dialogue]]
speaker = "マリーベル"
original = "「ひやあああっ<emoji=heart04>」"
translation = "「히야아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「えっ……？\u3000今の、何……？」"
translation = "「엣……? 방금, 뭐야……?」"

[[dialogue]]
speaker = "unk"
original = "自分の嬌声に困惑するマリーベル。"
translation = "자신의 교성에 당혹해하는 마리벨."

[[dialogue]]
speaker = "マリーベル"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000待って、今の、おかしい──んぁああっ<emoji=heart04>」"
translation = "「앗, 앗, 아앙<emoji=heart04> 잠깐, 방금 거, 이상해── 으아아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「おっぱい、痛いの、やめ、て──んん～～っ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000ひあぁああっ<emoji=heart04>」"
translation = "「가슴, 아픈 거, 그만, 둬── 으으응~~윽<emoji=heart04> 후아아악<emoji=heart04> 히아아아악<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "牛の乳搾りのように、付け根から強く握ると、痛みとも快感ともつかない声が上がった。"
translation = "소 젖을 짜듯이, 뿌리부터 강하게 움켜쥐자 고통인지 쾌락인지 알 수 없는 소리가 터져 나왔다."

[[dialogue]]
speaker = "マリーベル"
original = "「何これ……変になるぅ……ぁっ<emoji=heart04>\u3000痛いのに、なんで──んんぅ～～っ<emoji=heart04>」"
translation = "「뭐야 이거…… 이상해져어…… 아윽<emoji=heart04> 아픈데, 왜── 으으으응~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ん──くぅぅっ<emoji=heart04>\u3000これ、変になるっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000痛いのと、気持ちいいのが、混ざって……ひああっ<emoji=heart04>」"
translation = "「응── 크으으윽<emoji=heart04> 이거, 이상해져<emoji=heart04> 앗, 앗<emoji=heart04> 아픈 거랑, 기분 좋은 게, 섞여서…… 히아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「はぁっ……あっ、あっ……んあぁっ<emoji=heart04>\u3000おっぱいつぶされながら、おち○ちん突かれて……んぁ、はぁんっ<emoji=heart04>」"
translation = "「하아…… 앗, 앗…… 으아아악<emoji=heart04> 가슴 짓눌리면서, 자지로 찔려서…… 으아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリーベルの中は愛液で溢れていて、ペニスを突き入れる度に淫らな蜜がこぼれ落ちる。"
translation = "마리벨의 안은 애액으로 넘쳐나고 있어, 자지를 찔러 넣을 때마다 음란한 꿀이 흘러넘친다."

[[dialogue]]
speaker = "unk"
original = "ぬるぬるとした感触を楽しみながら、乳首に爪を立てた。"
translation = "미끈거리는 감촉을 즐기며, 유두에 손톱을 세웠다."

[[dialogue]]
speaker = "マリーベル"
original = "「んひぃっ<emoji=heart04>」"
translation = "「으응히익<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ち、違うっ……今のは、気持ちいいのじゃ──あっ──あぁっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000またおっぱい、ぎゅって──んん～～～～っ<emoji=heart04>」"
translation = "「아, 아니야…… 방금 건, 기분 좋은 게 아니── 앗── 아아악<emoji=heart04> 으으으음<emoji=heart04> 또 가슴, 꽉── 으으으응~~~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「いた、ぃ──んああぁっ<emoji=heart04>\u3000お腹、熱いぃ……あっ、あっ……あぁんっ<emoji=heart04>」"
translation = "「아파, 아파── 으아아악<emoji=heart04> 배 속이, 뜨거워어…… 앗, 앗…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ちがうっ、ちがうっ……こんなのおかしいっ……んっ──ぐっ──んぅ～～～っ<emoji=heart04>」"
translation = "「아니야, 아니야…… 이런 거 이상해…… 윽── 큭── 으으음~~~~윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "赤い髪を振り乱して悶えるマリーベルを無視して、全力で責め立てる。"
translation = "붉은 머리카락을 흐트러뜨리며 몸부림치는 마리벨을 무시하고, 전력으로 몰아붙인다."

[[dialogue]]
speaker = "マリーベル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000奥、当たってっ<emoji=heart04>\u3000強いぃっ<emoji=heart04>\u3000おま○こ、ズンズンされてるっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안쪽, 닿았어<emoji=heart04> 너무 세에<emoji=heart04> 보지, 쿡쿡 박히고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「おち○ちん、子宮に来てっ、んんっ<emoji=heart04>\u3000子宮つぶれちゃうぅっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「자지, 자궁까지 와서, 으응<emoji=heart04> 자궁 으깨져 버려어<emoji=heart04> 하아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んんっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000おち○ちん、奥に当たって、お腹、苦しいっ<emoji=heart04>\u3000はぁっ、あっ、あっ──んんぁああっ<emoji=heart04>」"
translation = "「으응<emoji=heart04> 앗, 앗<emoji=heart04> 자지가, 안쪽을 때려서, 배 속이, 괴로워<emoji=heart04> 하아, 앗, 앗── 으으응아아악<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口を何度も突き上げられ、快楽と苦悶に喘ぐマリーベル。"
translation = "자궁 입구를 몇 번이고 찔러 올려져, 쾌락과 고통에 헐떡이는 마리벨."

[[dialogue]]
speaker = "unk"
original = "下半身ごと叩きつけると、釣り下げられた体全体が揺さぶられる。"
translation = "하반신째로 쳐박자, 매달린 몸 전체가 흔들린다."

[[dialogue]]
speaker = "マリーベル"
original = "「ふ──ん──あっ、あぁんっ<emoji=heart04>\u3000はぁ、はぁ、はぁ──んんぁあっ<emoji=heart04>」"
translation = "「후── 응── 앗, 아앙<emoji=heart04> 하아, 하아, 하아── 으으응아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000私のおま○こ、おち○ちんの形になっちゃうっ<emoji=heart04>\u3000ふぁ、あっ、あぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 아앙<emoji=heart04> 내 보지, 자지 모양이 되어 버려어<emoji=heart04> 화아, 앗, 아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んぁっ、あっ、激しいっ<emoji=heart04>\u3000おち○ちん、子宮に、ゴンゴン当たって……ふあぁ、あっ──ぁ──」"
translation = "「으아윽, 앗, 격렬해<emoji=heart04> 자지가, 자궁에, 퍽퍽 부딪혀서…… 후아아, 앗── 아──」"

[[dialogue]]
speaker = "unk"
original = "強すぎる快感を危険と錯覚したのか、マリーベルの秘めた星力が暴発しようとして──"
translation = "너무 강한 쾌감을 위험으로 착각한 것인지, 마리벨의 숨겨진 성력이 폭발하려 하고──"

[[dialogue]]
speaker = "マリーベル"
original = "「かはっ──！？」"
translation = "「카학──!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、首輪がマリーベルを戒めた。"
translation = "그 순간, 목걸이가 마리벨을 옥죄었다."

[[dialogue]]
speaker = "マリーベル"
original = "「くは……息、できな……」"
translation = "「쿠하…… 숨을, 못 쉬겠……」"

[[dialogue]]
speaker = "マリーベル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000奥、突かれてるっ<emoji=heart04>\u3000んぐぅっ……苦しいのに……うぁ、あぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 아아악<emoji=heart04> 안쪽, 찔리고 있어<emoji=heart04> 으구으…… 괴로운데…… 우아, 아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ひぁあっ<emoji=heart04>\u3000くぅ……んんっ<emoji=heart04>\u3000あっ、おち○ちん、強いぃ……んぁああっ──は──あっ──」"
translation = "「히아아앗<emoji=heart04> 크윽…… 으응<emoji=heart04> 앗, 자지, 너무 세에…… 으아아아악── 하── 앗──」"

[[dialogue]]
speaker = "マリーベル"
original = "「ひぎっ──！？」"
translation = "「히깃──!?」"

[[dialogue]]
speaker = "unk"
original = "また強烈な快感が走り、星力の暴発が呪いとなって文字通りマリーベルの首を絞める。"
translation = "다시 강렬한 쾌감이 달리고, 성력의 폭발이 저주가 되어 말 그대로 마리벨의 목을 조른다."

[[dialogue]]
speaker = "クロト"
original = "「星力を抑えないと苦しいぞ」"
translation = "「성력을 억제하지 않으면 괴로울 거다.」"

[[dialogue]]
speaker = "マリーベル"
original = "「そんなこと、言われなくても……くっ……うぅぅっ……あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ん～っ<emoji=heart04>」"
translation = "「그런 거, 말 안 해도…… 큭…… 으으으윽…… 앗<emoji=heart04> 으응<emoji=heart04> 음~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だけど快感と苦痛で制御どころではないのか、されるがままに喘いでいた。"
translation = "하지만 쾌감과 고통 탓에 제어는커녕, 당하는 대로 헐떡이고 있었다."

[[dialogue]]
speaker = "マリーベル"
original = "「んっ……ぐ……あっ、あんっ<emoji=heart04>\u3000ふっ……はぁ……んぁ、あっ、あぁああっ<emoji=heart04>」"
translation = "「음…… 윽…… 앗, 아앙<emoji=heart04> 훗…… 하아…… 으아, 앗, 아아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「息、が……く、ぁあっ……んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000首、絞められながら、突かれて……ふぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>」"
translation = "「숨이, 큭, 아아악…… 윽<emoji=heart04> 으응<emoji=heart04> 목이, 졸리면서, 찔려서…… 후아악<emoji=heart04> 아아악<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ウソ……苦しいのに、気持ちいいっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000はぁあっ、はっ──んんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아앙<emoji=heart04> 거짓말…… 괴로운데, 기분 좋아<emoji=heart04> 으아윽<emoji=heart04> 하아아악, 하윽── 으응<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ひぐっ<emoji=heart04>\u3000くぅ……また首輪、絞まって……あっ──ひやぁああ～～～～～っ<emoji=heart04>」"
translation = "「히극<emoji=heart04> 크윽…… 또 목걸이가, 조여서── 히야아아아~~~~~악<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マリーベルの乳首を思い切りつねってやる。"
translation = "마리벨의 유두를 힘껏 꼬집어 주었다."

[[dialogue]]
speaker = "マリーベル"
original = "「ひぃんっ<emoji=heart04>」"
translation = "「히잉……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すると甘い喘ぎが上がり──"
translation = "그러자 달콤한 신음이 터져 나오고──"

[[dialogue]]
speaker = "マリーベル"
original = "「んっぐぅっ……！？」"
translation = "「음윽……!?」"

[[dialogue]]
speaker = "unk"
original = "溢れる星力を抑えるように、首輪がマリーベルを絞める。"
translation = "넘쳐흐르는 성력을 억제하려는 듯, 목걸이가 마리벨의 목을 조인다."

[[dialogue]]
speaker = "マリーベル"
original = "「ぅくっ……うぅっ……んぁぁ<emoji=heart04>\u3000ダメ、苦しいのに……体が、熱くなって……んくっ……んんっ<emoji=heart04>」"
translation = "「으윽…… 으읏…… 응아아<emoji=heart04> 안 돼, 괴로운데…… 몸이 뜨거워져서…… 응긋…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「くああっ……また、おっぱいぎゅってされて……いっ、た……っ<emoji=heart04>\u3000んぐっ……んんっ……はあぁっ<emoji=heart04>」"
translation = "「쿠아악…… 또 가슴 꽉 쥐여서…… 아, 파……<emoji=heart04> 응윽…… 으응…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ふぁ──ぁ──ぁ──ひぐぅっ<emoji=heart04>\u3000痛いのも、苦しいのも、気持ちいいのも、めちゃくちゃになって……ああぁっ<emoji=heart04>」"
translation = "「하아── 아── 아── 히구윽<emoji=heart04> 아픈 것도, 괴로운 것도, 기분 좋은 것도, 엉망진창이 돼서…… 아아악<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "痛みが快感になって首輪が絞まり、その苦しみすら快楽へと変換される。"
translation = "통증이 쾌감이 되어 목걸이가 조여지고, 그 고통조차 쾌락으로 변환된다."

[[dialogue]]
speaker = "unk"
original = "苦痛が快楽に、快楽が苦痛になる無間地獄と化していた。"
translation = "고통이 쾌락이 되고, 쾌락이 고통이 되는 무간지옥으로 변해 있었다."

[[dialogue]]
speaker = "マリーベル"
original = "「ふぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ん──ぐぅ……っ<emoji=heart04>\u3000ぁっ──おかしくなるっ<emoji=heart04>\u3000わけ、わかんない……んぁっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 음── 으으……<emoji=heart04> 앗── 이상해져<emoji=heart04> 뭐가 뭔지 모르겠어…… 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んんくっ……ぅっ……んっはぁ……あぁっ<emoji=heart04>\u3000頭の中、ぐちゃぐちゃになって、変になるぅっ<emoji=heart04>\u3000はぁっ、はっ──ひやぁああっ<emoji=heart04>」"
translation = "「으응윽…… 윽…… 응하아…… 아앗<emoji=heart04> 머릿속이 엉망진창이 돼서 이상해져버려어<emoji=heart04> 하앗, 하── 히야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んぐっ……んっ……んぅっ<emoji=heart04>\u3000痛いのが、苦しいが、気持ち良くなってるっ<emoji=heart04>\u3000ダメダメ、もうダメぇっ<emoji=heart04>」"
translation = "「응윽…… 응…… 으응<emoji=heart04> 아픈 게, 괴로운 게, 기분 좋아지고 있어<emoji=heart04> 안 돼안 돼, 이제 안 돼애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶え間なく繰り返される苦痛と快楽がマリーベルを嬲る。"
translation = "끊임없이 반복되는 고통과 쾌락이 마리벨을 유린한다."

[[dialogue]]
speaker = "unk"
original = "だけどこれはマリーベルが望んだ罰だから、容赦なく責め続ける。"
translation = "하지만 이것은 마리벨이 바란 벌이기에, 용서 없이 계속 몰아붙인다."

[[dialogue]]
speaker = "マリーベル"
original = "「乳首、きゅってされて──ひぐぅっ<emoji=heart04>\u3000んぁっ、あっ<emoji=heart04>\u3000おち○ちんが、奥、ぐりぐりしてっ<emoji=heart04>\u3000子宮つぶれちゃうっ<emoji=heart04>\u3000んんんっ……はあぁんっ<emoji=heart04>」"
translation = "「유두, 꽉 쥐여서── 히구윽<emoji=heart04> 응앗, 앗<emoji=heart04> 자지가 안쪽을 부비부비해서<emoji=heart04> 자궁 뭉개져버려어<emoji=heart04> 으으응…… 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んっぐぅっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000おま○こ熱いぃっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000ふぁっ──あ──あ──<emoji=heart04>」"
translation = "「음구윽<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 보지 뜨거워어<emoji=heart04> 보지 가버려어<emoji=heart04> 하앗── 아── 아── <emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「ひぎぃ……また、首絞まって……んぁあっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイッくぅ────」"
translation = "「히기이…… 또 목 조려서…… 응아앗<emoji=heart04> 가버려가버려<emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 보지 가버려어어어────」"

[[dialogue]]
speaker = "マリーベル"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁああぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 응아아아아아아~~~~~~악<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んんぐぅ……っ<emoji=heart04>\u3000んんっ……首輪、絞まって……ぁ……<emoji=heart04>\u3000か、はっ……おち○ちん、お腹の中でビクビクしてるぅっ<emoji=heart04>」"
translation = "「으응구으……윽<emoji=heart04> 으응…… 목걸이 조여서…… 아……<emoji=heart04> 카, 하악…… 자지가 뱃속에서 파르르 떨고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000精液、熱いぃっ<emoji=heart04>\u3000お腹、焼けるみたいっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000子宮に、びゅーっって、入ってきてるぅっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 정액 뜨거워어<emoji=heart04> 배가 타버릴 것 같아아<emoji=heart04> 으응<emoji=heart04> 자궁에 뷰우우우하고 들어오고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んくっ、んっ、んぅっ……<emoji=heart04>\u3000首絞められながら、射精されてっ……んぁああ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응윽, 응, 으응……<emoji=heart04> 목 졸리면서 사정 당해서…… 응아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「はーっ……はーっ……はーっ……」"
translation = "「하아…… 하아…… 하아……」"

[[dialogue]]
speaker = "マリーベル"
original = "「あ……私の中から、精液こぼれてる……」"
translation = "「아…… 내 안에서 정액이 새어 나오고 있어……」"

[[dialogue]]
speaker = "マリーベル"
original = "「あそこが濡れて、太ももまで垂れてきて……ん……おもらししたみたい。気持ち悪いし恥ずかしいわ……」"
translation = "「거기가 젖어서 허벅지까지 흘러내리고…… 음…… 오줌 싼 것 같아. 기분 나쁘고 부끄러워……」"

[[dialogue]]
speaker = "unk"
original = "腕を拘束されたたまま荒い息を吐くマリーベル。"
translation = "팔이 구속된 채 거친 숨을 내뱉는 마리벨."

[[dialogue]]
speaker = "unk"
original = "快楽と苦悶の波は完全に引いていないようで、目の焦点がぼんやりしていた。"
translation = "쾌락과 고뇌의 파도가 완전히 가시지 않은 듯, 눈의 초점이 흐릿했다."

[[dialogue]]
speaker = "マリーベル"
original = "「はあぁ……死ぬかと思ったわ……。こんな死に方、屈辱的すぎるわ」"
translation = "「하아…… 죽는 줄 알았어……. 이런 죽음 방식은 너무 굴욕적이야」"

[[dialogue]]
speaker = "マリーベル"
original = "「結局、星力をコントロールする訓練にならなかったじゃない。あなたが変なことするからよ」"
translation = "「결국 성력을 조절하는 훈련은 안 됐잖아. 당신이 이상한 짓을 하니까 그렇지」"

[[dialogue]]
speaker = "クロト"
original = "「性欲のはけ口にしろって言ったのはマリーベルだろ」"
translation = "「성욕의 배출구로 삼으라고 한 건 마리벨이잖아.」"

[[dialogue]]
speaker = "マリーベル"
original = "「確かに言ったけど……あなたの責め方が変態的すぎるのよ。趣味が悪いわ」"
translation = "「확실히 말은 했지만…… 당신의 괴롭히는 방식이 너무 변태적이라고. 취미가 고약해」"

[[dialogue]]
speaker = "unk"
original = "だけどマリーベル表情は少し満足気で、本当は罰を受けることが望みだったんだと思う。"
translation = "하지만 마리벨의 표정은 조금 만족스러운 듯했고, 사실은 벌을 받는 것이 소원이었을 거라 생각한다."

[[dialogue]]
speaker = "unk"
original = "気休めでも少しは気持ちが軽くなったのなら、無駄じゃなかった……気がする。"
translation = "기분 전환이라도 조금은 마음이 가벼워졌다면, 헛수고는 아니었을…… 기분이 든다."

[[dialogue]]
speaker = "マリーベル"
original = "「そろそろ腕を自由にしてくれない？\u3000いい加減──んむっ！？\u3000ちゅるるっ、んんっ<emoji=heart04>」"
translation = "「슬슬 팔을 자유롭게 해주지 않을래? 이제 적당히── 음뭇!? 츄르르, 으응<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「なんで、キスするの……んぷっ、ちゅる……ちゅぅ<emoji=heart04>」"
translation = "「왜 키스하는 거야…… 응풋, 츄르…… 츄으<emoji=heart04>」"

[[dialogue]]
speaker = "マリーベル"
original = "「んれろ、れる<emoji=heart04>\u3000もう、仕方ないわね……ちゅぷっ、ちゅぅっ<emoji=heart04>\u3000んふ、んぅ……ちゅるるる……<emoji=heart04>」"
translation = "「응레로, 레로<emoji=heart04> 정말, 어쩔 수 없네…… 츄풋, 츄우윽<emoji=heart04> 응후, 응…… 츄르르르……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてマリーベルをいじめた埋め合わせをするように、濃厚なキスを交わしたのだった。"
translation = "그리고 마리벨을 괴롭힌 보상을 하듯, 농밀한 키스를 나누었다."

