[[dialogue]]
speaker = "unk"
original = "第１話,ぐーたらユニゾン,P"
translation = "제1화, 게으름뱅이 유니존"

[[dialogue]]
speaker = "unk"
original = "赤ちゃんクマロボの騒動は無事に落ち着いた──しかし黒ベア子曰く、他の世界での事件はまだ解決していないらしい。"
translation = "아기 곰 로봇 소동은 무사히 진정되었다── 하지만 흑베아코의 말에 따르면, 다른 세계의 사건은 아직 해결되지 않은 모양이다."

[[dialogue]]
speaker = "unk"
original = "そのためフィオナたちが戻ってくるまでの間、ステラとラファエロには、俺たちの世界にいてもらうことになるのだが……"
translation = "그렇기에 피오나 일행이 돌아올 때까지, 스텔라와 라파엘로에게는 우리 세계에 머물게 되었는데……"

[[dialogue]]
speaker = "ルリエル"
original = "「ステラさんやラファエロさんの生活の、フォローをお願いしたい……ですか？」"
translation = "「스텔라 씨나 라파엘로 씨의 생활을, 서포트해 줬으면 한다…… 인가요?」"

[[dialogue]]
speaker = "unk"
original = "お別れの日まで、おもてなしをしてあげたい"
translation = "작별하는 날까지, 정성껏 대접해 주고 싶어"

[[dialogue]]
speaker = "ルリエル"
original = "「なるほどです！\u3000ルリエルもお２人には、流星市国のことを大好きになってから帰ってもらいたいです～！」"
translation = "「그렇군요! 루리엘도 두 분이 유성시국을 정말 좋아하게 된 뒤에 돌아가셨으면 좋겠어요~!」"

[[dialogue]]
speaker = "ルリエル"
original = "「今は留守のフィオナ会長も、ここにいたらきっと会長さんとおんなじことを言ってたと思います♪\u3000──となれば！」"
translation = "「지금은 자리를 비운 피오나 회장님도, 여기 있었다면 분명 회장님이랑 똑같은 말을 했을 거라 생각해요♪ ──그렇게 된다면!」"

[[dialogue]]
speaker = "ルリエル"
original = "「流星星徒会の役員として、ルリエルも一肌脱いじゃうのです！」"
translation = "「유성 성도회 임원으로서, 루리엘도 한 팔 걷어붙이는 거예요!」"

[[dialogue]]
speaker = "セーラ"
original = "「お～っと。ルリちーったらお着替えまでしちゃって。張り切ってるね～♪」"
translation = "「오~라. 루리치, 옷까지 갈아입고 말이야. 의욕이 넘치네~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「それが噂の、異世界の騎士さんの戦闘服ですか。人工戦闘服とはまた違った雰囲気の、洗練された星力が感じられますね」"
translation = "「그게 소문의 이세계 기사님의 전투복인가요. 인공 전투복과는 또 다른 분위기의, 세련된 성력이 느껴지네요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふっふっふ～♪\u3000そうでしょう、そうでしょう！」"
translation = "「훗훗후~♪ 그렇겠죠, 그렇겠죠!」"

[[dialogue]]
speaker = "ソフィア"
original = "「……ルリってドジばかりしてるイメージですけど、やっぱり優秀なんですね。新しい戦闘服もすぐ操れるようになるだなんて」"
translation = "「……루리는 덜렁대기만 하는 이미지였는데, 역시 우수하네요. 새로운 전투복도 금방 다룰 수 있게 되다니.」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうでしょう、そうでしょう──ってぇ！？\u3000なんだか聞き捨てならない言葉がありましたぁ！？」"
translation = "「그렇겠죠, 그렇겠죠── 어라!? 방금 그냥 넘길 수 없는 말이 들렸는데요!?」"

[[dialogue]]
speaker = "ユウリ"
original = "「ま、並の星騎士だったら星徒会役員には選ばれないからな。いいかルリ。異世界からのお客さんに、失礼のないようにしろよ？」"
translation = "「뭐, 평범한 성기사라면 성도회 임원으로 뽑히지도 않았을 테니까. 알겠어, 루리? 이세계에서 온 손님에게 실례되는 짓 하지 마라?」"

[[dialogue]]
speaker = "ルリエル"
original = "「もちろんです！\u3000ステラさんたちのキラキラな生活のために、ルリエル頑張っちゃうのです～！」"
translation = "「물론이죠! 스텔라 씨 일행의 반짝반짝한 생활을 위해, 루리엘 힘낼 거예요~!」"

[[dialogue]]
speaker = "unk"
original = "そうしてルリエルに、快く協力を了承してもらえた翌日──"
translation = "그렇게 루리엘에게 흔쾌히 협력 승낙을 받은 다음 날──"

[[dialogue]]
speaker = "unk"
original = "どういうわけか……新星学園の星徒会室の隅っこに、アウトドアで使う立派なテントが鎮座していた。"
translation = "어째서인지…… 신성학원 성도회실 구석에 아웃도어용 커다란 텐트가 자리 잡고 있었다."

[[dialogue]]
speaker = "unk"
original = "……何事！？"
translation = "……무슨 일이야!?"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、会長さん！\u3000おはようなのです～♪」"
translation = "「앗, 회장님! 좋은 아침이에요~♪」"

[[dialogue]]
speaker = "ルリエル"
original = "「じゃーん！\u3000見てください、さっそくステラさんをおもてなししてるんですよ～！」"
translation = "「짠! 보세요, 벌써 스텔라 씨를 대접하고 있다고요~!」"

[[dialogue]]
speaker = "unk"
original = "いったい何がどうしてこうなった！？"
translation = "도대체 뭐가 어떻게 돼서 이렇게 된 거야!?"

[[dialogue]]
speaker = "ステラ"
original = "「んしょ……こ、こんにちは……会長さん。ありがとうございます、ボクのためにこんな素敵なテントを用意していただいて……」"
translation = "「영차…… 아, 안녕하세요…… 회장님. 감사합니다, 저를 위해 이렇게 멋진 텐트를 준비해 주셔서……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ステラさん、元々は<ruby>流星寮<rt>イルソーレ</rt></ruby>にお部屋が用意されてたじゃないですか？」"
translation = "「스텔라 씨, 원래는 <ruby>유성 기숙사<rt>일 소레</rt></ruby>에 방이 준비되어 있었잖아요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でも人の出入りが多い場所は苦手とのこと。新星学園の星徒会室に、間借りする形で落ち着いてはいましたが……」"
translation = "「하지만 사람의 출입이 많은 장소는 서투르시다고 해서요. 신성학원 성도회실에 셋방살이하는 형태로 안착하긴 했습니다만……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ここ最近は星徒会室に人の出入りも多くなってきて、見知らぬ人の視線に晒されることが増えてきてしまっていました！」"
translation = "「최근 들어 성도회실에 사람들의 출입도 많아지고, 낯선 사람의 시선에 노출되는 일이 늘어나 버렸어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「そこでルリエル、考えました！\u3000視線が気になるのなら、隠してしまえばいいのだと！！」"
translation = "「그래서 루리엘, 생각했습니다! 시선이 신경 쓰인다면 숨겨버리면 된다고!!」"

[[dialogue]]
speaker = "ルリエル"
original = "「パーテーションではちょっとした角度で中が見えてしまうこともありますが、テントの中であれば、そんな心配は不要なのです」"
translation = "「파티션으로는 약간의 각도 차이로 안이 보일 수도 있지만, 텐트 안이라면 그런 걱정은 필요 없거든요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「どうですか、会長さん？\u3000このルリエルの完璧なアイディアは……！\u3000褒めてくれていいんですよ～、えへへ♪」"
translation = "「어때요, 회장님? 루리엘의 이 완벽한 아이디어는……! 칭찬해 주셔도 된다고요~ 에헤헤♪」"

[[dialogue]]
speaker = "ステラ"
original = "「あ、あれ……？\u3000会長さん、なんだか複雑なお顔ですね……や、やっぱりご迷惑でしたか……？」"
translation = "「어, 어라……? 회장님, 왠지 복잡한 표정이시네요…… 여, 역시 민폐였나요……?」"

[[dialogue]]
speaker = "unk"
original = "一応、こういったことは星徒会の許可を……"
translation = "일단 이런 건 성도회의 허가를……"

[[dialogue]]
speaker = "unk"
original = "迷惑ではないんだけど……"
translation = "민폐는 아니지만……"

[[dialogue]]
speaker = "アナ"
original = "「もぞもぞ……テントの中からしゅわっち」"
translation = "「부스럭부스럭…… 텐트 안에서 슈왓치」"

[[dialogue]]
speaker = "unk"
original = "流星市国に帰って来て早々、一体何を……"
translation = "유성시국에 돌아오자마자 대체 뭘……"

[[dialogue]]
speaker = "unk"
original = "アナ！？"
translation = "아나!?"

[[dialogue]]
speaker = "アナ"
original = "「事後報告になりましたが、副会長権限で許可をしました。確かにスペースは取りますが、業務に大きな影響は出ないかと」"
translation = "「사후 보고가 되었습니다만, 부회장 권한으로 허가했습니다. 확실히 공간은 차지하지만, 업무에 큰 지장은 없을 듯하여.」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、ステラさんがコーディネートしたテントは凄いんですよ！\u3000中は一見散らかってる風ですが、全てが機能的に配置されているのです！」"
translation = "「회장님, 스텔라 씨가 코디네이트한 텐트는 대단하다고요! 안은 언뜻 보기에 어질러진 것 같지만, 모든 것이 기능적으로 배치되어 있어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あれれ。そんなバカな……ってお顔ですね？」"
translation = "「어라라. 그런 말도 안 되는…… 이라는 표정이시네요?」"

[[dialogue]]
speaker = "マトイ"
original = "「ごそごそ……！\u3000会長、一回このテントは体験しておいた方がいいよ！」"
translation = "「부스럭부스럭……! 회장, 한 번 이 텐트는 체험해 보는 게 좋아!」"

[[dialogue]]
speaker = "unk"
original = "マトイまで出てきた！？"
translation = "마토이까지 나왔어!?"

[[dialogue]]
speaker = "ルリエル"
original = "「それだけこの『ステラさんテント』の居心地がよいということなのです～♪」"
translation = "「그만큼 이 『스텔라 씨 텐트』의 안락함이 좋다는 뜻이에요~♪」"

[[dialogue]]
speaker = "ステラ"
original = "「ルリエルさんのおかげで、ボクの異世界生活がさらに快適になりました……本当に感謝してもしきれません……！」"
translation = "「루리엘 씨 덕분에 제 이세계 생활이 더욱 쾌적해졌어요…… 정말 감사하다는 말로도 부족해요……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「いえいえ、それほどでも～」"
translation = "「아니에요, 그 정도까지는~」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうだ！\u3000会長さんも是非、ステラさんのテントの中を見ていって欲しいのです！」"
translation = "「맞다! 회장님도 꼭 스텔라 씨의 텐트 안을 보고 가셨으면 좋겠어요!」"

[[dialogue]]
speaker = "ステラ"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "ステラ"
original = "（女の子が入るのはともかく、会長さんが中に入るのはちょっと恥ずかしいような！？）"
translation = "(여자아이가 들어오는 건 그렇다 쳐도, 회장님이 안에 들어오는 건 좀 부끄러운 것 같은데!?)"

[[dialogue]]
speaker = "ルリエル"
original = "「ステラさんも引き籠りスタイルを、色んな人に布教したいと仰ってましたから！」"
translation = "「스텔라 씨도 히키코모리 스타일을 여러 사람에게 포교하고 싶다고 말씀하셨으니까요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「百聞は一見に如かずなのです！\u3000ほらほら、会長さん！\u3000早く入るのです！！」"
translation = "「백문이 불여일견이에요! 자자, 회장님! 빨리 들어오세요!!」"

[[dialogue]]
speaker = "ステラ"
original = "（あああっ……！！\u3000ルリエルさんが会長さんを中に引っ張り込んじゃいました！？）"
translation = "(아아앗……!! 루리엘 씨가 회장님을 안으로 끌어들여 버렸어요!?)"

[[dialogue]]
speaker = "unk"
original = "なし崩し的にテントの中に引きずり込まれてしまったが……ともあれ、みんなが太鼓判を押すので体験してみることにした。"
translation = "얼떨결에 텐트 안으로 끌려 들어가 버렸지만…… 어쨌든 모두가 입을 모아 칭찬하니 체험해 보기로 했다."

[[dialogue]]
speaker = "unk"
original = "ものすごく落ち着く！！"
translation = "엄청나게 마음이 편안해져!!"

[[dialogue]]
speaker = "unk"
original = "これはすごい……！"
translation = "이거 대단한데……!"

[[dialogue]]
speaker = "ルリエル"
original = "「でしょう！？\u3000お菓子が食べたいな～って思ったら、右手を伸ばしたその先に！」"
translation = "「그렇죠!? 과자가 먹고 싶다~ 싶으면 오른손을 뻗은 그 끝에!」"

[[dialogue]]
speaker = "アナ"
original = "「本を読みたいな～と思ったら、左手を伸ばしたその先に。<ruby>混沌<rt>カオス</rt></ruby>の中に存在する確かな秩序」"
translation = "「책을 읽고 싶다~ 싶으면 왼손을 뻗은 그 끝에. <ruby>혼돈<rt>카오스</rt></ruby> 속에 존재하는 확실한 질서.」"

[[dialogue]]
speaker = "マトイ"
original = "「それにちょっぴり暗くて狭い所って落ち着くよね……こう、本能的に。私、今日からこのテントでお仕事しようかな……？」"
translation = "「게다가 조금 어둡고 좁은 곳은 마음이 편해지니까요…… 이렇게, 본능적으로. 나, 오늘부터 이 텐트에서 업무 볼까……?」"

[[dialogue]]
speaker = "ステラ"
original = "「会長さんは、ぐーたらの才能があるみたいですね。ボクのテリトリーを評価してもらえて嬉しいです……！」"
translation = "「회장님은 게으름뱅이의 재능이 있는 것 같네요. 제 테리토리를 평가해 주셔서 기뻐요……!」"

[[dialogue]]
speaker = "unk"
original = "だらだらしてしまう……！"
translation = "빈둥거리게 돼……!"

[[dialogue]]
speaker = "unk"
original = "だめだ……居心地がいい……！"
translation = "안 돼…… 너무 아늑해……!"

[[dialogue]]
speaker = "ルリエル"
original = "「一緒にぐーたら生活をユニゾンなのです～♪\u3000は～……落ち着く～……<emoji=heart04>」"
translation = "「함께 게으름뱅이 생활을 유니존 하는 거예요~♪ 하~…… 편안해~…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "数時間後……"
translation = "몇 시간 후……"

[[dialogue]]
speaker = "ソフィア"
original = "「失礼します。流星星徒会からのご連絡を……って？」"
translation = "「실례합니다. 유성 성도회에서 연락을…… 어라?」"

[[dialogue]]
speaker = "ルリエル"
original = "「だら～……<emoji=heart04>」"
translation = "「노곤노곤~…… <emoji=heart04>」"

[[dialogue]]
speaker = "ステラ"
original = "「だら～……<emoji=heart04>」"
translation = "「노곤노곤~…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だらだら～……"
translation = "빈둥빈둥~……"

[[dialogue]]
speaker = "ソフィア"
original = "「……何してるんですか、あなたたちは」"
translation = "「……뭐 하고 있는 건가요, 당신들은.」"

