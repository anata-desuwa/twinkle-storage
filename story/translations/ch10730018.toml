[[dialogue]]
speaker = "リノ"
original = "「（『空間の魔女』──私はかつてそう呼ばれていた）」"
translation = "「（『공간의 마녀』── 나는 예전에 그렇게 불렸지）」"

[[dialogue]]
speaker = "リノ"
original = "「（その力は非常に複雑で説明が難しいけれど、つまるところは『世界の境界を超越し、観測する』ことができるというもの）」"
translation = "「（그 힘은 매우 복잡해서 설명하기 어렵지만, 결론적으로는 『세계의 경계를 초월하여 관측하는』 것이 가능하다는 것）」"

[[dialogue]]
speaker = "リノ"
original = "「（隔たって存在する世界を観測する理由は１つ。今代の魔王である息子のクロトが生き残る術を探すこと。それこそが私の悲願だ）」"
translation = "「（동떨어져 존재하는 세계를 관측하는 이유는 하나. 이번 대의 마왕인 아들 쿠로토가 살아남을 방도를 찾는 것. 그것이야말로 나의 비원이다）」"

[[dialogue]]
speaker = "リノ"
original = "「（そのために私はこの力を使い倒す。あらゆる世界で見聞きした情報が私の力となるからだ）」"
translation = "「（그를 위해 나는 이 힘을 혹사한다. 모든 세계에서 보고 들은 정보가 나의 힘이 되기 때문이다）」"

[[dialogue]]
speaker = "リノ"
original = "「（しかしこの力には厄介な点もある）」"
translation = "「（하지만 이 힘에는 성가신 점도 있지）」"

[[dialogue]]
speaker = "unk"
original = "……例えば私の眠っている時などに、異なる世界の記憶のカケラが、意思とは無関係に流れ込んで来てしまうことがある。"
translation = "……예를 들어 내가 잠들어 있을 때 등에, 다른 세계의 기억 파편이 의지와 상관없이 흘러 들어와 버리는 경우가 있다."

[[dialogue]]
speaker = "unk"
original = "だから今から始まるのは存在しないエピソード。『クロトの母である緋宮リノ』とは、何の関係もない出来事なのだ──"
translation = "그러니 지금부터 시작되는 것은 존재하지 않는 에피소드. 『쿠로토의 어머니인 히미야 리노』와는 아무 상관 없는 사건인 것이다──"

[[dialogue]]
speaker = "リノ"
original = "「ふぅ……これはまた、懐かしい場所ね」"
translation = "「후우…… 여기는 또 그리운 곳이네」"

[[dialogue]]
speaker = "unk"
original = "かつての古巣であるネビュラ本部。しかしこの世界に旧友であるセドナがいるかどうかも不明。"
translation = "과거의 본거지였던 네뷸라 본부. 하지만 이 세계에 구우인 세드나가 있을지는 불명."

[[dialogue]]
speaker = "unk"
original = "私の名前が『緋宮リノ』でない可能性もあるのだから、当然と言える。それにしても──"
translation = "내 이름이 『히미야 리노』가 아닐 가능성도 있으니 당연하다고 할 수 있다. 그나저나──"

[[dialogue]]
speaker = "リノ"
original = "「……さっきから変な気分。体の芯が熱くて、うずくような感じ……何なのかしら？」"
translation = "「……아까부터 묘한 기분. 몸 깊은 곳이 뜨겁고 욱신거리는 느낌…… 무엇일까?」"

[[dialogue]]
speaker = "unk"
original = "この並行世界の私は風邪でも引いているのだろうか？\u3000心臓がうるさいほどに高鳴っている。"
translation = "이 평행세계의 나는 감기라도 걸린 걸까? 심장이 시끄러울 정도로 고동치고 있다."

[[dialogue]]
speaker = "unk"
original = "そして──かつん、と。私の背後で靴音が聞こえた。"
translation = "그리고── 구둣발 소리가, 뚜벅 하고. 내 등 뒤에서 들려왔다."

[[dialogue]]
speaker = "？？？"
original = "「驚いた。もう来てたんだな、リノ」"
translation = "「놀랐어. 벌써 와 있었구나, 리노」"

[[dialogue]]
speaker = "リノ"
original = "「えっ……？\u3000クロ、ト……？」"
translation = "「엣……? 쿠로, 토……?」"

[[dialogue]]
speaker = "？？？"
original = "「おいおい、一体誰と間違えてるんだ？\u3000自分が仕える魔王の名前を忘れないでくれよ」"
translation = "「이봐 이봐, 대체 누구랑 착각하는 거야? 자기가 모시는 마왕의 이름을 잊지 말아 줘」"

[[dialogue]]
speaker = "？？？"
original = "「今日は皆が出払っているから、２人の時間が欲しいってリノが言ったんだろ？」"
translation = "「오늘은 다들 나가고 없으니까, 둘만의 시간을 갖고 싶다고 리노가 말했잖아?」"

[[dialogue]]
speaker = "リノ"
original = "「────ぁ」"
translation = "「────아」"

[[dialogue]]
speaker = "unk"
original = "言われて理解した──この世界の私は、魔女である私は、魔王である彼と恋仲だった。"
translation = "말을 듣고 이해했다── 이 세계의 나는, 마녀인 나는, 마왕인 그와 연인 사이였다."

[[dialogue]]
speaker = "unk"
original = "今日はちょうど、ネビュラの本部から多くの魔女がいなくなる日で……私は今から彼と……"
translation = "오늘은 마침 네뷸라 본부에서 많은 마녀가 자리를 비우는 날이고…… 나는 지금부터 그와……"

[[dialogue]]
speaker = "リノ"
original = "「ぁっ……あっ……はぁあっ……そんな、いきなり、脱がせるだなんて……」"
translation = "「아…… 앗…… 하아앗…… 세상에, 갑자기 옷을 벗기다니……」"

[[dialogue]]
speaker = "？？？"
original = "「今日のリノは何だか変だな。別に今さら恥ずかしがるようなことじゃないだろ」"
translation = "「오늘 리노는 왠지 이상하네. 별로 이제 와서 부끄러워할 일도 아니잖아」"

[[dialogue]]
speaker = "リノ"
original = "「だ、だって……あ、あなたの顔が……」"
translation = "「그, 그치만…… 다, 당신의 얼굴이……」"

[[dialogue]]
speaker = "？？？"
original = "「俺の顔？\u3000え……何か変かな」"
translation = "「내 얼굴? 에…… 뭔가 이상한가.」"

[[dialogue]]
speaker = "unk"
original = "クロトに……最愛の息子に、そっくりなんだもの。"
translation = "쿠로토와…… 최애하는 아들과 판박이인걸."

[[dialogue]]
speaker = "リノ"
original = "「（ううう、嘘でしょ！？\u3000本当に許されるの、こんなこと！？\u3000で、でも、この並行世界では、私と彼は親子なんかじゃなくって……！）」"
translation = "「(거, 거거, 거짓말이지!? 정말 허용되는 거야, 이런 일이!? 하, 하지만, 이 평행세계에서는 나와 그는 부모 자식 관계가 아니라……!)」"

[[dialogue]]
speaker = "unk"
original = "胸の中で渦巻く感情の整理がつかない。"
translation = "가슴 속에서 소용돌이치는 감정이 정리되지 않는다."

[[dialogue]]
speaker = "unk"
original = "記憶のカケラから流れ込んだ『私』は、彼のことを恋人と認識している。けれども同時に私は『母親である緋宮リノ』の記憶も持っていて……"
translation = "기억의 파편으로부터 흘러 들어온 『나』는, 그를 연인으로 인식하고 있다. 하지만 동시에 나는 『어머니인 히노미야 리노』의 기억도 가지고 있어서……"

[[dialogue]]
speaker = "リノ"
original = "「（ど、動揺していても仕方がないわ。これは夢よ。それにこの世界では、彼の名前はクロトじゃない！）」"
translation = "「(도, 동요하고 있을 때가 아니야. 이건 꿈이야. 게다가 이 세계에서 그의 이름은 쿠로토가 아니야!)」"

[[dialogue]]
speaker = "リノ"
original = "「（いくら顔と声と性格がそっくりでも……別人……別人、で……）」"
translation = "「(아무리 얼굴과 목소리와 성격이 판박이라도…… 다른 사람…… 다른 사람, 이니까……)」"

[[dialogue]]
speaker = "リノ"
original = "「って、無理よぉっ！？\u3000だって、そっくりじゃない！！」"
translation = "「그치만, 무리라구우!? 그야, 너무 똑같잖아!!」"

[[dialogue]]
speaker = "？？？"
original = "「え、えーっと……リノ？\u3000何だか慌ててるところ、悪いんだけどさ」"
translation = "「에, 에-또…… 리노? 한창 당황하고 있는 중에 미안하긴 한데 말이야.」"

[[dialogue]]
speaker = "リノ"
original = "「は、はい！？」"
translation = "「네, 넷!?」"

[[dialogue]]
speaker = "？？？"
original = "「恋人の裸を前にお預けってのも辛いって言うか……入れてもいいのかな」"
translation = "「연인의 알몸을 앞에 두고 애태우는 것도 힘들다고 해야 할까…… 넣어도 될까.」"

[[dialogue]]
speaker = "リノ"
original = "「え……そ、それは──」"
translation = "「에…… 그, 그건──」"

[[dialogue]]
speaker = "リノ"
original = "「（断らなきゃ……<emoji=heart04>\u3000私たちは、親子なんだもの。おち○ちんは入れちゃダメって、言わなきゃ……<emoji=heart04>）」"
translation = "「(거절해야 해……<emoji=heart04> 우리는, 부모 자식 사이인걸. 자지는 넣으면 안 된다고, 말해야 해……<emoji=heart04>)」"

[[dialogue]]
speaker = "unk"
original = "でも、その気持ちは声に出すことはできなかった。代わりにこぼれ出たのは──"
translation = "하지만 그 마음은 목소리로 나오지 않았다. 대신 흘러나온 것은──"

[[dialogue]]
speaker = "リノ"
original = "「は、はい……どうぞっ<emoji=heart04>」"
translation = "「네, 네…… 어서요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人としての『私』の感情が、母親の声よりも前に出た。目の前の彼を、愛しい魔王様だと思って仕方がない自分が確かにいる。"
translation = "연인으로서의 『나』의 감정이, 어머니의 목소리보다 앞서 나갔다. 눈앞의 그를 사랑스러운 마왕님이라고 생각할 수밖에 없는 자신이 확실히 존재한다."

[[dialogue]]
speaker = "unk"
original = "彼は頷いて、大きく反りかえったおち○ちんを、私の中に──"
translation = "그는 고개를 끄덕이고, 크게 휘어버린 자지를, 내 안에──"

[[dialogue]]
speaker = "リノ"
original = "「んぅうぅッ──はぁ、あ、あぁあ～～～っ！？<emoji=heart04>」"
translation = "「응으으윽──하아, 아, 아아아~~~앗!?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "挿入された瞬間に体がびくりと痙攣し、私は軽く達してしまっていた。"
translation = "삽입된 순간 몸이 움찔하고 경련하며, 나는 가볍게 가버리고 말았다."

[[dialogue]]
speaker = "リノ"
original = "「（あっ、あぁぁああぁぁぁっ<emoji=heart04>\u3000……はぁぁぁんっ<emoji=heart04>\u3000き、気持ちいいっ……！）」"
translation = "「(앗, 아아아아아아앗<emoji=heart04> ……하아아앙<emoji=heart04> 기, 기분 좋아……!)」"

[[dialogue]]
speaker = "リノ"
original = "「（あぁぁ……息子と同じ顔をして、同じ声をして、同じような喋り方をしていても──恋人のおち○ちんだもの<emoji=heart04>）」"
translation = "「(아아아…… 아들과 같은 얼굴을 하고, 같은 목소리를 하고, 같은 말투를 써도── 연인의 자지인걸<emoji=heart04>)」"

[[dialogue]]
speaker = "リノ"
original = "「ふうぁっ……あっ、ぁあ、ぁっ……！？<emoji=heart04>\u3000あ、や、やぁあっ……き、気持ち、いいっ……んんぅっ<emoji=heart04>」"
translation = "「후아앗…… 앗, 아아, 앗……!?<emoji=heart04> 아, 싫, 싫어어…… 기, 기분, 좋아…… 응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「（あっ、あっ、あぁぁっ<emoji=heart04>\u3000間違いない。この世界の私は彼と……あぁぁ<emoji=heart04>\u3000数えきれないくらい、セックスをしている。はぁぁ、だってこんなにも馴染んで、抵抗がない<emoji=heart04>）」"
translation = "「(앗, 앗, 아아앗<emoji=heart04> 틀림없어. 이 세계의 나는 그와…… 아아아<emoji=heart04> 셀 수 없을 정도로, 섹스를 하고 있어. 하아아, 그야 이렇게나 잘 길들여져서, 거부감이 없어<emoji=heart04>)」"

[[dialogue]]
speaker = "？？？"
original = "「っ……リノ、どうしたんだ？\u3000今日はその、いつもよりすごく濡れてっ……締め付けも……」"
translation = "「윽…… 리노, 왜 그래? 오늘은 그, 평소보다 훨씬 젖어서…… 조임도……」"

[[dialogue]]
speaker = "リノ"
original = "「ぁ、い、いぇっ……な、何でもないです、<b>魔王様</b>ぁっ……<emoji=heart04>」"
translation = "「아, 이, 아뇨…… 아, 아무것도 아니에요, <b>마왕님</b>으으으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自然と口をついて出る呼称。この世界の私は、彼のことを『魔王様』と呼んでいる。"
translation = "자연스럽게 입 밖으로 튀어나오는 호칭. 이 세계의 나는 그를 『마왕님』이라고 부르고 있다."

[[dialogue]]
speaker = "リノ"
original = "「き、きっ……気持ち、良くてっ……魔王様の、お、おち○ちん、がぁっ……<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「기, 기이…… 기분, 좋아서어…… 마왕님의, 자, 자지가아앗……<emoji=heart04> 응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「──リノっ！」"
translation = "「──리노!」"

[[dialogue]]
speaker = "リノ"
original = "「はあ、ぁ、あぁあっ<emoji=heart04>\u3000んっんんぅっ……ふうぅ、うぅうっ<emoji=heart04>」"
translation = "「하아, 아, 아아앗<emoji=heart04> 응응응윽…… 후우우, 우우웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "私の返答で火が点いたのか、息子とそっくりの彼のおち○ちんが、私の中を何度も往復していく──"
translation = "나의 대답에 불이 붙었는지, 아들과 판박이인 그의 자지가 내 안을 몇 번이고 왕복해 간다──"

[[dialogue]]
speaker = "リノ"
original = "「んんぁっ……は、ぁあっ<emoji=heart04>\u3000んぅ、ふぅ、んんっ<emoji=heart04>\u3000魔王様っ、んぁ、はぁっ……あぁあっ<emoji=heart04>」"
translation = "「응응아앗…… 하, 아앗<emoji=heart04> 응으, 후우, 응응윽<emoji=heart04> 마왕님, 응아, 하앗…… 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「きっ……急に激しいっ……は、あ、ぅっ……<emoji=heart04>\u3000そんな、おち○ちん、強くしたら……は、ぅあっ、あっ<emoji=heart04>」"
translation = "「갑…… 갑자기 격해에…… 하, 아, 윽……<emoji=heart04> 그런, 자지, 강하게 하면…… 하, 으앗, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「そうか？\u3000いつもと同じ感じだと思うけど……」"
translation = "「그래? 평소랑 똑같은 느낌이라고 생각하는데……」"

[[dialogue]]
speaker = "リノ"
original = "「そ、そう、なんですかっ……は、ぁあ、んぅ、うっ……んんっ……くっふぅ、うう、ぁ、ああっ……<emoji=heart04>」"
translation = "「그, 그런, 건가요오…… 하, 아아, 응으, 윽…… 응응윽…… 큭후우, 우우, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分でもほとんどいじらない穴を、穿たれている。しかも息子と同じ顔をした恋人に。"
translation = "스스로도 거의 건드리지 않는 구멍을 꿰뚫리고 있다. 그것도 아들과 똑같은 얼굴을 한 연인에게."

[[dialogue]]
speaker = "unk"
original = "深くまで突き刺さっている彼のおち○ちんは、私のことを愛おしいと思ってくれているのが良くわかる、熱くて硬い勃起で……"
translation = "깊숙한 곳까지 찔러 들어오는 그의 자지는, 나를 사랑스럽게 생각해주고 있다는 것을 잘 알 수 있는, 뜨겁고 딱딱한 발기로……"

[[dialogue]]
speaker = "リノ"
original = "「な、なんだか今日は、いつもより感じてしまう、みたいでっ……は、ぁっ……ふうぅっ<emoji=heart04>」"
translation = "「왠, 왠지 오늘은, 평소보다 더 느껴버리는 것, 같아요오…… 하, 앗…… 후우으윽<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「──嬉しいな。真面目なリノがそんなに乱れてくれるだなんて」"
translation = "「──기쁜걸. 성실한 리노가 그렇게 흐트러져 주다니.」"

[[dialogue]]
speaker = "unk"
original = "彼の腕が伸びて、私のおっぱいを揉み始めた。"
translation = "그의 팔이 뻗어와, 내 가슴을 주무르기 시작했다."

[[dialogue]]
speaker = "リノ"
original = "「はぁ、あぁ<emoji=heart04>\u3000おっぱい、そんなに、ぎゅうって揉んだら、だ、ダメっ、ダメですっ……<emoji=heart04>」"
translation = "「하아, 아아<emoji=heart04> 가슴, 그렇게, 꼬옥 주무르면, 아, 안 돼, 안 돼요……<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「いつもなら、もっと揉んでって言うのに」"
translation = "「평소라면 더 주물러달라고 할 텐데.」"

[[dialogue]]
speaker = "リノ"
original = "「ふぅううっ！？<emoji=heart04>\u3000わ、私、そんなことを、あなたに、ぃっ……？<emoji=heart04>」"
translation = "「후우우웃!?<emoji=heart04> 내, 내가, 그런 짓을, 당신에게에, 윽……?<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「うん。よくおねだりしてくるけど？」"
translation = "「응. 자주 조르곤 하잖아?」"

[[dialogue]]
speaker = "リノ"
original = "「はぁああ、んぅうっ、そんな、そんなぁっ──んんっ<emoji=heart04>」"
translation = "「하아아아, 응으윽, 그런, 그런 건── 응응윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "２つの意識が私の中でバグを起こしている。愛しい恋人の魔王様に抱かれる喜びと、息子と繋がっているような背徳感──"
translation = "두 가지 의식이 내 안에서 버그를 일으키고 있다. 사랑스러운 연인인 마왕님에게 안기는 기쁨과, 아들과 이어져 있는 듯한 배덕감──"

[[dialogue]]
speaker = "？？？"
original = "「そうだ。いつもみたいにおねだりしてみなよ」"
translation = "「그렇지. 평소처럼 졸라봐.」"

[[dialogue]]
speaker = "リノ"
original = "「えっ──えっ……！？」"
translation = "「엣── 엣……!?」"

[[dialogue]]
speaker = "unk"
original = "混乱する私に、彼が耳打ちしてきた言葉。唾を飲み込んで、私は──"
translation = "혼란스러워하는 내게 그가 귓속말한 말. 침을 꿀꺽 삼키고 나는──"

[[dialogue]]
speaker = "リノ"
original = "「んっ……んんっ……<emoji=heart04>\u3000わ、私の乳首、いっぱい、コリコリって、いじってくださいっ……魔王、様ぁっ……<emoji=heart04>」"
translation = "「응윽…… 응응윽……<emoji=heart04> 제, 제 유두, 잔뜩, 꼬물꼬물, 만져주세요오…… 마왕, 님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口をついて勝手に出てくるおねだりの言葉に、母親の私が赤面してこの場から逃げたがる。"
translation = "입 밖으로 제멋대로 튀어나오는 조르는 말에, 어머니인 내가 얼굴을 붉히며 이곳에서 도망치고 싶어 한다."

[[dialogue]]
speaker = "リノ"
original = "「んんんぅっ！？<emoji=heart04>\u3000ひ、ひぁぁあ、ああっ……！<emoji=heart04>\u3000乳首、乳首ぃっ……んんぁあっ……！<emoji=heart04>」"
translation = "「응응응으윽!?<emoji=heart04> 히, 히아아아, 아앗……!<emoji=heart04> 유두, 유두으으으으윽……! 응응아아앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "息子とそっくりの指先が、私の膨れ上がった乳首をいじり始める。あまりに気持ちがよくて背中が反りかえってしまう。"
translation = "아들과 판박이인 손가락 끝이, 나의 부풀어 오른 유두를 만지기 시작한다. 너무 기분이 좋아서 등 뒤로 젖혀져 버린다."

[[dialogue]]
speaker = "リノ"
original = "「あ、あああ、ぅ、んんんっ<emoji=heart04>\u3000そ、それ、ダメです、感じすぎちゃう……！」"
translation = "「아, 아아아, 으, 응응응윽<emoji=heart04> 그, 그거 안 돼요, 너무 느껴버려……!」"

[[dialogue]]
speaker = "？？？"
original = "「もっとしてってこと？」"
translation = "「더 해달라는 거야?」"

[[dialogue]]
speaker = "unk"
original = "くりくりくりくり──指の腹でこね回すような動きがあまりに気持ちが良くて、背徳感もすごくて──"
translation = "조물조물조물조물── 손가락 끝으로 굴리듯 비비는 움직임이 너무나도 기분 좋고, 배덕감도 엄청나서──"

[[dialogue]]
speaker = "リノ"
original = "「んんんぁっ、あっあっあっ！<emoji=heart04>\u3000だ、ダメなのっ……私は、おか、おかあさ、んっ……なのぉっ……！<emoji=heart04>」"
translation = "「응응응아앗, 앗앗앗앗!<emoji=heart04> 아, 안 되는 거야아…… 나는, 어머, 어머니이, 이잇…… 인걸……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精いっぱいの『緋宮リノ』の叫びがようやく飛び出た。"
translation = "정성을 다한 『히노미야 리노』의 외침이 겨우 튀어나왔다."

[[dialogue]]
speaker = "unk"
original = "けれどそれは、口に出さなければ良かったとすぐに後悔することになる──"
translation = "하지만 그것은 입 밖으로 내지 않았으면 좋았을 것이라고 곧 후회하게 된다──"

[[dialogue]]
speaker = "？？？"
original = "「お母さんって……まだなってないだろ？\u3000でもリノが孕んでくれたら嬉しいな。きっといいお母さんになると思うよ」"
translation = "「어머니라니…… 아직 안 됐잖아? 하지만 리노가 임신해준다면 기쁘겠어. 분명 좋은 어머니가 될 거라고 생각해.」"

[[dialogue]]
speaker = "リノ"
original = "「～～～っ！？<emoji=heart04>\u3000や、やぁぁん<emoji=heart04>\u3000だめだめだめぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000……んんぅ、ふぁ、あ、ぁああっ<emoji=heart04>」"
translation = "「~~~윽!?<emoji=heart04> 야, 야아앙<emoji=heart04> 안돼안돼안돼애<emoji=heart04><emoji=heart04><emoji=heart04> ……응응으, 후아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クロトの声でそんなことを言わないで。胸の中でぐちゃぐちゃになった気持ちの整理がつかなくなってしまう。"
translation = "쿠로토의 목소리로 그런 말을 하지 마. 가슴 속에서 엉망진창이 된 마음의 정리가 되질 않게 되어버려."

[[dialogue]]
speaker = "？？？"
original = "「すごく濡れてる。リノ、気持ちよくなってくれてるんだ。嬉しいな。キスしていい？」"
translation = "「엄청 젖었어. 리노, 기분 좋아해 주는구나. 기뻐. 키스해도 돼?」"

[[dialogue]]
speaker = "リノ"
original = "「あ、ぁ、あっ……そんな、今キスなんてしたらっ……んんぅう<emoji=heart04>」"
translation = "「아, 아, 앗…… 세상에, 지금 키스 같은 걸 하면…… 응응으우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼が覆いかぶさって私の唇を奪ってくるのに合わせて──"
translation = "그가 덮쳐와 나의 입술을 빼앗는 것에 맞춰서──"

[[dialogue]]
speaker = "リノ"
original = "「んぅちゅるっ<emoji=heart04>\u3000ちゅるれる、んちゅぅ、じゅるぅ、れぇれろ、れろれろれろぉ<emoji=heart04>\u3000ちゅぱ、ちゅるぅ～っ<emoji=heart04>」"
translation = "「응으츄릅<emoji=heart04> 츄르레루, 응츄우, 쥬루우, 레에레로, 레로레로레로오<emoji=heart04> 츄파, 츄르우~윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "夢中で舌を絡めてしまう私。磁石に引き寄せられるみたいに、とても自然に深いキスをしてしまっていた。"
translation = "정신없이 혀를 섞고 마는 나. 자석에 끌려가는 것처럼 아주 자연스럽게 깊은 키스를 하고 있었다."

[[dialogue]]
speaker = "リノ"
original = "「れぇれろ、んちゅ、ちゅるぅっ、んんっ<emoji=heart04>\u3000ちゅる、んちゅぅ、れぇえ、ちゅる、んちゅるぅ、ちゅぅっ……<emoji=heart04>」"
translation = "「레에레로, 응츄, 츄르으윽, 응응윽<emoji=heart04> 츄르, 응츄우, 레에에, 츄르, 응츄르으, 츄우윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を絡めるたびに、私の中にあるおち○ちんの硬さが増していく。"
translation = "혀를 섞을 때마다 내 안에 있는 자지의 단단함이 더해간다."

[[dialogue]]
speaker = "unk"
original = "愛しい彼にもっと強く突いて欲しくて、キスが止められなかった。"
translation = "사랑스러운 그가 좀 더 강하게 찔러주길 원해서 키스를 멈출 수 없었다."

[[dialogue]]
speaker = "リノ"
original = "「んれるれる、んちゅるう、ちゅるっ、れぇ、んちゅぅ<emoji=heart04>\u3000魔王様ぁっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000はぷっ<emoji=heart04>\u3000れぇれろ、れろぉ、んちゅるぅ～っ<emoji=heart04>」"
translation = "「응레루레루, 응츄루우, 츄르윽, 레에, 응츄우<emoji=heart04> 마왕님……<emoji=heart04> 응츄윽<emoji=heart04> 하푸웃<emoji=heart04> 레에레로, 레로오, 응츄르으~윽<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「ぁ、ぁあぁ、好きっ……魔王様っ、好きですっ……んちゅ、ちゅぅ、んちゅる、ちゅう、れるっ……ぷぁあっ……<emoji=heart04>」"
translation = "「아, 아아아, 좋아해…… 마왕님…… 좋아해요오…… 응츄, 츄우, 응츄루, 츄우, 레루윽…… 푸아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "つぅ──と彼と私の唇に唾液の橋がかかる。多幸感と背徳感で頭がスパークして……もっと激しく抱いて欲しいとばかり考えてしまう。"
translation = "츠으── 하고 그와 나의 입술 사이에 타액의 다리가 걸린다. 다행감과 배덕감으로 머리가 스파크해서…… 좀 더 격하게 안아주길 바라는 생각뿐이다."

[[dialogue]]
speaker = "？？？"
original = "「今日のリノ……すごくエロいね」"
translation = "「오늘 리노…… 엄청 야하네.」"

[[dialogue]]
speaker = "リノ"
original = "「は、ぁっ……ふぅっ……んんっ……そ、そんなことはっ……<emoji=heart04>」"
translation = "「하, 앗…… 후우윽…… 응응윽…… 그, 그런 건……<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「ごめん、俺、ちょっと抑えられないかも」"
translation = "「미안, 나, 좀 억제할 수 없을지도.」"

[[dialogue]]
speaker = "unk"
original = "私の腰を掴む彼の力がひときわ強くなって──"
translation = "나의 허리를 붙잡는 그의 힘이 한층 강해지고──"

[[dialogue]]
speaker = "リノ"
original = "「んっふぅ、ぁ、ぁ、あ、あぁ、あぁあっ<emoji=heart04>\u3000激しっ、激しすぎ、ますっ<emoji=heart04>\u3000魔王様っ、魔王様ぁっ<emoji=heart04>」"
translation = "「응으후우, 아, 아, 아, 아아, 아아앗<emoji=heart04> 격해, 너무 격해여어……<emoji=heart04> 마왕님, 마왕님……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「お、おち○ちん、すごっ──そんな奥まで、えぐるみたいに──んっ、ふぅ、うぅう～っ<emoji=heart04>\u3000ぁ、あ、あ、ぁーっ<emoji=heart04>」"
translation = "「자, 자지, 굉장해── 그렇게 안쪽까지, 도려내는 것처럼── 응으, 후우, 우우우~윽<emoji=heart04> 아, 아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛液がどんどん溢れてくるのがわかる。繋がっている所からぐちゅぐちゅと水音が鳴るたび、ほとんどが私の出したものだとわかってしまう。"
translation = "애액이 계속해서 넘쳐흐르는 것을 알 수 있다. 연결되어 있는 곳에서 구축구축 물소리가 날 때마다, 대부분이 내가 내보낸 것이라는 걸 깨닫고 만다."

[[dialogue]]
speaker = "リノ"
original = "「ふぁあ、ぁ、あぁあっ<emoji=heart04>\u3000そ、そこ好きっ<emoji=heart04>\u3000いっぱい突かれると、こ、声が──ぁ、あぁ、ぁ、あ、ぁっ<emoji=heart04>」"
translation = "「후아아, 아, 아아앗<emoji=heart04> 거기 좋아<emoji=heart04> 잔뜩 찔리면, 모, 목소리가── 아, 아아, 아, 아, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「リノの声っ……すっげーエロいっ……可愛いっ……！」"
translation = "「리노 목소리…… 진짜 야해…… 귀여워……!」"

[[dialogue]]
speaker = "リノ"
original = "「んんぅうっ<emoji=heart04>\u3000あぁ、ぁああっ<emoji=heart04>\u3000か、可愛いだなんて、そんな、私はっ……<emoji=heart04>」"
translation = "「응응으우윽<emoji=heart04> 아아, 아아앗<emoji=heart04> 귀, 귀엽다니, 그런, 나는……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言わないで。大切な息子と同じ声と顔と体をしているのに、母親である私のことを抱きながら、可愛いだなんて──"
translation = "말하지 마. 소중한 아들과 똑같은 목소리와 얼굴과 몸을 하고 있으면서, 어머니인 나를 안으며 귀엽다니──"

[[dialogue]]
speaker = "？？？"
original = "「可愛いっ……すげーエロ可愛いっ……リノ、好きだっ！」"
translation = "「귀여워…… 엄청 야하고 귀여워…… 리노, 좋아해!」"

[[dialogue]]
speaker = "リノ"
original = "「ふぅううっ！？<emoji=heart04>\u3000んっはぁ、あぁ、あぁあっ<emoji=heart04>\u3000や、ぁああ、ぁあっ<emoji=heart04>\u3000それダメ、ダメです、あっあっあっ、ぁあぁ、あああ～っ<emoji=heart04>」"
translation = "「후우우웃!?<emoji=heart04> 응으하아, 아아, 아아앗<emoji=heart04> 야, 아아아, 아앗<emoji=heart04> 그거 안 돼, 안 돼요, 앗앗앗, 아아아, 아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「おち○ちん気持ちいいっ<emoji=heart04>\u3000あなたのおち○ちん、気持ちいいのぉっ<emoji=heart04>\u3000強く突いちゃダメ、ダメぇえぇええっ<emoji=heart04>」"
translation = "「자지 기분 좋아아<emoji=heart04> 당신의 자지, 기분 좋아아아아앗<emoji=heart04> 강하게 찌르면 안 돼, 안 돼애애애앳<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あらゆる感情がごちゃ混ぜになって、それら全てが快感へ変わっていく。"
translation = "온갖 감정이 뒤섞여 그것들 모두가 쾌감으로 변해간다."

[[dialogue]]
speaker = "unk"
original = "おへその裏側が熱くなって、大切なところが下りてきて──"
translation = "배꼽 안쪽이 뜨거워지고 소중한 곳이 내려와서──"

[[dialogue]]
speaker = "？？？"
original = "「中に出すぞ、リノっ！」"
translation = "「안에 싼다, 리노!」"

[[dialogue]]
speaker = "unk"
original = "それだけはいけない。だって私はお母さんなの。止めてって言わなきゃ。言わなきゃ、言わなきゃ言わなきゃ言わなきゃ──"
translation = "그것만은 안 돼. 그야 나는 엄마인걸. 멈추라고 말해야 해. 말해야 해, 말해야 해 말해야 해 말해야 해──"

[[dialogue]]
speaker = "リノ"
original = "「はいっ<emoji=heart04>\u3000出してっ<emoji=heart04>\u3000出してくださいっ<emoji=heart04>\u3000孕ませてくださいっ、魔王様っ<emoji=heart04>\u3000好き、好きぃ、好きぃっ<emoji=heart04>」"
translation = "「네에엣<emoji=heart04> 내보내 줘어<emoji=heart04> 내보내 주세요오<emoji=heart04> 임신시켜 주세요, 마왕님……<emoji=heart04> 좋아해, 좋아해, 좋아해애애애앳<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "想いが溢れて止まらない。大好きな彼に中出しして欲しくて、お腹の奥がきゅんきゅんしている。"
translation = "마음이 넘쳐흘러 멈추지 않는다. 아주 좋아하는 그가 질내사정 해주길 원해서 배 속 깊은 곳이 큥큥거리고 있다."

[[dialogue]]
speaker = "リノ"
original = "「おち○ちん奥までっ<emoji=heart04>\u3000奥までくださいっ<emoji=heart04>\u3000一番奥で、びゅうって、出してください！<emoji=heart04>\u3000大好きです<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>\u3000好きぃ、好きぃいいっ<emoji=heart04>」"
translation = "「자지 끝까지이잇<emoji=heart04> 끝까지 주세요오<emoji=heart04> 제일 안쪽에서, 뷰우우우우우욱, 내보내 주세요!<emoji=heart04> 정말 좋아해요<emoji=heart04> 하아아앙<emoji=heart04> 좋아해, 좋아해애애애애앳<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人として愛している男性の記憶に、母親としての愛情まで混ざりこんでしまって。"
translation = "연인으로서 사랑하는 남성의 기억에 어머니로서의 애정까지 뒤섞여버려서."

[[dialogue]]
speaker = "unk"
original = "目の前の彼から熱い滾りを受け取りたくて、我慢ができなかった。"
translation = "눈앞의 그로부터 뜨거운 맥동을 받아내고 싶어서 견딜 수 없었다."

[[dialogue]]
speaker = "？？？"
original = "「出すっ……出すよ、リノ……！」"
translation = "「싼다…… 쌀게, 리노……!」"

[[dialogue]]
speaker = "リノ"
original = "「はいっ<emoji=heart04>\u3000来てっ<emoji=heart04>\u3000来てくださいっ<emoji=heart04>\u3000好き、好き、好きぃっ、ぁっあっあっあっあっあっああぁああっ！<emoji=heart04>」"
translation = "「네에엣<emoji=heart04> 어서요오<emoji=heart04> 어서 와주세요오<emoji=heart04> 좋아, 좋아, 좋아애애애앳, 앗앗앗앗앗앗아아아아아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「はぁああっ……イクっ、イクイクっ──イクイクイクっ<emoji=heart04>\u3000イっク、ぅうぅぅう～っ……！<emoji=heart04>」"
translation = "「하아아아앗…… 가아, 가가아앗── 가가가가앗<emoji=heart04> 가, 가아, 아아아아~앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「ひぁぁぁあっ！<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000あぁぁぁああぁあああぁあああぁあああぁ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아앗!<emoji=heart04> 아앗<emoji=heart04> 아아아아아아아아아아아아아아아아아아아아아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "のたうつみたいに私の膣内で、彼のおち○ちんが暴れまわる。射精されるたびにその感触がおへその裏へ伝わる。"
translation = "몸부림치듯 나의 질 안에서 그의 자지가 날뛴다. 사정될 때마다 그 감촉이 배꼽 뒤편으로 전해진다."

[[dialogue]]
speaker = "リノ"
original = "「ふぅうっ──んんっ、んんぅうっ──ふぅう～っ……あ、ぁああ、ぁぁあーっ……<emoji=heart04>」"
translation = "「후우우윽── 응응윽, 응응으우윽── 후우우~윽…… 아, 아아아, 아아아-앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「す、すごい……量っ……出て、る、ぅっ……あ、ぁあ、ぁああーっ……<emoji=heart04>」"
translation = "「워, 엄청난…… 양…… 나오고, 있어, 어…… 아, 아아, 아아아-앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "幾度も幾度も、彼のおち○ちんは私の中で跳ねて、跳ねて、跳ねて。"
translation = "몇 번이고 몇 번이고, 그의 자지는 내 안에서 튀어 오르고, 튀어 오르고, 튀어 올랐다."

[[dialogue]]
speaker = "unk"
original = "長い時間を経てようやく、収まり──"
translation = "오랜 시간이 흐른 뒤에야 겨우 진정되어──"

[[dialogue]]
speaker = "リノ"
original = "「はぁああ、あ、ああぁっ……ふぅうっ……<emoji=heart04>\u3000はぁあーっ……ふぅうーっ……<emoji=heart04>」"
translation = "「하아아아, 아, 아아아앗…… 후우우윽……<emoji=heart04> 하아아-앗…… 후우우-윽……<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
original = "「満足させられたかな……」"
translation = "「만족시켜 준 걸까……」"

[[dialogue]]
speaker = "リノ"
original = "「き、気持ちっ……良かった、ですっ……はぁ、ふぅっ……はぁあっ……んんぅっ……<emoji=heart04>」"
translation = "「기, 기분…… 좋았, 어요오…… 하아, 후우윽…… 하아앗…… 응응윽……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
original = "「はぁあっ……ふぅうっ……魔王、様……<emoji=heart04>\u3000ぎゅって、だ、抱きしめて……ください……<emoji=heart04>」"
translation = "「하아앗…… 후우우윽…… 마왕, 님……<emoji=heart04> 꼬옥, 아, 안아…… 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全力で乱暴なほどにつながった後の、優しいハグが心地いい。"
translation = "온 힘을 다해 난폭할 정도로 이어진 뒤의 상냥한 포옹이 기분 좋다."

[[dialogue]]
speaker = "unk"
original = "私はうっとりと、その温かい感触に目を細めながら余韻を味わっていた。"
translation = "나는 황홀하게 그 따뜻한 감촉에 눈을 가늘게 뜨며 여운을 즐기고 있었다."

[[dialogue]]
speaker = "リノ"
original = "「（最後まで、しちゃったわ……息子のそっくりさん、なのに……）」"
translation = "「(끝까지, 해버렸네…… 아들과 판박이인 사람인데……)」"

[[dialogue]]
speaker = "リノ"
original = "「（並行世界の、記憶のカケラが見せた夢……現実の『緋宮リノ』の世界とは何の関係もない、世界だから……）」"
translation = "「(평행세계의, 기억의 파편이 보여준 꿈…… 현실의 『히노미야 리노』의 세계와는 아무런 관계도 없는, 세계니까……)」"

[[dialogue]]
speaker = "unk"
original = "頭ではわかっている。これは気まぐれに見た夢に過ぎない。"
translation = "머리로는 알고 있다. 이건 변덕스럽게 꾼 꿈에 불과하다."

[[dialogue]]
speaker = "unk"
original = "だけど……どこか遠くの異なる世界線では、私とクロトが恋人になるというエピソードは確かに存在しているらしい。"
translation = "하지만…… 어딘가 먼 다른 세계선에서는, 나와 쿠로토가 연인이 된다는 에피소드가 확실히 존재하는 모양이다."

[[dialogue]]
speaker = "リノ"
original = "「（こ、困るわよぉ……こんな、記憶ぅ……）」"
translation = "「(고, 곤란하다구우…… 이런, 기억으으윽……)」"

[[dialogue]]
speaker = "unk"
original = "この観測から目覚めた後、息子の顔をしばらくまともに見られそうにないな……彼の胸に抱かれながら、そう思うのだった。"
translation = "이 관측에서 깨어난 뒤 아들의 얼굴을 당분간 똑바로 쳐다보지 못할 것 같네…… 그의 품에 안긴 채 그렇게 생각하는 것이었다."

