[[dialogue]]
speaker = "unk"
original = "第２話,ゲシュペンス島とモンスター娘,P"
translation = "제2화, 게슈펜스 섬과 몬스터 아가씨, P"

[[dialogue]]
speaker = "unk"
original = "明らかに学園生ではない女性が、花火を打ち上げていたという現場に到着した。"
translation = "분명 학원생이 아닌 여성이 불꽃을 쏘아 올리고 있었다는 현장에 도착했다."

[[dialogue]]
speaker = "unk"
original = "しかし、その女性は既に現場を去ってしまったとのことだった。"
translation = "하지만 그 여성은 이미 현장을 떠난 뒤였다."

[[dialogue]]
speaker = "unk"
original = "聞き込みから得た情報によると、女性は学園外に出て行ったらしく、急いでその後を追う。"
translation = "탐문을 통해 얻은 정보에 따르면 여성은 학원 밖으로 나간 듯하여 서둘러 그 뒤를 쫓는다."

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「マムさん、ずっと気になってたの！\u3000この大きな道に列を作って走ってるアレ、何か教えて欲しいの！」"
translation = "「마무 씨, 계속 궁금했던 거야! 이 큰 길에 줄을 지어 달리고 있는 저거, 뭔지 가르쳐줬으면 하는 거야!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あれは車よ。確かにゲシュペンス島では見かけなかったし、あそこでは必要ないものかもしれないわね」"
translation = "「저건 자동차란다. 확실히 게슈펜스 섬에서는 못 봤을 테고, 거기선 필요 없는 물건일지도 모르겠네」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「クルマ娘……初めて見る『モンスター娘』なの……」"
translation = "「자동차 아가씨…… 처음 보는 『몬스터 아가씨』인 거야……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「あれはモンスター娘ではなくて、ただの乗り物よ。よく見てみなさい、中にヒトが乗っているでしょう？」"
translation = "「저건 몬스터 아가씨가 아니라 그냥 탈것이란다. 잘 보렴, 안에 사람이 타고 있지?」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「わわ、本当なの！」"
translation = "「와와, 정말인 거야!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ゲシュペンス島ではルルゥさんのようなヒトたちのことを、モンスター娘、と呼ぶのですか？」"
translation = "「게슈펜스 섬에서는 루루 씨 같은 분들을 몬스터 아가씨라고 부르나요?」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「そうなの。ルルゥはカーバンクル娘だけど、島には他にもいろんなモンスター娘がいるの」"
translation = "「그런 거야. 루루는 카벙클 아가씨지만, 섬에는 그 밖에도 여러 몬스터 아가씨가 있는 거야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私たちにとって『モンスター』と言えば、リクリエの生み出す怪物の事だから、フィオナが引っ掛かるのも無理ないわね」"
translation = "「우리에게 『몬스터』라고 하면 리크리에가 만들어내는 괴물을 뜻하니까, 피오나가 의아해하는 것도 무리는 아니지」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「けれどゲシュペンス島のモンスター娘は、それとは全くの別物だから安心しなさい」"
translation = "「하지만 게슈펜스 섬의 몬스터 아가씨는 그것과는 전혀 별개의 것이니 안심하렴」"

[[dialogue]]
speaker = "unk"
original = "他にはどんな娘がいるの？"
translation = "다른 애들은 누가 있어?"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「オーク娘やスライム娘。ペガサス娘にミノタウロス娘。いろんな子がいる、なの」"
translation = "「오크 아가씨나 슬라임 아가씨. 페가수스 아가씨에 미노타우로스 아가씨. 여러 아이가 있는 거야」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「私と同じ竜族のモンスター娘もいたわね」"
translation = "「나와 같은 용족 몬스터 아가씨도 있었지」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「ふふふっ♪\u3000実はルルゥもドラゴンに変身できるの！\u3000カーバンクルドラゴンなの♪」"
translation = "「후후후♪ 사실 루루도 드래곤으로 변신할 수 있는 거야! 카벙클 드래곤인 거야♪」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「それは知らなかったわね。そんな力を持っているのなら、是非見せて欲しいわ」"
translation = "「그건 몰랐구나. 그런 힘을 가지고 있다면 꼭 보고 싶네」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「んん……残念だけど、ここではその力は使えないみたい、なの」"
translation = "「으음…… 아쉽지만 여기서는 그 힘을 쓸 수 없는 것 같은 거야」"

[[dialogue]]
speaker = "unk"
original = "すごい島だな、ゲシュペンス島"
translation = "대단한 섬이네, 게슈펜스 섬"

[[dialogue]]
speaker = "unk"
original = "本当にいろんな種族の娘がいるんだね"
translation = "정말 다양한 종족의 아가씨들이 있구나"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「会長さんたちの学園もすごい場所なの。色んなヒトたちがひとつの場所に集まってるの」"
translation = "「회장님들의 학원도 대단한 곳인 거야. 여러 사람이 한곳에 모여 있는 거야」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「流星市国はこの世界においても特別な場所ではありますが……」"
translation = "「유성시국은 이 세계에서도 특별한 장소이긴 합니다만……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「魔族に天使に人間。集まっている種族の混沌具合で言えば、私たちの学園も負けてはいないかもしれませんね」"
translation = "「마족에 천사에 인간. 모여 있는 종족의 혼란스러움으로 따지면 저희 학원도 지지 않을지도 모르겠네요」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「そんなヒトたちのリーダーの会長さんは、やっぱりすごいヒトなの……！」"
translation = "「그런 사람들의 리더인 회장님은 역시 대단한 사람인 거야……!」"

[[dialogue]]
speaker = "unk"
original = "耐えろ、俺！"
translation = "버텨라, 나!"

[[dialogue]]
speaker = "unk"
original = "ううっ、その目で見つめられると！"
translation = "으윽, 그 눈으로 쳐다보면!"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ルルゥ、また能力が暴走しているわ」"
translation = "「루루, 또 능력이 폭주하고 있어」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「あっ！\u3000ごめんなさい、またやっちゃったの……」"
translation = "「앗! 미안한 거야, 또 해버린 거야……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ルルゥさんの魅了の力、本当に強力なんですね。密猟者にルルゥさんが狙われる理由も、分かる気がします」"
translation = "「루루 씨의 매료의 힘, 정말 강력하네요. 밀렵꾼들에게 루루 씨가 노려지는 이유도 알 것 같아요」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「そうなの。いつも狙われてて、気が休まる暇が無かった、なの」"
translation = "「그런 거야. 항상 노려지고 있어서 마음 편히 쉴 틈이 없었던 거야」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「でも、ご主人様が島にやってきて、ルルゥを守ってくれるようになったの。だから、今は昔よりも安心なの♪」"
translation = "「하지만 주인님이 섬에 찾아와서 루루를 지켜주게 된 거야. 그래서 지금은 옛날보다 안심인 거야♪」"

[[dialogue]]
speaker = "unk"
original = "ご主人様？"
translation = "주인님?"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「ゲシュペンス島に住んでいる唯一の人間のことよ。彼だけはモンスター娘から信頼と好意を寄せられているわ」"
translation = "「게슈펜스 섬에 살고 있는 유일한 인간을 말한단다. 그만이 몬스터 아가씨들로부터 신뢰와 호의를 받고 있지」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「外から密猟者が襲ってきたり、おかしな事件が起きたりした時は、ご主人様がみんなを導いて解決してくれるの。島で楽しく暮らせるのはご主人様のおかげなの♪」"
translation = "「밖에서 밀렵꾼이 습격해 오거나 이상한 사건이 일어났을 때는 주인님이 모두를 이끌어 해결해 주는 거야. 섬에서 즐겁게 살 수 있는 건 주인님 덕분인 거야♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふっ。ルルゥさんはそのご主人様のことが大好きなんですね」"
translation = "「후훗. 루루 씨는 그 주인님을 정말 좋아하시는군요」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「はいなの♪\u3000とっても優しくて、ルルゥのことを大切に思ってくれてるの」"
translation = "「응인 거야♪ 무척 상냥하고 루루를 소중하게 생각해 주는 거야」"

[[dialogue]]
speaker_original = "ルルゥ"
speaker_translation = "루루"
original = "「ニンゲンだけど、とってもいいニンゲンで……ルルゥはご主人様のことが大好きなの<emoji=heart04>」"
translation = "「인간이지만 무척 좋은 인간이라…… 루루는 주인님이 정말 좋은 거야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少し恥ずかしそうに、けれど隠す様子もなく、ご主人様への好意を口にするルルゥだった。"
translation = "조금 부끄러운 듯, 하지만 숨기는 기색도 없이 주인님에 대한 호의를 입에 담는 루루였다."

[[dialogue]]
speaker = "unk"
original = "その後も、ルルゥからゲシュペンス島のことや、モンスター娘たちのこと、日々起きている不思議な出来事などを聞きながら街を歩く。"
translation = "그 후로도 루루에게 게슈펜스 섬 이야기나 몬스터 아가씨들 이야기, 매일 일어나는 신기한 사건 등을 들으며 거리를 걷는다."

[[dialogue]]
speaker = "unk"
original = "話は尽きることなく盛り上がってはいたのだが、肝心の相手は見つけることが出来ずにいた。"
translation = "이야기는 끝도 없이 이어졌지만, 정작 찾으려던 상대는 발견하지 못하고 있었다."

[[dialogue]]
speaker = "unk"
original = "すると──"
translation = "그러자──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……新しい目撃情報が届いたみたいですね。カフェテリアでそれらしき人物を見た、と」"
translation = "「……새로운 목격 정보가 도착한 모양이네요. 카페테리아에서 그럴싸한 인물을 봤다고요」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「また学園に戻ったのかしら？\u3000随分、あちらこちらをさまよっているようね」"
translation = "「다시 학원으로 돌아간 걸까? 꽤 여기저기를 헤매고 다니는 모양이네」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ともかく行ってみましょう！」"
translation = "「어쨌든 가보죠!」"

