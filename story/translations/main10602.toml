[[dialogue]]
speaker = "unk"
original = "第２話,第２話『ホーリー・ベル』,B"
translation = "제2화, 제2화 『홀리 벨』, B"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「おお！\u3000お主は……ちぇちゅーりえ！」"
translation = "「오오! 네놈은…… 체츄리에!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ツェツィーリエね。それより、なんか不満爆発してるみたいだったけど？」"
translation = "「체칠리에라니까요. 그보다, 왠지 불만이 폭발한 것 같은데?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。余は嘆いておる。すっかり人間界の影響を受け、魔女たちがクリスマスなるものに染まっているのではないかと」"
translation = "「음. 짐은 한탄하고 있노라. 완전히 인간계의 영향을 받아, 마녀들이 크리스마스라는 것에 물들어 버린 것이 아닌가 하고 말이로다.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「なるほど。確かに、人間はみんなクリスマスが好きだよね」"
translation = "「과연. 확실히 인간들은 모두 크리스마스를 좋아하죠.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「１２月２５日は余の誕生日だ。故に魔女にとって……否、生きとし生けるもの全てにとって最も尊ぶべき日である！\u3000そういうことであろう！」"
translation = "「12월 25일은 짐의 생일이로다. 고로 마녀에게 있어…… 아니, 살아있는 모든 만물에게 있어 가장 존중받아야 할 날이니라! 그런 것이 아니겠느냐!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「なるほど……自分の誕生日がクリスマスにかき消されてる気がしてもどかしい、と」"
translation = "「과연…… 자기 생일이 크리스마스에 묻히는 것 같아서 답답하다는 거군요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「でも安心して！\u3000今日はそんなおいたわしいクラウディア様のために、特別なプレゼントを持ってきたんだ♪」"
translation = "「하지만 안심하세요! 오늘은 그런 가여운 클라우디아 님을 위해, 특별한 선물을 가져왔으니까요♪」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「おお、もうプレゼントを！？\u3000ちぇちゅりんこ、お主なかなか見どころがあるではないか」"
translation = "「오오, 벌써 선물을!? 체츄링코, 네놈 제법 기특한 구석이 있구나.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ん～、惜しくないっ。ツェツィーリエだよん」"
translation = "「음~, 아깝네. 체칠리에라니까.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「わかっておる！\u3000それで、どんなプレゼントなのだ？」"
translation = "「알고 있느니라! 그래서, 어떤 선물이냐?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「実はですね、秘密裏に作っていた特別な戦闘服があって……」"
translation = "「사실은요, 비밀리에 만들고 있던 특별한 전투복이 있어서……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ちょ、ちょっと！\u3000どこ行くのさクラウディア様」"
translation = "「자, 잠깐! 어디 가는 거예요, 클라우디아 님.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「お主の戦闘服といえば、あのすぐ溶けて裸になる失敗作だろう。ウェンディが痛い目を見たと言っておったぞ」"
translation = "「네놈의 전투복이라 하면, 그 금방 녹아서 알몸이 되어버리는 실패작이지 않느냐. 웨디가 호되게 당했다고 말했느니라.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余はそんなもの要らん！\u3000倍増させずとも、魔力だってたっぷりあるしな」"
translation = "「짐은 그런 것 필요 없도다! 배가시키지 않아도 마력 따위 듬뿍 있으니까 말이다.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「やだな～、それって超開発初期の試作バトルスーツの時の話じゃん」"
translation = "「에이~, 그건 초개발 초기 시제 배틀 슈트 때 이야기잖아요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「大丈夫大丈夫。今じゃそんなこと起きないし、アタシだってクラウディア様にそんなもの贈らないよん」"
translation = "「괜찮아요, 괜찮아. 지금은 그런 일 안 일어나고, 저도 클라우디아 님께 그런 걸 선물하진 않아.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「本当か……？」"
translation = "「정말이냐……?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そーそー。ま、騙されたと思って着てみなって～♪」"
translation = "「그럼요 그럼요. 뭐, 속는 셈 치고 한번 입어보라니까요~♪」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──おお！？\u3000これは！？」"
translation = "「──오오!? 이것은!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「じゃじゃーん！\u3000これがクラウディア様専用フォーム──『ホーリー・ベル』ってワケ！」"
translation = "「짜잔! 이것이 클라우디아 님 전용 폼── 『홀리 벨』이라는 말씀!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「これは……ほう……ふむ！\u3000悪くない着心地だぞ」"
translation = "「이것은…… 호오…… 흠! 나쁘지 않은 착용감이로다.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「クラウディア様のために造ったんだよん、ひと足早いけどお誕生日プレゼントってことで」"
translation = "「클라우디아 님을 위해 만든 거예용, 조금 이르지만 생일 선물이라 치고.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なんと！\u3000余のためにこんなものを開発しておったとは」"
translation = "「이럴 수가! 짐을 위해 이런 것을 개발하고 있었다니.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「けっこうイケるでしょ」"
translation = "「꽤 괜찮죠?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。このロッドも特別製だな。先端にベルがついておる」"
translation = "「음. 이 로드도 특별제구나. 끝에 종이 달려 있도다.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ふふん。それは魔力を使ってジングルベルを奏でることができる優れモノなのさ」"
translation = "「후훗. 그건 마력을 사용해서 징글벨을 연주할 수 있는 우수한 물건이라구요.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「どれどれ……おお、本当だ！」"
translation = "「어디 어디…… 오오, 정말이로다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふんふんふーん♪\u3000ふんふんふーん♪\u3000ふんふんふーんふふーん♪」"
translation = "「흠흠흠~♪ 흠흠흠~♪ 흠흠흠~ 흠흠~♪」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──って違う！\u3000これではすっかり余までクリスマスに染まっておるようではないか！」"
translation = "「──가 아니로다! 이래서는 완전히 짐까지 크리스마스에 물든 것 같지 않느냐!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「まあまあ。愉快なそれは他にも機能が満載なのさ。ホーリー・ベル専用のパーツを取りつけることで、ね」"
translation = "「자자. 유쾌한 그것은 그 밖에도 기능이 만재하답니다. 홀리 벨 전용 파츠를 장착함으로써 말이죠.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「たとえば好きなところに雪を降らせたり、空飛ぶソリを出現させたり……」"
translation = "「예를 들면 원하는 곳에 눈을 내리게 하거나, 하늘을 나는 썰매를 출현시키거나……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほほー！\u3000それは実に楽しそうだの。ちぇちりーえ、お主の発明も見上げたものではないか！」"
translation = "「호호오! 그것 참 즐거워 보이는구나. 체칠리에, 네놈의 발명도 제법 훌륭하지 않느냐!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ちょっと惜しい！\u3000でもツェツィーリエね」"
translation = "「조금 아까워! 그래도 체칠리에예요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「これはあの新星、流星学園からの技術提供を受けて開発した戦闘服でね。アタシの自信作なのだよ！」"
translation = "「이건 그 신성, 유성학원으로부터 기술 제공을 받아 개발한 전투복이라서요. 제 자신작이라구요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「光の魔力をふんだんに利用してるから、クラウディア様にしか扱えない一品だったりするんだよね～」"
translation = "「빛의 마력을 아낌없이 이용하고 있으니까, 클라우디아 님만이 다룰 수 있는 일품이기도 하죠~」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふむふむ！\u3000確かにこれは素敵なプレゼントであるぞ！」"
translation = "「흠흠! 확실히 이것은 멋진 선물이로다!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「でしょ！？\u3000ついついやりすぎて、ちょいと予算はかさんじゃったんだけど……」"
translation = "「그쵸!? 나도 모르게 너무 공을 들여서 예산이 좀 초과되긴 했지만……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ともかく、これでクラウディア様もクリスマスをめいっぱい楽しめちゃうってコト♪」"
translation = "「어쨌든, 이걸로 클라우디아 님도 크리스마스를 마음껏 즐길 수 있다는 말씀♪」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なるほど……そうか。そういうことか」"
translation = "「과연…… 그런가. 그런 것이었나.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余がこれを着ることによって……クリスマスのイメージを塗り替えればいいというわけだな！？」"
translation = "「짐이 이것을 입음으로써…… 크리스마스의 이미지를 새로 칠하면 된다는 것이로구나!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そうそ……ん？\u3000んん？」"
translation = "「그럼요 그…… 응? 응응?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「となれば、こうしてはいられん。大衆の認識を改める必要がある」"
translation = "「그렇게 된다면 이렇게 있을 수 없도다. 대중의 인식을 고칠 필요가 있느니라.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「１２月２５日は余の誕生日！\u3000それ以外のイベントなど必要ない！\u3000サンタがなんだというのだ！」"
translation = "「12월 25일은 짐의 생일! 그 이외의 이벤트 따위 필요 없도다! 산타가 무엇이란 말이냐!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「いずれすべてのカレンダーに余の誕生日と記載するためにも……クリスマスなど忘却の彼方へ追いやってくれるぞ～～～！！」"
translation = "「머지않아 모든 달력에 짐의 생일이라 기재하기 위해서라도…… 크리스마스 따위 망각의 저편으로 쫓아버려 주겠노라~~~!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「おー、予想外の展開だけど……面白いかも？\u3000クラウディア様がどこまでフォームの性能を引き出してくれるか、データが取り放題だ！」"
translation = "「오ー, 예상 밖의 전개지만…… 재밌을지도? 클라우디아 님이 어디까지 폼의 성능을 끌어내 줄지, 데이터가 아주 쏟아지겠어!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「というわけでクラウディア様、アタシもお供しま～す！」"
translation = "「그런 고로 클라우디아 님, 저도 동행하겠습니당!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「わーっはっはっは！\u3000いいぞ、ついて来ーい！」"
translation = "「와ー하하하! 좋다, 따라오너라!」"

[[dialogue]]
speaker = "unk"
original = "──そうして、クラウディアの野望が産声をあげたのだった。"
translation = "──그렇게 클라우디아의 야망이 첫 울음을 터뜨린 것이었다."

