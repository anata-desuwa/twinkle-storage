[[dialogue]]
speaker = "トワ先生"
original = "「やっぱりそうだね……。『ウェディングフォーム因子（仮）』が反応してる……」"
translation = "「역시 그렇네……. 『웨딩 폼 인자(가칭)』가 반응하고 있어……」"

[[dialogue]]
speaker = "unk"
original = "トワが持つ試験管の中で、光る粒子が漂う。"
translation = "토와가 든 시험관 안에서 빛나는 입자가 감돈다."

[[dialogue]]
speaker = "unk"
original = "その粒子が放つ白い光は、さながら花嫁がまとうウェディングドレスのようだ。"
translation = "그 입자가 뿜어내는 하얀 빛은 흡사 신부가 입는 웨딩드레스 같다."

[[dialogue]]
speaker = "トワ先生"
original = "「戦闘服がウェディングドレスに固定化されてしまう現象は、太陽フレアによる星力の爆発的な増大から始まった」"
translation = "「전투복이 웨딩드레스로 고정되어 버리는 현상은 태양 플레어에 의한 성력의 폭발적인 증대에서 시작되었어.」"

[[dialogue]]
speaker = "トワ先生"
original = "「わたし自身にもその現象が起こって、会長くんと疑似結婚式を挙げることになっちゃって……」"
translation = "「선생님 자신에게도 그 현상이 일어나서 회장군이랑 유사 결혼식을 올리게 되어버렸고……」"

[[dialogue]]
speaker = "トワ先生"
original = "「でもそんな大変な目にあったおかげで、この現象が起きている原因が分かってきた」"
translation = "「하지만 그런 힘든 일을 겪은 덕분에 이 현상이 일어나는 원인을 알게 되었지.」"

[[dialogue]]
speaker = "トワ先生"
original = "「それが──このウェディングフォーム因子（仮）……」"
translation = "「그것이── 이 웨딩 폼 인자(가칭)……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「少々長くて言いづらいね。今後は『ウェディング因子』と呼ぶのはどうだい？」"
translation = "「조금 길어서 말하기 어렵네. 앞으로는 『웨딩 인자』라고 부르는 건 어떨까?」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ、それいいね──」"
translation = "「아, 그거 좋네──」"

[[dialogue]]
speaker = "トワ先生"
original = "「ふえっ、ジュエリーちゃん？\u3000ど、どうしてここに！？」"
translation = "「후에엣, 주얼리 짱? 어, 어떻게 여기에!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「６月といえばジューンブライド、結婚式の季節だ」"
translation = "「6월이라고 하면 준 브라이드, 결혼식의 계절이지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「星力を研究する『星体力学』の専門家であるトワ先生なら、ウェディングフォームの研究のためにここを訪れると思っていたよ」"
translation = "「성력을 연구하는 『성체역학』 전문가인 토와 선생님이라면, 웨딩 폼 연구를 위해 이곳을 찾을 거라고 생각했어.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「明解に換言するならば──私もウェディングフォームに興味があるということだ」"
translation = "「명쾌하게 환언하자면── 나도 웨딩 폼에 관심이 있다는 뜻이다.」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん？\u3000それは言い換えになっていないような……。でも名推理だよ。さすが『名探偵』の選星者だね」"
translation = "「응? 그건 바꿔 말한 게 아닌 것 같은데……. 하지만 명추리야. 역시 『명탐정』 선성자답네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「で、そのウェディング因子というのはいかなるものなのかな？」"
translation = "「그래서 그 웨딩 인자라는 건 어떤 물건이지?」"

[[dialogue]]
speaker = "トワ先生"
original = "「えっと……ジュエリーちゃんはフィオナちゃんやわたしに起きた『ウェディングフォーム事件』のこと、知ってる？」"
translation = "「그게…… 주얼리 짱은 피오나 짱이나 선생님에게 일어났던 『웨딩 폼 사건』에 대해 알고 있어?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「もちろん知っているよ。学園内の出来事には常にアンテナを張っているからね」"
translation = "「물론 알고 있지. 학원 내의 사건에는 항상 안테나를 세우고 있으니까.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「まあ、あの事件に関してはアンテナを張る必要が無いほど広まっている話だけれど」"
translation = "「뭐, 그 사건에 관해서는 안테나를 세울 필요도 없을 정도로 널리 퍼진 이야기지만 말이야.」"

[[dialogue]]
speaker = "トワ先生"
original = "「あぅ、そんなに有名になっちゃってるんだ……いやまぁレポート出したのわたしだけど……」"
translation = "「아우, 그렇게 유명해져 버렸구나…… 아니 뭐 레포트 제출한 건 선생님이지만……」"

[[dialogue]]
speaker = "トワ先生"
original = "「あの事件の後、わたしは研究を続けて、自分のウェディングフォームから因子を抽出することに成功したんだ」"
translation = "「그 사건 이후로 나는 연구를 계속해서 내 웨딩 폼에서 인자를 추출하는 데 성공했어.」"

[[dialogue]]
speaker = "トワ先生"
original = "「この因子は最初のウェディングフォームの発現の時に、流星市国全体に飛び散ってしまったんだけど、それが特定の時期、特定の場所に集まってしまうみたいなの」"
translation = "「이 인자는 첫 웨딩 폼 발현 당시에 유성시국 전체로 흩어져 버렸는데, 그게 특정 시기, 특정 장소에 모여버리는 것 같아.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ということは、今この場所に？」"
translation = "「그렇다는 건 지금 이 장소에?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん。因子がここに集まってきて活性化してるの。ほら、見て……祭壇に近づけば近づくほど光が増してるでしょ？」"
translation = "「응. 인자가 여기에 모여들어서 활성화되고 있어. 자, 봐…… 제단에 가까워지면 가까워질수록 빛이 강해지잖아?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「なるほど、興味深い現象だね……ん？」"
translation = "「과연, 흥미로운 현상이군…… 응?」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ、あれ？\u3000何だか急に因子の力が強く──」"
translation = "「아, 어라? 왠지 갑자기 인자의 힘이 강해──」"

[[dialogue]]
speaker = "トワ先生"
original = "「はわわわわわっ！！？」"
translation = "「하와와와왓!!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ……どうやら新たな事件が幕を開けてしまったようだね」"
translation = "「흠…… 아무래도 새로운 사건이 막을 올린 것 같네.」"

[[dialogue]]
speaker = "unk"
original = "一方その頃、大聖堂では──"
translation = "한편 그 무렵, 대성당에서는──"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ……ジューンブライドなんてどこの誰が思いついたのかしら。おかげであたしは結婚式に呼ばれまくって大忙しよ」"
translation = "「하아…… 준 브라이드 같은 건 대체 누가 생각해낸 건지. 덕분에 난 결혼식에 불려 다니느라 엄청 바쁘다구.」"

[[dialogue]]
speaker = "イレーナ"
original = "「わざわざあたしのこと名指ししてくるカップルもいるし……あーもう、神官やめてやろうかしら」"
translation = "「굳이 날 지명해서 오는 커플들도 있고…… 아 진짜, 신관 때려치워 버릴까.」"

[[dialogue]]
speaker = "イレーナ"
original = "「しかも６月って言ったら……『アレ』が起こるかもしれないのよね……」"
translation = "「게다가 6월이라고 하면…… 『그거』가 일어날지도 모른단 말이지……」"

[[dialogue]]
speaker = "イレーナ"
original = "「まーた節操なしの会長が、新しい女の子を連れて結婚式を挙げにくるのかしら……そしたらあたしがまた神官役として駆り出されて……」"
translation = "「또 절조 없는 회장이 새로운 여자애를 데리고 결혼식 올리러 오는 거 아냐…… 그러면 내가 또 신관 역할로 끌려 나가서……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あーもうっ！\u3000どうして人の幸せばかり見せつけられなきゃいけないのよ！」"
translation = "「아 진짜! 어째서 남의 행복만 지켜봐야 하는 거냐구!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしもウェディングドレス着てみたいし、結婚だって──」"
translation = "「나도 웨딩드레스 입어보고 싶고, 결혼도──」"

[[dialogue]]
speaker = "イレーナ"
original = "「いやいやいや！\u3000何言ってるのあたし！\u3000バッカじゃないの！」"
translation = "「아냐아냐아냐! 무슨 소릴 하는 거야 나! 바보 아냐!」"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イレーナ"
original = "「結婚……ね」"
translation = "「결혼……이라.」"

[[dialogue]]
speaker = "イレーナ"
original = "（結婚するなら素顔を……本当のあたしを相手に見せないといけない）"
translation = "（결혼한다면 맨얼굴을…… 진짜 나를 상대에게 보여줘야만 해.）"

[[dialogue]]
speaker = "イレーナ"
original = "（本当のあたしを好きになってくれる人なんてどこにも……）"
translation = "（진짜 나를 좋아해 줄 사람 같은 건 어디에도……）"

[[dialogue]]
speaker = "イレーナ"
original = "「って、そんなこと考えてる場合じゃなかったわ。ただでさえ神官の仕事があるし、結婚式の説教も考えなきゃいけないし、とにかく忙しいのよ」"
translation = "「아니, 이런 거 생각할 때가 아니었지. 가뜩이나 신관 업무도 있고 결혼식 설교도 생각해야 하고, 아무튼 바쁘다구.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ん？\u3000今、セレスティアが一瞬光ったような……」"
translation = "「응? 지금 셀레스티아가 일순간 빛난 것 같은데……」"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イレーナ"
original = "「すっごく嫌な予感がしてきたわ……。もしかして……もしかして……」"
translation = "「엄청 불길한 예감이 들어……. 설마…… 설마……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あぁああああっ！！！\u3000やっぱりーーーーーーっ！！！！」"
translation = "「아아아아아악!!! 역시나잖아-----!!!」"

[[dialogue]]
speaker = "unk"
original = "下校中、ＤＩＳＣの呼び出し音が鳴る。"
translation = "하교 중, DISC 호출음이 울린다."

[[dialogue]]
speaker = "unk"
original = "もしもし？"
translation = "여보세요?"

[[dialogue]]
speaker = "イレーナ"
original = "『会長さんですか？』"
translation = "『회장님인가요?』"

[[dialogue]]
speaker = "unk"
original = "は、はい……"
translation = "네, 네……."

[[dialogue]]
speaker = "イレーナ"
original = "『今すぐ大聖堂まで来てください』"
translation = "『지금 당장 대성당으로 오세요.』"

[[dialogue]]
speaker = "unk"
original = "えっ？\u3000でも今から帰るところで……"
translation = "엣? 하지만 지금 막 집에 가려던 참이라……."

[[dialogue]]
speaker = "イレーナ"
original = "『いいから四の五の言わずに来なさい！！！』"
translation = "『됐으니까 왈가왈부하지 말고 오라구!!!』"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "あの……ご用件は？"
translation = "저기…… 용건은?"

[[dialogue]]
speaker = "イレーナ"
original = "「……絶対に笑わないでよ？\u3000あと、この事はあたしたちだけの秘密だから……」"
translation = "「……절대로 웃지 마? 그리고 이 일은 우리들만의 비밀이니까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「じゃ……いくわ……」"
translation = "「그럼…… 간다……」"

[[dialogue]]
speaker = "イレーナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "こ、これってもしかして……"
translation = "이, 이건 설마……."

[[dialogue]]
speaker = "イレーナ"
original = "「そうよ！\u3000あたしも花嫁になっちゃったのよ！！！」"
translation = "「그래! 나도 신부가 되어버렸다구!!!」"

