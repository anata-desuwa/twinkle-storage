[[dialogue]]
speaker = "unk"
original = "第２話,いつもと違うお出かけ,P"
translation = "제2화, 평소와 다른 외출, P"

[[dialogue]]
speaker = "unk"
original = "その日、私はクロトと一緒に街へ買い物にやって来ていたのだが――"
translation = "그날 나는 쿠로토와 함께 시내로 쇼핑하러 나왔는데──"

[[dialogue]]
speaker = "unk"
original = "これで必要な物は揃ったかな？"
translation = "이걸로 필요한 건 다 샀나?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「え、ええ。今日はわざわざ付き合ってくれてありがとうね、クロト」"
translation = "「에, 에에. 오늘은 일부러 같이 와줘서 고마워, 쿠로토」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「――こうして２人で出かけるの、久しぶりだって？」"
translation = "「──이렇게 둘이서 외출하는 거, 오랜만이지?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そ、そうね……。なかなか最近タイミングが合わなくて……」"
translation = "「그, 그러네…… 요즘 좀처럼 타이밍이 맞지 않아서……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（本当は、私がクロトと２人で出かけるのをなんとなく避けてしまっていたからなんだけど……）"
translation = "(사실은 내가 쿠로토와 둘이서 외출하는 걸 왠지 모르게 피해버리고 있었기 때문이지만……)"

[[dialogue]]
speaker = "unk"
original = "今日はクロトが積極的に付いて来たいと言い出して、断り切れなかったのだ。"
translation = "오늘은 쿠로토가 적극적으로 따라오겠다고 나서서 거절할 수 없었다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（あれから距離を取ってしまっているのは、さすがにクロトも分かってるわよね……）"
translation = "(그때 이후로 거리를 두고 있다는 건 역시 쿠로토도 알고 있겠지……)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（可愛い息子のはずなのに、こんなわざと冷たくするようなことをして……なんだかすごく自己嫌悪してしまうわ……）"
translation = "(귀여운 아들인데 이렇게 일부러 차갑게 구는 짓을 하다니…… 왠지 모르게 엄청난 자기혐오가 느껴져……)"

[[dialogue]]
speaker = "unk"
original = "私が黙り込んでしまっていると、クロトが口を開く。"
translation = "내가 침묵하고 있자 쿠로토가 입을 연다."

[[dialogue]]
speaker = "unk"
original = "母さん、せっかく出かけたんだし――"
translation = "엄마, 기왕 나왔으니까──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「きゃっ……！？」"
translation = "「꺄악……!?」"

[[dialogue]]
speaker = "unk"
original = "不意に手を握られて、ドキッとしてしまう。"
translation = "느닷없이 손을 잡혀서 가슴이 철렁 내려앉는다."

[[dialogue]]
speaker = "unk"
original = "そのままクロトは私の手を引っ張って、歩き始める。"
translation = "그대로 쿠로토는 내 손을 잡아끌며 걷기 시작한다."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「く、クロト、どこに行くの？」"
translation = "「쿠, 쿠로토, 어디 가는 거야?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「――え？\u3000寄り道？」"
translation = "「──어? 딴길로 새자고?」"

[[dialogue]]
speaker = "unk"
original = "クロトに提案されて立ち寄ったのは、以前寄ったことのあるスイーツカフェだった。"
translation = "쿠로토의 제안으로 들른 곳은 예전에 가본 적이 있는 스위츠 카페였다."

[[dialogue]]
speaker = "unk"
original = "母さん、このアイス美味しいよ"
translation = "엄마, 이 아이스크림 맛있어"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「え、ええ。確かに美味しそうね。お母さんも今度来た時はそのフレーバーを頼んでみようかしら」"
translation = "「에, 에에. 확실히 맛있어 보이네. 엄마도 다음에 오면 그 맛으로 시켜볼까 봐」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「――って、えっ！？\u3000ひと口食べてみるかって？」"
translation = "「──어라, 에!? 한 입 먹어보겠냐고?」"

[[dialogue]]
speaker = "unk"
original = "ほら、口開けて？\u3000あ～ん"
translation = "자, 입 벌려봐. 아~"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ちょ、ちょっと待って！\u3000親子でそんな大胆な……！」"
translation = "「자, 잠깐 기다려! 부모 자식 사이에 그렇게 대담한……!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「へ？\u3000――２人でおやつを食べる時は、違うフレーバーを選んでシェアするのが緋宮家のルールでしょって？」"
translation = "「헤? ──둘이서 간식을 먹을 때는 다른 맛을 골라서 나눠 먹는 게 히노미야 가문의 규칙이잖아, 라고?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そ、それはそうなんだけど……！」"
translation = "「그, 그건 그렇지만……!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（前は普通にできてたことなのに、なんだか今はとてつもなく恥ずかしく感じるわ……！）"
translation = "(전에는 평범하게 하던 일인데 왠지 지금은 엄청나게 부끄럽게 느껴져……!)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（というか、今日のクロト、いつもより積極的じゃない……！？）"
translation = "(그나저나 오늘 쿠로토, 평소보다 적극적이지 않아……!?)"

[[dialogue]]
speaker = "unk"
original = "それからもクロトが提案して、色々な店に寄り道を続けて――"
translation = "그 뒤로도 쿠로토가 제안해서 여러 가게에 들르는 외도를 계속했고──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「く、クロト、そんなに荷物持って、重くない……？」"
translation = "「쿠, 쿠로토, 짐을 그렇게나 많이 들고 무겁지 않아……?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫。この学術書、欲しかったんでしょ？"
translation = "괜찮아. 이 학술서, 갖고 싶어 했잖아?"

[[dialogue]]
speaker = "unk"
original = "私が買ったものを全部持ってくれて、優しく微笑むクロト。"
translation = "내가 산 물건을 전부 들어주며 다정하게 미소 짓는 쿠로토."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（はぅっ……そんなイケメンスマイルを向けるのはダメよ、クロト……！）"
translation = "(하윽…… 그런 꽃미남 미소를 짓는 건 반칙이야, 쿠로토……!)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（私、お母さんなのに、またドキドキしちゃう……！）"
translation = "(나, 엄마인데 또 두근거려버려……!)"

[[dialogue]]
speaker = "unk"
original = "そうして、２人で街を歩いていると――"
translation = "그렇게 둘이서 거리를 걷고 있자──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「おや？\u3000渋谷で会うとは奇遇だな、リノ、少年」"
translation = "「오야? 시부야에서 만나다니 기우로군, 리노, 소년.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「あっ、リコ……！」"
translation = "「앗, 리코……!」"

[[dialogue]]
speaker = "unk"
original = "彼女はリコリンフィア。私とは仕事の繋がりで知り合った、公安委員会所属の友人だ。"
translation = "그녀는 리코린피아. 나와는 일 관계로 알게 된 공안위원회 소속의 친구다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「今日は親子で仲良く買い物か？」"
translation = "「오늘은 부모 자식이 사이좋게 쇼핑인가?」"

[[dialogue]]
speaker = "unk"
original = "はい、そうなんです"
translation = "네, 그렇습니다"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なんだか随分と嬉しそうじゃないか、少年。いいことでもあったのか？」"
translation = "「왠지 상당히 기뻐 보이는데, 소년. 좋은 일이라도 있었나?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――久しぶりにリノと出かけたから？\u3000そうだったのか」"
translation = "「──오랜만에 리노와 외출해서? 그랬던 건가.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（クロト、私と出かけて、そんなに嬉しかったんだ……）"
translation = "(쿠로토, 나와 외출한 게 그렇게 기뻤구나……)"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――ほう、アイスの食べさせ合いっこをした？\u3000ふっ、相変わらず恋人と勘違いされそうなことをするな」"
translation = "「──호오, 아이스크림을 서로 먹여줬다고? 훗, 여전히 연인으로 착각할 만한 짓을 하는군.」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「へぇっ！？\u3000こここっ、恋人！？\u3000私とクロトが？」"
translation = "「헤에!? 고고고, 연인!? 나와 쿠로토가?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ん……？\u3000どうしたんだリノ？\u3000そんな動揺して。お前たち親子が傍から見たらカップルみたいな仲良しムーブをしているのは、今更だろう？」"
translation = "「음……? 왜 그러지 리노? 그렇게 동요하고. 너희 부모 자식이 남들이 보기에 커플 같은 꽁냥거림을 보여주는 건 새삼스럽지 않나?」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「え？\u3000…………そ、そうね」"
translation = "「에? …………그, 그러네」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（今まで何とも思わなかったのに、改めて指摘されるとすごく恥ずかしく感じるわ……！）"
translation = "(지금까지 아무렇지도 않게 생각했는데 다시 지적받으니 엄청 부끄럽게 느껴져……!)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（というか、今日って、ただの買い物だったはずなのに――）"
translation = "(그나저나 오늘, 그냥 쇼핑이었을 텐데──)"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "（振り返ると私、クロトとまるでデートをしていたみたいな……）"
translation = "(되돌아보니 나, 쿠로토와 마치 데이트를 한 것 같은……)"

[[dialogue]]
speaker = "unk"
original = "そう思ったら、顔が猛烈に熱くなって来てしまう。"
translation = "그렇게 생각하니 얼굴이 맹렬하게 뜨거워져 버린다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「……？」"
translation = "「……?」"

[[dialogue]]
speaker = "unk"
original = "怪訝そうな顔でこちらを見つめるリコに、その時の私は気づかなかったのだった――"
translation = "의아한 얼굴로 이쪽을 쳐다보는 리코를 그때의 나는 눈치채지 못했던 것이었다──"

