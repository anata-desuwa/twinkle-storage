[[dialogue]]
speaker = "unk"
original = "第１話,司書さんと夏休み,P"
translation = "제1화, 사서 씨와 여름 휴가, P"

[[dialogue]]
speaker = "unk"
original = "訓練の末、無事に水着戦闘服を使いこなせるようになったルリエルとイクシー。"
translation = "훈련 끝에 무사히 수영복 전투복을 다룰 수 있게 된 루리엘과 익실."

[[dialogue]]
speaker = "unk"
original = "２人の訓練を見届けた後、俺はビーチで出会ったウィステリアさんと一緒にいた。"
translation = "두 사람의 훈련을 지켜본 후, 나는 해변에서 만난 위스테리아 씨와 함께 있었다."

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「いくわよ～……」"
translation = "「간다~……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「えいっ」"
translation = "「에잇」"

[[dialogue]]
speaker = "unk"
original = "それなら俺も──"
translation = "그렇다면 나도――"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「きゃっ。やったわねー……」"
translation = "「꺄앗. 했겠다~……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そーれっ。ふふふ、会長くん、ずぶ濡れね。やったの私だけど♪」"
translation = "「자아~. 후후후, 회장군 흠뻑 젖었네. 내가 한 거지만♪」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「学園の職員なのに、こうして生徒と一緒になってはしゃいじゃって。我ながら浮かれてるわね」"
translation = "「학원 직원인데 이렇게 학생이랑 같이 들떠버리다니. 나도 참 신났네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも仕方ないわよね？\u3000そこに海があって、君がいるんだから、はしゃがないと損じゃない」"
translation = "「하지만 어쩔 수 없잖아? 저기에 바다가 있고 네가 있으니까 신나지 않으면 손해지」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「会長くんも楽しんでくれてる？\u3000……なら良かった。いつもは不運続きだけど、会長くんたちにここで会えたのは幸運ね」"
translation = "「회장군도 즐거워하고 있어? ……그럼 다행이다. 평소엔 불운의 연속이지만 회장군 일행을 여기서 만난 건 행운이네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「１人でバカンスに来た時はちょっと寂しかったんだから。君のおかげでいい夏休みになりそうだわ」"
translation = "「혼자 바캉스 왔을 때는 좀 외로웠거든. 너 덕분에 좋은 여름 휴가가 될 것 같아」"

[[dialogue]]
speaker = "unk"
original = "バカンスなら誘ってくれたら良かったのに"
translation = "바캉스라면 권해주셨으면 좋았을 텐데"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私もそうしたかったんだけど、会長くんは用事があるって聞いたのよ。そしたら出かけた先で会うんだから、わからないものね」"
translation = "「나도 그러고 싶었지만 회장군은 용건이 있다고 들었거든. 그랬더니 나간 곳에서 만나다니 모를 일이네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「……あれ？\u3000会長くんはヘレナさんの頼みで、イクシーさんたちの付き添いをしてたのよね」"
translation = "「……어라? 회장군은 헬레나 씨의 부탁으로 익실 씨 일행의 시중을 들고 있었던 거지」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私も、夏休みを取りたいって言ったら、ヘレナさんにこのビーチを薦められて……」"
translation = "「나도 여름 휴가를 내고 싶다고 했더니 헬레나 씨가 이 해변을 추천해주셔서……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「は～……やられた。会長くんたちと会ったのは、幸運でもなんでもなくて、ヘレナさんが仕組んだことじゃない」"
translation = "「하~…… 당했다. 회장군 일행과 만난 건 행운도 뭐도 아니고 헬레나 씨가 꾸민 일이잖아」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「まぁ、結果的に会長くんと一緒に遊べたんだから、そこは感謝しておきましょう」"
translation = "「뭐, 결과적으로 회장군이랑 같이 놀 수 있었으니까 그 점은 감사해두자」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ん？\u3000どうしたの？\u3000複雑そうな表情しちゃって」"
translation = "「응? 왜 그래? 복잡한 표정을 짓고」"

[[dialogue]]
speaker = "unk"
original = "１人の時、男の人に声をかけられませんでした？"
translation = "혼자 있을 때 남자들이 말 걸지 않았나요?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あら、もしかして妬いてるの？\u3000ふふ、かわいいところあるじゃない」"
translation = "「어머, 혹시 질투하는 거야? 후후, 귀여운 구석이 있네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そうね、確かに声をかけられたわ。会長くんと出会う前は、出会いを求めてても全然機会がなかったのに、皮肉なものね」"
translation = "「그래, 확실히 말을 걸어오긴 했어. 회장군과 만나기 전에는 만남을 원해도 전혀 기회가 없었는데 아이러니하네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも今は会長くんがいるから、他の男なんて眼中にないの。ナンパなんて無視してやったわ」"
translation = "「하지만 지금은 회장군이 있으니까 다른 남자 따윈 안중에도 없어. 헌팅 같은 건 무시해버렸지」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「不運のおかげで会長くんと出会えたとしたら……ふふ、この厄介な魔導書もちょっとくらいは役に立ったのかもね」"
translation = "「불운 덕분에 회장군과 만날 수 있었다면…… 후후, 이 성가신 마도서도 조금쯤은 도움이 된 걸지도 모르겠네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「さ、せっかく海に来てるんだから、もっと遊びましょ──」"
translation = "「자, 기왕 바다에 왔으니까 좀 더 놀자――」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひゃっ！？\u3000ごめんなさい、またこけちゃった……」"
translation = "「히얏!? 미안해, 또 넘어졌어……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「会長くんに助けてもらったの、何度目かしら。被害に遭ってる会長くんには悪いけど、こうして受け止めてくれる人がいて嬉しいわ」"
translation = "「회장군이 도와준 게 몇 번째더라. 피해를 보고 있는 회장군에겐 미안하지만 이렇게 받아주는 사람이 있어서 기뻐」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「顔を赤くしちゃってどうしたの、会長くん？\u3000……胸が当たってる？」"
translation = "「얼굴을 붉히고 왜 그래, 회장군? ……가슴이 닿고 있다고?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そんなの今さらでしょ。受け止めてくれた役得ってやつよ。そんなに気になるなら、こっちから当ててあげる<emoji=heart04>」"
translation = "「그런 건 이제 와서 새삼스럽잖아. 받아준 사람의 특권 같은 거야. 그렇게 신경 쓰인다면 이쪽에서 더 밀착시켜 줄게<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「えいっ<emoji=heart04>\u3000えいっ<emoji=heart04>\u3000ふふふ♪\u3000いつもはちょっと鈍感な会長くんだけど、さすがに顔が真っ赤ね」"
translation = "「에잇<emoji=heart04> 에잇<emoji=heart04> 후후후♪ 평소엔 조금 둔감한 회장군이지만, 역시 얼굴이 새빨갛네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「水着が思ったより大胆になっちゃったけど、会長くんを照れさせられたなら悪くないかしら」"
translation = "「수영복이 생각보다 대담해져 버렸지만, 회장군을 부끄럽게 만들 수 있었다면 나쁘지 않으려나」"

[[dialogue]]
speaker = "unk"
original = "普通の水着は買ってなかったんですか？"
translation = "평범한 수영복은 안 샀던 건가요?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あー……買ったんだけど、波に流されちゃって……。それなりの値段したのに。もったいない……」"
translation = "「아~…… 사긴 했는데, 파도에 휩쓸려 가버려서……. 나름 가격이 나가는 거였는데. 아까워라……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「でも戦闘服をいじって水着にできたし、今回ばかりは星騎士で助かったわ」"
translation = "「하지만 전투복을 개조해서 수영복으로 만들 수 있었고, 이번만큼은 성기사라서 다행이었어」"

[[dialogue]]
speaker = "unk"
original = "ということは今変身を解いたら裸……？"
translation = "그렇다는 건 지금 변신을 풀면 알몸……?"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「！？\u3000そう言われてみれば確かに……」"
translation = "「!? 그러고 보니 확실히……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "（そんなこと言われたら、裸で抱き合ってるみたいじゃない……うぅ、意識しちゃう……）"
translation = "(그런 말을 들으니, 알몸으로 껴안고 있는 것 같잖아…… 으으, 의식하게 돼……)"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「で、でも大人なんだしね……？\u3000学生にはできない、セクシーなところもアピールしないとね？」"
translation = "「하, 하지만 어른이니까 말이야……? 학생은 할 수 없는, 섹시한 부분도 어필해야겠지?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ん……」"
translation = "「응……」"

[[dialogue]]
speaker = "unk"
original = "ウィステリアさんの唇がゆっくり近づいてきて──"
translation = "위스테리아 씨의 입술이 천천히 다가오고──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ～！\u3000ウィステリアさんが会長さんとイチャイチャしてます～！」"
translation = "「아~! 위스테리아 씨가 회장님이랑 꽁냥거리고 있어요~!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あひゃあっ！？」"
translation = "「아햣!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ウィステリアさんってばまた会長さんを独り占めして～。ずるいですぅ～」"
translation = "「위스테리아 씨도 참, 또 회장님을 독차지하고~. 치사해요~」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「今、少しアダルティな波動を感じた気がしましたが……」"
translation = "「방금, 조금 어덜트한 파동을 느낀 기분이 듭니다만……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そ、そんなことないわよ。ね、会長くん？」"
translation = "「그, 그럴 리 없잖아. 그치, 회장군?」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「そこで黙らないでよ！？」"
translation = "「거기서 침묵하지 말라고!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「やっぱりイチャイチャしてたんじゃないですかー」"
translation = "「역시 꽁냥거리고 있었던 거잖아요~」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「青い海！\u3000晴れ渡る空！\u3000開放的な気分になるのも必然ですね！」"
translation = "「푸른 바다! 맑게 갠 하늘! 개방적인 기분이 되는 것도 필연적이네요!」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「賑やかになってきたわね……じゃあ４人で遊びましょうか」"
translation = "「시끌벅적해졌네…… 그럼 4명이서 놀까」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「だから──」"
translation = "「그러니까──」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「海でキスするのはまた後で……ね？」"
translation = "「바다에서 키스하는 건 나중에 다시…… 알았지?」"

