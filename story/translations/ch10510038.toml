[[dialogue]]
speaker = "unk"
original = "それはクリスマスイブのことだった──"
translation = "그것은 크리스마스 이브의 일이었다──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──頼もう！」"
translation = "「──부탁하노라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ、苦しゅうないぞ魔王。今日はクリスマスイブ──人間たちは前夜祭からお祝いをするんだったな」"
translation = "「음, 어렵게 생각지 말거라 마왕. 오늘은 크리스마스 이브── 인간들은 전야제부터 축하를 한다고 들었느니라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。クラウディアも、いよいよ明日が誕生日だね」"
translation = "「아아. 클라우디아도 드디어 내일이 생일이네」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そうだ。つまり今日は余のバースデーイブでもある。だが、それより──今夜はぜひ余にクリスマスの楽しみ方を教えてくれ」"
translation = "「그렇다. 즉 오늘은 여의 버스데이 이브이기도 하지. 하지만 그것보다── 오늘 밤은 부디 여에게 크리스마스를 즐기는 법을 가르쳐다오」"

[[dialogue]]
speaker = "unk"
original = "クラウディアは、人間界のクリスマスを体験したくてうちへやってきていた。"
translation = "클라우디아는 인간계의 크리스마스를 체험하고 싶어서 우리 집으로 찾아와 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「と言っても、サンタとかイルミネーションについては前に話したと思うけど……」"
translation = "「그렇다고 해도 산타나 일루미네이션에 대해서는 전에 이야기했다고 생각하는데……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ああ、もちろんそのへんはいい。だが、クリスマスイブの夜には決まってやることがあるのだろう？\u3000それを教えてほしいのだ」"
translation = "「아아, 물론 그 정도는 알고 있다. 하지만 크리스마스 이브 밤에는 반드시 하는 일이 있지 않느냐? 그것을 가르쳐주길 원하느니라」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。なんでも教える──」"
translation = "「알았어. 뭐든지 가르쳐줄게──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「『性の６時間』とはなんなのだ？」"
translation = "「『성의 6시간』이란 무엇이냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……え？」"
translation = "「……에?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だから、性の６時間だ。ネビュラの端末からクリスマスについて調べていたら──いたるところでそんな単語を見かけたぞ」"
translation = "「그러니까, 성의 6시간이다. 네뷸라의 단말기로 크리스마스에 대해 조사했더니── 도처에서 그런 단어를 보았느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「クリスマスの６時間に、人の子は一体何をするのだ！？\u3000さあ、教えてくれ魔王！」"
translation = "「크리스마스의 6시간에 인간의 아이는 대체 무엇을 하는 것이냐!? 자, 가르쳐다오 마왕!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ダメだ。クラウディアにそんな余計な知識を吹き込むわけにはいかない」"
translation = "「……안 돼. 클라우디아에게 그런 쓸데없는 지식을 불어넣을 수는 없어」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そんなのってないぞ、魔王！\u3000なんでも教えてくれると言ったではないか！」"
translation = "「너무하구나, 마왕! 뭐든지 가르쳐주겠다고 하지 않았느냐!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だって……」"
translation = "「그게……」"

[[dialogue]]
speaker = "unk"
original = "わざわざイブの夜に来て、何をお願いしてくるのかと思ったら……。"
translation = "일부러 이브 밤에 와서 무엇을 부탁하나 했더니……."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余は知りたいのだ！\u3000人間界のことも、クリスマスのことも、性の６時間のことも！\u3000魔王～頼むぞ～！」"
translation = "「여는 알고 싶느니라! 인간계의 일도, 크리스마스의 일도, 성의 6시간의 일도! 마왕~ 부탁하노라~!」"

[[dialogue]]
speaker = "unk"
original = "それからもクラウディアはしつこく粘り続け、しまいにこちらの根気が折れてしまった。"
translation = "그 후로도 클라우디아는 끈질기게 매달렸고, 결국 이쪽의 끈기가 꺾이고 말았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……わかった」"
translation = "「……알았어」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「おお！\u3000よいのか！？」"
translation = "「오오! 괜찮은 것이냐!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、覚悟してね」"
translation = "「대신 각오해」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「……え？\u3000お、お主、なんか急に目が怖くなってないか……？」"
translation = "「……에? 너, 너, 어쩐지 갑자기 눈이 무서워지지 않았느냐……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「徹底的に教えてあげるよ、クラウディア──６時間は放さないから」"
translation = "「철저하게 가르쳐줄게, 클라우디아── 6시간 동안 놓아주지 않을 거니까」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ひ──ひあっ！？\u3000な、なんなのだこれは……い、いきなり余のことを脱がせて──んっ……<emoji=heart04>\u3000こ、こんな体勢に……<emoji=heart04>」"
translation = "「히── 히앗!? 뭐, 뭐냐 이건…… 갑, 갑자기 여를 벗기고── 응……<emoji=heart04> 이, 이런 자세로……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「これでは、まるで、男女のまぐわい──んっ……<emoji=heart04>\u3000で、でも……クリスマスイブには、違った意味を持つのか……？\u3000っ<emoji=heart04>」"
translation = "「이래서는 마치 남녀의 정교── 응……<emoji=heart04> 하, 하지만…… 크리스마스 이브에는 다른 의미를 갖는 것이냐……? 윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ただのセックスだけど」"
translation = "「그냥 섹스지만」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「やっぱりそうではないかっ……！」"
translation = "「역시 그런 것이 아니더냐……!」"

[[dialogue]]
speaker = "unk"
original = "そこで俺は改めて、性の６時間と呼ばれるスラングの由来を教えた。"
translation = "거기서 나는 다시 한번, 성의 6시간이라 불리는 슬랭의 유래를 가르쳐주었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「聖夜の前夜から明け方にかけて、人がもっともまぐわう時間帯である──と……？」"
translation = "「성야의 전야부터 새벽녘에 걸쳐, 사람이 가장 많이 정교를 나누는 시간대이다── 라고……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そ、そんな意味とは知らなんだぞ──またてっきり、プレゼント交換のような楽しいイベントが待っているものかと……」"
translation = "「그, 그런 의미인 줄은 몰랐느니라── 또 틀림없이 선물 교환 같은 즐거운 이벤트가 기다리고 있을 줄 알았거늘……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「楽しいには違いないよ。ね……クラウディア」"
translation = "「즐거운 건 틀림없어. 그치…… 클라우디아」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──んんんんんんんぅぅぅぅっっっ………………<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「──으으으으으으으윽………………<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの狭い蜜壺をかき分けてペニスを突き入れると、甲高い声が部屋に響いた。"
translation = "클라우디아의 좁은 꿀단지를 헤치며 페니스를 찔러넣자, 날카로운 목소리가 방 안에 울려 퍼졌다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁぁっ──んっ……はぁっ……<emoji=heart04>\u3000す、すっぽり入ってしまった──ぁっ……余のおま○こも、すっかり魔王の形を覚えてしまっておる……んぅっ<emoji=heart04>」"
translation = "「아앗── 응…… 하아……<emoji=heart04> 쏘, 쏙 들어가 버렸느니라── 아…… 여의 보지도 완전히 마왕의 형태를 기억해 버렸어…… 으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ひぅっ、んっ、んんぅっ<emoji=heart04>\u3000お主も、あんなおとなしい顔をしていたのに──っ、もうこんなにち○ぽをいきり立てて……ぁっ、んんっ……！」"
translation = "「히윽, 응, 으응<emoji=heart04> 너도 그런 얌전한 얼굴을 하고 있었으면서── 윽, 벌써 이렇게 자지를 바짝 세우고…… 아, 으응……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「クラウディアだって、じんわり濡れてきてたよ」"
translation = "「클라우디아도 조금씩 젖어있었어」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余、余はそんなことないぞっ……<emoji=heart04>\u3000性の６時間の意味を聞いて、少し期待してしまったとか──そんなことは、ないんだからな……っ<emoji=heart04>」"
translation = "「여, 여는 그렇지 않느니라……<emoji=heart04> 성의 6시간의 의미를 듣고 조금 기대해 버렸다거나── 그런 일은 없으니까 말이다…… 윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁっ、んっ、んんっ……<emoji=heart04>\u3000はぁ、はぁ……っ、これでは──まるで、余が最初からそのつもりで来たかのようではないか……っ……んっ……<emoji=heart04>」"
translation = "「아, 응, 으응……<emoji=heart04> 하아, 하아…… 윽, 이래서는── 마치 여가 처음부터 그럴 생각으로 온 것 같지 않느냐…… 윽…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの両手首を掴み、そのままゆっくりと腰を打ちつけていく。"
translation = "클라우디아의 양 손목을 붙잡고 그대로 천천히 허리를 부딪쳐 간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「痛かったら言ってね……」"
translation = "「아프면 말해……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「痛くはないが──んぁぅっ！\u3000ら、乱暴だぞ──んっ！\u3000余の体を──んぁっ、このように、扱う、とは──ぁっ……<emoji=heart04>\u3000んっ、んんっ<emoji=heart04>」"
translation = "「아프지는 않다만── 응아윽! 거, 거칠구나── 응! 여의 몸을── 응아! 이와 같이 다루다니── 아……<emoji=heart04> 응, 으응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふぅっ……ふぅっ……<emoji=heart04>\u3000余は──ぁっ、ネビュラ総帥──光の魔女、クラウディアだと、いうのに……ぁっ、んんぁっ！\u3000はぁ、はぁっ……<emoji=heart04>」"
translation = "「후우…… 후우……<emoji=heart04> 여는── 아, 네뷸라 총수── 빛의 마녀 클라우디아라고 하거늘…… 아, 응아앗! 하아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの小さな体は軽く、優しく引っ張るだけでも十分にコントロールすることができた。"
translation = "클라우디아의 작은 몸은 가벼워서 살짝 끌어당기는 것만으로도 충분히 컨트롤할 수 있었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なぜ──ぁっ、人は、イブの夜に、まぐわいたがるのだ……？\u3000ふぅ──んっ、ぁっ……はぁ、はぁっ……んんっ──っ……<emoji=heart04>」"
translation = "「어째서── 아, 사람은 이브 밤에 정교를 나누고 싶어 하는 것이냐……? 후우── 응, 아…… 하아, 하아…… 으응── 윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……恋人同士の特別な日だから」"
translation = "「……연인들끼리의 특별한 날이니까」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今夜、クラウディアが部屋に来たときから……愛し合いたいって、俺は自然に思ってたよ」"
translation = "「오늘 밤 클라우디아가 방에 왔을 때부터…… 사랑을 나누고 싶다고 나는 자연스럽게 생각했어」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んぅぅぅぅ──っ……<emoji=heart04>\u3000なるほどな……ぁっ、んんぁっ、あんっ<emoji=heart04>」"
translation = "「으으으으으── 윽……<emoji=heart04> 과연 그렇구나…… 아, 응아, 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余も──んっ……いつだとて、お主と交わるのは……大歓迎だ──んぁっ、はぁっ……だ、だが……」"
translation = "「여도── 응…… 언제든 너와 교합하는 것은…… 대환영이니라── 응아, 하아…… 하, 하지만……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「この姿勢だと──ぁっ、お主の顔が見えなくて……んっ<emoji=heart04>\u3000不安だ──余ばっかり、<ruby>辱<rt>はずかし</rt></ruby>められているようではないか……ぁっ……んんっ──<emoji=heart04>」"
translation = "「이 자세로는── 아, 너의 얼굴이 보이지 않아서…… 응<emoji=heart04> 불안하구나── 여만 치욕을 당하고 있는 것 같지 않느냐…… 아…… 으응──<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫──俺からは全部、見えてるから」"
translation = "「괜찮아── 내 쪽에서는 전부 보이니까」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「それが嫌だというのだ──んぁぁっ<emoji=heart04>\u3000お主ばっかり──ぁっ、んぁっ、ふぅぅっっ……<emoji=heart04>\u3000んぁっ、はぁっ、んぁぁっ──んぅっ……！」"
translation = "「그게 싫다는 것이니라── 응아아앗<emoji=heart04> 너만── 아, 응아, 후우우우……<emoji=heart04> 응아, 하아, 응아아── 으응……!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの小さなお尻が愛らしく何度でも揺れる。"
translation = "클라우디아의 작은 엉덩이가 사랑스럽게 몇 번이고 흔들린다."

[[dialogue]]
speaker = "unk"
original = "それでいてつややかな長髪からはしっかりと女の香りが立ち昇り、嬌声と相まって雄の本能がくすぐられる。"
translation = "그러면서도 윤기 나는 긴 머리카락에서는 확실히 여자의 향기가 피어오르고, 교성과 어우러져 수컷의 본능을 자극한다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁっぁっ……んぁぁっ！\u3000こ、これ──深いところまで、当たる──っ……<emoji=heart04>\u3000お主の、大きいち○ぽが──ぁっ、んぁぁっ……！」"
translation = "「아아…… 응아아! 이, 이거── 깊은 곳까지 닿느니라── 윽……<emoji=heart04> 너의 커다란 자지가── 아, 응아아……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……しっかり奥で繋がろうね」"
translation = "「아아…… 확실히 안쪽에서 이어지자」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぅぅぅぅぅ────っっ……<emoji=heart04>\u3000だ、だめだ、そこばっかりぐりぐりするのは──ぁっ、んぁぁっ……んぅぅっ<emoji=heart04>\u3000や、やめるのだ……ぁっ……！」"
translation = "「하으으으으으────윽……<emoji=heart04> 아, 안 된다, 그곳만 비벼대는 것은── 아, 응아아…… 으으윽<emoji=heart04> 그, 그만두거라…… 아……!」"

[[dialogue]]
speaker = "unk"
original = "膣奥の深いところを突かれ、身体を弓なりに反らして喘ぐクラウディア。"
translation = "질 깊은 곳을 찔려 몸을 활처럼 휘며 헐떡이는 클라우디아."

[[dialogue]]
speaker = "unk"
original = "あの我がままなお姫様が、今は自分の肉棒を前にこんな痴態をさらしているという事実が、何より興奮を煽る。"
translation = "그 제멋대로인 공주님이 지금은 자신의 육봉 앞에서 이런 치태를 보이고 있다는 사실이 무엇보다 흥분을 부추긴다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もっと突くよ、クラウディア──」"
translation = "「더 찌를게, 클라우디아──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んぁぁっ──<emoji=heart04>\u3000よ、よせと言っておろう──んんぅぅっ<emoji=heart04>\u3000そんなに激しくされては──ぁっ！\u3000頭が、真っ白になる──ひぅぅっ<emoji=heart04>」"
translation = "「응아아──<emoji=heart04> 그, 그만두라고 하지 않았느냐── 으으으윽<emoji=heart04> 그렇게 격하게 해서는── 아! 머릿속이 하얘지느니라── 히으으윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁっぁっ、んぁっ、だめだだめだ──ぁっ！\u3000硬いち○ぽで、おま○この奥、ほじくられると──ぉっ……んぉっ、おかしくなりそうなのだ……っ<emoji=heart04>」"
translation = "「아아, 응아, 안 돼 안 돼── 아! 딱딱한 자지로 보지 안쪽을 후벼 파이면── 오윽…… 응오, 이상해질 것 같느니라…… 윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやらクラウディアは奥を責められるのがお気に入りらしく、深くまで挿入するたび一段と喘ぎが大きくなった。"
translation = "아무래도 클라우디아는 안쪽을 공략당하는 것이 마음에 드는 모양인지, 깊숙이 삽입할 때마다 한층 더 신음이 커졌다."

[[dialogue]]
speaker = "unk"
original = "こちらはというといい気になって、さらに彼女の感じるスポットを責め立てる。"
translation = "이쪽은 기세등등해져서 더욱 그녀가 느끼는 스폿을 몰아붙인다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁぁぁぁぁ～～～～っっっ…………<emoji=heart04>\u3000んんぅっ、ぁっ、んんぁぁっ！\u3000はぁ、はぁっ──んぁっ、あんっ、んんぁっ！\u3000ふっ、ふぅっ──っ<emoji=heart04>」"
translation = "「아아아아아~~~~윽…………<emoji=heart04> 으응, 아, 응아아! 하아, 하아── 응아, 앙, 응아아! 훗, 후우── 윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「逃げようとしてもダメ──」"
translation = "「도망치려 해도 안 돼──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「～～～～～～～っっっ！\u3000や、やめろ──んぁぁっ……！\u3000き、気持ちよすぎる──っ、これは……ぁっぁっ、んぁぁぁっ……！\u3000ふぅ、ふぅっ──！」"
translation = "「~~~~~~~윽! 그, 그만해── 응아아……! 기, 기분이 너무 좋느니라── 윽, 이건…… 아아, 응아아아……! 후우, 후우──!」"

[[dialogue]]
speaker = "unk"
original = "強すぎる快感から身をよじって逃れようとするも、こちらに腕を掴まれているため逃げ切れないクラウディア。"
translation = "너무 강한 쾌감에 몸을 비틀며 도망치려 하지만, 이쪽에서 팔을 붙잡고 있기 때문에 도망칠 수 없는 클라우디아."

[[dialogue]]
speaker = "unk"
original = "彼女をもっと気持ちよくしてやりたくて、ぐいぐいと亀頭の先を膣奥へ押しつける。"
translation = "그녀를 더 기분 좋게 해주고 싶어서 꾸역꾸역 귀두 끝을 질 안쪽으로 밀어 넣는다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んぁぁぁぁぁぁ～～～～～っっっ…………！\u3000はぁ、はぁ、ふぅぅぅっっ…………！\u3000お、おま○こおかしくなる──んぅぅっっっっ……<emoji=heart04>\u3000ぅっ、ぅぁっ<emoji=heart04>」"
translation = "「응아아아아아~~~~~윽…………! 하아, 하아, 후우우우우…………! 보, 보지 이상해지느니라── 으으으으윽……<emoji=heart04> 윽, 으아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「凶悪なち○ぽが──ずっと余の奥に刺さっておる……っ<emoji=heart04>\u3000へ、へんになる──ぁっ、んぁぁっ、余が──お主のものに、されてしまうぅっ……<emoji=heart04>」"
translation = "「흉악한 자지가── 계속 여의 안쪽에 박혀 있구나…… 윽<emoji=heart04> 이, 이상해져── 아, 응아아, 여가── 너의 것이 되어버리느니라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「っはぁ、はぁっ……！\u3000ちょ、ちょっとは休憩せぬか──んぁぁっ！\u3000ずっと硬いまま──ぁっ、んぅっ、ふぅぅっっ……んぁぁっ……！」"
translation = "「윽하아, 하아……! 조, 조금은 휴식하지 않겠느냐── 응아아! 계속 딱딱한 채로── 아, 으응, 후우우우…… 응아아……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「性の６時間がどういうものか知りたい──って言ったのは、クラウディアだから」"
translation = "「성의 6시간이 어떤 건지 알고 싶다── 고 말한 건 클라우디아니까」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だからって──ぁっ、んぅぅっ！\u3000ずっとするとは、聞いてない──ぁっ、んぁぁっ<emoji=heart04>\u3000こ、こんなに激しいものとは……んぅっ、んぁぁっ……っ……！」"
translation = "「그렇다고── 아, 으으윽! 계속한다고는 듣지 못했느니라── 아, 응아아<emoji=heart04> 이, 이렇게 격한 것이었을 줄이야…… 으응, 응아아…… 윽……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「こ、この調子で６時間もされたら──ぁぁぁっ……<emoji=heart04>\u3000余のおま○こは、気持ちよすぎて──おかしくなってしまう──っ……<emoji=heart04>\u3000ぁっ、はぁっ、んっ<emoji=heart04>」"
translation = "「이, 이 기세로 6시간이나 당하면── 아아아……<emoji=heart04> 여의 보지는 기분이 너무 좋아서── 이상해져 버리느니라── 윽……<emoji=heart04> 아, 하아, 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おかしくなればいい」"
translation = "「이상해지면 돼」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んんんんんん────────っっっ！！」"
translation = "「으으으으으────────윽!!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの華奢な体を我が物のように扱い、ぐちゅぐちゅと淫靡な音を響かせる。"
translation = "클라우디아의 가냘픈 몸을 제 것인 양 다루며 구축구축 음란한 소리를 울린다."

[[dialogue]]
speaker = "unk"
original = "彼女の窮屈な膣内をひと突きするごとに、熱い膣肉がペニスに絡みついて、腰が浮くほどの快感をもたらす。"
translation = "그녀의 비좁은 질 내부를 한 번 찌를 때마다 뜨거운 질 점막이 페니스를 휘감아 허리가 뜰 정도의 쾌감을 가져다준다."

[[dialogue]]
speaker = "unk"
original = "まるで、彼女の体を性処理の道具としているような光景に、支配的な欲望がますます膨らんでいった。"
translation = "마치 그녀의 몸을 성처리 도구로 삼고 있는 듯한 광경에 지배적인 욕망이 점점 부풀어 올랐다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「はぁ、はぁっ──っ、こうなったら──ぁっ<emoji=heart04>\u3000余が……っ、余のおま○こで、魔王をイかせるしか──っ、んぁぁぅっ……<emoji=heart04>」"
translation = "「하아, 하아── 윽, 이렇게 되면── 아<emoji=heart04> 여가…… 윽, 여의 보지로 마왕을 가게 할 수밖에── 윽, 응아아윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んっ──んんっ──んーーーっっ……！\u3000んぁっ<emoji=heart04>\u3000はぁ、はぁっ──だめだ──っ、動くと──余のほうが、気持ちよくなってしまうっ……ッ……<emoji=heart04>」"
translation = "「응── 으응── 으으윽……! 응아<emoji=heart04> 하아, 하아── 안 돼── 윽, 움직이면── 여의 쪽이 기분 좋아져 버리느니라…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……大丈夫……気持ちいいよ」"
translation = "「윽…… 괜찮아…… 기분 좋아」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも──今日は徹底的に、クラウディアに教えないと」"
translation = "「하지만── 오늘은 철저하게 클라우디아에게 가르쳐줘야 하니까」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「んあああぁぁぁっっ……！\u3000ぁっ、あんっ、んんぅっ！\u3000す、少しは止まってくれても──はぁっ、んぁぁっ……！\u3000んんんーっ……！」"
translation = "「응아아아아윽……! 아, 앙, 으응! 조, 조금은 멈춰줘도── 하아, 응아아……! 으으으윽……!」"

[[dialogue]]
speaker = "unk"
original = "性の６時間を知りたいだなんて、ああ無邪気な顔でお願いされたら──"
translation = "성의 6시간을 알고 싶다니, 그렇게 천진난만한 얼굴로 부탁받으면──"

[[dialogue]]
speaker = "unk"
original = "こちらも男として、燃え上がってしまうというものだった。"
translation = "이쪽도 남자로서 타오를 수밖에 없는 법이었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁぁぁっ──んぅっ、んぅぅっ……<emoji=heart04>\u3000ぁっ──はぁっ、んぁっ、んぁぁっ……！\u3000ふぅ、ふぅ、ふぅっ……っ、っっ……<emoji=heart04>」"
translation = "「아아아── 응, 으으윽……<emoji=heart04> 아── 하아, 응아, 응아아……! 후우, 후우, 후우…… 윽, 윽윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ネ……ネビュラの、総帥たるもの……っ……これしきで、音を上げていては──ァッ、んぁぁぁっっっっ<emoji=heart04>」"
translation = "「네…… 네뷸라의 총수 된 자가…… 윽…… 이까짓 일로 소리를 높여서야── 아앗, 응아아아아윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だっ……だめだ……ぁぁっ、も、もう余は果ててしまうぞ──っ、お、おま○こがもう、耐えられんっ……！\u3000あううぅ、んぅぅぅっっ……っ……！」"
translation = "「안…… 안 된다…… 아아, 이, 이제 여는 가버리느니라── 윽, 보, 보지가 이제 견딜 수 없느니라……! 아우우, 으으으윽…… 윽……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も……そろそろ……ッ……」"
translation = "「나도…… 슬슬…… 윽……」"

[[dialogue]]
speaker = "unk"
original = "クラウディアが強く感じ、膣内を震わせるにつれ、こちらにも絶え間ない刺激が襲ってくる。"
translation = "클라우디아가 강하게 느끼며 질 내부를 떨 때마다 이쪽에도 끊임없는 자극이 엄습해 온다."

[[dialogue]]
speaker = "unk"
original = "ペースを緩めるわけにもいかず、俺はただ押し寄せる快感に耐えながら腰を振る──"
translation = "페이스를 늦출 수도 없어 나는 그저 밀려오는 쾌감을 견디며 허리를 흔든다──"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁ──ぁっぁっ、い、いくっ……！\u3000い、いかされてしまう、このまま──魔王のち○ぽに──っ……！\u3000ぁっぁっ、んぁぁっ……<emoji=heart04>」"
translation = "「아── 아아, 가, 간다……! 가, 가게 되어버려, 이대로── 마왕의 자지에── 윽……! 아아, 응아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「いく──いくいくいくっ……！\u3000んぁぁぁっ、お、奥っ、おま○この奥、責められて──も、もう無理だっ……ぁぁぁっ……んっっ──<emoji=heart04>\u3000ぁっ、んぁっ！」"
translation = "「간다── 간다간다간다……! 응아아아, 아, 안쪽, 보지 안쪽 공략당해서── 이, 이제 무리니라…… 아아아…… 응──<emoji=heart04> 아, 응아!」"

[[dialogue]]
speaker = "unk"
original = "今にも崩れ落ちそうなほど、がくがくと膝を震わせるクラウディア。"
translation = "금방이라도 쓰러질 듯이 덜덜 무릎을 떠는 클라우디아."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の腕をしっかりと繋ぎ止め、ひたすらに彼女の膣奥をむさぼる──"
translation = "그런 그녀의 팔을 단단히 붙잡아 멈추고 오로지 그녀의 질 안쪽을 탐닉한다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「クラウディア──」"
translation = "「클라우디아──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔王、もっと、奥まで──ぁぁっ、いくっ！\u3000ぁぁっ、んんんんんんん──────っっ！！」"
translation = "「마왕, 더, 안쪽까지── 아아, 간다! 아아, 으으으으으으으──────윽!!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「いくっ……んあああぁぁああぁああぁああああぁぁああぁぁぁ～～～～～～～～っっっっ──────！！！」"
translation = "「간다…… 응아아아아아아아아아아아아아아아아아아아아아아아아아아아아~~~~~~~~윽──────!!!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの奥という奥で、ありったけの精子を吐き出した。"
translation = "클라우디아의 안쪽 깊숙한 곳에 있는 대로 정액을 쏟아냈다."

[[dialogue]]
speaker = "unk"
original = "目の前を、快楽が真っ白に塗りつぶしていく。"
translation = "눈앞을 쾌락이 하얗게 덧칠해 간다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──っ……！」"
translation = "「──윽……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「っっっっっ──っっ……<emoji=heart04>\u3000ぁっ、んあああぁぁぁぁっっ……ぁっ、んぅぅぅぅぅんっ…………！」"
translation = "「윽윽윽윽── 윽……<emoji=heart04> 아, 응아아아아아윽…… 아, 으으으으으응…………!」"

[[dialogue]]
speaker = "unk"
original = "絶頂に身を震わせている間も、クラウディアの膣内でペニスを激しく脈打たせていた。"
translation = "절정에 몸을 떨고 있는 동안에도 클라우디아의 질 내에서 페니스를 격렬하게 맥동시키고 있었다."

[[dialogue]]
speaker = "unk"
original = "収まりきらないほどの白濁液が狭道を満たしても、腕を引き、汗ばんだ尻にぴったりと腰を押し付けながら、募りに募った欲望を吐き続ける。"
translation = "다 수용하지 못할 정도의 백탁액이 좁은 길을 가득 채워도, 팔을 당겨 땀에 젖은 엉덩이에 딱 붙어 허리를 밀어붙이며 쌓이고 쌓인 욕망을 계속 토해낸다."

[[dialogue]]
speaker = "unk"
original = "無理やり注がれる官能の波に、クラウディアはうめき声を上げながら耐えていた。"
translation = "억지로 주입되는 관능의 파도에 클라우디아는 신음 소리를 내며 견디고 있었다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁっ──はぁっ、んっ、んんんっ……！\u3000はぁ……あぅ、んんんっ……！」"
translation = "「아── 하아, 응, 으으응……! 하아…… 아우, 으으응……!」"

[[dialogue]]
speaker = "unk"
original = "膣内に収めていたペニスをゆっくりと引き抜く。"
translation = "질 내에 담고 있던 페니스를 천천히 뽑아낸다."

[[dialogue]]
speaker = "unk"
original = "鮮やかなピンク色の花弁の内側から、真っ白な精液がドロリと溢れて垂れ落ちた。"
translation = "선명한 분홍색 꽃잎 안쪽에서 새하얀 정액이 주르륵 넘쳐 흘러내렸다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──っはぁ、はぁ、はぁっ……ん……んぅうう……はあ、はあ、ふぅっ……」"
translation = "「──윽하아, 하아, 하아…… 응…… 으으으…… 하아, 하아, 후우……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「まったく……余の体をこうも乱暴に使って、射精するなど……っ……けしからんやつだ……っ……<emoji=heart04>」"
translation = "「정말이지…… 여의 몸을 이렇게나 난폭하게 사용하고 사정하다니…… 윽…… 고약한 녀석이구나…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂が収まってきたのか、息を乱しながらもクラウディアは軽口を叩く。"
translation = "절정이 가라앉았는지 숨을 몰아쉬면서도 클라우디아는 농담을 던진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっと、あまりにも……クラウディアが気持ちよすぎて……」"
translation = "「조금, 너무나도…… 클라우디아가 기분 좋아서……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふっ、そうか……そうだな……余の中に<ruby>射精<rt>だ</rt></ruby>された白いのが……お主が満足できた証だな……」"
translation = "「훗, 그런가…… 그렇구나…… 여의 안에 사정진 하얀 것이…… 네가 만족했다는 증거로구나……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………満足？」"
translation = "「…………만족?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「性の６時間のことを知りたいって言ってなかったか……？」"
translation = "「성의 6시간에 대해 알고 싶다고 하지 않았어……?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あぁ、そうだ。途中から忘れかけていたが、きっかけはそうであったな…………って……え？\u3000もしや<b>６時間</b>というのは……」"
translation = "「아아, 그렇다. 도중에 잊을 뻔했다만 계기는 그러했지………… 어…… 에? 설마 <b>6시간</b>이라는 것은……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「クラウディア……まだ<ruby>聖夜<rt>よる</rt></ruby>は始まったばかりだ……」"
translation = "「클라우디아…… 아직 성야은 이제 막 시작됐을 뿐이야……」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「って待て──ま、魔王！？\u3000お主、まさかまだ続けるつもりじゃ──」"
translation = "「잠깐 기다려── 마, 마왕!? 너 설마 아직 계속할 생각은──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぁっ──んんんんんんんんっっっ…………！」"
translation = "「아── 으으으으으으으으윽…………!」"

[[dialogue]]
speaker = "unk"
original = "そうして、その夜はヘロヘロになるまで性の６時間の何たるかを、クラウディアに徹底的に教え込んだのだった。"
translation = "그렇게 그날 밤은 기진맥진할 때까지 성의 6시간이 무엇인지를 클라우디아에게 철저하게 가르쳐주었던 것이었다."

