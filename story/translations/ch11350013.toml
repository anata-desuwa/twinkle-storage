[[dialogue]]
speaker = "unk"
original = "第３話,実録、魔王秘話……！？,P"
translation = "제3화, 실록, 마왕 비화……!？,P"

[[dialogue]]
speaker = "ルネア"
original = "「あらクロト、今日は一人なの？」"
translation = "「어머 쿠로토, 오늘은 혼자니?」"

[[dialogue]]
speaker = "unk"
original = "みんなちょうど出払ってて"
translation = "모두 마침 자리를 비워서"

[[dialogue]]
speaker = "ルネア"
original = "「ふ～ん、そうなのね。せっかくわたしが遊びに来てあげたというのに、寂しいじゃない」"
translation = "「흐~음, 그렇구나. 모처럼 내가 놀러 와 줬는데, 외롭잖아」"

[[dialogue]]
speaker = "ルネア"
original = "「まあいいわ。今日はね、あなたにシンのこと……いいえ。魔王のことを、布教してあげようと思って来たの」"
translation = "「뭐 됐어. 오늘은 말이지, 너에게 신에 대한 것…… 아니. 마왕에 대한 것을, 포교해 주려고 왔어」"

[[dialogue]]
speaker = "unk"
original = "布教……？"
translation = "포교……?"

[[dialogue]]
speaker = "ルネア"
original = "「そうよ。だからとにかく、つべこべ言わずに聞いておきなさい。何よりわたしが、シンのことを誰かに話したくて仕方がないのよ」"
translation = "「그렇지. 그러니까 어쨌든, 이래라저래라 하지 말고 들어둬. 무엇보다 내가, 신에 대한 것을 누군가에게 이야기하고 싶어 견딜 수가 없거든」"

[[dialogue]]
speaker = "ルネア"
original = "「ほら、無性に『推し』の話をしたくなる時ってあるでしょう？\u3000そう、いわば魔王の推し活ね」"
translation = "「봐, 무작정 『최애』의 이야기를 하고 싶어질 때가 있잖아? 그래, 이른바 마왕의 덕질이지」"

[[dialogue]]
speaker = "ルネア"
original = "「そうなった時に、１番適任な話し相手は誰なのかと考えたら……あなたしかいないでしょ？」"
translation = "「그렇게 되었을 때, 가장 적임인 이야기 상대는 누구인가 하고 생각하니…… 너밖에 없잖아?」"

[[dialogue]]
speaker = "ルネア"
original = "「なんといっても、あのシンが認めて、魔王の力を託したんだから」"
translation = "「뭐니 뭐니 해도, 그 신이 인정하고, 마왕의 힘을 맡겼으니까」"

[[dialogue]]
speaker = "ルネア"
original = "「まぁでも？\u3000わたしはまだそこまであなたのことを認めたというわけでもないから、この機会に、あなたのことを見定めさせてもらうつもりでもあるわ」"
translation = "「뭐, 하지만? 나는 아직 거기까지 너를 인정했다는 것은 아니니까, 이 기회에, 너에 대한 것을 확인해 볼 생각이기도 해」"

[[dialogue]]
speaker = "ルネア"
original = "「だからしっかり、シンのこと、魔王のことについて、耳を傾けることね。せっかく、女神が直々に布教するわけだし」"
translation = "「그러니까 제대로, 신에 대한 것, 마왕에 대한 것에 대해서, 귀 기울이도록 해. 모처럼, 여신이 직접 포교하는 거니까」"

[[dialogue]]
speaker = "unk"
original = "お、お手柔らかに……"
translation = "너, 너그러이……"

[[dialogue]]
speaker = "ルネア"
original = "「まずはそうね、手始めに、魔王の心構えから話していった方がいいかしら……」"
translation = "「우선은 그렇네, 시작으로, 마왕의 마음가짐부터 이야기해 나가는 것이 좋을까……」"

[[dialogue]]
speaker = "メイプル"
original = "「その話、ちょっと待ったーっ！」"
translation = "「그 이야기, 잠깐 스톱!」"

[[dialogue]]
speaker = "ルネア"
original = "「あら、あなたは……メイプル、だったかしら」"
translation = "「어머, 너는…… 메이플, 이었지」"

[[dialogue]]
speaker = "メイプル"
original = "「その通り！\u3000我こそはクルセイダースの末裔、メイプル・モノクラウン！\u3000魔王にまつわる話とあらば、ぜひ聞かせてもらおう！」"
translation = "「그렇다! 나야말로 크루세이더스의 후예, 메이플 모노크라운! 마왕에 얽힌 이야기라면, 꼭 듣게 해줘!」"

[[dialogue]]
speaker = "ルネア"
original = "「ふぅん……あなたも、魔王のことが気になるの？」"
translation = "「흐~음…… 너도, 마왕이 신경 쓰이니?」"

[[dialogue]]
speaker = "メイプル"
original = "「いかにも！\u3000それに、お兄ちゃんの妹……すなわち魔王の妹として、魔王の秘密について知る権利はあるはずだよ！」"
translation = "「당연하지! 게다가, 오빠의 여동생…… 즉 마왕의 여동생으로서, 마왕의 비밀에 대해 알 권리는 있을 거야!」"

[[dialogue]]
speaker = "ルネア"
original = "「シンの秘密は、わたしだけのものだけど……魔王についての話なら、別にいいわよ」"
translation = "「신의 비밀은, 나만의 것이지만…… 마왕에 대한 이야기라면, 별로 괜찮아」"

[[dialogue]]
speaker = "ルネア"
original = "「それに、より多くの人に魔王を布教し、シンの素敵な魅力を広めるというのも、女神たるわたしの宿命と言えるのだから」"
translation = "「게다가, 더 많은 사람에게 마왕을 포교하고, 신의 멋진 매력을 넓힌다는 것도, 여신인 나의 숙명이라고 할 수 있으니까」"

[[dialogue]]
speaker = "メイプル"
original = "「女神の宿命……！\u3000なんかかっこいい！」"
translation = "「여신의 숙명……! 뭔가 멋있어!」"

[[dialogue]]
speaker = "ルネア"
original = "「それと、あなたにも迷惑をかけてしまったし、お詫びに……はい、これをどうぞ。クロトの分もあるわよ」"
translation = "「그리고, 너에게도 폐를 끼쳤고, 사과의 의미로…… 자, 이걸 받아. 쿠로토의 몫도 있어」"

[[dialogue]]
speaker = "メイプル"
original = "「なにこれ、ストラップ？\u3000ちっちゃいマスコットがついてて可愛いね！」"
translation = "「이거 뭐야, 스트랩? 조그만 마스코트가 달려 있어서 귀엽네!」"

[[dialogue]]
speaker = "ルネア"
original = "「これぞ、魔王印のお守りストラップよ。魔王布教の一環として、特別にプレゼントしてあげるわ」"
translation = "「이것이야말로, 마왕표 부적 스트랩이야. 마왕 포교의 일환으로서, 특별히 선물해 줄게」"

[[dialogue]]
speaker = "メイプル"
original = "「魔王関係ある？」"
translation = "「마왕이랑 관계 있어?」"

[[dialogue]]
speaker = "ルネア"
original = "「これを身につけていれば、魔王の加護を少しだけ得られるのよ」"
translation = "「이것을 몸에 지니고 있으면, 마왕의 가호를 조금 얻을 수 있어」"

[[dialogue]]
speaker = "メイプル"
original = "「うわ、なんか急に胡散臭い宗教感が……」"
translation = "「우와, 뭔가 갑자기 수상한 종교 느낌이……」"

[[dialogue]]
speaker = "ルネア"
original = "「女神を信じれば、救われるわよ」"
translation = "「여신을 믿으면, 구원받을 거야」"

[[dialogue]]
speaker = "メイプル"
original = "「本人から言われると、御利益ありそうだけどぉ……」"
translation = "「본인에게 들으니, 효험이 있을 것 같지만……」"

[[dialogue]]
speaker = "ルネア"
original = "「わたしお手製の魔王グッズというだけでも、とってもありがたいんだから」"
translation = "「내가 직접 만든 마왕 굿즈라는 것만으로도, 굉장히 고마운 거니까」"

[[dialogue]]
speaker = "メイプル"
original = "「えっ、すごい！\u3000手作りだったんだ」"
translation = "「엣, 대단해! 수제였구나」"

[[dialogue]]
speaker = "ルネア"
original = "「まぁ、時間だけはたくさんあるし、このぐらいは大したことないわ」"
translation = "「뭐, 시간만은 많이 있으니, 이 정도는 별거 아니야」"

[[dialogue]]
speaker = "ルネア"
original = "「それにね、わたしなんかより、シンの方がずっとすごいのよ」"
translation = "「게다가 말이야, 나보다, 신 쪽이 훨씬 대단해」"

[[dialogue]]
speaker = "ルネア"
original = "「生活に必要なものは、なんでもＤＩＹで作ってしまうし、それで足りないものがあっても、町の人たちからの貢ぎ物で、大体賄えてしまうんだから」"
translation = "「생활에 필요한 것은, 뭐든지 DIY로 만들어 버리고, 그래서 부족한 것이 있어도, 마을 사람들로부터의 공물로, 대부분 충당할 수 있으니까」"

[[dialogue]]
speaker = "メイプル"
original = "「へ～、自分の実力もある上に、魔王としての信仰や人望が厚いんだね！」"
translation = "「헤에~, 자신의 실력도 있는데다가, 마왕으로서의 신앙이나 인망이 두텁구나!」"

[[dialogue]]
speaker = "ルネア"
original = "「このストラップもね、実はシンに作り方を教えてもらったの」"
translation = "「이 스트랩도 말이지, 실은 신에게 만드는 법을 배웠어」"

[[dialogue]]
speaker = "ルネア"
original = "「時々、シンが参加するフリーマーケットについていったりもするんだけど、そこでも評判がいいのよ」"
translation = "「가끔, 신이 참가하는 벼룩시장에 따라가기도 하는데, 거기서도 평판이 좋단 말이지」"

[[dialogue]]
speaker = "メイプル"
original = "「地域に寄り添って勢力拡大してるんだ……！」"
translation = "「지역에 밀착해서 세력 확대하고 있는 거구나……!」"

[[dialogue]]
speaker = "ルネア"
original = "「勿論それだけじゃなくて、シンは牛乳配達のアルバイトも頑張っていて、生徒会長として学園での人望もあって、しかも、クルセイダースとして平和のために戦い続けているのよ」"
translation = "「물론 그것뿐만이 아니라, 신은 우유 배달 아르바이트도 열심히 하고 있고, 학생회장으로서 학원에서의 인망도 있고, 게다가, 크루세이더스로서 평화를 위해 계속 싸우고 있단 말이지」"

[[dialogue]]
speaker = "メイプル"
original = "「へぇ～……シンって人、ホントにすごいんだね！\u3000あたしも見習わないと……！」"
translation = "「헤에~…… 신이란 사람, 정말 대단하네! 나도 본받아야지……!」"

[[dialogue]]
speaker = "ルネア"
original = "「あら、いい心がけね」"
translation = "「어머, 좋은 마음가짐이네」"

[[dialogue]]
speaker = "ルネア"
original = "「まぁ逆に、シンに人望がありすぎるあまり、たくさんの女の子に囲まれていたりして、少し不安になる時もあるのだけれど……」"
translation = "「뭐 반대로, 신에게 인망이 너무 많은 나머지, 수많은 여자아이들에게 둘러싸여 있기도 해서, 조금 불안해질 때도 있긴 하지만……」"

[[dialogue]]
speaker = "ルネア"
original = "「でも、ライバルが多いということは、わたしの恋人であるシンが、それだけ魅力的だということだものね！」"
translation = "「하지만, 라이벌이 많다는 건, 나의 연인인 신이, 그만큼 매력적이라는 뜻이잖아!」"

[[dialogue]]
speaker = "メイプル"
original = "「おお、ノロケだ……！」"
translation = "「오오, 염장이네……!」"

[[dialogue]]
speaker = "ルネア"
original = "「そんなシンを信頼しているからこそ、わたしも毎日早起きして、こっそりシンの後をつけながら、彼のバイト姿を見守っているのよ」"
translation = "「그런 신을 신뢰하고 있기 때문에, 나도 매일 일찍 일어나서, 몰래 신의 뒤를 쫓아가면서, 그의 아르바이트하는 모습을 지켜보고 있단 말이지」"

[[dialogue]]
speaker = "メイプル"
original = "「そ、そうなんだ……それでよく知ってるんだね」"
translation = "「그, 그렇구나…… 그래서 잘 알고 있는 거네」"

[[dialogue]]
speaker = "ルネア"
original = "「シンを手伝ってあげたい気持ちもあるのだけれど……ひたむきに努力するシンの姿が、何より素敵なの」"
translation = "「신을 도와주고 싶은 마음도 있지만…… 한결같이 노력하는 신의 모습이, 무엇보다 멋지단 말이지」"

[[dialogue]]
speaker = "ルネア"
original = "「だから、こっそり尾行しているというわけ。一生懸命なシンを、邪魔するわけにはいかないものね」"
translation = "「그러니까, 몰래 미행하고 있다는 거지. 열심히 하는 신을, 방해할 수는 없잖아」"

[[dialogue]]
speaker = "メイプル"
original = "「ふーん……だけど、頑張ってるっていうなら、お兄ちゃんだっていっぱい頑張ってるよ。仲間だってたくさんいるし！」"
translation = "「흐음…… 하지만, 열심히 하고 있다고 한다면, 오빠도 잔뜩 열심히 하고 있어. 동료도 많이 있고!」"

[[dialogue]]
speaker = "ルネア"
original = "「ん～、言われてみれば、確かにそうね……これまでの星徒会長としての仕事ぶりや、スターナイツとしての活躍は、見せてもらってきたわ」"
translation = "「음~, 듣고 보니, 확실히 그렇네…… 지금까지의 성도회장으로서의 일 처리나, 스타 나이츠로서의 활약은, 보여줬었지」"

[[dialogue]]
speaker = "ルネア"
original = "「あちらの世界の子たちとも、ちゃんと協力し合って、仲良くやっていたみたいだし……」"
translation = "「저쪽 세계의 아이들과도, 제대로 협력하면서, 사이좋게 지냈던 것 같고……」"

[[dialogue]]
speaker = "メイプル"
original = "「そうそう、そうなんだよっ」"
translation = "「맞아 맞아, 그렇다구!」"

[[dialogue]]
speaker = "ルネア"
original = "「それにクロト、この前戦った時にも思ったけれど……あなたも、なかなかの実力を持っていたわね。もちろんシンには及ばないけれど」"
translation = "「게다가 쿠로토, 요전에 싸웠을 때도 생각했지만…… 너도, 꽤 실력을 가지고 있었지. 물론 신에게는 미치지 못하지만」"

[[dialogue]]
speaker = "メイプル"
original = "「ふふん♪\u3000あたしが見込んだお兄ちゃんなんだから、当然だよ！」"
translation = "「후훗♪ 내가 알아본 오빠니까, 당연하지!」"

[[dialogue]]
speaker = "ルネア"
original = "「なるほどね……」"
translation = "「과연 그렇네……」"

[[dialogue]]
speaker = "ルネア"
original = "「そう考えると、わたしがわざわざ魔王の心得を説くまでもなく、大切なことはしっかりわかっているようね」"
translation = "「그렇게 생각하니, 내가 굳이 마왕의 마음가짐을 설파할 필요도 없이, 소중한 것은 제대로 알고 있는 것 같네」"

[[dialogue]]
speaker = "ルネア"
original = "「それに、よく見ると……シンとは違うのに、なんだか少し似ている雰囲気もあるような……」"
translation = "「게다가, 잘 보면…… 신과는 다른데도, 왠지 조금 닮은 분위기도 있는 것 같고……」"

[[dialogue]]
speaker = "ルネア"
original = "「これも魔王としての、素質の為せる業ということかしら」"
translation = "「이것도 마왕으로서의, 소질이 만들어낸 결과라는 걸까」"

[[dialogue]]
speaker = "メイプル"
original = "「ふっふっふ、やっと分かってきたようだね！」"
translation = "「훗훗훗, 드디어 알게 된 것 같네!」"

[[dialogue]]
speaker = "ルネア"
original = "「……そうね。なんだかんだで、結構見所がありそうだし……魔王として、少しくらいは認めてあげるわ」"
translation = "「……그렇네. 이러니저러니 해도, 꽤 볼만한 점이 있을 것 같고…… 마왕으로서, 조금 정도는 인정해 줄게」"

[[dialogue]]
speaker = "ルネア"
original = "「あくまで魔王としては、シンが信用したから、わたしも信用するというだけだけれど……」"
translation = "「어디까지나 마왕으로서는, 신이 신뢰했으니까, 나도 신뢰한다는 것뿐이지만……」"

[[dialogue]]
speaker = "ルネア"
original = "「それでも、わたしにここまで言わせたんだから、これからもしっかり精進することね」"
translation = "「그래도, 나에게 여기까지 말하게 했으니, 앞으로도 확실히 정진하도록 해」"

[[dialogue]]
speaker = "unk"
original = "もちろん、そのつもりだよ"
translation = "물론, 그럴 생각이야"

[[dialogue]]
speaker = "ルネア"
original = "「ふふ……わたしったら、シンの人の良さがうつってしまったのかしら」"
translation = "「후후…… 나, 신의 좋은 성격이 옮아버린 걸까」"

[[dialogue]]
speaker = "ルネア"
original = "「それと、メイプル。あなたも、クロトのことを支えてあげる仲間の１人として、しっかり頑張るのよ」"
translation = "「그리고, 메이플. 너도, 쿠로토를 지탱해 줄 동료 중 한 명으로서, 확실히 열심히 하렴」"

[[dialogue]]
speaker = "メイプル"
original = "「そんなの当たり前だよっ！\u3000あたしだってお兄ちゃんと一緒にいつか魔王になる者――妹魔王なんだからね♪」"
translation = "「그런 건 당연하잖아! 나도 오빠와 함께 언젠가 마왕이 될 사람―― 여동생 마왕이니까!」"

[[dialogue]]
speaker = "ルネア"
original = "「それならよかったわ。それじゃあ、シンのことも話せてすっきりしたことだし……」"
translation = "「그렇다면 다행이네. 그럼, 신에 대한 이야기도 할 수 있어서 속이 후련해졌으니……」"

[[dialogue]]
speaker = "ルネア"
original = "「次は、シンの活躍をまとめた武勇伝を聞かせてあげるわ」"
translation = "「다음은, 신의 활약을 정리한 무용담을 들려줄게」"

[[dialogue]]
speaker = "メイプル"
original = "「えっ、まだ続くのっ！？」"
translation = "「엣, 아직도 계속되는 거야!?」"

[[dialogue]]
speaker = "ルネア"
original = "「ふふっ、心して聞くのよ、２人とも」"
translation = "「후훗, 명심하고 듣도록 해, 두 사람 다」"

