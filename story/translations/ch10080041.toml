[[dialogue]]
speaker = "unk"
original = "第１話,ニューイヤートリコロール,P"
translation = "제1화, 뉴 이어 트리콜로르, P"

[[dialogue]]
speaker = "unk"
original = "冬の休みも終わり、学園に日常の活気が戻ったある日。"
translation = "겨울 방학도 끝나고, 학원에 일상의 활기가 돌아온 어느 날."

[[dialogue]]
speaker = "unk"
original = "アナ達は仮想結界システムを使って、戦闘訓練に取り組んでいた。"
translation = "아나 일행은 가상 결계 시스템을 사용하여, 전투 훈련에 임하고 있었다."

[[dialogue]]
speaker = "アナ"
original = "「破魔矢スタンバイ。お２人共、いつでもノープロブレムです」"
translation = "「파마 화살 스탠바이. 두 분 다, 언제든 노 프로블럼입니다」"

[[dialogue]]
speaker = "ルルカ"
original = "「よ～し、あたしの歌でクリスマスパワーを注入しちゃうよ～！\u3000――妹からのＭｅｒｒｙ\u3000Ｌｏｖｅ♪」"
translation = "「조~아, 내 노래로 크리스마스 파워를 주입할게~! ――여동생으로부터의 Merry Love♪」"

[[dialogue]]
speaker = "リーリア"
original = "「私のお正月パワーもマジカルプラス☆\u3000絵馬に願いを込めて――マジカル☆グラフィティ―！」"
translation = "「내 설날 파워도 매지컬 플러스☆ 에마에 소원을 담아서――매지컬☆그래피티!」"

[[dialogue]]
speaker = "unk"
original = "アナの破魔矢に２人の力が収束され、鮮やかなグラデーションの輝きを放つ。"
translation = "아나의 파마 화살에 두 사람의 힘이 수렴되어, 선명한 그라데이션의 광채를 내뿜는다."

[[dialogue]]
speaker = "アナ"
original = "「破魔矢へのパワー収束臨界点……ここです。ファイア！」"
translation = "「파마 화살로의 파워 수렴 임계점…… 여기입니다. 파이어!」"

[[dialogue]]
speaker = "アナ"
original = "「……シャドウの撃破を確認。リーリアさんの融合魔弾にちなんで、名付けて――『ニューイヤートリコロール』です」"
translation = "「……섀도 격파 확인. 리리아 씨의 융합 마탄을 본떠서, 이름하여――『뉴 이어 트리콜로르』입니다」"

[[dialogue]]
speaker = "ルルカ"
original = "「やった～♪\u3000あたしたち３人で新たな合体技、成功だねっ！\u3000いぇ～い♪」"
translation = "「해냈다~♪ 우리 셋이서 새로운 합체기, 성공이야! 예~이♪」"

[[dialogue]]
speaker = "リーリア"
original = "「マジカルハイタ～ッチ☆\u3000アナちゃんの新しい晴れ着の力、可愛く決まったね♪」"
translation = "「매지컬 하이 터~치☆ 아나짱의 새로운 설빔의 힘, 귀엽게 결정됐네♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ～、でも……あたしも晴れ着フォーム、欲しかったなぁ～。２人だけおニューの衣装、ズル～い」"
translation = "「아~, 그래도…… 나도 설빔 폼, 갖고 싶었는데~. 둘만 새 옷이라니, 치사해~」"

[[dialogue]]
speaker = "アナ"
original = "「ルルカさんは『ルカルカ』の活動も好調ですし、近いうちにまたＶチューバー衣装に覚醒するんじゃないでしょうか？」"
translation = "「루루카 씨는 『루카루카』 활동도 호조이고, 머지않아 다시 버츄얼 유튜버 의상으로 각성하지 않을까요?」"

[[dialogue]]
speaker = "リーリア"
original = "「そうそう。近いところだと、バレンタインとか～？\u3000新衣装でチョコ作りの配信、やるんでしょ？」"
translation = "「맞아 맞아. 가까운 시일이라면, 발렌타인이라든가~? 새 의상으로 초코 만들기 방송, 할 거지?」"

[[dialogue]]
speaker = "ルルカ"
original = "「やるけどさ～。どうしたら良い配信になるのか、考えることが山積みだよ～」"
translation = "「하긴 하지만~. 어떻게 하면 좋은 방송이 될지, 생각할 게 산더미야~」"

[[dialogue]]
speaker = "unk"
original = "３人共、訓練お疲れ様"
translation = "세 사람 다, 훈련 수고했어"

[[dialogue]]
speaker = "アナ"
original = "「あっ……！\u3000会長、お疲れ様です。もしかして見ていてくれてたんですか？」"
translation = "「앗……! 회장님, 수고하셨습니다. 혹시 보고 계셨던 건가요?」"

[[dialogue]]
speaker = "アナ"
original = "「どうでしたか？\u3000リーリアさんやサーシャ先輩に負けじと、私も訓練を頑張って、アナ流破魔矢術の合体技を編み出してみました」"
translation = "「어떠셨나요? 리리아 씨나 사샤 선배에게 지지 않으려고, 저도 훈련을 열심히 해서, 아나류 파마 화살술의 합체기를 고안해 보았습니다」"

[[dialogue]]
speaker = "アナ"
original = "「ですので会長には、達成感を得る為の<ruby>報酬<rt>リワード</rt></ruby>として、頭を撫でてもらうことを所望します」"
translation = "「그러니 회장님께는, 달성감을 얻기 위한 <ruby>보상<rt>리워드</rt></ruby>로서, 머리를 쓰다듬어 주시기를 소망합니다」"

[[dialogue]]
speaker = "unk"
original = "ああ。よく頑張ったな、アナ"
translation = "그래. 정말 잘했어, 아나"

[[dialogue]]
speaker = "アナ"
original = "「あっ……<emoji=heart04>\u3000ふふっ、会長に褒めてもらったことで、また次の<ruby>目標<rt>ミッション</rt></ruby>を達成する為の意欲が湧いてきます。むふ～♪」"
translation = "「앗……<emoji=heart04> 후훗, 회장님께 칭찬받으니, 또 다음 <ruby>목표<rt>미션</rt></ruby>를 달성하기 위한 의욕이 솟아나네요. 무후~♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「あ～～！！\u3000アナちゃんがカレシ相手にデレデレしてる！」"
translation = "「아~~!! 아나짱이 남친 상대로 데레데레하고 있어!」"

[[dialogue]]
speaker = "リーリア"
original = "「ちょっとちょっと～？\u3000センパイも、可愛い後輩たちが見ているところで、カノジョとイチャつかないで欲しいんですけど～？」"
translation = "「잠깐잠깐~? 선배도, 귀여운 후배들이 보고 있는 데서, 여친이랑 꽁냥거리지 않았으면 좋겠는데요~?」"

[[dialogue]]
speaker = "アナ"
original = "「な、何を言っているんですか、お２人共。イチャついてなんかいません……からかわないでください」"
translation = "「무, 무슨 말씀을 하시는 건가요, 두 분 다. 꽁냥거린 적 없습니다…… 놀리지 마세요」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして俺から少し距離を取りながら、モジモジと恥ずかしそうにするアナ。"
translation = "얼굴을 붉히며 나에게서 조금 거리를 두면서, 머뭇머뭇 부끄러워하는 아나."

[[dialogue]]
speaker = "ルルカ"
original = "「え？\u3000いや、思いっきり恋人のスキンシップだったよね？\u3000自分から撫でてもらいに行ってたし……」"
translation = "「에? 아니, 완전히 연인끼리의 스킨십이었잖아? 자기가 직접 쓰다듬어 달라고 하러 갔으면서……」"

[[dialogue]]
speaker = "リーリア"
original = "「もしかして……アナちゃんって自分がデレデレしてる自覚、なかったり……？」"
translation = "「혹시…… 아나짱은 자기가 데레데레하고 있다는 자각, 없는 거야……?」"

[[dialogue]]
speaker = "アナ"
original = "「私は常にコンプライアンスを意識して、人前では星徒会の副会長として、会長と接するように心がけているつもりですが……」"
translation = "「저는 항상 컴플라이언스를 의식해서, 사람들 앞에서는 성도회 부회장으로서 회장님을 대하려고 마음먹고 있습니다만……」"

[[dialogue]]
speaker = "ルルカ"
original = "「えっと……お兄ちゃんがいると、アナちゃんは物凄く表情が緩むし、声もちょっと甘くなってるよ？」"
translation = "「그게…… 오빠가 있으면, 아나짱은 엄청 표정이 풀리고, 목소리도 좀 달콤해진다니까?」"

[[dialogue]]
speaker = "リーリア"
original = "「さっきも、和菓子を前にした時みたいに、明らかにテンションが上がって、声が高くなってたよね？」"
translation = "「아까도, 화과자를 앞에 뒀을 때처럼, 명백하게 텐션이 올라가서 목소리가 높아졌었지?」"

[[dialogue]]
speaker = "アナ"
original = "「な……！？\u3000そ、そんなことはありません。事実無根ですっ」"
translation = "「뭐……!? 그, 그런 적 없습니다. 사실무근입니다」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイはちゃんと気づいてますよね？」"
translation = "「선배는 제대로 눈치채고 있죠?」"

[[dialogue]]
speaker = "unk"
original = "まあ、恋人だし……うん"
translation = "뭐, 연인이니까…… 응"

[[dialogue]]
speaker = "アナ"
original = "「ほぁっ！！？」"
translation = "「호앗!!?」"

[[dialogue]]
speaker = "アナ"
original = "「自分が無意識に、そんな恥ずかしい行動をしていたなんて……。すぅ～、はぁ～」"
translation = "「제가 무의식중에 그런 부끄러운 행동을 하고 있었다니……. 스으~, 하아~」"

[[dialogue]]
speaker = "アナ"
original = "「……会長、もうちょっと離れてください。恋人とは言え、節度は保つべき」"
translation = "「……회장님, 조금만 떨어져 주세요. 연인이라고는 해도, 절도는 지켜야 합니다」"

[[dialogue]]
speaker = "unk"
original = "急に付き合う前みたいなクールなアナに！？"
translation = "갑자기 사귀기 전 같은 쿨한 아나로!?"

[[dialogue]]
speaker = "アナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "アナ"
original = "「やっぱり嘘です。もっとこっちに来てください」"
translation = "「역시 거짓말이에요. 좀 더 이쪽으로 와주세요」"

[[dialogue]]
speaker = "アナ"
original = "「私が一緒にいる時は、少なくとも手の繋げる範囲にいて欲しいです」"
translation = "「제가 같이 있을 때는, 적어도 손을 잡을 수 있는 범위에 있어 주셨으면 해요」"

[[dialogue]]
speaker = "unk"
original = "そう言って、しれっと俺の手を取り、繋いでくるアナ。"
translation = "그렇게 말하며, 슬그머니 내 손을 잡는 아나."

[[dialogue]]
speaker = "ルルカ"
original = "「ちょっ……アナちゃん、今ひょっとして、お兄ちゃんを突き放した途端に寂しくなって、デレちゃった感じ！？」"
translation = "「잠깐…… 아나짱, 지금 설마 오빠를 밀쳐내자마자 외로워져서, 데레해버린 느낌!?」"

[[dialogue]]
speaker = "リーリア"
original = "「ヤバい、どうしよう……！\u3000センパイの気持ちがわかるくらい、アナちゃんの反応が可愛すぎなんですけど！？」"
translation = "「위험해, 어떡해……! 선배의 마음을 알 수 있을 정도로 아나짱의 반응이 너무 귀엽잖아!?」"

[[dialogue]]
speaker = "アナ"
original = "「あ、あまりからかわないでください……」"
translation = "「너, 너무 놀리지 마세요……」"

[[dialogue]]
speaker = "アナ"
original = "「お２人だって、恋人ができたら、きっとわかります……。好きな人とは、本当はいつもくっついていたいものなんです」"
translation = "「두 분도 연인이 생기면, 분명 알게 될 거예요……. 좋아하는 사람과는 사실 항상 붙어 있고 싶은 법이거든요」"

[[dialogue]]
speaker = "アナ"
original = "「これでも我慢して、なんとか手を繋ぐだけに留めているんですから……」"
translation = "「이래 봬도 참고 참아서, 어떻게든 손을 잡는 것만으로 그치고 있는 거니까요……」"

[[dialogue]]
speaker = "リーリア"
original = "「おや？\u3000なんか今私たち、すごい恋人マウント取られちゃってます？」"
translation = "「어라? 왠지 지금 우리, 엄청난 연인 자랑질을 당하고 있는 거 아냐?」"

[[dialogue]]
speaker = "ルルカ"
original = "「くぅ～！\u3000もじもじアナちゃんは滅茶苦茶可愛いけど、マウントアナちゃんはちょっとムカつく～！」"
translation = "「크으~! 머뭇거리는 아나짱은 엄청 귀엽지만, 자랑질하는 아나짱은 좀 짜증 나~!」"

[[dialogue]]
speaker = "unk"
original = "あげないぞ？（ドヤ顔）"
translation = "안 줄 거다? (거만한 얼굴)"

[[dialogue]]
speaker = "リーリア"
original = "「センパイのアナちゃんマウントは普通にムカつくんで、やめてください！」"
translation = "「선배의 아나짱 자랑질은 평범하게 짜증 나니까 그만두세요!」"

[[dialogue]]
speaker = "アナ"
original = "「ふっ……どやぁ」"
translation = "「훗…… 에헴」"

[[dialogue]]
speaker = "ルルカ"
original = "「何このドヤ顔バカップル！？」"
translation = "「뭐야 이 거만한 닭살 커플은!?」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで、今日も仲良くじゃれ合うクラスメイト３人組なのであった。"
translation = "이러쿵저러쿵, 오늘도 사이좋게 장난치는 클래스메이트 3인조였다."

