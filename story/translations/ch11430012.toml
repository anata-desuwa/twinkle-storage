[[dialogue]]
speaker = "unk"
original = "第２話,人気すぎるラファエロ,P"
translation = "제2화, 너무 인기 있는 라파엘로"

[[dialogue]]
speaker = "ルリエル"
original = "「今日のおやつ、ＳＮＳに載せちゃうのです。『午後もがんばるエネルギーです』っと！」"
translation = "「오늘의 간식, SNS에 올릴 거예요. 『오후에도 힘낼 에너지입니다』라고!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「おや？\u3000ルリエル、それはなんだい？」"
translation = "「어라? 루리엘, 그건 뭐니?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ＤＩＳＣのことですか？\u3000これは連絡と情報交換用の機械なのです！」"
translation = "「DISC 말인가요? 이건 연락과 정보 교환용 기계예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「って確か学園から、ラファエロさんにも支給されてたと思いますけど……」"
translation = "「분명 학원에서 라파엘로 씨에게도 지급됐을 텐데……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「そうじゃなくて……ルリエルの撮った写真が、その中に転送？\u3000複製？\u3000されただろう？」"
translation = "「그게 아니라…… 루리엘이 찍은 사진이 그 안으로 전송? 복제? 된 거지?」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっ、ＳＮＳのことですか？」"
translation = "「앗, SNS 말인가요?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「えすえぬえす？」"
translation = "「에스엔에스?」"

[[dialogue]]
speaker = "ルリエル"
original = "「う～んと、ルリエルもあんまり詳しいことは知らないのですが……」"
translation = "「으음, 루리엘도 그렇게 자세히는 모르지만요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ここに写真をあげたり、遠くにいる人ともお喋りできたりするのです！」"
translation = "「여기에 사진을 올리거나 멀리 있는 사람과도 대화할 수 있는 거예요!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「へぇ……ちょっとそのＤＩＳＣを借りて、エスエヌエスの様子を見させてもらってもいいかい？」"
translation = "「헤에…… 잠시 그 DISC를 빌려서 에스엔에스의 모습을 봐도 될까?」"

[[dialogue]]
speaker = "unk"
original = "快諾するルリエルからＤＩＳＣを受け取ったラファエロは、しばらく端末を操作すると──"
translation = "쾌히 승낙하는 루리엘에게서 DISC를 받은 라파엘로는 잠시 단말기를 조작하더니──"

[[dialogue]]
speaker = "ラファエロ"
original = "「なるほど……この機械の中に何かがあるのではなく、どこかにある空間を、この機械を通じて『みんな』が見ているんだね？」"
translation = "「과연…… 이 기계 안에 무언가가 있는 게 아니라, 어딘가에 있는 공간을 이 기계를 통해 『모두』가 보고 있는 거구나?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「だからこそ、通信端末であるＤＩＳＣを通じてそれに触れることができる、と。遠方の見知らぬ誰かと交流の輪も広げられるという寸法か！」"
translation = "「그렇기에 통신 단말기인 DISC를 통해 그것에 접할 수 있다, 인가. 원거리의 모르는 누군가와 교류의 고리도 넓힐 수 있는 방식이군!」"

[[dialogue]]
speaker = "ルリエル"
original = "「何言ってるかわからないけど、すでにルリエルよりも詳しそうなのですっ！？」"
translation = "「무슨 소린지 모르겠지만 벌써 루리엘보다 잘 아시는 것 같아요!?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふっふっふ、ぼくは天才だからね♪\u3000１を見れば１０も２０も知るというものさ」"
translation = "「훗훗훗, 나는 천재니까 말이야♪ 하나를 보면 열도 스물도 아는 법이지」"

[[dialogue]]
speaker = "ラファエロ"
original = "「エスエヌエスはアテネスにはないものだけど、非常に興味深いよ」"
translation = "「에스엔에스는 아테네스에는 없는 것이지만 무척 흥미로워」"

[[dialogue]]
speaker = "ルリエル"
original = "「先日の大活躍もありますし、ラファエロさんがＳＮＳを始めたら、一躍有名人になれちゃいますよ～」"
translation = "「요전의 대활약도 있고 하니 라파엘로 씨가 SNS를 시작하면 단숨에 유명인이 될 수 있어요~」"

[[dialogue]]
speaker = "ラファエロ"
original = "「せっかくだし、流星市国でもぼくの存在をもっと知ってもらおうかな。あかうんと？\u3000っていうのは、どうやって作ればいいんだい？」"
translation = "「이왕 이렇게 된 거 유성시국에서도 나의 존재를 좀 더 알리도록 할까. 계정? 이라는 건 어떻게 만들면 되니?」"

[[dialogue]]
speaker = "ルリエル"
original = "「それはですね～、こちらのボタンをぽちぽちっとしていただいて～。ここにお名前を……あ、本名じゃなくて大丈夫ですよ」"
translation = "「그건 말이죠~, 이쪽 버튼을 꾹꾹 누르셔서~. 여기에 이름을…… 아, 본명이 아니어도 괜찮아요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ペンネームのようなものかな？\u3000ぼくはラファエロ以外に語る名を持っていないが……まぁいいだろう。ここに入力して……うん、できたみたいだ」"
translation = "「필명 같은 건가? 나는 라파엘로 말고는 칭할 이름이 없지만…… 뭐, 상관없겠지. 여기에 입력하고…… 응, 된 것 같네」"

[[dialogue]]
speaker = "ルリエル"
original = "「次は、ルリエルのアカウントをフォローしてみてください！」"
translation = "「다음은 루리엘의 계정을 팔로우해 보세요!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「これがルリエルのアカウントだね。あ、こっちの子も見たことがあるよ。皆が揃いも揃って自分を撮っているのは……自撮りっていうのかい？」"
translation = "「이게 루리엘의 계정이구나. 아, 이 아이도 본 적 있어. 다들 하나같이 자신을 찍고 있는 건…… 셀카라고 하니?」"

[[dialogue]]
speaker = "ルリエル"
original = "「はい、自分でカメラの位置を調整するのです。可愛く撮るには結構コツがいるんですよ！」"
translation = "「네, 스스로 카메라 위치를 조정하는 거예요. 예쁘게 찍으려면 꽤 요령이 필요하다고요!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「カメラのレンズは……ここだね。斜め上からこんな感じで……」"
translation = "「카메라 렌즈는…… 여기구나. 비스듬히 위에서 이런 느낌으로……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「あごの輪郭を隠すようにして撮っているね……これがこちらの世界の流行りなのかな？」"
translation = "「턱 윤곽을 가리듯이 찍고 있네…… 이게 이쪽 세계의 유행인 걸까?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「なるほど、このポーズによって、顔を小さく見せる効果があるのか。なかなか綺麗に撮れているね」"
translation = "「과연, 이 포즈를 통해 얼굴을 작게 보이게 하는 효과가 있는 건가. 꽤 예쁘게 찍혔네」"

[[dialogue]]
speaker = "ルリエル"
original = "「おおぉ、いきなりすごく可愛いのが撮れてるのです！？\u3000ラファエロさん、はじめて自撮りしたんですよね！？」"
translation = "「오오오, 갑자기 엄청 예쁜 게 찍혔어요!? 라파엘로 씨, 처음 셀카 찍으신 거죠!?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「もちろんだよ。こんなに小型かつ高速で撮れるカメラは、アテネスにはないからね」"
translation = "「물론이지. 이렇게 소형이면서 고속으로 찍히는 카메라는 아테네스엔 없으니까」"

[[dialogue]]
speaker = "ルリエル"
original = "「初めてなのに、こんなに完璧だなんて……もう教えることは何もありませんっ！\u3000免許皆伝なのですっ！」"
translation = "「처음인데 이렇게 완벽하다니…… 이제 가르칠 게 아무것도 없어요! 면허 개전이에요!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふふ、職業柄、画面の構図にはこだわっているからね。この角度から撮れば、こう写る──自分を俯瞰で見るくらい朝飯前さ」"
translation = "「후후, 직업상 화면 구도에는 신경을 쓰고 있으니까. 이 각도에서 찍으면 이렇게 찍힌다── 자신을 부감으로 보는 것 정도는 식은 죽 먹기지」"

[[dialogue]]
speaker = "ルリエル"
original = "「これは、ハイパーインフルエンサー爆誕の予感なのです……！」"
translation = "「이건 하이퍼 인플루언서 탄생의 예감이에요……!」"

[[dialogue]]
speaker = "unk"
original = "ラファエロのアカウントに投稿された自撮りは、端正な容姿に加え、類まれな芸術センスを生かしていて、まるで１枚の絵画のようだった。"
translation = "라파엘로의 계정에 게시된 셀카는 단정한 용모에 더해 보기 드문 예술적 감각을 살리고 있어 마치 한 폭의 회화 같았다."

[[dialogue]]
speaker = "unk"
original = "その美麗さが人々の目に留まって拡散され、フォロワー数は爆発的に増加していった。"
translation = "그 미려함이 사람들의 눈에 띄어 확산되었고, 팔로워 수는 폭발적으로 증가해 갔다."

[[dialogue]]
speaker = "unk"
original = "『ラファエロ様、素敵です！』『今まで見つからなかったのが不思議でならない』『大\u3000天\u3000使\u3000降\u3000臨』"
translation = "『라파엘로 님, 멋져요!』 『지금까지 발견되지 않았던 게 이상할 정도야』 『대 천 사 강 림』"

[[dialogue]]
speaker = "ラファエロ"
original = "「『ありがとう。きみの食べているサンドイッチ、美味しそうだね。どこのお店か教えてくれると嬉しいな』っと」"
translation = "「『고마워. 네가 먹고 있는 샌드위치, 맛있어 보이네. 어느 가게인지 알려주면 기쁘겠어』라고」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふう、全てにリプ返していると、結構な時間がかかってしまうね」"
translation = "「후우, 전부에 답글을 달고 있으니 꽤 시간이 걸려 버리네」"

[[dialogue]]
speaker = "ソフィア"
original = "「ひとりひとりのアカウントを見に行って、ちゃんとリプまでするとは……これが神対応、というやつでしょうか」"
translation = "「한 명 한 명의 계정에 찾아가서 제대로 답글까지 달아주다니…… 이게 신의 대응이라는 걸까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ラファエロさんのＳＮＳ師匠として、ルリエルも鼻が高いのです！」"
translation = "「라파엘로 씨의 SNS 스승으로서 루리엘도 어깨가 으쓱해요!」"

[[dialogue]]
speaker = "unk"
original = "きめ細やかなファンサービスも相まって、こちらの世界でも鰻登りに人気を高めていくラファエロだったが──"
translation = "세심한 팬 서비스도 맞물려 이쪽 세계에서도 인기가 하늘 높은 줄 모르고 치솟는 라파엘로였지만──"

[[dialogue]]
speaker = "女性Ａ"
original = "「いつもラファエロさんのアカウント見てます！」"
translation = "「항상 라파엘로 씨 계정 보고 있어요!」"

[[dialogue]]
speaker = "女性Ｂ"
original = "「生ラファエロ様を一目見たくて遠方から来ました……！\u3000はぁ～尊い～！」"
translation = "「실물 라파엘로 님을 한 번 보고 싶어서 먼 곳에서 왔어요……! 하아~ 고귀해~!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ありがとう！\u3000わざわざ遠くから駆けつけてくれてとても嬉しいよ。ただ、あまり横に広がりすぎて、他の方の迷惑にならないように注意してね」"
translation = "「고마워! 일부러 멀리서 달려와 줘서 정말 기뻐. 다만 너무 옆으로 퍼져서 다른 분들께 폐가 되지 않도록 주의해 줘」"

[[dialogue]]
speaker = "女性Ａ"
original = "「あ、つい……すみませんっ」"
translation = "「아, 그만…… 죄송합니다!」"

[[dialogue]]
speaker = "unk"
original = "ラファエロの周りには常に人だかりができてしまい、道を塞ぐほどだ。"
translation = "라파엘로 주변에는 항상 인파가 몰려 길을 막을 정도가 되었다."

[[dialogue]]
speaker = "unk"
original = "ラファエロが訪れたパン屋は片っ端から人気になり過ぎて、捌き切れないほどの行列ができてしまい、ちょっとした社会現象にすらなっていた。"
translation = "라파엘로가 방문한 빵집은 가는 곳마다 너무 인기가 많아져서 감당할 수 없을 정도의 행렬이 생겼고, 일종의 사회 현상까지 되고 있었다."

[[dialogue]]
speaker = "unk"
original = "ちょっと人気になり過ぎたかも……"
translation = "조금 너무 인기가 많아진 걸지도……"

[[dialogue]]
speaker = "ルリエル"
original = "「ラファエロさんの居場所や情報まで特定されちゃってるみたいですねぇ。本名でやってますし……」"
translation = "「라파엘로 씨의 거처나 정보까지 특정되어 버린 것 같네요. 본명으로 하시고 계시니……」"

[[dialogue]]
speaker = "ソフィア"
original = "「この写真とか背景にお店が写っちゃってます。リアルタイムで写真を投稿するのは危険ですね……」"
translation = "「이 사진 같은 건 배경에 가게가 찍혀 버렸어요. 실시간으로 사진을 게시하는 건 위험하네요……」"

[[dialogue]]
speaker = "unk"
original = "天才でもこれは予想外だったか……"
translation = "천재라도 이건 예상 밖이었나……"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふぅ、熱烈な歓迎だったね……」"
translation = "「후우, 열렬한 환영이었어……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ラファエロさん！\u3000制服がヨレヨレになってますけど、大丈夫でしたか？」"
translation = "「라파엘로 씨! 교복이 엉망이 됐는데 괜찮으세요?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「熱烈なファンに詰め寄られたからね。これも人気者の宿命かな、ははっ」"
translation = "「열렬한 팬들이 몰려들었으니까. 이것도 인기인의 숙명이겠지, 하하」"

[[dialogue]]
speaker = "ラファエロ"
original = "「しかし、まさかこれほどの騒動になってしまうとは。ぼくとしたことがＳＮＳの影響力を過小評価していたみたいだね」"
translation = "「하지만 설마 이 정도의 소동이 될 줄이야. 나답지 않게 SNS의 영향력을 과소평가하고 있었던 모양이네」"

[[dialogue]]
speaker = "ソフィア"
original = "「うーん、このままＳＮＳを続けるのは、あまり良くないかもしれませんね……」"
translation = "「으음, 이대로 SNS를 계속하는 건 별로 좋지 않을지도 모르겠네요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「そういえば、ラファエロさんもいずれアテネスに帰られるんですよね？」"
translation = "「그러고 보니 라파엘로 씨도 언젠가는 아테네스로 돌아가시는 거죠?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「もちろんさ。向こうのみんなも、ぼくという天才の不在を嘆いているだろうし」"
translation = "「물론이지. 그쪽의 모두도 나라는 천재의 부재를 한탄하고 있을 테니까」"

[[dialogue]]
speaker = "ソフィア"
original = "「だとすると、あまりこっちの世界にラファエロさんの痕跡を残すのはよくないかもしれません」"
translation = "「그렇다면 이쪽 세계에 라파엘로 씨의 흔적을 너무 남기는 건 좋지 않을지도 몰라요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「おや？\u3000何故だい？」"
translation = "「어라? 어째서니?」"

[[dialogue]]
speaker = "ソフィア"
original = "「これ以上人気が高まってしまうと、いざいなくなった時に、ラファエロさんロスで悲しむ人が増えてしまうと思うんです」"
translation = "「인기가 더 높아져 버리면 막상 떠났을 때, 라파엘로 씨 상실감으로 슬퍼하는 사람이 늘어날 것 같거든요」"

[[dialogue]]
speaker = "unk"
original = "ＳＮＳはやめた方がいいかもしれないね"
translation = "SNS는 그만두는 게 좋을지도 모르겠네"

[[dialogue]]
speaker = "ラファエロ"
original = "「人気者すぎるのも罪深いものだね……悲しむ人が増えるのは、ぼくも望むところじゃない。残念だけど、ぼくのアカウントは抹消するとしよう」"
translation = "「너무 인기 있는 것도 죄스러운 일이구나…… 슬퍼하는 사람이 늘어나는 건 나도 바라는 바가 아니야. 아쉽지만 내 계정은 말소하도록 하지」"

[[dialogue]]
speaker = "ラファエロ"
original = "「『諸事情あって、ぼくはＳＮＳを引退する。短い間だったけれど、とても楽しかったよ。慕ってくれた皆に無上の感謝と愛を込めて。ラファエロ・サーラ』と」"
translation = "「『여러 사정이 있어 나는 SNS를 은퇴한다. 짧은 시간이었지만 정말 즐거웠어. 나를 아껴준 모두에게 무상의 감사와 사랑을 담아. 라파엘로 사라』라고」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ぽちっ」"
translation = "「꾹」"

[[dialogue]]
speaker = "ルリエル"
original = "「えっ、もう消しちゃったんですか！？」"
translation = "「엣, 벌써 지워버리신 거예요!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「お別れの言葉だけ残して、もうアカウントが消去されてます！？」"
translation = "「작별 인사만 남기고 벌써 계정이 삭제됐어요!?」"

[[dialogue]]
speaker = "unk"
original = "判断が早い！"
translation = "판단이 빨라!"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふふ、天才は引き際も弁えているものさ」"
translation = "「후후, 천재는 물러날 때도 알고 있는 법이지」"

[[dialogue]]
speaker = "unk"
original = "ラファエロのアカウントが消えた直後は、いろんな憶測が飛び交った。"
translation = "라파엘로의 계정이 사라진 직후에는 여러 추측이 난무했다."

[[dialogue]]
speaker = "unk"
original = "しかしネットの話題は熱しやすくて冷めやすく、やがて沈静化していったのだった。"
translation = "하지만 인터넷의 화제는 쉽게 달아오르고 쉽게 식는 법이라, 이윽고 진정되어 갔다."

