[[dialogue]]
speaker = "ヴィライア"
original = "『ウィステリアは確かに呪いを受け入れた……けれど、人間の娘からも魔力を感じる。何が起きたというの……？』"
translation = "『위스테리아는 확실히 저주를 받아들였다…… 하지만, 인간 소녀에게서도 마력이 느껴져. 대체 무슨 일이 일어난 거지……?』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「私１人で呪いを受け止めるのは無理でも、数分の１なら制御できる」"
translation = "「나 혼자서 저주를 받아내는 건 무리라도, 몇 분의 일이라면 제어할 수 있어」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「私が構築した術式は、魔力と呪いを本の形に分割し、その本を適合者に貸し出すもの」"
translation = "「내가 구축한 술식은, 마력과 저주를 책의 형태로 분할하고, 그 책을 적합자에게 빌려주는 것」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「ただ収蔵するだけだった『書庫』を、『図書館』に改造させてもらったってわけ」"
translation = "「그저 수장하기만 했던 『서고』를, 『도서관』으로 개조했다는 소리야」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「名付けて……う～ん、思い付かないわね。紙屋敷さんはどう？」"
translation = "「이름하여…… 음~, 떠오르지 않네. 카미야시키 씨는 어때?」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「では、魔族の無念や怨念を率いて戦う者…………魔将というのはいかがでしょうか？」"
translation = "「그럼, 마족의 무념이나 원념을 이끌고 싸우는 자………… 마장이라는 건 어떨까요?」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「いいわね、それ。さすが未来の大作家！」"
translation = "「좋네, 그거. 역시 미래의 대작가!」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「もう、おだてないでください～」"
translation = "「정말, 비행기 태우지 마세요~」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「ちなみに、書庫の呪いっていくつに分けられたんですか？\u3000私とウィステリアさんだけじゃないみたいですけど」"
translation = "「그건 그렇고, 서고의 저주는 몇 개로 나뉜 건가요? 저와 위스테리아 씨뿐만이 아닌 것 같은데요」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「『怠惰』『憤怒』『色欲』『嫉妬』『強欲』『暴食』『傲慢』──流星教が唱えた七つの大罪になぞらえて、７つに分割したわ」"
translation = "「『나태』 『분노』 『색욕』 『질투』 『탐욕』 『폭식』 『오만』 ──유성교가 주창한 7대 죄악에 빗대어 7개로 분할했어」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「魔族は奔放で、欲望に正直で、自分勝手な生き物だから、大罪なんて当てはめるのにおあつらえ向きなのよね」"
translation = "「마족은 분방하고 욕망에 솔직하며 제멋대로인 생물이니까, 대죄 같은 걸 갖다 붙이기에 안성맞춤이거든」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「紙屋敷さんにも一番相性のいい一冊──『傲慢』を貸し出したわ」"
translation = "「카미야시키 씨에게도 가장 상성이 좋은 한 권 ── 『오만』을 빌려줬어」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「わ、私が『傲慢』！？\u3000自分で言うことじゃないかもですけど、『傲慢』とは縁遠いような……」"
translation = "「제, 제가 『오만』!? 제 입으로 말할 건 아닐지도 모르겠지만, 『오만』과는 거리가 먼 것 같은데……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「さっきの啖呵、すごくよかったわ。女神様にだって譲れないって」"
translation = "「방금 전의 기세, 아주 좋았어. 여신님에게라도 양보할 수 없다고」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「あれはまさに傲慢って感じでかっこよかったわよ」"
translation = "「그건 그야말로 오만이라는 느낌이라 멋있었다구」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「は、恥ずかしいです～っ」"
translation = "「부, 부끄러워요~윽」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「恥ずかしがらなくていいのよ。強くなるには、時には傲慢さも必要だもの。むしろ紙屋敷さんはすごいんだから、もっと自惚れなさいな」"
translation = "「부끄러워할 것 없어. 강해지려면 때로는 오만함도 필요한 법이니까. 오히려 카미야시키 씨는 대단하니까 좀 더 자부심을 가져도 돼」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「が、頑張ります！」"
translation = "「가, 열심히 할게요!」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「じゃあウィステリアさんの大罪は……」"
translation = "「그럼 위스테리아 씨의 대죄는……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「『怠惰』が割り当てられたみたいね。ちゃんと社会人として働いてるし、私こそ『怠惰』とは無縁だと思うんだけど……」"
translation = "「『나태』가 할당된 모양이네. 제대로 사회인으로서 일하고 있고, 나야말로 『나태』와는 인연이 없다고 생각하지만……」"

[[dialogue]]
speaker = "ヴィライア"
original = "『英雄になる才を持ちながら、英雄になろうとしなかった。そんなあなたにはお似合いじゃないかしら』"
translation = "『영웅이 될 재능을 가졌으면서도 영웅이 되려 하지 않았다. 그런 당신에게 어울리지 않니』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「一言多いわよ、このデカドラゴン！」"
translation = "「참견이 심하네, 이 거대 드래곤!」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「さて、と。それじゃこのうるさいドラゴンを退治するとしましょうか」"
translation = "「자, 그럼. 이 시끄러운 드래곤을 퇴치해 볼까」"

[[dialogue]]
speaker = "ヴィライア"
original = "『はぁ……何をするかと思えば、書庫の分割ですって？\u3000随分な子ども騙しね。それでは私たちの求める“英雄”には程遠いわ』"
translation = "『하아…… 무얼 하나 했더니 서고의 분할이라고? 제법 아이들 장난 같네. 그런 걸로는 우리가 원하는 “영웅”에는 한참 멀었어』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「ええ、それでいいのよ。絶対の『英雄』は要らない。足りないなら、みんなで力を合わせればいい。……ね、紙屋敷さん」"
translation = "「그래, 그걸로 됐어. 절대적인 『영웅』은 필요 없어. 부족하다면 다 함께 힘을 합치면 돼. ……그렇지, 카미야시키 씨?」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "（憧れのウィステリアさんと一緒に戦えるなんて、夢みたい……ううん、夢じゃない。もっと自惚れろ）"
translation = " (동경하는 위스테리아 씨와 함께 싸울 수 있다니 꿈만 같아…… 아니, 꿈이 아니야. 좀 더 자부심을 가져) "

[[dialogue]]
speaker = "モネ（覚醒）"
original = "（私、ウィステリアさんと並ぶのに相応しい星騎士になったんだ！\u3000胸を張れ、紙屋敷モネ！！）"
translation = " (나, 위스테리아 씨와 어깨를 나란히 하기에 걸맞은 성기사가 된 거야! 가슴을 펴, 카미야시키 모네!!) "

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「『傲慢』の魔将、紙屋敷モネ、行きます！」"
translation = "「『오만』의 마장, 카미야시키 모네, 갑니다!」"

[[dialogue]]
speaker = "ヴィライア"
original = "『結局、力ずくになるのね。……いいわ、呪いに沈みなさい』"
translation = "『결국 힘으로 해결하게 되는구나. ……좋아, 저주에 잠기렴』"

[[dialogue]]
speaker = "ヴィライア"
original = "『ダークブレイズブレス』"
translation = "『다크 블레이즈 브레스』"

[[dialogue]]
speaker = "unk"
original = "魔竜の口から放たれた炎が、ウィステリアとモネを焼き焦がさんと迫る。"
translation = "마룡의 입에서 뿜어져 나온 화염이 위스테리아와 모네를 태워버릴 듯이 육박한다."

[[dialogue]]
speaker = "unk"
original = "しかしウィステリアが手をかざすと、魔導書の目が赤く輝いて炎を吹き飛ばした。"
translation = "하지만 위스테리아가 손을 내밀자, 마도서의 눈이 붉게 빛나며 화염을 날려버렸다."

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「ちゃんと魔導書のコントロールが戻ったわね。いつも呪ってくるくせに、肝心な時に役に立たないんだから、ほんと腹立たしいわ」"
translation = "「제대로 마도서의 컨트롤이 돌아왔네. 맨날 저주나 퍼부으면서 정작 중요한 때에 도움이 안 된다니까, 정말 화가 난다니까」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「さぁ、さっき寝ていた分、キリキリ働きなさい！\u3000スロウスナイトメア！」"
translation = "「자, 아까 잠자고 있던 만큼 바짝 일해! 슬로스 나이트메어!」"

[[dialogue]]
speaker = "unk"
original = "もう一度魔導書の目が怪しく光り、石になったように竜の動きが止まる。"
translation = "다시 한번 마도서의 눈이 괴이하게 빛나고, 돌이 된 것처럼 용의 움직임이 멈춘다."

[[dialogue]]
speaker = "ヴィライア"
original = "『ぐっ……！？\u3000体が、動かない……！？』"
translation = "『윽……!? 몸이 움직이지 않아……!?』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「さっき私を怠け者呼ばわりしてくれたから、あなたの動きを止めてあげたわ」"
translation = "「아까 나를 게으름뱅이라고 불러줬으니까, 네 움직임을 멈춰줬어」"

[[dialogue]]
speaker = "ヴィライア"
original = "『それなら……！』"
translation = "『그렇다면……!』"

[[dialogue]]
speaker = "unk"
original = "ウィステリアを再び拘束せんと、四方八方から呪縛の鎖が殺到する。"
translation = "위스테리아를 다시 구속하기 위해 사방팔방에서 주박의 사슬이 쇄도한다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만 ──"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「テリトリーオブオーサー！」"
translation = "「테리토리 오브 오서!」"

[[dialogue]]
speaker = "unk"
original = "モネが魔本を開くと、鎖は向きを変え、まるで命令されたかのようにヴィライアを襲う。"
translation = "모네가 마본을 펼치자 사슬은 방향을 틀어, 마치 명령받은 것처럼 빌라이아를 덮친다."

[[dialogue]]
speaker = "ヴィライア"
original = "『くっ……こざかしい！』"
translation = "『큭…… 잔재주를!』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
original = "「このまま攻めるわよ、紙屋敷さん！」"
translation = "「이대로 몰아붙이자, 카미야시키 씨!」"

[[dialogue]]
speaker = "モネ（覚醒）"
original = "「はい！\u3000司書と図書委員の連携を見せましょう！」"
translation = "「네! 사서와 도서위원의 연계를 보여주죠!」"

