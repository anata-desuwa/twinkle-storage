[[dialogue]]
speaker = "unk"
original = "ノヴァフォームへと変身したマハムート。その鍛え上げられた圧倒的力の前に、ヒルディオーネは追い詰められていた。"
translation = "노바 폼으로 변신한 마하무트. 그 단련된 압도적인 힘 앞에, 힐디 오네는 궁지에 몰려 있었다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「――引力球」"
translation = "「――인력구」"

[[dialogue]]
speaker = "unk"
original = "マハムートが指示を飛ばすように手の平をかざすと、小さな黒い球体が無数に生み出され、ヒルディオーネに襲い来る。"
translation = "마하무트가 지시를 내리듯 손바닥을 펼치자, 작은 검은 구체가 무수히 생성되어 힐디 오네를 덮쳐 온다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「くっ……！？」"
translation = "「크읏……!?」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「引力操作」"
translation = "「인력 조작」"

[[dialogue]]
speaker = "unk"
original = "なんとか回避しようと飛び回るヒルディオーネだが、マハムートの能力によって無理矢理引力球の方に引き寄せられる。しかも、どの引力球に引っ張られるか予測ができない。"
translation = "어떻게든 회피하려고 날아다니는 힐디 오네지만, 마하무트의 능력에 의해 억지로 인력구 쪽으로 끌어당겨진다. 게다가, 어느 인력구에 끌어당겨질지 예측할 수 없다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ミラージュブレイカーッ！」"
translation = "「미라지 브레이커!」"

[[dialogue]]
speaker = "unk"
original = "引力球を破壊しようと、槍のドリルを回転させて突き付ける――が、しかし。"
translation = "인력구를 파괴하려고, 창의 드릴을 회전시켜 들이댄다――하지만, 그러나."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「っ……砕けない……！」"
translation = "「……부술 수 없어……!」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「無駄よ――ブラックホールブレイザー！」"
translation = "「소용없어――블랙홀 브레이저!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「かっ……はっ……！」"
translation = "「카읏……핫……!」"

[[dialogue]]
speaker = "unk"
original = "包囲した引力球が一斉に大爆発を引き起こし、ヒルディオーネはまた地面へと落下し叩き付けられる。"
translation = "포위했던 인력구가 일제히 대폭발을 일으키고, 힐디 오네는 다시 지면으로 낙하해 내리꽂힌다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はぁ……はぁ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker = "unk"
original = "ふらつく体で、なんとか立ち上がる。"
translation = "비틀거리는 몸으로, 어떻게든 일어선다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……ヒルディオーネ、あなたの今の力は、そこまでなのかしら？」"
translation = "「……힐디 오네, 네 지금 힘은, 거기까지인 거니?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネは言葉を返すことができない。"
translation = "힐디 오네는 말을 되돌려줄 수 없다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「そう……残念ね。――引力球」"
translation = "「그래…… 유감이네. ――인력구」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ぐうぅっ……！」"
translation = "「크으윽……!」"

[[dialogue]]
speaker = "unk"
original = "マハムートの攻撃を止める手段はなく、引力操作で回避もし切れずにダメージを受け続けるヒルディオーネ。"
translation = "마하무트의 공격을 막을 수단은 없고, 인력 조작으로 완전히 회피하지도 못한 채 데미지를 계속 받는 힐디 오네."

[[dialogue]]
speaker = "unk"
original = "スチームオーバーブーストの効果はもう既に切れ、反動で体の内側からもダメージが来ており、もはや立つのもやっと。"
translation = "스팀 오버 부스트의 효과는 이미 끊겼고, 반동으로 몸의 내부에서도 데미지가 오고 있어, 이제는 서 있는 것도 겨우다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（結局、私は今この瞬間まで、覚醒に至れなかった……）"
translation = "（결국, 나는 지금 이 순간까지, 각성에 이르지 못했다……）"

[[dialogue]]
speaker = "unk"
original = "星霊舞闘会前日の夜。"
translation = "성령무투회 전날 밤."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「会長。夜遅くにお呼び立てして、申し訳ございませんわ」"
translation = "「회장. 밤늦게 불러내서, 죄송합니다」"

[[dialogue]]
speaker = "unk"
original = "大丈夫です。それで、覚醒には……"
translation = "괜찮습니다. 그래서, 각성에는……"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……残念ですが、至れませんでしたわ。掴めそうで、いつまでも手が届かない……我ながら情けない限りですわ」"
translation = "「……유감이지만, 이르지 못했어요. 잡힐 듯하면서도, 언제까지나 손이 닿지 않아…… 스스로 생각해도 한심할 따름입니다」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ですから……千園寺ヒルディオーネとしての<ruby>意地<rt>プライド</rt></ruby>を突き通すのは、ここまで」"
translation = "「그러니까요…… 치온지 힐디 오네로서의 고집을 관철하는 건, 여기까지」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私は流星寮の寮長として……３年生の先輩として、責務を果たさねばなりませんの」"
translation = "「저는 유성 기숙사의 사감으로서…… 3학년 선배로서, 책무를 다해야 합니다요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「なので、会長。お願い致しますわ……私に、アルケインコードを――」"
translation = "「그러니, 회장. 부탁드립니다와…… 제게, 아르카나 코드를――」"

[[dialogue]]
speaker = "unk"
original = "それは少し、待ってあげて下さい"
translation = "그건 조금, 기다려 주세요"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お姉様っ……！」"
translation = "「언니……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「フニ……？\u3000それに、あなた達……！」"
translation = "「후니……? 게다가, 너희들……!」"

[[dialogue]]
speaker = "unk"
original = "ヒルディオーネが振り返ると、フェニエルと――その他にも流星寮の寮生たちが大勢、ロビーに集まってきていた。"
translation = "힐디 오네가 돌아보자, 페니엘과―― 그 외에도 유성 기숙사 기숙사생들이 잔뜩, 로비에 모여 있었다."

[[dialogue]]
speaker_original = "寮生Ａ"
speaker_translation = "기숙사생 A"
original = "「ヒルディーお姉様！\u3000無理にノヴァフォームに覚醒する必要なんてございませんわ！」"
translation = "「힐디 언니! 무리하게 노바 폼으로 각성할 필요 같은 건 없습니다요!」"

[[dialogue]]
speaker_original = "寮生Ｂ"
speaker_translation = "기숙사생 B"
original = "「そうです！\u3000私たちの為に、お姉様が進もうとしている道を諦めたりなどしないで下さいまし！」"
translation = "「맞습니다! 저희를 위해서, 언니가 나아가려는 길을 포기하거나 하지 말아 주세요!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「どうしてそのことを……」"
translation = "「어떻게 그 사실을……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私と同じです。流星寮の皆さんも、お姉様が悩んでいることに気づいていたんです」"
translation = "「저와 같습니다. 유성 기숙사 여러분도, 언니가 고민하고 있다는 것을 눈치채고 있었어요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私たちはいつも、お姉様の背中を見て、流星学園の星騎士として強くなろうと励んできましたから」"
translation = "「저희는 언제나, 언니의 뒷모습을 보고, 유성 학원의 성기사로서 강해지려고 힘써 왔으니까요」"

[[dialogue]]
speaker_original = "寮生Ｃ"
speaker_translation = "기숙사생 C"
original = "「ヒルディーお姉様！\u3000星霊祭の優勝で得られるポイントなんて、お気になさらないで下さい！」"
translation = "「힐디 언니! 성령제 우승으로 얻는 포인트 같은 건, 신경 쓰지 말아 주세요!」"

[[dialogue]]
speaker_original = "寮生Ｄ"
speaker_translation = "기숙사생 D"
original = "「そんなものよりも、私たちにとっては、お姉様の方が大事なのですわ！」"
translation = "「그런 것보다, 저희에게는, 언니 쪽이 더 소중합니다요!」"

[[dialogue]]
speaker_original = "寮生Ｅ"
speaker_translation = "기숙사생 E"
original = "「私たち、お姉様には最強の星騎士への道を――自身が１番信じるやり方で進んで頂きたいのです！」"
translation = "「저희는, 언니에게 최강의 성기사로 가는 길을―― 자신이 가장 믿는 방식으로 나아가 주시기를 바랍니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "寮生Ａ"
speaker_translation = "기숙사생 A"
original = "「もしその結果、失敗して負けてしまったとしても、学園対抗杯のポイントは私たちが責任を持って集めますわ！」"
translation = "「만약 그 결과, 실패해서 져버린다고 해도, 학원 대항배 포인트는 저희가 책임지고 모을 겁니다요!」"

[[dialogue]]
speaker_original = "寮生Ｂ"
speaker_translation = "기숙사생 B"
original = "「そうですわ！\u3000お姉様が信じる道を進んで、たとえ覚醒できなかったとしても、それはきっとお姉様が次に勝利する為に、必要な失敗なんですの！」"
translation = "「맞습니다요! 언니가 믿는 길을 나아가서, 설령 각성하지 못한다고 해도, 그건 분명 언니가 다음에 승리하기 위해, 필요한 실패입니다요!」"

[[dialogue]]
speaker_original = "寮生Ｃ"
speaker_translation = "기숙사생 C"
original = "「ですから、失敗を恐れて、自分の信じる道を諦めたりしないで下さいまし、お姉様！」"
translation = "「그러니까, 실패를 두려워해서, 자신이 믿는 길을 포기하거나 하지 말아 주세요, 언니!」"

[[dialogue]]
speaker_original = "寮生Ｄ"
speaker_translation = "기숙사생 D"
original = "「お姉様はご自身の心が望むままに、全力でマムに挑んで下さいませ！」"
translation = "「언니는 자신의 마음이 원하는 대로, 전력으로 마무에게 도전해 주세요!」"

[[dialogue]]
speaker_original = "寮生Ｅ"
speaker_translation = "기숙사생 E"
original = "「私たちは――お姉様がお姉様らしく、いちばんカッコよく戦う姿が見たいのですわ！！」"
translation = "「저희는―― 언니가 언니답게, 가장 멋있게 싸우는 모습이 보고 싶습니다요!!」"

[[dialogue]]
speaker_original = "寮生Ａ"
speaker_translation = "기숙사생 A"
original = "「お姉様ーーーっ！！！」"
translation = "「언니ーーー!!!」"

[[dialogue]]
speaker_original = "寮生Ｂ"
speaker_translation = "기숙사생 B"
original = "「頑張ってーーーっ！！！」"
translation = "「힘내세요ーーー!!!」"

[[dialogue]]
speaker = "unk"
original = "マハムートの容赦ない猛攻の中で、ヒルディオーネの意識を繋ぎ止めたのは、観客席から見守る寮生たちの声援だった。"
translation = "마하무트의 용서 없는 맹공 속에서, 힐디 오네의 의식을 붙잡아 둔 것은, 관객석에서 지켜보는 기숙사생들의 응원이었다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고――"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お姉様ぁぁぁーーーっ！！\u3000諦めないで下さいっ！！」"
translation = "「언니이이ーーー!! 포기하지 마세요!」"

[[dialogue]]
speaker = "unk"
original = "普段はあまり大きな声を出さないフェニエルも、全力で応援していた。"
translation = "평소에는 그다지 큰 소리를 내지 않는 페니엘도, 전력으로 응원하고 있었다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「…………マム」"
translation = "「…………마무」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私には……あなたのような突き抜けた才能はありませんわ」"
translation = "「제게는…… 당신 같은 뛰어난 재능은 없습니다와」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……それで？」"
translation = "「……그래서?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「っ……どれだけ努力しても、追いつけない」"
translation = "「……아무리 노력해도, 따라잡을 수 없어」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「だけど、私……絶対に諦められませんの」"
translation = "「하지만, 저…… 절대로 포기할 수 없습니다요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私を信じて、こんなにも応援してくれる子たちがいるんですもの」"
translation = "「저를 믿고, 이렇게나 응원해 주는 아이들이 있는걸요」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あの子たちが信じてくれる限り――」"
translation = "「저 아이들이 믿어주는 한――」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私は、決して――」"
translation = "「저는, 결코――」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「自分を信じるのを、最後まで諦めるわけにはいかないのですわ！！！」"
translation = "「자신을 믿는 것을, 끝까지 포기할 수는 없는 것입니다요!!!」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……ええ、知っている。だから――」"
translation = "「……그래, 알고 있어. 그러니까――」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「畏怖をもって、今からでも追いついてみせなさい！\u3000千園寺ヒルディオーネっ！！」"
translation = "「외경심을 가지고, 지금부터라도 따라잡아 보렴! 치온지 힐디 오네!!」"

[[dialogue]]
speaker = "unk"
original = "マハムートが口を開く。そこに強大な星力が紅蓮の炎色を帯びて、収束して行く。"
translation = "마하무트가 입을 연다. 그곳에 강대한 성력이 홍련의 불꽃 색을 띠며, 수렴해 간다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「ドラゴニックノヴァフレアッ！！！」"
translation = "「드래고닉 노바 플레어!!!」"

[[dialogue]]
speaker = "unk"
original = "それは竜形態の時に見せたものよりも遥かに鋭く、高密度のレーザーのような、竜の<ruby>息吹<rt>ブレス</rt></ruby>。"
translation = "그것은 용 형태일 때 보여주었던 것보다 훨씬 날카롭고, 고밀도의 레이저 같은, 용의 숨결."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「はああぁぁぁーーーっ！！！」"
translation = "「하아아아아ーーー!!!」"

[[dialogue]]
speaker = "unk"
original = "引力操作によって、その場に強制固定されたヒルディオーネは、それを槍で真正面から受け止める。"
translation = "인력 조작에 의해, 그 자리에 강제 고정된 힐디 오네는, 그것을 창으로 정면에서 받아낸다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ぐううぅっ！！」"
translation = "「크으으윽!!」"

[[dialogue]]
speaker = "unk"
original = "全力でドリルを回転させ、マハムートの炎を無効化しようとする。"
translation = "전력으로 드릴을 회전시켜, 마하무트의 불꽃을 무효화하려고 한다."

[[dialogue]]
speaker = "unk"
original = "だが、高密度の炎を貫くことは叶わず――ピシッと嫌な音と共に、槍に大きな亀裂が走る。"
translation = "하지만, 고밀도의 불꽃을 꿰뚫는 것은 이루지 못하고―― 쩍, 하고 불길한 소리와 함께, 창에 커다란 균열이 생긴다."

[[dialogue]]
speaker = "unk"
original = "それでも――"
translation = "그럼에도――"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「諦めませんわ……！\u3000絶対に……っ！！」"
translation = "「포기하지 않습니다요……! 절대로……!!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お姉様ーーーっ！\u3000自分を信じてっ！！」"
translation = "「언니ーーー! 자신을 믿으세요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「けっぱるべーーーっ！！！」"
translation = "「열심히 하자ーーー!!!」"

[[dialogue]]
speaker = "unk"
original = "フェニエルが――後輩たちが信じてくれる自分を、決して諦めない。"
translation = "페니엘이―― 후배들이 믿어주는 자신을, 결코 포기하지 않는다."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私は――」"
translation = "「저는――」"

[[dialogue]]
speaker = "unk"
original = "千園寺ヒルディオーネは、立ちはだかる圧倒的力を前に、決して目を逸らさない！"
translation = "치온지 힐디 오네는, 가로막는 압도적인 힘 앞에서, 결코 눈을 돌리지 않는다!"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私の不可能を、打ち砕いてみせますわっ！！」"
translation = "「저의 불가능을, 부숴 보이겠습니다요!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ミラージュ――ブレイカァァァーーーッ！！！」"
translation = "「미라지―― 브레이커어어어ーーー!!!」"

[[dialogue]]
speaker = "unk"
original = "大爆発が起き、ヒルディオーネの体が炎に飲み込まれていく。"
translation = "대폭발이 일어나, 힐디 오네의 몸이 불꽃에 휩싸여 간다."

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お姉様……！」"
translation = "「언니……!」"

[[dialogue]]
speaker = "unk"
original = "アリーナの全員が目撃する。"
translation = "아레나의 전원이 목격한다."

[[dialogue]]
speaker = "unk"
original = "炎の中から、羽化する蝶のように新たな一対の羽が生まれて、４枚の翼が広がるのを。"
translation = "불꽃 속에서, 우화하는 나비처럼 새로운 한 쌍의 날개가 태어나, 네 장의 날개가 펼쳐지는 것을."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고――"

[[dialogue]]
speaker = "unk"
original = "極星は白昼に輝く。"
translation = "극성은 대낮에 빛난다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「壁を……やっと打ち砕きましたわ」"
translation = "「벽을…… 겨우 부쉈습니다요」"

[[dialogue]]
speaker = "unk"
original = "――そこには、新たな戦闘服に身を纏ったヒルディオーネが立っていた。"
translation = "――그곳에는, 새로운 전투복을 몸에 두른 힐디 오네가 서 있었다."

[[dialogue]]
speaker = "unk"
original = "ヒビ割れて砕けた槍の破片が、地面に落ちていく。その下からは、進化した新たな槍が姿を現す。"
translation = "금이 가고 부서진 창의 파편이, 지면에 떨어진다. 그 아래에서는, 진화한 새로운 창이 모습을 드러낸다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「……私、もし自分で覚醒することができたら、決めていましたの。新フォームの名前を」"
translation = "「……저, 만약 스스로 각성할 수 있다면, 정해뒀습니다요. 새 폼의 이름을」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「流星寮の寮長として、あなたのノヴァフォームの対となる――」"
translation = "「유성 기숙사의 사감으로서, 당신의 노바 폼의 짝이 될――」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「『ミーティアフォーム』。それが、この新たな姿の名前ですわ」"
translation = "「『미티어 폼』. 그것이, 이 새로운 모습의 이름입니다요」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「……ふっ」"
translation = "「……훗」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「そう……なら、ここからが本番ね」"
translation = "「그래…… 그럼, 지금부터가 본 게임이네」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「来なさい――千園寺ヒルディオーネ！！」"
translation = "「덤벼 보렴―― 치온지 힐디 오네!!」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ええ。参りますわ――妃竜院マハムートッ！！」"
translation = "「네. 가겠습니다요―― 히류인 마하무트!!」"

[[dialogue]]
speaker = "unk"
original = "果たして、千園寺ヒルディオーネは覚醒した力をもって、再び妃竜院マハムートへと勝負を挑むのだった――"
translation = "과연, 치온지 힐디 오네는 각성한 힘을 가지고, 다시 히류인 마하무트에게 승부를 거는 것이었다――"

