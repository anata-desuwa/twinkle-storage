[[dialogue]]
speaker = "unk"
original = "トワ先生たちの花嫁修業を終え、しばらく経った。"
translation = "토와 선생님 일행의 신부 수업을 마치고 얼마간의 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "先生のウェディングフォームには何の変化もなく、小康状態を保っている。"
translation = "선생님의 웨딩 폼에는 아무런 변화도 없이 소강상태를 유지하고 있다."

[[dialogue]]
speaker = "unk"
original = "焦る必要なんてない。そう思っていたけれど、周囲はそれを許してくれなかった。"
translation = "서두를 필요 따위 없다. 그렇게 생각하고 있었지만 주변은 그것을 허락하지 않았다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それじゃあ、質問ある人ー」"
translation = "「그럼 질문 있는 사람ー」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「はいはいはーい！\u3000トワちゃんの結婚式はいつやるんですかー？」"
translation = "「네네네ー! 토와 짱 결혼식은 언제 하나요ー?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「けけけ、結婚！？\u3000そんな話ありませんよ！」"
translation = "「겨겨겨, 결혼!? 그런 이야기 없어요!」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「またまた～！\u3000トワちゃんがウェディングフォームになったって、噂になってますよ」"
translation = "「또 또 그런다~! 토와 짱이 웨딩 폼이 됐다고 소문 다 났다구요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「と、とにかく今は授業中ですから！\u3000関係のない質問はしないで下さい！」"
translation = "「어, 어쨌든 지금은 수업 중이니까! 관련 없는 질문은 하지 마세요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「どどど、どうしよう、会長くん！\u3000みんなに知られちゃってるみたい！」"
translation = "「어어어어떡해, 회장 군! 모두에게 알려진 모양이야!」"

[[dialogue]]
speaker = "unk"
original = "どこかで見られてたのかな？"
translation = "어디선가 본 사람이 있었나?"

[[dialogue]]
speaker = "unk"
original = "トワ先生のウェディング姿"
translation = "토와 선생님의 웨딩 차림"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「かもしれないね。その情報が広まったと考えるしか……」"
translation = "「그럴지도 몰라. 그 정보가 퍼졌다고 생각할 수밖에……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「フィオナちゃんの事件のことも知ってる人が多いから、結婚式って話が出てきたんだと思うけど」"
translation = "「피오나 짱 사건을 아는 사람도 많으니까 결혼식 이야기가 나온 거라고 생각하지만」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ねえ、やっぱり疑似結婚式、やらなきゃダメかなぁ？」"
translation = "「있잖아, 역시 유사 결혼식 해야만 할까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やっぱりトワちゃん先生は気が乗りませんか？」"
translation = "「역시 토와 짱 선생님은 내키지 않으세요?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「……うん。結婚式に憧れはあったけど、嘘つくみたいなのはちょっとね……」"
translation = "「……응. 결혼식에 동경은 있었지만 거짓말하는 것 같은 건 좀……」"

[[dialogue]]
speaker = "unk"
original = "でもずっとこのままじゃよくない"
translation = "하지만 계속 이대로 있는 건 좋지 않아"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わかってる。だからわたしもＯＫしたんだし……ごめんね、土壇場になってもにょもにょしちゃって」"
translation = "「알아. 그래서 나도 OK 한 거고…… 미안해, 막판에 와서 우물쭈물해서」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「よーし、気を取り直すよ！\u3000やる、結婚式やってやる！\u3000会長くんも心の準備はいい？」"
translation = "「좋ー아, 마음 다잡았어! 할게, 결혼식 해버릴 거야! 회장 군도 마음의 준비는 됐어?」"

[[dialogue]]
speaker = "unk"
original = "俺は２回目だから平気"
translation = "난 두 번째라 괜찮아"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それはなんと言うか、すごく最低な感じがするね……」"
translation = "「그건 뭐랄까, 굉장히 최악인 느낌이 드네……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんのことは責められないよ。フィオナちゃんたちの時も今回も、会長くんは巻き込まれただけだもん」"
translation = "「회장 군을 탓할 순 없어. 피오나 짱 일행 때도 이번에도 회장 군은 휘말린 것뿐인걸」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「むしろ、何度もこんなことさせちゃってごめんね。会長くんだって、本物の結婚式を大事にしたいはずだよね」"
translation = "「오히려 몇 번이나 이런 일을 하게 해서 미안해. 회장 군도 진짜 결혼식을 소중히 여기고 싶을 텐데」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「でも、会長くんが頑張るって言ってくれたから。わたしはもう躊躇わないよ」"
translation = "「하지만 회장 군이 노력하겠다고 말해줬으니까. 난 이제 주저하지 않을게」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「トワちゃん先生……」"
translation = "「토와 짱 선생님……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「行こう、イレーナちゃんが待ってる」"
translation = "「가자, 이레이나 짱이 기다리고 있어」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「皆さま、お待ちしておりました。こちらの準備は全て整っております」"
translation = "「여러분, 기다리고 있었습니다. 이쪽의 준비는 모두 끝났습니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「が、しかし……まさかこのようなことがまた起こるとは正直思っていませんでした」"
translation = "「하, 하지만…… 설마 이런 일이 또 일어날 줄은 솔직히 생각지도 못했습니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「たとえそれが星騎士の使命を果たすためとは言え、偽りの愛の誓いに加担することになろうとは……」"
translation = "「비록 그것이 성기사의 사명을 다하기 위해서라고는 해도 거짓된 사랑의 맹세에 가담하게 되다니……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ごめんねイレーナちゃん、迷惑かけちゃって」"
translation = "「미안해 이레이나 짱, 폐를 끼쳐서」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「謝らないで下さい。聞いたところによると、事情は前回とほぼ同じみたいですから」"
translation = "「사과하지 마세요. 듣기로는 사정이 지난번과 거의 똑같은 모양이니까요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ただ……そうですね、会長さん、少しこちらへ」"
translation = "「다만…… 그렇죠, 회장님, 잠시 이쪽으로」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっとあんた、一体どうなってるのよ？\u3000フィオナ会長たちと集団結婚式を挙げたと思ったら、今度はトワ先生とですって？」"
translation = "「잠깐 당신, 대체 어떻게 된 거야? 피오나 회장 일행이랑 집단결혼식을 올렸나 싶더니 이번에는 토와 선생님이랑?」"

[[dialogue]]
speaker = "unk"
original = "蔑むような目で見るのはやめて"
translation = "멸시하는 눈으로 보는 건 그만둬"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「トワ先生は前回の事件にも関わってるし、納得してのことだと思うから大丈夫だと思うけど……」"
translation = "「토와 선생님은 지난번 사건에도 관여했었고 납득하고 하시는 거니까 괜찮을 거라고 생각하지만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもあんた、こんなことばっかりしてるといつか刺されるわよ」"
translation = "「하지만 당신, 이런 짓만 골라 하다가는 언젠가 칼 맞을 줄 알아」"

[[dialogue]]
speaker = "unk"
original = "はい、肝に銘じておきます"
translation = "네, 명심하겠습니다"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ、もう……本当に気をつけなさいよね」"
translation = "「하아, 정말…… 부디 조심해」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……では、皆さんお待たせしました。お時間がないとのことですので、さっそく始めてしまいましょう」"
translation = "「……그럼 여러분 오래 기다리셨습니다. 시간이 없다고 하시니 바로 시작하죠」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それでは新郎新婦、こちらに」"
translation = "「그럼 신랑 신부, 이쪽으로」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新郎緋宮クロト。あなたは有明トワを妻とし、健やかなる時も病める時も、富める時も貧しき時も、彼女を愛し、慈しむことを誓いますか？」"
translation = "「신랑 히노미야 쿠로토. 당신은 아리아케 토와를 아내로 맞이하여 건강할 때나 아플 때나, 부유할 때나 가난할 때나 그녀를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "unk"
original = "……誓います"
translation = "……맹세합니다"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「新婦有明トワ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も、彼を愛し、慈しむことを誓いますか？」"
translation = "「신부 아리아케 토와. 당신은 히노미야 쿠로토를 남편으로 맞이하여 건강할 때나 아플 때나, 부유할 때나 가난할 때나 그를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「え、ええとっ……そのぉ……」"
translation = "「어, 어에또…… 그게……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「神の前で誓えないのであれば、無理しなくても構いません。それがあなたの意思なのですから」"
translation = "「신 앞에서 맹세할 수 없다면 무리하지 않으셔도 됩니다. 그것이 당신의 의사일 테니까요」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「い、いえ！\u3000ちょっと緊張しちゃっただけなので大丈夫です！」"
translation = "「아, 아니요! 조금 긴장했을 뿐이라 괜찮아요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ごめんね……クロトくん。今だけは、その、名前で呼ばせてもらうから」"
translation = "「미안해…… 쿠로토 군. 지금만큼은 그, 이름으로 부를게」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「結婚の誓いも全然嫌とかじゃなくて、いよいよだって思ったら緊張して言葉が出て来なくなっただけ。だから、もう一度きちんとさせて……」"
translation = "「결혼 맹세도 전혀 싫은 게 아니라 드디어 때가 왔다고 생각하니 긴장해서 말이 안 나왔을 뿐이야. 그러니까 다시 한번 제대로 하게 해줘……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「わたし、有明トワは、緋宮クロトくん、を……夫とし、健やかなる時も病める時も、富める時も貧しき時も、彼を愛し、慈しむことを――」"
translation = "「나, 아리아케 토와는 히노미야 쿠로토 군을…… 남편으로 맞이하여 건강할 때나 아플 때나, 부유할 때나 가난할 때나 그를 사랑하고 아낄 것을──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ちょっと待ったぁーーーーっ！！」"
translation = "「잠깐만 기다려ーーーー!!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「残念だったわね！\u3000この婚礼、認めるわけにはいかないわ！」"
translation = "「유감이었네! 이 혼례, 인정할 수 없어!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ふえっ？\u3000ヨミちゃんに蘭美ちゃん！？」"
translation = "「후에? 요미 짱에 라비 짱!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何事ですか、神聖な式の最中ですよ！」"
translation = "「무슨 일입니까, 신성한 식 도중이라구요!」"

[[dialogue]]
speaker = "unk"
original = "ふ、２人ともどうしたの？"
translation = "두, 둘 다 왜 그래?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長との結婚を望んでいるのはトワ先生だけではないということよ！」"
translation = "「회장과의 결혼을 바라는 건 토와 선생님뿐만이 아니라는 거야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そ、そうですっ！\u3000私達も会長と結婚式を挙げるんです！」"
translation = "「그, 그렇습니다! 저희도 회장과 결혼식을 올릴 거예요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ～、そうですかそうですか。会長さん、まーた今回も１人じゃないんですね。トワ先生以外に２人もその気にさせちゃってる、と……」"
translation = "「아~ 그렇습니까 그렇습니까. 회장님, 또 이번에도 혼자가 아니시군요. 토와 선생님 말고도 두 명이나 더 그럴 마음이 들게 했다니……」"

[[dialogue]]
speaker = "unk"
original = "こ、これは予定外の展開で……！"
translation = "이, 이건 예정 밖의 전개라……!"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そうだよ！\u3000２人のは人工戦闘服だよね？\u3000だから結婚式を挙げなくても問題なくて……」"
translation = "「그래! 둘의 옷은 인공 전투복이잖아? 그러니까 결혼식을 올리지 않아도 문제없을 텐데……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「何を甘いことを言っているのかしら？\u3000それとも忘れてしまったの？\u3000会長を巡る戦いは、まだ続いているってことをね！」"
translation = "「무슨 무른 소리를 하는 걸까? 아니면 잊어버린 거야? 회장을 둘러싼 싸움은 아직 계속되고 있다는 걸 말이야!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長と結婚式を挙げて、幸せになるのは私達ですっ！」"
translation = "「회장과 결혼식을 올리고 행복해지는 건 저희예요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えええーーーっ！？」"
translation = "「에에에ーー엣!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの対決、まだ続いてたんだ……」"
translation = "「그 대결, 아직 이어지고 있었구나……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だってまだ決着がついていないでしょう？\u3000それにしてもやるわね、私としたことが危うく先を越されてしまうところだったわ」"
translation = "「그야 아직 결판이 나지 않았잖아? 그나저나 제법인데, 나조차 하마터면 선수 뺏길 뻔했어」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうですよ、抜け駆けなんてさせませんから！」"
translation = "「맞아요, 가로채게 두지 않을 거니까요!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、そんなつもりじゃ……」"
translation = "「그, 그럴 생각은 아니었는데……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「隙ありっ！」"
translation = "「빈틈 발견!」"

[[dialogue]]
speaker = "unk"
original = "うわっ！！？"
translation = "우와앗!!?"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんっ！」"
translation = "「회장군!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふふふ、花婿は頂いていくわ！\u3000結婚式を挙げたければ力づくで取り返すことねっ！」"
translation = "「후후후, 신랑은 내가 데려가겠어! 결혼식을 올리고 싶으면 힘으로 되찾아 보시지!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それではお邪魔しました～っ！」"
translation = "「그럼 실례했습니다~!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「か、会長くーーーーーーーーんっ！！！！！！」"
translation = "「회, 회장구우우우우우우우우운!!!!!!!!!」"

