[[dialogue]]
speaker = "フィオナ"
original = "「ふぅ、クルセイダースの皆さんがご一緒だとやはり心強いですね」"
translation = "「후우, 크루세이더스 분들이 함께 계시니 역시 든든하네요」"

[[dialogue]]
speaker = "リア"
original = "「できれば、もっと他の戦いで力になってあげたかったけどな……」"
translation = "「가능하다면, 좀 더 다른 싸움에서 힘이 되어주고 싶었는데 말이야……」"

[[dialogue]]
speaker = "聖沙"
original = "「みんなが私たちの世界に来た時よりよっぽどバカらしい理由で戦うことになって恥ずかしいわ……」"
translation = "「모두가 우리 세계에 왔을 때보다 훨씬 바보 같은 이유로 싸우게 되어서 부끄러워……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「大変よ！\u3000流星市国の各地でモンスターが大量発生してるって報告が……！」"
translation = "「큰일이야! 유성 시국의 각지에서 몬스터가 대량 발생하고 있다는 보고가……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「マズいじゃないですかぁ！\u3000ハレンチパンダさんを追いかけている場合じゃありませんよぉ！」"
translation = "「큰일이잖아요오! 하이레그 팬더 씨를 쫓고 있을 때가 아니에요오!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いえ、それが……。どうやら出現したモンスターは皆パンダのぬいぐるみの姿をしていて、巨乳の女性にセクハラして回っているようなの」"
translation = "「아니, 그게……. 아무래도 출현한 몬스터는 모두 팬더 인형의 모습을 하고 있고, 거유 여성에게 성희롱을 하고 돌아다니는 것 같아」"

[[dialogue]]
speaker = "聖沙"
original = "「パッキーさんが増殖してるってこと！？\u3000それはそれで大変だわ……！」"
translation = "「팟키 씨가 증식하고 있다는 거야!? 그건 그거대로 큰일이네……!」"

[[dialogue]]
speaker = "リア"
original = "「このままじゃ大勢の女性に心の傷を残しちゃう……！\u3000早くどうにかしなくちゃ……！」"
translation = "「이대로라면 많은 여성들에게 마음의 상처를 남기겠어……! 빨리 어떻게든 해야 해……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「──！\u3000皆さん気を付けてください！、近くにアステラの反応です！」"
translation = "「──! 여러분 조심하세요! 근처에 아스테라의 반응입니다!」"

[[dialogue]]
speaker = "リア"
original = "「アステラ？」"
translation = "「아스테라?」"

[[dialogue]]
speaker = "フィオナ"
original = "「モンスターの巣のことです。このタイミング……恐らく目的の相手はアステラの奥に」"
translation = "「몬스터의 둥지 말입니다. 이 타이밍…… 아마 목적의 상대는 아스테라 깊숙한 곳에」"

[[dialogue]]
speaker = "聖沙"
original = "「なら行きましょ。パッキーさんを連れ戻さなくちゃ」"
translation = "「그럼 가자. 팟키 씨를 데려와야 해」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「危険よ！\u3000アステラの力で凶暴化しててもおかしくないわ。ここはアステラに慣れてる私たちだけで──」"
translation = "「위험해! 아스테라의 힘으로 흉포화되어 있어도 이상하지 않아. 여기는 아스테라에 익숙한 우리들만으로──」"

[[dialogue]]
speaker = "リア"
original = "「そんなわけにはいかないよ。私たちも一緒に戦わせて！」"
translation = "「그럴 수는 없어. 우리도 함께 싸우게 해줘!」"

[[dialogue]]
speaker = "聖沙"
original = "「こっちの世界ではクルセイダースは大昔の英雄なんでしょ？\u3000なら英雄らしいところを見せてあげなくちゃ」"
translation = "「이쪽 세계에서는 크루세이더스는 아주 먼 옛날의 영웅이잖아? 그럼 영웅다운 모습을 보여줘야지」"

[[dialogue]]
speaker = "リア"
original = "「うんうん♪\u3000後輩たちに任せて高見の見物なんて、英雄らしくも先輩らしくもないもんね♪」"
translation = "「응응♪ 후배들에게 맡기고 높은 곳에서 구경이나 하는 건, 영웅답지도 선배답지도 않잖아♪」"

[[dialogue]]
speaker = "unk"
original = "流星クルセイダースが一緒なら安心だ"
translation = "유성 크루세이더스가 함께라면 안심이다"

[[dialogue]]
speaker = "リア"
original = "「大船に乗ったつもりで頼ってくれていいゾ♪\u3000先輩に任せなさ～い」"
translation = "「큰 배에 탄 셈 치고 의지해도 돼♪ 선배에게 맡기렴～」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よし、なら全員で突撃しましょ！\u3000これ以上、セクハラパンダの好きにはさせないわ！」"
translation = "「좋아, 그럼 전원 돌격하자! 더 이상, 성희롱 팬더 마음대로 하게 두지 않겠어!」"

[[dialogue]]
speaker = "unk"
original = "ああ──行こう！"
translation = "아아── 가자!"

[[dialogue]]
speaker = "？？？"
original = "「ククク……とびっきりムフフな世界だぜ。どこを見てもデカパイばっかで最高じゃねえか」"
translation = "「크크크…… 아주 무훗한 세계로군. 어디를 봐도 큰 가슴뿐이라 최고 아니냐」"

[[dialogue]]
speaker = "フィオナ"
original = "「どこからか声が……！」"
translation = "「어디선가 목소리가……!」"

[[dialogue]]
speaker = "聖沙"
original = "「やっぱりここにいたのね、パッキーさん！」"
translation = "「역시 여기에 있었네, 팟키 씨!」"

[[dialogue]]
speaker = "リア"
original = "「元の世界に帰るよ！\u3000これ以上、可愛い後輩たちに迷惑かけちゃメっなんだから！」"
translation = "「원래 세계로 돌아가자! 더 이상, 귀여운 후배들에게 폐를 끼치면 안 되니까!」"

[[dialogue]]
speaker = "？？？"
original = "「おっと、これはこれはリアちゃんにヒス。現れると思ってたぜ」"
translation = "「오옷, 이거 이거 리아짱에 히스. 나타날 줄 알았다」"

[[dialogue]]
speaker = "聖沙"
original = "「勿体ぶってないで姿を見せなさい！\u3000隠れても無駄よ！」"
translation = "「폼 잡지 말고 모습을 보여! 숨어도 소용없어!」"

[[dialogue]]
speaker = "？？？"
original = "「隠れる？\u3000ククク、隠れる必要なんてないぜ！\u3000俺様はこの世界に来て、サイキョーの力を手に入れたんだ！」"
translation = "「숨어? 크크크, 숨을 필요 따위 없어! 오레사마는 이 세계에 와서, 최강의 힘을 손에 넣었다!」"

[[dialogue]]
speaker = "？？？"
original = "「今こそ見せてやるぜ！\u3000この世界に来て覚醒した俺様の姿を！」"
translation = "「지금이야말로 보여주마! 이 세계에 와서 각성한 오레사마의 모습을!」"

[[dialogue]]
speaker = "パッキー"
original = "「刮目しな！\u3000これが大賢者パッキーさまの真の姿だ！」"
translation = "「괄목하라! 이것이 대현자 팟키 님의 진정한 모습이다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひゃひ！？\u3000なんて大きさですぅ！？\u3000手の平サイズのぬいぐるみさんって話でしたよね！？」"
translation = "「햣히!? 이게 무슨 크기예요오!? 손바닥 크기의 인형 씨라고 했잖아요!?」"

[[dialogue]]
speaker = "聖沙"
original = "「で、でも可愛い……！\u3000大きくなってキュートさも倍増だわ……！\u3000お腹の上に寝転がってお昼寝してみたいっ……！」"
translation = "「그, 그래도 귀여워……! 커져서 귀여움도 배가 되었어……! 배 위에 드러누워서 낮잠 자고 싶어……!」"

[[dialogue]]
speaker = "パッキー"
original = "「ククク、この力があれば憧れのリアちゃんのおっぱいを好き放題揉み回すことも夢じゃないぜ！」"
translation = "「크크크, 이 힘이 있다면 동경하던 리아짱의 가슴을 마음껏 주무르는 것도 꿈이 아니지!」"

[[dialogue]]
speaker = "リア"
original = "「もぉっ！\u3000そんなことしたらシン君に言いつけちゃうゾっ！」"
translation = "「모오! 그런 짓 하면 신 군에게 일러바칠 거야!」"

[[dialogue]]
speaker = "パッキー"
original = "「そこでシン様の名前を出すのはズルいぜ、リアちゃん！\u3000せっかくこんな力を手に入れたっていうのによ～！」"
translation = "「거기서 신 님의 이름을 꺼내는 건 치사하지, 리아짱! 모처럼 이런 힘을 손에 넣었는데 말이야～!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれが大賢者パッキー……。まぬけな姿だけど、油断ならないわね……」"
translation = "「저게 대현자 팟키……. 얼빠진 모습이지만, 방심할 수 없겠네……」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい……大きさに見合うだけの強大な力を感じます」"
translation = "「네…… 크기에 걸맞은 강대한 힘을 느낍니다」"

[[dialogue]]
speaker = "パッキー"
original = "「おおっ！！\u3000これまた巨乳のねーちゃんがっ！\u3000リアちゃんが無理なら──」"
translation = "「오오옷!! 또 거유 누나가! 리아짱이 무리라면──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「きゃっ！？\u3000触ったら殺すわよ！？」"
translation = "「꺅!? 만지면 죽여 버릴 거야!?」"

[[dialogue]]
speaker = "パッキー"
original = "「そー言うなよ～。俺様とお茶でも行こうぜ。大人の愛撫ってのを教えてやるよ」"
translation = "「그렇게 말하지 마～。 오레사마랑 차라도 마시러 가자고. 어른의 애무라는 걸 가르쳐 줄게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「結構よ！」"
translation = "「됐어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「わ、私のことは無視ですか！\u3000来るなら来なさい、女の敵！」"
translation = "「저, 저를 무시하는 건가요! 올 테면 오세요, 여자의 적!」"

[[dialogue]]
speaker = "パッキー"
original = "「あ～……。そこそこの大きさみたいだが、ワイヤー入りブラを使って無理くり谷間を作ってるようじゃ俺様のお眼鏡には敵わねえぜ！」"
translation = "「아～……. 그럭저럭 큰 것 같지만, 와이어 브라를 써서 억지로 가슴골을 만들고 있는 꼴로는 오레사마의 안목에는 차지 않는다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「なっ──！？」"
translation = "「나──!?」"

[[dialogue]]
speaker = "パッキー"
original = "「あぁ、可哀想に。おっぱいが苦しいって泣いてるぜぇ～？」"
translation = "「아아, 불쌍하게도. 가슴이 괴롭다고 울고 있잖아아～?」"

[[dialogue]]
speaker = "ルリエル"
original = "「フィオナ会長ぉ！？\u3000くそお、わたしが相手です！」"
translation = "「피오나 회장님!? 젠장, 제가 상대예요오!」"

[[dialogue]]
speaker = "パッキー"
original = "「ツルペタは引っ込んでな！」"
translation = "「절벽은 썩 물러나!」"

[[dialogue]]
speaker = "ルリエル"
original = "「少なくともフィオナ会長とはそこまで負けてませんっ！\u3000あとどちらかというとツルペタはソフィアの方です！」"
translation = "「적어도 피오나 회장님과는 그렇게까지 지지 않았어요! 그리고 어느 쪽이냐면 절벽은 소피아 쪽이에요!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ルリエルっ！？」"
translation = "「루리엘!?」"

[[dialogue]]
speaker = "聖沙"
original = "「ああっ！？\u3000フィオナさんが味方に追撃されたわ……！\u3000先輩、早くなんとかしないと……！」"
translation = "「아앗!? 피오나 씨가 아군에게 추격당했어……! 선배, 빨리 어떻게든 해야 해……!」"

[[dialogue]]
speaker = "リア"
original = "「そこまでだよ、パーちゃんっ！\u3000痛い思いをしたくないなら大人しくして！」"
translation = "「거기까지야, 파짱! 아픈 경험을 하고 싶지 않다면 얌전히 있어!」"

[[dialogue]]
speaker = "パッキー"
original = "「それはできない相談だぜ。まだ見ぬ巨乳が俺様を待ってんだ！\u3000こうなったのも全部……リアちゃんが振り向いてくれないから悪いんだぜ！」"
translation = "「그건 들어줄 수 없는 부탁이다. 아직 보지 못한 거유가 오레사마를 기다리고 있다! 이렇게 된 것도 전부…… 리아짱이 돌아봐 주지 않아서 잘못된 거다!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「その気配……やはりあなたもリクリエの影響を受けているようですね」"
translation = "「그 기운…… 역시 당신도 리크리에의 영향을 받고 있는 것 같네요」"

[[dialogue]]
speaker = "聖沙"
original = "「そうは言っても……」"
translation = "「그렇게 말해도……」"

[[dialogue]]
speaker = "リア"
original = "「いつもとあまり変わってない、かな……あはは」"
translation = "「평소랑 별로 다르지 않은, 걸까…… 아하하」"

[[dialogue]]
speaker = "マグダレナ"
original = "「リクリエの影響とあらば容赦いたしません。あなたの存在は世界の境界を大きく乱します──領域を司る天使として成敗します」"
translation = "「리크리에의 영향이라면 용서하지 않겠습니다. 당신의 존재는 세계의 경계를 크게 어지럽힙니다── 영역을 관장하는 천사로서 성패하겠습니다」"

[[dialogue]]
speaker = "パッキー"
original = "「こ、こりゃあ……」"
translation = "「이, 이거어……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「？？？\u3000どうされたのですか？」"
translation = "「??? 무슨 일이신가요?」"

[[dialogue]]
speaker = "パッキー"
original = "「うっひょ～！\u3000巨乳も巨乳！\u3000リアちゃん以上に俺様好みの爆乳じゃねえか！！」"
translation = "「우효～! 거유도 거유! 리아짱 이상으로 오레사마 취향의 폭유 아니냐!!」"

[[dialogue]]
speaker = "リア"
original = "「ちょっとパーちゃんっ？」"
translation = "「잠깐 파짱?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ばく……？\u3000なんでしょうか？」"
translation = "「폭……? 무엇일까요?」"

[[dialogue]]
speaker = "パッキー"
original = "「爆乳のねーちゃんよ。俺様とお茶──いや、ホテルに行こうぜ。甘い一夜を約束するからよ」"
translation = "「폭유 누나 말이야. 오레사마랑 차── 아니, 호텔에 가자고. 달콤한 하룻밤을 약속할 테니까」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ホテル……？\u3000甘い一夜……？」"
translation = "「호텔……? 달콤한 하룻밤……?」"

[[dialogue]]
speaker = "聖沙"
original = "「ああもう、パッキーさんったらマグダレナさんにデレデレしちゃって……。いつもはリア先輩にあんなにもお熱なのに……」"
translation = "「아아 정말, 팟키 씨는 막달레나 씨에게 헤롱헤롱해져서……. 평소에는 리아 선배에게 그렇게나 열렬한데……」"

[[dialogue]]
speaker = "リア"
original = "「しかも私以上にって、む～……！\u3000さっきもヴィーナスちゃんのおっぱいに目移りしちゃってたし……！」"
translation = "「게다가 나 이상으로라니, 흥～……! 방금도 비너스짱의 가슴에 눈이 팔려 버렸고……!」"

[[dialogue]]
speaker = "パッキー"
original = "「そらリアちゃんもヒスもどいたどいた！\u3000俺様はこの爆乳のねーちゃんとしっぽりしに行かなきゃなんねーんだ！」"
translation = "「자 리아짱도 히스도 비켜 비켜! 오레사마는 이 폭유 누나랑 은밀하게 지내러 가야 한다!」"

[[dialogue]]
speaker = "リア"
original = "「絶対ダメーっ！\u3000えっちなこと禁止！！」"
translation = "「절대 안 돼ー! 야한 짓 금지!!」"

[[dialogue]]
speaker = "聖沙"
original = "「そうよ！\u3000ちょっと可愛くなったからって調子に乗り過ぎよ、パッキーさん！」"
translation = "「맞아! 조금 귀여워졌다고 너무 우쭐대지 마, 팟키 씨!」"

[[dialogue]]
speaker = "パッキー"
original = "「おいおい、二人とも。女の嫉妬は見苦しいぜ」"
translation = "「어이 어이, 둘 다. 여자의 질투는 꼴불견이다」"

[[dialogue]]
speaker = "リア＆聖沙"
original = "「嫉妬してないから！」"
translation = "「질투 안 하거든!」"

[[dialogue]]
speaker = "unk"
original = "これ以上、街の風紀は乱させない！"
translation = "더 이상, 거리의 풍기는 어지럽히지 않겠다!"

[[dialogue]]
speaker = "パッキー"
original = "「おわっ！？\u3000シン様がどうしてここに──って、別人じゃねーか。さてはお前、この世界の魔王だな？」"
translation = "「오왓!? 신 님이 어째서 여기에── 아니, 딴 사람이잖아. 아무래도 너, 이 세계의 마왕이냐?」"

[[dialogue]]
speaker = "パッキー"
original = "「ククク……俺様が仕えるのはシン様だ！\u3000ついでにぶっとばしてやるぜ～！」"
translation = "「크크크…… 오레사마가 모시는 건 신 님이다! 덤으로 때려눕혀 주마～!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたみたいなセクハラパンダに、クロトが負けるもんですか！」"
translation = "「당신 같은 성희롱 팬더에게, 쿠로토가 질 것 같아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「胸の大小だけで人の価値を計る輩に私たちは決して負けません……！」"
translation = "「가슴의 크기만으로 사람의 가치를 재는 무리에게 저희는 결코 지지 않습니다……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ツルペタじゃないところを見せてあげますよ！\u3000それもまた天使の使命です！」"
translation = "「절벽이 아니라는 것을 보여줄게요오! 그것 또한 천사의 사명이에요!」"

[[dialogue]]
speaker = "リア"
original = "「行くよ、みんな！\u3000えっちなパーちゃんにキツーいお灸を据えてあげるの！」"
translation = "「가자, 모두! 야한 파짱에게 따끔한 뜸을 떠 줄 거야!」"

[[dialogue]]
speaker = "パッキー"
original = "「ククク、あくまで立ちはだかろうって言うのならリアちゃんといえど容赦しねーぜ」"
translation = "「크크크, 어디까지나 가로막으려고 한다면 리아짱이라 해도 용서하지 않는다」"

[[dialogue]]
speaker = "パッキー"
original = "「この爆乳のねーちゃんとのアバンチュールが、そしてまだ見ぬねーちゃんたちのおっぱいが俺様を待ってんだ！」"
translation = "「이 폭유 누나와의 아방튀르가, 그리고 아직 보지 못한 누나들의 가슴이 오레사마를 기다리고 있다!」"

[[dialogue]]
speaker = "パッキー"
original = "「倒せるものなら倒してみやがれだぜ！\u3000大賢者パッキーさまの本気、見せてやろーじゃねえか！」"
translation = "「쓰러뜨릴 수 있다면 쓰러뜨려 보라지! 대현자 팟키 님의 진심, 보여주마!」"

