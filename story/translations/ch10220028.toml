[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「メリー～……クリスマース♪」"
translation = "「메리~…… 크리스마스♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「このスーパーレッドチキン、とっても美味しいですね♪\u3000なかなかいい辛さです♪」"
translation = "「이 슈퍼 레드 치킨, 정말 맛있네요♪ 제법 매콤해서 좋아요♪」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「会長は普通のチキンを、私は辛いのを……こうして違うものを一緒に食べるのもいいですね」"
translation = "「회장님은 보통 치킨을, 저는 매운 걸…… 이렇게 서로 다른 걸 같이 먹는 것도 좋네요」"

[[dialogue]]
speaker = "unk"
original = "クリスマスデートの後、俺とモネは２人で小さなパーティーを楽しんでいた。"
translation = "크리스마스 데이트 후, 나와 모네는 둘이서 작은 파티를 즐기고 있었다."

[[dialogue]]
speaker = "unk"
original = "けれどチキンもケーキも食べ終わり、新星寮の門限も迫ってきた。"
translation = "하지만 치킨도 케이크도 다 먹고, 신성 기숙사의 통금 시간도 다가왔다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あの……最後に、会長にクリスマスプレゼントを渡したいんですけど……」"
translation = "「저기…… 마지막으로, 회장님께 크리스마스 선물을 드리고 싶은데요……」"

[[dialogue]]
speaker = "unk"
original = "息がかかりそうな至近距離。赤いビキニからこぼれそうな胸が押し付けられる。"
translation = "숨결이 닿을 듯한 지근거리. 빨간 비키니에서 쏟아질 듯한 가슴이 밀착된다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何をくれるの？」"
translation = "「뭘 줄 건데?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「えっと、その……今夜のクリスマスプレゼントは……」"
translation = "「에또, 그…… 오늘 밤 크리스마스 선물은……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私です……」"
translation = "「저예요……」"

[[dialogue]]
speaker = "unk"
original = "ほんのり上気した顔が、サンタ衣装のようにますます赤く染まって、ぷしゅーっと蒸気が上がっているのが見える気がした。"
translation = "발그레하게 상기된 얼굴이 산타 의상처럼 점점 붉게 물들어, 푸슉 하고 증기가 올라오는 듯한 기분이 들었다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「な、なんて……大胆すぎたでしょうか……」"
translation = "「너, 너무…… 대담했을까요……」"

[[dialogue]]
speaker = "unk"
original = "本人は恥ずかしくて少し後悔していそうだけど、そんなところがかわいい。"
translation = "본인은 부끄러워서 조금 후회하는 듯하지만, 그런 점이 귀엽다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「モネのプレゼント、ありがたくもらうよ」"
translation = "「모네라는 선물, 감사히 받을게」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……はい。ありがとうございます」"
translation = "「아…… 네. 감사합니다」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "聖夜のキスは、スパイスの味がしてとても刺激的だった。"
translation = "성야의 키스는 스파이스 맛이 나서 무척 자극적이었다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「プレゼントですから、今日は私がご奉仕しますね……」"
translation = "「선물이니까, 오늘은 제가 봉사해 드릴게요……」"

[[dialogue]]
speaker = "unk"
original = "部屋に移り、モネがお尻を向けて俺に跨る。"
translation = "방으로 옮겨, 모네가 엉덩이를 향한 채 내 위에 올라탄다."

[[dialogue]]
speaker = "unk"
original = "丸く形のいいお尻が目の前にあって、否応なしに男の本能が膨れ上がった。"
translation = "둥글고 예쁜 모양의 엉덩이가 눈앞에 있어, 어쩔 수 없이 남자의 본능이 부풀어 올랐다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……会長のおち○ちん、反り返ってます……いつもより大きいかも……」"
translation = "「아…… 회장님의 자지, 휘어 있어요…… 평소보다 더 클지도……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あんなこと言われたら我慢できないよ」"
translation = "「그런 말을 들으면 참을 수 없다고」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「えへへ……<emoji=heart04>\u3000じゃあ、恥ずかしかったけど、このプレゼントで正解ですね……」"
translation = "「에헤헤…… <emoji=heart04> 그럼 부끄러웠지만, 이 선물로 정답이었네요……」"

[[dialogue]]
speaker = "unk"
original = "そう言って、見せつけるようにふりふりとお尻を揺らすモネ。"
translation = "그렇게 말하며 보여주듯 살랑살랑 엉덩이를 흔드는 모네."

[[dialogue]]
speaker = "unk"
original = "クリスマスだからか、それとも大胆な水着のせいか、いつもより積極的になっているようだ。"
translation = "크리스마스라서 그런지, 아니면 대담한 수영복 때문인지 평소보다 더 적극적인 것 같다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひゃっ……会長のおち○ちん、お尻に当たって、熱い……<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000ドクドクって脈打ってる……」"
translation = "「히얏…… 회장님의 자지, 엉덩이에 닿아서 뜨거워…… <emoji=heart04> 응읏…… <emoji=heart04> 두근두근하고 맥박치고 있어……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁ……会長の、すごい……<emoji=heart04>\u3000こんなの入れたら、大変なことになっちゃいそう……」"
translation = "「하아…… 회장님 거, 굉장해…… <emoji=heart04> 이런 거 넣으면 큰일 날 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "目が離せないと言わんばかりに、振り返りながらペニスに熱い視線を注ぐ。"
translation = "눈을 뗄 수 없다는 듯이 뒤돌아보며 페니스에 뜨거운 시선을 보낸다."

[[dialogue]]
speaker = "unk"
original = "秘裂からは蜜が溢れて雫を垂らしていた。"
translation = "비열에서는 애액이 넘쳐흘러 이슬을 떨어뜨리고 있었다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それじゃあ、いっぱい気持ち良くしてあげますからね……<emoji=heart04>」"
translation = "「그럼, 기분 좋게 잔뜩 해드릴 테니까요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネがお尻を持ち上げ、ペニスの先端に女性器を密着させる。"
translation = "모네가 엉덩이를 들어 올려 페니스 끝에 성기를 밀착시킨다."

[[dialogue]]
speaker = "unk"
original = "そしてゆっくり腰を落としていって……"
translation = "그리고 천천히 허리를 내리며……"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んっ、はぁ……入ってくるぅ…………はあぁ……<emoji=heart04>」"
translation = "「응, 하아…… 들어와아………… 하아아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んんん～～～～～～～っ<emoji=heart04>」"
translation = "「응으으으~~~~~~~~읏 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを呑み込んだ瞬間、声にならない声を上げ、体をビクビクと小さく跳ねさせた。"
translation = "페니스를 삼킨 순간, 말로 표현 못 할 소리를 내며 몸을 파르르 작게 떨었다."

[[dialogue]]
speaker = "unk"
original = "モネの中はすっかり蜜で蕩けていて、熱い粘膜がきゅうっと締め付けてくる。"
translation = "모네의 안은 온통 애액으로 녹아내려 있었고, 뜨거운 점막이 꽉 조여온다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁ、はぁ……会長の、熱くて、大きい……私の中、いっぱいになってるぅ……<emoji=heart04>」"
translation = "「하아, 하아…… 회장님 거, 뜨겁고 커서…… 내 안이 가득 찼어어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "艶めかしい声を漏らしてお尻を揺らすのがたまらなくて、両手を伸ばして尻肉を揉みしだく。"
translation = "요염한 목소리를 흘리며 엉덩이를 흔드는 것이 참을 수 없어, 양손을 뻗어 엉덩이 살을 주물러댄다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んん……！？\u3000お尻、ぐにぐにって、揉まれて……はぁ……ぁん……<emoji=heart04>」"
translation = "「응……!? 엉덩이, 쭈물쭈물 주물러져서…… 하아…… 아앙…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ふ、ん……ダメですよぉ、そんなにお尻触られたら、ご奉仕できなくなっちゃいます……んっ……はあぁ……<emoji=heart04>」"
translation = "「흐, 응…… 안 돼요오, 그렇게 엉덩이 만져지면 봉사할 수 없게 돼버려요…… 응…… 하아아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「おち○ちん、たくさんビクビクさせて……そんなにお尻が好きだったんですか？\u3000もう、言ってくれればよかったのに」"
translation = "「자지, 잔뜩 움찔거리게 하고…… 그렇게 엉덩이가 좋았나요? 정말, 진작 말해주지 그랬어요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「それじゃあ、動きますね……私からのクリスマスプレゼント、いっぱい楽しんでください……<emoji=heart04>」"
translation = "「그럼 움직일게요…… 저의 크리스마스 선물, 잔뜩 즐겨주세요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んん……はぁ……はっ……あんっ……<emoji=heart04>\u3000はぁ、はっ……あ……はあぁ……っ<emoji=heart04>」"
translation = "「응…… 하아…… 하앗…… 아앙…… <emoji=heart04> 하아, 하앗…… 아…… 하아아…… 윽 <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私のおま○こで、気持ち良くなって、ください……ふぅ……はぁ、あっ、んん……<emoji=heart04>」"
translation = "「제 보지로 기분 좋아져 주세요…… 후우…… 하아, 앗, 응으…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いつもみんなのために頑張ってる会長への、クリスマスプレゼントですから……んふぅ、はぁ……モネのおま○こ、味わってくださいね……<emoji=heart04>」"
translation = "「항상 모두를 위해 노력하는 회장님을 위한 크리스마스 선물이니까요…… 응후, 하아…… 모네의 보지, 맛봐주세요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "丸いお尻が上下に揺れながら、柔らかな膣壁がペニスを摩擦し、快感が走る。"
translation = "둥근 엉덩이가 위아래로 흔들리며 부드러운 질벽이 페니스를 마찰해 쾌감이 달린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「モネのお尻、全部見えてるよ。すごくエッチだ」"
translation = "「모네 엉덩이, 전부 다 보여. 정말 야해」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そ、そういうことは言わなくていいですってば……はぁ……ふぅ……んんっ……<emoji=heart04>」"
translation = "「그, 그런 건 말 안 해도 된다니까요…… 하아…… 후우…… 응읏…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「お尻の穴まで見せちゃって、恥ずかしい……でも、会長が喜んでくれるなら……んふぅ……はぁ……<emoji=heart04>」"
translation = "「항문까지 보여버려서 부끄러워…… 하지만 회장님이 기뻐하신다면…… 응후…… 하아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "胸も、お尻も、秘所も、大事なところを全てさらけ出して、俺に奉仕してくれるモネ。"
translation = "가슴도, 엉덩이도, 비소도, 중요한 곳을 전부 드러내고 내게 봉사해 주는 모네."

[[dialogue]]
speaker = "unk"
original = "その健気さに情欲が増し、ドクドクと脈打ちながらモネの中で先走りを吐き出す。"
translation = "그 기특함에 정욕이 더해져, 두근두근 맥박치며 모네의 안에서 쿠퍼액을 쏟아낸다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んんっ……会長のおち○ちん、やっぱり大きい……私の中、広げられてますぅ……はぁっ、はぁ……<emoji=heart04>」"
translation = "「응읏…… 회장님 자지, 역시 커요…… 내 안이 벌려지고 있어요어…… 하앗, 하아…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁ、はっ、はっ……あんっ……<emoji=heart04>\u3000会長の、熱くて、硬くて……形、わかっちゃいます……<emoji=heart04>」"
translation = "「하아, 하앗, 하앗…… 아앙…… <emoji=heart04> 회장님 거, 뜨겁고 딱딱해서…… 모양, 다 느껴져요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひぁ、あぁ……お腹の中、会長のおち○ちんの、形になって……ふぅ、はぁ……あっ、ひぁあっ<emoji=heart04>」"
translation = "「히아, 아아…… 배 속이 회장님 자지 모양이 돼서…… 후우, 하아…… 앗, 히아앗 <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あっ、はっ、んんっ……<emoji=heart04>\u3000ふぁ、はっ、はぁん……私のおま○こ、会長のおち○ちん、専用になってますぅ……<emoji=heart04>」"
translation = "「앗, 하앗, 응읏…… <emoji=heart04> 하아, 하앗, 하아앙…… 제 보지, 회장님 자지 전용이 됐어요어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛液で濡れた膣壁が密着し、心地良い圧迫と摩擦を生む。"
translation = "애액으로 젖은 질벽이 밀착되어 기분 좋은 압박과 마찰을 낳는다."

[[dialogue]]
speaker = "unk"
original = "きゅっと締め付けながら上下に動き、極上の快楽が俺を蕩けさせていく。"
translation = "꽉 조이며 위아래로 움직여, 최상의 쾌락이 나를 녹여간다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んふぅ、はぁ……会長、気持ち良くなってくれてますか？」"
translation = "「응후, 하아…… 회장님, 기분 좋아지셨나요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ……モネのおま○こ、すごく気持ちいい」"
translation = "「아아…… 모네의 보지, 정말 기분 좋아」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あぅ……わざと恥ずかしい言い方して……はぁ、あっ……会長はいじわるです……あ……ひあぁっ<emoji=heart04>」"
translation = "「아우…… 일부러 부끄러운 말투로…… 하아, 앗…… 회장님은 심술쟁이예요…… 아…… 히아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いながらも腰を動かすのはやめず、一生懸命に奉仕してくれるのがいじらしい。"
translation = "그렇게 말하면서도 허리 놀림을 멈추지 않고 열심히 봉사해 주는 모습이 가련하다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んんっ<emoji=heart04>\u3000会長の、私の中で、また大きくなってる……ふっ、はっ、はぁ……あんっ……<emoji=heart04>」"
translation = "「응읏 <emoji=heart04> 회장님 거, 제 안에서 또 커지고 있어…… 훗, 하앗, 하아…… 아앙…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "目の前で揺れるお尻に、いたずら心が湧いて──"
translation = "눈앞에서 흔들리는 엉덩이에 장난기가 발동해──"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひゃっ！？」"
translation = "「히얏!?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「い、今、お尻叩きました……？」"
translation = "「지, 지금 엉덩이 때리셨나요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、痛かった？」"
translation = "「미안, 아팠어?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「痛くはないですけど、びっくりしちゃいました……はぁ、んん……どうしてお尻叩いたんですか？」"
translation = "「아프지는 않지만 깜짝 놀랐잖아요…… 하아, 응…… 왜 엉덩이를 때리신 거예요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「かわいくて、無防備だったから……つい」"
translation = "「귀엽고 무방비해서…… 나도 모르게」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ついって……何ですか、それ……んっ、ふっ、はぁ……女の子のお尻を叩いちゃ、ダメなんですからね？」"
translation = "「나도 모르게라니…… 뭐예요 그게…… 응, 훗, 하아…… 여자애 엉덩이를 때리면 안 된다고요?」"

[[dialogue]]
speaker = "unk"
original = "口を尖らせて俺のイタズラを咎めるモネ。"
translation = "입술을 삐죽이며 나의 장난을 나무라는 모네."

[[dialogue]]
speaker = "unk"
original = "だけど──"
translation = "하지만──"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でも今日はご奉仕ですから、何をしてもいいですよ……？\u3000クリスマスだから特別です……<emoji=heart04>」"
translation = "「하지만 오늘은 봉사니까, 무엇을 해도 괜찮아요……? 크리스마스니까 특별해요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「私のお尻もおま○こも、会長の好きにしてください……<emoji=heart04>\u3000はっ、あっ……今夜の私は、会長へのプレゼントですから……<emoji=heart04>」"
translation = "「제 엉덩이도 보지도 회장님 마음대로 하세요…… <emoji=heart04> 핫, 앗…… 오늘 밤의 저는 회장님을 위한 선물이니까요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネの全てが俺のもの──そう思った瞬間、モネをもっと俺で染めたくなって、またお尻を叩いた。"
translation = "모네의 모든 것이 내 것── 그렇게 생각한 순간, 모네를 더 나로 물들이고 싶어져 다시 엉덩이를 때렸다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひんっ<emoji=heart04>」"
translation = "「히응 <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あっ<emoji=heart04>\u3000お尻叩かれてっ<emoji=heart04>\u3000会長のおもちゃにされてますっ<emoji=heart04>\u3000私のお尻で、遊ばれちゃってますっ<emoji=heart04>」"
translation = "「앗 <emoji=heart04> 엉덩이 맞아서 <emoji=heart04> 회장님의 장난감이 되고 있어요 <emoji=heart04> 제 엉덩이로 놀림당하고 있어요 <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひぅっ<emoji=heart04>\u3000また、叩かれちゃいましたっ<emoji=heart04>\u3000ひどいことされてるのに、屈辱的なのに……おま○この奥、キュンキュンして、変になりそうです……っ<emoji=heart04>」"
translation = "「히웃 <emoji=heart04> 또 맞았어요 <emoji=heart04> 심한 짓 당하고 있는데, 굴욕적인데…… 보지 깊은 곳이 큥큥거려서 이상해질 것 같아요…… 윽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お尻を叩いた瞬間、きゅうっと膣が狭くなり、ペニスを強く絞られた。"
translation = "엉덩이를 때린 순간, 꽉 하고 질이 좁아지며 페니스를 강하게 쥐어짰다."

[[dialogue]]
speaker = "unk"
original = "より激しい快感が欲しくて、急かすようにペチペチとお尻を叩く。"
translation = "더 격렬한 쾌감을 원하며 재촉하듯 찰싹찰싹 엉덩이를 때린다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もう、わがままな子どもみたいに乱暴なおねだりして、いけない子なんですから……<emoji=heart04>」"
translation = "「앗 <emoji=heart04> 아앙 <emoji=heart04> 정말, 떼쓰는 아이처럼 난폭하게 조르다니, 나쁜 아이라니까요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「もっとおま○こで気持ち良くしてほしいんですね……じゃあ──」"
translation = "「더 보지로 기분 좋게 해달라는 거군요…… 그럼──」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひやぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000私からの、クリスマスプレゼント、受け取ってくださいっ<emoji=heart04>」"
translation = "「히야아앗 <emoji=heart04> 앗 <emoji=heart04> 앗 <emoji=heart04> 아앙 <emoji=heart04> 저의 크리스마스 선물, 받아주세요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ──あ──ひああぁっ<emoji=heart04>\u3000私のおま○こで、いっぱい気持ち良くなって、くださいっ<emoji=heart04>」"
translation = "「하앗 <emoji=heart04> 앗 <emoji=heart04> 아── 아── 히아아앗 <emoji=heart04> 제 보지로 잔뜩 기분 좋아져 주세요! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛液たっぷりのおま○こでペニスを咥えながら、お尻を弾ませるモネ。"
translation = "애액이 듬뿍 묻은 보지로 페니스를 물고 엉덩이를 튕기는 모네."

[[dialogue]]
speaker = "unk"
original = "蜜でトロトロになった肉ひだがいやらしく絡みつき、極上の快楽が押し寄せる。"
translation = "애액으로 걸쭉해진 살주름이 야하게 얽혀들며 극상의 쾌락이 밀려온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……モネの中、すごくいい……！」"
translation = "「큭…… 모네 안, 정말 좋아……!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000悦んでくれて、嬉しいですっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「아 <emoji=heart04> 응읏 <emoji=heart04> 기뻐해 주시니 행복해요! <emoji=heart04> 핫 <emoji=heart04> 앗 <emoji=heart04> 앗 <emoji=heart04> 아앙! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んんっ<emoji=heart04>\u3000会長のおち○ちんビクビクしてるっ<emoji=heart04>\u3000おち○ちんも、気持ちいいって、言ってくれてますっ<emoji=heart04>」"
translation = "「응읏 <emoji=heart04> 회장님 자지 움찔거리고 있어! <emoji=heart04> 자지도 기분 좋다고 말해주고 있어요! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネが何度も腰を深く沈め、ペニスを奥まで飲み込む。"
translation = "모네가 몇 번이고 허리를 깊게 가라앉히며 페니스를 끝까지 삼킨다."

[[dialogue]]
speaker = "unk"
original = "ぐちゅぐちゅと粘液が混ざる音を響かせながら、膣壁全体でペニスを刺激され、射精欲が高まっていく。"
translation = "구축구축 점액이 섞이는 소리를 울리며 질벽 전체로 페니스를 자극해, 사정욕이 고조되어 간다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁっ<emoji=heart04>\u3000あんんっ<emoji=heart04>\u3000おち○ちん奥まで、届いて、私の中、会長でいっぱいっ<emoji=heart04>\u3000会長で、満たされてるっ<emoji=heart04>」"
translation = "「하앗 <emoji=heart04> 아앙 <emoji=heart04> 자지 끝까지 닿아서 내 안이 회장님으로 가득해! <emoji=heart04> 회장님으로 채워지고 있어! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁあっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おち○ちん硬くて、大きくて、おま○こ壊れちゃいそうっ<emoji=heart04>」"
translation = "「하아앗 <emoji=heart04> 응아 <emoji=heart04> 앗 <emoji=heart04> 아앙 <emoji=heart04> 자지 딱딱하고 커서 보지 망가질 것 같아! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "誘うように揺れるお尻を、さっきより強めに叩く。"
translation = "유혹하듯 흔들리는 엉덩이를 아까보다 더 세게 때린다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひんっ<emoji=heart04>」"
translation = "「히응 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、手のひら全体に柔らかい感触が伝わり、お尻の肉がぶるんと弾んだ。"
translation = "그 순간 손바닥 전체에 부드러운 감촉이 전해지고, 엉덩이 살이 출렁이며 튕겼다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そんなに叩かれたら、お尻赤くなっちゃいますぅ……」"
translation = "「그렇게 때리면 엉덩이 빨개져 버려요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、モネもお尻叩かれて悦んでるよ」"
translation = "「하지만 모네도 엉덩이 맞고 기뻐하고 있잖아」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あっ<emoji=heart04>\u3000そうなんですっ<emoji=heart04>\u3000お尻叩かれて、悦んじゃってるんですっ<emoji=heart04>」"
translation = "「앗 <emoji=heart04> 맞아요! <emoji=heart04> 엉덩이 맞고 기뻐하고 있어요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長へのクリスマスプレゼントなのに、私もたくさん、気持ち良くなっちゃってますっ<emoji=heart04>」"
translation = "「핫 <emoji=heart04> 앗 <emoji=heart04> 앗 <emoji=heart04> 아앙 <emoji=heart04> 회장님을 위한 크리스마스 선물인데, 저도 잔뜩 기분 좋아져 버리고 있어요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いやらしいプレゼントでごめんなさい<emoji=heart04>\u3000エッチなプレゼントのモネに、お仕置きしてくださいっ<emoji=heart04>」"
translation = "「천박한 선물이라 죄송해요 <emoji=heart04> 야한 선물인 모네에게 벌을 주세요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひああぁっ<emoji=heart04>」"
translation = "「히아아앗 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "理性を投げ捨て、背徳の聖夜を楽しむ。肉欲に酔い、２人で一緒に上り詰めていく。"
translation = "이성을 내던지고 배덕의 성야를 즐긴다. 육욕에 취해 둘이서 함께 절정을 향해 올라간다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひゃあっ<emoji=heart04>\u3000気持ち良くて、イッちゃうぅ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000会長のおち○ちん、ドクドクって脈打って<emoji=heart04>\u3000あっ<emoji=heart04>\u3000出るんですねっ<emoji=heart04>」"
translation = "「히아앗 <emoji=heart04> 기분 좋아서 가버려어 <emoji=heart04> 아앙 <emoji=heart04> 회장님 자지 두근두근 맥박치며 <emoji=heart04> 앗 <emoji=heart04> 나오는 거군요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いいですよっ<emoji=heart04>\u3000ふぁっ、あっ、あぁっ<emoji=heart04>\u3000私のおま○こに、たくさん射精してくださいっ<emoji=heart04>」"
translation = "「괜찮아요! <emoji=heart04> 하아, 앗, 아앗 <emoji=heart04> 제 보지에 잔뜩 사정해 주세요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「熱くて濃い精液、ビュクビュクって注いでっ<emoji=heart04>\u3000ふぁっ、あっ<emoji=heart04>\u3000私にもクリスマスプレゼントくださいっ<emoji=heart04>」"
translation = "「뜨겁고 진한 정액, 뷰큭뷰큭 쏟아줘요! <emoji=heart04> 하아, 앗 <emoji=heart04> 저에게도 크리스마스 선물 주세요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000深いところまで届くように、奥で射精してっ……私の子宮をいっぱいにしてぇっ……<emoji=heart04>」"
translation = "「하앗 <emoji=heart04> 앗 <emoji=heart04> 깊은 곳까지 닿도록 안에서 사정해줘요…… 제 자궁을 가득 채워줘어…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "切なそうに求められて本能が高まり、お尻を叩きながらモネを突き上げる。"
translation = "애처롭게 매달리는 모습에 본능이 치솟아, 엉덩이를 때리며 모네를 밀어 올린다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひんっ<emoji=heart04>\u3000お尻叩かれて、おち○ちんで子宮突かれて、おま○こキュンキュンしちゃいますぅっ<emoji=heart04>」"
translation = "「히응 <emoji=heart04> 엉덩이 맞으면서 자지로 자궁 찔려서 보지 큥큥거려요오! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひやああっ<emoji=heart04>\u3000ひっ、んっ、んんっ、んん～～っ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000変に、なっちゃいそうっ<emoji=heart04>\u3000今までで、一番すごいの、来ちゃうぅっ<emoji=heart04>」"
translation = "「히야아앗 <emoji=heart04> 히, 응, 응읏, 응으으~~읏 <emoji=heart04> 앗 <emoji=heart04> 앗 <emoji=heart04> 이상해질 것 같아! <emoji=heart04> 지금까지 중 제일 대단한 게 와버려어! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひぐぅっ<emoji=heart04>\u3000お尻叩かれるのが、こんなに気持ちいいなんて<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000知りませんでしたっ<emoji=heart04>」"
translation = "「히구읏 <emoji=heart04> 엉덩이 맞는 게 이렇게 기분 좋을 줄은 <emoji=heart04> 아앙 <emoji=heart04> 몰랐어요! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000お腹の奥に<emoji=heart04>\u3000きてるっ<emoji=heart04>\u3000キュンって、切ないの、きて<emoji=heart04>\u3000イクイクイクぅっ<emoji=heart04>」"
translation = "「응앗 <emoji=heart04> 앗 <emoji=heart04> 아아앗 <emoji=heart04> 배 속 깊은 곳에 <emoji=heart04> 오고 있어! <emoji=heart04> 큥 하고 애절한 게 와서 <emoji=heart04> 가, 가, 가버려어! <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんぅ～～～っ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000おま○こイッちゃいますぅ～～～～～っ<emoji=heart04>」"
translation = "「아앙 <emoji=heart04> 아앙 <emoji=heart04> 응으으으~~~읏 <emoji=heart04> 가버려! <emoji=heart04> 가버려! <emoji=heart04> 보지 가버려요~~~~~~~~~엇 <emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ひぁあああああ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "モネのお尻を鷲掴みにしながら、ペニスを子宮に密着させて欲望を全力で注ぎ込む。"
translation = "모네의 엉덩이를 움켜쥐면서, 페니스를 자궁에 밀착시켜 욕망을 전력으로 쏟아붓는다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ふぁあああっ<emoji=heart04><emoji=heart04>\u3000んん──んっ──んん～～～っ<emoji=heart04><emoji=heart04>\u3000熱っ……んっ……熱いの、私の中に、入ってきて……ひぁああっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04><emoji=heart04> 응──응──응～～～앗<emoji=heart04><emoji=heart04> 뜨거워…… 응…… 뜨거운 거, 내 안에, 들어와 줘…… 히아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「おち○ちん、お腹の中でドクドクして……はあぁっ<emoji=heart04>\u3000はぁ、あ……<emoji=heart04>\u3000会長の精液、たくさん、来てるぅ……<emoji=heart04>」"
translation = "「자지, 배 속에서 울컥울컥거려서…… 하아앗<emoji=heart04> 하아, 아……<emoji=heart04> 회장님의 정액, 잔뜩, 오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁もぎゅうっと絞り取ってきて、最後の一滴までモネの中に吐き出す。"
translation = "질벽도 꽉 쥐어짜 내며, 마지막 한 방울까지 모네의 안에 토해낸다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁ、はっ……はぁ……んんっ<emoji=heart04>\u3000会長の精液で、お腹、いっぱい……あぁん……<emoji=heart04>」"
translation = "「하아, 하…… 하아…… 응앗<emoji=heart04> 회장님의 정액으로, 배, 가득해…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はあぁ……会長の精液、こんなに……<emoji=heart04>\u3000お腹の中、会長のでまだ熱いです……<emoji=heart04>」"
translation = "「하아아…… 회장님의 정액, 이렇게나……<emoji=heart04> 배 속, 회장님 것으로 아직 뜨거워요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けると、膣口からドロリと白濁が垂れてきて、本能を刺激する光景にゾクリと背筋が震える。"
translation = "페니스가 빠지자, 질구에서 걸쭉하게 백탁액이 흘러나와, 본능을 자극하는 광경에 소름이 돋으며 등줄기가 떨린다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「でも私のお尻をおもちゃにするなんて……さすが伝説に謳われた魔王様です」"
translation = "「하지만 제 엉덩이를 장난감으로 삼다니…… 역시 전설에 노래되는 마왕님이에요」"

[[dialogue]]
speaker = "unk"
original = "口では咎めつつも、くすりと笑うモネ。"
translation = "입으로는 나무라면서도, 싱긋 웃는 모네."

[[dialogue]]
speaker = "unk"
original = "戯れに叩いてしまったお尻を労わるように、優しく撫でる。"
translation = "장난삼아 때려버린 엉덩이를 위로하듯, 부드럽게 쓰다듬는다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「んんっ……<emoji=heart04>\u3000お尻、お好きですね……会長がこんなにお尻フェチだなんて思いませんでした」"
translation = "「응읏……<emoji=heart04> 엉덩이, 좋아하시네요…… 회장님이 이렇게나 엉덩이 페티시일 줄은 몰랐어요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こんなお尻が目の前にあったら誰でもそうなるよ」"
translation = "「이런 엉덩이가 눈앞에 있으면 누구라도 그렇게 돼」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そんなにですか？」"
translation = "「그 정도인가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん。頬ずりしたいくらい」"
translation = "「응. 뺨을 비비고 싶을 정도야」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「も、もう……本当にお尻好きなんですから」"
translation = "「정, 정말…… 정말 엉덩이를 좋아하신다니까요」"

[[dialogue]]
speaker = "unk"
original = "今夜はモネのお尻に夢中にだった。"
translation = "오늘 밤은 모네의 엉덩이에 푹 빠져 있었다."

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ちなみに会長、今日はお母さまは……？」"
translation = "「그건 그렇고 회장님, 오늘은 어머님은……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日は遅くなる……というか、いろいろやることあって多分泊まりだって」"
translation = "「오늘은 늦으신대…… 아니, 여러 가지 할 일이 있어서 아마 외박하실 거래」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そうですか、それはお気の毒に……」"
translation = "「그렇군요, 그거 안타깝네요……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「実は私も寮の門限過ぎちゃいまして……今夜はこのままずっと一緒にいませんか？」"
translation = "「사실 저도 기숙사 통금 시간이 지나버려서…… 오늘 밤은 이대로 계속 같이 있지 않을래요?」"

[[dialogue]]
speaker = "unk"
original = "こちらを振り向いて、俺の胸に抱きついてくるモネをぎゅっと抱き返す。"
translation = "이쪽을 돌아보며, 내 가슴에 매달려 오는 모네를 꽉 껴안아 준다."

[[dialogue]]
speaker = "unk"
original = "そのまま心地良い疲れに身を任せるようにまぶたを閉じて、同じベッドで眠ったのだった。"
translation = "그대로 기분 좋은 피로에 몸을 맡기듯 눈을 감고, 같은 침대에서 잠들었다."

