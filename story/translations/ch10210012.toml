[[dialogue]]
speaker = "unk"
original = "第２話,環は有名人,P"
translation = "제2화, 타마키는 유명인, P"

[[dialogue]]
speaker = "unk"
original = "今日は星徒会の活動がないので、真っ直ぐ帰ろうと思ったのだが──"
translation = "오늘은 성도회 활동이 없어서 곧장 돌아가려 생각했습니다만──"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「会長～！\u3000今ヒマ？\u3000なら付き合ってよ」"
translation = "「회장님~! 지금 한가해? 그럼 같이 가줘」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「別に用事とかはないんだけど、なんとなく学園をブラブラしようと思ってさ。帰りたくなったら先帰っていいよ」"
translation = "「딱히 용건 같은 건 없는데, 왠지 학원을 어슬렁어슬렁 돌아다녀 볼까 해서. 돌아가고 싶어지면 먼저 가도 좋아」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「だけど星徒会長たる者、先頭に立って戦うだけじゃなくて、生徒を見守るのも仕事でしょ？\u3000たまには自分で見て回るのもいいんじゃない」"
translation = "「하지만 성도회장이라면, 앞장서서 싸울 뿐만 아니라 학생들을 지켜보는 것도 일이잖아? 가끔은 직접 둘러보는 것도 좋지 않겠어」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「決まりだね。それじゃレッツゴー！」"
translation = "「결정됐네. 그럼 렛츠 고!」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「モネ～、何か面白そうな本入ってる？」"
translation = "「모네~, 뭐 재미있어 보이는 책 들어온 거 있어?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「こんにちは、市倉さん。それなら歴史のコミックなんかはいかがですか？\u3000歴史上重要な出来事を流れで理解することができるので、読むだけで勉強になりますよ」"
translation = "「안녕하세요, 이치쿠라 씨. 그렇다면 역사 만화 같은 건 어떠신가요? 역사상 중요한 사건들을 흐름으로 이해할 수 있어서, 읽는 것만으로도 공부가 된답니다」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いいね～、借りちゃおっかな。……でも見た目で漫画しか読まなさそうって思ってない？」"
translation = "「좋네~, 빌려 가 볼까. ……근데 겉모습만 보고 만화밖에 안 읽을 것 같다고 생각하는 거 아냐?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ギクッ」"
translation = "「찔끔」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はははっ、実際当たりだけどね。ボクでも読めそうな小説とかあったらまた教えてよ」"
translation = "「하하하, 사실 정답이지만 말이야. 나라도 읽을 수 있을 만한 소설 같은 거 있으면 또 알려줘」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい、オススメの一冊を用意しておきますね。ところで会長も何かご用件が？」"
translation = "「네, 추천 도서를 한 권 준비해 둘게요. 그런데 회장님도 무슨 용건이라도?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「会長はボクのおまけ！\u3000ちょっと学園の見回りしてるだけだから、会長のことは気にしなくていいよ。ね？」"
translation = "「회장님은 내 덤! 잠깐 학원 순찰하는 것뿐이니까, 회장님은 신경 안 써도 돼. 그치?」"

[[dialogue]]
speaker = "unk"
original = "そうそう"
translation = "맞아 맞아"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はぁ……なるほど？」"
translation = "「하아…… 그렇군요?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（なんだか会長と市倉さんがとても親しく見えるような……ハッ、もしかしてそういう関係なんでしょうか……？）"
translation = "(왠지 회장님과 이치쿠라 씨가 매우 친해 보이는 것 같은…… 헉, 혹시 그런 관계인 걸까요……?)"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「おや、会長さまに環さま。大聖堂に何かご用事ですか？」"
translation = "「오야, 회장님에 타마키 님. 대성당에 무슨 용무이신가요?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ううん、ちょっとシャロンに会いに来ただけ。いつも掃除とかありがとうね。おかげでいつ来ても綺麗だよ」"
translation = "「아니, 잠깐 샤론 만나러 온 것뿐이야. 항상 청소 같은 거 고마워. 덕분에 언제 와도 깨끗해」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いいえ、女神様に仕える者として当然のことをしているまでです。むしろこの大聖堂をお掃除できるのはシスターとして栄誉ですから」"
translation = "「아니요, 여신님을 섬기는 자로서 당연한 일을 하고 있을 뿐입니다. 오히려 이 대성당을 청소할 수 있는 것은 시스터로서 영예니까요」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「きっと女神様も喜んでるよ。ね、会長？」"
translation = "「분명 여신님도 기뻐하실 거야. 그치, 회장?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえいえそんな……畏れ多いです。ちなみに環さまと会長さまはどういったご関係なのでしょう？」"
translation = "「아니 아니 그런…… 황송합니다. 그나저나 타마키 님과 회장님은 어떤 관계이신가요?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「一緒にバイトしてたことがあるんだ。会長が新星学園に転入する前の話だね」"
translation = "「같이 알바했던 적이 있어. 회장이 신성 학원에 편입하기 전 이야기지만」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふむふむ、そういうことでしたか」"
translation = "「흠흠, 그런 것이었군요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "（親しいご様子でしたがどうりで……しかしそれ以上のご関係である可能性も？）"
translation = "(친해 보이셨는데 과연…… 하지만 그 이상의 관계일 가능성도?)"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あ、セイファート学園長～！\u3000こんにちはー！」"
translation = "「아, 세이파트 학원장님~! 안녕하세요!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「む……君か。それに星徒会長も一緒か。何か用件かね？」"
translation = "「음…… 자네인가. 게다가 성도회장도 함께인가. 무슨 용건인가?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いえ、会長と一緒に見回りしてたらお見かけしたので挨拶しただけです。執務がんばってくださ～い」"
translation = "「아뇨, 회장이랑 같이 순찰하다가 보이길래 인사드린 것뿐이에요. 집무 힘내세요~」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「ふむ、自発的に見回りをしていたのか。良い心掛けだ。ではな」"
translation = "「흠, 자발적으로 순찰을 하고 있었나. 좋은 마음가짐이다. 그럼 이만」"

[[dialogue]]
speaker = "unk"
original = "学園長とは仲いいのか？"
translation = "학원장과는 사이가 좋은 건가?"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いや、全然。学園長がプリマステラでもない一般生徒と仲良くなるわけないじゃん。ボクは何度か挨拶してるから覚えてるみたいだけどね」"
translation = "「아니, 전혀. 학원장이 프리마스텔라도 아닌 일반 학생이랑 친해질 리 없잖아. 나는 몇 번 인사했으니까 기억하고 있는 모양이지만」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「でもまぁ……見た目の雰囲気ほど堅苦しい人じゃないんじゃないかな。そんな気はする」"
translation = "「그래도 뭐…… 겉모습의 분위기만큼 딱딱한 사람은 아니지 않을까. 그런 기분이 들어」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「いや～、学園をブラブラするだけでもいろいろあったね。コハルコさんのシミュレーター調整を手伝ったり、紅明にエナジードリンクもらったり」"
translation = "「이야~, 학원을 어슬렁거리는 것만으로도 여러 일이 있었네. 코하루코 씨의 시뮬레이터 조정을 돕거나, 코우메이한테 에너지 드링크를 받기도 하고」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「フロレンシアがぶっ倒れたり、アニマさんの実験に巻き込まれたのはちょっとびっくりしたけど」"
translation = "「플로렌시아가 쓰러지거나, 아니마 씨의 실험에 휘말린 건 좀 놀랐지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "本当に知り合いが多いんだな"
translation = "정말로 아는 사람이 많구나"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「まだまだこんなもんじゃないよ。いろんな部活に助っ人で顔出してるから、もっともっと友達いるんだ」"
translation = "「아직 이 정도가 아니라고. 여러 동아리에 헬퍼로 얼굴을 내밀고 있으니까, 훨씬 훨씬 친구가 많아」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「──あ、寮長もお茶しに来たの？」"
translation = "「──아, 사감님도 차 마시러 오셨어요?」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「マムとお呼びなさい。しかし、環さんはそもそも『ラルーナ』の寮生ではないでしょう。流星市国の生まれと聞いているのだけど？」"
translation = "「마무라고 부르렴. 하지만, 타마키 양은 애초에 『라루나』의 기숙사생이 아니잖니. 유성 시국 출생이라고 들었는데?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「まぁそうなんだけどさ。うちは両親とも天使だけど、父さんも母さんも天界に帰省してて実質一人暮らしなんだよね」"
translation = "「뭐 그렇긴 한데요. 저희 부모님 두 분 다 천사지만, 아빠도 엄마도 천계로 귀성하셔서 실질적으로 혼자 살고 있거든요」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「だからお小遣い欲しさにバイトしてるんだけど、１人はさみしいし寮に入れてもらえないかな～」"
translation = "「그래서 용돈 벌려고 알바하고 있는데, 혼자는 외로우니까 기숙사에 넣어주지 않으려나~」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あーでも寮だと門限とかあるし、バイトしにくくなるから悩みどころだなぁ～……あ、そうだ」"
translation = "「아~ 그래도 기숙사면 통금 같은 게 있고, 알바하기 힘들어지니까 고민되네~…… 아, 맞다」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ねぇねぇ、会長んちお邪魔していい？\u3000居候しちゃおうっと」"
translation = "「저기 저기, 회장네 집으로 놀러 가도 돼? 얹혀살아 버려야지」"

[[dialogue]]
speaker = "unk"
original = "母さんがよければ大丈夫"
translation = "어머니가 괜찮으시다면 괜찮아"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「えっ、マジで！？\u3000じゃあ本気で考えとこうかな～。会長のお母さんによろしくね！」"
translation = "「엣, 진짜로!? 그럼 진지하게 생각해 볼까나~. 회장네 어머니께 안부 전해줘!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "（この２人、妙に仲がいいわね……。そういう関係なのかしら？）"
translation = "(이 두 사람, 묘하게 사이가 좋네……. 그런 관계인 걸까?)"

[[dialogue]]
speaker = "unk"
original = "しばらくの間、環と一緒にいると、みんなの視線がいつもと少し違う気がするのだった──"
translation = "한동안 타마키와 함께 있으면, 모두의 시선이 평소와 조금 다른 느낌이 드는 것이었다──"

