[[dialogue]]
speaker = "unk"
original = "私──愛戸レミカが、初めてアイドルのライブを見たのは、物心がついてすぐの頃だった。"
translation = "나── 아이도 레미카가 처음 아이돌 라이브를 본 것은 철이 들고 난 직후였다."

[[dialogue]]
speaker = "unk"
original = "『流星スターピース』。当時、大ブレイクしていた２人組のアイドルユニット。"
translation = "『유성 스타 피스』. 당시 대유행하던 2인조 아이돌 유닛."

[[dialogue]]
speaker = "unk"
original = "会社経営をしている父は、アイドルをプロデュースする芸能事務所とも多くの繋がりがあって。そのツテでライブに招待されたのだった。"
translation = "회사 경영을 하는 아버지는 아이돌을 프로듀싱하는 연예 기획사와도 인맥이 많았고, 그 연줄로 라이브에 초대받은 것이었다."

[[dialogue]]
speaker = "レミカ"
original = "「わぁあぁあっ……！」"
translation = "「와아아앗……!」"

[[dialogue]]
speaker = "unk"
original = "幼かった私は一目見て虜になってしまった。"
translation = "어린 나는 단번에 매료되어 버렸다."

[[dialogue]]
speaker = "unk"
original = "ライブ会場全体を埋め尽くすサイリウム。歌って踊って、笑顔を振りまく２人のアイドルのキラキラした姿……全てが眩しくて。"
translation = "라이브 회장 전체를 가득 메운 야광봉. 노래하고 춤추며 미소를 흩뿌리는 두 아이돌의 반짝이는 모습…… 모든 것이 눈부셔서."

[[dialogue]]
speaker = "レミカ"
original = "「あっ……ちかくに、くる……？」"
translation = "「앗…… 가까이, 온다……?」"

[[dialogue]]
speaker = "unk"
original = "最前列で見上げていた私は、よほど目立っていたのだろうか。間奏の最中に流星スターピースの２人が近づいて、ウィンクと共にハイタッチをしてくれたのだ。"
translation = "맨 앞줄에서 올려다보고 있던 내가 유독 눈에 띄었던 걸까. 간주 도중에 유성 스타 피스의 두 사람이 다가와 윙크와 함께 하이파이브를 해주었다."

[[dialogue]]
speaker = "unk"
original = "その瞬間が始まりだったのだと思う。色とりどりの照明を背負い、フリルやリボンでいっぱいの可愛い衣装を着て、観客を虜にする太陽みたいな存在。"
translation = "그 순간이 시작이었다고 생각한다. 형형색색의 조명을 등에 지고 프릴과 리본이 가득한 귀여운 의상을 입고 관객을 사로잡는 태양 같은 존재."

[[dialogue]]
speaker = "レミカ"
original = "「わたしも……あいどるになりたい！」"
translation = "「나도…… 아이돌이 되고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "そう。流星スターピースの２人のような──『可愛い』を突き詰めた存在に……"
translation = "그래. 유성 스타 피스의 두 사람 같은── 『귀여움』을 끝까지 파고든 존재가……"

[[dialogue]]
speaker = "unk"
original = "とある日の夜──星徒会の業務で居残りをしていた俺は、学園のカフェを目指していた。"
translation = "어느 날 밤── 성도회 업무로 남아서 일하던 나는 학원의 카페로 향하고 있었다."

[[dialogue]]
speaker = "unk"
original = "今はちょうど新星学園が慌ただしい時期だし、母さんには夕食はいらないと伝えてある。席が空いているといいのだけど……！"
translation = "지금은 마침 신성학원이 분주한 시기이고, 어머니에게는 저녁은 필요 없다고 전해 두었다. 자리가 비어 있으면 좋겠는데……!"

[[dialogue]]
speaker = "unk"
original = "夜なのに席が埋まってるな……"
translation = "밤인데도 자리가 꽉 찼네……"

[[dialogue]]
speaker = "unk"
original = "なんとか定食は買えたけど"
translation = "어떻게든 정식은 샀지만"

[[dialogue]]
speaker = "メルエル"
original = "「あ、会長くん！\u3000席を探してるなら、一緒にどうかな！」"
translation = "「아, 회장군! 자리 찾고 있다면 같이 앉을래!」"

[[dialogue]]
speaker = "unk"
original = "メルエル！\u3000助かるよ、ありがとう！"
translation = "메르엘! 살았어, 고마워!"

[[dialogue]]
speaker = "メルエル"
original = "「えへへ、お礼なんていいよ～。はいここ、座って座って！」"
translation = "「에헤헤, 감사 인사는 됐어~. 자 여기, 앉아 앉아!」"

[[dialogue]]
speaker = "unk"
original = "彼女の名前は姫咲メルエル。見た目どおりの明るく可愛い天使の女の子だ。"
translation = "그녀의 이름은 히메사키 메르엘. 겉모습 그대로 밝고 귀여운 천사 소녀다."

[[dialogue]]
speaker = "unk"
original = "俺とメルエルは、昔一緒に遊んでいた幼なじみらしいのだが……魔王として転生した影響か、俺は幼い頃の記憶が曖昧な時期がある。"
translation = "나와 메르엘은 예전에 함께 놀았던 소꿉친구라는 것 같은데…… 마왕으로 전생한 영향인지 나는 어린 시절의 기억이 애매한 시기가 있다."

[[dialogue]]
speaker = "unk"
original = "昔のことを思い出せないのは申し訳なく、歯がゆいのだけど、メルエルはいつもフレンドリーに接してくれるのだった。"
translation = "옛날 일을 떠올리지 못하는 건 미안하고 답답하지만, 메르엘은 언제나 친근하게 대해주었다."

[[dialogue]]
speaker = "メルエル"
original = "「星徒会のお仕事、お疲れ様。私もボランティア部の用事で居残りしてて……ちょうどいいタイミングだったね♪」"
translation = "「성도회 업무 고생 많아. 나도 봉사부 일 때문에 남아 있었는데…… 딱 좋은 타이밍이었네♪」"

[[dialogue]]
speaker = "メルエル"
original = "「うん！\u3000もうすぐ新星学園のオープンキャンパスだもん。どの部活動も、盛り上げようって張り切ってるみたい」"
translation = "「응! 곧 신성학원 오픈 캠퍼스니까. 어느 동아리든 분위기를 띄우려고 기합이 잔뜩 들어간 모양이야」"

[[dialogue]]
speaker = "unk"
original = "ここのところハードだよ"
translation = "요즘 꽤 힘들다니까"

[[dialogue]]
speaker = "unk"
original = "にぎやかなのは嬉しいけど"
translation = "시끌벅적한 건 좋지만"

[[dialogue]]
speaker = "メルエル"
original = "「たしかにキミのお顔、お疲れモードって感じだねぇ。……ん？\u3000私は疲れてる時、どんなことをするのかって？」"
translation = "「확실히 네 얼굴, 피곤함이 가득한 느낌이네. ……응? 나는 피곤할 때 뭘 하냐구?」"

[[dialogue]]
speaker = "メルエル"
original = "「私は猫ちゃんと遊んだり、カラオケで歌ったり……あとはアイドルのライブとか見るよ！」"
translation = "「나는 고양이랑 놀거나 노래방에서 노래하거나…… 아니면 아이돌 라이브 같은 걸 봐!」"

[[dialogue]]
speaker = "メルエル"
original = "「可愛い女の子の笑顔と歌。動画で見るだけでも元気がもらえるよね♪」"
translation = "「귀여운 여자아이의 미소와 노래. 영상으로 보는 것만으로도 기운이 나거든♪」"

[[dialogue]]
speaker = "メルエル"
original = "「そうだ、アイドルと言えば──会長くんはこの動画見た？\u3000レミカちゃんが、街頭インタビュー受けてるやつなんだけど……」"
translation = "「맞다, 아이돌 하니까── 회장군은 이 영상 봤어? 레미카짱이 길거리 인터뷰 받는 건데……」"

[[dialogue]]
speaker = "インタビュアー"
original = "『──本日はクールな眼差しで私たちを魅了するアイドル、愛戸レミカさんの学園帰りに密着しています！\u3000さっそく色々聞いてみましょう！』"
translation = "『──오늘은 쿨한 눈빛으로 우리를 매료하는 아이돌, 아이도 레미카 씨의 하굣길을 밀착 취재하고 있습니다! 바로 이것저것 물어보죠!』"

[[dialogue]]
speaker = "レミカ"
original = "『いつも応援してくださってありがとうございます。こちらこそよろしくお願いします』"
translation = "『항상 응원해 주셔서 감사합니다. 저야말로 잘 부탁드려요』"

[[dialogue]]
speaker = "unk"
original = "レミカは星騎士でありながら、大手芸能事務所『ポラリスプロダクション』に所属する現役のアイドルでもある。"
translation = "레미카는 성기사이면서 대형 연예 기획사 『폴라리스 프로덕션』에 소속된 현역 아이돌이기도 하다."

[[dialogue]]
speaker = "unk"
original = "天性の歌唱センスとそのクールな印象から、アイドルというよりもアーティスティックなシンガーとして絶大な人気を得ている存在だ。"
translation = "천부적인 가창 센스와 그 쿨한 인상 덕분에 아이돌이라기보다 예술적인 싱어로서 절대적인 인기를 얻고 있는 존재다."

[[dialogue]]
speaker = "レミカ"
original = "『──そうですね。曲を考える時はこうやって街を歩くことが多いです。やっぱり体を動かした方がインスピレーションが湧くので』"
translation = "『──그렇네요. 곡을 생각할 때는 이렇게 거리를 걷는 경우가 많아요. 역시 몸을 움직이는 게 영감이 잘 떠오르거든요』"

[[dialogue]]
speaker = "レミカ"
original = "『星騎士とアイドルの両立は確かに大変ですけど、楽しいから苦じゃないかな？\u3000それに手を抜くのって苦手で』"
translation = "『성기사와 아이돌의 양립은 확실히 힘들지만, 즐거우니까 괴롭지는 않으려나? 게다가 적당히 하는 건 체질에 안 맞아서요』"

[[dialogue]]
speaker = "レミカ"
original = "『……今後の展開ですか？\u3000ふふっ、それについては今はあんまり言えないんですけど。ちょっと面白いことを考えてます』"
translation = "『……향후 전개요? 후훗, 그건 지금은 별로 말씀드릴 수 없지만. 조금 재미있는 걸 생각하고 있어요』"

[[dialogue]]
speaker = "レミカ"
original = "『新鮮な私を見せられたらいいなって思ってますから。期待しててください』"
translation = "『신선한 제 모습을 보여드릴 수 있으면 좋겠다고 생각하니까요. 기대해 주세요』"

[[dialogue]]
speaker = "メルエル"
original = "「かっこいいなぁ～レミカちゃん。ワールドクラスのアイドルなのに、まだ新しいことにチャレンジしようとしてるなんて凄いよね」"
translation = "「멋지다~ 레미카짱. 월드 클래스 아이돌인데 아직도 새로운 것에 도전하려 하다니 대단해」"

[[dialogue]]
speaker = "メルエル"
original = "「一緒にカラオケへ行って遊んだりするお友達が、世界的に有名なアイドルっていうの、何だかヘンな感じかも」"
translation = "「같이 노래방 가서 노는 친구가 세계적으로 유명한 아이돌이라니, 왠지 이상한 기분일지도」"

[[dialogue]]
speaker = "unk"
original = "レミカにアイドル勧誘されてたよね"
translation = "레미카에게 아이돌 권유받았었지"

[[dialogue]]
speaker = "unk"
original = "そういえばメルエルって"
translation = "그러고 보니 메르엘은"

[[dialogue]]
speaker = "メルエル"
original = "「あはは……あったね、そんなことも。私の鼻歌と笑顔に才能を感じたー、なんて言われて……」"
translation = "「아하하…… 그랬었지, 그런 일도. 내 콧노래와 미소에서 재능을 느꼈다나 뭐라나……」"

[[dialogue]]
speaker = "メルエル"
original = "「『ユニットを組んでみない？』って言われて困っちゃった。まあでも、あのことがきっかけでレミカちゃんとは仲良くなれたんだけど」"
translation = "「『유닛을 짜보지 않을래?』라고 해서 곤란했어. 뭐 그래도 그 일을 계기로 레미카짱이랑은 친해질 수 있었지만」"

[[dialogue]]
speaker = "メルエル"
original = "「……ユニットを組みたがる理由？\u3000えっとー……確かレミカちゃんって、元々は今の自分とは違う路線のアイドルが好きだったんだって」"
translation = "「……유닛을 짜고 싶어 하는 이유? 에또~…… 분명 레미카짱은 원래 지금의 자신과는 다른 노선의 아이돌을 좋아했대」"

[[dialogue]]
speaker = "メルエル"
original = "「可愛さに全振りした感じの、いわゆる『アイドル！』って感じのやつ。しかも、その憧れだったアイドルもユニットだったらしくて」"
translation = "「귀여움에 올인한 느낌의, 이른바 『아이돌!』 같은 느낌의 거. 게다가 그 동경했던 아이돌도 유닛이었다나 봐」"

[[dialogue]]
speaker = "unk"
original = "動画で言ってた『新鮮な私』って……"
translation = "영상에서 말한 『신선한 나』라는 건……"

[[dialogue]]
speaker = "メルエル"
original = "「あ、そっか！\u3000もしかしたらユニットを組んでくれる相棒が見つかったのかも！」"
translation = "「아, 그렇구나! 어쩌면 유닛을 같이 해줄 파트너를 찾은 걸지도 몰라!」"

[[dialogue]]
speaker = "メルエル"
original = "「フリフリの可愛い衣装を着たレミカちゃん、見れちゃうのかなぁ。楽しみだな～♪」"
translation = "「하늘하늘하고 귀여운 의상을 입은 레미카짱을 볼 수 있으려나. 기대된다~♪」"

[[dialogue]]
speaker = "unk"
original = "またメルエルが誘われたりして"
translation = "또 메르엘이 권유받거나 하는 거 아냐"

[[dialogue]]
speaker = "メルエル"
original = "「あはは、まさか～。ちゃんとお断りしたし、レミカちゃんもとっくに、プロのアイドル友達を誘ってるんじゃないかな？」"
translation = "「아하하, 설마~. 제대로 거절하기도 했고, 레미카짱도 진작에 프로 아이돌 친구를 꼬시지 않았을까?」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。だから、ないない。私をまた誘ってくるだなんて、そんなことあるわけないってば～♪」"
translation = "「응. 그러니까 없어 없어. 나를 또 꼬시다니 그럴 리가 없다니까~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──時は満ちたわ！」"
translation = "「──때가 되었어!」"

[[dialogue]]
speaker = "レミカ"
original = "「ありがとう、ヴィーナス。ヘレナさんに話を通してくれたおかげで、パーフェクトな衣装が完成しそうだよ」"
translation = "「고마워, 비너스. 헬레나 씨에게 말을 잘 해준 덕분에 퍼펙트한 의상이 완성될 것 같아」"

[[dialogue]]
speaker = "レミカ"
original = "「今さらだけど本当に衣装代、タダでいいの？\u3000ちゃんと依頼料を払いたいんだけど」"
translation = "「이제 와서 하는 말이지만 정말 의상비, 공짜로 괜찮아? 제대로 의뢰비를 지불하고 싶은데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいのいいの。これは新フォームの起動テストも兼ねてるんだから。気にしないで！」"
translation = "「괜찮아 괜찮아. 이건 신규 폼의 기동 테스트도 겸하는 거니까. 신경 쓰지 마!」"

[[dialogue]]
speaker = "レミカ"
original = "「──わかった。代わりに最高のパフォーマンス、見せるからね」"
translation = "「──알았어. 대신 최고의 퍼포먼스를 보여줄게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ！\u3000それじゃあ明日の放課後、いよいよ決行よ！\u3000アイドルユニットを組むには、最後の１ピースが欠かせないんだから！」"
translation = "「그래! 그럼 내일 방과 후, 드디어 결행이야! 아이돌 유닛을 짜기 위해서는 마지막 한 조각(피스)이 빠질 수 없으니까!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「待ってなさい！\u3000メルエル～～～！」"
translation = "「기다려라! 메르엘~~~!」"

