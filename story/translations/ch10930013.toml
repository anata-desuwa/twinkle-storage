[[dialogue]]
speaker = "unk"
original = "第３話,レッツ恋バナ！,P"
translation = "제3화, 레츠 사랑 이야기!, P"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ……」"
translation = "「하아……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ミルフィーさん、最近ため息が多いですね……」"
translation = "「밀피 씨, 요즘 한숨이 많네요……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「もしかして、何か悩み事でも？\u3000よろしければお力になりますが……」"
translation = "「혹시, 무슨 고민거리라도? 괜찮으시다면 힘이 되어드리겠습니다만……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、そんな！\u3000マグダレナ様に相談なんて畏れ多いです！\u3000こうやって一緒の席に座ってるだけでも精一杯なのに……！」"
translation = "「그, 그럴 수가! 막달레나 님께 상담이라니 황송해요! 이렇게 같이 자리에 앉아 있는 것만으로도 벅찬데……!」"

[[dialogue]]
speaker = "マグダレナ"
original = "「貴方がそう畏まるのも無理はありません。ですが私は、私の愛しい信徒が苦しんでいるのを見過ごしたくはないのです。どうか、私に力にならせてもらえませんか……？」"
translation = "「당신이 그렇게 송구스러워하는 것도 무리는 아닙니다. 하지만 저는, 저의 사랑스러운 신도가 고통받는 것을 보고만 있을 수는 없습니다. 부디, 제가 힘이 되게 해주지 않겠습니까……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「マグダレナ様……！」"
translation = "「막달레나 님……!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「……マグダレナ様にそこまで言われましたら、話さないわけにはいきませんね」"
translation = "「……막달레나 님께서 그렇게까지 말씀하신다면, 이야기하지 않을 수 없겠네요」"

[[dialogue]]
speaker = "イクシリオン"
original = "「私も！\u3000私も相談に乗りますよ！」"
translation = "「저도요! 저도 상담해 드릴게요!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「イクシーちゃんもありがとう」"
translation = "「익실 짱도 고마워」"

[[dialogue]]
speaker = "マグダレナ"
original = "「それで悩みというのは……」"
translation = "「그래서 고민이라는 것은……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はい、実は私……最近会長くんのことばかり考えてしまうんです……寝ても覚めても会長くんのことが頭から離れなくて……」"
translation = "「네, 사실 저…… 요즘 회장군 생각만 하게 돼요…… 자나 깨나 회장군이 머릿속에서 떠나질 않아서……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「今会長くんは何してるんだろうとか、会長くんと今日は話せたなぁとか……なんだったら夢にまで会長くんが出てきてしまって……」"
translation = "「지금 회장군은 뭐 하고 있을까라든가, 회장군이랑 오늘은 이야기했네라든가…… 심지어 꿈에까지 회장군이 나와버려서……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そ、それは……」"
translation = "「그, 그것은……」"

[[dialogue]]
speaker = "イクシリオン"
original = "（完ッ全に恋！！\u3000ミルフィーさんてば、会長に恋してしまってます！！\u3000でもこの感じ……ミルフィーさんは恋を自覚されていないようですね……）"
translation = "(완! 전! 히! 사랑!! 밀피 씨도 참, 회장에게 반해버렸네요!! 하지만 이 느낌…… 밀피 씨는 사랑을 자각하지 못하고 계신 것 같군요……)"

[[dialogue]]
speaker = "マグダレナ"
original = "「なるほど……それでは勉学も部活にも支障をきたしてしまいますね」"
translation = "「과연…… 그렇다면 학업이나 부활동에도 지장을 주겠군요」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そうなんです……私はクラス委員長としてしっかりしないといけないのに……」"
translation = "「맞아요…… 저는 학급위원장으로서 중심을 잡아야 하는데……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そ、そのミルフィーさん、他に何か気になることとかありますか？\u3000例えば会長のことを考えてると、ドキドキするとか……」"
translation = "「그, 저기 밀피 씨, 그 밖에 신경 쓰이는 점 같은 거 있나요? 예를 들면 회장을 생각하면 두근거린다든가……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「！？\u3000そうなのっ、会長くんのこと考えてると心臓がバクバクして……顔も、赤くなったり……して……」"
translation = "「!? 맞아, 회장군 생각을 하면 심장이 두근두근하고…… 얼굴도, 붉어지거나…… 해서……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「なるほど……それはもしかすると病気かもしれませんね……」"
translation = "「과연…… 그것은 어쩌면 병일지도 모르겠군요……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「びょ、病気ですか……！？」"
translation = "「벼, 병인가요……!?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はい……天使の中には、人間界で長く過ごしていると、体に変調をきたす者も現れるとか。人間界に順応出来なかった天使は、残念ながら……」"
translation = "「네…… 천사 중에는 인간계에서 오래 지내다 보면, 몸에 변조를 일으키는 자도 나타난다고 합니다. 인간계에 적응하지 못한 천사는 유감스럽게도……」"

[[dialogue]]
speaker = "イクシリオン"
original = "（恋の病はある意味では病気ですが、この場合は違いますよ、マグダレナ様！）"
translation = "(상사병은 어떤 의미에서는 병이지만, 이 경우는 달라요, 막달레나 님!)"

[[dialogue]]
speaker = "イクシリオン"
original = "（そう、恋の病とは大人の病……！\u3000健全な男女の心と身体を内側から蝕み、大人の階段を上らせ血沸き肉踊る酒池肉林へと……！）"
translation = "(그래요, 상사병이란 어른의 병……! 건전한 남녀의 심신을 안쪽에서 좀먹어, 어른의 계단을 오르게 하고 피가 끓고 살이 떨리는 주지육림으로……!)"

[[dialogue]]
speaker = "ミルフィー"
original = "「どうしよう……私、そんな重い病気になっちゃったの……？」"
translation = "「어떡해…… 나, 그런 무거운 병에 걸려버린 거야……?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ちょっと待ってください！\u3000その判断は早計ですよ！\u3000その原因が重い病気とは限りません！」"
translation = "「잠깐 기다려 주세요! 그 판단은 성급해요! 그 원인이 무거운 병이라고 단정할 수 없습니다!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ミルフィーさん、心臓がドキドキするのは会長のことを考えてる時だけなんですよね」"
translation = "「밀피 씨, 심장이 두근거리는 건 회장을 생각할 때뿐인 거죠?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うん、そうだけど……」"
translation = "「응, 그렇긴 한데……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「他の異性のことを考えてもドキドキしたりしませんよね！」"
translation = "「다른 이성을 생각해도 두근거리거나 하지 않죠!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うんしない……というか、考えることないかな」"
translation = "「응 안 해…… 아니, 생각할 일도 없으려나」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ならそれはズバリ、恋の病です！！」"
translation = "「그렇다면 그건 바로, 상사병입니다!!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「！！？？」"
translation = "「!!??」"

[[dialogue]]
speaker = "マグダレナ"
original = "「あらまあ……そういうことでしたか」"
translation = "「어머나…… 그런 것이었나요」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、そんなっ、私は別に……！」"
translation = "「그, 그럴 수가, 나는 딱히……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「じゃあ、想像してみてください。会長が誰か知らない女の子と付き合ったり、イチャイチャしているところを……！」"
translation = "「그럼, 상상해 보세요. 회장이 모르는 여자애랑 사귀거나, 꽁냥거리고 있는 모습을……!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そんなの………うっ、うぅぅ～～～！！」"
translation = "「그런 건……… 윽, 으으으으~~!!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「辛い気持ちになりましたよね。だとすれば、それは恋で間違いありません！」"
translation = "「괴로운 기분이 들었죠. 그렇다면 그건 사랑이 틀림없습니다!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「私、恋してたんだ……会長くんに……」"
translation = "「나, 사랑하고 있었구나…… 회장군을……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふふ、悩み事が少し解決したようでよかったです」"
translation = "「후후후, 고민거리가 조금 해결된 것 같아 다행이네요」"

[[dialogue]]
speaker = "unk"
original = "ミルフィー、こんなところで何してるの？"
translation = "밀피, 이런 데서 뭐 해?"

[[dialogue]]
speaker = "ミルフィー"
original = "「きゃああああああああ！！\u3000かかかか会長くん！？」"
translation = "「꺄아아아아아아아아!! 회회회회회장군!?」"

[[dialogue]]
speaker = "unk"
original = "えと……そんなに驚いた？"
translation = "저기…… 그렇게 놀랐어?"

[[dialogue]]
speaker = "イクシリオン"
original = "「ええと……ちょっと色々ありまして……はは」"
translation = "「에또…… 좀 여러 가지 일이 있어서요…… 하하」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、それで会長くん……私たちの会話、聞いてた……？」"
translation = "「그, 그래서 회장군…… 우리 대화, 들었어……?」"

[[dialogue]]
speaker = "unk"
original = "聞いてなかったけど……なんの話をしてたの？"
translation = "못 들었는데…… 무슨 이야기를 하고 있었어?"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、それは秘密！\u3000絶対秘密！\u3000会長くんにだけ秘密！！」"
translation = "「그, 그건 비밀! 절대 비밀! 회장군에게만 비밀!!」"

[[dialogue]]
speaker = "unk"
original = "すごい気になるんだけど……"
translation = "엄청 신경 쓰이는데……"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふ、聞かないであげてください」"
translation = "「후후, 묻지 말아 주세요」"

[[dialogue]]
speaker = "イクシリオン"
original = "（それよりもミルフィーさん、ここは会長にアピールするチャンスですよ）"
translation = "(그것보다 밀피 씨, 지금이 회장에게 어필할 찬스예요)"

[[dialogue]]
speaker = "ミルフィー"
original = "（って言われても！\u3000いきなりチャンスって言われても分かんないよっ）"
translation = "(그렇게 말해도! 갑자기 찬스라고 해도 모르겠다구)"

[[dialogue]]
speaker = "イクシリオン"
original = "（デート、デートです！\u3000男女の仲を深めるためにも、デートに誘いましょう！）"
translation = "(데이트, 데이트예요! 남녀 사이를 돈독히 하기 위해서라도, 데이트 신청을 하죠!)"

[[dialogue]]
speaker = "ミルフィー"
original = "（で、でででデート！？\u3000会長くんと、私が……！？）"
translation = "(데, 데데데데이트!? 회장군이랑, 내가……!?)"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あのっ、会長くん……！\u3000その、ええと……」"
translation = "「저, 저기, 회장군……! 그, 에또……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「こ、今週の日曜日とか……空いてる？\u3000あのえと、実はその会長くんと２人きりで、遊びに行きたいなぁって……」"
translation = "「이, 이번 주 일요일이라든가…… 비어 있어? 저기 에또, 사실은 그 회장군이랑 둘이서, 놀러 가고 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "うん、空いてるよ。一緒に遊びに行こうか"
translation = "응, 비어 있어. 같이 놀러 갈까"

[[dialogue]]
speaker = "ミルフィー"
original = "「やっぱりダメだよね！\u3000ごめん……って、いいの！？」"
translation = "「역시 안 되겠지! 미안…… 어라, 괜찮아!?」"

[[dialogue]]
speaker = "unk"
original = "うん、もちろん"
translation = "응, 물론이지"

[[dialogue]]
speaker = "ミルフィー"
original = "「じゃ、じゃあ、約束ね……！\u3000日曜日楽しみにしてるから！」"
translation = "「그, 그럼, 약속이다……! 일요일 기대하고 있을게!」"

[[dialogue]]
speaker = "unk"
original = "純粋にミルフィーと一緒に遊びたくて約束したけど……これってもしかして、デートってやつなのでは？"
translation = "순수하게 밀피랑 같이 놀고 싶어서 약속했지만…… 이거 혹시, 데이트라는 거 아냐?"

[[dialogue]]
speaker = "unk"
original = "そう気づいてしまったら、心臓が早鐘を打ち、身体が熱くなったのだった。"
translation = "그렇게 깨닫고 나니, 심장이 요동치고 몸이 뜨거워졌다."

