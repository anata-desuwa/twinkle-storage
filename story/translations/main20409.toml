[[dialogue]]
speaker = "unk"
original = "第９話,魔都からの来訪者,B"
translation = "제9화, 마도에서 온 방문자, B"

[[dialogue]]
speaker = "unk"
original = "極星学園の襲撃からからしばらく。"
translation = "극성학원의 습격으로부터 얼마간의 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "例の動画の影響はまだ落ち着いておらず、連日ニュース番組やネットで取り沙汰されていた。"
translation = "그 동영상의 영향은 아직 가라앉지 않았고, 연일 뉴스 프로그램이나 인터넷에서 거론되고 있었다."

[[dialogue]]
speaker = "unk"
original = "何か手がかりが残されていないかと、星徒会役員は手分けして流星市国内を見て回っていた。"
translation = "무언가 단서가 남아있지 않을까 해서 성도회 임원들은 역할을 나누어 유성시국 안을 둘러보고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「ここにもガーディアンが現れたんだな……」"
translation = "「이곳에도 가디언이 나타났었구나……」"

[[dialogue]]
speaker = "unk"
original = "ビルに刻まれた破壊の痕が痛々しい。"
translation = "빌딩에 새겨진 파괴의 흔적이 처참하다."

[[dialogue]]
speaker = "unk"
original = "『極星従騎』と呼ばれるあのガーディアンは今までの敵より強力だ。今後も戦わなければいけないと思うと気が重い。"
translation = "『극성종기』라고 불리는 그 가디언은 지금까지의 적보다 강력하다. 앞으로도 싸워야 한다고 생각하니 마음이 무겁다."

[[dialogue]]
speaker = "クロト"
original = "（でもどうして星騎士がガーディアンを従えているんだ？）"
translation = "（그런데 왜 성기사가 가디언을 거느리고 있는 거지?）"

[[dialogue]]
speaker = "unk"
original = "ガーディアンはフィーニスの塔を守護する存在のはず。"
translation = "가디언은 피니스의 탑을 수호하는 존재일 텐데."

[[dialogue]]
speaker = "unk"
original = "デネブの存続がかかっているとすれば、向こうの守護天使が協力していてもおかしくないのか……？"
translation = "데네브의 존속이 걸려있다면 그쪽의 수호천사가 협력하고 있어도 이상하지 않은 건가……?"

[[dialogue]]
speaker = "？？？"
original = "「はふはふ♪\u3000ん～、コンビニの肉まんおいし～♪」"
translation = "「하후하후♪ 음~, 편의점 고기만두 맛있어~♪」"

[[dialogue]]
speaker = "unk"
original = "俺たちの前に現れたのは、この辺ではあまり見ない、可憐な衣装をまとった女の子。"
translation = "우리 앞에 나타난 것은 이 근처에서는 좀처럼 보기 힘든 가련한 의상을 입은 소녀."

[[dialogue]]
speaker = "unk"
original = "両手に肉まんを持ち、幸せそうに頬張っている。"
translation = "양손에 고기만두를 들고 행복한 듯 볼을 빵빵하게 채우고 있다."

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "？？？"
original = "「そんなにじっと見てもあげないよ？\u3000これ私のだもん」"
translation = "「그렇게 빤히 쳐다봐도 안 줄 거야? 이건 내 거니까.」"

[[dialogue]]
speaker = "クロト"
original = "「いや、欲しいわけじゃないけど……」"
translation = "「아니, 달라는 건 아니지만……」"

[[dialogue]]
speaker = "？？？"
original = "「そうなの？\u3000肉まん美味しいのに」"
translation = "「그래? 고기만두 맛있는데.」"

[[dialogue]]
speaker = "クロト"
original = "「あげたいのかあげたくないのかどっちなんだ」"
translation = "「주고 싶다는 거야, 주기 싫다는 거야, 어느 쪽이야.」"

[[dialogue]]
speaker = "unk"
original = "欲しいと言われてもあげないが、欲しいと言われないのもイヤという、複雑な乙女心（？）だろうか。"
translation = "달라고 해도 안 주겠지만, 달라고 하지 않는 것도 싫다는 복잡한 여심(?)인 걸까."

[[dialogue]]
speaker = "？？？"
original = "「あ、私が綺麗だから見惚れちゃった？\u3000じゃあ仕方ないね」"
translation = "「아, 내가 아름다워서 넋을 잃고 본 거야? 그럼 어쩔 수 없네.」"

[[dialogue]]
speaker = "unk"
original = "確かに彼女は美しい。彼女自身が大粒のダイヤモンドのように光り輝いているようだ。"
translation = "확실히 그녀는 아름답다. 그녀 자신이 커다란 다이아몬드처럼 빛나고 있는 것 같다."

[[dialogue]]
speaker = "unk"
original = "そのおかげか、コンビニの肉まんもいつもより数段上等なものに見える。"
translation = "그 덕분인지 편의점 고기만두도 평소보다 몇 단계는 고급스러운 것으로 보인다."

[[dialogue]]
speaker = "？？？"
original = "「いや～、私の美しさは罪だね～♪\u3000はふはふ……ふ……あむ♪」"
translation = "「이야~, 나의 아름다움은 죄라니까~♪ 하후하후…… 후…… 암♪」"

[[dialogue]]
speaker = "unk"
original = "女の子は両手に持った肉まんを平らげると、さらに一回り大きな肉まんを袋から取り出した。"
translation = "소녀는 양손에 들었던 고기만두를 먹어 치우더니, 봉지에서 한층 더 큰 고기만두를 꺼냈다."

[[dialogue]]
speaker = "？？？"
original = "「最後にとっておいた贅沢黒豚肉まん、いただきまーす♪」"
translation = "「마지막으로 아껴둔 사치스러운 흑돼지 고기만두, 잘 먹겠습니다~♪」"

[[dialogue]]
speaker = "クロト"
original = "「まだ食べるのか？」"
translation = "「또 먹는 거야?」"

[[dialogue]]
speaker = "？？？"
original = "「だって欲しいと思ったら買わなきゃ！\u3000あ～ん♪」"
translation = "「그야 갖고 싶다고 생각하면 사야지! 아~앙♪」"

[[dialogue]]
speaker = "？？？"
original = "「ん～～っ！\u3000こっちもイケるね♪\u3000はふはふっ♪」"
translation = "「음~~! 이것도 괜찮네♪ 하후하후♪」"

[[dialogue]]
speaker = "unk"
original = "熱い肉まんを心底美味しそうに頬張る。"
translation = "뜨거운 고기만두를 진심으로 맛있게 먹는다."

[[dialogue]]
speaker = "unk"
original = "見ているだけでも美味しそうで、この光景をＣＭにしたら肉まんの売り上げ爆増間違いなしだろう。"
translation = "보고만 있어도 맛있어 보여서, 이 광경을 광고로 만들면 고기만두 매출이 폭증할 것이 틀림없다."

[[dialogue]]
speaker = "？？？"
original = "「あむあむ……ごくんっ。ごちそうさま～」"
translation = "「암냠냠…… 꿀꺽. 잘 먹었습니다~」"

[[dialogue]]
speaker = "？？？"
original = "「ねぇねぇ、この辺にめちゃくちゃ美味しい肉まんのお店があるって聞いたんだけど、知ってる？」"
translation = "「저기 저기, 이 근처에 엄청나게 맛있는 고기만두 가게가 있다고 들었는데, 알아?」"

[[dialogue]]
speaker = "クロト"
original = "「まだ食べるのか！？」"
translation = "「아직 더 먹는 거야!?」"

[[dialogue]]
speaker = "？？？"
original = "「言ったでしょ、欲しいと思ったら買うって。ここまで来たんだから食べないと損だよ」"
translation = "「말했잖아, 갖고 싶다고 생각하면 산다고. 여기까지 왔으니까 안 먹으면 손해지.」"

[[dialogue]]
speaker = "unk"
original = "まぁ確かに、遠方から来たのであればそうかもしれない。"
translation = "뭐, 확실히 먼 곳에서 왔다면 그럴지도 모른다."

[[dialogue]]
speaker = "クロト"
original = "「多分知ってる店だから案内するよ。前に近くでバイトしてたことがあるんだ」"
translation = "「아마 아는 가게니까 안내해 줄게. 예전에 근처에서 아르바이트했던 적이 있거든.」"

[[dialogue]]
speaker = "？？？"
original = "「ホント？\u3000やった～♪」"
translation = "「정말? 야호~♪」"

[[dialogue]]
speaker = "クロト"
original = "「ここかな」"
translation = "「여기야.」"

[[dialogue]]
speaker = "？？？"
original = "「えーと……<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>……そうそう、ここ！\u3000ありがとね！\u3000お礼に肉まん奢ってあげるよ♪」"
translation = "「어디 보자…… 고기고기 반점<rt>로로 한텐</rt></ruby>…… 그래그래, 여기! 고마워! 답례로 고기만두 쏠게♪」"

[[dialogue]]
speaker = "？？？"
original = "「特製肉まんくださ～い──」"
translation = "「특제 고기만두 주세요──」"

[[dialogue]]
speaker = "？？？"
original = "「って、閉まってる～～～っ！？」"
translation = "「어라, 닫혀 있잖아~~~!?」"

[[dialogue]]
speaker = "クロト"
original = "「この前の攻撃で被害に遭ったみたいだな……」"
translation = "「얼마 전의 공격으로 피해를 입은 모양이네……」"

[[dialogue]]
speaker = "unk"
original = "以前お世話になったところが損害を受けているのは率直に悲しい。"
translation = "이전에 신세 졌던 곳이 손해를 입은 것은 솔직히 슬프다."

[[dialogue]]
speaker = "unk"
original = "自分の力の及ばなさと、ガーディアンの脅威を痛感する。"
translation = "자신의 힘이 미치지 못함과 가디언의 위협을 뼈저리게 느낀다."

[[dialogue]]
speaker = "？？？"
original = "「うっそ～っ！？\u3000楽しみにしてたのに～っ！？」"
translation = "「말도 안 돼~!? 기대하고 있었는데~!?」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん。俺たちが守れていればよかったんだけど──」"
translation = "「미안. 우리가 지켜냈으면 좋았을 텐데──」"

[[dialogue]]
speaker = "？？？"
original = "「ヤダヤダヤダヤダ！\u3000肉まん食べたい食べたい！\u3000肉まん食べた～い！」"
translation = "「싫어 싫어 싫어 싫어! 고기만두 먹고 싶어 먹고 싶어! 고기만두 먹고 싶어~!」"

[[dialogue]]
speaker = "クロト"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "まるで玩具をねだる子どものように、駄々をこねて転げ回る女の子。"
translation = "마치 장난감을 조르는 아이처럼 떼를 쓰며 뒹구는 소녀."

[[dialogue]]
speaker = "unk"
original = "恥も外聞もない姿に、思わず言葉を失ってしまう。"
translation = "체면도 염치도 없는 모습에 그만 할 말을 잃고 만다."

[[dialogue]]
speaker = "クロト"
original = "「そんなこと言っても、店が開いてないんじゃどうしようも……」"
translation = "「그렇게 말해도 가게가 열지 않았으니 어쩔 도리가……」"

[[dialogue]]
speaker = "？？？"
original = "「ヤダヤダヤダ～！\u3000肉まん食べたいの～！」"
translation = "「싫어 싫어 싫어~! 고기만두 먹고 싶단 말이야~!」"

[[dialogue]]
speaker = "クロト"
original = "（本当に肉まんを食べないと、満足しないかもしれないな……。でも俺にはこの店の肉まんは作れないし、かといってこれを放っていくわけにも……）"
translation = "（정말로 고기만두를 먹지 않으면 만족하지 않을지도 모르겠네……. 하지만 나로선 이 가게의 고기만두를 만들 수 없고, 그렇다고 얘를 버려두고 갈 수도 없고……）"

[[dialogue]]
speaker = "？？？"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "クロト"
original = "（止まった……！？）"
translation = "（멈췄다……!?）"

[[dialogue]]
speaker = "？？？"
original = "「よし！」"
translation = "「좋아!」"

[[dialogue]]
speaker = "unk"
original = "そして女の子がすっくと立ちあがって、ＤＩＳＣを取り出す。"
translation = "그리고 소녀가 벌떡 일어나서 DISC를 꺼낸다."

[[dialogue]]
speaker = "クロト"
original = "「誰かに電話するのか？」"
translation = "「누구한테 전화하게?」"

[[dialogue]]
speaker = "？？？"
original = "「うん、この店の店主にね。えーっと、ネットに出てる番号でいいのかな」"
translation = "「응, 이 가게 주인한테. 어디 보자, 인터넷에 나와 있는 번호면 되려나.」"

[[dialogue]]
speaker = "unk"
original = "まさか店主に直接『肉まんを作って欲しい』と頼むつもりだろうか？\u3000そんな無茶な……"
translation = "설마 주인에게 직접 '고기만두를 만들어 달라'고 부탁할 셈인가? 그런 무리한……"

[[dialogue]]
speaker = "？？？"
original = "「あー、もしもし、肉肉飯店の店長さん？\u3000お店の修理にお金がいるんだよね？\u3000いくらいるの？\u3000私が出してあげるから言い値でいいよ」"
translation = "「아─ 여보세요, 고기고기 반점 점장님? 가게 수리에 돈이 필요하시죠? 얼마면 돼요? 제가 내드릴 테니까 부르는 대로 드릴게요.」"

[[dialogue]]
speaker = "？？？"
original = "「２０００万テルス？\u3000そのくらいでいいの～？\u3000いい機会だし、５０００万ぐらい使って全部新しくしちゃおうよ」"
translation = "「2000만 테루스? 그 정도로 돼요~? 좋은 기회니까 5000만 정도 써서 전부 새 걸로 바꿔버리자고요.」"

[[dialogue]]
speaker = "クロト"
original = "「５０００万……！？」"
translation = "「5000만……!?」"

[[dialogue]]
speaker = "unk"
original = "さらっととんでもない金額が出てきたが、この子が払うつもりだろうか。"
translation = "태연하게 엄청난 금액이 튀어나왔는데, 이 애가 낼 생각인 걸까."

[[dialogue]]
speaker = "？？？"
original = "「それじゃ、工事は今日から特急で終わらせて、ソッコー肉まん作ってもらうから」"
translation = "「그럼 공사는 오늘부터 특급으로 끝내서, 바로 고기만두 만들게 할 거니까요.」"

[[dialogue]]
speaker = "？？？"
original = "「うんうん……特急料金含めて、一億テルスの支払いってことでいいよね？\u3000オッケー、商談成立だね！」"
translation = "「응응…… 특급 요금 포함해서 1억 테루스 지불하는 걸로 하면 되죠? 오케이, 협상 성립이네요!」"

[[dialogue]]
speaker = "？？？"
original = "「やったー、これで肉まん食べれるー♪」"
translation = "「야호, 이제 고기만두 먹을 수 있다~♪」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "？？？"
original = "「どうしたの？\u3000ぽかんと口空けてマヌケな顔してるよ？」"
translation = "「왜 그래? 멍하니 입 벌리고 바보 같은 얼굴 하고 있어?」"

[[dialogue]]
speaker = "クロト"
original = "「ああいや、本当に肉まんのために一億払うんだなって……」"
translation = "「아니, 정말로 고기만두 때문에 1억을 내는구나 싶어서……」"

[[dialogue]]
speaker = "？？？"
original = "「欲しいものは手に入れる。そうじゃないと気が済まないから」"
translation = "「갖고 싶은 건 손에 넣는다. 그러지 않으면 직성이 안 풀리니까.」"

[[dialogue]]
speaker = "？？？"
original = "「そして手に入れるからには、最高の状態で手に入れないと意味がない。でしょう？」"
translation = "「그리고 손에 넣는 이상 최고의 상태로 손에 넣지 않으면 의미가 없잖아. 그치?」"

[[dialogue]]
speaker = "クロト"
original = "「そ、そういうものか……」"
translation = "「그, 그런 건가……」"

[[dialogue]]
speaker = "unk"
original = "一億なんて大金がポンと出てくるあたり、この子はとてつもない大金持ちなんだろうか？"
translation = "1억이라는 거금이 덥석 나오는 걸 보니 이 애는 엄청난 부자인 걸까?"

[[dialogue]]
speaker = "unk"
original = "俺は面識がないけど、五名門の令嬢か何かだろうか。"
translation = "나는 면식이 없지만 오명문의 영애라든가 그런 걸까."

[[dialogue]]
speaker = "クロト"
original = "（ん？\u3000さっきの言葉、聞き覚えがあるような……）"
translation = "（응? 방금 그 말, 어디서 들어본 적이 있는 것 같은데……）"

[[dialogue]]
speaker = "？？？"
original = "「そういえばその制服、新星学園の人だよね？\u3000ていうかマントしてるし会長さん？」"
translation = "「그러고 보니 그 교복, 신성학원 사람이지? 그보다 망토를 두르고 있으니 회장님?」"

[[dialogue]]
speaker = "クロト"
original = "「え？\u3000ああ、そうだけど」"
translation = "「어? 아아, 그렇긴 한데.」"

[[dialogue]]
speaker = "？？？"
original = "「私ね、星騎士が好きなんだ。この前戦ってるところを見たけど、かっこいいよね♪\u3000あの鉄球持ってる子とか、カッコカワイイっていうか～」"
translation = "「나 말이야, 성기사를 좋아해. 저번에 싸우는 걸 봤는데 멋있더라♪ 그 철퇴 들고 있는 애라든가, 멋있고 귀엽다고나 할까~」"

[[dialogue]]
speaker = "クロト"
original = "「鉄球っていうとマム……マハムート先輩かな。新星でも有数の実力者で、しかも寮長で、みんなからも慕われてるんだ」"
translation = "「철퇴라면 마무…… 마하무트 선배겠네. 신성에서도 손꼽히는 실력자고, 게다가 사감이라서 모두에게 존경받고 있어.」"

[[dialogue]]
speaker = "？？？"
original = "「へぇ～、じゃあすごい星騎士なんだ！」"
translation = "「헤에~, 그럼 대단한 성기사네!」"

[[dialogue]]
speaker = "？？？"
original = "「あとあの子もかっこいいよね！\u3000赤い羽の天使で、炎の剣でズバーッて斬っちゃうの！」"
translation = "「그리고 그 애도 멋있더라! 붉은 날개의 천사인데, 화염의 검으로 슈바악─ 하고 베어버려!」"

[[dialogue]]
speaker = "クロト"
original = "「炎の剣だったら多分イクシーだな。彼女もとても優秀なプリマステラで、守護天使に仕えてるんだよ」"
translation = "「화염의 검이라면 아마 이쿠시겠네. 그녀도 매우 우수한 프리마스텔라로, 수호천사를 섬기고 있어.」"

[[dialogue]]
speaker = "？？？"
original = "「守護天使に仕えてる……そういう子もいるんだ。さすが会長さん、星騎士のことよく知ってるんだね！」"
translation = "「수호천사를 섬기고 있다니…… 그런 애도 있구나. 역시 회장님, 성기사에 대해 잘 알고 있네!」"

[[dialogue]]
speaker = "？？？"
original = "「あとあと～、忍者の子とかも気になっててー……」"
translation = "「그리고 그리고~, 닌자 아이 같은 애도 신경 쓰여서─……」"

[[dialogue]]
speaker = "unk"
original = "星騎士について語る彼女の瞳は、肉まんを食べる時みたいにキラキラしていた。"
translation = "성기사에 대해 이야기하는 그녀의 눈동자는, 고기 만두를 먹을 때처럼 반짝거리고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「ところで君は観光で来たの？\u3000名前は？」"
translation = "「그런데 너는 관광하러 온 거야? 이름은?」"

[[dialogue]]
speaker = "？？？"
original = "「あ、そう言えばまだ自己紹介してなかったっけ。私、あなたの遠い親戚なんだっ」"
translation = "「아, 그러고 보니 아직 자기소개를 안 했었네. 나, 당신의 먼 친척이야.」"

[[dialogue]]
speaker = "クロト"
original = "「しんせき……？」"
translation = "「친척……?」"

[[dialogue]]
speaker = "unk"
original = "魔王の生まれ変わりである俺に親戚はいないはず。"
translation = "마왕의 환생인 나에게 친척이 있을 리 없다."

[[dialogue]]
speaker = "unk"
original = "母さんだって魔女だし、親類が三界にいるわけもなく。"
translation = "어머니도 마녀고, 친족이 삼계에 있을 리도 만무하다."

[[dialogue]]
speaker = "unk"
original = "思いも寄らない意外な言葉に、俺が頓狂な声を出していると──"
translation = "생각지도 못한 의외의 말에 내가 멍청한 소리를 내고 있자──"

[[dialogue]]
speaker = "クロト"
original = "「！\u3000アステラ──！」"
translation = "「! 아스테라──!」"

[[dialogue]]
speaker = "クロト"
original = "「ここは危険だ。君は下がって──」"
translation = "「여기는 위험해. 너는 물러나──」"

[[dialogue]]
speaker = "？？？"
original = "「おっ、これが本場のアステラかー。コレクションとして“欲しい”ね」"
translation = "「오, 이게 본고장의 아스테라인가─. 컬렉션으로 “갖고” 싶네.」"

[[dialogue]]
speaker = "クロト"
original = "「え──？」"
translation = "「어──?」"

[[dialogue]]
speaker = "？？？"
original = "「妾のものとなれ」"
translation = "「소첩의 것이 되어라.」"

[[dialogue]]
speaker = "unk"
original = "傲岸な声が響いた瞬間、アステラが空間の歪みごと炎に包まれた。"
translation = "오만한 목소리가 울려 퍼진 순간, 아스테라가 공간의 왜곡째로 불길에 휩싸였다."

[[dialogue]]
speaker = "unk"
original = "そして巨大な炎は小さな火の玉となり、彼女の尾に吸い込まれて──"
translation = "그리고 거대한 불길은 작은 불덩어리가 되어 그녀의 꼬리로 빨려 들어가──"

[[dialogue]]
speaker = "煌嶺"
original = "「名乗るのが遅れたな。妾は煌嶺。キュリオスを統べる皇帝だ」"
translation = "「통성명이 늦었구나. 소첩은 코레이. 큐리오스를 통치하는 황제니라.」"

