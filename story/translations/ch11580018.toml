[[dialogue]]
speaker = "unk"
original = "──これは一連の事件の最終局面、悪魔に寄生されてしまった陽彩を気絶させて捕らえた、その直後の出来事。"
translation = "──이것은 일련의 사건의 최종 국면, 악마에게 기생당한 아키사를 기절시켜 붙잡은 직후의 일."

[[dialogue]]
speaker = "トレジアンナ"
original = "「陽彩さんを元に戻すためには、オムニスさんの力が必要不可欠です☆」"
translation = "「아키사 씨를 원래대로 되돌리기 위해서는 옴니스 씨의 힘이 필수적이에요☆」"

[[dialogue]]
speaker = "オムニス"
original = "「俺に出来ることだったら何でもするつもりですけど……何をすれば？」"
translation = "「제가 할 수 있는 일이라면 뭐든 할 생각입니다만…… 뭘 하면 되죠?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「それは……少々お耳を貸してください」"
translation = "「그건…… 잠시 귀 좀 빌려주세요」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんが俺の耳元（？）に顔を寄せ、小声で囁いてくる。"
translation = "트레지아나 씨가 내 귓가(?)에 얼굴을 가까이 대고 작은 소리로 속삭인다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「今からバカアワビを使って、陽彩さんと一緒にオムニスさんを元の世界へと飛ばします」"
translation = "「지금부터 바카아와비를 사용해 아키사 씨와 함께 옴니스 씨를 원래 세계로 날려 보낼 거예요」"

[[dialogue]]
speaker = "オムニス"
original = "「俺と陽彩だけ？」"
translation = "「나랑 아키사뿐?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「はい、あちらの世界でのあなたは、本来の姿である『<ruby>量<rt>はかり</rt></ruby>とびお』として存在していますので──」"
translation = "「네, 저쪽 세계에서의 당신은 본래 모습인 『하카리 토비오』로서 존재하게 되니까요──」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「陽彩さんとエッチしてきてください♪」"
translation = "「아키사 씨랑 섹스하고 와주세요♪」"

[[dialogue]]
speaker = "オムニス"
original = "「はぁ！？」"
translation = "「하아!?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「これは陽彩さんを元に戻すために必要な事なんです……！」"
translation = "「이건 아키사 씨를 원래대로 되돌리기 위해 필요한 일이에요……!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「彼女と性行為を行い、そして絶頂へと導いてください」"
translation = "「그녀와 성행위를 하고, 그리고 절정으로 이끌어 주세요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「欲望が満たされていくと、ロストアイテムと<ruby>黴体生物<rt>ばいたいせいぶつ</rt></ruby>との結びつきが弱まっていきます」"
translation = "「욕망이 채워져 가면 로스트 아이템과 매체 생물과의 결속이 약해집니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「そこで彼女の下腹部に、これを押し当ててください」"
translation = "「그때 그녀의 하복부에 이것을 갖다 대 주세요」"

[[dialogue]]
speaker = "unk"
original = "そう言ってトレジアンナさんは、大きくて血のように赤い宝石を取り出してみせた。"
translation = "그렇게 말하며 트레지아나 씨는 크고 피처럼 붉은 보석을 꺼내 보였다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「そうすればロストアイテムの力が全てこの宝石に吸収され、それと融合していた黴体生物は存在を維持できなくなるはずです」"
translation = "「그러면 로스트 아이템의 힘이 전부 이 보석에 흡수되어, 그것과 융합했던 매체 생물은 존재를 유지할 수 없게 될 거예요」"

[[dialogue]]
speaker = "オムニス"
original = "「な、なるほど……やらなきゃいけないことはわかりました」"
translation = "「나, 과연…… 해야 할 일은 알겠습니다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「それから……これはあなた用に取っておいた、最後のワクチンです」"
translation = "「그리고…… 이건 당신용으로 챙겨둔 마지막 백신이에요」"

[[dialogue]]
speaker = "オムニス"
original = "「ありがとうございます、助かります」"
translation = "「감사합니다, 도움이 되겠네요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「これがあれば彼女との性行為中でも、ある程度は欲望を抑えられるはずですが……」"
translation = "「이게 있으면 그녀와의 성행위 중에도 어느 정도는 욕망을 억제할 수 있을 테지만……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ご存じの通り、相手はエロエロな能力を使う悪魔が取りついてる陽彩さんです☆\u3000欲望と快楽に飲まれないよう、十分注意してくださいね～」"
translation = "「아시다시피 상대는 야릇한 능력을 쓰는 악마가 들러붙은 아키사 씨예요☆ 욕망과 쾌락에 먹히지 않도록 충분히 주의하세요~」"

[[dialogue]]
speaker = "オムニス"
original = "「りょ、了解です……」"
translation = "「아, 알겠습니다……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「転移が完了したら、陽彩さんの動きを封じているサチさんの拘束もなくなります……」"
translation = "「전이가 완료되면 아키사 씨의 움직임을 봉하고 있는 사치 씨의 구속도 사라집니다……」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ですから可能な限り速やかに、陽彩さんをエッチで絶頂させてください☆」"
translation = "「그러니까 가능한 한 신속하게 아키사 씨를 섹스로 절정시켜 주세요☆」"

[[dialogue]]
speaker = "unk"
original = "俺はトレジアンナさんの言葉にうなずき、魔石を受け取る。"
translation = "나는 트레지아나 씨의 말에 고개를 끄덕이고 마석을 받았다."

[[dialogue]]
speaker = "unk"
original = "大きく息を吸い込み、転移した先での自分の行動を頭の中で何度もシミュレートした。"
translation = "크게 숨을 들이마시고 전이된 곳에서의 내 행동을 머릿속으로 몇 번이고 시뮬레이션했다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「では、行ってらっしゃいませ～☆」"
translation = "「그럼, 다녀오세요~☆」"

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "unk"
original = "空間が歪み、意識がゆっくりと遠のきそうになる。"
translation = "공간이 일그러지고 의식이 서서히 멀어지려 한다."

[[dialogue]]
speaker = "unk"
original = "それを懸命に耐えながら、転移が終わるのを待った。"
translation = "그것을 필사적으로 견디며 전이가 끝나기를 기다렸다."

[[dialogue]]
speaker = "とびお"
original = "「……なんだこれ……いきなり大ピンチじゃないか」"
translation = "「……뭐야 이거…… 갑자기 대위기잖아」"

[[dialogue]]
speaker = "unk"
original = "脳内で繰り返した想定はいきなり崩れ去り、俺は目をぎらつかせた陽彩に覆いかぶさられていた。"
translation = "뇌내에서 반복했던 예상은 순식간에 무너졌고, 나는 눈을 번뜩이는 아키사에게 깔려 있었다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁあ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000とびお……きみの魂胆はわかっている……<emoji=heart04>\u3000ぼくからロストアイテムの力を、引きはがそうというんだろう？」"
translation = "「하아아♥ 하아♥ 아아아♥ 토비오…… 네 속셈은 알고 있어……♥ 나에게서 로스트 아이템의 힘을 떼어내려는 거지?」"

[[dialogue]]
speaker = "陽彩"
original = "「この硬くそそり立ったきみのち○ぽで、はぁぁ<emoji=heart04>\u3000絶頂させられてしまったら……はぁあ<emoji=heart04>」"
translation = "「이 딱딱하게 솟구친 네 자지로, 하아아♥ 절정해버리면…… 하아아♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁぁ<emoji=heart04>\u3000欲望が昇華され、ロストアイテムとの結びつきが、んんぅ<emoji=heart04>\u3000緩んでしまうかもしれない……<emoji=heart04>\u3000ふぅぅ<emoji=heart04>」"
translation = "「아아아♥ 욕망이 승화되어 로스트 아이템과의 결속이, 응으♥ 느슨해질지도 모르지……♥ 후으으♥」"

[[dialogue]]
speaker = "陽彩"
original = "「それは惜しい……はぁあぁ<emoji=heart04>\u3000ぼくはこの力を失いたくない……<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000もっともっと、この力のことを知りたいんだ……<emoji=heart04>」"
translation = "「그건 아까워…… 하아아아♥ 나는 이 힘을 잃고 싶지 않아……♥ 아아아♥ 좀 더 좀 더, 이 힘에 대해 알고 싶단 말이야……♥」"

[[dialogue]]
speaker = "unk"
original = "陽彩の口調に熱がこもる。"
translation = "아키사의 말투에 열기가 서린다."

[[dialogue]]
speaker = "unk"
original = "その様子はまるで、獲物を前に舌なめずりをする獣のようだった。"
translation = "그 모습은 마치 먹잇감을 앞에 두고 입맛을 다시는 짐승 같았다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁあ<emoji=heart04>\u3000だから、襲う<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000きみに襲われて、ち○ぽを突っ込まれてしまう前に……<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000ぼくがきみを先に襲ってやるんだ……<emoji=heart04>」"
translation = "「하아아♥ 그러니까 덮칠 거야♥ 아아앗♥ 너에게 덮쳐져서 자지가 박혀버리기 전에……♥ 아아앗♥ 내가 너를 먼저 덮쳐줄게……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ふふふっ<emoji=heart04>\u3000これからきみの、はふぅぅ<emoji=heart04>\u3000ガチガチのち○ぽを……<emoji=heart04>\u3000ぼくのおま○こでしごき立てる……<emoji=heart04>」"
translation = "「후후후♥ 이제부터 너의, 하후으으♥ 빳빳한 자지를……♥ 내 보지로 훑어줄게……♥」"

[[dialogue]]
speaker = "とびお"
original = "「何がどう違うんだ！？\u3000それだとやってることは同じじゃないか！」"
translation = "「뭐가 어떻게 다르다는 거야!? 그러면 하고 있는 짓은 똑같잖아!」"

[[dialogue]]
speaker = "陽彩"
original = "「全然違うよ<emoji=heart04>\u3000はぁあぁ<emoji=heart04>\u3000ぼくが絶頂するよりも先に<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000とびおを絶頂させるんだ……<emoji=heart04>\u3000はふぅぅ<emoji=heart04>」"
translation = "「전혀 달라♥ 하아아아♥ 내가 절정하기보다 먼저♥ 응으♥ 토비오를 절정시키는 거야……♥ 하후으으♥」"

[[dialogue]]
speaker = "陽彩"
original = "「そうして、あぁぁぁっ<emoji=heart04>\u3000とびおの全部を支配してあげる<emoji=heart04>\u3000はぁあぁ<emoji=heart04>」"
translation = "「그렇게 해서, 아아아아앗♥ 토비오의 전부를 지배해줄게♥ 하아아아♥」"

[[dialogue]]
speaker = "陽彩"
original = "「快楽と欲望で脳みそを煮詰めて、あぁあっ<emoji=heart04>\u3000ぼくのおま○こに、ち○ぽを突っ込むだけの幸せな下僕にしてあげるんだ<emoji=heart04>」"
translation = "「쾌락과 욕망으로 뇌를 삶아서, 아아앗♥ 내 보지에 자지를 박기만 하는 행복한 하인으로 만들어줄게♥」"

[[dialogue]]
speaker = "とびお"
original = "「そ、んなことに、させるか……！\u3000俺がお前をイカせて、元の陽彩に戻すんだ！」"
translation = "「그, 그런 짓 하게 둘 것 같냐……! 내가 너를 가게 해서 원래의 아키사로 되돌릴 거다!」"

[[dialogue]]
speaker = "陽彩"
original = "「ふふふっ<emoji=heart04>\u3000何やら秘密兵器もあるみたいだし、あぁぁ<emoji=heart04>\u3000そういう未来も、あるのかもしれないねっ<emoji=heart04>\u3000でも構わないっ<emoji=heart04>」"
translation = "「후후후♥ 뭔가 비밀 병기도 있는 모양이고, 아아아♥ 그런 미래도 있을지도 모르겠네♥ 하지만 상관없어♥」"

[[dialogue]]
speaker = "陽彩"
original = "「はぁあぁん<emoji=heart04>\u3000ぼくのおま○こできみを絶頂させて<emoji=heart04>\u3000あはぁあ<emoji=heart04>\u3000熱く痺れ切った子宮に、きみの熱い精液を流し込ませる<emoji=heart04>」"
translation = "「하아아아앙♥ 내 보지로 너를 절정시켜서♥ 아하아아♥ 뜨겁게 저린 자궁에 네 뜨거운 정액을 흘려넣게 할 거야♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁあぁあぁ<emoji=heart04>\u3000ぼくの脳みそはもう、その欲望でいっぱいなんだっ<emoji=heart04>\u3000はぁあ<emoji=heart04>\u3000想像しただけで、気持ちよさで頭がおかしくなりそうだ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아♥ 내 머릿속은 벌써 그 욕망으로 가득 찼어♥ 하아아♥ 상상만 해도 기분 좋아서 머리가 어떻게 될 것 같아♥♥」"

[[dialogue]]
speaker = "陽彩"
original = "「さあ、せめぎ合おうっ<emoji=heart04>\u3000はふぅぅ<emoji=heart04>\u3000危険に身を晒したままの方が、より深い興奮を得られるだろうからっ<emoji=heart04>」"
translation = "「자, 서로 맞서보자♥ 하후으으♥ 위험에 몸을 노출한 상태가 더 깊은 흥분을 얻을 수 있을 테니까♥」"

[[dialogue]]
speaker = "unk"
original = "陽彩は俺のペニスを、ぷりぷりの恥丘に押し当てる。"
translation = "아키사는 내 페니스를 탱글탱글한 치구에 문지른다."

[[dialogue]]
speaker = "unk"
original = "ぷちゅり、と瑞々しい音がして、その先端が陽彩の花びらの中へと潜っていく。"
translation = "푸츄리, 하는 싱그러운 소리가 나며 그 끝이 아키사의 꽃잎 속으로 잠겨 들어간다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁあ<emoji=heart04>\u3000ぁあ……はぁぁ<emoji=heart04>\u3000ち○ぽ、入れるぞ<emoji=heart04>\u3000ぼくの、おま○こに……<emoji=heart04>」"
translation = "「하아아♥ 아아…… 하아아♥ 자지, 넣는다♥ 내 보지에……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「胸が高鳴るよ<emoji=heart04>\u3000命を削るようなセックス<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000そんなの、絶対気持ちいいに決まってるっ<emoji=heart04>」"
translation = "「가슴이 설레♥ 목숨을 깎는 듯한 섹스♥ 아앙♥ 그런 건 분명 기분 좋을 게 뻔하니까♥」"

[[dialogue]]
speaker = "陽彩"
original = "「んんぅっ<emoji=heart04>\u3000はぁあ……んんん……<emoji=heart04>\u3000入って、くるぅ<emoji=heart04>\u3000んんんっ、ち○ぽが……ぼくのおま○こ<emoji=heart04>\u3000メリメリ押し分けて……<emoji=heart04>」"
translation = "「응으으♥ 하아아…… 응응……♥ 들어, 와♥ 응응응, 자지가…… 내 보지♥ 메리메리 헤치면서……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「っ、あ……ああああああっ……<emoji=heart04><emoji=heart04>」"
translation = "「윽, 아…… 아아아아아아앗……♥♥」"

[[dialogue]]
speaker = "陽彩"
original = "「はぁ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000はぁあ<emoji=heart04>\u3000全部、入ったぞ……<emoji=heart04>」"
translation = "「하아♥ 하아♥ 하아아♥ 전부 들어갔어……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁん<emoji=heart04>\u3000どうだ、奥に当たっているぞ……<emoji=heart04>\u3000あはぁあ<emoji=heart04>\u3000きみのち○ぽ……ぼくのおま○この中でびくびくしてる……<emoji=heart04>」"
translation = "「아앙♥ 어때, 안쪽에 닿아 있어……♥ 아하아아♥ 네 자지…… 내 보지 안에서 파르르 떨고 있어……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「はぁぁ<emoji=heart04>\u3000気持ちよくして欲しいと、啼いてるんだ……<emoji=heart04>\u3000んんっ……そうだろうっ<emoji=heart04>」"
translation = "「하아아♥ 기분 좋게 해달라고 울고 있구나……♥ 응…… 그렇잖아♥」"

[[dialogue]]
speaker = "unk"
original = "陽彩の言う通り、陽彩の膣に包まれたペニスは、熱い疼きを抑えられずにいた。"
translation = "아키사의 말대로, 아키사의 질에 감싸인 페니스는 뜨거운 욱신거림을 억제하지 못하고 있었다."

[[dialogue]]
speaker = "unk"
original = "柔らかく包み込むようで、それなのにしっかりとした密着感がある。"
translation = "부드럽게 감싸 안는 것 같으면서도 확실한 밀착감이 있다."

[[dialogue]]
speaker = "unk"
original = "動きたい……その言葉が口を突いて出そうになった時、まるでそれを見透かしたかのように陽彩の手が身体を抑えつける。"
translation = "움직이고 싶다…… 그 말이 입 밖으로 튀어나오려 할 때, 마치 그것을 꿰뚫어 본 것처럼 아키사의 손이 몸을 억누른다."

[[dialogue]]
speaker = "陽彩"
original = "「動きたいのかな？\u3000はふぅぅ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000だが、それは許さないよ……<emoji=heart04>\u3000このセックスで、マウントを取っているのはぼくだ<emoji=heart04>」"
translation = "「움직이고 싶어? 하후으으♥ 아아아♥ 하지만 그건 허락하지 않아……♥ 이 섹스에서 주도권을 잡고 있는 건 나야♥」"

[[dialogue]]
speaker = "unk"
original = "その力は信じられないほど強く、微動だにすることが出来なかった。"
translation = "그 힘은 믿을 수 없을 정도로 강해서 미동조차 할 수 없었다."

[[dialogue]]
speaker = "陽彩"
original = "「あはぁあ<emoji=heart04>\u3000どうだい……<emoji=heart04>\u3000動きたくても満足に動けず……んんぅ<emoji=heart04>\u3000一方的に快楽を与え続けられる<emoji=heart04>」"
translation = "「아하아아♥ 어때……♥ 움직이고 싶어도 제대로 움직이지 못하고…… 응으♥ 일방적으로 쾌락을 계속 제공받는 기분은♥」"

[[dialogue]]
speaker = "陽彩"
original = "「その衝動は徐々に募ってゆき……あぁぁ<emoji=heart04>\u3000やがてぼくのおま○こで、んふぅ<emoji=heart04>\u3000暴発してしまうんだ……ふふふ<emoji=heart04>」"
translation = "「그 충동은 서서히 쌓여가고…… 아아아♥ 이윽고 내 보지에서, 응후♥ 폭발해버리는 거야…… 후후후♥」"

[[dialogue]]
speaker = "unk"
original = "俺を抑えつけたまま、陽彩はゆっくり腰を動かし始めた。"
translation = "나를 억누른 채 아키사는 천천히 허리를 움직이기 시작했다."

[[dialogue]]
speaker = "unk"
original = "陽彩の腰が浮くたびに、柔らかな襞がカリの部分を心地よくなぞっていき、痺れるような快感が下半身を走り抜けていく。"
translation = "아키사의 허리가 들릴 때마다 부드러운 주름이 귀두 부분을 기분 좋게 훑고 지나가며, 저릿한 쾌감이 하반신을 관통한다."

[[dialogue]]
speaker = "とびお"
original = "「っ……くぅ……！」"
translation = "「윽…… 쿠윽……!」"

[[dialogue]]
speaker = "陽彩"
original = "「はぁ<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000……切なそうな顔をしてっ<emoji=heart04>\u3000とびおのその顔、ゾクゾクするね<emoji=heart04>」"
translation = "「하아♥ 아앙♥ 응으♥ ……애처로운 표정을 짓고는♥ 토비오의 그 얼굴, 오싹오싹하네♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ふふふっ<emoji=heart04>\u3000ぼくのおま○こは……<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000そんなに気持ちいいかいっ<emoji=heart04>\u3000……んんっ、は、んぅ<emoji=heart04>」"
translation = "「후후후♥ 내 보지는……♥ 아앗♥ 그렇게 기분 좋니♥ ……응, 하, 응♥」"

[[dialogue]]
speaker = "陽彩"
original = "「イキたくなったら<emoji=heart04>\u3000あぁあぁ<emoji=heart04>\u3000いつでもイッて、いいんだよ<emoji=heart04>\u3000んんぅ、はぁあっ<emoji=heart04>」"
translation = "「가고 싶어지면♥ 아아아아♥ 언제든 가도 괜찮아♥ 응으, 하아앗♥」"

[[dialogue]]
speaker = "陽彩"
original = "「でも<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000一度、負けてしまったら……<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000後は転がるように堕ちるだけだ……<emoji=heart04>」"
translation = "「하지만♥ 아아아♥ 한번 져버리면……♥ 아아앗♥ 그다음은 구르듯이 타락할 뿐이야……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁんっ<emoji=heart04>\u3000脳みそを快楽で犯す、一方的な搾取が始まる<emoji=heart04>\u3000<ruby>射精<rt>だ</rt></ruby>して、<ruby>射精<rt>だ</rt></ruby>して、<ruby>射精<rt>だ</rt></ruby>して、<ruby>射精<rt>だ</rt></ruby>してっ<emoji=heart04>\u3000精根尽き果てるまで、一方的に吸い尽くされて……<emoji=heart04>」"
translation = "「아앙♥ 뇌를 쾌락으로 범하는 일방적인 착취가 시작돼♥ 사정하고, 사정하고, 사정하고, 사정해♥ 정력이 다할 때까지 일방적으로 빨려 나가서……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「それでもぼくのために、はぁんっ<emoji=heart04>\u3000喜んで射精する人形、にしてあげるよ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000ほらほらぁ、嬉しいだろぉ<emoji=heart04>」"
translation = "「그런데도 나를 위해, 하앙♥ 기쁘게 사정하는 인형으로 만들어줄게♥ 아앙♥ 봐봐, 기쁘지♥」"

[[dialogue]]
speaker = "とびお"
original = "「そんなことには……ならない……っ」"
translation = "「그런 일…… 안 생겨…… 윽」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁあぁっ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000そんな事を言いながら<emoji=heart04>\u3000おま○この広がる感覚で、わかったよ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000今の言葉できみのち○ぽ、大きく膨らんだこと<emoji=heart04>」"
translation = "「아아아앗♥ 하아아♥ 그런 말을 하면서♥ 보지가 벌어지는 감각으로 알았어♥ 아앙♥ 방금 그 말에 네 자지, 커다랗게 부풀어 오른 거♥」"

[[dialogue]]
speaker = "陽彩"
original = "「頭からっぽにして<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おま○この奴隷になるのが、嫌な人間なんて、はぁぁ<emoji=heart04>\u3000やっぱりいないんだよ<emoji=heart04>\u3000あはははっ<emoji=heart04>」"
translation = "「머리를 비우고♥ 아앙♥ 보지의 노예가 되는 게 싫은 인간 따위, 하아아♥ 역시 없단 말이야♥ 아하하하♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あはぁぁ<emoji=heart04>\u3000きみだって、本当は気づいていただろう<emoji=heart04>\u3000澄ました顔をしてたが、いろはだって、花織だって、ここあだって<emoji=heart04>」"
translation = "「아하아아♥ 너도 사실은 눈치채고 있었겠지♥ 시치미 떼고 있었지만 이로하도, 카오리도, 코코아도♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あっちの世界の魔法少女たちだってそうさ<emoji=heart04>\u3000あぁあぁっ<emoji=heart04>\u3000ピンク脳症候群に脳みそ侵されて、みんなこっそり股を濡らしてたじゃないかっ<emoji=heart04>」"
translation = "「저쪽 세계의 마법 소녀들도 마찬가지야♥ 아아아앗♥ 핑크 뇌 증후군에 뇌가 침식되어서 다들 몰래 가랑이를 적시고 있었잖아♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁんっ<emoji=heart04>\u3000ぼくの力があと少しだけ強ければ、彼女らに街中で腰を振らせることもできたよ<emoji=heart04>\u3000とびおとセックスだってさせてあげられたのに<emoji=heart04>」"
translation = "「아앙♥ 내 힘이 조금만 더 강했더라면 그녀들에게 거리 한복판에서 허리를 흔들게 할 수도 있었어♥ 토비오랑 섹스도 시켜줄 수 있었는데♥」"

[[dialogue]]
speaker = "陽彩"
original = "「誰も彼も、理性という重荷を背負わされてる<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000ぼくはそれを取り払って、おま○この奴隷にしてあげるって言ってるんだよ<emoji=heart04>\u3000あはぁあっ<emoji=heart04>」"
translation = "「누구나 이성이라는 짐을 짊어지고 있어♥ 응으♥ 나는 그걸 치워버리고 보지의 노예로 만들어주겠다는 거야♥ 아하아앗♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あはははっ<emoji=heart04>\u3000とびおも本当はなりたいんだろう、おま○こ奴隷<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000ほら、またち○ぽが大きくなった<emoji=heart04>\u3000興奮してるんだね、全部わかっちゃうんだよ<emoji=heart04>」"
translation = "「아하하하♥ 토비오도 사실은 되고 싶잖아, 보지 노예♥ 하아앗♥ 봐, 또 자지가 커졌어♥ 흥분했구나, 다 알고 있다고♥」"

[[dialogue]]
speaker = "陽彩"
original = "「んんんぅ<emoji=heart04>\u3000それにしても、あぁあぁ<emoji=heart04>\u3000とびおのち○ぽ、本当に良いところに当たるよね<emoji=heart04>\u3000硬さもあって、あぁあ<emoji=heart04>\u3000こうして擦ってるだけで……<emoji=heart04>」"
translation = "「응응으♥ 그나저나, 아아아아♥ 토비오의 자지, 정말 좋은 곳에 닿네♥ 딱딱함도 있고, 아아아♥ 이렇게 비비는 것만으로도……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ぼくの気持ちいいところを……はぁあぁっ<emoji=heart04>\u3000ゴリゴリ、刺激してくるんだ……<emoji=heart04>\u3000はぁ、ぁ<emoji=heart04>\u3000んんぅ……ん、んんっ<emoji=heart04>」"
translation = "「나의 기분 좋은 곳을…… 하아아아앗♥ 고리고리 자극해 와……♥ 하아, 아♥ 응으…… 응, 응응♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ほら、ここっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ここをち○ぽの先が擦るたび……<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000ぼくのおま○こが悦んでるの、わかる？\u3000んんっ<emoji=heart04>\u3000は、あぁあ<emoji=heart04>」"
translation = "「봐, 여기♥ 응으으♥ 여기를 자지 끝이 훑을 때마다……♥ 하아아♥ 내 보지가 기뻐하는 거 느껴져? 응♥ 하, 아아아♥」"

[[dialogue]]
speaker = "陽彩"
original = "「んくぅ<emoji=heart04>\u3000っ、はぁあ<emoji=heart04>\u3000ああぁ<emoji=heart04>\u3000もっともっと、ぼくを悦ばせてくれよ<emoji=heart04>\u3000オスの欲望をむき出しにして……<emoji=heart04>\u3000あぁあ<emoji=heart04>\u3000ぼくの事を求めてよ……<emoji=heart04>」"
translation = "「응쿠우♥ 윽, 하아아♥ 아아아♥ 좀 더 좀 더 나를 기쁘게 해줘♥ 수컷의 욕망을 드러내며……♥ 아아아♥ 나를 원해줘……♥」"

[[dialogue]]
speaker = "とびお"
original = "「んっ……んむっ……！」"
translation = "「음…… 읍……!」"

[[dialogue]]
speaker = "unk"
original = "唇を重ねられた時、頭の中で何かが弾ける音がした。"
translation = "입술이 겹쳐졌을 때 머릿속에서 무언가 터지는 소리가 났다."

[[dialogue]]
speaker = "unk"
original = "気が付けば陽彩の舌が、防ぐ間もなくにゅるりと口内に潜り込んでくる。"
translation = "정신을 차려보니 아키사의 혀가 막을 틈도 없이 미끄러지듯 입안으로 들어온다."

[[dialogue]]
speaker = "陽彩"
original = "「ちゅ、ちゅむ、んっ、ちゅ……<emoji=heart04>\u3000は、ちゅ、ちゅる、んんっ<emoji=heart04>\u3000れろ、ちゅ、む……んんっ、は……<emoji=heart04>」"
translation = "「쥬, 쥬웁, 응, 쥬……♥ 하, 쥬, 쥬르, 응응♥ 레로, 쥬, 믑…… 응응, 하……♥」"

[[dialogue]]
speaker = "とびお"
