[[dialogue]]
speaker = "陽彩"
original = "「違うな<emoji=heart04>\u3000あはぁっ<emoji=heart04>\u3000性器と性器を擦り付けあっているんだ……<emoji=heart04>\u3000感染という意味では、はぁぁ<emoji=heart04>\u3000とびおはとっくに感染してる<emoji=heart04>」"
translation = "「틀렸어♥ 아하앗♥ 성기와 성기를 비벼대고 있잖아……♥ 감염이라는 의미에선, 하아아♥ 토비오는 진작에 감염됐어♥」"

[[dialogue]]
speaker = "陽彩"
original = "「はぁあぁっ<emoji=heart04>\u3000だがきみは、ワクチンを摂取しているんだろう？\u3000あぁあっ<emoji=heart04>\u3000ならば……ちゅ、んんっ<emoji=heart04>\u3000ちゅううっ<emoji=heart04>\u3000ちゅ、んんんっ……<emoji=heart04>」"
translation = "「하아아아앗♥ 하지만 너는 백신을 맞았지? 아아앗♥ 그렇다면…… 쥬, 응응♥ 쥬우우♥ 쥬, 응응응……♥」"

[[dialogue]]
speaker = "unk"
original = "応じてはいけないとわかっているのに、陽彩の舌の動きに合わせて俺も舌を絡めてしまう。"
translation = "응해서는 안 된다는 걸 알면서도 아키사의 혀 놀림에 맞춰 나도 혀를 섞게 된다."

[[dialogue]]
speaker = "unk"
original = "理性が破壊され、内側に抑えていたものが爆発的な勢いで膨れ上がってくる。"
translation = "이성이 파괴되고 내면에 억눌러왔던 것이 폭발적인 기세로 부풀어 오른다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁ、はぁ、はぁあん<emoji=heart04>\u3000いいよ<emoji=heart04>\u3000ようやくいい目つきになってきた<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000メスを孕ませようとする、オスの目だ……<emoji=heart04>\u3000あぁあぁんっ<emoji=heart04>」"
translation = "「하아, 하아, 하아앙♥ 좋아♥ 드디어 좋은 눈빛이 되었네♥ 아아앗♥ 암컷을 임신시키려는 수컷의 눈이야……♥ 아아아아앙♥」"

[[dialogue]]
speaker = "陽彩"
original = "「とびおの情欲にまみれた視線……<emoji=heart04>\u3000あぁあ<emoji=heart04>\u3000興奮する<emoji=heart04>\u3000ちゅ、ん、は……んんんっ<emoji=heart04>\u3000ちゅ、んんっ、ちゅぷ<emoji=heart04>\u3000んんっ、ふ、ちゅ、ちゅうう……<emoji=heart04>」"
translation = "「토비오의 정욕에 찌든 시선……♥ 아아아♥ 흥분돼♥ 쥬, 응, 하…… 응응응♥ 쥬, 응응, 쥬푸♥ 응응, 후, 쥬, 쥬우우……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ちゅる、ん<emoji=heart04>\u3000ふぁあ、はぁ……<emoji=heart04>\u3000ほら、きみからもしてくれ<emoji=heart04>\u3000ぼくを求めて舌を動かし、唾液を啜り、飲み下せ<emoji=heart04>\u3000んんっ、ちゅ、んぅう、んっ、ちゅ、ふぁぁ<emoji=heart04>」"
translation = "「쥬르, 응♥ 하아, 하아……♥ 자, 너도 해줘♥ 나를 원하며 혀를 움직이고 침을 핥고 삼켜♥ 응, 쥬, 응으, 응, 쥬, 하아아♥」"

[[dialogue]]
speaker = "unk"
original = "追い打ちをかけるように、陽彩の腰の動きが激しくなっていく。"
translation = "몰아붙이듯 아키사의 허리 움직임이 격렬해진다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁ、あっ、ああっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000くぅ、ん、んっ、はぁ、ぁ、あああっ……<emoji=heart04>」"
translation = "「하아, 앗, 아앗♥ 응응응♥ 쿠우, 응, 응, 하아, 아, 아아앗……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あああっ<emoji=heart04>\u3000いけないな<emoji=heart04>\u3000あぁん<emoji=heart04>\u3000ダメだとわかっているのに<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000ぼくも本能のままに動いてしまう<emoji=heart04>\u3000んんんぅっ<emoji=heart04>」"
translation = "「아아앗♥ 안 되겠네♥ 아앙♥ 안 된다는 걸 알면서도♥ 아아앗♥ 나도 본능대로 움직이게 돼♥ 응응응으♥」"

[[dialogue]]
speaker = "陽彩"
original = "「おま○こ気持ちよくなりたくて<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000あっあっ<emoji=heart04>\u3000腰がヘコヘコ動いてしまう<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000あっ、あ、あああっ<emoji=heart04>」"
translation = "「보지 기분 좋아지고 싶어서♥ 아아아앙♥ 앗앗♥ 허리가 헤코헤코 움직여버려♥ 응응으♥ 앗, 아, 아아앗♥」"

[[dialogue]]
speaker = "unk"
original = "陽彩の言葉に嘘はなさそうだった。その証拠に、俺を抑えつけていた手の力が徐々に抜けてきている。"
translation = "아키사의 말에는 거짓이 없어 보였다. 그 증거로 나를 억누르던 손의 힘이 서서히 빠지고 있다."

[[dialogue]]
speaker = "陽彩"
original = "「んんっ、あっ……！\u3000あ、ああっ、あっ、あっ、ああんっ……<emoji=heart04>\u3000とびおも、動いてるのか、んんっ、ああぁあっ<emoji=heart04>」"
translation = "「응, 앗……! 아, 아앗, 앗, 앗, 아앙……♥ 토비오도 움직이고 있구나, 응, 아아아앗♥」"

[[dialogue]]
speaker = "unk"
original = "陽彩の動きに合わせて、俺も下から突き上げていることに気付いたようだ。"
translation = "아키사의 움직임에 맞춰 나도 아래에서 밀어 올리고 있다는 것을 깨달은 모양이다."

[[dialogue]]
speaker = "unk"
original = "だが、それを咎める様子もなく、それどころか促すように艶めかしく腰を振っていく陽彩。"
translation = "하지만 그것을 나무라기는커녕 오히려 재촉하듯 요염하게 허리를 흔드는 아키사."

[[dialogue]]
speaker = "陽彩"
original = "「はぁ、あ、あああっ<emoji=heart04>\u3000んっ、あっ、あ、ああっ……<emoji=heart04>\u3000あ、んんっ、あっ、ああ、んぅ、く、ぁ、あああっ……<emoji=heart04>」"
translation = "「하아, 아, 아아아앗♥ 응, 앗, 아, 아앗……♥ 아, 응, 앗, 아아, 응, 쿠, 아, 아아아앗……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「気持ちいい<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000気持ちいい、気持ちいい、おま○こ気持ちいいぃ<emoji=heart04>\u3000あっあっ、ああっ、あああっ、ああぁあっ<emoji=heart04>」"
translation = "「기분 좋아♥ 아아아앗♥ 기분 좋아, 기분 좋아, 보지 기분 좋아♥ 앗앗, 아앗, 아아앗, 아아아아앗♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ぼくは、ぼくより先に……ああぁあっ<emoji=heart04>\u3000きみを絶頂させなくては<emoji=heart04>\u3000いけないのに……<emoji=heart04>\u3000んんっ、あっ、あ、ああっ……<emoji=heart04>」"
translation = "「나는, 나보다 먼저…… 아아아아앗♥ 너를 절정시켜야♥ 하는데……♥ 응, 앗, 아, 아앗……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000おま○こ<emoji=heart04>\u3000おま○こになる<emoji=heart04>\u3000気持ちよすぎて、脳みそおま○こになっちゃうぅぅ<emoji=heart04>\u3000ふわぁあぁぁっ<emoji=heart04>」"
translation = "「앗앗앗앗앗♥ 보지♥ 보지가 돼♥ 너무 기분 좋아서 뇌가 보지가 되어버려어♥ 후와아아아앗♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁあ、んっ、あああ……<emoji=heart04>\u3000ダメなのに<emoji=heart04>\u3000あぁああ<emoji=heart04>\u3000おま○こになりたくてっ<emoji=heart04>\u3000腰動いちゃう<emoji=heart04>あぁああっ<emoji=heart04>\u3000あっ、あ、あああっ……<emoji=heart04>」"
translation = "「아아아, 응, 아아아……♥ 안 되는데♥ 아아아아♥ 보지가 되고 싶어서♥ 허리 움직여버려 아아아앗♥ 앗, 아, 아아앗……♥」"

[[dialogue]]
speaker = "とびお"
original = "「もっと、気持ちよくなりたいのか……陽彩っ」"
translation = "「좀 더 기분 좋아지고 싶은 거냐…… 아키사」"

[[dialogue]]
speaker = "陽彩"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000なりたいっ<emoji=heart04>\u3000もっとおま○こしてっ<emoji=heart04>\u3000とびおっ<emoji=heart04>\u3000ぼくをおま○こにしてぇ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앙♥ 앙♥ 아아아아앗♥ 되고 싶어♥ 좀 더 보지 해줘♥ 토비오♥ 나를 보지로 만들어줘♥♥♥」"

[[dialogue]]
speaker = "とびお"
original = "「だったら……望み通りにしてやる……！」"
translation = "「그렇다면…… 바라는 대로 해주지……!」"

[[dialogue]]
speaker = "陽彩"
original = "「っ……！！\u3000あぁあああっ……！！！」"
translation = "「윽……!! 아아아아아앗……!!!」"

[[dialogue]]
speaker = "unk"
original = "俺は隠し持っていた宝石を、陽彩の下腹部に押し当てた。"
translation = "나는 숨겨두었던 보석을 아키사의 하복부에 갖다 댔다."

[[dialogue]]
speaker = "unk"
original = "その瞬間、石は微かな光を放ちながら、ほんのりと温かみを持ち始める。"
translation = "그 순간 돌은 희미한 빛을 내뿜으며 은은한 온기를 띠기 시작한다."

[[dialogue]]
speaker = "陽彩"
original = "「こ、これが……<emoji=heart04>\u3000とびおの秘密兵器？\u3000ふわぁぁっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000すごぉ<emoji=heart04>\u3000ごれ、ぎもぢぃ<emoji=heart04>\u3000あああっ<emoji=heart04>」"
translation = "「이, 이게……♥ 토비오의 비밀 병기? 후와아아앗♥ 아아아아앗♥ 대단해♥ 이거 기분 조와♥ 아아앗♥」"

[[dialogue]]
speaker = "とびお"
original = "「っ……陽彩から、ロストアイテムを引きはがすための、アイテムだ！」"
translation = "「윽…… 아키사에게서 로스트 아이템을 떼어내기 위한 아이템이다!」"

[[dialogue]]
speaker = "陽彩"
original = "「おおおっ<emoji=heart04>\u3000これ、すごぉぉ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000押し当てられてるだけで<emoji=heart04>\u3000お腹の奥熱くなってぇ<emoji=heart04><emoji=heart04>\u3000ぁああ……まだ気持ちくぅぅ……<emoji=heart04>」"
translation = "「오오옷♥ 이거 대단해에♥ 아아아아앗♥ 대고 있는 것만으로도♥ 배 속 깊은 곳이 뜨거워져서♥♥ 아아아…… 아직 기분 조와아……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「今すぐ取り上げないと……危険なのにぃ<emoji=heart04>\u3000わかってるのに<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000気持ちよすぎて、からだ自由になんないっ<emoji=heart04>」"
translation = "「지금 당장 뺏지 않으면…… 위험한데에♥ 알고 있는데♥ 아아아아앗♥ 너무 기분 좋아서 몸이 마음대로 안 움직여♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あぁあ、んっ<emoji=heart04>\u3000それ、どころか……<emoji=heart04>\u3000もっと知りたくなる<emoji=heart04>\u3000これ使ってち○ぽしてもらったらっ<emoji=heart04>\u3000全身おま○こになるぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아, 응♥ 그, 것보다……♥ 좀 더 알고 싶어져♥ 이거 쓰면서 자지 해주면♥ 온몸이 보지가 되어버려♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "甘い声で喘ぎながら、陽彩は自ら快感を求めて下半身を揺さぶっている。"
translation = "달콤한 목소리로 신음하며 아키사는 스스로 쾌감을 갈구하며 하반신을 흔들고 있다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女の高揚を助けるように、腰を一気に突き上げ、ペニスを膣奥に叩きつける。"
translation = "그런 그녀의 고양을 돕듯 허리를 단숨에 밀어 올려 페니스를 질 깊숙이 처박았다."

[[dialogue]]
speaker = "陽彩"
original = "「あああああっんっ……！！！！」"
translation = "「아아아아아앗응……!!!!」"

[[dialogue]]
speaker = "unk"
original = "それだけで陽彩は全身をビクビクと震わせる。"
translation = "그것만으로 아키사는 온몸을 파르르 떨었다."

[[dialogue]]
speaker = "unk"
original = "俺は畳みかけるように、そのまま２度、３度と力強く突き上げた。"
translation = "나는 몰아치듯 그대로 두 번, 세 번 힘차게 밀어 올렸다."

[[dialogue]]
speaker = "陽彩"
original = "「あっ、あ、あああっ<emoji=heart04>\u3000あっ、あっ、あっ……<emoji=heart04>\u3000はぁ、あ、ああっ……<emoji=heart04>\u3000ん、あ、あああっ<emoji=heart04>」"
translation = "「앗, 아, 아아아앗♥ 앗, 앗, 앗……♥ 하아, 아, 아앗……♥ 응, 아, 아아아앗♥」"

[[dialogue]]
speaker = "unk"
original = "ペニスを突き上げるたび、従順にメスの嬌声をあげる陽彩。"
translation = "페니스를 밀어 올릴 때마다 순종적으로 암컷의 교성을 내지르는 아키사."

[[dialogue]]
speaker = "unk"
original = "このまま陽彩をち○ぽの奴隷にしてやりたい……そんな欲望が胸の内から湧き上がって来て、慌てて頭を振る。"
translation = "이대로 아키사를 자지의 노예로 삼고 싶다…… 그런 욕망이 가슴 속에서 솟구쳐 올라와 서둘러 머리를 흔든다."

[[dialogue]]
speaker = "とびお"
original = "（やばい……！\u3000俺の方も相当、浸食されてるみたいだっ）"
translation = "(위험해……! 나도 상당히 침식된 모양이다)"

[[dialogue]]
speaker = "陽彩"
original = "「あぁあんっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっとち○ぽしてくれ、とびおっ<emoji=heart04>\u3000あっああっ、あっ、あっ、ああ<emoji=heart04>\u3000ぼくのおま○こ、もっとぐちゅぐちゅにしてくれぇ<emoji=heart04>」"
translation = "「아아아앙♥ 좀 더♥ 좀 더 자지 해줘, 토비오♥ 앗아앗, 앗, 앗, 아아♥ 내 보지, 좀 더 구츄구츄하게 해줘♥」"

[[dialogue]]
speaker = "とびお"
original = "「ああ……っ！」"
translation = "「아아…… 윽!」"

[[dialogue]]
speaker = "陽彩"
original = "「あああ、すごいぃ<emoji=heart04>\u3000あ、ああっ、はぁあっ<emoji=heart04>\u3000あ、んくぅ、んんぅぅ<emoji=heart04>\u3000ち○ぽ凄いっ<emoji=heart04>\u3000おま○こ耕されちゃう<emoji=heart04>」"
translation = "「아아아, 대단해♥ 아, 아앗, 하아앗♥ 아, 응쿠우, 응응으으♥ 자지 굉장해♥ 보지 갈려나가버려♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ああっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000はぁああぁ<emoji=heart04>\u3000おま○こ、ぶち壊す勢いで<emoji=heart04>\u3000入り口も、膣道も、赤ちゃんの部屋も<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ち○ぽに都合よく作り替えられちゃう<emoji=heart04>」"
translation = "「아앗♥ 아아앗♥ 하아아아아♥ 보지, 부숴버릴 기세로♥ 입구도, 질도, 아기 방도♥ 아아앗♥ 자지에 형편 좋게 개조되어버려♥」"

[[dialogue]]
speaker = "unk"
original = "欲望に取りつかれたように、快楽を求めてくる陽彩。"
translation = "욕망에 사로잡힌 듯 쾌락을 갈구하는 아키사."

[[dialogue]]
speaker = "unk"
original = "更に強く石を押し付けると、その喘ぎはますます高まっていく。"
translation = "더욱 강하게 돌을 압박하자 그 신음은 점점 더 높아져 간다."

[[dialogue]]
speaker = "陽彩"
original = "「イカされちゃう<emoji=heart04>\u3000んんっ、あっ、あ、あああっ<emoji=heart04>\u3000絶頂、教え込まれちゃうっ<emoji=heart04>\u3000んん、あああっ……<emoji=heart04>」"
translation = "「가버려♥ 응, 앗, 아, 아아아앗♥ 절정, 길들여져버려♥ 응응, 아아앗……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ダメなのにっ、ダメなのにもっとぉっ<emoji=heart04>\u3000もっとして欲しいっ、気持ちよくなりたいっ<emoji=heart04>\u3000ああんっ、とびおっ、とびおっ<emoji=heart04>」"
translation = "「안 되는데, 안 되는데 좀 더어♥ 좀 더 해줬으면 좋겠어, 기분 좋아지고 싶어♥ 아앙, 토비오, 토비오♥」"

[[dialogue]]
speaker = "unk"
original = "これは陽彩を寄生型悪魔から解放するための手段であるはずだった。"
translation = "이것은 아키사를 기생형 악마로부터 해방하기 위한 수단이어야 했다."

[[dialogue]]
speaker = "unk"
original = "けれど、気が付けば俺の頭の中は、陽彩を官能に狂わせ、淫らに果てさせることでいっぱいになっていた。"
translation = "하지만 어느새 내 머릿속은 아키사를 관능에 미치게 하고 음란하게 가버리게 하는 것으로 가득 차 있었다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁ、あ、ああっ<emoji=heart04>\u3000んんっ、あっ、あ、ああ、あっ、はぁ、あ、あああっ<emoji=heart04>\u3000あぁう、んんっ、んくぅ、っ、んんっ、あああっ<emoji=heart04>」"
translation = "「하아, 아, 아앗♥ 응응, 앗, 아, 아아, 앗, 하아, 아, 아아아앗♥ 아아우, 응응, 응쿠우, 윽, 응응, 아아아앗♥」"

[[dialogue]]
speaker = "unk"
original = "陽彩の甘い喘ぎ声が脳髄を痺れさせる。俺の方にも余裕はなく、陽彩をイキ狂わせたい嗜虐心に任せて、腰を突き上げる。"
translation = "아키사의 달콤한 신음 소리가 뇌수을 저리게 한다. 나 또한 여유가 없어 아키사를 가버리게 하고 싶은 가학심에 맡겨 허리를 밀어 올린다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁ、あ、んっ、ん、んぅう、んんっ<emoji=heart04>\u3000とびお<emoji=heart04>\u3000んんっ……ん、ぁああ、あっ、あっ、はぁぁ、ん、あ、あああっ<emoji=heart04><emoji=heart04>」"
translation = "「하아, 아, 응, 응, 응으으, 응응♥ 토비오♥ 응응…… 응, 아아아, 앗, 앗, 하아아, 응, 아, 아아아앗♥♥」"

[[dialogue]]
speaker = "unk"
original = "陽彩の膣が収縮し、ペニスを強烈に締め付けてくる。"
translation = "아키사의 질이 수축하며 페니스를 강렬하게 조여온다."

[[dialogue]]
speaker = "unk"
original = "それが最後の足掻きのように、俺の射精感を促してくる。"
translation = "그것이 마지막 발악처럼 내 사정감을 부추긴다."

[[dialogue]]
speaker = "陽彩"
original = "「はあっ、はあっ、あっ、ああ、あ、あああっ<emoji=heart04>\u3000んんっ、んっ<emoji=heart04>\u3000あっ、あ、ああっ、はぁ、あ、あああっ<emoji=heart04>」"
translation = "「하앗, 하앗, 앗, 아아, 아, 아아아앗♥ 응응, 응♥ 앗, 아, 아앗, 하아, 아, 아아아앗♥」"

[[dialogue]]
speaker = "とびお"
original = "「っ、く……陽彩っ……ぅぅ……！」"
translation = "「윽, 쿠…… 아키사…… 우으……!」"

[[dialogue]]
speaker = "陽彩"
original = "「んぅうう、う、んんっ<emoji=heart04>\u3000う、く、くぅ、んんっ<emoji=heart04>\u3000あ、ああっ、あ、あ、ああ、んんっ、あっ、ああっ、あ、ああんっ<emoji=heart04><emoji=heart04>」"
translation = "「응으으으, 으, 응응♥ 으, 쿠, 쿠우, 응응♥ 아, 아앗, 아, 아, 아아, 응응, 앗, 아앗, 아, 아앙♥♥」"

[[dialogue]]
speaker = "陽彩"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000イクっ、イクイクイクっ<emoji=heart04>\u3000あ、あ、あ、あ、あ、あっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000イっクぅぅうううっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗♥ 간다, 가가가♥ 아, 아, 아, 아, 아, 앗♥ 아아아아앗♥ 가버려어어어어어엇♥♥♥」"

[[dialogue]]
speaker = "陽彩"
original = "「ふわぁぁあ……っ……あああああぁあああああ～～～～～っ！！！！！」"
translation = "「후와아아아…… 윽…… 아아아아아아아아아아아아~~~~~앗!!!!!」"

[[dialogue]]
speaker = "unk"
original = "高らかな叫びと共に、陽彩が絶頂を迎えた。"
translation = "높은 비명과 함께 아키사가 절정을 맞이했다."

[[dialogue]]
speaker = "unk"
original = "そこから一拍遅れて、俺も陽彩の中へ白い欲望を解き放った。"
translation = "거기서 한 박자 늦게 나도 아키사의 안에 하얀 욕망을 해방했다."

[[dialogue]]
speaker = "陽彩"
original = "「ふあああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000とびおの精液、中に入ってくるぅ～～<emoji=heart04>\u3000はぁぁあああっ<emoji=heart04>」"
translation = "「후아아아아아~~~앗♥♥♥ 토비오의 정액, 안으로 들어와아~~♥ 하아아아아아앗♥」"

[[dialogue]]
speaker = "unk"
original = "気が付くと、陽彩のお腹に押しつけ続けていた魔石の色が濁り、先ほどまではなかった熱を帯びていた。"
translation = "정신을 차려보니 아키사의 배에 계속 대고 있던 마석의 색이 탁해지고 조금 전까지는 없던 열기를 띠고 있었다."

[[dialogue]]
speaker = "unk"
original = "……間一髪というところではあったが、何とか任務は果たせたようだった。"
translation = "……간발의 차였지만 어떻게든 임무는 완수한 모양이었다."

[[dialogue]]
speaker = "陽彩"
original = "「んんっ、あっ……あぁあ……<emoji=heart04>\u3000あ……んぅうう……んくぅ……んんんっ……<emoji=heart04>」"
translation = "「응, 앗…… 아아아……♥ 아…… 응으으으…… 응쿠우…… 응응응……♥」"

[[dialogue]]
speaker = "unk"
original = "目に正気の光を宿しつつも、少しいたずらっぽく笑う陽彩が、まるで残った精液を搾り取るサキュバスのように緩く腰を振り続ける。"
translation = "눈에 제정신의 빛을 머금으면서도 조금 장난스럽게 웃는 아키사가 마치 남은 정액을 짜내는 서큐버스처럼 느릿하게 허리를 계속 흔든다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁ、あ……とびお……きみも……イッたのか……んんぅ……<emoji=heart04>」"
translation = "「하아, 아…… 토비오…… 너도…… 간 거니…… 응으……♥」"

[[dialogue]]
speaker = "陽彩"
original = "「だが……んんぅ……どうやらぼくの方が……少し先だったようだな……<emoji=heart04>\u3000あぁあ……んんっ<emoji=heart04>」"
translation = "「하지만…… 응으…… 아무래도 내가…… 조금 먼저였던 것 같네……♥ 아아아…… 응응♥」"

[[dialogue]]
speaker = "陽彩"
original = "「熱いのが……ぼくの中に……流れ込んできてる……<emoji=heart04>\u3000ああっ……気持ちいいよ……とびお……んんんっ……<emoji=heart04>」"
translation = "「뜨거운 게…… 내 안에…… 흘러 들어오고 있어……♥ 아앗…… 기분 좋아…… 토비오…… 응응응……♥」"

[[dialogue]]
speaker = "unk"
original = "吐き出される精液を受け止めながら、陽彩は満ち足りた表情を浮かべていた。"
translation = "쏟아져 나오는 정액을 받아내며 아키사는 만족스러운 표정을 짓고 있었다."

[[dialogue]]
speaker = "陽彩"
original = "「はぁ……ぁ……はぁ……ん……んぅ……」"
translation = "「하아…… 아…… 하아…… 응…… 응으……」"

[[dialogue]]
speaker = "unk"
original = "やがて陽彩の呼吸も少しずつ落ち着いてくる。"
translation = "이윽고 아키사의 호흡도 조금씩 진정된다."

[[dialogue]]
speaker = "unk"
original = "宝石からも次第に熱が引き始めていた。"
translation = "보석에서도 서서히 열기가 식어가고 있었다."

[[dialogue]]
speaker = "陽彩"
original = "「…………とび、お……」"
translation = "「…………토비, 오……」"

[[dialogue]]
speaker = "とびお"
original = "「陽彩……正気に戻ったか……？」"
translation = "「아키사…… 제정신으로 돌아왔어……?」"

[[dialogue]]
speaker = "陽彩"
original = "「ああ……自分に何が起こったのかも……おおよそ把握している……」"
translation = "「아아…… 나에게 무슨 일이 일어났는지도…… 대강 파악하고 있어……」"

[[dialogue]]
speaker = "陽彩"
original = "「寄生型の悪魔に心を操られ……興味の赴くままに……みんなを狂わせてしまった……」"
translation = "「기생형 악마에게 마음을 조종당해…… 흥미가 가는 대로…… 모두를 미치게 해버렸군……」"

[[dialogue]]
speaker = "陽彩"
original = "「とびおにも……迷惑をかけてしまったな……」"
translation = "「토비오에게도…… 폐를 끼쳐버렸네……」"

[[dialogue]]
speaker = "とびお"
original = "「そんなこと言うな……俺の役目はお前たちのサポートなんだし……それに……」"
translation = "「그런 소리 마…… 내 역할은 너희를 서포트하는 거니까…… 그리고……」"

[[dialogue]]
speaker = "陽彩"
original = "「それに……？」"
translation = "「그리고……?」"

[[dialogue]]
speaker = "とびお"
original = "「ん、と……俺も……いい思いをさせてもらったからさ……」"
translation = "「음, 그러니까…… 나도…… 좋은 경험을 했으니까……」"

[[dialogue]]
speaker = "陽彩"
original = "「っ……<emoji=heart04>\u3000も、もう！\u3000きみは馬鹿なことを言うな……！」"
translation = "「윽……♥ 정, 정말! 너는 바보 같은 소리를 하지 마라……!」"

[[dialogue]]
speaker = "とびお"
original = "「はは……」"
translation = "「하하……」"

[[dialogue]]
speaker = "unk"
original = "陽彩の表情に、ようやくいつもの調子が戻ってくる。"
translation = "아키사의 표정에 드디어 평소의 모습이 돌아온다."

[[dialogue]]
speaker = "unk"
original = "その表情に、彼女を救うことが出来たのだという喜びが湧きあがってきた。"
translation = "그 표정에 그녀를 구할 수 있었다는 기쁨이 솟구쳐 올랐다."

[[dialogue]]
speaker = "陽彩"
original = "「……ありがとう……とびお」"
translation = "「……고맙다…… 토비오」"

[[dialogue]]
speaker = "とびお"
original = "「ああ……」"
translation = "「아아……」"

[[dialogue]]
speaker = "unk"
original = "しおらしい言葉をもらす陽彩の汗に濡れた身体を、俺は身を起こして優しく抱きしめたのだった。"
translation = "갸륵한 말을 내뱉는 아키사의 땀에 젖은 몸을 나는 몸을 일으켜 부드럽게 껴안았다."

