[[dialogue]]
speaker = "unk"
original = "第１３話,理事会再び,B"
translation = "제13화, 이사회 다시 한번, B"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトが平行世界に関する演説を行い、信任選挙を発表して３日が経過した。"
translation = "히노미야 쿠로토가 평행세계에 관한 연설을 하고 신임 투표를 발표한 지 3일이 지났다."

[[dialogue]]
speaker = "unk"
original = "その日、新星学園の会議室では、再び理事会が行われていた。"
translation = "그날, 신성학원의 회의실에서는 다시 이사회가 열리고 있었다."

[[dialogue]]
speaker = "シノ"
original = "「先日は到着が遅くなってしまって申し訳ありませんでした。九浄ヘレナさんからご紹介いただきました、十六夜シノです」"
translation = "「요전번에는 도착이 늦어져서 죄송했습니다. 쿠죠 헬레나 씨로부터 소개받은 이자요이 시노입니다.」"

[[dialogue]]
speaker = "理事Ａ"
original = "「こんなにお若い人が学園長候補……？」"
translation = "「이렇게 젊은 사람이 학원장 후보……?」"

[[dialogue]]
speaker = "理事Ｂ"
original = "「いや、どこかで見た覚えが……確か学生社長と呼ばれていた……」"
translation = "「아니, 어디선가 본 기억이…… 분명 학생 사장이라 불렸던……」"

[[dialogue]]
speaker = "unk"
original = "予想外に若い学園長候補に驚きと戸惑いを見せる理事たち。"
translation = "예상외로 젊은 학원장 후보에게 놀람과 당혹감을 보이는 이사들."

[[dialogue]]
speaker = "unk"
original = "だが煌嶺は、むしろ愉快そうに笑う。"
translation = "하지만 코레이는 오히려 유쾌한 듯 웃는다."

[[dialogue]]
speaker = "煌嶺"
original = "「フッ……若さなら妾と変わらぬであろう？\u3000気にする必要あるまい」"
translation = "「훗…… 젊음이라면 소첩과 다를 바 없지 않느냐? 신경 쓸 필요 없느니라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「ま、流星の騎士と謳われたセイファートの後釜としては意外ではあるがな」"
translation = "「뭐, 유성의 기사라 칭송받던 세이퍼트의 후임치고는 의외이긴 하다만.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「なに、有能さは私が保証する。問題は微塵もないと断言しよう」"
translation = "「나 참, 유능함은 내가 보증하지. 문제는 티끌만큼도 없다고 단언하마.」"

[[dialogue]]
speaker = "unk"
original = "学園長候補は、この場にいる煌嶺と十六夜シノに絞られた。"
translation = "학원장 후보는 이 자리에 있는 코레이와 이자요이 시노로 좁혀졌다."

[[dialogue]]
speaker = "unk"
original = "どちらが就任しても、流星・新星両校の歴史を通して最年少の学園長となる。"
translation = "어느 쪽이 취임하든 유성·신성 양교의 역사를 통틀어 최연소 학원장이 된다."

[[dialogue]]
speaker = "煌嶺"
original = "「さて、妾の主張は変わらぬ。アルタイルを守るためなら、平行世界も滅ぼしてみせようぞ」"
translation = "「자, 소첩의 주장은 변함없느니라. 알타이르를 지키기 위해서라면 평행세계도 멸망시켜 보이겠노라.」"

[[dialogue]]
speaker = "unk"
original = "理事の顔を１人１人見渡し、ほくそ笑んでみせる煌嶺。"
translation = "이사들의 얼굴을 한 명 한 명 훑어보며 비웃음을 띠는 코레이."

[[dialogue]]
speaker = "unk"
original = "極星学園に宣戦布告された現在、理事が求める学園長像とは、煌嶺のような争いを厭わない強者だった。"
translation = "극성학원에게 선전포고를 당한 현재, 이사들이 원하는 학원장 상이란 코레이처럼 다툼을 마다하지 않는 강자였다."

[[dialogue]]
speaker = "シノ"
original = "「現会長の緋宮クロトさんは、デネブを滅ぼす気はないと仰っていますが……それでもですか？」"
translation = "「현 회장인 히노미야 쿠로토 씨는 데네브를 멸망시킬 생각이 없다고 말씀하십니다만…… 그래도입니까?」"

[[dialogue]]
speaker = "煌嶺"
original = "「だからどうした。星騎士は敵と戦う剣。臆病者は錆びた鈍らにも劣る」"
translation = "「그래서 어쨌단 말이냐. 성기사는 적과 싸우는 검. 겁쟁이는 녹슨 무딘 칼보다도 못하느니라.」"

[[dialogue]]
speaker = "シノ"
original = "「ふむ、なるほど。緋宮会長が信任されても、彼を尊重するつもりはないと……そう仰るのですね」"
translation = "「흠, 그렇군요. 히노미야 회장이 신임받더라도 그를 존중할 생각은 없다고…… 그렇게 말씀하시는 거군요.」"

[[dialogue]]
speaker = "unk"
original = "会議室のテーブルを挟んで対峙する煌嶺とシノ。"
translation = "회의실 테이블을 사이에 두고 대치하는 코레이와 시노."

[[dialogue]]
speaker = "unk"
original = "天才社長と呼ばれたシノとはいえ、存在感は煌嶺が圧倒的に格上だが……シノに臆する様子はない。"
translation = "천재 사장이라 불리는 시노라 해도 존재감은 코레이가 압도적으로 우위였지만…… 시노에게 겁먹은 기색은 없다."

[[dialogue]]
speaker = "シノ"
original = "「煌嶺殿のお考えは理解しました。では私も主張を述べさせていただきます」"
translation = "「코레이 공의 생각은 이해했습니다. 그럼 저도 주장을 말씀드리겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "シノが理事たちに向き直る。"
translation = "시노가 이사들을 향해 돌아선다."

[[dialogue]]
speaker = "unk"
original = "学園長は理事たちの投票で決まるもの。相手は煌嶺だけではない。"
translation = "학원장은 이사들의 투표로 결정되는 것. 상대는 코레이뿐만이 아니다."

[[dialogue]]
speaker = "シノ"
original = "「まず私は、極星学園の香堂チナ──彼女の言葉に疑いを持っています」"
translation = "「우선 저는 극성학원의 코도 치나── 그녀의 말에 의구심을 품고 있습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「前学園長ジェラルド・セイファートは、黒騎士として九浄ヴィーナスを魔界に連れ去り、殺害しようとしました。言うまでもなく、許されない裏切りです」"
translation = "「전 학원장 제럴드 세이퍼트는 흑기사로서 쿠죠 비너스를 마계로 납치해 살해하려 했습니다. 말할 것도 없이 용서받지 못할 배신입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「ですが得られたものもあります」"
translation = "「하지만 얻은 것도 있습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「星徒会の報告によれば、彼が目指していたのは全ての平行世界を含めたリセットでした」"
translation = "「성도회의 보고에 따르면, 그가 목표로 했던 것은 모든 평행세계를 포함한 리셋이었습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「他の世界を滅ぼすことで生き残れるという、香堂チナの言葉とは矛盾します」"
translation = "「다른 세계를 멸망시킴으로써 살아남을 수 있다는 코도 치나의 말과는 모순됩니다.」"

[[dialogue]]
speaker = "煌嶺"
original = "「裏切り者の言葉を信じるのか？」"
translation = "「배신자의 말을 믿겠다는 것이냐?」"

[[dialogue]]
speaker = "シノ"
original = "「確かに彼は我々を<ruby>謀<rt>たばか</rt></ruby>っていましたが、その時セイファート前学園長は星徒会と対峙し、彼らを抹殺しようとしていました。あえて嘘をついたとは思えません」"
translation = "「분명 그는 우리를 속이고 있었습니다만, 그때 세이퍼트 전 학원장은 성도회와 대치하며 그들을 말살하려 했습니다. 굳이 거짓말을 했다고는 생각되지 않습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「それに敵の言葉が信用できないとなれば、香堂チナについても同じこと。両者とも確実性に欠けると言わざるを得ないでしょう」"
translation = "「게다가 적의 말을 신용할 수 없다면 코도 치나에 대해서도 마찬가지. 양쪽 모두 확실성이 떨어진다고 할 수밖에 없겠지요.」"

[[dialogue]]
speaker = "シノ"
original = "「また、理事会や学園長が生徒を従わせる、という指揮系統にも疑問を抱いています」"
translation = "「또한, 이사회나 학원장이 학생을 따르게 한다는 지휘 계통에도 의문을 품고 있습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「今までリクリエとの戦いで前線に立ってきたのは、生徒である星騎士たちです」"
translation = "「지금까지 리크리에와의 싸움에서 최전선에 서 온 것은 학생인 성기사들입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「緋宮会長をはじめとする星徒会が、今まで知られていなかった秘密を解き明かし、戦うべき敵を見定め、そして勝利してきました」"
translation = "「히노미야 회장을 비롯한 성도회가 지금까지 알려지지 않았던 비밀을 밝혀내고, 싸워야 할 적을 가려내어 승리해 왔습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「フィヴォス流星群の時、世界を守れたのは彼らの奮闘あってこそ。学園組織や理事たちの貢献は大きくありません」"
translation = "「피보스 유성우 때 세계를 지킬 수 있었던 것은 그들의 분투 덕분입니다. 학원 조직이나 이사들의 공헌은 크지 않습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「そんな微力な大人たちが、どうして星騎士たちに道を指し示せるのでしょう。今更、私たちが彼らを導く余地などないのです」"
translation = "「그런 미력한 어른들이 어떻게 성기사들에게 길을 제시할 수 있겠습니까. 이제 와서 우리가 그들을 이끌 여지 따위는 없는 것입니다.」"

[[dialogue]]
speaker = "理事Ｂ"
original = "「確かに今まで世界を救ってきたのは、緋宮会長たちだ。だが常にそうであるとは限らない。選択を誤ることもある」"
translation = "「분명 지금까지 세계를 구해온 것은 히노미야 회장 일행이다. 하지만 항상 그러리라는 법은 없지. 선택을 그르칠 수도 있어.」"

[[dialogue]]
speaker = "理事Ｂ"
original = "「そういう時こそ、責任ある大人が道を正す必要があるのではないかね」"
translation = "「그럴 때야말로 책임 있는 어른이 길을 바로잡을 필요가 있지 않겠나.」"

[[dialogue]]
speaker = "シノ"
original = "「もちろんそういうお考えも理解できます」"
translation = "「물론 그런 생각도 이해합니다.」"

[[dialogue]]
speaker = "シノ"
original = "「ですが一般に、現場を知らない上層部がしゃしゃり出てきたら……組織としてはいい予感がしませんよね」"
translation = "「하지만 일반적으로 현장을 모르는 상층부가 참견하고 나서면…… 조직으로서는 좋은 예감이 들지 않죠.」"

[[dialogue]]
speaker = "理事Ｂ"
original = "「ぅ…………」"
translation = "「으윽…………」"

[[dialogue]]
speaker = "煌嶺"
original = "「ククッ……」"
translation = "「크크……」"

[[dialogue]]
speaker = "unk"
original = "気まずそうに沈黙する理事の横で、煌嶺がおかしさをこらえるように笑う。"
translation = "거북한 듯 침묵하는 이사 옆에서 코레이가 우스움을 참듯 웃는다."

[[dialogue]]
speaker = "unk"
original = "絶大な戦闘力を持ち、自身が戦いの場に立つ煌嶺としても、最前線を知らずに上から指図しようとする理事は滑稽に見えたのかもしれない。"
translation = "절대적인 전투력을 지니고 스스로 전장에 서는 코레이로서도, 최전선을 모르면서 위에서 지시하려는 이사가 가소롭게 보였을지도 모른다."

[[dialogue]]
speaker = "シノ"
original = "「それに──」"
translation = "「게다가──」"

[[dialogue]]
speaker = "シノ"
original = "「個人的な事情はあれど、多くの星騎士たちは純粋に世界を守るために、この新星学園に集ってきました」"
translation = "「개인적인 사정은 있겠지만, 많은 성기사는 순수하게 세계를 지키기 위해 이 신성학원에 모여들었습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「そんな彼らに『他の世界を滅ぼすための戦い』ができるでしょうか？」"
translation = "「그런 그들에게 『다른 세계를 멸망시키기 위한 싸움』이 가능할까요?」"

[[dialogue]]
speaker = "煌嶺"
original = "「ぬるいことを言うのだな。それでも１つの組織を束ねる長になろうとする者の言葉か」"
translation = "「무른 소리를 하는구나. 그러고도 한 조직을 아우르는 장이 되려는 자의 말이냐.」"

[[dialogue]]
speaker = "煌嶺"
original = "「アルタイルを守るために、デネブを滅ぼす。それも世界を守る戦いであろう。何を躊躇する必要がある」"
translation = "「알타이르를 지키기 위해 데네브를 멸망시킨다. 그것도 세계를 지키는 싸움일 터. 무엇을 주저할 필요가 있느냐.」"

[[dialogue]]
speaker = "煌嶺"
original = "「星騎士は剣だ。力だ。戦えなければ意味がない。強くなければ価値がない」"
translation = "「성기사는 검이니라. 힘이니라. 싸우지 못하면 의미가 없고, 강하지 않으면 가치가 없느니라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「妾が学園長になった暁には、星騎士たちをより強く、より鋭い刃にしてみせよう。妾の力を与え、技を鍛え、何者にも負けぬ剣にしてやろうではないか」"
translation = "「소첩이 학원장이 된 새벽에는 성기사들을 더욱 강하고 날카로운 칼날로 만들어 보이겠노라. 소첩의 힘을 주고 기예를 단련시켜, 그 누구에게도 지지 않는 검으로 만들어 주지 않겠느냐.」"

[[dialogue]]
speaker = "シノ"
original = "「つまり煌嶺殿が星騎士に求めるものは、力であると？」"
translation = "「즉, 코레이 공이 성기사에게 요구하는 것은 힘이라는 말씀이신가요?」"

[[dialogue]]
speaker = "煌嶺"
original = "「そうだ。妾は強く、美しく、烈しい者を愛する」"
translation = "「그렇느니라. 소첩은 강하고, 아름답고, 격렬한 자를 사랑하느니라.」"

[[dialogue]]
speaker = "シノ"
original = "「ふむ……」"
translation = "「흠……」"

[[dialogue]]
speaker = "unk"
original = "煌嶺の言葉に、一瞬思案するそぶりを見せるシノ。"
translation = "코레이의 말에 잠시 생각에 잠긴 기색을 보이는 시노."

[[dialogue]]
speaker = "unk"
original = "だが彼女は煌嶺に賛意を示すことはなかった。"
translation = "하지만 그녀는 코레이에게 찬성하지 않았다."

[[dialogue]]
speaker = "シノ"
original = "「煌嶺殿にとって、星騎士たちは己の欲望を実現するための力、兵器なのでしょう」"
translation = "「코레이 공에게 있어 성기사들은 자신의 욕망을 실현하기 위한 힘, 병기겠지요.」"

[[dialogue]]
speaker = "シノ"
original = "「しかし星騎士たちは兵器ではありません。効率的な生産もできず、才能によって強さにばらつきがあり、精神もまだ未熟な若者に過ぎない……兵器としては失格です」"
translation = "「하지만 성기사들은 병기가 아닙니다. 효율적인 생산도 불가능하고, 재능에 따라 강함에 차이가 있으며, 정신도 아직 미숙한 젊은이에 불과하죠…… 병기로서는 실격입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「ですが彼らは兵器でないからこそ──強いのです」"
translation = "「하지만 그들은 병기가 아니기에── 강한 것입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「一部の星騎士だけが変身できる、ノヴァフォームをご存じでしょうか。激しい星力の消耗の代わりに、普段とは比べ物にならない力を得られる形態です」"
translation = "「일부 성기사만이 변신할 수 있는 노바 폼을 알고 계십니까. 격렬한 성력 소모 대신 평소와는 비교도 안 되는 힘을 얻는 형태입니다.」"

[[dialogue]]
speaker = "シノ"
original = "「強力な機械型モンスターや極星従騎に対抗することも可能で、しかしノヴァフォームに至るには覚醒のきっかけが必要だそうです」"
translation = "「강력한 기계형 몬스터나 극성종기에 대항하는 것도 가능하지만, 노바 폼에 이르기 위해서는 각성의 계기가 필요하다고 합니다.」"

[[dialogue]]
speaker = "シノ"
original = "「そして私はノヴァフォームを体得した１人である、現星徒会書記の詠野マトイさんにお話を聞きました」"
translation = "「그리고 저는 노바 폼을 터득한 한 명인 현 성도회 서기 에노 마토이 씨에게 이야기를 들었습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「『当たり前の日常を守りたい』『みんなの普通を守りたい』──そう強く思ったことが、覚醒のきっかけだったそうです」"
translation = "「『당연한 일상을 지키고 싶어』 『모두의 평범함을 지키고 싶어』── 그렇게 강하게 생각한 것이 각성의 계기였다고 합니다.」"

[[dialogue]]
speaker = "シノ"
original = "「星騎士は兵器ではありません。だからこそ、その想い次第で強くなれます。ならば想いによっては弱くなることもあるでしょう」"
translation = "「성기사는 병기가 아닙니다. 그렇기에 그 마음가짐에 따라 강해질 수 있죠. 그렇다면 마음에 따라 약해질 수도 있을 겁니다.」"

[[dialogue]]
speaker = "シノ"
original = "「大事なものを守るための戦い──それが『他の世界を滅ぼす戦い』に変わった時、彼らの想いと強さにどんな影響をもたらすか」"
translation = "「소중한 것을 지키기 위한 싸움── 그것이 『다른 세계를 멸망시키는 싸움』으로 변했을 때, 그들의 마음과 강함에 어떤 영향을 미칠지.」"

[[dialogue]]
speaker = "シノ"
original = "「弱くなることはあれど、強くなることはないでしょう。モンスターやアステラに対する防衛力が低下することも十分考えられます」"
translation = "「약해지면 약해졌지 강해지지는 않겠죠. 몬스터나 아스테라에 대한 방어력이 저하될 가능성도 충분히 생각할 수 있습니다.」"

[[dialogue]]
speaker = "シノ"
original = "「角を矯めて牛を殺す──アルタイルを守るためにデネブとの戦いを選び、その結果、アルタイルを危険にさらすことになれば本末転倒です」"
translation = "「뿔을 고치려다 소를 죽인다── 알타이르를 지키기 위해 데네브와의 싸움을 택하고, 그 결과 알타이르를 위험에 빠뜨리게 된다면 본말전도입니다.」"

[[dialogue]]
speaker = "unk"
original = "シノは落ち着いた声で、淀みなく流れる川のように、自分の主張を述べる。"
translation = "시노는 차분한 목소리로, 거침없이 흐르는 강물처럼 자신의 주장을 펼친다."

[[dialogue]]
speaker = "unk"
original = "理事たちはいつの間にか、耳を澄ませて彼女の言葉に耳を傾けていた。"
translation = "이사들은 어느샌가 숨을 죽이고 그녀의 말에 귀를 기울이고 있었다."

[[dialogue]]
speaker = "シノ"
original = "「ところで煌嶺殿。確認ですが、あなたはデネブを滅ぼすことでアルタイルを守ろうというお考えなのですよね？」"
translation = "「그런데 코레이 공. 확인입니다만, 당신은 데네브를 멸망시킴으로써 알타이르를 지키겠다는 생각이신 거죠?」"

[[dialogue]]
speaker = "煌嶺"
original = "「それがどうした？\u3000強いものが生き残る──それが世の摂理であろう？」"
translation = "「그것이 어쨌단 말이냐? 강한 자가 살아남는다── 그것이 세상의 섭리 아니더냐?」"

[[dialogue]]
speaker = "シノ"
original = "「いいえ、キュリオスの女帝は欲深いとお聞きしていましたが、思いのほか理想が低いのだなと思いまして」"
translation = "「아니요, 큐리오스의 여제는 탐욕스럽다고 들었습니다만, 생각보다 이상이 낮으시구나 싶어서요.」"

[[dialogue]]
speaker = "煌嶺"
original = "「何……？」"
translation = "「무엇이라……?」"

[[dialogue]]
speaker = "unk"
original = "シノが突然放った挑発的な言葉に、初めて煌嶺の笑みが揺らいだ。"
translation = "시노가 갑자기 내뱉은 도발적인 말에 처음으로 코레이의 미소가 흔들렸다."

[[dialogue]]
speaker = "シノ"
original = "「では資料をご覧いただきましょう」"
translation = "「그럼 자료를 보시죠.」"

[[dialogue]]
speaker = "unk"
original = "シノが手元のリモコンを操作し、会議室のスクリーンに映像を映す。"
translation = "시노가 손에 든 리모컨을 조작해 회의실 스크린에 영상을 띄운다."

[[dialogue]]
speaker = "シノ"
original = "「これはディザスターハンド。平行世界ベガを滅ぼしたとされる存在です」"
translation = "「이것은 디재스터 핸드. 평행세계 베가를 멸망시킨 것으로 여겨지는 존재입니다.」"

