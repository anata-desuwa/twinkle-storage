[[dialogue]]
speaker = "unk"
original = "第１話,光の魔法,B"
translation = "제1화, 빛의 마법, B"

[[dialogue]]
speaker = "unk"
original = "息抜きと称して、街へ繰り出したヴィーナスにクロト──"
translation = "휴식이라 칭하며, 거리로 나선 비너스와 쿠로토──"

[[dialogue]]
speaker = "unk"
original = "２人はしばらくぶりの安息を楽しみ、買い食いやショッピングで羽を伸ばしていた。"
translation = "두 사람은 오랜만의 안식을 즐기며, 길거리 음식과 쇼핑으로 기분 전환을 하고 있었다."

[[dialogue]]
speaker = "unk"
original = "そんな一幕でのこと──"
translation = "그런 한 장면에서의 일──"

[[dialogue]]
speaker = "クラウディア"
original = "「──お悩みのようだのう」"
translation = "「──고민이 있는 듯하구나」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……はい？」"
translation = "「……네?」"

[[dialogue]]
speaker = "unk"
original = "それは、クロトが離席していたほんのひと時。"
translation = "그것은, 쿠로토가 자리를 비운 아주 잠깐의 시간."

[[dialogue]]
speaker = "unk"
original = "テラス席で物思いにふけるヴィーナスのもとへやってきたのは、ただならぬ雰囲気の二人組だった。"
translation = "테라스석에서 생각에 잠긴 비너스에게 다가온 것은, 심상치 않은 분위기의 두 사람조였다."

[[dialogue]]
speaker = "クラウディア"
original = "「のう。ここで会ったのも何かの縁だ。悩みがあるなら話してみぬか」"
translation = "「음. 여기서 만난 것도 인연이다. 고민이 있다면 이야기해 보지 않겠느냐」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いや──いきなり現れて誰なのよ。っていうか……あんたの方こそがきんちょじゃない！」"
translation = "「아니── 갑자기 나타나서 누구야. 랄까…… 너야말로 애송이 아니야!」"

[[dialogue]]
speaker = "クラウディア"
original = "「はっはっは。気にするでない」"
translation = "「하하하. 신경 쓰지 말거라」"

[[dialogue]]
speaker = "クラウディア"
original = "「余はクラウディア──この近くには馴染みの菓子店があってな。ま、滅多には連れ出してもらえんのだが」"
translation = "「나는 클라우디아── 이 근처에는 단골 과자 가게가 있어서 말이다. 뭐, 좀처럼 데리고 나와 주지는 않지만」"

[[dialogue]]
speaker = "セドナ"
original = "「姫。本来は外出自体許されることではないのです。ご自重を」"
translation = "「공주님. 본래는 외출 자체가 허용될 수 없는 일입니다. 자중하십시오」"

[[dialogue]]
speaker = "クラウディア"
original = "「けちくさいのう」"
translation = "「쩨쩨하구나」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたは──見覚えあると思ったら、この前の魔女じゃない！」"
translation = "「당신은── 낯이 익다 했더니, 이전에 그 마녀잖아!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの脳裏にネビュラの基地が思い描かれる。"
translation = "비너스의 뇌리에 네뷸라의 기지가 떠오른다."

[[dialogue]]
speaker = "unk"
original = "セドナ──そう名乗った黒炎の魔女は、天蓋の危機から星騎士を救った恩人でもあった。"
translation = "세드나── 그렇게 자신을 소개했던 검은 불꽃의 마녀는, 천개의 위기에서 성기사를 구한 은인이기도 했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ってことは、このチンチクリンも魔女ってこと？」"
translation = "「그렇다면, 이 땅꼬마도 마녀라는 거야?」"

[[dialogue]]
speaker = "クラウディア"
original = "「そうだ。それもただの魔女ではないぞ、余はすごくてえら～い魔女なのだ」"
translation = "「그렇다. 그것도 단순한 마녀가 아니다, 나는 굉장하고 위대한 마녀인 것이다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なーんか偉そうで腹立つわね……」"
translation = "「뭔가 잘난 척해서 짜증 나네……」"

[[dialogue]]
speaker = "クラウディア"
original = "「どれ──余に手を貸してみるがよい。その浮かぬ顔、晴らしてやれるやもしれんぞ」"
translation = "「자아── 나에게 손을 내밀어 보거라. 그 시무룩한 얼굴, 풀어줄 수 있을지도 모르니」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何それ……占い師ごっこでもしてるの？」"
translation = "「뭐야 그거…… 점쟁이 놀이라도 하는 거야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「確かに考え込んではいたけど──乙女の悩みはフクザツなのよ。あんたみたいなチンチクリンにはわからな──」"
translation = "「확실히 생각에 잠겨 있긴 했지만── 소녀의 고민은 복잡하다고. 너 같은 땅꼬마는 모를 거──」"

[[dialogue]]
speaker = "クラウディア"
original = "「ふむ──あの男との関係についてか」"
translation = "「흐음── 그 남자와의 관계에 대해서인가」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！\u3000ど、どうしてわかるの……！？」"
translation = "「! 어, 어떻게 아는 거야……!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「闇を払う──というのは、余の得意分野でのう。吉と出るか凶と出るかは、お主次第だが──」"
translation = "「어둠을 물리치는 것──은, 나의 특기 분야라서 말이다. 길(吉)로 나올지 흉(凶)으로 나올지는, 그대에게 달렸지만──」"

[[dialogue]]
speaker = "クラウディア"
original = "「お主の<ruby>裡<rt>うち</rt></ruby>にある悩みのモヤ──この場で払ってやろう」"
translation = "「그대의 속에 있는 고민의 안개── 이 자리에서 물리쳐 주마」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの頭を占める悩み──それはクロトのことだった。"
translation = "비너스의 머리를 차지하는 고민── 그것은 쿠로토에 관한 것이었다."

[[dialogue]]
speaker = "unk"
original = "九浄ヴィーナスという自我がこの世に芽生えて以降、片時も忘れることのなかった彼の存在を、今になって不思議に思っている。"
translation = "쿠죠 비너스라는 자아가 이 세상에 싹튼 이후, 한순간도 잊은 적 없는 그의 존재를, 이제 와서 신기하게 여기고 있다."

[[dialogue]]
speaker = "unk"
original = "私はなぜ、ここまで彼に惹かれるのだろう──と。"
translation = "나는 왜, 이렇게까지 그에게 이끌리는 걸까── 하고."

[[dialogue]]
speaker = "クラウディア"
original = "「人助けというやつだ。光の魔女──その力の真髄、とくと味わうがよい」"
translation = "「사람 돕기라는 것이다. 빛의 마녀── 그 힘의 진수를, 마음껏 맛보도록 해라」"

[[dialogue]]
speaker = "セドナ"
original = "「っ……姫。お戯れもそれくらいに──組織の掟をお忘れですか」"
translation = "「윽…… 공주님. 장난도 그쯤에서── 조직의 규칙을 잊으셨습니까」"

[[dialogue]]
speaker = "クラウディア"
original = "「ちょっとじゃ、ちょっと♪\u3000セドナは相変わらずお堅いやつよのう」"
translation = "「잠깐이야, 잠깐♪ 세드나는 여전히 고지식한 녀석이구나」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「っ、な──何これ……光の星術……！？」"
translation = "「윽, 뭐── 뭐야 이거…… 빛의 성술……!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「否、否。余は魔女なのだから、使う術など決まっておろう」"
translation = "「아니, 아니. 나는 마녀이니, 사용하는 술법이야 정해져 있겠지」"

[[dialogue]]
speaker = "unk"
original = "セドナの制止も振り払い、クラウディアの両手がヴィーナスの両手を包み込む。"
translation = "세드나의 제지도 뿌리치고, 클라우디아의 양손이 비너스의 양손을 감싼다."

[[dialogue]]
speaker = "unk"
original = "すると、目を覆うような輝きが一帯へと漏れ始め──"
translation = "그러자, 눈을 가릴 듯한 광휘가 일대로 새어 나오기 시작하고──"

[[dialogue]]
speaker = "クラウディア"
original = "「魔法だ」"
translation = "「마법이다」"

[[dialogue]]
speaker = "unk"
original = "──まばゆき光の奔流が白鳥の翼のように広がり、ヴィーナスをくるみ込む。"
translation = "──눈부신 빛의 물줄기가 백조의 날개처럼 펼쳐지며, 비너스를 감싼다."

[[dialogue]]
speaker = "unk"
original = "それと同時に、ヴィーナスの脳裏にはどこかの光景が駆け巡った。"
translation = "그와 동시에, 비너스의 뇌리에는 어딘가의 광경이 빠르게 스쳐 지나갔다."

[[dialogue]]
speaker = "？？？"
original = "『来季のクラブ予算編成──どうしようかしら。星徒会としては、なるべくどの部にも平等に割り振ってあげたいのだけど』"
translation = "『다음 시즌 클럽 예산 편성── 어떻게 해야 할까. 성도회로서는, 되도록 모든 부서에 평등하게 배분해 주고 싶은데』"

[[dialogue]]
speaker = "クロト"
original = "『わかった。なら俺が全部の部長から話を聞いてくるよ』"
translation = "『알았어. 그럼 내가 모든 부장들한테 이야기를 듣고 올게』"

[[dialogue]]
speaker = "？？？"
original = "『そんな地道な作業──と思ったけど……それをやっちゃうのがあなたよね』"
translation = "『그런 지루한 작업──이라고 생각했지만…… 그걸 해내는 게 너지』"

[[dialogue]]
speaker = "？？？"
original = "『世界が大変な時だからこそ……そんな時間も、大切にしなくちゃいけないのかも』"
translation = "『세상이 힘들 때일수록…… 그런 시간도, 소중히 해야 할지도』"

[[dialogue]]
speaker = "？？？"
original = "『それじゃ、頼りにしてるわね──クロト？』"
translation = "『그럼, 의지할게── 쿠로토?』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "クラウディア"
original = "「──ま、こんなところか。まじない程度の術だがのう」"
translation = "「──뭐, 이 정도인가. 주술 정도의 술법이지만 말이다」"

[[dialogue]]
speaker = "unk"
original = "一連の動作を終えて離れるクラウディア。"
translation = "일련의 동작을 마치고 떨어지는 클라우디아."

[[dialogue]]
speaker = "unk"
original = "一方で、魔法を<b>かけられた</b>ヴィーナスはぽかんと大口を開けたまま唖然としていた。"
translation = "한편, 마법을 <b>받은</b> 비너스는 입을 멍하니 벌린 채 어안이 벙벙해 있었다."

[[dialogue]]
speaker = "クラウディア"
original = "「<ruby>星騎士<rt>すたあないと</rt></ruby>──お主らは余の同志だからな。いずれ、こちらの<b>ぷろじぇくと</b>にも関わってもらわねばならぬ」"
translation = "「성기사── 그대들은 나의 동지니까. 언젠가, 이쪽의 <b>프로젝트</b>에도 관여해야 할 것이다」"

[[dialogue]]
speaker = "クラウディア"
original = "「って……聞こえておるのかの？」"
translation = "「라고…… 들리고 있는 것이냐?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わた、し……クロト──そっか……そういう…………」"
translation = "「나, 나는…… 쿠로토── 그렇구나…… 그런…………」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは虚空を見つめたまま、立ち尽くしていた。"
translation = "비너스는 허공을 응시한 채, 우두커니 서 있었다."

[[dialogue]]
speaker = "unk"
original = "クラウディアの光の魔法によって──ようやく取り払われたモヤの内側を、整理している。"
translation = "클라우디아의 빛의 마법에 의해── 마침내 걷힌 안개 속을, 정리하고 있는 것이다."

[[dialogue]]
speaker = "クラウディア"
original = "「ふうむ。当てずっぽうのつもりじゃったが──思いのほか功を奏したようだ。わはは、よいことをしたぞ！」"
translation = "「흐음. 되는 대로 해 본 것이었는데── 생각보다 효과를 본 것 같구나. 와하하, 좋은 일을 했도다!」"

[[dialogue]]
speaker = "unk"
original = "満足げに高笑いするクラウディア──"
translation = "만족스러운 듯 크게 웃는 클라우디아──"

[[dialogue]]
speaker = "unk"
original = "しかしその隣では、射抜くような眼光のセドナが腕を組んでいた。"
translation = "하지만 그 옆에서는, 꿰뚫어 볼 듯한 눈빛의 세드나가 팔짱을 끼고 있었다."

[[dialogue]]
speaker = "セドナ"
original = "「姫──ご満悦のところ恐縮ですが」"
translation = "「공주님── 흡족해하시는 중에 죄송하지만」"

[[dialogue]]
speaker = "セドナ"
original = "「ネビュラとのおやくそく第二十二条──『お外で魔法は使わない』を破りましたね？」"
translation = "「네뷸라와의 약속 제22조── 『밖에서 마법을 사용하지 않는다』를 어기셨죠?」"

[[dialogue]]
speaker = "クラウディア"
original = "「ん？\u3000ああ……<ruby>忘却魔法<rt>オブリビオン</rt></ruby>でも使っておけ。見聞きした者の<ruby>記憶<rt>メモリー</rt></ruby>を抹消すれば、問題あるまい！」"
translation = "「응? 아아…… 망각 마법이라도 사용해 두거라. 보고 들은 자의 기억를 말소하면, 문제없을 것이다!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアが派手に魔法を行使したため、テラス席は衆目を集めていた。"
translation = "클라우디아가 요란하게 마법을 행사했기 때문에, 테라스석은 사람들의 시선을 모으고 있었다."

[[dialogue]]
speaker = "unk"
original = "それでも後始末として、周囲の人間から記憶を消せばよいと彼女は言う。しかし……"
translation = "그럼에도 뒤처리로, 주변 사람들의 기억을 지우면 된다고 그녀는 말한다. 그러나……"

[[dialogue]]
speaker = "セドナ"
original = "「そういう問題ではありません。禁止事項は守るようにと再三お伝えしていたはずです」"
translation = "「그런 문제가 아닙니다. 금지 사항은 지키라고 여러 번 말씀드렸을 텐데요」"

[[dialogue]]
speaker = "セドナ"
original = "「よって、来月の日曜外出は禁止とさせていただきます。代わりに英会話の時間でも設けましょうか」"
translation = "「따라서, 다음 달 일요일 외출은 금지하겠습니다. 대신 영어 회화 시간이라도 마련할까요」"

[[dialogue]]
speaker = "クラウディア"
original = "「なぬっ！？\u3000な、なぜだ！？\u3000見られても忘れさせればチャラではないのか！？」"
translation = "「뭐라고!? 왜, 왜냐!? 보여도 잊게 하면 퉁치는 거 아니냐!?」"

[[dialogue]]
speaker = "セドナ"
original = "「関係ありません。我々はあくまで第三組織──表立って魔法を発動するなど言語道断」"
translation = "「상관없습니다. 저희는 어디까지나 제3 조직── 대놓고 마법을 발동하는 것은 언어도단」"

[[dialogue]]
speaker = "セドナ"
original = "「基地へ帰りますよ。森から贈られた新鮮なアスパラガスが待っています」"
translation = "「기지로 돌아가시죠. 숲에서 보내온 신선한 아스파라거스가 기다리고 있습니다」"

[[dialogue]]
speaker = "クラウディア"
original = "「い……嫌だぞ！\u3000余は野菜など食いとうない！\u3000あああ～～！！」"
translation = "「시…… 싫다! 나는 야채 같은 건 먹고 싶지 않다! 아아아～～!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "クラウディアを引きずって去っていくセドナ──"
translation = "클라우디아를 끌고 떠나는 세드나──"

[[dialogue]]
speaker = "unk"
original = "彼女が一帯に忘却のパウダーを散布したことも気に留めず、ヴィーナスは呆然と佇んでいた。"
translation = "그녀가 일대에 망각의 파우더를 살포한 것도 신경 쓰지 않고, 비너스는 멍하니 서 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「わた、し……クロト──そっか……そういう…………」"
translation = "「나, 나는…… 쿠로토── 그렇구나…… 그런…………」"

[[dialogue]]
speaker = "unk"
original = "悩みの答えとは、己の中にあるものだ──"
translation = "고민의 답이란, 자기 안에 있는 것이다──"

[[dialogue]]
speaker = "unk"
original = "クラウディアの言が幾度もヴィーナスの脳裏にリフレインする。"
translation = "클라우디아의 말이 몇 번이고 비너스의 뇌리에 되풀이된다."

[[dialogue]]
speaker = "unk"
