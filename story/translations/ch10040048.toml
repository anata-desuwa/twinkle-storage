[[dialogue]]
speaker = "アポロ"
original = "「いや～今日も遊んだ、遊んだ♪」"
translation = "「이야~ 오늘도 잘 놀았다, 잘 놀았어♪」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王も満足だよなー？\u3000アポロ様からの元気注入だ、うりうり～っ」"
translation = "「마왕도 만족했지? 아폴로 님의 활력 주입이다, 에잇에잇~」"

[[dialogue]]
speaker = "unk"
original = "水着姿のアポロがこちらに抱きついてきて、くすぐるような真似をしてくる……。"
translation = "수영복 차림의 아폴로가 이쪽으로 안겨 와서 간지럽히는 시늉을 한다……."

[[dialogue]]
speaker = "アポロ"
original = "「ん──なんだぁ？\u3000どうして離れるんだよ魔王。ちょっと前から、あたしが近づくのを拒んでないか？」"
translation = "「음── 뭐야? 왜 떨어지는 거야 마왕. 조금 전부터 내가 다가가는 걸 거부하고 있지 않아?」"

[[dialogue]]
speaker = "クロト"
original = "「それは、まあ……ちょっと意識しちゃって……」"
translation = "「그건, 뭐랄까…… 좀 의식하게 돼서……」"

[[dialogue]]
speaker = "アポロ"
original = "「ん、何をだ？\u3000……もしかして、水着か？」"
translation = "「응, 뭘? ……혹시 수영복이야?」"

[[dialogue]]
speaker = "unk"
original = "アポロは改めて自らの衣装を見やった。"
translation = "아폴로는 새삼 자신의 의상을 살펴보았다."

[[dialogue]]
speaker = "アポロ"
original = "「まあ確かに……水着ってけっこうロシュツも多いしな……」"
translation = "「뭐 확실히…… 수영복은 노출도 꽤 많으니까 말이야……」"

[[dialogue]]
speaker = "アポロ"
original = "「つか……よくよく考えたら……この水着、面積が小さすぎないか？」"
translation = "「그보다…… 가만히 생각해보니까…… 이 수영복, 면적이 너무 좁은 거 아냐?」"

[[dialogue]]
speaker = "クロト"
original = "「今さらか、ずっと思ってたんだけどな……」"
translation = "「이제 와서냐, 난 계속 생각하고 있었는데……」"

[[dialogue]]
speaker = "アポロ"
original = "「それで魔王は妙に意識してたわけか──あたしも気にしてなかったけど、そう言われてみると……ではある」"
translation = "「그래서 마왕은 묘하게 의식하고 있었던 건가── 나도 신경 안 썼는데, 그렇게 들으니…… 그렇긴 하네」"

[[dialogue]]
speaker = "アポロ"
original = "「あたし、前まで仮面とか被ってたのにな……それが急に素顔で……体もほとんど隠さないで……」"
translation = "「나, 전에는 가면 같은 거 쓰고 있었는데 말이야…… 그게 갑자기 맨얼굴로…… 몸도 거의 안 가리고……」"

[[dialogue]]
speaker = "アポロ"
original = "「あ、あれ……？\u3000冷静に考えたら、あたし──」"
translation = "「어, 어라……? 냉정하게 생각해보니 나──」"

[[dialogue]]
speaker = "アポロ"
original = "「……って、おい！\u3000あ、あたしまで恥ずかしくなってきたじゃねーか──どうしてくれんだ！」"
translation = "「……랄까, 야! 나까지 부끄러워졌잖아── 어떻게 책임질 거야!」"

[[dialogue]]
speaker = "unk"
original = "水着の気恥ずかしさを自覚してしまったアポロは、頬を赤らめて珍しくもじもじし始めた。"
translation = "수영복의 부끄러움을 자각해 버린 아폴로는 볼을 붉히며 드물게 머뭇거리기 시작했다."

[[dialogue]]
speaker = "unk"
original = "その女子らしい様子に、こちらはもう我慢ならなくなる。"
translation = "그 여자아이 같은 모습에 이쪽은 이제 참을 수 없게 된다."

[[dialogue]]
speaker = "アポロ"
original = "「お、おい……？\u3000なんだよ魔王、目が怖いぞ──わ、わぁっ！？」"
translation = "「어, 어이……? 뭐야 마왕, 눈빛이 무서워── 와, 와앗!?」"

[[dialogue]]
speaker = "アポロ"
original = "「う、うぅっ……いくらあたし達しかいないビーチだからって……これは開放的すぎだろぉっ……ぁっ、ぅっ……」"
translation = "「으, 으윽…… 아무리 우리밖에 없는 해변이라지만…… 이건 너무 개방적이잖아…… 아, 윽……」"

[[dialogue]]
speaker = "アポロ"
original = "「んっ──いつまでこうしてるんだって……す、するなら早くしてくれよ──このまま脚広げっぱなしとか……恥ずかしいだろぉ……<emoji=heart04>」"
translation = "「음── 언제까지 이러고 있을 거냐니…… 하, 할 거면 빨리 해줘── 이대로 계속 다리를 벌리고 있는 건…… 부끄럽다구……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロの小さな体をテーブルに運んで、薄い布地の部分をさらにはだけさせてやる。"
translation = "아폴로의 작은 몸을 테이블로 옮겨서, 얇은 천 부분을 더욱 흐트러뜨려 준다."

[[dialogue]]
speaker = "unk"
original = "いきり立ったこちらのモノを彼女の股間へあてがうと、ますます羞恥に顔を赤らめた。"
translation = "발기한 나의 그것을 그녀의 가랑이에 갖다 대자, 더욱 수치심에 얼굴을 붉혔다."

[[dialogue]]
speaker = "アポロ"
original = "「んぁっ──ぅっ……や、やめろって、おち○ちん、こするだけとか──ぁっ……んっ……<emoji=heart04>\u3000ぁっ……ふぁ、ぁっ──んっ、んぁっ……<emoji=heart04>\u3000ま、魔王ぉっ……<emoji=heart04>」"
translation = "「응아앗── 윽…… 그, 그만하라니까, 자지, 문지르기만 하는 건── 앗…… 응……<emoji=heart04> 앗…… 하아, 앗── 응, 응아앗……<emoji=heart04> 마, 마왕……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしのおま○こ欲しいなら──んっ……さっさと挿れてくれよ──ぁっ、んぅっ……<emoji=heart04>\u3000切ない、だろぉっ……ぁっ……っ……<emoji=heart04>」"
translation = "「내 보지 갖고 싶으면── 응…… 얼른 넣어달라고── 앗, 응윽……<emoji=heart04> 애타잖아…… 앗…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "両脚をもじもじさせるアポロ。"
translation = "양다리를 머뭇거리는 아폴로."

[[dialogue]]
speaker = "unk"
original = "このまま、珍しく羞恥にもだえる彼女を味わっていたかったが、こちらも我慢の限界だった。"
translation = "이대로, 드물게 수치심에 몸부림치는 그녀를 맛보고 싶었지만, 이쪽도 참을성의 한계였다."

[[dialogue]]
speaker = "アポロ"
original = "「ぁっ──んあああぁぁぁぁっっっっ…………<emoji=heart04><emoji=heart04>」"
translation = "「앗── 응아아아아아아아아악…………<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "濡れそぼったアポロの秘所へ、ペニスを突き立てるように挿入──"
translation = "듬뿍 젖은 아폴로의 비소에, 페니스를 꽂아 세우듯이 삽입──"

[[dialogue]]
speaker = "unk"
original = "あまりにも小さな下の口は、こちらもぐっと腰を据えないと入り切らない。"
translation = "너무나도 작은 아래 입은, 이쪽도 굳건히 허리를 잡지 않으면 다 들어가지 않는다."

[[dialogue]]
speaker = "アポロ"
original = "「魔王の──ぁっ、おち○ちんっ、がぁっ──んぁぁっ……！\u3000あたしのなか……ぐちゃぐちゃに──んぅぅっ……<emoji=heart04>\u3000ぁっ、はぁっ、んぁぁっ！」"
translation = "「마왕의── 앗, 자지가, 아앗── 응아앗……! 내 안을…… 엉망진창으로── 응으윽……<emoji=heart04> 앗, 하앗, 응아앗!」"

[[dialogue]]
speaker = "unk"
original = "彼女を征服しているような心地に満たされた。"
translation = "그녀를 정복하고 있는 듯한 기분에 휩싸였다."

[[dialogue]]
speaker = "アポロ"
original = "「な──なぁっ、んっ、ここのビーチって──ほんとに、ぁっ、他の奴らは──んぁっ<emoji=heart04>\u3000入って、こないんだよな──ぁっ、んぅぁっ<emoji=heart04>」"
translation = "「나── 나앗, 응, 여기 해변은── 정말로, 앗, 다른 녀석들은── 응앗<emoji=heart04> 들어오지, 않는 거지── 앗, 응으앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「もし──あたしと魔王がこんなことしてるの、見られたら……っっっ～～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「만약── 나랑 마왕이 이런 짓 하는 거, 들키면…… 으으으으으으윽～～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロはひとりでにそんなシチュエーションを妄想して、さらに陰穴をきゅうきゅうと締めつけていった。"
translation = "아폴로는 혼자서 그런 상황을 망상하며, 더욱 보지를 꽉꽉 조여왔다."

[[dialogue]]
speaker = "アポロ"
original = "「ぁっぁっ、んぁっ！\u3000ぅぅっ……水着のことも──んぁっ、急に恥ずかしく──なってきちまって……ぁっ、はぁっ、んぁぁっ<emoji=heart04>」"
translation = "「앗앗, 응앗! 으윽…… 수영복 생각도── 응앗, 갑자기 부끄러워── 져버려서…… 앗, 하앗, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ふぅ、ふぅ──っ！\u3000あたしのカラダ──んぁっ、魔王の好き勝手に──っ、されちまってるな……っ……<emoji=heart04>\u3000モノみたいに──ぁっ、んぅあっ！」"
translation = "「후우, 후우──! 내 몸── 응앗, 마왕 마음대로── 윽, 당하고 있네…… 윽……<emoji=heart04> 물건처럼── 앗, 응으앗!」"

[[dialogue]]
speaker = "unk"
original = "アポロの体は軽く小さく、両手で腰を抱いてやればいかようにも動かせた。"
translation = "아폴로의 몸은 가볍고 작아서, 양손으로 허리를 안아주면 마음껏 움직일 수 있었다."

[[dialogue]]
speaker = "unk"
original = "こんなにも小さな体を手に入れ、己の肉棒をも突き入れて自在に快楽を貪っている、自分。"
translation = "이렇게나 작은 몸을 손에 넣고, 자신의 육봉을 찔러 넣어 자유자재로 쾌락을 탐닉하고 있는, 나."

[[dialogue]]
speaker = "unk"
original = "魔王の名に偽りなき支配感に酔いしれるのを感じていた。"
translation = "마왕이라는 이름에 걸맞은 지배감에 도취되는 것을 느끼고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「ていうか──ぁっ、んっ<emoji=heart04>\u3000やっぱ、すごいよな──っ……みんなの前でも平気だった、ただの水着なのに──っ……<emoji=heart04>」"
translation = "「그나저나── 앗, 응<emoji=heart04> 역시, 대단하네── 윽…… 모두 앞에서도 아무렇지 않았던, 그냥 수영복인데── 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ちょっとずらすだけで──ぁっ、こんなにすぐ、エッチできるとか……っ<emoji=heart04>\u3000やっぱこの水着──んぁっ、変態すぎんだろぉっ……<emoji=heart04>」"
translation = "「살짝 젖히는 것만으로── 앗, 이렇게 금방, 섹스할 수 있다니…… 윽<emoji=heart04> 역시 이 수영복── 응앗, 너무 변태 같잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ついに、これまで水着で過ごしていた時間にも羞恥心を覚えだすようになったアポロ。"
translation = "마침내, 지금까지 수영복으로 지내던 시간조차 수치심을 느끼기 시작한 아폴로."

[[dialogue]]
speaker = "unk"
original = "恥ずかしがる彼女が可愛くて、つい耳元で囁いてしまう。"
translation = "부끄러워하는 그녀가 귀여워서, 그만 귓가에 속삭이고 만다."

[[dialogue]]
speaker = "アポロ"
original = "「はぁぁっ……んぅっ……ふぇぇ？\u3000かわいい──って……な、何をいきなり……！\u3000あたしにそんな甘っちょろい言葉──ぁっ、んぁっ<emoji=heart04>」"
translation = "「하아아앗…… 응윽…… 헤에? 귀엽다니…… 뭐, 뭐야 갑자기……! 나한테 그런 달콤한 말── 앗, 응앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「や、やめ──んぁっ<emoji=heart04>\u3000んっ、ふぅぅっ……んぅぅっ……！\u3000て、照れてない──ぁっ、んぁっ、ふぁぁぁっ……んぅっっ……！\u3000ぁっ<emoji=heart04>」"
translation = "「그, 그만── 응앗<emoji=heart04> 응, 후으윽…… 응으윽……! 부, 부끄러워하는 거 아냐── 앗, 응앗, 하아아앗…… 응으윽……! 앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口ではそう言いつつも、アポロは素直な褒め言葉に弱いのだ。"
translation = "입으로는 그렇게 말하면서도, 아폴로는 솔직한 칭찬에 약한 법이다."

[[dialogue]]
speaker = "unk"
original = "さらに羞恥が加速していったことで、窮屈だった膣内がさらにぎゅっと締まっていく──"
translation = "더욱 수치심이 가속되면서, 비좁았던 질 내부가 더욱 꽉 조여든다──"

[[dialogue]]
speaker = "アポロ"
original = "「ぁっ──んぁぁっ……！\u3000はぁっ、んっ、ふぅっ──っ……<emoji=heart04>\u3000ず、ずるいぞっ、そんな、好きとか、可愛いとか──ぁっ……！」"
translation = "「앗── 응아앗……! 하앗, 응, 후윽── 윽……<emoji=heart04> 치, 치사하다구, 그런, 좋아한다느니, 귀엽다느니── 앗……!」"

[[dialogue]]
speaker = "unk"
original = "まっすぐに愛を伝えるごとに、彼女の感じ方はより激しくなっていった。"
translation = "똑바로 사랑을 전할 때마다, 그녀의 감각은 더욱 격렬해져 갔다."

[[dialogue]]
speaker = "unk"
original = "そして、こちらにもたらす快楽をも──"
translation = "그리고, 이쪽으로 전해지는 쾌락 또한──"

[[dialogue]]
speaker = "アポロ"
original = "「ぁっぁっ──んぁっ！\u3000はぁ、はぁっ……魔王こそ──っ、必死に、腰振って──ぁっ、そんなに……っ、気持ちいいのかよ……っ……<emoji=heart04>」"
translation = "「앗앗── 응앗! 하아, 하앗…… 마왕이야말로── 윽, 필사적으로, 허리 흔들고── 앗, 그렇게나…… 윽, 기분 좋은 거냐고…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んぅぅぅっ……ぁっ──！\u3000あたしの、からだ──ぁっ、モノみたいに──んぁぁっ……<emoji=heart04>\u3000激し、すぎだろ──ぉっ……<emoji=heart04>\u3000ぁっ、はぁっ！」"
translation = "「응으으윽…… 앗──! 내, 몸── 앗, 물건처럼── 응아앗……<emoji=heart04> 너무, 격하잖아── 앗……<emoji=heart04> 앗, 하앗!」"

[[dialogue]]
speaker = "unk"
original = "この、限界までぎちぎちに締めつけてくるようなアポロの蜜壺──"
translation = "이, 한계까지 꽉꽉 조여오는 듯한 아폴로의 밀궁──"

[[dialogue]]
speaker = "unk"
original = "そのトンネルを荒々しく亀頭でかき分けるのが、無数に膣ひだが絡みついてきて、最高の快感を与えてくれるのだ。"
translation = "그 터널을 거칠게 귀두로 헤치는 것이, 무수한 질 주름이 얽혀와서, 최고의 쾌감을 안겨준다."

[[dialogue]]
speaker = "アポロ"
original = "「んぁぁぁぁっっ────！\u3000ったく、っ、魔王のやつ──んっ<emoji=heart04>\u3000こうなると──ぁっ、乱暴に、なるんだからよ……ぁっ、んぅっ<emoji=heart04>」"
translation = "「응아아아아악────! 정말이지, 윽, 마왕 녀석── 응<emoji=heart04> 이렇게 되면── 앗, 난폭해, 지니까 말이야…… 앗, 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ぅぅっ……でも──んっ、なんか、最近──ぁっ<emoji=heart04>\u3000おかしいんだ──あたし──んっ<emoji=heart04>\u3000奥、突かれるたびに──ぁっ<emoji=heart04>\u3000キュンってして……んぅぅっ<emoji=heart04>」"
translation = "「으윽…… 하지만── 응, 왠지, 요즘── 앗<emoji=heart04> 이상해── 나── 응<emoji=heart04> 안쪽, 찔릴 때마다── 앗<emoji=heart04> 큥 하고 울려서…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ふぅぅぅぅっっ……<emoji=heart04>\u3000はぁ、はぁ……っ……<emoji=heart04>\u3000おま○この奥──っ、うずうずして……んぅぅっ……気持ちよく、なっちまう──ぅぅっ……<emoji=heart04>」"
translation = "「후으으으으윽……<emoji=heart04> 하아, 하아…… 윽……<emoji=heart04> 보지 안쪽이── 윽, 근질근질해서…… 응으윽…… 기분 좋아져 버려── 으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥へ奥へとピストンするたび、ぴちゃぴちゃと跳ねる愛液がアポロの内股を濡らす。"
translation = "안으로 안으로 피스톤질을 할 때마다, 챠박챠박 튀는 애액이 아폴로의 허벅지 안쪽을 적신다."

[[dialogue]]
speaker = "unk"
original = "少々、乱暴すぎたかと思ったものの──どうやらこの反応を見るにそうでもないらしく。"
translation = "조금, 너무 난폭했나 싶었지만── 아무래도 이 반응을 보아하니 그렇지도 않은 모양이라."

[[dialogue]]
speaker = "アポロ"
original = "「そ、そうだ──ぁっぁっ！\u3000ぎゅぅって、奥までされると──ンアァッ！\u3000はぁ、はぁっ、んぅっ……<emoji=heart04>\u3000ぁっ、ふぁぁっ<emoji=heart04>\u3000ぁっ<emoji=heart04>\u3000んっ<emoji=heart04>」"
translation = "「그, 그래── 앗앗! 꽉, 안쪽까지 당하면── 응아앗! 하아, 하앗, 응윽……<emoji=heart04> 앗, 하아앗<emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さらに奥までゆっくり亀頭を押し込んでやると、アポロの体がびくんと跳ねた。"
translation = "더욱 안쪽까지 천천히 귀두를 밀어 넣자, 아폴로의 몸이 움찔하고 튀어 올랐다."

[[dialogue]]
speaker = "アポロ"
original = "「──んぁぁっぅっっ……！\u3000ま、待ってくれ魔王──ぁっぁっ<emoji=heart04>\u3000奥で激しくされるの、ぁっ、だめなんだっ、今はっ<emoji=heart04>\u3000ぁっ、んぁぁっ！」"
translation = "「──응아앗윽……! 기, 기다려줘 마왕── 앗앗<emoji=heart04> 안쪽에서 격하게 당하는 거, 앗, 안 된단 말야, 지금은<emoji=heart04> 앗, 응아앗!」"

[[dialogue]]
speaker = "アポロ"
original = "「ぁっ、はぁっ、っっ……んぅぅっ……<emoji=heart04>\u3000ぁ、ぁっ……お腹の奥からずっと、気持ちよくて──ぁぁっ、んぅぅっ……！」"
translation = "「앗, 하앗, 윽…… 응으윽……<emoji=heart04> 아, 앗…… 배 안쪽부터 계속, 기분 좋아서── 아아앗, 응으윽……!」"

[[dialogue]]
speaker = "アポロ"
original = "「ぁぁぁっ、んぅぅっ……<emoji=heart04>\u3000はぁ、はぁっ、んはぁっ……<emoji=heart04>\u3000や、ばい──ぁっ、ぁっ、んぁぁっ……！」"
translation = "「아아앗, 응으윽……<emoji=heart04> 하아, 하앗, 응하앗……<emoji=heart04> 위, 위험해── 앗, 앗, 응아앗……!」"

[[dialogue]]
speaker = "unk"
original = "アポロはどうやら、これまでの経験を通じて──"
translation = "아폴로는 아무래도, 지금까지의 경험을 통해──"

[[dialogue]]
speaker = "unk"
original = "当初は慣れていなかった膣内も、感じるようになってきたらしい。"
translation = "처음에는 익숙하지 않았던 질 내부도, 느끼게 된 모양이다."

[[dialogue]]
speaker = "アポロ"
original = "「はぁっ！\u3000んぅっ！\u3000んぁぁぁ～～～っっ……<emoji=heart04>\u3000ぁっ、ぅぅっ、ま、待ってくれ──ぁっ、んぁっ……！\u3000い、いつもと違うぞ──はぁぁっ<emoji=heart04>」"
translation = "「하앗! 응윽! 응아아아～～～악……<emoji=heart04> 앗, 으으윽, 기, 기다려줘── 앗, 응앗……! 평, 평소랑 다르다구── 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「ぅぅぅっ……ぁぁぁっ──！\u3000ずっと、気持ちいい、まんまで──んぁっ、んぅぅっ、ぁぁっ！\u3000ま、待てって言ってるのに、魔王──っ<emoji=heart04>」"
translation = "「으으으윽…… 아아앗──! 계속, 기분 좋은, 채로── 응앗, 응으윽, 아아앗! 기, 기다리라고 말하는데도, 마왕── 윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロの制止も無視しては──"
translation = "아폴로의 제지도 무시하고는──"

[[dialogue]]
speaker = "unk"
original = "か細い腰を鷲掴みにして、欲望のままに腰を打ちつける。"
translation = "가느다란 허리를 움켜쥐고, 욕망이 가는 대로 허리를 쳐올린다."

[[dialogue]]
speaker = "unk"
original = "その度にアポロが甲高い声で喘ぎ、下卑た快感に満たされるのを感じていた。"
translation = "그때마다 아폴로가 날카로운 목소리로 신음하며, 저속한 쾌감에 휩싸이는 것을 느끼고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「ぁぁぁっ……<emoji=heart04>\u3000あ、あたしのおま○こ──おかしぃっ、なんか、ヘンだ──ぁっぁっ<emoji=heart04>\u3000い、いくっ……変ないきかた、する──ぅっ……！」"
translation = "「아아아앗……<emoji=heart04> 내, 내 보지── 이상해, 뭔가, 이상하다구── 앗앗<emoji=heart04> 가, 가버려…… 이상하게 가버려── 윽……!」"

[[dialogue]]
speaker = "アポロ"
original = "「ぁっぁっ、んぅっ！\u3000も、もうらめらっ──ぁっ、んぁぁぁっ──……！\u3000～～～っっ……<emoji=heart04>\u3000ぁっ、ぁぁっ、んぁぁぁっっ……！\u3000ふぅっ<emoji=heart04>」"
translation = "「앗앗, 응윽! 이, 이제 가버려어── 앗, 응아아아앗──……! 으으으윽……<emoji=heart04> 앗, 아아앗, 응아아아앗……! 후윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロの華奢な肢体が断続的に震えている。"
translation = "아폴로의 가냘픈 지체가 단속적으로 떨리고 있다."

[[dialogue]]
speaker = "unk"
original = "張り詰めた乳首を<b>きゅっ</b>とつまんでやると──敏感になった体がぴくりと跳ねた。"
translation = "빳빳해진 젖꼭지를 <b>꼬집</b>어 주자── 민감해진 몸이 움찔하고 튀었다."

[[dialogue]]
speaker = "アポロ"
original = "「んぁぁぁぁぁぁっっ──っっ……！\u3000や、やめろって──ぇっ……い、今ぁっ、胸とか、触られたら──ぁっぁっ<emoji=heart04>\u3000だめだだめだっ<emoji=heart04>」"
translation = "「응아아아아아아악── 윽……! 그, 그만하라니까── 앗…… 지, 지금, 가슴 같은 거, 만져지면── 앗앗<emoji=heart04> 안 돼안 돼<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「んっ──んぅぅぅぅ～～～～～～～っっっ…………<emoji=heart04>\u3000ァッ、はァッ……っっ……<emoji=heart04>\u3000はっ、はぁっ、ふぅっ──んっ、んぁぁっ……！」"
translation = "「응── 응으으으으으으～～～～～～～윽…………<emoji=heart04> 앗, 하앗…… 윽……<emoji=heart04> 하앗, 하앗, 후윽── 응, 응아앗……!」"

[[dialogue]]
speaker = "アポロ"
original = "「ぅぅっ……ぁぁ、そうだよ……気持ちいいよっ……見たら、わかんだろぉっ……<emoji=heart04>\u3000ぁっぁっ、んっ、んぅぅぅぅ……っ……！」"
translation = "「으윽…… 아아, 그래…… 기분 좋아…… 보면, 알잖아……<emoji=heart04> 앗앗, 응, 응으으으으…… 윽……!」"

[[dialogue]]
speaker = "unk"
original = "乳首を愛撫してやりながらも、奥への刺激だって忘れない。"
translation = "젖꼭지를 애무해 주면서도, 안쪽으로의 자극 또한 잊지 않는다."

[[dialogue]]
speaker = "unk"
original = "すっかり出来上がってしまったアポロの体は、面白いように感じてしまっていた。"
translation = "완전히 달아올라 버린 아폴로의 몸은, 재미있을 정도로 느끼고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「な、なぁっ……ぅぅっ……！\u3000お、おかしいんだ──あたしのカラダ──ぁっぁっ、気持ちよすぎて、ぁっ、ぇぁぅっ<emoji=heart04>\u3000ぁっ、はぁっ<emoji=heart04>」"
translation = "「나, 나앗…… 으으윽……! 이, 이상하다구── 내 몸── 앗앗, 너무 기분 좋아서, 앗, 에아윽<emoji=heart04> 앗, 하앗<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「あああああああぁぁぁっっっ……っ……！\u3000ぁぅっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000んぁぁっ<emoji=heart04>\u3000も、もう、だめ──ぁぅっ、ぅぁっぅっ……！」"
translation = "「아아아아아아아아악…… 윽……! 아윽<emoji=heart04> 응윽<emoji=heart04> 응아앗<emoji=heart04> 이, 이제, 안 돼── 아윽, 으앗윽……!」"

[[dialogue]]
speaker = "unk"
original = "戸惑いの入り混じった表情で喘ぐアポロ。"
translation = "당혹감이 섞인 표정으로 신음하는 아폴로."

[[dialogue]]
speaker = "unk"
original = "今の彼女に迫っているのは、シックスナインの時のクリイキとも異なる、より深い未知の快楽で──"
translation = "지금 그녀에게 다가오고 있는 것은, 식스나인 때의 클리 가기와도 다른, 더욱 깊은 미지의 쾌락으로──"

[[dialogue]]
speaker = "アポロ"
original = "「い──いく、ぅ……っ……！\u3000あたしの、おま○こ、おかしくなる──魔王のおち○ちんで──ぁっぁっ、んぁぁぁぁっっっ……<emoji=heart04><emoji=heart04>」"
translation = "「가── 가, 아…… 윽……! 내, 보지, 이상해져── 마왕의 자지로── 앗앗, 응아아아아악……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「な、なぁっ……そこに──そこに、いてくれよ……？\u3000ぁっぁっ、あたし、飛びそうだ、もうっ<emoji=heart04>\u3000ぁっ、ふぁぁっっ、んぁぁぁぁっ……<emoji=heart04>」"
translation = "「나, 나앗…… 거기에── 거기에, 있어줘……? 앗앗, 나, 날아갈 것 같아, 이제<emoji=heart04> 앗, 하아앗, 응아아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがてアポロはただ快楽を享受するだけの上の空となって、ろれつも回らなくなっていく。"
translation = "이윽고 아폴로는 그저 쾌락을 향유할 뿐인 넋이 나간 상태가 되어, 혀도 제대로 돌아가지 않게 된다."

[[dialogue]]
speaker = "unk"
original = "その姿にさらなる興奮を覚え、ますますピストンを激しくしていく──"
translation = "그 모습에 더욱 흥분을 느껴, 점점 피스톤질을 격렬하게 해나간다──"

[[dialogue]]
speaker = "アポロ"
original = "「ぁぁっぁあ──ぁぅ、ぁっ、んぁぁっ！\u3000あっ、はぁっ、いくっ、いくいくいく──ぅぅっ、ぁっ、いくぅぅぅぅっっ──っ……！」"
translation = "「아아앗아── 아윽, 앗, 응아앗! 앗, 하앗, 간다, 가가가가── 으으윽, 앗, 가아아아아악── 윽……!」"

[[dialogue]]
speaker = "アポロ"
original = "「あっあっあっ──んああああああぁぁああぁあああぁあぁあぁぁぁぁぁぁ────────っっっっ！！！」"
translation = "「앗앗앗── 응아아아아아아아아아아아아아아아아아아아아아아아아아────────!!!!」"

[[dialogue]]
speaker = "アポロ"
original = "「～～～～～～～～～～～～～～～～～～～～～～～～～～っっっっっっっっ………………<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「～～～～～～～～～～～～～～～～～～～～～～～～～～으으으으윽………………<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アポロの全身が痙攣で震えると同時、こちらも容易に決壊する。"
translation = "아폴로의 전신이 경련으로 떨림과 동시에, 이쪽도 쉽게 결궤한다."

[[dialogue]]
speaker = "unk"
original = "性欲に支配されきっていた俺は、気づけばアポロの太ももをがっしりと押さえて、ひたすらペニスを奥へ押しやっていた。"
translation = "성욕에 완전히 지배당해 있던 나는, 어느새 아폴로의 허벅지를 꽉 누르고, 오로지 페니스를 안쪽으로 밀어 넣고 있었다."

[[dialogue]]
speaker = "unk"
original = "もはや一滴もこぼさぬとばかりに、射精の最後までみっちり挿入し続ける。"
translation = "이제 한 방울도 흘리지 않겠다는 듯이, 사정의 마지막까지 꽉 삽입을 유지한다."

[[dialogue]]
speaker = "アポロ"
original = "「ぁぁぁっ……ぅぅぅっ……んぁぁっっっ……<emoji=heart04>\u3000ふぁぁ、ぁっ……<emoji=heart04>\u3000んっ、ふぅぅぅっっ……！\u3000ぁっ、はぁっ、っっっ……<emoji=heart04>」"
translation = "「아아아앗…… 으으으윽…… 응아앗……<emoji=heart04> 하아아, 앗……<emoji=heart04> 응, 후으으으윽……! 앗, 하앗, 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「はぁっ、はぁっ……<emoji=heart04>\u3000な、なんだこれ──っ……頭、ふわふわして──気持ちいいの、ずっと続いて──ぅぅっ……<emoji=heart04>」"
translation = "「하앗, 하앗……<emoji=heart04> 뭐야 이거── 윽…… 머리가, 붕 떠서── 기분 좋은 게, 계속 이어져서── 으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして、当のアポロも未だ快楽の頂点から降りてこられない様子だった。"
translation = "그리고, 당사자인 아폴로도 아직 쾌락의 정점에서 내려오지 못하는 모양이었다."

[[dialogue]]
speaker = "unk"
original = "今の俺たちはお互いに、だらしなく緩みきった顔をしているだろう。こんな現場を誰かに目撃されでもしたら何もかも終わる。"
translation = "지금의 우리들은 서로, 보기 흉할 정도로 풀어진 얼굴을 하고 있겠지. 이런 현장을 누군가에게 목격이라도 당한다면 모든 게 끝이다."

[[dialogue]]
speaker = "アポロ"
original = "「ったく──っ……<emoji=heart04>\u3000最後まで──ぁっ……必死に腰振りやがって……っ……<emoji=heart04>\u3000そんなにあたしの<ruby>膣内<rt>なか</rt></ruby>……気持ちよかったのかよ……っ……<emoji=heart04>」"
translation = "「정말이지── 윽……<emoji=heart04> 마지막까지── 앗…… 필사적으로 허리 흔들어대고…… 윽……<emoji=heart04> 그렇게나 내 질 내부이…… 기분 좋았던 거냐고…… 윽……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしも……だけど……<emoji=heart04>\u3000もしかして──これが──ふーっ……えっちの、気持ちよさ──なのか……？\u3000はぁ、はぁっ……<emoji=heart04>」"
translation = "「나도…… 그렇지만……<emoji=heart04> 설마── 이게── 후우── 섹스의, 기분 좋음── 인 건가……? 하아, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「あたし……なんか、前よりもっと──魔王のこと、好きになっちまった気がするぞ──ふぅ、ふぅっ……<emoji=heart04>」"
translation = "「나…… 왠지, 전보다 훨씬 더── 마왕을, 좋아하게 돼버린 기분이라구── 후우, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、アポロを優しくテーブルから運んで──"
translation = "그러고 나서, 아폴로를 상냥하게 테이블에서 옮겨서──"

[[dialogue]]
speaker = "unk"
original = "珍しくしおらしい様子の彼女に、また惚れ直してしまうのだった。"
translation = "드물게 얌전한 모습인 그녀에게, 다시 반해버리는 것이었다."

