[[dialogue]]
speaker = "unk"
original = "第２話,妹が増える日,P"
translation = "제2화, 여동생이 늘어나는 날, P"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ねぇねぇソフィ、どの呼び方がいいかしら～♪\u3000お姉ちゃんに教えて～<emoji=heart04>」"
translation = "「저기 저기 소피, 어떤 호칭이 좋을까~♪ 누나한테 알려줘~<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「どれがいいか、と言われても……」"
translation = "「어떤 게 좋냐고 하셔도……」"

[[dialogue]]
speaker = "unk"
original = "やあ、２人とも"
translation = "안녕, 둘 다"

[[dialogue]]
speaker = "ソフィア"
original = "「あっ、会長さん。助けてください。姉さんがおかしくなってしまいました」"
translation = "「앗, 회장님. 도와주세요. 언니가 이상해졌어요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ひど～い！\u3000お姉ちゃんは真面目にお話しているのに～……」"
translation = "「너무해! 누나는 진지하게 이야기하는 건데~……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「でも会長くんにも関係のある話だし、丁度いいタイミングかもしれないわね～♪」"
translation = "「하지만 회장군과도 관계있는 이야기고, 마침 좋은 타이밍일지도 모르겠네~♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ねぇ会長くん、そろそろ新しい妹が欲しくないかしら～？」"
translation = "「저기 회장군, 슬슬 새로운 여동생이 갖고 싶지 않니~?」"

[[dialogue]]
speaker = "unk"
original = "どういうことです！？"
translation = "그게 무슨 소리예요!?"

[[dialogue]]
speaker = "ソフィア"
original = "「なんでも先日、会長さんのお母様──リノさんから『私のことはお義母さんって呼んでいいのよ』と姉さんが言われたらしく……」"
translation = "「아무래도 며칠 전, 회장님의 어머니──리노 씨로부터 『나를 어머니라고 불러도 된단다』라는 말을 언니가 들은 모양이라……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「そうなの～。最近よく会長くんのお家にお邪魔してるんだけど、本当の娘みたいに接してくれててね～<emoji=heart04>」"
translation = "「맞아~. 최근 자주 회장군 집에 놀러 가는데, 친딸처럼 대해주셔서 말이야~<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「だからお姉ちゃん、この幸せな気持ちを会長くんにもお返ししたいな～って思って……」"
translation = "「그래서 누나, 이 행복한 기분을 회장군에게도 돌려주고 싶다고 생각해서……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「私が切れる最強のカードはもちろん、可愛い可愛い妹のソフィでしょう？」"
translation = "「내가 내놓을 수 있는 최강의 카드는 당연히, 귀엽고 귀여운 여동생 소피겠지?」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「名付けて、会長くんにとっても愛らしい妹を増やしてあげよう計画～<emoji=heart04>」"
translation = "「이름하여, 회장군에게도 아주 사랑스러운 여동생을 늘려주자 계획~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "な、なるほど……？"
translation = "나, 과연……?"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「だからソフィに、会長くんの妹になったら、どういう風に呼んでみたい？\u3000って聞いてたの～」"
translation = "「그래서 소피한테, 회장군의 여동생이 된다면 어떤 식으로 부르고 싶어? 라고 묻고 있었어~」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「王道に『お兄ちゃん』？\u3000敬意を込めて『お兄様』？\u3000ちょっと変化球で『にぃに』って呼ぶのもありかもね～って♪」"
translation = "「왕도인 『오빠』? 경의를 담아 『오라버니』? 조금 변화구로 『오빠야』라고 부르는 것도 괜찮겠네~ 하면서♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「それなのに、ソフィの反応が芳しくなくって～……」"
translation = "「그런데도 소피 반응이 시원치 않아서~……」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さんはいつでも急におかしなことを思いつくんですから困ります」"
translation = "「언니는 언제나 갑자기 이상한 걸 떠올리시니까 곤란해요」"

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんからも言ってあげてください。いくら恋人の妹だからって、いきなり『お兄ちゃん』なんて呼ばれたら驚きますよね？」"
translation = "「회장님도 한마디 해주세요. 아무리 애인의 여동생이라지만, 갑자기 『오빠』라고 불리면 놀라시겠죠?」"

[[dialogue]]
speaker = "unk"
original = "もう妹はいっぱいいるし"
translation = "이미 여동생은 잔뜩 있고"

[[dialogue]]
speaker = "unk"
original = "そんなことはないよ？"
translation = "그렇지는 않아?"

[[dialogue]]
speaker = "ソフィア"
original = "「……そうでした。変わり者の姉さんとお付き合いしてるんですから、会長さんもちょっぴり変わっているんでした。まともなのは私だけですか……」"
translation = "「……그랬죠. 별난 언니랑 사귀고 계시니까, 회장님도 조금은 별나신 거였죠. 멀쩡한 건 저뿐인가요……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「も～。そんなにおかしいことじゃないでしょ～？」"
translation = "「정말~. 그렇게 이상한 일 아니잖아~?」"

[[dialogue]]
speaker = "ソフィア"
original = "「気が早いと言ってるんです。婚約しているならまだしも……」"
translation = "「성급하다고 말하는 거예요. 약혼이라도 했다면 모를까……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「え～、でもでも、このまま学園を卒業したら、そういう未来もあるかもしれないでしょう？」"
translation = "「에~ 하지만 하지만, 이대로 학원을 졸업하면 그런 미래가 있을지도 모르잖아?」"

[[dialogue]]
speaker = "ソフィア"
original = "「なら、そういう未来になってから話せばいいことだと思います」"
translation = "「그럼 그런 미래가 되고 나서 이야기하면 될 일이라고 생각해요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「そんな～。ソフィ、会長くんのこと、お兄ちゃんって呼ぶのは嫌なの～？」"
translation = "「너무해~. 소피, 회장군을 오빠라고 부르는 건 싫어~?」"

[[dialogue]]
speaker = "ソフィア"
original = "「い、嫌だなんて言ってません。姉さんと同じくらい尊敬してますし、信頼していますよ」"
translation = "「시, 싫다고는 안 했어요. 언니만큼이나 존경하고 있고, 신뢰하고 있다고요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「ならいいじゃな～い♪\u3000ほらほら、ソフィの好きな呼び方で、会長くんのこと呼んでみて～<emoji=heart04>」"
translation = "「그럼 됐네~♪ 자자, 소피가 좋아하는 호칭으로 회장군을 불러봐~<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
original = "「う～……恥ずかしいと言っているだけなのに、どうして通じないんでしょうか……」"
translation = "「으~…… 부끄럽다고 말하고 있을 뿐인데, 왜 안 통하는 걸까요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さんの奔放なところはもう諦めますが……御本人への確認も大切です。会長さんは、私が妹になったら嬉しいんですか？」"
translation = "「언니의 분방한 면은 이제 포기하겠지만…… 본인 확인도 중요해요. 회장님은 제가 여동생이 되면 기쁘신가요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん嬉しいよ！"
translation = "물론 기쁘지!"

[[dialogue]]
speaker = "ソフィア"
original = "「……はぁ、分かりました。それじゃあこれからは会長さんのこと……『兄さん』って呼びます」"
translation = "「……하아, 알겠습니다. 그럼 앞으로는 회장님을…… 『오라버니』라고 부를게요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「きゃー♪\u3000うふふ、これでも～っと仲良しになれたわね～♪」"
translation = "「꺄아~♪ 우후후, 이걸로 더어욱 사이좋아졌네~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉さんは単純なんですから……あ、そうですっ」"
translation = "「언니는 단순하시다니까…… 아, 맞다」"

[[dialogue]]
speaker = "ソフィア"
original = "「それじゃあ早速、兄さんにお願いがあります。妹の頼みですし、もちろん聞いてくれますよね？」"
translation = "「그럼 당장 오라버니께 부탁이 있어요. 여동생의 부탁이니 당연히 들어주시겠죠?」"

[[dialogue]]
speaker = "unk"
original = "ああ、もちろん"
translation = "아아, 물론이지"

[[dialogue]]
speaker = "ソフィア"
original = "「では今後、学園内ではあまり姉さんと目立ってイチャイチャすることは避けてもらえると助かります！」"
translation = "「그럼 앞으로 학원 내에서는 언니와 너무 눈에 띄게 꽁냥거리는 건 피해 주시면 감사하겠습니다!」"

[[dialogue]]
speaker = "ソフィア"
original = "「図書館で膝枕をしてたり、保健室で耳かきをしたり、手を繋いで夜の見回りをしていたり……」"
translation = "「도서관에서 무릎베개를 하거나, 보건실에서 귀를 파주거나, 손을 잡고 밤 순찰을 하거나……」"

[[dialogue]]
speaker = "ソフィア"
original = "「バカップルなうわさ話が絶えないもので、妹として恥ずかしい限りなので」"
translation = "「바보 커플 같은 소문이 끊이질 않아서, 여동생으로서 부끄럽기 짝이 없거든요」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
original = "「そんなぁ！？\u3000これはもしかして、藪蛇だったかしら～……」"
translation = "「그럴 수가!? 이건 혹시 긁어 부스럼이었나~……」"

[[dialogue]]
speaker = "unk"
original = "善処します……"
translation = "잘 해볼게……"

[[dialogue]]
speaker = "ソフィア"
original = "「はい、よろしくお願いしますね。兄さん♪」"
translation = "「네, 잘 부탁드려요. 오라버니♪」"

[[dialogue]]
speaker = "unk"
original = "そうして俺は、サーシャさんの提案によって新たにソフィアから『兄さん』と呼ばれるようになるのだった──"
translation = "그렇게 나는 사샤 씨의 제안으로 새롭게 소피아로부터 『오라버니』라고 불리게 되는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "──後日。奏ソフィアは１人、カフェでお茶を楽しんでいた。"
translation = "──며칠 뒤. 카나데 소피아는 혼자 카페에서 차를 즐기고 있었다."

[[dialogue]]
speaker = "ソフィア"
original = "「会長さんが、兄さん……兄さん、ですか……」"
translation = "「회장님이, 오라버니…… 오라버니, 인가요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふふっ……♪\u3000自分で思っている以上に、嬉しいのかもしれません。姉さんにするみたいに、甘えちゃってもいいんでしょうか……♪」"
translation = "「후훗……♪ 스스로 생각하는 것 이상으로 기쁠지도 모르겠네요. 언니한테 하는 것처럼 어리광 부려도 되는 걸까요……♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ──見つけた！\u3000ねぇねぇ、今ちょっといいかな！」"
translation = "「앗── 찾았다! 저기 저기, 지금 잠깐 괜찮아!」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、新星学園の──んん？」"
translation = "「아, 신성 학원의── 응?」"

[[dialogue]]
speaker = "ソフィア"
original = "（委員会も部活動も違う方々ですね……いったい何の集まりでしょうか？）"
translation = "(위원회도 동아리도 다른 분들이네요…… 대체 무슨 모임일까요?)"

[[dialogue]]
speaker = "ルルカ"
original = "「何だか風の噂で、新しい妹が増えたって聞いてね！\u3000ご挨拶に来たの！」"
translation = "「왠지 풍문으로 새로운 여동생이 늘었다고 들어서 말이야! 인사하러 왔어!」"

[[dialogue]]
speaker = "メイプル"
original = "「ふっふっふ……まさか新たな『妹ライバル』が増えるとはな！\u3000その挑戦、受けて立つ！！」"
translation = "「훗훗훗…… 설마 새로운 『여동생 라이벌』이 늘어날 줄이야! 그 도전, 받아주마!!」"

[[dialogue]]
speaker = "モナカ"
original = "「モ、モナカは、みんなで仲良くできると嬉しいな……！」"
translation = "「모, 모나카는 다 같이 사이좋게 지내면 기쁠 것 같아……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………はい？」"
translation = "「…………네?」"

[[dialogue]]
speaker = "unk"
original = "この後、学園内の妹グループとソフィアは仲良しになるのだが、それはまた別のお話──"
translation = "이후 학원 내 여동생 그룹과 소피아는 사이가 좋아지지만, 그건 또 다른 이야기──"

