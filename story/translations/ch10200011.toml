[[dialogue]]
speaker = "unk"
original = "第１話,大人気のＶチューバー,P"
translation = "제1화, 인기 만점 VTuber, P"

[[dialogue]]
speaker = "unk"
original = "海野辺ルルカ。最近知り合った、アナのクラスメイトだという後輩だ。"
translation = "우미노베 루루카. 최근 알게 된, 아나의 클래스메이트라는 후배다."

[[dialogue]]
speaker = "unk"
original = "歌が得意で、大聖堂の聖歌隊に所属しているらしい。そんな彼女が今、目の前にいるのだが……"
translation = "노래가 특기이며, 대성당의 성가대에 소속되어 있는 모양이다. 그런 그녀가 지금, 눈앞에 있다만……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うぅう～っ……」"
translation = "「으으으~……」"

[[dialogue]]
speaker = "unk"
original = "ルルカ。どうかした？"
translation = "루루카. 무슨 일이야?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「駄目だぁ。ぜんっぜん登録者が増えてない……やっぱりここらで頭打ちなのかなあ……」"
translation = "「안 되겠어어. 저언혀 구독자가 늘지 않아…… 역시 이쯤이 한계인 걸까아……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「鬼辛カップラーメン３倍チャレンジ……今のトレンドだよねー？\u3000まだ古いネタじゃないはずなのに……」"
translation = "「지옥불 매운맛 컵라면 3배 챌린지…… 요즘 트렌드잖아? 아직 철 지난 소재는 아닐 텐데……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えーっと、なになに、コメントは……」"
translation = "「어어디, 보자보자, 코멘트는……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いくら何でも声が汚い、ずっと鼻水ずびずびで草、ろれつ回ってなくて草、これは汚いルカルカ、嗚咽たすかる……」"
translation = "「아무리 그래도 목소리가 더럽다, 계속 콧물 훌쩍거려서 웃겨, 발음 다 꼬여서 웃겨, 이건 더러운 루카루카, 오열 고맙다……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ウケてる……ウケてるけどっ……常連しかコメントしてないじゃん！」"
translation = "「반응은 오는데…… 반응은 오지만…… 단골들만 코멘트하고 있잖아!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「新規層！\u3000新規層が……欲しいのにっ……！」"
translation = "「신규 유입! 신규 유입이…… 필요한데에……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あんなに体を張ったのに……むせすぎてマイク壊しそうだったのにー……いまいちだぁ～」"
translation = "「그렇게 몸을 던졌는데…… 너무 사레들려서 마이크 망가뜨릴 뻔했는데~…… 별로네에~」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ゲーム実況もなぁ。最近、聖歌隊の活動が忙しくって時間取りづらいし……うぅ～ん……」"
translation = "「게임 실황도 말이지. 최근 성가대 활동이 바빠서 시간 내기도 힘들고…… 으으으음……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「こ、こうなったら、ちょっぴり過激な、え、ええ、えっちなシチュエーションボイスとか、やるべきかも……！？」"
translation = "「이, 이렇게 된 이상, 조금 과격한, 에, 에에, 에로한 시츄에이션 보이스 같은 걸, 해야 할지도……!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「一歩間違えばアカウント停止だけどっ。効果は絶大……のはず……！」"
translation = "「한 발 잘못 내디디면 계정 정지지만. 효과는 절대적……일 거야……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん。何もやらないよりはいいよね。検索しよ。えーっと、バイノーラル、配信、コツ……」"
translation = "「응. 아무것도 안 하는 것보단 낫겠지. 검색하자. 어디 보자, 바이노럴, 방송, 요령……」"

[[dialogue]]
speaker = "unk"
original = "えーっと……ルルカ？"
translation = "저기…… 루루카?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっ──」"
translation = "「엣──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お、お、おお、お兄ちゃんっ！？」"
translation = "「오, 오, 오오, 오빠아!?」"

[[dialogue]]
speaker = "unk"
original = "その子、Ｖチューバーの『ルカルカ』？"
translation = "그 애, VTuber인 『루카루카』야?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ち、ちちちちちちっ、違うよ！？」"
translation = "「아, 아아아아아아니, 아니야!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、あたしはルルカ！\u3000この子はルカルカ！\u3000ぜんっぜん名前も違うよね！？」"
translation = "「나, 나는 루루카! 이 애는 루카루카! 저언혀 이름도 다르잖아!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「つまり２人は別人ってことなの！\u3000うん、そう！\u3000ルルカは、ルカルカと何の関係もないんだっ、あはははっ！！」"
translation = "「즉 둘은 다른 사람이라는 거야! 응, 그래! 루루카는 루카루카랑 아무 상관도 없다구, 아하하하!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「配信の時間帯傾向から、学生じゃないか～って言われてるけど！\u3000あれは根も葉もない噂！\u3000噂だし！」"
translation = "「방송 시간대 경향 때문에 학생 아니냐~ 하는 소리를 듣고 있지만! 저건 근거 없는 소문! 소문이라니까!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「昨日の夕食は確かに激辛カップラーメンだったけど……それはたまたま偶然の一致っていうか！」"
translation = "「어제 저녁 식사가 확실히 매운 컵라면이긴 했지만…… 그건 우연히 일치한 거랄까!」"

[[dialogue]]
speaker = "unk"
original = "……自分から正体をバラしすぎじゃないか？"
translation = "……스스로 정체를 너무 까발리는 거 아니야?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うっ……！\u3000ああああああっ……！\u3000どうしようっ……とうとう知り合いに、身バレしちゃったよぉ～っ……！！」"
translation = "「윽……! 아아아아아악……! 어떡해…… 드디어 아는 사람한테 정체를 들켜버렸어어~……!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はい……そうです……あたしが、Ｖチューバー『汐ルカルカ』の中の人です……」"
translation = "「네…… 맞아요…… 제가 VTuber 『시오 루카루카』의 안의 사람입니다……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「登録者数は最近５０万越えたところ……って自分で言うと嫌味っぽいかな。あはは……」"
translation = "「구독자 수는 최근 50만 명을 넘긴 참……이라고 직접 말하면 재수 없으려나. 아하하……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「初めは、歌ってみたを投稿するちっちゃなチャンネルだったんだよね」"
translation = "「처음에는 노래 커버 영상을 올리는 조그만 채널이었어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「大好きなアイドルソングを歌って、公開するだけ。案の定、埋もれちゃったんだよね……」"
translation = "「좋아하는 아이돌 노래를 부르고, 공개할 뿐. 예상대로 묻혀버렸지……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「サムネイルとか、色々工夫してみたんだけど、あんまり伸びなくって」"
translation = "「썸네일이라든가, 여러 가지 궁리해 봤지만 별로 늘지 않아서」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「で、どうしようって思ってた時に……ちょうどＶチューバーの間で流行ってたゲームがあったの。フィットネス系の実況配信」"
translation = "「그래서 어떡할까 고민하던 중에…… 마침 VTuber들 사이에서 유행하던 게임이 있었어. 피트니스 계열 실황 방송」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「試しにやってみたら『息切れが喘ぎ声みたいでエロい』って……なんか知らないけどすっごいバズっちゃって」"
translation = "「시험 삼아 해봤더니 『숨 가빠하는 소리가 신음 소리 같아서 에로하다』라면서…… 왠지는 모르겠지만 엄청나게 대박이 터져버려서」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「で……ああ、こういうのがウケるんだって思ったから……徹底的に真似したんだ。人気配信者のアプローチってやつ」"
translation = "「그래서…… 아, 이런 게 먹히는구나 싶어서…… 철저하게 흉내 냈어. 인기 스트리머의 접근 방식이라는 거」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「運が良かったんだと思う。ありがたいことに、人気Ｖチューバーのランキングにも常連になって……」"
translation = "「운이 좋았다고 생각해. 감사하게도 인기 VTuber 랭킹에도 단골이 됐고……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも、もう限界なの～っ！」"
translation = "「하지만, 이제 한계야아~!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「流行りすたりが激しいから市場調査だけでとんでもない労力だし……！」"
translation = "「유행이 워낙 빨리 변하니까 시장 조사만으로도 엄청난 노력이 들고……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「メンバー用のコンテンツも最近マンネリしちゃって飽きられてる気がするし……！」"
translation = "「멤버 전용 콘텐츠도 최근 매너리즘에 빠져서 다들 질려 하는 것 같고……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「歌系のチャンネルなのに、ラーメン食べて鼻水すすってる動画の方が伸びちゃうし……！！」"
translation = "「노래 계열 채널인데, 라면 먹으면서 콧물 훌쩍이는 영상이 더 조회수가 잘 나오고……!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いや、最後のはしょうがないんだけど……そーいうアプローチを選んだのはあたしだから……」"
translation = "「아니, 마지막 건 어쩔 수 없지만…… 그런 방식을 택한 건 나니까……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも、もう個人でやってくのは限界だよ……！\u3000プレッシャーでつぶれちゃいそう！！」"
translation = "「하지만 이제 개인으로 해나가는 건 한계야……! 압박감에 짓눌려버릴 것 같아!!」"

[[dialogue]]
speaker = "unk"
original = "俺にできることがあるなら、手伝うよ"
translation = "내가 할 수 있는 일이 있다면 도와줄게"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……へ？\u3000い、いいの？\u3000でもどうして？\u3000別にお兄ちゃんって、Ｖチューバーが好きなわけじゃないよね？」"
translation = "「……헤? 그, 그래도 돼? 하지만 왜? 딱히 오빠는 VTuber를 좋아하는 건 아니잖아?」"

[[dialogue]]
speaker = "unk"
original = "ルカルカの歌は好きで、よく聞いていた"
translation = "루카루카의 노래는 좋아해서 자주 듣고 있었어"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっ、お兄ちゃんってリスナーさんだったの！？\u3000わぁぁ……な、なんか恥ずかしいかも……」"
translation = "「엣, 오빠 리스너였어!? 와아아…… 왠지 부끄러울지도……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも、助けてくれるのはすっごく助かるかも！\u3000こう、アシスタント、みたいな？\u3000精神的な支えが欲しくって……」"
translation = "「하지만 도와주는 건 정말 큰 도움이 될지도! 그, 어시스턴트 같은 거? 정신적인 지주가 필요해서……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いいの？\u3000うぅっ……ありがと！\u3000すっごく心強いよ！」"
translation = "「정말이지? 으으윽…… 고마워! 정말 든든해!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「アイデアを交換したり、あたしの考えた企画に意見をしてくれたら嬉しいなっ……！」"
translation = "「아이디어를 교환하거나, 내가 짠 기획에 의견을 주면 기쁠 거야……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、でもね。Ｖチューバー活動を手伝ってもらうにあたって、気をつけて欲しいことがあるの」"
translation = "「아, 하지만 말이야. VTuber 활동을 도와주는 데 있어서 주의해 줬으면 하는 게 있어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「汐ルカルカの正体……誰にもバラしちゃ駄目だよ！！」"
translation = "「시오 루카루카의 정체…… 아무한테도 말하면 안 돼!!」"

[[dialogue]]
speaker = "unk"
original = "（まさかルルカに言われるとは……）"
translation = "（설마 루루카에게 그런 말을 들을 줄이야……）"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「い～い？\u3000学園の友達とかにも、家族にも言っちゃ駄目だよ。お兄ちゃんとルルカだけの、ヒミツ！」"
translation = "「알겠지? 학원 친구들한테도, 가족한테도 말하면 안 돼. 오빠랑 루루카만의 비밀!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「約束、だからね！」"
translation = "「약속이야!」"

