[[dialogue]]
speaker = "unk"
original = "第２話,マトイのメイド体験,P"
translation = "제2화, 마토이의 메이드 체험, P"

[[dialogue]]
speaker = "unk"
original = "マトイは最近、九浄家メイド隊でのバイトを始めていた。ヴィーナスに頼み、メイド体験をさせて貰うことになったのだ。"
translation = "마토이는 최근 쿠죠 가문 메이드대에서 아르바이트를 시작했다. 비너스에게 부탁해 메이드 체험을 해보게 된 것이다."

[[dialogue]]
speaker = "unk"
original = "その指導を受け持つことになったのが――"
translation = "그 지도를 맡게 된 것이――"

[[dialogue]]
speaker = "蘭美"
original = "「なるほど。色々なことに挑戦してみたい、ね」"
translation = "「과연. 여러 가지 일에 도전해보고 싶다, 이거지」"

[[dialogue]]
speaker = "unk"
original = "新星学園の飛び級３年生にして、九浄家メイド隊を率いる最年少メイド長、<ruby>羽宮<rt>はねみや</rt></ruby><ruby>蘭美<rt>らび</rt></ruby>。"
translation = "신성학원의 월반 3학년이자 쿠죠 가문 메이드대를 이끄는 최연소 메이드장, 하네미야 라비."

[[dialogue]]
speaker = "マトイ"
original = "「はい。以前マムに、私は全部に適正があるって言われて。何が新フォーム覚醒のきっかけになるか分からないし、メイドの仕事にも挑戦してみたいと思って」"
translation = "「네. 이전에 맘에게 저는 모든 것에 적성이 있다는 말을 들어서요. 무엇이 새로운 폼 각성의 계기가 될지 모르고, 메이드 일에도 도전해보고 싶다고 생각했어요」"

[[dialogue]]
speaker = "蘭美"
original = "「事情は分かったわ。だけど、私が指導する以上、手を抜いたりなんてしないわよ？\u3000それでもちゃんと付いて来られるのかしら？」"
translation = "「사정은 알겠어. 하지만 내가 지도하는 이상 대충 하거나 하지는 않을 거야? 그런데도 제대로 따라올 수 있을까?」"

[[dialogue]]
speaker = "マトイ"
original = "「もちろんです！\u3000蘭美先輩、ご指導よろしくお願いします！」"
translation = "「물론입니다! 라비 선배, 지도 잘 부탁드립니다!」"

[[dialogue]]
speaker = "unk"
original = "バイトの研修が始まり、まずはひと通り、基礎的なメイドの仕事を叩きこまれることになった。"
translation = "아르바이트 연수가 시작되어 우선은 한차례 기초적인 메이드 업무를 주입받게 되었다."

[[dialogue]]
speaker = "マトイ"
original = "「――よし、ここは綺麗になったかな。次は、えっと……」"
translation = "「――좋아, 여기는 깨끗해졌나. 다음은, 저기……」"

[[dialogue]]
speaker = "蘭美"
original = "（ふむ、掃除の手際もそれなりね）"
translation = "（흠, 청소 솜씨도 그럭저럭이네）"

[[dialogue]]
speaker = "蘭美"
original = "（まあ、メイドとしての才能があるかどうかいえば『普通』といったところかしら）"
translation = "（뭐, 메이드로서의 재능이 있는지 없는지 말하자면 『평범』한 수준일까）"

[[dialogue]]
speaker = "マトイ"
original = "「蘭美先輩、指示された場所の掃除、終わりました！\u3000チェックお願いします」"
translation = "「라비 선배, 지시하신 곳의 청소 끝났습니다! 체크 부탁드려요」"

[[dialogue]]
speaker = "蘭美"
original = "「――うん。見逃しはなさそうね。次の指導に移るわよ！」"
translation = "「――응. 놓친 곳은 없는 것 같네. 다음 지도로 넘어갈게!」"

[[dialogue]]
speaker = "unk"
original = "それから、マトイがメイドのバイトを始めて１ヶ月が経過──"
translation = "그로부터, 마토이가 메이드 아르바이트를 시작하고 1개월이 경과──"

[[dialogue]]
speaker = "蘭美"
original = "「私の指導に、普通について来ている……」"
translation = "「나의 지도에, 평범하게 따라오고 있어……」"

[[dialogue]]
speaker = "マトイ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "蘭美"
original = "「マトイ。あなた、メイドの才能があるわよ！」"
translation = "「마토이. 당신, 메이드 소질이 있어!」"

[[dialogue]]
speaker = "蘭美"
original = "「地味だから気づきにくいけれど……得意不得意がなく、教えたことがどれだけ難しいことでも、全て着実に覚えて行く」"
translation = "「수수해서 눈에 띄기 어렵지만…… 잘하고 못하는 것 없이, 가르친 것이 아무리 어려운 것이라도 전부 착실하게 익혀 나가」"

[[dialogue]]
speaker = "マトイ"
original = "「蘭美先輩の教え方が上手いからですよ」"
translation = "「라비 선배가 잘 가르쳐 주셔서 그래요」"

[[dialogue]]
speaker = "マトイ"
original = "「やっぱり、小さい時から訓練を積んでる天才メイド長は普通じゃないですね！」"
translation = "「역시, 어릴 때부터 훈련을 쌓은 천재 메이드장은 평범하지 않네요!」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふん♪\u3000それはそうよ！\u3000なんせ私は小さい時から、最速でナンバー１メイドになることを目指して――」"
translation = "「후훙♪ 그야 당연하지! 자고로 나는 어릴 때부터, 최속으로 넘버 1 메이드가 되는 것을 목표로──」"

[[dialogue]]
speaker = "蘭美"
original = "「って、誰の胸が今も小さいままですって！？」"
translation = "「어라, 누구 가슴이 지금도 작은 그대로라는 거야!?」"

[[dialogue]]
speaker = "マトイ"
original = "「いや、誰も言ってないですよ！？」"
translation = "「아니, 아무도 말 안 했는데요!?」"

[[dialogue]]
speaker = "蘭美"
original = "「そうよね♪\u3000私は小さくても、世界一可愛くて天才な美少女メイド長だもの！！」"
translation = "「그렇지♪ 나는 작아도, 세계에서 제일 귀엽고 천재인 미소녀 메이드장이니까!!」"

[[dialogue]]
speaker = "マトイ"
original = "「す、すごい……！\u3000個性付けっていうのは、コンプレックスすら武器になるんだ！」"
translation = "「우, 와……! 개성 부여라는 건, 콤플렉스조차 무기가 되는구나!」"

[[dialogue]]
speaker = "蘭美"
original = "「って、どこに感心してるのよ！？\u3000そうじゃなくて！」"
translation = "「거기서 감탄하는 거야!? 그게 아니라!」"

[[dialogue]]
speaker = "蘭美"
original = "「この私が褒めてるんだから、ちゃんと光栄に思って聞きなさい！」"
translation = "「이 몸이 칭찬하고 있으니까, 제대로 영광으로 생각하고 들으렴!」"

[[dialogue]]
speaker = "蘭美"
original = "「あなたは確かに、一般に言われるような天才ではないわ。でも、努力を重ねることで『多方面に強い秀才』になれるの！」"
translation = "「당신은 확실히, 일반적으로 말하는 천재는 아니야. 하지만, 노력을 거듭함으로써 『다방면에 강한 수재』가 될 수 있어!」"

[[dialogue]]
speaker = "蘭美"
original = "「マトイ、あなたバイトじゃなくて、このまま九浄家メイド隊に正式入隊する気はない？」"
translation = "「마토이, 당신 아르바이트가 아니라, 이대로 쿠죠가 메이드대에 정식 입대할 생각 없어?」"

[[dialogue]]
speaker = "マトイ"
original = "「え？\u3000私がですか……？」"
translation = "「에? 제가요……?」"

[[dialogue]]
speaker = "マトイ"
original = "「う～ん……蘭美先輩に認めてもらえるのはすごく光栄なんですけど、今はまだ色々なことに挑戦してみたいっていうか……」"
translation = "「으~음…… 라비 선배에게 인정받는 건 정말 영광이지만, 지금은 아직 여러 가지 일에 도전해 보고 싶달까……」"

[[dialogue]]
speaker = "蘭美"
original = "「なら、こうしましょう――時間がある時でいいから、これからもバイトしに来なさい！」"
translation = "「그럼, 이렇게 하죠── 시간이 날 때라도 좋으니까, 앞으로도 아르바이트하러 오렴!」"

[[dialogue]]
speaker = "蘭美"
original = "「私が引き続き、世界に通用するメイドスキルをあなたに叩き込んであげるわ！」"
translation = "「내가 계속해서, 세계에 통용되는 메이드 기술을 당신에게 주입해 줄게!」"

[[dialogue]]
speaker = "蘭美"
original = "「メイドスキルは将来、あなたが会長と結婚することになった時、必ず役に立つわよ？\u3000家事万能の奥さん、男なら喜ばないわけがないわ！」"
translation = "「메이드 기술은 장래에, 당신이 회장과 결혼하게 되었을 때 반드시 도움이 될 거야. 가사 만능인 아내를, 남자라면 기뻐하지 않을 리가 없지!」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、それは確かに……！」"
translation = "「그, 그건 확실히……!」"

[[dialogue]]
speaker = "蘭美"
original = "「それに……恋人としてもご奉仕をしてあげれば、会長のハートはイチコロよ♪」"
translation = "「게다가…… 연인으로서 봉사를 해 준다면, 회장의 하트는 한 방이야♪」"

[[dialogue]]
speaker = "マトイ"
original = "「えぇっ！？\u3000ご、ご奉仕って……それはちょっと恥ずかしいっていうか……」"
translation = "「에엣!? 보, 봉사라니…… 그건 좀 부끄럽달까……」"

[[dialogue]]
speaker = "蘭美"
original = "「恋人同士なら、それくらい普通よ！！」"
translation = "「연인 사이라면, 그 정도는 보통이야!!」"

[[dialogue]]
speaker = "マトイ"
original = "「お、お帰りなさいませ～、ご主人様♪」"
translation = "「다, 다녀오셨어요~, 주인님♪」"

[[dialogue]]
speaker = "unk"
original = "ま、マトイ？\u3000一体どうしたんだ？"
translation = "마, 마토이? 대체 어떻게 된 거야?"

[[dialogue]]
speaker = "unk"
original = "俺が星徒会室に入ると、マトイがメイドのように出迎えてくれた。"
translation = "내가 성도회실에 들어가자, 마토이가 메이드처럼 마중 나와 주었다."

[[dialogue]]
speaker = "マトイ"
original = "「緑茶と和菓子を用意したので、どうぞ……♪」"
translation = "「녹차와 화과자를 준비했으니, 드세요……♪」"

[[dialogue]]
speaker = "unk"
original = "会長席に座ると、マトイが和菓子を楊枝で持ち上げ、口に運んでくれて――"
translation = "회장석에 앉자, 마토이가 화과자를 양치개로 들어 올려, 입으로 옮겨 주었고──"

[[dialogue]]
speaker = "マトイ"
original = "「はい、あ……あ～ん<emoji=heart04>」"
translation = "「자, 아…… 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ど、どう？\u3000手作りの和菓子なんだけど、美味しい？」"
translation = "「어, 어때? 직접 만든 화과자인데, 맛있어?」"

[[dialogue]]
speaker = "unk"
original = "うまいっ！\u3000あと、嬉しい！！"
translation = "맛있다! 그리고, 기뻐!!"

[[dialogue]]
speaker = "マトイ"
original = "「よかった～……えへへ<emoji=heart04>\u3000蘭美先輩から、こうしたら会長も喜ぶはずだって……」"
translation = "「다행이다~…… 에헤헤<emoji=heart04> 라비 선배가, 이렇게 하면 회장도 기뻐할 거라고……」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふふ、ご奉仕作戦、大成功ね！\u3000マトイ」"
translation = "「후후후, 봉사 작전, 대성공이네! 마토이」"

[[dialogue]]
speaker = "unk"
original = "星徒会室の階段の影から、蘭美が姿を現す。"
translation = "성도회실 계단 그림자에서, 라비가 모습을 드러낸다."

[[dialogue]]
speaker = "マトイ"
original = "「はい♪\u3000メイドに挑戦してみて、よかったです！」"
translation = "「네♪ 메이드에 도전해 보길 잘했어요!」"

[[dialogue]]
speaker = "マトイ"
original = "「あと会長。これから私……なんでも普通にこなせる彼女を目指すから！」"
translation = "「그리고 회장. 앞으로 나…… 뭐든지 평범하게 해내는 여자친구가 될 거니까!」"

[[dialogue]]
speaker = "unk"
original = "ん？\u3000どういうこと？"
translation = "응? 무슨 소리야?"

[[dialogue]]
speaker = "マトイ"
original = "「ほら、メイドってご主人様の為にご奉仕するものでしょ？\u3000だから――」"
translation = "「봐봐, 메이드란 주인님을 위해 봉사하는 거잖아? 그러니까──」"

[[dialogue]]
speaker = "マトイ"
original = "「会長が攻めだとしても受けだとしても、私、どっちも普通にこなしてみせるから！」"
translation = "「회장이 공이든 수든, 나, 어느 쪽이든 평범하게 해내 보일 테니까!」"

[[dialogue]]
speaker = "unk"
original = "突然何を言ってんの！？"
translation = "갑자기 무슨 말을 하는 거야!?"

[[dialogue]]
speaker = "蘭美"
original = "「……そ、その考えはちょっと普通じゃないわね」"
translation = "「……그, 그 생각은 좀 평범하지 않네」"

[[dialogue]]
speaker = "マトイ"
original = "「あれぇ！？\u3000なんで！？」"
translation = "「어라!? 왜!?」"

[[dialogue]]
speaker = "unk"
original = "世界ナンバー２のメイドも思わず何とも言えない顔を浮かべる、マトイの発言なのであった――"
translation = "세계 넘버 2 메이드도 저절로 뭐라 말할 수 없는 표정을 짓게 만드는, 마토이의 발언이었다──"

