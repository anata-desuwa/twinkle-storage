[[dialogue]]
speaker = "unk"
original = "第１０話,女帝・煌嶺,B"
translation = "제10화, 여제·코레이, B"

[[dialogue]]
speaker = "クロト"
original = "「煌嶺──！？\u3000君があの……！？」"
translation = "「코레이──!? 네가 그……!?」"

[[dialogue]]
speaker = "unk"
original = "さっきまでの彼女は歳相応……それどころか、ところどころ幼さが垣間見える女の子に見えた。"
translation = "방금 전까지의 그녀는 나이에 걸맞은…… 아니, 오히려 곳곳에서 어린 모습이 엿보이는 소녀로 보였다."

[[dialogue]]
speaker = "unk"
original = "だが今目の前にいる彼女は、見知らぬ者でも思わずひれ伏すような威圧感を放っており、皇帝という名乗りが嘘ではないのだと理解させられる。"
translation = "하지만 지금 눈앞에 있는 그녀는, 모르는 자라도 무심코 엎드릴 법한 위압감을 내뿜고 있어, 황제라는 자칭이 거짓이 아님을 이해하게 만든다."

[[dialogue]]
speaker = "煌嶺"
original = "「遠い親戚といったであろう。３０００年の時を超え、自身の末裔と対面した気分はどうだ？\u3000魔王ラクシス」"
translation = "「먼 친척이라 하지 않았느냐. 3000년의 시간을 넘어 자신의 후예와 대면한 기분은 어떠냐? 마왕 락시스.」"

[[dialogue]]
speaker = "クロト"
original = "「そこまで知っているのか。──で、魔王の俺に用なのか？」"
translation = "「그것까지 알고 있는 건가. ──그래서, 마왕인 나에게 용건이라도?」"

[[dialogue]]
speaker = "煌嶺"
original = "「なぁに、遊行の最中に偶然出くわしただけだ」"
translation = "「무어냐, 유람하던 중에 우연히 마주쳤을 뿐이니라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「だがちょうどいい。貴様に問うておこう。デネブを滅ぼす気があるのか──な」"
translation = "「하지만 마침 잘 되었구나. 귀공에게 물어두마. 데네브를 멸망시킬 생각이 있느냐──고 말이다.」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "宝石のような瞳が、冷たい視線を俺に向ける。"
translation = "보석 같은 눈동자가 차가운 시선을 나에게 향한다."

[[dialogue]]
speaker = "unk"
original = "心臓を突くように鋭い──けれどその心を魅了する、蠱惑的な眼差しだ。"
translation = "심장을 찌르듯 날카롭지만── 그 마음을 매료시키는 고혹적인 눈빛이다."

[[dialogue]]
speaker = "煌嶺"
original = "「まさか魔王ともあろう者が、デネブと戦うことに臆しているのではあるまいな？」"
translation = "「설마 마왕이라는 자가 데네브와 싸우는 것을 겁내고 있는 것은 아니겠지?」"

[[dialogue]]
speaker = "煌嶺"
original = "「妾はデネブを滅ぼすことも<ruby>厭<rt>いと</rt></ruby>わん。<ruby>彼奴<rt>きゃつ</rt></ruby>らがしかけてきた戦だ。受けて立って何が悪い？」"
translation = "「소첩은 데네브를 멸망시키는 것도 마다하지 않느니라. 그놈들이 걸어온 싸움이다. 받아주는 것이 무엇이 나쁘냐?」"

[[dialogue]]
speaker = "クロト"
original = "「デネブの自分自身と殺し合うことになっても？」"
translation = "「데네브의 자기 자신과 서로 죽이게 되더라도?」"

[[dialogue]]
speaker = "煌嶺"
original = "「ならばなおのことだ。煌嶺の名は受け継ぐものとはいえ、現世に煌嶺は２人もいらぬ」"
translation = "「그렇다면 더더욱 그렇다. 코레이라는 이름은 이어받는 것이라 해도, 현세에 코레이는 두 명이나 필요 없느니라.」"

[[dialogue]]
speaker = "unk"
original = "この戦いが生存競争であるというなら、彼女の言うことも間違いではない。"
translation = "이 싸움이 생존 경쟁이라면 그녀의 말도 틀린 것은 아니다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "クロト"
original = "「俺はあなたとは違う」"
translation = "「나는 당신과는 달라.」"

[[dialogue]]
speaker = "クロト"
original = "「俺は守るために星騎士になった。だから全て救う。アルタイルも、デネブも」"
translation = "「나는 지키기 위해 성기사가 됐어. 그러니까 전부 구할 거야. 알타이르도, 데네브도.」"

[[dialogue]]
speaker = "煌嶺"
original = "「それができぬから戦いになるのだろう？\u3000戦えぬというなら、それができる会長に代わるべきではないか？」"
translation = "「그것을 못 하니까 싸움이 되는 것 아니냐? 싸우지 못하겠다면, 그것을 할 수 있는 회장으로 교체되어야 마땅하지 않겠느냐?」"

[[dialogue]]
speaker = "クロト"
original = "「星騎士の責務は命を守ることだ。それは譲れない」"
translation = "「성기사의 책무는 생명을 지키는 거야. 그것만은 양보 못 해.」"

[[dialogue]]
speaker = "煌嶺"
original = "「綺麗事を言うものだな。妾が学園長になったら、まずは星徒会長を挿げ替えてやろう」"
translation = "「허울 좋은 소리를 하는구나. 소첩이 학원장이 되면 우선 성도회장부터 갈아치워 주마.」"

[[dialogue]]
speaker = "クロト"
original = "「できるならそうすればいい。後のことはヘレナちゃんとシノさんに任せてる」"
translation = "「할 수 있다면 그렇게 해봐. 뒷일은 헬레나짱이랑 시노 씨에게 맡겨뒀으니까.」"

[[dialogue]]
speaker = "煌嶺"
original = "「シノ……？\u3000それが九浄ヘレナが連れてきた学園長候補か。次の理事会で見えるのを楽しみにしておくとしよう」"
translation = "「시노……? 그것이 쿠죠 헬레나가 데려온 학원장 후보인가. 다음 이사회에서 보는 것을 기대하고 있으마.」"

[[dialogue]]
speaker = "煌嶺"
original = "「──ああそうだ、ついでに言伝を頼もうか。メイプルめに伝えておくことがあってな」"
translation = "「──아아, 그렇지. 하는 김에 전언을 부탁할까. 메이플 녀석에게 전할 말이 있어서 말이다.」"

[[dialogue]]
speaker = "クロト"
original = "「メイプルに？」"
translation = "「메이플에게?」"

[[dialogue]]
speaker = "unk"
original = "メイプルは煌嶺の治めるキュリオスを勝手に出てきた身だ。"
translation = "메이플은 코레이가 다스리는 큐리오스를 마음대로 빠져나온 몸이다."

[[dialogue]]
speaker = "unk"
original = "彼女を強制的に連れ戻す、あるいは罰するつもりではないかと警戒を強める。"
translation = "그녀를 강제로 데려가거나, 혹은 벌할 생각이 아닌가 싶어 경계심을 늦추지 않는다."

[[dialogue]]
speaker = "煌嶺"
original = "「魔王になるというやつの言葉を笑ったが、まさか流星市国に密航するとは思わなかった。妾が先を越されるとはな」"
translation = "「마왕이 되겠다는 녀석의 말을 비웃었지만, 설마 유성시국으로 밀항할 줄은 몰랐느니라. 소첩이 선수를 빼앗길 줄이야.」"

[[dialogue]]
speaker = "煌嶺"
original = "「分不相応で滑稽な野望には変わりないが、その覚悟は舐めていた。いささか見直したぞ」"
translation = "「분수에 맞지 않는 우스꽝스러운 야망인 것은 변함없으나, 그 각오는 얕보고 있었구나. 조금은 다시 보았느니라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「妾はやつを追わぬ。好きに生きよと伝えろ」"
translation = "「소첩은 녀석을 쫓지 않겠다. 마음대로 살라고 전해라.」"

[[dialogue]]
speaker = "クロト"
original = "「意外だな。暴君で有名な煌嶺なら、メイプルを処罰するのかと思ったけど」"
translation = "「의외네. 폭군으로 유명한 코레이라면 메이플을 처벌할 줄 알았는데.」"

[[dialogue]]
speaker = "煌嶺"
original = "「ああ、責めはあやつの両親に負わせたのでな」"
translation = "「아아, 죄는 그 녀석의 부모에게 묻기로 했으니까.」"

[[dialogue]]
speaker = "クロト"
original = "「何……？」"
translation = "「뭐……?」"

[[dialogue]]
speaker = "煌嶺"
original = "「メイプルはキュリオスの秘宝たるアルケインコードを持ち出した。あれは強大な兵器になりうるもの」"
translation = "「메이플은 큐리오스의 비보인 아르케인 코드를 훔쳐 달아났다. 그것은 강력한 병기가 될 수 있는 물건.」"

[[dialogue]]
speaker = "煌嶺"
original = "「我がキュリオスを脅かすこともありうるのだ。極刑は当然であろう？」"
translation = "「우리 큐리오스를 위협할 수도 있는 일이다. 극형은 당연하지 않겠느냐?」"

[[dialogue]]
speaker = "煌嶺"
original = "「だがメイプルの親が、泣きながら地面に頭を擦り付けて、許してくれと詫びるものでな。代わりに両親を処すことにしたのだ」"
translation = "「하지만 메이플의 부모가 울면서 바닥에 머리를 비비며 용서해달라고 빌더구나. 대신 부모를 처단하기로 했느니라.」"

[[dialogue]]
speaker = "煌嶺"
original = "「確かあれは……メイプルがキュリオスを出ていったばかりの頃だったか。２人仲良く魔獣の群れに喰わせてやった」"
translation = "「분명 그때가…… 메이플이 큐리오스를 나간 지 얼마 안 됐을 때였나. 둘이 사이좋게 마수의 무리에게 먹이로 던져주었지.」"

[[dialogue]]
speaker = "煌嶺"
original = "「生きたまま牙を突き立てられ、臓腑を貪られ、苦悶の声を上げる様は、なかなか愉快であったぞ」"
translation = "「산 채로 송곳니에 박히고, 내장이 파헤쳐지며, 고통스러운 비명을 지르는 모습은 꽤 즐거웠느니라.」"

[[dialogue]]
speaker = "クロト"
original = "「な──！！」"
translation = "「뭐──!!」"

[[dialogue]]
speaker = "unk"
original = "瞬間、血が沸くように熱くなる。"
translation = "순간 피가 끓는 것처럼 뜨거워진다."

[[dialogue]]
speaker = "unk"
original = "あまりに無惨な行為と、それを平然と言ってのける冷徹さに、怒りを覚えずにはいられない。"
translation = "너무나 처참한 행위와 그것을 태연하게 말하는 냉혹함에 분노를 느끼지 않을 수 없다."

[[dialogue]]
speaker = "メイプル"
original = "「あっ、お兄ちゃ～ん！\u3000ママから桃まん届いたから、一緒に食べよー！」"
translation = "「앗, 오빠~! 엄마가 복숭아 만두 보내줘서 같이 먹자고 왔어─!」"

[[dialogue]]
speaker = "クロト"
original = "「え？\u3000メイプルのママから……？」"
translation = "「어? 메이플의 엄마가……?」"

[[dialogue]]
speaker = "unk"
original = "メイプルの両親は死んだはずじゃ……？"
translation = "메이플의 부모님은 죽었을 텐데……?"

[[dialogue]]
speaker = "unk"
original = "桃まんは生前作ったもの……？\u3000いやでも、メイプルが出ていった直後に処刑したと言っていて……？"
translation = "복숭아 만두는 생전에 만든 건가……? 아니, 하지만 메이플이 나간 직후에 처형했다고 말했고……?"

[[dialogue]]
speaker = "メイプル"
original = "「──こ、煌嶺様！？\u3000どうして煌嶺様がここにっ！？」"
translation = "「──코, 코레이 님!? 어째서 코레이 님이 여기에!?」"

[[dialogue]]
speaker = "煌嶺"
original = "「クッ……クク…………アッハッハッハ！」"
translation = "「큭…… 크크………… 앗하하하하!」"

[[dialogue]]
speaker = "煌嶺"
original = "「あはは、引っかかった引っかかった～♪\u3000魔王さんってば、わけがわからないって顔してる～♪」"
translation = "「아하하, 속았다 속았어~♪ 마왕님도 참, 영문을 모르겠다는 얼굴을 하고 있네~♪」"

[[dialogue]]
speaker = "クロト"
original = "「引っかかった……？\u3000じゃあさっきのは……」"
translation = "「속았다고……? 그럼 방금 그건……」"

[[dialogue]]
speaker = "煌嶺"
original = "「ウソウソ。処刑とかしてないよ。メイプルちゃん<ruby>家<rt>ち</rt></ruby>の桃まんは絶品だからね」"
translation = "「거짓말이야. 처형 같은 거 안 해. 메이플짱 네 복숭아 만두는 일품이니까 말이야.」"

[[dialogue]]
speaker = "煌嶺"
original = "「メイプルちゃん、久しぶり～！\u3000元気してた？」"
translation = "「메이플짱, 오랜만이야~! 잘 지냈어?」"

[[dialogue]]
speaker = "メイプル"
original = "「えっ……あ、はい……元気、ですけど……」"
translation = "「엣…… 아, 네…… 잘 지내긴, 합니다만……」"

[[dialogue]]
speaker = "煌嶺"
original = "「こっちで星騎士として頑張ってるって聞いたよ～？\u3000メイプルちゃんのこと応援はしてないけど、キュリオスの魔族として情けないところ見せちゃダメだからね？」"
translation = "「이쪽에서 성기사로서 열심히 하고 있다고 들었어~? 메이플짱을 응원하는 건 아니지만, 큐리오스의 마족으로서 한심한 모습 보여주면 안 된다?」"

[[dialogue]]
speaker = "煌嶺"
original = "「あ、さっき肉まん食べそびれたし、桃まんはもらうよ。じゃ～ね～♪」"
translation = "「아, 아까 고기 만두 못 먹었으니까 복숭아 만두는 내가 가져갈게. 그럼 안녕~♪」"

[[dialogue]]
speaker = "unk"
original = "煌嶺はメイプルから桃まんをひょいと取り上げると、笑顔で手を振りながら去っていく。"
translation = "코레이는 메이플에게서 복숭아 만두를 휙 낚아채더니, 웃으며 손을 흔들며 떠나간다."

[[dialogue]]
speaker = "メイプル"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "俺とメイプルは、２人して唖然としたまま、煌嶺の姿が見えなくなるのを見届けた。"
translation = "나와 메이플은 둘이서 멍하니 서 있는 채로 코레이의 모습이 보이지 않게 될 때까지 지켜보았다."

[[dialogue]]
speaker = "メイプル"
original = "「あ～～っ！？\u3000桃まん取られた～～っ！？」"
translation = "「아~~!? 복숭아 만두 뺏겼어~~!?」"

[[dialogue]]
speaker = "クロト"
original = "「……鮮やかな手口だった」"
translation = "「……눈부신 솜씨였어.」"

[[dialogue]]
speaker = "unk"
original = "あまりに自然に持っていったものだから、反応するのが遅れてしまった。"
translation = "너무나 자연스럽게 가져가 버린 탓에 반응하는 것이 늦어버렸다."

[[dialogue]]
speaker = "クロト"
original = "「あれが煌嶺……なんだな」"
translation = "「저게 코레이……로구나.」"

[[dialogue]]
speaker = "メイプル"
original = "「うん。久々に会ったけど、やっぱり嫌なやつだった……」"
translation = "「응. 오랜만에 만났지만 역시 재수 없는 녀석이었어……」"

[[dialogue]]
speaker = "クロト"
original = "「……メイプルはすごいな」"
translation = "「……메이플은 대단하네.」"

[[dialogue]]
speaker = "メイプル"
original = "「え？\u3000何が？」"
translation = "「어? 뭐가?」"

[[dialogue]]
speaker = "unk"
original = "あの煌嶺相手に『魔王になる』とよく言ったのだと、改めてメイプルに感心する。"
translation = "저 코레이를 상대로 『마왕이 되겠다』고 잘도 말했구나 싶어 새삼 메이플에게 감탄한다."

[[dialogue]]
speaker = "クロト"
original = "「ところで……魔界から桃まんって送れるのか？\u3000腐らない？」"
translation = "「그런데…… 마계에서 복숭아 만두를 보낼 수 있는 거야? 안 상해?」"

[[dialogue]]
speaker = "メイプル"
original = "「ああ、それには保存用の星術があってね──」"
translation = "「아아, 거기에는 보존용 성술이 있어서──」"

[[dialogue]]
speaker = "unk"
original = "あれが煌嶺。頽廃都市キュリオスの支配者にして、魔王の力を強く受け継いだ末裔。"
translation = "저것이 코레이. 퇴폐 도시 큐리오스의 지배자이자 마왕의 힘을 강하게 이어받은 후예."

[[dialogue]]
speaker = "unk"
original = "リクリエに与する者ではないが、また厄介な相手が現れたと思わされたのだった。"
