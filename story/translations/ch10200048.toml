[[dialogue]]
speaker = "unk"
original = "とある週末、俺はルルカと秋葉原のコスプレイベントへやって来ていた。"
translation = "어느 주말, 나는 루루카와 아키하바라의 코스프레 이벤트에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "その帰り道――"
translation = "그 귀갓길――"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――クリスマスフォーム、ルカルカのコスプレとしてすごくクオリティーが高いって褒めてもらえて、嬉しかったな～♪」"
translation = "「――크리스마스 폼, 루카루카의 코스프레로서 굉장히 퀄리티가 높다고 칭찬받아서, 기뻤어~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まぁ、実はコスプレじゃなくて、あたしが本家本元なんだけどね。ふふふっ♪」"
translation = "「뭐, 사실 코스프레가 아니라, 내가 본가 본인이지만 말이야. 후후훗♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「さて、とりあえずイベントは終わったし。この後は……もう１つのお楽しみだね！」"
translation = "「자, 일단 이벤트는 끝났고. 이 다음은…… 또 하나의 즐거움이네!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「今日は<ruby>新星寮<rt>ラルーナ</rt></ruby>で友達とお泊まり会するって、お母さんには言ってあるから……」"
translation = "「오늘은 <ruby>신성 기숙사<rt>라루나</rt></ruby>에서 친구랑 파자마 파티 한다고, 엄마한테는 말해 뒀으니까……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「初めてのラブホエッチ……しちゃおっか<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>」"
translation = "「첫 러브호텔 에치…… 해버릴까<emoji=heart04> 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、街のラブホテルに入室した俺とルルカ。"
translation = "그 후, 거리의 러브호텔에 입실한 나와 루루카."

[[dialogue]]
speaker = "unk"
original = "今日は以前にもやったことのある、<b>あのエッチ</b>をまた試す約束になっていた。"
translation = "오늘은 이전에도 한 적이 있는, <b>그</b> <b>에치</b>를 다시 시도하기로 약속되어 있었다."

[[dialogue]]
speaker = "unk"
original = "逸る気持ちを抑えながら、ＤＩＳＣを撮影用に準備してベッドへ向かうのだった──"
translation = "급한 마음을 억누르며, DISC를 촬영용으로 준비하고 침대로 향하는 것이었다──"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、こんな感じでどうかな……？」"
translation = "「오빠, 이런 느낌으로 어때……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごくエッチだ」"
translation = "「굉장히 야해」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もう<emoji=heart04>\u3000言い方がやらしいよ、お兄ちゃんってば……<emoji=heart04>」"
translation = "「정말<emoji=heart04> 말투가 야하다니까, 오빠도 참……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう言うルルカだって、おま○こがもう愛液垂れちゃいそうなくらい濡れてるぞ？」"
translation = "「그렇게 말하는 루루카야말로, 보지가 벌써 애액이 흘러넘칠 정도로 젖어 있잖아?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それは、お兄ちゃんがエッチなキスするからだもん……<emoji=heart04>」"
translation = "「그건, 오빠가 야한 키스를 하니까 그런 거잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だから早く、撮影始めよ……？」"
translation = "「그러니까 빨리, 촬영 시작하자……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった」"
translation = "「알았어」"

[[dialogue]]
speaker = "unk"
original = "撮影とは言っても、本当にエッチなライブ配信をしたりするわけではない。前回と同じで、あくまでもそういうフリだ。"
translation = "촬영이라고는 해도, 정말로 야한 라이브 방송을 하거나 하는 것은 아니다. 전과 마찬가지로, 어디까지나 그런 척이다."

[[dialogue]]
speaker = "unk"
original = "しかし、Ｖチューバーをやっているルルカとそういうシチュエーションでエッチをするのは、いけないことをしている気がして、何度やっても異様に興奮してしまう。"
translation = "하지만, 버튜버를 하고 있는 루루카와 그런 상황에서 에치를 하는 것은, 못된 짓을 하고 있다는 기분이 들어서, 몇 번을 해도 이상하게 흥분되어 버린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よし……じゃあ、始めるぞ。３、２、１――」"
translation = "「좋아…… 그럼, 시작한다. 3, 2, 1――」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「キュー、キュー、キューッと、おはドルフィン<emoji=heart04>\u3000リスナーのお兄ちゃんたち、『汐ルカルカ秘密の裏配信』へようこそ<emoji=heart04>」"
translation = "「큐, 큐, 큐~잇, 오하 돌핀<emoji=heart04> 리스너 오빠들, 『시오 루카루카 비밀의 뒷방송』에 어서 와<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「第１回が『お兄ちゃん』達に大好評だったので……今回、こうして第２回を企画しちゃいました～。いぇ～い<emoji=heart04>\u3000ぴーすぴーす<emoji=heart04>」"
translation = "「제1회가 『오빠』들에게 대호평이었기에…… 이번에, 이렇게 제2회를 기획해 버렸습니다~. 예~이<emoji=heart04> 피스 피스<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「前回に引き続き、竿役とカメラ係はデカおち○ぽな、ルカルカの彼氏さんに協力してもらってます<emoji=heart04>\u3000お兄ちゃん、リスナーのみんなに挨拶して～」"
translation = "「전회에 이어서, 삽입 역할과 카메라 담당은 커다란 자지인, 루루카의 남친분께 협력을 받고 있어요<emoji=heart04> 오빠, 리스너 모두에게 인사해줘~」"

[[dialogue]]
speaker = "unk"
original = "俺は画面に手を移り込ませて、ピースをする。"
translation = "나는 화면에 손을 비추며, 피스를 한다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふっ、ほら見て<emoji=heart04>\u3000今日はこの前のクリスマスに発表した、新衣装でエッチをしちゃいます<emoji=heart04>\u3000ぴーすぴーす<emoji=heart04>」"
translation = "「후후, 이것 봐<emoji=heart04> 오늘은 저번 크리스마스에 발표한, 새 의상으로 섹스를 해버릴게요<emoji=heart04> 피스 피스<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんのおち○ぽも、まだ触ってないのに、もうこんなに大きくなっちゃってます<emoji=heart04>」"
translation = "「오빠의 자지도, 아직 만지지도 않았는데, 벌써 이렇게 커져 버렸어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふっ。相変わらず、見てるだけでおま○こ疼いてきちゃう、たくましいデカおち○ぽ<emoji=heart04>\u3000まずはスリスリして硬さチェックするよ～<emoji=heart04>」"
translation = "「후후. 여전히, 보기만 해도 보지가 욱신거려 버리는, 늠름하고 커다란 자지<emoji=heart04> 우선은 부비부비해서 단단함을 체크할게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んんっ<emoji=heart04>\u3000ふうぅっ……あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もうすっごく固い……<emoji=heart04>\u3000さっきしちゃったばかりなのに……<emoji=heart04>」"
translation = "「응으<emoji=heart04> 후우우…… 앗<emoji=heart04> 안<emoji=heart04> 벌써 엄청 딱딱해……<emoji=heart04> 아까 막 해버렸는데도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「って、あっ……つい言っちゃった<emoji=heart04>\u3000ごめんね、画面の向こうのお兄ちゃんたち……<emoji=heart04>\u3000実は……配信始まる前に、我慢できなくてもうエッチしちゃってるの<emoji=heart04>」"
translation = "「앗…… 나도 모르게 말해버렸다<emoji=heart04> 미안해, 화면 너머의 오빠들……<emoji=heart04> 사실은…… 방송 시작하기 전에, 참지 못하고 벌써 섹스해버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おま○こから精液垂れてきたら、したのがバレちゃうから、イボイボのゴムありで<emoji=heart04>」"
translation = "「보지에서 정액이 흘러나오면, 한 거 들켜버리니까, 오돌토돌한 콘돔 끼고서<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやら今回はそういう設定らしい。まだ今日はこれが１回目なのだが、ルルカの妄想は微妙に退廃的だ。意外とそういうのが好きなのだろうか……？"
translation = "아무래도 이번에는 그런 설정인 모양이다. 아직 오늘은 이게 첫 번째인데, 루루카의 망상은 미묘하게 퇴폐적이다. 의외로 그런 걸 좋아하는 걸까……?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ほら、そこに証拠があるよ～<emoji=heart04>\u3000みんなには見えないかな？」"
translation = "「자, 거기에 증거가 있어~<emoji=heart04> 모두에게는 안 보이려나?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんの精液でぱんぱんのゴムが……ひとーつ、ふたーつ、みっつー……あっ、しまった<emoji=heart04>\u3000ゴムが複数個あったら、１回じゃないってバレちゃうね<emoji=heart04>」"
translation = "「오빠의 정액으로 빵빵해진 콘돔이…… 하나아, 두울, 세엣…… 앗, 큰일이다<emoji=heart04> 콘돔이 여러 개 있으면, 한 번이 아니라는 거 들켜버리겠네<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「１回だけのつもりだったんだけど、お兄ちゃん、すっごく絶倫だから、なかなかおさまってくれなくて……<emoji=heart04>」"
translation = "「한 번만 하려고 했는데, 오빠, 정말 절륜해서, 좀처럼 가라앉아 주질 않아서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「結局、用意したゴム、一箱全部使っちゃいました<emoji=heart04>\u3000もう<emoji=heart04>\u3000これから配信だったのに……本当にエッチな彼氏さんなんだから<emoji=heart04>\u3000はあぁぁ<emoji=heart04>」"
translation = "「결국, 준비한 콘돔, 한 상자 전부 다 써버렸어요<emoji=heart04> 정말이지<emoji=heart04> 이제부터 방송이었는데…… 정말 변태 같은 남자친구라니까<emoji=heart04> 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分で言いながら、ゴムを１箱使い切るほどの絶倫エッチを想像しているのか、ルルカの吐息は興奮の度合いを増していく。"
translation = "자기 입으로 말하면서, 콘돔을 한 상자 다 써버릴 정도의 절륜한 섹스를 상상하고 있는 건지, 루루카의 숨결은 흥분의 정도를 더해간다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「今日は危ない日なのに……このままじゃ、ルカルカの孕ませ生配信になっちゃうよ？\u3000んっ……ふうぅ<emoji=heart04>」"
translation = "「오늘은 위험한 날인데…… 이대로라면, 루카루카의 임신시키기 생방송이 되어버릴 거야? 응…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "もちろん、前々から約束してラブホに来ている以上、『危ない日』では決してないはずだ。"
translation = "물론, 전부터 약속하고 러브호텔에 온 이상, 『위험한 날』일 리는 결코 없을 터였다."

[[dialogue]]
speaker = "unk"
original = "だが、そういう設定ですると思ったら、俺も一気に興奮してきてしまう。"
translation = "하지만, 그런 설정으로 한다고 생각하니, 나도 단번에 흥분해버리고 만다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ<emoji=heart04>\u3000ふふっ、すごぉいっ<emoji=heart04>\u3000お兄ちゃんのおち○ぽ、更に大きくなったぁ……<emoji=heart04>\u3000ルカルカを孕ませるの想像して、興奮しちゃったのかな……？」"
translation = "「앗<emoji=heart04> 후후, 대단해<emoji=heart04> 오빠의 자지, 훨씬 더 커졌어……<emoji=heart04> 루카루카를 임신시키는 걸 상상해서, 흥분해버린 걸까……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「こんなにすごいデカおち○ぽ見せつけられたら、ルカルカの子宮までキュンキュン疼いて……はぁぁ<emoji=heart04>\u3000早く入れて欲しくて、愛液溢れてきちゃう<emoji=heart04>」"
translation = "「이렇게 대단하고 거대한 자지를 보여주니까, 루카루카의 자궁까지 큥큥거리며 쑤셔서…… 하아아<emoji=heart04> 빨리 넣어줬으면 해서, 애액이 넘쳐흘러 버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「画面の向こうのお兄ちゃんたちも、ズボン下ろして待っているだろうし<emoji=heart04>\u3000デカおち○ぽ、ルカルカの愛液でヌルヌルにして、準備するね<emoji=heart04>」"
translation = "「화면 너머의 오빠들도, 바지를 내리고 기다리고 있을 테고<emoji=heart04> 거대 자지, 루카루카의 애액으로 미끌미끌하게 해서, 준비할게<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ<emoji=heart04>\u3000あっ……あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000おち○ぽ、ギンギンに固くて熱い<emoji=heart04>\u3000極太のカリがクリちゃんに擦れて……ふあぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 앗…… 안<emoji=heart04> 하아앗<emoji=heart04> 자지, 빳빳하게 딱딱하고 뜨거워<emoji=heart04> 엄청 굵은 귀두가 클리짱에 스쳐서…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカはヘコヘコと卑猥に腰を振りながら、ペニスにおま○こを擦りつけて素股を施していく。"
translation = "루루카는 헉헉대며 비외하게 허리를 흔들면서, 페니스에 보지를 문지르며 스마타를 해 나간다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「気持ちいいよぉ、お兄ちゃん<emoji=heart04>\u3000これだけでルカルカ、イっちゃいそう……！\u3000んっ<emoji=heart04>\u3000はあぁっ……んうぅっ<emoji=heart04>」"
translation = "「기분 좋아아, 오빠<emoji=heart04> 이것만으로 루카루카, 가버릴 것 같아……! 응<emoji=heart04> 하아앗…… 응우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ね、ねぇ、お兄ちゃん……愛液どぷどぷ溢れて、もうおち○ぽヌルヌルになってるから、挿れても大丈夫だよね？」"
translation = "「저, 저기, 오빠…… 애액이 듬뿍 넘쳐서, 벌써 자지가 미끌미끌해졌으니까, 삽입해도 괜찮지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ルカルカ我慢できなくなっちゃったから……もう、挿れちゃうね<emoji=heart04>\u3000んっ……ふうぅぅ<emoji=heart04>\u3000いいよね？\u3000挿れちゃうよ？」"
translation = "「루카루카 참을 수 없게 되어버렸으니까…… 이제, 넣어버릴게<emoji=heart04> 응…… 후우우우<emoji=heart04> 괜찮지? 넣어버린다?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「じゃあ、画面の向こうのお兄ちゃんたちも、お待たせぇ<emoji=heart04>\u3000ルカルカの孕ませ生配信、いよいよ本番始めちゃうよぉ<emoji=heart04>」"
translation = "「자, 화면 너머의 오빠들도, 오래 기다렸지<emoji=heart04> 루카루카의 임신시키기 생방송, 드디어 본편 시작할게에<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「じゃあ……んんっ<emoji=heart04>\u3000お兄ちゃんのデカおち○ぽ――」"
translation = "「그럼…… 응응<emoji=heart04> 오빠의 커다란 자지――」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「頂きまぁーす<emoji=heart04>\u3000んっ――<emoji=heart04><emoji=heart04>」"
translation = "「잘 먹겠습니다아<emoji=heart04> 응――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ――<emoji=heart04>\u3000ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000生おち○ぽ、中に入って来たあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04> 후아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 생자지, 안에 들어왔어어어어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はああぁぁっ<emoji=heart04><emoji=heart04>\u3000ルカルカのちっちゃい割れ目をかき分けて、極太おち○ぽがぬぷぷぷぷぅ～～<emoji=heart04>\u3000って一気に奥まで来て……はぁぁっ<emoji=heart04>\u3000ちょっと、イっちゃったぁ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04><emoji=heart04> 루카루카의 조그만 갈라진 틈을 헤치고, 왕자지가 눅진눅진하게에~~<emoji=heart04> 하며 단숨에 안쪽까지 와서…… 하앗<emoji=heart04> 조금, 가버렸어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカの膣はぴくぴくと痙攣して「イっちゃった」のが本当であると教えてくれる。まだ挿入しただけなのに、おま○この中は期待と興奮だけでヌルヌルになっていた。"
translation = "루루카의 질은 파르르 경련하며 「가버렸다」는 것이 사실임을 알려준다. 아직 삽입했을 뿐인데, 보지 안은 기대와 흥분만으로 미끌미끌해져 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ……ふうぅ<emoji=heart04>\u3000お兄ちゃんの、おっき～ぃ<emoji=heart04>\u3000ルカルカのサイズに合ってないのに、何度もオフパコしたから、おま○こすっかりメロメロになっちゃてるよぉ<emoji=heart04>」"
translation = "「응…… 후우우<emoji=heart04> 오빠 거, 커어어어<emoji=heart04> 루카루카의 사이즈에 맞지 않는데도, 몇 번이나 오프파코 했으니까, 보지가 완전히 헤롱헤롱해져 버렸어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「中に入って押し広げられてるだけでも、はぁぁぁん<emoji=heart04>\u3000すっごく気持ちいいのぉ<emoji=heart04>\u3000はあぁあっ……ふうぅんっ<emoji=heart04>」"
translation = "「안에 들어와서 벌려지고 있는 것만으로도, 하아아앙<emoji=heart04> 너무 기분 좋아아<emoji=heart04> 하아아앗…… 후우웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「画面の向こうのお兄ちゃんたちもぉ、見えてるかなぁ？\u3000くふぅぅん<emoji=heart04>\u3000ルカルカのおま○こに、デカおち○ぽがずっぽり、入っちゃってるとこ<emoji=heart04>」"
translation = "「화면 너머의 오빠들도오, 보이려나아? 쿠후우웅<emoji=heart04> 루카루카의 보지에, 커다란 자지가 쑥, 들어와 있는 거<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "カメラ目線を崩さず、腰を少し突き出したり、小さく左右に振ってみせたりしながら、動画映りのいいポイントを探すルルカ。しかし、その小さな動きだけで、もうかなり気持ちがいい。"
translation = "카메라 시선을 유지하며, 허리를 살짝 내밀거나, 작게 좌우로 흔들어 보이면서, 영상에 잘 나오는 포인트를 찾는 루루카. 하지만, 그 작은 움직임만으로도, 이미 꽤 기분이 좋다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「動き始めたら余裕、無くなっちゃうからぁ<emoji=heart04>\u3000サムネはここに、しておこうかなぁ？\u3000お兄ちゃ～ん、しっかり撮ってね<emoji=heart04>」"
translation = "「움직이기 시작하면 여유, 없어져 버리니까아<emoji=heart04> 썸네일은 여기로, 해둘까나아? 오빠아~, 잘 찍어줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はい、だぶるぴーす<emoji=heart04>\u3000えへへっ<emoji=heart04>\u3000この配信のこと知らないリスナーさんが見たら、卒倒しちゃいそうだよね<emoji=heart04>\u3000んっ……はあぁぁ<emoji=heart04>」"
translation = "「자, 더블 피스<emoji=heart04> 에헤헤<emoji=heart04> 이 방송 모르는 리스너가 보면, 졸도해 버릴 것 같네<emoji=heart04> 응…… 하아아아」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも、このエッチなルカルカも、ルカルカなのっ<emoji=heart04>\u3000みんなも遠慮せずにエッチな目で見て、気持ち良く抜いてくれたら、嬉しいなぁ<emoji=heart04>\u3000んんん～っ<emoji=heart04>」"
translation = "「하지만, 이 야한 루카루카도, 루카루카인걸<emoji=heart04> 모두도 사양 말고 야한 눈으로 보고, 기분 좋게 빼준다면, 기쁘겠어어<emoji=heart04> 응응응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「じゃあそろそろ、イった余韻も落ち着いてきたし……ルカルカのドスケベ妹穴で、お兄ちゃんのデカおち○ぽ、ぬっぽぬっぽしていくよ～<emoji=heart04>」"
translation = "「그럼 슬슬, 가버린 여운도 진정됐고…… 루카루카의 초음란 여동생 구멍으로, 오빠의 커다란 자지, 퍽퍽 해줄게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はあぁっ……ふうぅっ<emoji=heart04>\u3000せ～のっ――<emoji=heart04><emoji=heart04>」"
translation = "「하아앗…… 후우웃<emoji=heart04> 하나아 둘――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>\u3000――あっ、んうぅ……はあぁっ、あんっ<emoji=heart04>\u3000んっ、はあぁっ……ふうぅっ<emoji=heart04>\u3000はあぁっ……んうぅっ、んあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04> ――앗, 응우…… 하아앗, 앙<emoji=heart04> 응, 하아앗…… 후우웃<emoji=heart04> 하아앗…… 응우웃, 응아앗…… 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "瞳の奥にハートマークを浮かべながら、気持ちよさそうに腰を振り始めるルルカ。その姿はまさに、エッチな裏配信してしまう、淫乱な女の子そのものだった。"
translation = "눈동자 깊은 곳에 하트 마크를 띄우며, 기분 좋은 듯 허리를 흔들기 시작하는 루루카. 그 모습은 그야말로, 야한 뒷방송을 해버리는, 음란한 소녀 그 자체였다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はあぁあっ<emoji=heart04>\u3000やっぱりお兄ちゃんのデカおち○ぽ、すっごく気持ちいい<emoji=heart04>\u3000あたしにぴったり<emoji=heart04>\u3000相性バツグンなのぉ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 역시 오빠의 커다란 자지, 너무 기분 좋아<emoji=heart04> 나한테 딱이야<emoji=heart04> 궁합 최고야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふあぁっ<emoji=heart04>\u3000んんんっ……あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>\u3000愛液ヌルヌルのおま○この内側、極太カリでゴリゴリッって擦られてぇ、感じちゃうっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁあんっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 응응응…… 앗<emoji=heart04> 하아아앙<emoji=heart04> 애액으로 미끌거리는 보지 안쪽, 굵은 귀두로 고리고리하고 긁혀서어, 느껴버려어<emoji=heart04> 후우웃<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んあぁあっ<emoji=heart04>\u3000すごく気持ちいいよぉ<emoji=heart04>\u3000あっ……んうぅっ<emoji=heart04>\u3000はあぁっ、ふああぁっ<emoji=heart04>\u3000あたしの敏感なところ、全部を刺激してるっ<emoji=heart04>\u3000はあぁっ……んああぁっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 너무 기분 좋아아<emoji=heart04> 앗…… 응우웃<emoji=heart04> 하아앗, 후아아앗<emoji=heart04> 나의 민감한 곳, 전부를 자극하고 있어<emoji=heart04> 하아앗…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰の位置や角度を調整しながら、熱心に腰振りしていくルルカ。だが、その腰振りも決してご奉仕というわけではなく、ディルドでオナニーをするような、自分本位なものだ。"
translation = "허리 위치나 각도를 조절하며, 열심이 허리를 흔드는 루루카. 하지만, 그 허리 놀림도 결코 봉사라는 느낌이 아니라, 딜도로 자위하는 듯한, 자기중심적인 것이다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ごめんね、お兄ちゃん<emoji=heart04>\u3000これはルカルカが気持ちよくなってる、エッチな姿を見せる配信だから<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000ルカルカが気持ち良くなる為に、好きに動いちゃうね<emoji=heart04>」"
translation = "「미안해, 오빠<emoji=heart04> 이건 루카루카가 기분 좋아지는, 야한 모습을 보여주는 방송이니까<emoji=heart04> 하아앙<emoji=heart04> 루카루카가 기분 좋아지기 위해서, 마음대로 움직여버릴게<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「画面の向こうのお兄ちゃんたちも、ルカルカが快楽を貪っちゃう、エッチな姿が見たいよねっ？\u3000んふぅぅぅん<emoji=heart04>」"
translation = "「화면 너머의 오빠들도, 루카루카가 쾌락을 탐하는, 야한 모습이 보고 싶지? 응후우우웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふふっ。ほら、コメントいっぱい流れてきた<emoji=heart04>\u3000みんなの了承貰ったから……ガンガン動いちゃうね、お兄ちゃん<emoji=heart04>\u3000――えいっ<emoji=heart04>」"
translation = "「후후후. 봐봐, 코멘트 잔뜩 올라온다<emoji=heart04> 모두의 허락 받았으니까…… 팍팍 움직여버릴게, 오빠<emoji=heart04> ――에잇<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ<emoji=heart04>\u3000ふうぅっ！\u3000んっ、んうぅっ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>\u3000んっ、んっ<emoji=heart04>\u3000はあぁっ、んうぅっ……んああぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우웃! 응, 응우웃<emoji=heart04> 하아앗…… 응응<emoji=heart04> 응, 응<emoji=heart04> 하아앗, 응우웃…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リズミカルに振られる腰が、今までよりも深いところまで落とされる。ルルカの小さい膣穴を、亀頭がこじ開ける感触に、背筋がビリビリするような快感を覚えた。"
translation = "리드미컬하게 흔들리는 허리가, 지금까지보다 깊은 곳까지 내려간다. 루루카의 작은 질 구멍을, 귀두가 비집고 여는 감촉에, 등줄기가 찌릿찌릿한 쾌감을 느꼈다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ<emoji=heart04>\u3000んっ……んうぅっ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000ほら見て<emoji=heart04>\u3000いっぱいエッチし過ぎて、気持ち良くなる為の腰使い、すっかり覚えちゃったぁ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 응…… 응우웃<emoji=heart04> 하아아<emoji=heart04> 봐봐<emoji=heart04> 너무 많이 섹스해서, 기분 좋아지기 위한 허리 놀림, 완전히 배워버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ……ふああぁっ<emoji=heart04>\u3000おま○こ、ぐっちゅ、ぐっちゅ、って<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000えっちな音がしちゃってる<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응우웃<emoji=heart04> 하아앗…… 후아아앗<emoji=heart04> 보지, 구쮸, 구쮸, 하고<emoji=heart04> 하아앙<emoji=heart04> 야한 소리가 나고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふふっ<emoji=heart04>\u3000お兄ちゃんも気持ちいいの？\u3000あぁぁん<emoji=heart04>\u3000ルカルカが、自分で気持ち良くなる為に腰振ってるのにっ……<emoji=heart04>」"
translation = "「후후후<emoji=heart04> 오빠도 기분 좋아? 아아앙<emoji=heart04> 루카루카가, 스스로 기분 좋아지려고 허리를 흔들고 있는데……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「今にもびゅ～って、しちゃいそうな顔してるよ？\u3000ふわぁぁん<emoji=heart04>\u3000ああぁぁっ<emoji=heart04>\u3000お兄ちゃん、かわいい<emoji=heart04>」"
translation = "「당장이라도 뷰~ 하고, 해버릴 것 같은 얼굴 하고 있어? 후와아앙<emoji=heart04> 아아아앗<emoji=heart04> 오빠, 귀여워<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が主体で動いている時は、どれくらい激しくしていいのか悩むことがあるが、ルルカの騎乗位は想像以上に遠慮がない。"
translation = "내가 주체로 움직이고 있을 때는, 어느 정도 격렬하게 해도 좋을지 고민될 때가 있지만, 루루카의 기승위는 상상 이상으로 거침이 없다."

[[dialogue]]
speaker = "unk"
original = "それだけに快感も激しく、思わずこちらが喘ぎそうになってしまう。"
translation = "그만큼 쾌감도 격렬해서, 나도 모르게 이쪽에서 신음이 터져 나올 것만 같아진다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「やっぱりルカルカのおま○こ、お兄ちゃんと相性抜群だねっ<emoji=heart04>\u3000あっ……はあぁっ、んうぅっ<emoji=heart04>\u3000ふあぁっ……あぁんっ<emoji=heart04>」"
translation = "「역시 루카루카의 보지, 오빠랑 궁합 최고네<emoji=heart04> 앗…… 하아앗, 응우웃<emoji=heart04> 후아앗…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「って、んああぁっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……あんっ<emoji=heart04>\u3000ダメダメっ<emoji=heart04>\u3000お兄ちゃんっ、急に動いちゃっ……あぁんっ<emoji=heart04>」"
translation = "「그보다, 응아아앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아앗…… 앙<emoji=heart04> 안 돼 안 돼<emoji=heart04> 오빠, 갑자기 움직이면…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "挑発的なセリフが続くのは、ルルカが攻めて欲しい時の合図だ。"
translation = "도발적인 대사가 이어지는 것은, 루루카가 공격해주길 원할 때의 신호다."

[[dialogue]]
speaker = "unk"
original = "誘い受け気質のお姫様の要望に応えて、俺は仰向けの状態からおま○こ目掛けて、ペニスを突き上げる。"
translation = "유혹 수 기질인 공주님의 요망에 부응하여, 나는 천장을 보고 누운 상태에서 보지를 향해, 페니스를 치켜올린다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おち○ぽの角度っ<emoji=heart04>\u3000その角度は突いちゃダメなのぉ～～っ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふうぅっ……はあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「자지의 각도옷<emoji=heart04> 그 각도는 찌르면 안 되는 거야아아~~앗<emoji=heart04> 후아아앗<emoji=heart04> 앗<emoji=heart04> 후우웃…… 하아앗<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はああぁんっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000敏感なところ、極太カリでぐちゅぐちゅにされてぇ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000すごく感じちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 보지 기분 좋아<emoji=heart04> 민감한 곳, 굵은 귀두로 구츄구츄하게 돼서어<emoji=heart04> 하아앙<emoji=heart04> 엄청 느껴버려어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「も、もうっ<emoji=heart04>\u3000んんんっ……<emoji=heart04>\u3000お兄ちゃんの意地悪っ<emoji=heart04>\u3000ルカルカの弱点責めたら、配信続けられなくなっちゃうでしょぉ<emoji=heart04>\u3000あっ……ふうぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>」"
translation = "「정, 정말이지<emoji=heart04> 응응응……<emoji=heart04> 오빠 심술쟁이<emoji=heart04> 루카루카의 약점을 괴롭히면, 방송 계속할 수 없게 되잖아아<emoji=heart04> 앗…… 후우웃<emoji=heart04> 응우웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉だけなら文句を言っているようにも聞こえるが、ルルカの口元は嬉しそうに緩みっぱなしだ。どうやら俺の反撃はお気に召してくれたらしい。"
translation = "말뿐이라면 불평을 하는 것처럼 들리기도 하지만, 루루카의 입가는 기쁜 듯이 계속 풀려 있다. 아무래도 나의 반격이 마음에 든 모양이다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はあぁっ<emoji=heart04>\u3000これ以上は……お兄ちゃんも我慢、できなくなってきちゃったみたいだし<emoji=heart04>\u3000んふぅん<emoji=heart04>\u3000そろそろ本気の孕ませ種付けエッチ、しちゃおっか<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 이 이상은…… 오빠도 참을 수 없게 된 것 같고<emoji=heart04> 응후웅<emoji=heart04> 슬슬 본격적인 임신시키기 씨뿌리기 섹스, 해버릴까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「というわけで、いよいよルカルカの危険日おま○こ<emoji=heart04>\u3000生中出し決めちゃう、孕ませセックス<emoji=heart04>\u3000臨場感溢れる彼氏彼女の本気交尾でお届けしまぁーす<emoji=heart04>\u3000ぴーすぴーす<emoji=heart04>」"
translation = "「그런 고로, 드디어 루카루카의 위험일 보지<emoji=heart04> 생질내사정 박아버리는, 임신시키기 섹스<emoji=heart04> 현장감 넘치는 남친 여친의 본격 교미로 보내드릴게요오<emoji=heart04> 피스 피스<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ここからはコメントに返信できなくなっちゃうけど……んんぅ<emoji=heart04>\u3000それだけ本気でエッチしてるってことで、許してね<emoji=heart04>」"
translation = "「여기서부터는 코멘트에 답장할 수 없게 되지만…… 응응으<emoji=heart04> 그만큼 진심으로 섹스하고 있다는 거니까, 용서해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それじゃあ……お兄ちゃん、行くよ～。ルカルカの本気ピストン<emoji=heart04>」"
translation = "「그럼…… 오빠, 간다~. 루카루카의 본격 피스톤<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「せ～のっ<emoji=heart04>\u3000えいっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하~나 둘<emoji=heart04> 에잇――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あん<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>\u3000すごい、お兄ちゃんっ<emoji=heart04>\u3000デカおち○ぽっ<emoji=heart04>\u3000中でゴリゴリ擦れるぅっ<emoji=heart04>\u3000んふぅぅぅん<emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 응아아앗<emoji=heart04> 후와아아앙<emoji=heart04> 대단해, 오빠<emoji=heart04> 커다란 자지잇<emoji=heart04> 안에서 고리고리 비벼져어<emoji=heart04> 응후우우웅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルルカの腰振りが本気モードになった。気持ちよさそうに喘ぎながら、今まで以上に激しく上下に腰を振っている。"
translation = "루루카의 허리 놀림이 본격 모드가 되었다. 기분 좋은 듯 신음을 내지르며, 지금까지보다 격렬하게 상하로 허리를 흔들고 있다."

[[dialogue]]
speaker = "unk"
original = "その腰振りに合わせて俺もペニスを突き上げていくと、大量に溢れた愛液がルルカのお尻に当たって、ぴちゅんっ、ぱちゅんっ、と卑猥な音を響かせる。"
translation = "그 허리 놀림에 맞춰 나도 페니스를 치켜올리자, 대량으로 넘쳐흐른 애액이 루루카의 엉덩이에 부딪혀, 삐츄웅, 빠츄웅, 하고 비외한 소리를 울린다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「くふぅぅん<emoji=heart04>\u3000おま○こ本気で締めるとぉ、ルカルカもすごく感じちゃうっ<emoji=heart04>\u3000あんっ、あんっ、あんっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04>」"
translation = "「쿠후우웅<emoji=heart04> 보지를 진심으로 조이면언, 루카루카도 엄청 느껴버려어<emoji=heart04> 앙, 앙, 앙<emoji=heart04> 아아앗<emoji=heart04> 후아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、あっ、あっ、んあぁぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000んっ、んっ、ふうぅっ、んうぅっ<emoji=heart04>\u3000いつもより気持ちいいよぉ！\u3000お兄ちゃぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 응아아앗<emoji=heart04> 기분 좋아<emoji=heart04> 응, 응, 후우웃, 응우웃<emoji=heart04> 평소보다 기분 좋아아! 오빠아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000や、やっぱり、赤ちゃんできちゃう、孕ませエッチだからっ？\u3000前の裏配信の時よりも、感じちゃってる<emoji=heart04>」"
translation = "「앗, 앗, 앗, 하아앗<emoji=heart04> 후아아앗<emoji=heart04> 여, 역시, 아기 생겨버리는, 임신시키기 섹스라서어? 저번 뒷방송 때보다, 더 느끼고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あんっ、あんっ、はぁんっ<emoji=heart04>\u3000んふぅぅぅん<emoji=heart04>\u3000本当に気持ちいいっ<emoji=heart04>\u3000気持ちいいよぉっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000おかしくなっちゃうっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앙, 앙, 하앙<emoji=heart04> 응후우우웅<emoji=heart04> 정말 기분 좋아<emoji=heart04> 기분 좋아아앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 이상해져버려어<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "「孕ませエッチ」で興奮しているのは俺だけではないようで、ルルカの膣もキュンキュンと激しくペニスを刺激してくる。"
translation = "「임신시키기 섹스」로 흥분하고 있는 것은 나뿐만이 아닌 듯, 루루카의 질도 큥큥거리며 격렬하게 페니스를 자극해온다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はぁぁ～～っ<emoji=heart04>\u3000エッチ好き<emoji=heart04>\u3000お兄ちゃんおち○ぽ、ズポズポするの好きぃっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「하아아~~앗<emoji=heart04> 섹스 좋아<emoji=heart04> 오빠 자지, 즈포즈포 하는 거 좋아아앗<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んうぅっ<emoji=heart04>\u3000もっと<emoji=heart04>\u3000もっと気持ちよくなりたいっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04>\u3000んっ、んっ、んっ、んうぅっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응우웃<emoji=heart04> 더<emoji=heart04> 더 기분 좋아지고 싶어어<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후아아아앗<emoji=heart04> 응, 응, 응, 응우웃<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んあっ！？\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000やばぁっ<emoji=heart04>\u3000油断して体重かけたらぁ、はぁぁぁん<emoji=heart04>\u3000子宮口強く当たっちゃうぅ<emoji=heart04>\u3000でもこれ、やばぁ<emoji=heart04>\u3000すごぉいっ<emoji=heart04>」"
translation = "「응앗!? 응아아앗<emoji=heart04><emoji=heart04> 위험해애<emoji=heart04> 방심해서 체중 실었더니이, 하아아아앙<emoji=heart04> 자궁구 세게 닿아버려어어<emoji=heart04> 근데 이거, 위험해애<emoji=heart04> 대단해애앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ――おっ！？\u3000おほおぉっ<emoji=heart04><emoji=heart04>」"
translation = "「응――옷!? 오호오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全体重が乗ったような形で、今までにないほど深いところまで、おま○こにペニスが<b>突き刺さった</b>。"
translation = "전체중이 실린 듯한 형태로, 지금까지 없었을 정도로 깊은 곳까지, 보지에 페니스가 <b>박혔다</b>."

[[dialogue]]
speaker = "unk"
original = "反射的に声をあげかけたが、ふと見ると、ルルカの顔はむしろ快感に歪んでいた。"
translation = "반사적으로 소리를 지를 뻔했지만, 문득 보니 루루카의 얼굴은 오히려 쾌감에 일그러져 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んおおぉっ！？\u3000おっ……<emoji=heart04>\u3000奥グリってするの、すっごい効くぅっ……おっ<emoji=heart04>\u3000おっおっ……んおおぉっ<emoji=heart04><emoji=heart04>」"
translation = "「응오오옷!? 옷……<emoji=heart04> 안쪽 그리하고 하는 거, 엄청 잘 들어어…… 옷<emoji=heart04> 옷 옷…… 응오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おま○この最奥──いわゆるポルチオが気持ちいいと気付いたルルカは、自ら進んでおま○こをペニスに突き刺し始める。"
translation = "보지의 가장 깊은 곳── 이른바 포르치오가 기분 좋다는 것을 깨달은 루루카는, 스스로 나아가 보지를 페니스에 박기 시작한다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おっ……<emoji=heart04>\u3000おっ、おっ、おっ、おっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000んおぉぉ～～っ<emoji=heart04><emoji=heart04>\u3000あぁ、これいいっ<emoji=heart04>\u3000おっ……おっおっおっ<emoji=heart04>\u3000おほおぉ～～っ<emoji=heart04>」"
translation = "「옷……<emoji=heart04> 옷, 옷, 옷, 옷<emoji=heart04> 응앙<emoji=heart04> 응오오오~~앗<emoji=heart04><emoji=heart04> 아, 이거 좋아<emoji=heart04> 옷…… 옷 옷 옷<emoji=heart04> 오호오오~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おぉんっ<emoji=heart04>\u3000おっ、おっ<emoji=heart04>\u3000おほぉぉっ<emoji=heart04>\u3000こんなのイグぅ<emoji=heart04>\u3000すぐイッぢゃうからぁぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっ、おっ、おっ、おっ<emoji=heart04>\u3000んおおぉぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「오오앙<emoji=heart04> 옷, 옷<emoji=heart04> 오호오옷<emoji=heart04> 이런 거 가버려어<emoji=heart04> 금방 가버리니까아아~~앗<emoji=heart04><emoji=heart04> 옷, 옷, 옷, 옷<emoji=heart04> 응오오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ヘンな声出ちゃう<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000ほっ<emoji=heart04>\u3000ほぉっ<emoji=heart04>\u3000ふぐぅぅ～っ<emoji=heart04>\u3000こんなの可愛いルカルカじゃ、ないのにっ<emoji=heart04>\u3000腰がどちゅどちゅ、止まらないのぉっ<emoji=heart04><emoji=heart04>\u3000ふわぁぁん<emoji=heart04>」"
translation = "「이상한 목소리 나와버려어<emoji=heart04> 응옷<emoji=heart04> 홋<emoji=heart04> 호옷<emoji=heart04> 후구우우~웃<emoji=heart04> 이런 거 귀여운 루카루카가, 아닌데에<emoji=heart04> 허리가 도츄도츄, 멈추지 않아아앗<emoji=heart04><emoji=heart04> 후와아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んおっ<emoji=heart04>\u3000おんっ<emoji=heart04>\u3000らめぇっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000お兄ちゃん、聞かないでぇ<emoji=heart04>\u3000ルカルカの下品な声、聞いちゃらめぇぇぇっ<emoji=heart04><emoji=heart04>」"
translation = "「응옷<emoji=heart04> 응앙<emoji=heart04> 안 돼애앗<emoji=heart04> 응옷<emoji=heart04> 옷<emoji=heart04> 옷<emoji=heart04> 오빠, 듣지 마아<emoji=heart04> 루카루카의 저질스러운 목소리, 들으면 안 돼애애애앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だらしなくよだれを垂らしながら、ポルチオで快感を貪るルルカ。「ダメ」と言いながらも、腰の打ちつけを弱めることもできず、にやけた顔で激しい喘ぎ声を漏らし続ける。"
translation = "추하게 침을 흘리면서, 포르치오로 쾌감을 탐하는 루루카. 「안 돼」라고 말하면서도, 허리짓을 늦추지도 못하고, 헤벌쭉한 얼굴로 격렬한 신음 소리를 계속 흘린다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おっ、おっ、おっ、おほぉっ<emoji=heart04>\u3000ふああああっ<emoji=heart04>\u3000あああっ、幻滅しないでっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>」"
translation = "「옷, 옷, 옷, 오호옷<emoji=heart04> 후아아아앗<emoji=heart04> 아아앗, 환멸하지 마아앗<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どんな下品な声だろうと、嫌いになるわけないだろっ！」"
translation = "「아무리 저질스러운 목소리라도, 싫어하게 될 리가 없잖아!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お、お兄ちゃんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふわぁぁぁん<emoji=heart04>\u3000あああっ、好きっ<emoji=heart04>\u3000好き好き、大好きぃ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오, 오빠아앗<emoji=heart04><emoji=heart04><emoji=heart04> 후와아아아앙<emoji=heart04> 아아앗, 좋아아<emoji=heart04> 좋아 좋아, 너무 좋아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おっ<emoji=heart04>\u3000おぉおっ<emoji=heart04>\u3000おおぉっ<emoji=heart04>\u3000おほおおぉぉ～～っ<emoji=heart04><emoji=heart04>\u3000ああっ、もうダメっ<emoji=heart04>\u3000おま○こキュンキュンして、イグっ<emoji=heart04>\u3000イっぢゃうぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「옷<emoji=heart04> 오오옷<emoji=heart04> 오오앗<emoji=heart04> 오호오오오~~앗<emoji=heart04><emoji=heart04> 아앗, 이제 안 돼앗<emoji=heart04> 보지 큥큥거려서, 가버려어<emoji=heart04> 가버려어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんも来てぇ<emoji=heart04>\u3000あたしのおま○こに出してっ<emoji=heart04><emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000お兄ちゃん精子、ルルカに中出しして、孕ませてぇぇ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오빠도 와줘어<emoji=heart04> 내 보지에 싸줘어엇<emoji=heart04><emoji=heart04> 아아앙<emoji=heart04> 오빠 정자, 루루카에게 질내사정해서, 임신시켜줘어어어어~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああっ、もう出る！\u3000ルルカの中に出すぞ！」"
translation = "「아앗, 이제 나와! 루루카 안에 싼다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うんっ<emoji=heart04>\u3000ルルカもイクっ<emoji=heart04><emoji=heart04>\u3000ふわぁぁん<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000お、ぉ、おっぉおっ、おぉおっ！\u3000おほぉぉぉぉっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 루루카도 가앗<emoji=heart04><emoji=heart04> 후와아앙<emoji=heart04> 아아아앗<emoji=heart04> 오, 오, 옷오옷, 오오옷! 오호오오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ああっ、あぁあ、ああぁあっ！？\u3000イクっ<emoji=heart04>\u3000イク、イク、イクっ──イックぅうぅぅううう～っ……！！<emoji=heart04>」"
translation = "「아앗, 아아아, 아아아앗!? 가버려어<emoji=heart04> 가, 가, 가앗── 가아아아아아아앙~앗……!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 가아아아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000お兄ちゃんの熱い精液、ルルカの子宮にいっぱい入ってきてるぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아~~~앗<emoji=heart04><emoji=heart04> 오빠의 뜨거운 정액, 루루카의 자궁에 가득 들어오고 있어어어~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んあああぁぁぁ～～っ<emoji=heart04>\u3000お兄ちゃんの射精、すごぉい<emoji=heart04>\u3000んうぅっ……<emoji=heart04>\u3000長くてどぴゅどぴゅ、止まらない……<emoji=heart04>」"
translation = "「응아아아아아~~앗<emoji=heart04> 오빠의 사정, 대단해애<emoji=heart04> 응우웃……<emoji=heart04> 길어서 도퓨도퓨, 멈추지 않아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「んっ……はああぁっ……<emoji=heart04>」"
translation = "「응…… 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「やっと射精止まったぁ<emoji=heart04>\u3000お腹の中、いっぱいで熱ぅい……<emoji=heart04>」"
translation = "「겨우 사정이 멈췄다아<emoji=heart04> 배 속, 가득해서 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ……<emoji=heart04>\u3000お兄ちゃんのおち○ぽ、抜けちゃう……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 오빠 자지, 빠져버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あんっ<emoji=heart04>\u3000はあぁぁ……ふうぅぅ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 하아아아…… 후우우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「なんか、久しぶりの配信ごっこエッチ……すごく気持ちよかったかも<emoji=heart04>」"
translation = "「왠지, 오랜만의 방송 놀이 섹스…… 엄청 기분 좋았을지도<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんはどうだった……？」"
translation = "「오빠는 어땠어……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ルルカが危ない日だとか、孕ませエッチだとか言い出すから、いつもより沢山出た……」"
translation = "「루루카가 위험한 날이라느니, 임신시키기 섹스라느니 말하니까, 평소보다 훨씬 많이 나왔어……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふふっ……相変わらずいっぱい出すよね、お兄ちゃんは。中に入り切らなくて、溢れてきちゃってる……<emoji=heart04>」"
translation = "「후훗…… 여전히 잔뜩 싸네, 오빠는. 안에 다 안 들어가서, 넘쳐흐르고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「こんなに出されちゃったら……本当に孕んじゃうかも<emoji=heart04>」"
translation = "「이렇게나 싸버리면…… 정말로 임신해버릴지도<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その時は、責任取るよ」"
translation = "「그때는, 책임질게」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……！\u3000ふふっ、ありがと<emoji=heart04>\u3000お兄ちゃん……<emoji=heart04>」"
translation = "「……! 후훗, 고마워<emoji=heart04> 오빠……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「本当に本当に、大～好きっ<emoji=heart04>\u3000これからもずっと一緒だよっ、お兄ちゃん<emoji=heart04>」"
translation = "「정말 정말, 너~무 좋아<emoji=heart04> 앞으로도 계속 함께야, 오빠<emoji=heart04>」"

