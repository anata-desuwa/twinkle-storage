[[dialogue]]
speaker = "unk"
original = "第４話,アイドルの恋愛練習,P"
translation = "제4화, 아이돌의 연애 연습, P"

[[dialogue]]
speaker = "unk"
original = "レミカの現プロデューサーが、実は俺が以前やっていたバイト――アイドルのアシスタントマネージャーをした際にお世話になった人だった。"
translation = "레미카의 현 프로듀서가 사실은 내가 이전에 했던 알바―― 아이돌 어시스턴트 매니저를 했을 때 신세를 졌던 사람이었다."

[[dialogue]]
speaker = "unk"
original = "その伝手で、俺は１日だけレミカの代理プロデューサーを任されることになり、仕事は無事終わったのだが――"
translation = "그 연줄로 나는 하루 동안 레미카의 대리 프로듀서를 맡게 되었고, 일은 무사히 끝났는데――"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長、１日プロデューサーお疲れ様。凄い手際が良くて、助かったよ」"
translation = "「회장, 하루 동안 프로듀서 수고했어. 솜씨가 정말 좋아서 도움이 됐어」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「おかげで映画のプロモーション撮影、パーフェクトな出来だったと思う」"
translation = "「덕분에 영화 프로모션 촬영, 퍼펙트한 결과물이었다고 생각해」"

[[dialogue]]
speaker = "unk"
original = "学園で撮影するなんて思わなかったな"
translation = "학원에서 촬영할 줄은 몰랐네"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「映画の原作が少女漫画なのと、私が通っている場所でちょうどいいって理由らしいよ」"
translation = "「영화 원작이 순정 만화인 거랑, 내가 다니고 있는 곳이 딱 좋다는 이유라는 것 같아」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――ん？\u3000なに、会長？\u3000聞きたいことがあるって……」"
translation = "「――응? 왜 그래, 회장? 묻고 싶은 게 있다니……」"

[[dialogue]]
speaker = "unk"
original = "レミカ、ひょっとして何か悩んでる？"
translation = "레미카, 혹시 뭔가 고민하고 있어?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「え？\u3000どうしてそんなこと――今日１日仕事を見てて、何だか不安そうに感じた？」"
translation = "「에? 어째서 그런 걸―― 오늘 하루 일을 지켜보면서 왠지 불안해 보인다고 느꼈어?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「そっか……会長には分かっちゃうんだ……」"
translation = "「그렇구나…… 회장에게는 들켜버리는구나……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「今度の映画、原作が少女漫画じゃない？\u3000だからさ、やっぱり主人公の女の子と男の子の恋愛が、ストーリーのメインになってくるんだよね」"
translation = "「이번 영화, 원작이 순정 만화잖아? 그러니까 역시 여주인공과 남주인공의 연애가 스토리의 메인이 되거든」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「でも私、恋愛経験は１度もないし……それどころか正直、これまで特定の男の子に恋愛感情を持ったことなんてなくて……」"
translation = "「하지만 나, 연애 경험은 한 번도 없고…… 그것보다 솔직히, 지금까지 특정 남자애한테 연애 감정을 가져본 적이 없어서……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「情けない話だけど、恋愛ってものが全然ピンと来ないんだ」"
translation = "「한심한 이야기지만, 연애라는 게 전혀 감이 안 와.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「それでも、私が主人公のイメージに合うからって、熱心にオファーしてくれた仕事だし……できる限り、その期待に応えたいと思ってて」"
translation = "「그래도, 내가 주인공 이미지에 맞는다면서 열성적으로 오퍼를 준 일이고…… 가능한 한 그 기대에 보답하고 싶다고 생각해서.」"

[[dialogue]]
speaker = "unk"
original = "俺でよければ、何でも相談に乗る"
translation = "나라도 괜찮다면, 뭐든 상담해 줄게."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ありがと、会長。どうにかして、恋愛の感覚を掴む方法を考えてるんだけど……そうだ」"
translation = "「고마워, 회장. 어떻게든 연애 감각을 익힐 방법을 생각 중인데…… 맞다.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「会長はこの後、まだ時間ある？\u3000せっかくだし、こんなこと会長以外には頼めないから――」"
translation = "「회장은 이따가 시간 좀 있어? 기왕이면, 이런 건 회장 말고는 부탁할 수 없으니까――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「私とデート、してくれない？」"
translation = "「나랑 데이트, 해주지 않을래?」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「い、いや、まあ、あくまで恋愛イメージを得る為の練習だけど。アイドルとして、仕事に必要なレッスンとして……」"
translation = "「아, 아니, 뭐, 어디까지나 연애 이미지를 얻기 위한 연습이지만. 아이돌로서, 일에 필요한 레슨으로서……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――いいの？\u3000そ、それなら……えっと。まずは……手を繋いで、歩く練習をしたい、かな」"
translation = "「――괜찮아? 그, 그럼…… 에구. 우선은…… 손을 잡고 걷는 연습을 하고 싶어, 서.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……よし。じゃあ会長、手を出して……繋ぐよ。ん……」"
translation = "「……좋아. 그럼 회장, 손 내밀어 봐…… 잡을게. 응……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（会長の手、温かい……それと、思ってたより大きい……これが男の子の手なんだ……）"
translation = "(회장 손, 따뜻해…… 그리고 생각보다 커…… 이게 남자애 손이구나……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（って、何か私……緊張してる？\u3000会長と一緒にいるのは慣れてるはずなのに、手が触れてるだけでドキドキしてる……）"
translation = "(그나저나, 나 왠지…… 긴장하고 있어? 회장이랑 같이 있는 건 익숙할 텐데, 손이 닿아 있는 것만으로 두근두근거려……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「こ、このまま学園の中を歩いてみてもいい、かな？\u3000この時間なら生徒もほとんど残ってないだろうから、視線を気にする必要もないし……」"
translation = "「이, 이대로 학원 안을 걸어봐도 될, 까? 이 시간이라면 학생도 거의 남아 있지 않을 테니까 시선을 신경 쓸 필요도 없고……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「夜の校舎だから、やっぱり静かだね……」"
translation = "「밤의 교사라 역시 조용하네……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（静かだから、お互いの呼吸音まで聞こえる。自分の心臓の音も気になる……緊張してるの、会長にバレてない、よね？）"
translation = "(조용하니까 서로의 호흡 소리까지 들려. 내 심장 소리도 신경 쓰여…… 긴장한 거 회장한테 안 들켰겠지?)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（め、目が合ったらバレちゃいそうで、顔が見れない……というか私、手汗かいてない？\u3000なんかそれ、凄く恥ずかしいんだけど……っ）"
translation = "(누, 눈이 마주치면 들킬 것 같아서 얼굴을 못 보겠어…… 그보다 나, 손에 땀 나지 않았어? 왠지 그거, 엄청 부끄러운데……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「と、とりあえず……手を繋ぐ感覚は分かったかな、うん。一旦ここまでで大丈夫――」"
translation = "「이, 일단…… 손을 잡는 감각은 알 것 같아, 응. 일단 여기까지면 됐어――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「って、あ……」"
translation = "「어라, 아……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（なんか手を離したら、温もりが消えて寂しい感じ……ドキドキしたけど、もっと繋いでてもよかった、かも……）"
translation = "(왠지 손을 놓으니까 온기가 사라져서 허전한 느낌…… 두근거렸지만, 좀 더 잡고 있어도 좋았을지도……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――え？\u3000う、ううん、何でもない。ステップアップして、次に行こう」"
translation = "「――에? 아, 아니, 아무것도 아니야. 스텝 업 해서 다음으로 가자.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「次は、映画でもシーンがあるんだけど、腕を組む練習がしたい」"
translation = "「다음은 영화에도 장면이 있는데, 팔짱을 끼는 연습을 하고 싶어.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「……よし。じゃあ会長、腕を借りるね。ん――」"
translation = "「……좋아. 그럼 회장, 팔 좀 빌릴게. 응――」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（って、これ手を繋ぐのと、全然違う……！？\u3000か、体が密着して、心臓がドキドキしてる音、伝わっちゃうでしょこれ……っ）"
translation = "(잠깐, 이거 손 잡는 거랑 전혀 다르잖아……!? 모, 몸이 밀착돼서 심장이 두근거리는 소리, 다 전해지겠어 이거……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「っ……！\u3000ご、ごめん会長、ちょっと待って！\u3000少し離れて気分を落ち着かせて……って、きゃっ！？\u3000足が机にっ――」"
translation = "「윽……! 미, 미안 회장, 잠깐만! 조금 떨어져서 기분을 진정시키고…… 어라, 꺄악!? 발이 책상에――」"

[[dialogue]]
speaker = "unk"
original = "おっと……大丈夫か？"
translation = "어이쿠…… 괜찮아?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（あっ……転びそうになったのを、会長に抱き止められて……さっきよりも密着しちゃってる……）"
translation = "(앗…… 넘어지려던 걸 회장이 안아서 멈춰 세워줘서…… 아까보다 더 밀착돼버렸어……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（会長、線が細いように見えて、鍛えているから逞しい体つきしてるんだよね……力強くて、ドキドキする……）"
translation = "(회장, 선이 가늘어 보이는데 단련해서 그런지 늠름한 체격을 하고 있구나…… 힘차서 두근거려……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（腕を組んだ時はビックリしちゃったけど……こうしてくっ付いてると、手を繋いでた時みたいな温もりが感じられて……安心する、かも）"
translation = "(팔짱을 꼈을 때는 깜짝 놀랐지만…… 이렇게 딱 붙어 있으니까 손을 잡았을 때 같은 온기가 느껴져서…… 안심될지도.)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（これが男の人の――会長の感じなんだ……）"
translation = "(이게 남자의―― 회장의 느낌이구나……)"

[[dialogue]]
speaker = "unk"
original = "レミカ、気分は落ち着いた？"
translation = "레미카, 기분은 좀 진정됐어?"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「え！？\u3000う、うん……もう大丈夫」"
translation = "「에!? 응, 응…… 이제 괜찮아.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（というか、気にしてる余裕なかったけど……会長は、私みたいにドキドキ、してないのかな？\u3000それは、なんか……）"
translation = "(그보다 신경 쓸 여유가 없었지만…… 회장은 나처럼 두근두근거리지 않는 걸까? 그건 왠지……)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――あ、あのさ……会長。会長は……私と手を繋いだり、腕を組んだりして、ドキドキとかしてないの？\u3000あ、いや別に、私はしてるとか、そういうわけじゃないけどっ」"
translation = "「――저, 저기 있잖아…… 회장. 회장은…… 나랑 손을 잡거나 팔짱을 껴서 두근거린다거나 하지는 않아? 아, 아니 딱히 내가 그렇다는 소리는 아니지만!」"

[[dialogue]]
speaker = "unk"
original = "俺はドキドキしてるよ"
translation = "나도 두근거리고 있어."

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――恥ずかしいから、そう見えないように取り繕ってるだけ？\u3000ふ、ふ～ん……そうなんだ」"
translation = "「――부끄러우니까 그렇게 안 보이도록 꾸미고 있을 뿐이라고? 흐, 흐음…… 그렇구나.」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "（何かそれを聞いたら……ちょっと嬉しい、かも）"
translation = "(왠지 그 말을 들으니까…… 조금 기쁠지도.)"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「ん、どうしたの、会長？\u3000驚いたような顔して……」"
translation = "「응, 왜 그래 회장? 놀란 표정을 짓고……」"

[[dialogue]]
speaker_original = "レミカ"
speaker_translation = "레미카"
original = "「――わ、私が仕事の時よりも、いい笑顔してたから？\u3000う、嘘っ……？」"
translation = "「――내, 내가 일할 때보다 더 좋은 미소를 짓고 있어서? 거, 거짓말……?」"

[[dialogue]]
speaker = "unk"
original = "レミカが頬をムニムニさせている一方、先程の思わずドキッとするような笑顔で、俺も顔が熱くなってしまっているのを自覚せざるを得なかった――"
translation = "레미카가 볼을 꼼지락거리는 한편, 방금 전 무심코 가슴이 철렁할 정도의 미소에 나 역시 얼굴이 달아오르고 있다는 것을 자각하지 않을 수 없었다――"

