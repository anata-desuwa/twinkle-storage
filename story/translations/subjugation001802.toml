[[dialogue]]
speaker = "モネ"
original = "「う～ん、やっちゃった……やっちゃったかも……」"
translation = "「으음, 저질러버렸다…… 저질러버렸을지도……」"

[[dialogue]]
speaker = "モネ"
original = "「勢いで人工戦闘服のテスターを引き受けたけど……冷静になるとやっぱり恥ずかしい……！」"
translation = "「세력에 밀려 인공 전투복 테스터를 수락했지만…… 냉정해지니까 역시 부끄러워……!」"

[[dialogue]]
speaker = "モネ"
original = "「ただのサンタ服ならよかったんだけど、サンタ服に水着はちょっと……露出が……」"
translation = "「그냥 산타복이면 좋았을 텐데, 산타복에 수영복은 좀…… 노출이……」"

[[dialogue]]
speaker = "モネ"
original = "「でもでも、ヘレナさんに『やります！』って言っちゃったし……後には引けないよね」"
translation = "「그치만 헬레나 씨에게 『하겠습니다!』라고 말해버렸고…… 이제 와서 물러설 수는 없지」"

[[dialogue]]
speaker = "モネ"
original = "「それに、私のために九浄家の蔵書を特別に公開してくれるらしいし……こんなチャンスは滅多にないよ！」"
translation = "「게다가 나를 위해서 쿠죠 가문의 장서를 특별히 공개해 준다고 하셨고…… 이런 찬스는 좀처럼 없다구!」"

[[dialogue]]
speaker = "モネ"
original = "「よし、覚悟を決めよう……。意外と着てみたら恥ずかしくないかもしれないし……物は試し！」"
translation = "「좋아, 각오를 다지자……. 의외로 입어보면 부끄럽지 않을지도 모르고…… 일단 해보는 거야!」"

[[dialogue]]
speaker = "モネ"
original = "「すぅーはぁー……うん、いくよ！」"
translation = "「흡─ 하─…… 응, 간다!」"

[[dialogue]]
speaker = "モネ"
original = "「……………………うん」"
translation = "「……………………응」"

[[dialogue]]
speaker = "モネ"
original = "（や、やっぱり恥ずかしい～～～～～～～～～～！！）"
translation = "（역시 부끄러워~~~~~~~~~~~~~~~~~~~~!!）"

[[dialogue]]
speaker = "モネ"
original = "（この戦闘服やっぱりおかしいよ～～～～！\u3000季節感とか色々言いたいことはあるけど、特にサンタ水着の露出！\u3000露出度高すぎ！）"
translation = "（이 전투복 역시 이상해~~~~! 계절감이라든가 여러 가지 말하고 싶은 건 많지만, 특히 산타 수영복의 노출! 노출도가 너무 높아!）"

[[dialogue]]
speaker = "モネ"
original = "（というか、なんでこんな人が多いところで着ちゃったの私！\u3000みんなに見られちゃうよ～～～～！）"
translation = "（그보다, 왜 이렇게 사람이 많은 곳에서 입어버린 거야 나! 다들 보게 될 거 아냐~~~~!）"

[[dialogue]]
speaker = "モネ"
original = "「ああうぅ……恥ずかしい……恥ずか死ぬ……もう脱いじゃおう……」"
translation = "「아아으으…… 부끄러워…… 부끄러워 죽겠어…… 이제 벗어버릴래……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「モネさん！？\u3000そのエッ──ナイスなお姿は！？」"
translation = "「모네 씨!? 그 야── 나이스한 모습은!?」"

[[dialogue]]
speaker = "モネ"
original = "「さっそく見つかっちゃった！」"
translation = "「벌써 들켜버렸다!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「さ、サンタクロースに水着を組み合わせるとは……お見それしました。あっぱれです」"
translation = "「사, 산타클로스에 수영복을 조합하다니…… 정말 놀랐습니다. 훌륭하군요.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「それになんという布面積！\u3000も、モネさんのたわわなたわわが白日の下に晒されて……ガハッ！」"
translation = "「게다가 이 무슨 천 면적! 모, 모네 씨의 탐스러운 탐스러움이 백일하에 드러나서…… 커헉!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「……う～ん」"
translation = "「……으음」"

[[dialogue]]
speaker = "モネ"
original = "「イクシーさん！\u3000ダメです……気絶してます……」"
translation = "「익실 씨! 안 돼요…… 기절해 계시네……」"

[[dialogue]]
speaker = "モネ"
original = "「どうしましょう……まさか、この姿を見せるだけで人を<ruby>殺<rt>あや</rt></ruby>めてしまうなんて……」"
translation = "「어쩌죠…… 설마, 이 모습을 보여주는 것만으로 사람을 죽여버리다니……」"

[[dialogue]]
speaker = "モネ"
original = "「これ以上被害者を出す前に早く退散しないと──」"
translation = "「더 이상 피해자를 내기 전에 얼른 퇴각해야──」"

[[dialogue]]
speaker = "リップル"
original = "「あ！\u3000モネやっと見つけマシタ！\u3000探しマシタよ！」"
translation = "「아! 모네 드디어 찾아마시타! 찾아다녀마시타요!」"

[[dialogue]]
speaker = "モネ"
original = "「リップルさん！？\u3000どうして私を探して……？\u3000あっ、というか今はダメです！\u3000私を見ないでください！」"
translation = "「리플 씨!? 어째서 저를 찾아서……? 앗, 그보다 지금은 안 돼요! 저를 보지 말아 주세요!」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ！\u3000モネ、ステキな水着です！\u3000トッテモ、カワイイです！」"
translation = "「와오! 모네, 멋진 수영복마시타! 매우, 귀여워마시타!」"

[[dialogue]]
speaker = "モネ"
original = "「うぅ……そんなキラキラした目で私を見ないでください……恥ずかしい……」"
translation = "「으으…… 그렇게 반짝이는 눈으로 저를 보지 말아 주세요…… 부끄러워요……」"

[[dialogue]]
speaker = "リップル"
original = "「モネ、水着を着ているというコトは、リゾート結界に行く気になったということデスか！？」"
translation = "「모네, 수영복을 입고 있다는 건, 리조트 결계에 갈 마음이 생겨마시타는 것나리입니까!?」"

[[dialogue]]
speaker = "モネ"
original = "「へ？\u3000いや、この格好にはちょっと訳があって──」"
translation = "「헤? 아니, 이 복장에는 좀 사정이 있어서──」"

[[dialogue]]
speaker = "リップル"
original = "「モネはイマまでリゾート結界に来てくれませんでしたが、ツイに来てくれる気になってくれたんデスね！\u3000ワタシ嬉しいです！」"
translation = "「모네는 지금까지 리조트 결계에 와주지 않아마시타만, 드디어 와 줄 마음이 생겨준 것이마시타네! 와타시 기뻐마시타!」"

[[dialogue]]
speaker = "モネ"
original = "「ええ！？\u3000た、確かに水着を着てたらそう思うかもしれませんけど、これは本当に違くて──」"
translation = "「에엣!? 그, 확실히 수영복을 입고 있으면 그렇게 생각할지도 모르지만, 이건 정말 그게 아니라──」"

[[dialogue]]
speaker = "リップル"
original = "「ダイジョウブです！\u3000全部ワカってます！\u3000真冬の寒さに耐えられず、夏が恋しくなったんデスね！」"
translation = "「다이죠부마시타! 전부 알고 있마시타! 한겨울의 추위를 견디지 못하고, 여름이 그리워진 것이마시타네!」"

[[dialogue]]
speaker = "モネ"
original = "「全然わかってない！\u3000というか私の話を聞いてください～！」"
translation = "「전혀 몰라요! 그보다 제 말을 들어주세요~!」"

[[dialogue]]
speaker = "リップル"
original = "「さあさあ、さっそくリゾート結界に行きマショ～！」"
translation = "「자자, 어서 리조트 결계로 가마쇼~!」"

[[dialogue]]
speaker = "モネ"
original = "「えええ今から！？\u3000リップルさんちょっと待ってぇ～！！」"
translation = "「에에엣 지금 당장!? 리플 씨 잠깐만요~!!」"

[[dialogue]]
speaker = "モネ"
original = "「ホントに待ってくださ～いっ！？」"
translation = "「정말로 잠깐만 기다려주세요~!?」"

