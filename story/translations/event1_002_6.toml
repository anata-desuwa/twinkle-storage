[[dialogue]]
speaker = "unk"
original = "リップルに誘われて、フィオナと俺はサーフィン体験をしてみることになった――"
translation = "리플의 권유로 피오나와 나는 서핑 체험을 해보게 되었다――"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フィオナ！\u3000ボードの上に腹這いに乗ったら、パドリングして、ゆっくりでいいのでスープを見つけてクダさい！」"
translation = "「피오나! 보드 위에 엎드려 타면, 패들링을 해서 천천히라도 좋으니 수프를 찾아주심쇼!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「えっと……スープというのは……」"
translation = "「저기…… 수프라는 건……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「波のことです！\u3000白い波が立っているところでテイクオフ……ボードから立ち上がって、波に乗るんで～す♪」"
translation = "「파도를 말함다! 하얀 파도가 일고 있는 곳에서 테이크오프…… 보드에서 일어서서 파도를 타는 검다~♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わ、分かりました。白い波が立っているところで、ボードから立ち……きゃっ！？」"
translation = "「아, 알겠습니다. 하얀 파도가 일고 있는 곳에서 보드에서 일어…… 꺄악!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「海に落ちてしまいました……やはり、そう簡単には上手く行きませんね……」"
translation = "「바다에 빠져버렸어요…… 역시 그렇게 간단히 잘 되지는 않네요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ユウリなら、もっと上手くできるかもしれません。んっ……バランス感覚的には、ソフィアの方が向いてるかも……」"
translation = "「유우리라면 더 잘할 수 있을지도 몰라요. 으음…… 밸런스 감각으로는 소피아가 더 적합할지도……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ドンマイ、フィオナ！\u3000ワタシも最初は数え切れないくらい落っこちて、波に乗れるようにナリました！」"
translation = "「돈마이, 피오나! 저도 처음에는 셀 수 없을 정도로 떨어지고 나서야 파도를 탈 수 있게 되었슴다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「繰り返して、波に乗る感覚を体に覚えサセルのが、サーフィンの１つ目のポイントです！」"
translation = "「반복해서 파도를 타는 감각을 몸에 익히게 하는 게 서핑의 첫 번째 포인트임다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「波に乗る感覚……はい、分かりました。やってみます！」"
translation = "「파도를 타는 감각…… 네, 알겠습니다. 해볼게요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「じゃあ同じように、カイチョーもやってみましょう……って、ワオ！？」"
translation = "「그럼 똑같이 회장님도 해보겠슴다…… 어라, 와오!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「えっ！？\u3000緋宮会長……ボードの上に立ててる！？\u3000まさかサーフィンの経験者だったんですか！？」"
translation = "「엣!? 히노미야 회장님…… 보드 위에 서 계셔!? 설마 서핑 경험자였나요!?」"

[[dialogue]]
speaker = "unk"
original = "実はライフセーバーのバイトで――"
translation = "「사실 라이프세이버 아르바이트 때――」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「――サーフィンを教わったことがある？\u3000……サバイバル経験といい、緋宮会長のバイト経歴が凄く気になるんですが……！」"
translation = "「――서핑을 배운 적이 있다고요? ……서바이벌 경험도 그렇고, 히노미야 회장님의 알바 경력이 무척 궁금해지는데요……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョー、スゴいで～す！\u3000――少しカジっただけの初心者？\u3000確かにまだフラついてはいますが、ボードの上に立ててるのは波の感覚を掴めている証拠で～す！」"
translation = "「회장님, 대단함다~! ――조금 맛만 본 초보자? 확실히 아직 비틀거리긴 하지만, 보드 위에 서 있는 건 파도의 감각을 잡았다는 증거임다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「わ、私も……波に乗る感覚を身に着けて、ボードの上に……きゃっ！？」"
translation = "「저, 저도…… 파도를 타는 감각을 몸에 익혀서 보드 위에…… 꺄악!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フィオナ、今だとちょっと、ボードにノルのが遅過ぎます！」"
translation = "「피오나, 지금은 좀 보드에 올라타는 게 너무 늦슴다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぷはっ！\u3000は、はい。分かりました……」"
translation = "「푸하! 네, 네. 알겠습니다……」"

[[dialogue]]
speaker = "unk"
original = "フィオナは普段、スポーツしたりするの？"
translation = "「피오나는 평소에 스포츠 같은 거 해?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あはは。残念ながら、訓練やトレーニングはしても、スポーツは全然で……」"
translation = "「아하하. 안타깝게도 훈련이나 트레이닝은 해도 스포츠는 전혀라서……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「せいぜいニャリオンと散歩して、一緒に公園で遊んだりとか……家で流星ライダーのポーズを真似したりとか……」"
translation = "「기껏해야 냐리온과 산책하며 같이 공원에서 놀거나…… 집에서 유성 라이더의 포즈를 흉내 내거나 하는 정도라……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ポーズ？」"
translation = "「포즈여?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ！？\u3000いえ、全然話す程のことじゃなくて……！\u3000れ、練習を続けましょう！」"
translation = "「앗!? 아니요, 전혀 이야기할 정도의 일은 아니라서……! 여, 연습을 계속하죠!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「波を感じて……白い波が立っている辺りで……今！\u3000きゃあっ！？」"
translation = "「파도를 느끼며…… 하얀 파도가 일고 있는 근처에서…… 지금! 꺄아악!?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「惜しい！\u3000今のだとちょっと、ボードにノるタイミングが早いで～す」"
translation = "「아깝슴다! 지금 건 좀 보드에 올라타는 타이밍이 빨랐슴다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今のだと早過ぎ……分かりました！」"
translation = "「지금 건 너무 빨랐다…… 알겠습니다!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「焦らず、じっくり波のピークを見極めてクダさい。最初は大きな波にこだわる必要はナイので！」"
translation = "「서두르지 말고 느긋하게 파도의 피크를 판별해 주심쇼. 처음부터 큰 파도에 집착할 필요는 없슴다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい！」"
translation = "「네!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「波の感覚に身を任せて……今！\u3000っ……ボードの上でバランスを……お、おぉぉ……！」"
translation = "「파도의 감각에 몸을 맡기고…… 지금! 윽…… 보드 위에서 균형을…… 오, 오오오……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ……ダメッ……落ちる！\u3000きゃんっ！？」"
translation = "「앗…… 안 돼…… 떨어진다! 꺄앙!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぷはっ……！\u3000はぁ……はぁ……また失敗……！」"
translation = "「푸하……! 하아…… 하아…… 또 실패……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョーはもう、すっかり波にノれるようにナリましたね～！\u3000波の感覚を既に掴んでいたのが、やはり大きいです」"
translation = "「회장님은 이제 완전히 파도를 탈 수 있게 되었네여~! 파도의 감각을 이미 잡고 있었던 게 역시 큼다」"

[[dialogue]]
speaker = "unk"
original = "大きい波に乗れると気持ちいいな！"
translation = "「큰 파도를 타니까 기분 좋네!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「カイチョーがサーフィン好きになってクレたみたいで、ワタシとってもハッピーで～す♪\u3000趣味ナカマ出来て嬉しい♪」"
translation = "「회장님이 서핑을 좋아하게 되어줘서 저도 정말 해피함다♪ 취미 동료가 생겨서 기뻐여♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フィオナもナイスガッツで～す！\u3000今一瞬だけ、ボードの上に立ててました。一日だけでＢＩＧウマくなってるとオモいます！」"
translation = "「피오나도 나이스 가츠임다! 방금 아주 잠깐 보드 위에 서 있었슴다. 하루 만에 BIG하게 실력이 늘었다고 생각함다!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ……ふぅ……ありがとうございます」"
translation = "「하아…… 후우…… 감사합니다」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「皆でサーフィン出来るの楽しくて、休憩なしで練習ツヅケてしまいました。気付けば、日も大分落ちてキテいますし……」"
translation = "「다 같이 서핑하는 게 즐거워서 휴식 없이 연습을 계속해 버렸슴다. 정신을 차려보니 해도 많이 저물어 가고 있고……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「今日はそろそろ、練習キリ上げましょうか。２人とも疲れてマスよね？」"
translation = "「오늘은 슬슬 연습을 마무리할까여? 두 분 다 지치셨져?」"

[[dialogue]]
speaker = "unk"
original = "そうだな。今日のところは……"
translation = "「그렇네. 오늘은 이쯤에서……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……いえ、まだ行けます！」"
translation = "「……아니요, 아직 더 할 수 있어요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「オゥ？」"
translation = "「오우?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今、惜しいところまで来ているんです。あと少しで感覚が掴めそうな……届きそうなところまで……！」"
translation = "「지금 아쉬운 지점까지 왔어요. 조금만 더 하면 감각을 잡을 수 있을 것 같은…… 닿을 것 같은 곳까지……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「感覚が研ぎ澄まされている、今この瞬間、逃したくないんです。何より――」"
translation = "「감각이 날카로워진 지금 이 순간을 놓치고 싶지 않아요. 무엇보다――」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長が既にボードに乗れているのに、私も負けていられません……！」"
translation = "「히노미야 회장님이 이미 보드를 타고 계신데 저도 지고 있을 수는 없어요……!」"

[[dialogue]]
speaker = "unk"
original = "（い、意外と負けず嫌いなのか……？）"
translation = "(이, 의외로 지기 싫어하는 성격인가……?)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だからリップルさん、お願いします！\u3000このまま練習を続けさせて下さい！\u3000私は、このまま諦めたくないんです……！」"
translation = "「그러니까 리플 씨, 부탁드려요! 이대로 연습을 계속하게 해주세요! 저는 이대로 포기하고 싶지 않아요……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フィオナ、瞳に闘志の炎がメラメラ燃えてイルのが見えます……！」"
translation = "「피오나, 눈동자에 투지의 불꽃이 이글이글 타오르는 게 보임다……!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ソウですよね！\u3000ワタシにはその気持ち、よく分かります！\u3000ワタシも上手く行かなくても、リゾート結界の完成を諦めたりはデキませんでしたから！」"
translation = "「그렇져! 저에게는 그 마음, 잘 이해됨다! 저도 잘 안 풀려도 리조트 결계의 완성을 포기하거나 할 수는 없었으니까여!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「そういうことなら、フィオナの納得がユクまで、ワタシ練習に付き合います！\u3000波に乗る感覚、掴んでみせてクダさい！」"
translation = "「그런 거라면 피오나가 납득할 때까지 저도 연습에 어울려 주겠슴다! 파도를 타는 감각, 잡아 보심쇼!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リップルさん、ありがとうございます！\u3000緋宮会長も、どうかお願いします！\u3000私にサーフィンの感覚を教えて下さい！」"
translation = "「리플 씨, 감사합니다! 히노미야 회장님도 부디 부탁드려요! 저에게 서핑의 감각을 가르쳐 주세요!」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000俺！？"
translation = "「엣!? 나!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「――まだ自分も教わるレベルだから無理？\u3000いえ、そんなことありません！\u3000私にとっては現在進行形で上達している緋宮会長の感覚も教えて欲しいんです！」"
translation = "「――아직 자신도 배우는 단계라 무리라고요? 아니요, 그렇지 않아요! 저에게는 현재 진행형으로 실력이 늘고 있는 히노미야 회장님의 감각도 배우고 싶어요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「フィオナの熱いオモイに、ワタシも何だか燃えてキました！\u3000こうなったら、今日はとことん３人でサーフィンしましょう！」"
translation = "「피오나의 뜨거운 마음에 저도 왠지 불타오르기 시작했슴다! 이렇게 된 이상 오늘은 끝까지 셋이서 서핑해 보져!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい！\u3000２人共ご指導、よろしくお願いします！」"
translation = "「네! 두 분 다 지도 부탁드립니다!」"

[[dialogue]]
speaker = "unk"
original = "え……ええぇぇぇ～～～っ！？"
translation = "「에…… 에에에에엑～～～!?」"

[[dialogue]]
speaker = "unk"
original = "その日の練習は、夜中まで続いた――"
translation = "그날의 연습은 밤늦게까지 계속되었다――"

[[dialogue]]
speaker = "unk"
original = "翌日。合宿６日目――"
translation = "다음 날. 합숙 6일째――"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……いい波が来てるのが分かります！\u3000行きます！\u3000テイクオフ！」"
translation = "「……좋은 파도가 오고 있는 게 느껴져요! 갑니다! 테이크오프!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はあぁっ！\u3000エアリアル！」"
translation = "「하아앗! 에어리얼!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぅっ！\u3000やりました！」"
translation = "「후우! 해냈어요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リップルさん、波の高い部分からジャンプする技『エアリアル』、成功しましたよ！」"
translation = "「리플 씨, 파도의 높은 부분에서 점프하는 기술 『에어리얼』, 성공했어요!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「スゴい！\u3000本当に、ＢＩＧスゴいです、フィオナ！」"
translation = "「대단함다! 정말로 BIG하게 대단해여, 피오나!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ワタシ、感動しました！\u3000ボードに立てるようになるだけでなく、１日でエアリアルまで出来るようになるなんて……！」"
translation = "「저, 감동했슴다! 보드에 설 수 있게 될 뿐만 아니라 하루 만에 에어리얼까지 할 수 있게 되다니……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「昨日、サーフィンの練習を始めたっていうのは聞いてたけど……とんでもない学習能力ね！\u3000さすがフィオナだわ！」"
translation = "「어제 서핑 연습을 시작했다고는 들었지만…… 엄청난 학습 능력이네! 역시 피오나야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「凄い……！\u3000流星学園最強の星徒会長は、やっぱり普通じゃないね……！」"
translation = "「굉장해……! 유성 학원 최강의 성도회장은 역시 보통이 아니네……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ♪\u3000今のフィオナちゃん、何だか活き活きしてるわ。とっても楽しそう♪」"
translation = "「후후♪ 지금 피오나 짱, 왠지 생기발랄하네. 무척 즐거워 보여♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かに。雰囲気が明るくなったような気がします」"
translation = "「확실히. 분위기가 밝아진 것 같은 기분이 듭니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長も、見てくれましたか？\u3000私もサーフィンが出来るようになりましたよ！」"
translation = "「히노미야 회장님도 보셨나요? 저도 서핑을 할 수 있게 되었어요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですから今日は、更なるテクニックの習得に挑戦したいと思っています！\u3000さあ、緋宮会長も一緒に練習しましょう！」"
translation = "「그러니까 오늘은 더 높은 테크닉 습득에 도전하고 싶어요! 자, 히노미야 회장님도 같이 연습해요!」"

[[dialogue]]
speaker = "unk"
original = "ま、まだやれる……だと……？"
translation = "「아, 아직 더 할 수 있다고……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……って、会長！？\u3000何か海に沈んでない！？」"
translation = "「……잠깐, 회장!? 뭔가 바다에 가라앉아 있지 않아!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え！？」"
translation = "「에!?」"

[[dialogue]]
speaker = "unk"
original = "フィオナ、恐ろしい子……ガクリ"
translation = "「피오나, 무서운 아이…… 털썩」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長！？\u3000大丈夫ですか、緋宮会長～！？」"
translation = "「히노미야 회장님!? 괜찮으세요, 히노미야 회장님~!」"

[[dialogue]]
speaker = "unk"
original = "俺はハードな練習で先に力尽きたものの、フィオナはサーフィンという新しい趣味に目覚めたようで、その後も楽しそうに練習を続けるのだった――"
translation = "나는 하드한 연습으로 먼저 힘이 다했지만, 피오나는 서핑이라는 새로운 취미에 눈을 뜬 듯 그 후로도 즐겁게 연습을 계속하는 것이었다――"

