[[dialogue]]
speaker = "ロロット"
original = "「ひーーん！\u3000わたしのトントロがぁ～～」"
translation = "「히잉! 제 톤토로가아~~」"

[[dialogue]]
speaker = "ナナカ"
original = "「まあまあ、まだこれくらいなら絆創膏で直せそうじゃん」"
translation = "「자자, 아직 이 정도면 반창고로 고칠 수 있겠는데.」"

[[dialogue]]
speaker = "ロロット"
original = "「これ以上はやらせませんよぉー！」"
translation = "「이 이상은 하게 두지 않겠어요오!」"

