[[dialogue]]
speaker = "unk"
original = "第２話,セシアの愛するもの,P"
translation = "제2화, 세시아가 사랑하는 것, P"

[[dialogue]]
speaker = "unk"
original = "ある日、図書館に資料を探しにいくと、熱心な様子で本を読んでいるセシアを見かけた。なんの本かと尋ねてみると――"
translation = "어느 날 도서관에 자료를 찾으러 가자 열심히 책을 읽고 있는 세시아를 발견했다. 무슨 책이냐고 묻자──"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ああ、会長。こんにちは。――これ？\u3000流星市国の歴史について書かれている本よ」"
translation = "「아, 회장. 안녕하세요. ──이거? 유성시국의 역사에 대해 쓰인 책이야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「転生したことで、わたくしの中に蓄積されていた知識の多くが失われてしまったから、こうして、改めて蓄積し直しているの」"
translation = "「전생하면서 내 안에 축적되어 있던 지식의 상당수가 소실되었으니까, 이렇게 다시 축적하고 있는 거야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――楽しそうに見えた？\u3000ええ、わたくしは世界の歴史が好きよ」"
translation = "「──즐거워 보였어? 응, 나는 세계의 역사를 좋아해.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「記憶は失われても、そう強く感じるわ。転生前のわたくしも、きっと同じだったはず」"
translation = "「기억은 잃었어도 그렇게 강하게 느껴져. 전생 전의 나도 분명 같았을 거야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「歴史とは、人々が今日まで蓄積してきた成長の記録――」"
translation = "「역사란 사람들이 오늘날까지 축적해 온 성장의 기록──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「決して、綺麗なことばかりではないわ。たとえば戦争のような、大きな失敗もある。でも、それらの積み重ねがあって、今日という日が存在している」"
translation = "「결코 아름다운 일만 있는 건 아니야. 예를 들어 전쟁 같은 커다란 실패도 있지. 하지만 그런 것들의 쌓임이 있어 오늘이라는 날이 존재하는 거야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「私は良きも悪しきもひっくるめて、世界の歴史を愛おしいと感じるわ」"
translation = "「나는 좋은 것이든 나쁜 것이든 통틀어서 세계의 역사를 사랑스럽다고 느껴.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それと同じくらい、歴史を積み重ねる中で、人々が生み出してきた文化もね」"
translation = "「그것과 비슷할 정도로 역사를 쌓아가는 중에 사람들이 만들어낸 문화도 말이야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「この間のクリスマスも楽しかったわ。かつての記憶を失っていても、わたくしの頭の中には、クリスマスの基本的知識があったの」"
translation = "「지난번 크리스마스도 즐거웠어. 과거의 기억을 잃었어도 내 머릿속에는 크리스마스의 기본적인 지식이 있었지.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だけれど、実際にプレゼントを配って、クリスマスを体験してみると、知識だけではない蓄積を沢山得ることができた」"
translation = "「그렇지만 실제로 선물을 나눠주고 크리스마스를 체험해보니 지식뿐만이 아닌 축적을 많이 얻을 수 있었어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「紅明ママやヨミヨミ、それに会長。あなたたちとの素敵な思い出をね」"
translation = "「코우메이 마마나 요미요미, 그리고 회장. 당신들과의 멋진 추억을 말이야.」"

[[dialogue]]
speaker = "unk"
original = "そう言ってもらえると光栄だな"
translation = "그렇게 말해주니 영광이네"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ、みんなのおかげで、わたくしはクリスマスがもっと好きになったわ」"
translation = "「후훗, 모두 덕분에 나는 크리스마스가 더 좋아졌어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「次はクリスマスだけじゃなくて、ほかの文化もみんなと体験してみたい。想像するだけで心がわくわくしてくるわ♪」"
translation = "「다음은 크리스마스뿐만 아니라 다른 문화도 모두와 체험해보고 싶어. 상상하는 것만으로도 마음이 설레♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――でも、だからこそ、そんな文化や歴史を否定し、世界がこれまで積み重ねてきたものを無に返すリクリエを、わたくしは許せない」"
translation = "「──하지만 그렇기에 그런 문화나 역사를 부정하고 세계가 지금까지 쌓아온 것들을 무로 돌리는 리크리에를 나는 용서할 수 없어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「転生前の記憶は失われているから、わたくしの想像でしかないけれど……」"
translation = "「전생 전의 기억은 잃었으니 내 상상일 뿐이지만……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「アウクセシアは、他の誰よりも、何よりもリクリエを許せないからこそ、これまでの蓄積を犠牲にしてでも、転生の道を選んだのだと思うの」"
translation = "「아우크세시아는 그 누구보다, 그 무엇보다 리크리에를 용서할 수 없었기에 지금까지의 축적을 희생해서라도 전생의 길을 택한 거라고 생각해.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「今のわたくしも、身動きが取れない状況だったなら、きっと同じ選択をしたはずだから」"
translation = "「지금의 나도 몸을 움직일 수 없는 상황이었다면 분명 같은 선택을 했을 테니까.」"

[[dialogue]]
speaker = "unk"
original = "セシアはもう、犠牲になる必要はない"
translation = "세시아는 이제 희생될 필요 없어"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "今はもう、セシアの周りには俺たちがいる。だから、セシア１人を犠牲になんかさせたりしない。"
translation = "지금은 이제 세시아 주변에 우리가 있어. 그러니까 세시아 혼자 희생하게 두지 않을 거야."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――だから、これからは一緒に戦おうって？」"
translation = "「──그러니까 이제부터는 함께 싸우자고?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……ふふっ、そうね。そうだわ」"
translation = "「……후훗, 그렇네. 그렇구나.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしは、蓄積を司る守護天使。だというのに、心のどこかでまだ、自分が何とかしなくちゃと思っていた……」"
translation = "「나는 축적을 관장하는 수호천사. 그런데도 마음 한구석에선 아직 내가 어떻게든 해야 한다고 생각하고 있었어……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「だけど、そうじゃない。わたくしはこれから星騎士の一員として、みんなと一緒に、リクリエを打ち破る為の力を蓄積していけばいいのね」"
translation = "「하지만 그게 아니야. 나는 이제부터 성기사의 일원으로서 모두와 함께 리크리에를 타파하기 위한 힘을 축적해나가면 되는 거네.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ああ、そう思ったら、わたくし何だか楽しくなってきたわ」"
translation = "「아아, 그렇게 생각하니 나 왠지 즐거워졌어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「これってクリスマスの時と一緒だもの。みんなと一緒に、憎きリクリエを打ち破る――」"
translation = "「이건 크리스마스 때와 마찬가지인걸. 모두와 함께 미운 리크리에를 타파하는 것──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それはきっと、素敵な思い出になるに違いないわ♪」"
translation = "「그건 분명 멋진 추억이 될 게 틀림없어♪」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「その為にはまず、みんなと絆を深めて、『仲間』にならないといけないわね」"
translation = "「그러기 위해선 우선 모두와 유대를 깊게 해서 『동료』가 되어야겠네.」"

[[dialogue]]
speaker = "unk"
original = "セシアのことはもう、仲間だと思ってるよ？"
translation = "세시아는 이미 동료라고 생각하고 있어"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ、ありがとう、会長。でも、ちゃんと口に出して伝えるのは大事でしょう？」"
translation = "「후훗, 고마워, 회장. 하지만 제대로 입 밖으로 내어 전하는 건 중요하잖아?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「男女が一緒になりたいという気持ちを伝え合って、結婚の約束をするように。だから――」"
translation = "「남녀가 함께하고 싶다는 마음을 서로 전하고 결혼 약속을 하는 것처럼. 그러니까──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「会長、わたくしの仲間になって欲しいわ」"
translation = "「회장, 내 동료가 되어주렴.」"

[[dialogue]]
speaker = "unk"
original = "セシアはそう言って、小指を立てて差し出してくる。"
translation = "세시아는 그렇게 말하며 새끼손가락을 세워 내민다."

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ、そうよ。指切りげんまん。この国では、約束を交わす時にこうするのでしょう？\u3000わたくし、１度やってみたかったの」"
translation = "「응, 맞아. 손가락 걸기. 이 나라에선 약속을 나눌 때 이렇게 하는 거지? 나 한 번 해보고 싶었어.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それじゃあ、いくわよ？\u3000指切りげんまん、嘘ついたら……確か、針を１０００本呑ますんだったかしら？」"
translation = "「그럼 간다? 손가락 걸고 약속, 거짓말하면…… 분명 바늘 1000개 삼키기였던가?」"

[[dialogue]]
speaker = "unk"
original = "それはあくまで例えだからね！？"
translation = "그건 어디까지나 비유니까 말이야!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ふふっ、わかってるわ。でも、なにか罰があった方が楽しいと思わない？」"
translation = "「후훗, 알고 있어. 하지만 뭔가 벌이 있는 편이 더 즐겁지 않겠니?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――好きな食べ物を奢る？\u3000それじゃあ、会長が約束を破った時には、大聖堂カフェテリアの旗付きチキンライスを奢ってもらおうかしら」"
translation = "「──좋아하는 음식을 사주기? 그렇다면 회장이 약속을 어겼을 때는 대성당 카페테리아의 깃발 꽂힌 치킨라이스를 얻어먹을까.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ。わたくしのお気に入りなの。味もほっぺたが落ちるくらい美味しいし、旗を倒さないように食べるのが、最近のマイブームよ」"
translation = "「응. 내가 제일 좋아하는 거야. 맛도 뺨이 떨어질 정도로 맛있고, 깃발을 쓰러뜨리지 않게 먹는 게 요즘 내 마이붐이야.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「――旗付きだから恥ずかしくて、まだ食べたことがない？\u3000それはもったいないわ」"
translation = "「──깃발이 꽂혀 있어서 부끄러워 아직 못 먹어봤어? 그건 아까운걸.」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ちょうどお腹も空いてきたし、仲間としての絆を深める為にも、一緒にチキンライスを食べにいきましょう」"
translation = "「마침 배도 고파졌으니 동료로서의 유대를 깊게 하기 위해서라도 함께 치킨라이스를 먹으러 가자.」"

[[dialogue]]
speaker = "unk"
original = "なら、せっかくだし勝負する？"
translation = "그럼 모처럼이니 승부할래?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「あら、どちらがギリギリまで旗を倒さずにいられるかってこと？\u3000ふふっ、誰かと勝負するなんて考えたことなかったけど――」"
translation = "「어머, 누가 아슬아슬할 때까지 깃발을 안 쓰러뜨리고 버티나 하는 거니? 후훗, 누군가와 승부할 생각은 못 해봤는데──」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「それはとても楽しそうだわ♪\u3000わたくし、毎日挑戦してるんだから、負けないわよ？」"
translation = "「그거 아주 즐거울 것 같아♪ 나 매일 도전하고 있으니까 지지 않을 거야?」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、大聖堂カフェテリアに向かった。"
translation = "그러고 나서 우리는 대성당 카페테리아로 향했다."

[[dialogue]]
speaker = "unk"
original = "仲良く食べたチキンライスは、セシアの言う通り絶品で、また一緒に食べようと、再び指切りげんまんを交わしたのだった――"
translation = "사이좋게 먹은 치킨라이스는 세시아의 말대로 일품이었고, 또 같이 먹자며 다시 한번 손가락 걸고 약속을 나누었다──"

