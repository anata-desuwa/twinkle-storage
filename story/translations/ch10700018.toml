[[dialogue]]
speaker = "ウズメイア"
original = "「デート、すっごく楽しかった～♪\u3000ありがとね、会長くん<emoji=heart04>」"
translation = "「데이트, 정말 즐거웠어~♪ 고마워, 회장군<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「すっかり陽も暮れちゃったねー。この後はどうしよっか。このままバイバイしちゃう感じ？」"
translation = "「어느새 해가 다 저물어 버렸네. 이 다음엔 어떡할까? 이대로 바이바이하는 느낌?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「……なーんちゃって。わかってるよん。あたし、ちゃーんと夜も予定空けてあるから♪」"
translation = "「……농~담이야. 알고 있다구. 나, 바~아로 밤에도 예정 비워 뒀으니까♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「じゃあ、会長くん。いつものホテル、行っちゃおっか？<emoji=heart04>」"
translation = "「자, 회장군. 언제나 가던 호텔, 가 버릴까?<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「今日はちょ～っと試してみたいことがあるんだよね～。というわけで、ハイこれ、よろしく～♪」"
translation = "「오늘은 조~금 시험해 보고 싶은 게 있단 말이지~. 그런 의미에서, 자 이거, 잘 부탁해~♪」"

[[dialogue]]
speaker = "クロト"
original = "「え？\u3000これ……本当にするのかっ？」"
translation = "「에? 이거…… 정말로 하는 거야?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「もっちろん！\u3000ほら、ＤＩＳＣで調べて、縛り方もばっちりだから。この通りにぎゅぎゅ～ってやっちゃって♪」"
translation = "「무우울론이지! 자, DISC로 조사해서, 묶는 법도 완벽하니까. 이대로 꼬옥꼬옥~ 하고 해 줘♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「じゃーんっ♪\u3000どうかなぁ、会長くん。おち○ぽ興奮した？\u3000興奮した～？」"
translation = "「쨔쟌~♪ 어때, 회장군. 자지 흥분했어? 흥분했어~?」"

[[dialogue]]
speaker = "unk"
original = "ウズメの真っ白な肌に食い込む幾重もの縄。お尻の穴まで丸見えの後背位の体勢……ムラムラしないわけがないのだけど。"
translation = "우즈메의 새하얀 피부에 파고드는 몇 겹의 밧줄. 엉덩이 구멍까지 훤히 보이는 후배위 자세…… 성욕이 끓어오르지 않을 리 없지만."

[[dialogue]]
speaker = "クロト"
original = "「言われた通りに縛ったけど、痛くないか？」"
translation = "「말한 대로 묶었는데, 아프지는 않아?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ぜんぜんへーき！\u3000あたし、体やわらかいし♪\u3000それに会長くん、縛ってる時も優しかったじゃん？\u3000問題ないって～<emoji=heart04>」"
translation = "「저언혀 괜찮아! 나, 몸 유연하니까♪ 게다가 회장군, 묶을 때도 다정했잖아? 문제 없다니까~<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んふふ～、これ１回やってみたかったんだよね。着物と言えば芸者。芸者と言えば緊縛エッチ！\u3000だもんねっ♪」"
translation = "「음후후~, 이거 한 번 해 보고 싶었거든. 기모노 하면 게이샤. 게이샤 하면 긴박 엣치! 니까 말야♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はぁあ<emoji=heart04>\u3000……おち○ぽ、もう勃起しちゃってる。きゃぁ～♪\u3000お代官様ぁ、お許しくださいませぇ～<emoji=heart04>」"
translation = "「하아아<emoji=heart04> ……자지, 벌써 발기해 버렸어. 꺄아~♪ 사또나으리, 용서해 주시옵소서어~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "日本文化が好きで、また好奇心も強いウズメ。彼女は何かを見たり聞いたりするたびにすぐ体験したがる節がある。"
translation = "일본 문화를 좋아하고, 또 호기심도 강한 우즈메. 그녀는 무언가를 보거나 들을 때마다 곧바로 체험하고 싶어 하는 경향이 있다."

[[dialogue]]
speaker = "unk"
original = "先日は４８手を試したいと言われて、月見茶臼だの絞り芙蓉だの、もはや文字だけではよくわからないプレイを散々こなしたものだった。"
translation = "전날에는 48수를 시험해 보고 싶다고 해서, 츠키미챠우스니 시보리후요니 하는, 이제는 글자만 봐서는 잘 알 수 없는 플레이를 실컷 소화해 낸 참이었다."

[[dialogue]]
speaker = "クロト"
original = "「ウズメと付き合ってると、知らなくていい知識ばっかり増える気がするなぁ……」"
translation = "「우즈메랑 사귀다 보면, 몰라도 될 지식만 늘어나는 기분이네……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ふふふ、良いではないか、良いではないか～<emoji=heart04>」"
translation = "「후후후, 좋지 아니한가, 좋지 아니한가~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「言う人が逆だろ……まったく」"
translation = "「말하는 사람이 반대잖아…… 정말이지」"

[[dialogue]]
speaker = "unk"
original = "目の前で揺れるウズメのお尻を掴んで、勃起したペニスをあてがって──"
translation = "눈앞에서 흔들리는 우즈메의 엉덩이를 움켜잡고, 발기한 페니스를 갖다 대며──"

[[dialogue]]
speaker = "ウズメイア"
original = "「んっ──は、ぁぁ、あぁあ～っ<emoji=heart04>\u3000おち○ぽ、奥まで来たぁっ……♪」"
translation = "「응──하, 아아, 아아아~앗<emoji=heart04> 자지, 안쪽까지 왔어어……♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ、はぁあー……すごぉ♪\u3000いつもより太いかもー……んんっ<emoji=heart04>\u3000ぐいぃ～って広げられて、るぅー……<emoji=heart04>」"
translation = "「앗, 하아아…… 굉장해♪ 평소보다 굵을지도…… 응읏<emoji=heart04> 꾸우욱~ 하고 벌려지, 고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「身動きできないまま……んっ<emoji=heart04>\u3000おち○ぽ突っ込まれるの、こ、これヤバイかもっ……<emoji=heart04>」"
translation = "「꼼짝도 못한 채…… 응읏<emoji=heart04> 자지가 박히는 거, 이, 이거 위험할지도……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ぁ、あ、ぁっ……<emoji=heart04>\u3000動いてないのに、おち○ぽビクビクしてっ……会長くんも興奮しちゃってる？」"
translation = "「아, 아, 앗……<emoji=heart04> 움직이지 않는데도, 자지가 움찔움찔거려서…… 회장군도 흥분해 버렸어?」"

[[dialogue]]
speaker = "unk"
original = "さっきまで好きな女の子を縛ることに抵抗があったのに……何だろう、これ。ウズメを縛った縄を握りながらの挿入……"
translation = "방금 전까지 좋아하는 여자아이를 묶는 것에 저항감이 있었는데…… 뭘까, 이건. 우즈메를 묶은 밧줄을 쥐고 하는 삽입……"

[[dialogue]]
speaker = "unk"
original = "男の本能に訴えかけてくるような、ふつふつとＳっ気が湧き上がってくるような──"
translation = "남자의 본능에 호소하는 듯한, 불쑥불쑥 가학심(S기)이 솟아오르는 듯한──"

[[dialogue]]
speaker = "ウズメイア"
original = "「それじゃあ来てっ……おち○ぽいっぱい動かして、気持ちよくなってね<emoji=heart04>」"
translation = "「그러면 어서 와서…… 자지 잔뜩 움직여서, 기분 좋아져야 해<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぁっ、あ、ぁああ、ふあぁ、あ、ぁあっ<emoji=heart04>\u3000おち○ぽ、動いてるっ……ん、ふぅ、んんんっ<emoji=heart04>」"
translation = "「응응앗, 아, 아아아, 후아아, 아, 아앗<emoji=heart04> 자지, 움직이고 있어…… 응, 후우, 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あー、ヤバ、ヤバヤバっ<emoji=heart04>\u3000身動きできないの、想像以上に──んっ、うぅぅっ<emoji=heart04>\u3000すご、ぃ、かもぉっ<emoji=heart04>」"
translation = "「아─, 위험, 위험위험해<emoji=heart04> 꼼짝도 못 하는 거, 상상 이상으로── 응읏, 우으윽<emoji=heart04> 굉장, 할, 지도오<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おち○ぽの気持ちいいやつが、ぅあっ、逃がせないから、おま○こに響く、ぅっ──ぁ、あぁぁあ～っ<emoji=heart04>」"
translation = "「자지의 기분 좋은 부분이, 으앗, 도망칠 수 없으니까, 보지에 울려, 윽──아, 아아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感にあえぐウズメの唇がつややかに濡れていて、俺はペニスを深く挿入しながら、覆いかぶさるようにしてキスをした。"
translation = "쾌감에 허덕이는 우즈메의 입술이 윤기 있게 젖어 있었고, 나는 페니스를 깊숙이 삽입하면서 덮어씌우듯 키스를 했다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んぅちゅるっ、れええ、ちゅる、ちゅぅ、ちゅぱぁ<emoji=heart04>\u3000んっふぅ、ふぅっ……会長くん、キス好きだねぇ……んふふっ<emoji=heart04>」"
translation = "「응으츄릅, 레에에, 츄릅, 츄으, 츄파아<emoji=heart04> 응후우, 후우…… 회장군, 키스 좋아하네에…… 응후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウズメだって好きなくせに、とこぼしながら夢中で舌を絡める。"
translation = "우즈메도 좋아하는 주제에, 라고 중얼거리며 정신없이 혀를 얽는다."

[[dialogue]]
speaker = "ウズメイア"
original = "「ちゅぅちゅるっ、んちゅるぅ、れぇえっ、ちゅぱ、んちゅるっ……んふぅっ<emoji=heart04>\u3000縛られながらキスって、なんかトーサク的ぃ……♪」"
translation = "「츄우츄릅, 응츄릅, 레에엣, 츄파, 응츄릅…… 응후읏<emoji=heart04> 묶인 채로 키스라니, 왠지 변태적이야아……♪」"

[[dialogue]]
speaker = "unk"
original = "ＳＭプレイなのに愛情のあるキスを行う──確かにウズメの言うとおり倒錯的な気分になってくる。"
translation = "SM 플레이인데도 애정 어린 키스를 한다── 과연 우즈메의 말대로 도착적인 기분이 든다."

[[dialogue]]
speaker = "ウズメイア"
original = "「ちゅぅちゅぱ、れろれる、んちゅる、へろれろぉ……んちゅる、ちゅぱぁっ……<emoji=heart04>」"
translation = "「츄우츄파, 레로레로, 응츄릅, 헤로레로오…… 응츄릅, 츄파앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んれぇえろっ<emoji=heart04>\u3000れろれろ、んちゅるぅ、れぇ～っ……んちゅぅ、ちゅるるっ、ちゅぱっ<emoji=heart04>\u3000んぅ、会長くん<emoji=heart04>\u3000ちゅぅっ<emoji=heart04>」"
translation = "「응레에에로<emoji=heart04> 레로레로, 응츄르으, 레에~…… 응츄우, 츄르르, 츄팟<emoji=heart04> 응으, 회장군<emoji=heart04> 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んー……会長くんとキスするの、好きだけどぉっ……せっかくの緊縛エッチだし、も～っと乱暴なの、して欲しいかも～？」"
translation = "「음─…… 회장군이랑 키스하는 거, 좋지만아…… 어렵게 긴박 엣치 중이니까, 저어~ㅁ 더 난폭한 거, 해 줬으면 할지도~?」"

[[dialogue]]
speaker = "クロト"
original = "「……例えば？」"
translation = "「……예를 들면?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「そだね。縄をぐい～って、引っ張りながら突くとか？」"
translation = "「그렇네. 밧줄을 꾸우욱~ 하고, 잡아당기면서 박는다던가?」"

[[dialogue]]
speaker = "クロト"
original = "「いや、でもなぁ……」"
translation = "「아니, 그치만 말야……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ぶーぶー。お代官様のくせにぃ、芸者さんのリクエストが聞けぬと申すかぁ～？」"
translation = "「부우부우. 사또나으리 주제에에, 게이샤의 리퀘스트를 듣지 못하겠다고 하시는 것이오~?」"

[[dialogue]]
speaker = "unk"
original = "どっちの立場が上なんだよと苦笑しながら、言うとおりにすることにした。"
translation = "어느 쪽 입장이 위인 거냐며 쓴웃음을 지으면서도, 말하는 대로 하기로 했다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んっ！？<emoji=heart04>\u3000ぁーっあっ<emoji=heart04>\u3000あぁぁあっ、はぁ、あぁっ<emoji=heart04>\u3000おち○ぽ、さっきよりキくっ<emoji=heart04>\u3000キいちゃう、ぅうぅ～っ……<emoji=heart04>」"
translation = "「응!?<emoji=heart04> 아─앗 앗<emoji=heart04> 아아아앗, 하아, 아앗<emoji=heart04> 자지, 아까보다 잘 박혀<emoji=heart04> 가 버려, 어어어~억……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もうこれ以上ないと思っていたのに、さらにウズメの女性器の締め付けがきつくなった……！？"
translation = "이제 더는 없으리라 생각했는데, 우즈메의 보지의 조임이 한층 더 거세졌다……!?"

[[dialogue]]
speaker = "ウズメイア"
original = "「は、はぁああっ<emoji=heart04>\u3000あ、あたし、これ好きかもぉっ<emoji=heart04>\u3000会長くんの、わんちゃんになったみたい、あ、あぁ、あぁ<emoji=heart04>」"
translation = "「하, 하아아앗<emoji=heart04> 나, 이거 좋을지도오<emoji=heart04> 회장군의, 강아지가 된 것 같아, 아, 아아, 아아<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おち○ぽすっご、また太くなったっ<emoji=heart04>\u3000お、ぁっ<emoji=heart04>\u3000んんぅ、ふぅうっ<emoji=heart04>\u3000んっ、んっ、んっ、んっ、んんぅうっ<emoji=heart04>」"
translation = "「자지 굉장해, 또 굵어졌어<emoji=heart04> 오, 앗<emoji=heart04> 응응으, 후우우윽<emoji=heart04> 응, 응, 응, 응, 응응으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はぁっ、はぁあっ<emoji=heart04>\u3000会長くぅんっ<emoji=heart04>\u3000も、もっとすごいのしてっ、普段しないようなの、して欲しいかもっ♪」"
translation = "「하앗, 하아앗<emoji=heart04> 회장구운<emoji=heart04> 저, 좀 더 굉장한 거 해 줘, 평소에 안 하는 것 같은 거, 해 줬으면 해♪」"

[[dialogue]]
speaker = "クロト"
original = "「どんなこと、して欲しいんだっ……？」"
translation = "「어떤 걸, 해 줬으면 좋겠는데……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、んんっ……えっとぉ──お、お尻っ<emoji=heart04>\u3000お尻、ぺちんって、ぶって<emoji=heart04>」"
translation = "「아, 응응…… 그러니까아── 어, 엉덩이<emoji=heart04> 엉덩이, 찰싹 하고, 때려 줘<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おち○ぽパンパンされながら、お尻ぶたれるのって、あ、あはっ<emoji=heart04>\u3000そ、それっぽい感じ、しないっ？<emoji=heart04>」"
translation = "「자지로 팡팡 당하면서, 엉덩이 맞는 거, 아, 아하<emoji=heart04> 그, 그런 느낌, 나지 않아?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンするたびに波打つウズメの丸いお尻を叩く──その様を想像すると、背筋がゾクゾクと震えた。"
translation = "피스톤질을 할 때마다 출렁이는 우즈메의 둥근 엉덩이를 때린다── 그 광경을 상상하자 등줄기가 오싹하게 떨렸다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んっ──ぁ、あぁぁああっ<emoji=heart04>\u3000んっ、ふぅうっ<emoji=heart04>」"
translation = "「응──아, 아아아아앗<emoji=heart04> 응, 후우우윽<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「う──ぁっ！\u3000くぅっ……叩いた瞬間、めっちゃくちゃ締まった……！」"
translation = "「으──앗! 쿠윽…… 때린 순간, 어마어마하게 조였어……!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ど、どうしよぉっ……このエッチ、まじヤバっ……ぁ、もっと、もっとしてぇっ……<emoji=heart04>」"
translation = "「어, 어떡해에…… 이 엣치, 진짜 대박이야…… 아, 좀 더, 좀 더 해 줘어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンされながらもじもじと動くウズメのお尻に、さっきよりも強く平手をする。"
translation = "피스톤질을 받으며 꼼지락거리며 움직이는 우즈메의 엉덩이에, 아까보다 더 강하게 손바닥을 날린다."

[[dialogue]]
speaker = "ウズメイア"
original = "「ぁぁぁぁんんっ！<emoji=heart04>\u3000んっふぅう、んんぁっ<emoji=heart04>\u3000会長くん、それいい、縄、ぐいってしながら、お尻いじめてぇっ<emoji=heart04>」"
translation = "「아아아아앙응!<emoji=heart04> 응후우우, 응응아<emoji=heart04> 회장군, 그거 좋아, 밧줄, 쭈욱 당기면서, 엉덩이 괴롭혀 줘어<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ひっ──うぅう！<emoji=heart04>\u3000んっふぅ、んんぅ、ふぁ、ぁ、あぁっ<emoji=heart04>」"
translation = "「히익──으으윽!<emoji=heart04> 응후우, 응응으, 화, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ぶたれるの……好きなのかっ？\u3000ウズメ！」"
translation = "「맞는 게…… 좋은 거냐? 우즈메!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ひぁぁあんん！<emoji=heart04>\u3000う、うんっ<emoji=heart04>\u3000これ好きっ<emoji=heart04>\u3000好きな人にいじめられるのっ、ぁ、ぁ、あぁっ<emoji=heart04>\u3000気持ちいいよ、ぉ、ぉっ<emoji=heart04>」"
translation = "「히아아앙응!<emoji=heart04> 으, 응<emoji=heart04> 이거 좋아<emoji=heart04> 좋아하는 사람한테 괴롭힘당하는 거, 아, 아, 아앗<emoji=heart04> 기분 좋아, 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膝から下をぱたぱた動かしながら喜びのあえぎを上げるウズメ。今までにも何度も交わってきたけれど、こんなにも反応が良いのは初めてだった。"
translation = "무릎 아래를 파닥파닥 움직이며 기쁨의 신음 소리를 내는 우즈메. 지금까지 몇 번이고 몸을 섞어 왔지만, 이렇게까지 반응이 좋은 적은 처음이었다."

[[dialogue]]
speaker = "unk"
original = "何度もお尻を叩いているうちに、俺の中にも『ウズメをもっといじめたい』という気持ちが湧き上がってきて──"
translation = "몇 번이고 엉덩이를 때리는 사이에, 내 안에서도 『우즈메를 좀 더 괴롭히고 싶다』는 기분이 솟구쳐 올랐고──"

[[dialogue]]
speaker = "クロト"
original = "「縛られて、お尻叩かれてっ……濡らしすぎだぞ、ウズメ！」"
translation = "「묶여서, 엉덩이까지 맞으면서…… 너무 젖었잖아, 우즈메!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んっふあ、ぁあぁっ<emoji=heart04>\u3000お尻叩きながら叱られるの、ダメだしっ<emoji=heart04>\u3000頭の芯まで、びりびりって、来るぅ──ぁ、ぁああっ<emoji=heart04>」"
translation = "「응후아, 아아앗<emoji=heart04> 엉덩이 맞으면서 꾸중 듣는 거, 위험해애<emoji=heart04> 머릿속까지, 찌릿찌릿하게, 와아──아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、やめるか？\u3000やめてもいいんだぞ！」"
translation = "「그럼, 그만둘까? 그만둬도 된다고!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ──そ、それはぁっ……だ、だめぇー……<emoji=heart04>\u3000もっとして、縄、ぎりぎりって引っ張って、お尻、ばちんばちん、してぇっ<emoji=heart04>」"
translation = "「아──그, 그거으은…… 아, 안 돼애─……<emoji=heart04> 좀 더 해 줘, 밧줄, 꽉꽉 잡아당기면서, 엉덩이, 찰싹찰싹, 해 줘어<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くんのおち○ぽでっ、も、もっと、あたしのこといじめて欲しい、よぉおっ……<emoji=heart04>」"
translation = "「회장군의 자지로오, 저, 좀 더, 나를 괴롭혀 줬으면, 해애에에……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "瞳を潤ませて、切ない眼差しでそんなこと言われたら──"
translation = "눈동자를 적시고, 애처로운 눈빛으로 그런 말을 듣게 되면──"

[[dialogue]]
speaker = "クロト"
original = "「──っ！！」"
translation = "「──윽!!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ううっぁ、ああ、ぁあぁあ～っ<emoji=heart04>\u3000すごい、すごい速いおち○ぽ、あぁっ<emoji=heart04>\u3000そこ好きっ、そこ好き、パンパン好きぃっ<emoji=heart04>」"
translation = "「으으읏아, 아아, 아아아아~앗<emoji=heart04> 굉장해, 엄청 빠른 자지, 아아앗<emoji=heart04> 거기 좋아, 거기 좋아, 팡팡하는 거 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅーっと縄を引っ張って、たたきつけるみたいな乱暴なピストンをしているのに、ウズメは嬉しそうな声を上げるばかりだ。"
translation = "밧줄을 꽉 잡아당기며, 내리치는 듯한 난폭한 피스톤질을 하고 있는데도 우즈메는 기쁜 목소리만 낼 뿐이다."

[[dialogue]]
speaker = "クロト"
original = "「知らなかったぞ！\u3000ウズメが、こんなエッチが好きだったなんて！」"
translation = "「몰랐는걸! 우즈메가, 이런 엣치를 좋아했을 줄이야!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、ぁああっ、あたしも知らなかったよぉっ<emoji=heart04>\u3000んっ、ふぅあっ<emoji=heart04>\u3000んんんうっ<emoji=heart04>\u3000好きな人にいじめられるの、こんなイイだなんてっ<emoji=heart04>」"
translation = "「아, 아아앗, 나도 몰랐다구우<emoji=heart04> 응, 후아앗<emoji=heart04> 응응응윽<emoji=heart04> 좋아하는 사람한테 괴롭힘당하는 게, 이렇게 좋을 줄은으으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「乱暴されてるんだぞ！\u3000それなのに気持ちいいのかっ？」"
translation = "「난폭하게 당하고 있다고! 그런데도 기분 좋은 거냐?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「か、会長くんだからぁっ<emoji=heart04>\u3000大好きな会長くんにいじめられてるから、気持ちいいのっ<emoji=heart04>\u3000あ、あぁ、あああ、ぁあっ<emoji=heart04>」"
translation = "「회, 회장군이니까아<emoji=heart04> 정말 좋아하는 회장군한테 괴롭힘당하고 있으니까, 기분 좋은 거야아<emoji=heart04> 아, 아아, 아아아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いじらしいことを言ってくれたお礼に、今日一番の強さの平手をお尻に見舞ってやる。"
translation = "기특한 소리를 해 준 답례로, 오늘 중 가장 강한 손바닥을 엉덩이에 선사한다."

[[dialogue]]
speaker = "ウズメイア"
original = "「ぁぁぁあ──ッ！？<emoji=heart04>\u3000んっきゅ、うぅう、うっぅう～っ……そ、それぇっ、今の強さで、もっとしてぇっ<emoji=heart04>」"
translation = "「아아아아──앗!?<emoji=heart04> 응큐, 으으윽, 으으으으~윽…… 거, 그거어, 지금 강도로, 좀 더 해 줘어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「さっきからおねだりばっかりだな……！\u3000ぶってもらったお礼も言えないの？」"
translation = "「아까부터 조르기만 하네……! 맞았으면 고맙다는 말도 못 해?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「っ！？<emoji=heart04>\u3000あ、ぁぁっ……ご、ごめんっ<emoji=heart04>\u3000あ、たしの、お尻、ぶってくれたのに、お礼言わないで、ごめぇんっ<emoji=heart04>」"
translation = "「!?<emoji=heart04> 아, 아아앗…… 미, 미안해<emoji=heart04> 내, 엉덩이, 때려 줬는데, 고맙다고 안 해서, 미안해애<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くんに叩かれるの、すっごく気持ち良かったっ<emoji=heart04>\u3000マジヤバい、最高、だったしぃっ……<emoji=heart04>」"
translation = "「회장군한테 맞는 거, 정말 기분 좋았어어<emoji=heart04> 진짜 대박, 최고, 였으니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "この子をもっといじめてやりたい──そんな感情が脳裏を埋め尽くす。"
translation = "이 아이를 좀 더 괴롭혀 주고 싶다── 그런 감정이 뇌리를 가득 채운다."

[[dialogue]]
speaker = "クロト"
original = "「敬語っ！」"
translation = "「존댓말!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ふぅうう～っ！？\u3000ご、ごめんなさいっ<emoji=heart04>\u3000縛られて悦ぶ、マゾ天使のくせに、タメ口利いてごめんなさいっ<emoji=heart04>」"
translation = "「후우우우~윽!? 죄, 죄송해요오<emoji=heart04> 묶여서 기뻐하는, 마조 천사 주제에, 반말해서 죄송해요오<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「う、ウズメのお尻、ぶ、ぶってくださって、あ、ありがとう、ございます、ぅうぅっ……！<emoji=heart04>」"
translation = "「으, 우즈메의 엉덩이, 때, 때려 주셔서, 고, 고맙습니다아아, 으으으윽……!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「お礼を言えてえらいぞ！\u3000ご褒美、だっ！」"
translation = "「인사를 잘하니 착하구나! 보상이다!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ひっ──ぅううぅぅ～っ<emoji=heart04>\u3000あっあっ、嬉しっ<emoji=heart04>\u3000会長くん、しゅ、しゅきっ<emoji=heart04>\u3000しゅきぃぃいっ<emoji=heart04>」"
translation = "「히익──으으으으으으~윽<emoji=heart04> 앗앗, 기뻐어<emoji=heart04> 회장군, 조, 좋아해애<emoji=heart04> 좋아해요오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ひぅううっ<emoji=heart04>\u3000お、ぉぉおおっ<emoji=heart04>\u3000叩きながら奥うぅっ、そんな、ぐりぐり──ぉおぉっ<emoji=heart04>」"
translation = "「히으으윽<emoji=heart04> 오, 오오오오옷<emoji=heart04> 때리면서 안쪽으으윽, 그렇게, 비비면── 오오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「このまま最後まで行くからな！\u3000どこに出して欲しいんだっ？」"
translation = "「이대로 끝까지 갈 거니까! 어디에 싸 줬으면 좋겠어?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、あぅっ……ど、どうしよっ……中に欲しいけど、ぶっかけも、して欲しい、かもぉおっ……<emoji=heart04>」"
translation = "「아, 아읏…… 어, 어떡하지이…… 안에 원하지만, 흩뿌리는 것도, 해 줬으면, 할지도오오……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「欲張りな天使だなっ！\u3000もういい、俺が決める！」"
translation = "「욕심쟁이 천사로군! 이제 됐어, 내가 정한다!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んっっきゅぅっ<emoji=heart04>\u3000あ、ぁあああ<emoji=heart04>\u3000しゅ、しゅみましぇっ、お任せしましゅっ──あ、ぁ、あぁ、あ、あぁ、ああ～っ！<emoji=heart04>」"
translation = "「응으큐우<emoji=heart04> 아, 아아아아<emoji=heart04> 죄, 죄숑함다, 맡길게효오── 아, 아, 아아, 아, 아아, 아아~앗!<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「しっかり締めろっ！\u3000俺がイくまでぎゅって締めろっ、わかったかっ！」"
translation = "「제대로 조여! 내가 갈 때까지 꽉 조여, 알겠어?!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「は──はいっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こ、ぎゅーってしゅる、しゅるぅうっ……お、ぉおぉ、おぉお、おっおっおおっ<emoji=heart04>」"
translation = "「네── 넷<emoji=heart04><emoji=heart04><emoji=heart04> 보지, 꼬오옥 할게요, 할게요오오…… 오, 오오오, 오오오, 오오오오오<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おち○ぽ、は、速い、強い──ぅあ、あ、ぁああっ<emoji=heart04>\u3000そこダメ、弱いから、ダメ、イ、イグっイグっ、イっちゃう、ぅっ……！<emoji=heart04>」"
translation = "「자지, 바, 빨라, 강해── 으아, 아, 아아앗<emoji=heart04> 거기 안 돼, 약하니까, 안 돼, 가, 가앗 가앗, 가 버려, 어어……!<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000ヤバっ、大きいの来るっ、来る来る来る、来るぅうううっ──<emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 대박, 큰 거 온다, 온다온다온다, 온다아아아아아──<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「出すぞっ……ウズメ！」"
translation = "「싼다…… 우즈메!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ひぁぁあぁああっ！？<emoji=heart04><emoji=heart04>\u3000あ、イグぅっ！？\u3000イグイグイグっ、イッグうぅぅうぅ～っ！<emoji=heart04>」"
translation = "「히아아아아아앗!?<emoji=heart04><emoji=heart04> 아, 가 버려어!? 가 가 가앗, 가 버려어어어어어~! <emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あああぁぁっ～～<emoji=heart04>\u3000……ふああぁぁあぁぁぁあああぁぁぁ～～～～～～っ！！<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗~~<emoji=heart04> ……후아아아아아아아아아아아아아아아아~~~~~~~~앗!!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "馬の手綱を握るみたいにウズメの縄を引っ張って、俺の方へ引き寄せて──ゼロ距離で子宮口に精液をぶちまける。"
translation = "말 고삐를 쥐는 것처럼 우즈메의 밧줄을 잡아당겨 내 쪽으로 끌어당기고는── 제로 거리에서 자궁구에 정액을 쏟아부었다."

[[dialogue]]
speaker = "ウズメイア"
original = "「ふぇあぁぁぁああっ！<emoji=heart04>\u3000会長くぅんっ、んぁああっ！<emoji=heart04>\u3000あ、あぁあーっ<emoji=heart04>\u3000あぁぁああーっ！！<emoji=heart04>」"
translation = "「페아아아아아앗!<emoji=heart04> 회장구운, 응아아앗!<emoji=heart04> 아, 아아아─앗<emoji=heart04> 아아아아아─앗!!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精液を注ぎ込むたびにガクガク震えるウズメ。このまま最後の一滴まで出してやりたいけれど、ぶっかけもして欲しいと言っていたから──"
translation = "정액을 쏟아부을 때마다 덜덜 떠는 우즈메. 이대로 마지막 한 방울까지 싸 주고 싶지만, 흩뿌리는 것도 원한다고 했으니까──"

[[dialogue]]
speaker = "クロト"
original = "「う──くぅっ！」"
translation = "「으──쿠윽!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んぁあ、ぁああっ……！<emoji=heart04>」"
translation = "「응아아, 아아앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精の途中でペニスを引き抜いて、ウズメの全身を汚した──"
translation = "사정 도중에 페니스를 뽑아내 우즈메의 온몸을 더럽혔다──"

[[dialogue]]
speaker = "ウズメイア"
original = "「はぁああっ……ふぅうっ……んんぅっ……<emoji=heart04>\u3000な、中も、外もぉっ……精液、いっぱぁい……<emoji=heart04>」"
translation = "「하아아앗…… 후우우…… 응응윽……<emoji=heart04> 아, 안도, 밖도오…… 정액, 가드윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "白濁にまみれてうっとりするウズメとは正反対に、俺は賢者タイムが訪れたためか、急速に冷静さを取り戻しつつあった。"
translation = "백탁액에 뒤덮여 황홀해하는 우즈메와는 정반대로, 나는 현자 타임이 찾아온 덕분인지 급격히 냉정함을 되찾고 있었다."

[[dialogue]]
speaker = "unk"
original = "つまり……その……ちょっと調子に乗りすぎたかも。"
translation = "그러니까…… 그…… 좀 너무 들떴던 걸지도."

[[dialogue]]
speaker = "ウズメイア"
original = "「はぁああっ……やっばあぁ～……精液、やばぁー……どろどろじゃん……<emoji=heart04>」"
translation = "「하아아앗…… 대애박…… 정액, 대박이야아…… 걸쭉하잖아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「あ、あの……ウズメ？\u3000その……」"
translation = "「저, 저기…… 우즈메? 그게……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、ご、ごめんなさぁいっ……<emoji=heart04>\u3000精液、いっぱい出してもらったのに、お礼、言えてません、でしたぁ<emoji=heart04>」"
translation = "「아, 죄, 죄송해요오……<emoji=heart04> 정액, 잔뜩 내주셨는데, 감사 인사, 드리지 못했, 습니다아<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「マゾ天使のウズメイアに、大切な精液、いっぱいぶっかけてくださって、とっても嬉しい、ですぅ……<emoji=heart04>」"
translation = "「마조 천사 우즈메이야에게, 소중한 정액, 잔뜩 뿌려 주셔서, 정말 기뻐요오……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「い、いじめてくださって……ありがとうございましたぁ～……<emoji=heart04>」"
translation = "「괴, 괴롭혀 주셔서…… 감사합니다아……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「男らしい会長くん、すっごくかっこ良かったよぉっ……はぁぁぁん<emoji=heart04>\u3000これからもたくさん、いじめてくださぁいっ……<emoji=heart04>」"
translation = "「남자다운 회장군, 정말 멋졌어요오…… 하아아앙<emoji=heart04> 앞으로도 잔뜩, 괴롭혀 주세요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやら信じがたいことに、ウズメにはマゾの素養があったらしく……"
translation = "아무래도 믿기지 않게도, 우즈메에게는 마조 소양이 있었던 모양이라……"

[[dialogue]]
speaker = "unk"
original = "その日はいつまでも俺にへりくだって、ＳＭエッチをおねだりしてくるのだった──"
translation = "그날은 언제까지고 내게 굽신거리며, SM 엣치를 조르는 것이었다──"

