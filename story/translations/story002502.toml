[[dialogue]]
speaker = "ラティエ"
original = "「まさかきみのような人気者からデートに誘われるとは思わなかった」"
translation = "「설마 자네 같은 인기인에게 데이트 신청을 받을 줄은 몰랐네」"

[[dialogue]]
speaker = "ラティエ"
original = "「しかも素敵な水着までプレゼントしてもらえるなんて。これを作ってくれた九浄ヘレナ理事長にも感謝しなければならないな」"
translation = "「게다가 멋진 수영복까지 선물 받다니. 이걸 만들어준 쿠죠 헬레나 이사장에게도 감사해야겠군」"

[[dialogue]]
speaker = "unk"
original = "あの依頼を引き受けてから数日が経過し──"
translation = "그 의뢰를 받은 뒤 며칠이 경과하고──"

[[dialogue]]
speaker = "unk"
original = "俺はヘレナちゃんに言われた通り学園長に水着を渡し、デートに誘って遊園地へとやってきていた。"
translation = "나는 헬레나짱이 시킨 대로 학원장에게 수영복을 건네고 데이트 신청을 해서 유원지에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "どうしても理事長を誘いたくて"
translation = "꼭 이사장님을 초대하고 싶어서"

[[dialogue]]
speaker = "unk"
original = "よ、よろこんで貰えて光栄です"
translation = "기, 기뻐해 주시니 영광입니다"

[[dialogue]]
speaker = "ラティエ"
original = "「そうかそうか。しかしきみがそんなにも私に好意を寄せてくれていたとはね。気付いてあげられなくて済まなかった」"
translation = "「그래그래. 하지만 자네가 그렇게까지 나에게 호의를 품고 있었을 줄이야. 미처 알아채지 못해 미안하군」"

[[dialogue]]
speaker = "ラティエ"
original = "「恥ずかしながら私の青春は旅と修練の毎日で灰色に彩られている。故にこういった色事はあまり得意ではないのだよ」"
translation = "「부끄러운 말이지만 나의 청춘은 여행과 수련의 나날로 잿빛으로 물들어 있네. 그래서 이런 연애사에는 서투르단 말이지」"

[[dialogue]]
speaker = "ラティエ"
original = "「だが、あれほど必死で私のことを探し回り、熱烈な言葉で誘ってくれたのだ。その純粋な想いをおねーさんは無下にしないさ」"
translation = "「하지만 그토록 필사적으로 나를 찾아다니며 열렬한 말로 권해주지 않았나. 그 순수한 마음을 이 누님이 무시하진 않겠어」"

[[dialogue]]
speaker = "ラティエ"
original = "「少年、今日は何もかも忘れて思い切り楽しもう！\u3000はっはっは！」"
translation = "「소년, 오늘은 모든 걸 잊고 마음껏 즐기자구! 핫하하!」"

[[dialogue]]
speaker = "ラティエ"
original = "「……ん？\u3000先ほどから口数が少ないがどうしたのかな？」"
translation = "「……음? 아까부터 말이 없는데 무슨 일인가?」"

[[dialogue]]
speaker = "unk"
original = "き、緊張してるんです！"
translation = "기, 긴장하고 있어요!"

[[dialogue]]
speaker = "ラティエ"
original = "「ほうほう、そうだったか。きみはいつも冷静沈着な印象があったからな、意外に可愛いところもあるのか」"
translation = "「허허, 그랬나. 자네는 언제나 냉정 침착한 인상이었으니 의외로 귀여운 구석도 있군」"

[[dialogue]]
speaker = "ラティエ"
original = "「デートだからといって固くならなくていい。普段通りに接してくれればいいのだ。と言っても、それが難しいのかもしれないがな」"
translation = "「데이트라고 해서 굳어 있을 필요 없네. 평소처럼 대해주면 된다네. 뭐, 그게 어려울지도 모르겠지만 말이야」"

[[dialogue]]
speaker = "ラティエ"
original = "「そうだ、いっそ腕でも組んでみようか。荒療治というやつだ」"
translation = "「맞다, 차라리 팔짱이라도 껴볼까. 충격 요법이라는 거지」"

[[dialogue]]
speaker = "ラティエ"
original = "「はっはっは、遠慮するな。今日だけは学園長ではなく、自分の彼女と思って接してくれていいぞ」"
translation = "「핫하하, 사양하지 말게. 오늘만큼은 학원장이 아니라 자신의 여자친구라 생각하고 대해도 좋으니까」"

[[dialogue]]
speaker = "ラティエ"
original = "「それとも……もしかしてきみはデートのつもりではなかったのかな？\u3000私はそのつもりだったのだが……」"
translation = "「아니면…… 혹시 자네는 데이트할 생각이 아니었나? 난 그럴 생각이었네만……」"

[[dialogue]]
speaker = "unk"
original = "た、たぁのしぃな～"
translation = "지, 즐겁네요~"

[[dialogue]]
speaker = "unk"
original = "で、デートです、勿論！"
translation = "데, 데이트 맞아요, 당연히!"

[[dialogue]]
speaker = "ラティエ"
original = "「そうかそうか！\u3000ならば早く腕を組もう、さあ！」"
translation = "「그래그래! 그렇다면 어서 팔짱을 끼자구, 자!」"

[[dialogue]]
speaker = "unk"
original = "脂汗をかきながら、学園長と腕を組んだ。"
translation = "진땀을 흘리며 학원장과 팔짱을 꼈다."

[[dialogue]]
speaker = "unk"
original = "すると、無線を通じてエスメラルダ先生の声が耳に響いてくる。"
translation = "그러자 무선을 통해 에스메랄다 선생님의 목소리가 귀에 울린다."

[[dialogue]]
speaker = "エスメラルダ"
original = "『あの……ちょっと下手過ぎじゃないかしら……？』"
translation = "『저기…… 좀 너무 서툰 거 아니니……?』"

[[dialogue]]
speaker = "unk"
original = "それについては弁解のしようがない。"
translation = "그것에 대해서는 변명의 여지가 없다."

[[dialogue]]
speaker = "unk"
original = "だがそもそも今、俺が置かれている状況が地獄なのだということも分かって欲しい。"
translation = "하지만 애초에 지금 내가 처한 상황이 지옥이라는 것도 알아주길 바란다."

[[dialogue]]
speaker = "エスメラルダ"
original = "『ともかく、このデートが理事長の計画したものであることは絶対に悟られないでね！』"
translation = "『어쨌든 이 데이트가 이사장님이 계획한 거라는 걸 절대 들켜선 안 돼!』"

[[dialogue]]
speaker = "unk"
original = "学園長を誘って、新設のプールに行くことが俺に課せられたオーダーである。"
translation = "학원장을 유혹해 새로 생긴 풀장에 가는 것이 나에게 주어진 오더다."

[[dialogue]]
speaker = "unk"
original = "しかし、それが何故、学園長の放浪癖の矯正に繋がるのか見当もつかない。"
translation = "하지만 그것이 어째서 학원장의 방랑벽 교정으로 이어지는지 도무지 짐작이 가지 않는다."

[[dialogue]]
speaker = "エスメラルダ"
original = "「それは私も疑問に思っていたのですが……」"
translation = "「그건 저도 의문이었습니다만……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「奴の自由奔放な性質は生半可なことでは叩き直せぬ。それはエスメラルダも良く知っているだろう」"
translation = "「그자의 자유분방한 성질은 어설픈 방법으로는 바로잡을 수 없다. 그건 에스메랄다도 잘 알고 있겠지」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そのために私はこの水着フォームを用意したのだ」"
translation = "「그걸 위해 내가 이 수영복 폼을 준비한 거다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「なるほど……この人工戦闘服に作戦の鍵がある、と」"
translation = "「과연…… 이 인공 전투복에 작전의 열쇠가 있다는 거군요」"

[[dialogue]]
speaker = "unk"
original = "ＧＰＳ機能がついているとか？"
translation = "GPS 기능이 달려 있다던가?"

[[dialogue]]
speaker = "エスメラルダ"
original = "「もしかしたら孫悟空の輪かもしれないわね。執務から逃げようとしたら全身に電気がビリビリーっと」"
translation = "「어쩌면 손오공의 머리띠 같은 걸지도 모르겠네요. 집무에서 도망치려 하면 온몸에 전기가 찌릿찌릿─하고」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふ、それは面白いな。呪文を唱えれば、いつでも奴の苦しむ顔が見られるというわけだ」"
translation = "「후후, 그거 재미있겠군. 주문만 외우면 언제든 그놈의 고통스러워하는 얼굴을 볼 수 있다는 거군」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「り、理事長……本気になさらないでください……」"
translation = "「이, 이사장님…… 진담으로 받지 마세요……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「冗談だ。いくらあの無法者が相手だとしてもそんな非人道的な手段には訴えない」"
translation = "「농담이다. 아무리 저 무법자가 상대라 해도 그런 비인도적인 수단에는 호소하지 않아」"

[[dialogue]]
speaker = "ヘレナ"
original = "「作戦の詳細はあえて伏せよう。とにかく魔王はラティエをプールに誘い出し、一緒に楽しむこと」"
translation = "「작전의 상세 내용은 굳이 함구하겠다. 어쨌든 마왕은 라티에를 풀장으로 유인해 함께 즐길 것」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そしてエスメラルダは魔王をサポートしながら、ラティエの星力と人工戦闘服のデータを収集する」"
translation = "「그리고 에스메랄다는 마왕을 서포트하면서 라티에의 성력과 인공 전투복의 데이터를 수집해라」"

[[dialogue]]
speaker = "ヘレナ"
original = "「その際、奴にこの計画を悟らせなければそれでいい」"
translation = "「그때 그놈에게 이 계획을 들키지만 않으면 된다」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「わ、わかりました」"
translation = "「아, 알겠습니다」"

[[dialogue]]
speaker = "unk"
original = "結局、当日になってもヘレナちゃんから作戦内容は伝えられなかった。"
translation = "결국 당일이 되어도 헬레나짱으로부터 작전 내용은 전해 듣지 못했다."

[[dialogue]]
speaker = "unk"
original = "ということはつまり、知らない方がよい、という事なのだろう。"
translation = "그렇다는 건 즉, 모르는 편이 낫다는 뜻이리라."

[[dialogue]]
speaker = "エスメラルダ"
original = "『あくまで自然にデートを楽しみつつ、でも学園長から目を離さないでね』"
translation = "『어디까지나 자연스럽게 데이트를 즐기면서도, 학원장님에게서 눈을 떼지 마세요』"

[[dialogue]]
speaker = "エスメラルダ"
original = "『裏があると気付かれたらもちろん、気まぐれに姿を消してしまうなんてことも十分考えられるから』"
translation = "『뒷공작이 있다는 걸 눈치채는 건 물론이고, 변덕스럽게 자취를 감춰버릴 가능성도 충분히 생각할 수 있으니까요』"

[[dialogue]]
speaker = "unk"
original = "エスメラルダ先生の懸念は十分に予想できることだった。"
translation = "에스메랄다 선생님의 우려는 충분히 예상 가능한 일이었다."

[[dialogue]]
speaker = "ラティエ"
original = "「おや、あの２人は……もしかして今日の案内人かな？」"
translation = "「오호, 저 두 사람은…… 혹시 오늘의 안내인인가?」"

[[dialogue]]
speaker = "unk"
original = "学園長の言葉に目をやると、その内の１人の女の子が大きく手を振る。"
translation = "학원장의 말에 시선을 돌리자, 그중 한 명인 여자아이가 크게 손을 흔든다."

[[dialogue]]
speaker = "サラン"
original = "「ようこそお越しくださいました～。お待ちしておりましたよ～」"
translation = "「어서 오세요~. 기다리고 있었답니다~」"

[[dialogue]]
speaker = "サラン"
original = "「桜十路サランです。本日はよろしくお願いします～」"
translation = "「사쿠라코지 사란이에요~. 오늘은 잘 부탁드려요~」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「桜十路エルデリーゼです。よろしくお願い致しますわ」"
translation = "「사쿠라코지 엘데리제입니다. 잘 부탁드리겠어요」"

[[dialogue]]
speaker = "ラティエ"
original = "「こちらこそよろしくお願いします、可愛いお嬢さん方」"
translation = "「이쪽이야말로 잘 부탁하네, 귀여운 아가씨들」"

[[dialogue]]
speaker = "サラン"
original = "「まあ、可愛いだなんてお上手です～。でも嬉しいな～♪」"
translation = "「어머, 귀엽다니 말씀도 잘하시네요~. 그래도 기분 좋네~♪」"

[[dialogue]]
speaker = "ラティエ"
original = "「２人は姉妹なのかな？」"
translation = "「두 사람은 자매인가?」"

[[dialogue]]
speaker = "サラン"
original = "「いいえ、エルゼは従妹なのですよ～。けれどサランとは姉妹のように仲良しなのです～」"
translation = "「아니요, 엘제는 사촌 동생이에요~. 하지만 사란하고는 자매처럼 사이가 좋답니다~」"

[[dialogue]]
speaker = "サラン"
original = "「今回の遊園地が大きくなることについて関わっていたのはサランだけど、一緒に遊びたかったからエルゼも呼んじゃいました～」"
translation = "「이번 유원지가 커지는 것에 관여했던 건 사란이지만, 같이 놀고 싶어서 엘제도 불러버렸어요~」"

[[dialogue]]
speaker = "サラン"
original = "「なんとサランもエルゼもヘレナさんから新しい水着をもらったんですよ～」"
translation = "「무려 사란도 엘제도 헬레나 씨에게서 새 수영복을 받았답니다~」"

[[dialogue]]
speaker = "ラティエ"
original = "「ほう、それは奇遇だ。私もヘレナが作ったという水着を持っている。ちょうど彼からプレゼントしてもらったばかりなんだよ」"
translation = "「허어, 그거 기우로군. 나도 헬레나가 만들었다는 수영복을 가지고 있지. 마침 그에게 막 선물 받은 참이라네」"

[[dialogue]]
speaker = "エルデリーゼ"
original = "「会長様から？\u3000そうなんですの？」"
translation = "「회장님께서요? 정말인가요?」"

[[dialogue]]
speaker = "unk"
original = "その通り、です……"
translation = "그 말대로, 입니다……"

[[dialogue]]
speaker = "unk"
original = "あっ、いや、ええと……"
translation = "앗, 아니, 그게……"

[[dialogue]]
speaker = "ラティエ"
original = "「私とプールに行きたくて、ヘレナに頼んで作ってもらったそうだ」"
translation = "「나와 풀장에 가고 싶어서, 헬레나에게 부탁해 만들게 했다더군」"

[[dialogue]]
speaker = "ラティエ"
original = "「急に水着を渡されてデートに誘われた時はさすがの私も面食らったが、あまりにも熱心だったものでね」"
translation = "「갑자기 수영복을 건네받으며 데이트 신청을 받았을 때는 나조차 당황했지만, 워낙 열성적이라서 말이야」"

[[dialogue]]
speaker = "サラン"
original = "「そうだったのですね～。ふふふ、会長ちゃんが学園長さんのこと好きだったなんてびっくりだよ～」"
translation = "「그랬던 거군요~. 후후후, 회장짱이 학원장님을 좋아했다니 깜짝 놀랐어~」"

[[dialogue]]
speaker = "unk"
original = "今すぐに誤解を解きたかったが、それを説明するためには全てを明るみにする必要がある。"
translation = "당장이라도 오해를 풀고 싶었지만, 그걸 설명하기 위해서는 모든 것을 밝혀야만 했다."

[[dialogue]]
speaker = "unk"
original = "そんなことは出来なかった。"
translation = "그럴 수는 없었다."

[[dialogue]]
speaker = "ラティエ"
original = "「彼に口説かれたということもあるが、私としてもちょうど良かったのだ」"
translation = "「그에게 설득당한 면도 있지만, 나로서도 마침 잘됐지」"

[[dialogue]]
speaker = "ラティエ"
original = "「何しろ日々、学園長としての職務に追われる毎日だ。たまにはプールでゆっくり羽を伸ばしたいと思ってね」"
translation = "「아무래도 매일 학원장으로서의 직무에 쫓기는 나날이니까. 가끔은 풀장에서 느긋하게 기지개를 켜고 싶었거든」"

[[dialogue]]
speaker = "エスメラルダ"
original = "『はぁ？\u3000なーにが学園長の職務に追われる毎日ですか！？』"
translation = "『하아? 뭐어~가 학원장 직무에 쫓기는 나날이라는 건가요!?』"

[[dialogue]]
speaker = "エスメラルダ"
original = "『あなたはいつだって職務を放り出して羽を伸ばしているじゃないですか！\u3000良くもまあ言えたものです！』"
translation = "『당신은 언제나 직무를 내팽개치고 기지개를 켜고 있잖아요! 잘도 그런 말이 나오네요!』"

[[dialogue]]
speaker = "unk"
original = "無線の向こうでエスメラルダ先生がブチ切れていた。"
translation = "무전 너머에서 에스메랄다 선생님이 격분하고 있었다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「──フィオナ会長に仕事を押し付けて、遊び回っているという噂も耳にしましたけれど？」"
translation = "「──피오나 회장님에게 일을 떠넘기고, 놀러 다니고 있다는 소문도 들었습니다만?」"

[[dialogue]]
speaker = "ラティエ"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker = "unk"
original = "ぼそりと呟くようにエルゼがこぼす。"
translation = "나직이 중얼거리듯 엘제가 내뱉는다."

[[dialogue]]
speaker = "unk"
original = "そういえば先ほどから、普段に比べてエルゼが大人しいように感じていた。"
translation = "그러고 보니 아까부터, 평소에 비해 엘제가 얌전하다는 느낌이 들었다."

[[dialogue]]
speaker = "エルデリーゼ"
original = "「いえ、失礼いたしましたわ。サランお姉さま、立ち話はこのくらいにしてプールの方へご案内しましょう」"
translation = "「아니요, 실례했습니다. 사란 언니, 선 채로 나누는 이야기는 이쯤 하고 풀장 쪽으로 안내하죠」"

[[dialogue]]
speaker = "サラン"
original = "「そうだね～。ではでは、遊園地に新たにそーせつされたプールエリア、『チェリークルーズ』はこちらになりま～す♪」"
translation = "「그렇네~. 그럼 그럼, 유원지에 새로 신설된 풀장 구역, 『체리 크루즈』는 이쪽이랍니다~♪」"

[[dialogue]]
speaker = "unk"
original = "エルゼの様子に引っ掛かりつつも、俺たちはサランの後についてプールエリアへと向かったのだった。"
translation = "엘제의 상태가 마음에 걸리면서도, 우리들은 사란의 뒤를 따라 풀장 구역으로 향했다."

