[[dialogue]]
speaker = "unk"
original = "フィオナのウェディングドレスの一件で式場を貸してもらったお礼として、ナミエルと２人で式場の掃除をしていた。"
translation = "피오나의 웨딩드레스 건으로 식장을 빌린 답례로, 나미엘과 둘이서 식장 청소를 하고 있었다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「終わりました。ここまで綺麗にすれば問題ないでしょう」"
translation = "「끝났습니다. 여기까지 깨끗하게 했으니 문제없겠죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですが私たち以外いないみたいですね。黙って帰るわけにはいきませんし、どうしましょうか」"
translation = "「하지만 우리들 말고는 없는 것 같네요. 말없이 돌아갈 수는 없으니, 어떻게 할까요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「この前の続き、したいな」"
translation = "「아까 하던 거, 계속하고 싶어.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「続きって、もしかして結婚式の<b>ふり</b>の……ですか？」"
translation = "「계속이라니, 설마 결혼식 <b>흉내</b>의…… 인가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。ちゃんと愛を誓って、ちゃんとキスしたい」"
translation = "「그래. 제대로 사랑을 맹세하고, 제대로 키스하고 싶어.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もう……仕方ありませんね」"
translation = "「정말…… 어쩔 수 없네요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「何度も言いませんから、聞き逃さないでくださいね」"
translation = "「두 번 말하지 않을 테니, 놓치지 말고 들으세요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私ナミエル・クレシェンテは、健やかなる時も、病める時も……あなたを慈しみ、助け合い、愛することを誓います」"
translation = "「저 나미엘 크레센테는, 기쁠 때나 슬플 때나…… 당신을 아끼고, 서로 도우며, 사랑할 것을 맹세합니다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も誓います。どんな時も、何があっても、ナミエルを愛し続けます」"
translation = "「나도 맹세해. 어떤 때라도, 무슨 일이 있어도, 나미엘을 계속 사랑할 것을.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ん……ちゅっ」"
translation = "「응…… 츄우.」"

[[dialogue]]
speaker = "unk"
original = "<b>ふり</b>の時とは違う、唇を重ね合うキス。"
translation = "<b>흉내</b>를 낼 때와는 다른, 입술을 겹치는 키스."

[[dialogue]]
speaker = "unk"
original = "その瞬間、身も心も熱いもので満たされた。"
translation = "그 순간, 몸도 마음도 뜨거운 것으로 가득 찼다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「誓いのキスもしてしまいましたね。これで私たちは愛を誓い合いました。神官様がおられなくても関係ありません」"
translation = "「맹세의 키스도 해버렸네요. 이걸로 우리는 사랑을 맹세했어요. 신관님이 안 계셔도 상관없어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ……あなたのあそこが、大きく……いくらなんでも正直すぎませんか？」"
translation = "「아…… 당신의 그곳이, 커져서…… 아무리 그래도 너무 솔직한 거 아닌가요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だってナミエルが欲しいから」"
translation = "「나미엘을 원하니까.」"

[[dialogue]]
speaker = "unk"
original = "そのままナミエルを抱き締め、純白のドレスに膨らんだ下半身を押し付ける。"
translation = "그대로 나미엘을 껴안고, 순백의 드레스에 불룩해진 하반신을 밀어붙인다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「本当に仕方のない人ですね……でもいいですよ。私も、初めてをもらってほしいですから」"
translation = "「정말이지 어쩔 수 없는 사람이네요…… 하지만 좋아요. 저도, 첫 경험을 가져가 주길 바라니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ……とうとう、エッチしてしまうんですね……」"
translation = "「아…… 드디어, 야한 짓을 하는 거네요……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルには何度もご奉仕してもらっていたけど、エッチするのは初めて。"
translation = "나미엘에게 몇 번이나 봉사받았지만, 진짜로 하는 건 처음이다."

[[dialogue]]
speaker = "unk"
original = "あの潔癖だったナミエルが、顔を赤らめ、期待を露わにしているのがたまらない。"
translation = "그 결벽증이었던 나미엘이, 얼굴을 붉히며 기대를 드러내고 있는 모습이 참을 수 없다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「これが私のおま○こに入るんですね……<emoji=heart04>\u3000はぁ……あっ……こんなのが入ってきたら、壊れてしまうかもしれません……<emoji=heart04>」"
translation = "「여기에 제 보지가 들어가는 거군요……<emoji=heart04> 하아…… 앗…… 이런 게 들어오면, 망가져 버릴지도 몰라요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "割れ目を肉棒で軽く擦るだけで、ナミエルが甘い嬌声を漏らしてくれる。"
translation = "갈라진 틈을 육봉으로 가볍게 문지르기만 해도, 나미엘이 달콤한 교성을 흘려준다."

[[dialogue]]
speaker = "unk"
original = "ぴったりと閉じた小さな一本筋からは、ペニスがふやけてしまいそうなほどの愛液が溢れ出してきていた。"
translation = "딱 맞게 닫힌 작은 한 줄기 틈에서는, 페니스가 불어 터질 것만 같은 애액이 흘러넘치고 있었다."

[[dialogue]]
speaker = "unk"
original = "この小さくて愛らしいお嫁さんとひとつになりたい。繋がりたい。"
translation = "이 작고 사랑스러운 신부와 하나가 되고 싶다. 이어지고 싶다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですが──」"
translation = "「하지만──」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「無計画なのはいけません。ちゃんと付けるものは付けましょう。いつか必要になるかもと、常備していましたから……」"
translation = "「무계획은 안 돼요. 제대로 낄 건 껴야죠. 언젠가 필요할지도 모른다고, 상비해 두었으니까……」"

[[dialogue]]
speaker = "unk"
original = "ナミエルはそう言うと、薄いゴムでできた<ruby>避妊具<rt>コンドーム</rt></ruby>を見せた。"
translation = "나미엘은 그렇게 말하며, 얇은 고무로 된 <ruby>피임구<rt>콘돔</rt></ruby>을 보여주었다."

[[dialogue]]
speaker = "unk"
original = "さらに口を使ってペニスにゴムをはめていく。"
translation = "게다가 입을 사용해 페니스에 고무를 씌워간다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「んん……ぐぷぷ……ふぅむ」"
translation = "「응응…… 구푸푸…… 후음.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「器用に付けるんだな」"
translation = "「능숙하게 끼우는구나.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「口でのご奉仕は何度もしていましたから。このくらい余裕です」"
translation = "「입으로 하는 봉사는 몇 번이나 했으니까요. 이 정도는 여유예요.」"

[[dialogue]]
speaker = "unk"
original = "もう準備は万端だ。今度こそペニスを突き立てて──"
translation = "이제 준비는 만전이다. 이번에야말로 페니스를 찔러 넣어서──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はぁはぁ……来てください……<emoji=heart04>\u3000私を、あなたのものにしてください……<emoji=heart04>\u3000ひとつに、なりたい……です<emoji=heart04>」"
translation = "「하아 하아…… 와주세요……<emoji=heart04> 저를, 당신의 것으로 만들어주세요……<emoji=heart04> 하나가, 되고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ──はぁああああんっっ<emoji=heart04>\u3000あぁっ……<emoji=heart04>\u3000あふぁっ……<emoji=heart04>\u3000あっ……あっ、あぁああっっ……<emoji=heart04>」"
translation = "「앗── 하아아아앙!!<emoji=heart04> 아앗……<emoji=heart04> 아흐앗……<emoji=heart04> 앗…… 앗, 아아아앗!!<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「入ってっ、動いてっ、大好きな人のがっ、私の膣内にっ、あぁっ、本当に、ひとつになってっ……<emoji=heart04>」"
translation = "「들어와서, 움직여서, 사랑하는 사람의 것이, 제 질 내에…… 아앗, 정말로, 하나가 되어서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しばらく動かずにいようと思っていたけれど無理だった。"
translation = "잠시 움직이지 않고 있으려 했지만 무리였다."

[[dialogue]]
speaker = "unk"
original = "俺を包み込んでくれるナミエルのぬくもりが幸せすぎて、その感覚を確かめるように何度も突き上げてしまう。"
translation = "나를 감싸주는 나미엘의 온기가 너무 행복해서, 그 감각을 확인하듯이 몇 번이고 들이받아 버린다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ダメ、あああっ……<emoji=heart04>\u3000恥ずかしいのに、体が勝手にっ……<emoji=heart04>\u3000繋がってるの、はふぁぁあっ、嬉し、すぎてぇっ……<emoji=heart04>」"
translation = "「안 돼, 아아앗……<emoji=heart04> 부끄러운데, 몸이 멋대로……<emoji=heart04> 이어져 있는 게, 하흐아앗, 너무 기뻐서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「イっ──イっちゃっ、ああああっ……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000愛する人がっ、私の膣内にいてくれるだけでぇっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려── 가버려, 아아아앗……<emoji=heart04><emoji=heart04><emoji=heart04> 사랑하는 사람이, 제 질 내에 있어 주는 것만으로도……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "動いているのは俺だけじゃなかった。ナミエルも腕の中でモゾモゾと身をよじらせて、膣内で俺を感じようとしてくれる。"
translation = "움직이고 있는 건 나뿐만이 아니었다. 나미엘도 품 안에서 꼼지락거리며 몸을 비틀어, 질 내에서 나를 느끼려고 해준다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もっと、あふぁ、もっと突いて……<emoji=heart04>\u3000突き上げてくださいっ……<emoji=heart04>」"
translation = "「더, 아흐, 더 찔러줘……<emoji=heart04> 들이받아 주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「遠慮しなくて構いませんからっ……<emoji=heart04>\u3000ちっとも痛く、ありませんからっ……<emoji=heart04>」"
translation = "「사양하지 않아도 괜찮으니까……<emoji=heart04> 하나도 안 아프니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それよりも、ふぁ、あぁあっ……<emoji=heart04>\u3000もっと感じたいですっ……<emoji=heart04>\u3000あなたとひとつになってる感覚をっ、あなたと愛し合ってる幸せをっ……<emoji=heart04>」"
translation = "「그것보다, 흐아, 아아앗……<emoji=heart04> 더 느끼고 싶어요……<emoji=heart04> 당신과 하나가 된 감각을, 당신과 사랑을 나누는 행복을……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウェディングドレスが愛液で濡れることも厭わずに、ナミエルがゆっさゆっさと身を揺らして体の内側から俺に抱きついてきてくれる。"
translation = "웨딩드레스가 애액으로 젖는 것도 아랑곳하지 않고, 나미엘이 흔들흔들 몸을 흔들며 몸 안쪽에서 나를 껴안아 준다."

[[dialogue]]
speaker = "unk"
original = "出会った頃の潔癖で男嫌いな彼女からは考えられないほど熱烈に。それだけ俺のことを愛していると訴えてくれるように。"
translation = "처음 만났을 때의 결벽증이고 남자를 싫어하던 그녀라고는 생각할 수 없을 정도로 열렬하게. 그만큼 나를 사랑한다고 호소하듯이."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あふぁぁあっっ……<emoji=heart04>\u3000おま○この中でムクムク膨らんでっ……<emoji=heart04>」"
translation = "「아하아앗……<emoji=heart04>\u3000보지 안에서 묵직하게 부풀어 올라서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ただでさえ、あっ、はぁ、いつもより大きいのにっ……<emoji=heart04>\u3000嬉しいですっ……<emoji=heart04>\u3000私とのエッチを喜んでくれてるのがわかってっ……<emoji=heart04>」"
translation = "「안 그래도, 앗, 하아, 평소보다 큰데……<emoji=heart04>\u3000기뻐요……<emoji=heart04>\u3000저와의 섹스를 기뻐해 주는 게 느껴져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えへっ、えへへっ……<emoji=heart04>\u3000幸せですっ……<emoji=heart04>\u3000もう一生、ああぁあんっ、繋がったままでいいくらいっ……<emoji=heart04>」"
translation = "「에헤, 에헤헤……<emoji=heart04>\u3000행복해요……<emoji=heart04>\u3000이제 평생, 아아앙, 연결된 채로 있어도 좋을 만큼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「こんなに幸せなら、もっと早くエッチしておけば良かったです……<emoji=heart04>\u3000恥ずかしがってた自分が、あふぁ、馬鹿みたいですっ……<emoji=heart04>」"
translation = "「이렇게 행복하다면, 좀 더 빨리 섹스해 둘 걸 그랬어요……<emoji=heart04>\u3000부끄러워하던 제가, 아하, 바보 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "破瓜の痛みも感じていないように、ナミエルが「もっともっと」と膣をキュウキュウ締めて抽挿をねだってきてくれる。"
translation = "처녀를 잃는 아픔도 느끼지 못하는 듯, 나미엘이 「더, 더」라며 질을 꽉꽉 조여 삽입을 졸라온다."

[[dialogue]]
speaker = "unk"
original = "愛する花嫁が、お嫁さんが、全幅の愛と信頼を俺に寄せてくれる。"
translation = "사랑하는 신부가, 아내가, 전폭적인 사랑과 신뢰를 내게 보내준다."

[[dialogue]]
speaker = "unk"
original = "ただそれだけで──"
translation = "그저 그것만으로──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、あっ、あっ、あっ、あっ<emoji=heart04>\u3000はげしっ<emoji=heart04>\u3000あああっ、気持ち、いいっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗, 앗<emoji=heart04>\u3000격렬해<emoji=heart04>\u3000아아앗, 기분, 좋아……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気付いた時には、がむしゃらにナミエルを突き上げていた。"
translation = "정신을 차렸을 때는, 무아지경으로 나미엘을 들이받고 있었다."

[[dialogue]]
speaker = "unk"
original = "もっと彼女と溶け合いたくて、ひとつになりたくて、俺の愛を伝えたくて。"
translation = "더 그녀와 녹아들고 싶어서, 하나가 되고 싶어서, 나의 사랑을 전하고 싶어서."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふぁああああああっっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000乳首も一緒にくりくりされて<emoji=heart04>\u3000イくっ、イっちゃいますっ<emoji=heart04>」"
translation = "「후아아아아아앗……<emoji=heart04>\u3000앗, 앗<emoji=heart04>\u3000유두도 같이 굴려져서<emoji=heart04>\u3000가, 가버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「おま○こも、おっぱいも、気持ちいいっ<emoji=heart04>\u3000体熱くて、お腹の奥キュンキュンして、おかしくなりますぅっ<emoji=heart04>」"
translation = "「보지도, 가슴도, 기분 좋아<emoji=heart04>\u3000몸이 뜨거워서, 뱃속이 큥큥거려서, 이상해질 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はずっ、恥ずかしっ、初めてなのに、あああっ、こんなに感じて、しまってっ……<emoji=heart04>」"
translation = "「부, 부끄러워, 처음인데, 아아앗, 이렇게 느껴버려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「だけど、ふぁあああっ、無理っ<emoji=heart04>\u3000我慢できませっ<emoji=heart04>\u3000言葉以上に、はふぁっ、あなたの愛がっ、興奮がっ、伝わってきてっ……<emoji=heart04>」"
translation = "「하지만, 후아아앗, 무리예요<emoji=heart04>\u3000참을 수 없……<emoji=heart04>\u3000말 이상으로, 하후앗, 당신의 사랑이, 흥분이, 전해져 와서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お腹の中熱いっ<emoji=heart04>\u3000またイクっ、イクぅっ<emoji=heart04>\u3000あっ、はぁっ、あぁっ、気持ちいいっ<emoji=heart04>\u3000幸せっ、ああああっ、イクぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「뱃속이 뜨거워<emoji=heart04>\u3000또 가, 가요오오……<emoji=heart04>\u3000앗, 하앗, 아앗, 기분 좋아<emoji=heart04>\u3000행복해, 아아아앗, 가요오오오……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も熱くて熱くてたまらない。ひと突きする度にペニスが猛る。大好きな彼女を、最愛の妻を孕ませたいと肉棒に精子が滾る。"
translation = "나 또한 뜨겁고 뜨거워서 견딜 수가 없다. 한 번 찌를 때마다 페니스가 맹렬히 솟구친다. 사랑하는 그녀를, 최애의 아내를 임신시키고 싶어 육봉에 정액이 끓어오른다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000大きなおち○ちんで、お腹の中、広がっちゃうっ<emoji=heart04>\u3000おま○この中、おち○ちんの形にされてますっ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04>\u3000커다란 자지로, 뱃속이, 넓어져 버려……<emoji=heart04>\u3000보지 안이, 자지 모양이 되어버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「大きて、硬い、おち○ちんの形に……<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000中でビクビクして、おち○ちんの形、わかっちゃいますぅっ<emoji=heart04>」"
translation = "「크고, 딱딱한, 자지 모양으로……<emoji=heart04>\u3000하앗<emoji=heart04>\u3000앙<emoji=heart04>\u3000안에서 꿈틀거려서, 자지 모양을, 알겠어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふあああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000奥までズンズン来てっ<emoji=heart04>\u3000壊れちゃいそう、ですっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04>\u3000앗<emoji=heart04>\u3000앗<emoji=heart04>\u3000안쪽까지 줌, 줌 들어와서<emoji=heart04>\u3000부서질 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000お腹の奥、ジンジンして……<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000気持ちいい、ですっ……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04>\u3000앗<emoji=heart04>\u3000대단해<emoji=heart04>\u3000뱃속 깊은 곳이, 징징거려서……<emoji=heart04>\u3000응앗<emoji=heart04>\u3000기분 좋아, 요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっと深く繋がりたい。もっと奥まで届かせたい。そう思って全身に力が入る。"
translation = "더 깊게 연결되고 싶다. 더 안쪽까지 닿게 하고 싶다. 그렇게 생각하며 전신에 힘이 들어간다."

[[dialogue]]
speaker = "unk"
original = "突き上げる動きが荒々しくなり、怒張したペニスが何度もナミエルの小さなおま○こを出入りする。"
translation = "들이받는 움직임이 거칠어지고, 발기한 페니스가 몇 번이고 나미엘의 작은 보지를 들락날락한다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふぁあっ、はぁっ、あっ、あんっ<emoji=heart04>\u3000激しっ<emoji=heart04>\u3000おち○ちん激しいですっ<emoji=heart04>\u3000おま○この中、ぐちゃぐちゃにかき混ぜられてぇっ<emoji=heart04>」"
translation = "「후아앗, 하앗, 앗, 앙<emoji=heart04>\u3000격렬해<emoji=heart04>\u3000자지가 격렬해요……<emoji=heart04>\u3000보지 안이, 엉망진창으로 휘저어져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ん──んん～～～～～っ<emoji=heart04><emoji=heart04>\u3000またイッちゃ……んんぅっ<emoji=heart04>\u3000イク、イク、イッくぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응──응～～～～～<emoji=heart04><emoji=heart04>\u3000또 가버……응으앗<emoji=heart04>\u3000가, 가, 가버려어어～～～<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感に震えるナミエルをぎゅっと抱き締めながら、腰の動きが加速していって──"
translation = "쾌감에 떠는 나미엘을 꽉 껴안으며, 허리 움직임이 가속되어──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「くはぁああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あつっ、熱いっ<emoji=heart04>\u3000ゴムが破れてっ<emoji=heart04>\u3000おち○ちんの感触が直にっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쿠하아아아아아아앗～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000뜨거, 뜨거워<emoji=heart04>\u3000콘돔이 찢어져서……<emoji=heart04>\u3000자지의 감촉이 직접……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゴムが破け、生の膣内の極上の感触がペニスを締め付ける。"
translation = "콘돔이 찢어지고, 날것의 질 내의 극상의 감촉이 페니스를 조여온다."

[[dialogue]]
speaker = "unk"
original = "このままではこらえる間もなく射精してしまうと思い、止めようかと迷ったが──"
translation = "이대로는 참을 새도 없이 사정해 버릴 것 같아, 멈출까 망설였지만──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「やめないでくださいっ！」"
translation = "「멈추지 말아 주세요!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「今さらっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000何を気にすることが、あるんですかっ……<emoji=heart04>\u3000いいんですよっ、孕ませてっ、あっ、あっ、私のこと孕ませてくださいっ<emoji=heart04>」"
translation = "「이제 와서……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000무엇을 신경 쓸 게, 있나요……<emoji=heart04>\u3000괜찮아요, 임신시켜서, 앗, 앗, 저를 임신시켜 주세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「もう私はあなたのお嫁さんなんですからっ<emoji=heart04>\u3000赤ちゃん作ってくれていいんですっ<emoji=heart04>\u3000お母さんにしてくれていいんですっ<emoji=heart04>」"
translation = "「이미 저는 당신의 아내니까요……<emoji=heart04>\u3000아기 만들어도 괜찮아요……<emoji=heart04>\u3000엄마로 만들어 줘도 괜찮아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ゴムは付けましたけど、そんなの建前で<emoji=heart04>\u3000私も欲しいっ<emoji=heart04>\u3000あなたとのっ、愛する旦那様との子どもが欲しいっ……<emoji=heart04>」"
translation = "「콘돔은 꼈지만, 그런 건 명분일 뿐이고<emoji=heart04>\u3000저도 원해요……<emoji=heart04>\u3000당신과의, 사랑하는 남편과의 아이가 갖고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「気付いてないんですかっ<emoji=heart04>\u3000さっきから、あっ、あっ、あぁあああっっ<emoji=heart04>\u3000私の子宮っ、ふああぁぁあっ、降りっぱなしでっ……<emoji=heart04>」"
translation = "「눈치채지 못한 건가요<emoji=heart04>\u3000아까부터, 앗, 앗, 아아아아앗……<emoji=heart04>\u3000제 자궁이, 후아아앗, 계속 내려와서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂に悶えながらもナミエルが体重をぐっと落として、自ら子宮口にペニスをぶつけてくる。"
translation = "절정에 몸부림치면서도 나미엘이 체중을 꾹 실어, 스스로 자궁구에 페니스를 부딪쳐 온다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あなたと愛を誓った時から、あっ、はぁっ、あぁああんっ<emoji=heart04>\u3000あなたの子どもを宿すつもり、満々ですからっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신과 사랑을 맹세했을 때부터, 앗, 하앗, 아아아앙……<emoji=heart04>\u3000당신의 아이를 가질 생각, 만만하니까요……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それともあなたは、嫌ですかっ？\u3000私と子どもっ、作りたくないん、ですかっ？」"
translation = "「그게 아니면 당신은, 싫은가요? 저랑 아이, 만들고 싶지, 않은가요?」"

[[dialogue]]
speaker = "unk"
original = "その聞き方は──ズルすぎるっ！"
translation = "그렇게 묻는 건── 너무 치사하잖아!"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あはぁあああんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あふぁああっ、あぁあああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아하아아앙응응……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000앗, 앗, 앗, 아후아앗, 아아아아앗～～……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そうですっ<emoji=heart04>\u3000もっとっ、もっと突いてくださいっ<emoji=heart04>\u3000おま○こに精子注ぎ込んでっ<emoji=heart04>\u3000私の卵子にあなたのかけてっ<emoji=heart04>」"
translation = "「그래요……<emoji=heart04>\u3000더, 더 찔러 주세요……<emoji=heart04>\u3000보지에 정액 쏟아부어서……<emoji=heart04>\u3000제 난자에 당신의 것을 뿌려줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あぁっ<emoji=heart04>\u3000もっとっ、もっとぉっ<emoji=heart04>\u3000私を孕ませようとしてくださいっ<emoji=heart04>\u3000種つけしたいと想ってくださいっ<emoji=heart04>」"
translation = "「아앗……<emoji=heart04>\u3000더, 더어……<emoji=heart04>\u3000저를 임신시키려고 해 주세요……<emoji=heart04>\u3000씨 뿌리고 싶다고 생각해 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "我慢も遠慮もなしに、一心不乱に小さなおま○こを突き上げていく。"
translation = "참음도 사양도 없이, 정신없이 작은 보지를 들이받아 간다."

[[dialogue]]
speaker = "unk"
original = "ナミエルの感触を直に感じ、グツグツに煮えたぎった彼女の膣内が気持ち良すぎて、頭の中が蕩けてしまう。"
translation = "나미엘의 감촉을 직접 느끼며, 펄펄 끓어오르는 그녀의 질 내부가 너무나 기분 좋아 머릿속이 녹아버릴 것 같다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、あっ、あっ、イくっ<emoji=heart04>\u3000イっちゃっ<emoji=heart04>\u3000生のおち○ちん、しゅごいっ<emoji=heart04>\u3000あぁっ、あああ～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 가, 가버려……<emoji=heart04>\u3000가버려……<emoji=heart04>\u3000날것의 자지, 굉장해……<emoji=heart04>\u3000아앗, 아아아～～……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふぁああああっっ<emoji=heart04>\u3000イくっ、イくイくイくぅっ<emoji=heart04>\u3000とまりませっ<emoji=heart04>\u3000ああああっっ<emoji=heart04>\u3000溶けっ<emoji=heart04>\u3000溶けちゃっ<emoji=heart04>」"
translation = "「후아아아앗……<emoji=heart04>\u3000가, 가, 가, 가버려어어……<emoji=heart04>\u3000멈추질 않아……<emoji=heart04>\u3000아아아앗……<emoji=heart04>\u3000녹아……<emoji=heart04>\u3000녹아버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「さっきから熱いのが、我慢汁が、流れ込んできてっ<emoji=heart04>\u3000これだけで、はふぁああっ<emoji=heart04>\u3000孕んじゃいそうですっ<emoji=heart04>」"
translation = "「아까부터 뜨거운 게, 애액이, 흘러들어와서……<emoji=heart04>\u3000이것만으로도, 하후아앗……<emoji=heart04>\u3000임신해 버릴 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「でもいやぁっ<emoji=heart04>\u3000精子でっ、子種でちゃんと孕みたいっ<emoji=heart04>\u3000あなたの精子で孕ませてほしいですっ<emoji=heart04>」"
translation = "「하지만 싫어……<emoji=heart04>\u3000정자로, 씨로 제대로 임신하고 싶어……<emoji=heart04>\u3000당신의 정자로 임신시켜 줬으면 좋겠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のザーメンを求めるようにナミエルもまた激しく体を上下させてくれる。子種を搾り出そうとギチギチに締め付けてきてくれる。"
translation = "내 정액을 갈구하듯 나미엘 또한 격렬하게 몸을 위아래로 흔들어 준다. 씨를 짜내려는 듯 꽉꽉 조여온다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「好きっ<emoji=heart04>\u3000好きなんですっ<emoji=heart04>\u3000孕みたいほどあなたのことを愛してるんですっ<emoji=heart04>」"
translation = "「좋아해……<emoji=heart04>\u3000좋아해요……<emoji=heart04>\u3000임신하고 싶을 정도로 당신을 사랑해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「私をママにしてくださいっ<emoji=heart04>\u3000お母さんにしてくださいっ<emoji=heart04>\u3000あなたの子どもが欲しいっ<emoji=heart04>\u3000あなたの精子で妊娠したいっ<emoji=heart04>」"
translation = "「저를 엄마로 만들어 주세요……<emoji=heart04>\u3000어머니로 만들어 주세요……<emoji=heart04>\u3000당신의 아이가 갖고 싶어……<emoji=heart04>\u3000당신의 정자로 임신하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も孕ませたい。ナミエルを、俺のお嫁さんを妊娠させたい──！"
translation = "나도 임신시키고 싶어. 나미엘을, 내 신부님을 임신시키고 싶어──!"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000おち○ちん、バクンバクン脈打ってっ<emoji=heart04>\u3000あふぁあっ、疼いちゃっ<emoji=heart04>\u3000赤ちゃんの部屋、さらに降りてきちゃっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 자지, 벌떡벌떡 맥동해<emoji=heart04> 아하앗, 쑤셔와<emoji=heart04> 아기 방, 더 안쪽으로 내려와 버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「出してっ、孕ませてっ<emoji=heart04>\u3000必ず妊娠しますからっ<emoji=heart04>\u3000あなたとの愛の結晶、お腹に宿しますからっ<emoji=heart04>」"
translation = "「싸줘, 임신시켜줘<emoji=heart04> 반드시 임신할 테니까<emoji=heart04> 당신과의 사랑의 결정, 뱃속에 품을 테니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「家族を、作りましょうっ<emoji=heart04>\u3000作りたいんですっ<emoji=heart04>\u3000誰でもない、あなたとっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가족을, 만들어요<emoji=heart04> 만들고 싶어요<emoji=heart04> 누구도 아닌, 당신과<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あれだけ家族を作ることを怖がっていたナミエルが、俺と家族を作りたいと言ってくれる。"
translation = "그토록 가족을 만드는 것을 두려워하던 나미엘이, 나와 가족을 만들고 싶다고 말해준다."

[[dialogue]]
speaker = "unk"
original = "何よりも愛と信頼のこもった言葉が、何よりも俺を滾らせていく。"
translation = "무엇보다 사랑과 신뢰가 담긴 말이, 무엇보다 나를 뜨겁게 달군다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「出してっ<emoji=heart04>\u3000出してくださいっ<emoji=heart04>\u3000一滴残らずぶちまけてっ<emoji=heart04>\u3000私の膣内にっ、おま○こにっ<emoji=heart04>」"
translation = "「싸줘<emoji=heart04> 싸주세요<emoji=heart04> 한 방울도 남김없이 쏟아부어줘<emoji=heart04> 내 질 안에, 보지에<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「イきたいっ<emoji=heart04>\u3000孕みたいっ<emoji=heart04>\u3000あなたのおち○ちんでっ、中出し精子でっ<emoji=heart04>\u3000本当の意味であなたのっ、あなたのっっ<emoji=heart04>」"
translation = "「가버릴 것 같아<emoji=heart04> 임신하고 싶어<emoji=heart04> 당신의 자지로, 질내사정으로<emoji=heart04> 진정한 의미에서 당신의, 당신의이이<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あなたのお嫁さんにっっ──なりたいんですぅっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「당신의 신부님이이── 되고 싶어요오오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はふぁあああああああっっ<emoji=heart04>\u3000あっ──あふぁあああっ<emoji=heart04>\u3000あああああああああああっっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하후아아아아아앗<emoji=heart04> 앗──아후아아앗<emoji=heart04> 아아아아아아아아앗～～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「イっ──あああああああっっ<emoji=heart04>\u3000きへりゅっ<emoji=heart04>\u3000どぴゅどぴゅ膣内にきへましゅぅっ<emoji=heart04>」"
translation = "「가앗──아아아아아앗<emoji=heart04> 가버려어<emoji=heart04> 듬뿍 질 안에 가버려요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「きもひいいっっ<emoji=heart04>\u3000あふぁああっっ、しあわせぇっ<emoji=heart04>」"
translation = "「기분 좋아아앗<emoji=heart04> 아후아아앗, 행복해<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「本当に種つけしてもらえてましゅっ<emoji=heart04>\u3000大好きな人にっ、わたひの、あぁぁああっっ、旦那さまにっっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「정말로 씨앗을 심어주셔서어<emoji=heart04> 가장 사랑하는 사람에게, 저의, 아아아앗, 서방님께에……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶対に孕ませるために根元の根元まで突き入れて、ナミエルの子宮に大量の精を注ぎ込む。"
translation = "절대로 임신시키기 위해 뿌리 끝까지 찔러 넣어, 나미엘의 자궁에 대량의 정액을 쏟아붓는다."

[[dialogue]]
speaker = "unk"
original = "彼女の卵子にありったけの精子をぶっかけていく。"
translation = "그녀의 난자에 있는 정자 전부를 퍼붓는다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふぁぁぁ……<emoji=heart04>\u3000おち○ちん萎えちゃうくらい、搾り出して、くれて……<emoji=heart04>」"
translation = "「후아아……<emoji=heart04> 자지가 시들 정도로, 쥐어짜 내어 줘서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぬるりと膣内から抜け落ちたペニスを見て、ナミエルが幸せそうに顔を綻ばせる。"
translation = "미끈거리며 질 안에서 빠져나온 페니스를 보고, 나미엘이 행복한 듯 얼굴을 활짝 핀다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はぁはぁ、まだ先っぽから精子出てます……<emoji=heart04>\u3000えへへ、本当に種つけしてくれたんですね……<emoji=heart04>」"
translation = "「하아하아, 아직 끝에서 정자가 나오고 있어요……<emoji=heart04> 에헤헤, 정말로 씨앗을 심어주셨군요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お腹の中すごくキュンキュンしてます……<emoji=heart04>\u3000私の卵子とあなたの精子がイチャイチャしてるのはっきりわかって……<emoji=heart04>」"
translation = "「뱃속이 엄청나게 큥큥거려요……<emoji=heart04> 제 난자와 당신의 정자가 꽁냥거리는 게 확실히 느껴져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えへへ、絶対孕んじゃってます……<emoji=heart04>\u3000幸せすぎて死んじゃいそうです……<emoji=heart04>」"
translation = "「에헤헤, 분명 임신해버렸을 거예요……<emoji=heart04> 너무 행복해서 죽을 것 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い吐息を漏らしながらナミエルが微笑みかけてくれる。"
translation = "달콤한 한숨을 내쉬며 나미엘이 미소 지어준다."

[[dialogue]]
speaker = "unk"
original = "俺も幸せでたまらなかった。だけど、こんな幸せが──"
translation = "나도 행복해서 견딜 수 없었다. 하지만, 이런 행복이──"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「こんな幸せが……これから毎日続いていくんですね？\u3000これからもずっとずっと……<emoji=heart04>」"
translation = "「이런 행복이…… 앞으로 매일 계속되는 거죠? 앞으로도 계속 쭉……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「えへへ、先程から顔がにやけて仕方ないです……<emoji=heart04>\u3000こんなの私のキャラではありませんのに……<emoji=heart04>」"
translation = "「에헤헤, 아까부터 얼굴이 헤벌쭉해져서 어쩔 줄 모르겠어요……<emoji=heart04> 이런 건 제 캐릭터가 아닌데……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初エッチの余韻に浸りながら、ナミエルがうっとりと背中を預けてきてくれる。"
translation = "첫 관계의 여운에 잠기며, 나미엘이 황홀한 듯 내 등에 몸을 기댄다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「改めて……末永くよろしくお願いしますね？\u3000一緒におじいさんとおばあさんになりましょう」"
translation = "「다시 한번…… 앞으로도 잘 부탁해요? 같이 할아버지, 할머니가 되어요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それと……その、今夜また改めてエッチもしたいです……<emoji=heart04>\u3000まだまだイチャイチャし足りませんから……<emoji=heart04>」"
translation = "「그리고…… 그, 오늘 밤에 다시 한번 더 하고 싶어요……<emoji=heart04> 아직 꽁냥거림이 부족하니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘えてきてくれるお嫁さんの姿に、再びペニスがグググと持ち上がってしまう。"
translation = "어리광을 부리는 신부님의 모습에, 다시 페니스가 꿈틀거리며 치솟아 오른다."

[[dialogue]]
speaker = "unk"
original = "そんな俺の姿を見て、ナミエルがくすくすと笑う。"
translation = "그런 내 모습을 보고, 나미엘이 킥킥거리며 웃는다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ふふ、ですから気が早いですってば<emoji=heart04>\u3000これからいくらでも時間はあるんですから<emoji=heart04>」"
translation = "「후후, 그러니까 성급하시다니까<emoji=heart04> 앞으로 시간은 얼마든지 있으니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「たくさんたくさんイチャイチャして、エッチして、幸せな家庭を築いていきましょう……<emoji=heart04>」"
translation = "「많이 많이 꽁냥거리고, 관계도 맺으면서, 행복한 가정을 꾸려나가요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「愛してますよ、あ・な・た<emoji=heart04>\u3000えへへ……<emoji=heart04>」"
translation = "「사랑해요, 당・신<emoji=heart04> 에헤헤……<emoji=heart04>」"

