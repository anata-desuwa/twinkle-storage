[[dialogue]]
speaker = "unk"
original = "第３話,貴族の恋バナ？,P"
translation = "제3화, 귀족의 연애 이야기?, P"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それでジュリエッテ様、会長さんとその後はどんな感じなんです？」"
translation = "「그래서 줄리엣테님, 회장님과는 그 후로 어떤 느낌이신가요?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ふふ、もちろん順調でございますわ。たとえ魔王様といえども、わたくしの手にかかればちょちょいのちょいでございますわ」"
translation = "「후후, 물론 순조롭사옵니다. 설령 마왕님이라 할지라도, 와타쿠시의 손에 걸리면 식은 죽 먹기이옵니다요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふ～ん、なら会長さんとどんなことをしたんですか？」"
translation = "「흐음~, 그럼 회장님과 어떤 일을 하셨나요?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ええっ！？\u3000そ、それはでございますね……とてもアダルトなことですわ！」"
translation = "「에엣!? 그, 그것은 말입니다요…… 매우 어덜트한 것이옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「まぁ大胆♪\u3000具体的にどんなことをされたんですか～？\u3000気になりますね～」"
translation = "「어머 대담해라♪ 구체적으로 어떤 일을 하셨나요오~? 궁금하네요오~」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「それは……その、でございますね……とても公共の場では言えませんわ……！」"
translation = "「그것은…… 그, 말입니다요…… 매우 공공장소에서는 말할 수 없사옵니다……!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「おやおや～？\u3000もしかして全然進展してないんじゃないですか～？\u3000ジュリエッテ様ってばヘタレなんですから♪」"
translation = "「어머어머~? 혹시 전혀 진전이 없는 거 아닙니까아~? 줄리엣테님은 풋내기이시니까요오♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「んなっ！？\u3000ヘタレではございませんわ！\u3000淑女でございますの！\u3000お付き合いしていないのに、ふしだらなことはできませんわ！」"
translation = "「뭐엇!? 풋내기는 아니옵니다! 숙녀이옵니다! 사귀지도 않는데, 헤픈 짓은 할 수 없사옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ほら～、やっぱり嘘だったんですね～♪\u3000くふふ♪」"
translation = "「거봐요~, 역시 거짓말이었네요오~♪ 크후후♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（くぅ～～～～！！\u3000やっぱり腹立ちますわ～～！\u3000わたくしっ、この方嫌い！！）"
translation = "（크으~~~~~~!! 역시 화가 나옵니다아~~! 와타쿠시, 이 사람 싫어!!）"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「やっぱりジュリエッテ様に会長さんの攻略はムリってことですね♪」"
translation = "「역시 줄리엣테님께 회장님 공략은 무리라는 거네요오♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「そんなことございませんわ……！\u3000なんて言ったってわたくし、魔王様のお家にお呼ばれされたのでございますもの！」"
translation = "「그런 일 없사옵니다……! 뭐라고 말씀드려도 와타쿠시, 마왕님의 댁에 초대받았사옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「お呼ばれ……！？\u3000……でもどうせ、ジュリエッテ様が押しかけたんでしょう？」"
translation = "「초대……!? ……하지만 어차피, 줄리엣테님이 쳐들어간 거겠죠?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ぐぬぬっ、そうやって何でもかんでも疑うのは品性に欠けましてよ！」"
translation = "「크으윽, 그렇게 뭐든지 의심하는 것은 품성에 결여되옵니다요!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「おや？\u3000否定しないということは、図星なんですかね～」"
translation = "「어머? 부정하지 않는다는 것은, 정곡을 찔린 건가요오~」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「で、ですが、魔王様のお家に伺ったのは本当のことでございますわっ」"
translation = "「하, 하지만, 마왕님의 댁에 찾아간 것은 사실이옵니다앗」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「あっそう……で、会長さんのお家で何をしたんです？」"
translation = "「아, 그렇습니까…… 그래서, 회장님 댁에서 뭘 하셨나요?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ふふ、魔王様に手料理を振る舞いましたわ～！」"
translation = "「후후, 마왕님께 손수 만든 요리를 대접했사옵니다아~！」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「魔王様ったら、わたくしの手料理をそれはそれは美味しそうに平らげてくださいましたわ！」"
translation = "「마왕님께서, 와타쿠시의 손수 만든 요리를 정말 맛있게 드셔 주셨사옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ふーん……それだけですか？」"
translation = "「흐음…… 그것뿐인가요?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「……それだけとはどういうことでございます？」"
translation = "「……그것뿐이라니 무슨 말씀이옵니까?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「だから～、会長さんのお家に行って、料理して帰っただけなんです～？」"
translation = "「그러니까아~, 회장님 댁에 가서, 요리하고 돌아온 것뿐인가요오~?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「そ、そそそんなことはございませんわっ……！\u3000このわたくしが、その程度のことで終わるはずがありませんもの！」"
translation = "「그, 그그그럴 리 없사옵니다앗……! 이 와타쿠시가, 그 정도 일로 끝날 리가 없사옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「じゃあ他には何をしたんですか～？\u3000もっと教えてくださいよー」"
translation = "「그럼 그 외에는 뭘 하셨나요오~? 더 알려 주세요오~」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「それは……え～と……こ、婚約っ、婚約も済ませましたわ！\u3000魔王様と婚約！」"
translation = "「그것은…… 에~또…… 호, 혼약, 혼약도 마쳤사옵니다! 마왕님과 혼약!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「魔王様とはもう将来を誓い合った仲になったでございますの～！」"
translation = "「마왕님과는 이미 장래를 맹세한 사이가 된 것이옵니다아~！」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「でもさっき、魔王様とお付き合いしてないって言っていましたよね？」"
translation = "「하지만 아까, 마왕님과 사귀지 않는다고 말씀하셨잖아요?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「そ、それは……！！」"
translation = "「그, 그것은……!!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「どうしてそんなしょうもない嘘を吐くんです？\u3000昔からそうですが、無駄に見栄っ張りなんですから」"
translation = "「어째서 그런 시시한 거짓말을 하는 건가요? 옛날부터 그랬지만, 쓸데없이 허세만 부리시네요」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「うぐぐっ！！\u3000そんな冷たい目を向けないでくださいまし！」"
translation = "「우득윽!! 그런 차가운 눈빛으로 보지 말아 주시옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はぁ……ジュリエッテ様って、本当に残念な人ですね～」"
translation = "「하아…… 줄리엣테님은, 정말 안타까운 분이시네요오~」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "（本っ当に腹が立つでございますわ～！\u3000くぅ～～～～！！）"
translation = "（정말이지 화가 머리 끝까지 치밀어 오르옵니다~! 크으으으으~~~~~~!!）"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「普通男の子のお家に行ったら、もっと他にやることとかありませ～ん？」"
translation = "「보통 남자아이의 집에 갔다면, 더 다른 할 일 같은 건 없나아~요?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ハレンチですわ！\u3000不健全ですわ！\u3000風紀が乱れますわ～！」"
translation = "「파렴치하옵니다! 불건전하옵니다! 풍기가 문란해지옵니다~!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「何を想像したのかは分かりませんけど、ジュリエッテ様がそんな調子なら、私が会長さんを手に入れるのも時間の問題ですね～♪」"
translation = "「무엇을 상상하셨는지는 모르겠지만, 줄리엣테님이 그런 식이라면, 제가 회장님을 손에 넣는 것도 시간문제이겠네요오~♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「なっ！？\u3000そんなことはさせませんわ！」"
translation = "「뭣!? 그런 짓은 못 하게 하옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「でも～、ヘタレなジュリエッテ様には無理なんじゃないです～？\u3000会長さんを虜にするのは♪」"
translation = "「하지만~, 끈기 없는 줄리엣테님에게는 무리이지 않을까아~요? 회장님을 사로잡는 것은♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「むっか～～～～！！\u3000できますわやってやるでございますわ～～！！」"
translation = "「욱하아아아아~~~~!! 할 수 있사옵니다 해내고야 말겠사옵니다아아~~!!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「魔王様なんかわたくしの美貌でイチコロでございますからっ！」"
translation = "「마왕님 따위 와타쿠시의 미모로 일격 필살이옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「プッ……美貌ねぇ♪」"
translation = "「풉…… 미모라니이♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「何か異論でもあるのでございます！？」"
translation = "「무슨 이의라도 있으시옵니까!?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「い～え？\u3000ジュリエッテ様はと～っても、おかわいいですよ♪」"
translation = "「아아~니요? 줄리엣테님은 너어~무, 귀여우시답니다♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「絶っっ対にバカにしてやがるでございますね！！\u3000覚えてらっしゃいませ！\u3000今すぐ魔王様をわたくしのものにしてやりますわ！」"
translation = "「절대애애애로 바보 취급하고 있는 것이옵니다! 똑똑히 기억해 두시옵니다! 당장 마왕님을 와타쿠시의 것으로 만들고야 말겠사옵니다!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はいはい、がんばってくださいね～♪」"
translation = "「네에 네에, 힘내세요오~♪」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ぎぃぃぃぃ！！\u3000ぜーったいに吠え面をかかせてやりますわ～！」"
translation = "「끼이이이이!! 절대로 콧대를 꺾어 주고야 말겠사옵니다~!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「はぁはぁ、はぁはぁはぁっ……はぁ、はぁ……」"
translation = "「하아하아, 하아하아하아앗…… 하아, 하아……」"

[[dialogue]]
speaker = "unk"
original = "ジュリエッテ？"
translation = "줄리엣테?"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ま、魔王様……ここで会ったが百年目ですわ……！」"
translation = "「마, 마왕님…… 여기서 만난 것이 천운이옵니다……!」"

[[dialogue]]
speaker = "unk"
original = "え、何？\u3000果し合い？"
translation = "어, 뭐야? 결투?"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「おデートですわ～～～！！」"
translation = "「데이트이옵니다아~~~!!」"

[[dialogue]]
speaker = "unk"
original = "！！？？"
translation = "!!????"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「魔王様、おデートしますわよ！\u3000わたくしと！」"
translation = "「마왕님, 데이트하시옵니다! 와타쿠시와!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「わたくしの美貌で魔王様をメロメロにしてあげますわ！\u3000イチコロでございますわ！」"
translation = "「와타쿠시의 미모로 마왕님을 홀딱 반하게 해 드리겠사옵니다! 일격 필살이옵니다!」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「言っておきますが、魔王様に拒否権はないでございますわよ！\u3000おデートするったらしますわよ！」"
translation = "「미리 말씀드리옵니다만, 마왕님께 거부권은 없사옵니다! 데이트한다고 하면 하는 것이옵니다!」"

[[dialogue]]
speaker = "unk"
original = "分かった"
translation = "알았어"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「即答でございますの！？\u3000わたくし達敵同士でございますよ！？」"
translation = "「즉답이옵니까!? 와타쿠시들은 적대 관계이옵니다!?」"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「ま、まあいいでございますわ……決戦の時は日曜日！\u3000それまで首を洗って待っていてくださいな！」"
translation = "「마, 뭐어 좋사옵니다…… 결전의 날은 일요일! 그때까지 목을 씻고 기다리고 계시옵소서!」"

[[dialogue]]
speaker = "unk"
original = "楽しみにしてる"
translation = "기대하고 있을게"

[[dialogue]]
speaker_original = "ジュリエッテ"
speaker_translation = "줄리엣타"
original = "「そ、そんな目を輝かせないでくださいまし！\u3000顔が赤くなるでございますわ～！」"
translation = "「그, 그런 눈을 반짝이지 말아 주시옵니다! 얼굴이 빨개지옵니다~!」"

[[dialogue]]
speaker = "unk"
original = "そう言い放ってジュリエッテは逃げるように去っていってしまった。"
translation = "그렇게 말하고 줄리엣테는 도망치듯 떠나 버렸다."

