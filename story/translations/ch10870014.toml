[[dialogue]]
speaker = "unk"
original = "第４話,家宝誕生,P"
translation = "제4화, 가보 탄생, P"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーと話せば話すほど、懐柔するのは困難に思えた。"
translation = "발레리와 대화하면 할수록 회유하는 것은 곤란해 보였다."

[[dialogue]]
speaker = "unk"
original = "どうすれば、彼女を正しく満足させられるのだろう。"
translation = "어떻게 해야 그녀를 올바르게 만족시킬 수 있을까."

[[dialogue]]
speaker = "unk"
original = "個人の性癖を否定するつもりはないけれど、人に多大な迷惑がかかってしまうのは――"
translation = "개인의 성벽을 부정할 생각은 없지만, 타인에게 큰 폐를 끼치게 되는 것은――"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ふむ、この魔法少女ステッキは、リーナへのお土産に良さそうですね。お値段も手頃です」"
translation = "「흠, 이 마법소녀 스틱은 리나에게 줄 선물로 좋아 보이네요. 가격도 저렴하고요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「おや、会長さん、よくお会いしますね。あなたとの間に強い縁が結ばれたのでしょうか、フフフ」"
translation = "「오라, 회장님, 자주 뵙네요. 당신과 저 사이에 강한 인연이 맺어진 것일까요, 후후후」"

[[dialogue]]
speaker = "unk"
original = "噂をすれば、なんとやら。本当に彼女との間に縁が結ばれたのか、それとも、俺の行動パターンを把握してる……？"
translation = "호랑이도 제 말 하면 온다더니. 정말 그녀와 인연이 맺어진 걸까, 아니면 내 행동 패턴을 파악하고 있는 걸까……?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ここ、秋葉原にも多種多様な美しさがひしめいていますからね。例えば、あのショーケースに入っている水着フィギュア……」"
translation = "「여기 아키하바라에도 다채로운 아름다움이 가득하니까요. 예를 들어 저 쇼케이스에 들어 있는 수영복 피규어……」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ああ……実に美しい……うら若き女体の艶めかしさを十全に表現している……！\u3000滴る水の表現も完璧です。思わず、頬ずりしたくなりますね」"
translation = "「아아…… 진정 아름다워…… 젊은 여체의 요염함을 온전히 표현하고 있어요……! 떨어지는 물의 표현도 완벽합니다. 나도 모르게 비비고 싶어지네요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「美しい物は等しく美しい。そこに貴賤はありません。このような美を生み出すことができる創作者もまた、素晴らしく尊いです」"
translation = "「아름다운 것은 똑같이 아름답습니다. 거기에는 귀천이 없어요. 이런 아름다움을 만들어낼 수 있는 창작자 또한 훌륭하고 존귀합니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「もちろん、私も物作りを試したことがありますけどね」"
translation = "「물론 저도 물건 만들기를 시도해 본 적이 있습니다만」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「しかし、何度やっても、想い描いてる物をイメージ通りに出力できなかった。私が生み出す物は、私の求める美に遠く及ばなかった」"
translation = "「하지만 몇 번을 해도 마음속에 그리고 있는 것을 이미지대로 출력할 수 없었죠. 제가 만들어내는 것은 제가 추구하는 미에 턱없이 부족했습니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「なまじ、美を知ってしまっているが故の不幸でしょうか。美術をこの上なく愛する気持ちがあっても、自らの手で生み出す才能は与えられなかったのですよ」"
translation = "「어설프게 미를 알고 있기에 생기는 불행일까요. 미술을 더할 나위 없이 사랑하는 마음이 있어도 스스로의 손으로 만들어내는 재능은 주어지지 않았던 겁니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「私が作った物は何ひとつとして残っていません。歪さに耐えかねて――快感を得るためではなく、ただの不快感で全て破壊しています」"
translation = "「제가 만든 것은 단 하나도 남아있지 않아요. 비뚤어짐을 견디지 못해―― 쾌감을 얻기 위해서가 아니라 그저 불쾌감 때문에 전부 파괴했습니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「自分で生み出した物を壊すことで快感を得られたのならば、もう少し己を愛することもできたことでしょう」"
translation = "「직접 만들어낸 것을 부수는 것으로 쾌감을 얻을 수 있었다면 조금 더 자신을 사랑할 수 있었을 텐데요」"

[[dialogue]]
speaker = "unk"
original = "自分のことが嫌いなのか？"
translation = "자신이 싫은 거야?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ええ。私の心も、体も、魂も……ヴァレリーという存在の全てが、己の審美眼に適わないものですから」"
translation = "「네. 제 마음도, 몸도, 영혼도…… 발레리라는 존재의 모든 것이 자신의 심미안에 차지 않으니까요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「いくら己を研鑽したところで、美の境地に辿り着くことはありません」"
translation = "「아무리 자신을 연마한들 미의 경지에 도달할 일은 없겠죠」"

[[dialogue]]
speaker = "unk"
original = "ヴァレリー、綺麗なのにな"
translation = "발레리, 예쁜데 말이야"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「……ッ！？\u3000思わず耳を疑ってしまいましたが、私を綺麗、と……！？」"
translation = "「……윽!? 나도 모르게 귀를 의심했습니다만, 저를 예쁘다고……!?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ああ……ありがとうございます。この瞬間のために、私は自らを磨いてきたのかもしれません」"
translation = "「아아…… 감사합니다. 이 순간을 위해 저는 스스로를 가꾸어 왔는지도 모르겠네요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「会長さんの目と手を使って、私の美を表現してはいただけませんか？」"
translation = "「회장님의 눈과 손을 빌려 제 아름다움을 표현해 주시지 않겠습니까?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「会長さんに、私を描いてほしいのです」"
translation = "「회장님이 저를 그려주셨으면 해요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「おお……ここが会長さんの家……もちろん、場所は存じておりましたが、まさかご招待いただけるとは」"
translation = "「오오…… 여기가 회장님의 집…… 물론 장소는 알고 있었습니다만 설마 초대받을 줄이야」"

[[dialogue]]
speaker = "unk"
original = "まさか学園内に入れるわけにはいかないので、家に招待してしまった。母が留守だったのが幸いだ。"
translation = "설마 학원 안으로 들일 수는 없어서 집으로 초대해 버렸다. 어머니가 부재중이라 다행이다."

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「では、早速始めましょう。脱いだ衣服はそちらのカゴに入れればいいですかね？」"
translation = "「그럼 바로 시작하죠. 벗은 옷은 저쪽 바구니에 넣으면 될까요?」"

[[dialogue]]
speaker = "unk"
original = "脱ぐ気マンマン！？"
translation = "벗을 기세가 만만해!?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「絵画ならば、一糸まとわぬヌードが定番では？\u3000先ほどのフィギュアも局部を隠している程度で、ほぼ全裸でしたし」"
translation = "「회화라면 실오라기 하나 걸치지 않은 누드가 기본 아닌가요? 아까 그 피규어도 국부를 가린 정도로 거의 전라였고」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「遠慮なさらずとも、ここには私とあなたしかいないのですから、他人の目を気にする必要はありません」"
translation = "「사양하지 않으셔도 여기엔 저와 당신밖에 없으니 타인의 눈을 의식할 필요는 없답니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「駄目ですか。致し方ありませんね……では、着衣のままで。どのようなポーズが会長さんの性癖ですか？」"
translation = "「안 되나요. 어쩔 수 없군요…… 그럼 입은 채로. 어떤 포즈가 회장님의 성벽인가요?」"

[[dialogue]]
speaker = "unk"
original = "そのまま、動かないでね"
translation = "그대로 움직이지 마"

[[dialogue]]
speaker = "unk"
original = "ヴァレリーの好きなポーズでいいから"
translation = "발레리가 좋아하는 포즈면 되니까"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ふむ、緊縛＆放置プレイということですね……はぁっ……はぁ……想像するだけでたまりませんね……！」"
translation = "「흠, 긴박 및 방치 플레이라는 거군요…… 하앗…… 하아…… 상상만 해도 참을 수 없네요……!」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「興奮を覚え、紅潮している顔を、舐め回すように見られている……熱い視線を感じます……ああ、良い……とても良いですよ……！」"
translation = "「흥분을 느끼며 붉어진 얼굴을 핥듯이 쳐다보고 있다…… 뜨거운 시선이 느껴져요…… 아아, 좋아요…… 무척 좋네요……!」"

[[dialogue]]
speaker = "unk"
original = "気疲れしながらも、小一時間ほどかけて、俺はなんとかヴァレリーの顔を描き上げた。"
translation = "기운을 빼면서도 한 시간 정도 걸려 나는 간신히 발레리의 얼굴을 그려냈다."

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「なるほど、あなたの目には私がこう映っているというわけですか……」"
translation = "「과연, 당신의 눈에는 제가 이렇게 비치고 있다는 거군요……」"

[[dialogue]]
speaker = "unk"
original = "絵心がなくてごめん……"
translation = "그림 실력이 없어서 미안해……"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「とんでもない！\u3000こんなにも素晴らしい絵だというのに、何故、謝るのですか？」"
translation = "「천만에요! 이렇게나 훌륭한 그림인데 어째서 사과하시는 거죠?」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「私という人物像をしっかり捉えています。しかも、この絵はあなたが描いてくれたのですよ」"
translation = "「저라는 인물상을 확실히 포착하고 있습니다. 게다가 이 그림은 당신이 그려주신 거잖아요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「推しが小一時間も私を見つめて描いてくれた絵など、仮にどのような出来であっても傑作に決まっているではないですか」"
translation = "「최애가 한 시간이나 저를 바라보며 그려준 그림 따위, 설령 어떤 결과물이든 걸작임이 분명하지 않습니까」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「どんな美術館に飾ってある絵画よりも貴重な……私の心にのみ深い感動を与える、これぞ真の芸術作品です」"
translation = "「어떤 미술관에 전시된 회화보다 귀중한…… 제 마음에만 깊은 감동을 주는, 이것이야말로 진정한 예술 작품입니다」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「私の人生で極上の一日になった記念です。この絵は額に入れて飾り、コレクションに並べるとします」"
translation = "「제 인생에서 최고의 하루가 된 기념입니다. 이 그림은 액자에 넣어 장식하고 컬렉션에 나란히 두기로 하죠」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「いずれはスチュアート家末代まで継がれる家宝となることでしょう」"
translation = "「언젠가는 스튜어트 가문 대대로 내려오는 가보가 될 것입니다」"

[[dialogue]]
speaker = "unk"
original = "せめて、描き直させて！？"
translation = "제발 다시 그리게 해줘!?"

[[dialogue]]
speaker = "unk"
original = "やめて！？"
translation = "그만둬!?"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「いいえ、やめません。描き直させません。この絵は唯一無二のものです」"
translation = "「아니요, 그만두지 않아요. 다시 그리게 하지도 않을 겁니다. 이 그림은 유일무이한 것이니까요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「ふむ……どうやらあなたに構っていただけると、私の破壊衝動も幾分か影を潜めるようですね」"
translation = "「흠…… 아무래도 당신이 상대해 주시면 제 파괴 충동도 어느 정도 자취를 감추는 모양이네요」"

[[dialogue]]
speaker_original = "ヴァレリー"
speaker_translation = "발레리"
original = "「あなたたちにとっても、悪い話ではないでしょう。これからも私を愉しませてください、フフフ<emoji=heart04>」"
translation = "「당신들에게 있어서도 나쁜 이야기는 아니겠죠. 앞으로도 저를 즐겁게 해주세요, 후후후<emoji=heart04>」"

