[[dialogue]]
speaker = "unk"
original = "第５話,ＶＳ星喰らいシャドウ・ジグ戦闘前,B"
translation = "제5화, VS 별을 먹는 섀도 지그 전투 전, B"

[[dialogue]]
speaker = "unk"
original = "ベガの天界──女神の神殿前。"
translation = "베가의 천계── 여신의 신전 앞."

[[dialogue]]
speaker = "unk"
original = "地球を喰らい、創造神の糧とする『星喰らい』の拠点を守護するのは、使徒ジグのシャドウ。"
translation = "지구를 집어삼켜, 창조신의 양분으로 삼으려는 『별을 먹는 자』의 거점을 수호하는 것은 사도 지그의 섀도."

[[dialogue]]
speaker = "unk"
original = "この個体も、別拠点を守護するホロウ・ルヴィネと同じく、先のアルタイル戦よりも大幅な強化を加えられている。"
translation = "이 개체도 다른 거점을 수호하는 홀로우 루비네와 마찬가지로, 지난 알타이르 전투 때보다 대폭 강화되어 있다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「真なる神の傷さえ癒えれば……世界は再び刷新される……」"
translation = "「진정한 신의 상처만 치유된다면…… 세계는 다시 쇄신될 것이다……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私は障害を排除する……それこそが、真なる神の騎士の役目……」"
translation = "「나는 장애를 배제한다…… 그것이야말로 진정한 신의 기사의 책무……」"

[[dialogue]]
speaker = "unk"
original = "大剣を携えて佇むシャドウジグだったが──接近しつつある脅威の気配をすぐに察知した。"
translation = "대검을 들고 서 있던 섀도 지그였으나── 접근해오는 위협적인 기척을 즉시 감지했다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──来たな。アルタイルの星騎士たち」"
translation = "「──왔나. 알타이르의 성기사들.」"

[[dialogue]]
speaker = "unk"
original = "厄災の右腕を束ねる魔王さえいなければ、烏合の衆。"
translation = "재앙의 오른팔을 통솔하는 마왕만 없다면 오합지졸."

[[dialogue]]
speaker = "unk"
original = "一太刀の元に切り捨ててみせよう──"
translation = "일도양단해주마──"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「いたのだ！\u3000使徒ジグのシャドウ！」"
translation = "「있었다! 사도 지그의 섀도!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「これ以上、ベガの地球を好きにはさせません！\u3000悪い子にはオシオキですっ！！」"
translation = "「더 이상 베가의 지구를 마음대로 하게 두지 않겠어요! 나쁜 아이에겐 벌을 줄 거예요!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「────っ！？」"
translation = "「────!?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ほう──使徒のシャドウ。強化されているとは聞いていたが……ここまでとはね」"
translation = "「호오── 사도의 섀도. 강화되었다고는 들었지만…… 이 정도일 줄이야.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ええ、油断ならない相手のようです！」"
translation = "「네, 방심할 수 없는 상대인 것 같아요!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「共闘するのは初めてだけど、本当にあり得ない星力……ラティエ学園長が傍にいると頼もしいね」"
translation = "「공투하는 건 처음이지만 정말 말도 안 되는 성력…… 라티에 학원장님이 곁에 있으니 든든하네.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「な、何だ、お前たちはっ！？」"
translation = "「무, 뭐냐 너희들은!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「仮にも世界の命運を懸けた戦いっ！！\u3000これに敗北したら、お前たちは後がないはず……ど、どういうことだ！？」"
translation = "「나름 세계의 명운을 건 싸움!! 여기서 패배하면 너희들은 갈 곳이 없을 텐데…… 어, 어떻게 된 거지!?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「世界を支える守護天使として、あなたを見過ごすわけにはいかないわ。私の力、見せてあげる……！」"
translation = "「세계를 지탱하는 수호천사로서 당신을 묵과할 순 없어. 나의 힘, 보여주겠어……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「次期星徒会長を狙ってるあたしが、決戦の場面にいないなんてあり得ないからね！\u3000クリスマスフォームでみんなを引っ張っちゃうよ！！」"
translation = "「차기 성도회장을 노리는 내가 결전의 장소에 없다는 건 있을 수 없으니까! 크리스마스 폼으로 모두를 이끌어주겠어!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「水着の次は、サンタ衣装……！？\u3000イ、イカれてるのか、お前たちは！？」"
translation = "「수영복 다음은 산타 복장……!? 미, 미친 거냐 너희들은!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「お前を倒すためにやってきたんだ！\u3000幹内世界のあたしから貰ったこのヒーローの力、見せつけてやる！！」"
translation = "「너를 쓰러뜨리기 위해 왔다! 함내 세계의 나에게 받은 이 히어로의 힘, 보여주마!!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「職務上、汚れは気になる<ruby>性質<rt>たち</rt></ruby>でして。ベガの地球を荒らす輩……お掃除させていただきます」"
translation = "「직무상 더러운 건 질색이라서요. 베가의 지구를 어지럽히는 무리…… 청소해 드리겠습니다.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「パーティーの帰りか貴様ら！？\u3000真なる神を前に、不敬にも程がある！\u3000生きて帰れると思うな……！」"
translation = "「파티라도 다녀오는 길이냐 귀공들!? 진정한 신 앞에서 불경하기 짝이 없구나! 살아서 돌아갈 생각 마라……!」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギィギギ────ギィ────！！」"
translation = "「기이이이──── 기이────!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「か……神！？\u3000今、なんと！？」"
translation = "「시…… 신!? 지금 뭐라고!?」"

[[dialogue]]
speaker = "unk"
original = "ジグは神の傀儡。そのためその言語を<ruby>繙<rt>ひもと</rt></ruby>くことができる──"
translation = "지그는 신의 꼭두각시. 그렇기에 그 언어를 풀이할 수 있다──"

[[dialogue]]
speaker = "unk"
original = "──コノフザケタ連中ニ、スデニ一ヵ所デ敗北シテイル！！"
translation = "──이 장난스러운 녀석들에게, 이미 한 곳에서 패배했다!!"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ええぇ……？」"
translation = "「에에에……?」"

[[dialogue]]
speaker = "unk"
original = "──油断スルナ、見タ目ニ惑ワサレルナ！！"
translation = "──방심하지 마라, 겉모습에 현혹되지 마라!!"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「な、何を……」"
translation = "「무, 무슨 말을……」"

[[dialogue]]
speaker = "unk"
original = "──奴ラノ強サハ並デハナイ──！！！"
translation = "──놈들의 강함은 보통이 아니다──!!!"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そう、言われましても……」"
translation = "「그렇게 말씀하셔도……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「マグダレナ様～っ！\u3000頑張ってくださいっ！\u3000ゴー！\u3000ファイト！\u3000ウィンッ！！」"
translation = "「막달레나 님~! 힘내세요! 고! 파이트! 윈!!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ありがとうございます、ミルフィー！\u3000ママダレナ、勇気１００倍ですよ～♪」"
translation = "「고마워요, 밀피! 마마다레나, 용기 100배예요~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「しゅわっち──あけおめ超天使・アナ。破魔矢を持ってスタンバイ」"
translation = "「슈왓치── 새해 복 많이 받아 초천사 아나. 파마시를 들고 스탠바이.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いやなんか本当に凄い組み合わせだよね。高熱が出た時に見る夢みたい」"
translation = "「아니, 정말 굉장한 조합이네. 고열이 날 때 꾸는 꿈 같아.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──どこまでも舐めるつもりか！\u3000１人残らず斬り伏せてやる！」"
translation = "「──어디까지 얕볼 셈이냐! 단 한 명도 남기지 않고 베어 넘겨주마!」"

[[dialogue]]
speaker_original = "アルモタヘル（幼少）"
speaker_translation = "아르모타헬(어린 시절)"
original = "「できるものなら、やってみるといいのだ！\u3000今のアルモたんたちは普通じゃないのだ！！」"
translation = "「할 수 있다면 해보는 게 좋을 것이다! 지금의 알모탄들은 평범하지 않은 것이다!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、普通じゃない！\u3000死の恐怖を前に、頭がおかしくなったのだろう！？」"
translation = "「그래, 평범하지 않지! 죽음의 공포 앞에서 머리가 이상해진 것이겠지!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「こんな世界は、やはり滅びるべきだ！\u3000消えろ、アルタイルの星騎士たち──！！！」"
translation = "「이런 세계는 역시 멸망해야 한다! 사라져라, 알타이르의 성기사들──!!!」"

