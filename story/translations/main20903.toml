[[dialogue]]
speaker = "unk"
original = "第３話,デネブで得たもの,B"
translation = "제3화, 데네브에서 얻은 것, B"

[[dialogue]]
speaker = "unk"
original = "デネブから帰ってきた俺たちがまず聞かされたのは、天界が襲撃されたという知らせだった。"
translation = "데네브에서 돌아온 우리들이 가장 먼저 들은 소식은 천계가 습격당했다는 알림이었다."

[[dialogue]]
speaker = "unk"
original = "手狭な保健室から星徒会室に場所を移して、マトイたちから話を聞く。"
translation = "비좁은 보건실에서 성도회실로 장소를 옮겨 마토이 일행에게 이야기를 듣는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「天界が襲撃されたって、どういうことなんだ？」"
translation = "「천계가 습격당했다니, 그게 무슨 소리야?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええとその、言葉通りの意味で……天界の各地で極星従騎が暴れてるって、天界を監視してたネビュラから連絡があって」"
translation = "「그게 그러니까, 말 그대로의 의미로…… 천계 각지에서 극성종기가 날뛰고 있다고 천계를 감시하던 네뷸라로부터 연락이 왔어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「流星星徒会と一部のプリマステラには、ネビュラの世界樹を使って、先に天界に向かってもらったよ」"
translation = "「유성성도회랑 일부 프리마스텔라는 네뷸라의 세계수를 써서 먼저 천계로 향하게 했어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「本当はフィーニスの塔も使いたかったのですが、ディザスターハンドの件もあって、それは見合わせました」"
translation = "「사실은 피니스의 탑도 쓰고 싶었습니다만, 디재스터 핸드 건도 있어서 그건 보류했습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今は世界樹の魔力の充填中よ～。準備が整い次第、私たちも出発するところだったの～」"
translation = "「지금은 세계수의 마력을 충전하는 중이야~ 준비가 끝나는 대로 우리도 출발하려던 참이었어~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「魔力の充填が完了するまでもう少しかかるし、その間に、今まで何があったか聞かせてほしいわ～」"
translation = "「마력 충전이 완료될 때까지 조금 더 걸리니까, 그사이에 지금까지 무슨 일이 있었는지 들려줬으면 좋겠어~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね、私も話さなきゃって思ってたわ」"
translation = "「그래, 나도 이야기해야겠다고 생각했어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私たち、デネブに行って、おばあちゃんやちみっこ女神に会ったんだから！」"
translation = "「우리, 데네브에 가서 할머니랑 꼬맹이 여신을 만났으니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え？\u3000おばあちゃん……？\u3000女神……？」"
translation = "「에? 할머니……? 여신……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「本当にいろいろあって、どこから話せばいいか……」"
translation = "「정말 여러 가지 일이 있어서 어디서부터 이야기해야 할지……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺たちもまだ整理しきれてないけど、できるだけ手短に話すよ」"
translation = "「우리도 아직 다 정리되진 않았지만, 최대한 짧게 이야기할게.」"

[[dialogue]]
speaker = "unk"
original = "デネブで起きた出来事、得た情報は数多い。"
translation = "데네브에서 일어난 사건, 얻은 정보는 수없이 많다."

[[dialogue]]
speaker = "unk"
original = "転送装置の暴走に巻き込まれ、デネブの流星市国に飛ばされたこと。"
translation = "전송 장치의 폭주에 휘말려 데네브의 유성시국으로 날아간 것."

[[dialogue]]
speaker = "unk"
original = "そこで極星学園の星徒会長・ルヴィネに襲われたこと。"
translation = "그곳에서 극성학원의 성도회장 루비네에게 습격당한 것."

[[dialogue]]
speaker = "unk"
original = "レジスタンスをしているデネブのアポロと母さんに助けられたこと。"
translation = "레지스탕스를 하고 있는 데네브의 아폴로와 어머니에게 도움을 받은 것."

[[dialogue]]
speaker = "unk"
original = "俺たちが知る市倉環──守護天使ラクシャが、実はデネブから来たラクシャであったこと。"
translation = "우리가 아는 이치쿠라 타마키──수호천사 락샤가 사실은 데네브에서 온 락샤였다는 것."

[[dialogue]]
speaker = "unk"
original = "ラクシャから聞いたヴィーナスの生い立ちと、梨緒が語ったディザスターハンドの正体。"
translation = "락샤에게 들은 비너스의 성장 배경과 리오가 말한 디재스터 핸드의 정체."

[[dialogue]]
speaker = "unk"
original = "ベアトリスが極星学園の星徒会副会長で、アルタイルとデネブを救う道を探してこちらに来たこと。"
translation = "베아트리스가 극성학원의 성도회 부회장이며, 알타이르와 데네브를 구할 길을 찾아 이곳에 왔다는 것."

[[dialogue]]
speaker = "unk"
original = "女神の上に創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が存在し、新たな女神であるルヴィネを生み出したこと。"
translation = "여신 위에 창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』가 존재하며, 새로운 여신인 루비네를 만들어냈다는 것."

[[dialogue]]
speaker = "unk"
original = "そしてアポロと母さんの助けで、俺たちはデネブから帰還できたことなど……"
translation = "그리고 아폴로와 어머니의 도움으로 우리가 데네브에서 귀환할 수 있었다는 것 등……"

[[dialogue]]
speaker = "unk"
original = "デネブで起きた出来事や、知りえた情報の一部始終を新星星徒会のみんなに共有した。"
translation = "데네브에서 일어난 일들과 알게 된 정보의 전말을 신성성도회 모두에게 공유했다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えと、その……私が極星の副会長だってこと、黙っていてすみませんでした！」"
translation = "「저기, 그게…… 제가 극성의 부회장이라는 거, 숨기고 있어서 죄송했습니다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ベアトって副会長だったのか！\u3000あんまり副会長っぽくないけどな」"
translation = "「베아토가 부회장이었어!? 별로 부회장 같지는 않지만 말이야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「アルタイルとデネブを救うためだったんでしょう？\u3000だったらいいのよ～」"
translation = "「알타이르와 데네브를 구하기 위해서였잖아~? 그렇다면 괜찮아~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「で、でも本当にいろいろありすぎて、理解が追いつかないよ……」"
translation = "「그, 그래도 정말 너무 많은 일이 있어서 이해가 안 가……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ディザスターハンドがベガの緋宮会長の成れの果てだったとは……あの強大過ぎる力にも納得がいきます」"
translation = "「디재스터 핸드가 베가의 히노미야 회장님의 말로였다니…… 그 너무나도 강대한 힘도 납득이 갑니다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「正体を知りながら、黙っていたことはすまないと思っている。だがアルタイルの緋宮クロトがディザスターハンドになる可能性を少しでも減らすためだったんだ」"
translation = "「정체를 알면서도 묵인했던 건 미안하게 생각한다. 하지만 알타이르의 히노미야 쿠로토가 디재스터 핸드가 될 가능성을 조금이라도 줄이기 위해서였어.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど、それは止むを得ないでしょう。知っていたからといって何か手が打てるわけではありませんでしたし」"
translation = "「과연, 그건 어쩔 수 없었겠군요. 알고 있었다고 해서 딱히 손을 쓸 수 있는 상황도 아니었으니까요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも今は大丈夫なのよね～？」"
translation = "「하지만 지금은 괜찮은 거지~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、今は俺の中の魔王ラクシスの力は封印されている。今は暴走はしないよ」"
translation = "「아아, 지금 내 안의 마왕 락시스의 힘은 봉인되어 있어. 지금은 폭주하지 않아.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「その封印を解く鍵を持っているのが私ってわけ。ママの力のおかげだわ」"
translation = "「그 봉인을 풀 열쇠를 쥐고 있는 게 바로 나라는 말씀. 엄마의 힘 덕분이야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ヴィーナスちゃんはやっぱり女神様の娘だったのね～」"
translation = "「비너스짱은 역시 여신님의 딸이었구나~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それに創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在も驚きです。女神テルル様の上に、さらに上位の存在がいたとは思いませんでした」"
translation = "「게다가 창조신 『<ruby>XELOS<rt>제로스</rt></ruby>』의 존재도 놀랍습니다. 여신 테루루 님 위에 더 상위의 존재가 있었을 줄은 몰랐어요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そして、その『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出された新たな女神──ルヴィネ。彼女は極星学園の星徒会長でもある、と」"
translation = "「그리고 그 『<ruby>XELOS<rt>제로스</rt></ruby>』에 의해 태어난 새로운 여신── 루비네. 그녀는 극성학원의 성도회장이기도 하다는 거군요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「事実が明らかになったのは大きな進展ですが、極星学園と力を合わせるのは難しくなってしまったかもしれませんね」"
translation = "「사실이 밝혀진 건 큰 진전입니다만, 극성학원과 힘을 합치는 건 더 어려워졌을지도 모르겠네요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも、アルタイルとデネブのどちらかが滅びないといけないっていうのは嘘だったんだね。平行世界が争う必要なんてなかったんだ……！」"
translation = "「하지만 알타이르와 데네브 중 하나가 멸망해야 한다는 건 거짓말이었네. 평행세계끼리 싸울 필요 따위 없었던 거야……!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが明確に敵であった反面、平行世界同士の生存競争という面は否定された。"
translation = "루비네가 명확한 적이었던 반면, 평행세계끼리의 생존 경쟁이라는 측면은 부정되었다."

[[dialogue]]
speaker = "unk"
original = "アルタイルもデネブも救うという方針を打ち出した俺たちにとって、それは大きな前進だ。"
translation = "알타이르와 데네브를 모두 구한다는 방침을 내세운 우리에게 그것은 큰 전진이다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ところで──そちらの方は？」"
translation = "「그런데── 저분은?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ、アタシもさっきから気になってたんだ」"
translation = "「아아, 나도 아까부터 신경 쓰였어.」"

[[dialogue]]
speaker = "unk"
original = "アナとアポロの視線がエステルに向けられる。"
translation = "아나와 아폴로의 시선이 에스텔에게 향한다."

[[dialogue]]
speaker = "unk"
original = "するとエステルは緊張しながらも、姿勢を正して<ruby>恭<rt>うやうや</rt></ruby>しく頭を下げた。"
translation = "그러자 에스텔은 긴장하면서도 자세를 바로잡고 공손하게 머리를 숙였다."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「極星学園１年生、エステル・ミルフォードと申します」"
translation = "「극성학원 1학년, 에스텔 밀포드라고 합니다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「極星の……？\u3000どうして極星の生徒がこっちにいるんだ？」"
translation = "「극성의……? 어째서 극성 학생이 여기 있는 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エステルは極星学園の生徒だけど、俺たちを助けてくれたんだ。デネブに残してくるのは危険だから、一緒にアルタイルに来てもらった」"
translation = "「에스텔은 극성학원 학생이지만 우리를 도와줬어. 데네브에 남겨두는 건 위험해서 같이 알타이르로 왔어.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「はい。緋宮クロト様の仰る通りです」"
translation = "「네. 히노미야 쿠로토 님의 말씀대로입니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「私たちの世界では、『魔王クロトはデネブを裏切ってアルタイルに逃げた』と伝えられていましたが……そうではないと知って驚きました」"
translation = "「저희 세계에서는 『마왕 쿠로토는 데네브를 배신하고 알타이르로 도망쳤다』고 전해지고 있었습니다만…… 그렇지 않다는 걸 알고 놀랐습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……なるほど。チナさんと話が噛み合わないのはそのせいだったんですね」"
translation = "「……과연. 치나 씨와 말이 맞지 않았던 건 그 때문이었군요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「私もベアトリス副会長と同じく、アルタイルを滅ぼすことは望んでおりません」"
translation = "「저도 베아트리스 부회장님과 마찬가지로 알타이르를 멸망시키는 것은 원치 않습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「お邪魔かと思いますが、どうかしばらくの間、こちらの世界に置いていただけますと幸いです」"
translation = "「방해가 되겠지만, 부디 당분간 이쪽 세계에 머물게 해주신다면 감사하겠습니다.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そうなの！\u3000エステルちゃんはすっごくいい子で、スパイとかじゃないから！」"
translation = "「그, 그래! 에스텔짱은 정말 착한 아이고, 스파이 같은 게 아니니까!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そう言うと逆にスパイっぽいよ？」"
translation = "「그렇게 말하면 오히려 스파이 같다고?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ええっ！？\u3000じゃあどうしたらいいの！？」"
translation = "「에엣!? 그럼 어떻게 해야 해!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「こら、茶化すなナターシャ」"
translation = "「이봐, 놀리지 마 나타샤.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「デネブで極星従騎から逃げる時、エステルが私たちを先導してくれたんだ。彼女がいなければデネブから脱出できなかったかもしれない」"
translation = "「데네브에서 극성종기로부터 도망칠 때 에스텔이 우리를 선도해 줬어. 그녀가 없었다면 데네브에서 탈출하지 못했을지도 몰라.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですね。もしエステルさんが私たちの敵なら、いつでも私たちの背中を攻撃できたはずです。私はエステルさんを信じています」"
translation = "「맞아요. 만약 에스텔 씨가 저희의 적이라면 언제든 저희의 등 뒤를 공격할 수 있었을 거예요. 저는 에스텔 씨를 믿어요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「なるほど～。なら大丈夫そうね～」"
translation = "「과연~ 그럼 괜찮겠네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、私も信じるよ。エステルさん、見るからに清楚で、嘘をついたり騙したりって感じじゃないしね」"
translation = "「응, 나도 믿을게. 에스텔 씨, 보기에도 청초하고 거짓말을 하거나 속일 것 같은 느낌이 아니니까.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それに私たちは極星学園と一緒にリクリエと戦いたいって考えてたんだから、その第一歩だよ」"
translation = "「게다가 우리는 극성학원과 함께 리크리에와 싸우고 싶다고 생각했으니까, 그 첫걸음이야.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ありがとうございます、皆様」"
translation = "「감사합니다, 여러분.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「エステルさんはこちらに住まいがありませんし、アルタイルにいる間、星見家に滞在していただこうと思います。姉さんもいいですよね？」"
translation = "「에스텔 씨는 이쪽에 살 곳이 없으니 알타이르에 있는 동안 호시미 가문에 머물게 하려고 해요. 언니도 괜찮죠?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「もちろんだ。うちは広いからな！」"
translation = "「당연하지. 우리 집은 넓으니까!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ではお言葉に甘えさせていただきますね。よろしくお願いいたします」"
translation = "「그럼 호의를 받아들이겠습니다. 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ、こっちこそよろしくなっ」"
translation = "「아아, 나야말로 잘 부탁해!」"

[[dialogue]]
speaker = "unk"
original = "また深々と頭を下げるエステル。"
translation = "다시 정중히 머리를 숙이는 에스텔."

[[dialogue]]
speaker = "unk"
original = "成り行きでエステルを巻き込んでしまったけど、行き場がないことにならなくてひとまず安心したのだった。"
translation = "어쩌다 보니 에스텔을 휘말리게 했지만, 갈 곳이 없는 상황은 면하게 되어 일단 안심했다."

