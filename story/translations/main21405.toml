[[dialogue]]
speaker = "unk"
original = "第５話,ルヴィネの実力,B"
translation = "제5화, 루비네의 실력"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ！\u3000繋げろ──今だ！！」"
translation = "「마토이! 이어라── 지금이다!!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「うんっ！\u3000リフレクトゴッデスカリバー！！」"
translation = "「응! 리플렉트 가디스 칼리버!!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「やり直せばいいのに……世界は滅びるしかないんだから……」"
translation = "「다시 시작하면 좋을 텐데…… 세계는 멸망할 수밖에 없으니까……」"

[[dialogue]]
speaker = "unk"
original = "いかに強力な能力の使い手とは言え、本物には劣る……死線を何度も潜り抜けてきた俺たちの方に分がある！"
translation = "아무리 강력한 능력의 소유자라 해도 진짜보다는 못하다…… 사선을 몇 번이나 넘나든 우리 쪽이 유리하다!"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「事象凍結！\u3000──アナちゃん、トドメよ！」"
translation = "「사상 동결! ──아나짱, 마무리야!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「了解──ラヴァーレッド・シグマ！！」"
translation = "「라져── 러버 레드 시그마!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「諦めたら、楽になれるのに……」"
translation = "「포기하면 편해질 텐데……」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「う～っ……これ本当に６割程度なの！？\u3000めちゃくちゃ手強かったわ！！」"
translation = "「으~…… 이거 정말 60% 정도 맞아!? 엄청나게 강하잖아!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「みんなお疲れ様。ノヴァフォームの起動時間は、まだ残ってるな？」"
translation = "「모두 고생했어. 노바 폼 기동 시간은 아직 남아 있지?」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「もちろん。私たちもずっと訓練、続けてきたからね！」"
translation = "「물론이지. 우리도 계속 훈련을 이어왔으니까!」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「消耗は軽微。ルヴィネさんと戦うにあたって、まだ十分に余力はあります」"
translation = "「소모는 경미합니다. 루비네 씨와 싸우는 데 있어서 아직 충분히 여력이 있습니다.」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「極星学園のみんなは頂上にたどり着けてるかしら？\u3000急がないと──っ！？」"
translation = "「극성학원 모두들 정상에 도착했을까? 서두르지 않으면──!?」"

[[dialogue]]
speaker_original = "ヴィーナス（覚醒）"
speaker_translation = "비너스(각성)"
original = "「あ～もうっ……おかわりってこと！？」"
translation = "「아~ 정말…… 또 나온다는 거야!?」"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「ルヴィネさんの本気度がうかがえますね……プラネットマルス・ノヴァ、セット！」"
translation = "「루비네 씨의 진심이 엿보이는군요…… 플래닛 마르스 노바, 세트!」"

[[dialogue]]
speaker = "unk"
original = "このままではキリがない──かと言って無視して奥へ進めば、頂上でルヴィネと使徒に挟み撃ちされる構図になってしまう。"
translation = "이대로는 끝이 없다── 그렇다고 무시하고 안으로 나아가면 정상에서 루비네와 사도에게 협공당하는 구도가 되어 버린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「正面突破だ──制圧するぞ！！」"
translation = "「정면 돌파다── 제압한다!!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁ、はぁっ……！」"
translation = "「하아, 하아……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そのくらいにしておきなさいベアト。さっきの、痛かったでしょう？」"
translation = "「그쯤 해 두세요, 베아토. 방금 거 아팠죠?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それは聞けない相談だよ！\u3000ルヴィ──！」"
translation = "「그건 들어줄 수 없는 부탁이야! 루비──!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そんな攻撃、いくら重ねても無駄よ」"
translation = "「그런 공격, 아무리 거듭해 봤자 무의미해요.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが手をかざす。それだけで──"
translation = "루비네가 손을 내민다. 그것만으로──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「──きゃぁああっ！？」"
translation = "「──꺄아아악!?」"

[[dialogue]]
speaker = "unk"
original = "強烈な衝撃波をぶつけられ、ベアトリスは弾き飛ばされてしまう。"
translation = "강렬한 충격파에 부딪혀 베아트리스는 튕겨 나가 버린다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ちくしょう……！\u3000同じ星力なのに、どうしてこんなにも差があるんだ！？」"
translation = "「젠장……! 같은 성력인데 왜 이렇게까지 차이가 나는 거야!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──そういえば、言ってなかったわね」"
translation = "「──그러고 보니 말하지 않았네요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私は星力なんて使わない。<ruby>不出来な姉<rt>テルル</rt></ruby>の力なんてね」"
translation = "「저는 성력 따위 쓰지 않아요. 모자란 <ruby>언니<rt>테루루</rt></ruby>의 힘 따위 말이죠.」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「星力じゃない……？\u3000でも、ルヴィは守護星を持っていたはずで……！」"
translation = "「성력이 아니라고……? 하지만 루비는 수호성을 가지고 있었을 텐데……!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「それも嘘よ。私は１０年前から、お父様から賜った『霊力』を使っている」"
translation = "「그것도 거짓말이에요. 저는 10년 전부터 아버님께 하사받은 『영력』을 쓰고 있답니다.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いつも変身する時に、セレスティアを霊力でぴかぴか光らせて……面倒だったわ」"
translation = "「항상 변신할 때 셀레스티아를 영력으로 번쩍번쩍 빛나게 하느라…… 번거로웠어요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「なん、だって……！？」"
translation = "「뭐, 라고……!?」"

[[dialogue]]
speaker = "unk"
original = "避難地で暮らし始めて、しばらく経った頃……"
translation = "피난처에서 생활하기 시작하고 얼마간의 시간이 흘렀을 무렵……"

[[dialogue]]
speaker = "unk"
original = "半壊した学園の施設に生きている機器があり、守護星を調べられる機会があった。"
translation = "반파된 학원 시설에 살아 있는 기기가 있어 수호성을 조사할 기회가 있었다."

[[dialogue]]
speaker = "unk"
original = "複雑な機器の操作はチナたちにはできなかった。全ての操作をルヴィネが行い、全員の守護星が明らかになった夜──"
translation = "복잡한 기기 조작은 치나 일행은 할 수 없었다. 모든 조작을 루비네가 행하고 모두의 수호성이 밝혀진 밤──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私の守護星は、ポラリス・アウストラリス……！\u3000南極に一番近い星で！」"
translation = "「내 수호성은 폴라리스 아우스트랄리스……! 남극에 가장 가까운 별이야!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私の守護星は、ファワリス……いつか北極星に組み込まれる星座なんですね！」"
translation = "「제 수호성은 파와리스…… 언젠가 북극성에 편입될 별자리군요!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシはエライ。レティシアはエダシク……どっちも北極星に関係してるだなんて、こんな偶然あるんだな！」"
translation = "「난 에라이. 레티시아는 에다시크…… 둘 다 북극성과 관계되어 있다니 이런 우연이 다 있네!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……すごい、ぐうぜん？」"
translation = "「……굉장한 우연?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ルヴィの守護星も調べたかったなあ。アタシらじゃ機械の動かし方、よくわからなかったし……」"
translation = "「루비 수호성도 조사하고 싶었는데. 우리로선 기계 움직이는 법을 잘 몰랐으니까……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「いいえ。テルル様に遣わされた時に、守護星のことは聞いているの」"
translation = "「아니요. 테루루 님에 의해 보내졌을 때 수호성에 대해 들었어요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私の守護星は──ポラリス。今の北極星よ。ふふ……みんな同じなのね」"
translation = "「제 수호성은── 폴라리스. 지금의 북극성이에요. 후후…… 모두 같네요.」"

[[dialogue]]
speaker = "unk"
original = "避難地で星力に覚醒しているのは、この５人だけ。"
translation = "피난처에서 성력에 각성한 것은 이 다섯 명뿐."

[[dialogue]]
speaker = "unk"
original = "その全員が『極星』にまつわる守護星を宿しているだなんて──まるで運命だ。"
translation = "그 전원이 『극성』에 얽힌 수호성을 품고 있다니── 마치 운명 같았다."

[[dialogue]]
speaker = "unk"
original = "きっと意味があるとチナは思った。自分たちは視えない何かで結ばれた、かけがえのない親友なのだと──"
translation = "분명 의미가 있을 거라고 치나는 생각했다. 자신들은 보이지 않는 무언가로 연결된 둘도 없는 친우라고──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「４人が偶然一緒だったから、私も極星にまつわる星を偽った。使えると思ったのよ」"
translation = "「네 사람이 우연히 같았기에 저도 극성에 얽힌 별이라고 속였어요. 쓸모가 있을 거라 생각했거든요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ただの偶然の一致にも、ヒトは意味を見出す生き物だから」"
translation = "「단순한 우연의 일치에도 인간은 의미를 찾아내는 생물이니까요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「事実、あの日を境に、チナからさらに強い信頼を得られたのを感じたわ。違う？」"
translation = "「사실 그날을 기점으로 치나로부터 더욱 강한 신뢰를 얻은 것을 느꼈답니다. 아닌가요?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──このやろぉぉおおっ！！！」"
translation = "「──이 자식이이이이익!!!」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「チナの弱点はそういうところよ。すぐ頭に血が上るから、隙を作るのもたやすい」"
translation = "「치나의 약점은 그런 점이에요. 금방 머리에 피가 쏠리니까 빈틈을 만드는 것도 쉽죠.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ぐぁぁああっ──！？」"
translation = "「구아아악──!?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「チナっ──大丈夫ですか！？」"
translation = "「치나── 괜찮아요!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「そしてグレイスは、味方が傷つくとすぐに集中力がなくなる──そのクセ、直しなさいと言ったでしょう？」"
translation = "「그리고 그레이스는 아군이 다치면 금방 집중력이 흐트러지죠── 그 버릇 고치라고 말했잖아요?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……きゃああっ！？」"
translation = "「……꺄악!?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「はあぁあっ──！」"
translation = "「하아아앗──!」"

[[dialogue]]
speaker = "unk"
original = "チナとグレイスに攻撃が降り注いだ隙に、刀を振りかざすレティシアだったが──"
translation = "치나와 그레이스에게 공격이 쏟아진 틈에 칼을 휘두르는 레티시아였지만──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「レティシアを抑えるのはもっと簡単よ」"
translation = "「레티시아를 억누르는 건 더 쉬워요.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネは一切の防御姿勢を取らずに、レティシアとの距離をさらに詰めて棒立ちになった。"
translation = "루비네는 일절 방어 자세를 취하지 않고 레티시아와의 거리를 더욱 좁히며 멍하니 섰다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「──っ！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──やっぱり。チナだったら振りぬいたでしょうに……レティシア、あなたは本当に優しい子ね」"
translation = "「──역시나. 치나였다면 휘둘렀을 텐데…… 레티시아, 당신은 정말 다정한 아이네요.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「くぅぅっ──！！」"
translation = "「쿠우우윽──!!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネの戦力は圧倒的だった。どれだけ努力をしても埋まらないと、本能でわかるほどの絶望的な戦力差──"
translation = "루비네의 전력은 압도적이었다. 아무리 노력해도 메울 수 없다고 본능으로 알 수 있을 정도의 절망적인 전력 차──"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ベアト。私が今、全力を出していると思う？」"
translation = "「베아토. 제가 지금 전력을 다하고 있다고 생각하나요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あはは……全然、思わないよ。全力の半分も出してないんじゃないかな……」"
translation = "「아하하…… 전혀 그렇게 생각 안 해. 전력의 절반도 내지 않은 거 아닐까……」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「ええ──これで２割程度よ。まだ続けるの？」"
translation = "「네── 이걸로 20% 정도예요. 아직 계속할 건가요?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うんっ、それでも続けるよ！\u3000まだ希望を捨てるには、早いから……！」"
translation = "「응, 그래도 계속할 거야! 아직 희망을 버리기엔 이르니까……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ルヴィが全力を出したら、私たちはひとたまりもない。でも……！」"
translation = "「루비가 전력을 다하면 우리는 속수무책이야. 하지만……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「裏を返せば、やっぱりルヴィは手加減してくれてるってことだもんっ！」"
translation = "「뒤집어 생각하면 역시 루비는 봐주고 있다는 뜻인걸!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「まだ声を届けることはできる、私たちのこと……大切だって思ってくれてる！\u3000ルヴィ、違うっ！？」"
translation = "「아직 목소리를 전할 수 있어, 우리를…… 소중하다고 생각해주고 있어! 루비, 아니야!?」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「…………違うわ」"
translation = "「………… 아니에요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私があなたたちにトドメを刺さないのは、まだ利用価値があるからよ」"
translation = "「제가 당신들에게 숨통을 끊지 않는 건 아직 이용 가치가 있기 때문이에요.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「みんなに一つ、提案をするわ」"
translation = "「모두에게 한 가지 제안을 하죠.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「あなたたち。私と一緒に……新しい世界を創ってみる気はないかしら？」"
translation = "「당신들. 저와 함께…… 새로운 세계를 만들어 보지 않겠나요?」"

