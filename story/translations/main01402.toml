[[dialogue]]
speaker = "unk"
original = "第３話,大賢者はかっこいい,B"
translation = "제3화, 대현자는 멋지다, B"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ディマイズ──ブレイカー」"
translation = "「디마이즈── 브레이커.」"

[[dialogue]]
speaker_original = "ゴルドン"
speaker_translation = "골돈"
original = "「ピ──ピ、ガァァァッ…………ッ！！」"
translation = "「삐──삐, 가아아앗…………!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やるぅ──さっすがクロト！」"
translation = "「잘하네── 역시 쿠로토!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「すごい……！\u3000魔王力全開なら、ここまで強くなっちゃうんだ……！」"
translation = "「대단해……! 마왕력 전개라면, 이렇게까지 강해지는구나……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私を守るためならいくらだって強くなるのよ。ねっ、パーパ♪」"
translation = "「나를 지키기 위해서라면 얼마든지 강해지는 거지. 그치, 아빠♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「からかうんじゃない。大切なのはみんな同じだ」"
translation = "「놀리지 마. 소중한 건 모두 똑같아.」"

[[dialogue]]
speaker = "unk"
original = "戦闘経験を重ねるごとに星力と霊力のコントロールが熟練し、よりスムーズに立ち回れるようになっていた。"
translation = "전투 경험을 거듭할수록 성력과 영력의 컨트롤이 숙련되어, 더욱 순조롭게 움직일 수 있게 되었다."

[[dialogue]]
speaker = "unk"
original = "だが……俺の意識は、垣間見えた幻影に引っ張られていた。"
translation = "하지만…… 나의 의식은, 엿보았던 환영에 이끌리고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（さっきのは……偶然じゃなさそうだな。俺が魔王の力を引き出せば引き出すほど、塔と同調していくのを感じる）"
translation = "（방금 것은…… 우연이 아닌 것 같군. 내가 마왕의 힘을 끌어내면 끌어낼수록, 탑과 동조해 가는 것을 느낀다）"

[[dialogue]]
speaker = "unk"
original = "しかし周りのみんなには、やはり見えていないようだった。"
translation = "하지만 주변의 모두에게는, 역시 보이지 않는 듯했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（でも──あれが先代魔王？\u3000壁画から受けた印象とは、ずいぶん違ったような……）"
translation = "（하지만── 저것이 선대 마왕? 벽화에서 받은 인상과는, 꽤 달랐던 것 같은데……）"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔が見せてくれたのは恐らく実際に起きた旧森羅暦の過去。"
translation = "피니스의 탑이 보여준 것은 아마도 실제로 일어났던 구 신라력의 과거."

[[dialogue]]
speaker = "unk"
original = "魔王の功績も、これまで壁画で見てきたような流れだった。"
translation = "마왕의 공적도, 지금까지 벽화에서 봐왔던 것과 같은 흐름이었다."

[[dialogue]]
speaker = "unk"
original = "でも……肝心の彼の人物像については、俺やヴィーナスの思い描いていたような英雄然としたものじゃなかった。"
translation = "하지만…… 가장 중요한 그의 인물상에 대해서는, 나와 비너스가 마음속으로 그리고 있던 것 같은 영웅다운 모습이 아니었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（それに──俺そっくりってのも本当だった。余計に気になるところだけど……）"
translation = "（게다가── 나랑 똑 닮았다는 것도 사실이었다. 더욱더 신경 쓰이는 부분이지만……）"

[[dialogue]]
speaker = "unk"
original = "そして何より……すべての起源となった青年Ｓ。オルタナティブ宇宙にいた魔王の祖。"
translation = "그리고 무엇보다…… 모든 기원이 된 청년 S. 올터너티브 우주에 있던 마왕의 조상."

[[dialogue]]
speaker = "unk"
original = "俺があちらと関わることはないにしろ、世界の広がりを感じずにはいられなかった。"
translation = "내가 그쪽과 관련될 일은 없다고 해도, 세계의 확장을 느끼지 않을 수 없었다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「フ──中々やるニャンね。さすがはフィオナ嬢に次ぐ魔王候補ニャ。認めてやらんでもないニャ！」"
translation = "「흥── 제법 하는군냥. 역시 피오나 양에 버금가는 마왕 후보냥. 인정해 주지 못할 것도 없다냥!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「な、なんニャ。急にワガハイをじっと見つめて」"
translation = "「마, 뭐냐냥. 갑자기 나 님을 빤히 쳐다보고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なあ……もしかしてニャリオンの言う前世って、もっと格好いい姿だったんじゃないか？」"
translation = "「야…… 혹시 냐리온이 말하는 전생은, 더 멋진 모습이었던 거 아니냐?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「うーん……どうだったかニャンねえ……ニャにぶんワガハイも、おぼろげニャ記憶しかないからニャ」"
translation = "「으ー음…… 어땠을까냥…… 아무래도 나도, 희미한 기억밖에 없으니까냥」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「というかニャ。今もワガハイはサイコーに格好いいわけニャから、その言い方はおかしいニャン！」"
translation = "「랄까냥. 지금도 나 님은 최고로 멋진 거니까, 그 말투는 이상하다냥!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そうか。それもそうだな」"
translation = "「그런가. 그것도 그렇네.」"

[[dialogue]]
speaker = "unk"
original = "ラクシスの従えていた剣虎とニャリオンは、根っこは同じなれど自我は別の存在らしかった。"
translation = "라크시스가 거느렸던 검호와 냐리온은, 근본은 같지만 자아는 별개의 존재인 듯했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ていうか、なんで急にそんなこと聞いたわけ？」"
translation = "「그나저나, 왜 갑자기 그런 걸 물어본 거야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。実は……」"
translation = "「아아. 실은……」"

[[dialogue]]
speaker = "unk"
original = "隠しておくことでもないと思い、俺は今しがた見た先代魔王についての記憶をみんなにも共有した。"
translation = "숨길 것도 아니라고 생각하여, 나는 방금 본 선대 마왕에 대한 기억을 모두에게 공유했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「先代魔王──ラクシスの過去……そうだったのですね。記録には残っていないので、照合のしようはありませんが」"
translation = "「선대 마왕── 라크시스의 과거…… 그러했군요. 기록에는 남아있지 않으니, 대조할 방법은 없지만요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、それに……そのお話通りなら、魔王っていうのはよその宇宙から持ってこられたものってこと？」"
translation = "「그, 게다가…… 그 이야기대로라면, 마왕이라는 건 다른 우주에서 가져온 것이라는 거야?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「本当なのでしょうか……？」"
translation = "「정말일까요……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「塔が教えてくれたことならホントのはずよ。今までもそうだったし！」"
translation = "「탑이 알려준 거라면 진짜일 거야. 지금까지도 그랬고!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「と、塔が教えてくれることなんてあるの？」"
translation = "「저, 탑이 알려주는 것도 있어?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「さっぱりわかんねーな……けど、アホ猫のフカシは合ってたってことなのか」"
translation = "「도무지 모르겠네…… 근데, 바보 고양이의 허풍은 맞았다는 건가.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「だから最初から言っているニャン。３０００年前の大賢者ニャと」"
translation = "「그러니까 처음부터 말하고 있다냥. 3000년 전의 대현자라고냥」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャけども、いくら９つの命を持つ猫のワガハイでもそんなに長生きできるわけないニャ」"
translation = "「하지만, 아무리 9개의 목숨을 가진 고양이인 나라도 그렇게 오래 살 수는 없다냥」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャから、ワガハイがこうしてこの時代にいられるのも──フィオナ嬢が召喚してくれたおかげなのニャン！」"
translation = "「그러니까, 나 님이 이렇게 이 시대에 있을 수 있는 것도── 피오나 양이 소환해 준 덕분인 거다냥!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ついでにすっごく可愛くなったのね♪」"
translation = "「게다가 엄청 귀여워졌네♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「可愛い……ですかねえ……？」"
translation = "「귀엽다……일까요……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私としては……そんな大それた召喚のつもりはなかったのですが。これは、幸運と呼ぶべきなのでしょうか」"
translation = "「저로서는…… 그렇게 엄청난 소환을 할 생각은 없었는데요. 이것을, 행운이라고 불러야 할까요.」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「運命ニャ！\u3000ワガハイは魔王の血筋に引き寄せられたのニャン！」"
translation = "「운명이다냥! 나 님은 마왕의 혈통에 이끌린 거다냥!」"

[[dialogue]]
speaker = "unk"
original = "ニャリオンが現世に降臨した理屈は不明瞭だったが、俺にはなんとなくその解釈で合っているように思えた。"
translation = "냐리온이 현세에 강림한 이유는 불분명했지만, 나는 왠지 모르게 그 해석이 맞는 것처럼 느껴졌다."

[[dialogue]]
speaker = "unk"
original = "それより……"
translation = "그것보다……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「？\u3000どうかされましたか、緋宮会長」"
translation = "「? 무슨 일이십니까, 히노미야 회장」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや……なんでも」"
translation = "「아니…… 아무것도」"

[[dialogue]]
speaker = "unk"
original = "そういえば──と思い返す。"
translation = "그러고 보니── 하고 되돌아본다."

[[dialogue]]
speaker = "unk"
original = "最後、<ruby>先代魔王<rt>ラクシス</rt></ruby>の隣にいた女性の姿──おぼろげながらフィオナに似ているような印象を受けた。"
translation = "마지막, <ruby>선대 마왕<rt>라크시스</rt></ruby>의 옆에 있던 여성의 모습── 희미하게나마 피오나와 닮았다는 인상을 받았다."

[[dialogue]]
speaker = "unk"
original = "かたや、先代魔王の方は壁画の通り、俺に瓜二つで……"
translation = "한편, 선대 마왕 쪽은 벽화대로, 나와 똑 닮았고……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（俺も魔王。フィオナも魔王。これは今となっちゃ確定だ。でも、ヴィーナスの信じた魔王候補と、女神の語っていた魔王候補は違う……）"
translation = "（나도 마왕. 피오나도 마왕. 이건 이제 확정이다. 하지만, 비너스가 믿었던 마왕 후보와, 여신이 말했던 마왕 후보는 다르다……）"

[[dialogue]]
speaker = "unk"
original = "諸々を総合して考えていくと、最終的にはシンプルな疑問に行き着く。"
translation = "여러 가지를 종합해서 생각해보면, 최종적으로는 단순한 의문에 다다른다."

[[dialogue]]
speaker = "unk"
original = "つまり──"
translation = "즉──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（俺とフィオナは……<b>どう</b>違うんだ？）"
translation = "（나와 피오나는…… <b>어떻게</b> 다른 거지?）"

