[[dialogue]]
speaker = "unk"
original = "第４話,２人の将来設計,P"
translation = "제4화, 두 사람의 장래 설계, P"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「城を作りましょう……！」"
translation = "「성을 만들죠……!」"

[[dialogue]]
speaker = "unk"
original = "突然どうした！？"
translation = "갑자기 왜 그래!?"

[[dialogue]]
speaker = "unk"
original = "ある日、アナと再びリゾート結界へ遊びに来たところで、彼女が謎の提案をし始めていた。"
translation = "어느 날, 아나와 다시 리조트 결계에 놀러 왔을 때, 그녀가 수수께끼의 제안을 하기 시작했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「すみません。言葉が足りませんでした」"
translation = "「죄송합니다. 설명이 부족했습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「つまりは、砂遊びで城を作ろうという意味です」"
translation = "「그러니까 모래 놀이로 성을 만들자는 의미입니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「これまで会長とリゾート結界へデートに来た際、水遊びはよくしていました。しかし、まだ砂遊びはしたことがなかったので」"
translation = "「지금까지 회장님과 리조트 결계에 데이트하러 왔을 때 물놀이는 자주 했습니다. 하지만 아직 모래 놀이는 해본 적이 없어서요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――どんな城を作ろうか、ですか？」"
translation = "「――어떤 성을 만들 거냐고요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。事前に設計図を描いて、準備万端です」"
translation = "「노 프로블럼. 사전에 설계도를 그려서 준비 만반입니다」"

[[dialogue]]
speaker = "unk"
original = "砂のお城に設計図！？"
translation = "모래성에 설계도!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「何事も準備が大事。とはいえ、これが正解というわけではありません。会長も意見があれば言って欲しい」"
translation = "「무슨 일이든 준비가 중요. 그렇다고 이게 정답이라는 건 아닙니다. 회장님도 의견이 있으면 말씀해 주세요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「せっかく２人で遊ぶわけですし。……それにこれは、恋愛の勉強としてお互いの好みを知るいい機会でもあります」"
translation = "「기왕 둘이서 노는 거니까요. ……게다가 이건 연애 공부로서 서로의 취향을 알 좋은 기회이기도 합니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――ベリーグッド。これで、砂の城完成ですね」"
translation = "「――베리 굿. 이걸로 모래성 완성이네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実際の機能性を考えた、リアル志向の良い城になった気がします」"
translation = "「실제 기능성을 고려한 리얼 지향의 좋은 성이 된 것 같습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今日遊んだ思い出として、ＤＩＳＣで写真を撮っておきましょう」"
translation = "「오늘 논 추억으로 DISC로 사진을 찍어두죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふふ……私と会長の共同作業♪\u3000恋愛の記録フォルダに、ちゃんと保存しておかなくては……」"
translation = "「후후…… 저와 회장님의 공동 작업♪ 연애 기록 폴더에 잘 저장해둬야지……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――あ、いえ、何でもありません。それより、次は横に砂の家を作って行きましょう」"
translation = "「――아, 아니요, 아무것도 아닙니다. 그보다 다음은 옆에 모래 집을 만들어 가죠」"

[[dialogue]]
speaker = "unk"
original = "何の家……？"
translation = "무슨 집……?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私たちの住む家です。実際に２人で住むとしたらどんな家がいいか考えるのも、恋愛の勉強になります」"
translation = "「우리들이 살 집입니다. 실제로 둘이서 산다면 어떤 집이 좋을지 생각하는 것도 연애 공부가 됩니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「もちろん、家の設計図も準備済み。それに加えて、更に――」"
translation = "「물론 집 설계도도 준비 완료. 거기에 더해 추가로──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「現時点での、将来について考えていることも書き出して来ました」"
translation = "「현시점에서의 장래에 대해 생각하고 있는 것도 적어왔습니다」"

[[dialogue]]
speaker = "unk"
original = "まさかの将来設計まで！？"
translation = "설마 했던 장래 설계까지!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ここに会長の思い描く将来の予定を加えて、一緒に住む家を考える」"
translation = "「여기에 회장님이 그리는 장래 예정도 더해서 함께 살 집을 생각해요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……って、会長？\u3000何をそんなに動揺しているのですか？」"
translation = "「……그나저나 회장님? 뭘 그렇게 동요하고 계신 건가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――私が会長と同棲して、将来的に結婚しても構わない、という口ぶりだから？」"
translation = "「――제가 회장님과 동거하고 장래적으로 결혼해도 상관없다는 말투라서?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ……い、言われてみれば……」"
translation = "「아…… 드, 듣고 보니……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「その……自分では、そうなるのが自然だと思っていたので、伝える際の感情の機微は、計算外でした……」"
translation = "「그게…… 스스로는 그렇게 되는 게 자연스럽다고 생각했기에, 전할 때의 감정의 기미는 계산 밖이었습니다……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「よく考えたら、これは色々……は、恥ずかしい……っ」"
translation = "「잘 생각해보니 이건 여러모로…… 부, 부끄러워……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「か、会長は――」"
translation = "「회, 회장님은──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私とそういう将来は……考えて、いませんでしたか？」"
translation = "「저와 그런 장래는…… 생각하지, 않으셨나요?」"

[[dialogue]]
speaker = "unk"
original = "そんなことない。アナと結婚したい"
translation = "그럴 리가. 아나와 결혼하고 싶어"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……！\u3000ん……ふふっ<emoji=heart04>」"
translation = "「……! 응…… 후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「何だか……プロポーズみたいに、なってしまいましたね……」"
translation = "「왠지…… 프로포즈처럼 되어버렸네요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長。いつもの場所――膝の上に座ってもいいですか？」"
translation = "「회장님. 평소의 장소――무릎 위에 앉아도 될까요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론이지"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい……<emoji=heart04>」"
translation = "「네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ん……♪\u3000いつもは落ち着く場所なのに、今日はちょっと、ドキドキします……<emoji=heart04>」"
translation = "「음……♪ 평소에는 진정되는 장소인데 오늘은 조금 두근거려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それじゃあ……改めて、砂の家を一緒に作って行きましょう。会長は将来、どんな風に考えてますか？」"
translation = "「그럼…… 다시금 모래 집을 함께 만들어 가죠. 회장님은 장래에 대해 어떻게 생각하시나요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――学園を卒業したら結婚？\u3000な、なるほど……考えておきます……」"
translation = "「――학원을 졸업하면 결혼? 과, 과연…… 생각해두겠습니다……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「結婚して住む家は……なるべく大きい方がいいかと。その……大家族になっても、困りませんし……」"
translation = "「결혼해서 살 집은…… 가급적 큰 편이 좋을까 합니다. 그게…… 대가족이 되어도 곤란하지 않으니까요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ちなみに、会長は子供……何人くらい欲しい、ですか？」"
translation = "「참고로 회장님은 아이…… 몇 명 정도 갖고 싶으신가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「できれば私は……いっぱい欲しいです<emoji=heart04>」"
translation = "「가능하면 저는…… 많이 갖고 싶습니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んっ<emoji=heart04>\u3000会長、そんなに抱き着いたら、砂の家が崩れちゃいます……」"
translation = "「응<emoji=heart04> 회장님, 그렇게 껴안으시면 모래 집이 무너져버려요……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「本格的にイチャイチャするのは……私たちの家を作ってからにしましょう……？」"
translation = "「본격적으로 꽁냥거리는 건…… 우리들의 집을 만들고 나서 하죠……?」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言いつつも、自分もすりすりと胸板に頬擦りしてくるアナと、夫婦のようにイチャイチャし続けてしまうのだった――"
translation = "그런 소리를 하면서도 자신도 부비부비 가슴팍에 뺨을 비벼오는 아나와 부부처럼 계속 꽁냥거리는 것이었다──"

