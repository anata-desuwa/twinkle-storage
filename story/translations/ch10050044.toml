[[dialogue]]
speaker = "unk"
original = "第４話,風邪の対処法,P"
translation = "제4화,감기 대처법,P"

[[dialogue]]
speaker = "unk"
original = "ソフィアからメッセージが届き、俺は急ぎ保健室へと向かっていた。"
translation = "소피아에게서 메시지가 도착했고, 나는 서둘러 보건실로 향하고 있었다."

[[dialogue]]
speaker = "unk"
original = "保健室に入るとベッドにソフィアの姿を探す。"
translation = "보건실에 들어서자 침대에 있는 소피아의 모습을 찾는다."

[[dialogue]]
speaker = "unk"
original = "布団がぽっこり膨らんでいるベッドを見つけると、俺は急いでそれに駆け寄った。"
translation = "이불이 볼록하게 부풀어 오른 침대를 발견하고, 나는 서둘러 그곳으로 달려갔다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さん……来てくれたんですね……」"
translation = "「회장군…… 와 주셨군요……」"

[[dialogue]]
speaker = "unk"
original = "熱があるの？\u3000大丈夫？"
translation = "열이 있어? 괜찮아?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そこまで心配そうな顔をされると申し訳ないです」"
translation = "「그렇게까지 걱정스러운 얼굴을 하시면 죄송해요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「おそらくただの風邪でしょう……熱は多少あるんですが、倒れたとかそういうことではなくて……」"
translation = "「아마 단순한 감기일 거예요…… 열은 조금 있지만, 쓰러졌다거나 그런 건 아니고……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ちょっと具合が悪いので、保健室を借りて休ませてもらっているだけなんです……」"
translation = "「그냥 몸이 좀 안 좋아서, 보건실을 빌려 쉬고 있는 것뿐이에요……」"

[[dialogue]]
speaker = "unk"
original = "大事でないならよかった……"
translation = "별일 아니라니 다행이다……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい、でも……」"
translation = "「네, 하지만……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「せっかく保健室まで来たのですから、しばらくここに居てくれませんか……？」"
translation = "「모처럼 보건실까지 오셨으니, 잠시 여기 있어 주시면 안 될까요……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「わがままを言ってしまって……ごめんなさい……」"
translation = "「떼를 써서…… 죄송해요……」"

[[dialogue]]
speaker = "unk"
original = "全然いいよ"
translation = "전혀 괜찮아"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「えへへ……ありがとうございます……」"
translation = "「에헤헤…… 고맙습니다……」"

[[dialogue]]
speaker = "unk"
original = "弱々しく微笑むソフィア。"
translation = "힘없이 미소 짓는 소피아."

[[dialogue]]
speaker = "unk"
original = "体調が悪いせいで、気持ちが少し弱ってしまっているのが見て取れる。"
translation = "몸 상태가 좋지 않아 마음이 조금 약해져 있다는 것을 알 수 있다."

[[dialogue]]
speaker = "unk"
original = "俺は椅子を引っ張ってきてベッドの傍に座ると、ソフィアの手を握って看病することにした。"
translation = "나는 의자를 끌어와 침대 옆에 앉아, 소피아의 손을 잡고 간호하기로 했다."

[[dialogue]]
speaker = "unk"
original = "しばらくして……"
translation = "잠시 후……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さん……ずっと手を握ってくれていてありがとうございます……」"
translation = "「회장군…… 계속 손을 잡아주셔서 고맙습니다……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そう言えば小さい頃、私が熱を出した時は姉さんも同じように手を握ってくれていました」"
translation = "「그러고 보니 어렸을 때, 제가 열이 났을 때는 언니도 똑같이 손을 잡아주었어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それがすごく安心できて……嬉しかった……」"
translation = "「그게 너무 안심이 돼서…… 기뻤어요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あの……もうひとつ……わがままを言ってもいいですか……？」"
translation = "「저…… 하나 더…… 떼를 써도 될까요……?」"

[[dialogue]]
speaker = "unk"
original = "なんでも言って"
translation = "뭐든지 말해"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私が熱を出して、なかなか下がらなかった時……姉さんは一緒にお布団に入って添い寝してくれました……」"
translation = "「제가 열이 나서 좀처럼 내려가지 않았을 때…… 언니는 함께 이불 속에 들어와서 같이 잠을 잤어요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「震える私のことを抱きしめて、大丈夫よって頭を撫でてくれて……」"
translation = "「떨고 있는 저를 안아주면서, 괜찮다고 머리를 쓰다듬어 주었고……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だから……その……隣に寄り添って抱きしめてくれたら……もっと安心できると思うんです……」"
translation = "「그러니까…… 그게…… 옆에 기대서 안아주시면…… 더 안심이 될 것 같아요……」"

[[dialogue]]
speaker = "unk"
original = "わかった、いいよ"
translation = "알았어, 괜찮아"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いいんですか？\u3000ありがとうございます……」"
translation = "「괜찮은가요? 고맙습니다……」"

[[dialogue]]
speaker = "unk"
original = "俺はベッドに横になると、ソフィアを抱きかかえるようにして添い寝した。"
translation = "나는 침대에 눕자, 소피아를 안아 올리듯이 곁잠을 잤다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「風邪、移しちゃうかもしれません……ごめんなさい……」"
translation = "「감기, 옮길지도 몰라요…… 죄송해요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも、会長さんに抱きしめられていると……とっても、ホットで……安心します……」"
translation = "「하지만, 회장군에게 안겨 있으니…… 너무나, 따뜻하고…… 안심이 돼요……」"

[[dialogue]]
speaker = "unk"
original = "ソフィアに添い寝してもらおうかな"
translation = "소피아에게 곁잠을 부탁해 볼까"

[[dialogue]]
speaker = "unk"
original = "今度俺が風邪を引いた時は"
translation = "다음에 내가 감기에 걸렸을 때는"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい……お任せください……」"
translation = "「네…… 맡겨주세요……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「その時は私が、会長さんをしっかり抱きしめて……安心させてあげますからね……」"
translation = "「그때는 제가, 회장군을 제대로 안아주고…… 안심시켜 드릴게요……」"

[[dialogue]]
speaker = "unk"
original = "健気なことを言ってくれるソフィアの頭を優しく撫でる。"
translation = "기특한 말을 해주는 소피아의 머리를 부드럽게 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "するとソフィアは安心しきったような顔つきで、小さな寝息を立て始める。"
translation = "그러자 소피아는 완전히 안심한 듯한 얼굴로, 작은 잠꼬대를 하기 시작한다."

[[dialogue]]
speaker = "unk"
original = "そんなソフィアの顔を見ながら、目を覚ますまでずっと身を寄せたままでいるのだった。"
translation = "그런 소피아의 얼굴을 바라보며, 눈을 뜰 때까지 계속 몸을 기댄 채로 있는 것이었다."

