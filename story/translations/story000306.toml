[[dialogue]]
speaker = "イニシュ"
original = "「蛤塩ラーメン、ごちそうさまでした。あっさりとした味わいながらも確かな貝の存在感があり、洗練された一杯でした」"
translation = "「대합 소금 라멘, 잘 먹었습니다. 담백한 맛이면서도 확실한 조개의 존재감이 느껴지는 세련된 한 그릇이었습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「いつの間にかラーメン通みたいな語りになってきましたね……」"
translation = "「어느샌가 라멘 전문가 같은 말투가 되셨네요……」"

[[dialogue]]
speaker = "イニシュ"
original = "「ウェンディはどうでしたか？」"
translation = "「웬디는 어땠습니까?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「確かに美味しかったです。それに女性でも入れるお洒落な雰囲気で、また訪れてもいいと思いました」"
translation = "「확실히 맛있었어요. 게다가 여성 혼자서도 들어갈 수 있는 세련된 분위기라, 다시 방문해도 좋겠다고 생각했어요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ラーメンに対するイメージが少し変わる体験でした。飲食部門でも新事業を立ち上げたいと考えていましたが、検討してみましょうか」"
translation = "「라면에 대한 이미지가 조금 바뀌는 체험이었어요. 외식 부문에서도 신사업을 시작하고 싶다고 생각했는데, 검토해 볼까요.」"

[[dialogue]]
speaker = "unk"
original = "何の話？"
translation = "무슨 이야기?"

[[dialogue]]
speaker = "ウェンディ"
original = "「ハッ──しまった！？」"
translation = "「핫── 아차!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あー……ええっと……コホン。今から言うことはオフレコにしていただきたいのですが……」"
translation = "「아-…… 에또…… 큼큼. 지금부터 드리는 말씀은 오프 더 레코드로 해주셨으면 합니다만……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ネビュラは人間界に傘下の企業を複数持ち、それらを資金源としています。その管理や運用が私の主な仕事です」"
translation = "「네뷸라는 인간계에 산하 기업을 복수로 소유하고 있으며, 그것들을 자금원으로 삼고 있습니다. 그 관리와 운용이 저의 주된 업무예요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「かつて他のネビュラ構成員から人間界──特に経済のことを学んだ私は、魔女の森に銀行を設立し、産業を興して、森を発展させようと提案しました」"
translation = "「과거 다른 네뷸라 구성원으로부터 인간계── 특히 경제에 대해 배운 저는, 마녀의 숲에 은행을 설립하고 산업을 일으켜 숲을 발전시키자고 제안했습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「しかし魔女の森は閉鎖的かつ保守的で、危険思想を持つ者として追放されそうになったんです」"
translation = "「하지만 마녀의 숲은 폐쇄적이고 보수적이라, 위험사상을 가진 자라며 추방당할 뻔했죠.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そんな私を拾ってくれたのがセドナ長官でした」"
translation = "「그런 저를 거두어 주신 분이 세드나 장관님이었습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ネビュラが人間界で活動するためにウェンディが必要だ──と長老たちを説得して、私を引き抜いてくれたんです」"
translation = "「네뷸라가 인간계에서 활동하기 위해서는 웬디가 필요하다──라며 장로들을 설득해 저를 스카우트해 주셨어요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「だから私はセドナ長官を強く尊敬しています。私はあの人のためにネビュラで働いていると言っても過言ではありません」"
translation = "「그래서 저는 세드나 장관님을 깊이 존경하고 있습니다. 제가 그분을 위해 네뷸라에서 일하고 있다고 해도 과언이 아니에요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「なのでこんなことで長官を煩わせたくはないのですが……」"
translation = "「그러니 이런 일로 장관님을 번거롭게 해드리고 싶지는 않았습니다만……」"

[[dialogue]]
speaker = "イニシュ"
original = "「ウェンディも栄養補給が済んだようですし、モンスターの捜索を再開しましょう」"
translation = "「웬디도 영양 보충이 끝난 것 같으니, 몬스터 수색을 재개합시다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「その前に……三郎系、でしたっけ。少し歩きますが大盛りで有名なお店があるそうです。私と会長さんは満腹なので気になるならおひとりでどうぞ」"
translation = "「그전에…… 삼랑계라고 했던가요. 조금 걷긴 하지만 곱빼기로 유명한 가게가 있다고 하더군요. 저와 회장님은 배가 부르니 관심 있다면 혼자 다녀오세요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ちなみにマシマシでトッピングを倍にできるそうですよ」"
translation = "「참고로 마시마시로 토핑을 두 배로 늘릴 수 있다고 하네요.」"

[[dialogue]]
speaker = "イニシュ"
original = "「情報提供ありがとうございます。行ってきます」"
translation = "「정보 제공 감사합니다. 다녀오겠습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「迷いなく行きましたね……彼女の胃袋はどうなってるんでしょうか……」"
translation = "「망설임 없이 가버렸네요…… 그녀의 위장은 어떻게 되어 있는 걸까요……」"

[[dialogue]]
speaker = "unk"
original = "ところでイニシュにも聞いたんだけど……"
translation = "그건 그렇고 이니슈에게도 물어봤는데……"

[[dialogue]]
speaker = "ウェンディ"
original = "「我々魔女がリクリエと戦う理由……ですか？」"
translation = "「우리 마녀가 리크리에와 싸우는 이유…… 말인가요?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「リクリエが魔女の森に及ばないなら、三界に干渉する必要はないと。……ふむ。新星学園の会長さんともあろう方が冷たいことを言いますね」"
translation = "「리크리에가 마녀의 숲에 미치지 않는다면, 삼계에 간섭할 필요는 없지 않느냐고. ……흠. 신성학원의 회장님씩이나 되시는 분이 차가운 말씀을 하시네요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「結論から言うとそれは違います。魔女はそんな薄情な種族ではありません」"
translation = "「결론부터 말씀드리면 그건 틀렸습니다. 마녀는 그렇게 몰인정한 종족이 아니에요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「他の種族を信用していないのには理由があるんですけど……それは置いておくとして。ネビュラには三界の破滅を願っている魔女は１人もいません」"
translation = "「다른 종족을 신용하지 않는 데에는 이유가 있습니다만…… 그건 제쳐두고서라도. 네뷸라에는 삼계의 파멸을 바라는 마녀는 단 한 명도 없습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「会長さんには理解できないかもしれませんが……我々の活動は、先人たちの無念を晴らすため」"
translation = "「회장님은 이해하지 못하실지도 모르겠지만…… 우리의 활동은 선인들의 한을 풀기 위해.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あるいは、数千、数万年前からの宿題を終わらせるためと言ってもいいかもしれません」"
translation = "「혹은 수천, 수만 년 전부터의 숙제를 끝내기 위해서라고 해도 좋을지도 모르겠네요.」"

[[dialogue]]
speaker = "コハルコ"
original = "『会長さん、そこから南東５００メートル、モンスターらしき反応です』"
translation = "『회장님, 거기서 남동쪽 500미터, 몬스터로 추정되는 반응이야!』"

[[dialogue]]
speaker = "unk"
original = "了解です！"
translation = "알았어!"

[[dialogue]]
speaker = "モンスター"
original = "「────！」"
translation = "「────!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「強い……！」"
translation = "「강해……!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「攻撃力、耐久力、反応速度……どれもデータを大きく上回っています。おかしいです。この個体はこれほどの戦闘力は持っていなかったはず……」"
translation = "「공격력, 내구력, 반응 속도…… 전부 데이터를 크게 상회하고 있어요. 이상해요. 이 개체는 이 정도의 전투력을 가지고 있지 않았을 텐데……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「この強さはネビュラの改造によるものではない……それにこの狂暴性も改造で修正したはずです」"
translation = "「이 강함은 네뷸라의 개조에 의한 것이 아니야…… 게다가 이 흉폭성도 개조로 수정했을 텐데.」"

[[dialogue]]
speaker = "モンスター"
original = "「～～～～！」"
translation = "「～～～～!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「くっ……この強さでは捕獲は困難。それにことが大きくなればネビュラの存在が明るみに……」"
translation = "「큭…… 이 강함으로는 포획이 곤란해. 게다가 일이 커지면 네뷸라의 존재가 세상에 드러나게 돼……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「会長さん、このモンスターの捕獲は諦めてここで消滅させます！」"
translation = "「회장님, 이 몬스터의 포획은 포기하고 여기서 소멸시키겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "いいのか？"
translation = "괜찮겠어?"

[[dialogue]]
speaker = "ウェンディ"
original = "「はい、セドナ長官なら的確な判断をしろと仰るはずです」"
translation = "「네, 세드나 장관님이라면 적절한 판단을 내리라고 말씀하셨을 거예요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「会長さん、力を借ります。──ミラージュアルター！」"
translation = "「회장님, 힘을 빌릴게요. ──미라주 얼터!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「分身と同時攻撃です！\u3000合わせてください！」"
translation = "「분신과 동시 공격입니다! 맞춰 주세요!」"

[[dialogue]]
speaker = "モンスター"
original = "「～～～～～！？」"
translation = "「～～～～～!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ふぅ……なんとかなりました……」"
translation = "「후우…… 어떻게든 됐네요……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「残るモンスターは１体……長官に怒られるのは確実ですけど、燃やされないことを祈りますかね……」"
translation = "「남은 몬스터는 1체…… 장관님께 혼나는 건 확실하지만, 태워지지 않기만을 빌어야겠네요……」"

[[dialogue]]
speaker = "コハルコ"
original = "『会長さん、お疲れ様。さっきの反応はやっぱりモンスターだったみたいだね』"
translation = "『회장님, 수고했어. 방금 그 반응은 역시 몬스터였던 모양이네.』"

[[dialogue]]
speaker = "コハルコ"
original = "『会長さんの周りで他にも誰か戦ってるみたいだけど……流星の人？』"
translation = "『회장님 주변에서 다른 누군가도 싸우고 있는 것 같은데…… 유성 쪽 사람이야?』"

[[dialogue]]
speaker = "ウェンディ"
original = "（魔法を星術に誤認させる魔法で、直接は魔女とわからないようにしてます。適当にごまかしておいてください）"
translation = "（마법을 성술로 오인시키는 마법으로 직접적으로는 마녀라는 걸 모르게 하고 있어요. 적당히 얼버무려 주세요.）"

[[dialogue]]
speaker = "unk"
original = "企業秘密ということで……"
translation = "기업 비밀이라서……"

[[dialogue]]
speaker = "コハルコ"
original = "『？\u3000みんな無事ならそれでいいんだけど──』"
translation = "『? 모두 무사하다면 상관없지만──』"

[[dialogue]]
speaker = "？？？"
original = "「ほっと一息ついたところ悪いけど……メインイベントはこれからだよ！」"
translation = "「한숨 돌린 참에 미안하지만…… 메인 이벤트는 이제부터라구!」"

[[dialogue]]
speaker = "コハルコ"
original = "『！\u3000アステライト反応──多数！？\u3000１つ、２つ、３つ……数えきれない速度で増加中です！』"
translation = "『! 아스텔라이트 반응── 다수!? 하나, 둘, 셋…… 셀 수 없는 속도로 증가 중이야!』"

[[dialogue]]
speaker = "コハルコ"
original = "『しかも会長さんの周りだけ局所的に……？\u3000なんなのこの現象、見たことない……』"
translation = "『게다가 회장님 주변에만 국지적으로……? 뭐야 이 현상, 본 적 없어……』"

[[dialogue]]
speaker = "ウェンディ"
original = "「空がアステライトだらけ……？\u3000いくらなんでもめちゃくちゃな……」"
translation = "「하늘이 아스텔라이트투성이……? 아무리 그래도 엉망진창이야……」"

[[dialogue]]
speaker = "アイリーン"
original = "『ウェンディさん！\u3000大変だよ！』"
translation = "『웬디 언니! 큰일이야!』"

[[dialogue]]
speaker = "ウェンディ"
original = "「あ、とうとう長官にバレましたか？\u3000いろんな意味でファイアされる覚悟をしておきますか……」"
translation = "「아, 드디어 장관님께 들켰나요? 여러 의미로 파이어당할 각오를 해야겠네요……」"

[[dialogue]]
speaker = "アイリーン"
original = "『それどころじゃないよ！\u3000ウェンディさんが捕まえたモンスターが全部逃げたんだ！』"
translation = "『그럴 때가 아니야! 웬디 언니가 잡은 몬스터가 전부 도망쳤어!』"

[[dialogue]]
speaker = "ウェンディ"
original = "「はああぁっ！？」"
translation = "「하아아악!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ウソ……何これ……」"
translation = "「거짓말…… 뭐야 이게……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ハハ、冗談ですよね……ちょっとシャレになりませんよ？\u3000ていうかコレ私のせいじゃないですよね！？」"
translation = "「하하, 농담이죠…… 전혀 웃기지 않다고요? 그보다 이거 제 탓 아니죠!?」"

[[dialogue]]
speaker = "unk"
original = "数が多いだけならなんとか……"
translation = "수만 많은 거라면 어떻게든……"

[[dialogue]]
speaker = "モンスター"
original = "「～～～～～！」"
translation = "「～～～～～!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「くっ……このタイミングで最後のモンスター……しかもさっきのより強くなってませんか……？」"
translation = "「큭…… 이 타이밍에 마지막 몬스터…… 게다가 아까보다 강해지지 않았나요……?」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイのピンチにリーリアが応援に駆け付けましたよ！\u3000もちろん喜んでくれますよね、セ・ン・パ・イ♪」"
translation = "「선배의 위기에 리리아가 응원하러 달려왔어요! 당연히 기뻐해 주실 거죠, 선·배♪」"

[[dialogue]]
speaker = "リーリア"
original = "「──って、きゃああ！？\u3000タイヘンなことになってますよぉ～！？」"
translation = "「──라니, 꺄아아!? 난리가 났잖아요~!?」"

