[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「パルちゃんっ……！」"
translation = "「팔짱……!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「無事ですかっ……！？」"
translation = "「무사하신가요……!?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ～んっ、またやられちゃったわ～！\u3000せっかく編成を変えたのに～！」"
translation = "「아앙~ 또 당해버렸어~! 기껏 편성을 바꿨는데~!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「って──何をしてるんですか、何を！」"
translation = "「잠깐── 뭐 하고 있는 거예요, 대체!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ゲームよ、ゲーム！\u3000結局またボスに勝てなかったの～！\u3000あと一歩だったのに～！」"
translation = "「게임이야, 게임! 결국 또 보스한테 못 이겼어~! 한 걸음 남았는데~!」"

[[dialogue]]
speaker = "unk"
original = "紛らわしいな……"
translation = "헷갈리게 하지 마……."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「うん？\u3000どういうこと？\u3000何かあったの？」"
translation = "「응? 무슨 소리야? 무슨 일 있었어?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あ、えと……。実は──……」"
translation = "「아, 저기……. 사실은──……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふ～ん。私がサボってる間にそんなことがあったのね」"
translation = "「흐음~ 내가 땡땡이치는 동안 그런 일이 있었구나.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「まぁでもいいじゃない。モンスターのことはプリマステラに任せたら。私たちの出る幕じゃないのは事実だし」"
translation = "「뭐 하지만 괜찮잖아. 몬스터 일은 프리마스텔라에게 맡기자구. 우리가 나설 차례가 아니라는 건 사실이니까.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「そう、ですね……」"
translation = "「그렇, 네요……」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「うん……」"
translation = "「응……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「こらこら、あんまり落ち込まないの。私たちは今まで通り、私たちにできることをコツコツすればいいだけよ」"
translation = "「이봐 이봐, 너무 낙담하지 마. 우리는 지금까지 그랬듯, 우리가 할 수 있는 일을 꾸준히 하면 되는 거야.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ほらポストでも見てきたら？\u3000何かお悩み相談が来てるかもしれないわよ？」"
translation = "「자 우편함이나 보고 올래? 뭔가 고민 상담이 와 있을지도 모르잖아?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「そう、だね。クヨクヨしてる場合じゃないよね……」"
translation = "「그렇, 네. 축 처져 있을 때가 아니지……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「よしっ、やりましょう……！\u3000どんな依頼でもじゃんじゃん解決してみせますよ……！」"
translation = "「좋아, 합시다……! 어떤 의뢰라도 팍팍 해결해 보이겠어요……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「その意気よ。まぁ依頼なんて一件も来てないだろうけど♪」"
translation = "「그 기세야. 뭐 의뢰 같은 건 한 건도 안 왔겠지만♪」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「立ち直ろうとしたのに出鼻をくじかないでください！」"
translation = "「막 기운 차리려는데 초 치지 마세요!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「あれ……？\u3000でも一通届いてるよ……？」"
translation = "「어라……? 근데 한 통 와 있어……?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「え゛っ！？\u3000ホントに来てたの！？\u3000今日はもう働きたくないのに～！」"
translation = "「에엑!? 정말로 왔어!? 오늘은 이제 일하기 싫은데에~!」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「どんな相談なんですか？\u3000この際宿題の代筆でもやってやりますよ！」"
translation = "「어떤 상담인가요? 이왕 이렇게 된 거 숙제 대필이라도 해주겠어요!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ええと……」"
translation = "「저기……」"

[[dialogue]]
speaker = "unk"
original = "『指輪を探してもらえないでしょうか。どれだけ探しても見つからないんです』"
translation = "『반지를 찾아주실 수 있을까요. 아무리 찾아도 보이지 않아요.』"

[[dialogue]]
speaker = "unk"
original = "『母からの大切な形見で。だからどうしても見つけたくて……。手伝っていただけますか？』"
translation = "『어머니의 소중한 유품이라서요. 그래서 꼭 찾고 싶어요……. 도와주실 수 있나요?』"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「このタイミングで見つからないって、まさか……」"
translation = "「이 타이밍에 없어졌다는 건 설마……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「もしかしてあのモンスターが……？」"
translation = "「혹시 그 몬스터가……?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あら……？\u3000変ね、そんなわけは……」"
translation = "「어머……? 이상하네, 그럴 리가……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「え？\u3000どういうことですか？」"
translation = "「네? 그게 무슨 말씀이세요?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あ、ううん。こっちの話よ、こっちの話。それよりどうするの？\u3000これが例のモンスターの仕業だったとしたら」"
translation = "「아, 아니야. 혼잣말이야. 그보다 어떡할 거야? 이게 그 몬스터 소행이라면.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「プリマステラさんたちに任せるしかない、よね……。モナカたちじゃ、この人の力には──」"
translation = "「프리마스텔라 분들에게 맡길 수밖에, 없겠지……. 모나카 일행으로는 이 사람에게 힘이──」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「窓の外を見て下さい！\u3000さっきのモンスターがいます……！」"
translation = "「창밖을 보세요! 아까 그 몬스터가 있어요……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「本当にお菓子の箱を抱えてるわね……。また誰かのお菓子を盗んできたのかしら？」"
translation = "「정말로 과자 상자를 안고 있네……. 또 누군가의 과자를 훔쳐 온 걸까?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「とにかくプリマステラの皆さんに……会長さん、ヴィーナスさんに連絡を……！」"
translation = "「어쨌든 프리마스텔라 여러분에게…… 회장님, 비너스 씨에게 연락을……!」"

[[dialogue]]
speaker = "unk"
original = "何度もかけてるんだけど……！"
translation = "계속 걸어보고 있는데 안 받아……!"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「うっ、そういえばさっき分析班に連絡を取るとか言ってましたっけ……！\u3000どうしましょう、このままだとまた逃げられてしまいます……！」"
translation = "「윽, 그러고 보니 아까 분석반에 연락을 취한다느니 그랬었죠……! 어떡하죠, 이대로라면 또 놓치고 말아요……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「まぁいいじゃない。モンスターには手を出すなって言われてるんでしょ？」"
translation = "「뭐 됐잖아. 몬스터에겐 손대지 말라고 들었지?」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「で、ですが……！」"
translation = "「하, 하지만……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ううん……。やっぱり放っておけない。放っておけないよ」"
translation = "「으응……. 역시 모른 척할 수 없어. 모른 척할 수 없다구.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「モナカ……？」"
translation = "「모나카……?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「だって、ここであのモンスターを放っておいたら、誰かがまた悲しい想いをしちゃうかもしれない」"
translation = "「그치만 여기서 저 몬스터를 그냥 두면, 누군가가 또 슬퍼할지도 몰라.」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「お菓子だけじゃなくて、このお手紙を届けてくれた人みたいに、大切なものをあのモンスターに盗られちゃうかもしれない」"
translation = "「과자뿐만 아니라, 이 편지를 보내준 사람처럼 소중한 걸 저 몬스터에게 뺏길지도 몰라.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「けど、また星力の制御に失敗して逃げられちゃうかもしれないわよ？」"
translation = "「하지만 또 성력 제어에 실패해서 놓쳐버릴지도 모른다구?」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「それでもっ……！\u3000見て見ぬ振りなんてできないよっ！」"
translation = "「그래도……! 보고도 못 본 척할 수는 없어!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「無茶はしないからっ、プリマステラさんたちが駆けつけてくるまで時間を稼ぐだけでいいから……！」"
translation = "「무리하지는 않을 거니까, 프리마스텔라 분들이 달려올 때까지 시간만 벌면 되니까……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「このままだと悲しむ人が増えるってわかってるのに放っておいてなんかいられない……！\u3000モナカはそんな人を助けたくて、星騎士を目指してきたんだもん……！」"
translation = "「이대로라면 슬퍼하는 사람이 늘어날 걸 아는데 가만히 있을 순 없어……! 모나카는 그런 사람들을 돕고 싶어서 성기사를 목표로 한 거란 말이야……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「ここで見て見ぬ振りをしたら、モナカは本当の落ちこぼれになっちゃうっ……。そんなの嫌だからっ……」"
translation = "「여기서 못 본 척하면 모나카는 정말 낙오자가 되어버릴 거야……. 그런 건 싫으니까……」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「行きましょう、パルミエ。私もモナカと同じ気持ちです」"
translation = "「갑시다, 팔미에. 저도 모나카와 같은 마음이에요.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「もう考え無しに行動したりしませんから。誰かの大切な物を取り戻してあげたいんです……！」"
translation = "「이젠 생각 없이 행동하지 않을 테니까요. 누군가의 소중한 물건을 되찾아주고 싶어요……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「……ふふ。２人とも相談する相手が違うわよ。部長と副部長がそう言うなら平部員の私は従うだけなんだから」"
translation = "「……후후. 둘 다 상담할 상대가 틀렸어. 부장이랑 부부장이 그렇게 말한다면 평부원인 나는 따를 수밖에 없으니까.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「どうかしら、ダーリン？\u3000会長権限で私たちを出動させてくれないかしら？\u3000もしも２人がヘマしそうになったら私がフォローするから」"
translation = "「어떡할래, 달링? 회장 권한으로 우리를 출동시켜 주지 않을래? 만약 둘이 실수할 것 같으면 내가 서포트할 테니까.」"

[[dialogue]]
speaker_original = "シフォン"
speaker_translation = "시폰"
original = "「会長さん、どうかお願いします……！」"
translation = "「회장님, 부디 부탁드립니다……!」"

[[dialogue]]
speaker_original = "モナカ"
speaker_translation = "모나카"
original = "「お願い、にぃ様……！」"
translation = "「부탁해, 오라버니……!」"

[[dialogue]]
speaker = "unk"
original = "ああ、行こう！"
translation = "아아, 가자!"

