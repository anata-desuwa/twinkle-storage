[[dialogue]]
speaker = "unk"
original = "戦いの中で、決して傷つけるようなことをしなかったヒトリからは、ジャクリーヌに対して何かを訴えかけているような感じがした。"
translation = "싸움 속에서 결코 상처 입히는 일은 하지 않았던 히토리에게서는, 자클린에게 무언가를 호소하고 있는 듯한 느낌이 들었다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はぁ、はぁ……これでわかって、くれましたか？」"
translation = "「하아, 하아…… 이제 알아줬나요?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「はぁ、はぁ……わからないの……ヒトリはどうして余にここまで……」"
translation = "「하아, 하아…… 모르겠유…… 히토리는 어째서 짐에게 여기까지……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ジャクリーヌさん、お菓子って……ハロウィンの日以外でも、いつでも食べられるんですよ？」"
translation = "「자클린 씨, 과자는…… 할로윈 날이 아니더라도 언제든지 먹을 수 있어요」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そんなの余は知らないゆ……あんなにたくさんお菓子が食べられるのは、ハロウィンだけなの！」"
translation = "「그런 거 짐은 모르는 유…… 그렇게나 잔뜩 과자를 먹을 수 있는 건 할로윈뿐인유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だからといって、何度も同じハロウィンを繰り返していたら、いつか全部のお菓子を食べ尽くしちゃいますよ」"
translation = "「그렇다고 해서 몇 번이고 똑같은 할로윈을 반복하고 있으면, 언젠가 모든 과자를 다 먹어 치워버리게 될 거예요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「お菓子は作ってくれる人や、売ってくれる人がいてこそ、美味しく食べられるんです」"
translation = "「과자는 만들어 주는 사람이나 팔아 주는 사람이 있어야만 맛있게 먹을 수 있는 거예요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そういう人たちに迷惑をかけたら……ダメです」"
translation = "「그런 사람들에게 폐를 끼치면…… 안 돼요」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そ、それは……」"
translation = "「그, 그건……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「言ってくれれば、わたしでも簡単なのだったら作れますし……毎日だって作ってあげるよ……？」"
translation = "「말해주면 저라도 간단한 거라면 만들 수 있고…… 매일이라도 만들어 줄게요……?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「それにね……迷惑をかけるんじゃなくて、ジャクリーヌさんがみんなの手助けをしてくれるなら……」"
translation = "「그리고 말이죠…… 폐를 끼치는 게 아니라 자클린 씨가 모두를 도와준다면……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わたしたちと一緒に……新星学園へ通うことだって、出来るんだよ」"
translation = "「우리와 함께…… 신성학원에 다니는 것까지 할 수 있다구요」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒトリ……」"
translation = "「히토리……」"

[[dialogue]]
speaker = "unk"
original = "実は、ハロウィンがループし始めるよりも前──"
translation = "사실은 할로윈이 루프하기 시작하기 훨씬 전──"

[[dialogue]]
speaker = "unk"
original = "最初のハロウィンパーティーが終わった後、俺はヒトリから相談を受けていた。"
translation = "첫 할로윈 파티가 끝난 후, 나는 히토리에게 상담을 받았었다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さん……ちょっといいでしょうか？」"
translation = "「회장님…… 잠시 괜찮을까요?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、ありがとうございます。実は相談したいことが……ジャクリーヌさんのこと、なんですけど……」"
translation = "「아, 감사합니다. 사실 상담하고 싶은 게…… 자클린 씨에 대한 건데요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ジャクリーヌさんを……新星学園に転入させることって、出来ないでしょうか？」"
translation = "「자클린 씨를…… 신성학원에 전입시키는 건 불가능할까요?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「む、無理なお願いをしてるってわかってるんですけど……どうしてもそうしてあげたくて……」"
translation = "「무, 무리한 부탁이라는 건 알지만…… 어떻게든 그렇게 해주고 싶어서……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ジャクリーヌさん、言ってました。ハロウィンパワーが満ちるその時まで、パンプキンファントムは魔界の奥地で、眠ったように過ごすんだそうです」"
translation = "「자클린 씨가 그랬어요. 할로윈 파워가 가득 찰 때까지 펌킨 팬텀은 마계 깊은 곳에서 잠든 듯이 지낸다구요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「現世に干渉できるほどの力が得られるのは、ハロウィンへの信仰心が満ちる、１年の間でも少しの間なんだとか」"
translation = "「현세에 간섭할 수 있을 정도의 힘을 얻을 수 있는 건 할로윈에 대한 신앙심이 차오르는 1년 중에서도 짧은 기간뿐이라고」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「で、でも、どうやらわたしのハロウィンフォームは、その力を多少なりとも増幅させる能力があるみたいなんです」"
translation = "「하, 하지만 아무래도 제 할로윈 폼은 그 힘을 조금이나마 증폭시키는 능력이 있는 모양이에요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わたしが他の幽霊さんたちにしているみたいに、ジャクリーヌさんにも力を分けることで、きっと人間界で普通の魔族みたいに活動できるようになるはずです」"
translation = "「제가 다른 유령분들에게 하는 것처럼 자클린 씨에게도 힘을 나눠줌으로써, 분명 인간계에서 평범한 마족처럼 활동할 수 있게 될 거예요」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だから、ジャクリーヌさんが望むなら……新星学園で、もっと彼女と一緒に過ごしてみたいって……ダ、ダメでしょうか？」"
translation = "「그러니까 자클린 씨가 원한다면…… 신성학원에서 좀 더 그녀와 함께 지내보고 싶어서…… 아, 안 될까요?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「い、いいんですか？\u3000あ、あああ、ありがとうございますぅ……っ！」"
translation = "「괘, 괜찮나요? 아, 아아아, 감사합니다아……!」"

[[dialogue]]
speaker = "unk"
original = "そんなお願いをされた俺は、急いでヘレナちゃんに話を通し、無事転入できる手はずが整ったことをヒトリに伝える。"
translation = "그런 부탁을 받은 나는 서둘러 헬레나 짱에게 이야기를 전했고, 무사히 전입할 수 있는 수순이 갖춰졌음을 히토리에게 전한다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ほ、ほほほ、本当ですか！？」"
translation = "「정, 정정정, 정말인가요!?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「本当にありがとうございます……っ！\u3000きっとうまくいくはず……いえ、そうしてみせます……！」"
translation = "「정말 감사합니다……! 분명 잘될 거예요…… 아니, 그렇게 해 보이겠어요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「会長さんにお願いしたんです……ジャクリーヌさんと一緒に、学園に通いたいって……」"
translation = "「회장님께 부탁드렸어요…… 자클린 씨와 함께 학원에 다니고 싶다구요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「どうかな？\u3000ジャクリーヌさんは、わたしと一緒に……」"
translation = "「어떨까? 자클린 씨는 나와 함께……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒ、ヒトリは……」"
translation = "「히, 히토리는……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「？\u3000どうしたの……？」"
translation = "「? 왜 그래……?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒトリは怒らないゆ……？\u3000余が自分のためだけにしたイタズラで、こんなことになったのに……」"
translation = "「히토리는 안 화내는 유……? 짐이 제멋대로 부린 장난으로 이렇게 되어 버렸는데……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「えっとね……今回みたいに悪いことをしたら、叱るかもしれない……」"
translation = "「그게 말야…… 이번처럼 나쁜 짓을 하면 꾸짖을지도 몰라……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「でもね……ジャクリーヌさんはもう、わたしのお友達、ですから……」"
translation = "「하지만 말야…… 자클린 씨는 이제 제 친구니까요……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ヒトリ……」"
translation = "「히토리……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だから……これからもわたしと……一緒にいてくれたら、嬉しい……です」"
translation = "「그러니까…… 앞으로도 저와…… 함께 있어 준다면 기쁘겠어요」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ありがとうなの、ヒトリ……」"
translation = "「고마운 유, 히토리……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「じ、じゃあ……」"
translation = "「그, 그럼……」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「もう悪いことはしないから……余も、これからヒトリと一緒に居たいの！」"
translation = "「이제 나쁜 짓은 안 할 거니까…… 짐도 이제부터 히토리와 함께 있고 싶은 유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「が、学園にも、一緒に通いたいってこと……？」"
translation = "「학, 학원에도 함께 다니고 싶다는 뜻이야……?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「もちろんなの！\u3000こんなに楽しい場所、ヒトリと一緒ならずっと居たいに決まってゆ！」"
translation = "「물론인 유! 이렇게 즐거운 장소, 히토리와 함께라면 계속 있고 싶은 게 당연한 유!」"

[[dialogue]]
speaker = "unk"
original = "よかったな、ヒトリ"
translation = "잘됐네, 히토리"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「う、うぅぅ……会長さんもいろいろしてくれて……ぐすっ……こんなの、今までで一番うれしいです……！」"
translation = "「으, 으으…… 회장님도 이것저것 신경 써 주시고…… 훌쩍…… 이런 거 지금까지 중에서 제일 기뻐요……!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そんなに嬉しいゆ？」"
translation = "「그렇게 기쁜 유?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「うん……うん……っ！」"
translation = "「응…… 응……!」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー！\u3000ゆー！」"
translation = "「유-! 유-!」"

[[dialogue]]
speaker = "unk"
original = "こうして、恥ずかしがり屋でおとなしいヒトリに、ジャクリーヌというかけがえのない友達が出来た。"
translation = "이렇게 부끄러움 많고 얌전한 히토리에게 자클린이라는 소중한 친구가 생겼다."

[[dialogue]]
speaker = "unk"
original = "そんな様子を見ていると、こっちまで嬉しくなるのだった。"
translation = "그런 모습을 보고 있자니 이쪽까지 기분이 좋아졌다."

