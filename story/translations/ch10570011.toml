[[dialogue]]
speaker = "unk"
original = "第１話,不幸を吹き飛ばす味,P"
translation = "제1화, 불행을 날려버리는 맛, P"

[[dialogue]]
speaker = "unk"
original = "魔界の都市レゾフで出会った、星騎士ではないのに星術を使うことのできる占星術師──トリシャ＝アポテレスマティカ。"
translation = "마계의 도시 레조프에서 만난, 성기사는 아니지만 성술을 사용할 수 있는 점성술사──트리샤 아포텔레스마티카."

[[dialogue]]
speaker = "unk"
original = "ひょんなことから彼女の友人となった俺は、レゾフの街を案内してもらうことになり……"
translation = "어쩌다 보니 그녀의 친구가 된 나는, 레조프 거리를 안내받게 되었고……"

[[dialogue]]
speaker = "トリシャ"
original = "「さっきのお店で……衣類はだいたい揃うかと……」"
translation = "「방금 그 가게에서…… 의류는 대충 갖춰질 거라고……」"

[[dialogue]]
speaker = "トリシャ"
original = "「レゾフは魔界の中でも極寒の地。コートや帽子をしっかり着込むのが、吉でしょうから……」"
translation = "「레조프는 마계 중에서도 극한의 땅. 코트나 모자를 든든히 껴입는 것이, 길할 테니까요……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは寒くないの？"
translation = "트리샤 씨는 안 추워?"

[[dialogue]]
speaker = "トリシャ"
original = "「私は寒さに強いので……それに分厚いコートと帽子を身に付けると、占い師であることが周りに伝わりません……」"
translation = "「저는 추위에 강해서…… 게다가 두꺼운 코트와 모자를 몸에 걸치면, 점술사라는 것이 주변에 전해지지 않습니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「寒さに負けて着ぶくれしていては、大切な運命との邂逅を逃してしまう……」"
translation = "「추위에 져서 옷을 껴입어서는, 소중한 운명과의 해후를 놓쳐버려요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「現にあなたが私に声をかけたのも、この占い師の衣装が功を奏したはずです……」"
translation = "「실제로 당신이 나에게 말을 건 것도, 이 점술사 의상이 효과를 본 덕분일 겁니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「だから……ちょっぴり寒いけど我慢……っくしゅん」"
translation = "「그러니까…… 조금 춥지만 참아…… 에취」"

[[dialogue]]
speaker = "トリシャ"
original = "「ずずっ……で、案内の続きですが……」"
translation = "「훌쩍…… 그래서, 안내의 계속입니다만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「パンを買うなら、あの青白い街灯が目立つ店がオススメです……気さくな店主ですから、人間のあなたでも買いやすいかと……」"
translation = "「빵을 산다면, 저 푸르스름한 가로등이 눈에 띄는 가게를 추천합니다…… 싹싹한 점주니까, 인간인 당신이라도 사기 쉬울 거예요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「しかし、基本的にレゾフの住人は親切です……困りごとがあれば、初対面でも頼って良いと、思います……」"
translation = "「하지만, 기본적으로 레조프의 주민은 친절합니다…… 곤란한 일이 있다면, 초면이라도 의지해도 좋다고, 생각합니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「もちろん、私でも良いですよ……あなたと私は、友達。そう。友達同士ですから……フフ……友達とは、本当に、良い響き……」"
translation = "「물론, 저라도 괜찮아요…… 당신과 저는, 친구. 그래요. 친구 사이니까요…… 후후…… 친구란, 정말로, 좋은 울림……」"

[[dialogue]]
speaker = "トリシャ"
original = "「……これで大体、レゾフで生活する上で必要なことは伝えられたはず……」"
translation = "「……이걸로 대충, 레조프에서 생활하는 데 필요한 것은 전해드린 것 같네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「人間界は娯楽が充実していると聞きますし、それに比べたら退屈かもしれませんが……良い街、ですので……」"
translation = "「인간계는 오락이 충실하다고 들었기에, 그에 비하면 지루할지도 모르겠지만…… 좋은 거리, 이니까요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「さて……本当ならここでお別れするのですが……もう少しだけお時間、よろしいでしょうか……」"
translation = "「자…… 원래라면 여기서 작별해야 합니다만…… 조금만 더 시간, 괜찮으실까요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「実は今朝、お出かけ前にあなたのことを占ったのです……あなたの運命の糸は、とても複雑で奇怪に絡み合っていますから……」"
translation = "「사실 오늘 아침, 외출하기 전에 당신에 대해 점을 쳤거든요…… 당신의 운명의 실은, 너무나 복잡하고 기괴하게 얽혀 있어서……」"

[[dialogue]]
speaker = "トリシャ"
original = "「そうしたら、今日の最後にわずかばかりの不幸があると、星が教えてくれたのです……」"
translation = "「그랬더니, 오늘의 마지막에 아주 약간의 불행이 있다고, 별이 가르쳐 주었습니다……」"

[[dialogue]]
speaker = "unk"
original = "ええっ！？"
translation = "에엣!?"

[[dialogue]]
speaker = "トリシャ"
original = "「これは定め事……宿運と言っても良いでしょう。避けることはできません……」"
translation = "「이것은 정해진 일…… 숙운이라고 해도 좋겠죠. 피할 수는 없습니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「しかし、本当に些細な不幸です。誰かを永遠に失う、ひどい怪我を負う……そんな不幸では決してありません……」"
translation = "「하지만, 정말 사소한 불행이에요. 누군가를 영원히 잃거나, 심한 부상을 입는…… 그런 불행은 결코 아닙니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「しかし、不幸に変わりはなく。あなたとリンクしている守護星が教えてくれたので、確かです……」"
translation = "「하지만, 불행인 것은 변함이 없어서. 당신과 링크되어 있는 수호성이 가르쳐 준 것이니, 확실합니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「だからこそ今のうちに、あなたに幸せを増やしたい。たくさんの幸せがあれば、不幸に耐える覚悟ができます……」"
translation = "「그렇기에 지금 이 기회에, 당신에게 행복을 늘려주고 싶어요. 많은 행복이 있다면, 불행에 견딜 각오가 생기니까요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あの……ここで、しばらく待っていてください。ちょっと『ある物』を、買ってきます……」"
translation = "「저기…… 여기서, 잠시만 기다려 주세요. 잠깐 『어떤 물건』을, 사 오겠습니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「お待たせしました。フフ……どうぞ、これを……あ、手のひらに置きますので、指で掴まないように……」"
translation = "「기다리셨죠. 후후…… 자, 이것을…… 아, 손바닥에 올려둘 테니, 손가락으로 잡지 않도록……」"

[[dialogue]]
speaker = "トリシャ"
original = "「これはレゾフの名産品……氷結ヨーグルト、です……」"
translation = "「이것은 레조프의 명산품…… 빙결 요구르트, 입니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「年中、氷点下を超えない極寒の地で作られる、シャーベット状のヨーグルトでして……」"
translation = "「일 년 내내, 영하를 넘지 않는 극한의 땅에서 만들어지는, 셔벗 상태의 요구르트라서……」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ……地元民でも好き嫌いが別れるほどの、凍てつくうまさが炸裂する一品……レゾフに来たらこれを食さねば……です……」"
translation = "「후후…… 현지인들 사이에서도 호불호가 갈릴 정도의, 얼어붙는 듯한 맛이 작렬하는 일품…… 레조프에 오면 이것을 먹지 않으면 안 되는…… 법이죠……」"

[[dialogue]]
speaker = "unk"
original = "容器を持った指が貼りつく！？"
translation = "용기를 잡은 손가락이 달라붙어!?"

[[dialogue]]
speaker = "トリシャ"
original = "「あ……だから持たないで、と……良かったですね、すぐに剥がせて……」"
translation = "「아…… 그러니까 잡지 말라고…… 다행이네요, 금방 떼어내서……」"

[[dialogue]]
speaker = "トリシャ"
original = "「３秒以上、素手で掴むと、お湯がない限りカップと一体化します……」"
translation = "「3초 이상, 맨손으로 잡으면, 뜨거운 물이 없는 한 컵과 일체화됩니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ……人体が許容できるギリギリの冷たさですから……食べる時は一気にいってください……」"
translation = "「후후…… 인체가 허용할 수 있는 한계치의 차가움이니까요…… 먹을 때는 단숨에 가주세요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「怯えたまま食すと、内頬にひっついて取れなくなります……」"
translation = "「겁먹은 채로 먹으면, 볼 안쪽에 달라붙어서 떨어지지 않게 됩니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「しかしそのリスクを超えた先にあるのは甘美な祝福……『おいしい』という流星群があなたの頭に降り注ぐはず……」"
translation = "「하지만 그 리스크를 넘어선 끝에 있는 것은 감미로운 축복…… 『맛있다』는 유성우가 당신의 머리에 쏟아질 거예요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「共に広めてゆきましょう。氷結ヨーグルト愛好の輪を……」"
translation = "「함께 퍼뜨려 나가죠. 빙결 요구르트 애호의 고리를……」"

[[dialogue]]
speaker = "unk"
original = "い、いただきます……！"
translation = "자, 잘 먹겠습니다……!"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ、フ……いかがでしょうか……」"
translation = "「후후, 후…… 어떠신가요……」"

[[dialogue]]
speaker = "unk"
original = "これは……うまいっ！"
translation = "이건…… 맛있다!"

[[dialogue]]
speaker = "トリシャ"
original = "「喜んでもらえて良かった……に、にへへ、へ……♪」"
translation = "「기뻐해 주니 다행이네요…… 헤, 헤헤, 헤……♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「今夜、あなたを襲う不幸は避けられません……だから、せめて今のうちに……」"
translation = "「오늘 밤, 당신을 덮칠 불행은 피할 수 없습니다…… 그러니, 적어도 지금 이 기회에……」"

[[dialogue]]
speaker = "トリシャ"
original = "「実は、それ１つじゃなくて、いっぱい、買ってあって……お代わりも、自由……」"
translation = "「사실, 그거 하나가 아니라, 잔뜩, 사 둬서…… 리필도, 자유……」"

[[dialogue]]
speaker = "トリシャ"
original = "「占い師にできることは、このくらいだから……」"
translation = "「점술사가 할 수 있는 일은, 이 정도니까요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「たくさん、食べてくれたら、嬉しい……」"
translation = "「많이, 먹어준다면, 기쁠 거예요……」"

[[dialogue]]
speaker = "unk"
original = "俺はトリシャさんに進められるまま、レゾフ名産の氷結ヨーグルトをたくさんご馳走になった。"
translation = "나는 트리샤 씨가 권하는 대로, 레조프 명물인 빙결 요구르트를 잔뜩 대접받았다."

[[dialogue]]
speaker = "unk"
original = "トリシャさんは少しユニークな言動のある、変わった子ではあるけれど……優しく気配りのできる女性であることがよくわかる１日だった。"
translation = "트리샤 씨는 조금 독특한 언동을 하는, 별난 아이이긴 하지만…… 상냥하고 배려심 깊은 여성이라는 것을 잘 알 수 있는 하루였다."

[[dialogue]]
speaker = "unk"
original = "ちなみに、その日の夜に俺を襲った不幸の正体は……"
translation = "참고로, 그날 밤 나를 덮친 불행의 정체는……"

[[dialogue]]
speaker = "unk"
original = "冷たいものの食べ過ぎによる腹痛──なのだった。"
translation = "차가운 것을 너무 많이 먹은 탓에 생긴 복통──이었던 것이다."

