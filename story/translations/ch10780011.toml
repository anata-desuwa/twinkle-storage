[[dialogue]]
speaker = "unk"
original = "第１話,誰かがそばにいるような……？,P"
translation = "제1화, 누군가 곁에 있는 듯한……?"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～？\u3000会長くんってばもうそのお仕事に取りかかってるの。手際がいいのね～」"
translation = "「어라~? 회장 군은 벌써 그 일을 시작한 거야. 솜씨가 좋네~」"

[[dialogue]]
speaker = "アナ"
original = "「驚異的なペース。会長、最近絶好調ですね。１週間分の仕事を渡したのは数日前なのに」"
translation = "「경이적인 페이스. 회장, 요즘 절호조네요. 일주일 분량의 업무를 넘긴 건 며칠 전인데.」"

[[dialogue]]
speaker = "unk"
original = "なんだか最近、疲れ知らずなんだ"
translation = "왠지 요즘, 지칠 줄을 모른단 말이지."

[[dialogue]]
speaker = "？？？"
original = "「ふふ。それも当然のこと。魔王様の傍らには常に私──」"
translation = "「후후. 그것도 당연한 일. 마왕님 곁에는 항상 저──」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「第７代、光の魔女のトリュファイナが控えておりますゆえ」"
translation = "「제7대, 빛의 마녀 트리파이나가 대기하고 있으니까요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「寝不足の疲労も書類仕事に伴う身体のコリも、全て影から魔法にてお癒しさせていただいております」"
translation = "「수면 부족으로 인한 피로도 서류 작업에 따르는 몸의 결림도, 전부 그림자 속에서 마법으로 치유해 드리고 있습니다.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……なんて。霊体である私が喋っても誰にも気づいてはいただけないのですが……い、いえ。今日こそはしっかりとアピールを……」"
translation = "「……라니. 영체인 제가 말해도 아무도 알아주지 못하시겠지만…… 아, 아니에요. 오늘이야말로 제대로 어필을……」"

[[dialogue]]
speaker = "サーシャ"
original = "「えらい、えらい♪\u3000お仕事ぜーんぶ終わったら、お姉ちゃんがナデナデしてあげるわね～」"
translation = "「장하다, 장해♪ 일 전부 끝나면 누나가 쓰담쓰담 해줄게~」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あぁサーシャ様。それはよい案です。どうかぜひ、魔王様の頭をナデナデするお役目、私にお任せください」"
translation = "「아아 사샤 님. 그것 참 좋은 안입니다. 부디 마왕님의 머리를 쓰담쓰담 하는 역할, 제게 맡겨 주십시오.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>より目覚めし英雄のお世話は、今後も私に一任いただければ幸いです。これも乗りかかった船ですので」"
translation = "「봉리재탄으로부터 깨어난 영웅의 보살핌은, 앞으로도 제게 일임해 주시면 감사하겠습니다. 이왕 돕기로 마음먹은 것이니까요.」"

[[dialogue]]
speaker = "unk"
original = "あ──痛っ"
translation = "아── 따가워."

[[dialogue]]
speaker = "サーシャ"
original = "「あっ、会長くんったら。紙で指、切っちゃった？」"
translation = "「앗, 회장 군도 참. 종이에 손가락 베였어?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「む……っ！\u3000再生の魔女の奇蹟を今ここにっ……ルクス・リプロダクション！」"
translation = "「으……읏! 재생의 마녀의 기적을 지금 이곳에…… 룩스 리프로덕션!」"

[[dialogue]]
speaker = "アナ"
original = "「絆創膏ならここに……あれ？\u3000なんともないですね」"
translation = "「반창고라면 여기에…… 어레? 아무렇지도 않네요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「怪我しちゃったと思ったけど……見間違いだったのかしら？」"
translation = "「다친 줄 알았는데…… 잘못 본 걸까?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「見間違いではありませんよ。私。私がお癒やししたのですよ。気づいてくださいませ」"
translation = "「잘못 본 게 아니에요, 저예요. 제가 치유해 드린 거라고요. 알아주세요.」"

[[dialogue]]
speaker = "アナ"
original = "「まぁでも怪我がないなら何よりです。仕事の進捗も目覚ましいですし、お茶を淹れて休憩しましょう」"
translation = "「뭐 그래도 부상이 없다면 다행입니다. 업무 진척도 눈부시니 차를 내와서 휴식하죠.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら……アナちゃん、カップを４つも出すの？」"
translation = "「어라…… 아나 짱, 컵을 4개나 꺼내는 거야?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……っ！！\u3000もしかしてアナ様、霊体である私が見えているのですか……！？」"
translation = "「……읏!! 설마 아나 님, 영체인 제가 보이는 건가요……!?」"

[[dialogue]]
speaker = "アナ"
original = "「ええ、４つです。人数分ですから」"
translation = "「네, 4개예요. 인원수만큼이니까요.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ああ、何ということでしょう！\u3000とうとう奇蹟が起こったのですね！\u3000私の姿が見える方が現れたのですね！」"
translation = "「아아, 이럴 수가! 드디어 기적이 일어났군요! 제 모습이 보이는 분이 나타난 거군요!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「でもでも、よろしいのですよ。今の私は霊体です。何かを食べたり飲んだりはできませんので、お気持ちだけでも──」"
translation = "「하지만 하지만, 괜찮아요. 지금의 저는 영체예요. 무언가를 먹거나 마실 수는 없으니, 마음만이라도──」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩がもうすぐやってくる頃合いです。先んじて淹れておこうかなと」"
translation = "「마토이 선배가 곧 올 시간이라서요. 미리 내놓을까 해서.」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……やっぱり。見えませんよね……そうですよね……」"
translation = "「……역시. 안 보이는군요…… 그렇죠……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「深く魂で繋がった魔王様にも、私の姿は見えないのですから……私はこの時代で、ずうっと１人ぼっちなのでしょうか……」"
translation = "「깊은 영혼으로 연결된 마왕님께도 제 모습이 보이지 않으니까요…… 저는 이 시대에서 줄곧 혼자인 걸까요……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ん～？\u3000会長くん、どうしたの。首をかしげちゃって」"
translation = "「응~? 회장 군, 왜 그래. 고개를 갸웃거리기는.」"

[[dialogue]]
speaker = "unk"
original = "今、誰かが泣いていたような……"
translation = "방금, 누군가 울고 있었던 것 같은데……"

[[dialogue]]
speaker = "サーシャ"
original = "「そうかしら～？\u3000ふぅん、お部屋から出て行った気もするの？\u3000……変ね、扉を閉める音なんて聞こえなかったけれど」"
translation = "「그럴까나~? 흐음, 방에서 나간 기분도 든다고? ……이상하네, 문 닫는 소리 같은 건 안 들렸는데.」"

[[dialogue]]
speaker = "アナ"
original = "「右に同じです。会長、張り切りすぎて疲れているのでは？」"
translation = "「마찬가지입니다. 회장, 너무 무리해서 피곤한 거 아니에요?」"

[[dialogue]]
speaker = "unk"
original = "（違和感の正体を探しに行く）"
translation = "(위화감의 정체를 찾으러 간다)"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、お出かけするの？\u3000すぐに戻る……？\u3000わかったわ～」"
translation = "「어라, 외출하는 거야? 금방 돌아올 거지……? 알았어~」"

[[dialogue]]
speaker = "アナ"
original = "「せっかくお茶を淹れたのですから、冷めないうちに戻って来てくださいね」"
translation = "「기껏 차를 내왔으니까, 식기 전에 돌아오세요.」"

[[dialogue]]
speaker = "unk"
original = "探し出したいと強く意識すると、その『誰か』の存在が濃くなったり薄くなったりすることに気づいた。俺は『誰か』の気配がする方向へ走り……"
translation = "찾아내고 싶다고 강하게 의식하자, 그 '누군가'의 존재가 짙어지거나 옅어지는 것을 깨달았다. 나는 '누군가'의 기척이 느껴지는 방향으로 달려가……"

[[dialogue]]
speaker = "unk"
original = "侵入厳禁であるため誰も寄りつかないフィーニスの塔。そのすぐ下に、三角座りをして泣いている女の子がいた──"
translation = "침입 엄금이라 아무도 다가오지 않는 피니스의 탑. 그 바로 밑에서 무릎을 모으고 앉아 울고 있는 여자아이가 있었다──"

[[dialogue]]
speaker = "トリュファイナ"
original = "「くすん……くすん……私、寂しいです。ラクシス様……いえ、クロト様……」"
translation = "「훌쩍…… 훌쩍…… 저, 외로워요. 라크시스 님…… 아니, 쿠로토 님……」"

[[dialogue]]
speaker = "unk"
original = "あ、あのー……"
translation = "저, 저기요……"

[[dialogue]]
speaker = "トリュファイナ"
original = "「いくら霊体とはいえ、ずうっと見つけてくださらない。あんまりです。あなた様の魂に引っ張られて現代に再誕したというのに……」"
translation = "「아무리 영체라지만, 줄곧 찾아내 주지 않으시고. 너무하세요. 당신의 영혼에 이끌려 현대에 재탄했는데……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「へっ……？\u3000あ、あれ……今度こそ本当に、見えて……？」"
translation = "「헤……? 아, 어레…… 이번에야말로 정말로, 보이고……?」"

[[dialogue]]
speaker = "unk"
original = "先代、光の魔女のトリュファイナさん！？"
translation = "선대 빛의 마녀인 트리파이나 씨!?"

[[dialogue]]
speaker = "unk"
original = "あなたはラクシスの記憶の中で見た……"
translation = "당신은 라크시스의 기억 속에서 봤던……"

[[dialogue]]
speaker = "トリュファイナ"
original = "「やっと……やっと気づいていただけました……！\u3000うぅ、誰にも気づいてもらえない悲しみ！\u3000苦しみ！\u3000寂しさっ……！」"
translation = "「드디어…… 드디어 알아차려 주셨군요……! 으으, 아무도 알아주지 못하는 슬픔! 고통! 외로움……!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ええ、そうです！\u3000あなた様がラクシス様の過去を垣間見た際、私も霊体としてこの現代に呼び出されたのです！」"
translation = "「네, 맞아요! 당신이 라크시스 님의 과거를 엿보았을 때, 저도 영체로서 이 현대에 불려 온 것입니다!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>による副作用か、魔王の因子の影響かは存じませんがっ……ずっと、ずっとお傍におりました！」"
translation = "「봉리재탄에 의한 부작용인지, 마왕 인자의 영향인지는 모르겠지만요…… 계속, 계속 곁에 있었습니다!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「フィーニスの塔・第零層の攻略の時も、その後もずっとですよ……！？」"
translation = "「피니스의 탑 제0층 공략 때도, 그 후에도 계속이었다고요……!?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「傷ついた時はお癒やしして……たまに耳元でわーって叫んだり……それでも気づいてもらえなくて……」"
translation = "「다치셨을 때는 치유해 드리고…… 가끔 귓가에 와아 하고 소리치기도 하고…… 그런데도 알아차려 주지 못하셔서……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あの、魔王様。手を握ってもよろしいでしょうか……」"
translation = "「저기, 마왕님. 손을 잡아도 될까요……」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「あぁ……魔王様の手、温かいです……もう少し、このままでいさせてください……」"
translation = "「아아…… 마왕님의 손, 따뜻해요…… 조금만 더, 이대로 있게 해주세요……」"

[[dialogue]]
speaker = "unk"
original = "俺の魔王としての力の覚醒に伴い、限定的に霊体として再誕したというトリュファイナさん。"
translation = "나의 마왕으로서의 힘이 각성함에 따라 한정적으로 영체로서 재탄했다는 트리파이나 씨."

[[dialogue]]
speaker = "unk"
original = "繋いだ手は温かくて、少し震えていて……これから彼女が現代で生きていけるよう、支えていこうと思うのだった──"
translation = "잡은 손은 따뜻하고 조금 떨리고 있어서…… 앞으로 그녀가 현대에서 살아갈 수 있도록 지탱해 주기로 생각하는 것이었다──"

