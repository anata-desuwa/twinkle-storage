[[dialogue]]
speaker = "unk"
original = "第２話,いっぱいおっぱいボク元気,P"
translation = "제2화, 가득가득 가슴 나 활기차, P"

[[dialogue]]
speaker = "unk"
original = "クーシェンから「今日もバトルしようよ！」とＤＩＳＣにメッセージが送られてきたので、トレーニング施設へ向かうと――"
translation = "쿠셴에게서 「오늘도 배틀하자!」라고 DISC로 메시지가 왔기에 트레이닝 시설로 향하자──"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「へっへ～ん♪\u3000今日もまたボクが勝っちゃうかんね～！」"
translation = "「헤헤~헤♪ 오늘도 또 내가 이겨버릴 거니까!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ほざけ！\u3000ここまで１２勝１２敗で引き分けじゃろうが！」"
translation = "「웃기지 마라! 지금까지 12승 12패로 무승부이지 않느냐!」"

[[dialogue]]
speaker = "unk"
original = "そこには最近よく見るようになった光景――クーシェンとプリムラが一緒に手合わせをしていた。"
translation = "그곳에는 최근 자주 보이게 된 광경── 쿠셴과 프리뮬라가 함께 대련하고 있었다."

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「やあやあ我こそは、現代に生まれ変わりし斉天大聖！\u3000またの名を、魔法少女フィジカル☆クーシェン！\u3000女神様に代わって、お仕置きしちゃうよ！」"
translation = "「이리 오너라, 나야말로 현대에 환생한 제천대성! 또 다른 이름은 마법소녀 피지컬☆쿠셴! 여신님을 대신해서 혼내주겠어!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふん、自称するのは勝手じゃが、本物の魔法少女を名乗りたいなら、この漆黒の魔法少女、プリムラ†ノワールに勝ち越してからにするのじゃな！」"
translation = "「흥, 자칭하는 건 자유지만 진짜 마법소녀를 자처하고 싶다면 이 칠흑의 마법소녀 프리뮬라†누아르를 이기고 나서 말하거라!」"

[[dialogue]]
speaker = "unk"
original = "２人はすっかり仲良くなったね"
translation = "둘이 완전히 친해졌네"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「どこがじゃ！？」"
translation = "「어디가 말이냐!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あっ、にーにー♪\u3000うんっ！\u3000ボクたち、もう『友達』だよ♪」"
translation = "「앗, 오빠♪ 응! 우리 이제 『친구』야♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はぁっ！？\u3000何を言っとるんじゃ貴様！\u3000我はそんなこと認めてなど……」"
translation = "「하아!? 무슨 소리를 하는 게냐 네 녀석! 나는 그런 거 인정한 적……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「あれ～？\u3000もしかしてプリムラ、恥ずかしがってるの～？\u3000ウキキキ♪」"
translation = "「어라~? 혹시 프리뮬라, 부끄러워하는 거야~? 우끼끼끼♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「クラスで一番よく話すし～、最近はお昼も一緒に食べることが多いし～、こうしてバトルも一緒にする仲じゃ～ん☆」"
translation = "「반에서 제일 자주 대화하고~ 최근엔 점심도 같이 먹는 적이 많고~ 이렇게 배틀도 같이 하는 사이잖아~☆」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「それは貴様がやたら我に構って来るからじゃろ！」"
translation = "「그건 네 녀석이 쓸데없이 나에게 치근덕거리기 때문이지 않느냐!」"

[[dialogue]]
speaker = "unk"
original = "最近プリムラが楽しそうにしてるって"
translation = "요즘 프리뮬라가 즐거워 보인다고"

[[dialogue]]
speaker = "unk"
original = "サチも言ってたよ。"
translation = "사치도 그러더라."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なっ！？\u3000サチの奴も何を言っとるんじゃ！？\u3000そんなの勝手な思い込みじゃ！」"
translation = "「뭐라!? 사치 그 녀석도 무슨 소리를 하는 게냐!? 그런 건 제멋대로인 넘겨짚기니라!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「そっかそっか～、ウキキ♪\u3000プリムラ、実はボクといると楽しいんだ～？\u3000素直じゃないな～、このこの～♪」"
translation = "「그렇구나 그렇구나~ 우끼끼♪ 프리뮬라, 사실 나랑 있으면 즐거운 거구나~? 솔직하지 못하네~ 요 녀석~♪」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうな笑みを浮かべながら、プリムラに肩を組みに行くクーシェン。"
translation = "기쁜 듯한 미소를 띠며 프리뮬라에게 어깨동무를 하러 가는 쿠셴."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちょっ、気安くくっ付くでない、暑苦しい！\u3000眷族が変なこと言うから、こやつが調子に乗り出しおったじゃろうが！」"
translation = "「잠깐, 함부로 달라붙지 마라, 덥느니라! <u>권속</u>이 이상한 소릴 하니까 이자가 기어오르기 시작했지 않느냐!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ねぇ、プリムラ、また今度お泊り会しようよ！\u3000次はサチにシズハに、トマルやにーにーも誘って！」"
translation = "「있지, 프리뮬라, 다음에 또 파자마 파티 하자! 다음엔 사치랑 시즈하 언니, 토마루랑 오빠도 불러서!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「いくら流星寮の部屋が大きくても、そんな大人数じゃ狭いわっ！」"
translation = "「아무리 유성 기숙사의 방이 넓어도 그런 대인원이면 좁느니라!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「部屋があればいいの！？\u3000なら、紅明ねーねーにお願いしてみる！\u3000ねーねーはお金持ちだし、高級マンションの部屋が幾つか空いてるって言ってたから♪」"
translation = "「방만 있으면 돼!? 그럼 코우메이 언니한테 부탁해 볼게! 언니는 부자고 고급 맨션 방이 몇 개 비어있다고 했으니까♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちょっと待て！\u3000今のは言葉の綾じゃ！\u3000なんか実現しちゃいそうな気がしてきたのじゃが！？」"
translation = "「잠깐 기다리거라! 방금 건 말버릇이었느니라! 왠지 실현되어 버릴 것 같은 기분이 든단 말이다!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「大体、眷族とトマルは男なのじゃから、一緒にお泊り会するとサチの奴がうるさく『エッチなのは禁止です！』とか言い出すぞ！」"
translation = "「애초에 <u>권속</u>과 토마루는 남자이지 않느냐, 같이 파자마 파티를 하면 사치 그 녀석이 시끄럽게 『야한 건 금지입니다!』라거나 지껄일 것이니라!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～？\u3000全く、サチも子供だな～。『大人ゲージ』が貯まってない内は、『好きゲージ』も貯まらないから、男の子と一緒に寝ても妊娠はしないのに♪」"
translation = "「에이~? 정말이지 사치도 어린애라니까~. 『어른 게이지』가 쌓이지 않았을 때는 『호감 게이지』도 안 쌓이니까 남자애랑 같이 자도 임신은 안 하는데♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「またその意味不明な『謎ゲージ理論』を……。いつも思うが貴様、それは一体どこで仕入れた性知識なんじゃ……？」"
translation = "「또 그 의미불명의 『수수께끼 게이지 이론』을…… 항상 생각하지만 네 녀석, 그건 대체 어디서 배운 성지식이냐……?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ふっ……そんなのもちろん、ボクの賢い頭脳で、大人たちが断片的に話す内容から推理したに決まってるじゃないか！」"
translation = "「훗…… 그런 건 물론 나의 명석한 두뇌로 어른들이 단편적으로 말하는 내용에서 추리한 게 당연하잖아!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「どこをどう推理したら、謎ゲージに行き着くんじゃ……」"
translation = "「어딜 어떻게 추리하면 수수께끼 게이지에 도달하는 것이냐……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ウキキ♪\u3000そんなにゲージのことが知りたいの～？\u3000プリムラって、にーにーと同じで実はムッツリドスケベだよね～♪」"
translation = "「우끼끼♪ 그렇게 게이지에 대해 알고 싶어~? 프리뮬라는 오빠랑 똑같이 사실 음큼한 대변태구나~♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「誰がムッツリドスケベじゃ！？\u3000眷族やサチじゃあるまいし！」"
translation = "「누가 음큼한 대변태란 말이냐!? <u>권속</u>이나 사치라면 몰라도!」"

[[dialogue]]
speaker = "unk"
original = "俺も違うんだが！？"
translation = "나도 아니거든!?"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「仕方ないな～！\u3000そんなに知りたいなら、ボクがゲージの存在に気づいた理由を、特別に教えてあげるよ♪」"
translation = "「어쩔 수 없네~! 그렇게 알고 싶다면 내가 게이지의 존재를 깨달은 이유를 특별히 가르쳐줄게♪」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「それはズバリ――おっぱいの存在だよ！」"
translation = "「그건 바로── 가슴의 존재야!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「本当におっぱい好きじゃな、こやつ……」"
translation = "「정말로 가슴을 좋아하는구나, 이 녀석……」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「うんっ！\u3000ボク、大きなおっぱい大好き！！！」"
translation = "「응! 나, 커다란 가슴 너무 좋아!!!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「それで、世の中には小さなおっぱいと、大きなおっぱいのヒトで分かれてるじゃない？」"
translation = "「그래서 세상에는 작은 가슴이랑 커다란 가슴인 사람으로 나뉘어 있잖아?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「それでボクはある時、ハッと気づいたんだよ！\u3000大きなおっぱいに成長するには、きっかけが必要なんじゃないかって！」"
translation = "「그래서 나는 어느 날 문득 깨달았어! 커다란 가슴으로 성장하려면 계기가 필요한 게 아닐까 하고!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「それがすなわち――大人への『進化』！\u3000子供は、大人になる為の見えない『大人ゲージ』が貯まることで、それが可能になるんだよ！」"
translation = "「그것이 즉── 어른으로의 『진화』! 어린애는 어른이 되기 위한 보이지 않는 『어른 게이지』가 쌓임으로써 그것이 가능해지는 거야!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「いや、色々矛盾しとるじゃろ。附属生でも大きなおっぱいのやつはいたりするし。逆に大人でも胸がないやつはおるじゃろ」"
translation = "「아니, 여러모로 모순이지 않느냐. 부속생이라도 가슴이 큰 자는 있느니라. 반대로 어른이라도 가슴이 없는 자도 있고」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ちっちっち♪\u3000甘いよ、プリムラ。年齢は関係ないんだ！」"
translation = "「쯧쯧쯧♪ 무르네, 프리뮬라. 나이는 관계없어!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「大人ゲージが貯まりさえすれば、体が大人に進化する！\u3000つまり、附属生でもおっぱいが大きかったら、大人ってことさ！」"
translation = "「어른 게이지가 쌓이기만 하면 몸이 어른으로 진화해! 즉, 부속생이라도 가슴이 크면 어른이라는 소리지!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「なら、男はどうなるんじゃ？\u3000大人の男は別におっぱいが大きくなったりせんじゃろ」"
translation = "「그럼 남자는 어떻게 되는 것이냐? 어른 남자는 딱히 가슴이 커지거나 하지 않지 않느냐」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～？\u3000プリムラ、知らないの～？\u3000男のヒトはね～」"
translation = "「에이~? 프리뮬라, 몰라~? 남자사람은 말이야~」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「大人になると■■■■■が大きくなるんだよ！」"
translation = "「어른이 되면 자지가 커진단 말이야!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！！？"
translation = "잠깐!!?"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ななな、なに大きな声で言っとるんじゃ、このエロ猿はああぁっ！！？\u3000少しは羞恥心というものがないのか貴様ァ！？」"
translation = "「무, 무, 무슨 소리를 큰 소리로 지껄이는 것이냐, 이 에로 원숭이는어어어어억!!? 수치심이라는 게 조금도 없는 것이냐 네 녀석은어어어!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「プリムラが聞いたんじゃんか～！\u3000大人の男はエッチなことをする時、■■■■■が大きく変身するようになってるんだよ！！」"
translation = "「프리뮬라가 물어봤잖아~! 어른 남자는 야한 걸 할 때 자지가 크게 변신하게 되어 있다고!!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ボク、聞いちゃったんだから！\u3000その変身する現象のことを――『勃起』って言うんだって！！」"
translation = "「나, 다 들었다니까! 그 변신하는 현상을── 『발기』라고 한다더라!!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おいいいいいぃっ！！\u3000わかったから、それ以上はもう喋るでない！\u3000マジでガチの破廉恥なのじゃああああああっ！！！」"
translation = "「어으으으으으이!! 알았으니까 그 이상은 더 말하지 말거라! 진짜로 진심으로 파렴치하느니라아아아아아아아!!!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～？\u3000なんか響きがカッコ良くない？\u3000あっ！\u3000ちなみにボク、更に知ってるんだけど、大人の女のヒトは乳首も勃起するんだよ！！」"
translation = "「에이~? 왠지 어감이 멋지지 않아? 앗! 참고로 나 더 알고 있는데, 어른 여자는 유두도 발기한대!!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ふっ……ボクもつい乳首が『勃起』してしまったよ――って１度は言ってみたくない！？\u3000みたくな～いっ！？」"
translation = "「훗…… 나도 그만 유두가 『발기』해 버렸어──라고 한 번쯤 말해보고 싶지 않아!? 싶지 않아~!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族ぅぅぅっ！\u3000ダメじゃこのエロ猿、早くなんとかしないと！！！」"
translation = "「<u>권속</u>으으으으으윽! 안 되겠느니라 이 에로 원숭이, 빨리 어떻게든 하지 않으면!!!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ウキキ♪\u3000プリムラはやっぱり子供だな～♪」"
translation = "「우끼끼♪ 프리뮬라는 역시 어린애네~♪」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして慌てるプリムラを見ながら、悪戯っぽく笑うクーシェンなのであった。"
translation = "얼굴을 붉히며 당황하는 프리뮬라를 보며 짓궂게 웃는 쿠셴이었다."

