[[dialogue]]
speaker = "unk"
original = "バレンタインデーを数日後に控えた、ある日の放課後──俺は流星星徒会からお誘いを受けた。"
translation = "발렌타인데이를 며칠 앞둔 어느 날 방과 후── 나는 유성 성도회로부터 초대를 받았다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ、緋宮会長。お待ちしておりました。ご足労いただきありがとうございます」"
translation = "「앗, 히노미야 회장님. 기다리고 있었습니다. 와주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「やっほ～、会長さん♪\u3000どおどお、このカフェテリアの盛り上がり！」"
translation = "「안녕~, 회장님♪ 어때어때, 이 카페테리아의 열기!」"

[[dialogue]]
speaker = "unk"
original = "みんなチョコレートを作ってるの？"
translation = "모두 초콜릿을 만들고 있는 거야?"

[[dialogue]]
speaker = "unk"
original = "流星学園の女子でいっぱいだね"
translation = "유성학원 여학생들로 가득하네."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。今日からバレンタイン当日まで、放課後はずっとこんな風に賑やかになると思います」"
translation = "「네. 오늘부터 발렌타인 당일까지, 방과 후에는 계속 이렇게 북적거릴 것 같아요.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「新星学園と違って、<ruby>流星<rt>うち</rt></ruby>のバレンタインは本校と附属校が一緒に盛り上げる催しになってるんだ～」"
translation = "「신성학원과 다르게, 유성 발렌타인은 본교와 부속교가 함께 분위기를 띄우는 행사가 되어 있거든~.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「流星学園では『エンジェルチョコレート制度』って呼ばれてるんだけど……あ、やっぱり聞いたことない？」"
translation = "「유성학원에서는 『엔젤 초콜릿 제도』라고 불리는데…… 아, 역시 들어본 적 없어?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「それじゃあ説明しちゃうね～。これからしばらく、カフェテリアは貸し切りみたいになっちゃうだろーし」"
translation = "「그럼 설명해 줄게~. 이제부터 당분간 카페테리아는 전세 낸 것처럼 되어버릴 테니까.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「エンジェルチョコレート制度は、流星学園の本校生と附属校生を１名ずつ、ランダムで選んでペアとなり、チョコ作りを楽しむ行事です」"
translation = "「엔젤 초콜릿 제도는 유성학원의 본교생과 부속교생을 1명씩 랜덤으로 뽑아 페어를 맺고, 초코 만들기를 즐기는 행사입니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「この時、できる限り委員会も部活動も違う生徒同士が組むルールになってまして、多くの生徒が初対面の先輩と後輩でペアになるんですよ」"
translation = "「이때 가능한 한 위원회도 동아리 활동도 다른 학생끼리 짜는 규칙이라서, 많은 학생이 처음 보는 선배와 후배로 페어가 된답니다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そうそう♪\u3000そうやって選ばれた２人で協力して、チョコレート作りをエンジョイするの！\u3000制度なんて言ってるけど、ゆる～い学園行事だよ」"
translation = "「맞아 맞아♪ 그렇게 뽑힌 둘이서 협력해서 초콜릿 만들기를 즐기는 거야! 제도라고는 하지만 널널한 학원 행사야.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「確かにゆるい取り組みではありますが、流星市国の冬のイベントとしても有名なんですよ？」"
translation = "「확실히 가벼운 대처이긴 합니다만, 유성시국의 겨울 이벤트로서도 유명하다고요?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「そうだねぇ。なにせフィオナちゃんの実家、教皇庁とも連動したイベントだから」"
translation = "「그렇지. 무엇보다 피오나짱의 본가인 교황청과도 연동된 이벤트니까.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ペアになった２人は、バレンタイン当日までにたくさんのミニチョコレートを作るの」"
translation = "「페어가 된 두 사람은 발렌타인 당일까지 많은 미니 초콜릿을 만들어.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「学園生が作ったチョコは大聖堂に集められて、バレンタインデーに一般の方々へ配られるんです」"
translation = "「학생들이 만든 초코는 대성당에 모여서, 발렌타인데이에 일반인분들에게 배포된답니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「チョコレートには必ず、微弱な星力を込めておくのが決まりになっています。ちょっとしたおまじないみたいな感じで……」"
translation = "「초콜릿에는 반드시 미약한 성력을 담아두는 것이 규칙입니다. 일종의 부적 같은 느낌으로…….」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うんうん♪\u3000星騎士お手製の星力チョコってことで、ご利益あるかも～とか、とっても甘い～、とか！\u3000毎年評判なんだよね～♪」"
translation = "「응응♪ 성기사 수제 성력 초코라는 점에서, 영험이 있을지도~ 라든가, 엄청 달콤해~ 라든가! 매년 평판이 좋다니까~♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「流星市国に住む方々にとってなじみの深いお祭りなので、とっても盛り上がるんですよ」"
translation = "「유성시국에 사시는 분들에게 매우 친숙한 축제라 무척 고조된답니다.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さんを呼び出したのも、イベント内容の説明とお誘いができればと思ってね♪」"
translation = "「회장님을 불러낸 것도 이벤트 내용 설명이랑 초대를 하고 싶어서였어♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「当日はぜひ、甘い物が好きな新星学園の方々も誘って、大聖堂にお越しください。流星学園がおもてなしいたします！」"
translation = "「당일에는 꼭 단것을 좋아하는 신성학원 분들도 초대해서 대성당으로 와주세요. 유성학원이 정성껏 대접하겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "お誘いありがとう、絶対に行くよ"
translation = "초대해 줘서 고마워, 꼭 갈게."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あ、そうそう。さっきも言ったとおり、バレンタインデーまで放課後のカフェテリアは、チョコ作りの会場になるからね」"
translation = "「아, 맞다. 아까 말한 대로 발렌타인데이까지 방과 후 카페테리아는 초코 만들기 회장이 되니까 말이야.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「流星の女の子にも仲良しな子、いっぱいいるでしょ？\u3000その子のところに行けば、味見させてくれるかもよん♪」"
translation = "「유성의 여자애들 중에도 친한 애들 많지? 그 애가 있는 곳에 가면 맛보게 해줄지도 모른다구♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「レシピをアレンジしたり、一風変わったチョコを作りたがる生徒も多いですから。試食を頼まれたら、付き合ってあげてください」"
translation = "「레시피를 어레인지하거나 색다른 초코를 만들고 싶어 하는 학생도 많으니까요. 시식을 부탁받으면 같이 어울려 주세요.」"

[[dialogue]]
speaker = "unk"
original = "──あんな風に？"
translation = "──저런 식으로?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はうう～、このチョコレート、とっっっても美味しいのです<emoji=heart04>\u3000ほっぺが落ちちゃいそうです～。ご馳走様でした！」"
translation = "「하우우~, 이 초콜릿, 너어어어무 맛있는 거예요욧<emoji=heart04> 뺨이 떨어질 것 같아요~. 잘 먹었습니다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わぁ、こっちのチョコ、マシュマロにとろりとかかっているのです……！\u3000えっ、味見していいんですか？\u3000やった～、いただきます♪」"
translation = "「와아, 이쪽 초코는 마시멜로에 사르르 뿌려져 있는 거예요욧……! 엣, 맛봐도 되나욧? 얏호~, 잘 먹겠습니닷♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こっちのホワイトチョコも豪華ですねぇ！\u3000いえいえ、おねだりしてるわけじゃないのですが……わーい♪\u3000くれるならありがたく！」"
translation = "「이쪽 화이트 초코도 호화롭네욧! 아니아니, 조르고 있는 건 아니지만…… 와아♪ 주신다면 감사히!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「流星学園のバレンタイン……とっても素晴らしいのです！」"
translation = "「유성학원의 발렌타인…… 정말이지 멋진 것인 것이에욧!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「試食をすればおやつ代もかかりませんし……これがパラダイスってやつですか！？」"
translation = "「시식을 하면 간식비도 안 들고…… 이것이 파라다이스라는 건가욧!?」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「ルリちゃん、私たちのチョコも試食してもらっていい？」"
translation = "「루리짱, 우리 초코도 시식해 줄래?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「は～い！\u3000チョコの試食は、流星星徒会のルリエルにお任せなのです～っ♪」"
translation = "「네~엣! 초코 시식은 유성 성도회의 루리에르에게 맡겨주시라구욧~♪」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはっ、ヤバ～い♪\u3000あんなに立て続けにチョコ食べちゃって。ルリちー、流石の甘党だね～」"
translation = "「아핫, 대박~♪ 저렇게 계속 초코를 먹다니. 루리치, 역시 엄청난 단것 마니아네~」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ルリエルったら。あまり食べすぎたらダメとさっき言ったばかり……というか、ペアの附属生が困ってるじゃないですか……！」"
translation = "「루리에르도 참. 아까 너무 많이 먹으면 안 된다고 말한 지 얼마 안 됐는데…… 그보다 페어인 부속생이 곤란해하고 있잖아요……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すみません、緋宮会長。ちょっとルリエルにお小言を言ってきます」"
translation = "「죄송해요, 히노미야 회장님. 잠시 루리에르에게 잔소리 좀 하고 올게요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あとでうちのチョコの味見にも来てね～。それじゃっ♪」"
translation = "「나중에 우리 초코도 맛보러 와~. 그럼 안녕♪」"

[[dialogue]]
speaker = "unk"
original = "さて──俺も新星の星徒会室に戻る前に、知り合いに声をかけてチョコの１つでも味見させてもらおうかな？"
translation = "자── 나도 신성 성도회실로 돌아가기 전에, 아는 사람들에게 말을 걸어 초코라도 한 입 얻어먹어 볼까?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ～！\u3000めっちゃ偶然～！！」"
translation = "「아~! 완전 우연~!!」"

[[dialogue]]
speaker = "unk"
original = "この声は……！"
translation = "이 목소리는……!"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「会長くんじゃん！\u3000ちょりっす～<emoji=heart04>」"
translation = "「회장군이잖아! 쵸릿스~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "流星学園に通う友人・<ruby>雨野<rt>あめの</rt></ruby>ウズメイアが、見たことのない可憐な衣装をまとって登場したのだった──"
translation = "유성학원에 다니는 친구, 우메노 우즈메이야가 본 적 없는 가련한 의상을 입고 등장한 것이었다──"

