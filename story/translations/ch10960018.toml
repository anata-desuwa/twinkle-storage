[[dialogue]]
speaker = "unk"
original = "深夜、街でモンスターが発生。"
translation = "심야, 거리에서 몬스터가 발생."

[[dialogue]]
speaker = "unk"
original = "急ぎ出動し、モンスターを倒して帰路に就いたのだが──"
translation = "급히 출동해 몬스터를 쓰러뜨리고 귀로에 올랐는데──"

[[dialogue]]
speaker = "？？？"
original = "「こちらだ」"
translation = "「이쪽이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "背後から聞こえた、敵意のこもった声。"
translation = "등 뒤에서 들려온 적의가 담긴 목소리."

[[dialogue]]
speaker = "unk"
original = "こちらが反応する間もなく、そのまま路地裏へと連れ込まれて……"
translation = "내가 반응할 틈도 없이 그대로 뒷골목으로 끌려가서……"

[[dialogue]]
speaker = "unk"
original = "不審者に連れてこられたのは、人気のない公園だった。"
translation = "수상한 사람에게 끌려온 곳은 인적이 드문 공원이었다."

[[dialogue]]
speaker = "unk"
original = "警戒を露わにしながら、その不審者の名前を呼ぶ。"
translation = "경계심을 드러내며 그 수상한 사람의 이름을 부른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イングリット、何のつもりだ？\u3000また戦いを挑みに来たのか？」"
translation = "「잉그리드, 무슨 생각이지? 또 싸움을 걸러 온 건가?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「そうだ、ここで私と戦え」"
translation = "「그렇다, 여기서 나와 싸워라.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だが今日は、刃も拳もいらない戦いだ」"
translation = "「하지만 오늘은 칼도 주먹도 필요 없는 싸움이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「は──？」"
translation = "「하──?」"

[[dialogue]]
speaker = "unk"
original = "意外な言葉に面食らっていると、その隙にイングリットが俺を押し倒して──"
translation = "의외의 말에 어안이 벙벙해 있는 사이, 잉그리드가 나를 밀어 넘어뜨리고──"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「さぁ、私と戦ってもらおうか……！」"
translation = "「자, 나와 싸워줘야겠어……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！！？？」"
translation = "「!!??」"

[[dialogue]]
speaker = "unk"
original = "突然の事態に思考が追いつかない。"
translation = "갑작스러운 사태에 사고가 따라가지 못한다."

[[dialogue]]
speaker = "unk"
original = "コラプサーとの戦闘を覚悟したら、いきなり押し倒されて、相手が衣服を脱ぎだして……"
translation = "콜랩서와의 전투를 각오했더니 갑자기 밀려 넘어지고, 상대가 옷을 벗기 시작하고……"

[[dialogue]]
speaker = "unk"
original = "これではまるでセッ──"
translation = "이건 마치 섹──"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「何を驚いている？\u3000貴様はこれから私とセックスするんだ」"
translation = "「왜 놀라지? 네놈은 지금부터 나와 섹스하는 거다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "本当に予想通りの言葉が出てきて、頭が真っ白になった。"
translation = "정말 예상했던 대로의 말이 튀어나와 머릿속이 하얘졌다."

[[dialogue]]
speaker = "unk"
original = "なのに……"
translation = "그런데도……"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ん？\u3000視線を感じるぞ？」"
translation = "「응? 시선이 느껴지는데?」"

[[dialogue]]
speaker = "unk"
original = "露わになったイングリットの胸から目が離せない。"
translation = "드러난 잉그리드의 가슴에서 눈을 뗄 수 없다."

[[dialogue]]
speaker = "unk"
original = "少し身じろぎしただけで重そうに揺れて、戦士というには大きすぎるサイズを主張する。"
translation = "조금 몸을 뒤척이는 것만으로도 무겁게 흔들리며, 전사라고 하기엔 너무나도 큰 사이즈를 주장한다."

[[dialogue]]
speaker = "unk"
original = "丸々とした形も見惚れてしまうほど綺麗で、否応なしに男の本能を刺激されてしまう。"
translation = "둥글둥글한 모양도 넋을 잃고 볼 정도로 아름다워, 아니꼽게도 남자의 본능이 자극되고 만다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ど、どうしてイングリットが俺とセックスを……？」"
translation = "「어, 어째서 잉그리드가 나랑 섹스를……?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ヴァレリーが言っていたぞ、男と女はこうして戦うと。そして強い女は男を組み伏せるのだとな」"
translation = "「발레리가 말하더군, 남자와 여자는 이렇게 싸우는 거라고. 그리고 강한 여자는 남자를 굴복시키는 법이라고 말이지.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「貴様が男で、私が女。ちょうどいいだろう」"
translation = "「네놈이 남자고, 내가 여자. 딱 좋지 않나.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、それは比喩か冗談なんじゃ……」"
translation = "「아니, 그건 비유나 농담이 아닐까……」"

[[dialogue]]
speaker = "unk"
original = "セックスは普通そんな理由でするものじゃない。"
translation = "섹스는 보통 그런 이유로 하는 게 아니다."

[[dialogue]]
speaker = "unk"
original = "だがイングリットに“普通”は通用しない。"
translation = "하지만 잉그리드에게 “보통”은 통하지 않는다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ほう、これが魔王のペニスか。これを私の中に入れればいいのだな」"
translation = "「호오, 이것이 마왕의 자지인가. 이것을 내 안에 넣으면 된다는 거군.」"

[[dialogue]]
speaker = "unk"
original = "俺の意志を確認することもなく、勝手に得心するイングリット。"
translation = "나의 의사를 확인하지도 않고, 멋대로 납득하는 잉그리드."

[[dialogue]]
speaker = "unk"
original = "そしてペニスの先端を股間にあてがい、腰を落として──"
translation = "그리고 자지 끝을 가랑이에 갖다 대고, 허리를 낮추며──"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「では私の体に屈してもらうぞ、魔王！」"
translation = "「그럼 내 육체에 굴복해라, 마왕!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んん～～～～～～～～～～っ！！？」"
translation = "「응응～～～～～～～～～～윽!!?」"

[[dialogue]]
speaker = "unk"
original = "ズブリと肉の槍が突き刺さり、気付けば俺のペニスが深々と咥えられていた。"
translation = "푸욱 하고 살의 창이 꿰뚫고, 정신을 차려보니 내 자지가 깊숙이 물려 있었다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「くっ……はぁ……これがセックスか……」"
translation = "「큭…… 하아…… 이것이 섹스인가……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「痛くはないか……？」"
translation = "「아프지는 않아……?」"

[[dialogue]]
speaker = "unk"
original = "さっきペニスがイングリットの中に入った時、処女膜を破った感触があった。"
translation = "방금 자지가 잉그리드 안으로 들어갔을 때, 처녀막을 찢는 감촉이 있었다."

[[dialogue]]
speaker = "unk"
original = "無理やり押し倒されて、俺が彼女を気遣うのも変な気はするのだけど……"
translation = "억지로 밀려 넘어져 놓고선, 내가 그녀를 걱정하는 것도 이상한 기분이 들지만……"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「戦いなのだから、痛みなど当然だろう。モンスターの爪で抉られた時に比べれば、大したものではない」"
translation = "「싸움이니까 통증 따위 당연하겠지. 몬스터의 발톱에 도려내졌을 때에 비하면 별거 아니다.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だが腹の奥が熱い……なんだこれは……」"
translation = "「하지만 배 안쪽이 뜨거워…… 뭐야 이건……」"

[[dialogue]]
speaker = "unk"
original = "戦士だけあって痛みに強いのか、イングリットの表情にはすでに快感が表れていた。"
translation = "전사답게 고통에 강한 것인지, 잉그리드의 표정에는 이미 쾌감이 나타나 있었다."

[[dialogue]]
speaker = "unk"
original = "俺も熱い体温と肉の感触に包まれ、即物的な快感に下半身がいきり立つ。"
translation = "나도 뜨거운 체온과 육질의 감촉에 휩싸여, 즉물적인 쾌감에 하반신이 바짝 일어선다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んんっ……！\u3000フフ、どうした魔王、悶えているのか？\u3000貴様のペニスが私の中でビクビクと跳ねているぞ」"
translation = "「으음……! 후후, 왜 그러냐 마왕, 괴로워하는 거냐? 네놈의 자지가 내 안에서 파들파들 뛰고 있군.」"

[[dialogue]]
speaker = "unk"
original = "イングリットが呼吸する度に膣壁が収縮し、きつく絞ってペニスを刺激する。"
translation = "잉그리드가 호흡할 때마다 질벽이 수축하며, 꽉 조여 자지를 자극한다."

[[dialogue]]
speaker = "unk"
original = "膣に並んだ肉ひだの感触まで伝わってきて、余計にイングリットを感じてしまう。"
translation = "질에 늘어선 살주름의 감촉까지 전해져 와서, 더욱더 잉그리드를 느끼게 된다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「どうだ魔王、私と繋がった心地は？\u3000悔しいか？\u3000屈辱か？」"
translation = "「어떠냐 마왕, 나와 이어진 기분은? 분하냐? 굴욕적이냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、悔しくはないけど……」"
translation = "「아니, 분하진 않은데……」"

[[dialogue]]
speaker = "unk"
original = "下半身から上ってくるのは確かな快感で、あの傍若無人な彼女も体はちゃんと女の子なんだなと、下世話なことを考えてしまった。"
translation = "하반신에서 올라오는 것은 확실한 쾌감이라, 저 방약무인한 그녀도 몸은 제대로 여자구나 하고 저속한 생각을 해버렸다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「で……ここからどうすればいいんだ？」"
translation = "「그래서…… 여기서부터 어떻게 하면 되는 거지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「腰を動かすとか……？」"
translation = "「허리를 움직인다든가……?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふむ。ではそうするか」"
translation = "「흐음. 그럼 그렇게 하지.」"

[[dialogue]]
speaker = "unk"
original = "敵である俺を疑うこともなく、下半身に力を込めて……"
translation = "적인 나를 의심하지도 않고, 하반신에 힘을 주며……"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふぁああっ……！\u3000はぁ……はっ……んんっ……！」"
translation = "「하아아윽……! 하아…… 핫…… 응윽……!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んんっ……なんだ、これは……？\u3000はぁはっ……はぁっ……ふぅっ……あぁ……っ！」"
translation = "「응윽…… 뭐야, 이건……? 하아핫…… 하앗…… 후우…… 아아……윽!」"

[[dialogue]]
speaker = "unk"
original = "イングリットが体を上下に動かし、膣内で粘膜とペニスが擦れ合う。"
translation = "잉그리드가 몸을 상하로 움직이며, 질 내부에서 점막과 자지가 마찰한다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふっ、んんっ……私の中で、ペニスが……はぁ、ふぅ……はあぁんっ……！」"
translation = "「훗, 응윽…… 내 안에서, 자지가…… 하아, 후우…… 하아앙……!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私が動くと……ふぁ、はぁ……ゾクゾクと、変な感覚が……んっ……はあぁ……っ」"
translation = "「내가 움직이니까…… 하아, 하아…… 소름 끼치는, 이상한 감각이…… 응…… 하아아……윽」"

[[dialogue]]
speaker = "unk"
original = "イングリットの体が小刻みに震え、声にも艶が混じる。"
translation = "잉그리드의 몸이 잘게 떨리고, 목소리에도 교태가 섞인다."

[[dialogue]]
speaker = "unk"
original = "膣内からは愛液がにじみ出し、ぬるりとした感触が快感を増幅させていた。"
translation = "질 내부에서는 애액이 배어 나오고, 미끈거리는 감촉이 쾌감을 증폭시키고 있었다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「腹の奥が、ムズムズして……くぅっ……なるほど、これは確かに戦いだな……」"
translation = "「배 안쪽이, 근질근질해서…… 윽…… 과연, 이건 확실히 싸움이군……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だが貴様にも効いているようだな。はぁ、ふぅ……んっ……貴様も苦悶の声を漏らし、歯を食いしばっているじゃないか……！」"
translation = "「하지만 네놈에게도 효과가 있는 모양이군. 하아, 후우…… 응…… 네놈도 고통스러운 소리를 내며 이를 악물고 있지 않나……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いやそれは、気持ち、い……くっ……」"
translation = "「아니 그건, 기분, 좋아…… 윽……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ハハハッ、いい顔だな……ふっ、はぁ、はっ……もっと苦しむがいい、魔王……！」"
translation = "「하하핫, 좋은 표정이군…… 훗, 하아, 핫…… 더 괴로워해라, 마왕……!」"

[[dialogue]]
speaker = "unk"
original = "今の状態がわかっているのかいないのか、イングリットは俺を責めようと腰を振り続ける。"
translation = "지금 상태를 알고 있는 건지 모르는 건지, 잉그리드는 나를 몰아붙이려 허리를 계속 흔든다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「貴様のペニスが、大きくて……んふっ、んぅっ……私の中が、広げられ、て……っ」"
translation = "「네놈의 자지가, 커서…… 응훗, 응윽…… 내 안이, 넓혀지, 고…… 윽」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「はっ……はぁはっ、んんっ……中で、ズルズルと、擦れて……くっ……腹に、響くな……」"
translation = "「핫…… 하아핫, 응윽…… 안에서, 질척질척하게, 쓸려서…… 윽…… 배에, 울리는군……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「だが、これでこそ戦いだ……はっ……んっ、ふんっ……耐えられるのは、どちらか、試してやる……っ」"
translation = "「하지만, 이래야 싸움이지…… 핫…… 응, 흣…… 견뎌낼 수 있는 건, 어느 쪽인지, 시험해주마…… 윽」"

[[dialogue]]
speaker = "unk"
original = "とろとろの蜜で濡れた粘膜とペニスが絡み、摩擦熱のように快感を生む。"
translation = "걸쭉한 꿀로 젖은 점막과 자지가 얽히며, 마찰열처럼 쾌감을 낳는다."

[[dialogue]]
speaker = "unk"
original = "見せつけるように揺れる胸の破壊力が凄まじくて、あのイングリットも女なんだと意識させられてしまう。"
translation = "과시하듯 흔들리는 가슴의 파괴력이 어마어마해서, 그 잉그리드도 여자라는 것을 의식하게 만든다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふっ、はっ、はぁ……んんっ……！\u3000またペニスが、ビクビクしたぞ……っ」"
translation = "「훗, 핫, 하아…… 응윽……! 또 자지가, 파들파들 떨렸다…… 윽」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「はっ……あっ……貴様も……腹の奥に来る、このむず痒さをこらえるので……精いっぱいのようだな……っ」"
translation = "「핫…… 앗…… 네놈도…… 배 안쪽까지 오는, 이 근질거림을 참느라…… 전력을 다하는 모양이군…… 윽」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「はぁっ……！\u3000ふっ……！\u3000んんっ……！\u3000もっと悶えろ……！\u3000もっと呻け……！\u3000ハハッ、いいザマだ……！」"
translation = "「하앗……! 훗……! 응윽……! 더 괴로워해라……! 더 신음해라……! 하하, 꼴 좋구나……!」"

[[dialogue]]
speaker = "unk"
original = "イングリットが俺を倒そうと腰を振るが、反応がいちいちズレているから、むしろこちらの頭がおかしくなりそうだ。"
translation = "잉그리드가 나를 쓰러뜨리려 허리를 흔들지만, 반응이 일일이 어긋나 있으니 오히려 이쪽의 머리가 이상해질 것 같다."

[[dialogue]]
speaker = "unk"
original = "でもそれならと、イタズラ心が湧いてきて……"
translation = "하지만 그렇다면 하며, 장난기가 솟아올라……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イングリットは知らないかもしれないけど──」"
translation = "「잉그리드는 모를지도 모르지만──」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「何……？\u3000ち○ぽと、おま○こ……？\u3000セックスの時は、性器のことをそう言うのか」"
translation = "「뭐라고……? 자지와, 보지……? 섹스할 때는, 성기를 그렇게 부르는 건가.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「いいだろう、戦の作法ならそうしてやる……はあぁ……貴様のち○ぽが、私のおま○この中で、擦れて……っ」"
translation = "「좋다, 싸움의 예법이라면 그렇게 해주마…… 하아아…… 네놈의 자지가, 내 보지 안에서, 비벼져서…… 윽」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んんっ……！？\u3000ち○ぽがさらに大きくなって……ふぁっ、あっ……私のおま○こが、いっぱいに、なって……」"
translation = "「응윽……!? 자지가 더 커져서…… 하아, 앗…… 내 보지가, 꽉, 차서……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「クハハッ……伝わる……伝わってくるぞ……！\u3000今のが効いたのだな、魔王……！」"
translation = "「쿠하하…… 전해진다…… 전해져 온다……! 방금 게 효과가 있었던 모양이군, 마왕……!」"

[[dialogue]]
speaker = "unk"
original = "騙しているようで罪悪感があるものの、それが背徳の快感に変わっていく。"
translation = "속이는 것 같아 죄책감이 들지만, 그것이 배덕의 쾌감으로 변해간다."

[[dialogue]]
speaker = "unk"
original = "さらに、目の前でたぷんたぷんと弾む胸を鷲掴みにしてやった。"
translation = "나아가, 눈앞에서 출렁출렁 튀어 오르는 가슴을 움켜쥐어 주었다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ひぁああっ！？\u3000胸を揉まれて……はあぁっ……あぁ……んん～～っ！」"
translation = "「히아아앗!? 가슴을 주물려서…… 하아앗…… 아아…… 응으으윽!」"

[[dialogue]]
speaker = "unk"
original = "これが戦いというなら加減はいらない。遠慮なく力任せに揉みしだく。"
translation = "이것이 싸움이라면 봐줄 필요는 없다. 사양 않고 힘껏 주물러 터뜨린다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んはぁ、はっ……ぁん……なん、だ……？\u3000貴様に、胸を触られると……熱くなって……ひやぁああっ……！」"
translation = "「응하아, 핫…… 아앙…… 뭐, 냐……? 네놈에게, 가슴을 만져지니까…… 뜨거워져서…… 히야아앗……!」"

[[dialogue]]
speaker = "unk"
original = "あまりに大きなおっぱいは手のひらに収まらなくて、指の間から肉がこぼれる。"
translation = "너무나 큰 가슴은 손바닥에 다 들어오지 않아, 손가락 사이로 살집이 넘쳐난다."

[[dialogue]]
speaker = "unk"
original = "極上の柔らかさに興奮が高まって、桜色の乳首に吸い付いた。"
translation = "극상의 부드러움에 흥분이 고조되어, 연분홍색 유두를 빨아올렸다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ひああっ！？\u3000乳首を、しゃぶるな……んんっ……！\u3000はぁ、あっ……乳など、出んぞ……」"
translation = "「히아앗!? 유두를, 빨지 마…… 응윽……! 하아, 앗…… 젖 따위, 안 나온다고……」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んん～～っ！\u3000じゅるじゅると、音を立てて吸って……貴様は、乳飲み子かっ……はあぁっ<emoji=heart04>」"
translation = "「응으윽! 쥬르륵 소리를 내며 빨다니…… 네놈은, 젖먹이냐…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ツンと硬くなった乳首を吸われ、快感の声を上げるイングリット。"
translation = "빳빳하게 굳은 유두를 빨려, 쾌감 섞인 비명을 지르는 잉그리드."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を責め立てたくて、下からペニスを突き上げる。"
translation = "그런 그녀를 몰아붙이고 싶어서, 아래에서 자지를 쳐올린다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んんん～～～～～～～っ！！？」"
translation = "「응으으으으으으으윽!!?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ち○ぽが、突き上げて、きて……はっ──あっ──ふやぁああ～～～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 자지가, 쳐올려, 와서…… 핫── 앗── 후야아아아아～～윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私の奥まで、突き刺さってくる……<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000こ、これは──ひあぁあああっ<emoji=heart04>」"
translation = "「내 깊은 곳까지, 꿰뚫어 들어와……<emoji=heart04> 하아<emoji=heart04> 하앗<emoji=heart04> 이, 이건── 히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ズン、ズンとペニスを突き入れられ、イングリットがあられもない声で喘ぐ。"
translation = "즈음, 즈음 자지를 찔러넣자, 잉그리드가 정신 나간 목소리로 헐떡인다."

[[dialogue]]
speaker = "unk"
original = "アステラの中で戦った、剣鬼のような彼女とはもはや別人のようだ。"
translation = "아스텔라 안에서 싸웠던, 검귀 같은 그녀와는 이제 딴판이다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「くっ……はっ……ああぁっ<emoji=heart04>\u3000ふか、いぃ……んっ……ひああぁっ<emoji=heart04>\u3000腹の奥まで、貴様で、いっぱいになるぅっ……<emoji=heart04>」"
translation = "「큭…… 핫…… 아아앗<emoji=heart04> 깊, 어…… 응…… 히아아앗<emoji=heart04> 배 안쪽까지, 네놈으로, 가득 차버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「貴様も、本気を出してきた、というわけか……んっ<emoji=heart04>\u3000はぁ<emoji=heart04>\u3000だがこの程度で、私は倒せん……！」"
translation = "「네놈도, 본 실력을 냈다는 건가…… 응<emoji=heart04> 하아<emoji=heart04> 하지만 이 정도로, 나는 쓰러지지 않는다……!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふっ、んっ、はぁっ<emoji=heart04>\u3000これで、どうだ──んんっ──！」"
translation = "「훗, 응, 하앗<emoji=heart04> 이걸로, 어떠냐── 응윽──!」"

[[dialogue]]
speaker = "unk"
original = "イングリットが下半身に力を込めながら、一気に腰を落とす。"
translation = "잉그리드가 하반신에 힘을 주며, 단숨에 허리를 내리누른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くああっ……！」"
translation = "「크아앗……!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ハハハッ！\u3000またち○ぽがビクビクしているぞ……！」"
translation = "「하하하! 또 자지가 파들파들 떨리고 있군……!」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「はあぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000貴様が悶えているのは愉快だっ<emoji=heart04>\u3000そうらっ、もっと鳴け<emoji=heart04>\u3000もっと情けない声を聞かせろ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 앗<emoji=heart04> 네놈이 괴로워하는 건 유쾌하군<emoji=heart04> 자아, 더 울어라<emoji=heart04> 더 한심한 목소리를 들려줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を叩きつけるように体を弾ませるイングリット。"
translation = "허리를 때려 박듯 몸을 튀어 올리는 잉그리드."

[[dialogue]]
speaker = "unk"
original = "急激な摩擦で強烈な快感が走り、その勢いでおっぱいがぶるんぶるんと暴れていた。"
translation = "급격한 마찰로 강렬한 쾌감이 달리고, 그 기세에 가슴이 출렁출렁 요동치고 있었다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んはぁっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もっと、ち○ぽを跳ねさせろっ<emoji=heart04>\u3000ドクドク暴れさせろっ<emoji=heart04>」"
translation = "「응하앗<emoji=heart04> 핫<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 더, 자지를 튀어 오르게 해라<emoji=heart04> 펄떡펄떡 날뛰게 하란 말이다<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「私のおま○こを、感じとれっ<emoji=heart04>\u3000ふっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000声を上げろっ<emoji=heart04>\u3000んんぁっ<emoji=heart04>\u3000私を、悦ばせろっ<emoji=heart04>」"
translation = "「내 보지를, 느껴라<emoji=heart04> 훗<emoji=heart04> 핫<emoji=heart04> 소리를 질러라<emoji=heart04> 응아앗<emoji=heart04> 나를, 기쁘게 해라<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イングリットに俺への好意などない。俺もない。"
translation = "잉그리드에게 나에 대한 호의 따위 없다. 나도 없다."

[[dialogue]]
speaker = "unk"
original = "そんな恋愛感情の介在しない性行為だが、快感は確かにあって。"
translation = "그런 연애 감정이 개입하지 않는 성행위지만, 쾌감은 확실히 존재해서."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふはぁっ、はっ、あんっ<emoji=heart04>\u3000私に、屈しろ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000私に、敗北しろっ……<emoji=heart04>」"
translation = "「후하앗, 핫, 아앙<emoji=heart04> 나에게, 굴복해라……<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 나에게, 패배하란 말이다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「はぁ、はっ、はぁっ<emoji=heart04>\u3000ふぅっ……んんっ<emoji=heart04>\u3000はぁっ──あっ──ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아, 핫, 하앗<emoji=heart04> 후우…… 응윽<emoji=heart04> 하앗── 앗── 후아아아아～～윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は横暴なコラプサーだが、顔と体はいい……いや極上の部類だ。"
translation = "그녀는 횡포한 콜랩서지만, 얼굴과 몸은 좋다…… 아니 극상의 부류다."

[[dialogue]]
speaker = "unk"
original = "むしろ恋人ではない相手と交わるという背徳感が、快楽を引き立てていた。"
translation = "오히려 연인이 아닌 상대와 교류한다는 배덕감이 쾌락을 돋우고 있었다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふはぁっ、はっ……あっ、ああんっ<emoji=heart04>\u3000くぅぅっ……<emoji=heart04>\u3000腹の奥が、疼く……<emoji=heart04>」"
translation = "「후하앗, 핫…… 앗, 아아앙<emoji=heart04> 끄으으윽……<emoji=heart04> 배 안쪽이, 쑤셔……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んんっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000きゅぅっと<emoji=heart04>\u3000私の体が、疼くのだ<emoji=heart04>\u3000切なくて……んんぅっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 하앗<emoji=heart04> 꽉<emoji=heart04> 내 몸이, 쑤신단 말이다<emoji=heart04> 애달파서…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内がしがみつくようにぎゅっとペニスを締め付ける。"
translation = "질 내부가 매달리듯 꽉 자지를 조여온다."

[[dialogue]]
speaker = "unk"
original = "そして子宮が降りてきて、ペニスの先端にコツコツとぶつかる。"
translation = "그리고 자궁이 내려와 자지의 끝에 툭툭 부딪힌다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「くぅぅっ！？\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んん～～～っ<emoji=heart04>\u3000ち○ぽが、奥ばっかり、当たってぇ……<emoji=heart04>」"
translation = "「끄으으윽!? 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응으으으윽<emoji=heart04> 자지가, 안쪽만, 닿아서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000貴様、卑怯だぞっ……<emoji=heart04>\u3000私の、弱いところ、ばっかりぃ……んんんっ<emoji=heart04>\u3000ひあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 앗<emoji=heart04> 네놈, 비겁하다……<emoji=heart04> 내, 약한 곳만…… 응응윽<emoji=heart04> 히앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "戦いであるなら、弱点を狙うのは卑怯でも何でもない。むしろ常道だ。"
translation = "싸움이라면 약점을 노리는 것은 비겁한 게 전혀 아니다. 오히려 상도다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んん～～～っ<emoji=heart04><emoji=heart04>\u3000何か来るっ<emoji=heart04>\u3000はっ、はっ、はっ──あぁんっ<emoji=heart04>\u3000腹の奥から、来るっ、来るぅっ<emoji=heart04>」"
translation = "「응으으으윽<emoji=heart04><emoji=heart04> 뭔가 온다<emoji=heart04> 핫, 핫, 핫── 아앙<emoji=heart04> 배 안쪽에서, 온다, 온다아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……それはイクっていうんだよ」"
translation = "「큭…… 그건 간다고 하는 거야.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「イ、ク……？」"
translation = "「간, 다……?」"

[[dialogue]]
speaker = "unk"
original = "初めての絶頂なのか、戸惑いを見せるイングリット。"
translation = "처음 겪는 절정인지 당혹감을 보이는 잉그리드."

[[dialogue]]
speaker = "unk"
original = "その隙を逃さずラストスパートをかけ、子宮めがけて思い切り突き上げていく。"
translation = "그 틈을 놓치지 않고 라스트 스퍼트를 올려 자궁을 향해 힘껏 쳐올린다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふぁああ～～っ<emoji=heart04>\u3000やっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ──んぁああっ<emoji=heart04>\u3000貴様より先に、イッてたまるかっ……<emoji=heart04>」"
translation = "「후아아아～～윽<emoji=heart04> 앗<emoji=heart04> 핫<emoji=heart04> 핫<emoji=heart04> 앗── 응아아앗<emoji=heart04> 네놈보다 먼저, 갈까 보냐……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「くっ、うっ……ぐぅぅっ<emoji=heart04>\u3000私は負け、な……ふやああぁっ<emoji=heart04>\u3000勝つのは、わた、し……んん～～っ<emoji=heart04>」"
translation = "「큭, 윽…… 그으윽<emoji=heart04> 나는 지지, 않…… 후야아아앗<emoji=heart04> 이기는 건, 나, 다…… 응으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イングリットの体が震え、膣壁がきゅうきゅうと締まり、絶頂が近いのが伝わってくる。"
translation = "잉그리드의 몸이 떨리고 질벽이 꽉꽉 조여지며 절정이 가까워진 것이 전해진다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000貴様が、先に、イケっ……<emoji=heart04>\u3000んっ、はっ<emoji=heart04>\u3000イケと言ってるだろっ……<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 네놈이, 먼저, 가버려……<emoji=heart04> 응, 핫<emoji=heart04> 가라고 말하고 있잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んんぅっ<emoji=heart04>\u3000ち○ぽ、おま○この奥に、当たってぇっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000これは、まずいぃ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 자지, 보지 안쪽에, 닿아서어<emoji=heart04> 응아앗<emoji=heart04> 앗<emoji=heart04> 이건, 위험해애<emoji=heart04> 응윽<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んはっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000腹の奥が、きゅうって、切ないぃっ<emoji=heart04>\u3000んんっ──くっ──うぅぅ～～～～っ<emoji=heart04>」"
translation = "「응핫<emoji=heart04> 앗<emoji=heart04> 배 안쪽이, 꽉 조여서, 애달파아<emoji=heart04> 응윽── 큭── 으으으으～～윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000もう、ダメだっ<emoji=heart04>\u3000い、イクぅっ<emoji=heart04>\u3000ふぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ──あ──あ──イッくぅぅぅ～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 아앙<emoji=heart04> 이제, 안 돼<emoji=heart04> 가, 가버려어<emoji=heart04> 후아<emoji=heart04> 앗<emoji=heart04> 아── 아── 아── 가버려어어어어～～윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「んんっ──ひぁああ～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응윽── 히아아아아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「あっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000熱いぃっ<emoji=heart04>\u3000腹の奥に<emoji=heart04>\u3000ビュルビュルって<emoji=heart04>\u3000熱いのがぶつかってぇ<emoji=heart04>\u3000はぁ……あっ……ああぁ～～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아앗<emoji=heart04> 뜨거워어<emoji=heart04> 배 안쪽에<emoji=heart04> 울컥울컥하고<emoji=heart04> 뜨거운 게 부딪혀서어<emoji=heart04> 하아…… 앗…… 아아아～～윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスがドクドクと脈打って、イングリットの子宮に精を叩きつける。"
translation = "자지가 펄떡이며 맥동하고, 잉그리드의 자궁에 정을 때려 박는다."

[[dialogue]]
speaker = "unk"
original = "ぷにぷにの柔らかな膣壁が隙間なく密着し、ぎゅうっと締め付けてきて、精液を残らず搾り取られる。"
translation = "말랑말랑하고 부드러운 질벽이 빈틈없이 밀착되어 꽉 조여오고, 정액을 남김없이 짜내진다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「ふっ……くっ……うぅっ……<emoji=heart04>\u3000おま○この中で、ち○ぽ暴れてる……<emoji=heart04>」"
translation = "「훗…… 큭…… 으윽……<emoji=heart04> 보지 안에서, 자지가 날뛰고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「はあぁ……はっ……あんっ<emoji=heart04>\u3000魔王の、熱いのが、奥に流れ込んできて……ふぁ……はあぁっ……<emoji=heart04>」"
translation = "「하아아…… 핫…… 아앙<emoji=heart04> 마왕의, 뜨거운 게, 안으로 흘러 들어와서…… 후아…… 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「はぁ、はぁ……はあぁ……どうやら勝負は引き分けのようだな……」"
translation = "「하아, 하아…… 하아아…… 아무래도 승부는 무승부인 것 같군……」"

[[dialogue]]
speaker = "unk"
original = "引き分けと言いつつも、表情はどこか満足そうで、膣口から漏れた精液を垂らしながら恍惚の笑みを浮かべる。"
translation = "무승부라고 말하면서도 표정은 어딘가 만족스러워 보이며, 질구에서 샌 정액을 흘리며 황홀한 미소를 짓는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（まさかイングリットとセックスすることになるなんて……）"
translation = "(설마 잉그리드와 섹스를 하게 될 줄이야……)"

[[dialogue]]
speaker = "unk"
original = "一方、俺は一度射精したことでいくらか冷静さを取り戻していた。"
translation = "한편, 나는 한 번 사정한 것으로 어느 정도 냉정함을 되찾고 있었다."

[[dialogue]]
speaker = "unk"
original = "よりにもよってイングリットと……と思ってしまうが、ペニスを咥えたまま陶然とする彼女のを重みを感じていると、悪い気はしないから男は単純だ。"
translation = "하필이면 잉그리드와……라고 생각하면서도, 자지를 문 채 넋을 잃은 그녀의 무게를 느끼고 있으면 나쁜 기분은 들지 않으니 남자는 단순하다."

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「これが男の精か……妙な匂いはするが、男が屈した証だと思えば悪くない」"
translation = "「이것이 남자의 정인가…… 묘한 냄새는 나지만, 남자가 굴복한 증거라고 생각하면 나쁘지 않군.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「戦士の女としては、強い子が欲しい。貴様の子を孕むのも悪くないかもな」"
translation = "「전사인 여자로서는 강한 아이를 갖고 싶다. 네놈의 아이를 배는 것도 나쁘지 않을지도 모르겠군.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「孕む──！？」"
translation = "「배다니──!?」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「何、私が貴様を負かしてからの話だ。強いオスとして役立ってもらうぞ」"
translation = "「뭐냐, 내가 네놈을 패배시키고 나서의 이야기다. 강한 수컷으로서 활약해주어야겠어.」"

[[dialogue]]
speaker_original = "イングリット"
speaker_translation = "잉그리드"
original = "「次は私が勝つからな。完膚なきまでに搾り取ってやるから覚悟しておけ」"
translation = "「다음엔 내가 이길 테니까. 완패할 정도로 짜내 줄 테니 각오해둬라.」"

[[dialogue]]
speaker = "unk"
original = "それからイングリットと出会う度に押し倒され、搾られることになるのだった──"
translation = "그 후로 잉그리드와 만날 때마다 밀려 넘어져 짜이게 되는 것이었다──"

