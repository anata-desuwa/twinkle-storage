[[dialogue]]
speaker = "unk"
original = "第３話,本は友達,P"
translation = "제3화, 책은 친구, P"

[[dialogue]]
speaker = "モネ"
original = "「ふぅ～……何とかなりました」"
translation = "「후우~…… 어떻게든 됐네요」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様"
translation = "수고했어"

[[dialogue]]
speaker = "モネ"
original = "「いえいえ、モンスターを倒したのはほとんどは星徒会長ですから……私なんてまだまだですよぉ……」"
translation = "「아뇨아뇨, 몬스터를 쓰러뜨린 건 거의 성도회장님이니까요…… 전 아직 멀었어요……」"

[[dialogue]]
speaker = "モネ"
original = "「そんなことない？\u3000モネもがんばってた？\u3000えへへ……会長にそう言ってもらえると嬉しいです……」"
translation = "「그렇지 않아? 모네도 열심히 했어? 에헤헤…… 회장님께 그런 말을 들으니 기뻐요……」"

[[dialogue]]
speaker = "モネ"
original = "「会長に褒められちゃった。みんなのおかげだよ」"
translation = "「회장님께 칭찬받았어. 다들 덕분이야」"

[[dialogue]]
speaker = "モネ"
original = "「あ……みんなっていうのはこの子たちのことで。私、本の気持ちがわかるんです」"
translation = "「아…… 다들이라는 건 이 아이들을 말하는 거예요. 저, 책의 마음을 알 수 있거든요」"

[[dialogue]]
speaker = "モネ"
original = "「あれ？\u3000会長、意外と驚いてない？\u3000むしろ私らしい……？」"
translation = "「어라? 회장님, 의외로 놀라지 않으시네요? 오히려 저답다고요……?」"

[[dialogue]]
speaker = "モネ"
original = "「おお、さすが個性豊かな星徒会を束ねる星徒会長……懐が深いです」"
translation = "「오오, 역시 개성 넘치는 성도회를 이끄는 성도회장님…… 도량이 넓으시네요」"

[[dialogue]]
speaker = "モネ"
original = "「もちろん理由もなく本好きになったわけじゃないんですけど……昔は祖父と一緒に暮らしていて」"
translation = "「물론 이유 없이 책을 좋아하게 된 건 아니지만요…… 예전에는 할아버지와 함께 살았거든요」"

[[dialogue]]
speaker = "モネ"
original = "「祖父の書斎にはたくさん本があって、物心ついた時には本に囲まれていました。祖父は私に負けない本好きで、よく書斎で一緒に読書してました」"
translation = "「할아버지의 서재에는 책이 잔뜩 있어서, 철들었을 때부터 책에 둘러싸여 있었어요. 할아버지는 저 못지않은 애서가라, 자주 서재에서 함께 독서하곤 했죠」"

[[dialogue]]
speaker = "モネ"
original = "「あ……はい、そうですね、いわゆるおじいちゃん子です。何年も前に天国に行っちゃいましたけど、今もおじいちゃんのことは大好きです」"
translation = "「아…… 네, 그렇죠, 소위 말하는 할아버지 껌딱지예요. 몇 년 전에 하늘나라로 가셨지만, 지금도 할아버지를 정말 좋아해요」"

[[dialogue]]
speaker = "モネ"
original = "「おじいちゃんがいなくなってからも書斎に入り浸って、本ばかり読んでいました」"
translation = "「할아버지가 돌아가신 뒤에도 서재에 틀어박혀서 책만 읽었어요」"

[[dialogue]]
speaker = "モネ"
original = "「それでいつの間にか、読んでほしいとか、手入れしてほしいとか、今は触られたくないとか……本の気持ちがなんとなくわかるようになったんです」"
translation = "「그러다 보니 어느새, 읽어줬으면 좋겠다거나, 손질해 줬으면 좋겠다거나, 지금은 건드리지 않았으면 좋겠다거나…… 책의 기분을 왠지 모르게 알 수 있게 됐어요」"

[[dialogue]]
speaker = "モネ"
original = "「そのことをお母さんに話すと、新星学園の寮に入れられちゃいましたが……。私がおじいちゃんが好きすぎて妄想してると思われたみたいで」"
translation = "「그 일을 어머니께 말씀드렸더니, 신성 학원의 기숙사에 넣어버리셨지만요……. 제가 할아버지를 너무 좋아해서 망상하고 있다고 생각하신 모양이라.」"

[[dialogue]]
speaker = "モネ"
original = "「でも今は新星の図書委員になれたので結果オーライです！\u3000新星の図書館の蔵書は、量が豊富なだけでなく貴重な書物もたくさんありますからね！」"
translation = "「하지만 지금은 신성의 도서위원이 되었으니 결과 오라이예요! 신성 도서관의 장서는 양이 풍부할 뿐만 아니라 귀중한 서적도 많이 있으니까요!」"

[[dialogue]]
speaker = "モネ"
original = "「本は私の友達なんです。だから、本は本であるというだけで私にとっては宝なのです」"
translation = "「책은 제 친구예요. 그래서 책은 책이라는 것만으로 저에게는 보물이에요.」"

[[dialogue]]
speaker = "モネ"
original = "「まぁ……本の友達はたくさんなんですけど、人の友達が少ないんですけどね……あははは」"
translation = "「뭐…… 책 친구는 잔뜩이지만, 사람 친구는 적지만요…… 아하하하.」"

[[dialogue]]
speaker = "unk"
original = "俺は友達じゃない？"
translation = "「나는 친구가 아니야?」"

[[dialogue]]
speaker = "モネ"
original = "「えええっ！？\u3000そんな、新星学園全生徒の頂点に立つ星徒会長が友達なんて恐れ多いですよっ」"
translation = "「에에엣!? 그런, 신성 학원 전 학생의 정점에 서 있는 성도회장이 친구라니 황송해요.」"

[[dialogue]]
speaker = "モネ"
original = "「あっ、会長がショックを受けてる……！？」"
translation = "「앗, 회장님이 쇼크를 받고 있어……!?」"

[[dialogue]]
speaker = "モネ"
original = "「で、でも私なんかが会長の友達なんて釣り合いませんし……関係ない？\u3000本の感想を語り合ったんだから友達……？」"
translation = "「하, 하지만 저 같은 게 회장님의 친구라니 격이 맞지 않고…… 상관없어? 책의 감상을 서로 나누었으니까 친구……?」"

[[dialogue]]
speaker = "モネ"
original = "「そ、そうですねっ。友達……って言っていいですよね」"
translation = "「그, 그렇네요. 친구……라고 말해도 되는 거겠죠.」"

[[dialogue]]
speaker = "モネ"
original = "「御前試合でヴィーナス前会長を倒して、転入したばかりなのに先頭に立って戦って……会長のこと、すごい人だと思っていました」"
translation = "「어전시합에서 비너스 전 회장님을 쓰러뜨리고, 편입한 지 얼마 안 됐는데도 앞장서서 싸우고…… 회장님을 대단한 분이라고 생각하고 있었어요.」"

[[dialogue]]
speaker = "モネ"
original = "「そんな会長と友達になるなんて、なんだか夢みたいです」"
translation = "「그런 회장님과 친구가 되다니, 왠지 꿈만 같아요.」"

[[dialogue]]
speaker = "モネ"
original = "「ん……？」"
translation = "「응……?」"

[[dialogue]]
speaker = "unk"
original = "どうしたんだ？"
translation = "「왜 그래?」"

[[dialogue]]
speaker = "モネ"
original = "「ふふっ、私の本が会長に嫉妬しちゃったみたいです」"
translation = "「후훗, 제 책이 회장님에게 질투해 버린 모양이에요.」"

[[dialogue]]
speaker = "モネ"
original = "「大丈夫。みんなは何があってもずっと大事な友達だよ。帰ったらお手入れしてあげるからね」"
translation = "「괜찮아. 모두는 무슨 일이 있어도 계속 소중한 친구야. 돌아가면 손질해 줄 테니까 말이야.」"

[[dialogue]]
speaker = "モネ"
original = "「あっ、そうだ、忘れないうちにさっきの戦いをレポートにまとめないと……」"
translation = "「앗, 맞다, 잊어버리기 전에 방금 전투를 리포트로 정리해 두지 않으면…….」"

[[dialogue]]
speaker = "モネ"
original = "「この前みたいなのって……うっ、忘れてくださいよぅ……。あれはただの手癖というか、そもそも小説みたいなのはレポートに適しませんってば」"
translation = "「요 전번 같은 건…… 윽, 잊어주세요오……. 그건 그냥 버릇이라고 할까, 애초에 소설 같은 건 리포트에 적합하지 않다니까요.」"

[[dialogue]]
speaker = "モネ"
original = "「はい、これでどうですか？\u3000……問題ない？\u3000ありがとうございます」"
translation = "「네, 이걸로 어때요? ……문제없어? 감사합니다.」"

[[dialogue]]
speaker = "モネ"
original = "「戦ってお腹が空きましたし、何か帰りに食べませんか？\u3000この近くにおいしいお店があるんですよ」"
translation = "「싸워서 배가 고파졌는데, 뭐라도 돌아가는 길에 먹지 않을래요? 이 근처에 맛있는 가게가 있거든요.」"

[[dialogue]]
speaker = "unk"
original = "行きたい！"
translation = "「가고 싶어!」"

[[dialogue]]
speaker = "モネ"
original = "「決まりですね。唐辛子たっぷりのスープが特徴のつけ麺屋さんで、激烈麻辣麺がおすすめです」"
translation = "「결정됐네요. 고추가 듬뿍 들어간 수프가 특징인 츠케멘 가게인데, 격렬 마라멘을 추천해요」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "！？"

[[dialogue]]
speaker = "モネ"
original = "「まさしく辛さと旨味のマリアージュ。<ruby>花椒<rt>ホアジャオ</rt></ruby>の風味が抜群で、辛さの中に強い旨味を感じられるんですよ」"
translation = "「그야말로 매운맛과 감칠맛의 마리아주. 화조의 풍미가 발군이라, 매운맛 속에서 강한 감칠맛을 느낄 수 있거든요」"

[[dialogue]]
speaker = "モネ"
original = "「スープが真っ赤なので、確かに最初見た人は驚くんですけど、大丈夫です！\u3000見た目ほど辛くはないですから」"
translation = "「수프가 새빨개서 확실히 처음 본 사람은 놀라지만, 괜찮아요! 보기만큼 맵지는 않으니까요」"

[[dialogue]]
speaker = "モネ"
original = "「まぁ、私は最近慣れてきちゃったので一番上の辛さにしてますが……あれ？\u3000会長、どうしたんですか？\u3000顔が青いですよ？\u3000会長～？」"
translation = "「뭐, 저는 최근에 익숙해져 버려서 가장 높은 매운맛으로 하고 있지만…… 어라? 회장님, 왜 그러세요? 얼굴이 파란데요? 회장님~?」"

