[[dialogue]]
speaker = "unk"
original = "第４話,パテルと海デート,P"
translation = "제4화, 파텔과 바다 데이트, P"

[[dialogue]]
speaker = "？？？"
original = "「デーデンデーデンデーデン……」"
translation = "「빰밤빰밤빰밤……」"

[[dialogue]]
speaker = "パテル"
original = "「シャーーッ！！」"
translation = "「샤아아악!!」"

[[dialogue]]
speaker = "unk"
original = "わーーっ"
translation = "와아아아"

[[dialogue]]
speaker = "パテル"
original = "「アハハッ、驚き方がわざとらしいよ。サメに驚くならもっといい悲鳴を上げてくれなきゃ」"
translation = "「아하하, 놀라는 게 너무 가식적이야. 상어에 놀랄 거면 좀 더 제대로 된 비명을 질러줘야지.」"

[[dialogue]]
speaker = "unk"
original = "今日はリゾート結界でパテルとデートだ。"
translation = "오늘은 리조트 결계에서 파텔과 데이트다."

[[dialogue]]
speaker = "パテル"
original = "「ねぇねぇ、デートしようよ～。え？\u3000星徒会の仕事がある？」"
translation = "「저기 저기, 데이트하자~. 에? 성도회 일이 있다고?」"

[[dialogue]]
speaker = "パテル"
original = "「え～、この前もそう言ってたじゃん。あたしからデートに誘ったらいつもこうだし」"
translation = "「에~, 저번에도 그렇게 말했잖아. 내가 데이트하자고 하면 항상 이러구.」"

[[dialogue]]
speaker = "パテル"
original = "「デート行きたい～っ。デートデートぉ～」"
translation = "「데이트 가고 싶어~. 데이트 데이트으~」"

[[dialogue]]
speaker = "unk"
original = "運悪く仕事や用事が重なって我慢してもらっていたから、今日はうんと楽しませてあげたい。"
translation = "운 나쁘게 일이나 용무가 겹쳐서 참게 했었으니까, 오늘은 듬뿍 즐겁게 해주고 싶다."

[[dialogue]]
speaker = "パテル"
original = "「あたしが脅かしたらちゃんと驚いてね。それじゃいくよ～……」"
translation = "「내가 겁주면 제대로 놀라줘야 해. 그럼 간다~……」"

[[dialogue]]
speaker = "パテル"
original = "「シャ～～～ッ！！」"
translation = "「샤아아아악!!」"

[[dialogue]]
speaker = "unk"
original = "ぎゃぁあああっ！？"
translation = "으갸아아아악!?"

[[dialogue]]
speaker = "パテル"
original = "「アハハハッ！\u3000悲鳴が迫真すぎて逆に笑えてきちゃった。そうだよ、サメが相手ならそのくらいビビらないと♪」"
translation = "「아하하하! 비명이 너무 박진감 넘쳐서 오히려 웃음이 나오네. 맞아, 상어가 상대라면 그 정도는 쫄아야지♪」"

[[dialogue]]
speaker = "パテル"
original = "「ちょっと狭いけど、フカヒレくんに一緒に乗ろうよ。ほら、こっちこっち。魔王はあたしの後ろに乗ってね」"
translation = "「조금 좁지만, 샥스 군에 같이 타자. 자, 여기 여기. 마왕은 내 뒤에 타.」"

[[dialogue]]
speaker = "パテル"
original = "「魔王、乗った？\u3000ってそんなに離れてちゃダメじゃん。ほらほら、もっとくっつかないと振り落とされちゃうよ。デートなんだから、遠慮しちゃダ～メ♪」"
translation = "「마왕, 탔어? 라니 그렇게 떨어져 있으면 안 되잖아. 봐봐, 좀 더 달라붙지 않으면 떨어져 버린다구. 데이트니까, 사양하면 안~ 돼♪」"

[[dialogue]]
speaker = "パテル"
original = "「あ～、もしかして魔王ってばエッチなこと考えてる？\u3000くっつくだけでそんなこと考えるなんて、魔王ってばいやらしいんだ～」"
translation = "「아~, 설마 마왕은 야한 생각 하고 있어? 달라붙는 것만으로 그런 생각을 하다니, 마왕은 변태라니까~」"

[[dialogue]]
speaker = "パテル"
original = "「な～んてね♪\u3000ほら、もっと近くに来て。でないとほんとに振り落としちゃうよ」"
translation = "「농담이야♪ 자, 좀 더 가까이 와. 안 그러면 정말로 떨어뜨려 버릴 거야.」"

[[dialogue]]
speaker = "パテル"
original = "「それじゃフカヒレくん……」"
translation = "「그러면 샥스 군……」"

[[dialogue]]
speaker = "パテル"
original = "「ゴーッ！」"
translation = "「고!」"

[[dialogue]]
speaker = "パテル"
original = "「いけ～っ、フカヒレくん！\u3000七つの海を支配するのだーっ！\u3000大海原の覇者となれ～っ！！」"
translation = "「가라~, 샥스 군! 7대양을 지배하는 거다! 대양의 패자가 되어라~!!」"

[[dialogue]]
speaker = "パテル"
original = "「アハハッ、アハハハッ♪\u3000サメに乗ってるだけなのに楽しいねっ。あなたと一緒だからかな」"
translation = "「아하하, 아하하하♪ 상어를 타고 있을 뿐인데 즐겁네. 너와 함께라서 그럴까.」"

[[dialogue]]
speaker = "パテル"
original = "「あわわっ！？」"
translation = "「아와와!?」"

[[dialogue]]
speaker = "unk"
original = "パテル、大丈夫？"
translation = "파텔, 괜찮아?"

[[dialogue]]
speaker = "パテル"
original = "「シャーーーッ！！！」"
translation = "「샤아아아악!!!」"

[[dialogue]]
speaker = "unk"
original = "うわあっ！？"
translation = "우와앗!?"

[[dialogue]]
speaker = "パテル"
original = "「アハハッ♪\u3000ようやくちゃんと驚かせたね。あたしの勝ち～っ♪」"
translation = "「아하하♪ 드디어 제대로 놀라게 했네. 나의 승리~♪」"

[[dialogue]]
speaker = "パテル"
original = "「いや～、遊んだ遊んだ～。もう日も暮れてきちゃったね」"
translation = "「이야~, 잘 놀았다 잘 놀았어~. 벌써 해도 저물어 가네.」"

[[dialogue]]
speaker = "パテル"
original = "「今日はデートに連れてきてくれてありがとね、楽しかったよ。あと、わがまま言っちゃってごめん」"
translation = "「오늘은 데이트 데려와 줘서 고마워, 즐거웠어. 그리고, 고집부려서 미안해.」"

[[dialogue]]
speaker = "パテル"
original = "「……デートしたいって言われるのは嬉しいから全然ＯＫ？\u3000そっか、じゃあこれからもわがまま言うから、ちゃんと叶えてね」"
translation = "「……데이트하고 싶다는 말을 듣는 건 기쁘니까 완전 OK? 그렇구나, 그럼 앞으로도 고집부릴 테니까, 제대로 들어줘야 해.」"

[[dialogue]]
speaker = "パテル"
original = "「でもいいの？\u3000あたしと一緒にいて。他の女の子の方がよくない？」"
translation = "「하지만 괜찮아? 나랑 같이 있어도. 다른 여자애가 더 좋지 않아?」"

[[dialogue]]
speaker = "パテル"
original = "「自分で言うのもなんだけど、あたしってめんどくさいし、かわいくないでしょ。死神トークしちゃうしさ」"
translation = "「내가 말하긴 좀 그렇지만, 나는 성가시고, 귀엽지도 않잖아. 사신 토크나 해버리고 말이야.」"

[[dialogue]]
speaker = "パテル"
original = "「守護天使は女神様に与えられた権能を核に作られている。つまり機能が先にあるんだよ。あたしの場合、『淘汰』の摂理が核だね」"
translation = "「수호천사는 여신님께 부여받은 권능을 핵으로 만들어져. 즉 기능이 먼저 있는 거야. 나의 경우, 『도태』의 섭리가 핵이지.」"

[[dialogue]]
speaker = "パテル"
original = "「『淘汰』は世界の整理。そしてそれは『死』を意味する。あたしはどこまでいっても死神なんだよ」"
translation = "「『도태』는 세계의 정리. 그리고 그것은 『죽음』을 의미해. 나는 아무리 해도 사신인 거야.」"

[[dialogue]]
speaker = "パテル"
original = "「あなたのことを特別だと思ってるけど、守護天使として特別扱いはしない。それを変えるつもりはないし、変えたいとも思わない」"
translation = "「너를 특별하다고 생각하지만, 수호천사로서 특별 대우는 하지 않아. 그걸 바꿀 생각은 없고, 바꾸고 싶지도 않아.」"

[[dialogue]]
speaker = "パテル"
original = "「それでもいいの？」"
translation = "「그래도 괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "俺はそんなところも含めてパテルが好きだから"
translation = "나는 그런 점까지 포함해서 파텔이 좋으니까."

[[dialogue]]
speaker = "パテル"
original = "「そっか……えへへ♪\u3000そう言ってくれると嬉しいな♪」"
translation = "「그렇구나…… 에헤헤♪ 그렇게 말해주니 기쁘네♪」"

[[dialogue]]
speaker = "パテル"
original = "「あたし、あなたのこと……」"
translation = "「나, 너를……」"

[[dialogue]]
speaker = "unk"
original = "パテルがそっと顔を近づけてきて──"
translation = "파텔이 살며시 얼굴을 가까이 대고──"

[[dialogue]]
speaker = "パテル"
original = "「ふぅ～」"
translation = "「후우~」"

[[dialogue]]
speaker = "unk"
original = "耳に息がぁっ！？"
translation = "귀에 입김이!? "

[[dialogue]]
speaker = "パテル"
original = "「アハハハッ♪\u3000引っかかった引っかかった～♪\u3000からかうと楽しいところも好きだよ♪」"
translation = "「아하하하♪ 걸려들었다 걸려들었어~♪ 놀리면 즐거운 점도 좋아해♪」"

[[dialogue]]
speaker = "パテル"
original = "「だけど──」"
translation = "「하지만──」"

[[dialogue]]
speaker = "パテル"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
original = "「あなたのことちゃんと好きだから、それもわかっていてね<emoji=heart04>」"
translation = "「너를 정말 좋아하니까, 그것도 알고 있어줘<emoji=heart04>」"

