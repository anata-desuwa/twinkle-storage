[[dialogue]]
speaker = "unk"
original = "第５話,デネブのクロトとテルル,B"
translation = "제5화, 데네브의 쿠로토와 테루루, B"

[[dialogue]]
speaker = "unk"
original = "グレイス・オベロニアは、魔界の妖精の森で生を受けた。"
translation = "그레이스 오베로니아는 마계의 요정의 숲에서 태어났다."

[[dialogue]]
speaker = "unk"
original = "両親は星騎士であり、大交流の人員にも抜擢されるほどのエリート。幼いグレイスは、両親についていく形で人間界へとやってきた。"
translation = "부모님은 성기사였으며, 대교류 인원으로 발탁될 정도의 엘리트. 어린 그레이스는 부모님을 따라 인간계로 오게 되었다."

[[dialogue]]
speaker = "unk"
original = "人間と天使と魔族が共生し、多種多様な文化を形成している人間界に、グレイスはすぐ馴染んだ。"
translation = "인간과 천사와 마족이 공생하며 다종다양한 문화를 형성하고 있는 인간계에 그레이스는 금방 적응했다."

[[dialogue]]
speaker = "unk"
original = "そうして人間界に来て２年ほどが過ぎた頃──グレイスはかねてよりの疑問を両親にぶつけた。"
translation = "그렇게 인간계에 온 지 2년 정도가 지났을 무렵── 그레이스는 예전부터 품어온 의문을 부모님께 털어놓았다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あの、お父さん。お母さん。今日、友達とお話をしたんです……」"
translation = "「저기, 아빠. 엄마. 오늘 친구랑 이야기를 했는데요……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「みんな、魔王さんは悪者だって言うんです。太陽の壁画にもそう描いてあるよって……」"
translation = "「다들 마왕님은 나쁜 사람이라고 해요. 태양의 벽화에도 그렇게 그려져 있다고……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「でも森の長老さんたちは、魔王さんは悪い人じゃないって言ってました。どっちが本当なんでしょうか？」"
translation = "「하지만 숲의 장로님들은 마왕님은 나쁜 사람이 아니라고 하셨어요. 어느 쪽이 진짜인가요?」"

[[dialogue]]
speaker = "unk"
original = "妖精の森の一族は長命ゆえに、多くの情報が口伝されていた。"
translation = "요정의 숲 일족은 장수하기 때문에 많은 정보가 구전되고 있었다."

[[dialogue]]
speaker = "unk"
original = "だから幼いグレイスにとって、人間界の魔王観は違和感のあるものだったのだ。"
translation = "그래서 어린 그레이스에게 인간계의 마왕관은 위화감이 느껴지는 것이었다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……え？\u3000長老さんたちはどう言ってたか、ですか？\u3000……ええっと」"
translation = "「……에? 장로님들은 뭐라고 하셨냐고요? ……으음」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「『曇りなき<ruby>眼<rt>まなこ</rt></ruby>で、真実を見定めなさい』って言ってました！」"
translation = "「『흐림 없는 눈으로 진실을 판별하거라』라고 하셨어요!」"

[[dialogue]]
speaker = "unk"
original = "グレイスの両親は、娘に自分で考えさせる教育方針をとる人達だった。"
translation = "그레이스의 부모님은 딸에게 스스로 생각하게 하는 교육 방침을 가진 사람들이었다."

[[dialogue]]
speaker = "unk"
original = "故にグレイスは──行動を起こした。"
translation = "그리하여 그레이스는── 행동을 개시했다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「潜入作戦、開始です！」"
translation = "「잠입 작전, 개시입니다!」"

[[dialogue]]
speaker = "unk"
original = "いつも通っている学園で仮病を使って早退──その足で新星学園までやってきたグレイス。"
translation = "평소 다니던 학원에서 꾀병을 부려 조퇴── 그 길로 신성학원까지 찾아온 그레이스."

[[dialogue]]
speaker = "unk"
original = "このまま学園内に侵入し、本物の魔王に会う。そして真偽を問い質すのだ。"
translation = "이대로 학원 내에 침입해 진짜 마왕을 만난다. 그리고 진위를 따져 묻는 것이다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「こそこそ……こそこそ……！」"
translation = "「살금살금…… 살금살금……!」"

[[dialogue]]
speaker = "unk"
original = "学園内は星騎士のお姉さんたちがたくさん。見つからないようにしていたグレイスだったが──"
translation = "학원 안에는 성기사 언니들이 가득. 들키지 않으려 애쓰던 그레이스였지만──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「おいしそう……」"
translation = "「맛있겠다……」"

[[dialogue]]
speaker = "unk"
original = "昼食も食べずに潜入作戦を実行していたグレイスは、お腹がぺこぺこだった。"
translation = "점심도 먹지 않고 잠입 작전을 실행하던 그레이스는 배가 너무 고팠다."

[[dialogue]]
speaker = "unk"
original = "そのまま、食事中の１人の女生徒の元へ吸い寄せられていき……"
translation = "그대로 식사 중인 한 여학생 곁으로 이끌리듯 다가가……"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「……ん～。おいしい！\u3000午後も訓練あるし、しっかり補給しておかないとね！」"
translation = "「~음. 맛있다! 오후에도 훈련이 있으니까 든든히 보충해둬야지!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「じー……」"
translation = "「빤히──」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「──んぐっ！？\u3000あ、あれっ。こんな小さい子が……迷子？」"
translation = "「──꿀꺽!? 어, 어라. 이런 어린애가…… 미아?」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「ねえ、どうかしたの？\u3000何か困ってることがあったらお姉さんに──」"
translation = "「저기, 무슨 일이니? 뭔가 곤란한 일이 있으면 언니한테──」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「おなか……ぺこぺこです……！」"
translation = "「배가…… 고파요……!」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「ええっ……？\u3000あ、じゃあ……これ、食べる……？」"
translation = "「에엣……? 아, 그럼…… 이거 먹을래……?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「いいんですか！？\u3000嬉しいです～！」"
translation = "「그래도 되나요!? 기뻐요~!」"

[[dialogue]]
speaker = "unk"
original = "グレイスは潜入中に協力者を得た。"
translation = "그레이스는 잠입 중에 협력자를 얻었다."

[[dialogue]]
speaker = "unk"
original = "彼女の名前は、<ruby>詠野<rt>よみの</rt></ruby>マトイ。なんと新星星徒会の役員だという。"
translation = "그녀의 이름은 요미노 마토이. 무려 신성 성도회의 임원이라고 한다."

[[dialogue]]
speaker = "unk"
original = "マトイは優しかった。頭ごなしに叱ったり、怖い大人に言いつけたりしないマトイに、グレイスはあっという間に懐いた。"
translation = "마토이는 상냥했다. 무턱대고 꾸짖거나 무서운 어른에게 일러바치지 않는 마토이에게 그레이스는 순식간에 마음을 열었다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「マトイお姉さん！\u3000あのおっきな建物は何ですか！？」"
translation = "「마토이 언니! 저 커다란 건물은 뭐예요!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ああ。あれはアリーナだね。星騎士同士の大事な試合とか、運動会とか、大きな出し物をする時に使うの。あの……グレイスちゃん、そろそろ……」"
translation = "「아아. 저건 아레나야. 성기사끼리의 중요한 시합이나 운동회, 큰 행사를 할 때 사용해. 저기…… 그레이스짱, 슬슬……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「あっちの人達は！？\u3000すごく大きな武器を持っています！」"
translation = "「저쪽 사람들은요!? 엄청나게 큰 무기를 들고 있어요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれは薙刀部だよ。うちは部活動もたくさんあるから……その、いい加減、お外に……」"
translation = "「저건 치도부야. 우리 학원은 부활동도 많으니까…… 그, 이제 그만 밖으로……」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「くんくん！\u3000あっちの方からいい匂いがします！\u3000ぴゅー！」"
translation = "「킁킁! 저쪽에서 좋은 냄새가 나요! 쌩~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ああっ。待って待って、じっとして～……！！」"
translation = "「아앗. 기다려 기다려, 가만히 좀 있어줘~……!!」"

[[dialogue]]
speaker = "unk"
original = "星騎士の通う学び舎はどこもかしこも新鮮で、グレイスは気になることを見つけてはマトイに質問をして、学園中を引っ張りまわし──"
translation = "성기사들이 다니는 배움터는 어디든 신선했고, 그레이스는 궁금한 것을 발견할 때마다 마토이에게 질문하며 학원 곳곳을 끌고 다녔고──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お、お疲れ様～……」"
translation = "「수, 수고했어~……」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「お疲れ～──って！？\u3000マトイ、どうしたのっ？\u3000くたくたのボロボロじゃない！？」"
translation = "「수고했── 어라!? 마토이, 왜 그래? 녹초가 돼서 너덜너덜하잖아!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ご、ごめんテルル……この子、学園に勝手に入ってきちゃってるんだ。それで、うちの会長に会いたいって聞かなくて……」"
translation = "「미, 미안 테루루…… 이 아이, 학원에 마음대로 들어와 버렸어. 그러더니 우리 회장을 만나고 싶다고 고집을 피워서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「小さい子のお世話って大変なんだね……私、もうへとへとだよ……後はお願い……」"
translation = "「어린애 돌보는 건 정말 힘들구나…… 나 이제 기진맥진이야…… 나머지는 부탁해……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──がくっ」"
translation = "「──털썩」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「うちのマトイをここまで弱らせるだなんて……なかなかやるみたいね！\u3000名前を教えなさい！」"
translation = "「우리 마토이를 이 정도로 약하게 만들다니…… 제법인걸! 이름을 말해봐!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「こんにちは！\u3000グレイス・オベロニアです！！」"
translation = "「안녕하세요! 그레이스 오베로니아입니다!!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「元気な子ね！\u3000私は新星学園星徒会のアルティメットフィクサー……九浄テルルよ！」"
translation = "「활기찬 아이네! 나는 신성학원 성도회의 얼티밋 픽서…… 쿠죠 테루루야!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「アルティメットフィクサー……！？\u3000あ、あやしい肩書きですっ。やっぱり魔王さんの正体を確かめに来て正解でした……！」"
translation = "「얼티밋 픽서……!? 수, 수상한 직함이에요. 역시 마왕님의 정체를 확인하러 오길 잘했어요……!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「確かめに……？\u3000ふっふーん♪\u3000うちのクロトを見定めに来たってわけね？\u3000受けて立つわ！！」"
translation = "「확인하러……? 훗후흥♪ 우리 쿠로토를 판별하러 왔다는 거네? 받아주겠어!!」"

[[dialogue]]
speaker = "？？？"
original = "「ずいぶん賑やかだな……テルル、どうかしたのか？」"
translation = "「꽤나 시끌벅적하군…… 테루루, 무슨 일이야?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「──っ！」"
translation = "「──앗!」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「あっ、クロト！\u3000あなたにお客さんよ！」"
translation = "「앗, 쿠로토! 너한테 손님이야!」"

[[dialogue]]
speaker = "unk"
original = "先ほどグレイスがくぐった扉の方向から、男の人の声がした。どうやら魔王が──緋宮クロトが帰って来たらしい。"
translation = "방금 그레이스가 지나온 문 쪽에서 남자의 목소리가 들렸다. 아무래도 마왕이── 히노미야 쿠로토가 돌아온 모양이다."

[[dialogue]]
speaker = "unk"
original = "いったいどんな人なのだろう。怖い人だろうか。いい加減な人だろうか──グレイスは意を決して振り向いた。"
translation = "과연 어떤 사람일까. 무서운 사람일까, 아니면 대충대충인 사람일까── 그레이스는 결심하고 뒤를 돌아보았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ずいぶん可愛らしいお客さんだね。こんにちは」"
translation = "「아주 귀여운 손님이네. 안녕」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "第一印象は、『思っていたのと違う』だった。"
translation = "첫인상은 『생각했던 것과 다르다』였다."

[[dialogue]]
speaker = "unk"
original = "魔王というくらいだから、もっと強そうで、怖そうで、偉そうで、悪の親玉みたいな顔をしているとばかり。"
translation = "마왕이라고 하니까 훨씬 강해 보이고, 무서워 보이고, 거만하고, 악의 우두머리 같은 얼굴을 하고 있을 줄로만 알았다."

[[dialogue]]
speaker = "unk"
original = "太陽の壁画で言い伝えられている悪者とは到底思えない、優しそうなお兄さんだった。"
translation = "태양의 벽화에서 전해 내려오는 악당이라고는 도저히 생각되지 않는 상냥해 보이는 오빠였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「テルル。今日って何か用事が入ってたかな？\u3000教皇庁の、子ども会の見学とか……」"
translation = "「테루루. 오늘 무슨 예정이 있었나? 교황청의 어린이회 견학이라든가……」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「ううん。あなたに会いたくて、学園に侵入したんですって。マトイが振り回されちゃって……」"
translation = "「아니. 널 만나고 싶어서 학원에 침입했대. 마토이가 휘둘려 버려서……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「きゅぅ…………」"
translation = "「끼유우…………」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ、ホントだ。ぐったりしてる」"
translation = "「아, 진짜네. 축 처져 있어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そっか。こっそり入ってまで、俺に会いに来てくれたんだ？\u3000じゃあ、自己紹介をしないとね」"
translation = "「그렇구나. 몰래 들어오면서까지 나를 만나러 와준 거야? 그럼 자기소개를 해야겠네」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「初めまして、緋宮クロトです。君の名前は？」"
translation = "「처음 뵙겠습니다, 히노미야 쿠로토입니다. 네 이름은 뭐니?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「グレイス・オベロニアです！\u3000ようやく会えましたね、魔王さん！」"
translation = "「그레이스 오베로니아입니다! 드디어 만났네요, 마왕님!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私、曇りなき眼で、あなたを見定めに来たんです！」"
translation = "「저, 흐림 없는 눈으로 당신을 판별하러 왔어요!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「巷では魔王は悪者だって言われてますよね！？\u3000どうなんですか、緋宮クロトさん！」"
translation = "「세상에서는 마왕은 악당이라고 하잖아요!? 어떤가요, 히노미야 쿠로토 씨!」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「私、あなたが本当に悪者なのか──確かめに来ました！」"
translation = "「저, 당신이 정말로 악당인지── 확인하러 왔습니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……直球に聞いてくる子だな。それを聞くためだけに、学園に無断で入って来たのかな？」"
translation = "「하하…… 돌직구로 물어보는 아이네. 그걸 묻기 위해서만 학원에 무단으로 들어온 걸까?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「はい！\u3000潜入捜査です！\u3000それで、どうなんですか！？」"
translation = "「네! 잠입 수사입니다! 그래서, 어떤가요!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「元気な子だなあ……」"
translation = "「활기찬 아이구나……」"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトはわざわざしゃがんで、グレイスと目の高さを合わせて──そして頭をなでてくれた。"
translation = "히노미야 쿠로토는 일부러 몸을 숙여 그레이스와 눈높이를 맞추고── 그리고 머리를 쓰다듬어 주었다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「…………あ」"
translation = "「…………아」"

[[dialogue]]
speaker = "unk"
original = "温かくて、優しくて、胸が温かくなる手のひら。"
translation = "따뜻하고 상냥해서 가슴이 뭉클해지는 손바닥."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺は魔王だけど、悪者じゃないよ。君や、この世界に住むみんなを守りたいと思ってる」"
translation = "「나는 마왕이지만 악당은 아니야. 너와 이 세계에 사는 모두를 지키고 싶다고 생각하고 있어」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「魔王さんが世界を守ってくれるんですか？\u3000本当に？\u3000私のお父さんも、お母さんも、友達も……みんなですか？」"
translation = "「마왕님이 세계를 지켜주나요? 정말로요? 우리 아빠도, 엄마도, 친구도…… 전부 다요?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うん、もちろん守るよ。危ない目に遭っている人を助けるのが星騎士だからね」"
translation = "「응, 물론 지킬 거야. 위험에 처한 사람을 돕는 것이 성기사니까」"

[[dialogue]]
speaker = "unk"
original = "──多くの言葉がなくてもわかることがある。"
translation = "──많은 말이 없어도 알 수 있는 것이 있다."

[[dialogue]]
speaker = "unk"
original = "この人は嘘を吐いていない。子供が相手だからと適当な返答もしていない。"
translation = "이 사람은 거짓말을 하고 있지 않다. 아이를 상대한다고 대충 대답하고 있지도 않다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──そうだ。せっかくだし約束しようか。指きりだ」"
translation = "「──그렇지. 기왕 이렇게 된 거 약속할까? 손가락 걸기야」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……ゆびきり？」"
translation = "「……손가락 걸기?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、魔界にはないのかな？\u3000人間界には、指切りっていう風習があるんだよ」"
translation = "「아아, 마계에는 없는 건가? 인간계에는 손가락 걸기라는 풍습이 있어」"

[[dialogue]]
speaker = "unk"
original = "２年ほど人間界で過ごしてはいたが、知らない文化はまだまだある。グレイスは利き手を伸ばして、緋宮クロトを真似て小指を絡めた。"
translation = "2년 정도 인간계에서 지내긴 했지만 모르는 문화는 아직 많다. 그레이스는 주로 쓰는 손을 뻗어 히노미야 쿠로토를 흉내 내며 새끼손가락을 걸었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「約束だ。君の家族も、友達も──もちろんグレイス、君自身も。俺が必ず守ってみせるよ」"
translation = "「약속이야. 네 가족도, 친구도── 물론 그레이스, 너 자신도. 내가 반드시 지켜낼게」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「嘘ついたら針千本のーます……はい、指切った」"
translation = "「거짓말하면 바늘 천 개 먹기…… 자, 약속했다」"

[[dialogue]]
speaker = "unk"
original = "指を切ったあとも、グレイスは自分の小指を見つめた。じんわりと残る、魔王クロトの約束の温かさを、噛みしめた。"
translation = "손가락을 뗀 후에도 그레이스는 자신의 새끼손가락을 바라보았다. 은은하게 남은 마왕 쿠로토의 약속의 온기를 되새겼다."

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（ゆびきり……やくそく……）"
translation = "(손가락 걸기…… 약속……)"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（あれれ……？\u3000私、なんだか、変です……）"
translation = "(어라라……? 나, 왠지 이상해요……)"

[[dialogue]]
speaker = "unk"
original = "頬が熱い。心臓がどきどきする。"
translation = "뺨이 뜨겁다. 심장이 두근거린다."

[[dialogue]]
speaker = "unk"
original = "なんだか落ち着かないのに、決してイヤではない、不思議な感覚が胸の内に広がる──"
translation = "왠지 진정이 안 되는데 결코 싫지 않은 신비로운 감각이 가슴 속에 퍼져나간다──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そういえばテルル。体の調子は大丈夫か？」"
translation = "「그러고 보니 테루루. 몸 상태는 괜찮아?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「もう。クロトは心配しすぎ！\u3000いつもどおり、元気いっぱいよ♪」"
translation = "「정말. 쿠로토는 걱정이 너무 많아! 평소처럼 기운 팔팔하다구♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「心配しすぎってことはないだろ？\u3000俺たち２人のことなんだし」"
translation = "「걱정이 너무 많은 건 아니잖아? 우리 두 사람의 일이기도 하고」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「……うん。ありがとっ」"
translation = "「……응. 고마워」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（──あれれ？\u3000今度は、胸のチリチリが、ちょっと嫌な感じになりました……？）"
translation = "(──어라라? 이번에는 가슴의 따끔거림이 조금 싫은 느낌이 됐어요……?)"

[[dialogue]]
speaker = "unk"
original = "クロトとテルルが話しているところを見ると、何だかもやもやする。"
translation = "쿠로토와 테루루가 이야기하는 것을 보니 왠지 모르게 답답하다."

[[dialogue]]
speaker = "unk"
original = "２人の間の空気が、何かに似ている──"
translation = "두 사람 사이의 분위기가 무언가와 닮았다──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（……お父さんと、お母さん。２人の雰囲気に、そっくり）"
translation = "(……아빠랑 엄마. 두 사람의 분위기랑 똑같아)"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「でもこれで、グレイスが聞きたかったことは聞けたかしら？」"
translation = "「그래도 이걸로 그레이스가 듣고 싶었던 건 다 들었으려나?」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「えっと……その……」"
translation = "「저기…… 그게……」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「なんでも聞いてくれていいわよ！\u3000どんなことでもフィクサーが答えて──」"
translation = "「뭐든 물어봐도 좋아! 어떤 것이든 픽서가 대답해──」"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "「……お２人は、ケッコンしているんですか？」"
translation = "「……두 분은 결혼하신 건가요?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「へっ──！？」"
translation = "「헤──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ぶっ──！？」"
translation = "「푸흡──!?」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「いきなり何を言うかと思えば……！\u3000最近の子って案外マセてるのね！？」"
translation = "「갑자기 무슨 소리를 하나 했더니……! 요즘 애들은 의외로 조숙하네!?」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「あら～？\u3000何だかコイバナの雰囲気～♪」"
translation = "「어라라~? 왠지 연애 이야기 분위기~♪」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「サーシャさん！？\u3000ベ、別にコイバナなんて──」"
translation = "「사샤 씨!? 따, 딱히 연애 이야기 같은 건──」"

[[dialogue]]
speaker_original = "女子生徒"
speaker_translation = "여학생"
original = "「隠さなくてもいいのでは？\u3000今まで気づかないふりしていましたが、まあデキてるだろうなとは思ってましたので」"
translation = "「숨기지 않아도 되지 않나요? 지금까지 모르는 척했지만, 뭐 사귀고 있겠지 하고 생각했으니까요」"

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "「アナまで！？\u3000えっ……そんなにバレバレ！？」"
translation = "「아나까지!? 엣…… 그렇게 티가 났어!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もちろんよ～♪\u3000うふふ、いっそのこと今からお祝いしちゃう？\u3000可愛いお客さんもいることだし♪」"
translation = "「물론이지~♪ 우후후, 이왕 이렇게 된 거 지금부터 축하해버릴까? 귀여운 손님도 있으니까 말이야♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いいですね。会長のおごりで、レッツパーティー」"
translation = "「좋네요. 회장님이 쏘는 걸로 레츠 파티」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えええっ！？\u3000なんでだ！？」"
translation = "「에에엣!? 왜 그렇게 되는 건데!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──待って！\u3000私もお祝いしたい！！」"
translation = "「──잠깐! 나도 축하하고 싶어!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うわっ復活した！？」"
translation = "「우와 부활했다!?」"

[[dialogue]]
speaker = "unk"
original = "楽しく、賑やかな新星星徒会。"
translation = "즐겁고 시끌벅적한 신성 성도회."

[[dialogue]]
speaker = "unk"
original = "彼らと話をしたのはその１日だけだったが、グレイスにとっては忘れがたい、とても大切な日になった。"
translation = "그들과 이야기를 나눈 것은 단 하루뿐이었지만 그레이스에게는 잊을 수 없는 아주 소중한 날이 되었다."

[[dialogue]]
speaker = "unk"
original = "その後、両手いっぱいのお菓子をお土産に持たされて、ほくほく顔で帰宅したグレイスは、こんこんと両親にお説教をされるハメになったのだが……"
translation = "그 후 양손 가득 과자를 선물로 들고 싱글벙글하며 귀가한 그레이스는 부모님께 한참 동안 설교를 들어야 했지만……"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（あとから思えば、私はあの日。初恋と失恋を同時にしたのだと思います）"
translation = "(나중에 생각해보면 나는 그날, 첫사랑과 실연을 동시에 했던 것 같습니다)"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（それでもよかった。それだけなら、苦いけれど淡い思い出ですんだのに）"
translation = "(그래도 좋았어. 그것뿐이라면 쓰라리지만 아련한 추억으로 남았을 텐데)"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（あの出会いから数ヶ月後、ニュクス流星群が起きて……私の両親も、新星星徒会のみなさんも、全員が亡くなって……）"
translation = "(그 만남으로부터 몇 달 후, 닉스 유성우가 일어나고…… 제 부모님도, 신성 성도회 여러분도 모두 돌아가시고……)"

[[dialogue]]
speaker = "unk"
original = "そして、緋宮クロトはデネブを見捨てた卑怯者だと教えられた。"
translation = "그리고 히노미야 쿠로토는 데네브를 저버린 비겁자라고 배웠다."

[[dialogue]]
speaker = "unk"
original = "我が身可愛さにすべてを見捨てた恥知らず。外道。人でなし。皆が口をそろえて緋宮クロトを糾弾するたび、グレイスは違うと言い続けた。"
translation = "제 몸 아까워 모든 것을 버린 파렴치한. 외도. 인간 말종. 모두가 입을 모아 히노미야 쿠로토를 규탄할 때마다 그레이스는 아니라고 계속 말했다."

[[dialogue]]
speaker = "unk"
original = "けれどその意地も、両親の亡骸を見つけた時に、張れなくなり──"
translation = "하지만 그 고집도 부모님의 유해를 발견했을 때 더는 부릴 수 없게 되었고──"

[[dialogue]]
speaker_original = "グレイス"
speaker_translation = "그레이스"
original = "（初恋の人に幻滅するだなんていう、もっと嫌な経験もして……これはクロトさんにもヴィーナスさんにも教えられない。私だけの秘密です）"
translation = "(첫사랑에게 환멸을 느끼다니 하는 더 싫은 경험도 하고…… 이건 쿠로토 씨에게도 비너스 씨에게도 가르쳐줄 수 없어요. 저만의 비밀입니다)"

