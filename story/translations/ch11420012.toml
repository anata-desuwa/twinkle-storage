[[dialogue]]
speaker = "unk"
original = "第２話,ステラの悩み,P"
translation = "제2화, 스텔라의 고민, P"

[[dialogue]]
speaker = "unk"
original = "赤ちゃんクマロボの引き起こした事件が解決してから、数日が過ぎた。"
translation = "아기 곰 로봇이 일으킨 사건이 해결되고 며칠이 지났다."

[[dialogue]]
speaker = "unk"
original = "ステラとラファエロは事件後からしばらく、俺たちの世界で過ごすことになったのだが──"
translation = "스텔라와 라파엘로는 사건 이후 한동안 우리 세계에서 지내게 되었는데──"

[[dialogue]]
speaker = "ステラ"
original = "「うう……困りました。どうすればいいんでしょう……」"
translation = "「우우…… 곤란해요. 어떻게 하면 좋을까요……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「おや、頭を抱えているようだけど、何かあったのかい？」"
translation = "「어라, 머리를 감싸 쥐고 있는데 무슨 일이라도 있었니?」"

[[dialogue]]
speaker = "ルリエル"
original = "「悩み事があるなら、何でもルリエルに相談してください♪」"
translation = "「고민거리가 있다면 뭐든 루리엘에게 상담해 주세요♪」"

[[dialogue]]
speaker = "ステラ"
original = "「ありがとうございます、実は深刻な問題が発生してしまいまして……」"
translation = "「감사합니다, 사실 심각한 문제가 발생해 버려서요……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「深刻な問題？」"
translation = "「심각한 문제?」"

[[dialogue]]
speaker = "ステラ"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker = "ステラ"
original = "「赤ちゃんクマロボさんの事件が他の世界でも完全に収束するまで、ボクたちは引き続きこの世界で過ごすことになったじゃないですか」"
translation = "「아기 곰 로봇 씨의 사건이 다른 세계에서도 완전히 수습될 때까지, 저희들은 계속해서 이 세계에서 지내기로 했잖아요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ああ、そうだね」"
translation = "「아아, 그렇지」"

[[dialogue]]
speaker = "ステラ"
original = "「ボクはそのまま、この星徒会室を間借りさせてもらっているんですけど……困ったことが起きた、いえ起きてるんです！」"
translation = "「저는 그대로 이 성도회실을 빌려 쓰고 있는데…… 곤란한 일이 일어난, 아니 일어나고 있어요!」"

[[dialogue]]
speaker = "unk"
original = "困った事って？"
translation = "곤란한 일이라니?"

[[dialogue]]
speaker = "ステラ"
original = "「こちらの世界に来てしばらくの間、この部屋はあまり人が訪ねて来ませんでした……」"
translation = "「이쪽 세계에 오고 나서 한동안 이 방에는 사람이 별로 찾아오지 않았어요……」"

[[dialogue]]
speaker = "ステラ"
original = "「けれど最近になって、徐々に増えて来たんです……来客の方が！」"
translation = "「하지만 최근 들어 서서히 늘어나기 시작했어요…… 방문객분들이!」"

[[dialogue]]
speaker = "unk"
original = "あまり仕事が無かったから"
translation = "별로 업무가 없었으니까"

[[dialogue]]
speaker = "unk"
original = "偶然あの時期は"
translation = "우연히 그 시기에는"

[[dialogue]]
speaker = "unk"
original = "星徒会メンバーが諸々の事情で学園を休んでおり、この星徒会室に来ていたのが俺だけだった。"
translation = "성도회 멤버들이 여러 사정으로 학원을 쉬고 있어서, 이 성도회실에 오던 게 나뿐이었다."

[[dialogue]]
speaker = "unk"
original = "さらに、欠席を見越したみんなが前倒しで仕事を片付けてくれていた。"
translation = "게다가 결석을 예상한 모두가 미리 업무를 처리해 두었었다."

[[dialogue]]
speaker = "unk"
original = "その影響で赤ちゃんクマロボの事件が起きた時期は星徒会の仕事が少なく、星徒会室を訪ねてくる人も減っていたのだ。"
translation = "그 영향으로 아기 곰 로봇 사건이 일어난 시기에는 성도회의 업무가 적어, 성도회실을 찾는 사람도 줄어들었던 것이다."

[[dialogue]]
speaker = "ステラ"
original = "「どこか安住の地を探したいのですが……なかなか良い場所が見つからなくて」"
translation = "「어딘가 안주할 땅을 찾고 싶지만…… 좀처럼 좋은 장소가 보이지 않아서요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「流星寮に貸してもらっている、自分の部屋ではダメなのかい？」"
translation = "「유성 기숙사에서 빌려준 네 방으로는 안 되는 거니?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「確かに多くの寮生が暮らしているけれど、自分の部屋に引きこもっている分には誰とも顔を合わせずに済むじゃないか」"
translation = "「확실히 많은 기숙사생이 살고 있지만, 자기 방에 틀어박혀 있는 동안에는 누구와도 마주치지 않아도 되잖니」"

[[dialogue]]
speaker = "ステラ"
original = "「そ、それはそうなんですけど……」"
translation = "「그, 그건 그렇지만……」"

[[dialogue]]
speaker = "ステラ"
original = "「流星寮には門限がありますよね？\u3000夜の外出が難しいじゃないですか。ボクは夜中に食料を調達しに行くから、それはちょっと困るんです」"
translation = "「유성 기숙사에는 통금 시간이 있죠? 밤에 외출하기가 어렵잖아요. 저는 한밤중에 식량을 조달하러 가니까 그건 좀 곤란해요」"

[[dialogue]]
speaker = "ステラ"
original = "「それに流星寮に住んじゃうと、星徒会室まで来るのが大変ですし……」"
translation = "「게다가 유성 기숙사에 살면 성도회실까지 오는 게 힘들기도 하고……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ん？\u3000ですが赤ちゃんクマロボさんの事件も解決したので、星徒会室に来る用事もなくなったんじゃないでしょうか？」"
translation = "「응? 하지만 아기 곰 로봇 씨의 사건도 해결되었으니, 성도회실에 올 용무도 없어진 게 아닐까요?」"

[[dialogue]]
speaker = "ステラ"
original = "「そ、それは……そうなんですけど……」"
translation = "「그, 그건…… 그렇지만……」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふふっ。なるほど、なるほど」"
translation = "「후훗. 과연, 과연」"

[[dialogue]]
speaker = "ラファエロ"
original = "「引きこもり生活はしたいけれど、星徒会室に来ないとぼくたちに会えないから寂しい、といったところかな？」"
translation = "「히키코모리 생활은 하고 싶지만, 성도회실에 오지 않으면 저희를 만날 수 없어서 외롭다, 뭐 그런 걸까?」"

[[dialogue]]
speaker = "ステラ"
original = "「あうぅ……！」"
translation = "「아우으……!」"

[[dialogue]]
speaker = "unk"
original = "ステラがそんな風に思ってくれているのは、俺としても嬉しいことだった。"
translation = "스텔라가 그렇게 생각해 주고 있다는 건 나로서도 기쁜 일이었다."

[[dialogue]]
speaker = "ラファエロ"
original = "「ぼくに会えないのが寂しい、というだけなら、いつでもきみの部屋へ遊びに行ってあげるのだけどね」"
translation = "「나를 만나지 못하는 게 외로운 거라면, 언제든 네 방으로 놀러 가 줄 텐데 말이야」"

[[dialogue]]
speaker = "ルリエル"
original = "「ルリエルも寮生なので大丈夫ですが……会長さんはそういうわけにはいきませんね～」"
translation = "「루리엘도 기숙사생이라 괜찮지만…… 회장님은 그렇게는 안 되겠네요~」"

[[dialogue]]
speaker = "unk"
original = "無理じゃないとは思うけど"
translation = "무리라고는 생각하지 않지만"

[[dialogue]]
speaker = "unk"
original = "頼み込めばなんとか……"
translation = "부탁해 보면 어떻게든……"

[[dialogue]]
speaker = "unk"
original = "あまり外聞のよい行動ではないことは確かだが……。"
translation = "그다지 체면이 서는 행동이 아니라는 건 확실하지만……."

[[dialogue]]
speaker = "ステラ"
original = "「うーん、でも……そうですね……」"
translation = "「으음, 하지만…… 그렇네요……」"

[[dialogue]]
speaker = "ステラ"
original = "「ここに住まわせてもらっていたのはボクの我がままですから……」"
translation = "「여기에 머물게 해달라고 한 건 저의 고집이었으니까요……」"

[[dialogue]]
speaker = "ステラ"
original = "「会長さんたちにもご迷惑かけてることですし、今日から流星寮のお部屋の方で生活しようと思います」"
translation = "「회장님들께도 폐를 끼치고 있는 거고, 오늘부터 유성 기숙사의 방에서 생활하려고 해요」"

[[dialogue]]
speaker = "unk"
original = "ステラ的にはそれでいいの？"
translation = "스텔라로서는 그걸로 괜찮아?"

[[dialogue]]
speaker = "ステラ"
original = "「はい、大変お世話になりましたっ」"
translation = "「네, 그동안 신세 많이 졌습니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「ん～～～」"
translation = "「으음~~~」"

[[dialogue]]
speaker = "unk"
original = "どうしたんだ、ルリエル？"
translation = "왜 그래, 루리엘?"

[[dialogue]]
speaker = "unk"
original = "ん……？"
translation = "음……?"

[[dialogue]]
speaker = "ルリエル"
original = "「はっ！\u3000そうです、これしかありません！」"
translation = "「핫! 맞아요, 이것밖에 없어요!」"

[[dialogue]]
speaker = "ステラ"
original = "「えっ？\u3000ど、どうしたんですか……？」"
translation = "「엣? 무, 무슨 일인가요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ステラさん的には星徒会室にやってくる人の視線が気になる、ということなんですよね？」"
translation = "「스텔라 씨 입장에서는 성도회실에 찾아오는 사람들의 시선이 신경 쓰인다는 거죠?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でしたらルリエルにお任せください！\u3000妙案を思いつきました♪」"
translation = "「그렇다면 루리엘에게 맡겨주세요! 묘안이 떠올랐답니다♪」"

[[dialogue]]
speaker = "ステラ"
original = "「ほ、本当ですか？」"
translation = "「정, 정말인가요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふふふ、楽しみにしていてくださいね♪」"
translation = "「후후후, 기대하고 계세요♪」"

[[dialogue]]
speaker = "ラファエロ"
original = "「会長……彼女、何やらよからぬことを考えているみたいだけど大丈夫かい？」"
translation = "「회장…… 그녀, 뭔가 좋지 않은 일을 생각하고 있는 것 같은데 괜찮을까?」"

[[dialogue]]
speaker = "unk"
original = "ど、どうだろう……"
translation = "어, 어떠려나……"

[[dialogue]]
speaker = "unk"
original = "ルリエルの計画──それは程なく現実のものとなる。"
translation = "루리엘의 계획── 그것은 머지않아 현실이 된다."

[[dialogue]]
speaker = "unk"
original = "新星星徒会室に設置された謎のテントの噂は、あっという間に学園内に広がった。"
translation = "신성 성도회실에 설치된 수수께끼의 텐트 소문은 순식간에 학원 내로 퍼졌다."

[[dialogue]]
speaker = "unk"
original = "かえって注目を浴びることになってしまうような気もするのだが、当のステラはこのテントを非常に喜んでいるようである。"
translation = "오히려 주목을 받게 되어버린 듯한 기분도 들지만, 당사자인 스텔라는 이 텐트를 매우 기뻐하는 모양이다."

[[dialogue]]
speaker = "unk"
original = "……まあ、確かに他人の視線を遮るには十分な設備だし、本人が満足しているならよかった……のかな？"
translation = "……뭐, 확실히 타인의 시선을 차단하기엔 충분한 설비고, 본인이 만족한다면 다행인…… 걸까?"

