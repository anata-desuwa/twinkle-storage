[[dialogue]]
speaker = "unk"
original = "第１話,ライバル２号じゃありませんわ！,P"
translation = "제1화, 라이벌 2호가 아닙니다!"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。俺は流星附属の星騎士であるアムから呼び出しを受けた。"
translation = "어느 날 방과 후. 나는 유성 부속의 성기사인 아무에게서 호출을 받았다."

[[dialogue]]
speaker = "unk"
original = "何でも、俺に紹介したい人がいるとの話だったのだが──"
translation = "뭐든지, 나에게 소개하고 싶은 사람이 있다는 이야기였는데──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「さぁ会長、ご照覧あれ！\u3000この子が会長よりも早く、あたしのライバルになった子だよ！\u3000名付けてライバル２号！」"
translation = "「자 회장, 보시라! 이 아이가 회장보다 먼저, 내 라이벌이 된 아이야! 이름하여 라이벌 2호!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「いきなりご挨拶ですわね！？\u3000もう少しまともな紹介はありませんの、アム！」"
translation = "「갑자기 인사부터 이렇습니까!? 좀 더 제대로 된 소개는 없습니까, 아무!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……こほん。騒がせてしまってすみません、会長様。私の名は桜十路エルデリーゼ。アムのクラスメイトですわ」"
translation = "「……커흠. 소란을 피워 죄송합니다, 회장님. 제 이름은 사쿠라코지 엘데리제. 아무의 반 친구입니다.」"

[[dialogue]]
speaker = "unk"
original = "桜十路……ってことは？"
translation = "사쿠라코지……라는 건?"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「はい、流星市国の五名門の１つです。私の家は分家筋のひとつで、本家のサランお姉様とは親戚に当たります」"
translation = "「네, 유성 시국의 오명문 중 하나입니다. 저희 집은 분가 중 하나이며, 본가의 사란 언니와는 친척에 해당합니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「学園の中では先輩と後輩の間柄ですので、どうかお気兼ねなく、エルゼとお呼びください。気の置けないお付き合いをいただけますと嬉しいですわ」"
translation = "「학원 안에서는 선배와 후배 사이이므로, 부디 거리낌 없이, 엘제라고 불러주십시오. 허물없는 사이로 지내주시면 기쁘겠습니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「お堅いな～、エルゼは。会長は五名門だとかお嬢様だとか、そんなの気にしないって。ねー？」"
translation = "「딱딱하네ー, 엘제는. 회장은 오명문이라든가 아가씨라든가, 그런 거 신경 안 쓴대. 안 그래ー?」"

[[dialogue]]
speaker = "unk"
original = "ああ。これからよろしく"
translation = "아아. 앞으로 잘 부탁해"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……ふふ。ありがとうございます。こちらこそよろしくお願いいたしますわ」"
translation = "「……후후. 감사합니다. 저야말로 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「以前から新星学園の会長様とは、お話したいと思っていましたの。御前試合の記録も拝見いたしました。あれは大層見事な──」"
translation = "「이전부터 신성 학원의 회장님과는, 이야기하고 싶다고 생각했습니다. 어전 시합의 기록도 보았습니다. 그것은 대단히 훌륭한──」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ね～、お腹空かない？\u3000せっかくカフェにいるんだし何か頼もうよ～。エルゼは何にする？」"
translation = "「배 안 고파ー? 모처럼 카페에 있으니 뭐 좀 시키자. 엘제는 뭐 할 거야?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アム、とりあえず飲み物は頼んでいるのですから、まずは歓談を楽しむべきでは……」"
translation = "「아무, 일단 마실 것은 시켰으니, 우선은 환담을 즐겨야 하는 것 아닙니까……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたし、けっこーお腹減ってるんだよねー。どうしよっかな。ケーキいっちゃおっかな～。会長は何にする？」"
translation = "「나, 꽤 배고픈데ー. 어쩌지. 케이크 먹어버릴까ー. 회장은 뭐 할 거야?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……はぁあ。あの、会長様。今さらですがアムがご迷惑をおかけしてはいませんか？」"
translation = "「……하아. 저, 회장님. 새삼스럽지만 아무가 폐를 끼치고 있지는 않습니까?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「もー。そうやって細かいことを気にするの、エルゼの悪い癖だよー？\u3000お、何これ。焼きたてのミートパイ丸ごと１個だって！」"
translation = "「모ー. 그렇게 사소한 걸 신경 쓰는 거, 엘제의 나쁜 버릇이야ー? 오, 뭐야 이거. 갓 구운 미트 파이 통째로 1개래!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「これシェアしよっか。すみませーん、注文しまーす！」"
translation = "「이거 같이 먹을까. 죄송합니다ー, 주문할게요ー!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ちょっとアム、会長様の好みも聞いてからにした方が……あぁもう。すみません……」"
translation = "「잠깐 아무, 회장님의 취향도 물어보고 나서 하는 게…… 아아 정말. 죄송합니다……」"

[[dialogue]]
speaker = "unk"
original = "気にしないでいいよ"
translation = "신경 쓰지 않아도 돼"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ありがとうございます。それじゃあ、注文が来るまでの間、色々とお話を聞かせていただけますか？」"
translation = "「감사합니다. 그럼, 주문한 것이 올 때까지, 여러 가지 이야기를 들려주시겠습니까?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様の人となりやご趣味など。新星学園に来るまではアルバイトもたくさんされていたと、アムから聞いています」"
translation = "「회장님의 인품이나 취미 등. 신성 학원에 오기 전까지 아르바이트도 많이 하셨다고, 아무에게 들었습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私、お恥ずかしながら流星附属に入学するまで屋敷にこもっていたので、物を知らないことが多いのです」"
translation = "「저는, 부끄럽지만 유성 부속에 입학할 때까지 저택에 틀어박혀 있었기 때문에, 세상 물정을 모르는 것이 많습니다.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「箱入りのお嬢様ってやつだからね。エルゼは世間知らずだからさ、てきとーな話でも大げさに喜んでくれるよ～」"
translation = "「온실 속의 아가씨라는 거지. 엘제는 세상 물정 모르니까, 대충 하는 이야기라도 과장해서 기뻐해 줄 거야ー.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そ、そこまで単純な性格ではありませんわ！」"
translation = "「그, 그렇게까지 단순한 성격은 아닙니다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「またまた。ＤＩＳＣ使ったのだってついこの間のことじゃん。通知来るたびに機械音痴のおばあちゃんみたいな反応してて面白かったよん」"
translation = "「또 또. 디스크 쓴 것도 바로 얼마 전이잖아. 알림 올 때마다 기계치 할머니 같은 반응을 해서 재미있었다구.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「たたた、大変ですアム！\u3000知らない人からメッセージが来ましたわ！\u3000宛先が間違っているとお伝えした方がよろしいですわよね……！？」"
translation = "「크크크, 큰일입니다 아무! 모르는 사람에게서 메시지가 왔습니다! 수신처가 잘못되었다고 전하는 편이 좋겠지요……!?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「やめてください！\u3000会長様とは初対面なんですよ、その話はいけません！\u3000そ──それに今は、今どきの附属生らしく使えています！」"
translation = "「그만두세요! 회장님과는 첫 대면입니다, 그 이야기는 안 됩니다! 그──게다가 지금은, 요즘 부속생답게 사용하고 있습니다!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「今どき、ってわざわざ付けるのがもうおばあちゃんだよね～」"
translation = "「요즘, 이라고 굳이 붙이는 게 이미 할머니 같네ー.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アムー！」"
translation = "「아무ー!」"

[[dialogue]]
speaker = "unk"
original = "五名門のお嬢様とは聞いていたが、エルゼに気取ったところはなかった。世間知らずな所もチャームポイントだし、何より話していて面白い。"
translation = "오명문의 아가씨라고는 들었지만, 엘제에게는 거만한 구석이 없었다. 세상 물정 모르는 점도 매력 포인트이고, 무엇보다 이야기하는 것이 재미있다."

[[dialogue]]
speaker = "unk"
original = "賑やかなお茶会はその後も滞りなく進んだが、運ばれてきたミートパイを食べ終えた頃──事件は起こった。"
translation = "시끌벅적한 다과는 그 후로도 순조롭게 진행되었지만, 배달된 미트 파이를 다 먹었을 무렵── 사건은 일어났다."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「とても美味しかったですわね、ミートパイ」"
translation = "「정말 맛있었습니다, 미트 파이.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「でもちょっと量が少なかったですわね。せっかくの楽しい歓談の場です。おかわり、いたしましょうか！」"
translation = "「하지만 조금 양이 적었습니다. 모처럼 즐거운 환담의 자리입니다. 더 시킬까요!」"

[[dialogue]]
speaker = "unk"
original = "……え！？"
translation = "……엣!?"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「やはり３人で食べると一人当たりの取り分が減ってしまいますからね。お茶請けはしっかり用意いたしませんと」"
translation = "「역시 셋이서 먹으면 1인당 몫이 줄어드니까요. 다과는 제대로 준비해야 합니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様も殿方ですもの。食べ足りなかったのではありませんか？\u3000私が五名門だからと、ご遠慮なさらなくてもよろしいのですよ」"
translation = "「회장님도 남자분이시지 않습니까. 부족하지는 않으셨습니까? 제가 오명문이라고 해서, 사양하지 않으셔도 괜찮습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「アムも食べますわよね。お腹が空いた～、が口癖ですし」"
translation = "「아무도 먹을 거지요. 배고프다ー, 가 입버릇이니까요.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いや、あたしは結構満腹っていうか……」"
translation = "「아니, 나는 꽤 배부르다고 할까……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「すみません、店員様。注文をお願いいたしますわ。先ほどのミートパイを──」"
translation = "「죄송합니다, 점원님. 주문을 부탁드립니다. 방금 그 미트 파이를──」"

[[dialogue]]
speaker = "unk"
original = "……エルゼはいつもこうなの？"
translation = "……엘제는 항상 이래?"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん。見た目に反して超大食い。そのくせ自分が大食いだってことに気づいてないタイプ」"
translation = "「응. 겉보기와 달리 엄청난 대식가. 그러면서도 자신이 대식가라는 걸 눈치채지 못하는 타입.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「周りのみんなは遠慮してるって本気で信じてるから厄介なんだよね。そっか、あの大きなミートパイでも満足できなかったかぁ……」"
translation = "「주변 모두가 사양하고 있다고 진심으로 믿고 있으니 곤란하다니까. 그렇구나, 그 큰 미트 파이로도 만족하지 못했구나……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「先ほどのミートパイを……そうですね、二回りほど大きく焼いていただけますか？\u3000よろしくお願いいたします♪」"
translation = "「방금 그 미트 파이를…… 그렇군요, 두 배 정도 크게 구워주시겠습니까? 잘 부탁드립니다♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……マジで？」"
translation = "「……진심이야?」"

[[dialogue]]
speaker = "unk"
original = "──その後、俺とアムがダウンした中、エルゼはにこにこと実に優雅にミートパイを完食した。"
translation = "──그 후, 나와 아무가 다운된 가운데, 엘제는 생글생글 실로 우아하게 미트 파이를 전부 먹어치웠다."

[[dialogue]]
speaker = "unk"
original = "人は見た目に寄らない、という言葉を改めて実感した１日なのだった……"
translation = "사람은 겉모습만으로 판단할 수 없다는 말을 새삼 실감한 하루였다……"

