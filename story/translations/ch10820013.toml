[[dialogue]]
speaker = "unk"
original = "第３話,２人の距離感,P"
translation = "제3화, 두 사람의 거리감, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。"
translation = "어느 휴일."

[[dialogue]]
speaker = "フェリシー"
original = "「お邪魔しま～す。ここが会長くんの家か～」"
translation = "「실례하겠습니다~ 여기가 회장군 집이구나~」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんと２人で遊ぶのは初めてだから、今日はすごく楽しみにしてたんだ～。えへへ♪」"
translation = "「회장군이랑 둘이서 노는 건 처음이라 오늘 정말 기대하고 있었어~ 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "フェリシーがどうして、俺の家に遊びに来ているのかというと――"
translation = "펠리시가 어째서 내 집에 놀러 와 있는가 하면――"

[[dialogue]]
speaker = "unk"
original = "きっかけは、一緒にトレーニングしていた時の雑談だった。"
translation = "계기는 같이 트레이닝하고 있을 때의 잡담이었다."

[[dialogue]]
speaker = "フェリシー"
original = "「へぇ～、会長くんもホラー映画を観たりするんだね！」"
translation = "「헤에~ 회장군도 공포 영화 같은 걸 보는구나!」"

[[dialogue]]
speaker = "フェリシー"
original = "「私、オカルト好きだから、ホラー映画も結構観るんだよね」"
translation = "「나 오컬트 좋아해서 공포 영화도 꽤 보거든」"

[[dialogue]]
speaker = "フェリシー"
original = "「怖いんだけど、好奇心がくすぐられるっていうのかな？\u3000あくまで作り物ではあるんだけど、だからこそ純粋にワクワクできるっていうかね」"
translation = "「무섭긴 한데 호기심이 자극된다고 해야 하나? 어디까지나 꾸며낸 이야기지만 그래서 순수하게 설렐 수 있달까」"

[[dialogue]]
speaker = "フェリシー"
original = "「実際のオカルト絡みの異変を目の前にすると、好奇心で首を突っ込みすぎると、命に関わることもあるからさ」"
translation = "「실제 오컬트와 얽힌 이변을 눈앞에 두면 호기심에 너무 깊게 관여했다간 목숨이 위험할 수도 있으니까」"

[[dialogue]]
speaker = "フェリシー"
original = "「ほら、日本のことわざで『触らぬ神に祟りなし』ってあるじゃない？\u3000ホラー映画だと、そこで実際に触ったらどうなるかというのを疑似体験できるのが、面白いんだよね～」"
translation = "「봐, 일본 속담에 『긁어 부스럼』이라는 말도 있잖아? 공포 영화는 거기서 실제로 건드리면 어떻게 되는지 의사 체험할 수 있는 게 재밌단 말이지~」"

[[dialogue]]
speaker = "フェリシー"
original = "「そうだ！\u3000今度、一緒に鑑賞会とかしちゃう？」"
translation = "「맞다! 이번에 같이 감상회 같은 거 할래?」"

[[dialogue]]
speaker = "フェリシー"
original = "「流星寮の私の部屋でもいいんだけど……会長くんはどこに住んでるの？」"
translation = "「유성 기숙사에 있는 내 방도 괜찮은데…… 회장군은 어디 살아?」"

[[dialogue]]
speaker = "フェリシー"
original = "「なるほど、お母さんとマンション住まいなんだ。じゃあ、遊びに行ってもいい？」"
translation = "「그렇구나, 어머니랑 맨션에서 살고 있구나. 그럼 놀러 가도 돼?」"

[[dialogue]]
speaker = "フェリシー"
original = "「やった♪\u3000じゃあ、今週末とかどうかな？」"
translation = "「앗싸♪ 그럼 이번 주말 같은 땐 어때?」"

[[dialogue]]
speaker = "フェリシー"
original = "「――会長くんのお母さんは今日は出かけてるんだっけ？\u3000そっか、会ってみたかったな～、残念。それはまた、次の機会だね」"
translation = "「――회장군 어머니는 오늘 외출하신 거야? 그렇구나, 한번 뵙고 싶었는데 아쉽네. 그건 또 다음 기회에」"

[[dialogue]]
speaker = "フェリシー"
original = "「というわけで、じゃ～ん！\u3000オススメのホラー映画を持ってきたよ！」"
translation = "「그런 의미에서 짠! 추천하는 공포 영화 가져왔어!」"

[[dialogue]]
speaker = "フェリシー"
original = "「これ、本物のエクソシストがシナリオ担当なんじゃないかってくらい、リアリティのあるやつで面白いんだ～」"
translation = "「이거 진짜 엑소시스트가 시나리오 담당한 게 아닐까 싶을 정도로 리얼리티가 있어서 재밌어~」"

[[dialogue]]
speaker = "unk"
original = "そうして、ホラー映画の鑑賞会がスタートしたのだが――"
translation = "그렇게 공포 영화 감상회가 시작되었으나――"

[[dialogue]]
speaker = "フェリシー"
original = "「わあぁっ！\u3000このシーンとか、何度観てもビックリしちゃう……！」"
translation = "「와아앗! 이 장면 같은 건 몇 번을 봐도 깜짝 놀라게 돼……!」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、ごめん！\u3000私、驚くとつい、近くの人に抱き着いちゃう癖があって……」"
translation = "「앗, 미안! 나 놀라면 나도 모르게 근처 사람한테 매달리는 버릇이 있어서……」"

[[dialogue]]
speaker = "unk"
original = "（相変わらず距離感が近い……）"
translation = "(여전히 거리감이 가까워……)"

[[dialogue]]
speaker = "unk"
original = "ホラー映画とは無関係に、内心ドキドキしてしまう。"
translation = "공포 영화와는 상관없이 내심 두근거리고 만다."

[[dialogue]]
speaker = "フェリシー"
original = "「うわっ、出たぁ！」"
translation = "「우와, 나왔다!」"

[[dialogue]]
speaker = "フェリシー"
original = "「や、やっぱり反射的に体が動いて、誰かに触れたくなっちゃう……」"
translation = "「역시 반사적으로 몸이 움직여서 누군가를 만지고 싶어져……」"

[[dialogue]]
speaker = "フェリシー"
original = "「ごめん、会長くん……このまま腕とか貸してもらってもいい？」"
translation = "「미안 회장군…… 이대로 팔이라도 좀 빌려도 될까?」"

[[dialogue]]
speaker = "フェリシー"
original = "「――えへへ、グラッチェ♪」"
translation = "「――에헤헤, 그라체♪」"

[[dialogue]]
speaker = "フェリシー"
original = "「ふぅ～……久しぶりに見たけど、ドキドキしたぁ……」"
translation = "「후우~…… 오랜만에 봤는데 두근두근했어……」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんはどうだった？\u3000面白かった？」"
translation = "「회장군은 어땠어? 재밌었어?」"

[[dialogue]]
speaker = "フェリシー"
original = "「――うんうん！\u3000実は主人公が悪霊に取り憑かれてて、自覚がないっていうのは、怖くてよくできてたよね～」"
translation = "「――응응! 사실 주인공이 악령에 씌어 있었는데 자각이 없었다는 건 무섭고도 잘 만들었더라~」"

[[dialogue]]
speaker = "フェリシー"
original = "「――休憩に飲み物を用意してくれるの？\u3000グラッチェ♪\u3000って、あっ……！」"
translation = "「――휴식용으로 마실 거 준비해 주는 거야? 그라체♪ 어, 앗……!」"

[[dialogue]]
speaker = "フェリシー"
original = "「ごめん！\u3000もう観終わったのに、会長くんの手をずっと握ったままになっちゃってたね。安心感があったから、つい……」"
translation = "「미안! 다 봤는데도 회장군 손을 계속 잡고 있었네. 안심이 돼서 그만……」"

[[dialogue]]
speaker = "フェリシー"
original = "「というか私、会長くんが許してくれるからって、距離感近すぎて結構やらかしちゃってるよね。この前もジュエリーに指摘されたし」"
translation = "「그보다 나 회장군이 허락해 준다고 거리감이 너무 가까워서 꽤 실수를 많이 하네. 저번에도 주얼리가 지적했고」"

[[dialogue]]
speaker = "フェリシー"
original = "「私……昔から心配性で、人に触れてると安心できるみたいなところがあって」"
translation = "「나…… 옛날부터 걱정이 많아서 사람한테 닿아 있으면 안심이 되는 그런 면이 있어서」"

[[dialogue]]
speaker = "フェリシー"
original = "「悪気はないんだ……でも、私のせいで会長くんに変な気を遣わせちゃってたら、ごめんね？」"
translation = "「나쁜 의도는 없었어…… 하지만 나 때문에 회장군이 이상하게 신경 쓰게 했다면 미안해?」"

[[dialogue]]
speaker = "unk"
original = "正直ドキドキすることもあるけど、大丈夫だ"
translation = "솔직히 두근거릴 때도 있지만 괜찮아"

[[dialogue]]
speaker = "フェリシー"
original = "「ど、ドキドキしちゃうんだ……。そうだよね、会長くんだって男の子だもんね……」"
translation = "「두, 두근거려 버리는구나……. 그렇네 회장군도 남자애인걸……」"

[[dialogue]]
speaker = "フェリシー"
original = "「というか、今更気づいたけど、私……男の子の家に遊びに来るのって、初めてかも……」"
translation = "「그보다 이제야 깨달았는데 나…… 남자애 집에 놀러 온 거 처음일지도……」"

[[dialogue]]
speaker = "フェリシー"
original = "「な、なんかそう思ったら、ちょっと緊張してきちゃった……」"
translation = "「왠지 그렇게 생각하니까 좀 긴장되기 시작했어……」"

[[dialogue]]
speaker = "unk"
original = "今まで、男友達はいなかったの？"
translation = "지금까지 남사친은 없었어?"

[[dialogue]]
speaker = "フェリシー"
original = "「いなかったわけじゃないけど……でも、こうやって２人で遊ぶのは初めてだから――」"
translation = "「없었던 건 아니지만…… 그래도 이렇게 둘이서 노는 건 처음이라――」"

[[dialogue]]
speaker = "フェリシー"
original = "「私にとって、会長くんが今までで１番親しい男友達、ってことになるのかな？」"
translation = "「나한테 있어서 회장군이 지금까지 중에서 가장 친한 남사친이 되는 걸까?」"

[[dialogue]]
speaker = "フェリシー"
original = "「なんてね……えへへ」"
translation = "「농담이야…… 에헤헤」"

[[dialogue]]
speaker = "unk"
original = "今度、一緒にどこか遊びに行こうか"
translation = "다음에 같이 어디 놀러 갈까"

[[dialogue]]
speaker = "フェリシー"
original = "「え？\u3000それって……私たち２人で？」"
translation = "「에? 그건…… 우리 둘이서?」"

[[dialogue]]
speaker = "フェリシー"
original = "「――う、うん！\u3000会長くんがいいなら、もちろん私はＯＫだよ！」"
translation = "「――으, 응! 회장군이 괜찮다면 물론 난 OK야!」"

[[dialogue]]
speaker = "フェリシー"
original = "「どうせなら……今から具体的な予定も考えちゃおっか？」"
translation = "「이왕이면…… 지금부터 구체적인 예정도 생각해 볼까?」"

[[dialogue]]
speaker = "フェリシー"
original = "「えへへ……♪」"
translation = "「에헤헤……♪」"

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、フェリシーは照れたように微笑むのだった――"
translation = "내가 고개를 끄덕이자 펠리시는 수줍게 미소 짓는 것이었다――"

