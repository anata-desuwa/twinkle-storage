[[dialogue]]
speaker = "unk"
original = "第２話,誓いのやり直し,P"
translation = "제2화, 맹세의 재시작, P"

[[dialogue]]
speaker = "トワ先生"
original = "「わぁ……やっぱり素敵な場所だよねー、会長くん」"
translation = "「와아…… 역시 멋진 곳이네, 회장 군」"

[[dialogue]]
speaker = "トワ先生"
original = "「ここで会長くんと……結婚の誓いをしたんだよね……」"
translation = "「여기서 회장 군이랑…… 결혼 맹세를 해찌……」"

[[dialogue]]
speaker = "トワ先生"
original = "「あの時はウェディングフォームを何とかするためだったから、本当の結婚式じゃなかったけど、いつかちゃんとしたいな」"
translation = "「그때는 웨딩 폼을 어떻게든 하기 위해서였으니까 진짜 결혼식이 아니었지만, 언젠가 제대로 하고 시퍼」"

[[dialogue]]
speaker = "unk"
original = "そうだね、近いうちに"
translation = "그렇네, 조만간"

[[dialogue]]
speaker = "トワ先生"
original = "「う、うん、近いうちに……。あんまり遅くなると、年齢的にぴんちになっちゃうからね」"
translation = "「으, 응, 조만간……. 너무 늦어지면 나이 때문에 위태로워지니까 말이야」"

[[dialogue]]
speaker = "トワ先生"
original = "「はわっ！？\u3000ごめんっ、なんか催促したみたいになっちゃった！」"
translation = "「하왓!? 미안! 왠지 재촉한 것처럼 되어버려써!」"

[[dialogue]]
speaker = "トワ先生"
original = "「そそ、そういうつもりじゃないからね～！\u3000全然っ、責任取って早く結婚してね、とか重いこと言ったりしないから」"
translation = "「그그, 그런 뜻이 아니니까아~! 전혀! 책임지고 빨리 결혼해줘, 같은 무거운 소리 하거나 하지 않으니까」"

[[dialogue]]
speaker = "トワ先生"
original = "「あわわわわ、もっとよくないこと言っちゃってるよぉ。全然重くないからね。大丈夫だから。会長くんのペースでいいからね」"
translation = "「아와와와와, 더 안 좋은 소리를 하고 이써어. 전혀 무겁지 않으니까. 괜찮으니까. 회장 군의 페이스대로 하면 돼」"

[[dialogue]]
speaker = "トワ先生"
original = "「うう、何を言ってもおかしくなっちゃう……わたし少し黙るね。お口にチャック！\u3000むぎゅー」"
translation = "「으으, 무슨 말을 해도 이상해져버려…… 나 잠시 입 다물게. 입에 지퍼! 읍」"

[[dialogue]]
speaker = "unk"
original = "黙らなくていいのに"
translation = "입 다물지 않아도 되는데"

[[dialogue]]
speaker = "トワ先生"
original = "「でも、ここが結婚式場だから、どうしても話題がそっちに偏っちゃうし」"
translation = "「하지만 여기가 결혼식장이라 아무래도 화제가 그쪽으로 쏠려버리니까」"

[[dialogue]]
speaker = "トワ先生"
original = "「ちょっと入ってみようよって誘ったのはわたしなのに。ごめんねー、会長くん。こうなること全然想定してなかったよ」"
translation = "「잠깐 들어가 보자고 권한 건 나인데. 미안해, 회장 군. 이렇게 될 줄 전혀 예상 못 해써」"

[[dialogue]]
speaker = "トワ先生"
original = "「ちょっとだけあの日のこと、思い出してみたくて。それにね、改めてウェディングドレス姿、会長くんに見てもらいたいなぁって」"
translation = "「조금만 그날 일을 떠올려보고 싶어서. 그리고 말이야, 새삼스럽게 웨딩드레스 모습, 회장 군에게 보여주고 싶었나 봐」"

[[dialogue]]
speaker = "トワ先生"
original = "「ど、どうかな？\u3000他に誰もいないし、ちょっとだけならいいよね？」"
translation = "「어, 어때? 다른 사람도 없고 잠깐 정도라면 괜찮지?」"

[[dialogue]]
speaker = "トワ先生"
original = "「やっちゃった……ウェディングフォーム、しかも結婚式場で」"
translation = "「해버렸다…… 웨딩 폼, 그것도 결혼식장에서」"

[[dialogue]]
speaker = "トワ先生"
original = "「えへへへ……ちょっぴり恥ずかしいね。でも、会長くんにだったら見せられるよ」"
translation = "「에헤헤헤…… 조금 부끄럽네. 하지만 회장 군에게라면 보여줄 수 이써」"

[[dialogue]]
speaker = "トワ先生"
original = "「ねえ、会長くん……わ、わたしね……キミのこと……」"
translation = "「있지, 회장 군…… 나, 나 말이야…… 너를……」"

[[dialogue]]
speaker = "トワ先生"
original = "「……大好き<emoji=heart04>」"
translation = "「……너무 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「えへへ、言っちゃった。普段から何度も言ってるけど、ウェディングドレスを着て、しかもこの場所で言うとドキドキしちゃうね」"
translation = "「에헤헤, 말해버렸다. 평소에도 몇 번이나 말하지만 웨딩드레스를 입고, 게다가 이 장소에서 말하니까 두근거려버려」"

[[dialogue]]
speaker = "unk"
original = "俺もドキドキしてる"
translation = "나도 두근거리고 있어"

[[dialogue]]
speaker = "トワ先生"
original = "「ほんとに？\u3000じゃあ……ちょっとだけ、確かめていい？」"
translation = "「정말? 그럼…… 조금만 확인해봐도 될까?」"

[[dialogue]]
speaker = "トワ先生"
original = "「どれどれ～……ぺたぺた……うーん、触るだけじゃちょっとわかんないね」"
translation = "「어디 보자~…… 만지작만지작…… 으음, 만지는 것만으로는 잘 모르겠네」"

[[dialogue]]
speaker = "トワ先生"
original = "「だから、耳をくっつけちゃう。どーん♪」"
translation = "「그러니까 귀를 갖다 댈래. 짠♪」"

[[dialogue]]
speaker = "トワ先生"
original = "「わぁ……確かにすっごくドキドキしてる……わたしでこうなってくれたんだよね……」"
translation = "「와아…… 정말로 엄청 두근거리고 이써…… 나 때문에 이렇게 된 거지……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ウェディングドレスの効果かなぁ？\u3000それとも……わたしだから？\u3000ふふっ、どっちでもいい話だね」"
translation = "「웨딩드레스 효과일까? 아니면…… 나 때문? 후훗, 어느 쪽이든 상관없는 이야기네」"

[[dialogue]]
speaker = "トワ先生"
original = "「ここにわたしがいて、会長くんがいる。それだけで幸せで、嬉しくなっちゃうもん」"
translation = "「여기에 내가 있고 회장 군이 있어. 그것만으로 행복하고 기뻐져버리는걸」"

[[dialogue]]
speaker = "トワ先生"
original = "「……あ、あの時のこと覚えてる？\u3000誓いのキス……したよね。お互いにほっぺにちゅって」"
translation = "「……저, 저기 그때 일 기억해? 맹세의 키스…… 했었지. 서로 볼에 쪽 하고」"

[[dialogue]]
speaker = "トワ先生"
original = "「あの時は嬉しすぎちゃって頭ぽわぁ～ってなっちゃったんだけど……改めて考えてみると、ほっぺにキスっていうのは間違ってるような……」"
translation = "「그때는 너무 기뻐서 머리가 멍해져버렸지만…… 다시 생각해보면 볼에 키스라는 건 틀린 것 가태……」"

[[dialogue]]
speaker = "トワ先生"
original = "「やっぱり誓いのキスは、く、唇同士じゃないとダメだと思うの」"
translation = "「역시 맹세의 키스는 이, 입술끼리여야 한다고 생각해」"

[[dialogue]]
speaker = "トワ先生"
original = "「もちろんあれは本当の結婚式じゃなかったから、唇のキスは出来ないってわかってるよ？\u3000でもでもっ、わたしたち恋人同士だもん、だから、そのぉ……」"
translation = "「물론 그건 진짜 결혼식이 아니었으니까 입술 키스는 할 수 없다는 거 알고 이써? 하지만 하지만! 우리 연인 사이잖아, 그러니까 그게……」"

[[dialogue]]
speaker = "トワ先生"
original = "「改めて……唇同士で……誓いのキス、やり直したいな……」"
translation = "「다시 한번…… 입술끼리…… 맹세의 키스, 다시 하고 시퍼……」"

[[dialogue]]
speaker = "unk"
original = "しよう！"
translation = "하자!"

[[dialogue]]
speaker = "トワ先生"
original = "「じゃあ、するね……」"
translation = "「그럼, 할게……」"

[[dialogue]]
speaker = "トワ先生"
original = "「んーーーーっ」"
translation = "「으으음──」"

[[dialogue]]
speaker = "イレーナ"
original = "「ちょ！\u3000いったい何をしているんですか！」"
translation = "「잠깐! 도대체 뭘 하고 있는 건가요!」"

[[dialogue]]
speaker = "トワ先生"
original = "「ひゃわっ！\u3000すす、すみませぇーーん！！\u3000ちょっと見学させてもらってただけでぇ！！」"
translation = "「히야왓! 죄죄, 죄송함미다아──!! 그냥 잠깐 구경 좀 하려던 것뿐이라서어!!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あ、イレーナちゃん……」"
translation = "「아, 이레이나짱……」"

[[dialogue]]
speaker = "イレーナ"
original = "「トワ先生と……会長さんでしたか。いえ、別に見学くらいなら構いませんよ」"
translation = "「토와 선생님이랑…… 회장님이었나요. 아니, 별로 구경 정도라면 상관없습니다만」"

[[dialogue]]
speaker = "イレーナ"
original = "「でも今、破廉恥なことをしようとしてましたよね？」"
translation = "「하지만 방금 파렴치한 짓을 하려고 했었죠?」"

[[dialogue]]
speaker = "トワ先生"
original = "「はい……会長くんの唇にむちゅーっと」"
translation = "「네…… 회장 군의 입술에 쪽 하고」"

[[dialogue]]
speaker = "イレーナ"
original = "「具体的に説明しなくても結構です。あなたは新星学園の教師ですよね。教え子を毒牙にかけるなんて、やはり破廉恥としか」"
translation = "「구체적으로 설명하지 않아도 됩니다. 당신은 신성학원의 교사잖아요. 제자를 독니에 걸리게 하다니 역시 파렴치하다고밖에」"

[[dialogue]]
speaker = "unk"
original = "毒牙にかけたのは俺だ！"
translation = "독니에 걸리게 한 건 나다!"

[[dialogue]]
speaker = "イレーナ"
original = "「わかっています、一番悪いのはあなたです。まったく、フィオナ会長もなんでこんな男を……」"
translation = "「알고 있습니다, 제일 나쁜 건 당신이에요. 정말이지, 피오나 회장도 왜 이런 남자를……」"

[[dialogue]]
speaker = "イレーナ"
original = "「とにかく公序良俗に反するような行いは慎んでください」"
translation = "「어쨌든 공서양속에 반하는 행위는 삼가주세요」"

[[dialogue]]
speaker = "イレーナ"
original = "「まあ、私はここの神官ではありませんから、そこまで強く咎める気はありませんが」"
translation = "「뭐, 저는 이곳의 신관이 아니니까 그렇게 강하게 나무랄 생각은 없습니다만」"

[[dialogue]]
speaker = "トワ先生"
original = "「イレーナちゃん……ありがとぉ……」"
translation = "「이레이나짱…… 고마워어……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あの日のやり直しをしたい、と、そういう話ですよね？\u3000その格好を見れば大体の察しはつきます」"
translation = "「그날의 일을 다시 하고 싶다, 뭐 그런 이야기죠? 그 차림을 보니 대충 짐작이 갑니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「先程は破廉恥と言ってしまいましたが、愛し合っているんですよね？」"
translation = "「방금은 파렴치하다고 말해버렸지만, 서로 사랑하고 있는 거죠?」"

[[dialogue]]
speaker = "トワ先生"
original = "「ええっ？\u3000そそ、それはっ、そのぉ……」"
translation = "「에엣? 그그, 그건, 그게……」"

[[dialogue]]
speaker = "トワ先生"
original = "「はい……愛し合ってます。会長くんとは正式にお付き合いさせてもらってて」"
translation = "「네…… 사랑하고 이써요. 회장 군과는 정식으로 사귀고 이써서」"

[[dialogue]]
speaker = "イレーナ"
original = "「では問題ありません。あの日のやり直しをしましょうか」"
translation = "「그럼 문제없습니다. 그날의 재시작을 해볼까요」"

[[dialogue]]
speaker = "トワ先生"
original = "「いいの？\u3000この前と同じで、正式な結婚式が出来るわけじゃないんだけど」"
translation = "「괜찮아? 저번이랑 똑같이 정식 결혼식을 할 수 있는 건 아닌데」"

[[dialogue]]
speaker = "イレーナ"
original = "「神官の前で、愛の誓いをする。それだけでいいと思いますが」"
translation = "「신관 앞에서 사랑의 맹세를 한다. 그것만으로도 충분하다고 생각합니다만」"

[[dialogue]]
speaker = "トワ先生"
original = "「愛の誓い……そ、そうだね。それならこの前みたいに、うそっこにはならないし」"
translation = "「사랑의 맹세…… 그, 그렇네. 그거라면 저번처럼 가짜는 아니게 될 거고」"

[[dialogue]]
speaker = "イレーナ"
original = "「では、さっそく始めましょう」"
translation = "「그럼 바로 시작하죠」"

[[dialogue]]
speaker = "イレーナ"
original = "「──緋宮クロト。あなたは健やかなる時も病める時も、富める時も貧しき時も、有明トワを愛し、慈しむことを誓いますか？」"
translation = "「──히노미야 쿠로토. 당신은 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 아리아케 토와를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "unk"
original = "誓います"
translation = "맹세합니다"

[[dialogue]]
speaker = "unk"
original = "はい"
translation = "네"

[[dialogue]]
speaker = "イレーナ"
original = "「有明トワ。あなたは健やかなる時も病める時も、富める時も貧しき時も、緋宮クロトを愛し、慈しむことを誓いますか？」"
translation = "「아리아케 토와. 당신은 즐거울 때나 괴로울 때나, 부유할 때나 가난할 때나, 히노미야 쿠로토를 사랑하고 아낄 것을 맹세합니까?」"

[[dialogue]]
speaker = "トワ先生"
original = "「はい、誓います」"
translation = "「네, 맹세합니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「では誓いの口付けを」"
translation = "「그럼 맹세의 입맞춤을」"

[[dialogue]]
speaker = "トワ先生"
original = "「会長くん……今度は唇に、だからね……」"
translation = "「회장 군…… 이번에는 입술에, 하는 거니까 말이야……」"

[[dialogue]]
speaker = "トワ先生"
original = "「……………………ちゅっ<emoji=heart04>」"
translation = "「……………………쪽<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「えへへ、唇にちゅってしちゃった」"
translation = "「에헤헤, 입술에 쪽 해버려써」"

[[dialogue]]
speaker = "イレーナ"
original = "「お見事です。では続いて会長さんも」"
translation = "「훌륭합니다. 그럼 이어서 회장님도」"

[[dialogue]]
speaker = "トワ先生"
original = "「ほぇ？\u3000えっ、こういうのって１回じゃないの？」"
translation = "「호에? 엣, 이런 건 한 번 하는 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "キスするよ、トワ"
translation = "키스할게, 토와"

[[dialogue]]
speaker = "トワ先生"
original = "「そ、そこで呼び捨ては反則だってばぁ～～～っ！」"
translation = "「거, 거기서 이름을 부르는 건 반칙이라니까아아~~~~~~앗!」"

[[dialogue]]
speaker = "イレーナ"
original = "「では誓いの口付けを、お好きなだけどうぞ」"
translation = "「그럼 맹세의 입맞춤을 원하는 만큼 하세요」"

[[dialogue]]
speaker = "トワ先生"
original = "「待って待って！\u3000急に話が変わっちゃってるんだけど～～～！！？」"
translation = "「잠깐 잠깐! 갑자기 이야기가 바뀌고 이짜나~~~~~~!!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「んむっ！\u3000ちゅ～～～～～っ<emoji=heart04>」"
translation = "「음믓! 쪼오오오오오옵<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「ぷあっ！\u3000な、長いよ会長くん～っ！」"
translation = "「푸핫! 기, 길어 회장 군~!」"

[[dialogue]]
speaker = "トワ先生"
original = "「んんんっ！？\u3000ちゅう～～～～～～～っ<emoji=heart04>」"
translation = "「응응응!? 쪼오오오오오오오옵<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
original = "「ぷはっ！\u3000もっと長いし！\u3000もー、いくらわたしのことが大好きだからって、キスしすぎだよぉ」"
translation = "「푸하! 훨씬 더 길고! 정말, 아무리 내가 너무 좋다고 해도 키스 너무 마니 해애」"

[[dialogue]]
speaker = "トワ先生"
original = "「せっかくイレーナちゃんが手伝ってくれてるんだから、真面目にやらなきゃダメ」"
translation = "「이레이나짱이 도와주고 있으니까 진지하게 해야지」"

[[dialogue]]
speaker = "トワ先生"
original = "「ということで……もう一回やり直し、するんだからねっ<emoji=heart04>」"
translation = "「그러니까…… 한 번 더 다시, 할 거니까 말이야!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、２人の愛の誓いのやり直しは行われたのだった。"
translation = "이렇게 두 사람의 사랑의 맹세 재시작이 이루어졌다."

