[[dialogue]]
speaker = "unk"
original = "第４話,守護天使の恋愛相談,P"
translation = "제4화, 수호천사의 연애 상담, P"

[[dialogue]]
speaker = "unk"
original = "アルモが戦線に加わってくれてから、数ヶ月が経過したある日──"
translation = "아루모가 전선에 가담해 준 지, 수개월이 경과한 어느 날──"

[[dialogue]]
speaker = "アルモタヘル"
original = "「休日に突然押しかけてすまぬ、人の子よ」"
translation = "「휴일에 갑자기 들이닥쳐서 미안하구나, 사람의 아이여」"

[[dialogue]]
speaker = "unk"
original = "それは全然構わないんだけど、一体どうしたの？"
translation = "그건 전혀 상관없는데, 도대체 무슨 일이야?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ああ、実はお前に、相談したいことがあってな。義体の調子がここ最近、おかしいのだ」"
translation = "「아아, 실은 너에게, 상담하고 싶은 것이 있어서 말이다. 의체의 상태가 요 근래, 이상하구나」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「もちろん義体のこと故、最初にアニマやアナに相談したのだ。然れど、何故かお前に聞けと言われてしまってな」"
translation = "「물론 의체의 일이기에, 처음에 아니마나 아나에게 상담했다. 허나, 왠지 너에게 물어보라고 들어서 말이다」"

[[dialogue]]
speaker = "unk"
original = "義体の調子が！？\u3000大丈夫なの……！？"
translation = "의체의 상태가!? 괜찮은 거야……!?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「わからぬ。わからぬが、落ち着け。お前にそう肩を強く掴まれると、体の調子がまたおかしくなる」"
translation = "「모르겠다. 모르겠다만, 진정해라. 네가 그렇게 어깨를 강하게 붙잡으면, 몸의 상태가 또 이상해진다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「──否、謝らずともよい。とりあえず、まずはどのような異変か聞いてくれまいか」"
translation = "「──아니, 사과하지 않아도 좋다. 우선은, 우선 어떤 이변인지 들어주지 않겠나」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「実は、義体の異変というのは、お前も関係していることなのだ」"
translation = "「실은, 의체의 이변이라는 건 너와도 관계가 있는 일이다」"

[[dialogue]]
speaker = "unk"
original = "俺が……？"
translation = "내가……?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「然り。先程、我の体にお前の手が触れたであろう？\u3000あのように、お前と物理的な接触があった時や……」"
translation = "「그렇다. 방금 전, 내 몸에 네 손이 닿지 않았느냐? 그렇게 너와 물리적인 접촉이 있었을 때나……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「逆に今日のような休日、お前と離れた時に、体に異様な反応が起きる」"
translation = "「반대로 오늘 같은 휴일, 너와 떨어져 있을 때 몸에 이상한 반응이 일어난다」"

[[dialogue]]
speaker = "unk"
original = "ん？"
translation = "응?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「症状としては、動悸が激しくなったり、顔が熱くなったり、精神が落ち着かなくなったり……などだ」"
translation = "「증상으로는 고동이 격해지거나, 얼굴이 뜨거워지거나, 정신이 안절부절못하게 되거나…… 등이다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「お前には、これの原因がわかったりするだろうか？」"
translation = "「너는 이것의 원인을 알고 있느냐?」"

[[dialogue]]
speaker = "unk"
original = "んん？\u3000そ、それって……"
translation = "으응? 그, 그거……"

[[dialogue]]
speaker = "アルモタヘル"
original = "「心当たりのある顔だな。教えてくれ、我のこの症状は、何かの病気なのだろうか？」"
translation = "「짐작 가는 바가 있는 얼굴이군. 가르쳐다오, 나의 이 증상은 무슨 병인 것이냐?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……？\u3000どうした。我とお前の仲であろう。何故言いづらそうにしている？」"
translation = "「……? 왜 그러지. 나와 네 사이가 아니냐. 어째서 말하기 어려워하는 것이냐?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「まさか我の体は、それ程に深刻な病なのか……？」"
translation = "「설마 내 몸은 그 정도로 심각한 병인 것인가……?」"

[[dialogue]]
speaker = "unk"
original = "（いやいや。自意識過剰過ぎだ）"
translation = "(아니아니. 자의식 과잉이야)"

[[dialogue]]
speaker = "unk"
original = "（まさか、アルモが俺のことを……？）"
translation = "(설마, 알모가 나를……?)"

[[dialogue]]
speaker = "アルモタヘル"
original = "「なに、症状の検証とな？\u3000もちろん我から相談したのだ、協力は惜しまぬ」"
translation = "「무엇이, 증상의 검증이라고? 물론 내가 상담한 것이니, 협력은 아끼지 않으마」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「して、何から確かめる？\u3000……手を繋ぐ？\u3000ふむ、接触した際に起こる異変を確かめるというわけだな」"
translation = "「그래서, 무엇부터 확인하지? ……손을 잡는다고? 흠, 접촉했을 때 일어나는 이변을 확인한다는 뜻이군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……これでいいか？\u3000ああ、やはり動悸が激しくなってきた。お前に触れられると、症状が出るのは間違いない」"
translation = "「……이걸로 됐느냐? 아아, 역시 고동이 격해지기 시작했다. 네게 닿으면 증상이 나타나는 것은 틀림없군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「──手の繋ぎ方を変える？\u3000それでまた、何かわかるのか？」"
translation = "「──손을 잡는 법을 바꾼다고? 그걸로 또 무언가 알 수 있는 것이냐?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「我の指を、お前の指と指の間に絡めて……こうか？\u3000こんな手の繋ぎ方があるのだな。面白い」"
translation = "「내 손가락을 네 손가락 사이에 얽어서…… 이렇게 말이냐? 이런 손을 잡는 법이 있었군. 흥미롭다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……む、先程よりも更に動悸が激しくなった。体温も上がっているようだ」"
translation = "「……음, 아까보다 더욱 고동이 격해졌다. 체온도 올라가고 있는 것 같군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「嫌な感じがするか？\u3000否、むしろ心地良い感じがする。アルコールを接種した時に似ているような……」"
translation = "「싫은 기분이 드냐고? 아니, 오히려 기분 좋은 느낌이 든다. 알코올을 섭취했을 때와 비슷한 것 같은……」"

[[dialogue]]
speaker = "unk"
original = "（これって本当に……）"
translation = "（이건 정말로……）"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふむ。いま思い付いたのだが、このドキドキする症状は、お前との接触面積によって変化するのではないか？」"
translation = "「흠. 방금 생각난 것이다만, 이 두근거리는 증상은 네놈과의 접촉 면적에 따라 변화하는 것이 아니냐?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「であれば、仮説を検証する為に、次は『はぐ』というものを試してみたいと思うが、どうだ？」"
translation = "「그렇다면 가설을 검증하기 위해, 다음은 『허그』라는 것을 시험해 보고 싶다만, 어떠냐?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「む？\u3000何を慌てている？\u3000確かにここでは珍しいかもしれぬが、『はぐ』は挨拶の一種と聞いた」"
translation = "「무? 무엇을 당황하고 있지? 확실히 여기서는 드물지도 모르겠다만, 『허그』는 인사의 일종이라 들었다」"

[[dialogue]]
speaker = "unk"
original = "（いや、そうだ。俺自身の気持ちを確かめる為にも……）"
translation = "（아니, 그래. 내 자신의 기분을 확인하기 위해서라도……）"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ハグを試すか？\u3000然り。それでは、失礼する」"
translation = "「허그를 시험해 보겠나? 그렇다. 그럼, 실례하마」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「んっ……仮説はどうやら、合っているようだ。我のドキドキは、手を繋いだ時よりも強くなっている」"
translation = "「응…… 가설은 아무래도 맞는 모양이군. 나의 두근거림은 손을 잡았을 때보다 강해지고 있다」"

[[dialogue]]
speaker = "unk"
original = "（アルモの体、凄く柔らかくて、良い匂いがする……！）"
translation = "（알모의 몸, 굉장히 부드럽고 좋은 냄새가 나……!）"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そして、このドキドキはやはり嫌ではない。心臓は激しく動き、体も汗が出るくらい熱くなっているが、何故かとても安心する」"
translation = "「그리고 이 두근거림은 역시 싫지 않구나. 심장은 격렬하게 움직이고 몸도 땀이 날 정도로 뜨거워지고 있다만, 왠지 무척 안심이 된다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「我のこれは病気か？\u3000少し違うように感じるのだが……」"
translation = "「나의 이것은 병인가? 조금 다른 것처럼 느껴진다만……」"

[[dialogue]]
speaker = "unk"
original = "これは異性同士の反応っていうか……"
translation = "이건 이성 간의 반응이라고 할까……"

[[dialogue]]
speaker = "unk"
original = "病気じゃないと思う。"
translation = "병은 아니라고 생각해."

[[dialogue]]
speaker = "アルモタヘル"
original = "「ほう？\u3000つまり我が、お前を男性として意識するようになったが故の反応というわけか。面白い」"
translation = "「호오? 즉 내가 네놈을 남성으로서 의식하게 되었기에 나타나는 반응이라는 소린가. 재미있군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ところで、気になったのだが……」"
translation = "「그나저나, 신경 쓰이는 것이 있다만……」"

[[dialogue]]
speaker = "unk"
original = "不意にアルモが顔を近付け、額同士をくっ付けた。"
translation = "불시에 알모가 얼굴을 가까이 대고 이마끼리 맞대었다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふむ、顔が赤いぞ。熱でもあるのか？」"
translation = "「흠, 얼굴이 붉구나. 열이라도 있는 것이냐?」"

[[dialogue]]
speaker = "unk"
original = "あ、アルモ、いきなり何！？"
translation = "아, 알모, 갑자기 뭐야!?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「人の子はこうやって体温を計ると聞いたのだが……何か違ったか？」"
translation = "「인간의 아이는 이렇게 체온을 잰다고 들었다만…… 뭔가 틀렸느냐?」"

[[dialogue]]
speaker = "unk"
original = "無邪気な様子で首を傾げるアルモ。"
translation = "천진난만한 모습으로 고개를 갸웃거리는 알모."

[[dialogue]]
speaker = "unk"
original = "そんな彼女を女性として意識するようになってしまった俺は、胸のドキドキが止まらず、顔を直視出来なくなってしまうのだった。"
translation = "그런 그녀를 여성으로서 의식하게 되어버린 나는 가슴의 두근거림이 멈추지 않아, 얼굴을 똑바로 쳐다볼 수 없게 되어버리는 것이었다."

