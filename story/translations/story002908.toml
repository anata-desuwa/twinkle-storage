[[dialogue]]
speaker = "マグダレナ"
original = "『星霊祭も３日目に突入です。ここまでは新星学園リードで進んでいますが、結果はまだまだわかりません。逆転の機会はたくさんありますよ』"
translation = "『성령제도 3일째에 돌입했습니다. 여기까지는 신성 학원이 리드하며 진행되고 있지만, 결과는 아직 알 수 없습니다. 역전의 기회는 많이 남아 있습니다』"

[[dialogue]]
speaker = "カティア"
original = "「ふふーん、１日目、２日目と連続で新星の優勢！\u3000このまま最後まで完封もありえるワン♪」"
translation = "「후후훗, 1일째, 2일째 연속으로 신성의 우세! 이대로 끝까지 완봉하는 것도 가능할지 모르는 멍♪」"

[[dialogue]]
speaker = "ミルフィー"
original = "「カティアちゃん、油断は禁物だよ！\u3000勝って兜の緒を締めよなんだから！」"
translation = "「카티아짱, 방심은 금물이야! 이기고 투구를 고쳐 매야 하는 법이니까!」"

[[dialogue]]
speaker = "美鶴"
original = "「次の競技は、大玉転がしだってさ。運動会って、ほんとにいろんな競技があるんだねー」"
translation = "「다음 경기는, 큰 공 굴리기래. 운동회는 정말 여러 가지 종목이 있네ー」"

[[dialogue]]
speaker = "シノ"
original = "『こちらの大玉を先にゴールまで運んだほうが勝利！\u3000いたってシンプルなルールです』"
translation = "『이 큰 공을 먼저 골까지 운반하는 쪽이 승리! 지극히 단순한 규칙입니다』"

[[dialogue]]
speaker = "カティア"
original = "「わふんっ！\u3000玉を転がすなら、私にお任せあれだワン！」"
translation = "「와훙! 공을 굴리는 거라면, 저에게 맡겨주세요 멍!」"

[[dialogue]]
speaker = "ヒヨ"
original = "「ワン公はボールを転がしたり、取って来いするのが上手いからなあ。適材適所ってヤツかい」"
translation = "「멍멍이는 공을 굴리거나, 가져오는 걸 잘하니까 말이야. 적재적소라는 건가」"

[[dialogue]]
speaker = "unk"
original = "よし、行ってこい。カティア！"
translation = "좋아, 다녀와. 카티아!"

[[dialogue]]
speaker = "カティア"
original = "「行ってきます、魔王様っ！\u3000必ずやお役に立ってみせますワン！」"
translation = "「다녀오겠습니다, 마왕님! 반드시 도움이 되어 보이겠습니다 멍!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「頑張ってね、カティアちゃん！\u3000ゴー・ファイト・ウィン！」"
translation = "「힘내, 카티아짱! 고・파이트・윈!」"

[[dialogue]]
speaker = "マグダレナ"
original = "『新星学園からはカティアさん、流星学園からはフェニエルさんが出走です。位置についてくださーい！』"
translation = "『신성 학원에서는 카티아 씨, 유성 학원에서는 페니엘 씨가 출전합니다. 위치에 서주세요ー!』"

[[dialogue]]
speaker = "フェニエル"
original = "「よ、よろしくお願いします」"
translation = "「자, 잘 부탁드립니다」"

[[dialogue]]
speaker = "カティア"
original = "「ちっちゃいけど、油断も手加減もしません！\u3000絶対負けないワン！」"
translation = "「작지만, 방심도 봐주기도 하지 않겠습니다! 절대 지지 않는 멍!」"

[[dialogue]]
speaker = "シノ"
original = "『位置について──よーーーい、ドン！』"
translation = "『위치에 서서── 준비, 시ーー작!』"

[[dialogue]]
speaker = "カティア"
original = "「一気に転がして──えいっ！\u3000んぬっ！？\u3000んぬぐぎぎぎぎぎぎ！？」"
translation = "「단숨에 굴려서── 에잇! 으늣!? 으느그그그그그극!?」"

[[dialogue]]
speaker = "美鶴"
original = "「大玉、ビクともしてないね」"
translation = "「큰 공, 꼼짝도 안 하네」"

[[dialogue]]
speaker = "ミルフィー"
original = "「今までの競技からすると、あの大玉もきっと普通のじゃないんだろうね……」"
translation = "「지금까지의 경기들을 보면, 저 큰 공도 분명 평범한 건 아닐 거야……」"

[[dialogue]]
speaker = "マグダレナ"
original = "『当然、こちらも星騎士仕様の競技、普通の大玉転がしで終わるはずがありません。こちらの大玉鉄球の重量、なんと１０ｔです』"
translation = "『당연히, 이것도 성기사 사양의 경기, 평범한 큰 공 굴리기로 끝날 리가 없습니다. 이 큰 공 철구의 무게는, 무려 10t입니다』"

[[dialogue]]
speaker = "unk"
original = "後出し情報だー！？"
translation = "나중에 알려주는 정보냐ー!?"

[[dialogue]]
speaker = "unk"
original = "１０ｔの鉄球！？"
translation = "10t짜리 철구!?"

[[dialogue]]
speaker = "ヒヨ"
original = "「１０ｔだとぉ！？\u3000ただでさえ非力なワン公が、そんなん動かせるわけねえ！」"
translation = "「10t이라고오!? 안 그래도 비실한 멍멍이가, 저런 걸 움직일 리가 없잖아!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「しかも、カティアちゃんの簡易戦闘服は、スピードに特化してるから……今の筋力は一般人と大差ないんじゃないかな」"
translation = "「게다가, 카티아짱의 간이 전투복은 스피드에 특화되어 있으니까…… 지금의 근력은 일반인과 크게 다르지 않을걸」"

[[dialogue]]
speaker = "美鶴"
original = "「でも、１０ｔなんて流星の天使ちゃんも動かせないんじゃない？\u3000泥仕合になりそ」"
translation = "「하지만, 10t은 유성의 천사짱도 못 움직이지 않아? 진흙탕 싸움이 될 것 같아」"

[[dialogue]]
speaker = "ミルフィー"
original = "「うーん、それはどうかなー……」"
translation = "「으음, 그건 어떨까ー……」"

[[dialogue]]
speaker = "フェニエル"
original = "「んっしょ、んっしょ、んっしょ」"
translation = "「영차, 영차, 영차」"

[[dialogue]]
speaker = "美鶴"
original = "「うへ。天使ちゃん、平気な顔ですいすい転がしてる……細い身体でとんでもない馬鹿力」"
translation = "「우헤. 천사짱, 아무렇지도 않은 얼굴로 술술 굴리고 있어…… 가는 몸으로 터무니없는 괴력」"

[[dialogue]]
speaker = "ミルフィー"
original = "「見た目で判断すると、痛い目を見るっていういい例だね……」"
translation = "「겉모습으로 판단하면, 큰코다친다는 좋은 예네……」"

[[dialogue]]
speaker = "unk"
original = "フニは特別力持ちだから……"
translation = "후니는 특별히 힘이 세니까……"

[[dialogue]]
speaker = "カティア"
original = "「そんなー！\u3000ま、まだまだ負けてないワン！\u3000ゴールするまでが運動会だガオ！\u3000ぐぬぎぎぎぎぎぃ！」"
translation = "「그럴 수가ー! 아, 아아직 지지 않았다 멍! 골인할 때까지가 운동회다 갸오! 끄으으으으으윽!」"

[[dialogue]]
speaker = "ヒヨ"
original = "「あ、諦めんな、ワン公っ！\u3000為せば成るでえ！」"
translation = "「포, 포기하지 마, 멍멍아! 하면 된다고!」"

[[dialogue]]
speaker = "unk"
original = "大汗をかきつつ、額に血管を浮かべ、押したり引いたりを繰り返すカティアだったが、その頑張りも虚しく──"
translation = "굵은 땀을 흘리며, 이마에 핏줄을 세우고, 밀고 당기기를 반복하는 카티아였지만, 그 노력도 헛되이──"

[[dialogue]]
speaker = "フェニエル"
original = "「んっしょ、んっしょ……あ、ゴールです。やりました♪」"
translation = "「영차, 영차…… 아, 골인입니다. 해냈어요♪」"

[[dialogue]]
speaker = "シノ"
original = "『細腕に秘められた無限のパワーで、フェニエル選手ゴールイン！』"
translation = "『가느다란 팔에 숨겨진 무한의 파워로, 페니엘 선수 골인!』"

[[dialogue]]
speaker = "ミネコ"
original = "「やったー♪\u3000１本取り返したね！」"
translation = "「야호ー♪ 1점 만회했네!」"

[[dialogue]]
speaker = "フェニエル"
original = "「えへへ、皆さん、応援ありがとうございます」"
translation = "「에헤헤, 여러분, 응원 감사합니다」"

[[dialogue]]
speaker = "マグダレナ"
original = "『一方、カティア選手の押す大玉は……スタート地点からほとんど動いておりません』"
translation = "『한편, 카티아 선수가 미는 큰 공은…… 출발 지점에서 거의 움직이지 않았습니다』"

[[dialogue]]
speaker = "ヒヨ"
original = "「何やってやがんでえ──って責めるのは酷ってもんか。あんなのあたしでもきちぃぜ」"
translation = "「뭐 하는 거냐ー! 라고 탓하는 건 너무 심한가. 저런 건 나라도 힘들다고」"

[[dialogue]]
speaker = "カティア"
original = "「ウワーーン！\u3000みんなに合わす顔がないワーーーン！」"
translation = "「우와아앙! 모두에게 얼굴을 들 수가 없다 와아앙!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あ、あのあの、気を落とさないでください……勝負は時の運って言いますし……」"
translation = "「아, 저기 저기, 너무 낙심하지 마세요…… 승부는 때의 운이라고 하잖아요……」"

[[dialogue]]
speaker = "カティア"
original = "「対戦相手に慰められるなんて、もっと惨めだワーン！」"
translation = "「대결 상대에게 위로받다니, 더 비참하다 와앙!」"

[[dialogue]]
speaker = "フェニエル"
original = "「ご、ご、ごめんなさーい！」"
translation = "「죄, 죄, 죄송해요ー!」"

[[dialogue]]
speaker = "unk"
original = "他の参加選手も流星学園に後れを取ってしまい、大玉転がしは完敗を喫してしまったのだった。"
translation = "다른 참가 선수들도 유성 학원에 뒤처져 버려, 큰 공 굴리기는 완패를 당하고 말았다."

