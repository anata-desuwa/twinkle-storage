[[dialogue]]
speaker = "unk"
original = "第２話,お茶会メンバー再会,P"
translation = "제2화, 다도회 멤버 재회, P"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「まあ、メルエルちゃん、ナターシャちゃん♪」"
translation = "「어머, 메르엘 짱, 나타샤 짱♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへ、ケイティお姉ちゃん、お久しぶり♪」"
translation = "「에헤헤, 케이티 언니, 오랜만이야♪」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ひぇぇ、ホントにケイティ姉さんだ……お勤めご苦労様です」"
translation = "「히익, 진짜 케이티 언니네…… 노고가 많으십니다.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「うん、今回は護衛の任務を受けて人間界に来たんだよ～」"
translation = "「응, 이번에는 호위 임무를 맡아서 인간계에 온 거야~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「せっかくだから、メルエルちゃんやナターシャちゃんにも会いたいな～って思って、魔王さんにお願いしたの」"
translation = "「기왕이면 메르엘 짱이랑 나타샤 짱도 만나고 싶어서 마왕님께 부탁드렸어.」"

[[dialogue]]
speaker = "unk"
original = "３人は昔馴染みなんだって？"
translation = "세 사람은 옛날부터 알던 사이라고?"

[[dialogue]]
speaker = "unk"
original = "詳しいことまでは聞いてないけど"
translation = "자세한 것까지는 못 들었지만"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そうなんだよ～。えへへ、私のお姉ちゃんみたいな感じでね、よくお茶会に招待してもらってたの」"
translation = "「그렇다니까~. 에헤헤, 내 언니 같은 느낌으로 말이야, 자주 다도회에 초대받곤 했어.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「聖庭園には野外でお茶会を開ける場所があるんですよ～」"
translation = "「성정원에는 야외에서 다도회를 열 수 있는 장소가 있답니다~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「そこにメルエルちゃんやナターシャちゃんを呼んで、お茶会を開いていました」"
translation = "「거기에 메르엘 짱이랑 나타샤 짱을 불러서 다도회를 열곤 했죠.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「メルエルちゃんが星騎士になるために流星市国に行ってしまって、私が聖庭園の衛兵隊長になって忙しくなってしまって……」"
translation = "「메르엘 짱이 성기사가 되기 위해 유성시국으로 가버리고, 제가 성정원의 위병대장이 되어 바빠지는 바람에……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「それ以降は、お茶会が出来なくなってしまいましたが……また開きたいですね♪」"
translation = "「그 이후로는 다도회를 할 수 없게 되었습니다만…… 다시 열고 싶네요♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「とっても素敵なんだよ」"
translation = "「무척 멋지다구.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「お花を眺めたり、鳥の声を聞きながら、紅茶を飲んだりお菓子を食べたり……」"
translation = "「꽃을 바라보거나 새소리를 들으면서 홍차를 마시고 과자를 먹고……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「とても平和な時間を過ごしていました。なんだか遠い昔のことのように思えます……」"
translation = "「무척 평화로운 시간을 보내고 있었습니다. 왠지 먼 옛날 일처럼 느껴지네요……」"

[[dialogue]]
speaker = "unk"
original = "すごく優雅な光景が目に浮かびます"
translation = "굉장히 우아한 광경이 눈에 선하네요"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん。実はね、ケイティお姉ちゃんは結構なお嬢様だったりするんだよ」"
translation = "「응. 사실 케이티 언니는 꽤 지체 높은 아가씨이기도 해.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「それなのに戦うと、とっても強くて凛々しくて……私の憧れの人なんだぁ♪」"
translation = "「그런데도 싸우면 무척 강하고 늠름해서…… 내 동경하는 사람이야♪」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いやー、強いのは間違いないけど……。っていうか強すぎなのが問題なんだよね」"
translation = "「이봐ー, 강한 건 틀림없지만……. 그보다 너무 강한 게 문제라니까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あの強さは方向的に、メルエルに憧れて欲しくない強さっていうか……」"
translation = "「그 강함은 방향성으로 볼 때 메르엘이 동경하지 않았으면 하는 강함이랄까……」"

[[dialogue]]
speaker = "unk"
original = "ナターシャの言いたいことはよく分かる。"
translation = "나타샤가 하고 싶은 말은 잘 이해가 간다."

[[dialogue]]
speaker = "unk"
original = "俺たちも初めてケイティさんの戦いを見た時は度肝を抜かれた。"
translation = "우리도 처음 케이티 씨의 전투를 보았을 때는 간담이 서늘했다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ビックリしちゃうよね。こーんな大きくて分厚い剣を２本もブンブン振り回して戦うんだし」"
translation = "「깜짝 놀랄걸. 이~렇게 크고 두꺼운 검을 2자루나 붕붕 휘두르며 싸우니까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「圧倒的な力で相手をねじ伏せちゃうところから、『制圧天使』なんて物騒なあだ名までついちゃってるからさ」"
translation = "「압도적인 힘으로 상대를 찍어 눌러버리는 바람에 『제압천사』라는 살벌한 별명까지 붙었을 정도니까 말이야.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「まあ……お恥ずかしいです～」"
translation = "「어머나…… 부끄럽네요~.」"

[[dialogue]]
speaker = "unk"
original = "（赤くなって……可愛い……）"
translation = "(붉어져선…… 귀여워……)"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おーい魔王様、この反応に騙されちゃいけないよ」"
translation = "「어이 마왕님, 이 반응에 속으면 안 돼.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私からのアドバイス、っていうか忠告。ケイティ姉さんだけは絶対に怒らせない方がいいよ～」"
translation = "「내 조언이자 충고. 케이티 언니만큼은 절대로 화나게 하지 않는 게 좋아~」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私もたとえ任務だとしても、相手がケイティ姉さんだって分かったら、その瞬間に逃げ出すからね。だって命が惜しいもん」"
translation = "「나도 설령 임무라고 해도 상대가 케이티 언니라는 걸 알게 된 순간에 도망칠 테니까. 그야 목숨은 소중하잖아.」"

[[dialogue]]
speaker = "unk"
original = "酷い言われようだ……"
translation = "너무한 소리를 듣네……"

[[dialogue]]
speaker = "unk"
original = "ケイティさんの戦いぶりを直接見ていなかったら、ナターシャの言葉を信じることは出来なかっただろう。"
translation = "케이티 씨의 전투 방식을 직접 보지 못했다면 나타샤의 말을 믿을 수 없었을 것이다."

[[dialogue]]
speaker = "unk"
original = "けど、俺はケイティさんの戦い方がどれだけ苛烈か知ってるから……。"
translation = "하지만 나는 케이티 씨의 전투 방식이 얼마나 가혹한지 알고 있으니까……."

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「出来れば私も平和的な解決で済ませようと務めているのですが、言葉だけではそれを成し得ないというのが現実の悲しいところです……」"
translation = "「가급적 저도 평화적인 해결로 끝내도록 노력하고 있습니다만, 말만으로는 그것을 이룰 수 없다는 것이 현실의 슬픈 부분이에요……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ですが私は信じています。平和を愛する心は誰もが同じ。誠意をもって話し合えば、きっと力によらずとも解決できると」"
translation = "「하지만 저는 믿고 있습니다. 평화를 사랑하는 마음은 누구나 같다는 것을. 성의를 갖고 대화하면 분명 힘에 의지하지 않고도 해결할 수 있다고 말이죠.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「その為にも皆が平和の尊さと素晴らしさを知るべきなんです」"
translation = "「그러기 위해서라도 모두가 평화의 존엄함과 아름다움을 알아야 해요.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「とかなんとか言いながら、また制圧しちゃうんですよね」"
translation = "「이러쿵저러쿵 말하면서 또 제압해 버릴 거면서.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「そんなことありませんよ～。次は必ず、平和的な解決をして見せます！」"
translation = "「그렇지 않답니다~. 다음에는 반드시 평화적인 해결을 보여드리겠어요!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ナターシャちゃん、その辺にしておかないと知らないよ？」"
translation = "「나타샤 짱, 그쯤 해두지 않으면 모른다구?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おっとそうだね。いけないいけない」"
translation = "「오 이런, 그렇네. 안 되지 안 돼.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「も～っ、ナターシャちゃんも相変わらずなんだから～」"
translation = "「정말~, 나타샤 짱도 여전하다니까~」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「それよりお腹空いちゃったよ～。ご飯、ケイティお姉ちゃんも一緒に食べていけるんでしょ？」"
translation = "「그보다 배고파졌어~. 밥, 케이티 언니도 같이 먹고 갈 수 있지?」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「うん、もちろん」"
translation = "「응, 물론이죠.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「２人とこうしてテーブルを囲むのも久しぶり……魔王さんも是非ご一緒に～♪」"
translation = "「두 사람과 이렇게 테이블을 둘러싸는 것도 오랜만…… 마왕님도 부디 함께해요~♪」"

[[dialogue]]
speaker = "unk"
original = "こうして昔馴染みの３人に加えてもらい、楽しい昼食の時間を過ごしたのだった。"
translation = "이렇게 소꿉친구 세 사람 사이에 끼어 즐거운 점심시간을 보낸 것이었다."

