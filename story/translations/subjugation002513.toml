[[dialogue]]
speaker = "unk"
original = "シャドウフィオナを倒した後、俺はシャドウヴィーナスのところへ向かうことにした。"
translation = "섀도우 피오나를 쓰러뜨린 후, 나는 섀도우 비너스가 있는 곳으로 향하기로 했다."

[[dialogue]]
speaker = "unk"
original = "そこは、かつて俺たちがリクリエの使徒との決戦を繰り広げた場所――フィーニスの塔の頂上を再現した仮想空間だった。"
translation = "그곳은 일전에 우리가 리크리에의 사도와 결전을 펼쳤던 장소―― 피니스의 탑 정상을 재현한 가상 공간이었다."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고――"

[[dialogue]]
speaker = "シャドウヴィーナス"
original = "「――――！」"
translation = "「――――!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「……ふぅ。やりました……！」"
translation = "「……휴우. 해냈어요……!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「とりあえず、これでヴィーナスさんとの約束は果たせましたね」"
translation = "「일단 이걸로 비너스 씨와의 약속은 지켰네요.」"

[[dialogue]]
speaker = "unk"
original = "フィオナ、まさか１人で倒したのか！？"
translation = "피오나, 설마 혼자서 쓰러뜨린 거야!?"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「あっ、緋宮会長、お疲れ様です」"
translation = "「앗, 히노미야 회장님, 수고하셨어요.」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「そうです、と言えたらカッコよかったんですけど、残念ながら違いまして……」"
translation = "「그렇다고 말할 수 있다면 멋있었겠지만, 아쉽게도 아니랍니다……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「最初は私１人ではなくて、姉さんやニャリオン、セーラ先輩、ユウリにルリエル、それに他の星騎士の皆さんも手伝ってくれていたんです」"
translation = "「처음에는 저 혼자가 아니라 언니나 냐리온, 세라 선배, 유우리와 루리에르, 그리고 다른 성기사분들도 도와주셨거든요.」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「ですが……ヴィーナスさんのノヴァフォームが強すぎて、私以外はみんな撃破されてしまいました。私はなんとか耐えて、勝つことができましたけど――」"
translation = "「하지만…… 비너스 씨의 노바 폼이 너무 강해서 저 말고는 전부 격파당해 버렸어요. 저는 어떻게든 버텨서 이길 수 있었지만――」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「見ての通り、魔王フォームでもボロボロの有り様です。あはは」"
translation = "「보시다시피 마왕 폼인데도 만신창이인 꼴이에요. 아하하.」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「――緋宮会長も私に挑んで勝ったけど、同じくボロボロ？\u3000では、魔王同士、お揃いですね。ふふふっ♪」"
translation = "「――히노미야 회장님도 저에게 도전해서 이겼지만 마찬가지로 만신창이? 그럼 마왕끼리 똑같네요. 후후훗♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「じ～っ……」"
translation = "「빤히……」"

[[dialogue]]
speaker = "アポロ"
original = "「サチ、なぜ物影から２人を見てるんだ？\u3000流星ライダーの某１話みたいになってるぞ？」"
translation = "「사치, 왜 물건 뒤에서 두 사람을 보고 있는 거야? 유성 라이더의 모 1화처럼 되어 있다고?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「って、アポロちゃん！？\u3000いつからそこに！？」"
translation = "「엇, 아폴로 짱!? 언제부터 거기에!?」"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000サチじゃないか"
translation = "어라? 사치잖아."

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「姉さんも戻って来たんですね」"
translation = "「언니도 돌아왔군요.」"

[[dialogue]]
speaker = "アポロ"
original = "「おう！\u3000あたしたちの熱い思いを繋いで、見事に勝ったみたいだな！\u3000さすがはあたしの妹。オマエがヒーローだ！\u3000よしよし♪」"
translation = "「오우! 우리들의 뜨거운 마음을 이어서 멋지게 이긴 모양이네! 역시 내 동생이야. 네가 히어로다! 착하지 착해♪」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「ね、姉さん、公衆の面前で頭を撫でられるのは恥ずかしいです……」"
translation = "「어, 언니, 공공연한 장소에서 머리를 쓰다듬어지는 건 부끄러워요……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「センパ～イ☆\u3000可愛い後輩が助けに来ましたよ～って、あれ？\u3000ひょっとして、もう終わっちゃってます？」"
translation = "「선배~☆ 귀여운 후배가 도우러 왔어요~ 어라? 혹시 이미 끝나버렸나요?」"

[[dialogue]]
speaker = "unk"
original = "リーリア！\u3000マリオンさんには勝てたのか？"
translation = "리리아! 마리온 씨한테는 이긴 거야?"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「はい♪\u3000センパイとの絆の力で、大金星上げちゃいましたよ～♪\u3000ふふっ♪」"
translation = "「네♪ 선배와의 인연의 힘으로 대어를 낚아버렸답니다~♪ 후훗♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「じ～っ……」"
translation = "「빤히……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「って、え～っと、なんか強い視線を感じるんですけど……サチちゃん、どうかした？」"
translation = "「저기, 음, 왠지 강한 시선이 느껴지는데…… 사치 짱, 무슨 일이야?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あっ、すみません！\u3000その……リーリア先輩はお兄さんと仲が良さげだなぁ～と思って……」"
translation = "「앗, 죄송합니다! 그…… 리리아 선배는 오빠랑 사이가 좋아 보여서……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「それを言うなら、サチちゃんもですけどね。だって……」"
translation = "「그걸 말하자면 사치 짱도 마찬가지지만요. 그게 말이죠……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「私がこのフォームを欲しくなったきっかけの１つは、サチちゃんですし」"
translation = "「제가 이 폼을 갖고 싶어진 계기 중 하나가 사치 짱이거든요.」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「え？」"
translation = "「네?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ほら、サチちゃんもセンパイの可愛い後輩じゃないですか。あと、なんか戦闘服やら戦い方が<b>マジカル</b>な感じで！」"
translation = "「봐요, 사치 짱도 선배의 귀여운 후배잖아요. 그리고 왠지 전투복이나 싸우는 방식이 <b>매지컬</b>한 느낌이고!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「なのに覚醒フォームで先を越されちゃって、ライバルとして悔しかったというか～」"
translation = "「그런데 각성 폼에서 선수를 빼앗겨 버려서 라이벌로서 분했다고나 할까~」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「ら、ライバル、ですか？\u3000私が……？」"
translation = "「라, 라이벌, 인가요? 제가……?」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「あれ？\u3000ひょっとして認識されてない！？」"
translation = "「어라? 설마 인식하지 못한 거야!?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「す、すみません……まさかそんな風に思ってもらえてたなんて、想像していませんでした」"
translation = "「죄, 죄송합니다…… 설마 그런 식으로 생각해주고 계셨을 줄은 상상도 못 했어요.」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「マジカルショック！」"
translation = "「매지컬 쇼크!」"

[[dialogue]]
speaker = "unk"
original = "俺も今、初めて知った"
translation = "나도 지금 처음 알았어."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「ぐぬぬ……なら、ここでちゃんと宣言しておかないとですね！」"
translation = "「구누누…… 그럼 여기서 제대로 선언해 두어야겠네요!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「サチちゃん！\u3000妹分のポジションはともかく、可愛い後輩の座は簡単には譲りませんよ～！」"
translation = "「사치 짱! 여동생 포지션은 몰라도, 귀여운 후배 자리는 쉽게 양보하지 않을 거예요~!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「そ、そんなこと急に言われても……！」"
translation = "「그, 그런 말을 갑자기 하셔도……!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「やれやれ、何を話してるのかと思えば……後輩相手にそんな下らないこと」"
translation = "「이런 이런, 무슨 이야기를 하나 했더니…… 후배 상대로 그런 시시한 소리를.」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「マム！？\u3000いやいや、下らなくないですよ！？\u3000私のアイデンティティに関わることなんですから！」"
translation = "「마무!? 아니아니, 시시하지 않다구요!? 제 아이덴티티에 관련된 일이니까요!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「でも――とりあえず、変な悩みは吹っ切れたみたいね」"
translation = "「그래도―― 일단 이상한 고민은 떨쳐낸 모양이네.」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「もしかしてマム、気にかけてくれてたんですか……？」"
translation = "「혹시 마무, 신경 써주고 있었던 건가요……?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「当たり前でしょう？\u3000あなたは新星寮の後輩で、私は寮長なんだから」"
translation = "「당연하잖아? 당신은 신성료의 후배고, 나는 사감이니까.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「吹っ切れたっていうなら、その姿を私にもちゃんと見せてみなさい」"
translation = "「떨쳐냈다면 그 모습을 나에게도 제대로 보여줘 봐.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ほら、おあつらえ向きの相手が復活したわよ」"
translation = "「봐, 안성맞춤인 상대가 부활했어.」"

[[dialogue]]
speaker = "シャドウヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "マムの言った通り、シャドウヴィーナスが復活を果たして、俺たちの前に姿を現す。"
translation = "마무의 말대로 섀도우 비너스가 부활하여 우리 앞에 모습을 나타낸다."

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「イエス・マム！\u3000センパイも、可愛い後輩が頑張っちゃいますから、見てて下さいね～☆」"
translation = "「예스 마무! 선배도 귀여운 후배가 힘낼 테니까 지켜봐 주세요~☆」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「あ……あの、私も！\u3000お兄さんの後輩ですから、頑張ります！」"
translation = "「아…… 저기, 저도! 오빠의 후배니까 열심히 할게요!」"

[[dialogue]]
speaker = "リーリア（覚醒）"
original = "「おっ、やっぱり意識してるじゃないですか～。サチちゃん、負けませんよ～！」"
translation = "「오, 역시 의식하고 있잖아요~. 사치 짱, 지지 않을 거예요~!」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「は、はい！\u3000リーリア先輩！」"
translation = "「네, 네! 리리아 선배!」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはシャドウヴィーナスに戦いを挑む――"
translation = "그렇게 우리는 섀도우 비너스에게 싸움을 건다――"

[[dialogue]]
speaker = "unk"
original = "はずだったのだが。"
translation = "하려던 참이었는데."

[[dialogue]]
speaker = "？？？"
original = "「ノヴァセイクリッドアロー！！」"
translation = "「노바 세이크리드 애로우!!」"

[[dialogue]]
speaker = "シャドウヴィーナス"
original = "「――――！？」"
translation = "「――――!?」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「なっ……！？」"
translation = "「뭣……!?」"

[[dialogue]]
speaker = "アポロ"
original = "「シャドウが臨戦態勢に入る前に、火力ゴリ押しで消し飛ばした……だと！？」"
translation = "「섀도우가 임전 태세에 들어가기 전에 화력으로 찍어 눌러서 날려버렸다고……!?」"

[[dialogue]]
speaker = "サチ（覚醒）"
original = "「……凄いは凄いですけど、普通にズルじゃないですか？」"
translation = "「……대단하긴 대단한데, 그냥 반칙 아닌가요?」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「やっぱり、偽物よりも本物の私の方が強いわね！」"
translation = "「역시 가짜보다 진짜인 내가 더 강하네!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「ヴィーナスさん！？」"
translation = "「비너스 씨!?」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「フィオナ、どっちが短い時間でシャドウを倒せるかって話だったけど……」"
translation = "「피오나, 누가 더 짧은 시간에 섀도우를 쓰러뜨리나 하는 이야기였지만……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「ごめんね！\u3000やっぱりルールを変えましょう！」"
translation = "「미안! 역시 규칙을 바꿀래!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「えぇっ！？\u3000どういうことですか！？」"
translation = "「에엣!? 그게 무슨 소리인가요!?」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「シャドウの代わりに本物の私がフィオナと戦うわ！\u3000改めて、私と全力でバトルしましょう、フィオナ！」"
translation = "「섀도우 대신 진짜인 내가 피오나와 싸울게! 다시 한번 나와 전력으로 배틀하자, 피오나!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「いや、私、先程シャドウを倒したばかりで、正直色々限界で……！」"
translation = "「아니, 저 방금 섀도우를 쓰러뜨린 참이라 솔직히 여러모로 한계라서……!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「そうなの？\u3000う～ん。じゃあ、そうね……」"
translation = "「그래? 으음. 그럼 그러네……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「クロトや他の星騎士も集まって来てるみたいだし、私がシャドウの代わりにラスボスをやるわ！」"
translation = "「쿠로토랑 다른 성기사들도 모여있는 것 같고, 내가 섀도우 대신 라스트 보스를 맡을게!」"

[[dialogue]]
speaker = "unk"
original = "まさかのここで無茶振り！？"
translation = "설마 여기서 무리한 요구를!?"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「だからフィオナ、あなたも魔王としてみんなを率いて、限界を超えてみせなさい！」"
translation = "「그러니까 피오나, 당신도 마왕으로서 모두를 이끌고 한계를 뛰어넘어 봐!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「限界を……超える」"
translation = "「한계를…… 뛰어넘는다.」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「そうよ、フィオナ！\u3000あなたの魔王の底力、私に見せてみなさい！」"
translation = "「그래, 피오나! 당신의 마왕으로서의 저력을 나에게 보여줘 봐!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの目には一点の曇りもなく、本気そのもの。"
translation = "비너스의 눈에는 한 점의 흐림도 없이 진심 그 자체였다."

[[dialogue]]
speaker = "unk"
original = "いつも不思議に思うのだけれど――"
translation = "항상 신기하게 생각하는 것이지만――"

[[dialogue]]
speaker = "unk"
original = "彼女の言葉を受けると、何故か、無茶な時でもあと１歩前に踏み出してみようという『気力』が湧いて来るのだ。"
translation = "그녀의 말을 들으면 왠지 무리일 때조차 한 발짝 더 앞으로 내디뎌보자는 『기력』이 솟아나는 것이다."

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「……わかりました」"
translation = "「……알겠습니다.」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「その勝負、お受けします……！」"
translation = "「그 승부, 받아들이겠어요……!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「そう来なくっちゃ！」"
translation = "「그래야지!」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
original = "「さあ――ラスボス戦開始よ！！！」"
translation = "「자―― 라스트 보스전 시작이야!!!」"

[[dialogue]]
speaker = "フィオナ（魔王）"
original = "「参ります！」"
translation = "「갑니다!」"

[[dialogue]]
speaker = "unk"
original = "両学園でそれぞれ最強と称される星騎士の対戦が、今、始まろうとしていた――"
translation = "양 학원에서 각각 최강이라 칭송받는 성기사의 대전이 지금 시작되려 하고 있었다――"

