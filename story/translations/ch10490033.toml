[[dialogue]]
speaker = "unk"
original = "第３話,激おこ（？）ぷんぷん紅明,P"
translation = "제3화, 격노(?) 뿔난 코우메이, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。このところ忙しくて２人きりの時間が持てていなかった為、紅明と家で１日ゆっくり過ごすことになった――"
translation = "어느 휴일. 요 근래 바빠서 둘만의 시간을 갖지 못했기에 코우메이와 집에서 하루 종일 느긋하게 보내게 되었다──"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「というわけで、ダーリン<emoji=heart04>\u3000今日は思う存分、イチャイチャするっしょ～<emoji=heart04>」"
translation = "「그런 고로, 달링<emoji=heart04> 오늘은 마음껏 꽁냥거릴 거라구~<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ん～？\u3000――なんでラクシャシーフォームなのかって？\u3000守護天使セッシー曰く、この衣装の方が『バブみ』？\u3000が増すらしいんだよね♪」"
translation = "「응~? ──왜 라크샤시 폼이냐고? 수호천사 셋시 말로는 이 의상이 『바브미(모성애)』? 가 더 살아난대♪」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「なんで、夫婦気分でらぶらぶイチャイチャしたい今日みたいな日には、ぴったりかな～と思って<emoji=heart04>」"
translation = "「그래서 부부 기분으로 러브러브 꽁냥거리고 싶은 오늘 같은 날에는 딱이려나 싶어서<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「それで、今日は～」"
translation = "「그래서 오늘은~」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「――ダーリンと<b>マッサージ</b>がしたいっしょ<emoji=heart04>」"
translation = "「──달링이랑 <b>마사지</b>를 하고 싶슴다<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ほら、アタシはタレントの仕事、ダーリンは会長の仕事で忙しかったから、色々疲れが溜まってるっしょ？」"
translation = "「봐봐, 나는 탤런트 일, 달링은 회장 일로 바빴으니까 이런저런 피로가 쌓여있잖아?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「だから、ね？\u3000ダーリン、お願い<emoji=heart04>」"
translation = "「그러니까, 응? 달링, 부탁해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、まずは俺が紅明の体をマッサージすることになったのだが……"
translation = "그렇게 우선 내가 코우메이의 몸을 마사지하게 되었는데……"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「あっ<emoji=heart04>\u3000ダーリン、そこ利くぅ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 달링, 거기 잘 들어와……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000すごく気持ちいいっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후아……<emoji=heart04> 너무 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「はぁんっ<emoji=heart04>\u3000指、そんなに入れちゃ……感じちゃう……<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 손가락, 그렇게 넣으면…… 느껴버려……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "（普通にマッサージしてるだけだぞ……）"
translation = "(평범하게 마사지하고 있을 뿐이라고……)"

[[dialogue]]
speaker = "unk"
original = "（落ち着け俺……）"
translation = "(진정해라, 나……)"

[[dialogue]]
speaker = "unk"
original = "紅明の体に触れているだけで、俺は妙にドキドキしてしまって――"
translation = "코우메이의 몸에 닿아있는 것만으로 나는 묘하게 두근거려 버려서──"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「こいつぁすごいぜ！\u3000体が軽くて、本当に元気になったっしょ♪」"
translation = "「이거 대단한걸! 몸이 가벼워져서 정말 기운이 났슴다♪」"

[[dialogue]]
speaker = "unk"
original = "なんとか俺は、何事もなくマッサージを終えることができたのだが……"
translation = "어떻게든 나는 아무 일 없이 마사지를 마칠 수 있었지만……"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「――前にマッサージ店でバイトしてたことがある？\u3000さっすがアタシのダーリン、技能多才でそこに痺れる憧れる☆」"
translation = "「──전에 마사지 샵에서 알바한 적이 있다고? 역시 내 달링, 다재다능해서 그 점에 전율하고 동경하게 돼☆」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「って、そうじゃなくてっ！\u3000結局エッチなイタズラしないんか～い！！！」"
translation = "「아니, 그게 아니라! 결국 야한 장난은 안 하는 거냐구!!!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「アタシがマッサージ中にちょっと色っぽい声を出したり！\u3000わざとダーリンの腕に胸を当てたり、お尻振ったりしてたのに！！\u3000一切乗ってこないとか！！！」"
translation = "「내가 마사지 중에 좀 야한 목소리를 내거나! 일부러 달링 팔에 가슴을 대거나, 엉덩이를 흔들거나 했는데!! 전혀 안 넘어오다니!!!」"

[[dialogue]]
speaker = "unk"
original = "わざとだったのか……"
translation = "일부러였던 건가……"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「そりゃそうよ！\u3000当ててんのよ！？\u3000彼女がこれだけ露骨に誘ってるのに、乗ってこない彼氏がいるかーーーっ！！！」"
translation = "「당연하지! 대고 있다니까!? 여자친구가 이렇게 노골적으로 유혹하는데 안 넘어오는 남자친구가 어디 있어──!!!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「なんで変な自制心を発揮してるのさ！？\u3000激おこぷんぷん丸～！」"
translation = "「왜 이상한 자제심을 발휘하는 거야!? 완전 뿔났어!」"

[[dialogue]]
speaker = "unk"
original = "と俺の頬を両手で挟むと、ふにふにして来る。"
translation = "라며 내 볼을 양손으로 잡고 조물조물거린다."

[[dialogue]]
speaker = "unk"
original = "俺はそこでふと、前に聞いた『紅明は怒るのが苦手』という話を思い出し――"
translation = "나는 거기서 문득 전에 들었던 『코우메이는 화내는 걸 잘 못한다』는 이야기를 떠올리고──"

[[dialogue]]
speaker = "unk"
original = "あれ？\u3000もしかして今……怒られてる？"
translation = "어라? 혹시 지금…… 혼나고 있는 거야?"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「どう見てもそうっしょ！\u3000――って、ダーリン、その口元を押さえる仕草はなによ！？」"
translation = "「누가 봐도 그렇잖아! ──어라, 달링, 그 입가를 가리는 제스처는 뭐야!?」"

[[dialogue]]
speaker = "unk"
original = "俺の彼女、怒り方可愛すぎ……"
translation = "내 여자친구, 화내는 방식이 너무 귀여워……"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「その可愛いって言い方、なんか嬉しくないんだが！？」"
translation = "「그 귀엽다는 말, 왠지 기쁘지 않은데!?」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女に、バイトしていた時の癖で、マッサージ中に変なことをしてはダメだと自制してしまったと伝える。"
translation = "나는 그녀에게 알바하던 시절의 버릇 때문에 마사지 중에 딴짓을 하면 안 된다고 자제해 버렸다고 전한다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「――む～っ！\u3000なら、今からダーリンにはアタシの体に対する『フリータッチ権』を与えるっしょ！」"
translation = "「──무~! 그럼, 지금부터 달링에게는 내 몸에 대한 『프리 터치권』을 주겠어!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「この権利は永久不滅で、ダーリンはいついかなる時でも、アタシの体は好きに触っていいし、揉んでいいものとします！\u3000事前の許可やムード作りは必要ありません！」"
translation = "「이 권리는 영구불멸이며, 달링은 언제 어느 때라도 내 몸을 마음껏 만져도 되고, 주물러도 되는 것으로 합니다! 사전 허가나 분위기 잡기는 필요 없습니다!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「つまりは、アタシが『マッサージしたい』って言った時は、もっとイチャイチャしようぜってことっしょ♪\u3000というわけで～」"
translation = "「즉, 내가 『마사지하고 싶어』라고 말했을 때는, 더 꽁냥거리자는 뜻이라구♪ 그런 고로~」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ダーリン、次は――<b>ここ</b>のマッサージをして欲しいっしょ<emoji=heart04>」"
translation = "「달링, 다음은──<b>여기</b> 마사지를 해줬으면 좋겠다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って紅明が人差し指で触れたのは――彼女の唇だった。"
translation = "그렇게 말하며 코우메이가 검지 손가락으로 가리킨 곳은── 그녀의 입술이었다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「んっ……<emoji=heart04>」"
translation = "「음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は言葉の代わりに、彼女にそっと顔を寄せることで応える。"
translation = "나는 말 대신, 그녀에게 살며시 얼굴을 가까이 대는 것으로 대답한다."

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ダーリン……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「달링……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「ちゅっ、んちゅっ……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「쪽, 츄릅……<emoji=heart04> 응…… 츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しばらくして、唇が離れると――"
translation = "잠시 후, 입술이 떨어지자──"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「……ふぅ<emoji=heart04>\u3000……さてダーリン、次はどうする？」"
translation = "「……후우<emoji=heart04> ……자, 달링, 다음은 어떻게 할래?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「――おっぱい揉む？\u3000うしし<emoji=heart04>」"
translation = "「──가슴 주무를래? 우시시<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、悪戯っぽく笑う紅明なのだった――"
translation = "그렇게 말하며 장난스럽게 웃는 코우메이였다──"

