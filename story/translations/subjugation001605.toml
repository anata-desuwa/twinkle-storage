[[dialogue]]
speaker = "unk"
original = "「もう１日だけ」と約束をして、ハロウィンの日をループさせたジャクリーヌを今度は学園の外のお祭りへと連れ出してみた。"
translation = "「딱 하루만 더」라고 약속을 하고, 할로윈 날을 루프시킨 자클린을 이번에는 학원 밖의 축제로 데리고 나가 보았다."

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆ♪\u3000こっちも楽しそうなのー♪」"
translation = "「유~ 유유유♪ 여기도 즐거워 보이는유~!♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「学園の外もすごい賑わいですね……まるで、みんなハロウィンがループしてることを気づいていないような感じです……」"
translation = "「학원 밖도 엄청 북적이네요…… 마치 모두 할로윈이 루프하고 있다는 걸 눈치채지 못한 것 같은 느낌이에요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「事件になってない時点で、ループに気づいているのはやっぱり自分たちだけ……？\u3000そ、そう言われれば、その通りです……」"
translation = "「사건이 되지 않은 시점에서, 루프를 눈치채고 있는 건 역시 우리뿐……? 그, 그렇게 말씀하시니 그렇네요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「うぅぅ……なんだかわたし、また怖くなって来ちゃいました……」"
translation = "「으으으…… 왠지 저, 다시 무서워지기 시작했어요……」"

[[dialogue]]
speaker = "unk"
original = "今のところ悪意は感じないから\nもう少しだけリラックスしよう"
translation = "지금으로선 악의는 느껴지지 않으니까\\n조금만 더 편하게 있자"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ゆーちゃんもそう言うなら……うまく気持ちを落ち着かせられるか分かりませんが、なるべくそうしてみます……！」"
translation = "「유짱도 그렇게 말한다면…… 기분을 잘 진정시킬 수 있을지 모르겠지만, 가급적 그렇게 해 볼게요……!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆゆ！\u3000あそこには余と同じような服を着ている人もいるのー！」"
translation = "「유유유! 저기에는 짐과 비슷한 옷을 입고 있는 사람도 있는유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆゆ～ん♪\u3000お仲間なの～♪」"
translation = "「유유~♪ 동료인유~♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「あっちには幽霊もいるの～♪\u3000人間たちはこんな服まで作れてすごいゆ！」"
translation = "「저기에는 유령도 있는유~♪ 인간들은 이런 옷까지 만들 수 있다니 대단한유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「人間たちも魔族もオシャレなの！\u3000でも、その中でも余が一番オシャレで綺麗なのは変わらないゆ！」"
translation = "「인간들도 마족들도 멋쟁이인유! 하지만 그중에서도 짐이 제일 멋지고 아름다운 건 변함없는유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「理事長のヘレナさんはファッションデザイナーもやっていて、そこのブランドのものみたいです」"
translation = "「이사장인 헬레나 씨는 패션 디자이너도 하고 계셔서, 그쪽 브랜드 물건인가 봐요」"

[[dialogue]]
speaker = "unk"
original = "えっ？\u3000あのコスプレみたいなのも？"
translation = "엣? 저 코스프레 같은 것도?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はい。最近は普通の洋服だけじゃなくて、コスプレ部門も立ち上げたって言ってました」"
translation = "「네. 최근에는 평범한 양복뿐만 아니라, 코스프레 부문도 런칭했다고 하셨어요」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そのヘレナって人にも会ってみたいゆ！\u3000余とどっちがオシャレなのか、勝負してみたいのー！」"
translation = "「그 헬레나라는 사람도 만나보고 싶은유! 짐이랑 어느 쪽이 더 멋쟁이인지 승부해보고 싶은유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「デ、デザイナーさんで、しかもセレブなんですよ……？\u3000確かにジャクリーヌさんの服、とっても可愛くてわたしも好きですけど……難しいと思うなあ……」"
translation = "「디, 디자이너인 데다 셀럽이라구요……? 분명 자클린 씨의 옷, 정말 귀여워서 저도 좋아하지만…… 어려울 거라 생각해요……」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー！」"
translation = "「유-!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「女の子だから、オシャレは気にして当然なの！\u3000だから負けられないゆ！\u3000あとで絶対ヘレナって人にも会わせるの～！」"
translation = "「여자아이니까 멋 부리는 것에 신경 쓰는 건 당연한유! 그러니까 질 수 없는유! 나중에 꼭 헬레나라는 사람도 만나게 해주는유~!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わ、わかりました……ただ忙しい人だから期待しないでくださいね？」"
translation = "「아, 알겠어요…… 다만 바쁜 분이니까 기대는 하지 말아 주세요?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「頼んだゆ～！」"
translation = "「부탁하는유~!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆっゆ♪\u3000お菓子♪\u3000お菓子♪」"
translation = "「유~유유유유♪ 과자♪ 과자♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ジャクリーヌさん、ホントに元気ですね……うらやましいです……わたしもこうなれたら……」"
translation = "「자클린 씨, 정말 활기차네요…… 부러워요…… 저도 이렇게 될 수 있다면……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「でもジャクリーヌさん……見てるとこっちまで元気がもらえる気がして、不思議です……」"
translation = "「하지만 자클린 씨…… 보고 있으면 이쪽까지 기운을 얻는 기분이 들어서 신기해요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「っと、ここだけ特に賑やかですね。人だかりがいっぱい……あれ？\u3000あそこにいるのはもしかして……」"
translation = "「앗, 여기만 특히 북적이네요. 인파가 가득…… 어라? 저기 있는 건 설마……」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「あら？\u3000そこにいらっしゃるのは……」"
translation = "「어머? 저기 계시는 분은……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「セナリィさん……こ、こんばんはです」"
translation = "「세나리 씨…… 안, 안녕하세요」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「こんばんはですわ、ヒトリ様。会長様も。今日はどうされたんです？」"
translation = "「안녕하신가요, 히토리 님. 회장 님도. 오늘은 어찌 된 일이신지요?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、あの……え、えっと、実は……」"
translation = "「아, 저기…… 에, 에또, 사실은……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「やあやあ、こんなところで奇遇だね～、会長。一緒にいるのは不知火ヒトリさん、だったよね？\u3000……あれ？\u3000後ろにいるのは知らない顔だね～」"
translation = "「야아야아, 이런 곳에서 기우네~, 회장. 같이 있는 건 이즈하라 히토리 씨였지? ……어라? 뒤에 있는 건 모르는 얼굴이네~」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はいっ……こんばんはです。<ruby>立朽<rt>たちくち</rt></ruby>さん」"
translation = "「네, 넵…… 안녕하세요. 타치쿠치 씨」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「マインでいいよ～って言っても、愛称じゃ呼びづらいか～。ネーゼマインでいいよ。私もヒトリさんって呼ぶからさ♪」"
translation = "「마인이라고 불러도 된다니까~ 라고 해도, 애칭으론 부르기 힘드려나~. 네제마인으로 불러줘. 나도 히토리 씨라고 부를 테니까♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、ありがとうございます、ネーゼマインさん。……それで、彼女のことなんですが」"
translation = "「아, 감사합니다, 네제마인 씨. ……그래서, 얘 말인데요」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余は、ジャクリーヌ・オー・ランタンだゆ！\u3000トリックオアトリート♪\u3000お菓子をよこすゆ！」"
translation = "「짐은, 자클린 오 랜턴인유! 트릭 오어 트릿♪ 과자를 내놓는유!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ♪\u3000この子、初対面でいきなりお菓子を貰おうとするとは、面白いね～」"
translation = "「캬하하하♪ 이 아이, 초면에 다짜고짜 과자를 받으려 하다니 재밌네~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「んん？\u3000名前だけではなくこの気配……ジャクリーヌ様は、あの『ジャック・オー・ランタン』様とご関係が？」"
translation = "「음음? 이름뿐만 아니라 이 기척…… 자클린 님은 그 『잭 오 랜턴』 님과 관계가?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はい……前回のハロウィンでわたしが召喚した、ジャックさんの娘さんですね」"
translation = "「네, 넵…… 지난 할로윈 때 제가 소환했던 잭 씨의 따님이에요」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「なるほどですわ！\u3000見た目こそ人型になっておりますが、星力とは異なるその異形の力、普通の魔族とも異なるその気配、まごうことなきジャック様のご息女ですわ！」"
translation = "「그렇군요! 겉모습은 인간형이 되었습니다만, 성력과는 다른 그 이형의 힘, 보통 마족과도 다른 그 기척, 틀림없는 잭 님의 자제분이십니다!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「へ～、あのジャックさんに娘がいたとはね～。……おーしよし～、ジャクリーヌちゃん、可愛いね～♪」"
translation = "「헤~, 그 잭 씨에게 딸이 있었다니~. ……오~야 오야~, 자클린 짱, 귀엽네~♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余が可愛いのは当然なのー！」"
translation = "「짐이 귀여운 건 당연한유!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははっ♪\u3000この子、自分で言っちゃうんだ～♪\u3000ますます面白～い♪」"
translation = "「캬하핫♪ 이 아이, 자기가 직접 말하네~♪ 점점 더 재밌어~♪」"

[[dialogue]]
speaker = "unk"
original = "ところで２人はここで何してるんだ？"
translation = "그건 그렇고 둘은 여기서 뭐 하고 있어?"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「私たちですか？\u3000マインと一緒にここで露店を出しておりますの！」"
translation = "「저희 말인가요? 마인과 함께 여기서 노점을 열고 있답니다!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そそ！\u3000前回とは違って、今年は学園の外でだけどね～」"
translation = "「그래그래! 지난번과는 다르게 올해는 학원 밖이지만 말야~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「前回は最終的にジャック様が暴走したことで計画が破綻しましたが、今年は念には念を入れましたの！」"
translation = "「지난번엔 최종적으로 잭 님이 폭주하신 탓에 계획이 파탄 났지만, 올해는 만전을 기했답니다!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ん～、なにか特別なことってしてたっけ～？」"
translation = "「음~, 뭔가 특별한 걸 했었나~?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「今回はかなり以前から計画して、サラン様に大量のお菓子を準備してもらいましたわ！」"
translation = "「이번에는 꽤 예전부터 계획해서, 사란 님께 대량의 과자를 준비해 달라고 했습니다!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そういえばそうだったね～」"
translation = "「그러고 보니 그랬었지~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「今年こそは前回の目標だった２０００個超えを……いえ、夢は大きく３０００個完売を！\u3000ほほっ♪\u3000ほほほっ♪\u3000やってみせますわ～♪」"
translation = "「올해야말로 지난번 목표였던 2000개 돌파를…… 아니요, 꿈은 크게 3000개 완판을! 호호♪ 호호호♪ 해내 보이겠어요~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おぉ～♪\u3000セナリィ、いつになく燃えてるね～♪」"
translation = "「오오~♪ 세나리, 평소보다 불타오르고 있네~♪」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「目の前に大金になる可能性があるんですのよ？\u3000燃えるに決まっておりますわー！」"
translation = "「눈앞에 큰돈이 될 가능성이 있는걸요? 불타오르는 게 당연하지 않겠습니까!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひっ♪\u3000いい表情してるじゃ～ん！\u3000じゃ、私もたまには頑張っちゃおうかな～」"
translation = "「니히히♪ 좋은 표정 짓고 있잖아! 그럼 나도 가끔은 힘 좀 써볼까나~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「頼みますわよ、マイン！」"
translation = "「부탁해요, 마인!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「まっかせてー！」"
translation = "「맡겨줘-!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～ん♪\u3000お菓子がこ～んなにたくさんあるのー！\u3000これ、ちょっと食べてもいいゆ？」"
translation = "「유~♪ 과자가 이~렇게나 잔뜩 있는유! 이거 조금 먹어도 되는유?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ちょっとお待ちなさい！\u3000私にいい考えがありますの！」"
translation = "「잠시 기다려 주세요! 제게 좋은 생각이 있답니다!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「前回のハロウィンでは、あなたのお父様であるジャック・オー・ランタン様に、お菓子１つで一芸してもらいましたの！」"
translation = "「지난 할로윈 때는 당신의 아버님인 잭 오 랜턴 님께, 과자 하나에 장기 하나를 보여달라고 했었습니다!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「それで観客にお菓子を複数買いしてもらって、大量のお菓子を売りさばくことができたんですのよ！」"
translation = "「그걸로 관객들에게 과자를 여러 개 사게 해서, 대량의 과자를 팔아치울 수 있었답니다!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ジャクリーヌ様にも同じことができるのであれば、好きなだけ食べさせてあげてもいいですわ！」"
translation = "「자클린 님도 똑같은 것을 할 수 있다면, 원하는 만큼 먹게 해드려도 좋아요!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「さぁ！\u3000いかがですの！？」"
translation = "「자! 어떠신지요!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おぉ～！\u3000ビシィッと言ったね～」"
translation = "「오오~! 딱 잘라 말했네~」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「そんなのお菓子前だゆ！」"
translation = "「그 정도야 과자 먹기인유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「パパがやったのなら、余にもできちゃうのー！」"
translation = "「아빠가 했다면 짐도 할 수 있는유!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「では早速、見せてくださいな！」"
translation = "「그럼 당장 보여주시지요!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「余の本気、そこで見てるのー！」"
translation = "「짐의 본때를 거기서 지켜보는유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「へんしーん、なの！」"
translation = "「변신, 인유!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆっゆ♪」"
translation = "「유~유유유유♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははっ♪\u3000この子、カボチャのお化けにも変身できちゃうんだ～？\u3000というかむしろ、こっちの方が本当の姿なのかな～？」"
translation = "「캬하핫♪ 이 아이, 호박 괴물로도 변신할 수 있구나~? 그보다 오히려 이쪽이 원래 모습이려나~?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わわわ！？\u3000本当に変身しちゃった……ジャックさんと違って少し小さい感じ？\u3000かわいいです～♪」"
translation = "「와와와!? 정말 변신해 버렸어…… 잭 씨와는 달리 조금 작은 느낌? 귀여워요~♪」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほーほっほ！\u3000さっすがジャック様のご息女ですわ！\u3000お父様と同じく、最高のトリックオアトリートを見せてあげてくださいまし♪」"
translation = "「호~호호! 과연 잭 님의 자제분이십니다! 아버님과 마찬가지로 최고의 트릭 오어 트릿을 보여주세요♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「任せるのー！」"
translation = "「맡겨두는유!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひっ♪\u3000さぁ、お手並み拝見といきますか～」"
translation = "「니히히♪ 자, 솜씨 좀 구경해 볼까~」"

[[dialogue]]
speaker_original = "流星学園１年生"
speaker_translation = "유성 학원 1학년"
original = "「ねぇ、あれを見てくださいます？\u3000前回のハロウィンを楽しませてくれた、ジャック・オー・ランタン様では！？\u3000あれ……でもちょっと小さいかも？」"
translation = "「어머, 저걸 좀 보세요! 지난 할로윈을 즐겁게 해준 잭 오 랜턴 님 아니야!? 어라…… 근데 좀 작을지도?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆっゆ♪\u3000こっちを見るの～♪」"
translation = "「유~유유유유♪ 여기를 보는유~♪」"

[[dialogue]]
speaker_original = "流星学園１年生"
speaker_translation = "유성 학원 1학년"
original = "「キャーーーーッ！\u3000とっても可愛いですのー<emoji=heart04>\u3000ほら、そこのあなたも見てくださいな！」"
translation = "「꺄아아악! 너무 귀여워요~<emoji=heart04> 봐요, 거기 당신도 좀 보세요!」"

[[dialogue]]
speaker_original = "新星学園２年生"
speaker_translation = "신성 학원 2학년"
original = "「ホントだ～！\u3000ほらほら、前みたいに踊ってみて～♪」"
translation = "「진짜다~! 자자, 예전처럼 춤춰 봐~♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆ～ん♪\u3000ゆ～ん♪\u3000ゆ～ん♪」"
translation = "「유~♪ 유~♪ 유~♪」"

[[dialogue]]
speaker_original = "附属校３年生"
speaker_translation = "부속교 3학년"
original = "「うわ～、なんだか不思議な踊り～。なぜかずっと見てられちゃう♪」"
translation = "「우와~ 왠지 신기한 춤~. 왠지 계속 보게 돼♪」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「おーほっほっほ♪\u3000こちらのショーを見たければ、皆さんこのお菓子を買って、彼女にプレゼントするべしですわ～」"
translation = "「오~홋홋호♪ 이 쇼를 보고 싶으시면, 여러분 이 과자를 사서 그녀에게 선물해야 합니다~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「彼女こそはハロウィンの化身。本日はトリック＆トリートですのよ～♪」"
translation = "「그녀야말로 할로윈의 화신. 오늘은 트릭 & 트릿인 거예요~♪」"

[[dialogue]]
speaker_original = "流星学園１年生"
speaker_translation = "유성 학원 1학년"
original = "「トリック＆トリート～♪\u3000じゃあ、私はこのクッキーをくださいな♪」"
translation = "「트릭 & 트릿~♪ 그럼 저는 이 쿠키를 주세요♪」"

[[dialogue]]
speaker_original = "新星学園２年生"
speaker_translation = "신성 학원 2학년"
original = "「これは迷っちゃうね～♪\u3000うーん……あのカボチャさんに惹かれちゃったから、私はこのおっきなカボチャケーキをもらいます！」"
translation = "「이거 고민되네~♪ 음…… 저 호박 씨에게 이끌려 버렸으니까, 저는 이 커다란 호박 케이크를 받을게요!」"

[[dialogue]]
speaker_original = "附属校３年生"
speaker_translation = "부속교 3학년"
original = "「どれも美味しそうです～<emoji=heart04>\u3000わたしには、このドーナツを頂戴な<emoji=heart04>」"
translation = "「전부 맛있어 보여요~<emoji=heart04> 저에게는 이 도넛을 주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほ～ほっほ♪\u3000毎度お買い上げありがとうございますですわ～♪」"
translation = "「호~호호♪ 매번 구매해 주셔서 감사드려요~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひひっ♪\u3000セナリィってば、懲りずに今度は娘さんにまで芸をお願いするなんて、ホントおっかし～！」"
translation = "「니히히히♪ 세나리도 참, 굴하지 않고 이번에는 딸한테까지 장기를 부탁하다니, 진짜 웃겨!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ジャクリーヌ様はお菓子が食べたい、私はその横でお菓子を売りたい、目的が一致したまでのことですわ！」"
translation = "「자클린 님은 과자가 먹고 싶고, 저는 그 옆에서 과자를 팔고 싶고, 목적이 일치했을 뿐입니다!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「それにしても前回に引き続き、今回も飛ぶように売れて……感謝いたしますわ、ヒトリ様！」"
translation = "「그나저나 지난번에 이어 이번에도 불티나게 팔려서…… 감사드려요, 히토리 님!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「お菓子を売ってる……というか、食べてるのはジャクリーヌさんで、わたしは何もしていませんから……」"
translation = "「과자를 팔고 있는 건…… 아니, 먹고 있는 건 자클린 씨고, 저는 아무것도 하지 않았으니까요……」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「何を言ってますの、ヒトリ様！\u3000前回も今回も、あなた様の『幽霊と対話できる』という特別な力がなければ、このように楽しい時間は生まれませんでしたわ」"
translation = "「무슨 말씀을 하시는 거예요, 히토리 님! 지난번도 이번도, 당신의 『유령과 대화할 수 있는』 특별한 힘이 없었다면, 이런 즐거운 시간은 태어나지 않았을 거예요」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「だから感謝しておりますの。ありがとうございますわ、ヒトリ様」"
translation = "「그러니 감사하고 있답니다. 고마워요, 히토리 님」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「いえ、そんな……この力のこと、そういう風に言ってもらえるなんて思ってなくて……こちらこそ、ありがとうございます……」"
translation = "「아니요, 그런…… 이 힘에 대해 그렇게 말씀해 주실 줄 몰라서…… 저야말로 감사해요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「た、ただ……ジャクリーヌさんをこのままにして、大丈夫なんでしょうか？\u3000前回も最後はあんなことになっちゃいましたし……ね、ゆーちゃんもそう思うよね？」"
translation = "「다, 다만…… 자클린 씨를 이대로 둬도 괜찮은 걸까요? 지난번에도 마지막에는 그렇게 돼버렸고…… 그치, 유짱도 그렇게 생각하지?」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー！\u3000ゆー！」"
translation = "「유-! 유-!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「そうそう同じことは二度も起こりませんわ！\u3000だから大丈夫に決まっておりますの！」"
translation = "「그렇게 똑같은 일이 두 번이나 일어나지는 않아요! 그러니까 괜찮은 게 당연하답니다!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そうかな～？\u3000二度あることは三度あるって言うしなぁ～」"
translation = "「그럴까나~? 두 번 있는 일은 세 번도 있다고들 하잖아~」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「今回はカボチャ頭になってる方はいませんし！\u3000いざとなったら会長様が何とかしてくださいますわ！\u3000ね！？」"
translation = "「이번에는 호박 머리가 된 분도 없고요! 만약의 사태에는 회장 님이 어떻게든 해주실 거예요! 그쵸!?」"

[[dialogue]]
speaker = "unk"
original = "ま、まあ、その時が来たらね"
translation = "뭐, 뭐어, 그때가 오면 말이지"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そう簡単に上手くいくかな～？」"
translation = "「그렇게 쉽게 잘 풀리려나~?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「うるさいですわ！\u3000今回こそは絶対に、大丈夫なはずですのよ～！」"
translation = "「시끄러워요! 이번에야말로 절대로 괜찮을 거란 말이에요~!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ゆーっゆっゆっゆっゆ♪\u3000トリック＆トリート♪\u3000ダンスのお礼にいーっぱいお菓子よこすゆ♪」"
translation = "「유~유유유유♪ 트릭 & 트릿♪ 댄스 답례로 과자 잔~뜩 내놓는유♪」"

[[dialogue]]
speaker_original = "附属校３年生"
speaker_translation = "부속교 3학년"
original = "「チョコレートどうぞです～♪\u3000わたしの奢りです！」"
translation = "「초콜릿 드릴게요~♪ 제가 쏘는 거예요!」"

[[dialogue]]
speaker_original = "流星学園１年生"
speaker_translation = "유성 학원 1학년"
original = "「かわいいダンスを見せてくださったお礼ですの！\u3000どんどん食べてくださいまし！」"
translation = "「귀여운 춤을 보여주신 답례예요! 팍팍 드세요!」"

[[dialogue]]
speaker_original = "新星学園２年生"
speaker_translation = "신성 학원 2학년"
original = "「いえーい！\u3000わたしからはクッキーをどうぞ！」"
translation = "「이예~! 저한테서는 쿠키를 받으세요!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「おぉ～♪\u3000みんながジャクリーヌちゃんにお菓子を恵んでるよ～♪」"
translation = "「오오~♪ 모두가 자클린 짱에게 과자를 적선하고 있어~♪」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ、あわわ……あんなにたくさん買っちゃって……みなさん、お金とか大丈夫なんでしょうか……」"
translation = "「아, 아와와…… 저렇게 많이 사버리고…… 여러분, 돈 같은 거 괜찮은 걸까요……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃははっ♪\u3000これも一つの推し活ってやつ？\u3000ヒトリさんも気持ちはわかるんじゃない？」"
translation = "「캬하핫♪ 이것도 일종의 '최애 활동'이란 거? 히토리 씨도 그 마음 알 것 같지 않아?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、それはそうですけど……なんだか嫌な予感しかしなくて……」"
translation = "「그, 그건 그렇지만…… 왠지 불길한 예감밖에 안 들어서……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それは私もだけどね～。まあ、セナリィが楽しそうだから、いいんじゃないかな？」"
translation = "「그건 나도 그렇지만 말야~. 뭐, 세나리가 즐거워 보이니까 괜찮지 않을까?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「は、はぁ……」"
translation = "「하, 하아……」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほーほっほっほっほ♪\u3000どんどん買って、どんどんプレゼントしてくださいまし～！」"
translation = "「호~홋홋홋호♪ 팍팍 사고, 팍팍 선물해 주세요~!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひっ♪\u3000騒ぎを聞きつけて、さらに人が集まってきてるね～！\u3000これ、収集つかないんじゃない？」"
translation = "「니히히♪ 소문을 듣고 사람들이 더 모여들고 있네~! 이거 수습 안 되는 거 아냐?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「そんなの知りませんわ～！\u3000売れるのでしたらもう何も気にしませんわー！」"
translation = "「그런 건 모릅니다~! 팔린다면 이제 아무것도 신경 쓰지 않겠어요-!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひゃっ！？\u3000お、おおお、押さないでくださいー！？」"
translation = "「히익!? 미, 미미미, 밀지 마세요-!?」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー！？\u3000ゆー！？」"
translation = "「유-!? 유-!?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ふ、ふふ、ふふふふ！\u3000ほーほっほっほっほ♪\u3000こんなに上手くいくなんて、まるで夢のようですわ～！」"
translation = "「후, 후후, 후후후후! 호~홋홋홋호♪ 이렇게 잘 풀리다니, 마치 꿈만 같아요~!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あーあ、こりゃもう何も見えてないや……自分でフラグ立てちゃってるけど大丈夫～？」"
translation = "「아-아, 이젠 아무것도 안 보이네…… 스스로 플래그를 세우고 있는데 괜찮으려나~?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほほ♪\u3000ほほほ♪\u3000ほーほっほっほっほ♪\u3000これで私も億万長者ですわ～！」"
translation = "「호호♪ 호호호♪ 호~홋홋홋호♪ 이걸로 저도 억만장자예요~!」"

[[dialogue]]
speaker = "unk"
original = "無事セナリィの目標である金額に売り上げが達したそうだが、この騒ぎはハロウィンの終了ぎりぎりまで続いたのだった。"
translation = "무사히 세나리의 목표 금액에 매출이 도달한 모양이었으나, 이 소동은 할로윈이 종료될 때까지 계속되었다."

[[dialogue]]
speaker = "unk"
original = "その後、とんでもないことが起こるとも知らずに……。"
translation = "그 후, 엄청난 일이 일어날지도 모른 채……."

