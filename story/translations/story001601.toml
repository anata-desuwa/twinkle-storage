[[dialogue]]
speaker = "unk"
original = "バンデット・セナリィが総帥を名乗る秘密結社『ゴールデングース』──その事務所。"
translation = "밴디트 세나리가 총수를 자처하는 비밀 결사 『골든 구스』── 그 사무소."

[[dialogue]]
speaker = "unk"
original = "『ゴールデングース』設立から少なからず月日が経過したものの、未だ正社員は社長のセナリィのみ。一人会社である。"
translation = "『골든 구스』 설립으로부터 적지 않은 시일이 경과했지만, 여전히 정직원은 사장인 세나리뿐. 1인 기업이다."

[[dialogue]]
speaker = "unk"
original = "そんな彼女は今、九浄家当主・九浄ヘレナから大型依頼を引き受け──そして、難儀していた。"
translation = "그런 그녀는 지금, 쿠죠 가문 당주 쿠죠 헬레나로부터 대형 의뢰를 인수하여── 고전하고 있었다."

[[dialogue]]
speaker = "セナリィ"
original = "「さて、充填開始から半日。どのくらい溜まったかしら？」"
translation = "「자, 충전 시작으로부터 반나절. 어느 정도 모였으려나?」"

[[dialogue]]
speaker = "セナリィ"
original = "「……はぁ！？\u3000まだ４０パーセントぽっち！？\u3000なんなんですの、このエネルギー効率の悪さは！」"
translation = "「……하아!? 아직 고작 40퍼센트!? 뭡니까, 이 에너지 효율의 나쁨은!」"

[[dialogue]]
speaker = "セナリィ"
original = "「仮に出力が３倍になっていたとしても、エネルギー消費が１０倍では、まるで釣り合いが取れませんわ」"
translation = "「설령 출력이 3배가 되었다 한들, 에너지 소비가 10배라면 도저히 수지가 맞지 않아요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「他ならぬヘレナ様からの依頼な上、心躍る内容だったので、二つ返事で引き受けてしまいましたけど……」"
translation = "「다름 아닌 헬레나 님께서 하신 의뢰인 데다, 가슴 설레는 내용이라 두말 않고 수락했습니다만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「少々、安請け合いしすぎだったかもしれませんわね……今回の依頼、ちょっとばかし骨が折れそうですわ」"
translation = "「조금 과하게 쉽게 생각했던 것일지도 모르겠군요…… 이번 의뢰, 조금쯤은 고생 좀 하겠어요.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「新種のモンスターが次々と発見されているのは、貴殿も聞き及んでおろう」"
translation = "「신종 몬스터가 차례차례 발견되고 있는 것은 귀공도 들었겠지.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、なんでも機械の装甲を持ち、今までとは比にならぬほど強化されたモンスターだとか」"
translation = "「예, 듣자 하니 기계 장갑을 지녔으며 지금까지와는 비교도 안 될 정도로 강화된 몬스터라더군요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「幸いにもまだ遭遇していませんけれど、いざ交戦となったら私でも勝てるかは定かではありませんわね」"
translation = "「다행히 아직 조우하지는 않았습니다만, 막상 교전하게 된다면 저조차 이길 수 있을지는 확실치 않아요.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そうだな。太刀打ちできるのはよほどの猛者に限られるだろう。それほどまでに彼奴等は強敵である──そこでだ！」"
translation = "「그렇지. 맞설 수 있는 자는 어지간한 강자로 한정될 것이다. 그 정도로 그놈들은 강적이다── 그래서다!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「我が九浄家は驚異的な開発力を駆使し、その結果、見事、疑似ノヴァフォーム試作品の開発に成功した！」"
translation = "「우리 쿠죠 가문은 경이적인 개발력을 구사하여 그 결과, 멋지게 의사 노바 폼 시제품 개발에 성공했다!」"

[[dialogue]]
speaker = "セナリィ"
original = "「なんですって……？\u3000ノヴァフォームと言えば、ごく一部の星騎士だけが発現しているという超強力フォーム……それってとんでもないことではありませんの？」"
translation = "「뭐라고요……? 노바 폼이라고 하면 극히 일부의 성기사만이 발현하고 있다는 초강력 폼…… 그거 엄청난 일 아닙니까?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ、前例のないとんでもないことであるぞ。ヘレナちゃんを、そして、当家の開発陣を褒めるがよい。もちろん、まだ公には内密である」"
translation = "「음, 전례 없는 대단한 일이지. 헬레나짱을, 그리고 당가의 개발진을 칭찬하도록 해라. 물론 아직 대외적으로는 비밀이다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「とても私好みですわ。よもや、その疑似ノヴァフォーム完成の自慢のためだけに、ここへ足を運ばれたわけではありませんわよね？」"
translation = "「정말 제 취향이군요. 설마 그 의사 노바 폼 완성 자랑질만을 위해 여기까지 발걸음을 하신 건 아니겠죠?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ヘレナちゃんはそんなに暇ではないからな。ここまで足を運んだ理由は他でもない」"
translation = "「헬레나짱은 그렇게 한가하지 않으니까. 여기까지 온 이유는 다름 아니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「この試作品を──セナリィ、貴殿に試してほしくてな」"
translation = "「이 시제품을── 세나리, 귀공이 시험해 줬으면 해서 말이다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「栄えある試作品１号を、この私に……託すということですの！？」"
translation = "「영광스러운 시제품 1호를 저에게…… 맡기겠다는 말씀입니까!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「うむ。もちろん当家でも試してはいるが、サンプルは多ければ多いほど良いのでな。特に実践的なデータが欲しい」"
translation = "「음. 물론 당가에서도 테스트하고 있지만, 샘플은 많으면 많을수록 좋으니까 말이다. 특히 실전적인 데이터가 필요하다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「試作品ゆえ想定外の危険も孕んでいる。従来品との差異、メリット、デメリットなどを試運転で確認してほしい」"
translation = "「시제품이기에 예상치 못한 위험도 내포하고 있다. 기존 제품과의 차이, 메리트, 데메리트 등을 시운전으로 확인해 줬으면 한다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「これは貴殿の会社、ゴールデングースへの依頼である。当然、危険度と報告内容に応じた報酬は支払う」"
translation = "「이것은 귀공의 회사, 골든 구스로의 의뢰다. 당연히 위험도와 보고 내용에 따른 보수는 지급하지.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「そうだな……疑似ノヴァフォームは、貴殿に合わせて<ruby>女帝<rt>エンプレス</rt></ruby>フォームと名付けよう。よい響きであろう？」"
translation = "「그렇지…… 의사 노바 폼은 귀공에게 맞춰 <ruby>여제<rt>엠프레스</rt></ruby> 폼이라 이름 붙이도록 하마. 좋은 울림이지?」"

[[dialogue]]
speaker = "セナリィ"
original = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォーム……！？」"
translation = "「<ruby>여제<rt>엠프레스</rt></ruby> 폼……!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「承知いたしました。この依頼、慎まずにお引き受けいたしますわ！\u3000朗報をお待ちくださいませ！」"
translation = "「알겠습니다. 이 의뢰, 황송하게도 수락하겠어요! 낭보를 기다려 주시길!」"

[[dialogue]]
speaker = "セナリィ"
original = "「完成したばかりの新作！\u3000従来品を大きく上回る驚異的かつ圧倒的な超火力！\u3000危険を孕んだ試作品のテストプレイ！」"
translation = "「갓 완성된 신작! 기존 제품을 크게 상회하는 경이적이고도 압도적인 초화력! 위험을 내포한 시제품의 테스트 플레이!」"

[[dialogue]]
speaker = "セナリィ"
original = "「こんなにもトキメくワードのバーゲンセールに、心躍らぬ者がいて！？」"
translation = "「이렇게나 설레는 단어들의 바겐세일에 가슴 뛰지 않을 자가 있을까요!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「しかしながら、フルチャージして稼働時間は２０分に満たず、リチャージに必要なのは、およそ２７時間」"
translation = "「하지만 풀 차지하고 가동 시간은 20분도 채 되지 않는데, 리차지에 필요한 시간은 약 27시간.」"

[[dialogue]]
speaker = "セナリィ"
original = "「この燃費の悪さは、いかんともし難いですわね。気軽に試すには充填時間が長すぎますわ」"
translation = "「이 연비의 나쁨은 어찌할 도리가 없군요. 가볍게 시험해 보기엔 충전 시간이 너무 깁니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「実際どれほどの火力が出るものか……噂の新モンスターならば、試し撃ちにはうってつけかもしれませんけど……」"
translation = "「실제로 어느 정도 화력이 나올지…… 소문의 신형 몬스터라면 시험 사격에는 안성맞춤일지도 모르겠지만요……」"

[[dialogue]]
speaker = "セナリィ"
original = "「どんなに強力であろうとも、敵陣真っただ中で星力が切れて棒立ちになってしまったら、ただのカカシ。ストレス解消のサンドバッグですわ」"
translation = "「아무리 강력하다 해도 적진 한복판에서 성력이 다해 멍청히 서 있게 된다면 그저 허수아비. 스트레스 해소용 샌드백일 뿐이에요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ワンチャン、超短期の決戦兵器としてなら運用可能……ま、報告書の体裁としては、こんなとこで十分そうですわね」"
translation = "「어쩌면 초단기 결전 병기로서라면 운용 가능…… 뭐, 보고서 양식으로는 이 정도면 충분해 보이네요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「しかし、<ruby>女帝<rt>エンプレス</rt></ruby>フォームの真の実力はこの程度ではありませんわよね」"
translation = "「하지만 <ruby>여제<rt>엠프레스</rt></ruby> 폼의 진정한 실력은 이 정도가 아니겠죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「上手く使うことができれば、多くの星騎士が太刀打ちできない新型モンスターに、先んじて対処することができる……」"
translation = "「잘 사용하기만 한다면 많은 성기사가 대적할 수 없는 신형 몬스터에 앞서 대처할 수 있어……」"

[[dialogue]]
speaker = "セナリィ"
original = "「そうすれば、ゴールデングースへの仕事依頼も引く手あまた、依頼料もガッポガッポ、左団扇生活の<ruby>序曲<rt>プレリュード</rt></ruby>ですわ……！」"
translation = "「그렇게 되면 골든 구스로의 업무 의뢰도 쇄도할 테고, 의뢰비도 넝쿨째 굴러올 테지. 유유자적한 생활의 <ruby>서곡<rt>프렐류드</rt></ruby>이에요……!」"

[[dialogue]]
speaker = "？？？"
original = "「すみませーん！」"
translation = "「실례합니다~!」"

[[dialogue]]
speaker = "？？？"
original = "「誰かいらっしゃいませんかー？」"
translation = "「누구 없나요~?」"

[[dialogue]]
speaker = "セナリィ"
original = "「そう！\u3000私の秘密結社ゴールデングースこそが、星徒会をも超える最強に──」"
translation = "「그래! 나의 비밀 결사 골든 구스야말로 성도회조차 뛰어넘는 최강으──」"

[[dialogue]]
speaker = "？？？"
original = "「ミウ、中から声が聞こえるよ」"
translation = "「미우, 안에서 목소리가 들려.」"

[[dialogue]]
speaker = "？？？"
original = "「あの高らかかつ高貴な美声は……間違いないです」"
translation = "「저 드높고도 고귀한 미성은…… 틀림없어요.」"

[[dialogue]]
speaker = "ミウ"
original = "「はわっ！？\u3000ヒマワリちゃん、いた！\u3000いたよ！」"
translation = "「하와!? 히마와리짱, 있어! 여기 있어!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いたよ！\u3000本当にいたね、ミウ！」"
translation = "「있어! 정말로 있네, 미우!」"

[[dialogue]]
speaker = "セナリィ"
original = "「私は珍獣じゃありませんわ！？」"
translation = "「저는 희귀 동물이 아니거든요!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「──って、あ、あら？\u3000どなたかしら、あなたたち。ここは動物園でも託児所でもなくてよ」"
translation = "「──그건 그렇고, 어, 어머나? 누구신가요, 당신들. 여기는 동물원도 탁아소도 아니랍니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「たまたま迷い込んだのなら、とっととおうちにお帰りなさいな。ＤＩＳＣで可愛い猫ちゃんが戯れている動画でも見ているがいいですわ」"
translation = "「어쩌다 길을 잘못 든 거라면 냉큼 집으로 돌아가세요. DISC로 귀여운 고양이가 노는 영상이나 보고 있는 게 좋을 거예요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「うわぁー！\u3000本物のセナリィ様だーーー！」"
translation = "「우와아~! 진짜 세나리 님이다──!」"

[[dialogue]]
speaker = "セナリィ"
original = "「え、ええ、裏社会にその人ありと謳われたバンデット・セナリィとは私のこと──しかして、その正体は！」"
translation = "「에, 에에, 어둠의 세계에 그 사람 있노라 칭송받던 밴디트 세나리가 바로 나── 허나 그 정체는!」"

[[dialogue]]
speaker = "ミウ"
original = "「秘密結社ゴールデングース総帥──ですよね？」"
translation = "「비밀 결사 골든 구스 총수── 맞죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ……あなたたち、どこでそれを？」"
translation = "「예…… 당신들, 어디서 그걸?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「ミウと一緒に突き留めました！」"
translation = "「미우랑 같이 알아냈어요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「なるほど、たまたまここに迷い込んだわけではない、と。よくこの場所に辿り着きましたわね」"
translation = "「과연, 어쩌다 여기로 잘못 들어온 건 아니라는 거군요. 용케도 이 장소를 찾아냈네요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「全てを知っていながら、私に会いに来たということは──ようこそ、秘密結社ゴールデングースへ」"
translation = "「모든 것을 알고 있으면서 저를 만나러 왔다는 것은── 환영합니다, 비밀 결사 골든 구스에.」"

[[dialogue]]
speaker = "セナリィ"
original = "「あなたたちのようなお子様が、仕事の依頼ですのね？\u3000私の腕はお安くなくてよ？」"
translation = "「당신들 같은 꼬맹이가 업무 의뢰인 건가요? 제 실력은 싸지 않답니다?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「い、依頼じゃないんです！」"
translation = "「의, 의뢰가 아니에요!」"

[[dialogue]]
speaker = "ミウ"
original = "「そうなんです。私たち、折り入ってセナリィ社長にお願いがありまして！」"
translation = "「맞아요. 저희, 꼭 세나리 사장님께 드릴 부탁이 있어서요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたしたちをゴールデングースに入社させてください！」"
translation = "「저희를 골든 구스에 입사시켜 주세요!」"

[[dialogue]]
speaker = "ミウ＆ヒマワリ"
original = "「お願いします！」"
translation = "「부탁드립니다!」"

[[dialogue]]
speaker = "セナリィ"
original = "「なるほど、入社志望ですの──」"
translation = "「과연, 입사 지망이군요──」"

[[dialogue]]
speaker = "セナリィ"
original = "「……はぁ？」"
translation = "「……네?」"

