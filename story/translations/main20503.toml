[[dialogue]]
speaker = "unk"
original = "第３話,魔王を止める者,B"
translation = "제3화, 마왕을 멈추는 자, B"

[[dialogue]]
speaker = "unk"
original = "一方その頃──"
translation = "한편 그 무렵──"

[[dialogue]]
speaker = "unk"
original = "街を破壊する極星従騎を必死に食い止めようとする星騎士たち。"
translation = "거리를 파괴하는 극성종기를 필사적으로 막아내려는 성기사들."

[[dialogue]]
speaker = "unk"
original = "しかし敵の攻撃は苛烈で、星騎士も街も刻一刻と傷ついていった。"
translation = "하지만 적의 공격은 가혹했고, 성기사도 거리도 시시각각 상처 입어갔다."

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルッ！」"
translation = "「부르르!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「させないよ！」"
translation = "「하게 두지 않아!」"

[[dialogue]]
speaker = "unk"
original = "メイスを交差させ、極星従騎の斬撃を真正面から受け止める。"
translation = "메이스를 교차시켜 극성종기의 참격을 정면에서 받아낸다."

[[dialogue]]
speaker = "unk"
original = "星力の障壁のヒビが入るが、一歩も引かず、その威力を完全に削り切った。"
translation = "성력의 장벽에 금이 가지만, 한 발자국도 물러서지 않고 그 위력을 완전히 깎아냈다."

[[dialogue]]
speaker = "unk"
original = "ガーディアンが再度剣を振り下ろそうとするが──"
translation = "가디언이 다시 검을 내리치려 하지만──"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「そこです──！」"
translation = "「여깁니다──!」"

[[dialogue]]
speaker = "unk"
original = "身の丈すら超える蛍火の包丁が、ガーディアンに一閃を見舞った。"
translation = "키마저 훌쩍 넘는 케이카의 식칼이 가디언에게 일섬을 선사했다."

[[dialogue]]
speaker = "unk"
original = "一瞬動きが止まるが、ガーディアンの鎧に亀裂が走るのみで、致命傷は与えられていない。"
translation = "일순 움직임이 멈추지만, 가디언의 갑옷에 균열이 갈 뿐 치명상은 입히지 못했다."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「今のを持ちこたえますか……ですがこれで十分！\u3000サーシャ先輩！」"
translation = "「방금 걸 버텨냅니까…… 하지만 이걸로 충분해요! 사샤 선배!」"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「ええ、ありがとう。ブリザード・リーヴァー！」"
translation = "「네, 고마워요. 블리자드 리버~!」"

[[dialogue]]
speaker = "unk"
original = "全身を氷結させられたところを大鎌で両断され、ガーディアンは物言わぬ残骸と化した。"
translation = "전신이 빙결된 곳을 대낫으로 양단당해, 가디언은 말 없는 잔해가 되었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふぅ～」"
translation = "「후우~」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「あ、いつもの戦闘服に戻っちゃった。さっきのがボサノヴァフォームだっけ？」"
translation = "「아, 평소의 전투복으로 돌아와 버렸네. 방금 게 보사노바 폼이었나?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ノヴァフォームよ～。そんなリズミカルな名前じゃないわ～」"
translation = "「노바 폼이야~. 그렇게 리드미컬한 이름이 아니라고~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「やはりノヴァフォームは一段と強力ですね。さすがです」"
translation = "「역시 노바 폼은 한층 더 강력하군요. 과연 대단하세요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ありがとう、蛍火ちゃん。でも消耗が激しいから、今は倒す時だけ変身してるのよ～」"
translation = "「고마워, 케이카짱. 하지만 소모가 격렬해서 지금은 쓰러뜨릴 때만 변신하는 거야~」"

[[dialogue]]
speaker = "unk"
original = "効率的と言えば効率的だが、あくまで苦肉の策だ。"
translation = "효율적이라면 효율적이지만, 어디까지나 고육지책이다."

[[dialogue]]
speaker = "unk"
original = "フォームを切り替えることにも負担があり、星力の消費を幾分かマシにしているだけに過ぎない。"
translation = "폼을 전환하는 것에도 부담이 있어, 성력 소비를 조금이나마 낫게 하고 있을 뿐이다."

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「いや～、このメンバーで戦うのってかなり久しぶりじゃない？\u3000昔を思い出すなー」"
translation = "「이야~, 이 멤버로 싸우는 건 꽤 오랜만 아냐? 옛날 생각나네~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「そうですね。シルヴィ先輩の頼もしさも、サーシャ先輩の鋭さも変わりません。いえ、むしろ以前より力を増しているように感じます」"
translation = "「그렇네요. 실비 선배의 든든함도, 사샤 선배의 날카로움도 변함없어요. 아니, 오히려 이전보다 힘이 늘어난 것처럼 느껴져요.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ですがシルヴィ先輩は、煌嶺と戦って負傷されていたはずでは？」"
translation = "「그런데 실비 선배는 코레이와 싸워서 부상당하셨던 거 아니었나요?」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ははは、寝てたらだいたい治った！\u3000ま、ほんとはまだ戦っちゃダメって言われてたけど、こんな状況だからね」"
translation = "「하하하, 자고 일어났더니 대충 다 나았어! 뭐, 사실은 아직 싸우면 안 된다는 소릴 들었지만, 이런 상황이니까 말야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もう、シルヴィってば相変わらず無茶なんだから……」"
translation = "「정말이지, 실비는 여전히 무모하다니까……」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルルル……！」"
translation = "「그르르르르……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「！\u3000機械型モンスター……こんな時に……」"
translation = "「! 기계형 몬스터…… 이런 때에……」"

[[dialogue]]
speaker = "unk"
original = "ただでさえ窮地だというのに、さらに強敵が現れた。"
translation = "그렇지 않아도 궁지인데, 더욱 강한 적이 나타났다."

[[dialogue]]
speaker = "unk"
original = "まだ各地の戦線は維持できているが、このままではジリ貧だ。"
translation = "아직 각지의 전선은 유지되고 있지만, 이대로라면 서서히 밀릴 뿐이다."

[[dialogue]]
speaker = "unk"
original = "そして一ヵ所で戦線が崩壊してしまえば、一気に波及して全体が瓦解してしまうだろう。"
translation = "그리고 한 곳에서 전선이 붕괴해버리면, 단숨에 파급되어 전체가 와해하고 말 것이다."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「やはり誰かが敵の指揮官を押さえるしかないのでしょうね」"
translation = "「역시 누군가가 적의 지휘관을 붙잡아두는 수밖에 없겠군요.」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「それまで持久戦ってわけだね。そういうのは得意だから任せて！」"
translation = "「그때까지 지구전이라는 거네. 그런 건 특기니까 맡겨줘!」"

[[dialogue]]
speaker_original = "シルヴィ"
speaker_translation = "실비"
original = "「ようやくサーシャや蛍火ちゃんと一緒に戦えるからね、暴れさせてもらうよ！」"
translation = "「드디어 사샤랑 케이카짱이랑 같이 싸울 수 있게 됐으니까, 마음껏 날뛰어주겠어!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ、流星市国は第二の故郷だもの。みんなで守りましょう」"
translation = "「네, 유성시국은 제2의 고향인걸요. 다 함께 지켜내요~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（頼んだわよ……会長くん）"
translation = "(부탁할게…… 회장 군)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グ……オオ……ッ！」"
translation = "「그…… 오오……!」"

[[dialogue]]
speaker = "unk"
original = "クロトがまとうリクリエの瘴気はさらに濃く、禍々しく、破滅の色に染まっていく。"
translation = "쿠로토가 두른 리크리에의 장기는 더욱 짙고, 불길하게, 파멸의 색으로 물들어간다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きゃあっ！？」"
translation = "「꺄앗!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「止まって、パパ──」"
translation = "「멈춰줘, 아빠──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待て、それは危険だ」"
translation = "「기다려, 그건 위험해.」"

[[dialogue]]
speaker = "unk"
original = "咄嗟に父に呼びかけようとしたヴィーナスを、梨緒が制した。"
translation = "급히 아버지를 부르려던 비너스를 리오가 제지했다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうしてよ！？\u3000アポロの時は──」"
translation = "「왜 그래!? 아폴로 때는──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王の血が肉親の声に反応するということは、私も聞いている。だが今は魔王の力さえ暴走し得る」"
translation = "「마왕의 피가 육친의 목소리에 반응한다는 건 나도 들었다. 하지만 지금은 마왕의 힘조차 폭주할 수 있어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「リクリエの力だけでなく魔王の力も制御できなくなれば、この世界は終わりだぞ」"
translation = "「리크리에의 힘뿐만 아니라 마왕의 힘까지 제어할 수 없게 되면 이 세계는 끝이다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "暴走しているのがリクリエの力だけであれば、まだマシといえるのだろう。"
translation = "폭주하고 있는 것이 리크리에의 힘뿐이라면, 아직 나은 편이라고 할 수 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "クロトは今もリクリエに侵されまいと踏ん張っている。"
translation = "쿠로토는 지금도 리크리에에 침식당하지 않으려고 버티고 있다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今は魔王に宿っているリクリエの力を削るしかない。彼が正気を取り戻すまでな」"
translation = "「지금은 마왕에게 깃든 리크리에의 힘을 깎아낼 수밖에 없어. 그가 정신을 차릴 때까지 말이다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……そうね。私たちで目を覚まさせてあげましょう」"
translation = "「……그래. 우리 손으로 눈을 뜨게 해주자.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「せめて星徒会のみんなを呼び戻せれば……ううん、それも厳しそうね」"
translation = "「적어도 성도회 애들을 불러올 수만 있다면…… 아니, 그것도 힘들겠네.」"

[[dialogue]]
speaker = "unk"
original = "極星従騎のみならず新型モンスターまで出現したと連絡があった。"
translation = "극성종기뿐만 아니라 신형 몬스터까지 출현했다는 연락이 있었다."

[[dialogue]]
speaker = "unk"
original = "学園の周囲に散開している<ruby>ノヴァフォームの使い手<rt>マトイたち</rt></ruby>をここに集めてしまったら、戦線の崩壊は免れないだろう。"
translation = "학원 주위에 산개해 있는 노바 폼 사용자들을 이곳에 모았다간 전선의 붕괴를 면치 못할 것이다."

[[dialogue]]
speaker = "unk"
original = "そうなれば流星市国および東京の壊滅は確実だ。"
translation = "그렇게 되면 유성시국 및 도쿄의 괴멸은 확실하다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「せめて私もノヴァフォームになれれば……って、今更そんなこと言ってる場合じゃないわね！\u3000パパが寝ぼけてる時は叩き起こすのが娘の役目よ！」"
translation = "「적어도 나도 노바 폼이 될 수 있다면…… 아니, 이제 와서 그런 소릴 할 때가 아니지! 아빠가 잠꼬대할 때는 두들겨 패서 깨우는 게 딸의 역할이야!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「父と娘という関係にはいまだに驚かされるが……私が気にすることではないな。魔王が完全に堕ちる前に、私が止める！」"
translation = "「부녀 관계라는 점에는 아직도 놀랍지만…… 내가 신경 쓸 일은 아니군. 마왕이 완전히 타락하기 전에 내가 멈추겠다!」"

[[dialogue]]
speaker = "unk"
original = "次の瞬間、梨緒がクロトに背後に回り、無数の矢を放った。"
translation = "다음 순간, 리오가 쿠로토의 등 뒤로 돌아가 무수한 화살을 쏘았다."

[[dialogue]]
speaker = "unk"
original = "雨あられと降り注ぐ雷矢を、クロトは瘴気を盾にして防ぐ。"
translation = "비 오듯 쏟아지는 뇌전 화살을 쿠로토는 장기를 방패 삼아 막아낸다."

[[dialogue]]
speaker = "unk"
original = "しかし足を止めた瞬間、ヴィーナスの鎖がクロトを雁字搦めにする。"
translation = "하지만 발이 묶인 순간, 비너스의 사슬이 쿠로토를 꽁꽁 묶어버린다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「痛いけど我慢してね──クロトハンマー・パート２！」"
translation = "「아프겠지만 참아줘── 쿠로토 해머 파트 2!」"

[[dialogue]]
speaker = "unk"
original = "まとう瘴気を振り払うようにクロトを振り回し、戦闘で荒れたアスファルトに叩きつけた。"
translation = "두르고 있는 장기를 떨쳐내듯 쿠로토를 휘둘러, 전투로 거칠어진 아스팔트에 내리쳤다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「頑丈なのは知ってるから、容赦しないわよ！」"
translation = "「튼튼하다는 건 알고 있으니까 사정 봐주지 않겠어!」"

[[dialogue]]
speaker = "unk"
original = "さらに鎖の１本１本が光を放ち、鮮烈な光がクロトを呑み込む。"
translation = "거기에 사슬 하나하나가 빛을 내뿜으며, 강렬한 빛이 쿠로토를 집어삼킨다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グゥ……ア……オオオッ！！」"
translation = "「그으…… 아…… 오오오옷!!」"

[[dialogue]]
speaker = "unk"
original = "クロトを包む瘴気が晴れた、その刹那──"
translation = "쿠로토를 감싸던 장기가 걷힌 그 찰나──"

[[dialogue]]
speaker_original = "２人"
speaker_translation = "2명"
original = "「ユニゾン！」"
translation = "「유니존!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ディヴァインサンダーボルト！」"
translation = "「디바인 썬더볼트!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「クオオオオオッ……！！」"
translation = "「쿠오오오오옷……!!」"

[[dialogue]]
speaker = "unk"
original = "そして天空から一筋の稲妻が迸り、<ruby>過<rt>あやま</rt></ruby>たずクロトを撃ち貫いた。"
translation = "그리고 하늘에서 한 줄기 번개가 내리쳐, 어김없이 쿠로토를 꿰뚫었다."

[[dialogue]]
speaker = "unk"
original = "だが次の瞬間──"
translation = "하지만 다음 순간──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グゥアアアアッ！！」"
translation = "「그으아아아앗!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──ッ！！？」"
translation = "「──!!?」"

[[dialogue]]
speaker = "unk"
original = "瞬時に肉薄したクロトの拳が、梨緒を襲った。"
translation = "순식간에 육박한 쿠로토의 주먹이 리오를 덮쳤다."

[[dialogue]]
speaker = "unk"
original = "反応しきれずもろに食らい、その勢いのままにビルに激突する。"
translation = "미처 반응하지 못하고 정면으로 얻어맞아, 그 기세 그대로 빌딩에 격돌한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「カハッ……！」"
translation = "「커헉……!」"

[[dialogue]]
speaker = "unk"
original = "全身に走る痛み。骨が軋む衝撃。"
translation = "전신에 달리는 통증. 뼈가 삐걱거리는 충격."

[[dialogue]]
speaker = "unk"
original = "感覚が一瞬消えて、体が千切れたのかと錯覚する。"
translation = "감각이 일순 사라져, 몸이 찢겨나간 것인지 착각한다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「梨緒──！？」"
translation = "「리오──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グ──オオオオッ！！」"
translation = "「그── 오오오오옷!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きゃああああっ！！？」"
translation = "「꺄아아아악!!?」"

[[dialogue]]
speaker = "unk"
original = "瘴気を帯びた一撃を受け、ヴィーナスがあっけなく吹き飛ばされた。"
translation = "장기를 띤 일격에 비너스가 허무하게 날아갔다."

[[dialogue]]
speaker = "unk"
original = "そのまま地面に転がって動かなくなる。"
translation = "그대로 지면에 굴러 움직이지 않게 된다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くっ……この……！」"
translation = "「큭…… 이……!」"

[[dialogue]]
speaker = "unk"
original = "せめてヴィーナスへの追撃はさせまいと、梨緒が震える手でクロスボウを撃つ。"
translation = "적어도 비너스에게 추격은 하지 못하게 하려고, 리오가 떨리는 손으로 크로스보우를 쏜다."

[[dialogue]]
speaker = "unk"
original = "しかし苦し紛れの攻撃が通じるはずもなく、軽く腕で払われた。"
translation = "하지만 고육지책의 공격이 통할 리 없었고, 가볍게 팔로 쳐내졌다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「コオオ……ッ」"
translation = "「코오오……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くああああああっ！！」"
translation = "「크아아아아악!!」"

[[dialogue]]
speaker = "unk"
original = "満足に動けない梨緒をクロトが追撃する。"
translation = "제대로 움직이지 못하는 리오를 쿠로토가 추격한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「がふっ……」"
translation = "「가훵……」"

[[dialogue]]
speaker = "unk"
original = "反撃しようにも、梨緒にはもう空を翔ける力さえ残されていない。"
translation = "반격하려 해도 리오에게는 이제 하늘을 날 힘조차 남아있지 않다."

[[dialogue]]
speaker = "unk"
original = "距離をとることすらできず、殴られ、嬲られ、蹂躙されるだけだ。"
translation = "거리를 벌리는 것조차 하지 못한 채, 얻어맞고, 농락당하고, 유린당할 뿐이다."

[[dialogue]]
speaker = "unk"
original = "地面に倒れた梨緒を足蹴にし、さらに踏みつける。"
translation = "지면에 쓰러진 리오를 발로 차고, 다시 짓밟는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「があああっ……！！」"
translation = "「가아아악……!!」"

[[dialogue]]
speaker = "unk"
original = "全身がヒビ割れ、砕けるような衝撃。"
translation = "전신이 금 가고 부서지는 듯한 충격."

[[dialogue]]
speaker = "unk"
original = "もはや武器を握ることもできず、梨緒の意識が遠くなっていく。"
translation = "더 이상 무기를 쥘 수도 없어 리오의 의식이 멀어져 간다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ダメ……だったのか……）"
translation = "(안…… 됐던 건가……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（体が動かない……このまま諦めたら、楽になれるだろうか……）"
translation = "(몸이 움직이지 않아…… 이대로 포기하면 편해질 수 있을까……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（そもそも私の世界はもう滅んでいる……どうせ戦う意味なんてないんだ……）"
translation = "(애초에 내 세계는 이미 멸망했어…… 어차피 싸울 의미 따위 없는데……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私が何をしたって、私が守ろうとしたものは、もうどこにもない……）"
translation = "(내가 무엇을 하든, 내가 지키려 했던 것은 이제 어디에도 없어……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私は弱者で……敗者で……何もできない、愚か者なんだ……）"
translation = "(나는 약자고…… 패배자고…… 아무것도 못 하는 바보야……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ああ……口の中、血の味がする……体の感覚がないのに、鉄の味だけ感じる……）"
translation = "(아아…… 입안에서 피 맛이 나…… 몸의 감각은 없는데 비릿한 쇠 맛만 느껴져……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私がよく知っている……敗北の味だ……）"
translation = "(내가 잘 아는…… 패배의 맛이다……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（──）"
translation = "(──)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私は……また、負けるのか……？）"
translation = "(나는…… 또 지는 건가……?)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（一度も勝てないまま終わるのか……？\u3000それでいいのか……？）"
translation = "(단 한 번도 이기지 못한 채 끝나는 건가……? 그걸로 괜찮은 거야……?)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私の世界は滅んだ。だけど守るものはまだある）"
translation = "(내 세계는 멸망했다. 하지만 지킬 것은 아직 있어)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私は全てを失った。でも私は１人じゃない）"
translation = "(나는 모든 것을 잃었다. 하지만 나는 혼자가 아니야)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は世界を守れなかった」"
translation = "「나는 세계를 지키지 못했어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから今度こそ君を止める。それだけだ」"
translation = "「그러니까 이번에야말로 너를 멈추겠어. 그뿐이다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私にできるのか……？\u3000仲間も、親友も、学園も、全て失っておきながら、おめおめと生き残った私に……」"
translation = "「나에게 가능한 건가……? 동료도, 친구도, 학원도, 전부 잃어버리고서 뻔뻔하게 살아남은 나에게……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや弱気になるな。今度こそ世界を救うんだろう」"
translation = "「아니, 약해지지 마라. 이번에야말로 세계를 구하기로 했잖아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（そうだ。<ruby>『やり直せる』と思った<rt>アルタイルに来た</rt></ruby>あの時、決めたはずだ）"
translation = "(그래. 『다시 시작할 수 있다』고 생각했던 그때, 결심했을 터다)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ここがベガじゃなくても、自分の世界が滅んだと知らなかったとしても──）"
translation = "(여기가 베가가 아니더라도, 자신의 세계가 멸망했다는 것을 몰랐다고 하더라도──)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今度こそ世界を守ると誓ったんだ！！！」"
translation = "「이번에야말로 세계를 지키겠다고 맹세했단 말이다!!!」"

[[dialogue]]
speaker = "unk"
original = "梨緒は手の中に矢を生み出すと、弓に番えることなくそのままクロトの胸に突き立てた。"
translation = "리오는 손안에 화살을 생성하더니, 활에 먹이지도 않고 그대로 쿠로토의 가슴에 꽂아 넣었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「グウウッ……！」"
translation = "「그우우웃……!」"

[[dialogue]]
speaker = "unk"
original = "なりふり構わない一撃でわずかに怯ませると、今度は両手にクロスボウを生成し、至近距離から乱れ撃ちを食らわせる！"
translation = "물불 가리지 않는 일격으로 살짝 주춤하게 만들자, 이번에는 양손에 크로스보우를 생성해 초근접 거리에서 난사를 퍼붓는다!"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「クッ……」"
translation = "「큭……」"

[[dialogue]]
speaker = "unk"
original = "クロトは嵐のように襲い来る矢を払いながら距離を取る。"
translation = "쿠로토는 폭풍처럼 덮쳐오는 화살을 쳐내며 거리를 벌린다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふぅ……はぁ、はぁ……私はこんなところで負けていられない……」"
translation = "「후우…… 하아, 하아…… 나는 이런 곳에서 지고 있을 수 없어……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君にも、ジグにも……負けっぱなしなんてイヤなんだ！」"
translation = "「너에게도, 지그에게도…… 계속 지기만 하는 건 싫단 말이야!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん、大丈夫！？」"
translation = "「리오짱, 괜찮아!?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おや？\u3000そろそろ出番かと思ったけど、まだだったかな。梨緒が魔王にやられた瞬間に背中からサクッとやろうと思ってたんだけど」"
translation = "「어라? 슬슬 차례인가 싶었는데 아직이었나 보네. 리오가 마왕에게 당한 순간 등 뒤에서 슥삭 해버릴까 생각했는데.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、ありがとうベアト。生憎だが、ナターシャはもう少し見ていてくれ」"
translation = "「아아, 고마워 베아토. 안타깝지만 나타샤는 조금 더 지켜봐 줘.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そ。それは残念」"
translation = "「그래. 그거 아쉽네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私だってまだやれるわよ……！」"
translation = "「나도 아직 할 수 있다고……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「無事……ではないが、まだ戦えそうだな。心強い」"
translation = "「무사……하진 않지만, 아직 싸울 수 있겠군. 든든하다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたこそ根性あるじゃない！」"
translation = "「당신이야말로 근성 있잖아!」"

[[dialogue]]
speaker = "unk"
original = "そしてヴィーナスも立ち上がり、再びリクリエに操られたクロトと対峙する。"
translation = "그리고 비너스도 일어서서 다시 리크리에에게 조종당하는 쿠로토와 대치한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「オオオッ──！！」"
translation = "「오오오옷──!!」"

[[dialogue]]
speaker = "unk"
original = "リクリエの──それも使徒の力を宿した緋宮クロトが、今度こそ完膚なきまでに撃滅しようと迫る。"
translation = "리크리에의── 그것도 사도의 힘을 품은 히노미야 쿠로토가, 이번에야말로 완패하게 만들고자 다가온다."

[[dialogue]]
speaker = "unk"
original = "状況は圧倒的不利のまま。"
translation = "상황은 압도적으로 불리한 그대로."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「負けて──たまるかぁあああああっ！！！」"
translation = "「질까── 보냐아아아아아아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、顕現したのは光り輝く翼。"
translation = "그 순간, 현현한 것은 빛나는 날개."

[[dialogue]]
speaker = "unk"
original = "はためく翼が閃電と烈風を巻き起こし、リクリエの瘴気ごとクロトを薙ぎ払う。"
translation = "펄럭이는 날개가 섬전과 열풍을 일으키며, 리크리에의 장기째로 쿠로토를 쓸어버린다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「梨緒、あなた天使だったの！？\u3000どうしたのよ、その羽！？」"
translation = "「리오, 당신 천사였어!? 어떻게 된 거야, 그 날개!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は人間だ。少なくとも自分が知っている限りは……な」"
translation = "「나는 인간이다. 적어도 내가 아는 한은…… 말이지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが今はどうでもいい。今度こそ魔王を止めるぞ！」"
translation = "「하지만 지금은 아무래도 좋아. 이번에야말로 마왕을 멈추겠다!」"

