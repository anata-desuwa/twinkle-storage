[[dialogue]]
speaker = "unk"
original = "第１話,美味しいカヌレを作りましょう,P"
translation = "제1화, 맛있는 카눌레를 만듭시다, P"

[[dialogue]]
speaker = "unk"
original = "微かに漂ってくる甘い匂いに釣られ、カフェを訪れると──"
translation = "희미하게 풍겨오는 달콤한 냄새에 이끌려 카페를 방문하자──"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「うんしょっと……！\u3000これで準備ＯＫですっ」"
translation = "「으랏차차……! 이걸로 준비 OK입니다앗」"

[[dialogue]]
speaker = "unk"
original = "バレンタイン戦闘服を身にまとったシャロンの前には、大量の牛乳や砂糖や卵が積まれていた。"
translation = "발렌타인 전투복을 몸에 걸친 샤론의 앞에는 대량의 우유와 설탕, 달걀이 쌓여 있었다."

[[dialogue]]
speaker = "unk"
original = "お菓子でも作るの？"
translation = "과자라도 만드는 거야?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あっ、会長さま。そうなんです。また子ども会のボランティアに参加することになりまして」"
translation = "「앗, 회장님. 맞아요. 다시 아동회 봉사활동에 참여하게 되었거든요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「美味しく作れるようになったカヌレを配ろうと思ってるんですっ！」"
translation = "「맛있게 만들 수 있게 된 카눌레를 나눠주려고 생각하고 있어요옷!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「カヌレって難しそうに見えますけど、生地を作ったら後は型に入れて焼くだけですから、わりと簡単なんですよ」"
translation = "「카눌레는 어렵게 보일지도 모르지만, 반죽을 만들면 나머지는 틀에 넣고 굽기만 하면 되니까 의외로 간단하답니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ですがたくさん作るには人手が欲しくて……」"
translation = "「하지만 많이 만들기에는 일손이 부족해서……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あの……会長さま。よろしかったら、お手伝いをお願いしても……？」"
translation = "「저기…… 회장님. 괜찮으시다면, 도움을 부탁드려도……?」"

[[dialogue]]
speaker = "unk"
original = "俺でよければ是非"
translation = "나라도 괜찮다면 기꺼이."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「わぁ！\u3000ありがとうございます！\u3000会長さまがいてくれれば、百人力ですねっ」"
translation = "「와아! 감사합니다! 회장님이 계셔주신다면 백인대장이네요옷」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ところで……会長さまはカヌレについて、ご存じですか？」"
translation = "「그나저나…… 회장님은 카눌레에 대해 알고 계시나요?」"

[[dialogue]]
speaker = "unk"
original = "形が特徴的なくらいかな"
translation = "모양이 특징적이라는 것 정도일까."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふ、そうでしたか。でしたら、カヌレの長～い歴史を知りながら作りましょうっ！\u3000その方が絶対美味しくなりますからねっ」"
translation = "「후후, 그러셨군요. 그렇다면 카눌레의 기～ㄴ 역사를 배우면서 만들어요옷! 그게 훨씬 맛있어질 테니까요옷」"

[[dialogue]]
speaker = "unk"
original = "手際よく材料を用意しながら、シャロンはカヌレの歴史について語り始めた。"
translation = "능숙하게 재료를 준비하며, 샤론은 카눌레의 역사에 대해 이야기하기 시작했다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「こほん。今回カヌレを作る際に調べたのですが、その歴史は古く、起源は数百年前に<ruby>遡る<rt>さかのぼ</rt></ruby>そうです」"
translation = "「흠흠. 이번에 카눌레를 만들면서 조사해 봤는데, 그 역사는 오래되어 기원은 수백 년 전으로 거슬러 올라간다고 해요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そんな昔からあるなんて、びっくりですよね！\u3000カヌレと略していますけど、本当はカヌレ・ド・ボルドーという名前でして」"
translation = "「그렇게 옛날부터 있었다니 깜짝 놀랄 일이죠! 카눌레라고 줄여 부르지만, 원래는 카눌레 드 보르도라는 이름이고요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「名前の通り、フランスのボルドー地方発祥の伝統的な焼き菓子で、女子修道院で生まれたと言われているんです」"
translation = "「이름 그대로 프랑스 보르도 지방 발상의 전통적인 구움과자로, 수녀원에서 태어났다고 전해져요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ワインの不純物を取る際に卵白を使っていて、余った卵黄を使って作ったのが始まりだそうですよ」"
translation = "「와인의 불순물을 제거할 때 달걀흰자를 사용했는데, 남은 노른자를 사용해 만든 것이 시작이라고 하더라고요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私が所属する修道院でもしばしばカヌレを作っていましたが、修道院でカヌレを作るのはそういう理由があったんですね」"
translation = "「제가 소속된 수녀원에서도 종종 카눌레를 만들곤 했는데, 수녀원에서 카눌레를 만드는 데는 그런 이유가 있었네요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そしてカヌレの特徴はなんといっても、独特な形と、外はカリカリ、中はしっとりもちもちな独特な食感ですよね」"
translation = "「그리고 카눌레의 특징은 뭐니 뭐니 해도 독특한 모양과 겉은 바삭바삭, 속은 촉촉하고 쫄깃한 독특한 식감이죠」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そもそも『カヌレ』とは『溝のついた』という意味がありまして……銅でできた、専用のカヌレ型に入れて焼くことであの特徴的な形になるんです」"
translation = "「애초에 『카눌레』란 『홈이 파인』이라는 의미가 있어서…… 구리로 된 전용 카눌레 틀에 넣어 구움으로써 그 특징적인 모양이 되는 거예요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「では、こちらのカヌレ生地を、この型に流し込みまして──」"
translation = "「그럼, 이 카눌레 반죽을 이 틀에 부어서──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「くんくん……はぁぁ……ラム酒とバニラビーンズのいい香りが……♪」"
translation = "「킁킁…… 하아아…… 럼주와 바닐라 빈의 좋은 향기가……♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「でも、ラム酒はアルコール度数が高いですからね。取り扱い注意です」"
translation = "「하지만 럼주는 알코올 도수가 높으니까요. 취급 주의입니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「小さい子でも食べられるようにアルコールを飛ばさないと──ひっく……酔っぱらっちゃいましゅからね～」"
translation = "「어린아이들도 먹을 수 있게 알코올을 날려 보내지 않으면── 히윽…… 취해버리니까요오～」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あれれ、目の前がふわふわしましゅね……でぁ、生地を型に流し入れていきま～す。こぼさないように気をつけてくらさいね～」"
translation = "「어라라, 눈앞이 어질어질하네여…… 그엄, 반죽을 틀에 부어 가겠습니이당. 쏟지 않게 조심해 주세여어～」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そうれす、そうれす～♪\u3000会長さま、とってもお上手れすよ～♪\u3000いい子いい子してあげますね～、なでなで」"
translation = "「그렇습니댱, 그렇습니댱~♪ 회장님, 정말 솜씨가 좋으시네용~♪ 착하다 착해 해드릴게요~, 쓰담쓰담.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あとはオーブンに入れて～、ゆ～っくり１時間くらい焼けば完成れす～」"
translation = "「나머지는 오븐에 넣고~, 느~긋하게 1시간 정도 구우면 완성입니댱~.」"

[[dialogue]]
speaker = "unk"
original = "糖が焦げる香ばしい匂いが漂う。"
translation = "당분이 타는 고소한 냄새가 감돈다."

[[dialogue]]
speaker = "unk"
original = "ほのかに香るラム酒が、カヌレの特徴的なアクセントではあるけれど──"
translation = "은은하게 풍기는 럼주가 까눌레의 특징적인 포인트이긴 하지만──"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「んふふふ、こんなすぐにできちゃうなんて～、会長さまのおかげれすよ～。えらいえら～い」"
translation = "「응후후후, 이렇게 금방 되어버리다니~, 회장님 덕분입니댱~. 장하다 장해~.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「焼いてる間に、会長さまをい～っぱい褒め褒めしないとれす～。撫で撫でさせてくだひゃぁい♪」"
translation = "「굽는 동안에 회장님을 마~니마니 칭찬해드려야겠어용~. 쓰담쓰담 하게 해주세효오♪」"

[[dialogue]]
speaker = "unk"
original = "明らかに様子がおかしいーっ！"
translation = "명백히 상태가 이상해─! "

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「くんくん、お菓子を焼いてるいい匂い……このラム酒の風味は……カヌレかしら？」"
translation = "「킁킁, 과자를 굽는 좋은 냄새…… 이 럼주의 풍미는…… 까눌레일까?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「焼きあがったら御相伴に──って、あんたたち何してんの！？」"
translation = "「다 구워지면 한입 얻어먹으── 어머, 당신들 뭐 하는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "助けて、イレーナ！"
translation = "살려줘, 이레나!"

[[dialogue]]
speaker = "unk"
original = "撫で撫で地獄から逃げ出し、やってきたイレーナに助けを求めた。"
translation = "쓰담쓰담 지옥에서 도망쳐, 마침 나타난 이레나에게 도움을 요청했다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「やぁん、逃げちゃやれすぅ！\u3000会長さまぁ、もっと撫で撫で～。撫で撫でさせてくださいよぉう～。褒め褒めするんれしゅうぅ～♪」"
translation = "「야앙, 도망가면 안 대용! 회장니임, 더 쓰담쓰담~. 쓰담쓰담 하게 해주세요오~. 칭찬칭찬 할 거예용~♪」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「シャロン、落ち着きなさいっての！\u3000って、力強っ！？\u3000まるで暴れ馬だわ！\u3000どうどう！」"
translation = "「샤론, 진정하라니까! 그보다, 힘 왜 이렇게 세!? 마치 야생마 같잖아! 워워!」"

[[dialogue]]
speaker = "unk"
original = "イレーナの静止により、シャロンは動きを止める。危うく毛髪と頭皮がすり減ってしまうところだった。"
translation = "이레나의 제지로 샤론은 움직임을 멈춘다. 하마터면 머리카락과 두피가 마모될 뻔했다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「すぴー……すぴょー……ＺＺＺ」"
translation = "「스피─…… 스뾰─…… ZZZ」"

[[dialogue]]
speaker = "unk"
original = "酔いが回ったのか、シャロンは机に突っ伏して寝てしまった。"
translation = "취기가 돌았는지, 샤론은 책상에 엎드려 잠들고 말았다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「泣き上戸だとかキス魔なんて酒癖は聞いたことあるけど、褒め魔ってのはあまり聞いたことないわね」"
translation = "「울보라든가 키스 마귀 같은 술버릇은 들어봤어도, 칭찬 마귀라는 건 별로 들어본 적 없네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「酔っぱらうとテンションが上がって、本性が出るっていうけど……会長さんを褒めまくりたいのが、シャロンの本心だったのかしら」"
translation = "「취하면 텐션이 올라가서 본성이 나온다고들 하지만…… 회장님을 마구 칭찬하고 싶었던 게 샤론의 본심이었던 걸까.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そんなに迷惑がかかるわけじゃないからいいけど……この程度のラム酒の匂いだけで酔っぱらっちゃうってのは……ちょっと弱すぎよね」"
translation = "「그렇게 민폐가 되는 건 아니니까 괜찮지만…… 이 정도 럼주 냄새만으로 취해버리다니…… 좀 너무 약하네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ほら、シャロン、そろそろ起きなさい」"
translation = "「자, 샤론, 이제 일어나.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「んふぇ……？\u3000イレーナさま……？」"
translation = "「응헤……? 이레나 님……?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「カヌレ、焼けてるわよ。焼くのに時間がかかるお菓子でよかったわね」"
translation = "「까눌레, 다 구워졌어. 굽는 데 시간이 걸리는 과자라서 다행이었네.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「わぁっ！？\u3000あれれ……なんだか記憶が曖昧なんですけど……わ、私、何かやっちゃいましたかー……？」"
translation = "「왓!? 어라라…… 왠지 기억이 애매합니다만…… 저, 제가 뭔가 저질렀나요─……?」"

[[dialogue]]
speaker = "unk"
original = "大丈夫……だったかな"
translation = "괜찮……았으려나."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そ、そうですか……それならよいのですけど……」"
translation = "「그, 그렇습니까…… 그렇다면 다행입니다만……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あちち……はい、会長さま。焼きたてのカヌレです。まだお熱いので、火傷しないように気をつけてくださいね」"
translation = "「앗 뜨거…… 자, 회장님. 갓 구운 까눌레예요. 아직 뜨거우니까 데이지 않게 조심하세요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「もちろんイレーナさまもどうぞ！\u3000私も失礼して──ぁむっ」"
translation = "「물론 이레나 님도 드세요! 저도 실례해서── 냠.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「うんっ、とっても美味しいっ<emoji=heart04>\u3000会長さまにお手伝いしてもらったおかけですねっ<emoji=heart04>」"
translation = "「음, 정말 맛있어요っ<emoji=heart04> 회장님이 도와주신 덕분이네요っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "上手に焼きあがったカヌレは、甘くて、ほろ苦くて、カリカリのモチモチで、とっても美味しい最高の出来栄えだった。"
translation = "훌륭하게 구워진 까눌레는 달콤하고, 쌉싸름하며, 겉바속촉으로 정말 맛있는 최고의 완성도였다."

