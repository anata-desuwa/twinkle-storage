[[dialogue]]
speaker = "unk"
original = "第４話,遠き日の思い出と,P"
translation = "제4화, 머나먼 날의 추억과 함께, P"

[[dialogue]]
speaker = "unk"
original = "エステルに会うために教皇庁へ向かおうとしていると。"
translation = "에스텔을 만나기 위해 교황청으로 향하려던 참이었다."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "車道を見つめながら、物思いにふけっているエステルの姿を見つけた。"
translation = "차도를 바라보며 깊은 생각에 잠겨 있는 에스텔의 모습을 발견했다."

[[dialogue]]
speaker = "unk"
original = "その場所、その表情から、彼女が今、何を思っているのか、俺にはすぐに想像することが出来た。"
translation = "그 장소, 그 표정에서 그녀가 지금 무슨 생각을 하는지 나는 금방 짐작할 수 있었다."

[[dialogue]]
speaker = "unk"
original = "俺がエステルを助けた場所"
translation = "내가 에스텔을 구했던 장소."

[[dialogue]]
speaker = "unk"
original = "ここだったよね"
translation = "여기였었지."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「はい……」"
translation = "「네……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「あれから１０年以上経ちました。けれど、私をモンスターから救うため、勇敢に戦ってくれた魔王様のお姿は忘れたことがありません」"
translation = "「그로부터 10년 이상 지났습니다. 하지만 저를 몬스터로부터 구하기 위해 용감하게 싸워주신 마왕님의 모습은 잊은 적이 없습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「突然現れたモンスターたちに、私の乗ったスクールバスが襲われて……」"
translation = "「갑자기 나타난 몬스터들에게 제가 탄 스쿨버스가 습격당해서……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「バスの中に取り残されてしまった私は、バスごとモンスターたちに齧られてしまうところでした」"
translation = "「버스 안에 남겨진 저는 버스째로 몬스터들에게 씹혀 먹힐 뻔했습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そこに魔王様が現れて、モンスターたちの注意を自分に引き付け……その間に私は救い出されました」"
translation = "「거기에 마왕님이 나타나 몬스터들의 주의를 자신에게 끌어당기고…… 그사이에 저는 구출되었습니다.」"

[[dialogue]]
speaker = "unk"
original = "セレスティアも持ってなかったな"
translation = "셀레스티아도 가지고 있지 않았었지."

[[dialogue]]
speaker = "unk"
original = "そんな感じだったね"
translation = "그런 느낌이었네."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そんな状況なのに私を救おうと身体を張って戦って下さったのですね……」"
translation = "「그런 상황인데도 저를 구하려고 몸을 던져 싸워주셨던 거군요……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「魔王様、あらためてお礼を言わせてください……ありがとうございます」"
translation = "「마왕님, 다시 한번 감사를 전하게 해주세요…… 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "お互いさまだ"
translation = "피차일반이야."

[[dialogue]]
speaker = "unk"
original = "デネブではエステルに助けられた"
translation = "데네브에서는 에스텔에게 도움받았어."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ふふっ、そうかもしれませんが……私は私の正しいと思う事を信じただけなんです」"
translation = "「후훗, 그럴지도 모르겠습니다만…… 저는 제가 옳다고 생각하는 것을 믿었을 뿐이에요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「デネブであなたの姿を見た時……普通ならありえないことなのに……あなたが魔王様なのだとすぐに気が付きました」"
translation = "「데네브에서 당신의 모습을 보았을 때…… 보통이라면 있을 수 없는 일인데도…… 당신이 마왕님이라는 걸 금방 알아차렸습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「私の世界の魔王様は、デネブを裏切ったと聞いています」"
translation = "「제 세계의 마왕님은 데네브를 배신했다고 들었습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「けれど私はそんなこと信じられなくて。ずっとどこかで皆のために戦い続けているんだと信じていました」"
translation = "「하지만 저는 그런 걸 믿을 수 없어서. 계속 어딘가에서 모두를 위해 싸우고 계실 거라고 믿고 있었어요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そうしたらあなたが現れて……私が思い続けていたことは間違いではなかったのだと証明してくれたんです」"
translation = "「그랬더니 당신이 나타나서…… 제가 계속 믿어온 것이 틀리지 않았다는 걸 증명해 주었습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「それに……アルタイルに来て数日間ですが、一緒に過ごしていてもあなたは優しくて、思い出以上に素晴らしい人で……」"
translation = "「게다가…… 알타이르에 와서 며칠 동안이지만 함께 지내보니 당신은 상냥하고, 추억 이상으로 훌륭한 분이라서……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「あなたが裏切者の悪なる存在だなんてありえない、という確信を持たせてくれました」"
translation = "「당신이 배신자나 악한 존재일 리 없다는 확신을 갖게 해주었습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「それで私の心は救われたんです……本当に、本当にありがとうございました」"
translation = "「그걸로 제 마음은 구원받았습니다…… 정말로, 정말로 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "清らかな瞳でまっすぐに俺を見つめるエステル。"
translation = "맑은 눈동자로 똑바로 나를 바라보는 에스텔."

[[dialogue]]
speaker = "unk"
original = "彼女が浮かべる笑顔に安心しつつも、同時に胸が締め付けられるような思いがした。"
translation = "그녀가 짓는 미소에 안심하면서도 동시에 가슴이 미어지는 듯한 기분이 들었다."

[[dialogue]]
speaker = "unk"
original = "それは俺が、心の中で感じていた負い目を、すっと溶かしてくれるような笑顔だった。"
translation = "그것은 내가 마음속으로 느끼고 있던 부채감을 부드럽게 녹여주는 듯한 미소였다."

[[dialogue]]
speaker = "unk"
original = "ありがとう、エステル"
translation = "고마워, 에스텔."

[[dialogue]]
speaker = "unk"
original = "そこで一度言葉を切り……"
translation = "거기서 일단 말을 끊고……."

[[dialogue]]
speaker = "unk"
original = "大好きだ"
translation = "사랑해."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「っ……！！？」"
translation = "「윽……!!?」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そ、そんなお言葉……私にはもったいないです……」"
translation = "「그, 그런 말씀…… 저에게는 과분합니다……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「すみません、勘違いしてはいけないと分かっているのですが、そんな事を言われてしまうとお顔が熱くなってしまいます」"
translation = "「죄송해요, 착각하면 안 된다는 걸 알고 있습니다만, 그런 말을 들으니 얼굴이 뜨거워져 버려서요.」"

[[dialogue]]
speaker = "unk"
original = "勘違いじゃないよ"
translation = "착각 아니야."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「っ……本当ですか？」"
translation = "「윽…… 정말인가요?」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そんなお気持ちを向けて頂けるなんて、恐れ多いです……」"
translation = "「그런 마음을 저에게 향해주시다니, 황송합니다……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「でも、きちんとお応えしないといけないですよね」"
translation = "「하지만 제대로 보답해 드려야겠죠.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「正直に申し上げます……魔王様のことは私、命を救われたあの時から、ずっとお慕い申し上げていました」"
translation = "「솔직히 말씀드릴게요…… 마왕님은 제 생명을 구해주신 그때부터 계속 사모해 왔습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「けれど、デネブにやってきた魔王様とお会いして、アルタイルに連れてきていただいて……」"
translation = "「하지만 데네브에 오신 마왕님과 만나고 알타이르로 데려와 주셔서……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そして同じ場所、同じ時間を過ごすようになって……魔王様のことを慕う気持ちに変化が生まれ始めました」"
translation = "「그리고 같은 장소, 같은 시간을 보내게 되면서…… 마왕님을 사모하는 마음에 변화가 생기기 시작했습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「きっと……私の抱くあなたへの気持ちは……ただの敬意や恩義ではなく、人として、異性として慕う……思慕の情なのだと思います」"
translation = "「분명…… 제가 당신께 품은 감정은…… 단순한 경의나 은혜가 아니라, 한 사람으로서, 이성으로서 연모하는…… 사모의 정이라고 생각합니다.」"

[[dialogue]]
speaker = "unk"
original = "うれしい、ありがとう"
translation = "기뻐, 고마워."

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「まさか、自分がこんな気持ちを抱くなんて思ってもいませんでした……」"
translation = "「설마 제가 이런 감정을 품게 될 줄은 생각도 못 했어요……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「私にとって魔王様は初恋の人です。そんな人と、こうして想いを通じ合わせることができるなんて……」"
translation = "「저에게 있어 마왕님은 첫사랑입니다. 그런 분과 이렇게 마음을 통할 수 있게 되다니……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「魔王様……ありがとうございます」"
translation = "「마왕님…… 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "つつましくエステルが俺の胸に身を預けてくる。"
translation = "에스텔이 조심스럽게 내 가슴에 몸을 맡겨온다."

[[dialogue]]
speaker = "unk"
original = "そんなエステルを俺は愛情を込めて優しく抱きしめたのだった。"
translation = "그런 에스텔을 나는 애정을 담아 상냥하게 껴안아 주었다."

