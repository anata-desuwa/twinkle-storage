[[dialogue]]
speaker = "unk"
original = "とある休日。俺は恋人のリーリアとリゾート結界のプライベートビーチへ遊びにやって来ていた。"
translation = "어느 휴일. 나는 연인인 리리아와 리조트 결계의 프라이빗 비치에 놀러 와 있었다."

[[dialogue]]
speaker = "unk"
original = "そうして、浜辺でスキンシップをしていたら、いい雰囲気になり――"
translation = "그렇게 해변에서 스킨십을 하고 있으니 좋은 분위기가 되어――"

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「セ～ンパイ<emoji=heart04>\u3000今日はこの衣装でしちゃいましょう<emoji=heart04>」"
translation = "「선~배<emoji=heart04> 오늘은 이 의상으로 해버려요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最近、リーリアがアルケインコードによって覚醒した『アルカンシェルフォーム』。彼女はそれに変身しながら言う。"
translation = "최근 리리아가 아르케인 코드로 인해 각성한 『아르캉시엘 폼』. 그녀는 그것으로 변신하며 말한다."

[[dialogue]]
speaker_original = "リーリア（覚醒）"
speaker_translation = "릴리아(각성)"
original = "「実はですね～、研究していた魔法がついに完成したんですよ～<emoji=heart04>」"
translation = "「사실은요~ 연구하던 마법이 드디어 완성됐거든요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔法？」"
translation = "「마법?」"

[[dialogue]]
speaker = "unk"
original = "俺たちはそれから、リゾート結界にある水上コテージに移動して――"
translation = "우리들은 그러고 나서 리조트 결계에 있는 수상 방갈로로 이동해서――"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふっ、は～い<emoji=heart04>\u3000センパイの大好きな、可愛い後輩のおっぱいですよ～<emoji=heart04>」"
translation = "「후훗, 자아~<emoji=heart04> 선배가 정말 좋아하는 귀여운 후배의 가슴이에요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ベッドの上で俺に跨ったリーリアは、前をはだけさせながら言う。"
translation = "침대 위에서 나를 타고 앉은 리리아는 앞을 풀어헤치며 말한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。俺の大好きな、可愛いおっぱいだ」"
translation = "「아아. 내가 정말 좋아하는 귀여운 가슴이야.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えへへへへへぇ～<emoji=heart04>」"
translation = "「에헤헤헤헤헤~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチをする度に『リーリアのありのままのおっぱいが好きだ』と愛を囁き続けた結果、彼女は俺の前だと自信を持っておっぱいを見せてくれるようになっていた。"
translation = "섹스를 할 때마다 『리리아의 있는 그대로의 가슴이 좋아』라며 사랑을 계속 속삭인 결과, 그녀는 내 앞에서라면 자신 있게 가슴을 보여주게 되어 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで、完成した魔法って……？」"
translation = "「그래서, 완성했다는 마법은……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふふふっ……驚かないで下さいね～？\u3000ズバリ――」"
translation = "「후후훗…… 놀라지 마세요~? 바로――」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「誰もが１度は夢見る、おっぱいを大きくする『豊胸魔法』が、ついに実現したんですよ～！」"
translation = "「누구나 한 번쯤은 꿈꾸는, 가슴을 크게 만드는 『풍흉 마법』이 드디어 실현됐답니다~!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ってちょっと、センパイ！？\u3000なんでそんな急に、呆れたようなジト目になってるんですか！？」"
translation = "「어라 잠깐, 선배!? 왜 그렇게 갑자기, 어이없다는 듯한 곁눈질로 보시는 건가요!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや……ありのままのリーリアが好きだって言い続けたのに、残念ながら俺の想いは伝わってなかったんだなと……」"
translation = "「아니…… 있는 그대로의 리리아가 좋다고 계속 말했는데, 아쉽게도 내 마음은 전해지지 않았던 거구나 싶어서……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「いやいや、誤解ですって！？\u3000ちゃんと伝わってますから！！」"
translation = "「아니 아니, 오해라니까요!? 제대로 전해지고 있으니까요!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でもエッチな魔法を使うと、センパイ、いつも喜んでくれるから……彼女としては色々覚えて試してあげたくなっちゃうじゃないですか～！」"
translation = "「하지만 야한 마법을 쓰면, 선배, 항상 기뻐해 주니까…… 여자친구로서는 이것저것 배워서 시험해 봐 주고 싶어지잖아요~!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「う……。それはまぁ、俺も男なので……」"
translation = "「으……. 그건 뭐, 나도 남자니까……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でしょ～？\u3000だったら、可愛い後輩の大きなおっぱい、試してみたいですよね～？」"
translation = "「그쵸~? 그렇다면, 귀여운 후배의 커다란 가슴, 시험해 보고 싶으시죠~?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ただ、発動までに少し時間がかかる魔法なので、それまでにセンパイの方を準備しちゃいますね<emoji=heart04>」"
translation = "「다만, 발동까지 조금 시간이 걸리는 마법이라서, 그때까지 선배 쪽을 준비해 버릴게요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、彼女は俺のペニスにおま○こを擦り付け始める。"
translation = "그렇게 말하며, 그녀는 내 페니스에 보지를 문지르기 시작한다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000センパイのおち○ちん、可愛い後輩の素股で大きくしちゃいますから、待ってて下さいね～<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아아……<emoji=heart04> 선배의 자지, 귀여운 후배의 스마타로 크게 만들어 버릴 테니까, 기다려 주세요~<emoji=heart04> 응<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000センパイの、すぐに大きく、固くなって……<emoji=heart04>\u3000可愛い後輩おま○こ、期待で愛液溢れてきちゃいます<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふあぁ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 대단해<emoji=heart04> 선배 거, 금방 커지고, 딱딱해져서……<emoji=heart04> 귀여운 후배 보지, 기대감으로 애액이 넘쳐 흘러 버려요<emoji=heart04> 으응<emoji=heart04> 후아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はぁんっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>\u3000おち○ちん、熱いですっ<emoji=heart04>\u3000んぅっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000クリ擦れて気持ちいいっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 응후……<emoji=heart04> 자지, 뜨거워요<emoji=heart04> 응으<emoji=heart04> 후아아……<emoji=heart04> 클리 스쳐서 기분 좋아<emoji=heart04> 응응<emoji=heart04> 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000いつもより濡れちゃって、あっという間にセンパイのおち○ちん、ぬるぬるになっちゃいました……<emoji=heart04>」"
translation = "「후우우<emoji=heart04> 하아아<emoji=heart04> 평소보다 젖어버려서, 순식간에 선배의 자지, 미끌미끌해져 버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「これならもう、挿れちゃっても大丈夫ですよね？\u3000んっ……ああっ<emoji=heart04>\u3000センパイのおち○ちん、おま○この入り口に当たって……<emoji=heart04>」"
translation = "「이거라면 이제, 삽입해도 괜찮겠죠? 응…… 아앗<emoji=heart04> 선배의 자지, 보지 입구에 닿아서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んああぁっ<emoji=heart04>\u3000穴押し広げられて、おま○こに入っちゃ――<emoji=heart04><emoji=heart04>」"
translation = "「응아아아<emoji=heart04> 구멍이 벌려져서, 보지에 들어가버려――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、卑猥な蜜音と共に、ペニスが極上の感触に飲み込まれた、次の瞬間。"
translation = "그렇게, 비외한 밀음과 함께, 페니스가 극상의 감촉에 삼켜진, 다음 순간."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ――ふあああああぁぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗――후아아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？\u3000リーリア、それ……！」"
translation = "「!? 리리아, 그거……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はいっ<emoji=heart04>\u3000えへへっ<emoji=heart04>\u3000これが、アルカンシェルフォームの魔力ブーストを応用することで実現した、豊胸魔法です<emoji=heart04>」"
translation = "「네에<emoji=heart04> 에헤헤<emoji=heart04> 이것이, 아르캉시엘 폼의 마력 부스트를 응용하는 것으로 실현한, 풍유 마법이에요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本物なのか！？\u3000ごくり……」"
translation = "「진짜인 거냐!? 꿀꺽……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あんっ<emoji=heart04>\u3000ふふっ、センパイ、大きくなったおっぱいを見た途端、おち○ちんが更に大きくなってますよ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 후후, 선배, 커진 가슴을 보자마자 자지가 더욱 커지고 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それじゃあ、おま○こ動かしちゃいますね<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ――<emoji=heart04><emoji=heart04>」"
translation = "「그러면, 보지 움직여 버릴게요<emoji=heart04> 하아아<emoji=heart04> 응――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んうぅっ<emoji=heart04>\u3000ふあああああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000センパイの、奥まで入って来ましたぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응우으<emoji=heart04> 후아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 선배의 것, 안쪽까지 들어왔어요~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000ふうぅっ……ふああぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ……はああぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅっ……ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응아아앗<emoji=heart04> 후우우……후아아<emoji=heart04> 응<emoji=heart04> 하아아<emoji=heart04> 응우으……하아아<emoji=heart04> 응응<emoji=heart04> 하아아<emoji=heart04> 응후……후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイのおち○ちん、すごいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁっ、ふうぅうっ<emoji=heart04>\u3000気持ちいぃですぅっ<emoji=heart04>\u3000んうぅっ、ふあぁっ……あっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「선배의 자지, 굉장해<emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> 하아아, 후우우우<emoji=heart04> 기분 좋아요오<emoji=heart04> 응우으, 후아아……앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「可愛い後輩おま○こ、センパイの極太おち○ちんで広げられてぇ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000気持ちいいのぉっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ……ふああぁん<emoji=heart04>」"
translation = "「귀여운 후배 보지, 선배의 왕자지로 벌려져서어<emoji=heart04> 응<emoji=heart04> 후우우<emoji=heart04> 후아아<emoji=heart04> 기분 좋은걸요오<emoji=heart04> 앗<emoji=heart04> 응우으<emoji=heart04> 하아아……후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアの大きくなったおっぱいが、彼女の動きに合わせてぶるん、ぶるんと揺れる。"
translation = "리리아의 커진 가슴이, 그녀의 움직임에 맞춰 출렁, 출렁하고 흔들린다."

[[dialogue]]
speaker = "unk"
original = "その魔法の果実に、俺は思わず目が惹きつけられてしまう。"
translation = "그 마법의 과실에, 나는 나도 모르게 눈길을 빼앗기고 만다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んっ……ふうぅううっ<emoji=heart04>\u3000センパイの視線、おっぱいに感じます<emoji=heart04>\u3000はあぁっ……あぁあんっ<emoji=heart04>」"
translation = "「응……후우우우우<emoji=heart04> 선배의 시선, 가슴에 느껴져요<emoji=heart04> 하아아……아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ、おっぱいにすごく触りたそうな顔してますよ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んはぁっ……んあぁっ<emoji=heart04>」"
translation = "「선배, 가슴을 엄청 만지고 싶어 하는 얼굴 하고 있어요<emoji=heart04> 응응으<emoji=heart04> 응하아……응아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、ダメです<emoji=heart04>\u3000私の騎乗位が終わるまで、お預けですっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ……！」"
translation = "「하지만, 안 돼요<emoji=heart04> 제 기승위가 끝날 때까지, 보류예요<emoji=heart04> 하아아<emoji=heart04> 응우으……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「その代わり、このおっぱいが本物かどうか、私がじっくり試してあげますから<emoji=heart04>\u3000センパイはそのまま見てて下さいねっ<emoji=heart04>\u3000んっ……ふうぅっ<emoji=heart04>」"
translation = "「그 대신, 이 가슴이 진짜인지 어떤지, 제가 듬뿍 시험해 줄 테니까<emoji=heart04> 선배는 그대로 보고 계세요<emoji=heart04> 응……후우우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、リーリアはおっぱいを見せびらかすように、自分の手で揉み始める。"
translation = "그렇게 말하며, 리리아는 가슴을 과시하듯이, 자신의 손으로 주무르기 시작한다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はあぁっ……<emoji=heart04>\u3000ほら、見て下さい、センパイ<emoji=heart04>\u3000おっぱい、こんなにボリュームがあるんですよ？\u3000鷲掴みにしても手に収まらないくらい<emoji=heart04>\u3000あっ……んふぅっ<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 자, 보세요, 선배<emoji=heart04> 가슴, 이렇게 볼륨이 있다고요? 움켜쥐어도 손에 다 들어오지 않을 정도로<emoji=heart04> 앗……응후<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「すごく柔らかくて、こうやって強く揉むと……んんんっ<emoji=heart04>\u3000指が沈み込んじゃう<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000んんぅっ……はあぁっ……<emoji=heart04>」"
translation = "「엄청 말랑말랑해서, 이렇게 세게 주무르면……응응응<emoji=heart04> 손가락이 파묻혀 버려<emoji=heart04> 응아아앗<emoji=heart04> 응응으……하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアが自分で胸を弄りながら腰を振っている様に、俺はより興奮してしまう。"
translation = "리리아가 스스로 가슴을 만지작거리며 허리를 흔들고 있는 모습에, 나는 더욱 흥분하고 만다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ<emoji=heart04>\u3000センパイのおち○ちん、私の中で反応してますっ<emoji=heart04>\u3000はあぁっ、すごいっ<emoji=heart04>\u3000まだ膨らんで大きくなっちゃうなんてぇ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふうぅっ……はあぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 선배의 자지, 제 안에서 반응하고 있어요<emoji=heart04> 하아아, 굉장해<emoji=heart04> 아직 부풀어서 커져 버리다니이<emoji=heart04> 응아아<emoji=heart04> 후우우……하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「わ、私もなんか、おっぱいがいつもより気持ちいいですっ<emoji=heart04>\u3000センパイを喜ばせようと思っただけなのに、弄る手が止まらなくなってぇ……<emoji=heart04>」"
translation = "「저, 저도 왠지, 가슴이 평소보다 기분 좋아요<emoji=heart04> 선배를 기쁘게 하려고 생각했을 뿐인데, 만지는 손이 멈추지 않게 되어서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はぁああんっ<emoji=heart04>\u3000もしかすると……おっぱいのサイズだけじゃなくて、感度も良くなっちゃってるのかもぉ<emoji=heart04>\u3000あっ……あぁあんっ<emoji=heart04>」"
translation = "「하아아아앙<emoji=heart04> 어쩌면…… 가슴 사이즈뿐만 아니라, 감도도 좋아져 버린 걸지도오<emoji=heart04> 앗……아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……セックスしながら、リーリアのオナニー姿を見てるみたいで、めちゃくちゃエッチだ！」"
translation = "「윽…… 섹스하면서 리리아의 자위하는 모습을 보고 있으니까, 엄청 야해!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「お、オナニー<emoji=heart04>\u3000私、センパイの前なのに、自分１人でしてる時みたいに、おっぱいオナニーしちゃってるんだぁっ……<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふあぁっ！」"
translation = "「자, 자위<emoji=heart04> 저, 선배 앞인데도 혼자 있을 때처럼 가슴 자위를 해버리고 있어요……<emoji=heart04> 응윽<emoji=heart04> 후아앗!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、んふぅっ<emoji=heart04>\u3000恥ずかしいのに、手ぇ止まらないっ<emoji=heart04>\u3000興奮して、おっぱいもっと弄っちゃいますぅっ<emoji=heart04>\u3000はあぁっ、んあぁっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「앗, 응후웃<emoji=heart04> 부끄러운데 손이 멈추지 않아<emoji=heart04> 흥분해서 가슴을 더 만져버리게 돼요<emoji=heart04> 하아앗, 응아앗<emoji=heart04> 응후웃……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ、リーリアの恥ずかしいオナニー姿、もっと見て下さいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000んんっ、ふああぁっ<emoji=heart04>」"
translation = "「선배, 리리아의 부끄러운 자위 모습 더 봐주세요<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아앙<emoji=heart04> 응윽, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はああぁっ<emoji=heart04>\u3000おっぱいオナニーで気持ち良くなっちゃうっ<emoji=heart04>\u3000おま○こしながらのオナニー、すごく気持ちいいのぉっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 가슴 자위로 기분 좋아져 버려<emoji=heart04> 보지 하면서 하는 자위, 너무 기분 좋아아<emoji=heart04> 응아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自分のおっぱいを揉む彼女の指は、やがて乳首に触れる。途端にビクッと体を震わせて──"
translation = "자신의 가슴을 주무르는 그녀의 손가락은 이윽고 유두에 닿는다. 그 순간 움찔하며 몸을 떨더니──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んひぃいっ<emoji=heart04>\u3000乳首弄るの気持ちいいっ<emoji=heart04>\u3000乳首オナニー、頭の中バチバチしちゃうっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000あっ……ひっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04>」"
translation = "「응히잇<emoji=heart04> 유두 만지는 거 기분 좋아<emoji=heart04> 유두 자위, 머릿속이 찌릿찌릿해져<emoji=heart04> 히잉<emoji=heart04> 앗…… 히익<emoji=heart04> 히아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000これ刺激強くてすごひっ<emoji=heart04>\u3000ふひいぃんっ<emoji=heart04>\u3000乳首引っ張るの気持ちいいですぅっ<emoji=heart04>\u3000んうぅっ、ひあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「하앗<emoji=heart04> 하아앗<emoji=heart04> 이거 자극이 강해서 굉장해앳<emoji=heart04> 후히이잉<emoji=heart04> 유두 잡아당기는 거 기분 좋아요오<emoji=heart04> 응우윽, 히아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「大きくなったおっぱい、自分でも乳首吸えちゃいますっ<emoji=heart04>\u3000んむっ……ちゅっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>」"
translation = "「커진 가슴, 저 스스로도 유두를 빨 수 있어요<emoji=heart04> 응뭇…… 츄릅<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「おっぱいキュンキュンしちゃうっ<emoji=heart04>\u3000んちゅっ……ちゅうっ<emoji=heart04>\u3000んむうぅっ<emoji=heart04>\u3000ちゅうぅっ、ちゅむぅっ<emoji=heart04>」"
translation = "「가슴이 큥큥거려요<emoji=heart04> 응츄…… 츄우<emoji=heart04> 응무우윽<emoji=heart04> 츄우우, 츄무우<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はあぁっ<emoji=heart04>\u3000自分の乳首、舌で転がすの気持ちいいっ<emoji=heart04>\u3000れろちゅっ……れるれるっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000ちゅぱっ……はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 내 유두를 혀로 굴리는 거 기분 좋아<emoji=heart04> 레로츄…… 렐렐레<emoji=heart04> 응앗<emoji=heart04> 후아앗<emoji=heart04> 츄파…… 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「自分でおっぱい吸いながら、イっちゃいそうですっ<emoji=heart04>\u3000んっ、ふうぅっ<emoji=heart04>\u3000はあぁっ……んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「스스로 가슴을 빨면서 가버릴 것 같아요<emoji=heart04> 응, 후우윽<emoji=heart04> 하아앗…… 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーリア、そんなの見せつけられたら、俺も我慢できない……！」"
translation = "「리리아, 그런 걸 보여주면 나도 참을 수 없잖아……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えっ？\u3000あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「엣? 앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふあああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000センパイ、おち○ちん激しいいぃ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 선배, 자지가 격렬해요오～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は下から腰を突き上げ始める。"
translation = "나는 아래에서 허리를 쳐올리기 시작했다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000んうぅっ、んあぁっ、ふああぁっ<emoji=heart04>\u3000ピストン強くて、おま○こ痺れるぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아앗<emoji=heart04> 후아앗<emoji=heart04> 굉장해<emoji=heart04> 응우윽, 응아앗, 후아아앗<emoji=heart04> 피스톤이 강해서 보지가 저려와아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「下から突かれるのすごぉいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ、んあぁあっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「아래에서 찔리는 거 굉장해애<emoji=heart04> 앙<emoji=heart04> 하아앗, 응아아앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04> 보지 기분 좋아<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 후아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイもっとぉ<emoji=heart04>\u3000もっと突いて下さいっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000はあぁっ、んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「선배 더어<emoji=heart04> 더 찔러주세요<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 하아앗, 응아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「気持ちいいっ<emoji=heart04>\u3000おち○ちん気持ちいいっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 자지 기분 좋아아<emoji=heart04><emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 하아앗<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リーリアは自分でも更なる快楽を求めるように、腰を激しく動かして行く。"
translation = "리리아는 스스로도 더한 쾌락을 갈구하듯 허리를 격렬하게 움직여 갔다."

[[dialogue]]
speaker = "unk"
original = "そして、自身の胸を触りながら、乳首オナニーも継続していた。"
translation = "그리고 자신의 가슴을 만지면서 유두 자위도 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女にわざと尋ねる。"
translation = "나는 그런 그녀에게 일부러 물었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーリア、もしかして恋人の俺がいるのにっ……いつもそうやって隠れてオナニーしてたのかっ？」"
translation = "「리리아, 설마 애인인 내가 있는데도…… 항상 그렇게 몰래 자위하고 있었던 거야?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そ、それはぁ……！」"
translation = "「그, 그건……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「正直に言わないと、腰動かすの止めちゃうぞっ……？」"
translation = "「솔직하게 말 안 하면 허리 움직이는 거 멈춰버린다……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「やっ<emoji=heart04>\u3000ダメぇっ<emoji=heart04>\u3000ちゃんと言いますからぁっ<emoji=heart04>\u3000センパイ、おち○ちん止めないでぇっ<emoji=heart04>」"
translation = "「싫어<emoji=heart04> 안 돼요<emoji=heart04> 제대로 말할 테니까아<emoji=heart04> 선배, 자지 멈추지 말아줘요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「してましたぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000センパイが忙しくて会えない日に、よくしちゃってましたぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「하고 있었어요오<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 선배가 바빠서 못 만나는 날에 자주 해버렸어요오<emoji=heart04> 앙<emoji=heart04> 하앙<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイとエッチするの想像してぇっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000おっぱいとおま○こ自分でオナニーして、慰めてましたぁっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「선배랑 섹스하는 거 상상하면서어<emoji=heart04> 응아앗<emoji=heart04> 하아앗<emoji=heart04> 가슴이랑 보지 스스로 자위하면서 달랬어요오<emoji=heart04><emoji=heart04> 응<emoji=heart04> 후아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――どんな風にって？\u3000そ、そのぉ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「──어떤 식으로냐고요? 그, 그게에<emoji=heart04> 응윽<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んうぅっ<emoji=heart04><emoji=heart04>\u3000じ、実は、こっそり魔法で作った、センパイのおち○ちんと同じ形のディルド使ってましたぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응우윽<emoji=heart04><emoji=heart04> 사, 사실은 몰래 마법으로 만든 선배 자지랑 똑같은 모양의 딜도 썼었어요오<emoji=heart04> 하아앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺に秘密でディルドに浮気してたなんてっ……そんな悪い後輩には、お仕置きだっ！」"
translation = "「나한테 비밀로 딜도랑 바람을 피우다니…… 그런 나쁜 후배에겐 벌을 줘야겠네!」"

[[dialogue]]
speaker = "unk"
original = "俺はペニスの挿入角度を変えて、リーリアの弱いところを擦り上げる。"
translation = "나는 페니스의 삽입 각도를 바꿔서 리리아의 약한 곳을 긁어 올렸다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ――ひぃんっ！？\u3000センパイ、そこっ<emoji=heart04>\u3000Ｇスポットぉ<emoji=heart04><emoji=heart04>\u3000弱点っ<emoji=heart04>\u3000あっ、ひっ<emoji=heart04>\u3000ひいぃんっ<emoji=heart04><emoji=heart04>\u3000ひぅっ、ひあぁっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗── 히잉!? 선배, 거기<emoji=heart04> G스팟으으윽<emoji=heart04><emoji=heart04> 약점<emoji=heart04> 앗, 히익<emoji=heart04> 히이잉<emoji=heart04><emoji=heart04> 히윽, 히아앗<emoji=heart04> 히아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ、ごめんなさいっ<emoji=heart04>\u3000許してぇっ<emoji=heart04>\u3000もう使いませんからぁっ<emoji=heart04>\u3000あっ、ひあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「선배, 죄송해요오<emoji=heart04> 용서해줘요오<emoji=heart04> 이제 안 쓸 테니까아<emoji=heart04> 앗, 히아앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――ディルドは没収？\u3000それと、これからはオナニー禁止ってっ<emoji=heart04>\u3000そ、そんなぁっ<emoji=heart04>\u3000ひんっ<emoji=heart04>\u3000んあぁっ、ひあぁっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「──딜도는 몰수? 그리고 앞으로는 자위 금지라니이<emoji=heart04> 그, 그럴 수가아<emoji=heart04> 히잉<emoji=heart04> 응아앗, 히아앗<emoji=heart04> 히아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、んうぅっ<emoji=heart04>\u3000ひああぁっ<emoji=heart04>\u3000そんなの、ムラムラ我慢できなくなっちゃいますぅっ<emoji=heart04>\u3000んっ、んひぃっ<emoji=heart04>\u3000ひいいぃんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 응우윽<emoji=heart04> 히아아앗<emoji=heart04> 그러면 몸이 달아올라서 못 참게 되어버려요오<emoji=heart04> 응, 응히익<emoji=heart04> 히이이잉<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だったら、これからいつでも俺がしてやる！\u3000オナニーしたくなったら俺の所に来るんだっ！」"
translation = "「그렇다면 앞으로는 언제든 내가 해주지! 자위하고 싶어지면 나한테 오라고!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「えええっ！？\u3000ああぁ<emoji=heart04>\u3000んふぅぅぅうんっ<emoji=heart04>」"
translation = "「에에엣!? 아아아<emoji=heart04> 응후우우우우웅<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーリアのおま○こに挿れていいのは俺だけだ！\u3000だから、いいなっ？」"
translation = "「리리아의 보지에 넣어도 되는 건 나뿐이야! 그러니까, 알겠지?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「せ、センパイっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「서, 선배<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はいぃっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「네에에<emoji=heart04><emoji=heart04><emoji=heart04> 응윽<emoji=heart04> 응아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「リーリアはこれからっ<emoji=heart04>\u3000ちょっとでもムラムラしたら、センパイおち○ちんにハメハメしてもらいますぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「리리아는 이제부터<emoji=heart04> 조금이라도 몸이 달아오르면 선배 자지에 하메하메 받을게요오<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 후아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よしっ、じゃあラストスパート、行くぞっ！」"
translation = "「좋아, 그럼 라스트 스퍼트 간다!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はいぃっ<emoji=heart04><emoji=heart04>\u3000頑張って動きますから、リーリアの中にセンパイの精子、いっぱい種付けして下さいぃっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「네에에<emoji=heart04><emoji=heart04> 열심히 움직일 테니까 리리아 안에 선배 정자 잔뜩 씨내리 해주세요오<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はより一層、腰を激しく動かす。"
translation = "나는 한층 더 격렬하게 허리를 움직였다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあああああぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちんピストン、一番奥に当たってるぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지 피스톤이 제일 깊은 곳에 닿고 있어어～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000奥気持ちいいっ<emoji=heart04>\u3000パンパン気持ちいいですぅっ<emoji=heart04>\u3000んあぁっ、はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 후아아앗<emoji=heart04> 굉장해<emoji=heart04> 깊은 곳 기분 좋아<emoji=heart04> 팡팡 기분 좋아요오<emoji=heart04> 응아앗, 하아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ<emoji=heart04>\u3000ひああぁっ<emoji=heart04>\u3000センパイだめぇっ<emoji=heart04>\u3000Ｇスポット激しくズリズリだめぇっ<emoji=heart04>\u3000ひっ、ふひいぃんっ<emoji=heart04><emoji=heart04>\u3000ひあぁっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 히아아앗<emoji=heart04> 선배 안 돼애<emoji=heart04> G스팟 격렬하게 문질문질 안 돼애<emoji=heart04> 히익, 후히이잉<emoji=heart04><emoji=heart04> 히아앗<emoji=heart04> 히아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あぁあんっ<emoji=heart04>\u3000おま○こ、全部気持ちいいっ<emoji=heart04>\u3000おかしくなっちゃいますぅっ<emoji=heart04><emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ひあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 보지 전부 기분 좋아<emoji=heart04> 이상해져 버려요오<emoji=heart04><emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 히아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んひいいぃっ<emoji=heart04>\u3000しゅきぃ<emoji=heart04>\u3000センパイおち○ちん大しゅきっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おま○こ気持ちひいいぃ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응히이이잇<emoji=heart04> 좋아해애<emoji=heart04> 선배 자지 너무 좋아아<emoji=heart04> 아아앗<emoji=heart04> 기분 좋아<emoji=heart04> 보지 기분 좋아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ひっ<emoji=heart04>\u3000ひんっ<emoji=heart04>\u3000ひあぁっ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んひいぃんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히익<emoji=heart04> 히잉<emoji=heart04> 히아앗<emoji=heart04> 응아아앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응히이잉<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 히아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んあああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000センパイ、もうダメっ<emoji=heart04>\u3000来ますっ<emoji=heart04>\u3000私、来ちゃいますぅっ<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 선배, 이제 안 돼<emoji=heart04> 와요<emoji=heart04> 저 가버려요오<emoji=heart04> 앗, 앗<emoji=heart04> 앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「もうイクっ<emoji=heart04>\u3000イっちゃいますぅっ<emoji=heart04>\u3000大きいの来るぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04><emoji=heart04>\u3000ふああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이제 가<emoji=heart04> 가버려요오<emoji=heart04> 큰 거 와아<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아앗<emoji=heart04><emoji=heart04> 후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……俺も限界だ！\u3000リーリア、中に出すぞっ！！」"
translation = "「윽…… 나도 한계다! 리리아, 안에 내보낼게!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000センパイっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 선배<emoji=heart04> 가요<emoji=heart04> 가가가가가앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가앗──<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「イックうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어으으으으으으으으으으윽─────────앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はああああああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000センパイの熱いのが、中に入って来ますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 선배의 뜨거운 게 안으로 들어와요오～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000センパイの射精、長くてすごいぃ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000子宮の中、熱いのぉ<emoji=heart04>\u3000はあぁああっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 선배 사정, 길고 굉장해애<emoji=heart04><emoji=heart04><emoji=heart04> 자궁 안이 뜨거워어<emoji=heart04> 하아아아앗<emoji=heart04> 응우윽<emoji=heart04> 응아앗<emoji=heart04> 후아아아～～앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、射精が終わり――"
translation = "이윽고 사정이 끝나고──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅうっ……<emoji=heart04>\u3000やっと止まりました……<emoji=heart04>\u3000はあぁぁ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아앗<emoji=heart04> 후우우웃……<emoji=heart04> 겨우 멈췄어요……<emoji=heart04> 하아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あんっ<emoji=heart04>\u3000センパイのおち○ちん、抜けちゃいます……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 선배 자지 빠져버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「んっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000はぁ……<emoji=heart04>\u3000すごい<emoji=heart04>\u3000センパイの精子、こんなにいっぱい溢れて……<emoji=heart04>」"
translation = "「응<emoji=heart04> 후우……<emoji=heart04> 하아아<emoji=heart04> 하아……<emoji=heart04> 굉장해<emoji=heart04> 선배 정자가 이렇게나 가득 흘러넘쳐서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごく気持ち良かった……」"
translation = "「정말 기분 좋았어……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私も、いつもより興奮しながら、イっちゃいました……<emoji=heart04>」"
translation = "「저도 평소보다 더 흥분하면서 가버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、お互いの呼吸が落ち着いて来たところで、リーリアが口を開く。"
translation = "그러다 서로의 호흡이 진정되었을 때 리리아가 입을 열었다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……あの、センパイ。その……さっき言ってた、『オナニー禁止』についてなんですけど……」"
translation = "「……저기, 선배. 그…… 아까 말했던 『자위 금지』에 대해서인데요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん。俺も興奮して、勢いのままに言っちゃってた。別に本当に禁止にしなくても……」"
translation = "「미안. 나도 흥분해서 홧김에 말해버렸어. 딱히 정말로 금지하지 않아도……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……もし、私が本当にするって言ったら――」"
translation = "「……만약 제가 정말로 하겠다고 하면──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私が本当にオナニー禁止を守るって言ったら……」"
translation = "「제가 정말로 자위 금지를 지키겠다고 하면……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ムラムラした時はセンパイ、毎回手伝ってくれるんですか……？」"
translation = "「몸이 달아올랐을 때는 선배가 매번 도와주실 건가요……?」"

[[dialogue]]
speaker = "unk"
original = "恋人から期待に満ちた眼差しを向けられて、男として抑えられるはずもなく。"
translation = "연인으로부터 기대에 찬 눈빛을 받자 남자로서 억제할 수 있을 리 없었다."

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ<emoji=heart04>\u3000センパイのおち○ちん、すごい……<emoji=heart04>\u3000射精したばかりなのに、もう大きくなって……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 선배 자지 굉장해……<emoji=heart04> 방금 사정했는데 벌써 커져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リーリアがわざとエッチなことを口にするから。そんな風に言うと――」"
translation = "「리리아가 일부러 야한 말을 하니까 그렇지. 그렇게 말하면──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もしたくなった時は、すぐ抱いちゃうぞ？」"
translation = "「나도 하고 싶어질 때는 바로 안아버릴 거라고?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……そんなの、大丈夫に決まってるじゃないですか<emoji=heart04>」"
translation = "「……그런 거 당연히 괜찮죠<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「センパイ専用の、可愛い後輩のおま○こ<emoji=heart04>\u3000使いたくなったら、いつでも言って下さいね<emoji=heart04>」"
translation = "「선배 전용인 귀여운 후배의 보지<emoji=heart04> 쓰고 싶어지면 언제든 말씀하세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。じゃあ――」"
translation = "「알았어. 그럼──」"

[[dialogue]]
speaker = "unk"
original = "俺は起き上がると、リーリアの耳元で囁く。"
translation = "나는 일어나 리리아의 귓가에 속삭였다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その大きくなったおっぱいも、遠慮なく堪能しちゃうからな」"
translation = "「그 커진 가슴도 사양 않고 마음껏 즐겨줄 테니까」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ……センパイ<emoji=heart04>\u3000――あんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗…… 선배<emoji=heart04> ──앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、今度は俺がリーリアを押し倒すと、お預けされていた魔法の果実を、思う存分味わうのだった――"
translation = "그 후, 이번에는 내가 리리아를 밀어 넘어뜨리자 아껴두었던 마법의 과실을 마음껏 맛보는 것이었다──"

