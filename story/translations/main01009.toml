[[dialogue]]
speaker = "unk"
original = "第１１話,胡乱なささやき,B"
translation = "제11화, 수상쩍은 속삭임, B"

[[dialogue]]
speaker = "unk"
original = "──ネメシス。"
translation = "──네메시스."

[[dialogue]]
speaker = "unk"
original = "そう謳われた終末の森は、今も混沌の様相を呈していた。"
translation = "그렇게 칭송된 종말의 숲은, 지금도 혼돈의 양상을 띠고 있었다."

[[dialogue]]
speaker = "unk"
original = "そんな終わりと始まりの地で、一人の少女が苦悶にあえぐ──"
translation = "그런 끝과 시작의 땅에서, 한 소녀가 고통에 신음한다──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……はあ、はあ……」"
translation = "「……하아, 하아……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（さすがに……キツくなってきたわね。星力だけで回復し続けるってのも──無理があったかしら……）"
translation = "（역시…… 힘들어지네. 성력만으로 계속 회복한다는 것도── 무리가 있었던 걸까……）"

[[dialogue]]
speaker = "ヴィーナス"
original = "（なんとかＤＩＳＣは使えたけど──もう、あんな真似はできそうにないし……）"
translation = "（어떻게든 디스크는 사용할 수 있었지만── 이제, 그런 짓은 할 수 없을 것 같고……）"

[[dialogue]]
speaker = "ヴィーナス"
original = "（ううん──信じなくちゃ……！\u3000みんなならきっと<ruby>魔界<rt>こっち</rt></ruby>へ来て……私のメッセージにも気づいてくれる……！）"
translation = "（으응── 믿어야 해……! 모두라면 분명 마계으로 와서…… 내 메시지도 알아차려 줄 거야……!）"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはまだ希望を捨てていなかった。"
translation = "비너스는 아직 희망을 버리지 않았다."

[[dialogue]]
speaker = "unk"
original = "強靭な精神力が彼女を奮い立たせ、さらに金星とのリンクを強めていく。"
translation = "강인한 정신력이 그녀를 분발하게 하고, 더욱 금성과의 링크를 강화해 간다."

[[dialogue]]
speaker = "ヴィーナス"
original = "（にしても──妙と言えば、妙よね……）"
translation = "（그렇다고 해도── 이상하다면, 이상하지……）"

[[dialogue]]
speaker = "ヴィーナス"
original = "（あの男……一体誰と何を話してるのかしら……？）"
translation = "（저 남자…… 도대체 누구와 무슨 이야기를 하고 있는 걸까……?）"

[[dialogue]]
speaker = "黒騎士"
original = "『……ああ。わかっている。こちらからこれ以上の干渉をする気はない』"
translation = "『……아아. 알고 있다. 이쪽에서 이 이상의 간섭을 할 생각은 없다』"

[[dialogue]]
speaker = "黒騎士"
original = "『ジグとの契約通りでいい。事が済めば、お仲間の情報もくれてやる』"
translation = "『지그와의 계약대로면 된다. 일이 끝나면, 네 동료의 정보도 넘겨주마』"

[[dialogue]]
speaker = "黒騎士"
original = "『私が欲するのはデネブへの経路のみ──もはやアルタイルの末路など、一片の興味もない』"
translation = "『내가 원하는 것은 데네브로의 경로뿐── 이제 알타이르의 종말 따위, 한 조각의 흥미도 없다』"

[[dialogue]]
speaker = "？？？"
original = "「ＯＫ──それさえ守ってくれるならいいよ。だから、もう──彼に手を出すのはやめてよね」"
translation = "「OK── 그것만 지켜준다면 됐어. 그러니까, 이제── 그에게 손대는 건 그만둬 줘」"

[[dialogue]]
speaker = "？？？"
original = "「にしてもあなたは本当に……ジグの言ってた通りの人だね。<ruby>顧<rt>かえり</rt></ruby>みる気もないっていうか」"
translation = "「그렇다고 해도 당신은 정말로…… 지그가 말했던 그대로의 사람이네. 돌아볼 생각도 없달까」"

[[dialogue]]
speaker = "黒騎士"
original = "『フ。後戻りできぬというなら、貴様も同じことだろう』"
translation = "『흥. 되돌아갈 수 없다고 한다면, 네놈도 마찬가지일 것이다』"

[[dialogue]]
speaker = "？？？"
original = "「まーね。僕だって……ハッピーエンドの道があるなら、そっちのが良かったけどさ」"
translation = "「뭐 그렇지. 나도…… 해피 엔딩의 길이 있다면, 그쪽이 더 좋았겠지만 말이야」"

[[dialogue]]
speaker = "？？？"
original = "「誰にだって──譲れない一線ってのがあるじゃん。人間でも、そうじゃなくても」"
translation = "「누구에게나── 양보할 수 없는 선이라는 게 있잖아. 인간이든, 그렇지 않든」"

[[dialogue]]
speaker = "unk"
original = "遠くから響く黒騎士たちの会話──"
translation = "멀리서 울려 퍼지는 검은 기사들의 대화──"

[[dialogue]]
speaker = "unk"
original = "しかし今のヴィーナスに、その内容を<ruby>咀嚼<rt>そしゃく</rt></ruby>する余裕は残っていなかった。"
translation = "하지만 지금의 비너스에게, 그 내용을 곱씹을 여유는 남아있지 않았다."

[[dialogue]]
speaker = "unk"
original = "彼女の頭にあるのはただ、一人の──頼るべき相手のことだけ。"
translation = "그녀의 머릿속에 있는 것은 오직, 한 사람── 의지해야 할 상대에 대한 것뿐."

[[dialogue]]
speaker = "ヴィーナス"
original = "（クロト……）"
translation = "（쿠로토……）"

[[dialogue]]
speaker = "unk"
original = "かすれ、弱っていく命のろうそく。"
translation = "희미해지고, 약해져 가는 생명의 촛불."

[[dialogue]]
speaker = "unk"
original = "果たして彼女の目論見は──無事に結実するのだろうか。"
translation = "과연 그녀의 계획은── 무사히 결실을 맺을 수 있을까."

