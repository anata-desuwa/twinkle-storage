[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「え～いっ♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker = "unk"
original = "パテルが無邪気な笑顔を浮かべ、小さな体で抱きついてくる。"
translation = "파텔이 천진난만한 미소를 지으며, 작은 몸으로 안겨 온다."

[[dialogue]]
speaker = "unk"
original = "だけど俺が抱き返そうとすると──"
translation = "하지만 내가 마주 안으려고 하자──"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ、アイス食べよっと」"
translation = "「아, 아이스크림 먹어야지.」"

[[dialogue]]
speaker = "unk"
original = "ひらりと身を躱されてしまう。"
translation = "가볍게 몸을 피하고 만다."

[[dialogue]]
speaker = "unk"
original = "最近ずっとこんな調子で、パテルからのボディタッチは多いのに、こちらから触れようとすると避けられる。"
translation = "최근 계속 이런 식이라, 파텔의 바디 터치는 많은데, 이쪽에서 만지려고 하면 피해버린다."

[[dialogue]]
speaker = "unk"
original = "いい雰囲気になってエッチに誘おうとしても、微妙に距離を取られてばかりだ。"
translation = "좋은 분위기가 되어 야한 분위기로 유도하려고 해도, 미묘하게 거리만 둘 뿐이다."

[[dialogue]]
speaker = "unk"
original = "違和感があるというか、何か意図を感じるような……"
translation = "위화감이 있다고 할까, 무언가 의도가 느껴지는 듯한……"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ん～？\u3000残念そうな顔してどうしたの？\u3000魔王もアイス食べたいの？\u3000ぺろ……れろ……」"
translation = "「음~? 아쉬운 얼굴 하고 왜 그래? 마왕도 아이스크림 먹고 싶어? 할짝…… 낼름……」"

[[dialogue]]
speaker = "unk"
original = "俺の目の前で、パテルが白い棒アイスを舐め溶かす。その舌遣いがいやに蠱惑的に見えた。"
translation = "내 눈앞에서, 파텔이 하얀 막대 아이스크림을 핥아 녹인다. 그 혓놀림이 묘하게 고혹적으로 보였다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしのことじっと見てどうしたの？\u3000ちょっと視線が怖いよ？\u3000もしかして──」"
translation = "「나를 빤히 쳐다보고 왜 그래? 조금 시선이 무서운데? 설마──」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「体がエッチしたがってるのかな？\u3000おにーさん♪」"
translation = "「몸이 섹스하고 싶어 하는 걸까? 오빠♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……っ！」"
translation = "「……윽!」"

[[dialogue]]
speaker = "unk"
original = "俺の考えを見透かして、あざ笑うような笑みを浮かべるパテル。"
translation = "내 생각을 꿰뚫어 보고, 비웃는 듯한 미소를 짓는 파텔."

[[dialogue]]
speaker = "unk"
original = "燻っていた苛立ちがさらに高まると同時に、体の奥が熱くなる。"
translation = "그을리고 있던 짜증이 더욱 고조됨과 동시에, 몸속이 뜨거워진다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あぁ～、図星だった？\u3000おにーさん、やらし～」"
translation = "「아아~, 정곡이었어? 오빠, 야해~」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたしみたいな小さい子とエッチしたいなんて、ヘンタイなんだ～。きゃ～、こわーい♪」"
translation = "「나 같은 꼬맹이랑 섹스하고 싶다니, 변태구나~. 꺄~, 무서워라♪」"

[[dialogue]]
speaker = "unk"
original = "パテルの愛らしい声で嘲笑されて、もう我慢できなくなって──"
translation = "파텔의 사랑스러운 목소리로 조롱당하자, 이제 참을 수 없게 되어──"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「わわっ！？」"
translation = "「와왓!?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「わ～、あたしとエッチしたいからって、無理やり押し倒すなんておにーさんひど～い」"
translation = "「와~, 나랑 섹스하고 싶다고 해서, 억지로 밀어 넘어뜨리다니 오빠 너무해~」"

[[dialogue]]
speaker = "unk"
original = "押し倒されて背後を取られながらも、パテルは俺を煽るのをやめない。"
translation = "밀려 넘어져 뒤를 잡히면서도, 파텔은 나를 도발하는 것을 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "だけどその嘲笑が、俺の興奮をかき立てる。"
translation = "하지만 그 조롱이, 나의 흥분을 돋운다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「星徒会長がこんなことしていいのかなぁ？\u3000や～ん、魔王に犯されちゃう～」"
translation = "「성도회장이 이런 짓 해도 되는 걸까나? 야앙, 마왕에게 범해져 버려~」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ギラついた目であたしのこと見てるのわかるよ。あたしを交尾相手のメスとして見てるんだ」"
translation = "「번들거리는 눈으로 나를 보고 있는 거 다 알아. 나를 교미 상대인 암컷으로 보고 있는 거지?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「星騎士の上に立つ星徒会長のくせに、オスの本能丸出しで恥ずかしくないのかなぁ～？」"
translation = "「성기사 위에 서는 성도회장 주제에, 수컷의 본능을 다 드러내고 부끄럽지도 않나 봐~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（そこまで言うなら……）"
translation = "（그렇게까지 말한다면……）"

[[dialogue]]
speaker = "unk"
original = "水着を脱いで露わになったペニスを、パテルのお尻に押し付ける。"
translation = "수영복을 벗어 드러난 자지를, 파텔의 엉덩이에 밀어붙인다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひんっ……！\u3000熱くて硬いの当たって……こ、これ、魔王のおち○ぽ……？」"
translation = "「히응……! 뜨겁고 딱딱한 게 닿아서…… 이, 이거, 마왕의 자지……?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ、あれっ……？\u3000あれだけ言われたのに、本当にするの？\u3000このままおち○ぽ入れちゃうの？」"
translation = "「어, 어라……? 그렇게 말했는데, 정말로 하는 거야? 이대로 자지 넣어버리는 거야?」"

[[dialogue]]
speaker = "unk"
original = "ここで引き下がったんじゃ俺の気は収まらない。それに情欲を抑えるのももう限界だ。"
translation = "여기서 물러나면 내 기분이 풀리지 않는다. 게다가 정욕을 억제하는 것도 이제 한계다."

[[dialogue]]
speaker = "unk"
original = "苛立ちを鎮めるべく、怒張したペニスをパテルの中にうずめていく。"
translation = "짜증을 가라앉히기 위해, 노장한 자지를 파텔의 안으로 묻어간다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ちょっ、待っ──あっ、おち○ぽ、あたしの中に、ズプッて入ってきて……あ、あ、あ──」"
translation = "「잠깐, 기다── 앗, 자지, 내 안에, 즈뿝하고 들어와서…… 아, 아, 아──」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふぁああ～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「화아아아~~~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁ、はぁ……ほんとにおち○ぽ入ってる……<emoji=heart04>\u3000はっ、あっ……おっきなおち○ぽで、あたしの中、こじ開けられてるぅ……<emoji=heart04>」"
translation = "「하아, 하아…… 정말로 자지 들어와 있어……<emoji=heart04> 하앗, 앗…… 커다란 자지로, 내 안, 억지로 열리고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んんっ<emoji=heart04>\u3000中でおち○ぽビクビク跳ねてる……ぁっ……<emoji=heart04>\u3000ふぅ、はぁ……おち○ぽ熱いよぉ……<emoji=heart04>」"
translation = "「음으윽<emoji=heart04> 안에서 자지 파르르 떨리고 있어……앗……<emoji=heart04> 후우, 하아…… 자지 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あれだけ俺を煽っていたにもかかわらず、パテルの中は淡く濡れていた。"
translation = "그렇게 나를 도발했음에도 불구하고, 파텔의 안은 옅게 젖어 있었다."

[[dialogue]]
speaker = "unk"
original = "それに体が小さいせいで、膣内がよく締まって気持ちいい。"
translation = "게다가 몸이 작은 탓에, 질 내부가 꽉 조여서 기분이 좋다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「パテルの中、濡れてるぞ。パテルの方こそ期待してたんじゃないのか？」"
translation = "「파텔의 안, 젖어 있잖아. 파텔이야말로 기대하고 있었던 거 아냐?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「そ、そんなことは……」"
translation = "「그, 그런 건……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これなら動いても大丈夫そうだな」"
translation = "「이 정도면 움직여도 괜찮겠군.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ま、待ってっ！\u3000今動いたら──」"
translation = "「기, 기다려! 지금 움직이면──」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ああっ……はぁっ……あっ……あんっ<emoji=heart04>\u3000おち○ぽ擦れてっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000はんっ<emoji=heart04>」"
translation = "「아앗…… 하앗…… 앗…… 아앙<emoji=heart04> 자지 쓸려서<emoji=heart04> 하아앗<emoji=heart04> 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを前後に揺らすと、粘膜と摩擦して快感が走った。"
translation = "자지를 앞뒤로 흔들자, 점막과 마찰하며 쾌감이 달렸다."

[[dialogue]]
speaker = "unk"
original = "柔らかくてぷにぷにの肉感と相まって、さらに興奮が増していく。"
translation = "부드럽고 말랑말랑한 육감과 맞물려, 더욱 흥분이 고조된다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あたし、そんなつもりじゃ……んんぅっ<emoji=heart04>\u3000なかったのに……はあぁっ……あっ……ああぁっ<emoji=heart04>」"
translation = "「나, 그럴 생각은…… 음으윽<emoji=heart04> 아니었는데…… 하아앗…… 앗…… 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あっ、あっ……はっ、はぁっ<emoji=heart04>\u3000ま、待って──ふやあぁっ<emoji=heart04>\u3000おち○ぽ、動かさないでぇ……んぁっ……あんっ<emoji=heart04>」"
translation = "「앗, 앗…… 하앗, 하아<emoji=heart04> 기, 기다려── 후야아앗<emoji=heart04> 자지, 움직이지 마아…… 응앗…… 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "制止する声を無視して腰を動かし、パテルの中を蹂躙する。"
translation = "제지하는 목소리를 무시하고 허리를 움직여, 파텔의 안을 유린한다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふあぁああっ<emoji=heart04>\u3000はっ──ああぁんっ<emoji=heart04>\u3000やっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000おっきなおち○ぽで、あたしの中、ぐちゃぐちゃにされてるぅっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04> 하앗── 아아앙<emoji=heart04> 싫어<emoji=heart04> 하아앗<emoji=heart04> 커다란 자지로, 내 안, 엉망진창으로 만들어지고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そんなつもりじゃないなら、どういうつもりだったんだ？\u3000あんなこと言ってたら、押し倒されても文句は言えないだろ？」"
translation = "「그럴 생각이 아니라면, 무슨 생각이었던 거지? 그런 말을 했으면, 밀려 넘어져도 할 말 없잖아?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「だ、だって、エッチしたがってるあなたの顔が、かわいかったから……んんんっ<emoji=heart04>\u3000からかうの、楽しかったんだもんっ……はぁっ、ああっ……<emoji=heart04>」"
translation = "「그, 그치만, 섹스하고 싶어 하는 네 얼굴이, 귀여웠으니까…… 음음음<emoji=heart04> 놀리는 거, 즐거웠단 말이야…… 하앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふはぁ、はぁ……<emoji=heart04>\u3000ほんとに、押し倒してくるなんて、思わなくて……ひぃああぁっ<emoji=heart04>」"
translation = "「후하아, 하아……<emoji=heart04> 정말로, 밀어 넘어뜨릴 줄은, 몰라서…… 히이아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今更後悔しても遅い。柔らかいお尻が下半身に当たるのを感じながら、ペニスで突き続ける。"
translation = "이제 와서 후회해도 늦었다. 부드러운 엉덩이가 하반신에 닿는 것을 느끼며, 자지로 계속 찌른다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひぁああっ<emoji=heart04>\u3000あたしのおま○こ、まおーに、オナホにされてるっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000勝手に、使われちゃってるっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 내 보지, 마왕에게, 오나홀이 되어버려엇<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 마음대로, 사용당하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあオナホにされて感じてるパテルは、とってもいやらしい子だな」"
translation = "「그럼 오나홀이 되어서 느끼고 있는 파텔은, 정말 야한 아이네.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んんっ<emoji=heart04>\u3000だ、だって<emoji=heart04>\u3000声出ちゃう<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000ああぁ～っ<emoji=heart04>\u3000おち○ぽズボズボって……ふやぁあっ<emoji=heart04>\u3000ああぁ～～っ<emoji=heart04>」"
translation = "「음으윽<emoji=heart04> 그, 그치만<emoji=heart04> 목소리 나와버려<emoji=heart04> 화앗<emoji=heart04> 아아아~앗<emoji=heart04> 자지 퍽퍽하고…… 후야아앗<emoji=heart04> 아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000硬いおち○ぽ、深いところまで来てっ……あっ、ふあぁっ<emoji=heart04>」"
translation = "「앗, 앗, 아앙<emoji=heart04> 딱딱한 자지, 깊은 곳까지 와서…… 앗, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「まおーのバカっ、ヘンタイっ……無理やりするなんて、サイテーだよぉっ……あっ、あっ、あっ──はあぁんっ<emoji=heart04>」"
translation = "「마왕 바보, 변태…… 억지로 하다니, 최악이야아…… 앗, 앗, 앗── 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「最初にエッチしたがってたのはパテルの方だろ。それに自分は犯されそうになっておま○こ濡らすエッチな女の子だって、パテルに教えてやる」"
translation = "「먼저 섹스하고 싶어 했던 건 파텔 쪽이잖아. 게다가 자기는 범해질 것 같아서 보지나 적시는 야한 여자애라는 걸, 파텔에게 가르쳐 주지.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひぃあああっ<emoji=heart04><emoji=heart04>\u3000おち○ぽズン、ズンって、強いぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁあ……あぁんんっ<emoji=heart04>」"
translation = "「히이아아앗<emoji=heart04><emoji=heart04> 자지 쿵, 쿵하고, 강해앳<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아아…… 아앙응<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひあぁっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000好き勝手、動いて……オナホにされてるのにっ、おま○こ、熱いよぉっ<emoji=heart04>」"
translation = "「히아앗<emoji=heart04> 아앗<emoji=heart04> 마음대로, 움직여서…… 오나홀이 됐는데도, 보지, 뜨거워어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥めがけて突き入れながら、小ぶりだけど丸みを帯びたおっぱいに手を伸ばす。"
translation = "안쪽을 향해 찔러 넣으면서, 아담하지만 둥근 가슴에 손을 뻗는다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んんぅ<emoji=heart04>\u3000おっぱいまで……あぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000まおーの手で、おっぱいぐにぐにされてるっ<emoji=heart04>」"
translation = "「음으으<emoji=heart04> 가슴까지…… 아앗<emoji=heart04> 하앙<emoji=heart04> 마왕의 손으로, 가슴 주물주물 당하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000乳首、くりくりって……あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000そこ敏感だから、ダ、メ……ふっ……んん～～～っ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 젖꼭지, 조물조물하고…… 앗<emoji=heart04> 응<emoji=heart04> 거기 민감하니까, 안, 돼…… 훗…… 음음~~~윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひあぁっ……はっ……あっ、あんっ<emoji=heart04>\u3000おっぱいとおま○こ、一緒にぃ……ひぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000変に、なりそうっ……<emoji=heart04>」"
translation = "「히아앗…… 하앗…… 앗, 아앙<emoji=heart04> 가슴이랑 보지, 같이이…… 히앗<emoji=heart04> 아앙<emoji=heart04> 이상해, 질 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ツンと硬くなった乳首をぎゅっと強めに摘まむ。"
translation = "꼿꼿하게 딱딱해진 젖꼭지를 꽉 강하게 꼬집는다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んん～～っ<emoji=heart04><emoji=heart04>」"
translation = "「음음~~윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとただでさえ狭い膣がきゅぅっと締まり、ペニスを強く絞った。"
translation = "그러자 가뜩이나 좁은 질이 꽉 조여지며, 자지를 강하게 쥐어짰다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んやあぁっ<emoji=heart04>\u3000あっ、あっ、んんっ<emoji=heart04>\u3000まおーに好き勝手されてるのに……んぁっ……感じちゃってるっ<emoji=heart04>」"
translation = "「응야아앗<emoji=heart04> 앗, 앗, 음으윽<emoji=heart04> 마왕에게 마음대로 당하고 있는데…… 응앗…… 느껴버리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000無理やりされて、あたし……あっ、んっ……気持ち良くなっちゃうぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 안대앳<emoji=heart04> 안대앳<emoji=heart04> 억지로 당해서, 나…… 앗, 응…… 기분 좋아져버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「散々煽ってくれたお仕置きだ。パテルのおま○こ、このまま俺専用のオナホにしてやるからな」"
translation = "「실컷 도발해 준 것에 대한 벌이다. 파텔의 보지, 이대로 내 전용 오나홀로 만들어 줄 테니까.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひっ──！？」"
translation = "「히익──!?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んひっ<emoji=heart04>\u3000ひぎっ<emoji=heart04>\u3000ひ、ひぃんっ<emoji=heart04>\u3000あっ──あっ──あっ──ふぁああ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응힉<emoji=heart04> 히긱<emoji=heart04> 히, 히잉<emoji=heart04> 앗──앗──앗──화아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おち○ぽ激しいっ<emoji=heart04>\u3000んあぁあっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000はひぃ<emoji=heart04>\u3000おま○こズボズボされてっ<emoji=heart04>\u3000あたしのおま○こ、まおーの形にされてるっ<emoji=heart04>」"
translation = "「자지 격렬해엣<emoji=heart04> 응아아앗<emoji=heart04> 하앗<emoji=heart04> 하히이<emoji=heart04> 보지 퍽퍽 당해서<emoji=heart04> 내 보지, 마왕의 모양이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000おち○ぽ強いぃっ<emoji=heart04>\u3000おま○こ壊れるっ<emoji=heart04>\u3000壊れちゃうっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 아아앗<emoji=heart04> 자지 너무 강해엣<emoji=heart04> 보지 망가져어<emoji=heart04> 망가져버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「らめっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000まおーのおち○ぽで、おま○こ壊されちゃうぅ～っ<emoji=heart04>」"
translation = "「안대앳<emoji=heart04> 안대앳<emoji=heart04> 앗<emoji=heart04> 히익<emoji=heart04> 히잉<emoji=heart04> 마왕의 자지로, 보지 망가져버려어~~엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しくなる嬌声を浴びながら、体重を乗せて下半身を打ち付ける。"
translation = "격렬해지는 교성을 들으며, 체중을 실어 하반신을 내리친다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んひっ<emoji=heart04>\u3000あひっ<emoji=heart04>\u3000お尻、パンパンされてっ<emoji=heart04>\u3000はっ、あっ<emoji=heart04>\u3000お尻、叩かれてるみたいっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ、あっ──ふぁああっ<emoji=heart04>」"
translation = "「응힉<emoji=heart04> 아힉<emoji=heart04> 엉덩이, 팡팡 당해서<emoji=heart04> 하앗, 앗<emoji=heart04> 엉덩이, 맞는 것 같아아<emoji=heart04> 하앗<emoji=heart04> 앗, 앗──화아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はひぃっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひんっ<emoji=heart04>\u3000らめっ<emoji=heart04>\u3000無理やりされてるのにっ<emoji=heart04>\u3000気持ちっ、いいっ<emoji=heart04>」"
translation = "「하히잇<emoji=heart04> 히익<emoji=heart04> 히잉<emoji=heart04> 안대앳<emoji=heart04> 억지로 당하고 있는데도<emoji=heart04> 기분, 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おま○こキュンキュンして、切なくなっちゃうぅっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000おま○こが、あっ、熱いよぉっ<emoji=heart04>」"
translation = "「보지가 큥큥거려서, 애틋해져버려어<emoji=heart04> 응앗<emoji=heart04> 아아앗<emoji=heart04> 보지가, 앗, 뜨거워어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "深くまで突き入れる度、膣壁がぎゅうっとしがみついてきて気持ちいい。"
translation = "깊숙이 찌를 때마다, 질벽이 꽉 매달려와서 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "パテルの小さなおま○この中で激しくペニスを動かし、子宮を突き回す。"
translation = "파텔의 작은 보지 안에서 격렬하게 페니스를 움직여, 자궁을 휘젓는다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んひぃぃっ<emoji=heart04>\u3000ひぎっ<emoji=heart04>\u3000いぃっ<emoji=heart04>\u3000奥までっ、届くっ<emoji=heart04>\u3000まおーのおち○ぽで、あたしの中ぐちゃぐちゃにされてるぅ<emoji=heart04>」"
translation = "「응히이잇<emoji=heart04> 히긱<emoji=heart04> 이잇<emoji=heart04> 안쪽까지, 닿아아<emoji=heart04> 마왕의 자지로, 내 안이 엉망진창이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はぁっ──あっ──あっ──ああぁ～～っ<emoji=heart04>\u3000子宮に、ズン、ズンって当たってぇっ、お腹に響くぅっ<emoji=heart04>」"
translation = "「하앗──앗──앗──아아아~~앗<emoji=heart04> 자궁에, 쿵, 쿵하고 닿아서어, 배에 울려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「これ、らめっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000おち○ぽで、子宮突かれてっ<emoji=heart04>\u3000おかしくなるっ<emoji=heart04>」"
translation = "「이거, 안대앳<emoji=heart04> 응응<emoji=heart04> 히익<emoji=heart04> 히잇<emoji=heart04> 자지로, 자궁 찔려서어<emoji=heart04> 이상해져버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「奥までおち○ぽ届いて、気持ち良すぎるっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>\u3000おま○こ気持ち良すぎるよぉっ<emoji=heart04>」"
translation = "「안쪽까지 자지 닿아서, 너무 기분 좋아아<emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 아아앙<emoji=heart04> 보지 너무 기분 좋아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000おち○ぽ入れられたら、おま○こ負けちゃうから、エッチするのヤだったのにっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 아앗<emoji=heart04> 자지 들어오면, 보지가 져버리니까, 섹스하는 거 싫었는데에<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひぃっ──あ──あ──んんぁあ～～っ<emoji=heart04>\u3000おち○ぽズンズンされてっ<emoji=heart04>\u3000お腹の奥キュンキュンして、メスになっちゃうっ<emoji=heart04>」"
translation = "「히잇──아──아──응아아아~~앗<emoji=heart04> 자지 쿵쾅거려서어<emoji=heart04> 뱃속 깊은 곳이 큥큥거려서, 암컷이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んひっ<emoji=heart04>\u3000ひぃっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000おち○ぽすごいぃっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000ほんとに、まおーのオナホにされちゃうぅっ<emoji=heart04>」"
translation = "「응힉<emoji=heart04> 히잇<emoji=heart04> 히아아앗<emoji=heart04> 자지 굉장해엣<emoji=heart04> 후아앗<emoji=heart04> 정말로, 마왕의 오나홀이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下半身を打ち付ける勢いで、パテルのお尻の肉が弾む。"
translation = "하반신을 내리치는 기세에, 파텔의 엉덩이 살이 튀어 오른다."

[[dialogue]]
speaker = "unk"
original = "肉の感触に快楽を覚えながら、はしたなく喘ぐパテルを責める。"
translation = "살의 감촉에 쾌락을 느끼며, 천박하게 헐떡이는 파텔을 몰아붙인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「無理やりされて感じちゃうエッチなおま○こなのに、俺をバカにしたこと謝らないとな」"
translation = "「억지로 당하면서 느껴버리는 야한 보지인데, 나를 바보 취급한 거 사과해야겠지.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はひぃっ<emoji=heart04>\u3000調子に乗って、ごめんなさいっ<emoji=heart04>\u3000あたし、まおーのおち○ぽで犯されて、気持ち良くなっちゃう、エッチな子なのっ<emoji=heart04>」"
translation = "「하히잇<emoji=heart04> 우쭐거려서, 죄송해요오<emoji=heart04> 나, 마왕의 자지로 범해져서, 기분 좋아져버리는, 야한 아이야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おち○ぽに屈しちゃう、エッチなおま○こでっ、ごめんなさい<emoji=heart04>\u3000まおーのこと、バカにしてごめんなさいっ<emoji=heart04>」"
translation = "「자지에 굴복해버리는, 야한 보지라서어, 죄송해요오<emoji=heart04> 마왕님, 바보 취급해서 죄송해요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んぎっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000子宮、当たってっ<emoji=heart04>\u3000んひっ<emoji=heart04>\u3000奥突かれて、感じちゃうっ、エッチなおま○こなのぉっ<emoji=heart04>」"
translation = "「응긱<emoji=heart04> 히익<emoji=heart04> 히잉<emoji=heart04> 자궁, 닿아서어<emoji=heart04> 응힉<emoji=heart04> 안쪽 찔려서, 느껴버려어, 야한 보지야아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いつも愛らしい顔と声で人をからかってばかりのパテル。"
translation = "언제나 사랑스러운 얼굴과 목소리로 사람을 놀리기만 하는 파텔."

[[dialogue]]
speaker = "unk"
original = "そんな小さな死神の敗北宣言に征服欲を満たされ、射精欲が限界まで高まった。"
translation = "그런 작은 사신의 패배 선언에 정복욕이 채워지고, 사정욕이 한계까지 높아졌다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んひぃっ<emoji=heart04>\u3000おち○ぽドクドクして、爆発しそうっ<emoji=heart04>\u3000んぎっ──ぃっ──んぁ──あ──ああぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응히잇<emoji=heart04> 자지 두근두근거려서, 폭발할 것 같아아<emoji=heart04> 응긱──잇──응아──아──아아아~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「中に、出されちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000中に、射精されたら、おま○こイッちゃうぅっ<emoji=heart04>」"
translation = "「안에, 내버려어<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안에, 사정당하면, 보지 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もうパテルの中に精をぶちまけることしか考えられなくなって、ギリギリまで射精をこらえながら、しゃにむに子宮を責め続ける。"
translation = "이제 파텔의 안에 정액을 쏟아붓는 것밖에 생각할 수 없게 되어, 아슬아슬할 때까지 사정을 참으며 무턱대고 자궁을 계속 몰아붙인다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んぁああっ<emoji=heart04>\u3000あ──あ──あ──うああぁ～～っ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000おま○こイッちゃうっ<emoji=heart04>\u3000まおーのおち○ぽで、イかされちゃうぅっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 아──아──아──우아아아~~앗<emoji=heart04> 가버려어<emoji=heart04> 보지 가버려어<emoji=heart04> 마왕의 자지로, 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひぃああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おち○ぽビクビクって、しゃせーしようとしてるっ<emoji=heart04>\u3000あたしのおま○こに、種付けする気なんだっ<emoji=heart04>」"
translation = "「히이아앗<emoji=heart04> 앗<emoji=heart04> 아앙<emoji=heart04> 자지 움찔움찔하면서, 사정하려고 하고 있어어<emoji=heart04> 내 보지에, 씨뿌리기 할 생각이야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000ひぃんっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>\u3000まおーにしゃせーされてイクッ<emoji=heart04>\u3000おま○こイッちゃうぅぅ～～～っ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 히익<emoji=heart04> 히잉<emoji=heart04> 가버려가버려가버려어<emoji=heart04> 마왕에게 사정당해서 가버려어<emoji=heart04> 보지 가버려어어~~~엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてペニスを一番奥に届かせ、溜まりに溜まった欲望を叩きつける──！"
translation = "그리고 페니스를 가장 안쪽까지 닿게 하여, 쌓이고 쌓인 욕망을 내지른다──!"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ひあぁああぁぁあ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아아아~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あ……あ……んっ、んん～～っ<emoji=heart04>\u3000あ、あついの、ドクドクってぇ……はあぁっ……ああぁ～～っ<emoji=heart04>」"
translation = "「아…… 아…… 응, 응응~~윽<emoji=heart04> 아, 뜨거운 거, 울컥울컥하고오…… 하아앗…… 아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パテルが小さな体を絶頂に震わせ、膣壁がぎゅっと収縮し、痛いくらいの締め付けを味わいながら精を注ぐ。"
translation = "파텔이 작은 몸을 절정에 떨며, 질벽이 꽉 수축하여 아플 정도의 조임을 맛보며 정액을 쏟아낸다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んん～～っ<emoji=heart04>\u3000子宮におち○ぽ押し付けながら、射精されてるっ<emoji=heart04>\u3000んぁあっ……あっ……んんぅっ……<emoji=heart04>\u3000好きほーだい、出されて、まおーのオナホにされてるぅ<emoji=heart04>」"
translation = "「응응~~윽<emoji=heart04> 자궁에 자지 밀어붙이면서, 사정당하고 있어어<emoji=heart04> 응아앗…… 앗…… 응응으윽……<emoji=heart04> 마음대로, 내보내져서, 마왕의 오나홀이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あっ……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000あたしの子宮、せーえき飲んじゃってる<emoji=heart04>\u3000いっぱい入ってきてるっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000こんなに出されたら、赤ちゃんできちゃうよぉ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 앗……<emoji=heart04> 내 자궁, 정액 마시고 있어어<emoji=heart04> 잔뜩 들어오고 있어어<emoji=heart04> 응응<emoji=heart04> 이렇게 내버리면, 아기 생겨버려어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「んん～～っ<emoji=heart04><emoji=heart04>\u3000赤ちゃんって言ったら……またおち○ぽドクドクして……はあぁっ<emoji=heart04>\u3000あたしのこと、孕ませようとしてる……<emoji=heart04>」"
translation = "「응응~~윽<emoji=heart04><emoji=heart04> 아기라고 하니까…… 또 자지 울컥울컥해서…… 하아앗<emoji=heart04> 나를, 임신시키려고 하고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「まだ、出て……はあぁ……あっ……<emoji=heart04>\u3000んっ……はっ……あぁ……ああぁ～……っ<emoji=heart04>」"
translation = "「아직, 나와…… 하아아…… 앗……<emoji=heart04> 응…… 핫…… 아아…… 아아아~……앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あんっ……<emoji=heart04>\u3000おち○ぽ、抜けちゃった……」"
translation = "「아앙……<emoji=heart04> 자지, 빠져버렸다……」"

[[dialogue]]
speaker = "unk"
original = "萎えかけたペニスが抜けると、こじ開けられる前はぴったりと閉じていたスリットから、白濁がどろりと溢れ出す。"
translation = "시들기 시작한 페니스가 빠지자, 열리기 전에는 딱 닫혀 있던 틈새에서 백탁액이 주르륵 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "小さなおま○こから精液がこぼれる様に、ぞくりと腰の奥が震えた。"
translation = "작은 보지에서 정액이 쏟아지는 모습에, 오싹하고 허리 깊은 곳이 떨렸다."

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「はーっ……はーっ……魔王をからかったら、こんなことになるとは思わなかったよ……」"
translation = "「하아-…… 하아-…… 마왕을 놀리면, 이런 일이 될 줄은 몰랐어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、ちょっとやりすぎだったかも……。だけど軽い気持ちでイタズラすると、痛い目に遭うこともあるんだからな」"
translation = "「미안, 좀 과했을지도 모르겠네……. 하지만 가벼운 마음으로 장난치면, 아픈 꼴을 당할 수도 있으니까.」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「うん、あたしもちょっと反省したよ……」"
translation = "「응, 나도 좀 반성했어……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「でもたまになら、こーいうのもありかもしれないね……<emoji=heart04>」"
translation = "「하지만 가끔이라면, 이런 것도 괜찮을지도 모르겠네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから時々パテルが俺を煽るようになって、それを合図にまたお仕置きをするのだった。"
translation = "그 후로 가끔 파텔이 나를 도발하게 되었고, 그것을 신호로 다시 벌을 주곤 했다."

