[[dialogue]]
speaker = "unk"
original = "第１４話,最後の鍛錬,B"
translation = "제14화, 마지막 단련, B"

[[dialogue]]
speaker_original = "ダークキングフワッチ"
speaker_translation = "다크 킹 후왓치"
original = "「イイイイィィィ～～ッ……！！」"
translation = "「이이이이이이이이익～～……!!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はぁ、はぁっ……どうだ──！？」"
translation = "「하아, 하앗…… 어떠냐──!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「９秒９８──クリアです」"
translation = "「9초 98── 클리어입니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やった……！」"
translation = "「해냈다……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ギリギリセーフね～。おめでとう、クロトくん」"
translation = "「아슬아슬 세이프네~. 축하해, 쿠로토 군」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは──あくまでみんなのサポートありきではありますけど……」"
translation = "「하하── 어디까지나 모두의 서포트가 있었기에 가능했지만요……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でもでも、１０秒じゃほとんど私たちも手出しできなかったし！\u3000ほとんどソロみたいなものだよ！」"
translation = "「하지만 하지만, 10초로는 우리도 거의 손 쓸 수 없었고! 거의 솔로나 마찬가지야!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「よし……見えてきたな！\u3000この調子なら、今度こそ俺一人で──」"
translation = "「좋아…… 보이기 시작했군! 이 기세라면, 이번에야말로 나 혼자서──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……って、あれ？」"
translation = "「……라고, 어라?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さすがに星力を消耗しすぎです。明日は本番ですから、温存したほうがよいかと」"
translation = "「역시 성력을 너무 소모했습니다. 내일은 실전이니, 아껴두는 편이 좋을 것 같습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふふ、そうね～。リハーサルで倒れちゃったら、せっかくの鍛錬ももったいないもの～」"
translation = "「후후후, 그렇네~. 리허설에서 쓰러져 버리면, 모처럼의 단련도 아깝잖아~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なるほど……確かに」"
translation = "「과연…… 확실히」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ま、今夜くらいはゆっくり休んだら？」"
translation = "「뭐, 오늘 밤 정도는 푹 쉬는 게 어때?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それがいいです。あのママさんの手料理でも食べて」"
translation = "「그것이 좋겠습니다. 그 엄마의 손 요리라도 먹으면서」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はは……了解だ。今日まで付き合ってくれてありがとう、みんな」"
translation = "「하하…… 알겠다. 오늘까지 함께 해줘서 고맙다, 모두」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「どういたしまして」"
translation = "「천만에」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「明日は応援してるわよ、クロトくん～♪」"
translation = "「내일은 응원할게, 쿠로토 군~♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺はみんなに見送られ……"
translation = "그렇게, 나는 모두의 배웅을 받으며……"

[[dialogue]]
speaker = "unk"
original = "最後の鍛錬を終えるのだった。"
translation = "마지막 단련을 마치는 것이었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……とは言ったものの」"
translation = "「……라고는 말했지만」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスと一対一、かあ……」"
translation = "「비너스와 일대일, 인가아……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「クロトくん、メキメキ強くなっててびっくりしちゃったわ」"
translation = "「쿠로토 군, 눈에 띄게 강해져서 깜짝 놀랐어」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「確かにこの成長速度なら、いつかはありえるかもと思わせるだけのポテンシャルでした。しかし」"
translation = "「확실히 이 성장 속도라면, 언젠가는 가능할지도 모른다고 생각하게 할 만한 잠재력이었습니다. 하지만」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「時間が足りてないよね……一朝一夕で敵う相手じゃないもの」"
translation = "「시간이 부족하지…… 하루아침에 이길 수 있는 상대가 아닌걸」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いくらヴィーナスちゃんでも、ちょい急かしすぎかもね～」"
translation = "「아무리 비너스짱이라도, 조금 재촉이 심했을지도 모르겠네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私、いざとなったらヴィーナスに土下座する準備しとく！\u3000だって流石に無茶だもん！」"
translation = "「나, 만약의 사태를 대비해 비너스에게 무릎 꿇고 빌 준비 해둘게! 왜냐면 아무리 그래도 무리잖아!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら健気な乙女。クロトくん想いなのね、マトイちゃん」"
translation = "「어머 기특한 아가씨. 쿠로토 군을 생각하는구나, 마토이짱」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「べっ……別にそういうのじゃありませんから！\u3000同じクラスメイトとして心配してるだけです！」"
translation = "「벼, 별로 그런 거 아니거든요! 같은 반 친구로서 걱정하는 것뿐이에요!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「テンプレ・ツンデレ」"
translation = "「클리셰・츤데레」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「（ああもう、明日どうなっちゃうんだろう……）」"
translation = "「(아아 정말, 내일 어떻게 될까……)」"

