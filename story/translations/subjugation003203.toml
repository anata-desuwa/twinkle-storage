[[dialogue]]
speaker = "unk"
original = "イクシリオンとトワは新星寮に移動し、キッチンを借りてチョコ作りを開始した。"
translation = "익실리온과 토와는 신성료로 이동해 주방을 빌려 초콜릿 만들기를 시작했다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「じゃあ、まずは試しにチョコ作りを見せてもらっていいかな？」"
translation = "「그럼 먼저 시험 삼아 초콜릿 만드는 걸 보여줄래?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。では、変身していない状態から始めますね」"
translation = "「네. 그럼 변신하지 않은 상태부터 시작할게요.」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンは迷いのない手つきでチョコ作りを始める。"
translation = "익실리온은 망설임 없는 솜씨로 초콜릿 만들기를 시작한다."

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「イクシリオンちゃん、すごく慣れてるね。普段からよく料理してるの？」"
translation = "「익실리온 양, 정말 익숙하네. 평소에 요리 자주 하니?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ええ、人間界に来てから初めて一人暮らしをするようになったので、自分でちゃんと生活できるように、時間がある時はなるべく料理を作っています」"
translation = "「네, 인간계에 온 뒤로 처음으로 혼자 살게 되어서 스스로 제대로 생활할 수 있도록 시간이 있을 때는 가급적 요리를 만들고 있어요.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「えらい……！\u3000イクシリオンちゃんって確か、流星学園の附属校に通ってたんだよね？」"
translation = "「기특해라……! 익실리온 양은 분명 유성 학원 부속 학교에 다녔었지?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。なので、今ではだいぶできるようになりました」"
translation = "「네. 그래서 지금은 꽤 할 수 있게 되었어요.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「附属校時代から自炊してたのはすごいね……！\u3000先生は学園卒業後に本格的に自分で料理を始めたから――あっ、いや、なんでもないよ！？\u3000あははは……！」"
translation = "「부속 학교 시절부터 자취했다니 대단해……! 선생님은 학원 졸업 후에 본격적으로 스스로 요리를 시작해서―― 앗, 아니, 아무것도 아니야!? 아하하하……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「コホン――ちなみに、附属校から新星学園に進学した理由ってあるの？」"
translation = "「코흠―― 참고로 부속 학교에서 신성학원으로 진학한 이유가 있니?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私の一族は守護天使アルモタヘル様を信奉していて、象徴の色として、私も赤色が好きだったんです。それで、新星学園の制服を見たとき、着てみたいと思って……<emoji=heart04>」"
translation = "「저희 일족은 수호천사 아르모타헬 님을 신봉하고 있어서 상징색으로 저도 빨간색을 좋아했어요. 그래서 신성학원 교복을 봤을 때 입어보고 싶다고 생각해서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「なるほど！\u3000赤い制服かぁ～♪」"
translation = "「그렇구나! 빨간 교복이라～♪」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あっ、でも、一応両親には手紙を送って許可をもらったうえで入学しましたので……！」"
translation = "「앗, 하지만 일단 부모님께 편지를 보내서 허락을 받은 뒤에 입학했으니까요……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「あははっ♪\u3000大丈夫大丈夫、イクシリオンちゃんは普段から真面目だし、それくらい全然いいと思うよ！」"
translation = "「아하핫♪ 괜찮아 괜찮아, 익실리온 양은 평소에 성실하고 그 정도는 전혀 괜찮다고 생각해!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ありがとうございます……新星学園の制服、本当に気に入っているので……♪」"
translation = "「감사합니다…… 신성학원 교복, 정말 마음에 들어서……♪」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンは会話を楽しみながらも、手を止めることなくチョコ作りを続ける。"
translation = "익실리온은 대화를 즐기면서도 손을 멈추지 않고 초콜릿 만들기를 계속한다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（トワ先生と会話しながら作業することで、妄想トリップせずに済んでいるので……このまま順調にいければ――）"
translation = "(토와 선생님과 대화하면서 작업하니까 망상 트립을 하지 않고 끝낼 수 있어서…… 이대로 순조롭게 가면――)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やあ、イクシー」"
translation = "「안녕, 이쿠시.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「えっ！？\u3000か、会長！？」"
translation = "「엣!? 회, 회장님!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「昨日言ってたバレンタインチョコ、作ってくれてたのか？\u3000嬉しいな」"
translation = "「어제 말했던 발렌타인 초콜릿, 만들어주고 있었던 거야? 기쁜걸.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「は、はい<emoji=heart04>\u3000実はそうなんです……えへへ<emoji=heart04>」"
translation = "「네, 네<emoji=heart04> 사실은 그래요…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「って、痛っ……！？」"
translation = "「앗, 아파라……!?」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンは手元が狂い、包丁で指先を掠めてしまった。"
translation = "익실리온은 손이 미끄러져 식칼로 손가락 끝을 스치고 말았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「イクシー、大丈夫か！？」"
translation = "「이쿠시, 괜찮아!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「大丈夫です！\u3000ちょっと不注意で……」"
translation = "「괜찮아요! 조금 부주의해서……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、俺のせいだ！\u3000すぐ救急箱取ってくるから、待ってて！」"
translation = "「미안, 내 탓이야! 금방 구급상자 가져올 테니까 기다려!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あっ<emoji=heart04>\u3000会長、そんな……！\u3000私、保健委員ですので、自分で手当てできます……！」"
translation = "「앗<emoji=heart04> 회장님, 그런……! 저, 보건위원이니까 스스로 치료할 수 있어요……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ああっ<emoji=heart04>\u3000会長と手が触れ合って……こんなに優しく……<emoji=heart04>）"
translation = "(아앗<emoji=heart04> 회장님과 손이 맞닿아서…… 이렇게 상냥하게……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "クロトはイクシリオンの手を両手で包み込み、丁寧に消毒して絆創膏を貼る。"
translation = "쿠로토는 익실리온의 손을 양손으로 감싸 쥐고 정성껏 소독한 뒤 반창고를 붙인다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（胸のドキドキで、指先の痛みもすぐに吹き飛んで……むしろ甘い感覚が伝わってくる感じで……<emoji=heart04>）"
translation = "(가슴의 두근거림 때문에 손가락 끝의 통증도 금방 날아가 버리고…… 오히려 달콤한 감각이 전해져 오는 느낌이라서……<emoji=heart04>)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「――俺が心配なんだ」"
translation = "「――내가 걱정돼서 그래.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "クロトは手を包みながら、真剣な瞳で言う。"
translation = "쿠로토는 손을 감싼 채 진지한 눈동자로 말한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「チョコを作ってくれるのは嬉しい。でも、俺はそれよりも、イクシーの方が大切なんだ。だから……この綺麗な手を怪我しないように気を付けて欲しい」"
translation = "「초콜릿을 만들어 주는 건 기뻐. 하지만 나는 그것보다 이쿠시가 더 소중해. 그러니까…… 이 예쁜 손을 다치지 않도록 조심해 줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「わ、私の方が大切……！？」"
translation = "「저, 저쪽이 더 소중하다고요……!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（そ、それってつまり……会長がそこまで私のことを想って……！？\u3000ああっ、いけません……！\u3000そんな真剣な眼差しで見つめられたら、私……<emoji=heart04>）"
translation = "(그, 그건 즉…… 회장님이 그 정도로 저를 생각해서……!? 아앗, 안 돼요……! 그런 진지한 눈빛으로 바라보시면 저……<emoji=heart04>)"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――イクシリオンちゃん……イクシリオンちゃん！」"
translation = "「――익실리온 양…… 익실리온 양!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（あれ？\u3000なんだか、トワ先生の声が近くから……？）"
translation = "(어라? 왠지 토와 선생님의 목소리가 가까이서……?)"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「――イクシリオンちゃん！\u3000大丈夫？」"
translation = "「――익실리온 양! 괜찮아?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ハッ……！？\u3000私……妄想トリップして……？」"
translation = "「핫……!? 저…… 망상 트립을 하고 있어서……?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「うん。イクシリオンちゃんの言う通り、いきなりバレンタインフォームに変身したと思ったら、そのまま……」"
translation = "「응. 익실리온 양 말대로, 갑자기 발렌타인 폼으로 변신했다 싶더니 그대로……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ああ……やっぱり、チョコ作りをすると強制的に変身してしまうんですね……」"
translation = "「아아…… 역시 초콜릿 만들기를 하면 강제적으로 변신해 버리는군요……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それもそうだけど――」"
translation = "「그것도 그렇지만――」"

[[dialogue]]
speaker_original = "バレンタヒヒーン"
speaker_translation = "발렌타히힌"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「なんかチョコも光ったと思ったら、とんでもないものが出来上がってるんだけど！？\u3000しかもなんか動いてるし！」"
translation = "「초콜릿도 빛난다 싶더니, 말도 안 되는 게 완성되어 버렸는데!? 게다가 왠지 움직이고 있고!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「実は、バレンタインフォームの力で、チョコも変身してしまうようで……」"
translation = "「실은, 발렌타인 폼의 힘으로 초콜릿도 변신해 버리는 것 같아서……」"

[[dialogue]]
speaker_original = "バレンタヒヒーン"
speaker_translation = "발렌타히힌"
original = "「バレンタヒヒーン！」"
translation = "「바렌타히히잉!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「鳴いた！？\u3000え、これ生きてるの！？\u3000いや、生きてないよね！？」"
translation = "「울었어!? 에, 이거 살아있는 거야!? 아니, 살아있지 않지!?」"

[[dialogue]]
speaker_original = "バレンタヒヒーン"
speaker_translation = "발렌타히힌"
original = "「ブルブルブル……！」"
translation = "「푸르르르……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「馬みたいに首振ってるけど、どっち！？」"
translation = "「말처럼 고개를 흔들고 있는데, 어느 쪽이야!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「自我はないので、勝手に暴れたりはしません。そこは安心して大丈夫かと……」"
translation = "「자아는 없으므로 멋대로 날뛰거나 하지는 않습니다. 그 부분은 안심하셔도 괜찮을かと……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「昨日はこれ、どう処理したの……？」"
translation = "「어제는 이거 어떻게 처리했어……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「新星寮のみなさんと分けて、美味しくいただきました。味は大味でしたが……」"
translation = "「신성료 여러분과 나눠서 맛있게 먹었습니다. 맛은 투박했지만……」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「そ、そうなんだ……でも、これを会長くんに渡すのは、ちょっと……あれだよね……」"
translation = "「그, 그렇구나…… 하지만 이걸 회장군에게 주는 건 좀…… 그렇겠지……?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい……情緒に欠けるというか……」"
translation = "「네…… 정서가 부족하다고 할까……」"

[[dialogue]]
speaker_original = "バレンタヒヒーン"
speaker_translation = "발렌타히힌"
original = "「バレンタヒヒーン！」"
translation = "「바렌타히히잉!」"

[[dialogue]]
speaker = "unk"
original = "こうして、状況を確認したあと、予定通りトワもチョコ作りを手伝うことになった。"
translation = "이렇게 상황을 확인한 뒤, 예정대로 토와도 초콜릿 만들기를 돕게 되었다."

[[dialogue]]
speaker = "unk"
original = "（※ちなみに、バレンタヒヒーンは後で、新星寮のみなさんで美味しく頂きました）"
translation = "(※참고로 바렌타히히잉은 나중에 신성료 여러분이 맛있게 먹었습니다)"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「私、チョコを作るのは久しぶりなんだけど、作り方は今のところ大丈夫そうかな？」"
translation = "「나, 초콜릿 만드는 건 오랜만인데 만드는 법은 지금까진 괜찮으려나?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はい。先生の手際がスムーズなので、順調ですよ」"
translation = "「네. 선생님의 솜씨가 능숙하셔서 순조로워요.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（チョコ作りか……学生時代は友チョコしか作ったことなかったな。これまで男の子に作ったことはなくて……）"
translation = "(초콜릿 만들기라…… 학생 때는 우정 초콜릿밖에 안 만들었었지. 지금까지 남자아이에게 만들어 준 적은 없어서……)"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（もしも私がバレンタインチョコを渡すなら、その相手は……）"
translation = "(만약 내가 발렌타인 초콜릿을 준다면 그 상대는……)"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "（――って、いやいや、私、なに考えてるの！？\u3000会長くんは生徒だし、ウェディングフォームの時は善意で協力してくれただけであって……！）"
translation = "(――랄까, 아니 아니, 나 무슨 생각을 하는 거야!? 회장군은 학생이고, 웨딩 폼 때는 선의로 협력해 준 것뿐인데……!)"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え？\u3000これは……！？\u3000急にバレンタインフォームが光り出して……！」"
translation = "「에? 이건……!? 갑자기 발렌타인 폼이 빛나기 시작해서……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「なっ……！？」"
translation = "「나앗……!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「トワ先生、衣装が……！」"
translation = "「토와 선생님, 의상이……!」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「先生も、バレンタインフォームに変身しちゃった……！？」"
translation = "「선생님도 발렌타인 폼으로 변신해 버렸어……!?」"

[[dialogue]]
speaker = "unk"
original = "イクシリオンに共鳴するように、トワも突然変身してしまうのだった。"
translation = "익실리온에게 공명하듯 토와도 갑자기 변신해 버리는 것이었다."

