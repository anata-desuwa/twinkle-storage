[[dialogue]]
speaker = "unk"
original = "第８話,大聖堂の誓い,B"
translation = "제8화, 대성당의 맹세, B"

[[dialogue]]
speaker = "シルヴィ"
original = "「よかった、誰もいな～い！」"
translation = "「다행이다, 아무도 없어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「こら、暴れないの～。どうして、こんなところに連れてきたの？」"
translation = "「얘, 날뛰지 마~. 왜 이런 곳에 데려온 거니?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「こんなところなんて言っちゃダメだよ！\u3000女神様が見てるんだから！」"
translation = "「이런 곳이라니 그러면 안 돼! 여신님이 보고 계시니까!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「女神様にもさっきのお話を聞いてもらおうと思ってさ！\u3000守護星に願いを捧げて誓いを立てると女神様の加護があるんだよ！」"
translation = "「여신님께도 아까 이야기를 들려드리려고! 수호성에 소원을 빌고 맹세를 세우면 여신님의 가호가 있대!」"

[[dialogue]]
speaker = "サーシャ"
original = "「へえ～、地元のおばあちゃんも似たようなこと言ってた気がするわ～」"
translation = "「헤에~, 고향 할머니도 비슷한 말씀을 하셨던 것 같네~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたし、おばあちゃんじゃないもん！」"
translation = "「나, 할머니 아니거든!」"

[[dialogue]]
speaker = "サーシャ"
original = "「いいわ、やりましょう。やり方を教えて？」"
translation = "「좋아, 하자. 방법을 알려줄래?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「おっけー！\u3000まずは、守護星に向かって……屋内なので、窓に向かってひざまずきます」"
translation = "「오케이! 우선은 수호성을 향해서…… 실내니까 창문을 향해 무릎을 꿇어」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふむふむ……」"
translation = "「흠흠……」"

[[dialogue]]
speaker = "シルヴィ"
original = "「それから星術を使うみたいに、気を研ぎ澄ませます」"
translation = "「그러고 나서 성술을 쓰는 것처럼, 정신을 가다듬어」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ」"
translation = "「응」"

[[dialogue]]
speaker = "サーシャ"
original = "（――こうしていると……ほのかに力を感じるわ……）"
translation = "(――이렇게 하고 있으니…… 은은하게 힘이 느껴져……)"

[[dialogue]]
speaker = "サーシャ"
original = "（守護星の星力……）"
translation = "(수호성의 성력……)"

[[dialogue]]
speaker = "サーシャ"
original = "（この暗闇と静寂が、遠く離れた守護星の力を鋭敏に感じさせるのかもしれないわね）"
translation = "(이 어둠과 정적이, 멀리 떨어진 수호성의 힘을 예민하게 느끼게 하는 걸지도 모르겠네)"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたしの真似して言って……我が守護星アヴィオールよ、我が願いを聞き届けた給え」"
translation = "「나 따라 해봐…… 나의 수호성 아비올이여, 나의 소원을 들어주소서」"

[[dialogue]]
speaker = "サーシャ"
original = "「我が守護星エウロパよ、我が願いを聞き届け給え」"
translation = "「나의 수호성 에우로파여, 나의 소원을 들어주소서」"

[[dialogue]]
speaker = "シルヴィ"
original = "「あたしの願いは、みんなを守ることです。あたしの知る人、知るところ、全てを守らせてください」"
translation = "「내 소원은 모두를 지키는 것입니다. 내가 아는 사람, 아는 장소, 전부 지키게 해주세요」"

[[dialogue]]
speaker = "サーシャ"
original = "「私の願いは、世界を知ることです。三界すべてを、あるいはその先があるというなら、遍く見てみたい」"
translation = "「제 소원은 세계를 아는 것입니다. 삼계 전부를, 혹은 그 너머가 있다면 그곳까지 널리 보고 싶어요」"

[[dialogue]]
speaker = "シルヴィ"
original = "「創造主たる女神よ、我が誓いを見届け給え」"
translation = "「창조주이신 여신이여, 나의 맹세를 지켜보아 주소서」"

[[dialogue]]
speaker = "サーシャ"
original = "「創造主たる女神よ、我が誓いを見届け給え」"
translation = "「창조주이신 여신이여, 나의 맹세를 지켜보아 주소서」"

[[dialogue]]
speaker = "シルヴィ"
original = "「星騎士シルヴィ・グリムランド。星騎士サーシャとともにリクリエを阻止し、みんなを守ります」"
translation = "「성기사 실비 그림랜드. 성기사 사샤와 함께 리크리에를 저지하고, 모두를 지키겠습니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "シルヴィ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "サーシャ"
original = "「……ふふっ」"
translation = "「……후훗」"

[[dialogue]]
speaker = "サーシャ"
original = "「星騎士サーシャ。星騎士シルヴィ・グリムランドとともにリクリエを阻止し、世界を救います」"
translation = "「성기사 사샤. 성기사 실비 그림랜드와 함께 리크리에를 저지하고, 세계를 구하겠습니다」"

[[dialogue]]
speaker = "シルヴィ"
original = "「これでばっちりだね！」"
translation = "「이걸로 완벽하네!」"

[[dialogue]]
speaker = "サーシャ"
original = "「これってシルヴィの町に伝わるやり方なの？\u3000由来とかあるのかしら？」"
translation = "「이건 실비네 마을에 전해지는 방식이니? 유래 같은 게 있을까?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「え？\u3000ううん、お姉さんに教わったやつ！」"
translation = "「어? 아니, 언니한테 배운 거야!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ、あの蛍火ちゃんに似てる人ね……」"
translation = "「아, 그 케이카짱을 닮았다는 사람 말이구나……」"

[[dialogue]]
speaker = "シルヴィ"
original = "「それより、約束だからね！」"
translation = "「그것보다, 약속이니까 말이야!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。リクリエが来たら必ず一緒に戦いましょう」"
translation = "「응. 리크리에가 오면 반드시 같이 싸우자」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャの背中はあたしが守る！」"
translation = "「사샤의 등은 내가 지킬게!」"

[[dialogue]]
speaker = "unk"
original = "高く拳を突き上げるシルヴィ。"
translation = "높게 주먹을 내지르는 실비."

[[dialogue]]
speaker = "unk"
original = "その拳は──"
translation = "그 주먹은──"

[[dialogue]]
speaker = "unk"
original = "──今はここにあった。"
translation = "──지금은 여기에 있었다."

[[dialogue]]
speaker = "unk"
original = "シルヴィの固く握りしめられた手に、サーシャはそっと自分の手を重ねる。"
translation = "실비의 꽉 쥐어진 손에, 사샤는 살며시 자신의 손을 겹친다."

[[dialogue]]
speaker = "サーシャ"
original = "「泣かないで、シルヴィ」"
translation = "「울지 마, 실비」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ごめん……でも、あたし、自分から言い出したのに、約束、守れなくて……ぐすっ、間に合わなくて……」"
translation = "「미안…… 하지만 나, 내가 먼저 말해놓고 약속 못 지켜서…… 윽, 늦어버려서……」"

[[dialogue]]
speaker = "サーシャ"
original = "「仕方のないことよ。誰にも、いつリクリエが来るかなんて分からなかったんだから」"
translation = "「어쩔 수 없는 일이야. 누구도 언제 리크리에가 올지 몰랐으니까」"

[[dialogue]]
speaker = "サーシャ"
original = "「まだ泣き止まない？\u3000よしよししてあげましょうか？」"
translation = "「아직 울음이 안 그쳐? 착하다 착하다 해줄까?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「……それはハズい。ぐすっ」"
translation = "「……그건 쪽팔려. 윽」"

[[dialogue]]
speaker = "サーシャ"
original = "「はい、ティッシュ」"
translation = "「자, 티슈」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ありがと……いいよ、鼻くらい自分でかめるからっ！\u3000チーン！」"
translation = "「고마워…… 됐어, 코 정도는 혼자 풀 수 있으니까! 팽!」"

[[dialogue]]
speaker = "サーシャ"
original = "「……落ち着いた？」"
translation = "「……진정됐어?」"

[[dialogue]]
speaker = "シルヴィ"
original = "「ごめん、いや、えっと、約束のごめんじゃなくて、急に泣き出してごめん……」"
translation = "「미안, 아니, 그게, 약속 때문에 미안한 게 아니라 갑자기 울어서 미안……」"

[[dialogue]]
speaker = "サーシャ"
original = "「いいのよ～。泣いてるシルヴィ、珍しいから面白かったわ～」"
translation = "「괜찮아~. 우는 실비는 드무니까 재밌었어~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「サーシャっていい性格してるよねー」"
translation = "「사샤는 참 성격 좋다니까」"

[[dialogue]]
speaker = "サーシャ"
original = "「誉め言葉として受け取っておくわ。それにね、助けられているって言ったでしょう？」"
translation = "「칭찬으로 받아들일게. 그리고 말이야, 도움받고 있다고 했잖아?」"

[[dialogue]]
speaker = "サーシャ"
original = "「シルヴィが、あなたの故郷をちゃんと守ってくれたから、私は戦えたのよ～」"
translation = "「실비가 네 고향을 제대로 지켜줬기에, 나는 싸울 수 있었던 거야~」"

[[dialogue]]
speaker = "シルヴィ"
original = "「え？」"
translation = "「어?」"

