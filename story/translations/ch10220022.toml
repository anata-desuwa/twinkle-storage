[[dialogue]]
speaker = "unk"
original = "第２話,モネのスペシャルメニュー？,P"
translation = "제2화, 모네의 스페셜 메뉴?"

[[dialogue]]
speaker = "モネ"
original = "「いきます……クリスマステイル……！」"
translation = "「갑니다…… 크리스마스 테일……!」"

[[dialogue]]
speaker = "unk"
original = "リップルのリゾート結界の中で、モネのトレーニングに付き合う。"
translation = "리플의 리조트 결계 안에서, 모네의 트레이닝을 도와준다."

[[dialogue]]
speaker = "unk"
original = "いつもは内気なモネだが、水着のアクティブさのためか（？）、今日は果敢に攻めていた。"
translation = "평소에는 내성적인 모네지만, 수영복의 활동성 때문인지(?), 오늘은 과감하게 공격해 오고 있었다."

[[dialogue]]
speaker = "モネ"
original = "「はぁ、はぁ……ありがとうございました。さすが会長は強いですね……」"
translation = "「하아, 하아…… 감사합니다. 역시 회장님은 강하시네요……」"

[[dialogue]]
speaker = "モネ"
original = "「え？\u3000私の星術が変わっている……ですか？」"
translation = "「에? 제 성술이 바뀌어 있다…… 고요?」"

[[dialogue]]
speaker = "モネ"
original = "「そうですね。今までは本から星術を撃ち出していたんですけど、本に描かれたものを呼び出せるようになりました」"
translation = "「그렇네요. 지금까지는 책에서 성술을 쏘아내고 있었습니다만, 책에 그려진 것을 불러낼 수 있게 되었어요」"

[[dialogue]]
speaker = "モネ"
original = "「例えばクリスマスの絵本であれば、トナカイやサンタさんを召喚することができます。本の世界を少し再現できて嬉しいです」"
translation = "「예를 들어 크리스마스 그림책이라면, 루돌프나 산타 할아버지를 소환할 수 있어요. 책의 세계를 조금이나마 재현할 수 있어서 기뻐요」"

[[dialogue]]
speaker = "モネ"
original = "「自分では成長しているつもりなんですけど……会長から見てどうでしょうか？\u3000あんまり変わらないですかね……？」"
translation = "「나름대로 성장하고 있다고 생각합니다만…… 회장님이 보시기엔 어떠신가요? 별로 변한 게 없을까요……?」"

[[dialogue]]
speaker = "unk"
original = "もう少しでプリマステラになれるかも"
translation = "조금만 더 하면 프리마스텔라가 될 수 있을지도"

[[dialogue]]
speaker = "モネ"
original = "「！\u3000はい、頑張ります！」"
translation = "「! 네, 열심히 하겠습니다!」"

[[dialogue]]
speaker = "リップル"
original = "「モネー！\u3000カイチョー！\u3000デキましたー！」"
translation = "「모네ー! 카이쵸ー! 데키마시타ー!」"

[[dialogue]]
speaker = "モネ"
original = "「あ、リップルさん、ありがとうございます」"
translation = "「아, 리플 씨, 감사합니다」"

[[dialogue]]
speaker = "モネ"
original = "「実は会長にはもう１つお願いがありまして……限界に挑戦していただきたいんです」"
translation = "「사실 회장님께는 부탁이 하나 더 있어서…… 한계에 도전해 주셨으면 해요」"

[[dialogue]]
speaker = "unk"
original = "限界？"
translation = "한계?"

[[dialogue]]
speaker = "モネ"
original = "「はい。リップルさんの海の家の新メニューを開発していて、私はホットな辛口カレーを提案したんです」"
translation = "「네. 리플 씨의 바다의 집 신메뉴를 개발하고 있는데, 저는 핫한 매운맛 카레를 제안했거든요」"

[[dialogue]]
speaker = "モネ"
original = "「ですがリップルさんから『モネのカレーは辛スギます！』と言われてしまいまして……私的にはまだ甘口のつもりだったんですが……」"
translation = "「하지만 리플 씨로부터 『모네의 카레는 너무 맵스니다!』라는 말을 들어버려서…… 제 딴에는 아직 순한맛이라고 생각했습니다만……」"

[[dialogue]]
speaker = "リップル"
original = "「ゼンゼン甘口じゃナイです！\u3000ＢＩＧ辛いです！\u3000モネの味覚に合わせたら、お客サンがいなくなってシマイます！」"
translation = "「전혀 순한맛 아니에오! BIG 매워요! 모네의 미각에 맞추면, 손님상들이 다 없어져 버려요!」"

[[dialogue]]
speaker = "モネ"
original = "「でもカレーは辛いから美味しいんじゃないですか。ですから、どのくらいの辛さが限界か、会長に試してもらいたいんです」"
translation = "「하지만 카레는 매우니까 맛있는 거 아닌가요. 그러니까, 어느 정도의 매운맛이 한계인지, 회장님이 시험해 봐 주셨으면 해요」"

[[dialogue]]
speaker = "モネ"
original = "「まぁ、限界といっても美味しく食べられる辛さですから。心配はいりませんよ」"
translation = "「뭐, 한계라고 해도 맛있게 먹을 수 있는 매운맛이니까요. 걱정하실 필요 없어요」"

[[dialogue]]
speaker = "unk"
original = "（嫌な予感がするけど）モネとリップルのためなら"
translation = "（불길한 예감이 들지만） 모네와 리플을 위해서라면"

[[dialogue]]
speaker = "モネ"
original = "「ありがとうございます！\u3000ではさっそく……これが一番辛くないカレーです」"
translation = "「감사합니다! 그럼 바로…… 이것이 가장 맵지 않은 카레예요」"

[[dialogue]]
speaker = "リップル"
original = "「オー……スデにマグマのように真っ赤でーす……」"
translation = "「오오…… 이미 마그마처럼 새빨개요……」"

[[dialogue]]
speaker = "unk"
original = "（覚悟して）じゃあいただきま──"
translation = "（각오하고） 그럼 잘 먹겠──"

[[dialogue]]
speaker = "リップル"
original = "「ノー！\u3000そうじゃナイでーす！」"
translation = "「노! 그게 아니에오!」"

[[dialogue]]
speaker = "モネ"
original = "「ひゃいっ！？」"
translation = "「햐잇!?」"

[[dialogue]]
speaker = "リップル"
original = "「モネとカイチョウーはＢＩＧナカヨシ、ラブラブです！\u3000デスから、そこはモネがあ～んするトコロでーす！」"
translation = "「모네와 카이쵸ー는 BIG 사이좋아, 러브러브예요! 그러니까, 거기는 모네가 아~앙 하는 곳이에오!」"

[[dialogue]]
speaker = "モネ"
original = "「ええっ！？\u3000そんな……あーんなんて……」"
translation = "「에엣!? 그런…… 아~앙이라니……」"

[[dialogue]]
speaker = "リップル"
original = "「モネとカイチョー、ナカヨシ違いマスか？」"
translation = "「모네와 카이쵸ー, 사이좋은 거 아니에오?」"

[[dialogue]]
speaker = "モネ"
original = "「ち、違わないですけど……」"
translation = "「아, 아니진 않지만……」"

[[dialogue]]
speaker = "unk"
original = "確かに俺とモネはＢＩＧ仲良し"
translation = "확실히 나와 모네는 BIG 사이좋지"

[[dialogue]]
speaker = "モネ"
original = "「あ……あぅ……会長まで……そう言ってもらえるのは嬉しいですけど……」"
translation = "「아…… 아우…… 회장님까지…… 그렇게 말씀해 주시는 건 기쁘지만……」"

[[dialogue]]
speaker = "モネ"
original = "「じゃ、じゃあ……あ～ん……」"
translation = "「그, 그럼…… 아~앙……」"

[[dialogue]]
speaker = "モネ"
original = "「お、お味はどうですか……？\u3000……美味しい？\u3000まだいける？\u3000なら良かったです」"
translation = "「마, 맛은 어떠신가요……? ……맛있어? 아직 괜찮아? 그럼 다행이네요」"

[[dialogue]]
speaker = "モネ"
original = "「ほら、会長は美味しいって言ってますよ、リップルさん。やっぱりカレーは辛い方がいいんですよ」"
translation = "「봐요, 회장님은 맛있다고 하시잖아요, 리플 씨. 역시 카레는 매운 편이 좋은 거예요」"

[[dialogue]]
speaker = "リップル"
original = "「カイチョー、たくさん汗かいて、チョットつらそうです……ダイジョーブですか……？」"
translation = "「카이쵸ー, 땀 많이 흘리고, 조금 힘들어 보여요…… 다이죠부인가요……?」"

[[dialogue]]
speaker = "モネ"
original = "「これでも私的には甘口なくらいなんですが……。会長ならもっと上の辛さでも大丈夫ですよね。じゃあ次の辛さにいきますよ」"
translation = "「이래 봬도 제 기준엔 순한맛 정도인데……. 회장님이라면 좀 더 높은 단계의 매운맛도 괜찮으시죠? 그럼 다음 단계로 갈게요」"

[[dialogue]]
speaker = "モネ"
original = "「はい、どうぞ。あ～ん♪」"
translation = "「자, 여기요. 아~앙♪」"

[[dialogue]]
speaker = "モネ"
original = "「この辛さも大丈夫ですか？\u3000……美味しい？\u3000ですよね、辛い方が美味しいですよね♪」"
translation = "「이 매운맛도 괜찮으신가요? ……맛있어? 그렇죠, 매운 게 더 맛있죠♪」"

[[dialogue]]
speaker = "リップル"
original = "「オー……カレーが赤くナルと、カイチョーの顔が青くなってイキまーす……」"
translation = "「오오…… 카레가 빨개질수록, 카이쵸ー의 얼굴이 파래져 가요……」"

[[dialogue]]
speaker = "モネ"
original = "「私、嬉しいです。私が美味しいと思うものを、会長が美味しいと言ってくれて。だって、好きな人と同じものを好きでいたいじゃないですか」"
translation = "「저, 기뻐요. 제가 맛있다고 생각하는 것을, 회장님이 맛있다고 해 주셔서. 그게, 좋아하는 사람과 같은 것을 좋아하고 싶잖아요」"

[[dialogue]]
speaker = "unk"
original = "（モネの笑顔は嬉しいけど辛いと言いにくい……）"
translation = "（모네의 미소는 기쁘지만 맵다고 말하기 어렵네……）"

[[dialogue]]
speaker = "モネ"
original = "「じゃあ次が最後の辛さです。私でもちょっと辛いと思うくらいなので、本当に辛かったらダメって言ってくださいね」"
translation = "「그럼 다음이 마지막 매운맛이에요. 저조차도 조금 맵다고 생각할 정도니까, 정말 매우면 안 된다고 말씀해 주세요」"

[[dialogue]]
speaker = "モネ"
original = "「はい、あ～～～ん♪」"
translation = "「자, 아~~~~앙♪」"

[[dialogue]]
speaker = "unk"
original = "～～～～～～っ！！？？"
translation = "~~~~~~~~앗!!??"

[[dialogue]]
speaker = "モネ"
original = "「会長！？」"
translation = "「회장님!?」"

[[dialogue]]
speaker = "モネ"
original = "「会長！？\u3000大丈夫ですか、会長～～～っ！！？」"
translation = "「회장님!? 괜찮으세요, 회장님~~~앗!!?」"

[[dialogue]]
speaker = "unk"
original = "結局、モネのカレーはメニューとして不採用になったのだった。"
translation = "결국, 모네의 카레는 메뉴로서 불채용되었다."

