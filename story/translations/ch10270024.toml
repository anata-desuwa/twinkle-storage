[[dialogue]]
speaker = "unk"
original = "第４話,君と一緒に,P"
translation = "제4화, 너와 함께, P"

[[dialogue]]
speaker = "unk"
original = "休日の午前十時。俺はコハルコさんを家まで迎えに来ていた。"
translation = "휴일 오전 10시. 나는 쿠하루코 씨를 집까지 데리러 왔다."

[[dialogue]]
speaker = "unk"
original = "待ちに待った、デートの日だ。"
translation = "기다리고 기다리던, 데이트 날이다."

[[dialogue]]
speaker = "コハルコ"
original = "「お待たせ、会長さん。迎えに来てくれてありがとう」"
translation = "「기다렸지, 회장님. 데리러 와줘서 고마워」"

[[dialogue]]
speaker = "ナツコ"
original = "「今日はデートなんでしょ？\u3000行ってらっしゃい！」"
translation = "「오늘 데이트지? 잘 다녀와!」"

[[dialogue]]
speaker = "トウコ"
original = "「コハルコお姉ちゃんをよろしくお願いします」"
translation = "「쿠하루코 언니를 잘 부탁드립니다」"

[[dialogue]]
speaker = "コハルコ母"
original = "「コハルコ。家のことは気にしなくていいから、楽しんできて」"
translation = "「쿠하루코. 집안일은 신경 쓰지 말고, 즐겁게 놀다 오렴」"

[[dialogue]]
speaker = "コハルコ"
original = "「ありがとう。じゃあお願いね」"
translation = "「고마워요. 그럼 부탁할게요」"

[[dialogue]]
speaker = "コハルコ父"
original = "「緋宮くん。いつもコハルコのこと、ありがとう。これからもよろしく頼むよ」"
translation = "「히노미야 군. 항상 쿠하루코를 챙겨줘서 고맙네. 앞으로도 잘 부탁하네」"

[[dialogue]]
speaker = "unk"
original = "はい、任せてください"
translation = "네, 맡겨주세요"

[[dialogue]]
speaker = "コハルコ"
original = "「今日はちょっと目的があるんだ」"
translation = "「오늘은 좀 목적이 있어」"

[[dialogue]]
speaker = "コハルコ"
original = "「会長さんの新しいパソコン、２人でパーツ選んで組んでみようよ。秋葉原中を回って、１台のパソコンを作るの」"
translation = "「회장님의 새 컴퓨터, 둘이서 부품 골라서 조립해 보자. 아키하바라 곳곳을 돌면서, 한 대의 컴퓨터를 만드는 거야」"

[[dialogue]]
speaker = "コハルコ"
original = "「……え、うちの店で買わなくていいのって？\u3000それはそれで嬉しいんだけど……それじゃつまらないっていうか……」"
translation = "「……에, 우리 가게에서 안 사도 되냐고? 그건 그것대로 기쁘긴 한데…… 그러면 재미없달까……」"

[[dialogue]]
speaker = "コハルコ"
original = "「君と秋葉原を見て回りたいんだ。……ダメかな？」"
translation = "「너랑 아키하바라를 둘러보고 싶어. ……안 될까?」"

[[dialogue]]
speaker = "コハルコ"
original = "「……もちろんＯＫ？\u3000ありがとう。会長さんならそう言ってくれると思ってた」"
translation = "「……물론 OK? 고마워. 회장님이라면 그렇게 말해줄 줄 알았어」"

[[dialogue]]
speaker = "コハルコ"
original = "「じゃ、行こっか！」"
translation = "「그럼, 가자!」"

[[dialogue]]
speaker = "unk"
original = "さすが日本一の電気街と呼ばれる秋葉原。パーツショップがあちこちにある。"
translation = "과연 일본 제일의 전기 상가라고 불리는 아키하바라. 부품 샵이 여기저기에 있다."

[[dialogue]]
speaker = "コハルコ"
original = "「最近はパソコンの自作もけっこう一般的だよね。競合店が多くて困っちゃうけど、選択肢があるのは個人的には嬉しいかな」"
translation = "「요즘은 컴퓨터 자작도 꽤 일반적이네. 경쟁점이 많아서 곤란하긴 하지만, 선택지가 있는 건 개인적으로는 기쁠까나」"

[[dialogue]]
speaker = "コハルコ"
original = "「さて、まずはスペックだね。会長さんは普段どんな使い方してる？」"
translation = "「자, 우선은 스펙이네. 회장님은 평소에 어떻게 사용해?」"

[[dialogue]]
speaker = "コハルコ"
original = "「……主にネットサーフィン？\u3000ゲームはするけど、パソコンではしない？\u3000……そっかそっか」"
translation = "「……주로 인터넷 서핑? 게임은 하지만, 컴퓨터로는 안 해? ……그렇구나 그렇구나」"

[[dialogue]]
speaker = "コハルコ"
original = "「今は大抵のゲームはパソコンでできるけど、専用のゲーム機があるなら、そっちを使うもんね」"
translation = "「지금은 웬만한 게임은 컴퓨터로 할 수 있지만, 전용 게임기가 있다면 그쪽을 쓰게 되지」"

[[dialogue]]
speaker = "コハルコ"
original = "「私も妹とゲームするときはゲーム機だしね。……まぁ、弱すぎて私は相手にされないんだけど」"
translation = "「나도 여동생이랑 게임 할 때는 게임기고 말이야. ……뭐, 너무 못해서 나는 상대도 안 해주지만」"

[[dialogue]]
speaker = "unk"
original = "悲しい！"
translation = "슬프네요!"

[[dialogue]]
speaker = "コハルコ"
original = "「それはさておき、会長さんのパソコンだね。やっぱり、あんまりこだわりとかない感じかな？」"
translation = "「그건 그렇고, 회장님의 컴퓨터네. 역시, 별로 고집하는 건 없는 느낌일까?」"

[[dialogue]]
speaker = "コハルコ"
original = "「……このままだと、私の趣味全開のパソコンになっちゃうと思うんだけど……」"
translation = "「……이대로라면, 내 취미가 가득 담긴 컴퓨터가 되어버릴 것 같은데……」"

[[dialogue]]
speaker = "コハルコ"
original = "「え、それがいい？\u3000ビカビカ光るし、必要以上にハイスペックになっちゃうかも」"
translation = "「에, 그게 좋아? 번쩍번쩍 빛나고, 필요 이상으로 하이스펙이 되어버릴지도 몰라」"

[[dialogue]]
speaker = "unk"
original = "思い出になるのを作りましょう"
translation = "추억이 될 만한 걸 만듭시다"

[[dialogue]]
speaker = "コハルコ"
original = "「うん。私と会長さんで初めて作る子だもんね。とびきり特別なの作ろう」"
translation = "「응. 나랑 회장님이 처음으로 만드는 아이니까 말이야. 아주 특별한 걸 만들자」"

[[dialogue]]
speaker = "コハルコ"
original = "「……あれ？\u3000どうかした？\u3000私の言い方がちょっとエッチ……？」"
translation = "「……어라? 왜 그래? 내 말투가 좀 야했어……?」"

[[dialogue]]
speaker = "コハルコ"
original = "「いやいやいや、狙ってないから！\u3000そんなこと考えちゃう会長さんの方がエッチだってば！」"
translation = "「아니아니아니, 노린 거 아니니까! 그런 걸 생각하는 회장님이 더 야한 거라고!」"

[[dialogue]]
speaker = "コハルコ"
original = "「もう、会長さんってば、やっぱり男の子なんだから……」"
translation = "「정말, 회장님도 참, 역시 남자애라니까……」"

[[dialogue]]
speaker = "コハルコ"
original = "「それじゃ、パーツ揃えたら、そのまま会長さんの家で組み立てちゃおっか」"
translation = "「그럼, 부품 다 모으면 그대로 회장님 집에서 조립해 버릴까」"

[[dialogue]]
speaker = "コハルコ"
original = "「門限とかないから大丈夫。遅くなるって伝えてあるし、今日はずっと一緒にいられるね」"
translation = "「통금 같은 거 없으니까 괜찮아. 늦을 거라고 말해뒀고, 오늘은 계속 같이 있을 수 있겠네」"

[[dialogue]]
speaker = "コハルコ"
original = "「できたー！」"
translation = "「다 됐다─!」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんに手取り足取り教えてもらい、ようやくパソコンが完成した。"
translation = "쿠하루코 씨에게 하나부터 열까지 지도를 받아, 겨우 컴퓨터가 완성되었다."

[[dialogue]]
speaker = "コハルコ"
original = "「ＯＳインストールも完了、動作異常なし。うん、いい光り具合だね」"
translation = "「OS 설치도 완료, 동작 이상 없음. 응, 빛깔이 참 좋네」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんの強いオススメで透明なケースを選んでおり、中のパーツが七色に発光しているのがよく分かる。"
translation = "쿠하루코 씨의 강력한 추천으로 투명 케이스를 골랐기에, 안의 부품들이 일곱 빛깔로 발광하는 것이 잘 보인다."

[[dialogue]]
speaker = "コハルコ"
original = "「ピラーレスっていいよね。官能的っていうか、エロいっていうか、誘ってるっていうか……コホン。ずっと作業してたし、ちょっと休憩しようか」"
translation = "「필러리스는 참 좋네. 관능적이랄까, 에로틱하달까, 유혹하는 것 같달까…… 흠흠. 계속 작업했으니 좀 쉴까」"

[[dialogue]]
speaker = "コハルコ"
original = "「あ、そうだ……」"
translation = "「아, 맞다……」"

[[dialogue]]
speaker = "コハルコ"
original = "「よいしょ……重くない？\u3000ならよかった」"
translation = "「영차…… 무겁지 않아? 그럼 다행이고」"

[[dialogue]]
speaker = "unk"
original = "お姫様抱っこみたいに、ソファに座った俺の膝の上にコハルコさんが乗る。当然、体がぴったりとくっつく。"
translation = "공주님 안기처럼, 소파에 앉은 내 무릎 위에 쿠하루코 씨가 올라탄다. 당연히 몸이 딱 달라붙는다."

[[dialogue]]
speaker = "unk"
original = "人前で甘えるのはまだ恥ずかしいようだけど、二人きりだとこんな感じだ。"
translation = "남들 앞에서 어리광 부리는 건 아직 부끄러운 모양이지만, 둘만 있을 때는 이런 느낌이다."

[[dialogue]]
speaker = "コハルコ"
original = "「ふふ。会長さん、あったかい……くっついてるだけでもちょっと気持ちいいね」"
translation = "「후후. 회장님, 따뜻해…… 붙어 있는 것만으로도 조금 기분 좋네」"

[[dialogue]]
speaker = "コハルコ"
original = "「この機会にお願いがあるんだけど、いいかな？」"
translation = "「이 기회에 부탁이 하나 있는데, 괜찮을까?」"

[[dialogue]]
speaker = "コハルコ"
original = "「私の方が年上だし、学園でも先輩だから、ちゃんと先輩とかさん付けで呼んでくれるけど……二人きりの時は呼び捨てで呼んでほしい。敬語もいらないよ。……ダメ？」"
translation = "「내가 나이도 더 많고, 학원에서도 선배니까 꼬박꼬박 선배라든가 씨를 붙여서 불러주지만…… 둘만 있을 때는 이름으로 불러줬으면 좋겠어. 존댓말도 필요 없어. ……안 돼?」"

[[dialogue]]
speaker = "unk"
original = "コハルコ"
translation = "쿠하루코"

[[dialogue]]
speaker = "コハルコ"
original = "「……うん」"
translation = "「……응」"

[[dialogue]]
speaker = "unk"
original = "愛してる"
translation = "사랑해"

[[dialogue]]
speaker = "unk"
original = "好きだ"
translation = "좋아해"

[[dialogue]]
speaker = "コハルコ"
original = "「っ！\u3000もう、そこまでしろとは言ってないでしょ。心臓に悪いな～」"
translation = "「윽! 정말, 거기까지 하라고는 안 했잖아. 심장에 안 좋네~」"

[[dialogue]]
speaker = "コハルコ"
original = "「でも折角だし、もっと言ってもらおうかな。ゴニョゴニョゴニョ……」"
translation = "「그래도 이왕 이렇게 된 거, 더 말하게 해볼까나. 소곤소곤소곤……」"

[[dialogue]]
speaker = "unk"
original = "コハルコがいないと生きていけない"
translation = "쿠하루코가 없으면 살 수 없어"

[[dialogue]]
speaker = "コハルコ"
original = "「うん、私も会長さんなしじゃ生きていけない」"
translation = "「응, 나도 회장님 없이는 못 살아」"

[[dialogue]]
speaker = "unk"
original = "コハルコが欲しい"
translation = "쿠하루코를 원해"

[[dialogue]]
speaker = "コハルコ"
original = "「うん、私もいつも会長さんのこと考えてる」"
translation = "「응, 나도 항상 회장님 생각만 해」"

[[dialogue]]
speaker = "unk"
original = "コハルコをめちゃくちゃにしたい"
translation = "쿠하루코를 엉망진창으로 만들고 싶어"

[[dialogue]]
speaker = "コハルコ"
original = "「うん、私もめちゃくちゃにされたい」"
translation = "「응, 나도 엉망진창이 되고 싶어」"

[[dialogue]]
speaker = "unk"
original = "どさくさ紛れになに言わせてるの！？"
translation = "틈을 타서 무슨 말을 시키는 거야!?"

[[dialogue]]
speaker = "コハルコ"
original = "「ごめんごめん。本当に言ってくれるとは思わなかったから、つい」"
translation = "「미안 미안. 정말로 말해줄 줄은 몰랐어서 그만」"

[[dialogue]]
speaker = "コハルコ"
original = "「でもさっき言ったこと、本当だからね。私もう、会長さんなしじゃいられないよ」"
translation = "「하지만 방금 한 말, 진심이니까. 나 이제, 회장님 없이는 안 돼」"

[[dialogue]]
speaker = "コハルコ"
original = "「だから、これからもずっとずっと一緒にいようね」"
translation = "「그러니까, 앞으로도 계속 계속 함께 있자」"

[[dialogue]]
speaker = "コハルコ"
original = "「ちゅっ」"
translation = "「쪽」"

