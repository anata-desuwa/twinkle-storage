[[dialogue]]
speaker = "unk"
original = "第２話,トロンボーン・アート,P"
translation = "제2화, 트롬본 아트"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえ～っ……絵画と音楽って、そんなに密接な関わりがあるのですか！」"
translation = "「호에~…… 회화와 음악이 그렇게 밀접한 관련이 있는 건가요!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「その通り。パトロンからは色々な要望があるからね」"
translation = "「그 말대로야. 후원자로부터는 여러 가지 요청이 들어오니까.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「妻のピアノ演奏から得たインスピレーションで絵画をおこしてくれ──そんな依頼を請けることもしょっちゅうさ」"
translation = "「아내의 피아노 연주에서 얻은 영감으로 회화를 그려달라── 그런 의뢰를 받는 일도 자주 있지.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「素敵ですね。藝術家の方とお話する機会なんて滅多にないので、とても新鮮で面白いです」"
translation = "「멋지네요. 예술가분과 이야기할 기회는 좀처럼 없어서, 무척 신선하고 재미있어요.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「じゃあじゃあ、ルリエルが演奏した曲から、絵を描いてもらうこともできちゃうんですかっ？」"
translation = "「그럼 그럼, 루리엘이 연주한 곡으로 그림을 그려주시는 것도 가능한가요?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「もちろんできるとも。きみはどんな楽器を嗜んでいるんだい？」"
translation = "「물론 가능하고말고. 너는 어떤 악기를 즐겨 다루니?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「トロンボーンです！\u3000ふっふっふ～♪\u3000腕前、ちょっぴり自信があるのですよ～♪」"
translation = "「트롬본이에요! 훗훗후~♪ 솜씨, 조금 자신 있다고요~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ちょっとルリ。ラファエロさんは本職の藝術家さんだよ。素人の音楽でお願いなんて失礼じゃ……」"
translation = "「잠깐 루리. 라파엘로 씨는 본직 예술가라고. 아마추어의 음악으로 부탁드리는 건 실례가……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「構わないよ！\u3000それに、音楽の価値は演奏者の技術だけじゃない。どれだけの想いや熱量が込められているかが大切だからね」"
translation = "「상관없어! 게다가 음악의 가치는 연주자의 기술뿐만이 아니야. 얼마나 많은 마음과 열량이 담겨 있는지가 중요하니까.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「よし！\u3000ルリエル、きみの奏でる調べに、天才であるぼくの絵を載せようじゃないか！」"
translation = "「좋아! 루리엘, 네가 연주하는 선율에 천재인 나의 그림을 얹어보자고!」"

[[dialogue]]
speaker = "unk"
original = "俺も興味があるな"
translation = "나도 흥미가 생기네"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「もちろん、完成したらこの部屋の一番見栄えのいい場所に飾ってくれるんだよね？」"
translation = "「물론 완성되면 이 방의 가장 보기 좋은 장소에 장식해 줄 거지?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいなのです！\u3000えへへ、フィオナ会長が帰ってきたら、きっとびっくりしちゃいますよ～♪」"
translation = "「네, 알겠어요! 에헤헤, 피오나 회장님이 돌아오시면 분명 깜짝 놀라실 거예요~♪」"

[[dialogue]]
speaker = "unk"
original = "そうしてルリエルが、流星寮の自室からトロンボーンを持ってきた。"
translation = "그렇게 루리엘이 유성 기숙사의 자기 방에서 트롬본을 가져왔다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（よ～し、せっかくだから聴きごたえのある、かっこいい曲をやっちゃうのです！）"
translation = "(조~아, 기왕 하는 거 들을 만한 멋진 곡을 연주하는 거예요!)"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（ちょっと難易度が高いですけど、ばっちりしっかり演奏しちゃいますよ～……！）"
translation = "(조금 난이도가 높지만, 완벽하게 연주해 보이겠어요~……!)"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「それじゃあ始めるのです！」"
translation = "「그럼 시작할게요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぼぇ～っ♪\u3000ぼえぼえぼえ、ぼえ～っ♪」"
translation = "「뿌우~♪ 뿌우뿌우뿌우, 뿌우~♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（あ、あれ？\u3000ちょっぴり間違っちゃったかも！？\u3000で、でもでも！\u3000ルリエルはめげないのです！）"
translation = "(어, 어라? 조금 틀렸을지도!? 하, 하지만 하지만! 루리엘은 굴하지 않는 거예요!)"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぼっぼっぼっぼ～♪\u3000ぼえぼえぼえ～っ♪」"
translation = "「뿌뿌뿌뿌~♪ 뿌우뿌우뿌우~♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "（あれあれ？\u3000やっぱり選曲、間違っちゃったでしょうか～！？\u3000でも今さら止められないですし～……！！）"
translation = "(어라라? 역시 선곡을 잘못한 걸까요~!? 하지만 이제 와서 멈출 수도 없고~……!!)"

[[dialogue]]
speaker = "unk"
original = "ルリエルの演奏に合わせて、ラファエロが即興で筆を走らせていく。"
translation = "루리엘의 연주에 맞춰 라파엘로가 즉흥적으로 붓을 놀려 나간다."

[[dialogue]]
speaker = "unk"
original = "そうして演奏が終わり、しばらくしてから絵画が完成したのだが──"
translation = "그렇게 연주가 끝나고 잠시 후 회화가 완성되었는데──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぇええ！？\u3000なんですか、このおどろおどろしい絵は～！？」"
translation = "「후에에!? 뭔가요, 이 으스스한 그림은~!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「素晴らしい絵画であることは、わかるのですが……」"
translation = "「훌륭한 회화라는 건 알겠습니다만……」"

[[dialogue]]
speaker = "unk"
original = "色も全体的にどす黒い……"
translation = "색도 전체적으로 거무죽죽하고……"

[[dialogue]]
speaker = "unk"
original = "怪物がたくさん……"
translation = "괴물이 잔뜩……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こ、これがルリの曲に込められたイメージ……？\u3000何か心に闇でも抱えているんですか？」"
translation = "「이, 이게 루리의 곡에 담긴 이미지……? 혹시 마음에 어둠이라도 품고 있는 건가요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「違いますよぉ！？\u3000いったいどんな着想を得たんですか、ラファエロさん！？」"
translation = "「아니라고요!? 대체 어떤 착상을 얻으신 건가요, 라파엘로 씨!?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「だってきみが演奏したのは、血で血を洗う地獄をテーマにした曲だろう？」"
translation = "「그야 네가 연주한 건 피로 피를 씻는 지옥을 테마로 한 곡이잖아?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「違うのです！\u3000旧森羅歴の、リクリエとの決戦で奮戦する、大天使さまたちの勇壮なお姿を表現した曲ですよぉ！？」"
translation = "「틀려요! 구 삼라력의 리크리에와의 결전에서 분전하는 대천사님들의 용맹한 모습을 표현한 곡이라고요!?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「戦いの曲か。じゃあやっぱりぼくの解釈は正しかったということだね！」"
translation = "「전투의 곡인가. 그럼 역시 내 해석이 맞았다는 거네!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「さて。どこに飾ろうか……そうだ！\u3000星徒会長の椅子の後ろの壁、ここがいいんじゃないかな？」"
translation = "「자, 어디에 장식할까…… 그래! 성도회장 의자 뒤 벽, 여기가 좋지 않을까?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こんな迫力満点の絵が飾ってあったら、フィオナ会長がびっくりしちゃいますよ～！！」"
translation = "「이런 박력 만점인 그림이 걸려 있으면 피오나 회장님이 깜짝 놀라실 거예요~!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「しょんぼりなのです……フィオナ会長に喜んでもらうつもりだったのに～……」"
translation = "「시무룩이에요…… 피오나 회장님을 기쁘게 해드릴 생각이었는데~……」"

[[dialogue]]
speaker = "unk"
original = "選曲が間違ってたのかもね"
translation = "선곡이 잘못됐던 걸지도 모르겠네"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「──あう。やっぱり会長さんにはバレてしまったのです……」"
translation = "「──아우. 역시 회장님에게는 들켜버렸네요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「せっかく星徒会室に飾るならかっこいい絵にして欲しくて、まだ完璧じゃない曲を選んじゃいました……」"
translation = "「기왕 성도회실에 장식할 거라면 멋진 그림이 되길 바라서, 아직 완벽하지 않은 곡을 골라버렸어요……」"

[[dialogue]]
speaker = "unk"
original = "ルリエルも演奏中、不安があったはずだ"
translation = "루리엘도 연주하는 동안 불안함이 있었을 거야"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルが慌てたり、焦ったりする気持ちを察知して……ラファエロさんはああいう絵を起こした、ですか？」"
translation = "「루리엘이 당황하거나 초조해하는 마음을 감지해서…… 라파엘로 씨가 그런 그림을 그린 거다, 인가요?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルが一番好きな曲を演奏しよう！"
translation = "루리엘이 가장 좋아하는 곡을 연주하자!"

[[dialogue]]
speaker = "unk"
original = "明日、もう一回頼んでみたら？"
translation = "내일 다시 한번 부탁해 보는 건 어때?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……そうですね。ラファエロさんなら快く引き受けてくれそうなのです」"
translation = "「……그렇네요. 라파엘로 씨라면 흔쾌히 들어주실 것 같아요.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わかりました！\u3000それじゃあルリエルの故郷、フィリスティアに伝わる曲を演奏しちゃいます！」"
translation = "「알겠습니다! 그럼 루리엘의 고향, 필리스티아에 전해지는 곡을 연주할게요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「明日のための練習です。会長さん、しっかり聴いててください！」"
translation = "「내일을 위한 연습이에요. 회장님, 잘 들어주세요!」"

[[dialogue]]
speaker = "unk"
original = "そうして、昼間の演奏とは百八十度違う、穏やかで優しい調べの曲が始まった──"
translation = "그렇게 낮의 연주와는 180도 다른, 평온하고 부드러운 선율의 곡이 시작되었다──"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「会長に用事があったんだけれど……なるほど、やはりそうだったのか」"
translation = "「회장에게 용무가 있어서 왔는데…… 과연, 역시 그랬던 건가.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「……ぼくのために背伸びをして、無茶な難易度の曲を演奏していたんだね」"
translation = "「……나를 위해 무리해서 어려운 난이도의 곡을 연주하고 있었던 거구나.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「うん──いい曲だ。晴れ渡る青い空。土と草の穏やかな香り。色とりどりの花に、頬を撫でるそよ風……」"
translation = "「응── 좋은 곡이야. 맑게 갠 푸른 하늘. 흙과 풀의 온화한 향기. 형형색색의 꽃에 뺨을 스치는 산들바람……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「どんどんインスピレーションが湧いてくるよ、素晴らしい……！」"
translation = "「계속해서 영감이 솟구쳐 올라, 훌륭해……!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「それじゃ、ぼくもさっそく取り掛かるとしようかな？」"
translation = "「그럼 나도 바로 작업에 들어가 볼까?」"

[[dialogue]]
speaker = "unk"
original = "翌日──"
translation = "다음 날──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あれっ？\u3000壁にある絵が、替わってるのです！？」"
translation = "「어라? 벽에 있는 그림이 바뀌어 있어요!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「さっきラファエロさんが来て、取り替えていったんだよ」"
translation = "「조금 전에 라파엘로 씨가 와서 바꿔놓고 가셨어.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はぇえ～、ルリエルの故郷の風景にそっくり……うぅん、それ以上に綺麗なのです！\u3000でも、いったいどうやって……？」"
translation = "「하에에~ 루리엘의 고향 풍경이랑 똑같아…… 아니, 그 이상으로 예뻐요! 하지만 대체 어떻게……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ラファエロさんから伝言も預かってるよ」"
translation = "「라파엘로 씨가 전언도 맡기셨어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「『またアテネスに帰る前に、昨夜のトロンボーンの演奏を聴かせてくれるかい？』とのことです」"
translation = "「『다시 아테네스로 돌아가기 전에, 어젯밤의 트롬본 연주를 들려주겠니?』라고 하셨어.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぁ……！！」"
translation = "「아……!!」"

[[dialogue]]
speaker = "unk"
original = "昨夜の演奏をどこかで聴いていたのだろうか──それだけでここまで美しい絵画を生み出せるだなんて。"
translation = "어젯밤의 연주를 어딘가에서 듣고 있었던 걸까── 그것만으로 이렇게 아름다운 회화를 만들어 내다니."

[[dialogue]]
speaker = "unk"
original = "俺たちは改めて、ラファエロの天才ぶりに驚くのだった。"
translation = "우리들은 다시금 라파엘로의 천재성에 놀라게 되었다."

