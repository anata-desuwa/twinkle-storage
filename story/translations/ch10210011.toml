[[dialogue]]
speaker = "unk"
original = "第１話,思わぬ再会？,P"
translation = "제1화, 뜻밖의 재회?, P"

[[dialogue]]
speaker = "unk"
original = "俺が新星学園の星徒会長になったばかりのある日──"
translation = "내가 신성 학원의 성도회장이 된 지 얼마 되지 않은 어느 날──"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さぁ、今日も星徒会の仕事よ！\u3000魔王の力をとくと見せなさい！」"
translation = "「자, 오늘도 성도회 업무야! 마왕의 힘을 톡톡히 보여주도록 해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「書類仕事に魔王関係あるかな……？」"
translation = "「서류 작업에 마왕이 상관이 있으려나……?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「お～～～～～い！」"
translation = "「어～～～～～이!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれ、この声は……」"
translation = "「어라, 이 목소리는……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「どーん！！」"
translation = "「콰당!!」"

[[dialogue]]
speaker = "unk"
original = "廊下は走っちゃダメだぞ"
translation = "복도에서 뛰면 안 된다고"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「はーい。もう、相変わらず変なところで真面目なんだから」"
translation = "「네에~. 정말이지, 여전히 이상한 부분에서 진지하다니까」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ま、いいや。久しぶりー！\u3000まさか新星学園で会うとは思わなかったから、マジでびっくりしたよ～！」"
translation = "「뭐, 됐어. 오랜만이야! 설마 신성 학원에서 만날 줄은 몰랐으니까, 진짜 깜짝 놀랐어~!」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ていうか星徒会長って何さ。こちとらまだプリマステラにもなってないってのに、いきなり抜かれてちょっとショックだったんだから」"
translation = "「그나저나 성도회장이라니 뭐야. 이쪽은 아직 프리마스텔라도 못 됐는데, 갑자기 추월당해서 조금 쇼크였다니까」"

[[dialogue]]
speaker = "unk"
original = "どうして環が新星学園に？"
translation = "어째서 타마키가 신성 학원에?"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そんなのボクが星騎士だからに決まってるじゃん」"
translation = "「그거야 내가 성기사니까 당연하잖아」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そういや言ってなかったっけ。じゃあそっちもびっくりしちゃったか。あははっ」"
translation = "「그러고 보니 말 안 했었나. 그럼 그쪽도 깜짝 놀랐겠네. 아하핫」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「何はともあれ、星徒会長就任──もとい退学回避おめでとう！\u3000いや～、御前試合見てた時はほんとハラハラしたよ」"
translation = "「어찌 됐든, 성도회장 취임── 아니 퇴학 회피 축하해! 이야~, 어전 시합 보고 있었을 때는 정말 조마조마했어」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「それじゃ……ハイターッチ！」"
translation = "「그럼…… 하이 터치!」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「これからは会長って呼ばなきゃだね。あはははっ♪」"
translation = "「이제부터는 회장님이라고 불러야겠네. 아하하하♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長って転校してきたばかりだよね？\u3000市倉さんとめちゃくちゃ仲がいい気がするんだけど……というか、２人は知り合い？」"
translation = "「회장님은 막 전학 온 참이지? 이치쿠라 씨랑 굉장히 사이가 좋아 보이는데…… 그보다, 두 사람은 아는 사이?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「一緒に地獄を潜り抜けた仲だからね！」"
translation = "「함께 지옥을 헤쳐 나온 사이니까!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「地獄……！？\u3000魔界にでも行ってたの？」"
translation = "「지옥……!? 마계라도 갔다 온 거야?」"

[[dialogue]]
speaker = "unk"
original = "一緒にバイトしてた"
translation = "같이 알바했었어"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そうそう。回転寿司に交通量調査にライブに、一緒にいろいろやったなー」"
translation = "「맞아 맞아. 회전초밥에 교통량 조사에 라이브까지, 같이 여러 가지 했었지~」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「その中でも夏フェスはも～ヤバかった。日差しはきついし、汗かいてシャツが貼り付くし、いくら水飲んでも喉渇くんだもん。最後の方なんか意識が朦朧としてたね」"
translation = "「그중에서도 여름 페스는 저~엉말 장난 아니었어. 햇볕은 따갑지, 땀 흘려서 셔츠는 달라붙지, 아무리 물을 마셔도 목이 마른걸. 마지막쯤엔 의식이 몽롱했었지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それは確かに地獄ね……」"
translation = "「그건 확실히 지옥이네……」"

[[dialogue]]
speaker = "unk"
original = "環は２人と知り合い？"
translation = "타마키는 두 사람과 아는 사이?"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「知り合いっていうか、２人とも友達だよ。ヴィーナスとはちょくちょくスイーツ食べに行ってるし。マトイもバドミントン部で会うよね？」"
translation = "「아는 사이라기보다, 둘 다 친구야. 비너스하고는 종종 디저트 먹으러 가고. 마토이도 배드민턴부에서 만나지?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「まぁ、うん。というか、市倉さんと仲良くない人ってこの学園にはいないくらいだと思う」"
translation = "「뭐, 응. 그보다 이치쿠라 씨랑 사이가 좋지 않은 사람은 이 학원에 없을 정도라고 생각해」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「それは言い過ぎ……でもないか！\u3000ははっ、そういえばみんな友達だね」"
translation = "「그건 과장이야…… 도 아니려나! 하핫, 그러고 보니 다들 친구네」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あ、そうだ。せっかくまた会えたんだし、今度一緒に遊びに行かない？\u3000新星学園転入と星徒会長になったお祝いも兼ねてさ」"
translation = "「아, 맞다. 어렵게 다시 만났는데, 다음에 같이 놀러 가지 않을래? 신성 학원 편입이랑 성도회장이 된 축하도 겸해서 말이야」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「ちょっと前にバイトしてたカフェがけっこうオシャレでね、ケーキもおいしいしオススメなんだ」"
translation = "「얼마 전에 알바했던 카페가 꽤 세련됐거든, 케이크도 맛있고 추천이야」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「……ＯＫ？\u3000やった、楽しみ！\u3000ついでに映画も見ようぜ～！\u3000ボクが好きなアクション映画のシリーズ最新作が公開中でさ、これが評判いいらしいんだよね」"
translation = "「……OK? 아싸, 기대된다! 하는 김에 영화도 보자고~! 내가 좋아하는 액션 영화 시리즈 최신작이 개봉 중인데, 이게 평이 좋은 모양이더라고」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「にしても新星学園に入るなら教えてよ～。いなくなってちょっと寂しかったんだから。えいえい」"
translation = "「그나저나 신성 학원에 들어오면 말 좀 해주지~. 없어져서 조금 외로웠다니까. 에잇에잇」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（脇腹ツンツンしてる）"
translation = "(옆구리를 쿡쿡 찌르고 있다)"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「お、効いてる効いてる。こちょこちょこちょ～」"
translation = "「오, 효과 있네 있어. 간질간질간질~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（とってもくすぐったそうね……）"
translation = "(무척 간지러워 보이네……)"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「おりゃ～、食らえ～っ、必殺ベアハッグ！」"
translation = "「이럇~, 받아라~앗, 필살 베어 허그!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（さらに後ろから抱きついて……！？\u3000ふざけてるだけにしても、ちょっと距離近すぎじゃない……？）"
translation = "(게다가 뒤에서 껴안고서……!? 장난치는 것뿐이라 해도, 좀 거리가 너무 가깝지 않아……?)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、あなたたち付き合ってるの？」"
translation = "「너, 너희 사귀는 거야?」"

[[dialogue]]
speaker = "unk"
original = "全然"
translation = "전혀"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そうだよー、普通の友達だってば。あ、ヴィーナスとマトイも来る？\u3000星徒会のみんなが一緒でもいいよ」"
translation = "「그렇다니까~, 그냥 친구라니까. 아, 비너스랑 마토이도 올래? 성도회 모두가 함께여도 좋아」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「仲の良さを見せつけられそうだから遠慮しとく……」"
translation = "「사이좋은 모습을 과시당할 것 같으니까 사양할게……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「そう？\u3000ちょ～っと付き合いが長いだけなんだけどなー」"
translation = "「그래? 조~금 알고 지낸 기간이 길 뿐인데 말이야~」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あ、会長これ飲む？\u3000購買で売ってたキャラメルマシマシマキアート。すんごく濃いよ」"
translation = "「아, 회장 이거 마실래? 매점에서 팔던 카라멜 마시마시 마키아토. 엄청 진해」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「……おいしい？\u3000だよねー、ボクもそう思う♪」"
translation = "「……맛있어? 그치~, 나도 그렇게 생각해♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やっぱり付き合ってる？」"
translation = "「역시 사귀는 거 아냐?」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「全然」"
translation = "「전혀」"

[[dialogue]]
speaker = "unk"
original = "友達だよ"
translation = "친구야"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「いやただの友達にしては距離感近すぎでしょ！」"
translation = "「아니 그냥 친구라기엔 거리감이 너무 가깝잖아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぐぬぬぬぬ……！\u3000なんか納得いかないわ！」"
translation = "「으으으으으……! 왠지 납득이 안 가!」"

