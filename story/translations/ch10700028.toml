[[dialogue]]
speaker = "unk"
original = "バレンタインデーの翌日──ウズメがまた俺の家へとやってきた。"
translation = "발렌타인 데이 다음 날── 우즈메가 다시 우리 집으로 찾아왔다."

[[dialogue]]
speaker = "ウズメイア"
original = "「いや～、面目ないし！\u3000これ、昨日うっかり忘れちゃったチョコ！」"
translation = "「이야~ 면목 없다구! 이거, 어제 깜빡 잊어버린 초콜릿!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「袋に全部つめたつもりだったんだけどなー……会長くん、１日遅れになっちゃったけど、これも受け取ってくれる？」"
translation = "「봉투에 다 담았다고 생각했는데 말야~…… 회장군, 하루 늦어버렸지만 이것도 받아 줄래?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん。うん……これも凄くおいしい！」"
translation = "「물론이지. 응…… 이것도 정말 맛있어!」"

[[dialogue]]
speaker = "unk"
original = "甘い物は別腹というが本当にその通りだ。昨日、あのチョコレート全席を食べきっていたとしても、恋人のウズメが作ったチョコならまだいくらでも食べられそうだった。"
translation = "단것은 별개의 배라고들 하지만 정말 그대로다. 어제 그 초콜릿 코스를 다 먹었다고 해도, 연인인 우즈메가 만든 초콜릿이라면 아직 얼마든지 먹을 수 있을 것 같았다."

[[dialogue]]
speaker = "unk"
original = "こんなに愛情たっぷりのチョコを貰っちゃったら、ホワイトデーのお返しは気合いを入れないとダメだな、と改めて思ってしまう。"
translation = "이렇게나 애정 가득한 초콜릿을 받아버리면, 화이트 데이 답례는 기합을 넣지 않으면 안 되겠네, 하고 다시금 생각하게 된다."

[[dialogue]]
speaker = "ウズメイア"
original = "「あはっ♪\u3000会長くんのホワイトデーのお返し、あたしも楽しみ！\u3000……なんだけど～」"
translation = "「아핫♪ 회장군의 화이트 데이 답례, 나도 기대돼! ……그렇긴 한데~」"

[[dialogue]]
speaker = "ウズメイア"
original = "「もしあたしがホワイトデーのお返し、ちょっぴりだけ先払いして欲しいってゆったら……対応してもらうの、可能だったり……？」"
translation = "「만약 내가 화이트 데이 답례를 아주 조금만 선불로 받고 싶다고 하면…… 대응해 주는 거 가능할까……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、オッケーなんだ、やったぁ<emoji=heart04>」"
translation = "「아, 오케이구나, 만세<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「じゃあ、会長くんっ。愛情たっぷりのチョコ作りを頑張った恋人のあたしを、今日はいっぱい、い～っぱい……愛して欲しいしっ<emoji=heart04>」"
translation = "「그럼, 회장군. 애정 가득한 초콜릿 만들기를 열심히 한 연인인 나를, 오늘은 가득, 가~아득…… 사랑해 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへへぇ～<emoji=heart04>\u3000会長くんの手、きゃーっち<emoji=heart04>\u3000ぎゅ～ぅ～っ<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 회장군 손, 캐치<emoji=heart04> 꼬~옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "服をはだけさせてセックスの準備は万全──けれどウズメは、性器で繋がるよりも先に、ぎゅっと俺の手を握りしめてきた。"
translation = "옷을 풀어헤쳐서 섹스 준비는 만전── 하지만 우즈메는 성기로 이어지기보다 먼저, 꽉 내 손을 움켜쥐어 왔다."

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くんの手、あったかくて好きぃ<emoji=heart04>\u3000今日はエッチしてる間、ずーっとぎゅってしてて欲しいかも……<emoji=heart04>」"
translation = "「회장군 손, 따뜻해서 좋아<emoji=heart04> 오늘은 섹스하는 동안 계속 꽉 쥐고 있어 줬으면 좋겠을지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頬を真っ赤に染めて、大きくて張りのあるおっぱいを惜しげもなく晒したまま、はにかんでくれるウズメ。"
translation = "뺨을 새빨갛게 물들이고, 크고 탄력 있는 가슴을 아낌없이 드러낸 채 수줍어하는 우즈메."

[[dialogue]]
speaker = "クロト"
original = "「こういうエッチも、たまにはいいかもね」"
translation = "「이런 섹스도 가끔은 좋을지도 모르겠네.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「む～。たまにはってどういう意味～？」"
translation = "「무~. 가끔이라니 무슨 의미야~?」"

[[dialogue]]
speaker = "unk"
original = "時代劇が大好きなウズメは、よくラブホで芸者のコスプレエッチだとか亀甲縛りだとか、凝ったプレイを勧めてくるから、逆にこういう普通のエッチが新鮮なのだ。"
translation = "사극을 아주 좋아하는 우즈메는 자주 러브호텔에서 게이샤 코스프레 섹스라든가 거북묶기라든가, 공들인 플레이를 권해오기에 반대로 이런 평범한 섹스가 신선한 것이다."

[[dialogue]]
speaker = "ウズメイア"
original = "「えへっ<emoji=heart04>\u3000ああいうコンセプト？\u3000のあるエッチもいいけどー、今日は会長くんとノープランでいちゃいちゃしたい気分ってゆーかぁ<emoji=heart04>」"
translation = "「에헷<emoji=heart04> 그런 컨셉? 이 있는 섹스도 좋지만~ 오늘은 회장군이랑 노플랜으로 꽁냥꽁냥하고 싶은 기분이라구 해야 할까~<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「それに……すんすんっ<emoji=heart04>\u3000えへー……会長くんのベッド、いい匂いがするからドキドキするし<emoji=heart04>」"
translation = "「그리고…… 킁킁<emoji=heart04> 에헤~…… 회장군 침대, 좋은 냄새가 나서 두근거린다구<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えー……くんくんされるの、恥ずかしい？\u3000ごめんね、でも我慢するの、無理だし……<emoji=heart04>」"
translation = "「에~…… 킁킁거리는 거 창피해? 미안해, 하지만 참는 건 무리라구……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「大好きな彼氏さんのベッドだもん。会長くんに全身を包まれてるみたいで、す～っごくドキドキするの<emoji=heart04>」"
translation = "「사랑하는 남자친구님의 침대인걸. 회장군에게 온몸이 감싸여 있는 것 같아서, 처~엄청 두근거려<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「恥ずかしかったら、お返ししてもいーよ？\u3000会長くんも、いっぱいあたしのこと、くんくんしてくれても～<emoji=heart04>」"
translation = "「창피하면 답례해 줘도 된다구? 회장군도 가득 나를 킁킁거려 줘도~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言われて、おっぱいの谷間に顔をうずめて、すーっと深呼吸してみる。ちょっとくらい恥ずかしがるかと思ったら、ニコニコ嬉しそうな顔をするウズメに、嬉しいやら悔しいやら。"
translation = "그 말에 가슴 골짜기에 얼굴을 묻고 깊게 심호흡해 본다. 조금은 부끄러워할까 싶었더니, 싱글벙글 기쁜 표정을 짓는 우즈메를 보니 기쁘기도 하고 분하기도 하고."

[[dialogue]]
speaker = "クロト"
original = "「……チョコレートの匂いがする」"
translation = "「……초콜릿 냄새가 나.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「──ぷっ<emoji=heart04>\u3000なぁにそれ～♪\u3000想像してなかった答えだし～<emoji=heart04>」"
translation = "「──풋<emoji=heart04> 뭐야 그게~♪ 상상도 못 한 대답이라구~<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ここのところ、ずーっと会長くんのためにチョコレート作りしてたからかなぁ……今のあたし、甘いお菓子の香り、するんだ？」"
translation = "「요즘 계속 회장군을 위해서 초콜릿 만들기만 해서 그런가…… 지금의 나, 달콤한 과자 향기가 나는구나?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「じゃあ遠慮しないで食べちゃって？\u3000あたしは会長くんのものなんだし……」"
translation = "「그럼 사양 말고 먹어치워 줘? 나는 회장군의 것이니까……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「早く入りたいよ～ってぴくぴくしてるおち○ぽ、おま○こに入れて欲しいかも……<emoji=heart04>」"
translation = "「얼른 들어가고 싶어~ 하고 움찔거리는 자지, 보지에 넣어 줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すでにくちゅくちゅと愛液の粘っこい音が聞こえてくるウズメの女性器へ、俺はゆっくりとペニスを挿入していく──"
translation = "이미 질척질척하게 애액의 끈적한 소리가 들려오는 우즈메의 여성기 속으로, 나는 천천히 페니스를 삽입해 나간다──"

[[dialogue]]
speaker = "ウズメイア"
original = "「ふうぅっ……ぁあぁあっ……<emoji=heart04>\u3000一気に、ずぷ～って入っちゃった、しぃ……<emoji=heart04>」"
translation = "「후우으…… 아아앗……<emoji=heart04> 한 번에 푹~ 하고 들어와 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "バレンタインのイベント準備で忙しかったから、久しぶりの挿入だ。きつくて柔らかくて、ぬるぬると気持ちがよくてたまらない。"
translation = "발렌타인 이벤트 준비로 바빴기에 오랜만의 삽입이다. 조이고 부드러우며 미끈거려서 기분이 좋아 견딜 수가 없다."

[[dialogue]]
speaker = "ウズメイア"
original = "「はぁあっ……ふぅうー……♪\u3000会長くんのおち○ぽ、入れただけでびくびく震えてるし……可愛い<emoji=heart04>\u3000あはぁぁ<emoji=heart04>」"
translation = "「하아앗…… 후으으~……♪ 회장군의 자지, 넣기만 했는데 비르르 떨리고 있어…… 귀여워<emoji=heart04> 아하아<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「遠慮しなくていいよ。いっぱい突いて？\u3000んんぅ<emoji=heart04>\u3000会長くんのぱんぱん、おま○こでい～っぱい、感じたいしっ<emoji=heart04>」"
translation = "「사양 안 해도 돼. 가득 찔러 줘? 응으으<emoji=heart04> 회장군의 빵빵함, 보지로 가~득 느끼고 싶다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな蕩け顔でおねだりされたら、もう止まれなかった。"
translation = "그런 황홀한 얼굴로 애원당하니 이제 멈출 수 없었다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んんっ<emoji=heart04>\u3000ふぅうっ<emoji=heart04>\u3000あ、ぁあっ、んんぅ<emoji=heart04>\u3000ふぁ、あぁあっ、あぁっ<emoji=heart04>\u3000んんっ、んんぅうっ……<emoji=heart04>」"
translation = "「으음<emoji=heart04> 후으윽<emoji=heart04> 아, 아앗, 응으으<emoji=heart04> 하아, 아아앗, 아앗<emoji=heart04> 으음, 응으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あぁん<emoji=heart04>\u3000久しぶりのおち○ぽ、気持ちいいっ<emoji=heart04>\u3000あぁ、はぁぁ、ぅうっ……んんっ<emoji=heart04>\u3000会長くん、好きぃっ<emoji=heart04>\u3000ふわぁぁ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 오랜만의 자지, 기분 좋아<emoji=heart04> 아아, 하아아, 으윽…… 으음<emoji=heart04> 회장군, 좋아해<emoji=heart04> 후와아아<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おま○この入り口から、一番奥まで……あたしの穴、ぜーんぶ楽しんで、欲しいしっ<emoji=heart04>\u3000あ、ぁっ……んんぅっ<emoji=heart04>\u3000ふぁ、ぁ、んんっ<emoji=heart04>」"
translation = "「보지 입구부터 제일 안쪽까지…… 내 구멍, 저언부 즐겨 줬으면 좋겠어<emoji=heart04> 아, 앗…… 응으윽<emoji=heart04> 하아, 아, 으음<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たんっ、たんっ、たんっ──緩やかなストロークと共に揺れる、ウズメのおっぱい。"
translation = "탁, 탁, 탁── 완만한 스트로크와 함께 흔들리는 우즈메의 가슴."

[[dialogue]]
speaker = "unk"
original = "正常位だとやっぱり、ウズメの大きいおっぱいが揺れるところがよく見える。目から入ってくる情報からも、どんどん興奮が高まっていくのを感じた。"
translation = "정상위면 역시 우즈메의 큰 가슴이 흔들리는 것이 잘 보인다. 눈으로 들어오는 정보로도 점점 흥분이 고조되는 것을 느꼈다."

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ──はぁ、んんっ<emoji=heart04>\u3000会長くん、あたしのおっぱい見た途端、おち○ぽすっごく、硬くなった、しぃっ……<emoji=heart04>\u3000あはぁん<emoji=heart04>」"
translation = "「앗── 하아, 으음<emoji=heart04> 회장군, 내 가슴 보자마자 자지 엄청 딱딱해졌어……<emoji=heart04> 아하앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぅ<emoji=heart04>\u3000もっといっぱい、見て欲しいなぁ<emoji=heart04>\u3000あたしの体で、おち○ぽ硬くしてくれるとー、彼女冥利に尽きるしっ<emoji=heart04>\u3000あ、んんっ、好きぃ<emoji=heart04>」"
translation = "「응으으<emoji=heart04> 더 가득 봐 줬으면 좋겠네<emoji=heart04> 내 몸으로 자지 딱딱하게 만들어 주면 여자친구로서 보람을 느낀다구<emoji=heart04> 아, 으음, 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "繋いだ手にぎゅうっと力を込めながら、悩まし気な上目遣いを止めないウズメ。"
translation = "맞잡은 손에 꽉 힘을 주면서 요염하게 치켜뜬 눈을 떼지 않는 우즈메."

[[dialogue]]
speaker = "unk"
original = "真心のこもったチョコレートを贈ってくれただけでなく、どこまでも俺を喜ばせようとしてくれる。"
translation = "진심 어린 초콜릿을 선물해 줬을 뿐만 아니라, 어디까지나 나를 기쁘게 하려 애써 준다."

[[dialogue]]
speaker = "unk"
original = "そんなウズメに少しでもお返しがしたい。俺も彼女の手を握り返しながら、女性器の奥深くへと丁寧にストロークをする。"
translation = "그런 우즈메에게 조금이라도 보답하고 싶다. 나도 그녀의 손을 마주 잡으면서 여성기 깊숙한 곳까지 정성껏 스트로크를 한다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んんんんっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000んんっ……会長くぅん<emoji=heart04>\u3000あ、あたしの感じるところ、はぁん<emoji=heart04>\u3000いっぱい、トントン<emoji=heart04>\u3000してくれてるぅっ……<emoji=heart04>」"
translation = "「으으으음<emoji=heart04> 하아앗<emoji=heart04> 으음…… 회장구운<emoji=heart04> 아, 내가 느끼는 곳, 하앙<emoji=heart04> 가득, 톡톡<emoji=heart04> 해 주고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぅ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000んぁっ……ああぁぁ<emoji=heart04>\u3000会長くんのエッチ、優しいから好きぃ<emoji=heart04>\u3000……もっとおま○こ、おち○ぽで気持ちよく、してぇ<emoji=heart04>\u3000はふぅぅん<emoji=heart04>」"
translation = "「응으으<emoji=heart04> 후으윽<emoji=heart04> 응앗…… 아아아아<emoji=heart04> 회장군의 섹스, 다정해서 좋아<emoji=heart04> ……더 보지, 자지로 기분 좋게 해 줘<emoji=heart04> 하후으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んんっ──は、あぁあっ<emoji=heart04>\u3000ヤ、ヤバいかもっ……<emoji=heart04>\u3000久しぶりだから、はっ、ふぅぅん<emoji=heart04>\u3000か、軽いのもう、キちゃう、かもっ……<emoji=heart04>」"
translation = "「으음── 하, 아아앗<emoji=heart04> 위, 위험할지도……<emoji=heart04> 오랜만이라서, 하아, 후으으응<emoji=heart04> 가, 가벼운 걸로 벌써 가 버릴지도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気にせずいっぱいイっていいよ──そう伝えつつ、俺は優しくウズメの弱点を責めていく。"
translation = "신경 쓰지 말고 가득 가도 돼── 그렇게 말하며 나는 다정하게 우즈메의 약점을 공략해 나간다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んぅんんぅっ<emoji=heart04>\u3000あっ、ごめっ……イっちゃうっ……んん、んんぅっ──<emoji=heart04>」"
translation = "「윽<emoji=heart04> 으음<emoji=heart04> 응으으윽<emoji=heart04> 앗, 미안…… 가 버려…… 으음, 응으윽──<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぅっ……<emoji=heart04>\u3000あ、はぁ、あ、あぅうっ……んんんっ<emoji=heart04>」"
translation = "「응으으윽……<emoji=heart04> 아, 하아, 아, 아으윽…… 으으음<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウズメの女性器がぎゅぅっと締まって、それに合わせて繋いでる手にもきゅっ、きゅっと力が込められる。"
translation = "우즈메의 여성기가 꽉 조여지고, 그에 맞춰 맞잡은 손에도 꽉, 꽉 힘이 들어간다."

[[dialogue]]
speaker = "unk"
original = "イっている最中は彼女の弱点を避けて、優しいピストンを続ける。"
translation = "절정에 달해 있는 동안에는 그녀의 약점을 피해서 부드러운 피스톤을 이어간다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んはぁっ──<emoji=heart04>\u3000はぁあっ……ヤバ～ぁ<emoji=heart04>\u3000会長くんのおち○ぽ、突き方だけでわかっちゃう、愛情、感じちゃう、しぃ……<emoji=heart04>\u3000んふぅぅん<emoji=heart04>」"
translation = "「으하아──<emoji=heart04> 하아앗…… 대박~<emoji=heart04> 회장군의 자지, 찌르는 법만으로도 알겠어, 애정이 느껴진다구……<emoji=heart04> 응후으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへ～っ<emoji=heart04>\u3000会長くん大好きっ<emoji=heart04>\u3000んふぅん<emoji=heart04>\u3000いっつも、大切にしてくれて、嬉しいよぉ……<emoji=heart04>\u3000ぁ、あっ、んぅっ<emoji=heart04>」"
translation = "「에헤~<emoji=heart04> 회장군 정말 좋아<emoji=heart04> 응후응<emoji=heart04> 언제나 소중하게 대해 줘서 기뻐……<emoji=heart04> 아, 앗, 응윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気持ちよくしてもらっているのは俺なのに、お礼を言ってくれる。"
translation = "기분 좋게 대접받는 건 나인데도 감사를 표해 준다."

[[dialogue]]
speaker = "unk"
original = "衣装に負けないくらいに可愛らしい俺の恋人──たまらず、揺れっぱなしのたわわなおっぱいの先端を口に含む。"
translation = "의상에 못지않게 사랑스러운 나의 연인── 견디지 못하고 계속 흔들리는 풍만한 가슴 끝을 입에 머금는다."

[[dialogue]]
speaker = "ウズメイア"
original = "「ふぅっ──んんぅっ<emoji=heart04>\u3000あ、あ、ぁ、あぁっ<emoji=heart04>\u3000会長くんにおっぱい、ちゅぱちゅぱって、吸われてるっ<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>\u3000それ好きぃっ<emoji=heart04>」"
translation = "「후으윽── 응으으윽<emoji=heart04> 아, 아, 아, 아아앗<emoji=heart04> 회장군한테 가슴, 쫍쫍 하고 빨리고 있어<emoji=heart04> 후와아아앙<emoji=heart04> 그거 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あっあっあっ……！\u3000乳首、そんなコロコロ転がしちゃ、ダメだしぃっ<emoji=heart04>\u3000ふぅうっ、んんんぅ<emoji=heart04>\u3000あああっ、気持ちいい、気持ちいいよぉっ……んぁあ<emoji=heart04>」"
translation = "「앗앗앗……! 유두, 그렇게 굴리면 안 된다구우앗<emoji=heart04> 후으으윽, 응으으으<emoji=heart04> 아아앗, 기분 좋아, 기분 좋아아…… 응아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ウズメのおっぱいの先は、チョコレートとはまた違った甘い香りがして、頭がクラクラしてしまう。"
translation = "우즈메의 가슴 끝에서는 초콜릿과는 또 다른 달콤한 향기가 나서 머리가 어질어질해진다."

[[dialogue]]
speaker = "unk"
original = "俺が彼女のおっぱいを吸うたび、繋いだ手にきゅっ、きゅっと力がこもる。手のひらにかいた汗ですべらないよう、指を強く絡めあった。"
translation = "내가 그녀의 가슴을 빨 때마다 맞잡은 손에 꽉, 꽉 힘이 들어간다. 손바닥에 밴 땀에 미끄러지지 않도록 손가락을 강하게 얽었다."

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、あっ<emoji=heart04>\u3000はぁ、ああ、あぁ<emoji=heart04>\u3000んんんっ……<emoji=heart04>\u3000ヤ、ヤバ～ぁ<emoji=heart04>\u3000おち○ぽ、あたしの中でもっと硬く、なったし、ぃっ<emoji=heart04>\u3000はふぅぅん<emoji=heart04>」"
translation = "「아, 앗<emoji=heart04> 하아, 아아, 아아<emoji=heart04> 으으으음……<emoji=heart04> 대, 대박~<emoji=heart04> 자지, 내 안에서 더 딱딱해졌어……<emoji=heart04> 하후으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「いっぱい吸って……は、あぁっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おっぱい、いっぱいいじってくれて、いいからねっ<emoji=heart04>\u3000あぁ、はぁぁん<emoji=heart04>\u3000んんっ……ふぅ、んんぅ<emoji=heart04>」"
translation = "「가득 빨아줘…… 하, 아아앗<emoji=heart04> 으음<emoji=heart04> 가슴, 가득 만져 줘도 되니까 말야<emoji=heart04> 아아, 하아아앙<emoji=heart04> 으음…… 후우, 응으으<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「彼氏が、自分のカラダで……んんぅ<emoji=heart04>\u3000たくさん興奮してくれるのって～……えへへぇ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000めっちゃ、嬉しいっ<emoji=heart04>\u3000んふぅう<emoji=heart04>」"
translation = "「남자친구가 자기 몸으로…… 응으으<emoji=heart04> 잔뜩 흥분해 주는 건~…… 에헤헤<emoji=heart04> 아아아<emoji=heart04> 엄~청 기뻐<emoji=heart04> 응후으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな健気なことを言われたら、もっと強く彼女を求めたいと思ってしまう。もっと強く突きこんで、彼女が快感で乱れるところが見たい。"
translation = "그런 기특한 말을 들으니 더 강하게 그녀를 원하고 싶어진다. 더 강하게 찔러넣어 그녀가 쾌감으로 흐트러지는 모습을 보고 싶다."

[[dialogue]]
speaker = "ウズメイア"
original = "「うんっ、いいよ会長くん<emoji=heart04>\u3000今度は乱暴にしてぇ？\u3000繋いだ手、もっと力を込めて……はぁぁん<emoji=heart04>\u3000あたしのこと、捕まえて欲しいしっ<emoji=heart04>」"
translation = "「응, 좋아 회장군<emoji=heart04> 이번엔 난폭하게 해 줘? 맞잡은 손, 더 힘을 줘서…… 하아아앙<emoji=heart04> 나를 붙잡아 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に誘われれば、もう遠慮もできない。"
translation = "그렇게 유혹당하면 이제 사양할 수 없다."

[[dialogue]]
speaker = "unk"
original = "俺は少し乱暴なくらいに力を込めて手を握り、ウズメをベッドに縫い付けるように固定して、ピストンを速める──"
translation = "나는 조금 난폭할 정도로 힘을 주어 손을 잡고, 우즈메를 침대에 못 박듯 고정하며 피스톤 속도를 높인다──"

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぁあぁあっ！？\u3000ふぅ、ぁっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000んんぅ、ぁああ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「으으응아아아앗!? 후으, 앗<emoji=heart04> 앗앗앗<emoji=heart04> 응으으, 아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くん、じょ、情熱的、だしぃっ<emoji=heart04>\u3000あ、あぁっ、んんぁ、やぁんっ<emoji=heart04>\u3000おち○ぽ、すっごい奥まで、ズンズン、きてるっ<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>」"
translation = "「회장군, 저, 정열적이라구우앗<emoji=heart04> 아, 아아앗, 응으아, 야아앙<emoji=heart04> 자지, 엄청 깊은 곳까지 즈윽즈윽 들어오고 있어<emoji=heart04> 후와아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おま○こ気持ちいぃっ<emoji=heart04>\u3000会長くんとのエッチ、好きすぎるよぉっ<emoji=heart04>\u3000んぅ、ひぅっ<emoji=heart04>\u3000ぁっあっ、はぁ、ぁ、んんんぅっ<emoji=heart04>」"
translation = "「보지 기분 좋아아<emoji=heart04> 회장군과의 섹스 너무 좋아한다구우앗<emoji=heart04> 응으, 히윽<emoji=heart04> 앗앗, 하아, 아, 응으으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「大好きっ<emoji=heart04>\u3000会長くん、大好きぃっ<emoji=heart04>\u3000愛してるの、愛してるっ<emoji=heart04>\u3000ああっ……会長くんのお顔、もっと近くで、見たいしぃっ<emoji=heart04>\u3000あぁん<emoji=heart04>」"
translation = "「좋아해<emoji=heart04> 회장군, 정말 좋아해<emoji=heart04> 사랑해, 사랑한다구<emoji=heart04> 아앗…… 회장군 얼굴 더 가까이서 보고 싶어<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ふわぁぁん<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000近く来て？\u3000ちゅー、したいっ<emoji=heart04>\u3000おち○ぽ、ぱんぱんしながら、エッチなちゅー、いっぱい、してぇ？\u3000んふぅん<emoji=heart04>」"
translation = "「후와아아앙<emoji=heart04> 아아아앗<emoji=heart04> 가까이 와 줘? 뽀뽀하고 싶어<emoji=heart04> 자지 빵빵하게 하면서 야한 뽀뽀 가득 해 줘? 응후응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "健気で一途で愛らしくて、いやらしい──あまりにも魅力的すぎる恋人に誘われて、彼女の唇を奪う。"
translation = "기특하고 일편단심에 사랑스럽고 음란한── 너무나도 매력적인 연인에게 유혹당해 그녀의 입술을 앗는다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んちゅぅるっ<emoji=heart04>\u3000んちゅ、んむぅ、ちゅるう<emoji=heart04>\u3000んちゅぅ、じゅる、ちゅぅっ<emoji=heart04>\u3000……んれぇ、れりゅ、んちゅぅる、れりゅれりゅっ<emoji=heart04>」"
translation = "「으음츄릅<emoji=heart04> 응츄, 응무우, 츄르우<emoji=heart04> 응츄우, 쥬릅, 츄윽<emoji=heart04> ……으음레에, 레류, 응츄으루, 레류레류<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んぅちゅるぅっ……んむぅ<emoji=heart04>\u3000会長くんのお口、甘ぁい<emoji=heart04>\u3000ちゅ、んちゅぅ、れるれる……チョコの味、する……<emoji=heart04>\u3000はふぅん<emoji=heart04>」"
translation = "「응으츄르으…… 응무우<emoji=heart04> 회장군 입안 달콤해<emoji=heart04> 츄, 응츄우, 렐렐…… 초코 맛 나……<emoji=heart04> 하후응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチする前に食べたウズメの本命チョコレート。その甘みが口の中に残っていたみたいだ。"
translation = "섹스하기 전에 먹었던 우즈메의 진심 초콜릿. 그 달콤함이 입안에 남아 있었던 모양이다."

[[dialogue]]
speaker = "ウズメイア"
original = "「はむん<emoji=heart04>\u3000れる、んちゅる、れるれるっ<emoji=heart04>\u3000あぁぁ<emoji=heart04>\u3000今までいっぱい、キスしてきたけどっ……んちゅ<emoji=heart04>\u3000甘い味がするの、初めてかも<emoji=heart04>\u3000んぅ<emoji=heart04>」"
translation = "「하뮨<emoji=heart04> 렐, 응츄르, 렐렐<emoji=heart04> 아아아<emoji=heart04> 지금까지 가득 키스해 왔지만…… 응츄<emoji=heart04> 단맛 나는 거 처음일지도<emoji=heart04> 으음<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「れるん<emoji=heart04>\u3000んちゅるれる、れるれる<emoji=heart04>\u3000会長くぅん好き<emoji=heart04>\u3000好きぃっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000んちゅ、ちゅぅ<emoji=heart04>\u3000しゅき、しゅき～<emoji=heart04>\u3000……んちゅる、れぇ<emoji=heart04>」"
translation = "「렐른<emoji=heart04> 응츄르렐, 렐렐<emoji=heart04> 회장구운 좋아해<emoji=heart04> 좋아한다구우앗<emoji=heart04> 하아아앙<emoji=heart04> 응츄, 츄우<emoji=heart04> 죠아, 죠아~<emoji=heart04> ……응츄르, 레에<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ん、む、むむぅっ……！？」"
translation = "「으음, 읍, 읍읍……!?」"

[[dialogue]]
speaker = "unk"
original = "俺の舌をフェラチオするみたいに吸いつくだけじゃなく、歯茎から歯の裏側まで、奉仕するみたいにぺろぺろと舐めてくるウズメ。"
translation = "내 혀를 펠라치오 하듯 빨아들일 뿐만 아니라 잇몸부터 치아 뒷면까지 봉사하듯 날름날름 핥아오는 우즈메."

[[dialogue]]
speaker = "ウズメイア"
original = "「はむぅ、んちゅるる<emoji=heart04>\u3000れぇえ、れるっ<emoji=heart04>\u3000んれるれる<emoji=heart04>\u3000れろぉ～っ……んちゅぅるる<emoji=heart04>\u3000じゅるるぅ、れぇえ、れるぅんっ<emoji=heart04>」"
translation = "「하무으, 응츄르르<emoji=heart04> 레에에, 렐<emoji=heart04> 응렐렐<emoji=heart04> 레로오~…… 응츄으루루<emoji=heart04> 쥬르르으, 레에에, 렐루운<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あまりに刺激的なキスに、射精欲がぞわぞわと這い上がってきた。"
translation = "너무나 자극적인 키스에 사정 욕구가 소름 돋듯 기어 올라왔다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んぅちゅぅ……あっ、はぁん<emoji=heart04>\u3000チョコの味、なくなっちゃった……会長くんのおち○ぽも、すっごい勃起ぃ<emoji=heart04>\u3000……んちゅる、れぇ、れりゅ<emoji=heart04>\u3000んふぅん<emoji=heart04>」"
translation = "「응으츄으…… 앗, 하앙<emoji=heart04> 초코 맛 없어져 버렸어…… 회장군 자지도 엄청 발기했네<emoji=heart04> ……응츄르, 레에, 레류<emoji=heart04> 응후응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう限界だ──キスの合間に射精が近いことを告げて、スパートしたいことを伝えると。"
translation = "이제 한계다── 키스 틈틈이 사정이 가깝다는 것을 알리고 스퍼트를 올리고 싶다고 전하자."

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぅっ<emoji=heart04>\u3000いいよ、いっぱいっ……んちゅ<emoji=heart04>\u3000出してぇ？\u3000はぁぁん<emoji=heart04>\u3000会長くんの精液、中にちょうだいっ<emoji=heart04>\u3000んちゅぅ～っ……ぷぁあっ<emoji=heart04>」"
translation = "「응으으윽<emoji=heart04> 좋아, 가득…… 응츄<emoji=heart04> 내보내 줘? 하아아앙<emoji=heart04> 회장군 정액 안에 줘<emoji=heart04> 응츄우~…… 푸핫<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "貪るようなキスが終わってちょっぴり名残惜しいけれど──そのぶんピストンに全力を尽くす。"
translation = "탐닉하는 듯한 키스가 끝나 조금 아쉽지만── 그만큼 피스톤에 전력을 다한다."

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000んんぅ、ぁあ、あぁああっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっあっあっ、んっぅ、ふぅ、んんぅう～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗앗앗<emoji=heart04> 응으으, 아아, 아아아앗<emoji=heart04> 하앗<emoji=heart04> 앗앗앗, 응으으, 후으, 응으으으~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くんのおち○ぽ、ヤバいっ<emoji=heart04>\u3000──んぅぅ！？\u3000あ、あぁあっ<emoji=heart04>\u3000気持ちいい、おへその裏、ごりごりってぇ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あはぁん<emoji=heart04>」"
translation = "「회장군 자지 대박이야<emoji=heart04> ──응으으!? 아, 아아앗<emoji=heart04> 기분 좋아, 배꼽 뒤가 고리고리하게에<emoji=heart04> 기분 좋아<emoji=heart04> 아하앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あぁあっ<emoji=heart04>\u3000んんぅっ、はぁあ<emoji=heart04>\u3000ぅうっ……あぁああっ！\u3000そんなに強く突かれたら、おま○こ<emoji=heart04>\u3000勝手に締まっちゃう、ぅっ……<emoji=heart04>\u3000んふぅぅん<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 응으으윽, 하아아<emoji=heart04> 으윽…… 아아아앗! 그렇게 강하게 찔리면 보지<emoji=heart04> 멋대로 조여져 버려……<emoji=heart04> 응후으으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "がくがく、びくびくと全身を震わせるウズメも絶頂が近そうだ。"
translation = "가쿠가쿠, 비쿠비쿠 온몸을 떨고 있는 우즈메도 절정이 가까워 보인다."

[[dialogue]]
speaker = "unk"
original = "締まりがぐんと増した女性器は、ペニスを一突きするたびに眩暈がしそうなほどに気持ちよくて……"
translation = "조임이 부쩍 강해진 여성기는 페니스를 한 번 찌를 때마다 현기증이 날 정도로 기분이 좋아서……"

[[dialogue]]
speaker = "クロト"
original = "「ウズメ！\u3000俺、もう──！」"
translation = "「우즈메! 나 이제──!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「うんっ<emoji=heart04>\u3000来てぇっ<emoji=heart04>\u3000そのまま、あたしの中にぃ<emoji=heart04>\u3000ふわぁぁん<emoji=heart04>\u3000あぁぁっ、会長くん、大好き<emoji=heart04>\u3000好き好き、好きぃっ……あ、あ、ああ、あぁあっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 와 줘<emoji=heart04> 그대로 내 안에에<emoji=heart04> 후와아아앙<emoji=heart04> 아아아앗, 회장군 정말 좋아해<emoji=heart04> 좋아좋아, 좋아한다구…… 아, 아, 아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「おち○ぽ気持ちいいっ<emoji=heart04>\u3000会長くんのおち○ぽ大好きっ<emoji=heart04>\u3000ああぁあん<emoji=heart04>\u3000会長くん大好きぃっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あぁぁんっ<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000ぅうんっ！」"
translation = "「자지 기분 좋아아<emoji=heart04> 회장군 자지 정말 좋아해<emoji=heart04> 아아아아앙<emoji=heart04> 회장군 정말 좋아아<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 아아아앙<emoji=heart04> 응으으<emoji=heart04> 으응!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ぱんぱんやめないでっ、もっと突いてぇ<emoji=heart04>\u3000んふぅん<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000手もぎゅってしてぇ<emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000ぎゅぅってしたまま、<ruby>射精<rt>だ</rt></ruby>してぇっ<emoji=heart04>\u3000あはぁん<emoji=heart04>」"
translation = "「팡팡 멈추지 마, 더 찔러 줘<emoji=heart04> 응후응<emoji=heart04> 아아앗<emoji=heart04> 손도 꽉 잡아 줘<emoji=heart04> 하아아앙<emoji=heart04> 꽉 쥔 채로 사정해 줘<emoji=heart04> 아하앙<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ぁあっ、ああっ<emoji=heart04>\u3000あっあっあっ！\u3000んぅっ、ふぅ<emoji=heart04>\u3000ぁ、あぁ<emoji=heart04>\u3000はぁ、あ、あ、ああ、あぁ、あぁああっ──！」"
translation = "「아앗, 아앗<emoji=heart04> 앗앗앗! 응윽, 후으<emoji=heart04> 아, 아아<emoji=heart04> 하아, 아, 아, 아아, 아아, 아아아앗──!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「イ、イク、イクっ<emoji=heart04>\u3000イクイクイクっ──イっクぅうううっ──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가, 가, 간다<emoji=heart04> 가가각── 가아아아아앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぁぁぁあぁああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうぅぅぅうううううーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 가아아아아아아아아앗~~~~~~~~~~~~~~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "とろけ顔を浮かべて深く絶頂するウズメの膣内に締め付けられ、腰が抜けるほどの射精が始まった。"
translation = "황홀한 표정을 지으며 깊게 절정하는 우즈메의 질 내부에 조여지며, 허리가 빠질 정도의 사정이 시작되었다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んんぅうっ<emoji=heart04>\u3000ふぇぁあ、あぁぁあっ<emoji=heart04><emoji=heart04>\u3000んん、んんーーっ<emoji=heart04>\u3000すっっごい、出てる、ぅぅうっ……<emoji=heart04>\u3000あぁぁぁ<emoji=heart04>」"
translation = "「응으으으윽<emoji=heart04> 페아아, 아아아앗<emoji=heart04><emoji=heart04> 응으, 응으으으윽<emoji=heart04> 처어엄청, 나오고 있어……<emoji=heart04> 아아아아<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「精液、あったかいっ……ぁあぁあっ<emoji=heart04>\u3000んんっ……会長くんっ<emoji=heart04>\u3000す、好き……好きぃっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「정액 따뜻해…… 아아아앗<emoji=heart04> 응으으윽…… 회장군<emoji=heart04> 조, 좋아…… 좋아해<emoji=heart04> 응으으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精中にもうわごとみたいに『好き』と言われて、そのたびに背筋が震えて射精が止まらない。"
translation = "사정 중에도 잠꼬대처럼 '좋아해'라는 말을 듣고, 그때마다 등줄기가 떨려 사정이 멈추지 않는다."

[[dialogue]]
speaker = "ウズメイア"
original = "「あっ、あっあっ……好きぃ<emoji=heart04>\u3000大好きなの<emoji=heart04>\u3000ほんとに好きぃ……<emoji=heart04>\u3000ん、んんんうっ……んんん～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗앗…… 좋아해<emoji=heart04> 정말 좋아해<emoji=heart04> 정말 좋아한다구……<emoji=heart04> 으음, 으으으으음…… 으으으으음~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして長い長い射精が、ようやく終わって──"
translation = "그렇게 길고 긴 사정이 겨우 끝나고──"

[[dialogue]]
speaker = "ウズメイア"
original = "「はぁぁぁ……ふぅうっ<emoji=heart04>\u3000はぁああっ……んんぅ～っ……<emoji=heart04>」"
translation = "「하아아아…… 후으으윽<emoji=heart04> 하아아앗…… 응으으윽~……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「すっごぉ～……<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000めちゃくちゃ出たねぇ……おま○こに精液、入りきらないしぃ<emoji=heart04>」"
translation = "「대박이야~……<emoji=heart04> 하아아<emoji=heart04> 엄청나게 나왔네…… 보지에 정액이 다 안 들어간다구<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ねぇ、会長くん<emoji=heart04>\u3000きょ、今日はこれで終わり……？」"
translation = "「있지, 회장군<emoji=heart04> 오, 오늘은 이걸로 끝……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしとしては、もうちょっとだけホワイトデーのお返し……先払いしてもらいたいな～って思ってたり<emoji=heart04>」"
translation = "「나로서는 조금 더 화이트 데이 답례…… 선불로 받고 싶다고 생각하고 있기도 하고<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すっかり性欲に火が点いてしまった俺は、繋いだ手に力を込めて頷き、セックス続行の意思を伝える。"
translation = "완전히 성욕에 불이 붙어버린 나는 맞잡은 손에 힘을 주어 끄덕이며 섹스 속행 의사를 전달한다."

[[dialogue]]
speaker = "ウズメイア"
original = "「んふふふっ<emoji=heart04>\u3000ヤバいくらい嬉し～……<emoji=heart04>\u3000じゃあじゃあ、このまま２回戦、始めちゃおっか<emoji=heart04>」"
translation = "「응후후후<emoji=heart04> 대박 기뻐~……<emoji=heart04> 그럼그럼, 이대로 2회전 시작해 볼까<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くんのおち○ぽで、あたしのおま○こ……バカになっちゃうくらい、感じさせて欲しいし<emoji=heart04>」"
translation = "「회장군 자지로 내 보지…… 바보가 되어버릴 정도로 느끼게 해 줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして俺とウズメは、お互いが疲れ果てるまで行為に及んだのだが……"
translation = "그렇게 나와 우즈메는 서로가 녹초가 될 때까지 행위에 임했지만……"

[[dialogue]]
speaker = "unk"
original = "くたくたになってもなお、繋いだ手は絶対に離さないのだった──"
translation = "기진맥진해져도 맞잡은 손은 절대로 놓지 않았다──"

