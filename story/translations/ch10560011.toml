[[dialogue]]
speaker = "unk"
original = "第１話,宣戦布告！,P"
translation = "제1화, 선전포고!, P"

[[dialogue]]
speaker = "unk"
original = "御前試合でヴィーナスを倒し、俺が新星学園の星徒会長となってしばらく経ったある日。"
translation = "어전 시합에서 비너스를 쓰러뜨리고, 내가 신성 학원의 성도회장이 된 지도 어느덧 시간이 꽤 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "星徒会室で仕事をしていた俺の元へ、１人の少女が訪ねて来たのだった──"
translation = "성도회실에서 업무를 보던 내 앞으로, 한 소녀가 찾아왔다──"

[[dialogue]]
speaker = "？？？"
original = "「──というわけで！\u3000あたしはあなたが会長であることを認めていない！」"
translation = "「──그런 고로! 나는 당신이 회장이라는 걸 인정 못 해!」"

[[dialogue]]
speaker = "unk"
original = "いきなり何！？"
translation = "갑자기 뭐야!?"

[[dialogue]]
speaker = "？？？"
original = "「うん……こうして間近で見るとやっぱり疑問だよ。こーんなひょろっちい男子がヴィーナス会長に勝てるわけないもん」"
translation = "「음…… 이렇게 가까이서 보니까 역시 의문이라니까. 이~렇게 비리비리한 남자가 비너스 회장님을 이길 리가 없잖아.」"

[[dialogue]]
speaker = "？？？"
original = "「魔王って噂だし、きっと何か卑怯な手を使ったに違いないよね。今日はそれを暴きに来たの！」"
translation = "「마왕이라는 소문도 있고, 분명 뭔가 비겁한 수를 쓴 게 틀림없어. 오늘은 그걸 밝혀내러 온 거야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何だか騒がしいと思ったら……やっぱりアム。あなただったのね」"
translation = "「어쩐지 소란스럽다 했더니…… 역시 아무. 너였구나.」"

[[dialogue]]
speaker = "アム"
original = "「ぁ──ヴィーナス会長っ！\u3000ご無沙汰してます！」"
translation = "「아── 비너스 회장님! 오랜만이에요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「まだその役職で呼ぶの？\u3000私のことは前会長って呼ぶように何度も……最近だと昨日の夜にもそう言ったじゃない」"
translation = "「아직도 그 직함으로 부르는 거야? 나를 전 회장이라고 부르라고 몇 번이나…… 최근엔 어제저녁에도 그렇게 말했잖니.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス、この子は誰？"
translation = "비너스, 이 애는 누구야?"

[[dialogue]]
speaker = "アム"
original = "「ぅえっ？\u3000……あ、あたしのこと、まさか知らない！？\u3000嘘だぁ！？」"
translation = "「우에엣? ……어, 나를 설마 모르는 거야!? 거짓말이지!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトはまだ附属生の顔までは覚えていないのよ。まぁアムを知らない生徒も珍しいとは思うけど」"
translation = "「쿠로토는 아직 부속생들 얼굴까지는 다 외우지 못했거든. 뭐, 아무를 모르는 학생도 드물긴 하겠지만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「彼女は白楯アム。流星学園附属３年生の星騎士で……そうね。見てのとおり元気な子よ！」"
translation = "「얘는 시로타테 아무. 유성 학원 부속 3학년 성기사고…… 그래. 보는 대로 활기찬 애야!」"

[[dialogue]]
speaker = "アム"
original = "「はい！\u3000いつでも元気です！\u3000元気じゃないと戦はできないからね！」"
translation = "「네! 언제나 활기차답니다! 기운이 없으면 싸움은 할 수 없으니까요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「言っておくけどとても優秀よ？\u3000新星、流星をひっくるめても彼女以上の防御能力を持つ盾使いはいないと断言できるわ」"
translation = "「말해두지만 아주 우수해. 신성, 유성을 통틀어도 얘 이상의 방어 능력을 갖춘 방패잡이는 없다고 단언할 수 있어.」"

[[dialogue]]
speaker = "アム"
original = "「ふっふーん……その通り！\u3000そしてあたしは、ヴィーナス会長のライバル！」"
translation = "「훗훈~…… 그 말대로! 그리고 나는 비너스 회장님의 라이벌!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「訓練のアドバイスに乗っていたら、いつの間にかそんなことになってたのよね」"
translation = "「훈련 조언을 해줬더니 어느새 그렇게 돼버렸더라고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「で、私に懐いてくれているせいかしら。アムはクロトの会長就任を認めていないのよ」"
translation = "「그리고 나를 잘 따라서 그런 걸까. 아무는 쿠로토의 회장 취임을 인정하지 않고 있어.」"

[[dialogue]]
speaker = "アム"
original = "「当然です！\u3000ヴィーナス会長が負けるだなんて信じられない……試合の日は、そう、きっと調子が良くなかったんだよ！」"
translation = "「당연하죠! 비너스 회장님이 지다니 믿을 수 없어요…… 시합 날은, 그래, 분명 컨디션이 안 좋았던 거야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アム。何度も言っているでしょ。私は万全だった。それをクロトが実力で上回っただけ」"
translation = "「아무. 몇 번이나 말했잖니. 나는 만전이었어. 그걸 쿠로토가 실력으로 압도했을 뿐이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私を超えようと努力してくれるのは嬉しいけれど、現実は認めないといけないわ」"
translation = "「나를 넘으려고 노력해 주는 건 기쁘지만, 현실은 인정해야지.」"

[[dialogue]]
speaker = "アム"
original = "「そんな……ヴィーナス会長」"
translation = "「그런…… 비너스 회장님.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「違うわよ。『前会長』ね」"
translation = "「아니라니까. 『전 회장』이야.」"

[[dialogue]]
speaker = "アム"
original = "「うぅっ……」"
translation = "「우우……」"

[[dialogue]]
speaker = "unk"
original = "ライバルを横取りしちゃったのか"
translation = "라이벌을 가로채 버린 건가."

[[dialogue]]
speaker = "アム"
original = "「そうだよっ。ヴィーナス……前会長を倒すのはあたし。ずっとそう思って苦しい鍛錬にも耐えてきたのに！」"
translation = "「맞아! 비너스…… 전 회장님을 쓰러뜨리는 건 나야. 계속 그렇게 생각하면서 힘든 수행도 견뎌왔는데!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アム……」"
translation = "「아무……」"

[[dialogue]]
speaker = "アム"
original = "「おまけにあの就任劇……うぅううっ──羨ましいぃぃい～っ！！」"
translation = "「게다가 그 취임극…… 으으으윽── 부러워어어어~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「羨ましい……悔しい、じゃなくて？」"
translation = "「부러워…… 분한 게 아니고?」"

[[dialogue]]
speaker = "アム"
original = "「悔しいです！\u3000だけど同じくらい、羨ましい！\u3000就任の流れ、すっごくカッコ良かったんだもん！」"
translation = "「분해요! 하지만 그만큼 부러워요! 취임 흐름, 엄청 멋있었단 말이야!」"

[[dialogue]]
speaker = "アム"
original = "「もうずっと開催されていなかった御前試合がいきなり組まれて、衆目の中、ヴィーナス会長を撃破……！」"
translation = "「한참 동안 개최되지 않았던 어전 시합이 갑자기 잡혀서, 대중들 앞에서 비너스 회장님을 격파……!」"

[[dialogue]]
speaker = "アム"
original = "「あたしもあんな風にヴィーナス前会長を倒したかったー！\u3000うわああー！」"
translation = "「나도 저런 식으로 비너스 전 회장님을 쓰러뜨리고 싶었어! 으아아앙!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──なるほど。それでクロトが気に入らないのね」"
translation = "「──과연. 그래서 쿠로토가 마음에 안 드는 거네.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それならいっそのことアム。クロトもライバルにしちゃいなさい！」"
translation = "「그렇다면 차라리 아무. 쿠로토도 라이벌로 삼아버리렴!」"

[[dialogue]]
speaker = "アム"
original = "「え……！？」"
translation = "「에……!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトの会長就任を羨ましがるんじゃなく、正々堂々と実力で超えていく。そっちの方がカッコイイでしょう！」"
translation = "「쿠로토의 회장 취임을 부러워만 하지 말고, 정정당당하게 실력으로 넘어서는 거야. 그쪽이 더 멋있잖아!」"

[[dialogue]]
speaker = "アム"
original = "「な、なるほど……。確かにその通りです！\u3000流石はヴィーナス前会長！」"
translation = "「과, 과연…… 확실히 그 말이 맞아요! 역시 비너스 전 회장님!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふ、我ながら名案ね！」"
translation = "「후후, 나도 참 명안이라니까!」"

[[dialogue]]
speaker = "アム"
original = "「よし──それじゃあ今日からちゃんと会長って呼ぶ！\u3000それで、あたしのライバル３号に任命！」"
translation = "「좋아── 그럼 오늘부터 제대로 회장이라고 부를게! 그리고 나의 라이벌 3호로 임명!」"

[[dialogue]]
speaker = "unk"
original = "そんなにいるの、ライバル！？"
translation = "라이벌이 그렇게나 많아!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちなみに１号は私で、２号は流星附属の同級生。良かったわねクロト！」"
translation = "「참고로 1호는 나고, 2호는 유성 부속 동급생이야. 잘됐네, 쿠로토!」"

[[dialogue]]
speaker = "アム"
original = "「よ～し燃えて来たぞぉ……！\u3000ヴィーナス前会長の仇で、魔王を名乗るアヤシゲな男……何よりあたしの目標を横取りした相手！」"
translation = "「좋아~ 타오르기 시작했다고……! 비너스 전 회장님의 원수이자 마왕이라 자칭하는 수상쩍은 남자…… 무엇보다 나의 목표를 가로챈 상대!」"

[[dialogue]]
speaker = "アム"
original = "「絶対に負けないからね！\u3000新星学園、次期星徒会長の座は──あたしがもらう！」"
translation = "「절대로 안 질 거니까! 신성 학원 차기 성도회장의 자리는── 내가 가져가겠어!」"

[[dialogue]]
speaker = "アム"
original = "「そうと決まれば特訓だ！\u3000やるぞおぉーっ……！」"
translation = "「그렇게 정해졌으면 특훈이다! 가자아아!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だってさ。星徒会室に来た時と違って、やる気満々だったわね」"
translation = "「라는데. 성도회실에 왔을 때랑은 다르게 의욕 충만하네.」"

[[dialogue]]
speaker = "unk"
original = "俺も頑張る"
translation = "나도 열심히 해야지."

[[dialogue]]
speaker = "ヴィーナス"
original = "「その調子よ。あなたがアムに負けたら私も負けたことになるんだから、負けたら承知しないわよ！」"
translation = "「그 기세야. 당신이 아무에게 지면 나도 지는 셈이 되니까, 지면 가만 안 둘 거야!」"

