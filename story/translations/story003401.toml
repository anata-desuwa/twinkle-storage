[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「すみませーん、失礼しま～す！」"
translation = "「실례합니다~, 실례할게요~!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「新星の会長さんにお手紙ですよ～！\u3000今、大丈夫ですか？」"
translation = "「신성의 회장님께 온 편지예요~! 지금 괜찮으신가요?」"

[[dialogue]]
speaker = "unk"
original = "ああ……ありがと、ルリエル……"
translation = "아아…… 고마워, 루리엘……"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほぇ？\u3000どうしたんですか、そんな気のない返事をしちゃって。会長さんらしくありませんよ？」"
translation = "「호에? 왜 그러세요, 그렇게 기운 없는 대답을 하시고. 회장님답지 않아요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「さては会長さん…………おヒマですねっ！！」"
translation = "「보아하니 회장님………… 한가하시군요!!」"

[[dialogue]]
speaker = "unk"
original = "ちょっと考えごとをね……"
translation = "잠깐 생각할 게 좀 있어서……"

[[dialogue]]
speaker = "unk"
original = "ヒマなのは間違いないけど……"
translation = "한가한 건 틀림없지만……"

[[dialogue]]
speaker = "unk"
original = "珍しく──星徒会の仕事がない。"
translation = "드물게── 성도회 업무가 없다."

[[dialogue]]
speaker = "unk"
original = "そして、俺以外の新星星徒会メンバーもいない。理由はそれぞれだが、偶然が重なってみんな学園を離れているのだ。"
translation = "그리고 나 이외의 신성 성도회 멤버도 없다. 이유는 제각각이지만 우연이 겹쳐 다들 학원을 비우고 있는 것이다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「余裕があるのはいいことじゃありませんか。こっちなんてフィオナ会長が急にお出かけを決めちゃって、大変なんですから！」"
translation = "「여유가 있는 건 좋은 일 아니겠어요. 이쪽은 피오나 회장님이 갑자기 외출을 결정해 버리셔서 큰일이라고요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ、これはもしや……なるほど、なるほど♪」"
translation = "「앗, 이건 설마…… 과연, 과연♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ズバリ！\u3000会長さんの考え事はフィオナ会長ですねっ？」"
translation = "「정답! 회장님이 생각하시는 건 피오나 회장님이시군요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「異世界に行ってしまったフィオナ会長のことが、気になって仕方ないんじゃありませんか！？」"
translation = "「이세계로 가버린 피오나 회장님이 걱정돼서 견딜 수 없는 거 아니에요!?」"

[[dialogue]]
speaker = "unk"
original = "いろいろ気になることはあるんだ"
translation = "여러 가지 신경 쓰이는 일이 있어"

[[dialogue]]
speaker = "unk"
original = "うん、まあ……そうだね……"
translation = "응, 뭐…… 그렇지……"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほえ？\u3000なんか思ってたのと違う感じの反応です……気になることとは何ですか？」"
translation = "「호에? 왠지 생각했던 거랑 다른 느낌의 반응이에요…… 신경 쓰이는 일이란 게 뭔가요?」"

[[dialogue]]
speaker = "unk"
original = "フィオナの様子がちょっとね"
translation = "피오나의 모습이 좀 말이야"

[[dialogue]]
speaker = "unk"
original = "異世界に行くって決めた時のさ"
translation = "이세계에 가기로 결정했을 때 말이지"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「とある赤ちゃんのパパ捜しに、異世界へ行っちゃったんですよね？」"
translation = "「어떤 아기의 아빠 찾기를 하러 이세계에 가버린 거죠?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ルリエルもお話を聞いた時はちょっと驚きました！\u3000何の相談もなく行っちゃうとは思いませんでしたから」"
translation = "「루리엘도 이야기를 들었을 때는 좀 놀랐어요! 아무런 상의도 없이 가버릴 줄은 몰랐으니까요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「流星星徒会でも話してたんですよ～。あんまりフィオナ会長っぽくないかもって！」"
translation = "「유성 성도회에서도 이야기하고 있었거든요~. 별로 피오나 회장님답지 않은 것 같다고요!」"

[[dialogue]]
speaker = "unk"
original = "俺もフィオナらしくないって思ってて"
translation = "나도 피오나답지 않다고 생각해서"

[[dialogue]]
speaker = "unk"
original = "そうなんだよ"
translation = "그렇다니까"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「なるほど！\u3000会長さんはそれが引っ掛かっているんですね」"
translation = "「과연! 회장님은 그게 마음에 걸리시는 거군요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「とはいえ、ルリエルもあまり詳しい話は聞いてませんでした。何があったのか教えてください！」"
translation = "「그렇다고는 해도 루리엘도 자세한 이야기는 듣지 못했어요. 무슨 일이 있었는지 가르쳐 주세요!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルに言われて、俺が知っている限りの経緯を話し始める。"
translation = "루리엘의 말에 내가 아는 한도의 경위를 이야기하기 시작한다."

[[dialogue]]
speaker = "unk"
original = "それは、さかのぼること数日前──"
translation = "그것은 거슬러 올라가 며칠 전──"

[[dialogue]]
speaker = "unk"
original = "星徒会室で仕事をしていた俺のところへ、流星学園の星徒会長であるフィオナと、新星寮の寮長であるマハムート先輩ことマムが乗り込んできたのだが──"
translation = "성도회실에서 일을 하던 내게 유성학원의 성도회장인 피오나와 신성 기숙사의 기숙사장인 마하무트 선배, 즉 마무가 들이닥쳤는데──"

[[dialogue]]
speaker = "unk"
original = "２人は意外な人物を一緒に連れて来ていた。"
translation = "두 사람은 의외의 인물을 함께 데려왔었다."

[[dialogue]]
speaker = "unk"
original = "以前、クマロボ騒ぎを起こした黒ベア子とベア子。"
translation = "이전에 곰 로봇 소동을 일으켰던 흑베아코와 베아코."

[[dialogue]]
speaker = "unk"
original = "そして異世界からやってきたカーバンクル娘のルルゥという少女だった。"
translation = "그리고 이세계에서 온 카벙클 아가씨인 루루라는 소녀였다."

[[dialogue]]
speaker = "unk"
original = "黒ベア子は抱えている『赤ちゃんクマロボ』を突き出してきて、俺の子ではないかと迫ってくる。"
translation = "흑베아코는 안고 있던 『아기 곰 로봇』을 내밀며 내 아이가 아니냐고 다그쳐 왔다."

[[dialogue]]
speaker = "unk"
original = "詳しい事情を訊いてみると、黒ベア子たちはその子の父親を捜して、過去に訪れた世界を巡っているとのことだった。"
translation = "자세한 사정을 들어보니 흑베아코 일행은 그 아이의 아버지를 찾아 과거에 방문했던 세계를 돌고 있다는 것이었다."

[[dialogue]]
speaker = "unk"
original = "もちろん俺にそんな心当たりは無かったので、自分は父親ではないと説明したところ、意外にもあっさりと納得してもらうことが出来た。"
translation = "물론 내게 그런 짐작 가는 일은 없었기에 자신이 아버지가 아니라고 설명하자 의외로 순순히 납득해 주었다."

[[dialogue]]
speaker = "unk"
original = "どうやら確たる疑いをもって突撃してきたわけではなく、本当に手当たり次第に訊ねて回っているだけらしい。"
translation = "아무래도 확고한 의심을 가지고 돌격해 온 게 아니라 정말 닥치는 대로 묻고 다니는 모양이다."

[[dialogue]]
speaker = "unk"
original = "俺が父親でないことが分かると、黒ベア子たちはさっさと次の世界に向かおうとしていたのだが……"
translation = "내가 아버지가 아니라는 걸 알자 흑베아코 일행은 냉큼 다음 세계로 향하려 했지만……"

[[dialogue]]
speaker = "unk"
original = "結局いろいろなトラブルがあり、準備が整うまで時間がかかってしまっていた。"
translation = "결국 여러 가지 트러블이 있어 준비가 갖춰질 때까지 시간이 걸리고 말았다."

[[dialogue]]
speaker = "unk"
original = "いよいよ次の世界、『イリスクラウド』へ黒ベア子たちが出発しようとした時、フィオナが突然一緒についていくと言い出したのだった。"
translation = "드디어 다음 세계인 『이리스 클라우드』로 흑베아코 일행이 출발하려 할 때, 피오나가 갑자기 함께 가겠다고 나선 것이었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長、少しの間、流星市国の留守をお願いできないでしょうか？\u3000私も、この子の父親を見つけてあげたいんです」"
translation = "「히노미야 회장님, 잠시 동안 유성시국을 부탁드려도 될까요? 저도 이 아이의 아버지를 찾아주고 싶어요」"

[[dialogue]]
speaker = "unk"
original = "フィオナの性格を考えると、赤ちゃんクマロボの父親を見つけてあげたい、という気持ちになるのはそれほど不自然ではない。"
translation = "피오나의 성격을 생각하면 아기 곰 로봇의 아버지를 찾아주고 싶다는 마음이 드는 건 그리 부자연스럽지 않다."

[[dialogue]]
speaker = "unk"
original = "けれど、それにしたってやや唐突な印象はぬぐえなかった。"
translation = "하지만 그렇다 쳐도 다소 돌발적인 인상은 지울 수 없었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うーん、フィオナ会長っぽいと言えばフィオナ会長っぽいですけど……」"
translation = "「으음, 피오나 회장님답다고 하면 피오나 회장님답지만……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「半日一緒に居ただけなのに、その赤ちゃんクマロボさんに入れ込み過ぎてるようにも感じますね？」"
translation = "「반나절 함께 있었을 뿐인데 그 아기 곰 로봇 씨에게 너무 빠져 있는 것처럼 느껴지기도 하네요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……もしかしてその子、ものすごく可愛いんじゃないでしょうか！？\u3000フィオナ会長は可愛いものに目がありませんから！！」"
translation = "「……혹시 그 아이, 엄청 귀여운 거 아닐까요!? 피오나 회장님은 귀여운 것에 사족을 못 쓰시니까요!!」"

[[dialogue]]
speaker = "unk"
original = "クマロボの赤ちゃんだけど"
translation = "곰 로봇 아기이긴 하지만"

[[dialogue]]
speaker = "unk"
original = "可愛くはあったよ"
translation = "귀엽긴 했어"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「その可愛さ補正で、フィオナ会長の母性に火が点いちゃったに違いありません！！」"
translation = "「그 귀여움 보정 때문에, 피오나 회장님의 모성에 불이 붙은 게 틀림없어요!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「なんにせよ、フィオナ会長には早く帰ってきて欲しいのです～。でないと星徒会のお仕事が大変で大変で……」"
translation = "「어찌 됐든, 피오나 회장님이 빨리 돌아오셨으면 좋겠어요~. 안 그러면 성도회 업무가 너무 힘들어서 힘들어서……」"

[[dialogue]]
speaker = "unk"
original = "無事に帰ってきて欲しいよ"
translation = "무사히 돌아오면 좋겠네"

[[dialogue]]
speaker = "unk"
original = "そうだね"
translation = "그러게"

[[dialogue]]
speaker = "unk"
original = "と、そんな話をしていた矢先──"
translation = "라며 그런 이야기를 하던 찰나──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わわわぁっ！？\u3000何ですか、これ～！？」"
translation = "「와와와앗!? 뭔가요, 이거~!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「もしかして、これがお話に出てきた黒い穴？\u3000なんでしょうか！？\u3000ということはフィオナ会長が帰ってきた！？」"
translation = "「혹시 이게 이야기로만 듣던 검은 구멍? 인가요!? 그렇다는 건 피오나 회장님이 돌아오신 건가!?」"

[[dialogue]]
speaker = "unk"
original = "俺もルリエルと同じことを考えた。"
translation = "나도 루리엘과 같은 생각을 했다."

[[dialogue]]
speaker = "unk"
original = "しかし次の瞬間、そこから姿を現したのはフィオナではなく、見知らぬ２人の女の子だった。"
translation = "하지만 다음 순간, 그곳에서 모습을 드러낸 것은 피오나가 아니라 낯선 두 명의 여자아이였다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「おや、何事だい？\u3000奇想天外なことが起きていることだけは、間違いなさそうだけど」"
translation = "「어라, 무슨 일이지? 기상천외한 일이 일어나고 있다는 것만은 틀림없는 것 같네」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「あわわわわ！\u3000こ、ここ、どこですか！？\u3000お部屋でまったりしてたはずなのに！！？」"
translation = "「아와와와와! 여, 여기, 어디인가요!? 방에서 느긋하게 쉬고 있었을 텐데!!?」"

