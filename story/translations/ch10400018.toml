[[dialogue]]
speaker = "アイリーン"
original = "「会長さ～ん、いらっしゃーい♪\u3000あ、お土産だ！\u3000ありがとー♪」"
translation = "「회장님~, 어서 와~♪ 아, 선물이다! 고마워~♪」"

[[dialogue]]
speaker = "unk"
original = "紆余曲折を経て、今の星騎士とネビュラは、敵対関係とも協力関係とも言えない状態だ。"
translation = "우여곡절을 거쳐, 지금의 별의 기사와 네뷸라는 적대 관계라고도 협력 관계라고도 할 수 없는 상태다."

[[dialogue]]
speaker = "unk"
original = "だが来訪は拒まれていないらしく、これまで何度かアイリーンの客人として訪問していた。"
translation = "하지만 내방은 거절당하지 않는 듯하여, 지금까지 몇 번인가 아이린의 손님으로서 방문하고 있었다."

[[dialogue]]
speaker = "アイリーン"
original = "「会長さん、こっちこっち～♪」"
translation = "「회장님, 여기야 여기~♪」"

[[dialogue]]
speaker = "unk"
original = "アイリーンの小さな手が、俺の手を引いて居住ブロックへと連れていく。"
translation = "아이린의 작은 손이 내 손을 이끌고 거주 블록으로 데려간다."

[[dialogue]]
speaker = "unk"
original = "そしてアイリーンの自室に入ると──"
translation = "그리고 아이린의 방에 들어가자──"

[[dialogue]]
speaker = "アイリーン"
original = "「んちゅっ……ちゅっ、ちゅっ……ちゅぱっ、ぴちゃっ<emoji=heart04>」"
translation = "「응츄…… 츄, 츄…… 츄파, 피챠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "めいっぱい背伸びしたアイリーンが俺に抱きつき、唇を重ねた。"
translation = "한껏 발돋움을 한 아이린이 나에게 매달려 입술을 겹쳤다."

[[dialogue]]
speaker = "unk"
original = "幼い容姿に似合わない濃厚なキスが続く。"
translation = "어린 외모에 어울리지 않는 농후한 키스가 이어진다."

[[dialogue]]
speaker = "アイリーン"
original = "「ぴちゃっ……ちゅるちゅるっ……れろっ、ちゅるるっ……んはぁ<emoji=heart04>\u3000れろ、れろ……んじゅるっ……ちゅぅっ<emoji=heart04>」"
translation = "「피챠…… 츄르츄르…… 레로, 츄르르…… 은하아<emoji=heart04> 레로, 레로…… 은쥬르…… 츄으<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「じゅるるっ……じゅるっ……ちゅぷっ、ちゅくっ、ちゅるるるっ──ぷぁっ<emoji=heart04>」"
translation = "「쥬르르…… 쥬르…… 츄푸, 츄쿠, 츄르르르── 푸하아<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「えへへ……会長さんと早くエッチしたいな<emoji=heart04>」"
translation = "「에헤헤…… 회장님이랑 빨리 섹스하고 싶어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして頬をほんのり赤く染め、上目遣いで俺を見やるアイリーンの顔は、子どもではなく女の顔だった。"
translation = "그리고 뺨을 살짝 붉게 물들이고 치켜뜬 눈으로 나를 바라보는 아이린의 얼굴은, 어린애가 아니라 여자의 얼굴이었다."

[[dialogue]]
speaker = "unk"
original = "アイリーンと俺が恋人になって、互いを求めるうちにセックスするようになって。"
translation = "아이린과 내가 연인이 되어 서로를 원하는 사이에 섹스를 하게 되었고."

[[dialogue]]
speaker = "unk"
original = "初めての時は痛そうにしていたアイリーンも、今では積極的に俺とつながりたいと言うようになっていた。"
translation = "처음에는 아픈 기색을 보이던 아이린도 이제는 적극적으로 나와 이어지고 싶다고 말하게 되었다."

[[dialogue]]
speaker = "アイリーン"
original = "「会長さんの前で裸になるの、今でもちょっと緊張するな……」"
translation = "「회장님 앞에서 알몸이 되는 거, 지금도 좀 긴장되네……」"

[[dialogue]]
speaker = "unk"
original = "アイリーンがリボンをほどいて、照れくさそうに魔女の装束を脱いでいく。"
translation = "아이린이 리본을 풀고 쑥스러운 듯 마녀의 복장을 벗어간다."

[[dialogue]]
speaker = "unk"
original = "すると、瑞々しい肌やなだらかな膨らみ、薄桃色の乳首までもが露わになった。"
translation = "그러자 싱그러운 피부와 완만한 부풀음, 연분홍색 유두까지도 드러났다."

[[dialogue]]
speaker = "アイリーン"
original = "「ミーちゃんには外で遊んでもらってるよ。ミーちゃんにはちょっと悪いけど」"
translation = "「미짱은 밖에서 놀게 하고 있어. 미짱한테는 좀 미안하지만.」"

[[dialogue]]
speaker = "unk"
original = "大切な家族とはいえ、あるいは家族だからこそ、男と交わっているところを見られるのは恥ずかしいのだろう。"
translation = "소중한 가족이라 해도, 혹은 가족이기에 남자와 섞이는 모습을 보이는 것은 부끄러운 것이리라."

[[dialogue]]
speaker = "unk"
original = "しかし──"
translation = "하지만──"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー？」"
translation = "「호?」"

[[dialogue]]
speaker = "アイリーン"
original = "「ミミ、ミーちゃん！？」"
translation = "「미, 미, 미짱!?」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ、う……見ないでぇ……」"
translation = "「아, 우…… 보지 마아……」"

[[dialogue]]
speaker = "unk"
original = "俺たちが座るベッドのすぐ前に、ちょこんと着地するミーちゃん。"
translation = "우리들이 앉은 침대 바로 앞에 톡 하고 착지하는 미짱."

[[dialogue]]
speaker = "unk"
original = "視力のいいミーちゃんでなくとも、この距離ならアイリーンの裸は丸見えだ。"
translation = "시력이 좋은 미짱이 아니더라도 이 거리라면 아이린의 알몸은 훤히 보인다."

[[dialogue]]
speaker = "アイリーン"
original = "「どうしてミーちゃんが……？」"
translation = "「어째서 미짱이……?」"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー」"
translation = "「호.」"

[[dialogue]]
speaker = "アイリーン"
original = "「そ、そう、遊び疲れちゃったんだ……」"
translation = "「그, 그래, 놀다 지쳤구나……」"

[[dialogue]]
speaker = "アイリーン"
original = "「でもね、これから会長さんと用事があるから、ちょっと外で待っててくれると嬉しいな……」"
translation = "「하지만 말이야, 이제부터 회장님이랑 용무가 있으니까 잠깐 밖에서 기다려주면 기쁠 것 같은데……」"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー？」"
translation = "「호?」"

[[dialogue]]
speaker = "unk"
original = "なぜ自分を追い出すのかわからないと、首を傾げるミーちゃん。"
translation = "왜 자신을 내쫓는지 모르겠다는 듯 고개를 갸웃거리는 미짱."

[[dialogue]]
speaker = "unk"
original = "使い魔でもさすがに俺たちの行為を理解できないようで、不思議そうにこちらを見つめる。"
translation = "사역마라도 역시 우리들의 행위를 이해하지 못하는 듯하여 신기한 듯 이쪽을 바라본다."

[[dialogue]]
speaker = "アイリーン"
original = "「うぅ～……会長さん、エッチするのはまた今度にしない？\u3000そうだ、今度は会長さんのおうちに行くのもいいなぁ～」"
translation = "「으으~…… 회장님, 섹스하는 건 다음에 하지 않을래? 맞다, 다음엔 회장님 집으로 가는 것도 좋겠네~」"

[[dialogue]]
speaker = "unk"
original = "ミーちゃんを説得するのを諦めて、仕切り直しにしようとするアイリーン。"
translation = "미짱을 설득하는 것을 포기하고 다음 기회로 미루려는 아이린."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker = "アイリーン"
original = "「あ……会長さんのおち○ちん、おっきくなってる……」"
translation = "「아…… 회장님 자지, 커졌어……」"

[[dialogue]]
speaker = "unk"
original = "ここまで来て抑えられるほど、俺は聞き分けが良くない。"
translation = "여기까지 와서 억누를 수 있을 만큼 나는 말귀가 밝지 않다."

[[dialogue]]
speaker = "アイリーン"
original = "「ダメッ、ダメッ……！\u3000ミーちゃんの前でエッチするなんてダメぇっ！」"
translation = "「안 돼, 안 돼……! 미짱 앞에서 섹스하는 건 안 돼애!」"

[[dialogue]]
speaker = "unk"
original = "イヤイヤと首を振るアイリーンを意に介さず、うっすらと開きかけた秘裂に亀頭を押し込んだ。"
translation = "싫다며 고개를 젓는 아이린을 아랑곳하지 않고 살짝 열리기 시작한 비열에 귀두를 밀어 넣었다."

[[dialogue]]
speaker = "アイリーン"
original = "「ひぁああ～～～～～～～～っ！？」"
translation = "「히아아아~~~~~~~~~~~~~~~~~~!?」"

[[dialogue]]
speaker = "unk"
original = "アイリーンの小さな膣に、いきり立ったペニスがずぶりと突き刺さる。"
translation = "아이린의 작은 질에 발기한 페니스가 즈부리 하고 꽂힌다."

[[dialogue]]
speaker = "アイリーン"
original = "「会長さんのおち○ちん、入ってきてるぅ……！\u3000ふあぁ、はぁ……んんっ……<emoji=heart04>」"
translation = "「회장님 자지, 들어오고 있어……! 후아아, 하아…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「ダメって言ったのにぃ……はぁ……ぁっ……おち○ちん、動いてるよぉ……はぁ……んっ……<emoji=heart04>」"
translation = "「안 된다고 했는데에…… 하아…… 아앗…… 자지, 움직이고 있어어…… 하아…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉とは裏腹に、期待していたかのように膣内は淡く濡れていた。"
translation = "말과는 반대로 기대하고 있었던 것처럼 질 안은 엷게 젖어 있었다."

[[dialogue]]
speaker = "unk"
original = "熱くて柔らかな肉が隙間なくペニスを包み込み、ゾクゾクするような快感を与えてくれる。"
translation = "뜨겁고 부드러운 살이 빈틈없이 페니스를 감싸 안으며 소름 끼치는 쾌감을 안겨준다."

[[dialogue]]
speaker = "アイリーン"
original = "「会長さんのヘンタイ、犯罪者──んんっ<emoji=heart04>\u3000ひぁっ……はぁ、はぁんっ<emoji=heart04>」"
translation = "「회장님 변태, 범죄자── 응읏<emoji=heart04> 히앗…… 하아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「エッチしたいって言ったのはアイリーンだろ？」"
translation = "「섹스하고 싶다고 말한 건 아이린이잖아?」"

[[dialogue]]
speaker = "アイリーン"
original = "「そうだけどぉ……ふあぁ……はぁっ<emoji=heart04>\u3000はぁ、あ……おち○ちん、熱くて、硬い……んん～っ<emoji=heart04>」"
translation = "「그렇지만아…… 후아아…… 하앗<emoji=heart04> 하아, 아…… 자지, 뜨겁고, 딱딱해…… 응응~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「最初はちょっと苦しそうだったのに、今ではこんなに嬉しそうに飲み込んでるな」"
translation = "「처음에는 좀 괴로워 보였는데, 이제는 이렇게 기쁜 듯이 삼키고 있네.」"

[[dialogue]]
speaker = "アイリーン"
original = "「言わないでぇ……ふやっ……あ、あ、あっ<emoji=heart04>\u3000会長さんの、おち○ちんが……はっ、はっ、はっ──ひあぁああっ<emoji=heart04>」"
translation = "「말하지 마아…… 후얏…… 아, 아, 앗<emoji=heart04> 회장님의, 자지가…… 하앗, 하앗, 하앗── 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アイリーンの中から蜜が湧き出し、ネビュラ基地の無機質な部屋に淫らな水音が響く。"
translation = "아이린의 안에서 꿀이 솟아나고 네뷸라 기지의 무기질적인 방에 음란한 물소리가 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "下から突き上げながら、控えめな膨らみをそっと揉む。"
translation = "밑에서 치올리면서 아담한 부풀음을 살며시 주무른다."

[[dialogue]]
speaker = "アイリーン"
original = "「ひあああぁっ！？」"
translation = "「히아아아앗!?」"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー！」"
translation = "「호!」"

[[dialogue]]
speaker = "unk"
original = "甲高い声に反応して、主を守ろうと攻撃態勢を取るミーちゃん。"
translation = "날카로운 목소리에 반응하여 주인을 지키려고 공격 태세를 취하는 미짱."

[[dialogue]]
speaker = "アイリーン"
original = "「ち、違うの！\u3000これは会長さんにいじめられてるわけじゃなくて……その、遊んでるだけだから。会長さんとは仲良しだから……ね？」"
translation = "「아, 아니야! 이건 회장님한테 괴롭힘당하는 게 아니라…… 그게, 놀고 있는 것뿐이니까. 회장님이랑은 사이좋으니까…… 그치?」"

[[dialogue]]
speaker = "unk"
original = "アイリーンに言われて、ミーちゃんが警戒を解く。"
translation = "아이린의 말에 미짱이 경계를 푼다."

[[dialogue]]
speaker = "unk"
original = "だけどミーちゃんの瞳は、監視するように俺たちを見つめ続けていた。"
translation = "하지만 미짱의 눈동자는 감시하듯 우리를 계속 지켜보고 있었다."

[[dialogue]]
speaker = "アイリーン"
original = "「ひぁ、はんっ……ミーちゃんが見てるぅ……ん～っ<emoji=heart04>\u3000はぁ、はぁんっ<emoji=heart04>」"
translation = "「히아, 항…… 미짱이 보고 있어어…… 응~<emoji=heart04> 하아, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しかし俺は責めを緩めることなく、アイリーンの胸をふにふにと揉みしだく。"
translation = "그러나 나는 공세를 늦추지 않고 아이린의 가슴을 조물조물 주물러 댄다."

[[dialogue]]
speaker = "アイリーン"
original = "「またおっぱい触って……ひあぁあっ<emoji=heart04>\u3000んっ、ふぅっ……ひゃんっ<emoji=heart04>\u3000ふああぁっ……あっ、あっ……はあぁん<emoji=heart04>」"
translation = "「또 가슴 만지고…… 히아아앗<emoji=heart04> 응, 후으…… 히양<emoji=heart04> 후아아앗…… 앗, 앗…… 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「おち○ちんでズンズンされながら……おっぱいぐにぐにされて……あぁ……ひぁっ、あんっ<emoji=heart04>」"
translation = "「자지로 즈음즈음 당하면서…… 가슴 구니구니 당해서…… 아아…… 히앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮で硬くなってきた乳首をきゅっと摘まむ。"
translation = "흥분으로 딱딱해진 유두를 꼬집는다."

[[dialogue]]
speaker = "アイリーン"
original = "「んん～～～～～っ！？\u3000先っぽ、触られたら──ふぁあんっ<emoji=heart04>\u3000そこ、気持ち、いいっ<emoji=heart04>」"
translation = "「응응~~~~~~~~~!? 끝부분, 만져지면── 화앙<emoji=heart04> 거기, 기분, 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「ミーちゃん、見ないで……はぁんっ……ひぁっ、はっ、はっ……んぁああ～っ<emoji=heart04>」"
translation = "「미짱, 보지 마…… 하앙…… 히앗, 하앗, 하앗…… 응아아아~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アイリーンって、ミーちゃんと感覚を共有できるんだよな」"
translation = "「아이린은 미짱이랑 감각을 공유할 수 있지.」"

[[dialogue]]
speaker = "アイリーン"
original = "「そ、そうだけど――」"
translation = "「그, 그렇지만──」"

[[dialogue]]
speaker = "unk"
original = "アイリーンがハッとする。"
translation = "아이린이 아차 한다."

[[dialogue]]
speaker = "unk"
original = "もし今ミーちゃんと視覚を共有したら、俺たちがセックスしているところがアイリーン自身に見えるはずだ。"
translation = "만약 지금 미짱과 시각을 공유한다면 우리들이 섹스하고 있는 모습이 아이린 자신에게 보일 것이다."

[[dialogue]]
speaker = "アイリーン"
original = "「なな、なんでそんなこと言うの！？\u3000私絶対やらないよ！？」"
translation = "「왜, 왜 그런 말을 하는 거야!? 나 절대 안 할 거야!?」"

[[dialogue]]
speaker = "ミネルバ"
original = "「ホホー」"
translation = "「호호.」"

[[dialogue]]
speaker = "アイリーン"
original = "「──！？\u3000え、これ、私……！？」"
translation = "「──!? 에, 이거, 나……!?」"

[[dialogue]]
speaker = "unk"
original = "良かれと思ってか、ミーちゃんからのアクセスでチャンネルがつながり、アイリーンの脳裏にセックスしている俺たちが映る。"
translation = "좋을 대로 생각해서인지 미짱의 액세스로 채널이 연결되어 아이린의 뇌리에 섹스하고 있는 우리들이 비친다."

[[dialogue]]
speaker = "アイリーン"
original = "「うぅ～っ、恥ずかしいよぉっ！\u3000はぁああっ……はっ、ああぁんっ<emoji=heart04>」"
translation = "「으으~, 부끄러워어! 하아아앗…… 하앗, 아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "猛烈な羞恥を感じ、無意味にも自分の目を手で覆うアイリーン。"
translation = "맹렬한 수치심을 느끼며 무의미하게도 자신의 눈을 손으로 가리는 아이린."

[[dialogue]]
speaker = "unk"
original = "しかしアイリーンの小さな膣は、より強くペニスを締め付けていた。"
translation = "하지만 아이린의 작은 질은 더욱 강하게 페니스를 조여대고 있었다."

[[dialogue]]
speaker = "アイリーン"
original = "「ふああぁっ<emoji=heart04>\u3000はぁっ、あんっ<emoji=heart04>\u3000会長さんのおち○ちん、出たり入ったりしてるぅっ……あっ、あっ……うぁああっ<emoji=heart04>"
translation = "「후아아앗<emoji=heart04> 하앗, 앙<emoji=heart04> 회장님 자지, 들어왔다 나갔다 하고 있어어…… 앗, 앗…… 우아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000私のおま○こ、グチュグチュになって……あっ、あっ……すごい、エッチ……ひゃぁっ<emoji=heart04>」"
translation = "「앗, 앗, 앙<emoji=heart04> 내 보지, 구츄구츄가 돼서…… 앗, 앗…… 대단해, 섹스…… 히야앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミーちゃんの眼を通して見た光景は、さぞかし鮮明に映るだろう。"
translation = "미짱의 눈을 통해 본 광경은 필시 선명하게 비칠 것이다."

[[dialogue]]
speaker = "unk"
original = "アイリーンのエッチな姿を俺も見せてほしいぐらいだ。"
translation = "아이린의 야한 모습을 나에게도 보여줬으면 할 정도다."

[[dialogue]]
speaker = "アイリーン"
original = "「はぁ、はぁ……はっ、はんっ<emoji=heart04>\u3000エッチしてる私、こんな顔してるの……？\u3000はぁ、あっ……いやらしい顔しちゃってるぅ……<emoji=heart04>」"
translation = "「하아, 하아…… 하앗, 항<emoji=heart04> 섹스하는 나, 이런 얼굴 하고 있어……? 하아, 앗…… 야한 얼굴 해버리고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「おっきなおち○ちんで、おま○こ広げられてる……ふあっ、あっ……これヤダ、ヤダぁ……ぁ──ひぁああ～～っ<emoji=heart04>」"
translation = "「커다란 자지로, 보지 벌려지고 있어…… 후앗, 앗…… 이거 싫어, 싫어어…… 아── 히아아아~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嫌がりながらも、アイリーンの膣はしっかりと反応してきゅうっとペニスを圧迫する。"
translation = "싫어하면서도 아이린의 질은 확실히 반응하여 꽉 페니스를 압박한다."

[[dialogue]]
speaker = "unk"
original = "自分がセックスする姿にアイリーンも興奮しているようだった。"
translation = "자신이 섹스하는 모습에 아이린도 흥분하고 있는 것 같았다."

[[dialogue]]
speaker = "アイリーン"
original = "「ダメ、どうして共有が切れないの……ダメ、ダメだってばぁ……ひぁ……ふぁああっ<emoji=heart04>」"
translation = "「안 돼, 어째서 공유가 안 끊기는 거야…… 안 돼, 안 된다니까아…… 히아…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ、あっ、あぁ──んんっ<emoji=heart04>\u3000見たくないのに、エッチしてるところ見えちゃうよぉっ<emoji=heart04>」"
translation = "「앗, 앗, 아아── 응읏<emoji=heart04> 보고 싶지 않은데, 섹스하는 곳 보여버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感と混乱のせいか、自身の術のコントロールもできないアイリーン。"
translation = "쾌감과 혼란 탓인지 자신의 술법 컨트롤도 하지 못하는 아이린."

[[dialogue]]
speaker = "unk"
original = "それをいいことに、ミーちゃんに見せつけながらペニスを突き立てる。"
translation = "그것을 기회 삼아 미짱에게 보여주듯 페니스를 찔러 넣는다."

[[dialogue]]
speaker = "アイリーン"
original = "「ふぁっ、はぁっ、はんっ<emoji=heart04>\u3000ジュプジュプって、いやらしい音がぁ……はぁっ、はっ……あっ、あんっ<emoji=heart04>」"
translation = "「후앗, 하앗, 항<emoji=heart04> 쥬푸쥬푸하고, 야한 소리가아…… 하앗, 하앗…… 앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ、あっ、あっ……ひああぁっ<emoji=heart04>\u3000おち○ちん、熱いぃ……あぁっ、はっ、はぁっ……んん～～っ<emoji=heart04>」"
translation = "「앗, 앗, 앗…… 히아아앗<emoji=heart04> 자지, 뜨거워어…… 아앗, 하앗, 하앗…… 응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ、あっ……中、擦れて……ふわっ、はっ、はんっ<emoji=heart04>\u3000ふ──んん～っ<emoji=heart04>\u3000おち○ちんの、出っ張ってるところ、当たる……んぁああっ<emoji=heart04>」"
translation = "「앗, 앗…… 안쪽, 쓸려서…… 후왓, 하앗, 항<emoji=heart04> 후── 응응~<emoji=heart04> 자지의, 튀어나온 부분, 닿아…… 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「はぁ、はっ、んんっ<emoji=heart04>\u3000ミーちゃん、見ないでってばぁ……ふあぁっ、はっ──あっ──ひゃあぁんっ<emoji=heart04>」"
translation = "「하아, 하앗, 응읏<emoji=heart04> 미짱, 보지 말라니까아…… 후아앗, 하앗── 앗── 히야아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「アイリーンも気持ち良くなってるだろ？」"
translation = "「아이린도 기분 좋아졌지?」"

[[dialogue]]
speaker = "アイリーン"
original = "「そ、そんなこと──ひあああ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「그, 그런 거── 히아아아~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミーちゃんに見られながら興奮していることを認めがらないアイリーン。"
translation = "미짱에게 들키면서 흥분하고 있다는 것을 인정하고 싶어 하지 않는 아이린."

[[dialogue]]
speaker = "unk"
original = "だけど膣壁はぶるぶると痙攣し、アイリーンが快楽に染まっていることを物語っていた。"
translation = "하지만 질벽은 파르르 경련하며 아이린이 쾌락에 물들어 있음을 말해주고 있었다."

[[dialogue]]
speaker = "アイリーン"
original = "「んん～～っ<emoji=heart04>\u3000会長さんの、おち○ちんビクビクしてっ……中で、また大きくなってるっ……んっ、あっ……ふあぁんっ<emoji=heart04>」"
translation = "「응응~~<emoji=heart04> 회장님의, 자지 비쿠비쿠해서…… 안에서, 또 커지고 있어…… 응, 앗…… 후아앙<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「ひっ──はっ──んん～～っ<emoji=heart04>\u3000おち○ちんが、おま○こズボズボして、すごくエッチだよぉっ<emoji=heart04>」"
translation = "「힛── 하앗── 응응~~<emoji=heart04> 자지가, 보지 즈보즈보해서, 엄청 야해애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アイリーンの中でペニスがさらに張り詰め、放出を求めて強く突き上げる。"
translation = "아이린의 안에서 페니스가 더욱 팽창하여 방출을 원하며 강하게 치올린다."

[[dialogue]]
speaker = "アイリーン"
original = "「あ、あ、あ、あ──んぁあああっ<emoji=heart04>\u3000はぁっ、あっ、あっ……は──んん～～～～っ<emoji=heart04>」"
translation = "「아, 아, 아, 아── 응아아아앗<emoji=heart04> 하앗, 앗, 앗…… 하── 응응~~~~<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「会長さん、激しいっ<emoji=heart04>\u3000おち○ちんすごいぃっ<emoji=heart04>\u3000ふあぁっ、はっ、はっ、はっ、ひぁああっ<emoji=heart04>」"
translation = "「회장님, 격렬해<emoji=heart04> 자지 굉장해에<emoji=heart04> 후아앗, 하앗, 하앗, 하앗, 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「おち○ちん、太いぃっ<emoji=heart04>\u3000んっ、あっ<emoji=heart04>\u3000私のおま○こ、おち○ちんの形になっちゃうっ<emoji=heart04>\u3000はぁっ、はっ、ひああっ<emoji=heart04>」"
translation = "「자지, 굵어어<emoji=heart04> 응, 앗<emoji=heart04> 내 보지, 자지 모양이 되어버려어<emoji=heart04> 하앗, 하앗, 히아앗<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「おっきなおち○ちんで、ズンズンされて、おま○こ壊れちゃうぅっ<emoji=heart04>\u3000はあぁっ、はっ──んんぁああ～～っ<emoji=heart04>」"
translation = "「커다란 자지로, 즈음즈음 당해서, 보지 망가져버려어<emoji=heart04> 하아앗, 하앗── 응응아아아~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスを全力で突き入れ、アイリーンの小さな体に欲望をぶつける。"
translation = "노창된 페니스를 전력으로 찔러 넣어 아이린의 작은 몸에 욕망을 부딪친다."

[[dialogue]]
speaker = "アイリーン"
original = "「んんん～～っ<emoji=heart04>\u3000おく……奥に、会長さんのおち○ちん、当たってるぅっ<emoji=heart04>\u3000ふああっ、あっ、あんっ<emoji=heart04>」"
translation = "「응응응~~<emoji=heart04> 깊숙이…… 깊은 곳에, 회장님 자지, 닿고 있어어<emoji=heart04> 후아앗, 앗, 항<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「んっ、んっ、あぁっ<emoji=heart04>\u3000おく、すごいのっ……コツコツって、おち○ちんの先っぽ、が……ああぁっ、はっ、うあぁあっ<emoji=heart04>」"
translation = "「응, 응, 아앗<emoji=heart04> 깊은 곳, 굉장해…… 코츠코츠하고, 자지 끝부분이…… 아아앗, 하앗, 우아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が奥まで届き、アイリーンの子宮口を叩く。"
translation = "귀두가 안쪽까지 닿아 아이린의 자궁구를 두드린다."

[[dialogue]]
speaker = "unk"
original = "その度にアイリーンの体がビクッと震え、ぞくりと強烈な快感が走り、射精欲が込み上げてきた。"
translation = "그때마다 아이린의 몸이 움찔 떨리고 소름 끼치는 강렬한 쾌감이 달려 사정욕이 치밀어 올랐다."

[[dialogue]]
speaker = "アイリーン"
original = "「あ──ふぁあっ──会長さん、会長さぁんっ<emoji=heart04>\u3000んぁ、はぁっ……おち○ちんすごいっ<emoji=heart04>\u3000気持ちいいよぉっ<emoji=heart04>」"
translation = "「아── 후아앗── 회장님, 회장님아아앗<emoji=heart04> 응아, 하앗…… 자지 굉장해<emoji=heart04> 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「はぁはっ、はっ、はぁんっ<emoji=heart04>\u3000おま○こ熱いぃ──ふぁっ、はっ、はっ──おち○ちん好きぃっ<emoji=heart04>」"
translation = "「하아하앗, 하앗, 하아앙<emoji=heart04> 보지 뜨거워어── 후앗, 하앗, 하앗── 자지 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今もミーちゃんは俺たちを見つめていて、アイリーンの眼には俺たちがセックスする姿が映っているんだろう。"
translation = "지금도 미짱은 우리를 지켜보고 있고 아이린의 눈에는 우리들이 섹스하는 모습이 비치고 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "だけど羞恥すら快感となって思考を蕩けさせ、幼い外見に似合わない嬌声を上げて快楽に酔っていた。"
translation = "하지만 수치심조차 쾌감이 되어 사고를 녹여버리고 어린 외모에 어울리지 않는 교성을 내지르며 쾌락에 취해 있었다."

[[dialogue]]
speaker = "アイリーン"
original = "「会長さぁんっ……ひぁっ、はぁっ、はんっ<emoji=heart04>\u3000会長さん、好き……好きぃ<emoji=heart04>\u3000んっ……あっ、はっ──ひぁああ～～っ<emoji=heart04>」"
translation = "「회장님아아앗…… 히앗, 하앗, 항<emoji=heart04> 회장님, 좋아…… 좋아해<emoji=heart04> 응…… 앗, 하앗── 히아아아~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い声で俺を呼ぶアイリーンに誘われてまたキスをする。"
translation = "달콤한 목소리로 나를 부르는 아이린에게 이끌려 다시 키스를 한다."

[[dialogue]]
speaker = "アイリーン"
original = "「んむっ<emoji=heart04>\u3000んふっ──んちゅるっ、ちゅくちゅくっ……れぇろ……はぁ……ちゅるちゅる<emoji=heart04>」"
translation = "「응뭇<emoji=heart04> 응훗── 응츄르, 츄쿠츄쿠…… 레에로…… 하아…… 츄르츄르<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「ぷぁ……すごい……キスしてるところも見えちゃう……くちゅる、くちゅっ……れろちゅぱ、ちゅるっ……ふっ……んちゅるちゅるっ<emoji=heart04>」"
translation = "「푸아…… 굉장해…… 키스하는 모습도 보여버려…… 쿠츄르, 쿠츄…… 레로츄파, 츄르…… 훗…… 응츄르츄르<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇が触れるキスから、唾液が垂れ落ちるディープキスへと激しくなっていく。"
translation = "입술이 닿는 키스에서 타액이 흘러내리는 딥 키스로 격렬해져 간다."

[[dialogue]]
speaker = "unk"
original = "その光景すらもミーちゃんの眼を通してアイリーンの瞳に映っていた。"
translation = "그 광경조차도 미짱의 눈을 통해 아이린의 눈동자에 비치고 있었다."

[[dialogue]]
speaker = "アイリーン"
original = "「んちゅっ……ちゅるるるっ……れろちゅぱっ、ちゅるれろ、んじゅるるっ<emoji=heart04>\u3000んむっ──じゅむっ、じゅくるっ──ぷはぁっ<emoji=heart04>」"
translation = "「응츄…… 츄르르르…… 레로츄파, 츄르레로, 응쥬르르<emoji=heart04> 응뭇── 쥬뭇, 쥬쿠르── 푸하앗<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「あ──は──は──はんっ<emoji=heart04>\u3000おま○こイッちゃうっ<emoji=heart04>\u3000あっ、あっ、はあぁんっ<emoji=heart04>\u3000会長さんのおち○ちんでイッくぅっ<emoji=heart04>」"
translation = "「아── 하── 하── 하앙<emoji=heart04> 보지 가버려어<emoji=heart04> 앗, 앗, 하아앙<emoji=heart04> 회장님 자지로 가버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も限界が近づき、射精寸前だ。"
translation = "나도 한계가 다가와 사정 직전이다."

[[dialogue]]
speaker = "unk"
original = "爆発しそうにドクドクと跳ねるペニスを、何度もアイリーンの奥に打ち付ける。"
translation = "폭발할 듯이 두근두근 뛰는 페니스를 몇 번이고 아이린의 안쪽에 때려 박는다."

[[dialogue]]
speaker = "アイリーン"
original = "「はっ、はっ、はっ──んん～～っ<emoji=heart04>\u3000はぁはっ、は──イクっ──気持ちいいっ<emoji=heart04>\u3000おま○こ溶けちゃうぅっ<emoji=heart04>」"
translation = "「하앗, 하앗, 하앗── 응응~~<emoji=heart04> 하아하앗, 하── 가버려── 기분 좋아<emoji=heart04> 보지 녹아버려어<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「ふぁあっ──はっ、はっ、はんっ<emoji=heart04>\u3000ミーちゃんに見られながらイッちゃうぅっ<emoji=heart04>\u3000イクっ、イクぅっ……イクイクイクぅっ<emoji=heart04>」"
translation = "「후아앗── 하앗, 하앗, 항<emoji=heart04> 미짱한테 들키면서 가버려어<emoji=heart04> 가버려, 가버려어…… 가버려 가버려 가버려어<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ──あっ、あっ、あんっ<emoji=heart04>\u3000おま○こイクのぉっ<emoji=heart04>\u3000イクイクイッくぅ～～っ<emoji=heart04>\u3000ふぁああぁっ──」"
translation = "「앗── 앗, 앗, 앙<emoji=heart04> 보지 가버리는 거야아<emoji=heart04> 가버려 가버려 가버려어어~~<emoji=heart04> 후아아아앗──」"

[[dialogue]]
speaker = "アイリーン"
original = "「ひぁああああああ～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아아아~~~~~~~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「おち○ちんビクビクして……あっ、あっ、ふぁあっ<emoji=heart04>\u3000はっ──はっ──は──ひゃうぅっ<emoji=heart04>」"
translation = "「자지 비쿠비쿠해서…… 앗, 앗, 후아앗<emoji=heart04> 하앗── 하앗── 하── 히야우웃<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「あっ──あっ──あっ──あんんっ<emoji=heart04>\u3000イッてるところ、見えちゃう──んんっ──ふぁあ～～～っ<emoji=heart04>」"
translation = "「앗── 앗── 앗── 앙앙<emoji=heart04> 가고 있는 거, 보여버려── 응응── 후아아~~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アイリーンは小さな体を絶頂で震えさせ、ぎゅっとしがみつくようにペニスを絞る。"
translation = "아이린은 작은 몸을 절정으로 떨며 꽉 매달리듯 페니스를 쥐어짠다."

[[dialogue]]
speaker = "アイリーン"
original = "「んんっ……熱いの出てるっ<emoji=heart04>\u3000あっ……ふぁああっ<emoji=heart04>\u3000せーえき、ドクドク入ってきて、あついぃ<emoji=heart04>」"
translation = "「응응…… 뜨거운 거 나오고 있어<emoji=heart04> 앗…… 후아아앗<emoji=heart04> 정액, 도쿠도쿠 들어와서, 뜨거워어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭を子宮口に密着させ、最後の一滴までアイリーンの中に注ぎ込む。"
translation = "귀두를 자궁구에 밀착시켜 마지막 한 방울까지 아이린의 안에 쏟아붓는다."

[[dialogue]]
speaker = "アイリーン"
original = "「まだ、出てる……んんんっ<emoji=heart04>\u3000ふあぁっ、あぁんっ……私の中、会長さんのせーえきでいっぱいになっちゃうぅっ<emoji=heart04>」"
translation = "「아직, 나오고 있어…… 응응응<emoji=heart04> 후아앗, 아앙…… 내 안, 회장님 정액으로 가득 차버려어<emoji=heart04>」"

[[dialogue]]
speaker = "アイリーン"
original = "「はぁ……はあぁ……ミーちゃんの前でイッちゃったぁ……<emoji=heart04>」"
translation = "「하아…… 하아아…… 미짱 앞에서 가버렸어어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たっぷりと中に出した精液が膣口から溢れてくるのがいやらしい。"
translation = "듬뿍 안에 내보낸 정액이 질구에서 흘러넘쳐 오는 것이 야하다."

[[dialogue]]
speaker = "unk"
original = "絶頂の反動で脱力したアイリーンがもたれかかってくるが、全然重いとは感じなくて心地いいくらいだ。"
translation = "절정의 반동으로 탈력한 아이린이 기대어 오지만 전혀 무겁다고 느껴지지 않고 기분 좋을 정도다."

[[dialogue]]
speaker = "ミネルバ"
original = "「ホー？」"
translation = "「호?」"

[[dialogue]]
speaker = "unk"
original = "そして、ミーちゃんはきょとんとして首を捻っていた。"
translation = "그리고 미짱은 어리둥절해서 고개를 갸우뚱하고 있었다."

[[dialogue]]
speaker = "unk"
original = "やはり何をしていたのか理解できなかったらしい。"
translation = "역시 무엇을 하고 있었는지 이해하지 못한 모양이다."

[[dialogue]]
speaker = "アイリーン"
original = "「ミーちゃんを除け者にしようとしてごめんね。エッチする時は考えなきゃ」"
translation = "「미짱을 따돌리려고 해서 미안해. 섹스할 때는 생각 좀 해야겠어.」"

[[dialogue]]
speaker = "クロト"
original = "「俺も利用したみたいでごめんな」"
translation = "「나도 이용한 것 같아서 미안하네.」"

[[dialogue]]
speaker = "アイリーン"
original = "「そうだよー。もー、会長さんのイジワル」"
translation = "「맞아─. 정말, 회장님 심술쟁이.」"

[[dialogue]]
speaker = "unk"
original = "不機嫌そうにむくれるアイリーンもかわいい。"
translation = "불쾌한 듯 입을 삐죽거리는 아이린도 귀엽다."

[[dialogue]]
speaker = "unk"
original = "ちょっとやりすぎたお詫びも兼ねて、魔女の帽子越しに頭を撫でてあげる"
translation = "조금 과했던 사과의 의미도 담아 마녀의 모자 너머로 머리를 쓰다듬어 준다."

[[dialogue]]
speaker = "アイリーン"
original = "「むぅ～、そんなことしたって許さないもん」"
translation = "「무으~, 그런다고 해서 안 용서해 줄 거야.」"

[[dialogue]]
speaker = "unk"
original = "どうやって機嫌を取ろうか──などと考えていると、アイリーンが耳元でそっと囁く。"
translation = "어떻게 기분을 풀어줄까── 하고 생각하고 있자 아이린이 귓가에서 살며시 속삭인다."

[[dialogue]]
speaker = "アイリーン"
original = "「今度はちゃんと……２人きりでエッチしようね？」"
translation = "「다음엔 제대로…… 둘이서만 섹스하자?」"

