[[dialogue]]
speaker = "unk"
original = "１週間後、準備を終えた俺達は学園のハロウィンパーティー当日を迎えた。"
translation = "일주일 후, 준비를 마친 우리들은 학원의 할로윈 파티 당일을 맞이했다."

[[dialogue]]
speaker = "セナリィ"
original = "「トリックオアトリート♪\u3000さぁさ、寄ってらっしゃい、見てらっしゃい！」"
translation = "「트릭 오어 트릿♪ 자자 오세요, 구경하고 가세요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「学園の名パティシエ、桜十路サランの手による、ここでしか食べられない、ハロウィン特製カップケーキの販売ですわ～！」"
translation = "「학원의 명파티시에, 사쿠라코지 사란의 손으로 만든 여기서밖에 먹을 수 없는 할로윈 특제 컵케이크 판매 중이에요~!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「トリックオアトリート～♪\u3000お１つ５００テルスになります～。いかがですか～？」"
translation = "「트릭 오어 트릿~♪ 개당 500텔루스입니다~. 어떠신가요~?」"

[[dialogue]]
speaker = "サラン"
original = "「は～い、お１つですね～♪\u3000ありがとうございます～♪\u3000どうぞ～♪」"
translation = "「네~ 하나네요~♪ 감사합니다~♪ 여기요~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや～、繁盛してるね～。さすがは桜十路先輩のネームバリュー。お菓子の評判もどんどん広まって、飛ぶように売れていくよ」"
translation = "「이야~ 번창하네. 역시 사쿠라코지 선배의 네임 밸류. 과자 평판도 점점 퍼져서 불티나게 팔리고 있어.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ウフッ<emoji=heart04>\u3000ウフフフッ<emoji=heart04>\u3000笑いが止まらないとは、まさにこのことですわぁ～♪」"
translation = "「우후❤️ 우후후훗❤️ 웃음이 멈추지 않는다는 건 바로 이런 걸 말하는 거군요~♪」"

[[dialogue]]
speaker = "サラン"
original = "「みんなもお菓子食べて、美味しいって言ってくれて、ふわふわ～♪」"
translation = "「모두 과자 먹고 맛있다고 해줘서 둥실둥실해~♪」"

[[dialogue]]
speaker = "サラン"
original = "「これでセナリィちゃんも、ハロウィンの仮装ができてたら、もっとよかったんだけど～……」"
translation = "「여기에 세나리짱도 할로윈 가장을 할 수 있었다면 더 좋았을 텐데~……」"

[[dialogue]]
speaker = "セナリィ"
original = "「気にかけてくださり、ありがとうございますわ、サラン様。残念ながら、衣装は２着までが予算の限界でしたの」"
translation = "「신경 써주셔서 감사해요, 사란 님. 아쉽게도 의상은 두 벌까지가 예산의 한계였어요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「全く、私のじゃなく自分のを用意すればよかったのに……まあ、もしかすると、その分の予算を別のところに回したのかもしれないけど」"
translation = "「정말이지, 내 거 말고 본인 거를 준비했으면 좋았을 텐데…… 뭐, 어쩌면 그만큼의 예산을 다른 데로 돌렸을지도 모르겠지만.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふふ、それは秘密ですわ♪」"
translation = "「후후후, 그건 비밀입니다와♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「――おっと、そろそろ時間ですわね。マイン、サラン様。休憩に行ってきていいですわよ」"
translation = "「──앗, 슬슬 시간이네요. 마인, 사란 님. 휴식하러 다녀오셔도 괜찮아요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え？\u3000いや、お客さんはまだ沢山来てるから、もう少し落ち着いてからの方がいいんじゃない？」"
translation = "「에? 아니, 손님이 아직 많이 오고 있으니까 좀 더 진정된 다음에 하는 게 좋지 않아?」"

[[dialogue]]
speaker = "セナリィ"
original = "「別にこれくらい、戦場に飛び交う銃弾を捌くことに比べたら、どうってことありませんわ」"
translation = "「별로 이 정도는 전장에 빗발치는 총알을 쳐내는 것에 비하면 아무것도 아니에요」"

[[dialogue]]
speaker = "サラン"
original = "「それじゃあ、セナリィちゃん、会長ちゃん。せっかくだしサランたち、パーティー会場の中を見てまわってくるね～」"
translation = "「그럼 세나리짱, 회장짱. 기왕 왔으니 사란 일행은 파티 행사장 안을 구경하고 올게~♪」"

[[dialogue]]
speaker = "サラン"
original = "「行こっ♪\u3000マインちゃん」"
translation = "「가자♪ 마인짱.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あっ、ちょっと、桜十路先輩！？\u3000手を引っ張ってどこに――」"
translation = "「앗, 잠시만요, 사쿠라코지 선배!? 손을 잡아당기고 어디로──」"

[[dialogue]]
speaker = "セナリィ"
original = "「――さて。会長様には、宣伝の看板を持って会場内を周り、お客様の呼び込みをお願いしたいのですけれど、よろしいかしら？」"
translation = "「──그럼. 회장님께서는 홍보 간판을 들고 행사장 안을 돌며 손님 유치를 부탁드리고 싶은데 괜찮을까요?」"

[[dialogue]]
speaker = "unk"
original = "任された。行ってくるよ"
translation = "맡겨둬. 다녀올게."

[[dialogue]]
speaker = "ネーゼマイン"
original = "（なんか、桜十路先輩に引っ張られるまま付いてきちゃったけど……）"
translation = "(왠지 사쿠라코지 선배에게 끌려가는 대로 따라오고 말았는데……)"

[[dialogue]]
speaker = "サラン"
original = "「うん、ここら辺なら大丈夫かな。――ねぇ、マインちゃん、お願いがあるんだっ」"
translation = "「응, 이 근처라면 괜찮으려나. ──있지 마인짱, 부탁이 있어!」"

[[dialogue]]
speaker = "サラン"
original = "「サラン、会長ちゃんに悪戯をして、驚かせたいの～！」"
translation = "「사란, 회장짱에게 장난을 쳐서 놀래켜주고 싶어~!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「え？\u3000桜十路先輩がですか？\u3000なんでそんな……」"
translation = "「에? 사쿠라코지 선배가요? 왜 그런……」"

[[dialogue]]
speaker = "サラン"
original = "「だって、せっかくのハロウィンパーティーだし～♪\u3000やっぱり、トリックオアトリートを楽しみたいじゃない？」"
translation = "「그치만 모처럼 할로윈 파티인걸~♪ 역시 트릭 오어 트릿을 즐기고 싶지 않아?」"

[[dialogue]]
speaker = "サラン"
original = "「でもサラン、悪戯らしい悪戯って全然したことがないんだ～。だから、マインちゃんにやり方を教えて欲しいの～！」"
translation = "「하지만 사란, 장난다운 장난은 전혀 해본 적이 없단 말이야~. 그러니까 마인짱이 방법을 가르쳐 줬으면 좋겠어~!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……あ～、なるほど……そういうことですか」"
translation = "「……아~ 과연…… 그런 거였나요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「桜十路先輩、それ、セナリィの入れ知恵ですか？」"
translation = "「사쿠라코지 선배, 그거 세나리가 귀띔해 준 거죠?」"

[[dialogue]]
speaker = "サラン"
original = "「ええっ！？\u3000なんでわかったの～！？」"
translation = "「에엣!? 어떻게 알았어~!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あはは、反応が正直者ですね。そりゃあ分かりますよ～」"
translation = "「아하하, 반응이 참 정직하시네요. 그야 알 수밖에 없죠~.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「セナリィが休憩を出すタイミングが不自然でしたし、桜十路先輩も示し合わせたように私を連れ出しましたから」"
translation = "「세나리가 휴식을 주는 타이밍이 부자연스러웠고 사쿠라코지 선배도 짠 것처럼 저를 데리고 나왔으니까요.」"

[[dialogue]]
speaker = "サラン"
original = "「……あのね、実は、サランがセナリィちゃんに相談したの。どうしたらマインちゃんと仲良くなれるのかって……」"
translation = "「……저기 있지, 사실은 사란이 세나리짱한테 상담했어. 어떻게 하면 마인짱이랑 친해질 수 있을까 하고……」"

[[dialogue]]
speaker = "サラン"
original = "「ほら、マインちゃんとセナリィちゃんは、すごく仲が良いでしょう？」"
translation = "「봐봐, 마인짱이랑 세나리짱은 엄청 친하잖아?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「う～ん、セナリィとは仕事仲間っていうか……まぁ、属性が似てるって意味では合ってますけど……」"
translation = "「으~음, 세나리랑은 일 동료라고나 할까…… 뭐, 속성이 닮았다는 의미에선 맞긴 하지만……」"

[[dialogue]]
speaker = "サラン"
original = "「この間、マインちゃんと連絡先も交換したけど、セナリィちゃんと比べると、なんだか距離を感じるな～って……」"
translation = "「요전에 마인짱이랑 연락처도 교환했지만 세나리짱이랑 비교하면 왠지 거리가 느껴진다고 생각해서……」"

[[dialogue]]
speaker = "サラン"
original = "「セナリィちゃんにそのことを言ったら、一緒に『悪戯したらいいんじゃないか』って教えてもらったの～」"
translation = "「세나리짱한테 그 이야기를 했더니 같이 '장난치면 되지 않겠냐'고 알려줬어~」"

[[dialogue]]
speaker = "サラン"
original = "「マインちゃんなら、ハロウィンに必ず、会長ちゃんへの悪戯を仕掛けるだろうからって！」"
translation = "「마인짱이라면 할로윈에 반드시 회장짱에게 장난을 걸 테니까라면서!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「セナリィのやつぅ……これは後でお仕置き案件だな～」"
translation = "「세나리 이 녀석…… 이건 나중에 징벌 사안이네~.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ええと……桜十路先輩、期待に応えられなくて申し訳ないですが、悪戯の準備なんて別にしてなくてですね――」"
translation = "「저기…… 사쿠라코지 선배, 기대에 부응하지 못해 죄송하지만 장난칠 준비 같은 거 딱히 안 해둬서요──」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000これを使って悪戯をするんじゃないの？」"
translation = "「뽀요? 이걸 써서 장난치는 거 아니야?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「って、それは私のトラップ爆弾セット！？\u3000バスケットに入ってたはずなのに……いつの間にか中身がなくなってる！？」"
translation = "「아니, 그건 내 트랩 폭탄 세트!? 바구니에 들어있었을 텐데…… 어느새 내용물이 없어졌어!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「セナリィの仕業か……！\u3000あんにゃろ～……」"
translation = "「세나리 짓이군……! 이 녀석이 진짜~……」"

[[dialogue]]
speaker = "サラン"
original = "「うん、セナリィちゃんから渡されたの～。『会長専用』って書いてあるから、これで会長ちゃんに悪戯するってことで間違いないよね？」"
translation = "「응, 세나리짱한테 받았어~. '회장 전용'이라고 적혀있으니까 이걸로 회장짱한테 장난치는 거 맞지?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いやいや、だからって無理して悪戯に付き合う必要はないですよ？\u3000準備しといてなんですけど、悪戯っていいことではないですし……」"
translation = "「아니 아니, 그렇다고 무리해서 장난에 어울려줄 필요는 없다고요? 준비해두긴 했지만 장난이라는 게 좋은 일은 아니기도 하고……」"

[[dialogue]]
speaker = "サラン"
original = "「無理なんてしてないよ？\u3000サラン、悪戯とかしたことなかったから、楽しみでワクワクしてるんだ～♪」"
translation = "「무리 같은 거 안 해? 사란, 장난 같은 거 해본 적 없어서 기대돼서 두근두근해~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「桜十路先輩。１度落ち着いて、よく考えた方が……」"
translation = "「사쿠라코지 선배. 일단 진정하고 잘 생각하시는 게……」"

[[dialogue]]
speaker = "サラン"
original = "「いいから、いいから♪\u3000早くいこ～♪」"
translation = "「됐으니까 됐으니까♪ 빨리 가자~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ちょっ……待ってください！\u3000桜十路先輩！」"
translation = "「잠…… 기다려주세요! 사쿠라코지 선배!」"

[[dialogue]]
speaker = "サラン"
original = "「あっ、会長ちゃん、見つけた～♪\u3000こっち見てないから、気づかれてはいないよね？\u3000……よ～し！」"
translation = "「앗, 회장짱 찾았다~♪ 이쪽 안 보고 있으니까 들키지는 않았지? ……좋아!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「桜十路先輩、待った待った！\u3000トラップ爆弾にはいくつか種類があって……あぁ～！」"
translation = "「사쿠라코지 선배, 잠깐 잠깐! 트랩 폭탄에는 몇 가지 종류가 있어서…… 아아~!」"

[[dialogue]]
speaker = "サラン"
original = "「え～い♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker = "unk"
original = "ん！？\u3000なんかお尻にくっ付いた！？"
translation = "응!? 뭔가 엉덩이에 붙었어!?"

[[dialogue]]
speaker = "サラン"
original = "「わぁ～♪\u3000白い爆弾がお尻にくっ付いてる～♪\u3000ウサギちゃんの尻尾みたいで可愛い～♪」"
translation = "「와아~♪ 하얀 폭탄이 엉덩이에 붙었어~♪ 토끼짱 꼬리 같아서 귀여워~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「白いのはトリモチ爆弾ですね……一定時間経つと、粘着力が弱まって外れる仕組みで――」"
translation = "「하얀 건 끈끈이 폭탄이네요…… 일정 시간이 지나면 점착력이 약해져서 떨어지는 구조인데──」"

[[dialogue]]
speaker = "サラン"
original = "「え～い♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「って、また投げてる！？\u3000ちゃんと爆弾の仕組みを理解して、タイミングを計らないと、せっかくの面白い効果が……！」"
translation = "「아니 또 던지고 있어!? 제대로 폭탄 구조를 이해하고 타이밍을 맞춰야 모처럼의 재미있는 효과가……!」"

[[dialogue]]
speaker = "unk"
original = "なんか煙が！？\u3000……声が高くなった！？"
translation = "뭔가 연기가!? ……목소리가 높아졌어!?"

[[dialogue]]
speaker = "サラン"
original = "「あ～♪\u3000会長ちゃんの声が変になってる～♪」"
translation = "「아~♪ 회장짱 목소리가 이상해졌어~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それはヘリウム爆弾で……本当は誰かと話している時に悪戯すると、面白くなるやつなんです……！」"
translation = "「그건 헬륨 폭탄이라서…… 원래는 누구랑 이야기하고 있을 때 장난치면 재밌어지는 녀석이란 말이에요……!」"

[[dialogue]]
speaker = "サラン"
original = "「じゃあ、次は～」"
translation = "「그럼 다음은~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ああもう！\u3000桜十路先輩、ちゃんと使い方教えますから、こっちに渡してください！」"
translation = "「……아 정말! 사쿠라코지 선배, 제대로 사용법 가르쳐 줄 테니까 이쪽으로 넘겨주세요!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いいですか？\u3000この爆弾は、会長に向かって投げるんじゃなくて、こう使うんですよ……それっ！」"
translation = "「잘 보세요? 이 폭탄은 회장에게 던지는 게 아니라 이렇게 쓰는 거예요…… 자!」"

[[dialogue]]
speaker = "サラン"
original = "「会場の上に向かって……？\u3000なんか雲ができてる……？\u3000あっ、雨が降ってきた～！」"
translation = "「행사장 위를 향해서……? 뭔가 구름이 생기고 있어……? 앗, 비가 내리기 시작했다~!」"

[[dialogue]]
speaker = "unk"
original = "うわっ！？\u3000なんで俺にだけ雨が～！？"
translation = "우왓!? 왜 나한테만 비가~!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひっ！\u3000会長ってば、慌ててる慌ててる♪\u3000今投げたのは、雨雲爆弾で、会長を追跡して一定時間雨を降らす爆弾なんですよ～」"
translation = "「니히힛! 회장도 참 당황하고 있네 당황하고 있어♪ 지금 던진 건 비구름 폭탄이라서 회장을 추적해 일정 시간 비를 내리게 하는 폭탄이에요~」"

[[dialogue]]
speaker = "サラン"
original = "「わ～、すご～い♪\u3000面白～い♪\u3000他にはどんな爆弾があるの～？」"
translation = "「와~ 대단해~♪ 재밌어~♪ 다른 건 어떤 폭탄이 있어~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「やれやれ、仕方ないですね。他には～♪」"
translation = "「이런 이런 어쩔 수 없네요. 다른 건~♪」"

[[dialogue]]
speaker = "unk"
original = "見～つ～け～た～ぞ～！"
translation = "찾~았~다~! "

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ」"
translation = "「아.」"

[[dialogue]]
speaker = "サラン"
original = "「会長ちゃんにバレちゃった～♪」"
translation = "「회장짱한테 들켜버렸다~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「逃げますよ！\u3000桜十路先輩！」"
translation = "「도망쳐요! 사쿠라코지 선배!」"

[[dialogue]]
speaker = "サラン"
original = "「は～い♪\u3000わかった～！」"
translation = "「네~이♪ 알겠어~!」"

[[dialogue]]
speaker = "unk"
original = "こらぁぁぁ！\u3000２人とも、待てーーー！"
translation = "이봐아아아! 둘 다 거기 서ーーー!"

[[dialogue]]
speaker = "unk"
original = "その後、罠爆弾を駆使しながら、ネーゼマインとサランは逃げ切ることに成功した。"
translation = "그 후 함정 폭탄을 구사하며 네제마인과 사란은 도망치는 데 성공했다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「まさか、私が桜十路先輩の手を引っ張って、逃げることになるとは……」"
translation = "「설마 내가 사쿠라코지 선배의 손을 잡아끌고 도망치게 될 줄이야……」"

[[dialogue]]
speaker = "サラン"
original = "「なんとか逃げ切ったね～♪\u3000あ～、悪戯面白かった～♪」"
translation = "「어떻게든 다 도망쳤네~♪ 아~ 장난 재밌었다~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……先輩は、こういうことはしたがらないって思ってましたよ」"
translation = "「……선배는 이런 일은 하고 싶어 하지 않을 거라고 생각했거든요.」"

[[dialogue]]
speaker = "サラン"
original = "「ぽよ？\u3000そんなことないよ～？\u3000マインちゃんが言ってたみたいに、周りからよくダメだって止められちゃうだけで……」"
translation = "「뽀요? 그렇지 않아~? 마인짱이 말했던 것처럼 주변에서 자주 안 된다고 말릴 뿐이지……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「あ～、それはよくわかるかも。先輩、ふわふわしてて危なっかしいっていうか……」"
translation = "「아~ 그건 잘 알 것 같기도. 선배 둥실둥실해서 위태롭달까……」"

[[dialogue]]
speaker = "サラン"
original = "「あ～。それ、よく言われる～♪」"
translation = "「아~ 그거 자주 듣는 소리야~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「よく言われるって……にひっ……にひひっ♪」"
translation = "「자주 듣는 소리라니…… 니힛…… 니히히♪」"

[[dialogue]]
speaker = "サラン"
original = "「えへっ……えへへっ♪」"
translation = "「에헷…… 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "なんだかおかしくなって、笑い合ってしまう２人なのだった。"
translation = "왠지 우스워져서 서로 웃어버리는 두 사람이었다."

