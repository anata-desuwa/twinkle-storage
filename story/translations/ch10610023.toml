[[dialogue]]
speaker = "unk"
original = "第３話,服飾職人は惹かれ合う,P"
translation = "제3화, 복식 장인은 서로 끌린다"

[[dialogue]]
speaker = "マリオン"
original = "「こんにちは、新星星徒会の皆様方。改めまして、マリオン・ネイマールです」"
translation = "「안녕하세요, 신성학생회 여러분. 다시 한번, 마리온 네이마르입니다」"

[[dialogue]]
speaker = "unk"
original = "ネビュラと星見家や流星学園間の連絡係として、星見家に再雇用されたマリオン。"
translation = "네뷸라와 호시미 가문 및 유성 학원 사이의 연락책으로서, 호시미 가문에 재고용된 마리온."

[[dialogue]]
speaker = "unk"
original = "今日は挨拶がてら新星星徒会を訪れていた。"
translation = "오늘은 인사차 신성 학생회를 방문 중이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「マリオンは正式に星見家のメイドとして復帰したのよね？」"
translation = "「마리온은 정식으로 호시미 가문의 메이드로 복귀한 거지?」"

[[dialogue]]
speaker = "マリオン"
original = "「はい。私のような者を再雇用していただけるなんて、フィオナお嬢様の懐の深さには感謝しております」"
translation = "「네. 저 같은 사람을 재고용해 주시다니, 피오나 아가씨의 넓은 도량에는 감사하고 있습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「お客さんなんだし、マリオンは寛いでていいわよ」"
translation = "「손님이니까, 마리온은 편히 쉬어도 돼」"

[[dialogue]]
speaker = "マリオン"
original = "「いえいえお構いなく。むしろ私は皆様のお世話をさせていただきたいくらいです」"
translation = "「아뇨아뇨, 신경 쓰지 마세요. 오히려 저는 여러분을 수발들고 싶을 정도인걸요」"

[[dialogue]]
speaker = "マリオン"
original = "「そうです、会長様。使者としてではなく、私個人としてのご提案なのですが」"
translation = "「그렇습니다, 회장님. 사절로서가 아니라, 제 개인적인 제안입니다만」"

[[dialogue]]
speaker = "マリオン"
original = "「私が服作りを趣味としているのは、会長様もご存じだと思いますが、会長様を想って作成した衣装がクローゼットにたくさん溜まってしまいまして……」"
translation = "「제가 옷 만들기를 취미로 삼고 있는 건 회장님도 알고 계시겠지만, 회장님을 생각하며 만든 의상이 옷장에 잔뜩 쌓여버려서……」"

[[dialogue]]
speaker = "マリオン"
original = "「よろしければ、一度、着てみてはいただけませんでしょうか？\u3000もちろん無理強いは致しませんが……」"
translation = "「괜찮으시다면, 한번 입어봐 주시지 않겠습니까? 물론 억지로 강요하지는 않겠습니다만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へぇ～！\u3000面白そうじゃない。クロト、着てあげたら？」"
translation = "「헤에~! 재밌겠는데. 쿠로토, 입어주지 그래?」"

[[dialogue]]
speaker = "美鶴"
original = "「ちょい待ち。話は聞かせてもらいました」"
translation = "「잠깐 대기. 이야기는 다 들었어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら、美鶴。お弁当を届けてくれたの？」"
translation = "「어라, 미츠루. 도시락을 배달해 준 거야?」"

[[dialogue]]
speaker = "美鶴"
original = "「あ、はい、お嬢様。こちら今日のお弁当です」"
translation = "「아, 네, 아가씨. 여기 오늘의 도시락입니다」"

[[dialogue]]
speaker = "美鶴"
original = "「それはそれとして──うちも会長さんに似合いそうなコス、何着か作ってんだけどさ。一度、着せてみたかったんだよね」"
translation = "「그건 그렇고── 우리 쪽도 회장님한테 어울릴 법한 코스프레 의상을 몇 벌 만들어 뒀거든. 한번 입혀보고 싶었단 말이지」"

[[dialogue]]
speaker = "unk"
original = "２人して、何やってんの？"
translation = "둘이서 뭐 하는 거야?"

[[dialogue]]
speaker = "美鶴"
original = "「そう言われてもね。会長さんを見てると、作り手の血が騒ぐんすよ」"
translation = "「그렇게 말해도 말이야. 회장님을 보고 있으면 만드는 사람의 피가 끓어오른다니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「わかります、わかります。会長様にはそうしたくなる『何か』があるんですよね」"
translation = "「알아요, 알아. 회장님에게는 그렇게 하고 싶어지게 만드는 『무언가』가 있죠」"

[[dialogue]]
speaker = "美鶴"
original = "「服作るのは人様と競うものじゃないとは思うんすけどね。相手がマリオンさんなら、ちょいと話は別」"
translation = "「옷을 만드는 건 남과 경쟁하는 게 아니라고 생각은 합니다만. 상대가 마리온 씨라면 이야기가 좀 다르지」"

[[dialogue]]
speaker = "美鶴"
original = "「マリオンさん、うちのメイド隊のヨミーとかせつなにちょっかい出してたっしょ？」"
translation = "「마리온 씨, 우리 메이드대의 요미나 세츠나한테 집적거렸었지?」"

[[dialogue]]
speaker = "マリオン"
original = "「ちょっかいだなんて、そんな。楽しくお話をしていただけですよ。ヨミ様もせつな様も嫌がっているようには見えませんでしたけど？」"
translation = "「집적거리다니 당치도 않아요. 즐겁게 대화를 나눴을 뿐이랍니다. 요미 님도 세츠나 님도 싫어하는 것처럼 보이진 않았는데요?」"

[[dialogue]]
speaker = "美鶴"
original = "「それがマリオンさんの手口なんでしょ。うちの子らにナンパすんの、やめてもらっていいかな」"
translation = "「그게 마리온 씨의 수법이잖아. 우리 애들 꼬시는 거, 그만 좀 해줄래?」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ。お可愛い女の子と話すのを禁じられるなんて、私にとって呼吸をするなというようなもの。私、死んでしまいます」"
translation = "「이런 이런. 귀여운 여자아이와 대화하는 걸 금지당하는 건, 제게 숨을 쉬지 말라는 것과 마찬가지. 저, 죽어버려요」"

[[dialogue]]
speaker = "美鶴"
original = "「それなら、ちょうどいい決め方があるじゃん。うちもマリオンさんも服飾のエキスパート。──ってことはさ」"
translation = "「그럼 딱 좋은 결정 방법이 있잖아. 우리도 마리온 씨도 복식 전문가. ──그렇다는 건 말이야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「面白いわね！\u3000クロトのファッションショーで勝負といきましょう！」"
translation = "「재밌겠네! 쿠로토의 패션쇼로 승부를 보자고!」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふ、しかしただのファッションショーではありませんよね、美鶴様」"
translation = "「후후, 하지만 평범한 패션쇼는 아니겠죠, 미츠루 님?」"

[[dialogue]]
speaker = "美鶴"
original = "「うん。どうやら作り手は惹かれ合い、その発想も同じになるみたいすね」"
translation = "「응. 아무래도 제작자끼리는 서로 끌리는 법이라, 발상도 똑같아지는 모양이네」"

[[dialogue]]
speaker = "マリオン"
original = "「それでは──」"
translation = "「그럼──」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様の女装ファッションショー、開幕でーーーす♪」"
translation = "「회장님의 여장 패션쇼, 개막입니~~~다♪」"

[[dialogue]]
speaker = "unk"
original = "なんで女装ーーーーっ！！？！？"
translation = "왜 여장이야~~~~!!?!?"

[[dialogue]]
speaker = "unk"
original = "こうして、俺の意志を完全に無視した女の闘いの火蓋が切って落とされたのである。"
translation = "이렇게 해서, 내 의지는 완전히 무시된 여자들의 싸움의 서막이 올랐던 것이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「まずはウェイトレスからね！\u3000定番だけど定番ゆえの良さがあるわね！\u3000これはどっちの作品かしら」"
translation = "「우선은 웨이트리스부터네! 전형적이지만 전형적이기에 좋은 점이 있지! 이건 어느 쪽 작품일까?」"

[[dialogue]]
speaker = "美鶴"
original = "「うちのです。フリルを全身に施しながらも、下品にならないバランスに苦労しました」"
translation = "「저희 쪽 겁니다. 전신에 프릴을 넣으면서도, 저질스럽지 않게 균형을 맞추느라 고생 좀 했죠」"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあまあ……会長様、なんてお可愛らしい……<emoji=heart04>\u3000はっ、いけません、お次は私の衣装を」"
translation = "「어머 어머 어머…… 회장님, 어쩜 이리 사랑스러우신지……❤️ 핫, 안 되지, 다음은 제 의상을」"

[[dialogue]]
speaker = "マリオン"
original = "「私の作品はメイド服！\u3000クラシカルさとモダンさを兼ね備えた一品です♪」"
translation = "「제 작품은 메이드복! 고전미와 현대미를 겸비한 일품입니다♪」"

[[dialogue]]
speaker = "美鶴"
original = "「くっ……メイドなんて見慣れてると思ったけど、九浄家と星見家のメイド服のいいとこ取り……しかも、会長さんにチョー似合ってるし……やるじゃん」"
translation = "「큭…… 메이드 따위 질리도록 봤다고 생각했는데, 쿠죠 가문과 호시미 가문 메이드복의 장점만 쏙쏙 골라냈어…… 게다가 회장님한테 더럽게 잘 어울리고…… 제법인데」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さ、次々行くわよ！\u3000クロト、ちゃっちゃと着替えて！」"
translation = "「자, 계속 가자고! 쿠로토, 얼른얼른 갈아입어!」"

[[dialogue]]
speaker = "美鶴"
original = "「チアガール！\u3000看護師！\u3000サンタ水着！」"
translation = "「치어걸! 간호사! 산타 수영복!」"

[[dialogue]]
speaker = "マリオン"
original = "「巫女！\u3000ウェディングドレス！\u3000魔法少女！」"
translation = "「무녀! 웨딩드레스! 마법 소녀!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんだかんだ言いながらも着こなしているクロトが凄いわね！\u3000そんじょそこらの女の子より、ずっと可愛いわ！」"
translation = "「투덜거리면서도 다 소화해 내는 쿠로토가 대단하네! 웬만한 여자애들보다 훨씬 귀여워!」"

[[dialogue]]
speaker = "unk"
original = "もうどうにでもな～れ♪"
translation = "이제 어떻게든 돼~라♪"

[[dialogue]]
speaker = "unk"
original = "なんで着ちゃってるんだろう……"
translation = "왜 입고 있는 걸까……"

[[dialogue]]
speaker = "マリオン"
original = "「ふふっ……会長様の魅力を十全に引き出している……なかなかやりますね、美鶴様」"
translation = "「후후…… 회장님의 매력을 충분히 끌어내고 있네요…… 제법 하시는데요, 미츠루 님」"

[[dialogue]]
speaker = "美鶴"
original = "「マリオンさんの魔法少女コスもさすがだね。うちも発想はあったけど、形にはできなかった」"
translation = "「마리온 씨의 마법 소녀 코스프레도 역시네. 나도 생각은 있었는데 형태로 만들지는 못했어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うう～ん、どっちも甲乙つけがたいわね！\u3000最後はクロトに決めてもらいましょ！」"
translation = "「으음~, 둘 다 우열을 가리기 힘드네! 마지막은 쿠로토가 결정하게 하자!」"

[[dialogue]]
speaker = "unk"
original = "恥辱にまみれた決戦投票は、俺に委ねられた。"
translation = "치욕으로 점철된 결선 투표는 내게 맡겨졌다."

[[dialogue]]
speaker = "unk"
original = "マリオンの方がフィット感が完璧だった"
translation = "마리온 쪽이 핏감이 완벽했다"

[[dialogue]]
speaker = "unk"
original = "勝者は……マリオン！"
translation = "승자는…… 마리온!"

[[dialogue]]
speaker = "美鶴"
original = "「ちぇ、うちの負けか」"
translation = "「체, 내가 졌나」"

[[dialogue]]
speaker = "マリオン"
original = "「ふふふ、会長様のお傍で、微に入り細を穿つように、会長様をじ～っくり観察してきましたから」"
translation = "「후후후, 회장님 곁에서 아주 사소한 부분까지 샅샅이 파고들 듯이 회장님을 지~긋이 관찰해 왔으니까요」"

[[dialogue]]
speaker = "マリオン"
original = "「会長様の丈、似合う色やデザイン……世界で一番、誰よりも理解っているつもりですよ」"
translation = "「회장님의 치수, 어울리는 색상과 디자인…… 세상에서 가장, 그 누구보다도 잘 알고 있답니다」"

[[dialogue]]
speaker = "美鶴"
original = "「単に趣味で作ってたうちとは熱意が違ったってわけだ。そこまで会長さんを思ってるなら本物だね。降参。うちの負けを認めるよ」"
translation = "「단순히 취미로 만들던 나랑은 열의가 달랐다는 거네. 그 정도로 회장님을 생각한다면 진짜야. 항복. 내 패배를 인정할게」"

[[dialogue]]
speaker = "マリオン"
original = "「では、敗者には罰ゲームと参りましょう<emoji=heart04>\u3000美鶴様にはこちらの衣装を着てもらいましょうか」"
translation = "「그럼 패자에게는 벌칙 게임을 하도록 하죠❤️ 미츠루 님께는 이 의상을 입어주실까요」"

[[dialogue]]
speaker = "美鶴"
original = "「いや、罰ゲームは聞いてないし。つか、衣装って……ほとんど布ないじゃん。これって逆バニー？」"
translation = "「아니, 벌칙 게임은 못 들었거든. 그보다 의상 상태가…… 천이 거의 없잖아. 이거 리버스 바니야?」"

[[dialogue]]
speaker = "美鶴"
original = "「ま、仕方ないね。作り手として負けた以上、このくらいの辱めは甘んじて受け入れるよ」"
translation = "「뭐, 어쩔 수 없네. 제작자로서 패배한 이상, 이 정도의 굴욕은 달게 받아들이겠어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「作り手としてのプライドが高いわね！」"
translation = "「제작자로서의 자부심이 높네!」"

[[dialogue]]
speaker = "unk"
original = "受け入れないでいいからね！？"
translation = "안 받아들여도 되니까!?"

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、会長様ストップがかかってしまったのなら諦めざるを得ませんね。美鶴様の艶姿、見られなくて残念です」"
translation = "「이런 이런, 회장님이 제지하신다면 포기할 수밖에 없겠네요. 미츠루 님의 요염한 모습, 보지 못해서 아쉽습니다」"

[[dialogue]]
speaker = "マリオン"
original = "「大きな勝利を飾ったことで満足するとして……では、逆バニーはいずれ、会長様に着ていただきましょうか♪」"
translation = "「큰 승리를 거둔 것으로 만족하기로 하고…… 그럼, 리버스 바니는 조만간 회장님이 입어주실까요♪」"

[[dialogue]]
speaker = "美鶴"
original = "「なにそれ見たい」"
translation = "「뭐야 그거 보고 싶어」"

[[dialogue]]
speaker = "unk"
original = "絶対着ません！！！"
translation = "절대 안 입습니다!!!"

[[dialogue]]
speaker = "unk"
original = "今回のファッションショーの真の敗者は──"
translation = "이번 패션쇼의 진정한 패배자는──"

[[dialogue]]
speaker = "unk"
original = "男としてのプライドを傷つけられまくった、俺なのであった……"
translation = "남자로서의 자존심을 난도질당한 나였던 것이다……"

