[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「次は私との花婿修行に参りましょう──<b>旦那様</b>」"
translation = "「다음은 저와의 신랑 수업에 들어갑죠── <b>서방님</b>.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「旦那様！？」"
translation = "「서방님!?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「今は夫婦なのですから、そうお呼びするのが自然でしょう」"
translation = "「지금은 부부니까 그렇게 부르는 게 자연스럽겠죠.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「う、うん。そうだよね……」"
translation = "「으, 응. 그렇네……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（でもキリカが旦那様って言うと……ううん、緋宮会長が旦那様って呼ばれると、胸がモヤモヤするような……）"
translation = "(하지만 키리카가 서방님이라고 하면…… 으응, <u>히노미야</u> 회장이 서방님이라고 불리면 가슴이 술렁거리는 듯한……)"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私の花婿修行は子育てです」"
translation = "「제 신랑 수업은 육아입니다.」"

[[dialogue]]
speaker = "unk"
original = "子育て！？"
translation = "육아!?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「こ、こ、子作りなんてハレンチです！」"
translation = "「애, 애, 애 만들기는 파렴치합니다!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「子作りではなく子育てですよ、ナミエル」"
translation = "「애 만들기가 아니라 육아예요, 나미엘.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あ……。コホン、失礼いたしました」"
translation = "「아……. 큼큼, 실례했습니다.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「もちろん、本当に伴侶となるのであれば、子作りについても学びが必要でしょうが」"
translation = "「물론 정말로 반려가 된다면 애 만들기에 대해서도 배움이 필요하겠지만요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ぴやっ！？」"
translation = "「삐얏!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ナミエルが真っ赤になってる！？\u3000キリカ、ちょっと冗談が過ぎるよ……」"
translation = "「나미엘이 새빨개졌어!? 키리카, 좀 농담이 지나쳐……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「冗談ではなかったのですが……失礼しました。言葉には気を付けます」"
translation = "「농담은 아니었습니다만…… 실례했습니다. 말조심하죠.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもどうして子育てなの？」"
translation = "「근데 어째서 육아야?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「上月家は代々星見家に仕えてきました。つまり跡取りが必要です。よって私の伴侶となる者には、子育ても担っていただかなくてはなりません」"
translation = "「코즈키 가문은 대대로 호시미 가문을 섬겨왔습니다. 즉 후계자가 필요하죠. 따라서 제 반려가 될 자는 육아도 담당해 주셔야 합니다.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私も知識こそあれ、実際に育児の経験はありません。共に学びましょう、旦那様」"
translation = "「저도 지식은 있으나 실제로 육아를 해본 경험은 없습니다. 함께 배웁시다, 서방님.」"

[[dialogue]]
speaker = "unk"
original = "は、はい……"
translation = "네, 네……"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「子育てとはいえ、子どもが生まれる前から夫は責務を負います。妊娠中の妻を支えなくてはいけません」"
translation = "「육아라고는 해도 아이가 태어나기 전부터 남편은 책무를 집니다. 임신 중인 아내를 지탱해야 하죠.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「女性は妊娠すると、日に日にお腹が大きくなっていきます。当然、お腹の中にいる子どもが育てば育つほど、妊婦は動きが取りづらくなります」"
translation = "「여성은 임신하면 나날이 배가 불러옵니다. 당연히 뱃속에 있는 아이가 자랄수록 임산부는 몸을 움직이기 힘들어집니다.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「それにつわりや食欲の増減、匂いに敏感になるなど、体に様々な変化が訪れます。初めての子でしたら、不安はなおさら大きいでしょう」"
translation = "「거기에 입덧이나 식욕의 증감, 냄새에 민감해지는 등 몸에 다양한 변화가 찾아옵니다. 첫 아이라면 불안은 더욱 크겠죠.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そんな時、一番近くにいて妻を支えられるのが、夫であるあなたなのです」"
translation = "「그럴 때 가장 가까이서 아내를 지탱해 줄 수 있는 것이 남편인 당신입니다.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「男性は妊娠しないので、女性の悩みを完全に理解することはできません。それでも妻の心情を想像し、気遣えるかが、良い夫の分れ目なのでしょう」"
translation = "「남성은 임신하지 않으므로 여성의 고민을 완전히 이해할 수는 없습니다. 그래도 아내의 심정을 상상하고 배려할 수 있느냐가 좋은 남편의 갈림길이겠죠.」"

[[dialogue]]
speaker = "unk"
original = "たとえば代わりに家事をしたりとか"
translation = "예를 들어 대신 집안일을 한다거나"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そうですね。元々自分の分担でなくとも、食器を洗う、掃除をするなど、小さな気遣いの積み重ねも大事なのだと思います」"
translation = "「그렇죠. 원래 자기 분담이 아니더라도 설거지를 하거나 청소를 하는 등 작은 배려의 축적도 중요하다고 생각합니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（緋宮会長と子どもを……うぅ……想像するだけで頭が爆発しそうです……）"
translation = "(<u>히노미야</u> 회장님과 아이를…… 으으…… 상상하는 것만으로 머리가 폭발할 것 같아요……)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（真面目な内容なのに、子どもができたらっていう話をしてると、なぜか恥ずかしくなっちゃう……）"
translation = "(진지한 내용인데 아이가 생기면 어쩌나 하는 이야기를 하니 왠지 부끄러워져……)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（緋宮会長は……いや緋宮会長と結婚するとは決まってないけど……もし私が妊娠したら、何をしてくれるかな……？）"
translation = "(<u>히노미야</u> 회장은…… 아니 <u>히노미야</u> 회장과 결혼한다고 결정된 건 아니지만…… 만약 내가 임신하면 뭘 해줄까……?)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもさすがキリカだね。恥ずかしがらずに──」"
translation = "「하지만 역시 키리카네. 부끄러워하지 않고──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「本当は恥ずかしい？」"
translation = "「사실은 부끄러워?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「い、いえ。必要なことを伝えているだけですから、恥ずかしがることなど……」"
translation = "「아, 아니요. 필요한 것을 전달하고 있을 뿐이니 부끄러워할 것까진……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「キリカの子どもだったら、きっと美人になるんだろうなぁ～」"
translation = "「키리카의 아이라면 분명 미인이 되겠지~」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "（顔がもっと赤くなった……！）"
translation = "(얼굴이 더 빨개졌다……!)"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お、お嬢様、からかわないでください……」"
translation = "「아, 아가씨, 놀리지 마십시오……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ごめんごめん。顔を赤くしてるキリカが珍しかったから、ついね」"
translation = "「미안 미안. 얼굴을 붉히는 키리카가 희귀해서 나도 모르게.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「コホン。ここに育児の練習用の人形を用意しました。標準的な新生児の大きさをしています。こちらで着替えやオムツを替える練習をしましょう」"
translation = "「큼큼. 여기에 육아 연습용 인형을 준비했습니다. 표준적인 신생아 크기입니다. 이걸로 옷 갈아입히기나 기저귀를 가는 연습을 하죠.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……そうです。やはり手際がいいですね。旦那様は良い父親になりそうです」"
translation = "「……그렇습니다. 역시 손놀림이 좋으시네요. 서방님은 좋은 아버지가 될 것 같습니다.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私と緋宮会長の子はどんな子になるのでしょうか。あなたと私の子ですから、星騎士になったらきっと拳で戦うのでしょうね。上月神闘流も継承させなくては」"
translation = "「저와 <u>히노미야</u> 회장의 아이는 어떤 아이가 될까요. 당신과 저의 아이니까 성기사가 된다면 분명 주먹으로 싸우겠죠. 코즈키 신투류도 계승시켜야겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "それも子育てに入るんですか！？"
translation = "그것도 육아에 들어가는 건가요!?"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「星見家の方々の護衛も必要ですから。もちろん、私たちの子どもに才があればの話ですが」"
translation = "「호시미 가문 분들의 호위도 필요하니까요. 물론 우리 아이에게 재능이 있다면의 이야기입니다만.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「でもきっと大丈夫でしょう。私と旦那様の子どもですから」"
translation = "「하지만 분명 괜찮을 겁니다. 저와 서방님의 아이니까요.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「次はミルクです。哺乳瓶はよく洗って消毒してください。粉ミルクを入れ、沸騰後少し冷ましたお湯を注ぎます」"
translation = "「다음은 우유입니다. 젖병은 잘 씻어서 소독해 주십시오. 분유를 넣고 끓인 뒤 조금 식힌 물을 붓습니다.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そのままでは熱いですから、必ず人肌くらいに冷ましてください。飲ませ方も人形で練習してみましょうか」"
translation = "「그대로는 뜨거우니까 반드시 체온 정도로 식혀야 합니다. 먹이는 법도 인형으로 연습해 볼까요.」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「赤ちゃんを横抱きにして……そうです、その抱き方です。ふふ。なんだか優しい手つきですね」"
translation = "「아기를 가로로 안고…… 그렇습니다, 그 안는 법이에요. 후후. 왠지 다정한 손길이군요.」"

[[dialogue]]
speaker = "unk"
original = "この子は俺とキリカ師匠の子どもですから"
translation = "이 아이는 저와 키리카 스승님의 아이니까요"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「──！？\u3000そ、そうですね……私たちの子ども……」"
translation = "「──!? 그, 그렇군요…… 우리 아이……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「これなら子どもが生まれても大丈夫ですね。頼もしいです、旦那様」"
translation = "「이 정도면 아이가 태어나도 괜찮겠네요. 듬직합니다, 서방님.」"

