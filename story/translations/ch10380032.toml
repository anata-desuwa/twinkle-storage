[[dialogue]]
speaker = "unk"
original = "第２話,妄想天使と恋をもう１度,P"
translation = "제2화, 망상 천사와 사랑을 다시 한 번, P"

[[dialogue]]
speaker = "unk"
original = "その日は街にモンスターが出現し、他のプリマステラがモンスターと交戦。そこへ俺とイクシーも駆け付けて、加勢することになった。"
translation = "그날은 거리에 몬스터가 출현하여, 다른 프리마스텔라가 몬스터와 교전. 그곳에 나와 익시도 달려가, 가세하게 되었다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「集中一閃――はあぁっ！」"
translation = "「집중일섬――하아앗!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ギアーーズッ！？」"
translation = "「기아아아악!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ふぅ……どうやら、これで終わりみたいですね」"
translation = "「후우…… 아무래도, 이걸로 끝인 모양이네요」"

[[dialogue]]
speaker_original = "星騎士女子Ａ"
speaker_translation = "성기사 여학생 A"
original = "「す、すごい……！\u3000イクシリオンさん、敵の攻撃をギリギリで避けながら、あっという間に全部仕留めちゃった……！」"
translation = "「와, 대단해……! 익실리온 씨, 적의 공격을 아슬아슬하게 피하면서 순식간에 전부 해치워 버렸어……!」"

[[dialogue]]
speaker_original = "星騎士女子Ｂ"
speaker_translation = "성기사 여학생 B"
original = "「しかも、それぞれ一撃で全部仕留めてる……！\u3000前から実力ある星騎士だったけど、動きのキレが見違えるように上がってるよ……！」"
translation = "「게다가, 각각 일격으로 전부 해치웠어……! 전부터 실력 있는 성기사였지만, 움직임의 날카로움이 몰라보게 좋아졌어……!」"

[[dialogue]]
speaker_original = "星騎士女子Ｃ"
speaker_translation = "성기사 여학생 C"
original = "「真面目で清楚で、あんなに可愛いバレンタインフォームでしかも強いなんて、イクシリオンさんってやっぱり優等生……！」"
translation = "「성실하고 청초하고, 저렇게 귀여운 발렌타인 폼인데다 강하기까지 하다니, 익실리온 씨는 역시 우등생……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「会長、戦闘お疲れさまでした。他の星騎士の方々を確認して参りましたが、みなさん特に怪我もなく、無事のようです」"
translation = "「회장님, 전투 수고하셨습니다. 다른 성기사분들을 확인하고 왔습니다만, 모두 특별히 부상도 없이 무사한 듯합니다」"

[[dialogue]]
speaker = "unk"
original = "イクシー、すごい大活躍だったな！"
translation = "익시, 정말 대활약이었어!"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、ありがとうございます……<emoji=heart04>\u3000会長が毎日訓練に付き合って下さってるおかげで、バレンタインフォームの能力も大分制御できるようになってきました」"
translation = "「아, 감사합니다……<emoji=heart04> 회장님이 매일 훈련을 도와주시는 덕분에, 발렌타인 폼의 능력도 상당히 제어할 수 있게 되었어요」"

[[dialogue]]
speaker = "unk"
original = "イクシーのバレンタインフォームは、聞けば覚醒当初『妄想に強制トリップしてしまう』という大きな問題を抱えていたらしい。"
translation = "익시의 발렌타인 폼은, 듣자 하니 각성 당초 『망상으로 강제 트립해 버린다』는 큰 문제를 안고 있었다고 한다."

[[dialogue]]
speaker = "unk"
original = "しかし彼女はそれを訓練で克服し、短期間で『集中力を極限まで研ぎ澄ます』能力へと昇華させていた。我が彼女ながら、星騎士としてすごい才能の持ち主だと感心させられる。"
translation = "하지만 그녀는 그것을 훈련으로 극복하고, 단기간에 『집중력을 극한까지 갈고닦는』 능력으로 승화시키고 있었다. 내 여자친구지만, 성기사로서 대단한 재능의 소유자라고 감탄하게 된다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……おや？\u3000会長、もしやどこかお怪我をされているのでは？」"
translation = "「……어라? 회장님, 혹시 어디 다치신 건 아닌가요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「だとしたらいけません！\u3000１度上着を脱いで、見せて頂いても……いえ、ここには他の方もいらっしゃるので、人のいない場所に移動しましょう」"
translation = "「그렇다면 안 돼요! 한 번 겉옷을 벗고, 보여주셔도…… 아니, 여기에는 다른 분들도 계시니까, 사람이 없는 곳으로 이동하죠」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ハッ――！？\u3000い、いえ、違います！\u3000これは別に人気のない路地に会長を連れ込んで、外でハレンチなことに及ぼうとしたわけでは……！」"
translation = "「핫――!? 아, 아니요, 아니에요! 이건 딱히 인적 없는 골목으로 회장님을 끌어들여서, 밖에서 파렴치한 짓을 하려던 게 아니라……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「って！\u3000あわわわっ！？\u3000私は何をテンパって恥ずかしいことを口にして……！\u3000し、失礼しました！\u3000今のは忘れて下さい！」"
translation = "「앗! 아와와왓!? 제가 무슨 정신으로 부끄러운 소리를 입에 담아서……! 죄, 죄송합니다! 방금 건 잊어주세요!」"

[[dialogue]]
speaker = "unk"
original = "なんか、懐かしいやり取りだ……"
translation = "왠지, 그리운 대화다……"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「え？\u3000――私と会長が初めて会った時みたい？\u3000い、言われてみれば……！」"
translation = "「에? ――저와 회장님이 처음 만났을 때 같다고요? 드, 듣고 보니……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「私は、あの時も会長と会えたのが嬉しくて、ちゃんとしているところを見せようとテンパってしまって……」"
translation = "「저는, 그때도 회장님과 만난 게 기뻐서, 제대로 된 모습을 보여주려다 당황해 버려서……」"

[[dialogue]]
speaker = "unk"
original = "え？"
translation = "응?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「い、いえ！\u3000なんでもありません！」"
translation = "「아, 아니요! 아무것도 아니에요!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そ、そういえば、初めて会った時はコンビニに寄って、買い食いをしましたね……」"
translation = "「그, 그러고 보니, 처음 만났을 때는 편의점에 들러서, 군것질을 했었죠……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（今思い返すと、あの時は会長の前でソーセージを沢山頬張ってしまって、恥ずかしい限りですが……<emoji=heart04>）"
translation = "（지금 다시 생각하면, 그때는 회장님 앞에서 소시지를 잔뜩 입에 머금어 버려서, 부끄럽기 짝이 없지만요……<emoji=heart04>）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あっ……！？」"
translation = "「앗……!?」"

[[dialogue]]
speaker = "unk"
original = "ふと、イクシーのお腹が鳴る音がして、彼女はかあぁっと顔を赤くする。"
translation = "문득, 익시의 배에서 꼬르륵 소리가 났고, 그녀는 화악 얼굴을 붉힌다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「う、うぅ……買い食いを思い出して、お腹が鳴ってしまうなんて……お、お恥ずかしいです……<emoji=heart04>」"
translation = "「으, 으으…… 군것질을 떠올리고 배가 울려 버리다니…… 부, 부끄러워요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなイクシーの様子が可愛くて、俺は思わずクスッと笑ってしまう。"
translation = "그런 익시의 모습이 귀여워서, 나는 나도 모르게 쿡 웃고 만다."

[[dialogue]]
speaker = "unk"
original = "コンビニ、寄ってこうか"
translation = "편의점, 들렀다 갈까"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そ、それは……その……」"
translation = "「그, 그건…… 그……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「――ひゃっ<emoji=heart04>\u3000か、会長……！？」"
translation = "「――히얏<emoji=heart04> 회, 회장님……!?」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の手を取って、そのまま近くのコンビニへと向かった。"
translation = "나는 그녀의 손을 잡고, 그대로 근처 편의점으로 향했다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「すみません、会長。気を遣わせてしまって……」"
translation = "「죄송해요, 회장님. 신경 쓰게 해버려서……」"

[[dialogue]]
speaker = "unk"
original = "ソーセージは買わなくてよかったの？"
translation = "소시지는 안 사도 괜찮았어?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「は、はい。チキンだけで大丈夫です」"
translation = "「네, 네. 치킨만으로 괜찮아요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（会長の前でソーセージを食べるのは、ついエッチな妄想をしてしまいそうで、恥ずかしいですし……）"
translation = "（회장님 앞에서 소시지를 먹는 건, 그만 야한 망상을 해버릴 것 같아서 부끄럽기도 하고……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（ああでも、フライドチキンは増量中だったので、つい３つも買ってしまいました……）"
translation = "（아아 하지만, 프라이드치킨은 증량 중이라서, 그만 3개나 사버렸어요……）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（最近は会長の前でガツガツ食べるのが恥ずかしくて、自重していたというのに……）"
translation = "（최근에는 회장님 앞에서 허겁지겁 먹는 게 부끄러워서, 자제하고 있었는데……）"

[[dialogue]]
speaker = "unk"
original = "俺がフライドチキンを食べ始めると、イクシーも口元を隠すようにして食べ始めた。"
translation = "내가 프라이드치킨을 먹기 시작하자, 익시도 입가를 가리듯 먹기 시작했다."

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「し、失礼します……はむっ。――んんっ<emoji=heart04>\u3000フライドチキン、おいひぃ……<emoji=heart04>」"
translation = "「시, 실례할게요…… 하암. ――응으<emoji=heart04> 프라이드치킨, 마이쪄요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「はむっ……もぐもぐ……はあぁっ<emoji=heart04>\u3000濃厚な汁が口の中で溢れて……って、ハッ――！？」"
translation = "「하암…… 우물우물…… 하아아<emoji=heart04> 농후한 즙이 입안에서 넘쳐흘러서…… 앗, 핫――!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "（か、会長が微笑みながら、私が食べるのをじーっと見つめています……！）"
translation = "（회, 회장님이 미소 지으며, 제가 먹는 걸 빤히 쳐다보고 계세요……!）"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、あぅ……会長に食べているところをそんな見つめられると……恥ずかしいです……<emoji=heart04>」"
translation = "「아, 아으…… 회장님이 먹는 모습을 그렇게 쳐다보시면…… 부끄러워요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は幸せ一杯に食べるイクシーが好きだからな"
translation = "나는 행복 가득하게 먹는 익시가 좋으니까"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……！\u3000そ、そんな風に言われてしまうと……ますます顔が熱くなってしまいます……<emoji=heart04>\u3000えへへ……<emoji=heart04>」"
translation = "「……! 그, 그런 식으로 말씀하시면…… 점점 더 얼굴이 뜨거워져 버려요……<emoji=heart04> 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥じらいながらも嬉しそうに頬を緩ませる彼女を、改めて可愛いと思う俺なのだった。"
translation = "수줍어하면서도 기쁜 듯이 뺨을 붉히는 그녀를, 새삼 귀엽다고 생각하는 나였다."

