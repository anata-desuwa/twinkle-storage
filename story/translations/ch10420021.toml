[[dialogue]]
speaker = "unk"
original = "第１話,遅れてやってきたクリスマス,P"
translation = "제1화, 늦게 찾아온 크리스마스, P"

[[dialogue]]
speaker = "unk"
original = "年が明けてしばらく経った冬休みのある日。俺は恋人であるフニのいる、流星学園寮までやってきていた。"
translation = "새해가 밝고 시간이 꽤 흐른 겨울방학 어느 날. 나는 연인인 후니가 있는 유성 학원 기숙사까지 찾아왔다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「こ、こんな感じでいいですか？」"
translation = "「이, 이런 느낌이면 될까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、大変可愛らしいです。ではフニさま、今の感じで何枚か撮っていきますね」"
translation = "「네, 무척 귀여우세요. 그럼 후니 님, 지금 느낌으로 몇 장 찍을게요.」"

[[dialogue]]
speaker = "unk"
original = "……撮影会？"
translation = "……촬영회?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「か、会長さん！？」"
translation = "「회, 회장님!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、フニさまのご依頼で、クリスマスフォームのお姿を写真に収めていました」"
translation = "「네, 후니 님의 의뢰로 크리스마스 폼의 모습을 사진에 담고 있었습니다.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「クリスマスの時は撮れなかったから、改めてナミエルちゃんにお願いしたんです。北海道のみんなに見せてあげようと思って」"
translation = "「크리스마스 때는 못 찍었으니까, 다시 나미엘짱에게 부탁했어요. 홋카이도에 있는 모두에게 보여주려고요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ということで只今撮影中です。しばしお待ち下さい」"
translation = "「그런 고로 지금 촬영 중입니다. 잠시 기다려 주세요.」"

[[dialogue]]
speaker = "unk"
original = "じゃあ待たせてもらうね"
translation = "그럼 기다릴게."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「それでは撮影を再開します」"
translation = "「그럼 촬영을 재개하겠습니다.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「か、会長さんが見ている前で撮るんですかっ！？」"
translation = "「회, 회장님이 보고 계신 앞에서 찍는 건가요!?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「さすがに追い返すのは失礼ですからね」"
translation = "「차마 쫓아내는 건 실례니까요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「でで、でもっ……そのっ、いろんなポーズで撮ってたから……」"
translation = "「하하, 하지만…… 그게, 여러 포즈로 찍고 있었으니까……」"

[[dialogue]]
speaker = "unk"
original = "それは是非見てみたいな"
translation = "그건 꼭 보고 싶은걸."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「か、会長さん～、恥ずかしいですってばぁ」"
translation = "「회, 회장님~ 부끄럽다니까요오.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「視線が気になるなら、緋宮会長の用件を先に済ませてもらう、という選択もあります」"
translation = "「시선이 신경 쓰인다면 히노미야 회장의 용건을 먼저 해결한다는 선택지도 있습니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「さて、会長はどのようなご用件で流星寮に？」"
translation = "「자, 회장은 어떤 용건으로 유성 기숙사에?」"

[[dialogue]]
speaker = "unk"
original = "フニに会いに来たんだ"
translation = "후니를 만나러 왔어."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……それだけ、ですか？\u3000新星学園の星徒会長としていらしたわけではないのですね」"
translation = "「……그것뿐인가요? 신성학원의 성도회장으로서 오신 건 아니군요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ごめんね、ナミエルちゃん。私っ、その、ね……会長さんとは……」"
translation = "「미안해, 나미엘짱. 나, 그게, 저기…… 회장님하고는……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「え、えへへ♪」"
translation = "「에, 에헤헤♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……いちいち可愛らしい反応ですね、まったく」"
translation = "「……일일이 귀여운 반응이네요, 정말이지.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「おおよその察しはついていますが、きちんとした報告が聞きたいところです」"
translation = "「대충 짐작은 가지만, 제대로 된 보고를 듣고 싶은 참입니다.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そ、そうだよねっ。あのね、ナミエルちゃん、私と会長さんは……」"
translation = "「그, 그렇겠지. 저기 말이야, 나미엘짱, 나랑 회장님은……」"

[[dialogue]]
speaker = "unk"
original = "恋人同士になりました"
translation = "연인 사이가 되었어."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そ、そうなんです。実は私たち、少し前からお付き合い、させてもらってて……」"
translation = "「그, 그렇게 됐어요. 사실 저희, 조금 전부터 사귀고 있어서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんの彼女に、してもらえちゃったんですっ<emoji=heart04>\u3000えへへへぇ♪」"
translation = "「회장님의 여자친구가 되었답니다<emoji=heart04> 에헤헤헤♪」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「そ、そうでしたか。覚悟はしていましたが、直接聞くと意外とダメージを受けますね……」"
translation = "「그, 그러셨군요. 각오는 하고 있었습니다만, 직접 들으니 의외로 대미지를 입네요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「その……今まで報告が遅くなって、ごめんなさい」"
translation = "「그…… 지금까지 보고가 늦어져서 미안해.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いえ、こういったものは中々タイミングがないと話しづらいことは、理解しています」"
translation = "「아니요, 이런 건 웬만큼 타이밍이 없으면 말하기 어렵다는 건 이해합니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「おめでとうございます、フニさま」"
translation = "「축하드려요, 후니 님.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ありがとうごいざいますっ、ナミエルちゃん！」"
translation = "「감사합니다, 나미엘짱!」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、ナミエル"
translation = "고마워, 나미엘."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「あなたには言っていません」"
translation = "「당신에게 말한 게 아닙니다.」"

[[dialogue]]
speaker = "unk"
original = "どうして！？"
translation = "어째서!?"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ですがまあ、フニさまを笑顔にして頂けるのでしたら、おめでとうと言うのもやぶさかではありません」"
translation = "「하지만 뭐, 후니 님을 미소 짓게 해주신다면 축하한다고 말하는 것도 아깝지 않군요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「さあ、フニさま。残りを撮ってしまいますよ」"
translation = "「자, 후니 님. 남은 걸 찍어버리죠.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「うんっ。よろしくお願いします、ナミエルちゃん！」"
translation = "「응! 잘 부탁해, 나미엘짱!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「では先程の続きを……そうです、大変可愛らしいですよ。もっと笑顔になったら可愛さ倍増です」"
translation = "「그럼 아까 하던 걸 이어서…… 그래요, 무척 귀여우세요. 좀 더 웃으면 귀여움이 두 배가 될 거예요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「こ、こうかな？」"
translation = "「이, 이렇게?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「うーん、それも可愛いですが、少々物足りない気がしますね。先程の笑顔と比べると、残念ながら見劣りしてしまいます」"
translation = "「음, 그것도 귀엽지만 조금 부족한 느낌이네요. 아까 보여준 미소와 비교하면 유감스럽게도 뒤떨어집니다.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わ、私はどうすればいい、でしょうかっ？」"
translation = "「저, 저는 어떻게 하면 좋을까요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「せっかく彼氏の人がいることですし、お２人の嬉し恥ずかしいエピソードを披露して頂きましょう」"
translation = "「마침 남자친구분도 계시니, 두 분의 부끄럽고 기쁜 에피소드를 들려주시죠.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「フニさま、恋人同士になったお２人は、いったいどのように愛を語らっているのですか？」"
translation = "「후니 님, 연인 사이가 된 두 분은 대체 어떻게 사랑을 속삭이고 계시나요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ええっ。あのっ、その……た、例えば……」"
translation = "「에엣. 저기, 그게…… 예, 예를 들면……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「２人きりの時はたまに……会長さんのこと、ご、ご主人様<emoji=heart04>\u3000って呼ばせていただいたり、とか？」"
translation = "「둘만 있을 때는 가끔…… 회장님을 주, 주인님<emoji=heart04> 이라고 부르기도 하고요?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「なぁぁっ！！！？」"
translation = "「나아아앗!!!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あとは会長さんが、おでことか唇に、優しくキスをしてくれたり……」"
translation = "「그리고 회장님이 이마나 입술에 상냥하게 키스를 해주거나……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ほ、他にも……『フニは可愛いよ<emoji=heart04>』って言って、羽根を優しく撫でてくれたりですね……くすぐったいけど、それがとっても気持ちよくて……」"
translation = "「그, 그 밖에도…… 『후니는 귀여워<emoji=heart04>』라고 말하며 날개를 상냥하게 쓰다듬어 주거나 해요…… 간지럽지만 그게 무척 기분 좋아서……」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（ぷしゅ～～～～っ）"
translation = "(푸슈우우우)"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あれ？\u3000ナミエルちゃん？」"
translation = "「어라? 나미엘짱?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「な、なんでもありません。フニさまのお言葉が想像以上の破壊力を秘めていただけです」"
translation = "「아, 아무것도 아닙니다. 후니 님의 말씀이 상상 이상의 파괴력을 비축하고 있었을 뿐입니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "（恥ずかしがり屋のフニさまが、まさかそこまでとは……う、羨まけしからんですね）"
translation = "(부끄러움 많은 후니 님이 설마 그 정도까지라니…… 부, 부럽고도 괘씸하군요.)"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「他にも色々あるんですよ、会長さんとの仲良しエピソード。例えばですね……！」"
translation = "「그 외에도 여러 가지 있어요, 회장님과의 다정한 에피소드. 예를 들면요……!」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ストーーーップ！\u3000もう十分ですっ、フニさま！」"
translation = "「스토오오옵! 이제 충분합니다, 후니 님!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺からは……"
translation = "그럼 나로서는……"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「だから十分です！\u3000２人がかりで私を卒倒させるつもりですか」"
translation = "「그러니까 충분하다고요! 둘이서 저를 기절시킬 셈입니까?」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「まったく、想像以上にイチャついていますね。そういうことなら話は簡単です」"
translation = "「정말이지, 상상 이상으로 꽁냥거리고 있군요. 그렇다면 이야기는 간단합니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長。フニさまの恋人のあなたに、撮影役を託します。フニさまの魅力を最大限に引き出して下さい」"
translation = "「히노미야 회장. 후니 님의 연인인 당신에게 촬영 역할을 맡기겠습니다. 후니 님의 매력을 최대한으로 끌어내 주세요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「か、会長さんが撮ってくれるんですか？」"
translation = "「회, 회장님이 찍어주시는 건가요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「『フニ可愛いね』って、いつも褒めていただいてますけど……せっかく写真に残すなら、はいっ。私、もっと頑張りたいですっ<emoji=heart04>」"
translation = "「『후니 귀엽네』라고 항상 칭찬해주시지만…… 기왕 사진으로 남기는 거라면, 네! 저 더 열심히 하고 싶어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「……やはり私の見立て通りでしたね」"
translation = "「……역시 제 예상대로였군요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「さあ、撮影再開です。フニさまの可愛さを撮り逃さないよう、お願いしますよ、緋宮会長！」"
translation = "「자, 촬영 재개입니다. 후니 님의 귀여움을 놓치지 않도록 부탁드려요, 히노미야 회장!」"

[[dialogue]]
speaker = "unk"
original = "――こうして、俺はフニの可愛い写真を撮りまくるのだった。"
translation = "──이렇게 해서 나는 후니의 귀여운 사진을 잔뜩 찍어대는 것이었다."

