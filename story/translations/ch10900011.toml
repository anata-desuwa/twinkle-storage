[[dialogue]]
speaker = "unk"
original = "第１話,魔王の妹,P"
translation = "제1화, 마왕의 여동생, P"

[[dialogue]]
speaker = "unk"
original = "ある日の昼休み、昼食をしにカフェテリアへ来ていると、声をかけられた。"
translation = "어느 날 점심시간, 점심을 먹으러 카페테리아에 와 있자니, 누군가 말을 걸어왔다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あっ、いたいた！\u3000お兄ちゃ～ん♪」"
translation = "「앗, 찾았다! 오빠~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今日は１人？\u3000あたしも一緒に食べていい？」"
translation = "「오늘은 혼자야? 나도 같이 먹어도 돼?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――にへへ♪\u3000ありがとう♪\u3000実はあたし、お兄ちゃんのこと探してたんだ～。あのね、ついにあたし、新星学園への転入日が決まったの！」"
translation = "「──니헤헤♪ 고마워♪ 사실 나, 오빠를 찾고 있었어~. 저기 있지, 드디어 나, 신성학원으로의 전입일이 결정됐어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あれ？\u3000お兄ちゃん！」"
translation = "「어라? 오빠!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――それで、お兄ちゃんに直接会って報告したくて！」"
translation = "「──그래서, 오빠를 직접 만나서 보고하고 싶었어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん？」"
translation = "「응?」"

[[dialogue]]
speaker_original = "２人"
speaker_translation = "2명"
original = "「誰……？」"
translation = "「누구……?」"

[[dialogue]]
speaker = "unk"
original = "出会ってしまったか……"
translation = "만나버렸나……"

[[dialogue]]
speaker = "unk"
original = "俺はルルカに、メイプルと知り合った経緯について説明した。"
translation = "나는 루루카에게 메이플과 알게 된 경위에 대해 설명했다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――なるほど。つい最近、魔界から家出してきた子で、トワちゃん先生に拾われて、居候することになったと……」"
translation = "「──그렇구나. 바로 얼마 전 마계에서 가출해 온 아이인데, 토와짱 선생님이 거둬줘서 얹혀살게 됐다는 거네……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「何となく事情はわかったよ。つまりは――」"
translation = "「어느 정도 사정은 알겠어. 요컨대──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしの知らない間に、新しい妹ができていたってことだね……！？」"
translation = "「내가 모르는 사이에, 새로운 여동생이 생겼다는 거지……!?」"

[[dialogue]]
speaker = "unk"
original = "浮気したみたいな言い方はやめて！"
translation = "바람피운 것처럼 말하는 건 그만둬!"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっふっふ……まさか、我以外にも、お兄ちゃんのことをお兄ちゃんと呼ぶ者が存在していたとは……！\u3000つまりこれは、『妹ライバル』ということ！」"
translation = "「훗훗훗…… 설마 나 말고도 오빠를 오빠라고 부르는 자가 존재하고 있었을 줄이야……! 즉 이건, 『여동생 라이벌』이라는 거군!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ならば、改めて名乗らせてもらおう！\u3000我が名は『メイプル・モノクラウン』！」"
translation = "「그렇다면 다시 한번 통성명을 하도록 하지! 내 이름은 『메이플 모노크라운』!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市『キュリオス』にて、王家を代々守護してきた『モノクラウン家』が娘！」"
translation = "「마계의 퇴폐 도시 『큐리오스』에서, 왕가를 대대로 수호해 온 『모노크라운 가문』의 딸!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「しかしてその正体は、３０００年前、魔王の片腕として、共にリクリエから世界を救った『クルセイダース』の末裔！」"
translation = "「허나 그 정체는, 3000년 전 마왕의 오른팔로서 함께 리크리에로부터 세계를 구한 『크루세이더스』의 후예!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そして、現世の新たなる魔王にして、新星学園星徒会長であるお兄ちゃんと魂の契りを結んだ――『魔王の妹』である！」"
translation = "「그리고, 현세의 새로운 마왕이자 신성학원 성도회장인 오빠와 영혼의 계약을 맺은── 『마왕의 여동생』이다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ちょっと待って、情報が多くて頭が追いつかないけど……とりあえず、その眼帯はなんなの！？\u3000なんか急に口調も変わってるし！」"
translation = "「잠깐 기다려, 정보가 너무 많아서 머리가 못 따라가겠는데…… 일단, 그 안대는 뭐야!? 왠지 갑자기 말투도 바뀌었고!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「これは我の中に眠る魔王の力を呼び起こす闇のアイテム！\u3000装備することで、『魔王モード』に切り替わるのだ！」"
translation = "「이것은 내 안에 잠든 마왕의 힘을 일깨우는 어둠의 아이템! 장착함으로써 『마왕 모드』로 전환되는 것이다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっと……つまりは、Ｖチューバ―のキャラ付けみたいな……？\u3000思春期こじらせ系の妹キャラってこと……？」"
translation = "「어 그러니까…… 요컨대 버튜버의 캐릭터 설정 같은 거야……? 사춘기 꼬인 계열의 여동생 캐릭터라는 거지……?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ぶいちゅーばー……？\u3000それはよくわからないけど、我はお兄ちゃんと共にいずれ必ず、新たな魔王として世界に名を刻んでみせる！」"
translation = "「버튜버……? 그건 잘 모르겠지만, 나는 오빠와 함께 언젠가 반드시, 새로운 마왕으로서 세계에 이름을 새겨 보이겠다!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「今はただの自称であっても……『魔王の妹』と名乗る気持ちに、一片の曇りもない！」"
translation = "「지금은 단지 자칭일지라도…… 『마왕의 여동생』이라고 자처하는 마음에는 한 점의 흐림도 없다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う……！\u3000なんて真っ直ぐな瞳……！」"
translation = "「우……! 어쩜 저렇게 올곧은 눈동자를……!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっ……どうやら我の本気は伝わったようだな。さあ、次はそなたが名乗る番だ！」"
translation = "「훗…… 아무래도 내 진심은 전달된 모양이군. 자, 다음은 그대가 이름을 댈 차례다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ、あたしは……海野辺ルルカ！\u3000新星学園の１年生で、お兄ちゃんとの関係は……！\u3000えっと……星徒会所属の友達を通して知り合った……先輩後輩……って感じかな」"
translation = "「나, 나는…… 우미노베 루루카! 신성학원의 1학년이고, 오빠와의 관계는……! 어, 그러니까…… 성도회 소속 친구를 통해서 알게 된…… 선후배……라는 느낌일까나」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（い、言いたいけど、言えない……！\u3000本当は、お兄ちゃんにＶチューバ―活動しているのがバレて、それ以来色々と相談に乗ってもらっているだなんて……！）"
translation = "『마, 말하고 싶지만 말할 수 없어……! 사실은 오빠한테 버튜버 활동하는 걸 들켜서, 그 이후로 이런저런 상담을 받고 있다니……!』"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「…………それだけか？\u3000お兄ちゃんと呼ぶようになった理由は？」"
translation = "「…………그뿐인가? 오빠라고 부르게 된 이유는?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え？\u3000いや、それはつい癖で……」"
translation = "「에? 아니, 그건 그냥 버릇이라서……」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「癖？」"
translation = "「버릇?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「年上の人を、つい『お兄ちゃん』、『お姉ちゃん』と呼んじゃうというか……」"
translation = "「나이 많은 사람을 나도 모르게 『오빠』, 『언니』라고 불러버린달까……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（配信している時のリスナーさんを、普段そういう風に呼んでいるからなんだけども……！）"
translation = "『방송할 때 시청자분들을 평소에 그렇게 부르고 있으니까 그런 거지만……!』"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん～、なんか……隠してないか？」"
translation = "「음~ 왠지…… 숨기는 거 없나?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「へ！？\u3000な、なんでそう思うの……！？」"
translation = "「헤!? 어, 어째서 그렇게 생각하는 거야……!?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「我はそなたから、確かに『妹』としてのライバル意識を感じた。にも関わらず、今の自己紹介からは気迫が感じられない」"
translation = "「나는 그대에게서 확실히 『여동생』으로서의 라이벌 의식을 느꼈다. 그럼에도 불구하고 방금 자기소개에서는 기백이 느껴지지 않아.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「つまり……お兄ちゃんとの絆に自信がありながらも、何か言えない秘密があるのではないか……！？」"
translation = "「즉…… 오빠와의 유대에 자신이 있으면서도, 뭔가 말할 수 없는 비밀이 있는 게 아닌가……!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ぐっ……！？」"
translation = "「윽……!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "（み、見抜かれてる～～～っ！\u3000いや、でも言えないし！）"
translation = "『가, 간파당하고 있어~~~엇! 아니, 하지만 말할 수 없고!』"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おや？\u3000ルルカさん。それに、メイプルさんではありませんか。もしかしなくても、ついに出会ってしまった感じですか」"
translation = "「어라? 루루카 씨. 그리고 메이플 씨 아니십니까. 설마가 아니더라도 드디어 만나버린 느낌인가요.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「アナか。ふふふ……その通り！\u3000今は互いにライバルとして、名を名乗っていたところだ！」"
translation = "「아나인가. 후후후…… 그렇다! 지금은 서로 라이벌로서 이름을 대고 있던 참이지!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そういえば、ＤＩＳＣのチャット見ましたよ。転入日が明日って決まったんですよね。おめでとうございます。そして、ウェルカムです」"
translation = "「그러고 보니 DISC 채팅 봤어요. 전입일이 내일로 정해졌더군요. 축하드립니다. 그리고 환영해요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「クラスメイトとして、これからよろしくお願いします」"
translation = "「학급 친구로서 앞으로 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「へ？\u3000クラスメイト？」"
translation = "「헤? 학급 친구?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あれ？\u3000そこまで自己紹介で言ってなかった感じですか？\u3000メイプルさんは私たちと同じ１年生で――」"
translation = "「어라? 거기까지는 자기소개에서 말하지 않았던 모양이네요? 메이플 씨는 저희와 같은 1학년이고──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私たちと同じクラスに転入するんですよ」"
translation = "「저희와 같은 반으로 전입하거든요.」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「なんと！？\u3000アナとルルカは同じクラスだったのか！」"
translation = "「이럴 수가!? 아나와 루루카는 같은 반이었던 건가!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えぇ～～～っ！？」"
translation = "「에에~~~엣!?」"

[[dialogue]]
speaker = "unk"
original = "２人は顔を見合わせて、驚きの声を上げるのだった――"
translation = "두 사람은 얼굴을 마주 보고 놀란 목소리를 내는 것이었다──"

