[[dialogue]]
speaker = "unk"
original = "しばらく羽根突きの練習を続けた後、練習相手を再びシャッフルして決めることになった。"
translation = "한동안 하네츠키 연습을 계속한 뒤 연습 상대를 다시 셔플해서 정하게 되었다."

[[dialogue]]
speaker = "unk"
original = "しかし、この場にいる星騎士は７人のため、くじ引きの結果シズハが１人余って、今回は一旦休憩することになった。"
translation = "하지만 이곳에 있는 성기사는 7명이라 제비뽑기 결과 시즈하가 한 명 남게 되어 이번에는 일단 휴식하게 되었다."

[[dialogue]]
speaker = "シズハ"
original = "「ふぅ～、練習に熱が入り過ぎて、疲れた～」"
translation = "「후우~ 연습에 너무 열중해서 지쳤다~」"

[[dialogue]]
speaker = "ディーラック"
original = "「その割には元気そうじゃん」"
translation = "「그거치고는 팔팔해 보이는데」"

[[dialogue]]
speaker = "シズハ"
original = "「えへへ♪\u3000羽根突きの練習を続けて、できるようになってきたら、だんだん楽しくなってきちゃった♪」"
translation = "「에헤헤♪ 하네츠키 연습을 계속해서 할 수 있게 되니까 점점 재밌어졌어♪」"

[[dialogue]]
speaker = "シズハ"
original = "「あ～あ、ディーちゃんとも羽根突きができたら、もっと楽しそうなんだけどな～」"
translation = "「아~아, 디짱이랑도 하네츠키를 할 수 있으면 더 재밌을 것 같은데 말이야~」"

[[dialogue]]
speaker = "ディーラック"
original = "「え～、嫌だよ。仮にできたとしても面倒臭いし……」"
translation = "「에~ 싫어. 설령 할 수 있다 해도 귀찮고……」"

[[dialogue]]
speaker = "unk"
original = "現在、ディーラックはマジックアイテムの檻に閉じ込められ、悪さができないように力を制限されている。そのため羽根突きをすることはできない状態だった。"
translation = "현재 디럭쿠는 매직 아이템 우리에 갇혀 나쁜 짓을 못 하도록 힘이 제한되어 있다. 그 때문에 하네츠키를 할 수 없는 상태였다."

[[dialogue]]
speaker = "獅子舞"
original = "「ふん。ならば吾輩が、その願いを叶えてやろう」"
translation = "「흥. 그렇다면 이 몸이 그 소원을 들어주마」"

[[dialogue]]
speaker = "シズハ"
original = "「え？\u3000獅子舞さん？」"
translation = "「에? 사자탈 씨?」"

[[dialogue]]
speaker = "unk"
original = "突然現れた獅子舞が、正月の力を発動させる。"
translation = "갑자기 나타난 사자탈이 정월의 힘을 발동시킨다."

[[dialogue]]
speaker = "ディーラック"
original = "「なっ、これは……！？」"
translation = "「앗, 이건……!?」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃんの檻が消えちゃった！？」"
translation = "「디짱의 우리가 사라졌어!?」"

[[dialogue]]
speaker = "獅子舞"
original = "「吾輩の結界内でのみ、自由に行動できるように解放してやった。これでお前も羽根突きに参加できるな！」"
translation = "「이 몸의 결계 안에서만 자유롭게 행동할 수 있도록 해방해 주었다. 이걸로 네놈도 하네츠키에 참가할 수 있겠군!」"

[[dialogue]]
speaker = "シズハ"
original = "「本当ですか！？\u3000やったね、ディーちゃん！」"
translation = "「정말인가요!? 해냈다, 디짱!」"

[[dialogue]]
speaker = "ディーラック"
original = "「いやいや、全然嬉しくないよ！？\u3000この獅子舞、なに余計なことをしてくれちゃってんのサ！」"
translation = "「아니 아니, 전혀 안 기쁘거든!? 이 사자탈, 무슨 쓸데없는 참견을 하고 난리야!」"

[[dialogue]]
speaker = "獅子舞"
original = "「これで参加者が８人になるし、ちょうどいいからな」"
translation = "「이걸로 참가자가 8명이 되니 딱 좋지 않으냐」"

[[dialogue]]
speaker = "獅子舞"
original = "「それに、吾輩の結界内で堂々とサボりなど、認めん。羽根突きに参加しなければ、お前には後で罰ゲームだ」"
translation = "「게다가 이 몸의 결계 안에서 당당히 땡땡이치는 꼴은 못 본다. 하네츠키에 참가하지 않는다면 네놈에겐 나중에 벌칙 게임이다」"

[[dialogue]]
speaker = "ディーラック"
original = "「げっ、最悪なんだけど！？」"
translation = "「게엑, 최악이라구!?」"

[[dialogue]]
speaker = "シズハ"
original = "「最高の計らいだね！\u3000獅子舞さん、ありがとう♪」"
translation = "「최고의 배려네요! 사자탈 씨, 고마워요♪」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふん、１人だけ仲間<b>ハズレ</b>というのは、縁起が良くないからな」"
translation = "「흥, 한 명만 <b>따돌림</b>당하는 건 길조가 아니니까 말이다」"

[[dialogue]]
speaker = "シズハ"
original = "「ほら、ディーちゃん、せっかく獅子舞さんが檻から出してくれたんだし、一緒に羽根突きやろうよ！」"
translation = "「자, 디짱. 기껏 사자탈 씨가 우리에서 꺼내줬으니까 같이 하네츠키 하자!」"

[[dialogue]]
speaker = "ディーラック"
original = "「……あ～、もう。シズハちゃんはどうせ言い出したら聞かないし、やればいいんでしょやれば！」"
translation = "「……아~ 정말. 시즈하짱은 어차피 한번 말하면 안 들으니까 하면 되잖아, 하면!」"

[[dialogue]]
speaker = "シズハ"
original = "「よしっ♪\u3000えへへ♪」"
translation = "「좋아♪ 에헤헤♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、シズハはディーラックと羽根突きを始める。"
translation = "그렇게 시즈하는 디럭쿠과 하네츠키를 시작한다."

[[dialogue]]
speaker = "シズハ"
original = "「えいっ♪\u3000こうやってディーちゃんと外で遊ぶの、久しぶりだね！」"
translation = "「에잇♪ 이렇게 디짱이랑 밖에서 노는 거 오랜만이네!」"

[[dialogue]]
speaker = "ディーラック"
original = "「よっと。寮の部屋では、シズハちゃんからいつもしつこく遊ぼうって言ってくるから、そんなに久しぶりって感じはしないけどね」"
translation = "「영차. 기숙사 방에서는 시즈하짱이 맨날 끈질기게 놀자고 하니까 그렇게 오랜만이라는 느낌은 안 들지만 말이야」"

[[dialogue]]
speaker = "unk"
original = "ディーラックは尻尾で羽根を打って、シズハに返す。"
translation = "디럭쿠는 꼬리로 깃털을 쳐서 시즈하에게 돌려준다."

[[dialogue]]
speaker = "獅子舞"
original = "「ほう、普段はどんな風に遊んでいるのだ？」"
translation = "「호오, 평소에는 어떤 식으로 노는 것이냐?」"

[[dialogue]]
speaker = "ディーラック"
original = "「って、獅子舞はなんでずっと見てるのサ。やりづらいんだけど……」"
translation = "「아니, 사자탈은 왜 자꾸 쳐다보는 거야. 하기 불편하다구……」"

[[dialogue]]
speaker = "獅子舞"
original = "「かつて吾輩を作り出した主から与えられた使命は、人間界の者たちを見守ることだからだ」"
translation = "「과거 이 몸을 만들어낸 주인으로부터 부여받은 사명은 인간계의 자들을 지켜보는 것이기 때문이다」"

[[dialogue]]
speaker = "獅子舞"
original = "「それで？\u3000シズハよ、普段はどのようにディーラックと遊んでいるのだ？」"
translation = "「그래서? 시즈하여, 평소에는 어떻게 디럭쿠과 노는 것이냐?」"

[[dialogue]]
speaker = "シズハ"
original = "「えっと、ディーちゃんが檻の中でも遊べるように、携帯機で協力プレイができるゲームをプレイしてますね」"
translation = "「저기, 디짱이 우리 안에서도 놀 수 있게 휴대용 기기로 협력 플레이가 가능한 게임을 하고 있어요」"

[[dialogue]]
speaker = "シズハ"
original = "「ディーちゃん、すっかりハマったのか、最近は私じゃ勝てないくらい上手くなってて……」"
translation = "「디짱이 완전히 빠졌는지 요즘은 제가 못 이길 정도로 잘하게 돼서……」"

[[dialogue]]
speaker = "ディーラック"
original = "「檻の中だと暇だからネ。最近はオンラインプレイのボイチャで煽ってくるヒトカス共を圧倒してから、雑魚煽りするのが趣味になりつつあるのサ！」"
translation = "「우리 안은 심심하니까 말이야. 요즘은 온라인 플레이 보이스 채팅으로 시비 거는 인간 쓰레기들을 압도한 다음에 허접이라고 놀리는 게 취미가 되어가고 있다구!」"

[[dialogue]]
speaker = "獅子舞"
original = "「いかにも負のエネルギーが溜まりそうな、縁起の悪い趣味だな……」"
translation = "「그야말로 부정적인 에너지가 쌓일 법한 불길한 취미로군……」"

[[dialogue]]
speaker = "シズハ"
original = "「大丈夫！\u3000今年こそディーちゃんが自由に過ごせるように、私、頑張るよ！」"
translation = "「괜찮아! 올해야말로 디짱이 자유롭게 지낼 수 있도록 내가 힘낼게!」"

[[dialogue]]
speaker = "シズハ"
original = "（そう……マイナスエネルギーの問題を解決して、ディーちゃんが他のエネルギーでもお腹いっぱいになれるような方法を、見つけてみせるんだから！）"
translation = "（그래…… 마이너스 에너지 문제를 해결해서 디짱이 다른 에너지로도 배불리 먹을 수 있는 방법을 찾아내고 말 거니까!）"

[[dialogue]]
speaker = "獅子舞"
original = "「ふん……シズハ、それがお前の新年の目標というわけか」"
translation = "「흥…… 시즈하, 그것이 네놈의 신년 목표라는 것이냐」"

[[dialogue]]
speaker = "シズハ"
original = "「はい！\u3000前にディーちゃんに、必ず叶えてみせるって約束をしたので！」"
translation = "「네! 전에 디짱한테 반드시 이뤄주겠다고 약속했거든요!」"

[[dialogue]]
speaker = "ディーラック"
original = "「まったく……根拠もない癖に、相変わらず威勢だけはいっちょ前なのサ」"
translation = "「참나…… 근거도 없는 주제에 여전히 기세 하나는 끝내준다구」"

[[dialogue]]
speaker = "シズハ"
original = "「本気で願えば掴めるって、私は信じてるから。サーシャさんやサチちゃんが、私の前で見せてくれたように」"
translation = "「진심으로 바라면 잡을 수 있다고 난 믿으니까. 사샤 씨나 사치짱이 내 앞에서 보여준 것처럼」"

[[dialogue]]
speaker = "シズハ"
original = "「それに私は、聖杯の力で変身する魔法少女だもん。だから――」"
translation = "「게다가 난 성배의 힘으로 변신하는 마법소녀인걸. 그러니까――」"

[[dialogue]]
speaker = "シズハ"
original = "「願いは叶うって信じなくちゃ、何も始まらないでしょ」"
translation = "「소원은 이뤄진다고 믿지 않으면 아무것도 시작되지 않잖아」"

[[dialogue]]
speaker = "unk"
original = "シズハはディーラックの目を見て、力強く微笑んでみせる。その瞳には、ディーラックがこれまで見てきたように、揺らがぬ信念の輝きが宿っていて──"
translation = "시즈하는 디럭쿠의 눈을 보며 힘차게 미소 지어 보인다. 그 눈동자에는 디럭쿠가 지금까지 봐왔던 것처럼 흔들림 없는 신념의 광채가 깃들어 있었고──"

[[dialogue]]
speaker = "ディーラック"
original = "「だったら……せいぜい頑張って、ボクに見せてみなよ」"
translation = "「그렇다면…… 어디 한번 힘내서 나한테 보여줘 보라구」"

[[dialogue]]
speaker = "ディーラック"
original = "「シズハちゃんの愚かな願いが、行き着く先をサ」"
translation = "「시즈하짱의 어리석은 소원이 도달할 끝을 말이야」"

[[dialogue]]
speaker = "シズハ"
original = "「うん、見てて、ディーちゃん！\u3000叶えてみせるよ……必ず！」"
translation = "「응, 지켜봐 줘, 디짱! 이뤄낼 거야…… 반드시!」"

[[dialogue]]
speaker = "獅子舞"
original = "「ふん……」"
translation = "「흥……」"

[[dialogue]]
speaker = "unk"
original = "獅子舞は２人のやりとりに、どこか満足したように鼻を鳴らすと、背中を向けて去って行くのだった。"
translation = "사자탈은 두 사람의 대화에 어딘가 만족한 듯 콧방귀를 뀌더니 등을 돌려 떠나갔다."

[[dialogue]]
speaker = "unk"
original = "一方、その頃。"
translation = "한편, 그 무렵."

[[dialogue]]
speaker = "アナ"
original = "「リーリアさん、少しいいですか？」"
translation = "「리리아 씨, 잠시 괜찮을까요?」"

[[dialogue]]
speaker = "リーリア"
original = "「あれ？\u3000アナちゃん、お疲れマジカル～☆\u3000どうかしたの？」"
translation = "「어라? 아나짱, 수고 매지컬~☆ 무슨 일이야?」"

[[dialogue]]
speaker = "unk"
original = "リーリアが羽根突きの技を自主練しているところへ、アナがやってきて告げる。"
translation = "리리아가 하네츠키 기술을 자율 연습하고 있는 곳으로 아나가 다가와 말한다."

[[dialogue]]
speaker = "アナ"
original = "「獅子舞さんに勝つ為に考えたことがあるのですが、リーリアさんの意見をお聞きしたいと思いまして」"
translation = "「사자탈 씨에게 이기기 위해 생각해 둔 것이 있는데, 리리아 씨의 의견을 듣고 싶어서요」"

[[dialogue]]
speaker = "リーリア"
original = "「アナちゃん、何か思いついたの？\u3000私に聞きたいことって……？」"
translation = "「아나짱, 뭔가 떠오른 거야? 나한테 묻고 싶은 게……?」"

[[dialogue]]
speaker = "アナ"
original = "「はい。リーリアさん――」"
translation = "「네. 리리아 씨――」"

[[dialogue]]
speaker = "アナ"
original = "「『<ruby>完全記憶能力者<rt>ハイパーサイメシア</rt></ruby>』であるあなたの目には、獅子舞さんの羽根突き術はどのように映りましたか？」"
translation = "「『완전기억능력자』인 당신의 눈에는 사자탈 씨의 하네츠키술이 어떻게 비쳤나요?」"

[[dialogue]]
speaker = "unk"
original = "リーリアが生まれながらに持つ、もう１つの特殊能力。アナはその瞳を見つめながら、静かに問いかけるのだった。"
translation = "리리아가 태어날 때부터 가진 또 하나의 특수 능력. 아나는 그 눈동자를 바라보며 조용히 묻는 것이었다."

