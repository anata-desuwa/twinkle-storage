[[dialogue]]
speaker = "unk"
original = "第２話,人間界の冬,P"
translation = "제2화, 인간계의 겨울, P"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──寒い！」"
translation = "「──춥느니라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「寒い、寒すぎるぞ……！\u3000ここはなんだ、氷の中か！？\u3000体が震えて仕方がない……うーぶるぶる」"
translation = "「춥다, 너무 춥구나……! 여기는 어디냐, 얼음 속이냐!? 몸이 떨려 참을 수가 없구나…… 으으 부들부들」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「人間界の冬はこんなにも厳しいのか！\u3000余はこのまま冬を越せる自信がなくなってきたぞ……」"
translation = "「인간계의 겨울은 이렇게나 혹독한 것이냐! 여는 이대로 겨울을 날 자신이 없어졌느니라……」"

[[dialogue]]
speaker = "unk"
original = "そんなに寒くなかった？"
translation = "그렇게 춥지 않았어?"

[[dialogue]]
speaker = "unk"
original = "魔女の森は……"
translation = "마녀의 숲은……"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。というより、魔女の森には四季の移ろいというものがあまりなくてな」"
translation = "「음. 그보다 마녀의 숲에는 사계절의 변화라는 것이 별로 없어서 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「暑いだの寒いだのと気候を意識することもあまりなかったのだ。まあ、もとより三界からは隔絶された領域だからな」"
translation = "「덥다느니 춥다느니 기후를 의식할 일도 별로 없었느니라. 뭐, 원래부터 삼계와는 격절된 영역이니까 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「だからこそ驚きだ……人間はなぜ、このような寒さに耐えられるのだ」"
translation = "「그렇기에 놀랍구나…… 인간은 어째서 이런 추위를 견딜 수 있는 것이냐」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「みな、余には見えていないだけで、ペンギンのような羽毛を生やしておるのか！？」"
translation = "「모두 여에게만 보이지 않을 뿐, 펭귄 같은 깃털을 기르고 있는 것이냐!?」"

[[dialogue]]
speaker = "unk"
original = "知恵もある"
translation = "지혜도 있어"

[[dialogue]]
speaker = "unk"
original = "ただの慣れだ"
translation = "그저 익숙해진 거야"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほう。人間には寒さを凌ぐ知恵が豊富……とな」"
translation = "「호오. 인간에게는 추위를 피하는 지혜가 풍부하다……는 것이냐」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余も少しは知っておるぞ。カイロだの、湯たんぽだのというやつだろう。ウェンディがありがたがっておった」"
translation = "「여도 조금은 알고 있느니라. 핫팩이라든가, 탕포라는 것들이지. 웬디가 고마워하고 있었느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む──あちらに何やら、最新の防寒グッズとやらが売られておるぞ」"
translation = "「음── 저쪽에 무언가 최신 방한 굿즈라는 것이 팔리고 있구나」"

[[dialogue]]
speaker = "unk"
original = "クラウディアは立ち並ぶ電器屋の店頭ディスプレイに目をつけた。"
translation = "클라우디아는 늘어선 가전제품 매장의 쇼윈도 디스플레이에 눈을 돌렸다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「どれどれ……ネックウォーマーに……電気で温まるベスト……むむ、毛皮の靴下なんてのもあるぞ！」"
translation = "「어디 보자…… 넥워머에…… 전기로 따뜻해지는 베스트…… 으음, 모피 양말 같은 것도 있구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あっちには……なんだ、脚の隠れたちゃぶ台が置かれておるな」"
translation = "「저쪽에는…… 뭐냐, 다리가 가려진 밥상이 놓여 있구나」"

[[dialogue]]
speaker = "unk"
original = "伝統的な暖房器具だ"
translation = "전통적인 난방 기구다"

[[dialogue]]
speaker = "unk"
original = "あれはこたつ"
translation = "저건 코타츠"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほー！\u3000あれが噂に聞くこたつか！\u3000何やらみかんまでセットで置いてあるではないか」"
translation = "「호오! 저것이 소문으로만 듣던 코타츠인가! 무언가 귤까지 세트로 놓여 있지 않느냐」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「この寒さに耐えんがため、人間も様々な知恵を巡らせておるのだな。いくつか余の部屋にも持ち帰りたくなってきたぞ」"
translation = "「이 추위를 견디기 위해 인간도 다양한 지혜를 짜내고 있구나. 몇 개 정도는 여의 방에도 가져가고 싶어지는구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「寒いなら買うか、と？\u3000いや……それより、だ。余はもっとよい寒さしのぎの方法を見つけたぞ」"
translation = "「추우면 살 거냐고? 아니…… 그보다, 말이다. 여는 더 좋은 추위 방지 방법을 찾아냈느니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふふふ……魔王で暖を取るのだ！\u3000こうしてぴったんことくっついていれば、どんなに気温が下がったとて平気だぞ！」"
translation = "「후후후…… 마왕으로 온기를 취하는 것이니라! 이렇게 딱 달라붙어 있으면 아무리 기온이 내려간들 평온하도다!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余に風邪をひかせぬためにも、お主はいつでも余のそばにいることだ。これは命令だぞ」"
translation = "「여를 감기에 걸리지 않게 하기 위해서라도, 네놈은 언제라도 여의 곁에 있도록 하여라. 이것은 명령이니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふっふっふ……まさに名案というものだ！」"
translation = "「훗훗훗…… 그야말로 명안이라 할 수 있겠구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「しかし……さっきも思ったが、１２月の人間界は本当にクリスマス一色なのだのう」"
translation = "「하지만…… 아까도 생각했다만, 12월의 인간계는 정말 크리스마스 일색이로구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余としては、自分の誕生日を上書きされているようで、まるで面白くないが……」"
translation = "「여로서는 자신의 생일을 덮어쓰기 당하는 것 같아 전혀 즐겁지 않다만……」"

[[dialogue]]
speaker = "unk"
original = "恋人同士は祝うもの"
translation = "연인끼리는 축하하는 법"

[[dialogue]]
speaker = "unk"
original = "楽しんだほうがトク"
translation = "즐기는 편이 이득"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「む……！\u3000言われてみれば、確かにそうだ。せっかくのお祭りムードをかき消すなど、なんだかもったいない気もしてきたぞ！」"
translation = "「무……! 듣고 보니 확실히 그렇구나. 기껏 꾸려진 축제 분위기를 지워버리는 건 왠지 아깝다는 기분도 드는구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「誕生日も、クリスマスも、どっちも楽しむのがオツというものか」"
translation = "「생일도, 크리스마스도, 둘 다 즐기는 것이 풍류라는 것이겠지」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔王よ！\u3000余にクリスマスの楽しみ方を教えてくれ。魔女の森にこんな風習はなかったものでな、初めてなのだ」"
translation = "「마왕이여! 여에게 크리스마스를 즐기는 법을 가르쳐다오. 마녀의 숲에는 이런 풍습이 없었기에 처음이니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほう。あそこに売られている樹木に秘密があると？」"
translation = "「호오. 저기 팔리고 있는 수목에 비밀이 있다고?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なに？\u3000あれは樹でなくケーキとな！？\u3000ほう、そんなものがあるとは！」"
translation = "「무엇이라? 저것은 나무가 아니라 케이크라고!? 호오, 그런 것이 있다니!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ぶっしゅどのえる……というのか。ケーキと聞いたら、急にうまそうに見えてきたぞ。セドナに隠れてこっそり食べてしまおうぞ、魔王♪」"
translation = "「부쉬 드 노엘……이라고 하느냐. 케이크라고 들으니 갑자기 맛있어 보이는구나. 세드나 몰래 살짝 먹어버리자꾸나, 마왕♪」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「他には何がある？\u3000ほほう、プレゼント交換なるものもあるのか」"
translation = "「그 외에는 무엇이 있느냐? 호호오, 선물 교환이라는 것도 있는 것인가」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「サンタではなく、友人同士でプレゼントを持ち寄り……なるほど！\u3000実に面白そうな試みではないか！」"
translation = "「산타가 아니라 친구끼리 선물을 가져와서…… 과연! 실로 재미있어 보이는 시도가 아니냐!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「向こうで行われているのは……ほう、クリスマス限定くじとな！\u3000クリスマスには特別なイベントが満載なのだな！」"
translation = "「저쪽에서 행해지고 있는 것은…… 호오, 크리스마스 한정 뽑기라고! 크리스마스에는 특별한 이벤트가 가득하구나!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「余もうずうずしてきたぞ。さあ、さっそくくじを引きに参ろう──！」"
translation = "「여도 좀이 쑤셔오는구나. 자, 어서 뽑기를 하러 가자──!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「──はっはっ、なかなか愉快な催しであった。１等とはならなかったが──たんまりお菓子ももらえたしな」"
translation = "「──핫핫, 꽤나 유쾌한 행사였느니라. 1등은 되지 못했다만── 과자도 듬뿍 받았으니 말이다」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「しかし、ふむ……何やらここに集った人間はみな、揃ってあの樹を見上げているようだな」"
translation = "「하지만 흠…… 왠지 이곳에 모인 인간들은 모두 하나같이 저 나무를 올려다보고 있는 것 같구나」"

[[dialogue]]
speaker = "unk"
original = "クラウディアが目に留めたのは、駅に展示されている巨大なツリーだった。"
translation = "클라우디아가 눈여겨본 것은 역에 전시된 거대한 트리였다."

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「あそこには何があるのだ？」"
translation = "「저기에는 무엇이 있느냐?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ほう。イルミネーションとな。確かにツリー全体がきらびやかに彩られておる」"
translation = "「호오. 일루미네이션이라고. 확실히 트리 전체가 화려하게 채색되어 있구나」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「しかし……ふーむ……光いろどるイルミネーション、か。それにしては少々、光が足らぬのではないか？」"
translation = "「하지만…… 흐음…… 빛으로 수놓는 일루미네이션이라. 그러기엔 조금 빛이 부족한 것 아니냐?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「何をするつもりか──と？\u3000ふふ、余なりの『さーびすせいしん』というやつだ」"
translation = "「무엇을 할 셈이냐고? 후후, 여 나름대로의 『서비스 정신』이라는 것이니라」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「それ──光の魔女が、ツリーに光の魔法をかけてやるぞ！\u3000あっはっは、これでライトアップ１００倍だ！」"
translation = "「에잇── 빛의 마녀가 트리에 빛의 마법을 걸어주마! 앗핫하, 이것으로 라이트 업 100배니라!」"

[[dialogue]]
speaker = "unk"
original = "やりすぎだ！"
translation = "지나치다!"

[[dialogue]]
speaker = "unk"
original = "まぶしい！"
translation = "눈부셔!"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「なあに、余の光は人の目にも優しい！\u3000心配いらん！」"
translation = "「무어냐, 여의 빛은 사람의 눈에도 상냥하니라! 걱정 말거라!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「せっかくの光の祭典ならば、大いに盛り上げなくては損と思ってのう！」"
translation = "「기왕 빛의 제전이라면 크게 분위기를 띄우지 않으면 손해라고 생각해서 말이다!」"

[[dialogue]]
speaker = "unk"
original = "クラウディアとの付き合いは、いつまで経っても退屈しないものだった……。"
translation = "클라우디아와의 관계는 시간이 흘러도 지루할 틈이 없는 것이었다……."

