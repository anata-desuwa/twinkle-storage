[[dialogue]]
speaker = "フィオナ"
original = "「全てのモンスターの消滅を確認しました。……この辺りの安全は確保できたようですね」"
translation = "「모든 몬스터의 소멸을 확인했습니다. ……이 근방의 안전은 확보된 것 같네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「プリマステラの皆さんは手分けして被害状況の確認と、要救助者への対応をお願いします」"
translation = "「프리마스텔라 여러분은 분담해서 피해 상황 확인과 구조 요청자 대응을 부탁드립니다」"

[[dialogue]]
speaker = "流星学園生"
original = "「はい！\u3000会長自ら応援に来てくださって、ありがとうございました！」"
translation = "「네! 회장님이 직접 응원하러 와주셔서 감사합니다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ちょうど私しか動ける者がいなくて到着に少し時間がかかってしまいましたね」"
translation = "「마침 저밖에 움직일 수 있는 사람이 없어서 도착하는 데 시간이 좀 걸렸네요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですがよく持ちこたえてくれました、ありがとうございます」"
translation = "「하지만 잘 버텨주셨습니다, 감사합니다」"

[[dialogue]]
speaker = "流星学園生"
original = "「そんな……こちらこそありがとうございます！\u3000では、後のことは任せてください」"
translation = "「아니에요…… 저희야말로 감사합니다! 그럼 뒷일은 맡겨주세요」"

[[dialogue]]
speaker = "フィオナ"
original = "「よろしくお願いしますね」"
translation = "「잘 부탁드릴게요」"

[[dialogue]]
speaker = "unk"
original = "モンスターの発生を知らせる通知を受け、流星学園の星徒会長であるフィオナが現場に駆け付けていた。"
translation = "몬스터의 발생을 알리는 통지를 받고, 유성 학원의 성도회장인 피오나가 현장으로 달려와 있었다."

[[dialogue]]
speaker = "unk"
original = "幸い、数も強さもさほどではなく、モンスターたちは程なく掃討されたのだが……"
translation = "다행히 수도 강함도 그리 대단치 않아, 몬스터들은 이내 소탕되었지만……"

[[dialogue]]
speaker = "unk"
original = "事後処理の指示を各所に出し終わり、ようやくひと息ついたその時、異変は発生した。"
translation = "사후 처리 지시를 각지에 내리고 겨우 한숨 돌린 그때, 이변이 발생했다."

[[dialogue]]
speaker = "フィオナ"
original = "「っ……！？\u3000この感じ……前にも……！」"
translation = "「윽……!? 이 느낌…… 전에도……!」"

[[dialogue]]
speaker = "マハムート"
original = "「ふっ、どうやら無事に帰って来られたようね」"
translation = "「훗, 아무래도 무사히 돌아온 모양이군」"

[[dialogue]]
speaker = "？？？"
original = "「こ、ここがマムさんのいた世界、なの？」"
translation = "「여, 여기가 마무 씨가 있던 세계, 인 거야?」"

[[dialogue]]
speaker = "unk"
original = "マハムートと、それからもう１人。謎の穴から出てきたのは見覚えのない女の子だった。"
translation = "마하무트와, 그리고 또 한 명. 수수께끼의 구멍에서 나온 것은 낯선 여자아이였다."

[[dialogue]]
speaker = "unk"
original = "あの穴は──以前、異世界からやってきたプトラやアルテが去って行った時のものと、同じもののように見えた。"
translation = "저 구멍은── 이전에 이세계에서 온 푸트라나 아르테가 떠나갔을 때의 것과 같은 것으로 보였다."

[[dialogue]]
speaker = "unk"
original = "だとしたら、今回もあれを生み出したのは──とフィオナが記憶を手繰るまでもなく、マハムートたちに続いて人影が２つ転がり出てくる。"
translation = "그렇다면 이번에도 저것을 만들어낸 것은── 하고 피오나가 기억을 더듬기도 전에, 마하무트 일행의 뒤를 이어 인영 두 개가 굴러 나온다."

[[dialogue]]
speaker = "ベア子"
original = "「いたたた……」"
translation = "「아이고고……」"

[[dialogue]]
speaker = "黒ベア子"
original = "「ベア子！\u3000大丈夫くま？\u3000尻もちをついて、わたしがナデナデしてあげるくま？」"
translation = "「베아코! 괜찮은곰? 엉덩방아를 찧다니, 내가 쓰담쓰담 해주는곰?」"

[[dialogue]]
speaker = "ベア子"
original = "「いらないくまっ！」"
translation = "「필요 없다곰!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あなたは黒ベア子さん……？」"
translation = "「당신은 흑베아코 씨……?」"

[[dialogue]]
speaker = "黒ベア子"
original = "「くま？\u3000もしかして、わたしのこと知ってるくま？」"
translation = "「곰? 혹시 나를 아는곰?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、もちろんです」"
translation = "「네, 물론이죠」"

[[dialogue]]
speaker = "フィオナ"
original = "「以前に『みんなで一緒に盛り上がりたい』という理由で、大量のクマ型ロボットを出現させて大騒ぎを起こした子……ですよね？」"
translation = "「이전에 『다 같이 함께 즐겁게 놀고 싶다』는 이유로 대량의 곰 인형 로봇을 출현시켜 큰 소동을 일으켰던 아이…… 맞죠?」"

[[dialogue]]
speaker = "黒ベア子"
original = "「そうくま♪\u3000いやー、ちょうど良かった！\u3000さっそくわたしたちを案内するくま～♪」"
translation = "「그렇다곰♪ 이야~ 마침 잘 됐다! 당장 우리를 안내하는곰~♪」"

[[dialogue]]
speaker = "ベア子"
original = "「黒ベア子！\u3000いきなりそんな事を言っても困らせるだけくま！\u3000ちゃんと説明しないとだめくま！」"
translation = "「흑베아코! 갑자기 그런 소릴 해도 곤란하게 만들 뿐이다곰! 제대로 설명하지 않으면 안 된다곰!」"

[[dialogue]]
speaker = "ベア子"
original = "「申し遅れました、あたしはベア子と言います。こちらは黒ベア子。その節はこの子が大変ご迷惑をおかけいたしました」"
translation = "「인사가 늦었습니다, 저는 베아코라고 합니다. 이쪽은 흑베아코. 지난번에는 이 아이가 큰 실례를 끼쳤습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、いえ……それはもう過ぎたことですし、大事には至りませんでしたから」"
translation = "「아, 아니에요…… 그건 이미 지난 일이고, 큰일로 번지지는 않았으니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「それよりもどうしてまたこの世界に？\u3000何か事情がありそうですが、お話を伺ってもよろしいですか？」"
translation = "「그보다 어떻게 다시 이 세계에? 무슨 사정이 있는 것 같은데, 이야기를 들어봐도 될까요?」"

[[dialogue]]
speaker = "ベア子"
original = "「ええと、それについては……黒ベア子、パス！」"
translation = "「에또, 그건 말이지…… 흑베아코, 패스!」"

[[dialogue]]
speaker = "黒ベア子"
original = "「わたしが説明するくま？\u3000ん～、わかったくま、まずはこの子を見て欲しいくま」"
translation = "「내가 설명하는곰? 음~ 알았다곰, 우선 이 아이를 봐줬으면 한다곰」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부~<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
original = "「あらまあ、可愛い赤ちゃんですね<emoji=heart04>」"
translation = "「어머나, 귀여운 아기네요<emoji=heart04>」"

[[dialogue]]
speaker = "黒ベア子"
original = "「そうくま～♪\u3000とっても可愛い、赤ちゃんのクマロボくま～♪」"
translation = "「그렇다곰~♪ 너무너무 귀여운, 아기 곰 로봇이다곰~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「あなたたちの世界では、クマロボはこうやって、赤ちゃんの姿で生まれてくるんですね♪」"
translation = "「당신들의 세계에서는 곰 로봇이 이렇게 아기 모습으로 태어나는군요♪」"

[[dialogue]]
speaker = "黒ベア子"
original = "「そんなわけないくま！\u3000クマロボは赤ちゃんじゃない姿で生まれるに決まってるくま！！」"
translation = "「그럴 리 없다곰! 곰 로봇은 아기가 아닌 모습으로 태어나는 게 당연하다곰!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「えぇえぇ……！？」"
translation = "「에에에……!?」"

[[dialogue]]
speaker = "黒ベア子"
original = "「でも、赤ちゃんが１人じゃかわいそうだから、パパを見つけてあげるくま！」"
translation = "「하지만 아기가 혼자면 불쌍하니까, 아빠를 찾아줄 거다곰!」"

[[dialogue]]
speaker = "黒ベア子"
original = "「それでこの子のパパを捜すため、この世界へやってきたんだくま！」"
translation = "「그래서 이 아이의 아빠를 찾기 위해 이 세계로 온 거다곰!」"

[[dialogue]]
speaker = "フィオナ"
original = "「パパ……この子のお父さんが、この世界にいるんですか？」"
translation = "「아빠…… 이 아이의 아버지가 이 세계에 있나요?」"

[[dialogue]]
speaker = "黒ベア子"
original = "「そうくま！\u3000手伝って欲しいくま！」"
translation = "「그렇다곰! 도와줬으면 한다곰!」"

[[dialogue]]
speaker = "フィオナ"
original = "「わ、わかりました、私に出来る限りのことは協力しますが……何か手がかりはあるのでしょうか？」"
translation = "「아, 알겠습니다. 제가 할 수 있는 한 협력하겠지만…… 무슨 단서라도 있을까요?」"

[[dialogue]]
speaker = "黒ベア子"
original = "「赤ちゃんが生まれるには……おしべ？\u3000とめしべ？\u3000が必要くま！」"
translation = "「아기가 태어나려면…… 수술? 이랑 암술? 이 필요하다곰!」"

[[dialogue]]
speaker = "黒ベア子"
original = "「ベア子が言うには、この世界で出会ったおしべ？\u3000は１人だけくま！」"
translation = "「베아코가 말하기를, 이 세계에서 만난 수술? 은 한 명뿐이다곰!」"

[[dialogue]]
speaker = "フィオナ"
original = "「以前にあった事件で関わった『おしべ』……って、まさか緋宮会長ですか！？」"
translation = "「이전에 있었던 사건에서 엮인 『수술』…… 설마 히노미야 회장님인가요!?」"

[[dialogue]]
speaker = "黒ベア子"
original = "「名前は知らないくま。でもきっと、その人がこの子のパパくま♪」"
translation = "「이름은 모른다곰. 하지만 분명 그 사람이 이 아이의 아빠다곰♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「な、何かの勘違いだと思いますよ……？」"
translation = "「무, 뭔가 착각하신 것 같은데요……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「だってこの子、クマで、ロボットじゃないですか。緋宮会長がパパのはずがありません……」"
translation = "「그치만 이 아이, 곰이고 로봇이잖아요. 히노미야 회장님이 아빠일 리가 없어요……」"

[[dialogue]]
speaker = "マハムート"
original = "「私も何度もそう言ったわ。けれど、どうしても本人に会って確かめないと気が済まないようね」"
translation = "「나도 몇 번이나 그렇게 말했어. 하지만 아무래도 본인을 만나서 확인하지 않으면 직성이 풀리지 않는 모양이네」"

[[dialogue]]
speaker = "マハムート"
original = "「本人に会わせてその口からきちんと否定させれば納得するようだから、これから会長の所へ連れて行くわ」"
translation = "「본인을 만나게 해서 그 입으로 직접 부정하게 하면 납득할 것 같으니, 지금부터 회장이 있는 곳으로 데려가겠어」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしかしてマムは、この子のパパ捜しを手伝っていたのですか？」"
translation = "「혹시 마무 선배는 이 아이의 아빠 찾기를 도와주고 있었던 건가요?」"

[[dialogue]]
speaker = "マハムート"
original = "「そうよ。別の世界にまで呼びつけられて、ね」"
translation = "「그래. 다른 세계에까지 불려 나가서 말이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「別の世界に呼びつけられて！？」"
translation = "「다른 세계에 불려 나가서요!?」"

[[dialogue]]
speaker = "マハムート"
original = "「『ゲシュペンス島』というところよ」"
translation = "「『게슈펜스 섬』이라는 곳이야」"

[[dialogue]]
speaker = "フィオナ"
original = "「ゲシュペンス島……聞いたことのない名前です」"
translation = "「게슈펜스 섬…… 들어본 적 없는 이름이에요」"

[[dialogue]]
speaker = "マハムート"
original = "「魔界、天界、人間界。どこを探してもそんな島は無いわ。言葉の通り、こことは違う別の世界よ」"
translation = "「마계, 천계, 인간계. 어디를 찾아봐도 그런 섬은 없어. 말 그대로 여기와는 다른 별개의 세계야」"

[[dialogue]]
speaker = "マハムート"
original = "「そこには種族の違うさまざまな娘たちが集まって生活しているわ。そうね……魔界が１つの島に凝縮されている、と言えば分かりやすいかしら？」"
translation = "「그곳에는 종족이 다른 다양한 아가씨들이 모여 생활하고 있어. 그래…… 마계가 하나의 섬에 응축되어 있다고 하면 이해하기 쉬우려나?」"

[[dialogue]]
speaker = "マハムート"
original = "「今、私の後ろに隠れているルルゥも『カーバンクル<ruby>娘<rt>むすめ</rt></ruby>』でゲシュペンス島の住人よ」"
translation = "「지금 내 뒤에 숨어있는 루루도 『카벙클 아가씨』로 게슈펜스 섬의 주민이야」"

[[dialogue]]
speaker = "ルルゥ"
original = "「よ、よろしく、なの……」"
translation = "「자, 잘 부탁해, 인 거야……」"

[[dialogue]]
speaker = "フィオナ"
original = "「初めまして、ルルゥさん。私は星見フィオナといいます。よろしくお願いしますね」"
translation = "「처음 뵙겠습니다, 루루 씨. 저는 호시미 피오나라고 합니다. 잘 부탁드려요」"

[[dialogue]]
speaker = "ルルゥ"
original = "「はぅ……」"
translation = "「하으……」"

[[dialogue]]
speaker = "マハムート"
original = "「ルルゥはとある理由でずっと密猟者に狙われ続けてきたのよ。だから極端にヒトへの警戒心が強いわ」"
translation = "「루루는 어떤 이유로 계속 밀렵꾼들에게 노려져 왔어. 그래서 극도로 인간에 대한 경계심이 강해」"

[[dialogue]]
speaker = "マハムート"
original = "「安心しなさいルルゥ、ここにはあなたを狙う密猟者はいないわ」"
translation = "「안심하렴 루루, 여기에는 너를 노리는 밀렵꾼은 없단다」"

[[dialogue]]
speaker = "マハムート"
original = "「それにもし、そんな不届き者が現れても、私が鉄球で一撃のもとに粉砕してあげる」"
translation = "「게다가 만약 그런 불한당이 나타나도, 내가 철구로 일격에 분쇄해 줄 테니까」"

[[dialogue]]
speaker = "ルルゥ"
original = "「マムさん……ありがとうございます、なのっ」"
translation = "「마무 씨…… 고마워요, 인 거야」"

[[dialogue]]
speaker = "フィオナ"
original = "「さすがはマムです。すっかり慕われているじゃないですか」"
translation = "「역시 마무 선배예요. 아주 듬뿍 신뢰받고 있잖아요」"

[[dialogue]]
speaker = "マハムート"
original = "「あなたは何を勘違いしているのかしら、フィオナ？」"
translation = "「너는 뭘 착각하고 있는 거니, 피오나?」"

[[dialogue]]
speaker = "マハムート"
original = "「ルルゥは私の強さに畏怖しているだけ。慕っているわけではないわ」"
translation = "「루루는 내 강함에 경외심을 품고 있을 뿐이야. 따르고 있는 게 아니라고」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしかしてマム、ルルゥさんを襲ってきた密猟者を撃退したんじゃないですか？」"
translation = "「혹시 마무 선배, 루루 씨를 습격한 밀렵꾼을 격퇴한 거 아니에요?」"

[[dialogue]]
speaker = "マハムート"
original = "「ルルゥ個人を守ったつもりはないわ。話にならないから、正気を失っている連中を黙らせただけよ」"
translation = "「루루 개인을 지킬 생각은 없었어. 말이 안 통하니까, 정신 나간 놈들을 입 닥치게 만들었을 뿐이지」"

[[dialogue]]
speaker = "フィオナ"
original = "「やっぱり……」"
translation = "「역시……」"

[[dialogue]]
speaker = "マハムート"
original = "「それよりフィオナ、会長は新星学園の星徒会室にいるのかしら？」"
translation = "「그보다 피오나, 회장은 신성 학원의 성도회실에 있니?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。恐らく今は、事務作業をしている時間かと思います」"
translation = "「네. 아마 지금은 사무 작업을 하고 있을 시간일 거예요」"

[[dialogue]]
speaker = "マハムート"
original = "「では会長に連絡を入れておいて頂戴。今から私が行くから大人しく待ってなさい、と」"
translation = "「그럼 회장에게 연락해 둬. 지금 내가 갈 테니 얌전히 기다리고 있으라고」"

[[dialogue]]
speaker = "フィオナ"
original = "「わかりました。でも多分、そんな連絡をしたら気が気じゃなくなると思うので、普通にアポイントを取っておきますね……」"
translation = "「알겠습니다. 하지만 아마 그런 연락을 하면 안절부절못할 것 같으니, 평범하게 약속을 잡아둘게요……」"

[[dialogue]]
speaker = "黒ベア子"
original = "「いよいよパパと会えるくまね～♪」"
translation = "「드디어 아빠랑 만날 수 있다곰~♪」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
original = "「ばぶー<emoji=heart04>」"
translation = "「바부~<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
original = "「期待しない方がいいわよ。ゲシュペンス島のあの少年同様、会長がこの子の父親である可能性は、ほぼ無いに等しいんだから」"
translation = "「기대하지 않는 게 좋아. 게슈펜스 섬의 그 소년과 마찬가지로, 회장이 이 아이의 아버지일 가능성은 거의 제로에 가까우니까」"

[[dialogue]]
speaker = "黒ベア子"
original = "「そ、そんなくまーー！？」"
translation = "「그, 그럴 수가곰──!?」"

[[dialogue]]
speaker = "ベア子"
original = "「期待できないのに、マハムートさんはどうして手伝ってくれるくま？」"
translation = "「기대할 수 없는데, 마하무트 씨는 어째서 도와주는 거곰?」"

[[dialogue]]
speaker = "マハムート"
original = "「父親を捜すためにいろいろな世界を旅する、その気概は認めてあげてもいいと思ったからよ」"
translation = "「아버지를 찾기 위해 여러 세계를 여행하는 그 기개만큼은 인정해 줘도 좋다고 생각했기 때문이야」"

[[dialogue]]
speaker = "マハムート"
original = "「それに協力させるため、私をゲシュペンス島に呼び出したのも、なかなかいい度胸をしていると思ったわ」"
translation = "「게다가 협력하게 하려고 나를 게슈펜스 섬에 불러낸 것도 꽤 좋은 배짱이라고 생각했거든」"

[[dialogue]]
speaker = "黒ベア子"
original = "「それほどでもくま～♪」"
translation = "「그 정도까지는 아니다곰~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「マム相手に、なんて恐れ知らずな……」"
translation = "「마무 선배를 상대로 참 겁도 없네……」"

[[dialogue]]
speaker = "マハムート"
original = "「まあ、助けを求める、それ自体は悪いことではないわ。むしろ助けが必要な状況において、それを求めない方が問題だから」"
translation = "「뭐, 도움을 구하는 것 자체는 나쁜 게 아니야. 오히려 도움이 필요한 상황에서 구하지 않는 쪽이 문제지」"

[[dialogue]]
speaker = "マハムート"
original = "「けれど今回は……その内容があまりにも荒唐無稽だったことが問題ね」"
translation = "「하지만 이번에는…… 그 내용이 너무나도 황당무계했다는 게 문제지만」"

[[dialogue]]
speaker = "黒ベア子"
original = "「でも、本当にこれくらいしか心当たりが無いくま！\u3000この子のパパは今までに行ったことのある、どこかの世界の『おしべ』くま！」"
translation = "「하지만 정말 이 정도밖에 짐작 가는 게 없다곰! 이 아이의 아빠는 지금까지 가본 적 있는 어딘가의 세계의 『수술』이다곰!」"

[[dialogue]]
speaker = "フィオナ"
original = "「マム、緋宮会長から返信が来ました。新星学園の星徒会室でお待ちしているそうです」"
translation = "「마무 선배, 히노미야 회장님에게서 답장이 왔어요. 신성 학원 성도회실에서 기다리고 있겠대요」"

[[dialogue]]
speaker = "マハムート"
original = "「分かったわ。では、行くわよ。ルルゥもはぐれないように、ちゃんとついてきなさい」"
translation = "「알았어. 그럼 가자. 루루도 뒤처지지 않게 잘 따라오렴」"

[[dialogue]]
speaker = "ルルゥ"
original = "「は、はいなのっ！」"
translation = "「네, 네인 거야!」"

