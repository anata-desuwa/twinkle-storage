[[dialogue]]
speaker = "unk"
original = "第４話,ルルカの夢,P"
translation = "제4화, 루루카의 꿈, P"

[[dialogue]]
speaker = "unk"
original = "動画を作るために、綺麗な海があるところへ行きたい──"
translation = "영상을 만들기 위해, 아름다운 바다가 있는 곳에 가고 싶다──"

[[dialogue]]
speaker = "unk"
original = "そんなルルカの要望を叶えるため、休日の午後。２人でネットサーフィンに勤しんでいた。"
translation = "그런 루루카의 요청을 들어주기 위해 휴일 오후, 둘이서 인터넷 서핑에 매진하고 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あ！\u3000この海水浴場、いいかもっ。砂浜が真っ白だよ、お兄ちゃん！」"
translation = "「아! 이 해수욕장 좋을지도. 모래사장이 새하얘, 오빠!」"

[[dialogue]]
speaker = "unk"
original = "そろそろどいてくれないか？"
translation = "슬슬 내려와 주지 않을래?"

[[dialogue]]
speaker = "unk"
original = "それはいいんだけど……"
translation = "그건 좋은데……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えーっ、なんで？\u3000お兄ちゃんのお膝の上に座っちゃ駄目？」"
translation = "「에~ 왜? 오빠 무릎 위에 앉으면 안 돼?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「２人でおんなじ画面見るんだし、あたしはいっぱい甘えられるしー。一石二鳥じゃん！」"
translation = "「둘이서 똑같은 화면을 보는 거고, 나는 잔뜩 어리광 부릴 수 있고. 일석이조잖아!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ほらほら。お兄ちゃん。こっちのページもクリックして。画像がいっぱい見られるみたいだよ」"
translation = "「봐봐. 오빠. 이 페이지도 클릭해 봐. 사진을 많이 볼 수 있나 봐」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふむふむ……あ～、この浜辺は、夜景が素敵なのかあ……インスピレーション、湧きそうだなぁ……」"
translation = "「흠흠…… 아~ 이 해변은 야경이 멋지구나…… 영감이 떠오를 것 같아……」"

[[dialogue]]
speaker = "unk"
original = "インスピレーション？"
translation = "영감?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん、そう」"
translation = "「응, 맞아」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「次にアップロードする歌動画は、その……オリジナルの曲にしようかな～って思ってるんだよね」"
translation = "「다음에 업로드할 노래 영상은, 그…… 오리지널 곡으로 할까~ 생각 중이거든」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もちろん既存のアイドルソングも大好きだし、その歌に込められた想いを考えて歌うことも大好きなんだけど……そろそろ、チャレンジもしてみようかなって思って」"
translation = "「물론 기존 아이돌 노래도 정말 좋아하고, 그 노래에 담긴 마음을 생각하며 부르는 것도 정말 좋아하지만…… 슬슬 도전도 해볼까 싶어서」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ず～っと夢だったんだ。あたしの、あたしだけの曲を書いて、詞を作って……歌うこと」"
translation = "「계속 꿈이었어. 나만의, 나만을 위한 곡을 쓰고 가사를 지어서…… 노래하는 거」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「Ｖチューバーとしての活動も、バズるための動画作りも、楽しくないわけじゃないし、やりがいも感じてる」"
translation = "「VTuber로서의 활동도, 대박을 노린 영상 제작도 즐겁지 않은 건 아니고 보람도 느껴」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でも、最近はお兄ちゃんが色々活動を手伝ってくれてるじゃん？\u3000おかげで少し楽になって……余裕が出てきたからかな。思い出したの」"
translation = "「하지만 최근엔 오빠가 여러 활동을 도와주고 있잖아? 덕분에 조금 편해져서…… 여유가 생겨서 그런가 봐. 떠올랐어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしは、お母さんに憧れて、歌を始めたんだって」"
translation = "「나는 엄마를 동경해서 노래를 시작했다는 걸」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん、知ってるかな？\u3000『魅惑の歌姫』って呼ばれてる魔界のアイドル」"
translation = "「오빠, 알까나? 『매혹의 가희』라고 불리는 마계의 아이돌」"

[[dialogue]]
speaker = "unk"
original = "魔界の超有名アイドルだろ？\u3000人間界でも有名だ"
translation = "마계의 초유명 아이돌이잖아? 인간계에서도 유명해"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん。その人がね、あたしのお母さんなの」"
translation = "「응. 그 사람이 말이야, 우리 엄마야」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えへへ……全然そんな風に見えないよね。あんまり知ってる人もいないんじゃないかな。友達にも言ったことないし」"
translation = "「에헤헤…… 전혀 그렇게 안 보이지. 별로 아는 사람도 없을걸. 친구들한테도 말한 적 없고」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「隠してるわけじゃないよ？\u3000自慢のお母さんだし、あたしはお母さんの娘だってことに誇りを持ってる」"
translation = "「숨기는 건 아니야? 자랑스러운 엄마고, 나는 엄마의 딸이라는 거에 자부심을 느끼고 있어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「だけど……才能みたいなのはなかったみたいなんだよね。歌唱コンクールは良くて３位とかだし、聖歌隊の中にもあたしより上手な人はいっぱいいるし……」"
translation = "「하지만…… 재능 같은 건 없었던 모양이야. 가창 콩쿠르는 잘해봐야 3위 정도고, 성가대 안에도 나보다 잘하는 사람은 잔뜩 있고……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でもね、どーしてもあたしの歌をみんなに聞いて欲しかったんだ。Ｖチューバーを始めたのも、最初はみんなに歌を聴いてもらうためだったんだよ」"
translation = "「하지만 말이야, 어떻게 해서든 내 노래를 모두가 들어줬으면 했어. VTuber를 시작한 것도 처음엔 모두에게 노래를 들려주기 위해서였어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「Ｖチューバー活動を続けて、ラッキーなことに有名になれたけれど……」"
translation = "「VTuber 활동을 계속해서 운 좋게 유명해질 수 있었지만……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「有名になることが、あたしの目的じゃないんだよね。最初にやりたかったこと、少し忘れちゃってたかも」"
translation = "「유명해지는 게 내 목적은 아니었거든. 처음에 하고 싶었던 걸 조금 잊어버리고 있었을지도」"

[[dialogue]]
speaker = "unk"
original = "それで、どうして海に行きたいんだ？"
translation = "그런데 왜 바다에 가고 싶은 거야?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたしにとって、海は特別なの」"
translation = "「나한테 바다는 특별해」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あたし、子供の頃から泳ぐのがすっごく好きだったんだけど、故郷の街には小さな湖があるだけだったんだよ」"
translation = "「나, 어릴 때부터 수영하는 걸 정말 좋아했는데, 고향 마을에는 작은 호수밖에 없었거든」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「泳ぐには十分だったから不満はなかったんだけど……ある日ね、お母さんが人間界にある『海』のことを教えてくれたんだ」"
translation = "「수영하기엔 충분해서 불만은 없었지만…… 어느 날 엄마가 인간계에 있는 『바다』에 대해 가르쳐줬어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……初めて海の動画を見た時、すっごく感動したんだ」"
translation = "「……처음 바다 영상을 봤을 때 정말 감동했어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「視界いっぱいに広がる海……青く澄み渡ってて、びっくりするくらい綺麗だった。潮の満ち引き、さざなみの音、そこに集まる人たちの笑顔……全部が素敵だった」"
translation = "「시야 가득 펼쳐지는 바다…… 파랗고 투명해서 깜짝 놀랄 정도로 아름다웠어. 밀물과 썰물, 잔물결 소리, 거기에 모인 사람들의 미소…… 전부 멋졌어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「人間界に来てから、もう何度も海には行ってるけど……いつ見ても綺麗だし、見るたびに心が動かされる感じがするんだよ」"
translation = "「인간계에 오고 나서 벌써 몇 번이나 바다에 갔지만…… 언제 봐도 아름답고, 볼 때마다 마음이 움직이는 느낌이 들어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「それでね、海を見てると胸の辺りがぞわぞわ～ってして……」"
translation = "「그래서 말이야, 바다를 보고 있으면 가슴 근처가 근질근질~ 해서……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──歌いたいなって、思うの」"
translation = "「──노래하고 싶다, 고 생각하게 돼」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……えへへ、なんか言ってることおかしいかも。でも、本当のことなんだよね。海に行くと、歌のインスピレーションが湧くんだよ」"
translation = "「……에헤헤, 왠지 하는 말이 이상할지도. 하지만 사실이야. 바다에 가면 노래의 영감이 샘솟거든」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いつか自分の曲を作るなら、絶対に海をモチーフにして歌を作ろうって決めてたんだ」"
translation = "「언젠가 내 곡을 만든다면 반드시 바다를 모티브로 노래를 만들겠다고 정해뒀어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっと、その、それでね……歌詞を書くには、テーマが必要なんだよ。テーマ自体は決まってるんだけど、その、体験が欲しいというか、なんというか……」"
translation = "「저기, 그, 그래서 말이야…… 가사를 쓰려면 테마가 필요해. 테마 자체는 정해져 있는데, 그, 체험이 필요하달까, 뭐랄까……」"

[[dialogue]]
speaker = "unk"
original = "テーマは何？"
translation = "테마가 뭔데?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……恋に、しようかなって思ってるの」"
translation = "「……사랑으로 할까 생각 중이야」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──あっ！\u3000お、お兄ちゃんと一緒に、海に行きたいっていうのは、えっと、なんていうか偶然？\u3000みたいな感じで、別に変な意味はないっていうか！」"
translation = "「──앗! 오, 오빠랑 같이 바다에 가고 싶다는 건, 저기, 뭐랄까 우연? 같은 느낌이고, 딱히 이상한 의미는 없달까!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ルカルカと１番深い関係にあるのはお兄ちゃんじゃん？\u3000だ、だから、恋のことも、お兄ちゃんと一緒にいたほうがわかりやすいんじゃないかなって思ったっていうか──」"
translation = "「루카루카랑 가장 깊은 관계인 건 오빠잖아? 그, 그러니까 사랑에 대해서도 오빠랑 같이 있는 편이 이해하기 쉬울 것 같다고 생각했달까──」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「……ん。その──ね？」"
translation = "「……응. 그── 알지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃんと一緒に海に行けば、素敵な閃きがいっぱい生まれると思ったんだ」"
translation = "「오빠랑 같이 바다에 가면 멋진 번뜩임이 잔뜩 생겨날 것 같았어」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──って、えへへ。あたしの都合ばっかりだね。ごめんね、お兄ちゃん」"
translation = "「──라니, 에헤헤. 내 사정뿐이네. 미안해, 오빠」"

[[dialogue]]
speaker = "unk"
original = "ルルカがどんな曲を作るのか、楽しみだ"
translation = "루루카가 어떤 곡을 만들지 기대되네"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──ありがと、本当に優しいね、お兄ちゃんは」"
translation = "「──고마워, 정말 다정하네, 오빠는」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「優しくって……いっぱい甘えさせてくれて……頼りがいがあって……」"
translation = "「다정하고…… 잔뜩 어리광 부리게 해주고…… 믿음직스럽고……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「昔、お母さんに言われたことがあるの。歌が上手になりたいのなら、もっと自分の気持ちを表現することを考えてみたら？\u3000って」"
translation = "「옛날에 엄마가 말한 적이 있어. 노래를 잘하고 싶다면 좀 더 자신의 감정을 표현하는 걸 생각해보지 않을래? 라고」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あの頃は何を言われてるのかぜんぜんだったけど……今は、何となく、わかるかも」"
translation = "「그때는 무슨 소린지 전혀 몰랐지만…… 지금은 왠지 알 것 같아」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「──うん。あたしにとって特別な海。そこに、お兄ちゃんと一緒に行って、その時に生まれるドキドキを形にすれば……いいんだよね」"
translation = "「──응. 나에게 특별한 바다. 거기에 오빠랑 같이 가서, 그때 생겨나는 두근거림을 형태로 만들면…… 되는 거지」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ね、お兄ちゃん。あたし、とっても素敵な曲を作るから……その時は」"
translation = "「있지, 오빠. 나, 정말 멋진 곡을 만들 테니까…… 그때는」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「絶対、ぜーったい、一番最初に聴いて、感想を教えてね？」"
translation = "「절대, 저어얼대, 제일 먼저 듣고 감상을 말해줘야 해?」"

