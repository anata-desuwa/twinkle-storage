[[dialogue]]
speaker = "unk"
original = "第１話,フィオナのお弁当,P"
translation = "제1화, 피오나의 도시락, P"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『今日のお昼なんですけど、カフェテリアに来ていただけませんか？\u3000お渡ししたいものがありまして……』"
translation = "『오늘 점심 말인데요, 카페테리아로 와주시겠어요? 전해드리고 싶은 것이 있어서요……』"

[[dialogue]]
speaker = "unk"
original = "フィオナに言われた通り、カフェテリアに行くと──"
translation = "피오나가 말한 대로, 카페테리아로 가자──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんにちは、緋宮会長。この前の一件ではお世話になりました」"
translation = "「안녕하세요, 히노미야 회장. 지난번 일로 신세를 졌습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まさか戦闘服がウェディングドレスになるなんて思いませんでした。お恥ずかしいところをたくさんお見せしてしまいましたし……」"
translation = "「설마 전투복이 웨딩드레스가 될 줄은 몰랐어요. 부끄러운 모습을 많이 보여드렸고……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……少しニヤニヤしていませんか、緋宮会長？」"
translation = "「……조금 히죽거리고 있지 않으세요, 히노미야 회장?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「かわいいフィオナが見られた……？\u3000もう、緋宮会長ってばイジワルです……」"
translation = "「귀여운 피오나를 봤다고……? 정말, 히노미야 회장님은 심술쟁이시네요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが今日はその話をしに来たのではありません。実は緋宮会長にお弁当を作ってきたんです」"
translation = "「하지만 오늘은 그 이야기를 하러 온 것이 아닙니다. 실은 히노미야 회장에게 도시락을 만들어 왔어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「せっかく花嫁修業で料理を学んだんですから、もっと上手になりたいと思って練習しました。私のお弁当、食べてもらえますか？」"
translation = "「모처럼 신부 수업으로 요리를 배웠으니, 더 잘하고 싶어서 연습했어요. 제 도시락, 드셔 주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん。嬉しいよ"
translation = "물론이지. 기쁘다"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ありがとうございます。自分の分も作ってきましたから、一緒に食べましょう」"
translation = "「고맙습니다. 제 것도 만들어 왔으니, 같이 먹어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「最初なので、オーソドックスなおかずにしてみました。卵焼きと、唐揚げと、ポテトサラダと、あときんぴらごぼうです」"
translation = "「처음이라서, 평범한 반찬으로 해봤어요. 달걀말이와, 닭튀김과, 감자 샐러드와, 그리고 우엉조림이에요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それじゃ卵焼きから……あーん」"
translation = "「그럼 달걀말이부터…… 아앙」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そ、そんなに驚かなくてもいいじゃないですか。せっかく自分で作ったお弁当なんですし、私が食べさせてあげたいんです」"
translation = "「그, 그렇게 놀라지 않으셔도 되잖아요. 모처럼 제가 직접 만든 도시락이고, 제가 먹여 드리고 싶어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もちろん緋宮会長が嫌ならしませんけど……。ダメ……ですか？」"
translation = "「물론 히노미야 회장이 싫다면 안 하겠지만요……. 안 될까요……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ダメじゃない……？\u3000じゃ、じゃあいいですよね。……あ、あ～ん」"
translation = "「안 되는 거 아니라고……? 자, 그럼 괜찮은 거죠. ……아, 아~앙」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お味はどうでしょうか……？」"
translation = "「맛은 어떠신가요……?」"

[[dialogue]]
speaker = "unk"
original = "美味しい！"
translation = "맛있다!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ、嬉しいです。なかなか綺麗に焼けなくて、たくさん作ったんですから」"
translation = "「후후, 기뻐요. 좀처럼 예쁘게 구워지지 않아서, 잔뜩 만들었으니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「じゃあ唐揚げも……あーん」"
translation = "「그럼 닭튀김도…… 아앙」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「美味しいですか？\u3000なら良かった。冷めても美味しいレシピをキリカに教わったんですよ」"
translation = "「맛있으세요? 그럼 다행이에요. 식어도 맛있는 레시피를 키리카에게 배웠어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長が喜んでくれて、朝早起きして作った甲斐がありました」"
translation = "「히노미야 회장이 기뻐해 줘서, 아침 일찍 일어나 만든 보람이 있었어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「慣れないことをするのは少し苦労しましたけど……緋宮会長が食べてくれるのを想像したら、むしろ楽しかったです。お嫁さんって、こんな気持ちなんでしょうか」"
translation = "「익숙하지 않은 일을 하는 건 조금 힘들었지만…… 히노미야 회장이 먹어주는 것을 상상하니, 오히려 즐거웠어요. 신부라는 게, 이런 기분일까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……なんて、恥ずかしいこと言ってますね、私。あはは……」"
translation = "「……라니, 부끄러운 말을 하고 있네요, 저. 아하하……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ～、フィオナ会長と新星の会長さんがイチャイチャしてます！」"
translation = "「아~, 피오나 회장과 신성 학원 회장님이 알콩달콩하고 있어요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こら、ルリ。大声出さない」"
translation = "「이봐, 루리. 큰 소리 내지 마」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だって星徒会長同士のビッグカップルですよ！\u3000騒がない方がどうかしてます！」"
translation = "「왜냐면 성도회장끼리의 빅 커플이잖아요! 떠들지 않는 쪽이 이상한 거예요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そういう問題じゃないってば。まぁ、フィオナ会長は人前ではもっと控える人だと思ってたけど」"
translation = "「그런 문제가 아니라고. 뭐, 피오나 회장은 사람들 앞에서는 좀 더 자제하는 사람인 줄 알았는데」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも、学生のプライベートとして問題があるほどではないので、そっとしておきましょう」"
translation = "「하지만, 학생의 사생활로서 문제가 될 정도는 아니니, 그냥 내버려 둡시다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ほ、ほら、もっと食べてください。まだお弁当はありますから」"
translation = "「자, 자, 더 드세요. 아직 도시락은 있으니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「場所を移さなくていいのかって？\u3000いいんです。むしろもっと見せつけましょう。流星・新星両校で噂になるくらいに」"
translation = "「장소를 옮기지 않아도 되냐고요? 괜찮아요. 오히려 더 과시합시다. 유성・신성 양쪽 학교에서 소문이 날 정도로」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「きんぴらも、ポテトサラダも食べてくださいね。はい、あーん」"
translation = "「우엉조림도, 감자 샐러드도 드세요. 네, 아앙」"

[[dialogue]]
speaker = "unk"
original = "ごちそうさま"
translation = "잘 먹었다"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お粗末様でした。ちなみに、どのおかずが一番緋宮会長のお口に合いましたか？」"
translation = "「변변치 못했습니다. 그나저나, 어떤 반찬이 가장 히노미야 회장 입맛에 맞았나요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「卵焼き？\u3000ふむふむ、なるほど……緋宮会長は和食がお好みですか。参考にさせてもらいます」"
translation = "「달걀말이요? 후후, 과연…… 히노미야 회장은 일식을 좋아하시는군요. 참고하겠습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もっと美味しいお弁当を作れるよう頑張りますね」"
translation = "「더 맛있는 도시락을 만들 수 있도록 노력할게요」"

[[dialogue]]
speaker = "unk"
original = "一週間後──"
translation = "일주일 후──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんにちは、緋宮会長。今日もお弁当を作ってきました」"
translation = "「안녕하세요, 히노미야 회장. 오늘도 도시락을 만들어 왔어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ、遠慮しないでください。私が好きでしていることなんですから」"
translation = "「후후, 사양하지 마세요. 제가 좋아서 하는 일이니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「今日は鰹節と昆布から出汁をとって、ふわふわのだし巻き卵にしてみました。自信作なんです♪」"
translation = "「오늘은 가다랑어포와 다시마로 육수를 내서, 폭신폭신한 다시마키 타마고로 만들어 봤어요. 자신작이랍니다♪」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「フィオナお嬢様は、あれから卵焼きの研究を始められまして……」"
translation = "「피오나 아가씨께서는, 그 후로 달걀말이 연구를 시작하셔서……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だし巻き卵の出汁の割合は……ふむふむ、なるほど……」"
translation = "「다시마키 타마고의 육수 비율은…… 후후, 과연……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「昆布は水に漬けておいて、沸騰寸前で取り出す……沸騰したら火を止めて、鰹節を加えて……」"
translation = "「다시마는 물에 담가두고, 끓기 직전에 꺼낸다…… 끓으면 불을 끄고, 가다랑어포를 넣고……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「卵や醤油、油の種類、玉子焼き器の大きさや材質に至るまで、ずいぶんお詳しくなられてしまいました」"
translation = "「달걀이나 간장, 기름의 종류, 달걀말이 팬의 크기나 재질에 이르기까지, 상당히 자세히 알게 되셨어요」"

[[dialogue]]
speaker = "unk"
original = "フィオナってけっこう凝り性？"
translation = "피오나는 꽤나 한 가지 일에 몰두하는 성격이야?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「へ……！？\u3000そ、そうでしょうか……？」"
translation = "「헤……!? 그, 그럴까요……?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「言われてみますと……いつの間にかサーフィンの技や道具についても細かく知っておられましたし」"
translation = "「듣고 보니…… 어느새 서핑 기술이나 도구에 대해서도 자세히 알고 계셨고」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「昔から、興味や関心があることは自分でよく調べておられました。一度夢中になると他のことが目に入らないところもあります」"
translation = "「옛날부터, 흥미나 관심이 있는 것은 스스로 잘 조사하셨어요. 한번 빠지면 다른 것이 눈에 들어오지 않는 면도 있어요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ヒーローのアニメや漫画についてもよくご存じで──」"
translation = "「히어로 애니메이션이나 만화에 대해서도 잘 아시고──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そ、それはいいってば！」"
translation = "「그, 그건 됐다고!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うぅ、言われてみると確かにそんな気が……私、オタク気質なのかもしれません……」"
translation = "「으으, 듣고 보니 확실히 그런 기분이…… 저, 오타쿠 기질일지도 모르겠어요……」"

[[dialogue]]
speaker = "unk"
original = "そんなフィオナもかわいいよ"
translation = "그런 피오나도 귀여워"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え──！？」"
translation = "「에──!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう……ずるいです。そんなこと言われたら、あなたのこと、もっと好きになっちゃうじゃないですか……」"
translation = "「정말…… 치사해요. 그런 말 들으면, 당신을, 더 좋아하게 되잖아요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんな私でもよろしくお願いしますね、緋宮会長」"
translation = "「이런 저라도 잘 부탁드려요, 히노미야 회장」"

