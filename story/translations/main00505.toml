[[dialogue]]
speaker = "unk"
original = "第７話,おとぎの星空,B"
translation = "제7화, 옛날이야기 속 별하늘, B"

[[dialogue]]
speaker = "unk"
original = "長いこと塔の内部にいた気もする。"
translation = "오랫동안 탑 내부에 있었던 것 같다."

[[dialogue]]
speaker = "unk"
original = "俺たちは謎の声に促されるように、入った時と同じく光に包まれて外へ戻された。"
translation = "우리들은 수수께끼의 목소리에 재촉받듯이, 들어왔을 때와 마찬가지로 빛에 휩싸여 밖으로 되돌려졌다."

[[dialogue]]
speaker = "unk"
original = "これで一息つける──そう思っていたのだが……"
translation = "이걸로 한숨 돌릴 수 있겠지──그렇게 생각했지만……"

[[dialogue]]
speaker = "クロト"
original = "「これは……！」"
translation = "「이건……!」"

[[dialogue]]
speaker = "unk"
original = "ようやく戻ってこれた人間界。"
translation = "겨우 돌아올 수 있었던 인간계."

[[dialogue]]
speaker = "unk"
original = "しかしその様相は、入った時のそれとは大きく異なっていた。"
translation = "하지만 그 모습은, 들어왔을 때의 그것과는 크게 달랐다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「嫌な予感してたけど──これじゃ全然休む暇もないわね」"
translation = "「싫은 예감이 들긴 했지만──이래선 전혀 쉴 틈도 없겠네」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしやこれが……『星読事変』の兆候でしょうか？」"
translation = "「혹시 이것이…… 『별 읽기 사변』의 징후일까요?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。このオモチャみたいな星空……間違いない」"
translation = "「아아. 이 장난감 같은 별하늘…… 틀림없어」"

[[dialogue]]
speaker = "unk"
original = "それに、あの声が語っていた『リクリエの使徒』とやらにも合致する。"
translation = "게다가, 그 목소리가 말했던 『리크리에의 사도』라는 것과도 일치한다."

[[dialogue]]
speaker = "アポロ"
original = "『わっはっは！\u3000また会おうぞ魔王、我が宿敵よ！』"
translation = "「왓핫하! 또 만나자 마왕, 나의 숙적이여!」"

[[dialogue]]
speaker = "unk"
original = "前回の邂逅を思い出す。"
translation = "지난번 해후를 떠올린다."

[[dialogue]]
speaker = "unk"
original = "あの時は、新星だけで事に当たらざるを得なかったが……"
translation = "그때는, 신성만으로 일에 대처할 수밖에 없었지만……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ま～たあのガキンチョが出てくるに違いないわ。フィオナも、見た目に騙されないよう注意してね！」"
translation = "「또 그 애송이가 나올 게 분명해. 피오나도, 겉모습에 속지 않도록 주의해!」"

[[dialogue]]
speaker = "フィオナ"
original = "「かしこまりました。件の少女が脅威であるという報告は、流星星徒会にも共有されておりますので」"
translation = "「알겠습니다. 해당 소녀가 위협적이라는 보고는, 유성 성도회에도 공유되어 있습니다」"

[[dialogue]]
speaker = "クロト"
original = "「助かるよ。俺たちだけじゃ取り逃がしたからな」"
translation = "「도움이 되겠군. 우리들만으로는 놓쳤으니까」"

[[dialogue]]
speaker = "unk"
original = "しかし今日、フィオナの抜け目のなさを見ていると無用な心配という気もした。"
translation = "하지만 오늘, 피오나의 빈틈없음을 보고 있자니 쓸데없는 걱정이라는 생각도 들었다."

[[dialogue]]
speaker = "unk"
original = "流星星徒会のみんなが、彼女を頼るのもよくわかる──"
translation = "유성 성도회의 모두가, 그녀를 의지하는 것도 잘 알겠다──"

[[dialogue]]
speaker = "ニャリオン"
original = "「フィ……フィオナ嬢～～～～～！！！」"
translation = "「피…… 피오나 아가씨～～～～～!!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ニャリオン──」"
translation = "「냐리온──」"

[[dialogue]]
speaker = "ニャリオン"
original = "「あ──会いたかったニャン！\u3000まさか召喚も遮断されるニャんて、前代未聞ニャン……！」"
translation = "「아── 보고 싶었다냥! 설마 소환도 차단될 줄이야, 전대미문이냥……!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、ごめんごめん……私も寂しかったよ」"
translation = "「후훗, 미안 미안…… 나도 외로웠어」"

[[dialogue]]
speaker = "マトイ"
original = "「あっ、３人とも──よかった。無事だったんだ」"
translation = "「앗, 세 사람 다── 다행이다. 무사했구나」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイじゃない。あれ、なんか怪我してる……？」"
translation = "「마토이잖아. 어라, 뭔가 다쳤어……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「フィオナ会長──！\u3000ご無事でしたか！」"
translation = "「피오나 회장──! 무사하셨습니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ、ごめんねソフィア。むしろこちらのほうが心配だけれど」"
translation = "「네, 미안해요 소피아. 오히려 이쪽이 걱정되지만요」"

[[dialogue]]
speaker = "サーシャ"
original = "「お疲れ、クロトくんにヴィーナスちゃん。実はちょ～っと面倒なことになってて……」"
translation = "「수고했어, 쿠로토 군이랑 비너스 짱. 실은 너～무 귀찮은 일이 생겨서……」"

[[dialogue]]
speaker = "クロト"
original = "「そのようですね」"
translation = "「그런 것 같네요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この夜、あのチビッコでしょ？」"
translation = "「이 밤, 그 꼬맹이 짓이지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そう。本当に困ったちゃんなの」"
translation = "「맞아. 정말 골칫거리라니까」"

[[dialogue]]
speaker = "unk"
original = "サーシャ先輩は滅入った素振りで頷いた。"
translation = "사샤 선배는 풀이 죽은 듯 고개를 끄덕였다."

[[dialogue]]
speaker = "サーシャ"
original = "「手短に伝えると、今は大量のアステライトが関東全域を覆い尽くしているわ」"
translation = "「간단히 말하자면, 지금은 대량의 아스테라이트가 관동 전역을 뒤덮고 있어」"

[[dialogue]]
speaker = "クロト"
original = "「……！\u3000関東！？」"
translation = "「……! 관동!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「エリア広すぎでしょ！？\u3000そんなの、今まで一度だって……」"
translation = "「에어리어가 너무 넓잖아!? 그런 건, 지금까지 한 번도……」"

[[dialogue]]
speaker = "unk"
original = "流星市国どころの話じゃない。"
translation = "유성 시국 정도의 이야기가 아니다."

[[dialogue]]
speaker = "unk"
original = "既にここ一帯でも相当なアステラが目につくというのに、これがより広範囲に拡大しているとなると……。"
translation = "이미 이곳 일대에서도 상당한 아스테라가 눈에 띄는데, 이것이 더 넓은 범위로 확대되고 있다고 하면…….」"

[[dialogue]]
speaker = "ソフィア"
original = "「皆さんに手分けして対処に当たってもらっています。また、学園の<ruby>星騎士部隊<rt>プリマステラ</rt></ruby>にも協力を要請しました」"
translation = "「여러분에게 분담하여 대처에 임해 달라고 하고 있습니다. 또한, 학원의 성기사 부대에도 협력을 요청했습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「懸命です。私のいない中、適切な指示をありがとうございます」"
translation = "「현명하십니다. 제가 없는 동안, 적절한 지시를 내려주셔서 감사합니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「それに──ソフィアも奮闘してくれたようですね。ありがとう」"
translation = "「게다가── 소피아도 분투해 준 것 같네요. 고마워요」"

[[dialogue]]
speaker = "ソフィア"
original = "「っ……はい！\u3000大変な敵でしたが、ソフィアも頑張りました」"
translation = "「읏…… 네! 힘든 적이었지만, 소피아도 열심히 했습니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "（もしかして、さっき途中で追い出しちゃった守護天使……？）"
translation = "（혹시, 아까 도중에 쫓아내 버린 수호 천사……?）"

[[dialogue]]
speaker = "クロト"
original = "（かもな。けど、解決してくれたようだから後で話そう）"
translation = "（일지도. 하지만, 해결해 준 것 같으니 나중에 이야기하자）"

[[dialogue]]
speaker = "unk"
original = "あれはまだ余力を残していた。"
translation = "그것은 아직 여력을 남기고 있었다."

[[dialogue]]
speaker = "unk"
original = "みんなが後始末を請け負ってくれたのなら、事が済んだ後に礼を言おう。"
translation = "모두가 뒷수습을 맡아주었다면, 일이 끝난 후에 감사를 표하자."

[[dialogue]]
speaker = "ヴィーナス"
original = "「とりあえず事情はわかったわ。私たちも全力で加勢させてもらうから──ね、フィオナ。クロト」"
translation = "「일단 사정은 알았어. 우리도 전력으로 가세할 테니까── 그치, 피오나. 쿠로토」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。これも魔王としての宿命ならば」"
translation = "「네. 이것도 마왕으로서의 숙명이라면」"

[[dialogue]]
speaker = "クロト"
original = "「この手で止めるまでだな」"
translation = "「이 손으로 멈출 때까지겠지」"

[[dialogue]]
speaker = "マトイ"
original = "（？\u3000フィオナさんまで、魔王って……？）"
translation = "（? 피오나 씨까지, 마왕이라고……?）"

[[dialogue]]
speaker = "ソフィア"
original = "「ユウリ先輩とルリエルがややピンチのようです──フィオナ会長、よければ２人のところに！」"
translation = "「유우리 선배와 루리엘이 약간 위기인 것 같습니다── 피오나 회장, 괜찮으시다면 두 분이 있는 곳으로!」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。流星星徒会は地上のフォローに──民間への被害を最小限に抑えましょう」"
translation = "「네. 유성 성도회는 지상 팔로우를── 민간에 대한 피해를 최소한으로 억제합시다」"

[[dialogue]]
speaker = "クロト"
original = "「なら俺たちは<b>本体</b>を探そう。核を叩ければ、またこの夜も過ぎ去るはずだ」"
translation = "「그럼 우리들은 <b>본체</b>를 찾자. 핵을 때려 부술 수 있다면, 다시 이 밤도 지나갈 것이다」"

[[dialogue]]
speaker = "unk"
original = "あの夜、つけ損ねた決着を求めて。"
translation = "그날 밤, 매듭짓지 못한 결착을 찾아."

[[dialogue]]
speaker = "unk"
original = "俺たちの長い夜はさらに続いていくのだった。"
translation = "우리들의 긴 밤은 더욱 계속되는 것이었다."

