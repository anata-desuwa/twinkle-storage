[[dialogue]]
speaker = "unk"
original = "第２話,守護天使の集い？,P"
translation = "제2화, 수호천사의 모임?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「へー、ほーん……あんな感じかー」"
translation = "「헤에, 호오…… 저런 느낌인가~」"

[[dialogue]]
speaker = "unk"
original = "こんなところで何してるんだ？"
translation = "이런 곳에서 뭐 하고 있어?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「しっ。ほらあれ見て」"
translation = "「쉿. 자, 저것 좀 봐」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ティッシュどうぞ～」"
translation = "「티슈 받으세요~」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「遠慮せず受け取るがいい」"
translation = "「사양 말고 받도록 해라」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「プッ、フフッ……守護天使がホントにバイトしてる～！」"
translation = "「푸핫, 후훗…… 수호천사가 정말로 알바를 하고 있어~!」"

[[dialogue]]
speaker = "unk"
original = "そんなにおかしい？"
translation = "그렇게 웃겨?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「だって守護天使がだよ？\u3000女神様と一緒に世界を管理する大いなる存在が……ププッ、フフッ、ティッシュ配りとか……アハハッ」"
translation = "「그야 수호천사가 말이야? 여신님과 함께 세계를 관리하는 위대한 존재가…… 푸풋, 후훗, 티슈 나누기라니…… 아하핫」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「いや～、このおかしさは同じ守護天使にしかわかんないかなぁ～。例えるなら、船釣りに豪華客船を出してくるみたいな？\u3000それぐらいアンバランスなんだよ」"
translation = "「이야~, 이 웃음은 같은 수호천사밖에 모르려나~. 비유하자면, 선상 낚시에 호화 여객선을 끌고 나오는 느낌? 그 정도로 언밸런스하다니까」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「マグダレナが司る摂理は『領域』。三界を隔て、空間の調和を保つ者」"
translation = "「막달레나가 관장하는 섭리는 『영역』. 삼계를 격리하고, 공간의 조화를 유지하는 자」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「アルモタヘルは『種族』。天使、人間、魔族の三種族を含め、あらゆる生き物の系譜を管理する者」"
translation = "「아르모타헬은 『종족』. 천사, 인간, 마족의 세 종족을 포함해, 모든 생물의 계보를 관리하는 자」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それに比べるとティッシュ配りはねー……やることちっちゃすぎるって言うか。プププッ」"
translation = "「그거에 비하면 티슈 나누기는 말이야~…… 하는 일이 너무 소소하달까. 푸푸풋」"

[[dialogue]]
speaker = "unk"
original = "パテルの摂理は『淘汰』だったっけ？"
translation = "파텔의 섭리는 『도태』였지?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「そう、『淘汰』。環境に適応できない者が死ぬことだけど……まぁ世界の整理とでも言うべきかもね」"
translation = "「응, 『도태』. 환경에 적응하지 못하는 자가 죽는 것이지만…… 뭐, 세계의 정리라고 해야 할지도 모르겠네」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「世界のリソースは有限だ。もしすべての命が“不死”であれば、生命体が必要とするリソースは際限なく増え続けてしまう」"
translation = "「세계의 리소스는 유한해. 만약 모든 생명이 “불사”라면, 생명체가 필요로 하는 리소스는 끝없이 계속 늘어나고 말 거야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「考えてもみてよ。親が子を作って、その子が親になって、またその子も親になっていったら……食料に、空気に、あと土地とか。どれだけ必要になるのって話だよ」"
translation = "「생각해 봐. 부모가 자식을 낳고, 그 자식이 부모가 되고, 또 그 자식도 부모가 되어간다면…… 식량에, 공기에, 그리고 땅이라든가. 얼마나 필요하게 될지 말이야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「だから適度に減らす必要があるんだよ。これから生まれるもののためにもね」"
translation = "「그러니까 적당히 줄일 필요가 있는 거야. 앞으로 태어날 것들을 위해서라도 말이지」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「他には『流転』とか、『蓄積』とか、『普遍』の摂理があるけど……あ、噂をすれば」"
translation = "「그 외에는 『유전』이라든가, 『축적』이라든가, 『보편』의 섭리가 있는데…… 아, 호랑이도 제 말 하면」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ママ～～<emoji=heart04>」"
translation = "「마마~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あ……セシア、来ていたのですね」"
translation = "「아…… 세시아, 와 있었군요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ママダレナが働いてるって聞いたから来ちゃった<emoji=heart04>\u3000ママ、お仕事お疲れ様<emoji=heart04>」"
translation = "「마마달레나가 일하고 있다고 들어서 와버렸어<emoji=heart04> 마마, 일하느라 수고했어<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ありがとうございます。もう少しで終わるので待っていてください」"
translation = "「고맙습니다. 조금만 있으면 끝나니까 기다려 주세요」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「は～い<emoji=heart04>」"
translation = "「네~에<emoji=heart04>」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あれが今のアウクセシアか……ちっちゃくなったけど変わらないなぁ」"
translation = "「저게 지금의 아우크세시아인가…… 작아졌지만 변함없네」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あれじゃお母さんのパート先に来る娘だよ。でも見た目は子どもになったから、アウクセシアよりはまだマシ……いやあれはちょっと……」"
translation = "「저래선 엄마 파트타임 일터에 찾아온 딸이잖아. 그래도 겉모습은 어린애가 됐으니까, 아우크세시아보다는 아직 나은…… 아니 저건 좀……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「そもそもアウクセシアのママは、あたしたちを生み出した女神様でしょ……」"
translation = "「애초에 아우크세시아의 마마는 우리를 만들어낸 여신님이잖아……」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「それにしてもさー……どうしてあいつらあんなにボインなの！？」"
translation = "「그건 그렇고 말이야~…… 어째서 저 녀석들은 저렇게 빵빵한 거야!?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「マグダレナは言わずもがな。アルモタヘルもラクシャもおっきいし、アウクセシアも元はスタイル良かったし……キュートさは一番だからバランスは取れてるかもだけど～──」"
translation = "「막달레나는 말할 것도 없고. 아르모타헬도 락샤도 크고, 아우크세시아도 원래는 스타일 좋았고…… 큐트함은 내가 제일이니까 밸런스는 맞을지도 모르겠지만~──」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あっ、ヤバ、こっち来た！\u3000あたし隠れるからごまかしといて！」"
translation = "「앗, 위험해, 이쪽으로 온다! 나 숨을 테니까 대충 둘러대 줘!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「今、馴染みのある気配を感じたのだが……人の子よ、知らないか？」"
translation = "「방금, 낯익은 기운을 느꼈다만…… 사람의 아이여, 모르느냐?」"

[[dialogue]]
speaker = "unk"
original = "し、知りませんね……"
translation = "「모, 모르겠는데요……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「目が泳いでいるぞ。先日の話は聞いている。どうせパテルだろう」"
translation = "「눈동자가 흔들리고 있군. 요전의 이야기는 들었다. 어차피 파텔이겠지」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「まったく、肉体を得たのなら素直に姿を現せばよいものを。相変わらず気まぐれなやつだ」"
translation = "「정말이지, 육체를 얻었다면 순순히 모습을 드러내면 좋을 것을. 여전히 변덕스러운 녀석이군」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「パテルってどんな守護天使なのかしら？\u3000転生したからよくわからないわ。覚えていないということは、ママではないということは確かなのだけど」"
translation = "「파텔은 어떤 수호천사일까? 전생했으니까 잘 모르겠어. 기억하지 못한다는 건 마마가 아니라는 건 확실하지만」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「そうですね……彼女は『淘汰』を司る守護天使で、この世界の死神と称することもできます」"
translation = "「그렇네요…… 그녀는 『도태』를 관장하는 수호천사로, 이 세계의 사신이라 칭할 수도 있습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ですが性格は死神らしくはなく、イタズラ好きで、落ち着きがなくて……やんちゃな子どものような雰囲気でしょうか」"
translation = "「하지만 성격은 사신답지 않고, 장난을 좋아하며, 차분하지 못해서…… 개구쟁이 아이 같은 분위기랄까요」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ううむ、表現に窮するな。マグダレナの言葉は間違いではないが、完全とも言いづらい。生意気であることは間違いないが」"
translation = "「으음, 표현하기 어렵군. 막달레나의 말이 틀린 건 아니다만, 완전하다고 하기도 어렵군. 건방지다는 것만은 틀림없다만」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「パテルは我々他の守護天使とも距離を置いている節がありますから。リクリエに対するスタンスも違いますし……」"
translation = "「파텔은 우리 다른 수호천사들과도 거리를 두고 있는 면이 있으니까요. 리크리에에 대한 스탠스도 다르고……」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「……直接会ってみないとわからなさそうね。楽しみにしておくわ」"
translation = "「……직접 만나보지 않으면 모를 것 같네. 기대하고 있을게」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「あぁ、そろそろ仕事に戻らなければ。またお会いしましょう、会長さま」"
translation = "「아아, 슬슬 일로 돌아가야겠군요. 또 뵙겠습니다, 회장님」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ふー、ようやく行ったかぁ。んもー、本人がいないからって好き勝手言ってくれちゃってさ。あたしはこんなにかわいくてフレンドリーなのに。ねー？」"
translation = "「후우, 겨우 갔네. 정말~, 본인이 없다고 마음대로 말해버리고 말이야. 나는 이렇게나 귀엽고 프렌들리한데. 그치?」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「──あ」"
translation = "「──아」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「秋葉原カレー大食い選手権か……勝ちはオレが頂くぜ！」"
translation = "「아키하바라 카레 많이 먹기 대회인가…… 우승은 내가 가져가겠어!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「応援しています。でも無理はしないでくださいね？」"
translation = "「응원하고 있어요. 하지만 무리는 하지 마세요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「わかってるって。そうだ、賞品の割引チケット、グロリアにやるよ。カレー好きだろ？」"
translation = "「알고 있다니까. 맞다, 상품인 할인 티켓, 글로리아 너 줄게. 카레 좋아하잖아?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「いいんですか？\u3000ふふ、ありがとうございます」"
translation = "「괜찮나요? 후후, 고맙습니다」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「へ～、グロリアってカレー好きなんだ。フランは変わらないなー」"
translation = "「헤~, 글로리아는 카레를 좋아하는구나. 프랑은 변함없네~」"

[[dialogue]]
speaker = "unk"
original = "声をかけなくていいのか？"
translation = "아는 척 안 해도 돼?"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「あー……いいよ。あたしのことも知らせなくていいから。死神なんて、積極的に関わるものじゃないしね」"
translation = "「아~…… 됐어. 내 소식도 알리지 마. 사신 따위, 적극적으로 엮일 만한 게 아니니까」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「ほら、どこか遊びに行こ。マグダレナたちにもグロリアたちにも会わないように、ちょっと遠いところがいいな」"
translation = "「자, 어디 놀러 가자. 막달레나 일행이나 글로리아 일행이랑 마주치지 않게, 좀 먼 곳이 좋겠어」"

