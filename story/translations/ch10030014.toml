[[dialogue]]
speaker = "unk"
original = "第４話,あなたは私のもの,P"
translation = "제4화, 당신은 나의 것"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふんっ！\u3000全員蹴散らしてあげるわ！\u3000消え去りなさいっ！」"
translation = "「흥! 전부 걷어차 주겠어! 사라져버려!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……相変わらずの最強っぷり。私たち、必要なかった」"
translation = "「……여전히 최강 포스. 우리, 필요 없었어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあ結果は予想がついてたけれど、Ｓランクが複数出現、となったら流石にみんなで出動しなくちゃね～」"
translation = "「뭐 결과는 예상하고 있었지만, S랭크가 여럿 출현했다면 역시 다 같이 출동해야지~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……私も、もっと頑張らなきゃ」"
translation = "「……나도, 더 열심히 해야겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト！\u3000私の活躍、見てたかしら！」"
translation = "「쿠로토! 나의 활약, 봤어?」"

[[dialogue]]
speaker = "unk"
original = "ああ、さすがヴィーナスだ！"
translation = "아아, 역시 비너스야!"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふんっ、もっと褒めてくれてもいいのよ！\u3000いえ、もっと褒めて！」"
translation = "「후훗, 더 칭찬해줘도 된다고! 아니, 더 칭찬해줘!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん、んふっ♪\u3000そう、たくさん頭を撫でてくれていいのよ……？\u3000私、頑張ったんだから♥」"
translation = "「음, 음후♪ 그래, 마음껏 머리를 쓰다듬어줘도 돼……? 나, 열심히 했으니까♥」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……って、なによ、もう終わりなの？\u3000ダ～メ♪\u3000もっと撫でて？」"
translation = "「……근데 뭐야, 벌써 끝이야? 안~ 돼♪ 더 쓰다듬어줘?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれ？\u3000私の目の前にいるヴィーナスは、もしかして幻かな？」"
translation = "「어라? 내 눈앞에 있는 비너스는, 혹시 환각인가?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「現実逃避。別に不思議じゃない。前会長は現会長に心を許してた。特に最近は」"
translation = "「현실 도피. 딱히 이상할 것 없어. 전 회장님은 현 회장님에게 마음을 열었어. 특히 최근에는.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ～ん、お姉ちゃんとしての立場が～」"
translation = "「아앙, 언니로서의 입지가~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……なに、クロト。みんなが気になるの？\u3000別にいいじゃない、恥ずかしいことをしているわけでもないし」"
translation = "「……왜, 쿠로토. 다른 애들이 신경 쓰여? 상관없잖아, 부끄러운 짓을 하고 있는 것도 아니고.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え」"
translation = "「에.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それに……クロトにこうされるの、私好きだわ。前におんぶしてもらった時もそうだったけど、クロトに触れてもらえると安心するの……」"
translation = "「게다가…… 쿠로토가 이렇게 해주는 거, 나 좋아해. 저번에 업혔을 때도 그랬지만, 쿠로토가 만져주면 안심이 돼……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねえねえ、私のこと……抱きしめてみて？」"
translation = "「있지 있지, 나를…… 안아봐 줄래?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……いいのかって、私が頼んでるんだから、いいに決まってるじゃない。ほら早く早く」"
translation = "「……괜찮냐니, 내가 부탁하고 있으니까 당연히 괜찮지. 자 어서 어서.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んっ……はぁ……んんっ。やっぱり、いいわね。なんだか守ってもらえてるみたいで、ほっとするわ」"
translation = "「음…… 하아…… 으음. 역시, 좋네. 왠지 보호받고 있는 것 같아서, 마음이 놓여.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……でもね、ほっとするだけじゃないことに、最近気づいたのよ」"
translation = "「……하지만 말야, 마음이 놓이는 것뿐만이 아니라는 걸 최근에 깨달았어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「心臓がね、高鳴るの。どくん、どくんって。痛いくらいに。……ドキドキしてるっていうのかしらね」"
translation = "「심장이 말야, 요동쳐. 두근, 두근 하고. 아플 정도로. ……두근거리고 있다고 해야 할까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「タロット占いをした時のこと、覚えてる？\u3000星のカードと、恋人のカードが出た時のこと」"
translation = "「타로 점을 쳤을 때 일, 기억해? 별 카드랑, 연인 카드가 나왔을 때 일.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私、あのカードの意味をずっと考えてたの。どうして、恋人のカードなんて出たんだろうって」"
translation = "「나, 그 카드의 의미를 계속 생각했어. 어째서 연인 카드 같은 게 나왔을까 하고.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「情熱だとかときめきだとか、実際のところ私がクロトに対して思っていることを考えれば、恋人のカードが出たっておかしくないって思った」"
translation = "「열정이라든가 설렘이라든가, 실제로 내가 쿠로토에 대해 생각하고 있는 걸 고려하면, 연인 카드가 나와도 이상하지 않다고 생각했어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもね、こうしてクロトに甘えさせてもらっている時……私、本当に、信じられないくらい幸せなの」"
translation = "「하지만 말야, 이렇게 쿠로토에게 응석 부리고 있을 때…… 나, 정말로 믿을 수 없을 만큼 행복해.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この気持ちのことを、カードが示していたんだとしたら……」"
translation = "「이 마음을 카드가 가리키고 있었던 거라면……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私、クロトのことが好きなんだと思うわ」"
translation = "「나, 쿠로토를 좋아하는 것 같아.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナス……"
translation = "비너스……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト。私のものになって」"
translation = "「쿠로토. 나의 것이 되어줘.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私のこともあなたにあげるから……あなたを、私にちょうだい」"
translation = "「나 자신도 당신에게 줄 테니까…… 당신을, 나에게 줘.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私には、あなたが必要だってわかったの」"
translation = "「나에게는, 당신이 필요하다는 걸 알았어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……好きよ、クロト」"
translation = "「……좋아해, 쿠로토.」"

[[dialogue]]
speaker = "unk"
original = "ああ、俺も好きだ──ヴィーナス"
translation = "아아, 나도 좋아해── 비너스."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ええ、嬉しいっ。ありがとう、クロトっ……！」"
translation = "「……응, 기뻐. 고마워, 쿠로토……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私も大好きよ……んっ、ちゅっ」"
translation = "「나도 정말 좋아해…… 음, 쪽.」"

[[dialogue]]
speaker = "unk"
original = "──っ！？"
translation = "──윽!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ね、私の占い、よく当たると思わない？」"
translation = "「──그치, 내 점, 잘 맞는다고 생각하지 않아?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……ちょっと待って、何いきなりカップル誕生の瞬間を見せつけられてるの、私たち？」"
translation = "「……잠깐만, 왜 갑자기 커플 탄생의 순간을 강제로 시청하게 되는 거야, 우리?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩。星徒会内恋愛はＯＫなんでしょうか？」"
translation = "「사샤 선배. 성도회 내 연애는 OK인가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はあぁ……♪\u3000弟と妹の成長を見守る姉の気持ちって、きっとこんな感じなのね～♪」"
translation = "「하아아……♪ 남동생과 여동생의 성장을 지켜보는 언니의 마음이란, 분명 이런 느낌이겠지~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「聞いてなかった」"
translation = "「안 듣고 있어.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あの、ヴィーナス？\u3000そういう大事な告白は、みんなが見てないところでやるべきじゃないかな！？」"
translation = "「저기, 비너스? 그런 중요한 고백은, 남들이 안 보는 데서 해야 하는 거 아냐!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なに言ってるのよ、マトイ」"
translation = "「무슨 소리야, 마토이.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大事なことだから、大切な仲間に見てもらいたかったんじゃない」"
translation = "「중요한 일이니까, 소중한 동료들에게 보여주고 싶었던 거잖아.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……！\u3000全く、あんたって人はいつもいつも……」"
translation = "「……! 정말이지, 당신이란 사람은 언제나 언제나……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──おめでとう、ヴィーナス。会長」"
translation = "「──축하해, 비너스. 회장.」"

[[dialogue]]
speaker = "unk"
original = "ありがとう"
translation = "고마워."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありがとう、マトイ！\u3000あなたのことも大好きよ！\u3000もちろん、サーシャさんも、アナも！」"
translation = "「고마워, 마토이! 너도 정말 좋아해! 물론, 사샤 씨도, 아나도!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら♪\u3000そんな風に言われたら、お姉ちゃん感激しちゃう～」"
translation = "「어머♪ 그렇게 말해주니 언니 감격해버리겠어~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。前会長のサプライズには慣れてますし……嫌いではありませんから」"
translation = "「노 프로블럼. 전 회장님의 서프라이즈에는 익숙하기도 하고…… 싫어하지 않으니까요.」"

[[dialogue]]
speaker = "unk"
original = "笑顔で答える星徒会の皆を見て、ヴィーナスもまた幸せそうな笑顔を浮かべるのだった。"
translation = "웃으며 대답하는 성도회 식구들을 보며, 비너스 또한 행복한 미소를 지었다."

