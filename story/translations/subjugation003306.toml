[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イーーーーッ！」"
translation = "「이이이잇!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いたぞ、モンスターだ！」"
translation = "「저기 있다, 몬스터다!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふぅ。昨日あれだけ意気込んでたのに、雑魚狩りから始めるんだね」"
translation = "「후우. 어제 그렇게 의욕 넘쳤는데, 잡몹 사냥부터 시작하는 거네」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「当然だ。念には念を入れて、もう少しレベルアップしてからボスモンスターに挑みたい」"
translation = "「당연하다. 돌다리도 두드려 보고 건너듯, 조금 더 레벨 업을 한 뒤에 보스 몬스터에게 도전하겠느니라」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふふ、梨緒ちゃんらしいね」"
translation = "「후후, 리오짱답네요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ま、肩慣らしにはちょーどいいか！」"
translation = "「뭐, 몸풀기에는 딱 좋겠네!」"

[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イィーーーッ！！」"
translation = "「이이이잇!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「さぁ、蹴散らすぞ！」"
translation = "「자, 해치우자!」"

[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イィ～～ッ！\u3000イイィィッ！！」"
translation = "「이이잇! 이이이잇!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……今の攻撃が効いていない？」"
translation = "「……방금 공격이 통하지 않았나?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「もしかしてこいつら、強くなってないっ？」"
translation = "「설마 이 녀석들, 강해진 거 아냐?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「う、うんっ。昨日最後に戦った時は、もっと普通に倒せたもんっ」"
translation = "「으, 응. 어제 마지막에 싸웠을 때는 더 쉽게 쓰러뜨렸는걸요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「喋ってる場合じゃないぞっ！\u3000本気でかからないとヤバいっ！」"
translation = "「떠들고 있을 때가 아니야! 진심으로 덤비지 않으면 위험해!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああっ、全力で一気に片を付けようっ！！」"
translation = "「아아, 전력으로 단숨에 끝내버리자!!」"

[[dialogue]]
speaker_original = "水着フワッチ"
speaker_translation = "수영복 후왓치"
original = "「イィィッッ～～…………！！？」"
translation = "「이이이잇~~…………!!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふー、危ねーところだったな……」"
translation = "「후, 위험할 뻔했네……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まさか日ごとに敵が強くなっていく仕様なのか？」"
translation = "「설마 날이 갈수록 적이 강해지는 사양인가?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「だとしても上がり幅が異常でしょ……。調整ミスってるって」"
translation = "「그렇다 해도 상승폭이 이상하잖아…… 밸런스 조절 미스라니까」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ちまちまモンスターを倒してる場合じゃないかも……。ボスもこの調子で強くなっているとしたら……」"
translation = "「야금야금 몬스터를 잡고 있을 때가 아닐지도 몰라요……. 보스도 이런 식으로 강해지고 있다면……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「明日になればとても手が付けられなくなりそうだな……。今日中に倒さねば、敗北は必至だ」"
translation = "「내일이 되면 도저히 손을 쓸 수 없게 될 것 같군……. 오늘 안에 쓰러뜨리지 못하면 패배는 필연적이니라」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「レベル上げは、ボスモンスターを探しながらにしよう！\u3000早急にボスを探し出した方がいいっ！」"
translation = "「레벨 업은 보스 몬스터를 찾으면서 하자! 조속히 보스를 찾아내는 게 좋겠느니라!」"

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「ギィィィーーーー！」"
translation = "「기이이이이!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「見つけたぞ、あそこだっ」"
translation = "「찾았다, 저기다!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「気配でわかるよ。やっぱり昨日よりずっと強くなってる」"
translation = "「기척으로 알 수 있어요. 역시 어제보다 훨씬 강해졌네요」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「道中でそこそこレベルも上げたつもりだったのに……。これ、まだまだレベリング足りてなくない？」"
translation = "「오는 길에 나름 레벨도 올렸다고 생각했는데……. 이거, 아직 레벨링이 부족한 거 아냐?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ここまで来たらレベルなんて見せかけだぜっ！\u3000足りないレベルはチームワークと根性で補えばいいっ！」"
translation = "「여기까지 왔으면 레벨 따위 겉치레라구! 부족한 레벨은 팀워크와 근성으로 메우면 돼!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「アポロの言う通りだ。私たちだって昨日とは違う」"
translation = "「아폴로의 말이 맞느니라. 우리도 어제와는 다르다」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そうだね。水着フォームの力も使い慣れてきたし……！」"
translation = "「맞아요. 수영복 폼의 힘도 익숙해졌으니까요……!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ま、修行の集大成って感じで挑んでみますか。ただ遊んでたわけじゃないってとこ、見せてあげるよ」"
translation = "「뭐, 수행의 집대성이라는 느낌으로 도전해 볼까. 그냥 놀기만 한 게 아니라는 걸 보여줄게」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「サンダーボルトプランジっ！！」"
translation = "「선더볼트 플런지!!」"

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「ギィィィ～～～～！？」"
translation = "「기이이이~~!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おおっ、強烈なスパイクだなっ！」"
translation = "「오오, 강력한 스파이크인걸!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ふふ、アポロのアタックを参考にさせてもらったんだ。勝負を決めたあの一撃、すごかったからね」"
translation = "「후후, 아폴로의 공격을 참고했거든. 승부를 결정지었던 그 일격, 대단했으니까」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私もみんなと海で遊んだこと、無駄にするわけにはいかないっ！」"
translation = "「저도 모두와 바다에서 논 것, 헛되게 할 수는 없어요!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「サンシェードブリッツっ！！」"
translation = "「선쉐이드 블리츠!!」"

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「ギィアっ、ギギィィ……！？」"
translation = "「기아악, 기기이……!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こいつはイケるぜっ！\u3000このまま押し切っちまおうっ！」"
translation = "「이거 해볼 만하다구! 이대로 밀어붙이자!」"

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「ギィアアアアアーーッッ！！」"
translation = "「기아아아아아아악!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「って──全然効いてないっ！？」"
translation = "「어라── 전혀 안 통하잖아!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、確実にダメージは与えられている。ここからは根比べだっ」"
translation = "「아니, 확실히 대미지는 입히고 있느니라. 여기서부터는 끈기 싸움이다」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「また長期戦ってわけだね。骨が折れちゃいそう」"
translation = "「또 장기전이라는 거네. 뼈가 휘겠어」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「でも勝てるよっ。私たちならっ！」"
translation = "「하지만 이길 수 있어요. 우리라면!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああっ。選管の底力っ、見せてやろうぜっ！！」"
translation = "「아아. 선관의 저력, 보여주자구!!」"

[[dialogue]]
speaker = "unk"
original = "選管の４人とモンスターの激しい攻防が続き──"
translation = "선관 4명과 몬스터의 격렬한 공방이 이어지고──"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「はぁ、はぁ……これで決める……！」"
translation = "「하아, 하아…… 이걸로 끝낼 거야……!」"

[[dialogue]]
speaker_original = "スクアルス"
speaker_translation = "스쿠알스"
original = "「ギィアッ……！\u3000ギッ、ギギギッ、ギィィ～～……！！」"
translation = "「기아악……! 기, 기기기, 기이이~~……!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁはぁ、倒した……のか？」"
translation = "「하아 하아, 쓰러뜨린…… 건가?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「みたい、だね……」"
translation = "「그런 것, 같네요……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へへ、圧勝だったぜ……」"
translation = "「헤헤, 압승이었다구……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ギリギリもいいところだったでしょ……。もうヘトヘトだよ……」"
translation = "「아슬아슬하기 짝이 없었잖아…… 이제 녹초야……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが、勝った。クリアしたんだな、私たちは……！\u3000あの新星星徒会よりも先に──！」"
translation = "「하지만 이겼다. 클리어한 것이군, 우리는……! 저 신성 성도회보다 먼저──!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ふふ、やったね、梨緒ちゃん」"
translation = "「후후, 해냈네요, 리오짱」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あとで魔王たちの悔しがる顔、みんなで見に行こーぜっ」"
translation = "「나중에 마왕 녀석들이 분해하는 얼굴, 다 같이 보러 가자구」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ジグにもいい報告ができるんじゃない？\u3000それ見たことかって」"
translation = "「지그한테도 좋은 보고를 할 수 있지 않겠어? 그것 봐라 하면서」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「みんな、ぐす、ありがとう……！\u3000みんなのおかげだ……！」"
translation = "「다들, 흑, 고맙느니라……! 다들 덕분이다……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「えへへ、も～泣き虫さんなんだから」"
translation = "「에헤헤, 정말~ 울보라니까요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「少し休んだらリップルを探しに行こうぜ。首を長くしてクリア報告を待ってるはずだ」"
translation = "「좀 쉬었다가 리플을 찾으러 가자. 목을 길게 빼고 클리어 보고를 기다리고 있을 거야」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「たっぷり文句を言ってあげなくちゃ。急激に難易度上げすぎだって」"
translation = "「한바탕 잔소리를 해줘야겠어. 난이도를 너무 급격하게 올렸다고」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふふ、そうだな。よし、それじゃリップルのところに──」"
translation = "「후후, 그렇군. 좋아, 그럼 리플이 있는 곳으로──」"

[[dialogue]]
speaker_original = "デネブ・カイトス"
speaker_translation = "데네브 카이토스"
original = "「グオオオオオオォォ～～！！！」"
translation = "「구오오오오오오오오~~!!!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「よ──」"
translation = "「리──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「避けろぉぉッッ！！！」"
translation = "「피해라아아아!!!」"

