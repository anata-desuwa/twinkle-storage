[[dialogue]]
speaker = "unk"
original = "第９話,フィヴォス流星群,B"
translation = "제9화, 피보스 유성군, B"

[[dialogue]]
speaker = "unk"
original = "同刻・人間界──"
translation = "동시각・인간계──"

[[dialogue]]
speaker = "ルリエル"
original = "「ひ……ひええぇぇ～！\u3000こ、これは一体どういうことなのですか～～～！！」"
translation = "「히…… 히에에에에엥～! 이, 이것은 대체 무슨 일인 것입니까～～～!!」"

[[dialogue]]
speaker = "アナ"
original = "「星読事変の時と同じメルヘンな空──しかし、何かが違う……？」"
translation = "「별 읽기 사변 때와 같은 동화 같은 하늘── 하지만, 무언가가 다르다……?」"

[[dialogue]]
speaker = "セーラ"
original = "「向こうのアステラは消滅させといたよー。んでも、まだまだ序の口ってカンジかな～」"
translation = "「저쪽의 아스테라는 소멸시켜 뒀어ー. 근데, 아직 시작일 뿐인 느낌이랄까～」"

[[dialogue]]
speaker = "unk"
original = "<ruby>遡<rt>さかのぼ</rt></ruby>ること小一時間ほど前から、この異常事態は続いていた。"
translation = "거슬러 올라가 한 시간 정도 전부터, 이 이상 사태는 계속되고 있었다."

[[dialogue]]
speaker = "unk"
original = "度重なるアクシデントの中、彼女たちは示し合わせたように空を見上げる──"
translation = "거듭되는 사고 속, 그녀들은 약속이라도 한 듯 하늘을 올려다본다──"

[[dialogue]]
speaker = "ルリエル"
original = "「！\u3000今、お空に星が光りました──」"
translation = "「! 지금, 하늘에 별이 빛났습니다──」"

[[dialogue]]
speaker = "アナ"
original = "「来ます──！」"
translation = "「옵니다──!」"

[[dialogue]]
speaker = "unk"
original = "彼女たちが叫ぶやいなや、一筋の流れ星が地上へと駆け抜けた。同時に地面を衝撃が揺らす。"
translation = "그녀들이 외치자마자, 한 줄기 유성이 지상으로 달려 나갔다. 동시에 지면을 충격이 흔든다."

[[dialogue]]
speaker = "ルリエル"
original = "「お……<ruby>墜<rt>お</rt></ruby>ちちゃいました……！？」"
translation = "「떨…… 떨어졌습니다……!?」"

[[dialogue]]
speaker = "アナ"
original = "「いえ、ギリギリのところで──」"
translation = "「아뇨, 아슬아슬한 순간에──」"

[[dialogue]]
speaker = "アニマ"
original = "「こないだ試作した人工衛星で──なんとか方向を逸らしたゾ。ただし、いつまで凌ぎきれるかはわからなイ」"
translation = "「지난번에 시제품으로 만든 인공위성으로── 간신히 방향을 틀었지. 다만, 언제까지 버틸 수 있을지는 모르겠어」"

[[dialogue]]
speaker = "ルリエル"
original = "「おおっ、購買部の……！」"
translation = "「오옷, 구매부의……!」"

[[dialogue]]
speaker = "アナ"
original = "「ありがとうございます──アニマ先輩。助かりました」"
translation = "「감사합니다── 아니마 선배. 살았습니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「大丈夫ダ。これも、アナの落下地点予測が正確なおかげだからナ」"
translation = "「괜찮아. 이것도, 아나의 낙하 지점 예측이 정확했던 덕분이니까.」"

[[dialogue]]
speaker = "セーラ"
original = "「アステラも、モンスターも、隕石も……キリないね。本当にどこもかしこもパニックみたい」"
translation = "「아스테라도, 몬스터도, 운석도…… 끝이 없네. 정말 사방이 패닉인 것 같아」"

[[dialogue]]
speaker = "アナ"
original = "「この騒ぎはもう全世界に広がっているようで……あ！\u3000新しいニュースです──」"
translation = "「이 소란은 이미 전 세계로 퍼지고 있는 듯하며…… 아! 새로운 뉴스입니다──」"

[[dialogue]]
speaker = "キャスター"
original = "『──引き続き速報です。現在、流星市国を中心に、空から無数の彗星が落下しているのが確認されています』"
translation = "『──계속해서 속보입니다. 현재, 유성 시국을 중심으로, 하늘에서 무수한 혜성이 낙하하고 있는 것이 확인되고 있습니다』"

[[dialogue]]
speaker = "キャスター"
original = "『また、上空一帯が謎の模様に埋め尽くされるなど、以前の事件にも似た様相を呈しており……』"
translation = "『또한, 상공 일대가 수수께끼의 무늬로 뒤덮이는 등, 이전 사건과도 유사한 양상을 띠고 있으며……』"

[[dialogue]]
speaker = "キャスター"
original = "『一連の不可解な現象が、近づくリクリエの影響にあることは明白と思われます──』"
translation = "『일련의 불가사의한 현상이, 다가오는 리크리에의 영향에 있음은 명백하다고 생각됩니다──』"

[[dialogue]]
speaker = "エスメラルダ"
original = "「<ruby>緊急事態<rt>エマージェンシー</rt></ruby>──此度の『フィヴォス流星群』に伴う臨時フォーメーションを通達します！」"
translation = "「긴급 사태── 이번 『필보스 유성군』에 따른 임시 포메이션을 통달합니다!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「全プリマステラ出動！\u3000各自、教員指導のもと速やかにアステラ撃破へ向かいなさい！」"
translation = "「전 프리마 스텔라 출동! 각자, 교원 지도하에 신속하게 아스테라 격파로 향하도록 하세요!」"

[[dialogue]]
speaker = "エスメラルダ"
original = "「また、出動認可の降りていない一般生徒についても学園で待機！\u3000今後の状況次第では──臨時の出動要請もありえます！」"
translation = "「또한, 출동 인가가 내려지지 않은 일반 학생에 대해서도 학원에서 대기! 향후 상황에 따라서는── 임시 출동 요청도 있을 수 있습니다!」"

[[dialogue]]
speaker = "トワ先生"
original = "「みんな、慌てずに落ち着いて行動して──！\u3000何が起こるかわからないから、極力ペア以上で出動に当たるように──！」"
translation = "「모두, 당황하지 말고 침착하게 행동해──! 무슨 일이 일어날지 모르니까, 되도록 페어 이상으로 출동에 임하도록 해──!」"

[[dialogue]]
speaker = "エリス"
original = "「承知です──」"
translation = "「알겠습니다──」"

[[dialogue]]
speaker = "蛍火"
original = "「<ruby>新星学園寮<rt>ラルーナ</rt></ruby>の待機メンバーにも通達します──」"
translation = "「신성 학원 기숙사의 대기 멤버에게도 통달합니다──」"

[[dialogue]]
speaker = "エスメラルダ"
original = "（これは紛れもなくリクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が近づいている証──想定していたより遥かに早い……！）"
translation = "（이것은 틀림없이 리크리에의 본파가 다가오고 있다는 증거── 예상했던 것보다 훨씬 빠르다……!）"

[[dialogue]]
speaker = "エスメラルダ"
original = "（それに──こんな時に限ってセイファート学園長とも連絡がつかないなんて……）"
translation = "（게다가── 이런 때에 한해 세이퍼트 학원장과도 연락이 닿지 않는다니……）"

[[dialogue]]
speaker = "エスメラルダ"
original = "（今の時期は……魔界なら『大いなる冬』が訪れている頃。何かの符号なのかしら──）"
translation = "（지금 시기는…… 마계라면 『대자연의 겨울』이 찾아왔을 때. 무언가의 부호인 걸까──）"

[[dialogue]]
speaker = "ルリエル"
original = "「フィヴォス流星群……」"
translation = "「필보스 유성군……」"

[[dialogue]]
speaker = "アナ"
original = "「そう名付けられたみたいですね。今回の事変は」"
translation = "「그렇게 이름 붙여진 것 같네요. 이번 사변은」"

[[dialogue]]
speaker = "ルリエル"
original = "「なんとか流星群って、前に授業で習った気もするんですが──何でしたっけ？」"
translation = "「무슨 유성군이라고, 전에 수업에서 배운 것 같기도 한데── 무엇이었죠?」"

[[dialogue]]
speaker = "アナ"
original = "「３０００年前──巨大なリクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が訪れる直前、人間界は彗星の雨に見舞われたといいます。それがセレーネ流星群」"
translation = "「3000년 전── 거대한 리크리에의 본파가 찾아오기 직전, 인간계는 혜성의 비를 맞았다고 합니다. 그것이 셀레네 유성군」"

[[dialogue]]
speaker = "アナ"
original = "「察するに今回のこれは……その再来。まさしくリクリエの最前兆に他ならないのではないでしょうか」"
translation = "「짐작하건대 이번 이것은…… 그 재래. 그야말로 리크리에의 최전조임에 틀림없지 않을까요」"

[[dialogue]]
speaker = "セーラ"
original = "「３０００年越しの本格的な予兆──それに星騎士の総動員、か……最高にヤバそうだね」"
translation = "「3000년 만의 본격적인 예조── 게다가 성기사의 총동원이라니, 최고로 위험할 것 같네」"

[[dialogue]]
speaker = "unk"
original = "世界を刷新するリクリエに先駆けて奏でられる彗星たちの<ruby>輪舞曲<rt>ロンド</rt></ruby>。"
translation = "세계를 쇄신하는 리크리에에 앞서 연주되는 혜성들의 윤무곡."

[[dialogue]]
speaker = "unk"
original = "それを防ぐ役目にあるのは今回、クルセイダースではなく彼女ら<ruby>星騎士<rt>スターナイト</rt></ruby>たちだ。"
translation = "그것을 막을 역할은 이번, 크루세이더스가 아닌 그녀들 <ruby>성기사<rt>스타 나이트</rt></ruby>들이다."

[[dialogue]]
speaker = "アナ"
original = "「現在観測されている彗星の大きさは平均半径約３００ｍ──大きなものでは数ｋｍにまで達するそうです」"
translation = "「현재 관측되고 있는 혜성의 크기는 평균 반경 약 300m── 큰 것은 수 km에까지 달한다고 합니다」"

[[dialogue]]
speaker = "アナ"
original = "「地上、海上どちらにせよ、一発でも墜落すれば世界的な壊滅は免れないでしょう」"
translation = "「지상, 해상 어느 쪽이든, 한 발이라도 추락하면 세계적인 괴멸은 면할 수 없을 것입니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「それに加えてアステラとモンスターの対処まで……ひええ！\u3000目が回りますぅ～！」"
translation = "「게다가 아스테라와 몬스터 대처까지…… 히에에! 눈이 핑핑 돕니다아～!」"

[[dialogue]]
speaker = "セーラ"
original = "「うちらが頑張んなきゃダメっしょ、ルリっち。リクリエの本体が近づいてるっていうなら──今こそ星騎士の出番ってワケだし」"
translation = "「우리들이 힘내야지, 루리치. 리크리에 본체가 다가오고 있다는 거라면── 지금이야말로 성기사의 차례라는 거지」"

[[dialogue]]
speaker = "アナ"
original = "「ですね。今までの出動も訓練も何もかも──これからのためにあったのですから」"
translation = "「그렇습니다. 지금까지의 출동도 훈련도 모든 것이── 앞으로를 위해 있었던 것입니다」"

[[dialogue]]
speaker = "アニマ"
original = "「よい心がけダ。アニマもまた、これをまたとない機会と捉えル。この時のために数多の発明品を興してきタ」"
translation = "「좋은 마음가짐이야. 아니마 또한, 이것을 더할 나위 없는 기회로 여긴다. 이 때를 위해 수많은 발명품을 일으켜 왔지」"

[[dialogue]]
speaker = "アニマ"
original = "「我が魂のすべてを賭しても……真理の一片を掴んでみせル……！」"
translation = "「내 영혼의 모든 것을 걸고서라도…… 진리의 한 조각을 붙잡아 보이겠어……!」"

[[dialogue]]
speaker = "unk"
original = "これから世界は波に呑まれる。"
translation = "앞으로 세계는 파도에 휩쓸린다."

[[dialogue]]
speaker = "unk"
original = "三界も、平行世界も、何もかもを無に帰して<ruby>再創生<rt>リクリエイト</rt></ruby>しようという終焉の厄災によって。"
translation = "삼계도, 평행 세계도, 모든 것을 무로 돌려 재창생하려는 종언의 재앙에 의해."

[[dialogue]]
speaker = "unk"
original = "彼女たち残された両星徒会のメンバーは一致団結し、<b>彼ら</b>の隙を埋めるように戦うことを決めた。"
translation = "그녀들 남겨진 양 성도회의 멤버는 일치단결하여, <b>그들의</b> 빈틈을 메우듯이 싸우기로 결심했다."

[[dialogue]]
speaker = "ズシオーン"
original = "「──グワアアアアアッ！！」"
translation = "「──그와아아아아앗!!」"

[[dialogue]]
speaker = "アニマ"
original = "「おっと──囲まれていタ。これは参ったネ。しかし珍しいモンスターだ、フヒヒ。サンプルが少々欲しいところダが……」"
translation = "「이런── 포위당했군. 이거 곤란하네. 하지만 희귀한 몬스터다, 후히히. 샘플이 조금 필요한데……」"

[[dialogue]]
speaker = "アナ"
original = "「アニマ先輩、下がって──」"
translation = "「아니마 선배, 물러서세요──」"

[[dialogue]]
speaker = "キリカ"
original = "「──失敬。手癖が悪くてすみません」"
translation = "「──실례. 손버릇이 나빠서 죄송합니다.」"

[[dialogue]]
speaker = "アニマ"
original = "「おお。助かったゾ！\u3000さてさて、モンスターの残骸は回収させてもらおうかナ？」"
translation = "「오오. 살았어! 자자, 몬스터의 잔해는 회수하도록 할까?」"

[[dialogue]]
speaker = "アナ"
original = "「あなたは、流星会長のメイドの……！」"
translation = "「당신은, 유성 회장의 메이드……!」"

[[dialogue]]
speaker = "セーラ"
original = "「キリカさん──！\u3000フィオナちゃんまだ戻ってきてないけど、大丈夫なの……！？」"
translation = "「키리카 씨──! 피오나 짱은 아직 안 돌아왔는데, 괜찮은 거야……!?」"

[[dialogue]]
speaker = "キリカ"
original = "「はい。魔界へ発ったお嬢様との連絡は未だ繋がりませんが……留守を任された身ですので」"
translation = "「네. 마계로 떠나신 아가씨와의 연락은 아직 닿지 않지만…… 부재를 맡은 몸이기에」"

[[dialogue]]
speaker = "キリカ"
original = "「今はひとまず──<ruby>人間界<rt>こちら</rt></ruby>のことをどうにかするのが先決でしょう。帰ってきたお嬢様を落胆させるわけにはいきませんから」"
translation = "「지금은 우선── 인간계의 일을 어떻게든 하는 것이 선결일 것입니다. 돌아오신 아가씨를 낙담시킬 수는 없으니까요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「むむっ……その通りでありますね！」"
translation = "「무무읏…… 그 말씀대로입니다!」"

[[dialogue]]
speaker = "セーラ"
original = "「ヴィーナスちゃんのことも……うちらは信じて待つっきゃないか」"
translation = "「비너스 짱의 일도…… 우리들은 믿고 기다릴 수밖에 없겠네」"

[[dialogue]]
speaker = "アナ"
original = "「……大丈夫です、きっと。会長たちなら」"
translation = "「……괜찮습니다, 분명. 회장님들이라면」"

[[dialogue]]
speaker = "キリカ"
original = "「ええ。信じましょう。あのお方も──手は講じると、約束していただけましたしね」"
translation = "「네. 믿읍시다. 그분도── 손을 쓰겠다고, 약속해 주셨으니까요.」"

[[dialogue]]
speaker = "unk"
original = "キリカは遠い目をして空を見た。"
translation = "키리카는 먼 눈으로 하늘을 보았다."

[[dialogue]]
speaker = "unk"
original = "その方角には、先刻訪れた九浄の屋敷がある。"
translation = "그 방향에는, 조금 전 찾아갔던 쿠죠 저택이 있다."

[[dialogue]]
speaker = "キリカ"
original = "「今宵の空には見覚えがあります。リクリエ現象と言っても、その中心には──原因としての本体がいるはずです」"
translation = "「오늘 밤의 하늘은 본 적이 있습니다. 리크리에 현상이라고 해도, 그 중심에는── 원인으로서의 본체가 있을 것입니다.」"

[[dialogue]]
speaker = "ルリエル"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "アナ"
original = "「『星読事変』の際は──この空が現れた時……」"
translation = "「『별 읽기 사변』 때는── 이 하늘이 나타났을 때……」"

[[dialogue]]
speaker = "セーラ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ルリエル"
original = "（そうでした……この空の正体は、あの女の子で……）"
translation = "（그랬습니다…… 이 하늘의 정체는, 그 여자아이였고……）"

[[dialogue]]
speaker = "アナ"
original = "（フィオナ先輩のお姉さん──）"
translation = "（피오나 선배의 언니──）"

[[dialogue]]
speaker = "セーラ"
original = "「あー……あのね、キリカさん。その仮面の女の子ってのは──」"
translation = "「아ー…… 저기, 키리카 씨. 그 가면 쓴 여자아이는 말이야──」"

[[dialogue]]
speaker = "キリカ"
original = "「お嬢様より……<ruby>経緯<rt>いきさつ</rt></ruby>は聞いております。彼女が、リクリエに囚われた使徒だということも」"
translation = "「아가씨에게서…… 경위는 들었습니다. 그녀가, 리크리에에 사로잡힌 사도라는 것도」"

[[dialogue]]
speaker = "アナ"
original = "「それでも──立ち向かうのですか？」"
translation = "「그런데도── 맞서 싸우시는 겁니까?」"

[[dialogue]]
speaker = "キリカ"
original = "「無論。私もまた、卒業した身とはいえ星騎士──元凶から目を背けるほど愚かではありません」"
translation = "「물론. 저 또한, 졸업한 몸이라고는 하나 성기사── 원흉에서 눈을 돌릴 만큼 어리석지 않습니다.」"

[[dialogue]]
speaker = "キリカ"
original = "「もっとも──願わくは、<b>どちらのお嬢様にとっても</b>良い結末になってくれればと、思うのですが」"
translation = "「무엇보다── 바라건대, <ruby>두 분 아가씨 모두에게<rt>・ ・ ・・・ ・・・・</rt></ruby> 좋은 결말이 되어주기를, 하고 생각합니다만」"

[[dialogue]]
speaker = "ルリエル"
original = "「キリカさん……」"
translation = "「키리카 씨……」"

[[dialogue]]
speaker = "アナ"
original = "（流星会長の邸宅で眠りについているのが、アポロの本体……）"
translation = "（유성 회장의 저택에서 잠들어 있는 것이, 아폴로의 본체……）"

[[dialogue]]
speaker = "セーラ"
original = "（キリカさんは昔からフィオナちゃんのお世話係だったっていうから──姉妹２人のことも、当然わかってるっぽいね）"
translation = "（키리카 씨는 예전부터 피오나 짱의 시중을 들었다고 하니까── 자매 두 사람의 일도, 당연히 알고 있는 것 같네）"

[[dialogue]]
speaker = "unk"
original = "３人の脳裏に──いつか見た光景がよぎる。"
translation = "세 사람의 뇌리에── 언젠가 본 광경이 스쳐 지나간다."

[[dialogue]]
speaker = "unk"
original = "キリカもまた、星見の家の一員として、フィオナと同じ思いで戦ってきたのではないかと……。"
translation = "키리카 또한, 별을 보는 집안의 일원으로서, 피오나와 같은 마음으로 싸워온 것이 아닐까 하고……."

[[dialogue]]
speaker = "アニュラス"
original = "「──私も同行する」"
translation = "「──나도 동행하겠다」"

[[dialogue]]
speaker = "アナ"
original = "「アニュラス、さん……」"
translation = "「아뉴라스, 씨……」"

[[dialogue]]
speaker = "アニュラス"
original = "「至急戦力が必要と聞いた──今こそ私の剣を振るうべき時だろう。フィオナ会長が不在の時、流星市国を守るようにと命じられたのだ」"
translation = "「급히 전력이 필요하다고 들었다── 지금이야말로 나의 검을 휘두를 때일 것이다. 피오나 회장이 부재할 때, 유성 시국을 지키라고 명을 받았다」"

[[dialogue]]
speaker = "セーラ"
original = "「新星学園長さんの娘さん……だよね？\u3000うんうん、強そうだしもち必要だよ」"
translation = "「신성 학원장 씨의 따님…… 맞지? 응응, 강해 보이고 당연히 필요하지」"

[[dialogue]]
speaker = "ルリエル"
original = "「そういえば、学園長さんの姿が見えませんね……？\u3000<ruby>流星<rt>うち</rt></ruby>の学園長さんがいないのはいつものことですが……」"
translation = "「그러고 보니, 학원장님의 모습이 보이지 않네요……? 우리 학원장님이 안 계신 건 늘 있는 일이지만……」"

[[dialogue]]
speaker = "アニュラス"
original = "「お父様とも……長らく連絡がついていない。どこかできっと、この騒ぎも聞きつけていると思うのだが」"
translation = "「아버님과도…… 오랫동안 연락이 닿지 않고 있다. 어딘가에서 분명, 이 소란도 듣고 계실 거라고 생각하지만」"

[[dialogue]]
speaker = "アニュラス"
original = "「……どうしてだろうな。今は私が、父の代わりに頑張らねばならない気がする。セイファートの、名にかけて……」"
translation = "「……왜일까. 지금은 내가, 아버지를 대신해 힘내야 할 것 같은 기분이 든다. 세이퍼트의, 이름을 걸고……」"

[[dialogue]]
speaker = "アナ"
original = "（アニュラスさん……仮面でわかりづらいけど、泣いてる……？）"
translation = "（아뉴라스 씨…… 가면 때문에 알기 어렵지만, 울고 있는 건가……?）"

[[dialogue]]
speaker = "アニュラス"
original = "「……すまない。うまく言えないが……使命感が湧き上がってきている。そんな気がするんだ。星騎士なら皆かもしれないが」"
translation = "「……미안하다. 잘 말은 못 하겠지만…… 사명감이 솟아오르고 있다. 그런 기분이 든다. 성기사라면 모두 그럴지도 모르지만」"

[[dialogue]]
speaker = "アニュラス"
original = "「今はただ……無性に剣を振るいたい。これまでに鍛えてきた私の力が、人々を救えるはずだと信じて」"
translation = "「지금은 그저…… 무작정 검을 휘두르고 싶다. 지금까지 단련해 온 나의 힘이, 사람들을 구할 수 있을 것이라고 믿으며」"

[[dialogue]]
speaker = "アニュラス"
original = "「私の尊敬する父ならきっと──全力を尽くせと言うだろうからな。どんなに強大な相手でも」"
translation = "「내가 존경하는 아버지라면 분명── 전력을 다하라고 말할 테니까. 아무리 강대한 상대라도」"

[[dialogue]]
speaker = "キリカ"
original = "「……星騎士として、素晴らしい心がけかと」"
translation = "「……성기사로서, 훌륭한 마음가짐이라고 생각합니다.」"

[[dialogue]]
speaker = "セーラ"
original = "「そーいえば、会長さんがライバルなんだもんね？\u3000今のうちに超活躍して、戻ってきたときびっくりさせちゃお！」"
translation = "「그러고 보니, 회장 씨가 라이벌인 거잖아? 지금 실컷 대활약해서, 돌아왔을 때 깜짝 놀라게 해 주자!」"

[[dialogue]]
speaker = "アナ"
original = "「確かに。ここで目覚ましい戦果を挙げれば──会長も一目置くこと間違いなし」"
translation = "「확실히. 여기서 눈부신 전과를 올린다면── 회장도 인정할 것임에 틀림없습니다.」"

[[dialogue]]
speaker = "キリカ"
original = "「なるほど。認めてほしい方というのが、お父上以外にもいらっしゃるのですね」"
translation = "「과연. 인정받고 싶은 분이, 아버지 외에도 계시는군요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「あはは！\u3000アニュラスさんは戦う乙女なのです！」"
translation = "「아하하! 아뉴라스 씨는 싸우는 소녀인 것입니다!」"

[[dialogue]]
speaker = "アニュラス"
original = "「ば、馬鹿にするなっ！\u3000私はただ父の背を追いかけているだけだ──あの男など眼中にない！\u3000いや、多少はあるが……」"
translation = "「바, 바보 취급하지 마! 나는 그저 아버지의 등을 쫓고 있을 뿐이다── 그 남자 따위 안중에 없어! 아니, 조금은 있지만…….」"

[[dialogue]]
speaker = "アニュラス"
original = "「いいからとっとと出動するぞ──星徒会！\u3000私に遅れを取るんじゃないぞ──！」"
translation = "「됐으니 어서 출동한다── 성도회! 나에게 뒤처지지 마라──!」"

