[[dialogue]]
speaker = "unk"
original = "第３話,ルルカと恋人ＡＳＭＲ・前編,P"
translation = "제3화, 루루카와 연인 ASMR·전편, P"

[[dialogue]]
speaker = "unk"
original = "バレンタインの後日。"
translation = "발렌타인 며칠 뒤."

[[dialogue]]
speaker = "ルルカ"
original = "「ふふふっ……どう？\u3000イクシーちゃん」"
translation = "「후후후…… 어때? 익실이짱」"

[[dialogue]]
speaker = "イクシリオン"
original = "「こ、これは……！\u3000あっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「이, 이것은……! 앗<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "い、イクシー、なんか凄い声出てるけど……"
translation = "이, 익실아, 왠지 엄청난 소리가 나는데……"

[[dialogue]]
speaker = "イクシリオン"
original = "「ひゃっ！？\u3000か、会長！？」"
translation = "「히얏!? 회, 회장님!?」"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、お兄ちゃん！\u3000もしかして迎えに来てくれたの？」"
translation = "「앗, 오빠! 혹시 데리러 와준 거야?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はうぅ……<emoji=heart04>\u3000会長に、恥ずかしいところを見られてしまいました……！」"
translation = "「하우우……<emoji=heart04> 회장님께 부끄러운 모습을 보여버리고 말았습니다……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「実はね～、イクシーちゃんが『ＡＳＭＲ』を聞いたことないって言うから、オススメ作品をイヤホンで試してもらってたんだ♪」"
translation = "「사실은 말이야~, 익실이짱이 『ASMR』을 들어본 적 없다고 하길래, 추천 작품을 이어폰으로 테스트해 보게 하고 있었어♪」"

[[dialogue]]
speaker = "unk"
original = "実はルルカは、ＡＳＭＲ――聴覚を心地よく刺激する音声が好きで、日常的によく聴いていたりする。"
translation = "사실 루루카는 ASMR―― 청각을 기분 좋게 자극하는 음성을 좋아해서, 일상적으로 자주 듣곤 한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「み、耳かきをしてもらう音声だとは聞いていましたが……イヤホンで聴くと、本当に耳かきをされているようで……<emoji=heart04>」"
translation = "「귀, 귀를 파주는 음성이라고는 들었습니다만…… 이어폰으로 들으니 정말로 귀를 파주는 것 같아서……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「み、耳がゾワゾワして、こそばゆいのに気持ちよくて……まさかここまでとは思いませんでした……<emoji=heart04>」"
translation = "「귀, 귀가 간질간질하면서도 기분 좋아서…… 설마 이 정도일 줄은 몰랐습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「でしょ～？\u3000いい作品は特殊なマイクで録ってるから、臨場感がほんとにすごいの♪」"
translation = "「그치? 좋은 작품은 특수 마이크로 녹음하니까, 현장감이 정말 대단해♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "「い、今のは女性がしてくれるものでしたが……これがもし……」"
translation = "「지, 지금 건 여성이 해주는 것이었습니다만…… 이게 만약……」"

[[dialogue]]
speaker = "ルルカ"
original = "「え？\u3000イクシーちゃん、なんて？」"
translation = "「에? 익실이짱, 뭐라고?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あっ、いえっ！\u3000なんでもありません！\u3000イヤホン貸してくださって、ありがとうございます。わ、私も後で色々試してみますね……♪」"
translation = "「앗, 아뇨! 아무것도 아닙니다! 이어폰 빌려주셔서 감사합니다. 저, 저도 나중에 이것저것 시도해볼게요……♪」"

[[dialogue]]
speaker = "イクシリオン"
original = "（ルルカさんは『男性向け』だと仰っていましたが……それはつまり『女性向け』もあるということですよね……）"
translation = "（루루카 씨는 『남성용』이라고 말씀하셨지만…… 그 말은 즉 『여성용』도 있다는 뜻이겠죠……）"

[[dialogue]]
speaker = "イクシリオン"
original = "（そ、それってつまり……女性ではなく、男性が耳かきをしてくれる音声ということで……<emoji=heart04>）"
translation = "（그, 그건 즉…… 여성이 아니라, 남성이 귀를 파주는 음성이라는 뜻으로……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
original = "「ああっ、いけません<emoji=heart04>\u3000そんなことを考えては……！」"
translation = "「아앗, 안 됩니다<emoji=heart04> 그런 것을 생각해서는……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「い、イクシーちゃん、どうしたの！？\u3000大丈夫！？」"
translation = "「이, 익실이짱, 왜 그래!? 괜찮아!?」"

[[dialogue]]
speaker = "unk"
original = "顔を真っ赤にして悶えるように首を横に振るイクシーに、ルルカは何事かと目をぱちくりさせてしまうのだった。"
translation = "얼굴을 새빨갛게 물들이고 괴로워하듯 고개를 젓는 익실이에게, 루루카는 무슨 일인가 싶어 눈을 동그랗게 뜨는 것이었다."

[[dialogue]]
speaker = "unk"
original = "そんなことがあった週末。その日は、ルルカが俺の家へ遊びに来ていた。"
translation = "그런 일이 있었던 주말. 그날은 루루카가 내 집으로 놀러 와 있었다."

[[dialogue]]
speaker = "ルルカ"
original = "「ふんふん、ふふふ～ん♪\u3000あっ、推しサークルの新作ＡＳＭＲが配信されてる！\u3000これは買っとかないと♪」"
translation = "「흠흠, 후후후~음♪ 앗, 최애 서클의 신작 ASMR이 올라왔다! 이건 사둬야지♪」"

[[dialogue]]
speaker = "unk"
original = "ソファーの上。俺の膝を枕にして、ルルカはＤＩＳＣを操作していた。柔らかな髪が太ももにふれて、くすぐるように揺れる。"
translation = "소파 위. 내 무릎을 베개 삼아, 루루카는 DISC를 조작하고 있었다. 부드러운 머리카락이 허벅지에 닿아, 간지럽히듯 흔들린다."

[[dialogue]]
speaker = "unk"
original = "ちなみに最近のルルカは、バレンタインフォームを気に入っているらしく、俺と過ごす時はよくこの姿に変身していた。"
translation = "참고로 요즘 루루카는 발렌타인 폼이 마음에 드는지, 나와 보낼 때는 자주 이 모습으로 변신해 있었다."

[[dialogue]]
speaker = "unk"
original = "ルルカはＡＳＭＲ、本当に好きだよな"
translation = "루루카는 ASMR, 정말 좋아하는구나."

[[dialogue]]
speaker = "ルルカ"
original = "「うん♪\u3000元々はＶチューバーとしての勉強で聴き始めたものだったけど、気づけばすっかりハマっちゃって～」"
translation = "「응♪ 원래는 VTuber 공부를 위해 듣기 시작한 거였지만, 어느새 완전히 빠져버려서~」"

[[dialogue]]
speaker = "ルルカ"
original = "「え？\u3000――女性向けの、男の人が喋るやつは買ったりしないのかって？\u3000え、えっと……それはそのぉ～……」"
translation = "「에? ――여성용인, 남자가 말하는 건 사지 않냐고? 에, 에또…… 그건 그게에~……」"

[[dialogue]]
speaker = "unk"
original = "ふぅ～～ん、やっぱり聴いたりするんだ"
translation = "흐으~~음, 역시 듣기도 하는구나."

[[dialogue]]
speaker = "ルルカ"
original = "「あ、あれっ？\u3000お兄ちゃん、もしかして……ちょっと嫉妬してる？\u3000ま、待って！\u3000最近は女性向けのは全然聴いてないから！」"
translation = "「어, 어라? 오빠, 혹시…… 조금 질투하고 있어? 자, 잠깐! 요즘은 여성용은 전혀 안 듣고 있으니까!」"

[[dialogue]]
speaker = "ルルカ"
original = "「って、そんなジト目しないで！？\u3000本当だから！\u3000確かに前は買ってたこともあったけど――」"
translation = "「아니, 그런 눈으로 보지 마!? 진짜니까! 확실히 전에는 샀던 적도 있었지만――」"

[[dialogue]]
speaker = "ルルカ"
original = "「今はね、ＡＳＭＲの男性声優さんよりも……お兄ちゃんの声の方が好きだから！」"
translation = "「지금은 말이야, ASMR 남자 성우분들보다…… 오빠 목소리가 더 좋으니까!」"

[[dialogue]]
speaker = "unk"
original = "……声が好きって、生まれて初めて言われた"
translation = "……목소리가 좋다는 말, 태어나서 처음 들어봤어."

[[dialogue]]
speaker = "ルルカ"
original = "「お、お世辞じゃないよ？\u3000本当に……」"
translation = "「비, 빈말 아니야. 정말로……」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたし、お兄ちゃんとイチャイチャしてる時に、『好き』って耳元で囁かれると、胸がきゅーってなっちゃうの……<emoji=heart04>」"
translation = "「나, 오빠랑 꽁냥거리고 있을 때, 『좋아해』라고 귓가에서 속삭여주면, 가슴이 큥 하고 떨려……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「だから最近は、他の男の人の声を聴いても、全然ドキドキしなくなっちゃったっていうか……」"
translation = "「그래서 요즘은 다른 남자 사람 목소리를 들어도 전혀 두근거리지 않게 됐다고나 할까……」"

[[dialogue]]
speaker = "unk"
original = "その言葉に、胸の奥がじんわり甘く溶けていく感じになる。――なら、もっと『特別な音』を聴かせてあげたくなるじゃないか。"
translation = "그 말에 가슴 깊은 곳이 뭉클하고 달콤하게 녹아내리는 기분이 든다. ――그렇다면, 더 『특별한 소리』를 들려주고 싶어지지 않나."

[[dialogue]]
speaker = "ルルカ"
original = "「――えっ？\u3000お兄ちゃんが、あたしに耳かきをしてくれるの……！？」"
translation = "「――엣? 오빠가 나한테 귀를 파준다고……!?」"

[[dialogue]]
speaker = "ルルカ"
original = "「そ、それってつまり……『お兄ちゃんのリアル耳かきＡＳＭＲ』ってこと……！？」"
translation = "「그, 그건 즉…… 『오빠의 리얼 귀 파기 ASMR』이라는 거야……!?」"

[[dialogue]]
speaker = "unk"
original = "俺の声が好きだと言ってくれたから――"
translation = "내 목소리가 좋다고 말해줬으니까――"

[[dialogue]]
speaker = "unk"
original = "ルルカにしてあげたいんだ、と彼女の耳に唇が触れるほどの距離で囁く。"
translation = "루루카에게 해주고 싶어, 라고 그녀의 귀에 입술이 닿을 정도의 거리에서 속삭인다."

[[dialogue]]
speaker = "ルルカ"
original = "「～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「~~~~~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、ルルカの耳先がぴこっと震え、頬が一気に赤く染まった。"
translation = "그 순간, 루루카의 귀 끝이 파르르 떨리고, 뺨이 단숨에 붉게 물들었다."

[[dialogue]]
speaker = "ルルカ"
original = "「お、お兄ちゃん、そんな風に言われたら……<emoji=heart04>」"
translation = "「오, 오빠, 그런 식으로 말하면……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたし、断れなくなっちゃうよぉ……<emoji=heart04>」"
translation = "「나, 거절할 수 없게 돼버려어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を見上げるルルカの瞳は、とろけるような甘い期待に満ちていて。俺はもう１度彼女の耳元に口を寄せて、部屋へ行こうと囁くのだった。"
translation = "나를 올려다보는 루루카의 눈동자는, 녹아내릴 듯한 달콤한 기대에 가득 차 있어서. 나는 다시 한번 그녀의 귓가에 입을 가까이 대고, 방으로 가자고 속삭였다."

