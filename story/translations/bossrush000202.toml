[[dialogue]]
speaker = "梨緒"
original = "「機械型モンスターが初めて出現したのは、私と君が出会う直前のことだったな」"
translation = "「기계형 몬스터가 처음 출현한 것은, 나와 그대가 만나기 직전의 일이었지.」"

[[dialogue]]
speaker = "梨緒"
original = "「ジグが直接私たちの前に姿を現したのはその頃だ」"
translation = "「지그가 직접 우리 앞에 모습을 드러낸 것은 그 무렵이다.」"

[[dialogue]]
speaker = "梨緒"
original = "『ジグ……！？』"
translation = "『지그……!?』"

[[dialogue]]
speaker = "ジグ"
original = "『おや。私のことを知っているのかい？\u3000どこかで会ったかな』"
translation = "『오야. 나에 대해 알고 있는 건가? 어디선가 만난 적이 있나.』"

[[dialogue]]
speaker = "アポロ"
original = "『あたしは知らないぞ。誰だオマエは！？』"
translation = "『난 모른다구. 누구냐 넌!?』"

[[dialogue]]
speaker = "ジグ"
original = "『そうだね、初対面だから名乗らせてもらおう』"
translation = "『그렇군, 초면이니 이름을 밝히도록 하지.』"

[[dialogue]]
speaker = "ジグ"
original = "『私は<ruby>Ｚ<rt>ジグ</rt></ruby>。“真なる神の騎士”だ』"
translation = "『나는 Z. “진정한 신의 기사”다.』"

[[dialogue]]
speaker = "梨緒"
original = "「使徒になったジグは、“真なる神の騎士”を名乗り、私たち星騎士の前に立ちはだかった」"
translation = "「사도가 된 지그는 “진정한 신의 기사”를 자처하며, 우리 성기사들 앞에 가로막아 섰다.」"

[[dialogue]]
speaker = "梨緒"
original = "「それにあの時のジグは、自分がベガの星騎士だったことを覚えていなかった」"
translation = "「게다가 그때의 지그는 자신이 베가의 성기사였다는 것을 기억하지 못했느니라.」"

[[dialogue]]
speaker = "梨緒"
original = "『ジグ、君の相手は、私だ……！』"
translation = "『지그, 네 상대는 나다……!』"

[[dialogue]]
speaker = "ジグ"
original = "『さっきも私を知っているような口ぶりだったけど、どこかで会ったかい？』"
translation = "『방금 전에도 나를 알고 있는 듯한 말투였는데, 어디선가 만난 적이 있나?』"

[[dialogue]]
speaker = "梨緒"
original = "『君は新星学園の星徒会長で、私は副会長だった。忘れたとは言わせないぞ！』"
translation = "『너는 신성 학원의 성도회장이었고, 나는 부회장이었다. 잊었다고 말하게 두지 않겠다!』"

[[dialogue]]
speaker = "ジグ"
original = "『忘れたなぁ。世界を導く使命のために、私は生まれ変わったからね』"
translation = "『잊었는걸. 세계를 인도하는 사명을 위해, 나는 다시 태어났으니까.』"

[[dialogue]]
speaker = "梨緒"
original = "「そしてジグは敵として、従えたモンスターとともに私たち選挙管理委員会に襲いかかってきた」"
translation = "「그리고 지그는 적으로서, 거느린 몬스터와 함께 우리 선거관리위원회에 습격해 왔느니라.」"

