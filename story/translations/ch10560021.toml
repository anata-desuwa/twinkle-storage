[[dialogue]]
speaker = "unk"
original = "第１話,２人の馴れ初め,P"
translation = "제1화, 두 사람의 첫 만남, P"

[[dialogue]]
speaker = "unk"
original = "アムと恋人関係になり、しばらくの月日が経ったある日──"
translation = "아무와 연인 관계가 되고, 어느 정도 세월이 흐른 어느 날──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ん～♪\u3000やっぱりカフェのご飯おいし～！\u3000午後の鍛錬に備えてしっかり補給しとかないとね！」"
translation = "「음~♪ 역시 카페 밥은 맛있어~! 오후 단련에 대비해서 확실히 보급해둬야지!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……アム。私、ここにいてもよいのでしょうか？」"
translation = "「……아무. 저, 여기 있어도 괜찮은 건가요?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え、急にどうしたのエルゼ」"
translation = "「어, 갑자기 왜 그래 엘제.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「いえ。だってアムは会長様とお付き合いをされているのでしょう？\u3000私、お邪魔虫ではないかと気になってしまって」"
translation = "「아니요. 그게 아무는 회장님과 사귀고 계시잖아요? 저, 방해꾼이 아닐까 신경 쓰여서.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あはは、ないない！\u3000お昼は大勢で食べた方がおいしいし！\u3000ねー、会長？」"
translation = "「아하하, 아냐 아냐! 점심은 여럿이서 먹는 게 더 맛있고! 그치, 회장?」"

[[dialogue]]
speaker = "unk"
original = "ああ、もちろん"
translation = "아아, 물론이지."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そ、そうですか。ありがとうございます」"
translation = "「그, 그런가요. 감사합니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……しかし、驚きです。まさかアムと会長様が交際をされるだなんて、想像もしていませんでした」"
translation = "「……하지만, 놀랍네요. 설마 아무와 회장님이 교제하시다니, 상상도 못 했어요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私、実はお友達からもよく訊ねられるのです。お２人はいったいどのような経緯でお付き合いすることになったのかと」"
translation = "「저, 사실 친구들에게도 자주 질문을 받거든요. 두 분은 대체 어떤 경위로 사귀게 된 거냐고.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「特に何も知りません、といつも返しております。ですが──」"
translation = "「딱히 아는 게 없다고 항상 대답하고 있어요. 하지만──」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「うずうず、うずうず……♪」"
translation = "「근질근질, 근질근질……♪」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いや、気になるなら聞いてくれていいよエルゼ？\u3000お嬢様だから、はしたないとか思ってるかもだけど……あたしも会長も気にしないし」"
translation = "「아니, 궁금하면 물어봐도 된다고 엘제? 아가씨라 그런 거 묻는 게 상스럽다고 생각할지도 모르지만…… 나도 회장도 신경 안 쓰니까.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「本当ですか！\u3000実はずっと、ずーっと気になって仕方がなかったのです！」"
translation = "「정말인가요! 사실 계속, 계에속 궁금해서 견딜 수가 없었어요!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「あのがさつで子供っぽいアムと！\u3000学園も歳も離れた会長様が一体どうやって恋人の関係へと至ったのか……！」"
translation = "「그 덜렁대고 어린애 같은 아무와! 학원도 나이도 떨어진 회장님이 대체 어떻게 연인 관계로 발전했는지……!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「なんかどさくさに紛れて失礼なこと言われてる……！？」"
translation = "「어쩐지 어물쩍 넘어가는 척하면서 실례되는 말을 하고 있는 것 같은데……!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「期待してるところ悪いけど、普通だよ？\u3000エルゼが期待してるようなドラマチックな展開はないと思うけど……じゃあ質問どうぞ？」"
translation = "「기대하는 와중에 미안하지만, 평범하다고? 엘제가 기대하는 드라마틱한 전개는 없을 거라 생각하는데…… 그럼 질문해봐.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「で、では。告白したのはどちらからなのですか！？」"
translation = "「그, 그럼. 고백한 건 어느 쪽인가요!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「会長からだよ。放課後に呼び出されて、好きだ～って言われた感じ」"
translation = "「회장 쪽이야. 방과 후에 불러내서, 좋아해~라고 말해준 느낌.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「きゃああっ……♪\u3000甘酸っぱい！\u3000素敵ですわね！」"
translation = "「꺄아아……♪ 새콤달콤해! 멋지네요!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「それでアムはお返事をしたと……！\u3000『あたしも好き』みたいなセリフを言って、ちゅ、ちゅーなんかも……！？」"
translation = "「그래서 아무가 대답을 했다고……! 『나도 좋아해』 같은 대사를 하고, 키, 키스 같은 것도……!?」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ううん。返事は保留にして、決闘を申し込んだよね」"
translation = "「으응. 대답은 보류하고, 결투를 신청했지.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「──は？\u3000えっ？\u3000き、聞き間違いですか？」"
translation = "「──하? 에? 제, 잘못 들은 건가요?」"

[[dialogue]]
speaker = "unk"
original = "アムに決闘を申し込まれたんだ"
translation = "아무에게 결투 신청을 받았어."

[[dialogue]]
speaker = "unk"
original = "聞き間違いじゃないよ"
translation = "잘못 들은 거 아니야."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いやあ、熱かったよねえ、あの日のバトル♪」"
translation = "「이야, 뜨거웠지, 그날의 배틀♪」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「どこが普通なのです！？\u3000確かにドラマチックではありませんが！\u3000なぜ急にバイオレンスな展開に！？」"
translation = "「어디가 평범한 건가요!? 확실히 드라마틱하진 않지만! 왜 갑자기 바이올런스한 전개로!?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「詳しく聞かないことには理解が追い付きません……！\u3000仔細に！\u3000仔細にお願いします！」"
translation = "「자세히 듣지 않고서는 이해가 따라가지 못하겠어요……! 자세히! 자세히 부탁드려요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うーん……負けた勝負のことだから、あんまり話したくないんだけど。エルゼがそう言うなら……」"
translation = "「으음…… 진 승부라 별로 말하고 싶지 않지만. 엘제가 그렇게 말한다면……」"

[[dialogue]]
speaker = "unk"
original = "──俺がアムに告白した日の夜。特別に貸し切った真夜中のアリーナで決闘を行った。"
translation = "──내가 아무에게 고백한 날 밤. 특별히 빌린 한밤중의 아레나에서 결투를 벌였다."

[[dialogue]]
speaker = "unk"
original = "アムは流星附属校にその盾ありと称される、突破困難な守備力を有する相手だ。"
translation = "아무는 유성 부속교에 그 방패가 있다고 칭송받는, 돌파하기 힘든 수비력을 가진 상대다."

[[dialogue]]
speaker = "unk"
original = "受け止めた攻撃はそのまま盾に蓄積され、倍の力の光線となって反射までしてくる強者だが……"
translation = "받아낸 공격은 그대로 방패에 축적되어, 배의 힘을 가진 광선이 되어 반사까지 해오는 강자지만……"

[[dialogue]]
speaker = "unk"
original = "それでも俺は想いを伝えるために、全力でその防御を突破して──"
translation = "그래도 나는 마음을 전하기 위해, 전력으로 그 방어를 돌파해서──"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「はぁっ……はぁあっ……ここまで、かな……やるじゃん会長。あたしの負けだね……」"
translation = "「하아…… 하아…… 여기까지, 인가…… 제법인데 회장. 내가 졌어……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん。星騎士に二言はないよ。決闘に負けたんだもん。約束どおり、今日からあたしは会長の彼女だよ！」"
translation = "「응. 성기사에게 두말은 없어. 결투에서 졌으니까. 약속대로, 오늘부터 난 회장의 여자친구야!」"

[[dialogue]]
speaker = "unk"
original = "決闘しようと言われると思わなかった"
translation = "결투하자고 할 줄은 몰랐어."

[[dialogue]]
speaker = "unk"
original = "まさか告白したら"
translation = "설마 고백했더니."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あはは……まあそこはあたしの性格ってことで！」"
translation = "「아하하…… 뭐 그건 내 성격이라고 치고!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「だってあたしと会長は、お互いに切磋琢磨するライバルでしょ？\u3000この関係、お付き合いが始まってからも続けたいと思ったから……」"
translation = "「그치만 나랑 회장은 서로 절차탁마하는 라이벌이잖아? 이 관계, 사귀기 시작하고 나서도 계속하고 싶다고 생각했으니까……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「会長が、好きな女の子だからって理由で手加減しないかどうか。見極めたかったんだよね」"
translation = "「회장이 좋아하는 여자애라는 이유로 봐주는 건 아닐지. 지켜보고 싶었거든.」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「まあでも余計な心配だったかな……！\u3000会長、全力で戦ってくれたし♪」"
translation = "「뭐 그래도 쓸데없는 걱정이었나……! 회장, 전력으로 싸워줬고♪」"

[[dialogue]]
speaker = "unk"
original = "手加減したら失礼だからな"
translation = "적당히 하면 실례니까."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「うん！\u3000ありがとー、会長！\u3000これからもお互い、一緒に強くなろうね！」"
translation = "「응! 고마워, 회장! 앞으로도 서로, 함께 강해지자!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「いーい、忘れちゃダメだよ？\u3000今日からあたしたちはお付き合いをするけど、星徒会長の座をかけた勝負は終わってないからね！」"
translation = "「이-봐, 잊으면 안 돼? 오늘부터 우린 사귀는 거지만, 성도회장 자리를 건 승부는 끝나지 않았으니까!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしは全力で新星の星徒会長を目指す！\u3000会長は全力で星徒会長の座を守る！」"
translation = "「나는 전력으로 신성의 성도회장을 목표로 할 거야! 회장은 전력으로 성도회장 자리를 지키라고!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「あたしが進級して、いつか……観客でいっぱいのアリーナで、御前試合をするんだからね！」"
translation = "「내가 진급해서, 언젠가…… 관객으로 가득 찬 아레나에서, 어전 시합을 할 거니까!」"

[[dialogue]]
speaker = "unk"
original = "アムの挑戦の日まで俺は会長で居続ける"
translation = "아무의 도전 날까지 나는 회장으로 계속 남아 있을게."

[[dialogue]]
speaker = "unk"
original = "もちろんだ"
translation = "물론이지."

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ありがと！\u3000それじゃ、帰ろっか！」"
translation = "「고마워! 그럼, 돌아갈까!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「え……手を繋ぐの？\u3000そ、そーだよね。恋人同士だもんね……」"
translation = "「에…… 손 잡는 거야? 그, 그렇네. 연인 사이니까……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「……えへへ<emoji=heart04>」"
translation = "「……에헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「──とまあ、こんな感じ」"
translation = "「──뭐 대충, 이런 느낌.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……なるほど。アムらしいと言えば、らしいですわね」"
translation = "「……과연. 아무답다고 하면, 아무답네요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「いきなりのバイオレンス展開に驚きましたが、とても素敵な馴れ初めかと思います。お互いで高めあえる仲、素晴らしいです♪」"
translation = "「갑작스러운 바이올런스 전개에 놀랐습니다만, 무척 멋진 첫 만남이라고 생각해요. 서로를 높여줄 수 있는 사이, 훌륭합니다♪」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「素敵なパートナーができたアムは、これからもっと強い星騎士になると思いますが……私だって負けませんわよ！」"
translation = "「멋진 파트너가 생긴 아무는, 앞으로 훨씬 강한 성기사가 되겠지만…… 저도 지지 않을 거예요!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「もっちろん！\u3000エルゼはあたしのライバル２号だもんね！\u3000これからもよろしくっ♪」"
translation = "「무우울론이지! 엘제는 내 라이벌 2호니까! 앞으로도 잘 부탁해♪」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「……その呼称だけは、どうにかして欲しいところですが」"
translation = "「……그 호칭만큼은, 어떻게든 해주셨으면 합니다만.」"

[[dialogue]]
speaker = "unk"
original = "俺とアムはお互いを想いあう恋人であり、星騎士としての力をぶつけ合うライバルでもある。"
translation = "나와 아무는 서로를 아끼는 연인이자, 성기사로서의 힘을 부딪치는 라이벌이기도 하다."

[[dialogue]]
speaker = "unk"
original = "付き合う以前よりもいっそう、気の置けない仲になれたことが俺も嬉しいのだった──"
translation = "사귀기 전보다 한층 더, 허물없는 사이가 된 것이 나도 기뻤다──"

