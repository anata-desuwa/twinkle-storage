[[dialogue]]
speaker = "unk"
original = "第１０話,選挙管理委員会の幕間,B"
translation = "제10화, 선거관리위원회의 막간, B"

[[dialogue]]
speaker = "unk"
original = "極星学園の襲撃と、ジグの出現から３日が経過した。"
translation = "극성학원의 습격과 지그의 출현으로부터 3일이 경과했다."

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会のメンバーは、梨緒が保健室から出られるようになったことを祝して、カフェテリアに集合していた。"
translation = "선거관리위원회 멤버들은 리오가 보건실에서 나올 수 있게 된 것을 축하하기 위해 카페테리아에 모여 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない、みんな。心配をかけたな」"
translation = "「미안하다, 모두. 걱정 끼쳤군.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ううん、梨緒ちゃんが元気になって良かった」"
translation = "「으응, 리오 짱이 기운 차려서 다행이야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あのままじゃ張り合いがなかったからな。多少はマシな顔になったぞ！」"
translation = "「그대로 있으면 보람이 없었을 테니까 말이야. 제법 봐줄 만한 얼굴이 됐다고!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まぁ落ち着いたなら何より。で、選挙管理委員会として、今後の方針は？」"
translation = "「뭐, 진정됐다면 다행이고. 그래서 선거관리위원회로서 앞으로의 방침은?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ジグがリクリエの使徒として立ちはだかるなら戦う。それは変わらない」"
translation = "「……지그가 리크리에의 사도로서 앞길을 가로막는다면 싸운다. 그건 변함없어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが最善は──」"
translation = "「하지만 최선은──」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「オーッス、選管のみんな！」"
translation = "「오오쓰, 선관 여러분!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「わあっ！？」"
translation = "「와앗!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ど、どうしたんだ紅明？\u3000私たちに用か？」"
translation = "「도, 도대체 무슨 일이지 코우메이? 우리에게 용건이라도?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おうよ！\u3000クイズ大会の表彰式がこの前のゴタゴタでまだだったろ？\u3000そんで賞品を渡しそびれちゃってさ」"
translation = "「당연하지! 퀴즈 대회의 표창식이 저번 소동 때문에 아직이었잖아? 그래서 상품을 전해주는 걸 깜빡해서 말이야.」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「はい、賞品の商品券！\u3000準優勝おめでと～！」"
translation = "「자, 상품인 상품권! 준우승 축하해~!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「商品券はカフェテリアでも使えるから、パーッと使っちゃうのもアリだぜ！\u3000じゃ～な～♪」"
translation = "「상품권은 카페테리아에서도 쓸 수 있으니까, 팍팍 써버리는 것도 방법이라고! 그럼 안녕~♪」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あ、ああ……」"
translation = "「아, 아아……」"

[[dialogue]]
speaker = "unk"
original = "それだけ伝えると、紅明は元気に駆けだしていった。"
translation = "그 말만 전하고 코우메이는 활기차게 달려 나갔다."

[[dialogue]]
speaker = "unk"
original = "いつも通り嵐のような勢いだった。"
translation = "언제나처럼 폭풍 같은 기세였다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「準……優勝……」"
translation = "「준……우승……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……？」"
translation = "「리오 짱……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「選挙管理委員会で力を合わせて、準優勝を勝ち取ることができた。これは大きな成果だ」"
translation = "「선거관리위원회에서 힘을 합쳐 준우승을 쟁취할 수 있었다. 이것은 큰 성과다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが私の気は収まらない……！\u3000次は星徒会に勝つぞ！」"
translation = "「하지만 내 분이 풀리지 않아……! 다음에는 성도회를 이기겠다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ、その通りだぜ！\u3000目指すは優勝、完全勝利だ！」"
translation = "「아아, 바로 그거야! 목표는 우승, 완전 승리다!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あははは……」"
translation = "「아하하하……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あ～あ、せっかくしおらしくしてたのに、いつもの調子に戻っちゃった」"
translation = "「아~아, 간만에 얌전하다 싶었더니 평소 모습으로 돌아와 버렸네.」"

[[dialogue]]
speaker = "unk"
original = "アポロはリベンジする気満々で、ベアトリスは苦笑し、ナターシャは呆れて肩を竦める。"
translation = "아폴로는 복수할 기세가 만만했고, 베아트리스는 쓴웃음을 지었으며, 나타샤는 어이가 없다는 듯 어깨를 으쓱였다."

[[dialogue]]
speaker = "unk"
original = "梨緒と一番気が合うのは、案外最後に加わったアポロなのかもしれない。"
translation = "리오와 가장 마음이 잘 맞는 것은 의외로 마지막에 합류한 아폴로일지도 모른다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「コホン。話を戻そう」"
translation = "「큼큼. 이야기를 되돌리지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今後、私たちも戦い続けるのなら、新しい『リクリエの使徒』……ジグとの戦闘は避けられないだろう」"
translation = "「앞으로 우리도 계속 싸워나간다면, 새로운 『리크리에의 사도』…… 지그와의 전투는 피할 수 없겠지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが同じ星徒会で戦った者として、彼女をリクリエの呪縛から救いたい。それにジグを解放することができれば、大きな戦力となるはずだ」"
translation = "「하지만 같은 성도회에서 싸웠던 자로서, 그녀를 리크리에의 속박에서 구하고 싶다. 게다가 지그를 해방할 수 있다면 큰 전력이 될 터다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おう！\u3000絶対に取り戻すぞ！」"
translation = "「오우! 반드시 되찾아오자고!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よし、ここでおさらいだ！\u3000この間はあんまり詳しく話せなかったところも含めて、改めてあたしから説明するぞ！」"
translation = "「좋아, 여기서 복습이다! 요전에는 자세히 말하지 못했던 부분까지 포함해서, 다시 한번 내가 설명해 주지!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「それって、アポロちゃんにとっては辛い話になるんじゃ……」"
translation = "「그건 아폴로 짱에게 괴로운 이야기가 되지 않을까……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「楽しい話じゃないのはその通りだけど、流星ライダーはいつだってトラウマを克服して強くなるんだ！」"
translation = "「즐거운 이야기가 아닌 건 맞지만, 유성 라이더는 언제나 트라우마를 극복하고 강해지는 법이야!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それにあたしは、今度こそヒーローになるって誓ったからな。あたしの経験で誰かを助けられるなら、やらない理由はないぜ！」"
translation = "「게다가 난 이번에야말로 히어로가 되겠다고 맹세했으니까. 내 경험으로 누군가를 도울 수 있다면 하지 않을 이유가 없지!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……というわけで前に話した通り、リクリエの使徒だったのは、肉体的にはデネブのあたしってことになるな」"
translation = "「……그런 고로 이전에 말한 대로, 리크리에의 사도였던 건 육체적으로는 데네브의 나라는 게 돼.」"

[[dialogue]]
speaker = "unk"
original = "アポロの口から、彼女がリクリエの使徒になり、そして<ruby>妹<rt>フィオナ</rt></ruby>たちによって救われた一部始終が語られる。"
translation = "아폴로의 입을 통해 그녀가 리크리에의 사도가 되고, 그리고 여동생들에 의해 구원받은 전말이 이야기된다."

[[dialogue]]
speaker = "unk"
original = "平行世界デネブとアルタイルの関わりや、緋宮クロトの体にリクリエが封じられていることも、改めてアポロの視点から補足された。"
translation = "평행세계 데네브와 알타이르의 관계나, 히노미야 쿠로토의 몸에 리크리에가 봉인되어 있다는 점도 다시 한번 아폴로의 시점에서 보충되었다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うぅ……話が難しくて、まだ理解できた気がしないよぉ……」"
translation = "「으으…… 이야기가 어려워서 아직 이해가 안 된 것 같아아……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ありがとう、アポロ。何が起こったのか改めて理解できた」"
translation = "「고맙다, 아폴로. 무슨 일이 일어났는지 다시금 이해할 수 있었어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが、緋宮クロトも言っていた通り、ジグは魔王の血統ではない。アポロと同じ手は使えないだろう」"
translation = "「하지만 히노미야 쿠로토도 말했듯이 지그는 마왕의 혈통이 아니다. 아폴로와 같은 수법은 쓸 수 없겠지.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「星騎士だって以前よりもみんなパワーアップしてるんだ！\u3000あたしの時よりももっといい方法だって見つかるはずだぜ」"
translation = "「성기사들도 이전보다 다들 파워 업 했다고! 내 때보다 훨씬 좋은 방법이 분명 발견될 거야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ。すぐには見つからなくても、諦めずに模索していこう」"
translation = "「아아. 금방 찾지 못하더라도 포기하지 않고 모색해 보자.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「あとは……ジグが本当に平行世界から来たって根拠がもう少し欲しいかな」"
translation = "「남은 건…… 지그가 정말로 평행세계에서 왔다는 근거가 조금 더 필요하려나.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「星徒会も嘘は言ってないと思うんだけど、彼らが前提を間違えていた場合、全部の話がひっくり返っちゃうからね」"
translation = "「성도회도 거짓말을 하는 건 아니라고 생각하지만, 그들이 전제를 틀렸을 경우 모든 이야기가 뒤집혀 버리니까.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そ、そうだね……やっぱり情報が多い方がいいと思う」"
translation = "「그, 그렇네…… 역시 정보가 많은 편이 좋다고 생각해.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（私とジグは平行世界から来た可能性が高い。だが──）"
translation = "(나와 지그는 평행세계에서 왔을 가능성이 높다. 하지만──)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（アルタイル、デネブ、ベガ……平行世界は３つあるという。ここはアルタイル。極星学園はデネブにあるらしい）"
translation = "(알타이르, 데네브, 베가…… 평행세계는 세 개가 있다고 한다. 이곳은 알타이르. 극성학원은 데네브에 있는 모양이다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（そうなれば、緋宮クロトの推測通り、私の故郷はベガということになる……）"
translation = "(그렇게 되면 히노미야 쿠로토의 추측대로 나의 고향은 베가라는 것이 된다……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ここは私の生まれた次元ではない……そう考えれば、私を知らないフィオナとエリシア、緋宮クロトの立場の違い、ヴィーナスの存在……様々な違和感に合点がいく）"
translation = "(이곳은 내가 태어난 차원이 아니다…… 그렇게 생각하면 나를 모르는 피오나와 엘리시아, 히노미야 쿠로토의 입장 차이, 비너스의 존재…… 여러 위화감이 앞뒤가 맞는다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ラクシャが言っていた、『覚悟ができたら聞いて』とは……そういう意味なのか？）"
translation = "(락샤가 말했던, 『각오가 생기면 들어줘』라는 건…… 그런 의미였던 건가?)"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん？」"
translation = "「리오 짱?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あ、いや……何でもない。ジグのことを少し考えていただけだ」"
translation = "「아, 아니…… 아무것도 아니다. 지그에 대해 잠시 생각했을 뿐이야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私の仲間はもうみんな死んだと思っていた。ジグが生きていたのは……喜ぶべきことだ」"
translation = "「내 동료들은 이제 모두 죽었다고 생각했다. 지그가 살아있었던 건…… 기뻐해야 할 일이다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが…………」"
translation = "「하지만…………」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……」"
translation = "「리오 짱……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃんだけは、彼女が生きてたことを喜んでいいと思う」"
translation = "「리오 짱만큼은 그녀가 살아있었던 걸 기뻐해도 된다고 생각해.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だって、あのジグって人を知ってるのはもう梨緒ちゃんだけなんでしょ？\u3000だから梨緒ちゃんだけはあの人の味方でいてあげて」"
translation = "「왜냐하면 그 지그라는 사람을 아는 건 이제 리오 짱뿐이잖아? 그러니까 리오 짱만은 그 사람의 편이 되어줘.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ありがとう、ベアト」"
translation = "「……고맙다, 베아토.」"

[[dialogue]]
speaker = "unk"
original = "包み込むように優しく微笑むベアトリスに、梨緒の表情も自然と柔らかくなっていた。"
translation = "감싸 안듯이 상냥하게 미소 짓는 베아트리스에게 리오의 표정도 자연스레 부드러워졌다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そういえば、どうしてレナーテじゃなくてジグなんだ？\u3000ミドルネームだろ、それ」"
translation = "「그러고 보니 왜 레나테가 아니라 지그인 거야? 그거 미들 네임이잖아.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「凄くどうでもいいところを突っ込んだね？」"
translation = "「굉장히 아무래도 좋은 부분을 파고드네?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いや、気になるだろ！」"
translation = "「아니, 궁금하잖아!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まあ、確かにちょっと気になってたけどさ」"
translation = "「뭐, 확실히 조금 신경 쓰이긴 했지만.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……初めて会った時、やつの方からアガサと呼んできたんだ。私たち２人で『ＡｔｏＺ』だと面白がってな。それ以来、ミドルネームで呼び合うようになった」"
translation = "「……처음 만났을 때 그 녀석 쪽에서 나를 아가사라고 불렀다. 우리 둘이 합쳐서 『A to Z』라며 재미있어했지. 그 이후로 미들 네임으로 서로를 부르게 됐다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「当人は忘れた様子で、つゆも知らないといった感じだったがな」"
translation = "「본인은 잊어버린 모양이라 털끝만큼도 모르는 눈치였지만 말이다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「へ～、ジグって変わったやつなんだな。何度も勝負したって言ってたけど、どんくらい勝負したんだ？」"
translation = "「헤~, 지그라는 녀석 특이하네. 몇 번이나 승부했다고 했지, 얼마나 한 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「９９７回。全て負けた」"
translation = "「997회. 전부 졌다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、９９８連敗か。先日は軽くあしらわれてしまった」"
translation = "「아니, 998연패인가. 요전에는 가볍게 농락당했으니까.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いくら何でも勝負しすぎだろ！\u3000そんだけ負けたらいい加減諦めろって！？」"
translation = "「아무리 그래도 너무 많이 싸웠잖아! 그만큼 졌으면 이제 그만 포기하라고!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いいや、負けたままでは終われない。いつか必ず勝つ……！」"
translation = "「아니, 진 채로 끝낼 수는 없다. 언젠가 반드시 이기겠다……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「筋金入りだなぁ……」"
translation = "「아주 뼛속까지 근성이네……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……」"
translation = "「리오 짱……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「いや～、とんでもない委員長についてきちゃったのかもね、私たち」"
translation = "「이야~ 어마어마한 위원장을 따라와 버린 걸지도 모르겠네, 우리들.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ところでベアト、身の上話ついでというか、私も前から気になってたことがあるんだけど……」"
translation = "「그건 그렇고 베아토, 신변 잡기적인 이야기라고 해야 하나, 나도 전부터 궁금했던 게 있는데……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ん？\u3000なになに？」"
translation = "「응? 뭔데 뭔데?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「とても今更な話なんだけど、ベアトって吸血鬼なんでしょ？\u3000なんで日中も問題なく活動できてるのかなって」"
translation = "「아주 새삼스러운 이야기지만 베아토는 흡혈귀잖아? 왜 낮에도 아무 문제 없이 활동할 수 있는 건가 해서.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「吸血鬼がニンニク弱点なのは都市伝説だけど、日の光を浴びるのがダメなのは本当だって話じゃない？」"
translation = "「흡혈귀가 마늘이 약점인 건 도시전설이라지만, 햇빛을 쬐는 게 안 된다는 건 진짜라는 소리 아니었어?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「もしかして太陽を克服した希少種ってやつ？\u3000デイマスターっていうんだっけ？」"
translation = "「혹시 태양을 극복한 희귀종 같은 거야? 데이 마스터라고 하던가?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「デイマスター！？\u3000なんだそれ、カッコイイな！」"
translation = "「데이 마스터!? 뭐야 그거, 멋있잖아!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ううん、私、デイマスターじゃないよ」"
translation = "「으응, 나 데이 마스터 아니야.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「え？\u3000それなら、日の光を浴びるのはよくないのか？」"
translation = "「에? 그렇다면 햇빛을 쬐는 건 좋지 않은 건가?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「私の場合、星力がある間だけ大丈夫なの。だからそのうち魔界の故郷に帰らなくちゃいけないんだ」"
translation = "「내 경우엔 성력이 있는 동안에만 괜찮아. 그래서 머지않아 마계의 고향으로 돌아가야만 해.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「星力がなくなるまで多分あと数年、かな。それまでに人間界の美味しいものいっぱい食べるんだぁ～」"
translation = "「성력이 없어질 때까지 아마 앞으로 몇 년, 정도일까. 그때까지 인간계의 맛있는 거 잔뜩 먹을 거야~」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「へー、なるほど。じゃあ帰るまでに、悔いが残らないようにしないとね」"
translation = "「헤에, 그렇구나. 그럼 돌아가기 전까지 후회가 남지 않도록 해야겠네.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「うん。やりたいこと全部やってから帰るつもり」"
translation = "「응. 하고 싶은 거 다 하고 돌아갈 생각이야.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「そうだ、せっかくカフェテリアに集まったんだし、みんなでお昼にしようよ♪」"
translation = "「맞다, 기왕 카페테리아에 모인 거 다 같이 점심 먹자♪」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よーし、商品券全部ベアトの好きなものに使っていいぞ！\u3000いっぱい食え！」"
translation = "「좋아, 상품권 전부 베아토가 좋아하는 거에 써도 좋아! 잔뜩 먹어라!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いいの？\u3000やった～、ニンニクたっぷりにしちゃおっ♪」"
translation = "「정말? 신난다~ 마늘 듬뿍 넣어야지♪」"

