[[dialogue]]
speaker = "unk"
original = "第４話,世界で１番の幸運（後編）,P"
translation = "제4화, 세계에서 제일가는 행운 (후편), P"

[[dialogue]]
speaker = "unk"
original = "トレーニング施設で起きたトラブルで、自己嫌悪し、その場から逃げ出してしまったサチ――"
translation = "트레이닝 시설에서 일어난 트러블로 자책하며 그 자리에서 도망쳐 버린 사치――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（本当は……薄々気付いていました。お兄さんと一緒に居ると、どうしてエッチなトラブルが起きるのか……）"
translation = "（사실은…… 어렴풋이 눈치채고 있었어요. 오빠랑 같이 있으면 어째서 엣찌한 트러블이 일어나는지……）"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（それに、お兄さんに対する自分の気持ちも……）"
translation = "（게다가 오빠에 대한 자신의 마음도……）"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（本当は自分が心のどこかで望んでいたことなのに、お兄さんに甘えて、都合の悪い部分は見て見ぬフリをして……）"
translation = "（사실은 자신이 마음속 어딘가에서 바랐던 일인데, 오빠에게 어리광부리며 형편이 나쁜 부분은 못 본 척하고……）"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（エッチで、はしたないのは私の方で……恥ずかしくて、消えてしまいたい……）"
translation = "（엣찌하고 천박한 건 내 쪽이라서…… 부끄러워서 사라져 버리고 싶어……）"

[[dialogue]]
speaker = "unk"
original = "サチ！\u3000追いついた！"
translation = "사치! 따라잡았어!"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お、お兄さん……」"
translation = "「오, 오빠……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ごめんなさい。いきなり逃げ出したりして……私……」"
translation = "「죄송해요. 갑자기 도망치거나 해서…… 저는……」"

[[dialogue]]
speaker = "unk"
original = "言いたくないなら、無理して言わなくていい"
translation = "말하고 싶지 않다면 억지로 말하지 않아도 돼."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんは何も悪くないんです。今までもずっと……」"
translation = "「오빠는 아무 잘못 없어요. 지금까지도 계속……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんがわざとあんなことするような人でないことは、わかっています。悪いのは私で、私の幸運体質が原因だったんです」"
translation = "「오빠가 일부러 그런 짓을 할 사람이 아니라는 건 알고 있어요. 나쁜 건 저고, 제 행운 체질이 원인이었어요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私とお兄さんが見舞われるエッチなトラブルは、いわゆる『<b>ラッキースケベ</b>』だったんです」"
translation = "「저와 오빠가 겪는 엣찌한 트러블은 이른바 『<b>럭키</b> <b>스케베</b>』였던 거예요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私は……最初に星徒会室で挨拶をした時から、お兄さんのことをその……好意的に感じていたんだと思います」"
translation = "「저는…… 처음에 성도회실에서 인사를 했을 때부터 오빠를 그…… 호의적으로 느끼고 있었다고 생각해요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私、昔から『兄』という存在に淡い憧れがあって……会長さんと会ってから、こういう兄が欲しかったな、とか思ってたりして……なので、さり気なく呼び方を変えてみたりして」"
translation = "「저, 예전부터 『오빠』라는 존재에 막연한 동경이 있어서…… 회장님과 만나고 나서 이런 오빠가 갖고 싶다거나 생각하기도 해서…… 그래서 넌지시 부르는 법을 바꿔보기도 하고.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そしたら何も言わずに受け入れて貰えて、だから調子に乗って、甘えてしまうようになっていました。ラッキースケベに巻き込んでも、許してくれるって……」"
translation = "「그랬더니 아무 말 없이 받아주셔서, 그래서 우쭐해져서 어리광부리게 되었어요. 럭키 스케베에 휘말리게 해도 용서해 줄 거라고……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも本当は、私の方が心の奥でお兄さんと仲良くなりたいと望んでいたから、ラッキースケベという幸運が起こっていたんです」"
translation = "「하지만 사실은 제 쪽이 마음속 깊은 곳에서 오빠와 친해지고 싶다고 바랐기 때문에 럭키 스케베라는 행운이 일어났던 거예요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「今回のことで、はっきりと気付いてしまったんです。自分の気持ちに――」"
translation = "「이번 일로 확실히 깨달아 버렸어요. 제 마음에――」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私はいつの間にかお兄さんのことを、男の人として好きになっていたんです」"
translation = "「저는 어느샌가 오빠를 남자로 좋아하게 되었던 거예요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ずっと、エッチなのは私の方でした……」"
translation = "「계속 엣찌했던 건 제 쪽이었어요……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ごめんなさい、お兄さん……」"
translation = "「죄송해요, 오빠……」"

[[dialogue]]
speaker = "unk"
original = "そんなことはない。俺も本当は――"
translation = "그렇지 않아. 나도 사실은――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん……？」"
translation = "「오빠……?」"

[[dialogue]]
speaker = "unk"
original = "俺は、嫌われたくないから、ずっと紳士なフリをしていただけだ。内心はずっとドキドキして、下心を持っていた。正直にそう伝える。"
translation = "나는 미움받고 싶지 않아서 계속 신사인 척했을 뿐이다. 내심은 계속 두근거리고 엉큼한 마음을 품고 있었다. 솔직하게 그렇게 전한다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「下心って、私に……？\u3000――えっ、私が可愛いから……？」"
translation = "「흑심이라니, 나한테……? ――엣, 내가 귀여우니까……?」"

[[dialogue]]
speaker = "unk"
original = "だから、俺にとってもラッキースケベだったよ"
translation = "「그러니까, 나한테 있어서도 럭키 스케베였어.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そ、それってつまり……きゃっ！？」"
translation = "「그, 그건 즉…… 꺄악!?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いきなり後ろから強い風が吹いて……！\u3000わ、わわっ……バランスが……！」"
translation = "「갑자기 뒤에서 강한 바람이 불어서……! 와, 와와…… 균형이……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ、ありがとうございます、お兄さん。受け止めてくれて……」"
translation = "「고, 고맙습니다, 오빠. 받아줘서……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「これも……ラッキースケベに入るんでしょうかね……？」"
translation = "「이것도…… 럭키 스케베에 들어가는 걸까요……?」"

[[dialogue]]
speaker = "unk"
original = "サチ、好きだ。付き合って欲しい"
translation = "「사치, 좋아해. 사귀어 줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「わ、私も……好きです。私を、お兄さんの恋人にして下さい……」"
translation = "「저, 저도…… 좋아해요. 저를, 오빠의 연인으로 삼아 주세요……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「えへへ……♪\u3000人事を尽くして天命を待つ主義な私ですが、今この瞬間だけは自信を持って言えます」"
translation = "「에헤헤……♪ 진인사대천명 주의인 저입니다만, 지금 이 순간만큼은 자신 있게 말할 수 있어요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「私は今、世界で１番ラッキーです」"
translation = "「저는 지금, 세계에서 제일 럭키해요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だって、初恋の人と、こうして両想いになれたんですから……♪」"
translation = "「그치만, 첫사랑인 사람과 이렇게 서로 마음이 통하게 됐으니까요……♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それで……お兄さん、秘密のお話があるので……少しだけ、顔を近付けてもらってもいいですか……？」"
translation = "「그래서…… 오빠, 비밀 이야기가 있으니까…… 아주 조금만, 얼굴을 가까이해 주시겠어요……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お互い会長としての立場もありますから、普段はエッチなことは禁止ですけど……今はラッキースケベ発生中なので……」"
translation = "「서로 회장으로서의 입장도 있으니까, 평소에는 야한 짓은 금지지만…… 지금은 럭키 스케베 발생 중이니까……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ん……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「これは、特別です……<emoji=heart04>」"
translation = "「이건, 특별해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふあぁ……よく寝ました……昨夜のロストアイテム回収で力を使いまくったせいか、久しぶりに爆睡してしまいましたよ～」"
translation = "「후아아…… 잘 잤다…… 어젯밤 로스트 아이템 회수로 힘을 엄청나게 쓴 탓인지, 오랜만에 폭면해 버렸네요~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ、トレジアンナさん。起きたんですね」"
translation = "「앗, 트레지안나 씨. 일어났군요.」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ああ、サチさん、おはようございます～。会長さんもご一緒でしたか。っていうか、もう夜ですね。丸１日寝てたってやつですねこれ」"
translation = "「아아, 사치 씨, 좋은 아침이에요~. 회장님도 같이 계셨나요. 그나저나, 벌써 밤이네요. 꼬박 하루를 잤다는 거군요 이거.」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「お２人は学園から帰宅途中ですか？\u3000あれ？\u3000何か、お２人の距離近くありません？\u3000というか、手を繋いで……しかも恋人繋ぎじゃないですか、それ！？」"
translation = "「두 분은 학원에서 귀가하는 중인가요? 어레? 뭔가, 두 분 사이가 가깝지 않나요? 그보다, 손을 잡고…… 게다가 연인 잡기잖아요, 그거!?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「えっ、私が寝てる間に何かあったんです！？\u3000これ、ひょっとして私、重要な場面見逃してません！？\u3000サチさん、会長さん、状況説明プリーズ！」"
translation = "「엣, 제가 자는 사이에 무슨 일이 있었던 건가요!? 이거, 설마 저, 중요한 장면 놓친 거 아니에요!? 사치 씨, 회장님, 상황 설명 플리즈!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふふっ……♪\u3000秘密です♪」"
translation = "「후훗……♪ 비밀이에요♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「えええぇぇぇっ！？\u3000ちょっ……タイムマシン的なロストアイテム、今すぐきてぇぇぇ！」"
translation = "「에에에에엑!? 잠깐…… 타임머신 같은 로스트 아이템, 지금 당장 나와라아아아!」"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんをからかいながら、俺の手を握り、幸せそうに笑うサチなのだった。"
translation = "트레지안나를 놀리면서, 내 손을 잡고 행복하게 웃는 사치였다."

