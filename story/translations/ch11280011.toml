[[dialogue]]
speaker = "unk"
original = "第１話,リコさんの友達（附属生編）,P"
translation = "제1화, 리코 씨의 친구 (부속생 편), P"

[[dialogue]]
speaker = "unk"
original = "星術使いの犯罪者に対して秘密裏に処理し、治安を守っている学園の裏組織『公安委員会』。"
translation = "성술사 범죄자에 대해 비밀리에 처리하며 치안을 지키고 있는 학원의 이면 조직 『공안위원회』."

[[dialogue]]
speaker = "unk"
original = "以前より委員会に協力していた俺は、その日も要請を受けて参加していた。"
translation = "이전부터 위원회에 협력하고 있던 나는 그날도 요청을 받고 참가하고 있었다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――よし、これにて任務終了だ」"
translation = "「──좋아, 이것으로 임무 종료다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「犯人の連行も済んだことだし……事件解決の協力に感謝する、少年」"
translation = "「범인 연행도 끝났으니…… 사건 해결에 협력해줘서 고맙다, 소년」"

[[dialogue]]
speaker = "unk"
original = "彼女の名前は『リコリンフィア』――俺は『リコさん』と呼んでいる。"
translation = "그녀의 이름은 『리코린피아』── 나는 『리코 씨』라고 부르고 있다."

[[dialogue]]
speaker = "unk"
original = "非常に小柄だが、成人している大人の女性であり、母さんの友人でもある。"
translation = "매우 왜소하지만 성인인 성인 여성이며, 어머니의 친구이기도 하다."

[[dialogue]]
speaker = "unk"
original = "そして、公安委員会のただのエージェントではなく、それを率いるリーダー、『本部長』の役職を持つ人物だったりする。"
translation = "그리고 공안위원회의 단순한 요원이 아니라 그것을 이끄는 리더, 『본부장』의 직함을 가진 인물이기도 했다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「お礼にお姉さんと一緒に食事でも……と思ったが、さすがに夜も遅い。これ以上連れ回してはリノに怒られてしまうし、また次の機会にな」"
translation = "「답례로 누나랑 같이 식사라도…… 싶었지만 역시 밤이 늦었군. 이 이상 데리고 다녔다간 리노에게 혼날 테니 다음 기회에」"

[[dialogue]]
speaker = "unk"
original = "翌日。俺が学園に登校すると――"
translation = "다음 날. 내가 학원에 등교하자──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「おはよう、少年。昨日の今日で、すぐに会うとは思わなかったよ」"
translation = "「좋은 아침이다, 소년. 어제 보고 바로 또 볼 줄은 몰랐군」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――こんなに朝早くから星徒会の仕事があるのか？」"
translation = "「──이렇게 아침 일찍부터 성도회 일이 있는 건가?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「そうか。それはすまなかったな。昨日、夜遅くまで協力させてしまって」"
translation = "「그런가. 그건 미안하게 됐군. 어제 밤늦게까지 협력하게 해서」"

[[dialogue]]
speaker = "unk"
original = "いえ、平和を守るのが星騎士の役目ですから"
translation = "아니요, 평화를 지키는 게 성기사의 역할이니까요"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「その心がけには敬意を表する。……だが、少年。体調管理も大事な仕事であることを忘れるな。特にキミは、対リクリエの要というべき魔王なのだから」"
translation = "「그 마음가짐에는 경의를 표하지. ……하지만 소년. 컨디션 관리도 중요한 일임을 잊지 마라. 특히 너는 대 리크리에의 핵심이라 할 수 있는 마왕이니까」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「次からは、無理せずちゃんとお姉さんに言ってくれ。私も反省して、次からはちゃんと確認するようにする」"
translation = "「다음부터는 무리하지 말고 누나한테 말해줘. 나도 반성하고 다음부턴 제대로 확인하도록 하마」"

[[dialogue]]
speaker = "unk"
original = "リコさんは疲れてないですか？"
translation = "리코 씨는 안 피곤하세요?"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「私か？\u3000大丈夫だ。実はこの体は、アニマに作ってもらった義体でな。本体は今日、休養に務めている」"
translation = "「나인가? 괜찮다. 사실 이 몸은 아니마가 만들어준 의체라서 말이지. 본체는 오늘 휴양에 힘쓰고 있다」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩も公安に……！？"
translation = "아니마 선배도 공안에……!?"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ああ。入学当初から外部の協力者として、何度も世話になっているよ。私は使えるものはなんでも使う主義なのでな」"
translation = "「그래. 입학 당초부터 외부 협력자로서 몇 번이나 신세를 지고 있지. 나는 쓸 수 있는 건 뭐든 쓰는 주의라서 말이야」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「しかし、彼女の天才っぷりには本当に驚かされる。まさか、体だけでなく意識までも２つに分けられるとは……」"
translation = "「하지만 그녀의 천재성에는 정말 놀라울 뿐이다. 설마 몸뿐만 아니라 의식까지 둘로 나눌 수 있을 줄이야……」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「おかげで本部長と、附属生のリコリンを両立した形で、二重生活を送ることができている」"
translation = "「덕분에 본부장과 부속생 리코린을 양립하는 형태로 이중생활을 보낼 수 있게 되었지」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あっ、リコリンちゃん。おはようございます！」"
translation = "「앗, 리코린짱. 안녕하세요!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「それに会長も！\u3000リコリン、会長と知り合いだったの～？」"
translation = "「게다가 회장도! 리코린, 회장이랑 아는 사이였어~?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「リコリンリン☆\u3000ミウちゃん、ヒマワリちゃん、おはよ～♪」"
translation = "「리코린린☆ 미우짱, 히마와리짱, 안녕~♪」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「てへっ☆」"
translation = "「데헤☆」"

[[dialogue]]
speaker = "unk"
original = "（相変わらず切り替えが早い！）"
translation = "(여전히 전환이 빨라!)"

[[dialogue]]
speaker = "unk"
original = "知り合ってからもう何度も見ているが、リコさんの『キャラ変』には驚かされる。"
translation = "알게 된 뒤로 벌써 몇 번이나 봤지만 리코 씨의 『캐릭터 변신』에는 놀라게 된다."

[[dialogue]]
speaker = "unk"
original = "制服を着ていることからも分かる通り、彼女はその小柄な体を活かして、附属校の２年生として学園生活を送っているのだ。"
translation = "교복을 입고 있는 것에서도 알 수 있듯이, 그녀는 그 왜소한 몸을 활용해 부속교 2학년으로서 학원 생활을 보내고 있는 것이다."

[[dialogue]]
speaker = "unk"
original = "本人曰く、附属生という立場は情報収集に何かと便利であるらしい。"
translation = "본인 말로는 부속생이라는 입장이 정보 수집에 여러모로 편리하다고 한다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「あのね、会長のお兄ちゃんとは、この前リゾート結界で知り合ったの～♪」"
translation = "「있잖아, 회장 오빠랑은 저번에 리조트 결계에서 알게 됐어~♪」"

[[dialogue]]
speaker = "unk"
original = "（お兄ちゃん呼びはいつ聞いても、複雑な気分……！）"
translation = "(오빠라는 호칭은 언제 들어도 복잡한 기분……!)"

[[dialogue]]
speaker = "unk"
original = "ミウとヒマワリとは友達なのかと尋ねてみると――"
translation = "미우와 히마와리와는 친구냐고 물어보자──"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はい。私たち、リコリンちゃんとは同じクラスなんです」"
translation = "「네. 저희 리코린짱이랑은 같은 반이에요」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「この前、私の部屋で一緒にお泊り会もしたんだよね♪」"
translation = "「얼마 전에 내 방에서 같이 파자마 파티도 했는걸♪」"

[[dialogue]]
speaker = "unk"
original = "リコリン、お泊り会に行ったの！？"
translation = "리코린, 파자마 파티에 갔어!?"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「うん♪\u3000リコリンのこと、２人が誘ってくれたの～♪」"
translation = "「응♪ 리코린을 두 사람이 초대해줬어~♪」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「リコリンとは気が合って、仲良くなりたかったからね！」"
translation = "「리코린이랑은 마음이 잘 맞아서 친해지고 싶었거든!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「リコリンちゃん、すごく頭が良くて、今度ゴールデングースの新しいメンバーにどうかって、セナリィ社長に推薦してみようと思ってるんです」"
translation = "「리코린짱 엄청 머리가 좋아서, 이번에 골든 구스의 새로운 멤버로 어떨지 세나리 사장님께 추천해볼까 생각 중이에요」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「リコリン、セナリィ社長に会うの楽しみだな～♪\u3000ふふっ、どんな人なんだろ～？」"
translation = "「리코린, 세나리 사장님 만나는 거 기대된다~♪ 후후, 어떤 사람일까~?」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、セナリィは公安委員会の下請けとして傭兵業をやっている。なので当然、リコさんはセナリィのことを知っている。"
translation = "참고로 세나리는 공안위원회의 하청으로서 용병업을 하고 있다. 그러니 당연히 리코 씨는 세나리를 알고 있다."

[[dialogue]]
speaker = "unk"
original = "そして、セナリィもリコさんが本部長であることは知っているわけで。"
translation = "그리고 세나리도 리코 씨가 본부장이라는 것은 알고 있을 터."

[[dialogue]]
speaker = "unk"
original = "（セナリィの胃に穴が開きそう……！）"
translation = "(세나리의 위장에 구멍이 뚫리겠어……!)"

[[dialogue]]
speaker = "unk"
original = "俺はこっそりリコさんに耳打ちする。"
translation = "나는 슬쩍 리코 씨에게 귓속말을 한다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "（うん？\u3000私がやっぱり、附属校の生活を楽しんでないかだと？）"
translation = "「음? 내가 역시, 부속교 생활을 즐기고 있지 않느냐고?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "（何を言う、少年。附属生になり切っているのはあくまで仕事だからだ）"
translation = "「무슨 소릴 하나, 소년. 부속생 흉내를 내는 건 어디까지나 업무이기 때문이다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "（交友関係は広い方が、いざという時、役立つだろう？）"
translation = "「교우 관계는 넓은 편이, 만일의 경우 도움이 되지 않겠나?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「そろそろ教室行く？」"
translation = "「슬슬 교실 갈래?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「リコリンちゃんはどうしますか？」"
translation = "「리코린짱은 어떻게 할 거예요?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「うん、私も一緒に行く～♪」"
translation = "「응, 나도 같이 갈래~♪」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「じゃあ、またね♪\u3000お兄ちゃん☆」"
translation = "「그럼, 나중에 봐♪ 오빠☆」"

[[dialogue]]
speaker = "unk"
original = "附属生になり切ったままミウとヒマワリと一緒にこちらへ手を振ってみせ――"
translation = "부속생을 연기하는 채로 미우와 히마와리와 함께 이쪽으로 손을 흔들어 보이고──"

[[dialogue]]
speaker = "unk"
original = "それから一瞬、大人っぽい顔でウィンクをしてから去って行くリコさんなのだった。"
translation = "그러더니 찰나, 어른스러운 표정으로 윙크를 하고서 떠나가는 리코 씨였다."

