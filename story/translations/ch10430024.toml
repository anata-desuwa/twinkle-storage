[[dialogue]]
speaker = "unk"
original = "第４話,サチの恋人セーフライン,P"
translation = "제4화, 사치의 연인 세이프 라인, P"

[[dialogue]]
speaker = "unk"
original = "とある休日、サチが俺の家へ遊びに来ていた時のこと――"
translation = "어느 휴일, 사치가 우리 집에 놀러 왔을 때의 일――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん、久しぶりに今日はゆっくりできますね」"
translation = "「오빠, 오랜만에 오늘은 느긋하게 있을 수 있겠네요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「最近はお互い忙しくて、なかなか落ち着いて２人きりになれてませんでしたから」"
translation = "「최근에는 서로 바빠서 좀처럼 차분하게 둘만 있을 수 없었으니까요」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000――面白そうな映画をピックアップしておいた？」"
translation = "「에? ――재밌어 보이는 영화를 골라 뒀다고요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ～、映画もいいですけど……その……」"
translation = "「아~ 영화도 좋지만…… 저기……」"

[[dialogue]]
speaker = "unk"
original = "サチはそわそわした様子で、上目遣いをしながら――"
translation = "사치는 안절부절못하는 모습으로 위를 치켜뜬 눈을 하며――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それよりも……お兄さんと、き、キスがしたい、です……」"
translation = "「그것보다…… 오빠랑 키, 키스가 하고 싶어요……」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?"

[[dialogue]]
speaker = "unk"
original = "俺は驚いて、ポロッとテレビのリモコンを落としてしまう。"
translation = "나는 놀라서 툭 하고 TV 리모컨을 떨어뜨리고 만다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ごめんなさい。エッチなお願いだっていうのは、わかってるんです。でも……」"
translation = "「죄송해요. 야한 부탁이라는 건 알고 있어요. 하지만……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ここのところ、ずっとできていなかったので……」"
translation = "「요 근래 계속 하지 못했으니까……」"

[[dialogue]]
speaker = "unk"
original = "――サチは周りの人目を気にするタイプなので、学園ではあまりキスをしない。忙しい時だと、特にだ。"
translation = "――사치는 주변 시선을 신경 쓰는 타입이라 학원에서는 별로 키스를 하지 않는다. 바쁠 때는 특히 더 그렇다."

[[dialogue]]
speaker = "unk"
original = "だから、ここ１週間くらいは、ずっとキスができていなかった。"
translation = "그래서 지난 1주일 정도는 계속 키스를 하지 못했다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ダメ……ですか？」"
translation = "「안…… 될까요?」"

[[dialogue]]
speaker = "unk"
original = "普段真面目な彼女からそんな風に言われて、ダメなんて思うわけがない。"
translation = "평소 성실한 그녀가 그런 식으로 말하는데 안 될 리가 없다."

[[dialogue]]
speaker = "unk"
original = "サチ、おいで"
translation = "사치, 이리 와"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ……はい<emoji=heart04>」"
translation = "「아…… 네<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん……<emoji=heart04>」"
translation = "「오빠……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ん……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふぅ……はあぁ……<emoji=heart04>」"
translation = "「후우…… 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんと久しぶりのキス、頭の中が幸せでいっぱいになっちゃいます……<emoji=heart04>」"
translation = "「오빠랑 오랜만에 하는 키스, 머릿속이 행복으로 가득 차 버려요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――したかったなら、もっと早く言ってくれたらよかったのに……ですか？」"
translation = "「――하고 싶었다면 좀 더 빨리 말해줬으면 좋았을 텐데…… 라고요?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ごめんなさい。お兄さんも仕事で忙しいのにワガママ言うのは、なんだか恥ずかしいことみたいに思えて……言い出せなくて……」"
translation = "「죄송해요. 오빠도 일 때문에 바쁜데 떼쓰는 건 왠지 부끄러운 일처럼 느껴져서…… 말을 꺼내지 못해서……」"

[[dialogue]]
speaker = "unk"
original = "俺も気づかなくて、ごめん"
translation = "나도 눈치채지 못해서 미안"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――今度はお兄さんも、したい時は言うようにする……？」"
translation = "「――다음에는 오빠도 하고 싶을 때는 말하도록 한다고요……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「は、はい……<emoji=heart04>\u3000恋人同士ですから、お互い欲求不満は解消し合わないとですよね<emoji=heart04>」"
translation = "「네, 네……<emoji=heart04> 연인 사이니까 서로 욕구불만은 해소해 줘야겠죠<emoji=heart04>」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ、でも……だからと言って、エッチなことにのめり込みすぎるのは、禁止ですからね<emoji=heart04>」"
translation = "「앗, 하지만…… 그렇다고 해서 야한 일에 너무 빠져드는 건 금지니까요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なかなかラインを見極めるのが難しいな……"
translation = "좀처럼 라인을 가늠하기가 어렵네……"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――どこまでだったら、してもセーフなのか……？\u3000そ、そこは、ちゃんと１つずつ相談しないと……」"
translation = "「――어디까지라면 해도 세이프인 건지……? 거, 거기는 제대로 하나씩 상담하지 않으면……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「人前で頭を撫でる！？\u3000あ、アウトです……！」"
translation = "「사람들 앞에서 머리를 쓰다듬는 거요!? 아, 아웃이에요……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「だ、だって……お兄さんにされたら、その……気持ち良く、なっちゃいますから……」"
translation = "「그, 그치만…… 오빠가 해주면 그…… 기분 좋아져 버리니까요……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「世の恋人は、それくらいは外でしてるんですか……？」"
translation = "「세상 연인들은 그 정도는 밖에서 하는 건가요……?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「む、むぅ。だったら…………ギリギリ、セーフでも……」"
translation = "「으, 으음. 그렇다면………… 아슬아슬하게 세이프라고 해도……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「人前で握った手を恋人繋ぎにするぅ！！？\u3000それはアウトです！！！」"
translation = "「사람들 앞에서 잡은 손을 깍지 손으로 하는 거요!!? 그건 아웃이에요!!!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「遊園地の時も言いましたけど、なんか……こっそりエッチしてるみたいで、すごく恥ずかしいじゃないですか……！」"
translation = "「유원지 때도 말했지만, 왠지…… 몰래 야한 짓 하는 것 같아서 엄청 부끄럽잖아요……!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「恋人だからこそ、デートの時はしてみたいって……」"
translation = "「연인이니까 데이트할 때는 해보고 싶다고……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「…………お、お兄さんがどうしてもって言うなら、ギリギリのギリギリで、セーフってことにしても……」"
translation = "「…………오, 오빠가 정 안 된다면 아슬아슬의 아슬아슬로 세이프라고 쳐도……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「は、ハグはもう、完全にアウトです！\u3000人前で抱き合うとか、エッチすぎます！」"
translation = "「하, 허그는 이제, 완전히 아웃이에요! 사람들 앞에서 껴안다니, 너무 야해요!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それに……お兄さんの体温を感じたら、私も、そういう気分になっちゃいますし……」"
translation = "「게다가…… 오빠의 체온을 느끼면, 저도, 그런 기분이 되어버리니까……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――キスも絶対にアウトですから！\u3000今まで言ったどれよりも気持ち良くなっちゃいます！\u3000どう考えてもエッチです！」"
translation = "「――키스도 절대 아웃이니까요! 지금까지 말한 그 무엇보다 기분 좋아져 버려요! 아무리 생각해도 야해요!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、もうしないほうがいい？"
translation = "「그럼, 이제 안 하는 게 좋을까?」"

[[dialogue]]
speaker = "unk"
original = "俺がそう言うと、彼女は照れたように顔を赤くしてから、首をふるふると横に振る。"
translation = "내가 그렇게 말하자, 그녀는 수줍은 듯 얼굴을 붉히더니, 고개를 절레절레 젓는다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ひ、人前でやったらアウトなだけです。今は……２人きりですから」"
translation = "「사, 사람들 앞에서 하면 아웃일 뿐이에요. 지금은…… 둘뿐이니까」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「もっと、して欲しいです……<emoji=heart04>」"
translation = "「더, 해줬으면 좋겠어요……♡」"

[[dialogue]]
speaker = "unk"
original = "可愛くおねだりする彼女を、俺は堪らず抱き寄せる。"
translation = "귀엽게 조르는 그녀를, 나는 참지 못하고 끌어안는다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あ……<emoji=heart04>\u3000お兄さん<emoji=heart04>」"
translation = "「아……♡ 오빠……♡」"

[[dialogue]]
speaker = "unk"
original = "それから片手を恋人繋ぎにして、もう片方の手で頭を撫でる。"
translation = "그러고는 한 손을 연인끼리 손을 맞잡는 형태로 깍지를 끼고, 다른 한 손으로 머리를 쓰다듬는다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ん……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응……♡ 하아아……♡ 후우우……♡」"

[[dialogue]]
speaker = "unk"
original = "そして、熱い吐息を漏らす唇に、顔を寄せて――"
translation = "그리고, 뜨거운 숨결을 내뱉는 입술에, 얼굴을 가까이 대고――"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ……今、ダメ……<emoji=heart04>\u3000キスしちゃ<emoji=heart04>\u3000――んむっ<emoji=heart04>」"
translation = "「앗…… 지금, 안 돼……♡ 키스하면♡ ――읍♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「んはぁっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000ダメです、お兄さん……<emoji=heart04>\u3000そんな１度に全部されたら……<emoji=heart04>」"
translation = "「응하아……♡ 하아아……♡ 안 돼요, 오빠……♡ 그렇게 한꺼번에 전부 해버리면……♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「気持ち良く、なり過ぎちゃいます……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「너무 기분 좋아져 버려요……♡ 후우우……♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「え？\u3000――何されても気持ち良くなっちゃうなんてエッチ……？\u3000ち、違います……<emoji=heart04>」"
translation = "「에? ――무슨 짓을 당해도 기분 좋아져 버리다니 야하다고요……? 그, 그렇지 않아요……♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「別になんでも気持ちいいってわけじゃなくて……好きな相手と――お兄さんとするから、気持ち良くなっちゃうんです<emoji=heart04>」"
translation = "「딱히 아무한테나 기분 좋다는 게 아니라…… 좋아하는 상대와―― 오빠랑 하니까, 기분 좋아져 버리는 거예요♡」"

[[dialogue]]
speaker = "unk"
original = "なら、別にアウトじゃないんだ？"
translation = "「그럼, 딱히 아웃은 아니네?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……今日は……久しぶりだから、今のところセーフです……<emoji=heart04>」"
translation = "「……오늘은…… 오랜만이니까, 지금으로선 세이프예요……♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「でも……ギリギリですから、今日だけですからね……お兄さん<emoji=heart04>」"
translation = "「하지만…… 아슬아슬하니까, 오늘뿐이니까요…… 오빠♡」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ん……ちゅっ<emoji=heart04>」"
translation = "「응…… 쪽♡」"

[[dialogue]]
speaker = "unk"
original = "言いつつも、サチの方から唇が触れてきて、またキスをする。"
translation = "말하면서도, 사치 쪽에서 입술이 닿아와, 다시 키스를 한다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちゅっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「쪽……♡ 쪽♡」"

[[dialogue]]
speaker = "unk"
original = "それからも、頭を撫でたり、抱き合ったりしながら、たっぷりと甘い時間を過ごす俺たちなのであった――"
translation = "그 후로도, 머리를 쓰다듬거나, 서로 껴안으면서, 듬뿍 달콤한 시간을 보내는 우리였다――"

