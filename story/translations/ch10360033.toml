[[dialogue]]
speaker = "unk"
original = "第３話,絆の形は違っても,P"
translation = "제3화, 인연의 형태는 달라도, P"

[[dialogue]]
speaker = "unk"
original = "星霊祭以来、ヒルディオーネはよくマハムートと一緒に、戦闘訓練をするようになっていた――"
translation = "성령제 이후, 힐디 오네는 자주 마무와 함께, 전투 훈련을 하게 되었다――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「マム！\u3000もう１戦行きますわよ！」"
translation = "「마무! 한 판 더 갑니다요!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「やれやれ、体力だけは化け物級ね……来なさい！」"
translation = "「에휴, 체력만큼은 괴물급이네…… 이리 와!」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「その体力で押し切って、今度こそ１本取ってみせましてよ！\u3000――はああぁっ！」"
translation = "「그 체력으로 밀어붙여서, 이번에야말로 한 판 따내 보이겠습니다요! ――하아아앗!」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「――よっし！\u3000おーっほっほっほ♪\u3000最後の１本は私の勝ちですわ～♪」"
translation = "「――좋아! 오홋호호호♪ 마지막 한 판은 저의 승리입니다요～♪」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「はぁ……全く、そのミーティアフォームの持続力はとんでもないわね……」"
translation = "「하아…… 정말, 그 미티어 폼의 지속력은 엄청나네……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「それについてくるマムも、さすがは私の宿命のライバルですわ。戦闘訓練に付き合って下さって、感謝しておりましてよ♪」"
translation = "「그것을 따라오는 마무도, 역시 저의 숙명의 라이벌입니다요. 전투 훈련에 어울려 주셔서, 감사하고 있습니다요♪」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「もっと強くなりたいから協力して欲しいって、畏怖をもって真剣に頭を下げてくるんだもの。そこまでされたら、私だって考えるわよ。それに――」"
translation = "「더 강해지고 싶으니 협력해 달라고, 경외심을 담아 진지하게 고개를 숙이는걸. 거기까지 당하면, 나라도 생각하게 돼. 게다가――」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「断ったら、変に意地を張ってるみたいで……負けた気になるじゃない」"
translation = "「거절하면, 이상하게 고집부리는 것 같아서…… 진 기분이 들잖아」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「マム……！\u3000ありがとうございますわ♪」"
translation = "「마무……! 감사합니다요♪」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「っ……お礼なんて言わなくていいから。私の方ももっと強くなる為に、あなたをせいぜい利用させてもらうっていうだけよ」"
translation = "「……고맙다는 말 같은 건 안 해도 돼. 나도 더 강해지기 위해, 당신을 실컷 이용하겠다는 것뿐이야」"

[[dialogue]]
speaker = "unk"
original = "顔を背けながら、手をひらひらと振ってみせるマハムート。"
translation = "얼굴을 돌리면서, 손을 팔랑팔랑 흔들어 보이는 마무."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「あっ、そうですわ！\u3000訓練ついでに、またマムに相談に乗って欲しいことがありましたの！」"
translation = "「앗, 그렇습니다요! 훈련하는 김에, 또 마무에게 상담해줬으면 하는 일이 있었습니다요!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「恋愛相談なら断るわよ」"
translation = "「연애 상담이라면 거절할 거야」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ですわ！？\u3000何故ですの！？\u3000前は親身になって聞いてくれておりましたのに！」"
translation = "「입니다요!? 어째서입니다요!? 전에는 진심으로 들어주고 있었습니다요!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「いちいちあなたが変なことを聞いてくるからでしょ？\u3000私のＤＩＳＣの電話履歴、あなたの名前で９割くらい埋まってるんだけど？」"
translation = "「일일이 당신이 이상한 걸 물어보니까 그렇지? 내 디스크의 전화 이력, 당신 이름으로 9할 정도 채워져 있는데?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「私の相談はどれも大真面目でしてよ！\u3000会長に相応しい恋人となる為、淑女として日々努力していかねばなりませんもの！」"
translation = "「저의 상담은 전부 아주 진지합니다요! 회장에게 걸맞은 연인이 되기 위해, 숙녀로서 나날이 노력해 나가야만 합니다요!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「……はぁ、わかったわよ。仕方ないから聞いてあげるわ。それで？\u3000今度は何を悩んでいるのかしら？」"
translation = "「……하아, 알았어. 어쩔 수 없으니 들어줄게. 그래서? 이번에는 뭘 고민하고 있는 건데?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「実は……『絆の力』についてですの！」"
translation = "「실은…… 『인연의 힘』에 대해서입니다요!」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「――私、ミーティアフォームになったことは後悔しておりませんわ。おりませんけれど……」"
translation = "「――저, 미티어 폼이 된 것은 후회하고 있지 않습니다요. 후회하고 있지 않습니다만……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「それはそれとして、マムや他の子が会長と絆の力を結んでノヴァフォームになっているのに、恋人の私がそれを結べていないことは、気になるのですわ！」"
translation = "「그건 그렇다 치고, 마무나 다른 아이가 회장과 인연의 힘을 맺어 노바 폼이 되어 있는데, 연인인 제가 그것을 맺지 못하고 있다는 것은, 신경 쓰이는 것입니다요!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「……だそうよ、<b>会長</b>？」"
translation = "「……그렇답니다, <b>회장</b>?」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "unk"
original = "なるほど……"
translation = "과연……"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ですわ！？\u3000会長、いらっしゃっておりましたの！？\u3000一体いつから……」"
translation = "「입니다요!? 회장, 와 계셨던 것입니까요!? 대체 언제부터……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ついさっきよ。だから仕方なく、あなたの悩みを聞いてあげることにしたの」"
translation = "「방금 전이야. 그래서 어쩔 수 없이, 당신의 고민을 들어주기로 한 거고」"

[[dialogue]]
speaker = "unk"
original = "先輩、このあと少しいいですか？"
translation = "선배, 이 다음에 잠시 괜찮습니까?"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「は、はいですの……」"
translation = "「네, 네입니다요……」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、ヒルディー先輩の手を引いて、リゾート結界のプライベートビーチへとやって来ていた。"
translation = "그리고 나는, 힐디 선배의 손을 이끌고, 리조트 결계의 프라이빗 비치로 와 있었다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「あの、会長、ここへ連れて来たのは一体……？」"
translation = "「저, 회장, 여기에 데려온 것은 대체……?」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の両肩に手を添えると、そっと顔を寄せて。"
translation = "나는 그녀의 양 어깨에 손을 올리고, 살며시 얼굴을 가까이 댔다."

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「あっ……！\u3000んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「앗……! 읏……<emoji>heart04</emoji> 츄읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「――んっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000会長、いきなりキスされたら、驚いて息が止まってしまいますわ……<emoji=heart04>」"
translation = "「――읏<emoji>heart04</emoji> 하아앗……<emoji>heart04</emoji> 회장, 갑자기 키스하면, 놀라서 숨이 멎어버립니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ごめん。でも、すぐに伝えたくなって……"
translation = "미안. 하지만, 바로 전하고 싶어져서……"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「え？\u3000伝える……？」"
translation = "「에? 전하다니……?」"

[[dialogue]]
speaker = "unk"
original = "――ヒルディーがノヴァフォームにならなかったとしても、関係ない。"
translation = "――힐디가 노바 폼이 되지 않았다고 해도, 상관없다."

[[dialogue]]
speaker = "unk"
original = "俺はヒルディーとの絆が、他の誰よりもいちばん大きいと信じている。"
translation = "나는 힐디와의 인연이, 다른 누구보다도 가장 크다고 믿고 있다."

[[dialogue]]
speaker = "unk"
original = "ヒルディーは……違ったかな？"
translation = "힐디는…… 달랐을까?"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「会長……<emoji=heart04>\u3000いいえ、そんなことありませんわ」"
translation = "「회장……<emoji>heart04</emoji> 아뇨, 그렇지 않습니다요」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「あなたがそう言って下さるなら……私、もう迷いませんの。誰よりもあなたとの愛の絆が強いって、信じてみせますわ<emoji=heart04>」"
translation = "「당신이 그렇게 말씀해 주신다면…… 저, 더 이상 망설이지 않겠습니다요. 누구보다도 당신과의 사랑의 인연이 강하다고, 믿어 보이겠습니다요<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
original = "「ん……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「읏……<emoji>heart04</emoji> 츄읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "それから、俺たちはまたキスをして、体の熱が落ち着くまで、お互いの絆を確かめ合うのだった――"
translation = "그리고 나서, 우리는 다시 키스를 하고, 몸의 열이 가라앉을 때까지, 서로의 인연을 확인하는 것이었다――"

