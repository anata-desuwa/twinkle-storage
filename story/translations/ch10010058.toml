[[dialogue]]
speaker = "unk"
original = "ある日の夜──"
translation = "어느 날 밤──"

[[dialogue]]
speaker = "unk"
original = "哨戒を終えた俺たちは、大聖堂にやってきていた。"
translation = "순찰을 마친 우리는, 대성당에 와 있었다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「──今日も一日、お疲れ様です。あちこち飛び回って大変でしたね」"
translation = "「──오늘도 하루, 수고하셨습니다. 여기저기 날아다니느라 힘드셨죠.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。今日はいつもよりモンスターが多かったな」"
translation = "「아아. 오늘은 평소보다 몬스터가 많았군.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「確かに……予断のならない状況が続いていますね」"
translation = "「확실히…… 예측할 수 없는 상황이 계속되고 있네요.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「それでも──このフォームのおかげで速やかに討伐できました。ふふ」"
translation = "「그래도── 이 폼 덕분에 신속하게 토벌할 수 있었어요. 후후」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「確かに頼もしかったよ。けど、そのフォームは普段より消耗も激しいみたいだな」"
translation = "「확실히 든든했어. 하지만, 그 폼은 평소보다 소모도 심한 것 같군.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ええ。確かにこのフォームは<ruby>諸刃<rt>もろは</rt></ruby>の<ruby>剣<rt>つるぎ</rt></ruby>でもあります。だからこそ、隣に会長さんがいてくれると心強いんですよ♪」"
translation = "「네. 확실히 이 폼은 양날의 검이기도 합니다. 그렇기에, 옆에 회장님이 있어주면 든든하답니다♪」"

[[dialogue]]
speaker = "unk"
original = "フィオナは自分の格好を確認し、それから太陽の壁画を見上げて言った。"
translation = "피오나는 자신의 모습을 확인하고, 그리고 나서 태양의 벽화를 올려다보며 말했다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「こうしていると……なんだか私、本当に悪の魔王みたいですね。ふふっ」"
translation = "「이렇게 있으니…… 왠지 저, 정말로 악의 마왕 같네요. 후훗」"

[[dialogue]]
speaker = "unk"
original = "こちらへ衣装を見せつけるように、体をしならせるフィオナ。"
translation = "이쪽으로 의상을 과시하듯이, 몸을 휘게 하는 피오나."

[[dialogue]]
speaker = "unk"
original = "その格好は確かにヴィランチックでもありながら、同時に彼女のセクシーさをも引き立てている。"
translation = "그 모습은 확실히 빌런틱하면서도, 동시에 그녀의 섹시함도 돋보이게 하고 있다."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「………………そうだ」"
translation = "「………………맞다.」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「せっかくなら魔王らしく……会長さんにいじわる、しちゃいましょうか？」"
translation = "「모처럼이니 마왕답게…… 회장님에게 심술, 부려볼까요?」"

[[dialogue]]
speaker = "unk"
original = "ゆるやかに押し倒されたこちらへ、フィオナが正面からまたがってくる。"
translation = "느슨하게 쓰러진 이쪽으로, 피오나가 정면에서 올라탄다."

[[dialogue]]
speaker = "unk"
original = "彼女は服をはだけきって、<ruby>蠱惑<rt>こわく</rt></ruby>的な瞳でこちらを見つめていた。"
translation = "그녀는 옷을 완전히 헤치고, 고혹적인 눈동자로 이쪽을 바라보고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「どうしたのか……って？\u3000ふふ──ちょっとしたいたずら心です。こういうのもどうかなって」"
translation = "「왜 그러냐고요……요? 후후── 사소한 장난기예요. 이런 것도 어떨까 싶어서.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いつもは私が責められてばかりですし……たまには、会長さんの困る顔も見てみたいな～……なんて♪」"
translation = "「평소에는 제가 당하기만 하니까요…… 가끔은, 회장님이 곤란해하는 얼굴도 보고 싶다나～…… 라며♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それに……ほら。会長さんのここだって、準備万端な感じですけど？」"
translation = "「게다가…… 자. 회장님의 여기도, 준비 만반인 것 같은데요?」"

[[dialogue]]
speaker = "unk"
original = "フィオナに迫られ、扇情的な笑みを見せつけられたことで、肉棒はすでにガチガチに<ruby>屹立<rt>きつりつ</rt></ruby>していた。"
translation = "피오나에게 다가와, 선정적인 미소를 보여진 것으로, 육봉은 이미 딱딱하게 우뚝 서 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「期待……してるんですよね？\u3000言わなくってもわかりますよ。体は正直……というやつですね」"
translation = "「기대…… 하고 계시죠? 말하지 않아도 알 수 있어요. 몸은 솔직하다……라는 거네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ほーら……入っちゃいます、よっ……<emoji=heart04>」"
translation = "「자ー…… 들어가버립니다, 요읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んっっ……はぁっっっ………………<emoji=heart04>\u3000んぁっ……すご……もう、大っき……んっ……ぁっ──っ……<emoji=heart04>\u3000んっ、んんんっ……！」"
translation = "「응읏…… 하아읏………………<emoji=heart04> 응앗…… 굉장해…… 벌써, 커다래…… 응읏…… 앗──읏……<emoji=heart04> 응읏, 응응응읏……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい──っ……これで……んっ、全部、入っちゃいました……<emoji=heart04>\u3000ふふっ……ずっと硬いまんまですよ、会長さん……<emoji=heart04>」"
translation = "「네──읏…… 이걸로…… 응읏, 전부, 들어가버렸어요……<emoji=heart04> 후훗…… 계속 딱딱한 그대로예요, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「奥まで──んっ……しっかりと……んぁっ……ふふ、暴れてますね……<emoji=heart04>\u3000どうですか、私の中……？」"
translation = "「안쪽까지── 응읏…… 확실히…… 응앗…… 후후, 날뛰고 있네요……<emoji=heart04> 어떠세요, 제 안은……?」"

[[dialogue]]
speaker = "unk"
original = "ただ仰向けになっているだけなのに、ペニスの先からフィオナの膣内にずぶずぶと飲み込まれていった。"
translation = "그저 똑바로 누워 있을 뿐인데, 페니스 끝부터 피오나의 질 내에 푹푹 빨려 들어갔다."

[[dialogue]]
speaker = "unk"
original = "心の準備もできていないうちから、こんな急に挿入されると、気持ち良すぎて……！"
translation = "마음의 준비도 되어 있지 않은데, 이렇게 갑자기 삽입되니, 너무 기분 좋아서……!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え……私だって、濡れてた……？\u3000ふふ──知りません──ぁっ……んぅっ、んぁっ……<emoji=heart04>\u3000そんなこと言う会長さんは──こう、ですからね……っ<emoji=heart04>」"
translation = "「에…… 저도, 젖어 있었다고요……? 후후── 몰라요── 앗…… 응읏, 응앗……<emoji=heart04> 그런 말 하는 회장님은── 이렇게, 해줄 거니까요……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こうやって──んっ、揺すって……ぁっ、はぁっ、んんぅっ……ふふ、どうですか……ぁっ……<emoji=heart04>\u3000我慢しなくて、んっ、いいんですよっ……？」"
translation = "「이렇게── 응읏, 흔들어서…… 앗, 하앗, 응응읏…… 후후, 어떠세요…… 앗……<emoji=heart04> 참지 않아도, 응읏, 괜찮아요읏……?」"

[[dialogue]]
speaker = "unk"
original = "フィオナは自在に腰をグラインドさせ、こちらを翻弄しながら喘ぐ。"
translation = "피오나는 자유자재로 허리를 그라인드시키며, 이쪽을 농락하면서 신음한다."

[[dialogue]]
speaker = "unk"
original = "このアングルから眺めるフィオナの痴態は、思わず暴発してしまいそうなほど<ruby>艶<rt>なま</rt></ruby>めかしかった。"
translation = "이 앵글에서 바라보는 피오나의 추태는, 무심코 폭발해버릴 것 같을 정도로 요염했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふっ……会長さん、すっごく気持ちよさそうな顔してます……<emoji=heart04>\u3000私のおま○こ……どうですか……？\u3000すっかり、会長さんの形になっちゃってるんですから……<emoji=heart04>」"
translation = "「후훗…… 회장님, 엄청 기분 좋아 보이는 얼굴을 하고 있네요……<emoji=heart04> 제 보지…… 어떠세요……? 완전히, 회장님 모양이 되어버렸으니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも……んっ、まだ……出しちゃ、だめですよ～……？\u3000強い男の方なら──んっ……快感に耐えることだって、できますよね……んっ、ぁっ<emoji=heart04>」"
translation = "「하지만…… 응읏, 아직…… 싸면, 안 돼요～……? 강한 남자분이라면── 응읏…… 쾌감을 참는 것쯤은, 할 수 있겠죠…… 응읏, 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「魔王さん、なんですから──ぁっ、簡単に出しちゃったら、かっこ悪いですよ……？\u3000んっ──ふぅ、んっ……はぁ、はぁ……っ……<emoji=heart04>」"
translation = "「마왕님이시니까── 앗, 간단히 싸버리면, 꼴사납잖아요……? 응읏── 후우, 응읏…… 하아, 하아……읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いじわるな笑みを浮かべて、前後に腰をスライドさせるフィオナ。"
translation = "심술궂은 미소를 띠고, 앞뒤로 허리를 슬라이드시킨다."

[[dialogue]]
speaker = "unk"
original = "その度に膣肉が亀頭を絡め取って、声が漏れそうなほどの快感が走る。"
translation = "그때마다 질 근육이 귀두를 휘감아, 소리가 새어 나올 것 같은 쾌감이 달린다."

[[dialogue]]
speaker = "unk"
original = "しかも、それがどんなタイミングで来るかわからないせいで、余計に刺激が倍増する。"
translation = "게다가, 그것이 어떤 타이밍에 올지 알 수 없기 때문에, 더욱 자극이 배가된다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あっ……今、腰が引けましたね？\u3000ダメですよー、気持ちいいのから逃げたら。ふふ──会長さんの考えてることなんて……んぁっ、全部わかっちゃうんですから……<emoji=heart04>」"
translation = "「앗…… 지금, 허리가 뒤로 빠졌죠? 안 돼요ー, 기분 좋은 것에서 도망치면. 후후── 회장님이 생각하는 것 따위…… 응앗, 전부 알아버릴 테니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんっ──ぁっ、んんんっ──！\u3000ぁっ……もう、我慢できなくなって、自分からおち○ぽ動かしちゃってるじゃないですか……<emoji=heart04>\u3000はぁっ、んんぅっっ」"
translation = "「응응읏── 앗, 응응응읏──! 앗…… 이제, 참지 못하고, 스스로 자지 움직이고 있잖아요……<emoji=heart04> 하앗, 응응읏읏」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「遠慮せず──んっ、気持ちよくなって、いいんですから……ぁっ、私に、任せておけばいいんです──んっ……<emoji=heart04>\u3000ふぅ、んっ……んぅっ……<emoji=heart04>」"
translation = "「사양 말고── 응읏, 기분 좋아져도, 괜찮으니까요…… 앗, 저에게, 맡겨두면 돼요── 응읏……<emoji=heart04> 후우, 응읏…… 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "受動的な悦楽の波に耐えきれず、こちらから前後に腰を揺すってしまう。"
translation = "수동적인 쾌락의 파도를 견디지 못하고, 이쪽에서 앞뒤로 허리를 흔들어버린다."

[[dialogue]]
speaker = "unk"
original = "それを迎えるようにフィオナが肉壺をきゅっと締めると、抗いがたい快感が背筋から脳天までを駆け抜けた。"
translation = "그것을 맞이하듯이 피오나가 육두덩을 꽉 조이자, 저항할 수 없는 쾌감이 등골에서 정수리까지를 꿰뚫었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んぁっ──んっ──んんぅっ……！\u3000ふふ──会長さんの余裕がない顔……可愛いです………<emoji=heart04>\u3000ぁっ、ふぁぁっ、んっ、んんんんっ<emoji=heart04>」"
translation = "「응앗── 응읏── 응응읏……! 후후── 회장님의 여유 없는 얼굴…… 귀여워요………<emoji=heart04> 앗, 화아앗, 응읏, 응응응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「会長さんはいつもこうやって──ぁっ、私のこと、いじめてたんですね……っ<emoji=heart04>\u3000なんだか、気持ちがわかりました──ぁっ、んぁっ……！」"
translation = "「회장님은 항상 이렇게── 앗, 저를, 괴롭혔던 거군요……읏<emoji=heart04> 왠지, 기분을 알겠어요── 앗, 응앗……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いいんですよ──んっ、何も考えず──ぁっ、気持ちよくなって……<emoji=heart04>\u3000私の中に、びゅーびゅーって出しちゃえばいいんです……っ……<emoji=heart04>」"
translation = "「괜찮아요── 응읏, 아무것도 생각하지 말고── 앗, 기분 좋아져서……<emoji=heart04> 제 안에, 뷰ー뷰ー 하고 싸버리면 돼요……읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「神聖な大聖堂で──んぁっ、こんな、不浄な行為に及ぶなんて──んっ、会長さんは……ぁっ、悪い人ですね……っ……<emoji=heart04>」"
translation = "「신성한 대성당에서── 응앗, 이런, 불결한 행위를 하다니── 응읏, 회장님은…… 앗, 나쁜 사람이네요……읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すっかりこちらの肉棒にフィットしたフィオナの肉壁が、精子を搾り取らんとうねる。"
translation = "완전히 이쪽 육봉에 딱 맞은 피오나의 살벽이, 정자를 짜내려는 듯 꿈틀거린다."

[[dialogue]]
speaker = "unk"
original = "目の前の彼女が揺れるたび、いい香りが漂ってきて、興奮がいつまでも冷めやらなかった。"
translation = "눈앞의 그녀가 흔들릴 때마다, 좋은 향기가 풍겨와, 흥분이 언제까지고 식지 않았다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁっ──んっ、んんぅっ、んぁぁっ<emoji=heart04>\u3000んっ──んんっ……ぁっ、はぁっ、はぁっ……んっ、んんぅっ……<emoji=heart04>\u3000はぁ、はぁっ……<emoji=heart04>」"
translation = "「하앗── 응읏, 응응읏, 응아앗<emoji=heart04> 응읏── 응응읏…… 앗, 하앗, 하앗…… 응읏, 응응읏……<emoji=heart04> 하아, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですけど、これ──ぁっ……私も──んあっ、いいところに──んっ、当たります……んんぅっ<emoji=heart04>\u3000おま○この、奥に……んっ、んんっ！」"
translation = "「그렇지만, 이거── 앗…… 저도── 응앗, 좋은 곳에── 응읏, 맞아요…… 응응읏<emoji=heart04> 보지, 안쪽에…… 응읏, 응응읏!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ──はぁ──んっ、んんんっ……！\u3000ぁっ……<emoji=heart04>\u3000ふぅ、ふぅ……っ……んっ、んんっ──ぁっ、んっ、そこ……んんっ……<emoji=heart04>」"
translation = "「하아── 하아── 응읏, 응응응읏……! 앗……<emoji=heart04> 후우, 후우……읏…… 응읏, 응응읏── 앗, 응읏, 거기…… 응응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フィオナの喘ぎ声が徐々に大きくなっていく。"
translation = "피오나의 신음 소리가 서서히 커져간다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え……？\u3000私のほうが、夢中になってる……？\u3000そ、そんなことはありませんっ──今日は……んぁっ、私が──あなたを、責めてあげるんですから……ぁっ、んぁっ<emoji=heart04>」"
translation = "「에……? 제가 더, 정신 팔려 있다고요……? 그, 그럴 리 없어요읏── 오늘은…… 응앗, 제가── 당신을, 괴롭혀 줄 거니까요…… 앗, 응앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが──んっ、んんんっ……！\u3000このおち○ぽが──ぁっ、気持ちよくて──んんんんっ……<emoji=heart04>\u3000はぁ、はぁ……んっ、ふぅっ……んんっ……ぁっ……！」"
translation = "「하지만── 응읏, 응응응읏……! 이 자지가── 앗, 기분 좋아서── 응응응응읏……<emoji=heart04> 하아, 하아…… 응읏, 후읏…… 응응읏…… 앗……!」"

[[dialogue]]
speaker = "unk"
original = "気づけばフィオナの腰振りは、妙な角度で一定になっていた。"
translation = "정신을 차려보니 피오나의 허리 흔들기는, 묘한 각도로 일정해져 있었다."

[[dialogue]]
speaker = "unk"
original = "どうやらそこが彼女にとって一番感じる<b>当たり方</b>らしく──愛液がびちゃびちゃと音を立てるのもお構いなしに、こちらへ揺すってきていた。"
translation = "아무래도 그곳이 그녀에게 있어 가장 느끼는 <b>맞닿는</b> 방식인 듯── 애액이 질척질척 소리를 내는 것도 개의치 않고, 이쪽으로 흔들어대고 있었다."

[[dialogue]]
speaker = "unk"
original = "なので……"
translation = "그래서……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──んぁぁっ！\u3000か、会長さん──んんっ<emoji=heart04>\u3000だ、だめです、勝手に動いたら──ぁっ、んぁっっ、んんぁぁっ！\u3000ぁっ、んふぅぅっ……<emoji=heart04>」"
translation = "「──응아앗! 회, 회장님── 응응읏<emoji=heart04> 안, 안 돼요, 멋대로 움직이면── 앗, 응앗읏, 응응아앗! 앗, 응후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こら──ぁっ、お預け、ですっ……<emoji=heart04>\u3000今は、んっ、私がっ、いじめる番なんですから──勝手に腰を振るなんて──んぁっ、んんんっっ──！」"
translation = "「이봐요── 앗, 참아야, 해요읏……<emoji=heart04> 지금은, 응읏, 제가읏, 괴롭힐 차례니까── 멋대로 허리를 흔들다니── 응앗, 응응응읏읏──!」"

[[dialogue]]
speaker = "unk"
original = "こちらからの動きがよほど良かったのか、フィオナはわずかに体を震わせて小さく達した。"
translation = "이쪽에서의 움직임이 꽤 좋았던 것인지, 피오나는 미세하게 몸을 떨며 작게 절정에 달했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──っ、はぁ、はぁっ……もうっ……会長さんのおち○ぽは、凶悪なんですから……っ<emoji=heart04>\u3000好きに動かれては──んっ、困りますっ……<emoji=heart04>」"
translation = "「──읏, 하아, 하앗…… 정말읏…… 회장님의 자지는, 흉악하니까요……읏<emoji=heart04> 마음대로 움직여지면── 응읏, 곤란해요읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「動いちゃメッ……ですからね……？\u3000はぁっ、はぁっ……んっ、んんぅぅっ……っ……！\u3000んっ、んんっ──っ……<emoji=heart04>」"
translation = "「움직이면 안 돼읏…… 이니까요……? 하앗, 하앗…… 응읏, 응응우읏……읏……! 응읏, 응응읏──읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お叱りを受けてしまったので、仕方なく腰を落ち着かせる。"
translation = "꾸지람을 들어버렸기 때문에, 어쩔 수 없이 허리를 진정시킨다."

[[dialogue]]
speaker = "unk"
original = "が……"
translation = "하지만……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ──はぁ──んっ、ふぅうっ……<emoji=heart04>\u3000ぁっ、んんっ！\u3000も、もう、動いちゃダメって──」"
translation = "「하아── 하아── 응읏, 후우읏……<emoji=heart04> 앗, 응응읏! 이, 이제, 움직이면 안 된다고──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「え……？\u3000動いてない……？\u3000動いていたのは私……？\u3000っっっ～～～……<emoji=heart04><emoji=heart04><emoji=heart04>\u3000し、知りません──ぁっ、んんっ、んぁぁっ……！！」"
translation = "「에……? 움직이지 않았다……? 움직이고 있던 건 저……? 읏읏읏～～～……<emoji=heart04><emoji=heart04><emoji=heart04> 모, 몰라요── 앗, 응응읏, 응아앗……!!」"

[[dialogue]]
speaker = "unk"
original = "口ではそう言うものの、フィオナはすっかり自分から快楽をむさぼるようになっていた。"
translation = "입으로는 그렇게 말하면서도, 피오나는 완전히 스스로 쾌락을 탐닉하게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "ここが大聖堂ということも忘れ、お互いにお互いのことしか目に入らなくなっていく……。"
translation = "이곳이 대성당이라는 것도 잊고, 서로가 서로밖에 눈에 들어오지 않게 되어간다……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぅ──ふぅ──んっ、ふぅぅっ……<emoji=heart04>\u3000はぁ、はぁっ……や、やっぱりこれ──気持ちいい、ですっ……体が……勝手に、動いちゃいます……っ<emoji=heart04>」"
translation = "「후우── 후우── 응읏, 후우읏……<emoji=heart04> 하아, 하앗…… 역, 역시 이거── 기분 좋아, 요읏…… 몸이…… 멋대로, 움직여버려요……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも──会長さんだって……ぁっ<emoji=heart04>\u3000さっきから、んっ、腰、どんどん止まらなくなってますよ……？\u3000はぁ、はぁっ……<emoji=heart04>\u3000んっ、んんんっ」"
translation = "「하지만── 회장님도…… 앗<emoji=heart04> 아까부터, 응읏, 허리, 점점 멈추지 않게 되고 있어요……? 하아, 하앗……<emoji=heart04> 응읏, 응응응읏」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私のおま○こ……そんなに、気持ちいいですか……？\u3000はぁ、はぁ──なら──んっ、もっと、いじめちゃいます──んっ、んんっ、んぁぁっ<emoji=heart04>」"
translation = "「제 보지…… 그렇게, 기분 좋아요……? 하아, 하아── 그럼── 응읏, 좀 더, 괴롭혀 줄게요── 응읏, 응응읏, 응아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それもまたその通りだった。"
translation = "그것 또한 그 말대로였다."

[[dialogue]]
speaker = "unk"
original = "一度、こちらからもピストンする快感を覚えてしまえば──後はもう沼に沈み込んでいくだけだった。"
translation = "일단, 이쪽에서도 피스톤하는 쾌감을 기억해버리자── 그 후는 이미 늪에 가라앉아 들어갈 뿐이었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──はぁっ、んんっ、んぁぁっ！\u3000はぁ、はぁぁっ──っ……！\u3000も、もっと──もっと、きてぇっ──んぁっ、ください──んっ、んぁぁっ……！」"
translation = "「──하앗, 응응읏, 응아앗! 하아, 하아앗──읏……! 더, 더── 더, 와줘어읏── 응앗, 주세요── 응읏, 응아앗……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ、はぁ、はぁっ……！\u3000私の──んっ、おま○こも──っ、ずっと、きゅんきゅんして──ぁっ、んんっ！\u3000おかしく、なりそうです──んぁぁっ……<emoji=heart04>」"
translation = "「하아, 하아, 하앗……! 제── 응읏, 보지도──읏, 계속, 큥큥거려서── 앗, 응응읏! 이상해질, 것 같아요── 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いに、溶けて混ざり合うように腰をぶつけ合う。"
translation = "서로, 녹아 섞이듯이 허리를 부딪친다."

[[dialogue]]
speaker = "unk"
original = "冷え切った大聖堂の中で、ここの空間だけ数倍の湿度に達していた。"
translation = "차가워진 대성당 안에서, 이 공간만 몇 배의 습도에 달해 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んぅぅぅ～～～～っっ……ぁっ！\u3000はぁっ、んんっ、んぁっ！\u3000はぁ、はぁ、っ……会長、さん──ぁっ、んぁっ、んぁぁぁっ<emoji=heart04>」"
translation = "「응우우우~~~~읏읏…… 앗! 하앗, 응응읏, 응앗! 하아, 하아, 읏…… 회장, 님── 앗, 응앗, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぁっぁっぁっ──だ、だめです──んっ、もう、達して、しまいそう、です──っ……<emoji=heart04>\u3000で、でも──ぉっ……んんっ、んんん～～～っっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앗아앗아앗── 안, 안 돼요── 응읏, 이제, 절정에, 달해, 버릴 것, 같아요──읏……<emoji=heart04> 그, 그래도── 옷…… 응응읏, 응응응~~~읏읏……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぁっ、今日ばかりは──んんっ……<emoji=heart04>\u3000会長さんより、先に──んんっ、イくわけには──ぁっ、んぁぁっ、ふぁぁぁっ……<emoji=heart04>\u3000ふっ、ふぅっ、ふぅぅっ<emoji=heart04>」"
translation = "「앗, 오늘만큼은── 응응읏……<emoji=heart04> 회장님보다, 먼저── 응응읏, 가버릴 수는── 앗, 응아앗, 화아앗……<emoji=heart04> 훗, 후읏, 후우읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フィオナは、自分よりも先にこちらを絶頂させようとさらに前後動を激しくする。"
translation = "피오나는, 자신보다 먼저 이쪽을 절정시키려고 더욱 앞뒤 움직임을 격렬하게 한다."

[[dialogue]]
speaker = "unk"
original = "しかし、そのためのグラインドは、自ら肉棒を欲するような諸刃の剣でもあって──"
translation = "하지만, 그것을 위한 그라인드는, 스스로 육봉을 원하는 듯한 양날의 검이기도 해서──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んぁぁっ──ぁっ、んんっ、んんんぅうぅっっ……<emoji=heart04>\u3000お、おま○こ、気持ちよすぎて──でも、我慢っ……ぁっ、んぁっ、ふぇぁぁっ<emoji=heart04>」"
translation = "「응아앗── 앗, 응응읏, 응응응우우읏읏……<emoji=heart04> 보, 보지, 너무 기분 좋아서── 하지만, 참아야읏…… 앗, 응앗, 훼아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぅぅぅっ……<emoji=heart04>\u3000はぁ、はぁぁっ──んっ、んんんっ……！\u3000ぁっ、だ、だめかも──ぁっ、ふぁぁっ、んんんんっっっ…………<emoji=heart04><emoji=heart04>」"
translation = "「으으으읏……<emoji=heart04> 하아, 하아앗── 응읏, 응응응읏……! 앗, 안, 안 될지도── 앗, 화아앗, 응응응응읏읏읏…………<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フィオナの全身がかすかに震えだし、体重が徐々にこちらへかかってきた。"
translation = "피오나의 전신이 희미하게 떨리기 시작하고, 체중이 서서히 이쪽으로 실려왔다."

[[dialogue]]
speaker = "unk"
original = "さらにペニスを締めつけるような膣内の<ruby>蠕動<rt>ぜんどう</rt></ruby>──こちらも一気に射精欲が高まってくる！"
translation = "게다가 페니스를 조이는 듯한 질 내부의 꿈틀거림── 이쪽도 단숨에 사정욕이 높아져 온다!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぁぁぁっ……んぁっ、んぁぁっ、ふぁっ、んんんんんんんん──────」"
translation = "「아아앗…… 응앗, 응아앗, 홧, 응응응응응응응응──────」"

[[dialogue]]
speaker = "unk"
original = "お互いに、むさぼるように腰をぶつけ合った、次の瞬間──"
translation = "서로, 탐닉하듯이 허리를 부딪친, 다음 순간──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ぁっ──んぁぁぁぁぁぁぁぁぁぁぁぁぁぁぁああああぁぁああぁぁ～～～～～～～っっっっっ……………………！！！」"
translation = "「앗── 응아아아아아아아아아아아아아아아아아아아아아아아아~~~~~~~읏읏읏읏읏……………………!!!」"

[[dialogue]]
speaker = "unk"
original = "──耐え続けてきた防波堤が、決壊した。"
translation = "──계속 참아왔던 방파제가, 무너졌다."

[[dialogue]]
speaker = "unk"
original = "フィオナの最も深い膣奥で、壊れたポンプのように何度も精液を吐き出す。"
translation = "피오나의 가장 깊은 질 안쪽에서, 고장 난 펌프처럼 몇 번이고 정액을 토해낸다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「っっ──ぁっ──んっ、ふぅぅっ──っ…………<emoji=heart04>\u3000はぁ、はぁっ──ふぅ、ふぅっ……んっ……ぁっ、はぁっ、はぁっっっ……<emoji=heart04>」"
translation = "「읏읏── 앗── 응읏, 후우읏──읏…………<emoji=heart04> 하아, 하앗── 후우, 후읏…… 응읏…… 앗, 하앗, 하앗읏읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その感覚は──まさに搾り取られるという表現がふさわしかった。"
translation = "그 감각은── 그야말로 짜인다는 표현이 적합했다."

[[dialogue]]
speaker = "unk"
original = "こちらの想定を超えるほどにペニスが脈打ち、とめどなく精子がフィオナの膣内に吸い上げられていく。"
translation = "이쪽의 예상을 뛰어넘을 정도로 페니스가 맥동하고, 끊임없이 정자가 피오나의 질 내에 빨려 들어간다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんっ──んっ……んんんんぅぅぅっっ……<emoji=heart04>\u3000ぁっ──はっ、はっ、はぁっ……！\u3000んっ………………んぁぁぁっ………………<emoji=heart04>」"
translation = "「응응읏── 응읏…… 응응응응우우읏읏……<emoji=heart04> 앗── 핫, 핫, 하앗……! 응읏……………… 응아아앗………………<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、びくびくと痙攣しきった彼女の肢体が、こちらへゆっくり倒れかかってくる……。"
translation = "그리고 나서, 움찔움찔 경련하는 그녀의 사지가, 이쪽으로 천천히 쓰러져 온다……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぅ……ふぅ……っ……<emoji=heart04>\u3000結局──んっ……私も……イかされちゃいました……<emoji=heart04>\u3000会長さんのココが……気持ちよすぎるのが、いけないんですからね……<emoji=heart04>」"
translation = "「후우…… 후우……읏……<emoji=heart04> 결국── 응읏…… 저도…… 가버리고 말았어요……<emoji=heart04> 회장님의 여기가…… 너무 기분 좋은 것이, 나쁜 거니까요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが……ふふっ<emoji=heart04>\u3000快感をこらえている会長さんのお顔は……たいへん可愛かったです<emoji=heart04>\u3000私だけにしか見られない表情で……ふふっ」"
translation = "「하지만…… 후훗<emoji=heart04> 쾌감을 참고 있는 회장님의 얼굴은…… 굉장히 귀여웠어요<emoji=heart04> 저에게만 보일 수 있는 표정으로…… 후훗」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「また、溜まっちゃったら言ってくださいね……？\u3000私が、何度でも搾り取ってあげますから……<emoji=heart04>」"
translation = "「또, 고여버리면 말해주세요……? 제가, 몇 번이라도 짜내 줄 테니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "魔王というより、小悪魔な微笑を浮かべられて──"
translation = "마왕이라기보다, 소악마 같은 미소를 띠고──"

[[dialogue]]
speaker = "unk"
original = "俺たちの関係は、ますます深まっていくのだった。"
translation = "우리들의 관계는, 더욱더 깊어져 가는 것이었다."

