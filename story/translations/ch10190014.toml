[[dialogue]]
speaker = "unk"
original = "第４話,開発されてしまったんだ,P"
translation = "제4화, 개발되어 버렸다, P"

[[dialogue]]
speaker = "unk"
original = "せつなのお試し『主様』としての期間も大分長くなって来たある日のこと――"
translation = "세츠나의 시험 삼아 『주군』으로서의 기간도 꽤 길어진 어느 날의 일――"

[[dialogue]]
speaker = "せつな"
original = "「よし、掃除と洗濯、上手く行きましてにござる♪」"
translation = "「좋아, 청소와 빨래, 잘 끝냈소이다♪」"

[[dialogue]]
speaker = "せつな"
original = "「おや？\u3000主様、せつなの顔に何か付いておりまするか？」"
translation = "「어라? 주군, 세츠나의 얼굴에 뭐라도 묻었소이까?」"

[[dialogue]]
speaker = "unk"
original = "家で一緒に居るのも馴染んで来たなって"
translation = "집에서 같이 있는 것도 익숙해졌구나 싶어서."

[[dialogue]]
speaker = "せつな"
original = "「おおっ、ということは、せつなのメイド力も上がって来たということでござるな！」"
translation = "「오오, 그 말은 즉 세츠나의 메이드력도 올라갔다는 것이구려!」"

[[dialogue]]
speaker = "せつな"
original = "「苦手な家事を克服する為、リノ殿に師事して早数か月。修行して良かったでござる♪\u3000主様の側に仕える忍として、恥ずかしくない存在にならねばなりませぬから」"
translation = "「서툰 집안일을 극복하기 위해 리노 공에게 사사한 지 벌써 수개월. 수행하길 잘했소♪ 주군의 곁을 모시는 닌자로서 부끄럽지 않은 존재가 되어야 하니까 말이오.」"

[[dialogue]]
speaker = "せつな"
original = "「え？\u3000頑張ったご褒美でござるか？\u3000な、何でもして欲しいこと……それなら――」"
translation = "「에? 열심히 한 포상 말이오? 무, 무엇이든 원하는 것…… 그렇다면――」"

[[dialogue]]
speaker = "せつな"
original = "「ふにゃあ……♪\u3000ごろごろ……♪」"
translation = "「후냐아……♪ 고로고로……♪」"

[[dialogue]]
speaker = "unk"
original = "いつもと変わらなくない？"
translation = "평소랑 똑같지 않아?"

[[dialogue]]
speaker = "unk"
original = "ご褒美が『おうちデート』って"
translation = "포상이 『집 데이트』라니."

[[dialogue]]
speaker = "せつな"
original = "「いやいや、大違いでござる。今日はせつなのご褒美であるが故、主様と好きに過ごさせて貰うのでござるにゃん♪」"
translation = "「아니 아니, 천지 차이오. 오늘은 세츠나의 포상이기에 주군과 마음껏 시간을 보내고 싶은 것이오냥♪」"

[[dialogue]]
speaker = "せつな"
original = "「たとえばこうして、主様に膝枕をして貰ったり」"
translation = "「예를 들면 이렇게, 주군에게 무릎베개를 받는다거나.」"

[[dialogue]]
speaker = "unk"
original = "最近割とやってないか？"
translation = "최근 꽤 자주 하고 있지 않아?"

[[dialogue]]
speaker = "せつな"
original = "「頭をよしよしと撫でて貰ったり……あっ、そこそこ<emoji=heart04>\u3000主様の手、好きでござるぅ……<emoji=heart04>」"
translation = "「머리를 쓰담쓰담 받는다거나…… 앗, 거기 거기<emoji=heart04> 주군의 손, 좋소이다……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「……はて？\u3000でも、主様の言う通り、これも最近よくやって貰っているような……？」"
translation = "「……어라? 하지만 주군 말씀대로 이것도 최근 자주 받고 있는 것 같은……?」"

[[dialogue]]
speaker = "せつな"
original = "「そもそも、主様の家に出入りするようになったきっかけって、何でござったか……？\u3000そう、確か恋愛に慣れる為、家でもデートするようになったのが始まりで……」"
translation = "「애초에 주군의 집에 드나들게 된 계기가 무엇이었소……? 맞소, 분명 연애에 익숙해지기 위해 집에서도 데이트를 하게 된 것이 시작이었고……」"

[[dialogue]]
speaker = "unk"
original = "いつの間にか普通になって、今に至る感じだ"
translation = "어느샌가 당연해져서 지금에 이른 느낌이야."

[[dialogue]]
speaker = "せつな"
original = "「ということはせつな、自分でも無自覚の内に、デートに慣れていたと！？」"
translation = "「그 말은 즉 세츠나, 스스로도 무자각한 사이에 데이트에 익숙해져 있었다는 것!?」"

[[dialogue]]
speaker = "せつな"
original = "「い、いつの間にかせつな、主様に開発されて、ド変態になってしまったでござる……！」"
translation = "「어, 어느샌가 세츠나, 주군에게 개발되어 버려서 도변태가 되어버렸소……!」"

[[dialogue]]
speaker = "unk"
original = "また今度、おでかけデートでもするか？"
translation = "다음에 또 밖으로 데이트라도 갈까?"

[[dialogue]]
speaker = "unk"
original = "言い方！\u3000でも、慣れて来たなら"
translation = "말투 참! 그래도 익숙해졌다면."

[[dialogue]]
speaker = "せつな"
original = "「そ、それは恥ずかしいでござる！\u3000人目のあるところでは、恋愛は忍ぶものでござる！」"
translation = "「그, 그것은 부끄럽소! 남의 눈이 있는 곳에서의 연애는 숨겨야 하는 법이오!」"

[[dialogue]]
speaker = "せつな"
original = "「忍者として、もっとレベルアップしないとダメ？\u3000うぅ……それを言われてしまうと……」"
translation = "「닌자로서 좀 더 레벨업하지 않으면 안 돼? 우으…… 그렇게 말씀하시면……」"

[[dialogue]]
speaker = "せつな"
original = "「というか、何か恋愛事と意識したら、主様とこうしてスキンシップしているのも、こ、恋人のようで恥ずかしく思えて来たでござる……！\u3000って、ふあぁっ<emoji=heart04>」"
translation = "「그보다 뭔가 연애라고 의식하니 주군과 이렇게 스킨십하고 있는 것도, 여, 연인 같아서 부끄럽게 느껴지기 시작했소……! 앗, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「いきなり耳と顎を優しく撫でるのは、ダメでござるよぉ！\u3000んんっ……そこはせつなの弱いところでござるにゃん<emoji=heart04>」"
translation = "「갑자기 귀와 턱을 부드럽게 쓰다듬는 건 안 되오! 응으…… 거기는 세츠나의 약한 곳이오냥<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「あ、主様……あんっ<emoji=heart04>\u3000せつな、せつな気持ち良くて、とろけちゃ…………あれ？」"
translation = "「주, 주군…… 안앗<emoji=heart04> 세츠나, 세츠나 기분 좋아서 녹아버릴 것………… 어라?」"

[[dialogue]]
speaker = "せつな"
original = "「ど、どうして突然、止めちゃうのでござるか……？」"
translation = "「어, 어째서 갑자기 멈추는 것이오……?」"

[[dialogue]]
speaker = "せつな"
original = "「して欲しかったら、おでかけデートするのが条件？\u3000そ、それを交渉材料にされてしまうと断れないでござるよぉ……」"
translation = "「받고 싶으면 외출 데이트를 하는 게 조건? 그, 그걸 교섭 재료로 삼으시면 거절할 수 없소이다……」"

[[dialogue]]
speaker = "せつな"
original = "「ふにゃあ……顎と耳の撫で撫で来たぁ<emoji=heart04>\u3000わ、わかったでござるぅ……主様の言うこと、何でも聞きまするぅ<emoji=heart04>\u3000にゃあん<emoji=heart04>\u3000ごろごろ<emoji=heart04>」"
translation = "「후냐아…… 턱이랑 귀 쓰담쓰담 왔다아<emoji=heart04> 아, 알겠소이다…… 주군이 하시는 말씀 뭐든 듣겠소이다아<emoji=heart04> 냐앙<emoji=heart04> 고로고로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "よしよし。良い子だ"
translation = "착하다, 착해."

[[dialogue]]
speaker = "せつな"
original = "「……ふぅ、ふぅ……や、やはりせつな、いつの間にか主様に開発されている気がするでござる……！」"
translation = "「……후우, 후우…… 여, 역시 세츠나, 어느샌가 주군에게 개발되고 있는 기분이 드오……!」"

[[dialogue]]
speaker = "せつな"
original = "「違う？\u3000逆でござるか？\u3000せつなのせい？\u3000それはどういう……」"
translation = "「아니야? 반대라고? 세츠나 때문? 그건 무슨……」"

[[dialogue]]
speaker = "unk"
original = "つい意地悪になっちゃうんだ"
translation = "자꾸 심술궂게 굴게 된단 말이지."

[[dialogue]]
speaker = "unk"
original = "せつなが可愛いから"
translation = "세츠나가 귀여우니까."

[[dialogue]]
speaker = "せつな"
original = "「か、可愛い！？\u3000主様がせつなのことをそんな風に！？\u3000あわわわわわわ……！」"
translation = "「귀, 귀엽다니!? 주군이 세츠나를 그런 식으로!? 아와와와와와와……!」"

[[dialogue]]
speaker = "せつな"
original = "「な、何でいきなりそんなこと！？\u3000せつな、ドキドキして、恥ずかしくなってしまうでござる！」"
translation = "「어, 어째서 갑자기 그런 말씀을!? 세츠나, 두근거려서 부끄러워져 버리오!」"

[[dialogue]]
speaker = "せつな"
original = "「なっ、せつなからエッチに開発されてしまった！？\u3000まさか、日頃胸を押し付けたり、パンチラをしたりと房中術をし続けたせいでござるか！？」"
translation = "「낫, 세츠나 때문에 야하게 개발되어 버렸다고!? 설마 평소에 가슴을 밀어붙이거나 판치라를 하는 등 방중술을 계속한 탓이오!?」"

[[dialogue]]
speaker = "せつな"
original = "「せ、責任を取れでござるか！？\u3000申し訳ありませぬ！\u3000でも、一体どうすれば――」"
translation = "「책, 책임을 지라는 것이오!? 송구하오! 하지만 대체 어떻게 하면――」"

[[dialogue]]
speaker = "unk"
original = "俺専属の忍者になって欲しい"
translation = "내 전속 닌자가 되어줬으면 좋겠어."

[[dialogue]]
speaker = "unk"
original = "責任を取って"
translation = "책임지고."

[[dialogue]]
speaker = "せつな"
original = "「かくなる上はこのせつな、切腹してお詫びを！\u3000……って、え？\u3000今なんて？」"
translation = "「이리 된 이상 이 세츠나, 할복하여 사죄를! ……어라, 에? 지금 뭐라고?」"

[[dialogue]]
speaker = "せつな"
original = "「主様専属の忍者？\u3000それってつまり……お試しではなく、せつなの正式な主様になってくれるということでござるか！？」"
translation = "「주군 전속 닌자? 그건 즉…… 시험 삼아가 아니라 세츠나의 정식 주군이 되어 주신다는 것이오!?」"

[[dialogue]]
speaker = "せつな"
original = "「えぇっ！？\u3000何これドッキリでござるか！？\u3000新たな訓練的なそういう……って、主様！\u3000何故笑うのでござるか！？\u3000やはりドッキリでござるか！？\u3000そうなのでござるか！？」"
translation = "「에에!? 뭐야 이거 몰래카메라이오!? 새로운 훈련 같은 그런…… 어라, 주군! 어째서 웃으시는 것이오!? 역시 몰래카메라이오!? 그런 것이오!?」"

[[dialogue]]
speaker = "せつな"
original = "「も、もちろん嫌ではないでござる！\u3000こんなに嬉しいことはありませぬ！\u3000でも、何だか現実感が無くて……せつなはまだまだ未熟者でござるから」"
translation = "「무, 물론 싫지 않소! 이보다 기쁜 일은 없소이다! 하지만 왠지 현실감이 없어서…… 세츠나는 아직 미숙한 자이기에.」"

[[dialogue]]
speaker = "せつな"
original = "「主様も同じ？\u3000そんなことは無いでござる！\u3000会長になってまだ期間は短いかもしれませぬが、その頑張りはせつなが近くで見て来て、よく知っているでござる！」"
translation = "「주군도 마찬가지라고? 그럴 리 없소! 회장이 된 지는 아직 짧을지 모르나 그 노력을 세츠나가 곁에서 지켜봐 와서 잘 알고 있소!」"

[[dialogue]]
speaker = "unk"
original = "俺もせつなの頑張りを見て来たよ"
translation = "나도 세츠나가 노력하는 거 봐왔어."

[[dialogue]]
speaker = "unk"
original = "だから、これからも側で支えて欲しい。一緒に成長して行こう。そう伝えた。"
translation = "그러니까 앞으로도 곁에서 지탱해 줘. 함께 성장해 나가자. 그렇게 전했다."

[[dialogue]]
speaker = "せつな"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker = "せつな"
original = "「は、はい、主様……！\u3000せつなは――」"
translation = "「네, 주군……! 세츠나는――」"

[[dialogue]]
speaker = "せつな"
original = "「せつなは主様が望んでくれるなら、この身を尽くしてお仕え致しまする……！」"
translation = "「세츠나는 주군이 원하신다면 이 몸을 다해 모시겠소이다……!」"

[[dialogue]]
speaker = "せつな"
original = "「あ……主様の手、温かいでござる<emoji=heart04>\u3000えへへ……<emoji=heart04>」"
translation = "「아…… 주군의 손, 따뜻하오<emoji=heart04> 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頭を優しく撫でると、せつなはとても幸せそうな笑顔を浮かべるのだった。"
translation = "머리를 부드럽게 쓰다듬자 세츠나는 무척 행복한 미소를 지었다."

