original = "「んああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000少年、私もイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 소년, 나도 가아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04><emoji=heart04>\u3000ふああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おま○こ、イク<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 하아<emoji=heart04><emoji=heart04> 후아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 보지 가아<emoji=heart04><emoji=heart04><emoji=heart04> 가, 가, 가, 가, 가버려어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
