[[dialogue]]
speaker = "unk"
original = "リコさんと恋人として男女関係になってから、しばらく経ったある日のこと。"
translation = "리코 씨와 연인으로서 남녀 관계가 된 지 얼마간의 시간이 흐른 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "その日は２週間ぶりのオフで、リゾート結界のプライベートビーチに２人きりで過ごすことになったのだが――"
translation = "그날은 2주 만의 휴일이라 리조트 결계의 프라이빗 비치에서 둘이서만 보내게 되었는데──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ……<emoji=heart04>\u3000少年<emoji=heart04>」"
translation = "「응……<emoji=heart04> 소년<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "このところお互い仕事が忙しくてスキンシップが出来ていなかった為、リゾート結界に入ってすぐ、キスを始めてしまう。"
translation = "요즘 서로 일이 바빠서 스킨십을 하지 못했기에, 리조트 결계에 들어오자마자 키스를 시작한다."

[[dialogue]]
speaker = "unk"
original = "もちろん、唇を触れ合わせるだけでは我慢できず、どちらからともなく舌を絡め合って――"
translation = "물론 입술을 맞대는 것만으로는 참지 못하고 누가 먼저랄 것도 없이 혀를 섞으며──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はぁっ……んむっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「하아…… 음뭇<emoji=heart04> 쪽<emoji=heart04> 쪽……<emoji=heart04> 레로쥬릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ちゅぱっ<emoji=heart04>\u3000ちゅむっ……ちゅるるっ<emoji=heart04>\u3000れるれるっ……んちゅっ<emoji=heart04>\u3000ちゅぷっ……ちゅぷぷっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅぱっ……れろちゅっ<emoji=heart04>」"
translation = "「쮸웁<emoji=heart04> 츔…… 츄르릇<emoji=heart04> 렐렐레…… 응츄<emoji=heart04> 츕…… 츕츕<emoji=heart04> 음뭇<emoji=heart04> 쮸웁…… 레로쥬릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んはぁっ……<emoji=heart04>\u3000ふふっ、久しぶりの、舌を絡め合う大人のキスは効くな……<emoji=heart04>」"
translation = "「은하아……<emoji=heart04> 후후, 오랜만에 혀를 섞는 어른의 키스는 잘 듣는군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「それで、どうだ？\u3000少年もそろそろ<b>効いてきた</b>か？」"
translation = "「그래서, 어떤가? 소년도 슬슬 **효과가 오나**?」"

[[dialogue]]
speaker = "unk"
original = "彼女に言われて、俺は気づく。"
translation = "그녀의 말을 듣고 나는 깨닫는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「体が熱い……？\u3000リコさん、これは……」"
translation = "「몸이 뜨거워……? 리코 씨, 이건……」"

[[dialogue]]
speaker = "unk"
original = "俺はなんだか無性に興奮して、ペニスがみるみる勃起してしまっていた。"
translation = "나는 왠지 모르게 흥분해서 자지가 눈에 띄게 발기해버리고 말았다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「実は毒を盛ってな。キスで口移しさせてもらった」"
translation = "「사실 독을 썼다. 키스로 입을 통해 옮겨줬지」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なに、そんなに悪いものじゃない。毒は薬にもなる。いわゆる、<b>媚薬</b>というやつだ」"
translation = "「뭐, 그렇게 나쁜 건 아니다. 독은 약도 되는 법. 이른바 **미약**이라는 거다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「私の能力は毒を作り出すこと。ならば、セックスを覚えてしまった以上、こういうエッチな使い方にも興味が湧いてしまうのは当然だろう？」"
translation = "「내 능력은 독을 만들어내는 것. 그렇다면 섹스를 알아버린 이상, 이런 야한 사용법에도 흥미가 생기는 건 당연하지 않겠나?」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺たちはプライベートビーチに設置されている水上コテージに移動して――"
translation = "그렇게 우리들은 프라이빗 비치에 설치된 수상 코테지로 이동하여──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ん……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ふふっ……ちゃんと少年のお腹に<b>淫紋</b>が出ているな……<emoji=heart04>」"
translation = "「후후…… 제대로 소년의 배에 **음문**이 나타났군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これって……？」"
translation = "「이건……?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「媚薬の効果が出ているか、分かるようにする為の印だ。ちなみに、解除方法は性欲が満たされるまで、射精もしくは絶頂すること」"
translation = "「미약의 효과가 나타나고 있는지 알 수 있게 하기 위한 표식이다. 참고로 해제 방법은 성욕이 채워질 때까지 사정 혹은 절정하는 것」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「絶頂……？」"
translation = "「절정……?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「媚薬は口移しで飲ませただろう？\u3000つまり、私もキミと同じく媚薬を飲んだ状態というわけだ……<emoji=heart04>」"
translation = "「미약은 입으로 먹여줬지? 즉 나도 자네와 마찬가지로 미약을 마신 상태라는 소리다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「それじゃあ、始めるぞ……<emoji=heart04>」"
translation = "「그럼 시작하지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リコさんがおま○こをペニスに擦りつけ、素股をし始める。"
translation = "리코 씨가 보지를 자지에 비벼대며 스마타를 하기 시작한다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はあぁっ……<emoji=heart04>\u3000少年のすごいっ……<emoji=heart04>\u3000もうこんな大きく、熱くなって……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 소년 거 대단해……<emoji=heart04> 벌써 이렇게 커지고 뜨거워져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リコさんも、愛液の量すごい……」"
translation = "「리코 씨도 애액 양이 엄청나요……」"

[[dialogue]]
speaker = "unk"
original = "素股をする前から、おま○こはつゆだくだくで、ペニスと擦り合わせる度にヒクヒクと反応を見せる。"
translation = "스마타를 하기 전부터 보지는 국물이 뚝뚝 흘러넘쳤고, 자지와 비벼질 때마다 움찔움찔 반응을 보인다."

[[dialogue]]
speaker = "unk"
original = "愛液が溢れて滴り落ち、俺のペニスはあっという間にぬるぬるになってしまっていた。"
translation = "애액이 넘쳐 흘러내려 내 자지는 순식간에 미끌미끌해지고 말았다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「我ながら、媚薬の効果は絶大だな……<emoji=heart04>\u3000感度が上がって、おま○こが敏感になってしまっているっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「나 자신이 만들었지만 미약의 효과는 절대적이군……<emoji=heart04> 감도가 올라서 보지가 민감해져 버렸어<emoji=heart04> 응<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「軽く擦り付けてるだけで……あっ<emoji=heart04>\u3000キュンキュン疼いて愛液が溢れて来てしまう……<emoji=heart04>\u3000はあぁっ……あんっ<emoji=heart04>」"
translation = "「가볍게 비비는 것만으로도…… 앗<emoji=heart04> 큥큥 쑤시고 애액이 넘쳐버려……<emoji=heart04> 하아…… 안<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ、ふうぅっ……<emoji=heart04>\u3000２週間ぶりなのもあって、私ももう我慢できそうにない……<emoji=heart04>」"
translation = "「응, 후우……<emoji=heart04> 2주 만인 것도 있어서 나도 이제 못 참을 것 같아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「悪いが、挿れさせてもらうぞ、少年……<emoji=heart04>」"
translation = "「미안하지만 삽입하도록 하지, 소년……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、リコさんは俺のペニスの亀頭を、膣穴にあてがって――"
translation = "그렇게 말하며 리코 씨는 내 자지의 귀두를 질 구멍에 갖다 대고──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はあぁっ……んんっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「하아…… 응응<emoji=heart04> 후우<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んあああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はあぁっ……！\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「하아……! 안<emoji=heart04> 앗<emoji=heart04> 하아<emoji=heart04> 후아아<emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 앗<emoji=heart04> 응아<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「２週間ぶりのおち○ちん、すごいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000少年のおち○ちん、気持ちいいっ<emoji=heart04>」"
translation = "「2주 만의 자지, 대단해<emoji=heart04> 앗<emoji=heart04> 후우<emoji=heart04> 응아<emoji=heart04> 하아<emoji=heart04> 소년 자지 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「極太カリでゴリゴリ、おま○こに効くぅっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000堪らないっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「커다란 귀두로 고리고리, 보지에 잘 들어와아<emoji=heart04> 하앙<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 못 참겠어<emoji=heart04> 앗<emoji=heart04> 응우<emoji=heart04> 후아<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……リコさんっ……！」"
translation = "「윽…… 리코 씨……!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「あんっ<emoji=heart04>\u3000少年、興奮しているのか？\u3000お尻鷲掴みにして、腰を動かしてっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000そこっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「안<emoji=heart04> 소년, 흥분한 건가? 엉덩이를 꽉 잡고 허리를 움직여서……<emoji=heart04> 앗<emoji=heart04> 거기<emoji=heart04> 응우<emoji=heart04> 안<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リコさんのおま○こ、すごく気持ちいいです……！」"
translation = "「리코 씨 보지, 정말 기분 좋아요……!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んんっ<emoji=heart04>\u3000私も気持ちいいぞ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 나도 기분 좋아<emoji=heart04> 앗<emoji=heart04> 응으윽<emoji=heart04> 응아<emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リコさんは言いながら、腰を上下ではなく前後にグラインドさせる。"
translation = "리코 씨는 말하면서 허리를 상하가 아니라 전후로 그라인드시킨다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふああぁっ……！」"
translation = "「응<emoji=heart04> 후우<emoji=heart04> 하아<emoji=heart04> 응우<emoji=heart04> 앗<emoji=heart04> 응응……<emoji=heart04> 하아<emoji=heart04> 앗<emoji=heart04> 응으윽<emoji=heart04> 후아아……!」"

[[dialogue]]
speaker = "unk"
original = "ペニスをねっとりとしゃぶって味わうようなその動きに、俺は堪らず腰の動きを強くしてしまう。"
translation = "자지를 끈적하게 빨아 맛보는 듯한 그 움직임에 나는 견디지 못하고 허리 움직임을 강하게 한다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んあぁっ<emoji=heart04>\u3000少年のおち○ちんすごいっ<emoji=heart04>\u3000中で更に大きくなってぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 소년 자지 대단해<emoji=heart04> 안에서 더 커졌어어<emoji=heart04> 앗<emoji=heart04> 응우<emoji=heart04> 후아<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「おま○こ押し広げられてぇ、刺激強いっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000ゴリゴリ擦れて感じるぅっ<emoji=heart04>」"
translation = "「보지를 억지로 벌려서 자극이 강해애<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하앙<emoji=heart04> 후아아<emoji=heart04> 고리고리 비벼져서 느껴져어<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000感度すごくて、もう出ちゃいそうですっ……！」"
translation = "「윽……! 감도가 엄청나서 벌써 나올 것 같아요……!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ<emoji=heart04>\u3000いいぞっ<emoji=heart04>\u3000私ももうイキそうだっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 좋아<emoji=heart04> 나도 이제 갈 것 같아아<emoji=heart04> 응우<emoji=heart04> 하아<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「２週間ぶりの精液っ、お姉さんの中に、出せっ<emoji=heart04>\u3000出せ出せっ<emoji=heart04>」"
translation = "「2주 만의 정액, 이 누나 안에 싸라<emoji=heart04> 싸, 싸앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 후우<emoji=heart04> 응우<emoji=heart04> 앗<emoji=heart04> 하아<emoji=heart04> 응후<emoji=heart04> 앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああぁっ、出るっ！！！」"
translation = "「아아앗, 나온다!!!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ――<emoji=heart04><emoji=heart04>」"
translation = "「응──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んああああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아아아아아아아아아앙~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んんぅ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んはあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으윽~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 은하아아아아~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身をよじりながら、ビクビクと体を震わせるリコさん。"
translation = "몸을 비틀면서 비쿠비쿠 몸을 떠는 리코 씨."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んうぅっ<emoji=heart04>\u3000子宮の中、熱いぃ……<emoji=heart04><emoji=heart04>\u3000はあぁっ……んっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「응우윽<emoji=heart04> 자궁 안이 뜨거워어……<emoji=heart04><emoji=heart04> 하아…… 응<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おま○こがきゅうきゅうと動き、精液が更に搾り取られる。"
translation = "보지가 꽉꽉 움직이며 정액이 더 짜여 나간다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はあぁっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000イってしまった……<emoji=heart04>」"
translation = "「하아<emoji=heart04> 후우<emoji=heart04> 응……<emoji=heart04> 가버렸다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、リコさんの呼吸が少し落ち着いてきた後――"
translation = "이윽고 리코 씨의 호흡이 조금 진정된 후──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「……少年、すまない。体は大丈夫だったか……？」"
translation = "「……소년, 미안하다. 몸은 괜찮나……?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ムラムラが溜まっていて、ついやってしまった……。少年には思っていたより負担をかけてしまったかもしれない……」"
translation = "「몸이 달아올라 있어서 그만 저질러버렸군. 소년에게는 생각보다 부담을 줬을지도 모르겠어……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫です……。リコさんは、気持ち良かったですか？」"
translation = "「괜찮아요……. 리코 씨는 기분 좋았나요?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ああ……今日まで溜まっていた分、すごく……」"
translation = "「아아…… 오늘까지 쌓였던 만큼, 아주 많이……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら、おあいこです」"
translation = "「그럼 셈셈이네요」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺も気持ち良くて興奮し過ぎて、腰を振っちゃってたので……」"
translation = "「저도 기분 좋아서 너무 흥분해버린 바람에 허리를 흔들어버렸으니까요……」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「……少年。そんな風にお姉さんに優しくすると、もっとエッチなことをしたくなってしまうぞ？」"
translation = "「……소년. 그렇게 누나한테 다정하게 대하면 더 야한 짓을 하고 싶어진다고?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいですよ。甘えて下さい」"
translation = "「괜찮아요. 어리광 부려주세요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いつも公安委員会の本部長として頑張っているんですから、エッチの時くらい甘えてくれたら、俺は嬉しいです」"
translation = "「항상 공안위원회 본부장으로서 열심히 하고 계시니까, 섹스할 때만큼이라도 어리광 부려주시면 저는 기뻐요」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年……<emoji=heart04>」"
translation = "「소년……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なら、少年に１つお願いをしてもいいか？」"
translation = "「그럼 소년에게 한 가지 부탁을 해도 될까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何でしょう？」"
translation = "「뭔가요?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「エッチをしている時は、私のこと、『リコ』って呼び捨てにして欲しい」"
translation = "「섹스할 때는 나를 『리코』라고 반말로 불러줬으면 해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「年上とか関係なく１人の女として、愛して欲しいんだ」"
translation = "「연상 같은 거 상관없이 한 명의 여자로서 사랑해주길 원한다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ダメか？」"
translation = "「안 되나?」"

[[dialogue]]
speaker = "unk"
original = "俺は首を横に振り、１度呼吸を置いてから言う。"
translation = "나는 고개를 젓고 한 번 호흡을 고른 뒤 말한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「――わかったよ、<b>リコ</b>」"
translation = "「──알았어, **리코**」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "名前を呼ぶのに反応して、彼女のおま○こがきゅうぅっと締まる。"
translation = "이름을 부르는 것에 반응하여 그녀의 보지가 꽉 조여든다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なら、少年にもう１つお願いだ」"
translation = "「그럼 소년에게 하나 더 부탁이다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「お姉さんが孕んでしまうくらい……キミのを中にいっぱい出して欲しい<emoji=heart04>」"
translation = "「이 누나가 임신해버릴 정도로…… 자네 거를 안에 잔뜩 싸주길 원해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "淫紋はまだ消えておらず、愛する彼女からそんな風に煽られてしまえば、俺は興奮が高まって我慢できずに――"
translation = "음문은 아직 사라지지 않았고, 사랑하는 그녀에게 그런 식으로 도발당하자 나는 흥분이 고조되어 견디지 못하고──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リコっ！」"
translation = "「리코!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ふああああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "再び腰を動かし始め、下から突き上げる。"
translation = "다시 허리를 움직이기 시작하며 아래에서 밀어 올린다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000おち○ちんの突き上げ強いっ<emoji=heart04><emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 안<emoji=heart04> 대단해<emoji=heart04> 자지가 쳐올리는 거 너무 강해애<emoji=heart04><emoji=heart04> 하아<emoji=heart04> 응아<emoji=heart04> 안<emoji=heart04> 앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はああぁんっ<emoji=heart04>\u3000少年、激しいぃっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아앙<emoji=heart04> 소년, 격렬해애<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 하아<emoji=heart04> 응우<emoji=heart04> 후아<emoji=heart04> 응아아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「奥っ<emoji=heart04>\u3000奥感じるっ<emoji=heart04><emoji=heart04>\u3000どちゅどちゅ突かれて、奥気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「깊은 곳<emoji=heart04> 깊은 곳 느껴져어<emoji=heart04><emoji=heart04> 도득도득 찔려서 깊은 곳 기분 좋아아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응아<emoji=heart04> 하아<emoji=heart04> 후아<emoji=heart04> 안<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んんうぅっ<emoji=heart04>\u3000これ好きっ<emoji=heart04>\u3000お姉さんのおま○こ、メロメロになってしまうっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응우윽<emoji=heart04> 이거 좋아아<emoji=heart04> 누나 보지, 메롱메롱이 되어버려어<emoji=heart04> 응<emoji=heart04> 후우<emoji=heart04> 후아<emoji=heart04> 응아아~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「好きっ<emoji=heart04>\u3000少年のでっかいおち○ちん好きっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「좋아아<emoji=heart04> 소년의 커다란 자지 좋아아<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「おま○こ気持ちいいっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000気持ち良くて幸せになっちゃうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「보지 기분 좋아아<emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 기분 좋아서 행복해져버려어<emoji=heart04> 앗<emoji=heart04> 하아<emoji=heart04> 후아<emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「もっと<emoji=heart04>\u3000もっと突いてくれ、少年っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「더<emoji=heart04> 더 찔러줘, 소년<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「お姉さんも頑張って動いて、おち○ちん気持ち良くするからぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「누나도 열심히 움직여서 자지 기분 좋게 해줄 테니까아<emoji=heart04> 응<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하아<emoji=heart04> 응아<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "リコさんもどんどん腰を振り、ギシギシとベッドが激しく軋む。"
translation = "리코 씨도 점점 허리를 흔들고 기시긱 침대가 격렬하게 삐걱거린다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000いいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>\u3000んああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 후우<emoji=heart04> 앗<emoji=heart04> 응아아앗<emoji=heart04> 좋아<emoji=heart04> 앗<emoji=heart04> 하아<emoji=heart04> 응우<emoji=heart04> 하아아앗<emoji=heart04> 후아아<emoji=heart04><emoji=heart04> 응아아앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「おま○こ気持ち良くて、幸せぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「보지 기분 좋아서 행복해애<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……リコ、好きだ！\u3000愛してるっ！」"
translation = "「윽…… 리코, 좋아해! 사랑해!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
