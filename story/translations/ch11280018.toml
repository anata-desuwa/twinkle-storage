speaker_translation = "리코린피아"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04><emoji=heart04>\u3000はああぁ～～っ<emoji=heart04><emoji=heart04>\u3000幸せ登って来て、イっちゃう<emoji=heart04><emoji=heart04><emoji=heart04>」"
