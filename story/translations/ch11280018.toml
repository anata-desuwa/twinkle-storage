[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んああああああぁぁぁーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうううぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000」"
translation = "「응아아아아아아아아아아아아아~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어어어으으으으으윽~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ふああああぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000少年の精子、子宮いっぱい感じるぅ～～～<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 소년 정자, 자궁 가득 느껴져어~~~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000愛いっぱいに注がれて、幸せ孕んじゃう……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 사랑이 가득 부어져서 행복을 임신해버려어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて射精が止まり、快楽の余韻も落ち着いて来たところで、リコさんがゆっくりと腰を上げて、ペニスを引き抜く。"
translation = "이윽고 사정이 멈추고 쾌락의 여운도 진정되었을 무렵, 리코 씨가 천천히 허리를 들어 자지를 뽑아낸다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んんっ<emoji=heart04>\u3000あっ……はぁんっ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 앗…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「はあぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ん……<emoji=heart04>\u3000ふふっ、少年の射精量は相変わらずすごいな……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후후, 소년의 사정량은 여전히 대단하군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「２回目なのに、１回目よりも長くいっぱい出して……<emoji=heart04>」"
translation = "「두 번째인데 첫 번째보다도 길게 잔뜩 싸서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「気持ち良くイけたか？」"
translation = "「기분 좋게 갔나?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「最高でした……すごく気持ち良かったです」"
translation = "「최고였어요…… 정말 기분 좋았습니다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「そうか……ふふっ、こんなに毎回量がすごいと、そのうちお姉さんも本当に孕んでしまいそうだな……<emoji=heart04>」"
translation = "「그런가…… 후후, 이렇게 매번 양이 대단하면 머지않아 이 누나도 정말로 임신해버릴 것 같군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なんて、冗談……って」"
translation = "「라는 건 농담…… 인데」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「んっ……<emoji=heart04>\u3000少年、２回連続でしたばかりなのに、もう大きくなっているじゃないか……<emoji=heart04>\u3000お姉さんのお尻に当たっているぞ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 소년, 2번 연속으로 방금 마쳤는데 벌써 커지고 있지 않나……<emoji=heart04> 누나 엉덩이에 닿고 있다고<emoji=heart04>」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「もしかして、お姉さんが孕むのを想像して、興奮してしまったのか？」"
translation = "「혹시 이 누나가 임신하는 걸 상상해서 흥분해버린 건가?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なら……試してみるか？」"
translation = "「그럼…… 시험해 보겠나?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年が学園を卒業するまで待ってから考えようとは思っていたが、一応アニマに作ってもらった義体もあるから仕事を続けるのは問題ないし――」"
translation = "「소년이 학원을 졸업할 때까지 기다린 다음에 생각하려고는 했다만, 일단 아니마가 만들어준 의체도 있으니 일을 계속하는 건 문제없고──」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「お姉さんは、キミがいいなら構わないぞ？」"
translation = "「이 누나는 자네만 좋다면 상관없다고?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！\u3000リコ！」"
translation = "「윽……! 리코!」"

[[dialogue]]
speaker = "unk"
original = "リコさんの甘い毒のような囁きに、俺はまんまと誘われてしまって。"
translation = "리코 씨의 달콤한 독 같은 유혹에 나는 여지없이 이끌려버려서."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――あんっ<emoji=heart04>\u3000少年<emoji=heart04>」"
translation = "「──안<emoji=heart04> 소년<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結局、淫紋が消えた後も、そのままリゾート結界で１日中、快楽の海に溺れ続けてしまうのだった――"
translation = "결국 음문이 사라진 뒤에도 그대로 리조트 결계에서 하루 종일 쾌락의 바다에 계속 빠져 지내는 것이었다──"

