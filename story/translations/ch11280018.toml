translation = "「응<emoji=heart04><emoji=heart04><emoji=heart04> 후우<emoji=heart04> 훋<emoji=heart04> 훋<emoji=heart04> 응후<emoji=heart04> 응응<emoji=heart04> 훋<emoji=heart04> 훋<emoji=heart04> 응후응<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
