[[dialogue]]
speaker = "unk"
original = "放課後、星徒会の仕事が終わって帰路に着こうとしたところで、アルモが迎えに来た。"
translation = "방과 후, 성도회의 업무가 끝나고 귀로에 오르려던 참에, 알모가 마중을 나왔다."

[[dialogue]]
speaker = "unk"
original = "彼女の手を取った瞬間、周囲の空間が歪み、気付けば俺は大聖堂の中に立っていた。"
translation = "그녀의 손을 잡은 순간, 주위의 공간이 일그러지더니 정신을 차려보니 나는 대성당 안에 서 있었다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ふっ。仕事が終わるのを、今か今かと待ちわびていたぞ」"
translation = "「훗. 업무가 끝나기를 지금이나 저금이나 애타게 기다리고 있었다고」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……この場所か？\u3000いつもと同じように、我が力により位相をズラした、通常空間とは異なる大聖堂だ」"
translation = "「……이 장소 말이냐? 평소와 마찬가지로, 나의 힘으로 위상을 뒤튼, 통상 공간과는 다른 대성당이다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お前と２人きりになりたかったのでな。さあ、ここからは我とお前だけの<b>ツガイ</b>の時間だ」"
translation = "「너와 단둘이 있고 싶었으니까 말이지. 자, 여기서부터는 나와 너만의 반려의 시간이다」"

[[dialogue]]
speaker = "unk"
original = "言うや否や、アルモは服を脱ぎ去り、その場で四つん這いになった──"
translation = "말하기가 무섭게, 알모는 옷을 벗어 던지고, 그 자리에서 네발로 엎드렸다──"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「先日な、人の子のツガイは子作りと関係なく、尻の穴に男性器を挿入する『アナルセックス』で愛を確かめ合うことがあると聞いたのだ<emoji=heart04>」"
translation = "「얼마 전에 말이다, 인간의 반려는 아이 만들기과 상관없이, 똥구멍에 남성기를 삽입하는 『애널 섹스』로 사랑을 확인하곤 한다고 들었다<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「セックスとは本来、『種』を残すための大切な営み……。だが、だからこそ、『種』を生み出さないアナルセックスは、ツガイとの愛を深く確かめ合える、というわけだ」"
translation = "「섹스란 본래, 『종』을 남기기 위한 소중한 영위……. 하지만, 그렇기에 『종』을 만들어내지 않는 애널 섹스는, 반려와의 사랑을 깊게 확인할 수 있다는 뜻이지」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「いきなり大胆過ぎる？\u3000……我とお前はもうツガイなのだから、今更であろう<emoji=heart04>」"
translation = "「갑자기 너무 대담하다고? ……나와 너는 이미 반려 사이이니, 이제 와서 새삼스럽지 않으냐<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「それに……お前のチ○ポは、しっかり反応しているではないか<emoji=heart04>」"
translation = "「게다가…… 너의 자지는, 확실히 반응하고 있지 않느냐<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「はぁぁ<emoji=heart04>\u3000アナルセックスが待ち遠しくて、我のおま○こが愛液でぐちょぐちょになっているのが見えるであろう？」"
translation = "「하아아<emoji=heart04> 애널 섹스가 기다려져서, 나의 보지가 애액으로 구축구축해져 있는 게 보이지 않느냐?」"

[[dialogue]]
speaker = "unk"
original = "アルモが誘惑するようにお尻を振る。俺は我慢出来ずに、服を脱ぎ去った。"
translation = "알모가 유혹하듯이 엉덩이를 흔든다. 나는 참지 못하고, 옷을 벗어 던졌다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「はぁぁ……ツガイのチ○ポ、今日も逞しいぞ<emoji=heart04>\u3000見るだけで、おま○こがキュンとなって、愛液が溢れてくる……ふぅぅっ<emoji=heart04>」"
translation = "「하아아…… 반려의 자지, 오늘도 늠름하구나<emoji=heart04> 보는 것만으로도 보지가 큥 하고 울려서, 애액이 넘쳐흘러…… 후우읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んふうっ<emoji=heart04>\u3000チ○ポがお尻に当たってる<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000熱くて、固くて、これがお尻の穴に入ると思うと、体が期待で震えてしまう……<emoji=heart04>」"
translation = "「응후웃<emoji=heart04> 자지가 엉덩이에 닿고 있어<emoji=heart04> 하아아<emoji=heart04> 뜨겁고, 딱딱해서, 이게 똥구멍에 들어온다고 생각하니, 몸이 기대감으로 떨려버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルモのお尻、柔らかくて張りがあって、擦り付けてるだけで気持ちいい……っ」"
translation = "「알모의 엉덩이, 부드럽고 탄력 있어서, 문지르는 것만으로도 기분 좋아……윽」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あんっ<emoji=heart04>\u3000お前だけ気持ち良くなっては、ずるいではないか……んんっ、我の中も、可愛がって欲しいのにぃ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 너만 기분 좋아지다니, 치사하지 않느냐…… 응읏, 내 안도, 예뻐해 줬으면 좋겠는데에……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「挿入しやすいよう、アナルも清浄にしてきたのだぞ？\u3000それにほら、ローションも用意してあるのだ……」"
translation = "「삽입하기 쉽도록, 애널도 청결하게 하고 왔다고? 게다가 봐라, 로션도 준비해 두었다……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「媚薬効果もあるから、たっぷり塗ってアナルセックスすれば……天にも昇る快楽が味わえるぞ<emoji=heart04>？\u3000だから、な？」"
translation = "「미약 효과도 있으니까, 듬뿍 바르고 애널 섹스하면…… 하늘로 날아오를 듯한 쾌락을 맛볼 수 있다고<emoji=heart04>? 그러니까, 응?」"

[[dialogue]]
speaker = "unk"
original = "アルモから手渡されたローションをペニスに塗っていく。それからアルモの尻穴にも垂らして、ペニスで馴染ませる。"
translation = "알모에게 건네받은 로션을 페니스에 발라 나간다. 그러고 나서 알모의 항문에도 떨어뜨려, 페니스로 길들인다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あっ、ぬるぬるチ○ポでアナル擦られるの、感じるっ……<emoji=heart04>\u3000はぁっ、はぁっ、我にもチ○ポ、食べさせてくれっ<emoji=heart04>」"
translation = "「앗, 미끌미끌 자지로 애널 문질러지는 거, 느껴져……<emoji=heart04> 하앗, 하앗, 나에게도 자지, 먹게 해다오<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ローションの媚薬効果もあってかパンパンに張り詰めたペニスの先端を、俺はアルモのアナルにあてがった。"
translation = "로션의 미약 효과도 있어서인지 팽팽하게 부풀어 오른 자지의 끝부분을, 나는 아르모의 애널에 갖다 대었다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あっ、チ○ポ来るっ。んああっ、んんっ、んお゛おぉぉぉ──っ<emoji=heart04><emoji=heart04><emoji=heart04>！？」"
translation = "「앗, 자지 들어온다. 응아앗, 응응, 응오오오오──윽<emoji=heart04><emoji=heart04><emoji=heart04>!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ、おほっ<emoji=heart04>\u3000おぉんっ<emoji=heart04>！\u3000チ○ポ挿入ってきたぁっ<emoji=heart04><emoji=heart04>\u3000ほぉっ、んお゛っ、んほぉぉっ<emoji=heart04><emoji=heart04>！」"
translation = "「오, 오호<emoji=heart04> 오온<emoji=heart04>! 자지 삽입되어 들어왔어어<emoji=heart04><emoji=heart04> 호오, 응오, 응호오오<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んおっ<emoji=heart04>\u3000ほぉっ、んおぉぉんっ<emoji=heart04><emoji=heart04>！\u3000これっ、おま○こと全然違うぅっ！\u3000でも、気持ちいいっ、んほっ<emoji=heart04>\u3000いいのぉっ<emoji=heart04>！\u3000んお゛ぉぉぉっ<emoji=heart04><emoji=heart04>！」"
translation = "「응오<emoji=heart04> 호오, 응오오온<emoji=heart04><emoji=heart04>! 이거, 보지랑 전혀 달라아! 하지만, 기분 좋아, 응호<emoji=heart04> 좋아아<emoji=heart04>! 응오오오오옷<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「膣よりも締まりが凄くて、気持ちいいっ……！」"
translation = "「질보다 조임이 엄청나서, 기분 좋아……!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んほぉっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000おほぉぉっ<emoji=heart04>！\u3000そこっ、そこいいっ、Ｇスポットの裏側<emoji=heart04>\u3000気持ち良いっ<emoji=heart04>\u3000おぉぉっ、んお゛っ<emoji=heart04>\u3000頭ふわふわするぅっ、お゛おぉぉぉんっ<emoji=heart04><emoji=heart04>！」"
translation = "「응호오<emoji=heart04> 오호<emoji=heart04> 오호오오<emoji=heart04>! 거기, 거기 좋아, G스팟의 뒷부분<emoji=heart04> 기분 좋아<emoji=heart04> 오오오, 응오<emoji=heart04> 머리가 어질어질해, 오오오오온<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「前から思ってたけどっ、アルモって実は攻められるの好きだよねっ……！」"
translation = "「전부터 생각했지만, 알모는 사실 공격당하는 걸 좋아하지……!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「な、何を言い出すのだ……んほっ、んああ゛っ<emoji=heart04><emoji=heart04>\u3000守護天使の我がそんなっ……おほっ<emoji=heart04>\u3000お゛おぉぉっ、おほぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「무, 무슨 말을 하는 게냐…… 응홋, 응아아앗<emoji=heart04><emoji=heart04> 수호천사인 내가 그런…… 오홋<emoji=heart04> 오오오오옷, 오호오오오옷<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「攻められるのが好きなんてっ、あっ！？\u3000おっ<emoji=heart04>\u3000おほぉっ<emoji=heart04>\u3000んお゛っ<emoji=heart04>\u3000んほお゛ぉぉんっ<emoji=heart04><emoji=heart04>！」"
translation = "「공격당하는 게 좋다니, 앗!? 오옷<emoji=heart04> 오호옷<emoji=heart04> 응오옷<emoji=heart04> 응호오오오온<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こんなに沢山っ……下品でエッチな声を上げてるのにっ？」"
translation = "「이렇게 잔뜩…… 저질스럽고 야한 목소리를 내고 있는데?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そ、それは初めてのアナルセックスだからっ……おほっ<emoji=heart04>\u3000お゛っ<emoji=heart04>\u3000今、Ｇスポットの裏側攻めちゃっ<emoji=heart04>\u3000おほぉぉぉっ<emoji=heart04><emoji=heart04>」"
translation = "「그, 그건 처음 해보는 애널 섹스니까…… 오홋<emoji=heart04> 오옷<emoji=heart04> 지금, G스팟의 뒷부분을 공격당해버렷<emoji=heart04> 오호오오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナルじゃなくてっ、普通のセックスしてる時もっ、オホ声たくさん上げてると思うけどっ？」"
translation = "「애널이 아니라, 평범하게 섹스할 때도 오호고에 잔뜩 내고 있다고 생각하는데?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おほっ<emoji=heart04>\u3000ほっ、んお゛ぉぉぉんっ<emoji=heart04><emoji=heart04>！\u3000あ、アニマが義体の感度を高く、調整するからっ……おほぉぉっ<emoji=heart04><emoji=heart04>\u3000んおっ、んお゛おぉぉんっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「오홋<emoji=heart04> 홋, 응오오오오온<emoji=heart04><emoji=heart04>! 아, 아니마가 의체의 감도를 높게 조정하니까…… 오호오옷<emoji=heart04><emoji=heart04> 응옷, 응오오오오온<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker = "unk"
original = "俺は、否定を続けるアルモのお尻を、軽くスパンキングする。"
translation = "나는 부정을 계속하는 알모의 엉덩이를 가볍게 스팽킹한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ひあぁぁぁんっ！？\u3000おほっ<emoji=heart04>\u3000おほぉぉっ<emoji=heart04><emoji=heart04>\u3000いきなり何をするのだっ、んほおぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「히아아아앙!? 오홋<emoji=heart04> 오호오옷<emoji=heart04><emoji=heart04> 갑자기 뭘 하는 게냐, 응호오오옷<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お尻、叩かれるのは嫌……っ？」"
translation = "「엉덩이 맞는 건 싫어……?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「い、嫌に決まってっ……んお゛ぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んほっ、おほぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「시, 싫은 게 당연하…… 응오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04> 응홋, 오호오오오옷<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ひあぁぁぁっ！？\u3000ま、待てっ、お尻を叩かれてなんてっ、おほっ<emoji=heart04>\u3000ほお゛ぉっ<emoji=heart04><emoji=heart04>\u3000そんなはずないのにっ！\u3000んお゛ぉぉぉっ、んほぉぉぉっ<emoji=heart04><emoji=heart04>！？」"
translation = "「히아아아앗!? 기, 기다려, 엉덩이를 맞아서라니, 오홋<emoji=heart04> 호오오옷<emoji=heart04><emoji=heart04> 그럴 리 없는데! 응오오오오옷, 응호오오오옷<emoji=heart04><emoji=heart04>!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んお゛ぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000守護天使としてっ、おほっ<emoji=heart04>\u3000お゛ぉぉぉっ<emoji=heart04><emoji=heart04>\u3000こんなのっ、おほぉっ<emoji=heart04>\u3000認めるわけには──」"
translation = "「응오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04> 수호천사로서, 오홋<emoji=heart04> 오오오오오옷<emoji=heart04><emoji=heart04> 이런 거, 오호옷<emoji=heart04> 인정할 수는──」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んほおぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>！？\u3000お尻を叩く度っ、んお゛ぉぉぉっ<emoji=heart04><emoji=heart04>\u3000おま○こキュンとなってっ……ほぉぉぉっ<emoji=heart04>」"
translation = "「응호오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04>!? 엉덩이를 때릴 때마다, 응오오오오옷<emoji=heart04><emoji=heart04> 보지 큥 하고 울려서…… 호오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「一緒にっ<emoji=heart04>\u3000お尻の穴まで気持ち良くっ、なっちゃうなんてぇっ！\u3000んお゛ぉぉぉっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000お゛ぉぉぉんっ<emoji=heart04><emoji=heart04>！」"
translation = "「함께<emoji=heart04> 엉덩이 구멍까지 기분 좋게 되어버리다니이! 응오오오오옷<emoji=heart04> 오홋<emoji=heart04> 오오오오온<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んお゛ぉぉぉっ<emoji=heart04><emoji=heart04>\u3000チ○ポピストンが奥までっ<emoji=heart04>\u3000ダメダメぇっ<emoji=heart04>！\u3000今はダメだぁっ<emoji=heart04>！\u3000強く攻めるの、感じちゃう、からぁっ<emoji=heart04>！\u3000おほぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오옷<emoji=heart04><emoji=heart04> 자지 피스톤이 안쪽까지<emoji=heart04> 안 돼 안 돼애<emoji=heart04>! 지금은 안 된다아<emoji=heart04>! 강하게 공격하는 거, 느껴버리니까아<emoji=heart04>! 오호오오오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んほお゛ぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お尻一緒に叩くのらめぇっ<emoji=heart04>！\u3000アナル反応して、締め付けちゃうっ<emoji=heart04>！\u3000おっ<emoji=heart04>\u3000んおぉっ<emoji=heart04>\u3000おぉぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「응호오오오옷<emoji=heart04><emoji=heart04><emoji=heart04> 엉덩이 같이 때리는 건 안 돼애<emoji=heart04>! 애널 반응해서 조여버려어! 오옷<emoji=heart04> 응오옷<emoji=heart04> 오오오온<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ツガイチ○ポ、ただでさえ巨根なのにぃ<emoji=heart04>\u3000おほぉお゛おんっ<emoji=heart04>\u3000アナル締め付けたら、刺激強過ぎちゃうのぉっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000おほっ\u3000<emoji=heart04>んほぉお゛ぉぉんっ<emoji=heart04>！」"
translation = "「반려 자지, 가뜩이나 거근인데에<emoji=heart04> 오호오오오온<emoji=heart04> 애널 조여버리면 자극이 너무 강해져어<emoji=heart04> 오옷<emoji=heart04> 오홋<emoji=heart04> 응호오오오오온<emoji=heart04>!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おほおぉぉっ<emoji=heart04><emoji=heart04>\u3000お尻叩かれるのと、極太カリでゴリゴリ<emoji=heart04>\u3000感じちゃうぅぅぅっ<emoji=heart04><emoji=heart04>\u3000んほっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000おお゛ぉぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「오호오오옷<emoji=heart04><emoji=heart04> 엉덩이 맞는 거랑 굵직한 귀두로 고리고리<emoji=heart04> 느껴버려어어엇<emoji=heart04><emoji=heart04> 응홋<emoji=heart04> 오홋<emoji=heart04> 오오오오온<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……アルモ。２人きりの時は、守護天使じゃなくて、俺だけのメスになって欲しいっ！」"
translation = "「……알모. 둘만 있을 때는 수호천사가 아니라, 나만의 암컷이 되어줬으면 좋겠어!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「そ、それはぁ……おほっ<emoji=heart04>\u3000んおぉっ、おお゛ぉっ<emoji=heart04><emoji=heart04>\u3000それはぁ……！\u3000おほぉおおっ<emoji=heart04><emoji=heart04>！」"
translation = "「그, 그것은…… 오흣<emoji=heart04> 응오옷, 오오윽<emoji=heart04><emoji=heart04> 그것은……! 오호오오옷<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「攻められるのが好きなマゾだって素直に認められたらっ、きっと、もっと気持ち良くなれるぞっ？」"
translation = "「공격당하는 걸 좋아하는 마조라고 솔직하게 인정하면, 분명, 훨씬 더 기분 좋아질 수 있다고?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「っ……！\u3000くっ……わ、我はぁ……！」"
translation = "「윽……! 큭…… 나, 나는……!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「──み、認めるぅっ<emoji=heart04>\u3000認めますぅっ！\u3000んっ<emoji=heart04>\u3000お゛ほぉぉぉぉぉっ<emoji=heart04><emoji=heart04>」"
translation = "「──이, 인정해앳<emoji=heart04> 인정합니다앗! 응읏<emoji=heart04> 오윽호오오오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「本当は攻められるの、好きっ<emoji=heart04>\u3000好きなんだぁっ<emoji=heart04>\u3000おほぉっ<emoji=heart04>\u3000ゾクゾクして、気持ちいいっ<emoji=heart04>\u3000おっ、おっ、んおお゛ぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「사실은 공격당하는 거, 좋아<emoji=heart04> 좋아해앳<emoji=heart04> 오흣<emoji=heart04> 소름 끼쳐서, 기분 좋아<emoji=heart04> 오윽, 오윽, 응오오윽오오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お尻叩かれるの好きぃ<emoji=heart04>\u3000おお゛っ<emoji=heart04>\u3000ツガイのデカチ○ポ、激しくピストンされるの大好きだぁ<emoji=heart04>\u3000んほおぉぉぉっ<emoji=heart04><emoji=heart04>！」"
translation = "「엉덩이 맞는 거 좋아아<emoji=heart04> 오오윽<emoji=heart04> 반려의 커다란 자지, 격하게 피스톤질 당하는 거 너무 좋아해<emoji=heart04> 응호오오오옷<emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ……エッチする時のアルモは、俺専用の性奴隷っ……オナホ天使ってことにするからっ！」"
translation = "「그럼…… 섹스할 때의 알모는, 내 전용 성노예…… 오나홀 천사라고 부르기로 할 테니까!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「し、守護天使たる我が、おっ、んお゛っ<emoji=heart04>\u3000性奴隷っ……んほぉっ<emoji=heart04><emoji=heart04>\u3000おっ、おほっ、んお゛ぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「수, 수호천사인 내가, 윽, 응윽<emoji=heart04> 성노예…… 응호옷<emoji=heart04><emoji=heart04> 오윽, 오흣, 응오오윽오오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アルモはツガイとしてっ……俺が性処理したい時に手伝わなきゃいけないっ、性奴隷のオナホ天使だっ！」"
translation = "「알모는 반려로서…… 내가 성처리하고 싶을 때 도와야만 하는, 성노예 오나홀 천사다!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おほっ、んおぉっ<emoji=heart04><emoji=heart04>\u3000我がっ……オナホ天使ぃ<emoji=heart04>\u3000んほおぉぉっ<emoji=heart04><emoji=heart04>\u3000んお゛ぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>！」"
translation = "「오흣, 응오옷<emoji=heart04><emoji=heart04> 내가…… 오나홀 천사아<emoji=heart04> 응호오오옷<emoji=heart04><emoji=heart04> 응오오윽오옷<emoji=heart04><emoji=heart04><emoji=heart04>!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「返事はっ？」"
translation = "「대답은?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ひぃぃぃんっ<emoji=heart04>\u3000わかった、認めるぅっ<emoji=heart04>\u3000我はオナホ天使っ<emoji=heart04>\u3000オナホ天使だぁ<emoji=heart04>\u3000んお゛ぉぉっ、おっ、おほぉぉぉっ<emoji=heart04>」"
translation = "「히이이잉<emoji=heart04> 알았어, 인정해앳<emoji=heart04> 나는 오나홀 천사<emoji=heart04> 오나홀 천사야아<emoji=heart04> 응오오윽오옷, 윽, 오호오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「良い子だ。……ご褒美に、もっと激しく行くぞっ」"
translation = "「착한 아이네. ……포상으로, 더 격하게 간다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おほぉぉぉ──っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000本気のチ○ポピストンきたぁぁぁっ！\u3000おっ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000んおお゛っ<emoji=heart04>\u3000んほおぉぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「오호오오오──옷<emoji=heart04><emoji=heart04><emoji=heart04> 진심 자지 피스톤 왔다아아앗! 윽<emoji=heart04> 오흣<emoji=heart04> 응윽<emoji=heart04> 응오오윽<emoji=heart04> 응호오오온<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もっともっとぉ<emoji=heart04>\u3000おほぉっ、チ○ポ気持ちいい、んおぉっ、チ○ポ<emoji=heart04>\u3000チ○ポチ○ポぉ<emoji=heart04>\u3000おほぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「더 더어<emoji=heart04> 오호옷, 자지 기분 좋아, 응오옷, 자지<emoji=heart04> 자지 자지이<emoji=heart04> 오호오오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ピストン激しいぃっ！\u3000んお゛っ<emoji=heart04>\u3000おほっ<emoji=heart04>\u3000んおぉぉぉっ<emoji=heart04>\u3000あ゛っ、そこ気持ちいいっ……おほぉっ<emoji=heart04>\u3000子宮の裏から響くっ、んおお゛ぉぉぉっ<emoji=heart04>」"
translation = "「피스톤 격해애! 응오윽<emoji=heart04> 오흣<emoji=heart04> 응오오오오옷<emoji=heart04> 아윽, 거기 기분 좋아…… 오호옷<emoji=heart04> 자궁 뒤쪽부터 울려어, 응오오윽오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「あ゛っ、あ゛っ、いいっ<emoji=heart04>\u3000んおっ、すごっ、おほぉぉっ<emoji=heart04>\u3000お゛っ、お゛っ、おほぉぉぉっ<emoji=heart04>\u3000んほっ、んおお゛っ、そこっ、そこそこっ、おほお゛ぉぉんっ<emoji=heart04>」"
translation = "「아윽, 아윽, 좋아아<emoji=heart04> 응오옷, 굉장해, 오호오오옷<emoji=heart04> 오윽, 오윽, 오호오오오옷<emoji=heart04> 응호옷, 응오오윽, 거기, 거기 거기잇, 오호오윽오오온<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「も、もうくるっ、おほぉぉっ<emoji=heart04>\u3000アナルでアクメ登ってくるっ<emoji=heart04>\u3000チ○ポピストンで気持ちいいの、押し寄せてくるのぉっ<emoji=heart04><emoji=heart04>」"
translation = "「이, 이제 와버려, 오호오오옷<emoji=heart04> 애널로 아크메 올라와앗<emoji=heart04> 자지 피스톤으로 기분 좋은 거, 밀려 들어와아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もっとっ<emoji=heart04>\u3000んほぉぉっ、もっと激しくっ<emoji=heart04>\u3000あへぇ<emoji=heart04>\u3000マゾ天使の性奴隷オナホ、おほぉ<emoji=heart04>\u3000もっと強く愛して、くれぇっ<emoji=heart04>\u3000おっ、お゛っ、おほぉぉぉっ<emoji=heart04>」"
translation = "「더엇<emoji=heart04> 응호오오옷, 더 격하게에<emoji=heart04> 아헤에<emoji=heart04> 마조 천사 성노예 오나홀, 오호오<emoji=heart04> 더 강하게 사랑해, 줘어엇<emoji=heart04> 윽, 오윽, 오호오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おっ、おっ、くるくるくるぅっ<emoji=heart04>\u3000あへっ<emoji=heart04>\u3000お゛っ、んほぉぉぉっ<emoji=heart04>\u3000本気の愛されチ○ポピストンで、アクメ登ってくりゅぅぅぅっ<emoji=heart04>\u3000おほぉぉぉっ<emoji=heart04>」"
translation = "「윽, 윽, 온다 온다 와아앗<emoji=heart04> 아헷<emoji=heart04> 오윽, 응호오오오옷<emoji=heart04> 진심 사랑받는 자지 피스톤으로, 아크메 올라가버려어어엇<emoji=heart04> 오호오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「堕ちるっ、おほぉっ<emoji=heart04>\u3000守護天使なのにっ、チ○ポで堕とされりゅっ<emoji=heart04>\u3000おっ、おっ、んおお゛ぉぉぉっ<emoji=heart04>\u3000快楽堕ちしてただのメスになっちゃうぅぅぅっ<emoji=heart04>」"
translation = "「가, 가버렷, 오호옷<emoji=heart04> 수호천사인데도, 자지로 타락해버렷<emoji=heart04> 오, 오, 응오오오오옷<emoji=heart04> 쾌락에 타락해서 그냥 암컷이 되어버려어어어엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「も、もう無理っ、イクっ<emoji=heart04>\u3000んおぉぉぉっ、我慢むりっ<emoji=heart04>\u3000おっ、おっ、お゛ぉっ<emoji=heart04>\u3000イクイクっ<emoji=heart04><emoji=heart04>\u3000アナルでイクぅぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>！！」"
translation = "「이, 이제 무리, 이쿠우<emoji=heart04> 응오오오옷, 참는 거 무리이<emoji=heart04> 오, 오, 오오옷<emoji=heart04> 가버려 가버려어<emoji=heart04><emoji=heart04> 애널로 가버려어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>!!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「射精してっ、精液だしてっ<emoji=heart04>\u3000おほぉぉぉっ、マゾ天使のアナルオナホ<emoji=heart04>\u3000子種ぶちまけてぇぇぇっ<emoji=heart04>\u3000んお゛ぉぉっ、お゛ぉぉぉっ<emoji=heart04><emoji=heart04><emoji=heart04>！！！」"
translation = "「사정해줘, 정액 내보내 줘<emoji=heart04> 오호오오옷, 마조 천사의 애널 오나홀<emoji=heart04> 씨물 쏟아부어줘어어어엇<emoji=heart04> 응오오옷, 오오오오옷<emoji=heart04><emoji=heart04><emoji=heart04>!!!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「イクっ、イクイクイクっ<emoji=heart04>\u3000アナルにマーキング射精されて、イッグぅぅぅぅぅぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おほぉぉぉ──────っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려, 가버려 가버려 가버려엇<emoji=heart04> 애널에 마킹 사정 당해서, 가버려어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04> 오호오오오──────옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おほぉぉぉ～～～<emoji=heart04><emoji=heart04><emoji=heart04>\u3000お尻熱いぃぃぃっ<emoji=heart04>\u3000奥に子種、大量射精されてるぅ<emoji=heart04><emoji=heart04>\u3000気持ちいいぃ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「오호오오오~~~<emoji=heart04><emoji=heart04><emoji=heart04> 엉덩이 뜨거워어어어엇<emoji=heart04> 안쪽에 씨물, 대량 사정되고 있어어<emoji=heart04><emoji=heart04> 기분 좋아아<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「んおぉぉぉっ、カリで引っ張られる<emoji=heart04>\u3000お尻の内側めくれちゃう<emoji=heart04>\u3000おほぉぉぉっ……<emoji=heart04>\u3000おっ、抜けるっ……んほぉぉぉ<emoji=heart04>」"
translation = "「응오오오옷, 귀두에 끌려가아<emoji=heart04> 엉덩이 안쪽이 뒤집혀버려어<emoji=heart04> 오호오오옷……<emoji=heart04> 오, 빠진다…… 응호오오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「はぁっ、はぁっ……。あ、アナルセックス、美味であった……。それに……攻められる快楽というのも、その……悪くない<emoji=heart04>\u3000……んおぉ<emoji=heart04>」"
translation = "「하아, 하아……. 아, 애널 섹스, 맛있었느니라……. 게다가…… 공격당하는 쾌락이라는 것도, 그…… 나쁘지 않구나<emoji=heart04> ……응오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「お、おま○こにいきなり指入れるのはぁっ、おっ、んおっ、おほぉっ<emoji=heart04>\u3000さ、さっきイったばかりで、敏感だからぁ<emoji=heart04>」"
translation = "「보, 보지에 갑자기 손가락 넣는 건, 오, 응오, 오호옷<emoji=heart04> 바, 방금 가버린 참이라, 민감하니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……でも、アナルセックスのおかげでこんなにトロトロだよ？\u3000勿体なくない？」"
translation = "「……하지만, 애널 섹스 덕분에 이렇게 걸쭉해졌다고? 아깝지 않아?」"

[[dialogue]]
speaker = "unk"
original = "俺はアルモに耳元に顔を寄せ、囁く。"
translation = "나는 알모의 귓가에 얼굴을 가까이 대고 속삭인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いま挿れたら、これまでにないくらい極上の快感が味わえると思うんだけど……どうする？\u3000止めちゃう？」"
translation = "「지금 삽입하면, 지금까지 없었을 정도로 극상의 쾌감을 맛볼 수 있을 것 같은데…… 어떻게 할래? 그만둘까?」"

[[dialogue]]
speaker = "unk"
original = "アルモはごくりと喉を鳴らし、体をぶるりと震わす。"
translation = "알모는 꿀꺽 소리를 내며 목을 울리고, 몸을 부르르 떤다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……そ、それがお前の命というのならば、仕方あるまい──<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「……그, 그것이 네 명이라고 한다면, 어쩔 수 없겠지──<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アルモはおま○こをくぱぁと開き、お尻を振って告げる。"
translation = "알모는 보지를 쿠파아 하고 벌리고, 엉덩이를 흔들며 고한다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……マゾ天使のトロトロ膣オナホも、可愛がってくれ<emoji=heart04><emoji=heart04>」"
translation = "「……마조 천사의 걸쭉한 질 오나홀도, 귀여워해 줘<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あっという間に復活したペニスを、俺は膣穴の奥まで一気に突き入れた。"
translation = "순식간에 부활한 페니스를, 나는 질 구멍 안쪽까지 단숨에 찔러 넣었다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おま○こに極太ツガイチ○ポ、きたぁぁぁっ<emoji=heart04>\u3000おっ、おっ、おほぉぉぉ──っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「보지에 굵직한 한 쌍 자지, 왔다아아아앗<emoji=heart04> 오, 오, 오호오오오──옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は守護天使の極上トロトロおま○こを、夢中になって味わうのだった。"
translation = "나는 수호천사의 극상으로 걸쭉한 보지를, 정신없이 맛보는 것이었다."

