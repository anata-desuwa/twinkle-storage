[[dialogue]]
speaker = "ヒルディオーネ"
original = "「お、おーっほっほっほ……あ、新たな虜囚となった、バニーのヒルディオーネですわっ……ぴょ、ぴょんっ<emoji=heart04>」"
translation = "「오, 오오홋홋홋…… 새, 새로운 포로가 된, 바니 힐디오네예요…… 뾰, 뿅<emoji=heart04>」"

[[dialogue]]
speaker = "ダッチ"
original = "「素晴らしい……これ以上の桃源郷は存在しえないでしょう……」"
translation = "「훌륭하군요…… 이 이상의 무릉도원은 존재할 수 없겠지요……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「カードゲームで手汗をかいておりますわよ……お、おしぼりをどうぞ……ぴょん♪」"
translation = "「카드 게임 때문에 손에 땀이 났어요…… 여, 여기 물수건요…… 뿅♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「ダッチ様……ワインのお代わり、お持ちいたしました……ぴょん♪」"
translation = "「더치 님…… 와인 리필, 가져왔어요…… 뿅♪」"

[[dialogue]]
speaker = "ダッチ"
original = "「染みるぅ……子ウサギの運んできてくれたおしぼりとワイン……染みますねぇ……フオオオォ……！」"
translation = "「스며드네…… 아기 토끼가 가져다준 물수건과 와인…… 가슴 깊이 스며드는군요…… 후오오오오……!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ぐぅうっ……マイン！\u3000後は任せましたわよ！！」"
translation = "「구우윽…… 마인! 나머지는 맡기겠어요!!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「緋宮会長も！\u3000この変態紳士の鼻を明かしてやってくださいまし……！」"
translation = "「히노미야 회장님도! 이 변태 신사의 코를 납작하게 해주겠어요……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「次のポーカーは私がいくよ」"
translation = "「다음 포커는 내가 나갈게.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長の番が来るまでに、あいつのロイヤルストレートフラッシュの秘密を暴いてみせる。任せといて」"
translation = "「회장님 차례가 오기 전까지, 저 녀석의 로열 스트레이트 플러시의 비밀을 파헤쳐 보이겠어. 맡겨줘.」"

[[dialogue]]
speaker = "unk"
original = "マイン……"
translation = "마인……"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「も～♪\u3000そんなに心配しなくても大丈夫だって。暗い顔してたらツキにも見放されちゃうよー？」"
translation = "「정말~♪ 그렇게 걱정하지 않아도 괜찮다니까. 어두운 표정 짓고 있으면 운도 달아나 버린다구?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ダッチ。勝負の前にカード交換していい？\u3000立て続けに負けたデッキだし、縁起が悪いかな～って♪」"
translation = "「더치. 승부 전에 카드 교환해도 돼? 계속해서 지기만 한 덱이라 재수가 없는 것 같아서~♪」"

[[dialogue]]
speaker = "ダッチ"
original = "「もちろん構いませんよ？\u3000さぁセナリィ様、あちらのテーブルにあるデッキを持ってきてください」"
translation = "「물론 상관없습니다? 자, 세나리 님, 저쪽 테이블에 있는 덱을 가져와 주십시오.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ついでにディーラーも変更してもらうとかダメかな～？\u3000トランプモンスターがイカサマしてるかも♪」"
translation = "「하는 김에 딜러도 바꿔주면 안 될까~? 트럼프 몬스터가 속임수를 쓰고 있을지도 모르고♪」"

[[dialogue]]
speaker = "ダッチ"
original = "「フフ、慎重になるのも当然ですね。仰せの通りに……ではディーラーはヒルディオーネ様にお願いいたしましょう」"
translation = "「후후, 신중해지는 것도 당연하죠. 말씀하신 대로…… 그럼 딜러는 힐디오네 님께 부탁드리도록 하죠.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（カードチェンジもディーラーチェンジもあっさりＯＫ……か）"
translation = "(카드 체인지도 딜러 체인지도 순순히 OK……인가.)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（まだまだ。絶対に見破ってみせる。会長の前でカッコ悪いとこ、見せられないしね～）"
translation = "(아직이야. 반드시 간파해 보이겠어. 회장님 앞에서 꼴사나운 모습은 보여줄 수 없으니까~.)"

[[dialogue]]
speaker = "ダッチ"
original = "「デッキのチェック完了です。ジョーカーを除いた５２枚。問題ございませんね？」"
translation = "「덱 체크 완료입니다. 조커를 제외한 52장. 문제없으시죠?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うん……オッケー。何も印はないね。これでいいよ」"
translation = "「응…… 오케이. 아무런 표시도 없네. 이걸로 됐어.」"

[[dialogue]]
speaker = "ダッチ"
original = "「フフ。先ほどのお２人よりも緊張感のあるゲームができそうですね。ではヒルディオーネ様、カードを配ってください！」"
translation = "「후후. 방금 전 두 분보다 긴장감 있는 게임을 할 수 있겠군요. 그럼 힐디오네 님, 카드를 돌려주십시오!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（特定のカードをネーゼマイン様にお配りして、ダッチにはブタを……なんて操作は私にはできませんわ）"
translation = "(특정한 카드를 네제마인 님께 드리고, 더치에게는 꽝을…… 같은 조작은 제겐 불가능해요.)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "（上から順番に配っていくしか……頼みましたわよ、ネーゼマイン様……！）"
translation = "(위에서부터 순서대로 돌릴 수밖에…… 부탁해요, 네제마인 님……!)"

[[dialogue]]
speaker = "ダッチ"
original = "「さぁ、初期ハンドが配られましたね。ではチェンジをどうぞ？」"
translation = "「자, 초기 핸드가 배분되었군요. 그럼 체인지를 하시겠습니까?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（とりあえずワンペアが完成してる……これなら）"
translation = "(일단 원 페어는 완성됐어…… 이 정도라면.)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「３枚チェンジでいこうかなー♪」"
translation = "「3장 체인지로 갈까나~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（スリーカードか、あわよくばフルハウスを狙って──えっ！？）"
translation = "(쓰리 카인드나, 운이 좋으면 풀 하우스를 노려서── 엣!? )"

[[dialogue]]
speaker = "unk"
original = "（……フルハウスが完成した！）"
translation = "(……풀 하우스가 완성됐어!)"

[[dialogue]]
speaker = "ダッチ"
original = "「フフ。強い役ができましたか？」"
translation = "「후후. 강한 패가 만들어졌습니까?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「さぁ～？\u3000どうかなー♪」"
translation = "「글쎄~? 어떠려나~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（何なのこれ……セナリィの時からずっと同じ。チェンジが空振りしない……）"
translation = "(뭐야 이거…… 세나리 때부터 계속 똑같아. 체인지가 헛방이 안 나……)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（強い役ができてるのにぜんぜん嬉しくない。気持ち悪いポーカー……）"
translation = "(강한 패가 만들어졌는데 전혀 기쁘지 않아. 기분 나쁜 포커야……)"

[[dialogue]]
speaker = "ダッチ"
original = "「私は１枚レイズ。いかがいたします？」"
translation = "「저는 1장 레이즈. 어떻게 하시겠습니까?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……オリま～す♪\u3000ネクストゲーム、いこ？」"
translation = "「……기권할게~♪ 다음 게임, 가자.」"

[[dialogue]]
speaker = "ダッチ"
original = "「おやおや、勿体ない。大勝負になると思ったのですが？」"
translation = "「이런 이런, 아깝군요. 큰 승부가 될 줄 알았습니다만?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それはおいおいね。ゲームはこれからだよー♪」"
translation = "「그건 차차 하면 되잖아. 게임은 이제부터라구~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（見つけなくちゃ……このポーカーの仕組み……！）"
translation = "(찾아내야 해…… 이 포커의 구조를……!)"

[[dialogue]]
speaker = "セナリィ"
original = "「マイン、またオリですの……？\u3000慎重なのもいいですが、チップがだいぶ目減りしてますわよ？」"
translation = "「마인, 또 기권인가요……? 신중한 것도 좋지만, 칩이 꽤 줄어들고 있다구요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひ♪\u3000大丈夫だって、一発逆転があるのがポーカーだし～」"
translation = "「니히♪ 괜찮다니까, 한 방 역전이 있는 게 포커니까~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（……だいぶ確かめられた。たぶん、カギになるのはダッチのあのセリフ）"
translation = "(……대충 확인했어. 아마도, 열쇠가 되는 건 더치의 저 대사.)"

[[dialogue]]
speaker = "ダッチ"
original = "「それでは──『欲望』のポーカーを始めましょう」"
translation = "「그럼── 『욕망』의 포커를 시작하죠.」"

[[dialogue]]
speaker = "ダッチ"
original = "「勝ちへの強い執念。望むカードを引き込むよう念じることが、このゲームの肝であるとお伝えしておきます」"
translation = "「승리에 대한 강한 집념. 원하는 카드를 끌어당기도록 염원하는 것이 이 게임의 핵심이라고 말씀드리겠습니다.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……５枚チェンジ」"
translation = "「……5장 체인지.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ええっ！？\u3000手札を総取り替えですの！？」"
translation = "「에엣!? 손패를 통째로 바꾸는 건가요!?」"

[[dialogue]]
speaker = "ダッチ"
original = "「ネーゼマイン様は面白いことをなさいますね。ではヒルディオーネ様、お配りください」"
translation = "「네제마인 님은 재미있는 일을 하시는군요. 그럼 힐디오네 님, 돌려주십시오.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（確かめないと……クラブのストレートフラッシュ。数字は……５、６、７、８、９を……私は『望む』！）"
translation = "(확인해야 해…… 클로버 스트레이트 플러시. 숫자는…… 5, 6, 7, 8, 9를…… 나는 『원한다』!)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「どうぞ、配りましたわ……検めてくださいませ」"
translation = "「여기요, 돌렸어요…… 확인해 주세요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「どうも～♪」"
translation = "「고마워~♪」"

[[dialogue]]
speaker = "unk"
original = "（ストレートフラッシュができた！？）"
translation = "(스트레이트 플러시가 됐어!?)"

[[dialogue]]
speaker = "unk"
original = "（クラブの５、６、７、８、９──）"
translation = "(클로버 5, 6, 7, 8, 9──)"

[[dialogue]]
speaker = "ダッチ"
original = "「いかがでしょう、ネーゼマイン様。５枚チェンジということですが……」"
translation = "「어떠십니까, 네제마인 님. 5장 체인지라 하셨는데……」"

[[dialogue]]
speaker = "ダッチ"
original = "「<b>望むカードを引くことはできましたか？</b>」"
translation = "「<b>원하는</b> <b>카드를</b> <b>뽑을</b> <b>수</b> <b>있었습니까</b>?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「うーん……無理だった♪\u3000オリま～す♪\u3000やっぱ<ruby>運否天賦<rt>うんぷてんぷ</rt></ruby>はダメだね～」"
translation = "「음~…… 안 됐어♪ 기권할게~♪ 역시 운수 정해진 운명은 안 되네~」"

[[dialogue]]
speaker = "セナリィ"
original = "「オリていても参加料はムシられるんですわよ！？\u3000マイン、わかってるんですの！？」"
translation = "「기권해도 참가비는 뜯긴단 말이에요!? 마인, 알고 있는 건가요!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「慌てない、慌てな～い……あ。５枚チェンジしまーす。先輩、カードくださいっ」"
translation = "「서두르지 마, 서두르지 마~…… 아. 5장 체인지 할게요. 선배, 카드 주세요.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（次に確かめるのはこれ。ダッチがずっと固執してる最強のハンド……スペードのロイヤルストレートフラッシュを『望む』！）"
translation = "(다음에 확인할 건 이거. 더치가 계속 고집하는 최강의 핸드…… 스페이드 로열 스트레이트 플러시를 『원한다』!)"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ど、どうぞっ……ネーゼマイン様……」"
translation = "「여, 여기요…… 네제마인 님……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（役無し……ブタか。スペードのロイヤルの材料は１枚もなし──つまり）"
translation = "(역 없음…… 꽝인가. 스페이드 로열의 재료는 단 한 장도 없어── 즉.)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……そういう『ルール』のポーカーってことなのかな、ダッチ？」"
translation = "「……그런 『규칙』의 포커라는 뜻일까, 더치?」"

[[dialogue]]
speaker = "ダッチ"
original = "「ええ。そうです。事前にお伝えしたとおり、これは『欲望』のポーカーですから」"
translation = "「예. 그렇습니다. 사전에 말씀드린 대로, 이것은 『욕망』의 포커니까요.」"

[[dialogue]]
speaker = "ダッチ"
original = "「勝ちへの強い執念を持つ者が勝者になる……そのように『ルール』を設定しております」"
translation = "「승리에 대한 강한 집념을 가진 자가 승자가 된다…… 그렇게 『규칙』을 설정해 두었습니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ど、どういうことですの？」"
translation = "「무, 무슨 소리인가요?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「さぁ……？」"
translation = "「글쎄요……?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「つまりこういうこと。このポーカーは、引きたいカードを念じたら、必ず引けるポーカーなんだよ」"
translation = "「그러니까 이런 거야. 이 포커는, 뽑고 싶은 카드를 염원하면 반드시 뽑을 수 있는 포커야.」"

[[dialogue]]
speaker = "セナリィ"
original = "「──はぁあ！？」"
translation = "「──하아아!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ここは改造アステラのカジノ。だからもっと柔軟に考えるべきだったかな……ダッチはカードに印をつける必要なんてなかった」"
translation = "「여긴 개조 아스텔라의 카지노. 그러니까 좀 더 유연하게 생각했어야 했나 봐…… 더치는 카드에 표시를 할 필요 따위 없었어.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「セナリィ。フルハウスを作る時、１枚チェンジしたよね。その時に何を考えてた？」"
translation = "「세나리. 풀 하우스를 만들 때, 1장 체인지 했지. 그때 무슨 생각을 했어?」"

[[dialogue]]
speaker = "セナリィ"
original = "「え……？\u3000そりゃあ、最後のパーツであるＫが来いと……」"
translation = "「에……? 그어야 당연히, 마지막 조각인 K가 오라고……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「千園寺先輩も。ストフラを作る時にハートの６、７のまわりを引きたいって『願った』でしょ？」"
translation = "「치노지 선배도. 스트플을 만들 때 하트 6, 7 주변을 뽑고 싶다고 『바랐지』?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ま、まあ……その通りですが……いや、そんな……まさか！？」"
translation = "「뭐, 뭐어…… 그렇긴 합니다만…… 아니, 그런…… 설마!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「つまりこれは……イカサマですわ！！」"
translation = "「즉 이건…… 속임수예요!!」"

[[dialogue]]
speaker = "ダッチ"
original = "「いえいえ、そんなそんな。強く願うことが大事だとは事前に伝えておりますし……」"
translation = "「아니 아니, 천만에요. 강하게 바라는 것이 중요하다고 사전에 전해 드렸고……」"

[[dialogue]]
speaker = "ダッチ"
original = "「それに事実、貴女がたも望んだハンドを作れていたでしょう？」"
translation = "「게다가 사실, 귀하들도 원하던 핸드를 만들지 않았습니까?」"

[[dialogue]]
speaker = "ダッチ"
original = "「セナリィ様はＫハイのフルハウス。ヒルディオーネ様はストレートフラッシュをね？」"
translation = "「세나리 님은 K 하이 풀 하우스. 힐디오네 님은 스트레이트 플러시를 말이죠.」"

[[dialogue]]
speaker = "ダッチ"
original = "「これはイカサマではない。なぜならお互い条件は同じだ。そういう『ルール』のポーカーというだけの話なのです」"
translation = "「이것은 속임수가 아닙니다. 왜냐하면 서로 조건은 같으니까요. 그런 『규칙』의 포커일 뿐인 이야기입니다.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ああ、でも１個だけわかんないかも。お互いが、同じカードを願った時……何か判定が行われてるよね？」"
translation = "「아, 근데 딱 하나 모르겠는 게 있는데. 서로가 똑같은 카드를 바랐을 때…… 뭔가 판정이 이루어지는 거지?」"

[[dialogue]]
speaker = "ダッチ"
original = "「なるほど。先ほどネーゼマイン様は、スペードのロイヤルストレートフラッシュを作ろうとしたのですね？」"
translation = "「과연. 방금 네제마인 님은 스페이드 로열 스트레이트 플러시를 만들려고 하셨군요?」"

[[dialogue]]
speaker = "ダッチ"
original = "「私も同じハンドを願いました。ゆえにその時、判定が行われています。どちらの『欲望』がより強いのかを──ね？」"
translation = "「저도 같은 핸드를 바랐습니다. 고로 그때 판정이 이루어진 것입니다. 어느 쪽의 『욕망』이 더 강한가를── 말이죠.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……へぇ」"
translation = "「……헤에.」"

[[dialogue]]
speaker = "ダッチ"
original = "「フフフ。私の『欲望』の強さは並大抵ではありません。私はバニーガールが大好きなのです。今までにも散々見て来たでしょう？」"
translation = "「후후후. 제 『욕망』의 강도는 평범하지 않습니다. 저는 바니걸을 정말 좋아하거든요. 지금까지도 지겹도록 보아오지 않았습니까?」"

[[dialogue]]
speaker = "ダッチ"
original = "「私の『欲望』よりも強く願わなければ……ロイヤルの材料は引けないのです」"
translation = "「제 『욕망』보다 강하게 바라지 않는다면…… 로열의 재료는 뽑을 수 없는 겁니다.」"

[[dialogue]]
speaker = "ダッチ"
original = "「望むカードを引ける……ただし、デッキに存在しているカードしか引けません。新たに生み出すことは不可能だ。ご理解いただけましたか？」"
translation = "「원하는 카드를 뽑을 수 있다…… 다만, 덱에 존재하는 카드밖에 뽑을 수 없습니다. 새로 만들어내는 것은 불가능하죠. 이해하셨습니까?」"

[[dialogue]]
speaker = "セナリィ"
original = "「こ、この変態紳士よりも……」"
translation = "「이, 이 변태 신사보다……」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「強く欲さなくてはいけない……？」"
translation = "「강하게 원해야만 한다고……?」"

[[dialogue]]
speaker = "ダッチ"
original = "「その通り。５２枚のデッキで組める最強のハンドはスペードのロイヤル。クラブやハートのロイヤルでは、スートの序列で敗北となります」"
translation = "「그렇습니다. 52장의 덱으로 짤 수 있는 최강의 핸드는 스페이드 로열. 클로버나 하트 로열로는 수트의 서열에서 패배하게 됩니다.」"

[[dialogue]]
speaker = "unk"
original = "それで嬉しいのか！？"
translation = "그래서 기쁘냐!?"

[[dialogue]]
speaker = "unk"
original = "お前はこんなことをして勝って……"
translation = "네놈은 이런 짓을 해서 이기고……"

[[dialogue]]
speaker = "ダッチ"
original = "「イカサマのような糾弾はやめていただきたい！\u3000私だってリスクを負っている！\u3000『欲望』の強さで勝てなければ、ロイヤルは作れないのですから！」"
translation = "「속임수 같은 비난은 그만둬 주시길! 저 역시 리스크를 짊어지고 있습니다! 『욕망』의 강도로 이기지 못하면 로열은 만들 수 없으니까요!」"

[[dialogue]]
speaker = "ダッチ"
original = "「この『欲望』のポーカーは私に生きる喜びを与えてくれる……ショウダウンして勝つたびに、私の方が強い『欲望』を持つ存在なのだと実感できるのです！」"
translation = "「이 『욕망』의 포커는 제게 삶의 기쁨을 줍니다…… 쇼다운해서 이길 때마다, 제가 더 강한 『욕망』을 가진 존재라는 것을 실감할 수 있거든요!」"

[[dialogue]]
speaker = "ダッチ"
original = "「その実感を存分に味わい、そして美しいバニーを虜囚とする……それこそが私の存在理由なのですよ！」"
translation = "「그 실감을 마음껏 맛보고, 그리고 아름다운 바니를 포로로 삼는다…… 그것이야말로 제 존재 이유입니다!」"

[[dialogue]]
speaker = "ダッチ"
original = "「まさかやめるとは言わないでしょう？\u3000続行しましょう、ネーゼマイン様。想いの強さが反映されるこのポーカー。条件は同じです！\u3000さぁ、さぁさぁ──！」"
translation = "「설마 그만둔다고 하지는 않겠죠? 계속하시죠, 네제마인 님. 마음의 강도가 반영되는 이 포커. 조건은 같습니다! 자, 자아 자아──!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……おっけ。やろっか」"
translation = "「……오케이. 할까.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ネーゼマイン様……！？」"
translation = "「네제마인 님……!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「本当に大丈夫ですの、マイン……！？」"
translation = "「정말 괜찮은 건가요, 마인……!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（大丈夫なのかって言われても……無理だよ。コイツの『欲望』は強すぎる。今の状態じゃ絶対に勝てない）"
translation = "(괜찮냐고 물어봐도…… 무리야. 이 녀석의 『욕망』은 너무 강해. 지금 상태로는 절대로 못 이겨.)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "（だから私がやるべきことは、たった一つだけ……！）"
translation = "(그러니까 내가 해야 할 일은 단 하나뿐……!)"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「みんな……ごめん。ロイヤルフラッシュ、作れなかった……」"
translation = "「얘들아…… 미안. 로열 플러시, 못 만들었어……」"

[[dialogue]]
speaker = "セナリィ"
original = "「あぁあっ……！？」"
translation = "「아아앗……!?」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「ネーゼマイン様のチップが、ゼロに……！」"
translation = "「네제마인 님의 칩이 제로가……!」"

[[dialogue]]
speaker = "ダッチ"
original = "「アッハッハッハ！\u3000手に入れた！\u3000また手に入れてしまいました！\u3000美しい子ウサギを！！」"
translation = "「앗핫핫핫! 손에 넣었다! 또 손에 넣고 말았습니다! 아름다운 아기 토끼를!!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「──ああ、もうっ！！」"
translation = "「──아아, 정말!!」"

[[dialogue]]
speaker = "ダッチ"
original = "「おやおや……負けて悔しいからと、テーブルを叩くだなんていけませんよ？」"
translation = "「이런 이런…… 졌다고 분해서 테이블을 치다니 그러면 안 됩니다?」"

[[dialogue]]
speaker = "ダッチ"
original = "「カードも曲げてしまわれて……これでは星徒会長様との前に、もう一度デッキを交換しなくては……」"
translation = "「카드도 구부려 버리시고…… 이래서야 성도회장님과의 대결 전에 다시 한번 덱을 교체해야겠군요……」"

[[dialogue]]
speaker = "ダッチ"
original = "「虜囚のウサギとなった最初の仕事です。さぁ、あちらのテーブルからデッキを持ってきてください。ウサギマイン様？」"
translation = "「포로가 된 토끼로서의 첫 업무입니다. 자, 저쪽 테이블에서 덱을 가져오세요. 토끼 마인 님?」"

[[dialogue]]
speaker = "ダッチ"
original = "「もちろん語尾にぴょんは忘れず！\u3000大切なことですから！」"
translation = "「물론 어미에 뿅은 잊지 마시고! 중요한 거니까요!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「承知いたしました……ぴょん」"
translation = "「알겠습니다…… 뿅.」"

[[dialogue]]
speaker = "ダッチ"
original = "「フオォ……不機嫌そうなぴょんもまた味わい深い！\u3000いいですねぇ……！」"
translation = "「후오오…… 기분 나빠 보이는 뿅도 나름의 풍미가 있군요! 좋네요……!」"

[[dialogue]]
speaker = "unk"
original = "新品のデッキが置いてあるテーブルに行く前に、マインが俺の近くへやってきた。"
translation = "새로운 덱이 놓여 있는 테이블로 가기 전에, 마인이 내 근처로 다가왔다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「会長、あとはお願いね」"
translation = "「회장님, 나머지는 부탁해.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「たぶんダッチの想いの強さ……『欲望』に勝つのは難しいと思う」"
translation = "「아마 더치의 마음의 강도…… 『욕망』에 이기는 건 어려울 거라 생각해.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「だから────」"
translation = "「그러니까────」"

