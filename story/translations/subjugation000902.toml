[[dialogue]]
speaker = "unk"
original = "ある日の放課後。"
translation = "어느 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "俺は、学園から星徒会に依頼があって、保健室へと調査にやってきていた。"
translation = "나는 학원으로부터 성도회에 의뢰가 있어 보건실로 조사를 하러 왔다."

[[dialogue]]
speaker = "unk"
original = "すると――"
translation = "그러자──"

[[dialogue]]
speaker = "ソフレ"
original = "「すぅ……すぅ……。スヤスヤ……♪」"
translation = "「스으…… 스으……. 새근새근……♪」"

[[dialogue]]
speaker = "unk"
original = "見たことがない子だ。制服から、流星学園の生徒のようだが、どうして新星学園の保健室で眠っているのだろうと思ってると――"
translation = "본 적 없는 아이다. 교복을 보니 유성학원 학생 같지만, 왜 신성학원 보건실에서 잠들어 있는 걸까 생각하고 있자──"

[[dialogue]]
speaker = "ソフレ"
original = "「ん……。ふわぁ～……」"
translation = "「음……. 하암~……」"

[[dialogue]]
speaker = "ソフレ"
original = "「お前……誰なの？」"
translation = "「너…… 누구야?」"

[[dialogue]]
speaker = "ソフレ"
original = "「――新星学園の星徒会長？\u3000ああ、そういえば、転入してすぐに会長になったっていう話を、どこかで聞いたような気もするのだわ」"
translation = "「──신성학원의 성도회장? 아아, 그러고 보니 전학 오자마자 회장이 됐다는 얘기를 어디선가 들은 것 같기도 해요」"

[[dialogue]]
speaker = "unk"
original = "キミの名前は？"
translation = "너의 이름은?"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレは、流星学園の……今年は２年生だったわね」"
translation = "「소프레는 유성학원의…… 올해는 2학년이었나 보네」"

[[dialogue]]
speaker = "ソフレ"
original = "「<b>吸血鬼</b>の、ソフレ・ヴァートリンよ」"
translation = "「<b>흡혈귀</b>인 소프레 바르트린이야」"

[[dialogue]]
speaker = "ソフレ"
original = "「……なに？\u3000ソフレが吸血鬼であることに驚いているの？」"
translation = "「……뭐야? 소프레가 흡혈귀인 것에 놀라는 거야?」"

[[dialogue]]
speaker = "ソフレ"
original = "「でも、事実なのだわ。こう見えて、２００年以上生きているんだから……ふわぁ～……」"
translation = "「하지만 사실인 거예요. 이래 봬도 200년 이상 살았으니까…… 하암~……」"

[[dialogue]]
speaker = "ソフレ"
original = "「スヤァ～♪」"
translation = "「쿠울~♪」"

[[dialogue]]
speaker = "ソフレ"
original = "「スヤスヤ……♪」"
translation = "「새근새근……♪」"

[[dialogue]]
speaker = "unk"
original = "って、いきなり寝た！？"
translation = "갑자기 잠들었어!?"

[[dialogue]]
speaker = "ソフレ"
original = "「ん～……体を揺すったりして、なんなのだわ」"
translation = "「으음~…… 몸을 흔들고 그러다니, 무엇인 거예요」"

[[dialogue]]
speaker = "ソフレ"
original = "「――体調は大丈夫なのかって？\u3000別に平気なのよ」"
translation = "「──몸 상태는 괜찮냐고? 별로 상관없는 거예요」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレはただ、お昼寝するのが好きなだけなのだわ。だから、邪魔して起こさないで欲しいのよ」"
translation = "「소프레는 그저 낮잠 자는 걸 좋아할 뿐인 거예요. 그러니까 방해해서 깨우지 말아줬으면 하는 거예요」"

[[dialogue]]
speaker = "ソフレ"
original = "「ただでさえ、最近はうるさい奴のせいで、安心してお昼寝できる場所がなくなっているっていうのに……」"
translation = "「안 그래도 요즘 시끄러운 녀석 때문에 안심하고 낮잠 잘 장소가 없어지고 있는데……」"

[[dialogue]]
speaker = "unk"
original = "うるさい奴……？"
translation = "시끄러운 녀석……?"

[[dialogue]]
speaker = "ソフレ"
original = "「この場所はまだ見つかってない、ソフレお気に入りのお昼寝スポットなのよ」"
translation = "「이곳은 아직 들키지 않은 소프레가 마음에 들어 하는 낮잠 스팟인 거예요」"

[[dialogue]]
speaker = "フェリシー"
original = "「失礼しま～す！\u3000って――」"
translation = "「실례합니다~! 엇──」"

[[dialogue]]
speaker = "フェリシー"
original = "「あーーーっ！\u3000ソフレ！\u3000いつの間にか教室からいなくなってると思ったら、こんなところに！」"
translation = "「아──앗! 소프레! 언제 교실에서 없어졌나 했더니 이런 곳에!」"

[[dialogue]]
speaker = "ソフレ"
original = "「ギャーーーッ！？\u3000フェリシー！？\u3000見つかったのだわ！」"
translation = "「꺄악──!? 펠리시!? 들켜버린 거예요!」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレの、心のオアシスが……！」"
translation = "「소프레의 마음의 오아시스가……!」"

[[dialogue]]
speaker = "フェリシー"
original = "「というか、一緒にいるのは新星学園の会長さん……？\u3000えっと……どういうことなの？」"
translation = "「그보다 같이 있는 건 신성학원의 회장님……? 저기…… 어떻게 된 거야?」"

[[dialogue]]
speaker = "ソフレ"
original = "「ソフレの方が聞きたいのだわ！」"
translation = "「소프레가 묻고 싶은 거예요!」"

[[dialogue]]
speaker = "unk"
original = "そんな形で、俺は保健室で新たな出会いをしたのだった――"
translation = "그런 식으로 나는 보건실에서 새로운 만남을 가졌다──"

