[[dialogue]]
speaker = "unk"
original = "第３話,ルヴィネ,B"
translation = "제3화, 루비네, B"

[[dialogue]]
speaker = "スレイプニル"
original = "「ブルルル……」"
translation = "「부르르르……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの光条で貫かれたガーディアンが、塵となって消えていく。"
translation = "비너스의 광조에 꿰뚫린 가디언이 먼지가 되어 사라져 간다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「はぁ、はぁ……やっぱりこいつらの相手をするのはきついわね……」"
translation = "「하아, 하아…… 역시 이 녀석들을 상대하는 건 힘들네……」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス、大丈夫か？」"
translation = "「비너스, 괜찮아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「大丈夫は大丈夫だけど、クロトこそ平気な顔してやせ我慢してない？\u3000さっきもチナと戦ったばかりだし」"
translation = "「괜찮긴 괜찮은데, 쿠로토야말로 아무렇지 않은 얼굴로 억지로 참는 거 아냐? 방금 전에도 치나랑 싸운 참이잖아.」"

[[dialogue]]
speaker = "クロト"
original = "「平気……と言いたいが、なかなかきついな……」"
translation = "「멀쩡하다고…… 말하고 싶지만, 꽤 힘들군……」"

[[dialogue]]
speaker = "unk"
original = "チナとの戦いのダメージだけでなく、リクリエの力を使ったせいで体が軋みを上げている。これ以上の連戦は厳しい。"
translation = "치나와의 전투 대미지뿐만 아니라, 리크리에의 힘을 사용한 탓에 몸이 비명을 지르고 있다. 이 이상의 연전은 무리다."

[[dialogue]]
speaker = "クロト"
original = "「とにかく早くここを離れよう。きっとすぐに追手が来る──」"
translation = "「어쨌든 빨리 여기서 벗어나자. 분명 곧 추격자가 올 거야──」"

[[dialogue]]
speaker = "クロト"
original = "「──！！」"
translation = "「──!!」"

[[dialogue]]
speaker = "？？？"
original = "「遠路はるばるご苦労様。初めまして、アルタイルからの来訪者さん」"
translation = "「먼 길 오느라 고생 많았어. 처음 뵙겠네, 알타이르에서 온 방문자님.」"

[[dialogue]]
speaker = "unk"
original = "ガーディアンが現れた空からゆっくりと降り立ったのは、マントをまとった天使。"
translation = "가디언이 나타났던 하늘에서 천천히 내려온 것은 망토를 두른 천사."

[[dialogue]]
speaker = "unk"
original = "彼女はまるで見えない玉座から見下ろすごとく俺たちを睥睨し、冷たい視線を向ける。"
translation = "그녀는 마치 보이지 않는 옥좌에서 내려다보듯 우리를 비웃으며 차가운 시선을 보낸다."

[[dialogue]]
speaker = "unk"
original = "その小さな体とは裏腹に、まとう威圧感は今まで相対してきた多くの強敵に匹敵する。"
translation = "그 작은 몸과는 반대로, 두르고 있는 위압감은 지금까지 상대해 온 수많은 강적들에 필적한다."

[[dialogue]]
speaker = "クロト"
original = "（でも……何だろう、この感じ……）"
translation = "(하지만…… 뭘까, 이 느낌은……)"

[[dialogue]]
speaker = "unk"
original = "だけど彼女の存在を、どこかで知っているような……"
translation = "하지만 그녀의 존재를 어딘가에서 알고 있는 듯한……"

[[dialogue]]
speaker = "unk"
original = "伝聞で知っていると、初対面でもそんな気がしないこともあるが、チナから断片的に聞いていたからだろうか……？"
translation = "전해 들은 이야기로 알고 있으면 초면이라도 그런 기분이 들 때가 있지만, 치나에게 단편적으로 들었기 때문일까……?"

[[dialogue]]
speaker = "？？？"
original = "「あなたが魔王──緋宮クロトね」"
translation = "「당신이 마왕── 히노미야 쿠로토구나.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「同じ星徒会長として、一応挨拶させてもらうわ。私はルヴィネ。極星学園の星徒会長よ」"
translation = "「같은 성도회장으로서 일단 인사는 해둘게. 나는 루비네. 극성학원의 성도회장이야.」"

[[dialogue]]
speaker = "クロト"
original = "「……挨拶ならこっちも返さないとな。新星学園の星徒会長、緋宮クロトだ」"
translation = "「……인사라면 이쪽도 받아줘야겠지. 신성학원의 성도회장, 히노미야 쿠로토다.」"

[[dialogue]]
speaker = "クロト"
original = "「ただしアルタイルの──な」"
translation = "「다만 알타이르의── 말이지.」"

[[dialogue]]
speaker = "unk"
original = "まるで喉元に刃を突き付けられるような緊張感。"
translation = "마치 목에 칼날이 들이대진 것 같은 긴장감."

[[dialogue]]
speaker = "unk"
original = "だが彼女と話をするなら今しかない。"
translation = "하지만 그녀와 대화할 기회는 지금뿐이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたが噂のルヴィネね！\u3000私は新星星徒会のスーパーフィクサー、九浄ヴィーナスよ！\u3000覚えておきなさい！」"
translation = "「당신이 소문의 루비네구나! 나는 신성 성도회의 슈퍼 픽서, 쿠죠 비너스야! 기억해 두라고!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……フィクサー？\u3000それは星徒会の役職なの？」"
translation = "「……픽서? 그게 성도회의 직책이야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうよ！」"
translation = "「그래!」"

[[dialogue]]
speaker = "クロト"
original = "「あー……ええと……」"
translation = "「아─…… 저기……」"

[[dialogue]]
speaker = "unk"
original = "当然、フィクサーは正式な役職ではない。ヴィーナスが自分で言っているだけである。"
translation = "당연히 픽서는 정식 직책이 아니다. 비너스가 마음대로 자칭하고 있을 뿐이다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「正式な役職でないなら、それはただの平役員なのでは……？」"
translation = "「정식 직책이 아니라면, 그건 그냥 평의원 아닌가요……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「フィクサーはフィクサーなの！\u3000大事な仕事なんだから！」"
translation = "「픽서는 픽서야! 중요한 일이라고!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「フィクサーが重要な役目を持つ星徒会なんて、健全ではないと思うんだけど……まぁいいわ。余所の星徒会に口を出すつもりはないのだし」"
translation = "「픽서가 중요한 역할을 맡는 성도회라니, 건전하지 않다고 생각하지만…… 뭐, 됐어. 남의 성도회에 참견할 생각은 없으니까.」"

[[dialogue]]
speaker = "unk"
original = "敵方の星徒会長から、至極全うな指摘をもらったところで──"
translation = "적측 성도회장으로부터 지극히 타당한 지적을 받은 참에──"

[[dialogue]]
speaker = "ルヴィネ"
original = "「チナはどうなったの？\u3000アルタイルに向かったはずだけど」"
translation = "「치나는 어떻게 됐어? 알타이르로 향했을 텐데.」"

[[dialogue]]
speaker = "クロト"
original = "「チナなら生きてる。彼女がやろうとしたことは俺たちが止めた」"
translation = "「치나라면 살아있어. 그녀가 하려던 짓은 우리가 막았다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「──そう」"
translation = "「──그래.」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが頷く一瞬、表情がわずかに緩んだ……気がする。本当にわずかだけど。"
translation = "루비네가 고개를 끄덕이는 순간, 표정이 아주 살짝 풀린…… 느낌이 들었다. 정말 아주 조금이지만."

[[dialogue]]
speaker = "クロト"
original = "「俺も少し話をしていいか？」"
translation = "「나도 조금 이야기를 해도 될까?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……構わないわ。チナを助けてくれたみたいだから、その分は聞きましょう」"
translation = "「……상관없어. 치나를 도와준 것 같으니, 그만큼은 들어주지.」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう。できるだけ手短にするよ」"
translation = "「고마워. 가능한 짧게 할게.」"

[[dialogue]]
speaker = "クロト"
original = "「君たち極星学園が、アルタイルと戦う理由はチナから聞いている」"
translation = "「너희 극성학원이 알타이르와 싸우는 이유는 치나에게 들었어.」"

[[dialogue]]
speaker = "クロト"
original = "「だけど俺は戦いに来たんじゃない。チナが持っていた転送装置を破壊した余波で、こっちの世界に飛ばされたんだ」"
translation = "「하지만 난 싸우러 온 게 아냐. 치나가 가지고 있던 전송 장치를 파괴한 여파로 이쪽 세계로 날려져 온 거다.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「侵攻ではないと、そう言いたいのね」"
translation = "「침공이 아니라고, 그렇게 말하고 싶은 거네.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、俺たちはデネブを滅ぼす意志はない」"
translation = "「그래, 우리는 데네브를 멸망시킬 의사가 없어.」"

[[dialogue]]
speaker = "クロト"
original = "「チナは言っていた。アルタイルを守ればデネブが、デネブを守ればアルタイルがリクリエの脅威に晒される。だからどちらかが滅びる必要があると」"
translation = "「치나는 말했지. 알타이르를 지키면 데네브가, 데네브를 지키면 알타이르가 리크리에의 위협에 노출된다고. 그래서 어느 한쪽이 멸망해야 한다고.」"

[[dialogue]]
speaker = "クロト"
original = "「だけど、敵は同じリクリエのはずだ。ならアルタイルとデネブが力を合わせてリクリエと戦うこともできるんじゃないのか？」"
translation = "「하지만 적은 똑같은 리크리에일 터야. 그렇다면 알타이르와 데네브가 힘을 합쳐 리크리에와 싸울 수도 있지 않겠어?」"

[[dialogue]]
speaker = "クロト"
original = "「俺は新星学園の星徒会長として、アルタイルの星騎士として……アルタイルとデネブ、２つの世界で共にリクリエと戦うことを提案する！」"
translation = "「나는 신성학원의 성도회장으로서, 알타이르의 성기사로서…… 알타이르와 데네브, 두 세계가 함께 리크리에와 싸울 것을 제안한다!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "沈黙したまま、値踏みするように俺に視線を注ぐルヴィネ。"
translation = "침묵한 채, 가치를 매기듯 나에게 시선을 쏟는 루비네."

[[dialogue]]
speaker = "unk"
original = "だがうんざりしたように嘆息して……"
translation = "하지만 지긋지긋하다는 듯 한숨을 내쉬며……"

[[dialogue]]
speaker = "ルヴィネ"
original = "「どんな話をするのかと思えば……聞くだけ無駄だったようね」"
translation = "「어떤 이야기를 하나 했더니…… 들을 가치도 없었던 모양이네.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「子どものような理屈をこねないで。アルタイルとデネブが両方存在している限り、リクリエは永遠に終わらない」"
translation = "「아이 같은 억지 부리지 마. 알타이르와 데네브가 양쪽 다 존재하는 한, 리크리에는 영원히 끝나지 않아.」"

[[dialogue]]
speaker = "クロト"
original = "「それは誰が言ってたんだ？」"
translation = "「그건 누가 말한 거지?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「女神様よ。世界の真理を知っているとすれば、あの方以外におられないでしょう」"
translation = "「여신님이야. 세계의 진리를 알고 있다면 그분 말고는 없겠지.」"

[[dialogue]]
speaker = "クロト"
original = "「女神様が？\u3000本当にそう言ったのか？」"
translation = "「여신님이? 정말로 그렇게 말했나?」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私には女神様の声が聞こえるの。……と言っても、あなたたちには信じられないかもしれないけど」"
translation = "「나에게는 여신님의 목소리가 들려. ……라고 해도, 당신들은 믿지 못할지도 모르겠지만.」"

[[dialogue]]
speaker = "unk"
original = "少なくとも、アルタイルで接した時や、セイファート元学園長の記憶では、女神はそんなことは言っていなかった。"
translation = "적어도 알타이르에서 접했을 때나, 세이퍼트 전 학원장의 기억 속에서는 여신은 그런 말을 하지 않았다."

[[dialogue]]
speaker = "unk"
original = "それにヴィーナスがデネブからアルタイルに渡ったのは、おそらく女神によるもの。"
translation = "게다가 비너스가 데네브에서 알타이르로 넘어간 것은 아마 여신에 의한 것."

[[dialogue]]
speaker = "unk"
original = "平行世界同士の戦いが起こるなら、女神がそんなことをするだろうか……？"
translation = "평행세계끼리의 전쟁이 일어난다면 여신이 그런 짓을 할까……?"

[[dialogue]]
speaker = "クロト"
original = "「それともう１つ。君はデネブを救った英雄だと聞いたが、どうやって成し遂げたんだ？」"
translation = "「그리고 하나 더. 당신은 데네브를 구한 영웅이라고 들었는데, 어떻게 해낸 거지?」"

[[dialogue]]
speaker = "クロト"
original = "「君を疑うようで悪いが、リクリエを退けるなんて、天使１人でできる所業とは思えない」"
translation = "「당신을 의심하는 것 같아 미안하지만, 리크리에를 물리치는 건 천사 혼자서 할 수 있는 소행이라고는 생각되지 않아.」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「女神様のお力よ。私はこの世界を守るべく、女神様から特別に力を授けられたの」"
translation = "「여신님의 힘이야. 나는 이 세계를 지키기 위해 여신님으로부터 특별한 힘을 부여받았어.」"

[[dialogue]]
speaker = "クロト"
original = "（セイファート元学園長のように……か？）"
translation = "(세이퍼트 전 학원장처럼…… 인가?)"

[[dialogue]]
speaker = "unk"
original = "かつてフィーニスの塔を制覇したセイファート元学園長は、女神から力を与えられた。"
translation = "과거 피니스의 탑을 제패했던 세이퍼트 전 학원장은 여신으로부터 힘을 받았다."

[[dialogue]]
speaker = "unk"
original = "だがその彼をもってしても、単身で世界を救えるほどの力かと言われれば疑問だ。"
translation = "하지만 그조차도 단신으로 세계를 구할 정도의 힘이었냐고 묻는다면 의문이다."

[[dialogue]]
speaker = "ルヴィネ"
original = "「問答は終わりかしら？\u3000であれば……極星学園の星徒会長として、デネブの敵であるあなたたちを処断するわ」"
translation = "「문답은 끝인가? 그렇다면…… 극성학원의 성도회장으로서, 데네브의 적이 당신들을 처단하겠어.」"

[[dialogue]]
speaker = "クロト"
original = "「──ッ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "ルヴィネが手をかざすだけで衝撃が吹き荒れる。"
translation = "루비네가 손을 내미는 것만으로 충격이 몰아친다."

[[dialogue]]
speaker = "unk"
original = "咄嗟に星力を放出して防御していなければ、軽く消し飛ばされていただろう。"
translation = "황급히 성력을 방출해 방어하지 않았다면 가볍게 날려갔을 것이다."

[[dialogue]]
speaker = "クロト"
original = "「く……変身せずにこの力か……」"
translation = "「큭…… 변신하지 않고 이 정도 힘인가……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちょっと、星騎士のくせに変身もしないで相手にするつもり！？\u3000あなた極星学園の星徒会長なんでしょ！」"
translation = "「잠깐, 성기사 주제에 변신도 안 하고 상대할 셈이야!? 당신 극성학원의 성도회장이잖아!」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「あなたたち相手に変身する必要なんてないわ」"
translation = "「당신들 상대로 변신할 필요 따위 없어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう、ムカつくちみっ子ね！\u3000怪我しても知らないんだから！」"
translation = "「정말, 짜증 나는 꼬맹이네! 다쳐도 난 모른다고!」"

[[dialogue]]
speaker = "unk"
original = "世界を守るためにも、ヴィーナスたちを守るためにも、今やられるわけにはいかない。"
