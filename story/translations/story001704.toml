[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「バーミリオンイータ……！」"
translation = "「버밀리언 이터……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁっ……はぁっ……戦闘終了。自己ベスト更新。ハイスコア……」"
translation = "「하악…… 하악…… 전투 종료. 자기 베스트 갱신. 하이스코어……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……強くは、なっているはずです。でも」"
translation = "「…… 강해지고는 있을 겁니다. 하지만」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノヴァフォームのために必要な、私のブレイクスルーは、一体どこに……？」"
translation = "「노바 폼을 위해 필요한 나의 브레이크스루는 대체 어디에……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あぁ……もうすぐ授業ですね……副会長が遅刻したら大ごとです。急がないと……」"
translation = "「아…… 곧 수업이네요…… 부회장이 지각하면 큰일이에요. 서둘러야……」"

[[dialogue]]
speaker = "unk"
original = "シュティレと出会ってから数日──"
translation = "슈틸레와 만난 지 며칠──"

[[dialogue]]
speaker = "unk"
original = "会長であるクロトがいない時も、アナは懸命に自主鍛錬を続けていた……"
translation = "회장인 쿠로토가 없을 때도 아나는 열심히 자율 훈련을 계속하고 있었다……"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「──会長にアナお姉ちゃん。ここのところ毎日お会いできて嬉しいです。いらっしゃいませ」"
translation = "「──회장님에 아나 언니. 요즘 매일 뵐 수 있어 기쁩니다. 어서 오세요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今日も店番に精が出ますね、シュティレさん」"
translation = "「오늘도 가게 보는 일에 정성이 가득하네요, 슈틸레 씨.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい。私が店番を担うたび、マスターの中で少しずつ好感度が上昇しています。マスター攻略ルートまであと一歩。ぶい」"
translation = "「네. 제가 가게를 맡을 때마다 마스터 안에서 조금씩 호감도가 상승하고 있습니다. 마스터 공략 루트까지 앞으로 한 걸음. 브이.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「本当にそうなのでしょうか……。私でよければ、あまりシュティレさんをこき使うなと進言もできますが」"
translation = "「정말 그런 걸까요……. 저라도 괜찮다면 슈틸레 씨를 너무 부려 먹지 말라고 진언할 수도 있습니다만.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「問題ありません。こうして店番をしている時も、発明ノートは逐一つけております」"
translation = "「문제없습니다. 이렇게 가게를 볼 때도 발명 노트는 꼬박꼬박 적고 있습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ところでアナお姉ちゃん。先日の機械型モンスターへのドリル攻撃は、今一つの結果となってしまいました」"
translation = "「그런데 아나 언니. 지난번 기계형 몬스터에 대한 드릴 공격은 아쉬운 결과가 되고 말았습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「そこで私、新たにロマンを感じる武装をいくつかまとめてきたのです。ご意見をいただけますか」"
translation = "「그래서 저, 새로이 로망을 느끼는 무장을 몇 가지 정리해 왔습니다. 의견을 주시겠습니까?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おー……ノートにびっちりと兵器の構想が……。これは、大型の鉄杭を打ち込む……パイルバンカー？」"
translation = "「오~…… 노트에 빼곡하게 병기 구상이……. 이것은 대형 철말뚝을 박아넣는…… 파일 벙커?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ロボットアニメ・<ruby>雄姿王<rt>ゆうしおう</rt></ruby>シリーズを見返していて思ったのです。一転突破で貫くために、パイルバンカーの構造は合理的かと」"
translation = "「로봇 애니메이션 『웅시왕』 시리즈를 다시 보며 생각했습니다. 한 점 돌파로 꿰뚫기 위해 파일 벙커 구조는 합리적이라고.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「素晴らしいですね。それならばこういうのはどうでしょう、杭の先端に爆薬を取り付ける、とか」"
translation = "「훌륭하네요. 그렇다면 이런 건 어떨까요, 말뚝 끝에 폭약을 부착한다던가.」"

[[dialogue]]
speaker = "unk"
original = "ずいぶんと過激だね！？"
translation = "꽤 과격한데!?"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「まさかそのアイデアは……！」"
translation = "「설마 그 아이디어는……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。シュティレさんがオススメしてくださったギガンドムからヒントを得ました」"
translation = "「네. 슈틸레 씨가 추천해 주신 기간돔에서 힌트를 얻었습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「爆弾を用いると１回限りの消耗品の武器となってしまいますが、自身の得物を犠牲に敵を撃破するというのもまた──」"
translation = "「폭탄을 사용하면 1회용 소모품 무기가 되어버리지만, 자신의 무기를 희생해서 적을 격파한다는 것도 또한──」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「はい、それもまたロマンです。こんなこともあろうかと、徹甲榴弾の制作も並行しておりました。そちらを転用するとします」"
translation = "「네, 그것 또한 로망입니다. 이런 일이 있을까 봐 철갑유탄 제작도 병행하고 있었습니다. 그것을 전용하기로 하죠.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「グッドタイミング。そうだ、どうせ爆弾を付けるなら、発射式の槍みたいな形状も良いのでは？」"
translation = "「굿 타이밍. 맞다, 어차피 폭탄을 붙일 거라면 발사식 창 같은 형상도 좋지 않을까요?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「エクセレントです。アイデアがみるみる湧いてきますね」"
translation = "「엑설런트입니다. 아이디어가 눈 깜짝할 새에 솟아나네요.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「こんにちはダ、諸君。何やら精が出ているようじゃないカ」"
translation = "「안녕이다, 제군들. 뭔가 정성이 가득한 모양이다타.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「マスター。もしかして可愛い弟子の様子を見に来ていただけたのですか」"
translation = "「마스터. 혹시 귀여운 제자의 모습을 보러 와 주신 건가요?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000アニマに弟子はいないゾ。シュティレのそのネバーギブアップ根性は評価するが、別件ダ」"
translation = "「후히♪ 아니마에게 제자는 없다다. 슈틸레의 그 네버 기브 업 근성은 평가한다만 별건이다타.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「実は弱体化薬の改良中に、ふと新しいアイデアが閃いてネ？\u3000どうだろう会長、この薬を飲んで翼を生やし、大空を飛んでみたくはないカ？」"
translation = "「사실 약화약 개량 중에 문득 새로운 아이디어가 번뜩였다다! 어떻다 회장, 이 약을 마시고 날개를 돋워 창공을 날아보고 싶지 않다카?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「本当に別件じゃないですか」"
translation = "「정말 별건이잖아요.」"

[[dialogue]]
speaker = "unk"
original = "人間のままでいさせて……！"
translation = "인간인 채로 있게 해줘……!"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ふ～む、残念だナ。今回の薬は自信があるのに……」"
translation = "「흐~음, 아쉽다타. 이번 약은 자신 있는데……」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「水臭いです、マスター。私ならいくらでも新薬の実験台に使ってもらって構いません」"
translation = "「서운합니다, 마스터. 저라면 얼마든지 신약 실험체로 써 주셔도 상관없습니다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒ。シュティレがこの薬を飲むには、ちょっと背が足りないナ！\u3000実に残念ダ」"
translation = "「후히히. 슈틸레가 이 약을 마시기엔 좀 키가 모자라다타! 참으로 아쉽다타.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ジェットコースターじゃないんですから……というか、足りていても許可できません。可愛い後輩を実験に使うのはダメです」"
translation = "「롤러코스터도 아니고요…… 애당초 충분하더라도 허가할 수 없습니다. 귀여운 후배를 실험에 쓰는 건 안 돼요.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「おや？\u3000おやおや？\u3000アナ、ちょっと見ないうちに、ずいぶんとシュティレを可愛がっているみたいじゃないカ？」"
translation = "「어라? 어라라? 아나, 잠깐 안 본 사이에 아주 슈틸레를 귀여워하고 있는 모양이다타?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「可愛い後輩天使ですから。ぶい」"
translation = "「귀여운 후배 천사니까요. 브이.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「良かったらアナ。キミがシュティレを引き取って、弟子にしてくれてもいいんだゾ？」"
translation = "「좋다면 아나. 네가 슈틸레를 데려가서 제자로 삼아줘도 된다다?」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「がーん……マスター、冷たい」"
translation = "「가안…… 마스터, 차가워.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「ですが、そんなところも素敵です。これからも粘着して、いつか弟子と言わせて見せましょう」"
translation = "「하지만 그런 점도 멋집니다. 앞으로도 끈질기게 붙어서 언젠가 제자라고 말하게 만들겠습니다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒヒっ♪\u3000しつこいヤツだナ！\u3000だがそのガッツは素晴らしイ！」"
translation = "「후히히히♪ 끈질긴 녀석이다타! 하지만 그 근성은 훌륭하다타!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……というかアニマ先輩。ちょっと気になっていることがあるのですが」"
translation = "「……그건 그렇고 아니마 선배님. 좀 궁금한 게 있는데요.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒッ？\u3000何かナ」"
translation = "「후히? 뭐다타.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なぜシュティレさんを弟子と認めてあげないのですか？」"
translation = "「왜 슈틸레 씨를 제자로 인정해 주지 않는 건가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「プリマステラでこそありませんが、彼女は優秀な星騎士です。普通は附属１年生で、実戦投入可能な機械式の武器なんて作れません」"
translation = "「프리마스텔라는 아니지만 그녀는 우수한 성기사입니다. 보통은 부속 1학년이 실전 투입 가능한 기계식 무기 같은 건 못 만들어요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「間違いなく天性のスキルです。それにアニマ先輩のおかしなノリにもついていける人となると、もっと少ないでしょう」"
translation = "「틀림없이 천부적인 스킬입니다. 게다가 아니마 선배님의 이상한 텐션에도 따라올 수 있는 사람이라면 더 적겠죠.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒ♪\u3000そうだろう、そうだろう。アニマもそう思うヨ」"
translation = "「후히히♪ 그렇다다, 그렇다다. 아니마도 그렇게 생각한다다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ではなぜです？\u3000慕われているのなら、育ててあげるのも学園の先輩としての役目だと思うのですが」"
translation = "「그럼 왜인가요? 사모하고 있다면 키워주는 것도 학원 선배로서의 역할이라고 생각하는데요.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ン～、弟子にしない理由、か……そうだなぁ。シュティレはあれだナ、アニマから見て──」"
translation = "「음~, 제자로 삼지 않는 이유, 라…… 그렇다타. 슈틸레는 그거다타, 아니마가 보기엔──」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──圧倒的にロマンが足りなイ！！」"
translation = "「──압도적으로 로망이 부족하다타!!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「えええっ──！？」"
translation = "「에에엣──!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……驚きました。そんな大きな声も出せるんですね。シュティレさん」"
translation = "「……놀랐어요. 그렇게 큰 소리도 낼 수 있군요, 슈틸레 씨.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「他の何が足りないと言われても驚きませんが、ロマンが足りないという発言は予想していませんでした。計算外です」"
translation = "「다른 무엇이 부족하다고 해도 놀라지 않겠지만, 로망이 부족하다는 발언은 예상하지 못했습니다. 계산 밖입니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「あの、マスター……僭越ながら、ドリルはロマンの塊なのですが……」"
translation = "「저기, 마스터…… 참람하오나 드릴은 로망의 결정체입니다만……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「まぁ聞ケ。ドリルナックルにパイルバンカー、それらを作り出せる手腕、実に見事ダ」"
translation = "「자 들어라다. 드릴 너클에 파일 벙커, 그것들을 만들어낼 수 있는 수완, 참으로 훌륭하다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「個人的には苦手としているが、機械技術そのものの素晴らしさもわかル。アニマには無理な芸当だ、そこは誇ってイイ」"
translation = "「개인적으로는 질색하고 있지만 기계 기술 그 자체의 훌륭함도 안다다. 아니마에게는 무리인 솜씨다, 그건 자랑스러워해도 좋다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「しかし！\u3000だからこそアニマにはわからなイ！\u3000シュティレがどうして機械を得意をしないアニマの元で、錬金術を学びたがるのカ！」"
translation = "「하지만! 그렇기에 아니마는 모르겠다타! 슈틸레가 어째서 기계에 능숙하지 않은 아니마 밑에서 연금술을 배우고 싶어 하는지다타!」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「それは──」"
translation = "「그것은──」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒッ。弟子入りとは、師匠の技術と経験を食らい尽くし、<ruby>己<rt>おの</rt></ruby>が糧とする行為に他ならなイ！」"
translation = "「후히. 제자가 된다는 건 스승의 기술과 경험을 집어삼켜 자신의 양분으로 삼는 행위와 다름없다다!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「熱いモチベーション。狂気の炎。身を焦がすような好奇心──それらをひっくるめて『ロマン』とアニマは定義していル」"
translation = "「뜨거운 동기 부여. 광기의 불꽃. 몸을 태울 듯한 호기심── 그것들을 묶어서 『로망』이라고 아니마는 정의하고 있다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「シュティレからは残念ながら、焦がれるようなロマンの熱を感じないんダ」"
translation = "「슈틸레에게서는 아쉽게도 애타는 로망의 열기가 느껴지지 않는다다.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「『ドリルがロマンだ』というのはちょっとズレていル。アニマが聞きたいのはキミの夢想する悲願の内容ダ。それを熱く語りたまえ」"
translation = "「『드릴이 로망이다』라는 건 좀 핀트가 어긋났다다. 아니마가 듣고 싶은 건 네가 꿈꾸는 비원의 내용이다타. 그걸 뜨겁게 말해라다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「…………それは、その」"
translation = "「…………그건, 그게」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「これをパっと語れないのなら、アニマの弟子とはとても認められないナ」"
translation = "「이걸 툭 내뱉지 못한다면 아니마의 제자라고는 도저히 인정할 수 없다다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「私は……マスターの元で錬金術を学びたいんです……その思いは、誰にも負けないつもりです……」"
translation = "「저는…… 마스터 밑에서 연금술을 배우고 싶습니다…… 그 마음은 누구에게도 지지 않을 생각입니다……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒヒ、質問の答えになってないゾ。残念ながら０点ダ！」"
translation = "「후히히, 질문의 답이 안 됐다다. 유감스럽지만 0점이다타!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「まぁ近づくなとは言わないサ。錬金術に興味があるのは純粋に嬉しいからネ。目で見て盗む分には、今後も構わないヨ」"
translation = "「뭐 가까이 오지 말라고는 안 한다다. 연금술에 흥미가 있는 건 순수하게 기쁘니까다타. 눈으로 보고 훔치는 것 정도라면 앞으로도 상관없다다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「…………はい」"
translation = "「…………네.」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──おっと、そろそろ隣のクラスの女子に飲ませた薬の効果が出る時間ダ！」"
translation = "「──앗, 슬슬 옆 반 여학생에게 먹인 약의 효과가 나타날 시간이다타!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ではな会長、アニマはこれで失礼するゾ！」"
translation = "「그럼 안녕이다 회장, 아니마는 이만 실례하겠다타!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……行ってしまいましたね。すみません、余計なことを聞いたでしょうか」"
translation = "「……가버리셨네요. 죄송해요, 괜한 걸 물었을까요.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「いえ、アナお姉ちゃんの気遣い、とても嬉しかったです」"
translation = "「아니요, 아나 언니의 배려, 정말 기뻤습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「アニマ先輩は変わり者なところがあるので、何となく弟子入りを拒んでいる可能性もあったので、訊ねてみたのですが」"
translation = "「아니마 선배님은 괴짜인 구석이 있어서 괜히 제자 입문을 거부하고 계실 가능성도 있어서 여쭤본 거였는데.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「……落ち度は私にあります。マスターの問いにしっかりと答えを返すことができませんでした」"
translation = "「……잘못은 저에게 있습니다. 마스터의 물음에 제대로 답을 돌려드리지 못했습니다.」"

[[dialogue]]
speaker_original = "シュティレ"
speaker_translation = "슈틸레"
original = "「でも私は……錬金術でなければ、マスターの弟子でなければ、ならない……そうでなくちゃ絶対に、ダメなんです……」"
translation = "「하지만 저는…… 연금술이 아니면, 마스터의 제자가 아니면, 안 돼요…… 그렇지 않으면 절대로, 안 된단 말이에요……」"

[[dialogue]]
speaker = "unk"
original = "うつむくシュティレに聞こえないように、アナが近づいて耳打ちをしてきた。"
translation = "고개를 떨군 슈틸레에게 들리지 않도록 아나가 다가와 귓속말을 했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、確かにシュティレさんは、アニマ先輩の言う『ロマン』について、しっかりと回答することができませんでした」"
translation = "「회장님, 확실히 슈틸레 씨는 아니마 선배님이 말씀하시는 『로망』에 대해 제대로 답변하지 못했어요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「けれど彼女の胸中には、何か譲れないものがあるように思います」"
translation = "「하지만 그녀의 가슴 속에는 뭔가 양보할 수 없는 것이 있는 것 같아요.」"

[[dialogue]]
speaker = "unk"
original = "アナは、先輩として力になってあげたい？"
translation = "아나는 선배로서 힘이 되어주고 싶어?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……はい。私も、自分がされて嬉しかったことを、後輩にしてあげたいです」"
translation = "「……네. 저도 제가 받아서 기뻤던 것을 후배에게 해주고 싶어요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長に前会長、サーシャ先輩にマトイ先輩。私はたくさん、先輩方にお世話をしてもらいましたから」"
translation = "「회장님에 전 회장님, 사샤 선배님에 마토이 선배님. 저는 많은 선배님들께 보살핌을 받았으니까요.」"

[[dialogue]]
speaker = "unk"
original = "だったら、こういうのはどう？"
translation = "그렇다면 이런 건 어때?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……気分転換に、シュティレさんを遊びに誘ってみる、ですか？」"
translation = "「……기분 전환으로 슈틸레 씨를 놀러 가자고 권해본다, 인가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど。プライベートで遊ぶというのは、いいアイデアかもしれません。肩の力が抜ければ、もっと深い話が聞けるかもしれませんね」"
translation = "「과연. 사적으로 노는 것은 좋은 아이디어일지도 모르겠네요. 어깨에 힘이 빠지면 더 깊은 이야기를 들을 수 있을지도 모르고요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ありがとうございます。今度の週末にでも早速、シュティレさんを誘ってみることにします」"
translation = "「고맙습니다. 이번 주말에라도 당장 슈틸레 씨를 초대해 보기로 할게요.」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームに覚醒するためにここのところずっと悩み、努力をしているアナ。"
translation = "노바 폼으로 각성하기 위해 최근 계속 고민하고 노력하고 있는 아나."

[[dialogue]]
speaker = "unk"
original = "そんな彼女だからこそ、頑張ってもなかなか報われないシュティレを放っておけないのかもしれない。"
translation = "그런 그녀이기에 열심히 해도 좀처럼 보답받지 못하는 슈틸레를 그냥 둘 수 없는 걸지도 모른다."

