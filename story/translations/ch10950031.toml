[[dialogue]]
speaker = "unk"
original = "第１話,シズハとディーラック,P"
translation = "제1화, 시즈하와 디럭쿠, P"

[[dialogue]]
speaker = "unk"
original = "その日、俺は恋人であるシズハと、新たに覚醒した『ヴィクトリアフォーム』の訓練をする為、『仮想結界システム』を使っていた。"
translation = "그날, 나는 연인인 시즈하와 새로 각성한 『빅토리아 폼』 훈련을 하기 위해 『가상 결계 시스템』을 사용하고 있었다."

[[dialogue]]
speaker = "unk"
original = "訓練フィールドは『渋谷』の市街地。"
translation = "훈련 필드는 『시부야』의 시가지."

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「ディーちゃん、息を合わせて行くよ！」"
translation = "「디짱, 호흡을 맞춰서 가자!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「はいはい、シズハちゃんこそ、遅れないでよね！」"
translation = "「네네, 시즈하짱이야말로 늦지 말라고!」"

[[dialogue]]
speaker = "unk"
original = "２人は『聖杯の魔力』と『マイナスエネルギー』を融合させ、攻撃を放つ。"
translation = "두 사람은 『성배의 마력』과 『마이너스 에너지』를 융합시켜 공격을 내뿜는다."

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「――ッ！」"
translation = "「──윽!」"

[[dialogue]]
speaker = "unk"
original = "それにより、強力な仮想モンスターも一撃で倒してしまった。"
translation = "그로 인해 강력한 가상 몬스터도 일격에 쓰러뜨리고 말았다."

[[dialogue]]
speaker = "unk"
original = "俺がその強さを褒めると、シズハは嬉しそうに笑う。"
translation = "내가 그 강함을 칭찬하자 시즈하는 기쁜 듯이 웃는다."

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「えへへ♪\u3000これにはディーちゃんや、会長との絆の力が合わさってるからね！」"
translation = "「에헤헤♪ 여기에는 디짱이나, 회장님과의 유대의 힘이 합쳐져 있으니까!」"

[[dialogue]]
speaker = "unk"
original = "ヴィクトリアフォームは、シズハとディーラックの精神をリンクさせることで運用が可能になる。"
translation = "빅토리아 폼은 시즈하와 디럭쿠의 정신을 링크시킴으로써 운용이 가능해진다."

[[dialogue]]
speaker = "unk"
original = "さらに、俺の魔王の力『アルケインコード』によって起動させたものでもある為、一緒に戦っている時は、俺とシズハの間にも『絆の力』が繋がっている感覚があった。"
translation = "게다가 나의 마왕의 힘 『아케인 코드』에 의해 기동시킨 것이기도 해서, 함께 싸우고 있을 때는 나와 시즈하 사이에도 『유대의 힘』이 이어져 있는 감각이 있었다."

[[dialogue]]
speaker = "unk"
original = "なら、俺もディーラックと仲良くならないとな"
translation = "그럼 나도 디럭쿠와 친해져야겠네."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「いや、それ必要ある？」"
translation = "「아니, 그게 필요 있어?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「え～、私はいいと思うけどな～♪\u3000そうすればもっと絆の力が強くなりそうじゃない？」"
translation = "「에~, 나는 좋다고 생각하는데~♪ 그러면 유대의 힘이 더 강해질 것 같지 않아?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「そんなこと言われてもなぁ……」"
translation = "「그렇게 말해도 말이지……」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「ディーちゃんは会長のこと、嫌い？」"
translation = "「디짱은 회장님이 싫어?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「いや、別に。ただ、今さら改めて仲良くなろうって言われても、何をすればいいのかわからないでしょ」"
translation = "「아니, 딱히. 다만 새삼스럽게 이제 와서 친해지자고 해도 뭘 해야 할지 모르잖아.」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「それはやっぱり――『お尻』じゃない？」"
translation = "「그건 역시── 『엉덩이』 아닐까?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「はぁ！？」"
translation = "「하아!?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「お互いのお尻を触り合えば、距離が縮まると思うわ！」"
translation = "「서로의 엉덩이를 만지면 거리가 좁혀질 거라고 봐!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「シズハちゃんの、そのお尻に対する謎の信頼感は何なの！？」"
translation = "「시즈하짱의 그 엉덩이에 대한 정체불명의 신뢰감은 대체 뭐야!?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「というか最近、シズハちゃんだって会長のお尻を触ろうとしてないじゃん！？」"
translation = "「그보다 최근에 시즈하짱도 회장님 엉덩이 만지려고 안 하잖아!?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「そ、それは……！\u3000だって、恋人同士なんだから、お尻を触るのはもっと仲が深まってからじゃないと……<emoji=heart04>」"
translation = "「그, 그건……! 그치만 연인 사이니까 엉덩이를 만지는 건 좀 더 사이가 깊어진 다음에 해야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしそうに視線を逸らすシズハ。"
translation = "부끄러운 듯 시선을 피하는 시즈하."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「わけがわからないんだけど！？\u3000２人はもうキスまでいってる仲なんじゃないの？」"
translation = "「도무지 이해가 안 가는데!? 둘은 벌써 키스까지 간 사이 아니었어?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「なに言ってるの、ディーちゃん！\u3000お尻を触り合うほうが、キスよりエッチに決まってるじゃない！」"
translation = "「무슨 소리야 디짱! 엉덩이를 서로 만지는 게 키스보다 훨씬 야한 게 당연하잖아!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「それをシズハちゃんは、ボクと会長にやれって言ってるんだよね！？」"
translation = "「그걸 시즈하짱은 나랑 회장님보고 하라고 하는 거지!?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「え？\u3000挨拶でお尻を触り合うのは、また意味が違くない？」"
translation = "「어? 인사로 엉덩이를 만지는 건 또 의미가 다르지 않아?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「なんでそこでキョトン顔になるのか意味がわからないよ！？」"
translation = "「왜 거기서 뚱한 표정이 되는 건지 의미를 모르겠다고!?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「大丈夫！\u3000ディーちゃん、挨拶なら恥ずかしくないから、勇気を出して！」"
translation = "「괜찮아! 디짱, 인사라면 부끄럽지 않으니까 용기를 내!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「えっと……会長、シズハちゃんの主張、どう思う？」"
translation = "「저기…… 회장님, 시즈하짱의 주장, 어떻게 생각해?」"

[[dialogue]]
speaker = "unk"
original = "恋人でもわからないことはある"
translation = "연인이라도 모르는 것은 있다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「そこだけは気が合うね……」"
translation = "「그 점만은 마음이 맞네……」"

[[dialogue]]
speaker = "unk"
original = "俺はシズハに向き直り、両肩に手を置いて言う。"
translation = "나는 시즈하를 마주 보고 양어깨에 손을 올리며 말한다."

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「どうしたの、会長？」"
translation = "「왜 그래요, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "シズハ、よく聞いてくれ"
translation = "시즈하, 잘 들어줘."

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「え？\u3000――恋人として付き合っている以上、私以外のお尻には軽い気持ちで触りたくない？」"
translation = "「어? ──연인으로서 사귀고 있는 이상, 나 이외의 엉덩이는 가벼운 마음으로 만지고 싶지 않다구?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「会長……そっか、ごめん……」"
translation = "「회장님…… 그렇구나, 미안해……」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「私も――会長のお尻が１番好きよ<emoji=heart04>」"
translation = "「나도── 회장님 엉덩이가 제일 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ああ、俺もシズハのお尻が１番好きだ！"
translation = "아아, 나도 시즈하의 엉덩이가 제일 좋아!"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「会長……<emoji=heart04>\u3000えへへへぇ<emoji=heart04>」"
translation = "「회장님……<emoji=heart04> 에헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「えっ、なにこのバカップルの謎尻会話……」"
translation = "「엣, 뭐야 이 바보 커플의 정체불명 엉덩이 대화는……」"

[[dialogue]]
speaker = "unk"
original = "俺はそれからディーラックの方を向いて言う。"
translation = "나는 그러고 나서 디럭쿠 쪽을 향해 말한다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「なに？\u3000――お尻を触り合わない代わりに、会長もボクのことを『ディーちゃん』って呼びたいって？」"
translation = "「뭐야? ──엉덩이를 서로 만지지 않는 대신에 회장님도 나를 『디짱』이라고 부르고 싶다고?」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「待って、どういう流れ？\u3000というか、会長から『ちゃん付け』で呼ばれるの、キモくて嫌なんだけど……」"
translation = "「잠깐, 무슨 흐름이야? 그보다 회장님한테 『짱』 붙여서 불리는 거 기분 나빠서 싫은데……」"

[[dialogue]]
speaker = "unk"
original = "辛辣！！！"
translation = "신랄해!!!"

[[dialogue]]
speaker = "unk"
original = "それでも俺は諦めない。"
translation = "그래도 나는 포기하지 않는다."

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「はぁ？\u3000――なら、今度ゲームで遊ぼうって？」"
translation = "「하아? ──그럼 다음에 게임하고 놀자고?」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「あっ、それいい♪\u3000ディーちゃん、会長と一緒にやろうよ！」"
translation = "「앗, 그거 좋다♪ 디짱, 회장님이랑 같이 하자!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「いや、今どきオンライン対戦があるから、別に要らないんだけど……」"
translation = "「아니, 요즘 시대에 온라인 대전이 있는데 딱히 필요 없는데……」"

[[dialogue]]
speaker = "unk"
original = "そこをなんとか！"
translation = "거기서 어떻게든!"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「……あ～もう！\u3000わかったよ！」"
translation = "「……아~ 정말! 알았어!」"

[[dialogue]]
speaker_original = "ディーラック"
speaker_translation = "디럭쿠"
original = "「どうせやるまでしつこく言い続けるんでしょ？\u3000知ってるよ、会長もシズハちゃんと似て、諦めが悪いんだからサ！」"
translation = "「어차피 할 때까지 끈질기게 말할 거잖아? 알고 있어, 회장님도 시즈하짱이랑 닮아서 포기를 모르니까 말야!」"

[[dialogue]]
speaker_original = "シズハ（覚醒）"
speaker_translation = "시즈하(각성)"
original = "「やったね、会長♪\u3000じゃあ、私たち３人で遊べるやつにしよっ♪」"
translation = "「해냈다 회장님♪ 그럼 우리 셋이서 놀 수 있는 걸로 하자♪」"

[[dialogue]]
speaker = "unk"
original = "それから訓練を終えた後、俺はシズハの部屋へ遊びに行き、３人で賑やかにゲームをして過ごすのだった。"
translation = "그 후 훈련을 마친 뒤, 나는 시즈하의 방으로 놀러 가서 셋이서 시끌벅적하게 게임을 하며 시간을 보냈다."

