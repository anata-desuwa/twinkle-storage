[[dialogue]]
speaker = "unk"
original = "第４話,人生初デート,P"
translation = "제4화, 인생 첫 데이트, P"

[[dialogue]]
speaker = "unk"
original = "先日、シズハの『魔法の研究』の話を聞いて、俺は彼女のことをカッコいいと思った。"
translation = "며칠 전, 시즈하의 『마법 연구』 이야기를 듣고 나는 그녀가 멋지다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "それ以降、これまで『可愛い』だけだった彼女のことが、何だか気になるようになって来て、いつしか異性として意識するようになってしまっていた。"
translation = "그 이후로 지금까지 『귀엽다』고만 생각했던 그녀가 왠지 신경 쓰이기 시작해서, 어느덧 이성으로서 의식하게 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "そんな矢先――"
translation = "그러던 찰나──"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長、私とデートしてもらうわよ！」"
translation = "「회장, 나랑 데이트해 줘야겠어!」"

[[dialogue]]
speaker = "unk"
original = "彼女からいきなり誘われてしまった。"
translation = "그녀가 갑자기 권유해 왔다."

[[dialogue]]
speaker = "unk"
original = "ど、どうしたんだ突然……？"
translation = "어, 어떻게 된 거야 갑자기……?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「聞いたわよ！\u3000会長――」"
translation = "「들었다고! 회장──」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「サチちゃんとプリムラちゃん、それぞれとデートしたことがあるんでしょ！？」"
translation = "「사치 짱이랑 프리뮬러 짱, 각각 데이트한 적 있다며!?」"

[[dialogue]]
speaker = "unk"
original = "遊びに行ったことはあるけども……！"
translation = "놀러 간 적은 있지만……!"

[[dialogue]]
speaker = "unk"
original = "えぇっ！？\u3000いや確かに"
translation = "에엑!? 아니 확실히"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私だけ仲間外れなんてズルいわ！\u3000私だってデートがしてみたい！」"
translation = "「나만 따돌리는 건 치사해! 나도 데이트가 해보고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "ずいっと顔を近づけて言われて、俺は思わずドキッとしてしまう。"
translation = "바짝 얼굴을 가까이 대고 말하는 바람에 나는 나도 모르게 가슴이 두근거리고 만다."

[[dialogue]]
speaker = "unk"
original = "俺でよければ、構わないけど……"
translation = "나라도 괜찮다면 상관없지만……"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「いいの？\u3000やったぁ♪\u3000それじゃあ――」"
translation = "「정말? 야호♪ 그러면──」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「今週の日曜日とか、予定は空いてるかしら？」"
translation = "「이번 주 일요일이라든가, 일정 비어 있어?」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで週末。"
translation = "그런 이유로 주말."

[[dialogue]]
speaker = "unk"
original = "俺はシズハと２人で、遊園地へとやって来た――"
translation = "나는 시즈하와 둘이서 유원지에 왔다──"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「わあぁ～～～っ♪\u3000これが遊園地なのね！！！」"
translation = "「와아아~~앗♪ 이것이 유원지구나!!!」"

[[dialogue]]
speaker = "unk"
original = "瞳をキラキラと輝かせて、はしゃぐシズハ。"
translation = "눈동자를 반짝반짝 빛내며 신나 하는 시즈하."

[[dialogue]]
speaker = "unk"
original = "もしかしなくても遊園地、初めて？"
translation = "혹시 유원지, 처음이야?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん、これが人生初よ！」"
translation = "「응, 이게 인생 처음이야!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「病院にいた時から、１度でいいから来てみたいってずっと思ってたの！」"
translation = "「병원에 있을 때부터 한 번이라도 좋으니까 와보고 싶다고 계속 생각했었어!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「おかげで昨日の夜からワクワクが止まらなくて、なかなか寝付けなくて大変だったんだから♪」"
translation = "「덕분에 어제 밤부터 설레서 잠이 안 와서 고생했다니까♪」"

[[dialogue]]
speaker = "unk"
original = "そっか。なら沢山、楽しんでもらわないとな"
translation = "그렇구나. 그럼 잔뜩 즐기게 해줘야겠네"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――え？\u3000会長がエスコートしてくれるの？」"
translation = "「──에? 회장이 에스코트해 주는 거야?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――学園に入学する前、遊園地でバイトしてたことがある？\u3000なにそれ、すごい気になるんだけど！」"
translation = "「──학원에 입학하기 전, 유원지에서 알바한 적이 있다고? 뭐야 그거, 엄청 신경 쓰이는데!」"

[[dialogue]]
speaker = "unk"
original = "その後、俺はフリーパスのチケットを２人分購入し、遊園地デートを開始した。"
translation = "그 후 나는 프리패스 티켓을 2인분 구입하고 유원지 데이트를 시작했다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あの、会長。デートに誘ったのは私なんだし、私の分のチケット代まで出してもらうのは悪いっていうか……」"
translation = "「저기, 회장. 데이트 신청한 건 나니까 내 티켓값까지 내게 하는 건 미안하다고나 할까……」"

[[dialogue]]
speaker = "unk"
original = "こういう時は男が出すもんなんだよ"
translation = "이럴 때는 남자가 내는 법이야"

[[dialogue]]
speaker = "unk"
original = "いいからいいから"
translation = "됐어 됐어"

[[dialogue]]
speaker = "unk"
original = "――と当たり前のように言ってみたものの、本当は好きな子の手前、男らしいところを見せたいだけだったりする。"
translation = "──라고 당연하다는 듯이 말해봤지만, 사실은 좋아하는 아이 앞에서 남자다운 모습을 보여주고 싶을 뿐이었다."

[[dialogue]]
speaker = "unk"
original = "せっかく好きな子と遊びに来ているのだ。『デートごっこ』ではなく、『本当のデート』だと思ってもらいたい気持ちが少なからずある。"
translation = "모처럼 좋아하는 아이와 놀러 온 것이다. 『데이트 놀이』가 아니라 『진짜 데이트』라고 생각해주길 바라는 마음이 적지 않게 있다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふ、ふんっ。今時は男女平等なんだから。男だからどうだとか、会長は古いわよっ」"
translation = "「흐, 흥. 요즘은 남녀평등이라고. 남자니까 어떻다느니, 회장은 구식이야」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、行こうか"
translation = "그럼 갈까"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え！？\u3000て、手を繋ぐの？」"
translation = "「에!? 소, 손을 잡는 거야?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――で、デートだから？\u3000それは、そうだけど……」"
translation = "「──데, 데이트니까? 그건 그렇지만……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、いや、別に嫌ってわけじゃないわよ！？\u3000ただ……男の人とこういう風に手を繋ぐのも生まれて初めてだから……それ故の緊張がね！？」"
translation = "「앗, 아니, 딱히 싫다는 건 아니라고!? 다만…… 남자랑 이렇게 손을 잡는 것도 태어나서 처음이라…… 그래서 긴장되는 것뿐이야!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ちょっと待って……１回深呼吸するから。――すぅ～……はぁ～……」"
translation = "「잠깐만…… 한 번 심호흡할게. ──후우~…… 하아~……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん……よしっ！\u3000――えいっ！」"
translation = "「응…… 좋아! ──에잇!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「～～～っ！」"
translation = "「~~~윽!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（か、会長の手、思ってたより大きい……！）"
translation = "（회, 회장 손, 생각보다 크다……!）"

[[dialogue]]
speaker = "unk"
original = "彼女と繋いだ手を、俺がそっと握ると――"
translation = "그녀와 맞잡은 손을 내가 살며시 쥐자──"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ひゃっ……！？」"
translation = "「히약……!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ば、バカバカ、会長！\u3000何も言わずにいきなり握られたら、ビックリするでしょ！？」"
translation = "「바, 바보바보, 회장! 아무 말도 없이 갑자기 꽉 쥐면 깜짝 놀라잖아!?」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000ご、ごめん"
translation = "에!? 미, 미안"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「も、もう……初めてなんだから、何かアクションする時はちゃんと言ってよね！」"
translation = "「정말…… 처음이니까, 뭔가 액션을 할 때는 제대로 말해달라고!」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつ、シズハは俺の手を握り返して来て、俺はドキドキしてしまう。"
translation = "그렇게 말하면서도 시즈하는 내 손을 마주 쥐어 왔고, 나는 가슴이 두근거렸다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（どうしよう……）"
translation = "（어떡하지……）"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（こんなこと、今まで１度もなかったのに……私――）"
translation = "（이런 적, 지금까지 한 번도 없었는데…… 나──）"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（なんか今日は、すっごくドキドキしてる……）"
translation = "（왠지 오늘은 엄청나게 두근거려……）"

[[dialogue]]
speaker = "unk"
original = "１時間後。俺たちは遊園地の中にあるオープンカフェで休んでいた。"
translation = "1시간 후. 우리는 유원지 안에 있는 오픈 카페에서 쉬고 있었다."

[[dialogue]]
speaker = "unk"
original = "シズハはジェットコースターにずっと憧れていたそうで、先程一緒に乗ったのだが――"
translation = "시즈하는 롤러코스터를 계속 동경해왔다고 해서 방금 같이 탔는데──"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふぅ……会長、せっかくのデートなのに、ごめんね……」"
translation = "「후우…… 회장, 모처럼의 데이트인데 미안해……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私、１回乗っただけでダウンしちゃって……」"
translation = "「나, 한 번 탄 것만으로 뻗어버려서……」"

[[dialogue]]
speaker = "unk"
original = "シズハは聖杯の力で病気こそ治ったものの、体力そのものが強化されているわけではなかった。"
translation = "시즈하는 성배의 힘으로 병은 나았지만 체력 자체가 강화된 것은 아니었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「毎日ランニングしたり、合気道部に入って基礎トレは続けてるんだけど……それでもまだまだ、体力作りの途中で……」"
translation = "「매일 러닝도 하고 합기도부에 들어가서 기초 훈련은 계속하고 있지만…… 그래도 아직 체력을 기르는 중이라……」"

[[dialogue]]
speaker = "unk"
original = "遊園地にはまた、何度でも来ればいい"
translation = "유원지에는 또 몇 번이고 오면 돼"

[[dialogue]]
speaker = "unk"
original = "気にしないで。"
translation = "신경 쓰지 마."

[[dialogue]]
speaker = "unk"
original = "――それよりも、大事なことはシズハが遊園地を楽しめているかどうかだ。"
translation = "──그보다 중요한 건 시즈하가 유원지를 즐기고 있느냐 하는 것이다."

[[dialogue]]
speaker = "unk"
original = "俺がそれを尋ねると……"
translation = "내가 그것을 묻자……"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それは……もちろん。楽しめてるわよ。さっきのジェットコースターもすごくテンション上がったし。遊園地で遊ぶのは夢だったから……」"
translation = "「그건…… 물론. 즐기고 있어. 아까 롤러코스터도 엄청 텐션 올라갔고. 유원지에서 노는 건 꿈이었으니까……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――え？\u3000遊園地の楽しみ方には、乗り物だけじゃなくて、別のものもある？」"
translation = "「──에? 유원지를 즐기는 방법에는 놀이기구 말고도 다른 게 있다고?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「って……そ、それは……？」"
translation = "「그게…… 그, 그건……?」"

[[dialogue]]
speaker = "unk"
original = "俺はさっき注文してきた飲み物を、テーブルの上に置いて──"
translation = "나는 아까 주문해 온 음료를 테이블 위에 올려두고──"

[[dialogue]]
speaker = "unk"
original = "いわゆる、カップルジュースだ！"
translation = "이른바 커플 주스다!"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「なっ……はああぁぁっ！？\u3000会長、ば、バッカじゃないのっ！？\u3000なんか今日の会長、ちょっと変かもって思ってたけど、やっぱりおかしいわよ！？\u3000どうしたの！？」"
translation = "「뭐…… 하아아아앗!? 회장, 바, 바보 아니야!? 왠지 오늘 회장, 좀 이상하다고 생각했지만 역시 이상해!? 어떻게 된 거야!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――デートで浮かれてるのかもって？\u3000そ、それにしたって、こんな……！」"
translation = "「──데이트라서 들뜬 걸지도 모른다고? 그, 그렇다고 해도 이런 건……!」"

[[dialogue]]
speaker = "unk"
original = "一緒に飲む？"
translation = "같이 마실래?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ば、バカバカ！\u3000無理に決まってるでしょ！？\u3000手を繋ぐのだって、今日が初めてだったんだから！」"
translation = "「바, 바보바보! 무리인 게 당연하잖아!? 손 잡는 것도 오늘이 처음이었는데!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「というか、からかってるでしょ！？\u3000会長のバカバカバカ～！」"
translation = "「그보다 놀리는 거지!? 회장 바보바보바보~!」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くしながら、じゃれるようにポコポコと叩いて来るシズハが可愛くて、俺は思わず吹き出してしまうのだった。"
translation = "얼굴을 붉히며 장난치듯 포코포코 때려오는 시즈하가 귀여워서 나는 나도 모르게 웃음이 터져버렸다."

[[dialogue]]
speaker = "unk"
original = "しばらく休憩して、再び何かのアトラクションにチャレンジしようと俺たちは席を立つ。"
translation = "잠시 휴식하고 다시 다른 어트랙션에 도전하려고 우리는 자리에서 일어난다."

[[dialogue]]
speaker = "unk"
original = "その際に、何気なくシズハの手を取ると――"
translation = "그때 무심코 시즈하의 손을 잡자──"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「じ～っ……会長って、思ってたより女慣れしてるわよね……」"
translation = "「지긋~…… 회장, 생각보다 여자 다루는 게 익숙하네……」"

[[dialogue]]
speaker = "unk"
original = "と言いつつも、しっかり手を繋いでくれるシズハ。"
translation = "라고 말하면서도 꽉 손을 잡아주는 시즈하."

[[dialogue]]
speaker = "unk"
original = "口が悪くなるって知れて嬉しい"
translation = "입이 험해진다는 걸 알게 돼서 기뻐"

[[dialogue]]
speaker = "unk"
original = "俺は、シズハは照れると"
translation = "나는 시즈하가 쑥스러워하면"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そ、それは……会長が変なことばっかりするからでしょ！？」"
translation = "「그, 그건…… 회장이 이상한 짓만 하니까 그렇잖아!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「大体、同じようなことを、サチちゃんやプリムラちゃんにも言ってるんじゃないの？」"
translation = "「대체로 비슷한 소리를 사치 짱이나 프리뮬러 짱한테도 하는 거 아니야?」"

[[dialogue]]
speaker = "unk"
original = "シズハだからだよ"
translation = "시즈하니까 그런 거야"

[[dialogue]]
speaker = "unk"
original = "『バカ』って言われて嬉しいのは"
translation = "『바보』라는 말을 들어서 기쁜 건"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「なっ……！？」"
translation = "「뭐……!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あ～～～っ、も～～～っ！\u3000会長のバカバカバカっ！」"
translation = "「아~~~ 정말~~~! 회장 바보바보바보!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長がそんな女ったらしだなんて、思わなかったわ！\u3000おかげで――」"
translation = "「회장이 그렇게 여자를 잘 꼬실 줄은 몰랐어! 덕분에──」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「初デートなのに、遊園地の感動よりも、会長の印象の方が強くなっちゃうじゃない！」"
translation = "「첫 데이트인데 유원지의 감동보다 회장의 인상이 더 강하게 남아버리잖아!」"

[[dialogue]]
speaker = "unk"
original = "ごめん、ちょっとやり過ぎたかな"
translation = "미안, 좀 과했나"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「……うん。ほんと、そうよ」"
translation = "「……응. 정말 그래」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「だから、ね……また、一緒に来てよ」"
translation = "「그러니까, 저기…… 다시 같이 와줘」"

[[dialogue]]
speaker = "unk"
original = "え……？"
translation = "에……?"

[[dialogue]]
speaker = "unk"
original = "俺が彼女の横顔を見ると、照れたようにちらっと目線だけこちらに向けながら――"
translation = "내가 그녀의 옆얼굴을 보자 쑥스러운 듯 힐끗 시선만 이쪽으로 향하며──"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「体力作りして、デートにも慣れて、遊園地を完璧に楽しめるようになったら、また挑戦したいから」"
translation = "「체력도 기르고 데이트에도 익숙해져서 유원지를 완벽하게 즐길 수 있게 되면 다시 도전하고 싶으니까」"

[[dialogue]]
speaker = "unk"
original = "ああ、喜んで協力するよ"
translation = "아아, 기꺼이 협력할게"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ん……♪」"
translation = "「응……♪」"

[[dialogue]]
speaker = "unk"
original = "彼女はこくんと頷く。"
translation = "그녀는 끄덕인다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「じゃあ、会長。気を取り直して――また一緒に、絶叫マシンに乗りに行くわよ！」"
translation = "「그럼 회장. 기운 차리고── 다시 같이 절규 머신 타러 가자!」"

[[dialogue]]
speaker = "unk"
original = "心なしか上機嫌に、彼女は俺の手を引っ張って走り出す。"
translation = "기분이 좋아졌는지 그녀는 내 손을 잡아끌며 달리기 시작한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「行け行けゴーゴー♪」"
translation = "「가자 가자 고고♪」"

[[dialogue]]
speaker = "unk"
original = "俺はその手を握り返して、デートの続きへと繰り出すのだった――"
translation = "나는 그 손을 마주 쥐고 데이트의 다음 코스로 나아갔다──"

