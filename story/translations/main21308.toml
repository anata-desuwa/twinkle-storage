[[dialogue]]
speaker = "unk"
original = "第８話,神聖ヴァジュラ教団,B"
translation = "제8화, 신성 바주라 교단, B"

[[dialogue]]
speaker = "unk"
original = "時刻は深夜の２時──レティシア・オルティースは、静まり返った流星市国を歩いていた。"
translation = "시각은 심야 2시── 레티시아 오르티스는 고요해진 유성시국을 걷고 있었다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………私、何をしているのかしら？」"
translation = "「…………나, 뭘 하고 있는 걸까?」"

[[dialogue]]
speaker = "unk"
original = "１０年前にこの地で暮らしていたとは思えないほどに、その足取りには迷いが多い。"
translation = "10년 전 이 땅에서 살았다고는 믿기지 않을 정도로 그 발걸음에는 망설임이 가득하다."

[[dialogue]]
speaker = "unk"
original = "大通りを進んだと思えば、路地に顔を出し、また大通りに戻ってくる──それを繰り返していなければ、彼女の脱走は成功していたかもしれない。"
translation = "큰길로 나아가는가 싶더니 골목으로 고개를 내밀고 다시 큰길로 돌아온다── 그것을 반복하지 않았더라면 그녀의 탈주를 성공했을지도 모른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──レティシア！」"
translation = "「──레티시아!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……あら？」"
translation = "「……어머?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「こんばんは。もう……お散歩がしたいのなら、昼間のうちに言ってくれればよかったのに～」"
translation = "「안녕. 정말…… 산책이 하고 싶었다면 낮 동안에 말해줬으면 좋았을 텐데~」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……バレないように出てきたつもりだったのだけれど。どこでボロが出たのかしら？」"
translation = "「……들키지 않게 나왔다고 생각했는데. 어디서 허점이 드러난 걸까?」"

[[dialogue]]
speaker = "unk"
original = "俺たちが渡したＧＰＳ付きの端末は、就寝場所となっている会議室に置かれたまま。そして驚くべきことに現在、極星学園生の誰も、レティシアの不在に気づいていない。"
translation = "우리가 건네준 GPS 기능이 달린 단말기는 취침 장소인 회의실에 그대로 놓여 있었다. 그리고 놀랍게도 현재 극성학원생 중 누구도 레티시아의 부재를 눈치채지 못했다."

[[dialogue]]
speaker = "unk"
original = "本当に鮮やかな無断外出だったが──"
translation = "정말 깔끔한 무단외출이었지만──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……君たちの監視はＧＰＳだけじゃない。他にも手段は講じてあるんだ」"
translation = "「……너희의 감시는 GPS뿐만이 아니야. 다른 수단도 강구해 뒀거든.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「例えば──忍者の部下に見張りを頼むとかね」"
translation = "「예를 들면── 닌자 부하에게 감시를 부탁한다든가 말이야.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……忍者？\u3000ふふ、面白いのね。そんな子もいるの？」"
translation = "「……닌자? 후후, 재미있네. 그런 아이도 있어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「セレスティアの持ち出しも見事だったわ～。やっぱり優秀なのね、レティシアちゃん」"
translation = "「셀레스티아를 가지고 나온 것도 훌륭했어~. 역시 우수하구나, 레티시아짱.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「訓練中に準備と細工をしておいただけよ。あの小さな先生に、もう少し管理を工夫した方がいいと伝えてあげて？」"
translation = "「훈련 중에 준비와 공작을 해두었을 뿐이야. 그 작은 선생님에게 관리를 좀 더 궁리하는 게 좋겠다고 전해줄래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……レティシア。無断外出の理由を聞かせてくれ」"
translation = "「……레티시아. 무단외출의 이유를 들려줘.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「特にないわ。夜風にあたりたかっただけ」"
translation = "「특별히 없어. 밤바람을 쐬고 싶었을 뿐.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それならセレスティアを持ち出す理由がないだろ？\u3000納得のいく説明をしてくれないと、君を疑わざるを得なくなる……」"
translation = "「그렇다면 셀레스티아를 가지고 나온 이유가 없잖아? 납득할 만한 설명을 해주지 않으면 너를 의심할 수밖에 없게 돼……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「別に構わないわ。どうぞ疑って？」"
translation = "「별로 상관없어. 마음껏 의심해 봐.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それで私の待遇が悪くなるのなら、仕方のないことよ。拘束するなり、地下牢にいれるなりご自由に」"
translation = "「그걸로 내 대우가 나빠진다면 어쩔 수 없는 일이지. 구속하든 지하 감옥에 가두든 마음대로 해.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「う～ん、困ったわね～」"
translation = "「으음, 곤란하네~」"

[[dialogue]]
speaker = "unk"
original = "レティシアの返答は案の定だった。"
translation = "레티시아의 답변은 예상대로였다."

[[dialogue]]
speaker = "unk"
original = "……だったらこっちも、多少卑怯な手を使うしかない。"
translation = "……그렇다면 이쪽도 다소 비겁한 수를 쓸 수밖에 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……君がそんな態度を取るのなら、仕方がない。待遇を変えよう」"
translation = "「……네가 그런 태도를 보인다면 어쩔 수 없지. 대우를 바꾸겠어.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ええ。お好きにどうぞ？」"
translation = "「그래. 마음대로 해.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君だけじゃない。グレイスやチナの待遇も変える。明日からは彼女たちも外出禁止だ」"
translation = "「너뿐만이 아니야. 그레이스나 치나의 대우도 바꾸겠어. 내일부터는 그녀들도 외출 금지다.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "俺の発言にきょとんと目を見開くレティシア──やがて、くすくすと笑いだした。"
translation = "내 발언에 멍하니 눈을 크게 뜨는 레티시아── 이윽고 큭큭거리며 웃기 시작했다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「それは困るわね。私はどうでもいいけれど……あの子たちに可哀想なこと、しないでほしいわ」"
translation = "「그건 곤란하네. 나는 아무래도 좋지만…… 그 아이들에게 가여운 짓은 하지 말아줬으면 해.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「魔王。あなた、よく見てるのね。私が何をされたら困るのか、ちゃんとわかってる……仕方ないわね。理由を言えばいいんでしょう？」"
translation = "「마왕. 당신, 잘 보고 있구나. 내가 무엇을 당하면 곤란해할지 제대로 알고 있어…… 어쩔 수 없네. 이유를 말하면 되는 거지?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……メイドのナミエル。あの子、暗殺者でしょう？」"
translation = "「……메이드 나미엘. 그 아이, 암살자지?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私、あの子のいた組織に心当たりがあるわ。それで少し、昔のことを思い出してしまったの」"
translation = "「나, 그 아이가 있던 조직에 짐작 가는 바가 있어. 그래서 조금 옛날 일이 생각나 버렸어.」"

[[dialogue]]
speaker = "unk"
original = "俺とサーシャさんの顔色を見て、レティシアが続ける。"
translation = "나와 사샤 씨의 안색을 살피며 레티시아가 말을 잇는다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「──驚かないのね？\u3000ベアトから聞いたのかしら」"
translation = "「──놀라지 않네? 베아토에게 들은 걸까.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そうなの。私も、似たような組織で育ったのよ」"
translation = "「맞아. 나도 비슷한 조직에서 자랐어.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私、普段は何があってもすぐに眠れるの。でもどういうわけか、今夜はちっとも落ち着かない。昔のことばかりを思い出すわ」"
translation = "「나, 평소에는 무슨 일이 있어도 바로 잠들 수 있어. 하지만 왠지 모르게 오늘 밤은 도무지 진정이 안 돼. 옛날 일만 자꾸 생각나.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ふふ、グレイスみたいね？\u3000あの子がじっとしていられない気持ちが、少しだけわかったかもしれないわ」"
translation = "「후후, 그레이스 같네? 그 아이가 가만히 있지 못하는 기분을 조금은 알 것 같기도 해.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「落ち着かないから外出したの。１人になりたいのに、監視を連れて歩くのも嫌だったから、こっそり抜け出した……それだけよ」"
translation = "「진정이 안 돼서 외출했어. 혼자 있고 싶은데 감시를 데리고 다니는 것도 싫어서 몰래 빠져나왔어…… 그뿐이야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……それでも、セレスティアを持ち出す理由にはならないでしょう？\u3000アルタイルに翻意ありと思われちゃうわよ～？」"
translation = "「……그렇다 해도 셀레스티아를 가지고 나온 이유는 되지 않잖아? 알타이에 반의가 있다고 여겨질 수 있다구~?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ええ、それもそうね──逆に、聞いてもいいかしら？」"
translation = "「그래, 그것도 그렇네── 반대로 내가 물어봐도 될까?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私……どうしてセレスティアを持ち出したのかしら？」"
translation = "「나…… 왜 셀레스티아를 가지고 나온 걸까?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……どうして、って」"
translation = "「……왜라니.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「無断外出だけなら叱責ですんだかもしれないのに。どうしてこんな行動をとったのかしら……ねえ。なぜだと思う？」"
translation = "「무단외출뿐이었다면 질책으로 끝났을지도 모르는데. 왜 이런 행동을 한 걸까…… 저기. 왜라고 생각해?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……それは、君にしかわからないことだ」"
translation = "「……그건 너밖에 모르는 일이야.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そうね。でも本当にわからないの。あなたたちには理解しがたいかもしれないけれど……」"
translation = "「그렇지. 하지만 정말 모르겠어. 당신들은 이해하기 어려울지도 모르겠지만……」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私ね──『空っぽ』なの」"
translation = "「나 말이야── 『텅 비어』 있어.」"

[[dialogue]]
speaker = "unk"
original = "普通なら、こんな言い訳にもならない説明は信じなかっただろうが……レティシアに限っては、嘘を言っているようには思えなかった。"
translation = "보통이라면 이런 변명도 안 되는 설명을 믿지 않았겠지만…… 레티시아만큼은 거짓말을 하는 것처럼 보이지 않았다."

[[dialogue]]
speaker = "unk"
original = "彼女は本当に、自分がどうしてセレスティアを持ちだしたのか、わかっていないようだった。"
translation = "그녀는 정말로 자신이 왜 셀레스티아를 가지고 나왔는지 모르는 것 같았다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「自分で何かを決めるということができないの。だからいつも、ルヴィの命令だけを聞いて生きてきた」"
translation = "「스스로 무언가를 결정하는 일을 할 수 없어. 그래서 언제나 루비의 명령만 듣고 살아왔어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……ルヴィネちゃんが『こうしろ』と言ったことだけを、しているということ？」"
translation = "「……루비네짱이 『이렇게 해라』라고 말한 것만 하고 있다는 거야?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「ええ。ルヴィは私のこと、よくわかってる。私が指示を入力されないと動けない木偶だって、承知してくれているの」"
translation = "「응. 루비는 나를 잘 알아. 내가 지시를 입력받지 않으면 움직이지 못하는 꼭두각시라는 걸 알고 있어 줘.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「『デネブのために戦いなさい』。『最年長として、みんなのことを気にかけて、お世話をしなさい』──そんな風にいくつも命じてくれている」"
translation = "「『데네브를 위해 싸워라』. 『최연장자로서 모두를 신경 쓰고 돌봐줘라』── 그렇게 몇 가지나 명해주고 있어.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「私はルヴィがいない時も、それらの命令に従っている──だから、今の状況を説明できないの」"
translation = "「나는 루비가 없을 때도 그 명령들을 따르고 있어── 그래서 지금 상황을 설명할 수 없어.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「どうしてセレスティアを持ち出したのか……ルヴィはそんな命令をしていないのに、どうして私は……」"
translation = "「왜 셀레스티아를 가지고 나왔는지…… 루비는 그런 명령을 하지 않았는데 왜 나는……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……よかったら聞かせてくれないかしら、あなたの生い立ちを。そしてルヴィネちゃんと、どんな風に出会ったのかを」"
translation = "「……괜찮다면 들려주지 않을래? 네 성장 배경을. 그리고 루비네짱과 어떻게 만났는지.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「そんなこと、聞いてどうするの？」"
translation = "「그런 걸 들어서 어쩌려고?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あなたを理解したいから。そしてルヴィネちゃん──あなたたちのリーダーのことも」"
translation = "「너를 이해하고 싶으니까. 그리고 루비네짱── 너희 리더에 대해서도.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「命令がないと動けないのなら、私が命令してあげるわ」"
translation = "「명령이 없으면 움직이지 못한다면 내가 명령해 줄게.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「レティシアちゃん、あなたの過去を話しなさい」"
translation = "「레티시아짱, 네 과거를 이야기해.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「選択肢はないのよ？\u3000あなたが話さなければ、グレイスちゃんやチナちゃんがまた、外出禁止の軟禁生活になっちゃうんだから」"
translation = "「선택지는 없어? 네가 말하지 않으면 그레이스짱이나 치나짱이 다시 외출 금지인 연금 생활을 하게 될 테니까.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ルヴィネちゃんの命令で、仲間のお世話をしなければいけないあなたは、私たちに話をするしかない。違うかしら？」"
translation = "「루비네짱의 명령으로 동료를 돌봐야 하는 너는 우리에게 이야기를 할 수밖에 없어. 아니니?」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………それはその通りね」"
translation = "「…………그건 그렇네.」"

[[dialogue]]
speaker = "unk"
original = "レティシア・オルティースはデネブの流星市国で生まれ育った。"
translation = "레티시아 오르티스는 데네브의 유성시국에서 태어나 자랐다."

[[dialogue]]
speaker = "unk"
original = "しかしレティシアは市国の街並みを知らない。友人も学園も知らない。それどころか、太陽の光もまともに知らずに育った。"
translation = "하지만 레티시아는 시국의 거리 풍경을 모른다. 친구도 학원도 모른다. 그뿐만 아니라 태양 빛조차 제대로 모르고 자랐다."

[[dialogue]]
speaker = "unk"
original = "レティシアが生まれたのは病院ではなく、流星市国の地下──複雑怪奇な迷路となっている、地下水路の奥に隠れ潜む『神聖ヴァジュラ教団』のアジト。"
translation = "레티시아가 태어난 곳은 병원이 아니라 유성시국의 지하── 복잡괴기한 미로인 지하수로 깊숙이 숨어있는 『신성 바주라 교단』의 아지트."

[[dialogue]]
speaker = "unk"
original = "かつてチャカパラ神を信奉し、魔王ラクシスと対立していた『バジュラ教団』の生き残りによって再結成された、反社会組織の元で生を受けた。"
translation = "과거 차카파라 신을 신봉하며 마왕 락시스와 대립했던 『바주라 교단』의 생존자들에 의해 재결성된 반사회 조직 아래서 태어났다."

[[dialogue]]
speaker = "unk"
original = "神聖ヴァジュラ教団にとって、リクリエは招かれるべき救済の象徴であり、女神テルルは偽りの神でしかなく。"
translation = "신성 바주라 교단에게 리크리에는 초청받아야 할 구원의 상징이었으며 여신 테루루는 거짓된 신에 불과했다."

[[dialogue]]
speaker = "unk"
original = "そしてレティシアは、教団内において最高位の地位についていた──"
translation = "그리고 레티시아는 교단 내에서 최고위 지위에 올라 있었다──"

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「レティシア様。どうか我々をお救いください」"
translation = "「레티시아 님. 부디 저희를 구원해 주십시오.」"

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「レティシア様。どうか『真なる神』からの<ruby>託宣<rt>たくせん</rt></ruby>をお届けください」"
translation = "「레티시아 님. 부디 『진정한 신』의 탁설을 전해주십시오.」"

[[dialogue]]
speaker = "unk"
original = "レティシアは天使だったが、その羽は見るも鮮やかな黒一色だった。"
translation = "레티시아는 천사였지만 그 날개는 보기에도 선명한 칠흑색이었다."

[[dialogue]]
speaker = "unk"
original = "羽の色に黒味が混じると、不吉の象徴である──そんな根拠のない偏見が生きている地域は多い。"
translation = "날개 색에 검은 기운이 섞이면 불길함의 상징이다── 그런 근거 없는 편견이 살아있는 지역은 많다."

[[dialogue]]
speaker = "unk"
original = "事実は、魔族との混血の場合に黒くなるだけという、ただそれだけの理由であるのに──<ruby>妄執<rt>もうしゅう</rt></ruby>に囚われている者たちにとっては、その偏見すらも意味を持つ。"
translation = "사실은 마족과의 혼혈인 경우에 검게 변할 뿐이라는 단순한 이유임에도── 망집에 사로잡힌 자들에게는 그 편견조차 의미를 가졌다."

[[dialogue]]
speaker = "unk"
original = "レティシアは特別な少女である。普通とは違う。"
translation = "레티시아는 특별한 소녀다. 보통과는 다르다."

[[dialogue]]
speaker = "unk"
original = "だからこそ、自分たちには聴こえない『真なる神』のお声を拾えるはずだと、教団内で解釈されていた。"
translation = "그렇기에 자신들에게는 들리지 않는 『진정한 신』의 음성을 들을 수 있을 것이라고 교단 내에서 해석되었다."

[[dialogue]]
speaker = "unk"
original = "教団が掲げる象徴として、レティシアは優遇されて育った。衣食住には困らなかった。"
translation = "교단이 내세우는 상징으로서 레티시아는 우대받으며 자랐다. 의식주에는 곤란함이 없었다."

[[dialogue]]
speaker = "unk"
original = "──しかしそのほかは、何もなかった。"
translation = "──하지만 그 외에는 아무것도 없었다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「みんな……お、おはよう。あの……」"
translation = "「모두…… 아, 안녕. 저기……」"

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「レティシア様、おやめください。あなた様は選ばれた存在。話すべきお相手は、我らではありません」"
translation = "「레티시아 님, 그만두십시오. 당신은 선택받은 존재. 대화해야 할 상대는 저희가 아닙니다.」"

[[dialogue]]
speaker = "unk"
original = "物心ついた時から、レティシアは教団信者に話しかけることを禁止されていた。"
translation = "철이 들었을 때부터 레티시아는 교단 신자들에게 말을 거는 것이 금지되어 있었다."

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「レティシア様、あなたは特別なのです。さあ『真なる神』のお声に耳を澄ませるのです」"
translation = "「레티시아 님, 당신은 특별합니다. 자, 『진정한 신』의 음성에 귀를 기울이십시오.」"

[[dialogue]]
speaker = "unk"
original = "──誰もレティシアという個人を見ていない。"
translation = "──아무도 레티시아라는 개인을 보고 있지 않다."

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「私共と話しているうちに『真なる神』のお声を聴き逃してしまったらどうするのですか？\u3000さあ、今日も祈りをささげてくださいませ」"
translation = "「저희와 대화하는 사이에 『진정한 신』의 음성을 놓쳐버리면 어쩌실 겁니까? 자, 오늘도 기도를 올리십시오.」"

[[dialogue]]
speaker = "unk"
original = "レティシアに許されるのは、生命活動のための食事と睡眠、そしているかどうかもわからない『真なる神』に祈ることのみ。"
translation = "레티시아에게 허락된 것은 생명 활동을 위한 식사와 수면, 그리고 있는지도 모를 『진정한 신』에게 기도하는 것뿐."

[[dialogue]]
speaker = "unk"
original = "あなたが話すべき相手は『真なる神』以外にない。心を無にしなさい。己を捨ててまっさらになりなさい──そう言われ続けた。"
translation = "당신이 대화해야 할 상대는 『진정한 신』 이외에는 없다. 마음을 비워라. 자신을 버리고 백지가 되어라── 그런 말을 계속 들었다."

[[dialogue]]
speaker = "unk"
original = "自分を『レティシア様』と呼ぶこの人達の中に、両親もいるはずなのに、見分けがつかない。全員、同じ表情をして、同じ言葉を喋るからだ。"
translation = "자신을 『레티시아 님』이라 부르는 이 사람들 속에 부모님도 있을 텐데 구분이 가지 않는다. 모두 똑같은 표정을 짓고 똑같은 말을 하기 때문이다."

[[dialogue]]
speaker = "unk"
original = "教団信者たちは、リクリエを成就させるためにあらゆる悪事に手を染めていた。"
translation = "교단 신자들은 리크리에를 성취하기 위해 온갖 악행에 손을 대고 있었다."

[[dialogue]]
speaker = "unk"
original = "幼い子供を誘拐して暗殺術を教え込んだり、星騎士たちのセレスティアを盗み出す妨害工作を行ったり──"
translation = "어린아이를 유괴해 암살술을 가르치거나 성기사들의 셀레스티아를 훔치는 방해 공작을 벌이거나──"

[[dialogue]]
speaker = "unk"
original = "稀に、人目につかないよう地上に出ることを許された日もあった。しかしそこで許されたのも、天におわすはずの『真なる神』に祈ること。"
translation = "드물게 남의 눈에 띄지 않도록 지상으로 나가는 것이 허락된 날도 있었다. 하지만 거기서 허락된 것도 하늘에 계실 『진정한 신』에게 기도하는 것."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（……かみさま。いるのなら、おしえて）"
translation = "（……하느님. 계신다면 알려주세요.）"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（わたしは、なんのために、いきているの？）"
translation = "（나는 무엇을 위해 살고 있나요?）"

[[dialogue]]
speaker = "unk"
original = "レティシアの自我は日に日に削れ、すり減り、枯れていく──"
translation = "레티시아의 자아는 나날이 깎이고 마모되어 메말라 갔다──"

[[dialogue]]
speaker = "unk"
original = "そしてとうとう、ニュクス流星群がデネブに降り注いだ。"
translation = "그리고 마침내 닉스 유성우가 데네브에 쏟아졌다."

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒である『仮面の女』が暴れまわるたびに、教団信者たちは喝采をあげた。"
translation = "리크리에의 사도인 『가면의 여인』이 날뛸 때마다 교단 신자들은 환호성을 질렀다."

[[dialogue]]
speaker = "unk"
original = "緋宮クロトがいなくなり、流星市国が謎の見えない壁で覆われたその時に、興奮は最高潮に達した。"
translation = "히노미야 쿠로토가 사라지고 유성시국이 수수께끼의 보이지 않는 벽으로 덮였을 때 흥분은 최고조에 달했다."

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「いよいよ『真なる神』が降臨なされる！！」"
translation = "「드디어 『진정한 신』이 강림하신다!!」"

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「穢れきったこの世界の刷新を！\u3000我らの救済を！！」"
translation = "「더러워진 이 세계의 쇄신을! 우리의 구원을!!」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（……なにがうれしいの？\u3000いっぱいひとが、しんだのに）"
translation = "（……뭐가 기쁜 거야? 사람이 이렇게 많이 죽었는데.）"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（おかしいのは、このひとたち？\u3000それとも──わたし？）"
translation = "（이상한 건 이 사람들? 아니면── 나?）"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（だれでもいい。だれか、おしえて。ただしいことを、おしえて）"
translation = "（누구든 좋아. 누군가 알려줘. 옳은 것을 알려줘.） Crystal Clear."

[[dialogue]]
speaker = "unk"
original = "その時、レティシアはどうしてそんなことをしたのか。自分でも説明がつかない。"
translation = "그때 레티시아는 왜 그런 짓을 했는지 스스로도 설명하지 못한다."

[[dialogue]]
speaker = "unk"
original = "無意識に、吸い寄せられるようにして……教団信者が盗み出したセレスティアの１つを、手に取った。"
translation = "무의식적으로, 이끌리듯…… 교단 신자가 훔쳐 온 셀레스티아 중 하나를 손에 쥐었다."

[[dialogue]]
speaker = "unk"
original = "自覚もないままに守護星を得ていたレティシアは、星騎士として覚醒した。してしまった──狂信者たちの前で。"
translation = "자각도 없는 채 수호성을 얻었던 레티시아는 성기사로서 각성했다. 하고 말았다── 광신도들 앞에서."

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「星力……バカな！？\u3000それは、悪神テルル由来の力！！」"
translation = "「성력…… 말도 안 돼!? 그것은 악신 테루루 유래의 힘!!」"

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「偽物だ、こいつは偽物だ！！\u3000テルルの手先だ！！」"
translation = "「가짜다, 이 녀석은 가짜다!! 테루루의 앞잡이다!!」"

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「捕まえろ！！\u3000今すぐに──亡き者にしなくては！！\u3000『真なる神』への許しを乞わねば！！！」"
translation = "「잡아라!! 당장── 없애버려야 한다!! 『진정한 신』에게 용서를 빌어야 해!!!」"

[[dialogue]]
speaker = "unk"
original = "レティシアは抵抗しなかった。目を血走らせる教団信者に殴られ、蹴られ、生贄に捧げるべく祭壇に拘束される間も、何も抵抗しなかった。"
translation = "레티시아는 저항하지 않았다. 눈에 핏발을 세운 교단 신자에게 맞고 걷어차이며 제물로 바쳐지기 위해 제단에 구속되는 동안에도 아무런 저항을 하지 않았다."

[[dialogue]]
speaker = "unk"
original = "何のために生きているのかもわからない。死にたくないという生物としての本能すら抱けないほどに、レティシアは壊れてしまっていた。"
translation = "무엇을 위해 사는지도 모른다. 죽고 싶지 않다는 생물로서의 본능조차 품지 못할 정도로 레티시아는 망가져 있었다."

[[dialogue]]
speaker = "unk"
original = "そうして教団信者が短刀を持ち、レティシアの喉元へと刃を突き付けた。"
translation = "그렇게 교단 신자가 단도를 들고 레티시아의 목덜미에 칼날을 들이밀었다."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（このナイフをもっているおとこのひとは、だれ？\u3000おとうさん？）"
translation = "（이 칼을 든 남자는 누구? 아빠?）"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（わたしのからだをおさえるこのおんなのひとは、だれ？\u3000おかあさん？）"
translation = "（내 몸을 억누르는 이 여자는 누구? 엄마?）"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "（わからない。みんな、おなじかお……）"
translation = "（모르겠어. 모두 똑같은 얼굴……）"

[[dialogue]]
speaker = "unk"
original = "数瞬後、上げられた悲鳴は、レティシアのものではなかった。"
translation = "잠시 후 터져 나온 비명은 레티시아의 것이 아니었다."

[[dialogue]]
speaker_original = "教団信者"
speaker_translation = "교단 신자"
original = "「──ぎゃぁぁあぁあああっ！？」"
translation = "「──끄아아아아악!?」"

[[dialogue]]
speaker = "unk"
original = "教団のアジトに大量のモンスターが押し寄せていた。リクリエの使徒がいなくなったあと、散発的に発生していたアステラから湧き出た怪物たち。"
translation = "교단 아지트에 대량의 몬스터가 들이닥치고 있었다. 리크리에의 사도가 사라진 뒤 산발적으로 발생하던 아스테라에서 솟아 나온 괴물들."

[[dialogue]]
speaker = "unk"
original = "皮肉なことに、彼らは信奉していた『真なる神』が生み出したモンスターによって、その生涯を終えた。"
translation = "아이러니하게도 그들은 신봉하던 『진정한 신』이 만들어낸 몬스터에 의해 생을 마감했다."

[[dialogue]]
speaker = "unk"
original = "次々に教団信者は引き裂かれ、とうとうレティシアの番──しかしそこへ白銀の天使の救出が間に合った。"
translation = "차례차례 교단 신자들이 찢겨 나갔고 드디어 레티시아의 차례── 그러나 그곳에 백은색 천사의 구출이 늦지 않게 도착했다."

[[dialogue]]
speaker_original = "天使の少女"
speaker_translation = "천사 소녀"
original = "「させない──！！」"
translation = "「안 돼──!!」"

[[dialogue]]
speaker = "unk"
original = "純白の衣装を纏う１人の天使によって、レティシアは九死に一生を得た。"
translation = "순백의 의상을 입은 한 명의 천사에 의해 레티시아는 구사일생으로 살아남았다."

[[dialogue]]
speaker_original = "天使の少女"
speaker_translation = "천사 소녀"
original = "「まさかこんな地下にまで……よかった。あなただけは助けられた」"
translation = "「설마 이런 지하까지…… 다행이다. 당신만은 구할 수 있었어.」"

[[dialogue]]
speaker_original = "天使の少女"
speaker_translation = "천사 소녀"
original = "「こんなところに長居はしたくないわね。行きましょう？」"
translation = "「이런 곳에 오래 머물고 싶지는 않네. 가자?」"

[[dialogue]]
speaker = "unk"
original = "天使の少女は、レティシアの手を引きながら──"
translation = "천사 소녀는 레티시아의 손을 끌며──"

[[dialogue]]
speaker_original = "天使の少女"
speaker_translation = "천사 소녀"
original = "「あなた、名前は……？」"
translation = "「당신, 이름은……?」"

[[dialogue]]
speaker = "unk"
original = "──どくん、と心が震えた。"
translation = "──두근, 하고 심장이 떨렸다."

[[dialogue]]
speaker = "unk"
original = "自分という『個』を見て、知ろうとしてくれた、生まれて初めての人だったから。"
translation = "자신이라는 『개인』을 보고 알려고 해준 태어나서 처음 만난 사람이었기에."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「私はルヴィネ。あなたの名前を、教えてくれる？」"
translation = "「나는 루비네. 당신의 이름을 알려줄래?」"

[[dialogue]]
speaker = "unk"
original = "自我を持つなと。まっさらになれと。話しかけるなと言われ続けていたレティシアにとって──その問いかけは、涙が出るほど嬉しかった、と思う。"
translation = "자아를 갖지 마라. 백지가 되어라. 말을 걸지 마라라는 소리만 들어왔던 레티시아에게── 그 질문은 눈물이 날 정도로 기뻤을 것이라 생각한다."

[[dialogue]]
speaker = "unk"
original = "……涙は一筋もこぼれなかったが。"
translation = "……눈물은 한 방울도 흐르지 않았지만."

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「……レティシア・オルティース」"
translation = "「……레티시아 오르티스.」"

[[dialogue]]
speaker = "unk"
original = "自分の声を久しぶりに聞いた。こんな声だったのかと、驚いた。"
translation = "자신의 목소리를 오랜만에 들었다. 이런 목소리였나 싶어 놀랐다."

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「レティシア──いい名前ね」"
translation = "「레티시아── 좋은 이름이네.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「これからあなたを、私の仲間に会わせてあげる。みんな歳が近いから、すぐに仲良くなれるわ」"
translation = "「이제부터 당신을 내 동료들에게 만나게 해줄게. 모두 나이가 비슷하니까 금방 친해질 수 있을 거야.」"

[[dialogue]]
speaker_original = "レティシア"
speaker_translation = "레티시아"
original = "「…………ぁ。…………ぅ」"
translation = "「…………아. …………으.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「──大丈夫よ。何かあったら、私が助けてあげる」"
translation = "「──괜찮아. 무슨 일이 있으면 내가 도와줄게.」"

[[dialogue]]
speaker_original = "ルヴィネ"
speaker_translation = "루비네"
original = "「安心して。私はあなたの味方よ」"
translation = "「안심해. 나는 당신 편이야.」"

[[dialogue]]
speaker = "unk"
original = "レティシアは、その時に確信した。"
translation = "레티시아는 그때 확신했다."

[[dialogue]]
speaker = "unk"
original = "ルヴィネの言うとおりにすれば何も怖くない。ほっとする。安心できる──"
translation = "루비네가 시키는 대로 하면 아무것도 무섭지 않다. 마음이 놓인다. 안심할 수 있다──"

[[dialogue]]
speaker = "unk"
original = "誰一人味方のいない世界で、レティシアはようやく<ruby>縋<rt>すが</rt></ruby>ってもいい相手を見つけたのだった。"
translation = "단 한 명의 아군도 없는 세계에서 레티시아는 드디어 매달려도 좋을 상대를 찾은 것이었다."

