[[dialogue]]
speaker = "unk"
original = "第２話,守護天使、味を知る,P"
translation = "제2화, 수호천사, 맛을 알다"

[[dialogue]]
speaker = "unk"
original = "ある日の放課後。義体を得たアルモが人間界を観光してみたいというので、俺とアニマ先輩は付き添って街へとやって来た。"
translation = "어느 날 방과 후. 의체를 얻은 알모가 인간계를 관광해 보고 싶다고 해서, 나와 아니마 선배는 동행하여 거리로 나왔다."

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ふむ、これが人の子が発展させた街並みか。見事なものだ」"
translation = "「흐음, 이것이 사람의 아이가 발전시킨 거리 풍경인가. 훌륭하군」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000百聞は一見に如かずとも言う。通常の天使を模した肉体で実際に感じる情報は、長い時を生きてきた守護天使であっても新鮮に感じるのではないカ、アルモたん？」"
translation = "「후히♪ 백문이 불여일견이라고도 하지. 통상적인 천사를 모방한 육체로 실제로 느끼는 정보는, 긴 세월을 살아온 수호천사라도 신선하게 느껴지지 않나, 알모탄?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「然り。改めて見事な義体だ、アニマ。肉体だけでなく、精神もまた通常の天使に近くなっているようだ。我は今、感動というものを味わっている」"
translation = "「그렇다. 새삼 훌륭한 의체구나, 아니마. 육체뿐만 아니라 정신 또한 통상적인 천사에 가까워진 모양이다. 나는 지금 감동이라는 것을 맛보고 있다」"

[[dialogue]]
speaker = "unk"
original = "なら、人間界の楽しいことをたくさん体験しないとね"
translation = "그럼 인간계의 즐거운 것들을 많이 체험해야겠네"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ああ、今日は我に人の文化について色々と教えて欲しい」"
translation = "「아아, 오늘은 내게 인간의 문화에 대해 이것저것 가르쳐 주길 바란다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「む？\u3000くんくん……何か良き匂いがするな……？」"
translation = "「음? 킁킁…… 뭔가 좋은 냄새가 나는군……?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「どうやら、あそこに出店している屋台からのようだナ。ケバブサンドを路上販売しているみたいダ♪」"
translation = "「아무래도 저기 노점을 연 포장마차에서 나는 모양이네. 케밥 샌드를 노상 판매하고 있는 것 같아♪」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ケバブサンド？\u3000何かの食べ物か？」"
translation = "「케밥 샌드? 무언가 먹을 것인가?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「調味料で味付けした肉を大きな串に刺し、あのように回転させながら火を通ス。肉を包丁で削り取り、生野菜と一緒にピタパンという生地に挟んで食べるものダ」"
translation = "「조미료로 양념한 고기를 커다란 꼬챙이에 끼워 저렇게 회전시키며 불을 통과시키지. 고기를 칼로 깎아내 생야채와 함께 피타 빵이라는 반죽에 끼워 먹는 거야♪」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「おお……何だかわからぬが、腹が鳴り出した。これは確か、空腹の合図であったか？」"
translation = "「오오…… 뭔지는 모르겠지만 배에서 소리가 나기 시작했다. 이것이 분명 공복의 신호였던가?」"

[[dialogue]]
speaker = "unk"
original = "ちなみに、アルモの義体は物を食べられるの？"
translation = "그나저나 알모의 의체는 음식을 먹을 수 있어?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ああ、もちろんダ。味覚も再現してあるし、食べた物は霊力に変換することが出来る」"
translation = "「아아, 물론이지. 미각도 재현해 뒀고, 먹은 것은 영력으로 변환할 수 있어」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「逆に食べなくとも、霊力を変換すれば空腹を満たすことが出来るが……それを言うのは野暮というものダロウ。せっかくだしアルモたん、ケバブを食べてみるカ？」"
translation = "「반대로 먹지 않아도 영력을 변환하면 공복을 채울 수 있지만…… 그걸 말하는 건 멋이 없겠지. 기왕이니 알모탄, 케밥을 먹어볼래?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「然り。人の子の食文化を理解する為にも、我はケバブとやらを所望する」"
translation = "「그렇다. 사람의 아이의 식문화를 이해하기 위해서라도, 나는 케밥이라는 것을 소망한다」"

[[dialogue]]
speaker_original = "屋台の店主"
speaker_translation = "노점 주인"
original = "「まいどあり！\u3000姉ちゃん美人だから、特別サービスで大盛りにしといたぜ！」"
translation = "「어서 오쇼! 누님이 미인이라 특별 서비스로 곱빼기로 줬다고!」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「うむ、店主よ、感謝する。実際に手に持つと、やはり良き匂いだ」"
translation = "「음, 주인장여, 감사한다. 실제로 손에 들고 보니 역시 좋은 냄새군」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「それではいざ、初めての食事を体験してみるとしよう。もぐもぐ……」"
translation = "「그럼 이제, 첫 식사를 체험해 보도록 하지. 우물우물……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ほほう、なるほど。これが味わうということか」"
translation = "「호오, 과연. 이것이 맛을 본다는 것인가」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ふっ……」"
translation = "「훗……」"

[[dialogue]]
speaker = "unk"
original = "アルモたぁぁぁ────んッ！！？"
translation = "알모타아아아────안!!?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「これは予想外の反応ダ。食事で感情が昂ぶった結果、溢れた霊力が爆発という形でそれを表現したというわけカ。フヒヒッ、これは興味深イ」"
translation = "「이건 예상외의 반응이네. 식사로 감정이 고조된 결과, 넘쳐흐른 영력이 폭발이라는 형태로 그것을 표현했다는 건가. 후히히, 이거 흥미로워」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「──我は美味という言葉の意味自体は知っていた。だが、それが一体どういうことなのか、わかっていなかった」"
translation = "「──나는 미미(美味)라는 단어의 의미 자체는 알고 있었다. 하지만 그것이 도대체 어떤 것인지 알지 못했지」"

[[dialogue]]
speaker = "unk"
original = "何事もなかったかのように着地した！？"
translation = "아무 일도 없었다는 듯이 착지했어!?"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「……我は今ならば、はっきりと告げることが出来る。美味とはこの、思わず爆発して吹き飛んでしまうような感情のことだと」"
translation = "「……나는 지금이라면 확실히 말할 수 있다. 맛있는 맛이란 이, 나도 모르게 폭발해서 날아가 버릴 것 같은 감정을 말하는 것이라고」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もはや仔細は語るに及ばず。人の子がなぜ食文化を発展させてきたのか、我は心にて理解した」"
translation = "「이제 자세한 설명은 필요 없다. 사람의 아이가 왜 식문화를 발전시켜 왔는지, 나는 마음으로 이해했다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ケバブ、実に美味だ！」"
translation = "「케밥, 실로 맛있다!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「実はアバターの味覚は強化してあってネ。その性能はプロの料理人の舌に匹敵する」"
translation = "「사실 아바타의 미각은 강화해 뒀거든. 그 성능은 프로 요리사의 혀에 필적해」"

[[dialogue]]
speaker = "unk"
original = "どうして味覚の強化を？"
translation = "어째서 미각 강화를?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「フヒ♪\u3000そんなもの、趣味に決まっているダロウ？\u3000せっかく守護天使のアバターを作るのだから、性能は盛れるだけ盛るに限ル」"
translation = "「후히♪ 그런 거, 취미인 게 당연하잖아? 기왕 수호천사 아바타를 만드는 거니까 성능은 넣을 수 있는 만큼 넣는 법이지」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「ちなみに盛ったのは味覚だけではなく、その他の五感、あらゆる身体能力も同様ダ。いずれも通常の天使を上回り、いわゆる超人仕様にしてある。どうダ、凄かろう？」"
translation = "「참고로 넣은 건 미각뿐만 아니라 다른 오감, 모든 신체 능력도 마찬가지야. 어느 것이든 통상적인 천사를 상회하는, 이른바 초인 사양으로 해뒀지. 어때, 대단하지?」"

[[dialogue]]
speaker = "unk"
original = "先輩は頭のネジがぶっ飛んでるのでは！？"
translation = "선배는 머리 나사가 빠진 거 아니에요!?"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「アニマよ、もぐもぐ……お前の作り上げた義体のおかげで、もぐ……我は食の喜びを味わうことが出来た。もぐもぐ……感謝する」"
translation = "「아니마여, 우물우물…… 네가 만들어낸 의체 덕분에, 우물…… 나는 먹는 즐거움을 맛볼 수 있었다. 우물우물…… 감사한다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もぐもぐ……ごっくん。……店主よ、美味であった。もう１つ所望する」"
translation = "「우물우물…… 꿀꺽. ……주인장여, 맛있었다. 하나 더 소망한다」"

[[dialogue]]
speaker_original = "屋台の店主"
speaker_translation = "노점 주인"
original = "「へい、６６個目まいどあり！」"
translation = "「예이, 66개째 감사합니다!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「６６個目！？\u3000幾らなんでも食べ過ぎではないかネ！？\u3000アニマが義体の解説している合間に、店のケバブが粗方消え去っているゾ！？」"
translation = "「66개째!? 아무리 그래도 너무 많이 먹는 거 아냐!? 아니마가 의체 해설을 하는 사이에 가게 케밥이 거의 다 사라졌다고!?」"

[[dialogue]]
speaker_original = "屋台の店主"
speaker_translation = "노점 주인"
original = "「良い食いっぷりだ、姉ちゃん。割引しとくぜ（親指をグッと立てる）」"
translation = "「잘 먹는구먼, 누님. 할인해 줄게 (엄지를 척 올린다)」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ああ、店主よ。明日もまた食べに来るぞ（真似して親指を立てる）」"
translation = "「아아, 주인장여. 내일도 또 먹으러 오마 (흉내 내며 엄지를 올린다)」"

[[dialogue]]
speaker = "unk"
original = "明日も！？"
translation = "내일도!?"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「……フヒ、会長」"
translation = "「……후히, 회장님」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「──アニマはもしかすると、とんでもないものを作り出してしまったのかもしれなイ（遠い目）」"
translation = "「──아니마는 어쩌면 엄청난 것을 만들어버린 걸지도 모르겠네 (먼 산)」"

[[dialogue]]
speaker = "unk"
original = "胃袋も超人仕様にしたりするから……"
translation = "위장도 초인 사양으로 만들거나 하니까……"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「うむ……ケバブ、すべて美味であった」"
translation = "「음…… 케밥, 모두 맛있었다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「２人とも。店主にこの街の、美味な肉料理の店を教えてもらった」"
translation = "「둘 다. 주인장에게 이 거리의 맛있는 고기 요리 가게를 추천받았다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「さあ、改めて観光に出発だ。お供せよ！」"
translation = "「자, 다시 관광 출발이다. 동행하라!」"

[[dialogue]]
speaker = "unk"
original = "目をキラキラと輝かせるアルモ。この日を境に、アルモは補給と称してケバブを常備するようになるのだった。"
translation = "눈을 반짝반짝 빛내는 알모. 이날을 경계로 알모는 보급이라 칭하며 케밥을 상비하게 되는 것이었다."

