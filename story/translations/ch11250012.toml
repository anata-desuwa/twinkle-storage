[[dialogue]]
speaker = "unk"
original = "第２話,目指せヒーロー,P"
translation = "제2화, 목표는 히어로, P"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おお……！\u3000まさかそんな展開が！」"
translation = "「오오……! 설마 그런 전개가!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ふふ、まだまだ序の口だ。これくらいで驚いてたら身が持たないぞ」"
translation = "「후후, 아직 시작일 뿐이야. 이 정도로 놀라면 몸이 못 버틴다고」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうなんですか……！？\u3000この先の話を見るのが待ち切れません……！」"
translation = "「그런가요……!? 다음 이야기를 보는 게 너무 기다려져요……!」"

[[dialogue]]
speaker = "unk"
original = "２人とも何を見てるんだ？"
translation = "둘 다 뭘 보고 있는 거야?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「デネブの流星ライダーシリーズです。こっちは十年進んでいるから、アルタイルとは違う流星ライダーがいるんですよ」"
translation = "「데네브의 유성 라이더 시리즈예요. 이쪽은 10년이 흘러서, 알타이르와는 다른 유성 라이더가 있거든요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「忍者モチーフだったり、機械文明と戦ったり、敵にクイズを出したり、それぞれ個性的な特徴を持っているんです」"
translation = "「닌자 모티프라든가, 기계 문명과 싸운다든가, 적에게 퀴즈를 낸다든가, 각각 개성적인 특징을 가지고 있어요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「デネブの世界は大きな破壊を経験したから、流星ライダーシリーズの復活には数年を要した。作品にも影響を与えただろうな」"
translation = "「데네브 세계는 큰 파괴를 겪었기 때문에, 유성 라이더 시리즈의 부활에는 몇 년이 걸렸지. 작품에도 영향을 주었을 거야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だからリクリエを無事退けたアルタイルでは、デネブとは違う流星ライダーが生まれるんじゃないか」"
translation = "「그러니 리크리에를 무사히 물리친 알타이르에서는 데네브와는 다른 유성 라이더가 태어나지 않을까」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「つまり異なる未来の流星ライダー……！\u3000そう考えると、私はとてつもなく貴重なものを目にしているのかもしれません……！」"
translation = "「즉 서로 다른 미래의 유성 라이더……! 그렇게 생각하니 저는 엄청나게 귀중한 것을 보고 있는 것일지도 모르겠어요……!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そうだ魔王、ちょっと頼んでいいか？\u3000アクションの練習に付き合ってくれるとありがたいんだが」"
translation = "「그렇지 마왕, 부탁 좀 해도 될까? 액션 연습 좀 같이 해주면 고맙겠는데」"

[[dialogue]]
speaker = "unk"
original = "アクションの練習？"
translation = "액션 연습?"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ。もし平和になったら、アクション女優になって、流星ライダーに出たいと思ってる」"
translation = "「그래. 만약 평화로워지면 액션 배우가 돼서 유성 라이더에 출연하고 싶거든」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「スーツを着てのアクションもいいが、変身もしたいからな。どっちもできる女優になりたいんだ」"
translation = "「슈트를 입고 하는 액션도 좋지만 변신도 하고 싶으니까. 둘 다 할 수 있는 배우가 되고 싶어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「素晴らしい夢ですっ！\u3000応援します姉さん！」"
translation = "「멋진 꿈이에요! 응원할게요 언니!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ありがとう、エリシア。流星ライダーになったあたしをいつか見せてやる！」"
translation = "「고마워, 엘리시아. 유성 라이더가 된 내 모습을 언젠가 보여주마!」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら喜んで！"
translation = "그런 거라면 기꺼이!"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「助かる。魔王ならきっとすぐに要領を掴めるはずだ」"
translation = "「도움이 되겠군. 마왕이라면 분명 금방 요령을 터득할 거야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「よし、せっかくだからこっちでいくか」"
translation = "「좋아, 기왕 하는 거 이쪽으로 갈까」"

[[dialogue]]
speaker = "unk"
original = "俺も変身して、アポロに向かい合う。"
translation = "나도 변신해서 아폴로와 마주 본다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしが右手でパンチを繰り出すから、魔王がそれを左手で捌く。さらに魔王が右パンチで反撃して、それをあたしが受ける」"
translation = "「내가 오른손으로 펀치를 날릴 테니까 마왕이 그걸 왼손으로 막아줘. 그리고 마왕이 오른손 펀치로 반격하면 그걸 내가 받는 거야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「もちろん本当に殴るわけじゃないぞ。やられたふりをするから、寸止めしてくれ。段取りを確認して……よし、本番だ」"
translation = "「물론 진짜 때리는 건 아니라고. 당하는 척할 테니까 직전 멈춤 해줘. 합을 확인하고…… 좋아, 본방이다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「──はっ！」"
translation = "「──하앗!」"

[[dialogue]]
speaker = "unk"
original = "左手で防いで……反撃！"
translation = "왼손으로 막고…… 반격!"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「……よし。いい感じだ」"
translation = "「……좋아. 느낌 좋군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おお……様になっています」"
translation = "「오오…… 그럴듯해요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あとはキックを入れたり、相手を投げたり、やられて吹っ飛んだりして、見栄えするアクションにしていくんだ」"
translation = "「나머지는 킥을 넣거나 상대를 던지거나, 당해서 날아가는 동작을 넣어서 보기 좋은 액션으로 만들어 가는 거야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「じゃあもっと激しくいくぞ。リズム良くパン、パン、パン、だ」"
translation = "「그럼 더 격하게 간다. 리듬감 있게 팍, 팍, 팍, 이다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そら！\u3000そら！\u3000そら！」"
translation = "「자! 자! 자!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「楽しくなってきたな。よし、思いっきり来い──！」"
translation = "「즐거워지기 시작했어. 좋아, 마음껏 들어와라──!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「わっととと……！？」"
translation = "「와앗, 어어……!?」"

[[dialogue]]
speaker = "unk"
original = "アクションの途中、お互いの体がもつれ合って倒れ込む。"
translation = "액션 도중, 서로의 몸이 뒤엉켜 쓰러진다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さん！？\u3000緋宮会長！？」"
translation = "「언니!? 히미야 회장님!?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「平気か、魔王？」"
translation = "「무사하냐, 마왕?」"

[[dialogue]]
speaker = "unk"
original = "気が付くと、アポロが俺の下敷きになっていた。"
translation = "정신을 차려 보니, 아폴로가 내 밑에 깔려 있었다."

[[dialogue]]
speaker = "unk"
original = "体が密着してしまって、アポロの柔らかさと温もりを強く感じる。"
translation = "몸이 밀착되는 바람에 아폴로의 부드러움과 온기가 강하게 느껴진다."

[[dialogue]]
speaker = "unk"
original = "アポロ、大丈夫！？"
translation = "아폴로, 괜찮아!?"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、あたしは全然大丈夫だ」"
translation = "「아아, 난 전혀 괜찮아」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「魔王に何もなくてよかったよ。アクションの相手してもらってるのに、怪我させるわけにはいかないからな」"
translation = "「마왕에게 아무 일 없어서 다행이야. 액션 상대를 해주고 있는데, 다치게 할 수는 없으니까 말이지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だがそろそろ離れてくれないか……？\u3000その……胸が当たってるから……」"
translation = "「하지만 슬슬 떨어져 주지 않겠어……? 그…… 가슴이 닿고 있으니까……」"

[[dialogue]]
speaker = "unk"
original = "ごめんっ！？"
translation = "미안해!? "

[[dialogue]]
speaker = "unk"
original = "アポロに言われて慌てて立ち上がる。"
translation = "아폴로의 말에 서둘러 일어난다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「まぁ……なんだ。アクションは体が接触するものだからな。気にするな」"
translation = "「뭐…… 그거다. 액션은 몸이 접촉하는 법이니까. 신경 쓰지 마라」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「さて、今日はこの辺にしておくか。初めて合わせたにしては上々だろ」"
translation = "「자, 오늘은 이쯤 해둘까. 처음 맞춰본 것치고는 훌륭하군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私も見ていて楽しかったです。まるで流星ライダーのワンシーンのようでした」"
translation = "「저도 보면서 즐거웠어요. 마치 유성 라이더의 한 장면 같았습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが姉さん。アクション女優になるなら、アクションだけじゃなくて、普通の演技もできないといけないのでは……？」"
translation = "「하지만 언니. 액션 배우가 되려면 액션뿐만 아니라 보통 연기도 할 줄 알아야 하는 거 아닐까요……?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「はっ──！？\u3000そういえばそうだった！？」"
translation = "「핫──!? 그러고 보니 그랬었지!?」"

[[dialogue]]
speaker = "unk"
original = "演技の方も俺を相手にしてみる？"
translation = "연기 쪽도 나를 상대로 해볼래?"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「魔王は新星学園の演劇部を手伝ったことがある……？\u3000役者経験もあるのか？」"
translation = "「마왕은 신성 학원의 연극부를 도와준 적이 있다면서……? 배우 경험도 있는 거냐?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そいつは心強い。よし、明日から頼んだぞ！」"
translation = "「그거 든든하구만. 좋아, 내일부터 부탁한다!」"

[[dialogue]]
speaker = "unk"
original = "演技の経験が、まさか平行世界で役に立つとは思わなかった。"
translation = "연기 경험이 설마 평행 세계에서 도움이 될 줄은 몰랐다."

[[dialogue]]
speaker = "unk"
original = "だけどさっき感じた大人の女性の柔らかさは、俺の知るアポロのイメージと全然違っていて、記憶に強く刻まれたのだった。"
translation = "하지만 방금 느꼈던 성인 여성의 부드러움은 내가 아는 아폴로의 이미지와 전혀 달라서 기억에 강하게 각인되었다."

