[[dialogue]]
speaker = "マトイ"
original = "「聞いたよ、姫咲さん！\u3000あのレミカさんとユニットを組むことになったって！」"
translation = "「들었어, 히메사키 양! 그 레미카 씨와 유닛을 결성하게 됐다며!」"

[[dialogue]]
speaker = "メルエル"
original = "「も、もう噂になってるの！？\u3000ついこの間、練習を始めたばかりなのに……！」"
translation = "「벌, 벌써 소문이 났어!? 이제 막 연습을 시작했을 뿐인데……!」"

[[dialogue]]
speaker = "マトイ"
original = "「ふふ、衣装もすっごく可愛いって聞いてるよ。ライブ本番は星徒会全員で盛り上げに行くね！」"
translation = "「후후, 의상도 엄청 귀엽다고 들었어. 라이브 본 무대는 성도회 전원이 북돋워 주러 갈게!」"

[[dialogue]]
speaker = "メルエル"
original = "「う、ぅ～……！\u3000お友達みんなから同じようなこと言われて、ちょっぴりプレッシャー……！」"
translation = "「우, 우으……! 친구들 모두에게 비슷한 소리를 들어서 조금 프레셔가……!」"

[[dialogue]]
speaker = "マトイ"
original = "「そうなんだ？\u3000ヴィーナスからは『歌もダンスも完璧よ！\u3000てっぺんを取れるわね！』って聞いてるけど……」"
translation = "「그렇구나? 비너스한테서는 『노래도 댄스도 완벽해! 정상을 차지하겠어!』라고 들었는데……」"

[[dialogue]]
speaker = "メルエル"
original = "「ヴィーナスちゃんはちょっと大げさだから……まだまだ、ついていくので精一杯って感じかな……？」"
translation = "「비너스짱은 좀 과장이 심해서…… 아직은 따라가는 것만으로도 벅찬 느낌이려나……?」"

[[dialogue]]
speaker = "メルエル"
original = "「今も時間があれば、いろんなアイドルグループのライブやパフォーマンスを見て、お勉強してるくらいだし」"
translation = "「지금도 시간이 나면 여러 아이돌 그룹의 라이브나 퍼포먼스를 보면서 공부하고 있는 정도니까」"

[[dialogue]]
speaker = "マトイ"
original = "「あ、だからＤＩＳＣ見てたんだ。邪魔しちゃってごめんね？」"
translation = "「아, 그래서 DISC를 보고 있었구나. 방해해서 미안해?」"

[[dialogue]]
speaker = "メルエル"
original = "「ううん！\u3000応援してくれてありがとう！」"
translation = "「아니야! 응원해 줘서 고마워!」"

[[dialogue]]
speaker = "メルエル"
original = "「放課後までまだ時間あるし、少しでも多く参考にしないと……ぁ、この動画すごい。みんなやっぱり可愛いなあ……」"
translation = "「방과 후까지 아직 시간 남았고, 조금이라도 더 참고해야지…… 아, 이 영상 대단해. 다들 역시 귀엽구나……」"

[[dialogue]]
speaker = "メルエル"
original = "「コメントの数もすごいなー。ファンの言葉も参考にしよっかな……」"
translation = "「댓글 수도 엄청나네. 팬들의 말도 참고해 볼까……」"

[[dialogue]]
speaker = "メルエル"
original = "「えーっと……『とっても可愛い』『パフォーマンスが流石』……『でもセンターの子、恋愛禁止ってルールを破ったよね』……え？」"
translation = "「어디 보자…… 『정말 귀엽다』 『퍼포먼스가 역시 대단해』…… 『하지만 센터인 애, 연애 금지라는 규칙을 어겼지』…… 에?」"

[[dialogue]]
speaker = "メルエル"
original = "「『ファンだったのに裏切られた』……？\u3000あ、あれれ……？」"
translation = "「『팬이었는데 배신당했다』……? 어, 어라라……?」"

[[dialogue]]
speaker = "unk"
original = "──ユニット名を『アーネスト』と定めた日からしばらく時が経った。"
translation = "──유닛 이름을 『어니스트』라고 정한 날로부터 어느 정도 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "ポラリスプロダクションの名で借りる予定のライブ会場では、１時間のパフォーマンスが予定されている。"
translation = "폴라리스 프로덕션의 이름으로 빌릴 예정인 라이브 공연장에서는 1시간의 퍼포먼스가 예정되어 있다."

[[dialogue]]
speaker = "unk"
original = "何曲も連続して歌う必要があるため、練習は欠かせない……けれど心配はほとんどご無用といった感じだった。"
translation = "여러 곡을 연속으로 불러야 하기에 연습은 필수적이지만…… 걱정은 거의 필요 없다는 느낌이었다."

[[dialogue]]
speaker = "レミカ"
original = "「ふぅっ──最後まで通せたね。会長、どうだった？」"
translation = "「후우── 끝까지 다 했네. 회장, 어땠어?」"

[[dialogue]]
speaker = "unk"
original = "日に日によくなってる！"
translation = "날이 갈수록 좋아지고 있어!"

[[dialogue]]
speaker = "unk"
original = "バッチリ！"
translation = "완벽해!"

[[dialogue]]
speaker = "レミカ"
original = "「ふふ、ありがと。メルエルが頑張ってくれてるからね。先輩の私が足を引っ張るわけにはいかないし」"
translation = "「후후, 고마워. 메르엘이 노력해 주고 있으니까. 선배인 내가 발목을 잡을 수는 없지」"

[[dialogue]]
speaker = "メルエル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "レミカ"
original = "「メルエル？」"
translation = "「메르엘?」"

[[dialogue]]
speaker = "メルエル"
original = "「──えっ！？\u3000あ、うんっ……何も問題がないなら、よかったぁ」"
translation = "「──엣!? 아, 응…… 아무 문제 없다면 다행이다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいわね～、今日も完璧じゃない！\u3000ばっちりだわ！」"
translation = "「좋네~, 오늘도 완벽하잖아! 딱이야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、おかしいわね。アイドルアニメだとライブまでに何かしらの問題があるはずなのに～」"
translation = "「하지만 이상하네. 아이돌 애니메이션이라면 라이브 전까지 어떤 문제든 생겨야 할 텐데~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「チームが喧嘩して『もう私アイドルやめる！』みたいなアクシデントがあって。でもそれを乗り越えて絆がぐっと強くなったりして……！」"
translation = "「팀이 싸워서 『나 이제 아이돌 안 해!』 같은 사고가 있고. 하지만 그걸 극복해서 유대가 훅 강해지거나 해서……!」"

[[dialogue]]
speaker = "レミカ"
original = "「いや、トラブルがないならそれに越したことはないでしょ」"
translation = "「아니, 트러블이 없는 게 제일 좋잖아」"

[[dialogue]]
speaker = "アナ"
original = "「そのとおりです。先輩方、レッスンお疲れ様でした。データ解析を開始してもよろしいでしょうか？」"
translation = "「맞는 말씀입니다. 선배님들, 레슨 수고하셨습니다. 데이터 해석을 시작해도 될까요?」"

[[dialogue]]
speaker = "レミカ"
original = "「うん、ありがとう。ちょうど練習も終わったし、ぱぱっとやっちゃおうか」"
translation = "「응, 고마워. 마침 연습도 끝났으니 후딱 해버릴까」"

[[dialogue]]
speaker = "アナ"
original = "「イエス。メルエル先輩は……」"
translation = "「예스. 메르엘 선배는……」"

[[dialogue]]
speaker = "メルエル"
original = "「あっ……ご、ごめんね。まだアイドルフォーム、ただの衣装でしかないみたいで……」"
translation = "「앗…… 미, 미안해. 아직 아이돌 폼, 그냥 의상일 뿐인 것 같아서……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「むむっ……！\u3000きっとメルエルの心に、何かしこりがあるのね！\u3000トラブルの予感がするわ！」"
translation = "「무무……! 분명 메르엘의 마음에 무언가 응어리가 있는 거네! 트러블의 예감이 들어!」"

[[dialogue]]
speaker = "アナ"
original = "「いきなりアイドルをやれと言われて、戦闘服を即起動できる方が驚きます。レミカ先輩と違って、メルエル先輩は巻き込まれた立場」"
translation = "「느닷없이 아이돌을 하라는 말을 듣고 전투복을 즉시 기동할 수 있는 쪽이 더 놀랍습니다. 레미카 선배와 달리 메르엘 선배는 휘말린 입장이니까요」"

[[dialogue]]
speaker = "メルエル"
original = "「あはは、ごめんね。起動できるようになったらすぐ言うから」"
translation = "「아하하, 미안해. 기동할 수 있게 되면 바로 말할게」"

[[dialogue]]
speaker = "メルエル"
original = "「…………はぁ」"
translation = "「…………하아」"

[[dialogue]]
speaker = "unk"
original = "（なんだかメルエルの表情が暗い……？）"
translation = "(왠지 메르엘의 표정이 어둡다……?)"

[[dialogue]]
speaker = "レミカ"
original = "「それじゃ今日の練習はここまでだね」"
translation = "「그럼 오늘 연습은 여기까지네」"

[[dialogue]]
speaker = "メルエル"
original = "「う、うん。お疲れ様……ん、会長くん？\u3000どうしたの？」"
translation = "「으, 응. 수고했어…… 어, 회장군? 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "メルエル、一緒に帰ろうか？"
translation = "메르엘, 같이 돌아갈까?"

[[dialogue]]
speaker = "メルエル"
original = "「キミと一緒に帰るの、なんだか懐かしいよね。日曜ミサのあともこうして帰ったこと、あったっけ」"
translation = "「너랑 같이 돌아가는 거 왠지 오랜만이네. 일요일 미사 끝난 후에도 이렇게 돌아갔던 적이 있었지」"

[[dialogue]]
speaker = "unk"
original = "メルエル、何か悩んでることはない？"
translation = "메르엘, 뭔가 고민하고 있는 거 없어?"

[[dialogue]]
speaker = "メルエル"
original = "「えっ！？\u3000う、ううんっ……何にもないよっ？」"
translation = "「엣!? 으, 으응…… 아무것도 없어?」"

[[dialogue]]
speaker = "メルエル"
original = "「練習で疲れてるのかな、ちょっとぼーっとしちゃってただけで……」"
translation = "「연습 때문에 피곤한가 봐, 잠깐 멍하니 있었을 뿐이니까……」"

[[dialogue]]
speaker = "unk"
original = "俺はアーネストのプロデューサーだから"
translation = "나는 어니스트의 프로듀서니까"

[[dialogue]]
speaker = "unk"
original = "もしも何かあったら言ってくれよ"
translation = "혹시라도 무슨 일 있으면 말해줘"

[[dialogue]]
speaker = "メルエル"
original = "「う、うん！\u3000ありがとう……！\u3000あ、会長くんはあっちだよね。私はこっちだから……また明日ね！」"
translation = "「으, 응! 고마워……! 아, 회장군은 저쪽이지. 나는 이쪽이니까…… 내일 봐!」"

[[dialogue]]
speaker = "メルエル"
original = "「言えないよー……会長くんには……」"
translation = "「말할 수 없어…… 회장군한테는……」"

[[dialogue]]
speaker = "メルエル"
original = "「あの動画のコメント……」"
translation = "「그 영상 댓글……」"

[[dialogue]]
speaker = "unk"
original = "──彼氏がいてがっかり。恋人がいただなんて、裏切られた気分。"
translation = "──남자친구가 있어서 실망했다. 연인이 있었다니 배신당한 기분이다."

[[dialogue]]
speaker = "メルエル"
original = "「私、会長くんのこと、大好きで……ヴィーナスちゃんやレミカちゃんに褒められた笑顔は、会長くんのことを思い浮かべたからできてるお顔で……」"
translation = "「나, 회장군을 정말 좋아해서…… 비너스짱이나 레미카짱이 칭찬해 준 미소는 회장군을 떠올렸기에 지을 수 있었던 얼굴이라서……」"

[[dialogue]]
speaker = "メルエル"
original = "「ステージの上で、お客さんに見せていい笑顔なのかな……」"
translation = "「무대 위에서 관객들에게 보여줘도 되는 미소일까……」"

[[dialogue]]
speaker = "メルエル"
original = "「私……とっても不義理なこと、しちゃってるんじゃ……？」"
translation = "「나…… 너무 의리 없는 짓을 하고 있는 게 아닐까……?」"

