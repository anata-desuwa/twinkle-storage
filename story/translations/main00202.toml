[[dialogue]]
speaker = "unk"
original = "第３話,堕天使,B"
translation = "제3화, 타천사, B"

[[dialogue]]
speaker = "ニャリオン"
original = "「ふぅ……辛く険しい戦いだったニャン」"
translation = "「후우…… 힘들고 험난한 싸움이었다냥」"

[[dialogue]]
speaker = "ユウリ"
original = "「何にもしてねーだろっての」"
translation = "「아무것도 안 했잖아」"

[[dialogue]]
speaker = "ニャリオン"
original = "「多少はしているニャン！」"
translation = "「어느 정도는 했다냥!」"

[[dialogue]]
speaker = "ソフィア"
original = "「たまにはニャリオンさん単騎で戦ってみるというのはどうでしょう」"
translation = "「가끔은 냐리온 씨 단독으로 싸워 보는 건 어떨까요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「ソフィア、意外ときついこと言うニャンね……？」"
translation = "「소피아, 의외로 매몰찬 말 하는구냐옹……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ。それは勘弁してあげて、ソフィア」"
translation = "「후후. 그건 봐주렴, 소피아」"

[[dialogue]]
speaker = "unk"
original = "その後も、彼女らはモンスターを討伐しつつアステラの最深部へと進んだ。"
translation = "그 후로도, 그녀들은 몬스터를 토벌하면서 아스테라의 가장 깊은 곳으로 나아갔다."

[[dialogue]]
speaker = "ルリエル"
original = "「おおっとぉ！\u3000行き止まりです」"
translation = "「오오옷! 막다른 길인 것입니다」"

[[dialogue]]
speaker = "セーラ"
original = "「あっがり～♪\u3000とは、いかないよねえ」"
translation = "「도착이～♪ 라고는, 할 수 없겠지이」"

[[dialogue]]
speaker = "unk"
original = "５人が揃って臨戦態勢へ移行する。"
translation = "다섯 명이 나란히 임전 태세로 이행한다."

[[dialogue]]
speaker = "unk"
original = "彼女たちが見据えていたのは、アステラの果てに待っていたある存在だった。"
translation = "그녀들이 응시하고 있던 것은, 아스테라의 끝에서 기다리고 있던 어떤 존재였다."

[[dialogue]]
speaker = "マグダレナ"
original = "「あぁ……なぜ……世界は……滅びなくては……なら、ない……いっそ……この場で……ああ……」"
translation = "「아아…… 왜…… 세계는…… 멸망하지…… 않으, 면…… 안 되는…… 차라리…… 이 자리에서…… 아아……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ボスモンスターだな。よぉーし、あたしの炎でいっちょ……」"
translation = "「보스 몬스터로군. 좋아ー, 내 불꽃으로 한방……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……待って、ユウリ」"
translation = "「……기다려, 유우리」"

[[dialogue]]
speaker = "unk"
original = "汚染されたアステライトとはモンスターの巣窟である。"
translation = "오염된 아스테라이트란 몬스터의 소굴이다."

[[dialogue]]
speaker = "unk"
original = "よって最奥に待ち受けるのはその親玉というのが通例だった。"
translation = "따라서 가장 안쪽에 기다리는 것은 그 우두머리라는 것이 통례였다."

[[dialogue]]
speaker = "unk"
original = "しかし……とフィオナは立ち止まる。"
translation = "하지만…… 하고 피오나는 멈춰 선다."

[[dialogue]]
speaker = "マグダレナ"
original = "「世界に……裁きを……崩壊の……兆し……あぁ……」"
translation = "「세계에…… 심판을…… 붕괴의…… 징조…… 아아……」"

[[dialogue]]
speaker = "ニャリオン"
original = "「モンスター……じゃ、なさそうニャンね」"
translation = "「몬스터……는, 아닌 것 같다냥」"

[[dialogue]]
speaker = "セーラ"
original = "「ん～。頭の輪っか、ルリちーと同じっぽくない？\u3000汚れててよく見えないけど」"
translation = "「음～。 머리의 고리, 루리치랑 똑같지 않아? 더러워서 잘 안 보이지만」"

[[dialogue]]
speaker = "ルリエル"
original = "「輪っか……？\u3000ヘイローのことでしょうかっ」"
translation = "「고리……? 헤일로 말인 것입니까!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ヘイローが……？\u3000もしかして──」"
translation = "「헤일로가……? 혹시──」"

[[dialogue]]
speaker = "ソフィア"
original = "「天使さん……？」"
translation = "「천사……?」"

[[dialogue]]
speaker = "unk"
original = "三大種族のひとつとして数えられる天使。"
translation = "삼대 종족 중 하나로 손꼽히는 천사."

[[dialogue]]
speaker = "unk"
original = "だが、彼女たちの眼前にいる存在はその高貴さから遠くかけ離れていた。"
translation = "하지만, 그녀들의 눈앞에 있는 존재는 그 고귀함과는 멀리 동떨어져 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「……なるほど。だとすると彼女は──堕天使、でしょうか」"
translation = "「……과연. 그렇다면 그녀는── 타천사, 일까요」"

[[dialogue]]
speaker = "unk"
original = "フィオナの目測。"
translation = "피오나의 짐작."

[[dialogue]]
speaker = "unk"
original = "それは彼女の知る太古の逸話に裏打ちされたもので、事実その推察は当たっていた。"
translation = "그것은 그녀가 아는 태고의 일화에 의해 뒷받침된 것으로, 사실 그 추측은 맞았다."

[[dialogue]]
speaker = "マグダレナ"
original = "「ア……ア……なら……私の、使命は……破滅、を、もたら……し……」"
translation = "「아…… 아…… 그럼…… 나의, 사명은…… 파멸, 을, 가져…… 오고……」"

[[dialogue]]
speaker = "ルリエル"
original = "「堕天使さん！\u3000ではでは、同じく天使のこの不肖ルリエルめが……」"
translation = "「타천사 씨! 그러면 그러면, 똑같이 천사인 이 변변찮은 루리엘가……」"

[[dialogue]]
speaker = "unk"
original = "そう得心し、ルリエルが胸を張って近づこうとするも……"
translation = "그렇게 납득하고, 루리엘가 가슴을 펴고 다가가려 하지만……"

[[dialogue]]
speaker = "マグダレナ"
original = "「人──間──天、使……魔、族──壊す……助けて……壊す……助けて……壊す……」"
translation = "「인──간──천, 사…… 마, 족── 부순다…… 도와줘…… 부순다…… 도와줘…… 부순다……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひゃああっ！？\u3000お、お話が通じません！」"
translation = "「햐아앗!? 이, 이야기가 통하지 않습니다!」"

[[dialogue]]
speaker = "ユウリ"
original = "「壊すとか助けてとか、何を言ってんのかわかんねーな」"
translation = "「부순다느니 도와달라느니, 무슨 말을 하는 건지 모르겠네」"

[[dialogue]]
speaker = "フィオナ"
original = "「解放しましょう。きっと彼女もこのアステラと同じ──リクリエに穢された存在のはずです」"
translation = "「해방합시다. 분명 그녀도 이 아스테라와 마찬가지로── 리크리에에 더럽혀진 존재일 것입니다」"

[[dialogue]]
speaker = "セーラ"
original = "「りょうかーいっ♪」"
translation = "「알겠어ー♪」"

[[dialogue]]
speaker = "ニャリオン"
original = "「やるがよいニャ、者ども！」"
translation = "「해라냥, 이놈들아!」"

