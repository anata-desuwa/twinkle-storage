[[dialogue]]
speaker = "コハルコ"
original = "「そして最後は……コラプサー首領・百目騎レイラ」"
translation = "「그리고 마지막은…… 콜랩서 수령·도메키 레이라.」"

[[dialogue]]
speaker = "コハルコ"
original = "「今は没落した五名門・百目騎家の長女で、ブラックホールを操る最強のコラプサー」"
translation = "「지금은 몰락한 오명문·도메키 가문의 장녀로, 블랙홀을 조종하는 최강의 콜랩서.」"

[[dialogue]]
speaker = "コハルコ"
original = "「レイラは私の家のＰＣショップに現れ、私をコラプサーのアジトに連れ去った」"
translation = "「레이라는 우리 집 PC 샵에 나타나, 나를 콜랩서의 아지트로 데려갔어.」"

[[dialogue]]
speaker = "コハルコ"
original = "「その後は会長さんやマリオンさんと対峙し、戦闘に入った」"
translation = "「그 후에는 회장님이나 마리온 씨와 대치하며 전투에 들어갔지.」"

[[dialogue]]
speaker = "コハルコ"
original = "「パソコン作成やハッキングとか、私と趣味が同じだから、個人的には親近感を感じるけど」"
translation = "「PC 제작이나 해킹 같은 게 나랑 취미가 같아서, 개인적으로는 친근감을 느끼지만 말이야.」"

[[dialogue]]
speaker = "コハルコ"
original = "「レイラのデータも入れてみたから、シミュレーターを使ってみてね」"
translation = "「레이라의 데이터도 넣어봤으니까, 시뮬레이터를 사용해 봐.」"

