[[dialogue]]
speaker = "unk"
original = "シャドウリーリアとの戦場に選ばれたのは、学園生には既に見慣れた常夏の海――リゾート結界であった。"
translation = "섀도 리리아와의 전장으로 선택된 곳은 학원생들에게 이미 익숙한 한여름의 바다―― 리조트 결계였다."

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「これが仮想結界システム……ふふふ」"
translation = "「이것이 가상 결계 시스템…… 후후후」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「まさに人類が夢にまで見た、フルダイブ型ＶＲですわね♪\u3000お金の匂いがして参りましてよ！」"
translation = "「그야말로 인류가 꿈에서나 보던 풀 다이브형 VR이네요♪ 돈 냄새가 풍겨 오는데요!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000セナリィのことだから、戦いよりもそんなことだろうと思ったよ～」"
translation = "「니히히♪ 세나리니까 싸움보다는 그런 쪽일 줄 알았어~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも、戦う相手をリーリアちゃんのシャドウにしたのは、何か理由があるんでしょ？」"
translation = "「근데 싸울 상대를 리리아 짱의 섀도로 정한 건 무슨 이유라도 있는 거지?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ええ、マイン。挑戦するなら、せっかくですから同じ<b>銃使い</b>と１度戦ってみたいと思いましたの」"
translation = "「네, 마인. 도전한다면 기왕 하는 거 같은 <b>총잡이</b>와 한번 싸워보고 싶다고 생각했어요」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「――ふむ、なるほど。ここでの戦いはアリーナでも中継されるし、戦闘記録として映像に残るということだね」"
translation = "「――흠, 그렇군. 이곳에서의 전투는 아레나에서도 중계되고 전투 기록으로서 영상으로 남는다는 거지」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「そう！\u3000私が華麗な銃撃戦を見せれば、秘密結社ゴールデングースのいい宣伝にもなりますでしょう？」"
translation = "「맞아요! 제가 화려한 총격전을 보여주면 비밀결사 골든 구스의 좋은 홍보도 되지 않겠어요?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「そうすれば、仮想結界システムの視察も兼ねて、一石二鳥ですわ♪\u3000おほほほほほ！」"
translation = "「그렇게 되면 가상 결계 시스템의 시찰도 겸해서 일석이조예요♪ 오호호호호호!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「――って、あなたは日傘探偵のジュエリー・ブラウン様！？」"
translation = "「――잠깐, 당신은 양산 탐정인 주얼리 브라운 님!?」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「やあ、こんにちは。ゴシック傭兵、バンデット・セナリィさん」"
translation = "「안녕, 반가워. 고딕 용병, 밴디트 세나리 씨」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「キミのことは我が助手――新星学園の会長からよく聞いているよ」"
translation = "「당신에 대해서는 나의 조수―― 신성학원의 회장에게 자주 듣고 있어」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「よっ、セナっち、マイン！\u3000紅明ちゃんが元気な仲間たちを連れて、助太刀に来たぜ～☆」"
translation = "「여어, 세나치, 마인! 코우메이 짱이 활기찬 동료들을 데리고 도우러 왔다구~☆」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「やあやあ我こそは、現代の斉天大聖、クーシェン！\u3000人間界で有名な強い傭兵に出会えると聞いて、紅明ねーねーと一緒にボク参上～♪」"
translation = "「여어 여어, 나야말로 현대의 제천대성, 쿠셴! 인간계에서 유명한 강한 용병과 만날 수 있다고 들어서 코우메이 네네랑 같이 나 등장~♪」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「紅明様！？\u3000それに、最近魔界からスカウトされてきた、強いことで有名な附属生のクーシェン様！？」"
translation = "「코우메이 님!? 게다가 최근 마계에서 스카우트되어 온, 강하기로 유명한 부속생 쿠셴 님!?」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「あと、実はもう１人いてね」"
translation = "「그리고 사실 한 명 더 있어」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「もう１人……？\u3000――はっ！？\u3000背後に誰か……！？」"
translation = "「한 명 더……? ――핫!? 등 뒤에 누군가……!?」"

[[dialogue]]
speaker = "unk"
original = "ばっと振り向くセナリィ。そこにいたのは――"
translation = "확 뒤를 돌아보는 세나리. 그곳에 있었던 것은――"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「おっと、これは驚いた。まさか、気配を隠していたのに気づくなんてね」"
translation = "「오호, 이건 놀라운데. 설마 기척을 숨기고 있었는데 알아챌 줄이야」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「スナイパーライフルの狙撃を見ずに避ける天才傭兵って噂は、どうやら眉唾でもなさそうだね」"
translation = "「스나이퍼 라이플의 저격을 보지도 않고 피하는 천재 용병이란 소문은 아무래도 허풍이 아닌 모양이네」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「あなたは……確か、流星学園１年生のミネコ・フランボワーズ様……でしたかしら？」"
translation = "「당신은…… 분명 유성학원 1학년인 미네코 플랑보와즈 님…… 이었나요?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ご名答♪\u3000そしてまたの名を『大怪盗フランボウ』――知っているかな？」"
translation = "「정답♪ 그리고 또 다른 이름은 『대괴도 플랑보』―― 알고 있으려나?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「え？\u3000フランボウって、数年前から世界中で有名になった、ルパンに続くもう１人の大怪盗の……！？」"
translation = "「에? 플랑보라면 몇 년 전부터 전 세계적으로 유명해진, 루팡의 뒤를 잇는 또 한 명의 대괴도인……!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にわかには信じ難いけど……でも、確かに言動に違和感を感じない。嘘を言っている人間の声色じゃないね」"
translation = "「선뜻 믿기 힘들지만…… 하지만 확실히 언동에 위화감이 느껴지지 않아. 거짓말을 하는 인간의 목소리가 아니네」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ありがとう、<b>公安委員会</b>所属のネゴシエイターさん♪\u3000キミならそう言ってくれると思っていたよ」"
translation = "「고마워, <b>공안위원회</b> 소속 네고시에이터 씨♪ 너라면 그렇게 말해줄 줄 알았어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「……！\u3000そんな委員会、学園では聞いたことないけど……それ、どこ情報なのかな？」"
translation = "「……! 그런 위원회, 학원에서는 들어본 적 없는데…… 그거 어디 정보야?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「私は怪盗だからね。情報であろうとも、盗むのはお手のものだよ」"
translation = "「난 괴도니까 말이야. 정보일지라도 훔치는 건 식은 죽 먹기야」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「マジか！？\u3000ミネコちん、あの大怪盗だったん！？」"
translation = "「진짜냐!? 미네코 친, 그 대괴도였던 거임!?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「知らなかったんですの！？」"
translation = "「모르고 계셨나요!?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「というか、大怪盗なのが本当なら、バラすのマズくね？\u3000大丈夫なん？」"
translation = "「그보다 대괴도인 게 진짜라면 밝히는 거 위험하지 않음? 괜찮은 거임?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「あはは、紅明、黙っててごめんね～♪\u3000でも、大丈夫大丈夫～♪」"
translation = "「아하하, 코우메이, 가만히 있어서 미안해~♪ 하지만 괜찮아 괜찮아~♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「この面子には名乗っておいた方が面白そうかなって思ったんだよね。それに万が一の時は、なんとでもしちゃうし♪」"
translation = "「이 멤버에게는 자칭해 두는 게 재밌을 것 같다고 생각했거든. 그리고 만일의 경우에는 어떻게든 해버릴 거고♪」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「全く……ミネコ、キミという奴は……」"
translation = "「정말이지…… 미네코, 너라는 녀석은……」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「しかし、公安委員会か。私も助けて貰っているよ。<b>リコリンフィア</b>にもよく伝えておいてもらえるかな？\u3000ネーゼマインさん」"
translation = "「하지만 공안위원회인가. 나도 도움을 받고 있어. <b>리코린피아</b>에게도 잘 전해주겠니? 네제마인 씨」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「えっ、ちょい待って、ジュエリーちゃん。それ……まさか推理したの？」"
translation = "「에, 잠깐 기다려봐, 주얼리 짱. 그거…… 설마 추리한 거야?」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「それが趣味なのでね。そして今、線が繋がった。謎がまた１つ解けて嬉しいよ」"
translation = "「그게 취미라서 말이지. 그리고 지금 선이 이어졌어. 수수께끼가 또 하나 풀려서 기쁘네」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あ～、ヤバ……探偵と怪盗、マジもんじゃん……」"
translation = "「아~ 대박…… 탐정이랑 괴도, 진짜배기잖아……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも、その２人が実は知り合い同士とか、面白過ぎるんだけど！\u3000にひひひっ♪」"
translation = "「하지만 그 두 사람이 사실 아는 사이라니, 너무 재밌는데! 니히히히히♪」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「望んだわけじゃないのに、クラスメイトにまでなられてしまって、私も困っている……」"
translation = "「바란 건 아닌데 반 친구까지 되어버려서 나도 곤란해 하고 있어……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「キャハハハハハ！\u3000なにそれ♪」"
translation = "「캬하하하하하! 뭐야 그게♪」"

[[dialogue]]
speaker = "unk"
original = "思わず、大きく笑ってしまうネーゼマイン。"
translation = "나도 모르게 크게 웃어버리는 네제마인."

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「というか紅明様、あなた、ミネコ様の正体を知らないのに、一体どこで知り合ったんですの？」"
translation = "「그보다 코우메이 님, 당신은 미네코 님의 정체를 모르면서 대체 어디서 알게 된 건가요?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「え？\u3000どこでっていうか、いつものノリで新顔の子を見かけたから、とりあえず挨拶して友達になった感じ？」"
translation = "「에? 어디서라니, 평소처럼 새로 온 애를 봤길래 일단 인사하고 친구가 된 느낌?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「コミュ強ですわーー！？」"
translation = "「커뮤니케이션 능력자군요ーー!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「ねぇねぇ、セナリィ！\u3000それよりも早く、ボクとバトルしようよ～！」"
translation = "「저기 저기, 세나리! 그것보다 빨리 나랑 배틀하자~!」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ホワイ！？\u3000なぜ私がクーシェン様とバトルを！？」"
translation = "「와이!? 왜 제가 쿠셴 님과 배틀을!?」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「だってほら、この後シャドウとバトルするじゃない？\u3000その前に準備運動みたいな感じでさ♪」"
translation = "「그야 봐봐, 이다음에 섀도랑 배틀할 거 아냐? 그전에 준비운동 같은 느낌으로 말이야♪」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「こっちはこっちでとんでもねぇ戦闘狂ですわ！？」"
translation = "「이쪽은 이쪽대로 엄청난 전투광이군요!?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「絶対やりませんわよ！？\u3000私のエンプレスフォームは燃費がクッソ悪いんですの！」"
translation = "「절대 안 할 거예요!? 제 엠프레스 폼은 연비가 더럽게 나쁘단 말이에요!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「え～！\u3000本物の傭兵だっていうから、ウキウキして来たのに～！」"
translation = "「에~! 진짜 용병이라고 해서 두근두근하며 왔는데~!」"

[[dialogue]]
speaker = "unk"
original = "と、そこへ――"
translation = "그때 그곳에――"

[[dialogue]]
speaker_original = "シャドウリーリア"
speaker_translation = "섀도우 릴리아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ほら！\u3000クーシェン様、ちょうど相手が現れましてよ！\u3000バトルしたいなら、あちらにして下さいませ！」"
translation = "「보세요! 쿠셴 님, 마침 상대가 나타났잖아요! 배틀하고 싶다면 저쪽이랑 해주세요!」"

[[dialogue]]
speaker_original = "クーシェン"
speaker_translation = "쿠셰엔"
original = "「む～、仕方ないな～。そん代わり、セナリィも本気出してみせてよね！」"
translation = "「으~ 어쩔 수 없네~. 대신 세나리도 진심을 보여줘야 해!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「私も楽しみにしているよ。傭兵バンデット・セナリィ、そのお手並みを拝見ってね♪」"
translation = "「나도 기대하고 있을게. 용병 밴디트 세나리, 그 솜씨를 한번 구경해 볼까♪」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「変に注目されて、クッソやりづれぇですわ！？」"
translation = "「이상하게 주목받아서 더럽게 하기 힘들잖아요!?」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「よ～し、それじゃあ、みんなテンション上げて行こうぜ～！」"
translation = "「좋아~ 그럼 다들 텐션 높여 가자구~!」"

[[dialogue]]
speaker_original = "紅明（羅刹）"
speaker_translation = "코메이(나찰)"
original = "「愉快な仲間たちと共に元気衝天☆\u3000いざ、勝負！」"
translation = "「유쾌한 동료들과 함께 원기충천☆ 자, 승부다!」"

[[dialogue]]
speaker = "unk"
original = "そうして、セナリィたちとシャドウリーリアの戦いが始まるのだった――"
translation = "그렇게 세나리 일행과 섀도 리리아의 싸움이 시작되는 것이었다――"

