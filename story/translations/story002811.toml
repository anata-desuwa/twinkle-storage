[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リィベルさん、図書委員のお仕事にはもう慣れましたか？」"
translation = "「리벨 씨, 도서위원 업무에는 이제 익숙해졌나요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ええ。普通の本は魔本みたいに勝手に動いたりしないから気楽ね。貸出の受付もやり方は憶えたわ」"
translation = "「응. 보통 책은 마본처럼 마음대로 움직이거나 하지 않으니까 편하네. 대출 접수 방법도 다 익혔어」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「でも、利用者が来ない間は本を読んでいたいわ。用があれば、呼び鈴でも鳴らせばいいのに」"
translation = "「하지만 이용자가 오지 않는 동안에는 책을 읽고 싶어. 용건이 있으면 호출 벨이라도 누르면 될 텐데」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あはは……本の貸出は図書委員の大事なお仕事ですから、我慢しましょうね……」"
translation = "「아하하…… 책 대출은 도서위원의 중요한 업무니까 조금만 참자고요……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（深淵書庫の事件から一週間が経った）"
translation = " (심연서고 사건으로부터 일주일이 지났다) "

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（リィベルさんはひとりの魔族として新星学園に転入し、そして図書委員の一員になった）"
translation = " (리벨 씨는 한 명의 마족으로서 신성학원에 전입했고, 도서위원의 일원이 되었다) "

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（図書委員の仕事の傍ら、魔将の適合者を探しているみたい）"
translation = " (도서위원 업무 틈틈이 마장 적합자를 찾고 있는 모양이다) "

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「あの魔族、立ち振る舞いが強そうね。魔将にできないかしら」"
translation = "「저 마족, 몸가짐이 강해 보이네. 마장으로 만들 수 없을까」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「利用者をジロジロみるのは控えましょうね……」"
translation = "「이용자를 빤히 쳐다보는 건 삼가도록 해요……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ところで、あなたが持っているその紙は？」"
translation = "「그런데 네가 들고 있는 그 종이는 뭐야?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「これは私が書いた小説です。ウィステリアさんに読んでもらう約束をしてるんです」"
translation = "「이건 제가 쓴 소설이에요. 위스테리아 씨에게 읽어드리기로 약속했거든요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「ふぅん……私にも読ませなさい、ほら」"
translation = "「흐응…… 나한테도 읽어줘 봐, 어서」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「え、でも……その……面白いかは分かりませんが、それでもよければ……どうぞ」"
translation = "「에, 하지만…… 그게…… 재미있을지는 모르겠지만, 그래도 괜찮으시다면…… 여기요」"

[[dialogue]]
speaker = "unk"
original = "リィベルはひったくるように原稿を手にすると、機械のようなスピードで目を通していく。"
translation = "리벨은 낚아채듯 원고를 손에 넣더니 기계 같은 속도로 훑어 내려간다."

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「……………」"
translation = "「……………」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（は、反応がない！\u3000リィベルさんはもともと無表情だから分かりづらいとはいえ、やっぱり面白くなかったかな……？）"
translation = " (바, 반응이 없어! 리벨 씨는 원래 무표정이라 알기 어렵긴 하지만, 역시 재미없었나……?) "

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「…………ふぅ」"
translation = "「…………후우」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ど、どうでした……？」"
translation = "「어, 어땠나요……?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「面白かったわ。主人公が筋金入りの頑固者で、誰かさんみたい」"
translation = "「재미있었어. 주인공이 뼛속까지 고집불통인 게 누구 씨 같네」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「っ、ありがとうございます！\u3000実は、賞にも応募してみようかな～なんて思ってたり……」"
translation = "「앗, 감사합니다! 사실 공모전에도 응모해 볼까~ 하고 생각하기도……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ああいや、自分でもよく書けたなって思ってて、あいや、でも、自意識過剰過ぎですよね！？」"
translation = "「아, 아니, 스스로도 잘 썼다고 생각해서, 아, 아니, 하지만 자의식 과잉이겠죠!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「必要以上の謙遜はただの卑屈、卑屈も過ぎれば傲慢よ。あなたらしいといえばあなたらしいけど」"
translation = "「필요 이상의 겸손은 그저 비굴일 뿐이고, 비굴함이 지나치면 오만이야. 너답다면 너답지만」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「そうね。あなたの言葉を借りるなら……」"
translation = "「그러네. 네 말을 빌리자면……」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「この小説も読まれたがっているわ。迷ってる暇があるならさっさと応募しなさい」"
translation = "「이 소설도 읽히고 싶어 하고 있어. 망설일 틈이 있다면 어서 응모나 해」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「読まれたがっている……」"
translation = "「읽히고 싶어 하고 있다……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、それ、紙屋敷さんが前に言ってたやつね」"
translation = "「아, 그거 카미야시키 씨가 전에 했던 말이네」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ウィステリアさん、お帰りなさい」"
translation = "「위스테리아 씨, 다녀오셨어요」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「司書が図書館を離れてどこほっつき歩いてたの？\u3000さすが怠惰の魔将はサボリが得意なのね」"
translation = "「사서가 도서관을 비우고 어디를 싸돌아다닌 거야? 역시 나태의 마장은 땡땡이가 특기네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「サボリじゃないわよ！\u3000ＤＩＳＣを落としたから探してただけ！」"
translation = "「땡땡이 아니야! DISC를 떨어뜨려서 찾고 있었을 뿐이라고!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ＤＩＳＣは見つかったんですか？」"
translation = "「DISC는 찾으셨나요?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「コハルコさんに位置情報を探してもらってるんだけど、まだ見つかってないのよ～。これで３日連続だわ」"
translation = "「코하루코 씨에게 위치 추적을 부탁했는데 아직 못 찾았어~. 이걸로 3일 연속이야」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（ウィステリアさんの不運はいつも通り……ううん、いつもなら１日で済むから、もっと酷いかも？）"
translation = " (위스테리아 씨의 불운은 평소대로…… 아니, 평소라면 하루면 끝나는데 더 심해진 걸까?) "

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「よほど日頃の行いが悪いのね」"
translation = "「지독히도 평소 행실이 나쁜 모양이네」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私の運が悪いのは魔導書の呪いのせい！\u3000あなたもその一部なんだから他人事みたいに言わないでよね」"
translation = "「내 운이 나쁜 건 마도서의 저주 때문이야! 너도 그 일부니까 남 일처럼 말하지 말라고」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「紙屋敷さんの小説、あとで私も読ませてもらうわね。もう応募はしたの？」"
translation = "「카미야시키 씨 소설, 나중에 나도 읽어볼게. 벌써 응모는 했어?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「いえ、まだ……でも、必ず」"
translation = "「아니요, 아직…… 하지만 반드시 할게요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ＤＩＳＣからアラーム……緊急速報！？」"
translation = "「DISC에서 알람이…… 긴급 속보!?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「やかましいわね、何事？」"
translation = "「시끄럽네, 무슨 일이야?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「リィベルさん、ＤＩＳＣは持ってないんですか？」"
translation = "「리벨 씨는 DISC 안 가지고 계세요?」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「うるさいから部屋に置いてきたわ」"
translation = "「시끄러워서 방에 두고 왔어」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ＤＩＳＣはマナーモードもあるんですよ！？」"
translation = "「DISC는 매너 모드도 있다고요!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「紙屋敷さん、私ＤＩＳＣ持ってないから内容教えてくれる？」"
translation = "「카미야시키 씨, 나 DISC 없으니까 내용 좀 알려줄래?」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「はい。どれどれ……えっ！？\u3000流星市国に小型の隕石が落下して、マンションの一室が吹き飛んだって……」"
translation = "「네. 어디 보자…… 엣!? 유성시국에 소형 운석이 낙하해서 맨션 한 채가 날아갔대요……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、これ、現場の写真です。奇跡的に死傷者なし、とのことで……怪我した人がいなくてよかったです」"
translation = "「아, 여기 현장 사진이에요. 기적적으로 사상자는 없다고 해서…… 다친 사람이 없어서 다행이에요」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「あ、あああ、ああああ……」"
translation = "「아, 아아아, 아아아아……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ウィステリアさん、どうしたんですか！？」"
translation = "「위스테리아 씨, 왜 그러세요!?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ソノマンション、ワタシノ、ヘヤ…………」"
translation = "「그 맨션, 내, 방…………」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "（やっぱりウィステリアさんの不運、酷くなってる……）"
translation = " (역시 위스테리아 씨의 불운, 심해졌어……) "

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「不運だわ～～～～～～～～！！」"
translation = "「불운이야~~~~~~~~~~~~~~~~!!」"

