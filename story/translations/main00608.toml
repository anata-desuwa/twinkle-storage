[[dialogue]]
speaker = "unk"
original = "第１０話,世界樹,B"
translation = "제10화, 세계수, B"

[[dialogue]]
speaker = "セドナ"
original = "「まあいい。存外と気難し屋のようだ──アイリーン、お近づきの印に情報をくれてやれ」"
translation = "「뭐 됐다. 의외로 까다로운 모양이군── 아이린, 친해지자는 의미로 정보를 알려줘라」"

[[dialogue]]
speaker = "アイリーン"
original = "「はい」"
translation = "「네」"

[[dialogue]]
speaker = "unk"
original = "セドナ長官の命を受け、アイリーンさんが再び俺たちの前に出てくる。"
translation = "세드나 장관의 명령을 받아, 아이린 씨가 다시 우리들 앞으로 나온다."

[[dialogue]]
speaker = "アイリーン"
original = "「まず──我々は、魔女と呼ばれる一族です。ご存知でしょうか？」"
translation = "「먼저── 저희는, 마녀라고 불리는 일족입니다. 알고 계십니까?」"

[[dialogue]]
speaker = "マトイ"
original = "「魔女……」"
translation = "「마녀……」"

[[dialogue]]
speaker = "ソフィア"
original = "「……姉さん。あれでは？」"
translation = "「……언니. 저건가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうね。まさか本物がいるとは思わなかったわ」"
translation = "「그러네. 설마 진짜가 있을 줄은 몰랐어」"

[[dialogue]]
speaker = "クロト"
original = "「魔界で──という、ことですか？」"
translation = "「마계에서──라는, 말씀이십니까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。おとぎ話みたいな言い伝えだけど……そんな人たちがいるって聞いたことはあるわ」"
translation = "「네. 동화 같은 이야기지만…… 그런 사람들이 있다는 소문은 들은 적 있어요」"

[[dialogue]]
speaker = "ソフィア"
original = "「地元の都市伝説かと思っていました」"
translation = "「지역 도시 전설인 줄 알았습니다」"

[[dialogue]]
speaker = "ルリエル"
original = "「ほえー……？\u3000聞いたことありませんね！」"
translation = "「호에ー……? 들어본 적 없네요!」"

[[dialogue]]
speaker = "アナ"
original = "「古い文献に載ってるのなら見たことあります。確か、三界のどこでもない地に住んでいるとか」"
translation = "「오래된 문헌에 실려 있는 건 본 적 있습니다. 분명, 삼계의 어디에도 없는 땅에 살고 있다고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「三界のどこでもない、って──そんなとこ本当にあるの？」"
translation = "「삼계의 어디에도 없다니── 그런 곳이 정말 있어?」"

[[dialogue]]
speaker = "アイリーン"
original = "「ええ。無論、天界や人間界に比べるとせせこましい場所ですが」"
translation = "「네. 물론, 천계나 인간계에 비하면 좁은 장소입니다만」"

[[dialogue]]
speaker = "アイリーン"
original = "「私たちは通常──『魔女の森』と呼ばれる領域で暮らしています。そこには人間も魔族も、天使もおりません」"
translation = "「저희는 보통── 『마녀의 숲』이라고 불리는 영역에서 살고 있습니다. 그곳에는 인간도 마족도, 천사도 없습니다」"

[[dialogue]]
speaker = "クロト"
original = "「森なのに、三界と地続きではないんですか？」"
translation = "「숲인데, 삼계와 땅이 이어져 있지 않다는 말씀이십니까?」"

[[dialogue]]
speaker = "アイリーン"
original = "「はい。森一帯が亜空間に閉ざされている──と言えばわかりやすいでしょうか」"
translation = "「네. 숲 일대가 아공간에 갇혀 있다──고 하면 이해하기 쉬울까요」"

[[dialogue]]
speaker = "アイリーン"
original = "「魔女の森には世界樹と呼ばれる樹がそびえています。その麓が丸ごと、魔女の住まう世界なのです」"
translation = "「마녀의 숲에는 세계수라고 불리는 나무가 솟아 있습니다. 그 기슭 전체가, 마녀가 사는 세계인 것입니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「なのでここ、ネビュラ基地は──その人間界支部のようなイメージですね」"
translation = "「그래서 이곳, 네뷸라 기지는── 그 인간계 지부 같은 이미지네요」"

[[dialogue]]
speaker = "unk"
original = "魔女。"
translation = "마녀."

[[dialogue]]
speaker = "unk"
original = "人間、魔族、天使──そのどれでもない存在が目の前にいる。"
translation = "인간, 마족, 천사── 그 어느 쪽도 아닌 존재가 눈앞에 있다."

[[dialogue]]
speaker = "unk"
original = "あまりに突飛な話だというのに、不思議と受け入れている自分がいた。"
translation = "너무나도 터무니없는 이야기인데도, 이상하게 받아들이고 있는 자신이 있었다."

[[dialogue]]
speaker = "ルリエル"
original = "「はいはい、ご質問です！\u3000三界のどこでもない──と仰りましたが、皆さんも私たちのように『大交流』でやって来られたのですか？」"
translation = "「네네, 질문입니다! 삼계의 어디에도 없다고── 말씀하셨는데, 여러분도 저희처럼 『대교류』로 오신 건가요?」"

[[dialogue]]
speaker = "ソフィア"
original = "「確かに……あの転送には、各種族ごとの定員が決められていたはずですが」"
translation = "「확실히…… 그 전송에는, 각 종족별 정원이 정해져 있었을 텐데요」"

[[dialogue]]
speaker = "unk"
original = "四半期に一度、三界の間で行われる大規模な人物移動──大交流。"
translation = "분기마다 한 번, 삼계 사이에서 이루어지는 대규모 인물 이동── 대교류."

[[dialogue]]
speaker = "unk"
original = "天使や魔族の生徒たちはみな、それに選ばれて学園に来ていたはずだが……"
translation = "천사나 마족 학생들은 모두, 그것에 선택되어 학원에 왔을 터인데……"

[[dialogue]]
speaker = "アイリーン"
original = "「いいえ。『大交流』には選ばれておりません──あちらを利用すれば、公的な記録にも残ってしまいますしね」"
translation = "「아닙니다. 『대교류』에는 선택되지 않았습니다── 그쪽을 이용하면, 공식적인 기록에도 남아 버리니까요」"

[[dialogue]]
speaker = "クロト"
original = "「なら、あなた達はどうやって人間界に？」"
translation = "「그럼, 당신들은 어떻게 인간계에?」"

[[dialogue]]
speaker = "アイリーン"
original = "「難しい話ではありません。私たちの暮らす森は──三界から離れてはおりますが、架け橋も残っております」"
translation = "「어려운 이야기는 아닙니다. 저희가 사는 숲은── 삼계에서 떨어져 있긴 하지만, 연결 다리도 남아 있습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「あれを通って、やってきたのです」"
translation = "「저곳을 지나서, 온 것입니다」"

[[dialogue]]
speaker = "unk"
original = "アイリーンさんが基地の奥を指し示す。"
translation = "아이린 씨가 기지 안쪽을 손가락으로 가리킨다."

[[dialogue]]
speaker = "unk"
original = "俺たちが身を乗り出して覗いた先には──<b>巨大な樹の根</b>があった。"
translation = "우리가 몸을 내밀어 들여다본 곳에는── <ruby>거대한 나무뿌리<rt>・・・ ・・・・</rt></ruby>가 있었다."

[[dialogue]]
speaker = "マトイ"
original = "「樹……？」"
translation = "「나무……?」"

[[dialogue]]
speaker = "セーラ"
original = "「うける。こんなサイバーなカンジの基地なのに、似合わなすぎ」"
translation = "「웃기네. 이렇게 사이버틱한 느낌의 기지인데, 너무 안 어울려」"

[[dialogue]]
speaker = "unk"
original = "みんなセーラさんの感想に同感だった。"
translation = "모두 세라 씨의 감상에 동감했다."

[[dialogue]]
speaker = "unk"
original = "ガジェットのひしめく基地内の奥に、ぽつんと一本だけ──剥き出しの樹木が根を張っている。"
translation = "장비들이 밀집한 기지 안쪽에, 덩그러니 한 그루만── 껍질이 벗겨진 나무가 뿌리를 내리고 있다."

[[dialogue]]
speaker = "unk"
original = "うねるような樹皮にはぽっかりと大きな穴が空いており、数人は余裕で入り込めそうに見えた。"
translation = "구불거리는 나무껍질에는 커다란 구멍이 뻥 뚫려 있어, 몇 명은 거뜬히 들어갈 수 있을 것처럼 보였다."

[[dialogue]]
speaker = "unk"
original = "観葉植物……というレベルの大きさでないのは確かだ。"
translation = "관엽 식물……이라는 수준의 크기가 아닌 것은 확실하다."

[[dialogue]]
speaker = "クロト"
original = "「……なるほど。推察するに──あれが<b>世界樹</b>。いえ、その一部……ということですか」"
translation = "「……과연. 추측하건대── 저것이 <b>세계수</b>. 아니, 그 일부……라는 말씀이십니까」"

[[dialogue]]
speaker = "アイリーン"
original = "「ふふ──お察しがよくて助かります。その通りです」"
translation = "「후후── 짐작이 빨라서 다행입니다. 말씀하신 대로입니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「世界樹とは文字通り──世界と世界を結ぶ樹。あの穴をくぐった先には、私どもの暮らす魔女の森があります」"
translation = "「세계수란 문자 그대로── 세계와 세계를 잇는 나무. 저 구멍을 통과한 앞에는, 저희가 사는 마녀의 숲이 있습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「つまりあれは──異世界同士を繋ぐ『世界樹のうろ』なのです」"
translation = "「즉 저것은── 이세계끼리를 잇는 『세계수의 빈 구멍』인 것입니다」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そんな仕組みがあるなんて……」"
translation = "「서, 설마 그런 구조가 있다니……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ほえぇ～。世界はやっぱり広いのですねえ！」"
translation = "「호에에~. 세계는 역시 넓은 것이네요!」"

[[dialogue]]
speaker = "アナ"
original = "（信じていますか？）"
translation = "（믿고 계십니까?）"

[[dialogue]]
speaker = "クロト"
original = "（嘘と決めつける理由はないかな。虚実織り交ぜられてる恐れはあるが）"
translation = "（거짓말이라고 단정 지을 이유는 없겠지. 허실이 뒤섞여 있을 우려는 있지만）"

[[dialogue]]
speaker = "unk"
original = "魔女──ただでさえ怪しげな存在だ。"
translation = "마녀── 그렇지 않아도 수상쩍은 존재다."

[[dialogue]]
speaker = "unk"
original = "油断はせず、けれど貴重な情報と信じて聞くようにしたい。"
translation = "방심은 하지 않되, 귀중한 정보라 믿고 들으려고 한다."

[[dialogue]]
speaker = "アイリーン"
original = "「こほん。話が少々それてしまいましたね。ひとまずご理解いただきたかったのは──私たちが魔女という一族であること」"
translation = "「크흠. 이야기가 조금 빗나갔네요. 우선 이해해 주셨으면 했던 것은── 저희가 마녀라는 일족이라는 것」"

[[dialogue]]
speaker = "アイリーン"
original = "「そして、あなた方と同じく、リクリエに対抗しようとしているってことです。ご理解いただけましたか？」"
translation = "「그리고, 여러분과 마찬가지로, 리크리에에 대항하려 한다는 것입니다. 이해하셨습니까?」"

[[dialogue]]
speaker = "クロト"
original = "「はい。まだ朧げではありますが、ことの輪郭は把握しました」"
translation = "「네. 아직 희미하긴 하지만, 일의 윤곽은 파악했습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「私からも──詳細なご説明、感謝いたします。また、窮地を救ってくださった件についても」"
translation = "「저 또한── 상세한 설명, 감사드립니다. 또한, 궁지에서 구해 주신 일에 대해서도」"

[[dialogue]]
speaker = "アイリーン"
original = "「同志ですから。お礼には及びません」"
translation = "「동지이니까요. 감사는 필요 없습니다」"

[[dialogue]]
speaker = "unk"
original = "笑顔でうなずくアイリーンさん。"
translation = "미소를 지으며 고개를 끄덕이는 아이린 씨."

[[dialogue]]
speaker = "unk"
original = "しかし、まだ説明の足りていない点がひとつある。"
translation = "하지만, 아직 설명이 부족한 점이 하나 있다."

[[dialogue]]
speaker = "クロト"
original = "「──皆さんは俺たちを助けてくれました」"
translation = "「──여러분은 우리를 도와주었습니다」"

[[dialogue]]
speaker = "クロト"
original = "「ですが、あの時……地上一帯はアポロの仕業によって星術の使用が封じられていた。これは学園からの連絡でも確かだったことです」"
translation = "「하지만, 그때…… 지상 일대는 아폴로의 짓으로 인해 성술 사용이 봉인되어 있었습니다. 이는 학원에서의 연락으로도 확실했던 일입니다」"

[[dialogue]]
speaker = "クロト"
original = "「にもかかわらずあなた方はアポロに対抗できるだけの術式を使用していた。あれは、一体どういう理屈でしょうか？」"
translation = "「그럼에도 불구하고 당신들은 아폴로에게 대항할 수 있을 만한 술식을 사용하고 있었습니다. 그것은, 대체 어떤 원리입니까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「それって……」"
translation = "「그거……」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くんと同じで、守護星が地球ってこと……？」"
translation = "「히노미야 군과 마찬가지로, 수호성이 지구라는 거……?」"

[[dialogue]]
speaker = "アイリーン"
original = "「ふふ──いえ。そういうわけではありません」"
translation = "「후후── 아닙니다. 그런 것은 아닙니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「私たちの用いる力は──そもそも星術ではないからです」"
translation = "「저희가 사용하는 힘은── 애초에 성술이 아니기 때문입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ほえ……！\u3000じゃ、じゃあなんなのですか……！？」"
translation = "「호에……! 그, 그럼 대체 무엇인 것입니까……!?」"

[[dialogue]]
speaker = "unk"
original = "もしやと勘ぐっていたが、アイリーンさんはあっさりとそう答えた。"
translation = "혹시나 하고 짐작하고 있었지만, 아이린 씨는 시원스럽게 그렇게 대답했다."

[[dialogue]]
speaker = "アイリーン"
original = "「魔女に伝えられし太古の<ruby>理<rt>ことわり</rt></ruby>──それを指して、魔法と呼びます」"
translation = "「마녀에게 전해 내려온 태고의 이치── 그것을 가리켜, 마법이라고 부릅니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「そして、その源は魔力。私たち魔女は──星騎士の皆さんとは全く異なる摂理で動いているのです」"
translation = "「그리고, 그 근원은 마력. 저희 마녀는── 성기사 여러분과는 완전히 다른 섭리로 움직이고 있는 것입니다」"

[[dialogue]]
speaker = "unk"
original = "アポロを焼き払った黒き炎を思い出す。"
translation = "아폴로를 불태웠던 검은 불꽃을 떠올린다."

[[dialogue]]
speaker = "unk"
original = "ひと目で異質と感じたあの攻撃は、まさしく異質なものだったという。"
translation = "한눈에 이질적이라고 느꼈던 그 공격은, 확실히 이질적인 것이었다고 한다."

[[dialogue]]
speaker = "マトイ"
original = "「星力以外にそんなパワーがあるんだ……」"
translation = "「성력 외에 그런 파워가 있다니……」"

[[dialogue]]
speaker = "セドナ"
original = "「ヒトは古くから超常的な力を見つけ、体系化してきた。世界の破滅に対抗するために」"
translation = "「인간은 예로부터 초상적인 힘을 찾아내 체계화해 왔다. 세계의 파멸에 대항하기 위해서」"

[[dialogue]]
speaker = "セドナ"
original = "「過去には霊力という代物も存在していた──ま、そちらは真実失われた遺物となってしまったがな」"
translation = "「과거에는 영력이라는 물건도 존재했었지── 뭐, 그쪽은 진실로 사라진 유물이 되어 버렸지만」"

[[dialogue]]
speaker = "アイリーン"
original = "「そんな感じです。ですが、私たちが皆さんを助けたいと思ったことに、変わりはありませんよ」"
translation = "「그런 느낌입니다. 하지만, 저희가 여러분을 돕고 싶다고 생각한 것에는, 변함이 없습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "（星術以外の力……魔力……霊力……ですか）"
translation = "（성술 이외의 힘…… 마력…… 영력……입니까）"

[[dialogue]]
speaker = "unk"
original = "アポロの『天蓋』によって、俺たち以外も全世界で星術が使えなくなったと連絡されていた。"
translation = "아폴로의 『천개』로 인해, 우리들 외에도 전 세계에서 성술을 사용할 수 없게 되었다고 연락받았다."

[[dialogue]]
speaker = "unk"
original = "しかし彼女たち『魔女』の操る力はまったく異なる因果で動いているという。"
translation = "하지만 그녀들 『마녀』가 다루는 힘은 완전히 다른 인과로 움직이고 있다고 한다."

[[dialogue]]
speaker = "アイリーン"
original = "「今回のリクリエは──歴代の中でも最大級の脅威と認識されています」"
translation = "「이번 리크리에는── 역대 중에서도 최대급의 위협으로 인식되고 있습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「私たちが『ネビュラ』という組織を発足したのも、事態の大きさを鑑みてのことですから」"
translation = "「저희가 『네뷸라』라는 조직을 발족한 것도, 사태의 심각성을 고려했기 때문입니다」"

[[dialogue]]
speaker = "クロト"
original = "「……待ってください。歴代の？」"
translation = "「……잠깐만요. 역대의?」"

[[dialogue]]
speaker = "アイリーン"
original = "「はい」"
translation = "「네」"

[[dialogue]]
speaker = "unk"
original = "今、アイリーンさんはさり気なく重要なことを言った。"
translation = "지금, 아이린 씨는 아무렇지도 않게 중요한 것을 말했다."

[[dialogue]]
speaker = "クロト"
original = "「<b>前回</b>より前のリクリエを……知っているとでもいうんですか」"
translation = "「<b>이전</b>보다 앞선 리크리에를…… 알고 있다고 말씀하시는 겁니까」"

[[dialogue]]
speaker = "アイリーン"
original = "「ええ。魔女の一族は、先代、先々代と……これまで幾度にも渡ってリクリエを観測してきました」"
translation = "「예. 마녀 일족은, 선대, 선선대와…… 지금까지 몇 번이고 리크리에를 관측해 왔습니다」"

[[dialogue]]
speaker = "アイリーン"
original = "「先ほども言ったように、魔女の森は三界の外にあります。そのためかの災害を免れ、次代まで生き延びることができるわけです」"
translation = "「아까도 말씀드렸듯이, 마녀의 숲은 삼계 밖에 있습니다. 그렇기 때문에 그 재해를 면하고, 다음 세대까지 살아남을 수 있는 것입니다」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……なるほど」"
translation = "「……과연」"

[[dialogue]]
speaker = "ルリエル"
original = "（先々代……？\u3000あれ……？\u3000リクリエさんって、今回が２度目じゃなかったでしたっけ……？）"
translation = "（선선대……? 어라……? 리크리에 씨는, 이번이 두 번째가 아니었던가요……?）"

[[dialogue]]
speaker = "アナ"
original = "（どうやら私たちも知らない事情があるようです。会長たちは理解しているようなので、口をつぐみましょう）"
translation = "（아무래도 저희도 모르는 사정이 있는 것 같습니다. 회장님들은 이해하고 계신 듯하니, 입을 다물도록 하죠）"

[[dialogue]]
speaker = "unk"
original = "前回のみならず、これまでに連綿とリクリエは起こり続けている──"
translation = "이전뿐만 아니라, 지금까지 끊임없이 리크리에는 계속 일어나고 있다──"

[[dialogue]]
speaker = "unk"
original = "それは、俺たちがフィーニスの塔で学んだ歴史外の歴史だった。"
translation = "그것은, 우리가 피니스의 탑에서 배운 역사 밖의 역사였다."

[[dialogue]]
speaker = "unk"
original = "世界の初期化。文明の破滅。"
translation = "세계의 초기화. 문명의 파멸."

[[dialogue]]
speaker = "unk"
original = "あの石版に描かれていたリセットに、魔女の森は巻き込まれていなかったというのか。"
translation = "그 석판에 그려져 있던 리셋에, 마녀의 숲은 휘말리지 않았다는 것인가."

[[dialogue]]
speaker = "セドナ"
original = "「直近のリクリエは３０００年前。観測史上初めて、ヒトがその決行を阻止した。魔王と呼ばれる血族の者によってな」"
translation = "「가장 최근의 리크리에는 3000년 전. 관측 사상 처음으로, 인간이 그 실행을 저지했다. 마왕이라 불리는 혈족의 자에 의해서 말이지」"

[[dialogue]]
speaker = "ルリエル"
original = "「ま……魔王！」"
translation = "「마…… 마왕!」"

[[dialogue]]
speaker = "マトイ"
original = "「それって、もしかして……」"
translation = "「그거, 혹시……」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……ホントになんでも知ってるのね」"
translation = "「……정말로 뭐든지 다 아는구나」"

[[dialogue]]
speaker = "unk"
original = "俺たちでさえ、フィーニスの塔に登ってようやく得た事実をズバズバと告げられる。"
translation = "우리들조차, 피니스의 탑에 올라서야 겨우 얻은 사실을 거침없이 듣게 된다."

[[dialogue]]
speaker = "unk"
original = "マトイたちに話す手間が奇遇にも省けてしまった。"
translation = "마토이들에게 이야기할 수고를 뜻밖에도 덜게 되었다."

[[dialogue]]
speaker = "セドナ"
original = "「集積された智というものだよ。魔女の歴史は数万年──リクリエにまつわる記録はすべて森に残されている」"
translation = "「집적된 지혜라는 것이다. 마녀의 역사는 수만 년── 리크리에에 관한 기록은 모두 숲에 남아 있지」"

[[dialogue]]
speaker = "アナ"
original = "「興味深いですね」"
translation = "「흥미롭네요」"

[[dialogue]]
speaker = "unk"
original = "彼女たち魔女は、言ってしまえば滅亡を逃れ続けてきた一族だ。"
translation = "그녀들 마녀는, 말하자면 멸망을 계속 피해 온 일족이다."

[[dialogue]]
speaker = "unk"
original = "人間も、天使も、魔族も文明を初期化される中で……"
translation = "인간도, 천사도, 마족도 문명을 초기화당하는 가운데……"

[[dialogue]]
speaker = "unk"
original = "魔女だけが生き永らえてきたというなら、その智は確かに本物だろう。"
translation = "마녀만이 살아남아 왔다고 한다면, 그 지혜는 확실히 진짜일 것이다."

[[dialogue]]
speaker = "セドナ"
original = "「──ゆえにだ、諸君。我々はかの現象について君たちより遥かに熟知している。よろしいか？」"
translation = "「──그러므로다, 제군. 우리는 그 현상에 대해 너희들보다 훨씬 더 숙지하고 있다. 알겠나?」"

[[dialogue]]
speaker = "クロト"
original = "「……はい」"
translation = "「……네」"

[[dialogue]]
speaker = "アイリーン"
original = "「本題ですね。私たちから皆さまへ訊きたいことが多くあります」"
translation = "「본론이네요. 저희가 여러분께 묻고 싶은 것이 많이 있습니다」"

[[dialogue]]
speaker = "クロト"
original = "「わかりました。答えられることなら」"
translation = "「알겠습니다. 대답할 수 있는 것이라면」"

[[dialogue]]
speaker = "unk"
original = "ネビュラ、そして魔女。"
translation = "네뷸라, 그리고 마녀."

[[dialogue]]
speaker = "unk"
original = "全てを明かしてくれたとは言い切れないが──彼女たちはある程度の素性を語ってくれた。"
translation = "모든 것을 밝혀 주었다고 단정할 수는 없지만── 그녀들은 어느 정도의 본모습을 이야기해 주었다."

[[dialogue]]
speaker = "unk"
original = "こちらも真摯に答えなくてはならないだろう。"
translation = "이쪽도 진지하게 대답해야 할 것이다."

