[[dialogue]]
speaker = "シャロン"
original = "「……そうですか。会長さまは以前からイレーナさまのお心を知っておられたのですね……」"
translation = "「……그렇군요. 회장님은 이전부터 이레이나 님의 진심을 알고 계셨던 거군요……」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまは、女神様よりお力を賜ったことで、聖女として称えられるようになって……」"
translation = "「이레이나 님은 여신님으로부터 힘을 받으신 것 때문에 성녀로서 칭송받게 되고……」"

[[dialogue]]
speaker = "シャロン"
original = "「私のように女神様のお慈悲に救われたわけでも、女神様への信仰を支えにしていたわけでもなく、むしろ女神様のことを……」"
translation = "「저처럼 여신님의 자비로 구원받은 것도, 여신님에 대한 신앙을 버팀목으로 삼고 있었던 것도 아니라 오히려 여신님을……」"

[[dialogue]]
speaker = "シャロン"
original = "「私……何も知りませんでした。イレーナさまのご事情も、イレーナさまのお心も……」"
translation = "「저…… 아무것도 몰랐습니다. 이레이나 님의 사정도, 이레이나 님의 마음도……」"

[[dialogue]]
speaker = "シャロン"
original = "「きっと私は知らず知らずの間にイレーナさまを傷つけてしまっていたのですね」"
translation = "「분명 저는 저도 모르는 사이에 이레이나 님을 상처 입히고 있었던 거네요.」"

[[dialogue]]
speaker = "シャロン"
original = "「だからあのようなイレーナさまらしくもない口汚いお言葉を……」"
translation = "「그래서 저런 이레이나 님답지도 않은 상스러운 말씀을……」"

[[dialogue]]
speaker = "unk"
original = "いや、あれはあっちが素"
translation = "아니, 저게 본 모습이야."

[[dialogue]]
speaker = "シャロン"
original = "「えっ？\u3000そうなの、ですか？\u3000聖職者があのような品のないお言葉遣いを？\u3000え？\u3000え？\u3000ほ、本当にそのようなことが……？」"
translation = "「네? 그런가요? 성직자가 저런 품위 없는 말투를요? 에? 에? 저, 정말로 그런 일이……?」"

[[dialogue]]
speaker = "unk"
original = "ショックを受けるのそこなんだ……"
translation = "충격받는 포인트가 거기야……?"

[[dialogue]]
speaker = "シャロン"
original = "「い、いえっ。お言葉遣いも一人一人の個性を表すものでありますから。他人がどうこう指摘して良いものではありませんっ」"
translation = "「아, 아니요! 말투 또한 한 사람 한 사람의 개성을 나타내는 것이니까요. 타인이 이래라저래라 지적해서는 안 되는 것입니다!」"

[[dialogue]]
speaker = "シャロン"
original = "「それよりもイレーナさまに謝罪を……！！」"
translation = "「그것보다 이레이나 님께 사죄를……!!」"

[[dialogue]]
speaker = "unk"
original = "ひとまず俺が様子を見てくるよ"
translation = "일단 내가 가서 살펴보고 올게."

[[dialogue]]
speaker = "シャロン"
original = "「ですが──……いえ、わかりました」"
translation = "「하지만──…… 아니요, 알겠습니다.」"

[[dialogue]]
speaker = "シャロン"
original = "「会長さま。どうかイレーナさまをお願いいたします」"
translation = "「회장님. 부디 이레이나 님을 부탁드릴게요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ……。やっちゃったわ……」"
translation = "「하아…… 저질러버렸어……」"

[[dialogue]]
speaker = "イレーナ"
original = "「……なによ。来たのあんた」"
translation = "「……뭐야. 너 왔어.」"

[[dialogue]]
speaker = "イレーナ"
original = "「別に後悔なんかしてないわよ。むしろ言いたいことが言えてスッキリしたわ。ぶっちゃけあの子、ずっとうざったかったのよね」"
translation = "「별로 후회 같은 건 안 해. 오히려 하고 싶은 말을 해서 속이 시원하다구. 솔직히 저 아이, 계속 짜증 났었거든.」"

[[dialogue]]
speaker = "イレーナ"
original = "「事あるごとに女神様ー女神様ーってバカのひとつ覚えみたいに言っちゃってさ。これだから敬虔な信徒ってヤツは……」"
translation = "「걸핏하면 여신님~ 여신님~ 하고 바보 하나만 아는 것처럼 굴고 말이야. 이래서 경건한 신도라는 족속은……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ま、どのみちあたしは終わりね。ひた隠しにしてきた性根も、信仰心がないこともバレちゃったし」"
translation = "「뭐, 어차피 난 이제 끝이네. 꽁꽁 숨겨왔던 성깔도, 신앙심이 없다는 것도 다 들통났으니.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あの子があたしのことを触れ回れば、今の立場からも下ろされるでしょうね。ふふ、もう二度と面倒臭い人助けもしなくて済むってわけじゃない♪」"
translation = "「저 아이가 내 소문을 퍼뜨리면 지금 입장에서도 쫓겨나겠지. 후훗, 이제 두 번 다시 귀찮은 사람 돕기 같은 건 안 해도 된다는 거잖아♪」"

[[dialogue]]
speaker = "unk"
original = "本当にそれでいいのか？"
translation = "정말로 그걸로 괜찮겠어?"

[[dialogue]]
speaker = "イレーナ"
original = "「いいわよ。むしろせいせいするわ。やっと普通の女の子に戻れるんだもの」"
translation = "「괜찮아. 오히려 홀가분하다구. 드디어 평범한 여자아이로 돌아갈 수 있는걸.」"

[[dialogue]]
speaker = "unk"
original = "でも──"
translation = "하지만──"

[[dialogue]]
speaker = "イレーナ"
original = "「うっさいわね！\u3000じゃあ何？\u3000あたしはずっと『聖女サマ』を演じ続けてろってのっ？」"
translation = "「시끄러워! 그럼 뭐야? 나보고 평생 『성녀님』 노릇이나 계속하라는 거야?」"

[[dialogue]]
speaker = "イレーナ"
original = "「誰にも素顔を見せないまま、好きなこともできずに女神サマとやらに使い潰されてればいいのっ？」"
translation = "「누구에게도 맨얼굴을 보여주지 못한 채, 좋아하는 것도 못 하고 여신님인지 뭔지한테 부려 먹히기만 하라는 거야?」"

[[dialogue]]
speaker = "イレーナ"
original = "「そんなの嫌よ。あたしは聖女になるために生まれてきたわけじゃないっ。女神サマのために生きるつもりもない……！」"
translation = "「그런 건 싫어. 나는 성녀가 되기 위해 태어난 게 아니야. 여신님을 위해 살 생각도 없어……!」"

[[dialogue]]
speaker = "シャロン"
original = "「──イレーナさまっ！」"
translation = "「──이레이나 님!」"

[[dialogue]]
speaker = "イレーナ"
original = "「ひゃっ！？\u3000シャ、シャロン！？」"
translation = "「햣!? 샤, 샤론!?」"

[[dialogue]]
speaker = "シャロン"
original = "「ずっと、ひっく、たった一人でそのように苦しんでおられたのですね……！」"
translation = "「계속, 흑, 홀로 그렇게 괴로워하고 계셨던 거군요……!」"

[[dialogue]]
speaker = "シャロン"
original = "「今までお気持ちに寄り添うこともできず、申し訳ございませんでした……！\u3000シスターとして不徳を恥じるばかりです……！」"
translation = "「지금까지 그 마음을 헤아려드리지도 못하고 죄송합니다……! 시스터로서 부덕함이 부끄러울 뿐이에요……!」"

[[dialogue]]
speaker = "イレーナ"
original = "「いきなり出てきて何泣いてるのよ……！\u3000離れなさいってば、暑苦しいじゃない……！」"
translation = "「갑자기 튀어나와서 왜 우는 거야……! 좀 떨어져 봐, 덥다니까……!」"

[[dialogue]]
speaker = "シャロン"
original = "「申し訳ございません。どうしてもイレーナさまのことが気になって、こっそりと聞き耳を立ててしまいました……」"
translation = "「죄송합니다. 도저히 이레이나 님이 걱정돼서 몰래 엿듣고 말았습니다……」"

[[dialogue]]
speaker = "シャロン"
original = "「ですがご安心ください。ご事情は理解しました。私、教皇庁に掛け合ってみますっ！」"
translation = "「하지만 안심하세요. 사정은 이해했습니다. 저, 교황청에 담판을 지어보겠어요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁっ？\u3000掛け合うってまさか……」"
translation = "「하아? 담판이라니 설마……」"

[[dialogue]]
speaker = "シャロン"
original = "「もちろん、イレーナさまが無事に神官を離任できるようにですっ。どうか私にお任せくださいっ」"
translation = "「물론 이레이나 님이 무사히 신관직을 사임할 수 있도록 하기 위해서예요! 부디 제게 맡겨주세요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「そ、そう……勝手にすればいいけど……」"
translation = "「그, 그래…… 마음대로 하든가……」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさま……？\u3000聖女をお辞めになりたいというお話ではなかったのですか……？」"
translation = "「이레이나 님……? 성녀를 그만두고 싶다는 말씀이 아니셨나요……?」"

[[dialogue]]
speaker = "イレーナ"
original = "「っ……違わない、けど」"
translation = "「윽…… 틀린 건 아니지만.」"

[[dialogue]]
speaker = "シャロン"
original = "「ご安心ください。もう二度とイレーナさまがお心を患わせることはありません。教皇庁へはうまくお話を通してみせますから」"
translation = "「안심하세요. 더 이상 이레이나 님이 마음 고생하실 일은 없을 거예요. 교황청에는 제가 말을 잘 전해두겠으니까요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「それはいいけど……他に言うことないの？」"
translation = "「그건 그렇다 치고…… 달리 할 말 없어?」"

[[dialogue]]
speaker = "シャロン"
original = "「？？？\u3000他に、とは？」"
translation = "「??? 달리라뇨?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしはエセ聖女だったのよ。あんたのことも、他のみんなのこともずっと騙していたの」"
translation = "「나는 가짜 성녀였다니까. 너도, 다른 모두도 계속 속이고 있었던 거야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「さも善人のように振る舞って、偽りの信仰を騙って、聖女の役目なんて面倒臭いって思ってるような女なのよ？」"
translation = "「마치 선인인 것처럼 굴고, 거짓 신앙을 꾸며대며 성녀 역할 따윈 귀찮다고 생각하는 그런 여자라구?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしはあんたたちの信仰をバカにしてるのよ？\u3000許せないんじゃないの？\u3000内心はらわた煮えくりかえってるんじゃないの？」"
translation = "「나는 너희들의 신앙을 바보 취급하고 있는 거야! 용서할 수 없는 거 아니야? 속으로는 부글부글 끓고 있는 거 아니냐구?」"

[[dialogue]]
speaker = "シャロン"
original = "「いえ、私は──」"
translation = "「아니요, 저는──」"

[[dialogue]]
speaker = "シャロン"
original = "「っ！？」"
translation = "「!?」"

