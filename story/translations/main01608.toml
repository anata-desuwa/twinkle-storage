[[dialogue]]
speaker = "unk"
original = "第１０話,最後の魔王,B"
translation = "제10화, 최후의 마왕, B"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──おおおおおおっっ！！」"
translation = "「──오오오오오오옷!!」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「──はあああああァァァッ！！」"
translation = "「──하아아아아아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "激戦。肉薄。猛攻に継ぐ猛攻。"
translation = "격전. 육박. 맹공에 이은 맹공."

[[dialogue]]
speaker = "unk"
original = "アポロの仮面はすでに幾度も破壊と再生を繰り返し、かつてない強度に達していた。それでも俺たちは食らいつく。"
translation = "아폴로의 가면은 이미 몇 번이고 파괴와 재생을 반복하며, 전례 없는 강도에 도달해 있었다. 그럼에도 우리는 물고 늘어진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（この拮抗状態が続けば──）"
translation = "「(이러한 균형 상태가 계속되면──)」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "（ええ、こちらが先に破滅します──）"
translation = "「(네, 이쪽이 먼저 파멸합니다──)」"

[[dialogue]]
speaker = "unk"
original = "無限の強化再生を繰り返すアポロに真っ当な勝ち目はない。"
translation = "무한의 강화 재생을 반복하는 아폴로에게 정면으로 이길 가망은 없다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──ぐっ……また……しつこい！」"
translation = "「──윽…… 또…… 끈질겨!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「仮面が壊れました！\u3000一時退却します──！」"
translation = "「가면이 부서졌습니다! 일시 퇴각하겠습니다──!」"

[[dialogue]]
speaker = "unk"
original = "幾度目かの仮面の崩壊を迎える。"
translation = "몇 번째인지 모를 가면의 붕괴를 맞이한다."

[[dialogue]]
speaker = "unk"
original = "この時、アポロには再生するための莫大な瘴気が集中する。"
translation = "이때, 아폴로에게는 재생하기 위한 막대한 장기가 집중된다."

[[dialogue]]
speaker = "unk"
original = "この機に乗じて、俺たちも戦線を整える──というやり方でいつか大きな隙が生まれるのを待っていた。"
translation = "이 기회를 틈타, 우리도 전선을 정비한다──는 방식으로 언젠가 큰 틈이 생기기를 기다리고 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし。"
translation = "하지만."

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「ごめんなさい、皆さん──ここで決めますっ！」"
translation = "「죄송합니다, 여러분── 여기서 결정하겠습니다!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「！？\u3000フィオナ──！？」"
translation = "「!? 피오나──!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「無謀です──それ以上近づいたらっ！」"
translation = "「무모합니다── 그 이상 가까이 다가갔다간!」"

[[dialogue]]
speaker = "unk"
original = "その、瘴気がアポロをより強く創り変えているまさに最中──フィオナはその身ひとつで飛び込んでいく！"
translation = "그, 장기가 아폴로를 더욱 강하게 만들어내는 바로 그 순간── 피오나는 그 몸 하나로 뛰어든다!"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「姉さんは……一瞬でも、正気に戻って──私へ呼びかけてくれました」"
translation = "「언니는…… 한순간이라도, 제정신으로 돌아와── 저에게 말을 걸어주었습니다」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「だから今度は……お返しです」"
translation = "「그러니 이번에는…… 보답입니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っ、何のつもりだ──ッ」"
translation = "「윽, 무슨 속셈이냐──!」"

[[dialogue]]
speaker = "unk"
original = "破壊と再生の間隙。刹那だけでも、アポロの素顔があらわになる瞬間。"
translation = "파괴와 재생의 간극. 찰나만이라도, 아폴로의 맨얼굴이 드러나는 순간."

[[dialogue]]
speaker = "unk"
original = "フィオナは、自身が大量の瘴気に包まれながらも──叫んだ。"
translation = "피오나는, 자신이 대량의 장기에 휩싸이면서도── 외쳤다."

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「私を──私たちを──助けてください、姉さんっ！」"
translation = "「저를── 저희를── 도와주세요, 언니!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「今のって、もしかして──」"
translation = "「방금 그거, 혹시──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「フィオナ──まさか──」"
translation = "「피오나── 설마──」"

[[dialogue]]
speaker = "unk"
original = "戦っている最中の相手に助けを求める。本来ありえないはずの行為。"
translation = "싸우고 있는 상대에게 도움을 청한다. 본래 있을 수 없는 행위."

[[dialogue]]
speaker = "unk"
original = "それは理外の──フィオナからアポロへと伝える、逆転のオーダーだった。"
translation = "그것은 이치 밖의── 피오나로부터 아폴로에게 전하는, 역전의 오더였다."

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「私たちはリクリエを退けて──世界を救う。それが、魔王だけじゃない、<ruby>星騎士<rt>スターナイト</rt></ruby>の定め」"
translation = "「저희는 리크리에를 물리치고── 세계를 구합니다. 그것이, 마왕만이 아닌, <ruby>성기사<rt>스타 나이트</rt></ruby>의 숙명」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「その運命に──あなたが必要なんです！\u3000姉さんっ！」"
translation = "「그 운명에── 당신이 필요합니다! 언니!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っ──あたしが……？」"
translation = "「윽── 내가……?」"

[[dialogue]]
speaker = "unk"
original = "虚をつかれたアポロの再生が停滞する。"
translation = "허를 찔린 아폴로의 재생이 정체된다."

[[dialogue]]
speaker = "unk"
original = "そして、妹の心からの叫びは、使徒なんかじゃない姉の心に突き刺さる。"
translation = "그리고, 여동생의 진심 어린 외침은, 사도 따위가 아닌 언니의 마음에 깊숙이 박힌다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『緋宮会長を目覚めさせたのは、ヴィーナスさんの切なる願いでした』"
translation = "『히노미야 회장님을 깨어나게 한 것은, 비너스 씨의 간절한 소원이었습니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『なら私にとっての最後の鍵はきっと──姉さんなのだと思います』"
translation = "『그렇다면 저에게 있어서 마지막 열쇠는 분명── 언니일 것이라고 생각합니다』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『そして、もしかしたら……姉さんが、姉さんの殻を破れるなら、それはきっと……』"
translation = "『그리고, 어쩌면…… 언니가, 언니의 껍질을 깰 수 있다면, 그것은 분명……』"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（あた──しは──あたしは、誰だ──）"
translation = "「(나──는── 나는, 누구지──)」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（星見──フィオナ──リクリエの──使徒──流星──ライダー──）"
translation = "「(별을 보는 장녀── 피오나── 리크리에의── 사도── 유성── 라이더──)」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（エリシア──そうだ──あたしは、妹と、遊んで……でも……魔王になるために、修行しなくちゃ、いけなくて──）"
translation = "「(엘리시아── 그래── 나는, 여동생과, 놀고…… 하지만…… 마왕이 되기 위해, 수행해야, 했고──)」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（なら、あたしは──何者だ──本当にやりたいことって、なんだ……？）"
translation = "「(그렇다면, 나는── 누구지── 정말로 하고 싶은 것은, 뭐지……?)」"

[[dialogue]]
speaker = "unk"
original = "宇宙を壊せ。創り変えろ。パーフェクト・ワールドへ至るんだって。"
translation = "우주를 부숴라. 새롭게 창조해라. 퍼펙트 월드에 도달하는 거다."

[[dialogue]]
speaker = "unk"
original = "でも──でも──"
translation = "하지만── 하지만──"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "（他の誰でもない──<ruby>妹<rt>エリシア</rt></ruby>があたしを──呼んでるっ！）"
translation = "「(다른 누구도 아닌── 여동생이 나를── 부르고 있어!)」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あああっ……あああああああああああああ──────っっ！！！」"
translation = "「아아앗…… 아아아아아아아아아아아아──────ㅅ!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アポロッ──！？」"
translation = "「아폴로──!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「手は出せない──アポロを打ち破れるのはアポロだけだ。見守るしかない！」"
translation = "「손을 댈 수 없다── 아폴로를 물리칠 수 있는 건 아폴로뿐이다. 지켜볼 수밖에 없어!」"

[[dialogue]]
speaker = "unk"
original = "星見の長女としての己と──リクリエの使徒としての己──"
translation = "별을 보는 장녀로서의 자신과── 리크리에의 사도로서의 자신──"

[[dialogue]]
speaker = "unk"
original = "二柱の強烈な自我が今、仮面の奥でせめぎ合っている！"
translation = "두 기둥의 강렬한 자아가 지금, 가면 속에서 서로 다투고 있다!"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「お願いします──姉さん。あなたの殻を破れるのは、あなただけなんです……！」"
translation = "「부탁합니다── 언니. 당신의 껍질을 깰 수 있는 건, 당신뿐입니다……!」"

[[dialogue]]
speaker = "unk"
original = "あの小さい体の中で、極限の対決を強いるのは大きな賭けだった。"
translation = "저 작은 몸 안에서, 극한의 대결을 강요하는 것은 큰 도박이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（それでもフィオナは信じた──『姉』と『使徒』は、決して交わらないものなんだって──）"
translation = "「(그래도 피오나는 믿었다── 『언니』와 『사도』는, 결코 섞이지 않는 것이라고──)」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うううう──あああああああ──────ッッッ！！」"
translation = "「우우우우── 아아아아아아아아──────ㅅ!!」"

[[dialogue]]
speaker = "unk"
original = "周囲を一掃する強烈な閃光が爆散し、そして……"
translation = "주위를 일소하는 강렬한 섬광이 폭산하고, 그리고……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……仮面が……」"
translation = "「아…… 가면이……」"

[[dialogue]]
speaker = "unk"
original = "仮面が砕け散る。"
translation = "가면이 산산조각 난다."

[[dialogue]]
speaker = "unk"
original = "アポロをアポロたらしめていた使徒の仮面が、ついに。"
translation = "아폴로를 아폴로답게 만들었던 사도의 가면이, 마침내."

[[dialogue]]
speaker = "unk"
original = "グレート・ウォールよりもさらに狭い──アポロ個人という器の中で。"
translation = "그레이트 월보다도 훨씬 좁은── 아폴로 개인이라는 그릇 안에서."

[[dialogue]]
speaker = "unk"
original = "リクリエの全力が巡り、狂い、果て……そして、壊れた。"
translation = "리크리에의 전력이 돌고, 미치고, 끝을 맞이하고…… 그리고, 부서졌다."

[[dialogue]]
speaker = "unk"
original = "そして、その先で現れていたのは……"
translation = "그리고, 그 너머에서 나타난 것은……"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うそ……こんな、ことって……」"
translation = "「거짓말…… 이런, 일이……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「この波動──星見会長と似ていて……」"
translation = "「이 파동── 호시미 회장과 비슷해서……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ──同じだ。俺や、フィオナと」"
translation = "「아아── 똑같다. 나나, 피오나와」"

[[dialogue]]
speaker = "unk"
original = "星力の波動。魔力の波動。そして霊力の波動。"
translation = "성력의 파동. 마력의 파동. 그리고 영력의 파동."

[[dialogue]]
speaker = "unk"
original = "３種の力を統べて、操る──紛れもない覇者の器がそこにあった。"
translation = "세 종류의 힘을 모두 통솔하고, 조종하는── 틀림없는 패자의 그릇이 거기에 있었다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしは……何を、してたんだ」"
translation = "「나는…… 뭘, 하고 있었던 거지」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「今まで、ずっと──仮面に操られて、でも、それは己の弱さのせいで……」"
translation = "「지금까지, 계속── 가면에게 조종당하고, 하지만, 그건 나의 나약함 때문이었고……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ああ……うまく整理できない。なんだか……遠くへきてしまった、気がする」"
translation = "「아아…… 제대로 정리할 수가 없어. 왠지…… 멀리 와버린, 기분이 든다」"

[[dialogue]]
speaker = "unk"
original = "アポロは──正気を取り戻していた。"
translation = "아폴로는── 제정신을 되찾고 있었다."

[[dialogue]]
speaker = "unk"
original = "仮面をなくしてなお<ruby>流暢<rt>りゅうちょう</rt></ruby>に語るその姿は、今までじゃ決してありえなかったもの。"
translation = "가면을 잃고도 유창하게 말하는 그 모습은, 전에는 결코 있을 수 없었던 것."

[[dialogue]]
speaker = "unk"
original = "そして今の彼女を見れば、何が起きたのか──その現象は明白だった。"
translation = "그리고 지금의 그녀를 보면, 무슨 일이 일어났는지── 그 현상은 명백했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アポロが──魔王になったんだ」"
translation = "「아폴로가── 마왕이 된 거다」"

[[dialogue]]
speaker = "unk"
original = "魔王としての<ruby>覚醒<rt>めざ</rt></ruby>めは彼女を仮面の支配からも解き放った。"
translation = "마왕으로서의 각성은 그녀를 가면의 지배로부터도 해방시켰다."

[[dialogue]]
speaker = "unk"
original = "星見の長女としてではない。"
translation = "별을 보는 장녀로서가 아니다."

[[dialogue]]
speaker = "unk"
original = "誰よりもかけがえない妹からの願いによって──その資質がついに花開いたのだ。"
translation = "누구보다 소중한 여동생의 소원에 의해── 그 자질이 마침내 꽃을 피운 것이다."

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「き……奇蹟ニャン……姉妹どちらも、魔王として目覚めるニャンて……！」"
translation = "「기…… 기적냥…… 자매 둘 다, 마왕으로 깨어날 줄이야냥……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やっぱり魔王ってやつは──リクリエに打ち克つ運命だったのよ！」"
translation = "「역시 마왕이란 녀석은── 리크리에를 이겨낼 운명이었던 거야!」"

[[dialogue]]
speaker = "unk"
original = "彼女は元より星見の長女。"
translation = "그녀는 원래부터 별을 보는 장녀."

[[dialogue]]
speaker = "unk"
original = "女神も告げた、最も色濃い魔王の血を引く人間。"
translation = "여신도 말했던, 가장 짙은 마왕의 피를 이은 인간."

[[dialogue]]
speaker = "unk"
original = "<ruby>妹<rt>エリシア</rt></ruby>も覚醒に至れたというのなら──姉がやってやれない道理はない。"
translation = "여동생도 각성에 이르렀다면── 언니가 해내지 못할 리가 없다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ……あはは……こんなことも、あるのですね……」"
translation = "「아…… 아하하…… 이런 일도, 있군요……」"

[[dialogue]]
speaker = "unk"
original = "思いがけない戦いの終幕。"
translation = "뜻밖의 싸움의 종막."

[[dialogue]]
speaker = "unk"
original = "ようやく凪いだ空気にしばらく酔って、ついぞ駆け出したのはフィオナだった。"
translation = "겨우 잠잠해진 공기에 잠시 취해, 결국 달려 나간 것은 피오나였다."

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「姉さん……姉さんっ──！」"
translation = "「언니…… 언니──!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あ……エリシア……」"
translation = "「아…… 엘리시아……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ごめん──ごめんな。ずっと……迷惑かけて。あたしの代わり、してもらって」"
translation = "「미안── 미안해. 계속…… 폐를 끼치고. 나 대신, 해줘서」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「いいんですっ……！\u3000ずっと会いたかった──本当は……私がまた、遊びたかったんです……！」"
translation = "「괜찮아요! 계속 만나고 싶었어요── 사실은…… 제가 다시, 놀고 싶었어요……!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ははっ……どっちが姉だかわかんないな。見ない間に……こんな立派に、成長しちゃって……」"
translation = "「하핫…… 누가 언니인지 모르겠네. 못 본 사이에…… 이렇게 훌륭하게, 성장해 버려서……」"

[[dialogue]]
speaker = "unk"
original = "泣きつくフィオナの頭を撫でるアポロ。"
translation = "울며 매달리는 피오나의 머리를 쓰다듬는 아폴로."

[[dialogue]]
speaker = "unk"
original = "２人の背丈とはまるで逆の関係性が、なんだかおかしかった。"
translation = "두 사람의 키와는 정반대인 관계성이, 왠지 모르게 우스꽝스러웠다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "（はは……昔は、あんな感じだったのかもな）"
translation = "「(하하…… 옛날에는, 저런 느낌이었을지도 모르겠네)」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "（ええ。昔のあなたみたいね、ソフィ？）"
translation = "「(응. 옛날의 너 같네, 소피?)」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "（わ、私はあんな風に甘えませんから！）"
translation = "「(와, 저는 저렇게 응석 부리지 않아요!)」"

[[dialogue]]
speaker = "unk"
original = "仮面の呪縛から解き放たれたアポロは──もう『使徒』ではなくなっていた。"
translation = "가면의 주박에서 해방된 아폴로는── 더 이상 『사도』가 아니었다."

[[dialogue]]
speaker = "unk"
original = "そして……地表に起きた変化はそれだけではなかった。"
translation = "그리고…… 지표에 일어난 변화는 그것만이 아니었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「お空が……晴れていきますっ！？」"
translation = "「하늘이…… 맑아지고 있습니다!?」"

[[dialogue]]
speaker_original = "逃げ惑う市民Ａ"
speaker_translation = "도망치는 시민 A"
original = "「──な、なんだ……？\u3000急に空が晴れて……？」"
translation = "「──뭐, 뭐야……? 갑자기 하늘이 맑아지고……?」"

[[dialogue]]
speaker_original = "逃げ惑う市民Ｂ"
speaker_translation = "도망치는 시민 B"
original = "「戻った──過ぎ去った、の……？」"
translation = "「돌아왔어── 지나간, 건가……?」"

[[dialogue]]
speaker_original = "アニュラス（覚醒）"
speaker_translation = "아뉴라스(각성)"
original = "「終わった──のか？\u3000もしかして……」"
translation = "「끝난── 건가? 혹시……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「モンスターも──消滅しています……」"
translation = "「몬스터도── 소멸하고 있습니다……」"

[[dialogue]]
speaker_original = "エリス"
speaker_translation = "에리스"
original = "「建物が……元に……」"
translation = "「건물이…… 원래대로……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「ひと安心……でいいのかしら？\u3000すぐ学園に連絡しないと──」"
translation = "「안심해도…… 되는 걸까요? 당장 학원에 연락해야──」"

[[dialogue]]
speaker = "unk"
original = "全天を覆っていたアポロの空が、晴れていく。"
translation = "하늘 전체를 뒤덮고 있던 아폴로의 하늘이, 맑아진다."

[[dialogue]]
speaker = "unk"
original = "地表に出現していた無数のアステライトが、溶けるように消えていく。"
translation = "지표에 출현했던 수많은 아스테라이트가, 녹듯이 사라져 간다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「リクリエ現象が……全部……」"
translation = "「리크리에 현상이…… 전부……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「すごい……流星群も、やんじゃった……」"
translation = "「대단해…… 유성우도, 그쳤어……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……あたしが、あたしじゃなくなったからだ」"
translation = "「……내가, 내가 아니게 되었기 때문이다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アポロ……」"
translation = "「아폴로……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしはリクリエの使徒だった。それは、リクリエという現象にとっても、指向性を持たせるのに人間体が都合よかったからだ」"
translation = "「나는 리크리에의 사도였다. 그것은, 리크리에라는 현상에게도, 지향성을 갖게 하는 데 인간의 몸이 편리했기 때문이다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「あたしっていう指揮官がいなくなったら……リクリエのエネルギーは、消滅していく」"
translation = "「나라는 지휘관이 없어지면…… 리크리에의 에너지는, 소멸해 간다」"

[[dialogue]]
speaker = "unk"
original = "アポロは淡々と語った。俺たちにも理解できるように。そして、己の罪を悔いるように。"
translation = "아폴로는 담담하게 말했다. 우리도 이해할 수 있도록. 그리고, 자신의 죄를 뉘우치듯이."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「──緋宮クロト」"
translation = "「──히노미야 쿠로토」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……何かな」"
translation = "「……뭔가」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……すまなかった。今まで、ずっと……敵だとか勝手なこと言って、追いかけ回して」"
translation = "「……미안했다. 지금까지, 계속…… 적이라느니 멋대로 말하고, 쫓아다니고」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「本当に悪党だったのは……あたしの方だったのにな」"
translation = "「정말로 악당이었던 건…… 나였는데」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「気にすることはない。君の事情は知ってる──恨もうとは思わないよ。ま、事後処理は手伝ってほしいけどな」"
translation = "「신경 쓸 것 없다. 네 사정은 알고 있다── 원망할 생각은 없어. 뭐, 사후 처리는 도와줬으면 좋겠지만」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それに俺たちは……君以外にも、そうなってしまったケースを知っている」"
translation = "「게다가 우리는…… 너 말고도, 그렇게 되어버린 케이스를 알고 있다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そう……なのか？\u3000だが、そうか。他の平行世界にも、あたしと同様に……」"
translation = "「그런…… 건가? 하지만, 그렇군. 다른 평행 세계에도, 나와 마찬가지로……」"

[[dialogue]]
speaker = "unk"
original = "マルキアさんのことはアポロも知らないようだった。"
translation = "마르키아 씨에 대해서는 아폴로도 모르는 듯했다."

[[dialogue]]
speaker = "unk"
original = "平行世界は交わらぬ可能性同士──それはそれ、という話なのだろう。"
translation = "평행 세계는 서로 교차하지 않는 가능성들── 그것은 그것, 이라는 이야기일 것이다."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「それから……他の奴らも。本当に……悪かった」"
translation = "「그리고…… 다른 녀석들도. 정말로…… 미안했다」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「姉さん……」"
translation = "「언니……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「全部は……あたしの、心の弱さが招いたことだ。オマエたちみたいな立派な魔王に、なれなかった」"
translation = "「전부는…… 나의, 마음의 나약함이 초래한 일이다. 너희들 같은 훌륭한 마왕이, 되지 못했다」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そ、そんなことありません！\u3000最後は紛れもなく大・大・大覚醒だったじゃないですか！」"
translation = "「서, 설마요! 마지막은 틀림없는 대・대・대각성이었잖아요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。個人でリクリエに勝っちゃうなんて──それこそ、真の魔王って感じじゃない？」"
translation = "「응. 개인으로 리크리에를 이겨버리다니── 그거야말로, 진정한 마왕이라는 느낌이잖아?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「オマエたち……そうか。いや、オマエたちなんて呼ぶべきじゃないのかもしれないが」"
translation = "「너희들…… 그런가. 아니, 너희들이라고 부르면 안 될지도 모르겠지만」"

[[dialogue]]
speaker_original = "フィオナ（魔王覚醒）"
speaker_translation = "피오나(마왕 각성)"
original = "「ふふ……アポロ口調が抜けませんね。姉さん」"
translation = "「후후…… 아폴로 말투가 안 빠지네요. 언니」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「それくらい支配が強かったってことで」"
translation = "「그만큼 지배가 강했다는 거지」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ。悪いのは仮面であって、お姉さんではありませんから」"
translation = "「네. 나쁜 건 가면이지, 언니가 아니니까요」"

[[dialogue]]
speaker = "unk"
original = "アポロを囲んでみんなで笑い合う。"
translation = "아폴로를 둘러싸고 모두 함께 웃는다."

[[dialogue]]
speaker = "unk"
original = "俺たちが初めて掴んだ、ひとつの運命の結末だった。"
translation = "우리가 처음으로 붙잡은, 하나의 운명의 결말이었다."

