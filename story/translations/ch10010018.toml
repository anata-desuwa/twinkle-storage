[[dialogue]]
speaker = "unk"
original = "俺の手をぎゅっと握りながら、キョロキョロと周囲を見回し、メイドたちの視線を避けるフィオナ。"
translation = "내 손을 꽉 잡으며, 두리번거리며 주위를 둘러보고, 메이드들의 시선을 피하는 피오나."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なんとなく見つかりたくなくて……だってこれから、あなたと<b>そういうこと</b>をするんですから」"
translation = "「왠지 모르게 들키고 싶지 않아서…… 왜냐하면 이제부터, 당신과 <ruby>그런 일<rt>・・ ・</rt></ruby>을 할 거니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぅ……自分の部屋まで来るだけなのに緊張してしまいました」"
translation = "「후우…… 제 방까지 오는 것만으로 긴장해 버렸어요」"

[[dialogue]]
speaker = "unk"
original = "安堵したようにフィオナの表情が少し緩むが、その顔には緊張も見え隠れしていて。"
translation = "안도한 듯 피오나의 표정이 조금 누그러지지만, 그 얼굴에는 긴장도 엿보이고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「初めて出会った時は、あなたとこんな関係になるなんて思ってもみませんでした……」"
translation = "「처음 만났을 때는, 당신과 이런 관계가 될 거라고는 생각지도 못했어요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも今はあなたのことが好きです。だから……」"
translation = "「하지만 지금은 당신이 좋아요. 그러니까……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うぅ……男の人に肌を見せるなんて初めてです……いえ、変身すると露出度は高いですが、そういうレベルじゃないですし……」"
translation = "「으윽…… 남자에게 피부를 보이는 건 처음이에요…… 아니, 변신하면 노출도는 높지만, 그런 수준이 아니고요……」"

[[dialogue]]
speaker = "unk"
original = "フィオナは衣服を脱ぐと身を縮こまらせて、胸や秘部など大事なところを手で隠そうとする。"
translation = "피오나는 옷을 벗자 몸을 움츠리고, 가슴이나 은밀한 부분 등 중요한 곳을 손으로 가리려고 한다."

[[dialogue]]
speaker = "unk"
original = "緊張と羞恥のせいか少し震えていて、しかしそんな姿を見ていると……"
translation = "긴장과 수치심 때문인지 조금 떨고 있었고, 하지만 그런 모습을 보고 있자니……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ……あなたの、お、おち○ちん、大きくなってます……こうなるんですね……」"
translation = "「아…… 당신의, 자, 자지, 커지고 있어요…… 이렇게 되는 거군요……」"

[[dialogue]]
speaker = "unk"
original = "彼女を見つめているだけで下半身に熱い血流が集まり、フィオナも興奮しているのか、秘部が潤ってわずかに光沢を帯びていた。"
translation = "그녀를 바라보는 것만으로 하반신에 뜨거운 혈류가 모였고, 피오나도 흥분했는지, 은밀한 부분이 젖어 희미하게 광택을 띠고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「来てください、私の中に。あなたと……ひとつになりたいです」"
translation = "「들어와 주세요, 제 안에. 당신과…… 하나가 되고 싶어요」"

[[dialogue]]
speaker = "unk"
original = "フィオナの言葉にゆっくり頷き、手を握って、そして──"
translation = "피오나의 말에 천천히 고개를 끄덕이고, 손을 잡고, 그리고──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「～～～～～～っ……！！」"
translation = "「～～～～～～……!!」"

[[dialogue]]
speaker = "unk"
original = "怒張したペニスが膣へと侵入した瞬間、フィオナの全身が強張り、手を握る力が強くなる。"
translation = "노장한 페니스가 질로 침입한 순간, 피오나의 전신이 경직되고, 손을 쥐는 힘이 강해진다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「くっ、うぅぅっ…………太くて、大きい……あなたので、私の中、広げられてぇ……はぁ、んんんっ……！」"
translation = "「크읏, 우으으읏………… 굵고, 커다래…… 당신 것으로, 제 안이, 넓혀져서…… 하아, 응응응……!」"

[[dialogue]]
speaker = "unk"
original = "初めて異物を受け入れる痛みに苦悶の声を漏らすフィオナ。"
translation = "처음으로 이물질을 받아들이는 고통에 괴로운 목소리를 흘리는 피오나."

[[dialogue]]
speaker = "unk"
original = "けれどペニスは熱くて柔らかな肉の感触に包まれ、俺は強烈な快感の中にいた。"
translation = "하지만 페니스는 뜨겁고 부드러운 살의 감촉에 감싸여, 나는 강렬한 쾌감 속에 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふあぁっ、はぁっ……んん、まだ少ししか入ってないのに、男の人が入ってくるのって、こんなに……っ、ふぅっ、はぁ……」"
translation = "「후아앗, 하앗…… 응, 아직 조금밖에 안 들어왔는데, 남자가 들어오는 건, 이렇게나…… 큭, 후읏, 하아……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ、はぁ、はぁ……そんな心配そうにしなくても、私なら平気ですから。あなたはどうですか？\u3000痛かったりしないですか……？」"
translation = "「하아, 하아, 하아…… 그렇게 걱정스러운 표정을 짓지 않아도, 저라면 괜찮으니까요. 당신은 어때요? 아프거나 하진 않나요……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「痛くないし、よく締まって気持ちいいよ」"
translation = "「아프지 않고, 잘 조여서 기분 좋아」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そ、そこまで言わなくても……でも、あなたが気持ち良くなってくれたなら嬉しいです……くぅっ……」"
translation = "「그, 그렇게까지 말하지 않아도…… 하지만, 당신이 기분 좋아졌다면 기뻐요…… 크읏……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたのが熱くて、大きくて……私の中であなたを直接感じられて、不思議な気持ち……です」"
translation = "「당신의 것이 뜨겁고, 커서…… 제 안에서 당신을 직접 느낄 수 있어서, 신기한 기분……이에요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「男の人とつながるのって初めてでしたけど、こんな感じなんですね……」"
translation = "「남자랑 연결되는 건 처음이었지만, 이런 느낌이군요……」"

[[dialogue]]
speaker = "unk"
original = "体と体でフィオナでつながってで愛おしい気持ちが溢れてくる。"
translation = "몸과 몸으로 피오나와 연결되어 사랑스러운 마음이 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "しかし膣内に並んだ小さな肉ひだが蜜を帯びて絡み付き、ペニスがさらに張り詰めていく。"
translation = "하지만 질 내에 늘어선 작은 살 주름이 꿀을 머금고 얽혀붙어, 페니스가 더욱 팽팽하게 긴장해 간다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんっ……！？\u3000おち○ちんがビクッて脈打って、大きくなって……とても元気です……」"
translation = "「응응……!? 자지가 움찔하고 맥동하며, 커지고…… 아주 힘이 넘치네요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大丈夫です、全然痛くなんかありませんから……もっと奥に来て……動いて、ください……くっ、はぁ、はぁ……んん、ふぅ……」"
translation = "「괜찮아요, 전혀 아프지 않으니까요…… 더 깊숙이 들어와서…… 움직여, 주세요…… 크읏, 하아, 하아…… 응, 후우……」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも、痛みをこらえるようにぎゅっと手を握るフィオナ。"
translation = "그렇게 말하면서도, 고통을 참으려는 듯이 꽉 손을 쥐는 피오나."

[[dialogue]]
speaker = "unk"
original = "バレバレなのに我慢しようとするフィオナがいじらしくて、その痛みを和らげてあげたくて、強引に唇を奪う。"
translation = "다 들통났는데도 참으려는 피오나가 안쓰러워서, 그 고통을 덜어주고 싶어, 강제로 입술을 빼앗는다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんっ！？\u3000ふっ……んむっ、んちゅるっ……もう、不意打ちなんですから……あむっ、んっ、ふはぁ、れるれる<emoji=heart04>」"
translation = "「응응!? 큭…… 음, 응츄릅…… 정말, 기습이잖아요…… 아읍, 응, 후하아, 렐렐<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んむっ……ふぅ、はぁ、んっ……<emoji=heart04>\u3000れろ、れろ……ちゅっ、じゅるるっ……はぁ……ぁむ……れぇろん、れる、ちゅぷっ、ちゅるるっ<emoji=heart04>」"
translation = "「음…… 후우, 하아, 응……<emoji=heart04> 렐로, 렐로…… 츕, 즈르륵…… 하아…… 아읍…… 례롱, 렐, 츕, 츄르륵<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふっ、んんむ、はぁ……ちゅるちゅるっ……ん、ふぅ……<emoji=heart04>\u3000キスすると、頭がぽーっとして……ちゅっ、ちゅぱっ、ちゅぷるっ<emoji=heart04>」"
translation = "「큭, 응음, 하아…… 츄르츄르륵…… 응, 후우……<emoji=heart04> 키스하면, 머리가 멍해져서…… 츕, 츄팟, 츄프륵<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスを重ね舌を絡め合うたびに、表情がうっとりと蕩け、吐息も熱っぽくなってくる。"
translation = "키스를 거듭하고 혀를 얽을 때마다, 표정이 황홀하게 녹아내리고, 숨결도 뜨거워진다."

[[dialogue]]
speaker = "unk"
original = "身じろぎする度にかわいらしい胸が揺れて、本能に押されるように手を伸ばした。"
translation = "몸을 뒤척일 때마다 사랑스러운 가슴이 흔들리고, 본능에 이끌리듯이 손을 뻗었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひゃんっ！？\u3000はっ、んっ……おっぱい、あんまり大きくないから、触っちゃ……ん～～っ<emoji=heart04>\u3000こんなの、初めて……先っぽも……ひああぁっ<emoji=heart04>」"
translation = "「햣!? 핫, 응…… 가슴, 별로 크지 않으니까, 만지면…… 응~~<emoji=heart04> 이런 거, 처음이야…… 끝부분도…… 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おっぱい触りながら、あなたのが、私の中で大きくなって……体、熱くなっちゃう……ふあぁ、はっ……あっ、んんっ……<emoji=heart04>」"
translation = "「가슴 만지면서, 당신 것이, 제 안에서 커지고…… 몸이, 뜨거워져 버려요…… 후아아, 핫…… 앗, 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "汗ばんで火照った肌が手に吸い付くようで、フィオナは大きくないと言うけど、ふにふにとした柔らかさがたまらない。"
translation = "땀에 젖어 달아오른 피부가 손에 달라붙는 듯했고, 피오나는 크지 않다고 말하지만, 말랑말랑한 부드러움이 참을 수 없다."

[[dialogue]]
speaker = "unk"
original = "おっぱいを刺激する度にフィオナの体が小さく震え、蜜を滲ませながら膣がきゅうきゅうと収縮してペニスを絞った。"
translation = "가슴을 자극할 때마다 피오나의 몸이 작게 떨리고, 꿀을 배어 나오게 하면서 질이 꽉꽉 수축하여 페니스를 조였다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んっ、んぁ、はぁっ…………乳首、くりくりされて──ひあぁんっ<emoji=heart04>\u3000そんなにされたら、はっ、はんっ……んんん～～っ<emoji=heart04>」"
translation = "「응, 응아, 하앗………… 젖꼭지, 뱅글뱅글 만져져서── 히아앙<emoji=heart04> 그렇게 당하면, 핫, 항…… 응응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "次第に互いの下半身を濡らすほど蜜が溢れてきて、俺は腰に力を込めて動き始める。"
translation = "점차 서로의 하반신을 적실 정도로 꿀이 넘쳐흐르고, 나는 허리에 힘을 주어 움직이기 시작한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやぁああ～～っ！？\u3000奥に来て……んんっ、おち○ちん太くて、硬くて、私の中、深いところまで広げられてます……！」"
translation = "「히야아아~~!? 깊숙이 들어와서…… 응응, 자지 굵고, 단단해서, 제 안, 깊은 곳까지 넓혀지고 있어요……!」"

[[dialogue]]
speaker = "unk"
original = "奥深くまで突き入れると、ペニス全体が粘膜に包まれて熱い快感が上ってくる。"
translation = "깊숙한 곳까지 찔러 넣자, 페니스 전체가 점막에 감싸여 뜨거운 쾌감이 올라온다."

[[dialogue]]
speaker = "unk"
original = "とろけるような蜜と肉の感触に包まれながら、馴染ませるように前後にピストンさせていく。"
translation = "녹아내릴 듯한 꿀과 살의 감촉에 감싸이면서, 익숙해지도록 앞뒤로 피스톤 운동을 시켜간다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んん、ズルズルって抜けて……また入ってきてっ……ふあぁ、あっ、あぁ～っ<emoji=heart04>」"
translation = "「응응, 주르륵 빠지고…… 다시 들어와서…… 후아아, 앗, 아아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぁああっ、ああんっ……<emoji=heart04>\u3000んんっ、ひあっ、あんっ……大きくて、熱いので、中擦られてっ……変な声、出ちゃうぅ……んん～～っ<emoji=heart04>」"
translation = "「화아앗, 아앙……<emoji=heart04> 응응, 히앗, 앙…… 커다랗고, 뜨거워서, 안이 비벼져서…… 이상한 목소리, 나와 버려요…… 응응~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いきり立ったペニスで蜜で濡れた粘膜を摩擦され、痛みではなく快感で声を上げるフィオナ。"
translation = "발기한 페니스로 꿀에 젖은 점막을 마찰당하며, 고통이 아닌 쾌감으로 목소리를 높이는 피오나."

[[dialogue]]
speaker = "unk"
original = "肉ひだがヒクヒクと震えてペニスを刺激し、ますます興奮が膨れ上がってくる。"
translation = "살 주름이 히끅히끅 떨며 페니스를 자극하고, 더욱 흥분이 부풀어 오른다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おち○ちん、出たり入ったりして……あっ、はっ……はぁっ、はっ、あっ、あんっ……<emoji=heart04>」"
translation = "「자지, 나갔다 들어왔다 하면서…… 앗, 핫…… 하앗, 핫, 앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お腹の中、熱いぃ……ふっ、あっ、ぁんっ……んあぁ、あっ、あぁっ……<emoji=heart04>\u3000もっと動いて大丈夫です……だからもっと……！」"
translation = "「배 속, 뜨거워…… 큭, 앗, 아앙…… 응아아, 앗, 아앗……<emoji=heart04> 더 움직여도 괜찮아요…… 그러니까 더……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやぁああ～～～っ！！\u3000ふぁっ、はぁっ、はっ………あっ、あんっ！」"
translation = "「히야아아~~~!! 화앗, 하앗, 핫……… 앗, 앙!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふああぁっ、はっ、はんっ<emoji=heart04>\u3000はぁっ、はっ、はっ……勢いよく、動いて、いっぱい擦れてるっ……<emoji=heart04>」"
translation = "「후아아앗, 핫, 항<emoji=heart04> 하앗, 핫, 핫…… 기세 좋게, 움직여서, 잔뜩 비벼지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンを加速させると、ペニスと粘膜が激しく摩擦し、快感も波のように押し寄せる。"
translation = "피스톤을 가속시키자, 페니스와 점막이 격렬하게 마찰하고, 쾌감도 파도처럼 밀려온다."

[[dialogue]]
speaker = "unk"
original = "気付いているのかいないのか、フィオナも快楽を求めて自分から腰を動かしていた。"
translation = "눈치채고 있는지 아닌지, 피오나도 쾌락을 찾아 스스로 허리를 움직이고 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「初めてなのに、こんなに深くあなたを受け入れて……んん～～っ<emoji=heart04>\u3000んっ、はぁっ、はっ、ふああっ<emoji=heart04>」"
translation = "「처음인데도, 이렇게 깊이 당신을 받아들이고…… 응응~~<emoji=heart04> 응, 하앗, 핫, 후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふあぁっ、あっ、ああぁんっ<emoji=heart04>\u3000私の体なのに、私じゃないみたい……はっ、はあぁっ、んあっ、あんっ……はっ、んんぁああ～っ<emoji=heart04>」"
translation = "「후아앗, 앗, 아아앙<emoji=heart04> 제 몸인데도, 제가 아닌 것 같아요…… 핫, 하아앗, 응앗, 앙…… 핫, 응응아아아~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "じわじわ上り詰める快感と、ゾクゾクと背筋を走り抜ける刺激が混ざり合う。"
translation = "서서히 치솟는 쾌감과, 오싹하고 등골을 타고 흐르는 자극이 뒤섞인다."

[[dialogue]]
speaker = "unk"
original = "勢いよくペニスを突き入れると、とろりとした蜜がかき混ぜられ、湿った音がいやらしく響いた。"
translation = "기세 좋게 페니스를 찔러 넣자, 걸쭉한 꿀이 휘저어지고, 축축한 소리가 야릇하게 울려 퍼졌다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はっ、はっ、はぁっ……おま○こ、トロトロになって……声出ちゃうっ……んん～～っ<emoji=heart04>」"
translation = "「핫, 핫, 하앗…… 보지, 흐물흐물해져서…… 목소리 나와 버려…… 응응~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「太いので、ズンズンされて……ふぁっ、はぁ、私の中、あなたの形になりそうっ……んんっ、はぁっ、あんっ……<emoji=heart04>」"
translation = "「굵은 것으로, 쿵쿵 당해서…… 화앗, 하아, 제 안이, 당신 형태로 변할 것 같아…… 응응, 하앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「硬くて熱いのが、何度も入ってきてっ──ふああぁっ、はぁっ、あんっ<emoji=heart04>\u3000はぁっ、はっ、はぁっ、んぁあ～～っ<emoji=heart04>」"
translation = "「단단하고 뜨거운 것이, 몇 번이고 들어와서── 후아아앗, 하앗, 앙<emoji=heart04> 하앗, 핫, 하앗, 응아아~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "かわいい胸をぷるぷると揺らしながら、普段の凛々しさから想像もつかない、いやらしい表情で喘ぐフィオナ。"
translation = "귀여운 가슴을 푸르르 흔들면서, 평소의 늠름함에서는 상상도 할 수 없는, 야릇한 표정으로 신음하는 피오나."

[[dialogue]]
speaker = "unk"
original = "そのあられもない姿に情欲を刺激され、ぬるぬると濡れた膣壁にペニスを強く摩擦させる。"
translation = "그 적나라한 모습에 정욕이 자극되어, 미끈미끈하게 젖은 질벽에 페니스를 강하게 마찰시킨다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んっ、んん～～っ<emoji=heart04>\u3000出っ張ったところ擦り付けられて、おち○ちんの形、わかっちゃいますっ……ふああぁっ、はっ、ああんっ……<emoji=heart04>」"
translation = "「응, 응응~~<emoji=heart04> 튀어나온 부분 비벼져서, 자지의 형태, 알아 버려요…… 후아아앗, 핫, 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んはっ、はっ、はぁっ……お腹熱いぃっ……<emoji=heart04>\u3000おち○ちんで突かれてっ、おま○こ気持ちいい……これ、私も好きぃっ……<emoji=heart04>」"
translation = "「응핫, 핫, 하앗…… 배 뜨거워……<emoji=heart04> 자지로 찔려서, 보지 기분 좋아…… 이거, 저도 좋아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だからもっと激しくっ……！\u3000私ももっとして欲しいから、もっと……！」"
translation = "「그러니까 더 격렬하게……! 저도 더 해줬으면 좋겠으니까, 더……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんんーーっ<emoji=heart04>\u3000はっ、はぁっ……また強くなって、ますっ……<emoji=heart04>\u3000ふぁっ、はっ、はぁんっ<emoji=heart04>」"
translation = "「응응응--<emoji=heart04> 핫, 하앗…… 다시 강해지고, 있어요……<emoji=heart04> 화앗, 핫, 항<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「手も、もっと強く握ってぇ……ふぁっ、はっ、はっ──あなたを、刻み付けてっ……<emoji=heart04>\u3000んはぁっ、あっ、あっ、んんぁああ～～っ<emoji=heart04>」"
translation = "「손도, 더 세게 잡아 줘요…… 화앗, 핫, 핫── 당신을, 새겨 줘……<emoji=heart04> 응하앗, 앗, 앗, 응응아아아~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "痛みをこらえるためではなく、心を通わせるために、ぎゅっと潰れるくらい強く手を握る。"
translation = "고통을 참기 위해서가 아니라, 마음을 나누기 위해, 꽉 뭉개질 정도로 강하게 손을 쥔다."

[[dialogue]]
speaker = "unk"
original = "手から伝わる温もりが俺の全身を熱くして、フィオナのもっと奥へと自分自身を届かせようとする。"
translation = "손에서 전해지는 온기가 나의 전신을 뜨겁게 하고, 피오나의 더 깊은 곳으로 자기 자신을 닿게 하려고 한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おち○ちん、勢いよく、入ってきてぇっ……<emoji=heart04>\u3000深いところにっ……んんぅ～～っ<emoji=heart04>\u3000ひあぁっ、あっ、あんっ<emoji=heart04>」"
translation = "「자지, 기세 좋게, 들어와 줘……<emoji=heart04> 깊은 곳에…… 응응우~~<emoji=heart04> 히아앗, 앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとペニスが奥にぶつかり、敏感な亀頭に衝撃が伝わると同時に膣内がぎゅっと収縮した。"
translation = "그러자 페니스가 깊숙한 곳에 부딪히고, 민감한 귀두에 충격이 전해짐과 동시에 질 내부가 꽉 수축했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひやあぁああ～～っ！？\u3000お腹の奥、届いて、あ、あ、んんーーっ！」"
translation = "「히야아아아~~!? 배 속 깊은 곳, 닿아서, 아, 아, 응응--!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これ、子宮に当たってっ……！？\u3000はっ、はっ、はっ、んっはぁっ……<emoji=heart04>\u3000奥、届くと、すごいぃっ……<emoji=heart04>」"
translation = "「이거, 자궁에 닿아서……!? 핫, 핫, 핫, 응하앗……<emoji=heart04> 깊숙이, 닿으니까, 대단해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パンパンに膨張した亀頭が子宮口を叩き、悲鳴じみた嬌声がフィオナの部屋に響く。"
translation = "빵빵하게 팽창한 귀두가 자궁구를 두드리고, 비명 같은 교성이 피오나의 방에 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "手を強く握り、甲高い声を張り上げて、内から爆発しそうな快感をこらえていた。"
translation = "손을 강하게 쥐고, 날카로운 목소리를 높이며, 안에서 폭발할 듯한 쾌감을 참고 있었다."

[[dialogue]]
speaker = "unk"
original = "さらにまた唇を重ね、腰を振りながら濃厚なキスを交わす。"
translation = "다시 입술을 포개고, 허리를 흔들면서 농후한 키스를 나눈다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んっ……ちゅるっ、ちゅるるる……ふ……んんっ<emoji=heart04>\u3000私の中、ズンズンって……硬いおち○ちんで、赤ちゃんのお部屋、突かれてますっ……<emoji=heart04>」"
translation = "「응…… 츄릅, 츄르르르…… 후…… 응응<emoji=heart04> 제 안, 쿵쿵하고…… 단단한 자지로, 아기 방, 찔리고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ、はぁ……れるっ、れろれろ、れぇろ<emoji=heart04>\u3000んふぅ、ちゅくっ、ちゅっ、ちゅるる……んっ、んちゅぅっ<emoji=heart04>」"
translation = "「하아, 하아…… 렐, 렐로렐로, 례로<emoji=heart04> 응후우, 츅, 츕, 츄르르…… 응, 응츄우<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「れろっ、ちゅぱっ……はぁっ、あっ、あ、あんっ<emoji=heart04>\u3000奥に当たると、お腹キュンってして、おかしくなりそうですぅっ<emoji=heart04>」"
translation = "「렐, 츄팟…… 하앗, 앗, 아, 앙<emoji=heart04> 깊숙이 닿으니까, 배가 큥 하고, 이상해질 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁはっ、はっ、はんっ<emoji=heart04>\u3000れろれろ、んちゅっ、んん……ちゅるるっ……んんっ<emoji=heart04>\u3000ふっ、んっ……んちゅるっ……はぁっ、あっ……ん～～っ<emoji=heart04>」"
translation = "「하아핫, 핫, 항<emoji=heart04> 렐로렐로, 응츄, 응응…… 츄르륵…… 응응<emoji=heart04> 큭, 응…… 응츄릅…… 하앗, 앗…… 응~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮を突く度に血が沸騰しそうになって、体の奥から熱がせり上がり、絶頂を知らせるようにペニスがドクドクと脈打つ。"
translation = "자궁을 찌를 때마다 피가 끓어오를 것 같고, 몸속 깊은 곳에서 열이 솟아오르며, 절정을 알리듯이 페니스가 두근두근 맥동한다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おち○ちん、ビクビクって震えて……出そう、なんですか？\u3000はっ、はぁっ……なら、私の中で出してください……！」"
translation = "「자지, 움찔움찔 떨면서…… 나올 것, 같아요? 핫, 하앗…… 그럼, 제 안에서 싸 주세요……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんっ、はぁ、はぁ……私の中で、あなたを受け止めたいです……」"
translation = "「응응, 하아, 하아…… 제 안에서, 당신을 받아들이고 싶어요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だから、奥で出してっ……！\u3000おま○この一番奥に、あなたの精液、たくさん注いでくださいっ……！」"
translation = "「그러니까, 깊은 곳에 싸 줘요……! 보지의 가장 깊은 곳에, 당신의 정액, 잔뜩 부어 주세요……!」"

[[dialogue]]
speaker = "unk"
original = "しとどに濡れた粘膜もひくひくと震え、精を求めるように締め付けてくる。"
translation = "흠뻑 젖은 점막도 히끅히끅 떨며, 정액을 요구하듯이 조여온다."

[[dialogue]]
speaker = "unk"
original = "もうフィオナの奥に自分の精を注ぐことしか考えられなくなって、熱く滾る欲望をしゃにむに打ち付ける。"
translation = "이제 피오나의 깊은 곳에 자신의 정액을 쏟아붓는 것밖에 생각할 수 없게 되어, 뜨겁게 끓어오르는 욕망을 무작정 부딪친다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふぁあっ、あっ、あっ──ふぁああ～～っ<emoji=heart04>\u3000いっぱい、突かれて、激しっ、いっ……んんっ、はっ、あっ、あんっ<emoji=heart04>」"
translation = "「화앗, 앗, 앗── 화아아~~<emoji=heart04> 잔뜩, 찔려서, 격렬, 해…… 응응, 핫, 앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひああぁ～～っ<emoji=heart04>\u3000ふやっ、あっ、はっ、はっ……んんっ<emoji=heart04>\u3000大きなおち○ちん、おま○この中で暴れてっ……<emoji=heart04>」"
translation = "「히아아아~~<emoji=heart04> 후얏, 앗, 핫, 핫…… 응응<emoji=heart04> 커다란 자지, 보지 안에서 날뛰고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はっ、はっ、はっ……はんっ<emoji=heart04>\u3000たくさん擦れて、奥突かれて……ふああっ、はっ……壊れ、ちゃいそうっ<emoji=heart04>」"
translation = "「핫, 핫, 핫…… 항<emoji=heart04> 잔뜩 비벼지고, 깊숙이 찔려서…… 후아앗, 핫…… 망가, 져 버릴 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもいいからっ……<emoji=heart04>\u3000あなたを、感じさせてっ……ぎゅっと握って……はぁっ、はっ、はっ、はっ──ふぁああ～～っ<emoji=heart04>」"
translation = "「그래도 좋으니까……<emoji=heart04> 당신을, 느끼게 해 줘…… 꽉 쥐고…… 하앗, 핫, 핫, 핫── 화아아~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「奥、ズンズンされて……頭、真っ白に、なるぅっ……<emoji=heart04>\u3000来る来るっ、来ちゃいますぅ～っ<emoji=heart04>\u3000あっ、あっ、あっ、あ──」"
translation = "「깊은 곳, 쿵쿵 당해서…… 머리, 새하얗게, 돼……<emoji=heart04> 와요 와요, 와 버려요~<emoji=heart04> 앗, 앗, 앗, 아──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひああぁあ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히아아아~~~~~~~~~~~~~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んんん～～～っ<emoji=heart04>\u3000あっ、熱いぃっ……<emoji=heart04>\u3000熱いのがビュクビュクって、お腹の、中にっ……<emoji=heart04>」"
translation = "「응응응~~~<emoji=heart04> 앗, 뜨거워……<emoji=heart04> 뜨거운 게 뷰쿳뷰쿳하고, 배, 안에……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手をぎゅっと握り、同じぐらい強く粘膜でペニスを締め付けながら、強すぎる絶頂に悶えるフィオナ。"
translation = "손을 꽉 쥐고, 같은 정도로 강하게 점막으로 페니스를 조이면서, 너무 강한 절정에 괴로워하는 피오나."

[[dialogue]]
speaker = "unk"
original = "俺も意識が飛びそうになりながら、亀頭を子宮口に密着させて最後の一滴までフィオナの中に注ぎ込む。"
translation = "나도 의식이 날아갈 것 같아지면서, 귀두를 자궁구에 밀착시켜 마지막 한 방울까지 피오나 안에 쏟아붓는다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「んはぁっ、はっ、あっ、ああっ……<emoji=heart04>\u3000おち○ちんが、私の中いっぱいにして……ドクドク脈打ってっ、はああぁんっ……<emoji=heart04>」"
translation = "「응하앗, 핫, 앗, 아앗……<emoji=heart04> 자지가, 제 안을 가득 채우고…… 두근두근 맥동하며, 하아아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「熱い精液、ビューって、赤ちゃんのお部屋に入ってきてますっ……<emoji=heart04>\u3000あなたのが、染み込んでる……はぁはっ……はっ、んんん～～っ<emoji=heart04><emoji=heart04>」"
translation = "「뜨거운 정액, 뷰 하고, 아기 방에 들어오고 있어요……<emoji=heart04> 당신 것이, 스며들고 있어…… 하아핫…… 핫, 응응응~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はぁ、はっ、はっ……ふぁ、はあぁ……溢れるくらいたくさん…………今のが射精、なんですね……」"
translation = "「하아, 핫, 핫…… 화, 하아…… 넘칠 정도로 잔뜩………… 지금 것이 사정, 이군요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたのが私の奥で爆発するみたいに脈打って……お腹があなたの精液でいっぱいで、まだ熱いです……」"
translation = "「당신의 것이 제 깊은 곳에서 폭발하는 것처럼 맥동하고…… 배가 당신의 정액으로 가득 차서, 아직 뜨거워요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたに射精された瞬間、気持ち良すぎて、頭の中が真っ白になって……私が私じゃなかったです」"
translation = "「당신에게 사정당한 순간, 너무 기분 좋아서, 머릿속이 새하얗게 되고…… 제가 제가 아니었어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「好きな人とつながるのって、こんな感じなんですね……うまく言葉にできないけど、胸が温かくなって、嬉しいです……」"
translation = "「좋아하는 사람과 연결되는 건, 이런 느낌이군요…… 말로 잘 표현할 수 없지만, 가슴이 따뜻해지고, 기뻐요……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もだよ。それにフィオナが気持ち良くなってくれて嬉しかった」"
translation = "「나도야. 게다가 피오나가 기분 좋아해 줘서 기뻤어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「う……確かに初めてにしては感じていたと思いますけど……だってあんなにすごいと思わなくて……」"
translation = "「우…… 확실히 처음치고는 느끼고 있었다고 생각하지만…… 왜냐하면 그렇게 대단할 거라고 생각하지 못해서……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも最初は痛くて……心配をかけたくなくて強がってしまいましたけど、きっとあなたにはバレバレだったんですよね」"
translation = "「하지만 처음에는 아파서…… 걱정을 끼치고 싶지 않아서 강한 척했지만, 분명 당신에게는 다 들통났었겠죠」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だけどあなたが痛みを和らげてくれたから、大丈夫でした。ありがとうございます」"
translation = "「하지만 당신이 고통을 덜어줬기 때문에, 괜찮았어요. 고마워요」"

[[dialogue]]
speaker = "unk"
original = "汗ばんだ手を握り合いながら、フィオナがそっと微笑む。"
translation = "땀에 젖은 손을 서로 쥐면서, 피오나가 살며시 미소 짓는다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「次は痛いのも、気持ちいいのも、もっと素直に伝えたいです」"
translation = "「다음에는 아픈 것도, 기분 좋은 것도, 더 솔직하게 전하고 싶어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だからその……またよろしくお願いしますね」"
translation = "「그러니까 그…… 다시 잘 부탁드립니다」"

