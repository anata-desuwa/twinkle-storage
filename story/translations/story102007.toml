[[dialogue]]
speaker = "unk"
original = "その日の夜、みんなで学園に再集合した。"
translation = "그날 밤, 다 같이 학원에 다시 모였다."

[[dialogue]]
speaker = "unk"
original = "異世界からやってきた２人のことを歓迎するため、カフェテリアで盛大にパーティーを開くことになったのだ。"
translation = "이세계에서 온 두 사람을 환영하기 위해 카페테리아에서 성대하게 파티를 열기로 한 것이다."

[[dialogue]]
speaker = "unk"
original = "料理の方は蛍火にお願いして用意してもらっていた。"
translation = "요리는 호타루비에게 부탁해서 준비해 두었다."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「お昼に行ったお店も素晴らしかったですが、こちらの料理も素晴らしいですね」"
translation = "「점심에 갔던 가게도 훌륭했지만, 여기 요리도 훌륭하네요.」"

[[dialogue]]
speaker = "unk"
original = "また肉料理で良かったの？"
translation = "또 고기 요리여도 괜찮았던 거야?"

[[dialogue]]
speaker = "unk"
original = "お昼も肉料理だったけど"
translation = "점심에도 고기 요리였는데."

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ええ、１日３食、全てお肉でも私は一向に構いませんよ」"
translation = "「네, 하루 세 끼 전부 고기여도 저는 전혀 상관없어요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どこかの守護天使みたいなこと言うわね……」"
translation = "「어디 사는 수호천사 같은 소리를 하네……」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「そんな方がいるのですか？\u3000ぜひ一度語り合ってみたいものです」"
translation = "「그런 분이 있나요? 꼭 한번 이야기를 나눠보고 싶네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アルテって藝術家なんでしょう？\u3000そこはまず、絵について語り合いたいって言葉が先に欲しかったわ」"
translation = "「아르테는 예술가잖아? 거기선 우선 그림에 대해 이야기하고 싶다는 말이 먼저 나와야지.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「言葉で語れるようなら絵は必要ないでしょう？」"
translation = "「말로 다 할 수 있다면 그림은 필요 없지 않겠어요?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「うわ、アルテが藝術家っぽいこと言った！」"
translation = "「우와, 아르테가 예술가 같은 말을 했어!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふふ、なるほど。語りたいことは全て筆とキャンバスで語るってことだな？」"
translation = "「후후, 그렇군. 하고 싶은 말은 전부 붓과 캔버스로 하겠다는 뜻이지?」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「ぽい、じゃなくて正真正銘の藝術家なんですけどね。ま、そういうことです」"
translation = "「같은 게 아니라 진짜 예술가거든요. 뭐, 그런 뜻이에요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「すっごく美味しい～～～っ！\u3000これ、なんてお魚なんだろ？」"
translation = "「정말 맛있어~~~! 이거 무슨 생선이야?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「は、はい、こちらのお刺身はマグロの赤身、中トロ、タイ、ブリ、カツオ、イカ、ホタテ。煮物がカレイ。てんぷらがタラ、エビ、タコですね」"
translation = "「네, 네, 이쪽 회는 참치 등살, 중뱃살, 도미, 방어, 가다랑어, 오징어, 가리비예요. 찜은 가자미고요. 튀김은 대구, 새우, 문어입니다.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そうなんだ～、色んなお魚がいっぱいだ～♪」"
translation = "「그렇구나~ 여러 가지 생선이 가득해~♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「プトラさんは、お魚がお好きだと聞いています」"
translation = "「푸트라 씨는 생선을 좋아하신다고 들었어요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そうだよ～。あたしの育ったところが漁の盛んなところなんだ～」"
translation = "「응~ 내가 자란 곳이 어업이 활발한 곳이거든~」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あたしのお父さんも漁師さんでね、小さい頃からお魚料理を食べて育ったんだよ」"
translation = "「우리 아빠도 어부라서 어릴 때부터 생선 요리를 먹고 자랐어.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「それは……素敵なところですね……」"
translation = "「그건…… 멋진 곳이겠네요……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そうなの！\u3000海の上に家が並んで建っててね、すぐにぴょーんて海に飛び込めるんだよ！」"
translation = "「맞아! 바다 위에 집들이 늘어서 있어서 바로 뿅 하고 바다에 뛰어들 수 있어!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「お魚さんもいっぱい泳いでるし、貝さんとかカニさんとかも採り放題なんだ」"
translation = "「물고기도 잔뜩 헤엄치고 조개나 게 같은 것도 마음껏 딸 수 있어.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「起きたらまず最初に海に入って、朝ごはんを捕まえてくるのが小さい頃からの毎日だったな～」"
translation = "「일어나면 제일 먼저 바다에 들어가서 아침밥을 잡아 오는 게 어릴 때부터의 일상이었지~」"

[[dialogue]]
speaker = "unk"
original = "生粋の海人だ……"
translation = "뼛속까지 바다 사람이네……"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「うみんちゅ？」"
translation = "「바다 사람?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まさに海の女ってことですよ」"
translation = "「그야말로 바다의 여인이라는 뜻이에요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えへへ……なんか嬉しいな」"
translation = "「에헤헤…… 왠지 기쁜걸.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あっ、ごめんね！\u3000なんだかあたしのことばっかり一方的に話しちゃって」"
translation = "「앗, 미안해! 왠지 나만 일방적으로 떠든 것 같아서.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「いえ、そんなことは……」"
translation = "「아뇨, 그런 건……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「蛍火は緊張すると無口になっちゃうのよ。怖い顔してるけど、怒ってるわけじゃないのよ」"
translation = "「호타루비는 긴장하면 말수가 적어지거든. 무서운 표정을 짓고 있지만 화난 건 아니야.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「引っ込み思案な人というのはどこにでもいるものですね。私の仲間にも１人困ったのがいますよ」"
translation = "「내성적인 사람은 어디에나 있는 법이죠. 제 동료 중에도 곤란한 녀석이 하나 있어요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「いつもナメクジみたいにうじうじしてるから、私がいつも優しく背中を押してあげてるんです」"
translation = "「맨날 민달팽이처럼 우물쭈물하니까 제가 항상 상냥하게 등을 떠밀어주고 있답니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたの場合、お尻をひっぱたいてるイメージだけど」"
translation = "「너 같은 경우에는 엉덩이를 걷어차는 이미지인데.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「多少は強引でないと、この手のタイプはなかなか動いてくれませんからね。否定はしません」"
translation = "「어느 정도 강압적이지 않으면 이런 타입은 좀처럼 움직여주지 않으니까요. 부정은 안 할게요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「アルテさん、なんだかんだ言って面倒見良さそうですもんね」"
translation = "「아르테 씨, 이러니저러니 해도 남을 잘 챙겨주시는 것 같네요.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「それは大いに誤解がありますね。他人の世話を焼くなんて面倒なことは御免です」"
translation = "「그건 큰 오해예요. 남의 뒤치다꺼리 같은 귀찮은 일은 사양입니다.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「またまた～、そんなこと言って～♪」"
translation = "「또 그런다~ 그러면서~♪」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「そういうあなたの周りには、話のネタになる面白い友人はいないんですか？」"
translation = "「그러는 당신 주변에는 얘깃거리가 될 만한 재미있는 친구 없나요?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「いっぱいいるよ～♪\u3000すっごく美人なんだけど魔法ゴリラなエルフとか、機械いじりが得意でなんでも作っちゃうキツネちゃんとか」"
translation = "「잔뜩 있어~♪ 엄청 미인인데 마법 고릴라인 엘프나, 기계 만지는 걸 잘해서 뭐든 뚝딱 만들어내는 여우짱이라든가.」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「……個性が溢れすぎて、想像がつかないですね」"
translation = "「……개성이 너무 넘쳐서 상상이 안 가네요.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サーシャさんかアナがそちらの世界で会っていたら、どんな感じだったか教えてもらいましょ！」"
translation = "「사샤 씨나 아나가 그쪽 세계에서 만났다면 어땠을지 나중에 물어보자!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そっか～、こっちの世界からあたしたちの世界に行った人もいるかもなんだね」"
translation = "「그렇구나~ 이쪽 세계에서 우리 세계로 간 사람도 있을지 모르겠네.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まあ、あの黒ベア子の口ぶりだと、１人きりで放り出されてる、ということはないでしょう」"
translation = "「뭐, 저 흑베아코의 말투를 봐선 혼자 덩그러니 내던져지지는 않았을 거야.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そうだね。車掌さんに出会えていたら、きっとよくしてくれてるはずだよ！」"
translation = "「응. 차장님을 만났다면 분명 잘해주고 계실 거야!」"

[[dialogue]]
speaker_original = "アルテ"
speaker_translation = "아르테"
original = "「とはいえ、みんな私がいなくて困っているでしょうし、早く帰ってあげないととは思っていますよ。特に館長は頼りないですからね」"
translation = "「그건 그렇고, 다들 제가 없어서 곤란해하고 있을 테니 빨리 돌아가야겠다고는 생각해요. 특히 관장님은 미덥지 못하니까요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あたしも特鉄隊のみんなが心配してるだろうし、元気な顔見せたいな」"
translation = "「나도 특철대 친구들이 걱정하고 있을 테니까 건강한 얼굴 보여주고 싶어.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですね、お二人を早く元の世界に帰してあげたいです。でも焦っても仕方ないですし、落ち着いていきましょう」"
translation = "「그렇네요, 두 분을 빨리 원래 세계로 돌려보내 드리고 싶어요. 하지만 서두른다고 될 일도 아니니 차분하게 가요.」"

